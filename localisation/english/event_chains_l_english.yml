 ####################################

 hijacked_cult_fleet_poi:0 "กองยานลัทธิคลั่ง"
 hijacked_cult_fleet_poi_desc:0 "พวกลัทธิสามารถสร้างกองยานขนาดเล็กได้ที่สถานที่ลับบน [Root.Capital.GetName] เมื่อถูกค้นพบ พวกเขาได้หลบหนีด้วยยานของตนไปยัง [hijacked_fleet_planet.GetName] พวกมันต้องถูกทำลายก่อนจะก่อความเสียหายได้มากกว่านี้!"
 cultist_search_1_poi:1 "ค้นหา [cultists_1.GetName]"
 cultist_search_1_poi_desc:0 "เราตรวจพบร่องรอยไอออนจากยานลัทธิที่หลบหนีอยู่ใกล้ระบบดาวนี้ ควรส่งกำลังไปลาดตระเวนที่นี่อย่างเต็มรูปแบบ"
 cultist_search_2_poi:1 "ค้นหา [cultists_2.GetName]"
 cultist_search_3_poi:1 "ค้นหา [cultists_3.GetName]"
 cultist_shipyard_poi:0 "ทำลายอู่ต่อเรือลัทธิ"
 cultist_shipyard_poi_desc:0 "ในที่สุดเราก็ระบุต้นทางของยานลัทธิได้แล้ว — อู่ต่อเรือต่างดาวโบราณบางชนิดที่พวกเขายึดมาใช้ในระบบ [cult_planet.GetStarName]! สถานีอวกาศแห่งนี้ต้องถูกทำลายก่อนที่พวกคลั่งศรัทธาจะมีโอกาสปลดล็อกศักยภาพที่แท้จริงของมัน"
 cultist_flagship_poi:0 "ค้นหาเรือธงของลัทธิ"
 cultist_flagship_poi_desc:0 "เชื่อกันว่าเรือธงของลัทธิที่ตามตัวยากกำลังซ่อนตัวอยู่ที่ไหนสักแห่งภายในระบบดาวนี้ เราควรส่งกองยานติดอาวุธหนักไปเผชิญหน้ากับมัน"
 probe_search_1_poi:1 "ค้นหา [probe_system_1.GetName]"
 probe_search_1_poi_desc:0 "จากวิถีขาออกและเวลาที่ผ่านไปนับตั้งแต่มันออกจากระบบบ้านเกิดของเรา เราสันนิษฐานว่าโพรบความเร็วต่ำกว่าแสงที่สูญหายไปหนึ่งลำน่าจะอยู่ที่ใดที่หนึ่งภายในระบบดาวนี้"
 probe_search_2_poi:1 "ค้นหา [probe_system_2.GetName]"
 probe_search_3_poi:1 "ค้นหา [probe_system_3.GetName]"
 probe_search_4_poi:1 "ค้นหา [probe_system_4.GetName]"
 probe_ion_trail_poi:0 "ตามรอยไอออน"
 probe_ion_trail_poi_desc:0 "ร่องรอยไอออนของโพรบที่สูญหายไปลำหนึ่งนำมาสู่ระบบนี้"
 probe_subspace_anomaly_poi:2 "ถูกขัดขวางโดยศัตรู"
 probe_subspace_anomaly_poi_desc:1 "กองกำลังศัตรูขัดขวางไม่ให้เราเข้าถึงโพรบใต้ห้วงอวกาศในระบบนี้"
 coming_storm_poi_1_poi:0 "จุดทะลวง"
 coming_storm_poi_1_poi_desc:0 "จากเวกเตอร์ปัจจุบันของพวกมัน เราประเมินได้ว่ามวลสัญญาณติดต่อใต้ห้วงอวกาศที่กำลังเข้ามาจะเข้าสู่กาแล็กซีของเราบริเวณใกล้เคียงระบบดาวเหล่านี้"
 systems_visited_poi:0 "ระบบที่ไปถึงแล้ว"
 hunting_hyacinth_poi:0 "สำรวจระบบดาว"
 hunting_hyacinth_poi_desc:0 "เราต้องสำรวจระบบเหล่านี้ให้เสร็จและมองหาร่องรอยการเดินทางผ่านของมุม:เครื่องยนต์ดึกดำบรรพ์ของยานอาร์กอาจทิ้งร่องรอยไอออนตกค้างไว้"
 hunting_hyacinth_2_poi:0 "สืบสวนระบบดาว"
 hunting_hyacinth_2_poi_desc:0 "ร่องรอยไอออนของมุม:ถูกติดตามมาถึงระบบนี้ เราต้องสืบสวน"
 extradimensional_invasion_1_poi:0 "ประตูมิติ"
 extradimensional_invasion_1_poi_desc:0 "ตรวจพบประตูที่ผู้รุกรานข้ามมิติกำลังทะลักผ่านเข้ามาในระบบ [extradimensional_system.GetName] แล้ว พวกมันจะสามารถเสริมกำลังจำนวนของตนได้อย่างต่อเนื่องจนกว่าประตูนี้จะถูกทำลาย"
 extradimensional_invasion_2_poi:0 "ประตูที่สอง"
 extradimensional_invasion_2_poi_desc:0 "ประตูมิติที่สองได้ปรากฏขึ้นในระบบ [second_portal_system.GetName] เช่นเดียวกับบานแรก มันกำลังส่งยานข้ามมิติที่เป็นศัตรูเข้ามาในกาแล็กซีของเราอย่างต่อเนื่อง"
 extradimensional_invasion_3_poi:0 "ประตูที่สาม"
 extradimensional_invasion_3_poi_desc:0 "ตรวจพบประตูที่สามในระบบ [third_portal_system.GetName] แม้ในขณะนี้มันก็ยังพ่นยานข้ามมิติที่เป็นศัตรูเข้าสู่ภพแห่งการดำรงอยู่ของเรา"
 vultaum_1_poi:0 "วูลทอมาร์"
 vultaum_1_poi_desc:0 "ตอนนี้เรามีพิกัดของระบบบ้านเกิด Vultaum แล้ว"
 yuht_1_poi:0 "ยูห์ทาน"
 yuht_1_poi_desc:0 "ในที่สุดก็พบโลกบ้านเกิดโบราณของชาวยี้แล้ว"
 first_league_1_poi:0 "เฟน ฮับบานิส"
 first_league_1_poi_desc:0 "ระบบเฟน ฮับบานิสเคยเป็นศูนย์กลางทางการเมือง การบริหาร และเศรษฐกิจของลีกแรกโบราณ"
 irassian_1_poi:0 "อิรัส"
 irassian_1_poi_desc:0 "ระบบอิรัสคือหัวใจของคองคอร์ดโบราณ"
 cybrex_1_poi:0 "ไซเบร็กซ์ อัลฟา"
 cybrex_1_poi_desc:0 "ดูเหมือนว่าไซเบรกซ์จะล่าถอยไปยังระบบดาวนี้"
 nomad_poi_1:0 "ตำแหน่งที่ติดตามได้"
 nomad_poi_1_desc:1 "ผู้เดินทางอวกาศประหลาดอยู่ที่นี่ ทุกความพยายามในการเรียกติดต่อพวกเขามีแต่ความเงียบตอบกลับ ดังนั้นเราทำได้เพียงรอดูว่าจะเกิดอะไรขึ้นต่อไป"
 extradimensional_invasion_4_poi:0 "สมอมิติ"
 extradimensional_invasion_4_poi_desc:0 "ผู้รุกรานกำลังก่อสร้างสถานีอวกาศขนาดใหญ่บางชนิดซึ่งทำหน้าที่เป็นสมอมิติ - ท่อส่งที่เพิ่มความสามารถในการเคลื่อนย้ายยานผ่านรูหนอนของพวกมัน ยิ่งพวกมันเปิดใช้งานสมอเหล่านี้มากเท่าไร ก็ยิ่งจะสามารถนำกำลังเสริมจากแดนของตนเข้ามาได้บ่อยขึ้นเท่านั้น\n\nสมอเหล่านี้ยังดูเหมือนจะเสริมความมั่นคงของใต้ห้วงอวกาศรอบประตูมิติอย่างมากด้วยเช่นกัน ประตูมิตินี้จะคงกระพันต่ออาวุธโดยแทบสมบูรณ์ตราบใดที่ยังมีสมอใด ๆ ทำงานอยู่!"
 extradimensional_invasion_chain_2_title:0 "ดิ อะเบอร์แรนต์"
 extradimensional_invasion_chain_2_desc:0 "ผู้รุกรานข้ามมิติฝ่ายที่สองได้ปรากฏขึ้นในกาแล็กซีของเรา และพวกมันก็เป็นศัตรูไม่แพ้ฝ่ายแรก โชคดีที่สิ่งมีชีวิตข้ามมิติเหล่านี้ดูเหมือนจะต่อสู้กันเองด้วย"
 extradimensional_invasion_chain_3_title:0 "ดิ วีฮีเมนต์"
 extradimensional_invasion_chain_3_desc:0 "ฝ่ายข้ามมิติที่สามได้โผล่ออกมาจากรูหนอนอีกแห่งหนึ่ง แม้ว่าพวกมันตั้งใจจะเขมือบทุกชีวิตในกาแล็กซีของเราเช่นกัน แต่ดูเหมือนว่าพวกมันกำลังทำสงครามสามเส้ากับอีกสองฝ่ายจากมิติเดียวกัน"

