l_english:

 ####################################
 # Event Chains
 ####################################

 test_chain_title:0 "ปริศนาแห่ง [Root.GetName]"
 test_chain_desc:0 "มีเหตุการณ์ประหลาดบางอย่างถูกพบเห็นบน [Root.GetName]"
 test_chain_2_title:0 "ปริศนาแห่ง [Root.GetName]"
 test_chain_2_desc:0 "มีเหตุการณ์ประหลาดบางอย่างถูกพบเห็นบน [Root.GetName]"
 test_counter:0 "ตัวนับทดสอบ"
 migrating_forests_chain_title:0 "ป่าพเนจรบน [Root.GetName]"
 migrating_forests_chain_desc:0 "ป่าพเนจรบน [Root.GetName] กำลังรบกวนการพัฒนาอาณานิคมของเรา เราต้องหาทางแก้ปัญหานี้หากหวังจะรุ่งเรืองบนโลกใบนี้"
 subterranean_civilization_chain_title:1 "อารยธรรม[Root.owner.GetSubMantleUpper]"
 subterranean_civilization_chain_desc:0 "อารยธรรมต่างดาวใต้ดินบน [Root.GetName] กำลังขุดอุโมงค์มุ่งหน้าสู่อาณานิคมของเราบนผิวดาว เรายังไม่ทราบทั้งจำนวนและเจตนาของพวกเขา และพวกเขาอาจเป็นภัยคุกคามสำคัญ"
 abandoned_terraforming_chain_title:0 "โครงการปรับสภาพดาวที่ถูกทอดทิ้ง"
 abandoned_terraforming_chain_desc:0 "[Root.GetName] ถูกปรับสภาพดาวไปบางส่วนโดยใครบางคนเมื่อหลายพันปีก่อน แต่กระบวนการถูกขัดจังหวะด้วยเหตุผลที่ไม่ทราบ ส่งผลให้ระบบภูมิอากาศและชีวภูมิของดาวไม่เสถียรอย่างยิ่ง เราพบอุปกรณ์ปรับสภาพดาวที่ถูกทอดทิ้งแล้ว และต้องตัดสินใจว่าควรทำอย่างไรกับมัน"
 vultaum_chain_title:0 "จักรวรรดิแรกเริ่ม- วุธยัม"
 vultaum_chain_desc:0 "เราได้กู้คืนวัตถุโบราณจากสมัชชาดวงดาว Vultaum พวกเขาเป็นอารยธรรมต่างดาวที่รุ่งเรืองเมื่อราว 12 ล้านปีก่อน แม้รูปลักษณ์ที่แท้จริงของพวกเขาจะเลือนหายไปในม่านหมอกแห่งกาลเวลา แต่จากซากปรักหักพัง เราสรุปได้ว่าพวกเขาเป็นสัตว์จำพวกแอนเนลิดคล้ายหนอน ยาวราวสามถึงสี่เมตร ดูเหมือนว่าพวกเขาจะสื่อสารกันเป็นหลักผ่านการสั่นสะเทือนที่ส่งผ่านไปตามลำตัวเป็นปล้อง\n\nหากเราพบวัตถุที่หลงเหลือจากอารยธรรมของพวกเขามากพอ เราอาจสามารถระบุตำแหน่งระบบบ้านเกิดของพวกเขาได้"
 vultaum_artifacts:0 "เก็บกู้สิ่งประดิษฐ์ Vultaum ไปแล้ว"
 vultaum_homeworld_chain_title:0 "ระบบบ้านเกิดของ Vultaum"
 vultaum_homeworld_chain_desc:0 "เราได้ค้นพบตำแหน่งที่สาบสูญไปนานของระบบบ้านเกิด Vultaum แล้ว ต้องส่งคณะสำรวจไปที่นั่นโดยเร็วที่สุด ก่อนที่ผู้อื่นจะเปิดเผยความลับของพวกเขา!"
 yuht_chain_title:0 "จักรวรรดิแรกเริ่ม- ยี้"
 yuht_chain_desc:0 "เราได้กู้คืนวัตถุโบราณจากจักรวรรดิยี้พวกเขาเป็นอารยธรรมต่างดาวที่เคยอาศัยอยู่ในส่วนหนึ่งของกาแล็กซีเมื่อราวหกล้านปีก่อน ทางกายภาพแล้วยี้มีลักษณะคล้ายสัตว์ขาปล้องขนาดใหญ่มากและแบนราบ หนึ่งตัวเมื่อโตเต็มวัยอาจยาวได้เกือบร้อยเมตร และดูเหมือนว่าจะพบได้ยากอย่างยิ่งที่ยี้มากกว่าสองหรือสามตัวจะเดินทางอยู่บนยานอวกาศลำเดียวกัน\n\nหากเราพบวัตถุที่หลงเหลือจากอารยธรรมของพวกเขามากพอ เราอาจสามารถระบุตำแหน่งระบบบ้านเกิดของพวกเขาได้"
 yuht_artifacts:0 "เก็บกู้สิ่งประดิษฐ์ยี้ไปแล้ว"
 yuht_homeworld_chain_title:0 "ระบบบ้านเกิดของยี้"
 yuht_homeworld_chain_desc:0 "เราได้ค้นพบตำแหน่งที่สาบสูญไปนานของระบบบ้านเกิดยี้แล้ว ต้องส่งคณะสำรวจไปที่นั่นโดยเร็วที่สุด ก่อนที่ผู้อื่นจะเปิดเผยความลับของพวกเขา!"
 first_league_chain_title:0 "จักรวรรดิแรกเริ่ม- ลีกแรก"
 first_league_chain_desc:0 "เราได้กู้คืนวัตถุโบราณจากลีกแรกพวกเขาเป็นสมาพันธ์ขนาดใหญ่ของเผ่าพันธุ์ต่างดาวที่อยู่ร่วมกันอย่างค่อนข้างสันติเมื่อราวสองล้านปีก่อน พรมแดนของลีกแรกอาจเคยขยายครอบคลุมพื้นที่สำคัญส่วนหนึ่งของกาแล็กซีก่อนจะล่มสลายในที่สุด\n\nหากเราพบวัตถุที่หลงเหลือจากอารยธรรมของพวกเขามากพอ เราอาจสามารถระบุตำแหน่งระบบบ้านเกิดของพวกเขาได้"
 first_league_artifacts:0 "เก็บกู้สิ่งประดิษฐ์ลีกแรกไปแล้ว"
 first_league_homeworld_chain_title:0 "ระบบเมืองหลวงของลีกแรก"
 first_league_homeworld_chain_desc:0 "เราได้ค้นพบตำแหน่งที่สาบสูญไปนานของระบบเมืองหลวงลีกแรกซึ่งเป็นที่ตั้งของวุฒิสภาใหญ่ของพวกเขาแล้ว ต้องส่งคณะสำรวจไปที่นั่นโดยเร็วที่สุด ก่อนที่ผู้อื่นจะเปิดเผยความลับของพวกเขา!"
 irassian_chain_title:0 "จักรวรรดิแรกเริ่ม- พวกอิรัก"
 irassian_chain_desc:0 "เราได้กู้คืนวัตถุโบราณจากคองคอร์ดพวกเขาเป็นมหาอำนาจระหว่างดวงดาวที่ครอบงำส่วนหนึ่งของกาแล็กซีเมื่อกว่าหนึ่งล้านปีก่อนเล็กน้อย ชาวอิหร่านซึ่งเป็นสัตว์เลี้ยงลูกด้วยนมหกแขนขามีระบบภูมิคุ้มกันที่อ่อนแอผิดปกติ ทำให้พวกเขาเปราะบางต่อโรคจากต่างดาวเป็นพิเศษ แหล่งข้อมูลบางแห่งอ้างว่าชาวอิหร่านสูญพันธุ์จากพ็อกซ์จาโวเรียนโรคระบาดร้ายแรงที่กวาดผ่านจักรวรรดิของพวกเขา\n\nหากเราพบวัตถุที่หลงเหลือจากอารยธรรมของพวกเขามากพอ เราอาจสามารถระบุตำแหน่งระบบบ้านเกิดของพวกเขาได้"
 irassian_artifacts:0 "เก็บกู้สิ่งประดิษฐ์อิหร่านไปแล้ว"
 irassian_homeworld_chain_title:0 "ระบบบ้านเกิดของอิหร่าน"
 irassian_homeworld_chain_desc:0 "เราได้ค้นพบตำแหน่งที่สาบสูญไปนานของระบบบ้านเกิดอิหร่านแล้ว ต้องส่งคณะสำรวจไปที่นั่นโดยเร็วที่สุด ก่อนที่ผู้อื่นจะเปิดเผยความลับของพวกเขา!"
 cybrex_chain_title:0 "จักรวรรดิแรกเริ่ม- ไซบริกซ์"
 cybrex_chain_desc:0 "เราได้กู้คืนวัตถุโบราณของไซเบรกซ์บน [From.GetName] พวกเขาเป็นจิตสำนึกจักรกลที่เชื่อมโยงถึงกันซึ่งเคยควบคุมส่วนนี้ของกาแล็กซีเมื่อราว 600,000 ปีก่อน ต้นกำเนิดและธรรมชาติที่แท้จริงของพวกเขายังคงปกคลุมด้วยความลึกลับ แต่เป็นที่ทราบกันว่าพวกเขาเปิดสงครามครูเสดต่อสิ่งมีชีวิตอินทรีย์ผู้มีสติปัญญาทั้งหมดเป็นเวลาหลายศตวรรษ และทิ้งผู้ตายไว้เป็นจำนวนมหาศาลระดับล้านล้าน\n\nหากเราพบวัตถุที่หลงเหลือจากอารยธรรมของพวกเขามากพอ เราอาจสามารถระบุตำแหน่งระบบบ้านเกิดของพวกเขาได้"
 cybrex_artifacts:0 "เก็บกู้สิ่งประดิษฐ์ไซเบรกซ์ไปแล้ว"
 cybrex_homeworld_chain_title:0 "ระบบบ้านเกิดของไซเบรกซ์"
 cybrex_homeworld_chain_desc:0 "เราได้ค้นพบตำแหน่งที่สาบสูญไปนานของระบบบ้านเกิดไซเบรกซ์แล้ว ต้องส่งคณะสำรวจไปที่นั่นโดยเร็วที่สุด ก่อนที่ผู้อื่นจะเปิดเผยความลับของพวกเขา!"
 sublight_probes_chain_title:0 "โพรบสำรวจความเร็วต่ำกว่าแสง"
 sublight_probes_chain_desc:0 "มีการส่งโพรบสำรวจความเร็วต่ำกว่าแสงหลายลำออกจาก [Root.Capital.GetName] ไปยังระบบข้างเคียง ก่อนที่เราจะเชี่ยวชาญการเดินทางแบบความเร็วเราต้องเก็บกู้พวกมันกลับมาก่อนที่จะตกไปอยู่ในมือของศัตรู"
 probes_recovered:0 "เก็บกู้โพรบแล้ว"
 survey_habitable_worlds_chain_title:0 "การสำรวจดาวที่สามารถอยู่อาศัยได้"
 survey_habitable_worlds_chain_desc:0 "นักชีววิทยาต่างดาวของเราเร่งให้เราสำรวจดาวต่างๆที่ยังมีชีวบริเวณ(ส่วนของพื้นผิวและบรรยากาศของดาวที่มีสิ่งมีชีวิตอาศัยอยู่) พวกเขากระตือรือร้นที่จะเรียนรู้เพิ่มเติมเกี่ยวกับระบบนิเวศของมนุษย์ต่างดาวอันหลากหลายที่พบได้ทั่วกาแล็กซี"
 habitable_worlds_surveyed:0 "สำรวจดาวที่สามารถอยู่อาศัยได้ไปแล้ว"
 specimen_procurement_chain_title:0 "การหาสิ่งมีชีวิตต่างดาว"
 specimen_procurement_chain_desc:0 "พิพิธภัณฑ์ชีววิทยานอกพิภพที่้ [Root.Capital.GetName] ได้ขอความช่วยเหลือ ในการรวบรวมตัวอย่างสิ่งมีชีวิต ต่างดาวหายากหลายแบบ ที่ถูกระบุบนดาวที่แตกต่างกัน"
 specimens_collected:0 "เก็บสิ่งมีชีวิตมาแล้ว"
 radical_cult_title:0 "[radical_cult.GetName]"
 radical_cult_desc:0 "สมาชิกของลัทธิหัวรุนแรงที่เรียกตัวเองว่า "[radical_cult.GetName]" กำลังพยายามบ่อนทำลายรัฐบาล ของเราและล้มล้างประชานิยมให้หันมานับถือศาสนาที่บิดเบี้ยวของพวกเขา หลังจากใช้เวลาหลายศตวรรษในการสร้างความแข็งแกร่งของพวกเขาที่[Root.Capital.GetName] ตอนนี้ผู้นำของพวกเขาได้หนีไปในอวกาศเพื่อทำสงครามศาสนากับพวกเราต่อไป"
 survey_home_system_title:0 "สำรวจระบบบ้านเกิด"
 survey_home_system_desc:0 "ก่อนจะออกเดินทางสู่ส่วนอื่นของกาแล็กซี เราควรสำรวจระบบ [home_system.GetName] ให้ครบถ้วน สนามหลังบ้านของเราเองต้องไม่ถูกปล่อยไว้โดยไม่ได้สำรวจ"
 establish_colony_title:0 "ตั้งอาณานิคมแห่งแรก"
 establish_colony_desc:0 "เผ่าพันธุ์ [This.GetSpeciesName] จำเป็นต้องขยายตัวออกไปไกลกว่า [This.Capital.GetName] เพื่อความอยู่รอดในระยะยาว จงตั้งอาณานิคมแห่งแรกของเราและปักธงของ [This.GetName] ลงบนพื้นผิวของโลกต่างดาว"
 first_colony:0 "ก่อตั้งอาณานิคมแห่งแรกแล้ว"
 asteroid_sighted_chain_title:0 "พบดาวเคราะห์น้อย"
 asteroid_sighted_chain_desc:0 "ตรวจพบดาวเคราะห์น้อยขนาดใหญ่กำลังอยู่ในวิถีชน [Root.GetName] ต้องทำลายมันก่อนที่มันจะกระแทกพื้นผิว!"
 asteroid_destroyed:0 "ทำลายดาวเคราะห์น้อยแล้ว"
 coming_storm_chain_title:0 "พายุที่กำลังมา"
 coming_storm_chain_desc:0 "ตรวจพบกลุ่มสัญญาณติดต่อใต้ห้วงอวกาศลึกลับกำลังเคลื่อนเข้าหากาแล็กซีของเรา ดูเหมือนว่าเรากำลังจะมีผู้มาเยือน..."
 prethoryn_scourge_chain_title:0 "หายนะแห่งห้วงว่าง"
 prethoryn_scourge_chain_desc:0 "กาแล็กซีของเราถูกบุกรุกโดยฝูงสิ่งมีชีวิตเดินทางอวกาศผู้หิวกระหาย ซึ่งดูตั้งใจจะเขมือบทุกชีวิตที่ขวางทางไว้ การอาละวาดของผู้รุกรานเบื้องต้นเหล่านี้ต้องถูกยับยั้งก่อนที่จำนวนของพวกมันจะท่วมท้นเรา"
 extradimensional_invasion_chain_title:1 "ดิ อันบิดเดน"
 extradimensional_invasion_chain_desc:0 "รอยฉีกขนาดมหึมาในผืนเนื้ออวกาศได้ปรากฏขึ้นในกาแล็กซีของเรา ทำหน้าที่เสมือนทางเชื่อมแบบทางเดียวระหว่างความเป็นจริงของเรากับอีกภพหนึ่ง ยานอวกาศพลังงานประหลาดกำลังหลั่งไหลผ่านประตูมิตินี้เข้ามา และดูเหมือนจะดูดพลังงานจากผู้เคราะห์ร้ายที่อยู่ในเส้นทางของพวกมันจนถึงแก่ชีวิต"
 star_power_chain_title:0 "สารดาวฤกษ์ผิดปกติ"
 star_power_chain_desc:0 "กำลังค้นหาต้นตอของค่ารังสีที่ผิดปกติ"
 hunting_hyacinth_title:0 "การตามหาไฮยาซินธ์"
 hunting_hyacinth_desc:0 "ยานมุม:ซึ่งเป็นยานพี่น้องของยานอาร์กที่พาบรรพชนของเรามายัง [Root.Capital.GetName] เดิมทีควรตามเรามาจากโลกเมื่อหนึ่งศตวรรษก่อน เราต้องค้นหาว่าเกิดอะไรขึ้นกับมัน"
 nomads_observation_chain_title:0 "ผู้เดินทางอวกาศประหลาด"
 nomads_observation_chain_desc:1 "เราตรวจพบว่ามนุษย์ต่างดาวประหลาดกลุ่มนี้ ซึ่งเรายังไม่อาจดักฟังการสื่อสารของพวกเขาได้ ได้ปรากฏตัวขึ้นภายในพรมแดนของเรา เนื่องจากเราไม่สามารถแปลภาษาของพวกเขาได้ เราจึงทำได้เพียงรอดูว่าพวกเขาเป็นใครและต้องการอะไร"
 shrouded_ship_chain_title:0 "ถูกเดอะชราวด์กลืน"
 shrouded_ship_chain_desc:0 "ยานลำหนึ่งของเราได้สูญหายไปในเดอะชราวด์"

