 refugees.1.name:0 "ผู้ลี้ภัย [Root.GetSpeciesName] มาถึงแล้ว"
 refugees.1.desc.1:0 "กองยานขนส่งพลเรือนที่บรรทุกผู้ลี้ภัย §Y[Root.GetSpeciesName]§! จาก §Y[RefugeeEscapedFrom.GetName]§! ได้มาถึงอวกาศของเราแล้ว พวกเขาได้รับอนุญาตให้ตั้งถิ่นฐานบน §H[Root.Planet.GetName]§!.\n\nผู้ถูกขับไล่อันน่าเวทนาเหล่านี้ถูกเจ้าหน้าที่ของ [RefugeeEscapedFrom.GetSpeciesName] ขับออกจากบ้านของตนโดยใช้กำลัง นับแต่นั้นมาพวกเขาต้องเดินทางจากระบบหนึ่งสู่อีกระบบหนึ่งอย่างสิ้นหวัง เพื่อหาบ้านใหม่ก่อนที่เสบียงอันร่อยหรอสุดท้ายจะหมดลง"
 refugees.1.desc.2:0 "กองยานพลเรือนขนาดเล็กที่เสียหายยับเยิน บรรทุกชาว §Y[Root.GetSpeciesNamePlural]§! ซึ่งกำลังหลบหนีจาก §Y[RefugeeEscapedFrom.GetName]§! ได้มาถึงอวกาศของเราแล้ว หลังจากที่เราได้จัดหาอาหารและให้การรักษาพยาบาลแก่ผู้บาดเจ็บ ผู้ลี้ภัยเหล่านี้ก็ได้รับอนุญาตให้ตั้งถิ่นฐานบน §H[Root.Planet.GetName]§!.\n\nผู้ลี้ภัยที่มอมแมมและหวาดกลัวเหล่านี้คือผู้รอดชีวิตจากโครงการกวาดล้างเผ่าพันธุ์ที่เจ้าหน้าที่ของ [RefugeeEscapedFrom.GetSpeciesName] กำลังดำเนินการกับเผ่าพันธุ์ของพวกเขา พวกเขารอดมาได้ก็เพราะความพยายามของเครือข่ายลับที่จัดตั้งขึ้นอย่างรีบเร่ง และกัปตันเรือพาณิชย์ผู้เห็นอกเห็นใจเพียงไม่กี่ราย"
 refugees.1.desc.2.b:0 "กองยานพลเรือนขนาดเล็กที่เสียหายยับเยิน บรรทุกชาว §Y[Root.GetSpeciesNamePlural]§! ซึ่งกำลังหลบหนีจาก §Y[RefugeeEscapedFrom.GetName]§! ได้มาถึงอวกาศของเราแล้ว หลังจากที่เราได้จัดหาอาหารและให้การรักษาพยาบาลแก่ผู้บาดเจ็บ ผู้ลี้ภัยเหล่านี้ก็ได้รับอนุญาตให้ตั้งถิ่นฐานบน §H[Root.Planet.GetName]§!.\n\nผู้ลี้ภัยที่มอมแมมและหวาดกลัวเหล่านี้คือผู้รอดชีวิตจากการโจมตีที่ดำเนินโดยจิตสำนึก [RefugeeEscapedFrom.GetSpeciesAdj] อันไร้ความปรานี พวกเขารอดออกมาได้เพราะการลอบขโมยยานอวกาศปลดประจำการหลายลำอย่างกล้าหาญจากอู่ทหารเรือเก่าแก่บนดาวของพวกเขา"
 refugees.1.desc.3:0 "กองยานพลเรือนขนาดเล็กที่เสียหายยับเยิน บรรทุกชาว §Y[Root.GetSpeciesNamePlural]§! ซึ่งกำลังหลบหนีจาก §Y[RefugeeEscapedFrom.GetName]§! ได้มาถึงอวกาศของเราแล้ว หลังจากที่เราได้จัดหาอาหารและให้การรักษาพยาบาลแก่ผู้บาดเจ็บ ผู้ลี้ภัยเหล่านี้ก็ได้รับอนุญาตให้ตั้งถิ่นฐานบน §H[Root.Planet.GetName]§!.\n\nผู้ลี้ภัยที่มอมแมมและหวาดกลัวเหล่านี้กำลังหนีจากความหายนะของ §H[RefugeeEscapedCrisis.GetName]§! ในอวกาศของ [RefugeeEscapedFrom.GetSpeciesName] พวกเขาแทบเอาชีวิตรอดออกมาจากดาวบ้านเกิด §H[RefugeeEscapedPlanet.GetName]§! ได้ก่อนที่การบุกโจมตีของ [RefugeeEscapedCrisis.GetSpeciesAdj] จะมาถึง ทิ้งทรัพย์สินส่วนใหญ่ไว้เบื้องหลังบนโลกที่ถึงกาลล่มสลายนั้น"
