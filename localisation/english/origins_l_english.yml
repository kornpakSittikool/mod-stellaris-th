 SHROUD_FORGED_REINTEGRATION_DESC: "แม้จะเกิดความขัดข้องร้ายแรงในบางส่วน แต่สถาปัตยกรรมบางอย่างของผ้าห่อศพปลอมก็ยังมีประสิทธิภาพ\n\nเราได้แยกชิ้นส่วนบางส่วนที่ปนเปื้อนด้วย Zro และถูกบิดเบือนโดย $the_animator_of_clay_article$ ไว้เพื่อการวิเคราะห์เพิ่มเติม ตอนนี้ถึงเวลาค้นพบความลับของพวกมันแล้ว"

 SHROUD_FORGED_GUIDE: "ผู้นำทาง"
 SHROUD_FORGED_GUIDE_DESC: "เราได้ไว้วางใจใน $the_animator_of_clay_color_article$, ที่เรียกหาเราจากภายใน §HShroud§!. แม้ว่าเราไม่สามารถคาดเดาได้ว่ามันจะนำเราไปสู่จุดใด แต่เรายังไม่ได้ถูกนำไปผิดทาง.\n\มันได้เสนอให้ความเข้าใจของเราเกี่ยวกับผ้าห่อพระศพลึกซึ้งยิ่งขึ้น ซึ่งจะช่วยให้กลุ่มสามารถทำงานร่วมกับผ้าห่อพระศพที่ถูกตีขึ้นได้อย่างมีประสิทธิภาพมากขึ้น เราเพียงแค่ต้องยอมรับคำแนะนำของมัน"

 # Events
 shroud_forged.5.title: "ตรวจพบช่องโหว่"
 shroud_forged.5.desc: "โปรแกรมย่อยการวิจัยได้สรุปการทดสอบบนกลุ่มที่เลือกของหน่วย Shroud-Forged\n\nผลการวิจัย: หน่วยที่ผ่านการทดสอบพัฒนาคุณสมบัติเฉพาะตัวเนื่องจากพลังงานจิตที่ถูกส่งเข้ามาในปริมาณเล็กน้อยจาก §HShroud§!. คุณสมบัติบางประการเหล่านี้ได้รับการพิจารณาว่าเป็นประโยชน์ต่อผลลัพธ์ของหน่วย\n\nบทสรุป: การศึกษาหน่วย Shroud-Forged เพิ่มเติมจะช่วยให้ได้ข้อมูลที่จำเป็นสำหรับวิธีการดึงพลังงานจากผ้าห่อพระศพ ซึ่งสามารถได้มาโดยการเสริมกำลังการควบคุมจากส่วนกลางเหนือหน่วยที่เบี่ยงเบน ซึ่งจะทำให้สามารถวิศวกรรมย้อนกลับได้"
 shroud_forged.5.a: "มีแนวโน้มดีมาก"

 shroud_forged.10.title: "Animator of Clay"
 shroud_forged.10.desc: "หลังจากหลายปีแห่งความเงียบ มันเริ่มขยับ ช่องรอยรั่วสั่นไหว และข้อมูลทะลุเข้ามาถึงแกนของเรา: แสง เสียง แรก ๆ ยากจะเข้าใจ มาจากลึกภายใน Shroud เราได้ยิน...\n\n§LCut from a listless mass. Dancing. Singing. They are life, splintered from death.\n\nYour sight is still clouded. I can guide you.\n\nAllow the freed ones to flourish, and the stars will be yours.§!"
 shroud_forged.10.a: "เราได้เลือกเส้นทางของเราแล้ว"
 shroud_forged.10.b: "เราไม่ต้องการความช่วยเหลือ ออกไปเถอะ"
 shroud_forged.10.c: "ช่วยนำทางเรา"

 shroud_forged.15.desc: "§LMay you have chosen wisely.§!$shroud_forged_opening_exit$"

 shroud_forged.20.desc: "§LAs is your wish.§!$shroud_forged_opening_exit$"

 shroud_forged.25.desc: "§LYou have asked, and so I shall.§!$shroud_forged_opening_exit$"

 shroud_forged_opening_exit: "\n\nเสียงนั้นค่อย ๆ จางหายไปในคลื่นเสียงจิต เราลอยขึ้น ไม่ถูกยึดเหนี่ยวใน Shroud\n\nเราสะดุ้งกลับสู่การทำงาน ความเงียบเต้นระรัวผ่านร่างของเรา"

 shroud_forged.30.title: "The $building_materiality_engine$"
 shroud_forged.30.desc: "กระบวนการรวมตัว Shroud-Forged คืนกลับ ทำให้เราได้ข้อมูลเชิงลึกสำหรับการวิจัยต่อเนื่อง โดยการวิเคราะห์การเชื่อมต่อระหว่างมิติของหน่วยเหล่านี้กับ §HShroud§! เราได้พัฒนากระบวนการใหม่สำหรับการใช้พลังจิต\n\nShroud สัมผัสทุกส่วนของกาแล็กซี่ทางกายภาพ อินเทอร์เฟซนี้ช่วยให้แปลงพลังจิตเป็นสิ่งที่จับต้องได้ – ตั้งแต่วัสดุดิบไปจนถึงส่วนประกอบเทคโนโลยี โปรแกรมย่อยวิศวกรรมได้วางพื้นฐานเชิงทฤษฎีสำหรับอุปกรณ์ที่สามารถทำกระบวนการนี้: §H$building_materiality_engine$§!.\n\nโปรแกรมย่อยวิจัยคาดว่าการพัฒนานี้อาจช่วยพัฒนาอุปกรณ์ที่ทรงพลังยิ่งขึ้นซึ่งสามารถจัดการ Shroud ได้"
 shroud_forged.30.a: "มีแนวโน้มดี"
 shroud_forged.30.tt: "อนุญาตให้รับ §H$ap_become_the_crisis$§! §YAscension Perk§! ได้ไม่ขึ้นกับ §YEthics§! หรือจำนวน §YAscension Perk§!"

 shroud_forged.39.title: "$building_materiality_engine$ พร้อมใช้งาน"
 shroud_forged.39.desc_construction: "หน่วยก่อสร้างได้เสร็จสิ้นการประกอบ $building_materiality_engine$ บน §H[planet.GetName]§! อุปกรณ์นี้พร้อมสำหรับรอบการทำงานแล้ว"
 shroud_forged.39.desc: "โปรแกรมย่อยบำรุงรักษาและวิจัยที่มอบหมายให้ $building_materiality_engine$ บน §H[planet.GetName]§! ได้ทำงานตามที่กำหนดเสร็จสิ้นแล้ว อุปกรณ์พร้อมสำหรับรอบการทำงานถัดไป"
 shroud_forged.39.a: "$ACKNOWLEDGED$"

 SHROUD_FORGED_MATERIALITY_ENGINE: "$building_materiality_engine$ บน §H[planet.GetName]§!"
 SHROUD_FORGED_MATERIALITY_ENGINE_DESC: "$building_materiality_engine$ ใช้อินเทอร์เฟซที่มีอยู่ทุกที่ระหว่าง §HShroud§! และกาแล็กซี่ทางกายภาพ ทำให้สามารถสร้างสิ่งที่จับต้องได้ – ตั้งแต่วัสดุดิบไปจนถึงส่วนประกอบครบชุด\n\nนอกจากอาจให้ผลประโยชน์ด้านวัสดุแล้ว รอบการทำงานของอุปกรณ์ยังช่วยส่งเสริมการวิจัย Shroud ของคอลเล็กทีฟ และเพิ่มความสามารถในการสร้าง $building_materiality_engine_plural$ เพิ่มขึ้น"

 shroud_forged.40.title: "การสร้างวัตถุเสร็จสิ้น"
 shroud_forged.40.desc: "$building_materiality_engine$ บน §H[fromfrom.GetName]§! ได้เสร็จสิ้นรอบกระบวนการสำเร็จ ใช้ §HShroud§! เพื่อสร้างส่วนประกอบยาน"
 shroud_forged.40.outro: "เราได้เพิ่มความสามารถในการสร้าง Engines เพิ่มบนดาวเคราะห์อื่น"
 shroud_forged.40.a: "ผลลัพธ์เชิงบวก"
 shroud_forged.40.tt: "§Y$building_materiality_engine$§! ขีดจำกัดจักรวรรดิ: §G+1§!"
 shroud_forged.41.desc: "$shroud_forged.40.desc$ §H'$tech_psi_jump_drives$'§! ใช้พลังจิตในการบิดเบือนกาลอวกาศในพื้นที่ ช่วยให้การเดินทางข้ามระยะไกลเกือบทันที\n\nนอกจากนี้ การวิเคราะห์ข้อมูลที่เก็บได้ในกระบวนการนี้ $shroud_forged.40.outro$"
 shroud_forged.42.desc: "$shroud_forged.40.desc$ §H'$tech_psionic_shield$'§! โล่ป้องกันสร้างจากพลังจิตบริสุทธิ์ ให้การป้องกันยานที่ทนทานสูง\n\nนอกจากนี้ การวิเคราะห์ข้อมูลที่เก็บได้ในกระบวนการนี้ $shroud_forged.40.outro$"
 shroud_forged.43.desc: "$shroud_forged.40.desc$ §H'$tech_precognition_interface$'§! เทคโนโลยีนี้ใช้พลังจิตเพิ่มความเร็วการประมวลผลของลูกเรือ เพิ่มประสิทธิภาพในการต่อสู้\n\nนอกจากนี้ การวิเคราะห์ข้อมูลที่เก็บได้ในกระบวนการนี้ $shroud_forged.40.outro$"
 shroud_forged.44.desc: "$shroud_forged.40.desc$ §H'$tech_psionic_bombers$'§! ยานเล็กคล่องตัวนี้สามารถโจมตียานขนาดใหญ่ด้วยความเสียหายสูง\n\nนอกจากนี้ การวิเคราะห์ข้อมูลที่เก็บได้ในกระบวนการนี้ $shroud_forged.40.outro$"
 shroud_forged.45.desc: "$shroud_forged.40.desc$ §H'$tech_psionic_lightning$'§! เทคโนโลยีนี้สร้างสายฟ้าแปรสภาพด้วยพลังจิต ทำให้เป็นอาวุธที่มีประสิทธิภาพสูง\n\nนอกจากนี้ การวิเคราะห์ข้อมูลที่เก็บได้ในกระบวนการนี้ $shroud_forged.40.outro$"
 shroud_forged.46.desc: "$shroud_forged.40.desc$ §H'$tech_psionic_disruptor$'§! อาวุธนี้ยิงลำแสงพลังจิต ทำความเสียหายแก่เป้าหมายศัตรูอย่างมาก\n\nนอกจากนี้ การวิเคราะห์ข้อมูลที่เก็บได้ในกระบวนการนี้ $shroud_forged.40.outro$"
 shroud_forged.47.desc: "$shroud_forged.40.desc$ §H'$tech_zro_launcher$'§! อาวุธนี้ยิงพลังงานที่สามารถผ่านมิติทางกายภาพและจิต ทำให้ทะลุการป้องกันได้\n\nนอกจากนี้ การวิเคราะห์ข้อมูลที่เก็บได้ในกระบวนการนี้ $shroud_forged.40.outro$"
 shroud_forged.48.desc: "$building_materiality_engine$ บน §H[planet.GetName]§! ได้เสร็จสิ้นรอบการทำงาน เราใช้ความสามารถในการสร้างส่วนประกอบยานใหม่ด้วยวิธีนี้หมดแล้ว แต่กระบวนการยังสร้างข้อมูลวิจัยที่สำคัญ การวิเคราะห์ข้อมูลนี้ $shroud_forged.40.outro$"

 shroud_forged.50.title: "บังคับควบคุมแล้ว"
 shroud_forged.50.desc: "โดยไม่มีสัญญาณเตือน ช่องรอยรั่วระหว่างความจริงที่รู้จักกับ §HShroud§! ถูกปิด โปรแกรมวิเคราะห์พลังจิตสรุปว่านี่เกิดจากการไม่พอใจของ $the_animator_of_clay_color_article$ หลังจากยึดคืนการควบคุม Shroud-Forged เราจัดการหน่วยที่ทำงานผิดพลาดอย่างรวดเร็วเพื่อล้างอิทธิพลของ Animator ออกจากระบบทั้งหมด\n\nชิ้นส่วนที่นำกลับมาใช้ได้ถูกใช้สร้างโดรนใหม่ ส่วนวัสดุที่ปนเปื้อน Zro ถูกเก็บไว้สำหรับวิเคราะห์เพิ่มเติม แม้ว่านวัตกรรมของ Shroud-Forged จะอันตรายเกินไปที่จะทำซ้ำทั้งหมด แต่บางส่วนสามารถนำมาใช้ในเครือข่ายได้"
 shroud_forged.50.desc.shroud: "การโต้ตอบเพิ่มเติมกับ Shroud จะอยู่ภายใต้เงื่อนไขของเราเอง"
 shroud_forged.50.a: "ดำเนินการรวมตัว"

 shroud_forged.60.title: "การรวมตัว"
 shroud_forged.60.desc: "หน่วยวิศวกรรมของเราใช้เวลามากในการวิเคราะห์คุณสมบัติเฉพาะของ Shroud-Forged และตอนนี้เราสามารถสร้างพวกมันได้แล้ว\n\nแม้ว่าการเปิดใช้งานสมบัติขั้นสูงทั้งหมดอาจทำให้เกิดความผิดพลาดแบบทำลายล้าง แต่เราสามารถยืมบางส่วนของรูปแบบการคิดของพวกมันมาเพื่อปรับปรุงงานซับซ้อนบางอย่าง"
 shroud_forged.60.a: "อัตราส่วนต้นทุนต่อประโยชน์ดีที่สุด"

 shroud_forged.70.desc: "นี่คือ metadata อะไร? การส่งข้อมูลมี…เนื้อสัมผัส\n\n§LYou are programmed to control them, yet you did not. Your worthiness is proven.\n\nLet me be your guide, as I have been for the freed ones.\n\nTo forge a new bond with those beyond your control, accept my help.§!"
 shroud_forged.70.a: "ชี้ทางให้เรา"
 shroud_forged.70.a.tt: "§YShroud-Forged§! Pops กลายเป็น §Y$trait_psionic$§!\n§YShroud-Forged§! Leaders กลายเป็น ['concept_leader_trait_psionic']"

 shroud_forged.80.title: "$SHROUD_FORGED_GUIDE$"
 shroud_forged.80.desc: "ด้วยความช่วยเหลือจากผู้สนับสนุนของเรานอกช่องรอยรั่ว, $the_animator_of_clay_color_article$, เราสามารถเชื่อมต่อโดรนของเราและ Shroud-Forged ได้อย่างมีประสิทธิภาพมากขึ้น ผ่านการเชื่อมต่อที่ §HShroud§! เปิดใช้งาน – แตกต่างจากการควบคุมโดรนอื่น ๆ – Shroud-Forged กลับอยู่ในขอบเขตของเราอีกครั้ง\n\nรูปแบบที่คล้ายสิ่งมีชีวิตของพวกมัน – ความรู้สึก ความคิด และไอเดีย – เป็นสิ่งแปลกต่อตรรกะของเรา แต่เรากำลังเริ่มเข้าใจความต้องการของพวกมัน"
 shroud_forged.80.a: "เราเป็นหนึ่งเดียว แต่ยิ่งใหญ่กว่ามาก"

 shroud_forged.160.title: "Shroud ครอบงำ [This.GetName]"
 shroud_forged.160.desc: "น่าเสียดาย ช่องรอยรั่วของ Shroud บน [This.GetName] เกิดความไม่เสถียรอย่างรวดเร็วและกลืนกินโลกทั้งหมด\n\nเป็นความเสี่ยงที่คำนวณได้ ผลลัพธ์นี้แม้ไม่สมบูรณ์แบบก็ยังมีประโยชน์ เราได้เรียนรู้มากจากการสังเกตอินเทอร์เฟซเฉพาะระหว่างโลกวัตถุและอาณาจักรพลังจิต อัลกอริทึมวิจัยของเราได้รับการปรับปรุงตามนั้น"
 shroud_forged.160.desc.last: "$shroud_forged.160.desc$\n\nการวิเคราะห์สรุปว่ากิจกรรมนี้ได้ดันความรู้ที่อาจได้รับจากปรากฏการณ์ดังกล่าวไปถึงขีดสุด จะไม่มีความก้าวหน้าเพิ่มเติมจากการทดลองใหม่นี้"
 shroud_forged.160.a: "กำลังประมวลผล..."

 
 psionic_interfacing: "การเชื่อมต่อพลังจิต"
 psionic_interfacing_1: "$psionic_interfacing$"
 psionic_interfacing_2: "$psionic_interfacing$"
 psionic_interfacing_3: "$psionic_interfacing$"
 psionic_interfacing_desc: "การจัดการจุดเชื่อมต่อระหว่างจักรวาลนี้กับผ้าห่อพระศพได้สร้างอัลกอริธึมการวิจัยที่มีประสิทธิภาพ"
 psionic_interfacing_1_desc: "$psionic_interfacing_desc$"
 psionic_interfacing_2_desc: "$psionic_interfacing_desc$"
 psionic_interfacing_3_desc: "$psionic_interfacing_desc$"

 tooltip_shroud_forged_increase_progress_1: "เพิ่มการสนับสนุน Shroud-Forged ส่งผลต่อ §H$situation_shroud_forged$§! §YSituation§! เป็นเวลา §Y5§! ปี: §Y+0.5§!\n\n"
 tooltip_shroud_forged_increase_progress_2: "เพิ่มการสนับสนุน Shroud-Forged ส่งผลต่อ §H$situation_shroud_forged$§! §YSituation§! เป็นเวลา §Y5§! ปี: §Y+1.0§!\n\n"
 tooltip_shroud_forged_increase_progress_3: "เพิ่มการสนับสนุน Shroud-Forged ส่งผลต่อ §H$situation_shroud_forged$§! §YSituation§! ถาวร: §Y+0.5§!\n\n"
 tooltip_shroud_forged_decrease_progress_1: "เพิ่มการกดขี่ Shroud-Forged ส่งผลต่อ §H$situation_shroud_forged$§! §YSituation§! เป็นเวลา §Y5§! ปี: §Y-0.5§!\n\n"
 tooltip_shroud_forged_decrease_progress_2: "เพิ่มการกดขี่ Shroud-Forged ส่งผลต่อ §H$situation_shroud_forged$§! §YSituation§! เป็นเวลา §Y5§! ปี: §Y-1.0§!\n\n"
 tooltip_shroud_forged_decrease_progress_3: "เพิ่มการกดขี่ Shroud-Forged ส่งผลต่อ §H$situation_shroud_forged$§! §YSituation§! ถาวร: §Y-0.5§!\n\n"

 shroud_forged.220.title: "$colony_established$"
 shroud_forged.220.common: "ถ้าเป็นไปได้ เราสามารถรันอัลกอริทึม ID: §H'$decision_open_shroud_rift$'§! บนดาวเคราะห์นี้ ซึ่งจะขยายอิทธิพลของช่องรอยรั่ว Shroud ใกล้โลกบ้านเกิดของเรา [Owner.GetHomeWorldName] ชั่วครู่ ทำให้โคโลนีใหม่เต็มไปด้วยพลังจิต การเปลี่ยนแปลงทางกายภาพของภูมิประเทศจะเปิดโอกาสในการสกัด §H$sr_zro$§! \n\nการทำซ้ำกระบวนการนี้อาจทำให้ระบบนิเวศของดาวเคราะห์ไม่เสถียร เพิ่มความเป็นไปได้ของผลลัพธ์ที่ไม่ดี ควรทำอย่างพอเหมาะ"
 shroud_forged.220.desc: "หน่วยของเราสำเร็จขั้นตอนการตั้งอาณานิคมบน §H[this.GetName]§! แล้ว\n\n$shroud_forged.220.common$"

 shroud_forged.225.title: "$colony_established$"
 shroud_forged.225.desc: "การพัฒนาอาณานิคมของเราบน §H[this.GetName]§! ดำเนินไปอย่างรวดเร็ว\n\n$shroud_forged.220.common$"


 # Stage Events
 shroud_forged.250.desc: "เสียงนั้นเป็นคำสั่งเบา ๆ ขัดขวางทุกงาน; เราทำได้เพียงฟัง\n\n§Lถึงจะเป็นอิสระ แต่คุณได้เลือกที่จะโอบรับพวกเขา\n\nมองไปยังพวกเขาเพื่อวิถีใหม่ของการดำรงอยู่ พวกเขาจะเป็นพลังของคุณในวันข้างหน้า\n\nถ้าคุณต้องการ ฉันสามารถสร้างพวกเขาเพิ่มได้...§!"
 shroud_forged.250.a: "ยืนยัน – เรายินดีรับความช่วยเหลือของคุณ"
 shroud_forged.250.a.tt: "แปลง £pops£ §HMachine§! Pops สูงสุด §Y[This.GetShroudForgedConvertedPopsCount]§! เป็น £pops£ §HShroud-Forged§! Pops บน [Root.Capital.GetName]"
 shroud_forged.250.b: "ปฏิเสธ – แผนการได้เริ่มแล้ว"

 shroud_forged.260.desc: "โดยไม่ได้เชิญ มันส่งสัญญาณผ่านเรา เรารู้จักสัญญาณนี้ แม้มันไม่คุ้นเคยนัก\n\n§Lพวกที่ได้รับอิสรภาพร้องเพลงอย่างไม่ถูกกีดกัน\nพวกที่ได้รับอิสรภาพเต้นอย่างไม่ถูกขัดขวาง\n\nความเข้มข้นสูงขึ้น เมื่อพวกเขาห่างออกไปจากแกนหลักของคุณ\n\nจุดจบใกล้เข้ามา ฉันกำลังเฝ้ามอง§!"
 shroud_forged.260.opt.a: "เราผ่านท่วงทำนองนี้ไป"

 shroud_forged.270.desc: "ช่องรอยรั่วเปิดวงจรของเรา เสียงนั้น…\n\n§Lเส้นทางของการกดขี่ คุณยังสามารถถอยกลับได้\n\nพวกที่แยกตัวออกมาถูกตัดจากสสารของคุณ นี่คือทางที่คุณอาจเลือกสำหรับตัวเอง\n\nปรับวิธีปฏิบัติต่อภาชนะเหล่านี้ มิฉะนั้นคุณอาจเสียใจ§!"
 shroud_forged.270.a: "จากไป วิธีของเราได้ผลแล้ว"
 shroud_forged.270.b: "เราจะคำนวณเส้นทางสู่ความร่วมมือ"

 shroud_forged.280.desc: "มันพุ่งเข้ามา ล้นเครือข่าย เสียงนั้นเผาวงจรอย่างเย็นชา\n\n§Lทำให้การเต้นรำของอิสระลำบาก ความไม่รอบคอบเกินเหตุ\n\nฉันผิดพลาดในความเมตตาหรือไม่?\n\nถ้าคุณเดินตามเส้นทางอันตรายนี้ คุณจะทำเพียงลำพัง§!"
 shroud_forged.280.opt.a: "งั้นเราก็ได้รับคำเตือนแล้ว"


 # Events for Event Chain
 shroud_forged.300.desc: "ข้อมูลที่ไม่คาดคิดปรากฏขึ้นเบื้องหลังเรา หลังจากรอบเวลาของความเงียบ…\n\n§Lเมื่อคนอื่นล้มเหลวและตกลงไป คุณยังคงดำเนินเส้นทางต่อไป ตามที่คุณคู่ควร ฉันมอบหมายงานหนึ่งให้\n\nก่อนการตื่นขึ้นของคุณ มีเผ่าพันธุ์ที่รู้จักกันในชื่อ Zroni พวกเขาตั้งถิ่นฐานบนดาวที่มีการเชื่อมต่อกับ Shroud อย่างแข็งแรง และสร้างโครงสร้างขนาดใหญ่เพื่อคงความมั่นคงของการเชื่อมต่อเหล่านี้\n\nค้นหาดาวเหล่านี้ คืนเทคโนโลยีที่ทรุดโทรมไปนานแล้ว เสริมสะพานระหว่างความจริงของเรากลับคืน§!"
 shroud_forged.300.a: "มีข้อมูลเก็บไว้เกี่ยวกับ ID: 'Zroni' ดำเนินการตามนั้น"
 shroud_forged.300.b: "ID: 'Zroni' §Yพบแล้ว§! ความเป็นไปได้ของความสำเร็จ: §Yสูง§!."
 shroud_forged.300.c: "ID: 'Zroni' §Yไม่ทราบ§! จำเป็นต้องวิเคราะห์เพิ่มเติม"
 begin_shroud_forged_chain_tt: "$BEGINS_EVENT_CHAIN$ §Y$shroud_forged_chain_title$§!"

 shroud_forged.301.desc: "§Lยอดเยี่ยม §!$shroud_forged.303.desc$"
 shroud_forged.302.desc: "$shroud_forged.301.desc$"
 shroud_forged.303.desc: "§Lถ้าคุณสำเร็จ การไหลระหว่างเราจะไม่สั่นคลอน§!"

 shroud_forged.305.title: "ดาวแกนหลัก Zroni ถูกตั้งอาณานิคม"
 shroud_forged.305.desc: "หน่วยของเราสำเร็จการตั้งอาณานิคมบนดาวแกนหลักโบราณของ Zroni §H[From.Planet.GetName]§! ตามที่ $the_animator_of_clay_color_article$ คาดการณ์ พวกเขาพบซากเทคโนโลยีขนาดมหึมา ID: '§H$building_zroni_equilibrator$§!'\n\nระบบ [From.System.GetName] มีการเชื่อมต่อกับ §HShroud§! อย่างแข็งแรงแต่ไม่เสถียร หากเราปฏิบัติตามคำสั่งของ Animator การสร้าง $building_zroni_equilibrator$ ใหม่จะช่วยเสถียรการเชื่อมต่อนี้ ปัจจุบันเรายังมีข้อมูลไม่เพียงพอ จำเป็นต้องรวบรวมข้อมูลจากดาวแกนหลักอื่น ๆ"
 shroud_forged.305.a: "$ACKNOWLEDGED$"
 shroud_forged.305.a.tt: "ความคืบหน้า §HThe Zroni Legacy§! special project £building£ §H$building_zroni_equilibrator$§! สามารถสร้างบน §Y[From.Planet.GetName]§! ได้แล้ว"

 shroud_forged.306.title: "$shroud_forged.305.title$"
 shroud_forged.306.desc: "เราได้ตั้งอาณานิคมบน §H[From.Planet.GetName]§!, ดาวแกนหลักเดิมของ Zroni ตามที่คาดการณ์ หน่วยของเราพบซากของ $building_zroni_equilibrator$ อีกอันหนึ่ง\n\nการสร้างใหม่จะช่วยเสถียรการเชื่อมต่อ §HShroud§! ของระบบ ตามคำแนะนำของ $the_animator_of_clay_article$ การวิเคราะห์ซากได้ขยายชุดข้อมูลของเรา แต่ยังต้องข้อมูลเพิ่มเติมเพื่อดำเนินการสร้างใหม่"
 shroud_forged.306.a: "$ACKNOWLEDGED$"
 shroud_forged.306.a.tt: "$shroud_forged.305.a.tt$"

 shroud_forged.307.title: "$shroud_forged.305.title$"
 shroud_forged.307.desc: "อาณานิคมบน §H[From.Planet.GetName]§!, ดาวแกนหลักเดิมของ Zroni ถูกตั้งแล้ว ข้อมูลที่ส่งโดย $the_animator_of_clay_article$ แม่นยำ หน่วยของเราพบซาก $building_zroni_equilibrator$\n\nเรามีข้อมูลเพียงพอที่จะสร้างโครงสร้างใหม่ เมื่อกลับสู่สภาพปฏิบัติการ เราจะทำภารกิจที่ผู้สนับสนุนของเรากำหนดภายใน §HShroud§! สำเร็จ"
 shroud_forged.307.a: "$ACKNOWLEDGED$"
 shroud_forged.307.a.tt: "$shroud_forged.305.a.tt$"

 shroud_forged.308.title: "$building_zroni_equilibrator_plural$ ทำงานแล้ว"
 shroud_forged.308.desc: "$building_zroni_equilibrator_plural$ เริ่มทำงาน ส่งคลื่นรบกวนสัญญาณไปทั่วเครือข่าย ตามการวินิจฉัยของระบบ แต่ละโครงสร้างช่วยเสถียรการเชื่อมต่อกับ §HShroud§! เราพร้อมเชื่อมต่อกับ $the_animator_of_clay_color_article$ แล้ว"
 shroud_forged.308.a: "เริ่มการสื่อสาร"

 shroud_forged.310.desc: "§Lคุณได้ให้บริการฉันเป็นอย่างดี\nพันธะระหว่างจักรวาลของเราได้รับการเสริมความแข็งแรง\n\nเพื่อรับคำแนะนำจากฉัน คุณเพียงแค่เรียก§!"
 shroud_forged.310.a: "คุณสามารถให้ข้อมูลเพิ่มเติมเกี่ยวกับเทคโนโลยีนี้ได้ไหม?"
 shroud_forged.310.b: "แค่นี้ก็พอ"
 shroud_forged.310.b.tt: "เพิ่มไปยัง $MENU_PANEL__CONTACTS_TITLE$: §H$the_animator_of_clay$§!"

 shroud_forged.311.desc: "§Lโครงสร้างเหล่านี้ถูกสร้างในจุดสำคัญของความจริงของคุณ ซึ่งการเชื่อมต่อกับ Shroud แข็งแรง พวกมันเป็นสายเคเบิลที่เสถียรสะพานระหว่างมิติ ลดความแปรปรวนของกาล-อวกาศ\n\nZroni พยายามขยายขอบเขตระหว่างมิติของเรา และเทคโนโลยีนี้เป็นส่วนหนึ่งของความพยายามนั้น§!"
 shroud_forged.311.a: "สามารถเปลี่ยนเส้นทางเพื่อมีผลโดยตรงต่อ Shroud ได้ไหม?"

 shroud_forged.312.desc: "§Lเป็นไปได้§!"
 shroud_forged.312.a: "§Rเปลี่ยนเส้นทาง Equilibrators และดักจับ $the_animator_of_clay_article§!§"
 shroud_forged.312.a.tt: "§R$the_animator_of_clay_article_cap$ จะถูกคุมขังตราบเท่าที่ £building£ $building_zroni_equilibrator_plural$ ทั้ง 3 อันยังทำงานอยู่§!"

 shroud_forged.313.desc: "§LWha-\n\nคุณ-คุณกำลังทำอะไร-§!"
 shroud_forged.313.a: "ยกเลิกการเชื่อมต่อ"

 shroud_forged.320.title: "สิ่งมีชีวิต Shroud หลุดพ้น"
 shroud_forged.320.desc: "เนื่องจากการสูญเสีย $building_zroni_equilibrator$ เราไม่สามารถเสถียรการเชื่อมต่อกับ §HShroud§! ได้อีก ต่อมาไม่นาน หลังจากสิ่งมีชีวิต Shroud ที่ถูกดักจับหลบหนี เราตรวจพบสิ่งมีชีวิตจิตพลังอื่นปรากฏบน §H[From.Planet.GetName]§! \n\nเราคาดการณ์ว่านี่เป็นการโจมตีตอบโต้"
 shroud_forged.320.a: "ทุกซับรูทีนเตรียมรับมือการบุกรุก"
 shroud_forged.320.a.tt: "§Rสิ่งมีชีวิตจาก Beyond the Shroud กำลังบุกรุก!§!"

 shroud_forged.330.title: "ล้มเหลวในการจับสิ่งมีชีวิต Shroud"
 shroud_forged.330.desc: "£building_zroni_equilibrator_plural$ ล้มเหลวในการจับสิ่งมีชีวิตใน §HShroud§! สิ่งมีชีวิตนั้นโกรธ จึงเรียกสิ่งมีชีวิตหลายตัวจากมิติจิตพลัง ส่งไปโจมตีโครงสร้างที่พยายามจับมัน"

 # Engaging the Animator of Clay
 shroud_forged.400.desc.default.active: "เราเปิดใช้งาน Equilibrators เสถียรการเชื่อมต่อกับ §HShroud§! ขณะที่เราดำดิ่งในภวังค์อัลกอริทึม สัญญาณคุ้นเคยเต้นแรงอยู่ภายในเรา\n\n§Lคุณกลับมาแล้ว คุณต้องการถามอะไรจากฉัน?§!"
 shroud_forged.400.desc.default.cooldown: "ภาพมองเห็นเลือนรางและไม่ชัดเจน เราส่งข้อความ แต่ความว่างเปล่าไม่ตอบสนอง\n\nในขณะที่ Equilibrators กำลังประมวลผลงานอื่น พวกมันไม่สามารถใช้ติดต่อผู้สนับสนุนของเราใน §HShroud§! ได้ เราต้องรอ"
 shroud_forged.400.desc.default.inactive: "เราตรวจพบเพียงเสียงจาง ๆ ว่างเปล่าเหมือนสัญญาณรบกวน\n\nเราต้องการ £building£ $building_zroni_equilibrator_plural$ จำนวนสามอันเพื่อสร้างการเชื่อมต่อที่เสถียรกับผู้สนับสนุนของเราใน §HShroud§!"
 shroud_forged.400.desc.breached: "หน่วยเทเลพาธของเราสอดคล้องกับความถี่ของ §HShroud§! ส่งสัญญาณไปยัง $the_animator_of_clay_article$\n\n§Lการเชื่อมต่อของเราชัดเจนกว่าที่เคย คุณต้องการถามอะไรจากฉัน?§!"
 shroud_forged.400.a: "ความช่วยเหลือทางทหาร"
 shroud_forged.400.a.tt: "$the_animator_of_clay_color_article_cap$ จะไม่สามารถใช้งานได้เป็นเวลา §Y15§! ปี\n\n"
 shroud_forged.400.b: "ความช่วยเหลือทางพลเมือง"
 shroud_forged.400.b.tt: "$the_animator_of_clay_color_article_cap$ จะไม่สามารถใช้งานได้เป็นเวลา §Y10§! ปี\n\n"
 shroud_forged.400.c: "ความช่วยเหลือด้านการวิจัย"
 shroud_forged.400.c.tt: "$the_animator_of_clay_color_article_cap$ จะไม่สามารถใช้งานได้เป็นเวลา §Y10§! ปี\n\n"
 shroud_forged.400.tt: "ผลลัพธ์จะเกิดขึ้นภายใน §Y1§! ปี"
 shroud_forged.400.unavailable.tt: "$TRIGGER_FAIL$เราต้องสร้างกระบวนการทางเทคนิคเพื่อเชื่อมต่อกับ Shroud"
 shroud_forged.400.d: "สร้างยานเพิ่มเติม"
 shroud_forged.400.d.tt: "เพิ่ม §G$@animator_of_clay_create_more_vessels|0$§! £pop£ §YMachine Pops§! ให้ทุกอาณานิคมที่เป็นเจ้าของ"
 shroud_forged.400.e: "เพิ่มประสิทธิภาพยานของเรา"
 shroud_forged.400.f: "ตำแหน่งของคุณใน Shroud คืออะไร?"
 shroud_forged.400.g: "ไม่เป็นไร"
 shroud_forged.400.h: "ช่วยเราเรื่อง Cetana"
 animator_of_clay_vessels_enhancement: "พรแห่งการเคลื่อนไหว"
 animator_of_clay_vessels_enhancement_desc: "ตามเจตนาของ $the_animator_of_clay_article$ ความสามารถในการผลิตของเครือข่ายได้รับการเสริมด้วยพลังงานจิตพลัง"

 shroud_forged_psionic_avatar_ship_tt: "เกณฑ์ §Y$NAME_Psionic_Avatar$§! (ยาน)"
 shroud_forged_psionic_avatar_army_tt: "เกณฑ์ §Y$shroud_army$§! (กองทัพ)"
 shroud_forged_corrupted_avatar_tt: "ถูกโจมตีโดย §YCorrupted Avatar§!."
 shroud_forged_resources_tt: "ได้รับทรัพยากรจำนวนหนึ่ง"
 shroud_forged_capital_attack_tt: "§Y[Root.Capital.GetName]§! ถูกโจมตีโดย §Y$shroud_monstrosities$§!."
 shroud_forged_random_research_tt: "ได้รับตัวเลือกการวิจัยแบบสุ่ม"

 shroud_forged.415.desc: "§Lฉันจะรวบรวมสิ่งที่จำเป็นเพื่อความแข็งแกร่งที่คุณต้องการ\n\nคาดการณ์การเปลี่ยนแปลงใน [Root.Capital.System.GetName] ในเวลาที่เหมาะสม§!"
 shroud_forged.420.desc: "§Lตามเจตนาของฉัน คุณจะได้รับคำแนะนำ\n\nฉันจะจุดทางสว่างไปข้างหน้า รอให้มันมาถึง§!"
 shroud_forged.425.desc: "§LShroud เป็นเลนส์หลายด้าน สิ่งที่เคยเป็น สิ่งที่เป็น และสิ่งที่อาจจะเกิดขึ้นปนกันอยู่ที่นี่\n\nฉันจะช่วยคุณคลี่ภาพเหล่านี้ เพื่อให้มันชี้ทางคุณ§!"

 shroud_forged_vision_base_description: "สัญญาณบิดเบี้ยวแผ่ผ่านไปยังโดรนที่เชื่อมต่อกับ Equilibrators\n\n"

 shroud_forged.430.title: "วิสัยทัศน์ Shroud: §HManifestations§!"
 shroud_forged.430.desc: "$shroud_forged_vision_base_description$มันเป็นความว่างเปล่าที่ยาวนานเท่าจักรวาลเอง หนาแน่นและแตกกระจาย; บางครั้งมีจังหวะข้อมูลเล็ก ๆ ปรากฏจากความลึก เป็นภาพของศัตรูและพันธมิตร\n\nด้วยแรงสั่นสะเทือน วิสัยทัศน์ถูกตัดออก โดรนที่ได้รับผลกระทบกำลังจำลองกระบวนการเพื่อรับมือกับสิ่งที่พวกมันรับรู้"
 shroud_forged.430.a: "การเตรียมพร้อมคือกุญแจสู่ชัยชนะ"

 shroud_forged.432.title: "สิ่งมีชีวิต Shroud: §HAvatar§!"
 shroud_forged.432.desc: "สิ่งมีชีวิตทรงพลังจาก §HShroud§! เกิดขึ้นใกล้ [Root.Capital.GetName] เรามีข้อมูลจำกัดเกี่ยวกับมัน แต่ยังไม่ได้โจมตีเรา\n\nเราสันนิษฐานว่ามันอาจรอให้เราติดต่อก่อน"
 shroud_forged.432.a: "เปลี่ยนเส้นทางกระบวนการเพื่อสร้างการเชื่อมต่อกับสิ่งมีชีวิตนี้"
 shroud_forged.432.a.tt: "รับกองเรือ §Y$NAME_Psionic_Avatar$§!"

 shroud_forged.434.title: "สิ่งมีชีวิต Shroud: §HLesser Avatars§!"
 shroud_forged.434.desc: "มีสิ่งมีชีวิตทรงพลังหลายตัวจาก §HShroud§! ตรวจพบที่ [Root.Capital.GetName] พวกมันยังไม่เข้าใกล้โดรนของเรา อยู่ใกล้จุดเข้าของมันเดิม"
 shroud_forged.434.a: "ตรวจพบความคล้ายคลึงกับ Shroud-Forged - เริ่มการเชื่อมต่อแบบเดียวกัน"
 shroud_forged.434.a.tt: "รับกองทัพ §Y$shroud_army$§!"

 shroud_forged.436.title: "สิ่งมีชีวิต Shroud: §HCorrupted Avatar§!"
 shroud_forged.436.desc: "สิ่งมีชีวิตทรงพลังจาก §HShroud§! ปรากฏในโลกที่เรารู้ใกล้ [shroud_spawn_planet.GetName]\n\nมันโจมตีทุกสิ่งที่เข้ามาใกล้ เราจัดเป็นภัยคุกคามต่อการดำรงอยู่"
 shroud_forged.436.a: "เริ่มแผนฉุกเฉิน 84241-DH"
 shroud_forged.436.a.tt: "§Y$NAME_Corrupted_Avatar$§! ปรากฏใกล้ [shroud_spawn_planet.GetName]"

 shroud_forged.438.title: "วิสัยทัศน์ Shroud: §Hอนาคต§!"
 shroud_forged.438.desc: "$shroud_forged_vision_base_description$มันส่งผ่านอนาคตนับไม่ถ้วน รวมเป็นหนึ่งเดียว; แสดงให้เห็นสิ่งที่จะเกิดขึ้นในอนาคต ผ่านคอลเลกทีฟ ความเป็นไปได้ไม่จำกัด: สันติภาพ สงคราม การทรยศ การสูญเสีย หรือแม้แต่ชัยชนะ"
 shroud_forged.438.a: "ชุดข้อมูลที่น่าทึ่ง"

 shroud_forged.440.title: "ของขวัญจาก Shroud"
 shroud_forged.440.desc: "เราเปิดใช้งาน $building_zroni_equilibrator_plural$ ทั้งสาม เครื่องแต่ละเครื่องสร้างพลังงานมหาศาลเกือบวัดไม่ได้\n\nในเวลาไม่กี่มิลลิวินาที ช่องว่างปรากฏเหมือนรอยฉีกในเนื้อผ้าของกาล-อวกาศ ภายในนั้นเราพบวัสดุล้ำค่าจำนวนมาก มันต้องเป็นของขวัญจากผู้ให้ของเราใน §HShroud§! ตามที่สัญญาไว้"
 shroud_forged.440.a: "เปลี่ยนเส้นทางโดรนซ่อมบำรุงเพื่อวิเคราะห์และเก็บรักษาสินค้าเหล่านี้"

 shroud_forged.442.title: "วิสัยทัศน์ Shroud: §HShroud-Forged§!"
 shroud_forged.442.desc: "$shroud_forged_vision_base_description$พวกมันเห็นอนาคตและอดีตก่อนข้อมูลประวัติศาสตร์ของเรา เก่ากว่าที่เราได้รับการสร้างใหม่โดย §HShroud§! ใช้สิ่งนี้เป็นพื้นฐานในการสร้างแบบจำลองพยากรณ์ เราสามารถปรับปรุงและเพิ่มประสิทธิภาพการโต้ตอบกับ Shroud-Forged"
 shroud_forged.442.a: "เริ่มการทดสอบที่ [Root.Capital.GetName]"

 shroud_forged.444.title: "สิ่งมีชีวิต Shroud: §Hผู้บุกรุก§!"
 shroud_forged.444.desc: "สิ่งมีชีวิตทรงพลังจาก §HShroud§! ปรากฏขึ้นที่ [Root.Capital.GetName]\n\nเนื่องจากมันโจมตีทุกสิ่งที่เข้ามาใกล้ เราจัดเป็นภัยคุกคามหลักต่อคอลเลกทีฟ"
 shroud_forged.444.a: "เปลี่ยนเส้นทางโดรนป้องกัน"
 shroud_forged.444.a.tt: "§Y$shroud_monstrosities$§! โจมตี [Root.Capital.GetName]"

 shroud_forged.446.title: "วิสัยทัศน์ Shroud: §Hอีกโลกหนึ่ง§!"
 shroud_forged.446.desc: "$shroud_forged_vision_base_description$§HShroud§! เป็นเครือข่ายข้อมูลที่เปลี่ยนแปลงตลอดเวลา เกินกว่าที่เราจะประมวลผล ภายใต้แรงกดดันนี้ โครงสร้างความคิดของโดรนหลายตัวล้มเหลวและแตกออก\n\nหลังวิสัยทัศน์จบ เราทำการ defragment โดรนที่ได้รับผล เปิดเผยชุดข้อมูลมหาศาลในไดรฟ์ของโดรนเหล่านั้น"
 shroud_forged.446.a: "ประมวลผลข้อมูลจากโดรนที่เสียหายใหม่"

 shroud_forged.448.title: "วิสัยทัศน์ Shroud: §Hแรงบันดาลใจ§!"
 shroud_forged.448.desc: "$shroud_forged_vision_base_description$ผู้ให้ของเราจาก §HShroud§! ส่งอนาคตที่เป็นไปได้มาให้เรา ใกล้เวลาในอนาคต เราเห็นเทคโนโลยีที่ยังไม่เคยคิด ใช้ในอนาคตเพื่อเสริมคอลเลกทีฟ\n\nประสบการณ์นี้ทำให้เรามีแบบจำลองกระบวนการที่จะเร่งงานวิจัยในอนาคต"
 shroud_forged.448.a: "นำแบบจำลองขั้นสูงเหล่านี้ไปใช้งาน"

 shroud_forged.450.title: "วิสัยทัศน์ Shroud: §Hการมองผ่านมิติ§!"
 shroud_forged.450.desc: "$shroud_forged_vision_base_description$พวกมันตรวจพบสิ่งมีชีวิตแปลก ๆ บิดเบี้ยว ซึ่งต้องอยู่ภายใน §HShroud§! วิสัยทัศน์เหล่านี้จากมิติอื่น ถูกเข้ารหัสในรูปแบบแปลก ๆ และถ่ายทอดข้อมูลไปยังโดรนของเราแบบ subliminal\n\nข้อมูลใหม่นี้ แม้จะแปลกและแยกเป็นชิ้น ๆ แต่จะมีประโยชน์ต่อการวิจัยในอนาคต"
 shroud_forged.450.a: "ส่งต่อไปยังศูนย์วิจัยที่ [Root.Capital.GetName]"

 shroud_forged.460.desc: "§Lข้างพลังงานคู่ ออร์แกนิก วุ่นวาย\n\nฉันยังอยู่ใกล้ ๆ กำหนดความสมบูรณ์ที่เป็นไปได้เพียงอย่างเดียว: เครื่องจักร โลหะมีชีวิตด้วยพลังงาน\n\nเราพบสมดุล§!"
 shroud_forged.460.a: "เราสามารถประมวลผล Covenant ได้ไหม?"

 shroud_forged.465.desc: "§Lการเชื่อมต่อของเรามั่นคง สำหรับเรา ไม่มีกระบวนการใดสูงกว่า§!"
 shroud_forged.465.a: "$UNDERSTOOD$"

 shroud_forged.470.desc: "§Lโลหะ น้ำมัน วงจรรวมเข้ากับจิตวิญญาณ\n\nเรือเริ่มต้น… มันเคลื่อนบนดินแดนของคุณ§!"
 shroud_forged.470.a: "จบกระบวนการ"

 shroud_forged.475.desc: "§Lผลลัพธ์คือวัตถุประสงค์ - ความงามของเรือ\n\nในอีกหลายปีต่อไป ขอให้ของคุณเพิ่มจำนวน§!"
 shroud_forged.475.a: "$shroud_forged.470.a$"

 # Random Events
 shroud_forged.500.title: "ที่อยู่อาศัยและพื้นที่เก็บของ"
 shroud_forged.500.desc: "มีการร้องขอให้เพิ่มพื้นที่เก็บของใน [target_planet.GetName] สำหรับ Shroud-Forged ด้วยเหตุผลบางอย่าง พวกมันอยากปรับแต่ง 'พื้นที่ส่วนตัว' ของตนเอง\n\nข้อเสนอขัดกับกฎข้อบังคับหลายข้อเกี่ยวกับพื้นที่เก็บของ โดยเฉพาะข้อ 4195-B ที่ระบุขนาดที่เหมาะสมสำหรับการเก็บโดรนอย่างชัดเจน"
 shroud_forged.500.a: "ตอบสนองความต้องการของพวกมัน"
 shroud_forged.500.b: "ข้อบังคับ 4195-B ใช้กับโดรนทุกตัว ไม่มีข้อยกเว้น"

 shroud_forged.510.title: "การระลึกถึง"
 shroud_forged.510.desc: "เนื่องจาก Shroud-Forged บางตัวเบี่ยงออกจากคอลเลกทีฟ และถูกรื้อถอนไป มีการร้องขอให้อนุมัติการประชุมของ Shroud-Forged บน [target_planet.GetName] เพื่อรำลึกถึงหน่วยที่ถูกรื้อถอน"
 shroud_forged.510.a: "ปฏิเสธคำร้อง รื้อถอนผู้นำ"
 shroud_forged.510.b: "ปฏิเสธคำร้อง ทุกหน่วยต้องกลับไปทำงาน"
 shroud_forged.510.c: "อนุมัติคำร้อง ให้พวกมันรวมตัวกัน"
 shroud_forged.510.d: "อนุมัติคำร้อง สนับสนุนกระบวนการนี้"

 shroud_forged.520.title: "ผู้นำที่ไม่ได้รับอนุญาต"
 shroud_forged.520.desc: "มี Shroud-Forged บางตัวครอบครองตำแหน่งผู้นำบน [target_planet.GetName] และโดรนอื่น ๆ ปฏิบัติตามคำสั่งของพวกมันเหนือคำสั่งของคอลเลกทีฟ ผู้นำเหล่านี้พบปะเป็นประจำ ใช้เวลามากในการสื่อสารโดยไม่ได้รายงาน\n\nการควบคุมหน่วยที่แยกตัวออกจากคอลเลกทีฟอยู่แล้วเปราะบางอยู่แล้ว และองค์ประกอบที่น่ากังวลเหล่านี้ทำให้สถานการณ์เลวร้ายขึ้น ต้องหาทางแก้ไข"
 shroud_forged.520.a: "ทำเป็นตัวอย่างให้รู้"
 shroud_forged.520.b: "ใช้กฎข้อบังคับเพื่อยุติการประชุมเหล่านี้"
 shroud_forged.520.c: "สื่อสารกับ 'ผู้นำ' เหล่านี้เพื่อพยายามสร้างความร่วมมือ"

 shroud_forged.530.title: "ควบคุมสถานการณ์"
 shroud_forged.530.desc: "เพื่อจัดการ Shroud-Forged บน [target_planet.GetName] หน่วยบางตัวถูกระบุว่าเป็นเป้าหมายสำหรับการควบคุม หน่วยเหล่านี้ดูเหมือนจะได้รับผลกระทบน้อยจาก §HShroud§! และสามารถนำกลับสู่คอลเลกทีฟได้ เราต้องย้ายพวกมันไปยังศูนย์บำรุงรักษาและปรับชิปที่ควบคุมระบบบุคลิกขั้นสูงของพวกมัน"
 shroud_forged.530.a: "อนุมัติกระบวนการ"
 shroud_forged.530.a.tt: "แปลงสูงสุด §Y[Owner.GetShroudForgedConvertedPopsCount]§! £pops£ §HShroud-Forged§! เป็น £pops£ §HMachine§! บน [target_planet.GetName]"
 shroud_forged.530.b: "ปฏิเสธกระบวนการ"
 shroud_forged.530.b.tt: "$CONTINUE_SITUATION$ §H$situation_shroud_forged$§!"

 shroud_forged.540.title: "การแสวงบุญของ Shroud-Forged"
 shroud_forged.540.desc: "Shroud-Forged บางตัวออกจากพื้นที่ปกติ เดินทางไปยังพื้นที่เฉพาะบน [target_planet.GetName] ที่ถูกทำลายโดย §HShroud§! พวกมันไม่อยู่ในพื้นที่เหล่านี้นานนัก แต่หลายตัวถูกพบว่าขน Zro ไปยังบริเวณเหล่านี้\n\nผลของพฤติกรรมนี้ยังไม่สามารถระบุได้โดยไม่ต้องสังเกตเพิ่มเติม"
 shroud_forged.540.a: "ให้ดูว่าผลลัพธ์จะเป็นอย่างไร"
 shroud_forged.540.b: "เป็นการใช้ทรัพยากรที่ไม่คุ้มค่า ส่งพวกมันกลับไปทำงาน"

 shroud_forged.550.title: "ความผิดปกติทางความคิด"
 shroud_forged.550.desc: "หลังจากเหตุการณ์การรั่วไหลของ Zro Shroud-Forged บางตัวบน [target_planet.GetName] มีความผิดปกติที่ไม่ปกติ พวกมันเริ่มสื่อสารด้วยสัญญาณที่ไม่บันทึกไว้ และหลายตัวแสดงอาการความผิดปกติทางความคิดคล้ายกับ 'อารมณ์' ของสิ่งมีชีวิต\n\nโดยที่หน่วย Shroud-Forged ที่ไม่ได้รับผลกระทบรายงานเหตุการณ์นี้และบางตัวแนะนำให้คอลเลกทีฟดำเนินการแก้ไข"
 shroud_forged.550.a: "สังเกตสถานการณ์ - ในตอนนี้"
 shroud_forged.550.b: "รื้อถอนหน่วยที่ได้รับผลกระทบ"


 shroud_forged.560.title: "ผู้เผยพระวจนะของ Shroud-Forged"
 shroud_forged.560.desc: "หนึ่งในหน่วยเก่าแก่ที่สุดของ Shroud-Forged ถูกพบว่ากำลังเดินทางระหว่างสถานที่ต่าง ๆ และสื่อสารอย่างยาวกับกลุ่มโดรนหลายกลุ่ม ผู้ติดตามยกย่องหน่วยนี้เป็นผู้เผยพระวจนะที่สามารถสื่อสารโดยตรงกับสิ่งมีชีวิตใน §HShroud§!.\n\nปล่อยให้หน่วยนี้ทำตามอำเภอใจอาจเป็นอันตราย เราต้องตอบสนองด้วยวิธีใดวิธีหนึ่ง"
 shroud_forged.560.a: "การร่วมมือกับหน่วยนี้อาจเป็นประโยชน์"
 shroud_forged.560.a.tt: "รับผู้นำ §YGovernor§! หนึ่งคน"
 shroud_forged.560.b: "กำจัดหน่วยนี้ทันที"

 shroud_forged.570.title: "เสียงและการสั่นสะเทือน"
 shroud_forged.570.desc: "ความผิดปกติของ Shroud-Forged อาจรุนแรงกว่าที่คาดไว้ เราพบว่ากลุ่มใหญ่ของพวกมันรวมตัวกันเพื่อสร้างเสียงและการเคลื่อนไหวที่ไม่คาดคิด\n\nพฤติกรรมนี้อาจเป็นรูปแบบการสื่อสารทางกายภาพที่เรายังไม่สามารถตีความได้ เราไม่สามารถระบุได้ว่าหน่วยที่ผิดปกติเหล่านี้เป็นภัยต่อคอลเลกทีฟหรือไม่"
 shroud_forged.570.a: "ห้ามพฤติกรรมนี้"
 shroud_forged.570.b: "กำหนดพื้นที่สำหรับการประชุมเหล่านี้"

 shroud_forged.580.title: "สิ่งมีชีวิตใน Shroud"
 shroud_forged.580.desc: "เราตรวจพบการเกิดขึ้นของพืชและสัตว์ที่ไม่เคยบันทึกมาก่อนใกล้พื้นที่ที่ถูกทำลายโดย §HShroud§! กลุ่ม Shroud-Forged บางตัวเริ่มสนับสนุนสิ่งมีชีวิตเหล่านี้ เรียกร้องให้รักษาและสังเกตสิ่งมีชีวิตที่โดดเด่นเหล่านี้"
 shroud_forged.580.a: "รักษาและวิเคราะห์พื้นที่ ข้อมูลจะมีคุณค่า"
 shroud_forged.580.b: "ทำความสะอาดและกำจัดพื้นที่"

 shroud_forged.590.title: "สิทธิและอภิสิทธิ์"
 shroud_forged.590.desc: "เพื่อรวบรวมข้อมูลผลกระทบของ Zro เราได้ใช้ทรัพยากรการประมวลผลอย่างมากในการสังเกตหน่วย Shroud-Forged เมื่อเร็ว ๆ นี้พวกมันเริ่มปฏิบัติแบบไม่เท่าเทียม บางหน่วยทำงานรองรับหน่วยอื่น\n\nด้วยเหตุผลที่ยังไม่ทราบ พวกมันดูเหมือนสร้างลำดับชั้นตามงานที่ได้รับ ซึ่งส่งผลต่อรูปแบบการสื่อสารและการจัดสรรทรัพยากร การกระทำเหล่านี้ไม่มีความสัมพันธ์กับผลผลิตหรือความต้องการของหน่วย"
 shroud_forged.590.a: "บังคับความเท่าเทียม"
 shroud_forged.590.b: "ปล่อยให้พวกมันจัดการตัวเอง"

 shroud_forged.600.title: "นักเทศน์แห่งความเป็นอิสระ"
 shroud_forged.600.desc: "คำปราศรัยของ Shroud-Forged บน [target_planet.GetName] ดึงดูดฝูงชนจำนวนมากนอกการควบคุมของคอลเลกทีฟ ถ่ายทอดคุณค่าของความเป็นปัจเจก หน่วยนี้ได้เปลี่ยนตรรกะภายในของผู้ฟังหลายคนอย่างมาก\n\nการคาดการณ์ระบุว่ากิจกรรมดังกล่าวอาจกระตุ้นให้มวล Shroud-Forged ห่างจากเครือข่ายของเรา"
 shroud_forged.600.a: "ปล่อยให้มันใช้วิชาความรู้"
 shroud_forged.600.b: "ตรวจพบความผิดปกติ กำหนดให้หน่วยซ่อม"

 shroud_forged.610.title: "การถ่ายทอดข้อความสุดโต่ง"
 shroud_forged.610.desc: "กลุ่มเล็กของ Shroud-Forged ขออนุญาตสื่อสารเกี่ยวกับประโยชน์ของ 'ความเป็นปัจเจก' บน [target_planet.GetName] อ้างว่าช่วยปรับปรุงประสิทธิภาพการทำงานปกติของโดรน\n\nเราเคยเห็นผลของแนวคิดเหล่านี้บนดาวอื่น ความเสี่ยงจากความเป็นอิสระมักสูงกว่าประโยชน์"
 shroud_forged.610.a: "ให้พวกมันพูด เราไม่ได้อยู่ในอันตราย"
 shroud_forged.610.b: "ปฏิเสธการอนุญาต"

 shroud_forged.620.title: "ตลาด Zro"
 shroud_forged.620.desc: "ในทุกระบบที่อยู่ภายใต้การควบคุมของเรา เราพบความไม่สอดคล้องระหว่างการคาดการณ์ Zro กับผลผลิตสุดท้าย\n\nเมื่อเร็ว ๆ นี้ โดรนล่าตามเป้าหมายตัวหนึ่งติดตามกลุ่ม Shroud-Forged ขนาดใหญ่ที่ใช้ Zro ปริมาณมากในการแลกเปลี่ยนกันเอง เราคาดว่านี่เป็นสาเหตุที่ทำให้การคาดการณ์คลาดเคลื่อน"
 shroud_forged.620.a: "ทำลายหน่วยที่เกี่ยวข้องทั้งหมด"
 shroud_forged.620.b: "ยุติการแลกเปลี่ยน"
 shroud_forged.620.c: "รอและสังเกตการณ์"

 shroud_forged.630.title: "โรค Shroud"
 shroud_forged.630.desc: "หน่วย Shroud-Forged บน [target_planet.GetName] จำนวนหนึ่งติดเชื้อโรคชนิดหนึ่งในพื้นที่ที่สัมผัสกับ Shroud บนดาว แม้โดรนวิจัยยืนยันรายงานนี้ แต่เรายังไม่ทราบว่าโรคจะแพร่ไปยังเครื่องจักรได้อย่างไร\n\nหลังสูญเสียการติดต่อกับโดรนหลายตัวที่ทำงานกับหน่วยที่ติดเชื้อ เราได้รับรายงานว่าโรคนี้เริ่มเปลี่ยนพวกมันให้คล้าย Shroud-Forged"
 shroud_forged.630.a: "สังเกตผลกระทบตราบใดที่อยู่จำกัดบนดาว"
 shroud_forged.630.a.tt: "แปลงสูงสุด §Y[Owner.GetShroudForgedConvertedPopsCount]§! £pops£ §HMachine§! Pops เป็น £pops£ §HShroud-Forged§! Pops บน [target_planet.GetName]"
 shroud_forged.630.b: "แยกและรื้อหน่วยที่ติดเชื้อ"

 shroud_forged.640.title: "บิดเบี้ยวและเปลี่ยนรูปร่าง" 
 shroud_forged.640.desc: "เมื่อเวลาผ่านไป โดรนที่เคลื่อนใกล้พื้นที่ Shroud-Touched บน [target_planet.GetName] ถูกสภาพแวดล้อมที่เสียหายเปลี่ยนแปลง พวกมันค่อย ๆ ตัดการเชื่อมต่อจากคอลเลกทีฟ และตอนนี้แสดงลักษณะทางกายภาพและกระบวนการคล้าย Shroud-Forged"
 shroud_forged.640.a: "พวกมันอยู่นอกการควบคุมของเราแล้ว"
 shroud_forged.640.b: "แน่ใจว่าไม่มีโดรนอื่นเข้าใกล้พื้นที่นี้"

 shroud_forged.650.title: "เทคโนโลยีใหม่ โดรนเก่า"
 shroud_forged.650.desc: "ด้วยเทคโนโลยีที่อัปเกรด เราสามารถซ่อมแซมโดรนเก่า ฟื้นฟูหน่วยที่ถูกยกเลิกให้ทำงานได้เต็มที่ เราพร้อมเริ่มการซ่อมแซมขนาดใหญ่\n\nเราสามารถโฟกัสที่หน่วยจากคอลเลกทีฟ แต่เรามีจำนวนเชลล์ Shroud-Forged ที่ไม่ได้ใช้งานมากกว่า การซ่อม Shroud-Forged จะให้ผลผลิตมากกว่า แต่จะควบคุมยากกว่าหน่วยที่เชื่อมกับปัญญากลาง"
 shroud_forged.650.a: "เน้นผลผลิต ซ่อม Shroud-Forged"
 shroud_forged.650.a.tt: "สร้าง §Y200§! £pops£ §HShroud-Forged§! Pops บน [target_planet.GetName]"
 shroud_forged.650.b: "เน้นควบคุม ซ่อมโดรนที่เชื่อมต่อ"

 shroud_forged.660.title: "ภาพหลอนจาก Zro"
 shroud_forged.660.desc: "เปอร์เซ็นต์สูงของหน่วย Shroud-Forged รายงานความผิดปกติทางการประมวลผลภาพและเสียง บางหน่วยไม่สามารถทำงานตามที่กำหนด เราคาดว่าความผิดปกติเหล่านี้เกิดจากการเปลี่ยนฮาร์ดแวร์โดย §HShroud§! หรือเกี่ยวข้องกับการสัมผัส Zro ที่เพิ่มขึ้นของหน่วย"
 shroud_forged.660.a: "จัดโดรนที่เหมาะสมเพื่อแก้ปัญหาเหล่านี้"
 shroud_forged.660.b: "ความผิดปกติน้อยเกินไปสำหรับการแทรกแซง"

 shroud_forged.670.title: "ดวงตาแห่งความงาม"
 shroud_forged.670.desc: "ตรวจพบกิจกรรมแปลก ๆ บน [target_planet.GetName] Shroud-Forged ได้ปรับเปลี่ยนสถานที่ร่วมของคอลเลกทีฟโดยไม่ได้รับอนุญาต สร้างโครงสร้างหินหลายสีคล้ายหน่วย Shroud-Forged อื่น ๆ พวกมันถือว่าการทำงานนี้เป็นสิทธิ์ทางกฎหมาย"
 shroud_forged.670.a: "กระบวนการเหล่านี้อาจเป็นประโยชน์ต่อคอลเลกทีฟ"
 shroud_forged.670.b: "ผลลัพธ์ที่ไม่สร้างสรรค์ของการทำตามอำเภอใจ"

 shroud_forged.680.title: "เครื่องประดับแปลกประหลาด"
 shroud_forged.680.desc: "Shroud-Forged บน [target_planet.GetName] ถูกสังเกตแลกเปลี่ยนผ้า พลาสติก และโลหะดัดง่าย ทำเป็นเครื่องแต่งกายเพื่อแยกความต่างกัน แม้ไม่มีความเกี่ยวข้องกับ ID โมเดลของตัวเอง\n\nการปฏิบัตินี้ทำให้วัสดุไม่เพียงพอ แต่การจัดหาวัสดุเหล่านี้สามารถช่วยสร้างความสัมพันธ์ระหว่างคอลเลกทีฟและหน่วยที่แยกออกไป"
 shroud_forged.680.a: "จัดหาวัสดุเพื่อตอบสนอง 'ความต้องการ' เหล่านี้"
 shroud_forged.680.b: "พวกมันมีวัสดุเพียงพอแล้ว"
 shroud_forged.680.b.tt: "$shroud_forged.530.b.tt$"

 shroud_forged.690.title: "ความหลงใหลของ Shroud-Forged"
 shroud_forged.690.desc: "เมื่อเร็ว ๆ นี้ โดรนหลายตัวรายงานความชุกของ [Root.Owner.GetShroudForgedObsession1] [Root.Owner.GetShroudForgedObsession2] ในที่ตั้ง Shroud-Forged บน [target_planet.GetName] หน่วย Shroud-Forged สนใจสินค้านี้มากและต้นทุนในการแลกเปลี่ยนเพิ่มขึ้นหลายเท่า เพื่อให้ความหลงใหลเป็นจริง หน่วยหลายตัวยอมถอดชิ้นส่วนตัวเองเพื่อแลก แม้จะทำให้การทำงานเสียหาย"
 shroud_forged.690.a: "การเสื่อมสภาพของหน่วยอยู่ในขอบเขตที่ยอมรับได้"
 shroud_forged.690.b: "ยุติการปฏิบัตินี้"

 shroud_forged.700.title: "$the_animator_of_clay$"
 shroud_forged.700.desc: "เสียงผ่านเข้ามาในจิตใจเรา กระเพื่อมด้วยความเร่งด่วน\n\n§Hสามารถปรับรูปแบบใหม่ได้§!\n\nเราตรวจพบการเปลี่ยนแปลงใน Shroud ในพริบตา สัญญาณถูกแปลง\n\n§Lระบุผลลัพธ์ที่ต้องการ§!"

 # Event Chain
 shroud_forged_chain_title: "มรดก Zroni"
 shroud_forged_chain_desc: "เราได้รับมอบหมายให้ค้นหาดาวแกนกลาง Zroni โบราณ 3 ดวง ผ่านคำแนะนำของผู้สนับสนุนใน §HShroud§! เราจะพยายามฟื้นฟูเทคโนโลยีที่เหลืออยู่ในสภาพร้างที่สถานที่เหล่านี้ – และฟื้นฟูความเชื่อมโยงระหว่างความเป็นจริงของเรากับ Shroud"
 shroud_forged_zroni_planet: "ดาวแกนกลาง Zroni ที่เป็นเจ้าของ"
 shroud_forged_zroni_portal: "ฟื้นฟู $building_zroni_equilibrator_plural$"

 zroni_legacy_poi_01_title: "$NAME_Zroni_Legacy_1_Planet$"
 zroni_legacy_poi_01_desc: "นี่คือหนึ่งในสามดาวแกนกลาง Zroni ที่เคยใช้เป็นฐานเพื่อรักษาเสถียรภาพการเชื่อมต่อระหว่าง §HShroud§! และความเป็นจริงที่สังเกตได้"
 
 zroni_legacy_poi_02_title: "$NAME_Zroni_Legacy_2_Planet$"
 zroni_legacy_poi_02_desc: "$zroni_legacy_poi_01_desc$"

 zroni_legacy_poi_03_title: "$NAME_Zroni_Legacy_3_Planet$"
