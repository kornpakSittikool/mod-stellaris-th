 pm_shroud_forged_special_housing: "บ้านพักพิเศษ"
 pm_shroud_forged_special_housing_desc: "แม้จะมีกฎระเบียบที่เข้มงวดสำหรับการจัดเก็บโดรน แต่ Shroud-Forged ก็ได้รับสิทธิพิเศษในการสร้างบ้านของตนเอง"

 pm_shroud_forged_ceremony: "พิธีรำลึก"
 pm_shroud_forged_ceremony_desc: "กลุ่มได้อนุมัติพิธีรำลึกถึง Shroud-Forged ซึ่งความผิดปกติไม่สามารถแก้ไขได้"

 pm_shroud_forged_denied_ceremony: "พิธีที่ถูกปฏิเสธ"
 pm_shroud_forged_denied_ceremony_desc: "การจัดการกับ Shroud-Forged กลายเป็นเรื่องยากยิ่งขึ้นหลังจากคำร้องขอพิธีรำลึกของพวกเขาถูกปฏิเสธ"

 pm_shroud_forged_troubling_elements_example: "ความเป็นผู้นำที่ถูกทำลาย"
 pm_shroud_forged_troubling_elements_example_desc: "ผู้นำกลุ่ม Shroud-Forged บางคนถูกปลดออกจากตำแหน่งเพื่อพยายามลดกระบวนการทางสังคมที่เบี่ยงเบน"

 pm_shroud_forged_troubling_elements_regulations: "ข้อบังคับ 7132-H"
 pm_shroud_forged_troubling_elements_regulations_desc: "มีการกำหนดกฎระเบียบเพื่อให้มั่นใจว่าโดรนจำนวนจำกัดเท่านั้นที่จะสามารถพบกันได้ในเวลาใดเวลาหนึ่ง"

 pm_shroud_forged_troubling_elements_cooperation: "ความร่วมมือที่ห่อหุ้มด้วยผ้าห่อพระศพ"
 pm_shroud_forged_troubling_elements_cooperation_desc: "ผู้นำของกลุ่ม Shroud-Forged กำลังทำงานร่วมกับกลุ่มเพื่อพยายามหาจุดร่วมกัน"

 pm_shroud_forged_shroud_pilgrimage: "การแสวงบุญด้วยผ้าห่อศพ"
 pm_shroud_forged_shroud_pilgrimage_desc: "เมื่อผ้าห่อพระศพสัมผัสได้ถึงความสนใจของเหล่า Shroud-Forged ภูมิภาคบางแห่งจึงถูกดึงดูดโดย Shroud-Forged หน่วยเหล่านี้ต้องเดินทางไกลเพื่อไปให้ถึง"

 pm_shroud_forged_dance_area: "สถานที่เต้นรำที่กำหนด"
 pm_shroud_forged_dance_area_desc: "มีการกำหนดสถานที่ไว้สำหรับ Shroud-Forged เพื่อร่วมกิจกรรมล่าสุดของพวกเขา - 'การเต้นรำ'."

 pm_shroud_forged_inequality: "ความไม่เท่าเทียมที่เกิดจากผ้าห่อศพ"
 pm_shroud_forged_inequality_desc: "กลุ่ม Shroud-Forged จะจัดระบบชนชั้นตามลำดับชั้นตามความสำคัญของงานที่พวกเขาทำ"

 pm_shroud_forged_individualism: "Individualism"
 pm_shroud_forged_individualism_desc: "ความเป็นปัจเจกบุคคล"

 shroud_forged_zro_market: "Zro Market"
 shroud_forged_zro_market_desc: "ตลาดใต้ดินได้ถือกำเนิดขึ้นในจักรวรรดิ ซึ่งหน่วย Shroud-Forged ขโมย Zro จากกลุ่มเพื่อนำมาแลกเปลี่ยนกันเอง"

 shroud_forged_physician_modifier: "Zro Physician"
 shroud_forged_physician_modifier_desc: "จักรวรรดิได้ให้ความสำคัญกับการเพิ่มโดรนที่มีอุปกรณ์พิเศษให้กับสถานที่ของตนเพื่อจัดการกับปัญหาที่เกิดจากการจัดการ Zro ที่ไม่เหมาะสม"
 physician_modifier_tooltip: "£job_physician_drone£ $job_physician_drone$ Jobs: §G+1§!"

 pm_shroud_forged_artistic_revolution: "กระแส งานศิล"
 pm_shroud_forged_artistic_revolution_desc: "ศิลปินจาก Shroud-Forged เริ่มออกแบบสถานที่ต่างๆ ใหม่โดยไม่ได้อยู่ภายใต้การกำกับดูแลร่วมกัน โดยปฏิบัติตามมาตรฐาน 'ความงาม' ของตนเอง"

 pm_shroud_forged_stopped_artists: "การปฎิเสธ งานศิล"
 pm_shroud_forged_stopped_artists_desc: "กลุ่มนี้ได้ยุติความรู้สึกถึง 'ความเป็นศิลปิน' ที่กำลังเติบโตในหมู่ผู้ตีผ้าห่อพระศพก่อนที่จะเกิดปัญหา"

 pm_shroud_forged_fashion_modifier: "ความต้องการที่เป็นเอกลักษณ์"
 pm_shroud_forged_fashion_modifier_desc: "กลุ่มได้มอบหมายหน่วยงานการผลิตเพื่อจัดหาเครื่องแต่งกายที่ปรับแต่งตามความต้องการสำหรับ Shroud-Forged ที่ใส่ใจในแฟชั่น"

 pm_shroud_forged_obsession_modifier: "ความหลงใหลที่ถูกควบคุม"
 pm_shroud_forged_obsession_modifier_desc: "กฎระเบียบเหล่านี้ได้รับการออกแบบมาเพื่อป้องกันการระบาดของความรุนแรงในหมู่ผู้ที่คลั่งไคล้ Shroud-Forged"

