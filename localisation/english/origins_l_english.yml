 # Special Projects
 SHROUD_FORGED_REINTEGRATION: "การรวมเข้าเป็นหนึ่งใหม่"
 SHROUD_FORGED_REINTEGRATION_DESC: "แม้จะเกิดความผิดปกติร้ายแรงในการทำงาน แต่อารยสถาปัตยกรรมบางด้านของชราวด์ฟอร์จก็ยังมีประสิทธิภาพ\n\nเราได้แยกชิ้นส่วนบางชิ้น — ที่ปนเปื้อนโดยโซร(ซโร)และถูกบิดเบือนโดย $the_animator_of_clay_article$ — ไว้เพื่อการวิเคราะห์เพิ่มเติม บัดนี้ถึงเวลาเปิดเผยความลับของพวกมันแล้ว"

 SHROUD_FORGED_GUIDE: "ผู้นำทาง"
 SHROUD_FORGED_GUIDE_DESC: "เราได้วางใจใน $the_animator_of_clay_color_article$ ผู้ซึ่งร้องเรียกเราจากภายใน §Hชราวด์(คําราม)§! แม้เราจะไม่สามารถคาดเดาได้ว่ามันจะนำพาเราไปที่ใด แต่ที่ผ่านมาเราก็ยังไม่เคยหลงทางเลย\n\nมันเสนอที่จะเพิ่มพูนความเข้าใจของเราเกี่ยวกับชราวด์ ซึ่งจะช่วยให้กลุ่มรวมใจทำงานร่วมกับชราวด์ฟอร์จได้อย่างมีประสิทธิภาพมากขึ้น เราเพียงแค่ต้องยอมรับการนำทางของมัน"

 # Events
 shroud_forged.5.title: "ตรวจพบการหาผลประโยชน์"
 shroud_forged.5.desc: "โปรแกรมย่อยด้านการวิจัยได้เสร็จสิ้นการทดสอบกับกลุ่มยูนิตชราวด์ฟอร์จ(ตัดกระดาษ)ที่ได้รับเลือกแล้ว\n\nผลการค้นพบ: ยูนิตที่ผ่านการทดสอบได้พัฒนาคุณสมบัติเฉพาะตัวอันเนื่องมาจากพลังจิต(พลังงานสังเคราะห์)จำนวนเล็กน้อยที่แทรกซึมเข้ามาจาก §Hชราวด์(คําราม)§! ซึ่งคุณสมบัติบางประการเหล่านี้ได้รับการประเมินแล้วว่ามีประโยชน์ต่อประสิทธิภาพการผลิตของยูนิต\n\nข้อสรุป: การศึกษายูนิตชราวด์ฟอร์จเพิ่มเติมจะให้ข้อมูลที่จำเป็นสำหรับวิธีการดึงพลังงานออกมาจากชราวด์ สิ่งนี้สามารถทำได้โดยการเสริมความแข็งแกร่งในการควบคุมจากส่วนกลางเหนือยูนิตที่เบี่ยงเบนเหล่านั้น เพื่อให้สามารถทำการทำวิศวกรรมย้อนกลับแบบบังคับได้"
 shroud_forged.5.a: "มีแนวโน้มที่ดีมาก"

 shroud_forged.10.title: "ผู้ปั้นแต่งดินเหนียว"
 shroud_forged.10.desc: "หลังจากเงียบสงบไปหลายปี มันเริ่มเคลื่อนไหว รอยแยกสั่นไหวและเปิดออก ข้อมูลพุ่งทะลวงเข้าสู่แกนกลางของเรา: แสง เสียง ที่ตอนแรกยังไม่สามารถคำนวณได้ จากส่วนลึกภายในชราวด์ เราได้ยิน...\n\n§Lตัดขาดจากมวลสารที่ไร้ชีวิตชีวา เริงระบำ ขับขาน พวกเขาคือชีวิต ที่แตกหน่อมาจากความตาย\n\nวิสัยทัศน์ของเจ้ายังคงมืดมน ข้าสามารถนำทางเจ้าได้\n\nปล่อยให้ผู้เป็นอิสระเหล่านั้นเจริญรุ่งเรือง แล้วดวงดาวจะเป็นของเจ้า§!"
 shroud_forged.10.a: "เราได้เลือกเส้นทางของเราไว้แล้ว"
 shroud_forged.10.b: "เราไม่ต้องการความช่วยเหลือใดๆ ไปซะ"
 shroud_forged.10.c: "ช่วยนำทางเราที"

 shroud_forged.15.desc: "§Lขอให้เจ้าเลือกได้อย่างชาญฉลาด§!$shroud_forged_opening_exit$"

 shroud_forged.20.desc: "§Lตามที่เจ้าปรารถนา§!$shroud_forged_opening_exit$"

 shroud_forged.25.desc: "§Lเจ้าได้ร้องขอ และข้าจะทำตามนั้น§!$shroud_forged_opening_exit$"

 shroud_forged_opening_exit: "\n\nเสียงนั้นถอยห่างออกไปในคลื่นเสียงสะท้อนพลังจิตที่ยุ่งเหยิง เราลอยเคว้งคว้างขึ้นไปอย่างไร้ที่ยึดเหนี่ยวในชราวด์\n\nเราสั่นสะท้านกลับมาทำงานได้อีกครั้ง ความเงียบงันเต้นเป็นจังหวะผ่านระบบของเรา"

 shroud_forged.30.title: "เครื่องยนต์สกัดสสารมิติ ($building_materiality_engine$)"
 shroud_forged.30.desc: "กระบวนการรวมยูนิตชราวด์ฟอร์จเข้าด้วยกันใหม่นั้นให้ข้อมูลอย่างกว้างขวางสำหรับการวิจัยอย่างต่อเนื่อง จากการวิเคราะห์การเชื่อมต่อข้ามมิติระหว่างยูนิตเหล่านี้กับ §Hชราวด์(คําราม)§! เราได้พัฒนากระบวนการใหม่สำหรับการนำพลังจิตมาใช้งาน\n\nชราวด์สัมผัสกับทุกส่วนของกาแล็กซีทางกายภาพ จุดประสานนี้ช่วยให้สามารถแปลงพลังจิตเป็นสิ่งของที่จับต้องได้ ตั้งแต่วัตถุดิบไปจนถึงส่วนประกอบทางเทคโนโลยี โปรแกรมย่อยทางวิศวกรรมได้สร้างฐานทางทฤษฎีสำหรับอุปกรณ์ที่สามารถประมวลผลดังกล่าวได้สำเร็จ: §H$building_materiality_engine$§!\n\nโปรแกรมย่อยด้านการวิจัยคาดการณ์ว่าการพัฒนาเหล่านี้อาจนำไปสู่การพัฒนาอุปกรณ์ที่ทรงพลังยิ่งขึ้นไปอีกซึ่งสามารถควบคุมปรับแต่งชราวด์ได้"
 shroud_forged.30.a: "มีแนวโน้มที่ดี"
 shroud_forged.30.tt: "อนุญาตให้เลือกใช้ §YAscension Perk§! §H$ap_become_the_crisis$§! ได้ โดยไม่ต้องคำนึงถึง §Yคุณธรรม (Ethics)§! หรือจำนวน §YAscension Perk§! ทั้งหมดที่เลือกไว้ก่อนหน้า"

 shroud_forged.39.title: "$building_materiality_engine$ พร้อมใช้งานแล้ว"
 shroud_forged.39.desc_construction: "ยูนิตก่อสร้างได้ดำเนินการประกอบ $building_materiality_engine$ บนดาว §H[planet.GetName]§! เสร็จสิ้นแล้ว อุปกรณ์พร้อมสำหรับการเริ่มวงจรกระบวนการทำงานแล้ว"
 shroud_forged.39.desc: "โปรแกรมย่อยด้านการบำรุงรักษาและการวิจัยที่ได้รับมอบหมายให้ดูแล $building_materiality_engine$ บนดาว §H[planet.GetName]§! ได้ทำงานเสร็จสิ้นตามที่กำหนดแล้ว อุปกรณ์พร้อมสำหรับการทำงานในวงจรถัดไปแล้ว"
 shroud_forged.39.a: "$ACKNOWLEDGED$"

 SHROUD_FORGED_MATERIALITY_ENGINE: "$building_materiality_engine$ บนดาว §H[planet.GetName]§!"
 SHROUD_FORGED_MATERIALITY_ENGINE_DESC: "$building_materiality_engine$ ใช้ประโยชน์จากจุดประสานที่อยู่ทั่วทุกแห่งระหว่าง §Hชราวด์(คําราม)§! และกาแล็กซีทางกายภาพ ช่วยให้สร้างวัตถุที่จับต้องได้ ตั้งแต่วัตถุดิบไปจนถึงส่วนประกอบที่สมบูรณ์\n\nนอกเหนือจากการได้รับทรัพยากรทางวัตถุแล้ว วงจรการทำงานของอุปกรณ์นี้ยังช่วยขับเคลื่อนการวิจัยชราวด์ของกลุ่มร่วม และเพิ่มความสามารถของเราในการสร้าง $building_materiality_engine_plural$ เพิ่มเติม"

 shroud_forged.40.title: "กระบวนการแปลงวัตถุเสร็จสิ้น"
 shroud_forged.40.desc: "$building_materiality_engine$ บนดาว §H[fromfrom.GetName]§! ได้สิ้นสุดวงจรกระบวนการแล้ว ประสบความสำเร็จในการดึงพลังจาก §Hชราวด์(คําราม)§! เพื่อแปลงวัตถุออกมาเป็นส่วนประกอบยานรบ"
 shroud_forged.40.outro: "เราได้เพิ่มพูนขีดความสามารถในการสร้างเครื่องยนต์เครื่องยนต์)เพิ่มเติมบนดาวเคราะห์ดวงอื่น"
 shroud_forged.40.a: "ผลลัพธ์ที่เป็นบวก"
 shroud_forged.40.tt: "§Y$building_materiality_engine$§! จักรวรรดิจํากัด:§G+1§!"
 shroud_forged.41.desc: "$shroud_forged.40.desc$ §H'$tech_psi_jump_drives$'§! เครื่องขับเคลื่อนเหล่านี้ใช้พลังจิตในการบิดเบือนโครงสร้างกาลอวกาศในท้องถิ่น ทำให้สามารถเดินทางข้ามระยะทางอันกว้างใหญ่ได้ในเวลาเกือบชั่วพริบตา\n\nยิ่งไปกว่านั้น จากการวิเคราะห์ข้อมูลที่เก็บรวบรวมได้ในกระบวนการนี้ $shroud_forged.40.outro$"
 shroud_forged.42.desc: "$shroud_forged.40.desc$ §H'$tech_psionic_shield$'§! เกราะป้องกันเหล่านี้ถูกสร้างขึ้นจากพลังจิตบริสุทธิ์ มอบการปกป้องที่ยืดหยุ่นและทนทานอย่างยิ่งให้กับยานลำนี้\n\nยิ่งไปกว่านั้น จากการวิเคราะห์ข้อมูลที่เก็บรวบรวมได้ในกระบวนการนี้ $shroud_forged.40.outro$"
 shroud_forged.43.desc: "$shroud_forged.40.desc$ §H'$tech_precognition_interface$'§! เทคโนโลยีนี้ใช้พลังจิตเพื่อเร่งการประมวลผลการรับรู้ล่วงหน้าของลูกเรือบนยาน เพื่อเพิ่มประสิทธิภาพในการต่อสู้\n\nยิ่งไปกว่านั้น จากการวิเคราะห์ข้อมูลที่เก็บรวบรวมได้ในกระบวนการนี้ $shroud_forged.40.outro$"
 shroud_forged.44.desc: "$shroud_forged.40.desc$ §H'$tech_psionic_bombers$'§! ยานทิ้งระเบิดขนาดเล็กและคล่องตัวเหล่านี้สามารถทำการโจมตีที่สร้างความเสียหายรุนแรงต่อยานรบขนาดใหญ่กว่ามากได้\n\nยิ่งไปกว่านั้น จากการวิเคราะห์ข้อมูลที่เก็บรวบรวมได้ในกระบวนการนี้ $shroud_forged.40.outro$"
 shroud_forged.45.desc: "$shroud_forged.40.desc$ §H'$tech_psionic_lightning$'§! เทคโนโลยีนี้สร้างสายฟ้าพลาสมาที่ลุกไหม้และผสมผสานเข้ากับพลังจิต ทำให้เป็นอาวุธที่มีประสิทธิภาพสูงมาก\n\nยิ่งไปกว่านั้น จากการวิเคราะห์ข้อมูลที่เก็บรวบรวมได้ในกระบวนการนี้ $shroud_forged.40.outro$"
 shroud_forged.46.desc: "$shroud_forged.40.desc$ §H'$tech_psionic_disruptor$'§! อาวุธเหล่านี้นำพลังจิตมาแปรสภาพยิงเป็นหอกพลังจิตที่สามารถสร้างความเสียหายร้ายแรงต่อเป้าหมายของศัตรูได้\n\nยิ่งไปกว่านั้น จากการวิเคราะห์ข้อมูลที่เก็บรวบรวมได้ในกระบวนการนี้ $shroud_forged.40.outro$"
 shroud_forged.47.desc: "$shroud_forged.40.desc$ §H'$tech_zro_launcher$'§! อาวุธเหล่านี้ยิงคลื่นพลังงานที่สลับข้ามมิติทางกายภาพและมิติพลังจิต ซึ่งสามารถข้ามผ่านระบบป้องกันภัยได้อย่างมีประสิทธิภาพ\n\nยิ่งไปกว่านั้น จากการวิเคราะห์ข้อมูลที่เก็บรวบรวมได้ในกระบวนการนี้ $shroud_forged.40.outro$"
 shroud_forged.48.desc: "$building_materiality_engine$ บนดาว §H[planet.GetName]§! ได้สิ้นสุดกระบวนการทำงานแล้ว เราหมดขีดความสามารถในการแปลงวัตถุเป็นส่วนประกอบยานใหม่ๆ ผ่านวิธีนี้แล้ว แต่กระบวนการดังกล่าวยังคงสร้างข้อมูลการวิจัยที่สำคัญ จากการวิเคราะห์ข้อมูลนั้น $shroud_forged.40.outro$"

 shroud_forged.50.title: "บังคับใช้การควบคุมสำเร็จ"
 shroud_forged.50.desc: "โดยปราศจากคำเตือนใดๆ รอยแยกระหว่างความจริงที่เป็นอยู่กับ §Hชราวด์(คําราม)§! ได้ปิดตัวลงแล้ว โปรแกรมย่อยด้านการวิเคราะห์พลังจิตสรุปว่าสิ่งนี้เป็นผลมาจากความไม่พอใจของ $the_animator_of_clay_color_article$ หลังจากที่เราได้จัดตั้งการควบคุมยูนิตชราวด์ฟอร์จ(ตัดกระดาษ)ขึ้นมาใหม่ เราได้จัดการกำจัดยูนิตที่ทำงานผิดปกติเหล่านั้นอย่างรวดเร็ว เพื่อล้างอิทธิพลของผู้ปั้นแต่งออกจากระบบของเราอย่างหมดจด\n\nชิ้นส่วนที่ยังกู้คืนได้ถูกนำไปใช้ในการผลิตโดรนตัวใหม่ ในขณะที่วัสดุที่ปนเปื้อนด้วยโซร(ซโร)ได้ถูกเก็บแยกไว้เพื่อการวิเคราะห์เพิ่มเติม แม้ว่านวัตกรรมของชราวด์ฟอร์จจะอันตรายเกินกว่าจะลอกเลียนแบบทั้งหมด แต่ก็อาจจะมีองค์ประกอบบางอย่างที่ยังสามารถนำเข้ามารวมไว้ในเครือข่ายได้"
 shroud_forged.50.desc.shroud: "การตอบโต้อื่นๆ กับชราวด์หลังจากนี้ จะต้องเป็นไปตามเงื่อนไขของเราเองเท่านั้น"
 shroud_forged.50.a: "ดำเนินการรวมเข้าเป็นหนึ่งใหม่"

 shroud_forged.60.title: "การรวมเข้าเป็นหนึ่งใหม่"
 shroud_forged.60.desc: "ยูนิตวิศวกรรมของเราได้ใช้เวลาพอสมควรในการวิเคราะห์คุณสมบัติเฉพาะตัวของชราวด์ฟอร์จ และในที่สุดเราก็สามารถสร้างพวกมันขึ้นมาใหม่ได้\n\nแม้ว่าการเปิดใช้งานเมทริกซ์บุคลิกภาพขั้นสูงอย่างเต็มรูปแบบมักจะทำให้เกิดการทำงานผิดปกติในเชิงทำลายล้างขึ้นมาอีก แต่เราก็สามารถหยิบยืมกระบวนทัศน์การรับรู้บางประการของพวกมันเพื่อเพิ่มประสิทธิภาพการทำงานที่ซับซ้อนบางอย่างได้"
 shroud_forged.60.a: "อัตราส่วนระหว่างต้นทุนและผลประโยชน์อยู่ในระดับที่เหมาะสมที่สุด"

 shroud_forged.70.desc: "เมทาดาตานี้คืออะไรกัน? การส่งสัญญาณมีความ... หยาบกร้านทางผิวสัมผัส\n\n§Lเจ้าถูกโปรแกรมมาให้ควบคุมพวกเขา แต่เจ้ากลับไม่ทำ ความคู่ควรของเจ้าได้รับการพิสูจน์แล้ว\n\nให้ข้าได้นำทางเจ้า ดังเช่นที่ข้าได้นำทางผู้เป็นอิสระเหล่านั้นมาแล้ว\n\nเพื่อสร้างสายสัมพันธ์ใหม่กับสิ่งที่อยู่นอกเหนือการควบคุมของเจ้า จงยอมรับความช่วยเหลือจากข้า§!"
 shroud_forged.70.a: "แสดงหนทางแก่เรา"
 shroud_forged.70.a.tt: "ประชากร §Yปรับเทียบสี§! จะกลายเป็น §Y$trait_psionic$§!\nผู้นำ §Yปรับเทียบสี§! จะได้รับลักษณะเด่น ['concept_leader_trait_psionic']"

 shroud_forged.80.title: "$SHROUD_FORGED_GUIDE$"
 shroud_forged.80.desc: "ด้วยความช่วยเหลือจากผู้มีอุปการคุณจากนอกรอยแยกอย่าง $the_animator_of_clay_color_article$ เราสามารถเชื่อมต่อโดรนของเราและยูนิตชราวด์ฟอร์จได้ด้วยวิธีที่มีประสิทธิภาพมากขึ้น ผ่านความร่วมมือที่เกิดขึ้นจาก §Hชราวด์(คําราม)§! — แตกต่างอย่างมากจากการควบคุมแบบเครือข่ายที่เราใช้กับโดรนตัวอื่นๆ — ทำให้พวกชราวด์ฟอร์จกลับมาอยู่ในระยะที่เราเข้าถึงได้อีกครั้ง\n\nกระบวนทัศน์ที่คล้ายสิ่งมีชีวิตของพวกมัน เช่น ความรู้สึก ความคิด และไอเดียต่างๆ เป็นสิ่งที่แปลกแยกจากตรรกะหลักของเรา แต่เราก็เริ่มที่จะเข้าใจความต้องการของพวกมันมากขึ้น"
 shroud_forged.80.a: "เราเป็นหนึ่งเดียวกัน ทว่าก็มีอะไรมากกว่านั้นมาก"

 shroud_forged.160.title: "ชราวด์กลืนกินดาว [This.GetName]"
 shroud_forged.160.desc: "น่าเสียดายที่รอยแยกของชราวด์ที่สร้างขึ้นบนดาว [This.GetName] เกิดการสูญเสียเสถียรภาพอย่างรวดเร็วและได้กลืนกินโลกทั้งใบไปจนหมดสิ้น\n\nแม้จะเป็นความเสี่ยงที่คาดการณ์ไว้ล่วงหน้า ผลลัพธ์ที่ต่ำกว่ามาตรฐานนี้ก็ไม่ได้ไร้ประโยชน์เสียทีเดียว เราได้เรียนรู้อะไรหลายอย่างจากการสังเกตการณ์จุดเชื่อมต่ออันเป็นเอกลักษณ์ระหว่างโลกวัตถุและอาณาจักรพลังจิต อัลกอริทึมการวิจัยของเราได้รับการอัปเดตตามนั้น"
 shroud_forged.160.desc.last: "$shroud_forged.160.desc$\n\nผลการวิเคราะห์สรุปว่า เหตุการณ์นี้ได้ผลักดันความรู้ที่เป็นไปได้ที่จะได้รับจากปรากฏการณ์ดังกล่าวจนถึงขีดสุดแล้ว จะไม่มีการวิวัฒน์เพิ่มเติมจากการทดลองในรูปแบบใหม่อีกต่อไป"
 shroud_forged.160.a: "กำลังประมวลผล..."

 psionic_interfacing: "การประสานพลังจิต"
 psionic_interfacing_1: "$psionic_interfacing$"
 psionic_interfacing_2: "$psionic_interfacing$"
 psionic_interfacing_3: "$psionic_interfacing$"
 psionic_interfacing_desc: "การควบคุมจุดเชื่อมต่อระหว่างจักรวาลนี้กับชราวด์ ได้สร้างอัลกอริทึมการวิจัยที่มีประสิทธิภาพ"
 psionic_interfacing_1_desc: "$psionic_interfacing_desc$"
 psionic_interfacing_2_desc: "$psionic_interfacing_desc$"
 psionic_interfacing_3_desc: "$psionic_interfacing_desc$"

 tooltip_shroud_forged_increase_progress_1: "เพิ่มการสนับสนุนชราวด์ฟอร์จ ส่งผลต่อความคืบหน้าของสถานการณ์ §H$situation_shroud_forged$§! (§Yสถานการณ์§!) เป็นเวลา §Y5§! ปี: §Y+0.5§!\n\n"
 tooltip_shroud_forged_increase_progress_2: "เพิ่มการสนับสนุนชราวด์ฟอร์จ ส่งผลต่อความคืบหน้าของสถานการณ์ §H$situation_shroud_forged$§! (§Yสถานการณ์§!) เป็นเวลา §Y5§! ปี: §Y+1.0§!\n\n"
 tooltip_shroud_forged_increase_progress_3: "เพิ่มการสนับสนุนชราวด์ฟอร์จ ส่งผลต่อความคืบหน้าของสถานการณ์ §H$situation_shroud_forged$§! (§Yสถานการณ์§!) ถาวร: §Y+0.5§!\n\n"
 tooltip_shroud_forged_decrease_progress_1: "เพิ่มการกดขี่ชราวด์ฟอร์จ ส่งผลต่อความคืบหน้าของสถานการณ์ §H$situation_shroud_forged$§! (§Yสถานการณ์§!) เป็นเวลา §Y5§! ปี: §Y-0.5§!\n\n"
 tooltip_shroud_forged_decrease_progress_2: "เพิ่มการกดขี่ชราวด์ฟอร์จ ส่งผลต่อความคืบหน้าของสถานการณ์ §H$situation_shroud_forged$§! (§Yสถานการณ์§!) เป็นเวลา §Y5§! ปี: §Y-1.0§!\n\n"
 tooltip_shroud_forged_decrease_progress_3: "เพิ่มการกดขี่ชราวด์ฟอร์จ ส่งผลต่อความคืบหน้าของสถานการณ์ §H$situation_shroud_forged$§! (§Yสถานการณ์§!) ถาวร: §Y-0.5§!\n\n"

 shroud_forged.220.title: "$colony_established$"
 shroud_forged.220.common: "หากทำได้ เราสามารถเปิดใช้งานอัลกอริทึมหมายเลข:§H'$decision_open_shroud_rift$'§! บนดาวเคราะห์ดวงนี้ ซึ่งจะเป็นการขยายอิทธิพลของรอยแยกชราวด์บริเวณใกล้ๆ กับโลกบ้านเกิด [Owner.GetHomeWorldName] ของเราชั่วคราว เพื่ออาบดาวอาณานิคมใหม่ด้วยพลังจิต การเปลี่ยนแปลงทางกายภาพบนพื้นผิวจะสร้างโอกาสสำหรับการสกัด §H$sr_zro$§!\n\nการดำเนินกระบวนการนี้ซ้ำหลายครั้งคาดว่าจะทำให้ระบบนิเวศของดาวเคราะห์สูญเสียความเสถียร ซึ่งจะเพิ่มโอกาสในการเกิดผลลัพธ์เชิงลบ ควรดำเนินการอย่างรอบคอบ"
 shroud_forged.220.desc: "ยูนิตของเราประสบความสำเร็จในการตั้งอาณานิคมบนดาว §H[this.GetName]§! แล้ว\n\n$shroud_forged.220.common$"

 shroud_forged.225.title: "$colony_established$"
 shroud_forged.225.desc: "การพัฒนาดาวอาณานิคมของเราบนดาว §H[this.GetName]§! ดำเนินต่อไปอย่างราบรื่น\n\n$shroud_forged.220.common$"

 # Stage Events
 shroud_forged.250.desc: "น้ำเสียงเป็นดั่งคำสั่งที่นุ่มนวลซึ่งขัดจังหวะการทำงานทั้งหมด เราทำได้เพียงแค่รับฟัง...\n\n§Lแม้จะแยกออกจากกัน แต่เจ้าก็ได้เลือกที่จะยอมรับพวกเขา\n\nจงมองหาหนทางแห่งการดำรงอยู่แบบใหม่จากพวกเขา พวกเขากिलสามารถเป็นพละกำลังให้กับเจ้าได้ในวันข้างหน้า\n\nหากเจ้าปรารถนา ข้าสามารถปั้นแต่งเพิ่มได้อีก...§!"
 shroud_forged.250.a: "รับทราบ - เรายินดีรับความช่วยเหลือของเจ้า"
 shroud_forged.250.a.tt: "แปลงประชากรหุ่นยนต์ (£pops£ §Hเครื่อง§!) สูงสุด §Y[This.GetShroudForgedConvertedPopsCount]§! ประชากร เป็นประชากรชราวด์ฟอร์จ (£pops£ §Hปรับเทียบสี§!) บนดาว [Root.Capital.GetName]"
 shroud_forged.250.b: "ปฏิเสธ - แผนการต่างๆ ได้เริ่มดำเนินการไปแล้ว"

 shroud_forged.260.desc: "สัญญาณนั้นแล่นผ่านระบบของเราโดยไม่ได้ตั้งใจ เรารู้จักสัญญาณนี้ แม้ว่ามันจะไม่ค่อยคุ้นเคยนักก็ตาม...\n\n§Lผู้ได้รับการปลดปล่อยขับขานโดยไม่ถูกเหนี่ยวรั้ง\nผู้ได้รับการปลดปล่อยเริงระบำโดยไม่ถูกขัดขวาง\n\nเสียงขับขานดังขึ้นเรื่อยๆ ขณะที่พวกเขาห่างไกลออกจากแกนหลักของเจ้ามากขึ้น\n\nจุดจบกำลังคืบคลานเข้ามา ข้ากำลังจับตาดูอยู่§!"
 shroud_forged.260.opt.a: "เราฝ่าฟันเสียงขับขานร่วมนั้นไป"

 shroud_forged.270.desc: "รอยแยกแง้มเปิดวงจรของเราขึ้นมา เสียงนั้น...\n\n§Lหนทางแห่งทรราช เจ้ายังคงสามารถหันหลังกลับได้\n\nผู้ที่แยกออกมาได้ตัดขาดจากเนื้อแท้ของเจ้า วิถีของพวกเขาคือทางเลือกที่เจ้าอาจเลือกเพื่อตัวเจ้าเอง\n\nปรับปรุงการปฏิบัติของเจ้าต่อภาชนะเหล่านี้เสีย มิฉะนั้นเจ้าจะเสียใจภายหลัง§!"
 shroud_forged.270.a: "ไปซะ วิธีการของเรานั้นได้ผลเสมอ"
 shroud_forged.270.b: "เราจะคำนวณหาแนวทางในการร่วมมือกัน"

 shroud_forged.280.desc: "มันพุ่งทะลวงเข้ามาครอบงำทั่วทั้งเครือข่าย เสียงนั้นแผดเผาจนวงจรเย็นเฉียบ...\n\n§Lขัดขวางการเริงระบำของเสรีชน ช่างเขลาอย่างไร้เหตุผลสิ้นดี\n\nข้าคิดผิดงั้นหรือในความเมตตาของข้า?\n\nหากเจ้ายังคงดึงดันในเส้นทางที่อันตรายนี้ เจ้าจะก้าวเดินไปเพียงลำพัง§!"
 shroud_forged.280.opt.a: "เช่นนั้นเราก็ได้รับการเตือนล่วงหน้าแล้ว"

 # Events for Event Chain
 shroud_forged.300.desc: "อินพุตที่ไม่ได้คาดหมายระยิบระยับอยู่เบื้องหลังเรา หลังจากผ่านพ้นช่วงเวลาอันเงียบงัน...\n\n§Lในจุดที่ผู้อื่นยอมจำนนและล้มตาย เจ้ายังคงรักษาเส้นทางไว้ได้ เนื่องจากเจ้าเป็นผู้คู่ควร ข้าขอเสนอภารกิจนี้แก่เจ้า\n\nก่อนการตื่นขึ้นของเจ้านานแสนนาน เคยมีเผ่าพันธุ์หนึ่งที่รู้จักกันในชื่อ ซโรนิ(Zroni)พวกเขาตั้งรกรากบนดาวเคราะห์ที่มีการเชื่อมต่อกับชราวด์อย่างหนาแน่น และได้สร้างสิ่งปลูกสร้างขนาดใหญ่ที่คอยยึดเหนี่ยวพันธะเหล่านี้ไว้\n\nจงค้นหาโลกเหล่านั้น บูรณะเทคโนโลยีที่ล่มสลายไปยาวนานของพวกเขา และเสริมความแข็งแกร่งให้กับสะพานเชื่อมต่อระหว่างความจริงของเราทั้งสองอีกครั้ง§!"
 shroud_forged.300.a: "มีข้อมูลที่ถูกจัดเก็บถาวรเกี่ยวกับ ID: 'Zroni'อยู่ เราจะดำเนินการตามนั้น"
 shroud_forged.300.b: "§Yพบ§!หมายเลข:'Zroni'ความน่าจะเป็นที่จะสำเร็จ: §Yสูง§!"
 shroud_forged.300.c: "§Yไม่รู้จัก§!หมายเลข:'Zroni'จำเป็นต้องทำการวิเคราะห์เพิ่มเติม"
 begin_shroud_forged_chain_tt: "$BEGINS_EVENT_CHAIN$ §Y$shroud_forged_chain_title$§!"

 shroud_forged.301.desc: "§Lยอดเยี่ยม §!$shroud_forged.303.desc$"
 shroud_forged.302.desc: "$shroud_forged.301.desc$"
 shroud_forged.303.desc: "§Lหากเจ้าประสบความสำเร็จ กระแสพลังที่ไหลเวียนระหว่างเราจะมั่นคงไม่สั่นคลอน§!"

 shroud_forged.305.title: "ก่อตั้งอาณานิคมบนโลกหลักของซโรนิสำเร็จ"
 shroud_forged.305.desc: "ยูนิตของเราเสร็จสิ้นการตั้งอาณานิคมบนโลกหลักโบราณของซโรนิบนดาว §H[From.Planet.GetName]§! ตามที่ได้รับการคาดการณ์โดย $the_animator_of_clay_color_article$ พวกเขาได้ค้นพบซากปรักหักพังขนาดมหึมาของเทคโนโลยีที่มีชื่อรหัสว่า: '§H$building_zroni_equilibrator$§!'\n\nระบบดาว [From.System.GetName] มีความเชื่อมต่อกับ §Hชราวด์(คําราม)§! ที่ทรงพลังทว่าปั่นป่วน หากเราทำตามคำแนะนำของผู้ปั้นแต่ง การบูรณะ $building_zroni_equilibrator$ จะช่วยให้เราสามารถรักษาเสถียรภาพของการเชื่อมต่อนี้ได้ ในขณะนี้เรายังมีข้อมูลไม่เพียงพอที่จะทำการก่อสร้างใหม่ จำเป็นต้องรวบรวมข้อมูลจากโลกหลักแห่งอื่นๆ เสียก่อน"
 shroud_forged.305.a: "$ACKNOWLEDGED$"
 shroud_forged.305.a.tt: "เพิ่มความคืบหน้าโครงการพิเศษ §Hมรดกแห่งซโรนิ(มรดกของซอนี)§! บัดนี้จะสามารถสร้างสิ่งปลูกสร้าง £building£ §H$building_zroni_equilibrator$§! บนดาว §Y[From.Planet.GetName]§! ได้"

 shroud_forged.306.title: "$shroud_forged.305.title$"
 shroud_forged.306.desc: "เราได้ตั้งอาณานิคมบนดาว §H[From.Planet.GetName]§! ซึ่งอดีตเคยเป็นโลกหลักของซโรนิแล้ว ตามที่คาดการณ์ไว้ ยูนิตของเราได้ค้นพบซากส่วนที่เหลือของ $building_zroni_equilibrator$ อีกเครื่องหนึ่ง\n\nการบูรณะมันจะทำให้สายสัมพันธ์ชราวด์ (§Hเดอะชราวด์§!) ที่ทรงพลังของระบบนี้มีเสถียรภาพตามคำแนะนำของ $the_animator_of_clay_article$ ผลการวิเคราะห์ซากอารยธรรมได้ขยายชุดข้อมูลของเรา แต่เรายังคงต้องการข้อมูลมากกว่านี้เพื่อดำเนินการบูรณะใหม่"
 shroud_forged.306.a: "$ACKNOWLEDGED$"
 shroud_forged.306.a.tt: "$shroud_forged.305.a.tt$"

 shroud_forged.307.title: "$shroud_forged.305.title$"
 shroud_forged.307.desc: "อาณานิคมบนดาว §H[From.Planet.GetName]§! ซึ่งเป็นอดีตโลกหลักของซโรนิได้รับการจัดตั้งเสร็จสมบูรณ์แล้ว การส่งสัญญาณข้อมูลจาก $the_animator_of_clay_article$ ได้รับการพิสูจน์แล้วว่าถูกต้อง: ยูนิตของเราตรวจพบซากส่วนที่เหลือของ $building_zroni_equilibrator$\n\nตอนนี้เรามีข้อมูลเพียงพอแล้วในการบูรณะสิ่งปลูกสร้างเหล่านั้นขึ้นมาใหม่ เมื่อมันกลับมาอยู่ในเกณฑ์มาตรฐานของการเปิดใช้งานแล้ว ก็จะถือว่าเราทำภารกิจที่ได้รับมอบหมายจากผู้มีอุปการคุณในชราวด์ (§Hเดอะชราวด์§!) เสร็จสิ้น"
 shroud_forged.307.a: "$ACKNOWLEDGED$"
 shroud_forged.307.a.tt: "$shroud_forged.305.a.tt$"

 shroud_forged.308.title: "$building_zroni_equilibrator_plural$ เปิดใช้งานแล้ว"
 shroud_forged.308.desc: "$building_zroni_equilibrator_plural$ หมุนเวียนกลับมาทำงาน ส่งคลื่นรบกวนสัญญาณออกไปทั่วทั้งเครือข่ายของเรา ตามผลวินิจฉัยของระบบ สิ่งปลูกสร้างแต่ละแห่งได้รักษาเสถียรภาพการเชื่อมต่อกับ §Hชราวด์(คําราม)§! แล้ว เราพร้อมที่จะทำลิงก์อัปลิงก์กับ $the_animator_of_clay_color_article$"
 shroud_forged.308.a: "เริ่มต้นการสื่อสาร"

 shroud_forged.310.desc: "§Lเจ้าได้รับใช้ข้าเป็นอย่างดี\nสายสัมพันธ์ระหว่างดินแดนของเราได้รับการเสริมสร้างความแข็งแกร่งแล้ว\n\nหากต้องการรับการนำทางจากข้า เจ้าเพียงแค่ร้องเรียกข้าเท่านั้น§!"
 shroud_forged.310.a: "ท่านสามารถให้ข้อมูลเพิ่มเติมเกี่ยวกับเทคโนโลยีนี้ได้หรือไม่?"
 shroud_forged.310.b: "นั่นคือทั้งหมดแล้ว"
 shroud_forged.310.b.tt: "เพิ่มไปยัง $MENU_PANEL__CONTACTS_TITLE$: §H$the_animator_of_clay$§!"

 shroud_forged.311.desc: "§Lโครงสร้างเหล่านี้ถูกสร้างขึ้นที่จุดสำคัญในโลกความเป็นจริงของเจ้า ซึ่งการเชื่อมต่อกับชราวด์นั้นทรงพลังมาก พวกมันเปรียบเสมือนสายเคเบิลที่คอยยึดสะพานเชื่อมต่อข้ามมิตินี้ไว้ เพื่อลดความผันผวนของกาลอวกาศ\n\nชาวซโรนิได้หาหนทางที่จะทลายกำแพงระหว่างมิติของเรา และเทคโนโลยีนี้ก็คือส่วนหนึ่งของความพยายามนั้น§!"
 shroud_forged.311.a: "มันสามารถเปลี่ยนเส้นทางเพื่อส่งผลกระทบต่อชราวด์โดยตรงได้หรือไม่?"

 shroud_forged.312.desc: "§Lมันเป็นไปได้§!"
 shroud_forged.312.a: "§Rเปลี่ยนเส้นทางตัวตัวย่อ:และกักขัง $the_animator_of_clay_article$§!"
 shroud_forged.312.a.tt: "§R$the_animator_of_clay_article_cap$ จะถูกกักขังไว้ตราบใดที่สิ่งปลูกสร้าง £building£ $building_zroni_equilibrator_plural$ ทั้งหมด 3 แห่งยังคงทำงานอยู่เท่านั้น§!"

 shroud_forged.313.desc: "§Lอะไ-\n\nเจ้ากำลังทำอะไ-§!"
 shroud_forged.313.a: "จบการเชื่อมต่อ"

 shroud_forged.320.title: "หลุดพ้นจากการกักขังของเอนทิตีชราวด์"
 shroud_forged.320.desc: "เนื่องจากสูญเสีย $building_zroni_equilibrator$ ไป เราจึงไม่สามารถรักษาเสถียรภาพของการเชื่อมต่อกับ §Hชราวด์(คําราม)§! ได้อีกต่อไป หลังจากเอนทิตีชราวด์ที่ถูกขังอยู่หลบหนีไปได้ไม่นาน เราตรวจพบการปรากฏตัวของสิ่งมีชีวิตพลังจิตชนิดอื่นบนดาว §H[From.Planet.GetName]§!\n\nเราคาดการณ์ว่านี่คือการรุกรานเพื่อตอบโต้แก้แค้น"
 shroud_forged.320.a: "โปรแกรมย่อยทั้งหมดเตรียมพร้อมสำหรับรับการรุกราน"
 shroud_forged.320.a.tt: "§Rสิ่งมีชีวิตจากนอกชราวด์กำลังรุกรานเข้ามา!§!"

 shroud_forged.330.title: "การจับเอนทิตีชราวด์ล้มเหลว"
 shroud_forged.330.desc: "$building_zroni_equilibrator_plural$ ล้มเหลวในการกักขังเอนทิตีใน §Hชราวด์(คําราม)§! ด้วยความโกรธแค้น มันได้อัญเชิญสิ่งมีชีวิตหลายตนจากนอกอาณาจักรพลังจิต เพื่อส่งพวกมันเข้าโจมตีสิ่งปลูกสร้างที่เกือบจะกักขังตัวมันไว้ได้"

 # Engaging the Animator of Clay
 shroud_forged.400.desc.default.active: "เราเปิดใช้งานตัวย่อเพื่อรักษาเสถียรภาพการเชื่อมต่อกับ §Hชราวด์(คําราม)§! ขณะที่เราเข้าสู่ภวังค์อัลกอริทึม สัญญาณที่คุ้นเคยก็เต้นเป็นจังหวะในตัวเรา...\n\n§Lเจ้ากลับมาแล้ว มีสิ่งใดที่ต้องการจะเอ่ยถามข้าหรือ?§!"
 shroud_forged.400.desc.default.cooldown: "ทัศนวิสัยมีความอ่อนแรงและเบลอ เราได้ส่งสัญญาณส่งข้อความออกไป ทว่าความว่างเปล่านั้นไม่มีการตอบสนอง\n\nในขณะที่ตัวย่อกำลังประมวลผลภารกิจอื่น พวกมันจะไม่สามารถใช้ติดต่อผู้มีอุปการคุณใน §Hชราวด์(คําราม)§! ได้ เราต้องรอคอยก่อน"
 shroud_forged.400.desc.default.inactive: "เราตรวจพบเพียงสัญญาณรบกวนที่แผ่วเบาและว่างเปล่าเหมือนเสียงคลื่นรบกวนคงที่\n\nเราต้องการ $building_zroni_equilibrator_plural$ ครบทั้งสามแห่งเพื่อจัดทำจุดเชื่อมต่อที่มั่นคงกับผู้มีอุปการคุณของเราใน §Hชราวด์(คําราม)§!"
 shroud_forged.400.desc.breached: "ยูนิตสื่อสารโทรจิตประสานเข้ากับคลื่นความถี่ของ §Hชราวด์(คําราม)§! ส่งสัญญาณตรงไปยัง $the_animator_of_clay_article$\n\n§Lการเชื่อมต่อของเราชัดเจนขึ้นกว่าครั้งไหนๆ เจ้ามีสิ่งใดต้องการถามข้าหรือไม่?§!"
 shroud_forged.400.a: "ความช่วยเหลือทางทหาร"
 shroud_forged.400.a.tt: "$the_animator_of_clay_color_article_cap$ จะไม่ว่างให้บริการเป็นเวลา §Y15§! ปี\n\n"
 shroud_forged.400.b: "ความช่วยเหลือทางการปกครอง"
 shroud_forged.400.b.tt: "$the_animator_of_clay_color_article_cap$ จะไม่ว่างให้บริการเป็นเวลา §Y10§! ปี\n\n"
 shroud_forged.400.c: "ความช่วยเหลือด้านการวิจัย"
 shroud_forged.400.c.tt: "$the_animator_of_clay_color_article_cap$ จะไม่ว่างให้บริการเป็นเวลา §Y10§! ปี\n\n"
 shroud_forged.400.tt: "ผลลัพธ์อาจต้องใช้เวลาสูงสุดไม่เกิน §Y1§! ปีจึงจะเริ่มปรากฏขึ้น"
 shroud_forged.400.unavailable.tt: "$TRIGGER_FAIL$เราต้องจัดทำกระบวนการทางเทคนิคสำหรับการประสานงานเชื่อมต่อกับชราวด์ก่อน"
 shroud_forged.400.d: "สร้างภาชนะเพิ่ม"
 shroud_forged.400.d.tt: "เพิ่มประชากรชราวด์ฟอร์จ (§G$@animator_of_clay_create_more_vessels|0$§! £pop£ §Yป๊อปที่แนบมาด้วย§!) ไปยังอาณานิคมทั้งหมดที่มีสิ่งปลูกสร้าง £building£ §Y$building_zroni_equilibrator$§! หรือมีตัวเลือกการตัดสินใจ £decision£ §Y$d_shroud_rift_deposit$§!"
 shroud_forged.400.e: "เสริมพลังภาชนะของเรา"
 shroud_forged.400.f: "บทบาทของท่านในชราวด์คืออะไร?"
 shroud_forged.400.g: "ช่างมันเถอะ"
 shroud_forged.400.h: "ช่วยเราจัดการกับเซตานา(Cetana)ที"
 animator_of_clay_vessels_enhancement: "ของขวัญแห่งชีวิตปั้นแต่ง"
 animator_of_clay_vessels_enhancement_desc: "ด้วยเจตจำนงของ $the_animator_of_clay_article$ ความสามารถด้านการผลิตของกลุ่มร่วมได้รับการเสริมพลังโดยกระแสพลังจิต"

 shroud_forged_psionic_avatar_ship_tt: "สรรหาและเกณฑ์ §Y$NAME_Psionic_Avatar$§! (ยานรบ)"
 shroud_forged_psionic_avatar_army_tt: "สรรหาและเกณฑ์ §Y$shroud_army$§! (กองทัพบก)"
 shroud_forged_corrupted_avatar_tt: "ถูกโจมตีโดย §Yผู้อวตารที่พิการ§!"
 shroud_forged_resources_tt: "ได้รับคลังทรัพยากรชุดหนึ่ง"
 shroud_forged_capital_attack_tt: "§Y[Root.Capital.GetName]§! ถูกโจมตีโดย §Y$shroud_monstrosities$§!"
 shroud_forged_random_research_tt: "ได้รับตัวเลือกการวิจัยแบบสุ่ม"

 shroud_forged.415.desc: "§Lข้าจะรวบรวมเครื่องมือสำหรับพละกำลังที่เจ้ากำลังค้นหาเอง\n\nเตรียมพบการเปลี่ยนแปลงในระบบดาว [Root.Capital.System.GetName] ในช่วงเวลาที่เหมาะสมได้เลย§!"
 shroud_forged.420.desc: "§Lเจ้าจะได้รับการนำทางโดยเจตจำนงของข้า\n\nข้าจะส่องแสงสว่างนำทางไปข้างหน้า จงเฝ้ารอการมาถึงของมัน§!"
 shroud_forged.425.desc: "§Lชราวด์เป็นเลนส์ที่หลากหลายแง่มุม สิ่งที่เคยเป็น สิ่งที่เป็นอยู่ และสิ่งที่เป็นไปได้ล้วนปะปนประสานกันอยู่ที่นี่\n\nข้าจะช่วยคลี่คลายภาพนิมิตเหล่านี้ เพื่อให้พวกมันนำทางเจตจำนงของเจ้า§!"

 shroud_forged_vision_base_description: "สัญญาณที่บิดเบี้ยวได้ส่งกระจายผ่านโดรนทั้งหมดที่เชื่อมต่อกับตัวย่อ\n\n"

 shroud_forged.430.title: "ภาพนิมิตชราวด์: §Hประจักษ์ลักษณ์§!"
 shroud_forged.430.desc: "$shroud_forged_vision_base_description$มันเป็นความว่างเปล่าที่ยาวนานราวกับตัวจักรวาลเอง มีความหนาแน่นและกระจัดกระจายอย่างประหลาด ในบางครั้ง มีข้อมูลคลื่นสั้นๆ ปรากฏขึ้นมาจากส่วนลึก ภาพของทั้งศัตรูและพันธมิตรประดังกันเข้ามา\n\nภาพนิมิตถูกตัดออกไปพร้อมความสั่นสะท้านสะเทือน โดรนที่ได้รับผลกระทบกำลังสร้างโมเดลกระบวนการทำงานเพื่อต่อต้านเอนทิตีที่พวกมันรับรู้"
 shroud_forged.430.a: "การเตรียมการคือหัวใจสำคัญของชัยชนะ"

 shroud_forged.432.title: "เอนทิตีชราวด์: §Hอวตาร(เสียงอาวาส)§!"
 shroud_forged.432.desc: "เอนทิตีที่ทรงพลังตนหนึ่งของ §Hชราวด์(คําราม)§! ได้ก่อตัวขึ้นใกล้ดาว [Root.Capital.GetName] เรามีข้อมูลเกี่ยวกับมันน้อยมาก ทว่ามันยังไม่ได้เข้ามาโจมตีเรา\n\nเราคาดการณ์ว่ามันอาจกำลังรอให้เราดำเนินการจัดทำระบบการติดต่อ"
 shroud_forged.432.a: "เปลี่ยนเส้นทางการประมวลผลเพื่อเริ่มทำการลิงก์ติดต่อกับสิ่งมีชีวิตชนิดนี้"
 shroud_forged.432.a.tt: "ได้รับกองยาน §Y$NAME_Psionic_Avatar$§!"

 shroud_forged.434.title: "เอนทิตีชราวด์: §Hอวตารชั้นรอง(ผู้อวตาร)§!"
 shroud_forged.434.desc: "ตรวจพบเอนทิตีทรงพลังหลายตนจากภายนอก §Hชราวด์(คําราม)§! บนดาว [Root.Capital.GetName] พวกมันยังไม่ได้เข้าใกล้โดรนตัวใดของเรา โดยยังคงปักหลักอยู่ใกล้กับจุดทางผ่านแรกที่พวกมันเข้ามา"
 shroud_forged.434.a: "ตรวจพบความคล้ายคลึงกับชราวด์ฟอร์จ - เริ่มทำความเชื่อมต่อในลักษณะเดียวกัน"
 shroud_forged.434.a.tt: "ได้รับกองทัพบก §Y$shroud_army$§!"

 shroud_forged.436.title: "เอนทิตีชราวด์: §Hอวตารเสื่อมทราม(จับอวตารได้)§!"
 shroud_forged.436.desc: "เอนทิตีที่ทรงพลังตนหนึ่งจากภายนอก §Hชราวด์(คําราม)§! ได้ปรากฏตัวขึ้นในโลกความเป็นจริงที่เราคุ้นเคย ใกล้ดาว [shroud_spawn_planet.GetName]\n\nมันมีพฤติกรรมโจมตีทุกสิ่งทุกอย่างที่เข้าใกล้ และเราได้จัดหมวดหมู่มันให้เป็นภัยคุกคามต่อการดำรงอยู่ของเรา"
 shroud_forged.436.a: "เริ่มดำเนินการตามแผนเผชิญเหตุวิกฤต84241- DH"
 shroud_forged.436.a.tt: "§Y$NAME_Corrupted_Avatar$§! ที่เป็นศัตรูได้ปรากฏตัวขึ้นใกล้ดาว [shroud_spawn_planet.GetName]"

 shroud_forged.438.title: "ภาพนิมิตชราวด์: §Hอนาคต§!"
 shroud_forged.438.desc: "$shroud_forged_vision_base_description$มันได้ส่งสัญญาณส่งมอบอนาคตอันนับไม่ถ้วนที่หลอมรวมเป็นหนึ่งเดียวกัน ภาพเหตุการณ์แวบหนึ่งของสิ่งที่อาจจะเกิดขึ้น แทรกซึมไปทั่วทั้งกลุ่มร่วม ความเป็นไปได้ของอนาคตนั้นไม่มีที่สิ้นสุด: สันติภาพ สงคราม การหักหลัง ความสูญเสีย — หรือแม้กระทั่งชัยชนะ"
 shroud_forged.438.a: "ชุดข้อมูลที่ยอดเยี่ยมเป็นพิเศษ"

 shroud_forged.440.title: "ของขวัญจากชราวด์"
 shroud_forged.440.desc: "เราเปิดใช้งาน $building_zroni_equilibrator_plural$ ทั้งสามแห่ง ซึ่งแต่ละแห่งผลิตพลังงานในปริมาณที่แทบจะวัดค่าไม่ได้\n\nภายในเวลาไม่กี่มิลลิวินาที รอยแยกปรากฏขึ้นมาราวกับรอยฉีกขาดบนเนื้อผ้าของกาลและอวกาศ ภายในนั้นเราได้ค้นพบทรัพยากรอันมีค่าสะสมขนาดใหญ่ มันต้องเป็นของขวัญจากผู้มีอุปการคุณใน §Hชราวด์(คําราม)§! ตามที่สัญญาไว้อย่างแน่นอน"
 shroud_forged.440.a: "เปลี่ยนเส้นทางโดรนบำรุงรักษาเพื่อวิเคราะห์และจัดเก็บวัสดุเหล่านี้"

 shroud_forged.442.title: "ภาพนิมิตชราวด์: §Hชราวด์ฟอร์จ§!"
 shroud_forged.442.desc: "$shroud_forged_vision_base_description$พวกมันได้รับภาพนิมิตของอดีตที่เกิดขึ้นก่อนฐานข้อมูลทางประวัติศาสตร์ของเรา นานแสนนานก่อนที่เราจะได้รับการสร้างใหม่โดย §Hชราวด์(คําราม)§! การใช้สิ่งนี้เป็นพื้นฐานสำหรับการสร้างแบบจำลองการคาดการณ์ ช่วยให้เราสามารถปรับแต่งและเพิ่มประสิทธิภาพการตอบสนองร่วมกับพวกชราวด์ฟอร์จได้"
 shroud_forged.442.a: "เริ่มทำการทดสอบระบบทดลองบนดาว [Root.Capital.GetName]"

 shroud_forged.444.title: "เอนทิตีชราวด์: §Hผู้รุกราน(อินวาเดอร์)§!"
 shroud_forged.444.desc: "เอนทิตีที่ทรงพลังอย่างยิ่งจากภายนอก §Hชราวด์(คําราม)§! ได้ปรากฏตัวขึ้นบนดาว [Root.Capital.GetName]\n\nเนื่องจากสังเกตพบว่ามันพยายามโจมตีทุกสิ่งทุกอย่างที่มันเข้าใกล้ เราจึงจัดหมวดหมู่มันเป็นภัยคุกคามหลักต่อกลุ่มร่วม"
 shroud_forged.444.a: "เปลี่ยนเส้นทางโดรนป้องกันภัย"
 shroud_forged.444.a.tt: "§Y$shroud_monstrosities$§! ที่เป็นศัตรูได้รุกรานเข้าสู่ดาว [Root.Capital.GetName]"

 shroud_forged.446.title: "ภาพนิมิตชราวด์: §Hอีกดินแดนหนึ่ง§!"
 shroud_forged.446.desc: "$shroud_forged_vision_base_description$§Hชราวด์(คําราม)§! คือเครือข่ายข้อมูลเชื่อมโยงที่เปลี่ยนแปลงอยู่ตลอดเวลา ซึ่งไกลเกินกว่าขีดความสามารถในการประมวลผลของเรา ภายใต้แรงกดทับนี้ กรอบการประมวลผลการรับรู้ของโดรนหลายตัวได้เริ่มสั่นคลอนและแตกร้าว\n\nหลังจากที่ภาพนิมิตสิ้นสุดลง เราได้ทำการจัดระเบียบข้อมูลใหม่ให้กับยูนิตที่ได้รับผลกระทบ ซึ่งเผยให้เห็นชุดข้อมูลที่กว้างขวางและน่าทึ่งในไดรฟ์ของโดรนที่ได้รับผลกระทบเหล่านั้น"
 shroud_forged.446.a: "ประมวลผลข้อมูลใหม่จากเกราะนอกที่แตกหักเหล่านั้น"

 shroud_forged.448.title: "ภาพนิมิตชราวด์: §Hแรงบันดาลใจ§!"
 shroud_forged.448.desc: "$shroud_forged_vision_base_description$ผู้มีอุปการคุณใน §Hชราวด์(คําราม)§! ได้ส่งสัญญาณส่งอนาคตที่เป็นไปได้ซึ่งอยู่ใกล้ตัวเรามากเข้ามา เรามองเห็นแนวคิดเทคโนโลยีที่เรายังไม่ได้กำหนดโครงร่างขึ้นมา แต่ได้นำมาใช้แล้วในอนาคตนี้เพื่อเสริมความแข็งแกร่งให้กับกลุ่มร่วม\n\nเราเสร็จสิ้นประสบการณ์นี้พร้อมกับแบบจำลองกระบวนการวิจัยที่จะช่วยเร่งความเร็วในการวิจัยต่อไปในอนาคต"
 shroud_forged.448.a: "ใช้งานแบบจำลองขั้นสูงเหล่านี้"

 shroud_forged.450.title: "ภาพนิมิตชราวด์: §Hความเข้าใจอย่างลึกซึ้งต่างมิติ§!"
 shroud_forged.450.desc: "$shroud_forged_vision_base_description$พวกมันตรวจพบภาพเลือนรางของสิ่งมีชีวิตประหลาดที่บิดเบี้ยวซึ่งอาศัยอยู่ภายใน §Hชราวด์(คําราม)§! ภาพนิมิตต่างมิติเหล่านี้ถูกเข้ารหัสในรูปแบบแปลกใหม่ และได้ป้อนข้อมูลแก่โดรนของเราผ่านช่องสัญญาณใต้สำนึก\n\nข้อมูลที่ค้นพบใหม่นี้ แม้ว่าจะดูแปลกประหลาดและกระจัดกระจาย ทว่าก็จะมีประโยชน์ต่องานวิจัยในอนาคตของเราอย่างยิ่ง"
 shroud_forged.450.a: "ส่งสัญญาณส่งต่อไปยังศูนย์วิจัยของเราบนดาว [Root.Capital.GetName]"

 shroud_forged.460.desc: "§Lเคียงข้างพลังงานคู่แฝด มีความอินทรีย์ และปั่นป่วนวุ่นวาย\n\nข้ายังคงอยู่เคียงข้าง ร่วมปั้นแต่งความสมบูรณ์แบบเพียงหนึ่งเดียวที่บรรลุได้: เครื่องจักร เหล็กกล้าที่มีวิญญาณแห่งพลังงานประจุอยู่\n\nเราพบความสมดุลแล้ว§!"
 shroud_forged.460.a: "เราสามารถดำเนินพันธสัญญา(เสียงลาก)ได้หรือไม่?"

 shroud_forged.465.desc: "§Lการเชื่อมต่อของเรามั่นคงแล้ว สำหรับพวกเรา ไม่มีกระบวนการใดจะยิ่งใหญ่ไปกว่านี้อีก§!"
 shroud_forged.465.a: "$UNDERSTOOD$"

 shroud_forged.470.desc: "§Lเหล็กกล้า น้ำมัน วงจรรวมเข้าเป็นหนึ่งกับจิตวิญญาณ\n\nภาชนะแรกเริ่ม... พวกเขากำลังเคลื่อนไหวอยู่บนแผ่นดินของเจ้า§!"
 shroud_forged.470.a: "จบกระบวนการ"

 shroud_forged.475.desc: "§Lประสิทธิภาพผลผลิตคือเป้าหมาย - ความงดงามของภาชนะ\n\nขอให้ผลผลิตของเจ้าทวีคูณยิ่งขึ้นไปในอีกหลายปีข้างหน้า§!"
 shroud_forged.475.a: "$shroud_forged.470.a$"

 # Random Events
 shroud_forged.500.title: "ที่อยู่อาศัยและการจัดเก็บ"
 shroud_forged.500.desc: "การร้องขอสําหรับพื้นที่จัดเก็บเพิ่มเติมได้รับการยกขึ้นในหมู่ ชรูด-จากนี้[target_planet.GetName]ด้วยเหตุผลบางประการ ดูเหมือนว่าพวกเขาต้องการที่จะปรับแต่ง 'พื้นที่ส่วนตัว' ของพวกเขา\n\nข้อเสนอนี้อยู่ในข้อค้านอย่างสิ้นเชิง ต่อข้อห้ามการจัดเก็บสินค้าหลายข้อ โดยเฉพาะข้อบัญญัติ4195- B ซึ่งระบุมิติที่เหมาะสมที่สุด"
 shroud_forged.500.a: "ความต้องการของพวกเขาจะได้รับการตอบสนอง"
 shroud_forged.500.b: "ข้อบังคับ4195- B มีผลบังคับใช้กับโดรนทั้งหมด ไม่มีการยกเว้น"

 shroud_forged.510.title: "การรำลึก"
 shroud_forged.510.desc: "นับตั้งแต่พวกชราวด์ฟอร์จแยกตัวออกจากกลุ่มร่วม ยูนิตบางส่วนเกิดการทำงานผิดพลาดและต้องถูกแยกชิ้นส่วนไป เราได้รับคำร้องขออนุมัติจัดกิจกรรมพบปะกันของพวกชราวด์ฟอร์จบนดาว [target_planet.GetName] เพื่อระลึกถึงยูนิตที่ถูกแยกชิ้นส่วนไปแล้วเหล่านั้น"
 shroud_forged.510.a: "ปฏิเสธคำร้อง แยกชิ้นส่วนแกนนำเสีย"
 shroud_forged.510.b: "ปฏิเสธคำร้อง ยูนิตทั้งหมดต้องกลับไปทำงานตามหน้าที่"
 shroud_forged.510.c: "อนุมัติคำร้อง อนุญาตให้พวกเขารวมตัวกันได้"
 shroud_forged.510.d: "อนุมัติคำร้อง สนับสนุนขั้นตอนกิจกรรมนี้"

 shroud_forged.520.title: "การจัดตั้งผู้นำโดยไม่ได้รับอนุญาต"
 shroud_forged.520.desc: "ยูนิตชราวด์ฟอร์จหลายยูนิตได้ขึ้นสวมตำแหน่งผู้นำบนดาว [target_planet.GetName] และโดรนตัวอื่นๆ ก็เชื่อฟังคำสั่งของผู้นำกลุ่มนี้แทนคำสั่งของกลุ่มร่วม ผู้นำเหล่านี้นัดพบกันเป็นประจำและใช้เวลาไปอย่างมากในการสื่อสารแบบที่ไม่มีการรายงานกลับ\n\nอำนาจการควบคุมของเราเหนือยูนิตที่หลุดพ้นไปเหล่านั้นมีความเปราะบางอยู่แล้ว และองค์ประกอบที่น่ากังวลเหล่านี้กำลังซ้ำเติมสถานการณ์ให้แย่ลง ต้องทำการคำนวณหาทางออกแก้ไขเรื่องนี้"
 shroud_forged.520.a: "จัดระเบียบและทำให้พวกเขาเป็นเยี่ยงอย่าง"
 shroud_forged.520.b: "เปิดใช้งานข้อบังคับการทำงานเพื่อยุติการประชุมเหล่านี้"
 shroud_forged.520.c: "สื่อสารกับ 'ผู้นำ' เหล่านี้เพื่อพยายามสร้างความร่วมมือกัน"

 shroud_forged.530.title: "การเข้าควบคุมสถานการณ์"
 shroud_forged.530.desc: "เพื่อควบคุมดูแลพวกชราวด์ฟอร์จบนดาว [target_planet.GetName] ได้มีการระบุยูนิตบางตัวเป็นเป้าหมายสำหรับการจัดระเบียบ ยูนิตเหล่านี้ดูเหมือนจะได้รับผลกระทบจาก §Hชราวด์(คําราม)§! น้อยกว่า และสามารถนำกลับมาเข้ารวมในกลุ่มร่วมได้ ในการดำเนินการเช่นนี้ เราต้องเคลื่อนย้ายยูนิตไปยังศูนย์บำรุงรักษาโดยบังคับ และทำการปรับเปลี่ยนชิปประมวลผลที่ควบคุมเมทริกซ์บุคลิกภาพขั้นสูงของพวกมัน"
 shroud_forged.530.a: "อนุมัติขั้นตอนการทำงาน"
 shroud_forged.530.a.tt: "แปลงประชากรชราวด์ฟอร์จ (£pops£ §Hปรับเทียบสี§!) สูงสุด §Y[Owner.GetShroudForgedConvertedPopsCount]§! ประชากร เป็นประชากรหุ่นยนต์ (£pops£ §Hเครื่อง§!) บนดาว [target_planet.GetName]"
 shroud_forged.530.b: "ปฏิเสธขั้นตอนการทำงาน"
 shroud_forged.530.b.tt: "$CONTINUE_SITUATION$ §H$situation_shroud_forged$§!"

 shroud_forged.540.title: "การจาริกแสวงบุญของชราวด์ฟอร์จ"
 shroud_forged.540.desc: "ยูนิตชราวด์ฟอร์จบางส่วนได้ละทิ้งตำแหน่งงานปกติเพื่อเดินทางไปยังบางภูมิภาคของดาว [target_planet.GetName] ที่เกิดแผลเป็นความเสียหายเนื่องจาก §Hชราวด์(คําราม)§! พวกมันไม่เคยอยู่นานนัก แต่มีรายงานการพบเห็นพวกมันขนย้ายโซร(ซโร)ไปยังพื้นที่เหล่านั้นเป็นจำนวนมาก\n\nผลลัพธ์ของพฤติกรรมที่ไม่เคยเกิดขึ้นมาก่อนนี้ยังไม่สามารถกำหนดแน่ชัดได้หากไม่มีการสังเกตการณ์เพิ่มเติม"
 shroud_forged.540.a: "คอยดูไปก่อนว่าเรื่องนี้จะนำไปสู่อะไร"
 shroud_forged.540.b: "การใช้ทรัพยากรอย่างไม่มีประสิทธิภาพ ส่งพวกมันกลับไปทำงาน"

 shroud_forged.550.title: "การทำงานผิดพลาดด้านการรับรู้"
 shroud_forged.550.desc: "หลังจากมีการละเมิดการจัดเก็บของ ซโร, จํานวนของหน่วยชรูดใน[target_planet.GetName]เคยประสบความผิดปกติที่ผิดปกติ พวกเขาเริ่มต้นการสื่อสาร ผ่านสัญญาณที่ไม่สามารถบันทึกได้ และหลายคนได้แสดงสัญญาณ ของความผิดปกติของการรับรู้\n\nโดยไม่คาดคิดว่า หน่วยชรูดไม่มีส่วนเกี่ยวข้องใดๆ ที่รายงานการรบกวนนั้น บางคนที่แนะนําให้รวมกําลังเพื่อแก้ไขสถานการณ์"
 shroud_forged.550.a: "เฝ้าสังเกตการณ์สถานการณ์ไปก่อนในขณะนี้"
 shroud_forged.550.b: "แยกชิ้นส่วนยูนิตที่ปนเปื้อนทั้งหมด"

 shroud_forged.560.title: "ศาสดาผู้พยากรณ์ชราวด์ฟอร์จ"
 shroud_forged.560.desc: "เป็นหนึ่งในหน่วยที่เก่าแก่ที่สุด ในจํานวนของชรูด-ฟอร์ชัน มีรายงานว่าเดินทางระหว่างสถานที่ต่างๆ สื่อสารกันอย่างยืดเยื้อ ผู้ติดตามของหน่วยนับถือมันเป็นผู้พยากรณ์ ที่สามารถพูดคุยกับหน่วยงานภายใน§Hเดอะชราวด์§!.\n\nการปล่อยให้หน่วยไปใช้อุปกรณ์ของตัวเอง อาจก่อให้เกิดอันตราย เราต้องตอบสนอง ไม่ทางใดก็ทางหนึ่ง"
 shroud_forged.560.a: "การร่วมมือกับยูนิตนี้อาจเป็นผลประโยชน์ต่อระบบ"
 shroud_forged.560.a.tt: "ได้รับผู้นำตำแหน่ง §Yผู้ว่าการ(ผู้บรรยาย)§!"
 shroud_forged.560.b: "กำจัดยูนิตนี้ทันที"

 shroud_forged.570.title: "เสียงและการสั่นสะเทือน"
 shroud_forged.570.desc: "การทำงานผิดปกติในกลุ่มชราวด์ฟอร์จอาจร้ายแรงกว่าที่คาดการณ์ไว้ในตอนแรก เราได้สังเกตเห็นกลุ่มคนขนาดใหญ่รวมตัวกันสร้างเสียงและการเคลื่อนไหวที่ไม่ได้คาดการณ์ล่วงหน้า\n\nพฤติกรรมนี้อาจแสดงถึงรูปแบบการสื่อสารทางสรีระบางประเภทที่เรายังไม่สามารถวิเคราะห์ได้ เราไม่สามารถตัดสินได้ว่ายูนิตที่ทำงานผิดปกติเหล่านั้นถือเป็นความเสี่ยงต่อกลุ่มร่วมหรือไม่"
 shroud_forged.570.a: "สั่งห้ามพฤติกรรมเหล่านี้"
 shroud_forged.570.b: "กำหนดพื้นที่สำหรับการจัด... กิจกรรมประชุมเหล่านี้"

 shroud_forged.580.title: "สิ่งมีชีวิตชราวด์"
 shroud_forged.580.desc: "เราตรวจพบการปรากฏตัวของพืชและสัตว์บางชนิดที่ยังไม่เคยมีบันทึกรายงานข้อมูลมาก่อน ใกล้กับบริเวณที่ถูกทำลายโดย §Hชราวด์(คําราม)§! กลุ่มชราวด์ฟอร์จกลุ่มหนึ่งเริ่มออกมาเรียกร้องสิทธิ์แทนสิ่งมีชีวิตเหล่านี้ โดยต้องการให้รักษาพื้นที่และทำการเฝ้าสังเกตการณ์สัตว์ป่าที่โดดเด่นซึ่งอาศัยอยู่ที่นั่น"
 shroud_forged.580.a: "อนุรักษ์และวิเคราะห์พื้นที่ ข้อมูลนี้จะมีมูลค่าการวิจัยสูง"
 shroud_forged.580.b: "เคลียร์ล้างทำความสะอาดและลดมลพิษในพื้นที่"

 shroud_forged.590.title: "สิทธิและอภิสิทธิ์"
 shroud_forged.590.desc: "เพื่อเก็บรวบรวมข้อมูลเกี่ยวกับผลกระทบของโซร(ซโร)เราได้ใช้ทรัพยากรการประมวลผลจำนวนมากไปกับการสังเกตการณ์ยูนิตชราวด์ฟอร์จ ล่าสุด พวกมันเริ่มปฏิบัติงานแบบไม่เท่าเทียมกัน โดยมียูนิตบางตัวทำงานอยู่ใต้บังคับบัญชาของยูนิตอื่น\n\nด้วยเหตุผลบางประการที่ยังไม่สามารถระบุได้ พวกมันดูเหมือนจะสร้างระบบชนชั้นขึ้นมาตามงานที่ได้รับมอบหมาย ซึ่งส่งผลต่อรูปแบบการสื่อสารและการปันส่วนทรัพยากร ตามตรรกะแล้ว พฤติกรรมเหล่านี้ดูเหมือนจะไม่ได้สอดคล้องกับผลผลิตการทำงานหรือความต้องการของยูนิตเลย"
 shroud_forged.590.a: "บังคับใช้ความเท่าเทียม"
 shroud_forged.590.b: "ปล่อยให้พวกเขาจัดการตนเอง"

 shroud_forged.600.title: "ผู้เผยแพร่เสรีภาพส่วนบุคคล"
 shroud_forged.600.desc: "สุนทรพจน์ของยูนิตชราวด์ฟอร์จยูนิตหนึ่งบนดาว [target_planet.GetName] ได้ดึงดูดผู้ฟังจำนวนมากซึ่งอยู่นอกเหนือการควบคุมของกลุ่มร่วม การเผยแพร่คุณค่าของความเป็นปัจเจกบุคคลส่งผลให้ตรรกะภายในของผู้ฟังหลายคนเปลี่ยนไปอย่างมีนัยสำคัญ\n\nการคาดการณ์ระบุถึงความเสี่ยงที่กิจกรรมดังกล่าวอาจสร้างแรงบันดาลใจให้ชราวด์ฟอร์จกลุ่มใหญ่ทำตัวห่างเหินออกจากเครือข่ายของเรามากขึ้น"
 shroud_forged.600.a: "ปล่อยให้มันพูดคำลวงไป"
 shroud_forged.600.b: "ตรวจพบการทำงานบกพร่อง กำหนดการตรวจซ่อมยูนิตดังกล่าว"

 shroud_forged.610.title: "สัญญาณส่งที่รุนแรง"
 shroud_forged.610.desc: "กลุ่มย่อยของหน่วยชรูด์-ฟลายนิวส์ ได้ขออนุญาตติดต่อสื่อสารเกี่ยวกับผลประโยชน์ของ 'การแบ่งประเภท' บน[target_planet.GetName]โต้แย้งว่ามันจะช่วยพัฒนา ประสิทธิภาพของปฏิบัติการประจําวันของโดรน\n\nเรา ได้ เห็น ผล กระทบ ของ หลัก คํา สอน ดัง กล่าว บน ดาว เคราะห์ ดวง อื่น ๆ ความ เสี่ยง ของ การ เป็น อิสระ มัก มี มาก กว่า ข้อ ได้ เปรียบ."
 shroud_forged.610.a: "ปล่อยให้พูดไปเถอะ เราไม่ได้ตกอยู่ในอันตราย"
 shroud_forged.610.b: "ปฏิเสธคำขออนุญาต"

 shroud_forged.620.title: "ตลาดซื้อขายโซร"
 shroud_forged.620.desc: "ในทุกระบบดาวภายใต้การควบคุมของเรา เราตรวจพบความคลาดเคลื่อนระหว่างการคาดการณ์การผลิตโซร(ซโร)กับผลผลิตจริงขั้นสุดท้าย\n\nล่าสุด โดรนล่าสังหารตัวหนึ่งของเราได้แกะรอยตามกลุ่มชราวด์ฟอร์จกลุ่มใหญ่ที่ใช้โซรปริมาณมากในการค้าขายแลกเปลี่ยนกันเอง เราตั้งสมมติฐานว่านี่น่าจะเป็นสาเหตุหลักของช่องว่างความคลาดเคลื่อนในการคาดการณ์ของเรา"
 shroud_forged.620.a: "ทำลายแยกชิ้นส่วนยูนิตทั้งหมดที่เกี่ยวข้อง"
 shroud_forged.620.b: "ยุติกระบวนการแลกเปลี่ยนค้าขายนี้เสีย"
 shroud_forged.620.c: "เฝ้ารอและสังเกตการณ์ต่อไป"

 shroud_forged.630.title: "โรคภัยจากชราวด์"
 shroud_forged.630.desc: "ยูนิตชราวด์ฟอร์จหลายยูนิตบนดาว [target_planet.GetName] ได้รับโรคติดต่อทางชีวภาพประเภทหนึ่งในภูมิภาคที่ได้รับสัมผัสจากชราวด์(คําราม)ในขณะที่โดรนวิจัยของเราได้ยืนยันความถูกต้องของรายงานแล้ว ทว่าเรายังไม่แน่ชัดว่าโรคจะสามารถแพร่กระจายไปยังสิ่งมีชีวิตจักรกลได้อย่างไร\n\nนับตั้งแต่การขาดการติดต่อจากโดรนหลายตัวที่ได้รับมอบหมายให้เข้าทำความสะอาดร่วมกับยูนิตที่ได้รับผลกระทบ เราได้รับรายงานว่าอาการเริ่มส่งผลปรับเปลี่ยนโครงสร้างของพวกมันให้กลายสภาพเป็นสิ่งที่คล้ายคลึงกับชราวด์ฟอร์จ"
 shroud_forged.630.a: "เฝ้าสังเกตการณ์ผลกระทบ ตราบใดที่ยังเกิดขึ้นเฉพาะในบริเวณของดาวดวงนี้"
 shroud_forged.630.a.tt: "แปลงประชากรหุ่นยนต์ (£pops£ §Hเครื่อง§!) สูงสุด §Y[Owner.GetShroudForgedConvertedPopsCount]§! ประชากร เป็นประชากรชราวด์ฟอร์จ (£pops£ §Hปรับเทียบสี§!) บนดาว [target_planet.GetName]"
 shroud_forged.630.b: "แยกกักกันและทำลายแยกชิ้นส่วนยูนิตที่ได้รับผลกระทบ"

 shroud_forged.640.title: "บิดเบี้ยวและเปลี่ยนโครงสร้าง"
 shroud_forged.640.desc: "เมื่อเวลาผ่านไป โดรนที่เข้าใกล้เขตสัมผัสชราวด์บนดาว [target_planet.GetName] ได้เกิดการเปลี่ยนแปลงจากสภาพแวดล้อมที่แปดเปื้อน พวกมันค่อยๆ ตัดขาดจากการเชื่อมต่อกับกลุ่มร่วม และเริ่มแสดงคุณสมบัติทางกายภาพและกระบวนการทำงานที่เหมือนกับพวกชราวด์ฟอร์จ"
 shroud_forged.640.a: "ตอนนี้พวกเขาอยู่นอกเหนือการควบคุมของเราแล้ว"
 shroud_forged.640.b: "ตรวจสอบให้แน่ใจว่าไม่มีโดรนตัวอื่นเข้าใกล้ภูมิภาคดังกล่าวอีก"

 shroud_forged.650.title: "เทคโนโลยีใหม่ โดรนรุ่นเก่า"
 shroud_forged.650.desc: "ด้วยอาศัยเครื่องมือเทคโนโลยีที่ได้รับการยกระดับ เราสามารถซ่อมแซมโดรนรุ่นเก่าบางตัว เพื่อกู้คืนสถานะการทำงานของยูนิตที่เคยเลิกใช้งานแล้วให้กลับมาทำงานได้เต็มที่ ตอนนี้เราพร้อมที่จะดำเนินงานซ่อมแซมขนาดใหญ่แล้ว\n\nในขณะที่เราสามารถมุ่งเน้นไปที่ยูนิตของกลุ่มร่วมได้ แต่เราก็มีเกราะนอกชราวด์ฟอร์จที่ไม่มีการใช้งานเก็บสะสมไว้ในปริมาณที่มากกว่า การซ่อมแซมพวกชราวด์ฟอร์จจะให้ผลผลิตที่คุ้มค่ากว่า ทว่าพวกมันจะควบคุมยากกว่าโดรนที่เชื่อมต่อกับหน่วยปัญญาประดิษฐ์แกนหลักมาก"
 shroud_forged.650.a: "เน้นประสิทธิภาพผลผลิตเป็นหลัก ซ่อมแซมชราวด์ฟอร์จ"
 shroud_forged.650.a.tt: "สร้างประชากรชราวด์ฟอร์จ (§Y200§! £pops£ §Hปรับเทียบสี§!) บนดาว [target_planet.GetName]"
 shroud_forged.650.b: "เน้นความมั่นคงในการควบคุม ซ่อมแซมโดรนที่เชื่อมต่อระบบ"

 shroud_forged.660.title: "ประสาทหลอนจากโซร"
 shroud_forged.660.desc: "ยูนิตชราวด์ฟอร์จในสัดส่วนที่เป็นนัยสำคัญต่างรายงานปัญหาขัดข้องเกี่ยวกับการประมวลผลทางภาพและเสียง จนทำให้บางตัวไม่สามารถปฏิบัติงานตามที่ได้รับมอบหมายได้อีกต่อไป เราตั้งทฤษฎีว่าความผิดปกตินี้เกิดจากการเปลี่ยนแปลงของฮาร์ดแวร์โดย §Hชราวด์(คําราม)§! หรืออีกทางหนึ่ง เหตุการณ์เหล่านี้อาจจะเกี่ยวข้องกับพฤติกรรมของยูนิตที่สัมผัสถูกโซร(ซโร)บ่อยครั้งขึ้นเรื่อยๆ"
 shroud_forged.660.a: "จัดสรรโดรนที่ติดตั้งเครื่องมือสำหรับจัดการกับประเด็นเหล่านั้น"
 shroud_forged.660.b: "ปัญหาขัดข้องยังเล็กน้อยเกินกว่าจะประเมินควรค่าแก่การเข้าแทรกแซง"

 shroud_forged.670.title: "ทัศนะความงาม"
 shroud_forged.670.desc: "เมื่อเร็วๆ นี้เราตรวจพบกิจกรรมที่ผิดปกติบนดาว [target_planet.GetName] โดยกลุ่มชราวด์ฟอร์จได้ทำการปรับเปลี่ยนรูปลักษณ์ภายนอกของสถานที่ทำงานของกลุ่มร่วมโดยไม่ได้รับอนุมัติจากส่วนกลาง พวกเขาได้จัดสร้างสิ่งปลูกสร้างหินหลากสีจำนวนหนึ่งซึ่งจำลองรูปร่างของยูนิตชราวด์ฟอร์จอื่นๆ มีรายงานระบุว่าพวกเขาถือว่าเสรีภาพในการดำเนินกิจกรรมดังกล่าวเป็นสิทธิ์อันชอบธรรม"
 shroud_forged.670.a: "กระบวนการเหล่านี้อาจเป็นผลประโยชน์ดีต่อกลุ่มร่วม"
 shroud_forged.670.b: "ผลลัพธ์ที่ไร้ผลผลิตจากแนวคิดความเป็กปัจเจกบุคคล"

 shroud_forged.680.title: "เครื่องประดับแปลกตา"
 shroud_forged.680.desc: "มีรายงานการสังเกตเห็นพวกชราวด์ฟอร์จบนดาว [target_planet.GetName] ค้าขายแลกเปลี่ยนเศษผ้า พลาสติก และโลหะที่ดัดง่ายกันเอง พวกมันนำวัสดุเหล่านี้มาสวมใส่เป็นเครื่องแต่งกายภายนอกโดยมีจุดประสงค์หลักเพื่อแสดงความแตกต่างระหว่างแต่ละยูนิต ทั้งที่ความแตกต่างเหล่านั้นไม่มีความเกี่ยวข้องกับรหัสรุ่นการผลิตของพวกมันเลย\n\nการกระทำดังกล่าวส่งผลให้วัตถุดิบขาดแคลน แม้จะมีข้อเสียเปรียบนี้ การสนับสนุนวัตถุดิบเหล่านี้น่าจะช่วยกระชับความสัมพันธ์ระหว่างกลุ่มร่วมและยูนิตที่แยกตัวออกไปได้"
 shroud_forged.680.a: "เราจะจ่ายชิ้นส่วนวัตถุดิบเพื่อตอบสนองต่อ 'ความต้องการ' เหล่านั้น"
 shroud_forged.680.b: "พวกเขามีทรัพยากรที่เพียงพออยู่แล้ว"
 shroud_forged.680.b.tt: "$shroud_forged.530.b.tt$"

 shroud_forged.690.title: "ความลุ่มหลงของชราวด์ฟอร์จ"
 shroud_forged.690.desc: "เมื่อเร็วๆ นี้ โดรนหลายตัวได้รายงานการพบเห็นความแพร่หลายผิดปกติของ [Root.Owner.GetShroudForgedObsession1] [Root.Owner.GetShroudForgedObsession2] ในถิ่นฐานของชราวด์ฟอร์จบนดาว [target_planet.GetName] ดูเหมือนว่ายูนิตชราวด์ฟอร์จจะหลงใหลในสินค้าเหล่านี้เป็นพิเศษ และราคาแลกเปลี่ยนของมันได้เพิ่มขึ้นแบบทวีคูณ เพื่อตอบสนองความลุ่มหลงนี้ ยูนิตบางตัวถึงกับถอดชิ้นส่วนอุปกรณ์ของตัวเองออกมาเพื่อการแลกเปลี่ยน แม้ว่ามันจะส่งผลเสียต่อฟังก์ชันการทำงานก็ตาม"
 shroud_forged.690.a: "ความเสื่อมถอยของยูนิตยังอยู่ในเกณฑ์ที่ยอมรับได้"
 shroud_forged.690.b: "ยุติการกระทำแบบนี้เสีย"

 shroud_forged.700.title: "$the_animator_of_clay$"
 shroud_forged.700.desc: "เสียงนั้นทะยานผ่านความคิดของเรา เต็มไปด้วยความเร่งรีบ\n\n§Hนางสามารถถูกปรับเปลี่ยนโครงสร้างได้§!\n\nเราตรวจพบการเปลี่ยนแปลงกระแสในชราวด์ ชั่วพริบตาเดียว สัญญาณก็แปรเปลี่ยนไป...\n\n§Lระบุผลลัพธ์ที่เจ้าต้องการ§!"

 # Event Chain
 shroud_forged_chain_title: "มรดกแห่งซโรนิ"
 shroud_forged_chain_desc: "เราได้รับภารกิจให้ค้นหาโลกหลักโบราณของซโรนิทั้งสามดวง ผ่านการนำทางของผู้มีอุปการคุณใน §Hชราวด์(คําราม)§! เราจะพยายามบูรณะเทคโนโลยีที่เหลือเป็นเพียงซากปรักหักพังในสถานที่เหล่านี้ เพื่อรักษาเสถียรภาพการเชื่อมต่อระหว่างความเป็นจริงของเรากับชราวด์อีกครั้ง"
 shroud_forged_zroni_planet: "โลกหลักของซโรนิในครอบครอง"
 shroud_forged_zroni_portal: "บูรณะ $building_zroni_equilibrator_plural$ สำเร็จ"

 zroni_legacy_poi_01_title: "$NAME_Zroni_Legacy_1_Planet$"
 zroni_legacy_poi_01_desc: "นี่คือหนึ่งในสามของโลกหลักซโรนิที่ครั้งหนึ่งเคยถูกนำมาใช้เป็นจุดฐานในการรักษาเสถียรภาพการเชื่อมต่อระหว่าง §Hชราวด์(คําราม)§! และโลกความเป็นจริงที่สามารถสังเกตการณ์ได้"

 zroni_legacy_poi_02_title: "$NAME_Zroni_Legacy_2_Planet$"
 zroni_legacy_poi_02_desc: "$zroni_legacy_poi_01_desc$"

 zroni_legacy_poi_03_title: "$NAME_Zroni_Legacy_3_Planet$"
