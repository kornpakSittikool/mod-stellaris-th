 # Armies
 shroud_monstrosities: "เอนทิตีต่างโลก"
 shroud_monstrosities_desc: "การได้ยลพบเอนทิตีเหล่านี้บนสมรภูมิกดดันสนามรบก็เปรียบเสมือนการเชื้อเชิญความบ้าคลั่งเข้าสู่จิตวิญญาณ ร่างของพวกมันบิดงอและส่องแสงระยิบระยับ เปลี่ยนแปลงอยู่เสมอ และไม่มีรูปร่างคงที่"
