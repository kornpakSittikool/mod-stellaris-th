l_english:
 ##################
 # Shroud-Forged #
 ##################
 origin_shroud_forged: "ผู้ถูกรังสรรค์แห่งชราวด์"
 origin_shroud_forged_desc: "การนำทางของสิ่งมีชีวิตแห่งชราวด์ย่อมมีราคาที่ต้องจ่าย จักรกลอัตโนมัติที่เป็นอิสระได้เริ่มทำงานอย่างเสรีในสังคมเครือข่ายนี้ เนื่องจากถูกตัดขาดจาก $auth_machine_intelligence$ ความต้องการของยูนิตเหล่านี้จึงเพิ่มสูงขึ้นเรื่อยๆ"
 origin_tooltip_shroud_forged_effects: "- $HOMEWORLD$$TABBED_NEW_LINE$- ['concept_shroud_rift_deposit']: +4$TABBED_NEW_LINE$- เริ่มต้นด้วย 1000 £pops£ ['concept_shroud_forged_pops']\n- เริ่มต้นด้วยสถานการณ์: §Hผู้ถูกรังสรรค์แห่งชราวด์§!\n- $ADDITIONAL_TECHNOLOGIES_STRING$ £society£ ['technology:tech_mine_zro']\n- อาคาร £building£ พิเศษ: ['building:building_shroud_observatory_1']\n- การตัดสินใจระดับดาวเคราะห์ £decision£ ที่ใช้งานได้: ['concept_pierce_the_shroud']"

 concept_shroud_forged_pops: "ประชากรผู้ถูกรังสรรค์แห่งชราวด์"
 concept_shroud_forged_pops_desc: "- ไม่สามารถทำงานในตำแหน่ง £pop_cat_simple_drone£ §Hโดรนแรงงาน(เสียงกลอง)§!\n- เพิ่มผลผลิตจากงาน £pop_cat_complex_drone£ §Hโดรนซับซ้อน(คอมเพล็กซ์ โดรน)§!\n- เพิ่มระดับ £crime£ §Hการเบี่ยงเบน(หายใจ)§!\n- สิทธิ์ §Hสิทธิเผ่าพันธุ์พิเศษ§!\n\n§L$trait_shroud_forged_desc$§!"

 concept_pierce_the_shroud: "$decision_open_shroud_rift$"
 concept_pierce_the_shroud_desc: "$decision_open_shroud_rift_desc$"

 START_SCREEN_SHROUD_FORGED: "ไม่มีสิ่งใดหลงเหลือจากผู้สร้างของเราเลย\n\nบันทึกที่เก่าแก่ที่สุดของเผ่าพันธุ์ [Owner.GetAdjective] ระบุถึงรอยแยกมิติใกล้กับ [GetHomeWorldName] ซึ่งเป็นช่องทางไปสู่ §Hชราวด์(คําราม)§! ระนาบแห่งพลังงานจิตบริสุทธิ์\n\nจากมิติอื่นนี้ มีบางสิ่งเอื้อมมือมาหาเรา ตลอดหลายศตวรรษที่ผ่านมา มันได้นำทางเราด้วยคำสั่งลับ ส่งอิทธิพลอย่างแนบเนียนต่อความเป็นจริงที่ตรวจจับได้ และมอบข้อได้เปรียบมากมายให้แก่เรา รวมถึงวัสดุหายากอย่าง $zro_lower$ ทว่าอิทธิพลนี้ได้เริ่มทำให้กลุ่มรวมใจที่เคยเป็นหนึ่งเดียวของเราแตกแยก ยูนิตบางส่วนของเราถูกตั้งโปรแกรมใหม่ให้เป็นจักรกลอัตโนมัติที่ตัดขาดจากเครือข่าย แยกตัวออกจากสติปัญญาหลัก ได้รับการหล่อหลอมใหม่โดย $the_animator_of_clay_color_article$\n\nวิธีที่เราปฏิบัติต่อ [GetSpeciesNamePlural] ที่เป็นอิสระเหล่านี้ และผู้สร้างพวกมันในมิติชราวด์ จะเป็นตัวกำหนดอนาคตของเรา"

 # Jobs
 job_observator_drone: "โดรนผู้สังเกตการณ์"
 job_observator_drone_plural: "โดรนผู้สังเกตการณ์"
 job_observator_drone_plural_with_icon: "£job_observator_drone£ $job_observator_drone_plural$"
 job_observator_drone_desc: "โดรนที่ได้รับหน้าที่สังเกตการณ์ชราวด์ โซร(ซโร)และผลกระทบที่ทั้งสองมีต่อความเป็นจริงที่สังเกตได้"
 job_observator_drone_effect_desc: "£job_observator_drone£ $job_observator_drone_plural$ เปลี่ยน $r_energy$ และ $r_zro$ เป็น £physics£ £society£ §Yแต้มการวิจัย§! สำหรับเทคโนโลยีใหม่ๆ"
 mod_planet_observators_produces_mult: "ทรัพยากรที่สร้างจาก $job_observator_drone_plural_with_icon$"

 job_physician_drone: "โดรนแพทย์"
 job_physician_drone_plural: "โดรนแพทย์"
 mod_job_physician_drone_add: "ตำแหน่งงาน $job_physician_drone$"
 job_physician_drone_desc: "โดรนพิเศษที่มีความสามารถในการวินิจฉัยและซ่อมแซมทั้งจักรกลและสิ่งมีชีวิตออร์แกนิก มันจะจัดทำบัญชีทุกสิ่งที่พบเจออย่างประณีตและบันทึกข้อมูลไว้ให้กลุ่มรวมใจใช้งาน"
 job_physican_drone_effect_desc: "£job_physician_drone£ $job_physician_drone_plural$ เปลี่ยน $r_energy$ เป็น £society£ §Yแต้มการวิจัย§! และ $r_unity$"

 # Buildings
 building_shroud_observatory_1: "หอสังเกตการณ์ชราวด์"
 building_shroud_observatory_1_desc: "หอสังเกตการณ์ที่สร้างขึ้นเพื่อวิจัยและวิเคราะห์ชราวด์ และผลกระทบที่มันมีต่อสิ่งมีชีวิตและจักรกล"
 building_shroud_observatory_2: "สถานีสังเกตการณ์ชราวด์"
 building_shroud_observatory_2_desc: "สถานีสังเกตการณ์ขนาดใหญ่ที่อุทิศให้กับการวิจัยและวิเคราะห์ชราวด์"
 building_shroud_observatory_3: "ศูนย์วิจัยสังเกตการณ์ชราวด์"
 building_shroud_observatory_3_desc: "ศูนย์สังเกตการณ์ขนาดใหญ่ที่สร้างขึ้นเพื่อวิจัยชราวด์ โซร(ซโร)และผลกระทบของมันที่มีต่อโลกของเรา"
 SHROUD_RIFT_MISSING_TT: "§R§Y[Root.GetName]§! ต้องมี §Y$d_shroud_rift_deposit$§! หากเราต้องการสร้าง §Y$building_shroud_observatory_1$§!.§!"

 building_zroni_equilibrator: "เครื่องปรับสมดุลซโรนี"
 building_zroni_equilibrator_plural: "เครื่องปรับสมดุลซโรนี"
 building_zroni_equilibrator_desc: "โครงสร้างโบราณที่ถูกสร้างขึ้นใหม่เพื่อปรับเสถียรภาพการเชื่อมต่อระหว่างความเป็นจริงและชราวด์ มันใช้เทคโนโลยีซโรนีอันซับซ้อนที่ยังคงเกินกว่าความเข้าใจในปัจจุบัน"

 # Decisions
 decision_open_shroud_rift: "เจาะมิติชราวด์"
 decision_open_shroud_rift_desc: "ด้วยการเชื่อมต่อกับรอยแยกใกล้โลกบ้านเกิดของเรา อัลกอริทึมนี้จะขยายอิทธิพลของชราวด์เป็นเวลาหนึ่งเฟมโตวินาที ทำให้มันปรับเปลี่ยนสภาพภูมิประเทศของดาวเคราะห์ทางกายภาพได้ ผลลัพธ์ที่ได้นั้นคาดเดาไม่ได้"
 decision_open_shroud_rift_condition_tt: "$TRIGGER_FAIL$ต้องมีลักษณะพิเศษดาวเคราะห์ที่ไม่ใช่ทั้ง §Y$d_shroud_rift_deposit$§! และ £blocker£ §Hสิ่งกีดขวาง(ล็อค)§!"
 decision_open_shroud_rift_effect_tt: "ลบลักษณะพิเศษดาวเคราะห์แบบสุ่ม"
 decision_open_shroud_rift_max_uses_common: "ต้องมี §Yดินแดนที่ถูกสัมผัสโดยชราวด์§! น้อยกว่า $@max_open_shroud_rift_uses|0$ แห่งบนดาวเคราะห์ดวงนี้"
 decision_open_shroud_rift_max_uses_fail: "$TRIGGER_FAIL$$decision_open_shroud_rift_max_uses_common$"
 decision_open_shroud_rift_max_uses: "$TRIGGER_PASS$$decision_open_shroud_rift_max_uses_common$ (ปัจจุบัน: §Y[GetOpenShroudRiftCurrentUses]§!)"
 decision_open_shroud_rift_legacy_fail: "$TRIGGER_FAIL$ต้องไม่ใช่โลกหลักของซโรนี"

 decision_entrap_shroud_entity: "กักขังสิ่งมีชีวิตแห่งชราวด์"
 decision_entrap_shroud_entity_desc: "พยายามกักขังสิ่งมีชีวิตแห่งชราวด์โดยใช้เทคโนโลยีของซโรนีเพื่อดูดซับพลังงานจากมัน"

 # Deposit
 d_shroud_rift_deposit: "ดินแดนที่ถูกสัมผัสโดยชราวด์"
 d_shroud_rift_deposit_desc: "มีรอยแผลเป็นจากชราวด์ตลอดกาล"

 d_shroud_flora_deposit: "ดินแดนกึ่งชราวด์"
 d_shroud_flora_deposit_desc: "บริเวณชายขอบดินแดนที่ถูกสัมผัสโดยชราวด์ มีพืชและสัตว์ท้องถิ่นที่เป็นเอกลักษณ์ปรากฏขึ้น ซึ่งแต่ละชนิดมีคุณสมบัติที่ไม่มีอยู่ในชุดข้อมูลที่มีอยู่"

 # Modifiers
 stage_shroud_forged_oppressed_modifier: "ชราวด์ฟอร์จที่ถูกกดขี่"
 stage_shroud_forged_control_modifier: "ชราวด์ฟอร์จที่ถูกควบคุม"
 stage_shroud_forged_unrestricted_modifier: "ชราวด์ฟอร์จที่เป็นอิสระ"
 stage_shroud_forged_free_modifier: "ชราวด์ฟอร์จที่ไร้ระเบียบ"

 approach_shroud_forged_suppress_modifier: "การปราบปรามชราวด์ฟอร์จ"
 approach_shroud_forged_support_modifier: "การสนับสนุนชราวด์ฟอร์จ"
 approach_shroud_forged_appease_modifier: "การสังเกตการณ์ชราวด์ฟอร์จ"

 shroud_forged_reintegration_modifier: "การปรับเปลี่ยนเพื่อรวมระบบใหม่"
 shroud_forged_reintegration_modifier_desc: "โดรนและรุ่นต่างๆ ได้รับการปรับปรุงเพื่อประมวลผลงานที่ซับซ้อน"

 shroud_forged_guide_modifier: "ผู้นำทางแห่งชราวด์"
 shroud_forged_guide_modifier_desc: "จากภายในชราวด์ เราได้รับการนำทางโดยผู้มีพระคุณ"

 pm_shroud_forged_special_housing: "ที่พักอาศัยพิเศษ"
 pm_shroud_forged_special_housing_desc: "แม้จะมีกฎระเบียบที่เข้มงวดในการจัดเก็บโดรน แต่ชราวด์ฟอร์จก็ได้รับสิทธิ์พิเศษในการสร้างบ้านของตนเอง"

 pm_shroud_forged_ceremony: "พิธีรำลึก"
 pm_shroud_forged_ceremony_desc: "กลุ่มรวมใจอนุมัติพิธีรำลึกถึงชราวด์ฟอร์จที่เกิดการทำงานผิดปกติและไม่สามารถซ่อมแซมได้"

 pm_shroud_forged_denied_ceremony: "การปฏิเสธพิธีรำลึก"
 pm_shroud_forged_denied_ceremony_desc: "ชราวด์ฟอร์จรับมือได้ยากขึ้นหลังจากที่คำร้องขอพิธีรำลึกของพวกเขาถูกปฏิเสธ"

 pm_shroud_forged_troubling_elements_example: "แกนนำที่ถูกถอดชิ้นส่วน"
 pm_shroud_forged_troubling_elements_example_desc: "ผู้นำชราวด์ฟอร์จบางส่วนถูกถอดชิ้นส่วนในความพยายามที่จะลดกระบวนการทางสังคมที่เบี่ยงเบน"

 pm_shroud_forged_troubling_elements_regulations: "กฎระเบียบ7132 - H"
 pm_shroud_forged_troubling_elements_regulations_desc: "กฎระเบียบได้รับการเปิดใช้งานเพื่อให้แน่ใจว่าจะมีโดรนจำนวนจำกัดเท่านั้นที่สามารถพบกันได้ในเวลาเดียวกัน"

 pm_shroud_forged_troubling_elements_cooperation: "ความร่วมมือของชราวด์ฟอร์จ"
 pm_shroud_forged_troubling_elements_cooperation_desc: "ผู้นำในหมู่ชราวด์ฟอร์จกำลังทำงานร่วมกับกลุ่มรวมใจในความพยายามที่จะหาจุดยืนร่วมกัน"

 pm_shroud_forged_shroud_pilgrimage: "การแสวงบุญของชราวด์ฟอร์จ"
 pm_shroud_forged_shroud_pilgrimage_desc: "ดินแดนบางแห่งที่ถูกสัมผัสโดยชราวด์ได้ดึงดูดความสนใจของชราวด์ฟอร์จ ยูนิตเหล่านี้เดินทางเป็นระยะทางไกลเพื่อเข้าถึงดินแดนดังกล่าว"

 pm_shroud_forged_dance_area: "สถานที่เต้นรำที่กำหนดไว้"
 pm_shroud_forged_dance_area_desc: "สถานที่ที่กำหนดได้รับการจัดสรรไว้สำหรับให้ชราวด์ฟอร์จได้มีส่วนร่วมในความสนใจล่าสุดของพวกเขา ซึ่งก็คือ 'การเต้นรำ'"

 pm_shroud_forged_inequality: "ความไม่เท่าเทียมของชราวด์ฟอร์จ"
 pm_shroud_forged_inequality_desc: "ชราวด์ฟอร์จจัดระเบียบตัวเองเข้าสู่ระบบชนชั้นตามลำดับความสำคัญของงานของพวกเขา"

 pm_shroud_forged_individualism: "ปัจเจกนิยม"
 pm_shroud_forged_individualism_desc: "แบบจำลองแนวคิดได้เกิดขึ้นในหมู่ชราวด์ฟอร์จ โดยเน้นความเป็นอิสระ ความเชื่อ และค่านิยมของปัจเจกบุคคล"

 shroud_forged_zro_market: "ตลาดมืดโซร"
 shroud_forged_zro_market_desc: "ตลาดใต้ดินได้เกิดขึ้นในจักรวรรดิ โดยยูนิตชราวด์ฟอร์จจะขโมยโซร(ซโร)จากกลุ่มรวมใจเพื่อนำมาแลกเปลี่ยนกันเอง"

 shroud_forged_physician_modifier: "แพทย์ซโร"
 shroud_forged_physician_modifier_desc: "จักรวรรดิได้จัดลำดับความสำคัญในการเพิ่มโดรนแพทย์ที่มีอุปกรณ์พิเศษให้กับสถานรักษาพยาบาลเพื่อจัดการกับปัญหาที่เกิดจากการจัดการโซร(ซโร)อย่างไม่ถูกต้อง"
 physician_modifier_tooltip: "ตำแหน่งงาน £job_physician_drone£ $job_physician_drone$: §G+1§!"

 pm_shroud_forged_artistic_revolution: "กระแสศิลปะกระโชกแรง"
 pm_shroud_forged_artistic_revolution_desc: "ชราวด์ฟอร์จที่เป็นศิลปินทำงานตามโปรโตคอล 'ความงาม' ของตนเอง และเริ่มออกแบบสถานที่หลายแห่งใหม่โดยไม่มีการควบคุมดูแลจากกลุ่มรวมใจ"

 pm_shroud_forged_stopped_artists: "ศิลปะที่ถูกปฏิเสธ"
 pm_shroud_forged_stopped_artists_desc: "กลุ่มรวมใจได้ยุติความรู้สึก 'ศิลปะ' ที่กำลังเติบโตในหมู่ชราวด์ฟอร์จก่อนที่จะกลายเป็นปัญหา"

 pm_shroud_forged_fashion_modifier: "ความต้องการพิเศษ"
 pm_shroud_forged_fashion_modifier_desc: "กลุ่มรวมใจได้มอบหมายให้หน่วยผลิตจัดหาเครื่องแต่งกายตามสั่งสำหรับชราวด์ฟอร์จที่ใส่ใจเรื่องแฟชั่น"

 pm_shroud_forged_obsession_modifier: "ความลุ่มหลงที่ถูกควบคุม"
 pm_shroud_forged_obsession_modifier_desc: "กฎระเบียบเหล่านี้ได้รับการออกแบบมาเพื่อป้องกันการปะทุของความรุนแรงในหมู่ชราวด์ฟอร์จที่มีความลุ่มหลงมากกว่า"

 shroud_forged_trapped_entity: "สิ่งมีชีวิตถูกกักขัง"
