 citizenship_shroud_touched: "Shroud-Forged"
 citizenship_shroud_touched_tooltip: "นี่คือกลุ่มของออโตมาตาที่ได้รับการปรับรูปร่างใหม่โดยเฉพาะ §HShroud§!. ทำหน้าที่อย่างอิสระจาก §H$machine_intelligence$§!,พวกเขาไม่สามารถทำ งาน £pop_cat_simple_drone£ $pop_cat_simple_drone$"
