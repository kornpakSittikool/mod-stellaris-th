 # Shroud-Forged #
 ##################
 origin_shroud_forged: "ผ้าห่อศพปลอม"
 origin_shroud_forged_desc: "การชี้นำของ Shroud มาพร้อมกับต้นทุน ออโตมาตาอิสระได้เริ่มทำงานอย่างอิสระในสังคมเครือข่ายนี้ ตัดขาดจาก $auth_machine_intelligence$,ความต้องการของหน่วยงานเหล่านี้เพิ่มมากขึ้นเรื่อยๆ"
 origin_tooltip_shroud_forged_effects: "- $HOMEWORLD$$TABBED_NEW_LINE$- ['concept_shroud_rift_deposit']: +4$TABBED_NEW_LINE$- Start with 1000 £pops£ ['concept_shroud_forged_pops']\n- Start with Situation: §HForged by the Shroud§!\n- $ADDITIONAL_TECHNOLOGIES_STRING$ £society£ ['technology:tech_mine_zro']\n- Unique £building£ Building: ['building:building_shroud_observatory_1']\n- Available £decision£ Planetary Decision: ['concept_pierce_the_shroud']"

 concept_shroud_forged_pops: "ประชากรที่สร้างโดย Shroud"
 concept_shroud_forged_pops_desc: "- ไม่สามารถทำงานประเภท £pop_cat_simple_drone£ §HMenial Drone§! ได้\n- เพิ่มผลผลิตของ £pop_cat_complex_drone£ §HComplex Drone§!\n- เพิ่ม £crime£ §HDeviancy§!\n- สิทธิพิเศษ §HSpecies Rights§!\n\n§L$trait_shroud_forged_desc$§!"

 concept_pierce_the_shroud: "$decision_open_shroud_rift$"
 concept_pierce_the_shroud_desc: "$decision_open_shroud_rift_desc$"

 START_SCREEN_SHROUD_FORGED: "ไม่มีสิ่งใดเหลืออยู่จากผู้สร้างของเรา\n\nบันทึกเก่าแก่ที่สุดของเผ่าพันธุ์ [Owner.GetAdjective] ชี้ถึงรอยรั่วมิติใกล้ [GetHomeWorldName] - ช่องทางไปยัง §HShroud§! ระนาบแห่งพลังจิตบริสุทธิ์\n\nจากมิติอื่นนั้น มีบางสิ่งส่งสัญญาณถึงเรา ตลอดหลายศตวรรษที่ผ่านมา มันได้ชี้นำเราโดยคำสั่งที่เข้ารหัส ค่อย ๆ มีอิทธิพลต่อความจริงที่เราสามารถตรวจจับได้ และมอบข้อได้เปรียบมากมายให้เรา - ไม่ว่าจะเป็นวัสดุหายาก $zro_lower$ อย่างไรก็ตาม อิทธิพลนี้เริ่มทำให้ความเป็นเอกภาพของคอลเล็กทีฟของเราแตกออก บางหน่วยถูกรีโปรแกรมเป็นออโตมาตาที่แยกออกจากสมองรวม ถูกปรับรูปโดย $the_animator_of_clay_color_article$\n\nวิธีที่เรารับมือกับ [GetSpeciesNamePlural] ที่เป็นอิสระเหล่านี้ และผู้ปรับรูปของพวกเขาใน Shroud จะกำหนดอนาคตของเรา"

 # Jobs
 job_observator_drone: "โดรนผู้สังเกต"
 job_observator_drone_plural: "โดรนผู้สังเกต"
 job_observator_drone_plural_with_icon: "£job_observator_drone£ $job_observator_drone_plural$"
 mod_job_observator_drone_add: "งาน $job_observator_drone$"
 job_observator_drone_desc: "โดรนที่ถูกมอบหมายให้สังเกต Shroud, Zro และผลกระทบที่ทั้งสองมีต่อความจริงที่ตรวจจับได้"
 job_observator_drone_effect_desc: "£job_observator_drone£ $job_observator_drone_plural$ แปลง $r_energy$ และ $r_zro$ เป็น £physics£ £society£ §YResearch Points§! สำหรับเทคโนโลยีใหม่"

 job_physician_drone: "Observer Drone"
 job_physician_drone_plural: "Observer Drone"
 mod_job_physician_drone_add: "งาน $job_physician_drone$"
 job_physician_drone_desc: "โดรนเฉพาะทางที่สามารถวินิจฉัยและซ่อมแซมสิ่งมีชีวิตทั้งที่เป็นมนุษย์และสิ่งมีชีวิตอื่นๆ ได้ โดรนจะบันทึกข้อมูลทุกอย่างที่พบเจออย่างละเอียดถี่ถ้วน และจัดเก็บข้อมูลเพื่อนำไปใช้งานร่วมกัน"
 job_physican_drone_effect_desc: "£job_physician_drone£ $job_physician_drone_plural$ เป็น $r_energy$ into £society£ §YResearch Points§! และ $r_unity$."

 # Buildings
 building_shroud_observatory_1: "Shroud Observation Tower"
 building_shroud_observatory_1_desc: "หอสังเกตการณ์ที่สร้างขึ้นเพื่อการวิจัยและวิเคราะห์ผ้าห่อพระศพ และผลกระทบที่มีต่อสิ่งมีชีวิตและสิ่งมีชีวิตเชิงกล"
 building_shroud_observatory_2: "Shroud Observatory"
 building_shroud_observatory_2_desc: "หอสังเกตการณ์ขนาดใหญ่ที่อุทิศให้กับการวิจัยและวิเคราะห์ผ้าห่อพระศพ"
 building_shroud_observatory_3: "Shroud Observation Complex"
 building_shroud_observatory_3_desc: "ศูนย์สังเกตการณ์อันยิ่งใหญ่ที่สร้างขึ้นเพื่อค้นคว้าเกี่ยวกับผ้าห่อพระศพ โซโร และผลกระทบที่พวกมันมีต่อโลกของเรา"
 SHROUD_RIFT_MISSING_TT: "§R§Y[Root.GetName]§! ต้องมี §Y$d_shroud_rift_deposit$§! หากเราจะสร้าง §Y$building_shroud_observatory_1$§!.§!"

 building_zroni_equilibrator: "Zroni Equilibrator"
 building_zroni_equilibrator_plural: "Zroni Equilibrators"
 building_zroni_equilibrator_desc: "โดรนผู้สังเกตโครงสร้างโบราณที่สร้างขึ้นใหม่เพื่อเชื่อมโยงความเป็นจริงและผ้าห่อพระศพเข้าด้วยกันอย่างมั่นคง ใช้เทคโนโลยี Zroni ที่ซับซ้อนซึ่งยังคงเกินความเข้าใจในปัจจุบัน"

 # Decisions
 decision_open_shroud_rift: "Pierce the Shroud"
 decision_open_shroud_rift_desc: "อัลกอริทึมนี้เชื่อมต่อกับช่องโหว่ใกล้ดาวบ้านเกิดของเรา ขยายอิทธิพลของผ้าห่อพระศพออกไปเป็นเวลาหนึ่งเฟมโตวินาที ทำให้มันสามารถเปลี่ยนแปลงภูมิประเทศของดาวเคราะห์ได้ ผลลัพธ์ที่ได้นั้นไม่อาจคาดเดาได้"
 decision_open_shroud_rift_condition_tt: "$TRIGGER_FAIL$Must มีคุณลักษณะของดาวเคราะห์ที่ไม่ใช่ §Y$d_shroud_rift_deposit$§! หรือไม่มี £blocker£ §HBlocker§!."
 decision_open_shroud_rift_effect_tt: "ลบคุณลักษณะดาวเคราะห์แบบสุ่ม"
 decision_open_shroud_rift_max_uses_common: "ต้องมีน้อยกว่า $@max_open_shroud_rift_uses|0$ §YShroud-Touched Regions§! บนโลกใบนี้"
 decision_open_shroud_rift_max_uses_fail: "$TRIGGER_FAIL$$decision_open_shroud_rift_max_uses_common$"
 decision_open_shroud_rift_max_uses: "$TRIGGER_PASS$$decision_open_shroud_rift_max_uses_common$ (current: §Y[GetOpenShroudRiftCurrentUses]§!)"

 decision_entrap_shroud_entity: "Entrap Shroud Entity"
 decision_entrap_shroud_entity_desc: "พยายามดักจับวิญญาณผ้าห่อพระศพโดยใช้เทคโนโลยีของ Zroni เพื่อดูดเอาพลังงานจากมัน"

 # Deposit
 d_shroud_rift_deposit: "Shroud-Touched Region"
 d_shroud_rift_deposit_desc: "ได้รับบาดแผลจากผ้าห่อพระศพไปตลอดกาล"

 d_shroud_flora_deposit: "Semi-Shrouded Region"
 d_shroud_flora_deposit_desc: "บริเวณที่อยู่ติดกับบริเวณที่สัมผัสกับผ้าห่อพระศพ มีพืชและสัตว์ที่มีเอกลักษณ์เฉพาะตัวเกิดขึ้น โดยแต่ละชนิดมีคุณสมบัติที่ไม่มีอยู่ในชุดข้อมูลที่มีอยู่"

