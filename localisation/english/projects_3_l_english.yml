 ####################################
 # Special Projects
 ####################################

 ### Anomaly Events
 DERELICT_SHIP_PROJECT:0 "ยานร้าง"
 DERELICT_SHIP_PROJECT_DESC:0 "มียานลำหนึ่งล่องลอยอยู่ในอวกาศ ไม่มีสัญญาณเข้าออก การเข้าไปตรวจสอบอย่างใกล้ชิดอาจช่วยให้เรารู้ว่าเกิดอะไรขึ้นกับลูกเรือ"
 ODD_STAR_PROJECT:0 "ไฟแห่งเตาหลอม"
 ODD_STAR_PROJECT_DESC:0 "ดาวฤกษ์ดวงนี้ดูเหมือนจะสามารถหลอมรวมเบริลเลียมได้ ซึ่งไม่น่าจะเป็นไปได้"
 IMPROBABLE_TEAPOT_PROJECT:0 "เซรามิกเหนือความน่าจะเป็น"
 IMPROBABLE_TEAPOT_PROJECT_DESC:0 "กาน้ำชาเซรามิกใบหนึ่งกำลังโคจรรอบดวงอาทิตย์... นี่มันเกินกว่าจะเป็นไปได้ การหาคำตอบว่ามันไปอยู่ตรงนั้นได้อย่างไรคงต้องใช้เวลาพอสมควร ใครจะรู้ว่าคำตอบคืออะไร หรือจริงๆ แล้วมันมีคำตอบหรือไม่?"
 AI_ADMIRAL_PROJECT:0 "นักรบแห่งทะเลทราย"
 AI_ADMIRAL_PROJECT_DESC:0 "กองยานโบราณกองหนึ่งถูกพบว่าตกอยู่บนดาวเคราะห์ทะเลทราย พร้อมกับ AI ประจำยานที่ยังคงทำงานอยู่ หากเราไม่เร่งเข้าไปควบคุมสถานการณ์ เรื่องราวอาจเลวร้ายลงได้"
 MINING_GEAR_PROJECT:0 "เครื่องเจาะคลุ้มคลั่ง"
 MINING_GEAR_PROJECT_DESC:0 "เครื่องขุดโบราณกำลังเจาะลึกเข้าไปในดาวเคราะห์น้อยยักษ์ หากเราหยุดมันได้ก่อนที่มันจะถูกซากหินถล่มทับ เราอาจได้เรียนรู้อะไรบางอย่างที่คุ้มค่าจากโครงสร้างของมัน"
 ABANDONED_ARRAY_PROJECT:0 "ระบบเซ็นเซอร์ที่ถูกทิ้งร้าง"
 ABANDONED_ARRAY_PROJECT_DESC:0 "จานรับสัญญาณที่ถูกทิ้งร้างชุดหนึ่งดูเหมือนจะยังอยู่ในสภาพใช้งานได้ หากเราซ่อมมันและหาวิธีการทำงานของมันได้ เราอาจได้รับข้อมูลเชิงลึกเพิ่มเติมเกี่ยวกับระบบใกล้เคียง"
 ALIEN_RACER_PROJECT:0 "ล่องลอยเคว้งคว้าง"
 ALIEN_RACER_PROJECT_DESC:0 "ยานต่างดาวลำหนึ่งกำลังล่องลอยอยู่ในแถบดาวเคราะห์น้อย มันไม่ตอบรับการติดต่อใดๆ เราควรสืบสวนและดูว่าเกิดอะไรขึ้น"
 PSIONIC_HORSES_PROJECT:0 "ผู้ปกครองแห่งทุ่งราบ"
 PSIONIC_HORSES_PROJECT_DESC:0 "สัตว์เลี้ยงลูกด้วยนมเผ่าพันธุ์อันสง่างามกำลังท่องไปตามทุ่งหญ้าน้ำ พวกมันดูหวาดระแวงและหยั่งรู้ความเคลื่อนไหวของเราได้ การศึกษาพวกมันอย่างใกล้ชิดอาจให้ข้อมูลเพิ่มเติมแก่เรา"
 ROBOT_CLEANERS_PROJECT:0 "เครื่องจักรที่ถูกทิ้งไว้เบื้องหลัง"
 ROBOT_CLEANERS_PROJECT_DESC:0 "พบบริเวณสถานที่แห่งหนึ่งที่เต็มไปด้วยหุ่นยนต์อยู่บนดาวเคราะห์อันห่างไกล หากเราปลุกพวกมันขึ้นมาอีกครั้ง พวกมันอาจเปิดเผยความลับของบ้านเกิดตนเองได้"
 ALIEN_MONSTER_ON_SHIP:0 "สัตว์ต่างดาวบนยาน"
 ALIEN_MONSTER_ON_SHIP_DESC:0 "[Root.Owner.GetMonsterOnShipDesc]" #A custom scripted desc that allows for MI support
 TREE_OF_LIFE:0 "ต้นไม้"
 TREE_OF_LIFE_DESC:0 "ต้นไม้ต้นหนึ่งลอยทวนอยู่ท่ามกลางความว่างเปล่าของอวกาศอย่างทระนง น้ำยางของมันดูเหมือนจะดึงดูดสิ่งมีชีวิตอินทรีย์จากอวกาศอันน่าสะพรึงกลัว เราควรสืบสวนเพื่อหาจุดประสงค์ของมัน"
 MASTERS_WRITINGS_POLITICS:0 "ถอดความบันทึกของผู้ตั้งถิ่นฐาน"
 MASTERS_WRITINGS_POLITICS_DESC:0 "เราได้ค้นพบบันทึกเอกสารชุดหนึ่งที่ดูเหมือนจะเคยมีความสำคัญต่อสังคมที่สูญสิ้นไปแล้ว การแปลมันย่อมทำให้เราเข้าใจประวัติศาสตร์และวัฒนธรรมของพวกเขาได้ลึกซึ้งขึ้น"
 MASTERS_WRITINGS_PHILOSOPHY:0 "ถอดความบันทึกของนักสำรวจ"
 MASTERS_WRITINGS_PHILOSOPHY_DESC:0 "เราได้พบบันทึกบางส่วนที่ถูกพกพาโดยคณะสำรวจต่างดาว หากเราแปลมัน เราอาจเปิดเผยข้อมูลเพิ่มเติมและเรียนรู้เกี่ยวกับเจ้าของคนก่อน"
 MASTERS_WRITINGS_DIPLOMACY:0 "ถอดความบันทึกของพ่อค้า"
 MASTERS_WRITINGS_DIPLOMACY_DESC:0 "เราได้พบบันทึกบางส่วนท่ามกลางซากปรักหักพังของศูนย์กลางการค้าระหว่างดวงดาวที่เป็นไปได้ หากเราแปลเอกสารเหล่านี้ เราอาจเรียนรู้เพิ่มเติมเกี่ยวกับผู้ที่ก่อตั้งมัน"
 MASTERS_WRITINGS_WAR:0 "ถอดความบันทึกของนักรบ"
 MASTERS_WRITINGS_WAR_DESC:0 "เราพบร่องรอยของชนชาตินักรบบนสนามรบที่ถูกทิ้งร้างมานาน และพวกเขาพกบันทึกที่คงมีความสำคัญต่อพวกเขาอย่างยิ่ง หากเราแปลเอกสารเหล่านี้ เราอาจเรียนรู้เพิ่มเติมเกี่ยวกับผู้คนกลุ่มนี้และสงครามที่พวกเขาเคยต่อสู้"
 CRYOPOD_FOUND_PROJECT:0 "ห้องนิรภัยใต้ดิน"
 CRYOPOD_FOUND_PROJECT_DESC:0 "เราพบโครงสร้างแห่งหนึ่งใต้ภูเขาซึ่งอาจบรรจุข้อมูลหรืออุปกรณ์ล้ำค่า มันถูกห้อมล้อมด้วยสัตว์ป่าอันตราย และเราจำเป็นต้องกำราบสัตว์ร้ายเหล่านี้ก่อนจึงจะเข้าถึงมันได้"
 CRYOPOD_OPENING_PROJECT:0 "งัดมันออก"
 CRYOPOD_OPENING_PROJECT_DESC:0 "ห้องนิรภัยใต้ดินที่เราพบนั้นมีเพียงภาชนะบางอย่างอยู่ภายใน เราต้องหาวิธีที่ดีที่สุดในการงัดมันออก หากอยากรู้ว่าข้างในมีอะไร"
 ANCIENT_OCEAN_SHIP:0 "เรือลาดตระเวนจมลึก"
 ANCIENT_OCEAN_SHIP_DESC:0 "เรือลาดตระเวนรบต่างดาวลำหนึ่งนอนอยู่ใต้เกลียวคลื่นของ [Root.GetName] การกู้ซากมันอาจให้เทคโนโลยีหรือทรัพยากรอันมีค่า"
