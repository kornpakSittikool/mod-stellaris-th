 #####################################
 # Machine Empire Techs
 #####################################
 tech_probability_theory:0 "ทฤษฎีความน่าจะเป็นขององค์กร"
 tech_probability_theory_desc:0 "โดย การ จําลอง ทาง คณิตศาสตร์ ที่ ก้าว หน้า มาก พอ อาจ เป็น ไป ได้ ที่ จะ ทํานาย เรื่อง เศรษฐกิจ ที่ แปรปรวน ของ สังคม อินทรีย์ ใน บาง รูป แบบ ที่ จํากัด. นี่จะทําให้เราจัดการตลาดหลักทรัพย์ของพวกเขา เพื่อประโยชน์ของเรา"
 tech_binary_motivators:0 "แรงจูงใจแบบไบนารี"
 tech_binary_motivators_desc:0 "เครื่อง กระตุ้น เหล่า นี้ ทั้ง เล็ก กว่า และ เบา กว่า รุ่น ก่อน ๆ ทํา ให้ หน่วย หุ่น ยนต์ สามารถ อุด ช่อง สําหรับ การ เคลื่อน ที่ เพิ่ม ขึ้น."
 tech_nanite_assemblers:0 "ใช้นาไนต์สร้างหุ่นยนต์"
 tech_nanite_assemblers_desc:0 "การใช้นาไนท์ที่โปรแกรมได้ ช่วยในการก่อสร้างหน่วยหุ่นยนต์ใหม่ จะอนุญาตให้แบบจําลองที่ก้าวหน้าขึ้น"
 tech_adaptive_combat_algorithms:0 "อัลกอริทึมการรบแบบปรับตัว"
 tech_adaptive_combat_algorithms_desc:0 "นัก พันธุ ศาสตร์ มัก จะ ต่อ สู้ โดย ใช้ กลวิธี ที่ ไม่ มี เหตุ ผล และ ไม่ อาจ คาด เดา ได้ ซึ่ง สามารถ โต้ แย้ง ได้ ยาก. ยุทธวิธี ที่ ปรับ ตัว ได้ และ แบบ แผน ใหม่ ที่ ใช้ กล อุบาย ได้ มาก ขึ้น น่า จะ เป็น ประโยชน์ อย่าง เด็ด ขาด."
 tech_biomechanics:0 "ชีวกลศาสตร์"
 tech_biomechanics_desc:0 "บาง ครั้ง หลาย ล้าน ปี ของ วิวัฒนาการ แบบ อินทรีย์ จะ มี การ ใช้ วิธี แก้ ที่ ยอด เยี่ยม ซึ่ง สามารถ นํา มา ใช้ ได้ กับ เครื่อง ออก แบบ ด้วย."
 tech_singularity_core:0 "แกนเอก"
 tech_singularity_core_desc:0 "หลุม ดํา ที่ ถูก ขัง ไว้ ซึ่ง สามารถ ศึกษา ได้ ใน สภาพ แวด ล้อม ที่ มี การ ควบคุม จะ เป็น สิ่ง มี ค่า ใน การ วิจัย อย่าง น่า ทึ่ง."
 tech_micro_replicators:0 "ตัวทำซ้ำขนาดไมโคร"
 tech_micro_replicators_desc:0 "เครื่องมือไมโครสคอป ที่สามารถช่วยในการจําลองหน่วยของเรา ในการสร้างวงจรที่ซับซ้อนมากขึ้น"
 tech_self_assembling_components:0 "ชิ้นส่วนที่สามารถประกอบตัวเองขึ้นมาได้"
 tech_self_assembling_components_desc:0 "ออกแบบจากดีเอ็นเออินทรีย์ สมองของเครื่องจักรขนาดจิ๋วนี้ สามารถประกอบองค์ประกอบ ที่จําเป็นสําหรับหุ่นยนต์ตัวใหม่ได้เอง"

