 # Mass Driver Branch
 tech_mass_drivers_1:0 "เครื่องยิงด้วยการเหนี่ยวนำแม่เหล็กไฟฟ้า"
 tech_mass_drivers_1_desc:0 "เครื่องยิงแม่เหล็กไฟฟ้าเหล่านี้ ใช้แม่เหล็กในการเร่งรอบเจาะเกราะ ไปยังเป้าหมายที่ความเร็วสูง"
 tech_mass_drivers_2:0 "ปืนแม่เหล็กไฟฟ้าแบบขดลวดเหนี่ยวนำ"
 tech_mass_drivers_2_desc:0 "คูลกุนเป็นรุ่นที่มีประสิทธิภาพมากขึ้น ของคนขับมวลชนในยุคแรก โดยใช้ขดลวดแม่เหล็กไฟฟ้า"
 tech_mass_drivers_3:0 "ปืนแม่เหล็กไฟฟ้าแบบรางคู่ขนาน"
 tech_mass_drivers_3_desc:0 "เครื่องเร่งอนุภาคแม่เหล็กไฟฟ้าล่าสุด ปืนรางใช้รางคู่ขนานยิง ด้วยความเร็วสูงเหลือเชื่อ"
 tech_mass_drivers_4:0 "ปืนแม่เหล็กไฟฟ้าแบบรางคู่ขนานขั้นสูง"
 tech_mass_drivers_4_desc:0 "รุ่นใหม่ของปืนรางที่สามารถลากได้ กับรางที่หนาขึ้นและอุปทานพลังงาน อาวุธ เหล่า นี้ มี พลัง มาก กว่า และ แม่นยํา กว่า อาวุธ เก่า ก่อน ด้วย ซ้ํา."
 tech_mass_drivers_5:0 "ปืนใหญ่เกาส์"
 tech_mass_drivers_5_desc:0 "รุ่นที่อัพเดตของการออกแบบ ขดลวดเก่านี้ยิ่งเสียหายมากขึ้น กว่าการออกแบบรถรางล่าสุด มันสามารถปล่อยกระสุนได้แม่นยําและความเร็ว"
 tech_kinetic_artillery_1:0 "ป้อมปืนพลังงานจลน์"
 tech_kinetic_artillery_1_desc:0 "ปืนใหญ่ที่ยาวมาก ที่สามารถโยนกระสุนที่มีประสิทธิภาพ มากกว่าระยะทางสุดขั้ว ด้วยระดับความแม่นยําสูง"
 tech_kinetic_artillery_2:0 "ปืนใหญ่พลังงานจลน์"
 tech_kinetic_artillery_2_desc:0 "ปืนใหญ่ปืนใหญ่ที่อยู่บนเรือ มีถังใหม่และคอมควบคุมไฟ"
 tech_mass_accelerator_1:0 "ปืนใหญ่ (ใหญ่มาก)"
 tech_mass_accelerator_1_desc:0 "กระสุน ปืน ใหญ่ ขนาด มหึมา ซึ่ง สามารถ นํา ไป วาง ไว้ บน สัน หลัง และ ยิง ลูก กระสุน ที่ ทรง พลัง อย่าง ยิ่ง ตลอด ระยะ ทาง อัน ไกล โพ้น."
 tech_mass_accelerator_2:0 "ปืนใหญ่ (ยักษ์)"
 tech_mass_accelerator_2_desc:0 "ปืนใหญ่มวลที่มีประสิทธิภาพมากขึ้น ที่สามารถเจาะผ่านโล่ที่ยากที่สุด"

 # Auto-Cannon Branch
 tech_autocannons_1:0 "ปืนใหญ่อัตโนมัติ"
 tech_autocannons_1_desc:0 "ปืนใหญ่ขนาดใหญ่ ที่ยิงลูกระเบิด ผลประโยชน์หลักของปืนใหญ่พวกนี้ คือไฟสูง"
 tech_autocannons_2:0 "ปืนใหญ่ (ริปเปอร์)"
 tech_autocannons_2_desc:0 "พวกที่อัพเกรดระบบติดตาม และระบบควบคุมการยิง การ ทํา เช่น นี้ ทํา ให้ พวก เขา รักษา อัตรา ไฟ ที่ สูง กว่า นั้น อีก."
 tech_autocannons_3:0 "ปืนใหญ่ (สตอร์มไฟร์)"
 tech_autocannons_3_desc:1 "เครื่องราชอิสริยาภรณ์ชั้นสูง สามารถพ่นก้อนกระสุนระเบิดสูง ที่เป้าหมายได้"

 tech_flak_batteries_1:1 "ป้อมปืน (กระสุนสะเก็ดระเบิด)"
 tech_flak_batteries_1_desc:1 "แบตเตอรี่ปืนที่กระสุนรอบในระยะใกล้ พวก มัน เป็น อันตราย ถึง ชีวิต โดย เฉพาะ ต่อ ยาน โจมตี ของ ศัตรู แต่ ก็ สามารถ ป้องกัน ขีปนาวุธ ได้ ด้วย."
 tech_flak_batteries_2:1 "ปืนครก (กระสุนสะเก็ดระเบิด)"
 tech_flak_batteries_2_desc:1 "อัพเกรดแบตเตอรีใหม่ ด้วยกระสุนลูกระเบิด"
 tech_flak_batteries_3:1 "ปืนใหญ่ (กระสุนสะเก็ดระเบิด)"
 tech_flak_batteries_3_desc:1 "อัลกอริธึมติดตามและยิ่งใช้กระสุนที่มีประสิทธิภาพมากขึ้น ทําให้แบตเตอรี่เหล่านี้ร้ายแรงอย่างเหลือเชื่อ"

 # Missile Branch
 tech_missiles_1:0 "มิสไซล์นิวเคลียร์"
 tech_missiles_1_desc:0 "ขีปนาวุธอวกาศต่ออวกาศ ติดหัวรบนิวเคลียร์ แม้ว่าจากเทคโนโลยีก่อนอวกาศอันเก่าแก่ อาวุธที่ใช้ยิงและลืมเหล่านี้จะมีประสิทธิภาพอย่างน่าแปลกใจ ในระยะ"
 tech_missiles_2:0 "มิสไซล์ฟิวชัน"
 tech_missiles_2_desc:0 "ขีปนาวุธอวกาศต่ออวกาศเหล่านี้ ปรับให้ทันสมัย มีหัวรบฟิวชั่นที่มีประสิทธิภาพมากขึ้น และปรับปรุงประสิทธิภาพการบิน"
 tech_missiles_3:0 "มิสไซล์ปฏิสสาร"
 tech_missiles_3_desc:0 "ขีปนาวุธขั้นสูง มีหัวรบนิวเคลียร์ที่มีประสิทธิภาพมาก ระบบนําทางแบบใหม่และปรับปรุง ให้โอกาสพวกเขาหาเป้าหมายที่ดีกว่า"
 tech_missiles_4:0 "มิสไซล์ควอนตัม"
 tech_missiles_4_desc:0 "ขีปนาวุธอวกาศ-อวกาศรุ่นล่าสุด การอัพเกรดนี้ มีหัวรบที่ทรงพลังมาก ซึ่งดูดพลังงานจากเครื่องดูดฝุ่นศูนย์จุด"
 tech_missiles_5:0 "มิสไซล์นักล่า"
 tech_missiles_5_desc:0 "ขีปนาวุธความเร็วสูงเหล่านี้มี จํากัด นักบิน AI ที่ปรับปรุงอย่างมาก มีประสิทธิภาพและความสามารถในการติดตามเป้าหมาย"
 tech_swarmer_missiles_1:0 "ฝูงมิสไซล์"
 tech_swarmer_missiles_1_desc:0 "ขีปนาวุธขนาดเล็กเหล่านี้จะเปิดตัวในวอลลีย์และได้รับการออกแบบโดยเฉพาะ เพื่อครอบคลุมระบบการป้องกันจุดศัตรู"
 tech_swarmer_missiles_2:0 "มิสไซล์ลมกรด"
 tech_swarmer_missiles_2_desc:0 "เทคนิคใหม่ในการลดความเร็ว จะช่วยให้เราเตรียมจรวดเพอร์เกอร์ ด้วยหัวรบที่มีประสิทธิภาพมากขึ้น"

 # Torpedo Branch
 tech_torpedoes_1:0 "ตอร์ปิโดอวกาศ"
 tech_torpedoes_1_desc:0 "ตอร์ปิโดเหล่านี้เป็นหลักที่มีขนาดใหญ่มาก การเคลื่อนย้ายช้า มันมีหัวรบที่มีประสิทธิภาพมากขึ้น และเกราะป้องกัน ที่ปล่อยพวกมัน ลอดผ่านหน้าจอพลังงาน"
 tech_torpedoes_2:0 "ตอร์ปิโดหุ้มเกราะ"
 tech_torpedoes_2_desc:0 "ตอร์ปิโดอวกาศที่อัพเกรดแล้วถูกบรรจุอยู่ในเกราะ เพื่อให้ดีกว่าทนไฟป้องกันจุดศัตรู เกราะ จะ แตก เป็น เศษ ๆ ซึ่ง ก่อ ความ เสีย หาย เพิ่ม ขึ้น เมื่อ ตอร์ปิโด ระเบิด."
 tech_torpedoes_3:0 "ตอร์ปิโดทำลายล้าง"
 tech_torpedoes_3_desc:0 "ตอร์ปิโดขั้นสูง มีหัวรบที่ทรงพลังมาก พวกเขามีการออกแบบแบบสลีกเกอร์ เครื่องยนต์ที่เร็วกว่า และอัพเกรดเครื่องปรับเกราะ สําหรับลื่นผ่านหน้าจอพลังงาน"

