 # Engineering
 tech_repeatable_improved_tile_mineral_output:0 "รูปแบบการสกัด"
 tech_repeatable_improved_tile_mineral_output_desc:2 "การ เปลี่ยน แปลง ของ แร่ ธาตุ ต่าง ๆ เมื่อ เทียบ กัน แล้ว จะ นํา ไป สู่ รูป แบบ ที่ น่า เบื่อ กว่า."
 tech_repeatable_improved_military_station_damage:0 "รูปแบบการยิงแบบซิงโครไนซ์"
 tech_repeatable_improved_military_station_damage_desc:1 "การข้ามระบบอาวุธเพื่อยิงในวอลลีย์ที่ถูกโซเซ ปรับปรุงผลที่มีผลเสียจริง ของสถานีทางทหารเมื่อเวลาผ่านไป"
 tech_repeatable_improved_military_station_health:0 "เสริมเกราะชั้นแกนกลาง"
 tech_repeatable_improved_military_station_health_desc:1 "เกราะ อีก ชั้น หนึ่ง ที่ ติด อยู่ ภาย ใน โครง สร้าง นั้น เอง จะ ปรับ ปรุง ความ ยืดหยุ่น ของ สถานี ทหาร."
 tech_repeatable_improved_ship_health:0 "ความมั่นคงของตัวยาน"
 tech_repeatable_improved_ship_health_desc:1 "การ เพิ่ม ขึ้น ของ พื้น ที่ บน เรือ ทํา ให้ เรือ มี ความ เสีย หาย มาก ขึ้น ก่อน ที่ ความ ซื่อ สัตย์ มั่นคง ของ เรือ จะ ถึง ระดับ ต่ํา สุด."
 tech_repeatable_improved_armor_output:0 "การบีบอัดสสาร"
 tech_repeatable_improved_armor_output_desc:1 "การบีบอัดวัสดุที่เหมาะสม ให้เป็นรูปแบบที่มีคุณภาพสูง เป็นวิธีที่ถูกและมีประสิทธิภาพ ในการปรับปรุงความสามารถของพวกเขา"
 tech_repeatable_weapon_type_explosive_damage:0 "การควบคุมผลผลิตเทอร์โมไดนามิกส์"
 tech_repeatable_weapon_type_explosive_damage_desc:1 "ด้วยปฏิกิริยาเคมีที่ควบคุมแน่นโดย ไมโครโปรเซสบอร์ด หัวรบสามารถปรับให้มีผลสูงสุด ต่อสภาพท้องถิ่นในเวลาของผลกระทบ"
 tech_repeatable_weapon_type_explosive_fire_rate:0 "เครื่องจุดระเบิดล่วงหน้าขนาดเล็ก"
 tech_repeatable_weapon_type_explosive_fire_rate_desc:1 "ความก้าวหน้าในการลดปริมาณ การโหลดที่รวดเร็วขึ้น และการเพิ่มปริมาณจรวด"
 tech_repeatable_weapon_type_kinetic_damage:0 "อาวุธความหนาแน่นสูง"
 tech_repeatable_weapon_type_kinetic_damage_desc:1 "กระสุนอัลตราไวโอเลตสามารถเจาะผ่านได้ แม้โล่ที่แข็งแกร่งที่สุด"
 tech_repeatable_weapon_type_kinetic_fire_rate:0 "ประสิทธิภาพตัวโหลด"
 tech_repeatable_weapon_type_kinetic_fire_rate_desc:1 "ความ ก้าว หน้า เล็ก ๆ น้อย ๆ ทาง เทคนิค รวม ไป ถึง กิจวัตร ที่ ดี ขึ้น ใน การ จัด การ กับ อาวุธ เพื่อ เพิ่ม อัตรา ไฟ ไหม้."

 #Physics
 tech_repeatable_improved_tile_energy_output:0 "ประยุกต์ใช้การนำไฟฟ้ายิ่งยวด"
 tech_repeatable_improved_tile_energy_output_desc:1 "การ ปรับ ปรุง เล็ก ๆ น้อย ๆ เพื่อ การ ถ่ายทอด อย่าง มี ประสิทธิภาพ เพิ่ม เข้า กับ การ ลด ขนาด ใน การ สูญ เสีย พลังงาน ทั้ง หมด."
 tech_repeatable_improved_shield_output:0 "โล่พลังงานแบบประสาน"
 tech_repeatable_improved_shield_output_desc:1 "เครื่อง มือ พื้น ฐาน ของ โล่ เรือ มี ความ ซับ ซ้อน แต่ สามารถ ปรับ ปรุง และ ปรับ ปรุง ได้ ใน หลาย ทาง."
 tech_repeatable_weapon_type_energy_damage:0 "โฟกัสอาร์เรย์จำนวนมาก"
 tech_repeatable_weapon_type_energy_damage_desc:1 "การ ทํา ให้ อาวุธ เลเซอร์ ที่ ใช้ ยิง ได้ สมบูรณ์ แบบ เป็น งาน ที่ ทํา ให้ พวก ผู้ เชี่ยวชาญ ด้าน วิศวกรรม ของ ดาว เคราะห์ ดวง ใด ๆ ซึ่ง มี งาน ยุ่ง เป็น เวลา หลาย ศตวรรษ."
 tech_repeatable_weapon_type_energy_fire_rate:0 "เครื่องทำให้เย็นอย่างรวดเร็ว"
 tech_repeatable_weapon_type_energy_fire_rate_desc:1 "การพัฒนาใหม่ในเทคโนโลยีเย็นพื้นผิวปกติ ปรับปรุงความมั่นคงและประสิทธิภาพของระบบอาวุธของเรา ป้องกันไม่ให้พวกเขาระเบิดขึ้นเรือที่พวกเขาได้รับการติด"
 tech_repeatable_weapon_type_strike_craft_fire_damage:0 "ไซแน็ปอินเตอร์เซ็ปเตอร์"
 tech_repeatable_weapon_type_strike_craft_fire_damage_desc:1 "การ เพิ่ม ความ เร็ว ที่ นัก บิน นัก รบ สามารถ ดําเนิน การ และ ปฏิบัติ ตาม การ ปรับ ตั้ง ข้อมูล ของ ฝ่าย ศัตรู ทํา ให้ ยาน รบ สามารถ ก้าว ขึ้น ไป ได้ ไม่ กี่ ขั้น."
 tech_repeatable_weapon_type_strike_craft_fire_rate:1 "การฝึกนักบินแบบซ้ำๆ"
 tech_repeatable_weapon_type_strike_craft_fire_rate_desc:2 "โดยการเก็บรวบรวมและวิเคราะห์ข้อมูลการแสดง ของนักบินก่อนหน้า เราได้ปรับปรุงวิธีการฝึกนักบินของเรา แต่ละคนจะเร็วกว่าคนที่มาก่อน"
 tech_repeatable_improved_planet_sensor_range:0 "สัญญาณ จาก ดาว เคราะห์"
 tech_repeatable_improved_planet_sensor_range_desc:1 "ขณะ ที่ กอง เรือ ของ เรา ท่อง ไป ไกล จาก บ้าน บรรพบุรุษ ของ เรา เทคโนโลยี เซ็นเซอร์ ของ เรา ก็ ผลัก ดัน อย่าง ต่อ เนื่อง ให้ ผ่าน ขีด จํากัด ของ สมัย โบราณ."
 tech_repeatable_reduced_building_cost:0 "การวิเคราะห์ความโน้มถ่วง"
 tech_repeatable_reduced_building_cost_desc:1 "การคิดคํานวณที่มีประสิทธิภาพมากขึ้น ช่วยให้เราปรับตัว โครงการก่อสร้างแต่ละบุคคล" #by adapting each construction-project to local gravitational conditions we can save on materials used
 tech_repeatable_reduced_building_time:0 "อัลกอริทึม / วิธีการประกอบ"
 tech_repeatable_reduced_building_time_desc:1 "การ นํา เกม และ ทฤษฎี ปริศนา มา ใช้ มี ศักยภาพ ที่ จะ ทํา ให้ การ ประชุม และ การ ก่อ สร้าง ที่ เหมาะ สม ยิ่ง ขึ้น." # through the use of advanced puzzle-logic we can make sure each building is assembled in the optimal order and pattern

 #Society:
 tech_repeatable_improved_tile_food_output:0 "พืชดัดแปลงพันธุกรรม"
 tech_repeatable_improved_tile_food_output_desc:1 "พืช ผล ที่ ได้ รับ การ ถ่ายทอด ให้ มี ส่วน ประกอบ ทาง โภชนาการ จาก พืช ผล ที่ เป็น มาตรฐาน หลาย ชนิด ใน กล่อง เดียว ที่ สะดวก."
 tech_repeatable_improved_sector_cap:0 "โพรโทคอลสื่อสาร"
 tech_repeatable_improved_sector_cap_desc:1 "ช่องทางการสื่อสารของความเร็วที่ปรับปรุงแล้ว อนุญาตให้มีการจัดการมากขึ้น"
 tech_repeatable_improved_core_system_cap:0 "ประสิทธิภาพการบริหาร"
 tech_repeatable_improved_core_system_cap_desc:1 "การปรับโครงสร้างเว็บผู้จัดการ เชื่อมโยงโลกหลักกับเมืองหลวงนั้น สามารถช่วยบรรเทาความเครียดของผู้บริหาร และจุดอุดตันของข้อมูล"
 tech_repeatable_improved_leader_cap:0 "ตั้งค่าโครงการ"
 tech_repeatable_improved_leader_cap_desc:1 "แนวคิดในการจัดการปัจเจกบุคคล ในฐานะทรัพยากรภายในระบบการผลิตขนาดใหญ่ จําเป็นต้องมีความยืดหยุ่นมากขึ้น"
 tech_repeatable_reduced_leader_cost:0 "การ จับ กุม ความ สามารถ"
 tech_repeatable_reduced_leader_cost_desc:1 "โครงการโฆษณาชวนเชื่อและการปรับเปลี่ยนอย่างแยบยลของบันทึกเศรษฐกิจ ผลักดันค่าใช้จ่ายในการจ้างผู้นําชั้นนํา"
 tech_repeatable_reduced_leader_cost_machine_intelligence:0 "ป้องกัน บุคลิกภาพ"
 tech_repeatable_reduced_leader_cost_desc_machine_intelligence:0 "ตัวตนใหม่ ๆ มักจะมีความเสี่ยง ที่จะตกไปสู่ความบ้าหรือความหมกมุ่นที่ เกิดมาจาก การป้องกันที่ดีกว่า จะลดความเสี่ยงนี้"
 tech_repeatable_improved_edict_length:0 "การเผยแพร่ประกาศคำสั่ง"
 tech_repeatable_improved_edict_length_desc:1 "การรณรงค์ข้อมูลที่ก้าวร้าวมากขึ้น ยกระดับการตอบรับประชาชนต่อพระราชบัญญัติ"
 tech_repeatable_improved_army_damage:0 "การเรียนรู้และฝึกการบุก"
 tech_repeatable_improved_army_damage_desc:1 "การเข้าประจําการในระเบียบพื้นฐาน สําหรับกองกําลังภาคพื้นดิน ได้พิสูจน์แล้ว ว่าทําให้มันมีประสิทธิภาพมากขึ้น ในการต่อสู้โดยตรง"
 tech_repeatable_improved_army_health:0 "ตัวต่อต้านประสาทการรับรู้ความเจ็บปวด"
 tech_repeatable_improved_army_health_desc:1 "ตัว รับ ความ เจ็บ ปวด อย่าง ระมัดระวัง ทํา ให้ ทหาร สามารถ ต่อ สู้ กับ สิ่ง ที่ เคย ทํา ให้ เสีย หาย."
 tech_repeatable_improved_leader_life_span:0 "การฟื้นฟูเซลล์"
 tech_repeatable_improved_leader_life_span_desc:1 "การปฏิรูปการฟื้นฟูของเซลล์ จะช่วยรักษาการกระตุ้นของกลุ่มผู้นํา"
 tech_repeatable_improved_starbase_capacity:0 "การขยายอาณาเขตระหว่างดวงดาว"
 tech_repeatable_improved_starbase_capacity_desc:1 "เครือ ข่าย การ สนับสนุน การ ทํา ไม้ ขนาด มหึมา ที่ จําเป็น เพื่อ รักษา การ ยกระดับฐานดวงดาวสามารถปรับปรุงได้ดีขึ้น ทําให้เราสามารถรองรับ สถานีเหล่านี้ได้มากขึ้น"
 tech_repeatable_improved_slave_mineral_output:0 "การ ควบคุม อาหาร"
 tech_repeatable_improved_slave_mineral_output_desc:1 "สาร เคมี ที่ ปรับ ปรุง อาหาร ให้ ดี ที่ สุด สําหรับ คน งาน ที่ ไม่ ได้ รับ การ รักษา จึง ทํา ให้ พวก เขา สามารถ ทํา งาน ได้ อย่าง ดี เยี่ยม ยิ่ง กว่า รูป แบบ การ ผลิต."
 tech_repeatable_naval_cap:0 "กระบวนการขั้นตอนการจัดการกองยาน"
 tech_repeatable_naval_cap_desc:0 "การ จัด การ กับ กอง เรือ ให้ ดี ขึ้น จะ ช่วย ปลด ปล่อย ทรัพยากร ที่ จําเป็น เพื่อ รักษา กอง เรือ ที่ ใหญ่ กว่า."
 tech_repeatable_command_limit:0 "เจ้าหน้าที่สนับสนุนทหารยานรบ"
 tech_repeatable_command_limit_desc:0 "จะเพิ่มจํานวนเรือที่พวกเขาสามารถนําในกองเรือเดียว"

