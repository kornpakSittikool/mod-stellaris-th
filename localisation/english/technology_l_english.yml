 tech_databank_uplinks:0 "การเชื่อมต่อคลังฐานข้อมูลขนาดมหึมา"
 tech_databank_uplinks_desc:0 "วงดนตรีควอนตัมระดับสูง ที่อุทิศให้กับการโอนถ่ายข้อมูล ทําให้เป็นไปได้จริงๆ"
 tech_improved_databank_uplinks:0 "การย่อขนาดอัปลิงก์"
 tech_improved_databank_uplinks_desc:0 "การ จํากัด การ ส่ง สัญญาณ ปลาย จุด ทํา ให้ สามารถ ติด ตั้ง ใน กระจุก ดาว ได้ และ เพิ่ม แว่น ขยาย."

 # Physics Lab & related
 tech_basic_science_lab_1:0 "วิธีการทางวิทยาศาสตร์"
 tech_basic_science_lab_1_desc:0 "คําทํานายของปรากฏการณ์ที่สังเกตได้"
 tech_basic_science_lab_2:0 "ห้องวิจัยวัสดุแปลกใหม่"
 tech_basic_science_lab_2_desc:1 "ขณะ ที่ เรา สํารวจ กาแล็กซี ต่าง ๆ เรา พบ วัสดุ ใหม่ ๆ และ สาร ที่ เรา ไม่ คุ้น เคย. การแยกและวิเคราะห์การค้นพบเหล่านี้ ต้องการสิ่งอํานวยความสะดวกใหม่"
 tech_basic_science_lab_3:0 "การศึกษาหลายมิติ"
 tech_basic_science_lab_3_desc:1 "เพื่อขยายความรู้ของเรา เราต้องพิจารณาทุกระดับของการดํารงอยู่ ดินแดนใหม่ของวิทยาศาสตร์ รอเรา!"
 tech_physics_1:0 "การคอมไพล์ของ Quantum"
 tech_physics_1_desc:0 "ด้วยความเร็วในการประมวลผลที่ท้าทายข้อจํากัดคลาสสิก ศักยภาพของคอมพิวเตอร์ควอนตัมมีไม่มีที่สิ้นสุด เทคโนโลยีการปฏิวัตินี้ ได้ประกาศการก้าวกระโดด เข้าสู่พื้นที่ที่ไม่คุ้นเคย ของการแก้ปัญหา"
 tech_physics_2:0 "ทฤษฎีของสนามแบบไม่รวม"
 tech_physics_2_desc:0 "พลังพื้นฐานของจักรวาล สามารถถูกสื่อด้วยสนามกายภาพ การควบคุมกระบวนการนี้ ทําให้เราได้เล่นเป็นพระเจ้า อย่างน้อยก็ในขอบเขตของห้องปฏิบัติการวิทยาศาสตร์"
 tech_physics_3:0 "คลื่น ควอนตัม"
 tech_physics_3_desc:0 "เรารู้ว่าแรงโน้มถ่วงและเวลา มีการเชื่อมโยงนาน ก่อนที่เราจะถึงดาว ทีนี้ ความเข้าใจของเราเกี่ยวกับความสัมพันธ์ที่พิเศษนี้ ได้ถึงจุดเปลี่ยน ที่ช่วยให้เราจัดการพลัง ในระดับที่คาดไม่ถึงก่อนหน้านี้"
 #tech_physics_4: "Thesis of Everything"
 #tech_physics_4_desc: ""... therefore we postulate that the meaning of existence, and the origin and purpose of all creation can be summed up as a simple formula as follows...""
 tech_administrative_ai:0 "AI การบริหารจัดการ"
 tech_administrative_ai_desc:0 "วงจรขององค์กร การฟื้นฟูความกระตือรือร้นทางวิชาการ"
 tech_administrative_ai_machine_intelligence:0 "การเพิ่มประสิทธิภาพทางวิชาการ"
 tech_administrative_ai_desc_machine_intelligence:0 "เรือดําน้ําใหม่จะเหลา โฟกัสของหน่วยวิจัยของเรา และกําจัดความไม่เสมอภาค"
 tech_self_aware_logic:2 "ตรรกะการพัฒนาตนเอง"
 tech_self_aware_logic_desc:2 "การจัดลําดับพิเศษ"
 tech_sapient_ai:0 "AI โพซิทรอนิกส์"
 tech_sapient_ai_desc:0 "การปลดปล่อยปัญญาประดิษฐ์ กําลังเปิดประตูไปสู่ความเป็นไปได้ สําหรับสารสังเคราะห์ที่แท้จริง"

 tech_administrative_ai_hive_mind:0 "ตัวเพิ่มประสิทธิภาพระบบประสาท"
 tech_administrative_ai_desc_hive_mind:0 "คิดก่อนลงมือ จิตใจของเราจะพัฒนาไปสู่ความสูงที่สูงขึ้น"
 tech_self_aware_logic_hive_mind:0 "ประสาทสมองแบบควบคุมได้ด้วยตัวเอง"
 tech_self_aware_logic_desc_hive_mind:0 "ความสามัคคีที่แยกไม่ได้"

 tech_positronic_implants:0 "ฝังสมองโพซิทรอนิกส์ในร่างกาย"
 tech_positronic_implants_desc:0 "การขยายความเป็นไปได้ ผ่านการประยุกต์ใช้ ไซเบอร์เนติก จํากัด"
 tech_positronic_implants_machine_intelligence:0 "โปรเซสเซอร์โพซิทรอนิกส์ (หน่วยประมวลผลกลาง)"
 tech_positronic_implants_desc_machine_intelligence:0 "เปิดเส้นทางใหม่ของความคิดสังเคราะห์"

 tech_combat_computers_1:0 "คอมพิวเตอร์การรบเฉพาะทาง"
 tech_combat_computers_1_desc:0 "เมทริกซ์ที่ใช้งานได้ ปรับเทียบงานเฉพาะที่เน้นการต่อสู้ ให้มีประสิทธิภาพมากขึ้น" # The development of active combat personalities allows combat-AI to specialize heavily in specific tasks.
 tech_combat_computers_2:0 "อัลกอริทึมการรบแบบขยาย"
 tech_combat_computers_2_desc:0 "ความก้าวหน้าเพิ่มเติมในอัลกอริทึมทํานาย เปิดโอกาสให้การตัดสินใจเพิ่มเติมในสาขาวิชาชีพ"
 tech_combat_computers_3:0 "การจำลองการรบแบบฉลาด"
 tech_combat_computers_3_desc:0 "การใช้โปรแกรมกันยายนผ่านการจําลองการต่อสู้ที่มีประสิทธิภาพสูง ส่งผลให้มีความเข้าใจที่มีคุณค่า" # The effectiveness of Ship-AIs have proved far greater with the sensation of a fear of death.
 tech_combat_computers_autonomous:0 "สติปัญญาของยานที่ควบคุมได้ด้วยตัวเอง"
 tech_combat_computers_autonomous_desc:0 "การให้เรือของเรา ปัญญากึ่งอัตโนมัติของตัวเอง จะเพิ่มการตอบสนองของพวกเขา ในการต่อสู้"
 tech_pd_tracking_1:0 "การตอบโต้ว่องไว"
 tech_pd_tracking_1_desc:0 "การป้องกันที่ดีที่สุด คือการละเมิดที่ดี"
 tech_pd_tracking_2:0 "ระบบรองรับการเชื่อมต่อ"
 tech_pd_tracking_2_desc:0 "การต่อกรป้องกัน มีประสิทธิภาพมากกว่า การตอบโต้แบบอิสระ"
 tech_pd_tracking_3:0 "อัลกอริทึมในการทำนายคาดการณ์"
 tech_pd_tracking_3_desc:0 "การ คาด การณ์ ล่วง หน้า ล่วง หน้า อย่าง ดี ยิ่ง ช่วย เพิ่ม ความ ถูก ต้อง แม่นยํา ของ ระบบ แก้ ปัญหา."
 tech_synchronized_defences:0 "การป้องกันแบบซิงโครไนซ์"
 tech_synchronized_defences_desc:0 "การจัดรูปแบบการป้องกันและอาวุธที่น่ารังเกียจ รูปแบบของการประหารชีวิต ทําให้มีประสิทธิภาพเพิ่มขึ้น"
 tech_global_research_initiative:1 "การริเริ่มการวิจัยระหว่างดาวเคราะห์"
 tech_global_research_initiative_desc:2 "ประมูลสําหรับแหล่งทรัพยากรระหว่างดาว และการวิจัยที่ยืดหยุ่นมากขึ้น"
 tech_neuro_quantum_links:0 "ลิงก์สมองกับควอนตัมคอมพิวเตอร์"
 tech_neuro_quantum_links_desc:0 "การปลูกถ่ายระบบประสาทขั้นสูงที่มีการเชื่อมต่อกับคลัสเตอร์ควอนตัมคอมพิวเตอร์ช่วยให้มีความคิดแบบมัลติเธรด(คิดหลายๆอย่างในเวเลาเดียวกัน)"
 tech_cryostasis_1:0 "เรือโคนีอัตโนมัติ"
 tech_cryostasis_1_desc:1 "โดยให้การควบคุมของเรืออาณานิคมกับคอมพิวเตอร์บนกระดานลูกเรือและอาณานิคม สามารถวางในแอนิเมชันระงับ"
 tech_cryostasis_1_wilderness: "การขยายการแผ่ขยาย"
 tech_cryostasis_1_wilderness_desc: "โดยแรกการฝังลูกสนใหม่ของเรา ในดินพื้นเมืองของอาณานิคมใหม่ เราสามารถเร่งกระบวนการเร่งความเร็ว"
 tech_cryostasis_1_machine_intelligence:0 "โดรนสร้างอาณานิคม"
 tech_cryostasis_1_desc_machine_intelligence:0 "เครื่อง บิน ขนาด เล็ก แต่ มี ประสิทธิภาพ ใน การ ก่อ สร้าง ซึ่ง เก็บ ไว้ ใน อ่าว บรรทุก สินค้า ของ ใน เรือ อาณานิคม. เมื่อเปิดใช้งานบนพื้นผิวดาวเคราะห์ พวกมันเร่งกระบวนการตั้งถิ่นฐานครั้งแรกอย่างมาก"
 tech_cryostasis_2:0 "ยานอาณานิคมที่สั่งการได้ด้วยตนเอง"
 tech_cryostasis_2_desc:1 "ระบบ ที่ ก้าว หน้า มาก พอ สามารถ ปรับ ปรุง ตัว เอง ให้ ดี ที่ สุด ได้ หาก มี การ ทํา ให้ ระบบ เหล่า นั้น ตระหนัก อย่าง เต็ม ที่ ถึง วัตถุ ประสงค์ ที่ พวก เขา ถูก สร้าง ขึ้น."
 tech_cryostasis_2_wilderness: "การขยายกิจการอย่างถาวร"
 tech_cryostasis_2_wilderness_desc: "การรักษาต้นไผ่เฉพาะที่ สามารถอยู่รอดสภาพภูมิอากาศทุกประเภท ลดลงอย่างมหาศาล"
 tech_automated_exploration:0 "การสำรวจอัตโนมัติ"
 tech_automated_exploration_desc:0 "AI ก้าวหน้า จะช่วยเจ้าหน้าที่วิทยาศาสตร์ในหน้าที่ของพวกเขา เพื่อสํารวจโลกใหม่ที่แปลกประหลาด เพื่อแสวงหาชีวิตใหม่และอารยธรรมใหม่ ยานวิทยาศาสตร์จะสามารถสํารวจกาแล็กซี่ได้ ด้วยความช่วยเหลือจาก AI"
 tech_automated_exploration_machine_intelligence:0 "อัลกอริทึมการสำรวจอัตโนมัติ"
 tech_automated_exploration_desc_machine_intelligence:0 "การปรับปรุงและก้าวหน้ามากขึ้น อัลกอริธึมไม่เพียงแต่เร่งความเร็วในการสํารวจ แต่ยังอนุญาตให้ทรัพย์สินการสํารวจของเรา"
 tech_auxiliary_fire_control:0 "ระบบช่วยสนับสนุนควบคุมการยิง"
 tech_auxiliary_fire_control_desc:1 "$FIRE_CONTROL_1_DESC$"

 # Resources
 tech_exotic_gases:0 "การกลั่นก๊าซแปลกประหลาด"
 tech_exotic_gases_desc:0 "ตัวแบ่งประเภท ก๊าซ สามารถ ผลิต ได้ ด้วย วิธี สังเคราะห์ แต่ เป็น กระบวนการ ที่ ยาก ซึ่ง ต้อง ใช้ อุปกรณ์ หลอม เหลว ที่ ก้าว หน้า."
 tech_volatile_motes:0 "โรงงานวัสดุระเหย"
 tech_volatile_motes_desc:1 "นอก จาก ความ เป็น ห่วง เรื่อง ความ ปลอด ภัย ที่ เห็น ได้ ชัด แล้ว การ ประดิษฐ์ โมเติล แบบ จําลอง เป็น กระบวนการ ที่ ซับ ซ้อน และ ซับ ซ้อน อย่าง ยิ่ง ซึ่ง ต้อง ใช้ อุปกรณ์ พิเศษ สูง."
 tech_rare_crystals:0 "การผลิตผลึกหายาก"
 tech_rare_crystals_desc:1 "การ ทํา ผลึก เป็น กระบวนการ ที่ ซับ ซ้อน และ ยาก แต่ ผลึก สังเคราะห์ สามารถ ผลิต ได้ โดย ใช้ พืช อุตสาหกรรม พิเศษ."

 tech_mine_neutronium:0 "การสกัดนิวโตรเนียม"
 tech_mine_neutronium_desc:1 "นิวตรอนเป็นสารที่มีความหนาแน่นมาก ประกอบไปด้วยนิวตรอน ที่สามารถหลอมรวมเป็นเกราะที่ทนทานและทนทานอย่างมาก"
 tech_mine_dark_matter:0 "แผนผังสสารมืด"
 tech_mine_dark_matter_desc:1 "สาร ที่ แปลก ประหลาด นี้ มี คุณสมบัติ หลาย อย่าง ซึ่ง ดู เหมือน ขัด กับ กฎ ทาง ฟิสิกส์. มี การ พบ ความ เข้ม ข้น ที่ สามารถ เก็บ เกี่ยว ได้ ใกล้ กับ หลุม ดํา หรือ บริเวณ เนบิวลา บาง แห่ง."

 # Ship Reactor Components
 tech_fission_power:0 "พลังงานฟิชชัน"
 tech_fission_power_desc:1 "แหล่ง พลังงาน นี้ ก่อ ให้ เกิด พลัง งาน สําหรับ เรือ โดย การ ก่อ ไฟ แต่ ก็ ก่อ ให้ เกิด ของ เสีย นิวเคลียร์ ที่ เป็น อันตราย ด้วย."
 tech_fusion_power:0 "พลังงานฟิวชัน"
 tech_fusion_power_desc:1 "กระบวนการฟิวชั่นของนิวเคลียร์ ก่อให้เกิดพลังงานมหาศาลสําหรับเรือ แต่ปราศจากความเสี่ยงหลายอย่าง"
 tech_cold_fusion_power:0 "พลังงานฟิวชันแบบเย็น"
 tech_cold_fusion_power_desc:1 "ความสามารถในการคงปฏิกิริยาฟิวชั่น ที่อุณหภูมิต่ํา จะส่งผลให้เตาปฏิกรณ์ฟิวชั่นรุ่นใหม่ สําหรับยานของเรา"
 tech_antimatter_power:0 "พลังงานปฏิสสาร"
 tech_antimatter_power_desc:1 "โดยการใช้พลังงานที่ผลิตจาก สสาร/ ปฏิสสารทําลาย ประสิทธิภาพของเราในการสร้างเรือ"
 tech_zero_point_power:0 "พลังงานที่จุดศูนย์ "
 tech_zero_point_power_desc:1 "เครื่องกําเนิดพลังงานเหล่านี้ สกัดพลังงานสุญญากาศออกมา ทําให้พลังงานของเรือมีจํากัด ไม่มีวิธีสร้างพลังงานที่มีประสิทธิภาพมากขึ้น"
 tech_dark_matter_power_core:0 "พลังงานสสารมืด"
 tech_dark_matter_power_core_desc:1 "เครื่องกําเนิดพลังงานเหล่านี้ดูเหมือนจะดึงพลังงานโดยตรงจากสสารมืด ทําให้พลังงานของเรือมากขึ้น"
 tech_dark_matter_propulsion:0 "ระบบขับดันสสารมืด"
 tech_dark_matter_propulsion_desc:0 "$SHIP_THRUSTER_5_DESC$"

 tech_reactor_boosters_1:0 "เครื่องเร่งปฏิกิริยา"
 tech_reactor_boosters_1_desc:0 "$REACTOR_BOOSTER_1_DESC$"
 tech_reactor_boosters_2:0 "เครื่องเร่งปฏิกิริยาแบบปรับปรุง"
 tech_reactor_boosters_2_desc:0 "$REACTOR_BOOSTER_2_DESC$"
 tech_reactor_boosters_3:0 "เครื่องเร่งปฏิกิริยาขั้นสูง"
 tech_reactor_boosters_3_desc:0 "$REACTOR_BOOSTER_3_DESC$"

 # Shield Components
 tech_shields_1:0 "เครื่องเบี่ยงเบนหักเห"
 tech_shields_1_desc:0 "หน้าจอการหักเหของพลังงาน สามารถหยุดจํานวน จํากัด ของไฟศัตรูที่เข้ามา ก่อนที่จะโอเวอร์โหลด พวก มัน ใช้ พลัง งาน จํานวน มาก."
 tech_shields_2:0 "เครื่องเบี่ยงเบนหักเหแบบปรับปรุง"
 tech_shields_2_desc:0 "หน้าจอที่หักเหเหล่านี้ สามารถดูดซึมมากขึ้น"
 tech_shields_3:0 "โล่พลังงาน"
 tech_shields_3_desc:0 "เครื่องกําเนิดเกราะเครื่องใหม่นี้ เป็นตัวแทนของหน้าจอพลังงานรุ่นถัดไป ทดแทนเทคโนโลยีที่หักเหเก่า พวก เขา ให้ การ ปก ป้อง ที่ ดี กว่า มาก."
 tech_shields_4:0 "โล่พลังงานขั้นสูง"
 tech_shields_4_desc:0 "เครื่องกําเนิดเกราะที่ปรับปรุงใหม่ ซึ่งสร้างสนามพลังงานที่แข็งแรงขึ้น เพียง แต่ ไฟ ศัตรู ที่ ค้ําจุน เท่า นั้น ที่ สามารถ เข้า ไป ใน กําแพง นี้ ได้."
 tech_shields_5:0 "โล่พลังงานสูงมาก"
 tech_shields_5_desc:0 "เกราะกันพลังงานที่เสริมกําลังและแข็งเหล่านี้ มีพลังมหาศาล การ คุ้มครอง ที่ พวก เขา ให้ นั้น ไม่ ใช่ สิ่ง ที่ สอง สําหรับ พวก เขา."
 tech_shield_rechargers_1:0 "ตัวเก็บพลังงานสำหรับโล่"
 tech_shield_rechargers_1_desc:1 "เครื่องจับเท็จเหล่านี้เก็บพลังงานที่เกินขนาด ซึ่งสามารถย้ายได้อย่างรวดเร็วเพื่อเสริมเกราะของเรือ"
 tech_shield_hardeners_1:0 "การเสริมความแข็งแกร่งให้โล่พลังงาน"
 tech_shield_hardeners_1_desc:0 "$SHIELD_HARDENER_1_DESC$"
 tech_shield_hardeners_2:0 "การเสริมความแข็งแกร่งขั้นสูงให้โล่พลังงาน"
 tech_shield_hardeners_2_desc:0 "$SHIELD_HARDENER_2_DESC$"
 tech_planetary_shield_generator:0 "โล่ป้องกันดาวเคราะห์"
 tech_planetary_shield_generator_desc:0 "การ สร้าง เกราะ พลัง งาน ที่ แข็ง แรง ภาย ใน บรรยากาศ ของ ดาว เคราะห์ เป็น เรื่อง ท้าทาย ยิ่ง กว่า การ ดูด ฝุ่น อวกาศ แต่ ก็ เป็น การ ป้องกัน การ ระเบิด ของ วง โคจร ที่ มี พลัง มาก."
 tech_dark_matter_deflector:0 "เครื่องเบี่ยงเบนหักเหแบบใช้สสารมืด"
 tech_dark_matter_deflector_desc:0 "ผู้หักเหเหล่านี้ใช้สสารมืด เพื่อหักเหกระสุนที่เข้ามา ในทางที่ดูเหมือนจะ"
 tech_psionic_shield:0 "โล่พลังจิต"
 tech_psionic_shield_desc: "$tech_psionic_shield_desc.1$ $INDIVIDUAL_PSIONIC_SPECIALISTS$$tech_psionic_shield_desc.2$"
 tech_psionic_shield_desc.1: "โล่ที่มีประสิทธิภาพมากเหล่านี้ถูกสร้างขึ้น จากพลังงานไซโซนิคบริสุทธิ์โดยหมวดหมู่ของ"
 tech_psionic_shield_desc.2: "พลังอํานาจของพวกเขาถูกต่อเติมโดยกองทัพขนาดใหญ่ของไซปล่อย"
 tech_psionic_shield_desc.shroud_forged.shared: "ถูกหล่อหลอมผ่านช่องทางของพลังงานไซโอนิคบริสุทธิ์จากชรูด"
 tech_psionic_shield_gestalt: "$tech_psionic_shield$"
 tech_psionic_shield_gestalt_desc: "$tech_psionic_shield_desc.1$ $GESTALT_PSIONIC_SPECIALISTS$$tech_psionic_shield_desc.2$"
 tech_psionic_shield_shroud_forged: "$tech_psionic_shield$"
 tech_psionic_shield_shroud_forged_desc: "โล่ที่ทรงพลังมาก$tech_psionic_shield_desc.shroud_forged.shared$$tech_psionic_shield_desc.2$"
 tech_psionic_barrier: "บาเรียพลังจิต"
 tech_psionic_barrier_desc: "$tech_psionic_barrier_desc.1$ $INDIVIDUAL_PSIONIC_SPECIALISTS$$tech_psionic_barrier_desc.2$"
 tech_psionic_barrier_desc.1: "อุปสรรคเหล่านี้ถูกสร้างขึ้นจากพลังงานไซโซนิคบริสุทธิ์โดยหมวดหมู่ของ"
 tech_psionic_barrier_desc.2: "พวกเขาจะสามารถหยุดไฟที่เข้ามา เช่นระบบหักเหพลังงานของเรา"
 tech_psionic_barrier_gestalt: "$tech_psionic_barrier$"
 tech_psionic_barrier_gestalt_desc: "$tech_psionic_barrier_desc.1$ $GESTALT_PSIONIC_SPECIALISTS$$tech_psionic_barrier_desc.2$"
 tech_psionic_barrier_shroud_forged: "$tech_psionic_barrier$"
 tech_psionic_barrier_shroud_forged_desc: "อุปสรรคเหล่านี้$tech_psionic_shield_desc.shroud_forged.shared$$tech_psionic_barrier_desc.2$"

 # Sensor Components
 tech_sensors_2:0 "เซ็นเซอร์ความโน้มถ่วง"
 tech_sensors_2_desc:0 "เซ็นเซอร์เหล่านี้ได้รับการปรับ ให้มองหาการเปลี่ยนแปลงความโน้มถ่วง ในอวกาศใด ๆ เช่น ที่ผลิตโดย"
 tech_sensors_3:0 "เซ็นเซอร์มิติย่อย(ทางลัดอวกาศ)"
 tech_sensors_3_desc:0 "เครื่องตรวจจับที่ตรวจจับ ทรานซิชันของสับสเปซที่เหลือ ในการปลุกของยานอวกาศ ความ ไว และ ระยะ ห่าง ของ มัน มี มาก กว่า อาร์เรย์ ของ เครื่อง รับ สัญญาณ."
 tech_sensors_4:0 "เซ็นเซอร์อนุภาคแทคีออน"
 tech_sensors_4_desc:0 "เซ็นเซอร์ขั้นสูงที่ขึ้นอยู่กับการหมุนแสงเตคิออน เพื่อตรวจจับการเคลื่อนไหวของเรือ แม้ในระยะทางที่ไกลที่สุด"
 tech_orbital_sensor_array:0 "แผงเซ็นเซอร์วงโคจร"
 tech_orbital_sensor_array_desc:0 "อุปกรณ์ตรวจจับที่มีประสิทธิภาพ ที่สามารถเพิ่มเข้ากับโครงสร้างของกระสวยอวกาศ มันให้สัญญาณที่ดี ของพื้นที่โดยรอบ"

 # Power Plants
 tech_power_plant_1:0 "ตัวเก็บประจุพลังงานสูง"
 tech_power_plant_1_desc:0 "แคปปิเตอร์ที่มีความสามารถในการเก็บพลังงานจํานวนมาก เป็นหนึ่งในรากฐานของอารยธรรมสมัยใหม่"
 tech_power_plant_2:0 "การปรับสนามพลัง"
 tech_power_plant_2_desc:0 "การ ขยาย ตัว ทํา ให้ มี การ ผลิต พลัง งาน เพิ่ม ขึ้น และ พัฒนา พลัง งาน ให้ ดี ขึ้น."
 tech_power_plant_3:0 "สภาวะพลังงานควอนตัม"
 tech_power_plant_3_desc:0 "หลัก การ พื้น ฐาน ที่ เกี่ยว ข้อง กับ คน รุ่น เดียว กับ พลัง งาน ทํา ให้ เกิด การ เพิ่ม ขึ้น อย่าง มาก."
 tech_power_plant_4:0 "การจัดการสนามควอนตัม"
 tech_power_plant_4_desc:1 "โครงสร้างควอนตัมของ ขดลวดพลังงาน ลดลงพร้อมกันและชาร์จ"
 #tech_power_plant_5:0 "Matter to Energy Conversion"
 #tech_power_plant_5_desc:0 ""
 tech_stellar_absorption:0 "การ ลด ความ เสี่ยง"
 #tech_stellar_absorption_desc:0 "Unused" # TEMP
 tech_power_hub_1:0 "การจัดการพลังงานทั่วโลก"
 tech_power_hub_1_desc:1 "เครื่องบรรจุกระสุนสามารถปรับปรุง เสถียรภาพของตารางท้องถิ่นได้อย่างมาก และนําพลังงานที่มากเกินไปกลับมาสู่ตัวกลาง"
 tech_power_hub_2:0 "เครือข่ายพลังงานของดาวเคราะห์"
 tech_power_hub_2_desc:1 "การปรับโครงสร้างใหม่ และรวมพื้นที่เข้าด้วยกัน ยิ่งลดการสูญเสียพลังงานในระยะทางมากขึ้น"

 # Warp Drives
 tech_wormhole_generation_1:0 "ทางย่อยของรูหนอน"
 tech_wormhole_generation_1_desc:0 "โดย การ เจาะ ทาง สับสเปซ โดย ตรง ท่อ ส่ง น้ํา ชั่ว คราว สามารถ ก่อ ตัว ขึ้น ระหว่าง สอง จุด ใน อวกาศ ปกติ. การเดินทางระหว่างจุดเหล่านี้ จะอยู่ใกล้ทันที"
 tech_wormhole_generation_2:0 "การทดสอบความถูกต้องของรูหนอน"
 tech_wormhole_generation_2_desc:0 "การ สร้าง รูหนอน ที่ มั่นคง ต้อง ใช้ เวลา และ ต้อง ใช้ พลัง งาน มาก มาย แต่ กระบวนการ นี้ สามารถ ทํา ให้ เกิด กระแส น้ํา ได้ โดย ใช้ เครื่อง ปรับ อากาศ พิเศษ."
 tech_wormhole_generation_3:0 "การควบคุมรูหนอน"
 tech_wormhole_generation_3_desc:0 "สนามบรรจุเหล่านี้ช่วยให้การสร้าง รูหนอนที่มีประสิทธิภาพมากขึ้น โดยไม่ต้องมีความเสี่ยงในการกระตุ้น"
 tech_hyper_drive_1:0 "การเดินทางแบบไฮเปอร์สเปซ"
 tech_hyper_drive_1_desc:0 "เช่นสายใยของใยแมงมุม แดนพิเศษของไฮเปอร์สเปซ เร็วกว่าการเดินทางของแสง เป็นไปในทางทฤษฎี ตามไฮเปอร์เลนเหล่านี้"
 tech_hyper_drive_2:0 "จุดเชื่อมไฮเปอร์เลน"
 tech_hyper_drive_2_desc:0 "เราได้ระบุการดํารงอยู่ของจุดในพื้นที่ ที่เรือใช้เวลาพลังงานน้อยกว่า\"หยุด\" หาทางเข้าสู่ไฮเปอร์เลน นี้จะนําไปสู่ รุ่นใหม่ของ ไฮเปอร์ไดรฟ์"
 tech_hyper_drive_3:0 "ไฮเปอร์สเปซสลิปสตรีม"
 tech_hyper_drive_3_desc:0 "รุ่นใหม่ของไฮเปอร์ไดรฟ์ ที่สามารถเข้าถึง กระแสของสับสเปซ ที่มีอยู่ในไฮเปอร์สเปซ นี่ นํา ไป สู่ การ ปรับ ปรุง ประสิทธิภาพ ใน การ ขับ รถ อย่าง น่า ทึ่ง."
 tech_hyperlane_mapping:0 "การทำแผนที่ไฮเปอร์เลน"
 tech_hyperlane_mapping_desc:0 "แม้ว่าเราจะไม่เดินทางผ่านไฮเปอร์สเปซ การทําแผนที่ของกาแล็กซี เครือข่ายไฮเปอร์เลนกว้างขวาง ทําให้เราได้เปรียบอย่างชัดเจน"
 tech_warp_drive_1:0 "การเดินทางโดยการวาร์ป"
 tech_warp_drive_1_desc:0 "โดยการปกคลุมเรือในสนามโค้ง และสร้างฟองของสับสเปซรอบ ๆ มัน"
 tech_warp_drive_2:0 "ตัวปรับความคงตัวของสนามวาร์ป"
 tech_warp_drive_2_desc:0 "การ ปรับ ปรุง เทคนิค การ ปรับ ตัว ให้ อยู่ ใน ระดับ ที่ ถูก ต้อง สําหรับ สนาม โค้ง จะ ทํา ให้ เรือ ของ เรา เดิน ทาง ไกล ขึ้น ขณะ ที่ ใช้ พลังงาน น้อย ลง."
 tech_warp_drive_3:0 "วาร์ปไดร์ฟแบบแรมสกู๊ปส์"
 tech_warp_drive_3_desc:0 "การปฎิวัติของ แรมโคปเหล่านี้ ถูกผูกติดกับเกลียวไดรฟ์ และทําหน้าที่เป็นอนุภาคสะสม"
 tech_jump_drive_1:0 "การขับเคลื่อนแบบกระโดดข้าม (จั้มไดร์ฟ)"
 tech_jump_drive_1_desc:1 "ความมหัศจรรย์ทางเทคโนโลยีที่ก้าวกระโดด ไดรฟ์กระโดดทําลายโครงสร้างกาลอวกาศท้องถิ่น และจัดเรียงมันในระดับควอนตัม\"กระโดด\" จากระบบสู่ระบบ"
 tech_psi_jump_drive_1:0 "ระบบขับเคลื่อนจั้มไดร์ฟพลังจิต"
 tech_psi_jump_drive_1_desc:1 "ไดรฟ์ช่องกระโดดควบคุมพลังงานไซ ปล่อยโดยลูกเรือเพื่อบังคับให้เรือ ผ่านผ้าของความเป็นจริงมากทันที\"กระโดด\" เป็นระยะทางที่ไกลมาก"
 tech_wormhole_stabilization:0 "การทำให้รูหนอนมีความเสถียร"
 tech_wormhole_stabilization_desc:0 "รูหนอนของสับสเปซที่เกิดขึ้นตามธรรมชาติ เป็นสิ่งที่ไม่มั่นคง และระดับพลังงานที่ผันผวนของมัน มักจะทําให้มันเป็นไปไม่ได้ อย่างไรก็ตาม มันมีวิธีทําให้เมทริกซ์คงที่ได้ชั่วคราว"
 tech_gateway_activation:0 "การเปิดใช้งานเกตเวย์"
 tech_gateway_activation_desc:0 "ความ สามารถ ที่ จะ ทํา ให้ สถานี ทาง เข้า ประตู เมือง ที่ เสื่อม โทรม ซึ่ง สามารถ พบ เห็น ได้ ทั่ว กาแล็กซี มี ศักยภาพ ที่ จะ ช่วง เวลา การ เดิน ทาง ที่ สั้น ลง อย่าง น่า ทึ่ง."
 tech_gateway_construction:0 "การก่อสร้างเกตเวย์"
 tech_gateway_construction_desc:0 "การก่อสร้างสถานีเกตเวย์ใหม่ ช่วยให้เราสามารถสร้างเครือข่าย ที่สามารถปฏิวัติการเดินทางระหว่างดวงดาวได้"

 # Aura Components
 tech_shield_recharge_aura_1:0 "สนามตัวเก็บประจุ"
 tech_shield_recharge_aura_1_desc:1 "ร่องรอยของอนุภาคที่ชาร์จ สามารถลดพลังงานเกราะ"
 tech_aura_shield_dampener:0 "เครื่องลดโล่พลังงาน"
 #tech_aura_shield_dampener_desc:0 ""
 tech_aura_quantum_destabilizer:1 "เครื่องที่ทำให้สนามควอนตัมไม่มั่นคง"
 tech_aura_quantum_destabilizer_desc:1 "ควอนตัมตัวแยกกระแทกสนามควอนตัมท้องถิ่น รบกวนเครื่องมือเป้าหมายที่สําคัญบนเรือศัตรู"
 tech_enigmatic_disruption_field:0 "ช่องข้อมูลการสลายตัวของอีนิกม่า"
 tech_enigmatic_disruption_field_desc:1 "โดยน้ําท่วมพื้นที่ท้องถิ่น ที่มีคลื่นแม่เหล็กไฟฟ้าที่อ่อน, สุ่มระเบิด, โล่ศัตรูและระบบอาวุธสามารถรบกวนบางส่วน"

 # Aux
 tech_enigmatic_encoder:0 "ตัวเข้ารหัสลึกลับซับซ้อน"
 tech_enigmatic_encoder_desc:1 "ตัวเข้ารหัสอีนิกติกจะแทรกข้อมูลการบิน ตามการออกแบบที่ไม่แน่นอนบางอย่าง ก่อนที่จะส่งมันกลับไปที่คําสั่งกองเรือ"
 tech_enigmatic_decoder:0 "ตัวถอดรหัสลึกลับซับซ้อน"
 tech_enigmatic_decoder_desc:1 "ขณะที่การผลิตผลเฉลี่ยในการทดสอบมาตรฐาน ความแม่นยําของอัลกอริทึม ของตัวถอดรหัสอีนิกม่า ดูจะเพิ่มขึ้น"

 # Ascension perk
 tech_ascension_theory:0 "ทฤษฎีการยกระดับ"
 tech_ascension_theory_desc:0 "ประวัติ ของ เรา เป็น วัฏจักร ซ้ํา ๆ ของ เทคโนโลยี, การ เมือง, และ วัฒนธรรม ที่ น่า ทึ่ง; การ กระโดด นี้ มัก จะ เกิด ขึ้น ก่อน ยุค แห่ง การ เปลี่ยน แปลง และ ตาม ด้วย ช่วง เวลา ที่ มี ความ มั่นคง พอ สม ควร. โดยการระบุแก่นหลัก การเกิดขึ้นซ้ําของการกระโดดเหล่านี้ เราอาจจะสามารถทํางานได้อย่างมีประสิทธิภาพในระยะสั้น"
 tech_ascension_theory_apoc:0 "$tech_ascension_theory$"
 tech_ascension_theory_apoc_desc:0 "$tech_ascension_theory_desc$"

 # ###################################
 # Physics - Weapons
 # ###################################

 # Laser Branch
 tech_lasers_1:0 "เลเซอร์แดง"
 tech_lasers_1_desc:0 "ไฟ ปืน เลเซอร์ พุ่ง แสง ไป ที่ เป้า หมาย ทํา ให้ เกิด ความ เสีย หาย ใน ชั่ว อายุ ที่ ร้อน จัด."
 tech_lasers_2:0 "เลเซอร์ฟ้า"
 tech_lasers_2_desc:0 "มี พลัง มาก กว่า เลเซอร์ สี แดง สาร ไว ไฟ สี น้ําเงิน เหล่า นี้ ปล่อย รังสี แม่เหล็กไฟฟ้า ออก มา ใน ระยะ ทาง ที่ ดู เหมือน สี น้ําเงิน หรือ สีม่วง ไป ยัง อินทรีย์ ส่วน ใหญ่."
 tech_lasers_3:0 "เลเซอร์ยูวี"
 tech_lasers_3_desc:0 "เลเซอร์อัลตราไวโอเลตเป็นรุ่นที่ทันสมัยและมีประสิทธิภาพมากขึ้น ของรุ่นสีฟ้าของพวกเขา อาวุธ เหล่า นี้ สามารถ ก่อ ความ เสีย หาย ร้าย แรง."
 tech_lasers_4:0 "เลเซอร์ฟิล์ม X"
 tech_lasers_4_desc:0 "เลเซอร์เหล่านี้มีความยาวที่สั้นกว่า อาวุธเลเซอร์แบบยูวี แต่ยิ่งทําลายมากขึ้น"
 tech_lasers_5:0 "เลเซอร์แกมมา"
 tech_lasers_5_desc:0 "รังสีแม่เหล็กไฟฟ้า ที่ปล่อยมาจากเลเซอร์แกมม่า เป็นความถี่ที่สูงมาก ศักยภาพในการทําลายของพวกเขา คือ การสะสมอาวุธเลเซอร์"
 tech_energy_lance_1:0 "หอกอนุภาค"
 tech_energy_lance_1_desc:1 "อาวุธที่หนักเหล่านี้ยิงเน้นคานอนุภาค ที่ก่อให้เกิดความเสียหายอย่างมาก ขนาด ของ อาร์เรย์ ที่ ปล่อย ออก มา จํากัด การ ใช้ เรือ รบ และ เรือ ยักษ์."
 tech_energy_lance_2:0 "หอกอนุภาคแทคีออน"
 tech_energy_lance_2_desc:1 "ทวนอนุภาคที่มีประสิทธิภาพมากขึ้นนี้ อาวุธนี้ยิงคานเตจี้ของ อํานาจมหาศาล เช่น เดียว กับ สมัย ก่อน เรือ ลํา นี้ ถูก ใช้ เป็น เรือ รบ และ เรือ ยักษ์."
 tech_perdition_beam:0 "ลำแสงนรก"
 tech_perdition_beam_desc:0 "มีท่อส่งพลังงานที่เชื่อมกันมากมาย ที่ยิงลําแสงที่ไม่เคยมีมาก่อน ขนาดของมันหมายความว่า มันสามารถติดตั้งได้เฉพาะยานไททัน-คลาสเท่านั้น"

 # Plasma Weapons
 tech_plasma_1:0 "เครื่องพ่นพลาสมา"
 tech_plasma_1_desc:0 "อาวุธที่ปล่อยลูกบอลทําลายล้าง ของพลาสม่าสูงที่เป้าหมาย กระสุนพลาสม่าเหล่านี้มีประสิทธิภาพอย่างมากในการกินผ่านเกราะเรือ"
 tech_plasma_2:0 "เครื่องเร่งพลาสมา"
 tech_plasma_2_desc:0 "เครื่องเร่งอนุภาคใหม่เหล่านี้ปล่อย ลูกกระสุนปืนของพลาสม่าสูงที่มีสนามควบคุมปรับปรุง นี่ส่งผลให้พลังงานรั่วน้อยลง เมื่อกระสุนเดินทางในอวกาศไปยังเป้าหมาย"
 tech_plasma_3:0 "ปืนใหญ่พลาสมา"
 tech_plasma_3_desc:0 "อาวุธ ใหม่ ล่า สุด ใน อาวุธ พลาสมา ปืน ใหญ่ เหล่า นี้ เป็น เครื่อง สูบ พลาสมา รุ่น ที่ เก่า กว่า อย่าง เต็ม ที่ และ ค่อน ข้าง เรียบ ง่าย. กระสุนพลาสม่าของพวกเขายิ่งแย่"
 tech_arc_emitter_1:0 "เครื่องปล่อยอาร์กไฟฟ้า"
 tech_arc_emitter_1_desc:1 "อาวุธ ที่ ทรง พลัง ซึ่ง ปล่อย พลัง งาน ที่ ทํา ให้ เกิด ความ สับสน อลหม่าน ที่ เป้า หมาย ซึ่ง ส่วน หนึ่ง อาจ มอง ข้าม ยุทธภัณฑ์ และ โล่ ได้."
 tech_arc_emitter_2:0 "เครื่องปล่อยอาร์กไฟฟ้าแบบโฟกัสเป้าหมาย"
 tech_arc_emitter_2_desc:0 "ตัวปล่อยแสงที่อัพเกรดเหล่านี้ มีเลนส์โฟกัสที่ดีขึ้น ส่งผลให้เกิดพลังงานที่มีประสิทธิภาพมากขึ้น"

 # Disruptor Weapons
 tech_disruptors_1:0 "เครื่องรบกวน"
 tech_disruptors_1_desc:1 "ระเบิดระเบิดแรงสูง ที่อ่อนแอและทําลายพันธะโมเลกุล ที่ยึดอะตอมของเป้าหมายเข้าด้วยกัน พวก มัน สามารถ ผ่าน โล่ และ โล่ เพื่อ ทําลาย เรือ และ ลูก เรือ ศัตรู โดย ตรง."
 tech_disruptors_2:0 "เครื่องรบกวนไอออน"
 tech_disruptors_2_desc:1 "เหล่านี้ผู้สร้างอัพเกรด สายฟ้าของอนุภาคไอออนทําลายมากขึ้นที่เป้าหมาย"
 tech_disruptors_3:0 "เครื่องรบกวนควอนตัม"
 tech_disruptors_3_desc:1 "ที่ยิงประจุพลังงานควอนตัม ก่อให้เกิดความเสียหายเหลือเชื่อ"
 tech_energy_torpedoes_1:1 "เครื่องยิงโปรตอน"
 tech_energy_torpedoes_1_desc:2 "กระสุน พลัง งาน เหล่า นี้ ประกอบ ด้วย โปรตอน ที่ มี ความ เข้ม ข้น อย่าง หนา แน่น ซึ่ง สามารถ ก่อ ความ เสีย หาย อย่าง ใหญ่ หลวง แก่ เรือ ศัตรู."
 tech_energy_torpedoes_2:1 "เครื่องยิงนิวตรอน"
 tech_energy_torpedoes_2_desc:1 "พลังงานที่อัพเกรดมา ซึ่งพึ่งพานิวตรอนแทนโปรตอน"
 null_void_beam:0 "ลำแสงหักล้างโล่พลังงาน"
 null_void_beam_desc:1 "โดยการใช้ลักษณะเฉพาะของ Null Void ลําแสงนี้สามารถทําลายพลังงานได้จริงๆ"

 # Critter Weapons
 tech_extradimensional_weapon_1:0 "อาวุธต่างมิติ"
 tech_extradimensional_weapon_1_desc:1 "การประยุกต์ใช้หลักการควบคุมพลังงานใน 5 มิติ กับเครื่องบินรุ่นล่างนั้น ทําให้การสร้างอาวุธที่มีประสิทธิภาพ"
 tech_mining_drone_weapon_1:0 "เลเซอร์โดรนขุดแร่"
 tech_mining_drone_weapon_1_desc:2 "การใช้เลนส์ที่มีโฟกัสอย่างรุนแรง ผสมผสานเข้ากับความถี่การกระสับกระส่าย"
 tech_space_cloud_weapon_1:0 "ท่อนำสายฟ้า"
 tech_space_cloud_weapon_1_desc:1 "เมฆ หมอก ใช้ ประจุ ไฟฟ้า ที่ เกิด จาก ก๊าซ ที่ หนา แน่น ซึ่ง ประกอบ กัน เป็น แกน กลาง ส่วน ใหญ่ เพื่อ ปล่อย เกลียว ของ พลาสมา ที่ ไหม้. การใช้แก๊สชนิดเดียวกันนี้ ประกอบไปด้วยท่อพิเศษ ที่ช่วยให้อาวุธที่มีประสิทธิภาพของฟ้าผ่าได้"
 tech_blue_crystal_weapon_1:0 "ตัวเก็บประจุแบบคริสตัลฟ้า"
 tech_blue_crystal_weapon_1_desc:1 "คริสตัลไลน์ เอ็นเตอร์เทนเมนท์ เก็บรังสีดวงดาว ภายในร่างกายของพวกเขา และสามารถโฟกัสไปที่ ใช้รูปแบบพื้นฐานของไพทูรย์ เป็นฐาน เราสามารถสร้างเครื่องจับเท็จเลเซอร์"
 tech_green_crystal_weapon_1:0 "ตัวเก็บประจุแบบคริสตัลเขียว"
 tech_green_crystal_weapon_1_desc:1 "คริสตัลไลน์ เอ็นเตอร์เทนเมนท์ เก็บรังสีดวงดาว ภายในร่างกายของพวกเขา และสามารถโฟกัสไปที่ ใช้รูปแบบของมรกต เป็นฐาน เราสามารถสร้างเครื่องจับเลเซอร์"
 tech_yellow_crystal_weapon_1:0 "ตัวเก็บประจุแบบคริสตัลเหลือง"
 tech_yellow_crystal_weapon_1_desc:1 "คริสตัลไลน์ เอ็นเตอร์เทนเมนท์ เก็บรังสีดวงดาว ภายในร่างกายของพวกเขา และสามารถโฟกัสไปที่ เราสามารถสร้างเครื่องจับเลเซอร์ ที่ผลิตพลังงานได้ ในคลื่นความถี่เดียวกัน"
 tech_red_crystal_weapon_1:0 "ตัวเก็บประจุแบบคริสตัลแดง"
 tech_red_crystal_weapon_1_desc:1 "คริสตัลไลน์ เอ็นเตอร์เทนเมนท์ เก็บรังสีดวงดาว ภายในร่างกายของพวกเขา และสามารถโฟกัสไปที่ ใช้รูปแบบพื้นฐานของทับทิม เป็นฐาน เราสามารถสร้างเครื่องจับแสงเลเซอร์"

 # ###################################
 # Society
 # ###################################

 # Farming
 tech_hydroponics:0 "การปลูกพืชไร้ดิน"
 tech_hydroponics_desc:0 "การ เกษตร ใน สภาพ แวด ล้อม ที่ มี การ ควบคุม ทํา ให้ มี การ ปลูก พืช ผล ใน ภูมิ อากาศ ซึ่ง ตาม ปกติ แล้ว การ เกษตร จะ เป็น ไป ไม่ ได้."
 tech_industrial_farming:0 "เกษตรอุตสาหกรรม"
 tech_industrial_farming_desc:0 "ฟาร์มอุตสาหกรรมขนาดใหญ่ ที่เติบโตเป็นผลผลิตที่อุดมไปด้วยสารอาหาร ทําให้อารยธรรมเติบโต"
 tech_eco_simulation:1 "โปรแกรมจำลองระบบนิเวศน์"
 tech_eco_simulation_desc:2 "เทคนิค การ ทํา ฟาร์ม อาจ ได้ รับ การ ปรับ ปรุง ให้ ดี ขึ้น อีก โดย การ จําลอง ระบบ คอมพิวเตอร์ ที่ ซับ ซ้อน ซึ่ง มี สภาพ แวด ล้อม และ สภาพ อากาศ ต่าง กัน. นี่ ทํา ให้ มี ผล ผลิต ทาง การ เกษตร ที่ เข้าใจ ได้ มาก ขึ้น."
 tech_gene_crops:0 "ยีนพืช"
 tech_gene_crops_desc:1 "วิศวกรรมพันธุกรรม ที่ ได้ รับ การ ออก แบบ อย่าง ดี ช่วย ให้ พืช ผล เพิ่ม พูน และ ปรับ ปรุง ให้ ดี ขึ้น ทั้ง ใน ระดับ รสชาติ และ โภชนาการ."
 tech_nano_vitality_crops:0 "พืชที่โตด้วยเทคโนโลยีนาโน"
 tech_nano_vitality_crops_desc:1 "การสลายตัวของพืช ซึ่งมีเครื่องจักรนาโนปริมาณน้อย ทําให้เกิดการผลิตชนิดที่มีความยืดหยุ่นสูง"
 #tech_pure_seed_farming:0 "Pure-seed Farming"
 #tech_pure_seed_farming_desc:0 ""
 tech_nutrient_replication:0 "การผลิตอาหารซ้ำๆ"
 tech_nutrient_replication_desc:1 "กระบวนการของพืชสังเคราะห์ ที่ถูกสังเคราะห์ขึ้นมานั้น ต้องมีของเสียสะสมจํานวนมาก เพื่อผลิตผลผลิตปริมาณน้อย แต่อย่างไรก็ตาม ก็ช่วยส่งเสริมให้ผลผลิตทางการเกษตรเพิ่มขึ้นอย่างมาก"

 # Resources
 tech_engos_vapor:0 "การ กู้ คืน บ้าน"
 tech_engos_vapor_desc:3 "การกระตุ้นที่เกิดขึ้นตามธรรมชาติ ที่ช่วยให้ทุกรูปแบบของชีวิตปรับตัวและพัฒนา นอกจากนี้ยังสามารถใช้เป็นคอนดักเตอร์ที่มีประสิทธิภาพมาก สําหรับอาวุธพลังงาน"
 tech_pitharan_dust:0 "การ กู้ ข้อมูล จาก ฝุ่น"
 tech_pitharan_dust_desc:3 "ฝุ่น ละเอียด นี้ เป็น สิ่ง กระตุ้น ที่ เกิด ขึ้น เอง ตาม ธรรมชาติ ซึ่ง พบ ใน บาง โลก. มันมีผลกระทบที่สงบลงต่อสิ่งมีชีวิตส่วนใหญ่ และสามารถใช้เป็นวิธีไม่รุนแรงเพื่อบรรเทาศัตรู"
 tech_mine_zro:0 "การสกัดแร่ซีโร"
 tech_mine_zro_desc:3 "$tech_mine_zro_desc.1$ $ORGANIC_INGESTED$ $tech_mine_zro_desc.2$ $individuals_key$$tech_mine_zro_desc.3$ $ORGANIC_DRUG$ $tech_mine_zro_desc.4$"
 tech_mine_zro_desc.1: "อนุภาคที่แปลกใหม่หายากมาก มันได้ถูกบรรจุไว้กับหลายโลก ผ่านผลกระทบของอุกกาบาต แต่ที่มาของมัน ถ้า"
 tech_mine_zro_desc.2: "ขอสาบานต่อนาวา ที่แล่นไปอย่างสะดวกสบาย"
 tech_mine_zro_desc.3: "ซโร ทําหน้าที่เป็นผู้มีอํานาจมาก (และติดยาเสพติด)"
 tech_mine_zro_desc.4: "ที่ช่วยเพิ่มความสามารถของไซ"
