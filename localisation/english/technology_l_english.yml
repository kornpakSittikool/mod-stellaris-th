 tech_solar_panel_network:0 "การแปลงพลังงานจากวงโคจร"
 tech_solar_panel_network_desc:1 "ความก้าวหน้าของเทคโนโลยีแสงอาทิตย์ สามารถชดเชยค่าใช้จ่ายดําเนินการ ของฐานดาวของเรา อย่าง ไร ก็ ตาม แผ่น ดิน โลก จะ ต้อง ใช้ ยาน อวกาศ ทั้ง ลํา เพื่อ ผลิต พลัง งาน เพียง พอ."
 tech_mining_terminal:0 "สมาคมเหมืองแร่"
 tech_mining_terminal_desc:0 "บริษัทเหมืองแร่ ที่ดูแลการสกัดทรัพยากรทั้งหมดในระบบ นี่นําไปสู่ความมีประสิทธิภาพมากขึ้น เป็นอิสระคนงานเหมือง \"สัตว์ป่า\" ถูกพามาเลี้ยงที่ส้นเท้า"
 tech_zero_gravity_assembly_sequence:0 "เฟรมงานที่แรงโน้มถ่วงเป็นศูนย์"
 tech_zero_gravity_assembly_sequence_desc:0 "โครง สร้าง เหล่า นี้ มี เครื่อง มือ ที่ เป็น ประโยชน์ มาก มาย ทํา ให้ คน งาน สามารถ นํา ทาง ไป ยัง สถาน ที่ ก่อ สร้าง ออร์บิทัล ได้ อย่าง รวด เร็ว และ ปลอด ภัย. ภารกิจ E.V.A. ในอวกาศไม่เคยง่ายขึ้น"

 # Strike Craft
 tech_strike_craft_1:0 "ปฏิบัติการของยานแม่"
 tech_strike_craft_1_desc:0 "ยานจู่โจมที่มนุษย์ใช้ เปิดตัวจากยานแม่ และพึ่งพาความเร็วและขนาดขนาดเล็ก เพื่ออยู่รอดได้นานพอ"
 tech_strike_craft_2:0 "ยานลูกแบบปรับปรุง"
 tech_strike_craft_2_desc:0 "ยานจู่โจมรุ่นต่อไป ที่ใช้แสงไวโอนิคพัฒนา การจัดการลักษณะและอาวุธที่มีประสิทธิภาพมากขึ้น"
 tech_strike_craft_3:0 "ยานลูกขั้นสูง"
 tech_strike_craft_3_desc:0 "การปรับปรุงเพิ่มเติมในการออกแบบ เรือจู่โจมเหล่านี้เป็นความฝันของนักบิน ผล งาน ของ พวก เขา มาก กว่า รุ่น ก่อน ๆ มาก นัก."

 # Armies and Attachments - Engineering
 tech_planetary_defenses:0 "การป้องกันดาวเคราะห์"
 tech_planetary_defenses_desc:0 "อาจ มี ช่วง เวลา หนึ่ง ที่ สติ ปัญญา, ความ เย็น, และ ความ ไม่ รู้ จัก พอ จะ มอง โลก ของ เรา ด้วย ความ อิจฉา และ วาง แผนการ ต่อ ต้าน เรา. เราต้องพร้อม"
 tech_assault_armies:0 "กองกำลังสำรวจระหว่างดาวเคราะห์"
 tech_assault_armies_desc:0 "การ รุกราน ของ อีก โลก หนึ่ง เป็น การ ก่อ การ อย่าง น่า ตก ตะลึง. มีความท้าทายขนาดใหญ่ที่จะต้องเอาชนะ ก่อนที่เราจะรวบรวมกองทัพอวกาศครั้งแรกของเรา"
 tech_drop_pod:0 "ยานลงจอดผิวดาวดรอปพ็อด"
 tech_drop_pod_desc:0 "กระสวยปล่อยพลังงานเดี่ยว จะลดความไว้ใจของเรา ในยานลงจอดที่มีความเสี่ยง"

 # Ship Armor Components
 tech_ship_armor_1:0 "วัสดุผสมระดับนาโน"
 tech_ship_armor_1_desc:0 "การ หด ตัว ของ ตัว นาโน ที่ มี แรง กระตุ้น อาจ ทํา ให้ เกิด การ ป้องกัน เพิ่ม ขึ้น ซึ่ง อาจ เป็น ความ แตก ต่าง ระหว่าง ชีวิต กับ ความ ตาย ใน สถานการณ์ การ ต่อ สู้."
 tech_ship_armor_2:0 "วัสดุโลหะเซราโม"
 tech_ship_armor_2_desc:0 "การ รวม โลหะ และ เครื่อง ปั้น ดิน เผา ต่าง ๆ กัน ซึ่ง ยัง ผล ด้วย ยุทธภัณฑ์ ที่ แข็ง แรง โดย ไม่ ต้อง เสีย สละ ความ ยืดหยุ่น."
 tech_ship_armor_3:0 "วัสดุพลาสติก"
 tech_ship_armor_3_desc:0 "พลาสติก เป็น วัสดุ ยืดหยุ่น ซึ่ง รวม คุณสมบัติ หลาย อย่าง ของ พลาสติก และ โลหะ เข้า ด้วย กัน. มี ราคา ค่อน ข้าง ถูก ใน การ ผลิต และ สามารถ ต่อ รอง กับ เกราะ สําหรับ เรือ."
 tech_ship_armor_4:0 "วัสดุดู รู เซิล"
 tech_ship_armor_4_desc:0 "วัตถุ ที่ แข็ง แรง แต่ ยืดหยุ่น ได้ นี้ สามารถ ทน รับ การ ลง โทษ อย่าง รุนแรง ได้. มันทําหน้าที่ได้ดีเป็นเกราะเรือ"
 tech_ship_armor_5:0 "วัสดุนิวโตรเนียม"
 tech_ship_armor_5_desc:0 "วัสดุที่หนาแน่นและแข็งแรงอย่างเหลือเชื่อนี้ สามารถต้านทาน การระเบิดที่จะเปลี่ยนชุดเกราะใดๆ ที่ทําจากอัลลอยอื่น ให้กลายเป็นรอยร้าว"

 tech_crystal_armor_1:0 "การชุบด้วยคริสตัลแบบผสม"
 tech_crystal_armor_1_desc:1 "โดยการถอดเกราะที่เข้ากับคริสตัลไลน์ เราจะสามารถเพิ่มความทนทานของยานเรา"
 tech_crystal_armor_2:0 "การชุบด้วยคริสตัลหลอม"
 tech_crystal_armor_2_desc:1 "การนําเรื่องคริสตัลเข้ามา ในกระบวนการสร้างหลอดเลือด จะช่วยปรับปรุงคุณภาพการแข็งตัว"

 tech_dragon_armor:0 "เกล็ดมังกรประดิษฐ์"
 tech_dragon_armor_desc:0 "เกล็ดของเอเธอร์ เดรก ประกอบด้วยชั้นหลายชั้น ของโครงสร้างของแร่นาโนที่ไม่ซ้ํากัน เทคนิคการผลิต Unordox ช่วยให้เราเลียนแบบ โครงสร้างการซ่อมแซมตัวเองอย่างใกล้ชิด"

 tech_armor_hardeners_1:0 "การเสริมความแข็งแกร่งให้เกราะ"
 tech_armor_hardeners_1_desc:0 "$ARMOR_HARDENER_1_DESC$"
 tech_armor_hardeners_2:0 "การเสริมความแข็งแกร่งแบบปรับปรุงให้เกราะ"
 tech_armor_hardeners_2_desc:0 "$ARMOR_HARDENER_2_DESC$"

# Thruster Components
 tech_thrusters_1:0 "ระบบขับดันเคมี"
 tech_thrusters_1_desc:0 "ตัวขับเคลื่อนเคมีที่มีประสิทธิภาพปานกลาง ซึ่งอาศัยตัวขับเคลื่อนที่เผาผลาญได้"
 tech_thrusters_2:0 "ระบบขับดันไอออน"
 tech_thrusters_2_desc:0 "เครื่องขับเคลื่อนไฟฟ้าเหล่านี้ใช้คานของไอออน เพื่อสร้างแรงผลักดันโดยไม่ต้อง จําเป็นต้องขับเคลื่อน"
 tech_thrusters_3:0 "ระบบขับดันพลาสมา"
 tech_thrusters_3_desc:0 "เครื่อง ปั่น กระแส ไฟฟ้า ที่ ก้าว หน้า ทํา ให้ เรือ มี ความ เร็ว แสง น้อย กว่า และ สามารถ เคลื่อน ที่ ได้."
 tech_thrusters_4:0 "ระบบขับดันแรงดล"
 tech_thrusters_4_desc:0 "เครื่องขับเคลื่อนพลังงานฟิวชั่นสูงเหล่านี้ ทําให้เรือมีความเร็วในการเดินเรือ และความเร็วภายใต้เงื่อนไขแสงซับ"

 tech_afterburners_1:0 "อาฟเตอร์เบิร์นเนอร์"
 tech_afterburners_1_desc:0 "แรง ผลัก ดัน ที่ ทรง พลัง เหล่า นี้ ทํา ให้ มี ความ เร็ว ใน การ รบ เพิ่ม ขึ้น แต่ การ ใช้ พลัง งาน มาก มาย."
 tech_afterburners_2:0 "อาฟเตอร์เบิร์นเนอร์ขั้นสูง"
 tech_afterburners_2_desc:0 "รุ่นที่ดีขึ้นของมาตรฐาน หลังจากเบิร์นนี้ จะช่วยให้ยิ่งเพิ่มความเร็วการต่อสู้ของเรือ"

 # Military Stations
 tech_space_defense_station_1:1 "การป้องกันในห้วงอวกาศ"
 tech_space_defense_station_1_desc:1 "นี้จะทําให้การก่อสร้าง ของฐานดวงดาวลึกการป้องกัน เพื่อปกป้องฐานดาวของเรา"
 tech_space_defense_station_2:0 "สถานีในห้วงอวกาศ"
 tech_space_defense_station_2_desc:0 "วิธี การ ก่อ สร้าง แบบ ใหม่ ๆ จะ เปิด โอกาส ให้ มี การ สร้าง สถานี ทหาร ที่ ใหญ่ กว่า นี้ อีก ใน ที่ ลึก ของ อวกาศ."
 tech_space_defense_station_3:0 "การติดตั้งในห้วงอวกาศ"
 tech_space_defense_station_3_desc:0 "การติดตั้งขนาดใหญ่เหล่านี้เป็นเหมือนเมืองลอยอยู่ในอวกาศ พวก เขา สามารถ เกื้อ หนุน ลูก เรือ หลาย พัน คน และ บ่อย ครั้ง มี อาวุธ ปืน ควบ คู่ กับ กอง เรือ."
 tech_space_defense_station_improvement:0 "คณะวิศวกร"
 tech_space_defense_station_improvement_desc:0 "การสร้างคณะวิศวกรรมทหารเรือที่อุทิศตน จะเป็นประโยชน์อย่างมากในการก่อสร้าง เวทีป้องกันอวกาศลึก"
 tech_space_defense_station_improvement_machine_intelligence:0 "การก่อสร้างสถานีที่ดีที่สุด"
 tech_space_defense_station_improvement_desc_machine_intelligence:0 "การ ประเมิน อย่าง ละเอียด เกี่ยว กับ วิธี การ ก่อ สร้าง ของ สถานี ทหาร ใน ปัจจุบัน ได้ ระบุ ว่า มี การ ปรับ ปรุง หลาย ขอบ เขต."

 # Industry and Robotics
 tech_housing_1:1 "ระบบควบคุมสภาพอากาศ"
 tech_housing_1_desc:1 "ความสามารถในการปรับเปลี่ยนรูปแบบภูมิอากาศของดาวเคราะห์ เพื่อปราบปรามปรากฏการณ์อากาศที่ทําลาย ทําให้อาคารที่อยู่อาศัยง่ายขึ้น"
 tech_housing_2:1 "วิศวกรรมแรงต้านแรงโน้มถ่วง"
 tech_housing_2_desc:1 "ด้วยเทคโนโลยีแรงโน้มถ่วงทิศทาง อาคารบนพื้นผิวของดาวเคราะห์ สามารถไปถึงสูงกว่าที่ผ่านมา ฟ้าเป็นขีด จํากัด!"
 tech_housing_agrarian_idyll:0 "เกษตรกรรมแบบยูโทเปีย"
 tech_housing_agrarian_idyll_desc:0 "ผ่านการสร้างชุมชนชนบทที่ควบคุมสภาพอากาศ เราสามารถรองรับประชากรที่มีขนาดใหญ่ขึ้นได้ โดยไม่ต้องทําลายวิถีชีวิตแบบชาวอาหรับ"

 tech_mechanized_mining:0 "การขุดด้วยเครื่องจักรกล"
 tech_mechanized_mining_desc:0 "การ ใช้ เครื่องจักร กล เพื่อ สกัด แร่ แร่ เป็น ข้อ เรียก ร้อง พื้น ฐาน สําหรับ สังคม อุตสาหกรรม ใด ๆ."
 tech_basic_industry:0 "ฐานอุตสาหกรรม"
 tech_basic_industry_desc:0 "โครงสร้างพื้นฐานทางอุตสาหกรรม ที่จําเป็นในการกลายเป็น อารยธรรมที่ท่องอวกาศ"
 tech_powered_exoskeletons:0 "โครงกระดูกภายนอก"
 tech_powered_exoskeletons_desc:0 "ใส่ชุดที่ขับเคลื่อนได้ เพิ่มความแข็งแกร่งและความเร็วของผู้ใช้ ใบสมัครทางทหารนั้นชัดเจน แต่ก็จะเพิ่มประสิทธิภาพของแรงงาน"
 tech_powered_exoskeletons_machine_intelligence:0 "เซอร์โวมอเตอร์แบบปรับปรุง"
 tech_powered_exoskeletons_desc_machine_intelligence:0 "เซอโวโมโต้ที่มีประสิทธิภาพมากขึ้น จะเพิ่มน้ําหนักที่หน่วยหุ่นยนต์ของเราสามารถดําเนินการ หน่วย ทํา เหมือง อาจ นํา แร่ ธาตุ ต่าง ๆ ออก มา ใช้ อีก และ เครื่อง ทํา สงคราม ก็ สามารถ ติด อาวุธ ที่ หนัก กว่า ได้."
 tech_mining_1:0 "ระบบการขุดเจาะสำรวจความร้อนใต้พิภพ"
 tech_mining_1_desc:0 "เทคนิคใหม่ๆ จะช่วยให้เราสามารถ เจาะเข้าไปในกระเป๋าของทรัพยากรใต้ดิน ที่ยังหาได้ยากก่อนหน้านี้"
 tech_mining_2:0 "การขุดแกนกลางของดาว"
 tech_mining_2_desc:0 "การขุดเจาะขนาดใหญ่เหล่านี้จําเป็น เพื่อเข้าถึงแร่ธาตุที่อุดมไปด้วย ซึ่งมักจะสามารถพบใกล้กับแกนของโลก"
 tech_mining_3:0 "การแยกแร่"
 tech_mining_3_desc:1 "สเปกโตรเมทริกต์ขั้นสูง ผนวกเข้ากับเทคนิคการเจาะ และสารเคมีที่กดลงชักโครก"
 #tech_mining_network_5:0 "Pure Matter Extraction"
 #tech_mining_network_5_desc:0 ""
 tech_synchronized_work_patterns:0 "รูปแบบการทำงานแบบซิงโครไนซ์"
 tech_synchronized_work_patterns_desc:0 "โดยปรับรูปแบบการทํางานของเครือข่ายเหมืองแร่ของเราให้ตรงกัน ประสิทธิภาพของพวกเขาจะเพิ่มขึ้น"
 tech_engineering_1:0 "นาโน"
 tech_engineering_1_desc:0 "ความ ก้าว หน้า ต่อ ไป ใน ด้าน วิศวกรรม เครื่องจักร ทํา ให้ เรา ต้อง ลง ไป สู่ มาตร วัด นาโน. ตอนนี้เราสามารถจัดการระบบทางกายภาพได้ ในทางที่ไม่เคยเห็นมาก่อน"
 tech_engineering_2:0 "การแปลงตัวเอง"
 tech_engineering_2_desc:0 "ในขณะที่เซลล์ประสาทออร์แกนิกเสียเส้นสายไป โดยการงอกตัวของแอกโซนอล วงจรเหล่านี้สามารถ เอาชนะตัวเองได้ แม้ แต่ ระบบ การ คํานวณ ที่ ง่าย ที่ สุด ก็ ถูก คาด หมาย ว่า จะ พัฒนา ขึ้น ขณะ ที่ ใช้ อยู่."
 tech_engineering_3:0 "วัสดุ ที่ แข็ง แรง ที่ สุด"
 tech_engineering_3_desc:0 "คุณสมบัติทางกลควอนตัมของวัสดุเหล่านี้ มีกุญแจสู่รัฐเหนือชั้น การพัฒนาการปฏิวัติสําหรับทั้งวัสดุและอุตสาหกรรม"
 #tech_engineering_4: "Zero-Resistance Architecture"
 #tech_engineering_4_desc: "These advanced materials, absent of any frictional constraints, permit mechanical longevity on an unprecedented scale. With the removal of the previously required lubricant our structures can function within extreme temperature ranges."
 tech_robotic_workers: "แรงงานประดิษฐ์"
 tech_robotic_workers_desc:0 "หน่วยงานเทียมเหล่านี้สมบูรณ์แบบสําหรับแรงงานแรงงาน พวกเขาทํางานหนักและมีความสามารถ ในการทําตามคําสั่งของเสียงธรรมดา แต่ไม่ควรจะคาดหวังที่จะปีนบันได"
 tech_droid_workers: "ผู้เชี่ยวชาญประดิษฐ์"
 tech_droid_workers_desc:0 "หน่วย เทียม ที่ ได้ รับ การอัพเกรด มี ช่วง การ ขยาย ตัว เท่า กับ ของ อินทรีย์ ส่วน ใหญ่. ระบบประมวลผลประสาทของพวกเขา ได้มีการพัฒนาขึ้นอย่างมาก"
 tech_synthetic_workers: "ผู้บริหารประดิษฐ์"
 tech_synthetic_workers_desc:0 "หน่วยที่ก้าวหน้าสูงที่แข็งแรง เร็วกว่าและทนทานกว่า ส่วนใหญ่ของอินทรีย์ ด้วยหน่วยประมวลผลประสาทที่อัพเกรด พวกเขาสามารถปฏิบัติการอิสระได้อย่างเต็มที่"
 #tech_enhanced_combat_software:0 "Combat Software 2.0"
 #tech_enhanced_combat_software_desc:0 ""
 tech_synthetic_leaders: "เมทริกซ์บุคลิกภาพประดิษฐ์"
 tech_synthetic_leaders_desc:0 "ปรับตัวเข้ากับบุคลิก สังเคราะห์ในที่สุดก็จะสามารถ ปฏิสัมพันธ์ทางสังคมได้อย่างเท่าเทียมกัน บาง หน่วย อาจ ถึง กับ รับ บทบาท ผู้ นํา."
 tech_integrated_cybernetics:0 "การรวมกันของไซเบอร์เนติกส์"
 tech_integrated_cybernetics_desc:0 "การชดเชยบนชุดพื้นฐานหมดอายุการปลูกถ่ายแบบไซเบอร์แอนติเนติกนี้ ทําให้ผู้ใช้ต่อต้าน ผลกระทบทางสิ่งแวดล้อมที่เป็นอันตรายมากขึ้น"
 tech_integrated_cybernetics_machine_intelligence:1 "การปรับใช้ไซเบอร์เนติกส์"
 tech_integrated_cybernetics_desc_machine_intelligence:1 "การติดตั้งระบบไซเบอร์เนติก ที่ปรับตัวเข้ากับสภาพแวดล้อมท้องถิ่น จะเพิ่มประสิทธิภาพของโดรนของเรา"
 tech_mineral_purification_1:0 "การฟอกแร่"
 tech_mineral_purification_1_desc:0 "การประมวลผลวัสดุที่ใช้ในเหมือง ช่วยให้เราบรรลุถึงระดับประสิทธิภาพ"
 tech_mineral_purification_2:0 "การฟอกแร่ขั้นสูง"
 tech_mineral_purification_2_desc:0 "การผลิตแร่ธาตุชนิดปลอมในขั้นตอนที่สอง จะช่วยให้การจัดเก็บและการขนส่งมีประสิทธิภาพมากขึ้น"
 tech_assembly_pattern:0 "รูปแบบการประกอบ"
 tech_assembly_pattern_desc:1 "การ ทํา แบบ จําลอง การ ก่อ สร้าง อย่าง รวด เร็ว เป็น ตัว กําหนด รูป แบบ การ ประกอบ ที่ เหมาะ สม ที่ สุด สําหรับ โครงการ ก่อ สร้าง แต่ ละ โครงการ ล่วง หน้า."
 tech_construction_templates:0 "แม่แบบการก่อสร้าง"
 tech_construction_templates_desc:1 "Standardized pre-fab templates massively reduce on-site facility construction times."
 tech_robomodding:0 "ระบบแม่แบบเครื่องจักร"
 tech_construction_templates_effect:0 "$building_resource_silo$ ความจุ: §G+5000§!"
 tech_robomodding_desc:0 "ต้นแบบการคอมไพล์ซ้ําได้อนุญาตให้สร้างหุ่นยนต์แบบพูดได้"
 tech_robomodding_m:0 "ระบบแม่แบบเครื่องจักร"
 tech_robomodding_m_desc:0 "การ ทํา แบบ มาตรฐาน การ จัด ระบบ แม่ แบบ ต่าง ๆ ทํา ให้ มี การ ปรับ ปรุง ประชากร เครื่องจักร ให้ ดี ขึ้น."
 tech_robomodding_points_1:0 "การกำหนดมาตรฐานข้ามรุ่น"
 tech_robomodding_points_1_desc:0 "การ ปรับ ปรุง วิธี การ ผลิต ทํา ให้ มี การ ปรับ ปรุง หุ่น ยนต์ มาก ขึ้น โดย ไม่ ต้อง ประนีประนอม."
 #tech_robomodding_points_1_modifier_desc: "$species_trait_points_add$: $POINTS|0=+$"
 # TEMP
 tech_robomodding_points_2:0 "วงจรที่แลกเปลี่ยนกันได้"
 tech_robomodding_points_2_desc:0 "การพัฒนากระบวนการผลิต ที่ช่วยให้หุ่นยนต์เปลี่ยนแปลงพื้นฐานได้ โดยไม่ต้องประนีประนอม"
 #tech_robomodding_points_2_modifier_desc: "$species_trait_points_add$: $POINTS|0=+$"
 # TEMP
 tech_matter_generator:0 "การสร้างสสาร"
 tech_matter_generator_desc:0 "ด้วย การ ใช้ พลัง งาน มาก มาย เรา สามารถ เปลี่ยน ความ สว่าง เป็น เรื่อง จาก สิ่ง ที่ ดู เหมือน ไม่ มี ค่า อะไร เลย."
 tech_mega_assembly:0 "ระบบการประกอบขนาดใหญ่"
 tech_mega_assembly_desc:0 "แม่ แบบ ที่ ดี เยี่ยม ทํา ให้ เรา สามารถ เพิ่ม จํานวน หน่วย ใหม่ ๆ ได้ อย่าง มาก."
 tech_robot_assembly_complex:0 "ระบบประกอบหุ่นยนต์"
 tech_robot_assembly_complex_desc:0 "แม่ แบบ ที่ ก้าว หน้า ทํา ให้ เรา สามารถ เพิ่ม จํานวน หุ่น ยนต์ ใหม่ ๆ ได้ อย่าง มาก."

 # Space Mining
 tech_space_construction:0 "การก่อสร้างนอกโลก"
 tech_space_construction_desc:0 "การก่อสร้างในพื้นที่ นําเสนอวิศวกรของเรา กับความท้าทายการออกแบบใหม่ ที่จะต้องแก้ไข ก่อนที่เราจะสามารถสร้าง สถานีออร์บิทัล"
 #tech_mine_rare_resources_t1: "Zero-Gravity Refining"
 #tech_mine_rare_resources_t1_desc: "New refining techniques are necessary in order to process the many exotic materials we are finding as we explore the galaxy."
 #tech_mine_rare_resources_t3: "Nanoparticle Extraction"
 #tech_mine_rare_resources_t3_desc: "An efficient way of extracting nanoparticles will allow us to exploit new strategic resources that were previously beyond our reach."
 tech_mining_station_improvement_1:0 "การแปรรูปแร่ที่สถานที่ขุด"
 tech_mining_station_improvement_1_desc:0 "โดย การ ประมวล แร่ ธาตุ ต่าง ๆ ที่ อยู่ เหนือ โลก โดย ตรง ซึ่ง มี การ สกัด เอา แร่ เหล่า นั้น ออก มา ประสิทธิภาพ ใน การ ทํา เหมือง ของ เรา ก็ ดี ขึ้น มาก."
 tech_mining_station_improvement_2:0 "การทำเหมืองอัตโนมัติ"
 tech_mining_station_improvement_2_desc:0 "โดย อาศัย หุ่นยนต์ อัตโนมัติ อย่าง มาก สถานี ทํา เหมือง จึง สามารถ ดําเนิน การ ได้ โดย มี เพียง โครง กระดูก เล็ก ๆ เท่า นั้น. นี้จะลดค่าใช้จ่ายของพวกเขา"
 tech_mine_satramene:0 "การสกัดซาทรามีน"
 tech_mine_satramene_desc:1 "ก๊าซนี้เป็นตัวกระตุ้นที่เกิดขึ้นตามธรรมชาติ ที่พบในบางโลก มันมีผลกระทบที่สงบลงต่อสิ่งมีชีวิตส่วนใหญ่ และสามารถใช้เป็นวิธีไม่รุนแรงเพื่อบรรเทาศัตรู"
 tech_mine_garanthium:0 "การทำเหมืองแร่กาแรนเทียม"
 tech_mine_garanthium_desc:1 "การ ก่อ สร้าง รูป แกะ สลัก การ์ อัน เต อุม ที่ ประสบ ความ สําเร็จ นั้น เป็น ข้อ ท้าทาย ที่ ไม่ มี ใด เหมือน เนื่อง จาก ลักษณะ ที่ น่า ทึ่ง ของ สิน แร่ ทํา ให้ การ ทํา เหมือง เป็น เรื่อง ยาก มาก."
 tech_mine_orillium:0 "การทำเหมืองแร่โอริลเลียม"
 tech_mine_orillium_desc:1 "เครื่อง ช่วย หายใจ"
 tech_mine_living_metal:0 "โลหะมีชีวิต"
 tech_mine_living_metal_desc:0 "การ ทํา เหมือง และ ประมวล ผล จาก โลหะ ที่ หา ยาก เป็น เรื่อง ยาก เหลือ เกิน แต่ การ ใช้ เมือก อัล ลอย อย่าง ประสบ ผล สําเร็จ จะ ให้ ผล ประโยชน์ ที่ ไม่ มี ใคร เทียบ ได้."
 tech_mine_betharian:0 "การกลั่นหินบีธาเรียน"
 tech_mine_betharian_desc:0 "แร่ ธาตุ เบตา เรียน ดู เหมือน มี ต้น กําเนิด มา จาก แหล่ง เดียว กัน แต่ กระจัด กระจาย อยู่ ทั่ว กาแล็กซี หลาย พัน ปี มา แล้ว. แร่ ธาตุ เหล่า นี้ มัก จะ พบ บ่อย ที่ สุด ว่า เป็น กระจุก ก้อน หิน ขนาด เท่า ก้อน หิน และ มี การ ระเหย สูง."
 tech_mine_rare_crystals:0 "การขุดผลึกหายาก"
 tech_mine_rare_crystals_desc:1 "การ ตัด ผลึก เหล่า นี้ โดย ไม่ ก่อ ความ เสีย หาย หรือ แม้ แต่ ทําลาย เป็น กระบวนการ ที่ บอบบาง อย่าง ยิ่ง. มันต้องใช้อุปกรณ์ขั้นสูง ที่สามารถระบุได้แม่นยํา"

