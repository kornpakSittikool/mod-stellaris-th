 gateway_capital:1 "§Hสายการปกครอง§!\n§Eเทคโนโลยีนี้จะนำไปสู่ความก้าวหน้าในการสร้างเมืองหลวงและได้รับ £unity£ §Hเอกภาพ§! เพิ่ม เมืองหลวงของดาวเคราะห์ที่ได้รับการอัปเกรดเป็นสิ่งจำเป็นสำหรับ §Hสิ่งปลูกสร้างระดับสูง§!§!"
 gateway_biological:0 "§Hสายชีวภาพ§!\n§Eเทคโนโลยีนี้จะนำไปสู่ความก้าวหน้าต่อไปในการเพิ่มประสิทธิภาพและการปรับตัวของสิ่งมีชีวิต§!"
 gateway_ship:0 "§Hสายยานอวกาศ§!\n§Eเทคโนโลยีนี้จะนำไปสู่ความก้าวหน้าต่อไปในการสร้างสถานีท่ายานอวกาศที่ใหญ่ขึ้นและยานรบที่ทรงพลังยิ่งขึ้น§!"
 gateway_psionics:0 "§Hสายพลังจิต§!\n§Eเทคโนโลยีนี้จะนำไปสู่ความก้าวหน้าในด้านพลังจิต§!"
 gateway_robotics:0 "§Hสายหุ่นยนต์§!\n§Eเทคโนโลยีนี้จะนำไปสู่ความก้าวหน้าในด้านหุ่นยนต์§!"
 gateway_kinetic_weapons:0 "§Hสายอาวุธพลังจลน์§!\n§Eเทคโนโลยีนี้จะนำไปสู่ความก้าวหน้าในด้านอาวุธพลังจลน์§!"
 gateway_energy_weapons:0 "§Hสายอาวุธพลังงาน§!\n§Eเทคโนโลยีนี้จะนำไปสู่ความก้าวหน้าในด้านอาวุธพลังงาน§!"
 gateway_power_generation:0 "§Hสายผลิตไฟฟ้า§!\n§Eเทคโนโลยีนี้จะนำไปสู่ความก้าวหน้าในด้านต่างๆ§!"
 gateway_espionage:0 "§Hสายยุทธการแอบแฝง§!\n§Eเทคโนโลยีนี้จะนำไปสู่ความก้าวหน้าในด้านการจารกรรมและกิจกรรมแอบแฝง§!"
 gateway_infrastructure:0 "§Hสายโครงสร้างพื้นฐาน§!\n§Eเทคโนโลยีนี้จะนำไปสู่ความก้าวหน้าในด้านโครงสร้างพื้นฐานพลเรือน§!"
 gateway_cloaking:0 "§Hสายพรางตัว§!\n§Eเทคโนโลยีนี้จะนำไปสู่ความก้าวหน้าของเครื่องกำเนิดสนามพลังพรางตัว§!"
 gateway_detection:0 "§Hสายตรวจจับ§!\n§Eเทคโนโลยีนี้จะนำไปสู่ความก้าวหน้าต่อไปในการตรวจจับกองยานพรางตัว§!"
 gateway_node_reformatting: "§Hพาธของการแทนที่§!\n§Eเทคโนโลยีนี้จะนําไปสู่ ความก้าวหน้าเพิ่มเติมในการ ปฏิรูป และ การ เดิน ทาง§!"
 gateway_node_culling: "§Hพาธการไล่ระดับสี§!\n§Eเทคโนโลยีนี้จะนําไปสู่ความก้าวหน้าเพิ่มเติมในโหนด§!"
 gateway_zone: "§Hพาธของเขตภาพ§!\n§Eเทคโนโลยีนี้จะนําไปสู่ความก้าวหน้าเพิ่มเติม ในการส่งเสริมการแบ่งเขตการปกครอง§!"


