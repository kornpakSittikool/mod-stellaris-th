 # Starbases
 tech_starbase_1:0 "การก่อสร้างฐานดวงดาว"
 tech_starbase_1_desc:0 "การติดตั้งอวกาศส่วนกลาง ที่สร้างขึ้นในวงโคจรอย่างใกล้ชิด รอบระบบหลักจําเป็น เพื่อใช้อย่างเต็มรูปแบบของทรัพยากรในระบบดาว"
 tech_starbase_2:0 "ฐานจอดยานอวกาศสตาร์พอร์ต"
 tech_starbase_2_desc:0 "ฐาน ดาว ที่ เก่า แก่ ที่ สุด มี มาก กว่า การ เคลื่อน ที่ เล็ก น้อย. สตาร์พอร์ตถาวร จะช่วยให้เรารักษา การจับแน่นบนระบบดาว"
 tech_starbase_3:0 "ฐานที่มั่นอวกาศดวงดาว"
 tech_starbase_3_desc:0 "ขณะ ที่ การ จราจร ทาง อวกาศ เพิ่ม ขึ้น ก็ จําเป็น ต้อง มี ฐาน ของ ดาว เคราะห์ ที่ ใหญ่ กว่า และ ไม่ มี วัน เสื่อม สลาย ได้ มาก ขึ้น เพื่อ ควบคุม ระบบ อวกาศ."
 tech_starbase_4:0 "ป้อมดวงดาวป้อมดาว"
 tech_starbase_4_desc:0 "ป้อมอวกาศอันทรงพลังนี้ จะให้จุดโฟกัส สําหรับกิจกรรมทางทหารทั้งหมดในระบบดาว และการปรากฏตัวของพวกเขา"
 tech_starbase_5:0 "ป้อมปราการอวกาศสี่เหลี่ยม"
 tech_starbase_5_desc:0 "มี การ วาง แผน สําหรับ สนาม รบ ขนาด มหึมา ที่ สามารถ จัด การ กับ กอง เรือ รบ โจมตี หลาย กอง ใน ปัจจุบัน. ถ้าตระหนักได้ ป้อมเหล่านี้จะกลายเป็นอนุสรณ์ ความยิ่งใหญ่ มากพอๆกับศูนย์กลางระบบ"

 tech_modular_engineering:0 "วิศวกรรมโมดูลแยกส่วน"
 tech_modular_engineering_desc:1 "วิธี การ ก่อ สร้าง แบบ พื้น ผิว ดาว โดย ใช้ เครื่อง ขยาย เสียง จะ ลด ราคา และ เวลา ใน ปัจจุบัน."

 tech_defense_platform_hull_1:0 "ปรับปรุงความสมบูรณ์ของโครงสร้าง"
 tech_defense_platform_hull_1_desc:0 "โครง สร้าง ที่ เสริม สร้าง และ เกราะ ป้องกัน แรง ระเบิด ซึ่ง มี แรง กระแทก เพิ่ม ขึ้น จะ ทํา ให้ แน่ ใจ ว่า เวที จะ มั่นคง แม้ ภาย ใต้ ความ กดดัน อย่าง หนัก."

