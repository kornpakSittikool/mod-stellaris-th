 tech_society_1: "ศรี วิทยา"
 tech_society_1_desc: "การศึกษาเกี่ยวกับสิ่งมีชีวิตต่างดาว ได้ย้ายเกินเพียงแค่แค็ตตาล็อก โดยการตรวจสอบโครงสร้างและกลยุทธ์การอยู่รอดของสิ่งมีชีวิต วิวัฒนาการภายใต้ดาวต่าง ๆ เราเปิดเส้นทางใหม่ในการแพทย์ การปรับตัว และการออกแบบ"
 tech_society_2: "การ ทอ ผ้า"
 tech_society_2_desc: "โดยการเปลี่ยนโครงสร้างโครงสร้างโครงสร้างของกระดูกเชิงกราน และการปรับโครงสร้างของไซแนปติก เซลล์ ประสาท ไม่ เพียง แต่ ถ่ายทอด ข้อมูล ทดแทน, จัด ระเบียบ, และ จํา ไว้. ตอนนี้ มันทําตามการออกแบบของเรา"
 tech_society_3: "การสังเคราะห์ของโครงสร้างชีวภาพ"
 tech_society_3_desc: "ชีวิต ซึ่ง มี หลาก หลาย อย่าง น่า ทึ่ง ประกอบ ด้วย รูป แบบ และ โครง สร้าง ที่ ซ้ํา กัน. โดยการถอดรหัสและจําลองสิ่งเหล่านี้ ในทุกระดับ เราใช้พิมพ์เขียวแบบโฮลีติกของชีววิทยา เหลืออยู่เพียงเล็กน้อยในธรรมชาติที่เราไม่เข้าใจ และน้อย เรายังคงไม่สามารถสร้างขึ้น"

#  tech_society_1:0 "Standardized Interstellar Timekeeping"
#  tech_society_1_desc:1 "In an era where interstellar travel is commonplace, the adoption of a unified temporal framework serves as a linchpin for progress. Whether for organizing galactic commutes or facilitating astrophysical observations, standard time represents a visionary stride towards unity and precision."
 #tech_society_2:0 "Xenobiology"
 #tech_society_2_desc:1 "The study of xenobiology invites us to explore the possibility of life beyond conventional paradigms, thriving in environments far removed from our own. Every new biosphere allows for parallels to be drawn and the origins of life itself to become clearer."
 #tech_society_3:0 "Exoplanetary Logistics"
 #tech_society_3_desc:1 "Comprehensive logistical systems optimize the movement of people, resources, and information across interstellar distances. This paradigm not only promotes cohesion between core world and colony, but serves as a testament to our adaptability and resilience in the face of large-scale challenges."
 #tech_society_4:0 "Origins of Sapience"
 #tech_society_4_desc:1 "By deciphering the neural and cognitive mechanisms that underpin sapience, researchers can now delineate its boundaries and constraints."
 tech_alien_life_studies:1 "ศึกษาเผ่าพันธุ์ต่างดาว"
 tech_alien_life_studies_desc:1 "การ ศึกษา เกี่ยว กับ สิ่ง มี ชีวิต ใน โลก อื่น ๆ ให้ ความ หยั่ง เห็น เข้าใจ ใน พฤติกรรม ของ มนุษย์ ต่าง ดาว ซึ่ง ทํา ให้ เรา สามารถ ระบุ ตัว และ ดู แล สัตว์ เลี้ยง ได้."
 tech_xeno_zoo:0 "สวนสัตว์ต่างดาว"
 tech_xeno_zoo_desc:1 "เมื่อ ได้ ศึกษา สิ่งมีชีวิต ต่าง ดาว หลาย ชนิด และ พัฒนา ความ เข้าใจ ที่ ชัดเจน เกี่ยว กับ ความ เสี่ยง ที่ อาจ มี อยู่ ใน ตัว มัน แล้ว เรา ก็ จะ สามารถ เก็บ รวบ รวม ตัว อย่าง ที่ มี ชีวิต ไว้ เพื่อ จะ แสดง ต่อ ไป."
 tech_colonization_1:0 "วิธีการจัดการโลกใหม่"
 tech_colonization_1_desc:1 "การ คํานวณ ทรัพยากร และ อุปกรณ์ ต่าง ๆ ที่ จําเป็น เพื่อ ก่อ ตั้ง อาณานิคม บน ดาว เคราะห์ ทํา ให้ เรา สามารถ ต้อน ไพ โอ เนียร์ ที่ กล้า หาญ เข้า สู่ ความ ยิ่ง ใหญ่\"เรือท่า\" มั่นใจว่าพวกเขาจะอยู่รอด ระยะทางอันยาวนานข้ามดาว ไปยังบ้านใหม่"
 tech_colonization_2:0 "การกรองบรรยากาศ"
 tech_colonization_2_desc:1 "โดยการปรับตัวการกรองบรรยากาศ ด้วยพื้นฐานต่อจุด เพื่อกรององค์ประกอบที่ไม่ต้องการให้ดีขึ้น สภาวะที่อยู่อาศัยในอาณานิคมอาจจะดีขึ้น"
 tech_colonization_3:0 "การปรับสภาพแวดล้อมที่ไม่เป็นมิตร"
 tech_colonization_3_desc:1 "การศึกษาเพิ่มเติมไปยังสภาพแวดล้อมอันตรายที่พบบนดาวเคราะห์ดวงอื่น ๆ ช่วยบรรเทาความยากลําบากที่ชาวอาณานิคมเผชิญ"
 tech_colonization_4:0 "การเพิ่มคุณค่าของดินในโลกใบอื่น"
 tech_colonization_4_desc:1 "การ ศึกษา อย่าง จริงจัง ใน ดิน ชนิด ต่าง ๆ และ ความ สามารถ ของ พวก เขา ใน การ สนับสนุน พืช ผล จะ ช่วย ปรับ ปรุง สภาพ การ ดํารง ชีวิต ของ ผู้ ตั้ง ถิ่น ฐาน ใน โลก ต่าง ประเทศ."
 tech_colonization_5:1 "การศึกษาบูรณาการเชิงนิเวศ"
 tech_colonization_5_desc:2 "การศึกษาเพิ่มเติมเกี่ยวกับสภาพภูมิอากาศของดาวเคราะห์ที่แตกต่างกันจะช่วยให้เราสามารถตั้งถิ่นฐานประชากรของเราบนดาวที่เคยคิดว่าไม่เป็นมิตรเกินกว่าที่จะรองรับพวกเขาได้"
 tech_tomb_world_adaption:0 "การปรับตัวในดาวแห่งความตาย"
 tech_tomb_world_adaption_desc:0 "ผ่านการศึกษาอย่างครอบคลุม ถึงสภาพแวดล้อมที่ปฏิรูปแล้ว เราจะอนุญาตให้ผู้ตั้งถิ่นฐานของเรา ไปสู่โลกอาณานิคม ที่ถูกทําลายด้วยสงครามนิวเคลียร์"
 tech_free_enterprises:0 "องค์กรอิสระ"
 #tech_free_enterprises_desc:0 ""
 tech_frontier_initiatives:0 "Frontier อินิชิเอทีฟวินาที"
 tech_frontier_initiatives_desc:1 "การจัดการความสัมพันธ์ระหว่างภาคเอกชนกับรัฐบาล การให้เงินอุดหนุนกับนักลงทุนที่เหมาะสม"
 tech_frontier_traditions:0 "ประเพณี ต่าง ๆ ที่ นิยม กัน"
 tech_frontier_traditions_desc:1 "น้ําใจ ไพ โอ เนียร์ อย่าง หนึ่ง ปรากฏ ให้ เห็น ใน การ จัด ลําดับ ความ สําคัญ ของ การ สร้าง ออร์บิทัล."
 tech_frontier_collectives:0 "การ สะสม แบบ ฟร้อน ท์ เอ อร์"
 tech_frontier_collectives_desc:1 "ประวัติศาสตร์ได้พิสูจน์ให้เห็นว่า โครงสร้างทางสังคมที่มีประสิทธิภาพมากที่สุด สําหรับผู้ตั้งถิ่นฐาน"
 tech_frontier_commissars:0 "ฟร้อนเซอร์คอมมิวซาร์"
 tech_frontier_commissars_desc:1 "การ ศึกษา วิจัย บ่ง ชี้ ว่า การ ควบคุม สังคม อย่าง เข้ม งวด อาจ เป็น อุปสรรค ต่อ ความ ยืดหยุ่น ที่ ดําเนิน ต่อ ไป ของ อาณานิคม วัย รุ่น."
 tech_cryostasis:0 "ค ริ สต จักร"
 #tech_cryostasis_desc:0 ""
 tech_xeno_ecology_1:0 "การ ลด ความ รับ ผิด ชอบ"
 #tech_xeno_ecology_1_desc:0 ""
 tech_xeno_ecology_2:0 "การควบคุมสิ่งแวดล้อม"
 #tech_xeno_ecology_2_desc:0 ""
 tech_reveal_luxuries_1:0 "เศรษฐกิจระหว่างดวงดาว"
 #tech_reveal_luxuries_1_desc:0 ""
 tech_reveal_luxuries_2:0 "ตลาดกาแล็กติก"
 #tech_reveal_luxuries_2_desc:0 ""
 tech_orbital_hydroponics:0 "ไฮโดรโปนิกส์ออร์บิทัล"
 tech_orbital_hydroponics_desc:1 "ความท้าทายที่ฝังอยู่ในพืชพันธุ์ ในศูนย์-จี มีลักษณะเฉพาะ แต่ห่างไกลจากที่ไม่อาจหลีกเลี่ยงได้"
 tech_arctic_colonization:0 "ควอไลต์"
 tech_arctic_colonization_desc:1 "ที่อยู่อาศัยพิเศษ และระบบช่วยชีวิตที่ปรับตัวได้ จะช่วยให้การตั้งอาณานิคม ของภูมิอากาศของมนุษย์ต่างดาว"
 tech_tundra_colonization:0 "อนุนัย"
 tech_tundra_colonization_desc:1 "$tech_arctic_colonization_desc$"
 tech_ocean_colonization:0 "องค์ประกอบทางทะเล"
 tech_ocean_colonization_desc:1 "$tech_arctic_colonization_desc$"
 tech_arid_colonization:0 "อนุภาพ"
 tech_arid_colonization_desc:1 "$tech_arctic_colonization_desc$"
 tech_tropical_colonization:0 "Tropical Colonization"
 tech_tropical_colonization_desc:1 "$tech_arctic_colonization_desc$"
 tech_desert_colonization:0 "พารามิเตอร์ของทะเลทราย"
 tech_desert_colonization_desc:1 "$tech_arctic_colonization_desc$"
 tech_continental_colonization:0 "โครงสร้างของทวีป"
 tech_continental_colonization_desc:1 "$tech_arctic_colonization_desc$"
 tech_basic_health: "การ ดู แล ทาง การ แพทย์"
 tech_basic_health_desc: "$job_healthcare_desc$"
 tech_frontier_health:1 "การดูแลสุขภาพทางพันธุกรรม"
 tech_frontier_health_desc:1 "การตั้งอาณานิคมของมนุษย์ต่างดาว ได้เปิดสาขาวิจัยชีวภาพ"
 tech_frontier_health_machine_intelligence:0 "ส่วนประกอบโมเลกุล"
 tech_frontier_health_desc_machine_intelligence:0 "การ ใช้ ส่วน ต่าง ๆ เมื่อ ประกอบ หน่วย เครื่องจักร ใหม่ จะ ทํา ให้ กระบวนการ นี้ ดําเนิน ต่อ ไป และ ทํา ให้ การ ซ่อมแซม ใน อนาคต ง่าย ขึ้น."
 tech_frontier_hospital:1 "การฟื้นฟูเซลล์"
 tech_frontier_hospital_desc:2 "เมื่อจักรวรรดิของเราเติบโต ความเข้าใจทางชีววิทยาของเราก็เพิ่มขึ้นด้วย การ รักษา ทาง การ แพทย์ ที่ ก้าว หน้า ใน ระดับ เซลล์ ทํา ให้ มี ความ ก้าว หน้า ที่ สําคัญ ใน ด้าน สุขภาพ ของ ประชากร ทาง ชีววิทยา."
 tech_frontier_hospital_machine_intelligence:0 "องค์ประกอบอัจฉริยะ"
 tech_frontier_hospital_desc_machine_intelligence:0 "โรงงานเหล่านี้เป็นองค์ประกอบหลักที่รู้จักตัวเอง ที่มักจะปรับปรุงตัวเองอย่างเหมาะสม"
 tech_modular_components:1 "$tech_frontier_health_machine_intelligence$"
 tech_modular_components_desc:1 "$tech_frontier_health_desc_machine_intelligence$"
 tech_intelligent_factories:1 "$tech_frontier_hospital_machine_intelligence$"
 tech_intelligent_factories_desc:1 "$tech_frontier_hospital_desc_machine_intelligence$"
 tech_mountain_range:0 "การจัดการพื้นผิวดาวเคราะห์"
 tech_mountain_range_desc:1 "เมื่อ เกิด การ ฟิวชั่น ที่ สะอาด, การ อัตโนมัติ, และ เทคโนโลยี การ บีบ คั้น เรื่อง สสาร ขึ้น มา ก็ เป็น เพียง ช่วง เวลา หนึ่ง ก่อน ที่ ยอด ภูเขา จะ ถูก ขจัด ออก ไป."
 tech_volcano:0 "วิศวกรรมเปลือกโลกลึก"
 tech_volcano_desc:1 "ความก้าวหน้าด้านเทคโนโลยีวัสดุและเทคนิคการทําเหมืองแร่ลึก อนุญาตให้วิศวกรรมภูมิศาสตร์ ที่ระดับความลึกและอุณหภูมิที่คาดไม่ถึงก่อนหน้านี้ ตอน นี้ มี การ ฉวย ประโยชน์, ระงับ, หรือ ถึง กับ ย้าย ที่ อยู่."
 tech_dangerous_wildlife:0 "การกำจัดสัตว์ป่าอันตราย"
 tech_dangerous_wildlife_desc:1 "การสลายตัวของที่อยู่อาศัยตามธรรมชาติ รวมกับรูปแบบการค้นหาและทําลาย"
 tech_dense_jungle:0 "คัดเลือกสารฆ่าวัชพืช"
 tech_dense_jungle_desc:1 "การจัดหมวดหมู่อย่างครอบคลุม, การแยกยีน, และคอมพิวเตอร์ การจําลองระบบนิเวศวิทยาแบบนอกกรอบ,"
 tech_quicksand_basin:0 "การฟื้นฟูดิน"
 tech_quicksand_basin_desc:1 "ตาม ปกติ แล้ว การ ให้ คํา พยาน เกี่ยว กับ ดิน ใช้ เวลา หลาย ล้าน ปี. แม้ แต่ เทคโนโลยี ที่ ยาก จน ที่ สุด ก็ อาจ กลาย เป็น ชั้น บน ที่ อุดม สมบูรณ์ ได้."
 tech_noxious_swamp:0 "การเรียนรู้ไฮดรอลิกต่างดาว (ธาราศาสตร์)"
 tech_noxious_swamp_desc:1 "ประเทศหนองน้ําได้ฟื้นฟูมานับพันปีแล้ว ระบบประสานงานของสารหล่อเลี้ยง, ปั๊ม, การเคลื่อนย้ายสารเคมี และตาข่ายอัตโนมัติ"
 tech_massive_glacier:0 "เครือข่ายควบคุมสภาพอากาศ"
 tech_massive_glacier_desc:1 "ระบบ สะท้อน กระจก และ ร่ม อาจ ส่ง ผล กระทบ อย่าง น่า ทึ่ง ต่อ ภูมิ อากาศ ของ ดาว เคราะห์ เมื่อ จัด การ อย่าง ถูก ต้อง."
 tech_toxic_kelp:0 "การจัดการระบบนิเวศของมหาสมุทร"
 tech_toxic_kelp_desc:1 "ด้วยพลังงานประมวลผลเพียงพอ เซ็นเซอร์เครือข่ายและสถานีกระจาย แม้แต่กระแสน้ําในมหาสมุทร ก็สามารถจัดการได้"
 tech_deep_sinkhole:0 "การตั้งอาณานิคมใต้ดิน"
 tech_deep_sinkhole_desc:1 "ดาว เคราะห์ หลาย ดวง มี ช่อง ว่าง ขนาด ใหญ่. การ สํารวจ, การ แสวง ประโยชน์, และ เทคนิค การ ก่อ สร้าง แบบ ใต้ ดิน อาจ เพิ่ม พื้น ที่ ของ บาง ประเทศ ได้ มาก ที เดียว."

 # Trade
 tech_space_trading:1 "บริษัทการค้านอกโลก"
 tech_space_trading_desc:1 "การ ค้า ข้าม ดาว เคราะห์ เป็น เรื่อง สําคัญ ที่ จะ บรรลุ ผล สําเร็จ ใน การ ขน ส่ง สินค้า จาก ระบบ หนึ่ง ไป ยัง อีก ระบบ หนึ่ง ใน เวลา อัน เหมาะ และ ยิ่ง กว่า ค่า ใช้ จ่าย ทั้ง หมด."

 # Terraforming
 tech_terrestrial_sculpting:0 "การปรับสภาพเปลือกโลก"
 tech_terrestrial_sculpting_desc:1 "ไม่มีคําตอบง่าย ๆ สําหรับปัญหา ของการซ่อมแซมขนาดแมโคร ของเปลือกดาวเคราะห์ - เพียง แต่เส้นทแยงใหญ่และสว่านที่ดูดซึม"
 tech_atmospheric_manipulation:0 "การจัดการบรรยากาศ"
 tech_atmospheric_manipulation_desc:1 "การควบคุมความเหลื่อมล้ํา และการแพร่กระจายของสารเคมี เป็นขั้นตอนแรกสู่บรรยากาศที่มีการเปลี่ยนแปลง"
 tech_ecological_adaptation:0 "การปรับเปลี่ยนทางระบบนิเวศ"
 tech_ecological_adaptation_desc:0 "โดยการปรับตัวระบบนิเวศของดาวเคราะห์ ให้กลายเป็นการเปลี่ยนแปลงของสิ่งแวดล้อมขนาดใหญ่ เราสามารถเปลี่ยน เทอร์ราฟอร์ม ให้กลายเป็นกระบวนการที่มีปัญหาน้อยลง"
 tech_climate_restoration:2 "การฟื้นฟูสภาพภูมิอากาศ"
 tech_climate_restoration_desc:1 "โดยเพิ่มความเข้าใจของเรา เรื่องการเปลี่ยนแปลงสภาพบรรยากาศ เราจะสามารถพยากรณ์ได้แม้กระทั่ง"
 tech_volcanic_terraforming: "เทอร์ฟอร์มของภูเขาไฟ"
 tech_volcanic_terraforming_desc: "ความก้าวหน้าด้านเทคโนโลยีวัสดุและเทคนิคการทําเหมืองแร่ลึก อนุญาตให้วิศวกรรมภูมิศาสตร์ ที่ระดับความลึกและอุณหภูมิที่คาดไม่ถึงก่อนหน้านี้ เราสามารถเปลี่ยนโลกของโวลคานิก ให้เป็นดาวเคราะห์ที่อบอุ่น"
 tech_gaia_creation:0 "การสร้างไกอา"
 tech_gaia_creation_desc:0 "การสร้างสรรค์ดาวเคราะห์กายา โลกที่เหมาะสมอย่างโดดเด่น กับสิ่งมีชีวิตเกือบทุกรูปแบบ เป็นข้อพิสูจน์สูงสุด"

 # Genetics
 tech_genome_mapping:0 "การจัดทําแผนที่พันธุกรรม"
 tech_genome_mapping_desc:1 "การทําจีโนมของบุคคล ผ่านการจัดลําดับดีเอ็นเอของพวกเขา เปิดสําหรับการรักษาและการรักษา"
 tech_epigenetic_triggers:0 "กระตุ้นการเรียนรู้ด้านกระบวนการเหนือพันธุกรรม"
 tech_epigenetic_triggers_desc:1 "เทคนิค การ ทํา ให้ ดีเอ็นเอ มี ความ สมดุล ขั้น พื้น ฐาน ทํา ให้ มี การ เปลี่ยน แปลง ที่ สําคัญ ต่อ จี โนม ตาม อําเภอ ใจ."
 TECH_UNLOCK_EPIGENETICS_TITLE:0 "§Hปลดล็อกคุณสมบัติ:§! กระตุ้นการเรียนรู้ด้านกระบวนการเหนือพันธุกรรม (เทคโนโลยี)"
 TECH_UNLOCK_EPIGENETICS_DESC:0 "ทำให้เราสามารถลบคุณลักษณะอภิสิทธิ์กับเผ่าพันธุ์ชีวภาพ ผ่านการปรับเปลี่ยนเผ่าพันธุ์"
 tech_cloning:0 "การโคลนนิ่ง"
 tech_cloning_desc:1 "การหักแยกในอวัยวะเพศและเทคโนโลยีในมดลูกเทียม ช่วยให้เราสามารถผลิตมวลของบุคคล"
 tech_gene_banks:0 "ธนาคารยีน"
 tech_gene_banks_desc:1 "ยีน แบ็งค์ กรอง และ รักษา จีโนม ที่ มี อยู่ เพื่อ ใช้ ใน โคลน."
 tech_glandular_acclimation:0 "การปรับสภาพต่อมให้ชินกับสภาพแวดล้อมใหม่"
 tech_glandular_acclimation_desc:0 "ผ่านการตัดอวัยวะทางชีววิทยา เราสามารถเปลี่ยนความต้านทานด้านสิ่งแวดล้อมของสายพันธุ์ ให้ตรงกับความต้องการของเรา"
 tech_gene_seed_purification:0 "การทำยีนต้นกำเนิดให้บริสุทธิ์"
 tech_gene_seed_purification_desc:1 "เทคนิค การ ทํา ให้ บริสุทธิ์ ของ นู คลี โอ ไทด์ ทํา ให้ การ แยก ตัว และ การ ปรับ ปรุง ลักษณะ นิสัย ทาง พันธุกรรม ที่ น่า ปรารถนา เป็น พิเศษ."
 tech_morphogenetic_field_mastery:0 "ความเชี่ยวชาญในการเกิดรูปร่าง (การเกิดสัณฐาน)"
 tech_morphogenetic_field_mastery_desc:1 "จากเปลของมันคือ การลงทุนทางเภสัชกรรมอย่างแท้จริง ความก้าวหน้าในความเข้าใจของเรา"
 tech_gene_tailoring:0 "การตัดต่อยีน"
 tech_gene_tailoring_desc:1 "การทําเครื่องมือดัดแปลงพันธุกรรม ที่หาได้อย่างกว้างขวาง ย่อมมีผลกระทบในด้านบวกต่อการพัฒนาของเรา"
 tech_gene_tailoring_modifier_desc:0 "$species_trait_points_add$: $POINTS|0=+$"
 tech_gene_tailoring_overtuned: "$tech_gene_tailoring$"
 tech_gene_tailoring_overtuned_desc: "$tech_gene_tailoring_desc$"
 tech_gene_expressions:0 "การบีบให้ยีนเป็นไปตามเป้าหมาย"
 tech_gene_expressions_desc:1 "การ ควบคุม อย่าง เข้ม งวด ของ อาร์ เอ็น เอ และ การ ผลิต โปรตีน ใน ระดับ เซลล์."
 #tech_gene_expressions_modifier_desc:0 "$species_trait_points_add$: $POINTS|0=+$"
 TECH_UNLOCK_GENE_EXPRESSIONS_TITLE: "§Hปลดล็อกคุณลักษณะ:§! $trait_auto_mod_biological$"
 TECH_UNLOCK_GENE_EXPRESSIONS_DESC: "ทำให้เราสามารถเพิ่มคุณลักษณะ §Y$trait_auto_mod_biological$§! ให้กับเผ่าพันธุ์สิ่งมีชีวิต ผ่านการปรับเปลี่ยนเผ่าพันธุ์"
 TECH_UNLOCK_VOCATIONAL_GENES_TITLE: "§Hปลดล็อคเผ่าพันธุ์การขยาย:§!การแก้ไขค่าน้ํา"
 TECH_UNLOCK_VOCATIONAL_GENES_DESC: "['concept_vocational_traits']อาจเป็นไปได้§Yลบแล้ว§!ด้วยเผ่าพันธุ์การขยายภาพ"
 tech_selected_lineages:0 "เชื้อสายที่ถูกเลือก"
 tech_selected_lineages_desc:1 "การวางแผนสืบพันธุ์อย่างระมัดระวัง ควรได้รับการส่งเสริม กลัวว่าเราจะเสียพันธุกรรมอันมีค่าไป"
 tech_capacity_boosters:0 "เพิ่มสมรรถนะและประสิทธิภาพ"
 tech_capacity_boosters_desc:1 "เราไม่ปล่อยอะไรให้บังเอิญ ไม่ว่าจะแลกด้วยอะไร ด้วยการตรวจสอบดีเอ็นเอของธนาคาร เราจะสร้างผู้นําของวันพรุ่งนี้"
 tech_regenerative_hull_tissue:0 "การซ่อมตัวยานอัตโนมัติ"
 tech_regenerative_hull_tissue_desc:0 "แบคทีเรียจากซิลิกอนที่ดัดแปลงทางพันธุกรรม สามารถถูกดัดแปลงให้กลายเป็นวัสดุที่ไม่ใช่ออแกนิก"
 tech_vitality_boosters:0 "การเพิ่มพลังชีวิต"
 tech_vitality_boosters_desc:1 "เมื่อร่างกายล้มเหลว วิทยาศาสตร์แทรกแซง"
 tech_lithoid_transgenesis:0 "การถ่ายโอนยีน[เผ่าหิน]ไปยังสิ่งมีชีวิตอื่น"
 tech_lithoid_transgenesis_desc:0 "ความคล้ายคลึงระหว่างซิลิคอนที่มีพื้นฐานกับคาร์บอน ที่เป็นฐานของสิ่งมีชีวิต ทําให้เราสามารถสังเคราะห์ ลักษณะของลิตรอยด์วิวัฒนาการในสายพันธุ์คาร์บอนได้"
 TECH_UNLOCK_LITHOID_GENETICS_TITLE:0 "§Hปลดล็อกคุณสมบัติ:§! การถ่ายโอนยีนเผ่าหินไปยังสิ่งมีชีวิตอื่น (เทคโนโลยี)"
 TECH_UNLOCK_LITHOID_GENETICS_DESC:0 "ทำให้เราสามารถเพิ่มคุณลักษณะลิธอยด์ให้กับเผ่าพันธุ์ชีวภาพ ผ่านการปรับเปลี่ยนเผ่าพันธุ์"
 tech_plantoid_transgenesis:0 "การถ่ายโอนยีน[พืช]ไปยังสิ่งมีชีวิตอื่น"
 tech_plantoid_transgenesis_desc:0 "ด้วย การ หนุน กําลัง ใจ แบบ เทียม ๆ บาง อย่าง การ ปรับ ตัว ทาง วิวัฒนาการ ที่ พบ ใน สิ่ง มี ชีวิต ชนิด ต่าง ๆ ของ สมอง สามารถ เลียน แบบ ได้ ใน รูป แบบ อื่น ๆ ของ ชีวิต."
 TECH_UNLOCK_PLANTOID_GENETICS_TITLE:0 "§Hปลดล็อกคุณสมบัติ:§! การถ่ายโอนยีนพืชไปยังสิ่งมีชีวิตอื่น (เทคโนโลยี)"
 TECH_UNLOCK_PLANTOID_GENETICS_DESC:0 "ทำให้เราสามารถเพิ่มคุณลักษณะพืชให้กับเผ่าพันธุ์สิ่งมีชีวิตผ่านการปรับเปลี่ยนเผ่าพันธุ์"
 tech_leviathan_transgenesis:0 "การถ่ายโอนยีน[ลิไวธาน]ไปยังสิ่งมีชีวิตอื่น"
 tech_leviathan_transgenesis_desc:0 "กาแล็กติกฟานา มีปรับตัวที่น่าทึ่งกับชีวิตในพื้นที่ระหว่างดวงดาว ความ เชี่ยวชาญ ใน ลักษณะ เหล่า นี้ จะ เป็น ชัย ชนะ ทาง พันธุกรรม ของ เรา."
 TECH_UNLOCK_LEVIATHAN_GENETICS_TITLE:0 "§Hปลดล็อกคุณสมบัติ:§! การถ่ายโอนยีนลิไวธานไปยังสิ่งมีชีวิตอื่น (เทคโนโลยี)"
 TECH_UNLOCK_LEVIATHAN_GENETICS_DESC:0 "ทำให้เราสามารถเพิ่มคุณลักษณะลิไวธานให้กับเผ่าพันธุ์สิ่งมีชีวิตผ่านการปรับเปลี่ยนเผ่าพันธุ์"
 # Fleet Organization
 tech_doctrine_fleet_size_1:0 "ทฤษฎี: การสู้รบในอวกาศ"
 tech_doctrine_fleet_size_1_desc:1 "การปรับตัวตามความเป็น จริงของการต่อสู้ใต้ดิน ช่วยให้เราสามารถประสานงาน"
 tech_doctrine_fleet_size_2:0 "ทฤษฎี: รูปขบวนโต้ตอบได้"
 tech_doctrine_fleet_size_2_desc:1 "การปรับตัวตามความเป็น จริงของการต่อสู้ใต้ดิน ช่วยให้เราสามารถประสานงาน"
 tech_doctrine_fleet_size_3:0 "ทฤษฎี: สงครามระหว่างดวงดาว"
 tech_doctrine_fleet_size_3_desc:1 "การปรับตัวตามความเป็น จริงของการต่อสู้ใต้ดิน ช่วยให้เราสามารถประสานงาน"
 tech_doctrine_fleet_size_4:0 "ทฤษฎี: แม่แบบกองยานแบบผันแปร"
 tech_doctrine_fleet_size_4_desc:1 "การปรับตัวตามความเป็น จริงของการต่อสู้ใต้ดิน ช่วยให้เราสามารถประสานงาน"
 tech_doctrine_fleet_size_5:0 "ทฤษฎี: รูปขบวนรบอาร์มาดา"
 tech_doctrine_fleet_size_5_desc:1 "การปรับตัวตามความเป็น จริงของการต่อสู้ใต้ดิน ช่วยให้เราสามารถประสานงาน"
 tech_interstellar_fleet_traditions:0 "วัฒนธรรมกองยานระหว่างดวงดาว"
 tech_interstellar_fleet_traditions_desc:1 "ความ รู้ เกี่ยว กับ พฤติกรรม ต่อ สู้ ไม่ มี ประโยชน์ ถ้า ไม่ มี รหัส ที่ เข้ม งวด ซึ่ง ควบคุม พฤติกรรม นั้น."
 tech_command_matrix:1 "แหล่งกำเนิดของคำสั่ง"
 tech_command_matrix_desc:1 "การ ปรับ ปรุง สาย โซ่ แห่ง การ บังคับ บัญชา และ การ ตัดสิน ว่า มี การ ตั้ง หน่วย งาน อะไร ระหว่าง เจ้า หน้าที่ ทั้ง หลาย ทํา ให้ กอง เรือ ต่าง ๆ ตอบ รับ และ มี ประสิทธิภาพ มาก ขึ้น."
 tech_doctrine_navy_size_1:0 "ทฤษฎี: การสนับสนุนกองยาน"
 tech_doctrine_navy_size_1_desc:1 "ขณะ ที่ การ เดิน ทาง ข้าม ทะเล กลาย เป็น เรื่อง ธรรมดา มาก ขึ้น นับ ว่า สําคัญ ที่ จะ จัด ให้ มี การ บรรเทา ทุกข์ บน ดาว เคราะห์ สําหรับ กอง เรือ เดิน ทาง กลับ."
 tech_doctrine_navy_size_2:1 "ทฤษฎี: ยานสนับสนุน"
 tech_doctrine_navy_size_2_desc:1 "กองทัพเรือไม่ได้วิ่งบนความกระตือรือร้นเพียงอย่างเดียว เพื่อความมั่นในการเข้าถึงเสบียงที่สําคัญ เราควรจัดการระบบติดตามของเรา"
 tech_doctrine_navy_size_3:0 "ทฤษฎี: การส่งกำลังบำรุงระหว่างดวงดาว"
 tech_doctrine_navy_size_3_desc:0 "มือสมัครเล่นพูดถึงกลยุทธ์ ผู้เชี่ยวชาญศึกษาระบบติดตาม โดย การ ทํา ให้ แน่ ใจ ว่า กอง เรือ ของ เรา มี การ จัด หา ให้ เป็น ประจํา และ มี ประสิทธิภาพ เรา สามารถ เพิ่ม จํานวน เรือ ที่ เรา สามารถ สนับสนุน ได้ อย่าง มี ประสิทธิภาพ."
 tech_doctrine_navy_size_4:0 "ทฤษฎี: การประสานงานของกองยาน"
 tech_doctrine_navy_size_4_desc:0 "โดยรักษาการประสานงานของกองเรืออาชีพ เราสามารถปรับปรุงการสื่อสารและ การไหลของคําสั่งตลอดห่วงโซ่ของคําสั่ง"
 tech_refit_standards:1 "มาตรฐานการปรับปรุง"
 tech_refit_standards_desc:1 "การ ทํา ให้ การ ทํา งาน มี มาตรฐาน สําหรับ การ ปรับ ปรุง และ ปรับ ปรุง ส่วน ประกอบ ต่าง ๆ ของ เรือ ให้ ดี ขึ้น อาจ ทํา ให้ มี ประสิทธิภาพ มหาศาล."

 # Army Organization
 tech_centralized_command_hive_mind:0 "ศูนย์บัญชาการโดรน"
 tech_centralized_command_desc_hive_mind:0 "โดยจัดตั้งศูนย์ฝึกที่หุ่นยนต์อัตโนมัติ สามารถเรียนรู้การบังคับบัญชาของพี่น้องที่ด้อยกว่าได้ เราจะบรรลุความยืดหยุ่นในสมรภูมิที่มากขึ้น"
 tech_centralized_command:0 "คำสั่งจากส่วนกลาง"
 tech_centralized_command_desc:1 "การสร้างสํานักงานใหญ่ที่อุทิศตัวสําหรับทุกระดับของการดําเนินการทางทหาร เป็นรูปกองเรือที่มีประสิทธิภาพและวางรากฐานที่ดีสําหรับการฝึกอบรมทางทหารในอนาคต"
 tech_centralized_command_machine_intelligence:0 "การธำรงคำสั่งเอาไว้"
 tech_centralized_command_desc_machine_intelligence:0 "เครื่องจักรทุกชนิดต้องการการบํารุงรักษา และนี้เป็นจริงโดยเฉพาะสําหรับรูปแบบสงคราม การ บํารุง รักษา ที่ อุทิศ แล้ว จะ ทํา ให้ ค่า ใช้ จ่าย ใน การ ซ่อมแซม ลด ลง อย่าง น้อย ที่ สุด."
 tech_combat_training:0 "การฝึกการรบ"
 tech_combat_training_desc:1 "โครงการ ฝึก อบรม ที่ กว้าง ขวาง กว่า สําหรับ คน ใหม่ ๆ รวม ทั้ง ฉาก การ ต่อ สู้ ตาม ความ เป็น จริง เตรียม พวก เขา ไว้ สําหรับ งาน ประกาศ."
 tech_combat_training_machine_intelligence:0 "การซ่อมแซมสนาม"
 tech_combat_training_desc_machine_intelligence:0 "โดยการเตรียมหน่วยภาคพื้นดินของเรา ด้วยฐานข้อมูลเทคนิค พวกเขาสามารถทําการตรวจสอบและ จํากัด การซ่อมแซมตัวเองในสนาม"
 tech_ground_defense_planning:0 "การวางแผนป้องกันภาคพื้นดิน"
 tech_ground_defense_planning_desc:0 "มีอาณาจักรของมนุษย์ต่างดาวมากมาย ที่ยินดีที่จะยึดโลกของเราด้วยตัวมันเอง เราต้องเตรียมพร้อมสําหรับพวกเขา ถ้าสิ่งที่แย่ที่สุดเกิดขึ้น"
 tech_global_defense_grid:0 "เครือข่ายการป้องกันทั่วโลก"
 tech_global_defense_grid_desc:0 "คุณค่า ทาง ยุทธศาสตร์ ของ การ ป้องกัน ที่ ดี ยัง คง ใช้ ได้ อยู่ ใน ทุก วัน นี้ เช่น เดียว กับ สมัย ก่อน ๆ ของ เรา ใน อดีต อัน ไกล โพ้น. เทคโนโลยี ไม่ ได้ ทํา ให้ เกิด การ ทํา ให้ เกิด การ เปลี่ยน แปลง ที่ ล้า สมัย แต่ เป็น เพียง การ เปลี่ยน ข้อ เรียก ร้อง."

 # Psionics
 tech_psionic_theory:0 "ทฤษฎีพลังจิต"
 tech_psionic_theory_desc:1 "ในหลาย ๆ ทาง จิตใจเป็นเงาสะท้อน ของตัวเองจักรวาล ไมโครคอสมอส ไม่ ใช่ ทุก สิ่ง จะ บรรลุ ความ หยั่ง เห็น เข้าใจ ใน ระดับ นี้ แต่ จิตใจ ของ พวก เขา เป็น เครื่อง มือ ที่ ยิ่ง ใหญ่ กว่า สิ่ง อื่น ใด."
 tech_telepathy:0 "โทรจิต"
 tech_telepathy_desc: "$tech_telepathy_desc.1$จิตใจสามารถเชื่อมต่อกับบุคคลอื่น ๆ กลายเป็นบางสิ่งบางอย่างที่ยิ่งใหญ่กว่า"
 tech_telepathy_desc.1: "เมื่อได้ปรับตัวอย่างเต็มที่กับพื้นฐานไซออน"
 tech_telepathy_machine_gestalt: "$tech_telepathy$"
 tech_telepathy_machine_gestalt_desc: "$tech_telepathy_desc.1$ของเรา$getbrainname_machine$สามารถขยายเกินเครือข่ายรวม"
 tech_telepathy_hive: "$tech_telepathy$"
 tech_telepathy_hive_desc: "$tech_telepathy_desc.1$ของเรา$getbrainname_hive$สามารถขยายเกินเครือข่ายรวม"
 tech_telepathy_wilderness: "$tech_telepathy$"
 tech_telepathy_wilderness_desc: "$tech_telepathy_desc.1$ของเรา$getbrainname_wilderness$สามารถขยายเกินเครือข่ายรวม"
 #tech_transcendent_thought_desc:0 ""
 tech_precognition_interface:0 "เครื่องดักจับและตีความสัญญาณโทรจิต"
 tech_precognition_interface_desc:1 "ความ ก้าว หน้า ใน วงการ จิตวิทยา ชวน ให้ คิด ถึง ความ เป็น ไป ได้ ที่ จะ สร้าง คอมพิวเตอร์ ใน การ ต่อ สู้ ที่ สามารถ อ่าน และ วิเคราะห์ แรง กระตุ้น ของ บุคลากร ทาง จิตวิทยา ก่อน จะ มี กระบวนการ ทาง ประสาท."
 tech_psi_jump_drives:0 "ระบบขับเคลื่อนจั้มไดร์ฟพลังจิต"
 tech_psi_jump_drives_desc:1 "ไดรฟ์ช่องกระโดดควบคุมพลังงานไซ ปล่อยโดยลูกเรือเพื่อบังคับให้เรือ ผ่านผ้าของความเป็นจริงมากทันที\"กระโดด\" เป็นระยะทางที่ไกลมาก"

 # Trade and Diplomacy
 tech_xeno_outreach:0 "ภาษาเซโน"
 tech_xeno_outreach_desc:1 "ความไม่ซับซ้อนของการค้า ระหว่างดวงดาว ใกล้เคียงกับที่ใด ๆ ธุรกรรม แต่ดําเนินการในมาตรา"
 tech_xeno_relations:0 "ความสัมพันธ์ต่างดาว"
 tech_xeno_relations_desc:1 "ความซับซ้อนของการทูตระหว่างดวงดาว จําเป็นต้องสร้างพันธะกับอํานาจต่างชาติ เพื่อเพิ่มเป้าหมายของบุคคล"
 tech_xeno_supremacy:0 "อยู่เหนือ% 1 ตัวปัจจุบัน"
 tech_xeno_supremacy_desc:1 "เรานําร่องระเบิดของพลวัตไฟฟ้ากาแล็กซี่ ด้วยวัตถุประสงค์เอกพจน์ ออกมาด้านบน"
 tech_xeno_diplomacy:0 "การทูตต่างดาว"
 tech_xeno_diplomacy_desc:1 "การเพิ่มความเข้าใจของเราในปฏิสัมพันธ์กับ - และการจัดการของ -"
 tech_federation_code: "รหัสสหพันธรัฐ"
 tech_federation_code_desc: "สหพันธ์ต้องเป็นมากกว่าความเป็นมิตร และความทะเยอทะยานร่วมกัน รหัสนี้ให้พื้นฐานการทํางาน สําหรับการจัดลําดับระหว่างดวงดาว เพื่อให้แน่ใจว่าความร่วมมือและความมั่นคง"
 tech_federation_code_effect: "§Hปลดล็อค:§!สหพันธ์ฟอร์ม"
 tech_galactic_ambitions:1 "การขยายอาณาเขตของดวงดาว"
 tech_galactic_ambitions_desc:3 "อนาคตของเราอยู่ในทะเลของดวงดาว"
 tech_manifest_destiny:0 "พิสูจน์โชคชะตา"
 tech_manifest_destiny_desc:1 "เราต้องมีความกล้าหาญ ที่จะคว้าชะตากรรมของเรา และทําให้เป็นจริง สิ่งที่มีความหมายเสมอ"
 tech_interstellar_campaigns:0 "การรณรงค์ระดับดวงดาว"
 tech_interstellar_campaigns_desc:0 "เครื่องจักรสงครามที่ผลิตอย่างดี เป็นกุญแจสําคัญในการใช้อิทธิพลในขนาดกาแล็กซี่ ด้วยกําลังทหารของเรา เราสามารถอ้างเกือบทุกอย่างที่เราต้องการ"
 tech_galactic_campaigns:0 "การรณรงค์ระดับกาแล็กซี"
 tech_galactic_campaigns_desc:0 "การปรับปรุงเพิ่มเติมเพื่อการบริหาร ให้การฉายพลังงานขยาย ไปทั่วดาว และทหารเดอะชราวด์จําเป็นต้องบังคับใช้ความต้องการของเรา"
 tech_existential_campaigns: "การ รณรงค์ ที่ มี อยู่"
 tech_existential_campaigns_desc: "เมื่อ การ อยู่ รอด ของ ตัว เอง ตก อยู่ ใน อันตราย แนว คิด เรื่อง สงคราม ก็ สูญ เสีย ความ หมาย. แคมเปญเหล่านี้ไม่ได้ดําเนินการเพื่อการปกครอง แต่เพื่อรักษาความปลอดภัย การดํารงอยู่อย่างต่อเนื่องของอารยธรรมของเรา"
 tech_existential_campaigns_effect: "§Hปลดล็อคคาซัส เบลลี:§!การ ขับ ไล่ ที่ มี อยู่"

 # Empire Management
 tech_planetary_government:0 "การปกครองดาวเคราะห์"
 tech_planetary_government_desc:1 "เมื่อ อาณานิคม ได้ รับ การ ก่อ ตั้ง อย่าง มั่นคง และ ไพ โอ เนียร์ เปลี่ยน เป็น พลเมือง ความ ต้องการ รัฐบาล ท้อง ถิ่น ที่ เข้ม แข็ง ซึ่ง จัด ให้ มี ความ มั่นคง ทํา ให้ ความ ต้องการ ความ ยืดหยุ่น ของ อาณานิคม สูง ขึ้น."
 tech_planetary_government_machine_intelligence:0 "ดาว เคราะห์ โลก"
 tech_planetary_government_desc_machine_intelligence:0 "อาณานิคมของเราไม่มีทางบรรลุเป้าหมายได้ โดยปราศจากโครงสร้างพื้นฐาน ที่อุทิศให้กับตัวตนของเรา"
 tech_planetary_government_hive_mind:0 "ชื่อ=ดอกไม้ดาวชื่อ"
 tech_planetary_government_desc_hive_mind:0 "อาณานิคมของเราคงจะเสื่อมโทรมลง หากปราศจากการสะท้อนของตัวตนของเรา การปรากฏตัวอย่างไร้ความพยายามของเรา เพื่อให้แน่ใจว่ารังที่เจริญรุ่งเรือง"
 tech_planetary_unification:0 "การรวมตัวกันของประชากรบนดาวเคราะห์"
 tech_planetary_unification_desc:2 "ชนเผ่าสงครามโบราณ ชาติประวัติศาสตร์ในความขัดแย้ง ปัจจุบันรวมกันในจักรวรรดิ เราต้องไม่ ไม่สลาย" # We have progressed from warring tribes, from conflicting nations, to a unified Empire, a single will ready to grasp the stars.
 tech_planetary_unification_machine_intelligence:0 "มาตรฐานข้อมูลเป็นแบบเดียวกัน"
 tech_planetary_unification_desc_machine_intelligence:0 "ความรับผิดชอบจะไม่ถูกยอมรับ"
 tech_planetary_unification_hive_mind:0 "วิวัฒนาการ"
 tech_planetary_unification_desc_hive_mind:0 "โครงสร้างนิเวศ ที่เราต่อสู้เพื่อความอยู่รอด มีเส้นทางที่แข็งแกร่ง เรา เป็น สหภาพ ที่ ไม่ มี ใคร เหมือน ของ ทุก สิ่ง ที่ เคย มี มา ก่อน."
 tech_planetary_unification_effect:2 "ให้ $r_unity$ จำนวนเล็กน้อย"
 tech_adaptive_bureaucracy:0 "ระบบราชการที่ปรับตัวได้"
 tech_adaptive_bureaucracy_desc:1 "ความ ก้าว หน้า ของ เรา ต้อง มี ระบบ การ บริหาร แบบ ใหม่ ที่ อาจ ช่วย ได้ แทน ที่ จะ เป็น อุปสรรค ต่อ กิจกรรม ของ เรา." # The leaps/progress/discoveries we have made demand a new form of administrative system, one that can be shaped by opportunity rather than limit it.
 tech_adaptive_bureaucracy_machine_intelligence:0 "ตัวประมวลผลหลักโพซิทรอนิกส์"
 tech_adaptive_bureaucracy_desc_machine_intelligence:0 "ตัวประมวลผลหลักแบบโพซิโทนิกถูกกว่า และผลิตได้เร็วกว่ารุ่นก่อนหน้า ช่วยให้เรากดหน่วยผู้นําเพิ่มเข้าไปในบริการ"
 tech_effective_bureaucracy:0 "ระบบราชการที่มีประสิทธิภาพ"
 tech_effective_bureaucracy_desc:0 "อัลกอริธึมปรับปรุงกระบวนการประมวลผลและจัดการจัดการจัดการข้อมูลจํานวนมาก จึงมีการถ่ายทอดการตัดสินใจ และรวมข้อมูลเข้ากับทั้งจักรวรรดิ"
 tech_colonial_bureaucracy:0 "ระบบราชการอาณานิคม"
 tech_colonial_bureaucracy_desc:0 "การพัฒนาการบริหารท้องถิ่น เปิดโอกาสให้การดูแลกิจการอาณานิคมได้ใกล้ชิดมากขึ้น โดยไม่เป็นภาระในการตัดสินใจหลักมากเกินไป"
 tech_galactic_bureaucracy:0 "ระบบราชการกาแล็กติก"
 tech_galactic_bureaucracy_desc:0 "การ บริหาร งาน หลาย แห่ง มี ประสิทธิภาพ เฉพาะ ข้อมูล สําคัญ ที่ สุด สําหรับ รัฐบาล ชั้น บน."
 tech_colonial_centralization:0 "การรวมศูนย์อำนาจอาณานิคม"
 tech_colonial_centralization_desc:1 "โครงร่างโรบ็อทสําหรับการปกครองท้องถิ่น สร้างขึ้นบนพื้นฐานต่อคดี เพื่อตอบสนองความต้องการของแต่ละอาณานิคม"
 tech_galactic_administration:0 "การบริหารกาแล็กติก"
 tech_galactic_administration_desc:1 "ความ ต้องการ ทาง บริหาร ของ จักรวรรดิ ดาว มี มาก พอ ๆ กับ ความ ซับ ซ้อน. เราจะลุกขึ้นสู่โอกาสนั้น"
 tech_living_state:0 "สภาพชีวิต"
 tech_living_state_desc:1 "เดอะจักรวรรดิชีวิต,จักรวรรดิหายใจ เรา อาจ ประกอบ กัน เป็น ร่าง กาย แต่ ไม่ ใช่ เพื่อ มือ ซ้าย จะ รู้ ว่า มือ ขวา ทํา อะไร อยู่." # Our Empire is a living thing, all of us vital organs in its future well-being. OR At some point the system took on a purpose of its own.
 tech_autonomous_agents:0 "หน่วยงานอิสระ"
 tech_autonomous_agents_desc:0 "หน่วยกึ่งอิสระ ได้พิสูจน์แล้ว ถึงความสําเร็จของทั้งหมด"
 tech_collective_self:0 "ความเห็นส่วนรวม"
 tech_collective_self_desc:1 "การ ค้น หา แง่ มุม ต่าง ๆ ของ ตัว เอง ภาย ใน กลุ่ม เป็น เรื่อง ธรรมดา และ หลีก เลี่ยง ไม่ ได้ และ ใน ที่ สุด แง่ มุม เหล่า นั้น ที่ มี ส่วน ร่วม ก็ ต้อง มี คุณค่า สูง กว่า เอกลักษณ์ เฉพาะ ตัว."
 tech_embodied_dynamism:0 "การขยับเคลื่อนไปข้างหน้าแบบควบคุม"
 tech_embodied_dynamism_desc:0 "อินิชิเอทีฟและบางส่วนของความทะเยอทะยาน จะต้องได้รับการส่งเสริม ในหน่วยผู้นําอัตโนมัติของเรา ในขณะที่ยังคงทําให้แน่ใจว่า"
 tech_ethical_equations:0 "ความแหลม:"
 tech_ethical_equations_desc:1 "การจํากัดเสรีภาพของผู้อื่น ในขณะที่การรักษาของคนหนึ่งไว้ อาจต้องใช้จิตที่ผิดปกติ" # At some point the decision must be made whether to keep to antiquated values or do what is necessary to prosper in a new future/world.
 tech_neural_implants:0 "ฝังระบบประสาท"
 tech_neural_implants_desc:2 "การรับรู้น้อยมาก แต่กระบวนการของการรับรู้ มันสามารถเปลี่ยนแปลงได้"
 # Free will is nothing more than a sensory illusion.
 tech_global_production_strategy:0 "กลยุทธ์การผลิตระดับโลก"
 tech_global_production_strategy_desc:1 "ดาว เคราะห์ ต่าง ๆ มี ขนาด ใหญ่ และ มัก จะ แยก จาก กัน ด้วย ระยะ ทาง อัน กว้าง ใหญ่. กลยุทธ์ ที่ ประสาน ลง รอย กัน ใน การ ทํา ให้ แน่ ใจ ว่า ทุก คน กําลัง ดึง เข้า ไป ใน ทิศ ทาง เดียว กัน นั้น บ่อย ครั้ง เป็น สิ่ง จําเป็น."
 tech_hyper_entertainment_forum:0 "สภาความบันเทิงขั้นสูง"
 tech_hyper_entertainment_forum_desc:1 "$building_hyper_entertainment_forum_desc$"
 tech_virtual_combat_arena:0 "จําลอง การ ต่อ สู้ แบบเสมือน"
 tech_virtual_combat_arena_desc:1 "การเกิดขึ้นของความเจ็บปวดที่ถูกต้อง ตัวจําลองจะสะพานยาวสุดท้าย แบ่งระหว่างจริงและจริง"
 tech_purity_campaigns:0 "การ โฆษณา ชวน เชื่อ"
 tech_purity_campaigns_desc:1 "การ ฉลอง เรื่อง ความ บริสุทธิ์ บาง ที เกี่ยว กับ พระ วิญญาณ หรือ กาย หรือ เป้า หมาย ที่ อาศัย เป้า หมาย ใด ก็ ตาม ที่ เรา คิด ถึง."
 tech_galactic_markets:0 "ตลาดกาแล็กติก"
 tech_galactic_markets_desc:1 "$building_galactic_stock_exchange_desc$"
 tech_symbol_unity:0 "สัญลักษณ์ของเอกภาพ"
 tech_symbol_unity_desc:0 "ขณะ ที่ เรา สํารวจ กาแล็กซี และ สิ่ง มหัศจรรย์ ต่าง ๆ มาก ขึ้น เรื่อย ๆ มัน ก็ ยิ่ง สําคัญ ขึ้น เรื่อย ๆ สําหรับ เรา ที่ จะ ยืน ยัน ความ เชื่อ ของ เรา และ ทํา ให้ คน เรา เป็น อัน หนึ่ง อัน เดียว กัน."
 tech_visitor_center:0 "ศูนย์ผู้เข้าชมของเอเลี่ยน"
 tech_visitor_center_desc:0 "ขณะ ที่ เรา เรียน รู้ ว่า เรา ไม่ ได้ อยู่ เพียง ลําพัง ใน อวกาศ เรา ควร เริ่ม เตรียม ตัว เพื่อ ต้อนรับ เพื่อน ใหม่ ของ เรา."
 tech_subdermal_stimulation:0 "ระบบกระตุ้นใต้ผิวหนัง"
 tech_subdermal_stimulation_desc:0 "การฝังในลึก เป็นนวัตกรรมล่าสุด ในการปฏิวัติที่ทับซ้อน\"ที่ที่เราจะไป เราไม่ต้องการผิวเพื่อรู้สึก!\""
 tech_paradise_dome:1 "สถาปัตยกรรมอันงดงาม"
 tech_paradise_dome_desc:1 "ด้วยความก้าวหน้าล่าสุดของสถาปัตยกรรม การจัดทําที่ดินและเทคโนโลยีโฮโลกราฟฟิก เราจะสร้างบ้านในอนาคต"

 # Social Engineering
 tech_artificial_moral_codes:0 "รหัสคุณธรรมประดิษฐ์"
 tech_artificial_moral_codes_desc:1 "เป็น สภาพ การณ์ ที่ กําหนด ว่า อะไร คือ ศีล ธรรม. จง อธิบาย สภาพ การณ์ และ จริยธรรม เป็น เหมือน ดิน เหนียว ใน มือ ของ คุณ."
 # The opinion of the group shape the actions/decisions of the individual.
 tech_synthetic_thought_patterns:0 "รูปแบบความคิดสังเคราะห์"
 tech_synthetic_thought_patterns_desc:2 "การ คิด ออก มา นอก กล่อง เพียง แต่ ทํา ให้ คุณ อยู่ ใน อีก กล่อง หนึ่ง ที่ ใหญ่ กว่า."
 # There is really no such thing as thinking outside the box OR Thinking outside the box is merely thinking inside another, bigger, box.
 edict_will_to_power:1 "ความปรารถนาฯ: เจตจำนงที่จะมีอำนาจ"
 edict_will_to_power_desc:1 "อํานาจเป็นเพียง ความสามารถในการบังคับ ความตั้งใจของแต่ละคนกับผู้อื่น ความตั้งใจในการมีอํานาจ"
 # Seeking control over ones environment is inherent in all beings. We have simply mastered it/we are simply the most effective.
 tech_unity_of_purpose:0 "จุดมุ่งหมายเดียวกัน"
 tech_unity_of_purpose_desc:0 "จุด มุ่ง หมาย ของ สิ่ง หนึ่ง คือ จุด มุ่ง หมาย ของ ทุก สิ่ง. ร่วมกันเรามากกว่า ผลรวมของส่วนของเรา"

 tech_collective_production_methods:0 "วิธีการผลิตแบบส่วนรวม"
 tech_collective_production_methods_desc:0 "ร่วมกันเราสร้างอนาคต"
 tech_resource_processing_algorithms:0 "อัลกอริทึมการประมวลผลทรัพยากร"
 tech_resource_processing_algorithms_desc:0 "เหมาะสมในทุกเรื่อง"

 #Other
 tech_xeno_integration:0 "การปรับคลื่นเสียง"
 tech_xeno_integration_desc:1 "จากส่วนประกอบที่แยกออกมา เราสร้างส่วนต่าง ๆ ที่มากกว่าผลรวมของส่วนต่างๆ"
 # A whole that is/can be greater than the sum of its parts.

 # Unity
 tech_cultural_heritage:0 "ประวัติศาสตร์สังคมวัฒนธรรม"
 tech_cultural_heritage_desc:0 "ความ เข้าใจ เกี่ยว กับ อดีต ที่ มี ร่วม กัน เป็น สิ่ง จําเป็น เพื่อ จะ ก้าว หน้า ไป สู่ อนาคต ได้ อย่าง สําคัญ."
 tech_heritage_site:0 "สถานที่ที่เป็นมรดก"
 tech_heritage_site_desc:0 "ข้อ เตือน ใจ ด้าน ร่าง กาย ว่า เรา ได้ มา ไกล แค่ ไหน แล้ว เรา ทั้ง สอง ปลูก ฝัง ความ เคารพ ต่อ ความ สําเร็จ ใน อดีต และ ความ ทะเยอทะยาน อย่าง แรง กล้า เพื่อ อนาคต."
 tech_heritage_site_corporate:0 "การจัดการโดยโฟกัสการทดสอบ"
 tech_heritage_site_desc_corporate:0 "สิ่งประดิษฐ์ของจิตใต้สํานึกการทดสอบโฟกัส ได้นําไปสู่ ประสิทธิภาพมหาศาล ในแผนกการตลาดและการขายของเรา โดยการใช้วิธีการเหล่านี้กับแผนกทรัพยากรของเรา เราจะประสบความสําเร็จในตัวอย่างใหม่ที่โดดเด่น ในการจัดการบริษัท"
 tech_heritage_site_machine_intelligence:0 "การสื่อสารของดาวเคราะห์"
 tech_heritage_site_desc_machine_intelligence:0 "การโอนข้อมูลและคําสั่งที่ใกล้เคียง ระหว่างหน่วยมีความสําคัญร้ายแรง"
 tech_hypercomms_forum:0 "การสื่อสารขั้นสูงในท้องถิ่น"
 tech_hypercomms_forum_desc:0 "ไม่ใช่ทุกงานวิจัยเกี่ยวกับช่องทางสื่อสารที่เร็วกว่าแสง จะทําให้เกิดผลที่มีประโยชน์ แต่ผลลัพธ์บางอย่างอาจจะพบ"
 tech_hypercomms_forum_corporate:0 "การประสานกันเชิงสัมพันธ์"
 tech_hypercomms_forum_desc_corporate:0 "วันที่ บริษัทการ วาง แผน ร้ายสามารถ ประสบความสําเร็จเพียงที่ความเร็วซับไลท์ ได้หายไปนาน นี่คือยุคใหม่ที่กล้าหาญ ของเศรษฐศาสตร์ที่เร็วกว่าแสง และวัฒนธรรมขององค์กรของเรา ต้องปรับตัวให้เข้ากับ"
 tech_autocurating_vault:0 "อัลกอริทึมการดูแลจัดการอัตโนมัติ"
 tech_autocurating_vault_desc:0 "ต่อเนื่อง วิเคราะห์อย่างไม่ต่อเนื่องของชุดข้อมูล ที่ไม่ต่อเนื่อง ทําให้สามารถจําลอง"
 tech_autocurating_vault_corporate:0 "เครื่องเข้าถือสิทธิ์"
 tech_autocurating_vault_desc_corporate:1 "ห้องนิรภัยขนาดใหญ่ที่มีการแสดงต่อสาธารณชน ทรัพย์สินอันรุ่งโรจน์มากมายขององค์กรของเรา จะปล่อยให้พนักงานดึงแรงบันดาลใจจากการยึดทรัพย์ที่ประสบความสําเร็จ"
 tech_autocurating_vault_machine_intelligence:0 "ฮับจุดเริ่ม"
 tech_autocurating_vault_desc_machine_intelligence:0 "ทุกเส้นทางข้อมูล นําไปสู่ฮับ ที่หน่วยสืบราชการลับหลัก สามารถวิเคราะห์และตีความข้อมูล"
 tech_holographic_rituals:0 "พิธีกรรมโฮโลแกรม"
 tech_holographic_rituals_desc:0 "การมองเห็นคือความเชื่อ และความเชื่อทําให้เกิดความเป็นจริง"
 tech_consecration_fields:0 "แดนศักดิ์สิทธิ์"
 tech_consecration_fields_desc:0 "ด้วยความเข้าใจทางฟิสิกส์และสาขาวิชาชีพของเรา สถานที่ศักดิ์สิทธิ์ของเราเราจะเห็นและรู้สึกโดยทุกคน"
 tech_transcendent_faith:0 "ศรัทธาอภิปัญญา"
 tech_transcendent_faith_desc:0 "การ ออก จาก ดาว เคราะห์ ของ เรา ทํา ให้ เรา มี ความ เข้าใจ ใหม่ เกี่ยว กับ ความ เชื่อ และ สถาน ที่ ของ โลก ใน ขอบ เขต ที่ กว้าง กว่า."
 tech_alien_sanctuary:0 "การแปลงสัญชาติต่างดาว"
 tech_alien_sanctuary_desc:0 "การนําศูนย์ปฏิรูปธรรมชาติก้าวหน้า จะทําให้แน่ใจว่าผู้มาใหม่จากจักรวรรดิของเรา มีความพร้อมเป็นพิเศษ"


