 # Ship sizes
 tech_space_exploration:0 "การสำรวจอวกาศ"
 tech_space_exploration_desc:0 "การตระหนักของการเดินทางที่เร็วกว่าแสง เป็นรุ่งอรุณใหม่ของการสํารวจอวกาศ ภารกิจของดาวอื่น ๆ ตอนนี้ไม่เพียง แต่เป็นไปได้ แต่จําเป็น"
 tech_corvettes:0 "ยานคอร์เวต"
 tech_corvettes_desc:0 "การค้นพบของความเร็วเปิดโอกาสให้ความพยายามในช่วงแรก ๆ ที่จะเปลี่ยนรูปแบบกระสวยอวกาศพื้นสู่อวกาศแบบดั้งเดิม"
 tech_destroyers:0 "ยานพิฆาต"
 tech_destroyers_desc:0 "ขณะ ที่ มี ขนาด ใหญ่ กว่า คอ วี ตต์ แต่ การ ปรับ ปรุง เรือ ทําลาย เรือ ก็ ยัง คง ทํา ได้ สําหรับ เรือ ปืน ที่ ค่อน ข้าง เล็ก."
 tech_cruisers:0 "ยานลาดตระเวน"
 tech_cruisers_desc:0 "เดิมทีถูกคิดขึ้นเพื่อทดลองสร้างเรืออาณานิคมรุ่นต่อ ๆ ไป การออกแบบของแข็งพอ ทําให้เหมาะสมสําหรับการขนอาวุธหนัก"
 tech_battleships:0 "ยานประจัญบาน"
 tech_battleships_desc:0 "เรือ มาตรฐาน ขนาด ใหญ่ ที่ สุด ใน บรรดา เรือ รบ เหล่า นี้ ตาม ประเพณี แล้ว มี เกราะ ป้องกัน อย่าง หนา แน่น และ มี การ ใช้ อาวุธ ปืน หลาย แบบ."
 tech_titans:0 "ไททัน"
 tech_titans_desc:1 "การออกแบบเรือในระดับนี้ จะช่วยให้มีการรวมกันของอาวุธพิเศษ และการสนับสนุนเสริม การปรับแต่งไททันอาจทําหน้าที่เป็นเรือธงที่มีประสิทธิภาพสูง ซึ่งยังสามารถยกเรือรอบ ๆ หรือศัตรูที่ทําร้าย"
 tech_colossus:0 "โคลอสซัส"
 tech_colossus_desc:1 "ความก้าวหน้าในวิศวกรรมขนาดใหญ่ เบลอเส้นระหว่างความจริงกับจินตนาการ ในรูปแบบของ โคโลซุสชนิดกองทัพ แพลตฟอร์มขนาดมหึมานี้ สามารถเปลี่ยนแปลงได้อย่างสิ้นเชิง"

 # Ships upgrades
 tech_corvette_hull_1:0 "ตัวยานคอร์เวตแบบปรับปรุง"
 tech_corvette_hull_1_desc:0 "ความ ก้าว หน้า ใน เทคนิค การ ก่อ สร้าง จะ เปิด โอกาส ให้ มี การ ก่อ สร้าง คอ โร เวต ที่ ยืดหยุ่น และ ทนทาน มาก ขึ้น."
 tech_corvette_hull_2:0 "ตัวยานคอร์เวตขั้นสูง"
 tech_corvette_hull_2_desc:0 "ตัว อย่าง เช่น นัก วิทยาศาสตร์ ได้ ค้น พบ ซาก ปรัก หัก พัง ของ ซาก ปรัก หัก พัง."
 tech_corvette_build_speed:0 "รูปแบบยานคอร์เวตมาตรฐาน"
 tech_corvette_build_speed_desc:0 "การ สร้าง มาตรฐาน ใหม่ ๆ สําหรับ การ ทํา แบบ จําลอง และ การ ก่อ สร้าง คอ เวต ต่าง ๆ ช่วย ปรับ ปรุง ประสิทธิภาพ ของ ท่อ ส่ง น้ํา."

 tech_corvette_hull_effect:1 "$corvette_hull_effect$\n$frigate_hull_effect$"
 tech_corvette_build_speed_effect:1 "$corvette_build_speed_effect$\n$frigate_build_speed_effect$"

 corvette_hull_effect:0 "$mod_shipsize_corvette_hull_mult$: §G+10%§!"
 corvette_build_speed_effect:0 "$mod_ship_corvette_cost_mult$: §G-5%§!\n$mod_shipsize_corvette_build_speed_mult$: §G+25%§!"

 frigate_hull_effect:0 "$mod_shipsize_frigate_hull_mult$: §G+10%§!"
 frigate_build_speed_effect:0 "$mod_ship_frigate_cost_mult$: §G-5%§!\n$mod_shipsize_frigate_build_speed_mult$: §G+25%§!"

 tech_destroyer_hull_1:0 "ตัวยานพิฆาตแบบปรับปรุง"
 tech_destroyer_hull_1_desc:0 "ความ ก้าว หน้า ใน เทคนิค การ ก่อ สร้าง จะ เปิด โอกาส ให้ มี การ ก่อ สร้าง ผู้ ทําลาย ที่ ทรหด และ ทนทาน มาก ขึ้น."
 tech_destroyer_hull_2:0 "ตัวยานพิฆาตขั้นสูง"
 tech_destroyer_hull_2_desc:0 "ยานทําลายรุ่นล่าสุด มีสนามความสมบูรณ์ของโครงสร้าง และปรับปรุงขนาด"
 tech_destroyer_build_speed:0 "รูปแบบยานพิฆาตมาตรฐาน"
 tech_destroyer_build_speed_desc:0 "การ สร้าง มาตรฐาน ใหม่ สําหรับ การ ทํา แบบ จําลอง และ การ ก่อ สร้าง ผู้ ทําลาย ได้ ช่วย ปรับ ปรุง ประสิทธิภาพ ของ ท่อ ส่ง น้ํา ใน การ ผลิต ได้ มาก ที เดียว."

 tech_destroyer_hull_effect:1 "$mod_shipsize_destroyer_hull_mult$: §G+10%§!"
 tech_destroyer_build_speed_effect:0 "$mod_ship_destroyer_cost_mult$: §G-5%§!\n$mod_shipsize_destroyer_build_speed_mult$: §G+25%§!"

 tech_cruiser_hull_1:0 "ตัวยานลาดตระเวนแบบปรับปรุง"
 tech_cruiser_hull_1_desc:0 "ความ ก้าว หน้า ใน เทคนิค การ ก่อ สร้าง จะ เปิด โอกาส ให้ มี การ ก่อ สร้าง เรือ บรรทุก สินค้า ที่ มี ขนาด เล็ก กว่า และ ทนทาน กว่า."
 tech_cruiser_hull_2:0 "ตัวยานลาดตระเวนขั้นสูง"
 tech_cruiser_hull_2_desc:0 "ยาน บรรทุก รุ่น ล่า สุด ได้ ปรับ ปรุง สาขา ความ ซื่อ สัตย์ มั่นคง ของ โครง สร้าง และ ปรับ ปรุง ให้ มี หัว เรือ ใหญ่ ขึ้น."
 tech_cruiser_build_speed:0 "รูปแบบยานลาดตระเวนมาตรฐาน"
 tech_cruiser_build_speed_desc:0 "การ สร้าง มาตรฐาน ใหม่ ๆ สําหรับ การ ทํา แบบ จําลอง และ การ สร้าง เรือ บรรทุก สินค้า ช่วย ปรับ ปรุง ประสิทธิภาพ ของ ท่อ ส่ง น้ํา."

 tech_cruiser_hull_effect:1 "$mod_shipsize_cruiser_hull_mult$: §G+10%§!"
 tech_cruiser_build_speed_effect:0 "$mod_ship_cruiser_cost_mult$: §G-5%§!\n$mod_shipsize_cruiser_build_speed_mult$: §G+25%§!"

 tech_battleship_hull_1:0 "ตัวยานประจัญบานแบบปรับปรุง"
 tech_battleship_hull_1_desc:0 "ความ ก้าว หน้า ใน เทคนิค การ ก่อ สร้าง จะ ทํา ให้ มี การ ก่อ สร้าง เรือ รบ ที่ แกร่ง และ ทนทาน มาก ขึ้น."
 tech_battleship_hull_2:0 "ตัวยานประจัญบานขั้นสูง"
 tech_battleship_hull_2_desc:0 "ยาน รบ รุ่น ล่า สุด ได้ ปรับ ปรุง สนาม รบ ให้ สมบูรณ์ แบบ และ ปรับ ปรุง ให้ มี หัว เรือ ใหญ่ ขึ้น."
 tech_battleship_build_speed:0 "รูปแบบยานประจัญบานมาตรฐาน"
 tech_battleship_build_speed_desc:0 "การ กําหนด มาตรฐาน ใหม่ ๆ สําหรับ วิธี ที่ เรา ออก แบบ และ สร้าง เรือ รบ ขนาด มหึมา ช่วย ปรับ ปรุง ความ เร็ว ใน การ ที่ เรือ เหล่า นั้น จะ ถูก ประกอบ ขึ้น."

 tech_battleship_hull_effect:1 "$mod_shipsize_battleship_hull_mult$: §G+10%§!"
 tech_battleship_build_speed_effect:0 "$mod_ship_battleship_cost_mult$: §G-5%§!\n$mod_shipsize_battleship_build_speed_mult$: §G+25%§!"

 tech_titan_hull_1:0 "ตัวยานไททันแบบปรับปรุง"
 tech_titan_hull_1_desc:0 "ความ ก้าว หน้า ใน เทคนิค การ ก่อ สร้าง จะ เปิด โอกาส ให้ มี การ สร้าง กระดูก สัน หลัง ที่ แข็ง แรง และ ทนทาน มาก ขึ้น."
 tech_titan_hull_2:0 "ตัวยานไททันขั้นสูง"
 tech_titan_hull_2_desc:0 "ยาน ขนาด ยักษ์ รุ่น ล่า สุด ได้ ปรับ ปรุง สาขา ความ ซื่อ สัตย์ มั่นคง ของ โครง สร้าง และ ปรับ ปรุง ให้ ดี ขึ้น."
