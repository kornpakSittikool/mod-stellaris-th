 # Society - Weapons
 # ###################################

 tech_amoeba_strike_craft_1:1 "การใช้แฟลกเจลลาหรือแส้เป็นอาวุธ"
 tech_amoeba_strike_craft_1_desc:2 "โดยการปรับเปลี่ยนกระบวนการเพาะพันธุ์ของขอบเขตพื้นที่:เราสามารถตั้งโปรแกรมแฟล็กซิมิโตะของพวกเขา เพื่อทําหน้าที่เป็นเรือจู่โจมอินทรีย์สําหรับกองทัพเรือของเรา"
 tech_swarm_strike_craft_1:0 "เครื่องวางไข่แบบกลุ่ม"
 tech_swarm_strike_craft_1_desc:1 "การเก็บตัวอย่างจากพรีไทน์ที่พ่ายแพ้ ทําให้เราสามารถโคลนและโปรแกรมพันธุกรรม"
 tech_scourge_missile_1:0 "มิสไซล์ต้อการ"
 tech_scourge_missile_1_desc:1 "โดยการวิเคราะห์อาวุธชีวภาพ ที่ใช้โดยสวาร์ม เราสามารถสร้างอาวุธที่ขับเคลื่อนตัวเองได้"
 tech_space_whale_weapon_1:0 "การปรับความถี่"
 tech_space_whale_weapon_1_desc:1 "ใน การ ปรับ วิธี การ กลั่น กรอง พลัง งาน จาก วัตถุ ก๊าซ เป็น ไป ได้ ที่ จะ สร้าง อาวุธ ที่ ดูด พลังงาน จาก เรือ รบ."

