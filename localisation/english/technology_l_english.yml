 # Megastructures
 tech_mega_engineering:0 "วิศวกรรมขนาดมหึมา"
 tech_mega_engineering_desc:1 "เพื่อ จะ ทํา โครงการ ก่อ สร้าง เกล็ด ที่ น่า ตก ตะลึง อย่าง แท้ จริง ได้ สําเร็จ เรา ต้อง บรรลุ ความ เข้าใจ พื้น ฐาน เกี่ยว กับ ทั้ง ด้าน วิศวกรรม และ ทรัพยากร ที่ จําเป็น สําหรับ โครง สร้าง ขนาด มหึมา ดัง กล่าว ก่อน."

