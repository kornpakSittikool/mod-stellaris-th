 tech_curator_lab:0 "ห้องแล็บสำรวจ"
 tech_curator_lab_desc:1 "ห้องปฏิบัติการเหล่านี้รวมเทคโนโลยีขั้นสูง จากคณะผู้ดูแลโบราณ เพื่อเพิ่มความเร็วการสํารวจ"
 tech_archeology_lab:0 "ห้องแล็บโบราณคดี"
 tech_archeology_lab_desc:1 "ห้องทดลองด้วยอุปกรณ์โบราณคดี ที่ก้าวหน้ามาก รวมถึงฐานข้อมูลขนาดใหญ่ ที่จัดทําโดยคณะผู้รักษาการ"
