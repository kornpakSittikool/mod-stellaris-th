l_english:

 # Gestalt trait names and desc
 leader_trait_fallible_hive: "แก้ไขโครงการหลัก..."
 leader_trait_fallible_hive_desc:0 "นี่[GetIndividualName]การ ทน ทุกข์ จาก พฤติกรรม ที่ ไม่ แน่นอน ซึ่ง อาจ นํา ไป สู่ ปัญหา ใน อนาคต."
 leader_trait_fallible_machine: "ถอดรหัส"
 leader_trait_fallible_machine_desc:0 "หน่วย นี้ มี ข้อ บกพร่อง เล็ก ๆ น้อย ๆ ซึ่ง อาจ นํา ไป สู่ ปัญหา ใน อนาคต."

 leader_trait_stubborn_machine:0 "การเขียนโปรแกรมแบบความแหลม:"
 leader_trait_stubborn_machine_desc:1 "หน่วยนี้มีโปรแกรมที่เข้มงวดเป็นพิเศษ ซึ่งแทบจะไม่อนุญาตให้ปรับปรุงพฤติกรรม"
 leader_trait_stubborn_hive:0 "ส่วนติดต่อผู้ใช้ความแหลม:"
 leader_trait_stubborn_hive_desc:1 "นี่[owner.GetIndividualName]โดย เฉพาะ อย่าง ยิ่ง ใน ความ คิด ของ มัน และ ไม่ สามารถ รับ การ ปรับ เปลี่ยน พฤติกรรม ได้."

 leader_trait_destructive_hive_desc:1 "นี่[owner.GetIndividualName]การ ไม่ ใส่ ใจ ต่อ การ บํารุง รักษา ตาม ปกติ ที่ จําเป็น ใน อุปกรณ์ ต่าง ๆ ทํา ให้ ล้ม เหลว อย่าง ร้าย แรง ยิ่ง ขึ้น."
 leader_trait_destructive_machine_desc:1 "หน่วย นี้ ไม่ ได้ ทํา การ บํารุง รักษา ตาม ปกติ ที่ จําเป็น ใน อุปกรณ์ ของ ตน ซึ่ง นํา ไป สู่ ความ ล้ม เหลว ที่ ร้าย แรง ยิ่ง ขึ้น."

 leader_trait_lavish_lifestyle_hive:0 "ปรับให้สูง"
 leader_trait_lavish_lifestyle_hive_desc:0 "นี่[owner.GetIndividualName]พฤติกรรมไม่แน่นอน ทําให้ความไม่มีประสิทธิภาพสูง"
 leader_trait_lavish_lifestyle_machine:0 "ปรับให้สูง"
 leader_trait_lavish_lifestyle_machine_desc:0 "หน่วยนี้มีโปรแกรมผิดพลาด ที่ทําให้มันมีประสิทธิภาพสูง"

 leader_trait_tyrannical_hive:0 "ตัวประมวลผลกลาง"
 leader_trait_tyrannical_hive_desc:1 "โหนดนี้จํานวนครั้งที่มากกว่าการปันส่วนทรัพยากร"
 leader_trait_tyrannical_machine:0 "ตัวประมวลผลกลาง"
 leader_trait_tyrannical_machine_desc:1 "หน่วยนี้แบ่งทรัพยากรออกไปเป็นหลัก"

 leader_trait_righteous_hive:0 "ไม่สามารถใช้ได้"
 leader_trait_righteous_hive_desc:0 "นี่[owner.GetIndividualName]ต่อต้านการทุจริต จํากัดพฤติกรรมผิดปกติใน[owner.GetGestaltEntityName]."
 leader_trait_righteous_machine:0 "การ เชื่อม ต่อ"
 leader_trait_righteous_machine_desc:0 "หน่วยนี้ดําเนินการบ่อย ๆ การปรับปรุงแพทช์ในหน่วยอื่น ๆ"

 leader_trait_embezzler_hive:0 "สูญเสียพลังงาน"
 leader_trait_embezzler_hive_desc:1 "นี่[owner.GetIndividualName]มีความผิดปกติทางร่างกาย ที่ทําให้เกิดการใช้พลังงานจํานวนมาก"
 leader_trait_embezzler_machine:0 "สูญเสียพลังงาน"
 leader_trait_embezzler_machine_desc:0 "หน่วยนี้มีข้อบกพร่องของระบบ ซึ่งทําให้มันบริโภค พลังงานจํานวนมากผิดปกติ"

 leader_trait_gullible_hive:0 "ข้อมูลรั่วไหล"
 leader_trait_gullible_hive_desc:1 "ลักษณะการเชื่อใจของโหนดทําให้เกิด จุดอ่อนด้านความปลอดภัย"
 leader_trait_gullible_machine:0 "ข้อมูลรั่วไหล"
 leader_trait_gullible_machine_desc:0 "โหนดตัวนี้มีจุดอ่อนด้านความปลอดภัย ในระบบปฏิบัติการ"

 leader_trait_bureaucratic_hive:0 "การ สื่อ ความ เสื่อม ถอย"
 leader_trait_bureaucratic_hive_desc:1 "โหนดนี้มีประสบการณ์การสื่อสาร รบกวนเมื่อการสร้างสติที่มากขึ้นด้วยทําแล้ว[owner.GetIndividualNamePlural]."
 leader_trait_bureaucratic_machine:0 "การส่งล้มเหลว"
 leader_trait_bureaucratic_machine_desc:1 "โหนดนี้เกิดข้อผิดพลาดระหว่างการส่งสัญญาณ ระหว่างการเชื่อมต่อกับโดรนแบบไม่แบ่งส่วน"

 leader_trait_micromanager_hive: "ไม่ใช้เอฟเฟ็คต์"
 leader_trait_micromanager_hive_desc:0 "นี่[owner.GetIndividualName]ความไม่มีประสิทธิภาพเมื่อทําการเทียบท่าของกองเรือที่ซับซ้อน"
 leader_trait_micromanager_machine:1 "ไม่ใช้เอฟเฟ็คต์"
 leader_trait_micromanager_machine_desc:0 "หน่วยนี้ไร้ประสิทธิภาพ เมื่อทําการเทียบยานที่ซับซ้อน"

 leader_trait_reckless_hive:0 "การ คํานวณ ผิด"
 leader_trait_reckless_hive_desc:1 "นี่[owner.GetIndividualName]การ ประเมิน ความ เสี่ยง ผิด ๆ ยัง คง สู้ ต่อ ไป เมื่อ มี เหตุ ผล ที่ จะ ถอย หลัง, ซ่อมแซม, และ รวม ตัว กัน ใหม่."
 leader_trait_reckless_machine:0 "การคํานวณความเสี่ยงผิดพลาด"
 leader_trait_reckless_machine_desc:1 "หน่วยนี้คํานวณความเสี่ยงผิดพลาด ยังคงต่อสู้เมื่อสิ่งที่มีเหตุผล จะล่าถอย ซ่อมและการรวมกลุ่ม"

 leader_trait_slipshod_hive:0 "การ ป้องกัน ที่ อ่อนแอ"
 leader_trait_slipshod_hive_desc:0 "นี่[owner.GetIndividualName]ได้มีการพัฒนาความไม่แน่นอนและจิตสํานึกการต่อสู้ไม่ จํากัด ที่อ่อนความสามารถการป้องกันของกองทัพเรือ"
 leader_trait_slipshod_machine:0 "การ ป้องกัน ที่ อ่อนแอ"
 leader_trait_slipshod_machine_desc:0 "หน่วยนี้พัฒนาโปรแกรมการต่อสู้ที่ไม่แน่นอนและไร้ประสิทธิภาพ ที่ทําให้ความสามารถการป้องกันของกองทัพเรืออ่อนแอ"

 leader_trait_slothful_hive:0 "รูปแบบการหยุดการทํางาน"
 leader_trait_slothful_hive_desc:1 "นี่[owner.GetIndividualName]พฤติกรรมที่ช้าและไม่ปกติ ทําให้กองทัพของเราตกอยู่ในอันตรายโดยไม่จําเป็น"
 leader_trait_slothful_machine:0 "การ ต่อ สู้ อย่าง ผิด ๆ"
 leader_trait_slothful_machine_desc:1 "อัลกอริธึมที่ผิดพลาดและผิดปกติของหน่วยนี้ ทําให้กองกําลังจักรกลของเรา ตกอยู่ในอันตรายโดยไม่จําเป็น"

 leader_trait_victory_or_death_hive:0 "ชัย ชนะ หรือ ความ ตาย"
 leader_trait_victory_or_death_hive_desc:1 "นี่[owner.GetIndividualName]ไม่คํานึงถึงการป้องกันตัวเอง ชอบที่จะต่อสู้จนกระทั่งวินาทีสุดท้าย"
 leader_trait_victory_or_death_machine:0 "โพรโทคอลการปิดการทํางาน"
 leader_trait_victory_or_death_machine_desc:1 "หน่วยนี้มีระเบียบการปลดอาวุธบกพร่อง และจะสู้จนจบ"

 leader_trait_disorganized_hive:0 "คําสั่งนาร์"
 leader_trait_disorganized_hive_desc:1 "นี่[owner.GetIndividualName]พฤติกรรมแปลกๆ สามารถนําไปสู่ คําสั่งที่ไม่ชัดเจน"
 leader_trait_disorganized_machine:0 "ปูมบันทึกผิดพลาด"
 leader_trait_disorganized_machine_desc:1 "หน่วยนี้ดําเนินการในการคํานวณที่ผิดพลาด ที่เพิ่มค่าใช้จ่ายของกองทัพของเรา"

 leader_trait_paranoid_hive:0 "คําสั่งที่ถูกซ่อนไว้"
 leader_trait_paranoid_hive_desc:1 "โหนดนี้ทําหน้าที่เป็นรูปแบบที่ซับซ้อน เพื่อให้ข้อมูลปลอดภัย ลดผลการวิจัย"
 leader_trait_paranoid_machine:0 "โปรโตคอลรักษาความปลอดภัยที่มากเกินไป"
 leader_trait_paranoid_machine_desc:1 "หน่วยนี้สร้างรูปแบบที่ซับซ้อน เพื่อให้ข้อมูลปลอดภัย ลดผลการวิจัย"

 leader_trait_narrow_minded_hive:1 "ย่อเล็กสุด"
 leader_trait_narrow_minded_hive_desc:1 "นี่[owner.GetIndividualName]มี จุด มุ่ง หมาย ใน งาน วิจัย ที่ ได้ รับ มอบ หมาย ให้ ทํา โดย ไม่ คํานึง ถึง ทาง เลือก บาง อย่าง ว่า ไม่ จําเป็น."
 leader_trait_narrow_minded_machine:0 "เฟรมหลักผิดพลาด"
 leader_trait_narrow_minded_machine_desc:1 "การทํางานของหน่วยประมวลผลหลักนั้นแยกออกมา ทําให้เกิดความเข้มงวดในการตัดสินใจ"

 leader_trait_neurotic_hive:0 "การ สํารวจ แบบ เอ อร์ รา ติก"
 leader_trait_neurotic_hive_desc:0 "นี่[owner.GetIndividualName]มีอารมณ์ฟุ้งซ่านและคงที่"
 leader_trait_neurotic_machine:0 "โพรโทคอล การ สํารวจ ที่ ไม่ ถูก ต้อง"
 leader_trait_neurotic_machine_desc:1 "หน่วยนี้มีขั้นตอนการสํารวจความวุ่นวาย"

 leader_trait_opinionated_hive:0 "ความ ขัด แย้ง"
 leader_trait_opinionated_hive_desc:1 "นี่[owner.GetIndividualName]ได้ กลาย เป็น ไซแนป ซึ่ง ทํา ให้ ยาก ที่ จะ รวบ รวม และ สังเคราะห์ ความ รู้."
 leader_trait_opinionated_machine:0 "กําลังขัดแย้งกับข้อมูล"
 leader_trait_opinionated_machine_desc:1 "หน่วยนี้รวบรวมข้อมูลอย่างไม่มีประสิทธิภาพ"

 leader_trait_profligate_hive:0 "การ เพิ่ม พูน"
 leader_trait_profligate_hive_desc:1 "นี่[owner.GetIndividualName]มีความบกพร่องที่เพิ่มความดูแลของทั้งหมดอื่น ๆ[owner.GetIndividualNamePlural]บนดาวดวงนี้"
 leader_trait_profligate_machine:0 "การ ซ่อมแซม แบบ เด อ็ อก"
 leader_trait_profligate_machine_desc:1 "หน่วยนี้มีความผิดพลาดอย่างต่อเนื่อง ในการเขียนโปรแกรมของมัน ที่เพิ่มความใกล้ชิดของหน่วยอื่น ๆ บนโลก"

 leader_trait_procrastinator_hive:0 "การ ก่อ สร้าง ที่ โดด เด่น"
 leader_trait_procrastinator_hive_desc:1 "นี่[owner.GetIndividualName]ไม่มีประสิทธิภาพในการจัดการโครงการก่อสร้างดาวเคราะห์"
 leader_trait_procrastinator_machine:0 "การ ก่อ สร้าง ที่ โดด เด่น"
 leader_trait_procrastinator_machine_desc:1 "หน่วยนี้ไร้ประสิทธิภาพ ในการจัดการโครงการก่อสร้างดาวเคราะห์"

 leader_trait_insider_trading_hive:0 "ไม่ใช้เอฟเฟ็คต์"
 leader_trait_insider_trading_hive_desc:1 "นี่[owner.GetIndividualName]เป็นผู้จัดการที่ไม่มีประสิทธิภาพของดาวเคราะห์ไซด์[owner.GetIndividualNamePlural]."
 leader_trait_insider_trading_machine:0 "ไม่สมบูรณ์"
 leader_trait_insider_trading_machine_desc:1 "หน่วยนี้เป็นผู้จัดการที่ไม่มีประสิทธิภาพ ของหุ่นยนต์ดาวเคราะห์"

 leader_trait_eager_machine:0 "นายกรัฐมนตรี"
 leader_trait_eager_machine_desc:1 "หน่วยนี้รูปร่างดีเป็นพิเศษ ต้องการการบํารุงรักษาน้อยกว่ามาก"
 leader_trait_eager_hive:0 "ไพรม์ สเปคซิเมน"
 leader_trait_eager_hive_desc:0 "นี่[owner.GetIndividualName]โดย เฉพาะ อย่าง ยิ่ง มี สุขภาพ ดี จําเป็น ต้อง มี การ ปรับ ปรุง น้อย กว่า มาก เพื่อ รักษา ประสิทธิภาพ ใน ระดับ สูง สุด."

 leader_trait_martinet_hive:0 "มาติเน็ต"
 leader_trait_martinet_hive_desc:0 "ผู้สังเกตการณ์ที่กระตือรือร้นที่เรียกร้องให้ปฏิบัติตามอย่างเคร่งครัดนี้[owner.GetIndividualName]มี บันทึก ที่ ดี เยี่ยม ใน เรื่อง การ จํากัด ความ อ่อนแอ."
 leader_trait_martinet_machine:0 "มาติเน็ต"
 leader_trait_martinet_machine_desc:0 "ด้วย ความ สามารถ ใน การ สังเกต เข้าใจ ที่ ดี เยี่ยม โดรน ตัว นี้ เรียก ร้อง การ ปฏิบัติ ตาม อย่าง เคร่งครัด. สถิติ ของ มัน ดี เยี่ยม เมื่อ พูด ถึง การ จํากัด ความ อ่อนแอ."

 trait_ruler_charismatic_hive:0 "ขยายกระบวนการย่อย"
 trait_ruler_charismatic_hive_desc:1 "โพรเซสย่อยของโหนดนี้ขยายออกไป ทําให้มีพื้นที่มากขึ้นในการเดินและขยายคําสั่ง"
 trait_ruler_charismatic_machine:0 "ขยายกระบวนการย่อย"
 trait_ruler_charismatic_machine_desc:1 "หน่วยนี้มีโปรเซสย่อยที่ขยาย ที่สร้างห้องมากขึ้นในการวางแผนและขยายคําสั่ง"

 trait_ruler_warlike_hive:0 "วอร์มินด์"
 trait_ruler_warlike_hive_desc:0 "โหนดนี้พิเศษสําหรับสงครามอวกาศและพื้นดิน"
 trait_ruler_warlike_machine:0 "อัลกอริทึมสงคราม"
 trait_ruler_warlike_machine_desc:0 "โหนดนี้พิเศษสําหรับสงครามอวกาศและพื้นดิน"

 trait_ruler_warlike_2_hive:0 "$trait_ruler_warlike_hive$2"
 trait_ruler_warlike_2_hive_desc:0 "$trait_ruler_warlike_hive_desc$"
 trait_ruler_warlike_2_machine:0 "$trait_ruler_warlike_machine$2"
 trait_ruler_warlike_2_machine_desc:0 "$trait_ruler_warlike_machine_desc$"

 trait_ruler_logistic_understanding_hive:0 "เข้าใจด้านโลจิสติกส์"
 trait_ruler_logistic_understanding_hive_desc:0 "โหนดนี้มีประสิทธิภาพในการลด การรักษากองทัพและเรือ"
 trait_ruler_logistic_understanding_machine:0 "โปรแกรมโลจิสติก"
 trait_ruler_logistic_understanding_machine_desc:1 "หน่วยนี้มีประสิทธิภาพในการลดจํานวนทหารและเรือ"

 trait_ruler_logistic_understanding_2_hive:0 "$trait_ruler_logistic_understanding_hive$2"
 trait_ruler_logistic_understanding_2_hive_desc:0 "$trait_ruler_logistic_understanding_hive_desc$"
 trait_ruler_logistic_understanding_2_machine:0 "$trait_ruler_logistic_understanding_machine$2"
 trait_ruler_logistic_understanding_2_machine_desc:0 "$trait_ruler_logistic_understanding_machine_desc$"

 trait_ruler_eye_for_talent_hive:0 "รวบรวมข้อมูล"
 trait_ruler_eye_for_talent_hive_desc:0 "นี่[owner.GetIndividualName]การ รวบ รวม ข้อมูล, ประมวล ผล, และ ปรับ วิธี ใหม่ ๆ ใน การ แสวง หา ความ สมบูรณ์."
 trait_ruler_eye_for_talent_machine:0 "ประมวลผลข้อมูล"
 trait_ruler_eye_for_talent_machine_desc:0 "หน่วย นี้ รวบ รวม ข้อมูล, ดําเนิน การ, และ ปรับ วิธี ใหม่ ๆ ใน การ เสาะ หา ความ สมบูรณ์."

 trait_ruler_eye_for_talent_2_hive:0 "$trait_ruler_eye_for_talent_hive$2"
 trait_ruler_eye_for_talent_2_hive_desc:0 "$trait_ruler_eye_for_talent_hive_desc$"
