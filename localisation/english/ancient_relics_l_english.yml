 evermore_science_desc:0 "ประชากรดิจิทัลที่อาศัยอยู่ภายในเอเวอร์มอร์ได้รับการมอบหมายให้ช่วยเหลือการวิจัยทางวิทยาศาสตร์"
 evermore_joy:0 "ความสุขอันยืนยาว"
 evermore_joy_desc:0 "ประชากรของโลกนี้สามารถใช้ชีวิตตามจินตนาการร่วมกับประชากรดิจิทัลในสวรรค์เอเวอร์มอร์ได้"
