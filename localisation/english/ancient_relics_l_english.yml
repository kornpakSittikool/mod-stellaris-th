 #Tutorial
 TUTORIAL_RELICS_VIEW_TITLE:0 "สอนเล่น: วัตถุโบราณ"
 TUTORIAL_RELICS_VIEW_DESC:2 "หน้าจอวัตถุโบราณช่วยให้เราสามารถดูและเปิดใช้งาน §Hวัตถุโบราณ§! ของเราได้ และยังใช้เพื่อดำเนินการโดยใช้ §Hศิลปวัตถุชั้นรอง§! อีกด้วย\n\nการตัดสินใจที่มีเครื่องหมาย §Yการตัดสินใจของดาวเคราะห์§! แสดงไว้ที่นี่เพื่ออ้างอิงเท่านั้น และสามารถสั่งดำเนินการได้จากหน้าจอการตัดสินใจของดาวเคราะห์แทน"

 TUTORIAL_ARCHAEOLOGY_VIEW_TITLE:0 "สอนเล่น: โบราณคดี"
 TUTORIAL_ARCHAEOLOGY_VIEW_DESC:0 "หน้าต่างโบราณคดีจะแสดงรายละเอียดของ §Yแหล่งโบราณคดี§! ที่เลือกในปัจจุบัน หลังจากมีความคืบหน้าแล้ว คุณยังสามารถย้อนกลับไปอ่านขั้นก่อนหน้าได้โดยคลิกที่ไอคอนรูน\n\nเพื่อไขความลับของแหล่งโบราณคดี นักวิทยาศาสตร์จะต้องสร้าง §Yความก้าวหน้าครั้งสำคัญ§! เพื่อก้าวผ่านแต่ละขั้นของแหล่งโบราณคดี นักวิทยาศาสตร์ที่มี §Yคุณลักษณะที่เกี่ยวข้องและทักษะที่สูงกว่า§! จะช่วยเร่งกระบวนการก้าวไปสู่ขั้นถัดไป ในขณะที่ระดับความยากที่สูงขึ้นของแหล่งโบราณคดีจะทำให้กระบวนการนี้ช้าลง นักวิทยาศาสตร์คนใดที่สำรวจแหล่งโบราณคดีเป็นเวลานานพอจะสะสม §Yเบาะแส§! ซึ่งจะทำให้โอกาสเกิดความก้าวหน้าครั้งสำคัญมีมากขึ้น"

 RELICS_AND_ARTIFACTS:0 "$RELICS$ และ $MINOR_ARTIFACTS$"
 TRADITION_VIEW_TITLE:1 "การจัดการสังคม"

