 ANCIENT_RELICS_TITLE: "Ancient Relics Story Pack" # Do not translate
 DLC_ANCIENT_RELICS_RECOMMENDATION_DESC:1 "§SAncient Relics§! เป็นกลุ่มเรื่องต่าง ๆที่เพิ่มเรื่องราวเกี่ยวกับอารยธรรมในอดีตและวัตถุโบราณอันทรงพลัง"
 DLC_ANCIENT_RELICS_RECOMMENDATION_SCIENCE_REC:1 "เราขอแนะนำ §SAncient Relics§! เนื่องจากระบบโบราณคดีมีความเกี่ยวข้องกับการวิจัยทางวิทยาศาสตร์ของจักรวรรดินี้"
 DLC_ANCIENT_RELICS_RECOMMENDATION_TRADITION_REC:1 "เราขอแนะนำ §SAncient Relics§! เนื่องจากรูปแบบของจักรวรรดินี้สอดคล้องกับหัวข้อเรื่องของวัฒนธรรมโบราณและการล่วงเลยของเวลา"

 minor_artifacts:0 "ศิลปวัตถุชั้นรอง"
 minor_artifacts_desc:1 "ศิลปวัตถุชั้นรอง ( £minor_artifacts£ ) เป็นตัวแทนของเทคโนโลยีอารยธรรมโบราณที่คลุมเครือซึ่งได้รับการกู้คืนโดยวิทยาศาสตร์ของเราและเรามีความเข้าใจเพียงบางส่วนเท่านั้น พวกมันมีอยู่ทั่วไปโดยมีมากกว่าวัตถุโบราณชิ้นสำคัญและสามารถใช้เพื่อเพิ่มเอฟเฟกต์ต่างๆต่อจักรวรรดิได้"
