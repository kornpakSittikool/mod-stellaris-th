 bombardment_pox:0 "โรคระบาดจาโวเรียน"
 bombardment_pox_desc:0 "การทิ้งระเบิดแบบ $bombardment_pox$ จะโปรยปรายดาวเคราะห์ด้วยเชื้อโรคที่ร้ายแรง\n- ความเสียหาย §Yปานกลาง§! ต่อ §Yกองทัพ§!\n- ความเสียหาย §Eเล็กน้อย§! ต่อ §Yดาวเคราะห์§!\n- §Eไม่มี§! ความเสียหายต่อ §Yประชากรจักรกล§!\n- ความเสียหาย §Rร้ายแรงมาก§! ต่อ §Yประชากรสิ่งมีชีวิตอินทรีย์§!\n- จะทิ้งระเบิดใส่ดาวเคราะห์ที่ไม่มีการป้องกัน\n- สามารถทำให้ดาวเคราะห์กลายเป็นโลกสุสานที่ไร้สิ่งมีชีวิต"

 pc_relic:0 "ดาวโบราณ"
 pc_relic_desc:0 "เมืองที่เคยขยายไปทั่วดาวนี้ ปัจจุบันเหลือเพียงซากปรักหักพังโบราณและถูกทิ้งร้างและผู้อยู่อาศัยดั้งเดิมได้จากไปนานแล้ว"
 trait_pc_relic_preference:0 "ชอบอยู่ศัยในดาวโบราณ"
 trait_pc_relic_preference_short:0 "โลกโบราณ"
 trait_pc_relic_preference_desc:0 "$trait_pc_arctic_preference_desc$"
 mod_pc_relic_habitability:0 "การอยู่อาศัยได้ในดาวโบราณ"
 d_collapsed_spire:1 "£blocker£ ยอดหอคอยถล่ม"
 d_collapsed_spire_desc:0 "ยอดหอคอยที่อยู่อาศัยขนาดใหญ่ได้ถล่มลงมาด้วยน้ำหนักของมันเองในบริเวณนี้ ทำให้ปิดกั้นการเข้าถึง ในขณะที่มันยังตั้งตระหง่านอยู่ โครงสร้างที่สูงตระหง่านนี้ต้องเป็นหนึ่งในสิ่งก่อสร้างที่สูงที่สุดบนดาวดวงนี้อย่างแน่นอน"
 add_zone_central_spire_tt: "เพิ่มความเชี่ยวชาญเขตเมือง: §Y£zone£ $zone_central_spire$§!"
 d_collapsed_spire_blocks_zone: "เคลียร์ $d_collapsed_spire$"
 d_massive_crevice:1 "£blocker£ รอยแยกขนาดใหญ่"
 d_massive_crevice_desc:0 "บริเวณนี้ถูกแบ่งแยกด้วยรอยแยกขนาดใหญ่ที่ตัดผ่านพื้นที่ที่เคยเป็นเขตเมืองหนาแน่น พื้นดินตรงนี้ไม่มั่นคงอย่างยิ่ง มีแผ่นดินไหวและดินถล่มเกิดขึ้นบ่อยครั้ง"
 d_shattered_solar_array:1 "£blocker£ แผงพลังงานแสงอาทิตย์แตกละเอียด"
 d_shattered_solar_array_desc:0 "ซากปรักหักพังของแผงพลังงานแสงอาทิตย์ขนาดใหญ่ เมื่อตอนที่ยังใช้งานได้ มันต้องเคยจ่ายพลังงานให้กับพื้นที่ส่วนใหญ่ของดาวเคราะห์ดวงนี้"
 d_flooded_reactor_pits:1 "£blocker£ บ่อเครื่องปฏิกรณ์น้ำท่วมขัง"
 d_flooded_reactor_pits_desc:0 "บ่อลึกเหล่านี้ดูเหมือนจะเคยเป็นที่ตั้งของสิ่งอำนวยความสะดวกในการผลิตพลังงานหลักของดาวเคราะห์ เมื่อเวลาผ่านไปยาวนาน ฝนและน้ำท่วมได้ทำให้บ่อเหล่านี้เต็มไปด้วยน้ำที่ขุ่นมัว"
 d_crumbling_mining_tunnels:1 "£blocker£ อุโมงค์เหมืองพังทลาย"
 d_crumbling_mining_tunnels_desc:0 "เครือข่ายอุโมงค์ลึกใต้พื้นผิวดาวเคราะห์ดูเหมือนจะเคยเป็นแหล่งแร่หลักของมัน พันปีของการถล่มและหินร่วงหล่นทำให้อุโมงค์เหลือเพียงส่วนน้อยเท่านั้นที่สามารถสัญจรผ่านได้"
 d_ancient_reactor_pits:0 "บ่อเครื่องปฏิกรณ์โบราณ"
 d_ancient_reactor_pits_desc:0 "บ่อเครื่องปฏิกรณ์โบราณเหล่านี้นอกเหนือจากเส้นศูนย์สูตรของดาวเคราะห์เคยเป็นที่ตั้งของเครื่องกำเนิดพลังงานหลัก โครงสร้างพื้นฐานที่แข็งแกร่งอย่างน่าประหลาดใจส่วนใหญ่รอดพ้นมาได้ และเครื่องปฏิกรณ์ใหม่ๆ สามารถนำมาติดตั้งเข้ากับช่องเดิมได้"
 d_immense_solar_array:0 "แผงพลังงานแสงอาทิตย์ขนาดใหญ่"
 d_immense_solar_array_desc:0 "แผงพลังงานแสงอาทิตย์นี้มีขนาดเกือบเท่ากับทวีปขนาดเล็ก ส่วนใหญ่ของมันถูกทำลายจนไม่สามารถซ่อมแซมได้ แต่โครงสร้างพื้นฐานพลังงานด้านล่างยังคงอยู่ ทำให้เป็นทำเลที่ดีในการผลิตพลังงาน"
 d_abandoned_mining_tunnels:0 "อุโมงค์เหมืองร้าง"
 d_abandoned_mining_tunnels_desc:0 "ซากปรักหักพังส่วนใหญ่บนพื้นผิวดาวเคราะห์ถูกสร้างขึ้นจากแร่ธาตุที่ขุดจากอุโมงค์เหล่านี้ แม้ว่าส่วนใหญ่จะถูกทำเหมืองจนหมดสิ้นแล้ว แต่ยังคงมีหลายจุดที่ให้ผลผลิตที่อุดมสมบูรณ์"
 d_central_spire:0 "หอคอยส่วนกลาง"
 d_central_spire_desc:0 "โครงสร้างที่สูงตระหง่านนี้ดูเหมือนจะทำหน้าที่เป็นศูนย์กลางการบริหารของดาวเคราะห์ ตำแหน่งศูนย์กลางและสภาพภายในที่ส่วนใหญ่ยังสมบูรณ์มอบโอกาสที่ไม่มีใครเทียบได้ในการวิจัยซากปรักหักพังของโลกใบนี้"
 zone_central_spire: "$d_central_spire$"
 zone_central_spire_desc: "$d_central_spire_desc$"
 d_industrial_sector:0 "ภาคอุตสาหกรรม"
 d_industrial_sector_desc:0 "ภูมิภาคนี้ทั้งหมดเคยเป็นศูนย์กลางอุตสาหกรรมของดาวเคราะห์ โรงงานและโรงกลั่นที่เคยดำเนินงานที่นี่หยุดทำงานไปนานแล้ว แต่ยังคงสามารถพบทรัพยากรจำนวนมากที่กระจัดกระจายอยู่ในพื้นที่นี้"
 d_relic_dense_ruins:0 "ซากปรักหักพังหนาแน่น"
 d_relic_dense_ruins_desc:0 "การศึกษาซากปรักหักพังหนาแน่นที่ปกคลุมดาวโบราณดวงนี้เป็นประโยชน์ต่อวงการวิทยาศาสตร์ แต่การมีอยู่ของมันก็จำกัดพื้นที่อยู่อาศัยด้วยเช่นกัน"
 d_relic_metal_boneyard:0 "$d_metal_boneyard$"
 d_relic_metal_boneyard_desc:0 "$d_metal_boneyard_desc$"
 decision_arcology_project_relic:1 "ฟื้นฟูอภิมหานคร"
 decision_arcology_project_relic_effects:0 "$decision_arcology_project_effects$"
 decision_arcology_project_relic_effects_short:0 "$decision_arcology_project_effects_short$"
 decision_arcology_project_relic_desc:0 "ดาวเคราะห์ดวงนี้เคยเป็นอภิมหานคร(หอสมุด)ที่มีชีวิตชีวา แม้ว่าจะเป็นงานที่ยิ่งใหญ่ แต่ดาวเคราะห์ก็สามารถสร้างใหม่และฟื้นฟูให้กลับมารุ่งเรืองดังเดิมได้"

 mega.201.desc:0 "หลายชั่วอายุคน ซากปรักหักพังที่หนาวเหน็บและว่างเปล่าของ [Root.GetName] ตั้งอยู่อย่างสงบนิ่ง เป็นสัญลักษณ์อันเงียบสงบของยุคทองที่สิ้นสุดลงอย่างกะทันหันเมื่อนานแสนนานมาแล้ว\n\nแต่จะไม่เป็นเช่นนั้นอีกต่อไป เมืองขนาดเท่าดาวเคราะห์ดวงนี้ได้รับการเกิดใหม่อีกครั้ง และซากปรักหักพังที่เคยทรุดโทรมเหล่านั้นกลับมามีชีวิตชีวาอีกครั้ง ในส่วนที่ทำได้ อาคารและโครงสร้างพื้นฐานเดิมได้รับการซ่อมแซมและปรับเปลี่ยนการใช้งาน ในส่วนที่ความเสียหายรุนแรงเกินไป เศษหินและซากปรักหักพังได้รับการเคลียร์ออกเพื่อหลีกทางให้กับการก่อสร้างใหม่"
 d_former_relic_world:0 "อดีตดาวโบราณ"
 d_former_relic_world_desc:0 "อภิมหานครแห่งนี้เคยเป็นดาวโบราณที่ถูกทิ้งร้าง ซากปรักหักพังโบราณส่วนใหญ่ถูกเปลี่ยนการใช้งานหรือเคลียร์ออกไปเมื่อเมืองขนาดเท่าดาวเคราะห์ถูกสร้างขึ้นใหม่ แต่ยังคงมีพื้นที่หลายแห่งที่มีคุณค่าทางวิทยาศาสตร์"

