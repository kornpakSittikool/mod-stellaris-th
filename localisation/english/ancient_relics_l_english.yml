 ancrel.10050.desc.1:0 "เราประสบความสำเร็จในการจำลองกระบวนการชะล้างที่ชาวยูทใช้เตรียมโลกสถานอนุบาลของพวกเขา\n\n$ancrel.10050.desc.2$"
 ancrel.10050.desc.1.phobe:0 "ชาวยูทมีกระบวนการที่มีประสิทธิภาพในการกำจัดสิ่งมีชีวิตต่างดาวที่เป็นศัตรูออกไปจากดาวสถานอนุบาลของพวกเขา เราได้เลียนแบบกระบวนการชะล้างดังกล่าวได้สำเร็จแล้ว\n\n$ancrel.10050.desc.2$"
 ancrel.10050.desc.2:0 "มันอาจส่งผลกระทบระยะสั้นที่น่ากังวลต่อชีวมณฑล แต่เมื่อระบบนิเวศฟื้นตัวแล้ว ดาวเคราะห์ดวงนี้ก็น่าจะเหมาะสมกับความต้องการของเรามากขึ้น"
 ancrel.10050.unlock:0 "ปลดล็อกนโยบายดาวเคราะห์: §Y$decision_yuht_cleanseplanet$§!"
 yuht_artifact_research_unlocked:0 "ปลดล็อกการดำเนินการศิลปวัตถุชั้นรอง: §Y$artifact_yuht_research$§!\n"
 decision_yuht_cleanseplanet:0 "เริ่มกระบวนการทำความสะอาด(เย้)"
 decision_yuht_cleanseplanet_desc:0 "กวาดล้างสัตว์ป่าที่เป็นศัตรูส่วนใหญ่ออกจากดาวเคราะห์อย่างรุนแรง และเมื่อธรรมชาติฟื้นตัว จะปรับเปลี่ยนชีวมณฑลให้เหมาะสมกับความต้องการของเรามากขึ้น"
 pm_yuht_cleansing:0 "การชะล้างของยูท"
 pm_yuht_cleansing_desc:0 "ดาวเคราะห์ดวงนี้ถูกชะล้างสิ่งมีชีวิตที่เป็นศัตรูส่วนใหญ่ออกไปอย่างรุนแรง"

 artifact_vultaum_research:0 "ความลับของชาววัลทูม"
 artifact_vultaum_research_desc:0 "เจาะลึกความลับของชาววัลทูม(Vultaum)"
 VULTAUM_SECRETS:0 "เจาะลึกความลับของชาววัลทูม"
 VULTAUM_SECRETS_DESC:0 "นักวิทยาศาสตร์ของเราจะกลั่นกรองข้อมูลทั้งหมดที่เราเก็บรวบรวมอย่างระมัดระวัง เพื่อผสานความรู้ของชาววัลทูมเข้ากับความรู้ของเราเอง"
 ancrel.10100:0 "$artifact_vultaum_research$"
 ancrel.10100.name:0 "$artifact_vultaum_research$"
 vultaum_artifact_research_unlocked:0 "ปลดล็อกการดำเนินการศิลปวัตถุชั้นรอง: §Y$artifact_vultaum_research$§!"
 ancrel.10100.desc:0 "แม้จะมีข้อสรุปที่ผิดพลาดอย่างร้ายแรง แต่การวิจัยของชาววัลทูมในเรื่องคอมพิวเตอร์และโลกเสมือนจริงนั้นมีความก้าวหน้าอย่างมาก และจะช่วยส่งเสริมการศึกษาของเราได้อย่างยิ่งยวด"
 ancrel.10100.desc_machine:0 "ดูเหมือนชาววัลทูมจะยอมรับแนวคิดที่ขัดต่อตรรกะอย่างสิ้นเชิงในการวิจัยของพวกเขา ทว่าการวิจัยเกี่ยวกับระบบการคำนวณและโลกเสมือนจริงของพวกเขามีความก้าวหน้าบางอย่างที่เราควรนำมาผสานเข้ากับระบบประมวลผลของเรา"
 ancrel.10100.desc_hive:0 "ชาววัลทูมหมกมุ่นอยู่กับแนวคิดเรื่องความจริงและโลกเสมือนจริง การค้นพบส่วนใหญ่ของพวกมันไม่มีประโยชน์กับเรา แต่ทว่าอย่างน้อยการวิจัยเกี่ยวกับระบบประมวลผลจะช่วยเหลืองานของเราได้"
 ancrel.10100.desc_fm:0 "ชาววัลทูมเป็นผู้เชี่ยวชาญอย่างไร้ข้อกังขาในเรื่องระบบคอมพิวเตอร์และโลกเสมือนจริง เราสามารถนำการค้นพบของพวกเขามาใช้เพื่อช่วยเหลือการวิจัยในด้านเหล่านี้ของเราได้อย่างมาก\n\nอย่างไรก็ตาม ข้อสรุปของพวกเขานั้นน่าเป็นห่วง แวบแรกดูเหมือนจะเป็นเรื่องไร้สาระที่ผิดพลาดอย่างสิ้นเชิง แต่เมื่อตรวจสอบอย่างละเอียดถี่ถ้วน ดูเหมือนจะมีเศษเสี้ยวของความจริงซ่อนอยู่\n\nหากเราต้องการเจาะลึกเพิ่มเติม เราจะต้องใช้เวลาและทรัพยากรเพิ่มขึ้น"

 artifact_vultaum_research_completed_suppressed:0 "ความลับของชาววัลทูม"
 artifact_vultaum_research_completed_suppressed_desc:0 "บันทึกของวัลทูมช่วยขยายขอบเขตความรู้ด้านระบบการคำนวณของเราอย่างมาก เราใช้สิ่งที่ได้เรียนรู้มาเพื่อสร้างโลกเสมือนจริงขึ้นมาเพื่อความเพลิดเพลินของทุกคน"
 artifact_vultaum_research_completed_public:0 "ความลึกลับของ Vultaum"
 artifact_vultaum_research_completed_public_desc:0 "หอจดหมายเหตุของวัลทูมระบุว่าพวกเราอาศัยอยู่ในโลกจำลอง เมื่อเราเข้าใจความจริงนี้แล้ว เราก็สามารถใช้ช่องโหว่บางอย่างเพื่อทำความเข้าใจว่ามันทำงานอย่างไรเพื่อนำมาใช้ประโยชน์ต่อเราได้"
 artifact_vultaum_research_completed_machine:0 "$artifact_vultaum_research_completed_suppressed$"
 artifact_vultaum_research_completed_machine_desc:0 "$ancrel.10100.desc_machine$"
 artifact_vultaum_research_completed_hive:0 "$artifact_vultaum_research_completed_suppressed$"
 artifact_vultaum_research_completed_hive_desc:0 "$ancrel.10100.desc_hive$"

 ancrel.10100.option.fm_enough:0 "เราจะนำสิ่งที่ได้เรียนรู้อยู่แล้วมาใช้ให้เกิดประโยชน์"
 ancrel.10100.option.fm_delve_deeper:0 "ขุดคุ้ยให้ลึกขึ้น เราต้องรู้ทุกสิ่งทุกอย่างที่พวกเขาได้เรียนรู้มา"

 VULTAUM_SECRETS_2:0 "เจาะลึกความลับของวัลทูมยิ่งขึ้น"
 VULTAUM_SECRETS_2_DESC:0 "เราไม่สามารถหยุดค้นหาความจริงเพียงเพราะผลลัพธ์ของมันอาจจะน่าตระหนกตกใจ ชาววัลทูมได้ค้นพบบางสิ่งที่ทำลายล้างความจริงของพวกเขา\n\nแต่พวกเราไม่เกรงกลัว"

 ancrel.10110.name:0 "$artifact_vultaum_research$"
 ancrel.10110.desc:0 "ดูเหมือนว่าข้อสมมติฐานของชาววัลทูมอาจจะถูกต้องในที่สุด\n\nเราได้ทำการจำลองการทดลองของพวกเขาและได้ข้อสรุปที่คล้ายกัน มีโอกาสปานกลางที่พวกเราในความจริงแล้วมีชีวิตอยู่ภายในโลกจำลอง\n\nเรายังมีข้อมูลไม่เพียงพอที่จะตั้งสมมติฐานว่าทำไมใครบางคนจึงสร้างสิ่งนี้ขึ้นมา แน่นอนว่าคงไม่มีใครสร้างจักรวาลที่โหดร้ายและเหน็บหนาวเช่นนี้ขึ้นมาเพียงเพื่อความสนุกสนานส่วนตัว\n\nผลกระทบจากเรื่องนี้นั้นลึกซึ้งอย่างยิ่ง และเราขอส่งต่อการตัดสินใจในขั้นต่อไปให้ขึ้นอยู่กับวิจารณญาณของคุณ"

 ancrel.10110.option.fm_suppress:0 "น่าตระหนกยิ่งนัก ปิดบังการค้นพบนี้ซะ"
 ancrel.10110.option.fm_public:0 "ประชาชนมีสิทธิ์ที่จะได้รับรู้ความจริง"
 artifact_vultaum_research_completed_public_tooltip:0 "ประชาชนรู้สึก §Rตื่นตระหนก§! จากการเปิดเผยนี้\n§Y$artifact_vultaum_research$§! จะถูกแทนที่ด้วย:"

 ancrel.10111.name:0 "ข่าวร้าย"
 ancrel.10111.desc:0 "เราเสียใจที่จะต้องแจ้งให้ทราบว่า [leading_vultaum_research_scientist.GetName] ทำใจยอมรับการตัดสินใจที่จะยุติการวิจัยเรื่องวัลทูมไม่ได้\n\nบันทึกที่พวกเขาทิ้งไว้ค่อยๆ หลุดโลกกลายเป็นการเพ้อคลั่งก่อนจะลงเอยด้วยการตัดสินใจที่จะ 'วิจัยต่อไป' ไม่นานก่อนที่จะทำการอัตวินิบาตกรรม"

 ancrel.10112.name:0 "การปลดปล่อยความเครียด"
 ancrel.10112.desc:0 "รายงานระบุว่าความเครียดจากการเป็นผู้นำการวิจัยเรื่องวัลทูมส่งผลกระทบต่อ [leading_vultaum_research_scientist.GetName]\n\nพวกเขาเริ่มมีการคิดแบบก้าวกระโดดอย่างน่าประหลาดใจซึ่งช่วยการวิจัยของเราได้อย่างมาก แต่พวกเขาก็เริ่มรักษาตัวเองด้วยสารเสพติดเพื่อเป็นกลไกในการรับมือความเครียด"

 ancrel.10113.name:0 "การค้นพบครั้งสำคัญ"
 ancrel.10113.desc:0 "รายงานระบุว่า [leading_vultaum_research_scientist.GetName] ได้รับประโยชน์อย่างมากจากโครงการวิจัย และเริ่มมีการคิดวิเคราะห์แบบก้าวกระโดดอย่างน่าทึ่งซึ่งส่งผลดีต่อการวิจัยของเราเป็นอย่างยิ่ง"

 artifact_league_research:0 "ความลับของลีกแรก"
 artifact_league_research_desc:0 "เจาะลึกความลับของกลุ่มพันธมิตรที่หนึ่งลีกแรก)"
 artifact_league_research_completed:0 "$artifact_league_research$"
 artifact_league_research_completed_desc:0 "เราได้นำความรู้โบราณของกลุ่มพันธมิตรที่หนึ่งมาใช้เพื่อประโยชน์ของเราเองแล้ว"
 LEAGUE_SECRETS:0 "เจาะลึกความลับของกลุ่มพันธมิตรรุ่นแรก"
 LEAGUE_SECRETS_DESC:0 "นักวิทยาศาสตร์ของเราจะกลั่นกรองข้อมูลทั้งหมดที่เราเก็บรวบรวมอย่างระมัดระวัง เพื่อผสานความรู้ของกลุ่มพันธมิตรรุ่นแรกเข้ากับความรู้ของเราเอง"
 ancrel.10200:0 "$artifact_league_research$"
 ancrel.10200.name:0 "$artifact_league_research$"
 ancrel.10200.desc:0 "เราประสบความสำเร็จในการบูรณาการศิลปวัตถุของกลุ่มพันธมิตรที่หนึ่งเข้ากับกระบวนการวิจัยของเรา ข้อมูลเชิงลึกเกี่ยวกับการวิจัยอุตสาหกรรมจะช่วยเหลืองานของเราอย่างมาก"
 ancrel.10200.desc.phobe:0 "กลุ่มพันธมิตรที่หนึ่งพิสูจน์ให้เห็นว่าการพึ่งพาเผ่าพันธุ์อื่นเป็นเรื่องเขลาที่นำไปสู่ความอ่อนแอและการทำลายล้างตนเอง อย่างไรก็ตาม วิธีการก่อสร้างที่ล้ำสมัยบางอย่างของพวกมันอาจมีประโยชน์อยู่บ้าง"
 league_artifact_research_unlocked:0 "ศิลปวัตถุชั้นรอง การกระทำที่ถูกปลดล็อก: §Y$artifact_league_research$§!"

 artifact_cybrex_research:0 "ความลับของไซเบรกซ์"
 artifact_cybrex_research_desc:0 "เจาะลึกความลับของไซเบรกซ์(Cybrex)"
 artifact_cybrex_research_completed:0 "$artifact_cybrex_research$"
 artifact_cybrex_research_completed_desc:0 "เราได้นำความรู้โบราณของไซเบรกซ์มาใช้เพื่อประโยชน์ของเราเองแล้ว"
 CYBREX_SECRETS:0 "เจาะลึกความลับของไซเบรกซ์"
 CYBREX_SECRETS_DESC:0 "นักวิทยาศาสตร์ของเราจะกลั่นกรองข้อมูลทั้งหมดที่เรารวบรวมไว้อย่างระมัดระวัง โดยพยายามเพิ่มความรู้เกี่ยวกับไซเบรกซ์"
 ancrel.10250:0 "$artifact_cybrex_research$"
 ancrel.10250.name:0 "$artifact_cybrex_research$"
 ancrel.10250.desc:0 "เราประสบความสำเร็จในการนำศิลปวัตถุของไซเบรกซ์มารวมเข้ากับกระบวนการวิจัยของเรา ข้อมูลเชิงลึกเกี่ยวกับวิศวกรรมสิ่งก่อสร้างขนาดมหึมาจะช่วยหนุนการศึกษาของเราอย่างยิ่งยวด"
 ancrel.10250.desc.antimachine:0 "เรื่องราวของไซเบรกซ์เป็นข้อพิสูจน์ว่าการตัดสินใจนอกกฎหมายปัญญาประดิษฐ์ของเรานั้นชาญฉลาด การค้นพบบางส่วนที่เกี่ยวข้องกับวิศวกรรมโครงสร้างยักษ์มีแนวโน้มที่จะเป็นประโยชน์ต่ออุดมการณ์ของเรา"
 cybrex_artifact_research_unlocked:0 "ศิลปวัตถุชั้นรอง การกระทำที่ถูกปลดล็อก: §Y$artifact_cybrex_research$§!"

 artifact_baol_research:0 "ความลับของชาวบาวล์"
 artifact_baol_research_desc:0 "เจาะลึกความลับของชาวบาวล์(เสียงดัง)"
 artifact_baol_research_completed:0 "$artifact_baol_research$"
 artifact_baol_research_completed_desc:0 "เราได้นำความรู้โบราณของชาวบาวล์มาประยุกต์ใช้เพื่อประโยชน์ของเราเองแล้ว"
 BAOL_SECRETS:0 "เจาะลึกความลับของลูกบอล"
 BAOL_SECRETS_DESC:0 "นักวิทยาศาสตร์ของเราจะกลั่นกรองข้อมูลทั้งหมดที่เรารวบรวมไว้อย่างระมัดระวัง โดยพยายามเพิ่มความรู้เกี่ยวกับลูกบอล"
 ancrel.10300:0 "$artifact_baol_research$"
 ancrel.10300.name:0 "$artifact_baol_research$"
 ancrel.10300.desc.terraform:0 "การศึกษาชาวบาวล์ทำให้เราได้ข้อมูลเชิงลึกใหม่ๆ เกี่ยวกับการขยายพันธุ์ของพืช และปรับปรุงกระบวนการปรับสภาพดาวเคราะห์(บรรยาย)ของเรา\n\nการเฝ้าติดตามการเปลี่ยนแปลงของชาวบาวล์ระหว่างการสูญเสียการรับรู้ทำให้เราได้เรียนรู้มากมายเกี่ยวกับกระบวนการยกระดับวิวัฒนาการลิฟท์)แต่พวกเราได้เชี่ยวชาญเทคโนโลยีนั้นเรียบร้อยแล้ว"
 ancrel.10300.desc.uplift:0 "การเฝ้าติดตามการเปลี่ยนแปลงของชาวบาวล์ในช่วงที่สูญเสียการรับรู้ทำให้เราได้รับความรู้มากมายเกี่ยวกับวิธีการย้อนกลับกระบวนการนั้น\n\nนอกจากนี้เรายังได้รับข้อมูลเชิงลึกใหม่ๆ เกี่ยวกับการกระจายของพืชและปรับปรุงกระบวนการปรับสภาพดาวเคราะห์ของเราอีกด้วย"
 baol_artifact_research_unlocked:0 "ปลดล็อกการดำเนินการใหม่ของศิลปวัตถุชั้นรอง: §Y$artifact_baol_research$§!"

