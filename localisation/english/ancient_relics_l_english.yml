 site_hidden_lab_intro:0 "เครื่องสแกนตรวจพบอาคารซับซ้อนที่ซ่อนอยู่ซึ่งฝังอยู่ใต้ธารน้ำแข็งและหิมะของ [From.Planet.GetName] เครือข่ายอุโมงค์ขนาดใหญ่ที่พังทลายบางส่วนหรือถูกปิดกั้นดูเหมือนจะเชื่อมต่อโครงสร้างใต้ดินต่างๆ เข้าด้วยกัน"
 ancrel.7001.name:0 "การเปิดเผยแหล่งขุดค้น"
 ancrel.7001.desc:0 "สภาพภูมิอากาศที่เย็นจัดของ [From.Planet.GetName] ได้ปกคลุมแหล่งขุดค้นนี้ด้วยชั้นน้ำแข็งและหิมะที่หนาเตอะ ทำเลที่ตั้งที่ห่างไกลความเจริญของแหล่งขุดค้นนี้อาจเป็นเครื่องบ่งชี้ถึงความจำเป็นในการปกปิดข้อมูล ไม่ว่าอะไรจะเกิดขึ้นที่นี่ มีใครบางคนต้องการเก็บมันไว้เป็นความลับ"
 ancrel.7002.name:0 "การเคลียร์อุโมงค์"
 ancrel.7002.desc:0 "อาคารซับซ้อนนี้ประกอบด้วยโครงสร้างใต้ดินขนาดใหญ่หลายแห่งที่เชื่อมต่อกันด้วยเครือข่ายอุโมงค์ ซึ่งหลายอุโมงค์ถล่มลงมาหรือถูกปิดกั้นด้วยน้ำแข็ง แม้ว่าจะเก่าแก่ แต่อุโมงค์บางแห่งแสดงร่องรอยของการถูกไฟไหม้อย่างชัดเจน ความเสียหายที่เกิดจากไฟไหม้นั้นรุนแรงพอที่จะบ่งชี้ถึงเหตุการณ์ภัยพิบัติ หรือบางทีอาจเป็นการจงใจทำลายล้าง สิ่งหนึ่งที่แน่นอนคือ จุดประสงค์ของแหล่งขุดค้นนี้ดูเหมือนจะเป็นทางวิทยาศาสตร์"
 ancrel.7004.name:0 "ห้องปฏิบัติการทางชีววิทยาโบราณ"
 ancrel.7004.desc:0 "การสืบสวนเพิ่มเติมเผยให้เห็นว่าจุดประสงค์หลักของแหล่งขุดค้นนี้ดูเหมือนจะเป็นการวิจัยและพัฒนาสารชีวภาพ อาคารซับซ้อนทั้งหมดดูเหมือนจะถูกชะล้างด้วยไฟ อาจเป็นผลมาจากการปล่อยสารชีวภาพที่พัฒนาขึ้นที่นี่โดยไม่ได้ตั้งใจ ด้วยการศึกษาโบราณวัตถุที่ยังคงหลงเหลืออยู่อย่างระมัดระวังและพิถีพิถี อาจพบเบาะแสบางประการ"
 ancrel.7005.name:0 "ห้องปฏิบัติการอาวุธโบราณ"
 ancrel.7005.desc:0 "การสืบสวนเพิ่มเติมเผยให้เห็นว่าจุดประสงค์หลักของแหล่งขุดค้นนี้ดูเหมือนจะเป็นการวิจัยและพัฒนาอาวุวพลังงานขั้นสูง อุบัติเหตุดูเหมือนจะกระตุ้นให้เกิดการระเบิดครั้งรุนแรง ซึ่งทำลายล้างพื้นที่ส่วนใหญ่ของแหล่งขุดค้น ศูนย์ข้อมูลแห่งหนึ่งดูเหมือนจะอยู่ในสภาพค่อนข้างดี บางทีข้อมูลในนั้นอาจจะมอบข้อมูลเชิงลึกที่เป็นประโยชน์บ้าง?"
 ancrel.7006.name:0 "คำแนะนำจากกระแสจิต"
 ancrel.7006.1.desc:1 "เมื่อเราสัมผัสกับศิลาจิตวิญญาณ เราจะถูกฉายภาพเข้าสู่พิภพเล็กๆ ของเดอะชราวด์ เราตระหนักได้ว่าเราไม่ได้อยู่ตามลำพังในดินแดนสนธยาที่หมุนวนนี้ มีสิ่งมีชีวิตหนึ่งที่รอคอยเราอยู่ ซึ่งเก่าแก่อย่างหาที่เปรียบไม่ได้ ผู้รักษาความลับ $relic_zro_entity_name$ เราทราบได้โดยสัญชาตญาณ\n\nหลังจากผ่านการทดสอบในการติดต่อสื่อสารกับมันแล้ว สิ่งมีชีวิตนั้นก็รอคอยคำถามของเรา"
 ancrel.7006.2.desc:1 "ศิลาจิตวิญญาณที่เต้นเป็นจังหวะด้วยแสงสว่างภายใน ดูเหมือนจะกวักมือเรียกอย่างไร้เสียง เราสัมผัสมัน และจิตใจของเราก็ถูกดึงเข้าสู่มิติย่อยของเดอะชราวด์ ที่ซึ่งสิ่งมีชีวิตลึกลับที่เรียกว่า $relic_zro_entity_name$ รอคอยอยู่\n\nมันรู้ในสิ่งที่ไม่มีสิ่งมีชีวิตที่ต้องตายคนใดสามารถรู้ได้ และดูเหมือนจะเต็มใจแบ่งปันความลับของมันในตอนนี้ที่เราได้มาถึงวิหารศักดิ์สิทธิ์ของมันแล้ว"
 ancrel.7006.3.desc:1 "บางสิ่งรอคอยเราอยู่ภายในศิลาจิตวิญญาณ $relic_zro_entity_name$ มันรอคอยเราอยู่ตั้งแต่ก่อนที่เราจะมีชีวิตอยู่เสียอีก\n\nการสัมผัสศิลานำทางเราเข้าสู่สถานที่ที่ไม่มีตัวตนซึ่งมันอาศัยอยู่ โดดเดี่ยวมานานหลายยุคหลายสมัยด้วยความคิดของตัวเองเท่านั้น สิ่งมีชีวิตนี้ดูเหมือนจะกระตือรือร้นที่จะตอบคำถามของเราโดยใช้ภูมิปัญญาอันลึกลับทั้งหมดของมัน แม้ว่ามันจะทำเช่นนี้เพื่อช่วยเหลือ หรือเพียงเพื่อความสนุกสนานส่วนตัวก็ตาม ยังคงเป็นเรื่องลึกลับ"
 ancrel.7006.a:0 "ขอให้ $relic_zro_entity_name$ แบ่งปันข้อมูลเชิงลึก"
 ancrel.7006.b:0 "ถาม $relic_zro_entity_name$ เรื่องการรบ"
 ancrel.7006.c:0 "ถาม $relic_zro_entity_name$ เรื่องเกี่ยวกับรัฐ"
 ancrel.7007.name:0 "$r_galaxy$"
 ancrel.7007.desc:1 "เวลาไหลเร็วขึ้นภายในดาราจักรจำลองขนาดเล็ก และด้วยการสังเกตการณ์ผู้อยู่อาศัยในนั้นอย่างระมัดระวัง เราจะสามารถเรียนรู้ได้มากมายเมื่อพูดถึงเทคโนโลยีขั้นสูง"

