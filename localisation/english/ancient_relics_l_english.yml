 archaeostudies:0 "การศึกษาโบราณคดี"
 archaeostudies_desc:0 "อดีตเก็บงำความลับทางเทคโนโลยีที่เฝ้ารอการเปิดเผย"
 tech_archaeostudies:0 "การศึกษาโบราณคดี"
 tech_archaeostudies_desc:0 "สาขาการศึกษาใหม่นี้มุ่งเน้นไปที่การประยุกต์ใช้งานได้จริงของศิลปวัตถุโบราณ เราห่างไกลจากการเป็นอารยธรรมกาแล็กซีแรกที่เหยียบดวงดาวเหล่านี้ ด้วยการทำงานเพียงเล็กน้อย มรดกของพวกเขาจะช่วยรักษาอนาคตของเราได้"

 tech_secrets_cybrex:0 "ศูนย์กลางการขุดเหมือง(Cybrex)"
 tech_secrets_cybrex_desc: "ในการสร้างโลกวงแหวน ไซเบรกซ์พึ่งพาโดรนทำเหมืองที่มีประสิทธิภาพสูงเพื่อสำรวจและเก็บเกี่ยวทรัพยากรในวงโคจร ชิปหน่วยความจำและเซ็นเซอร์ที่ผลิตโดยไซเบรกซ์สามารถเพิ่มประสิทธิภาพการทำเหมืองของเราได้ เพื่อให้เราสามารถนำอัลกอริทึมอายุนับพันปีของพวกเขามาใช้ประโยชน์ได้เป็นอย่างดี"
 tech_secrets_league:0 "สำนักงานจัดเก็บเอกสารลีกแรก)"
 tech_secrets_league_desc:0 "จักรวรรดิที่กว้างขวางของกลุ่มพันธมิตรที่หนึ่งทำให้เราดูเล็กไปเลยเมื่อเทียบในช่วงรุ่งเรืองของพวกเขา และพึ่งพาระบบราชการที่เข้มงวดเพื่อขับเคลื่อนกลไกของรัฐให้ดำเนินต่อไป แผงจัดเก็บเอกสารควอนตัมที่พวกเขาใช้ช่วยมอบประสิทธิภาพในการคัดแยกและจัดเก็บเอกสารอย่างที่ไม่เคยมีมาก่อน"
 tech_secrets_irassian:0 "อู่ต่อยาน(อิตาลี)"
 tech_secrets_irassian_desc:0 "ประเพณีการเดินเรือของชาวไอราสเซียนไม่มีใครเทียบได้ในยุคของพวกเขา อู่ต่อเรือของพวกเขาผลิตยานอย่างต่อเนื่องสำหรับกองทัพเรือและกองเรือพาณิชย์ของพวกเขา ซึ่งในที่สุดจะนำไปสู่ความล่มสลายของพวกเขา ด้วยยานจำนวนมากและต้องพึ่งพาพวกมันอย่างสูง ชาวไอราสเซียนจึงไม่มีอำนาจในการกักกันโรคระบาดที่จะคร่าจักรวรรดิของพวกเขา"
 tech_secrets_vultaum:0 "คอมพิวเตอร์แห่งความเป็นจริง(Vultaum)"
 tech_secrets_vultaum_desc:0 "คอมพิวเตอร์แห่งความเป็นจริงของชาววัลทูมเป็นหน่วยประมวลผลที่มีเอกลักษณ์เฉพาะตัว อุทิศตนเพื่อวิเคราะห์การดำรงอยู่ของชีวิต ไม่ใช่ผ่านฟิสิกส์ แต่เป็นการพยายามทำวิศวกรรมย้อนกลับซอร์สโค้ดของความเป็นจริงและค้นหาความผิดพลาดที่จะช่วยให้ชาววัลทูมโค่นล้มระบบจำลองที่พวกเขาเชื่อว่าตนเองอาศัยอยู่ได้ในที่สุด"
 tech_secrets_yuht:0 "เครื่องมือตรวจจับคลื่นในอวกาศ(เย้)"
 tech_secrets_yuht_desc:0 "ชาวยูทเป็นสังคมที่ขัดแย้งในตัวเอง พวกเขาหมกมุ่นอยู่กับแนวคิดในการค้นหาสิ่งมีชีวิตที่มีภูมิปัญญาอื่นๆ แต่กลับปฏิเสธที่จะยอมรับว่าพวกเขายไม่ได้อยู่ตัวคนเดียว พวกเขามุ่งเน้นไปที่การพิสูจน์หักล้างข้ออ้างเรื่องชีวิตต่างดาวจนอคตินั้นพบทางเข้าไปสู่เทคโนโลยีของพวกเขา อย่างไรก็ตาม ด้วยการดัดแปลงและปรับเทียบที่เหมาะสม เราสามารถแก้ไขเสาอากาศตรวจจับที่ทรงพลังของพวกเขาได้อย่างแน่นอน"
 tech_secrets_baol:0 "พืชมีชีวิต(เสียงดัง)"
 tech_secrets_baol_desc:0 "สิ่งมีชีวิตบาวล์มีวิธีผลิตเครื่องมือที่เป็นเอกลักษณ์ เนื่องจากความเชื่องช้าของสายพันธุ์ พวกเขาจะเพียงแค่เพาะมันขึ้นมาจากสสารอินทรีย์ในสถานที่ที่กึ่งสวนกึ่งโรงงาน ด้วยการปรับเปลี่ยนทางพันธุกรรมที่เหมาะสม เราก็สามารถปลูกสินค้าและเครื่องมือต่างๆ ควบคู่ไปกับพืชผลปกติของเราได้เช่นกัน"
 tech_secrets_zroni:0 "สตอร์มแคสเตอร์(Zroni)"
 tech_secrets_zroni_desc:0 "ซโรเป็นองค์ประกอบที่น่าดึงดูดใจ มีแนวโน้มที่จะเกิดพลังงานระเบิดอย่างปั่นป่วน เราเชื่อว่าด้วยศิลปวัตถุที่เหมาะสม เราสามารถใช้มันเพื่อเป็นเชื้อเพลิงให้กับพายุอวกาศเหนือระบบดาวทั้งหมดได้"

 tech_archaeoshield:0 "สนามพลังหยุดความเสียหายชั่วคราวโบราณ"
 tech_archaeoshield_desc:0 "ฉายภาพได้ไกลกว่าโล่พลังงานปกติ เทคโนโลยีสนามแขวนลอยนี้ใช้ศิลปวัตถุโบราณเพื่อชะลอเวลาตรงจุดปะทะ เพื่อให้โล่พลังงานมีโอกาสมากขึ้นในการกระจายพลังงานของการโจมตีที่เข้ามา"
 tech_archaeoarmor:0 "เกราะพัลส์โบราณ"
 tech_archaeoarmor_desc:0 "แผ่นเกราะไอออนสามารถรับประจุไฟฟ้าเพื่อบรรเทาพลังของการปะทะ โดยใช้หลักการผลักแม่เหล็กและการฉายสนามพลัง"
 tech_archaeo_detection_scrambler:0 "เครื่องส่งสัญญาณรบกวนเป้าหมายโบราณ"
 tech_archaeo_detection_scrambler_desc:0 "เครื่องทำซ้ำสัญญาณปิงและอุปกรณ์กระจายแสงที่มีความยาวคลื่นที่เหมาะสมสามารถสร้างการรบกวนที่ทำลายล้างและกวนระบบเล็งเป้าหมายของศัตรูได้อย่างมีประสิทธิภาพ"
 TECH_UNLOCK_SCRAMBLER_TITLE:0 "$TECH_UNLOCK_COMPONENT_LINE$ $tech_archaeo_detection_scrambler$"
 TECH_UNLOCK_SCRAMBLER_DESC:0 "$tech_archaeo_detection_scrambler_desc$"
 tech_archaeo_rampart:0 "ป้อมป้องกันโบราณ"
 tech_archaeo_rampart_desc:0 "แพลตฟอร์มป้องกันเป็นวิธีที่คุ้มค่าในการรับรองความปลอดภัยของเรา แต่พวกเขาจำเป็นต้องได้รับการเฝ้าติดตามจากศูนย์ปฏิบัติการ การเสริมความแข็งแกร่งให้กับสถานีดาราของเราเพื่อให้แน่ใจว่าจะมีชีวิตรอดในกรณีที่เกิดการโจมตี และการเพิ่มขีดความสามารถสูงสุดของเราในการสร้างเครือข่ายการป้องกันวงโคจรที่เป็นอิสระจะช่วยให้เรามีเวลามากขึ้นในการส่งกำลังบำรุงเสริม"
 tech_archaeo_titan_beam:0 "ลำแสงหายนะโบราณ"
 tech_archaeo_titan_beam_desc:0 "พลังทำลายล้างระยะปานกลางที่มหาศาลจะช่วยให้ยานไททันของเราสามารถเจาะทะลวงแนวรบของศัตรูได้ ปืนใหญ่โบราณเหล่านี้เคยเป็นรากฐานที่ใช้สร้างจักรวรรดิกาแล็กซีขึ้นมา"
 tech_archaeo_overcharger:0 "โล่พลังงานโอเวอร์ชาร์จโบราณ"
 tech_archaeo_overcharger_desc:0 "การชาร์จโล่พลังงานมากเกินไปสามารถทำได้อย่างปลอดภัยด้วยคอยล์ปรับเสถียรและตัวลดแรงสั่นสะเทือนโบราณ นอกเหนือจากการสร้างสนามพลังที่แข็งแกร่งขึ้นแล้ว สิ่งนี้ยังมีประโยชน์เพิ่มเติมในการสลายขีปนาวุธบางชนิดที่พุ่งเข้ามาอีกด้วย"
 tech_archaeo_refinery:0 "โรงกลั่นโบราณ"
 tech_archaeo_refinery_desc:0 "อุปกรณ์ประมวลผลอายุนับพันปีนี้มีอัตราประสิทธิภาพสูงกว่า 100% การทำงานของมันยังคงเป็นเรื่องลึกลับสำหรับเรา แต่ผลตอบแทนการผลิตของมันนั้นมีค่ามาก"
 tech_archaeo_pk_devolving_beam:0 "คลื่นล้างความทรงจำ"
 tech_archaeo_pk_devolving_beam_desc:0 "ปืนใหญ่ล้างสมองขนาดมหึมาที่ปลดปล่อยคลื่นพลังงานไปทั่วทั้งดาวเคราะห์ ส่งผลให้สิ่งมีชีวิตมีภูมิปัญญาส่วนใหญ่กลับคืนสู่สภาพก่อนมีภูมิปัญญา เราคาดการณ์ว่าด้วยการปรับแต่งเพิ่มเติม มันยังอาจใช้ล้างข้อมูลในคลังหน่วยความจำและปิดใช้งานยูนิตหุ่นยนต์ได้เช่นกัน"
 is_ai_world_no_archaeoengineers: "§R$TRIGGER_FAIL$โลก AI ต้องการสิทธิประโยชน์การขึ้นสู่สวรรค์ $ap_archaeoengineers$ เพื่อตกเป็นเป้าหมายของ $tech_archaeo_pk_devolving_beam$§!"
 tech_archaeo_mass_drivers:0 "ป้อมปืนใหญ่โบราณ"
 tech_archaeo_mass_drivers_desc:0 "ปืนใหญ่ขนาดมหึมาเหล่านี้ยิงขีปนาวุธที่ค่อนข้างช้าแต่สร้างความเสียหายอย่างมหาศาล และสามารถยิงได้แทบทุกอย่าง ตั้งแต่เศษเหล็กไปจนถึงเศษอุกกาบาต"
 tech_archaeo_lasers:0 "เลเซอร์กัดกร่อนเนื้อโลหะโบราณ"
 tech_archaeo_lasers_desc:0 "อาวุธพลังงานสูงนี้ทำให้เกิดการยุบตัวเล็กน้อยอย่างรุนแรงเมื่อปะทะ สร้างความร้อนและแรงมหาศาลภายในเกราะของเป้าหมาย"
 tech_archaeo_point_defence:0 "ปืนป้องกันมิสไซล์โบราณ"
 tech_archaeo_point_defence_desc:0 "เมื่อพูดถึงการติดตามและยิงขีปนาวุธให้ตก แบตเตอรี่โบราณเหล่านี้ถือเป็นที่สุดของที่สุด โดยใช้อัลกอริทึมคาดการณ์ที่เขียนขึ้นในโค้ดที่ถูกลืมเลือนไปนานเพื่อสร้างเครือข่ายป้องกันด้วยเปลวไฟ"
 tech_archaeo_missiles:0 "เครื่องยิงมิสไซล์นาโนโบราณ"
 tech_archaeo_missiles_desc:0 "ประจุไฟฟ้าอนุภาคที่ได้รับการปรับเสถียรด้วยเทคโนโลยีโบราณ ช่วยให้เราสามารถสร้างฝูงขีปนาวุธขนาดเล็กที่ยังคงบรรจุหัวรบที่น่าเกรงขาม และควรจะสามารถเอาชนะระบบป้องกันจุดส่วนใหญ่ได้"
 tech_archaeo_mass_accelerator:0 "ปืนใหญ่เจาะโล่พลังงานโบราณ"
 tech_archaeo_mass_accelerator_desc:0 "ปืนใหญ่นี้ยิงกระสุนทรงกลมไอออนโบราณขนาดเล็กจำนวนมากที่สะสมประจุเมื่อสัมผัสกับสนามพลังส่วนใหญ่ ทำให้มีความสามารถเจาะทะลวงโล่พลังงานได้สูง ทฤษฎีที่ว่าทรงกลมเหล่านี้สามารถใช้สำหรับทำเครื่องประดับได้ถูกปัดตกไปเมื่อเกิดเหตุการณ์ร้ายแรงที่หลอมละลายห้องปฏิบัติการทั้งหมด"
 tech_archaeo_strike_crafts:0 "โดรนขุดเจาะโบราณ"
 tech_archaeo_strike_crafts_desc:0 "โดรนความเร็วสูงเหล่านี้ได้รับการติดตั้งเลเซอร์ทำเหมืองโบราณที่แทบจะมองข้ามแผ่นเกราะป้องกันเป้าหมาย เทคโนโลยีที่ดีเกินกว่าจะเสียเปล่าไปกับการทำเหมืองอวกาศ"


