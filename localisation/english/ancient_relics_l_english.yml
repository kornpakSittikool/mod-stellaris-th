 Herald_repair_DESC:0 "แม้ว่าแกรนด์เฮรัลด์จะเป็นยานที่ทรงพลังอย่างไม่ต้องสงสัย แต่ก็ไม่ได้ทำงานอย่างเต็มประสิทธิภาพ การขาดการบำรุงรักษา ความเสียหายเล็กน้อยที่สะสมมา และข้อเท็จจริงที่ว่าเราไม่เข้าใจมันอย่างถ่องแท้ ล้วนทำให้ความสามารถในการรบของมันลดลง มีเพียงการปรับปรุงระบบทั้งหมดอย่างเต็มรูปแบบและความเข้าใจอย่างสมบูรณ์เกี่ยวกับยานลำนี้เท่านั้นที่จะช่วยฟื้นฟูมันกลับมาสู่สถานะการทำงานอย่างเต็มรูปแบบ"
