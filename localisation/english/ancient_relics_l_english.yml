 sm_zroni_storm_caster:0 "$tech_secrets_zroni$"
 sm_zroni_storm_caster_desc:0 "เครื่องสร้างพายุไม่ใช่เทคโนโลยีของซโรนีโดยตรง เราเพียงตระหนักได้ว่าการนำซโรไปสัมผัสกับสภาวะสุดขั้วอาจทำให้มันปล่อยพลังงานศักย์ออกมาอย่างไม่แน่นอน ส่งผลให้เกิดการรบกวนและปรากฏการณ์ที่เป็นอันตรายทุกรูปแบบ หลังจากเกิดเหตุการณ์ที่เป็นประโยชน์หลายครั้ง เราได้ค้นพบวิธีใช้ประโยชน์จากพลังงานนี้ผ่านคริสตัลที่สร้างโดยซโรนีเพื่อผลิตพายุพลังจิตที่ทรงพลังในระบบสุริยะ\n"
 sm_zroni_storm_caster_desc_modifier:0 "[Root.GetZroniStormCasterEffect]"
 zroni_storm_caster_desc:0 "สร้าง §Yพายุประดิษฐ์§! ในระบบดาว:\nปิดกั้น §Yเซ็นเซอร์§!\nลด §Yความเร็วยาน§! และ §Yอัตราการยิง§!\nลบล้างพลังป้องกันจาก §Yเกราะ§!\nปรับปรุงประสิทธิภาพของ §Yโล่พลังงาน§!"
 improved_zroni_storm_caster_desc:0 "สร้าง §Yพายุประดิษฐ์§! ในระบบดาว:\nปิดกั้น §Yเซ็นเซอร์§!\nลด §Yความเร็วยาน§! และ §Yอัตราการยิง§!\nลบล้างพลังป้องกันจาก §Yเกราะ§!\nปรับปรุงประสิทธิภาพของ §Yโล่พลังงาน§!\nสร้างความเสียหายแก่ §Yยานฝ่ายอริ§! ในระบบดาวอย่างต่อเนื่อง"

