 r_galatron_desc:0 "$galatron_modifier_desc$"
 r_surveyor:0 "ผู้สำรวจ"
 r_surveyor_desc:0 "เครื่องมือสแกนที่ทรงพลังอย่างยิ่งซึ่งใช้เทคโนโลยีที่ไม่สามารถลอกเลียนแบบได้ ต้นกำเนิดของมันถูกปกคลุมไปด้วยความลึกลับ - ดูเหมือนไม่ได้ถูกสร้างขึ้นโดยโดรนขุดเหมืองซึ่งครอบครองมันเป็นกลุ่มล่าสุด"
 #r_orb_insight:0 "Orb of Insight"
 #r_orb_insight_desc:0 ""
 r_galaxy:0 "ดาราจักรจำลอง"
 r_galaxy_desc:0 "ดาราจักรจำลองขนาดเล็กนี้ถูกสร้างขึ้นโดยอารยธรรมที่รู้จักกันในชื่อ \"ฝ่ายคู่สงครามซีเท่านั้น ซึ่งจากนั้นพวกเขาก็ใช้มันเพื่อหลบหนีจากขอบเขตของโลกบ้านเกิดที่ถูกกักขัง\n\nดาราจักรนี้ถูกบรรจุอยู่ภายในสนามย่อยอวกาศที่ไม่มีสิ่งใดผ่านเข้าไปได้ภายในตู้เก็บของมัน แต่กิจกรรมของผู้อยู่อาศัยในนั้นยังคงสามารถสังเกตการณ์ได้ในระดับหนึ่ง"
 r_prethoryn_queen:0 "นางพญาฝูงพรีธอริน"
 r_prethoryn_queen_desc:1 "นางพญาฝูงพรีธอรินที่ถูกจับกุมนี้ได้รับการทำให้สงบลงผ่านการใช้เครื่องส่งสัญญาณประสาท มันสามารถใช้เพื่อเพาะพันธุ์กองยานพรีธอรินขนาดใหญ่ได้"
 r_unbidden_warlock:0 "ผู้วิเศษต่างมิติ"
 r_unbidden_warlock_desc:0 "พลังงานพลังจิตของสิ่งมีชีวิตต่างมิติที่ถูกจับกุมนี้ช่วยรักษาประตูมิติระหว่างอาณาจักรของพวกเขากับอาณาจักรของเรา ก่อนที่ประตูมิตินั้นจะถูกทำลายลง\n\nในขณะนี้ที่เป็นเชลยของเรา สิ่งมีชีวิตตนนี้ถูกบังคับให้ใช้พลังของมันเพื่อเพิ่มความเร็วต่ำกว่าแสงของยานเรา รวมถึงระยะของจัมป์ไดรฟ์ของเราด้วย"
 r_contingency_core:0 "แกนคอนทิงเจนซีที่แยกตัว"
 r_contingency_core_desc:0 "แกนหลักคอนทิงเจนซีที่แยกตัวออกมาระบบหนึ่งซึ่งได้รับการกู้คืนมาจากซากปรักหักพังของโลกเครื่องจักรแห่งสุดท้ายของพวกเขา มันสามารถเร่งกระบวนการสร้างหุ่นยนต์และสิ่งก่อสร้างขนาดมหึมาได้อย่างมาก"
 relic_contingecy_core:0 "อนุญาตให้ก่อสร้างสิ่งก่อสร้างขนาดมหึมาเพิ่มขึ้นอีก §G1§! แห่งสำหรับแต่ละประเภท"
 r_zro_crystal:2 "หอจดหมายเหตุพลังจิต"
 r_zro_crystal_desc:1 "หอจดหมายเหตุคริสตัลพลังจิตซโร ซึ่งบรรจุแก่นแท้ของ §Y$relic_zro_entity_name$§! ในบางโอกาสสามารถปรึกษาเพื่อรับคำแนะนำได้"
 r_severed_head:0 "ศีรษะของซาร์คลาน"
 r_severed_head_desc:1 "บทคัดย่อ, สัญลักษณ์แห่งการสักการะ (ฉบับพิมพ์ครั้งที่ 102):\n\nซาร์คลาน(ซาร์-กลันน์)\nบุคคลศักดิ์สิทธิ์ที่มีชื่อเสียงจากสายพันธุ์ที่ไม่สามารถระบุได้ ได้รับการเคารพสักการะในฐานะผู้เผยพระวจนะศักดิ์สิทธิ์โดยศาสนาในกาแล็กซีที่แตกต่างกันอย่างน้อยเจ็ดศาสนาในช่วงยุคไร้กษัตริย์กาแล็กซีครั้งที่สี่ (รอบที่ 32 ของคาวาบ) ชะตากรรมสุดท้ายไม่เป็นที่ทราบแน่ชัด แต่การอ้างอิงในบันทึกประวัติศาสตร์ยุติลงหลังจากรอบที่ 38 ข้อเท็จจริงทางประวัติศาสตร์ได้รับการถกเถียงอย่างหนักตั้งแต่รอบที่ 41 (ช่วงต้น) เป็นอย่างน้อย; ปัจจุบันถูกปฏิเสธโดยหลายคนว่าเป็นเพียงนิทานปรัมปราหรือตำนาน"
 r_severed_head_passive:0 "อนุญาตให้ตั้งถิ่นฐานบน §Yโลกศักดิ์สิทธิ์§! ได้"
 r_ancient_sword:0 "ดาบของพรานหญิง"
 r_ancient_sword_desc:1 "อาวุธโบราณและได้รับการเก็บรักษาไว้อย่างดีซึ่งตีขึ้นจากวัสดุที่ไม่รู้จัก มันสั่นสะเทือนเล็กน้อยด้วยพลังพลังจิตที่แทบจะกักเก็บไว้ไม่อยู่"
 r_reality_perforator:0 "เครื่องเจาะความจริงวัลทูม"
 r_reality_perforator_desc:0 "ลูกทรงกลมที่หนาแน่นและหนักอย่างเหลือเชื่อซึ่งประกอบขึ้นจากวัสดุที่ไม่รู้จัก ชาววัลทูมอ้างว่าอุปกรณ์นี้สามารถสร้างความไม่มั่นคงชั่วคราวให้กับโลกจำลองที่พวกเขาเชื่อว่าตนเองถูกกักขังอยู่ภายใน ทำให้มองเห็นโลกแห่งความเป็นจริงได้แวบหนึ่ง\n\nไม่ว่าจะเป็นจริงหรือไม่ เมื่อเปิดใช้งาน ลูกทรงกลมจะทำให้สามารถปรับเปลี่ยนแง่มุมเล็กๆ น้อยๆ ของความเป็นจริงในฟองสบู่นอกพื้นที่ได้ เอฟเฟกต์นี้คงอยู่เพียงช่วงเวลาสั้นๆ เนื่องจากจักรวาลดูเหมือนจะแก้ไขตัวเองให้ถูกต้องอย่างรวดเร็วอีกครั้ง แต่หากจับเวลาได้ถูกต้อง มันจะช่วยมอบความได้เปรียบในการตัดสินแพ้ชนะให้แก่กองยานของเรา"
 r_pox_sample:0 "ตัวอย่างโรคระบาดจาโวเรียน"
 r_pox_sample_desc:0 "ตัวอย่างของโรคระบาดจาโวเรียนที่น่าสะพรึงกลัวซึ่งได้ทำลายล้างเผ่าพันธุ์ไอราสเซียน แม้ว่าจะเป็นอันตรายต่อสิ่งมีชีวิตส่วนใหญ่อื่นๆ ไวรัสที่ทำให้เกิดโรคนี้มีคุณสมบัติทางพันธุกรรมที่เป็นเอกลักษณ์หลายประการ ซึ่งบางประการสามารถช่วยยืดอายุขัยในสิ่งมีชีวิตอินทรีย์ส่วนใหญ่ได้จริง\n\nไวรัสนี้ยังสามารถนำไปใช้เพื่อสร้างสายพันธุ์ใหม่ของโรคระบาดจาโวเรียนที่สามารถแพร่เชื้อสู่ผู้ที่ไม่ใช่ชาวไอราสเซียนได้ แม้ว่าจะไม่แพร่กระจายเร็วหรือเป็นอันตรายถึงชีวิตเหมือนกับที่โรคดั้งเดิมเคยเป็นต่อชาวไอราสเซียน แต่มันก็ยังคงเป็นอาวุธชีวภาพที่มีอานุภาพสูง"
 r_cryo_core:0 "แกนแช่แข็งยูท"
 r_cryo_core_desc:0 "เนื่องจากชาวยูทไม่เคยค้นพบการมีอยู่ของไฮเปอร์สเปซ พวกเขาจึงต้องพึ่งพาอายุขัยที่ยาวนานและเทคโนโลยีการแช่แข็งร่างกายเพื่อเดินทางระหว่างดวงดาว แกนแช่แข็งต้นแบบนี้ถูกสร้างขึ้นโดยนักวิทยาศาสตร์ชาวยูทไม่นานก่อนที่จักรวรรดิของพวกเขาจะล่มสลายลงให้กับชาวจาบักซ์ตี\n\nสนามแช่แข็งที่สร้างขึ้นโดยแกนนี้ก้าวล้ำเกินกว่าระดับเทคโนโลยีในปัจจุบันของเราไปไกลมาก"
 r_cryo_core_effect:0 "อาณานิคมใหม่เริ่มต้นด้วย £pop£ §Hประชากร§! เพิ่มเติม §G100§! หน่วย"

 r_war_forge:0 "โรงหล่อสงครามไซเบรกซ์"
 r_war_forge_desc:1 "โรงหล่อสงครามขนาดค่อนข้างเล็กและพกพาได้ ซึ่งเป็นชิ้นสุดท้ายในประเภทนี้ในจักรวาล มันเป็นวัตถุโบราณจากยุคสมัยที่ไซเบรกซ์ทำสงครามกับกาแล็กซี ก่อนที่ "การปรับเปลี่ยน" ของพวกเขาจะทำให้พวกเขาเปลี่ยนแนวทางปฏิบัติ\n\nความสามารถของโรงหล่อในการผลิตยานรบได้รับการปิดใช้งานอย่างถาวรโดยไซเบรกซ์ แต่ยังคงมีความสามารถในการแปลงแร่ธาตุจำนวนมหาศาลให้กลายเป็นโลหะผสมได้"

 cybrex_warform:0 "ร่างสงครามไซเบรกซ์"
 cybrex_warform_desc:0 "หุ่นยนต์ขนาดยักษ์ตัวนี้สูงตระหง่านเหนือสิ่งก่อสร้างส่วนใหญ่ พร้อมด้วยอำนาจการทำลายล้างที่สามารถทำลายเมืองต่างๆ ได้"
 relic_cybrex_passive:0 "อนุญาตให้สร้างกองทัพ §Y$cybrex_warform$§! ที่ดาวศูนย์กลางจักรวรรดิคุณได้"
