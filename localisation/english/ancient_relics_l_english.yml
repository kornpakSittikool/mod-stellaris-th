 add_research_options_galactic_wonders_utopia:0 "ตัวเลือกการวิจัยที่ได้รับ:\n£engineering_research£§Y$tech_ring_world$§!\n£physics_research£§Y$tech_dyson_sphere$§!\nโลกวงแหวนและทรงกลมไดสัน ต่างก็เป็นสิ่งก่อสร้างขนาดมหึมาที่ทรงพลังอย่างเหลือเชื่อ"
 add_research_options_galactic_wonders_utopia_megacorp:0 "ตัวเลือกการวิจัยที่ได้รับ:\n£engineering_research£§Y$tech_ring_world$§!\n£physics_research£§Y$tech_matter_decompressor$§!\n£physics_research£§Y$tech_dyson_sphere$§!\nโลกวงแหวน,เครื่องดึงมวลสารจากหลุมดำและทรงกลมไดสัน ต่างก็เป็นสิ่งก่อสร้างขนาดมหึมาที่ทรงพลังอย่างเหลือเชื่อ"

