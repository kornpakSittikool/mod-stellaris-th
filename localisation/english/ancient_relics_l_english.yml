 r_rubricator:0 "รูบริเคเตอร์"
 r_rubricator_desc:2 "ลูกบาศก์ขนาดเล็กนี้วางบนฝ่ามือของคุณได้อย่างพอดิบพอดี ทว่ามันบรรจุขุมทรัพย์ดิจิทัลของศิลปวัตถุต่างดาวที่ถูกสแกนไว้มากมายนับไม่ถ้วน ย้อนกลับไปตั้งแต่ยุคกำเนิดจักรวาล และมันสามารถทำซ้ำสิ่งเหล่านั้นได้อย่างไม่จำกัด ไม่เคยมีครั้งใดที่สิ่งเร้นลับจะเข้ามาใกล้เรามากขนาดนี้มาก่อน"
 r_omnicodex:0 "ออมนิโคเด็กซ์"
 r_omnicodex_desc:0 "เมื่อหลายล้านปีก่อน เผ่าพันธุ์ไซบอร์กผู้มีเมตตาได้ตั้งเป้าหมายที่จะสร้างหลักประกันว่าชีวิตสิ่งมีชีวิตอินทรีย์จะดำรงอยู่ต่อไป โดยการเก็บตัวอย่างและทำดัชนีข้อมูลของทุกเผ่าพันธุ์ในกาแล็กซี เพื่อให้แน่ใจว่าเหตุการณ์การสูญพันธุ์ใดๆ จะไม่เป็นไปอย่างถาวร แม้ว่าเป้าหมายในการกอบกู้กาแล็กซีของพวกเขาจะถูกขัดขวางในท้ายที่สุดโดยกลุ่มผู้คลั่งไคล้ที่โง่เขลาและไฮฟ์มายด์ที่น่ารังเกียจ แต่มรดกของพวกเขายังคงอยู่"
