 r_dragon_trophy:0 "ถ้วยรางวัลเอเธอร์เดรก"
 r_dragon_trophy_desc:0 "ถ้วยรางวัลฉลองชัยชนะของเราเหนือเอเธอร์เดรกผู้ชั่วร้าย หากไม่ใช่เพราะขนาดที่ใหญ่โตของมัน มันคงจะดูดีมากหากแขวนไว้บนผนัง"
