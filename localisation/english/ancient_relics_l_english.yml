 district_rw_farming:0 "ส่วนการเกษตร"
 district_rw_farming_plural:0 "ส่วนการเกษตร"
 district_rw_farming_desc:0 "ท้องทะเลของพื้นที่เกษตรกรรมอันไร้สิ้นสุดแผ่ขยายไปทั่วโลกวงแหวนส่วนนี้ เพื่อเพาะปลูกอาหารจำนวนมหาศาล"
 district_rw_generator:0 "ส่วนกำเนิดพลังงาน"
 district_rw_generator_plural:0 "ส่วนกำเนิดพลังงาน"
 district_rw_generator_desc:0 "เครื่องปฏิกรณ์พลังงานเต็มโลกวงแหวนส่วนนี้ มุ่งเน้นไปที่การผลิตพลังงาน"
 district_rw_science:0 "ส่วนการวิจัย"
 district_rw_science_plural:0 "ส่วนการวิจัย"
 district_rw_science_desc:0 "สิ่งอำนวยความสะดวกการวิจัยทุกประเภทเต็มโลกวงแหวนส่วนนี้"
 district_rw_commercial:0 "ส่วนการค้า"
 district_rw_commercial_plural:0 "ส่วนการค้า"
 district_rw_commercial_desc:0 "อุตสาหกรรมพลเรือนและโครงสร้างพื้นฐานอาศัยอยู่ในโลกวงแหวนส่วนนี้ที่อุทิศให้กับการพาณิชย์"

 district_rw_city:0 "ส่วนเมือง"
 district_rw_city_plural:0 "ส่วนเมือง"
 district_rw_city_desc:0 "ศูนย์กลางเมืองกระจายอยู่เต็มโลกวงแหวนส่วนนี้ มอบที่อยู่อาศัยและพื้นที่สำนักงานจำนวนมากให้แก่พนักงานออฟฟิศ"
 district_rw_hive:0 "ส่วนรัง"
 district_rw_hive_plural:0 "ส่วนรัง"
 district_rw_hive_desc:0 "ยอดหอคอยสูงเสียดฟ้าแผ่ขยายไปทั่วโลกวงแหวนส่วนนี้สำหรับโดรนเพื่อมารวมตัวกันเมื่อไม่ได้ทำงานเพื่อฟื้นฟูร่างกายและบริโภคสารอาหาร"
 district_rw_nexus:0 "ส่วนเน็กซัส"
 district_rw_nexus_plural:0 "ส่วนเน็กซัส"
 district_rw_nexus_desc:0 "เขตพื้นที่ที่มีประสิทธิภาพเต็มโลกวงแหวนส่วนนี้ มอบสถานที่สำหรับให้โดรนได้รับการบริการและซ่อมแซมก่อนที่จะถูกส่งไปปฏิบัติหน้าที่"

 district_rw_industrial:0 "เซ็กเม้นอุตสาหกรรม"
 district_rw_industrial_plural:0 "เซ็กเม้นอุตสาหกรรม"
 district_rw_industrial_desc:0 "โรงงานที่ส่งเสียงดังก้องกังวานและเครื่องจักรทรงพลังกระจายอยู่เต็มโลกวงแหวนส่วนนี้ มอบฐานอุตสาหกรรมที่แข็งแกร่งให้แก่จักรวรรดิ"

 district_srw_commercial:0 "$district_hab_commercial$"
 district_srw_commercial_plural:0 "$district_hab_commercial_plural$"
 district_srw_commercial_desc:0 "เขตพื้นที่ของสำนักงานและโรงงานที่ผลิตและจำหน่ายสินค้าต่างๆ"

 district_srw_mining_desc:0 "อุโมงค์เหล่านี้เข้าถึงลึกเข้าไปในโครงสร้างของโลกวงแหวนที่แตกสลาย ซึ่งสามารถขุดแร่จากตัววงแหวนได้โดยตรง"

