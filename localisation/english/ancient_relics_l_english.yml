 oracle_administration_desc:0 "ออราเคิลดำเนินงานจักรวรรดิเหมือนเครื่องจักรที่หยอดน้ำมันมาเป็นอย่างดี... เมื่อคุณหยอดน้ำมันให้เธอ"
 chosen_of_zarqlan:0 "ผู้ถูกเลือกแห่งซาร์คลาน"
 chosen_of_zarqlan_desc:0 "ในฐานะผู้คนถูกเลือกแห่งซาร์คลาน เราสามารถตั้งถิ่นฐานบนโลกศักดิ์สิทธิ์ได้อย่างปลอดภัย"
 the_memorex:0 "เมมโมเร็กซ์"
 the_memorex_desc:1 "โปรแกรมการเรียนรู้ขั้นสูงของเมมโมเร็กซ์ช่วยฝึกฝนประชากรให้ตอบสนองต่อความต้องการของจักรวรรดิได้ดียิ่งขึ้นขณะที่พวกเขาพักผ่อน ซึ่งช่วยปรับปรุงผลผลิตของพวกเขาได้อย่างมีนัยสำคัญ"
