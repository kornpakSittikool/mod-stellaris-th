 anomaly.1200.desc: "หลังจากการทดลองหลายครั้ง ที่วิศวกรของเราได้จัดการส่ง สแกนประสาทของมนุษย์ต่างดาวที่สูญพันธุ์ ไปให้ร่างกายหุ่นยนต์ เอเลี่ยนโบราณได้สติกลับคืนมาอย่างสมบูรณ์ และได้แสดงความปรารถนาที่จะแตกออกมาด้วยตัวเอง เครือ ข่าย ทาง เดิน ของ เรา ได้ ทํา แผนที่ โลก ที่ สามารถ เป็น บ้าน ใหม่ ของ พวก เขา."
 anomaly.1200.a: "นําทางพวกเขาไปยังโลกใกล้เส้นทางของเรา"
