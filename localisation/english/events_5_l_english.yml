 sol_system_void_dweller_system_NAME:0 "ชาวสถิตห้วงว่าง (สุริยะ)"
 sol_system_void_dweller_system_DESC:0 "ระบบเริ่มต้นทางเลือกสำหรับมนุษย์ที่มีจุดกำเนิดชาวสถิตห้วงว่าง"
 anomaly.186.name:0 "ลิมโบ"
 anomaly.186.desc.v1:0 "ห้องนิรภัยแห่งนี้คือสุสานของเหล่าผู้เป็นอมตะที่เปี่ยมความหวัง\n\nเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ยืนยันว่ากลุ่มรหัสฐานสามขนาดมหึมาที่พบในคลังข้อมูลนั้นคือภาพระบบประสาท — การสแกนสมองแบบดิจิทัล ไม่ต้องสงสัยเลยว่ามนุษย์ต่างดาวแห่ง [From.From.GetName] มองว่านี่คือโอกาสเดียวของพวกเขาที่จะอยู่รอดได้ไม่ทางใดก็ทางหนึ่ง หลังจากหายนะใดก็ตามที่เกิดขึ้นกับดาวเคราะห์ของพวกเขา พวกเขาไม่มีวิธีคืนชีพตัวเองได้ จึงฝากความหวังอันริบหรี่เหลือเชื่อไว้ว่าสักวันหนึ่งจะมีผู้อื่นที่ทำได้"
 anomaly.186.desc.v2:1 "ห้องนิรภัยแห่งนี้คือสุสานของเหล่าผู้เป็นอมตะที่เปี่ยมความหวัง\n\nกลุ่มรหัสฐานสามขนาดมหึมาที่พบในคลังข้อมูลนั้นคือภาพระบบประสาท — การสแกนสมองแบบดิจิทัล ไม่ต้องสงสัยเลยว่ามนุษย์ต่างดาวแห่ง [From.From.GetName] มองว่านี่คือโอกาสเดียวของพวกเขาที่จะอยู่รอด หลังจากหายนะใดก็ตามที่เกิดขึ้นกับดาวเคราะห์ของพวกเขา เพราะไม่มีวิธีคืนชีพตัวเองได้ พวกเขาจึงฝากความหวังไว้ว่าสักวันหนึ่งจะมีผู้อื่นทำได้\n\nด้วยความเชี่ยวชาญด้านหุ่นยนต์ของเรา เราอาจอัปโหลดการสแกนสมองเหล่านี้ลงในเปลือกหุ่นยนต์ได้ — อย่างไรก็ตาม ยังไม่แน่ชัดว่าหุ่นยนต์เหล่านั้นซับซ้อนพอจะรองรับสติปัญญาระดับสูงได้หรือไม่"
 anomaly.186.desc.v3:0 "ห้องนิรภัยแห่งนี้คือสุสานของเหล่าผู้เป็นอมตะที่เปี่ยมความหวัง\n\nกลุ่มรหัสฐานสามขนาดมหึมาที่พบในคลังข้อมูลนั้นคือภาพระบบประสาท — การสแกนสมองแบบดิจิทัล ไม่ต้องสงสัยเลยว่ามนุษย์ต่างดาวแห่ง [From.From.GetName] มองว่านี่คือโอกาสเดียวของพวกเขาที่จะอยู่รอด หลังจากหายนะใดก็ตามที่เกิดขึ้นกับดาวเคราะห์ของพวกเขา เพราะไม่มีวิธีคืนชีพตัวเองได้ พวกเขาจึงฝากความหวังไว้ว่าสักวันหนึ่งจะมีผู้อื่นทำได้\n\nด้วยความเชี่ยวชาญด้านหุ่นยนต์ขั้นสูงของเรา นักวิจัยมั่นใจว่าหุ่นยนต์ของเราซับซ้อนพอที่จะรองรับสติปัญญาระดับสูงได้"
 anomaly.186.desc.v4: "ห้องนิรภัยแห่งนี้คือสุสานของเหล่าผู้เป็นอมตะที่เปี่ยมความหวัง\n\nภายในคลังข้อมูลของมันมีรหัสฐานสามจำนวนมหาศาล ซึ่งบรรจุการสแกนดิจิทัลของหน่วยประมวลผลกลางทางชีวภาพของพวกเขา มนุษย์ต่างดาวแห่ง [From.From.GetName] น่าจะมองว่านี่คือโอกาสเดียวที่จะอยู่รอดได้ เมื่อไม่อาจคืนชีพตนเอง พวกเขาจึงหวังว่าจะมีใครสักคนทำแทนได้\n\nเราสามารถถ่ายโอนการสแกนระบบประสาทเหล่านี้ลงสู่ร่างหุ่นยนต์แบบเดียวกับเราได้ แต่ผลลัพธ์ของการทดลองเช่นนี้คาดเดาได้ยาก"
 anomaly.186.a:0 "ปล่อยให้เอเลี่ยนที่ตายแล้วนอนสงบ"
 anomaly.186.a.alt.tooltip:0 "ล้างข้อมูลการสแกนระบบประสาทออกจากคลังข้อมูลบน [Root.Capital.GetName]"
 anomaly.186.b:1 "ดาวน์โหลดรูปแบบระบบประสาทเก็บไว้ให้ปลอดภัย"
 anomaly.186.b.tooltip:0 "บันทึกรูปแบบระบบประสาทลงในคลังข้อมูลของเรา"
 anomaly.186.c:1 "อัปโหลดรูปแบบระบบประสาท"
 anomaly.186.d:0 "เรายังทำไม่ได้ แต่ให้ดาวน์โหลดรูปแบบระบบประสาทเก็บไว้ก่อน"
 anomaly.186.e: "ดาวน์โหลดรูปแบบระบบประสาทของพวกเขาเข้าสู่ $building_identity_repository$"
 anomaly.186.e.tt: "จะเพิ่มอัตลักษณ์อีก §Y500§! หน่วยเข้าสู่ §Y$building_identity_repository$§!"
 anomaly.187.name:0 "ลิมโบ: การเริ่มต้นใหม่"
 anomaly.187.desc:0 "หลังจากความพยายามที่ล้มเหลวนับครั้งไม่ถ้วน ในที่สุดนักวิจัยของเราก็สามารถอัปโหลดการสแกนระบบประสาทต่างดาวที่เหลือลงสู่ประชากรหุ่นยนต์ได้สำเร็จ จนถึงตอนนี้ มนุษย์ต่างดาวโบราณยังไม่แสดงสัญญาณของจิตสำนึกใด ๆ ที่เหนือไปกว่าหุ่นยนต์พื้นฐาน ทำให้สาธารณชนเริ่มตั้งคำถามว่าผลลัพธ์นี้ถูกปลอมขึ้นมาหรือไม่\n\nอย่างไรก็ตาม ฝ่ายวิศวกรรมกลับปลาบปลื้ม และเสนอให้เราบูรณาการเหล่าต่างดาวเข้ากับสังคม"
 anomaly.187.a:0 "ยินดีให้พวกเขาไปตั้งถิ่นฐานบนดาวเคราะห์ดวงหนึ่งของเรา"
 anomaly.187.b:0 "แยกทางกันน่าจะดีกว่า"
 anomaly.187.a.tooltip:0 "ประชากรหุ่นยนต์ต่างดาวหนึ่งหน่วยจะไปตั้งถิ่นฐานบน [bot_planet.GetName]"
 anomaly.188.name:0 "ลิมโบ: บทเรียนที่ได้รับ"
 anomaly.188.desc:0 "หลังจากความพยายามครั้งสุดท้ายที่ล้มเหลวในการถ่ายโอนการสแกนระบบประสาทต่างดาวลงสู่ร่างหุ่นยนต์ ฝ่ายวิศวกรรมก็จำต้องยอมรับความพ่ายแพ้ การสแกนถูกทำลายระหว่างกระบวนการ — ผลลัพธ์ที่ตอนนี้เหล่านักวิทยาศาสตร์กระซิบกันว่าอาจดีที่สุดแล้ว การต้องใช้ชีวิตที่เหลืออยู่ภายในร่างหุ่นยนต์ดูจะเป็นชะตากรรมที่โหดร้ายเกินไปสำหรับสติปัญญาระดับสูง"
 anomaly.189.name:0 "ลิมโบ: การเริ่มต้นใหม่"
 anomaly.189.desc:0 "หลังจากการทดลองและอุปสรรคมากมาย ในที่สุดฝ่ายวิศวกรรมก็สามารถถ่ายโอนการสแกนระบบประสาทของเหล่าต่างดาวที่สูญพันธุ์ลงสู่ร่างหุ่นยนต์ได้สำเร็จ และผลลัพธ์ก็น่าตื่นเต้นอย่างยิ่ง มนุษย์ต่างดาวโบราณได้ฟื้นคืนสติอย่างสมบูรณ์ และแสดงความปรารถนาที่จะเข้าร่วมกับจักรวรรดิของเรา พร้อมเสนอจะไปตั้งอาณานิคมบนดาวเคราะห์ดวงใหม่ภายในพรมแดนของเรา"
 anomaly.189.a:0 "เรารู้สึกเป็นเกียรติ"
 anomaly.189.b:0 "แยกทางกันน่าจะดีกว่า"
 anomaly.189.b.tooltip:0 "เหล่าต่างดาวจะออกตามหาบ้านใหม่แห่งอื่น"
 anomaly.189.c:0 "รื้อพวกมันทิ้ง"
 anomaly.189.a.tooltip:0 "เหล่าต่างดาวเข้าร่วมจักรวรรดิของเราและไปตั้งอาณานิคมบน [new_colony.GetName]"
 anomaly.1190.name:0 "ลิมโบ: วิญญาณในสายไฟ"
 anomaly.1190.desc:0 "ฝ่ายวิศวกรรมได้นำข่าวที่น่าหวาดหวั่นอย่างยิ่งกลับมา หลังจากปิดท้ายวันสุดท้ายของ “โครงการลิมโบ” ด้วยความพยายามที่ดูเหมือนล้มเหลวอีกครั้งในการอัปโหลดการสแกนระบบประสาทต่างดาวลงสู่ร่างหุ่นยนต์ เหล่านักวิทยาศาสตร์กลับมาในวันถัดไปและพบว่าหุ่นยนต์หายตัวไป\n\nบางคนเชื่อว่าความพยายามนั้นสำเร็จในที่สุด และเหล่าต่างดาวได้หลบหนีไปในยามค่ำคืน ขณะที่อีกฝ่ายมองว่าเป็นเรื่องหลอกลวงอันซับซ้อน เราอาจไม่มีวันรู้ความจริงแน่ชัด..."
 anomaly.1190.a:0 "น่าทึ่งทีเดียว"
 anomaly.1192.name:0 "ลิมโบ: ความก้าวหน้าทางเทคโนโลยี"
 anomaly.1192.desc:0 "จากความก้าวหน้าล่าสุดในสาขาหุ่นยนต์ นักวิจัยของเราเสนอว่าการสแกนระบบประสาทโบราณที่เราเคยกู้คืนมาจากห้องนิรภัยของต่างดาว อาจนำมาใช้แทนปัญญาประดิษฐ์ในหุ่นยนต์ได้\n\nอย่างไรก็ตาม ยังมีความไม่แน่นอนอยู่บ้างว่าร่างหุ่นยนต์นั้นซับซ้อนพอจะรองรับจิตสำนึกทางประสาทระดับสูงได้หรือไม่"
 anomaly.1192.a:0 "คุ้มค่าที่จะลอง"
 anomaly.1192.b:0 "เราไม่ควรเสี่ยง"
 anomaly.1192.alt.tooltip:0 "เก็บการสแกนระบบประสาทไว้ในคลังข้อมูลบน [Root.Capital.GetName]"
 anomaly.1194.name:0 "ลิมโบ: ความก้าวหน้าทางเทคโนโลยี"
 anomaly.1194.desc:0 "จากความก้าวหน้าล่าสุดในสาขาหุ่นยนต์ วงการวิทยาศาสตร์บน [Root.Capital.GetName] มั่นใจว่าเราสามารถสร้างร่างสังเคราะห์ที่ซับซ้อนพอจะรองรับจิตสำนึกทางประสาทระดับสูงได้ เราสามารถอัปโหลดรูปแบบระบบประสาทที่กู้คืนมาจากห้องนิรภัยของต่างดาวซึ่งถูกค้นพบเมื่อระยะหนึ่งก่อนลงสู่หุ่นยนต์ และนำเหล่าต่างดาวกลับมามีชีวิตอีกครั้ง"
 anomaly.1194.a:0 "คุ้มค่าที่จะลอง"
 anomaly.1195.name:0 "ลิมโบ: จากไป"
 anomaly.1195.desc:0 "เหล่าต่างดาวซึ่งเราอัปโหลดจิตใจของพวกเขาลงสู่ร่างหุ่นยนต์ได้จากไปแล้ว พวกเขารวมตัวกันแต่เช้าตรู่บนกองยานพลเรือนขนาดเล็ก มุ่งหน้าสู่ระบบดาวอันห่างไกล จนถึงตอนนี้เรายังไม่ได้รับข่าวจากพวกเขาอีก และเราอาจไม่มีวันรู้เลยว่าพวกเขาไปถึงจุดหมายหรือไม่"
 anomaly.1196.name:0 "ลิมโบ: ผู้ตื่นขึ้น"
 anomaly.1196.desc:0 "มีรายงานเข้ามาว่าเหล่าต่างดาวซึ่งเราอัปโหลดจิตใจของพวกเขาลงสู่ร่างหุ่นยนต์ ได้ไปตั้งอาณานิคมบนดาวเคราะห์ดวงหนึ่งและเรียกตนเองว่า “ผู้ตื่นขึ้น”"
 anomaly.1198.name:0 "ลิมโบ: การเริ่มต้นใหม่"
 anomaly.1198.desc:0 "หลังจากการทดลองมาหลายครั้ง ในที่สุดฝ่ายวิศวกรรมก็สามารถถ่ายโอนการสแกนระบบประสาทของเหล่าต่างดาวที่สูญพันธุ์ลงสู่ร่างหุ่นยนต์ได้สำเร็จ และผลลัพธ์ก็น่าตื่นเต้นอย่างยิ่ง มนุษย์ต่างดาวโบราณได้ฟื้นคืนสติอย่างสมบูรณ์ และแสดงความปรารถนาที่จะเข้าร่วมกับจักรวรรดิของเรา โดยขออนุญาตไปตั้งอาณานิคมบนดาวเคราะห์ดวงใหม่ภายในพรมแดนของเรา"
 anomaly.1198.a:0 "แยกทางกันน่าจะดีกว่า"
 anomaly.1198.tooltip:0 "เหล่าต่างดาวเข้าร่วมจักรวรรดิของเราและไปตั้งอาณานิคมบน [potential_target.GetName]"
 anomaly.1199.name:0 "ลิมโบ: การตื่นขึ้น"
 anomaly.1199.desc:0 "หลังจากการทดลองมาหลายครั้ง ในที่สุดฝ่ายวิศวกรรมก็สามารถถ่ายโอนการสแกนระบบประสาทของเหล่าต่างดาวที่สูญพันธุ์ลงสู่ร่างหุ่นยนต์ได้สำเร็จ และผลลัพธ์ก็น่าตื่นเต้นอย่างยิ่ง มนุษย์ต่างดาวโบราณได้ฟื้นคืนสติอย่างสมบูรณ์ และแสดงความปรารถนาที่จะแยกตัวไปสร้างจักรวรรดิของตนขึ้นใหม่"
 anomaly.1199.a:0 "เราจะไม่ขวางทางพวกเขา"

 #action.7000.name: "Robotic Workforce Operational"
 #action.7000.1: "Noted."
#
 #action.7000.desc_colle: "Engineers from [Root.Planet.GetName] report that our first robotic #workforce is finally operational and tending to its assignment with unparalleled efficiency, #setting an example to local workers, who are now eager to be reallocated to more suitable tasks."
 #action.7000.desc_indiv: "$action.7000.desc_intro$ Reactions among the locals have been enthusiastic #as workers hope the use of robotic labor  will free up their schedules to focus on what's truly #important in life - individual pursuits and personal growth."
 #action.7000.desc_phobe: "$action.7000.desc_intro$ Though suspicious at first, the locals seem to be #in agreement that robots are preferable to aliens, and have expressed hope that this initiative #will quell any potential need for alien labor."
 #action.7000.desc_phile: "$action.7000.desc_intro$ Curious locals have amassed to the site to #welcome the newcomers and have been sighted attempting to interact with the AI. So far the robots #have been unresponsive, focusing on their assignments."
 #action.7000.desc_milit: "$action.7000.desc_intro$ Locals are celebrating the triumphant occasion #with a parade, confident that robotic labor will help strengthen our empire."
 #action.7000.desc_pacif: "$action.7000.desc_intro$ Reactions from the community have been cautiously #optimistic, with some expressing concern that we use the technology responsibly and for a worthy #cause."
 #action.7000.desc_mater: "$action.7000.desc_intro$ [Empire] visionaries speak of a robotic #revolution and [planet] has become the envy of the  empire as our citizens dream of a future #where manual labor is but a distant memory."
