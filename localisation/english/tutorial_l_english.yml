 tutorial_19_chain_title:0 "การ ออก แบบ เรือ"
 tutorial_19_chain_desc:2 "เพื่อสร้างการออกแบบเรือใหม่ เข้าไป§Sโปรแกรมออกแบบเรือ§!โดยการเลือกบน§Sการจัดการกองกลาง§!ในบาร์ด้านซ้าย หรือกด§SF9§!เลือกบน§Sออกแบบใหม่§!ปุ่ม และเลือก§Sคอร์เวทท์§!เมื่อคุณถูกสั่งให้เลือก§Sเพิ่มขนาด§!เลือก§Sไม่มีหัวข้อ§!ปุ่มเพื่อเลือก§Sหัวข้อ§!สําหรับการออกแบบ\n\nคอ วี ตต์ ซึ่ง เป็น เรือ รบ ที่ เล็ก ที่ สุด มี เพียง ส่วน เดียว ส่วน ที่ ใหญ่ กว่า มี เรือ มาก กว่า. ส่วนต่าง ๆ จะกําหนด§Sอาวุธ§!ถึง§Sความจุ§!สล็อต เลือกหนึ่ง แล้วเติมช่องที่มีส่วนประกอบ แน่ใจว่าพลังงานยังคงเป็นบวก\n\nเพื่อทําให้โพรเซสง่ายขึ้น ให้เลือก§Sเรือเสร็จสมบูรณ์อัตโนมัติ§!และปล่อยให้เกมจบการออกแบบ"
 ships_designed:0 "ออกแบบเรือ"
 tutorial_19_tooltip:0 "§Sการ ออก แบบ เรือ§!เพิ่มลงในบันทึกสถานะ"
 tutorial_20_chain_title:0 "การสอน:สถานีสังเกตการณ์"
 tutorial_20_chain_desc:1 "เราควร[GetBuildGrow]เป็น§SObservation Post§!เหนือโลกของ§S[Owner.GetPreFTLUpper]สังคม§!สถานีอวกาศเหล่านี้สามารถทําจํานวนที่แตกต่างกัน§Sภารกิจ§!แม้ ว่า ความ เต็ม ใจ ของ เรา ที่ จะ เข้า ไป ยุ่ง เกี่ยว กับ วัฒนธรรม ที่ กําลัง พัฒนา จะ กําหนด ว่า จะ หา กลุ่ม ไหน ได้.\n\nโพสต์ความ อ ยุติธรรมถูกสร้างในรูปแบบเดียวกัน£mining_station£ §Sการทําเหมือง§!หรือ£science_ship£ §Sสถานี วิจัย§!แต่พวกเขาสามารถสร้างได้เพียงเหนือโลกของ[Owner.GetPreFTLUpper]อารยธรรม เลือกแบบง่ายๆ£construction_ship£ §Sเรือก่อสร้าง§!จากนั้นเลือกบน§S[GetBuildGrowCap]Observation Post§!ปุ่มในอินเทอร์เฟซของกองเรือ\n\nตอนนี้เลือกโลกที่อยู่อาศัยของ[Owner.GetPreFTLUpperPlural]เจ้าอยากเรียน และยานก่อสร้างจะเริ่มภารกิจ"
 observation_post_built:0 "สร้างสถานีสังเกตการณ์"
 tutorial_20_tooltip:0 "§Sการสอน:สถานีสังเกตการณ์§! เพิ่มในบันทึกสถานการณ์"
 tutorial_21_chain_title:1 "การ ควบคุม: ทรัพยากร ที่ ซับ ซ้อน"
 tutorial_21_chain_desc:0 "เราควร[GetBuildGrow]คือ£mining_station£ §Sสถานีทําเหมือง§!ในวงโคจรของวัตถุดาราศาสตร์ด้วย£strategic_resource£ §Sทรัพยากรเส้นรุ้ง§!วัสดุ ที่ หา ยาก เหล่า นี้ มี คุณค่า ทาง ยุทธศาสตร์ มหาศาล.\n\nมีที่ตั้งทรัพยากรดังกล่าวผ่าน§Sการสํารวจ§!เลือก£construction_ship£ §Sเรือก่อสร้าง§!เลือกบน§S[GetBuildGrowCap]สถานีทําเหมือง§!กระดุมและจากนั้นบนวัตถุดาราศาสตร์ที่เหมาะสม"
 tutorial_21b_chain_title:0 "ข้อมูล:"
 tutorial_21b_chain_desc:1 "เราสร้าง£mining_station£ §Sสถานีทําเหมือง§!ในวงโคจรของวัตถุดาราศาสตร์ด้วย£strategic_resource£ §Sทรัพยากรเส้นรุ้ง§!วัสดุหายากเหล่านี้ ต้องการเทคโนโลยีพิเศษในการเหมือง มีคุณค่าทางยุทธศาสตร์มหาศาล"
