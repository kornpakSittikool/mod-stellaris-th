 tutorial_4_chain_title:0 "การสอน:[GetBuildGrowCap]สถานีทําเหมือง"
 tutorial_4_chain_desc:0 "ก่อน£minerals£ §Sเหมือง§!เงินมัดจําหรือ§Sทรัพยากรเส้นรุ้ง§!สามารถเก็บได้จาก£planet£ §Sดาว เคราะห์§!,£mining_station£ §Sสถานีทําเหมือง§!ต้องสร้างในวงโคจร เพื่อทําสิ่งนี้ ให้เลือก£construction_ship£ §Sเรือก่อสร้าง§!ถ้าไม่เลือกตรง ๆ บนมัน ก็เจอมันใน§Sมุม:§!ทางด้านขวาของจอ\n\nเมื่อทําเสร็จแล้ว เลือกบน§S[GetBuildGrowCap]สถานีทําเหมือง§!ปุ่มในส่วนเชื่อมต่อของยานก่อสร้าง จากนั้นเลือกบนดาวเคราะห์ หรือดาวเคราะห์น้อยที่มีอยู่ ด้วยเงินมัดจําแร่\n\nสังเกตว่าอาคารนั้น£mining_station£ §Sสถานีทําเหมือง§!ค่าใช้จ่ายด้วย£minerals£ §Sเหมือง§!ดัง นั้น คุณ จะ ต้อง สะสม เงิน ไว้ มาก พอ ก่อน ที่ จะ เริ่ม สร้าง."
