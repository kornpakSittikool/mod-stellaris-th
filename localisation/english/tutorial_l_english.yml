 tutorial_5_chain_title:0 "การสอน:[GetBuildGrowCap] การวิจัยสถานี"
 tutorial_5_chain_desc:0 "เพื่อเพิ่มอัตราการค้นคว้าเทคโนโลยีใหม่ๆ£science_ship£ §Sสถานี วิจัย§!ควรสร้างขึ้นเหนือโลกใด ๆ ที่ครอบครอง£physics£ §Sฟิสิกส์§!, £society£ §Sสังคม§!หรือ£engineering£ §Sวิศวกรรม§!ทรัพยากร\n\nสถานีวิจัยทํางานเหมือนกับ£mining_station£ §Sสถานีทําเหมือง§!ความแตกต่างเดียวของพวกเขา คือทรัพยากรที่พวกเขาสะสม พวกเขาไม่สามารถทําเหมือง£minerals£ §Sเหมือง§!หรือ£strategic_resource£ §Sทรัพยากรเส้นรุ้ง§!.\n\nสร้าง 1 เลือก£construction_ship£ §Sเรือก่อสร้าง§!และเลือกบน§S[GetBuildGrowCap] การวิจัยสถานี§!ปุ่มในอินเทอร์เฟซของกองเรือ จากนั้นเลือกบนรายการที่มีอยู่£planet£ §Sดาว เคราะห์§!ดาวเคราะห์น้อยหรือดวงอาทิตย์ที่มีคลังความรู้ทางฟิสิกส์ สังคม หรือทรัพยากรวิศวกรรม"
