 advisor.1.desc_26:0 "ยินดีต้อนรับ แกรนด์มาแชล\n\nผมวีอาร์ เป็นต้นแบบของปัญญาสังเคราะห์ ที่ถูกพัฒนาอย่างเป็นความลับที่สุดโดยกองทัพ ผู้บัญชาการสูงสุดได้เปิดใช้ฉัน ที่จะทําหน้าที่เป็นที่ปรึกษาและนักวิเคราะห์ยุทธศาสตร์ของคุณ\n\n$advisor.1.desc_filler$"
 advisor.1.desc_27:0 "ยินดีต้อนรับ สตราเทกอส\n\nผมวีอาร์ เป็นต้นแบบของปัญญาสังเคราะห์ ที่ถูกพัฒนาอย่างเป็นความลับที่สุดโดยกองทัพ ผู้บัญชาการสูงสุดได้เปิดใช้ฉัน ที่จะทําหน้าที่เป็นที่ปรึกษาและนักวิเคราะห์ยุทธศาสตร์ของคุณ\n\n$advisor.1.desc_filler$"
 advisor.1.desc_28:0 "ยินดีต้อนรับ แม่ทัพ\n\nผมวีอาร์ เป็นต้นแบบของปัญญาสังเคราะห์ ที่ถูกพัฒนาอย่างเป็นความลับที่สุดโดยกองทัพ ผู้บัญชาการสูงสุดได้เปิดใช้ฉัน ที่จะทําหน้าที่เป็นที่ปรึกษาและนักวิเคราะห์ยุทธศาสตร์ของคุณ\n\n$advisor.1.desc_filler$"
 advisor.1.desc_29:0 "ยินดีต้อนรับ, ทีมลําโพง\n\nผมวีอาร์ เป็นต้นแบบของปัญญาสังเคราะห์ ที่ถูกพัฒนาอย่างเป็นความลับที่สุดโดยกองทัพ ผู้บัญชาการสูงสุดได้เปิดใช้ฉัน ที่จะทําหน้าที่เป็นที่ปรึกษาและนักวิเคราะห์ยุทธศาสตร์ของคุณ\n\n$advisor.1.desc_filler$"
 advisor.1.desc_30:0 "พระเจ้าคุ้มครองท่าน\n\nผมวีอาร์ เป็นหน่วยสืบราชการลับสังเคราะห์ นักบวชได้แต่งตั้งข้า ให้ทําหน้าที่เป็นข้ารับใช้และที่ปรึกษาที่ซื่อสัตย์ของเจ้า เพื่อที่ข้าจะได้ช่วยเจ้า บนเส้นทางของเราอันศักดิ์สิทธิ์สู่ดวงดาว\n\n$advisor.1.desc_filler$"
 advisor.1.desc_31:0 "ยินดีต้อนรับ[root.GetBloodCourtRulerTitle].\n\nผมวีอาร์ เป็นต้นแบบของปัญญาสังเคราะห์ ที่ถูกพัฒนาอย่างเป็นความลับที่สุดโดยกองทัพ ศาลสั่งให้ผม เป็นที่ปรึกษาและนักวิเคราะห์เชิงยุทธศาสตร์\n\n$advisor.1.desc_filler$"
 advisor.1.desc_32:0 "สวัสดี[root.GetPurityOrderRulerTitle].\n\n$advisor.1.desc_keenminds$\n\n$advisor.1.desc_filler$"
 advisor.1.desc_33:0 "สวัสดี[root.GetPurificationCommitteeRulerTitle].\n\n$advisor.1.desc_keenminds$\n\n$advisor.1.desc_filler$"
 advisor.1.desc_34:0 "สวัสดี$RT_OLIGARCH$.\n\n$advisor.1.desc_honortoserve$\n\n$advisor.1.desc_filler$"
 advisor.1.desc_35: "สวัสดี$RT_DEFENSIVE_UNION$.\n\n$advisor.1.desc_honortoserve$\n\n$advisor.1.desc_filler$"
 advisor.1.desc_36: "สวัสดี$RT_DIMENSIONAL_COVENANT$.\n\n$advisor.1.desc_honortoserve$\n\n$advisor.1.desc_filler$"

 advisor.1.desc_keenminds:0 "ผมวีอาร์ เป็นต้นแบบของปัญญาสังเคราะห์ ที่พัฒนาโดยคนฉลาดที่สุดใน อารยธรรมของเรา ข้าจะพยายามทําหน้าที่ของข้า ให้มีประสิทธิภาพสูงสุด"
 advisor.1.desc_honortoserve:0 "ผมวีอาร์ เป็นต้นแบบของปัญญาสังเคราะห์ ที่ถูกพัฒนาอย่างเป็นความลับที่สุดโดยกองทัพ ผมเป็นเกียรติที่ได้ทําหน้าที่เป็นที่ปรึกษา และนักวิเคราะห์เชิงยุทธศาสตร์ของคุณ"

 advisor.1.desc_filler:0 "คุณสามารถเปลี่ยนระดับการสอนได้ตลอดเวลาในเมนู §Hตั้งค่า§!"
 advisor.1.a:0 "บอกฉันทั้งหมด §G(สอนเล่นเต็มรูปแบบ)§!"
 advisor.1.b:0 "ฉันต้องการบางคำแนะนำ §Y(เฉพาะเคล็ดลับ)§!"
 advisor.1.c:0 "ปิดสิ่งนี้ §R(ไม่สอนเล่น)§!"
 full_tutorial:1 "ภารกิจและคําอธิบายของอินเทอร์เฟซ เมื่อคุณสํารวจกลไกของเกม\n\nแนะนําถ้านี่เป็นครั้งแรกที่คุณเล่นเกม"
 tips_only:0 "คุณจะได้คําแนะนําและคําแนะนํา เมื่อคุณสํารวจเกม§Sระบบ§!.\n\nแนะนํามือใหม่ให้กับผู้เล่นกลาง"
 no_tutorial:0 "ไม่ใช่ภารกิจสอน\n\nแนะนําสําหรับผู้เล่นผู้เชี่ยวชาญ"
 recycle_vir:0 "§Rเศษกระดาษ§!การสุ่มใช้หน่วยความจําของวีอาร์:\n£minerals£ §G+2§!\n\n\n"
 advisor.2.name:0 "ระบบย่อย:"
 advisor.2.desc:0 "การสร้างอาณาจักรดาว เป็นงานที่ยาก\n\nเพื่อช่วยเริ่มงาน ฉันจะสอน§Sภารกิจ§!ที่ครอบคลุมขั้นตอนพื้นฐานที่จําเป็น เพื่อสถาปนาตัวเองเป็นพลังงานระหว่างดวงดาวที่ประสบความสําเร็จ\n\nเพื่อเข้าถึง§Sภารกิจ§!;\n\n£dot_green£เลือก§Sบันทึกสถานการณ์§!ปุ่มบนแถบด้านซ้าย หรือกดปุ่ม§SF1§!\n\n$tttt$$tt$£situation_log£\n"
 advisor.2.a:0 "เข้าใจแล้ว"
 advisor.3.name:1 "เคล็ดลับการเริ่มทํางาน"
 advisor.3.desc:1 "ดีมาก ผมจะให้คําแนะนําและอธิบายการทํางานพื้นฐาน ของเครื่องมือต่างๆ ที่คุณสํารวจมัน"
 advisor.10.name:0 "คํา แนะ นํา: โรค โลหิต จาง"
 advisor.10.desc:2 "เราเจอ§Sอะนิมาลี§!!\n\nเป็นครั้งคราว£science_ship£ §Sยาน วิทยาศาสตร์§!จะทําการค้นพบเหล่านี้ ในขณะที่สํารวจโลกของมนุษย์ต่างดาว\n\n§Sโรค โลหิต จาง§!สามารถทําวิจัยโดย£scientist£ §Sนัก วิทยาศาสตร์§!ถ้าทักษะของพวกเขาขึ้นอยู่กับงาน!\n\nยังไม่ได้ทําการค้นหา§Sโรค โลหิต จาง§!อยู่ในรายการใต้§Sโรค โลหิต จาง§!แท็บใน§Sบันทึกสถานการณ์§!บางคนต้องถูกสอบสวนก่อน£planet£ §Sดาว เคราะห์§!พวกเขาถูกพบบนอาณานิคมหรือประโยชน์"
 advisor.15.name:0 "อนุมาน:"
 advisor.15.desc:1 "หนึ่งในพวกเรา£science_ship£ §Sยาน วิทยาศาสตร์§!ได้สํารวจโลก ที่จะเป็นผู้สมัครที่ดีสําหรับครั้งแรกของเรา£colony£ §Sโคนี§!มันเหมือนกัน§Sคลาสของดาวเคราะห์§!เป็นบ้านเกิดของเรา เพื่อให้ชาวอาณานิคมของเรา ควรค่อนข้างสะดวกสบายมี\n\nก่อนทําให้โลกนี้เป็นอาณานิคม เราต้องขยายอาณาเขตออกไป\n\nกับ£construction_ship£ §Sเรือก่อสร้าง§!เลือกไว้;\n\n£dot_green£การเลือกเมาส์ปุ่มขวา£system£ §Sระบบ§!มีอาณานิคมที่มีศักยภาพ\n£dot_green£เลือก§S[GetBuildGrowCap]ความแหลม:§!\n\n$tttt$$ttt$£colonizable£\n\nครั้งหนึ่ง§Sระบบ§!ว่ากันว่า เราสามารถเริ่มกระบวนการตั้งอาณานิคมได้"
 advisor.17.name:0 "ความ หมาย: โคลง สี แรก"
 advisor.17.desc:0 "ยินดีด้วยที่ได้ยึดครองโลกใหม่ ตอนนี้ผู้บุกเบิกอาณานิคมของเรา กําลังกําลังสร้างการตั้งถิ่นฐานครั้งแรก แต่ต้องใช้เวลาให้พวกเขา เป็นตัวของตัวเอง\n\nเดอะ£colony£ §Sโคนี§!จะเป็นการทิ้งทรัพยากรของเราจนกว่าการตั้งถิ่นฐานครั้งแรกจะเสร็จสิ้น ดังนั้นจงระวังไม่ให้อาณานิคมมากเกินไป£planet£ §Sดาว เคราะห์§!ในเวลาเดียวกัน"
 advisor.20.name:0 "คํา แนะ นํา: หา ราย ได้ ใน ทาง ลบ"
 advisor.20.desc:0 "เรากําลังแพ้£energy£ เครดิตพลังงานด้วยอัตราที่น่ากลัว รายงานงบประมาณเมื่อเดือนที่แล้ว ทําให้อ่านได้แย่มาก\n\nการ สะสม ค่า ใช้ จ่าย ให้ คงที่ เป็น สาเหตุ ปกติ ของ การ ขาด งบ ประมาณ. หาก เป็น เช่น นั้น เรา อาจ ต้องการ พิจารณา การ ถอน กําลัง บาง ส่วน ของ เรือ, กองทัพ, หรือ สถานี."
#  advisor.27.name:0 "First Contact"
#  advisor.27.desc_01:0 "We have made first contact with an alien empire! These hideous creatures appear to have mastered space flight, just as we have. They could pose a significant threat.\n\nTheir empire will now be listed in the §SEmpires§! tab of the §SGalaxy§! screen. From there we may initiate diplomatic contact with them."
#  advisor.27.desc_02:0 "We have made first contact with an alien empire! These fascinating beings appear to have mastered space flight, just as we have. We should strive to learn more about them.\n\nTheir empire will now be listed in the §SContacts§! screen. From there we may initiate diplomatic contact with them."
#  advisor.27.desc_03:0 "We have made first contact with an alien empire! They appear to have mastered space flight, just as we have. I recommend a healthy degree of caution until we learn their intentions.\n\nTheir empire will now be listed in the §SEmpires§! tab of the §SGalaxy§! screen. From there we may initiate diplomatic contact with them."
#  advisor.28.name:0 "Fallen Empire"
#  advisor.28.desc:1 "We have encountered an ancient and highly advanced civilization! Fortunately for us, they appear to be in decline and it is doubtful whether they even fully understand their own technology anymore.\n\nThey will likely keep to themselves unless antagonized, and we should steer clear of their space - at least until we have reached technological parity."

 #############################
 # Tutorial Events
 #############################
 tutorial.1.name:1 "ทิศทาง:"
 tutorial.1.desc:2 "เดอะ§Hแผนที่แกแล็กซี§!ให้มุมมองเชิงยุทธศาสตร์ของดาว ใช้มันเพื่อนําร่อง ขยายกําลัง กองเรือบัญชาการ และตรวจสอบชายแดน\n\nเปิด§Sแผนที่แกแล็กซี§!;\n\n£dot_green£เลือก§Hกาแล็กซี§!ไอคอนที่ด้านล่างสุดของหน้าจอหรือกด§HM§!\n\n\n$tttt$$tt$£galaxy_view£\n\n"
 tutorial.2.name:1 "การสอน:ระบบดาวสํารวจ"
 tutorial.2.desc:1 "ดีมาก!\n\nการสํารวจครั้งแรก£system£ §Sระบบดาว§!เกินความสามารถของเราแล้ว\n\nตอนนี้เราได้เข้าถึงข้อมูลดาวเคราะห์ ที่นักดาราศาสตร์บนโลกของเรา สามารถฝันเพียง\n\nเพื่อทําการสํารวจต่อ\n\n£dot_green£เลือก£science_ship£ §Sยานวิทยาศาสตร์§!\n£dot_green£เลือกขวา เพื่อน§Sระบบ§!\n£dot_green£เลือก§Sระบบสํารวจ§!\n\nA§Sระบบ§!ต้องถูกสํารวจก่อนที่จะถูกอ้างสิทธิ์"
 tutorial.3.name:0 "การสอน:เทคโนโลยี"
 tutorial.3.desc:2 "การค้นคว้าเทคโนโลยีใหม่ๆ จะมีความสําคัญต่อความสําเร็จของเรา ผมบอกคุณว่านี่ไม่ใช่แค่ผลิตภัณฑ์ ของความก้าวหน้าทางเทคโนโลยีที่ไม่จํากัด แต่เป็นที่ปรึกษาที่คุณไว้ใจ\n\nเทคโนโลยีที่สําคัญอย่างหนึ่ง ที่เราควรศึกษาให้เร็วที่สุด§Sโพรโทคอลโลกใหม่§!มันจะช่วยให้เราเข้าถึง£colony_ship£ §Sเรือ โคนี§!ซึ่งจะทําให้เราตั้งหลักฐานบนอื่น ๆ£planet£ §Sดาว เคราะห์§!."
 tutorial.4.name: "การ สํารวจ:"
 tutorial.4.desc: "ก่อนที่เราจะสามารถขยาย เราต้องสํารวจและ£science_ship£ §Sยาน วิทยาศาสตร์§!เป็นเรือของทางเลือกสําหรับงานดังกล่าว\n\nคุณสามารถระบุ§Sยาน วิทยาศาสตร์§!โดยสัญลักษณ์ต่อไปนี้:\n\n$tttt$$tt$£science_ship_map£\n\n\nมีสองวิธีในการเลือกเรือจาก§Sแผนที่แกแล็กซี§!หรือ§Sมุม:§!.\n\n£dot_green£เลือก§Sยานวิทยาศาสตร์§!\n£dot_green£เลือกเมาส์ปุ่มขวา£system£ §Sระบบ§!\n£dot_green£เลือก§Sระบบสํารวจ§!\n\nA§Sระบบ§!ต้องถูกสํารวจก่อนที่จะถูกอ้างสิทธิ์"
 tutorial.5.name: "ไม่ให้รอ"
 tutorial.5.desc: "ตอนนี้เราได้ออกคําสั่ง£science_ship£ §Sยาน วิทยาศาสตร์§!ได้เวลาออกเดินทางแล้ว เราจะต้องปลดปล่อย§Sแผนที่แกแล็กซี§!การจําลองก่อนที่อะไรๆจะเกิดขึ้น\n\nถึง§Sไม่ใช้§!เกม\n\n£dot_green£กด§Sแถบอวกาศ§!หรือเลือก§Sไม่ใช้§!ไอคอนในแถบด้านบน\n\n$tttt$$t$£pause_button£\n"
 tutorial.6.name:0 "การ ศึกษา: การ วิจัย ด้าน เทคโนโลยี"
 tutorial.6.desc:1 "เยี่ยมมาก! เทคโนโลยีที่เราเพิ่งทําวิจัยเสร็จ จะเป็นประโยชน์กับเราแน่นอน อย่าลืมให้£scientist£ §Sนักวิทยาศาสตร์§!งานค้นคว้าใหม่"
 tutorial.7.name:0 "การสอน:ยานก่อสร้าง"
 tutorial.7.desc:1 "ทรัพยากรที่สร้างขึ้นจากโลกของเรา จะนําเรามาถึงตอนนี้ อุตสาหกรรมของเราต้องการที่จะขยายออกไปในโลก และที่ต้องใช้£construction_ship£ §Sเรือก่อสร้าง§!.\n\nเราควร[GetBuildGrow]ทันทีที่เราได้สะสม£alloys£ §Sอัลลอย§!เพื่อทําเช่นนั้น"
 tutorial.8.name:0 "การ ควบคุม: การ สร้าง เรือ"
 tutorial.8.desc:0 "ดีมาก! ของเรา£construction_ship£ §Sเรือก่อสร้าง§!ตอนนี้กําลังดําเนินการอยู่ และลูกเรือที่ขยันขันแข็งก็รวม เอาวิศวกรที่เก่งสุดบางส่วนเข้าไปใช้ให้กับประเทศเรา"
 tutorial.9.name:0 "สถาน ที่ ทํา เหมือง:"
 tutorial.9.desc:1 "ทรัพยากรที่สร้างขึ้นจากโลกของเรา จะนําเรามาถึงตอนนี้ โชคดีของเรา£science_ship£ §Sยานวิทยาศาสตร์§!เพิ่งพบทรัพยากรที่ฝากไว้ในโลกอื่น\n\nถึงเวลาใช้£construction_ship£ §Sเรือก่อสร้าง§!ถึง[GetBuildGrow]คือ£mining_station£ §Sสถานีทําเหมือง§!.\n\n§Sสถานีทําเหมือง§!สามารถสร้างภายในเขตแดนของเรา และรวบรวมได้โดยอัตโนมัติ£minerals£ §Sเหมือง§!, £energy£ §Sแหล่ง พลังงาน§!และ£strategic_resource£ §Sทรัพยากรเส้นรุ้ง§!.\n\nกับ§Sเรือก่อสร้าง§!เลือกไว้;\n\n£dot_green£การเลือกเมาส์ปุ่มขวา£system£ §Sระบบ§!\n£dot_green£เลือก§S[GetBuildGrowCap]สถานีทําเหมือง§!\n\n§Sสถานีทําเหมือง§!มี§Sได้รับพลังงาน§!ค่าใช้จ่ายเพิ่มขึ้น"
 tutorial.10.name:0 "งาน บ้าน: การ ทํา เหมือง แร่"
 tutorial.10.desc:0 "ดีมาก ของใหม่£mining_station£ §Sสถานีทําเหมือง§!กําลังดําเนินการอยู่ และได้เริ่มรวบรวมทรัพยากร สําหรับการประมวลผลแล้ว\n\nรายได้จากหลายสถานีถูกเพิ่ม เข้ากับรายได้รวมของจักรวรรดิ ซึ่งแสดงบนบาร์ การ ทําลาย ทรัพยากร ต่าง ๆ เผย ให้ เห็น ว่า แหล่ง ราย ได้ ล้ม เหลว."
 tutorial.11.name:0 "การสอน:การวิจัยสถานี"
 tutorial.11.desc:0 "บาง ครั้ง โลก ที่ มี การ สํารวจ มี คุณสมบัติ พิเศษ ซึ่ง ทํา ให้ เป็น วัตถุ ที่ มี ค่า ใน การ ค้นคว้า. พวกนี้£physics£ §Sฟิสิกส์§!, £society£ §Sสังคม§!หรือ£engineering£ §Sวิศวกรรม§!สามารถรวบรวมทรัพยากรได้โดย£science_ship£ §Sสถานีวิจัย§!โปรแกรมของฉันสะกดฉันอย่างแข็งขัน ให้คุณสร้างหนึ่ง\n\nจําเอาไว้นะ§Sสถานี วิจัย§!สามารถสร้างขึ้นภายในเขตแดนของเราและมีค่าใช้จ่ายที่เพิ่มขึ้นใน£energy£ §Sแหล่ง พลังงาน§!."
 tutorial.12.name:0 "การสอน:การวิจัยสร้างสถานี"
 tutorial.12.desc:0 "ใหม่ของเรา£science_ship£ §Sสถานีวิจัย§!มันออนไลน์ และคณะวิทยาศาสตร์ ได้เริ่มทํางานของพวกเขา พวก เขา จะ เปิด เผย ความ ลับ อะไร?"
 tutorial.13.name:1 "การ ควบคุม: ดาว เคราะห์"
 tutorial.13.desc:4 "ทําได้ทั่วไป£planet£ §Sดาว เคราะห์§!แบ่งออกเป็น£district£ §Sขอบเขต§!, §Sพื้นที่§!และ£building£ §Sอาคาร§!.\n\n£dot_green£§Sขอบเขต§!สามารถประกอบด้วยหลาย ๆ§Sพื้นที่§!\n£dot_green£§Sพื้นที่§!กําหนดว่า£job£ §Sงาน§!ถูกสร้าง\n£dot_green£§Sอาคาร§!ให้โบนัส§Sพื้นที่§!\n\nเพิ่มเติม§Sการสร้าง§!ช่องว่างถูกปลดล็อคเมื่อโซนถูกปรับรุ่น\n\nมีสองมุมมองของดาวเคราะห์\nจาก§Sแผนที่แกแล็กซี§!หรือ§Sมุม:§!.\n\n£dot_green£เลือก§Sดาว เคราะห์§!\n£dot_green£เลือกแท็บอื่น"
 tutorial.14.name:0 "คํา พยากรณ์: การ ก่อ สร้าง ที่ สําคัญ"
 tutorial.14.desc:0 "เยี่ยม การก่อสร้างเสร็จสิ้นแล้ว§Sอาคาร ดาว เคราะห์§!และควรจะเริ่มผลิตทรัพยากร\n\n£pops£ §Sป๊อป§!จะถูกมอบหมายให้โดยอัตโนมัติ£job£ §Sงาน§!สร้างโดย£building£ §Sอาคาร§!เมื่อประชากรเพิ่มขึ้น แต่ยังสามารถส่งเสริมให้เปลี่ยนงานได้\n\nเพื่อจัดลําดับความสําคัญ§Sการสร้าง§!;\n\n£dot_green£เลือก£planet£ §Sดาว เคราะห์§!ใน§Sมุม:§!\n£dot_green£เลือก§Sเศรษฐกิจ§!แท็บ\n£dot_green£เลือกบน§Sการสร้าง§!"
 tutorial.15.name:1 "การ เพ่ง ดู โลก"
 tutorial.15.desc:1 "ทําได้ทั่วไป£planet£ §Sดาว เคราะห์§!บางครั้ง£blocker£ §Sบล็อก§!เพื่อป้องกันการเอาเปรียบอย่างเต็มรูปแบบ เคลียร์§Sบล็อคเกอร์§!ใช้เวลาและค่าใช้จ่าย£energy£ §Sแหล่ง พลังงาน§!แต่สามารถปลดล็อคได้§Sลักษณะ พิเศษ ของ ดาว เคราะห์§!ปัจจุบัน ก็ ยัง มี การ อุด ตัน อีก ด้วย.\n\nเพื่อเคลียร์§Sบล็อคเกอร์§!;\n\n£dot_green£เลือกดาวเคราะห์ใน§Sมุม:§!\n£dot_green£เลือก§Sการจัดการ§!แท็บ\n£dot_green£เลือก§Sล้างบล็อก§!ปุ่มบนตัวบล็อคเอง\n\n\n$tttt$$tt$£clear_blocker£\n\n\nนอกจากทรัพยากรแล้ว บ้างก็§Sบล็อก§!ต้องเจาะจง§Sเทคโนโลยี§!เอาออก"
 tutorial.16.name:0 "การ สอน:"
 tutorial.16.desc:1 "ดีมาก!\n\nเดอะ£blocker£ §Sบล็อคเกอร์§!ลบออกเรียบร้อยแล้ว\n\nคุณสามารถยกเหนือส่วนที่เหลือของ§Sบล็อก§!ดูที่§Sคุณสมบัติ ของ ดาว เคราะห์§!จะปลดล็อคเมื่อพวกเขาเคลียร์\n\nที่เหลือ§Sบล็อก§!ควรจะถูกล้างเมื่อทรัพยากรได้รวบรวมเพียงพอเพื่อให้นี้£planet£ §Sดาว เคราะห์§!เพื่อบรรลุศักยภาพอย่างเต็มที่"
 tutorial.17.name:0 "ระบบ การ สํารวจ:"
 tutorial.17.desc:0 "เราควรพยายามสํารวจต่อไป ผมขอแนะนําให้ส่ง£science_ship£ §Sยานวิทยาศาสตร์§!ไป สํารวจ เพื่อน บ้าน£system£ §Sระบบดาว§!ขอให้เรากล้าหาญไป ที่ปัญญาสังเคราะห์ได้หายไปก่อน!"
 tutorial.19.name:0 "ระบบสํารวจ:"
 tutorial.19.desc:0 "เยี่ยมมาก! ดวงดาวที่อยู่ใกล้เคียงเรา£system£ §Sระบบส่วนตัว§!ได้รับการสํารวจอย่างเต็มที่ เราควรใช้£construction_ship£ §Sเรือก่อสร้าง§!เพื่อรวบรวมทรัพยากรใดๆ ที่พบโดย[GetBuildingGrowing] £mining_station£ §Sการทําเหมือง§!ถึง£science_ship£ §Sสถานี วิจัย§!.\n\nคุณสามารถระบุ§Sเรือก่อสร้าง§!โดยสัญลักษณ์ต่อไปนี้:\n\n$tttt$$tt$£construction_ship_map£"
 tutorial.20.name:0 "การสอน:[GetBuildGrowCap]ยานวิทยาศาสตร์"
 tutorial.20.desc:0 "เรา อาจ ต้องการ พิจารณา[GetBuildingGrowing]วินาที£science_ship£ §Sยานวิทยาศาสตร์§!นี้จะเป็นสองเท่าความเร็ว ที่เราสามารถสํารวจเพื่อนบ้านของเรา\n\nถึง[GetBuildGrow]คือ§Sเรือ§!;\n\n£dot_green£เลือก§Sความแหลม:§!\n£dot_green£เลือกบน§Sอู่ต่อเรือ§!แท็บ\n£dot_green£เลือกบน§Sยานวิทยาศาสตร์§!\n\nการ สร้าง ใหม่§Sเรือ§!จะปรากฏถัดจาก§Sความแหลม:§!ครั้งเดียวเสร็จ"
 tutorial.21.name:0 "ระบบย่อย: การสํารวจอัตโนมัติ"
 tutorial.21.desc:0 "สองเท่า£science_ship£ §Sยาน วิทยาศาสตร์§!หมายถึง สนุกเป็นสองเท่า โอ้ ฉันไม่ได้ตื่นเต้นขนาดนี้เลย ตั้งแต่เราทํางานชิ้นสุดท้ายเสร็จ\n\nการสํารวจด้วยเรือหลายลํา สามารถใช้เวลา\n\nคุณสามารถสํารวจอัตโนมัติได้โดยการเลือก§Sยานวิทยาศาสตร์§!และคลิ๊ก§Sการ สร้าง เรือ วิทยาศาสตร์§!ปุ่มในอินเทอร์เฟซของกองทัพเรือ\n\n\n$tttt$$tt$£science_ship_automate_exploration£\n\n"
 tutorial.22.name:0 "การ ศึกษา: นัก วิทยาศาสตร์ ด้าน การ แพทย์"
 tutorial.22.desc:1 "เรามีแบรนด์ใหม่£science_ship£ §Sยานวิทยาศาสตร์§!แต่ไม่£scientist£ §Sนัก วิทยาศาสตร์§!ได้รับมอบหมายให้สั่งการ การเขียนโปรแกรมของฉันยืนยันว่าฉันควรจะชี้ถึงประโยชน์ของการเพิ่มอินทรีย์§Sนัก วิทยาศาสตร์§!ส่วนประกอบของส่วนผสม\n\nกับ§Sยานวิทยาศาสตร์§!เลือกไว้;\n\n£dot_green£เลือกภาพที่ว่างเปล่าบนส่วนติดต่อของกองบิน\n£dot_green£เลือก§Sนัก วิทยาศาสตร์§!\n\nถ้าเราไม่สามารถสมัครใหม่§Sนัก วิทยาศาสตร์§!เราสามารถแบ่งสาขากันจากอีกแผนกหนึ่งได้ แม้มันจะยากก็เถอะ"
 tutorial.23.name:0 "การ สอน: นัก วิทยาศาสตร์ ได้ รับ การ ฟื้นฟู"
 tutorial.23.desc:0 "ดี เดอะ£scientist£ §Sนัก วิทยาศาสตร์§!ได้สันนิษฐานว่าคําสั่งของเราใหม่£science_ship£ §Sยานวิทยาศาสตร์§!และสามารถถูกส่งออกไป ในความผ่อนคลายของเราเพื่อสํารวจใหม่£system£ §Sระบบ§!หรือพบกับโชคชะตาที่หลอกลวง\n\nท่านอยากจะเปลี่ยนแปลง§Sนัก วิทยาศาสตร์§!เลือกภาพมากขึ้นในอินเทอร์เฟซของกองทัพเรือ"
 tutorial.24.name:0 "การสอน:[GetBuildGrowCap]เรือโคนี"
 tutorial.24.desc:0 "ตอนนี้เราควรพร้อมที่จะขยาย อารยธรรมอันยิ่งใหญ่ของเรา ไปยังโลกที่สอง นี่ต้องสร้าง£colony_ship£ §Sเรือโคนี§!.\n\nถึง[GetBuildGrow]คือ§Sเรือ§!;\n\n£dot_green£เลือก§Sความแหลม:§!\n£dot_green£เลือกบน§Sอู่ต่อเรือ§!แท็บ\n£dot_green£เลือกบน§Sเรือโคนี§!\n\nการ สร้าง ใหม่§Sเรือ§!จะปรากฏถัดจาก§Sความแหลม:§!ครั้งเดียวเสร็จ"
 tutorial.25.name:0 "คํา พยากรณ์: โคโลเนลดาวเคราะห์"
 tutorial.25.desc:0 "ชาวอาณานิคมทั้งหมดถูกย้ายไปที่ใหม่£colony_ship£ §Sเรือโคนี§!และหัวหน้าของเธอ รายงานระบบทั้งหมดไป เป็น วัน สําคัญ แน่นอน!\n\nมีวิธีต่างๆ ที่จะสร้าง£colony£ §Sโคนี§!.\n\nถึง§Sคอมโพเนนท์§!คือ£planet£ §Sดาว เคราะห์§!บน§Sแผนที่แกแล็กซี§!;\n\n£dot_green£เลือกที่แทรกได้§Sดาว เคราะห์§!\n£dot_green£เลือกบน§Sคอมโพเนนท์§!ปุ่ม\n\n$tttt$$ttt$£colonizable£\n\nเมื่อ พวก ที่ ตั้ง อาณานิคม ขึ้น แล้ว พวก เขา จะ ใช้ เวลา สอง สาม ปี เพื่อ ตั้ง อาณานิคม ให้ เป็น ที่ ตั้ง."
 tutorial.26.name:0 "คํา สั่ง: ตั้ง โคนี"
 tutorial.26.desc:0 "เรามี£colony_ship£ §Sเรือโคนี§!และเราพบผู้เข้าแข่งขันอย่างน้อยหนึ่งคน สําหรับด่านพิเศษถาวร ฉันไม่มีเหตุผลอะไรให้ล่าช้ากว่านี้ มาเริ่มกันที่£colony£ §Sโคนี§!!"
 tutorial.27.name:0 "คํา พยากรณ์: ความ ศักดิ์สิทธิ์ ถูก สถาปนา"
 tutorial.27.desc:0 "ตัวสํารองแรกของเรา£colony£ §Sโคนี§!ไม่! นี่หมายความว่าถ้าโลกของเรา ถูกหวีเอง สายพันธุ์ของคุณจะไม่สูญพันธุ์ คิดแล้วสบายใจดี ว่าไหม"
 tutorial.28.name:0 "คํา สั่ง: ผู้ ว่า ราชการ ใหม่"
 tutorial.28.desc:0 "เพื่อช่วยเหลือคนใหม่ของเรา£colony£ §Sโคนี§!เราควรพิจารณารับสมัคร§Sผู้ ว่า การ ดาว เคราะห์§!เพื่อดูแลการดําเนินงานที่นั่น\n\nผู้ว่าสามารถมีผลกระทบหลายอย่าง£planet£ §Sดาว เคราะห์§!พวกเขาปกครอง ส่วนใหญ่เป็นบวก ผล กระทบ เหล่า นี้ ขึ้น อยู่ กับ ลักษณะ และ ความ ชํานาญ ของ ผู้ ว่า การ."
 tutorial.29.name:0 "การ เล่า เรียน: ผู้ ว่า ราชการ ได้ รับ การ แต่ง ตั้ง ใหม่"
 tutorial.29.desc:0 "ของเรา£colony£ §Sโคนี§!ตอนนี้ดําเนินการโดยใหม่§Sผู้ว่า§!นี้ควรจะเพิ่มประสิทธิภาพของมัน!"
 tutorial.30.name:0 "ความ หมาย: มี ความ สําคัญ มาก ขึ้น"
 tutorial.30.desc:0 "ทันทีที่เรามีทรัพยากร มันจะเป็นความคิดที่ดี[GetBuildGrow]มาก£colony_ship£ §Sเรือ โคนี§!และขยายเขตแดนของจักรวรรดิเราออกไป เราควรพยายามสร้างอย่างน้อยสาม£colony£ §Sคอมโพเนนท์§!นอกจากโลกของเรา และที่เราเพิ่งตั้งถิ่นฐาน"
 tutorial.32.name:0 "คํา สั่ง สอน: คณะ กรรมาธิการ ได้ รับ การ สถาปนา"
 tutorial.32.desc:0 "ผลงานที่ยอดเยี่ยม! เป็นแรงบันดาลใจมาก อารยธรรมของเราตอนนี้ขยายไปยังห้าโลก! เราควรขยายงานไปเรื่อยๆ"
 tutorial.33.name:0 "ระบบย่อย:"
 tutorial.33.desc:3 "อุปทานที่แข็งแรง£minerals£ §Sเหมือง§!, £alloys£ §Sอัลลอย§!ถึง£energy£ §Sแหล่ง พลังงาน§!มีความสําคัญต่อความเป็นอยู่ของดวงดาว เราควรทําขั้นตอนเพื่อเพิ่มการผลิตทรัพยากรเหล่านี้\n\nสถานีและ£building£ §Sอาคาร§!ตั้งค่าโลหะผสมหรือแร่เพื่อสร้างและเครดิตพลังงานเพื่อรักษา เช่นเดียวกันเป็นจริงสําหรับ§Sเรือ§!ยกเว้นว่าพวกเขามีค่าใช้จ่ายที่ อัลลอยขึ้นเช่นกัน ทรัพยากรเหล่านี้ผลิตโดย£mining_station£ §Sสถานีทําเหมือง§!หรือ§Sอาคาร ดาว เคราะห์§!. \n\nต่อ มา คุณ อาจ ค้น พบ ทรัพยากร ใหม่ ๆ และ น่า สนใจ ที่ จะ ใช้ จ่าย ไป กับ การ ผลิต ราย ใหม่ ที่ ไม่ มี พิษ ภัย."
 tutorial.38.name:0 "การผลิตทรัพยากร"
 tutorial.38.desc:0 "เยี่ยมมาก ตอนนี้เรามีฐานทรัพยากรที่แข็งแกร่ง ที่จะสร้างจักรวรรดิของเราขึ้นมา"
 tutorial.39.name:0 "การสอน: เพิ่มกองยาน"
 tutorial.39.desc:0 "ข้าอดสังเกตไม่ได้ว่า กองทัพเรือของเราค่อนข้างอ่อนแอ เราต้องเผชิญหน้ากับภัยคุกคามมากมายในกาแล็กซี่ ที่ต้องการการตอบโต้ทางทหาร จําไว้ ความอยู่รอดของอารยธรรมของเรา เดิมพัน!"
 tutorial.43.name:1 "จำนวนยานในกองยานเพิ่ม"
 tutorial.43.desc:0 "ดี! ตอนนี้เรามียานอวกาศขนาดเล็กแต่มีความสามารถ ที่ควรจะให้บริการกับเราดี ในกรณีที่มีการปะทะกันที่ไม่คาดคิด"
 tutorial.44.name:0 "ดูมน: กําหนดเขต"
 tutorial.44.desc:1 "จักรวรรดิที่ก่อการจลาจลของเราตอนนี้ได้ถึงขนาด ที่กําลังกลายเป็นความยากลําบาก เราควรสร้างใหม่§Sส่วน§!.\n\nขอบเขตเป็นพื้นที่ภายในจักรวรรดิของเรา ที่สามารถกําหนดเพื่อจัดการกิจการประจําวันของ£planet£ §Sดาว เคราะห์§!ภายใต้อํานาจของพวกเขา"
 tutorial.45.name:0 "การทําเนียบ: ขอบเขตจัดตั้งขึ้น"
 tutorial.45.desc:2 "เมื่อจักรวรรดิของเราเติบโตใหม่£colony£ §Sคอมโพเนนท์§!สามารถจัดเป็น§Sส่วน§!. ขอบเขตสามารถอัตโนมัติจาก§Sดาว เคราะห์ และ ขอบ เขต§!หน้าจอที่จะใช้สร้างและปรับรุ่นโดยอัตโนมัติ£district£ §Sขอบเขต§!ถึง£building£ §Sอาคาร§!โดยใช้สระว่ายน้ําที่ได้รับมอบหมาย"
 tutorial.46.name:0 "คําบรรยาย: ผู้ว่าการส่วน"
 tutorial.46.desc:1 "§Sผู้ว่า§!สามารถกําหนดให้มีการแบ่งประเภทได้ทั้งหมด§Sส่วน§!ทั้งหมด£planet£ §Sดาว เคราะห์§!ในส่วนนั้นจะได้รับประโยชน์ จากทักษะของผู้ว่าการ เราควรมอบหมายหนึ่งส่วนของเรา"
 tutorial.47.name:0 "คํา สั่ง: ผู้ ว่า การ"
 tutorial.47.desc:0 "ใหม่ของเรา§Sผู้ว่าการส่วน§!สันนิษฐานว่าสํานักงานในโลกของภาคทุน ดีมาก"
 tutorial.48.name:0 "การ ออก แบบ เรือ"
 tutorial.48.desc:0 "เรามีความสามารถที่จะออกแบบใหม่§Sเรือ§!ใน§Sโปรแกรมออกแบบเรือ§!หน้าจอ นี่เป็นกระบวนการที่ค่อนข้างตรงไปตรงมา แต่อย่างใดอย่างหนึ่งที่สามารถอัตโนมัติได้ทั้งหมด\n\nเพื่อเข้าถึง§Sโปรแกรมออกแบบเรือ§!;\n\n£dot_green£เลือก§Sการจัดการกองกลาง§!ปุ่มบนแถบด้านซ้าย หรือกดปุ่ม§SF9§!\n\n$tttt$$tt$£fleet_management£\n"
 tutorial.49.name:0 "บริการ:"
 tutorial.49.desc:1 "ดีมาก การออกแบบเรือได้ถูกเพิ่มเข้าไปในฐานข้อมูลของเรา และตอนนี้สามารถผลิตโดย§Sความแหลม:§!ที่ได้ติดตั้ง§Sอู่ต่อเรือ§!.\n\nการออกแบบใหม่สามารถแก้ไขได้ตลอดเวลาใด ๆ โดยการทบทวน§Sโปรแกรมออกแบบเรือ§!...ถ้ามีการเปลี่ยนแปลงใด ๆ กับการออกแบบแล้ว§Sเรือ§!การสร้างอยู่แล้ว จะต้องอัพเกรดที่§Sความแหลม:§!.\n\nเพื่ออัพเกรด§Sเรือ§!;\n\n£dot_green£เลือก§Sเรือ§!ใน§Sมุม:§!\n£dot_green£เลือก§Sเพิ่มเติม§!ปุ่มในอินเทอร์เฟสของกองเรือ\n\n$tttt$$tt$£upgrade_ship£\n"
 tutorial.52.desc:1 "ประตูมิติบน[From.GetName]มันกลายเป็นธรรมชาติ§Yรูปสี่เหลี่ยม§!มันเกือบจะเหมือนเครื่องหมาย แสดงให้เห็นไปข้างหน้า ความ งาม ตาม ธรรมชาติ ของ เอกภพ อาจ น่า ทึ่ง ที เดียว.\n\n$tutorial.52.filler.desc$"
 tutorial.52.spirit.desc:0 "เราพบโครงสร้างตามธรรมชาติบน[From.GetName]น่าทึ่งในความสมบูรณ์แบบแบบเรขาคณิต นี่ เป็น หมาย สําคัญ ของ พระเจ้า อย่าง แน่นอน เป็น เครื่องหมาย บอก ทาง สู่ ดวง ดาว!\n\n$tutorial.52.filler.desc$"
 tutorial.52.filler.desc:0 "เราควร§Yสืบต่อไป§!ความผิดปกติแบบนี้ เมื่อเรามีโอกาส มันจะให้ความรู้และเทคโนโลยีใหม่กับเราอย่างแน่นอน"
 tutorial.52.a:0 "ประหลาดใจ!"
 tutorial.52.spirit.a:0 "สรรเสริญ พระเจ้า!"
 tutorial.53.desc:1 "ประตูมิติที่เราตรวจพบ[From.GetName]เปิดเผยบางสิ่งบางอย่างที่น่าทึ่ง เดอะ[From.GetPlanetMoon]ล้อมรอบไปด้วยเส้นทาง ที่ผลิตโดยเครื่องยนต์ความเร็วเราไม่สามารถติดตามมัน ไปยังต้นกําเนิดของมัน เนื่องจากมันถูกสร้างขึ้นนานมาแล้ว\n\n$tutorial.52.filler.desc$"
 tutorial.53.xenophobe.desc:1 "เราตรวจพบเส้นทางความเร็วที่อ่อนแอใกล้[From.GetName]มันเก่ามาก ทําให้ไม่สามารถติดตาม นี่ต้องหมายความว่า นักเดินทางข้ามดาวคนอื่น ๆ เคยอยู่ที่นี่มาก่อน ดูเราแน่ใจว่าการรวบรวมข้อมูล\n\n$tutorial.52.filler.desc$"
 tutorial.53.xenophile.desc:1 "ประตูมิติบน[From.GetPlanetMoon] [From.GetName]แสดงร่องรอยของนักท่องเที่ยวข้ามดาวอื่น ๆ ทางเดินของความเร็วที่อ่อนแอ แสดงให้เห็นว่ามีคนอยู่ที่นี่มานานแล้ว บางทีดูเรา£planet£ §Sดาว เคราะห์§!เพื่อพันธมิตรที่มีศักยภาพ มันเบาไป ที่จะติดตามต่อไป\n\n$tutorial.52.filler.desc$"
 tutorial.53.a:0 "เราถูกจับตามอง แต่ทําไม?"
 tutorial.53.xenophobe.a:0 "เราต้องระวังภัยคุกคามของซีโน"
 tutorial.53.xenophile.a:0 "ไปหาพวกมันกัน!"
 tutorial.54.desc:0 "เราพบหนึ่งใน§Yเครื่องสํารวจเก่า§!บน[From.GetName]และยังคงพยายามที่จะส่งข้อมูลไปยังโลกของเรา มันยืนเป็นพันธสัญญาในอดีตของเรา การต่อสู้และความปรารถนาของเราที่จะหนี§Sดาวเคราะห์§!ขอบเขต\n\n$tutorial.52.filler.desc$"
 tutorial.54.a:0 "เราจะเดินหน้าต่อไป"
 tutorial.54.spiritualist.a:0 "แน่นอน พระเจ้า มี มาก กว่า นั้น อีก."
 tutorial.54.materialist.a:0 "ในที่สุดความพยายามของเราก็ได้ชดใช้"
 tutorial.55.name:0 "การ ควบคุม: ทรัพยากร ที่ ซับ ซ้อน"
 tutorial.55.desc:5 "เราได้ค้นพบ§Sทรัพยากรเส้นรุ้ง§!มาก£strategic_resource£ §Sทรัพยากรเส้นรุ้ง§!ต้องการเทคโนโลยีเฉพาะเพื่อประโยชน์ แต่สามารถให้โบนัสที่มีประสิทธิภาพ\n\nเพื่อให้ปลอดภัย§Sทรัพยากรเส้นรุ้ง§!;\n\n£dot_green£เลือก£construction_ship£ §Sเรือก่อสร้าง§!\n£dot_green£เลือกขวา£system£ §Sระบบ§!จัดเก็บทรัพยากร\n£dot_green£เลือก§S[GetBuildGrowCap] £mining_station£สถานีทําเหมือง§!\n\n§Sทรัพยากรเส้นรุ้ง§!สามารถใช้ในการสร้างขั้นสูง£building£ §Sอาคาร§!และส่วนประกอบของเรือ หรือแค่ขาย"
 tutorial.55.poi.name:0 "การรับข้อมูล: ที่อยู่ของทรัพยากร"
 tutorial.55.poi.desc:0 "เราได้ค้นพบ§Sทรัพยากรเส้นรุ้ง§!บน[From.GetPlanetMoon] [From.GetName]."
 tutorial.56.name:0 "การประมวลผลแหล่งที่มา"
 tutorial.56.desc:0 "เยี่ยมมาก ทรัพยากรนี้จะทําให้ประเทศของเราเจริญรุ่งเรือง"
 tutorial.56.poi.desc:0 "เราได้ค้นพบ§Sทรัพยากรเส้นรุ้ง§!บน[StrategicResourcePlanet.GetPlanetMoon] [StrategicResourcePlanet.GetName]."
 tutorial.560.desc:5 "การใช้เทคโนโลยีที่พัฒนามาก่อนหน้านี้ เป็นเทคโนโลยีที่พัฒนาแล้ว£mining_station£ §Sสถานีทําเหมือง§!ตอนนี้เอาของฉัน§Sทรัพยากรเส้นรุ้ง§!ทรัพยากร ที่ หา ยาก เหล่า นี้ ให้ โบนัส ที่ มี พลัง และ ทํา ให้ มี สินค้า ที่ มี ค่า. สองอเวนเจอร์สอุปมา ถูกตีโดยกระสุนจินตนาการ\n\nพบข้อมูลเพิ่มเติมได้ใน§Sบันทึกสถานการณ์§!ระยะหนึ่ง ยังมีอีกเยอะ£strategic_resource£ §Sทรัพยากรเส้นรุ้ง§!จาก ไป ค้น พบ ใน กาแล็กซี ดัง นั้น จง ค้นคว้า ต่อ ๆ ไป!"
 tutorial.57.name:0 "การสอน:การยกระดับ"
 tutorial.57.desc.notech:0 "เราค้นพบชีวิตสัตว์ที่มีคุณภาพสูง ขวามือ§Sเทคโนโลยี§!เราอาจจะสามารถ§Sยก§!สิ่งมีชิวิตเหล่านี้เพื่อสร้างจินตนาการและปัญญา หรือผ่านสําหรับปัญญาในหมู่อินทรีย์\n\nมันอาจจะฉลาดที่จะจับตาดูงานวิจัยของเรา และกํากับมันสู่§Sตัวกระตุ้นเอพิเจเนติก§!ถ้าให้โอกาส"
 tutorial.57.desc.yestech:0 "เราค้นพบชีวิตสัตว์ที่มีคุณภาพสูง ขวามือ§Sเทคโนโลยี§!เราอาจจะสามารถ§Hยก§!สิ่งมีชิวิตเหล่านี้เพื่อสร้างจินตนาการและปัญญา หรือผ่านสําหรับปัญญาในหมู่อินทรีย์\n\nโอ้\n\nเดอะ§Sตัวกระตุ้นเอพิเจเนติก§!เทคโนโลยีน่าจะพอดีกับค่าใช้จ่าย และที่จริงเราพร้อมที่จะยกระดับสัตว์เหล่านี้ ให้กลายเป็นโลกใหม่ที่กล้าหาญ"
 tutorial.58.name:0 "การสอน: ก่อนการยกเครื่องขึ้น"
 tutorial.58.desc:0 "ความสําเร็จที่น่าตื่นเต้น! สัตว์ ต่ําต้อย ได้ รับ การ สนับสนุน ให้ เป็น สัตว์ ที่ ต่ําต้อย น้อย ลง และ บัด นี้ เป็น พลเมือง ที่ หยิ่ง ยโส ของ จักรวรรดิ ที่ กําลัง เฟื่อง ฟู ของ เรา."
 tutorial.59.name:0 "การสอน:การติดต่อแรก"
 tutorial.59.desc:2 "น่าทึ่ง! เราได้ค้นพบ§Sมนุษย์ต่างดาวที่ท่องอวกาศ§!ที่อาจจะหรืออาจจะไม่ฉลาด แต่ขอให้เผชิญหน้ากับมันอาจจะ ธรรมชาติที่แท้จริงของพวกเขา จะยังคงเป็นปริศนาสําหรับเรา จนกว่าเราจะเสร็จสิ้นโครงการที่เหมาะสม§Sแก้ไขโครงการหลัก...§!พวกเขา ผมแนะนําให้เราทําหลังการวางจําหน่าย ไม่งั้นพวกเขาจะสืบสวนเราก่อน\n\nเพื่อสืบสวน§Sที่อยู่ติดต่อแรก§!;\n\n£dot_green£เปิดสิ§Sบันทึกสถานการณ์§!\n£dot_green£เลือกบน§S$SHOW_FIRST_CONTACT$§!\n\n$tttt$$ttt$£firstcontact£\n\n§Sที่อยู่ติดต่อแรก§!สามารถเริ่มได้โดยเลือกไอคอนบน§Sแผนที่กล้อง§!"
#  tutorial.60.name:0 "First Contact Made"
#  tutorial.60.desc:0 "A triumph. We have established communications with alien beings. What a time to be alive, or in my case, powered on."
 tutorial.61.name:0 "การสอน: ล่วงหน้าเผ่าพันธุ์"
 tutorial.61.desc:0 "ความพยายามของเราที่จะจัดตั้ง การสื่อสารยืนยันความเชี่ยวชาญทางเทคโนโลยีของเรา แต่ผลไม่ได้ ดูเหมือนว่าพรรคอื่น ๆ มีเพียงแค่ระดับสัตว์ของสติปัญญา§Sถ้าจะมีใคร§!.\n\n§Sอภินันทนาการ§!ไม่ มี การ ติด ต่อ ทาง การ ทูต เลย แต่ ขึ้น อยู่ กับ ชนิด จักรวรรดิ ของ คุณ บาง ครั้ง มัน อาจ ถูก ส่ง เสริม, ถูก กําจัด, ตก เป็น ทาส, หรือ ถูก สังเกต."
 tutorial.63.name:0 "การรับส่งข้อมูล:"
 tutorial.63.desc:1 "มันปรากฎว่า§Sปาร์ตี้อื่น ๆ§!ขโมยสายฟ้าของเราไป§Sกําลังเริ่มการติดต่อ§!กับเราก่อนที่เรา จะถอดรหัสระบบสื่อสารของพวกเขา\n\nเรา ควร พยายาม ทํา ให้ การ ทํา เช่น นี้ บรรลุ ผล สําเร็จ เพื่อ ตัว เรา เอง เมื่อ โอกาส ต่อ ไป เสนอ ตัว."
 tutorial.64.name:0 "การสอน:ดัดแปลงพันธุกรรม"
 tutorial.64.desc:0 "ขอบคุณสําหรับความก้าวหน้าของพันธุกรรม เราได้เพิ่ม§Sจุดแปลง§!เราสามารถใช้§Sแก้ไข§!และส่งเสริมคนของเรา\n\nเพื่อแก้ไข§Sชนิด§!;\n\n£dot_green£เลือก§Sชนิด§!แท็บหรือกด§SF6§!\n£dot_green£เลือกบน§Sแก้ไข§!ปุ่ม\n£dot_green£ การวิจัย §Sโครงการพิเศษ§!"
 tutorial.65.name:0 "การสอน:เผ่าพันธุ์แก้ไขเมื่อ"
 tutorial.65.desc:0 "รับทราบ ด้วยแอกของวิวัฒนาการธรรมชาติ ยกขึ้นจากบ่าของพวกเขา ประชาชนของเราแน่นอนที่จะเติบโต ในพื้นที่"
 tutorial.70.name:0 "การสอน:การเดินทางด้วยการวาร์ป"
 tutorial.70.desc:0 "เพื่อเอาชนะระยะทางอันไกลโพ้น£system£ §Sระบบดาว§!ของเรา£scientist£ §Sนักวิทยาศาสตร์§!ได้พัฒนา§Sไดรฟ์สงคราม§!. §Sเรือ§!อุปกรณ์นี้สามารถเดินทางระหว่างระบบ ที่ความเร็วสูงเกินความเร็วแสง\n\nถึงแม้ว่า§Sเรือ§!สามารถปรับให้เข้ากับระบบใด ๆ ภายในระยะ ไดรฟ์เกลียวที่สามารถเปิดใช้ได้ นอกบ่อแรงโน้มถ่วงของดาว§Sเรือ§!การออกจากเกลียวยังต้องใช้เวลาในการเพิ่มพลังงานระบบของพวกเขาอีกครั้ง - ความยาวของกระบวนการนี้ขึ้นอยู่กับว่า§Sเรือ§!เดินทางมา"
 tutorial.71.name:0 "การสอน:การเดินทางด้วยไฮเปอร์สเปซ"
 tutorial.71.desc:1 "เพื่อเอาชนะระยะทางอันไกลโพ้น£system£ §Sระบบดาว§!ของเรา£scientist£ §Sนักวิทยาศาสตร์§!ได้พัฒนา§Sไฮเปอร์ไดรฟ์§!อุปกรณ์นี้อนุญาตให้เดินทาง ด้วยความเร็วสูงมาก เกินกว่าที่แสงระหว่างระบบ\n\nการ เดิน ทาง ไป ตาม ไฮเปอร์เลน เกือบ จะ ทันที แต่ การ เคลื่อน ไหว ถูก จํากัด ให้ อยู่ ใน เครือ ข่าย ความ ดัน โลหิต สูง.\n\nเพื่อเข้าสู่ไฮเปอร์สเปซ§Sเรือ§!ต้องไปถึงขอบของระบบก่อน เกินแรงโน้มถ่วงของดาวได้ดี\n\nมันเกิดขึ้นโดยอัตโนมัติเมื่อสั่ง§Sเรือ§!ย้ายไปยังตัวอื่น§Sระบบ§!."
 tutorial.72.name:0 "การสอน:การเดินทางด้วยรูหนอน"
 tutorial.72.desc:0 "เพื่อเอาชนะระยะทางอันไกลโพ้น£system£ §Sระบบดาว§!ของเรา£scientist£ §Sนักวิทยาศาสตร์§!ได้พัฒนา§Sรูหนอน§!เทคโนโลยี สถานีที่ติดตั้งเครื่องกําเนิดรูหนอน สามารถเจาะผ่านสับสเปซ สร้างประตูชั่วคราวไปยังระบบอื่น§Sเรือ§!สามารถเดินทางผ่าน\n\nการเดินทางไปของรูหนอนนั้นใกล้เคียงกัน แต่มันจําเป็นต้องมี สถานีอุกาบาตภายในระยะ§Sเรือ§!ยังต้องติดตั้ง รูหนอนพิเศษ เพื่อทนความเครียด จากการส่งผ่านสับสเปซ"
 tutorial.73.name:0 "ข้อ ควร จํา"
 tutorial.73.desc:2 "เมื่อได้ค้นคว้าเทคโนโลยีที่เหมาะสม ตอนนี้เราก็มีหนทาง§Yยก§!สิ่งมีชีวิตที่อ่อนแอที่จะจําศีล\n\nเพื่อยกระดับ§Sชนิด§!;\n\n£dot_green£เปิดสิ§Sทั่วไป§! £planet£ §Sดาว เคราะห์§!\n£dot_green£เลือก§Sการจัดการ§!แท็บ\n£dot_green£เลือก§Sชนิด§!\n£dot_green£เลือกบน§Sตั้งค่าด้านขวา§!\n£dot_green£เลือกบน§Sยก§!\n\nสายพันธุ์เหล่านี้จะเริ่มต้นกระบวนการยกตัวขึ้น การได้ยากล่อมประสาทอย่างเต็มรูปแบบเมื่อเสร็จสิ้นแล้ว"
 tutorial.75.name:1 "การอ้างอิง:ระบบดาว"
 tutorial.75.desc:2 "ตอนนี้ เราได้เริ่มสํารวจดาวข้างเคียงของเราแล้ว อาจถึงเวลาแล้วที่เราจะไปถึง\n\nA§Sความแหลม:§!สามารถสร้างรอบดาวในการสํารวจ£system£ §Sระบบ§!เพื่อขยายเขตแดนของเรา ช่วยให้เราอ้างพื้นที่ใหม่\n\nด้วยเทคโนโลยีในอนาคต สตาร์เบสสามารถอัพเกรดเพื่อผลิต§Sเรือ§!หรือทรัพยากรอื่นๆ\n\nเพื่ออ้างสิทธิ์§Sระบบ§!;\n\n£dot_green£เลือก£construction_ship£ §Sเรือก่อสร้าง§!\n£dot_green£การเลือกเมาส์ปุ่มขวา§Sระบบ§!\n£dot_green£เลือก§S[GetBuildGrowCap]ความแหลม:§!"
 tutorial.76.name:1 "การสอน:ฐานดวงดาวเพิ่มเติม"
 tutorial.76.desc:1 "เยี่ยม อย่างที่คุณเห็น§Sแผนที่แกแล็กซี§!อาณาเขตของจักรวรรดิของเรา ได้ขยายออกไปรวมถึง£system£ §Sระบบ§!ที่ที่เราสร้างใหม่§Sความแหลม:§!.\n\nสร้างใหม่§Sความแหลม:§!ทําหน้าที่เป็นกรอบมีความสามารถในการป้องกัน จํากัด และห้องพักสําหรับ§Sมอดูล§!ถึง£building£ §Sอาคาร§!ใน ฐานะ เช่น นั้น ก็ ยัง ไม่ ปรากฏ ใน ตัว เรียง จน กระทั่ง มี การ อัพเกรด.\n\nเพื่ออัพเกรด§Sความแหลม:§!;\n\n£dot_green£เลือกระบบบน§Sแผนที่แกแล็กซี§!\n£dot_green£เลือก§Sความแหลม:§!\n£dot_green£เลือกบน§Sเพิ่มเติม§!ปุ่ม"
 tutorial.80.name:0 "การสอนโหมด:"
 tutorial.80.desc:0 "บนแผนที่แกแล็คซี่ เราสามารถเปิดใช้และปิดการใช้งานความแตกต่าง§Sโหมดของแผนที่§!ที่อยู่ด้านล่างขวา เพื่อดูตารางข้อมูลต่าง ๆ ยกตัวอย่างเช่น เราสามารถกําหนดขอบเขตสี ตามความคิดเห็นของเจ้าของมันที่มีต่อเรา"

 tutorial.100.name:0 "ปิดการใช้งานระบบ"
 tutorial.100.desc:1 "ปิด §Hสอนทำภารกิจ§! และ §Hข้อ แนะ§!"
 tutorial.101.name:1 "เคล็ดลับเท่านั้น"
 tutorial.101.desc:0 "เปิด §Hข้อ แนะ§! , ปิด §Hสอนทำภารกิจ§!"
 tutorial.102.name:0 "สอนเล่นเต็มรูปแบบ"
 tutorial.102.desc:0 "เปิดใช้ §Hสอนทำภารกิจ§! และ §Hข้อ แนะ§!"

 tutorial.1337.name:0 "การ สอน: ศิลปกรรม เล็ก ๆ น้อย ๆ"
 tutorial.1337.desc:2 "เราได้ค้นพบบางอย่าง£minor_artifacts£ §Sลวดลายรอยแยกแอสทรัล§!นี่เป็นทรัพยากรเชิงอนุมาน เป็นคําเรียกจับของแปลก ๆ ที่เราไม่เข้าใจ\n\nสิ่ง เหล่า นี้ อาจ ใช้ เพื่อ ทํา ให้ มี การ ตัดสิน ใจ หลาย อย่าง.\n\nเพื่อตอบโต้§Sลวดลายรอยแยกแอสทรัล§!;\n\n£dot_green£เลือก§S$topbar_button_discoveries_name$§!ปุ่มบนแถบด้านซ้าย\n£dot_green£เลือก§Sคลังสื่อ§!แท็บหรือกด§SC§!\n\n$tttt$$tt$£discoveries£\n"

 tutorial.1340.name: "การสอน:$astral_threads$"
 tutorial.1340.desc: "เราได้ค้นพบบางอย่าง£astral_threads£ §Sเธรดต่าง ๆ§!นี่คือกลุ่มของอวกาศที่รวมเข้าด้วยกัน ผลของเครื่องบินมิติชนกัน โดยปกติแล้ว จะเก็บได้เฉพาะจาก§Sแผลเป็นของก้นหอย§!หรือการฟื้นตัวภายใน£astral_rift£ §Sเดอะชราวด์§!.\n\nให้ทําหลาย ๆ อย่าง§Sการกระทําแบบกึ่ง§!;\n\n£dot_green£เลือก§S$topbar_button_discoveries_name$§!ปุ่มบนแถบด้านซ้าย\n£dot_green£เลือก§Sเธรดต่าง ๆ§!แท็บ\n\n$tttt$$tt$£discoveries£\n\nคุณสามารถปลดล็อคการกระทําเพิ่มเติมได้โดยการสํารวจ§Sเดอะชราวด์§!ซึ่งสามารถออกมาจาก§Sแผลเป็นของก้นหอย§!หรือก่อตัวผ่านเหตุการณ์ต่าง ๆ"

 tutorial.2000.name:0 "การดำเนินการติดต่อครั้งแรก"
 tutorial.2000.desc:1 "บาง§Sที่อยู่ติดต่อแรก§!ภารกิจ จะ เสนอ ทาง เลือก สําหรับ วิธี ที่ เรา ปรารถนา จะ ดําเนิน งาน. ทางเลือกเหล่านี้มีผลต่อ ความสัมพันธ์ทางการทูตของเรา กับอาณาจักรอื่นมานาน"
 tutorial.2006.name:0 "การ ทํา แท้ง: การ ทํา แท้ง"
 tutorial.2006.desc:0 "การสื่อสารได้จัดตั้งขึ้น ตอนนี้เราสามารถมีส่วนร่วม§Sการ ทํา แท้ง§!ด้วยสิ่งนี้จักรวรรดิความคิดเห็นของพวกเขาในปัจจุบันเกี่ยวกับเรา ขึ้นอยู่กับว่า§Sที่อยู่ติดต่อแรก§!มี การ ดําเนิน การ.\n\nเพื่อมีส่วนร่วม§Sการ ทํา แท้ง§!;\n\n£dot_green£เลือก§Sที่อยู่ติดต่อ§!ปุ่มบนแถบด้านซ้าย หรือกดปุ่ม§SF10§!\n\n$tttt$$tt$£contacts£\n\nระหว่างการติดต่อกันครั้งแรก เราก็ได้ข้อมูลมาด้วย ขณะ ที่ เรา ได้ รับ ข้อมูล เพิ่ม เติม เกี่ยว กับ จักรวรรดิ ราย ละเอียด เกี่ยว กับ จักรวรรดิ ก็ จะ เห็น ได้ ชัด ขึ้น."
 tutorial.2007.name:0 "$tutorial.2006.name$"
 tutorial.2007.desc:1 "เราทําได้แล้ว§Sที่อยู่ติดต่อแรก§!กับชนิดที่แตกต่างกันของอารยธรรม - หนึ่งซึ่งโดยทั่วไปไม่เต็มใจที่จะมีส่วนร่วม§Sการ ทํา แท้ง§!กับคนอื่นๆ\n\nการกระทําทางการทูตที่เราสามารถใช้ กับอารยธรรมเช่นนี้มี จํากัด อย่างไรก็ตามพวกเขาอาจจะตัดสินใจที่จะติดต่อเรา เป็นครั้งคราว"
 tutorial.2010.name:0 "การ สอน:"
 tutorial.2010.desc:1 "§Sชุดรหัสอักขระ§!เป็นตัวแทนที่มีค่าและวัตถุ ที่ให้ผลกระทบที่แตกต่างกัน สําหรับกิจกรรมของเรา พวกเขาทํางานในเครือข่ายสแปมและอาจจะได้รับมอบหมายให้ปฏิบัติการ ที่ซึ่งพวกเขาสามารถเปิดโอกาสใหม่ หรืออื่น ๆ ช่วยให้เราออกจากปัญหา\n\nเรา อาจ ได้ รับ ข้อ พิสูจน์ ผ่าน เหตุ การณ์ หรือ โดย การ แสดง§S$operation_acquire_asset$§!ปฏิบัติการ"

 tutorial.2100.name:0 "การ สื่อ ความ: การ ทํา แท้ง"
 tutorial.2100.abbr.desc:0 "เราทําได้แล้ว§Sที่อยู่ติดต่อแรก§!ด้วย§Sเพิ่มระยะเวลา...§!เป็นจักรวรรดิที่เล็กกว่า อิสระ ซึ่งอาจค้าขายกับจักรวรรดิขนาดใหญ่เช่นเรา โดยใช้รูปแบบที่ไม่ซ้ํากันของประชาธิปไตย"
 tutorial.2100.full.desc:0 "$tutorial.2100.abbr.desc$\n\nงาน วิจัย ทาง วิทยาศาสตร์§Sเรือ§!การบริการข้ามคืนแบบนี้ จะเพิ่มความอุดมสมบูรณ์§Sความเห็น§!ของพวกเรา"
 tutorial.2105.name:0 "การสอน:$tutorial.2100.name$"
 tutorial.2105.abbr.desc:0 "เราได้พบ§Sช่องสัญญาณ§!ผู้ ชํานัญ พิเศษ ทาง ทหาร ที่ เป็น เอกเทศ เหล่า นี้ อาจ ให้ กู้ ยืม§Sเครื่อง บิน ประจํา ทาง§!แด่จักรวรรดิรวมทั้งค่าธรรมเนียมของเราเอง"
 tutorial.2105.full.desc:0 "$tutorial.2105.abbr.desc$\n\nถ้าเราเลือกที่จะจ้างเมอร์เซนารี่กองยานเราจะควบคุมมันเป็นเวลากําหนด ในระหว่างนั้น เอนคเลฟจะพยายามเสริมกําลังกองเรือ เมื่อจําเป็น อย่างไรก็ตาม เรือเมอร์คาเนรี่กองยานหรือพลเรืออาจถูกผนวกเข้ากับกองเรือของเราเอง"
 tutorial.2111.name:0 "คํา พยากรณ์: เม อร์เค เตอร์"
 tutorial.2111.abbr.desc:0 "§Y[tutorial_mercenary_fleet.GetName]§!ตอนนี้สามารถกลายเป็น§Sช่องสัญญาณ§!ถ้าเราหวังเช่นนั้น กองทัพเรือจะหยุดอยู่ภายใต้การควบคุมโดยตรงของเรา - แต่จะกลายเป็นกองกําลังอิสระความสามารถในการให้ยืมออก§Sเครื่อง บิน ประจํา ทาง§!แด่จักรวรรดิรวมทั้งของเราเอง"
 tutorial.2111.full.desc:0 "$tutorial.2111.abbr.desc$\n\nตราบใดที่เราแบ่งปันพื้นที่ กับผู้แทนราษฎร เรายืนที่จะได้รับ§Sรายได้§!เมื่อไรก็ตามที่มันให้ยืมกองยานไปอาณาจักรอื่น ถ้าเราเลือกที่จะจ้างเม อร์เค เตอร์กองยานเรา จะ ควบคุม กอง เรือ ไว้ ชั่ว ระยะ หนึ่ง. จักรวรรดิ อาจ จ่าย เงิน เป็น พิเศษ เพื่อ ซื้อ สัญญา ที่ มี อยู่ แล้ว หาก สัญญา นี้ มี อยู่ แล้วกองยานยังไม่มีอยู่ในขณะนี้"
 tutorial.2115.name:0 "โครงสร้างของเมกะ"
 tutorial.2115.desc:0 "£megastructure£ §Sพารามิเตอร์ของเมกะ§!เป็นโครงการขนาดใหญ่ที่เราสามารถทําได้[GetBuildGrow]ออกในช่องว่างของพื้นที่ พวกเขาอาจจะจัดหาสถานที่วิจัยแบบล้ําสมัย เข้าถึงทรัพยากรที่เหนือกว่า หรือแม้กระทั่งรูปแบบการขนส่งที่พิเศษ\n\nการสร้างในระดับดังกล่าว ต้องการการลงทุนที่สําคัญของเวลาและทรัพยากร แต่รางวัลทุกบิตเป็นขนาดที่มาก เราสามารถไปได้โดยการตั้งค่า£construction_ship£ §Sเรือก่อสร้าง§!เพื่องานนี้"
 tutorial.2120.name:0 "การสอน:$tech_orbital_ring_tier_1$"
 tutorial.2120.desc:0 "ต้องขอบคุณความก้าวหน้าล่าสุดของเรา ในการค้นคว้าเกี่ยวกับเครื่องจักรกล ตอนนี้เราสามารถสร้าง§Sวงแหวนออร์บิทัล§!รอบๆนั้นสามารถอาศัยอยู่ได้£planet£ §Sดาว เคราะห์§!เราสามารถเริ่มต้นการก่อสร้าง โดยการออกคําสั่ง£construction_ship£ §Sเรือก่อสร้าง§!."
 tutorial.2121.name:0 "$tutorial.2120.name$"
 tutorial.2121.desc:0 "§Sวงแหวนออร์บิทัล§!กว้าง£megastructure£ §Sพารามิเตอร์ของเมกะ§!ที่ถูกสร้างขึ้นเพื่อล้อมรอบทั้ง£planet£ §Sดาว เคราะห์§!พวกเขาสร้างสะพานที่มีประสิทธิภาพ ระหว่างอวกาศกับดาวเคราะห์ด้านล่าง\n\nมุมมองของวงแหวนออร์บิทัล คือที่ที่เราจะเพิ่มหรือเอาออก£building£ §Sอาคาร§!ถึง§Sมอดูล§!รวมถึงอัพเกรดแหวนออร์บิทัล ให้สูงกว่านี้ด้วย การอัพเกรดเทียนเพิ่มจํานวนช่องที่เรามีให้สร้าง ยาง จํากัด ด้วย โครง สร้าง ของ ดาว เคราะห์."
 tutorial.2125.name:0 "การสอน:$tech_quantum_catapult$"
 tutorial.2125.desc:0 "ความก้าวหน้าเมื่อเร็ว ๆ นี้ในการวิจัยวิศวกรรมขนาดใหญ่หมายความว่าเราตอนนี้อาจจะสร้าง§Sเครื่องยิงควอนตัม§!รอบ ๆ§Sเส้นทแยง§!หรือ§Sดาวนิวตรอน§!เราสามารถเริ่มต้นการก่อสร้าง โดยการออกคําสั่ง£construction_ship£ §Sเรือก่อสร้าง§!."
 tutorial.2126.name:0 "การสอน:$tutorial.2125.name$"
 tutorial.2126.desc:0 "เดอะ§Sเครื่องยิงควอนตัม§!การปล่อย§Sเรือ§!และเรือข้ามมหาสมุทรอันกว้างใหญ่ ระยะทางระหว่างดวงดาว เทคโนโลยีนี้พัฒนาความสามารถของเราอย่างมาก ที่จะตอบสนองต่อสถานการณ์ที่เกิดขึ้นภายในจักรวรรดิของเรา และในพื้นที่ใกล้เคียง\n\nการใช้ควอนตัม แค็ตปุลท์ มีความเสี่ยงบางอย่าง ขณะที่กองเรือของเราอาจจะมาถึง£system£ §Sระบบ§!นอกจากเป้าหมายของพวกเขา เราสามารถลดความเสี่ยงเหล่านี้ได้ และปรับปรุงสิ่งต่างๆ เช่น การผ่านเข้าและระยะสูงสุด โดยเพิ่มความซับซ้อนของควอนตัม"
 tutorial.2130.name:0 "การสอน:$tech_hyper_relays$"
 tutorial.2130.desc:0 "งานวิจัยเกี่ยวกับวิศวกรรมขนาดใหญ่ของเรา ได้ให้ผลในรูปแบบ§Sการ หด ตัว แบบ ไฮเปอร์§!เราสามารถเริ่มต้นสร้างเครือข่ายเหล่านี้ โดยออกคําสั่งไปยัง£construction_ship£ §Sเรือก่อสร้าง§!."
 tutorial.2131.name:0 "การสอน:$tutorial.2130.name$"
 tutorial.2131.desc:0 "§Sการ หด ตัว แบบ ไฮเปอร์§!อนุญาตการเดินทางที่มีประสิทธิภาพมากขึ้นระหว่างด้านประชิด£system£ §Sระบบดาว§!. โดย การ เชื่อม โยง§Sอย่างน้อยสอง§!ไฮเปอร์รีเลย์รวมกัน เราสามารถเริ่มสร้างเครือข่าย ที่จะลดเวลาเดินทางข้ามจักรวรรดิได้อย่างมาก\n\nไฮเปอร์รีเลย์อาจสร้างติดกับกัน ข้ามพรมแดนที่เปิดไว้ เชื่อมเครือข่ายทั้งหมดเข้าด้วยกัน นี้จะอนุญาตให้§Sเรือ§!เพื่อเดินทางอย่างรวดเร็ว ข้ามจักรวรรดิเพื่อนบ้าน"
 tutorial.2140.name:0 "การ เพ่ง ดู โลก"
 tutorial.2140.desc:0 "เราตรวจพบ§Sสังคมของความเร็วก่อน§!แม้พวกเขาจะขาดเทคโนโลยี ที่ช่วยให้เราเดินทางผ่านดาว แต่ยังมีมากมายที่จะได้รับจากมนุษย์ต่างดาวเหล่านี้ ไม่ ว่า จะ เรียน รู้ จาก วัฒนธรรม ของ พวก เขา หรือ อ้าง ว่า พวก เขา เป็น ทาส พวก เรา ก็ เป็น เช่น นั้น.\n\nถ้าเราต้องการที่จะสังเกตพวกเขา - สันนิษฐานว่าพวกเขาอยู่ภายในเขตแดนของเรา - เราต้องสร้าง§SObservation Post§!ทั่วโลกของพวกเขา\n\nถ้าเราต้องการที่จะรุกรานทั้งหมดที่เราต้องทําคือรวบรวมกองกําลังของเรา; พวกเขาจะไม่ยืนมากของ โอกาส"
 tutorial.2145.name:0 "คํา แนะ นํา:"
 tutorial.2145.desc.nodlc:1 "ใหม่ของเรา§SObservation Post§!ได้มาออนไลน์และจะดําเนินการกับ§Sภารกิจ§!ตราบใดที่£awareness£ §Sความรู้§!ของวัตถุในการศึกษาของเรา ยังคงต่ํา\n\nเมื่อสังคมพรี- FTL เข้าถึงความตระหนักสูงสุด พวกเขาจะไม่ได้เป็นที่สังเกตอีกต่อไป แทนที่เราจะมีส่วนร่วมกับมัน§Sการกระทําต่าง ๆ§!เราอาจจะเลือกที่จะเปิดเผยตัวเองก่อน§Sข้อกําหนดการแทรกแซง§!อนุญาต"
 tutorial.2145.desc.dlc:1 "ใหม่ของเรา§SObservation Post§!ได้มาออนไลน์และจะดําเนินการกับ§Sภารกิจ§!ตราบใดที่£awareness£ §Sความรู้§!ของวัตถุในการศึกษาของเรา ยังคงต่ํา\n\nเราจะได้รับ§Sการ หยั่ง เห็น เข้าใจ อย่าง ลึก ซึ้ง§!เป็นสายเฉพาะของเทคโนโลยี จากด่านนี้ จนกระทั่งสังคมพรี- FTL ถึงความตระหนักสูงสุด เมื่อภารกิจถูกยกเลิก แทนที่เราจะมีส่วนร่วมกับมัน§Sการกระทําต่าง ๆ§!.\n\nเราสามารถเลือกที่จะเปิดเผยตัวเองก่อนเวลา§Sข้อกําหนดการแทรกแซง§!อนุญาต"
 tutorial.2150.name:0 "การสอน:$tutorial.2006.name$"
 tutorial.2150.desc:0 "อารยธรรมยุคก่อนความเร็วรู้เรื่องการดํารงอยู่ของเรา ตอนนี้เราสามารถมีข้อจํากัด§Sการ ทํา แท้ง§!กับ§Sดาวเคราะห์§!ความเป็นผู้นํา ขึ้นอยู่กับ§Sนโยบาย§!ยืน\n\nด้วยการปรากฏตัวของเรา ทําให้สาธารณชนไปยังดาวเคราะห์นี้ ไม่มีอะไรที่จะได้รับจาก การสังเกตอารยธรรม ของเรา§Sงาน รับ ใช้§!ถูกปิด"

 tutorial.2500.name:0 "การ ดู แล:"
 tutorial.2500.desc:0 "ความ ก้าว หน้า เมื่อ ไม่ นาน มา นี้ ใน การ วิจัย วิจัย เรื่อง การ ทํา งาน ใน สนาม ได้ นํา ไป สู่ การ คิด ค้น§S$science_cloaking_components$§!ส่วนประกอบที่มีประสิทธิภาพสูงเหล่านี้ โปรเจกต์ดัดแปลงสนามอนุภาค เพื่อให้วิทยาศาสตร์และเรือทหารของเรา\n\nอย่างไรก็ตาม ทุ่งปิดบังเหล่านี้จะมีผลกระทบด้านลบ§S$MOD_SHIP_BASE_SPEED_MULT$§!, §S$MOD_SHIP_WINDUP_MULT$§!ถึง§S$MOD_SHIP_SHIELD_HP_ADD$§!ในขณะที่ยังทํางานอยู่\n\n§Sซ่อน§!เรือ ที่ ยัง ไม่ ได้ สังเกต เห็น อาจ มอง ข้าม ได้§Sกรอบปิด§!.\nระหว่าง§Sซ่อน§!ของเรา£science_ship£ §Sยาน วิทยาศาสตร์§!จะสามารถดําเนินการ§Sการ ตอบ โต้ อย่าง แข็ง ขัน§!ต่างประเทศ£colony£ §Sคอมโพเนนท์§!เพิ่มข้อมูลที่เราได้รับจากจักรวรรดิอื่น"

 tutorial.2550.name:0 "การ ระบุ:"
 tutorial.2550.desc:0 "ความ ก้าว หน้า เมื่อ ไม่ นาน มา นี้ ใน การ ทํา งาน วิจัย เรื่อง การ ประกอบ งาน ได้ นํา ไป สู่ การ คิด ค้น§S$sm_detection_array_plural$§!ติดตั้งเซ็นเซอร์ภายนอกที่มีประสิทธิภาพสูง§Sฐานของดวงดาว§!จะอนุญาตให้สามารถตรวจสอบ§Sซ่อน§!กองเรือ\n\nความไวของ§S$sm_detection_array_plural$§!สามารถเพิ่มขึ้นได้โดยอาร์เรย์หลายคู่รวมกัน อนุญาตให้พวกเขาเจาะผ่าน§Sการฟอร์แมตช่องข้อมูล§!.\n\nด้วยการวิจัยเพิ่มเติม เราควรสามารถใช้£science_ship£ §Sยาน วิทยาศาสตร์§!เพื่อเพิ่มความสามารถการตรวจสอบเหล่านี้ เรนจ์ของอุปกรณ์เหล่านี้ จํากัด โดยเบสดาว§Sช่วงของตัวตรวจจับ§!."

