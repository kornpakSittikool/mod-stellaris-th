 tutorial_22_chain_title:0 "การสอน: การยกของก่อนการวางจําหน่าย"
 tutorial_22_chain_desc:1 "เราควร§Sยก§!สายพันธุ์ที่น้อยกว่า แม้ว่าเราอาจจําเป็นต้องค้นคว้า§Sตัวกระตุ้นเอพิเจเนติก§!เทคโนโลยีก่อน\n\n§Sยก§!สายพันธุ์ก่อนการวางจําหน่ายโดยการเลือกรายการของพวกเขาใน§Sชนิด§!หน้าจอ แล้วก็กดปุ่มลิฟท์"
