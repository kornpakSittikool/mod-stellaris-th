 tutorial_16_chain_title:0 "การสอน: เพิ่มกองยาน"
 tutorial_16_chain_desc:5 "เราควร[GetBuildGrow]ดาวที่มีประสิทธิภาพเที่ยวบินเพื่อส่งเสริม[Root.GetName].\n\nอีกนิดหน่อย§Sสี่เหลี่ยม§!ควรจะทําตอนนี้[GetBuildGrowCap]คือ§Sเรือ§!ที่§Sความแหลม:§!เมื่อพวกเรา§Sอัลลอย§!ใบอนุญาตส่งเสบียง เรือทหารใหม่มักจะเข้าร่วมทุก กองเรือที่มีอยู่ในวงโคจรของ§Sความแหลม:§!ที่สร้างพวกเขา\n\nเพื่อปรับกําลังทหารของกองทัพเรือ เราอาจจะเลือกที่จะกําหนด§Sพลเรือเอก§!นี้จะให้ขอบมากกว่ากองทัพเรืออื่น ๆ ส่วนมากให้บริการโดยไม่ต้อง£commander£ §Sผู้บัญชาการ§!ของพวกมันเอง"
