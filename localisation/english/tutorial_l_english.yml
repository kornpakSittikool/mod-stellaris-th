 tutorial_15_chain_title:0 "ระบบย่อย:"
 tutorial_15_chain_desc:1 "อุตสาหกรรมของเรากําลังเติบโต ต้องการวัสดุดิบ และเราต้องการเพิ่มอุปทาน£minerals£ §Sเหมือง§!นี้ทําโดย[GetBuildingGrowing] £mining_station£ §Sสถานีทําเหมือง§!เหนือ£planet£ §Sดาว เคราะห์§!และดาวเคราะห์น้อยที่มีเงินฝากจากเหมืองแร่ หรือการก่อสร้าง§Sเขต ทํา เหมือง§!บนพื้นผิวของดาวเคราะห์ที่อาศัยอยู่\n\nทั้งสถานีและ£building£ §Sอาคาร§!ตั้งค่า£energy£ §Sแหล่ง พลังงาน§!เพื่อรักษาไว้ เราต้องจัดหาทรัพยากรนี้ให้เพียงพอเช่นกันเครดิตพลังงานผลิตโดย§Sเขตคํานวณ§!บนพื้นผิวของดาวเคราะห์ที่เราอาศัยอยู่ แล้วก็หามาได้ด้วย§Sสถานีทําเหมือง§!สร้างขึ้นเหนือดาวเคราะห์ ดาวเคราะห์น้อย หรือดวงอาทิตย์ ด้วยเงินฝากพลังงาน"
