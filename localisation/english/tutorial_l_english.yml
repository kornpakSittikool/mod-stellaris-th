 tutorial_3_chain_title:0 "การสอน:[GetBuildGrowCap]เรือก่อสร้าง"
 tutorial_3_chain_desc:2 "เราต้องการ£construction_ship£ §Sเรือก่อสร้าง§!ถ้าเราหาประโยชน์จากทรัพยากรที่ถูกค้นพบ£science_ship£ §Sยานวิทยาศาสตร์§!.\n\nเลือกบนฐานดวงดาวและเลือก§Sอู่ต่อเรือ§!แท็บ แล้วเลือก§Sเรือก่อสร้าง§!จากการเลือกที่มี\n\nข้อ ควร จํา£alloys£ §Sอัลลอย§!เพื่อจ่าย§Sเรือ§!ก่อนที่การก่อสร้างจะเริ่มต้น"
