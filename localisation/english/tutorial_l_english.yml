 tutorial_10_chain_title:0 "การ ศึกษา: นัก วิทยาศาสตร์ ด้าน การ แพทย์"
 tutorial_10_chain_desc:2 "เราต้องการ£scientist£ §Sนัก วิทยาศาสตร์§!เพื่อบัญชาการใหม่ของเรา£science_ship£ §Sยานวิทยาศาสตร์§!เพราะไม่สามารถสํารวจหรือค้นคว้า§Sโรค โลหิต จาง§!ไม่มีสักคน\n\nเลือกใหม่ของเรา§Sยานวิทยาศาสตร์§!จากนั้นเลือกบนภาพ ในส่วนเชื่อมต่อของกองเรือ เดอะ§Sเลือกตัวนํา§!หน้าต่างจะเปิด แสดงทั้งหมด§Sนักวิทยาศาสตร์§!ปัจจุบัน เรา และ คน เหล่า นั้น ที่ หา งาน ได้. เลือกผู้สมัครที่คุณต้องการ\n\nซ่อมแซมผู้นำค่า£unity£ §Yเอกภาพ§!และ คุณ อาจ ต้อง คอย จน กว่า คุณ มี สิ่ง ที่ เก็บ ไว้ มาก พอ.\n\nเมื่อถูกเกณฑ์แล้ว§Sยานวิทยาศาสตร์§!สามารถเริ่มสํารวจได้"
 scientist_assigned:0 "นัก วิทยาศาสตร์ ได้ รับ การ ฟื้นฟู"
 tutorial_10_tooltip:0 "§Sการ ศึกษา: นัก วิทยาศาสตร์ ด้าน การ แพทย์§!เพิ่มลงในบันทึกสถานะ"
 tutorial_11_chain_title:0 "การสอน:[GetBuildGrowCap]เรือโคนี"
 tutorial_11_chain_desc:4 "เวลานั้นมาถึงอาณานิคมของอีกโลกหนึ่ง ก่อนอื่นเราต้อง[GetBuildGrow]คือ£colony_ship£ §Sเรือโคนี§!นี่§Sเรือ§!ใช้เวลานานมาก[GetBuildGrow]และต้องการจํานวนมาก£alloys£ §Sอัลลอย§!, £food£ §Sอาหาร§!และ£consumer_goods£ §Sสินค้าสําหรับผู้ใช้§!แต่เติบโต£colony£ §Sโคนี§!จะมากกว่าผลตอบแทนสําหรับการลงทุนนี้\n\nเลือกบน§Sความแหลม:§!และเปิด§Sอู่ต่อเรือ§!แท็บ เลือก§Sเรือโคนี§!จากการออกแบบที่มีอยู่\n\nคุณต้องใช้ทรัพยากรมากพอ ก่อนที่การก่อสร้างจะเริ่มต้น"
 colony_ship_built:0 "เรือ โคนี ที่ สร้าง ขึ้น"
 tutorial_11_tooltip:0 "§Sการสอน:[GetBuildGrowCap]เรือโคนี§!เพิ่มลงในบันทึกสถานะ"
 tutorial_12_chain_title:0 "คํา สั่ง: ตั้ง โคนี"
 tutorial_12_chain_desc:3 "ตอนนี้เราควรใช้ใหม่£colony_ship£ §Sเรือโคนี§!เพื่อสถาปนาครั้งแรกของเรา£colony£ §Sโคนี§!ผู้สมัครดาวเคราะห์ที่ดีที่สุด คือผู้ที่อยู่ในชั้นดาวเคราะห์เดียวกับโลกของเรา\n\nไปยังอาณานิคม£planet£ §Sดาว เคราะห์§!เลือกบน§Sเรือโคนี§!หรือเลือกใน§Sมุม:§!จากนั้นเลือกที่§Sคอมโพเนนท์§!ปุ่มในส่วนติดต่อของกองเรือ และเลือกดาวเคราะห์ที่คุณต้องการเป็นอาณานิคม โปรด สังเกต ว่า คุณ สามารถ อยู่ ได้ เพียง ดาว เคราะห์ ต่าง ๆ ที่ ถูก สํารวจ และ ไม่ มี§Sโรค โลหิต จาง§!พวกเขาจะต้องอยู่ในเขตแดนของคุณ ขณะ ที่ คุณ สามารถ เลือก ที่ จะ เป็น อาณานิคม ของ ดาว เคราะห์ ที่ มี นิสัย ไม่ ดี แต่ การ ทํา เช่น นั้น อาจ แพง มาก."
 colony_established:0 "องค์ประกอบที่ตั้ง"
 tutorial_12_tooltip:0 "§Sคํา สั่ง: ตั้ง โคนี§!เพิ่มลงในบันทึกสถานะ"
 tutorial_13_chain_title:0 "คํา สั่ง: ผู้ ว่า ราชการ ใหม่"
 tutorial_13_chain_desc:1 "เราควรสมัคร§Sผู้ ว่า การ ดาว เคราะห์§!เพื่อจัดการใหม่ของเรา£colony£ §Sโคนี§!เพื่อทําสิ่งนี้ กดที่อาณานิคม แล้วเข้าไปในอาณานิคม§Sสรุปดาวเคราะห์§!แท็บ จากนั้นเลือกบน§Sเปลี่ยน§!ปุ่มใน§Sผู้ว่า§!หน้าต่าง นี่จะเปิด§Sผู้นํา§!หน้าจอที่แสดงผู้ว่าการทํางานในปัจจุบันให้เรา\n\nเลือกบน§Sกลับค่าเดิม§!ปุ่มบนจอ และเลือกจากกลุ่มผู้สมัครที่มีอยู่ สังเกตว่าผู้นํามักจะค่าใช้จ่ายปอนด์§Yเอกภาพ§!เพื่อรับสมัคร ถ้าเราขาดปริมาณที่ต้องใช้ เราต้องรอจนเพียงพอ\n\nเมื่อได้รับแต่งตั้ง ผู้ว่าราชการใหม่ จะรอรับภารกิจ บนโลกของเรา"
 governor_recruited:0 "ผู้ว่าการพิจารณาอีกครั้ง"
 tutorial_13_tooltip:0 "§Sคํา สั่ง: ผู้ ว่า ราชการ ใหม่§!เพิ่มลงในบันทึกสถานะ"
 tutorial_14_chain_title:0 "คํา พยากรณ์: สร้าง ความ เชื่อ มั่น มาก ขึ้น"
 tutorial_14_chain_desc:1 "ให้ขยายอาณาจักรของเรา โดยการสร้างใหม่£colony£ §Sคอมโพเนนท์§!. [GetBuildGrowCap]มาก£colony_ship£ §Sเรือ โคนี§!เมื่อเรามีพอ£alloys£ §Sอัลลอย§!, £food£ §Sอาหาร§!และ£consumer_goods£ §Sสินค้าสําหรับผู้ใช้§!แล้วส่งพวกเขาออกไป เพื่อสร้างอาณานิคมใหม่\n\nระวัง อย่า ให้ มี อาณานิคม มาก เกิน ไป ภาย ใต้ การ พัฒนา ใน เวลา เดียว กัน เนื่อง จาก พวก เขา สูบ บุหรี่£energy£ §Sแหล่ง พลังงาน§!จนกระทั่งเมื่อพวกเขาระเหิดใจ"
 colonies_established:0 "การประชุมสถาปนา"
