 SITLOG:0 "บันทึกสถานการณ์มีการอัปเดตแล้ว"

 ####################################
 # Advisor Tutorial Messages
 ####################################
 TUTORIAL_GOVERNMENTVIEW_GOVERNMENT_TITLE:0 "รัฐบาล / การปกครอง"
 TUTORIAL_GOVERNMENTVIEW_GOVERNMENT_DESC:1 "หน้าต่าง §Sรัฐบาล§! นำเสนอข้อมูลเกี่ยวกับจักรวรรดิและรัฐบาลหรือการปกครองของเรา เราสามารถดู §Sผู้ปกครอง§! ของเราและเอฟเฟกต์ที่เกี่ยวข้องได้ที่นี่\n\nแท็บแยกด้านข้างจะให้ข้อมูลเกี่ยวกับ §Sประชากร§! ของจักรวรรดิเรา"
 TUTORIAL_TECH_VIEW_TITLE:0 "เทคโนโลยี:"
 TUTORIAL_TECH_VIEW_DESC:1 "เดอะ§Sเทคโนโลยี§!หน้าจอคือที่ที่เราจะนํางานวิจัยของเรา สาขาเทคนิคแบ่งออกเป็น 3 สาขา แต่ละสาขามีทางเลือกวิจัย 3 อย่าง\n\nช่องข้อมูลที่มีอยู่£physics£ฟิสิกส์£society£สังคมและ£engineering£วิศวกรรม.\n\nเพื่อค้นคว้า§Sเทคโนโลยี§!;\n\n£dot_green£เลือก§Sเลือกการวิจัย§!ปุ่ม\n£dot_green£เลือกจากตัวเลือกที่มี\n\nกําหนดค่า§Sหัวหน้าฝ่ายวิจัย§!เร่งความเร็วขึ้น และได้รับการแนะนําอย่างมาก พวกเขา§Sสินค้า§!นอก จาก นั้น อาจ ให้ ประโยชน์ เพิ่ม เติม ได้ ด้วย.\n\nการ วิจัย อาจ ทํา โดย อัตโนมัติ ได้ ด้วย การ เลือก บน§Sเปิดใช้การค้นหาอัตโนมัติ§!ปุ่มในแต่ละสนาม\n\n$tttt$$ttt$£automate_research£\n"
 TUTORIAL_CONTACTSVIEW_EMPIRES_TITLE:0 "ที่อยู่ติดต่อ:"
 TUTORIAL_CONTACTSVIEW_EMPIRES_DESC:0 "ใน§Sที่อยู่ติดต่อ§!หน้าจอที่เราเห็นรายการรายละเอียดของทุก§Sจักรวรรดิ§!เราเคยเจอกันแล้ว พวกเขา§Sความคิดเห็น§!ในพวกเรานั้นมองเห็นเพียงชั่วพริบตา และเราสามารถเข้าไปมีส่วนร่วมอย่างง่ายและรวดเร็ว§Sการ ทํา แท้ง§!.\n\nรายการ แต่ ละ รายการ ยัง แสดง ราย ละเอียด สําคัญ เช่น§Sประเภทของรัฐบาล§!, §Sจริยธรรม§!และ§Sสถานะของจักรวรรดิ§!.\n\nจากตรงนี้ เราสามารถเข้าถึง§Sความแหลม:§!ปฏิบัติการและมุมมองที่มีอยู่§Sข้อตกลง§!กับแต่ละจักรวรรดิ"
 TUTORIAL_SITUATION_LOG_TITLE:0 "ระบบย่อย:"
 TUTORIAL_SITUATION_LOG_DESC:1 "เดอะ§Sบันทึกสถานการณ์§!แสดงรายการทั้งหมดของที่มีอยู่ในปัจจุบัน§Sโครงการพิเศษ§!, £archaeology£ §Sสถานที่โบราณคดี§!และอีกหลายๆ จุดที่น่าสนใจ\n\nรายการใหม่ ๆ จะปรากฏ ในขณะที่เราเริ่มต้นการสํารวจกาแลคซี"
 TUTORIAL_SHIP_DESIGNER_TITLE:0 "การ ควบคุม: นัก ออก แบบ เรือ"
 TUTORIAL_SHIP_DESIGNER_DESC:0 "ทั้งหมด§Sเรือ§!การใช้ภายในจักรวรรดิของเรา ถูกออกแบบมาที่นี่ สร้างนัดหมายใหม่สร้างนัดหมายใหม่สร้างนัดหมายใหม่สร้างนัดหมายใหม่ New§Sขนาดของเสียง§!ถึง§Sส่วนประกอบ§!จะปลดล็อคในขณะที่เราค้นคว้าเทคโนโลยีใหม่\n\nเพื่อสร้างใหม่§Sออกแบบ§!;\n\n£dot_green£เลือก§Sออกแบบใหม่§!ปุ่ม\n£dot_green£เลือก§Sเพิ่มขนาด§!\n£dot_green£เลือก§Sไม่มีหัวข้อ§!ปุ่มและเลือกปุ่ม§Sหัวข้อ§!\n\nตอนนี้ เลือกจากรายการที่มี§Sส่วนประกอบของเรือ§!โดยการเลือกบนช่องที่มีอยู่\n\n\n$tttt$$tt$£slot_component£\n\n\nเมื่อบันทึกไว้แล้ว การออกแบบใหม่นี้จะสามารถสร้างขึ้นได้§Sความแหลม:§!ด้วย§Sอู่ต่อเรือ§!."
 TUTORIAL_EMPIREVIEW_PLANETS_TITLE: "การ ศึกษา: ดาว เคราะห์ และ ส่วน ต่าง ๆ"
 TUTORIAL_EMPIREVIEW_PLANETS_DESC:5 "เดอะ§Sดาว เคราะห์ และ ขอบ เขต§!หน้าจอให้ภาพรวมของทุกโลกอาณานิคมของพวกเขา£pops£ §Sป๊อป§!และ§Sผลส่งออกของทรัพยากร§!.\n\nเมื่อจักรวรรดิเติบโต มันสามารถจัดเป็น§Sส่วน§!เข้าสู่การจัดการกระแส\n\n£vassal£ §Sดวงดาว§!สามารถสร้างจากที่มีอยู่§Sส่วน§!."
 TUTORIAL_MILITARY_FLEET_TITLE:0 "ศ."
 TUTORIAL_MILITARY_FLEET_DESC:2 "§Sกอง ทหาร รบ§!ใช้เพื่อปกป้องอาณาจักรที่เกิดใหม่ของเรา จากภัยคุกคาม หรือเพื่อขยายการปกครองอันรุ่งโรจน์ของเรา ผ่านกําลังของแขน\n\nขนาดของกองทัพเรือของเราถูกกําหนดโดยปัจจุบันของเรา§Sความจุเรือ§!ซึ่งตอนแรกมีข้อจํากัด อย่างไรก็ตาม มันสามารถเพิ่มขึ้นได้โดย\n\n£dot_green£สืบค้นใหม่§Sเทคโนโลยี§!\n£dot_green£การเจริญเติบโตของเรา£pops£ประชากร\n£dot_green£การสร้าง§Sฐาน ราก ของ ดาว§!\n\nเพื่อนํากองเรือของเรา เราสามารถมอบหมาย£commander£ §Sผู้บัญชาการ§!ให้อํานาจทางทหารพิเศษ พร้อมกับโบนัสอื่นๆ£leader£ §Sหัวหน้า§!ให้"
 TUTORIAL_SCIENCE_SHIP_TITLE:0 "การ สํารวจ:"
 TUTORIAL_SCIENCE_SHIP_DESC:4 "นี่คือของเรา£science_ship£ §Sยานวิทยาศาสตร์§!ซึ่งเคยถูกใช้§Sสํารวจ§!วัตถุดาราศาสตร์เช่น£planet£ §Sดาว เคราะห์§!ใน£system£ §Sระบบดาว§!. โลก จํา ต้อง ได้ รับ การ สํารวจ เพื่อ จะ สร้าง ดาว เคราะห์§Sทรัพยากร§!เห็นได้\n\nระบบ บ้าน ของ เรา ได้ รับ การ สํารวจ แล้ว ดัง นั้น เรา ควร มุ่ง ความ พยายาม ไป ที่ อื่น.\n\nกับ§Sยานวิทยาศาสตร์§!เลือกไว้;\n\n£dot_green£เลือกขวา เพื่อน§Sระบบ§!\n£dot_green£เลือก§Sระบบสํารวจ§!"
 TUTORIAL_CONSTRUCTION_SHIP_TITLE:0 "การ ควบคุม: ยาน ก่อ สร้าง"
 TUTORIAL_CONSTRUCTION_SHIP_DESC:1 "นี่คือของเรา£construction_ship£ §Sเรือก่อสร้าง§!ซึ่งใช้สร้างสถานีอวกาศ\n\nเมื่อวัตถุดาราศาสตร์เช่น£planet£ §Sดาว เคราะห์§!ได้รับการสํารวจ เราสามารถสั่งให้ยานสร้าง£science_ship£ §Sสถานีวิจัย§!หรือ£mining_station£ §Sสถานีทําเหมือง§!เพื่อใช้ประโยชน์จากทรัพยากรทุกอย่างที่มี\n\nพวกนี้§Sเรือ§!ยังถูกใช้ด้วย[GetBuildGrow] §Sฐานของดวงดาว§!โดยไม่อ้างคําพูด£system£ §Sระบบ§!ทําให้มันสําคัญต่อแผนขยายกิจการของเรา"
 TUTORIAL_PLANETVIEW_PLANET_TITLE:0 "พื้นผิว:"
 TUTORIAL_PLANETVIEW_PLANET_DESC:4 "เดอะ§Sพื้นผิว§!แท็บให้ภาพรวมของ£planet£ §Sดาวเคราะห์§!โครงสร้างพื้นฐานและสถานะ\n\nเดอะ£building£ §Sเขต และ อาคาร ต่าง ๆ§!ส่วน หนึ่ง แสดง ช่อง อาคาร ที่ สร้าง ขึ้น และ หา ได้ ใน เขต แต่ ละ เขต.\n\nเดอะ£district£ §Sขอบเขต§!ถึง§Sพื้นที่§!ให้£housing£ §Sทําใจให้สบาย§!, £job£ §Sงาน§!และทรัพยากร\n\nเดอะ§Sอัตโนมัติ§!การสลับตัวทําให้ดาวเคราะห์ สามารถจัดการตัวเองได้โดยอาศัยโฟกัส\n\nเดอะ§Sดาว เคราะห์§!แถบในส่วนบนสุดของการแสดงผลหน้าต่าง£stability£ §Sความจุ§!, £crime£ §Sอาชญากรรม§!และ (มะลาอิกะฮฺ) ผู้ควบคุมอย่างรัดกุม§Sผู้ว่า§!."
 TUTORIAL_PLANETVIEW_TILES_TITLE:1 "การ สอน: เศรษฐกิจ"
 TUTORIAL_PLANETVIEW_TILES_DESC:2 "เดอะ§Sเศรษฐกิจ§!แท็บให้ภาพรวมของ§Sงาน§!ถึง£job£ §Sงาน§!.\n\nเดอะ£planet£ §Sดาวเคราะห์§!ประชากรถูกจัดระเบียบเป็น§Sสตราตา§!ซึ่งสามารถขยายออกเพื่อเปิดเผย§Sงาน§!แบบ£pops£ §Sป๊อป§!จะเติมเต็มสเตราต้าเท่าที่จําเป็นเพื่อรักษา§Sงาน§!.\n\n§Sงาน§!บริโภคและผลิตทรัพยากร\n\nป๊อปส์ต้องการ£housing£§Sทําใจให้สบาย§!ถึง£amenities£ §Sคุณสมบัติ§!.\n\nการขาดแคลนของทั้งลดดาวเคราะห์£happiness£ §Sความสุข§!ซึ่งส่งผลกระทบต่อโดยรวม£stability£ §Sความจุ§!."
 TUTORIAL_PLANETVIEW_COMBAT_TITLE:0 "การ สอน: กองทัพ"
 TUTORIAL_PLANETVIEW_COMBAT_DESC:4 "เดอะ§Sเครื่อง§!แท็บจัดการกองกําลังภาคพื้นดินทั้งหมดบนโลก มันติดตามได้ว่า§Sชื่อ=ไดเรกทอรีชื่อ§!หรือความเสียหาย£planet£ §Sดาว เคราะห์§!ต้องทนทุกข์ทรมาน\n\nสร้างนัดหมายใหม่สร้างนัดหมายใหม่สร้างนัดหมายใหม่สร้างนัดหมายใหม่ New§Sเครื่อง§!ถูกยกที่นี่ โดยการเลือก§Sกลับค่าเดิม§!กระดุม\n\n§Sกองทัพป้องกัน§!จะผลิตอัตโนมัติโดย£pops£ §Sป๊อป§!ผู้บังคับการทํางานหรือ[soldier.GetName] §Sงาน§!นี่£job£ §Sงาน§!จัดหาโดย ดาวเคราะห์เมืองหลวง£building£ §Sเรือน ที่ มี ลักษณะ พิเศษ§!และ£building£ §Sป้อม ปราการ§!."
 TUTORIAL_PLANETVIEW_SPACEPORT_TITLE:0 "สถานีท่ายานอวกาศ"
 TUTORIAL_PLANETVIEW_SPACEPORT_DESC:3 "เดอะ§Sโพสต์§!แท็บคือที่ที่เรามองกองเรือโคจร[GetBuildGrow]เรือพลเรือนใหม่ เรือทหารเท่านั้นที่สามารถสร้างขึ้นที่§Sความแหลม:§!มีอุปกรณ์§Sอู่ต่อเรือ§!แต่การสร้าง วิทยาศาสตร์ และ§Sเรือ โคนี§!ทั้งหมดถูกสร้างที่นี่\n\nแม้ว่าเราจะสูญเสียครั้งสุดท้ายฐานดวงดาวเรายังคงมีหนทางที่จะขยายและสร้างใหม่ ตราบเท่าที่เรามี อย่างน้อยหนึ่งคนที่อาศัยอยู่£planet£ §Sดาว เคราะห์§!."
 TUTORIAL_MILITARY_STATION_TITLE:0 "สถานีทหาร"
 TUTORIAL_MILITARY_STATION_DESC:2 "§Sสถานี ทหาร§!เป็นการป้องกันแบบคงที่ ที่สามารถใช้ปกป้องสิ่งสําคัญ£planet£ §Sดาว เคราะห์§!หรือเส้นทางยุทธศาสตร์ของวิธีการ แต่สามารถสร้างได้เฉพาะภายในเขตแดนหรือดินแดนของเราเท่านั้น ที่เราเข้าถึงได้เป็นพิเศษ\n\nระวังตัวนะ[GetBuildGrow]มากเกินไป - เช่น§Sเรือ§!ค่าใช้จ่ายที่เพิ่มขึ้นของพวกเขาจะเป็น การระบายของเศรษฐกิจของเรา"
 TUTORIAL_RESEARCH_STATION_TITLE:0 "การสอน:การวิจัยสถานี"
 TUTORIAL_RESEARCH_STATION_DESC:1 "A£science_ship£ §Sสถานีวิจัย§!ที่สร้างขึ้นในวงโคจร ของร่างกายดาวเคราะห์จะรวบรวม£physics£ §Sฟิสิกส์§!, £engineering£ §Sวิศวกรรม§!ถึง£society£ §Sสังคม§!ข้อมูลงานวิจัย\n\nมันสร้างได้เฉพาะภายในเขตแดนของเรา และมันไม่จําเป็น£planet£ §Sดาว เคราะห์§!เป็นอาณานิคมไปแล้ว"
 TUTORIAL_MINING_STATION_TITLE:0 "สถานีขุดแร่"
 TUTORIAL_MINING_STATION_DESC:2 "£mining_station£ §Sสถานีทําเหมือง§!ใช้เพื่อสกัด£minerals£ §Sเหมือง§!ถึง£strategic_resource£ §Sทรัพยากรเส้นรุ้ง§!ของวัตถุที่พวกเขาโคจร\n\n§Sสถานีทําเหมือง§!ไม่ จําเป็น ต้อง ใช้ ทรัพยากร ของ การ ตั้ง อาณานิคม£planet£ §Sดาว เคราะห์§!และสามารถสร้างได้เฉพาะในเขตแดนของเรา"
 TUTORIAL_TRANSPORT_SHIP_TITLE:0 "การ เดิน เรือ"
 TUTORIAL_TRANSPORT_SHIP_DESC:0 "เมื่อ§Sเครื่อง§!สั่งซื้อในพื้นที่พวกเขาอัตโนมัติเริ่มบนเหล่านี้§Sการส่งจดหมาย§!เรือ จง ทํา ให้ แน่ ใจ ว่า จะ ปก ป้อง พวก เขา เนื่อง จาก พวก เขา ค่อน ข้าง จะ ป้องกัน ตัว ไม่ ได้!"
 TUTORIAL_DIPLOMACY_VIEW_TITLE:0 "การ ทํา แท้ง: การ ทํา แท้ง"
 TUTORIAL_DIPLOMACY_VIEW_DESC:3 "เดอะ§Sการ ทํา แท้ง§!หน้าจอคือที่ที่เราสื่อสาร กับอารยธรรมอื่น ๆ ที่นี่เราสามารถ§Sประกาศสงคราม§!สร้าง§Sเครือข่ายสปีชี§!กับเพื่อนบ้านของเรา หรือการจัดตั้ง§Sพันธมิตร§!ถึง§Sข้อตกลงการค้า§!กับพวกเขา เราสามารถเห็นกระแส§Hระดับข้อมูล§!.\n\nคุณ§Sความสัมพันธ์§!ด้วยการเลือกจักรวรรดิจะแสดงเป็นหนึ่งในห้าระดับ, เสียงจาก 'ช่อง' ถึง 'เซลล์' เพื่อทําข้อตกลงหรือข้อตกลง คุณต้องมีความสัมพันธ์ที่เพียงพอ\n\nคุณสามารถกําหนด£envoy£ §Sซองจิน§!ถึงจักรวรรดิเพื่อให้§Sเส้นพริ้วไหว§!จงรวบรวม (ผู้ได้รับบันทึกว่า)§Sข้อมูล§!ผ่าน§Sความสัมพันธ์§!ต้องการหรือ§Sปรับปรุง§!หรือ§Sความ เกี่ยว พัน ใกล้ ชิด§!."
 TUTORIAL_DIPLOMACY_VIEW_TRADE_TITLE:0 "การ สอน: การ ค้า"
 TUTORIAL_DIPLOMACY_VIEW_TRADE_DESC:0 "นี่คือ§Sสลับหน้าจอ§!เราสามารถแลกเปลี่ยนชนิดใดของ§Sทรัพยากร§!ด้วยจักรวรรดิเช่นเดียวกัน§Sข้อมูล§!ถึง§Sความชอบ§!.\n\nอาจ ใช้ ประโยชน์ จาก การ เพิ่ม ขึ้นจักรวรรดิความเต็มใจที่จะยอมรับข้อตกลง นอกจากนี้คุณยังสามารถเรียกความโปรดในระหว่างการร้องตะโกน บนชั้นวุฒิสภาใน§Hชุมชน กาแลกติก§!เพื่อเพิ่มความเหลื่อมล้ํา"
 TUTORIAL_DIPLOMACY_VIEW_FEDERATION_TITLE:0 "ประเภทของสหพันธรัฐ"
 TUTORIAL_DIPLOMACY_VIEW_FEDERATION_DESC:0 "§Sประเภทของสหพันธรัฐ§!กําหนดสิ่งที่โฟกัสของ£federation£ §Sสหพันธรัฐ§!จะเป็นแบบนั้น สหพันธ์แต่ละประเภทมีการเริ่มต้นที่ไม่ซ้ํากัน§Sความ ทะเยอทะยาน และ กฎหมาย§!และจะ§Sปลดล็อค§!เพิ่มเพอร์คเมื่อได้ XP"
 TUTORIAL_DIPLOMACY_VIEW_HIGHINTEL_TITLE:0 "ข้อมูลระดับสูง"
 TUTORIAL_DIPLOMACY_VIEW_HIGHINTEL_DESC:0 "เราถึงแล้ว§Sระดับข้อมูลสูง§!ด้วยสิ่งนี้จักรวรรดิดังนั้น จึงมีการเข้าถึง ข้อมูลมากขึ้นเกี่ยวกับพวกเขา\n\nรักษาข้อมูลระดับสูงไว้ด้วยจักรวรรดิจะทําให้แน่ใจว่าเรามีข้อมูลของพวกเขา§Sจริยธรรม§!ถึง§Sซิฟิค§!พวกเขา§Sความสัมพันธ์§!กับจักรวรรดิอื่น ๆ และของพวกเขา§Sเทคโนโลยี§!, §Sเศรษฐกิจ§!ถึง§Sทหาร§!อํานาจเทียบกับเรา"
 TUTORIAL_DIPLOMACY_VIEW_LOWINTEL_TITLE:0 "ข้อมูลต่ํา"
 TUTORIAL_DIPLOMACY_VIEW_LOWINTEL_DESC:0 "ของเรา§Sระดับข้อมูล§!ด้วยสิ่งนี้จักรวรรดิกําลังลดลง เราเสี่ยงที่จะสูญเสียข้อมูล ที่เราได้รวบรวมมาก่อนหน้านี้เกี่ยวกับพวกเขา§Sเก่า§!เมื่อเวลาผ่านไป\n\nเพื่อเพิ่มข้อมูล§Sระดับข้อมูล§!;\n\n£dot_green£คงไว้§Sข้อ ตก ลง ด้าน จริยธรรม§!\n£dot_green£กําหนด£envoy£ §Sซองจิน§!เพื่อปรับปรุงความสัมพันธ์\n£dot_green£สร้าง§Sเครือข่ายสเปก§!\n£dot_green£ตั้ง§Sสถานทูต§!ในอาณาเขตของพวกเขา"
 TUTORIAL_PLANETVIEW_ADJACENCY_BONUS_TITLE:2 "ลูกเล่นความไวแสง"
 TUTORIAL_PLANETVIEW_ADJACENCY_BONUS_DESC:2 "บาง£building£ §Sอาคาร§!อาจเป็นสาเหตุ§Sลูกเล่นความไวแสง§!ถึงคนอื่น ๆ§Sอาคาร§!ในประเทศใกล้เคียง§Sเดอะชราวด์§!ให้ เรา พิจารณา เรื่อง นี้ เมื่อ สร้าง อาคาร ใหม่."
 TUTORIAL_GOVERNMENTVIEW_BUDGET_TITLE:0 "งบ"
 TUTORIAL_GOVERNMENTVIEW_BUDGET_DESC:0 "เดอะ§Sงบ§!วัดรายเดือนของจักรวรรดิเรา§Sรายได้§!ถึง§Sจํานวนตัวอักษรที่จะแทนที่§!ด้วยกลอุบายเครดิตพลังงานที่นี่เราสามารถติดตาม ผลกระทบต่างๆ ที่มีอิทธิพลต่อเศรษฐกิจของเรา"
 TUTORIAL_GOVERNMENTVIEW_DECISIONS_TITLE:2 "ประกาศคำสั่ง"
 TUTORIAL_GOVERNMENTVIEW_DECISIONS_DESC:4 "ที่นี่จักรวรรดิกว้าง§Sพระราชบัญญัติ§!การปฏิบัติที่สามารถดําเนินการได้โดยการใช้ทรัพยากรบางส่วนของเรา สามารถดําเนินการได้\n\nมีค่าใช้จ่ายรักษารายเดือน ซึ่งสามารถครอบคลุมได้โดย§H$EDICT_FUND$§!หรือใช้£unity£ §Yเอกภาพ§!."
 TUTORIAL_GOVERNMENTVIEW_DEMOGRAPHICS_TITLE:0 "การ เพ่ง ดู โลก"
 TUTORIAL_GOVERNMENTVIEW_DEMOGRAPHICS_DESC:0 "เดอะ§Sสถิติ§!บันทึกประวัติการแต่งหน้า และการแพร่กระจายของประชากรจักรวรรดิของเรา\n\nมันแสดงถึงอํานาจ§Sสินค้า§!ท่ามกลางพวกเรา£pops£ §Sป๊อป§!รวมถึงการแบ่งส่วนการผลิตและ£happiness£ §Sความสุข§!หลายๆ อย่าง"
 TUTORIAL_EMPIREVIEW_LEADERS_TITLE:0 "ความ หมาย: ผู้ นํา"
 TUTORIAL_EMPIREVIEW_LEADERS_DESC:1 "เดอะ§Sผู้นํา§!หน้าจอให้ภาพรวมของ£leader£ §Sผู้นํา§!และให้เราจ้าง, ยกเลิก และจัดการพวกเขา\n\nA ผู้นำ'§Sชั้น§!กําหนดงานของพวกเขาที่เป็นไปได้ทั่วจักรวรรดิของเรา และตําแหน่งอะไรใน§Sสภา§!พวกเขาสามารถกินได้\n\nมี§Sผู้นํา§!ความ สดชื่น เป็น ระยะ ๆ แต่ เนื่อง จาก มี ขีด จํากัด ความ สามารถ จึง ทํา ให้ มี เวลา มาก ขึ้น และ มี ประสบการณ์ ที่ ช้า. จง กําจัด ผู้ นํา ที่ เกิน ควร ออก ไป เพื่อ หลีก เลี่ยง การ ลง โทษ เหล่า นี้."
 TUTORIAL_EMPIREVIEW_FACTIONS_TITLE:0 "ข้อ เท็จ จริง"
 TUTORIAL_EMPIREVIEW_FACTIONS_DESC:4 "เดอะ§Sข้อ เท็จ จริง§!หน้าจอแสดงภาพรวม ของความเอียงทางการเมืองของประชาชน จง ตระหนัก ว่า การ เปลี่ยน แปลง ใน สภาพ แวด ล้อม ทาง สังคม อาจ ทํา ให้ เกิด§Sข้อ เท็จ จริง§!สืบค้นเมื่อ§Sการกระทํา§!ขนาด มีเสน่ห์£pops£ §Sป๊อป§!และ พวก เขา อาจ มี ความ อิ่ม ใจ พอ ใจ เพียง ไร ใน ที่ นี้ ด้วย.\n\n§Sข้อ เท็จ จริง§!มี§Sประเด็น§!ที่มีความสําคัญต่อโดยรวมของพวกเขา§Sอนุมัติ§!และนโยบายของเราและการกระทําในฐานะชาติอาจไม่พอใจหรือโปรด จัดกลุ่มเหล่านี้ทําให้เพิ่มขึ้น£unity£ §Sเอกภาพ§!รุ่น\n\nความแข็งแกร่งของ§Sข้อ เท็จ จริง§!และธรรมชาติของพวกเขา§Sประเด็น§!สามารถเปลี่ยนแปลงได้ พร้อมกับสถานการณ์ของเรา แต่จําไว้ว่า£happiness£ §Sความสุข§!ของ§Sป๊อป§!อาจได้รับผลกระทบจาก§Sอนุมัติ§!ของ§Sการกระทํา§!มันเป็นของ\n\nเรายังสามารถ§Sจัดการข้อเท็จจริง§!เพื่อจัดการความสัมพันธ์ระหว่าง§Sการกระทํา§!และรัฐแม้จะเป็นไปถึง การโอบกอดของพลัง§Sการกระทํา§!."
 TUTORIAL_CREATESECTOR_TITLE:0 "การจัดการขอบเขต:"
 TUTORIAL_CREATESECTOR_DESC:2 "เพื่อจัดตั้ง§Sส่วน§!ให้เลือกก่อน£planet£ §Sดาว เคราะห์§!ใน§Sพื้นที่ว่าง:§!และกดปุ่มสร้างส่วน นี้จะทําให้ดาวเคราะห์§Sเมือง หลวง§!ของภาคใหม่และทุกระบบอวกาศชายแดน ภายในหกกระโดดไฮเปอร์จะ เพิ่มเข้าไป ส่วน ต่าง ๆ อาจ ทํา ให้ การ สร้าง ดาว เคราะห์ เป็น ระเบียบ£building£ §Sอาคาร§!บนดาวเคราะห์ภายในพวกเขาถ้าเปิดใช้ตัวเลือกนี้ และพวกเขาได้รับทรัพยากรที่ลดความ จําเป็นอย่างมากสําหรับการบํารุงรักษาไมโคร"
 TUTORIAL_CONTACTSVIEW_SPECIES_TITLE:0 "การสอน:เผ่าพันธุ์"
 TUTORIAL_CONTACTSVIEW_SPECIES_DESC:2 "เดอะ§Sชนิด§!หน้าจอรายการทุกชนิดของสิ่งมีชีวิตที่ฉลาดระบุ เราได้ได้พบกับ เราทําได้§Sเปิด/ ปิด§!ที่จะแสดงเฉพาะประชากรของจักรวรรดิของเรา หรือทุกคนที่รู้จักกันปฏิเสธของกาแลคซี\n\nการเข้าถึงและช่วยเหลือเทคโนโลยี เราสามารถ§Sแก้ไข§!ลักษณะของสายพันธุ์§Sยก§!สิ่งมีชีวิตในยุคก่อนและ§Sตั้งค่าสิทธิ์ปริยาย§!สําหรับพวกเราทุกคน£pops£ §Sป๊อป§!หรือ§Sตั้งค่าด้านขวา§!ต่อสายพันธุ์สําหรับประชาชนที่นี่"
 TUTORIAL_PLANETVIEW_TERRAFORM_TITLE:0 "เทอร์ราฟอร์ม"
 TUTORIAL_PLANETVIEW_TERRAFORM_DESC:0 "§Sการแปลงรูปแบบ§!ช่วยให้เราเปลี่ยนแปลงสภาพสิ่งแวดล้อมของ£planet£ §Sดาว เคราะห์§!เพื่อให้เหมาะกับ§Sชนิด§!หรือจุดประสงค์"
 TUTORIAL_GENEMODIFICATION_TITLE:0 "การดัดแปลงพันธุกรรม"
 TUTORIAL_GENEMODIFICATION_DESC:1 "เราสามารถสร้างสปีชีส์ทางพันธุกรรมได้ แก้ไขสายพันธุ์นี้§Sสินค้า§!.\n\nนี้จะสร้างสายพันธุ์ใหม่§Sแม่แบบ§!กับลักษณะใหม่ที่คุณได้เลือก ก่อนที่จะมี£pops£ §Sป๊อป§!ของสายพันธุ์เหล่านี้มีการเปลี่ยนแปลงจริงๆ คุณจะต้องเลือกบน§Sปรับใช้แม่แบบ§!ปุ่มสร้างใหม่§Sโครงการพิเศษ§!."
 TUTORIAL_UPLIFTING_TITLE:0 "การยกระดับ"
 TUTORIAL_UPLIFTING_DESC:0 "เราสามารถแก้ไข§Sสินค้า§!ของสัตว์ที่ฉลาดเหล่านี้และ§Sยก§!พวกเขาจะกลายเป็น พลเมืองที่เจริญรุ่งเรืองของจักรวรรดิเรา"
 TUTORIAL_SYSTEMVIEW_TITLE:0 "ระบบดาวแสดง"
 TUTORIAL_SYSTEMVIEW_DESC:0 "เราเข้ามาแล้ว§Sมุมมองของระบบ§!มองขึ้นไปใกล้ๆ£system£ §Sระบบดาว§!ที่นี่เราสามารถค้นหาภาพ£planet£ §Sดาว เคราะห์§!ทั้งสถานีและกองเรือ สบายๆ"
 TUTORIAL_WORMHOLE_STATION_TITLE:0 "สถานีอุกาบาต"
 TUTORIAL_WORMHOLE_STATION_DESC:0 "§Sรูหนอน§!สร้างขึ้นบนขอบนอกของ£system£ §Sระบบ§!การหล่อหลอมน้ําตานาทีในพื้นที่เวลา เป็นประตูสองทางไปยังดาวดวงอื่น หยาบคาย"
 TUTORIAL_OBSERVATION_STATION_TITLE:0 "การ เพ่ง ดู โลก"
 TUTORIAL_OBSERVATION_STATION_DESC:1 "§Sโพสต์ความ อ ยุติธรรม§!ทีมบ้าน£scientist£ §Sนักวิทยาศาสตร์§!นํา การ ค้นคว้า และ การ สังเกต จาก ไกล§Sก่อนหน้าความเร็ว§!สายพันธุ์ใน£planet£ §Sดาว เคราะห์§!มันโคจรรอบดวงอาทิตย์\n\nขึ้นอยู่กับจักรวรรดิของคุณ§Sจริยธรรม§!และเทคโนโลยี,คุณสามารถเลือกระหว่าง การสังเกตแบบเฉย ๆ, อิทธิพลทางวัฒนธรรม, ความรู้ทางเทคโนโลยี, หรือแม้กระทั่งการลักพาตัว\n\nการตัดสินใจเหล่านี้มีผลกระทบต่อวิธีการวิวัฒนาการของอารยธรรม และพวกเขามองจักรวรรดิของคุณอย่างไร"
 TUTORIAL_TERRAFORMING_STATION_TITLE:0 "สถานีปรับสภาพดาว"
 TUTORIAL_TERRAFORMING_STATION_DESC:0 "§Sสถานีปรับสภาพดาว§! ทำให้สามารถทำ §Sการปรับสภาพ§! ดาวเคราะห์ที่พวกมันโคจร"
 TUTORIAL_PLANETVIEW_EDICTS_TITLE:2 "การตัดสินใจ"
 TUTORIAL_PLANETVIEW_EDICTS_DESC:3 "เหล่านี้เป็นการกําหนดดาวเคราะห์§Sการ ตัดสิน ใจ§!คําสั่ง หรือ กิจ ปฏิบัติ ที่ อาจ ถูก บังคับ อยู่ ชั่ว คราว โดย การ ใช้ ทรัพยากร บาง อย่าง ของ เรา.\n\nสร้างนัดหมายใหม่สร้างนัดหมายใหม่สร้างนัดหมายใหม่สร้างนัดหมายใหม่ New§Sการ ตัดสิน ใจ§!อาจ หา งาน ได้ ขณะ ที่ เรา ค้นคว้า เทคโนโลยี ใหม่ ๆ และ เผชิญ สถานการณ์ ใหม่ ๆ."
 TUTORIAL_UNKNOWN_ALIEN_FLEET_TITLE:1 "ไม่ทราบ"
 TUTORIAL_UNKNOWN_ALIEN_FLEET_DESC:2 "นี่คือ§Sองค์กรที่ทําการท่องอวกาศไม่ทราบชื่อ§!เราสามารถเรียนรู้เกี่ยวกับพวกเขามากขึ้น และอาจจะเริ่มต้น§Sที่อยู่ติดต่อแรก§!โดยเติมเต็มสิ่งที่เหมาะสม§Sโครงการพิเศษ§!."
 TUTORIAL_VICTORY_TITLE:0 "คํา พยากรณ์: ชัย ชนะ"
 TUTORIAL_VICTORY_DESC:0 "หน้าต่าง §Sชัยชนะ§! มีรายการ §Sเงื่อนไขบางประการ§! ที่เราสามารถพยายามเติมเต็ม เพื่อให้แน่ใจว่ามรดกตกทอดนี้จะคงอยู่ตราบเท่าที่มีสิ่งมีชีวิตทรงภูมิปัญญาในกาแล็กซี"
 TUTORIAL_OUTPOST_STATION_TITLE:1 "คํา พยากรณ์: ฐาน ของ ดาว"
 TUTORIAL_OUTPOST_STATION_DESC:4 "นี่คือระบบของเรา§Sความแหลม:§!. สถานีที่ยกระดับได้เหล่านี้ ทําเครื่องหมายความเป็นเจ้าของระบบดาว และมักจะได้รับมอบหมายให้ผลิตทุกประเภท§Sเรือ§!.\n\nเราขยายเขตแดนของเราโดย[GetBuildingGrowing] §Sฐานของดวงดาว§!ในระบบใกล้เคียง\n\nศัตรู§Sฐานของดวงดาว§!สามารถถูกจับได้โดยการโจมตี\n\n§Sฐานของดวงดาว§!สามารถทําหน้าที่หลากหลายได้§Sมอดูล§!ถึง£building£ §Sอาคาร§!นอก จาก นั้น พวก เขา ยัง ทํา หน้า ที่ เป็น หน่วย ป้องกัน กอง เรือ ศัตรู ใน ระบบ."
 TUTORIAL_GALAXY_MAP_TITLE:0 "แผนที่กาแล็กซี"
 TUTORIAL_GALAXY_MAP_DESC:0 "เดอะ§Sแผนที่แกแล็กซี§!แสดงแถบขนาดใหญ่§Sช่องว่างที่ยังไม่ใช้§!ขอบเขตของเขตแดนของเรา และดินแดนของอารยธรรม คนต่างด้าวใด ๆ ที่เราอาจจะได้จัดตั้ง การสื่อสารด้วย\n\nเราสามารถเลือก§Sโหมดของแผนที่รายละเอียด§!ปุ่มในแถบเมนูด้านล่างขวาที่จะสลับค่า§Sทรัพยากร§!ถึง§Sช่วงของตัวตรวจจับ§!แสดง"
 TUTORIAL_WAR_GOAL_TITLE:0 "เป้าหมายสงคราม"
 TUTORIAL_WAR_GOAL_DESC:0 "เมื่อประกาศสงคราม เราต้องประกาศจุดประสงค์ของเรา ทั้งต่อศัตรูและพันธมิตร นี่§Sเป้าหมายสงคราม§!กําหนดชนิดของความต้องการที่เราสามารถกดในระหว่างการเจรจาสันติภาพที่ดังจาก£system£ §Sระบบ§!เพื่อขยายพื้นที่\n\nนําเสนอเป้าหมายนี้ ให้โอกาสศัตรู ตอบสนองอย่างเหมาะสม - พวกเขาอาจยอมแพ้ทันที นําเสนอข้อเสนอค้านและสงบศึก การ รู้ จัก ความ สนุก เป็น ส่วน หนึ่ง ของ ความ สนุก!\n\nเพื่อประกาศ§Sเป้าหมายสงคราม§!เลือกมันในรายการ"
 TUTORIAL_WAROVERVIEW_TITLE:0 "ภาพรวมของสงคราม"
 TUTORIAL_WAROVERVIEW_DESC:0 "หน้าต่างนี้แสดงภาพรวมของสงครามในปัจจุบันของเรา แต่ละด้านทรมาน§Sสงคราม§!ขึ้นอยู่กับว่าสงครามกําลังดําเนินอยู่อย่างไร ซึ่งเป็นตัวตัดสินว่า พวกเขาเต็มใจรับข้อตกลงสันติภาพอย่างไร\n\nถ้าสงครามไกลถึง 100% สําหรับด้านหนึ่ง อีกด้านหนึ่งสามารถบังคับ§Sสถานะ Quo§!ตกลง ผลของการหมั้นทั้งหมด ที่ได้ต่อสู้มายาวนาน ในสงครามนี้ยังติดตามได้อีกด้วย"
 TUTORIAL_STRATEGIC_RESOURCES_TITLE:0 "ทรัพยากรเส้นรุ้ง"
 TUTORIAL_STRATEGIC_RESOURCES_DESC:2 "เดอะ§Hทรัพยากรเส้นรุ้ง§!แคตตาล็อกของหน้าจอ£strategic_resource£ §Sทรัพยากรเส้นรุ้ง§!และผลกระทบของพวกเขา\n\nมาก§Sทรัพยากรเส้นรุ้ง§!ต้องเจาะจง§Sเทคโนโลยี§!ที่จะค้นคว้าก่อนที่จะถูกขุดและใช้ประโยชน์ได้"
 TUTORIAL_EXPANSION_PLANNER_TITLE:0 "การ สอน: แผน ขยาย พันธุ์"
 TUTORIAL_EXPANSION_PLANNER_DESC:2 "ใน§Hผู้วางแผนการขยาย§!เราเจอใกล้ๆ§Sทําได้ทั่วไป§! £planet£ §Sดาว เคราะห์§!ซึ่งอาจนําเสนอโอกาส สําหรับการตั้งอาณานิคม เราทําได้[GetBuildGrow] £colony_ship£ §Sเรือ โคนี§!และออกคําสั่งโดยตรงจากจอนี้\n\nดาว เคราะห์ ต่าง ๆ ต้อง ได้ รับ การ สํารวจ และ ความ ผิด ปกติ ใด ๆ ที่ พบ บน ดาว เคราะห์ นี้ ต้อง ได้ รับ การ วิจัย ก่อน ที่ ดาว เคราะห์ นี้ จะ ถูก ตั้ง อาณานิคม.\n\nA§Sความแหลม:§!ต้องถูกสร้างขึ้นใน§Sดาวเคราะห์§! £system£ §Sระบบ§!เพื่อให้มันอยู่ในเขตแดนของเรา"
 TUTORIAL_TRADITIONS_TITLE:0 "ประเพณี: ประเพณี"
 TUTORIAL_TRADITIONS_DESC:1 "เดอะ§Hประเพณี§!แสดงหน้าจอ§Sต้น ไม้ ตาม ประเพณี§!มีให้จักรวรรดิของเรา\n\nA§Sต้น ไม้ ตาม ประเพณี§!ต้องมาก่อน§Sรับสมัคร§!ก่อนที่จะมี£traditions£ §Sประเพณี§!ภายในมันสามารถปลดล็อคได้\n\n§Sการรับบุตรบุญธรรม§!คือ§Sต้น ไม้ ตาม ประเพณี§!หรือปลดล็อค§Sประเพณี§!ราคาบางส่วน£unity£ §Hเอกภาพ§!และราคาเพิ่มขึ้นเมื่อเราปลดล็อค§Sประเพณี§!และจักรวรรดิของเราเติบโต\n\nเพื่อรับเลี้ยง§Sต้น ไม้ ตาม ประเพณี§!;\n\n£dot_green£เลือก§Sเลือก§!ปุ่ม\n£dot_green£เลือก§Sรับเลี้ยง§!ปุ่มบนต้นไม้ที่ต้องการ\n\nมี§Sประเพณี§!สามารถมองได้โดยการบินอยู่เหนือ§Sต้น ไม้ ตาม ประเพณี§!."
 TUTORIAL_TRADITIONS_SELECT_TITLE:0 "รับ เอา ต้น ไม้ ตาม ประเพณี"
 TUTORIAL_TRADITIONS_SELECT_DESC:1 "หน้าจอนี้แสดงทั้งหมด§Hต้น ไม้ ตาม ประเพณี§!มีให้จักรวรรดิของเรา ที่นี่คุณสามารถตรวจสอบทั้งหมด£traditions£ §Hประเพณี§!ในแต่ละต้นไม้และ§Hรับมาเลี้ยง§!ถึง§Hลูกเล่นเติมให้สมบูรณ์§!.\n\nฉันแนะนําบางอย่าง§Hต้น ไม้ ตาม ประเพณี§!ให้คุณเริ่ม"
 TUTORIAL_TRADITIONS_NEW_TITLE:0 "ต้นไม้ หรือ ประเพณี"
 TUTORIAL_TRADITIONS_NEW_DESC:0 "เมื่อจักรวรรดิของเรามีเพียงพอ£unity£ §Hเอกภาพ§!คุณก็เหมือนกัน§Hเลือก§!คือ§Hต้นไม้ใหม่§!หรือ£traditions£ §Hประเพณี§!ในต้นไม้ที่ท่านเลือกก่อนหน้านี้"
 TUTORIAL_ASCENSION_PERKS_TITLE:0 "คํา แนะ นํา: ทํา ตาม คํา แนะ นํา"
 TUTORIAL_ASCENSION_PERKS_DESC:0 "เดอะ§Hความแหลม:§!แสดงรายการ§Sความแหลม:§!ว่าเราสามารถปลดล็อคได้ บาง§Sความแหลม:§!อาจจะมีความต้องการพิเศษเช่น§Sเทคโนโลยี§!หรือมีการจํากัดจํานวน§Sแว่นขยายเพอร์ค์§!.\n\nขนาด§Hปลั๊กอินเพอร์ค์§!จะปลดล็อคเมื่อใดก็ตามที่เรารับทั้งหมด£traditions£ §Hประเพณี§!ในหนึ่ง§Sต้น ไม้ ตาม ประเพณี§!."
 TUTORIAL_SPECIES_RIGHTS_TITLE:0 "การสอน:เผ่าพันธุ์ลิขสิทธิ์"
 TUTORIAL_SPECIES_RIGHTS_DESC:1 "เดอะ§Hสิทธิ ของ เผ่า พันธุ์§!รายชื่อช่วยให้เราได้ปรับแต่ง§Sพลเมือง§!ถึง§Sมาตรฐาน ที่ มี ชีวิต§!ของสปีชีส์บางอย่าง ในบรรดาสิ่งอื่นๆ\n\nเมื่อทําการปรับแต่ง§Sลิขสิทธิ์ปริยาย§!สิทธิใช้ได้กับทุกคน£pops£ §Sป๊อป§!ที่ยังไม่ได้ระบุ§Sสิทธิ ของ เผ่า พันธุ์§!ตั้ง ผู้ อพยพ, ผู้ ลี้ ภัย, หรือ ผู้ มา ใหม่ คน อื่น ๆ ให้ ประเทศ ของ เรา."
 TUTORIAL_FLEET_MANAGER_TITLE:0 "การสอน:กองยานผู้จัดการ"
 TUTORIAL_FLEET_MANAGER_DESC:0 "ใน §Sตัวจัดการกองยาน§! เราสามารถสร้างเทมเพลต(แม่แบบ)สำหรับกองยานรบของเรา เมื่อกองยานของเรามีขนาดใหญ่ขึ้น เทมเพลตเหล่านี้ทำให้ง่ายต่อการสั่งผลิตทดแทนได้อย่างรวดเร็วและพร้อมสำหรับความสูญเสียใดๆที่อาจเกิดขึ้นได้ตลอดเวลา"
 TUTORIAL_CLAIMS_VIEW_TITLE:0 "การอ้างอิง:"
 TUTORIAL_CLAIMS_VIEW_DESC:0 "ผ่าน§Sอ้าง§!อินเตอร์เฟส เราใช้เงิน£influence£ §Sอิทธิพล§!เพื่ออ้างสิทธิ์£system£ §Sระบบดาว§!ของคนอื่น\n\nกําลังอ้างสิทธิ์§Sระบบ§!ให้ข้อมูลที่ใช้ได้กับเรา§Sคาซัส เบลี§!การ ต่อ ต้าน เจ้า ของ ทํา ให้ เรา ประกาศ สงคราม เพื่อ จะ เอา ชนะ สงคราม ได้.\n\nใน สงคราม ที่ เกี่ยว ข้อง กับ พันธมิตร หลาย ชนิด จักรวรรดิ มี ความ สูง สุด§Sอ้าง§!บน§Sระบบ§!จะเป็นคนที่ได้เป็นเจ้าของ ในบทสรุปที่ประสบความสําเร็จของสงคราม"
 TUTORIAL_ANOMALIES_TITLE:0 "คํา แนะ นํา: โรค โลหิต จาง"
 TUTORIAL_ANOMALIES_DESC:0 "เดอะ§Sโรค โลหิต จาง§!รายการหน้าจอที่ยังไม่ได้ทําการค้นหา§Sโรค โลหิต จาง§!เราได้พบกับสถานที่ของพวกเขา นี่สามารถตรวจสอบได้โดยใช้£science_ship£ §Sยานวิทยาศาสตร์§!ขอสาบานต่อมะลาอิกะฮ. ผู้จัดสรรการงาน£scientist£ §Sนัก วิทยาศาสตร์§!."
 TUTORIAL_GOVERNMENTVIEW_MARKET_TITLE:0 "การ สอน: ตลาด ภาย ใน"
 TUTORIAL_GOVERNMENTVIEW_MARKET_DESC:0 "ผ่าน£market£ §Sตลาด§!จอเราสามารถซื้อและขายทรัพยากร ในตอนแรกนี้เป็นเพียงตลาดภายใน แต่ถ้าจักรวรรดิเพียงพอ การตั้งค่าการติดต่อ พวกเขาอาจจะ§Sตลาด แกแล็กติก§!.\n\nทรัพยากรสามารถซื้อและขายได้ที่นี่โดยใช้ของคุณ£trade£ §Sสลับ§!หุ้นซึ่งทําหน้าที่เป็นเงิน ค่า ใช้ จ่าย ที่ เปลี่ยน ไป\n\n§Sแลกเปลี่ยนอัตโนมัติ§!นอก จาก นี้ ยัง สามารถ จัด การ เรื่อง ราว ได้ ทุก เดือน."
 TUTORIAL_GOVERNMENTVIEW_SLAVE_MARKET_TITLE:0 "การ สอน: ตลาด ทาส"
 TUTORIAL_GOVERNMENTVIEW_SLAVE_MARKET_DESC:1 "ทุกอย่างมีราคา รวมทั้งคน บน§Sตลาดทาส§!, £pops£ §Sป๊อป§!พวก เขา ถูก ซื้อ และ ขาย ให้ เหมือน สินค้า การ เดิน ทาง ของ พวก เขา เปลี่ยน ทิศ ทาง ของ ดวง ดาว. เมื่อได้มา, ของใหม่ของคุณ§Sป๊อป§!จะถูกส่งไปยัง£planet£ §Sดาว เคราะห์§!จากการเลือกของคุณไม่ต้องกังวลเกี่ยวกับ การตัดไม้ ตลาดจะดูแลที่ ... สําหรับราคา"
#  TUTORIAL_PLANETVIEW_CORPORATE_TITLE:0 "Corporation View"
#  TUTORIAL_PLANETVIEW_CORPORATE_DESC:0 "The corporate tab allows §SMegacorporations§! to build §SBranch Offices§! on the planets of other Empires, provided they have signed the necessary paperwork. Once built, they can view and upgrade their facilities here as well. As we know, large Corporations wish only the best for their customers, events of the 23rd cycle notwithstanding."
 TUTORIAL_GOVERNMENTVIEW_POLICIES_TITLE:0 "คํา แนะ นํา: มารยาท"
 TUTORIAL_GOVERNMENTVIEW_POLICIES_DESC:0 "เดอะ§Sนโยบาย§!แท็บครอบคลุมรัฐบาล§Sนโยบาย§!ซึ่งมีผลกระทบกว้างขวาง ต่อวิธีการดําเนินงานของจักรวรรดิของเรา\n\nบ่อย ครั้ง มี จุด ยืน บาง อย่าง ที่ อาจ นํา ไป สู่ อะไร ก็ ได้§Sนโยบาย§!แม้ว่าเราจะถูกจํากัดโดยเทคโนโลยีและ§Sเอธอส§!." #
 TRADE_VIEW_DESC:0 "เมื่อจักรวรรดิของเราเติบโต§Sสลับ§!ระหว่างพวกเรา£planet£ §Sดาว เคราะห์§!จะกลายเป็นส่วนใหญ่ของเศรษฐกิจของเรา§Sฐานของดวงดาว§!ด้วย§Sเทรดฮับ§!สะสม§Sสลับ§!ภายในพวกเขา£system£ §Sระบบ§!ที่จะถูกส่งไปยังที่§Sเมือง หลวง§!การแปลงไปยัง£energy£ §Sแหล่ง พลังงาน§!.\n\nเพิ่มเติม§Sเทรดฮับ§!หมายถึง§Sความแหลม:§!สามารถเก็บสะสม§Sสลับ§!จากระบบที่อยู่ติดกันด้วย เส้น ทาง การ ค้า ที่ มั่งคั่ง อาจ ดึงดูด ใจ§Sโจรสลัด§!แม้พวกเขาสามารถตอบโต้โดยกองเรือบน§Sยาม§!และโดย§Sมอดูลป้องกัน§!บน§Sฐานของดวงดาว§!. §Sมอดูล Hangar§!มี ประสิทธิภาพ เป็น พิเศษ สําหรับ เรื่อง นี้."
 PLANETVIEW_CORPORATE_DESC:0 "แท็บขององค์กรอนุญาตให้§Sการหยุดงาน§!เพื่อสร้างสํานักงานสาขาใน£planet£ §Sดาว เคราะห์§!สําหรับจักรวรรดิอื่น ๆ หากพวกเขาได้ลงนามในเอกสารที่จําเป็น เมื่อสร้างแล้ว พวกเขาสามารถดู และอัพเกรดสิ่งอํานวยความสะดวกที่นี่ได้เช่นกัน อย่างที่เรารู้ บริษัทขนาดใหญ่ปรารถนาเพียงสิ่งที่ดีที่สุดสําหรับลูกค้าของพวกเขา เหตุการณ์ที่เกิดขึ้นในรอบที่ 23 อย่างไรก็ตาม"
 TUTORIAL_FEDERATION_VIEW_TITLE:0 "สหพันธ์:"
 TUTORIAL_FEDERATION_VIEW_DESC:0 "นี่คือ§Hหน้าจอสหพันธรัฐ§!ของเรา£federation£ §Sสหพันธรัฐ§!จะแข็งแกร่งขึ้น ในขณะที่สมาชิกยังคงดี§Sความแหลม:§!เมื่อสมาชิกใหม่เข้าร่วม สหพันธ์ของเราบางส่วนจะหายไป\n\nการกําหนด£envoy£ §Sซองจิน§!สําหรับสหพันธรัฐจะพัฒนาการประสานงาน\n\nขณะที่สหพันธรัฐของเราแข็งแกร่งขึ้น§Sเดอะชราวด์§!ที่เพิ่มประโยชน์ร่วมกันของเรา"
 TUTORIAL_FEDERATION_VIEW_ENVOYS_TITLE:0 "สนธิสัญญา: สมาชิกสภาผู้แทนราษฎร"
 TUTORIAL_FEDERATION_VIEW_ENVOYS_DESC:0 "เพิ่ม£envoy£ §Sซองจิน§!ถึง£federation£ §Sสหพันธรัฐ§!จะช่วยปรับปรุง§Sความแหลม:§!โปรด จํา ไว้ ว่า คุณ มี ตัว แทน มาก น้อย แค่ ไหน. ซองที่ได้รับมอบหมายในสหพันธรัฐ จะสามารถทําการมอบอํานาจให้กับคนอื่นๆ§Sการกระทําต่าง ๆ§!."
 TUTORIAL_FEDERATION_VIEW_MEMBERS_TITLE:0 "คํา สั่ง: สมาชิก สหพันธ์"
 TUTORIAL_FEDERATION_VIEW_MEMBERS_DESC:0 "นี่คือ§Hสมาชิกสหพันธรัฐ§!หน้าจอ ที่นี่เราสามารถเห็นอํานาจของเรา§Sสมาชิก§!ในหลายพื้นที่ มีกี่คน£envoy£ §Sซองจิน§!และพวกเขา(บรรดาร่อซูล) ขอต่อพระองค์ให้ได้รับชัยชนะ§Sเอธิค§!กําลังขัดแย้งและมีส่วนทําให้สูญเสีย§Sความแหลม:§!."
 TUTORIAL_FEDERATION_VIEW_NAVY_TITLE:0 "กองทัพเรือสหพันธรัฐ"
 TUTORIAL_FEDERATION_VIEW_NAVY_DESC:0 "เดอะ§Hกองทัพเรือสหพันธรัฐ§!สร้างจาก§Sความจุของกองทัพเรือ§!จากสมาชิกทั้งหมด และถูกควบคุมโดย§Sท่านประธาน§!สมาชิกทุกคนสามารถสร้าง£federation£ §Sสหพันธรัฐ§!กองทัพเรือที่มีส่วนช่วยกองยาน."
 TUTORIAL_FEDERATION_VIEW_LAWS_TITLE:0 "กฎ: พระราชบัญญัติ สหพันธ์"
 TUTORIAL_FEDERATION_VIEW_LAWS_DESC:0 "เปลี่ยนเป็น§Hพระราชบัญญัติสหพันธรัฐ§!สามารถเสนอโดยสมาชิกใด ๆ ถ้า£federation£ §Sสหพันธรัฐ§!ไม่ผ่านกฎหมาย สหพันธ์จะประสบ§Sการ ติด คอ§!.\n\nกฎหมาย บาง ข้อ ถูก ล็อก และ จํา ต้อง เพิ่ม§Sการจัดกึ่งกลาง§!เพื่อปลดล็อคพวกมัน สหพันธ์ต้องมาก่อน§Sเพิ่มระดับ§!เพื่อเข้าถึงระบบศูนย์กลางชั้นสูง\n\nแต่ จง ระวัง ขณะ ที่ การ ทํา ให้ เป็น ศูนย์กลาง เพิ่ม ทวี ขึ้น การ กลั่น กรอง จะ ประสบ ความ ทุกข์."
 TUTORIAL_GALACTIC_COMMUNITY_TITLE:0 "ภาษา: ภาษา ลา ติน"
 TUTORIAL_GALACTIC_COMMUNITY_DESC:0 "ยินดีต้อนรับสู่§Hชุมชน กาแลกติก§!สถานที่ที่นักการทูตจากรอบ ๆ กาแล็กซี ประชุมเพื่อตัดสินใจกฎหมายกาแล็กซี่โดยลงคะแนน§Sความละเอียด§!.\n\nคุณสามารถรองรับ§Sความละเอียดที่เสนอ§!จาก§Sคิว§!เพิ่ม§Sความเข้มสี§!เพื่อการสนับสนุนทั้งหมดของพวกเขา\n\nมติที่มีการสนับสนุนมากที่สุดในคิวจะย้ายไป§Sระดับวุฒิสภา§!เมื่อมันอยู่ในเซสชัน, ที่มันจะถูกโหวตเพื่อตัดสินว่ามันจะกลายเป็น§Sกฎ กาแลกติก§!.\n\nจดไว้§Sโฟกัสแบบแกแล็กติก§!ขณะที่มันตั้งเป้าหมายร่วมกันสําหรับชุมชน\n\nสุดท้าย คุณจะเห็นอาณาจักรสมาชิกทั้งหมด§Sแอมโมดิฟิเยร์§!ปัจจุบันมีผลจากความละเอียดบนจอภาพนี้"
 TUTORIAL_GALACTIC_COMMUNITY_ENVOYS_TITLE:0 "คํา พยากรณ์: ผู้ ส่ง ข่าว"
 TUTORIAL_GALACTIC_COMMUNITY_ENVOYS_DESC:0 "£envoy£ §Sซองจิน§!อาจ มอบ หมาย ให้ ประชาคม กา เลติ ก เพิ่ม จํานวน§Sความเข้มสี§!ซองลอยที่ได้รับมอบหมายในชุมชนกาแล็กติก สามารถถูกมอบคืนให้กับกลุ่มอื่น§Sการกระทําต่าง ๆ§!."
 TUTORIAL_GALACTIC_COMMUNITY_SENATE_TITLE:0 "ระดับวุฒิสภา"
 TUTORIAL_GALACTIC_COMMUNITY_SENATE_DESC:0 "เดอะ§Hระดับวุฒิสภา§!เป็นจุดที่ชุมชนกาแล็กซี่ลงคะแนนที่จะผ่านหรือเอาชนะมติจาก§Sคิว§!ที่ได้รับการสนับสนุนมากที่สุด ในฐานะสมาชิก คุณสามารถโหวต:§Sใช่, ไม่, หรือหยุด§!ถ้ามติผ่าน มันจะกลายเป็น§Sกฎ กาแลกติก§!และมีผลกระทบต่อสมาชิกทุกคน ในชุมชนกาแล็กซี่ หากมันพ่ายแพ้ ก็ไม่อาจขอแต่งงานได้อีก\n\nจักรวรรดิที่ไม่อดอยากจะได้§Sเพิ่มความบิดเบือน§!และ (มะลาอิกะฮฺ) ผู้ควบคุมอย่างรัดกุม\n\nถ้าคุณได้รับข่าว§Sความชอบ§!จากจักรวรรดิอื่น คุณอาจจะใช้มันที่นี่เพื่อส่งเสริม§Sความเข้มสี§!ใน§Sระดับวุฒิสภา§!โหวต"
 TUTORIAL_GALACTIC_COMMUNITY_RESOLUTIONS_TITLE:0 "ความชัด:"
 TUTORIAL_GALACTIC_COMMUNITY_RESOLUTIONS_DESC:0 "เดอะ§Hความละเอียด§!หน้าจอคือรายการของความละเอียดที่ประมวลผลอยู่ในปัจจุบัน เชิญ§Sจง หา มุม มอง ใหม่§!โดยการเลือกจากห่วงโซ่ความละเอียดซึ่งจะค่าใช้จ่าย£influence£ อิทธิพล.\n\nคุณอาจจะเสนอเพียงครั้งแรกที่ไม่ตอบสนอง§Sความละเอียด§!ในโซ่ตรวน แต่ ละ ขั้น วาง พื้น ฐาน ไว้ สําหรับ การ เปลี่ยน แปลง ที่ ร้าย แรง กว่า ถึง แม้ ไม่ มี การ รับ ประกัน การ สนับสนุน.\n\nถ้า§Sความละเอียด§!ผ่านหนึ่งต่อไปในห่วงโซ่ ไม่สามารถเสนอเป็นเวลาหลายปี"
 TUTORIAL_GALACTIC_COMMUNITY_COUNCIL_TITLE:0 "สภาปกครองกาแล็กติก"
 TUTORIAL_GALACTIC_COMMUNITY_COUNCIL_DESC:0 "§Hสภาปกครองกาแล็กติก§! ได้มีการสถาปนาขึ้นแล้ว §Sการเลือกตั้ง§! จะเริ่มขึ้นและสมาชิกที่มีน้ำหนักทางการทูตมากที่สุดจะได้รับ §Sตำแหน่งสภา§! สมาชิกสภาจะมีน้ำหนักทางการทูตเพิ่มขึ้นและสามารถผลักดันข้อเสนอไปยังวุฒิสภาในรูปแบบ §Sมติฉุกเฉิน§! ได้\n\n§Sการใช้อำนาจยับยั้ง§! สามารถปลดล็อกได้โดยการผ่านมติเพื่อมั่นคงของสภา นอกจากนี้ สมาชิกสภายังสามารถเข้าถึง §Sมติพิเศษ§! ได้"
 TUTORIAL_EMPIRE_SPRAWL_TITLE:1 "การสอน:$EMPIRE_SIZE$"
 TUTORIAL_EMPIRE_SPRAWL_DESC:2 "£empire_sprawl£ §H$EMPIRE_SIZE$§!เป็นเครื่องวัดขอบเขตของจักรวรรดิของคุณ ในรูปแบบของการควบคุม£system£ §Sระบบ§!, £colony£ §Sคอมโพเนนท์§!, £district£ §Sขอบเขต§!และประชากรทั้งหมด\n\nสูงจักรวรรดิขนาดเป็นความเครียดในจักรวรรดิของคุณ§Sความจุสูง§!และเพิ่มค่าใช้จ่าย§Sเทคโนโลยี§!, £traditions£ §Sประเพณี§!, £leader£ §Sผู้นํา§!และ§Sพระราชบัญญัติ§!"
 TUTORIAL_FIRSTCONTACT_VIEW_TITLE:0 "การบอกกล่าว: กําหนดกันยายน"
 TUTORIAL_FIRSTCONTACT_VIEW_DESC:0 "เราได้ติดต่อกับองค์กรใหม่ - บางที§Sสัตว์ประหลาดอวกาศ§!หรือสิ่งอื่น§Sจักรวรรดิ§!เราสามารถเรียนรู้ได้มากขึ้นโดยการสร้าง§Hที่อยู่ติดต่อแรก§!.\n\nเราจะต้องกําหนด£envoy£ §Sซองโซ§!สําหรับภารกิจนี้ พวกเขาจะทํางานในการสร้างการสื่อสารกับองค์กร และถอดรหัสทุกภาษาที่พวกเขาสามารถใช้\n\nให้มอบหมายงาน§Sซองโซ§!;\n\n£dot_green£เลือกบนภาพใน§Sที่อยู่ติดต่อแรก§!หน้าต่าง\n£dot_green£เลือกหนึ่งรายการที่มี§Sซองจิน§!"
 TUTORIAL_CRISIS_VIEW_TITLE:0 "การสอน:เป็นไครซิส"
 TUTORIAL_CRISIS_VIEW_DESC:0 "เรากําลังเดินทางไป§Sการ กลาย เป็น วิกฤตการณ์§!เส้นทางนี้จะปลดล็อค โบนัสพิเศษ ซึ่งจะทําให้เราสามารถ เป็นกองกําลังที่น่ากลัวมากขึ้นภายในกาแล็กซี่\n\nเดอะ§Sวิกฤติ§!จอ แสดง เป้า หมาย ของ เรา - การ กระทํา เฉพาะ ที่ เรา สามารถ ทํา ได้ เพื่อ ได้ มา§S[GetCrisisResource]§!. หู หนวก[GetCrisisResource]ปลดล็อค§Sระดับวิกฤติ§!ถึง§Sอัตราเร็ว:§!ที่เราต้องการเพื่อปลดปล่อย ศักยภาพอย่างเต็มที่ของเราบนกาแล็กซี่\n\nเป็นของเราจักรวรรดิกลายเป็นภัยคุกคามมากขึ้นต่อผู้ที่อยู่รอบ ๆ ตัวเรา ชุมชนกาแล็กติกอาจจะเลือกที่จะรวมกันและประกาศเรา§Sภัย คุกคาม กาแล็กซี่§!."
 TUTORIAL_CRISIS_VIEW_LEVEL1_TITLE:0 "ความสําคัญ: ระดับวิกฤต"
 TUTORIAL_CRISIS_VIEW_LEVEL1_DESC:0 "ในขณะที่เราก้าวหน้าไปตาม§Sกลาย เป็น วิกฤตการณ์§!เส้นทางและเข้าถึงความต้องการเฉพาะ เราจะปลดล็อคระดับใหม่ แต่ละคนมาพร้อมกับโบนัสที่แตกต่างกันเช่น§S[GetCrisisResource]อัตราเร็ว:§!และพิเศษ§Sเรือ§!.\n\nเมื่อเราไปถึง§Sระดับ 5§!หรืออื่น ๆ ที่ได้รับการประกาศวิกฤต โดยชุมชนกาแล็กติก เราจะมีการต่อต้านทั้งกาแล็กซี่ ในเวลานั้น เราจะเข้าสู่§Sสงครามรวม§!กับชุมชนกาแล็กติก"
 TUTORIAL_DIPLOMACY_VIEW_BUILDING_SPYNETWORK_TITLE:0 "การสอน:เครือข่ายสายลับ"
 TUTORIAL_DIPLOMACY_VIEW_BUILDING_SPYNETWORK_DESC:1 "หนึ่งในพวกเรา£envoy£ §Sซองจิน§!ตอนนี้กําลังสร้าง§Sเครือข่ายสเปก§!ในนี้จักรวรรดิ.\n\nเดอะ§Sระดับการแทรกซึม§!ของเครือข่ายสแปมจะเพิ่มขึ้นเมื่อเวลาผ่านไป ขึ้นอยู่กับปัจจุบัน§Sค่าของเครือข่ายความแหลม:§!และเป้าหมาย£empire_sprawl£ §Sขนาดของจักรวรรดิ§!. ขณะที่เครือข่ายเส้นพริ้วไหวเติบโตขึ้น เราจะได้รับมากขึ้น§Sข้อมูล§!เกี่ยวกับเป้าหมาย เราจะสามารถปกปิดได้§Sปฏิบัติการ§!ที่นี่ ผ่าน§Sแถบพาเนล§!.\n\nเครือข่ายสเปกจะเริ่มใช้งาน§Pปฏิเสธ§!หากไม่มีบรรดาร่อซูลถูกรวมไว้ในนั้น หรือมีการปกปิดมันไว้ก็ตาม§Sปฏิบัติการ§!."
 TUTORIAL_ESPIONAGE_VIEW_TITLE:0 "คํา แนะ นํา: การ บรรเทา ทุกข์"
 TUTORIAL_ESPIONAGE_VIEW_DESC:0 "เดอะ§Sความแหลม:§!แท็บแสดงวิธีการของเรา£envoy£ §Sซองจิน§!กําลังสร้างเครือข่ายสแปมภายในจักรวรรดิอื่น ๆ คุณสามารถเข้าถึง§Sบัญชีข้อมูล§!ที่นี่ เช่นเดียวกับมุมมองและการเปิดตัว§Sปฏิบัติการ§!.\n\nปฏิบัติการอาจดําเนินการในจักรวรรดิ ที่เรามี§Sซองโซ§!จัดการเครือข่ายสไปซี่ ปฏิบัติการแต่ละประเภทต้องการเครือข่ายสแปมเพื่อเข้าสู่ระดับใดระดับหนึ่ง ก่อนจะเปิดตัว"
 TUTORIAL_ESPIONAGE_VIEW_OPERATIONS_TITLE:0 "คํา สั่ง: ปฏิบัติ การ บรรเทา ทุกข์"
 TUTORIAL_ESPIONAGE_VIEW_OPERATIONS_DESC:0 "ตอนนี้รูปแบบเครือข่ายของเรา ได้ถึงระดับที่เพียงพอ เราก็อาจจะเปิดตัว§Sปฏิบัติการ§!กับเรื่องนี้จักรวรรดิต่อไปนี้ถูกจัดเป็นหมวดหมู่ โดยมีปฏิบัติการที่แตกต่างกัน ซึ่งนําไปสู่ผลลัพธ์ที่แตกต่างกัน\n\nหมวดหมู่ปฏิบัติการรวม§S$op_cat_subterfuge$§!, §S$op_cat_manipulation$§!, §S$op_cat_sabotage$§!ถึง§S$op_cat_provocation$§!การฆ่าล้างเผ่าพันธุ์และปฏิบัติการเพื่อเรียกร้องความสนใจ มีแนวโน้มที่จะเรียกร้องมากขึ้น และดําเนินการอย่างจริงจังมากขึ้น§Sบท ลงโทษ ทาง การ ทูต§!ถ้าเราถูกจับได้"
 TUTORIAL_ESPIONAGE_VIEW_ASSIGN_ASSET_TITLE:0 "การ สอน:"
 TUTORIAL_ESPIONAGE_VIEW_ASSIGN_ASSET_DESC:0 "§Sชุดรหัสอักขระ§!เป็นตัวแทนที่มีค่าและวัตถุ ที่ให้ผลกระทบที่แตกต่างกัน สําหรับกิจกรรมของเรา พวกเขาทํางานในเครือข่ายสแปมและอาจจะได้รับมอบหมายให้ปฏิบัติการ ที่ซึ่งพวกเขาสามารถเปิดโอกาสใหม่ หรืออื่น ๆ ช่วยให้เราออกจากปัญหา\n\nเรา อาจ ได้ รับ ข้อ พิสูจน์ ผ่าน เหตุ การณ์ หรือ โดย การ แสดง§Sภาพไอคอนสื่ออารมณ์§!ปฏิบัติการ ถ้า เครือ ข่าย สเปก เน็ตเวิร์ค ไม่ มี เหลือ อยู่ ก็ จะ สูญ หาย ไป ด้วย."
 TUTORIAL_MEGASTRUCTURE_CONSTRUCTION_TITLE:0 "โครงสร้างของเมกะ"
 TUTORIAL_MEGASTRUCTURE_CONSTRUCTION_DESC:0 "จากรายชื่อนี้ เราสามารถเลือก£megastructure£ §Sโครงสร้างเมกะ§!ถึง[GetBuildGrow]ข้างในนี้£system£ §Sระบบสุริยะ§!บาง โครงการ มี ไว้ พร้อม หลัง จาก ที่ เรา ค้น พบ และ ค้นคว้า เกี่ยว กับ เรื่อง นี้§Sเทคโนโลยี§!.\n\nปัจจุบัน เครื่อง บิน ใต้ ดิน ของ ผม ได้ รับ การ ออก แบบ เต็ม ที่ แล้ว; ผม ขอ แนะ นํา ให้ คุณ ฉวย โอกาส เหล่า นี้ เพื่อ สร้าง ความ ประทับ ใจ ถาวร บน กาแล็กซี."
 TUTORIAL_ORBITAL_RING_TITLE:0 "วงแหวนออร์บิทัล"
 TUTORIAL_ORBITAL_RING_DESC:0 "§Sวงแหวนออร์บิทัล§!กว้าง£megastructure£ §Sพารามิเตอร์ของเมกะ§!ที่ถูกสร้างขึ้นเพื่อล้อมรอบทั้ง£planet£ §Sดาว เคราะห์§!พวกเขาสร้างสะพานที่มีประสิทธิภาพ ระหว่างอวกาศกับดาวเคราะห์ด้านล่าง\n\nมุมมองของวงแหวนออร์บิทัล คือที่ที่เราจะเพิ่มหรือเอาออก£building£ §Sอาคาร§!ถึง§Sมอดูล§!รวมถึงอัพเกรดแหวนออร์บิทัล ให้สูงกว่านี้ด้วย การอัพเกรดเทียนเพิ่มจํานวนช่องที่เรามีให้สร้าง ยาง จํากัด ด้วย โครง สร้าง ของ ดาว เคราะห์."
 TUTORIAL_DIPLOMACY_CONFIGURABLE_TERMS_TITLE:0 "การประมวลผล: ระยะเวลาที่ปรับแต่งได้"
 TUTORIAL_DIPLOMACY_CONFIGURABLE_TERMS_DESC:0 "หน้าจอนี้ช่วยให้เราเลือก§Sชุดสําเร็จ§!สําหรับข้อตกลงของเรา และเพื่อปรับแต่งวาระของแต่ละคน แต่ ละ ชุด จัด ให้ มี ชุด ของ หน้า ที่ รับ ผิด ชอบ และ พันธะ หน้า ที่ สําหรับ ทั้ง รัฐบริวาร และ เจ้า นาย.\n\nเราสามารถเปลี่ยนรายการได้§Sจํานวนงวด§!ซึ่งจะปรับ§Sความซื่อสัตย์§!ตามความชอบของจักรวรรดิอื่น ๆ ทําให้ข้อตกลงที่น่าสนใจมากขึ้นทั้งสองพรรค"
 TUTORIAL_AGREEMENTS_TITLE:0 "คํา ถาม:"
 TUTORIAL_AGREEMENTS_DESC:0 "เดอะ§Sข้อตกลง§!จอให้ภาพรวมของเรื่องของเรา และข้อตกลงของเจ้านาย เราสามารถใช้หน้าจอนี้เพื่อติดตาม§Sความซื่อสัตย์§!จัดการ§Sสิ่งปลูกสร้างของเจ้าเหนือหัว§!ถึง§Sสลับ§!และต่อรอง§Sจํานวนงวด§!ของสัญญาที่มีอยู่แล้ว เราอาจจะจบข้อตกลงทั้งหมด ถ้ามันไม่ตรงกับวัตถุประสงค์ของเรา"
 TUTORIAL_AGREEMENTS_NO_OVERLORD_TITLE:0 "$TUTORIAL_AGREEMENTS_TITLE$"
 TUTORIAL_AGREEMENTS_NO_OVERLORD_DESC:0 "$TUTORIAL_AGREEMENTS_DESC$"
 TUTORIAL_AGREEMENTS_HAS_OVERLORD_TITLE:0 "$TUTORIAL_AGREEMENTS_TITLE$"
 TUTORIAL_AGREEMENTS_HAS_OVERLORD_DESC:0 "$TUTORIAL_AGREEMENTS_DESC$\n\nจักรวรรดิ ต่าง ๆ อาจ เลือก ที่ จะ เป็น§Sจักรวรรดิพิเศษ§!การ จัด เตรียม พิเศษ นํา มา ซึ่ง ผล ประโยชน์ อัน สําคัญ ต่อ สิ่ง ต่าง ๆ เช่น การ ผลิต ทรัพยากร หรือ ความ สามารถ ทาง ทหาร แต่ จักรวรรดิ จะ พบ ว่า ตน เอง มี ข้อ เสีย เปรียบ ใน เรื่อง อื่น ๆ.\n\nจักรวรรดิ ต่าง ๆ ของ ผู้ เชี่ยวชาญ พิเศษ ยัง ให้ การ สนับสนุน§Sความซื่อสัตย์§!...ตราบใดที่พวกเขายังรักษาความ ภักดีไว้ต่อไป จักรวรรดิผู้พิเศษจะยืนหยัดเพื่อให้ได้ XP"
 TUTORIAL_HOLDINGS_TITLE:0 "บทสอน: สิ่งปลูกสร้างของเจ้าเหนือหัว"
 TUTORIAL_HOLDINGS_DESC_SHARED:0 "หน้าจอ §Sสิ่งปลูกสร้างของเจ้าเหนือหัว§! แสดงภาพรวมของสิ่งปลูกสร้างทั้งหมดบน £planet£ §Sดาวเคราะห์§! นี้ ทำให้จักรวรรดิวาง £building£ §Sอาคาร§! รูปแบบต่าง ๆ บนเมืองหลวงและ £colony£ §Sอาณานิคม§! ของกันและกันได้ สิ่งเหล่านี้อาจส่งผลต่อการทูต ข่าวกรอง และการผลิตทรัพยากร"
 TUTORIAL_HOLDINGS_DESC_MEGA_CORP:0 "บริษัทขนาดใหญ่จะทำการเปิด §Sสำนักงานสาขา§! บนดาวของจักรวรรดิอื่น ที่มีข้อตกลงทางการทูตกับจักรวรรดินั้นๆ อย่างที่เราทราบกันดีว่าองค์กรขนาดใหญ่ปรารถนาแต่สิ่งที่ดีที่สุดให้กับลูกค้าของพวกเขา"
 TUTORIAL_HOLDINGS_DESC_OVERLORD:0 "§Sเจ้าเหนือหัว§! สามารถใช้สิ่งปลูกสร้างเพื่อขยายอำนาจเข้าไปในอาณาเขตของ §Sรัฐบริวาร§! ได้ สิ่งปลูกสร้างเหล่านี้หลายชนิดส่งผลต่อความภักดี และบางชนิดถูกออกแบบเฉพาะสำหรับจักรวรรดิผู้เชี่ยวชาญ การอัปเกรดสามารถจัดการผ่านหน้าจอนี้ได้เช่นกัน"
 TUTORIAL_HOLDINGS_NO_MEGA_CORP_NO_OVERLORD_TITLE:0 "$TUTORIAL_HOLDINGS_TITLE$"
 TUTORIAL_HOLDINGS_NO_MEGA_CORP_NO_OVERLORD_DESC:0 "$TUTORIAL_HOLDINGS_DESC_SHARED$"
 TUTORIAL_HOLDINGS_NO_MEGA_CORP_HAS_OVERLORD_TITLE:0 "$TUTORIAL_HOLDINGS_TITLE$"
 TUTORIAL_HOLDINGS_NO_MEGA_CORP_HAS_OVERLORD_DESC:0 "$TUTORIAL_HOLDINGS_DESC_SHARED$\n\n$TUTORIAL_HOLDINGS_DESC_OVERLORD$"
 TUTORIAL_HOLDINGS_HAS_MEGA_CORP_NO_OVERLORD_TITLE:0 "$TUTORIAL_HOLDINGS_TITLE$"
 TUTORIAL_HOLDINGS_HAS_MEGA_CORP_NO_OVERLORD_DESC:0 "$TUTORIAL_HOLDINGS_DESC_SHARED$\n\n$TUTORIAL_HOLDINGS_DESC_MEGA_CORP$"
 TUTORIAL_HOLDINGS_HAS_MEGA_CORP_HAS_OVERLORD_TITLE:0 "$TUTORIAL_HOLDINGS_TITLE$"
 TUTORIAL_HOLDINGS_HAS_MEGA_CORP_HAS_OVERLORD_DESC:0 "$TUTORIAL_HOLDINGS_DESC_SHARED$\n\n$TUTORIAL_HOLDINGS_DESC_MEGA_CORP$\n\n$TUTORIAL_HOLDINGS_DESC_OVERLORD$"
 TUTORIAL_PLANETVIEW_COLONY_GOV_TITLE:0 "คํา สั่ง: ผู้ ว่า ราชการ ใหม่"
 TUTORIAL_PLANETVIEW_COLONY_GOV_DESC:0 "เพื่อช่วยเหลือคนใหม่ของเรา£colony£ §Sโคนี§!เรา ควร พิจารณา ถึง การ เกณฑ์ ดาว เคราะห์ ดวง หนึ่ง§Sผู้ว่า§!เพื่อดูแลการดําเนินงานที่นั่น\n\nโลกส่วนใหญ่ของเราจะได้รับโดยการว่ายน้ําโดยไม่ต้องฟุ่มเฟือยของ§Sผู้ว่า§!และประโยชน์แทนจากโบนัส ขึ้นอยู่กับชนิดของรัฐบาลของเรา แต่สําหรับพวกนั้น£planet£ §Sดาว เคราะห์§!โชคดีพอ§Sผู้ว่า§!สามารถเป็นประโยชน์ที่ดี!\n\nผู้ว่าสามารถมีผลกระทบที่แตกต่างกันได้หลายอย่าง บนโลกใบนี้ที่พวกเขาปกครอง ส่วนใหญ่จะเป็นบวก ผลกระทบเหล่านี้ขึ้นอยู่กับ§Sสินค้า§!และระดับทักษะของ§Sผู้ว่า§!."
 TUTORIAL_ELECTION_VIEW_TITLE:0 "คํา แนะ นํา: การเลือกตั้ง"
 TUTORIAL_ELECTION_VIEW_DESC:0 "เดอะ§Sการเลือกตั้ง§!หน้าจอคือที่ที่เราตัดสินใจในผู้ปกครองใหม่สําหรับจักรวรรดิของเรา\n\n[TutorialElectionViewTypeSpecific]"
 TUTORIAL_ELECTION_VIEW_DEMOCRACY_NO:0 "ผู้สมัครที่ใช้ได้จะถูกเลือกจากปัจจุบันของคุณ£leader£ §Sผู้นํา§!และถ้าคุณมีทรัพยากรที่จะละเว้นตัวเลือกของผู้ปกครองเป็นของคุณ"
 TUTORIAL_ELECTION_VIEW_DEMOCRACY_YES:0 "ผู้สมัครที่ใช้ได้จะถูกเลือกจากปัจจุบันของคุณ£leader£ §Sผู้นํา§!และพวกเค้าสามารถได้รับการส่งเสริมให้เพิ่มการสนับสนุนได้ ด้วยวิธีที่ประชาธิปไตยที่สุด เท่าที่เป็นไปได้"
 TUTORIAL_EDICTS_AND_POLICIES_TITLE:0 "การกําหนดสิทธิ์: ข้อกําหนดและพระราชบัญญัติ"
 TUTORIAL_EDICTS_AND_POLICIES_DESC:0 "เดอะ§Sนโยบาย§!แท็บครอบคลุมรัฐบาล§Sนโยบาย§!รวมทั้งอาณาจักร§Sพระราชบัญญัติ§!การปฏิบัติที่สามารถดําเนินการได้โดยการใช้ทรัพยากรบางส่วนของเรา\n\nบ่อย ครั้ง มี จุด ยืน หลาย จุด ที่ จะ ทํา อะไร ก็ ได้§Sนโยบาย§!ถึงแม้ว่ามันจะถูกจํากัดด้วยเทคโนโลยีของเรา หรือ§Sจริยธรรม§!.\n\nมีค่าใช้จ่ายสําหรับรายเดือนทั้งจ่ายจาก§H$EDICT_FUND$§!จ่ายด้วย£unity£ §Sเอกภาพ§!หรือทรัพยากรอื่น ๆ"
 TUTORIAL_COUNCIL_VIEW_TITLE:0 "การสอน: สภาและอาคันตุกะ"
 TUTORIAL_COUNCIL_VIEW_DESC:0 "เดอะ§Sสภา§!หน้าจอคือที่ที่เราแต่งตั้ง£leader£ §Sผู้นํา§!ผู้ซึ่งจะนําเราไปสู่อนาคต บุเลือกภาพและ§Sสินค้า§!จะมีอิทธิพลต่ออาณาจักรของเรา ทั้งดีและเลว เราตั้งค่า§Sภาษาแอนตาร์ก§!เพื่อเน้นความพยายามของพวกเขาในพื้นที่เฉพาะ\n\nA§Sกรรมการ§!สามารถกําหนดหรือแทนที่ได้ทุกเวลาและยังคงรับบทบาทอื่น ๆ เช่นคําสั่ง£science_ship£ §Sยานวิทยาศาสตร์§!ข้อยกเว้นเดียว คือผู้ปกครองของเรา[TutorialCouncilViewDlcSpecific]§Sอายุ§!ความก้าวหน้าขึ้นอยู่กับระดับสมาชิกสภา$EMPIRE_SIZE$และในบางกรณี จริยธรรมสมาชิกสภาผู้แทนราษฎร เมื่อ วัย ชรา สิ้น สุด ลง มัน อาจ ถูก กระตุ้น ให้ เกิด ผล ที่ แรง ขึ้น และ ทํา ให้ มี ที่ ว่าง สําหรับ ห้อง ใหม่."
 TUTORIAL_COUNCIL_VIEW_PARAGON_NO:0 "\n\n"
 TUTORIAL_COUNCIL_VIEW_PARAGON_YES:0 "\n\nเพื่อปลดล็อค§Sตําแหน่งของสภา§!เราต้องการสองสิ่ง§Sซิฟิก§!ตรงกับการเติมเต็มของอแมนดา\n\n"
 TUTORIAL_ASSIGN_COUNCILOR_TITLE:0 "คํา พยากรณ์: ผู้ สําเร็จ ราชการ"
 TUTORIAL_ASSIGN_COUNCILOR_DESC:0 "บาง£leader£ §Sผู้นํา§!อวด§Sสมาชิกสภาผู้แทนราษฎร§!บ่อยครั้งที่มีผลกระทบและผลกระทบที่ไกลที่สุด สิ่งเหล่านี้จะกลายเป็นการกระฉับกระเฉงถ้าผู้นําอยู่ในสภา\n\n§Sตําแหน่งของสภา§!ให้ผลที่เกิดขึ้นเอง ยิ่งผู้นํามีระดับความสามารถสูงเท่าไหร่ ผลกระทบเหล่านั้นก็จะยิ่งรุนแรงมากขึ้นเท่านั้น"
 TUTORIAL_LEADER_LEVEL_UP_TITLE:0 "การสอน:ผู้นำทักษะ"
 TUTORIAL_LEADER_LEVEL_UP_DESC:0 "A£leader£ §Sหัวหน้า§!ในจักรวรรดิของเราได้ไปถึงใหม่§Sทักษะ§!ระดับ! การ ทํา เช่น นี้ จะ ดี ขึ้น เมื่อ ได้ รับ เงิน โบนัส จาก พวก เขา และ ให้ เงิน ทุน ใหม่ แก่ พวก เขา.[TutorialLeaderLevelUpDlcSpecific]เพื่อดูรายการที่มี§Sผู้นํา§!;\n\n£dot_green£เลือก§S$topbar_button_leaders_name$§!ปุ่มบนแถบด้านซ้าย หรือกดปุ่ม§SF5§!\n\n$tttt$$tt$£leaders£\n\nเป็น§Sผู้นํา§!เมื่อ อายุ มาก ขึ้น พวก เขา อาจ มี นิสัย ใน ทาง ลบ ทํา ให้ มี การ เลือก แทน ที่ โดย ธรรมชาติ."
 TUTORIAL_LEADER_LEVEL_UP_PARAGON_NO:0 "\n\n"
 TUTORIAL_LEADER_LEVEL_UP_PARAGON_YES:0 "\n\nเพื่อนําทาง£leader£ §Sของผู้นํา§!การเติบโต เราสามารถเลือก§Sความแหลม:§!ไตรต์สามารถเลือกในภายหลังโดยไม่ต้องหยุดความคืบหน้า ไม่กี่ระดับ§Sคลาสย่อย§!จะ หา ได้, เพิ่ม โบนัส และ ส่ง ผล ต่อ การ เลือก อื่น ใน อนาคต.\n\nการ ค้า เข้า มา ใน ทุก รูป แบบ, ขนาด, และ ความ ยาก ลําบาก: บาง สิ่ง ที่ ปรับ ปรุง ให้ ดี ขึ้น ได้, บาง อย่าง มี ลักษณะ เฉพาะ ร่วม กัน, บ้าง ก็ ให้ ผล กระทบ ทั้ง ใน ทาง บวก และ ใน ทาง ลบ. แต่พวกเขาทั้งหมดมักจะถาวร\n\n"



