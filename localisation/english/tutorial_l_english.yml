 tutorial_9_chain_title:0 "การสอน:[GetBuildGrowCap]ยานวิทยาศาสตร์"
 tutorial_9_chain_desc:3 "เราควรพิจารณา[GetBuildingGrowing]วินาที£science_ship£ §Sยานวิทยาศาสตร์§!เพื่อเพิ่มความเร็วที่เราสํารวจ บริเวณกาแล็กซี่ของเรา\n\nเลือกบนฐานดวงดาวและเลือก§Sอู่ต่อเรือ§!แท็บ แล้วเลือก§Sยานวิทยาศาสตร์§!จากการเลือกที่มี\n\nข้อ ควร จํา£alloys£ §Sอัลลอย§!เพื่อจ่าย§Sเรือ§!ก่อนที่การก่อสร้างจะเริ่มต้น"
