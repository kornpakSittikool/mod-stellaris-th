 tutorial_survey_system_chain_title: "ปรับเทียบข้อมูล:"
 tutorial_survey_system_chain_desc: "ก่อนที่เราจะสามารถสํารวจดาวที่เราต้องการ ที่จะขยายมุมมองของเรา น่า ดีใจ ที่ เรา มี ความ ซับ ซ้อน§Sแผนที่แกแล็กซี§!เพื่อกําจัดเรา เพื่อเข้าถึงแผนที่แกแล็คซี่ คุณสามารถกด§SM§!หรือปุ่มแกแล็คซี่ที่ด้านล่างจอของคุณ หลังจากนั้นรู้สึกอิสระที่จะปิดปูมบันทึกสถานการณ์โดยกด§Sเอสเอส§!หรือปุ่มบนขวา"
 map_toggled: "แผนที่กล้อง"
 tutorial_survey_system_tooltip: "§Sปรับเทียบข้อมูล:§!เพิ่มลงในบันทึกสถานะ"
 tutorial_1_chain_title:1 "การ สํารวจ:ระบบดาว"
 tutorial_1_chain_desc:4 "เริ่มจากการเลือก£science_ship£ §Sยานวิทยาศาสตร์§!นี้สามารถทําโดยการเลือก§Sเรือ§!บน§Hแผนที่แกแล็กซี§!หรือเลือกจาก§Sมุม:§!.\n\nในขณะที่กําลังดู§Sแผนที่แกแล็กซี§!เลือก§Sสํารวจ§!ปุ่มบนอินเทอร์เฟสของกองบินในมุมล่างซ้าย แล้วเลือกปุ่มที่ไม่ลอย£system£ §Sระบบ§!. ทางทางเลือก คุณสามารถเลือกเมาส์ปุ่มขวาบนระบบที่ไม่ลอย§Sระบบสํารวจ§!.\n\nของเรา§Sยานวิทยาศาสตร์§!ตอนนี้จะกําหนดหลักสูตรและสํารวจดาวเคราะห์ทั้งหมด ภายในระบบที่"
 tutorial_unpause_chain_tooltip: "§Sคํา ศัพท์: ไม่ มี คํา ศัพท์§!เพิ่มลงในบันทึกสถานะ"
 tutorial_unpause_chain_title: "คํา ศัพท์: ไม่ มี คํา ศัพท์"
 tutorial_unpause_chain_desc: "ด้วย£science_ship£ §Sยานวิทยาศาสตร์§!ยืนอยู่เพื่อสํารวจกาแล็กซี่ สิ่งที่เหลือก็คือ การปลดปล่อย เพื่อทําสิ่งนี้ แค่กด§Sแถบอวกาศ§! £space£หรือเลือกไอคอนต่อไปนี้ในแถบด้านบน:\n\n$tttt$$tttt$$t$£pause_button£\n"
 unpaused_game: "จําลองการปล่อยสื่อ"
 system_surveyed:1 "การ สํารวจ ระบบ เพื่อน บ้าน"
 tutorial_1_tooltip:1 "§Sระบบสํารวจ:§!เพิ่มลงในบันทึกสถานะ"
 tutorial_2_chain_title:1 "เทคโนโลยี:การวิจัย"
 tutorial_2_chain_desc:3 "เราต้องค้นคว้าเทคโนโลยีใหม่ๆ เดอะ§Sโพรโทคอลโลกใหม่§!จะช่วยให้เราสร้าง£colony_ship£ §Sเรือ โคนี§!และเราควรมุ่งเน้นไปที่สิ่งนี้ให้เร็วที่สุด ถ้าเราต้องการจะขยายอาณาจักรของเรา\n\nเข้าถึง§Sเทคโนโลยี§!หน้าจอ โดยการกดปุ่มในส่วนด้านซ้ายของแถบด้านบน หรือ โดยการกดปุ่ม§SF4§!จากนั้นเลือก§Sเลือกการวิจัย§!และเลือกเทคโนโลยีที่จะไล่ตามจากตัวเลือกที่มีอยู่"
 tech_1_researched:0 "การ วิจัย โปรโตคอล โลก ใหม่"
 tech_2_researched:0 "มี การ วิจัย เกี่ยว กับ การ ก่อ สร้าง บน โลก"
