 tutorial_16_tooltip:0 "§Sคํา แนะ นํา: เพิ่ม ใบ เรือ§!เพิ่มลงในบันทึกสถานะ"
 tutorial_17_chain_title:0 "ดูมน: กําหนดเขต"
 tutorial_17_chain_desc:1 "มันจํากัดจํานวน£planet£ §Sดาว เคราะห์§!คุณควบคุมได้โดยตรง จะ พบ ขีด จํากัด นี้ ได้ ใน แถบ บน และ จะ ลง โทษ ข้าง บน.§Sส่วน§!เป็นกึ่งอัตโนมัติและจัดการดาวเคราะห์ที่ได้รับ มอบหมายภายใต้การควบคุมของพวกเขา เพื่อสร้างภาคใหม่ เข้าไป§Sดาว เคราะห์ และ ขอบ เขต§!ดู โดยการเลือกที่ไอคอนของมัน ในรายการวางบนแถบ หรือกด§SF5§!จากนั้นเลือกที่§Sสร้างขอบเขตใหม่§!กระดุมขวาบน\n\nเจ้าจะเข้าไปเดี๋ยวนี้§Sโหมดการจัดการส่วน§!จากที่นี่คุณกําหนดสิ่งที่£system£ §Sระบบดาว§!ควรจะสร้างภาคใหม่ ดาวเคราะห์ทุกดวงภายในระบบนั้น จะตกอยู่ภายใต้อํานาจของภาคนี้ เลือกระบบที่เรามี£colony£ §Sโคนี§!และเลือกบน§Sเสร็จสิ้น§!กระดุม คุณจะสร้างภาคแรกของเรา"
