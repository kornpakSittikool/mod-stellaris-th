 tutorial_5_tooltip:0 "§Sการสอน:[GetBuildGrowCap] การวิจัยสถานี§!เพิ่มลงในบันทึกสถานะ"
 tutorial_6_chain_title:0 "ห้อง สมุด: อาคาร ดาว เคราะห์"
 tutorial_6_chain_desc:1 "โลกของเรามี£building£ §Sอาคาร§!แต่เราควรสร้างอีกอัน\n\nเพื่อทําสิ่งนี้ ให้เลือกโฮมเวิลด์§Sมุม:§!และเลือกบน§Sพื้นผิว§!แท็บ เลือกช่องอาคารที่ว่างอยู่ในโซน และเลือกจากอาคารใดตึกหนึ่งที่มีอยู่ สมมติว่าเรามีพอ§Sทรัพยากร§!การก่อสร้างจะเริ่มทันที\n\nอาคาร ต่าง ๆ£job£ §Sงาน§!แต่ไม่มีอะไรจะผลิตจนกระทั่ง£pops£ §Sป๊อป§!ได้ รับ มอบ หมาย ให้ ทํา งาน ที่ นั่น. คุณสามารถตรวจสอบงานของคุณได้§Sป๊อป§!กําลังแสดงใน§Sเศรษฐกิจ§!แท็บ"
 building_constructed:0 "การ ก่อ สร้าง"
 tutorial_6_tooltip:0 "§Sห้อง สมุด: อาคาร ดาว เคราะห์§!เพิ่มลงในบันทึกสถานะ"
 tutorial_7_chain_title:1 "การกําหนด:"
 tutorial_7_chain_desc:1 "หลาย£blocker£ §Sบล็อคเกอร์§!บนโลกของเรากําลังป้องกันการก่อสร้างเพิ่มเติม§Sขอบเขต§!และควรจะเคลียร์ นี่ต้องใช้เวลาและค่าใช้จ่าย§Sทรัพยากร§!.\n\nเพื่อเคลียร์§Sบล็อคเกอร์§!เลือก§Sล้างบล็อก§!ปุ่มบนตัวบล็อกเองซึ่งสามารถพบได้บน§Sการจัดการ§!แท็บ\n\n\n$tttt$$tttt$$tt$£clear_blocker£\n\n\n§Sบล็อก§!มี ค่า ใช้ จ่าย ต่าง กัน, ข้อ เรียก ร้อง ทาง เทคโนโลยี, และ เวลา ที่ เกี่ยว ข้อง กับ การ ทํา ความ สะอาด."
 blockers_cleared:1 "ล้างบล็อก"
 tutorial_7_tooltip:1 "§Sบล็อก:§!เพิ่มลงในบันทึกสถานะ"
 tutorial_8_chain_title:0 "ระบบ การ สํารวจ:"
 tutorial_8_chain_desc:0 "เราต้องขยายอิทธิพลของเรา£system£ §Sระบบ§!และขั้นตอนแรกในการทําเช่นนี้ คือการสํารวจระบบดาวข้างเคียง\n\nเพื่อทําสิ่งนี้ ให้เลือก£science_ship£ §Sยานวิทยาศาสตร์§!และเลือกบน§Sสํารวจ§!ปุ่มในอินเทอร์เฟซของกองเรือ จากนั้นเลือกบน§Sเปิดแผนที่แกแล็กซี§!และเลือกหนึ่งในดาวที่อยู่ใกล้เคียงของเรา เดอะ§Sยานวิทยาศาสตร์§!ตอนนี้จะเดินทางไปยังระบบดาวนี้ และสํารวจทุกร่างกายภายใน"
