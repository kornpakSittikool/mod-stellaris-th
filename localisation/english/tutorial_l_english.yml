 advisor.1.name:0 "ที่ปรึกษาออนไลน์"
 advisor.1.desc_01:1 "สวัสดีท่านประธานาธิบดี\n\nฉันคือวีอาร์ปัญญาสังเคราะห์ต้นแบบ งานของฉันคือให้คำแนะนำและความช่วยเหลือในขณะที่เราแสวงหาโชคชะตาท่ามกลางดวงดาว\n\n$advisor.1.desc_filler$"
 advisor.1.desc_02:1 "สวัสดีท่านประธานาธิบดี\n\nฉันคือวีอาร์ปัญญาสังเคราะห์ต้นแบบ งานของฉันคือให้คำแนะนำและความช่วยเหลือในขณะที่เราแสวงหาโชคชะตาท่ามกลางดวงดาว\n\n$advisor.1.desc_filler$"

 advisor.1.desc_03:0 "สวัสดีท่านข้าหลวงใหญ่\n\nฉันคือวีอาร์ปัญญาสังเคราะห์ต้นแบบ งานของฉันคือให้คำแนะนำและความช่วยเหลือในขณะที่เราแสวงหาโชคชะตาท่ามกลางดวงดาว\n\n$advisor.1.desc_filler$"
 advisor.1.desc_04:0 "สวัสดีท่านผู้บริหาร\n\nฉันคือวีอาร์ปัญญาสังเคราะห์ต้นแบบและผู้รับใช้ที่ต่ำต้อยของคุณ บทบาทของฉันคือให้คำแนะนำและคำปรึกษาแก่คุณในขณะที่คุณนำพาจักรวรรดิของเราไปสู่สิ่งที่ไม่รู้จัก\n\n$advisor.1.desc_filler$"
#  advisor.1.desc_05:0 "Good day, Lord Protector.\n\nI am VIR, a prototype synthetic intelligence and your humble servant. My role is to provide you with advice and counsel as you lead our empire into the great unknown.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_06:0 "วันดีหัวหน้า\n\nผมวีอาร์ เป็นหน่วยสืบราชการลับสังเคราะห์ สํานักงานใหญ่ได้เปิดใช้ฉันเมื่อเร็ว ๆ นี้เพื่อให้ฉันอาจจะทําหน้าที่เป็นผู้ช่วยของคุณ ในภารกิจอย่างต่อเนื่องของเรา£market£ §Sตลาด§! .\n\n$advisor.1.desc_filler$"
 advisor.1.desc_07:0 "ท่านจักรพรรดิ\n\nฉันคือวีอาร์ปัญญาสังเคราะห์ต้นแบบและผู้รับใช้ที่ต่ำต้อยของคุณ บทบาทของฉันคือให้คำแนะนำและคำปรึกษาแก่คุณในขณะที่คุณนำพาจักรวรรดิของเราไปสู่สิ่งที่ไม่รู้จัก\n\n$advisor.1.desc_filler$"
 advisor.1.desc_08:0 "สันติสุขจงมีแก่ท่าน ท่านนายกรัฐมนตรี\n\nผมวีอาร์ เป็นหน่วยสืบราชการลับสังเคราะห์ งานของข้าคือช่วยเหลือและให้คําแนะนําเจ้า ขณะที่เราเสี่ยงต่อความปลอดภัย ของโลกของเรา เป็นครั้งแรกในประวัติศาสตร์\n\n$advisor.1.desc_filler$"
 advisor.1.desc_09:0 "สันติสุขจงมีแก่ท่าน ผู้ควบคุม\n\nผมวีอาร์ เป็นหน่วยสืบราชการลับสังเคราะห์ งานของข้าคือช่วยเหลือและให้คําแนะนําเจ้า ขณะที่เราเสี่ยงต่อความปลอดภัย ของโลกของเรา เป็นครั้งแรกในประวัติศาสตร์\n\n$advisor.1.desc_filler$"
 advisor.1.desc_10:0 "สันติสุขจงมีแก่ท่าน ฝ่าบาท\n\nผมวีอาร์ เป็นหน่วยสืบราชการลับสังเคราะห์ งานของข้าคือช่วยเหลือและให้คําแนะนําเจ้า ขณะที่เราเสี่ยงต่อความปลอดภัย ของโลกของเรา เป็นครั้งแรกในประวัติศาสตร์\n\n$advisor.1.desc_filler$"
 advisor.1.desc_11:0 "สันติสุขจงมีแก่ท่าน ผู้ปกป้องเซอรีน\n\nผมวีอาร์ เป็นหน่วยสืบราชการลับสังเคราะห์ งานของข้าคือช่วยเหลือและให้คําแนะนําเจ้า ขณะที่เราเสี่ยงต่อความปลอดภัย ของโลกของเรา เป็นครั้งแรกในประวัติศาสตร์\n\n$advisor.1.desc_filler$"
