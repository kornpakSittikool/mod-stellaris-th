 species_uplifted:0 "ทั่วไปเผ่าพันธุ์รับข้อมูลแล้ว"
 tutorial_23_chain_title:0 "ที่อยู่ติดต่อ:"
 tutorial_23_chain_desc:1 "เมื่อได้พบองค์กรไม่ทราบชื่อ ในความมืดของพื้นที่ เราควรพยายามที่จะ§Sตั้งค่าการสื่อสาร§!. \n\nนี้สามารถประสบความสําเร็จโดยการเลือก§Sที่อยู่ติดต่อแรก§!ใน§Sบันทึกสถานการณ์§!และคลิ๊ก§Sแสดงที่อยู่ติดต่อแรก§!ปุ่ม หรือปุ่มอื่น โดยกด§Sที่อยู่ติดต่อแรก§!ไอคอนบน§Sแผนที่แกแล็กซี§!เพื่อเข้าถึงมันโดยตรง\n\n\n$tttt$$tttt$$ttt$£firstcontact£\n"
 contact_made:0 "ที่อยู่ติดต่อที่ถูกสร้าง"
 tutorial_23_tooltip:0 "§Sที่อยู่ติดต่อ:§!เพิ่มลงในบันทึกสถานะ"
 tutorial_24_chain_title:0 "การสอน:ดัดแปลงพันธุกรรม"
 tutorial_24_chain_desc:0 "เราทําได้§Sแก้ไข§!สิ่งมีชีวิตใด ๆ ที่อาศัยอยู่ภายในจักรวรรดิของเรา ถ้าพวกเขามีเพียงพอ§Sจุดแปลง§!.\n\nนี้สามารถประสบความสําเร็จโดยการเข้าถึง§Sแก้ไข§!เมนูจาก§Sชนิด§!หน้าจอ และจากนั้นก็ค้นคว้าอย่างเหมาะสม§Sโครงการพิเศษ§!โปรเจกต์ต้องการ£society£ §Sงานวิจัยของ สมาคม§!และจะเบี่ยงเบนความก้าวหน้าทางเทคโนโลยีของเรา ในสาขานั้น ขณะที่มันยังใช้งานอยู่"
 species_modified:0 "ดัดแปลงพันธุกรรมแล้ว"
 tutorial_24_tooltip:0 "§Sการ สื่อ ความ:§!เพิ่มลงในบันทึกสถานะ"
 tutorial_25_chain_title:1 "การอ้างอิง:ระบบดาว"
 tutorial_25_chain_desc:1 "เราสามารถขยายเขตแดนของเราโดย[GetBuildingGrowing] §Sฐานของดวงดาว§!รอบดาวต่างดาว นี้รักษาความปลอดภัย£system£ §Sระบบ§!อนุญาตให้เข้าถึงทรัพยากร และบล็อกทางเดินสําหรับการติดต่อหากพรมแดนถูกปิด\n\nเลือก£construction_ship£ §Sเรือก่อสร้าง§!แล้วกด§S[GetBuildGrowCap]ความแหลม:§!กระดุมในอินเทอร์เฟซของกองเรือ และเลือกเมาส์ซ้าย ตัวเลือกต่าง ๆ คือ เลือกขวาบนดวงดาวแล้วเลือก§S[GetBuildGrowCap]ความแหลม:§!.\n\nแตกต่างจากสถานีออร์บิทัลอื่น ๆ§Sฐานของดวงดาว§!สามารถสร้างขึ้นนอกเขตแดนของเรา"
 frontier_outpost_built:1 "ฐานดวงดาวสร้าง"
 tutorial_25_tooltip:2 "§Sคํา พยากรณ์: ฐาน ของ ดาว§!เพิ่มลงในบันทึกสถานะ"
 TUTORIAL_PLANETVIEW_MANAGEMENT_TITLE: "การจัดการ: การจัดการ"
 TUTORIAL_PLANETVIEW_MANAGEMENT_DESC: "เดอะ§Sการจัดการ§!แท็บ แสดงข้อมูลเกี่ยวกับกุญแจ£planet£ §Sดาวเคราะห์§!เงื่อนไขและแผนผัง\n\nเดอะ§Sลักษณะ พิเศษ ของ ดาว เคราะห์§!ส่วนแสดงธรรมชาติ£blocker£ §Sบล็อก§!ที่สามารถล้างทั้งที่มีอยู่§Sคุณสมบัติต่าง ๆ§!.\n\nเดอะ§Sประชากรปัจจุบัน§!แสดงส่วนทั้งหมด£pops£ §Sป๊อป§!บน£planet£ §Sดาว เคราะห์§!.\n\nเดอะ£sector£ §Sส่วน§!แผงปล่อยให้โลกถูกจัดการเป็นส่วนหนึ่งของ§Sส่วน§!ระบบบริหารโลกอัตโนมัติ\n\n§Sการ คาด คะเน§!ช่วยให้คุณที่จะขึ้นอาณานิคมของคุณ, เพิ่มขึ้นอย่างมีประสิทธิภาพ§Sดาว เคราะห์§!ถ้าทรัพยากรที่จําเป็นพร้อม"
 TUTORIAL_DATABANK_TITLE: "ข้อมูล:"
 TUTORIAL_DATABANK_DESC: "เดอะ£databank£ §Sธนาคารข้อมูล§!คือทรัพยากรสําหรับเข้าใจระบบเกม\n\nการจัดรายการจัดตามหมวดหมู่ ทําให้ง่ายต่อการมองหากลไกเฉพาะ§Sคุณสมบัติต่าง ๆ§!หรือคอนเซ็ปท์ เมื่อไรก็ตามที่คุณต้องการ\n\nลอง หา ดู หรือ เลือก หัว เรื่อง จาก รายการ เพื่อ จะ เรียน รู้ มาก ขึ้น."
 TUTORIAL_EMPIRE_FOCUS_TIMELINE_TITLE: "ปรับเทียบเวลา:"
 TUTORIAL_EMPIRE_FOCUS_TIMELINE_DESC: "เดอะ£focus_core£ §Sโฟกัสของจักรวรรดิ§!ระบบช่วยนําทางการพัฒนาจักรวรรดิ ด้วยการให้คุณเลือกลําดับความสําคัญ:£focus_exploration£ §Sการสํารวจ§!, £focus_conquest£ §Sถาม§!หรือ£focus_development£ §Sพัฒนาการ§!.\n\nการ เพ่ง เล็ง แต่ ละ ครั้ง หมาย รวม ถึง ชุด ของ บัตร มอบ หมาย ซึ่ง มุ่ง หมาย จะ เสนอ การ ชี้ นํา โดย อาศัย เส้น ทาง ที่ คุณ เลือก. การคอมไพล์การ์ด§Sความคืบหน้า§!กับหมวดหมู่ที่เกี่ยวข้อง\n\nการ เพ่ง เล็ง ใน ปัจจุบัน เพิ่ม โอกาส ที่ จะ วาด งาน ที่ เกี่ยว ข้อง. ไพ่สามารถม้วนได้£unity£ §Sเอกภาพ§!ค่าใช้จ่ายและสมาธิสามารถเปลี่ยนแปลงได้\n\nติดตามเป้าหมายของคุณภายใต้§Sเสร็จสมบูรณ์แล้ว§!ถึง§Sความคืบหน้า§!แท็บเพื่อดูว่าคุณอยู่ใกล้ กับรางวัลผูกขาดต่อไป\n\nเดอะ§Sเส้นเวลา§!แสดงเหตุการณ์สําคัญและเหตุการณ์ประวัติศาสตร์ จากประวัติศาสตร์จักรวรรดิของคุณ เริ่มจาก§Sต้นฉบับ§!. รายการใหม่ปรากฏเป็นเหตุการณ์สําคัญที่เกิดขึ้นเมื่อเวลาผ่านไป"
 TUTORIAL_COLONIZATION_TITLE: "การ สะกด:ดาวเคราะห์"
 TUTORIAL_COLONIZATION_DESC: "เดอะ§Sองค์ประกอบภาพ§!หน้าจอคือที่ที่คุณเตรียมโลกสําหรับอาณานิคม\n\nA§Sชนิด§!ต้องเลือกเพื่อให้โลกสงบ และ§Sการออกแบบคอมโพนี§!ได้รับมอบหมายให้เน้นการพัฒนา\n\nภาพรวมของที่มีอยู่§Sขอบเขต§!, §Sขนาดพื้นโลก§!และศักยภาพ§Sตัวผสมเสียง§!แสดงร่วมกับรายการใด ๆ§Sลักษณะ พิเศษ ของ ดาว เคราะห์§!นั่นอาจจะส่งผลกระทบต่อโลก\n\nการจัดอันดับการพัฒนาจาก§Sดาวเคราะห์§!ทรัพยากรธรรมชาติจะช่วยให้คุณเป็นอาณานิคมมากที่สุด"
