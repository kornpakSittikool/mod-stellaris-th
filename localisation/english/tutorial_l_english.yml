 tutorial_18_chain_desc:2 "เราควรกําหนด§Sผู้ว่า§!เพื่อเพิ่มข้อมูลใหม่ของเรา§Sส่วน§!ทั้งหมด£planet£ §Sดาว เคราะห์§!ในส่วนนั้นจะได้ประโยชน์ จากผลกระทบของระดับความสามารถและคุณลักษณะของผู้ว่าฯ"
