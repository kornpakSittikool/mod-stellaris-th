 leader_trait_admiral_mind_wipe_02:0 "ผู้บังคับการการสี่เหลี่ยม"
 leader_trait_admiral_mind_wipe_02_desc:0 "$shroud_touched_intro$ความคิดของผู้บัญชาการตอนนี้หมุน กับความคิดใหม่ที่จะปรับปรุงระบบอาวุธ"
 leader_trait_scientist_mind_wipe_01:0 "นักวิทยาศาสตร"
