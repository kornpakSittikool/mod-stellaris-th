 enclave.8000.name: "โจมตี[FROM.GetName]"
 enclave.8000.start: "หลังจากการโจมตีของเรา[FROM.GetName], [root.GetTitle] §Y[root.GetName]§!ได้ออกจากพรมแดนของเรา[root.GetHeSheCap]บันทึกข้อความไว้[root.GetHisHer]ออกไป"
 enclave.8000.end: "น่า ยินดี ที่ นอก เหนือ จาก การ ทํา แท้ง[root.GetHisHer]ที่ทํางาน[root.GetName]ไม่ เป็น เหตุ ให้ ผู้ นํา คน อื่น ๆ ตก เป็น เหยื่อ."
 enclave.8000.councilor_end: "เนื่องจาก[root.GetHisHer]เกี่ยวข้องกับสภา การจากไปของ[root.GetName]ถึง[root.GetHisHer]บุคลากรทําให้เกิดความวุ่นวายครั้งใหญ่ ต่อการดําเนินการของรัฐบาล"

 shroudwalker_teacher_farewell: "§L\"คุณเต็มไปด้วยพลัง คุณไม่สามารถเข้าใจได้ อ่านอย่างระมัดระวังและใช้สิ่งที่ปลอบใจได้จากปัจจุบัน สําหรับเส้นทางที่คุณได้เลือกในอนาคต§!"
 enclave.8000.shroudwalker_teacher.desc: "$enclave.8000.start$\n\n$shroudwalker_teacher_farewell$\n\n$enclave.8000.end$"
 enclave.8000.shroudwalker_teacher.desc.councilor: "$enclave.8000.start$\n\n$shroudwalker_teacher_farewell$\n\n$enclave.8000.councilor_end$"

 master_salvager_farewell: "§L\"อืม, คุณได้แสดงสีที่แท้จริงของคุณ ฉันคาดหวังไว้มากกว่า ขอให้เครื่องยนต์ของคุณเย็บกระดาษและตาย ไปสู่ความว่างเปล่าที่มีคุณ.\"§!"
 enclave.8000.master_salvager.desc: "$enclave.8000.start$\n\n$master_salvager_farewell$\n\n$enclave.8000.end$"
 enclave.8000.master_salvager.desc.councilor: "$enclave.8000.start$\n\n$master_salvager_farewell$\n\n$enclave.8000.councilor_end$"

 curator_archivist_farewell: "§L\"น่าจดจํา! วูลการ์! ขี้ขลาด! ที่คิดว่าเราเคยพิจารณาคุณอารยธรรม แต่ฉันคิดว่าการทรยศดังกล่าวเป็นเพียงการคาดหวัง - สัญชาตญาณพื้นฐานและความโลภเล็กน้อยที่เคยเป็นเครื่องหมายของตัวละครของคุณคน.\"§!"
 enclave.8000.curator_archivist.desc: "$enclave.8000.start$\n\n$curator_archivist_farewell$\n\n$enclave.8000.end$"
 enclave.8000.curator_archivist.desc.councilor: "$enclave.8000.start$\n\n$curator_archivist_farewell$\n\n$enclave.8000.end$"

 trader_leader_farewell: "§L\"แล้วทําไมฉันไม่บอกความลับในตลาดเล็กๆนี้ บอกหน่อย มุมตรงนี้คืออะไร กําไรอยู่ไหน? แกไม่รู้หรือไง ว่าแกทําลายเราทั้งคู่§!"
