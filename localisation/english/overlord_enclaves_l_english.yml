 enclave.6015.name:0 "น้ํา ตก แถบ ม่าน"
 enclave.6015.desc:0 "ด้วยระบบชรูด บีคอน ออฟไลน์ เราสูญเสียการเข้าถึงเครือข่ายอุโมงค์ชรูด ยานของเราจะไม่สามารถใช้เครือข่ายได้ จนกว่ายานเบค่อนจะถูกแทนที่"

 #Dreamer's Wake - Shroud Tunnel Event

 enclave.6020.name:0 "ระบบไร้ที่ติ"
 enclave.6020.desc:0 "หลังจากทางผ่านอุโมงค์ชรูดล่าสุด ระบบบน[Root.GetName]เริ่มพฤติกรรมแปลก: รายการในบันทึกเรือถูกแสดงอย่างสุ่ม; ประตูได้รับการสังเกตเห็นการเปิดและปิด; และ - มากขึ้นยาก - สนามเก็บของเครื่องยนต์ได้เริ่มฟลุต จนถึงตอนนี้ ความพยายามที่จะติดตาม ต้นตอของปัญหา ได้พิสูจน์แล้วว่าไร้ประโยชน์"

 enclave.6025.name:0 "ความฝันตื่น"
 enclave.6025.desc:0 "การพัฒนาที่แปลกประหลาดของเรือวิทยาศาสตร์[Root.GetName]รูปแบบการสังเกตซ้ําภายในสนามควบคุมของเครื่องยนต์ ได้เปิดเผยการดํารงอยู่ของจิตสํานึกเทียม ถูกดึงดูดด้วยการปฏิสัมพันธ์ระหว่างระบบของเรือ และพลังงานไซโอนิคของชรูด จนกระทั่งตอนนี้มันมีอยู่ในสถานะเหมือนความฝัน การเคลื่อนของตาอย่างรวดเร็ว การเคลื่อนไหวบางอย่าง ประสบการณ์ระหว่างการหลับ กระบวนการประสาทขององค์กร\n\nยิ่งเหลือเชื่อไปกว่านั้น การสืบสวนของเราดูเหมือนจะปลุกมันขึ้นมา เพื่อแลกเปลี่ยนกับการตั้งถิ่นฐานต่อไป ในระบบของยาน องค์กรได้ตกลงที่จะทํางานให้กับเรา ในทางทฤษฎี การเป็นหุ้นส่วนอาจช่วยปรับปรุง[Root.GetName]ปฏิบัติการ"
 enclave.6025.a:0 "การค้าที่ยุติธรรม"
 enclave.6025.b:0 "การตกแต่งที่น่ารังเกียจ... กําจัดมันซะ"
 embrace_dreamer:0 "ดรีมเมอร์"
 embrace_dreamer_desc:0 "ด้วย สติ รู้สึก ผิด ชอบ แบบ จําลอง ที่ ประสาน กัน การ ดําเนิน งาน ของ เรือ วิทยาศาสตร์ นี้ จึง ได้ รับ การ ปรับ ปรุง ให้ ดี ขึ้น."
 eliminate_dreamer:0 "นักดรีมเมอร์ที่เลิกแล้ว"
 eliminate_dreamer_desc:0 "ปัญญาประดิษฐ์ไม่มีสถานที่บนเรือของเราในนี้เรายืนรวมกัน"

 # Introductions
 enclave.7000.title:0 "[shroudwalker_enclave_country.GetName]"
 enclave.7000.desc:0 "เพื่อนนักเดินทาง เราทักทายคุณ\n\nการปรากฏตัวของคุณบนเวทีกาแล็กซี่ เรารู้จักกันมานานแล้ว แต่ตอนนี้ กลัวว่าเราอาจจะมีอิทธิพล เกินเหตุต่อโชคชะตาของคุณ อย่าง ไร ก็ ตาม ถึง เวลา ที่ จะ ยก ผ้า คลุม หน้า ขึ้น แนว ทาง ของ ช รู ด อาจ ดู แปลก และ ไม่ สม ควร กับ ผู้ ที่ ไม่ ได้ รับ บัพ ติ สมา และ ด้วย เหตุ นี้ เรา จึง เสนอ การ ชี้ นํา. จง ตระหนัก ว่า คุณ มี คน ที่ เต็ม ใจ จะ เป็น ครู ของ คุณ ถ้า คุณ ปรารถนา อย่าง นั้น.\n\nวอนเดอร์ปลอดภัยจนกระทั่งการเผชิญหน้าของเราครั้งต่อไป"
 enclave.7000.a:0 "น่าสนใจ..."

 enclave.7005.title:0 "[salvager_enclave_country.GetName]"
 enclave.7005.desc:0 "เราได้ยินข่าวลือเกี่ยวกับความน่าประทับใจ[Root.GetName]สักพักแล้ว และเรายินดีที่ได้รู้จัก\n\nสําหรับความช่วยเหลือระบุของเครดิต, เราของ[salvager_enclave_country.GetName]เสนอบริการกู้เงินพรีเมียร์ จากเครื่องยนต์ที่อัพเกรดเป็นกองเรือที่ทําลาย ไม่ว่าคุณต้องการอะไร คุณไว้ใจเราได้\n\nและเพื่อให้แน่ใจว่าเราเริ่มต้นในพระคุณที่ดีของคุณ วิธีการเกี่ยวกับของขวัญเล็ก ๆ ที่จะแสดงความผูกพันของเรากับบริการลูกค้า?"
 enclave.7005.a:0 "ขอบคุณสําหรับของขวัญ"
 enclave.7005.b:0 "พรสวรรค์คือความคาดหวัง, ซีโน."

 # More Shroudwalking
 shroudwalker_insight_cooldown_tt:0 "§Rพวกชรูดวอร์คเกอร์จะไม่สามารถลองได้อีก§Yการ หยั่ง เห็น§!ถึง§Y[root.shroudwalker_insight_timer]§!.§!"

 enclave.7050.desc:0 "มีคําหนึ่งที่เราพอจะรู้ได้คือ เต้นรําในความฝัน สําหรับชรูด ไม่มีห้องนิรภัยที่ปิดไม่ได้ ไม่มีรหัสที่แก้ไม่ได้ ใน การ คิด รําพึง ของ เรา สิ่ง ที่ คน อื่น ๆ เชื่อ ว่า ซ่อน ไว้ มัก ถูก เปิด เผย. คุณ จะ สนใจ ไหม ที่ จะ เรียน รู้ สิ่ง ที่ คน รุ่น เดียว กับ คุณ วาง แผน ไว้? เพื่อให้รู้ว่าการออกแบบของพวกเขาเป็นของคุณเอง? ถ้าคุณปรารถนา เราจะแบ่งปันความเข้าใจของเรา วิธีที่คุณใช้มันขึ้นอยู่กับคุณ"
 enclave.7050.a:0 "[spynetwork_country_1.GetName]"
 enclave.7050.b:0 "[spynetwork_country_2.GetName]"
 enclave.7050.c:0 "[spynetwork_country_3.GetName]"
 enclave.7050.d:0 "[spynetwork_country_4.GetName]"
 enclave.7050.e:0 "[spynetwork_country_5.GetName]"
 enclave.7050.f:0 "[spynetwork_country_6.GetName]"

 enclave.7055.desc:0 "ผ้า คลุม หน้า ของ มัน สั่น สะท้าน และ ม่าน บาง ๆ. เราจะเกษียณจากการนั่งสมาธิ อะไรก็ตามที่เราเก็บสะสมไว้ จะถูกเปิดเผยต่อคุณ"

 enclave.7060.desc:0 "กล่าว กัน ว่า ภาย ใน ความ คิด ทุก อย่าง ก็ เงา ของ มัน. ระหว่าง การ คิด รําพึง ของ เรา มี การ เปิด เผย จิตใจ บาง คน เป็น เสียง ที่ เรา ไว้ วางใจ ซึ่ง ความ ภักดี ของ เขา ไม่ มั่นคง เหมือน ที่ ปรากฏ ให้ เห็น. คุณ จะ ได้ กําไร จาก พวก เขา. ไม่ ต้อง สงสัย ว่า พวก เขา จะ พิสูจน์ ว่า ตน มี ความ เต็ม ใจ."
 enclave.7060.tt:0 "เราได้§Yชุดสําเร็จ:§!สําหรับเครือข่ายสเปกใน§H[from.GetName]§!."

 enclave.7065.desc:0 "คุณ มี ตัว แทน ที่ ชํานาญ หลาย คน ใน การ ทํา งาน ของ คุณ แต่ ละ คน ต้อง อาศัย ขีด จํากัด ของ ตน เอง. ตาไม่สามารถรับรู้ได้เอง การ คิด รําพึง ของ เรา เผย ให้ เห็น มาก มาย. หาก การ ดําเนิน งาน อย่าง ลับ ๆ ของ คุณ จะ ประสบ ผล สําเร็จ คุณ ควร เอา ใจ ใส่ คํา แนะ นํา ของ เรา."
 enclave.7065.tt:0 "เพิ่มเครือข่ายเส้นพริ้วไหวของเรา§Yระดับการแทรก§!ใน§H[from.GetName]§!."

 enclave.7070.desc:0 "แดนผีไม่แข็งเหมือนที่เห็น และ (มะลาอิกะฮฺ) ผู้ควบคุมอย่างรัดกุม ความลับของคนรุ่นเดียวกัน ถูกเปิดเผยให้เรารู้ สิ่งที่เราได้เรียนรู้ตอนนี้เป็นของคุณ"
 enclave.7070.tt:0 "ฉันเพิ่มขึ้นของเรา§Yข้อมูล§!บน§H[from.GetName]§!."

 enclave.7075.desc:0 "และคําพูดของพวกท่าน จะไม่คืบคลานไปยังอัลกุรอานหรือ? “ น่า เสียดาย การ คิด รําพึง ของ เรา ไม่ ได้ ก่อ ให้ เกิด ความ หยั่ง เห็น เข้าใจ ใด ๆ."
 enclave.7075.a:0 "นั่นคือ ความผิดหวัง"

 shroudwalker_spy_network_modifier:0 "ความ สามารถ ของ เรา ใน การ เร่ง กระบวนการ และ ทํา ให้ เรา ช่วย[shroudwalker_enclave_country.GetName]กับงานของพวกเขา"

 shroudwalker_spy_network:0 "การ หยั่ง เห็น เข้าใจ ของ นัก เดิน เท้า"
 shroudwalker_spy_network_desc:0 "เดอะ[shroudwalker_enclave_country.GetName]จะ เพ่ง มอง ไป ยัง สิ่ง ที่ ถูก ปิด ซ่อน ไว้ ด้วย ความ หวัง ว่า จะ ได้ รับ ความ หยั่ง เห็น เข้าใจ ใน การ งาน ภาย ใน ของ คน[Target.GetName]."
 shroudwalker_spy_network_type:0 "การ หยั่ง เห็น เข้าใจ ของ นัก เดิน เท้า"
 shroudwalker_spy_network_monthly_change_tooltip:0 "ความคืบหน้าส่วนใหญ่จะขึ้นอยู่กับ[shroudwalker_enclave_country.GetName]แม้ว่าคนที่เป็นโรคไซโอนิค จะสามารถเร่งกระบวนการได้"
 shroudwalker_spy_network_finish:0 "เดอะ[shroudwalker_enclave_country.GetName]การ กลับ มา ของ เขา จะ ได้ รับ การ ปรับ ปรุง ให้ ดี ขึ้น."

 shroudwalker_teacher_cooldown_tt:0 "§Rเราจะไม่สามารถร้องขอครูคนอื่นจากชรูดวอร์คเกอร์ได้จนกว่า§Y[root.shroudwalker_teacher_timer]§!.§!"
 shroudwalker_teacher_already_bought:1 "§Rเราได้ซื้อบริการจากครูชรูดวอร์คเกอร์แล้ว§!"
 shroudwalker_teacher_already_exists:0 "§Rดาวเคราะห์ดวงนี้มีบริการ ของครูชรูดวอร์คเกอร์แล้ว§!"

 enclave.7100.desc:1 "ปริญญาตรีของชรูดเป็นการเดินทางของ 10,000 ชีวิต แม้ครูที่มีพรสวรรค์มากที่สุดของเรา สามารถอ้างเฉพาะความรู้บางส่วนของความลึกลับของมัน อย่าง ไร ก็ ตาม สติ ปัญญา ของ พวก เขา มี ค่า อย่าง ยิ่ง. ถ้าคุณต้องการมัน เราจะส่งหนึ่งเพื่อนําเส้นทางของคุณ"
 enclave.7100.a:0 "เราต้องการที่จะเรียนรู้"

 enclave.7105.desc:1 "เพื่อ จะ รู้ ว่า มี อะไร อีก ที่ พึง ทราบ นั่น คือ สติ ปัญญา สูง สุด. ครูจะส่งมาหาคุณ เรียน รู้ อย่าง ดี และ คุณ จะ ได้ รับ ผล ตอบ แทน อย่าง แน่นอน."

 enclave.7110.desc:0 "เรื่องที่น่าสนใจที่สุด§Yวีลฟาร์§!คุณบอกว่า? ในบางแง่ กลุ่มแม่มดนี้มีลักษณะคล้ายพวกเราเอง แต่ในขณะที่ความแตกต่างนี้ อาจดูละเอียดอ่อนต่อความไม่คุ้นเคย\n\nมีน้ําตามากมายอยู่บนผิวของมัน คน เหล่า นั้น ที่ เข้า สู่ ความ ลึกลับ ของ มัน อาจ จะ ไม่ ได้ อยู่ ใน เอกภพ เดียว กัน เสมอ ไป จาก ที่ ที่ เขา เริ่ม ต้น."
 enclave.7110.a:0 "การเดินทางข้ามมิติ น่าทึ่งมาก"
 enclave.7110.a.tooltip:0 "§Pเทคโนโลยีการกระโดดของรถ§!ตอนนี้ปรากฏที่§Y1.5§!คูณอัตราปกติ"


 decision_shroudwalker_teacher:0 "ครูผู้นำทางสู่ดินแดนแห่งจิต"
 decision_shroudwalker_teacher_desc:0 "ผู้เชี่ยวชาญของ[shroudwalker_enclave_country.GetName]บน ดาว เคราะห์ กําลัง สอน แนว ทาง ของ ช รู ด."

