 enclave.7250.desc:0 "Zro เป็นที่สนใจของเราโดยเฉพาะ เราสามารถสอนวิธีการเก็บเกี่ยวและเก็บสะสมได้ แต่ถ้าคุณตกลงที่จะแบ่งปันการผลิตของคุณ ในความเหมาะสม"
 enclave.7250.a:0 "คุณจะได้ส่วนแบ่งของคุณ สอนเรา"
 enclave.7255.desc:0 "Zro เป็นสารที่ยอดเยี่ยม แต่เศร้า มันมีการประยุกต์ใช้หลายอย่าง แต่ไม่ควรจะใช้ง่าย ๆ เพราะเป็นมรดกสุดท้ายของสายพันธุ์ที่อ่อนแอที่สุด เก็บเกี่ยวมัน ทะนุถนอมมัน และอย่าลืมจ่ายเงินให้เรา"

 shroudwalker_zro_tithe:0 "ชรู ด วอร์คเกอร์"
 shroudwalker_zro_tithe_desc:0 "เดอะ[shroudwalker_enclave_country.GetName]สอนเราถึงวิธีการเก็บเกี่ยว Zro ในการแลกเปลี่ยน เราได้สาบาน ที่จะให้พวกเขาหนึ่งในสิบ ของการผลิต Zro ทั้งหมดของเรา"

