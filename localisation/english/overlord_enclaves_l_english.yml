 divination_locus:0 "สัญลักษณ์ ของ โลคัส"
 divination_locus_type:0 "$divination_visitors_type$"
 divination_locus_desc:0 "มันเป็นความประสงค์ของชรูดที่พื้นที่รอบคุณรับในรูปแบบใหม่ อ่าน อย่าง ถี่ถ้วน แต่ ด้วย ความ กล้า หาญ และ พิจารณา ว่า ความ มหัศจรรย์ อะไร บ้าง อาจ อยู่ บน เส้น ทาง ที่ อยู่ ข้าง หน้า."
 divination_locus_embrace:1 "เรายอมรับพระประสงค์ของชรูด โดยการสํารวจเส้นทางนี้ด้วยตัวเอง"
 divination_locus_denied:1 "เราท้าทายความประสงค์ของชรูด โดยยังคงอยู่ และปกป้องดินแดนของเรา"
 divination_locus_monthly_change_tooltip:0 "$divination_monthly_change_tooltip$"

 divination_situation_end:0 "หลังจากบอกคําทํานายของพวกเขา[shroudwalker_enclave_country.GetName]จะบอกเราได้ว่าชรูดเงียบลง"

 #Built first Shroud Beacon (non-Teachers origin)

 enclave.4200.name:0 "บี คอน ไป ยัง ชรูด"
 enclave.4200.desc:0 "หลัง จาก ใช้ เวลา นาน หลาย ปี ใน ความ มืด ผ้า คลุม หน้า ก็ ถูก ยก เลิก. แม้ว่ากระบวนการแปลกๆ ที่ระบบชรูด บีคอน ยังคงไม่ค่อยเข้าใจนัก จากนักวิทยาศาสตร์ของเรา แต่ระบบทางกายภาพของมัน อุโมงค์ ที่ มัน วาง ไข่ มี ทาง ผ่าน มาก กว่า เส้น ทาง โดย เสนอ เส้น ทาง เดิน เรือ ของ เรา เป็น ทาง ลัด พิเศษ ผ่าน ทาง ช รู ด. การสํารวจดวงดาวจะเร็วขึ้น และลึกลับมากขึ้นอนันต์"

 #Teachers of the Shroud origin - Crisis Events

 enclave.4240.name:0 "การ ตื่น ครั้ง สุด ท้าย"
 enclave.4240.desc:0 "เครื่องราชอิสริยาภรณ์ เครื่องชรูดได้เตือนแล้ว ขณะ ที่ เกิด วิกฤตการณ์ ใหญ่ ก็ ใกล้ เข้า มา แล้ว และ กาแล็กซี ต่าง ๆ ก็ ใกล้ จะ ถูก ทําลาย. คําทํานายของเราแสดงให้เห็นว่าเรา ไม่ตรงกับภัยคุกคามที่กําลังจะมา แทน ที่ จะ ถูก ทําลาย บัด นี้ เรา ให้ บท เรียน สุด ท้าย แก่ เรา: ความ ฝัน ทุก อย่าง ได้ รับ การ ปลุก ขึ้น มา. เวลานั้นมาถึงพวกเราแล้ว ที่จะต้องข้ามไปยังโลกนี้ ถึง แม้ เส้น ทาง ของ ช รู ด มืด และ คด เคี้ยว เรา ก็ จะ มา ถึง เครื่อง บิน ใหม่ ซึ่ง เป็น โลก ใหม่ ที่ จะ แพร่ คํา สอน ของ เรา. เราออกจากกาแล็คซี่นี้ และชะตากรรมของมันให้คุณ ขอ ให้ บท เรียน ใน อดีต ของ เรา เป็น เครื่อง นํา ทาง ใน เวลา ที่ คุณ ต้องการ."
 enclave.4240.a:0 "ขอให้เจ้ากอดเจ้าไว้"
 enclave.4240.b:0 "คุณทอดทิ้งพวกเราได้ยังไง"

 shroudwalkers_depart_reverence:0 "จง ยอม รับ บท เรียน"
 shroudwalkers_depart_reverence_desc:0 "ครูของเราไม่เคยทําให้เราผิดหวัง เราหวังให้พวกเขาเดินทางครั้งสุดท้าย"
 shroudwalkers_depart_anger:0 "ปฏิเสธ บท เรียน"
 shroudwalkers_depart_anger_desc:0 "ครูของเราทอดทิ้งพวกเรา เราไม่จําเป็นต้องเรียนแล้ว"

 enclave.4243.name:0 "คํา เตือน"
 enclave.4243.desc:1 "คุณเดินในเส้นทางที่อันตราย ท่านคิดว่าเราจะไม่รู้หรือว่า พวกเราที่เลี้ยงดูท่านมาหลายศตวรรษแล้ว ใน การ สอน คุณ เกี่ยว กับ ความ ซื่อ สัตย์ มั่นคง เรา หวัง จะ ให้ ความ กระจ่าง ใน เรื่อง การ ยก ระดับ. แต่นี่? พลังอํานาจและความรุนแรง และวิกฤตการณ์ของคุณ จําคําสอนของคุณไว้! จักรวาลนี้ไม่มีอะไร แต่เงาของความฝัน ยังมีเวลา ยอมแพ้กับความทะเยอทะยานที่ผิดๆ ก่อนที่คุณจะถูกทําลาย"
 enclave.4243.a:0 "เรากลายเป็นอะไร?"
 enclave.4243.b:0 "โชคชะตาของเราชัดเจน อย่าขวางทางเรา"

 enclave.4245.name:0 "การ ไม่ ได้ รับ การ ศึกษา"
 enclave.4245.desc:0 "การ สั่น สะท้าน ของ มัน เอง และ สัญญาณ ทุก อย่าง ชี้ ถึง ความ พินาศ. เราเฝ้าดูเจ้ามานาน แต่แม้แต่เราก็ยังไม่อาจรู้ ขอบเขตความโง่เขลาของเจ้า พร้อมที่จะลงมือ คุณจะลังเล ในการยึดอํานาจ มันสูญเสียไปแล้ว คุณ มี บท เรียน พื้น ฐาน ที่ สุด คือ ชรูด ไม่ ใช่ ทรัพยากร ที่ จะ หา ประโยชน์ ได้ แต่ เป็น ความ ลึกลับ ที่ ได้ กลิ่น. แต่ความล้มเหลวของนักเรียนขึ้นอยู่กับครู แทนที่จะเห็นความน่ากลัวที่ท่านจะกลายเป็น เราเลือกที่จะจากโลกนี้ไป แม้ว่าเส้นทางของชรูดเป็นความมืดและลม เราจะมาในที่สุดไปยังเครื่องบินใหม่ โลกใหม่ บางทีที่นั่นเราอาจจะพบลูกศิษย์ ที่คุ้มค่าของคําสอนของเรา\n\nขอให้ชรูดเมตตาเจ้า"
 enclave.4245.a:0 "เจ้าควรจะไปซะ"
 enclave.4245.b:0 "ครั้งนึงเราเป็นนักเรียน ตอนนี้เราคืออาจารย์"

 ## Pionic Breach - Shroud Tunnel Event ##
 enclave.4250.name:0 "ช่อง โหว่"
 enclave.4250.desc:0 "ทริปที่ผ่านมาของเราผ่านอุโมงค์ชรูด ได้ก่อให้เกิดความเสียหายขนาดใหญ่ ในเวลาอวกาศ พลังงานสนเทศในระดับที่ไม่เคยมีมาก่อน จะไหลออกไปในระบบและ ... มันเริ่มใช้ถ่านหิน ข้อมูลของตัวตรวจจับ ผันผวน, ไม่แน่นอน, แต่มันดูเหมือนว่าเป็น รูปแบบของไข่ชรูด ใหญ่และแน่นอนก้าวร้าว"
 enclave.4250.a:0 "กาแล็คซี่จะยิ่งอันตรายมากขึ้น"
 enclave.4250.b:0 "ขอให้พระเจ้าคุ้มครองเรา"
 enclave.4250.c:0 "เราจะบดมันให้เป็นผุยผง"
 enclave.4250.d:0 "ถ้า เป็น ไป ได้ เรา จะ หลีก เลี่ยง ข้อ ขัด แย้ง ใด ๆ."

 #Shrouded - Divination event (Sign of the Locus)
 enclave.5055.name:0 "ย่อหาย"
 enclave.5055.desc:0 "การเปลี่ยนแปลงที่คาดการณ์ไว้[shroudwalker_enclave_country.GetName]ได้มาถึง : หลังจากที่ไม่คาดฝันจุดในโซนิค[Root.GetName]หลงทางให้กับชรูด เพิ่มขึ้นเช่นคลื่นที่ดี กระดอนอวกาศตัวเอง ม้วนตัวเหนือเรือ หลังจากนั้นอีกไม่กี่วินาที มันยังคงส่งสัญญาณโทรคมนาคม ทั้ง นี้ รวม ไป ถึง การ บันทึก ของ ลูก เรือ ที่ มี การ สวม เสื้อ ผ้า, ร่าง กาย ของ พวก เขา เปลี่ยน จาก ขณะ หนึ่ง ไป อีก ขณะ หนึ่ง, บิดเบือน เป็น รูป แบบ ใหม่ ที่ แปลก ใหม่.\n\nตั้งแต่นั้นเป็นต้นมา ภาพหลัง หรือ 'กฤษณา' ของเรือ ได้ปรากฏขึ้นอย่างกะทันหันทั่วภาค การศึกษาปรากฏการณ์นี้ จะช่วยให้เราเข้าใจ ชะตากรรมของยานและลูกเรือได้ดีขึ้น"
 enclave.5055.poi_1:0 "เรือที่จม"
 enclave.5055.poi.desc:0 "ตําแหน่งล่าสุดของเรือของเราหายไปที่ชรูด"
 shrouded_ship_discoveries:0 "การ ศึกษา เรือ ที่ ถูก ทิ้ง ร้าง"

 SHROUDED_SHIP_PROJECT:0 "ภาพหลังภาพแปลก"
 SHROUDED_SHIP_PROJECT_DESC:0 "เกิดการกระสับกระส่าย หลังจากภาพพจน์ของยานวิทยาศาสตร์ ที่หายไปจากเครื่องชรูด ปรากฎอย่างคร่าวๆ ทั่วระบบ"

 enclave.5060.name:0 "เรือ ที่ ล่อง ลอย"
 enclave.5060.desc:0 "เรามีความคืบหน้าเกี่ยวกับเรือวิทยาศาสตร์ที่หายไปให้กับชรูด ภาพเบื้องหลังที่เกิดขึ้นในระบบ ไม่ใช่ยานเอง แทนที่ นักวิทยาศาสตร์ของเราจะอธิบายว่ามันเป็น 'วัตถุเชิงเทคนิค' การไม่มีมิติ, 'เรือนี้เป็นคอนเซ็ปต์' มีอยู่ในพิมพ์เขียวไซโซนิค ขึ้นอยู่กับสภาพจิตของผู้สังเกตการณ์ รูปแบบของเรือจะติดอ่างและเปลี่ยนแปลง ขณะ ที่ การ ศึกษา ปรากฏการณ์ นี้ ได้ ช่วย เรา ให้ เข้าใจ มาก ขึ้น ถึง ความ เกี่ยว พัน ระหว่าง การ รับ รู้ กับ เวลา ของ อวกาศ แต่ เรา ก็ ไม่ ใกล้ ที่ จะ ได้ เรือ ลํา แรก มา. สําหรับตอนนี้เราต้องพิจารณา มันหายไปเพื่อ& ขาว"

 enclave.5065.name:0 "รูปแบบสุดท้าย"
 enclave.5065.desc:0 "เรือวิทยาศาสตร์ที่หายไปของเรา เมื่อคิดว่าหายไปแก่หมุน & 90ตลอดกาลก็เกิดขึ้นอีกครั้ง แม้ ว่า ขนาด ของ เรือ ถูก เปลี่ยน ไป อย่าง แยบยล แต่ เรือ และ ลูก เรือ ก็ มี รูป ร่าง ดี.\n\nการอธิบายประสบการณ์ของพวกเขาในชารูดเป็นบางสิ่งบางอย่างที่คล้ายคลึงกับความฝันแปลกแยก เมื่อเวลาผ่านไปลูกเรือสามารถปลอม 'คอนเซ็ปต์' ของตัวเองและสภาพแวดล้อมของพวกเขา ขณะ ที่ ความ คิด เห็น ของ พวก เขา แต่ ละ คน เริ่ม ประสาน กัน พวก ลูก เรือ ก็ เข้า มา ใกล้ ความ เป็น จริง ของ เรา มาก ขึ้น เรื่อย ๆ. ที่ แท้ แล้ว พวก เขา ประสบ ผล สําเร็จ ใน การ ฝัน ถึง ตัว เอง กลับ คืน สู่ สภาพ เดิม."
 enclave.5065.a:0 "ยินดีต้อนรับกลับมาครับ"

 #All Too Lucid
 enclave.5005.name:0 "ทั้งหมดลูซิดเกินไป"
 enclave.5005a.desc:0 "$enclave.5005.intro$ที่การนอนหลับแบบหมุน & 90ยาเสพติดกระตุ้นให้ระบบลิมบิกของผู้ใช้ ส่งผลให้เกิดสภาวะที่น่าอัศจรรย์ของความฝันสดใส\n\n$enclave.5005.outro$"
 enclave.5005b.desc:0 "$enclave.5005.intro$ยานี้ผลิตเป็นรัฐคล้ายกับการหลับ กระตุ้นให้กระดูกสันหลังประสาท ทําให้เกิดภาวะฝันเฟื่องอย่างน่าทึ่ง\n\n$enclave.5005.outro$"
 enclave.5005c.desc:0 "$enclave.5005.intro$ยานี้ผลิตสถานะคล้ายกับการหลับ กระตุ้นให้เส้นประสาทคลอโรพลาสต์ สร้างภาวะฝันเฟื่องอย่างน่าทึ่ง\n\n$enclave.5005.outro$"
 enclave.5005d.desc:0 "$enclave.5005.intro$ยานี้สร้างสถานะคล้ายการหลับ กระตุ้นเมทัลเลียมประสาท ให้สร้างภาวะฝันเฟื่องได้อย่างน่าทึ่ง\n\n$enclave.5005.outro$"
 enclave.5005e.desc:0 "$enclave.5005.intro$เมื่อ เริ่ม นอน หลับ ยา นี้ กระตุ้น ให้ ตา มอง เห็น ได้ ซึ่ง ยัง ผล ให้ เกิด ความ ฝัน ที่ แจ่ม ใส อย่าง ไม่ น่า เชื่อ.\n\n$enclave.5005.outro$"
 enclave.5005f.desc:0 "$enclave.5005.intro$ใน ตอน เริ่ม หลับ ยา นี้ กระตุ้น สมอง ของ แมง กะพรุน คู่ ทํา ให้ เกิด ความ ฝัน ที่ แจ่ม ใส อย่าง ไม่ น่า เชื่อ.\n\n$enclave.5005.outro$"
 enclave.5005g.desc:0 "$enclave.5005.intro$ใน ตอน เริ่ม หลับ ยา นี้ กระตุ้น ให้ เกิด การ ร่วม มือ กัน อย่าง ไม่ น่า เชื่อ ใน ความ ฝัน.\n\n$enclave.5005.outro$"
 enclave.5005h.desc:0 "$enclave.5005.intro$ยานี้สร้างสถานะคล้ายกับการหลับ กระตุ้นเนื้อเยื่อสมองของเนโครติก ให้สร้างภาวะฝันเฟื่องอย่างน่าทึ่ง\n\n$enclave.5005.outro$"
 enclave.5005.intro:0 "เหตุ การณ์ ที่ บอก ล่วง หน้า[shroudwalker_enclave_country.GetName]มาถึง: ยาถนนใหม่กําลังได้รับความนิยม[Root.GetName]จับกุม\"ลูซิด\" สารประกอบไซโซนิคมาจากพืชท้องถิ่น"
 enclave.5005.outro:0 "มากไปกว่านั้น ผู้ใช้หลายคนได้รายงานว่ากําลัง เฝ้าฝันอยู่ เช่นถ้าใครบางคน- \"ข้ามพรมแดนไป\" ในความคิดของพวกเขา อย่าง ไร ก็ ตาม หลาย คน ถือ ว่า สภาพ ความ ฝัน ที่ น่า หลงใหล นั้น ดี กว่า สภาพ จริง อัน โหด ร้าย ของ ชีวิต ใน อาณานิคม. แต่น่าเสียดายที่ความนิยมของยา ได้นําไปสู่การเพิ่มขึ้นของเครือข่ายการจําหน่ายอาชญากร"
 enclave.5005.a:0 "รัว"

 enclave.5010.name:0 "ฝัน ร้าย"
 enclave.5010.desc:0 "การ ใช้ ยา ลูซีด ยัง คง มี อยู่ ต่อ ไป[Root.GetName]UNCER รายงานการเพิ่มขึ้นของภาวะเสื่อมสภาพที่รบกวนอารมณ์ โดยผู้ใช้ที่กระตือรือร้นมากที่สุด ประสบกับการพักอาการทางจิตอย่างหนัก อาชญากรรมลดลง อาชญากรรมเพิ่มขึ้น และประชากรท้องถิ่นไม่มีสัญญาณ ของการเลิกนิสัยของพวกเขา"
 enclave.5010.a:0 "ผิดกฎหมาย!"
 enclave.5010.b:0 "เราต้องการข้อมูลมากกว่านี้"

 enclave.5015.name:0 "ความ ฝัน"
 enclave.5015.desc:0 "นัก วิทยาศาสตร์ ของ เรา ได้ ทํา ความ ก้าว หน้า ใน การ วิจัย ยา ลูซีด. สารประกอบนี้มีผลกระทบต่อระบบของผู้ใช้ ไม่เพียงส่งเสริมการฝันที่สดใส แต่ยังก่อให้เกิดการเชื่อมโยงสารเคมี ความ จําเป็น เพิ่ม ขึ้น ทุก ครั้ง ที่ มี การ เสพ ยา. เมื่อให้ยาในปริมาณที่สูงพอ การแปรรูปควอนตัม ได้รับการสังเกตเห็นภายในสมอง การเปลี่ยนแปลงเหล่านี้สอดคล้องกับ สิ่งเล็ก ๆ ที่เรารู้ของชรูด\n\nหลัง จาก ตื่น นอน ผู้ ป่วย จะ บ่น ว่า ปวด ศีรษะ และ ประสาท หลอน. กรณีรุนแรงส่งผลให้เลือดออกจนตาย ต่อ มา การ ชันสูตร เผย ให้ เห็น .01% ของ มวล สมอง. ความฝันเองก็ทิ้งร่องรอยไว้\n\nเบาะแสของโครงการคือ การขอทรัพยากรเพิ่มเติม เพื่อให้เข้าใจผลกระทบของยาได้ดีขึ้น โชคดี ที่ได้เรียกร้อง สารประกอบ เราไม่มีการขาดแคลนอาสาสมัคร"

 enclave.5020.name:0 "สิ่ง ที่ อาจ เกิด ขึ้น"
 enclave.5020a.desc:0 "$enclave.5020.intro$แต่ละได้ถึงสถานะของการติดต่อทางร่างกายและไม่สามารถเข้าสู่การนอนหลับหมุน & 90ได้ตามธรรมชาติ$enclave.5020.outro$"
 enclave.5020b.desc:0 "$enclave.5020.intro$แต่ละคนได้เข้าสู่สภาวะ ของการติดต่อทางร่างกาย ซึ่งทําให้การทํางานของพวกเขา$enclave.5020.outro$"
 enclave.5020c.desc:0 "$enclave.5020.intro$แต่ ละ คน ได้ บรรลุ สภาพ ของ การ ติด ต่อ ทาง ร่าง กาย ซึ่ง ทํา ให้ ระบบ ประสาท ของ ตน บกพร่อง อย่าง ร้าย แรง จาก การ ทํา งาน อย่าง ถูก ต้อง.$enclave.5020.outro$"
 enclave.5020d.desc:0 "$enclave.5020.intro$แต่ละคนได้เข้าสู่สภาวะของการติดต่อทางร่างกาย ซึ่งทําให้เส้นประสาทของพวกเขาผิดปกติอย่างหนัก จากการทํางานอย่างถูกต้อง$enclave.5020.outro$"
 enclave.5020e.desc:0 "$enclave.5020.intro$แต่ละได้ถึงสถานะของการติดต่อทางร่างกายและไม่สามารถเข้าสู่การนอนหลับตามธรรมชาติ$enclave.5020.outro$"
 enclave.5020f.desc:0 "$enclave.5020.intro$แต่ ละ คน ได้ บรรลุ สภาพ ของ การ ติด ต่อ ทาง ร่าง กาย ซึ่ง ทํา ให้ สมอง ของ พวก เขา บกพร่อง อย่าง ร้าย แรง จาก การ ทํา งาน อย่าง เหมาะ สม.$enclave.5020.outro$"
 enclave.5020g.desc:0 "$enclave.5020.intro$แต่ ละ คน ได้ บรรลุ สภาพ ของ การ ติด ต่อ ทาง ร่าง กาย ซึ่ง ทํา ให้ การ ร่วม มือ กัน อย่าง ถูก ต้อง ของ พวก เขา ได้ รับ ความ เสีย หาย อย่าง หนัก.$enclave.5020.outro$"
 enclave.5020h.desc:0 "$enclave.5020.intro$แต่ ละ คน ได้ บรรลุ สภาพ ของ การ ติด ต่อ ทาง ร่าง กาย ซึ่ง ทํา ให้ ไซแนป ของ พวก เขา ที่ มี ความ จําเป็น บกพร่อง อย่าง รุนแรง จาก การ ทํา งาน อย่าง ถูก ต้อง.$enclave.5020.outro$"
 enclave.5020.intro:0 "ผล จาก การ ศึกษา วิจัย ของ เรา เกี่ยว กับ ยา ลูซีด: หลาย คน ได้ เสีย ชีวิต หลัง จาก ใช้ ไป นาน."
 enclave.5020.outro:0 "30% เพิ่มขึ้นเป็นเนื้องอกในสมอง การถ่ายภาพแบบจินตนาการสูง แสดงให้เห็นว่าเนื้องอกเหล่านี้ คือระยะของตัวอ่อน ของปรสิตบางชนิด\n\nมันเป็นทฤษฎีว่า ความผันผวนของควอนตัม ที่ผลิตโดยยา อนุญาตให้ปรสิตเหล่านี้\"ข้าม\" จากระนาบมิติชิด เห็นได้ชัดว่า แต่งหน้าประสาทของเรา เหมาะสมกับความต้องการอาหารของพวกเขา\n\nตั้งแต่การค้นพบนี้แพร่งพรายออกไป หน่วยรักษาความปลอดภัยรายงานว่า มีการจับกุมลูซิดน้อยลง 50% บางทีคนของเราอาจจะตื่นขึ้นมาในที่สุด"
 enclave.5020.a:0 "ราตรีสวัสดิ์"

 enclave.5025.name:0 "การตาย การนอน..."
 enclave.5025.desc:0 "ข่าวที่รบกวนจาก[Root.GetName]จํานวน ผู้ เสีย ชีวิต มี เพิ่ม ขึ้น ท่ามกลาง ผู้ ใช้ ยา เสพย์ ติด ลูซิด. ดู เหมือน สาร ประกอบ นี้ ไม่ เพียง แต่ ส่ง เสริม ความ ฝัน แบบ โลกีย์ เท่า นั้น แต่ ยัง ส่ง เสริม การ ติด ต่อ ทาง เคมี ด้วย. การฉีดปริมาณสูงพอ ส่งผลให้เลือดออกภายใน และในที่สุดก็ตาย"
 enclave.5025.a:0 "หงุดหงิด"

 enclave.5030.name:0 "พวก เขา ร้องไห้ เพื่อ ฝัน อีก ครั้ง หนึ่ง"
 enclave.5030.desc:0 "การ ใช้ ยา เสพย์ ติด อย่าง แพร่ หลาย ยัง คง มี ต่อ ไป[Root.GetName]แม้จะถูกลงทัณฑ์อย่างโหดร้าย ต่อผู้กระทําความผิด แต่ประชาชนของเราจํานวนมากมากขึ้น แม้ ผล คือ ความ ตาย ของ พวก เขา เอง พวก เขา ก็ จะ ไม่ ท้อ ถอย. ความจุบน[Root.GetName]ปฎิเสธต่อไป"

 enclave.5035.name:0 "การนอนตาย"
 enclave.5035.desc:0 "จํานวนการตายของลูซิด[Root.GetName]เพิ่มขึ้นไปเรื่อยๆ อย่าง ไร ก็ ตาม เมื่อ สภาพ ทาง สังคม แย่ ลง เรื่อย ๆ ผู้ คน มาก ขึ้น เรื่อย ๆ หัน ไป หา ยา เพื่อ หนี. ถ้ายังเป็นแบบนี้ต่อไป เราเสี่ยงที่จะเสียอาณานิคมไป"
 enclave.5035.a:0 "พวกเขาต้องหยุด"

 TO_DREAM_PROJECT_01:0 "ความ ฝัน"
 TO_DREAM_PROJECT_01_DESC:0 "เริ่มค้นคว้าผลกระทบของยาข้างถนน ที่รู้จักกันในชื่อ \"ลูซิด\""
 TO_DREAM_PROJECT_02:0 "ความ ฝัน"
 TO_DREAM_PROJECT_02_DESC:0 "สืบค้นต่อไปถึงผลกระทบของยาข้างถนน'Lucid'"
