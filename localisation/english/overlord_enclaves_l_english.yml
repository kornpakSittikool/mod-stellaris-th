 #Rogue Shaman (Divination Event)
 #The shaman appears...
 enclave.5075.name:0 "เชาแมน"
 enclave.5075.desc:0 "ถูกเนรเทศจาก[shroudwalker_enclave_country.GetName]ถึงแล้ว[Root.GetName]. เมื่อเร็ว ๆ นี้ถูกขับไล่ออกจากเอนคลาฟ สําหรับมุมมองนอกอ่าวนี้ 'นอกรีต' ไม่ได้อยู่ในรายการใด ๆ ของเรือที่เข้ามา ราวกับว่าการแต่งกายออกจากอากาศ พวกเขาปรากฏตัวในจัตุรัสกลาง ของเมืองที่ใหญ่ที่สุดในอาณานิคม ประกาศอย่าง เปิด เผย ตามคําบอกเล่าของผู้ลี้ภัย มันเป็นไปได้ที่คนของเรา จะประสบความสําเร็จในภาวะความสุข รายงาน ต่าง ๆ บ่ง ชี้ ว่า หลาย คน ใน อาณานิคม กําลัง ฟัง อยู่."
 enclave.5075.a:0 "พวกนอกโลกไม่มีที่นี่ เอาการเนรเทศออกไป"
 enclave.5075.b:0 "การ ละเลย การ ไป เยี่ยม ไม่ ฉลาด. จับตาดูการเนรเทศนี้ไว้"
 enclave.5075.c:0 "ยินดีต้อนรับการเนรเทศเป็นแขก"
 #Choosing to remove the shaman:
 enclave.5076.name:0 "นัก เทศน์ นัก บวช"
 enclave.5076.desc:0 "แม้เราจะพยายามอย่างดีที่สุด สมาชิกที่ถูกเนรเทศ[shroudwalker_enclave_country.GetName]ทํางานต่อ[Root.GetName]หลบหนีพวกเราต่อไป บางทีเนื่องจากความสามารถบางอย่างของไซโซนิค พวกมันสามารถคาดเดาการมาถึงของกองกําลังรักษาความปลอดภัยของเราได้อย่างต่อเนื่อง และอีกอย่าง คําเทศนาของผู้ลี้ภัยยังคงดึงดูดฝูงชน ชาวอาณานิคมหลายคนได้เริ่มละทิ้งงานของพวกเขา เพื่อสนับสนุนการแบ่งประเภทและการประกอบพิธีต่างๆ"
 enclave.5076.a:0 "การเนรเทศต้องหยุด"
 #Choosing to remove the shaman finale:
 enclave.5077.name:0 "ผู้ สละ ชีพ เพื่อ ความ เชื่อ"
 enclave.5077.desc:0 "กองกําลังรักษาความปลอดภัยใน[Root.GetName]ได้กําจัดหมอผีที่ทรยศสําเร็จ หนึ่งในผู้ติดตามอดีตผู้ลี้ภัย - ผู้เป็นอาณานิคมที่เริ่มไม่พอใจมากขึ้น ขณะที่ประชาชนทั่วไปดูเหมือนจะยอมรับความจริง ไม่กี่คนที่ดื้อด้านยังคงอุทิศให้กับคําสอนของหมอผี สําหรับตอนนี้ การปรากฏตัวของความมั่นคงที่เพิ่มขึ้นในอาณานิคม ดูเหมือนเหมาะสม เกรงว่าการบูชาพระมาร์ตีร์นี้ จะดําเนินต่อไป"
 enclave.5077.a:0 "ก็ช่างมันเถอะ"
 #Choosing to welcome the shaman:
 enclave.5080.name:0 "ดรีม วีเวอร์"
 enclave.5080.desc:0 "คําสอนของหมอผีที่ถูกเนรเทศ[Root.GetName]แพร่กระจายไปทั่วประชาชน หลัก คํา สอน นี้ เป็น หนึ่ง ใน การ ผูก พัน ส่วน ตัว กับ พวก ชรูด และ ผู้ ปฏิบัติ การ ของ ค ริ สต จักร นั้น อ้าง ว่า ได้ บรรลุ สภาพ แห่ง สติ รู้สึก ผิด ชอบ ที่ เปลี่ยน ไป. เราได้รับรายงานว่า เรารู้สึกสบายใจและสุขสบายมากขึ้น บาง คน ถึง กับ อ้าง ว่า บัด นี้ พวก เขา สามารถ ติด ต่อ สื่อ ความ กับ กัน ได้ โดย ทาง สภาพ ที่ เหมือน ฝัน ร่วม กัน. แต่น่าเสียดายที่ \"ผู้เชื่อที่แท้จริง\" เหล่านี้ ยังทิ้งงานของพวกเขาในจํานวนบันทึก อุปสงค์ได้ตี"
 enclave.5080.a:0 "พอได้แล้ว"
 enclave.5080.b:0 "ความสุขคือรางวัลของตัวเอง"
 #Choosing to welcome continuation:
 enclave.5081.name:0 "สัดส่วนทศนิยม"
 enclave.5081.desc:0 "ข่าวเริ่มต้นจากอาณานิคมของเราบน[Root.GetName]การ ประกาศ งาน ของ พวก เขา เสร็จ สิ้น ลง ดู เหมือน ว่า หมอผี ที่ ถูก เนรเทศ ออก จาก นิคม. รายงานกระจายตัวและไม่แน่นอน แต่ทุกคนเห็นตรงกันว่า หลังจากนําผู้ติดตามของพวกเขาในการนั่งสมาธิครั้งสุดท้าย สําหรับผู้ติดตาม นี่คือหลักฐาน ของหมอผีในชรูด"
 #Choosing to welcome finale:
 enclave.5082.name:0 "พิธี ศีล มหา สนิท"
 enclave.5082.desc:0 "การพัฒนาที่แปลกบน[Root.GetName]. หลังจากคําว่า 'ความอดอยาก' ของหมอผีที่ถูกเนรเทศ พวกอาณานิคมของเรา กําลังรายงานประสบการณ์ การ ทํา ตาม กิจ ปฏิบัติ ต่าง ๆ ที่ พวก ชา มาน ผูก มัด ไว้ บุคคล เหล่า นี้ จึง สามารถ เข้า สู่ รัฐ แห่ง การ สมาน ไมตรี แบบ ซิ นิก ได้. การระบายของความสุขและความอยู่ดีมีสุขนี้ ผลิตในหมู่ชาวอาณานิคมเป็นลึกซึ้ง"
 #Static modifiers
 rogue_shaman_00:0 "เชาแมน" #stability decrease; shroudwalker's enclave opinion gain
 rogue_shaman_01:0 "ผู้รับเชิญที่เคารพ" #stability increase; shroudwalker's enclave opinion drop
 rogue_shaman_02:0 "การ กดขี่ ทาง ศาสนา" #stability decrease
 rogue_shaman_03:0 "ความ สุข ระดับ ชาติ อัน น่า ขยะแขยง" #happiness increase; production decrease
 rogue_shaman_04:0 "พิธี ศีล มหา สนิท"

 #The Great Schism (Divination Event)
 enclave.5090.name:0 "การ เปลี่ยน แปลง ครั้ง ใหญ่"
 enclave.5090.desc:0 "เราได้รับการติดต่อจากเรือขนส่ง ที่บรรทุกอะลูไลต์จาก[shroudwalker_enclave_country.GetName]เรียกตัวเองว่า \"ผู้ปลดปล่อย\" พวกเขาขอลี้ภัยจากโลกหนึ่งของเรา\n\nนี่ แสดง ถึง ความ แตก แยก อย่าง ที่ ไม่ เคย มี มา ก่อน ภาย ใน พวก ช รู ด วอร์คเกอร์. ดู เหมือน ว่า พวก เอน คเลฟ ไม่ ได้ เป็น อัน หนึ่ง อัน เดียว กัน อย่าง ที่ เรา ถูก ชัก นํา ให้ เชื่อ."
 enclave.5090.a:0 "ที่นี่ยินดีต้อนรับ"
 enclave.5090.b:0 "ปฏิเสธการเข้ามา"
 enclave.5090.c:0 "ซีโนสไม่มีที่ภายในเขตแดนของเรา"
 #Reformers Welcomed Chain
 enclave.5095.name:0 "คํา พูด ของ ผู้ ติด สุรา"
 enclave.5095.desc:0 "\"สแรดสมีข่าวว่าอดีตศิษย์เก่าของเรา ได้ลี้ภัยมายังโลกหนึ่งของคุณ เรื่อง นี้ ไม่ เป็น ที่ พอ ใจ แก่ เรา มาก แต่ ก็ ให้ เป็น อย่าง นั้น เถิด. การ ปฏิเสธ การ กระทํา มัก จะ นํา ไป สู่ ผล อัน เลว ร้าย. รู้ไว้ด้วยว่า นักปฏิรูปเหล่านี้ ไม่มีอะไรมากไปกว่าพวกชาร์ลาแทน คนโง่ที่เชื่อว่าพวกเขาถือกุญแจ ที่จะไขความลับของชรูด คนนอกรีตที่ตกอยู่ในอันตราย และโดยแน่นอน บรรดาผู้ที่อยู่ในเรือที่ลุกโชติช่วง (ในวันกิยามะฮ.) ย่อมใคร่ครวญ"
 enclave.5100.name:0 "ประตู และ กุญแจ"
 enclave.5100.desc:0 "\"ผู้อุปถัมภ์ของเรา! ว่าท่านได้ปกป้องเรา เมื่อมีอีกหลายคนที่จะหันหลังให้ ชีวิตในโลกนี้และโลกนี้จะอํานวยความสุขแก่เจ้า พี่น้องเก่าของเรา[shroudwalker_enclave_country.GetName]ถูกประเพณีทําให้ตาบอด ชรูดไม่ได้ไร้ความสามารถ มันมีประตู และเราค้นพบกุญแจแล้ว\n\nเพื่อตอบแทนความเอื้ออาทรของคุณ เราจะแบ่งปันความลับเหล่านี้กับคุณ ทั้งหมดที่เราต้องการคือทรัพยากร ที่จะเริ่มก่อสร้าง\""
 enclave.5100.a:0 "เจ้าจะได้มัน"
 enclave.5100.b:0 "ราคามันสูงมาก"
 enclave.5105.name:0 "กุญแจคือแฟชั่น"
 enclave.5105.desc:1 "\"สั่นระริก! ด้วยความช่วยเหลือของคุณ เราได้สร้างกุญแจใหญ่เสร็จในที่สุด แม้ตอนนี้พี่น้องที่มีพรสวรรค์ที่สุดของเรา ได้มารวมตัวกันเพื่อเริ่มต้นการเปิด ด้วยความคิดของพวกเขาผูกติดกับคีย์ ความสามารถในการรับรู้ของพวกเขาได้รับการขยาย ผู้แสวงบุญที่กล้าหาญเหล่านี้ เข้าสู่รัฐที่มีความฝันร่วมกัน เมื่อ พวก เขา ตื่น ขึ้น ประตู สู่ เชรูด ก็ จะ เปิด.\n\nขอให้ผู้ที่อาศัยอยู่ในชูราดอวยพรให้ความพยายามของพวกเขา.\""
 enclave.5106.name:0 "โลกที่มีความกว้างพอดี"
 enclave.5106.desc:1 "ข่าวรบกวนจากอาณานิคมของเรา[Root.GetName]▪ แม้ ขาด ทรัพยากร แต่ นัก ปฏิรูป ที่ มี ใจ แรง กล้า บาง คน ก็ พยายาม ออก แบบ กุญแจ. โดย เพิ่ม ความ สามารถ ของ พวก เขา ใน การ ใช้ เครื่อง มือ ที่ เปลี่ยน แปลง ได้ พวก เขา จึง เข้า สู่ สภาพ เหมือน ฝัน ร่วม กัน. นี่ทําให้เกิดการละเมิด ในผ้าของเวลาอวกาศ เหนือเมืองใจกลางอาณานิคม ควันที่ก่อความวิตกกังวลออกมา อาจมาจากตัวชรูดเอง หลายคนเรียกปรากฏการณ์นี้ว่า \"สไตรค์สไตนด์\" และเราทราบมาว่าประสบการณ์นั้นห่างไกลจากความสุข คุณธรรมบน[Root.GetName]อยู่ต่ําตลอดเวลา"
 great_schism_03:0 "สเตนช์"
 enclave.5110.name:0 "ประตู เปิด"
 enclave.5110.desc:0 "ข่าวเหลือเชื่อจากอาณานิคมของเรา[Root.GetName]การตื่นจากภวังค์มาเป็นเดือน พวกนักปฏิรูปก็ประสบความสําเร็จในการเปิดประตูไปสู่ชรูด ความแตกแยกที่สดใสในห้วงอวกาศ ได้ปรากฏขึ้นเหนือใจกลางเมือง ตอนนี้บางสิ่งบางอย่างเช่นลมที่ดีจะออกชื่อเล่น:ด้วยแสงนม การ ฟื้นฟู แบบ ซิ นิก ที่ ได้ พัด ผ่าน อาณานิคม ได้ แทรกซึม เข้า ไป ใน หัวใจ และ จิตใจ ของ นัก ปฏิรูป และ ผู้ ตั้ง อาณานิคม ด้วย. หลายคนเชื่อว่านี่คือรุ่งอรุณ 'ยุคทอง' ใหม่บน[Root.GetName]."
 great_schism_01:0 "ยุค ทอง"
 enclave.5115.desc:0 "ข่าวจากอาณานิคมของเราบน[Root.GetName]การตื่นจากภวังค์มาเป็นเดือน พวกนักปฏิรูปก็ประสบความสําเร็จในการเปิดประตูไปสู่ชรูด รอยร้าวในอวกาศ ได้ปรากฏขึ้นเหนือใจกลางเมือง ตอนนี้บางสิ่งบางอย่างเช่นหมอกป่วยออกที่อ่อนนุ่มด้วยแสงที่เลวทราม ชาว ซิ ซิ โอ นิก มี อัส มา ซึ่ง แทรกซึม เข้า ไป ใน อาณานิคม นี้ ได้ ทํา ให้ หัวใจ และ จิตใจ ของ นัก ปฏิรูป และ ผู้ ตั้ง อาณานิคม ต่าง ก็ เปลี่ยน ไป ด้วย. หลายคนมองว่านี่เป็นจุดเริ่มต้นของยุคใหม่[Root.GetName]."
 great_schism_02:0 "ยุค แห่ง ความ มืด"
 #Reformers Denied
 enclave.5120.desc:0 "\"สั่นระริก\" ข่าวว่าท่านปฏิเสธ ที่หลบภัยในอดีตภายในเขตแดนของท่าน คุณฉลาด เหล่านี้'กําลังเสริม'ไม่มีอะไรมากไปกว่าชาเลนส์โง่ที่เชื่อว่าพวกเขาถือกุญแจที่จะปลดล็อคความลึกลับของชารูดใคร ก็ ตาม ที่ เลือก ที่ จะ ปก ป้อง ผู้ ออก หาก เช่น นั้น ย่อม ตก อยู่ ใน อันตราย. ให้พวกเขาเดินว่างไร้บ้านไร้ที่ได้ยิน, ถูกทอดทิ้งตลอดไปในโลกนี้และต่อไป.\""

 #Floating Parts - Divination Event
 enclave.5130.name:0 "การไล่ระดับสี"
 enclave.5130.desc:0 "เซ็นเซอร์ระยะไกลได้ตรวจพบ การปรากฏตัวอย่างฉับพลันของชิ้นที่ไม่ทราบชื่อของเศษกลวงใน[floating_shell_system.GetName]ระบบ ในขณะที่เอเลี่ยนกําลังออกแบบ องค์ประกอบที่หายากของวัตถุนี้ บ่งบอกถึงการใช้เทคโนโลยีชั้นสูงในการก่อสร้าง พื้น ผิว ด้าน ใน มี ท่า เรือ และ ส่วน ต่อ หลาย ร้อย แห่ง ซึ่ง ดู เหมือน ว่า ไม่ มี ส่วน.\n\nเช่นเดียวกับวัตถุที่ปรากฏใน[floating_shell_system.GetName]ระบบที่สุ่มเป็นถ้าภายในที่หายไป เพียงหายไป"

 FLOATING_PARTS_PROJECT_00:0 "เชลล์สําหรับเรียน"
 FLOATING_PARTS_PROJECT_00_DESC:0 "เปลือกของสิ่งที่ดูเหมือนว่า เรือเอเลี่ยนถูกพบลอยอยู่ใน[floating_shell_system.GetName]ระบบ มันไปอยู่ตรงนั้นได้ไง และยานที่เหลืออยู่ที่ไหน"

 enclave.5135.name:0 "กระท่อมที่ถูกละทิ้ง"
 enclave.5135.desc:0 "การ วิเคราะห์ เปลือก หอย มาก ขึ้น ซึ่ง พบ ใน[floating_shell_system.GetName]ระบบได้ยืนยันแล้วว่า มันเป็นตัวอย่างของการออกแบบยานต่างดาว ขณะ ที่ ไม่ มี พลัง แต่ ตัว เรือ เอง ก็ มี ลักษณะ พิเศษ หลาย อย่าง ซึ่ง น่า สังเกต มาก ที่ สุด คือ การ หุ้ม ด้วย เกราะ แบบ ที่ ก้าว หน้า.\n\nอย่าง ไร ก็ ตาม เรา ไม่ ได้ ใกล้ ชิด ยิ่ง ขึ้น กับ ความ เข้าใจ ที่ ว่า นาวา มา จาก ที่ ไหน, โดย วิธี ใด หรือ ทําไม มัน จึง ปรากฏ ใน อวกาศ ของ เรา, และ (ถ้า สิ่ง ใด) เกิด ขึ้น ภาย ใน ตัว มัน."

 enclave.5136.name:0 "การไล่ระดับสี"
 enclave.5136.desc:0 "เครื่องตรวจจับตรวจพบการปรากฏตัว ของชิ้นส่วนของเศษของมนุษย์ต่างดาวอื่นครั้งนี้ใน[floating_engine_system.GetName]ระบบ คล้ายกับการออกแบบยานต่างดาว ที่เพิ่งถูกค้นพบ การจัดเรียงและวัตถุที่บิดเบี้ยว ที่ตั้งอยู่ภายในเป็นเครื่องมือที่ไม่ซ้ํากัน ที่เราได้ตั้งชื่อว่า 'ตัวเร่งอนุภาค' อุปกรณ์ประหลาดนี้จะช่วยให้ยาน โต้ตอบกับพลังงานไซโอนิคของชรูด ขณะ ที่ ไม่ เข้า กัน กับ เทคโนโลยี ของ เรา การ ศึกษา ต่อ ไป อาจ ก่อ ผล ที่ น่า ทึ่ง."
 enclave.5156.a:0 "อีกชิ้นส่วนของปริศนา"

 enclave.5140.name:0 "แกนลอย"
 enclave.5140.desc:0 "ส่วนประกอบอื่น ๆ จากเรือต่างดาว ที่ได้รับการปรากฏอย่างสุ่มตลอดพื้นที่ของเรา ได้รับการตรวจพบใน[floating_core_system.GetName]ระบบ การควบแน่นของดาดฟ้าเรือ, ลูกเรือไม่มีกําแพง, และแกนคอมพิวเตอร์ขั้นสูงมีข้อสงสัยว่า นี้จะต้องประกอบด้วย เมื่อส่วนประกอบทั้งสามถูกนํามารวมกัน วิศวกรของเราน่าจะสามารถประกอบยานทั้งลําได้"
 enclave.5140.a:0 "ปริศนานี้สร้างรูปร่างขึ้นมา"

 FLOATING_PARTS_PROJECT_01:0 "การรวมวัตถุ"
 FLOATING_PARTS_PROJECT_01_DESC:0 "ชิ้นส่วนสุดท้ายของยานเอเลี่ยน ได้ปรากฏใน[floating_core_system.GetName]วิศวกรของเราต้องการเวลาในการประกอบเรือใหม่"

 enclave.5145.name:0 "ชื่อ=กระดาษพับเก็บ"
 enclave.5145.desc:0 "เราทําสําเร็จในการปรับปรุง เรือเอเลี่ยน ด้วยแกนคอมพิวเตอร์ออนไลน์ มันเป็นไปได้ที่จะดาวน์โหลด และแปลบันทึกของยาน ดูเหมือนเรือจะเป็นต้นแบบการทดลอง ถูกออกแบบมาให้เดินทางเร็วกว่าแสง โดยการใช้ชรูด แม้ว่าบันทึกลูกเรือรอบสุดท้ายและการโทรคมนาคมภายนอกยังคงอยู่ มีข้อสงสัยว่าบางสิ่งบางอย่างไปผิดปกติมากในการเดินทางครั้งแรกของเรือ เรือไม่ได้ถูกพัดออกจากกันมากเป็น ชิ้นส่วนองค์ประกอบที่พ่นออกมาอย่างสุ่ม ชะตากรรมของลูกเรือยังคงไม่ทราบ"
 enclave.5145.a:0 "เพิ่มเรือไปยังกองเรือของเรา"
 enclave.5145.b:0 "หั่นเป็นชิ้นๆ"

 ## Situation Events - Add Anomaly - Generic Text for introducing pre-existing content ##
 enclave.5150.name:0 "โรค กระดูก พรุน"
 enclave.5150.desc:0 "เครื่องตรวจจับตรวจพบ การปรากฏตัวของความผิดปกติ ที่ไม่ปรากฏมาก่อน จากแรงยึดเหนี่ยวอันน่าทึ่งในพลังงานไซโซนิค ที่จดทะเบียนก่อนเหตุการณ์นั้น มันเกือบจะแน่นอนแล้วว่า นี้อาจจะมีการเปลี่ยนแปลงตามที่ บอกไว้[shroudwalker_enclave_country.GetName]?"

 # Hero Redivivus - Divination Event

 enclave.5195.name:0 "เฮโร เรดิเวียส"
 enclave.5195.desc:0 "ข่าวที่เหลือเชื่อจาก[Root.GetName]เช้านี้ มีบุคคลประกาศ[hero_redivivus.GetHimselfHerself]เป็นฮีโร่ในตํานาน§Y[hero_redivivus.GetName]§!เข้าสู่จัตุรัสใหญ่ของเมืองหลวง พวก พยาน ฯ พรรณนา ฉาก เหตุ การณ์ ของ ความ เงียบ กริบ เนื่อง จาก ความ รู้สึก สงบ และ สบาย ใจ อย่าง ยิ่ง ทั่ว ฝูง ชน. ระหว่าง[hero_redivivus.GetName]เป็นที่รู้จักในประวัติศาสตร์ในฐานะนักพูดผู้ยิ่งใหญ่ และผู้นําผู้ไร้ความสามารถ บุคคลในคําถาม กล่าวถึงประสบการณ์ที่คาดว่าจะเกิดขึ้น พวกเขาอ้างว่าไม่ได้กลับมาเป็นผู้นํา แต่เพื่อลบความกลัวของความตาย"
 enclave.5195.a:0 "อาจจะเป็นเรื่องหลอกลวงก็ได้"
 REDIVIVUS_PROJECT:0 "เฮโร หรือ ฮูก?"
 REDIVIVUS_PROJECT_DESC:0 "คนที่อ้างว่าเป็นฮีโร่ในตํานาน ได้ปรากฏตัวขึ้นบนโลกของเรา คํา ยืน ยัน ของ พวก เขา ใน เรื่อง ป่า อาจ เป็น จริง ได้ ไหม?"

 enclave.5200.name:0 "เคลือบเงา"
 enclave.5200.desc:0 "การสืบสวนบุคคลอ้างว่า§Y[hero_redivivus.GetName]§!ได้ข้อสรุปแล้ว ตอนแรก นักวิจัยของเราก็สงสัยอย่างเข้าใจได้ แต่ไม่ใช่แค่เรื่องที่มี ความรู้อย่างน่าทึ่ง\n\nยิ่ง กว่า นั้น การ ศึกษา อย่าง ใกล้ ชิด ยิ่ง ขึ้น[hero_redivivus.GetName]รูปแบบการคลื่นสมอง เผยให้เห็น อนุภาคของไซโซนิค ดูเหมือนจะห่างไกลจากการถูก \"เปลี่ยนจากความตาย\"[hero_redivivus.GetName]ถูกส่งไปที่ดินแดนของชรูด[hero_redivivus.GetHisHerCap]ประสบการณ์ของ \"ภายหลังชีวิต\" เห็นได้ชัดเลยว่า เป็นประสบการณ์ที่น่าพอใจ และ[hero_redivivus.GetHisHer]บัด นี้ ได้ เข้า สู่ การ ดํารง อยู่ อย่าง เงียบ ๆ ณ ชาน เมือง ของ เมือง หลวง ประกาศ หลัก คํา สอน เรื่อง ความ ไร้ ความ กลัว และ สันติ สุข แก่ ใคร ก็ ตาม ที่ จะ ฟัง."
 enclave.5200.a:0 "โชคชะตาประหลาด"
 hero_redivivus:0 "วีรบุรุษที่พักผ่อน"

 #Shattered Frontier (Divination Event)

 enclave.5500.name:0 "การ เจริญ เติบโต ใน ออร์บิท"
 enclave.5500.desc:0 "ดาวเทียมจํานวนมากที่เราวางไว้ในวงโคจรของ[shattered_frontier_planet.GetName]ได้มีการปรับเปลี่ยนอย่างมีนัยสําคัญ ในวันที่ผ่านมา ตามบันทึกเซ็นเซอร์§Yแรง โน้ม ถ่วง ที่ มั่นคง และ อยู่ ใน ท้อง ถิ่น ดี§!สร้างขึ้นในวงโคจรเหนือดาวเคราะห์\n\nข้อมูล จาก ผิว นอก ยืน ยัน ว่า เหตุ การณ์ นั้น เกิด ขึ้น อย่าง กะทันหัน แม้ ว่า เรา ไม่ รู้ วิธี หรือ ทําไม ก็ ตาม. แรงโน้มถ่วงดูเหมือนจะไม่ก่อให้เกิด อันตรายใด ๆ ที่มีอยู่ภายในอาณานิคมของเราสําหรับตอนนี้ แต่ดาวเทียมมีการใช้จ่าย ปริมาณที่ไม่สามารถรองรับ"
 enclave.5500.a:0 "เริ่มการสืบสวน"
 SHATTERED_FRONTIER_ANOMALY:0 "รูรับแสงออร์บิทัล"
 SHATTERED_FRONTIER_ANOMALY_DESC:0 "แรงโน้มถ่วงที่แปลกดีก็ปรากฏเหนือ[shattered_frontier_planet.GetName]ขัดขวางวงโคจรดาวเทียมของเรา แต่ปรากฏการณ์นี้ตั้งอยู่ ใกล้กับอาณานิคมของเรา\n\nนอกจากนี้ ดาวเทียมหลายดวงที่เราวางไว้ข้างต้น[shattered_frontier_planet.GetName]เผชิญหน้าแต่เนิ่นๆ ถ้าเราไม่เข้าไปแทรกแซง ถ้ามันเกิดขึ้น มันจะขัดขวาง ความสามารถในการศึกษาแรงโน้มถ่วงใหม่"

 enclave.5501.name:0 "การยุบตัวของออร์บิทัล"
 enclave.5501.desc:0 "นักวิจัยเกี่ยวกับ[root.GetName]บอกเราว่าความ ผิดปกติของแรงโน้มถ่วง ได้ยุบตัวลง ก่อให้เกิดความล้มเหลวไฟฟ้า ในอุปกรณ์การวินิจฉัย และดาวเทียมที่อยู่ใกล้ ๆ เหตุ การณ์ นี้ ดู เหมือน ได้ เกิด ขึ้น ใน ขณะ ที่ เรา หยุด เฝ้า สังเกต; บาง สิ่ง ที่ หลาย คน ถือ ว่า เป็น เหตุ การณ์ ที่ ไม่ น่า ยินดี.\n\nพวกอาณานิคมบน[root.GetName]รายงาน ความ ล้ม เหลว ของ อุปกรณ์ ที่ แพร่ หลาย เช่น กัน แต่ มี เพียง บาง อย่าง ที่ เกี่ยว ข้อง กับ การ ระเบิด ของ ออร์บิทัล. แทน ที่ จะ เป็น เช่น นั้น อาณานิคม ของ เรา ส่วน ที่ เหลือ ต้อง รับมือ กับ ฝูง ชน ที่ ก่อ ความ วุ่นวาย อย่าง ผิด ปกติ ซึ่ง เอา ตัว เอง ไป ทําลาย อาคาร สําคัญ ๆ. เจ้า หน้าที่ ท้อง ถิ่น งุนงง กับ ธรรมชาติ ของ การ จลาจล เหล่า นี้."
 enclave.5501.gestalt.desc:0 "แรงโน้มถ่วงมีความผิดปกติมากกว่า[root.GetName]มี การ ยุบ ตัว อย่าง รุนแรง ทํา ให้ ระบบ ไฟฟ้า ล้ม เหลว บน พื้น ดิน และ ท่ามกลาง ดาว เทียม ที่ อยู่ ใกล้ ๆ. เหตุการณ์นี้ดูเหมือนจะเกิดขึ้น ช่วงเวลาที่เราหยุดการสังเกตของเรา\n\nในขณะที่การรบกวนของฮาร์ดแวร์ของเรา ได้พิสูจน์แล้วค่อนข้างควบคุมได้ การแผ่รังสีที่ผิดปกตินี้ ทําให้เกิดการรบกวนบางอย่าง เราไม่อาจ... สัมผัสได้ถึงพวกมันได้ มันเหมือนกับ[root.GetName]เคย ถูก จุ่ม ตัว ใน ไอ น้ํา หนา แน่น บาง รูป แบบ."
 shattered_frontier_looting:0 "หลังการปล่อยน้ํา"
 shattered_frontier_deviancy:0 "หลังภาวะขาดน้ํา"

 enclave.5502.name:0 "รอยแตกปรากฎ"
 enclave.5502.desc:0 "อาณานิคมของเราบน[root.GetName]ได้ลดลงต่อไปกลายเป็นการสลายตัว, กับการหายตัวไปอย่างกะทันหันของกว่าร้อยชาวอาณานิคม การ ปล้น สะดม และ การ จลาจล ยัง คง มี อยู่ ต่อ ไป แม้ ว่า จะ ไม่ มี การ แพร่ หลาย เช่น นั้น อีก ต่อ ไป. เราสงสัยว่าความกระตือรือรือล้นของพวกเขาถูกอารมณ์ โดยความกลัวของการหายตัวไปต่อไป ทุก ๆ คน ที่ อยู่ ใน บ้าน ของ ตน ได้ กลับ ไป ยัง บ้าน ของ ตน.\n\nพาราโนอา ทฤษฎีสมคบคิด และแม้กระทั่งรายงานเกี่ยวกับภาพหลอน กําลังเพิ่มขึ้น แต่ความเป็นจริงอาจจะไม่แน่นอน เดอะ[divination_situation.GetName]มันชัดเจนอยู่แล้ว แต่เราได้นํา[root.GetName]เรียกร้องความสนใจของบางคน§Hขอบเขตสี§!?"
 enclave.5502.gestalt.desc:0 "อาณานิคมของเราบน[root.GetName]ถูกโจมตี! เราไม่สามารถรับรู้ โดรนของพวกเราได้อีกแล้ว พวกเขาถูกพรากไปจากพวกเรา มันเกิดขึ้นเร็วมากแต่ก็เรียบร้อย ไม่มีความรุนแรง... เราถูกโจมตีเร็วมาก เรามองไม่เห็นด้วยซ้ํา\n\nงาน หลัก หลาย อย่าง ของ อาณานิคม ถูก ขัด จังหวะ. โดรนเพิ่มกําลังลดความเร็วลง แต่เราได้ลดความเร็วลง มันต้องใช้เวลาสักหน่อยในการทําให้สมดุลของเรากลับมา[root.GetName]\n\nเดอะ[divination_situation.GetName]เห็นได้ชัดเลยว่าได้ผล แต่ตอนนี้มันทําให้เราอยู่ภายใต้การตรวจสอบ§Hขอบเขตสี§!?"
 enclave.5502.a:0 "เราต้องฝ่าพายุนี่ออกไป"
 enclave.5502.a.tt:0 "§Y$shattered_frontier_looting$§!จะยังคงมีผลต่อ[root.GetName]."
 enclave.5502.gestalt.a:0 "เราควรจะรอและสังเกตการณ์"
 enclave.5502.gestalt.a.tt:0 "§Y$shattered_frontier_deviancy$§!จะยังคงมีผลต่อ[root.GetName]."
 enclave.5502.b:0 "เราต้องทํางานเพื่อบรรเทาความกลัวของพวกอาณานิคม"
 enclave.5502.c:0 "เพิ่มมาตรการปิดตายทันที"
 enclave.5502.gestalt.c:0 "อาณานิคมต้องถูกรวมเข้าด้วยกัน"
 enclave.5502.pop_removed:0 "§R100§! §H[root.owner.GetSpeciesName] £pop£ ประชากรหายไป§!จาก§Y[root.GetName]§!."
 shattered_frontier_benefits:0 "เงิน ทุน ลด ค่า ใช้ จ่าย"
 shattered_frontier_benefits_desc:0 "ผล ประโยชน์ ทาง สังคม ได้ รับ การ นํา มา ใช้ ใน โลก นี้ ด้วย ความ หวัง จะ ลด ความ ทุกข์ ทรมาน ทาง จิต ระหว่าง ช่วง เวลา ที่ ดู เหมือน ว่า ถูก ตรวจ สอบ จาก พวก ช รู ด."
 shattered_frontier_lockdown:0 "การ ลด งาน"
 shattered_frontier_lockdown_desc:0 "มีการปิดตายอย่างโหดร้ายกับโลกใบนี้ ด้วยความหวังที่จะจํากัดผลกระทบ ของการรบกวนทางจิต ในระหว่างการตรวจสอบที่เห็นได้ชัดจากชรูด"
 shattered_frontier_lockdown_hive:0 "$shattered_frontier_lockdown$"
 shattered_frontier_lockdown_hive_desc:0 "โดรนของโลกนี้ได้มีการหลายของการทํางานของพวกเขาอัตโนมัติได้ลดลง ในความหวังของการบรรเทาความไม่สงบเนื่องจาก"
 shattered_frontier_lockdown_machine:0 "$shattered_frontier_lockdown$"
 shattered_frontier_lockdown_machine_desc:0 "$shattered_frontier_lockdown_hive_desc$"

 enclave.5503.name:0 "ช่วงเวลา แห่ง ความ บริสุทธิ์"
 enclave.5503.looting.desc:0 "เจ้าหน้าที่ดูแลอาณานิคมของเรา[root.GetName]พวก เขา ประหลาด ใจ ที่ ได้ รายงาน ว่า แม้ ว่า เรา จะ ไม่ ได้ รับ การ ฟื้นฟู ความ เป็น ปกติ. พวกเขาอธิบายสถานการณ์ว่า[root.GetName]การลงโทษนั้นถูกประวิงเวลาไว้ก่อนแล้ว ความสงบได้สืบเชื้อสายมา แม้ว่าจะไม่มีใครรู้ว่าทําไม\n\n$enclave.5503.regular.end$"
 enclave.5503.regular.end:1 "ชาว อาณานิคม หลาย คน ได้ รวม ตัว กัน เป็น ชุมชน ใหม่ ที่ ใกล้ เข้า มา. ขณะ ที่ พวก เขา เริ่ม งาน รักษา กัน และ กัน พวก เขา เล่า เรื่อง นิมิต แปลก ประหลาด และ ฝัน ร้าย ที่ ยัง คง มี อยู่. นิทาน เหล่า นี้ ได้ ปลูก ฝัง ความ สํานึก เกี่ยว กับ จุด มุ่ง หมาย ใหม่ ใน หมู่ ผู้ ตั้ง ถิ่น ฐาน ซึ่ง บัด นี้ มอง ที่ บ้าน ของ ตน ด้วย ความ เคารพ อย่าง น่า กลัว."
 enclave.5503.benefits.desc:0 "เจ้าหน้าที่ดูแลอาณานิคมของเรา[root.GetName]ยินดีที่จะรายงานว่าความปกติได้รับการฟื้นฟู พวกเขาอธิบายสถานการณ์ว่า[root.GetName]การลงโทษนั้นถูกประวิงเวลาไว้ก่อนแล้ว ความ สงบ ได้ สืบ ทอด มา ถึง แม้ น้อย คน จะ เชื่อ ว่า การ กระทํา ของ เรา มี ส่วน เกี่ยว ข้อง อย่าง มาก กับ เรื่อง นี้.\n\n$enclave.5503.regular.end$"
 enclave.5503.lockdown.desc:1 "เจ้าหน้าที่จัดการล็อคดาวน์[root.GetName]รู้สึก โล่ง ใจ ที่ ได้ รายงาน ว่า ความ ปกติ ได้ รับ การ ฟื้นฟู. พวกเขาอธิบายสถานการณ์ว่า[root.GetName]ได้มีการผ่อนปรนจากการล้อมที่ยืดยาว ซึ่งชาวอาณานิคมรู้สึกจากภายในและภายนอก ไม่ ว่า ผู้ รุกราน ที่ อยู่ นอก บ้าน จะ หมด ความ สนใจ หรือ ไม่ ก็ ตาม มี น้อย คน ที่ เชื่อ ว่า การ กระทํา ของ เรา เกี่ยว ข้อง กับ เรื่อง นี้.\n\nชาว อาณานิคม หลาย คน ได้ ชุมนุม กัน ใน ชุมชน ที่ ห่าง ไกล กว่า. ขณะ ที่ พวก เขา เริ่ม งาน รักษา โรค พวก เขา เล่า เรื่อง ราว เกี่ยว กับ นิมิต แปลก ประหลาด และ ฝัน ร้าย ที่ ยัง คง มี อยู่. หลาย คน ไม่ พอ ใจ กับ การ จัด การ ของ เรา ใน เรื่อง นี้ แต่ นิทาน ที่ ผู้ ตั้ง ถิ่น ฐาน เหล่า นี้ เล่า ได้ สร้าง ความ รู้สึก ใหม่ เกี่ยว กับ จุด มุ่ง หมาย ใน ตัว พวก เขา. ตอน นี้ พวก เขา มอง บ้าน ด้วย ความ หวาด กลัว."
 enclave.5503.d:0 "โล่งใจในที่สุด"
 enclave.5503.gestalt.desc:0 "ความปกติได้รับการฟื้นฟูสู่อาณานิคมของเรา[root.GetName]สถานการณ์ งุนงง: ใน ที่ สุด เรา ก็ มี ภูมิ คุ้ม กัน ต่อ ผล กระทบ ของ มัน. การ กระทํา ของ เรา ไม่ ประสาน กับ ผล ที่ จะ ตาม มา อย่าง เต็ม ที่.\n\nโดรนของเราได้กลับมาทํางานปกติ และทํากิจกรรมตามปกติอีกครั้ง โดยไม่ได้เครียดกับ การรบกวนของไซโซนิค วัตถุ ประสงค์ ของ สิ่ง เหล่า นี้ คือ อะไร? ความ ผิด ปกติ — ความ พยายาม ที่ จะ ชี้ นํา เรา ผ่าน บท เรียน ที่ แปลก ประหลาด ไหม?"
 shattered_frontier_pop_community:0 "ผู้ รอด ชีวิต จาก สนาม รบ"

 enclave.5504.name:0 "ซิ ลลู เอต"
 enclave.5504.desc:0 "หลังจากสัปดาห์ของการตรวจสอบที่ ไร้ประโยชน์ลงในแรงโน้มถ่วงที่โคจรได้ดี[root.GetName]คลื่นที่หนาแน่นผิดปกติ ของลมดาวฤกษ์ ได้ทําให้นักวิทยาศาสตร์ของเรา มีการค้นพบที่รบกวน\n\nเป็นลมที่ระเหยจาก[root.GetStarName]เมื่อ ถูก ล้าง เหนือ สิ่ง ผิด ปกติ พวก เขา ก็ โยน เส้น ทาง ที่ มืดมน แต่ ชัดเจน ของ เรือ ที่ ตั้ง อาณานิคม ซึ่ง เป็น เรือ ร่อน ลง ใน สภาพ ที่ มืดมน อย่าง ยิ่ง. นอก จาก นั้น ข่าว ลือ ที่ ไม่ มี ใคร โต้ แย้ง บ่ง ชี้ ว่า อาจ พบ ศพ อยู่ ใน เศษ ซาก ปรัก หัก พัง ที่ เป็น เงา.\n\nอารมณ์ในท่ามกลางชาวอาณานิคมจํานวนมาก - และบางส่วนของทีมวิจัย - ได้เปลี่ยนไปอย่างมืดมน"
 enclave.5504.gestalt.desc:0 "หลังจากสัปดาห์ของการตรวจสอบที่ ไร้ประโยชน์ลงในแรงโน้มถ่วงที่โคจรได้ดี[root.GetName]คลื่นที่หนาแน่นของลมดวงดาว ได้ทําให้เรามีการค้นพบที่ผิดปกติ\n\nเป็นลมที่ระเหยจาก[root.GetStarName]พวก เขา ล้าง เหนือ สิ่ง ผิด ปกติ นั้น โดย ใช้ เส้น ทาง ที่ ค่อย ๆ เลือน หาย ไป ของ เรือ ที่ อยู่ ใน อาณานิคม ซึ่ง เป็น เรือ ที่ ลง จอด ใน สภาพ ที่ ปลอด ภัย ของ การ ยุบ ตัว. ซาก ของ สิ่ง มี ชีวิต ที่ ซับ ซ้อน บาง ชนิด ปรากฏ ว่า เกลื่อน กลาด อยู่ ใน ซาก ปรัก หัก พัง ของ เงา. รูป ร่าง ของ พวก เขา ดู คล้าย กับ ของ เรา อย่าง น่า ทึ่ง."
 enclave.5504.c:0 "เราควรเตรียมพร้อม"
 shattered_frontier_ship:0 "เรือ คอ ชี นีล"
 shattered_frontier_ship_desc:0 "การ ระเบิด อย่าง หนา แน่น ของ ลม ดวง ดาว ได้ เผย ให้ เห็น โครง สร้าง ของ เรือ อาณานิคม ที่ พัง ทลาย ซึ่ง ปัจจุบัน ติด อยู่ ตรง กลาง ของ กระเป๋า แรงโน้มถ่วง ใน ท้อง ถิ่น."

 enclave.5505.name:0 "พายุ ใน ออร์บิท"
 enclave.5505.desc:0 "พายุรุนแรงได้ปะทุรอบ[root.GetName]กระเป๋าแรงโน้มถ่วง กระแทก[root.solar_system.GetName]ระบบเข้าสู่ความตื่นตระหนกเต็มรูปแบบ การจราจรที่ไม่ได้รับอนุญาต และอาณานิคมได้ประกาศภาวะฉุกเฉิน อย่างไรก็ตาม ไม่มีผู้บาดเจ็บบาดเจ็บได้รับรายงานมา\n\nการสแกนแรกของเราทําให้ข้อมูลการขัดแย้งยุ่งเหยิง อย่างไรก็ตามเจ้าหน้าที่ท้องถิ่นได้สังเกตเห็น การเพิ่มขึ้นของรายงานเกี่ยวกับภาวะซึมเศร้าและกิจกรรม 'ปกติ' จึงเป็นไปได้สูง พายุนี้§Hไซโรนิค§!ในธรรมชาติ\n\nนัก วิจัย สังเกต ว่า เรือ ของ อาณานิคม ที่ มี ประกาย แวว วาว ซึ่ง ตั้ง อยู่ ตรง ใจ กลาง ของ สิ่ง ที่ บัด นี้ เป็น มาเล ส ตรอม ที่ กําลัง เคลื่อน ไหว ได้ เริ่ม แสดง มวล ทาง กายภาพ. พวกเขาร้องขอเวลา เพื่อสืบสวนเพิ่มเติม"
 enclave.5505.gestalt.desc:0 "พายุรุนแรงได้ปะทุรอบ[root.GetName]กระเป๋าแรงโน้มถ่วง, การหล่อนิคมเป็นพาเรย์อ่อน เรายังไม่ได้รับอันตราย อย่างไรก็ตาม มันพิสูจน์ยาก ที่จะรักษาการติดต่อกับโดรนของเราได้\n\nการสแกนแรกของเราทําให้การ ยุ่งเหยิงของข้อมูลความขัดแย้ง แต่มีความเป็นไปได้สูง พายุนี้คือ§Hไซโรนิค§!ในธรรมชาติ ตัว อย่าง เช่น เรา สังเกต ว่า เรือ แห่ง อาณานิคม ที่ มี ประกาย ระยิบ ระยับ ซึ่ง ตั้ง อยู่ ตรง ใจ กลาง ของ สิ่ง ที่ บัด นี้ เป็น มาเล ส ตรอม ที่ กําลัง วิ่ง อยู่ ได้ เริ่ม มี การ แสดง มวล ทาง กายภาพ. ดูเหมือนว่ายังมีอีกหลายเรื่องที่ยังต้องสืบสวนที่นี่"
 enclave.5505.a:0 "รับคําตอบของคุณ และรวดเร็วเกี่ยวกับมัน!"
 enclave.5505.gestalt.a:0 "เราต้องสังเกตต่อไป"
 enclave.5505.b:0 "มันเป็นกับดัก หยุดสแกนได้แล้ว"
 enclave.5505.gestalt.b:0 "การทําลายนี้ เป็นภัยคุกคามต่อเรา หยุดสแกนได้แล้ว"
 shattered_frontier_storm_mod:0 "พายุ ใน ออร์บิท"
 shattered_frontier_storm_mod_desc:0 "อาณานิคมนี้กําลังแบกพายุลูกใหญ่ ที่ดูเหมือนเป็นไซโอนิคตามธรรมชาติ มีคําสั่งให้รักษาระยะห่าง"
 shattered_frontier_storm_gestalt_mod:0 "$shattered_frontier_storm_mod$"
 shattered_frontier_storm_gestalt_mod_desc:0 "อาณานิคมของเราอยู่ภายใต้พายุที่กว้างใหญ่ ซึ่งดูเหมือนว่าเป็นไซโอนิคในธรรมชาติ สภาวะของเครื่องบินรบ ส่งผลให้เกิดอันตราย"

 enclave.5506.name:0 "ในยามพายุ"
 enclave.5506.desc:0 "ก่อนหน้านี้[root.GetName]ถูกเขย่าด้วยรอยแตกรุนแรง ของคลื่นแม่เหล็กไฟฟ้า พายุ ไซ โอ นิก ซึ่ง เกิด ขึ้น ใน วง โคจร ของ มัน ได้ ล่า ถอย ไป แล้ว. โครงสร้างพื้นฐานของอาณานิคม เสียหายมากจากชีพจรนี้ แต่นักซ่อมแซมยืนยันว่า\n\nเดอะ[root.GetName]พวก ที่ ตั้ง อาณานิคม ดู เหมือน หวั่น ไหว มาก เนื่อง จาก ความ ทุกข์ ลําบาก ไม่ ใช่ เพราะ มี คํา ถาม มาก มาย ที่ ยัง ไม่ ได้ รับ คํา ตอบ. สแกนเนอร์ของเราไม่ตรวจจับ ความผิดปกติของแรงโน้มถ่วงหรือ 'เรือผี' ใน[root.solar_system.GetName]ระบบ... ถึง อย่าง ไร ก็ ตาม ตอน นี้ ดาว เคราะห์ ดวง นี้ เอง ก็ รู้สึก ไม่ มั่นคง."
 enclave.5506.gestalt.desc:0 "[root.GetName]มี การ สั่น สะเทือน เนื่อง จาก คลื่น ไฟฟ้า กระแทก อย่าง รุนแรง ขณะ ที่ พายุ ไซ โอ นิก ที่ แรง โหม กระหน่ํา ได้ ล่า ถอย ไป. โครงสร้างพื้นฐานส่วนใหญ่ของอาณานิคม เสียหายจากพายุนี้ แต่การซ่อมแซมได้พิสูจน์แล้วว่า ไม่ซับซ้อน\n\nโดรนของเรายังคงเฉื่อย แต่เป็นอย่างอื่นที่ไม่เป็นอันตราย และสแกนไม่ตรวจจับ แรงโน้มถ่วงผิดปกติหรือเรือ'ผี'ใน[root.solar_system.GetName]ระบบ... อย่างไรก็ตาม เหมือนมีหมอกอยู่เหนือโดรน[root.GetName]ดังนั้นตอนนี้เราก็เป็นภาระ จากน้ําหนักของคําถามที่ไม่มีคําตอบ"
 enclave.5506.a:0 "นี่ ไม่ ใช่ เรื่อง แปลก."
 shattered_frontier_uncertain_future:0 "โปรแกรมฟร้อนเซอร์"
 shattered_frontier_uncertain_future_desc:0 "เมื่อ เร็ว ๆ นี้ การ จู่ โจม แบบ ซิ นิก ได้ ทํา ให้ ผู้ ตั้ง อาณานิคม ของ โลก รู้สึก ไม่ แน่ ใจ ว่า ตน อยู่ ที่ นั่น."
 shattered_frontier_uncertain_future_gestalt:0 "หัวเรื่องภาพนิ่งที่ยังไม่ได้ตั้งค่า"
 shattered_frontier_uncertain_future_gestalt_desc:0 "เมื่อ เร็ว ๆ นี้ การ จู่ โจม ของ ไซ โอ นิก กําลัง ทํา ให้ โดรน ไม่ สามารถ ควบคุม โลก นี้ ได้ โดย ทํา ให้ เกิด การ ขัด ขวาง ความ ตั้งใจ ของ สติ รู้สึก ผิด ชอบ ของ ตน."

 enclave.5510.name:0 "พายุ"
 enclave.5510.intro:0 "ระดับและความกว้างของรายงานความเสียหายจาก[root.GetName]การ จัด การ ได้ ยาก ขึ้น เรื่อย ๆ จน กระทั่ง บัด นี้ ดู เหมือน ว่า พายุ ไซ โอ นิก กําลัง โหม กระหน่ํา ใน ที่ สุด. ดู เหมือน ว่า การ เฝ้า ระวัง ของ เรา ใน การ สังเกต เหตุ การณ์ เหล่า นี้ ได้ รับ บําเหน็จ."
 enclave.5510.mid.regular:0 "อารมณ์ของคนอาณานิคมก็รุนแรงเหมือนกัน ขณะ ที่ ความ แปรปรวน ลด ลง และ แรง โน้ม ถ่วง เริ่ม กลับ สู่ สภาพ ปกติ นัก วิทยาศาสตร์ ของ เรา สามารถ รวบ รวม ข้อมูล ใหม่ ๆ ที่ น่า ตื่น เต้น ได้. แม้ ว่า อาจ เป็น ได้ ว่า เป็น ไป ได้ ที่ การ โจมตี ที่ ดู เหมือน ว่า โดย พวก ช รูด ได้ จุด ประกาย จินตนาการ ของ นัก ฟิสิกส์ และ นัก ปรัชญา ด้วย เช่น กัน."
 enclave.5510.mid.gestalt:0 "ตอนนี้ความสงบได้ลงมา - ไม่เพียง แต่การฟื้นฟูหุ่นยนต์ของเรา สู่สถานะของลําดับที่เหมาะสม แต่ยังนําเราปริมาณมาก ของข้อมูลใหม่ที่จะศึกษา ขณะ ที่ ความ แปรปรวน ลด ลง และ แรง โน้ม ถ่วง เริ่ม กลับ สู่ สภาพ ปกติ เรา ก็ พร้อม ที่ จะ สังเกต การ เดิน ทาง ของ การ โจมตี ที่ ก่อ ความ เสีย หาย และ แปลก ประหลาด นี้ จาก ช รู ด."
 enclave.5510.end:0 "ปัจจัย หนึ่ง ที่ ขาด หาย ไป คือ เรือ อาณานิคม. มันได้เข้าไปในมิติของเรา ในความพอดีและเริ่มต้น แต่ตอนนี้มันดูเหมือนจะ ใกล้เคียงกับการตระหนักอย่างเต็มที่ มันยังคงลูกเห็บเรา"
 enclave.5510.desc:0 "$enclave.5510.intro$\n\n$enclave.5510.mid.regular$\n\n$enclave.5510.end$"
 enclave.5510.gestalt.desc:0 "$enclave.5510.intro$\n\n$enclave.5510.mid.gestalt$\n\n$enclave.5510.end$"

 enclave.5515.name:0 "เรือ คอ ชี นีล"
 enclave.5515.desc:0 "เราได้รับการทักทายจากสิ่งที่เสียงเช่นคงที่ - แต่อินทรีย์มากขึ้น? ไม่ ไม่ได้คงที่แน่นอน เสียงมันเหมือนลมมากกว่า หายใจนาน?\n\n\"HHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHH H H H H H H\""
 enclave.5515.a:0 "คุณต้องการความช่วยเหลือไหม"
 enclave.5515.b:0 "อธิบายการปรากฏตัวของคุณที่นี่ทันที!"
 enclave.5516.desc:0 "เครื่องรับของเราตัดออกไปสักครู่ เราต้องกรองเสียงออกมาเสียงดังมาก การส่งสัญญาณของมันเกือบทําให้เกิดความเสียหายทางร่างกาย กําลังคํานวณ...\n\nลูกเรือของ... เรือของเรา... ทําไมฉันถึงจําชื่อยานลํานี้ไม่ได้\n\nฮัลโหล? ผมกําลังพูดกับใครอยู่? ทํา... คุณรู้ไหมว่าเราเป็นใคร? เราอยู่ที่ไหน? เรากําลังตกอยู่ในอันตราย?!\""
 enclave.5516.a:0 "บางที คนแปลกหน้า คุณอยู่ใน[root.GetAdj]พื้นที่"
 enclave.5516.b:0 "ไม่เป็นไร! คุณอยู่ในวงโคจรของ[shattered_frontier_planet.GetName]."
 enclave.5516.c:0 "อันตราย จริง ๆ ถ้า คุณ ไม่ หยุด สิ่ง ที่ ทํา ให้ เขว เหล่า นี้!"
 enclave.5520.friendly.desc:0 "\"[shattered_frontier_planet.GetName]... ผมขอโทษ มันเป็นไปไม่ได้ ภูมิศาสตร์ของดวงดาวนั้นเกือบผิดหมด แต่สําเนียงนั่น! ฉันรู้ว่าการเปลี่ยนเว้าเหล่านั้น คุณกําลังใช้ ฉันรู้สึกว่าตอนนี้ฉันกลับมาแล้ว\n\nฉันกําลังพูดกับเพื่อน[root.GetSpeciesName]?\""
 enclave.5520.wary.desc:0 "\"เป็นไปไม่ได้! แต่สําเนียง... เรามาจาก[root.GetName]ผม รู้สึก เหมือน ว่า กําลัง จะ กลับ มา หา ผม ใน ตอน นี้ ซึ่ง ทํา ให้ เจ็บ ปวด แต่ ก็ แน่นอน.\n\nคุณเป็นเพื่อน[root.GetSpeciesName]เรา..."
 enclave.5520.a:0 "ใช่! ยินดีต้อนรับกลับมานะ"
 enclave.5520.b:0 "พูดยากนะ คุณมาถึงภายในของมรกต"
 enclave.5521.desc:0 "\"พิเศษ! ในที่สุดเราก็ถึงบ้าน? มีความทรงจํามากมายกําลังกลับมาหาฉัน ฉัน... ตอนนี้การมาถึงของเราค่อนข้างแปลก ฉันจะพยายามอธิบาย\n\nชื่อของฉันคือ§Y[shattered_frontier_governor.GetName]§!ผู้ ว่า ราชการ ซึ่ง ได้ รับ แต่ง ตั้ง ให้ อยู่ ใน นิคม ใหม่[shattered_frontier_planet.solar_system.GetName]ระบบ แค่... ไม่ใช่นี่[shattered_frontier_planet.solar_system.GetName]ระบบ?\n\nที่ที่เราจากมา ที่เราได้รับตั้งแต่ ... เราไม่มีคําตอบ และมีเวลามากมายที่จะคาดเดา เราถูกพรากไปที่ไหนสักแห่ง ใช่ไหม?\""
 enclave.5521.a:0 "มันเป็นแบบนั้น ใช่"
 enclave.5522.desc.intro:1 "เราถูกเยี่ยมหลังจาก... นั่นคือทฤษฎีของเรา ผู้บุกเบิกอาณานิคมและผมถูกถอดออกจากความทรงจําของเรา สําหรับสิ่งที่รู้สึกเหมือนทั้งชีวิต\n\nเราใช้ชีวิตหลายรูปแบบ[shattered_frontier_planet.GetName]ที่มีอยู่เพียงในจินตนาการของเรา อาณานิคมที่ถูกละทิ้งและทําขึ้นใหม่ สําหรับสิ่งที่เราคิดว่าจะเป็นนิรันดร์ นี่คือโลกแรกที่เราได้เห็น ซึ่งรู้สึกว่าจริง"
 enclave.5522.desc:0 "\"$enclave.5522.desc.intro$\n\nคุณคงไม่เข้าใจ ฉันขอโทษ แต่ตอนนี้ เราโล่งใจที่ได้กลับมา[root.GetName]ขอเราวางรากที่สุดท้าย - ที่ไหนสักแห่งใหม่? โปรดพิจารณาเราที่กําจัดของคุณ.\""
 enclave.5522.a:0 "ดีมาก ท่านผู้ว่า"
 enclave.5525.a:0 "$enclave.5521.a$"
 enclave.5526.desc:0 "\"$enclave.5522.desc.intro$\n\nผมขอขอบคุณคุณ ที่ไม่ได้ยิงเราออกจากวงโคจร ฉันยังรู้อีกว่าผู้ต้องสงสัย ต้องฟังดูเป็นยังไง ถ้าผมขอแสดงมารยาทอีกข้อ คุณจะยอมให้เราลางานได้ไหม เราต้องพยายามสร้างชีวิตให้กลับคืนมา"
 enclave.5526.a:0 "ถ้านั้นเป็นคําขอของท่าน ท่านผู้ว่า"
 enclave.5526.b:0 "แน่นอน ได้โปรด ปล่อยพวกเราไว้อย่างสงบ"
 enclave.5530.desc:0 "\"อะไรนะ\" ทําไม... รอสักครู่ครับ สําเนียงนั่น! ฉันรู้ว่าการเปลี่ยนเว้าเหล่านั้น คุณกําลังใช้ ฉันรู้สึกว่าตอนนี้ฉันกลับมาแล้ว คุณต้องเชื่อผมนะ เราไม่ทําร้ายคุณ คุณคือ[root.GetSpeciesName]เกินไป?\""
 enclave.5530.a:0 "เราเบื่อกลนี้ ออกไปเดี๋ยวนี้!"
 enclave.5530.a.spirit:0 "ตอนนี้คุณได้อยู่ในรูปของเรา? ไปให้พ้น ปีศาจ!"
 enclave.5530.b:0 "อิมเมอร์! ไปที่สนามรบ!"
 enclave.5531.desc:1 "\"ช่างมันเถอะ ผม กับ เพื่อน ชาว อาณานิคม ได้ ใช้ เวลา ชั่ว กัลปาวสาน รู้ แต่ เพียง การ ทรมาน ของ นิมิต ที่ ไม่ รู้ สิ้น สุด ของ เรา เอง[shattered_frontier_planet.GetName]ซึ่งเห็นได้ชัดว่าไม่มีทางอยู่ที่นี่\n\nเรา สับสน, สับสน, และ เห็น ได้ ชัด ว่า ที่ นี่ ไม่ ต้อนรับ เรา. ถ้านี่เป็นความจริง[root.GetName]ครั้งหนึ่งเราทิ้งเอาไว้ ผมยินดีที่จะเห็นด้านหลัง ลาก่อน\""

 enclave.5535.name:0 "$enclave.5515.name$"
 enclave.5535.desc:0 "เส้น ทาง การ สื่อ ความ เต็ม ไป ด้วย เส้น คงที่ แม้ ว่า รูป แบบ จะ ไม่ ซ้ํา. แหล่งที่มาของมันเป็นอนาล็อก ... การแทรกแซงของชั้นบรรยากาศ? เสียง ของ มัน คล้าย กับ ลม ที่ ไม่ น่า ยินดี อย่าง ยิ่ง และ มี ลม พัด.\n\n\"HHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHHH H H H H H H\""
 enclave.5535.a:0 "$enclave.5515.b$"
 enclave.5535.b:0 "$enclave.5515.a$"
 enclave.5536.desc:0 "ผู้ รับ สัญญาณ ของ เรา ตัด เสียง ออก สัก ครู่ หนึ่ง ขณะ ที่ มัน กรอง เสียง ดัง จน แทบ จะ ทํา ให้ ร่าง กาย เสีย หาย. กําลังคํานวณ...\n\n\"ผู้ บัญชา การ มรณะ ใน แอ ค เตอร์ B-456: เสร็จสมบูรณ์ โดรนความสว่างในดวงดาวได้ตกแต่ง[root.species.GetHandNamePlural]อีกครั้ง เสียง อะ โน ลัส ใน การ อาศัย อยู่ 14/522 ได้ เปลี่ยน ไป โดย 0.4 เดซิ เบล. แผนผังภายในของมัน... น่าพึงพอใจ เรา... ฉันต้องการเหรอ? อยากอยู่ที่นั่นไหม\n\nที่นี่ที่ไหน? ที่ไหนที่เรียกว่า \"ฉัน\"?"
 enclave.5536.a:0 "หยุดพล่ามได้แล้ว อธิบายตัวเองสิ"
 enclave.5536.b:0 "คุณอยู่ใน[root.GetAdj]พื้นที่"
 enclave.5540.desc:0 "ข้อเสนอ... คิด... ความรู้สึก\n\nคุณ,[root.GetName]เป็นฉัน ข้าคือเจ้า แต่เราไม่ใช่ เราแยกกันอยู่ เราดิ้นรนอธิบาย ความพยายามของไอออไนเซชันถูกหยุดทันทีในบริเวณใกล้เคียงของ[shattered_frontier_planet.GetName]แต่ไม่ใช่แบบนี้[shattered_frontier_planet.GetName]ความแตกต่างนี้ทําให้เราสับสน เราสับสนหลายอย่าง\n\nบางสิ่งที่เหนือกว่าเรา ได้ทําให้เราโดดเดี่ยว"
 enclave.5540.b:0 "คุณเข้าใจผิดแล้ว พวกอาณานิคม"
 enclave.5541.desc:0 "\"ได้โปรด เราขอเวลา เราต้องถามคําถาม และหาคําตอบ 'ฉัน'ซึ่งเป็นคุณอยู่ที่อื่นมานาน - นานพอที่จะตระหนักได้ว่าการดํารงอยู่ของเราเป็นไปไม่ได้ ผม ที่จะขยายความประสงค์ของคุณ ผ่านโลกใหม่ ได้พ้นจากหน้าที่นั้น พวก เรา บาง คน ไม่ ได้ ทํา อย่าง นั้น.\n\nมีเสียงใหม่เรียกเรา และเรา - ตัวฉันและอื่น ๆ ที่นี่ - ต้องการที่จะได้ยินมัน.\""
 enclave.5541.a:0 "ดีมาก กําลังไป"
 enclave.5541.b:0 "เราสงสารเจ้า คนทําผิด ไป"
 enclave.5541.c:0 "นี้ไม่สามารถยืน คุณต้องถูกกําจัด"
 enclave.5550.desc:0 "\"อธิบายฉันไม่สามารถ มี ความ รู้สึก, ความ สงสัย, ความ โกรธ และ เป้า หมาย ที่ ไม่ อาจ บรรลุ ได้. จุด มุ่ง หมาย ของ เรา ที่ จะ ตั้ง อาณานิคม[shattered_frontier_planet.GetName]- ไม่สมบูรณ์ ท่าน ผู้ เป็น เรา เรา เรา ผู้ ซึ่ง ไม่ ใช่ ท่าน ที่ศูนย์คือ[shattered_frontier_planet.GetName]ถึงแม้ว่าจะไม่ใช่ของเธอ[shattered_frontier_planet.GetName]แต่ภารกิจของเรายังคงอยู่ การแพร่กระจายความ ปรารถนาและความปรารถนา ข้ามกาแล็กซี่ ตอนนี้เท่านั้นที่เรามีพินัยกรรมและความปรารถนาของเราเอง : ความทะเยอทะยานและวัตถุประสงค์, พรสวรรค์โดยผู้ที่อยู่ภายนอกกับเรา ..."
 enclave.5550.a:0 "ออกจากที่นี่ทันที!"
 enclave.5550.b:0 "แรงจูงใจ เราต้องทําลายเจ้า"
 enclave.5551.desc:1 "\"... แตกต่าง\" แต่ก็ยังมีโอกาส เราจําสิ่งนี้ได้ ตอนนี้ เราพ้นจากการมองเห็นแล้ว เรา-ใคร-ใคร-ไม่-คุณ, อาณานิคม, ไม่ผูกพันกับวิสัยทัศน์ของ[shattered_frontier_planet.GetName]...\n\nเราสับสน และได้รับภาระจากคําถามมากมาย แต่เรารู้วิธีหาคําตอบ อําลา, แพร่กระจายของ-จะ.\""

 enclave.5557.name:0 "โอพาเก ไวล์"
 enclave.5557.desc:0 "กระแสน้ําของเวลาเป็นโคลน, ไม่สามารถป้องกัน แต่น่าเสียดายที่พิธีกรรมของการอนุมาน ได้ล้มเหลวในการเจาะม่านของชรูด ดัง นั้น เรา จะ นํา ส่วน หนึ่ง ของ ค่า ใช้ จ่าย กลับ มา ลบ ส่วน สิบ ชัก หนึ่ง เล็ก ๆ สําหรับ ความ พยายาม ของ เรา."
 enclave.5557.a:0 "ดีมาก"

 enclave.5566.name:0 "พิล กริม เดิน ทาง"
 enclave.5566.desc:0 "เครื่อง ตรวจ จับ การ เคลื่อน ที่ ของ เรือ ขน ส่ง หลาย ลํา. เรือถูกรื้อถอนและพังยับเยิน ดูเหมือนถูกพับเข้าด้วยกันจากอะไหล่ ผู้บังคับการเรือธงของกองคาราวานกําลังโจมตีเรา แต่ด้วยสถานะเทคโนโลยีของพวกเขา การสื่อสารใด ๆ มีแนวโน้มจะเป็นเสียงเท่านั้น"
 enclave.5565.desc:0 "พระเจ้าอวยพรคุณ ข้าเป็นผู้นําของกองคาราวานนี้ เราขอให้เดินทางโดยปลอดภัยผ่านพื้นที่ของคุณ และการบริจาคชนิดของอาหาร พวกเราอยู่ในแนวแสวงบุญ และหลังจากหลายปีที่ว่างเปล่า คนของฉันก็ผอมลง"
 enclave.5565.a:0 "เรา จะ ให้ ความ ช่วย เหลือ เท่า ที่ เรา ทํา ได้."
 enclave.5565.b:0 "คุณอาจจะผ่าน แต่เราไม่สามารถสํารองอาหาร"
 enclave.5565.c:0 "ที่นี่ไม่ต้อนรับคุณ"
 enclave.5570.name:0 "พรม แดน ของ พระเจ้า"
 enclave.5570.desc:0 "จากคนของฉัน ความกตัญญูของท้องเต็มท้อง ความจริง การมาที่นี่ของเรา ไม่ใช่อุบัติเหตุ ผู้ ทํานาย ที่ มี พลัง คน หนึ่ง ได้ ชี้ ไป ที่ ดาว ดวง หนึ่ง ใน ท้องฟ้า และ บอก ว่า เรา จะ ไป ถึง พระเจ้า ที่ นั่น. ของเธอคือดาวนั่น\n\nที่นี่ ชายแดนระหว่างโลกแห่งสัมผัส กับดินแดนศักดิ์สิทธิ์นั้นบางลง แต่ยานของเราเก่าแล้ว เพื่อติดต่อกับดินแดนศักดิ์สิทธิ์ เราต้องการความช่วยเหลือจากคุณ เจ้าอาจไม่มีพระเจ้าร่วมกัน แต่เจ้าจะปฏิเสธโอกาสที่จะพบพวกเขาหรือไม่ โปรดให้เราทรัพยากรที่เราต้องการ เพื่อเสร็จสิ้นการแสวงบุญของเรา"
 enclave.5570.a:0 "ดีมาก"
 enclave.5570.b:0 "คุณอยู่นานเกินไปแล้ว"
 enclave.5571.name:0 "ติดต่อ"
 enclave.5571.desc:0 "มัน... เยี่ยมมาก\n\nในนามของผู้แสวงบุญทุกคน ขอบคุณ ข้าไม่ใช่กวี ฉันไม่สามารถใส่ประสบการณ์เป็นคําพูด แต่ต้องขอบคุณความเอื้อเฟื้อของท่าน เราสัมผัสกับพระเจ้า ขอให้ความรุ่งเรืองนิรันดร์ ของดินแดนศักดิ์สิทธิ์จงอยู่กับคุณ"
 enclave.5575.name:0 "สิ้นสุดที่ ไม่บริสุทธิ์"
 enclave.5575.desc:0 "คาราวานผู้แสวงบุญที่มาหาเรา ร้องขอความช่วยเหลือพบกับจุดจบ การปรับโครงสร้างการโทรคมนาคม แสดงให้เห็นว่าพวกเขา มีส่วนร่วมในการทดลองใดรูปแบบหนึ่ง เนื่องจากมีแรงยึดเหนี่ยวมาอย่างฉับพลัน สนามควบคุม รอบแกนเครื่องยนต์ธงของพวกเขาถูกพัง การ ระเบิด ที่ ตาม มา ได้ ทําลาย กอง คาราวาน และ ทํา ให้ เกิด พายุ ไซ โอน ที่ รุนแรง ใน[wayward_pilgrims_system.GetName]ระบบ การ ประมาณ ทุก ครั้ง แสดง ว่า ต้อง ใช้ เวลา หลาย ปี กว่า พายุ ขนาด ใหญ่ นี้ จะ สงบ ลง.\n\nไม่ ว่า พวก เขา ตั้งใจ จะ ทํา อะไร ก็ ตาม พวก เขา ล้ม เหลว อย่าง เห็น ได้ ชัด และ เรา ถูก ทิ้ง ให้ รับมือ กับ ความ หายนะ นั้น."
 enclave.5575.a:0 "ยอมแพ้ไม่ได้"

 wayward_pilgrim_00:0 "พิล กริม ที่ มี ความ สุข"
 wayward_pilgrim_01:0 "พิล กริม ที่ ไม่ มี ความ สุข"
 wayward_pilgrim_02:0 "พิล กริม"
 wayward_pilgrim_03:0 "พิล กริม ที่ ไม่ พอ ใจ"
 wayward_pilgrim_04:0 "พิล กริม ที่ ถูก ปฏิเสธ"
 wayward_pilgrim_05:0 "พิล กริม ที่ ถูก ปฏิเสธ"
 wayward_pilgrim_06:0 "สง่า ราศี แห่ง อาณาจักร อัน รุ่ง โรจน์"
 wayward_pilgrim_07:0 "พายุ"

 enclave.6000.name:0 "ภาพที่แปลกประหลาด"
 enclave.6000.a.desc:0 "การพัฒนาที่แปลกของ[Root.GetName]หลังผ่านอุโมงค์ชรูด ผู้บัญชาการกองเรือได้ผ่านการเปลี่ยนแปลงอย่างรวดเร็ว ขณะ ที่ บุคลิกภาพ และ ความ ทรง จํา ของ พวก เขา ยัง คง ไม่ เป็น ที่ สังเกต เห็น แต่ รูป ร่าง ของ พวก เขา ก็ เปลี่ยน ไป อย่าง น่า ทึ่ง. ตอน นี้ พวก เขา มี แง่ มุม (และ อวัยวะ ภาย ใน) ของ สิ่ง มี ชีวิต ต่าง ดาว โดย สิ้น เชิง."
 enclave.6000.b.desc:0 "การพัฒนาการแจ้งเตือน[Root.GetName]หลังจากผ่านอุโมงค์พระบาทสมเด็จพระปรมาภิเษก ผู้บัญชาการกองเรือได้ประสบการเปลี่ยนแปลงที่น่ากลัว ขณะ ที่ บุคลิกภาพ และ ความ ทรง จํา ของ พวก เขา ยัง คง ไม่ เป็น ที่ สังเกต เห็น แต่ รูป ร่าง ของ พวก เขา ก็ เปลี่ยน ไป อย่าง น่า ทึ่ง. ตอน นี้ พวก เขา มี แง่ มุม (และ อวัยวะ ภาย ใน) ของ สิ่ง มี ชีวิต ต่าง ดาว โดย สิ้น เชิง."
 enclave.6000b.a:0 "กําหนดการผ่าศพ"
 enclave.6000b.b:0 "เอาเครื่องดูดฝุ่นออก"
 enclave.6000.d.desc:0 "การพัฒนาการแจ้งเตือน[Root.GetName]หลังผ่านอุโมงค์ชรูด ผู้บัญชาการกองเรือได้ผ่านการเปลี่ยนแปลงอย่างรวดเร็ว ในขณะที่ลักษณะเฉพาะตัวของโดรน และรูปแบบของการสัมผัสของระบบประสาท ยังไม่แน่นอนมากนัก รูปแบบทางกายภาพของมัน ได้มีการเปลี่ยนแปลงอย่างน่าทึ่ง ปัจจุบัน มี แง่ มุม (และ อวัยวะ ภาย ใน) ของ สิ่ง มี ชีวิต ทาง ชีววิทยา."
 enclave.6000d.a:0 "เริ่มขั้นตอนดําเนินการ"
 enclave.6000.e.desc:0 "การพัฒนาที่แปลกของ[Root.GetName]หลังผ่านอุโมงค์ชรูด ผู้บัญชาการกองเรือได้ผ่านการเปลี่ยนแปลงอย่างรวดเร็ว ในขณะที่ความทรงจําโดยรวมของเรายังคงไม่แน่นอน รูปทรงทางกายภาพของโดรนได้ถูกเปลี่ยนแปลงอย่างน่าทึ่ง ตอน นี้ พวก เขา มี แง่ มุม (และ อวัยวะ ภาย ใน) ของ สิ่ง มี ชีวิต ต่าง ดาว โดย สิ้น เชิง."
 enclave.6000e.a:0 "กําจัดโดรน"

 enclave.6005.name:0 "ล้างจิตใจ"
 enclave.6005.a.desc:0 "การพัฒนาที่แปลกของ[Root.GetName]ผู้ บัญชา การ กอง เรือ ได้ รายงาน ประสบการณ์ ของ ความ รู้สึก และ ความ รู้สึก ที่ ไม่ คุ้น เคย. ความคิดของพวกเขาเต็มไปด้วยความคิด ที่อาจมาจากคนอื่น ดู เหมือน เป็น ที่ ชัดเจน ว่า มี อะไร บาง อย่าง เกิด ขึ้น บาง ที อาจ เป็น ผล จาก การ ติด ต่อ กับ พลังงาน ไซ โอ นิก ของ ชรูด. ประสบการณ์ นี้ จะ มี ผล กระทบ อย่าง ไร ต่อ การ กระทํา ของ พวก เขา ที่ ยัง คง ต้อง ได้ เห็น..."
 enclave.6005.b.desc:0 "การพัฒนาที่แปลกของ[Root.GetName]หลังจากทางเดินของมันผ่านอุโมงค์ชรูด จิตสัมปชัญญะของเราได้รับการเปลี่ยนแปลงอย่างแยบยล บางทีเป็นผลมาจากพลังงานไซโอนิกของชรูด โดรน บัญชา รายงาน ประสบการณ์ ของ ความ รู้สึก และ อารมณ์ ที่ ไม่ คุ้น เคย จิตใจ ของ พวก เขา เต็ม ไป ด้วย แนว คิด ใหม่ ๆ. ยัง คง ต้อง เห็น ว่า ประสบการณ์ นี้ จะ มี ผล กระทบ ต่อ ประสิทธิภาพ ของ พวก เขา อย่าง ไร."
 enclave.6005.c.desc:0 "การพัฒนาปกติบน[Root.GetName]หลังจากเรือผ่านอุโมงค์ชรูด จิตสํานึกของเราถูกปรับเปลี่ยนอย่างแยบยล โดรน บัญชา รายงาน ประสบการณ์ ของ ความ รู้สึก และ ความ คิด ที่ ไม่ คุ้น เคย. เป็น ไป ได้ ที่ การ ติด ต่อ กับ พลัง ของ ชรูด ของ ระบบ ประสาท มี ผล กระทบ ต่อ เครือ ข่าย ประสาท ของ พวก เขา ถึง แม้ ยัง คง ต้อง คอย ดู ว่า ประสบการณ์ นี้ จะ มี ผล กระทบ ต่อ ประสิทธิภาพ ของ พวก เขา อย่าง ไร."

 enclave.6010.name:0 "$enclave.6005.name$"
 enclave.6010.a.desc:0 "การเปลี่ยนแปลงจิตใจที่ละเอียดอ่อน มีประสบการณ์จากผู้บัญชาการของ[Root.GetName]ขณะนี้กําลังเข้าสู่โฟกัส : หนึ่งเดือนหลังจากผ่านทางรถไฟชรูด รูปแบบคําสั่งของพวกเขามีการเลื่อนที่สังเกตได้ เป็น เรื่อง ยุติธรรม ที่ จะ กล่าว ว่า ประสบการณ์ นี้ ยัง ผล ให้ มี การ พัฒนา ลักษณะ นิสัย ใหม่."
 enclave.6010.b.desc:0 "ความเปลี่ยนแปลงของระบบประสาท ประสบการณ์ครั้งแรกจากผู้บัญชาการของ[Root.GetName]ขณะนี้กําลังเข้าสู่จุดสนใจรวม : หนึ่งเดือนหลังจากการเดินทางของโดรนผ่านอุโมงค์ชรูด ประสบการณ์ นี้ ยัง ผล ด้วย การ พัฒนา ลักษณะ นิสัย ใหม่."
 enclave.6010.c.desc:0 "ความเปลี่ยนแปลงของระบบประสาท ประสบการณ์ครั้งแรกจากผู้บัญชาการของ[Root.GetName]ตอนนี้เริ่มชัดเจนแล้ว : หนึ่งเดือนหลังจากผ่านทางช่องแคบชรูด เมทริกซ์ลักษณะของโดรนได้เลื่อนออกไป ประสบการณ์ นี้ ยัง ผล ด้วย การ พัฒนา ลักษณะ นิสัย ใหม่."
 shroud_touched_intro:0 "การ เดิน ทาง ผ่าน พุ่ม ไม้ นั้น ไม่ ง่าย เลย;"
