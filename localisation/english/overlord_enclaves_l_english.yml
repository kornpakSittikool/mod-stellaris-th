 # Shroudwalker Enclaves
 enclave.405.name:1 "[shroudwalker_enclave_country.GetName]"
 enclave.405.generic.a.desc:1 "อ้า! ผู้มาเยือน ยินดีต้อนรับ\n\nเราคือ§H[shroudwalker_enclave_country.GetName]§!ภายในยานที่ว่างเปล่านี้ ชุมนุมแม่มดของเรา กับกองกําลังที่ไม่สามารถเข้าใจได้ เราพิจารณาถึงความลับที่ซ่อนอยู่ในความฝัน อ่างเก็บความมีศักยภาพที่ไม่มีวันลืม อุปกรณ์ที่มองไม่เห็นขับเคลื่อนอารยธรรมทั้งหมด§Yไม้ พุ่ม§!จง เปิด เผย หลาย สิ่ง แก่ คน ที่ จะ รับ ฟัง.\n\nตอนนี้ ผมฟังคุณ อะไรพาคุณมาหาเรา คุณทราบหรือยัง?"
 enclave.405.generic.n.desc:0 "ยินดีต้อนรับผู้มาเยือน เราได้รับการรอคอย"
 enclave.405.generic.o.desc:0 "ดังนั้นอารยธรรมจํานวนมากบอกชนิดของเรื่องเดียวกัน ของความมืดที่ซ่อนอยู่ในเหมือง ขุดลึกเกินไป บอกฉันผู้เข้าชม : คุณเคยสงสัยสิ่งที่ซ่อนอยู่ ใต้ชั้นของความเป็นจริงของเรา?"
 enclave.405.generic.p.desc:0 "มีคําหนึ่งที่เราทราบดี\n\"สิ่งที่ถูกลมพัดเข้ามา โดยสายลมจะถูกชะล้างด้วยฝน\"\nคําปลอบประโลม สําหรับหลายดาวที่สั้นกว่าดาวเคราะห์\n\nดินแดนที่เราเรียกว่า ชรูด ไม่ทราบว่าสภาพอากาศดังกล่าวไม่"
 enclave.405.psionic.a.desc:0 "อา, เพื่อนผู้อาศัย ของผู้ที่ไม่รู้จัก! เรา,§H[shroudwalker_enclave_country.GetName]§!ยินดีต้อนรับคุณและชื่อของคุณเพื่อน\n\nโปรดให้อภัยวิธีการสื่อสารที่ด้อยกว่านี้ การอุทิศตนอย่างแข็งขัน แบบไซโอนิคที่เราปฏิบัติ อาจเกิดขึ้นจากสิ่งกีดขวางทางโทรจิตที่น่ากลัว ดัง นั้น เรา อาจ ได้ รับ แค่ ภาพ แวบ เดียว เกี่ยว กับ ความ คิด จาก แดน วิญญาณ.\n\nดังนั้น ผมต้องถามว่า อะไรพาคุณมาหาเรา"
 enclave.405.psionic.n.desc:0 "ดังนั้นชาวป่าจึงกลับมา ยินดีที่ได้พบคุณอีกครั้ง เราได้รับการรอคอย"
 enclave.405.psionic.o.desc:0 "ของทั้งหมดที่เราถือใน§H[shroudwalker_enclave_country.GetName]§!มีไม่กี่คนที่ถูกจัดขึ้นอย่างสูงส่งกว่านี้ แม้ผู้ที่สูงศักดิ์ที่สุดเท่าที่เรา สามารถแน่ใจว่า\n\nดังนั้น เพื่อนร่วมทาง: เราจะรับใช้ซึ่งกันและกันได้อย่างไร?"
 enclave.405.hostile.a.desc:0 "อินเตอร์ลอปเปอร์ ความเป็นปรปักษ์ของคุณ มาก่อนคุณ เหมือนมีอัสมา เราเป็นชุมนุมที่สงบสุข แต่ทราบนี้ : ถ้าคุณตั้งใจที่จะทําอันตรายกับเราคุณจะพบว่าความโง่เขลาดังกล่าว เราคือ§H[shroudwalker_enclave_country.GetName]§!และ ถึง แม้ เรา อาจ ดู เหมือน ว่า ยัง ไม่ บรรลุ ถึง แต่ ความ โกรธ ของ เรา ก่อ ความ เสีย หาย อย่าง มาก."
 enclave.405.desc.mindwardens: "ชื่อเสียงของคุณมาก่อนคุณ\n\n“ดังนั้น เราจะไม่นําข้อเปรียบเทียบ(การลงโทษ) ใด ๆ ให้แก่ผู้ยําเกรงทั้งหลาย”§Hเดอะชราวด์§!วิสัยทัศน์ จํากัด ของจักรวาล จะล่ามเราทั้งหมดกับพื้นดิน"
 enclave.405.desc.mindwardens_trust: "อคติที่โง่เขลาของ[mindwarden_enclave_country.GetName]ได้วางยาพิษจิตใจของคุณ ประชดอะไรกัน...\n\nเรา จะ ไม่ ปรึกษา กับ คน ที่ ผูก พัน เช่น นั้น กับ คน โง่."
 enclave.405.desc.end_of_the_cycle: "\"คุณได้ปลุกความน่ากลัว ไกลเกินกว่าความเข้าใจของคุณ และกับมันได้ทําลายกาแลคซีนี้\n\nเราไม่อยากขึ้นศาลความบ้าคลั่ง ไปให้พ้นจากเรา!\""
 enclave.405.a:1 "อะไรจะเป็นของเรา§Yชะตา§!?"
 enclave.405.b:2 "คุณจะยินดีที่จะส่งเรา§Yอาจารย์§!จากคําสั่งของคุณ?"
 enclave.405.c:1 "คุณให้เรา§Yความลึก§!ในอาณาจักรอื่น?"
 enclave.405.c.tt:1 "อย่างน้อยเราต้อง§Y20§! £opinion£โต้เถียงกับ§Y[shroudwalker_enclave_country.GetName]§!เพื่อถามว่า§Yการ หยั่ง เห็น§!."
 enclave.405.c.tt.2:1 "เราต้องการเครือข่ายสไปซี่ เพื่อถาม§Y[shroudwalker_enclave_country.GetName]§!เพื่อนําทางความพยายามลับของเรา"
 enclave.405.d:1 "บอกเราเกี่ยวกับ§Yการเดินทาง§!ผ่านชรูด"
 enclave.405.d.tt:1 "อย่างน้อยเราต้อง§Y30§! £opinion£โต้เถียงกับ§Y[shroudwalker_enclave_country.GetName]§!เพื่อสอบถามเกี่ยวกับ§Yชรูด บี คอน§!."
 enclave.405.e:0 "ช่วยสอนเราถึงวิธีการเก็บเกี่ยว§YZro§!?"
 enclave.405.e.tt:0 "อย่างน้อยเราต้อง§Y50§! £opinion£โต้เถียงกับ§Y[shroudwalker_enclave_country.GetName]§!เพื่อถามเกี่ยวกับ§YZro§!เก็บเกี่ยว"
 enclave.405.f:0 "เราเจอคนที่อ้างว่า§Yวีลฟาร์§!..."
 enclave.405.g: "เปิด§Yรอยแยกแอสทรัล§!."
 enclave.405.g.tt: "§Y50§! £opinion£โต้เถียงกับ§Y[shroudwalker_enclave_country.GetName]§!จําเป็นต้องก่อนที่เราจะเปิด§Yรอยแยกแอสทรัล§!."
 enclave.405.h: "ช่วยเราเปิด§Yจิตใจ§!."
 enclave.405.h.tt: "§Y90§! £opinion£โต้เถียงกับ§Y[shroudwalker_enclave_country.GetName]§!จําเป็น ต้อง ทํา ก่อน ที่ จะ ช่วย เรา เปิด ใจ."
 enclave.405.i: "เราแสวงหาความสามารถ§Yเดอะชราวด์§!."

 enclave.410.desc:1 "การสอบถามที่มีความสําคัญมาก การถูกถามจากหลายคนก่อนคุณ คํา ถาม ดัง กล่าว มี ราคา แพง แต่ เรา สามารถ ให้ คํา ตอบ ได้.\n\nอย่าง ไร ก็ ตาม จง รู้ ข้อ นี้: การ กรีด ร้อง ช่วย ให้ เรา เข้าใจ เหตุ การณ์ ที่ ยัง ไม่ เกิด ขึ้น และ ความ รู้ นี้ จะ ช่วย ชี้ นํา แนว ทาง ของ คุณ. แต่มันเกินอํานาจ ของเหตุการณ์ใด ๆ ที่จะเปลี่ยน การเปลี่ยนของกาแลคซี\n\nหาก คุณ จะ ทํา ตาม คํา แนะ นํา นี้ จง รู้ ว่า ความ ปรารถนา ของ คุณ ไม่ ควร ส่ง เสริม อะไร มาก ไป กว่า การ เตรียม ตัว ให้ ดี ขึ้น. แต่โอ้สิ่งที่ออกแบบที่ยิ่งใหญ่อาจจะสร้างขึ้นบนแม้เหลือบที่มากที่สุดสิ่งที่จะมา ..."
 enclave.410.a:0 "เราจะพิจารณาสิ่งอื่น"
 enclave.410.b:0 "เราจะจ่าย"
 enclave.415.desc:1 "การสั่นของชรูด มันพูดโดยไม่ส่งเสียง และในเสียงทั้งหมดในครั้งเดียว เครือข่ายอนันต์ของเวลา ที่ขยายจากช่วงเวลานี้ ตอนนี้เข้าสู่ความซับซ้อน ที่นี่ ในสถานที่แห่งนี้ เส้นทางข้างหน้าเติบโตชัดเจน พิธีทํานายได้เริ่มต้นขึ้นแล้ว"
 enclave.415.tt:0 "เดอะ§Y[shroudwalker_enclave_country.GetName]§!จะเกษียณไปสองสามวัน เพื่อพูดคุยกับชรูด"

 #Divination Finished
 enclave.416.name:0 "สัญญาณ ค่อย ๆ จาง หาย ไป"
 enclave.416.desc:0 "\"ชรูดเติบโตเงียบ อีกครั้งหนึ่ง แม่น้ําที่เหนื่อยล้าของเวลา ถอยเข้าไปในเส้นทางที่ดีของ การ เปลี่ยน แปลง ที่ บอก ไว้ ล่วง หน้า โดย พิธี เสี่ยง ทาย ได้ เกิด ขึ้น. ไปในขณะนี้ด้วยความกลัวในขณะที่คุณสะท้อนเกี่ยวกับการทํางานของชรูด.\""

 enclave.420.desc:2 "กาแล็กซีมืด และเต็มไปด้วยอันตราย ให้อีโลเมนเส้นทาง ของผู้แสวงบุญที่ดื้อรั้น เราเสนอ§Hชรูด บี คอน§!เมื่อติดตั้งบนหนึ่งในฐานดาวของคุณแสงของมันจะเจาะทั้งหมด; แม้ที่ม่านบางที่เรียกว่าความจริง อุโมงค์ ที่ มัน วาง ไข่ ทํา ให้ มี ทาง ข้าม ผ่าน ชรูด และ เป็น วิธี ที่ จะ นํา เรือ ที่ จะ เดิน ทาง ไกล มาก ผ่าน อวกาศ และ เวลา.\n\nเลือกสถานที่ตั้งของบีคอนของคุณอย่างระมัดระวัง - ครั้งเดียวจัดตั้งขึ้น ไม่สามารถย้ายอุโมงค์เลื่อน และไม่สามารถเรียกตัวสํารองอื่นได้\n\nคุณ ควร เอา ใจ ใส่ ถ้อย คํา เหล่า นี้: อุโมงค์ ที่ คด เคี้ยว ไม่ ใช่ ถนน ธรรมดา และ แม้ แต่ เรา ก็ ไม่ สามารถ บอก ล่วง หน้า ถึง ผล กระทบ ทั้ง หมด ของ การ เดิน ทาง ดัง กล่าว."
 enclave.420.a:0 "$enclave.410.a$"
 enclave.420.b:0 "เราอยากได้§Yชรูด บี คอน§!."
 shroud_beacon_info:1 "ใบอนุญาตก่อสร้าง§Hชรูด บี คอน§!ในสตาร์เบสของเรา เมื่อสร้างแล้ว มันจะก่อให้เกิด§Hอุโมงค์โค้ง§!ให้ทางจาก§Y[shroudwalker_enclave_system.GetName]ระบบ§!ช่อง ทาง เดียว เท่า นั้น ที่ สามารถ วาง ไข่ ได้ คือ เลือก ที่ ตั้ง อย่าง รอบคอบ."
 enclave.425.desc:1 "พระ ดํารัส นั้น เป็น ที่ รู้จัก แก่ เรา ทั้งหลาย ทาง ของ ชาว ชู ร ปัด นั้น แปลก และ เป็น ทาง ลม ขอให้เบค่อนช่วยนําทางคุณ"

 enclave.435.name:0 "ชรูด วอร์คเกอร์ เอ็นคเลฟ ถูกทําลาย"
 enclave.435.desc:0 "ชัยชนะใน[shroudwalker_system.GetName]ระบบ! กองกําลังของเราทําผลงานสั้น ๆ ของสิ่งที่เรียกว่าลึกลับของ[FROM.GetName]สําหรับทุกการบรรยายที่ยิ่งใหญ่ของความรู้และอํานาจ, ความศรัทธาโง่เขลาของพวกเขาที่มีต่อชรูด ไม่สามารถที่จะให้ความกล้าหาญพอที่จะป้องกันการโจมตีของเรา อันที่จริง กองกําลังของเรา ทําลายการป้องกันทางเครื่องยนต์ได้อย่างง่ายดาย อย่าง ไร ก็ ตาม ครั้ง หนึ่ง ภาย ใน พวก เขา พบ ว่า ช่อง ว่าง ส่วน กลาง ว่าง เปล่า เก็บ ไว้ สําหรับ อะ โค ลี เต เพียง ลําพัง ที่ พวก เขา พบ ลึก ใน การ คิด รําพึง ใน ห้อง อัน ห่าง ไกล. ส่วนที่เหลือได้หายไปเรามีความคิด แต่กาแล็กซี่ได้เป็นอย่างดีกําจัด"
 enclave.440.desc:1 "มีรายงานเข้ามารอบการทําลายล้าง[FROM.GetName]ใน[shroudwalker_system.GetName]ระบบ พวกก่อการร้ายทําผลงานสั้น ๆ ของแคมเปญ ลดอาคารของชรูดวอลส์เป็นซากปรักหักพัง แปลกนะที่คิดว่า เวทย์มนต์เหล่านี้ไม่อาจรู้ล่วงหน้าถึงความตายของตัวเอง หรือ โศกนาฏกรรม นี้ อาจ เป็น ส่วน หนึ่ง ของ การ ออก แบบ ที่ ยิ่ง ใหญ่ กว่า นั้น? ใครจะพูดได้บ้าง? หาก ปราศจาก การ บริการ ของ พวก เขา อนาคต ก็ ยัง คง ถูก ปิด คลุม."

 requires_not_shroudwalker_system:0 "§Rไม่สามารถสร้างในระบบที่ใช้ร่วมกันได้§Yชรู ด วอร์คเกอร์§!.§!"
 requires_no_bypass:0 "§Rไม่สามารถสร้างขึ้นในระบบที่มีรูหนอนอยู่แล้ว§!"
 limit_one_shroud_tunnel:0 "§Rเราอาจรักษามันไว้ได้§Yหนึ่ง§!ทีละเล็กละน้อย§!"
 requires_shroudwalker_agreement:0 "§Rต้องมี §Yข้อตกลงทางการทูต§! กับชรู ด วอร์คเกอร์§!"
 shroudwalker_divination_cooldown:0 "§Rพวกเราอาจจะเจอแค่§Yการ วิเคราะห์§!ในเวลาเดียวกัน§!"
 shroudwalker_divination_cooldown_two:0 "§Rพวกชรูดวอร์คเกอร์จะไม่สามารถลองได้อีก§Yการ วิเคราะห์§!ถึง§Y[root.shroudwalker_divination_timer]§!§!."

