 enclave_mercenary_starbase_ruined:0 "ซาก ปรัก หัก พังฐานดวงดาว"
 enclave_mercenary_starbase_ruined_cap: "$enclave_mercenary_starbase_ruined$"
 enclave_mercenary_starbase_ruined_desc:0 "ป้อมปราการที่ครั้งหนึ่งเคยเป็นของการค้าของทหารรับจ้างนี้ได้ลดลงที่จะทําลาย; ห้องแสดงสินค้าของ ได้รับการปล้นของทั้งหมดของพวกเขา"
 enclave_salvager_station:0 "ซัลวาเจอร์ฐานดวงดาว"
 enclave_salvager_station_cap: "$enclave_salvager_station$"
 enclave_salvager_station_plural:0 "เบส:"
 enclave_salvager_starbase_ruined:0 "ซัลวาเจอร์ถูกทําลายฐานดวงดาว"
 enclave_salvager_starbase_ruined_cap: "$enclave_salvager_starbase_ruined$"
 enclave_salvager_starbase_ruined_desc:0 "รังของกิจกรรมนี้ครั้งเดียวยังคงอยู่ในขณะนี้ วิศวกรรมอ่าวจํานวนมาก เกลื่อนไปด้วยไม่มีอะไร แต่เครื่องจักรที่แตก"
 enclave_shroudwalker_station:0 "ชื่อ=หน้าต่างหมายเหตุฐานดวงดาว"
 enclave_shroudwalker_station_cap: "$enclave_shroudwalker_station$"
 enclave_shroudwalker_station_plural:0 "ฐาน ของ ดาว"
 enclave_shroudwalker_starbase_ruined:0 "ส รู ด วอล์ก เกอร์ ที่ ถูก ทําลายฐานดวงดาว"
 enclave_shroudwalker_starbase_ruined_cap: "$enclave_shroudwalker_starbase_ruined$"
 enclave_shroudwalker_starbase_ruined_desc:0 "เมือง ลี้ ภัย เก่า นี้ ถูก แยก ออก จาก กัน ดู เหมือน ว่า มา จาก ภาย ใน. กระดูกสันหลังหินของมันตอนนี้แตกเป็น เสี่ยงของการทําลายเดอะชราวด์มากมายไปลมจักรวาล"

 mercenary_army:0 "กองทัพ เม อร์เค เตอร์"
 mercenary_army_desc:0 "ทหารเหล่านี้อยู่ในนั้นเพื่อเงิน พวก เขา โหด ร้าย และ มี ประสิทธิภาพ แต่ ขณะ ที่ ความ เสี่ยง เป็น ส่วน หนึ่ง ของ งาน พวก เขา ไม่ เต็ม ใจ สละ ตัว เอง เพื่อ จุด ประสงค์. และจะไม่มีวันผ่านในโอกาสที่จะปล้น"
 mecha_army:0 "กองทัพ เม อร์เค เตอร์"
 mecha_army_desc:0 "ทหารรับจ้างที่ดีที่สุดในตลาด กองทัพ เหล่า นี้ ชดเชย จํานวน ที่ ต่ํา โดย การ ขับ เครื่อง เดิน ขนาด ใหญ่. แม้ ว่า พวก เขา ไม่ ใช่ ทหาร ที่ กล้า หาญ ที่ สุด แต่ พวก เขา ก็ ไร้ ความ เมตตา และ มี แต่ ซาก ปรัก หัก พัง ที่ ไม่ รู้ จัก กัน เท่า นั้น."

 salvager_overdrive:0 "โอเวอร์ไดร์ฟของซัลวาเจอร์"
 salvager_overdrive_desc:0 "จักรวรรดิแห่งนี้ได้รับประโยชน์ จากความพยายามที่เน้นของลูกเรือที่เป็นมิตรของซัลวาเกอร์ การเร่งการก่อสร้างในฐานดาวและอาณานิคมของพวกเขา"
 salvager_insight:0 "การ หยั่ง เห็น เข้าใจ"
 salvager_insight_desc:0 "นักวิทยาศาสตร์ของจักรวรรดินี้ได้ประโยชน์จาก ความเชี่ยวชาญในการใช้งานของแซลวาเจอร์ เอ็นคลาเว การค้นพบใหม่ที่น่าตื่นเต้นในวิศวกรรม"

