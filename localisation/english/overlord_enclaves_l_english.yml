 # General-Purpose
 enclave.100.name:0 "อุโมงค์ที่เสีย"
 enclave.100a.desc:2 "มีบางอย่างรออยู่[From.GetName]ระบบ: เป็นทางที่บังตา ตัดมาจากผ้าของเวลาอวกาศ ขอบฟ้าของมัน ข้อมูลตรวจจับไม่แน่นอน และลูกเรือของเรือวิทยาศาสตร์ของเรา รายงานการรบกวนแปลกๆ\n\nทั้ง ๆ ที่ ขาด การ ติด ต่อ ทาง โทรศัพท์ ที่ เป็น ประโยชน์ อย่าง น่า ข้อง ขัดใจ แต่ ดู เหมือน เป็น ที่ ชัด แจ้ง ว่า เรา ได้ สะดุด ใน อุโมงค์ ที่ เรา ไม่ รู้ จัก. เส้นทางที่อันตราย, แต่รางวัลอาจจะดี; ทางฝั่งไกลของอุโมงค์เป็นมุมห่างไกลของกาแล็กซี่"
 enclave.100b.desc:1 "มีบางอย่างรออยู่[From.GetName]ระบบ: เป็นทางที่บังตา ตัดมาจากผ้าของเวลาอวกาศ ขอบฟ้าของมัน ข้อมูลตรวจจับไม่คงที่ แต่รังถูกรบกวน ความรู้สึกว่าถูกจับตามองอย่างไม่ลดละ เรารู้สึกได้ชัดเจน ว่ามีบางอย่างรบกวน\n\nทั้ง ๆ ที่ ขาด การ ติด ต่อ ทาง โทรศัพท์ ที่ เป็น ประโยชน์ อย่าง น่า ข้อง ขัดใจ ก็ ตาม ดู เหมือน เป็น ที่ ชัด แจ้ง ว่า เรา ได้ มา ถึง ทาง หนึ่ง โดย ไม่ รู้ ตัว. เส้นทางที่อันตราย, แต่รางวัลอาจจะดี; ทางฝั่งไกลของอุโมงค์เป็นมุมห่างไกลของกาแล็กซี่"
 enclave.100.a:0 "สิ่งที่ลึกลับอยู่นอกเหนือม่าน?"

 # Mercenary Enclaves
 enclave.2.name:0 "มูลนิธิผู้แทนราษฎร"
 enclave.2.desc:2 "เรากําลังถกเถียงกันว่าจะช่วยจัดการ[fleet.GetName]ในฐานะอิสระ§Yช่องสัญญาณ§!ข้อเสนอที่วางไว้ครั้งแรกโดยผู้บัญชาการกองเรือ จะส่งผลให้เราสูญเสียการควบคุมของกองเรือ เราจะรับผิดชอบในการจัดหาการลงทุนที่มีขนาดพอ§Yแหล่ง พลังงาน§!ถึง§Yอัลลอย§!ในทางกลับกัน เขาให้จํานวนหุ้นในบริษัทกับเรา สิ่ง เหล่า นี้ จะ มี ผล ตอบ แทน เป็น ระยะ ๆ และ เป็น สิทธิ พิเศษ.\n\nพวก เขา รับรอง กับ เรา ว่า ใน ยาม ที่ มี ความ จําเป็น พวก เขา จะ พร้อม เสมอ ที่ จะ ต่อ สู้ เพื่อ เรา. และเงินของเรา"
 enclave.2.tooltip.a:0 "กองยานต้องการผู้บัญชาการ"
 enclave.2.tooltip.aa:0 "กองยานมีผู้บัญชาการ"
 enclave.2.tooltip.cloak:0 "ยานทุกลำในกองยานนี้จะต้องไม่สามารถพรางตัวได้"
 enclave.2.tooltip.b:1 "ที่นี่มีช่องสัญญาณอยู่แล้ว"
 enclave.2.tooltip.bb:1 "ไม่มีเพิ่มระยะเวลา...อื่นๆในระบบ"
 enclave.2.tooltip.c:0 "ระบบต้องอยู่ภายใต้การควบคุมของเรา"
 enclave.2.tooltip.cc:0 "ระบบอยู่ภายใต้การควบคุมของเรา"
 enclave.2.tooltip.d: "ไม่มีความจุอิสระ"
 enclave.2.tooltip.dd: "ความจุในการใช้งาน"
 enclave.2.tooltip.e:1 "ระบบต้องมีดาวเคราะห์น้อยหรือดวงจันทร์(ดาวบริวาร)"
 enclave.2.tooltip.ee:1 "ระบบมีดาวเคราะห์น้อยหรือดวงจันทร์(ดาวบริวาร)"
 enclave.2.tooltip.f:0 "เราต้องเป็นเจ้าของกองยานนี้"
 enclave.2.tooltip.g: "ขอบเขตพื้นที่ ไม่สามารถใช้เรือเป็นบ้าน พัก"
 enclave.2.a.tooltip:0 "ก่อตั้งตัวจําลอง"
 enclave.25:0 "การ ทําลาย เมือง เม อร์เค เตอร์"
 enclave.25.desc:1 "กองเรือของเราเอาชนะการป้องกันของทหารรับจ้างใน[merc_system.GetName]และสถานีของพวกเขาถูกทุบเป็นชิ้นๆ ที่เหลือ[FROM.GetName]หลัง จาก นั้น อย่าง รวด เร็ว กอง เรือ ที่ เหลือ ก็ แตก เป็น เสี่ยง ๆ. ขณะ ที่ ผู้ บังคับ บัญชา บาง คน ที่ รอด ชีวิต อาจ หัน ไป ทํา สงคราม อาญา คน อื่น ๆ ได้ ประกาศ แผนการ ของ ตน เพื่อ ทํา ตาม สัญญา ที่ มี ขนาด เล็ก กว่า โดย เสนอ การ สนับสนุน การ ทํา ไม้ ซุง หรือ การ ตั้ง สถานี อวกาศ. แต่กิจการดังกล่าวไม่ไร้สาระเลย ข้อเท็จจริงที่สําคัญก็คือ การที่ยานแมคคาเลฟไม่มีอีกแล้ว และจากซากปรักหักพังของมัน"
 enclave.26.desc:1 "ข่าวได้มาถึงเราว่าเม อร์คา รีได้ถูกทําลายโดย[mercenary_destroyer.GetName]ใน[merc_system.GetName]ผู้บุกรุก พิสูจน์แล้วว่าแข็งแกร่งเกินไป[FROM.GetName]การ เผชิญ หน้า กัน เอง และ สถานี นี้ เป็น ที่ พัก อาศัย ของ คณะ กรรมการ, โรง เรือน, และ อู่ เรือ ของ พวก เขา ถูก ทําลาย. กองทัพเรือทหารรับจ้างถูกยุบไปไม่นาน หลังจากที่กัปตันทุกคน ถูกทิ้งให้ป้องกันตัวเอง แต่ตัวแทนบางคนได้กล่าวว่า พวกเขาจะเคารพในสัญญาของบริษัท"
 enclave.26.a:0 "พวกเขาต้องชดใช้"
 enclave.27:0 "ฉุกเฉินกองยานจํา"
 enclave.27.desc:0 "ลูกค้าที่มีค่ายิ่ง\n\nขณะ ที่ เรา ประสบ กับ การ โจมตี ใน ปัจจุบัน เรา จําเป็น ต้อง ระลึก ถึง กอง กําลัง ของ เรา เอง อย่าง เร่ง ด่วน. ตามสัญญาของเรา เราจะดําเนินการทันที มาตรา285b.15และกองเรือของเราจะออกจากการให้บริการของคุณ ทันทีที่การแจ้งเตือนนี้มาถึงคุณ เราตั้งหน้าตั้งตาคอยการเป็นหุ้นส่วนของเราอีกครั้ง เมื่อสถานการณ์ที่โชคร้ายนี้ได้รับการแก้ไข และขอโทษสําหรับความไม่สะดวกใดๆ"
 enclave.27.desc.mindwarden: "เราได้รับการติดต่อจาก[mercenary_enclave_country.GetName]:\n\n§H[root.GetName],\n\nเราอยู่ภายใต้การโจมตี และดังนั้นต้องจํากองกําลังของเราเองทันที ตามสัญญาของเรา[mercenary_fleet.GetName]จะออกจากการให้บริการของคุณโดยทันที\n\nเรา มั่น ใจ ว่า คุณ จะ เข้าใจ ความ เร่ง ด่วน ของ สถานการณ์ นี้ และ ความ จําเป็น ใน การ กระทํา ของ เรา.§!"
 enclave.27.a:0 "โชคดี"
 enclave.27.a.mindwarden: "ขอ ให้ พวก เขา เอา ชนะ การ คุกคาม นี้."
 enclave.27.b:0 "นี่มันเกินไปแล้วนะ"
 enclave.27.b.mindwarden: "เราน่าจะอ่านลายนิ้วมือเล็กๆ"
 enclave.28:0 "ข้อตกลงสันติภาพ"
 enclave.28.desc:0 "ฟังทางนี้[Root.GetName]หนึ่งปีผ่านไป จากพฤติกรรมก้าวร้าวของคุณ พวกเรา[mercenary_enclave_country.GetName]พร้อมที่จะปล่อยให้อดีตผ่านไป ความขัดแย้งอาจมีประโยชน์ แต่ไม่ได้เกิดขึ้นระหว่างหุ้นส่วนธุรกิจ ถ้าคุณแค่เสนอคําขอโทษ และส่งความเป็นมิตรอย่างถ่อมตัวมาให้เรา เรายินดีมองข้ามเรื่องโชคร้ายนี้"
 enclave.28.a:0 "ตายและเน่าตาย ไอ้ทหารรับจ้าง"
 enclave.28.b:0 "ดีมาก"
 enclave.205.name:0 "[mercenary_enclave_country.GetName]"
 enclave.205.desc:1 "ยินดีต้อนรับ![mercenary_enclave_country.GetName]เสนอบริการความปลอดภัยทางศิลปะให้ลูกค้าของเรา เรามีสัญญาแพ่งข้ามโลกหลายใบ จากรายละเอียดความปลอดภัยส่วนบุคคล\n\nแต่สําหรับลูกค้าระดับสูงของเรา เราตั้งใจจะให้สิ่งที่ดีที่สุด เรือรบ กองทัพ ที่ปรึกษาทางทหาร มี ทาง เลือก มาก มาย ใน การ รักษา สันติภาพ. สําหรับค่าธรรมเนียมที่ถ่อมตัว"
 enclave.205.desc.hostile:0 "อ่าผู้ปลดปล่อยกลับมา\n\nใน ที่ สุด คุณ ได้ สติ และ เห็น ความ ไร้ ประโยชน์ ของ การ กระทํา ที่ ไร้ ประโยชน์ เหล่า นี้ ของ คุณ ไหม? สําหรับผลรวมเล็ก ๆ น้อย ๆ เพียงสัญลักษณ์ของความปรารถนาดีของคุณเราที่[mercenary_enclave_country.GetName]เรา เต็ม ใจ ละ เว้น ความ ขัด แย้ง เหล่า นี้. ขอ ให้ เรา ร่วม กัน คอย ท่า อนาคต ที่ เป็น ประโยชน์."
 enclave.205.desc.unfriendly:0 "เราไม่มีบริการสําหรับคุณ ออกไป"
 enclave.205.a:1 "เราหวังว่า§Yเช่ากองเรือ§!."
 enclave.205.tooltip.a:1 "เดอะ[event_target:current_client.GetName]เราเช่าเรือไว้แล้ว"
 enclave.205.tooltip.b:0 "ไม่มีกองเรือให้เช่า"
 enclave.205.b:1 "เราหวังว่า§Yจัดการ§!กองเรือที่เช่ามา"
 enclave.205.c:1 "เราสนใจในการจัดตั้ง§Yการ์ ริ สัน§!."
 enclave.205.d:1 "เราอยากช่วยคุณ§Yกองเรือขนาดใหญ่§!."
 enclave.205.d.timeout:0 "ผู้ติดตามกําลังเกณฑ์ลูกเรือใหม่ พวกเขาไม่สามารถลงสนามปรับปรุงระบบได้จนกว่า§Y[event_target:mercenary_enclave_country.upgraded_station_timer]§!."
 enclave.205.e:1 "เรากําลังมองหา§Yความลึกเชิงยุทธวิธี§!ให้กลายเป็นศัตรูที่น่ากลัว"
 enclave.205.f:1 "เราต้องการที่จะจ้าง§Yกองกําลังบก§!."
 enclave.205.g:1 "อะไร§Yปูมบันทึกวิธีแก้ปัญหา§!คุณเสนอได้ไหม?"
 enclave.205.g.tooltip:1 "เราได้รับแล้ว§Yความช่วยเหลือทางปูมบันทึก§!."
 enclave.205.h:2 "เป็นของคุณ§Yเจ้าของ§!เราต้องการทบทวนทางเลือกของเรา"
 enclave.205.i:0 "ก็ช่างมันเถอะ"
 mercenary_tt_hirefleet:0 "ควบคุม§Yกองเรือทหารรับจ้าง§!ในนี้ 10 ปี"
 mercenary_tt_managefleet:0 "ยกเลิกหรือยืดยาวของคุณ§Yกองเรือทหารรับจ้าง§!สัญญา"
 mercenary_tt_garrison:0 "ซื้อ เสื้อ ชั้น สูง§Yสร้างฐานแสง§!."
 mercenary_tt_tactical:0 "ค้นหาข้อมูลเกี่ยวกับปัจจุบัน§Yวิกฤติ§!และวิธีที่จะต่อสู้กับมัน"
 mercenary_tt_hirearmies:0 "ค่า จ้าง§Yกองทัพ§!สําหรับการบุกรุกภาคพื้นดิน"
 mercenary_tt_logistic:0 "ให้ทหารรับจ้างช่วยในการสายอุปทานของคุณและเพิ่ม§Yความจุเรือ§!."
 mercenary_tt_patron:0 "เดอะ§Yเจ้าของ§!ใน บรรดา กอง เรือ บรรทุก สินค้า อาจ ช่วย พวก เขา พัฒนา หรือ สนับสนุน กอง เรือ ที่ ถูก ว่า จ้าง แล้ว."

 enclave.210.desc:0 "เยี่ยม! ซ่อมแซม[mercenary_enclave_country.GetName]กองทัพเรือเป็นทางเลือกที่ถูกต้องเสมอ กองกําลังของเรา เป็นหนึ่งในผู้ที่ได้รับการฝึกฝนที่ดีที่สุด และวินัยมากที่สุดในกาแล็กซี่ และเทคโนโลยีของเราคือการตัดขอบ โจรสลัด, ผู้ก่อการจราจล, และใครอื่น ๆ ที่คุณอาจจะมี วิธีจัดการกับเร็ว ๆ นี้ จะเรียนรู้ที่จะแสดงความเคารพ\n\nนอกจากนี้ยานแต่ละลําของเรามาพร้อมกับผู้บัญชาการทหารรบ ที่ไม่มีค่าใช้จ่ายเพิ่มเติม ในทุกแง่มุมของสงครามระหว่างดวงดาว พวกเขาจะนํากองกําลังของคุณไปสู่ชัยชนะ"
 enclave.211.desc:0 "ข้าเชื่อว่าเจ้าจะนํากองกําลังใหม่ของเจ้าไปใช้อย่างยอดเยี่ยม และสันติภาพจะได้กลับสู่จักรวรรดิของเจ้า"
 enclave.215.desc:1 "คุณอยากยกเลิกหรือต่อสัญญา ให้เราเตรียมเอกสารที่จําเป็น ขณะนี้เรากําลังดําเนินการโปรโมชั่น ที่ลูกค้าได้รับลังรวมของ ระเบิดสําหรับทุกสัญญาเพิ่มเติม!"
 enclave.215.a:0 "เราอยากคุยเรื่องอื่น"
 enclave.215.b:0 "เราต้องการที่จะขยายสัญญาของเรา"
 enclave.215.c:0 "เราอยากจะยกเลิกสัญญาของเรา"
 enclave.220.desc:0 "ทหารรักษาการของเรา ให้คุณค่าที่พิเศษ อย่างไรก็ตาม โปรดระลึกไว้ว่า[mercenary_enclave_country.GetName]เราหน้าบึ้งเมื่อคําว่า \"เม อร์เค เตอร์\". คํา นี้ ตรง เกิน ไป และ มี การ คบหา สมาคม ที่ ไม่ ดี มาก เกิน ไป. 'ผู้รับเหมาป้องกันตัว' ของเรา กําลังรอเตรียมตัวประจําสถานี สําหรับการมาถึงของ ผู้เชี่ยวชาญความปลอดภัยของเรา เมื่อเรามาถึง ผู้เชียวชาญเหล่านี้จะเริ่มขุดเจาะ พนักงานสถานี เพื่อดึงเอาผลงานของพวกเขาออกมา\n\nที่[mercenary_enclave_country.GetName]เราจะฝึกเฉพาะผู้รักษาความสงบที่ดีที่สุด"
 enclave.225.desc:0 "ขอบคุณสําหรับธุรกิจของคุณ เราภูมิใจที่ได้ทํางานร่วมกับคุณ ที่จะทําให้กาแลคซีเป็นสถานที่ที่ปลอดภัย"

 enclave.235.1.desc:0 "ด้วย เงิน เหล่า นี้ เรา สามารถ ขยาย งาน ของ เรา ได้ มาก ที เดียว. มีเรือมากขึ้น บุคลากรมากขึ้น อาคารฝึกหัดขนาดใหญ่และดีกว่า เรา จะ สามารถ ทํา มาก กว่า นี้ เพื่อ รักษา สันติ สุข."
 enclave.235.2.desc:0 "ในกาแล็กซี่ที่เปลี่ยนแปลงเสมอและซับซ้อน ความกังวลด้านความปลอดภัยนั้นสําคัญที่สุด การบริจาคของคุณ จะช่วยให้เราขยายกิจการและบริการของเรา"
 enclave.235.3.desc:0 "ลอง นึก ดู:[mercenary_enclave_country.GetName]ส่งไปทั่วกาแล็กซี่เพื่อปฏิบัติการพลเรือนและทหาร ระดับความปลอดภัยที่ไม่เคยมีมาก่อนสําหรับทุกคน"
 enclave.235.4.desc:1 "เมื่อเราเริ่มต้นนี้หนึ่งในผู้ก่อตั้งของเรามีความฝันที่จะทําเพื่อความมั่นคงของกาแล็กซี่ สิ่งที่เมกะคอมป์ได้ทําเพื่อความไม่เสมอภาค ปัจจุบัน ผม รู้สึก ตื่น เต้น ที่ จะ บอก ว่า เป้า หมาย นี้ อยู่ ใน ขอบ เขต ที่ เรา จะ บรรลุ ได้."
 enclave.235.5.desc:0 "*เพลง* เครดิตจะไหล ในที่สุดพลเรือนจะได้มีความสุข กับความมั่นคงที่พวกเขาสมควรได้รับ ชาติจะต่อสู้เพื่อสัญญาของเรา โอ้ใบหน้าของผู้ถือหุ้นของเรา เมื่อฉันบอกพวกเขาข่าว!"

 enclave.240.desc:0 "ใช่ นี่คือเวลาสําหรับทุกคน ทีมแก้ปัญหาเชิงยุทธศาสตร์ของเรา มีเข็มทิศศีลธรรมมั่นคง และอุทิศตนอย่างไม่จํากัด เพื่อสร้างดาราจักรที่ปลอดภัยกว่า เราเสี่ยงมากที่จะจับตาดู การปรากฏตัวของอันตรายใหม่ๆ และสามารถให้ข้อมูลที่ใช้งานได้เกี่ยวกับ..."
 enclave.240.a:0 "เดอะ เกรท ข่าน"
 enclave.240.b:0 "น้ํา ฟ้า"
 enclave.240.c:0 "ส วอร์ม"
 enclave.240.d:0 "เครื่อง บิน พิเศษ"
 enclave.240.e:0 "เครื่อง ช่วย จํา"
 enclave.240.f:0 "เซตานา"

 enclave.245.desc:0 "เรือของข่าน นําเสนอองค์ประกอบโดยรวม โดยไม่มีจุดอ่อนชัดเจน นักวิเคราะห์ของเราแนะนําว่า ตอร์ปิโดอาจจะทํางานได้ดี ในการโค่นเรือของพวกเขา แต่ระวังการป้องกันพิเศษ การผสมทั้งโล่และเกราะ อาจจะเป็นการเดิมพันที่ดีที่สุด ที่จะทําให้เรือของคุณมีชีวิตอยู่ ข่านได้พิสูจน์แล้วว่า เป็นผู้บัญชาการที่มีความสามารถสูง และประเมินค่าต่ําไป จะเป็นความผิดพลาดที่น่ากลัว พิจารณาการกลับมาของพวกเขาเป็นภัยร้ายแรง"
 enclave.250.desc:0 "น้ํา ฟ้าพึ่งพาอาวุธสองชนิดที่เสริมสร้าง: คานพลังงานและเครื่องมือโจมตี ฝ่ายก่อนนั้นถือโล่ทับ แต่โล่ข้ามด้วยการตีของเขา การคาดการณ์ของเราแสดงให้เห็นว่าเรือที่ติดตั้งด้วยจุดการป้องกัน นอกจากโล่มีโอกาสมากขึ้นที่จะอยู่รอดการ หมั้น แต่ ตอร์ปิโด อาจ ช่วย ให้ ป้องกัน เรือ ได้."
 enclave.255.desc:0 "กอง เรือ ที่ มี ความ สําคัญ ยิ่ง ต้อง อาศัย ลูก ระเบิด ที่ เคลื่อน ไหว ช้า และ กอง เรือ เล็ก ๆ เพื่อ กําจัด ศัตรู. ทางเลือกหนึ่งในการป้องกันพวกเขาออกคือการใช้จุดการป้องกัน คู่กับชุดเกราะและการปรับปรุง เพื่อหดยานของยานของคุณ; อื่น ๆ คือการตีพวกเขาในระยะสุดขั้ว ด้วย อาวุธ พลัง งาน ที่ มี พลัง มาก พอ คน เรา อาจ ทําลาย กอง เรือ ของ ตน ก่อน ที่ จะ สามารถ เข้า ไป ใน ระยะ ห่าง ได้."
 enclave.260.desc:0 "การพึ่งพาพลังงานเฉพาะของยูนิเดน ทําให้เรามีความอ่อนแอในการหาประโยชน์ อาวุธที่ทําให้เกิดความเสียหายต่อเกราะป้องกันของพวกเขา ควรจะก่อให้เกิดความเสียหายอย่างร้ายแรง แต่ถ้าคุณใส่อาวุธที่ข้ามเกราะไปได้อย่างสมบูรณ์ เพื่อป้องกัน การนําเกราะป้องกัน มาสู้อย่างเพียงพอ"
 enclave.265.desc:0 "ยานสื่อสารเฉพาะใช้อาวุธพลังงาน เช่นนั้น ควรใช้โล่เพื่อลดความเสียหายที่เข้ามา ตัวจําลองชี้ว่า ทั้งที่มีการป้องกันที่แข็งแกร่ง เรือของพวกมันค่อนข้างเปราะบาง นักวิเคราะห์ของเราประมาณการว่า อาวุธที่เจาะผ่าน อาจทําหน้าที่ได้อย่างดีกับพวกมัน"
 enclave.266.desc: "เรือของเซทาน่าอาศัยระยะยาว อาวุธที่เสียหายสูงและเกราะที่แข็งแรง พวก เขา เชี่ยวชาญ ใน การ กําจัด เป้า หมาย ขนาด ใหญ่ และ คุณ ควร จะ ก่อกวน พวก เขา ด้วย ยาน ที่ เล็ก กว่า. ตอร์ปิโด หรือ อาวุธ พลัง งาน ควร ทํา การ ต่อ สู้ กับ กอง เรือ ของ เธอ อย่าง เพียง พอ และ การ ป้องกัน เรือ ของ คุณ อาจ ช่วย ให้ มัน อยู่ รอด ต่อ ไป อีก หน่อย."

 enclave.270.desc:0 "กําลังมองหาความสงบในอาณานิคม หรือพวกก่อการร้าย? บริการสนับสนุนดาวเคราะห์ของเรา นําเสนอบริษัทของมืออาชีพที่ ผ่านการฝึกอบรม พร้อมจะทํางานในความท้าทาย และสภาพแวดล้อมที่มีความเสี่ยงสูง"
 enclave.270.a:0 "ทหารรับจ้างน้อย"
 small_merc_army_hire:0 "ทหารรับจ้างพวกนี้ถูกจ้างมาอย่างไม่สิ้นสุด แต่มีคนคุ้มกันสูง พลังนี้รวมถึง§Y5 กองทัพ เม อร์เค เตอร์§! "
 enclave.270.b:0 "พลังเล็กๆของทหารรับจ้าง"
 small_mecha_merc_army_hire:0 "ทหารรับจ้างพวกนี้ถูกจ้างมาอย่างไม่สิ้นสุด แต่มีคนคุ้มกันสูง พลังนี้รวมถึง§Y5 กองทัพ เม อร์เค เตอร์§! "
 enclave.270.c:0 "ทหารรับจ้างขนาดใหญ่"
 medium_merc_army_hire:0 "ทหารรับจ้างพวกนี้ถูกจ้างมาอย่างไม่สิ้นสุด แต่มีคนคุ้มกันสูง พลังนี้รวมถึง§Y10 กองทัพ เม อร์เค เตอร์§! "
 enclave.270.d:0 "กลุ่มมือปราบของเหล่าทหารรับจ้าง"
 medium_mecha_merc_army_hire:0 "ทหารรับจ้างพวกนี้ถูกจ้างมาอย่างไม่สิ้นสุด แต่มีคนคุ้มกันสูง พลังนี้รวมถึง§Y10 กองทัพ เม อร์เค เตอร์§! "
 enclave.270.e:0 "กองทหารรับจ้างขนาดใหญ่"
 large_merc_army_hire:0 "ทหารรับจ้างพวกนี้ถูกจ้างมาอย่างไม่สิ้นสุด แต่มีคนคุ้มกันสูง พลังนี้รวมถึง§Y15 กองทัพ เม อร์เค เตอร์§! "

 enclave.280.a.desc:1 "ผู้อุปถัมภ์! สิ่งที่ธุรกิจนําคุณมาหาเราในวันนี้? คุณเห็นแผนผังเรือล่าสุดของเราไหม พวกเขาจะเป็นแกนหลักของข้อเสนอ 'ความมั่นคงภายใน' ใหม่ของเรา สําหรับลูกค้าพลเรือน"
 enclave.280.b.desc:0 "ยินดี ต้อนรับ คุณ จริง ๆ! เราได้เตรียมเครื่องดื่มไว้ เผื่อคุณจะช่วยทดลองมัน ตอนที่เราเรียกคณะกรรมการ ถ้าคุณมุ่งความสนใจไปที่หน้าต่าง คุณจะเห็นการแบ่งกลุ่มเพื่อรักษาสันติภาพของเรา มีส่วนร่วมในการประลอง การฝึกเลียนแบบเป็นตัวแทนของพลเรือน จง สังเกต ว่า พวก เขา จับ ปลา และ จัด การ อย่าง มี ประสิทธิภาพ เพียง ไร. ความ แม่นยํา ทาง ทหาร ที่ น่า ทึ่ง."
 enclave.280.c.desc:0 "เรายินดีเสมอที่ได้พบผู้อุปถัมภ์ของเรา มั่นใจได้เลยว่า การจัดส่งสินค้าครั้งต่อไป จะไปถึงคุณในไม่ช้า คุณ อยาก จะ บอก เรา ไหม ว่า คุณ คิด อย่าง ไร เกี่ยว กับ งาน รับ ใช้ ใหม่ ๆ ของ เรา ซึ่ง มี ผล กระทบ อย่าง มาก ต่อ การ คุ้มครอง? เราคิดว่าลูกค้าพลเรือนของเราจะรักมัน!"
 enclave.280.b:1 "เราอยากให้คุณ§Yจดจํา§!กองเรือของท่าน"
 enclave.280.c:0 "เรามีแนวโน้มที่จะแบ่งปัน§Yเทคโนโลยี§!กับคุณ"
 enclave.280.c.timeout:0 "เครื่องราชอิสริยาภรณ์ยังคงยกระดับ เทคโนโลยีของเรา เราสามารถแบ่งปันเทคโนโลยีใหม่ๆกับพวกเขาได้§Y[event_target:mercenary_enclave_country.updating_databanks_timer]§!."
 enclave.285.desc:2 "คุณคงเข้าใจว่าการระลึกถึงกองเรือ เป็นเรื่องละเอียดอ่อน แน่นอนเราได้เตรียมช่องโหว่ที่จําเป็น ในสัญญามาตรฐานทั้งหมดของเรา แต่เราต้องอย่างน้อยหกเดือน เพื่อนํากองเรือกลับมา\n\nเราเชื่อว่าการปฏิบัติครั้งนี้ ไม่ได้เป็นผลดีต่อองค์กรของเรา แต่คุณเป็นผู้อุปถัมภ์ของเรา"
 enclave.285.tooltip:0 "นี้จะไม่พอใจเอนคลาฟ"
 enclave.290.name:1 "ผู้ใช้คําสั่งกองยานมาถึง"
 enclave.290.desc:1 "เครื่อง หอมกองยานเราบัญชาการจากผู้บังคับการของเรา กําลังรอคําสั่ง"
 enclave.294.name:1 "การลงมติ"
 enclave.294.desc:1 "ลูกค้าที่รัก\n\nตามข้อตกลงโดยมาตรา285b.15ของสัญญาของเรา เราต้องเสียใจที่นําข้อตกลงของเราไปยังการปิดต้นและ ระลึกเม อร์เค เตอร์กองยานที่คุณเช่าจากพวกเรา ตามเงื่อนไขสัญญาต่อครั้ง ข้อเตือนนี้ทําหน้าที่เป็นคําเตือน 3 เดือนของคุณ ก่อนที่กองเรือจะต้องออกจากบริการของคุณ แท้จริง เราได้ให้ความพอเพียงแก่เจ้าแล้ว\n\nเราขออภัยในความไม่สะดวก และขอให้ท่านโชคดีในอนาคต"
 enclave.294.b:1 "เราต้องการยานพวกนั้น!"

 enclave.2030.desc:1 "การสนับสนุนของเราอยู่ที่นั่น เพื่อช่วยให้คุณใช้กองเรือของคุณ ไปถึงที่สุด ของกาแล็คซี่ ผู้เชี่ยวชาญที่ทุ่มเทของเรา จะทําให้แน่ใจว่าเรือของคุณ มีทุกสิ่งที่พวกเขาต้องการ จากกระสุนเป็นอาหาร นอก จาก นี้ เรา จะ ตั้ง คลัง เสบียง ไว้ หน้า กอง เรือ หรือ โบรกเกอร์ ให้ สัญญา กับ บริษัท พลเรือน ใน ท้อง ถิ่น. เรือของเจ้าควรได้รับการดูแลอย่างดี และเรามาที่นี่เพื่อจัดเตรียมมัน"
 enclave.2035.name:0 "การสิ้นสุดข้อตกลงการรองรับปูมบันทึก"
 enclave.2035.desc:1 "ลูกค้าที่รัก\n\nการสนับสนุนจากระบบล็อกติก เราให้คุณเนื่องจากต้องปรับปรุงใหม่ ตามเงื่อนไขในสัญญาของเรา: ถ้าเราไม่ได้รับคําสั่งทันทีที่จะทํา มิฉะนั้นคุณจะถูกเรียกเก็บเงินโดยอัตโนมัติ สําหรับการบูรณะบริการนี้\n\nเรา มั่น ใจ ว่า คุณ ได้ รับ ความ พอ ใจ และ คอย ท่า ที่ จะ ทํา ธุรกิจ กับ คุณ มาก ขึ้น!"
 enclave.2035.a:0 "เราไม่ต้องการบริการตอนนี้"
 enclave.2060.name:0 "กองยานสัญญาสิ้นสุดแล้ว"
 enclave.2060.desc:0 "สัญญาของเรากับ[event_target:mercenary_enclave_country.GetName]ได้สิ้นสุดและกองทัพเรือของพวกเขากําลังจะออก เราควรติดต่อพวกเขาเพื่อต่อสัญญาไหม"
 enclave.2060.a:0 "ไม่ใช่ในเวลานี้"
 enclave.2060.b:0 "ใช่ เปิดการสื่อสาร"

