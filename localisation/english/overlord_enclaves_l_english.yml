 leader_trait_scientist_mind_wipe_02:0 "นักวิทยาศาสตร"
 leader_trait_scientist_mind_wipe_02_desc:0 "$shroud_touched_intro$ตอนนี้จิตใจนักวิทยาศาสตร์นี้ หมุนรอบด้วยความคิดใหม่ๆ ที่จะช่วยงานวิจัยทางโบราณคดี"
 leader_trait_general_mind_wipe_01:0 "ผู้บังคับการการสี่เหลี่ยม"
 leader_trait_general_mind_wipe_01_desc:0 "$shroud_touched_intro$ความคิดของผู้บัญชาการนี้ ตอนนี้หมุนด้วยความคิดใหม่ ที่จะเพิ่มความจุของกองทัพของเรา"
 leader_trait_general_mind_wipe_02:0 "ผู้บังคับการการสี่เหลี่ยม"
 leader_trait_general_mind_wipe_02_desc:0 "$shroud_touched_intro$ความคิดของผู้บัญชาการนี้ ตอนนี้หมุนด้วยความคิดใหม่ เพื่อเพิ่มประสิทธิภาพของกองทัพของเรา"
 leader_trait_ruler_mind_wipe_01:1 "สถาปัตยกรรมแบบพับเก็บ"
 leader_trait_ruler_mind_wipe_01_desc:0 "$shroud_touched_intro$ตอนนี้ความคิดของผู้นํานี้ วนเวียนอยู่กับความคิดใหม่ๆ ที่จะช่วยงานก่อสร้าง"
 leader_trait_ruler_mind_wipe_02:1 "ภาษาปูมบันทึกแบบชรูฟชื่อ"
 leader_trait_ruler_mind_wipe_02_desc:0 "$shroud_touched_intro$ความคิดของผู้นําตอนนี้หมุน กับความคิดใหม่ที่จะส่งเสริมประสิทธิภาพของกองเรือ"

 #Gestalt Traits
 gestalt_trait_commander_mind_wipe_01:0 "หัว เรือ"
 gestalt_trait_commander_mind_wipe_01_desc:0 "$shroud_touched_intro$โดรนตัวนี้สามารถเพิ่มประสิทธิภาพของยานได้"
