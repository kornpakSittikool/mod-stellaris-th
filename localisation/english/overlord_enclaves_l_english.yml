 enclave.2000.name:1 "เดอะ[mercenary_enclave_country.GetName]ค่าเศษทศนิยม"
 enclave.2000.desc:1 "องครักษ์ผู้แทนราษฎร สัญญาของเรา เพิ่งออกผล เราได้ขยายกิจการพลเรือนของเรา และหลายบริษัทได้จ้างเรา สําหรับบริการด้านความมั่นคงและสันติภาพ ขณะที่ในสัญญา คนของเรามีโอกาส กับบางงานวิจัยที่มีคุณค่าทางวิทยาศาสตร์ คุณ จะ พบ ว่า มัน ติด อยู่ กับ ผล ผลิต ที่ คุณ ได้ รับ เป็น ประจํา."
 enclave.2005.desc:1 "ทําเสร็จแล้วบริษัทกําลังทําดี และรายได้ของเรากําลังเพิ่มขึ้นอย่างต่อเนื่อง นี่คือผลงานของคุณ พร้อมกับการส่งมอบทรัพยากร ที่เราได้จากลูกค้าพลเรือน"
 enclave.2010.desc:1 "ผู้รักษากฎหมาย เรายินดีที่จะประกาศผลกําไรในช่วงนี้ ดังนั้น เราจึงได้เพิ่มโบนัส ให้เงินบริจาคของคุณ"
 enclave.2015.desc:1 "องครักษ์ผู้น่าเกรงขาม อู่เรือของเรา ทํางานอย่างไม่สิ้นสุด เพื่อผลิตกองเรือที่ดีที่สุดเท่าที่จะทําได้ นอกจากเงินบริจาคของท่านแล้ว เรายินดีที่จะเสนอ ผลงานล่าสุดล่าสุดของท่าน ให้ เรา รู้ ว่า คุณ คิด อย่าง ไร กับ พวก เขา!"
 enclave.2020.desc:1 "องครักษ์ผู้มีชื่อเสียง ปฏิบัติการรักษาความสงบล่าสุดของเรา มีเรายกเลิกการดําเนินงานหลายโจรสลัด และเราค้นพบ ส่วนใหญ่ของเหล่านี้ได้ถูกวางแยกสําหรับคุณ นอกเหนือจากการจัดหาของคุณดี"
 enclave.2025.desc:1 "องครักษ์ผู้มีชื่อเสียง บริษัทกําลังผ่านช่วงเวลาที่ยากลําบาก เรา สูญ เสีย ลูก ค้า ที่ เป็น พลเรือน หลาย คน และ การ ผ่าตัด อื่น ๆ อีก หลาย ราย ของ เรา จบ ลง ด้วย ความ ล้ม เหลว อัน แสน เข็ญ. เรากําลังวางแผนปรับปรุงใหม่ ที่จะลดค่าใช้จ่ายในคณะกรรมการ และเราจะปล่อยให้พนักงานบางส่วนไป\n\nมั่นใจได้ว่าเราทํางานหนัก เพื่อนําผลประโยชน์มาให้ และโชคร้ายนี้เป็นเพียงชั่วคราว"
 enclave.2025.a:0 "ผิดหวัง"
 enclave.2025.b:0 "คุณถูกไล่ออก ดูคณะกรรมการเกี่ยวกับข้อตกลงของคุณ"
 enclave.2025.c:0 "ให้เราช่วยแทนเถอะ"
 enclave.2040.desc:0 "คุณอยากแบ่งปันเทคโนโลยีของคุณ? ความเชื่อใจของท่านที่มีต่อเรา ถือเป็นเกียรติยิ่ง ท่านผู้อุปถัมภ์ ขณะที่แผนกวิจัยของเรา มีหน้าที่รักษาเรา ให้ตกเลือดจากการวิจัย และ ความ รู้ ใด ๆ ที่ คุณ มี ร่วม กับ เรา จะ ถูก นํา มา ใช้ พัฒนา กิจกรรม ของ เรา ใน แบบ ที่ มี จริยธรรม มาก ที่ สุด!"
 enclave.2040.a.tt:0 "เราจะร่วมแบ่งปัน§Yเทคโนโลยี§!กับเครื่องดูดฝุ่น ทําแบบนี้ได้ครั้งเดียว§Y10 ปี§!."
 merc_enclave_grants_ships:0 "§Y[mercenary_enclave_country]§!แล้วจะให้§Gกอง เรือ รบ เล็ก ๆ§!"

 enclave.2050.name:0 "สัญญา ที่ เรา ไม่ ควร ปฏิเสธ"
 enclave.2050.desc:0 "เราได้รับสัญญาณด่วนจาก[mercenary_enclave_country.GetName]พวกเขาบอกว่า[khan_country.GetName]ให้พวกเขาข้อเสนอที่พวกเขาไม่สามารถปฏิเสธ วิธี เดียว ที่ พวก เขา จะ พ้น จาก การ ตก งาน ก็ คือ ต้อง หา งาน ทํา ที่ อื่น ภาย ใน สอง เดือน. ถ้าไม่มีใครจ้างพวกเขา พวกเขาจะเข้ารับใช้ข่าน และไม่มีทางเลือก นอกจากทําสงครามทั้งหมดกับเรา"
 enclave.2050.a:0 "ติดต่อ[mercenary_enclave_country.GetName]."
 enclave.2050.a.tt:0 "เรามี£time£ §Y60 วัน§!เพื่อตัดสินใจว่าเราจะจ้างพวกเขาหรือไม่"
 enclave.2050.b:0 "เราไม่มีเงินจ่ายตอนนี้ ไว้ทีหลังแล้วกัน"
 enclave.2050.b.tt:0 "เรามี£time£ §Y7 วัน§!เพื่อตัดสินใจว่าเราจะจ้างพวกเขาหรือไม่"
 enclave.2050.c:0 "คนทรยศ! ความ โลภ จะ เป็น ความ หายนะ ของ พวก เขา."

 # Salvager Enclaves
 enclave.305.name:0 "[salvager_enclave_country.GetName]"
 enclave.305.a.desc:0 "ยินดีที่ได้รู้จัก ในนามของ[salvager_enclave_country.GetName]ขอต้อนรับสู่เวิร์คเวิร์คเวิร์คเวิร์คที่ต่ําต้อย ระหว่างดวงดาว\n\nพูด... ฉันจํารอยคีลได้ทุกที่ งานดีๆ เราสร้างนิสัยให้สอดคล้องกับสิ่งที่บินอยู่ในกาแล็กซี พยายามตามแนวโน้มท้องถิ่นต่อไป แต่ผมอยู่ที่ไหน... ?\n\nอ้าใช่: ยินดีต้อนรับ! เราจะทําให้การฟื้นฟูและฟื้นฟูของคุณง่ายขึ้นได้อย่างไร"
 enclave.305.b.desc:0 "สวัสดี สวัสดี ในนามของ[salvager_enclave_country.GetName]ยินดีต้อนรับสู่สวนของเรา(เสียงเป่า)ไดรฟ์, พิมพ์เขียว, เหมาะ: เราบรรจุมันทั้งหมด\n\nข้าไม่ได้ล้อเล่นนะ เจ้าคงประหลาดใจ ว่าผู้คนจะออกจากเรือเก่าของพวกเขา เมื่อเร็ว ๆ นี้ฉันวาง[salvager_enclave_country.species.GetHandNamePlural]กับทั้งหน่วยอาร์ลีย์หล่อในทอง ป่าเถื่อน\n\nอย่างไรก็ตาม เราจะทําให้การฟื้นฟูและฟื้นฟูของคุณง่ายขึ้นได้อย่างไร"
 enclave.305.c.desc:0 "ยาดับกลิ่น! ในนามของ[salvager_enclave_country.GetName]ขอต้อนรับสู่เวิร์คช็อปและเศษเหล็ก รถไฟ ของ วิศวกร ที่ อุทิศ ตัว ยืน อยู่ พร้อม ที่ จะ ซ่อมแซม, สร้าง ใหม่, และ รื้อ ทําลาย ทุก สิ่ง ที่ พวก เขา สามารถ ติด เครื่อง มือ ได้. คุณจะพบว่าความหลงใหลในการค้าของเรา ค่อนข้างไม่รู้จักพอ\n\nเราจะทําให้การฟื้นฟูและฟื้นฟูของคุณ ง่ายขึ้นได้อย่างไรในวันนี้"
 enclave.305.desc.scavenger_first:0 "ยินดีต้อนรับ! ฉันดีใจจริงๆที่ได้พบเพื่อนนักสะสม กาแลคซีสามารถเป็นสถานที่โดดเดี่ยวสําหรับคนอย่างพวกเรา\n\nคุณจะรู้ว่าเจาะ - เรารวบรวมชิ้นส่วนเก่าที่ไม่มีใคร เห็นการใช้งานใด ๆ และหายใจชีวิตใหม่เข้าไปในพวกเขา ถ้ามีอะไรที่เธอไม่สามารถเอา[Root.GetSpeciesHandNamePlural]บนส่วนที่เหลือมั่นใจเราจะได้รับมัน\n\nอย่างไรก็ตาม เราจะทําให้การฟื้นฟูและฟื้นฟูของคุณง่ายขึ้นได้อย่างไร"
 enclave.305.desc.scavenger_followup:0 "สวัสดี! คุณเบื่อที่จะบริหารจักรวรรดิหรือยัง คุณสามารถเข้าร่วมกับเราในธุรกิจที่รื้อถอน - มันมากเครียดน้อยลงและเห็นได้ชัดคุณมีความสามารถพิเศษสําหรับมัน"
 enclave.305.n.desc:0 "สวัสดีอีกครั้ง! เวลายุ่ง, สิ่งนี้ ฉันเชื่อว่าธุรกิจของจักรวรรดิของคุณ จะดําเนินไปอย่างราบรื่น? ฉันกล้าพูดเลยว่า เราทุกคนก็แย่เหมือนเดิม ว่าง[salvager_enclave_country.species.GetHandNamePlural]ทํางานอย่างรวดเร็วของเรืออาณานิคมเก่า ..."
 enclave.305.o.desc:0 "สวัสดี! และวันนี้เราจะให้บริการ วิศวกรรมของคุณอย่างไร\n\nอืม ชิ้นส่วนเรือที่คุณใส่อยู่ มันทํางานยังไงกับคุณ"
 enclave.305.p.desc:0 "ยินดีต้อนรับกลับมา! และเฮ้ รับโหลดของเหล่านั้นเรียบลายเซ็นไดรฟ์ใหม่! ผมหวังว่าพวกเรากําลังจัดการ ที่จะแบ่งปันอิทธิพลเล็กๆ น้อยๆ ในแง่บวก ในวิธีที่คุณรักษาเรือของคุณ พวกเขาจะขอขอบคุณ\n\nเรา จะ รับ ใช้ ได้ อย่าง ไร?"
 enclave.305.q.desc:0 "สวัสดี! อย่าถือสาฉัน... แค่มาป่วนที่นี่ อุปกรณ์ที่น่าตื่นตาตื่นใจเหล่านี้ มันเป็นโครงการสัตว์เลี้ยงของผม เพื่อดูว่ามันสามารถสร้างโฮโลแกรมได้มากแค่ไหน ไม่เป็นครึ่งหนึ่งที่ยาก เมื่อคุณคานหนึ่งออกไปในพื้นที่เห็น\n\nอา แต่ผมสามารถฝึกได้นาน เรา จะ รับ ใช้ ได้ อย่าง ไร?"
 enclave.305.organic.desc:0 "ดีใจที่ได้เจอคุณอีก อย่าสนใจเสียงกรีดและเสียงคร่ําครวญ เรามี เอ่อ... แขก, ตอนนี้! มันออกจะใหญ่หน่อย มีแนวโน้มจะ... หิว และน้อยที่น่าแปลกใจในอัตรา พวกเขากําลังเติบโตเหล่านั้น ธงเซลล่า!\n\nอะแฮ่ม ขอโทษนะ เราจะช่วยคุณได้ยังไง?"
 enclave.305.desc.hostile:0 "เราเคยเจอกันมาก่อน...\n\nเราไม่มีอะไรจะพูดกับคุณ หรือบริการใดๆทั้งสิ้น กรุณาไปตามทางของคุณ"
 enclave.305.a:0 "เราต้องการที่จะ §Yแยกชิ้นส่วนกองยาน§!"
 enclave.305.b:0 "คุณมี §Yยานที่นำกลับมาใช้ใหม่§! อะไรบ้าง?"
 enclave.305.c:0 "บอกเราเกี่ยวกับสิ่งปลูกสร้าง §Yงานซาลวาจ§!"
 enclave.305.d:0 "คุณสามารถช่วยเราเรื่องการ §Yการก่อสร้าง§! ได้ไหม?"
 enclave.305.e:0 "เราต้องการให้คุณแยกชิ้นส่วน §Yเศษซาก§!"
 enclave.305.f:1 "คุณสามารถช่วยเราเรื่อง §Yงานวิจัยด้านวิศวกรรม§! ได้หรือไม่?"
 enclave.305.g:1 "เราต้องการจ้าง §Y$master_salvager$§!"

 enclave.310.desc:1 "ผู้โดยสาร! ยินดีเป็นอย่างยิ่ง ที่ได้ถอดนั่นออกจากมือคุณ\n\nตามที่สแกนเนอร์ของเรา มีกองเรือในระยะนี้ คุณจะพบว่าการประมาณของเราแนบ ตอนนี้ทางเลือกเป็นของคุณ!\n\n$enclave.310.instructions$"
 enclave.310.organic.desc:0 "ผู้โดยสาร! มันจะเป็นความสุขของเราที่จะ ... โดยดวงดาว มันคืออะไร? คุณเรียกมันว่าร่างทรงเหรอ ผมหมายถึง ผมเห็นว่ามัน... ว้าว มันดูใจร้าย ได้โปรด อย่าทําอะไรรีบร้อน เราจะยึดยานจากมือนายด้วย แต่เกรงว่า§Hเราต้องคิดค่าปรับ§!.\n\nตามที่สแกนเนอร์ของเรา มีกองเรือในระยะนี้ คุณจะพบว่าการประมาณของเราแนบ ตอนนี้ทางเลือกเป็นของคุณ!\n\n$enclave.310.instructions$"
 enclave.310.nofleet.desc:1 "แน่นอน! บริการของเราเป็นตรงไปตรงมา นํากองเรือในที่นี่§H[salvager_enclave_system.GetName]§!และให้เราลูกเห็บ เมื่อเราตรวจสอบความเป็นเจ้าของ เราสามารถให้รายการของการประเมิน เราจะยึดทรัพย์สิน และวัสดุที่ยึดมาได้ของคุณ จะอยู่กับคุณในไม่ช้า\n\nโอ้, แล้วก็ ห้ามทิ้งสินค้าของคนอื่น! เรา ไม่ ต้องการ ทน ทุกข์ ผ่าน ความ ขัด แย้ง ที่ อาจ ทํา ให้ เกิด ขึ้น ได้ อย่าง น้อย ก็ อีก...\n\n$enclave.310.instructions$"
 enclave.310.instructions:0 "§Eเราสามารถประเมินราคาและแยกทำลายยานของเราได้หากเราส่งมันไปที่ฐานทัพดาวของนักกู้ซากใน§! §Eระบบดาว§! §H[salvager_enclave_system.GetName]§!"
 enclave.310.a:0 "นั่นเป็นเรื่องดีที่ได้รู้ เกี่ยวกับบริการอื่นๆ ของคุณ..."
 enclave.310.b:0 "ทําลาย§H[scrappable_fleet_1.GetName]§!."
 enclave.310.c:0 "ทําลาย§H[scrappable_fleet_2.GetName]§!."
 enclave.310.d:0 "ทําลาย§H[scrappable_fleet_3.GetName]§!."
 enclave.310.e:0 "ทําลาย§H[scrappable_fleet_4.GetName]§!."
 enclave.310.organic_penalty.tt:0 "£energy£$@ScrapOrganicCost|Y$ (§Rค่าทําความสะอาด§!)\n\n"
 enclave.310.tt:1 "เราจะได้รับ:"
 enclave.315.desc:0 "ขอบคุณ! วัสดุที่กู้กลับมา จะอยู่กับคุณในไม่ช้า"

 enclave.320.desc:0 "สุดยอด! เมื่อเรือที่พังเข้ามาทางเรา เราทํางานหนักเพื่อฟื้นฟูชีวิตการทํางาน ตอนนี้เรามีประเภทต่อไปนี้พร้อมใช้งาน\n\nรู้ไว้นะว่าเรือทุกลําที่เรายึดมาได้ ถูกขายภายใต้§Hดู รู เซิล§!เรามั่นใจว่าเรือเหล่านี้จะวิ่งได้ราบรื่นมากขึ้นตอนนี้ กว่ากลับเมื่อพวกเขาเป็นอู่เรือใหม่!\n\nแค่จําไว้ว่า การฟื้นฟูสภาพเป็นกระบวนการใช้เวลา เราไม่สามารถจัดฝูงบินทั้งหมดให้คุณได้ โดยไม่จําเป็นต้องซ่อมใหม่ หลังจากนั้น ดังนั้นคุณอาจต้องตรวจสอบกลับไปกับเราในอนาคต"
 enclave.320.timeout.desc:1 "เมื่อใดก็ตามที่เรือแตกมาทางเรา เราทํางานหนักเพื่อฟื้นฟูชีวิตการทํางาน แต่น่าเสียดายที่มันปรากฏ§Yท่าเรือของเราว่างเปล่า§!ในขณะนี้!\n\nได้โปรดกลับมาทีหลัง แล้วเราจะดูว่า เราช่วยอะไรคุณได้ ปกติมันจะพาเราไปรอบ ๆ§H2 ปี§!เพื่อให้ความคุ้นเคยแก่เขา"
 enclave.320.b:0 "$CORVETTE$ ที่ถูกนำกลับมาใช้ใหม่"
 enclave.320.b.tt:0 "ซื้อ $CORVETTE$ ที่เคยใช้โดย §Y[salvager_reclaimed_corvette_country.GetName]§!"
 enclave.320.bb:0 "ฝูง $CORVETTE$ ที่ถูกนำกลับมาใช้ใหม่"
 enclave.320.bb.tt:1 "ซื้อกองยานขนาดเล็ก 10 $corvette_plural$ ที่เคยใช้โดย §Y[salvager_reclaimed_corvette_country.GetName]§!\n\nยานลำนี้จะครอบครองโดยนักกู้ซากเป็นเวลาหนึ่งช่วงและเราจะไม่สามารถซื้อยานลำอื่นที่ถูกกู้คืนได้เป็นเวลา §H2 ปี§!\n\n"
 enclave.320.c:0 "$DESTROYER$ ที่ถูกนำกลับมาใช้ใหม่"
 enclave.320.c.tt:0 "ซื้อ $DESTROYER$ ที่เคยใช้โดย §Y[salvager_reclaimed_destroyer_country.GetName]§!"
 enclave.320.c.timeout:0 "อีก$DESTROYER$จะมีการซื้อภายหลัง§Y[root.salvager_destroyer_timer]§!."
 enclave.320.d:0 "$CRUISER$ ที่ถูกนำกลับมาใช้ใหม่"
 enclave.320.d.tt:0 "ซื้อ $CRUISER$ ที่เคยใช้โดย §Y[salvager_reclaimed_cruiser_country.GetName]§!"
 enclave.320.d.timeout:0 "อีก$CRUISER$จะมีการซื้อภายหลัง§Y[root.salvager_cruiser_timer]§!."
 enclave.320.e:0 "$BATTLESHIP$ ที่ถูกนำกลับมาใช้ใหม่"
 enclave.320.e.tt:0 "ซื้อ $BATTLESHIP$ ที่เคยใช้โดย §Y[salvager_reclaimed_battleship_country.GetName]§!"
 enclave.320.e.timeout:0 "อีก$BATTLESHIP$จะมีการซื้อภายหลัง§Y[root.salvager_battleship_timer]§!."
 enclave.320.frigate: "อ้าง$frigate$."
 enclave.320.frigate.tt: "ซื้อ$frigate$ของการออกแบบที่เคยใช้โดย§Y[salvager_reclaimed_frigate_country.GetName]§!."
 enclave.320.frigate_bulk: "อ้าง$frigate$ฝูงบิน"
 enclave.320.frigate_bulk.tt: "ซื้อ กอง เรือ เล็ก ๆ จํานวน 10 กอง$frigate_plural$ของการออกแบบที่เคยใช้โดย§Y[salvager_reclaimed_frigate_country.GetName]§!.\n\nนี่ จะ เป็น การ ครอบ ครอง หมู่ เกาะ ซัลวา เกอร์ ชั่ว ระยะ หนึ่ง; เรา จะ ไม่ สามารถ ซื้อ เรือ ลํา อื่น ๆ ที่ ได้ รับ การ กู้ คืน มา ได้ อีก§H2 ปี§!.\n\n"

 enclave.325.desc:0 "ขอบคุณครับ"

 enclave.330.desc:0 "แน่นอน! คุณให้เรามีพื้นที่ในการทํางาน และกลไกของเราสามารถติดตามอย่างรวดเร็ว ซ่อมเรือท้องถิ่นของคุณในเวลาไม่นาน\n\nเราจะแก้ไขคุณขึ้นกับสิ่งที่คุณต้องติดโมดูลการทํางานซาลวาจบน§Yพื้นฐานดาวอยู่ติดกัน§!คุณอาจจะจําเป็นต้องเลื่อนรอบหัวหรือสอง แต่เมื่อวิศวกรของเรามีสถานที่ที่จะตั้งร้านค้า เรือของคุณจะบินขวาผ่านอ่าวซ่อมแซมเหล่านั้น! เราสามารถช่วยงานก่อสร้าง ของพวกคุณได้ตลอดเวลา\n\nดังนั้น วิธีการเกี่ยวกับ: ทํา§Hงานซาลวาจ§!เอาแฟนซีของคุณ?"
 enclave.330.lowopinion.desc:0 "แน่นอน! เราขยายโอกาสพิเศษ ให้ลูกค้าที่ไว้ใจที่สุดของเรา พูดสั้นๆคือ คุณให้พื้นที่เรา ทํางานบนฐานดาวที่นี่[salvager_enclave_system.GetName]และกลไกของเราสามารถติดตามอย่างรวดเร็ว ซ่อมเรือท้องถิ่นของคุณ เราสามารถช่วยเรื่องฐานดาวและอู่ต่อเรือของคุณได้\n\nถ้านั่นทําให้คุณสนใจ เราจะยินดีจะหารือเกี่ยวกับเรื่องนี้ต่อไป เมื่อเรามั่นใจมากขึ้น เราหวังว่าคุณจะเข้าใจ"
 enclave.330.a:0 "$enclave.310.a$"
 enclave.330.b.tt:0 "เปิดใช้งาน§Y$sm_salvager_workshop$§!ตึกฐานดาว, ลดการรักษาและเร่งการซ่อมแซม สําหรับเรือเทียบท่า"

 enclave.335.desc:0 "แน่นอน! กลไกของเราทํางานหนักมาก ในการวางแผนแผนการทํางานใหม่ที่ทะเยอทะยาน และมันจะเป็นความสุขของเรา\n\nเราจะใส่งานกู้ของคุณในเกียร์สูง, การเรียกชิ้นส่วนและการเกิดขึ้นอีกสําหรับโครงการบน§Yดวงดาวทั้งหมดของคุณ§!เรายังมีเทคนิคนิดหน่อยที่แขนเสื้อ เพื่อช่วยคุณผลิตเรือ\n\nจําไว้ให้ดีว่างานแบบนี้ใช้ต้นทุนของมัน, เราไม่ได้จัดการแบบนี้บ่อยๆ"
 enclave.335.a:0 "$enclave.310.a$"

 enclave.336.desc:0 "สวัสดีอีกครั้ง! ผมยินดีที่จะบอกว่า เราพร้อมที่จะเอาทุกอย่างกลับมาใช้ในเกียร์ที่สูงขึ้น และทําให้งานซาลวาจประสบความสําเร็จ\n\nคุณว่าไง? พร้อมที่จะเร่งการสร้างเรือข้าม§Yดวงดาวทั้งหมดของคุณ§!?"

 enclave.340.a.desc:0 "การเรียกร้องที่เข้มงวดที่สุด มันทําให้เราเจ็บปวดยิ่งกว่า ที่ท่านจะรู้ว่าได้ยินเสียงเรือแตกในการรบ แต่ชีวิตข้างนอกนี้โหดร้าย และจําเป็น\n\nโปรดให้อภัยที่ระลึกของฉัน แน่นอน นั่นเป็นบริการที่เราจัดให้ได้\n\n$enclave.340.main.desc$"
 enclave.340.b.desc:0 "อนิจจา. ดังนั้นการดูดฝุ่นที่รุนแรง ได้อ้างว่าเรือมากขึ้น ... แต่แน่นอน เราจะยินดี ที่ได้คืนบางอย่าง ที่ดีจากการต่อสู้อันน่าสลดนี้\n\n$enclave.340.main.desc$"
 enclave.340.main.desc:0 "ถ้าคุณจะกรุณาให้เรา§Yกู้สิทธิ์§!และทรงประทานอาหารแก่เรา§Yพิกัดร่วม§!สําหรับเศษซากเหล่านี้เราจะ ชดเชยให้คุณในเวลา"
 enclave.340.nodebris.desc:1 "อา ใช่ การต่อสู้ ว่าสาเหตุเศร้ามากที่สุดของการกู้ ...\n\nคุณจะต้องยกโทษให้ผม[root.GetRulerTitle]การ ทําลาย ป่า ไม่ ทํา ให้ เรา มี ความ ยินดี. อย่าง ไร ก็ ตาม เรา เข้าใจ ว่า จําเป็น ต้อง ทํา เช่น นั้น. เรา สามารถ จัด การ กับ การ กู้ ภัย ได้ จริง ๆ ถ้า เรือ ของ คุณ ไม่ เต็ม ใจ หรือ ไม่ สามารถ ลุย ซาก ปรัก หัก พัง.\n\nมาหาเราเมื่อจําเป็น และมอบสิทธิในการกู้คืนให้เรา จากนั้นเราจะจ่ายค่าชดเชยให้คุณ สําหรับวัสดุและความรู้ที่เราค้นพบที่นั่น"
 enclave.340.lowopinion.desc:1 "อนิจจาสําหรับสาเหตุที่น่าเศร้ามากที่สุดของการกู้ : การต่อสู้\n\nคุณจะต้องยกโทษให้ผม[root.GetRulerTitle]ม. ; เรา มี เหตุ ผล ที่ จะ โศก เศร้า ด้วย ความ ตั้งใจ จะ ทําลาย. อย่างไรก็ตาม สําหรับ§Yลูกค้าธรรมดา§!เราสามารถจัดการการกู้ได้จริง ภายใต้คําสั่ง\n\nจง กลับ มา หา เรา ใน ภาย หลัง และ เมื่อ จําเป็น. เราจะดําเนินการจัดการกับ§Hเศษ ซาก ปรัก หัก พัง§!คุณอ้างสิทธิ์และจะชดเชยให้คุณ สําหรับวัสดุและความรู้ทางวิศวกรรมที่เราพบว่ามี"
 enclave.340.a:0 "$enclave.310.a$"
 enclave.340.b.tt:0 "เราจะ §Rสูญเสียการเข้าถึง§! แหล่งเศษซากสูงสุด §Y3 แห่ง§! [salvager_enclave_country.GetName] จะส่งมอบเทคโนโลยีหรือวัสดุที่กู้คืนมาให้เรา §Yภายใน 90 วัน§!"

 enclave.341.desc:0 "ขอบคุณ การ โอน ลิขสิทธิ์ ดู เหมือน จะ เป็น ไป ตาม ลําดับ; การ อ้าง สิทธิ์ นั้น ดี. เราจะติดต่อไป"
 enclave.342.desc:0 "โอ้! ผมเสียใจที่ต้องบอกว่า ดูเหมือนเศษซากของคุณ ได้เสื่อมโทรมลง ระหว่างที่เราคุยกัน แม้เราจะขาดทักษะในการกู้ซาก ที่ถูกทิ้งไว้นานขนาดนั้น อนิจจาเก่าของเราเอนโทรปีศัตรูโจมตีอีกครั้ง!"

 enclave.345.desc:1 "มันจะเป็นความสุขของเรา! ว่าง[salvager_enclave_country.species.GetHandNamePlural]ทําให้จิตใจอยากรู้อยากเห็นและที่นับคู่สําหรับเรา! เรา ยินดี อย่าง ยิ่ง ที่ จะ ให้ การ ช่วย เหลือ และ ให้ ข้อ แนะ ที่ เป็น ประโยชน์ แก่ เรา§Yลูกค้าธรรมดา§!- ตราบเท่าที่ค่าใช้จ่ายของเราถูกครอบคลุม\n\nเราจะขอขอบคุณการบริจาคใด ๆ ที่คุณสามารถทําได้ เพื่อช่วยขึ้นฝั่งฐานต่ําของเราต่ําต้อย! ตัวเรือเก่าสามารถถูกซ่อมใหม่ได้หลายครั้ง แต่บางครั้งมันก็ไม่มีแรงกระแทก"
 enclave.345.a:0 "$enclave.310.a$"

 enclave.346.desc:0 "สวัสดี สหาย! การเรียนร่วมกันหลายปีของเรา ส่งผลให้ วิธีที่ผมได้ยินมัน บางวิศวกรของเราได้หยิบขึ้น เคล็ดลับไม่กี่จากคุณเช่นเดียวกับคุณจากเรา!\n\nอย่างไรก็ตาม การตกลงเมื่อเวลาได้ผ่านไป และเราสามารถใช้ผู้ฝึกหัดที่กระตือรือร้นของเราที่บ้าน ... เว้นแต่คุณยินดีที่จะ ชดเชยให้เราอีกสักพัก"

 enclave.350.desc:0 "เป็นหนึ่งในพวกเรา§Yลูกค้าธรรมดา§!เรายินดีที่จะส่งคนมาดูแล ความพยายามของคุณ เพื่อตัดเล็กๆ จะเป็นการเบี่ยงเบนความสนใจสู่ซากปรักหักพัง"
 enclave.350.desc.not_available:0 "เราเสนอ§Yลูกค้าธรรมดา§!งาน รับ ใช้ ของ ผู้ ดู แล ซึ่ง สามารถ ปรับ ปรุง ความ พยายาม ของ คุณ ให้ ดี ขึ้น เพื่อ การ ตัด ชิ้น เล็ก ๆ. แต่น่าเสียดายที่ตอนนี้ไม่มีผู้ดูคนใดของเราเลย พวกเขามีความต้องการสูง และผมเกรงว่าลูกค้าบางคนของเรา จะให้ความสําคัญเป็นพิเศษ"
 enclave.350.a:0 "$enclave.310.a$"
 enclave.352.desc:0 "สวัสดี! ผู้ ดู แล ที่ เรา ส่ง มา หา ท่าน ได้ กลับ มา หา พวก เรา ตาม กําหนด เวลา ใน ทุ่ง นา อย่าง ครบ ถ้วน. อย่างไรก็ตาม เรายินดีที่จะส่งคนมาแทน ถ้าคุณยังคงใช้บริการของเรา"

 master_salvager:0 "โปรแกรมเล่นซัลวาเจอร์"
 master_salvager_desc:1 "นัก เทคนิค ที่ มี ประสบการณ์ คน หนึ่ง จาก หมู่ บ้าน ซัล วา เกอร์ เอ็น แค ลเว ทํา ให้ แน่ ใจ ว่า มี การ ใช้ ซาก ปรัก หัก พัง ใน สมรภูมิ อย่าง มี ประสิทธิภาพ."

 master_salvager_catch_phrase: "§L\"ใช่ มาทําภาคสนามกัน! มีซากปรักหักพังที่น่าสนใจลอยเกี่ยวกับ?\"§!"

 leader_trait_master_salvager: "$master_salvager$"
 leader_trait_master_salvager_desc: "ทหารผ่านศึกจากหน่วยลาดตระเวณ[salvager_enclave_country.GetName]แบ่งปันทักษะของพวกเขา สําหรับค่าธรรมเนียมเล็กน้อย"
 leader_trait_master_salvager_effect: "$SYSTEM_EFFECTS_TXT$:\n$t$ยานพันธมิตรในระบบ:\n$tt$ซ่อมแซม HP (ต่อเดือน): §G+2%§!\n$t$เมื่อเศษซากถูกเก็บกู้/วิจัยในระบบ:\n$tt$มีโอกาสในการกอบกู้ยาน: §Y15%§!\n$tt$$salvage_ship_restrictions$"

 councilor_master_salvager: "$master_salvager$"
 councilor_master_salvager_female: "$councilor_master_salvager$"
 councilor_master_salvager_desc: "$master_salvager_desc$"
 councilor_master_salvager_unlock_title: "§Hตําแหน่งสภาจาก[salvager_enclave_country.GetName]§!"
 councilor_master_salvager_conditional_tooltip: "ผู้นำมีคุณลักษณะ §Y$leader_trait_master_salvager$§!"

 unlocks_salvager_council_position: "\n§Eปลดล็อกตำแหน่งในสภา:§!\n§H$t$$councilor_master_salvager$§!\n$tt$$COUNCIL_POSITION_MODIFIER_BASE$\n$ttt$$MOD_COUNTRY_SCAVENGE_DEBRIS_MULT$: §G+10%§!\n$ttt$$MOD_SHIP_FRIENDLY_TERRITORY_ARMOR_MULT$: §G+2%§!\n$COUNCIL_POSITION_AVAILABLE_FOR$$t$$scientist_with_icon$\n\n$COUNCIL_POSITION_REQUIREMENTS$$councilor_master_salvager_conditional_tooltip$"

 master_salvager_already_bought: "§Rเราได้ซื้อบริการมาแล้ว$master_salvager$.§!"
 master_salvager_explanation: "\nเราจะจ้างนักวิทยาศาสตร์ เลเวล 5 พร้อมกับคุณลักษณะ §Y$leader_trait_master_salvager$§!"

 enclave.360.name:0 "ค่า จ้าง ที่ ได้ คืน มา"
 enclave.360.intro:0 "ขบวนเรือบรรทุกสินค้าเพิ่งมาถึง§Y[salvager_enclave_country.GetName]§!การส่งมอบทรัพยากรคืน"
 enclave.360.a.desc:1 "$enclave.360.intro$\n\nพวกซัลเวเจอร์สห่อข้อความไว้ เพื่อแสดงความขอบคุณ รวมทั้งของขวัญที่จับต้องได้ วิธีที่มันเคลื่อนไหวภายในสนามแรงโน้มถ่วงเทียมของเรา ไม่เป็นที่น่าพอใจ และยังค่อนข้างกระตุ้น"
 enclave.360.b.desc:1 "$enclave.360.intro$\n\nคนส่งของพูดขอบคุณแทนพวกซัลวาเจอร์สอย่างไม่หยุดหย่อน นั่นคือจนกระทั่งพวกเขาถูกเปลี่ยนจากหน้าเป็นหลังรถ ความ กระหาย ใคร่ รู้ ที่ อยาก รู้ อยาก เห็น อย่าง ลึก ซึ้ง เช่น นี้ ต้อง ถูก ขจัด ออก ไป ก่อน ที่ การ ขน ส่ง สินค้า จะ เริ่ม ขึ้น."
 enclave.360.c.desc:0 "$enclave.360.intro$\n\nที่อยู่ใกล้เคียงท่ามกลางสินค้า เป็นฐานข้อมูลของ§Hพิมพ์เขียว§!แต่ค่อนข้างละเอียดในรายละเอียดของพวกเขา ดูเหมือนเป็นผลงานของคนที่ ตื่นเต้นกับการค้นพบ หรือกําลังศึกษาแผนผัง\n\nไม่ว่าทางไหน[salvager_enclave_country.GetName]ได้นําเสนอการศึกษาของพวกเขาสําหรับการใช้งานของเราด้วยคําชมของพวกเขา"
 enclave.360.d.desc:0 "$enclave.360.intro$\n\nคนส่งของที่ปรากฏค่อนข้างประสาท; ความกระตือรือร้นที่เห็นได้ชัดที่จะดําเนินการบางอื่น ๆ ไอ้สกิตติชนี่[salvager_enclave_country.GetSpeciesName]ดู เหมือน มี ความ รีบ เร่ง เป็น พิเศษ ที่ จะ ดํา ลง ไป ใน แหล่ง อาหาร ที่ เรา เป็น หนี้. จริง ๆ แล้ว อาหารพวกนี้มาถึงเราอย่างน่าประหลาดใจ ราวกับการแทนที่"
 enclave.360.e.desc:0 "$enclave.360.intro$\n\nคนส่งของที่ปรากฏค่อนข้างประสาท; ความกระตือรือร้นที่เห็นได้ชัดที่จะดําเนินการบางอื่น ๆ ไอ้สกิตติชนี่[salvager_enclave_country.GetSpeciesName]มี มารยาท พอ ที่ จะ มอบ ของ หลาย อย่าง§Hพิมพ์เขียว§!พวกเขาบอกว่าเดินทางมาถึงระหว่างการกู้คืน อย่าง ไร ก็ ตาม ดู เหมือน ว่า มี ความ เร่ง ด่วน อยู่ บ้าง อยู่ เบื้อง หลัง การ ส่ง เสบียง อาหาร.\n\nความจริงมีการพบเห็นไม่ได้รับการยืนยันของสัตว์ที่คุ้นเคย, ยานอวกาศที่อยู่ใน[salvager_enclave_system.GetName]ระบบล่าสุด..."

 enclave.365.name:0 "งาน ที่ ได้ รับ มอบ หมาย"
 enclave.365.desc:0 "เรือส่งของมาถึง§Y[salvager_enclave_country.GetName]§!มีพิมพ์เขียวหลายแบบ และแหล่งทรัพยากรเล็กๆ ทุก อย่าง ถูก กู้ คืน มา จาก เศษ ซาก ปรัก หัก พัง.\n\nนัก บิน ของ เรือ ลํา นี้ พูด น้อย มาก นอก จาก จะ กล่าว ขอบคุณ อย่าง สุภาพ สําหรับ ธรรมเนียม ของ เรา. การส่งมอบได้รับการปฏิบัติอย่างเข้มงวด"
 enclave.365.a:0 "งานที่ดี."
 enclave.365.b:0 "คนโง่"
 enclave.365.tt:0 "เราจะได้รับ:"
 enclave.365.d:0 "ลูกเห็บพวกเขา! เรามีเศษที่พวกมันจัดการได้"

 enclave.375.name:0 "ซัลวาเจอร์ เอ็นคลาฟ ทําลาย"
 enclave.375.desc:0 "การรุกของเราใน[salvager_system.GetName]ระบบนี้ประสบความสําเร็จอย่างมาก เดอะ[FROM.GetName]ถูก ทําลาย และ ผู้ รอด ชีวิต ไม่ กี่ คน ได้ กระจัด กระจาย ไป สู่ ที่ ว่าง เปล่า. เมื่อ สิ่ง อํานวย ความ สะดวก ของ พวก เขา พัง ทลาย การ บริการ เล็ก ๆ น้อย ๆ ของ พวก เขา เป็น เรื่อง ของ อดีต. กาแลคซีได้กําจัดพวกเขาเป็นอย่างดี"
 enclave.380.desc:0 "เราได้รับรายงานมาว่า[FROM.GetName]เข้าร่วมใน[salvager_system.GetName]ระบบถูกทําลายแล้ว พวกก่อการร้ายทําผลงานสั้น ๆ ของแคมเปญ ลดโรงงานของซัลวาเกอร์เป็นซากปรักหักพัง ผู้ รอด ชีวิต ไม่ กี่ คน ได้ กระจัด กระจาย ไป และ ดู เหมือน ว่า เป็น เวลา ที่ กาแล็กซี จะ ต้อง ทํา งาน โดย ไม่ ได้ รับ ใช้."

