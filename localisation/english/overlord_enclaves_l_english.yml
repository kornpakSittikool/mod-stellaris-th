 divination_monthly_change_tooltip:0 "ความก้าวหน้าของสิ่งนี้§Yสถานการณ์§!ส่วนใหญ่จะขึ้นอยู่กับความสัมพันธ์ของเรา กับจักรวรรดิอื่น ๆ ยกตัวอย่างเช่น การตั้ง§Yความแหลม:§!ถึง§Yการประสานงาน§!จะทําให้มันเร็วขึ้น"

 divination_visitors:0 "สัญลักษณ์ ของ ผู้ มา เยี่ยม"
 divination_visitors_type:0 "การ วิเคราะห์"
 divination_visitors_desc:0 "มันเป็นความประสงค์ของชรูช ที่โลกของคุณได้รับการเยือน ไม่ ว่า คน แปลก หน้า เหล่า นี้ จะ นํา ข่าว ร้าย มา หรือ ไม่ ก็ ตาม เป็น เรื่อง ลึกลับ ที่ ยัง ไม่ มี ใคร รู้ จัก."
 divination_visitors_embrace:1 "เรายอมรับพินัยกรรมของชรูด โดยตามหาผู้มาเยือนด้วยตัวเอง"
 divination_visitors_denied:1 "เราต่อต้านพินัยกรรมของชรูด โดยปฏิเสธการเข้าชมพื้นที่ของเรา"
