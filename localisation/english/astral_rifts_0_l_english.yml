 astral_rift_corridors: "ช่องทางเชื่อมต่อ(เสียงเครื่องหมุน)"

 astral_rift.100.name: "ช่องทางเชื่อมต่อ"
 astral_rift.100.desc: "เราพบว่าตัวเองถูกกักขังอยู่ในเครือข่ายของห้องที่เชื่อมต่อถึงกันโดยไม่มีจุดเริ่มต้นหรือจุดสิ้นสุดที่ชัดเจน\n\nพื้นผิวที่นี่เป็นเหมือนแผงวงจรคล้ายกระจก สามารถมองเห็นกระแสพลังงานไหลผ่านโครงข่ายท่อร้อยสายที่แตกแขนงออกไป\n\nช่องทางเชื่อมต่อที่นี่ดูเหมือนจะวนซ้ำตัวเองอย่างไร้ขีดจำกัดโดยไม่มีความแตกต่างอย่างมีนัยสำคัญ เราไม่มีความคืบหน้าใดๆ ในการสำรวจในปัจจุบัน แนะนำให้เราสร้างเส้นทางของเราเองดีกว่า"
 astral_rift.100.a: "พังทะลุพื้นลงไป"
 astral_rift.100.b: "เปิดเจาะผนัง"

 astral_rift.105.name: ""กระจก" ที่เป็นไปไม่ได้"
 astral_rift.105.desc: "ความพยายามครั้งแรกของเราในการเจาะทะลุพื้นล้มเหลว ส่วนประกอบของมันไม่เหมือนกับวัสดุโปร่งใสใดๆ ที่เราเคยบันทึกไว้ แรงกระแทกทื่อๆ ไม่สามารถทำให้พื้นผิวเสียรูปหรือเกิดรอยตำหนิได้เลย\n\nอย่างไรก็ตาม ด้วยความพยายามอย่างมาก เราประสบความสำเร็จในการเจาะรูเล็กๆ ผ่านท่อร้อยสายท่อหนึ่งด้วยเครื่องเจาะพลาสม่า สิ่งที่ไหลผ่านวงจรคือสารผสมที่มีความเข้มข้นสูงของผ้าแอสทรัลที่ถักทออย่างแน่นหนา\n\nแม้ว่าการค้นพบนี้จะน่าสนใจ แต่ดูเหมือนว่าจะไม่สามารถนำไปปฏิบัติจริงในการสกัดเส้นทางของเราเองผ่านพื้นนี้ได้ เราจะกลับไปสำรวจในรูปแบบดั้งเดิมมากกว่า"

 astral_rift.110.name: "การฟื้นฟูสภาพใหม่"
 astral_rift.110.desc: "ผนังที่นี่ถูกรื้อถอนได้ง่าย แต่ก็เป็นเพียงช่วงสั้นๆ เท่านั้น\n\nหลังจากที่มีการนำวัสดุออกจากผนังไม่ว่าปริมาณเท่าใดก็ตาม เครือข่ายผลึกของวัสดุก่อสร้างขั้นพื้นฐานจะเริ่มถักทอและวางทับซ้อนกันจนอยู่ในสภาพที่ใกล้เคียงกับที่มีอยู่ก่อนหน้านี้อย่างรวดเร็ว เราสามารถเห็นพลังงานในท่อด้านล่างไหลไปยังจุดที่เกิดการรื้อถอนแต่ละครั้งของเรา\n\nแม้การค้นพบนี้จะน่าสนใจ แต่ดูเหมือนว่าจะไม่เหมาะสมที่จะสกัดเส้นทางของเราเองผ่านพื้นนี้ เราจะกลับไปสำรวจในรูปแบบดั้งเดิม"

 astral_rift.115.name: "เครื่องเทอร์มินัล"
 astral_rift.115.desc.common.1: "ในที่สุดเราก็ได้พบความแตกต่างในสภาพแวดล้อมรอบตัวเรา: ห้องขนาดใหญ่ที่เต็มไปด้วยหน้าจอควบคุมโดยเครื่องเทอร์มินัลส่วนกลาง\n\nบนหน้าจอหนึ่งแสดงแผนที่ของช่องทางเชื่อมต่อโดยรอบ"
 astral_rift.115.desc.common.2: "หากเราสามารถทำความเข้าใจปุ่มควบคุมคอนโซลได้ เราจะสามารถเรียนรู้เกี่ยวกับสถานที่นี้ได้อีกมาก อย่างไรก็ตาม ยังไม่ทราบว่ามีมาตรการรักษาความปลอดภัยใดอยู่ในรหัสโปรแกรมของมันบ้าง"
 astral_rift.115.desc.walls: "$astral_rift.115.desc.common.1$\n\nมีบันทึกการแจ้งเตือนความปลอดภัยในบริเวณที่เราเพิ่งรื้อถอนผนัง รวมถึงภาพจากกล้องวงจรปิดขณะที่เรากำลังลงมือทำงาน\n\n$astral_rift.115.desc.common.2$"
 astral_rift.115.desc.glass: "$astral_rift.115.desc.common.1$\n\nมีบันทึกการแจ้งเตือนความปลอดภัยในบริเวณที่เราเพิ่งเจาะทะลุพื้น รวมถึงภาพจากกล้องวงบันทึกขณะที่เรากำลังลงมือทำงาน\n\n$astral_rift.115.desc.common.2$"
 astral_rift.115.a: "แฮกเครื่อง"
 astral_rift.115.b: "ชำแหละเอาชิ้นส่วนอะไหล่"

 astral_rift.120.name: "ถูกฝังไว้"
 astral_rift.120.desc: "ในระหว่างกระบวนการถอดรหัสรหัสผ่านของเครื่องเทอร์มินัล ระบบป้องกันภัยได้ถูกกระตุ้นขึ้น และห้องทั้งห้องก็เต็มไปด้วยวัสดุคล้ายโฟมที่ขยายตัวอย่างรวดเร็ว ก่อนที่ใครจะช่วย [Leader.GetName] ได้ [Leader.GetHeShe] ก็ถูกห่อหุ้มไว้โดยสมบูรณ์ ความพยายามใดๆ ที่จะดึงตัว [Leader.GetHimHer] ออกมานั้นไร้ผล เนื่องจากวัสดุที่ถูกกำจัดออกไปจะถูกแทนที่ใหม่ในทันที\n\nตามขั้นตอนมาตรฐาน เราได้ดึงตัวสายยึดเหนี่ยวฉุกเฉินกลับและกู้คืน §Y$tech_rift_sphere$§! พร้อมตัวอย่างที่รวบรวมมาได้กลับมา"

 astral_rift.125.name: "สูตรสมการ"
 astral_rift.125.desc: "[Leader.GetName] สามารถกู้คืนและทำการย้อนรหัสโปรแกรมได้ ภาษาโปรแกรมมิ่งนั้นมีความก้าวหน้าอย่างมาก และอัลกอริทึมก็มีความเรียบง่ายที่สง่างาม\n\nโครงสร้างทั้งหมดนี้ได้รับการสุ่มสร้างขึ้น(สร้างตามลําดับ)\n\nแม้ว่าเราจะยังไม่ได้ถอดรหัสรูปแบบของมันทั้งหมด แต่ก็มีกฎเกณฑ์ชุดหนึ่งที่สภาพแวดล้อมนี้ปฏิบัติตามอย่างชัดเจน เรากำลังนำตัวอย่างวัสดุก่อสร้างกลับไปซึ่งแสดงให้เห็นว่ามีคุณสมบัติเฉพาะตัวในการจำลองตัวเองเพิ่มเติม จำเป็นต้องมีการทดสอบเพิ่มเติม แต่เราคาดการณ์ว่าการนำวัสดุนี้ไปวางไว้ที่ใดและทำตามขั้นตอนที่ถูกต้อง จะสร้างระบบช่องทางเชื่อมต่อที่คล้ายกันขึ้นมาใหม่ทั้งหมด"
 astral_rift.125.a: "ช่างเป็นวัสดุที่น่าทึ่งมาก"

 astral_rift.130.name: "คอมพิวเตอร์แอสทรัล"
 astral_rift.130.desc: "เราได้ถอดประกอบเครื่องเทอร์มินัลคอมพิวเตอร์เพื่อเอาอะไหล่ชิ้นส่วน\n\nเราสามารถกู้คืนเส้นใยแอสทรัลจำนวนมหาศาลที่ไหลผ่านแผงวงจรของมันได้\n\nจุดประสงค์เดิมของเครื่องจักรนี้ไม่ใช่เรื่องที่เราต้องกังวลอีกต่อไป"
 astral_rift.130.a: "ยอดเยี่ยมมาก"

astral_rift.140.name: "[GetScientistCapital] เดินทางกลับมา"
astral_rift.140.desc: "[Root.GetLeaderName] ได้เดินทางกลับมาอย่างไม่คาดคิดจากภารกิจภายในหนึ่งในเดอะชราวด์\n\n[Root.Leader.GetHeSheCap] ดูเหมือนจะ... เปลี่ยนแปลงไป ติดอยู่ในจุดใดจุดหนึ่งระหว่างห้วงเวลานี้กับอีกห้วงเวลาหนึ่ง อายุของ[Root.Leader.GetHimHer]ดูเหมือนจะไม่สามารถประเมินได้\n\nและอย่างไม่มีคำอธิบาย ดูเหมือนว่า[Root.Leader.GetHeShe]จะมีความสามารถพิเศษในด้านการวิจัยคำนวณอีกด้วย"

########################
# Dimensional Conflict #
########################
 astral_rift_ancient_battlegrounds: "ความขัดแย้งระหว่างมิติ"

 astral_rift.200.name: "ศึกรบโบราณ"
 astral_rift.200.desc: "รอยแยกมิตินี้มีเศษซากความพินาศของศึกอันยิ่งใหญ่หลงเหลืออยู่\n\nสิ่งที่เหลืออยู่คือซากปรักหักพังของกองเรือทหารและซากสิ่งมีชีวิตขนาดยักษ์ ซึ่งมีขนาดใหญ่กว่ายานรบประจัญบานที่ใหญ่ที่สุดถึงสิบเท่าตั้งแต่หัวจรดหาง\n\nตรงกันข้ามกับตัวยานรบที่พังยับเยิน ซากของสิ่งมีชีวิตยักษ์ยังอยู่ในสภาพดีอย่างน่าประหลาดใจ อาวุธใดๆ ที่กองยานเหล่านี้ใช้นั้นดูเหมือนจะไม่สามารถสร้างความเสียหายให้กับมันได้เลย เรายังระบุไม่ได้ว่าอะไรคือสาเหตุของการตายของสิ่งมีชีวิตดวงนี้ แต่ดูเหมือนไม่น่าจะเป็นผลจากการต่อสู้\n\nสัตว์ร้ายตัวนี้ต้องมีความทนทานอย่างน่าทึ่ง การวิเคราะห์โครงสร้างโมเลกุลของมันน่าจะช่วยเสริมเกราะป้องกันยานของกองเรือเราได้ ในทางกลับกัน เราอาจลองศึกษาภายในตัวของมัน เพื่อเรียนรู้ว่าสัตว์ดวงนี้ตายอย่างไร และเกิดอะไรขึ้นที่นี่กันแน่"
 astral_rift.200.a: "ศึกษาโครงสร้างส่วนประกอบของมัน"
 astral_rift.200.b: "บุกเข้าไปข้างในกันเถอะ"

 astral_rift.205.name: "เกราะป้องกันต่างดาว"
 astral_rift.205.desc: "โครงสร้างส่วนประกอบของเกราะบนสัตว์ยักษ์เลวิอาธานนั้นเหนือความคาดหมายของเราอย่างยิ่ง\n\nเกล็ดของมันมีส่วนผสมของสารอินทรีย์และส่วนประกอบของโลหะที่ประสานกันเป็นโครงผลึกที่ซับซ้อนซึ่งช่วยเสริมความแข็งแกร่งต้านทานแรงกระแทกจากพลังงานจลน์ มันคือสิ่งมหัศจรรย์ของธรรมชาติอย่างแท้จริง\n\nการทำความเข้าใจหลักการที่อยู่เบื้องหลังสิ่งนี้ได้ช่วยสร้างแรงบันดาลใจให้วิศวกรของเราคิดทบทวนวิธีก่อสร้างโครงสร้างตัวเรือของยานอวกาศของเราเองขึ้นมาใหม่\n\nสิ่งนี้ต้องเคยเป็นศัตรูที่น่าสะพรึงกลัวอย่างยิ่งในสนามรบเป็นแน่"
 astral_rift.205.a: "$FASCINATING$"

 astral_rift.210.name: "ซากร่างที่ยังไม่ถูกสำรวจ"
 astral_rift.210.desc: "เราได้เข้าไปข้างในร่างที่ไร้วิญญาณของสัตว์ยักษ์แล้ว\n\nแม้ว่าเราจะไม่สามารถเจาะทะลุเกราะป้องกันอันน่าทึ่งของสิ่งมีชีวิตดวงนี้ได้ แต่เราก็ประสบความสำเร็จในการง้างปากของมันออกด้วยการใช้วัตถุระเบิดปริมาณมาก ทีมงานขนาดเล็กคนหนึ่งได้ผจญภัยเข้าไปในปากของสัตว์ร้ายเพื่อทำความเข้าใจอวัยวะภายในและเก็บตัวอย่างเนื้อเยื่อของมัน\n\nภายในของมันน่าทึ่งมาก ฟันแหลมคมนับไม่ถ้วนบ่งชี้ว่านี่คือสิ่งมีชีวิตนักล่า ระบบย่อยอาหารที่มีประสิทธิภาพสูงกินพื้นที่ส่วนใหญ่ในตัวมัน และแสดงให้เห็นว่าสิ่งมีชีวิตนี้มักบริโภควัสดุที่หลากหลายมาก\n\nเรายังสามารถประเมินเวลาและสาเหตุของการเสียชีวิตได้ด้วย: แม้ว่าสิ่งมีชีวิตดวงนี้จะกินได้ทุกอย่าง แต่ก็มีร่องรอยการขาดน้ำอย่างชัดเจน นี่อาจบ่งชี้ว่ามันไม่ใช่สิ่งมีชีวิตดั้งเดิมในมิตินี้ จึงไม่มีแหล่งน้ำให้มันดื่มกิน\n\nจากการหาอายุคาร์บอน(หัวเราะ)สิ่งมีชีวิตนี้ได้เสียชีวิตไปแล้วกว่าห้าหมื่นปี"
 astral_rift.210.a: "$FASCINATING$"
 astral_rift.210.b.evopred: "ห้าหมื่นปีก็ยังไม่เพียงพอที่จะซ่อนตัวจากเราได้"

 astral_rift.215.name: "รูปทรงสิบสองหน้า"
 astral_rift.215.desc: "เราได้ตรวจสอบซากยานรบภายในรอยแยกมิตินี้แล้ว\n\nพื้นผิวที่เรียบเนียนของยานต่างดาวมีความคล้ายคลึงกับการออกแบบ §Y$tech_rift_sphere_plural$§! ของเราอย่างยิ่ง เป็นที่น่าทึ่งว่า ยานพาหนะเหล่านี้ดูเหมือนจะได้รับการออกแบบให้เข้าและออกจากรอยแยกมิติได้อย่างอิสระโดยไม่จำเป็นต้องใช้การดึงตัวด้วยสายยึดเหนี่ยว\n\nขณะที่วิศวกรของเรากำลังทำความเข้าใจเทคโนโลยีนี้ ทีมที่เหลือได้ค้นพบรูปทรงสิบสองหน้า(พ่อ)ขนาดใหญ่วางอยู่ภายในซากเรือที่ใหญ่ที่สุด หากไม่มีการทดสอบเพิ่มเติมก็เป็นไปไม่ได้ที่จะคาดเดาจุดประสงค์ของมัน แต่การจัดเก็บอย่างระมัดระวังบ่งชี้ว่ามันได้รับการพิจารณาว่ามีความสำคัญอย่างยิ่ง"
 astral_rift.215.a: "พยายามกระตุ้นรูปทรงสิบสองหน้าให้ทำงาน"
 astral_rift.215.b: "ชำแหละเอาชิ้นส่วนอะไหล่"

 astral_rift.220.name: "การเปิดทำงาน"
 astral_rift.220.desc: "ทีมงานของเราได้นำรูปทรงสิบสองหน้าขึ้นมาบนยาน §Y$tech_rift_sphere$§! เพื่อทำการตรวจสอบเพิ่มเติม\n\nการตรวจสอบตำแหน่งติดตั้งเดิมของมันอีกครั้งพบร่องรอยของเส้นใยแอสทรัลจำนวนเล็กน้อย การป้อนเส้นใยเข้าไปในรูปทรงสิบสองหน้าทำให้วัตถุสั่นสะเทือนด้วยความถี่สูงมากจนรูปร่างที่พร่าเลือนเริ่มดูคล้ายกับทรงกลม\n\nในขณะที่อุปกรณ์กำลังทำงาน รอยแยกมิติที่เราใช้เข้ามาได้ถูกปิดผนึกไว้ ทันทีที่อุปกรณ์ถูก 'ปิดสวิตช์' รอยแยกมิตินั้นก็ปรากฏขึ้นอีกครั้ง\n\nจากการทดลองนี้ เราคาดการณ์ได้ว่าเมื่อต้องเผชิญกับศัตรูที่พวกเขาไม่สามารถทำลายล้างได้ จักรวรรดิโบราณบางแห่งจึงใช้เทคโนโลยีนี้ในความพยายามอย่างสิ้นหวังที่จะกักขังสิ่งมีชีวิตดวงนั้นไว้ โดยการสละกองเรือของพวกเขาในกระบวนการนี้\n\nอุปกรณ์ที่น่าทึ่งชิ้นนี้สามารถเป็นประโยชน์อย่างมากสำหรับเรา"
 astral_rift.220.a: "$FASCINATING$"

 astral_rift.225.name: "การแยกชิ้นส่วน"
 astral_rift.225.desc: "รูปทรงสิบสองหน้านี้เป็นคลังมหาสมบัติของวัสดุหายาก ภายในของมันหนาแน่นไปด้วย $astral_threads$ ในรูปแบบที่บ่งชี้ถึงโครงข่ายแผงวงจรที่ซับซ้อน แกนกลางเป็นที่เก็บสสารมืด(ลองดีเจ)ปริมาณมาก วิธีการทำงานของสิ่งประดิษฐ์ชิ้นนี้ยังคงเป็นปริศนา แต่เราสามารถนำส่วนประกอบพื้นฐานของมันไปใช้ประโยชน์ได้อย่างแน่นอน"
 astral_rift.225.a: "$FASCINATING$"

###############
# The Lattice #
###############
 astral_rift_library: "โครงสร้างข่ายงาน(ลาทีส)"

 decision_fractal_seed: "เมล็ดพันธุ์แฟร็กทัล(เมล็ดพันธ์)"
 decision_fractal_seed_desc: "ทรงกลมโปร่งใสเหล่านี้ที่กู้คืนมาจากภายนอกรอยแยกแอสทรัล สามารถบิดตัวเองเข้าสู่อีกมิติหนึ่งได้ ซึ่งช่วยเพิ่มพื้นที่โดยรอบให้มีขนาดกว้างขวางขึ้นอย่างมีประสิทธิภาพ เราควรจัดวางพวกมันอย่างระมัดระวัง"
 d_fractal_seed: "$decision_fractal_seed$"
 d_fractal_seed_desc: "$decision_fractal_seed_desc$"

 astral_rift.300.name: "เรขาคณิตแปลกประหลาด"
 astral_rift.300.desc: "เราได้เข้าสู่พื้นที่ซึ่งเต็มไปด้วยภาพที่น่าสับสน รูปแบบเรขาคณิต และสีสันที่แปรเปลี่ยน\n\nสภาพแวดล้อมไม่ดูเหมือนเป็นอันตราย แต่กวนใจและทำให้สับสนราวกับภาพลวงตา ความพยายามในการวิเคราะห์วัสดุที่ประกอบกันเป็นจักรวาลนี้เป็นเรื่องที่ชวนพิศวง ไม่ว่าตัวอย่างจะถูกขยายใหญ่เพียงใด เราก็ต้องเผชิญกับรูปแบบที่วนซ้ำเดิมแบบเดียวกัน ราวกับว่าพวกมันย่นย่อบีบอัดไปสู่อนันต์\n\nเห็นได้ชัดว่ามีหลักการทางฟิสิกส์บางประการที่ทำงานอยู่ภายในรอยแยกมิตินี้ที่เรายังไม่เข้าใจ"
 astral_rift.300.a: "สำรวจลึกลงไปอีก"
 astral_rift.300.b: "อยู่กับที่ ศึกษาพื้นที่โดยรอบ"

 astral_rift.305.name: "รูปแบบหลายมิติ"
 astral_rift.305.desc: "อวกาศทำงานต่างออกไปที่นี่\n\nการเคลื่อนที่ของยานเราไม่เป็นไปตามผลลัพธ์ที่คาดไว้ เมื่อพุ่งตัวไปข้างหน้า เรากลับเฉออกซ้าย เมื่อเพิ่มแรงขับเคลื่อน เรากลับช้าลง\n\nการค้นพบครั้งสำคัญเกิดขึ้นเมื่อ [Leader.GetName] คาดการณ์ว่าจักรวาลนี้ยอมให้ออกไปนอกเหนือจากระนาบสามมิติปกติได้ บางทีการวิเคราะห์พื้นที่โดยรอบผ่านมุมมองนี้ อาจทำให้เราสามารถค้นหาความหมายในรูปแบบเหล่านี้ได้"
 astral_rift.305.a: "ดำเนินการสืบสวนต่อไป"

 astral_rift.310.name: "การวิเคราะห์หลายมิติ"
 astral_rift.310.desc: "คงจะเป็นเรื่องที่บุ่มบ่ามหากจะเดินทางผ่านจักรวาลนี้โดยไม่มีความเข้าใจที่สมบูรณ์ยิ่งขึ้น โดรนทุกตัวของเราจึงถูกส่งออกไปเพื่อวิเคราะห์พื้นที่โดยรอบ\nในตอนแรกข้อมูลดูเหมือนจะเป็นสัญญาณรบกวนแบบสุ่มที่ปะปนกันอย่างจับต้นชนปลายไม่ถูก จนกระทั่งมีการค้นพบครั้งสำคัญโดย [Leader.GetName]: น่าเหลือเชื่ออย่างยิ่งที่จักรวาลนี้ให้สิทธิ์เข้าถึงมิติที่มากกว่าระนาบสามมิติปกติ บางทีการตรวจสอบสิ่งต่างๆ ผ่านมุมมองนี้อาจช่วยให้เราเข้าใจความหมายในรูปแบบเหล่านั้นได้"
 astral_rift.310.a: "ศึกษาลึกลงไปอีก"

 astral_rift.315.name: "ข้อความในขวดแก้ว"
 astral_rift.315.desc.common: "จากการอนุมานรูปแบบของสภาพแวดล้อมรอบตัวเราในระนาบสี่มิติ เราประสบความสำเร็จในการสร้างแผนที่ที่ใช้งานได้จริง สิ่งนี้เปิดเผยให้เห็นการมีอยู่ของ 'ห้องส่วนกลาง' ภายในรูปแบบที่วนซ้ำ\n\nในขณะที่จากมุมมองสี่มิติ การเดินทางของเราไปยังใจกลางรอยแยกมิติเป็นเส้นตรง แต่ประสบการณ์ของเรากลับเป็นการเดินทางที่คดเคี้ยวผ่านเขาวงกตที่ไม่อาจทำความเข้าใจได้ การเลี้ยวโค้งที่หักศอกและการถอยกลับเป็นระยะๆ เป็นสิ่งจำเป็นในการข้ามเขาวงกตนี้ แต่ในที่สุดเราก็บรรลุเป้าหมายของเรา\n\nพื้นที่ใหม่นี้กว้างใหญ่ไพศาลมาก มันใหญ่เกินกว่าจะบรรจุอยู่ภายในห้องตัวมันเองได้อย่างสมเหตุสมผล และต้องเป็นผลมาจากมิติที่ซ้อนทับกันมากยิ่งขึ้นไปอีก\n\nที่ใจกลางของมัน เรากู้คืนอุปกรณ์ที่คุ้นเคยชิ้นหนึ่งกลับมาได้ มันเขียนด้วยภาษาของเราเอง เป็นชุดคำแนะนำในการดำเนินการต่อไป"
 astral_rift.315.desc.default: "$astral_rift.315.desc.common$\n\nมันลงชื่อโดยไม่ใช่ใครอื่นนอกจาก [Leader.GetName] นี่คือข้อความจากเรา... ในอนาคต"
 astral_rift.315.desc.gestalt: "$astral_rift.315.desc.common$"
 astral_rift.315.a: "มันจะเชื่อถือได้หรือไม่?"

 astral_rift.320.name: "การเดินทางข้ามเวลา"
 astral_rift.320.desc: "เรากำลังเดินทางข้ามเวลาผ่านแกนพิกัดทั้งหมด\n\nจากการปฏิบัติตามคำแนะนำที่วางไว้ตรงหน้าเรา เรานำทางผ่านมิติเหนือจินตนาการจำนวนไม่ถ้วนได้อย่างง่ายดาย ในจุดต่างๆ เราได้ประจักษ์ถึงตัวตนของเราที่กำลังเดินทางข้ามมาจากอีกเส้นทางหนึ่ง สำเนาตัวตนอื่นๆ บางส่วนดูเหมือนจะอยู่ในอาการลำบาก รอยสึกหรอและคราบกัดกร่อนบน §Y$tech_rift_sphere$§! บ่งชี้ว่าพวกเขาหลงทางอยู่ในพื้นที่นี้นานเกินไปแล้ว\n\nโชคดีที่เราหลีกเลี่ยงการเผชิญหน้ากันโดยตรงได้จนถึงขณะนี้ เราได้ทิ้งคำแนะนำของเราเองไว้เบื้องหลังเพื่อป้องกันไม่ให้เกิดความสับสนทางเวลาที่อันตรายเช่นนี้ขึ้น"
 astral_rift.320.a: "ชวนไม่สบายใจ..."

 astral_rift.325.name: "เมล็ดพันธุ์แฟร็กทัล"
 astral_rift.325.desc: "ในที่สุดเราก็มาถึงจุดศูนย์กลางของสิ่งที่น่าจะเป็นจุดสิ้นสุดที่แท้จริงของเขาวงกตนี้\n\nเราอยู่ในพื้นที่ซึ่งประกอบด้วยมิติที่ไม่รู้จักจำนวนมากเสียจนประสาทสัมผัสของเราทำได้เพียงรับรู้มันเป็นเสมือนกล้องสลับลาย(เสียงนาฬิกา)ของสีสันและการเคลื่อนไหวที่บ้าคลั่ง ที่แกนกลางของมัน มีทรงกลมโปร่งใสสามดวงลอยอยู่ แต่ละดวงมีรูปแบบที่วนซ้ำอย่างไร้ขีดจำกัดในแกนพิกัดแกนเดียว เราสงสัยว่าต้องมีทรงกลมสำหรับแต่ละมิติที่บรรจุอยู่ในจักรวาลนี้ แต่เราทำได้เพียงโต้ตอบกับมิติทั้งสามที่เรารับรู้ได้เท่านั้น\n\nไม่มีคำแนะนำเพิ่มเติมให้ค้นพบอีก การไม่มีข้อความจากตัวเราในอนาคตอาจบ่งชี้ว่าการโต้ตอบกับทรงกลมเหล่านี้อาจส่งผลกระทบที่ร้ายแรงตามมาได้"
 astral_rift.325.a: "กู้คืนทรงกลมกลับมา"
 astral_rift.325.b: "เราเสร็จสิ้นภารกิจที่นี่แล้ว"

 astral_rift.330.name: "ภาชนะบรรจุหลากมิติ"
 astral_rift.330.desc: "เมื่อเราเดินทางกลับผ่านรอยแยกมิติ ยานทรงกลม(เสียงกระซิบ)อีกสองลำก็เดินทางกลับมาพร้อมกับเราด้วย สันนิษฐานว่ามีลูกเรือที่เป็นตัวเราในเวอร์ชันอื่น เรา 'สามคน' ได้หลอมรวมกัน (หรือลดทอนลง?) เป็นหนึ่งเดียวที่จุดเชื่อมต่อรอยแยก\n\nเป็นเรื่องแปลกที่ทรงกลมสามดวงที่เรากู้คืนมาไม่ได้รวมเข้าด้วยกันในลักษณะเดียวกัน ตัววัตถุดั้งเดิมในเก้าห้วงเวลาขณะนี้ดำรงอยู่ในพื้นที่เดียวกัน\n\nเมื่อนำไปวางไว้ในภาชนะแยกแต่ละชิ้น พวกมันจะบิดตัวเองเข้าสู่อีกมิติหนึ่งโดยธรรมชาติ และขยายขนาดพื้นที่โดยรอบอย่างมีประสิทธิภาพ เรายังไม่แน่ใจเกี่ยวกับข้อจำกัดของการขยายตัวนี้ แต่คาดการณ์ว่าอุปกรณ์เหล่านี้จะมีประโยชน์อย่างมากในพื้นที่ที่มีประชากรหนาแน่น"
 astral_rift.330.a: "ช่างสะดวกสบายเสียจริง"
 fractal_seeds_available_tt: "คุณจะมี §Yเมล็ดพันธุ์น้ํา§! (เมล็ดพันธุ์แฟร็กทัล) จำนวน [Explorer.num_authorized_fractal_seeds] ชิ้น เพื่อนำไปจัดวางบนดาวเคราะห์ที่มีประชากรตั้งถิ่นฐาน ผ่านทาง §Hการ ตัดสิน ใจ ของ ดาว เคราะห์§! (การตัดสินใจระดับดาวเคราะห์)"

 astral_rift.335.name: "การเผชิญหน้าอย่างใกล้ชิด"
 astral_rift.335.desc: "แม้ว่าเราจะเลือกไม่นำทรงกลมดวงใดติดตัวมาด้วย แต่ในที่สุดเราก็มีทรงกลมทั้งสามดวงอยู่ในฝั่งใกล้เคียงกับรอยแยกมิตินี้อยู่ดี ตัวตนของเราในอีกเวอร์ชันหนึ่งคงจะกู้คืนพวกมันกลับมาได้\n\nจากการทดลอง พวกมันแสดงคุณสมบัติที่น่าสนใจและมีประโยชน์ โดยเฉพาะการบิดตัวเข้าสู่อีกมิติหนึ่งเพื่อเพิ่มพื้นที่โดยรอบอย่างมีประสิทธิภาพ เรายังไม่แน่ใจขอบเขตจำกัดของการขยายตัวนี้ แต่คาดการณ์ว่าอุปกรณ์เหล่านี้จะเป็นประโยชน์อย่างยิ่งในพื้นที่ที่มีประชากรหนาแน่น"
 astral_rift.335.a: "เราได้ช่วยเหลือตัวเราเองแล้ว"

###############
# Subnautical #
###############
 astral_rift_subnautical: "ใต้วารี(หายใจ)"

 astral_rift.500.name: "จมดิ่งลงใต้น้ำ"
 astral_rift.500.desc: "การเปลี่ยนระดับความดันเกิดขึ้นอย่างรวดเร็วและรุนแรง ยานทรงกลมได้เดินทางมาถึงส่วนลึกของสิ่งที่เป็นเสมือนมหาสมุทรอันกว้างใหญ่ ทุกสิ่งมืดมิด เครื่องมือวัดของเราไม่แสดงสัญญาณของสิ่งมีชีวิต ตะกอนลอยน้ำ หรือเศษผงใดๆ\n\nเมื่อพิจารณาจากความดันน้ำที่สูง เราน่าจะอยู่ลึกลงไปใต้พื้นผิวน้ำที่ใดสักแห่ง"
 astral_rift.500.a: "ดำดิ่งลึกลงไปอีก"
 astral_rift.500.b: "มุ่งหน้าสู่พื้นผิวน้ำ"

 astral_rift.505.name: "ผลลัพธ์ที่ไม่คาดคิด"
 astral_rift.505.desc: "มีบางอย่างผิดปกติ\n\nเราเดินทางผ่านน่านน้ำมาหลายชั่วโมงแล้ว แต่ยังไม่มีการเปลี่ยนแปลงใดๆ ในสภาพแวดล้อมรอบตัวเรา"
 astral_rift.505.desc.default: "$astral_rift.505.desc$\n\nต้นหนเชื่อว่ามีแรงบางอย่างกระทำต่อเราซึ่งเครื่องยนต์ของเราไม่สามารถเอาชนะได้ เขาแนะนำให้เราทดลองทำการข้ามระยะสั้น(เสียงกระโดด)หรืออีกวิธีหนึ่ง หากเราออกจากยานทรงกลมและผูกตัวเราเข้ากับอุปกรณ์พองลมความหนาแน่นต่ำ เราก็อาจลอยขึ้นสู่พื้นผิวได้โดยง่าย"
 astral_rift.505.desc.gestalt: "$astral_rift.505.desc$\n\nมีแรงบางอย่างกระทำต่อเราซึ่งเครื่องยนต์ของเราไม่สามารถเอาชนะได้\n\nเราอาจสามารถเอาชนะแรงนั้นได้ด้วยการข้ามระยะสั้น(เสียงกระโดด)หรืออีกวิธีหนึ่ง หากเราออกจากยานทรงกลมและผูกตัวเข้ากับอุปกรณ์พองลมความหนาแน่นต่ำ เราก็น่าจะลอยขึ้นสู่พื้นผิวได้โดยง่าย"
 astral_rift.505.a: "เดินเครื่องยนต์"
 astral_rift.505.b: "สวมชุดปรับความดัน เราจะว่ายน้ำออกไป"

 astral_rift.510.name: "ฟองอากาศขนาดเท่าดาวเคราะห์"
 astral_rift.510.desc: "การข้ามระยะสั้นดูเหมือนจะสำเร็จผล เรามาปรากฏตัวใกล้กับพื้นผิว หลังจากเจาะทะลุออกไป เราได้ค้นพบว่าความจริงแล้วเราอยู่ภายในฟองอากาศขนาดเท่าดาวเคราะห์ในความว่างเปล่าของอวกาศ\n\nความเร็วของยานก่อนหน้านี้ไม่เพียงพอที่จะทะลุผ่านแรงโน้มถ่วงของมันได้"

 astral_rift.515.name: "เราว่ายน้ำ"
 astral_rift.515.desc.1: "มีการติดตั้งสายโยงระยะไกล และเราได้ออกจากยานทรงกลมผ่านทางช่องล็อกอากาศพิเศษ\n\nเราแต่ละคนพองทุ่นฉุกเฉินตามที่ได้รับคำแนะนำ และด้วยความเร็วที่น่าประหลาดใจ ความหนาแน่นที่ต่ำกว่าทำให้เราลอยขึ้นสู่พื้นผิว\n\nระหว่างทาง ตัวกรองบนชุดของเราได้รวบรวมเส้นใยแอสทรัลที่มีความเข้มข้นสูงอย่างมาก"
 astral_rift.515.desc.2: "หลังจากชุดที่เทอะทะของเราเจาะทะลุผ่านพื้นผิวขึ้นมา เราพบว่าความจริงแล้วเราอยู่ภายในฟองอากาศขนาดเท่าดาวเคราะห์ในความว่างเปล่าของอวกาศ\n\nความหนาแน่นของยาน §Y$tech_rift_sphere$§! นั้นสูงเกินกว่าจะเอาชนะแรงโน้มถ่วงที่อยู่ที่นี่ได้\n\nเราได้วิทยุส่งสัญญาณกลับไปยังยานทรงกลมและสั่งให้ข้ามระยะสั้นมาใกล้กับตำแหน่งของเรา"
 astral_rift.515.desc.default: "$astral_rift.515.desc.1$\n\n$astral_rift.515.desc.2$"
 astral_rift.515.desc.aquatic: "$astral_rift.515.desc.1$\n\nมันเป็นการว่ายน้ำที่เพลิดเพลินอย่างยิ่ง เรายินดีอย่างยิ่งที่มีโอกาสได้กลับคืนสู่สภาพแวดล้อมทางธรรมชาติของเรา\n\n$astral_rift.515.desc.2$" #Must also be non-gestalt

 astral_rift.520.name: "ฟองน้ำขนาดดาวเคราะห์น้อย"
 astral_rift.520.desc: "พื้นที่รอบตัวเราดูราวกับว่าขวดของเหลวขนาดเท่าดาวฤกษ์เกิดระเบิดออกในสภาพแรงโน้มถ่วงต่ำ ฟองของเหลวผลึกขนาดเท่าดาวเคราะห์น้อยลอยอยู่รอบตัวเรา มีดาวฤกษ์ที่อยู่ใกล้เคียงซึ่งเรากำลังโคจรรอบมันอยู่อย่างเบาบาง มันดูเก่าแก่ มืดมิด และหนาวเย็น\n\nมีอย่างอื่นอีกด้วย มันไม่ใช่ดาวฤกษ์ แต่ใหญ่โตพอๆ กัน มันถูกสร้างขึ้นจากชิ้นส่วนมหึมาที่เชื่อมต่อถึงกัน คล้ายกับปริศนา 3 มิติในขนาดมโหฬาร การสแกนระบุว่ามันประกอบด้วยโลหะและแร่มีค่าต่างๆ ที่เกือบจะเหมือนกับสิ่งที่มีอยู่ภายในดาวฤกษ์ที่มันโคจรรอบอยู่ เป็นไปได้ว่าสิ่งหนึ่งก่อตัวขึ้นจากอีกสิ่งหนึ่ง หรือมาจากแหล่งกำเนิดร่วมกัน\n\nจากการตรวจสอบอย่างใกล้ชิด ชิ้นส่วนต่างๆ กำลังเคลื่อนตัวและสับเปลี่ยนอย่างช้าๆ บางครั้งมีของเหลวฟองใหญ่ไหลทะลักออกมาจากโครงสร้างของมัน\n\nหากมันมีชีวิต ดูเหมือนว่ามันจะไม่ได้สังเกตเห็นการมีอยู่ของเรา"
 astral_rift.520.a: "พยายามสื่อสาร"
 astral_rift.520.b: "เข้าใกล้วัตถุดังกล่าว"

 astral_rift.525.name: "การสื่อสาร"
 astral_rift.525.desc.1: "สำหรับกลไกที่ใหญ่โตเช่นนี้ที่จะดำรงอยู่ได้โดยไม่มีผู้ดูแลหรือการบำรุงรักษา มันต้องมีระบบควบคุมตนเองในรูปแบบใดรูปแบบหนึ่ง\n\nเราสลับผ่านทุกย่านความถี่เสียงที่ใช้ได้ จากนั้นเราก็พบบางอย่าง...\n\nมันกำลังส่งเสียงคร่ำครวญที่น่าสะพรึงกลัวและดังต่อเนื่องออกออกมา"
 astral_rift.525.desc.2: "ขณะนี้เราพร้อมแล้วที่จะกระจายสัญญาณข้อความในทุกภาษาที่เรารู้จักโดยปรับจูนเข้าสู่ความถี่นี้เพื่อพยายามสื่อสาร\n\nเราควรจะพูดว่าอะไรดี?"
 astral_rift.525.desc.default: "$astral_rift.525.desc.1$\n\nประสาทสัมผัสของลูกเรือถูกครอบงำอย่างรวดเร็วจนกระทั่งต้นหนตัดสัญญาณส่งผ่านโดยไม่พูดอะไรสักคำ\n\n$astral_rift.525.desc.2$"
 astral_rift.525.desc.gestalt: "$astral_rift.525.desc.1$\n\n$astral_rift.525.desc.2$"
 astral_rift.525.a: "สวัสดี"
 astral_rift.525.b: "คุณคือตัวอะไรกันแน่?"
 astral_rift.525.c: "ต้องการความช่วยเหลือไหม?"

 astral_rift.530.name: "การเข้าใกล้"
 astral_rift.530.desc: "เราเข้าไปใกล้อย่างช้าๆ นำทางอย่างระมัดระวังรอบฟองน้ำที่อยู่ใกล้เคียง\n\nวัตถุนั้นอยู่ในความเคลื่อนไหวตลอดเวลา ความร้อนที่เกิดจากแรงเสียดทานของชิ้นส่วนที่สอดประสานกันนั้นเพียงพอที่จะหลอมละลายโลหะส่วนใหญ่ที่เรารู้จัก แกนกลางของมัน เท่าที่เราสามารถประเมินได้ คือการหลอมละลายโดยสมบูรณ์\n\nเรากำลังอัปโหลดรายละเอียดโครงสร้างของมันไปยังคอมพิวเตอร์ของเราเพื่อการศึกษาเพิ่มเติม"
 astral_rift.530.a: "เข้าไปใกล้กว่านี้อีก..."

 astral_rift.535.name: "การตื่นขึ้น"
 astral_rift.535.answer.a: "วัตถุนั้นได้... ตื่นขึ้นอย่างกะทันหัน ชิ้นส่วนของมันถูกดึงออกไปด้านนอกและหมุนด้วยความเร็วสูงอย่างเหลือเชื่อ แรงดึงดูดของมันเพิ่มขึ้นอย่างมาก และเราถูกฉุดไปข้างหน้าด้วยอัตราเร่งความเร็วสูง\n\nทรงกลมเพลิงซึ่งดูเหมือนดาวฤกษ์ดวงเล็กๆ ได้โผล่ออกมาจากภายในชิ้นส่วนเหล่านั้น เตาหลอมนี้ซึ่งปรากฏอยู่เพียงด้านเดียวของวัตถุได้หมุนอย่างช้าๆ มาทางเราและกำลังปล่อยความร้อนที่รุนแรงมายังทิศทางของเรา\n\nจากนั้นคลื่นรังแม่เหล็กไฟฟ้าก็ปะทุขึ้น และยานของเราก็สั่นสะเทือน เสียงเตือนภัยทุกดวงบนคอนโซลเปิดทำงาน หรือส่งสัญญาณข้อผิดพลาด"
 astral_rift.535.answer.b: "วัตถุนั้นได้... ตื่นขึ้นอย่างกะทันหัน ชิ้นส่วนของมันถูกดึงออกไปด้านนอกและหมุนด้วยความเร็วสูงอย่างเหลือเชื่อ แรงดึงดูดของมันเพิ่มขึ้นอย่างมาก และเราถูกฉุดไปข้างหน้าด้วยอัตราเร่งความเร็วสูง\n\nทรงกลมเพลิงซึ่งดูเหมือนดาวฤกษ์ดวงเล็กๆ ได้โผล่ออกมาจากภายในชิ้นส่วนเหล่านั้น เตาหลอมนี้ซึ่งปรากฏอยู่เพียงด้านเดียวของวัตถุ ได้หมุนอย่างช้าๆ มาทางเราและกำลังปล่อยความร้อนที่รุนแรงมายังทิศทางของเรา\n\nจากนั้นคลื่นรังสีแม่เหล็กไฟฟ้าก็ปะทุขึ้น และยานของเราก็สั่นสะเทือน เสียงเตือนภัยทุกดวงบนคอนโซลเปิดทำงาน หรือส่งสัญญาณข้อผิดพลาด ยกเว้นเครื่องแปลภาษาเท่านั้น...\n\nมีข้อความปรากฏในหลายภาษาที่เรารู้จัก เขียนด้วยรหัสไบนารีว่า: §E"ความโศกเศร้า ออกไปจากเราเสีย"§!"
 astral_rift.535.answer.c: "วัตถุนั้นได้... ตื่นขึ้นอย่างกะทันหัน ชิ้นส่วนของมันถูกดึงออกไปด้านนอกและหมุนด้วยความเร็วสูงอย่างเหลือเชื่อ แรงดึงดูดของมันเพิ่มขึ้นอย่างมาก และเราถูกฉุดไปข้างหน้าด้วยอัตราเร่งความเร็วสูง\n\nทรงกลมเพลิงซึ่งดูเหมือนดาวฤกษ์ดวงเล็กๆ ได้โผล่ออกมาจากภายในชิ้นส่วนเหล่านั้น เตาหลอมนี้ซึ่งปรากฏอยู่เพียงด้านเดียวของวัตถุ ได้หมุนอย่างช้าๆ มาทางเราและกำลังปล่อยความร้อนที่รุนแรงมายังทิศทางของเรา\n\nจากนั้นคลื่นรังสีแม่เหล็กไฟฟ้าก็ปะทุขึ้น และยานของเราก็สั่นสะเทือน เสียงเตือนภัยทุกดวงบนคอนโซลเปิดทำงาน หรือส่งสัญญาณข้อผิดพลาด ยกเว้นเครื่องแปลภาษาเท่านั้น...\n\nมีข้อความปรากฏในหลายภาษาที่เรารู้จัก เขียนด้วยรหัสไบนารีว่า: §E"ไม่มีความหวังอีกแล้ว ฉันโศกเศร้า พวกเจ้าจงออกไปเสีย บัดนี้"§!"
 astral_rift.535.desc.2: "ยานพาหนะของเรามาถึงขีดจำกัดของวัสดุแล้ว\n\nเราได้เปิดใช้งานสายยึดเหนี่ยวฉุกเฉิน และกำลังเดินทางกลับพร้อมกับชิ้นส่วนตัวอย่างเท่าที่สามารถกู้คืนได้\n\nไม่ว่าสิ่งนั้นจะเป็นอะไร ดูเหมือนว่าจะอยู่นอกเหนือความสามารถของเราที่จะเข้าไปแทรกแซง"
 astral_rift.535.desc: "$astral_rift.535.answer.a$\n\n$astral_rift.535.desc.2$"
 astral_rift.536.desc: "$astral_rift.535.answer.b$\n\n$astral_rift.535.desc.2$"
 astral_rift.537.desc: "$astral_rift.535.answer.c$\n\n$astral_rift.535.desc.2$"

#############
# The Tower #
#############
 tower_rift_leader_desc: "§Y[Root.GetName]§! ได้รับการกู้ชีพกลับมาจากหอคอยอันยิ่งใหญ่ภายใน $ASTRAL_RIFT$ โดยที่ก่อนหน้านี้[Root.GetSheHe]ดำรงตำแหน่งเป็นผู้นำลัทธิวันสิ้นโลก"

 astral_rift_tower: "หอคอย(หอคอย)"

 astral_rift.600.name: "หอคอย"
 astral_rift.600.desc: "ไม่นานหลังจากเดินทางมาถึง เราได้ลงจอดบนแท่นหินซึ่งมีขนาดเข้ากับสัดส่วนของยาน §Y$tech_rift_sphere$§! ได้อย่างสมบูรณ์แบบ อันที่จริง ทำเลนี้เหมาะสมกับความต้องการของเราอย่างเห็นได้ชัด จนกระทั่งแนวคิดที่ว่ามันเป็นเรื่องบังเอิญถูกตัดออกไปทันที\n\nท้องฟ้ากว้างใหญ่และเจิดจ้าทอดตัวอยู่ตรงหน้าเราในทุกทิศทาง การสแกนเบื้องต้นระบุว่าเรากำลังนั่งอยู่บนยอดหอคอยขนาดใหญ่ ซึ่งส่วนล่างของมันถูกบดบังสายตาด้วยชั้นเมฆที่หมุนวน\n\nที่ขอบแท่น มีสิ่งมีชีวิตโดดเดี่ยวตัวหนึ่ง มันสวมเสื้อคลุมเก่าๆ ที่เต็มไปด้วยฝุ่น และดูเหมือนว่ากำลังรอต้อนรับเราอยู่"
 astral_rift.600.a: "พยายามสื่อสารกับสิ่งมีชีวิตดังกล่าว"
 astral_rift.600.b: "เฝ้าสังเกตสิ่งมีชีวิตนั้นแล้วรายงานกลับ"
 astral_rift.600.c: "สังหารมันเสีย"

 astral_rift.605.name: "การสื่อสารรหัสฐานสอง"
 astral_rift.605.desc: "เนื่องจากไม่มีวิธีถอดภาษาของสิ่งมีชีวิตดังกล่าวได้อย่างสมบูรณ์ เราจึงหันไปใช้วิธีสื่อสารโดยตรงมากกว่า โดยการกะพริบไฟภายนอกของยาน §Y$tech_rift_sphere$§! เป็นระยะๆ\n\nภายในไม่กี่อึดใจ สิ่งมีชีวิตตัวนั้นก็ทรุดลงกับพื้น ในตอนแรกเรากังวลว่าเราได้ทำร้ายมัน แต่ในไม่ช้าก็เห็นได้ชัดว่ามันเพียงแต่แสดงความเคารพหรือวิงวอนขอพร\n\nหลังจากนั้นไม่นาน กลุ่มบุคคลที่แต่งกายคล้ายๆ กันก็เข้ามาใกล้แท่นบูชา แต่ละคนถือตะกร้าซึ่งเราสันนิษฐานได้ว่าเป็นของขวัญ"
 astral_rift.605.a: "เชิญพวกเขาขึ้นมาบนยาน"
 astral_rift.605.b: "มอบบางสิ่งเป็นการตอบแทน"
 astral_rift.605.c: "ออกจากพื้นที่"

 astral_rift.610.name: "การต้อนรับที่รอคอยมานาน"
 astral_rift.610.desc: "จากความปลอดภัยในยานทรงกลม เราใช้เวลาพอสมควรในการสำรวจพื้นที่ ความสูงของเราคาดว่าอยู่ที่ประมาณ 2,500 เมตร สังคมที่อยู่ในระดับเทคโนโลยีนี้ต้องใช้ความพยายามอย่างมากในการสร้างยอดหอคอยที่ความสูงเช่นนี้ อันที่จริง เราอาจกำลังมองดูความพยายามครั้งแรกของอารยธรรมนี้ในการเอื้อมขึ้นสู่อวกาศ และที่น่าสนใจยิ่งกว่านั้นคือ แท่นหินมีรอยแกะสลักสัญลักษณ์และภาพประกอบที่ดูเหมือนกับสิ่งที่พบภายในยาน §Y$tech_rift_sphere$§! เกือบทุกประการ\n\nสิ่งมีชีวิตนั้นยืนอย่างภาคภูมิใจต่อหน้าเรา กางแขนออกกว้าง นี่เป็นช่วงเวลาแห่งความปิติยินดีอย่างเห็นได้ชัด"
 astral_rift.610.a: "เชิญพวกเขาขึ้นมาบนยาน"
 astral_rift.610.b: "มอบบางสิ่งเป็นการตอบแทน"
 astral_rift.610.c: "ออกจากพื้นที่"
 astral_rift.610.d: "สังหารสิ่งมีชีวิตดังกล่าว"

 astral_rift.611.name: "ง่ายเหมือนปอกกล้วยเข้าปาก"
 astral_rift.611.desc: "การยกยานทรงกลมขึ้นเหนือหอคอยพิธีกรรมอย่างสูงส่งต้องทำให้สิ่งมีชีวิตด้านล่างสัมผัสถึงความสำคัญทางจิตวิญญาณ โชคร้ายสำหรับพวกเขา มันตามมาอย่างรวดเร็วด้วยการทิ้งตัวลงมาของยานเราด้วยความเร็วขีดสุด ทำลายล้างสิ่งมีชีวิตทั้งหมดในบริเวณใกล้กับแท่นบูชา พวกเขายืนเงียบๆ ชูมือขึ้น จนกระทั่งถึงจุดสิ้นสุด\n\nบัดนี้เราสามารถสำรวจสภาพแวดล้อมนี้ต่อไปได้โดยไม่มีอะไรมารบกวนอีก"
 astral_rift.611.a: "สแกนดาวเคราะห์"

 astral_rift.615.name: "การเปิดต้อนรับขับสู้"
 astral_rift.615.desc: "เราเปิดยานออก และสิ่งมีชีวิตนั้นค่อยๆ เดินเข้ามาอย่างลังเล\n\nในแต่ละย่างก้าว มันเริ่มมีความมั่นใจมากขึ้น แต่เราสามารถบอกได้ว่าสัญญาณชีพของมันสูงขึ้นมาก มันรอคอยช่วงเวลานี้ให้เกิดขึ้นมานานเท่าใดแล้วนะ?\n\nเราไม่แน่ใจว่ามันรู้ได้อย่างไรว่าเราจะมา แต่เราแน่ใจว่าการพามันขึ้นมาบนยานนั้นปลอดภัย มันอ้าปากค้างด้วยความทึ่งกับอุปกรณ์ต่างๆ ในยานของเรา ด้วยความตื่นเต้นอย่างล้นพ้น มันจึงหมดสติลงบนแผ่นเหล็กดาดฟ้าในทันที\n\nหลังจากทำการฟื้นฟูร่างกายและศึกษาเอกสารที่มันม้วนเก็บไว้ในเสื้อคลุมแล้ว เราสรุปได้ว่าสิ่งมีชีวิตตัวนี้เป็นผู้นำที่มีอิทธิพลในหมู่พวกเดียวกัน\n\nเราคิดว่าหากมีการหลอมรวมเข้ากับเรา พวกเขาจะเป็นประโยชน์อย่างมากต่อสังคมของเรา"
 astral_rift.615.a: "เชิญชวนพวกเขาเข้าสู่จักรวรรดิของเรา"
 astral_rift.615.a.tt: "ได้รับนักวิทยาศาสตร์ (§Yนัก วิทยาศาสตร์§!) มาร่วมงานหลังจากผ่านไปหนึ่งปี"
 astral_rift.615.b: "ริบเอกสารของพวกเขาแล้วปล่อยตัวไป"
 astral_rift.615.b.tt: "ได้รับการสุ่มเทคโนโลยีการพัฒนาสังคมใหม่(โซไซตี้เทคโนโลยี)"

 astral_rift.620.name: "การตอบแทนซึ่งกันและกัน"
 astral_rift.620.desc: "เราจะไม่รบกวนพวกเขาอีกต่อไป\n\nการมาเยือนของเราดูเหมือนว่าจะทำให้คำทำนายโบราณเป็นจริงขึ้นมาโดยบังเอิญ ไม่ว่าด้วยวิธีใด พวกเขาก็รู้ว่าเรากำลังจะมา และเมื่อพิจารณาถึงความสำคัญอันลึกซึ้งที่พวกเขาตั้งไว้ การมาเยือนของเราก็น่าจะส่งผลกระทบอย่างมีนัยสำคัญต่ออารยธรรมของพวกเขา\n\nเราได้ตัดสินใจทิ้งของขวัญเล็กๆ น้อยๆ เป็นโลหะขั้นสูงไว้เบื้องหลังเพื่อเป็นหลักฐานแสดงความปรารถนาดีของเรา บนหนึ่งในชิ้นโลหะนั้น เราได้จารึกตำแหน่งทางคณิตศาสตร์ของระบบดาวบ้านเกิดของเราไว้ หากพวกเขาค้นพบทางมาหาเราในอนาคต\n\nด้วยความหวังว่าสิ่งนี้จะเป็นประโยชน์ต่อนักสังคมวิทยาของเรา เราจึงได้บันทึกปฏิสัมพันธ์ทั้งหมดนี้ไว้สำหรับคนรุ่นหลัง"

 astral_rift.625.name: "คำทำนายที่ถูกปฏิเสธ"
 astral_rift.625.common: "ด้วยการเบนความสนใจไปยังการสกัดทรัพยากร เราเก็บตัวอย่างจากกลุ่มเมฆรอบๆ ได้ ซึ่งพบว่าประกอบด้วยสารแอสทรัลในความเข้มข้นที่สูงอย่างน่าทึ่ง นับเป็นรางวัลที่ไม่ปกติทว่าน่ายินดียิ่ง"
 astral_rift.625.desc.killed: "เมื่อสิ่งมีชีวิต [Explorer.GetPreFTLLower] ได้รับการกำจัดแล้ว เราก็เริ่มการสำรวจบรรยากาศนอกมิติต่อไป\n\n$astral_rift.625.common$"
 astral_rift.625.desc.default: "เราจะไม่มีส่วนร่วมในการแสดงอันหลงทิศหลงทางนี้อีกต่อไป\n\nการสร้างหอคอยนี้เป็นความผิดพลาด และเรามีสิ่งที่ดีกว่าให้ทำมากกว่าการช่วยเติมเต็มคำทำนายของต่างดาว\n\n$astral_rift.625.common$"

 astral_rift.691.name: "ความก้าวหน้าของ [From.GetName]"
 astral_rift.691.desc: "กว่าหนึ่งปีที่ผ่านมา เราได้กู้ชีพบุคคลหนึ่งขึ้นมาจากหอคอยขนาดใหญ่ภายนอกรอยแยกแอสทรัล ตั้งแต่นั้นมา [From.GetHeShe] ก็ปรับตัวเข้ากับสังคมของเราได้เป็นอย่างดี ขณะนี้สามารถสื่อสารภาษาของเราได้ ความกระตือรือร้นในการช่วยเหลือเราไม่เคยลดน้อยถอยลงเลย\n\nนี่เป็นโอกาสพิเศษสำหรับเรา เนื่องจาก [From.GetHeShe] แสดงออกถึงความเข้าใจอย่างดีเยี่ยมในด้านจิตวิทยาสังคม"
 astral_rift.691.a: "[From.GetHeSheCap] รับใช้พวกเราได้ดียิ่งขึ้นในฐานะพลเมือง"
 astral_rift.691.b: "รับสมัคร [From.GetHimHer] เข้ามาร่วมงานในฐานะนักวิทยาศาสตร์"

 astral_rift.696.name: "ความตายของ [From.GetName]"
 astral_rift.696.desc: "ช่างน่าเศร้า ผู้นำ [From.GetName] ได้ล่วงลับไปแล้ว ในการร่วมเดินทางกับเราจากภายนอกรอยแยกแอสทรัล[From.GetHeShe] ได้รับการฝังศพอย่างมีเกียรติ พิธีจัดขึ้นภายในหอคอยอีกฟากหนึ่งของรอยแยกมิติ และได้รับการสังเกตการณ์จากยานกลมสำหรับทำพิธีศพที่สร้างขึ้นเป็นพิเศษ เราหวังว่า [From.GetHeShe] จะพบกับการผจญภัยครั้งใหม่ในดินแดนที่อยู่เบื้องหลัง\n\nผลกระทบอันสำคัญยิ่งที่ [From.GetHeShe] มีต่อจักรวรรดิของเราจะถูกจดจำไปอีกนานแสนนาน"
 astral_rift.696.a: "[From.GetHeSheCap] จะอยู่ในความทรงจำของเราเสมอ"

