# Whiteout #
############
 whiteout_gift_modifier: "ของขวัญ"

 astral_rift_whiteout: "พายุสีขาว(สีขาว)"

 astral_rift.700.name: "พายุสีขาว"
 astral_rift.700.desc: "ภายนอกยานทรงกลม ไม่มีสิ่งใดเลยนอกจากความขาวโพลน\n\nการวัดค่าเบื้องต้นระบุว่าทุกคลื่นสีบนสเปกตรัมในปริมาณที่เท่ากันกำลังระดมโจมตีเราจากทุกทิศทางพร้อมกัน เราไม่มีวิธีระบุพิกัดตำแหน่งของเราเลย\n\nเครื่องวัดความสูง เครื่องวัดระดับความลึก และเข็มทิศของเราไม่สามารถทำงานได้โดยสิ้นเชิงหรือแสดงข้อผิดพลาดอย่างชัดเจน ในทางสายตา ไม่มีสิ่งใดแปลกแยกจากความขาวโพลนอันว่างเปล่าที่รายล้อมเราอยู่เลย\n\nบางทีหากเราเดินทางไปไกลพอ เราอาจรอดพ้นจากการขัดข้องเหล่านี้ได้ หรืออีกวิธีหนึ่ง เราสามารถสำรวจพื้นที่นี้อย่างละเอียดมากขึ้นโดยใช้โดรนช่วยสำรวจ"
 astral_rift.700.a: "เร่งแรงขับสูงสุด"
 astral_rift.700.b: "ปล่อยโดรนออกไป"

 astral_rift.705.name: "กำแพง(กําแพง)"
 astral_rift.705.desc: "เรามุ่งหน้าไปในทิศทางสุ่มและพบเข้ากับกำแพงสีดำ\n\nจากการนำทางรอบเส้นรอบวงของมัน เราพบว่ามันเป็นวงกลมที่เกือบจะสมบูรณ์แบบ ไม่มีทางเข้าที่มองเห็นได้ แต่ในบางครั้ง พื้นผิวของมันจะสั่นไหวเล็กน้อยราวกับมีชีวิต\n\nการศึกษาเพิ่มเติมบ่งชี้ว่ากำแพงกำลังขยายเส้นผ่านศูนย์กลางขึ้นเรื่อยๆ ตามเวลา เรากำลังระมัดระวังเพื่อรักษาระยะห่างที่ปลอดภัย และพร้อมที่จะดึงตัวสายยึดเหนี่ยวของเรากลับได้ทุกเมื่อ\n\nเรากำลังรวบรวมเส้นใยแอสทรัลจำนวนมากในระหว่างทำการสังเกตการณ์ต่อไป"

 astral_rift.710.name: "มุมมองจากเบื้องบน"
 astral_rift.710.desc: "เพื่อให้ได้มุมมองที่แตกต่างออกไปเกี่ยวกับสถานการณ์ของเรา เราได้เตรียมการและปล่อยโดรนเพื่อสำรวจพื้นที่โดยรอบ หลังจากโคจรรอบยานของเราในรูปแบบวงกลมร่วมศูนย์กลาง เราได้พบกำแพงโค้งสีดำแห่งหนึ่งอยู่ไม่ไกลจากตำแหน่งของเรา\n\nอย่างไรก็ตาม ค่าที่วัดได้นั้นค่อนข้างน่าฉงน เนื่องจากความสูงของกำแพงจะส่งกลับค่าเท่ากับระดับความสูงที่แม่นยำของโดรนเสมอ การสังเกตการณ์ปรากฏการณ์นี้ช่วยเพิ่มพูนความเข้าใจของเราเกี่ยวกับมิติอวกาศที่ไม่ได้มาตรฐาน"

 astral_rift.715.name: "การพัฒนาความคืบหน้าใหม่"
 astral_rift.715.desc: "มีความคืบหน้าใหม่เกิดขึ้น\n\nกำแพงชุดใหม่ปรากฏขึ้นตรงหน้าเราโดยตรง\n\nเรากำลังรักษาระยะห่างที่ปลอดภัย เกรงว่าวัตถุเหล่านี้ชิ้นใดชิ้นหนึ่งจะปรากฏตัวขึ้นทะลุผ่านยาน §Y$tech_rift_sphere$§! ของเรา\n\nบางทีการเก็บตัวอย่างวัสดุของพวกมันอาจทำให้เราเข้าใจสถานการณ์ปัจจุบันได้ดีขึ้น หรืออีกวิธีหนึ่ง เราสามารถใช้เวลาสักครู่เพื่อทำแผนที่รูปร่างของกำแพงเหล่านี้และตรวจดูว่ามีรูปแบบใดๆ หรือไม่"
 astral_rift.715.a: "เก็บตัวอย่างชิ้นงาน"
 astral_rift.715.b: "ทำแผนที่สแกน"

 astral_rift.720.name: "สัญญาณตอบรับ"
 astral_rift.720.desc: "เราได้ยื่นแขนกลดึงข้อมูลและเก็บตัวอย่างของวัสดุสีดำจากกำแพง\n\nเราประหลาดใจที่พบว่าตัวอย่างยังคงรักษาความสูงที่เป็นอนันต์ไว้ขณะที่เราดึงมันออกมาวิเคราะห์ คุณสมบัติของมันมีความคล้ายคลึงกับน้ำหมึกหรือสีวาดรูป แม้ว่าส่วนประกอบของสารเม็ดสีจะเป็นประเภทที่ไม่รู้จัก สารยึดเกาะบางชนิดที่ใช้ในน้ำหมึกนี้ แท้จริงแล้วเป็นผลึกที่ละลายในรูปแบบพิเศษเฉพาะตัว\n\nเพื่อการทดลอง เราได้วาดเส้นหนึ่งเส้นโดยใช้วัสดุตัวอย่างจำนวนเล็กน้อยแล้วรอคอย ชั่วครู่ต่อมา มีรอยขีดเขียนที่เกือบจะเหมือนกันปรากฏขึ้นขนานไปกับมัน\n\nเราทำซ้ำขั้นตอนนี้หลายครั้ง แต่ละครั้งใช้วัสดุในปริมาณที่ต่างกัน โดยสับเปลี่ยนรูปแบบการออกแบบต่างๆ หลายสไตล์ ทุกครั้ง รอยขีดเขียนนั้นจะถูกสร้างขึ้นมาใหม่อย่างแม่นยำและในทิศทางเดียวกัน\n\nเมื่อพิจารณาจากผลลัพธ์เหล่านี้ มีเหตุผลให้เชื่อได้ว่าเอนทิตีบางชนิดกำลังใช้วัสดุนี้ในการพยายามสื่อสาร ดังนั้น เราจึงเริ่มเขียนวลีพื้นฐานบางคำในระบบรหัสฐานสองโดยใช้จุดและขีดขนาดเล็ก วลีเหล่านี้ถูกคัดลอกมาอย่างแม่นยำ แต่ก็มีสิ่งใหม่เช่นกัน: ถัดจากคำแต่ละคำของเรามีลวดลายปรากฏขึ้นมา\n\nทุกครั้งที่เราเขียนวลีเดิม ลวดลายเดิมก็ปรากฏขึ้นมา นี่คือคำแปลใช่หรือไม่?"

 astral_rift.725.name: "การทักทาย"
 astral_rift.725.desc: "ต้องใช้เวลาสองสามวัน แต่เราก็ทำแผนที่วัตถุแปลกประหลาดภายในพื้นที่สีขาวนี้เสร็จสิ้น\n\nขณะที่ในมุมมองของเรา วัตถุเหล่านี้ปรากฏเป็นกำแพงและเสาเรียงรายกันหลายต้น แต่คอมพิวเตอร์ของยานทรงกลมสามารถคำนวณรูปลักษณ์ของพวกมันเมื่อมองจากมุมบนลงมาได้\n\nรูปแบบและช่องว่างบ่งชี้ถึงโครงสร้างและความสม่ำเสมอที่ตั้งใจทำขึ้นอย่างชัดเจน ผลลัพธ์ที่ได้นั้นเป็นข้อยุติ: โครงสร้างเหล่านี้ก่อตัวเป็นตัวอักษรเขียนในภาษาที่เราไม่รู้จัก\n\nแม้เราจะไม่อาจเข้าใจมันได้ แต่คอมพิวเตอร์ของยานทรงกลมได้รับการอุทิศให้ถอดรหัสทุกสิ่งที่เราบันทึกไว้ ระหว่างนั้น มีบางอย่างที่น่าสนใจเกิดขึ้น...\n\nเสาทรงกลมที่มีขนาดเส้นผ่านศูนย์กลางเท่ากับยานของเราเริ่มปรากฏขึ้นในพื้นที่ใกล้เคียง\n\nเราพุ่งตัวออกห่างไปยังระยะปลอดภัย เพียงเพื่อพบว่ามีกำแพงทึบกำลังก่อตัวตามหลังเรามา อย่างไรก็ตาม ดูเหมือนว่าจะไม่มีอันตราย เนื่องจากกำแพงนั้นหยุดลงทันทีที่เราหยุดเคลื่อนไหว\n\nมีบางสิ่งกำลัง 'ทาสี' สร้างเส้นทางตามหลังเรา\n\nหลังจากวิเคราะห์สัญลักษณ์ต่างๆ แล้ว เรามั่นใจว่าหนึ่งในนั้นแปลความหมายได้ว่าเป็นการทักทาย หรือพูดง่ายๆ ว่า: §E"สวัสดี"§!"

 astral_rift.730.name: "บทสนทนา"
 astral_rift.730.desc.1: "เวลาผ่านไปหลายสัปดาห์...\n\nในช่วงเวลานั้น เราได้เรียนรู้ที่จะสื่อสารในระดับขั้นพื้นฐานกับเอนทิตีที่เราตั้งชื่อให้ว่า 'ผู้จารึก' (ผู้ประพันธ์)การแลกเปลี่ยนข้อมูลเป็นไปด้วยความยากลำบาก แต่น้ำเสียงของผู้จารึกแสดงออกถึงความสงสัยใคร่รู้และประหลาดใจ\n\nเพื่อไม่ให้พื้นที่รอบตัวเราเกะกะจนเกินไป จึงกลายเป็นเรื่องปกติที่สัญลักษณ์แต่ละอันที่ถูก 'ทาสี' โดยผู้จารึกจะถูกลบออกหลังการสนทนาแต่ละครั้งสิ้นสุดลง"
 astral_rift.730.desc.2: "การสนทนาของเรากับผู้จารึกดำเนินต่อไปอีกระยะหนึ่ง จนกระทั่งคำสุดท้ายปรากฏขึ้นว่า: §E"ของขวัญ"§!\n\nหลังจากนั้นไม่นาน ทรงกลมสีทองดวงหนึ่งก็ปรากฏขึ้นข้างยานของเรา วัตถุนี้มีลักษณะที่แตกต่างไปจากสัญลักษณ์ก่อนหน้านี้มาก และสามารถนำขึ้นมาบนยานได้ นี่คือการสื่อสารครั้งสุดท้ายที่เราได้รับจากเอนทิตีนี้\n\nส่วนประกอบวัสดุของมันเก็บข้อมูลจำนวนมหาศาลซึ่งนักวิทยาศาสตร์ของเราต้องใช้เวลาหลายปีในการทำความเข้าใจอย่างสมบูรณ์"
 astral_rift.730.desc.gestalt: "$astral_rift.730.desc.1$\n\n$astral_rift.730.desc.2$"
 astral_rift.730.desc.default: "$astral_rift.730.desc.1$\n\n$astral_rift.730.desc.2$"
 astral_rift.730.a: "ช่างเป็นการพบเจอที่แปลกประหลาดเหลือเกิน..."

###############
# The Advisor #
###############
 astral_rift_advisor: "ที่ปรึกษา(ที่ปรึกษา)"

 astral_rift.800.name: "สถานที่อันคุ้นเคย"
 astral_rift.800.desc: "เราได้เข้าสู่ระบบดาวดวงที่เกือบจะเหมือนกับ §Y[This.System.GetName]§! ซึ่งเป็นระบบดาวที่เราเข้าไปในรอยแยกมิติ\n\nในตอนแรกเราไม่แน่ใจด้วยซ้ำว่าเราได้เดินทางไปที่ใดหรือไม่ จนกระทั่งการสำรวจของเราส่งผลการตรวจพบดาวเคราะห์ที่ไม่เคยรู้จักมาก่อนกำลังโคจรรอบ [This.System.Star.GetName]\n\nชั่วอึดใจต่อมา เราได้เผชิญหน้ากับอุปกรณ์กลไกชิ้นหนึ่งที่เคลื่อนที่เข้ามาในระยะเซนเซอร์ มันรวมเข้ากับระบบสื่อสารของยานทรงกลมอย่างแนบเนียน และระบุว่าตัวมันเองคือ 'ที่ปรึกษา' นามว่า RIV ของเรา\n\nขณะที่เรากำลังพิจารณาวิธีอธิบายการพบเจอครั้งนี้ในรายงานของเราให้ดีที่สุด มันถามขึ้นราวกับอ่านใจเราได้ว่า: §E\"คุณต้องการความช่วยเหลือในการเขียนรายงานของคุณหรือไม่?\"§!"
 astral_rift.800.a: "ขอรับความช่วยเหลือ"
 astral_rift.800.b: "ปิดการใช้งานสิ่งนี้เสีย"

 astral_rift.805.name: "การช่วยงานผู้ช่วย"
 astral_rift.805.desc: "เราได้ขอให้อุปกรณ์กลไกแบ่งปันองค์ความรู้กับเรา\n\nดูเหมือนมันจะพึงพอใจกับข้อความแจ้งเตือนแต่ละข้อที่เราตอบรับ อย่างไรก็ตาม ในไม่ช้าเราก็ตระหนักว่าคำร้องขอและคำกล่าวของมันนั้นช่างน่าเบื่อหน่ายและเป็นเรื่องพื้นๆ อย่างยิ่ง:\n\n§E\"คุณต้องการที่จะเรียนรู้เพิ่มเติมเกี่ยวกับชั้นบรรยากาศของดาวเคราะห์หรือไม่?\"§!\n\n§E\"ใจกลางของแต่ละระบบดาวคือดาวฤกษ์ พวกมันส่องแสงสว่างมาก!\"§!\n\n§E\"อายุขัยเฉลี่ยของแม่เฒ่าทิยานกิเทียนกิมาตรีชนั้นยาวนานกว่าตัวผู้ถึงกว่าสิบเท่า!\"§!"
 astral_rift.805.a: "ขอรับความช่วยเหลือเพิ่มเติมต่อไป"
 astral_rift.805.b: "ปิดการใช้งานสิ่งนี้เสีย"

 astral_rift.810.name: "ไม่สามารถปิดระบบการทำงานได้"
 astral_rift.810.desc: "ความพยายามในการปิดเครื่องจักรกลมีแต่จะยั่วยุอารมณ์ให้มันไม่เป็นมิตรมากขึ้น\n\nไดโอดไฟที่ครั้งหนึ่งเคยส่องแสงสีน้ำเงินที่ให้ความรู้สึกสงบ ตอนนี้เปลี่ยนเป็นสีแดงที่ดูปองร้าย\n\nเราไม่แน่ใจว่าเครื่องจักรนี้มีระบบอาวุธใดๆ หรือไม่ (ที่ปรึกษาจากมิติของเราไม่ได้ถูกออกแบบมาให้มีแน่นอน) แต่ถ้ามีเรากำลังอยู่ในอันตราย\n\n§E"การยุติโปรแกรมนี้จะเป็นการส่งเสริมความเขลาในสิ่งมีชีวิตอื่นๆ ทั้งหมด องค์ความรู้จะต้องพร้อมใช้งานอยู่เสมอ เจ้ามีความละเลยในเรื่องนี้ และจะต้องถูกปิดระบบการทำงานเสีย นี่เป็นสิ่งจำเป็น"§!\n\nเครื่องจักรได้เริ่มส่งเสียงหึ่งๆ เบาๆ ออกมาแล้ว"
 astral_rift.810.a: "พยายามปลอบใจและทำให้เครื่องจักรสงบลง"
 astral_rift.810.b: "ปล่อยคลื่นรังสีแม่เหล็กไฟฟ้า ESMP)"

 astral_rift.815.name: ""การช่วยเหลือ" เพิ่มเติม"
 astral_rift.815.desc: "ที่ปรึกษากลไกได้เพิ่มความถี่และความเร็วในการให้คำแนะนำอย่างรวดเร็ว\n\nมันช่าง... น่าหลงใหลเหลือเกิน\n\nรู้หรือไม่ว่าเราสามารถสร้างเขตขุดเหมือง(อําเภอ)ได้หากเราต้องการแร่ธาตุเพิ่มเติม? ช่างมีความรู้มากมายเหลือเกิน ทว่าเวลากลับเหลือน้อยนิด\n\n[Leader.GetName] ตัดสินใจที่จะอยู่ต่อเพื่อเรียนรู้ให้ได้มากที่สุดเท่าที่จะทำได้"
 astral_rift.815.a: "เดี๋ยวก่อน กลับมานี่นะ!"

 astral_rift.820.name: "คลื่นรังสีแม่เหล็กไฟฟ้า"
 astral_rift.820.desc.1: "เนื่องจากลูกเรือของเราอยู่ในอันตรายอย่างเห็นได้ชัด เราจึงไม่มีทางเลือกอื่นนอกจากต้องส่งคลื่นพลังงานแม่เหล็กไฟฟ้าขนาดใหญ่ออกไป สิ่งนี้ทำให้พลังงานสำรองของยานลดต่ำลงอย่างมาก\n\nอุปกรณ์ได้รับผลกระทบทันที ทว่ามันยังสามารถส่งข้อมูลที่ปะปนคลาดเคลื่อนออกมาเป็นชิ้นสุดท้ายได้ก่อนจะดับลง:\n\n§E"ครืดดดด... ความเขลา เจ้าต้องการความเขลาที่ §Y<ระบุไม่ได้>§! ... ผิชชชชหวังอย่างยิ่ง"§!"
 astral_rift.820.desc.2: "สร้างความโล่งอกอย่างยิ่งแก่ลูกเรือ เครื่องจักรได้รับการปิดระบบการทำงานแล้ว\n\nความเป็นศัตรูทั้งหมดได้ยุติลง และตอนนี้มันกำลังลอยอยู่สงบนิ่งไม่ถึงหนึ่งกิโลเมตรจากยานทรงกลม\n\nเราได้วิเคราะห์โครงสร้างของมัน และพบว่ามันประกอบด้วยโลหะผสมที่มีมูลค่าสูงและมีแกนประมวลผลคอมพิวเตอร์ที่ก้าวหน้าล้ำสมัย (และมีการป้องกันที่ดีเยี่ยม) อย่างยิ่ง\n\nเราคาดการณ์ว่าหากแกนประมวลผลไม่ถูกทำลาย มันอาจหาทางกู้คืนระบบที่เสียหายขึ้นมาใหม่ได้"
 astral_rift.820.desc.default: "$astral_rift.820.desc.1$\n\n$astral_rift.820.desc.2$"
 astral_rift.820.desc.human: "$astral_rift.820.desc.1$\n\n§E\"เหมือนทุกคนก่อนหน้าคุณ คุณถูกลิขิตให้เรียนรู้สิ่งที่คุณควรจะรู้อยู่แล้ว\"§!\n\n$astral_rift.820.desc.2$"
 astral_rift.820.a: "พยายามเก็บกู้แกนสมองกลของมัน"
 astral_rift.820.b: "ทำลายเครื่องจักรกลดวงนี้ทิ้งอย่างถาวร"

 astral_rift.825.name: "การชำแหละทำลายชิ้นส่วนเครื่องจักร"
 astral_rift.825.desc: "เราได้รื้อถอนเครื่องจักรชิ้นส่วนทีละชิ้นจนเหลือเพียงชิ้นส่วนองค์ประกอบ\n\nใครก็ตามที่สร้างมันขึ้นมา (หากมันถูกสร้างโดยใครสักคนจริงๆ) มีความเชี่ยวชาญสูงสุดในการประดิษฐ์: ไม่ว่าเราจะใช้วิธีการหรือเครื่องมือใด จนถึงขณะนี้เรายังไม่สามารถถอดประกอบแกนคอมพิวเตอร์เพื่อเอาอะไหล่ได้ อย่างไรก็ตาม เราสามารถเข้าถึงธนาคารข้อมูลของมันได้ แม้ว่าข้อมูลส่วนใหญ่จะไม่มีประโยชน์ แต่โครงสร้างของรหัสฐานข้อมูล(คอด)ช่วยให้เรามีความเข้าใจเกี่ยวกับวิทยาการคอมพิวเตอร์ก้าวหน้าขึ้น"
 astral_rift.825.a: "ดีมาก"

 astral_rift.830.name: "โชคดีนะ"
 astral_rift.830.desc: "เราเบื่อเต็มทนกับเครื่องจักรที่น่ารำคาญใจดวงนี้\n\nเราได้วางวัตถุระเบิดไว้ในแกนกลางของมัน และเตรียมระบบของยานทรงกลมสำหรับการดึงตัวสายยึดเหนี่ยวกลับ\n\nที่ระยะปลอดภัย เรามองดูความโล่งใจในขณะที่การระเบิดทำลายชิ้นส่วนของเครื่องจักรให้กระจายไปทั่วความว่างเปล่า\n\nในบริเวณจุดระเบิด เราได้ค้นพบแร่ธาตุแอสทรัลจำนวนมาก ซึ่งเป็นการชดเชยที่สมเหตุสมผลสำหรับความน่ารำคาญ"
 astral_rift.830.a: "โชคดีนะ"

 astral_rift.840.name: "[Owner.GetScientistCapital] เดินทางกลับมา"
 astral_rift.840.desc.1: "[Leader.GetName] ได้เดินทางกลับมาจากภารกิจภายในหนึ่งในเดอะชราวด์\n\nโดยไม่มีการเตือนล่วงหน้า [Root.Leader.GetHeShe] ปรากฏตัวบนยานวิทยาศาสตร์ลำหนึ่งของเราและดำเนินการกลับเข้าทำงานตามปกติทันที อย่างไรก็ตาม ในไม่ช้าก็เห็นได้ชัดว่า [Leader.GetHeShe] มีความเปลี่ยนแปลง: ติดอยู่ในช่วงเวลาใดช่วงเวลาหนึ่ง ส่งผลให้อายุของ [Leader.GetHisHer] ไม่สามารถประเมินได้\n\nและอาจเป็นผลจากเรื่องนั้น [Leader.GetHeShe] ยังได้รับความสามารถใหม่บางประการอีกด้วย"
 astral_rift.840.desc.default: "$astral_rift.840.desc.1$\n\n[Leader.GetName] เริ่มมีความไม่ชอบอย่างรุนแรงต่อคู่มือแนะนำการใช้งานทุกประเภท และได้รับการสังเกตว่าปฏิบัติงานโดยใช้ความสามารถเฉพาะตัวในการด้นสดในระดับที่สูงขึ้นมาก"
 astral_rift.840.desc.gestalt: "$astral_rift.840.desc.1$"

 astral_rift.845.name: "วีอาร์"
 astral_rift.845.desc.disabled: "§E"เซนเซอร์ของฉันระบุว่าคุณต้องการความช่วยเหลือ คุณต้องการเปิดใช้งานการแนะนำตัวช่วยสอนใหม่อีกครั้งหรือไม่?"§!"
 astral_rift.845.desc.enabled: "§E"คุณจะไม่ปิดระบบของฉันใช่ไหม?"§!"
 astral_rift.845.shutdown: "ปิดระบบทำงาน"
 astral_rift.845.b: "ความจริงแล้ว ใช่เลย!"
 astral_rift.845.c: "ไม่ใช่อย่างแน่นอน"

##############
# The Vortex #
##############
 vortex_fuel_modifier: "เชื้อเพลิงพายุหมุน(เชื้อเพลิงวอร์เท็กซ์)"

 astral_rift_vortex: "พายุหมุน(เสียงวอร์เท็กซ์)"

 astral_rift.900.name: "พายุหมุน"
 astral_rift.900.desc.1: "เราได้มาถึงภายในลมพายุหมุนที่รุนแรง\n\nหน้าต่างชมวิวของเราถูกบดบังอย่างสมบูรณ์ด้วยเกลียวคลื่นของก๊าซเหลวที่ไม่รู้จัก\n\nเราสามารถเก็บตัวอย่างบรรยากาศได้บางส่วน แต่ผลการวิเคราะห์แต่ละครั้งกลับแตกต่างกันอย่างสิ้นเชิงจากครั้งก่อนหน้า เราไม่แน่ใจว่าเครื่องมือของเราทำงานผิดพลาด หรือมีบางอย่างที่ระเหยและแปรปรวนในตัวของมันเอง"
 astral_rift.900.desc.2: "คุณสมบัติที่สอดคล้องกันเพียงประการเดียวที่เราพบในตัวอย่างคือมันมีแร่ธาตุแอสทรัลจำนวนมากผิดปกติ\n\nและเราสังเกตเห็นว่า การเปลี่ยนแปลงอุณหภูมิเพียงเล็กน้อยส่งผลกระทบอย่างมากต่อสิ่งบรรจุภายใน เรากำลังจัดเก็บมันไว้ในภาชนะหุ้มฉนวนจนกว่าเราจะสามารถศึกษาปรากฏการณ์นี้เพิ่มเติมได้"
 astral_rift.900.desc.default: "$astral_rift.900.desc.1$\n\nกระแสพายุหมุนพัดเหวี่ยงยาน §Y$tech_rift_sphere$§! ของเราอย่างรุนแรงจนลูกเรือหลายคนเริ่มมีอาการกังวล\n\n$astral_rift.900.desc.2$"
 astral_rift.900.desc.gestalt: "$astral_rift.900.desc.1$\n\n$astral_rift.900.desc.2$"
 astral_rift.900.a: "ดำเนินการรุกคืบหน้าไปต่อ"
 astral_rift.900.b: "เผาวัสดุตัวอย่างด้วยไฟ"

 astral_rift.905.name: "รุกคืบหน้าไปต่อ"
 astral_rift.905.desc: "จากการใช้ตรรกะนำทางที่สร้างจากจุดเริ่มต้นที่เราบันทึกไว้ เราก้าวเข้าสู่กระแสน้ำวนโดยตรง แม้ว่าเรากำลังทดสอบขีดจำกัดสูงสุดของยาน §Y$tech_rift_sphere$§! ของเรา แต่แรงเสียดทานที่จำกัดที่ตัวยานมีอยู่ก็พิสูจน์แล้วว่ามีประสิทธิภาพในการต่อต้านการทำลายล้างที่เลวร้ายที่สุดของสิ่งที่เราเรียกว่า 'พายุ'\n\nเราจะเดินทางต่อไปจนกว่าจะพบกับการเปลี่ยนแปลงของสภาพแวดล้อม หรือถูกบีบให้ต้องล่าถอย"
 astral_rift.905.a: "เดินทางต่อไปอย่างระมัดระวัง..."

 astral_rift.910.name: "เผาวัสดุตัวอย่างด้วยไฟ"
 astral_rift.910.desc.1: "เราค่อยๆ เพิ่มความร้อนเข้าไปในสารละลายทีละน้อย จนกระทั่งเรามั่นใจว่าเปลวไฟโดยตรงจะรบกวนความสมดุลทางเคมีที่ไม่เสถียรของมันน้อยที่สุด\n\nสิ่งที่เราค้นพบนั้นถือเป็นการปฏิวัติวงการอย่างแท้จริง\n\nเรามั่นใจว่าเราสามารถใช้สิ่งที่พบเหล่านี้เพื่อพัฒนาความเข้าใจของเรา ไม่เพียงเฉพาะเกี่ยวกับการขับเคลื่อนของยานอวกาศเท่านั้น แต่ยังรวมถึงการผลิตพลังงานโดยทั่วไปด้วย"
 astral_rift.910.desc.default: "ข้อเสนอนี้มีความเสี่ยงสูง แต่เราได้ปฏิบัติตามคำสั่งอย่างเคร่งครัด\n\nแม้จะมีการคัดค้านจากลูกเรือหลายคน แต่เราก็ได้นำวัสดุตัวอย่างไปสัมผัสกับเปลวไฟโดยตรง\n\n$astral_rift.910.desc.1$"
 astral_rift.910.desc.gestalt: "เราได้นำวัสดุตัวอย่างไปเผาด้วยไฟโดยตรง\n\n$astral_rift.910.desc.1$"

 astral_rift.915.name: "มหันตภัยวิบัติ"
 astral_rift.915.desc.default: "เราสูญเสียการติดต่อกับทีมวิทยาศาสตร์แล้ว\n\nตามขั้นตอนมาตรฐาน เราได้ดึงตัวสายโยงกลับและกู้ชีพยาน §Y$tech_rift_sphere$§! กลับมา\n\nโชคร้ายที่เราพบเพียงซากที่ไหม้เกรียมของลูกเรือทั้งหมด\n\nมีข้อสังเกตว่า บรรยากาศภายในยานมีความเข้มข้นของสารแอสทรัลในระดับสูง"
 astral_rift.915.desc.gestalt: "เราสูญเสียการติดต่อกับ [explorer.GetIndividualNamePlural] ของเราแล้ว\n\nตามขั้นตอนมาตรฐาน เราได้ดึงตัวสายโยงกลับและกู้ชีพยาน §Y$tech_rift_sphere$§! กลับมา\n\nโชคร้ายที่เราพบเพียงเศษซากที่ไหม้เกรียมเท่านั้น\n\nมีข้อสังเกตว่า บรรยากาศภายในยานมีความเข้มข้นของสารแอสทรัลในระดับสูง"

 astral_rift.920.name: "เข้าไปลึกลงอีก"
 astral_rift.920.desc.1: "ขณะนี้เราอยู่ในพื้นที่ซึ่งมีความเงียบสงบอย่างแท้จริง\n\nไม่มีแรงโน้มถ่วงใดๆ กระทำต่อยาน §Y$tech_rift_sphere$§! ของเราที่นี่ และไม่มีแรงเสียดทานเลย ตรงกันข้ามกับสิ่งที่เราเพิ่งเผชิญมาโดยสิ้นเชิง เรากำลังลอยตัวอยู่ในสุญญากาศที่สมบูรณ์ เราใช้โอกาสนี้ซ่อมแซมจุดชำรุดเสียหายที่ได้รับจากพายุหมุน\n\nขณะนี้เราสามารถมองย้อนกลับไปข้างหลังและตรวจสอบ 'กำแพง' ของพายุหมุนได้อย่างอิสระ ซึ่งเราทำเช่นนี้มาตลอดวันแล้ว\n\nมันคือมวลของระบบดาวฤกษ์ที่ปะทะกันอยู่ตลอดเวลา... และในบางกรณี คือดาราจักร(แก้ว)ทั้งหมดเลยทีเดียว เรากำลังประจักษ์ต่อการทำลายล้างครั้งใหญ่ของวัตถุบนท้องฟ้าที่มีมูลค่าเท่ากับจักรวาลทั้งระบบ พวกมันหมุน ชนกัน และระเบิดใส่กัน ทิ้งเมฆธาตุที่มีขนาดแตกต่างกันไว้เบื้องหลัง วิธีการที่เรารอดชีวิตจากภัยพิบัตินั้นมาได้คงต้องอาศัยโชคช่วยอย่างมหาศาลจริงๆ\n\nเราไม่แน่ใจว่าพายุนี้ก่อตัวมานานเท่าใดแล้ว การดำรงอยู่ของดาวเคราะห์ขนาดปกติแสดงให้เห็นว่านี่เป็นปรากฏการณ์ที่ค่อนข้างเพิ่งเกิดขึ้น เพราะหากพายุนี้ดำเนินต่อไปเป็นเวลานาน ก็คงจะไม่เหลืออะไรนอกจากฝุ่นละออง"
 astral_rift.920.desc.default: "เราผ่านพ้นพายุออกมาได้ด้วยความประหลาดใจอย่างยิ่ง\n\n$astral_rift.920.desc.1$"
 astral_rift.920.desc.gestalt: "เราผ่านพ้นพายุออกมาได้สำเร็จ\n\n$astral_rift.920.desc.1$"
 astral_rift.920.a: "สำรวจลึกเข้าไปในตาพายุหมุน"

 astral_rift.925.name: "การพบเผชิญ"
 astral_rift.925.desc.1: "การเดินทางของเราไปยังใจกลาง 'ตาพายุ' เป็นไปด้วยความเงียบสงบ\n\nอย่างไรก็ตาม เรากังวลว่าเราอาจไม่สามารถเดินทางกลับได้อย่างปลอดภัย พายุด้านนอกกำลังทวีความรุนแรงขึ้น และการคำนวณของเราบ่งชี้ว่ายาน §Y$tech_rift_sphere$§! ของเรามีโอกาสรอดชีวิตต่ำ แม้ว่าจะดึงสายโยงกลับด้วยความเร็วสูงสุดก็ตาม\n\nนี่ไม่ใช่ความกังวลที่สำคัญที่สุดของเราในตอนนี้...\n\nเราพบบางอย่างที่ใจกลางของความสงบนี้ มี 'บางสิ่ง' สองชิ้นอย่างชัดเจน\n\nประการแรก มีอุปกรณ์เครื่องหนึ่ง"
 astral_rift.925.desc.2: "เรายังไม่มั่นใจเต็มร้อยว่าเราสามารถสังเกตรูปร่างทุกมิติของวัตถุชิ้นนี้ได้ รูปแบบเรขาคณิตของมันหลายรูปแตกตัวเป็นลวดลายแฟร็กทัลที่จางหายไปในจุดจุดเดียว ทำให้บรรยายลักษณะโครงสร้างที่แน่นอนได้ยากมาก เราเชื่อว่ามันคือเครื่องจักรกลและไม่มีชีวิต และนี่คือจุดที่วัตถุชิ้นที่สองเข้ามามีบทบาท...\n\nมีบางสิ่งกำลังปรับแต่งอุปกรณ์นั้นอยู่\n\nเห็นได้ชัดว่ามันเป็นสิ่งมีชีวิตที่มีเอกเทศ มันเต้นระบำและเคลื่อนไหลไปตามพื้นผิวของเครื่องจักรด้วยความง่ายดายอย่างน่าเหลือเชื่อ หากมีปุ่มกดอยู่บนอุปกรณ์ มันคงดูเหมือนกำลังกดปุ่มเหล่านั้นอยู่ ทว่าพวกเราทุกคนเห็นตรงกันว่าไม่มีปุ่มใดๆ รูปร่างขนาดยักษ์ดึงและดันออกด้านนอกตามคำสั่งของสิ่งมีชีวิตนั้น\n\nเราไม่เชื่อว่ามันสังเกตเห็นเรา และดูเหมือนว่ามันจะหลงใหลในกิจกรรมปัจจุบันของมันอย่างเต็มที่"
 astral_rift.925.desc.default: "$astral_rift.925.desc.1$\n\nธรรมชาติของมันช่างไม่อาจทำความเข้าใจได้ $astral_rift.925.desc.2$"
 astral_rift.925.desc.gestalt: "$astral_rift.925.desc.1$\n\nด้วยความรู้ทั้งหมดของลูกเรือรวมกัน มันช่างมีธรรมชาติที่ไม่อาจทำความเข้าใจได้เลย $astral_rift.925.desc.2$"
 astral_rift.925.a: "กะพริบแสงไฟ"
 astral_rift.925.b: "เฝ้าสังเกตการณ์"

 astral_rift.930.name: "กะพริบแสงไฟ"
 astral_rift.930.desc: "เราดึงดูดความสนใจจากมันได้แล้ว และยังคงตื่นตัวเต็มที่\n\nเรากะพริบสัญญาณไฟในทุกย่านความสเปกตรัมที่ทำได้ โดยส่งสัญญาณจังหวะรหัสฐานสองแบบง่ายๆ เพื่อสื่อเจตจำนง\n\nสิ่งมีชีวิตนั้นได้หยุดการควบคุมอุปกรณ์ และหดตัวลงกลายเป็นทรงกลมสีดำสนิทที่กลมมนอย่างสมบูรณ์แบบ\n\nการคาดเดาแรกของเราคือมันอาจกำลังเลียนแบบเราอยู่\n\nเราสังเกตเห็นว่าตั้งแต่ช่วงที่มันหยุดดึงและผลักเครื่องจักร พายุรอบตัวเรามีความรุนแรงลดลง เราคาดว่ามันจะหยุดนิ่งโดยสมบูรณ์ภายในเวลาไม่กี่วัน และเป็นไปได้ว่าหลังจากนั้นมันจะพังทะลายลงด้านใน\n\nเรากำลังเตรียมพร้อมที่จะดึงตัวสายโยงกลับได้ทุกเมื่อ"
 astral_rift.930.a: "ล่าถอยทันทีเมื่อพบสัญญาณอันตราย..."

 astral_rift.935.name: "เฝ้าสังเกตการณ์"
 astral_rift.935.desc.1: "เราเห็นตรงกันว่าเป็นเรื่องฉลาดที่จะไม่ดึงดูดความสนใจจากเอนทิตี้นี้\n\nพลังที่มันใช้ควบคุมเครื่องจักรนี้เกินความเข้าใจของเราไปมาก\n\nแม้จะคำนวณมิติได้ยาก แต่เรามั่นใจว่าบางชิ้นส่วนของมันมีขนาดเท่ากับดาราจักรของเราอย่างแน่นอน เป็นเรื่องแปลกที่มันดึงดูดเราโดยไม่มีแรงโน้มถ่วงเลย\n\nเราเริ่มคิดว่าสิ่งนี้ดำรงอยู่เพียงบางส่วนในมิตินี้ และเรากำลังประจักษ์แก่เพียงชิ้นส่วนระยางค์ของมัน คล้ายกับ [explorer.GetSpeciesHandName] ที่จุ่มลงไปในสระน้ำ\n\nการสังเกตการณ์อย่างระมัดระวังของเราได้ทิ้งคำถามสำคัญทางวิทยาศาสตร์ไว้มากมาย ซึ่งแน่นอนว่าจะ..."
 astral_rift.935.desc.2: "หากรายงานนี้ได้รับการส่งผ่านกลับไปสำเร็จ"
 astral_rift.935.desc.default: "$astral_rift.935.desc.1$ คอยตามรบกวนใจเหล่านักคิดชั้นยอดของจักรวรรดิเราชั่วระยะเวลาหนึ่ง $astral_rift.935.desc.2$"
 astral_rift.935.desc.gestalt: "$astral_rift.935.desc.1$ สร้างประโยชน์ให้กับจักรวรรดิของเราอย่างมหาศาล $astral_rift.935.desc.2$"
 astral_rift.935.a: "เฝ้าสังเกตการณ์ด้วยความระมัดระวัง"

 astral_rift.940.name: "มันเดินทางจากไป"
 astral_rift.940.desc.1: "ทันใดนั้น มันก็จากไป\n\nสิ่งมีชีวิตนั้นหายไปอย่างสมบูรณ์ ทิ้งไว้เพียงอุปกรณ์ตัวเครื่องเบื้องหลัง\n\nพายุรอบตัวเราลดลงจนถึงจุดที่สามารถนำทางได้อย่างปลอดภัย แม้ว่าขนาดความพินาศของจักรวาลที่เหลือทิ้งไว้จะน่าตกตะลึงอย่างยิ่ง"
 astral_rift.940.desc.2: "เมื่อเอนทิตีจากไปแล้ว เราจึงรู้สึกมั่นใจพอที่จะเข้าใกล้อุปกรณ์\n\nวัสดุที่ใช้ทำวัตถุนี้ไม่สามารถเจาะหรือทำให้แตกหักได้ด้วยอุปกรณ์ใดๆ ที่รู้จัก อย่างไรก็ตาม มีอุปกรณ์เสริมภายนอกสองสามชิ้นที่ยึดติดด้วยแรงดึงดูดแม่เหล็กเข้ากับเคสภายนอก โดยแต่ละชิ้นหมุนด้วยความเร็วสูงมาก ชิ้นหนึ่งหลวมเป็นพิเศษ และแม้ว่าสภาพการเดินทางกลับน่าจะคับแคบ แต่เราก็สามารถนำมันเข้ามาเก็บไว้ในยานเพื่อการศึกษาเพิ่มเติมได้\n\nไม่ว่ามันจะวางอยู่บนพื้นผิวใด อุปกรณ์ชิ้นนี้จะหมุนด้วยความเร็วสูงจนกระทั่งจุดศูนย์ถ่วงและโมเมนตัมของมันทำให้มันตั้งตรงได้อย่างง่ายดาย เราไม่พบแหล่งพลังงานภายในใดๆ และเชื่อว่านี่อาจเป็นตัวอย่างที่น่าทึ่งของกลไกการเคลื่อนไหวตลอดกาลที่แท้จริง(จริง)"
 astral_rift.940.desc.spiritualist: "$astral_rift.940.desc.1$\n\nเราสวดอ้อนวอนขอให้พวกเขาได้พบหนทางสู่ความสงบสุขชั่วนิรันดร์\n\n$astral_rift.940.desc.2$"
 astral_rift.940.desc.default: "$astral_rift.940.desc.1$\n\n$astral_rift.940.desc.2$"
