l_english:

#################
# Ruined Planet #
#################
 astral_rift_riftworld: "ดาวเคราะห์ที่พังทลาย"

 riftworld_leader_description: "ได้รับการนำตัวกลับมาจากห้วงลึกของรอยแยกแอสทรัล ใกล้กับดาวเคราะห์บ้านเกิดของเรา §Y[Root.GetName]§! คือสมาชิกจากโลกบ้านเกิดของบรรพบุรุษเราในมิติคู่ขนาน"
 spirit_of_ancestors_modifier: "เจตจำนงของบรรพบุรุษเรา"
 spirit_of_ancestors_modifier_desc: "การเผชิญหน้ากับรากเหง้าต่างมิติของเราทำให้เรามีความเข้าใจอย่างลึกซึ้งยิ่งขึ้นเกี่ยวกับขอบเขตขีดความสามารถทั้งหมดของเรา"

 starlight_vanguard_default: "กองหน้าแสงดารา(สตาร์ไลท์ แวนการ์ด)"
 starlight_vanguard_homicidal: "ผู้พิชิตแสงดารา(Starlight Vanquishers)"

 astral_rift.1.name: "ดาวเคราะห์ที่พังทลาย"
 astral_rift.1.desc.common.1: "การเดินทางเข้าสู่รอยแยกมิติใกล้กับ [explorer.capital_scope.GetName] ได้นำพาเราไปสู่ระนาบวงโคจรของดาวเคราะห์ดวงหนึ่งซึ่งอยู่ในสภาพพังทลาย...\n\nเมื่อเข้าสู่ชั้นบรรยากาศ เราได้พบกับภูมิประเทศที่เต็มไปด้วยหลุมอุกกาบาตลุกไหม้ ทั่วทุกหนแห่งมีซากยานรบกึ่งหนึ่งถูกฝังอยู่ในผืนทราย โลกใบนี้คือสนามรบอย่างแท้จริง...\n\nสัญญาณส่งผ่านวิทยุที่ดักจับได้มีแต่ความตื่นตระหนกและไม่มั่นคง และที่น่าเหลือเชื่ออย่างยิ่งคือ..."
 astral_rift.1.desc.no_arcsite: "ดูเมื่อว่าผู้อยู่อาศัยที่นี่จะสื่อสารกันด้วยภาษาของเราในเวอร์ชันโบราณ"
 astral_rift.1.desc.with_arcsite: "ภาษาของผู้อยู่อาศัยที่นี่ตรงกับเอกสารที่เรากู้มาจากทรงกลมโบราณใต้ดาว [explorer.capital_scope.GetName] อย่างแม่นยำ"
 astral_rift.1.desc.common.2: "การถอดรหัสคำแปลคร่าวๆ บ่งชี้ว่าคนเหล่านี้อยู่ในฝ่ายที่กำลังพ่ายแพ้ในสงครามอันยาวนาน ศัตรูของพวกเขาซึ่งถูกเรียกว่า \"ผู้รุกราน\"(ผู้รุกราน)กำลังเตรียมการโจมตีระลอกใหม่ เมื่อพิจารณาจากความพินาศบนดาวเคราะห์ดวงนี้ การโจมตีระลอกนี้อาจจะเป็นครั้งสุดท้ายของพวกเขาก็เป็นได้"
 astral_rift.1.desc.default: "$astral_rift.1.desc.common.1$ $astral_rift.1.desc.no_arcsite$\n\n$astral_rift.1.desc.common.2$"
 astral_rift.1.desc.completed_arcsite: "$astral_rift.1.desc.common.1$ $astral_rift.1.desc.with_arcsite$\n\n$astral_rift.1.desc.common.2$"
 astral_rift.1.a: "ค้นหาผู้รอดชีวิตที่หลงเหลืออยู่"

 astral_rift.3.name: "ฝ่ายที่ขัดแย้งกัน"
 astral_rift.3.desc.default: "มีศูนย์กลางประชากรขนาดใหญ่หลายแห่งบนพื้นผิวของดาวเคราะห์ จากการวิเคราะห์สัญญาณส่งผ่านของพวกเขา เราสามารถระบุฝ่ายอุดมการณ์ที่แตกต่างกันสองฝ่ายได้...\n\nฝ่าย §Y[GetStarlightVanguardName]§! คือกลุ่มทหารนิยมผู้อึมครึม ซึ่งกำลังเตรียมพร้อมสำหรับความขัดแย้งที่กำลังจะมาถึงด้วยความมุ่งมั่นที่เป็นหนึ่งเดียว\n\nฝ่าย §Yม่านสีดํา§! (ม่านทมิฬ) คือคณะสงฆ์ผู้เผยแผ่พระธรรมคอยให้คำมั่นสัญญาเรื่องที่พึ่งทางจิตวิญญาณจากภัยคุกคามที่กำลังคืบคลานเข้ามา...\n\nณ จุดนี้เราแน่ใจแล้วว่าความคล้ายคลึงกันในภาษาของเราไม่ใช่เรื่องบังเอิญอย่างแน่นอน พวกเขาคือบรรพบุรุษที่ยังมีชีวิตอยู่ของเรา และทั้งสองฝ่ายกำลังตกอยู่ในอันตราย"
 astral_rift.3.desc.hive: "$astral_rift.3.desc.default$\n\nคนเหล่านี้ใช้ภาษาของเรา ร่างกายของพวกเขาเกือบจะเหมือนกับเราทุกประการ ทว่าพวกเขากลับมีความคิดส่วนบุคคลแยกจากกัน เป็นไปได้อย่างไร?"
 astral_rift.3.desc.machine: "คนเหล่านี้คือหน่วยประมวลผลอิสระส่วนบุคคล! ห่างไกลจากจิตสำนึกเครือข่ายจักรวาลร่วมกัน แต่ละหน่วยมีพลังการประมวลผลและความสามารถในการตัดสินใจของตนเอง มีศูนย์กลางประชากรขนาดใหญ่หลายแห่งบนพื้นผิวของดาวเคราะห์ จากการวิเคราะห์สัญญาณส่งผ่าน เราได้ระบุฝ่ายอุดมการณ์ที่แตกต่างกันสองฝ่าย...\n\nฝ่าย §Y[GetStarlightVanguardName]§! คือกลุ่มทหารนิยมผู้อึมครึม ซึ่งกำลังเตรียมพร้อมสำหรับความขัดแย้งที่กำลังจะมาถึงด้วยความมุ่งมั่นที่เป็นหนึ่งเดียว\n\nฝ่าย §Yม่านสีดํา§! คือคณะสงฆ์ผู้ให้สัญญาเรื่องที่พึ่งทางจิตวิญญาณจากภัยคุกคามที่กำลังคืบคลานเข้ามา...\n\nผู้สร้างรุ่นก่อนของเรากำลังตกอยู่ในอันตรายจากการถูกกวาดล้างอย่างสมบูรณ์"
 astral_rift.3.a: "ไปเยือน §Y[GetStarlightVanguardName]§!"
 astral_rift.3.b: "ไปเยือน §Yม่านสีดํา§!"
 astral_rift.3.b.trigger_tt: "เราไม่มีความสนใจที่จะจัดสภาร่วมกับพวกอ่อนแอ"

 astral_rift.5.name: "บรรพบุรุษที่สูญหาย"
 astral_rift.5.militarist_1: "เราได้เปิดการเจรจากับฝ่ายทหารนิยมที่เรียกตนเองว่า "§Y[GetStarlightVanguardName]§!""
 astral_rift.5.spiritualist_1: "เราได้เปิดการเจรจากับฝ่ายความเชื่อที่เรียกตนเองว่า \"§Yม่านสีดํา§!\""
 astral_rift.5.common_1: "ภาษา รูปลักษณ์ภายนอก และการมีอยู่ของยานกลมรอยแยก (§Y$tech_rift_sphere$§!) ของเราได้โน้มน้าวให้พวกเขาเชื่อเรื่องมรดกทางพันธุกรรมร่วมกันได้อย่างรวดเร็ว ในความพยายามที่จะสื่อสารอย่างสิ้นหวัง พวกเขาเปิดเผยข้อมูลมากมายเกี่ยวกับประวัติศาสตร์ของเรา...\n\nนานมาแล้ว เผ่าพันธุ์ของเราต้องเผชิญกับภัยคุกคามจากต่างมิติ ผู้รุกรานเดินทางมาถึงเพื่อทำยุทธการกวาดล้างอย่างโหดเหี้ยม ตอนแรกผู้คนของเรายืนหยัดอย่างมั่นคง แต่เมื่อเวลาผ่านไป แนวป้องกันของพวกเขาก็พังทลายลง...\n\nในช่วงเวลาแห่งความพ่ายแพ้รอยแยกแอสทรัล ก็ปรากฏขึ้น"
 astral_rift.5.militarist_2: "ปฏิบัติการ \"เรือกู้ชีพ\" (เรือชูชีพ)ได้รับการเปิดฉากขึ้นในความพยายามที่จะหลบหนีผ่านรอยแยกและรักษาเศษซากอารยธรรมที่เหลืออยู่ของพวกเขาไว้"
 astral_rift.5.spiritualist_2: "\"ประตูแห่งปาฏิหาริย์\"(ประตูรถ)นี้ถูกมองว่าเป็นโอกาสสุดท้ายที่จะหลบหนีและรักษาวิถีชีวิตที่เหลืออยู่ของพวกเขาไว้"
 astral_rift.5.no_arcsite: "ยานกลมรอยแยก (§Y$tech_rift_sphere$§!) ได้ถูกสร้างขึ้น แต่การออกแบบที่เรียบง่ายของมันอนุญาตให้เดินทางได้เพียงเที่ยวเดียวเท่านั้น"
 astral_rift.5.arcsite: "$astral_rift.5.no_arcsite$ นี่คือวัตถุชิ้นเดียวกับที่เราพบฝังอยู่ใต้หลุมอุกกาบาตโบราณใน [explorer.capital_scope.GetName]"
 astral_rift.5.default: "ผู้ลี้ภัยกลุ่มหนึ่งที่ได้รับการคัดเลือกถูกส่งไปปฏิบัติภารกิจ คนกลุ่มนี้คือบรรพบุรุษของเรา"
 astral_rift.5.gestalt: "เพื่อที่จะทนทานต่อการเดินทาง บุคคลกลุ่มหนึ่งที่เข้ากันได้ดีได้รับการดัดแปลงอย่างสุดขั้ว บรรพบุรุษของเราเชื่อว่าจิตสำนึกที่รวมกันเป็นหนึ่งเดียวเท่านั้นที่จะเดินทางผ่านรอยแยกโดยไม่ได้รับอันตราย นี่คือจุดเริ่มต้นแรกสุดของจิตสำนึกร่วมของเรา"
 astral_rift.5.machine: "เพื่อที่จะรอดชีวิตจากการเดินทาง ผู้ให้กำเนิดของเราได้เชื่อมโยงความคิดของพวกเขาและลบล้างอารมณ์ความรู้สึกทิ้งเสีย ด้วยวิสัยทัศน์ที่ชัดเจนและเป้าหมายที่เป็นหนึ่งเดียว จิตสำนึกจักรกลร่วมของเราจึงได้รับการก่อตั้งขึ้น"
 astral_rift.5.common_2: "ในอีกฟากหนึ่งของรอยแยก ยานกลมได้ถูกปล่อยออกไปเมื่อไม่ถึงห้าสิบปีก่อน มีบางคนในหมู่ประชากรที่นี่ยังคงจดจำวันนั้นได้ดี สำหรับเราแล้ว เวลาผ่านไปยาวนานหลายชั่วอายุคน(เสียงปรบมือ)"
 astral_rift.5.desc.militarist.gestalt.no_arcsite: "$astral_rift.5.militarist_1$ $astral_rift.5.common_1$\n\n$astral_rift.5.militarist_2$\n\n$astral_rift.5.no_arcsite$\n\n$astral_rift.5.gestalt$\n\n$astral_rift.5.common_2$"
 astral_rift.5.desc.militarist.gestalt.arcsite: "$astral_rift.5.militarist_1$ $astral_rift.5.common_1$\n\n$astral_rift.5.militarist_2$\n\n$astral_rift.5.arcsite$\n\n$astral_rift.5.gestalt$\n\n$astral_rift.5.common_2$"
