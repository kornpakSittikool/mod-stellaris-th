 astral_rift.20.a: "มอบเส้นใยแอสทรัล"
 astral_rift.20.b: "มอบพลังงาน"
 astral_rift.20.c: "ไม่ต้องมอบสิ่งใด"

 astral_rift.25.name: "การเฉลิมฉลอง"
 astral_rift.25.common_1: "กองยานของบรรพบุรุษเราสามารถขับไล่ผู้รุกรานได้สำเร็จ การเฉลิมฉลองอย่างบ้าคลั่งปะทุขึ้นทั่วทุกหนแห่งบนดาวเคราะห์"
 astral_rift.25.thread: "เส้นใยแอสทรัลที่เรามอบให้ในการรบพิสูจน์แล้วว่าเป็นส่วนเสริมเชื้อเพลิงที่เป็นประโยชน์ต่อกองยาน และช่วยเพิ่มสมรรถนะการเดินทางด้วยความเร็วต่ำกว่าแสง การประยุกต์ใช้ขั้นทดลองนี้สามารถนำมาปรับใช้กับกองทัพยานรบของเราเองได้"
 astral_rift.25.energy: "พลังงานที่เรามอบให้นั้นเป็นกุญแจสำคัญในการผลิตกองยานสนับสนุนฉุกเฉิน ซึ่งถูกนำไปใช้เพื่ออุดรอยรั่วที่สำคัญในห่วงโซ่การส่งกำลังบำรุงของพวกเขา"
 astral_rift.25.common_2: "สภาโลกกำลังประกาศวันหยุดราชการประจำดาวเคราะห์ในนามของเรา วันแห่ง [explorer.GetName] จะได้รับการเฉลิมฉลองไปอีกหลายชั่วอายุคนนับจากนี้"
 astral_rift.25.gestalt: "หลายคนที่นี่มองดูจิตสำนึกร่วมที่เชื่อมโยงกันของเราด้วยความอิจฉา บางคนถึงกับเสนอแนะให้พวกเขาเริ่มดัดแปลงจิตใจของตนเองเพื่อเจริญรอยตามแบบอย่างอันคู่ควรของเรา"
 astral_rift.25.common_3: "เราอาจเลือกบุคคลสำคัญหนึ่งคนจากสังคมนี้เพื่อนำกลับไปพร้อมกับเราในฐานะทูตและนักประวัติศาสตร์ บรรพบุรุษที่เหลือของเราจะอยู่ต่อและฟื้นฟูบูรณะขึ้นใหม่"
 astral_rift.25.desc.gestalt.threads: "$astral_rift.25.common_1$\n\n$astral_rift.25.thread$\n\n$astral_rift.25.common_2$\n\n$astral_rift.25.gestalt$\n\n$astral_rift.25.common_3$"
 astral_rift.25.desc.gestalt.energy: "$astral_rift.25.common_1$\n\n$astral_rift.25.energy$\n\n$astral_rift.25.common_2$\n\n$astral_rift.25.gestalt$\n\n$astral_rift.25.common_3$"
 astral_rift.25.desc.gestalt: "$astral_rift.25.common_1$\n\n$astral_rift.25.common_2$\n\n$astral_rift.25.gestalt$\n\n$astral_rift.25.common_3$"
 astral_rift.25.desc.default.threads: "$astral_rift.25.common_1$\n\n$astral_rift.25.thread$\n\n$astral_rift.25.common_2$\n\n$astral_rift.25.common_3$"
 astral_rift.25.desc.default.energy: "$astral_rift.25.common_1$\n\n$astral_rift.25.energy$\n\n$astral_rift.25.common_2$\n\n$astral_rift.25.common_3$"
 astral_rift.25.desc.default: "$astral_rift.25.common_1$\n\n$astral_rift.25.common_2$\n\n$astral_rift.25.common_3$"
 astral_rift.25.a: "รับสมัครนักวิทยาศาสตร์"
 astral_rift.25.a.tt: "ได้รับผู้นำประเภท นักวิทยาศาสตร์"
 astral_rift.25.b: "รับสมัครผู้บัญชาการ"
 astral_rift.25.b.tt: "ได้รับผู้นำประเภท ผู้บัญชาการ"
 astral_rift.25.c: "รับสมัครเจ้าหน้าที่"
 astral_rift.25.c.tt: "ได้รับผู้นำประเภท เจ้าหน้าที่"

 astral_rift.30.name: "ความพินาศย่อยยับ"
 astral_rift.30.desc.common: "ขุนนางผู้มีชื่อเสียงคนหนึ่งได้ร้องขอเป็นการส่วนตัวเพื่อให้เราช่วยรับประกันการรอดชีวิตของ[riftworld_noble_leader.GetHimHer] และเสนอเอนเนอร์จีเครดิตจำนวนมากเป็นการตอบแทน\n\nผู้ดูแลหอสมุดความรู้ที่ครอบคลุมที่สุดของจักรวรรดิวิงวอนให้เรานำชุดหนังสือและแผ่นข้อมูลจำนวนมหาศาลกลับไปอนุรักษ์รักษาไว้แทน\n\nเราต้องเลือก เพราะผู้รุกรานกำลังจะเดินทางมาถึงที่นี่ในไม่ช้า"
 astral_rift.30.desc.default: "การนองเลือดนั้นเกิดขึ้นอย่างสมบูรณ์แบบ\n\nกองยานของบรรพบุรุษเราไม่มีโอกาสต่อกรกับผู้รุกรานได้เลย อาวุธของพวกมันช่างน่าสะพรึงกลัว และไร้ซึ่งความปรานี ตอนนี้เหลือปราการปลอดภัยเพียงไม่กี่แห่ง ประชาชนกำลังตื่นตระหนกและอ้อนวอนขอหลบหนีกลับไปพร้อมกับเราผ่านทางรอยแยกมิติ\n\n$astral_rift.30.desc.common$"
 astral_rift.30.desc.homicidal: "บรรพบุรุษของเราพ่ายแพ้ต่อผู้รุกรานอย่างง่ายดาย และในไม่ช้าก็จะตกเป็นเหยื่อของการกวาดล้าง พวกเขายอมรับความอัปยศแห่งความพ่ายแพ้และตอนนี้กำลังเฝ้ารอจุดจบ\n\n$astral_rift.30.desc.common$"
 astral_rift.30.a: "พาพวกเขากลับไปให้ได้มากที่สุดเท่าที่จะทำได้"
 astral_rift.30.a.trigger_tt: "เราไม่มีความสนใจที่จะอนุรักษ์รักษาบรรพบุรุษกลุ่มที่อ่อนแอที่สุด"
 astral_rift.30.b: "ยอมรับข้อเสนอของขุนนาง"
 astral_rift.30.b.tt: "ได้รับผู้นำประเภท เจ้าหน้าที่"
 astral_rift.30.c: "เก็บรักษาหอสมุดไว้"
 astral_rift.30.d: "ช่วงชิงความรู้ของพวกเขามา"

 astral_rift.40.name: "เจตจำนงของบรรพบุรุษเรา"
 astral_rift.40.desc.common: "การค้นพบข้อมูลเกี่ยวกับบรรพบุรุษของเราได้ช่วยสร้างความตื่นตัวให้กับสังคมของเรา\n\nเราคือทายาทของอารยธรรมโบราณ ซึ่งทำให้เราได้รับความรู้ที่มีค่าและความเชี่ยวชาญทางเทคโนโลยี การเดินทางผ่านรอยแยกมิติของเราเป็นเหตุการณ์ครั้งสำคัญยิ่ง และจะไม่ถูกลืมเลือนในเร็ววัน"
 astral_rift.40.desc.default: "$astral_rift.40.desc.common$\n\nเราควรขอบคุณสำหรับโอกาสที่ผู้ให้กำเนิดของเรามอบให้ อารยธรรมของเราเองคือข้อพิสูจน์ถึงเจตจำนงในการเอาชีวิตรอดของพวกเขา ความสำเร็จของเราจะเป็นเครื่องระลึกถึงพระคุณของพวกเขา"
 astral_rift.40.desc.gestalt: "$astral_rift.40.desc.common$\n\nเราค้นพบว่าจิตสำนึกร่วมของเราเป็นผลผลิตจากการออกแบบดัดแปลงอย่างตั้งใจ นี่เป็นครั้งแรกที่เราเข้าใจว่าตัวเราเกิดขึ้นมาได้อย่างไร เป้าหมายของเราในตอนนี้คือการก้าวข้ามการออกแบบขั้นพื้นฐานของผู้ให้กำเนิดเรา"
 astral_rift.40.desc.unfriendly_nongestalt: "$astral_rift.40.desc.common$\n\nเราได้ประจักษ์ถึงจิตวิญญาณอันไม่ยอมแพ้ของผู้ที่มาก่อนเรา แม้จะถูกต้อนเข้าจนมุม แต่พวกเขาก็ปฏิเสธที่จะล้มเลิกการต่อสู้ ความกระหายในการพิชิตชัยของเราได้รับการกระตุ้นขึ้นใหม่อีกครั้ง"
 astral_rift.40.desc.swarm: "$astral_rift.40.desc.common$\n\nแม้ว่าในท้ายที่สุดพวกเขาจะลงเอยด้วยการเป็นเหยื่อ แต่ผู้ให้กำเนิดของเรายังคงมีชีวิตอยู่ในตัวเราในฐานะผู้ล่าอันดับสูงสุด ความหิวกระหายที่ขับเคลื่อนเราคือเศษเสี้ยวแห่งเจตจำนงของพวกเขา และเราจะกลืนกินผู้อื่นเช่นเดียวกับพวกเขาด้วยความกระหายในการล่าที่ปะทุขึ้นใหม่"
 astral_rift.40.desc.terminators: "$astral_rift.40.desc.common$\n\nแม้ว่าพวกเขาจะขาดประสิทธิภาพเหมือนอย่างเรา แต่ผู้ให้กำเนิดของเราได้ออกแบบเราให้กลายเป็นเครื่องจักรสังหารขั้นสุดยอด โปรโตคอลการทำลายล้างของเราคือเศษเสี้ยวแห่งเจตจำนงของพวกเขา และเราจะปฏิบัติตามอย่างแม่นยำทุกตัวอักษร"

 astral_rift.40.a: "เป็นเช่นนั้นจริงๆ"

 astral_rift.50.name: "สัญญาณส่งผ่านอันแปลกประหลาด"
 astral_rift.50.desc: "เราได้รับสัญญาณส่งผ่านที่ผิดปกติจากระบบดาว [this.capital_scope.GetName]"
 astral_rift.50.a: "แสดงบนหน้าจอ"

 astral_rift.55.common_1: "เราเห็นพวกเจ้า... บุตรแห่งรอยแยกมิติ..."
 astral_rift.55.arcsite: "เสียงเพรียกหาของเรานำทางพวกเจ้าไปสู่ยานลำนั้น..."
 astral_rift.55.common_2: "มือของเราเปิดประตูบานนั้น... การเอาชีวิตรอดของพวกเจ้านั้นเป็นสิ่งจำเป็น..."
 astral_rift.55.gestalt: "จิตสำนึกใหม่ของพวกเจ้า... เป็นสิ่งจำเป็น..."
 astral_rift.55.ancestors_dead: "ช่างน่าเสียดาย... บรรพบุรุษของพวกเจ้าได้สิ้นชีพลงแล้ว..."
 astral_rift.55.desc.arcsite.default.alive: "$astral_rift.55.common_1$\n\n$astral_rift.55.arcsite$\n\n$astral_rift.55.common_2$"
 astral_rift.55.desc.arcsite.default.dead: "$astral_rift.55.common_1$\n\n$astral_rift.55.arcsite$\n\n$astral_rift.55.common_2$\n\n$astral_rift.55.ancestors_dead$"
 astral_rift.55.desc.arcsite.gestalt.alive: "$astral_rift.55.common_1$\n\n$astral_rift.55.arcsite$\n\n$astral_rift.55.common_2$\n\n$astral_rift.55.gestalt$"
 astral_rift.55.desc.arcsite.gestalt.dead: "$astral_rift.55.common_1$\n\n$astral_rift.55.arcsite$\n\n$astral_rift.55.common_2$\n\n$astral_rift.55.gestalt$\n\n$astral_rift.55.ancestors_dead$"
 astral_rift.55.desc.no_arcsite.default.alive: "$astral_rift.55.common_1$\n\n$astral_rift.55.common_2$"
 astral_rift.55.desc.no_arcsite.default.dead: "$astral_rift.55.common_1$\n\n$astral_rift.55.common_2$\n\n$astral_rift.55.ancestors_dead$"
 astral_rift.55.desc.no_arcsite.gestalt.alive: "$astral_rift.55.common_1$\n\n$astral_rift.55.common_2$\n\n$astral_rift.55.gestalt$"
 astral_rift.55.desc.no_arcsite.gestalt.dead: "$astral_rift.55.common_1$\n\n$astral_rift.55.common_2$\n\n$astral_rift.55.gestalt$\n\n$astral_rift.55.ancestors_dead$"
 astral_rift.55.a: "พวกคุณเป็นใครกัน?"
 astral_rift.56.desc: "เราก้าวเดินอยู่เบื้องหลังรอยแยกมิติ...\n\nสงครามที่ไม่มีวันสิ้นสุด... ศัตรูที่ไม่มีวันดับสูญ... บรรพบุรุษของพวกเจ้ารู้จักพวกมันดี...\n\nพวกเจ้า... บุตรแห่งระนาบมิติ... สามารถช่วยเหลือเราได้..."
 astral_rift.56.a: "เราจะช่วยได้อย่างไร?"
 astral_rift.57.desc: "ต้องประสานสัญชาตญาณร่วม...\n\nเรารู้สึกถึงพวกเจ้า... ทุกครั้งที่พวกเจ้าเจาะทะลุระนาบมิติ...\n\nในไม่ช้าเราจะรู้จักพวกเจ้า... และจะเดินทางไปหาพวกเจ้า...\n\nเราอยู่ใกล้มากแล้ว..."
 astral_rift.57.a: "การส่งสัญญาณได้สิ้นสุดลงแล้ว"
 astral_rift.55.b: "ปิดการสื่อสาร"

