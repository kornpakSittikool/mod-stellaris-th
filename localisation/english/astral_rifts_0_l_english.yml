 astral_rift.5.desc.spiritualist.gestalt.no_arcsite: "$astral_rift.5.spiritualist_1$ $astral_rift.5.common_1$\n\n$astral_rift.5.spiritualist_2$\n\n$astral_rift.5.no_arcsite$\n\n$astral_rift.5.gestalt$\n\n$astral_rift.5.common_2$"
 astral_rift.5.desc.spiritualist.gestalt.arcsite: "$astral_rift.5.spiritualist_1$ $astral_rift.5.common_1$\n\n$astral_rift.5.spiritualist_2$\n\n$astral_rift.5.arcsite$\n\n$astral_rift.5.gestalt$\n\n$astral_rift.5.common_2$"
 astral_rift.5.desc.spiritualist.default.no_arcsite: "$astral_rift.5.spiritualist_1$ $astral_rift.5.common_1$\n\n$astral_rift.5.spiritualist_2$\n\n$astral_rift.5.no_arcsite$\n\n$astral_rift.5.default$\n\n$astral_rift.5.common_2$"
 astral_rift.5.desc.spiritualist.default.arcsite: "$astral_rift.5.spiritualist_1$ $astral_rift.5.common_1$\n\n$astral_rift.5.spiritualist_2$\n\n$astral_rift.5.arcsite$\n\n$astral_rift.5.default$\n\n$astral_rift.5.common_2$"
 astral_rift.5.desc.militarist.machine.arcsite: "$astral_rift.5.militarist_1$ $astral_rift.5.common_1$\n\n$astral_rift.5.militarist_2$\n\n$astral_rift.5.no_arcsite$\n\n$astral_rift.5.machine$\n\n$astral_rift.5.common_2$"
 astral_rift.5.desc.militarist.machine.no_arcsite: "$astral_rift.5.militarist_1$ $astral_rift.5.common_1$\n\n$astral_rift.5.militarist_2$\n\n$astral_rift.5.arcsite$\n\n$astral_rift.5.machine$\n\n$astral_rift.5.common_2$"
 astral_rift.5.desc.spiritualist.machine.no_arcsite: "$astral_rift.5.spiritualist_1$ $astral_rift.5.common_1$\n\n$astral_rift.5.spiritualist_2$\n\n$astral_rift.5.no_arcsite$\n\n$astral_rift.5.machine$\n\n$astral_rift.5.common_2$"
 astral_rift.5.desc.spiritualist.machine.arcsite: "$astral_rift.5.spiritualist_1$ $astral_rift.5.common_1$\n\n$astral_rift.5.spiritualist_2$\n\n$astral_rift.5.arcsite$\n\n$astral_rift.5.machine$\n\n$astral_rift.5.common_2$"

 astral_rift.5.a: "การไหลของเวลาที่นี่แตกต่างกันอย่างมาก..."
 astral_rift.5.b: "เราถูกดัดแปลงพันธุกรรมรึ?"

 astral_rift.10.name: "กลุ่ม [GetStarlightVanguardName]"
 astral_rift.10.militarist: "เราได้จัดการหารือร่วมกับ \"§Y[GetStarlightVanguardName]§!\" พวกเขาแสดงให้เห็นชัดเจนว่าสถานการณ์ในสนามรบกับผู้รุกรานนั้นเลวร้ายเพียงใด ตรวจพบกองยานต่างมิติห่างออกไปไม่กี่ระบบดาวและกำลังรุกเข้ามาใกล้แล้ว เรามาถึงในเวลาที่คับขันอย่างยิ่ง สำหรับฝ่ายแวนการ์ดแล้ว นี่ไม่ใช่เรื่องบังเอิญ การปรากฏตัวของเราคือเจตจำนงแห่งโชคชะตา"
 astral_rift.10.spiritualist: ""§Y[GetStarlightVanguardName]§!" ตกลงที่จะจัดการสภาร่วมหารือกับเรา"
 astral_rift.10.desc.common: "\"การมาถึงของพวกคุณได้สร้างแรงบันดาลใจให้กับประชาชนของเรา มอบความช่วยเหลือที่จำเป็นอย่างยิ่งให้เรา แล้วเราจะยังมีโอกาสยุติสงครามนี้ได้ครั้งใหญ่และถาวร\" กองยานที่เหลืออยู่ของพวกเขามีสภาพย่ำแย่และไม่สามารถรับความสูญเสียได้อีกแล้ว...\n\nเราน่าจะสามารถส่งเสบียงจำนวนจำกัดผ่านทางเคเบิลยึดเหนี่ยวได้ก่อนที่รอยแยกจะขาดความเสถียร การส่งมอบแร่โลหะผสม (โลหะผสม) ที่จำเป็นเร่งด่วนจะช่วยในการซ่อมแซมและปรับปรุงกองยาน ด้วยโครงสร้างที่ล้ำสมัยของยานรบของพวกเขา เราอาจได้เรียนรู้บางอย่างเกี่ยวกับการออกแบบของพวกเขาระหว่างทาง\n\nการใช้เวลาอย่างชาญฉลาดกว่านั้นคือการประยุกต์ใช้องค์ความรู้ระดับสูงของเราเกี่ยวกับเส้นใยแอสทรัลเพื่อช่วยเสริมเกราะป้องกัน(หัวเราะ)ยานของพวกเขา แม้ว่าจะยังเป็นเพียงขั้นทดลอง แต่เราอาจทำความเข้าใจครั้งสำคัญที่นี่ซึ่งจะสามารถนำมาใช้ประโยชน์กับกองยานของเราได้ เป็นที่เข้าใจกันว่าผู้รุกรานชื่นชอบอาวุธพลังงานเป็นหลัก ดังนั้นการปรับปรุงความแข็งแกร่งของเกราะป้องกันในจุดนี้จะช่วยได้มาก"
 astral_rift.10.desc.militarist: "$astral_rift.10.militarist$\n\n$astral_rift.10.desc.common$"
 astral_rift.10.desc.spiritualist: "$astral_rift.10.spiritualist$\n\n$astral_rift.10.desc.common$"
 astral_rift.10.a: "ส่งมอบแร่โลหะผสม (โลหะผสม)"
 astral_rift.10.b: "มอบเส้นใยแอสทรัล"
 astral_rift.10.c: "สงครามนี้ไม่มีหวังแล้ว ให้เราไปเยือนฝ่ายอนุรักษ์นิยมกันดีกว่า"
 astral_rift.10.d: "เรื่องนี้ไม่มีทางเยียวยาได้แล้ว ให้เราเดินทางกลับสู่โลกใหม่กันเถอะ"

 astral_rift.15.name: "กลุ่มม่านทมิฬ(ม่านสีดํา)"
 astral_rift.15.militarist: "\"§Yม่านสีดํา§!\" ตกลงที่จะจัดการสภาร่วมหารือกับเรา"
 astral_rift.15.spiritualist: "เราได้เปิดการประชุมสภาพิเศษร่วมกับ \"§Yม่านสีดํา§!\" พวกเขาเน้นย้ำถึงความน่าสะพรึงกลัวของเหล่าผู้รุกราน ตรวจพบกองยานต่างมิติและกำลังเดินทางมาถึงแล้ว สำหรับฝ่ายม่านแล้ว การมาเยือนของเราในช่วงเวลาที่คับขันนี้ถือเป็นพระประสงค์ของทวยเทพ"
 astral_rift.15.desc.common: "\"การมาถึงของพวกคุณไม่ต่างอะไรจากปาฏิหาริย์ นานมาแล้วที่เรายอมรับว่าสงครามนี้ไร้ซึ่งความหวัง ประชาชนของเรากำลังอดอยาก และความทุกข์ทรมานของเราช่างยิ่งใหญ่นัก ลูกหลานจากนอกประตูมิติ... โปรดประทานความเมตตาแก่เราในช่วงเวลาสุดท้ายด้วยเถิด\"\n\nความเดือดร้อนของพวกเขานั้นชัดเจน แม้ว่าโชคชะตาจะไม่เป็นเช่นนั้นก็ตาม การหาอาหารมาช่วยเหลือผู้คนอยู่ในวิสัยที่เราทำได้: เราน่าจะส่งเสบียงจำกัดผ่านเคเบิลยึดเหนี่ยวได้ และเทคโนโลยีการเกษตรขั้นสูงของเราจะช่วยได้มากอย่างแน่นอน...\n\nนอกจากนี้ยังมีโอกาสที่เราจะพาประชากรของพวกเขาบางส่วนไปยังพื้นที่ปลอดภัยผ่านทางรอยแยกมิติได้ โดยการผสม §Hเธรดต่าง ๆ§! เข้ากับเชื้อเพลิงของยานอวกาศ แม้จะเป็นโอกาสเพียงน้อยนิด แต่อย่างน้อยที่สุดก็น่าจะช่วยปลอบประโลมจิตใจของพวกเขาได้"
 astral_rift.15.desc.lithoid: "\"การมาถึงของพวกคุณไม่ต่างอะไรจากปาฏิหาริย์ นานมาแล้วที่เรายอมรับว่าสงครามนี้ไร้ซึ่งความหวัง ประชาชนของเรากำลังอดอยาก และความทุกข์ทรมานของเราช่างยิ่งใหญ่นัก ลูกหลานจากนอกประตูมิติ... โปรดประทานความเมตตาแก่เราในช่วงเวลาสุดท้ายด้วยเถิด\"\n\nความเดือดร้อนของพวกเขานั้นชัดเจน แม้ว่าโชคชะตาจะไม่เป็นเช่นนั้นก็ตาม การหาเสบียงมาช่วยเหลือผู้คนอยู่ในวิสัยที่เราทำได้: เราน่าจะส่งเสบียงจำกัดผ่านเคเบิลยึดเหนี่ยวได้ และเทคโนโลยีการสกัดแร่ขั้นสูงของเราจะช่วยได้มากอย่างแน่นอน...\n\nนอกจากนี้ยังมีโอกาสที่เราจะพาประชากรของพวกเขาบางส่วนไปยังพื้นที่ปลอดภัยผ่านทางรอยแยกมิติได้ โดยการผสม §Hเธรดต่าง ๆ§! เข้ากับเชื้อเพลิงของยานอวกาศ แม้จะเป็นโอกาสเพียงน้อยนิด แต่อย่างน้อยที่สุดก็น่าจะช่วยปลอบประโลมจิตใจของพวกเขาได้"
 astral_rift.15.desc.synthetic: "\"การมาถึงของพวกคุณไม่ต่างอะไรจากปาฏิหาริย์ นานมาแล้วที่เรายอมรับว่าสงครามนี้ไร้ซึ่งความหวัง พลังงานของประชาชนของเรากำลังจะหมดลง และความทุกข์ทรมานของเราช่างยิ่งใหญ่นัก ลูกหลานจากนอกประตูมิติ... โปรดประทานความเมตตาแก่เราในช่วงเวลาสุดท้ายด้วยเถิด\"\n\nความเดือดร้อนของพวกเขานั้นชัดเจน แม้ว่าโชคชะตาจะไม่เป็นเช่นนั้นก็ตาม การจ่ายกระแสพลังงานมาช่วยเหลือผู้คนอยู่ในวิสัยที่เราทำได้: เราน่าจะส่งเสบียงจำกัดผ่านเคเบิลยึดเหนี่ยวได้ และเทคโนโลยีผลิตพลังงานขั้นสูงของเราจะช่วยได้มากอย่างแน่นอน...\n\nนอกจากนี้ยังมีโอกาสที่เราจะพาประชากรของพวกเขาบางส่วนไปยังพื้นที่ปลอดภัยผ่านทางรอยแยกมิติได้ โดยการผสม §Hเธรดต่าง ๆ§! เข้ากับเชื้อเพลิงของยานอวกาศ แม้จะเป็นโอกาสเพียงน้อยนิด แต่อย่างน้อยที่สุดก็น่าจะช่วยปลอบประโลมจิตใจของพวกเขาได้"
 astral_rift.15.desc.militarist: "$astral_rift.15.militarist$\n\n$astral_rift.15.desc.common$"
 astral_rift.15.desc.militarist.lithoid: "$astral_rift.15.militarist$\n\n$astral_rift.15.desc.common.lithoid$"
 astral_rift.15.desc.militarist.synthetic: "$astral_rift.15.militarist$\n\n$astral_rift.15.desc.common.synthetic$"
 astral_rift.15.desc.spiritualist: "$astral_rift.15.spiritualist$\n\n$astral_rift.15.desc.common$"
 astral_rift.15.desc.spiritualist.lithoid: "$astral_rift.15.spiritualist$\n\n$astral_rift.15.desc.common.lithoid$"
 astral_rift.15.desc.spiritualist.synthetic: "$astral_rift.15.spiritualist$\n\n$astral_rift.15.desc.common.synthetic$"
 astral_rift.15.a: "ส่งมอบอาหาร"
 astral_rift.15.a.lithoid: "ส่งมอบแร่ธาตุ"
 astral_rift.15.a.synthetic: "ส่งมอบพลังงาน"
 astral_rift.15.b: "มอบเส้นใยแอสทรัล"
 astral_rift.15.c: "ความพยายามเหล่านี้ไร้ความหวัง ให้เราไปเยือนฝ่ายนักรบดีกว่า"
 astral_rift.15.d: "เรื่องนี้ไม่มีทางเยียวยาได้แล้ว ให้เราเดินทางกลับสู่โลกใหม่กันเถอะ"

 astral_rift.16.name: "การละทิ้งบรรพบุรุษของเรา"
 astral_rift.16.desc.default: "เราได้ตัดสินใจแล้วว่า ชะตากรรมของบรรพบุรุษของเรานั้นเป็นเรื่องที่ช่วยไม่ได้อีกแล้วอย่างน่าเสียดาย...\n\nมีสิ่งน้อยนิดที่เราสามารถทำได้เพื่อช่วยเหลือพวกเขา พวกเขาตัดสินใจถูกต้องแล้วที่ส่งส่วนหนึ่งของพวกเขาข้ามรอยแยกมิติมายังมิติของเรา\n\nเราจะทำอย่างดีที่สุดเพื่อสานต่อเจตนารมณ์ของพวกเขาและกลายเป็นอารยธรรมที่พวกเขาจะภูมิใจ"
 astral_rift.16.desc.homicidal: "เราประเมินว่าบรรพบุรุษของเราไม่มีคุณค่าคู่ควรแก่การสนับสนุนของเรา...\n\nพวกเขาตัดสินใจถูกต้องแล้วที่ส่งผู้ที่แข็งแกร่งที่สุดผ่านรอยแยกเข้ามายังมิติของเรา เราจะมีชีวิตอยู่ต่อแทนที่พวกเขาเอง\n\nโชคชะตาของพวกเขาขึ้นอยู่กับตัวพวกเขาเองแล้วในตอนนี้"

 astral_rift.20.name: "สภาโลก"
 astral_rift.20.common_1: "การรุกรานดาวเคราะห์บ้านเกิดของบรรพบุรุษเราใกล้เข้ามาเต็มทีแล้ว"
 astral_rift.20.militarist: "ภายหลังการเข้าพบปะหารือกับกลุ่ม "§Y[GetStarlightVanguardName]§!" เราได้รับเชิญให้เข้าร่วมสภาโลกสำหรับการประชุมฉุกเฉิน พวกเขาแสดงความขอบคุณอย่างมากต่อความช่วยเหลือที่เรามอบให้จนถึงปัจจุบัน และยกย่องเราในความเอื้อเฟื้อเผื่อแผ่"
 astral_rift.20.spiritualist: "ภายหลังการเข้าพบปะหารือกับกลุ่ม \"§Yม่านสีดํา§!\" เราได้รับเชิญให้เข้าร่วมสภาโลกสำหรับการประชุมฉุกเฉิน พวกเขายังคงรู้สึกซาบซึ้งใจต่อความช่วยเหลือที่เรามอบให้จนถึงปัจจุบัน และยกย่องเราในความเอื้อเฟื้อเผื่อแผ่"
 astral_rift.20.common_2: "เหลือเวลาอีกไม่มากในการดำเนินการก่อนที่จะเริ่มความขัดแย้งที่หลายคนมองว่าเป็นศึกสุดท้าย...\n\nคลังพลังงานสำรองลดต่ำลงอย่างน่าใจหาย การสนับสนุนทรัพยากรพลังงานจะช่วยกระตุ้นการผลิตยานสนับสนุนฉุกเฉินและช่วยให้การสู้รบเอื้อประโยชน์แก่พวกเขามากขึ้น"
 astral_rift.20.poor: "นักวิทยาศาสตร์ของพวกเขาหลายคนกำลังร้องขอตัวอย่างเส้นใยแอสทรัลที่เราเก็บสะสมไว้เพื่อนำไปทดลองเพิ่มเติมในการเสริมความแข็งแกร่งของเกราะป้องกันให้กับกองยาน เนื่องจากผู้รุกรานเหล่านี้มักนิยมใช้อาวุธพลังงาน ผลประโยชน์จากการพัฒนาในจุดนี้อาจมีนัยสำคัญอย่างมาก"
 astral_rift.20.rich: "นักวิทยาศาสตร์ของพวกเขาหลายคนกำลังร้องขอตัวอย่างเส้นใยแอสทรัลเพิ่มเติมที่เราเก็บสะสมไว้เพื่อนำไปทดลองเพิ่มเติมในการเสริมความแข็งแกร่งของเกราะป้องกันให้กับกองยาน เนื่องจากผู้รุกรานเหล่านี้มักนิยมใช้อาวุธพลังงาน ผลประโยชน์จากการพัฒนาในจุดนี้อาจมีนัยสำคัญอย่างมาก"
 astral_rift.20.gestalt: "การมองดูบรรพบุรุษของเราถกเถียงโต้แย้งกัน ซึ่งเป็นการแสดงออกที่วุ่นวายของความคิดเห็นส่วนบุคคลเป็นเรื่องที่กวนใจเรายิ่งนัก เราต้องขอบคุณที่ความไร้ประสิทธิภาพดังกล่าวถูกกำจัดออกไปจากการดัดแปลงของเราตั้งแต่นานมาแล้ว"
