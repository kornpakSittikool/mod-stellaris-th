 tech_encryption_1:1 "ไฟร์วอลล์ควอนตัม"
 tech_encryption_1_desc:1 "ความก้าวหน้าด้านเทคโนโลยีการคํานวณ ได้ให้วิธีการใหม่แก่เรา เพื่อป้องกันข้อมูลของเรา จากการสอดรู้สอดเห็น"
 tech_encryption_2:1 "ที่เก็บข้อมูลที่พังได้พร้อมๆกัน"
 tech_encryption_2_desc:1 "ความก้าวหน้ามากขึ้นในความไม่เสถียร ได้ให้วิธีการใหม่แก่เรา เพื่อป้องกันการบุกรุกเข้าฐานข้อมูล"
 tech_encryption_3:1 "กุญแจแบบลบเวลา"
 tech_encryption_3_desc:1 "ความ ก้าว หน้า ล่า สุด ของ เรา ใน การ ใช้ ความ รู้ ที่ มี การ ใช้ การเข้ารหัส ได้ ค้น พบ ความ แปลก ประหลาด ทาง ฟิสิกส์ เมื่อ เร็ว ๆ นี้ เพื่อ จะ ต้อง มี การ ใส่ กุญแจ พิเศษ ก่อน ที่ จะ ถูก สร้าง ขึ้น."
 tech_decryption_1:1 "การแฮ็กควอนตัม"
 tech_decryption_1_desc:1 "ระบบการเข้ารหัสเบื้องต้น ไม่มีโอกาสที่จะสู้กับเครื่องมือถอดรหัสสมัยใหม่"
 tech_decryption_2:1 "การจำลองวิศวกรรมสังคม"
 tech_decryption_2_desc:1 "การเชื่อมโยงที่อ่อนแอที่สุด ในระบบรักษาความปลอดภัยใดๆ ก็คือบุคคลที่อยู่ภายใน โดยจําลองจุดอ่อนของพวกเขาในแบบจําลองคอมพิวเตอร์ เราสามารถหาวิธีใหม่ในการข้ามระบบรักษาความปลอดภัยของพวกเขา - หรือหลอกให้พวกเขาข้ามมันสําหรับเรา"
 tech_decryption_3:1 "การสะท้อนของมิติเสมือน"
 tech_decryption_3_desc:1 "คนของเราสามารถเข้าถึงข้อมูล จากความเป็นจริงที่ใกล้เคียงได้ โดยไม่ต้องเสี่ยงในการปิดสัญญาณเตือน ในความเป็นจริงนี้"
 tech_planetary_infrastructure_1:0 "โครงสร้างพื้นฐานโลหะเซราโม"
 tech_planetary_infrastructure_1_desc:0 "ความแข็งแรงของอัลลอยทําให้เราสามารถสร้างอาคารที่ถูกปลูกฝังได้ ทําให้อาณานิคมของเรามีโครงสร้างพื้นฐานที่ดีขึ้น"
 tech_planetary_infrastructure_1_wilderness: "$tech_planetary_infrastructure_1$"
 tech_planetary_infrastructure_1_wilderness_desc: "$tech_planetary_infrastructure_1_desc$"
 tech_planetary_infrastructure_2:0 "โครงสร้างพื้นฐานดู รู เซิล"
 tech_planetary_infrastructure_2_desc:0 "ความ ก้าว หน้า ทาง ด้าน วิศวกรรม ทํา ให้ เรา สามารถ สร้าง โครง สร้าง ที่ ใหญ่ กว่า และ ทนทาน มาก ขึ้น ได้ ปรับ ปรุง โครง สร้าง ของ อาณานิคม ของ เรา ให้ ดี ขึ้น อย่าง มาก."
