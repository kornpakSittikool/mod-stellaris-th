 envoy_events.230.desc:0 "เมื่อเข้ามา[Root.envoy_location_country.GetName]ท่านทูต[Root.GetName]เขา ถูก จับ ด้วย ข้อ กล่าว หา มาก มาย ว่า ทํา ผิด. เดอะ[Root.envoy_location_country.GetAdj]Missive เป็นสั้น ๆ\"เราขอขอบคุณคุณที่ส่งผู้ร้ายกลับมาให้เรา เพื่อความยุติธรรม\""
