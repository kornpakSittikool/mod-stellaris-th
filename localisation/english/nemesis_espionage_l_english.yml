 ESPIONAGE_DAILY_NETWORK_VALUE_DELAYED:1 "§E§Yเลเวลการแทรกซึม§! ของเราต่อจักรวรรดินี้มีการเปลี่ยนแปลงในแต่ละวันตามจำนวนนี้\n\nเครือข่ายสายลับจะเติบโตได้ก็ต่อเมื่อมี §Yทูต§! ได้รับมอบหมายให้ทำหน้าที่เป็นสปีสเตอร์\n\nจักรวรรดิที่มี §Y$EMPIRE_SIZE$§! สูงหรือที่ที่เรามี §Yการเข้ารหัสของฝ่ายตรงข้าม§! ที่สูงว่าจะเป็นข้อได้เปรียบในการแทรกซึมได้ง่ายกว่า§!"
