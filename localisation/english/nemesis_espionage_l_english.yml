 operation.8200.name:0 "ค้นหาเป้าหมาย"
 operation.8200.desc:0 "คนของเรากําลังสืบสวน นักแสดงทางการทูตสําคัญ§H[Root.Target.GetName]§!การค้นหาตะขอ ที่เราอาจจะใช้ประโยชน์ได้"
 operation.8205.name:1 "การถอดรหัสสําหรับเคอร์ต์"
 operation.8205.desc:0 "เราได้เขียนรายชื่อ บุคคลอื้อฉาวภายใน§H[Root.Target.GetAdj]§!หน่วยราชการทูต มี การ ค้น พบ สาร ตะกั่ว หลาย ชนิด และ ผู้ ปฏิบัติ งาน ของ เรา กําลัง พยายาม อย่าง หนัก เพื่อ หา วิธี ที่ ดี ที่ สุด ใน การ ผลิต ผล ที่ ต้องการ."
 operation.8210.name:0 "ปรับปรุง: ปฏิบัติการ[This.GetName]"
 operation.8210.desc:0 "เป้าหมายที่เหมาะสมสําหรับ§Hปฏิบัติการ[This.GetName]§!มี การ ระบุ ตัว และ มี การ วาด ดอล เซอร์ ไว้ มาก มาย. คนของเรารอคําพูดของเรา เพื่อกระตุ้นเรื่องอื้อฉาว"
 operation.8210.desc.no_go:0 "เจ้าหน้าที่ของเราใน§H[Root.Target.GetName]§!ดังนั้น พวกเขา (ยะอ์ญูจและมะอ์ญูจ)ไม่สามารถจะข้ามมันได้ และไม่สามารถจะขุดโพรงผ่านมาได้§Hปฏิบัติการ[This.GetName]§!เห็นได้ชัด[Root.Target.GetGovernmentName]เป็นเรื่องอื้อฉาวที่เพียงพอว่าสิ่งสกปรกใด ๆ ที่เราพบกับพวกเขา จะแทบจะไม่ยกกวน"
 operation.8225.name:0 "เดอะชราวด์"
 operation.8225.desc:0 "เจ้าหน้าที่ของเราใน§H[Root.Target.GetName]§!มี ข่าว ร้าย: แม้ ว่า มี การ เตรียม การ อย่าง กว้าง ขวาง แต่ เป้า หมาย ที่ ดู เหมือน ว่า มี ความ หวัง ของ พวก เขา ไม่ ได้ ตก เป็น เหยื่อ ล่อ และ พวก เขา ไม่ สามารถ สร้าง เรื่อง อื้อ ฉาว ได้. น่าทึ่งที่ดูเหมือนว่า มีแอปเปิ้ลที่ไม่ดีใด ๆ ภายใน[Root.Target.GetAdj]การชุมนุมทางการทูตในตอนนี้"
 operation.8230.name:0 "การ สุ่ม ทํา ของ เรา"
 operation.8230.desc.base:0 "เจ้าหน้าที่ของเราใน§H[Root.Target.GetName]§!รายงานว่า§Hปฏิบัติการ[This.GetName]§!ประสบความสําเร็จอย่างมาก"
 operation.8230.desc.salacious_affair:0 "$operation.8230.desc.base$ในการเคลื่อนไหวที่กล้าหาญเราสามารถวางกรอบหนึ่งในทูตของพวกเขาไปยัง§H[offended_party.GetName]§!สําหรับอาชญากรรมที่หลากหลายอย่างน่าประหลาดใจ เรื่อง ราว ที่ เกิด ขึ้น กับ พวก เขา ทํา ให้ พวก เขา อับอาย ขาย หน้า มาก และ ทํา ให้ พวก เขา มี ความ สัมพันธ์ ที่ ดี กับ พวก เขา[offended_party.GetSpeciesNamePlural]ของพวกเขา§Hจุด ยืน ทาง การ ทูต§!ผล ก็ คือ อ่อน ลง."
 operation.8230.desc.salacious_affair_self:0 "$operation.8230.desc.base$ด้วยความกล้าหาญ เราสามารถที่จะใส่ร้ายหนึ่งในทูตของพวกเขา§Hจักรวรรดิของเราเอง§!สําหรับอาชญากรรมที่หลากหลายอย่างน่าประหลาดใจ เรื่อง ราว ต่าง ๆ ได้ ทํา ให้ พวก เขา อับอาย มาก เกิน ไป โดย ไม่ มี ส่วน เล็ก น้อย จาก การ ที่ เรา ทํา ผิด. พวกเขา§Hจุด ยืน ทาง การ ทูต§!ผล ก็ คือ อ่อน ลง."
 operation.8230.desc.insulting_envoy:0 "$operation.8230.desc.base$ผ่านการจัดการที่ชาญฉลาดบางอย่าง เราได้จัดการเพื่อความมัวหมอง[Root.Target.GetAdj]ความสัมพันธ์กับ§H[offended_party.GetName]§!หนึ่งในทูตของพวกเขาเอาเหยื่อที่เราตั้งค่าอย่างระมัดระวังสําหรับพวกเขาและบังเอิญ เปิดเผยความคิดที่แท้จริงของพวกเขา ซึ่งปรากฏว่าอร่อยเกี่ยวกับคู่ของพวกเขา พวกเขา§Hจุด ยืน ทาง การ ทูต§!ผล ก็ คือ อ่อน ลง."
 operation.8230.desc.insulting_envoy_self:0 "$operation.8230.desc.base$ผ่านการจัดการที่ชาญฉลาดบางอย่าง เราได้จัดการเพื่อความมัวหมอง[Root.Target.GetAdj]ความสัมพันธ์กับ§Hจักรวรรดิของเราเอง§!หนึ่ง ใน บรรดา ผู้ ส่ง ข่าว ของ พวก เขา เอา เหยื่อ ที่ เรา ได้ วาง ไว้ ให้ พวก เขา อย่าง ระมัดระวัง และ ถูก หลอก ให้ เปิด เผย ความ คิด บาง อย่าง ที่ น่า เบื่อ และ เป็น ความ คิด ส่วน ตัว เกี่ยว กับ นัก การ ทูต ของ เรา เอง.[Root.Target.GetAdj] §Hจุด ยืน ทาง การ ทูต§!ผล ก็ คือ อ่อน ลง."
 operation.8230.desc.galactic_comedy:0 "$operation.8230.desc.base$โดย ทํา ให้ ผู้ ส่ง ข่าว คน หนึ่ง ของ พวก เขา ได้ รับ ความ อับอาย เรา จึง จัด การ ทํา ให้ พวก เขา อับอาย ขาย หน้า มาก. พวกเขา§Hจุด ยืน ทาง การ ทูต§!ผล ก็ คือ อ่อน ลง."
 operation.8230.desc.lobbying:1 "$operation.8230.desc.base$เราสามารถสร้างเรื่องอื้อฉาวในล็อบบี้ได้ ทั้งหมดที่ต้องการคือ ผู้ไม่ประสงค์ออกนาม รายละเอียดของจํานวนของทูตของพวกเขา§H[Root.Target.GetOppositionGalcomLobbyists]§!- องค์กรที่ไม่สมมาตร[Root.Target.GetAdj]ผลประโยชน์ พวกเขา§Hจุด ยืน ทาง การ ทูต§!ผล ก็ คือ อ่อน ลง."
 operation.8230.desc.elope:0 "$operation.8230.desc.base$ปรากฏ ว่า ผู้ ส่ง ข่าว คน หนึ่ง ของ พวก เขา ได้ หลง รัก กับ ความ ผิด ร้าย แรง ใน หมู่ พวก เขา. ด้วยคําชักชวนที่อ่อนโยน และความช่วยเหลือจากเราในการหลบหนี[Root.Target.GetAdj]กองกําลังรักษาความปลอดภัย - เราสามารถชักชวนพวกเขาให้หนีตามคู่หูได้ และหาที่ลี้ภัย ในสังคมที่เอื้อเฟื้อกว่า\n\nเหตุการณ์นี้ทําให้§Hคําถามอึดอัด§!ไปสู่จุดหมายปลายทาง[Root.Target.GetGovernmentName]ในสถานการณ์การทูตที่ยากลําบาก"
 operation.8230.desc.wayward:0 "$operation.8230.desc.base$ด้วยการใช้อุปกรณ์บันทึกเสียงอย่างอ่อนโยน และฉลาด เราสามารถที่จะเปิดโปง[Root.Target.GetAdj]ได้รับมอบหมายจากนอร์ม\n\nเหตุการณ์นี้ทําให้§Hคําถามอึดอัด§!ไปสู่จุดหมายปลายทาง[Root.Target.GetAdj]การชุมนุมทางการทูต ในสถานการณ์ที่ยากลําบาก"
 operation.8230.desc.substances:0 "$operation.8230.desc.base$เรื่องได้รับการแก้ไขโดยการนําเข้าสู่การทุจริตยาเสพติดหนึ่งของทูตของพวกเขา ซึ่งได้อนุญาตให้ขุนนางที่มุ่งมั่นยาเสพติดเกินเหตุ พวกเขา§Hจุด ยืน ทาง การ ทูต§!ผล ก็ คือ อ่อน ลง."
 diplo_incident_succeeded:0 "ความน่าเชื่อถือของ§Y[Root.Target.GetName]§!การชุมนุมทางการทูตอยู่ในถัง"

 envoy_events.210.name:0 "คนพื้นเมืองไปแล้ว"
 envoy_events.210.desc.start:0 "[event_envoy.GetName]ผู้ส่งสารของเราถึง[envoy_country.GetName]ดูเหมือนว่า จะกลายเป็นคนพื้นเมืองไปแล้ว"
 envoy_events.210.desc.end:0 "การ อัศจรรย์ เหล่า นี้ ได้ กระตุ้น ให้ เกิด การ เคลื่อน ไหว เพื่อ ระลึก ถึง[event_envoy.GetHerHim]ดังนั้น[event_envoy.GetSheHe]สามารถเตือนถึงความดี[Root.GetAdj]ฝึก อย่าง ไร ก็ ตาม คน อื่น ๆ ชี้ ว่า การ มี ทูต สามารถ เข้าใจ คน เหล่า นั้น ที่ ปฏิบัติ ตาม ทัศนะ ที่ ต่าง ออก ไป มาก ที เดียว ต่อ ตัว เรา เอง อาจ ปรากฏ ว่า เป็น ประโยชน์ ใน สถานการณ์ ทาง การ ทูต ที่ ตึงเครียด."
 envoy_events.210.desc.authoritarian:0 "$envoy_events.210.desc.start$ในช่วง 2-3 เดือนที่ผ่านมา[event_envoy.GetSheHe] [event_envoy.GetHasHave]บ่อยครั้งที่ดูเหมือนจะชื่นชม[envoy_country.GetAdj]ระบบรัฐบาลที่ยอมรับความแตกต่างกับเสรีภาพที่มีที่นั่นมีความเข้มงวดและขาดเสรีภาพภายใน[Root.GetGovernmentName].\n\"ผมเห็นคําอุทธรณ์จากรัฐบาลที่มีต่อประชาชน\"[event_envoy.GetSheHe] [event_envoy.GetWasWere]เมื่อเร็ว ๆ นี้ได้ยินที่จะบอกว่า \"ในความเป็นจริงฉันแทบจะไม่สามารถจินตนาการระบบที่ดีกว่าตัวเอง.\"\n\n$envoy_events.210.desc.end$"
 envoy_events.210.desc.egalitarian:0 "$envoy_events.210.desc.start$ในช่วง 2-3 เดือนที่ผ่านมา[event_envoy.GetSheHe] [event_envoy.GetHasHave]บ่อยครั้งที่ดูเหมือนจะชื่นชม[envoy_country.GetAdj]ระบบรัฐบาล, บ่นบ่อยที่ญาติไม่ตัดสินของเรา[Root.GetGovernmentName].\n\"ถ้าเสรีภาพที่ต่ํากว่าเป็นราคาของรัฐบาลที่มีประสิทธิภาพ แล้วบางทีที่เป็นราคาที่คุ้มค่าจ่าย\"[event_envoy.GetSheHe] [event_envoy.GetWasWere]เมื่อเร็ว ๆ นี้ได้ยินที่จะบอกว่า\n\n$envoy_events.210.desc.end$"
 envoy_events.210.desc.xenophile:0 "$envoy_events.210.desc.start$สวยงาม[event_envoy.GetSheHe] [event_envoy.GetHasHave]เห็นด้วยกับ[envoy_country.GetAdj]ความ ไม่ ไว้ วางใจ ของ คน ต่าง ด้าว เรียก ร้อง ให้ มี มาตรการ เพื่อ ป้องกัน ไม่ ให้ ถูก กล่าว หา ว่า แสวง ประโยชน์ จาก คน แปลก หน้า[Root.GetAdj]การต้อนรับ เมื่อถูกท้าทาย[event_envoy.GetSheHe]ตอบสนองว่าได้เห็น ผลประโยชน์ของสังคมที่เป็นระเบียบมากขึ้นใน[envoy_country.Capital.GetName]กลับสู่ความยุ่งเหยิง และความไม่ชอบธรรมของ[Root.Capital.GetName]คง ยาก แน่ ๆ.\n\n$envoy_events.210.desc.end$"
 envoy_events.210.desc.xenophobe:0 "$envoy_events.210.desc.start$การละทิ้ง[Root.GetAdj]ความไม่ไว้ใจของเอเลี่ยน[event_envoy.GetSheHe] [event_envoy.GetHasHave]ถูกจับได้ว่าพอใจ[event_envoy.GetHerHis]ความ ปรารถนา ทาง กาย โดย การ เข้า ร่วม ใน การ รื่นเริง กับ ฝูง ชน[envoy_country.GetSpeciesNamePlural]เมื่อถูกท้าทาย[event_envoy.GetSheHe]ความ เห็น:\n\"ฉันจะต่อต้านความงามได้อย่างไร[envoy_country.GetSpeciesAdj] [envoy_country.GetSpeciesNamePluralCompliment]?\"\n\n$envoy_events.210.desc.end$"
 envoy_events.210.desc.materialist:0 "$envoy_events.210.desc.start$ [event_envoy.GetSheHeCap]ดูเหมือน[event_envoy.GetSXX]ถูกรบกวนโดย[envoy_country.GetAdj]สภาพ ฝ่าย วิญญาณ, การ ค้ําจุน[Root.GetAdj]ความ สงสัย ใน เรื่อง ดัง กล่าว. เมื่อถูกท้าทาย[event_envoy.GetSheHe]ประท้วง:\n\"ฉันจะสงสัยความจริงของพระเจ้าได้อย่างไร ในเมื่อทุกอย่างชัดเจนขึ้นกับฉัน?\"\n\n$envoy_events.210.desc.end$"
 envoy_events.210.desc.spiritualist:0 "$envoy_events.210.desc.start$ [event_envoy.GetSheHeCap]ดูเหมือน[event_envoy.GetSXX]เกือบดูถูกของทัศนคติของผู้คนของเราที่มีต่อเรื่องพระเจ้า,[envoy_country.GetAdj]ทัศนะ ใน เรื่อง ต่าง ๆ นับ ตั้ง แต่ การ สะสม ทรัพย์ สมบัติ ส่วน ตัว จน ถึง ความ เป็น ไป ไม่ ได้ ของ การ สูญ เสีย ทรัพย์ สิน. เมื่อถูกท้าทาย[event_envoy.GetSheHe]ตีกลับ:\n\"เรามีมานานมากในอดีตที่นี่[Root.GetName]มันถึงเวลาที่เราจะโอบกอดอนาคต\n\n$envoy_events.210.desc.end$"
 envoy_events.210.desc.pacifist:0 "$envoy_events.210.desc.start$การละทิ้ง[Root.GetAdj]การสงบศึก[event_envoy.GetSheHe] [event_envoy.GetHasHave]กลายเป็นผู้สนับสนุนที่ก้าวหน้าอย่างน่าทึ่ง สําหรับการใช้จ่ายทางทหารมากขึ้น และนโยบายต่างประเทศที่มีประสิทธิภาพมากขึ้น การยกย่องอย่างเปิดเผย[envoy_country.GetAdj]การทหาร\n\n$envoy_events.210.desc.end$"
 envoy_events.210.desc.militarist:0 "$envoy_events.210.desc.start$หลายเดือนมานี้[event_envoy.GetSheHe] [event_envoy.GetHasHave]กลายเป็นวิกฤตเพิ่มขึ้นของ[Root.GetAdj]การทหาร การยกย่อง\"คุณธรรมมากขึ้น\"[envoy_country.GetAdj]การดํารงอยู่ เมื่อถูกท้าทาย[event_envoy.GetSheHe]ตีกลับ:\n\"เราไม่สามารถยังคงป่าเถื่อน ของกาแล็กซี่ตลอดไป เราต้องควบคุมสัญชาตญานของเรา หากมีอารยชนมากขึ้นที่จะเคารพเรา.\"\n\n$envoy_events.210.desc.end$"
 envoy_events.210.A:0 "[event_envoy.GetSheHeCap]จะยังคงอยู่ใน[event_envoy.GetHerHis]ตําแหน่ง"
 faction_upset:0 "โกรธ"

 envoy_events.215.name:0 "การ ทํา ร้าย ร่าง กาย"
 envoy_events.215.desc:0 "งานเอกอัครราชทูตของเรา มีความเป็นห่วงมาระยะหนึ่ง[event_envoy.GetName]หนึ่งในเจ้าหน้าที่ของเรา[event_envoy.GetEnvoyLocation]ตอนนี้ หลักฐานเปิดเผยแล้ว[event_envoy.GetSheHe]ปรากฏ[event_envoy.GetSXX]ได้ตกเป็นเหยื่อของเอเลี่ยน[provider_country.GetName]ที่ได้พิสูจน์แล้วว่าติดมาก[Root.GetSpeciesNamePlural].\n\nแม้ว่าการค้าในสารนี้ จะผิดกฎหมายสูงในหมู่[provider_country.GetSpeciesNamePlural]ตลาดมืดที่ร่ํารวย ที่ดําเนินการโดยขุนนางยาเสพติด ได้ผุดขึ้นมา เจ้าอาวาสยาพวกนี้ ซึ่งดูเหมือนจะเป็นผู้แนะนํา[event_envoy.GetHerHim]เป็นยากระตุ้นอารมณ์ทางเพศที่มีประสิทธิภาพ ตอนนี้มีอิทธิพลอย่างมากต่อ[event_envoy.GetName]ที่ถูกบังคับให้ทําข้อเสนอของพวกเขาในผลตอบแทนสําหรับความพึงพอใจ[event_envoy.GetHerHis]ความต้องการ"
 envoy_events.215.A:0 "ยิง[event_envoy.GetHerHim]."
 envoy_events.215.A.tooltip:0 "§Y[event_envoy.GetName]§!ถูกแทนที่ด้วยผลกระทบทันที อย่างไรก็ตาม จะพิสูจน์ได้ว่ามันเป็นไปไม่ได้ ที่จะปกปิดรอยเปื้อนนี้ บนคอร์พทางการทูตของเรา"

 envoy_events.220.name:0 "ตก ต่ํา"
 envoy_events.220.desc.start:0 "เทปบันทึกการสนทนาส่วนตัวของทูต[offended_party.GetName]ยกแขนขึ้น ในช่วงเวลาที่น่าเศร้า[event_envoy.GetAmbassadorOrNotCap] [event_envoy.GetName]ดูเหมือนจะเรียกว่า[event_envoy.GetHerHis]เครื่อง\"สงสัย\"[offended_party.GetSpeciesNamePluralInsult]\""
 envoy_events.220.desc.end:0 "เดอะ[offended_party.GetAdj] [offended_party.GetRulerTitle]แสดงความตกใจและแนะนําว่าการทําให้บางคนเพื่อให้ไม่เหมาะสมสําหรับบทบาทที่ จะ\"ยินดี\""
 envoy_events.220.desc.hum:0 "$envoy_events.220.desc.start$นั่นดูเหมือนยากที่จะคิด\n\n$envoy_events.220.desc.end$"
 envoy_events.220.desc.mam:0 "$envoy_events.220.desc.hum$"
 envoy_events.220.desc.fun:0 "$envoy_events.220.desc.start$ที่ไม่สามารถเก็บสปอร์ของพวกเขาไว้กับตัวเอง\n\n$envoy_events.220.desc.end$"
 envoy_events.220.desc.avi:0 "$envoy_events.220.desc.start$นั่น ดู คล้าย สัตว์ ปีก ทั้ง ใน รูป ร่าง และ ลักษณะ นิสัย.\n\n$envoy_events.220.desc.end$"
 envoy_events.220.desc.plant:0 "$envoy_events.220.desc.start$ที่หนากว่าตอไม้\n\n$envoy_events.220.desc.end$"
 envoy_events.220.desc.art:0 "$envoy_events.220.desc.start$ที่ฉลาดน้อยกว่าแมลงวันบ้านส่วนใหญ่\n\n$envoy_events.220.desc.end$"
 envoy_events.220.desc.rep:0 "$envoy_events.220.desc.start$น่าขนลุก[event_envoy.GetHerHim]ออกไป\n\n$envoy_events.220.desc.end$"
 envoy_events.220.desc.mol:0 "$envoy_events.220.desc.start$ที่ก่อมลพิษทุกอย่างด้วย กากสกปรกของพวกเขา\n\n$envoy_events.220.desc.end$"
 envoy_events.220.desc.lit:0 "$envoy_events.220.desc.start$ที่แยกไม่ออกในสติปัญญา จากก้อนกรวดในสวน\n\n$envoy_events.220.desc.end$"
 envoy_events.220.desc.nec:0 "$envoy_events.220.desc.start$กลิ่นเหมือน ปฏิเสธเมื่อเดือนที่แล้ว\n\n$envoy_events.220.desc.end$"
 envoy_events.220.desc.aqu:0 "$envoy_events.220.desc.start$ไม่มีอะไรนอกจากเสียงแผ่วเบา\n\n$envoy_events.220.desc.end$"
 envoy_events.220.desc.robot:0 "$envoy_events.220.desc.start$ที่มีพลังประมวลผลน้อยกว่าอาหารทั่วไป\n\n$envoy_events.220.desc.end$"

 ESPIONAGE_INTEL_GAINED_TITLE:0 "ข้อมูลที่ได้จากสายลับสองหน้า"
