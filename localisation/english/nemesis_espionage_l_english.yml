 operation_weaken_galactic_empire_desc:0 "สายลับของเราจะแทรกซึมเข้าไปในใจกลางของจักรวรรดิเพื่อทำให้อำนาจของจักรวรรดิกาแล็กติกอิมพีเรียมอ่อนแอลง"
