 envoy_events.225.name:0 "ความ ทุกข์ ลําบาก"
 envoy_events.225.desc:0 "เดอะ[Root.GetAdj]คณะทูตถูกเขย่าโดยข่าวที่เกิดขึ้นจาก[scandal_empire.GetName]ของเรา[event_envoy.GetAmbassadorOrNot] [event_envoy.GetName]ที่เคยประจําการที่นั่น[event_envoy.GetHerselfHimself]ให้กลายเป็นเรื่องซีเรียส[scandal_empire.GetAdj]การบังคับใช้กฎหมาย[event_envoy.GetSheHeCap] [event_envoy.GetIsAre]ปัจจุบันเกี่ยวข้องกับการก่อความไม่สงบ ที่เกี่ยวข้องกับอาชญากรรมร้ายแรง ที่เกิดขึ้นในระดับที่ร้ายแรง\n\nเป็นเรื่องยืน - และมีข่าวลือที่วิ่งป่าในหมู่[scandal_empire.GetSpeciesNamePlural]- ดูเหมือนจะมีข้อสงสัยเล็กน้อย[event_envoy.GetName]ความรู้สึกผิด เดอะ[scandal_empire.GetAdj]เจ้าหน้าที่ได้เรียกร้องให้[event_envoy.GetHerHis]การคุ้มครองทางการทูตถูกยกเลิกเพื่อให้[event_envoy.GetSheHe]สามารถเผชิญหน้ากับความยุติธรรม[event_envoy.GetHerHis]ทํา"
