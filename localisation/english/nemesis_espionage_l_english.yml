 tech_thought_enforcement_desc:0 "การ ถ่ายทอด ทาง โทรศัพท์ สามารถ ตรวจ สอบ ความ คิด ที่ ไม่ ถูก ต้อง ของ พลเมือง แต่ ด้วย การ ศึกษา บาง ราย เขา สามารถ แก้ไข ความ คิด ที่ เขา พบ ด้วย."
