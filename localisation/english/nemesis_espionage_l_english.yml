 envoy_events.200.desc:1 "เสียงรบกวนอาจจะได้ยินในชุมชนกาแล็กซี่ - ไม่ได้ทั้งหมดของพวกเขาเป็นมิตรและแน่นอนไม่ได้ทั้งหมดของพวกเขาเรียงชิดกับ[Root.GetAdj]ผลประโยชน์ น่าเสียดายที่ดูเหมือนว่า[event_envoy.GetName]ได้ฟังเสียงผิด ดวงตาถูกเลี้ยงมา[event_envoy.GetSheHe]เข้าร่วมการประชุมหลายครั้ง โดย§H[Root.GetOppositionGalcomLobbyists]§!ตอนนี้กลายเป็นว่า จํานวนเครดิตจํานวนมากที่ติดตามไปยังองค์กรที่ถูกโอนไปยัง[event_envoy.GetHerHim].\n\n[event_envoy.GetName]เพื่อนร่วมงานเรียกร้องให้[event_envoy.GetSheHe]จําความได้ สร้างความไว้ใจ อย่างไรก็ตาม ที่ปรึกษาของเราบางคน แนะนําให้เราทําข้อตกลง[event_envoy.GetHerHim]แลกกับกัญชา"
