 operation.8000.name:0 "การ นํา หน้า"
 operation.8000.desc:0 "เจ้าหน้าที่ของเรากําลังรวบรวมรายชื่อ ของเซลล์สลีปเปอร์ที่มีศักยภาพภายใน§H[root.target.GetName]§!พวก เขา หวัง จะ หา ตําแหน่ง ที่ เหมาะ สม ซึ่ง ตัว แทน อาจ ดู ไม่ เป็น มิตร และ ยัง คง เตรียม พร้อม ที่ จะ โจมตี อยู่ เป็น เวลา นาน."
 operation.8001.name:0 "เซลล์ ที่ อาจ เป็น ไป ได้"
 operation.8001.desc:0 "รายชื่อเป้าหมายถูกแก้ไขเสร็จแล้ว และคนของเราก็ค่อยๆ ลอยเข้ามาในตําแหน่ง พวกเขารอสัญญาณของเรา ที่จะเริ่มต้นสร้างเซลล์สลีปเปอร์"
 operation.8002.name:0 "เซลล์ ที่ นอน หลับ ก่อ ตัว ขึ้น"
 operation.8002.desc.start:0 "รายงานจาก§Hปฏิบัติการ[This.GetName]§!มีประโยชน์มาก"
 operation.8002.desc.boring:0 "$operation.8002.desc.start$คนของเราซ่อนตัวเองได้สําเร็จ ในหลายตําแหน่ง[root.target.GetAdj]สังคมที่ซ่อนตัวในเว็บไซต์ธรรมดา และแสร้งทําเป็นพลเมืองธรรมดา$operation.8002.desc.end$"
 operation.8002.desc.materialist:0 "$operation.8002.desc.start$การไหลของหน่วยกิตลึกลับที่ไม่สามารถตรวจสอบได้ ได้ช่วยให้เจ้าหน้าที่ของเราลูท -และปลอมอ้างอิง - ที่จําเป็นในการเดินเข้าไปในตําแหน่งระดับกลางในหลายชั้นนํา[root.target.GetAdj]บริษัท$operation.8002.desc.end$"
 operation.8002.desc.megacorp:0 "$operation.8002.desc.start$การไหลของหน่วยกิตลึกลับที่ไม่สามารถตรวจสอบได้ ได้ช่วยให้เจ้าหน้าที่ของเรา ยุบระบบการเงิน - และปลอมอ้างอิง - จําเป็นที่จะเดินเข้าไปในตําแหน่งหลายระดับภายใน[root.target.GetAdj]ความวุ่นวาย$operation.8002.desc.end$"
 operation.8002.desc.spiritualist:0 "$operation.8002.desc.start$ถึงแม้ว่าจะสร้างความรู้เพียงพอ[root.target.GetAdj]สภาพ ฝ่าย วิญญาณ เป็น ข้อ ท้าทาย ที่ สําคัญ ผู้ ที่ ทํา งาน ของ เรา ได้ รับ การ ยอม รับ ภาย ใน คณะ ปุโรหิต ของ พวก เขา — สถาบัน ที่ มี อิทธิพล มาก ที่ สุด ภาย ใน ค ริ สต จักร[root.target.GetGovernmentName]. $operation.8002.desc.end$"
 operation.8002.desc.authoritarian.imperial:0 "$operation.8002.desc.start$หลังการประท้วงอย่างผิดๆหลายครั้ง ไม่รวมไปถึงการปลอมแปลงเช็คประวัติ - ลูกน้องของเราได้เข้ารับตําแหน่งราชการภายในโครงสร้างการปกครองของราชวงศ์$operation.8002.desc.end$"
 operation.8002.desc.authoritarian.non_imperial:0 "$operation.8002.desc.start$หลังการประท้วงอย่างผิดๆหลายครั้ง ไม่รวมไปถึงการปลอมแปลงเช็คประวัติ - ลูกน้องของเราได้เข้ารับตําแหน่งราชการภายในโครงสร้างการปกครองของพรรคการปกครอง$operation.8002.desc.end$"
 operation.8002.desc.militarist:0 "$operation.8002.desc.start$หลังจากความพยายามอย่างมากและจํานวนมากปกปิดการปลอมแปลงอย่างรอบคอบ เราได้จัดการในการปลูกหลายของเจ้าหน้าที่ในสถานะต่ําภายใน[root.target.GetAdj]ทหาร$operation.8002.desc.end$"
 operation.8002.desc.hive:0 "$operation.8002.desc.start$โดยใช้เทคโนโลยีพีโรมอนัลล่าสุด พร้อมทั้งเครื่องอุดตันเส้นประสาทที่เต้นด้วยหัวใจ[root.target.GetGovernmentName]ที่นั่น เราจะสามารถปกปิดและเริ่มล้มล้าง[root.target.GetAdj] [root.target.GetIndividualNamePlural]. $operation.8002.desc.end$"
 operation.8002.desc.hive_on_hive:0 "$operation.8002.desc.start$เราจัดการทําลายแผนความคิดหลายอย่าง[root.target.GetAdj] [root.target.GetGestaltEntityName]เพื่อที่พวกเขาจะได้รายงานให้เราทราบ โดยทําเป็นว่าปกติ$operation.8002.desc.end.gestalt$"
 operation.8002.desc.machine:0 "$operation.8002.desc.start$แฮกเกอร์ผู้เชี่ยวชาญของเรา ได้เปิดประตูหลังหลายบาน[root.target.GetGovernmentName]ปกปิดได้สําเร็จ ในส่วนที่สําคัญ[root.target.GetAdj]รหัสที่พวกเขาขึ้นอยู่กับการทํางาน$operation.8002.desc.end.gestalt$"
 operation.8002.desc.machine_on_machine:0 "$operation.8002.desc.start$ย่อยของเรามีการเปิดหลายของประตูหลังที่ซ่อนใน[root.target.GetGovernmentName]ปกปิดได้สําเร็จ ในส่วนที่สําคัญ[root.target.GetAdj]รหัสที่พวกเขาขึ้นอยู่กับการทํางาน$operation.8002.desc.end.gestalt$"
 operation.8002.desc.end:0 "\n\nจากที่นั่น พวกเขาจะสามารถ อัพเดทข้อมูลให้เราได้§Hเกิดเหตุล่าสุด§!ใน[root.target.GetName]และรักษามันไว้§Hความสามารถระยะยาว§!เพื่อดําเนินงานที่นั่น เราควรหวัง"
 operation.8002.desc.end.gestalt:0 "\n\nโดยการใช้สิ่งเหล่านี้ เราจะสามารถติดตาม§Hเกิดเหตุล่าสุด§!ใน[root.target.GetName]และรักษามันไว้§Hความสามารถระยะยาว§!เพื่อดําเนินงานที่นั่น เราควรหวัง"
