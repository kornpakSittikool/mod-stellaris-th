 INFILTRATION_LEVEL_DELAYED_BODY:0 "§E§Yเลเวลการแทรกซึม§! จะเป็นตัวกำหนดว่าปฏิบัติการใดที่เครือข่ายสอดแนมนี้สามารถดำเนินการได้ และอาจเพิ่ม §Yข้อมูลข่าวกรอง§! ที่เรามีของจักรวรรดินี้\n\nเมื่อเลเวลการแทรกซึมเพิ่มขึ้น สายของคุณจะใช้เวลานานขึ้นในการขยายเครือข่ายสายลับเพิ่มเติม§!"
