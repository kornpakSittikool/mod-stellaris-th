 envoy_events.205.desc:1 "เดอะ[envoy_country.GetSpeciesNamePlural]ได้ นํา เสนอ การ บ่น เกี่ยว กับ การ ประพฤติ ของ เรา[event_envoy.GetAmbassadorOrNot]ถึง[event_envoy.GetEnvoyLocation], [event_envoy.GetName]เห็นได้ชัด[event_envoy.GetHerHis]พฤติกรรมทําให้ชาวบ้านไม่พอใจ[envoy_country.GetSpeciesNamePlural]ว่าเจ้าหน้าที่ของพวกเขาได้โพสต์ ยามสําหรับ[event_envoy.GetHerHis]การคุ้มครองตนเอง ว่าอะไร[event_envoy.GetSheHe]ไม่มีความชัดเจนสําหรับเรา ในขณะที่เราขาด[envoy_country.GetAdj]ความ หงุดหงิด แต่ มี การ ประท้วง อย่าง แพร่ หลาย[event_envoy.GetHerHim]และ\"[Root.GetAdj]ความเย่อหยิ่ง[event_envoy.GetSheHe]แสดง[event_envoy.GetSXX].\n\nเดอะ[envoy_country.GetName]กระตุ้น เรา ให้ ระลึก ถึง[event_envoy.GetName]และส่งทูตใหม่เข้ามา[event_envoy.GetHerHis]สถานที่ พวกเขาบอกใบ้ถึงผลกระทบทางการทูต ถ้าเราปฏิเสธ"
