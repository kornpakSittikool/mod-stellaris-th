 tech_capital_productivity_3:0 "เพิ่มผลผลิตสูงสุด"
 tech_capital_productivity_3_desc:0 "ความ ก้าว หน้า ต่อ ไป ใน เทคโนโลยี ทํา ให้ ดาว เคราะห์ ที่ พัฒนา มาก ที่ สุด ของ เรา บรรลุ ถึง ระดับ การ ผลิต ซึ่ง ไม่ เคย ได้ ยิน มา ก่อน."
