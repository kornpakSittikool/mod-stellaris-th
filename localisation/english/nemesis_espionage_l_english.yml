 asset_header:0 "จารชน"
 asset_bureaucrat:0 "ข้าราชการ"
 asset_bureaucrat_desc:0 "ข้าราชการ ที่ ไม่ พอ ใจ ซึ่ง ถูก ล่อ ใจ ให้ รับ ใช้ เรา โดย ทาง คํา สัญญา เท็จ เรื่อง ชีวิต ที่ ดี กว่า."
 asset_clerk:0 "เสมียน"
 asset_clerk_desc:0 "เสมียน ทั่ว ไป ไม่ มี ความ สุข กับ งาน ของ ตน อยาก ได้ ความ ตื่น เต้น เล็ก ๆ น้อย ๆ ใน ชีวิต."
 asset_economist:0 "นักเศรษฐศาสตร์"
 asset_economist_desc:0 "นักเศรษฐศาสตร์ที่รับสินบนและตอนนี้ก็อยู่ในแถวด้วยการแบล็กเมล์"
 asset_scientist:0 "นักวิทยาศาสตร์"
 asset_scientist_desc:0 "การอุทธรณ์ของเราเพื่อความภาคภูมิใจของ นักวิทยาศาสตร์นี้ ได้ทําให้พวกเขาเชื่อว่า พวกเขาถูกชื่นชม"
 asset_junior_officer:0 "เจ้าหน้าที่ชั้นผู้น้อย"
 asset_junior_officer_desc:0 "นายทหารที่ได้รับการขับไล่จากผู้บังคับบัญชาของพวกเขา เราได้รีบเร่งให้คําพูดของพวกเขาแก่เขา"
 asset_criminal_underling:0 "สมุนอาชญากร"
 asset_criminal_underling_desc:0 "อาชญากรเล็กน้อยที่ดูหมิ่นเพื่อน ๆ คนของเราได้ดึงดูดความสนใจของพวกเขา ในเรื่องความโลภและความเห็นแก่ตัว"
 asset_attache:0 "เจ้าหน้าที่สถานทูต"
 asset_attache_desc:0 "เบี้ยที่ไม่เข้าใจ ที่ทํางานเป็น หน่วยงานทางการทูตเล็กน้อย พวก เขา ทุก คน เต็ม ใจ แบ่ง ปัน ข้อมูล ที่ เขา ไม่ ควร ได้ รับ."
 asset_laborer:0 "คนงาน"
 asset_laborer_desc:0 "สมาชิก ของ สังคม ที่ ถูก มอง ข้าม และ ทํา งาน หนัก เกิน ไป โดย มี นิสัย ขืน อํานาจ."
 asset_hacker:0 "แฮ็กเกอร์"
 asset_hacker_desc:0 "แฮ็คเกอร์ที่เก่งกาจ ที่อาณาจักรของพวกเขาต้องการ มันทํางานให้เรา เพื่อจ่ายค่าจ้างและคุ้มครอง"
 asset_arms_smuggler:0 "ผู้ลักลอบขนอาวุธ"
 asset_arms_smuggler_desc:0 "อาชญากรที่เชี่ยวชาญในการครอบครองสินค้าทางทหาร"
 asset_agitator:0 "ผู้ปลุกปั่น"
 asset_agitator_desc:0 "การมองโลกในแง่ดีที่ไร้เดียงสา ที่เชื่อว่าพวกเขาสามารถเปลี่ยนโลกให้ดีขึ้นได้ เป็น เรื่อง ง่าย มาก ที่ จะ ควบคุม ตัว เอง โดย การ ดึงดูด ความ สนใจ ของ พวก เขา."
 asset_newscaster:0 "ผู้ประกาศข่าว"
 asset_newscaster_desc:0 "เสียง แสดง ความ เห็น อก เห็น ใจ ใน สื่อ ต่าง ๆ เต็ม ใจ เผย แพร่ ข่าวสาร ของ เรา เพื่อ แลก กับ ข้อมูล."
 asset_pop_icon:0 "ดาราดัง"
 asset_pop_icon_desc:0 "ตัว เลข ความ บันเทิง ซึ่ง ใช้ เวลา 15 นาที ของ ตน ใน การ สร้าง ชื่อ เสียง และ เต็ม ใจ จะ ทํา ทุก สิ่ง ทุก อย่าง เพื่อ กลับ ไป สู่ จุด เด่น."
 asset_academic:0 "นักวิชาการ"
 asset_academic_desc:0 "ผู้ คง แก่ เรียน ที่ ไม่ น่า เชื่อ ถือ หา วิธี ไถ่ ชื่อ ของ ตน."
 asset_veteran:0 "ทหารผ่านศึก"
 asset_veteran_desc:0 "ทหารผ่านศึกบาดเจ็บ ที่หายไปในล้อของกรมราชการ เรามาช่วยพวกมัน"
 asset_internal_organs:0 "ออร์แกนภายใน"
 asset_internal_organs_desc:0 "การรู้การทํางานของกายวิภาคของฝ่ายตรงข้าม สามารถเป็นประโยชน์อย่างน่าทึ่ง ในระหว่างปฏิบัติการจารกรรม"

 asset_synapse_drone:0 "โดรนไซแน็ป"
 asset_synapse_drone_desc:0 "บุคลากรสามารถใช้หุ่นไซแนปนี้ รับความคิดจากรัง"
 asset_ephapse_relay:0 "เอ ฟ รา ปส์"
 asset_ephapse_relay_desc:0 "เครื่อง ส่ง แบบ นี้ สามารถ ปรับ เปลี่ยน ข้อ ความ ที่ ได้ รับ จาก รัง ได้."
 asset_labor_drone:0 "แรงงาน"
 asset_labor_drone_desc:0 "อัลกอริอะฮ์ของคนขับคนนี้ ทําให้เจ้าหน้าที่ของเรา ออกคําสั่งง่ายๆ"
 asset_research_drone:0 "การวิจัย โดรน"
 asset_research_drone_desc:0 "การกลายพันธุ์เล็กน้อยทําให้ โดรนวิจัย ต่อสมองของรังนี้ปลอดภัยน้อยกว่าปกติ"
 asset_warrior_drone:0 "นักรบ Drone"
 asset_warrior_drone_desc:0 "ลูกเรือของเราได้จัดการในการหา ช่องทางในการให้คําสั่งโดรนนักรบนี้ ที่ให้บริการเป้าหมายของเรา"
 asset_behavioral_regulator:0 "ตัวแบ่งพฤติกรรม"
 asset_behavioral_regulator_desc:0 "ส่วนหนึ่งของระบบการป้องกันรัง ของวัตถุนี้ระบุ หุ่นยนต์ผิดปกติสําหรับการทําลาย น่าแปลกที่คนนี้ถูกโค่นล้ม"
 asset_pheromone_emitter:0 "Pheromone Emitter"
 asset_pheromone_emitter_desc:0 "โฟโรเมียนเอมิเตอร์ตัวนี้ มีผลกระทบต่อพฤติกรรมของโดรนที่อยู่ใกล้เคียง"
 asset_resource_distribution_node:0 "โหนดแจกจ่ายทรัพยากร"
 asset_resource_distribution_node_desc:0 "การจัดวางทรัพยากรของรังถูกจัดการโดยเครือข่ายของ เครือข่ายการกระจายทรัพยากร"
 asset_cortex_node:0 "โหนดคอร์เท็กซ์"
 asset_cortex_node_desc:0 "การทําหน้าที่เป็นที่เก็บข้อมูลสําหรับรังของมัน การควบคุมต่อมคอร์เทกซ์ สามารถช่วยให้เจ้าหน้าที่ของเรา สามารถขโมยหรือแก้ไขข้อมูลได้"
 asset_subspace_tendril:0 "เลเยอร์"
 asset_subspace_tendril_desc:0 "เส้นเอ็นเหล่านี้ใช้ในการสื่อสารกับกองเรือของรังในกาแล็กซี่"

 asset_coordination_system:0 "ระบบประสานงาน"
 asset_coordination_system_desc:0 "ระบบนี้ทําหน้าที่เป็นชั้น ๆ ระหว่างโหนดหลักของโลกกับ[coordinator.GetName]โดรนในพื้นที่นั้น"
 asset_engagement_protocol:0 "โพรโทคอลการหมั้น"
 asset_engagement_protocol_desc:0 "การ สื่อ ความ กับ ผู้ มี เชาวน์ ปัญญา อื่น ๆ ส่วน ใหญ่ ถูก ควบคุม โดย ระบบ นี้."
 asset_logistics_system:0 "ปูมบันทึกระบบดาว"
 asset_logistics_system_desc:0 "การติดตามทรัพยากรท้องถิ่น ผ่านระบบปูมบันทึก"
 asset_research_database:0 "การวิจัยฐานข้อมูล"
 asset_research_database_desc:0 "ฐานข้อมูลนี้ติดตามทั้งความก้าวหน้าและความต้องการ ของสถานที่วิจัยของดาวเคราะห์"
 asset_war_algorithm:0 "อัลกอริธึมสงคราม"
 asset_war_algorithm_desc:0 "ระบบ นี้ มี แผนการ สู้ รบ และ มี การ จําลอง ความ ขัด แย้ง มาก มาย นับ ไม่ ถ้วน ภาย ใน บริเวณ นั้น."
 asset_command_relay:0 "เรียกคําสั่งใหม่"
 asset_command_relay_desc:0 "สัญญาณรบกวนที่ส่งต่อคําสั่ง จากระบบอื่นไปยังโดรนภายในพื้นที่ที่กําหนด"
 asset_dispatch_uplink:0 "เรียกเชื่อมต่อ"
 asset_dispatch_uplink_desc:0 "ส่วนเชื่อมโยงนี้จะถูกส่งมาเพื่อส่งคําสั่งข้ามระยะไกลระหว่างโหนด"
 asset_resource_pylon:0 "ไพลอนทรัพยากร"
 asset_resource_pylon_desc:0 "ทรัพยากรที่รวบรวมที่ไพลอนเหล่านี้สําหรับการกระจาย"
 asset_memory_cache:0 "แคชหน่วยความจํา"
 asset_memory_cache_desc:0 "งานวิจัยท้องถิ่นถูกเก็บไว้ในระบบเหล่านี้ ก่อนที่จะส่งต่อไปยังหน่วยสืบราชการลับหลัก"
 asset_weapons_platform:0 "แพลตฟอร์มอาวุธ"
 asset_weapons_platform_desc:0 "คนของเราใช้ความเปราะบางทางใจ ซึ่งทําให้พวกเขาสามารถ ควบคุมอาวุธป้องกันบางส่วนได้"

