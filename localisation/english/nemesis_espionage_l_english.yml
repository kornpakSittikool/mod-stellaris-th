 tech_tracking_implants:0 "การฝังระบบติดตาม"
 tech_tracking_implants_desc:0 "ความ ก้าว หน้า ต่อ ไป ใน สาขา การ อุด ตัน ใต้ ดิน อาจ ให้ ราย ละเอียด เกี่ยว กับ การ เคลื่อน ไหว และ การ กระทํา ของ การ ปลูก."
