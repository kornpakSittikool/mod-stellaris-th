 operation_gather_information_desc:3 "สายลับของเราจะรวบรวมข้อมูลเกี่ยวกับ §Y[This.Target.GetName]§! โดยจะส่งรายงาน §Yข้อมูล§! เมื่อเสร็จสิ้น นอกจากนี้ยังจะเปิดเผยช่องโหว่ที่จะเพิ่ม §Yเลเวลการแทรกซึมสูงสุด§! ของเราในช่วงระยะเวลาหนึ่ง\n\nการกำหนด §Yจารชน§! ในปฏิบัติการนี้อาจทำให้ผลลัพธ์เปลี่ยนไปตามสิ่งที่จารชนสนใจ"
 operation_gather_information_no_dlc_desc:2 "สายลับของเราจะรวบรวมข้อมูลเกี่ยวกับ §Y[This.Target.GetName]§! โดยจะส่งรายงาน §Yข้อมูล§! เมื่อเสร็จสิ้น นอกจากนี้ยังจะเปิดเผยช่องโหว่ที่จะเพิ่ม §Yเลเวลการแทรกซึมสูงสุด§! ของเราในช่วงระยะเวลาหนึ่ง"
