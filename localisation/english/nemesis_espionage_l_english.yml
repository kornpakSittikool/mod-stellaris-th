 edict_synaptic_reinforcement:0 "เสริมกำลังโครงข่ายประสาท"
 edict_synaptic_reinforcement_desc:0 "โดยเพิ่มการเชื่อมต่อซินแนปติก ของหุ่นยนต์ซ่อมบํารุงของเรา ความสามารถของพวกเขาในการจัดหา สําหรับโดรนที่อยู่ใกล้เคียงได้ดีขึ้น"
