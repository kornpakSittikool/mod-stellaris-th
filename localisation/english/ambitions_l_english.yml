# Paladin Traits

 leader_trait_paladin: "พาลาดินชื่อ"
 leader_trait_paladin_desc: "ผู้นํานี้มีเสื้อคลุมของพาลาดิน ด้วยคําพูดและการกระทํา พวกเขาหล่อหลอมความกล้าหาญของตัวเอง แชมป์ของกาแลคซีเสรี"
 leader_trait_paladin_effect: "ผู้นําคนนี้ไม่มี§Yเลื่อนลง§!และพวกเขาจะไม่เป็นผู้ออกจากมัน (อยู่ในกองไฟตลอดไป)§Yความจุของผู้นํา§!"

 leader_trait_paladin_ace: "นักบินเอซ"
 leader_trait_paladin_ace_desc: "ด้วยการตัดสินใจอย่างเฉียบพลันและตอบโต้พาลาดินนี้ เป็นผู้เชี่ยวชาญในการปักเข็มลงที่หัวใจของศัตรูของเรา"
 leader_trait_paladin_strategist: "ปริญญาตรี"
 leader_trait_paladin_strategist_desc: "ความสงบและการรวบรวมนี้คํานวณพาลาดิน เป็นผู้เชี่ยวชาญในการวางแผนสูตรที่ จะนําออกมาที่ดีที่สุดในของพวกเขา"
 leader_trait_paladin_strategist_tt: "เรือรบในระบบ:$TABBED_NEW_LINE$- อัตราการยิงยาน:§G+30%§!"
 PALADIN_STRATEGIST_AURA: "$leader_trait_paladin_strategist$คําสั่ง"
 leader_trait_paladin_ambusher: "เจ้าหน้าที่"
 leader_trait_paladin_ambusher_desc: "ผู้อดทนและแม่นยํา พาลาดินที่มุ่งเน้นนี้ เป็นผู้เชี่ยวชาญในการส่งมอบการโจมตีที่แน่นอน"
 leader_trait_paladin_logistician: "Architech"
 leader_trait_paladin_logistician_desc: "ความ คิด และ การ ฝึก อบรม ทาง วิทยาศาสตร์ ของ พา ลา ดิน ชนิด นี้ ทํา ให้ พวก เขา แก้ ปัญหา เกี่ยว กับ การ ตัด ไม้ และ การ บํารุง รักษา แม้ จะ อยู่ ใน ความ ร้อน แรง ของ การ ต่อ สู้ ก็ ตาม."
 leader_trait_paladin_logistician_tt: "เรือรบในระบบ:$TABBED_NEW_LINE$- ยานยก:§G-15%§!"
 PALADIN_LOGISTICIAN_AURA: "$leader_trait_paladin_logistician$ปรับค่าแสง:"
 leader_trait_paladin_defender: "ผู้ปกป้อง"
 leader_trait_paladin_defender_desc: "เรือพาลาดินที่แข็งแรงและไร้ระเบียบนี้ เชื่อใจในเรือและลูกเรือที่จะยืนหยัดต่อสู้กับความบังเอิญที่ท่วมท้น"
 leader_trait_paladin_spearhead: "หัวผักกาด"
 leader_trait_paladin_spearhead_desc: "พาลาดินผู้กล้าหาญคนนี้ ไม่ได้หลบเลี่ยงการต่อสู้ในแนวหน้า ร่วมกับพันธมิตรเพื่อเอาชนะศัตรูที่น่ากลัวที่สุด"
 leader_trait_paladin_knight: "อัศวิน"
 leader_trait_paladin_knight_desc: "พาลาดินได้สาบานตนว่าจะกล้าหาญ ความ สามารถ ของ พวก เขา ใน การ สู้ รบ นั้น ไม่ มี ใคร เทียบ ได้ ก็ ต่อ เมื่อ พวก เขา แก้ไข ไม่ ได้."

