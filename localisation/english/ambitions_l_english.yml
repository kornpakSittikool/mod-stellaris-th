 menp_defender_defense_2: "การ ฟื้น ตัว ที่ ไม่ อาจ แก้ ได้"
 menp_defender_defense_2_desc: "เมื่อ เผชิญ การ ทําลาย ล้าง บาง อย่าง เรา ไม่ ได้ ยืน หยัด เพราะ เรา เข้ม แข็ง ขึ้น. เรายืนอยู่เพราะเราต้อง"
 menp_defender_crisis_damage_4: "โดยมีความจําเป็นใดๆ"
 menp_defender_crisis_damage_4_desc: "มีกฎสงครามที่เราละเมิด และความรู้ที่สมบูรณ์ของค่าใช้จ่าย เมื่อวิกฤตการณ์ปัจจุบันจบลง เราจะถูกตัดสิน จนกว่าจะถึงตอนนั้น เราทําในสิ่งที่เราต้องทํา เพื่อให้แน่ใจว่ากาแล็กซี่ ยังคงตัดสินเราอยู่"
 unlocks_defender_crisis_damage_4: "ความเสียหายต่อกลุ่มวิกฤติ:§G+35%§!"
 menp_defender_galcom_3: "การ วาง แผน ร้าย"
 menp_defender_galcom_3_desc: "การป้องกันมักจะถูกปกปิดไว้ในความลับ แต่ในสถานการณ์ที่เป็นของเรา กาแล็คซี่ต้องรวมกัน"
 unlocks_defender_galcom_3: "การ วิเคราะห์ วิกฤตการณ์ พิเศษ§Yความละเอียด§!ใน§Y[GetGalCommunityOrGalImperium]§!."
 final_price_doctrine: "ราคาสุดท้าย"
 final_price_doctrine_desc: "ทหารของเรารู้หน้าที่ของพวกเขา และชื่อของพวกเขา จะปรากฏตลอดไปในประวัติศาสตร์กาแล็กซี่"
 force_preservation_doctrine: "บังคับให้ล่วงหน้า"
 force_preservation_doctrine_desc: "มีเวลาและสถานที่ ให้ชีวิตของคุณในการให้บริการของสาเหตุ จนกว่าเวลานั้นจะมาถึง เราไม่สามารถที่จะสูญเสียชีวิตของคนของเรา"
 menp_defender_research_2: "ไม่มีความลับ"
 menp_defender_research_2_desc: "ความลับที่เห็นแก่ตัว ที่ผลักดันเราให้หลงใหล ความก้าวหน้าทางเทคโนโลยีของเรา ไม่สามารถยอมรับได้อีกต่อไป ยิ่งพันธมิตรของเราแข็งแกร่งเท่าไหร่"
 menp_defender_defense_3: "ผู้ ปก ป้อง กาแล็กซี"
