 resolution_paladin_training_defense: "การ ฝึก อบรม พา ลา ติน: ป้องกัน"
 resolution_paladin_training_defense_desc: "พาลาดินที่ล้ม อาจสร้างแรงบันดาลใจ แต่คนที่มีชีวิตอยู่ปกป้อง การอยู่รอดของพวกเขาไม่ใช่ความรู้สึก แต่เป็นกลยุทธ์ เราจะสร้างทรัพยากรที่จําเป็นทั้งหมด เพื่อให้พวกมันอยู่ในแนวหน้า"
 resolution_paladin_training_defense_tt: "$only_one_paladin_training$\n\nเดอะ§Yพาลาดินชื่อ§! ผู้นำตอนนี้เงินให้:\n$MOD_SHIP_EVASION_MULT$: §G25%§!\n$MOD_SHIP_SHIELD_REGEN_ADD_PERC$: §G20%§!"
 resolution_paladin_training_offense: "การ ฝึก อบรม พา ลา ติน: การ ออก กําลัง กาย"
 resolution_paladin_training_offense_desc: "สันติ สุข ใน บาง ครั้ง ต้อง อาศัย ความ เข้ม แข็ง มาก กว่า การ ควบคุม. พวกพาลาดินไม่ได้ตีด้วยความโกรธ แต่รักษาสิ่งที่ต้องทน"
 resolution_paladin_training_offense_tt: "$only_one_paladin_training$\n\nเดอะ§Yพาลาดินชื่อ§! ผู้นำตอนนี้เงินให้:\n$MOD_SHIP_WEAPON_DAMAGE$: §G30%§!\n$MOD_SHIP_WEAPON_RANGE_MULT$: §G25%§!"
 only_one_paladin_training: "§Rพาลาดินตัวเดียว§Yฝึก§!มติสามารถผ่านได้§!"
 resolution_paladin_direct_command: "คําสั่งโดยตรง"
 resolution_paladin_direct_command_desc: "อันตรายที่คุกคามเรา ต้องการมาตรการพิเศษ เราต้องรวบรวมพาลาดินภายใต้การบังคับบัญชาของคัสโตเดียน"
 resolution_repeal_paladin_direct_command: "ถอนคําสั่งโดยตรง"
 resolution_repeal_paladin_direct_command_desc: "เวลา แห่ง วิกฤตการณ์ ได้ ผ่าน ไป แล้ว และ ด้วย เหตุ นี้ จึง จําเป็น ต้อง มี พระ บัญชา พิเศษ. ตอนนี้พวกพาลาดินจะกลับมาเป็นสายมาตรฐานของอํานาจ ค่าใช้จ่ายของพวกเขาเป็นไปตาม"
 resolution_paladin_direct_command_tooltip: "ทั้งหมด§Yพาลาดิน§!จะถูกควบคุมโดยชาวคัสโตเดียนโดยตรง"

 gal_com_too_early: "มันเร็วเกินไปที่จะพูดเรื่องนี้"

#Special Projects and event chains

 defender_of_the_galaxy_chain_title: "ผู้ ปก ป้อง กาแล็กซี"
 defender_of_the_galaxy_chain_desc: "กาแลคซีเป็นสถานที่ที่สวยงาม คุ้มค่าที่จะอนุรักษ์ ที่ ซึ่ง ผู้ คน นับ ไม่ ถ้วน, ความ หวัง, และ ความ ฝัน ต่าง ก็ สม ควร ได้ รับ การ คุ้มครอง. เราไม่แสวงหาอํานาจ เพียงความสงบสุข แต่ความสงบต้องได้รับการปกป้อง ต่อ สู้ กับ ผู้ ที่ จะ พิชิต, ทําลาย, หรือ ทุจริต เรา จะ ยืน หยัด. และตราบใดที่เรายืนอยู่กาแล็กซี่ก็เช่นเดียวกัน"
 ambition_level_reached: "ระดับพลังงานสูงถึง"

 defender_of_the_galaxy_ending_chain_title: "คอนตินเจนซีก่อน"
 defender_of_the_galaxy_ending_chain_desc: "เรา จะ เป็น คน โง่ เขลา ที่ เพิก เฉย ต่อ สัญญาณ ต่าง ๆ. มีกองกําลังของความชั่วร้ายในกาแล็กซี่นี้ ที่จะทําให้ทุกสิ่งที่เราพยายามที่จะปกป้อง เรารอให้พายุแตกไม่ได้ เราต้องเตรียมพร้อมที่จะลงมือ\n\nบอกให้ผู้ที่คุกคามกาแล็กซี่นี้รู้ว่า: เราจะพบพวกเขา\n\n§Hโอบี เจดส์§!:\n- กําจัดจักรวรรดิวิกฤตทั้งหมด\n- เอาชนะสองเกมจบ\n- งั้นก็ยุติการดํารงตําแหน่ง"
 crisis_defeated: "ชื่อ=วิกฤติการณ์ชื่อ"

 DEFENDER_CRISIS_SPECIAL_PROJECT_1: "การ ทํา แท้ง"
 DEFENDER_CRISIS_SPECIAL_PROJECT_1_DESC: "ไม่มีใครปกป้องกาแล็กซี่คนเดียว\n\nก่อน ที่ เรา จะ ทํา ได้ เรา ต้อง ได้ รับ ความ ไว้ วางใจ จาก คน ที่ เรา หวัง จะ ปก ป้อง. ความ ไว้ วางใจ ดัง กล่าว เริ่ม ต้น ด้วย ความ ซื่อ สัตย์, การ เหนี่ยว รั้ง, และ การ ทูต.\n\nเรา จะ ฝึก อบรม ผู้ ส่ง ข่าว รุ่น ใหม่ ให้ พิสูจน์ คํา พูด และ การ กระทํา ที่ เรา มา เพื่อ ช่วย เหลือ. แค่ร่วมมือกันเท่านั้น เราจะสร้างพันธมิตรที่แข็งแรงพอ ที่จะพยากรณ์อนาคตได้"
 DEFENDER_CRISIS_SPECIAL_PROJECT_2: "แหล่ง แห่ง การ ดล ใจ"
 DEFENDER_CRISIS_SPECIAL_PROJECT_2_DESC: "ความไว้วางใจจะได้รับ ความเชื่อต้องได้รับการหล่อเลี้ยง\n\nตอนนี้กาแล็กซี่ยืนอยู่กับเรา เราต้องให้สิ่งที่ผู้คนเชื่อ สัญลักษณ์ที่สามารถทนได้ ไม่ ใช่ แค่ ป้าย หรือ คํา ขวัญ แต่ เป็น เครื่องหมาย แห่ง ความ กล้า หาญ, เอกภาพ, และ คํา สัญญา ที่ ไม่ มั่นคง ว่า เรา จะ ยืน อยู่ ระหว่าง พวก เขา กับ พายุ.\n\nให้ ทุก คน ที่ มี ความ สามารถ มอง ดู สัญลักษณ์ เหล่า นี้ และ จํา ไว้ ว่า ไม่ ใช่ พวก เดียว."
 DEFENDER_CRISIS_SPECIAL_PROJECT_4: "เอาอินิชิเอทีฟ"
 DEFENDER_CRISIS_SPECIAL_PROJECT_4_DESC: "กาแล็คซี่มีภัยคุกคามที่ดีเกินกว่าจะมองข้าม เราไม่สามารถรอให้ความมืดเผยตัวเอง ด้วยความระวังและการดูแล เราจะเริ่มปฏิบัติการที่มีความเสี่ยงสูง เพื่อเปิดเผยอันตราย\n\n§Rนี้จะจุดชนวนวิกฤตเกมสิ้นสุด§!"
 DEFENDER_CRISIS_SPECIAL_PROJECT_5: "กดโฆษณา"
 DEFENDER_CRISIS_SPECIAL_PROJECT_5_DESC: "ความ พยายาม ใน ระยะ แรก ๆ ของ เรา ได้ พิสูจน์ แล้ว ว่า จําเป็น และ แม้ ว่า จะ ประสบ ความ สําเร็จ แต่ ก็ ไม่ ใช่ จุด จบ.\n\nกาแล็คซี่มีขนาดใหญ่และเต็มไปด้วยอันตราย เราต้องค้นหาต่อไป เพื่อให้แน่ใจว่าไม่มีภัยคุกคามใด หนีการเฝ้าระวังของเรา\n\nการทดลองนี้อันตราย แต่ถ้าปีศาจยังซ่อนตัวอยู่ในความมืด เราไม่มีทางเลือก นอกจากเผชิญหน้ากับมัน\n\n§Rนี้จะจุดชนวนวิกฤตเกมจบครั้งที่สอง§!"

 PALADIN_SHIP_PROJECT: "เรือพาลาดิน"
 PALADIN_SHIP_PROJECT_DESC: "ศิลปะจะพบกับเทคโนโลยี เพื่อสร้างสัญลักษณ์แห่งเสรีภาพ ที่จะส่องแสงสู่ความมืด"

 MISSION_BE_ON_GALCOM: "สมาชิก ประชาคม"
 MISSION_JOIN_GALACTIC_COMMUNITY: "$BE_ON_GALCOM$"
 BE_ON_GALCOM: "จง เป็น ส่วน หนึ่ง ของ ชุมชน กาแลกติก"
 MISSION_BE_ON_GALCOM_DESC: "ถ้าเราต้องการที่จะคัดท้ายอุปกรณ์ประชาธิปไตยของกาแล็กซี่ อันดับแรกเราต้องรักษาความปลอดภัยที่นั่งของเราที่โต๊ะ"
 MISSION_BE_ON_GALACTIC_COUNCIL: "วุฒิสมาชิกกาแล็กติก"
 BE_ON_GALACTIC_COUNCIL: "นั่งบนสภากาแล็กซี่"
 MISSION_BE_ON_GALACTIC_COUNCIL_DESC: "การสร้างสภากาแล็กซี่ เป็นขั้นตอนที่จําเป็นในการสร้างกระบวนการเพื่อความมั่นคงของกาแล็กซี่\n\nที่จะได้รับเลือก§Hกรรมการ§!เราต้อง...$TABBED_NEW_LINE$- ส่ง$resolution_galacticreforms_form_council$ความละเอียดใน§Hชุมชน กาแลกติก§!$TABBED_NEW_LINE$- เพื่อให้แน่ใจว่าเราเป็นหนึ่งในสามจักรวรรดิชั้นนําในชุมชนที่จัดอันดับโดย§Hความเข้มสี§!"
 MISSION_BE_CUSTODIAN: "ใน ท่ามกลาง คน รุ่น เดียว กัน"
 BE_CUSTODIAN: "ได้รับเลือกตั้งเป็น กาแล็กติก คัสโตเดียน"
 MISSION_BE_CUSTODIAN_DESC: "การยึดอํานาจเป็นภาระ หนึ่งเราจะแบกในการให้บริการของกาแล็กซี\n\nเพื่อเป็น§Hภาษากัสโตเดียนชื่อ§!เราต้อง...$TABBED_NEW_LINE$- ส่ง§H$resolution_galacticreforms_nominate_custodian$: [Root.GetName]§!ความละเอียดใน§Hชุมชน กาแลกติก§!"


#Events

 ambition.100.name: "ป้องกัน กาแลกติก"
 ambition.100.desc: "กาแล็กซีของเรามีความเปราะบางมากกว่าที่เห็น อันตราย มี มา จาก ทุก ทิศ ทาง: นัก ล่า ซุ่ม ซ่อน อยู่ ใน ที่ ว่าง เปล่า, พวก โจร สลัด ใน ระบบ ที่ ถูก ลืม, สงคราม ที่ เกิด จาก ความ หยิ่ง ยโส และ ความ กลัว. และ บ่อย เหลือ เกิน ที่ คน เหล่า นั้น ซึ่ง มี อํานาจ จะ ลง มือ ปฏิบัติ การ จะ นิ่ง เงียบ.\n\nเราจะไม่อยู่เฉยๆ นี่ไม่ใช่การอ้างอํานาจ แต่เป็นการมอบหมายหน้าที่ ผ่านการกระทําวัดและใช้วัตถุประสงค์ร่วมกัน เราจะทําให้แน่ใจว่ากาแล็กซี่มีอนาคตที่คุ้มค่าการปกป้อง"
 ambition.100.a: "เราจะทําสิ่งที่ต้องทํา"

 ambition.105.name: "แก้ไขโครงการหลัก..."
 ambition.105.desc: "การรวมกาแล็กซี่เข้าด้วยกัน จะไม่สําเร็จ ด้วยแรงแขนหรือเอกพจน์เพียงอย่างเดียว ความ ไว้ วางใจ, การ สนทนา, และ ความ เต็ม ใจ ที่ จะ แบก ภาระ หนัก ไม่ มี ใคร กล้า แบก. ทุกพันธมิตรที่ก่อตัวขึ้น ทุกวิกฤตที่ลดลง เป็นขั้นตอนเล็ก ๆ ที่นําไปสู่อนาคตที่ยืดหยุ่นมากขึ้น\n\nเรา ไม่ ได้ แสวง หา ที่ จะ ปกครอง แต่ ปรารถนา จะ นํา: เพื่อ เสนอ มือ ที่ มั่นคง เมื่อ คน อื่น อิดโรย. การ งาน ของ เรา ไม่ มี เงื่อนไข และ บ่อย ครั้ง ไม่ มี การ กล่าว ขอบคุณ แต่ หน้า ที่ นี้ เป็น จุด มุ่ง หมาย ของ เรา. ร่วมกันเราจะรูปร่างกาแลคซีที่ยั่งยืน"
 ambition.105.a: "เรามีชีวิตอยู่เพื่อให้บริการกาแลคซี"

 ambition.110.name: "สัญลักษณ์ แห่ง เสรีภาพ"
 ambition.110.desc: "ในเวลาของความไม่แน่นอน สัญลักษณ์สําคัญ กาแล็คซี่ไม่เพียงต้องการการปกป้อง มันต้องการแรงบันดาลใจ ขณะที่ภัยคุกคามเติบโตมากขึ้น และเส้นทางข้างหน้ามืดมืด แผนของเรากําลังเข้ารูปเป็น ผู้พิทักษ์ของบุคคลพิเศษ\n\nพวก ปา ลา ดิน เหล่า นี้ ไม่ เพียง แต่ บัญชา การ กอง เรือ หรือ ร่วม มือ ใน การ บรรเทา ทุกข์ เท่า นั้น. พวกเขาต้องเป็นพินัยกรรมที่มีชีวิต ของการตัดสินใจร่วมกันของเรา วีรบุรุษ ไม่ใช่คนโสด แต่เป็นทั้งหมด"
 ambition.110.a: "พวกเขาจะเป็นแสงนําทางของกาแล็คซี่"

 ambition.115.name: "ผู้ ปก ป้อง"
 ambition.115.desc: "กาแล็คซี่ได้พูดมาแล้ว ไม่ใช่ด้วยความกลัว แต่ด้วยความเชื่อใจ เราได้รับเลือกเป็นภาษากัสโตเดียนและได้รับอํานาจที่ เข้าถึงเกินขอบเขตของคําสั่งสามัญ สิทธิ พิเศษ พิเศษ พิเศษ เหล่า นี้ แม้ ว่า เกิด จาก ความ จําเป็น แต่ ไม่ ใช่ เกียรติ ที่ เรา แสวง หา. มันเป็นภาระที่เรายอมรับได้ เพื่อเห็นแก่คนทั้งปวง\n\nเรา ไม่ ใช้ อํานาจ นี้ เพื่อ บัญชา แต่ เพื่อ รับ ใช้. จนกว่าสันติภาพจะมีมากกว่าการหยุดชะงักระหว่างสงคราม จนกว่าภัยคุกคามจะไม่ซ่อนเกินดาวทั้งหลายอีกต่อไป เราจะรักษาคําสาบานของเรา ถึงเวลาสละอํานาจแล้ว แต่ก่อนถึงวันนั้น เราจะควบคุมพวกเขาอย่างเข้มงวด จุดมุ่งหมาย และความแน่วแน่"
 ambition.115.a: "เราสาบาน"

 ambition.120.name: "ผู้ ปก ป้อง กาแล็กซี"
 ambition.120.desc: "เรารู้ว่าวันนี้จะมาถึง สําหรับความพยายามทั้งหมดของเรา ที่จะรวมและยกกาแล็กซี่ตอนนี้ เผชิญการคิดบัญชีหลังความตาย ศัตรูนี้ไม่มีความเมตตา ไม่ประนีประนอม มันคุกคามทุกคน และเราต้องยืนหยัดเพื่อทุกคน\n\nทุกพันธมิตรปลอมและความยากลําบาก อดทน นําเรามาถึงช่วงเวลานี้ เรา ไม่ ได้ ยืน อยู่ เหนือ กาแล็กซี ต่าง ๆ; เรา ยืน หยัด อยู่ ฝ่าย มัน. ต่อต้านการทําลายล้าง ต่อต้านความสิ้นหวัง เราเพิ่มขึ้น ไม่ใช่ผู้พิชิต แต่เป็นผู้พิทักษ์\n\nทุก วัน นี้ เรา ต้อง ไม่ เฉื่อย ชา."
 ambition.120.a: "สําหรับแกแล็คซี่!"

 ambition.125.name: "ไม่สามารถแก้ไขได้"
 ambition.125.desc: "ผู้แทนราษฎรรุ่นใหม่ กําลังเดินอยู่ในห้องโถงของวุฒิสภา การ ฝึก อบรม อย่าง ถี่ถ้วน, ความ อด ทน ไม่ รู้ สิ้น สุด, และ การ ทุ่มเท ตัว อย่าง เต็ม ที่ เพื่อ จุด ประสงค์ ของ เรา พวก เขา ไม่ เพียง แต่ พูด ด้วย ความ ไม่ แยแส แต่ ด้วย ความ จริง ใจ ทํา ให้ เรา มี พันธะ ที่ จะ เป็น น้ํา หนึ่ง ใจ เดียว กัน และ มี สันติ สุข. การ ทํา งาน ของ พวก เขา อาจ ไม่ ใช่ การ พาด หัว ข่าว แต่ พวก เขา เป็น ช่าง ฝีมือ ที่ เที่ยง ตรง ใน เรื่อง สันติภาพ และ ความ ร่วม มือ ที่ ยั่งยืน.\n\nทุกคํา ทุกท่าทาง ถูกปรับให้แข็งแรงขึ้น เพื่อเสริมสร้างความจริงหนึ่งคํา เราไม่ได้แสวงหาอํานาจ เราไม่มีอะไรต้องปิดบัง ไม่มีอะไรต้องกลัว"
 ambition.125.a: "ไม่มีชัยชนะทางการทูตใดเล็กเกินไป"

 ambition.130.name: "สงครามสัญลักษณ์"
 ambition.130.desc: "สัญลักษณ์ ไม่ ได้ เกิด มา อย่าง ระมัดระวัง และ จงใจ ทํา ขึ้น. หากวีรบุรุษของเรา จะยืนเป็นสัญญาณของความหวัง เรือของพวกเขาจะต้องสะท้อน บทบาทที่ ไม่ มี เพียง เรือ รบ; มัน ต้อง เป็น เครื่อง ชี้ นํา ที่ ชี้ นํา เรา ผ่าน ความ มืด.\n\nเรือ สี ขาว และ ทองคํา, หัว รูป ร่าง ที่ แวว วาว, และ รูป แบบ ทั้ง งดงาม และ น่า เกรง ขาม. ภายใต้ฮู้ดนั้น เทคโนโลยีที่ดีที่สุดของเราสามารถนําเสนอได้ เรือ เหล่า นี้ ไม่ เพียง มี ปืน แต่ ยัง มี ความ มั่น ใจ ด้วย. พวก เขา เป็น ผู้ ปก ป้อง สายตา: เอกภาพ, ความ เข้ม แข็ง, และ ความ ตั้งใจ แน่ว แน่ เมื่อ เผชิญ กับ การ สูญ เสีย."
 ambition.130.a: "พวกเขาจะเป่าเปลวไฟแห่งความหวัง"

 ambition.135.name: "นั่นที่ลาร์ค"
 ambition.135.desc: "การสืบสวนของเรามีผลอันน่าสลด เหนือหอดูดาวใต้ดิน โพสต์ข้อมูลลับ และข้อมูลโบราณ สัญญาณจัดลําดับ: บางสิ่งบางอย่างกําลังมา\n\nนี่ไม่ใช่สัญญาณเตือนผิดพลาด ไม่มีการเข้าใจผิด การ คุกคาม มี อยู่ จริง, กําลัง จะ มา ถึง, และ มี ขอบ เขต ที่ ขัด ขวาง การ ป้องกัน กิจวัตร ประจํา วัน. เราไม่มีเวลามาลังเล ทุกการเตรียมการของเรา จะต้องเสร็จสิ้น เวลามันดึกแล้ว แต่เรายังไม่อ่านเลย ปล่อยให้พวกเขามา"
 ambition.135.a: "ความกลัวจะเรียนรู้ที่จะกลัวเรา"

 ambition.140.name: "เสมอสองมี"
 ambition.140.desc: "การระวังตัวของเราได้รับการพิสูจน์แล้ว แม้ แต่ ขณะ ที่ กาแล็กซี ต่าง ๆ ยึด มั่น กับ ภัย คุกคาม อย่าง หนึ่ง ที่ อยู่ ใน ความ เป็น จริง เรา ก็ ได้ พบ ว่า มี อีก สิ่ง หนึ่ง ที่ ปลุก เร้า เรา. มัน ซุ่ม ซ่อน อยู่ ไม่ พ้น สายตา แต่ หลัก ฐาน นั้น ชัดเจน: อันตราย มี อยู่ จริง และ กําลัง คืบ ใกล้ เข้า มา.\n\nแต่ครั้งนี้เราไม่ได้ถูกจับโดยไม่ทราบ เรา จะ ยึด จุด เริ่ม ต้น อีก ครั้ง หนึ่ง ตี ก่อน ที่ มัน จะ รวบ รวม พลัง เต็ม ที่ ได้. การต่อสู้ข้างหน้าจะโหดร้าย แต่ด้วยองค์ประกอบของความประหลาดใจในด้านของเราเราไม่ได้เผชิญหน้ากับมัน ดังนั้น จงให้ดวงดาวเหล่านั้นเป็นพยานเถิด เราจะไม่หวั่นไหว ไม่ใช่ตอนนี้ ไม่เด็ดขาด"
 ambition.140.a: "ภารกิจไม่มีวันจบสิ้น"

 ambition.200.name: "อินิชิเอทีฟของพาลาดิน"
 ambition.200.desc: "การ ลง ความ เห็น เช่น นั้น ไม่ ใช่ เรื่อง ง่าย. นี่ เป็น จุด เริ่ม ต้น ของ ความ พยายาม ประสาน กัน ทั่ว รัฐ สมาชิก เพื่อ พัฒนา หลัก คํา สอน, บุคลากร, และ มาตรฐาน ด้าน วัตถุ ที่ จําเป็น เพื่อ จะ บรรลุ ผล สําเร็จ.\n\nในขณะที่สมาชิก[global_event_country.GetCommunityOrImperium]จะจัดการรับย้ายพาลาดินของพวกเขา เรายังต้องดูแลการพัฒนาของชุดใหม่ ของเรือชั้นนําของพวกเขาที่จะใช้"
 ambition.200.a: "ไปทํางานกันเถอะ"
 ambition.205.name: "เรือพาลาดินพร้อม"
 ambition.205.desc: "การพัฒนาของเรือพาลาดินสมบูรณ์ การหลอมรวมความงดงามและความแข็งแกร่ง พวกมันเป็นสัญลักษณ์ในการตัดสินใจของเรา แม้ ว่า อาวุธ พร้อม สําหรับ สงคราม จุดประสงค์ ของ เขา คือ สันติ สุข และ เขา ทํา งาน เป็น คํา สัญญา ว่า เรา จะ อยู่ ที่ นั่น ไม่ ว่า ที่ ใด ที่ มี ความ ต้องการ มาก ที่ สุด"
 ambition.205.a: "ตอนนี้จะสร้างมัน!"
 ambition.210.name: "จง หา เลี้ยง ครอบครัว"
 ambition.210.desc: "เราได้ทําเรือพาลาดินเสร็จ ตัว เรือ ที่ มี ลูก ดก จะ ส่อง แสง ระยิบ ระยับ ด้วย แสง ดาว และ เครื่อง ยนต์ ของ มัน จะ ฮัม หรี่ ด้วย พลัง. ดูเหมือนจะเป็นอาชญากรนะ ที่ส่งงานศิลปะไปรบ\n\nตอนนี้เราต้องมอบมันให้กับผู้ชนะที่คุ้มค่าของค่าใช้จ่ายของมัน ผู้ที่แก้ไขกระจกของความแข็งแกร่งของเรือ และความกล้าหาญของพวกเขาจะนํามันเข้าไปในหัวใจของความมืดที่รอคอย"
 ambition.210.a: "มีเพียงขุนนางเท่านั้นที่สามารถรับใช้ได้"
 ambition.216.name: "คลาสย่อยพาลาดิน"
 ambition.216.desc: "[Root.GetName]พาลาดินผู้เสนอชื่อของเรา ได้แสดงให้เห็นว่า aptitive เป็น§Y[Root.GetPaladinSubclass]§!เราสามารถคัดท้าย[Root.GetHimHer]ไปสู่ความพิเศษอีกแบบหนึ่ง แต่ต้องใช้ความพยายามอย่างมีนัยสําคัญในการฝึกพวกเขา"
 ambition.216.a: "ไม่จําเป็นต้องยุ่ง"
 ambition.216.b: "รถไฟ[Root.GetHimHer]ในฐานะ§Y$leader_trait_paladin_ace$§!"
 ambition.216.c: "รถไฟ[Root.GetHimHer]ในฐานะ§Y$leader_trait_paladin_strategist$§!"
 ambition.216.d: "รถไฟ[Root.GetHimHer]ในฐานะ§Y$leader_trait_paladin_ambusher$§!"
 ambition.216.e: "รถไฟ[Root.GetHimHer]ในฐานะ§Y$leader_trait_paladin_logistician$§!"
 ambition.216.f: "รถไฟ[Root.GetHimHer]ในฐานะ§Y$leader_trait_paladin_defender$§!"
 ambition.216.g: "รถไฟ[Root.GetHimHer]ในฐานะ§Y$leader_trait_paladin_spearhead$§!"
 ambition.216.h: "รถไฟ[Root.GetHimHer]ในฐานะ§Y$leader_trait_paladin_knight$§!"
 ambition.225.name: "พาลาดินถูกยุบ"
 ambition.225.desc: "เนื่อง จาก มี การ คุกคาม อย่าง ฉับ พลัน ต่อ ความ มั่นคง ของ กาแล็กซี่ ซึ่ง มี อยู่ และ พระ บัญชา ของ มัน สําเร็จ เป็น จริง การ ริเริ่ม ของ ปา ลา เดีย น จึง บรรลุ ผล สําเร็จ ตาม ธรรมชาติ. สอดคล้องกับเงื่อนไขของคณะกรรมการของพวกเขา หน่วยจะยืนลง เรือของพวกเขาจะถูกรื้อถอน และโครงสร้างของคําสั่งก็ละลายไป\n\nพวกพาลาดินทิ้งความทรงจําไว้ ให้อยู่ในห้วงเวลาที่ต้องการ การ กระทํา ของ พวก เขา ได้ รับ ความ นับถือ ข้าม พรม แดน และ ความ แตก แยก ของ พวก เขา เป็น ภาพ สะท้อน ไม่ ใช่ ความ ล้ม เหลว แต่ เป็น ความ สําเร็จ. สันติภาพ ในที่สุด ก็ไม่ต้องการผู้ชนะ"
 ambition.225.a: "สรรเสริญผู้กล้าหาญ"
 ambition.230.name: "ควบคุมโดยตรง"
 ambition.230.desc: "เนื่อง จาก มี การ สู้ รบ กัน มาก ขึ้น เรื่อย ๆ และ มี ความ จําเป็น มาก ขึ้น ที่ จะ ร่วม มือ กัน ทาง ทหาร พวก ปา ลา ดิน ฟาน การ์ด จึง ถูก จัด ให้ อยู่ ภาย ใต้ การ บังคับ บัญชา ของ คู ส โต เดีย อย่าง เป็น ทาง การ. แม้ ว่า คํา สั่ง แรก เดิม ของ พวก เขา เน้น เรื่อง การ เป็น เอกราช และ การ ร่วม มือ กัน อย่าง กว้าง ขวาง แต่ สภาพ การณ์ ใน ปัจจุบัน เรียก ร้อง อํานาจ โดย ตรง กว่า.\n\nการ ตัดสิน ใจ นี้ ไม่ ใช่ เรื่อง ง่าย. พวกพาลาดินยังคงเป็นผู้มีความเคารพ แต่ปัจจุบันพวกเขาให้บริการอยู่ภายใน คณะชั้นที่จัดตั้งขึ้นของกองกําลังยุทธศาสตร์ของเรา ตามที่เราต้องการมากกว่าครั้งไหนๆ การดําเนินงานของพวกเขาจะดําเนินต่อไป แต่จะเป็นกองกําลังที่ประสานงานกัน แทนที่จะเป็นตัวแทนอัตโนมัติ ภารกิจไม่ได้เปลี่ยนแปลง"
 ambition.230.a: "ความจําเป็นที่น่าเศร้า"
 ambition.235.name: "เชื่อมต่อการควบคุม"
 ambition.235.desc: "ด้วยวิกฤตการณ์หยุดชะงักและศูนย์กลาง คําสั่งไม่ถือว่าเป็นความจําเป็น การควบคุมการดําเนินงานของพาลาดินแวนการ์ดได้ถูกส่งกลับมา การควบคุมโดยตรงของภาษากัสโตเดียนได้สิ้นสุด และพาลาดินส์จะทําหน้าที่อีกครั้ง ภายใต้สมาชิกของสภากาแล็กติก\n\nการฟื้นฟูอัตโนมัตินี้ ทําให้ความทุ่มเทของเราต่อความโปร่งใส และความไว้วางใจในหลายๆด้าน พวกพาลาดินยังคงเป็นสัญลักษณ์ของความเป็นเอกภาพ ไม่ใช่การแบ่งแยก พวกมันต้องไม่ใช้พลังเดียว แต่ของกลุ่มจะ"
 ambition.235.a: "ลูกเห็บ ปา ลา ดิน!"
 ambition.325.name: "สันติ สุข ใน ที่ สุด"
 ambition.325.desc: "ภัยคุกคามได้ผ่านพ้นไปแล้ว กาแล็กซี ที่ เมื่อ ใกล้ จะ ถึง จุด สุด ยอด บัด นี้ พบ ว่า ตัว เอง อยู่ ใน ช่วง เวลา แห่ง การ ฟื้นฟู อย่าง ระมัดระวัง. ไม่มีคําสั่งเหลือให้ปฏิบัติตาม เราได้นําขั้นตอนสุดท้าย : อํานาจของคัสโตเดียนได้รับการยอมจํานน สิ่งที่เริ่มต้นเป็นการตอบสนองต่อวิกฤต ได้ยุติลงด้วยการเชื่อใจ\n\nพันธมิตรที่เราสร้าง ตัวอย่างที่เราตั้งไว้ นี่คือมรดกของเรา ใน การ เลือก ที่ จะ นํา หน้า โดย ปราศจาก การ ปกครอง เพื่อ ปก ป้อง โดย ไม่ มี การ ครอบ งํา เรา ได้ สนับสนุน หลัก การ ของ เรา. ดาวมีความปลอดภัยสําหรับตอนนี้และที่เพียงพอ"
 ambition.325.a: "เราพักได้แล้ว"

