 integrity_gaining: "เสร็จสมบูรณ์§Hวัตถุ§!เพื่อที่จะได้รับมากขึ้น£integrity£ §Yวาเลอร์§!."
 integrity_desc: "วาเลอร์วัดการอุทิศของเราเพื่อปกป้องกาแล็กซี่ กับการทําลายและเผด็จการ"
 integrity_crisis_objective: "วัตถุ"
 integrity_crisis_objective_gained: "ได้ รับวาเลอร์"
 integrity_crisis_objective_reward: "$REWARD$"
 integrity_crisis_objective_progress: "เราได้กําไรแล้ว£integrity£ $AMOUNT$จากองค์กรนี้"
 integrity_crisis_level_locked: "ต้องการปลดล็อคระดับนี้:\n"
 integrity_crisis_level_unlocked: "ที่$LEVEL$คุณจะได้รับรางวัล :\n"
 integrity_crisis_level_desc: "เพื่อก้าวผ่านระดับแอมโมรี สะสมวอลเลอร์"
 integrity_crisis_level_unlock: "เคย£integrity£ §Y$CURRENCY$§!วาเลอร์"
 integrity_current_value: "ค่าปัจจุบัน:§Y$VALUE|0$§!"
 integrity_crisis_description_title: "ผู้ ปก ป้อง กาแล็กซี"
 integrity_crisis_description: "ผู้ที่อยู่ในชุมชนกาแล็กซี่ที่ชาร์ตโค้งของประวัติศาสตร์ ได้ทํานายนานมา§Rวิกฤติ§!ภัยคุกคามต่อชีวิตแห่งการมองเห็น ซึ่งต้องการความสามัคคีที่ไม่เคยมีมาก่อน ของวัตถุประสงค์ และการบูชายัญเพื่อเอาชนะ ถ้ามันสามารถเอาชนะได้\n\nการคาดการณ์ที่เป็นที่นิยมเกี่ยวกับธรรมชาติของวิกฤตนี้ได้รับเป็นจินตนาการเป็น การบุกรุกของความตะกละนอกกาแล็กซี หรือปัญญาของกาแลคซีเพิ่มขึ้นในกบฏเล็ก ๆ น้อย ๆ\n\nตอนนี้ชัดเจนแล้วว่า การป้องกันของกาแล็กซี่จะลดลง§Gเรา§!.\n\nไม่ว่าผู้ที่น่ากลัวและทรราชจะลุกขึ้น พวกเขาจะพบว่าบ้านของเรา ได้รับการคุ้มครองอย่างดี ใน ไม่ ช้า ทุก คน จะ เรียน รู้ ว่า ด้าน นี้ ของ เอกภพ จะ ไม่ ถูก ทําลาย เลย!"
 integrity_crisis_howto_title: "การ รับ ใช้ และ การ เสีย สละ"
 integrity_crisis_howto: "กําลังไล่ตาม§Hวัตถุ§!สร้าง£integrity£ §Hวาเลอร์§!เป็นหลักฐานของการอุทิศตัวของเรา ที่จะชุมนุมชาติเสรี ของกาแล็กซี่ข้างหลังเรา เพื่อปกป้องชีวิตและเสรีภาพ"

#Objectives

 crisobj_defensive_pacts_name: "พันธมิตรรูปแบบ"
 crisobj_defensive_pacts_desc: "พลัง อยู่ ใน เอกภาพ. เพราะ เหตุ ใด? เรา ไม่ สามารถ ปก ป้อง กาแล็กซี ที่ ไม่ ต้องการ ได้ รับ การ ปก ป้อง ดัง นั้น เรา ต้อง แสวง หา คน เหล่า นั้น ที่ มี ค่า นิยม เหมือน เรา และ จะ ต่อ สู้ อยู่ ข้าง ๆ หัวใจ และ จิตใจ.\n\nรูปแบบ§Yอาวุธ ป้องกัน§!หรือการให้§Yสถานะสมาคมสหพันธรัฐ§!เพื่อจะได้รับสิ่งนี้§Yปี§!รางวัลวอลเลอร์"
 crisobj_federated_name: "เป็นส่วนหนึ่งของสหพันธรัฐ"
 crisobj_federated_desc: "พันธะ แห่ง การ บํารุง เลี้ยง ไม่ ได้ ถูก ลบ ล้าง ได้ ง่าย ๆ. ความร่วมมือและสามัคคีกับจักรวรรดิที่เหมือนกัน จะยกเราทั้งหมดเข้าสู่ยุคใหม่ของความเจริญรุ่งเรือง\n\nเข้าร่วมหรือสร้าง§Yสหพันธรัฐ§!เพื่อจะได้รับสิ่งนี้§Yปี§!รางวัลวอลเลอร์"
 crisobj_not_in_aggressive_war_name: "อย่า มี ส่วน ใน สงคราม แห่ง ความ ก้าวร้าว"
 crisobj_not_in_aggressive_war_desc: "เราเป็นผู้พิทักษ์ ไม่ใช่ผู้บุกรุก แต่ในการยืนมั่นคงเท่านั้น ที่เราจะได้ความไว้วางใจของกาแล็กซี่\n\nไม่ต้อง§Yโจมตี§!หรือร่วมกับ§Yโจมตี§!อยู่ข้างใด ๆ ในสงครามที่จะได้รับนี้§Yเดือน§!รางวัลวอลเลอร์"
 crisobj_galcom_activity_name: "มี ส่วน ร่วม ใน ชุมชน กาแลกติก"
 crisobj_galcom_activity_desc: "โครงสร้างประชาธิปไตยของชุมชนกาแล็กติก เป็นวิธีที่ดีที่สุดในการทําให้สามัคคีกัน โดย ทาง องค์การ นี้ เรา อาจ กลาย เป็น โล่ เดี่ยว อัน แข็ง แรง พอ ที่ จะ ต้านทาน การ คุกคาม ใด ๆ ได้ กระนั้น จิตใจ ด้วย ความ นับถือ ต่อ ความ เป็น อิสระ ของ สมาชิก.\n\nการรองรับสําเร็จ§Yความละเอียด§!ในชุมชนกาแล็กติก เพื่อได้รับรางวัลวาลเลอร์"
 crisobj_destroy_crisis_ships_name: "ทําลายเรือวิกฤต"
 crisobj_destroy_crisis_ships_desc: "ความแข็งแกร่งควรจะเป็นรีสอร์ทสุดท้ายของเรา แต่ไม่สามารถมอบไตรมาสให้กับศัตรูของกาแลคซี\n\nการทําลายเรือของ§Yวิกฤติ§!เพื่อได้รับรางวัลวาลเลอร์"
 crisobj_destroy_crisis_countries_name: "นก แก้ว"
 crisobj_destroy_crisis_countries_desc: "เราไม่แสวงหาสงคราม แต่เราจะไม่ทนทุกข์ทรมาน คนที่ฝังอยู่ในกาแล็กซี่ หากถูกบังคับ เราจะทําให้แน่ใจว่า ผู้ปล้นเหล่านี้จะถูกจดจําไว้เป็นเพียงบทเรียน\n\nทําลาย§Yจักรวรรดิวิกฤติ§!เพื่อได้รับรางวัลวาลเลอร์"

#Perks

 triggered_opinion_ap_defender_of_the_galaxy_1: "$menp_defender_opinion_1$"
 triggered_opinion_ap_defender_of_the_galaxy_2: "$menp_defender_opinion_2$"
 triggered_opinion_ap_defender_of_the_galaxy_3: "$menp_defender_opinion_3$"

 menp_defender_objectives: "วาเลอร์"
 menp_defender_objectives_desc: "วาเลอร์ได้รับรายได้จากการปฏิบัติที่แน่นอนในการป้องกันของกาแลคซี มันไม่ได้ให้ แต่ได้รับ หลักฐานว่า เราไม่ได้ทําเพื่อผลประโยชน์ของตัวเอง แต่เพื่อการป้องกันของทุกคน"
 unlocks_defender_objectives: "อนุญาตให้การรวมของ£integrity£ §Y$menp_defender_objectives$§!โดยสมบูรณ์§Hวัตถุ§!"
 menp_defender_opinion_1: "หัวใจ ที่ สูง ส่ง"
 menp_defender_opinion_1_desc: "เพื่อเป็นผู้นํา เราต้องเป็นที่รู้จัก ไม่ใช่ด้วยความกลัว แต่ด้วยความหวัง เราจะลงทุนในภายนอกที่ข้างบนแจ้ง และสร้างความไว้วางใจ ข้ามดาว"
 unlocks_defender_opinion_1: "เพิ่ม£opinion£ §Yความเห็น§!ของจักรวรรดิที่มีความสามารถในการทูตปกติโดย§G+40§!"
 menp_defender_galcom_1: "ผู้ บรรยาย ที่ ได้ รับ การ ดล บันดาล"
 menp_defender_galcom_1_desc: "สุนทรพจน์นั้นดีเท่ากับนักพูด เรา ต้อง ปรับ คํา พูด ของ เรา ให้ เข้า กับ หัวใจ และ จิตใจ ของ คน รุ่น เดียว กัน ไม่ ว่า คน แปลก หน้า จะ ดู เหมือน เรา."
 menp_defender_federation_1: "พันธมิตรผู้แข็งขัน"
 menp_defender_federation_1_desc: "ฝ่ายบริหารของรัฐบาลกลางเป็นเครื่องมือที่ทรงพลัง ที่สามารถยกระดับประโยชน์ของพันธมิตรทั้งหมดของเรา"
 menp_defender_crisis_damage_1: "ลดความเร็ว"
 menp_defender_crisis_damage_1_desc: "จิตวิญญาณของเราแข็งแกร่ง และเราจะไม่ถอยจากการต่อสู้ เพราะกลัวจะได้รับบาดเจ็บ"
 unlocks_defender_crisis_damage_1: "ความเสียหายต่อกลุ่มวิกฤติ:§G+15%§!"
 menp_defender_galcom_2: "ผู้ นํา ทาง การ เมือง"
 menp_defender_galcom_2_desc: "อิทธิพลของเราเติบโต และด้วยมัน ความสามารถในการเปลี่ยนแปลงชุมชนกาแล็กซี่ ศัตรู ของ เรา ไว้ ใจ เรา และ เรา ต้อง พยายาม ถวาย เกียรติ แด่ ความ เชื่อ ของ เขา."
 menp_defender_galcom_2_structures: "ไข กุญแจ ความ สามารถ ใน การ สร้าง บาง สิ่ง§Yโครงสร้าง§!ใน§Yพันธมิตร§!ระบบ\n"
 menp_defender_federation_2: "สหาย ใน แขน"
 menp_defender_federation_2_desc: "เราปกป้องกาแล็คซี่ แต่ก็ดีที่รู้ว่าคนอื่นปกป้องเราเหมือนกัน โดยพึ่งพาซึ่งกันและกัน เราทุกคนแข็งแกร่งขึ้น"
 unlocks_defender_federation_2: "ประสบการณ์ของสหพันธ์รายเดือน:§G+2§!"
 menp_defender_crisis_damage_2: "เครื่อง บิน ที่ น่า เกรง ขาม"
 menp_defender_crisis_damage_2_desc: "กาแล็คซี่เชื่อในตัวเรา และเราจะไม่ทําให้พวกเขาผิดหวัง"
 unlocks_defender_crisis_damage_2: "ความเสียหายต่อกลุ่มวิกฤติ:§G+15%§!"
 menp_defender_opinion_2: "แชมป์ กาแล็กซี"
 menp_defender_opinion_2_desc: "ลัทธิ สัญลักษณ์ ได้ ทํา ให้ แนว ทาง ของ จักรวรรดิ ต่าง ๆ เป็น ไป อย่าง ยาว นาน. เพื่อกําจัดข้อสงสัยที่ยังคงอยู่ใด ๆ เกี่ยวกับวัตถุประสงค์ของเรา เราต้องปลอมสัญลักษณ์อย่างชัดเจนอยู่เบื้องหลัง ที่กาแล็กซี่สามารถชุมนุม"
 unlocks_defender_opinion_2: "เพิ่ม£opinion£ §Yความเห็น§!ของจักรวรรดิที่มีความสามารถในการทูตเป็นประจํา§G+100§!\nปลดล็อค§Yอินิชิเอทีฟของพาลาดิน§!มติในชุมชนกาแล็กติก"
 menp_defender_research_1: "อินิชิเอทีฟเซเรเบลลัม"
 menp_defender_research_1_desc: "ความรู้อาจเป็นพลัง แต่พลังที่แท้จริงคือการแลกเปลี่ยน โดย การ แบ่ง ปัน ความ รู้ ให้ กับ พันธมิตร ของ เรา เรา แสดง ให้ เห็น ว่า อํานาจ ไม่ จําเป็น ต้อง แบ่ง แยก. เมื่อ ใช้ อย่าง ฉลาด มัน จะ ทํา ให้ เรา เป็น อัน หนึ่ง อัน เดียว กัน."
 menp_defender_defense_1: "ป้อมปราการ"
 menp_defender_defense_1_desc: "กองเรือของเราคืออาวุธหลักของเรา แต่ไม่ใช่คนเดียว ศัตรูสามารถหยุดการหายใจของสถานีของเรา เพื่อให้ค้อนของอาร์มาด้าของเราสามารถตีพวกเขา"
 menp_defender_defense_1_tt: "$defensive_stations_hull_mult$: §G+15%§!\n$defensive_stations_armor_mult$: §G+10%§!\n$defensive_stations_shield_hardening_add$: §G+15%§!"
 menp_defender_crisis_damage_3: "ผู้ สละ ชีพ เพื่อ ความ เชื่อ"
 menp_defender_crisis_damage_3_desc: "ไม่ มี คุณ ความ ดี ใน การ แสวง หา ความ ตาย แต่ ใน การ ยอม รับ ว่า เป็น ไป ได้ ที่ จะ มี เหตุ ผล ที่ ยุติธรรม จึง มี เกียรติ. ชัยชนะในการป้องกันของกาแล็คซี่ ต้องการการบูชายัญ และคนที่เสียสละชีวิตเพื่อผู้อื่น จะต้องไม่ลืม"
 unlocks_defender_crisis_damage_3: "ความเสียหายต่อกลุ่มวิกฤติ:§G+25%§!"
 menp_defender_opinion_3: "บีคอนของเอกภาพ"
 menp_defender_opinion_3_desc: "เราได้พิสูจน์ตัวเองในสายตาของกาแล็กซี่ ประชาชนทั่วโลกนับไม่ถ้วนรู้ ในใจของพวกเขาว่าเราจะต่อสู้ จนกระทั่งสิ้นสุดความขมขื่น เพื่อปกป้องพวกเขา"
 unlocks_defender_opinion_3: "เพิ่ม£opinion£ §Yความเห็น§!ของจักรวรรดิที่มีความสามารถในการทูตเป็นประจํา§G+200§!\nปลดล็อคใหม่§Yพาลาดินชื่อ§!มติในชุมชนกาแล็กติก"
 menp_defender_custodian: "สํานักงานสูงสุด"
 menp_defender_custodian_desc: "ด้วยพลังที่พิเศษ มาพร้อมกับความรับผิดชอบที่พิเศษ เสื้อ คลุม แห่ง การ เป็น ผู้ ดู แล พลังเหล่านี้ต้องไม่ถูกใช้เพื่อความทะเยอทะยาน แต่เพื่อดึงอุดมการณ์สูงสุดของกาแล็กซี่ออกมา"
