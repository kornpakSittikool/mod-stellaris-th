 concept_arkship_desc: "£arkship£ §H$concept_arkships$§!เป็นเรือขนาดใหญ่ที่บรรทุก£nomad£ ['concept_nomadic_empires']ผ่านช่องว่างของอวกาศ ทํางานในครั้งเดียวเป็น£colony£ ['concept_colony'], ['concept_starbase']และ['concept_military_ship']. $DOUBLE_NEW_LINE$- ใช่§Hคอมโพเนนท์§!มันบรรจุ£district£ ['concept_districts'], £zone£ ['concept_district_specializations'], £building£ ['concept_buildings']ถึง£pop£ ['concept_pops']. $NEW_LINE$- ใช่§Hฐานของดวงดาว§!พวกเขาทําตัวเหมือน['concept_shipyards']และสามารถดัดแปลงได้ด้วย§Hมอดูลของเรือ§!ถึง§Hระบบ§!. $NEW_LINE$- §H$concept_arkships$§!มีคิวอาคารร่วมกันสําหรับทุกคน§Hโคนี§!ถึง§Hความแหลม:§!การก่อสร้าง$NEW_LINE$- ใช่§Hเรือ รบ§!, §H$concept_arkships$§!ชมอ่าวโรงเก็บยานและการป้องกันจุดและเกราะที่สําคัญ$NEW_LINE$- §H$concept_arkships$§!สามารถเก็บรวบรวมทรัพยากรจาก£construction_ship£ ['concept_logistic_ships']ถึง£waystation£ ['concept_waystations']. $NEW_LINE$- §H$concept_arkships$§!สามารถ ทํา การ ยุทธศาสตร์ เพิ่ม เติม ได้ รวม ทั้ง:$TABBED_NEW_LINE$- ['concept_survey'] $TABBED_NEW_LINE$- ['concept_build_megastructure'] $TABBED_NEW_LINE$- ['scripted_action:arkship_harvest_resources'] $TABBED_NEW_LINE$- §Hมอดูลของเรือ§!ปลดล็อกการกระทําขั้นสูง$NEW_LINE$-ใหม่§H$concept_arkships$§!สามารถสร้างเป็น['concept_megastructures']โดยคนอื่น ๆ§H$concept_arkships$§!หลังจากทําวิจัย£engineering_research£ §Y$tech_arkship_construction$§!. $NEW_LINE$- §H$concept_arkships$§!สามารถปรับรุ่นได้หลังจากทําการวิจัย£engineering_research£ §Y$tech_arkship_tier_2$§!ถึง£engineering_research£ §Y$tech_arkship_tier_3$§!."

