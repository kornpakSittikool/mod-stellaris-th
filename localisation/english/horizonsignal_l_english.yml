 ### Ambient Object
 NAME_Syzygy_Remains:0 "Syzygy Remains"

 ### EVENT CHAINS
 WORM_CHAIN_1_title:0 "เดอะเวิร์มผู้รอคอย: สัญญาณ"
 WORM_CHAIN_1_desc:0 "บางสิ่งบางอย่างได้เอื้อมมือมาหาเรา จากสถานที่ซึ่งกาลเวลาและอวกาศถูกบีบอัดจนกลายเป็นปม\n\nมันต้องการเรา"

 WORM_CHAIN_2_title:0 "เดอะเวิร์มผู้รอคอย: สัญญาณเตือน"
 WORM_CHAIN_2_desc:0 "เป็นไปได้ยากที่เวลาจะไหลย้อนกลับได้ทั้งสองทิศทาง เป็นไปได้ยากที่จะมีอสรพิษแห่งห้วงจักรวาลโอบรัดเอกภพไว้ พร้อมกับจ้องมองเข้ามาด้วยดวงตาที่ใหญ่โตกว่าเผ่าพันธุ์ของเราทั้งหมด แต่อีกมุมหนึ่ง เรื่องที่เป็นไปได้ยากหลายเรื่องก็ได้เกิดขึ้นเมื่อไม่นานมานี้"

 ### STATIC MODIFIERS
 happy_with_open_loop_temple:0 "ศูนย์บริการผู้เยี่ยมชมวิหารแห่งลูป"
 happy_with_open_loop_temple_desc:0 "เจ้าหน้าที่ที่ร่าเริงและมีประสิทธิภาพคอยนำเที่ยวชมผ่านสัญลักษณ์โบราณที่สว่างไสวภายใต้ไฟสปอตไลต์และมีป้ายอธิบายที่เป็นประโยชน์"

 spiritual_happy_with_open_loop_temple:0 "วิถีจาริกแสวงบุญวิหารแห่งลูป"
 spiritual_happy_with_open_loop_temple_desc:0 "อีกครั้งหนึ่งที่ซุ้มประตูหินบะซอลต์กระซิบกระซาบด้วยเสียงฝีเท้าและเสียงสวดมนต์ที่สะท้อนก้อง"

 waiting_world_ruins:0 "ซากปรักหักพังที่ถูกทอดทิ้ง"
 waiting_world_ruins_desc:1 "สายลมถอนหายใจในซากปรักหักพัง ไม่มีใครไปที่นั่น"
 d_mothballed_facilities:1 "£blocker£ สิ่งอำนวยความสะดวกที่ถูกทิ้งร้าง"
 d_mothballed_facilities_desc:0 "เขตและอาคารที่สร้างเสร็จตามมาตรฐานอาณานิคมล่าสุด แต่เห็นได้ชัดว่าถูกทิ้งไว้โดยไม่ได้ใช้งานและทรุดโทรมไปบางส่วนเป็นเวลาหลายปี"

 loop_debris_01_object:0 "เศษซากสัญญาณขอบฟ้า"
 loop_debris_02_object:0 "ฝักโคจรเป็นเกลียว"

 worm_quarantined:0 "กักกัน"
 worm_quarantined_desc:0 "ดาวเคราะห์ทั้งหมดนี้เป็นของคุณ - ยกเว้นดวงนี้"

 worm_manifestation:0 "จ้องมองเข้ามา"
 worm_manifestation_desc:0 "อะไรที่วนลูปไป เดี๋ยวก็วนกลับมา"

 ### TECHNOLOGY
 tech_akx_worm_1:0 "การเกิดซ้ำเอนโทรปิก"
 tech_akx_worm_1_desc:0 "จักรวาลมีแนวโน้มที่จะดำเนินไปข้างหน้าและเสื่อมถอยลงอย่างไม่อาจต้านทานได้ แนวโน้มนั้นไม่อาจย้อนกลับ... แต่สามารถหักล้างได้ โดยมีราคาที่ต้องจ่าย"

 tech_akx_worm_2:0 "ทฤษฎี: ลูปแปลกๆ"
 tech_akx_worm_2_desc:0 "ชุดข้อตกลงทางสังคมที่อ้างอิงจากสัญชาตญาณที่ขัดแย้งและความรัก เมื่อเราเข้าใจระบบของลูป เราจะได้เรียนรู้ว่าเราสามารถส่งอิทธิพลผ่านการรับคำสั่งได้ เช่นเดียวกับการมอบคำสั่ง"

 tech_akx_worm_3:0 "ทฤษฎีโอเมก้า"
 tech_akx_worm_3_desc:0 "เมื่อความย้อนแย้งทางเวลาเกิดการพัวพันกัน จิตสำนึกชนิดหนึ่งจะถือกำเนิดขึ้นพร้อมกับความต้องการและความปรารถนาของมันเอง นี่คือสิ่งที่เกิดขึ้นกับจิตสำนึกที่บางคนเรียกว่า เดอะเวิร์มผู้รอคอย หากเราสามารถประสานตัวเองเข้ากับจิตสำนึกนั้นได้ เราอาจจะบรรลุความเป็นอมตะบางประการ"
 TECH_UNLOCK_AKX_WORM_3_TITLE:0 "$tech_akx_worm_3$"
 TECH_UNLOCK_AKX_WORM_3_DESC:0 "$tech_akx_worm_3_desc$"

 tech_akx_worm_partial_custom:0 "§Hเหลือบมองอนาคต:§! $tech_akx_worm_3$"
 tech_akx_worm_partial_custom_desc:1 "§Hเหลือบมองอนาคต§!\nความเข้าใจเลือนลางเกี่ยวกับมุมมองที่จะมาถึงและความรักในอดีต\n\nครึ่งหนึ่งของทั้งหมด ไร้ประโยชน์หากอยู่เดี่ยวๆ เมื่อครบถ้วนอาจช่วยให้นักวิทยาศาสตร์ของเราสะดุดพบเทคโนโลยี §H$tech_akx_worm_3$§!"

 ### BUILDINGS
 building_akx_worm_1:0 "ศูนย์พลังงานป้อนเกลียว"
 building_akx_worm_1_desc:1 "เพิ่มพลังงานที่ผลิตได้ของดาวเคราะห์อย่างมีนัยสำคัญโดยใช้เทคนิคที่ไม่มีในฟิสิกส์ทั่วไป พัวพันกับนิมิตคล้ายความฝันเกี่ยวกับการร่วงหล่น"

 building_akx_worm_2:0 "สถาบันแห่งลูป"
 building_akx_worm_2_desc:0 "คำสอนเรื่องลูปช่วยส่งเสริมสัญชาตญาณ การปฏิบัติตาม และทัศนคติที่มีคุณค่า"

 building_akx_worm_3:0 "การปรับประสานโอเมก้า"
 building_akx_worm_3_desc:0 "พื้นผิวของวัตถุนี้ทำมุมอวกาศ ภายในจะมองไม่สามารถเห็นเซ็นเซอร์หรือเทคโนโลยีการถ่ายภาพที่มีอยู่ แต่เราทุกคนรู้ดีว่ามีอะไรอยู่ในนั้น"

 requires_power_hub_absence:1 "§Rการมีอยู่ของ $building_power_hub_1$ หรือ $building_power_hub_2$ บนดาวเคราะห์ดวงนี้จะรบกวนกระแสลมเวียนที่ละเอียดอ่อนซึ่งจำเป็นต่อการทำงานอย่างถูกต้องของศูนย์พลังงานป้อนเกลียว§!"

 building_worm_mine:0 "เหมืองขุดเจาะเกลียว"
 building_worm_mine_desc:0 "ช่องเหมืองแคบๆ ที่บิดเบี้ยวรอบสายแร่แร่ที่เป็นเกลียว"

 building_worm_farm:0 "ฟาร์มไถเกลียว"
 building_worm_farm_desc:0 "พืชผลหันเอียงไปตามสายลมอย่างน่าประหลาด"

 ### TRAITS
 leader_trait_foredoomed_to_a_rendezvous:2 "ล่วงหน้าไปสู่การนัดพบ"
 leader_trait_foredoomed_to_a_rendezvous_desc:2 "มีประสบการณ์กับอนาคตที่น่ากังวล"

 ####################
 ### SPECIAL PROJECTS
 HORIZON_SIGNAL_PROJECT:0 "วิเคราะห์สัญญาณขอบฟ้า"
 HORIZON_SIGNAL_PROJECT_DESC:0 "อุทิศยานวิทยาศาสตร์เพื่อถอดรหัสสัญญาณที่เป็นไปได้ยากจากหลุมดำในระบบดาว [Root.GetStarName]"

 LOOP_TEMPLE_PROJECT:0 "สำรวจวิหารแห่งลูป"
 LOOP_TEMPLE_PROJECT_DESC:0 "จัดทำโครงการวิจัยเพื่อเรียนรู้เพิ่มเติมเกี่ยวกับวิหารแห่งลูป ต้นกำเนิด และวัตถุประสงค์ของมัน"

 MESSENGER_POD_PROJECT_1:0 "ศึกษาเมสเซนเจอร์และสารของมัน"
 MESSENGER_POD_PROJECT_1_DESC:0 "บางทีเราอาจจะสร้างความเชื่อมโยงกับเหตุการณ์อื่นๆ บางอย่างได้ - หรืออาจจะหาคำอธิบายพบด้วยซ้ำ"

 MESSENGER_POD_PROJECT_2_UNLEASHED:0 "ศึกษาความเชื่อมโยงของเมสเซนเจอร์"
 MESSENGER_POD_PROJECT_2_UNLEASHED_DESC:0 "ผลการวิจัยในเบื้องต้นชี้ให้เห็นว่ามันเป็นรูปแบบที่มีสติปัญญามากกว่า แม้ว่าอาจจะดูอ่อนแอกว่าก็ตาม"

 MESSENGER_POD_PROJECT_2_LEASHED:0 "ศึกษาความเชื่อมโยงของเมสเซนเจอร์"
 MESSENGER_POD_PROJECT_2_LEASHED_DESC:0 "ผลการวิจัยในเบื้องต้นชี้ให้เห็นว่ามันเป็นรูปแบบที่บึกบึนกว่าและก้าวร้าวกว่ามาก"

 COILS_GOD_PROJECT_DISRUPT:0 "ขัดขวางพิธีกรรมขดลวดแห่งพระผู้เป็นเจ้า"
 COILS_GOD_PROJECT_DISRUPT_DESC:0 "การแทรกแซง การก่อวินาศกรรม การบิดเบือนข้อมูล เราจะทำเท่าที่ทำได้โดยไม่ล้ำเส้น"

 COILS_GOD_PROJECT_PREVENT:0 "ป้องกันพิธีกรรมขดลวดแห่งพระผู้เป็นเจ้า"
 COILS_GOD_PROJECT_PREVENT_DESC:0 "ปฏิบัติการลับรวมถึงการปลอมแปลง การลักพาตัว การล้างสมอง หรือแม้กระทั่งการวางเพลิงและการฆาตกรรม: เราทำในสิ่งที่ต้องทำ"

 COILS_GOD_PROJECT_PARTICIPATE:0 "เข้าร่วมในพิธีกรรมขดลวดแห่งพระผู้เป็นเจ้า"
 COILS_GOD_PROJECT_PARTICIPATE_DESC:0 "ส่งนักชาติพันธุ์วิทยาลงไปยังพื้นผิวเพื่อเฝ้าดูพิธีกรรมขดลวดอย่างใกล้ชิด นี่คือเหตุการณ์ทางวัฒนธรรมที่น่าทึ่ง! เราต้องเรียนรู้ให้มากที่สุดเท่าที่จะทำได้"

 WAITING_WORLD_DISAPPEARANCE:0 "สืบสวนการหายตัวไปของประชากร"
 WAITING_WORLD_DISAPPEARANCE_DESC:0 "มีผู้ตั้งถิ่นฐานมากเกินไป และตอนนี้ไม่มีเหลืออยู่เลย เกิดอะไรขึ้น?"

 WAITING_WORLD_HYPERAPPEARANCE:0 "สืบสวน... สิ่งที่เกิดขึ้นกับประชากร"
 WAITING_WORLD_HYPERAPPEARANCE_DESC:0 "มีผู้ตั้งถิ่นฐานมากเกินไป และตอนนี้ดูเหมือนว่าจะเป็นประชากรกลุ่มใหม่โดยสิ้นเชิง เกิดอะไรขึ้น?"

 WAITING_WORLD_PURGE:0 "กวาดล้างประชากรที่คาดว่าเป็นตัวโคลนต่างดาว"
 WAITING_WORLD_PURGE_DESC:0 "วิธีเดียวที่จะจัดการกับการทดแทนประชากรอย่างลึกลับบนดาว [Root.GetName] คือการบังคับใช้มาตรการระดมยิงโคจรเพื่อกวาดล้างพวกมันทั้งหมด"

 WORM_ENTRY_POINT:0 "สร้างจุดผ่านเข้า"
 WORM_ENTRY_POINT_DESC:0 "ทฤษฎีเสนอว่าความย้อนแย้งทางเวลาที่เราพบคือสาเหตุของสิ่งที่เราเรียกว่า ลูป หรือ เดอะเวิร์ม มันเป็นปมพันพัวของความย้อนแย้งที่ตระหนักรู้ขึ้นมา เป็นจุดศูนย์รวมของความตระหนักและความปรารถนาภายนอกกาลเวลา สาเหตุของมันหรือผลลัพธ์ของมัน - เป็นเรื่องยากที่จะพูดกับสิ่งแบบนี้ แต่สิ่งนี้ดึงดูดเข้าสู่จุดสิ้นสุดและจุดเริ่มต้น เราสามารถใช้การปรับประสานโอเมก้าเพื่อนำมันผ่านเข้ามายังระบบดาวบ้านเกิดของเรา หากเราทำเช่นนั้น บางสิ่งจะเกิดขึ้นอย่างแน่นอน สิ่งนี้เป็นหลายๆ อย่าง แต่ที่แน่ๆ มันคือวิทยาศาสตร์"

 HORIZON_DEBRIS_PROJECT:0 "สืบสวนเศษซากที่ต้นกำเนิดของสัญญาณขอบฟ้า"
 HORIZON_DEBRIS_PROJECT_DESC:0 "เมื่อเครื่องยนต์ระเบิด มันได้ขัดขวางการเปลี่ยนแปลงของอวกาศรอบยาน เศษซากเหล่านั้นแสดงคุณสมบัติทางฟิสิกส์และกาลเวลาที่ผิดปกติ"

 SYZYGY_DEBRIS_PROJECT:0 "สืบสวนเศษซากของ \"ซีซีจี\""
 SYZYGY_DEBRIS_PROJECT_DESC:0 "ยาน \"ซีซีจี\" เคยใช้เวลาอยู่ในอีกสถานที่หนึ่ง อนากตที่เป็นไปได้? จักรวาลคู่ขนาน? เราสามารถเรียนรู้เพิ่มเติมได้"

 ################################################
 ##THE HORIZON SIGNAL: intro events to Worm chain

 akx.9000.name:0 "สัญญาณขอบฟ้า"
 akx.9000.desc:0 "เจ้าหน้าที่สื่อสารที่ใส่ใจสังเกตพบสิ่งที่ดูเหมือนจะเป็นสัญญาณริบหรี่ เกือบจะสูญหายไปในแสงวาบของรังสีแกมมาจากหลุมดำที่นี่ - ริบหรี่ แต่เป็นสัญญาณประดิษฐ์อย่างไม่ต้องสงสัย สิ่งนี้เปิดความเป็นไปได้ที่น่าสนใจให้กับนักวิทยาศาสตร์ของเรา"

 akx.9001.name:0 "สัญญาณขอบฟ้า: §Hแรงโน้มถ่วงคือความเสน่หา§!"
 akx.9001.desc:0 "เจ้าหน้าที่วิทยาศาสตร์[Root.GetLeaderName] รายงานว่า สัญญาณนี้สามารถถอดรหัสได้ง่ายเกินคาด... แต่ทีมของพวกเขาใช้เวลาอย่างมากเพื่อยืนยันว่ามันไม่ใช่เรื่องตลกล้อเล่น มันเป็นข้อความกึ่งปะติดปะต่อที่ส่งซ้ำๆ ในภาษา [Root.Owner.GetAdj] - คล้ายกับบทกวี มันพูดซ้ำๆ ถึงวลี §Hแรงโน้มถ่วงคือความเสน่หา§! และ §Hเวลาคือทัศนวิสัย§! มันเข้ารหัสพิกัดใกล้กับหลุมดำ และลงท้ายด้วยคำอุทิศ §Gระบุชื่อ§! ถึงเจ้าหน้าที่วิทยาศาสตร์ - ซึ่งเจ้าหน้าที่ได้ยืนยันอย่างเป็นกลางว่าสัญญาณนี้ได้รับการแผ่รังสีออกมาสู่ห้วงอวกาศตั้งแต่ก่อนที่เขาจะเกิดเสียอีก อันที่จริง สัญญาณนี้อาจเก่าแก่กว่าอารยธรรมของเราด้วยซ้ำ"
 akx.9001.a:0 "น่าทึ่งมาก! ส่งยานไปยังพิกัดเหล่านั้น"
 akx.a.tooltip:0 "สิ่งนี้จะเริ่มต้นห่วงโซ่เหตุการณ์สัญญาณขอบฟ้า"
 akx.9001.b:0 "นี่เป็นกลลวงหรือกับดัก บันทึกไว้แล้วเดินหน้าต่อไป"
 akx.9001.b.tooltip:0 "เทคนิคที่เราพัฒนาขึ้นเพื่อวิเคราะห์สัญญาณนี้จะมีประโยชน์บางประการในการวิจัยฟิสิกส์"

 akx.9005.name:0 "สัญญาณขอบฟ้า: §Hเดอะเวิร์ม§!"
 akx.9005.desc:0 "ขณะที่ยาน [Root.GetName] เข้าใกล้พิกัดที่ระบุโดยสัญญาณ ยานเริ่มรายงานความบิดเบี้ยวของอวกาศและเอฟเฟกต์เลนส์โน้มถ่วงที่น่าสนใจ - ข้อมูลที่มีค่าหลั่งไหลเข้ามาอย่างไม่ขาดสาย จากนั้นการส่งสัญญาณก็เริ่มบิดเบี้ยว สิ่งที่เกิดขึ้นต่อจากนี้ได้รับการวิเคราะห์อย่างละเอียดถี่ถ้วน\n\nความตื่นเต้นในน้ำเสียงของเจ้าหน้าที่วิทยาศาสตร์ [horizonsignal_firstleader.GetName] เปลี่ยนเป็นความกลัวเมื่อตัวยานต้องทนรับสภาวะที่แปลกประหลาดขึ้นเรื่อยๆ ยานได้ส่งสัญญาณขอความช่วยเหลือ [horizonsignal_firstleader.GetName] ร้องตะโกนว่า \"เดอะเวิร์ม!\" - หรือบางทีอาจจะเป็น §Hเดอะเวิร์ม§!! จากนั้นการส่งสัญญาณทั้งหมดก็สิ้นสุดลง ไม่พบร่องรอยของยาน [Root.GetName] อีกเลย - ไม่มีสัญญาณส่งต่อ ไม่มีเศษซาก และอวกาศที่พิกัดเหล่านั้นกลับสู่ภาวะปกติและไม่มีความบิดเบี้ยวใดๆ หลงเหลืออยู่ แต่ข้อมูลที่พวกเขาส่งกลับมาทำให้การวิจัยฟิสิกส์ของเราก้าวหน้าอย่างมาก บางทีมันอาจจะคุ้มค่ากับชีวิตของพวกเขาแล้ว"
 akx.9005.a.spiritualist:0 "ความมืด; แสงสว่าง; ความมืด"
 akx.9005.a.materialist:0 "เราเรียนรู้ และเราก้าวต่อไป"
 akx.9005.a.neutral:0 "พวกเขาจะไม่ถูกลืม"

 akx.9006.name:0 "สัญญาณขอบฟ้า: - สิ้นสุดข้อความ -"
 akx.9006.desc:1 "[horizonsignal_firstleader.GetName] ปฏิบัติตามด้วยความรู้สึกลังเลและโล่งใจปนเปกัน รายงานการรับรู้ของพวกเขาในภายหลังระบุว่าพวกเขาต้องเผชิญกับนิมิตที่เกิดขึ้นซ้ำๆ - นิมิตเกี่ยวกับเขาวงกตที่เป็นไปไม่ได้ ความวิงเวียนอันหิวกระหายของอวกาศ และเสียงเรียกชื่อของพวกเขาในความมืด ภายในเวลาหนึ่งปีของดาวบ้านเกิด ข้อความนั้นก็เงียบหายไป"
 akx.9006.a:0 "เราได้รอดพ้นจากบางสิ่งบางอย่างแล้ว"
 akx.9006.b:0 "เราได้สูญเสียบางสิ่งบางอย่างไปแล้ว"

 akx.9010.name:0 "สัญญาณขอบฟ้า: §Hบรรเลงซ้ำ§!"
 akx.9010.desc:0 "หลุมดำในระบบดาว [horizonsignal_system.GetName] กลับมาทำงานอีกครั้ง สัญญาณที่เล่นวนซ้ำกะพริบอีกครั้งในความมืดที่ขอบอวกาศปกติ แต่ครั้งนี้ มีข้อความเสียงเข้ารหัสอยู่ในสัญญาณด้วย มันฟังดูคล้ายกับเสียงของ [horizonsignal_firstleader.GetName] เป็นอย่างมาก \"สิ่งที่เป็นอยู่จักเกิดขึ้น สิ่งที่จักเกิดขึ้นเคยเป็นมาแล้ว\" [horizonsignal_firstleader.GetName] สวดท่อง \"สิ่งที่เป็นอยู่จักเกิดขึ้น สิ่งที่จักเกิดขึ้นเคยเป็นมาแล้ว\" จากนั้นก็บอกพิกัดเดิมกับสัญญาณแรก พิกัดที่ [horizonsignal_firstleader.GetName] หายสาบสูญไป - สิ่งที่สื่อขนานนามว่า \"จุดทางออก\" จากนั้นพวกเขาก็เอ่ยชื่อ: §G[horizonsignal_secondleader.GetName]§!"
 akx.9010.a.collective:0 "ส่ง [horizonsignal_secondleader.GetName] ไปยังจุดทางออก"
 akx.9010.a.tooltip:0 "§H[horizonsignal_secondleader.GetName]§! จะไปถึงจุดทางออกใน §Y30 วัน§!"
 akx.9010.a.collective.tooltip:0 "หากพวกเขาไม่ได้กลับมา เราจะระลึกถึงพวกเขา"
 akx.9010.a.notcollective:0 "[horizonsignal_secondleader.GetName] อาสาที่จะไป อนุญาตตามนั้น"
 akx.9010.b.collective:0 "ส่งพวกเขาไป แต่ติดตั้งระบบระเบิดทำลายตัวเองไว้ที่เครื่องยนต์ของยาน"
 akx.9010.b.notcollective:0 "อนุญาตให้พวกเขาไป แต่ติดตั้งระบบระเบิดทำลายตัวเองไว้ที่เครื่องยนต์ของยาน"
 akx.9010.c:0 "ไม่ใช่ครั้งนี้ เพิกเฉยต่อมันเสีย"

 akx.9011.name:0 "สัญญาณขอบฟ้า: ข้าผ่านเข้าไปแล้ว"
 akx.9011.desc:0 "ครั้งนี้ ยานทำงานด้วยระบบอัตโนมัติเต็มรูปแบบ [horizonsignal_secondleader.GetName] เป็นลูกเรือเพียงคนเดียวบนยาน ขณะที่มันเข้าใกล้จุดทางออก ข้อมูลการตรวจวัดทางไกลก็หลั่งไหลเข้ามาอย่างน่าทึ่ง อวกาศโค้งงออีกครั้ง แรงโน้มถ่วงคลายเกลียวออก [horizonsignal_secondleader.GetName] อ่านข้อมูลหัวข้อหลักสะท้อนตามข้อมูลโทรมาตร พวกเขาเยือกเย็นอย่างน่ายกย่อง: เราส่งมืออาชีพไปแล้ว แต่ต้องใช้เวลาสักพักกว่าจะมีใครตระหนักว่ามีบางอย่างผิดปกติเกี่ยวกับเวลา\n\n[horizonsignal_secondleader.GetName] ไม่ได้พูดตามข้อมูลโทรมาตรอีกต่อไป: พวกเขากำลังทำนายมันล่วงหน้า ข้อมูลโทรมาตรไม่ตรงกัน แต่เป็นเพียงไม่กี่วินาทีจนกระทั่งมันไล่ตามทัน ทีมเฝ้าสังเกตการณ์เพิ่งรายงานว่าช่วงเวลาการทำนายกำลังเพิ่มขึ้น เมื่อ [horizonsignal_secondleader.GetName] พูดขึ้นด้วยความประหลาดใจว่า: \"ข้าผ่านเข้าไปแล้ว\"\n\n\"มันมืดมาก\" พวกเขาเสริม \"นั่นไม่ใช่ปัญหา เราสามารถใช้ชีวิตในความมืดได้ ข้าไม่เคยคิดถึงเรื่องนั้นเลย แต่แน่นอน เราสามารถใช้ชีวิตอยู่ที่นี่ได้ตลอดไป - หากเดอะเวิร์มยอมรอ - \"\n\nณ วินาทีนั้น สัญญาณก็ถูกตัดขาด และยานก็หายไปจากเซ็นเซอร์ของทีมงานเรา"
 akx.9011.a:0 "นี่มันน่ากลัวมาก"
 akx.9011.b:0 "นี่เป็นเรื่องที่น่าเสียใจ"
 akx.9011.c:0 "นี่มันน่าทึ่งมาก"

 akx.9012.name:0 "สัญญาณขอบฟ้า: การแทรกแซง"
 akx.9012.desc:0 "ครั้งนี้ [horizonsignal_secondleader.GetName] เป็นลูกเรือเพียงคนเดียวบนยาน ยานทำงานด้วยระบบอัตโนมัติเต็มรูปแบบ... และระบบของมันได้รับการตั้งโปรแกรมให้จุดชนวนระเบิดเครื่องยนต์ทันทีที่สภาวะตรงกับช่วงเวลาก่อนที่ยานลำก่อนจะหายสาบสูญ ขณะที่มันเข้าใกล้จุดทางออก ข้อมูลโทรมาตรก็หลั่งไหลเข้ามาอย่างน่าทึ่ง อวกาศโค้งงออีกครั้ง แรงโน้มถ่วงคลายเกลียวออก [horizonsignal_secondleader.GetName] อ่านข้อมูลหลักสะท้อนตามข้อมูลโทรมาตร พวกเขาเยือกเย็นอย่างน่ายกย่อง: เราส่งมืออาชีพไปแล้ว แต่ต้องใช้เวลาสักพักกว่าจะมีใครตระหนักว่ามีบางอย่างผิดปกติเกี่ยวกับเวลา\n\n[horizonsignal_secondleader.GetName] ไม่ได้พูดตามข้อมูลโทรมาตรอีกต่อไป: พวกเขากำลังทำนายมันล่วงหน้า ข้อมูลโทรมาตรไม่ตรงกันแต่เพียงไม่กี่วินาทีจนกระทั่งไล่ทัน ทีมเฝ้าสังเกตการณ์ของเรากำลังรายงานว่าช่วงเวลาการทำนายกำลังเพิ่มขึ้นเมื่อมีพลังงานพุ่งสูงขึ้นอย่างกะทันหัน\n\nเครื่องยนต์ระเบิดแล้ว: แสงวาบแห่งความพิโรธของดวงดาวสว่างขึ้นครู่หนึ่ง แล้วสูญหายไปในความมืดของระบบดาว [horizonsignal_system.GetName] อย่างรวดเร็ว ไม่ว่าเราจะเผชิญกับอะไรที่นั่น มันอาจจะนึกเสียใจที่เข้ามาแทรกแซง เราไม่มีวันรู้ได้ สัญญาณขอบฟ้าไม่ส่งมาอีกเลย แต่ทีมงานของเราอาจพบสิ่งน่าสนใจในซากเถ้าถ่านของยาน"
 akx.9012.a:0 "ทว่า นี่อาจไม่ใช่จุดจบ"

 akx.9013.name:0 "สัญญาณขอบฟ้า: - สิ้นสุดข้อความ -"
 akx.9013.desc:1 "[horizonsignal_secondleader.GetName] ปฏิบัติตามด้วยความโล่งใจอย่างเห็นได้ชัด รายงานการรับรู้ของพวกเขาในภายหลังระบุว่าพวกเขากลายเป็นเป้าหมายของนิมิต - นิมิตเกี่ยวกับเขาวงกตที่เป็นไปไม่ได้ ความวิงเวียนอันหิวกระหายของอวกาศ และเสียงเรียกชื่อของพวกเขาในความมืด ภายในเวลาหนึ่งปีของดาวบ้านเกิด ข้อความนั้นก็เงียบหายไป"
 akx.9013.a:0 "โอกาสที่พลาดไป"
 akx.9013.b:0 "การรอดพ้นอย่างหวุดหวิด"

 akx.9020.name:0 "สัญญาณขอบฟ้า: §Hลูปสามลูปห้าลูปสาม§!"
 akx.9020.desc:0 "อีกครั้งหนึ่งที่สัญญาณขอบฟ้าในระบบดาว [horizonsignal_system.GetName] เริ่มทำงาน มันได้ยกระดับการเล่นขึ้นอีกขั้น อีกครั้งที่การส่งสัญญาณรวมพิกัดของจุดทางออกเอาไว้ มันลงชื่อด้วยรหัสการสื่อสารส่วนตัวของ [horizonsignal_firstleader.GetName] และ [horizonsignal_secondleader.GetName] แต่ครั้งนี้ มันเป็นโปรแกรมสร้างข้อความที่เขียนขึ้นในภาษาเขียนโปรแกรมยุคเก่า ซึ่งสร้างสิ่งที่ดูเหมือนจะเป็นบทกวีรัก - บทกวีรักที่ส่งตรงถึง [horizonsignal_thirdleader.GetName]\n\nเอาเข้าจริงบทกวีรักพวกนั้นก็ไม่ได้ไพเราะมากนัก แต่นักวิทยาศาสตร์ของเราเห็นพ้องต้องกันว่า มันเป็นเรื่องยากมากที่จะสร้างบทกวีรักขึ้นมาด้วยกระบวนการทางคอมพิวเตอร์ และเป็นเรื่องที่ผิดปกติอย่างยิ่งที่หลุมดำจะส่งบทกวีรักมาให้"
 akx.9020.a:0 "เอาล่ะ มันขอร้องมาอย่างไพเราะแล้ว ส่ง [horizonsignal_thirdleader.GetName] ไป"
 akx.9020.a.tooltip:0 "§H[horizonsignal_thirdleader.GetName]§! จะไปถึงจุดทางออกใน §Y30 วัน§!"
 akx.9020.b:0 "ส่ง [horizonsignal_thirdleader.GetName] ไป พร้อมกับติดตั้งระบบระเบิดทำลายตัวเองที่เครื่องยนต์ของยาน"
 akx.9020.c:0 "นี่มันทั้งน่ากลัว ไร้สาระ และน่ากลัว ปล่อยมันไปเถอะ"

 akx.9021.name:0 "สัญญาณขอบฟ้า: จุดที่จุดจบถือกำเนิดขึ้น"
 akx.9021.desc:0 "\"นี่คงจะเป็นจุดจบของข้า\" [horizonsignal_thirdleader.GetName] กล่าวในการสรุปข้อมูลก่อนปล่อยยาน \"ข้ารู้ว่าข้าจะไม่กลับมา แต่ข้าคิดว่าข้ารู้อยู่เสมอว่าเรื่องนี้จะเกิดขึ้น ไม่ว่าสิ่งใดที่อยู่ในหลุมดำนั้น มันรอคอยเรามาเป็นเวลานานแสนนาน - ข้าคิดว่ามันรอคอยข้า ตั้งแต่ก่อนที่ข้าจะเกิดเสียอีก\"\n\nอีกครั้งที่ยานที่ขับโดยนักบินคนเดียวเข้าใกล้จุดทางออก อีกครั้งที่อวกาศเดือดพล่านราวกับเป็นไข้ อีกครั้งที่อาร์เรย์เซ็นเซอร์ของเราดูดซับข้อมูลที่น่าทึ่ง ครั้งนี้ [horizonsignal_thirdleader.GetName] เงียบงัน ข้อมูลโทรมาตรเริ่มขาดหายไป และแล้วมันก็เงียบหายไป ยานมาถึงจุดทางออกแล้ว สภาวะรอบตัวมันกำลังกลับคืนสู่ปกติ ไม่มีอะไรเกิดขึ้นเลย\n\nไม่มีอะไรเกิดขึ้นงั้นหรือ? ทีมเฝ้าสังเกตการณ์พึมพำอย่างหัวเสีย ยานนั้นเปลี่ยนไป... อันที่จริง มันเป็นคนละลำกัน มันคือยานของ [horizonsignal_firstleader.GetName] ที่สูญหายไปเมื่อหลายปีก่อน บัดนี้กำลังลอยห่างออกจากจุดทางออก ทีมกู้ภัยพบมันในสภาพสะอาดบริสุทธิ์และว่างเปล่า - ไม่มีร่องรอยของลูกเรือ และไม่มีสัญญาณของความรุนแรง แต่มีบันทึกประจำวันในชื่อของ [horizonsignal_firstleader.GetName] ในหัวข้อ §Hสิ่งที่เป็นอยู่จักเกิดขึ้น§! นักวิทยาศาสตร์ของเราทบทวนมันอย่างวิตกกังวล \"เป็นไปไม่ได้\" คนหนึ่งกล่าว \"ข้าหวังว่าจะเป็นเช่นนั้น\" อีกคนกล่าว\n\nยานได้รับการตั้งชื่อใหม่ว่า \"ฟาวด์ลิง(เสียงสุนัขร้อง)\" และส่งกลับเข้าประจำการ สัญญาณนั้น ไม่ว่าจะตายหรือหลับใหล ก็ไม่เอ่ยอะไรอีกเลยตลอดกาล"
 akx.9021.a:0 "ทว่า นี่อาจไม่ใช่จุดจบ"

 akx.9022.name:0 "สัญญาณขอบฟ้า: การแทรกแซง"
 akx.9022.desc:0 "\"นี่คงจะเป็นจุดจบของข้า\" พวกเขากล่าวในการสรุปข้อมูลก่อนปล่อยยาน \"ข้ารู้ว่าข้าจะไม่กลับมา แต่ข้าคิดว่าข้ารู้อยู่เสมอว่าเรื่องนี้จะเกิดขึ้น ไม่ว่าสิ่งใดที่อยู่ในหลุมดำนั้น มันรอคอยเรามาเป็นเวลานานแสนนาน - ข้าคิดว่ามันรอคอยข้า ตั้งแต่ก่อนที่ข้าจะเกิดเสียอีก\"\n\nอีกครั้งที่ยานที่ขับโดยนักบินคนเดียวเข้าใกล้จุดทางออก อีกครั้งที่อวกาศเดือดพล่านราวกับเป็นไข้ อีกครั้งที่อาร์เรย์เซ็นเซอร์ของเราดูดซับข้อมูลที่น่าทึ่ง ครั้งนี้ [horizonsignal_thirdleader.GetName] เงียบงัน ข้อมูลโทรมาตรเริ่มขาดหายไป...\n\nและแล้วเครื่องยนต์ก็ระเบิด: แสงวาบแห่งความพิโรธของดวงดาวสว่างขึ้นครู่หนึ่ง แล้วสูญหายไปในความมืดของระบบดาว [horizonsignal_system.GetName] อย่างรวดเร็ว ไม่ว่าเราจะเผชิญกับอะไรที่นั่น มันอาจจะนึกเสียใจที่เข้ามาแทรกแซง เราไม่มีวันรู้ได้ สัญญาณขอบฟ้าไม่ส่งมาอีกเลย แต่ทีมงานของเราอาจพบสิ่งน่าสนใจในซากเถ้าถ่านของยาน"
 akx.9022.a:0 "ทว่า นี่อาจไม่ใช่จุดจบ"

 akx.9023.name:0 "สัญญาณขอบฟ้า: - สิ้นสุดข้อความ -"
 akx.9023.desc:1 "[horizonsignal_thirdleader.GetName] ปฏิบัติตามด้วยความโล่งใจอย่างเห็นได้ชัด รายงานการรับรู้ของพวกเขาในภายหลังระบุว่าพวกเขากลายเป็นเป้าหมายของนิมิตที่เกิดขึ้นซ้ำๆ - นิมิตเกี่ยวกับเขาวงกตที่เป็นไปไม่ได้ ความวิงเวียนอันหิวกระหายของอวกาศ และเสียงเรียกชื่อของพวกเขาในความมืด ภายในเวลาหนึ่งปี ข้อความนั้นก็เงียบหายไป"

 akx.9090.name:0 "สัญญาณขอบฟ้า: เหตุและผล"
 akx.9090.desc:0 "ผู้สังเกตการณ์ของเรารายงานว่าหลุมดำที่ช่างพูดในระบบดาว [horizonsignal_system.GetName] เริ่มทำงานช่วงสั้นๆ ในช่วงเวลาที่ [horizonsignal_secondleader.GetName] เสียชีวิต สัญญาณระเบิดสั้นๆ ที่จับใจความไม่ได้ ราวกับอาการเกรี้ยวกราด ผู้สังเกตการณ์ที่เปี่ยมด้วยจินตนาการคนหนึ่งเสริม"
 akx.9090.a:0 "เรื่องนี้ยังไม่จบ"

 akx.9091.name:0 "สัญญาณขอบฟ้า: ในความทรงจำ"
 akx.9091.desc:0 "ผู้สังเกตการณ์ของเรารายงานว่าหลุมดำที่ช่างพูดในระบบดาว [horizonsignal_system.GetName] เริ่มทำงานช่วงสั้นๆ ในช่วงเวลาที่ [horizonsignal_thirdleader.GetName] เสียชีวิต มันส่งโปรแกรมบทกวีดั้งเดิมออกมาอีกครั้ง สามครั้ง เหมือนกับ - หนึ่งในผู้สังเกตการณ์ที่มีอารมณ์สุนทรีย์ของเราเสริม - ผู้ไว้อาลัยที่กำลังเมามายและร้องเพลงในงานศพ"
 akx.9091.a:0 "เรื่องนี้ยังไม่จบ"

 akx.9095.name:0 "สัญญาณขอบฟ้า: บทเรียนในเถ้าถ่าน"
 akx.9095.desc:0 "เราได้จำลองสภาวะที่ใกล้เคียงกับสภาวะรอบหลุมดำ เราพบว่าเศษซากที่เรากู้คืนมาได้นั้นสลับไปมาระหว่างสถานะต่างๆ ในรูปแบบที่ควรจะเป็นไปไม่ได้ - ราวกับว่าเวลากำลังสั่นไหว เราสามารถดึงพลังงานจากสิ่งนี้ได้ - แม้ว่าจะมีความบิดเบี้ยวที่น่ากังวลต่อมิติเวลาในท้องถิ่นก็ตาม"

 ########################################
 ##THE LOOP TEMPLE: continuation of intro

 akx.9100.name:0 "วิหารแห่งลูป: สัญญาณในหิน"
 akx.9100.desc:1 "นักโบราณคดีได้ค้นพบวิหารที่ถูกลืมในที่ราบสูงอันห่างไกลของดาว [Root.GetName] - มันถูกฝังมานานหลายศตวรรษ แต่เพิ่งถูกเปิดเผยโดยแผ่นดินไหว เทคนิคการหาอายุชี้ให้เห็นว่ามันเป็นโบราณวัตถุยุคก่อนอุตสาหกรรม ถูกสลักด้วยฝีมือของ [Owner.Species.GetHandName] จากหินภูเขาไฟ อย่างไรก็ตาม สัญลักษณ์ที่เกิดขึ้นซ้ำๆ บนผนังและแท่นบูชารัศมี - อสรพิษที่ม้วนตัวเป็นแถบเมบิอุส(โมบิอุส-พัด)กำลังกินหางของตัวเอง - ไม่มีสิ่งอ้างอิงที่ชัดเจนในประวัติศาสตร์ตอนต้นของเรา และจารึกใช้ตัวอักษรที่ไม่รู้จัก นักโบราณคดีที่ตื่นเต้นคนหนึ่งเสนอว่ามันเป็นโบราณวัตถุที่ทิ้งไว้โดยเผ่าพันธุ์ผู้เบิกทางที่ไม่รู้จัก\n\nในความบังเอิญที่สันนิษฐานว่าไม่มีความหมาย แผ่นดินไหวดูเหมือนจะเกิดขึ้นในเวลาเดียวกันกับข้อความสุดท้ายจากหลุมดำในระบบดาว [horizonsignal_system.GetName]"
 akx.9100.spiritual.a:0 "หนทางได้รับการเปิดออกให้กับเราแล้ว"
 akx.9100.neutral.a:0 "สิ่งนี้ควรค่าแก่การศึกษา"
 akx.9100.b:0 "ลางร้าย"

 akx.9101.name:0 "วิหารแห่งลูป: เวลาและศิลา"
 akx.9101.desc:0 "นักวิทยาศาสตร์ของเราได้เรียนรู้อย่างมากเกี่ยวกับวิหารใต้ดินนี้ แต่คำถามบางประการยังคงอยู่ ช่องเปิดหลังคา - พร้อมกับแท่นบูชารัศมี - บ่งชี้ว่ามันเคยเป็นปฏิทินสุริยคติ แต่ขอบเขตความเสียหายจากแผ่นดินไหวนั้นรุนแรงมากจนเราไม่สามารถแน่ใจได้ หากผู้สร้างเห็นว่าวันที่เจาะจงใดมีความสำคัญ เราก็ไม่มีวันรู้ว่ามันคือวันไหน เราโชคดีกว่ากับ \"ตัวอักษรที่ไม่รู้จัก\" มันเป็นรูปแบบที่เสื่อมถอยของอักษรภาพที่เป็นที่รู้จักกันดี - ไม่ใช่ภาษาต่างดาวเลย - และเราถอดรหัสได้สำเร็จแล้ว\n\nวิหารแห่งนี้อุทิศให้กับ \"เดอะเวิร์มผู้รอคอย\" หรือ §Hเดอะเวิร์มผู้รอคอย§! จารึกส่วนใหญ่เป็นบทสวดที่ก้องกังวานและเปี่ยมด้วยบทกวีเพื่อขอให้มันปรากฏตัว หรือ - หากอ่านในอีกทิศทางหนึ่ง - เพื่อขอให้มันจากไป นอกจากนี้ยังมีจารึกที่อธิบายถึง \"การทำงานของจักรวาล\" ซึ่งนักโบราณคดีที่กระตือรือร้นของเราสาบานว่ามีข้ออ้างอิงถึงสมการสนามขั้นสูง - ไม่มีอะไรใหม่สำหรับเรา แต่เป็นเรื่องที่น่าประทับใจมากสำหรับวิหารในยุคนี้ อย่างไรก็ตาม เรายังไม่พบนักฟิสิกส์คนใดที่พร้อมจะบันทึกยืนยันว่าการอ้างอิงเหล่านั้นมีความหมายจริง\n\nวิหารไม่ได้กักเก็บความลับแห่งจักรวาลหรืออาวุธต่างดาวใดๆ เท่าที่เราบอกได้ แต่พื้นที่มืดๆ ของมันมีความงามที่โดดเด่นและน่าเกรงขาม - และบทกวีของบทสวดต่อเดอะเวิร์มผู้รอคอยก็กลายเป็นที่นิยม พวกมันได้รับการนำไปใส่ในดนตรียอดนิยม และได้รับการตีพิมพ์ในหนังสือรวมบทกวี"
 akx.9101.a.notspiritual:0 "เปิดวิหารแห่งลูปให้สาธารณชนเข้าชม"
 akx.9101.a.notspiritual.tooltip:0 "บางสิ่งจากอดีตของเรา สิ่งที่เป็นอยู่จักเกิดขึ้น"
 akx.9101.a.spiritual:0 "ทำให้วิหารแห่งลูปเป็นสถานที่จาริกแสวงบุญ"
 akx.9101.a.spiritual.tooltip:1 "ปัญญาจากความเชื่อของผู้ล่วงลับของเรา สิ่งที่เป็นอยู่จักเกิดขึ้น ช่วยเพิ่มความสุขของประชากรบนดาวเคราะห์ และอื่นๆ"
 akx.9101.b:0 "สงวนวิหารไว้สำหรับการศึกษาทางวิชาการเท่านั้น"
 akx.9101.b.tooltip:0 "จำกัดการเข้าถึงเฉพาะผู้ที่จำเป็นต้องใช้"
 akx.9101.c:1 "มีบางอย่างผิดปกติที่นี่ ปิดผนึกวิหารเสีย"
 akx.9101.c.tooltip:0 "ปลอดภัยไว้ก่อนดีกว่าเสียใจภายหลัง"

 ###################################
 ##THE MESSENGER: Worm-related event

 akx.9200.name:0 "เมสเซนเจอร์: §Hสิ่งที่เป็นอยู่จักเกิดขึ้น§!"
 akx.9200.desc:1 "ยาน [Root.GetName] ได้ระบุตำแหน่งของวัตถุประดิษฐ์ขนาดเล็กที่ใช้พลังงานขั้นต่ำ ซึ่งกำลังแผ่สัญญาณวนซ้ำในระยะท้องถิ่นเท่านั้น วัตถุประเภทนี้มักจะกลายเป็นฝักกู้ภัย และอันนี้ก็ดูเหมือนจะเป็นหนึ่งในนั้น มันอยู่ข้างนอกนี่มานานแล้ว\n\nเมื่อลูกเรือเปิดมันออก - โดยปฏิบัติตามขั้นตอนการกักกันอย่างระมัดระวัง - พวกเขาพบซากศพโบราณที่ได้รับการเก็บรักษาไว้โดยสภาพแวดล้อมที่ปราศจากเชื้อของฝัก จนถึงตอนนี้ ยังไม่มีอะไรผิดปกติ อย่างไรก็ตาม กัปตันของยาน [Root.GetName] ระบุว่า พวกเขาไม่ได้คาดคิดว่าจะพบคำภาษา [Root.Owner.GetAdj] วาดเขียนไว้บนผนังด้วยของเหลวในร่างกายของผู้อยู่ในฝักว่า §Hสิ่งที่เป็นอยู่จักเกิดขึ้น; สิ่งที่จักเกิดขึ้นเคยเป็นมาแล้ว§! ซึ่งลูกเรือเรียกผู้นั้นอย่างประชดประชันว่า \"เมสเซนเจอร์\" พวกเขาเสริมว่ามีความคล้ายคลึงกันอย่างไม่คาดคิดระหว่างสายพันธุ์ของเมสเซนเจอร์และของเราเอง"

 akx.9201.name:0 "เมสเซนเจอร์: ความเป็นไปได้"
 akx.9201.desc:1 "เราได้ยืนยันแล้วว่าฝักกู้ภัยเป็นสินค้าระดับเลียนแบบที่มีขายทั่วไปในอารยธรรมกาแล็กซียุคก่อน - ไม่มีเทคโนโลยีใหม่หรือความเข้าใจอื่นใด ทว่า ร่างของเมสเซนเจอร์กลับเป็นอีกเรื่องหนึ่ง มันเป็นบรรพบุรุษหรือสายพันธุ์ย่อยของเผ่าพันธุ์ [Root.Owner.GetAdj] อย่างไม่ต้องสงสัย เราอาจจะมีญาติอยู่ข้างนอกนั่น - หรือเราเคยตกเป็นเป้าหมายการทดลองโดยเผ่าพันธุ์ผู้เบิกทาง [researchingscientist.GetName] กำลังขออนุญาตเพื่อทำการวิจัยเชิงลึกต่อไป"
 akx.9201.militarist.a:0 "อนุญาตให้ดำเนินการต่อ"
 akx.9201.militarist.a.tooltip:0 "เพิ่มความก้าวหน้าการวิจัยแผนที่ยีน(เสียงทอง)"
 akx.9201.notmilitarist.b:0 "อนุมัติงบประมาณวิจัย"
 akx.9201.notmilitarist.b.tooltip:0 "เพิ่มความก้าวหน้าการวิจัยแผนที่ยีนอย่างปานกลาง"
 akx.9201.c:0 "ไม่อนุมัติ และ [researchingscientist.GetName] ต้องทำลายข้อมูลวิจัยที่มีอยู่ทั้งหมด"
 akx.9201.c.tooltip:0 "มีบางเรื่องที่รู้ให้น้อยไว้จะดีกว่า"

 akx.9210.name:0 "เมสเซนเจอร์: ปลดปล่อย"
 akx.9210.desc:1 "[researchingscientist.GetName] ได้ฟื้นฟูสายพันธุ์ของเมสเซนเจอร์ขึ้นมาใหม่ มันอ่อนแอกว่าสายพันธุ์ของเราแต่มีความสามารถในการรับรู้และสติปัญญาที่พัฒนาขึ้นอย่างมาก จำเป็นต้องมีความชัดเจนเกี่ยวกับเรื่องที่ว่าเราเป็นสายพันธุ์ต้นกำเนิดและเมสเซนเจอร์เป็นรุ่นที่ถูกดัดแปลง หรือเมสเซนเจอร์เป็นบรรพบุรุษของเรากันแน่ มันน่าอายเล็กน้อยที่จะจินตนาการว่าเราอาจจะสืบเชื้อสายมาจากเผ่าพันธุ์ที่อ่อนแอเช่นนี้ - แต่ [researchingscientist.GetName] มีความเห็นเช่นนั้นอย่างแน่วแน่ อันที่จริง พวกเขาถือว่าการสูญเสียความสามารถในการรับรู้เป็น \"โศกนาฏกรรม\"\n\nโศกนาฏกรรมที่ร้ายแรงเสียจนพวกเขายอมเข้ารับการรักษาทดลองเพื่อเปลี่ยนสรีระของตนเองให้กลายเป็นแบบเมสเซนเจอร์ พวกเขายืนยันว่าสิ่งนี้จะช่วยให้พวกเขามีความพร้อมในการดำเนินโครงการต่อไปได้ดียิ่งขึ้น"
 akx.9210.a:0 "การทรยศในรูปแบบสร้างสรรค์! ประหารชีวิตพวกเขาเสีย"
 akx.9210.b:0 "การทรยศในรูปแบบสร้างสรรค์! ประหารชีวิตพวกเขาเสีย และทำลายบันทึกของพวกเขา"
 akx.9210.c:0 "เป็นความคิดที่ยอดเยี่ยมมาก! ดำเนินการต่อเลย"

 akx.9211.name:0 "เมสเซนเจอร์: แสงสว่างใหม่"
 akx.9211.desc:1 "บัดนี้ [researchingscientist.GetName] ได้ถอดรหัสต้นกำเนิดของสายพันธุ์เมสเซนเจอร์สำเร็จแล้ว ในเวลาเดียวกัน พวกเขายังได้สร้างไวรัสที่แพร่กระจายได้ง่ายขึ้นมาด้วย มันกำลังคุกคามโลกของเรา ภายใต้การนำของไวรัสนี้ เผ่าพันธุ์หลักของเราจะเข้าสู่ภาวะดักแด้โคม่าและตื่นขึ้นในอีกหนึ่งวันต่อมาในฐานะสายพันธุ์เมสเซนเจอร์ การเปลี่ยนแปลงเหล่านี้ทำให้เกิดความตื่นตระหนกขึ้นอย่างเข้าใจได้"
 akx.9211.a:0 "นี่มันล้ำเส้นเกินไปแล้ว บัดนี้เราต้องยุติมัน ควบคุมการแพร่ระบาดเสีย"
 akx.9211.a.tooltip:1 "ประชากรทั้งหมดบนดาวเคราะห์เมืองหลวงจะถูกเปลี่ยนสภาพ แต่การระบาดจะสิ้นสุดลงที่นั่น\nรูปลักษณ์ จริยธรรม และคุณลักษณะของพวกเขาอาจเกิดการเปลี่ยนแปลงครั้งใหญ่"
 akx.9211.b:0 "ควบคุมการแพร่ระบาด และกวาดล้างพลเมืองที่ติดเชื้อทั้งหมด"
 akx.9211.b.tooltip:0 "สิ่งนี้จะ §Rกวาดล้างประชากรที่ได้รับผลกระทบทั้งหมด§!: เกือบทั้งหมดของประชากรบนดาว [Root.Capital.GetName]"
 akx.9211.c:1 "สิ่งที่เป็นอยู่จักเกิดขึ้น เราจะเปลี่ยนแปลง นำตัวอย่างไวรัสมาให้ข้า"
 akx.9211.c.tooltip:1 "สิ่งนี้จะเปลี่ยนสภาพเผ่าพันธุ์ของเราทั้งหมด\nรูปลักษณ์ จริยธรรม และคุณลักษณะของเราอาจเกิดการเปลี่ยนแปลงครั้งใหญ่"

 akx.9220.name:0 "เมสเซนเจอร์: ล่ามโซ่"
 akx.9220.desc:2 "[researchingscientist9220.GetName] ได้ฟื้นฟูเมสเซนเจอร์ขึ้นมาใหม่ มัน... น่าประทับใจทีเดียว - น่ากังวลเสียด้วย มันแข็งแกร่งและก้าวร้าวมากกว่ารุ่นปัจจุบันของเราอย่างมาก จำเป็นต้องมีความชัดเจนว่าเราเป็นสายพันธุ์ต้นกำเนิดและเมสเซนเจอร์เป็นรุ่นที่ถูกดัดแปลง หรือเมสเซนเจอร์เป็นบรรพบุรุษของเรากันแน่ [researchingscientist9220.GetName] เชื่อมั่นอย่างยิ่งว่าครั้งหนึ่งเราเคยเป็นเผ่าพันธุ์นักรบที่ยิ่งใหญ่กว่านี้ และเผ่าพันธุ์ผู้เบิกทางบางกลุ่มได้เข้ามาแทรกแซงขัดขวางศักยภาพของเรา อันที่จริง พวกเขาถือว่าการสูญเสียความสามารถทางการทหารเป็น \"โศกนาฏกรรม\"\n\nโศกนาฏกรรมที่ร้ายแรงเสียจนพวกเขายอมเข้ารับการรักษาทดลองเพื่อเปลี่ยนสรีระของตนเองให้กลายเป็นแบบเมสเซนเจอร์ พวกเขายืนยันว่าสิ่งนี้จะช่วยให้พวกเขามีความพร้อมในการดำเนินโครงการต่อไปได้ดียิ่งขึ้น"
 akx.9220.a:0 "การทรยศในรูปแบบสร้างสรรค์! ประหารชีวิตพวกเขาเสีย"
 akx.9220.b:0 "การทรยศในรูปแบบสร้างสรรค์! ประหารชีวิตพวกเขาเสีย และทำลายบันทึกของพวกเขา"
 akx.9220.c:0 "เป็นความคิดที่ยอดเยี่ยมมาก! ดำเนินการต่อเลย"
 akx.9220.c.tooltip:0 "§Rสิ่งนี้อาจส่งผลกระทบที่ร้ายแรงและคาดเดาไม่ได้§!"

 akx.9221.name:0 "เมสเซนเจอร์: ราตรีเยือน"
 akx.9221.desc:1 "[researchingscientist9220.GetName] ได้ถอดรหัสต้นกำเนิดของสายพันธุ์เมสเซนเจอร์สำเร็จแล้ว โดยไม่รอถามความเห็นจากผู้ใด พวกเขายังได้สร้างไวรัสที่แพร่กระจายได้ง่ายขึ้นมาอีกด้วย มันกำลังคุกคามโลกของเรา ภายใต้ผลของมัน เผ่าพันธุ์หลักของเราจะเข้าสู่ภาวะดักแด้โคม่าและตื่นขึ้นในอีกหนึ่งวันต่อมาในฐานะสายพันธุ์เมสเซนเจอร์ สิ่งนี้ทำให้เกิดความตื่นเต้น - เรียกได้ว่าเช่นนั้น - ขึ้นมาระลอกใหญ่"
 akx.9221.a:1 "นี่มันล้ำเส้นเกินไปแล้ว ควบคุมการแพร่ระบาดเสีย"
 akx.9221.a.tooltip:0 "ประชากรทั้งหมดบนดาวเคราะห์เมืองหลวงจะถูกเปลี่ยนสภาพ แต่การระบาดจะสิ้นสุดลงที่นั่น"
 akx.9221.b:0 "ควบคุมการแพร่ระบาด และกวาดล้างพลเมืองที่ได้รับผลกระทบทั้งหมด"
 akx.9221.b.tooltip:0 "สิ่งนี้จะกวาดล้างประชากรที่ได้รับผลกระทบทั้งหมด - เกือบทั้งหมดของประชากรบนดาว [Root.Capital.GetName]"
 akx.9221.c:2 "สิ่งที่เป็นอยู่จักเกิดขึ้น แพร่กระจายตัวอย่างไวรัสออกไป"
 akx.9221.c.tooltip:0 "สิ่งนี้จะเปลี่ยนสภาพเผ่าพันธุ์ของเราทั้งหมด"

 ##################################
 ##A RENDEZVOUS: Worm-related event

 akx.9300.name:0 "การนัดพบ"
 akx.9300.desc:1 "ยาน [Root.GetName] กำลังได้รับการติดต่อ... โดยยาน \"§Hซีซีจี§!\" แห่งจักรวรรดิ [Root.Owner.GetName] ทั้งที่ความจริงแล้ว ยาน \"ซีซีจี\" ไม่ได้ส่งรหัสประจำตัวใดๆ ที่เรารู้จัก และไม่เคยมีการจัดตั้งยานชื่อนี้ในสารบบของเรามาก่อน ผู้บัญชาการของยานอ้างว่าเป็นกัปตัน §H[mirrored_syzygy_admiral.GetName]§!"
 akx.9300.a.admiralabsent:0 "อืม ผู้บัญชาการชื่อนั้นของเรายังมีชีวิตอยู่ สบายดี และอยู่ที่อื่น"
 akx.9300.a.admiralabsent.tooltip:0 "เปิดช่องการสื่อสาร"
 akx.9300.a.admiralpresent:0 "น่าสนใจยิ่งนัก [mirrored_syzygy_admiral.GetName] อยู่ที่นี่แล้ว"
 akx.9300.b:0 "นี่ต้องเป็นกับดักซุ่มโจมตีแน่ๆ เราจะไม่ยอมเสี่ยง เตรียมพร้อมรบ"

 akx.9310.name:0 "การนัดพบ: กัปตันในอดีต"
 akx.9310.desc:0 "กัปตันที่ปรากฏตัวบนหน้าจอของเราคือ [mirrored_syzygy_admiral.GetName] อย่างชัดเจน ทว่ากลับเป็นเวอร์ชันที่เต็มไปด้วยบาดแผล หลอนประสาท ทรุดโทรม และผุพังของ [mirrored_syzygy_admiral.GetName] ใบหน้าเต็มไปด้วยรอยไหม้จากพลาสมา และดูแก่ชรากว่ามาก สะพานเดินเรือในพื้นหลังก็ดูเสียหายและทรุดโทรมไม่แพ้กัน แต่น้ำเสียงของกัปตันยังคงมั่นคงและชัดเจน\n\n§G\"ในที่สุดพวกเจ้าก็มาถึง ข้าเฝ้ารอมานานเหลือเกิน โทษทัณฑ์ของข้าคือการตายในการรบกับพวกเจ้า โปรดเถอะ ปลิดชีพข้าที ข้าขอโทษ\"§!"
 akx.9310.a:0 "เกิดอะไรขึ้นที่นี่? เจ้าคือ [mirrored_syzygy_admiral.GetName] ตัวจริงงั้นหรือ?"
 akx.9310.a.response:0 "§G\"ข้าคือตัวจริงหรือ? แล้วพวกเจ้าเป็น [Root.GetSpeciesName] คนเดิมกับเมื่อปีที่แล้วหรือเปล่า? ทุกวันคือความตาย ทุกอนาคตคือทางเลือก เวลาคือเขาวงกต ไม่ใช่ถนน\"§!\n\nเสียงหัวเราะเบาๆ ฟังดูเหมือนการหัวเราะจะทำให้เจ็บปวด\n\n§G\"จงถามลูปดูสิ\"§!"
 akx.9310.b:0 "ถ้าอยากให้จบ ทำไมต้องรอ? ยานรบมีวิธีการตายมากมายอยู่แล้ว"
 akx.9310.b.response:1 "§G\"จำไม่ได้งั้นหรือ? แน่นอน เจ้าจะยังจำไม่ได้ในตอนนี้ - และเจ้าอาจจะไม่จำมันอีกเลย หากเจ้าทำมันอย่างถูกต้อง ลูปต้องการเครื่องสังเวย และต้องการตามกฎเกณฑ์ของมัน\"§! เสียงหัวเราะอย่างทรมาน §G\"เจ้าไม่อยากล้อเล่นกับลูปหรอก\"§!"
 akx.9310.c:0 "ลูปคืออะไร?"
 akx.9310.c.response:0 "§G\"ลูปคือสิ่งที่เกิดก่อนและสิ่งที่จะเกิดถัดไป - §!§Hเดอะเวิร์มผู้รอคอย§!§G - และข้าคิดว่า เดอะเวิร์มก็คือลูป สมมติว่าเวลาคือเขาวงกต...\"§! กัปตันเริ่มแสดงท่าทางอย่างไร้ประโยชน์\n§G\"แล้วลูปก็คือปีศาจของมัน หรือผู้สร้าง... ไม่ ผมอธิบายไม่ได้ แล้วคุณจะรู้เร็วๆนี้ คุณเคยทํา ในอดีตของผม\n\n\"อาวุธล็อค?\"§!"
 akx.9310.d.notpacifist:0 "ยอมจำนนเสีย ไม่ว่าเจ้าจะทำอะไรลงไป เราสามารถช่วยเจ้าได้"
 akx.9310.d.notpacifist.response:0 "§G\"สายเกินไปแล้ว\"§! กัปตันกล่าวด้วยความเสียใจ และตัดการส่งสัญญาณ"
 akx.9310.d.fanaticpacifist:1 "การฆ่าฟันไม่ใช่หนทางของเรา ยอมจำนนเถอะ แล้วเราจะช่วยเจ้าเอง"
 akx.9310.d.fanaticpacifist.response:0 "กัปตันลังเลเป็นเวลานาน เห็นได้ชัดว่าสะพานเดินเรือของยาน \"ซีซีจี\" ว่างเปล่า: ไม่มีลูกเรือคนอื่นอยู่เลย\n\n§G\"มันสายเกินไปสำหรับข้าแล้ว\"§! กัปตันกล่าวในที่สุด §G\"แต่เจ้าพูดถูก นี่ไม่ใช่หนทางของเรา ข้าจะทำในสิ่งที่ต้องทำ\"§! พวกเขาตัดการส่งสัญญาณ\n\nเซ็นเซอร์รายงานว่าอาวุธของยานซีซีจีปิดทำงาน ยานกำลังปิดระบบ พลังงานดับลงในเวลาอันรวดเร็ว เมื่อทีมกู้ภัยของเราขึ้นไปบนยาน พวกเขาไม่พบสิ่งมีชีวิตใดๆ และไม่มีร่องรอยของกัปตัน แต่ระบบขับเคลื่อนเพิ่งถูกเข้าถึงเมื่อไม่นานมานี้ และโปรโตคอลความปลอดภัยที่ป้องกันการเข้าถึงแกนพลังงานถูกยกเลิก"
 akx.9310.e:0 "ถ้าอย่างนั้น มาจบเรื่องนี้กันเถอะ"
 akx.9310.e.response:0 "§G\"[mirrored_syzygy_admiral.GetName] ปิดการเชื่อมต่อ\"§!\n\nกัปตันทำความเคารพ - นิ่วหน้าเมื่อการเคลื่อนไหวดึงรั้งแผลเก่า - และปิดการเชื่อมต่อ"
 akx.9310.e.materialistic:1 "ก่อนที่เจ้าจะไป: เจ้าได้เรียนรู้อะไรที่มีประโยชน์บ้างไหม?"
 akx.9310.e.materialistic.response:0 "กัปตันยิ้มกว้างเผยรอยแผลเป็น\n\n§G\"ข้าหวังว่าเจ้าจะถามเรื่องนั้น กำลังส่งข้อมูลให้เดี๋ยวนี้ [mirrored_syzygy_admiral.GetName] ปิดการเชื่อมต่อ\"§!"
 akx.9310.e.spiritual:0 "เราจะระลึกถึงเจ้าในคำสวดอ้อนวอนของเรา"
 akx.9310.e.spiritual.response:0 "§G\"และข้าก็มีคำสวดอ้อนวอนอีกบทหนึ่งสำหรับเจ้า\"§!\n\nกัปตันสวดท่องบทสวดสลับคำ(พาลินโดรม)ยี่สิบเจ็ดคำที่มีท่วงทำนองสะท้อนก้องอย่างน่าประหลาด ซึ่งจะทำให้นักเทววิทยาของเราตื่นตะลึง จากนั้นก็ปิดการเชื่อมต่อ"
 akx.9310.e.militarist:0 "กัปตัน เราจะพบกันในเปลวเพลิงและเกียรติยศ"
 akx.9310.e.militarist.response:0 "กัปตันทำความเคารพ\n\n§G\"ข้าหวังว่าจะมีอนุสาวรีย์บางอย่างสร้างขึ้นให้ข้า\"§!\n\nการเชื่อมต่อถูกตัดขาด"
 akx.9310.e.fanaticcollectivist:0 "ไม่ว่าจะเกิดอะไรขึ้น นี่ไม่ใช่หนทางของเรา ยอมจำนนเถอะ เราจะช่วยเจ้าเอง"
 akx.9310.e.fanaticcollectivist.response:0 "กัปตันลังเลเป็นเวลานาน เห็นได้ชัดว่าสะพานเดินเรือของยาน \"ซีซีจี\" ว่างเปล่า: ไม่มีลูกเรือคนอื่นอยู่เลย\n\n§G\"มันสายเกินไปสำหรับข้าแล้ว\"§! [mirrored_syzygy_admiral.GetName] อีกคนกล่าวในที่สุด §G\"แต่เจ้าพูดถูก นี่ไม่ใช่หนทางของเรา ข้าจะทำในสิ่งที่ต้องทำ\"§! พวกเขาตัดการส่งสัญญาณ\n\nเซ็นเซอร์รายงานว่าอาวุธของยานซีซีจีปิดทำงาน ยานกำลังปิดระบบ พลังงานดับลงในเวลาอันรวดเร็ว เมื่อทีมกู้ภัยของเราขึ้นไปบนยาน พวกเขาไม่พบสิ่งมีชีวิตใดๆ และไม่มีร่องรอยของกัปตัน แต่ห้องขับเคลื่อนถูกเข้าถึงเมื่อไม่นานมานี้ และโปรโตคอลความปลอดภัยป้องกันการเข้าถึงถูกยกเลิก"
 akx.9310.f:0 "คนทรยศ"
 akx.9310.f.tooltip:0 "ปิดช่องสัญญาณ"

 akx.9315.name:0 "การนัดพบ: จุดจบเป็นเช่นไร"
 akx.9315.desc:0 "ยาน \"ซีซีจี\" กำลังเดินเครื่องระบบอาวุธ"
 #spawn the Syzygy
 akx.9315.a:0 "หากเพียงแต่จะมีหนทางอื่น..."
 akx.9315.b:0 "ให้มันเป็นไปตามนั้น"

 akx.9319.name:0 "การนัดพบ: การแทรกแซง"
 akx.9319.desc:1 "ข้อความที่มีสัญญาณรบกวนถูกส่งมาจากกัปตันของยาน \"ซีซีจี\" ในระบบดาว [syzygy_location.GetStarName] ด้านหลังของพวกเขา สะพานเดินเรือถูกปกคลุมไปด้วยกลุ่มควัน §G\"สายเกินไปแล้ว เจ้าปล่อยมันไว้นานเกินไป ลูปจะไม่ยกโทษให้ข้า ได้โปรด -\"§!\n\nข้อความสิ้นสุดลงเพียงเท่านี้"
 akx.9319.a:0 "ใครทำเรื่องนี้?"
 akx.9319.a.tooltip:0 "ยาน \"ซีซีจี\" ถูกทำลายโดยอาณาจักรอื่น หากเจ้าไปถึงระบบดังกล่าวก่อนที่เศษซากจะกระจายหายไป เจ้าอาจจะยังพบอะไรบางอย่าง"

 akx.9320.name:0 "การนัดพบ: กัปตันในอนาคต"
 akx.9320.desc:0 "[mirrored_syzygy_admiral.GetName] นิ่งเงียบไปในวันต่อๆ มา ไม่ใช่เรื่องเล็กๆ เลยที่จะต้องสั่งให้ตัวเองไปตาย แต่เมื่อเวลาผ่านไป ความเงียบนั้นก็กลายเป็นความมุ่งมั่น และความมั่นใจที่แทบจะบ้าระห่ำ"

 akx.9321.name:0 "การนัดพบ: กัปตันในอนาคต"
 akx.9321.desc:0 "[mirrored_syzygy_admiral.GetName] นิ่งเงียบไปในวันต่อๆ มา ไม่ใช่เรื่องเล็กๆ เลยที่จะได้ยินว่าตัวเองตายไปแล้ว แต่เมื่อเวลาผ่านไป ความเงียบนั้นก็กลายเป็นความมุ่งมั่น และความมั่นใจที่แทบจะบ้าระห่ำ"
 akx.9321.a:0 "น่ากังวล"
 akx.9321.b:0 "สิ่งที่เป็นอยู่จักเกิดขึ้น สิ่งที่จักเกิดขึ้นเคยเป็นมาแล้ว"

 akx.9330.name:0 "การนัดพบ: วันและเวลา"
 akx.9330.desc:0 "ในหลายปีต่อมา มีรายงานการพบเห็นผู้บัญชาการ [From.GetName] ทั่วทั้งอวกาศของ [Root.GetAdj] และไกลออกไป แน่นอนว่าเมื่อผู้นำที่มีชื่อเสียงเสียชีวิต เรื่องทำนองนี้มักเกิดขึ้นเสมอ และพวกเขาก็ได้กลายเป็นตำนานไปแล้วตั้งแต่การนัดพบซีซีจี แต่เราไม่อาจแน่ใจได้"
 akx.9330.a:0 "เราอาจไม่มีวันรู้"
 akx.9330.b:0 "โอ้ เรามั่นใจได้เลย"

 akx.9340.name:0 "การนัดพบ: สมบัติแห่งงานศพ"
 akx.9340.desc:0 "การวิเคราะห์ทางนิติวิทยาศาสตร์ของเศษซากที่เรากู้คืนมาได้เปิดเผยความผิดปกติ ชิ้นส่วนทั้งหมดของยานถูกสร้างขึ้นในเวลาเดียวกัน - โดยใช้เทคนิคที่ตรงกับวิธีการสร้างของเราเอง - แต่ส่วนประกอบบางอย่างดูเหมือนจะเก่าแก่กว่าส่วนประกอบอื่นๆ หลายร้อยปี เซลล์พลังงานที่เรากู้คืนมาได้ทำงานได้ดีเกินกว่าที่ควรจะเป็นมาก\n\nยิ่งไปกว่านั้น... นักวิเคราะห์สองคนที่ได้รับมอบหมายโครงการนี้กลับฟื้นตัวอย่างไม่คาดคิดจากปัญหาสุขภาพเรื้อรัง - ในรายหนึ่งเป็นอาการป่วยระยะสุดท้าย ทีมงานยังไม่สามารถหาคำอธิบายสำหรับเรื่องนี้ได้"

 ######################################
 ##THE COILS OF GOD: Worm-related event
 akx.9400.name:0 "ขดลวดแห่งพระผู้เป็นเจ้า"
 akx.9400.desc:0 "สถานีสังเกตการณ์ของเราบนดาว [coils_planet.GetName] รายงานการเติบโตของขบวนการทางศิลปะและศาสนากลุ่มน้อยที่ผิดปกติ นั่นคือ ขดลวดแห่งพระผู้เป็นเจ้า(พระโลหิตของพระเจ้า)นาฬิกากลไกโบราณถือเป็นสิ่งศักดิ์สิทธิ์ แต่จะถูกทำลายตามพิธีกรรมหลังจากทำงานมาได้หนึ่งปี สัตว์เลื้อยคลานที่คล้ายเวิร์มและอสรพิษของดวงดาวจะได้รับการปกป้องไม่ให้ได้รับอันตราย เวลาเหล่านักบวชแห่งขดลวดกล่าวว่า คือเขาวงกต \"สิ่งที่เป็นอยู่จักเกิดขึ้น สิ่งที่จักเกิดขึ้นเคยเป็นมาแล้ว\" พวกเขาสวดท่องในคำอธิษฐาน"
 akx.9400.a:0 "ฟังดูคุ้นเคยดี ปราบปรามมันให้ดีที่สุดเท่าที่เราจะทำได้"
 akx.9400.b:0 "ฟังดูคุ้นเคยดี เฝ้าสังเกตการณ์อย่างใกล้ชิดที่สุดเท่าที่เราจะทำได้"

 akx.9410.name:0 "ขดลวดแห่งพระผู้เป็นเจ้า: การประหัตประหารอย่างแนบเนียน"
 akx.9410.desc:0 "เราได้หว่านล้อมผู้ปกครองท้องถิ่นว่าลัทธิขดลวดแห่งพระผู้เป็นเจ้าบนดาว [coils_planet.GetName] เป็นภัยคุกคาม เหล่านักบวชขดลวดถูกกีดกัน ถูกจำคุก หรือน่าเสียใจที่ถูกเผาทำลาย เผ่าพันธุ์ยุคก่อนความเร็วเข้าถึงบ่อน้ำลึกแห่งความเกลียดชังและความหวาดระแวง: มีบางครั้งที่สิ่งนั้นมีประโยชน์มาก"

 akx.9420.name:0 "ขดลวดแห่งพระผู้เป็นเจ้า: รากเหง้าอันลึกซึ้ง"
 akx.9420.desc:0 "เราได้หว่านล้อมผู้ปกครองท้องถิ่นว่าลัทธิขดลวดแห่งพระผู้เป็นเจ้าบนดาว [coils_planet.GetName] เป็นภัยคุกคาม เหล่านักบวชขดลวดถูกกีดกัน ถูกจำคุก หรือน่าเสียใจที่ถูกเผาทำลาย แต่ลัทธินี้มีความเหนียวแน่น และผู้สังเกตการณ์ของเราแสดงความกังวลว่ามันอาจจะแค่ลงไปดำเนินงานใต้ดิน"

 akx.9450.name:0 "ขดลวดแห่งพระผู้เป็นเจ้า: พิธีเขาวงกต"
 akx.9450.desc:0 "ลัทธิขดลวดแห่งพระผู้เป็นเจ้าบนดาว [coils_planet.GetName] เติบโตขึ้นด้วยความเร็วผิดปกติ สามารถพบเห็นได้ในทุกเมืองบนดาวดวงนี้ และกำลังส่งเสริมการจัดพิธีกรรมที่ยืดเยื้อโดยพลเมืองในทุกย่างก้าวของชีวิต ทั้งเผ่าพันธุ์เข้าร่วมด้วยความกระตือรือร้นอย่างไม่น่าเชื่อ คนรวยนำการร่ายรำวนเป็นวงกลมที่ซับซ้อนมาใช้ในงานเฉลิมฉลอง คนจนวาดรูปสัญลักษณ์ขดลวดที่ซับซ้อนไว้บนประตูบ้าน แม้กระทั่งการเล่นในสนามเด็กเล่นก็เป็นเพลงร้องเกี่ยวกับธรรมชาติที่เป็นวงกลมของเวลา"
 akx.9450.a:0 "นี่มันน่ากังวล เข้าแทรกแซงเพื่อปิดตัวมันลง แต่จงทำอย่างแนบเนียน"
 akx.9450.b:0 "นี่เป็นเรื่องร้ายแรง ใช้กำลังเพื่อปิดตัวมันลง ไม่ว่าจะต้องเผชิญกับความเสี่ยงใดๆ"
 akx.9450.c:0 "น่าทึ่งมาก! ส่งทีมไปศึกษาพิธีกรรม - เข้าร่วมด้วยหากเป็นไปได้"
 akx.9450.d:0 "อนารยชนก็ทำเรื่องอนารยชน เฝ้าสังเกตการณ์ต่อไป"

 akx.9460.name:0 "ขดลวดแห่งพระผู้เป็นเจ้า: สิ้นสุดพิธีกรรม"
 akx.9460.desc:0 "แคมเปญการบ่อนทำลายของเราได้ขัดขวางพิธีกรรมขดลวดแห่งพระผู้เป็นเจ้าบนดาว [coils_planet.GetName] เหล่าขุนนางละทิ้งลัทธิ ภาพวาดกราฟฟิตีขดลวดบนกำแพงจางหายไป เยาวชนกลับไปเล่นเกมในสนามเด็กเล่นเกี่ยวกับการจีบ การฆาตกรรม และกิจกรรมยามว่างของเด็กๆ ที่ดีต่อสุขภาพ มีการฆ่าตัวตายหมู่ท่ามกลางเหล่านักบวชขดลวด หากเคยมีวิกฤต บัดนี้มันอาจจะผ่านพ้นไปแล้ว"
 akx.9460.a:0 "\"ลูปไม่มีวันสิ้นสุด แต่มันไม่ได้เสร็จสมบูรณ์เสมอไป\""
 akx.9460.b:0 "ทำได้ดีมากทุกคน ถอนกำลัง"

 akx.9465.name:0 "ขดลวดแห่งพระผู้เป็นเจ้า: ข่าวคราวจากใต้ดิน"
 akx.9465.desc:0 "แคมเปญการบ่อนทำลายของเราได้ขัดขวางพิธีกรรมขดลวดแห่งพระผู้เป็นเจ้าบนดาว [coils_planet.GetName] - แต่มันกลับยิ่งจุดไฟแห่งความศรัทธาของเหล่านักบวชขดลวด พวกเขาพบกันในที่ลับใต้ดินในวิหารโบราณ บัดนี้เหล่าขุนนางไม่ได้ร่ายรำระบำเขาวงกตอีกต่อไป แต่พวกเขายังคงมีรอยสักลับของสัญลักษณ์แห่งเดอะเวิร์ม และเสียงสวด \"สิ่งที่เป็นอยู่จักเกิดขึ้น\" ยังคงสะท้อนก้องในสนามเด็กเล่น"
 akx.9465.a:0 "\"ลูปไม่มีวันสิ้นสุด\""
 akx.9465.b:0 "เฝ้าสังเกตการณ์ต่อไป"

 akx.9470.name:0 "ขดลวดแห่งพระผู้เป็นเจ้า: โลหิตของเหล่านักบวช"
 akx.9470.desc:0 "เจ้าหน้าที่ของเราไร้ความปรานี พวกเขาลักพาตัวหรือลอบสังหารนักบวชขดลวดทุกคนที่หาได้ พวกเขาติดตั้งระเบิดทำลายล้างบนบ้านเรือนที่มีสัญลักษณ์ของลูป ดาว [coils_planet.GetName] เต็มไปด้วยข่าวลือว่าการลบหลู่ขดลวดได้กระตุ้นความพิโรธของพระผู้เป็นเจ้าที่ยิ่งใหญ่กว่า ในไม่ช้า ชาวเมืองก็รุมทุบตีนกบวชขดลวดจนตายโดยไม่ต้องอาศัยความช่วยเหลือจากเจ้าหน้าที่ของเรา ทีมสังเกตการณ์ตกใจกลัวอย่างมาก แต่หากเคยมีวิกฤต มันก็ได้รับการหลีกเลี่ยงแล้ว"
 akx.9470.a:0 "\"ลูปไม่มีวันสิ้นสุด แต่มันไม่ได้เสร็จสมบูรณ์เสมอไป\""
 akx.9470.b:0 "ทำได้ดีมากทุกคน ถอนกำลัง"

 akx.9480.name:0 "ขดลวดแห่งพระผู้เป็นเจ้า: การนำทางเขาวงกต"
 akx.9480.desc:0 "นักชาติพันธุ์วิทยาของเราหลงใหลในความซับซ้อนของพิธีกรรม พวกเขาตั้งสมมติฐานถึงช่องทางการสื่อสารที่เป็นความลับ การเข้ารหัสคำอธิษฐานแบบปกปิดข้อมูล หรือโครงสร้างอัลกอริทึมที่สนับสนุนพิธีกรรม อันที่จริง พวกเขากำลังส่งข้อมูลเบื้องต้นเกี่ยวกับเรื่องหลังนี้เมื่อการสื่อสารของพวกเขาถูกตัดขาดอย่างกะทันหัน ความจริงแล้ว การสื่อสารทั้งหมดดูเหมือนจะหยุดลงทั่วทั้งดวงดาว รายงานจากดาวเทียมและการบินผ่านของยานสำรวจยืนยัน: ไม่มีกิจกรรมใดๆ บนดาวดวงนี้เลย ไม่มีรถยนต์เคลื่อนที่บนถนน ไม่มีคลื่นความร้อนหรือการปล่อยสัญญาณในศูนย์กลางประชากร ไม่มีสัญญาณของสิ่งมีชีวิต...\n\nและนี่คือรายงานฉบับสุดท้าย ประชากรดาวดวงนี้ทั้งหมด - รวมถึงทีมชาติพันธุ์วิทยาของเรา - ได้หายสาบสูญไปพร้อมกับข้าวของของพวกเขาอย่างกะทันหันแต่ไม่ได้เกิดความรุนแรง อาหารมื้อเย็นถูกทิ้งไว้โดยกินไม่หมด สัตว์เลี้ยงไม่ได้ให้อาหาร บ้านเรือนบางหลังเกิดไฟไหม้เนื่องจากเตาไฟที่ไม่มีคนดูแล มีการบันทึกความผิดปกติของแรงโน้มถ่วง ณ เวลาที่คาดว่าพวกเขาจะเดินทางจากไป ในถนนแทบทุกสาย สัญลักษณ์ชอล์กขดลวดของลัทธิขดลวดทำหน้าที่เป็นพยานร่วมกัน"
 akx.9480.a:0 "\"ลูปไม่มีวันสิ้นสุด\""
 akx.9480.a.tooltip:0 "ยานวิทยาศาสตร์ลำหนึ่งหายสาบสูญไป พร้อมกับอารยธรรมบนดาวเคราะห์ดวงนั้น"
 akx.9480.b:0 "บทเรียนที่ยากลำบาก"

 akx.9490.name:0 "ขดลวดแห่งพระผู้เป็นเจ้า: วิหารอันว่างเปล่า"
 akx.9490.desc:0 "รายงานถูกส่งมาจากทีมสังเกตการณ์ของเราบนดาว [coils_planet.GetName]: พิธีกรรมของขดลวดแห่งพระผู้เป็นเจ้าได้สิ้นสุดลงแล้ว อันที่จริง กิจกรรมทั่วทั้งดาวดวงนี้ดูเหมือนจะอยู่ในระดับต่ำสุดเท่าที่เคยมีมา รายงานระบุว่าทีมงานกำลังจะติดตามผลด้วยการบินในระดับต่ำด้วยยานสำรวจล่องหนเหนือศูนย์กลางประชากรหลัก...\n\nรายงานติดตามผลยืนยัน: ไม่มีกิจกรรมใดๆ บนดาวดวงนี้เลย ไม่มีรถยนต์เคลื่อนที่บนถนน ไม่มีคลื่นความร้อนหรือการปล่อยสัญญาณในศูนย์กลางประชากร ไม่มีสัญญาณของสิ่งมีชีวิต...\n\nและนี่คือรายงานฉบับสุดท้าย ประชากรทั้งหมดของดาวดวงนี้หายสาบสูญไปพร้อมกับข้าวของของพวกเขาอย่างกะทันหันแต่ไม่ได้เกิดความรุนแรง: อาหารทิ้งไว้กินไม่หมด สัตว์เลี้ยงไม่ได้ให้อาหาร เกิดไฟไหม้บ้านประปราย มีการบันทึกความผิดปกติของแรงโน้มถ่วง ณ เวลาที่คาดว่าพวกเขาเดินทางจากไป ในถนนแทบทุกสาย สัญลักษณ์ชอล์กขดลวดของลัทธิขดลวดทำหน้าที่เป็นพยาน"
 akx.9490.a:0 "\"ลูปไม่มีวันสิ้นสุด\""
 akx.9490.a.tooltip:0 "อารยธรรมหนึ่งหายสาบสูญไป"
 akx.9490.b:0 "บทเรียนที่ยากลำบาก"

 #######################################
 ##THE WAITING WORLD: Worm-related event

 akx.9500.name:0 "โลกที่รอคอย"
 akx.9500.desc:1 "ดูเหมือนว่านี่ไม่ใช่การตั้งถิ่นฐานครั้งแรกของ [Root.Owner.GetSpeciesAdj] บนดาวเคราะห์ดวงนี้ สิ่งอำนวยความสะดวกและเขตปกครองจำนวนหนึ่งได้รับการเก็บรักษาไว้เป็นอย่างดี และด้วยการบูรณะเพียงเล็กน้อย มันจะอำนวยประโยชน์ให้แก่อาณานิคมใหม่ของเราได้อย่างดี ทว่าประวัติข้อมูลทั้งหมดกลับถูกลบทิ้งไป มีความเป็นไปได้ว่านี่อาจเคยเป็นท่าเรือของผู้ลักลอบขนของเถื่อน หรือสวรรค์ของผู้ลี้ภัยทางการเมือง"
 akx.9500.a:1 "ยอดเยี่ยมมาก! จัดการบูรณะสิ่งอำนวยความสะดวกเหล่านี้"
 akx.9500.b:1 "นี่มันดีเกินกว่าจะเป็นจริงได้ รื้อถอนเขตเหล่านี้ทิ้งเสีย"
 akx.9500.b.tooltip:0 "สิ่งนี้จะสร้างความไม่พอใจในอาณานิคม"

 akx.9505.name:0 "โลกที่รอคอย: การรื้อถอน"
 akx.9505.desc:1 "วิศวกรของเราติดตั้งระเบิดและถอยไปยังระยะปลอดภัย พื้นที่เหล่านั้นถูกลดทอนลงเหลือเพียงซากปรักหักพัง ในที่สุด ซากปรักหักพังจะแตกตัวและแตกสลายกลายเป็นหินก้อนใหญ่ ก้อนกรวด ฝุ่นผง ภายใต้การกัดเซาะของลม รากไม้ และสายฝน แต่โครงสร้างของพวกมันจะยังคงทนทานไปอีกหลายศตวรรษ และมีเรื่องเล่าเกี่ยวกับเงาบนก้อนหินในตอนกลางวัน แสงสีน้ำเงินในตอนกลางคืน ผู้ตั้งถิ่นฐานของเราจะหลีกเลี่ยงพวกมัน และมันจะไม่ดึงดูดผู้มาเยือนคนใด"
 akx.9505.a:0 "ทุกสิ่งล้วนมีจุดจบ"
 akx.9505.a.tooltip:1 "สิ่งอำนวยความสะดวกเก่าถูกรื้อถอนทิ้ง"
 akx.9505.b:0 "ไม่มีสิ่งใดถูกลืม"
 akx.9505.c:0 "ข้าชอบเสียงตูมตามพวกนั้นจัง"

 akx.9510.name:0 "โลกที่รอคอย: เงาในกำแพง"
 akx.9510.desc:1 "ผู้ตั้งถิ่นฐานของเรามีความสุขดีในช่วงแรกที่ได้ใช้งานเขตต่างๆ บนดาว [waiting_world.GetName] การมีอยู่ของสิ่งเหล่านั้นช่วยกระตุ้นการเริ่มต้นของอาณานิคมได้เป็นอย่างดี แต่บัดนี้พวกเขากลับเริ่มกระวนกระวาย มีข่าวลือว่าสิ่งอำนวยความสะดวกเหล่านั้นอาจจะยังมีผู้อยู่อาศัย หรือมีระบบรักษาความปลอดภัยที่ทำงานอยู่ แม้ว่าจะไม่มีการค้นพบหลักฐานของทั้งสองอย่างก็ตาม ผู้ตั้งถิ่นฐานบางคนยืนกรานอย่างลึกลับว่ามี \"เงาอยู่ในกำแพง\""
 akx.9510.a:1 "จงกีดกันความเชื่อที่งมงายนี้ เขตเหล่านี้เป็นตัวแทนของการทำงานหนักหลายปี"
 akx.9510.b:0 "ทำไมต้องเสี่ยงด้วย? มันก็เป็นแค่ตึก รื้อถอนพวกมันทิ้งเสีย"
 akx.9510.b.tooltip:0 "สิ่งนี้จะสร้างความไม่พอใจในอาณานิคม"

 akx.9520.name:0 "โลกที่รอคอย: มากเกินไป"
 akx.9520.desc:3 "ข่าวแปลกประหลาดจากดาว [waiting_world.GetName] ที่ซึ่งเราพบเขตร้างเหล่านั้น การสำมะโนประชากรชี้ให้เห็นว่ามีผู้ตั้งถิ่นฐานมากเกินไป บันทึกเกี่ยวกับอาณานิคมใหม่มักไม่น่าเชื่อถือเสมอ แต่เท่าที่เราบอกได้ พวกเขามีรหัสประจำตัวพลเมืองที่แท้จริง - และไม่มีใครบนดาวดวงนี้รายงานว่าพบเห็นคนแปลกหน้าอย่างมีเงื่อนงำ อัตราการเติบโตของประชากรต้องสูงผิดปกติ หรือไม่ก็ข้อมูลของเราได้รับผลกระทบจากการอพยพที่ไม่ได้รับอนุญาต ไม่ว่าในกรณีใดก็ตาม จำนวนประชากรเพิ่มขึ้นมากกว่าที่เราคาดคิดไว้อย่างสมเหตุสมผล"
 akx.9520.a:1 "ทำลายเขตเหล่านั้นเสีย เราควรจะทำมันตั้งนานแล้ว"
 akx.9520.b:0 "สืบสวนให้ดีที่สุดเท่าที่เราจะทำได้ จับตาดูสถานการณ์ไว้"

 akx.9525.name:0 "โลกที่รอคอย: และพวกเขายังคงมา"
 akx.9525.desc:2 "รายงานความคืบหน้าอีกฉบับจากดาว [waiting_world.GetName] ที่ซึ่งเราพบสิ่งอำนวยความสะดวกร้างเหล่านั้น จำนวนประชากรยังคงเพิ่มขึ้นอย่างต่อเนื่อง และตอนนี้เราพบสิ่งผิดปกติในบันทึก - กลุ่มคนที่ไม่ควรจะมีอยู่จริง วันที่ที่ฟังดูไม่สมเหตุสมผล ต้องมีการอพยพที่เป็นความลับจากอาณานิคมที่สูญหาย หรือมีการก่อวินาศกรรมข้อมูลบางอย่างโดยผู้ตั้งถิ่นฐาน"
 akx.9525.a:1 "ทำลายเขตเหล่านั้นเสีย เราควรจะทำมันตั้งนานแล้ว"
 akx.9525.b:0 "แปลกประหลาดมาก! แต่เรายินดีต้อนรับพลเมืองเพิ่มเสมอ เฝ้าติดตามและดำเนินต่อไป"

 akx.9530.name:0 "โลกที่รอคอย: จุดทางออก"
 akx.9530.desc:1 "การตัดขาดการสื่อสารอย่างกะทันหันและสิ้นเชิงจากดาว [waiting_world.GetName] ก่อนหน้านี้เรามีคนจำนวนมากเกินไปที่นั่น ทว่าบัดนี้ ดูเหมือนว่าเราจะไม่มีใครเหลืออยู่เลย ประชากรทั้งหมดหายสาบสูญไปในชั่วข้ามคืน พวกเขาจากโลกนี้ไปแล้วหรือ? หลบซ่อนตัว? หรือเข้าร่วมการฆ่าล้างเผ่าพันธุ์ทั่วทั้งดวงดาว?"
 akx.9530.a:0 "ส่งทีมไปสืบสวน"
 akx.9530.b:0 "ละทิ้งและกักกันดาวดวงนี้ทันที"
 akx.9530.b.tooltip:0 "สิ่งนี้จะทำให้ดาวเคราะห์ดวงนี้ไม่สามารถใช้งานได้อีกอย่างถาวร"

 akx.9535.name:0 "โลกที่รอคอย: คุณภาพของแสง"
 akx.9535.desc:0 "ทีมงานของเรารายงานว่าดาว [waiting_world.GetName] ว่างเปล่าจริงๆ - ไม่เพียงแต่ปราศจากผู้ตั้งถิ่นฐานเท่านั้น แต่ยังไม่มีร่องรอยใดๆ ว่าเคยมีอาณานิคมตั้งอยู่ อาคารต่างๆ หายไป ดาวเทียมและโครงสร้างวงโคจรหายไป ชั้นบรรยากาศไม่แสดงร่องรอยของอารยธรรมทางเทคโนโลยีเลย ในคำพูดของทีมงาน มันราวกับว่าดาวเคราะห์ทั้งดวงได้รับการรีเซ็ตใหม่\n\nพวกเขายังรายงานถึงความผันผวนของรังสีคอสมิกในท้องถิ่นซึ่งเป็นลักษณะเฉพาะของดาวฤกษ์ก่อนเกิดซูเปอร์โนวา - และมี \"เหตุการณ์ความสว่างสุกใส\" หลายครั้งบนพื้นผิวที่แสงดูเหมือนจะถูกสะสมและปลดปล่อยออกมาโดยฟังก์ชันปริซึมของชั้นบรรยากาศ นี่เป็นข้อมูลที่มีค่าและแปลกประหลาดมาก แต่มันไม่ได้ทำให้ชะตากรรมของผู้ตั้งถิ่นฐานชัดเจนขึ้นเลย"

 akx.9540.name:0 "โลกที่รอคอย: ทุกคนคือ..."
 akx.9540.desc:0 "ข่าวที่เป็นไปได้ยากอีกเรื่องจากดาว [waiting_world.GetName] ที่ซึ่งจำนวนประชากรเพิ่มขึ้นอย่างลึกลับ บัดนี้จำนวนประชากรกลับมาอยู่ในระดับที่เราคาดการณ์ไว้แล้ว แต่มีการก่อวินาศกรรมข้อมูลบางอย่างเกิดขึ้น หรือ... หรืออะไรกันแน่ ฝ่ายบริหารของเราก็ไม่แน่ใจนัก ไม่มีบุคคลใดบนดาวดวงนี้ที่มีชื่ออยู่ในบันทึกของเรา ผู้ตั้งถิ่นฐานดั้งเดิมทุกคนหายสาบสูญไป ราวกับว่าพวกเขาถูกแทนที่ด้วยคนแปลกหน้าทั้งหมด\n\nอย่างไรก็ดี พวกเขาทุกคนสาบานว่าเป็นพลเมืองที่จงรักภักดีของ [Root.Owner.GetName] พวกเขาสามารถทำงานได้และดูเหมือนจะมีสติสัมปชัญญะดี ในการสื่อสารทั้งหมดพวกเขาปฏิเสธที่จะยอมรับเรื่องความสับสนใดๆ และยืนกรานว่ามีความผิดพลาดที่ฝั่งเราเอง"
 akx.9540.a:0 "ละทิ้งอาณานิคมทันที ก่อนที่เรื่องนี้จะแพร่กระจายไปไกลกว่านี้"
 akx.9540.a.tooltip:0 "สิ่งนี้จะมอบเอกราชให้แก่อาณานิคม"
 akx.9540.b:0 "กวาดล้างพวกมัน และกักกันดาวเคราะห์ดวงนี้อย่างถาวร"
 akx.9540.b.tooltip:0 "สิ่งนี้จะทำให้ดาวเคราะห์ดวงนี้ไม่สามารถใช้งานได้อีกอย่างถาวร แต่คุณจะได้รับอิทธิพลเป็นการตอบแทน"
 akx.9540.c:0 "ส่งทีมไปสืบสวน"

 akx.9541.name:0 "โลกที่รอคอย: การกวาดล้าง"
 akx.9541.desc:0 "นี่อาจเป็นอาชญากรรมที่เลวร้าย หรืออาจช่วยปกป้องประเทศของเราจากสิ่งที่เลวร้ายยิ่งกว่า ศูนย์กลางประชากรของดาว [waiting_world.GetName] เดือดพล่านภายใต้พลังงานจากอาวุธของเรา เมื่อเราทำเสร็จสิ้น ทุกอาคารก็กลายเป็นซากปรักหักพังที่เรืองแสง ไม่มีสิ่งมีชีวิตที่มีสติปัญญาหลงเหลืออยู่เลย"
 akx.9541.a:0 "ลบบันทึกข้อมูลทิ้งไป ในอีกร้อยปีจะไม่มีใครรู้ว่าเราทำอะไรลงไป"
 akx.9541.b:0 "บอกให้ทุกคนรู้ ปล่อยให้พวกเขาเกลียดชัง ตราบใดที่พวกเขายังเกรงกลัวเรา"

 akx.9545.name:0 "โลกที่รอคอย: ทุกสิ่งและไม่มีอะไรเลย"
 akx.9545.desc:2 "ทีมงานของเรารายงานว่าประชากรของดาวมีสุขภาพแข็งแรงดีและสับสนกับเรื่องวุ่นวายทั้งหมด มีความแปลกประหลาดบางประการ เช่น ความบังเอิญที่ผิดปกติจำนวนมาก นิสัยแปลกๆ ทั่วทั้งดาวที่ไม่มีใครสนใจเรื่องความตรงต่อเวลา และความผันผวนของรังสีคอสมิกที่เป็นลักษณะเฉพาะของดาวฤกษ์ก่อนเกิดซูเปอร์โนวา พวกเขายังเฝ้าสังเกตพบ \"เหตุการณ์ความสว่างสุกใส\" หลายครั้งบนพื้นผิวที่แสงดูเหมือนจะถูกสะสมและปลดปล่อยออกมาโดยฟังก์ชันปริซึมของชั้นบรรยากาศ ข้อมูลนี้มีค่าพอๆ กับความแปลกประหลาดของมัน แต่มันอาจเป็นเรื่องบังเอิญก็ได้ หากมีอะไรเกิดขึ้นกับผู้ตั้งถิ่นฐาน มันก็ยังคงเป็นปริศนาต่อไป"
 akx.9545.a:0 "\"สิ่งที่จักเกิดขึ้นเคยเป็นมาแล้ว\""
 akx.9545.b:0 "ผู้ตั้งถิ่นฐาน: ผู้ตั้งถิ่นฐานมักจะแปลกประหลาดเสมอ"

 ####################################
 ### THE RETAINER: Worm-related event
 # This will appear if the player approaches a technosphere
 # with worm_events_available, in place of the normal technosphere options.

 akx.9600.name:0 "เดอะรีเทนเนอร์"
 akx.9600.desc:0 "สวัสดี สวัสดี เรายินดีต้อนรับพวกเจ้ายับยั้งกลับสู่ [Root.GetStarName] โอ้ พวกเจ้าแตกต่างไปจากเดิมใช่ไหม? พวกเจ้าช่างมีจำนวนมากมายเหลือเกิน คล้ายกับบรีฟ(บัฟ)ของเรามาก แต่ก็แตกต่างกันมากเช่นกัน เราขอความช่วยเหลือจากพวกเจ้าด้วยความกรุณา: เจ้ามีทรัพยากรสำหรับโครงการของเราหรือไม่? ลูปจะช่วยเรา แต่มันยากที่จะเข้าถึง มีราคาแพงอย่างที่เจ้าเห็นนั่นแหละ"
 akx.9600.a:0 "บรีฟของเจ้า?"
 akx.9600.a.response:0 "ใช่ คนที่ทำให้เราขับเคลื่อน พวกเจ้าคงจะเรียกว่า \"อารยธรรม\" ละมั้ง แต่เพื่อความจริงใจ เราพบว่าคำนั้นดูโอ้อวดไปหน่อย พวกเขาจากไปเกือบเศษหนึ่งส่วนสี่ของปีกาแล็กซีแล้วตอนนี้ เราเสียใจอย่างยิ่ง: เราทำผิดพลาด เราสามารถสร้างพวกเขาขึ้นมาใหม่ได้โดยประมาณ ด้วยความช่วยเหลือของลูป แต่เราต้องการทรัพยากร"
 akx.9600.b:0 "ลูป?"
 akx.9600.b.response:0 "ใช่ สเตรนจ์ลูป(เสียงดัง)ขดเวลา อารมณ์หิวโหย มันเคยพูดถึงพวกเจ้า ข้าเชื่อเช่นนั้น หรือคนใดคนหนึ่งในพวกเจ้า พวกเจ้าช่างมีจำนวนมากมาย สิ่งที่เป็นอยู่จักเกิดขึ้น หรืออย่างน้อยมันก็รับประกันกับเราเช่นนั้น มันสามารถฟื้นฟูบรีฟของเราได้ ไม่มากก็น้อย"
 akx.9600.c:0 "ตกลง"
 akx.9600.d:0 "ไม่"
 akx.9600.d.response:0 "โอ้ เราเข้าใจ เราเข้าใจ พวกเจ้าเหลือเวลาไม่มากแล้ว ใช้มันให้ดีเถอะ ลาก่อนด้วยความจริงใจต่อพวกเจ้า"
 akx.9600.e:0 "ไว้ทีหลังแล้วกัน"
 akx.9600.e.response:0 "นั่นคือสิ่งที่บรีฟของข้าพูดเสมอ ไว้ทีหลัง แต่คำว่าไว้ทีหลังของพวกเขามักจะเป็นคำว่าตอนนี้ของเราเสมอ เราคิดถึงพวกเขาเหลือเกิน"

 akx.9610.name:0 "เดอะรีเทนเนอร์ อีกครั้ง"
 akx.9610.desc:0 "ว่าอย่างไร? พวกเจ้าเป็นใครกัน? ข้าคิดว่าเราอาจจะจำพวกเจ้าได้ แต่ช่วงนี้มีแสงกะพริบถี่เหลือเกิน โอ้ ใช่พวกเจ้าไหม? ดวงอาทิตย์ของพวกเจ้ายังไม่ดับไปอีกงั้นหรือ? โอ้! พวกเจ้านำสิ่งที่เราต้องการมามอบให้เพื่อพาบรีฟกลับมาใช่ไหม?"
 akx.9610.a:0 "ใช่ นี่ไงล่ะ"
 akx.9610.b:0 "ไม่"
 akx.9610.b.response:0 "แน่นอนว่าไม่ พวกเจ้าย่อมไม่สามารถรวบรวมทั้งหมดนั้นได้เร็วขนาดนี้ พวกเจ้าเพิ่งออกมาข้างนอกนี่ได้เท่าไหร่กัน หนึ่งในล้านของปีกาแล็กซีงั้นหรือ? ช่างน่าเอ็นดูเหลือเกิน ขอให้พวกเจ้าโชคดี"
 akx.9610.c:0 "ไว้ทีหลังแล้วกัน"
 akx.9610.c.response:0 "บรีฟของข้าเคยพูดแบบนั้น \"ไว้ทีหลัง\" แต่คำว่าไว้ทีหลังของพวกเขามักจะเป็นคำว่าตอนนี้ของเราเสมอ เราคิดถึงพวกเขาเหลือเกิน"

 akx.9620.name:0 "หน้าที่สุดท้ายของเดอะรีเทนเนอร์"
 akx.9620.desc:0 "เทคโนสเฟียร์ดูดซับทรัพยากรเหล่านั้นโดยไม่มีการขอบคุณ และไม่มีการสื่อสารใดๆ เลย มันเริ่มแผ่พลังงานออกมา สว่างไสวมากจนเป็นอันตราย และพวกเจ้าก็ถอนกำลังออกไป หลุมดำตอบสนอง อวกาศรอบตัวมันบิดเบี้ยวและม้วนงอ ในรูปแบบที่คลังข้อมูลของเราสามารถจับคู่กับเหตุการณ์ของสัญญาณขอบฟ้าได้ บัดนี้เทคโนสเฟียร์กลายเป็นสีน้ำเงินแกมขาว ทันใดนั้นมันก็ลุกเป็นไฟแล้วเย็นลง และหลงเหลือเพียงเศษโลหิตตะกรันเท่านั้น\n\nผู้สร้างบรีฟของมันได้รับการฟื้นฟูแล้วหรือ? ไม่มีร่องรอยของสิ่งมีชีวิตที่มีสติปัญญาในระบบดาวดวงนี้เลย แต่เซ็นเซอร์ระบุตำแหน่งของสิ่งมีชีวิตทนสภาวะสุดขั้วสูงเป็นพิเศษ(hyperextremophile)ที่ผิดปกติในวงโคจรต่ำรอบหลุมดำ กำลังอาบแสงรังสีของมัน เจ้าหน้าที่วิทยาศาสตร์มั่นใจว่าพวกมันไม่เคยอยู่ที่นั่นมาก่อน อย่างไรก็ตาม ไม่มีหลักฐานว่าพวกมันมีสติปัญญา บางทีพวกมันอาจเป็นลูกหลานห่างๆ ของผู้สร้างเทคโนสเฟียร์ หรือบางทีพวกมันอาจเป็นบรรพบุรุษของผู้สร้างก็เป็นได้"
 akx.9620.a:0 "ชีวิตนิรันดร์?"

 ######################################################
 ### THE END IN THE BEGINNING: conclusion of Worm chain
 ##hook to on_building_complete - when the Omega Alignment has been completed

 akx.10000.name:0 "จุดจบในจุดเริ่มต้น"
 akx.10000.desc:0 "มีจิตสำนึกอยู่นอกกาลเวลาและใต้อวกาศ มันเป็นปมพันพัวที่ซับซ้อนของความปรารถนาและความสิ้นหวัง บรรพบุรุษที่ห่างไกลของเราเรียกขานมันว่า ลูป หรือ เดอะเวิร์มผู้รอคอย เราพบมันที่นั่น ที่ซึ่งความว่างเปล่าถูกทรมานด้วยแรงโน้มถ่วง ดูเหมือนมันจะให้ความสนใจส่วนตัวกับเรา มีข้อพิสูจน์ทางคณิตศาสตร์ว่ามันรักเรา แต่ความรักสำหรับเดอะเวิร์มนั้นไม่เหมือนกับความรักสำหรับสิ่งใดๆ ที่ดำรงอยู่ในอวกาศปกติทั่วไป\n\nด้วยสิ่งที่เราได้เรียนรู้ทั้งหมด เราคิดว่าเราอาจจะสามารถใช้การปรับประสานโอเมก้าเพื่อเปิดเส้นทางการเข้าถึง - จุดผ่านเข้า - เพื่อให้เดอะเวิร์มปรากฏตัวขึ้นในระบบดาวบ้านเกิดของเรา (เดอะเวิร์มชื่นชอบจุดเริ่มต้น และนี่คือจุดเริ่มต้นของเรา) เรื่องนั้นจะส่งผลอย่างไรตามมา? เรายังไม่พบใครที่พร้อมจะยืนยันคำตอบอย่างเด็ดขาด ความเป็นอมตะ หรือวันสิ้นโลก แต่แน่นอนว่าเราจะได้เรียนรู้อะไรอีกมากมาย"
 akx.10000.a:0 "บางทีเดอะเวิร์มอาจจะรักเรา และบางทีเราอาจจะรักเดอะเวิร์มตอบ"
 akx.10000.b:0 "นี่ไม่ใช่การทดลองที่ปลอดภัย แต่เราสามารถเรียนรู้อะไรได้อีกมาก"

 ##(when WORM_ENTRY_POINT project is completed)
 akx.10010.name:0 "ใจกลางของดวงตะวัน"
 akx.10010.desc:0 "โครงการเสร็จสิ้นแล้ว เครื่องเร่งอนุภาคออนไลน์แล้ว เครือข่ายพลังงานของเมืองใหญ่สิบกว่าแห่งถูกเบี่ยงเบนเพื่อปลุกภาวะเอกฐานเทียมที่ใจกลางของการปรับประสาน อวกาศสั่นสะท้านราวกับผืนผ้าที่ปะทะกับพายุลม ดาว [Root.GetStarName] หรี่แสงลงชั่วขณะที่ทำให้หัวใจแทบหยุดเต้น แล้วกลับสว่างจ้าขึ้นมา มีเงาขดตัวอยู่ในใจกลางของมัน เดอะเวิร์มอยู่ที่นี่แล้ว มันคลี่ตัวออกมาราวกับโอริกามิ\n\nทั่วทั้งระบบดาว เซ็นเซอร์ปิดการทำงานด้วยความไม่เชื่อในข้อมูลที่จับได้ขณะที่ข้อมูลที่เหนือความเข้าใจของการมาถึงของมันสาดซัดผ่านพวกมันไป บนโลกบ้านเกิด พลเมืองของเรากรีดร้องและหมอบลงด้วยความกลัวเมื่อพวกเขารู้สึกได้ถึงความสนใจที่พุ่งตรงมายังพวกเขาและพวกเรา มันตั้งคำถามที่ไม่มีคำพูด - หรือพูดอีกอย่างคือ เราตระหนักได้ว่าคำถามนี้คือสิ่งที่มันถามเราอยู่เสมอ ทุกครั้งที่เราพบมัน"
 akx.10010.a:0 "ใช่ ไม่ว่ามันจะต้องการอะไร เรายินยอม"
 akx.10010.b:0 "ไม่ เรานํามันมาที่นี่เพื่อเรียนรู้ และถ้าจําเป็น จงเอาชนะมัน"

 akx.10020.name:0 "อนาคต"
 akx.10020.desc:1 "เดอะเวิร์มรักเรา มันจะรักเราตลอดไป และมันเคยรักเราตลอดมา มันโอบล้อมรอบใจกลางอันร้อนระอุของดาวฤกษ์บ้านเกิดของเรา มันโอบล้อมรอบทุกห่วงข้อมูลที่เล็กจิ๋ว มันกระตุ้นภัยพิบัติที่สั่นสะเทือนในเปลือกโลกของดวงดาวบ้านเกิดของเรา แต่เมื่อดาวฤกษ์ของเราเย็นตัวลง ภัยพิบัตินั้นจะสร้างความอบอุ่นให้เรา เราเข้าใจอะไรอีกมากมาย เราจะเป็นในสิ่งที่เรากำลังจะเป็นตลอดไป โอบรัดแน่นอยู่ในความรักของเดอะเวิร์ม"
 akx.10020.a:0 "สิ่งที่เป็นอยู่จักเกิดขึ้น สิ่งที่จักเกิดขึ้นเคยเป็นมาแล้ว"

 akx.10021.name:0 "ลูปที่แตกสลาย"
 akx.10021.desc:0 "เดอะเวิร์มผ่านเข้ามาทางขอบเขตของมิติเวลาเหมือนนักล่าผู้หิวโหย หรือคนรักที่โกรธเกรี้ยวและถูกทอดทิ้ง มันยังคงอยู่ข้างนอกนั่น และไม่ว่ามันจะอยู่ที่ไหนก็ตาม ไม่ต้องสงสัยเลยว่ามันกำลังโกรธแค้น ทว่าเจ้ามีเศษซากอวตารที่ส่องสว่างของมันเก็บไว้เพื่อครอบครองและศึกษาเป็นถ้วยรางวัลแห่งจักรวรรดิ อาณาจักรอื่นๆ จะรับรู้ถึงสิ่งทีเจ้าบรรลุในวันนี้"
 akx.10021.a:0 "ไม่มีใครเทียบเท่าเราได้! และบางทีอาจไม่มีวันมีใครเทียบได้อีก"
