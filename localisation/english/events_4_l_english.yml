 anomaly_failure.6000.desc:1 "ไม่มีอะไรน่าสนใจจะรายงาน"
 anomaly_failure.6000.a:1 "เฮ้อ ช่างมันเถอะ"

 ####################################
 # Colony Events
 ####################################
 colony_mod.1.name:0 "เกิดอะไรขึ้นที่นี่?"
 colony_mod.1.desc:0 "แม้ว่ามันจะชัดเจนว่ามีภัยพิบัติบางอย่างในอดีตปล่อยรังสีจำนวนมหาศาลบน [Root.GetName] แต่สิ่งที่ไม่ชัดเจนคืออะไรที่ทำให้เกิดมัน ความลึกลับนี้เริ่มรบกวนจิตใจผู้อพยพที่เลือก [Root.GetName] เป็นบ้านของพวกเขามากขึ้นเรื่อยๆ เพราะสุดท้ายแล้ว ถ้าเราไม่รู้ว่ามันเกิดขึ้นได้อย่างไร ใครจะกล้ารับประกันว่ามันจะไม่เกิดขึ้นอีก?"
 colony_mod.1.desc_mach:0 "แม้จะชัดเจนว่าภัยพิบัติบางอย่างในอดีตได้ปล่อยรังสีปริมาณมหาศาลออกมาบน [Root.GetName] แต่เรายังต้องระบุสาเหตุของมัน หรือตรวจสอบว่ามีโอกาสที่จะเกิดขึ้นอีกครั้งหรือไม่"
 colony_mod.1.a:0 "มาสืบหาสาเหตุของเรื่องนี้กันเถอะ!"
 colony_mod.2.name:0 "สิ่งมีชีวิตยักษ์ใหญ่"
 colony_mod.2.desc:0 "สิ่งมีชีวิตพื้นถิ่นของ [Root.GetName] ถูกสร้างขึ้นมาด้วยขนาดที่อลังการ ใหญ่เกินกว่าที่ใครๆ เคยคิดว่าจะเป็นไปได้สำหรับสิ่งมีชีวิตทางชีววิทยา คำถามในใจของนักวิจัยของเราตอนนี้คือ "ความลับของพวกมันคืออะไร และเราจะได้รับประโยชน์จากมันหรือไม่" ข้อเสนอเพื่อศึกษาสิ่งมีชีวิตพื้นเมืองอย่างละเอียดมากขึ้นกำลังหลั่งไหลเข้ามา"
 colony_mod.2.a:0 "ดำเนินการศึกษาต่อไป"
 colony_mod.2.b:0 "ไม่ ปล่อยให้ยักษ์ใหญ่เหล่านั้นอยู่ตามลำพัง"
 colony_mod.2.c:0 "ตรวจสอบให้แน่ใจว่าการวิจัยจะไม่ก่อให้เกิดอันตรายใดๆ"
 colony_mod.2.d:0 "ศึกษาพวกมันงั้นหรือ? เก็บเกี่ยวพวกมันมาดูเลยว่ามีอะไรมีประโยชน์บ้าง!"
 colony_mod.3.name:0 "แผ่นดินไหว!"
 colony_mod.3.desc:0 "แผ่นเปลือกโลกที่ไม่เสถียรของ [Root.GetName] เพิ่งเกิดการเลื่อนตัวอย่างรุนแรงอีกครั้ง รายงานความเสียหายของอาณานิคมเพิ่งเริ่มส่งเข้ามา"
 colony_mod.3.a:0 "มาฟังรายงานกัน"
 colony_mod.4.name:0 "พบดาวหางพาดผ่านแถบดาวเคราะห์น้อย"
 colony_mod.4.desc:1 "ประชากรของ [Root.GetName] กำลังได้เห็นภาพที่งดงามตระการตา ดาวหางดวงหนึ่งกำลังโคจรผ่านแถบดาวเคราะห์น้อยของ [Root.GetName] และทุกคนต่างชื่นชมว่ามัน "งดงามตระการตา""
 colony_mod.4.a:0 "เฝ้ามองท้องฟ้าต่อไป!"
 colony_mod.5.name:0 "มาตรการปราบปราม"
 colony_mod.5.desc:1 "แม้ว่าจะปฏิเสธไม่ได้ว่าผลข้างเคียงที่ทำให้เคลิบเคลิ้มของชั้นบรรยากาศบน [Root.GetName] จะให้ความเพลิดเพลิน และช่วยผ่อนคลายในบางสถานการณ์ แต่ก็มีความกดดันจากกลุ่มหัวอนุรักษนิยมของ [Root.Owner.GetName] ให้กวาดล้างแก๊สที่อาจทำให้เสพติดได้เหล่านี้"
 colony_mod.5.a:1 "ปิดกั้นมันเสีย!"
 colony_mod.5.b:0 "ไม่ ปล่อยให้ [Root.GetName] เป็นอย่างที่เป็นอยู่"
 colony_mod.6.name:0 "การทิ้งระเบิดโจมตี"
 colony_mod.6.desc:1 "หลังจากการสืบสวนอย่างถี่ถ้วน เราได้ข้อสรุปว่า [Root.GetName] เคยเป็นสถานที่เกิดการฆ่าล้างเผ่าพันธุ์ในโบราณกาล เท่าที่เราสามารถระบุได้ ประชากรพื้นเมืองของ[Root.GetName] กำลังจะก้าวขึ้นสู่การเป็นเผ่าพันธุ์ที่เดินทางในอวกาศ ทันใดนั้น เผ่าพันธุ์ที่ก้าวหน้ากว่ามากได้เข้าสู่ระบบดาวดวงนี้ และทำการระเบิดถล่ม [Root.GetName] จากวงโคจร ก่อนจะจากไป ทิ้งให้ผู้รอดชีวิตเพียงไม่กี่คนต้องเผชิญกับความสูญสิ้นเผ่าพันธุ์อย่างหลีกเลี่ยงไม่ได้"
 colony_mod.6.a:0 "ศึกษาจุดตกกระทบเพื่อหารายละเอียดของอาวุธที่ใช้"
 colony_mod.7.name:0 "สงครามระหว่างดวงดาว"
 colony_mod.7.desc:1 "หลังจากการสืบสวนอย่างถี่ถ้วน เราได้ข้อสรุปว่า [Root.GetName] เป็นเหยื่อในสงครามที่ถูกลืมเลือนไปแล้ว ไม่ทราบว่าใครเคยอาศัยอยู่ที่นี่หรือต่อสู้กับใคร แต่ชัดเจนว่าพวกเขาถูกกวาดล้างหลังจากกองกำลังบุกรุกจากนอกระบบดวงดาวเข้ามา และเกิดการสู้รบเพื่อแย่งชิงดาวเคราะห์ดวงนี้ แม้ว่านี่จะเป็นการตระหนักรู้ที่ชวนขนหัวลุก แต่อย่างน้อยเราก็มั่นใจได้ในระดับหนึ่งว่าเหตุการณ์เช่นนี้ไม่น่าจะเกิดขึ้นอีก"
 colony_mod.7.a:0 "ศึกษาสิ่งที่หลงเหลืออยู่ในสมรภูมิ"
 colony_mod.8.name:0 "การทำลายล้างเผ่าพันธุ์ตัวเอง"
 colony_mod.8.desc:0 "ประวัติศาสตร์อันน่าสลดใจของ [Root.GetName] ถูกเปิดเผยออกมาแล้ว ดูเหมือนว่าในอดีตอันยาวนาน [Root.GetName] เคยถูกปกครองโดยสองมหาอำนาจที่เป็นคู่แข่งกัน เมื่อถึงจุดหนึ่งสงครามได้ปะทุขึ้นระหว่างพวกเขา และความขัดแย้งก็ลุกลามจนสิ่งมีชีวิตที่มีภูมิปัญญาทั้งหมดบน [Root.GetName] ถูกกำจัดไปจนสิ้นจากการใช้อาวุธนิวเคลียร์อย่างบ้าคลั่ง"
 colony_mod.8.desc_mach:0 "ในอดีตอันยาวนาน ดูเหมือนว่า [Root.GetName] เคยถูกควบคุมโดยสองมหาอำนาจที่เป็นคู่แข่งกัน เมื่อถึงจุดหนึ่งสงครามได้ปะทุขึ้นระหว่างพวกเขา และความขัดแย้งก็ลุกลามจนสิ่งมีชีวิตที่มีภูมิปัญญาทั้งหมดบน [Root.GetName] ถูกกำจัดไปจนสิ้นจากการใช้อาวุธนิวเคลียร์อย่างล้นหลาม"
 colony_mod.8.a:0 "อะไรที่สามารถผลักดันให้ผู้คนต้องเผชิญกับชะตากรรมเช่นนั้นได้กัน?"
 colony_mod.9.name:0 "เราเพียงแต่ไม่รู้"
 colony_mod.9.desc:0 "แม้จะมีการวิจัยประวัติศาสตร์ของ [Root.GetName] อย่างกว้างขวาง แต่เราก็ยังไม่รู้ว่าเกิดอะไรขึ้นที่นี่ อดีตยังคงเป็นความลึกลับ"
 colony_mod.9.a:0 "หนักใจ"
 colony_mod.10.name:1 "มาตรการปราบปราม"
 colony_mod.10.desc:1 "ชั้นบรรยากาศของ [Root.GetName] ได้รับการชำระล้างส่วนประกอบที่ทำให้มึนเมาออกไปหมดแล้ว!"
 colony_mod.11.name:1 "การปราบปราม: ความสำเร็จครั้งใหญ่"
 colony_mod.11.desc:1 "ชั้นบรรยากาศของ [Root.GetName] ได้รับการกรองเพื่อลดผลกระทบจากสารหลอนประสาทลงอย่างมาก"
 hallucinogen_update_tooltip:0 "อา อากาศบริสุทธิ์!"
 colony_mod.12.name:1 "อุกกาบาตพุ่งชน"
 colony_mod.12.desc:1 "อีกครั้งหนึ่งที่ [Root.GetName] ถูกถล่มด้วยอุกกาบาตที่ร่วงหล่นลงมา และครั้งนี้ส่วนหนึ่งของอาณานิคมของเราได้รับความเสียหาย ไม่ต้องบอกก็รู้ว่าประชากรในท้องถิ่นไม่มีความสุขเลย"
 colony_mod.12.desc_gestalt:0 "อีกครั้งหนึ่งที่ [Root.GetName] ถูกถล่มด้วยอุกกาบาตที่ร่วงหล่นลงมา และครั้งนี้ทำลายส่วนหนึ่งของอาณานิคมของเรา ระบบติดตามการปะทะอัตโนมัติของเรายังคงแสดงให้เห็นถึงความเสี่ยงที่เพิ่มขึ้นอย่างต่อเนื่องของการปะทะในลักษณะเดียวกันในอนาคต"
 colony_mod.12.a:2 "เรามีลำดับความสำคัญอื่นที่ต้องทำก่อน"
 colony_mod.12.b:0 "ต้องทำอะไรสักอย่างแล้ว!"
 colony_mod.13.name:1 "ระบบป้องกันอุกกาบาต"
 colony_mod.13.desc:1 "การผสมผสานระหว่างเทคนิคการก่อสร้างที่ทนทานเป็นพิเศษและการป้องกันอัตโนมัติน่าจะช่วยให้อาณานิคมบน [Root.GetName] ปลอดภัยจากการชนของอุกกาบาตเพิ่มเติม"
 irradiated_planet_tooltip:0 "การสืบสวนเริ่มต้นขึ้น..."
 colony_mod.14.name:1 "รางวัลจากห้วงอวกาศ"
 colony_mod.14.desc:1 "แม้ว่าการที่อุกกาบาตตกลงบนดาวเคราะห์ของคุณจะชวนตื่นตระหนก แต่ [Root.GetName] ก็นับว่าโชคดีมาก ไม่มีอันตรายใดๆ เกิดขึ้นกับอาณานิคม"
 colony_mod.14.a:0 "ผู้คนของเราจะอดทนต่อสภาพแวดล้อมที่เลวร้ายนี้"
 colony_mod.14.b:0 "เราต้องหาวิธีหยุดเรื่องนี้ให้ได้"
 colony_mod.16.name:1 "ปาฏิหาริย์แม่เหล็ก"
 colony_mod.16.desc:1 "สนามแม่เหล็กแรงสูงรอบๆ [Root.GetName] ส่งผลกระทบต่อคอมพิวเตอร์บนพื้นผิวเมื่อเร็วๆ นี้ น่าแปลกที่เอฟเฟกต์นี้ไม่ใช่แค่การรบกวนแบบสุ่ม แต่คอมพิวเตอร์กลับทำงานได้อย่างมีประสิทธิภาพมากกว่าที่ควรจะเป็นเสียอีก ราวกับว่ามีพลังจากภายนอกคอยช่วยเหลืออยู่..."
 colony_mod.17.name:1 "การรบกวนจากแม่เหล็ก"
 colony_mod.17.desc:2 "สนามแม่เหล็กแรงสูงรอบๆ [Root.GetName] มักจะก่อให้เกิดปัญหากับอุปกรณ์อิเล็กทรอนิกส์บนพื้นผิวเสมอ แต่เมื่อเร็วๆ นี้ ผลกระทบต่อคอมพิวเตอร์ของเราเป็นที่สังเกตได้อย่างเด่นชัดเป็นพิเศษ จนถึงขณะนี้ยังไม่ทราบว่าอะไรเป็นสาเหตุของการปะทุนี้ แม้ว่าเราจะสงสัยว่ามันจะเป็นเพียงชั่วคราวก็ตาม"
 colony_mod.21.name:0 "แผ่นดินไหว: รายงานความเสียหาย"
 colony_mod.21.desc:0 "แผ่นดินไหวเมื่อเร็วๆ นี้ซึ่งสั่นสะเทือนอาณานิคมของเราบน [Root.GetName] ได้ทำให้เกิดหลุมยุบขนาดใหญ่ขึ้น สิ่งใดก็ตามที่เคยอยู่ตรงจุดนั้นบัดนี้ได้จมลงไปอยู่ลึกใต้พื้นดินแล้ว"
 colony_mod.22.desc:0 "แผ่นดินไหวเมื่อเร็วๆ นี้ซึ่งสั่นสะเทือนอาณานิคมของเราบน [Root.GetName] ไม่ได้ก่อให้เกิดความเสียหายใดๆ และโดยความโชคดี มันได้เผยให้เห็นแหล่งแร่ธาตุที่มีประโยชน์ชุดหนึ่ง"
 colony_mod.23.desc:0 "แผ่นดินไหวเมื่อเร็วๆ นี้ซึ่งสั่นสะเทือนอาณานิคมของเราบน [Root.GetName] ไม่ได้ก่อให้เกิดความเสียหายใดๆ เลย!"
 quake_report_tooltip:0 "รายงานจะถูกส่งในไม่ช้า"
 quake_sinkhole_tooltip:0 "£blocker£ §Rหลุมยุบ§! ปรากฏขึ้น"
 titanic_troop_limit_tooltip:0 "ความก้าวหน้าทางการวิจัยทำให้เราสามารถฝึกฝนสิ่งมีชีวิตยักษ์ใหญ่ให้เป็นหน่วยทหารได้ แต่เนื่องจากความยากในการจัดหาตัวเลือกที่เหมาะสม เราจึงสามารถส่งกองทัพเหล่านี้ลงสนามได้ในจำนวนจำกัดในแต่ละครั้ง"
 titantic_blocker_tooltip:0 "เราจะต้องหลีกเลี่ยงพื้นที่เหล่านั้นหากเราเหยียบย่างลงไปที่นั่น"
 good_impact_tooltip:0 "โชคดีที่ดาวเคราะห์น้อยไม่ได้สร้างความเสียหายใดๆ และได้นำเอาแร่ธาตุที่มีประโยชน์มาทับถมบนพื้นผิว"
 colony_mod.100.name:0 "พิภพแห่งไททัน"
 colony_mod.100.desc:0 "[From.GetName] เป็นบ้านของสิ่งมีชีวิตยักษ์ใหญ่ ซึ่งบางส่วนมีจำนวนมากและดุร้ายเสียจนทำให้บางพื้นที่ของดาวเคราะห์ดวงนี้ไม่เหมาะสมต่อการอยู่อาศัยของเผ่าพันธุ์ใดๆ"
 colony_mod.101.name:0 "การศึกษาสิ่งมีชีวิตยักษ์ใหญ่: สำเร็จ"
 colony_mod.101.desc:0 "หลังจากช่วงเวลาของการวิจัยและศึกษา นักวิทยาศาสตร์บน [Root.GetName] สามารถบรรลุผลสำเร็จครั้งสำคัญในการติดต่อสื่อสารอย่างจำกัดกับเหล่าไททันบางส่วนได้ แม้จะตัวใหญ่ เชื่องช้า และพูดยาก แต่ไททันเหล่านี้กลับมีความทนทานและแข็งแกร่งอย่างน่าเหลือเชื่อ บางตัวได้แสดงความจำนงที่จะเข้าร่วมกองกำลังทหารของเรา ซึ่งพวกมันจะกลายเป็นกำลังสำคัญอย่างไม่มีข้อกังขา"
 titanic_recruit_tooltip:0 "ขณะนี้สามารถเกณฑ์สัตว์อสูรยักษ์ใหญ่ได้ที่นี่แล้ว"
 titanic_recruit_phile_tooltip:0 "สามารถเกณฑ์สัตว์อสูรยักษ์ใหญ่ได้ที่นี่ และแม้แต่พื้นที่ที่มีสิ่งมีชีวิตยักษ์ใหญ่จำนวนมากก็ปลอดภัยสำหรับผู้อพยพแล้วในขณะนี้"
 colony_mod.102.name:0 "การศึกษาสิ่งมีชีวิตยักษ์ใหญ่: ล้มเหลว"
 colony_mod.102.desc:0 "ในเหตุการณ์ที่เลวร้ายอย่างยิ่ง นักวิทยาศาสตร์บน [Root.GetName] ได้ทำให้สิ่งมีชีวิตยักษ์ใหญ่พื้นถิ่นโกรธเกรี้ยว สิ่งมีชีวิตขนาดมหึมากำลังอาละวาดไปทั่วอาณานิคม ทำลายล้างทุกสิ่งทุกอย่างที่ขวางหน้าพวกมัน"
 titanic_uprising_tooltip:0 "สัตว์อสูรยักษ์ใหญ่กำลังเข่นฆ่าทุกคน!"
 colony_mod.18.name:0 "เปิดเผยความลับแม่เหล็ก"
 colony_mod.18.desc:0 "[Root.GetName] เป็นที่ตั้งของคอมพิวเตอร์ควอนตัมที่จัดระเบียบตัวเองซึ่งมีความซับซ้อนและละเอียดอ่อนอย่างน่าทึ่ง รูปแบบของสภาพอากาศ สิ่งมีชีวิตพื้นถิ่น หรือแม้แต่อาณานิคมของเราเอง ต่างถูกผนวกรวมเข้าด้วยกันและทำหน้าที่เสมือนเซลล์ประสาทในเครือข่ายขนาดเท่าดาวเคราะห์ดวงนี้ เราไม่เข้าใจว่าสิ่งนี้เป็นไปได้อย่างไร และไม่มีวิธีใดที่จะควบคุมมันได้ แต่เราทราบดีว่าหากเราจัดวางคอมพิวเตอร์ของเราในรูปแบบเฉพาะ [Root.GetName] จะช่วยเพิ่มขีดความสามารถในการทำงานของพวกมันได้"
 colony_mod.18.a:0 "[Root.GetName] เพิ่งจะทวีความน่าสนใจขึ้นไปอีก!"
 colony.3001.name:0 "ดวงจันทร์ปริศนาแห่ง [Root.GetName]"
 colony.3001.desc:0 "บัดนี้เมื่อมีผู้คนเข้ามาตั้งถิ่นฐานบน [Root.GetName] ได้สักระยะหนึ่งแล้ว ก็เริ่มสังเกตพบความผิดปกติของข้อมูลบางประการ โดยเฉพาะอย่างยิ่ง ดวงจันทร์ [event_target:roguemoon.Planet.GetName] ดูเหมือนไม่ได้ประกอบขึ้นจากวัสดุที่ใกล้เคียงกับ [Root.GetName] เลยแม้แต่น้อย สิ่งนี้บ่งชี้ว่ามันไม่ได้ก่อตัวขึ้นในเวลาเดียวกัน แต่เดิมทีอาจจะก่อตัวขึ้นที่อื่นและถูกแรงโน้มถ่วงของ [Root.GetName] ดึงดูดเข้ามาในภายหลัง ซึ่งการที่ดวงจันทร์ [event_target:roguemoon.Planet.GetName] มาจากที่ใดนั้นยังคงเป็นความลึกลับในขณะนี้"
 colony.3002.name:0 "ฐานทัพบนดวงจันทร์พเนจร"
 colony.3002.desc:1 "ความลึกลับของ [event_target:roguemoon.Planet.GetName] ได้รับการเปิดเผยแล้ว! การสำรวจอย่างละเอียดเผยให้เห็นว่าดวงจันทร์ดวงนี้มีความเบี้ยวเล็กน้อย โดยฝั่งด้านไกลของดวงจันทร์มีสัดส่วนมวลรวมที่มากผิดปกติ เราเชื่อว่าสาเหตุที่เป็นเช่นนี้ก็เพราะ [event_target:roguemoon.Planet.GetName] เคยโคจรรอบดาวเคราะห์ดวงอื่นที่ถูกทำลายลงจากการระเบิดครั้งใหญ่\n\nความหนาพิเศษที่ฝั่งด้านไกลของ [event_target:roguemoon.Planet.GetName] เป็นเพราะด้านนั้นเคยหันเข้าหาดาวเคราะห์ดวงเดิม มวลส่วนเกินคือเศษซากดาวเคราะห์ดวงนั้นที่ปลิวมาปะทะกับ [event_target:roguemoon.Planet.GetName] ส่งผลให้มันหลุดออกจากวงโคจรเดิม และสุดท้ายก็ถูกดึงดูดเข้ามาในวงโคจรของ [Root.GetName]\n\nเราคาดการณ์ว่าดาวเคราะห์ดวงนั้นอาจถูกทำลายโดยอาวุธ หรืออาจเป็นเพียงความพยายามในการสร้างแหล่งพลังงานจากสสารมืด เนื่องจากตรวจพบสสารมืดเข้มข้นสูงในมวลสารดาวเคราะห์ที่เคลือบอยู่ตรงฝั่งด้านไกลของดวงจันทร์ดวงนี้"
 colony.3003.name:0 "นักเดินทางข้ามมิติ"
 colony.3003.desc:0 "การไขปริศนาหนึ่งได้นำไปสู่การเผชิญหน้ากับอีกปริศนาหนึ่ง ตอนนี้เราทราบแล้วว่า [event_target:roguemoon.Planet.GetName] ถูกดึงดูดหรือถูกส่งมาในวงโคจรของ [Root.GetName] จากมิติอื่น ทว่าเราไม่มีเบาะแสเลยว่าทำไม เพราะนอกจากระดับรังสีพื้นหลังที่แตกต่างไปเล็กน้อยแล้ว [event_target:roguemoon.Planet.GetName] ก็ดูไม่มีอะไรพิเศษเลย สิ่งที่สร้างความงุนงงยิ่งกว่าคือกลไกเครื่องจักรที่พบตรงใจกลางของ [event_target:roguemoon.Planet.GetName] ซึ่งคาดว่าเป็นตัวช่วยให้เกิดการข้ามมิติ ทำงานอย่างไร ณ ตอนนี้ มันจึงดูไม่ต่างอะไรไปจากเวทมนตร์เลย"
 colony.3005.name:0 "ประตูมิติ"
 colony.3005.desc:0 "สิ่งที่นิยามได้เพียงว่าเปรียบเสมือนประตูมิติถูกค้นพบในพื้นที่ห่างไกลบน [Root.GetName] อัลกอริทึมพยากรณ์อากาศสังเกตเห็นกระแสอากาศที่แปลกประหลาด ซึ่งในที่สุดก็พบว่ามีสาเหตุมาจากการรั่วไหลของชั้นบรรยากาศเข้าไปในประตูมิติดังกล่าว อัตราการสูญเสียนั้นน้อยเกินกว่าจะส่งผลกระทบต่อสิ่งมีชีวิตบน [Root.GetName] แต่การมีอยู่ของประตูนี้ได้ตั้งคำถามที่ชวนกังวลใจ เช่น มันจะนำไปสู่ที่ใด และจะมีบางสิ่งข้ามผ่านประตูมิตินี้มาจากอีกฝั่งหนึ่งได้หรือไม่?"
 portal_zone_tooltip:0 "สามารถศึกษาประตูมิตินี้ได้อย่างต่อเนื่อง"
 colony.3006.name:0 "มิติแห่งความทุกข์ทน"
 colony.3006.spir.desc:1 "ประตูมิติบน [Root.GetName] ดูเหมือนจะนำไปสู่ดินแดนแห่งความชั่วร้ายและความกระวนกระวายใจ การสัมผัสใดๆ กับวัตถุจากมิตินี้สร้างความทุกข์ทรมานอย่างแสนสาหัสแก่ผู้ทดสอบ ซึ่งหากสัมผัสนานเกินกว่าสองสามนาทีจะนำไปสู่ความต้องการฆ่าตัวตายอย่างรุนแรงร่วมกับความพยายามทำลายประสาทสัมผัสของตนเอง แม้แต่การศึกษาข้อมูลที่บันทึกจากมิติอันแปลกประหลาดนี้ก็ทำให้เกิดความผิดพลาดต่อเนื่องในระบบคอมพิวเตอร์ หรือสร้างความอึดอัดใจอย่างรุนแรงแก่สิ่งมีชีวิตทรงภูมิปัญญาอันเนื่องมาจากการตระหนักรู้ที่น่าสะพรึงกลัวว่าจิตวิญญาณของตนกำลังถูกครอบงำและเสื่อมทรามลง"
 colony.3006.desc:1 "ประตูมิติบน [Root.GetName] ดูเหมือนจะนำไปสู่ดินแดนที่ขัดแย้งกับจิตสำนึกของสิ่งมีชีวิตทรงภูมิปัญญาในระดับพื้นฐาน การสัมผัสใดๆ กับวัตถุจากมิตินี้สร้างความทุกข์ทรมานอย่างแสนสาหัสแก่ผู้ทดสอบ ซึ่งหากสัมผัสนานเกินกว่าสองสามนาทีจะนำไปสู่ความต้องการฆ่าตัวตายอย่างรุนแรงร่วมกับความพยายามทำลายประสาทสัมผัสของตนเอง แม้แต่การศึกษาข้อมูลที่บันทึกจากมิติอันแปลกประหลาดนี้ก็สร้างความอึดอัดใจอย่างรุนแรงแก่ผู้สังเกตการณ์ทางชีววิทยา และทำให้เกิดความผิดพลาดต่อเนื่องในระบบคอมพิวเตอร์"
 colony.3006.knight.desc:0 "ประตูมิติบน [Root.GetName] ดูเหมือนจะนำไปสู่ดินแดนแห่งความชั่วร้ายและความกระวนกระวายใจ การสัมผัสโดยตรงกับวัตถุจากมิตินี้สร้างความทุกข์ทรมานอย่างแสนสาหัสแก่ผู้ทดสอบ ซึ่งหากสัมผัสนานเกินกว่าสองสามนาทีจะนำไปสู่ความต้องการความรุนแรงอย่างบ้าคลั่ง แม้แต่การศึกษาข้อมูลที่บันทึกจากมิติอันแปลกประหลาดนี้ก็ทำให้เกิดความผิดพลาดต่อเนื่องในระบบคอมพิวเตอร์ หรือสร้างความอึดอัดใจอย่างรุนแรงแก่สิ่งมีชีวิตทรงภูมิปัญญา อย่างไรก็ตาม เราพบว่าหนึ่งในวัตถุโบราณของภาคีสามารถปกป้องผู้สวมใส่ได้อย่างมีประสิทธิภาพ และจะช่วยให้เราส่งอัศวินเพียงหนึ่งคนข้ามผ่านไปได้"
 colony.3006.science:0 "ค้นหาวิธีปิดประตูมิตินี้!"
 colony.3006.prayer:0 "สวดภาวนาเพื่อหาทางออก"
 colony.3006.psi.prayer:0 "บางทีพลังจิตอาจจะเป็นคำตอบ?"
 colony.3006.rocks:0 "ลองถมประตูมิตินี้ด้วยหินดูสิ!"
 colony.3006.knights:0 "ส่งอัศวินที่ดีที่สุดของเราเข้าไป!"
 colony.3006.keep:0 "ศึกษาประตูมิตินี้ต่อไป"
 colony.3010.name:0 "ประตูมิติถูกปิดลง"
 colony.3010.desc:0 "ได้รับการยืนยันแล้วว่าประตูมิตินี้สามารถรองรับพลังงานที่ป้อนเข้ามาได้อย่างไร้ขีดจำกัด แต่คำสำคัญคือ "เกือบจะ" ด้วยการผลิตพลังงานในระดับที่ไม่เคยมีมาก่อนและยิงถล่มใส่ประตูมิติอย่างต่อเนื่อง ในที่สุดก็ทำให้มันรับพลังงานเกินขนาดและพังทลายลงในที่สุด ไม่ต้องบอกก็รู้ว่าการผลิตพลังงานปริมาณมหาศาลเช่นนี้สามารถนำไปใช้ประโยชน์ในด้านอื่นๆ ได้เช่นกัน"
 colony.3011.desc:0 "ประตูมิติดูเหมือนจะตอบสนองต่อความคิดของผู้สังเกตการณ์ที่อยู่ใกล้เคียงไม่ทางใดก็ทางหนึ่ง โดยบางคนมีอิทธิพลมากกว่าคนอื่น จากกระบวนการคัดกรองทำให้เราสามารถค้นหากลุ่มคนที่มีความสามารถพิเศษในการส่งผลกระทบต่อประตูมิตินี้ และพวกเขาก็ร่วมมือกันน้อมนำจิตอธิษฐานจนสามารถปิดประตูมิติได้สำเร็จ ประสบการณ์นี้ช่วยเปิดโลกทัศน์และมอบหลักฐานชิ้นสำคัญว่าเราสามารถดึงพลังจากความเชื่อมาชี้นำในทิศทางที่จับต้องได้จริง"
 colony.3011.psi.desc: "ประตูมิติพิสูจน์แล้วว่ามีความอ่อนไหวต่อพลังจิต ด้วยทีมงานของบุคคลผู้มีพรสวรรค์ที่รวมตัวกัน เราได้สร้างม่านพลังจิตรอบประตูมิติเพื่อป้องกันการเข้าถึงใดๆ ประสบการณ์นี้ช่วยเปิดโลกทัศน์และมอบหลักฐานชิ้นสำคัญว่าสามารถสร้างม่านพลังที่จับต้องได้จากพลังงานจิต"
 colony.3011.psi_robot.desc: "ประตูมิติได้รับการพิสูจน์แล้วว่าไวต่อสิ่งเร้าทางพลังจิต ด้วยการใช้งานหน่วยพลังจิตของเรา ม่านพลังได้รับการสร้างขึ้นรอบประตูมิติเพื่อป้องกันการเข้าถึงที่ไม่ได้รับอนุญาต ข้อมูลจากเหตุการณ์นี้จะเป็นประโยชน์ต่อการวิจัยในอนาคตของเรา"
 colony.3012.desc:0 "บางครั้งคำตอบง่ายๆ ก็เป็นคำตอบที่ดีที่สุด หลังจากระเบิดภูเขาหลายลูกให้เป็นกรวดแล้วเทลงไปในประตูมิติ ดูเหมือนว่ามันจะรับน้ำหนักเกินขีดจำกัด หรือบางทีมันอาจถูกจงใจปิดตัวลง ไม่ว่าจะอย่างไร เศษซากวัตถุที่เหลือถูกเททับถมไว้ที่จุดนั้นในกรณีที่มันจะเปิดขึ้นมาอีกครั้ง ประสบการณ์จากโครงการวิศวกรรมและการทำเหมืองขนาดใหญ่เช่นนี้จะเป็นประโยชน์ในด้านอื่นๆ เช่นกัน"
 portal_closed_tooltip:0 "พื้นที่ประตูมิติวายังคงสามารถศึกษาได้ แต่จะให้ข้อมูลที่เป็นประโยชน์น้อยลง"
 colony.3007.name:0 "มิติพลังงานสูง"
 colony.3007.desc:1 "ประตูมิติบน [Root.GetName] นำไปสู่มิติของพลังงานบริสุทธิ์ ซึ่งพลังงานจำนวนเล็กน้อยสามารถดึงผ่านประตูมิติมาใช้ประโยชน์เองได้ ขั้นตอนที่ใช้ในการจัดการพลังงานแบบ "แพ็กเก็ต" นี้ยังมีศักยภาพในการนำไปพัฒนาเป็นระบบอาวุธด้วย"
 portal_energy_tooltip:0 "$job_dimensional_portal_researcher_plural$จะผลิต £energy£ พลังงาน"
 portal_void_tooltip:0 "$job_dimensional_portal_researcher_plural$จะผลิต £sr_dark_matter£ สสารมืด"
 colony.3008.name:0 "ความว่างเปล่าสุญญะ"
 colony.3008.desc:0 "ประตูมิติบน [Root.GetName] นำไปสู่มิติของเอนโทรปีบริสุทธิ์ เป็นเรื่องยากแม้แต่จะรับสัญญาณเซนเซอร์เนื่องจากพลังงานของคลื่นสแกนของเราสลายตัวไปอย่างรวดเร็ว สมมติฐานที่ดีที่สุดของเราคือ "ความว่างเปล่าสุญญะ" นี้เป็นมิติที่พลังงานจุดศูนย์ส่วนใหญ่เป็นลบ ดังนั้นพลังงานบวกใดๆ ที่เคยมีอยู่จึงถูกใช้ไปจนหมดสิ้นนานแล้ว เมื่อทราบเช่นนี้ มันอาจเป็นไปได้ที่จะสร้างอาวุธที่สามารถใช้พลังงานสลายทำลายล้างของความว่างเปล่าสุญญะนี้ในเชิงรุก"
 colony.3009.name:0 "กระจกเงาสะท้อน"
 colony.3009.desc:0 "น่าแปลกที่ประตูมิติบน [Root.GetName] ดูเหมือนจะเชื่อมต่อกับดาวเคราะห์ที่มีลักษณะเหมือนกับ [Root.GetName] เป็นอย่างมาก และที่แปลกยิ่งกว่านั้นคือมีสัญญาณถูกแพร่ภาพส่งมาหาเราผ่านประตูมิตินั้น..."
 colony.3009.a:0 "เอาขึ้นจอภาพเลย!"
 colony.3020.name:0 "การสื่อสารกับเอเลี่ยนประตูมิติ"
 colony.3020.desc:0 "นี่คือ [Root.Owner.Leader.GetName] แห่ง [Root.Owner.GetName] พวกท่านเป็นใคร เอเลี่ยนประตูมิติ?"
 colony.3020.a:0 "ไม่ใช่ *ข้า* ต่างหากที่เป็น [Root.Owner.Leader.GetName]! พวกท่านคือใครกันแน่?!"
 colony.3021.desc:0 "น่าทึ่งมาก หากสิ่งที่คุณพูดเป็นความจริง ฉันคิดว่าประตูมิตินี้เชื่อมระหว่างมิติคู่ขนาน เราต่างก็เป็น [Root.Owner.Leader.GetName] แต่เมื่อถึงจุดหนึ่ง เหตุการณ์บางอย่างต้องทำให้มิติของพวกเราแยกออกจากกัน"
 colony.3021.a:1 "ยอดเยี่ยมมาก เล่าให้ฟังหน่อยสิว่าเผ่าพันธุ์ [Root.Owner.Species.GetNamePlural] ของพวกท่านเป็นอย่างไรบ้าง!"
 colony.3021.b:0 "เราควรทำการค้าผ่านประตูมิติของเรานะ"
 mirror_trade_reply:0 "ฉันกำลังจะเสนอเรื่องนั้นอยู่พอดี เพื่อประโยชน์ของชาว [Root.Owner.Species.GetNamePlural] ทั้งปวง!"
 colony.3022.desc:0 "ฉันคาดว่าคงไม่ต่างจากที่เป็นอยู่ในมิติของคุณเท่าใดนัก พวกเราได้แพร่กระจายไปทั่วอวกาศจาก [Root.Owner.Capital.GetName] นับตั้งแต่ค้นพบวาร์ปไดรฟ์(วอปไดรฟ์) -"
 colony.3022.a:0 "วาร์ปไดรฟ์งั้นหรือ? พวกเราเดินทางผ่านเส้นทางไฮเปอร์เลน(ไฮเพอร์แลนส์)นะ!"
 colony.3023.desc:0 "ไฮเปอร์เลนงั้นหรือ? บางทีการค้นพบประเภทการเดินทางความเร็วที่แตกต่างกันอาจเป็นจุดแยกแยะระหว่างสองจักรวาลของเรา? นี่หมายความว่าพวกคุณไม่ได้ถูกรบกวนโดยอสูรวาร์ป(สัตว์สงคราม)ใช่ไหม?"
 colony.3023.a:0 "ไม่มีอสูรวาร์ปที่นี่เลย พวกมันเป็นภัยคุกคามที่ร้ายแรงอย่างนั้นหรือ?"
 colony.3024.desc:0 "อสูรวาร์ปเข้าโจมตีทุกอารยธรรมที่รู้จัก พวกมันเป็นภัยต่อชีวิตทั้งปวง เท่าที่เราสรุปได้ เมื่อการเดินทางผ่านวาร์ปถึงระดับวิกฤตจุดหนึ่งในกาแล็กซี อสูรวาร์ปก็ตื่นขึ้นและเข้าโจมตี เผ่าพันธุ์หลายกลุ่มที่พวกเรารู้จักได้ล่มสลายไปแล้ว แต่จนถึงขณะนี้เรายังพอต้านทานพวกมันไว้ได้"
 colony.3024.a:0 "ฟังดูเลวร้ายมาก มีอะไรที่เราพอจะช่วยได้ไหม?"
 mirror_trade_reply2:0 "ใช่แล้ว เราควรจัดทำสนธิสัญญาการค้าระหว่างมิติเพื่อเสริมสร้างความแข็งแกร่งให้กับทั้งสองประเทศของเรา เพื่อผลประโยชน์ของชาว [Root.Owner.Species.GetNamePlural] ทั้งปวง!"
 colony.3031.name:2 "การค้าระหว่างมิติเพิ่มขึ้น"
 colony.3031.desc:1 "[Root.Owner.GetName] จากมิติสะท้อนรายงานว่าเศรษฐกิจของพวกเขากำลังเฟื่องฟู ปัจจัยเกื้อหนุนที่กล่าวถึงคือการค้าผ่านประตูมิติของเรา รวมถึงชัยชนะต่ออสูรวาร์ปเมื่อเร็วๆ นี้"
 colony.3032.name:2 "การค้าระหว่างมิติวิกฤต"
 colony.3032.desc:1 "[Root.Owner.GetName] จากมิติสะท้อนรายงานว่าเศรษฐกิจของพวกเขากำลังถดถอยเนื่องจากการพ่ายแพ้ติดต่อกันให้แก่กรงเล็บของอสูรวาร์ป"
 colony.3032.a:0 "หวังว่าพวกเขาจะฟื้นตัวได้!"
 colony.3033.name:1 "การแพร่ภาพสัญญาณฉุกเฉินผ่านประตูมิติ"
 colony.3033.desc:1 "[Root.Owner.Capital.GetName] ถูกกลืนกินไปแล้ว [Root.Owner.GetName] ล่มสลายลง เท่าที่เราทราบ [Root.GetName] เป็นอาณานิคมสุดท้ายที่เหลืออยู่ อสูรวาร์ปอยู่ทุกหนทุกแห่ง! พวกมันมาถึงที่นี่แล้ว!\n\n**§Yสัญญาณขาดหายไปอย่างกะทันหัน§!**"
 colony.3033.a:0 "ฮัลโหล?"
 colony.3033.b:0 "มีใครอยู่ไหม?"
 colony.3033.c:0 "ได้ยินแล้วตอบด้วย!"
 colony.3033.d:0 "พวกเขาจากไปแล้ว..."
 colony.3033.reply:0 "**§Yมีเพียงเสียงซ่าของสัญญาณรบกวนเท่านั้น§!**"
 dportal_trade_normal:1 "การค้าระหว่างมิติ"
 dportal_trade_normal_desc:0 "การค้าขายกับตัวเราในมิติสะท้อนจะส่งผลดีต่อทั้งสองอาณาจักรของเรา"
 dportal_trade_normal_tooltip:0 "$mod_planet_physicists_amenities_produces_add$: §G+600§!"
 dportal_trade_low:1 "การค้าระหว่างมิติลดลง"
 dportal_trade_low_desc:0 "เหตุการณ์ล่าสุดในจักรวาลกระจกเงาได้ลดปริมาณการค้าผ่านประตูมิติลง"
 dportal_trade_low_tooltip:0 "$mod_planet_physicists_amenities_produces_add$: §G+300§!"
 dportal_trade_high:1 "การค้าระหว่างมิติเฟื่องฟู"
 dportal_trade_high_desc:0 "ตัวเราในมิติสะท้อนกำลังเจริญรุ่งเรืองและการค้าผ่านประตูมิติกำลังเฟื่องฟูอย่างมาก!"
 dportal_trade_high_tooltip:0 "$mod_planet_physicists_amenities_produces_add$: §G+1200§!"
 dportal_trade_crisis:1 "วิกฤตการณ์ระหว่างมิติ"
 dportal_trade_crisis_desc:0 "ตัวเราในมิติสะท้อนกำลังประสบวิกฤต จากการถูกอสูรวาร์ปคุกคามทำให้การค้าของพวกเขาตกต่ำที่สุดอย่างไม่เคยเป็นมาก่อน และมีผู้อพยพหลั่งไหลผ่านประตูมิติเข้ามาทุกวัน แต่ละระลอกดูสิ้นหวังมากขึ้นเรื่อยๆ"
 dportal_trade_crisis_tooltip: "$mod_planet_physicists_amenities_produces_add$: §G+200§!"

 colony.3050.name:0 "อัศวินดำ"
 colony.3050.desc:0 "อัศวิน [doomslayer_knight.GetName] ที่เราส่งผ่านประตูมิติบน [root.GetName] ไปเมื่อหลายปีก่อนได้กลับมาแล้ว ด้วยความบิดเบี้ยวและมืดมน [doomslayer_knight.GetHeShe] นำพาฝูงอสุรกายจากมิติอื่นข้ามประตูมาและเข้าจู่โจมอาณานิคมของเราทันที ผู้รอดชีวิตรายงานว่าได้ยิน [doomslayer_knight.GetHimHer] หัวเราะลั่นอย่างปีศาจร้าย โดยประกาศว่า [doomslayer_knight.GetHeShe] จะพิชิตมิตินี้ในไม่ช้า"
 colony.3050.a:0 "แจ้งเตือนภัย!"
 demonic_armies_tooltip:0 "กองทัพอสูร §Rกองทัพโมนิก§! หลายกองจะเข้าโจมตีอาณานิคม!"
 colony.3051.name:1 "การบุกรุกของอสูรร้าย"
 colony.3051.desc:0 "อสุรกายที่อัศวิน [doomslayer_knight.GetName] นำพาข้ามประตูมิติมาได้ทำลายการป้องกันของเราและยึดครอง [fromfrom.GetName] สำเร็จแล้ว!\n\nเนื่องจากถูกสิงสู่โดยสิ่งมีชีวิตมิติหลักที่ทรงพลัง และในขณะนี้ได้ตั้งสมญานามตนเองว่า §Y[doomslayer_knight.GetTitle] [doomslayer_knight.GetName]§! ตัว [doomslayer_knight.GetHeShe] ได้ระดมกองกำลังปีศาจของ [doomslayer_knight.GetHimHer] เพื่อเริ่มต้นการพิชิตกาแล็กซีของเรา!\n\nประตูมิติเพิ่มเติมเปิดขึ้นชั่วครู่ทั่วทั้งระบบดาว ทว่าความตึงเครียดต่อความจริงแท้นั้นหนักหน่วงเกินไป ในไม่ช้าจุดสิงกูลาริตีทั้งหมดก็พังทลายลง ตัดขาดกองทัพปีศาจจากมิติบ้านเกิดของพวกมัน แต่ทว่า [doomslayer_knight.GetFirstName] ไม่ได้ย่นย่อและกำลังรวบรวมขุมกำลังของ [doomslayer_knight.GetHisHer] ก่อนจะดำเนินแผนการพิชิตกาแล็กซีต่อไป"
 colony.3051.a:0 "พวกเราจะต้องกำจัดผู้รุกรานเหล่านี้ให้สิ้นซาก!"
 colony.3051.b:0 "เพื่อเกียรติยศแห่ง [doomslayer_knight.GetName]!"
 demonic_incursion_tooltip:0 "ประตูมิติบน [fromfrom.GetName] จะปิดลง\nระบบดาว [fromfrom.solar_system.GetName] ถูก §Rยึดครอง§! โดย [demonic_incursion_country.GetName]"
 demonic_takeover_tooltip:0 "$demonic_incursion_tooltip$\n\nเล่นเป็น §R[demonic_incursion_country.GetName]§!"
 colony.3055.name:0 "ผู้อพยพข้ามมิติ"
 colony.3055.desc:0 "ประตูมิติบน [Root.GetName] ที่เราเคยส่งอัศวิน [doomslayer_knight.GetName] เข้าไปเมื่อหลายปีก่อน กำลังแสดงสัญญาณกิจกรรมที่รุนแรง เนื่องจากมีพลเรือนในสภาพสะบักสะบอมพยายามข้ามมายังมิติของเรา พวกเขารายงานว่าอัศวิน [doomslayer_knight.GetFirstName] ได้ออกอาละวาดในมิติของพวกเขามานานร่วมทศวรรษแล้ว โดยสังหารทุกคนที่ขวางทาง [doomslayer_knight.GetHisHer] อย่างไร้ความปราณี [doomslayer_knight.GetHeSheCap] เข่นฆ่าผู้คนในมิตินั้นไปมากมายเสียจนเกิดความพินาศแก่สังคมของพวกเขา ผู้รอดชีวิตต่างพยายามหลบหนีไปทุกทิศทุกทางเท่าที่จะทำได้ ความทรมานทางจิตวิญญาณที่เกิดจากมิตินั้นอาจจะทำให้อัศวิน [doomslayer_knight.GetName] เสียสติไปแล้วอย่างนั้นหรือ?"
 colony.3055.a:0 "กำจัดผู้รุกรานเหล่านั้นซะ!"
 colony.3055.b:0 "พวกเขายินดีที่จะพำนักอยู่ที่นี่"
 demon_refugees_tooltip:0 "ประชากร §Y4 $NAME_Demon_Refugees$พ่อ§! จะถูกสร้างขึ้นบน [Root.GetName]"
 colony.3060.name:0 "กลับมาจากขุมนรก"
 colony.3060.desc:0 "อัศวิน [doomslayer_knight.GetName] ที่เราเคยส่งผ่านประตูมิติบน [root.GetName] ไปเมื่อหลายปีก่อนได้กลับมาแล้ว [doomslayer_knight.GetHeSheCap] สามารถฟันฝ่าความท้าทายมากมาย กำจัดอสูรร้ายนับไม่ถ้วน และรอดพ้นจากความตายมาได้อย่างหวุดหวิด แต่ท้ายที่สุดแล้ว ไม่มีสิ่งใดต้านทานวิถีของ [doomslayer_knight.GetHimHer] ได้ [doomslayer_knight.GetHeSheCap] นำพาของรางวัลแห่งชัยชนะกลับมามากมายและได้กลายเป็นตำนานในหมู่ทหารฝึกหัด ผู้ซึ่งเริ่มขนานนาม [doomslayer_knight.GetHimHer] ว่า \"ดูมสเลเยอร์\"(ดอมพ์เซอร์)"
 colony.3060.a:0 "[doomslayer_knight.GetFirstName] ช่างกล้าหาญ ดุดัน และสง่างามอย่างแท้จริง!"
 doomslayer_quest_complete:0 "ของรางวัลแห่งชัยชนะของดูมสเลเยอร์"
 doomslayer_quest_complete_desc:0 "รางวัลและเรื่องเล่าจากการเดินทางของอัศวินผ่านมิติอันเปรียบเสมือนขุมนรก แหล่งบันดาลใจชั้นยอดสำหรับอัศวินและทหารฝึกหัดหลายคนที่ใฝ่ฝันจะปฏิบัติภารกิจเช่นนี้ในสักวัน"
