l_english:

 ####################################
 # Anomaly Categories
 ####################################
 rogue_moon_category:0 "ดวงจันทร์พเนจร"
 rogue_moon_category_desc:1 "ผลการสแกนเบื้องต้นของ [Root.GetName] แสดงให้เห็นถึงความแตกต่างจากดาวเคราะห์แม่ของมันอย่างไม่คาดคิด"
 hollow_planet_category:0 "ดาวเคราะห์กลวง"
 hollow_planet_category_desc:1 "ผลการสแกนขั้นต้นเผยให้เห็นว่า [Root.GetName] ดูเหมือนจะเป็นเพียงเปลือกกลวงๆ เท่านั้น เราคาดการณ์ว่ามันอาจจะเป็นสิ่งก่อสร้างเทียมทั้งหมด หรือครั้งหนึ่งมันอาจเคยเป็นดาวเคราะห์ปกติที่ถูกทำให้กลวงไม่ว่าด้วยวิธีใดก็ตาม"
 strong_magnetic_category:0 "สนามแม่เหล็กแรงสูง"
 strong_magnetic_category_desc:0 "การสแกนเบื้องต้นพบเพียงว่ามีสนามแม่เหล็กที่รุนแรงผิดปกติล้อมรอบ [Root.GetName] อยู่"
 undiscovered_planetary_modifier_category:0 "สภาวะผิดปกติ"
 undiscovered_planetary_modifier_category_desc:0 "ตรวจสอบสภาพแวดล้อมอันแปลกประหลาดของ [From.GetName]"

 ####################################
 # Anomaly Events
 ####################################
 anomaly.6000.name:0 "ดวงจันทร์พเนจร"
 # "parent planet" and "its primary", pending PARENTPLANET loc key implementation
 anomaly.6000.desc:0 "[From.GetName] ดูเหมือนไม่ได้ประกอบขึ้นจากวัสดุที่คล้ายคลึงกับดาวเคราะห์แม่ของมัน ซึ่งบ่งชี้ว่ามันเคยเป็นดาวเคราะห์น้อยพเนจรที่ถูกแรงโน้มถ่วงของดาวแม่ดึงดูดเข้ามา การศึกษาเพิ่มเติมอาจช่วยเปิดเผยว่าเดิมทีมันมาจากที่ใด"
 anomaly.6001.desc:0 "[From.GetName] มีฐานทัพอยู่!"
 anomaly.6002.name:0 "ดาวเคราะห์กลวง"
 anomaly.6002.desc:1 "หลังจากการศึกษาอย่างกว้างขวาง เราสรุปได้ว่า [From.GetName] เป็นสิ่งก่อสร้างเทียม สมมติฐานที่กำลังทำงานอยู่คือเดิมที [From.GetName] เป็นแถบดาวเคราะห์น้อยที่ค่อนข้างปกติ ซึ่งถูกบดอัดเข้าด้วยกันเพื่อรวบรวมวัสดุที่จำเป็น จากนั้นจึงขึ้นรูปเป็นทรงกลมกลวง"
 anomaly.6003.desc:1 "ที่น่าประหลาดใจอย่างยิ่งคือ [From.GetName] ดูเหมือนจะเริ่มต้นการเป็นดาวเคราะห์ปกติ แต่เมื่อถึงจุดหนึ่งมันกลับถูกขุดเจาะจนกลวงทั้งหมดด้วยเทคนิคการทำเหมืองที่ไม่มีใครรู้จัก ทำให้ [From.GetName] เหลือเพียงแค่เปลือกว่างเปล่า"
 anomaly.6004.name:0 "สนามแม่เหล็กแรงสูง"
 anomaly.6004.desc:0 "การสแกนเบื้องต้นแทบไม่พบอะไรนอกจากสนามแม่เหล็กที่รุนแรงผิดปกติล้อมรอบ [From.GetName] สิ่งนี้รบกวนการสแกนอย่างละเอียดจนกระทั่ง [Root.GetName] เคลื่อนเข้าไปดูใกล้ขึ้น สนามแม่เหล็กนี้ดูเหมือนจะมีสาเหตุมาจากความหนาแน่นสูงของแร่โลหะที่พบในเปลือกดาวเคราะห์ ซึ่งน่าจะเป็นประโยชน์อย่างมากต่อการทำเหมืองในท้องถิ่น"
 anomaly.6005.name:0 "สภาวะผิดปกติ"
 anomaly.6005.desc:0 "ผลการสแกนของเราแสดงให้เห็นว่า [From.GetName] ค่อนข้างผิดปกติ จำเป็นต้องเข้าไปตรวจสอบให้ใกล้ชิดยิ่งขึ้น"
 anomaly.6006.name:0 "สภาวะผิดปกติ"
 anomaly.6006.desc:0 "การสแกน [From.GetName] ของเราเสร็จสมบูรณ์แล้ว เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ได้เตรียมรายงานเกี่ยวกับสภาวะผิดปกติที่พบที่นี่ไว้แล้ว"
 anomaly.6006.a:0 "รายงานมาเลย [Root.GetLeaderName]"
 anomaly.6007.name:0 "แหล่งแร่อุดมสมบูรณ์"
 anomaly.6007.desc:0 "เปลือกดาวของ [From.From.GetName] มีแร่ธาตุที่เข้าถึงได้ง่ายอยู่อย่างอุดมสมบูรณ์ ซึ่งน่าจะทำให้การทำเหมืองที่นี่เป็นธุรกิจที่ทำกำไรได้งาม"
 anomaly.6008.desc:0 "[From.From.GetName] ประสบปัญหารูปแบบสภาพอากาศที่ไม่เสถียร โดยมีพายุรุนแรงมักก่อตัวขึ้นมาจากความว่างเปล่าและสร้างความเสียหายบนพื้นผิว ทุ่งกังหันลมน่าจะสามารถผลิตพลังงานได้อย่างล้นหลามที่นี่"
 anomaly.6009.desc:0 "[From.From.GetName] มีวิวัฒนาการของสัตว์ป่าที่ดุร้ายอย่างยิ่ง และบนพื้นผิวก็เต็มไปด้วยสัตว์นักล่าที่เป็นอันตรายถึงชีวิตที่คอยดักซุ่มโจมตีเหยื่อรายต่อไป ชีววิทยาของพวกมันเปิดโอกาสการวิจัยที่ยอดเยี่ยม"
 anomaly.6010.desc:0 "แม้จะอยู่อาศัยได้ แต่ [From.From.GetName] กลับมีสนามแม่เหล็กที่แทบจะไม่มีอยู่เลย ซึ่งให้การปกป้องจากรังสีคอสมิกเพียงเล็กน้อยเท่านั้น"
 anomaly.6011.desc:0 "[From.From.GetName] มีสนามแม่เหล็กสูงผิดปกติ ซึ่งเกิดจากแหล่งแร่โลหะที่อุดมสมบูรณ์ สิ่งนี้จะรบกวนเครื่องมือวัดและคอมพิวเตอร์ของเราจำนวนมาก แต่ผลผลิตจากการทำเหมืองที่อุดมสมบูรณ์ก็น่าจะชดเชยเรื่องนี้ได้มากกว่าที่เสียไป"
 anomaly.6012.desc:0 "แผ่นเปลือกโลกของ [From.From.GetName] ไม่มีความเสถียรอย่างมาก และมีแนวโน้มที่จะเกิดแผ่นดินไหวขนาดใหญ่รวมถึงกิจกรรมทางภูเขาไฟ แหล่งแร่มีค่ามักจะโผล่พ้นขึ้นมาบนพื้นผิวอยู่บ่อยครั้ง"
 anomaly.6013.desc:0 "[From.From.GetName] ถูกตรึงด้วยแรงไทดัลรอบดาวฤกษ์ของมัน ซึ่งหมายความว่าฝั่งหนึ่งจะเป็นเวลากลางวันเสมอในขณะที่อีกฝั่งถูกกักขังอยู่ในความมืดมิดชั่วนิรันดร์ หากมีสิ่งมีชีวิตอยู่ที่นี่ มันก็น่าจะจำกัดอยู่แค่ในแถบสนธยาที่ทั้งสองฝั่งมาบรรจบกัน"
 anomaly.6014.desc:0 "ดูเหมือนว่า [From.From.GetName] เคยเป็นดาวแก๊สยักษ์มาก่อน แต่การที่มันอยู่ใกล้ดาวฤกษ์มากเกินไปทำให้ชั้นบรรยากาศหนาทึบถูกเผาไหม้ไปจนหมด สิ่งที่เหลืออยู่ตอนนี้มีเพียงแกนโลหะที่มีความหนาแน่นสูงมากและอุดมไปด้วยแร่ธาตุ"
 anomaly.6015.desc:0 "เส้นทางโคจรของ [From.From.GetName] รอบดาวฤกษ์เต็มไปด้วยดาวเคราะห์น้อยขนาดเล็ก สะเก็ดดาว และฝูงดาวหาง การพุ่งชนขนาดใหญ่บนพื้นผิวเกิดขึ้นในความถี่ที่น่าตกใจ ซึ่งมักจะทิ้งแหล่งแร่ที่มีค่าเอาไว้เบื้องหลัง"
 anomaly.6016.desc:0 "[From.From.GetName] มีดาวบริวารตามธรรมชาติจำนวนมากผิดปกติ ดวงจันทร์และดาวบริวารขนาดเล็กหลายร้อยดวงโคจรรอบดาวเคราะห์ ซึ่งหลายดวงมีแหล่งแร่ที่มีค่า"
 anomaly.6017.desc:0 "ปรากฏว่า [From.From.GetName] ก่อตัวขึ้นจากคาร์บอนเป็นส่วนใหญ่ และมีออกซิเจนเพียงเล็กน้อย ไม่เพียงแต่จะอุดมไปด้วยแร่ธาตุเท่านั้น แต่การปะทุของภูเขาไฟยังมักจะนำเพชรจากภายในขึ้นมาสู่พื้นผิวอีกด้วย"
 anomaly.6018.desc:0 "พายุไฟฟ้าที่น่าตื่นตาตื่นใจโหมกระหน่ำในชั้นบรรยากาศของ [From.From.GetName] เป็นประจำ แม้ว่าผู้อยู่อาศัยอาจจะไม่สนุกกับมันเท่าใดนัก แต่ก็มีโอกาสการวิจัยที่เปิดกว้างอย่างมากที่นี่"
 anomaly.6019.desc:0 "[From.From.GetName] มีความหนาแน่นต่ำผิดปกติ ส่งผลให้มีแรงโน้มถ่วงต่ำกว่าดาวเคราะห์ส่วนใหญ่ที่มีขนาดใกล้เคียงกันมาก"
 anomaly.6020.desc:0 "[From.From.GetName] มีความหนาแน่นสูงผิดปกติ ทำให้มีแรงโน้มถ่วงที่สูงจนอึดอัด อย่างไรก็ตาม ปริมาณโลหะหนักที่มีอยู่น่าจะช่วยส่งเสริมการวิจัยสาขาฟิสิกส์ได้อย่างมาก"
 anomaly.6021.desc:0 "[From.From.GetName] อาจถูกสร้างขึ้นมาโดยฝีมือสิ่งมีชีวิต หรือไม่ก็ถูกทำให้กลวงไม่ทางใดก็ทางหนึ่ง เราไม่ทราบว่าทำอย่างไรหรือทำไม แต่การสืบสวนเรื่องนี้รับรองว่าจะน่าตื่นเต้นแน่นอน"
 anomaly.6022.desc:0 "คลังแร่ธาตุที่เข้าถึงได้ง่ายในเปลือกดาวของ [From.From.GetName] มอบโอกาสที่น่าตะลึงสำหรับการทำเหมืองแร่"
 anomaly.6023.desc:0 "ไม่ทราบว่าเดิมที [From.From.GetName] ก่อตัวขึ้นมาเช่นนี้ หรือว่ามีเผ่าพันธุ์ที่ไม่รู้จักเคยมาตักตวงทรัพยากรไปหมดแล้ว อย่างไรก็ตาม เรารู้เพียงว่ามีแร่ธาตุหลงเหลืออยู่ให้พบที่นี่น้อยมาก"
 anomaly.6024.desc:0 "สิ่งมีชีวิตของ [From.From.GetName] ถูกสร้างขึ้นมาในขนาดมหึมาและสามารถเป็นอันตรายอย่างยิ่งยวดได้แม้ว่าพวกมันจะไม่ได้ตั้งใจก็ตาม ยิ่งพูดถึงสัตว์นักล่าขนาดยักษ์ของโลกนี้ให้น้อยลงเท่าไหร่ก็ยิ่งดี แต่พวกมันก็เป็นเสมือนขุมทรัพย์แห่งข้อมูลการวิจัยหากนักวิทยาศาสตร์คนใดใจกล้าพอที่จะลองดู"
 anomaly.6025.desc:0 "บางที [From.From.GetName] อาจเคยมีดวงจันทร์ซึ่งถูกทำลายลงในภัยพิบัติบางอย่าง หรือบางทีเศษซากในวงโคจรของมันอาจไม่เคยก่อตัวรวมกันได้สำเร็จตั้งแต่แรก ไม่ว่าจะด้วยสาเหตุใด ดาวเคราะห์ดวงนี้ถูกล้อมรอบด้วยแถบดาวเคราะห์น้อยขนาดเล็ก"
 anomaly.6026.desc:0 "ทัศนียภาพของ [From.From.GetName] นั้นงดงามอย่างยิ่ง ใครก็ตามที่อาศัยอยู่บนดาวเคราะห์ดวงนี้จะได้พบกับสิ่งมหัศจรรย์ใหม่ๆ ให้ชื่นชมอยู่เสมอ"
 anomaly.6027.desc:0 "บางสิ่งบางอย่างในอากาศของ [From.From.GetName] ดูเหมือนจะทำให้ผู้คนรู้สึกอยาก... สืบพันธุ์ ไม่ต้องบอกก็รู้ว่าสิ่งนี้ทำให้การสำรวจภาคพื้นดินค่อนข้างน่าอึดอัดใจทีเดียว"
 anomaly.6028.desc:0 "อากาศของ [From.From.GetName] มีสารหลอนประสาทตามธรรมชาติ แม้ว่าสิ่งนี้จะช่วยให้ผู้คนมีความสุข และดูเหมือนว่าจะช่วยในการจินตนาการปัญหาฟิสิกส์ที่ลึกซึ้งบางประการได้ แต่มันก็ดึงความสนใจของผู้คนไปจากงานอื่นๆ ด้วยเช่นกัน"
 anomaly.6029.desc:0 "สิ่งมีชีวิตเจริญรุ่งเรืองบน [From.From.GetName] มีสัตว์ป่าอยู่หนาแน่นและพืชพรรณก็เติบโตอย่างรวดเร็ว"
 anomaly.6030.desc:0 "สิ่งมีชีวิตต่อสู้ดิ้นรนเพื่อเอาชีวิตรอดบน [From.From.GetName] และแม้ว่าบางส่วนจะยืนหยัดอยู่ได้อย่างเหนียวแน่น แต่มันก็ดูอ่อนแอและแคระแกร็น"
 anomaly.6031.desc:0 "ภัยพิบัติในอดีตอันไกลโพ้นส่งผลให้ [From.From.GetName] มีรังสีสะสมอย่างหนัก เมื่อเวลาผ่านไปมันเริ่มกลับมาพออยู่อาศัยได้อีกครั้ง แต่จนถึงตอนนี้ยังมีพืชพรรณเติบโตที่นี่ได้น้อยมาก"
 anomaly.6660.desc.start:1 "ขณะที่ยานวิทยาศาสตร์ของเราสแกนพื้นผิวของ [From.GetName] มันชัดเจนมากว่าเราได้พบกับบางสิ่งบางอย่างที่แปลกไปจากปกติ"
 anomaly.6660.desc.default:1 "$anomaly.6660.desc.start$ [From.GetName] มีสภาวะที่ไม่เหมือนกับสิ่งใดที่เราเคยพบเห็นมาก่อน\n\n$anomaly.6660.desc.end$"
 anomaly.6660.desc.weather:1 "$anomaly.6660.desc.start$ พายุรุนแรงพัดกระหน่ำ [From.GetPlanetMoon] อย่างต่อเนื่อง ซึ่งอาจช่วยในเรื่องทรัพยากรและการวิจัยของเรา แต่จะเป็นอุปสรรคต่อประชากรของเรา\n\n$anomaly.6660.desc.end$"
 anomaly.6660.desc.magnetic:2 "$anomaly.6660.desc.start$ สนามแม่เหล็กของ [From.GetPlanetMoon] ผิดไปจากที่คาดไว้สำหรับดาวประเภทนี้อย่างมาก\n\n$anomaly.6660.desc.end$"
 anomaly.6660.desc.tectonic:0 "$anomaly.6660.desc.start$ ธรรมชาติที่ไม่เสถียรของ [From.GetPlanetMoon] ทำให้การเกิดแผ่นดินไหวและการปะทุของภูเขาไฟเป็นเรื่องปกติสามัญ\n\n$anomaly.6660.desc.end$"
 anomaly.6660.desc.tidal:0 "$anomaly.6660.desc.start$ [From.GetPlanetMoon] ถูกตรึงการหมุนรอบดวงอาทิตย์ ส่งผลให้มีกลางวันและกลางคืนถาวรในแต่ละฝั่งของมัน สถานการณ์ความเหมาะสมในการอยู่อาศัยนั้นต่ำกว่าจุดที่เหมาะสม\n\n$anomaly.6660.desc.end$"
 anomaly.6660.desc.tidal_mach:0 "$anomaly.6660.desc.start$ [From.GetPlanetMoon] ถูกตรึงการหมุนรอบดวงอาทิตย์ ส่งผลให้มีกลางวันและกลางคืนถาวรในแต่ละฝั่งของมัน สถานการณ์ความเหมาะสมในการอยู่อาศัยนั้นต่ำกว่าจุดที่เหมาะสมสำหรับสิ่งมีชีวิตอินทรีย์\n\n$anomaly.6660.desc.end$"
 anomaly.6660.desc.impacts:1 "$anomaly.6660.desc.start$ [From.GetPlanetMoon] ถูกคุกคามด้วยฝนดาวตกอย่างต่อเนื่อง ซึ่งถล่มพื้นผิวของมันด้วยวัตถุตกกระแทกขนาดมหึมา\n\n$anomaly.6660.desc.end$"
 anomaly.6660.desc.gravity:0 "$anomaly.6660.desc.start$ แรงโน้มถ่วงบนดาวเคราะห์ดวงนี้ยังห่างไกลจากความเหมาะสมที่จะรองรับผู้ตั้งถิ่นฐานที่มีศักยภาพของเรา\n\n$anomaly.6660.desc.end$"
 anomaly.6660.desc.gravity_mach:0 "$anomaly.6660.desc.start$ แม้ว่าแรงโน้มถ่วงของดาวเคราะห์ดวงนี้จะยังห่างไกลจากความเหมาะสมที่จะรองรับผู้ตั้งถิ่นฐานอินทรีย์ แต่อัลกอริทึมการสอบเทียบแรงโน้มถ่วงที่เหนือกว่าของเราจะช่วยลบล้างผลกระทบของมันได้\n\n$anomaly.6660.desc.end$"
 anomaly.6660.desc.gravity_desc_mach:0 "$anomaly.6660.desc.start$ แม้ว่าแรงโน้มถ่วงของดาวเคราะห์ดวงนี้จะยังห่างไกลจากความเหมาะสมที่จะรองรับผู้ตั้งถิ่นฐานอินทรีย์ แต่อัลกอริทึมการสอบเทียบแรงโน้มถ่วงที่เหนือกว่าของเราจะช่วยลบล้างผลกระทบของมันได้\n\n$anomaly.6660.desc.end$"
 anomaly.6660.desc.wildlife:0 "$anomaly.6660.desc.start$ สัตว์ป่าที่พบในดาวเคราะห์ดวงนี้ดูเหมือนจะเป็นศัตรู และจะทำให้การตั้งอาณานิคมทำได้ยากขึ้น\n\n$anomaly.6660.desc.end$"
 anomaly.6660.desc.titan:0 "$anomaly.6660.desc.start$ ดาวเคราะห์ดวงนี้เป็นที่อยู่อาศัยของสิ่งมีชีวิตขนาดมหึมาที่อาจเป็นอันตรายหากเข้าไปปฏิสัมพันธ์ด้วย\n\n$anomaly.6660.desc.end$"
 anomaly.6660.desc.resources:0 "$anomaly.6660.desc.start$ องค์ประกอบและประวัติศาสตร์ของมันทำให้มีทรัพยากรพิเศษเพิ่มเติมที่เราควรฉวยโอกาสเก็บเกี่ยว\n\n$anomaly.6660.desc.end$"
 anomaly.6660.desc.beauty:3 "$anomaly.6660.desc.start$ ความงามตามธรรมชาติของ [From.GetPlanetMoon] สะกดให้ทุกคนอ้าปากค้างด้วยความทึ่ง ชีวิตที่นี่น่าจะมีความสุข สำหรับสิ่งมีชีวิตที่มีความเข้ากันได้ทางสรีรวิทยา\n\n$anomaly.6660.desc.end$"
 anomaly.6660.desc.atmosphere:0 "$anomaly.6660.desc.start$ ชั้นบรรยากาศมีแก๊สพิเศษที่อาจส่งผลกระทบต่อประชากรของเรา ดังนั้นเราจึงควรระมัดระวัง\n\n$anomaly.6660.desc.end$"
 anomaly.6660.desc.atmosphere_mach:0 "$anomaly.6660.desc.start$ ชั้นบรรยากาศมีแก๊สที่อาจรบกวนการทำงานของระบบประสาทแบบอินทรีย์\n\n$anomaly.6660.desc.end$"
 anomaly.6660.desc.lush:0 "$anomaly.6660.desc.start$ สัตว์ป่าไม่มีปัญหาในการเจริญเติบโต และสามารถให้โอกาสมากมายในการเก็บเกี่ยวทรัพยากรที่จำเป็นอย่างมาก\n\n$anomaly.6660.desc.end$"
 anomaly.6660.desc.lush_mach:0 "$anomaly.6660.desc.start$ สัตว์ป่าไม่มีปัญหาในการเจริญเติบโต และจะให้โอกาสสิ่งมีชีวิตอินทรีย์อย่างมากมายในการเก็บเกี่ยวทรัพยากรที่สำคัญ\n\n$anomaly.6660.desc.end$"
 anomaly.6660.desc.terrible:0 "$anomaly.6660.desc.start$ สภาพแวดล้อมมีความโหดร้ายและอ้างว้าง และจะไม่เหมาะเป็นจุดตั้งถิ่นฐานที่ดีที่สุด\n\n$anomaly.6660.desc.end$"
 anomaly.6660.desc.terrible_mach:0 "$anomaly.6660.desc.start$ สภาพแวดล้อมมีความโหดร้ายและอ้างว้าง และไม่เหมาะสำหรับสิ่งมีชีวิตอินทรีย์\n\n$anomaly.6660.desc.end$"
 anomaly.6660.desc.end:0 "เราจะพบกับสิ่งผิดปกติเช่นนี้อีกแน่นอนเมื่อเราสำรวจดาวเคราะห์ดวงใหม่ๆ และไม่ควรประเมินผลกระทบของมันที่มีต่อการขยายดินแดนของเราต่ำเกินไป"
 anomaly.6660.a.tooltip:0 "ตัวปรับแต่งดาวเคราะห์ปรากฏบน [From.GetName]"

