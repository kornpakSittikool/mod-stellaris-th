 action.39.desc.hi:4 "สถานการณ์บีบบังคับให้เราต้องยุติสงครามครั้งนี้ [This.GetName] มีสิ่งอื่นที่ดีกว่าที่ต้องทำ มากกว่าการยืดเยื้อความขัดแย้งนี้ไปอย่างไม่มีกำหนด"
 action.39.desc.fb:3 "เราหวังว่าการยุติการสู้รบจะช่วยเปิดโอกาสให้เกิดการเจรจาทางการทูตครั้งใหม่ระหว่าง [Root.GetName] และ [This.GetName]"
