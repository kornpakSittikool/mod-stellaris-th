 crisis.11.name:0 "เสียงสะท้อนของอวกาศ"
 crisis.11.desc:0 "สถานีติดตามของเราหลายสถานี ได้จับแสงของสับสเปซแปลกๆ มาจากที่ไหนสักแห่งในพื้นที่ระหว่างกาแล็กซี่ เสียงสะท้อนลม แต่เริ่มแรงขึ้น และดูเหมือนจะเข้าใกล้กาแล็กซี่ของเรา"
 crisis.11.a:0 "พายุอยู่บนขอบฟ้า"
 crisis.13.name:0 "เข้า ไป ใกล้ ริม ด้าน นอก"
 crisis.13.desc:0 "กระสวยอวกาศแปลกๆที่เราตรวจพบ ในอวกาศกาแล็กซี่ กําลังเข้าใกล้ขอบนอกกาแล็กซี่ของเรา ดู เหมือน ว่า มี การ แข่ง กัน เล็ก กว่า หลาย ครั้ง ก่อน ที่ จะ มี เสียง ดัง ก้อง ไป ทั่ว ระบบ ขอบ หลาย ระบบ.\n\nเราได้เข้าไปในตําแหน่งของระบบเหล่านี้ ในบันทึกสถานการณ์ และจะติดตามสถานการณ์ต่อไป"
 crisis.13.a:0 "พวกเขาใกล้ถึงแล้ว..."
 crisis.15.name:0 "สัญญาณของอวกาศ"
 crisis.15.desc:0 "เรากําลังจับสัญญาณ สับสเปซที่แข็งแกร่ง กําลังล้างผ่านกาแล็กซี่! จุด เริ่ม ต้น ของ มัน ดู เหมือน จะ เป็น จุด เชื่อม ต่อ จาก อวกาศ ระหว่าง กาแล็กซี."
 crisis.15.a:0 "สร้างภาพ"
 crisis.16.desc:0 "§B<i>§!\n\n§RISFXKRORIFE สืบค้นเมื่อ 20 พฤษภาคม พ.ศ SRATRITVRRARASgragf NerRUPRITHTHTHVUSNA!§!\n\n§B< ทรานซิชัน)§!"
 crisis.16.b.desc:0 "§Bตรวจพบการปลดประจําการ ส่งข้อความ... )§!\n\n§Rความหลัง เรามีปัญหาแล้ว เจนีนของเราจบลงแล้วเฟด!และเรสเราต้องสร้างจักรวาลนี้ขึ้น ก่อนที่ผู้คนจะหาเราเจอ§!"
 crisis.16.c.desc:0 "§B<i>§!\n\n§Rความหลัง เรามีปัญหาแล้ว เจนีนของเราจบลงแล้วเฟด!และเรสเราต้องสร้างจักรวาลนี้ขึ้น ก่อนที่ผู้คนจะหาเราเจอ§!"
 crisis.16.a:0 "ปิดหน้าจอหลัก"
 crisis.16.b:0 "ทําลายการเชื่อมต่อ"
 crisis.18.name:0 "คลื่น ลูก แรก"
 crisis.18.desc:0 "เราได้รับข่าวว่า มีระบบกระจายเสียงหลายระบบ ตามขอบกาแล็กซี่ กําลังถูกรุกรานด้วยกําลังบางส่วน นี่ดูเหมือนจะเป็นที่มาของ การสะท้อนของสับสเปซ ที่เราตรวจพบใกล้กาแล็กซี่ของเรา\n\nสิ่งที่เรากําลังเผชิญอยู่ตอนนี้เป็นเพียงตัวรถแวนการ์ด - กลุ่มผู้ติดต่อหลักยังไม่มาถึง รายงานยังสับสน แต่\"เรือ\" ที่ผู้รุกรานใช้ ปรากฎเป็นอินทรีย์ธรรมชาติ และไม่ตอบสนองต่อลูกเห็บ\n\nกาแล็กซีของเราทั้งหมดอาจกําลัง เผชิญการรุกรานของขอบเขตที่ไม่เคยมีมาก่อน"
 crisis.18.desc.bio: "รายงานจากระบบนอกของเรา ตามขอบกาแล็กซี่เป็นที่น่ากลัว กองกําลังรุกรานกําลังกวาดผ่านดาว นี่ดูเหมือนจะเป็นที่มาของ การสะท้อนของสับสเปซ ที่เราตรวจพบใกล้กาแล็กซี่ของเรา\n\nสิ่งที่เรากําลังเผชิญอยู่ตอนนี้ มีแต่กองหน้าเท่านั้น มวลที่แท้จริงของการจู่โจมยังไม่มาถึง แต่แล้วบางสิ่งบางอย่างเกี่ยวกับองค์กรเหล่านี้ รู้สึกผิด รูป แบบ ของ พวก เขา เป็น การ เยาะ เย้ย ชีวิต อย่าง แปลก ๆ, โหม กระหน่ํา ด้วย ความ หิว โหย ที่ เรา ไม่ รู้ จัก. พวก เขา ไม่ สื่อ ความ ไม่ แสวง หา ความ เข้าใจ เพียง แต่ การ บริโภค.\n\nเรารู้จักกันมานาน เสียงกระซิบของยานที่มีชีวิต ความผูกพันระหว่างเรือกับเจ้านาย แต่สิ่งเหล่านี้? พวกมันคือเอเลี่ยน ในความรู้สึกที่แท้จริง กาแล็คซี่ไม่ได้เผชิญหน้ากับแค่ผู้บุกรุก การ เผชิญ กับ ความ หิว โหย ซึ่ง ไม่ ควร มี อยู่ จริง."
 crisis.18.a:0 "วิญญาณปกป้องพวกเรา"
 crisis.18.b:0 "สรุปทุกผู้บัญชาการกองเรือ"
 crisis.18.c:0 "สิ่งมีชีวิตเหล่านี้จะต้องศึกษาอย่างใกล้ชิด"
 crisis.18.d:0 "เราแน่ใจเหรอว่าไม่มีใครให้เหตุผล"
 crisis.18.e:0 "นี้จะตัดเป็นขอบกําไรของเรา ..."
 crisis.18.f:0 "วันมืดรออยู่ข้างหน้า"
 crisis.18.g:0 "ไอโซโนพวกนี้จะถูกกวาดล้าง"
 crisis.18.h:0 "น่าทึ่ง... ชีวิตของเอเลี่ยน จากนอกกาแล็กซี่ของเรา"
 crisis.18.i:0 "พวกเขาทําหน้าที่เป็นใจเดียว น่าทึ่ง"
 crisis.18.j:0 "นี่คือภัยคุกคามต่อทุกชีวิต"
 crisis.20.name:0 "คลื่น ลูก ที่ สอง"
 crisis.20.desc:0 "เราไม่สามารถที่จะมองเห็นร่างหลักของ การเข้าใกล้สับสเปซ จากรังสีพื้นหลังของกาแล็กซี่ของเรา\n\nถ้าขนาดของรถแวนการ์ดของพวกเขา เป็นสัญญาณใด ๆ เจ้าภาพหลักของผู้รุกรานเหล่านี้จะต้องมีขนาดใหญ่"
 crisis.20.a:0 "พวกเขาอยู่ที่นี่..."

