 action.1.ms:0 "§Eเพื่อปกป้องและรับใช้§!"
 action.1.r:0 "§Eอย่ายุ่งเกี่ยวกับสิ่งศักดิ์สิทธิ์ เครื่องจักร [contact_speaker.GetAdj]§!"
 action.1.s:0 "§Eพวกไร้วิญญาณ! อย่าขวางทางเรา§!"
 action.1.t1:0 "§Eในที่สุดคุณก็จะเข้าใจในสิ่งที่เราเห็น§!"
 action.1.t2:1 "§Eจิตวิญญาณดูไม่นิยมชมชอบในการพบกันครั้งนี้ [contact_speaker.GetSpeciesNamePlural]§!"
 action.1.t3:0 "§E[Root.GetGovernmentName] จะจับตาดูท่านอยู่§!"
 action.1.t4:0 "§Eเปิดใช้งานโปรโตคอลการเฝ้าระวัง§!"
 action.1.t5:0 "§Eเลื่อนการผนวกรวมตามกำหนดออกไป§!"
 action.1.t6:0 "§Eเลื่อนการกำจัดตามกำหนดออกไป§!"
 action.1.u1:0 "§Eท่านจะเป็นมิตรของเรา ไม่ว่าจะต้องการหรือไม่§!"
 action.1.u2:1 "§Eท่านจะรับใช้[Root.GetRulerTitle] ไม่ว่าจะต้องการหรือไม่§!"
