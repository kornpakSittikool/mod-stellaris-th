 action.37.name:1 "ชัยชนะเหนือ §H[From.GetName]§!"
 action.37.message:1 "เราชนะสงครามที่ต่อสู้กับ §H[From.GetName]§! แล้ว"
 action.37.desc.default:1 "สงครามสิ้นสุดแล้ว เรายอมรับความพ่ายแพ้"
 action.37.a:1 "เป็นผลลัพธ์ที่ดีที่สุดแล้ว"
 action.38.name:1 "พ่ายแพ้โดย §H[From.GetName]§!"
 action.38.message:1 "เราแพ้สงครามกับ §H[From.GetName]§! แล้ว"
 action.38.desc.default:1 "สงครามสิ้นสุดแล้ว เราได้รับชัยชนะ"
