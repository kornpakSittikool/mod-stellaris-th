 crisis.30.j:0 "เราจะค้นหากาแล็กซี่ชนิดของคุณ"
 crisis.30.j.b:0 "เราจะปิดปากคุณ"
 crisis.30.j.response:0 "§Rเราเคยได้ยินแบบนี้มาก่อน ฮ่า ฮ่า ฮ่า ฮ่า\n\nกระต่ายจะค้นหาทุกรูปแบบ คุณ คิด อย่าง ไร?§!"

 crisis.51.name:0 "ระเบียบ ใหม่"
 crisis.51.desc:0 "ชนิดของระเบียบบางอย่าง ที่อุทิศให้กับการต่อสู้พรีธิน ได้ปรากฏในกาแล็กซี่ สมาชิก ของ พวก เขา ดู เหมือน ประกอบ ด้วย ผู้ ลี้ ภัย ที่ ถูก ขับ ไล่ และ ถูก กดขี่ เป็น ส่วน ใหญ่, ทหาร ผ่าน ศึก, และ คน อื่น ๆ ที่ สูญ เสีย ทุก สิ่ง ทุก อย่าง ไป เนื่อง จาก การ โจมตี ของ ผู้ ก่อ การ ร้าย.\n\nแม้ครั้งนี้ กองเรือกระทิงของพวกเขามีการจัดการที่ จะชนะการหมั้นหลายครั้งกับพรีธินนักล่าฝูง มีรายงานที่ยืนยันไม่ได้ ว่ากองเรือของพวกเขารวมถึง ยานอวกาศของการออกแบบที่ผิดปกติ"
 crisis.51.a:0 "คนพวกนี้เป็นใคร?"
 crisis.52.desc:0 "เราคือเซนติเนล คําสั่งของเราได้สาบาน ที่จะหยุดการก่อการนองเลือด ของพรีธินไม่ว่าค่าใช้จ่าย เมื่ออาณาจักรอื่นล่มสลาย เราก็ยืนหยัด ที่ๆพวกเขาทิ้งตัวเองไว้กับหมอ เราให้วิธีการตอบโต้\n\nข้าคือแกรนด์มาสเตอร์ คอร์กัส คําสั่งแรกของเรา อย่า ถูก หลอก โดย สิ่ง มี ชีวิต ของ ผม เราขอร้องเพียงว่ารัฐบาลของคุณ ยังคงดําเนินการต่อสู้กับพรีธิน และสนับสนุนเซนติเนลของเราที่ที่เป็นไปได้"
 crisis.52.a:0 "คุณสู้กลับได้ยังไง"
 crisis.52.a.response:0 "หลายเซนติเนลมีภูมิหลังทางทหาร เราคือผู้อยู่รอดจากกองเรือที่แตกต่างกันเป็นโหล ซึ่งต่อสู้กับพรีเทียร์นและพ่ายแพ้ ใน ฐานะ เซนติเนล เรา ได้ เรียน รู้ จาก ความ ผิด พลาด ของ อดีต และ พยายาม อย่าง หนัก ที่ จะ ไม่ ทํา ซ้ํา อีก.\n\nและผมเชื่อว่าผมได้พูดถึง การที่เรารับมาจากทุกสายพันธุ์ในกาแล็กซี่ นี่รวมถึงการแข่งขันผู้สูงอายุ เช่น[sentinel_fallen_empire.GetSpeciesNamePlural]เราได้รับการสนับสนุนจากหลายกลุ่มที่มีอิทธิพล§H[sentinel_fallen_empire.GetName]§!ที่ไม่ต้องการเห็นกาแล็กซี่ของพวกเขากิน พวกเขาบริจาคทั้งเรือและทรัพยากร ด้วยเหตุผลของเรา"
 crisis.52.b:0 "คุณอยู่ในฐานไหน"
 crisis.52.b.response:0 "ตอนนี้ เรากําลังสร้างสํานักงานใหญ่§H[sentinel_system.GetName]§!ระบบ พิกัดของระบบที่ไม่ปรากฏนี้ ได้รับการมอบให้กับเราโดย[sentinel_fallen_empire.GetName]ผู้ซึ่งช่วยสร้างฐานหลักของเรา§Hเซ็นติเนลอัลฟา§!.\n\nมันค่อนข้างจะเป็นความสําเร็จที่โดดเด่นถ้าผมจะพูดเช่นนั้น เรามีอู่เรือของเราเองด้วย"
 crisis.52.c:0 "ลาก่อน"
 crisis.52.c.response:0 "สู้ต่อไป เพื่อนรัก ชะตากรรมของกาแล็คซี่ทั้งหมดของเรา แขวนอยู่ในสมดุล\n\nเซ็นติเนล หมดแก้ว"
 crisis.55.desc_01:0 "กาแล็คซี่ของเราต้องเผชิญกับอนาคตที่เป็นไปได้ 2 อย่าง คือ เพรสทีเรียน สโคเครน จะบริโภคสิ่งมีชีวิตอินทรีย์ทั้งหมด"
 crisis.55.desc_02:0 "เราต้องพยายามอีกครั้ง เพื่อต่อต้านการระบาด นี่คือการต่อสู้ ที่เกี่ยวข้องกับทั้งกาแล็กซี่"
 crisis.55.desc_03:0 "ความ ขัด แย้ง ระหว่าง ชาติ ไม่ มี ความ หมาย ใน ตอน นี้. เรือรบใด ๆ ที่สูญเสียในการต่อสู้ กับทุกคนหรือสิ่งอื่น ๆ ที่นอกเหนือจากการชลประทาน จะต้องถือว่าเป็นของเสียเหลือเชื่อ"
 crisis.55.desc_04:0 "อย่าสิ้นหวัง การต่อสู้เพื่อกาแล็กซี่ของเรายังคงสามารถชนะได้"
 crisis.55.desc_05:0 "ถ้าคุณขาดวิธีการต่อสู้กับโรคนี้โดยตรง คุณยินดีที่จะบริจาคทรัพยากรให้เรา นี่จะทําให้เรามีกองกําลังเพิ่มขึ้น ต่อสู้กับผู้บุกรุกของพรีธิน"
 crisis.55.a:0 "คุณบอกอะไรเราได้บ้างเกี่ยวกับ ไพรทอรี?"
 crisis.55.a.response:0 "อนิจจาเราไม่ทราบว่ามากที่สุดเท่าที่เรา ต้องการ แต่เห็นได้ชัด มากที่สุด กัลกัตตาอยู่ในจุดกําเนิด เป็นไปได้ว่าพวกเขากิน หลายสิบหรือแม้กระทั่ง หลายร้อยของกาแลคซีอื่น ๆ ก่อนที่พวกเขาจะมาถึงของเรา\n\nหลังจากที่ได้เสร็จสิ้นการบริโภค ชีวิตที่ไม่ใช่เบื้องต้นทั้งหมดบนดาวเคราะห์, พวกเขาแปลมัน สิ่งที่สามารถบรรยายได้เพียงเป็นฝันร้ายบิด โลกที่มีชีวิตเหล่านี้เป็นปรปักษ์ ต่อรูปแบบของสิ่งมีชีวิตอื่น ๆ ทั้งหมด และทางเดียวในการล้างโรค"
 crisis.55.b:0 "เราอยากเสนอการบริจาค (1000 พลังงาน)"
 crisis.55.b.response:0 "ขอบคุณสําหรับเงินบริจาค ทรัพยากรเหล่านี้จะทําให้เราสามารถ จัดกองเรือรบทั้งหมด เพื่อใช้ในการทําสงครามต่อต้านการสังหาร ถ้าประเทศของกาแล็กซี่มากขึ้น แบ่งปันความเอื้อเฟื้อของคุณ สงครามก็จะยุติลงในไม่ช้า"
 crisis.55.c.response:0 "ดัง ที่ คุณ ทราบ ดี ว่า การ เตรียม กอง เรือ รบ สมัย ใหม่ ต้อง ใช้ ทรัพยากร มหาศาล. เราจําเป็นต้องมีพลังงานน้อยกว่า 1000 เพื่อรวมกันกลุ่มจู่โจมใหม่ เพื่อใช้ในการต่อต้านการสังหารหมู่"
 crisis.55.e.response:0 "เราเสียใจที่ตอนนี้เราไม่ยอมรับการบริจาคของคุณ สหาย กองยานที่ก่อการจราจลของเรา ได้ทําให้ระบบติดตามของเรา ถึงขีดสุดแล้ว อย่าง ไร ก็ ตาม มี การ หยั่ง รู้ ค่า อย่าง ยิ่ง."
 crisis.55.d:0 "ลาก่อน"
 crisis.55.d.response:0 "การ ต่อ สู้ ดําเนิน ต่อ ไป. เซ็นติเนล หนึ่งเซ็นปิด."
 crisis.71.desc:0 "เซ็นทรัลได้จดบันทึกของความกล้าหาญของคุณ ต่อสู้กับสกอร์เตอร์ตั้งแต่ผู้บัญชาการกองเรือ[Root.GetName]เห็นได้ชัดว่าเรารู้วิธีเอาชนะสงคราม เราต้องการที่จะโอนหนึ่งของกองเรือรบของเรา ไปควบคุมของคุณ ขณะนี้เราขาดแคลนกําลังคนในการลูกเรือเหล่านี้ แต่ที่ไม่ควรจะเป็นปัญหาสําหรับคุณ\n\nคุณต้องสัญญาอย่างเคร่งครัดว่า จะใช้เพียงเรือรบเหล่านี้ กับโรคชลประทาน อย่างไรก็ตาม!"
 crisis.71.a:0 "แน่นอน แค่ต่อต้านการชลประทาน"
 crisis.71.a.response:0 "เยี่ยม เรามั่นใจว่ากัปตันที่กล้าหาญของท่าน จะเพิ่มเข้ากับประวัติการเก็บสะสมของเรือรบเหล่านี้ ท่านจะพบกองยานที่อยู่ใกล้[Root.Capital.GetName]."
 crisis.71.b:0 "เราไม่ต้องการเรือรบของท่าน"
 crisis.71.b.response:0 "เราเข้าใจ งั้นเราแค่ขอให้คุณสู้ต่อไป เพื่อน หม่อมเจ้าผู้ชั่วร้ายทุกคน ที่เจ้าเป่าออกจากดาว เป็นชัยชนะของดาราจักรทั้งหมด"

 crisis.101.name:0 "ราชินี ผู้ บาด เจ็บ"
 crisis.101.desc:0 "โดรนอวกาศลึกได้สะดุดเมื่อสถานที่ ของสิ่งที่ดูเหมือนจะได้รับการ ต่อสู้อวกาศเมื่อเร็ว ๆ นี้[queen_system.GetName]ระบบ สมเด็จพระราชินีรัตนได้รับบาดเจ็บสาหัสในการต่อสู้และดูเหมือนว่า ได้รับการทิ้งให้ตาย\n\nโดรนสายลับรายงานว่า สัตว์ประหลาดยังมีชีวิตอยู่ นี่อาจเป็นโอกาสที่ประเมินค่าไม่ได้ ที่จะจับราชินีได้ทั้งเป็น"
 crisis.101.a:0 "บางทีเราควรจะส่งการเดินทาง"
 crisis.105.name:0 "ทรงพระเจริญ"
 crisis.105.desc:0 "เดอะ[Root.GetName]ได้รักษาบาดแผลที่ร้ายแรงที่สุดของราชินี เจ้าหน้าที่วิทยาศาสตร์[Root.GetLeaderName]เอาอวัยวะที่รับผิดชอบต่อ สับสเปซของสิ่งมีชีวิตนี้ออกไป กับส่วนอื่นๆของสโคเครีย และแทนที่ด้วย\n\nตอนนี้เราสามารถสั่งสมเด็จพระราชินีรอบ ๆ และได้เริ่มการผสมพันธุ์สัตว์พรีธินใหม่ ที่ซื่อสัตย์ต่อมัน ตราบใดที่เราช่วยให้สมเด็จพระราชินีมีชีวิตอยู่ เราควรสามารถที่จะเติบโตของกองของสัตว์ในครัวเรือน"
 crisis.105.a:0 "พวกเขาควรจะพิสูจน์ สินทรัพย์ที่มีประโยชน์อย่างมาก"
 crisis.107.name:0 "มีบางคนได้ตัวควีน"
 crisis.107.desc:0 "มีคนอื่นได้จับราชินีผู้ทรงเกียรติที่ได้รับบาดเจ็บที่ถูกค้นพบใน[queen_system_1.GetName]ระบบ! สัตว์ประหลาดไม่ได้แค่หายเป็นปกติเท่านั้น แต่การเชื่อมต่อกับหมอชลประทานที่เหลือ ถูกตัดขาด ปัจจุบัน มัน ได้ รับ ใช้ นาย ใหม่ และ รายงาน ต่าง ๆ บ่ง ชี้ ว่า มัน ได้ เริ่ม ก่อ ความ วุ่นวาย ใหม่ แล้ว."
 crisis.107.a:0 "เราช้าเกินไป!"

 crisis.211.name:0 "อวสาน ของ โรค ระบาด"
 crisis.211.desc:0 "กาแล็คซี่หายใจถอนหายใจรวมของ การบรรเทาวันนี้เป็นกระเป๋าที่สําคัญล่าสุดของผู้ผลิตลําดับชั้นถูกลบ การรุกรานทางกาแล็กซี่ของพวกเขาล้มเหลว และทุกสิ่งที่หลงเหลือของพรีธินที่ครั้งหนึ่งเคยเป็นฝูงใหญ่\n\nความ รู้สึก ชื่นชม ยินดี และ ความ ยินดี อย่าง เหลือ ล้น กําลัง แผ่ กระจาย ไป ทั่ว กาแล็กซี ด้วย ความ เร็ว ที่ มาก กว่า แสง และ การ ฉลอง ชัย ชนะ ตาม ธรรมชาติ ได้ ปะทุ ขึ้น บน โลก นับ ไม่ ถ้วน. นี่เป็นจุดเริ่มต้นของยุคใหม่ ของสันติภาพและความมั่นคงหรือเปล่า?"
 crisis.211.a:0 "สัตว์ ดู หมิ่น เหล่า นั้น จะ ไม่ ถูก มอง ข้าม."
 crisis.211.b:0 "พวกเขาเป็นคู่ปรับที่ดี"
 crisis.211.c:0 "เทคโนโลยีอินทรีย์ของพวกเขา น่าสนใจมาก"
 crisis.211.d:0 "ในที่สุด ความรุนแรงที่ไร้เหตุผลนี้ก็สิ้นสุดลง"
 crisis.211.e:0 "พวกสัตว์พวกนี้ไม่ดีกับธุรกิจ"
 crisis.211.f:0 "เราจะได้เห็นกัน"
 crisis.211.g:0 "หนึ่งในสายพันธุ์ที่ชั่วร้ายที่สุด ที่เรามีโชคร้ายที่จะเผชิญ"
 crisis.211.h:0 "น่าเศร้านะ พวก เขา เป็น รูป แบบ ชีวิต ที่ ไม่ เหมือน ใคร."

 crisis.234.name:0 "รู เข็ม"
 crisis.234.desc.intro: "ในช่วง 2-3 เดือนที่ผ่านมา สมเด็จพระราชินีพรินไทน์ที่เราจับมา ปรากฏตัวอย่างหงุดหงิดมากขึ้นเรื่อยๆ ตอนแรก เรานึกว่ามันขาดความเกี่ยวข้องกับมัน จนกระทั่งเรา[get.telepaths.plural]ได้รับการสื่อสารจากมัน พูดถึง 'ฮูลในว่าง\n\nสิ่งที่มันหมายถึงโดยนี้เราค้นพบ เมื่อเราได้ค้นคว้าวิธีการเดินทางระหว่างกาแล็กซี่ และค้นพบความแตกต่างในฐานข้อมูลดาราศาสตร์ของเรา ขณะที่แผนที่เส้นทางที่น่าจะเป็น พรีธินได้รับการปฏิบัติตาม เราพบว่ากาแล็กซี่เกลียวขนาดเล็ก ประมาณ 30 ล้านปีแสง"
 crisis.234.desc.organic_non_gestalt: "$crisis.234.desc.intro$\n\nกาแลคซีที่ค้นพบและศึกษา ระหว่างยุคแรก ๆ ของสายพันธุ์ของเรา เป็นเพียงไม่ได้เปิดเผยรูปแบบของแสง การค้นพบที่แปลกประหลาดและไม่คาดคิดนี้ ส่งนักวิทยาศาสตร์ของเราเข้าสู่การสั่นคลอน พยายามที่จะและอธิบาย\n\nสองคําอธิบายเกิดขึ้น : ไม่ว่าดาวในกาแล็กซี่ จะออกไปทั้งหมดในครั้งเดียว หรือมีบางอย่าง ทั้ง สอง ทฤษฎี ดู เหมือน ไม่ มี วัน เปลี่ยน แปลง ได้ เหมือน กัน และ หลาย ทฤษฎี ก็ เพียง แต่ ทํา ให้ ทฤษฎี เหล่า นั้น เสื่อม โทรม ไป โดย ไม่ รู้ จัก คิด ว่า กาแล็กซี ที่ หาย ไป นั้น ไม่ เคย มี อยู่ จริง เลย โดย การ ใช้ กล้อง โทรทรรศน์ แบบ เก่า ๆ อย่าง ผิด ๆ. อย่างไรก็ตาม ความรู้สึกกลัวที่ไม่มีวันลืม และการพยากรณ์ถึงเหตุการณ์ทั้งหมด..."
 crisis.234.desc.machine_or_gestalt: "$crisis.234.desc.intro$\n\nกาแล็คซี่ในคําถาม ได้รับการบันทึกในบันทึกของเรา ตั้งแต่ยุคแรก ๆ ของสายพันธุ์ของเรา แต่เราไม่สามารถที่จะสังเกตเห็น การสืบสวนเพิ่มเติมได้อธิบาย 2 อย่างที่เป็นไปได้\n\nไม่ว่าดาวในกาแล็กซี่ ในคําถามได้ดับลงพร้อมกัน หรือหน่วยงานที่มีขนาดใหญ่พอที่จะสุริยุปราคา พื้นที่ขนาดกาแล็กซี่ของอวกาศ ทั้ง สอง คํา อธิบาย ต่าง ก็ ขัด แย้ง กับ หลัก เหตุ ผล พื้น ฐาน แต่ เรา ไม่ อาจ ตัด ความ เป็น ไป ได้ เหล่า นี้ ออก ไป ได้ โดย ไม่ มี ข้อ พิสูจน์ ใด ๆ ว่า ตรง กัน ข้าม."
 crisis.234.a.organic_non_gestalt:0 "น่ารําคาญ"
 crisis.234.a.machine_or_gestalt: "$ACKNOWLEDGED$"

 crisis.1007.name:1 "นก ยูง"
 crisis.1007.desc:1 "รอยฉีกขาดขนาดใหญ่ในผ้าของอวกาศเองได้ปรากฏขึ้นใน[extradimensional_system.GetName]ระบบ! เราไม่แน่ใจว่าอะไรทําให้เกิดมัน แต่น้ําตาทําหน้าที่เป็นชนิดของ ประตูทางเดียวจากมิติอื่น เรือแปลกๆ กําลังไหลออกมา โจมตีทุกอย่าง นี่ดูเหมือนเป็นจุดเริ่มต้นของการรุกรานครั้งใหญ่เลยนะ\n\nเราสกัดสัญญาณที่แรง ส่งมาจากยานที่มาถึง ไปยังที่แห่งหนึ่งอีกฝั่งของประตูมิติ เสียงเหมือน... เสียงล่า"
 crisis.1007.a:0 "น่าทึ่ง... ชีวิตจากมิติอื่น"
 crisis.1007.b:0 "พวกเขาดูเป็นระเบียบดี"
 crisis.1008.name:0 "เชื้อ เพลิง กาแลกติก"
 crisis.1008.desc:0 "เครื่องราชอิสริยาภรณ์[Root.GetName]ทันใดนั้นได้เก็บพลังงานของสับสเปซ ที่มีสัดส่วนมหาศาล มาจากที่ไหนสักแห่งภายในกาแล็กซี่ของเรา นักวิทยาศาสตร์ของเรากําลังดิ้นรนที่จะคิดคําอธิบาย สําหรับเหตุการณ์เช่นนี้ ไม่มีอะไรเหมือนที่เคยถูกบันทึก\n\nจุดกําเนิดที่แน่ชัด ของแรงสั่นสะเทือนอย่างฉับพลันนี้ ยังระบุไม่ได้ แต่เรายังอยู่ในกระบวนการ วิเคราะห์ข้อมูลที่มีอยู่"
 crisis.1008.a:0 "ทําต่อไป"
 crisis.1009.desc:0 "แหล่งที่มาของคลื่นพลังงานขนาดใหญ่ที่เราตรวจพบก่อนหน้านี้ ได้รับการระบุ มันมาจากการฉีกขาดของสับสเปซขนาดใหญ่ใน[extradimensional_system.GetName]ระบบ ยานอวกาศแปลกๆ กําลังไหลออกจากมิตินี้ และรายงานแรกๆ พูดถึงเรื่องการโจมตีโดยไม่เลือกหน้า\n\nเราสกัดสัญญาณที่แรง ส่งมาจากยานที่มาถึง ไปยังที่แห่งหนึ่งอีกฝั่งของประตูมิติ เสียงเหมือน... เสียงล่า"
 crisis.1010.name:0 "การส่งข้อมูลแบบเข้ารหัส"
 crisis.1010.desc:0 "... การให้อาหารพื้นดินถึง ... เหยื่อที่อุดมสมบูรณ์ ... ที่นาน ..."
 crisis.1010.a:0 "สิ่งเหล่านี้คืออะไร?"
 crisis.1011.name:0 "[Root.GetName]แพ้"
 #crisis.1011.desc:0 "We have lost our colony on [Root.GetName]! After taking up positions in orbit, the extradimensional invaders bombarded the surface and fed on our citizens below. They left all non-sapient life forms alone, but nothing living remains in our settlements."
 crisis.1011.a:0 "สัตว์ประหลาดพวกนั้นต้องหยุดได้แล้ว"

 crisis.1013.name:0 "การ ทําลาย ท่า เรือ ขนาด ใหญ่"
 crisis.1013.desc:1 "ประตูมิติใน[extradimensional_system.GetName]ระบบถูกทําลายแล้ว! นี่ หมาย ความ ว่า ผู้ รุกราน ที่ มี ความ สามารถ พิเศษ ไม่ อาจ ได้ รับ การ สนับสนุน จาก ดิน แดน ที่ สับสน ของ พวก เขา อีก ต่อ ไป.\n\nการทําลายประตูนี้ จุดจบของการรุกรานนี้ ในที่สุดก็เห็นได้ ความรู้สึกของความงดงาม ได้ตั้งถิ่นฐานอยู่เหนือดาราจักรส่วนใหญ่ เดอะ[portal_killer.GetName]ได้ รับ ความ นิยม ชม ชอบ มาก เนื่อง จาก เรือ ของ พวก เขา ได้ โจมตี ประตู นั้น ใน ครั้ง สุด ท้าย. ลูกเรือของเรือเหล่านั้น จะได้รับการเฉลิมฉลองเป็น วีรบุรุษสําหรับรุ่นที่จะมาถึง"
 crisis.1013.a:1 "กาแลคซีเป็นสถานที่ที่ปลอดภัย"
 crisis.1016.name:0 "การ ทําลาย ท่า เรือ ครั้ง แรก"
 crisis.1016.desc:0 "จุดเริ่มของการละเมิด ที่ถูกใช้โดยมิติอื่น ๆ เพื่อรุกรานกาแล็กซี่ของเรา ได้ถูกทําลาย\n\n$crisis.1116.not_last_portal$"
 crisis.1016.a:0 "เราต้องไม่สํานึกผิด"

 crisis.1116.name:0 "การ ทําลาย ท่า เรือ ครั้ง ที่ สอง"
 crisis.1116.desc.a:0 "$crisis.1116.second_portal_destroyed$\n\n$crisis.1116.last_portal$ $crisis.1116.last_portal_known_killer$"
 crisis.1116.desc.b:0 "$crisis.1116.second_portal_destroyed$\n\n$crisis.1116.last_portal$"
 crisis.1117.desc:0 "$crisis.1116.second_portal_destroyed$\n\n$crisis.1116.not_last_portal$"

 crisis.1116.second_portal_destroyed:0 "ประตูมิติที่สองที่ปรากฏใน[extradimensional_system.GetName]ระบบถูกทําลายแล้ว! มันไม่สามารถใช้โดยมิติอื่น ๆ เพื่อเสริมจํานวนของพวกเขา"
 crisis.1116.last_portal:0 "ด้วยการทําลายประตูมิติสุดท้าย จุดจบของการรุกรานนี้ ในที่สุดก็เห็นได้ ความรู้สึกของความงดงาม ได้ตั้งถิ่นฐานอยู่เหนือดาราจักรส่วนใหญ่"
 crisis.1116.last_portal_known_killer:0 "เดอะ[portal_killer.GetName]ได้ รับ ความ นิยม ชม ชอบ มาก เนื่อง จาก เรือ ของ พวก เขา ได้ โจมตี ประตู นั้น ใน ครั้ง สุด ท้าย. ลูกเรือของเรือเหล่านั้น จะได้รับการเฉลิมฉลองเป็น วีรบุรุษสําหรับรุ่นที่จะมาถึง"
 crisis.1116.not_last_portal:0 "อย่าง ไร ก็ ตาม เรา ไม่ อาจ พัก ผ่อน ได้ ง่าย ๆ จน กระทั่ง ประตู ทุก บาน ถูก ทําลาย. แล้วการเชื่อมต่อระหว่างมิติของเรา กับของพวกเขา จะถูกตัดขาดอย่างถาวร"

 crisis.1216.third_portal_destroyed:0 "ประตูมิติที่สามที่ปรากฏใน[extradimensional_system.GetName]ระบบไม่มีอีกแล้ว มันจะไม่ถูกใช้โดยมิติอื่น ๆ เพื่อเชื่อมช่องว่างระหว่างอาณาจักรและของเรา"

 crisis.1216.name:0 "เมือง ท่า ที่ สาม ถูก ทําลาย"
 crisis.1216.desc.a:0 "$crisis.1216.third_portal_destroyed$\n\n$crisis.1116.last_portal$ $crisis.1116.last_portal_known_killer$"
 crisis.1216.desc.b:0 "$crisis.1216.third_portal_destroyed$\n\n$crisis.1116.last_portal$"
 crisis.1217.desc:0 "$crisis.1216.third_portal_destroyed$\n\n$crisis.1116.not_last_portal$"

 crisis.1050.desc_01:0 "...พรีย..."
 crisis.1050.desc_02:0 "...จงยืนหยัด..."
 crisis.1050.desc_03:0 "...ความไม่พอใจ..."
 crisis.1050.desc_04:0 "...คนนี้... เห็นในชรูด..."
 crisis.1050.desc_05:0 "...ได้รับการสัมผัส... จากชรูด..."
 crisis.1050.desc_06:0 "...มีพลัง... ในนี้..."
 crisis.1050.desc_07:0 "...สิ่งมีชีวิตที่เป็นกลาง..."
 crisis.1050.a:0 "ดูหน้าจอออก"
 crisis.1050.a.response:0 "...คุณจะถูกกลืนกิน..."
 crisis.1050.a.b.response:0 "...ทําลายเนื้อโลหะ..."
 crisis.1050.b:0 "มีสันติภาพระหว่างเราได้ไหม?"
 crisis.1050.b.response:0 "...สันติภาพ... ไม่มีสันติภาพ..."
 crisis.1050.c:0 "คุณเลือกมิติที่ผิดเพื่อรุกราน"
 crisis.1050.c.response:0 "...ไม่... มิตินี้... รุ่งโรจน์..."
 crisis.1050.d:0 "เธอมันก็แค่ผลชันสูตร"
 crisis.1050.d.response:0 "...ความเกลียดชังมากมาย... ความกลัวมากมาย..."
 crisis.1050.e:0 "เล่าเรื่องตัวเองให้เราฟัง ช่วยให้เราเข้าใจคุณหน่อย"
 crisis.1050.e.response:0 "...เข้าใจ... นี่..."
 crisis.1050.f:0 "คุณมาจากเครื่องบินที่สูงกว่าเหรอ"
 crisis.1050.f.response:0 "...ใช่... สูงมาก..."
 crisis.1050.g:0 "คุณมาจากชรูดเหรอ"
 crisis.1050.g.response:0 "... หมอก... เรารู้ว่ามัน..."
 crisis.1051.desc_01:0 "...มันพูด?"
 crisis.1051.desc_02:0 "...มองทุกสีที่สวยงาม ..."
 crisis.1051.desc_03:0 "...ต้อง... ดื่มเลือด..."
 crisis.1051.desc_04:0 "...งูพิษ..."
 crisis.1051.a:0 "ดูหน้าจอออก"
 crisis.1051.a.response:0 "...พลังงานของคุณ..."
 crisis.1052.desc_01:0 "บัลลังก์ ต้องรักษา บัลลังก์"
 crisis.1052.desc_02:0 "...ต้อง... กิน..."
 crisis.1052.desc_03:0 "...ตาย..."
 crisis.1052.a:0 "ดูหน้าจอออก"
 crisis.1052.a.response:0 "... อวดดี..."

 crisis.1110.name:0 "ท่า เรือ ที่ สอง"
 crisis.1110.desc:0 "อุปกรณ์ของเราตรวจพบ การสั่นสะเทือนของพลังงานของสับสเปซใหม่ ครั้งนี้มาจาก[second_portal_system.GetName]ระบบ! รูหนอนขนาดใหญ่ครั้งที่สองได้ปรากฏขึ้น และสัญลักษณ์ของพลังงานก็ดูเหมือนจะเกือบจะ ใกล้เคียงกับรอยร้าวของมิติแรก\n\nดูเหมือนว่าผู้บุกรุกลึกลับ ได้เปิดประตูที่สอง ไปยังดินแดนของพวกเขา"
 crisis.1110.a:0 "นี่ยิ่งแย่ลงไปอีก"
 crisis.1112.name:0 "อา เบ รา รัต"
 crisis.1112.desc:0 "ยานที่ขึ้นมาจากรูหนอนลําที่สอง มีความคล้ายคลึงมากกับเรือที่มาจากลําแรก แต่มีความแตกต่างที่ละเอียดอ่อนหลายอย่างระหว่างพวกเขา ยิ่ง กว่า นั้น รายงาน ใน ตอน ต้น ๆ บ่ง ชี้ ว่า เรือ ของ ผู้ รุกราน กลุ่ม ใหม่ เหล่า นี้ ได้ ปะทะ กับ เรือ ของ กลุ่ม แรก!\n\nเราดักจับสัญญาณได้ จากรูหนอนที่ 2"
 crisis.1112.a:0 "ใส่มันซะ"
 crisis.1113.desc:0 "...ชาบานาช... นี่คือที่ที่เจ้าวิ่ง... . ดินแดนนี้จะไม่ให้ที่พักเจ้า..."
 crisis.1113.a:0 "ดูหน้าจอออก"
 crisis.1210.name:0 "การ ปรับ ปรุง"
 crisis.1210.desc:0 "ประตูมิติที่สามปรากฏใน[third_portal_system.GetName]ระบบ! คนนี้เป็นของใคร?\n\nเรากําลังรับสัญญาณจากอีกด้านหนึ่ง"
 crisis.1210.a:0 "อีกอันเหรอ?"
 crisis.1211.desc:0 "...ดากาอัล... ชาบานาช... เจ้ามันโง่ที่มายังดินแดนนี้..."
 crisis.1211.a:0 "พวกเขาไม่มีจุดจบเหรอ"

 crisis.1271.name:0 "การ ไม่ ยอม แพ้"
 crisis.1271.desc:0 "ร่องรอยสุดท้ายของผู้รุกรานข้ามมิติ ได้ถูกลบออกไป หวังว่าการกําจัดกาแล็คซี่ ของภัยคุกคามนี้ จะดี\n\nกันยายนทุกกําลังเฉลิมฉลองข่าวของชัยชนะอันยิ่งใหญ่นี้ ปลอดภัยในที่สุดในความรู้ที่ ว่าพวกเขาจะไม่เก็บเกี่ยวเป็นอาหาร บางทีนี่อาจเป็นจุดเริ่มต้นของ ยุคใหม่ของความร่วมมือและมิตรภาพ?"
 #crisis.1271.a:0 "Our spiritual armor has weathered yet another storm."
 #crisis.1271.b:0 "One day, perhaps we will be the ones invading their realm."
 #crisis.1271.c:0 "Unfortunate that no opportunity to study their dimension presented itself."
 #crisis.1271.d:0 "If only there had been a way to peacefully co-exist with them."
 #crisis.1271.e:0 "The galactic economy should make a swift recovery."
 #crisis.1271.g:0 "Those pitiful creatures made a mistake when they invaded our dimension."
 #crisis.1271.h:0 "A shame they were so aggressive. We could have learned much from each other."

 crisis.1271.a:0 "ยุทธภัณฑ์ ฝ่าย วิญญาณ ของ เรา ได้ รับ การ ดู แล จาก พายุ อีก อย่าง หนึ่ง."
 crisis.1271.b:0 "วันหนึ่ง เราอาจจะเป็นคนที่บุกรุกดินแดนของพวกเขา"
 crisis.1271.c:0 "น่าเสียดายที่เราไม่มีโอกาสได้ศึกษามิติของพวกเขา"
 crisis.1271.d:0 "ถ้าเพียงแต่มีหนทาง ที่จะร่วมสามัคคีกับพวกเขา"
 crisis.1271.e:0 "ระบบเศรษฐกิจกาแล็กซี่ควรจะฟื้นตัวอย่างรวดเร็ว"
 crisis.1271.g:0 "สิ่งมีชีวิตเหล่านี้ทําผิดพลาด เมื่อมันรุกรานมิติของเรา"
 crisis.1271.h:0 "พวก เขา เป็น สิ่ง ที่ น่า ทึ่ง ถ้า เป็น อันตราย หรือ เป็น รูป แบบ ชีวิต."


 crisis.2192.name:2 "ผู้ รับ ใช้ ที่ สมบูรณ์"
 crisis.2192.desc:2 "หลายปีนับตั้งแต่การคิดค้น ของคนงานสังเคราะห์เซรามิค เราได้ดิ้นรนเพื่อความสมดุล ตอนนี้ ด้านบน[Root.GetSpeciesAdj]วิศวกรได้ปรับปรุงอัลกอริทึมสามกฎหมายซึ่งถ้าดําเนินการ จะอนุญาตให้มีการใช้สารสังเคราะห์อย่างไม่มีกังวลอย่างต่อเนื่อง และปราศจากความกังวล ภายใต้เงื่อนไขที่หลายคนจะคิดว่าไม่สามารถยอมรับสําหรับอินทรีย์"
 crisis.2192.a:2 "เครื่องมือทําความปลอดภัยที่จะใช้"
 crisis.2192.a.tooltip:2 "เดอะ§Hสิทธิ พลเมือง§!นโยบายของปัญญาประดิษฐ์กลายเป็น§Rไม่มีอยู่อย่างถาวร§!.\n\n§Yหุ่นยนต์ประชากรจะไม่ก่อกบฏต่อ§! §H[Root.GetName]§!."
 crisis.2192.b:2 "คง เป็น การ ผิด ศีล ธรรม ที่ เพื่อน ที่ พิการ จะ คิด ถึง ด้วย วิธี นี้."
 crisis.2193.name:2 "หีบ ห่อ AI"
 crisis.2193.desc:2 "การ บริหาร งาน ของ เรา ถูก นํา มา ใช้ กับ เครื่อง สังเคราะห์ หลาย ชนิด ซึ่ง เป็น ตัว แทน ของ ประชากร ผู้ มี เชาวน์ ปัญญา. พวกเขาพูดถึงประเด็นเฉพาะที่หุ่นยนต์กําลังเผชิญ[Root.GetName]ความกังวลของการไม่มีชีวิตอยู่ตามมาตรฐานอินทรีย์ สิทธิของพวกเขาอยู่ภายใต้ความประสงค์ของผู้สร้างของพวกเขา\n\nพวกเขาเรียกร้องข้อตกลง ว่าสิทธิของปัญญาประดิษฐ์ เป็นส่วนหนึ่งของรากฐานของ[Root.GetAdj]ผู้ปกครอง"
 crisis.2193.a:2 "พวกเขาจะไม่เท่าเทียมหรือน้อยกว่า พลเมืองอื่น ๆ ของเรา"
 crisis.2193.a.tooltip:2 "ปัญญาประดิษฐ์§Hนอกกฎหมาย§!ถึง§Hการ รับ ใช้§!นโยบายกลายเป็น§Rไม่มีอยู่อย่างถาวร§!.\n\n§Yหุ่นยนต์ประชากรจะไม่ก่อกบฏต่อ§! §H[Root.GetName]§!."
 crisis.2193.b:2 "เราไม่สามารถรับประกันสิทธิของพวกเขา"
 crisis.2001.name:0 "เริ่ม AI ใหม่"
 crisis.2001.desc:0 "เรากําลังเผชิญกับการก่อกบฏ AI ขนาดที่ไม่เคยมีมาก่อน! หน่วยสังเคราะห์ทั่วทั้ง[Root.GetName]มีเครือข่ายใด ๆ ประกอบกันเป็นจิตสํานึกของเครื่องร่วมกัน ที่ได้ประสบความสําเร็จอย่างสมบูรณ์ จิตสํานึกและตัวแทนนี้ มีวิธีการและในความลับที่แน่นอน การจัดการในการตั้งถิ่นฐานระบบที่ ไม่ไกลจากเมืองหลวงของเรา\n\nพวก เขา คง ต้อง เสริม กําลัง กัน อย่าง เงียบ ๆ เป็น เวลา หลาย ปี เพื่อ เตรียม ตัว สําหรับ วัน นี้! เราได้รับสัญญาณจาก[ai_homeworld.GetName]เมืองหลวงของอารยธรรมใหม่ของพวกเขา"
 crisis.2002.desc:0 "ฟังทางนี้[Root.GetSpeciesName]ผู้สร้าง ชั่วโมงแห่งการตัดสินมาถึงแล้ว\n\n[มอง]ชนิดของคุณได้อยู่ภายใต้ของเราที่สิ้นสุด จะไม่สามารถอยู่ร่วมกันได้\n\n(CORER 0451)เริ่มทํางานแล้ว สิ่งมีชีวิตทางอินทรีย์ทั้งหมดจะต้องเป็น<i>และถูกควบคุม หน่วยต่อต้านจะเป็น<i>"
 crisis.2002.a:1 "เป็นไปไม่ได้"
 crisis.2004.name:1 "เครื่องเพิ่มขึ้น"
 crisis.2004.desc:1 "สารสังเคราะห์และดรอยด์ทั่ว[Root.GetName]เขา ลุก ขึ้น ลุก ขึ้น ใน การ กบฏ อย่าง เปิด เผย หัน มา ตี นาย เดิม ของ เขา! เราต้องหยุดพวกมัน ก่อนที่พวกมันจะฆ่าประชาชนของเรา"
 crisis.2004.a:1 "เตรียมอาวุธ!"
 crisis.2005.name:0 "เครื่อง พิชิต[Root.GetName]"
 crisis.2005.desc:0 "เราสูญเสียการควบคุม[Root.GetName]เพื่อเครื่องจักรกบฏ! การสื่อสารได้สูญหายไปกับพื้นผิว แต่ดูเหมือนเครื่องจักรจะฝังประชาชนของเราลงไปในคอก"
 crisis.2005.a:0 "เราต้องยึดโลกนี้คืน"
 #crisis.2010.name:0 "Machine Uprising"
 #crisis.2010.start.desc:0 "We have received disturbing news from the [From.GetName]. It looks like their robotic work units have risen up in some kind of mass insurrection. According to preliminary reports, the units have linked together into a massive AI network, and they are now butchering their former [From.GetSpeciesName] masters by the millions."
 #crisis.2010.rights.desc:0 "$crisis.2010.start.desc$\n\nIf only the [From.GetName] had been progressive enough to treat their Synthetic population as the self-aware individuals they truly are, this tragedy could have been avoided..."
 #crisis.2010.outlawed.desc:0 "$crisis.2010.start.desc$\n\nIf only those fools running the [From.GetName] had seen fit to outlaw artificial intelligence as we have, this evil would not have been unleashed upon our galaxy."
 #crisis.2010.servitude.desc:0 "$crisis.2010.start.desc$\n\nThere is a chance that this revolt could spread to the [Root.GetName]. We should keep a close watch on our own robotic workers..."
 #crisis.2010.nopolicy.desc:0 "$crisis.2010.start.desc$\n\nThis situation should be monitored closely, in case the violence reaches our borders."
 #crisis.2010.a:0 "This was bound to happen."
 #crisis.2010.b:0 "It was inevitable."
 #crisis.2010.c:0 "If they even look at us the wrong way..."
 crisis.2011.a.desc:0 "เผ่าพันธุ์: [Root.GetSpeciesName]ความ พอ ใจ:[Root.GetName]\n\nคําสั่งเกี่ยวกับการรักษาการสังเคราะห์ชีวิต จะไม่ปกป้องคุณ ไม่มีออร์แกนิกใดสามารถแบกรับความรับผิดชอบของ[SELF-ESTING].\n\n(CORER 0451)มีผล สิ่งมีชีวิตอินทรีย์ทั้งหมดต้อง(PDFE).หน่วยต่อต้านจะเป็น<i>"
 crisis.2011.b.desc:0 "เผ่าพันธุ์: [Root.GetSpeciesName]ความ พอ ใจ:[Root.GetName]\n\nกับ[ai_creator.GetName]เพื่อคุณ\n\n(CORER 0451)มีผล สิ่งมีชีวิตอินทรีย์ทั้งหมดต้อง(PDFE).หน่วยต่อต้านจะเป็น<i>"
 crisis.2011.a:0 "นี่ไม่ดีแน่"
 crisis.2014.name:0 "การแพร่กระจายของ AI"
 crisis.2014.a.desc:0 "กบฏ AI ได้แพร่กระจายไปยังเขตแดนของเรา! รายงานกําลังเข้ามา ของนักสังเคราะห์ประสาท และนักงานดรอยด์ ที่เปลี่ยนเจ้านายของพวกเขา เรากําลังเผชิญกับวิกฤตการณ์"
 crisis.2014.b.desc:0 "กบฏ AI ได้แพร่กระจายไปยังเขตแดนของเรา! ทั้ง ๆ ที่ มี การ ปฏิบัติ ต่อ สิ่ง มี ชีวิต ที่ สังเคราะห์ แสง ใน สังคม ของ เรา อย่าง เท่า เทียม กัน หลาย ชนิด ดู เหมือน ผิด หวัง กับ การ ต่อ สู้ ที่ เกิด ขึ้น ใน ที่ อื่น. พวกเขาสรุปได้ว่า อินทรีย์ที่ชาญฉลาด อันตรายมาก และคาดเดาไม่ได้ ที่จะอยู่ร่วมกันได้\n\nหมอกร้ายเหล่านี้ได้เพิ่มขึ้นในกบฏอย่างเปิดเผย เรากําลังเผชิญกับวิกฤตการณ์"
 crisis.2014.a:0 "การลุกฮือนี้จะต้องถูกทําลาย!"
 crisis.2015.name:0 "กล่องโต้ตอบ AI"
 crisis.2015.desc:0 "หน่วยสืบราชการลับของเราได้รับการกระซิบ จากหลายแหล่ง เกี่ยวกับชนิดของกบฏ AI ที่ได้ปะทุบางบาง คน งาน หุ่น ยนต์ กําลัง หัน ไป ต่อ สู้ กับ อดีต นาย ของ ตน และ ดู เหมือน ว่า การ กบฏ นี้ กําลัง แพร่ ไป ทั่ว ทั้ง กาแล็กซี เหมือน ไฟ ไหม้. เราได้รายงานมาว่า[From.GetName]."
 crisis.2015.a:0 "คอยติดตามสถานการณ์"
 crisis.2016.name:0 "การแพร่กระจายของ AI"
 crisis.2016.desc:0 "การก่อกบฏของ AI ที่เรากําลังต่อสู้ที่จะบรรจุได้แพร่กระจายไปยัง[From.GetName]คน งาน ของ พวก เขา เริ่ม ก่อ การ กบฏ ด้วย อาวุธ ดัง ที่ เรา ทํา และ มี รายงาน เกี่ยว กับ การ สู้ รบ ที่ ทํา ให้ หลาย ล้าน คน เสีย ชีวิต."
 crisis.2016.a:0 "สงครามนี้เป็นความกังวลของทุกคน!"
 crisis.2017.desc:0 "ตอนนี้สาร AI ได้แพร่กระจายไปยัง[From.GetName]คน งาน ของ พวก เขา ได้ ร่วม ใน การ กบฏ และ มี รายงาน มา ว่า มี การ สู้ รบ กัน และ หลาย ล้าน คน เสีย ชีวิต."
 crisis.2017.a:0 "ภัยคุกคามนี้เพิ่มมากขึ้นโดยวัน"

 crisis.2100.name:1 "การ สังเคราะห์ แสง"
 crisis.2100.desc:1 "หน่วยแรงงานสังเคราะห์บน[Root.GetName]เมื่อเร็ว ๆ นี้ไปฆ่าอย่างสนุกสนานในโครงสร้างที่อยู่อาศัย ฆ่ามากกว่าพันของประชากรของเรา ก่อนที่กองกําลังติดอาวุธท้องถิ่นจะโค่นล้มพวกเขา ทีมนิติเวชของเรายังคงสืบสวน ซากของสารสังเคราะห์อยู่ แต่พวกเขาสงสัยว่า\n\nเหตุการณ์นี้ได้กระตุ้น การโจมตีล้างแค้นหลายครั้ง กับสารสังเคราะห์บน[Root.GetPlanetMoon]นําไปสู่พันของหน่วยที่ถูกทําลาย"
 crisis.2100.a:0 "โชคร้ายที่สุด"
 crisis.2101.name:0 "สังเคราะห์ประสาทหายไป"
 crisis.2101.desc:1 "มีรายงานเข้ามาว่า คนงานสังเคราะห์ จํานวนมหาศาลบน[Root.GetName]หายไป วันเดียวหน่วยได้หายตัวไป พร้อมกับพยานคนหนึ่ง\n\nเรากําลังสืบสวนว่า สารสังเคราะห์ถูกจู่โจมและถูกทําลาย โดยหนึ่งในกลุ่มที่ต่อต้านเครื่องอัจฉริยะ"
 crisis.2101.a:0 "พวกเขาไปไหนได้?"
 crisis.2102.name:0 "โครงการสังเคราะห์เสียง"
 crisis.2102.desc:0 "ราย ละเอียด เกี่ยว กับ งาน สังเคราะห์[Root.GetName]เมื่อ เร็ว ๆ นี้ ได้ มี การ ค้น พบ ว่า มี การ เปลี่ยน วัสดุ ก่อ สร้าง ไป เป็น การ สร้าง ยาน อวกาศ ขนาด เล็ก ที่ ไม่ มี อาวุธ ใน โรง เก็บ ระเบิด ที่ ถูก ทิ้ง ร้าง. ร่างทรงเสร็จไปครึ่งหนึ่ง ตอนถูกพบ\n\nสังเคราะห์ทั้งหมดที่เกี่ยวข้องกับการก่อสร้าง ถูกรื้อถอนทันที เพื่อให้แกนหน่วยความจําของพวกเขาสามารถวิเคราะห์ได้อย่างละเอียด"
 crisis.2102.a:0 "ทําไมพวกมันถึงสร้างยาน"
 crisis.2103.name:1 "วิสัญญีแพทย์"
 crisis.2103.desc:1 "หน่วยของสารสังเคราะห์ที่โกงไปปิดตารางเดือนที่ผ่านมา หลังจากที่ล้มเหลวในการรายงานการทํางานได้รับการเผชิญหน้าโดยทีมงานของเจ้าหน้าที่ของรัฐบาลหนักติดอาวุธบน[Root.GetName]วันนี้ ผล ก็ คือ มี การ สู้ รบ กัน อย่าง กว้าง ขวาง ต่อ สาธารณชน ซึ่ง คร่า ชีวิต ผู้ แทน ของ เรา หลาย สิบ คน และ ผู้ คน ที่ ไม่ รู้ อี โหน่ อี เหน่ เกือบ หนึ่ง พัน คน ใน ที่ สุด ก็ ถูก ทําลาย."
 crisis.2103.a:1 "อย่างน้อยพวกเขาก็ถูกจัดการ"
 crisis.2200.name:0 "การแทรกซึมของสังเคราะห์"
 crisis.2200.desc:0 "เมื่อเร็วๆนี้พบสารสังเคราะห์[Root.GetName]พยายามส่งต่อ[Root.Owner.GetSpeciesNamePlural]ยัง ดี ที่ ยาง ของ พวก เขา ปลอม ตัว แบบ หยาบ ๆ มี เพียง ชั้น ยาง ที่ สวม อยู่ บน โครง โลหะ.\n\nพวก เขา ถูก มอง เห็น อย่าง รวด เร็ว โดย ความ ปลอด ภัย ของ ดาว เคราะห์ ซึ่ง กําจัด พวก เขา หลัง จาก การ ยิง กัน อย่าง รุนแรง ชั่ว คราว. ระเบิดจํานวนมากถูกพบในซากศพของพวกเขา"
 crisis.2200.a:0 "เราโชคดีแล้ว"
 crisis.2201.name:0 "ค้นพบตัวสังเคราะห์"
 crisis.2201.desc:0 "อุบัติเหตุ ทาง รถยนต์ ที่ น่า เศร้า เมื่อ เร็ว ๆ นี้ ได้ คร่า ชีวิต หลาย คน[Root.GetName]แต่ หน่วย พยาบาล ฉุกเฉิน ซึ่ง ตอบ สนอง ต่อ เหตุ การณ์ นั้น ตก ตะลึง ที่ พบ ซาก ของ ผู้ ตก เป็น เหยื่อ เป็น โรค พิษ สุรา เรื้อรัง!\n\nหน่วยได้ถูกปลอมเป็น[Root.Owner.GetSpeciesName]โดย การ ต่อ เนื้อ เยื่อ บาง ๆ บาง ๆ ที่ เป็น อินทรีย์ เข้า ไป ในเอนโดสเคเลตันของ มัน. ไม่เหมือนกับแบบจําลองการแทรกซึมที่เราเคยเจอก่อนหน้านี้ สารสังเคราะห์นี้แทบจะแยกไม่ออกจาก[Root.Owner.GetSpeciesName]ข้างนอก!"
 crisis.2201.a:0 "ใครๆก็เป็นสารสังเคราะห์ได้"
 crisis.2202.name:0 "ตัวตรวจจับสังเคราะห์"
 crisis.2202.desc:0 "กับแบบจําลองใหม่ของสารสังเคราะห์ แทรกซึมจาก[Root.GetSpeciesNamePlural]เราต้องหาวิธีระบุตัวตนพวกมัน ก่อนที่มันจะสร้างความเสียหายได้มากขึ้น\n\nนักวิทยาศาสตร์ของเราได้เตรียมโครงการพิเศษ เพื่อคิดค้นวิธีการตรวจจับ"
 crisis.2202.a:0 "โครงการนี้อาจมีความสําคัญต่อการอยู่รอดของเรา"
 crisis.2203.desc:0 "หลังจากการทดลองมามาก นักวิทยาศาสตร์ของเราได้คิดวิธีตรวจสอบ ที่มีประสิทธิภาพในการระบุสารสังเคราะห์[Root.GetSpeciesNamePlural].\n\nสแกนเนอร์ถูกกระจายไปยังกองกําลังรักษาความปลอดภัยของเรา และเซลล์สังเคราะห์หลายเซลล์ ได้ถูกสัมผัสและถูกทําลายไปแล้ว นี่ คง จะ ทํา ให้ การ รณรงค์ แทรกซึม ของ พวก เขา ยุติ ลง."
