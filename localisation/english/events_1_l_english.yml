 action.37.desc.hg:1 "เราต้องถอยกลับ แต่จงฟังคำเตือนของเรา คุณไม่สามารถหยั่งรู้ได้ว่าอนาคตมีอะไรรอคุณอยู่หากคุณยังคงเดินตามเส้นทางนี้ต่อไป"
 action.37.desc.kk:1 "คุณกัดมือที่ยื่นออกมาเพื่อช่วยคุณให้พ้นจากความพินาศ วันหนึ่ง ลูกหลานของคุณจะประณามที่คุณปฏิเสธปัญญาของเรา"
