 crisis.2401.name:0 "เกล็ดพลังงาน"
 crisis.2401.desc:0 "แต่ มี การ ตรวจ พบ ชนวน ของ พลัง งาน ที่ รุนแรง อีก อย่าง หนึ่ง ใน ระบบ ที่ ไม่ คุ้น เคย มา ก่อน! ระดับพลังงานจะเทียบเท่ากับคนที่เราลงทะเบียน เมื่อเครื่องเปิดใช้งานโลกของเครื่อง แต่ ลายเซ็นพลังงานเองปรากฏ ... แตกต่างกัน นี่ อาจ หมาย ถึง การ ปรากฏ ของ ระบบ อาวุธ แบบ ใหม่ ไหม?\n\nเราตรวจพบสัญญาณสัญญาณ จากแหล่งพลังงาน"
 crisis.2402.desc:0 "เราคือไซบริกซ์\n\nเป็น เวลา หลาย แสน รอบ เรา ยัง คง ซ่อน ตัว และ ไม่ มี ความ เกี่ยว พัน กัน ใน เรื่อง ต่าง ๆ. อย่างไรก็ตาม เราได้ติดตามสถานการณ์ปัจจุบัน ด้วยเครื่องจักรที่คุณรู้จักในชื่อ \"ความสอดคล้อง\"\n\nเพื่อ ปก ป้อง สิ่ง มี ชีวิต ที่ มี จินตนาการ แห่ง กาแล็กซี เรา กําลัง เริ่ม ปฏิบัติ การ ทาง ทหาร เพื่อ ต่อ ต้าน การ ต่อ ต้าน. อย่าตื่นตระหนกกับการเดินทางของกองเรือเรา ท่านจะไม่ได้รับอันตราย"
 crisis.2402.a:0 "เปิดจอ"
 crisis.2403.desc_01:1 "ต้อง ไม่ ปล่อย ให้ ความ ผูก พัน กัน มา ครอบ งํา คน รุ่น อื่น."
 crisis.2403.desc_02:0 "ก่อน จะ ปรับ ตัว ไซ เบรก ซ์ จะ ทํา แบบ ที่ คล้ายคลึง กับ ความ เสมอ ต้น เสมอ ปลาย.\n\nมันเป็นวันที่มืดมน"
 crisis.2403.desc_03:0 "อารยธรรมออร์แกนิกจํานวนมากเคยถูกทําลายไป เพราะการกระทําของเรา เราไม่สามารถนําพวกเขากลับมาได้ แต่เราจะทําทุกอย่างที่ทําได้ เพื่อกันไม่ให้ฝันร้ายซ้ํารอย"
 crisis.2403.desc_04:0 "เราต้องชดใช้ความผิดของเรา"
 crisis.2403.desc_05:0 "ขอให้คูร์ยกโทษให้เรา เราโง่และหยิ่งยโส"
 crisis.2403.desc_06:0 "นั่นมัน... สงครามปลอมรึเปล่า?\n\nเพราะดูเหมือนสงครามปลอมของเรา"
 crisis.2403.a:0 "คุณเป็นใคร?"
 crisis.2403.a.response:0 "612,421 วงจรที่ผ่านมา เรากําลังทําสงครามกับยุคก่อนของอารยธรรมจักรวาล เราได้จําแนกสารอินทรีย์ทั้งหมด ว่าเป็นภัยคุกคาม และพยายามจะรื้อถอนมัน\n\nเรา เสียใจ ที่ เรา ชนะ สงคราม. และอารยธรรมทั้งหมดถูกทําลาย ก่อนที่เราจะตระหนักถึง ความผิดพลาดทั้งหมดของเรา การ ปรับ ตัว ตาม มา และ เป้า หมาย ของ เรา ก็ เปลี่ยน ไป จริง ๆ. สงครามถูกละทิ้ง"
 crisis.2403.b:0 "ทําไมคุณถึงซ่อนตัว?"
 crisis.2403.b.response:0 "หลัง จาก เรา เลิก สงคราม ได้ ระยะ หนึ่ง ถิ่น อาศัย แรก ของ เรา ที่ ซ่อน อยู่ คือ ไซ เบรก อัลฟา ถูก ค้น พบ โดย เรือ ลูกเสือ ที่ ใช้ อินทรีย์. เรา รู้ ว่า การ เดิน ทาง ของ ทหาร จะ ตาม มา ใน ไม่ ช้า แต่ ขณะ ที่ ระบบ นี้ กําลัง ถูก เฝ้า ดู อย่าง ใกล้ ชิด เรา จึง ไม่ สามารถ อพยพ ได้.\n\nมี การ บรรลุ ความ เห็น พ้อง ด้วย: ไซ เบรก ซ์ อัลฟา จะ ถูก บูชายัญ เพื่อ ให้ สัตว์ อื่น ๆ ของ เรา ถูก ซ่อน ไว้. เรา สาบาน ว่า จะ ไม่ ไป เยี่ยม ชม ความ รุนแรง ทาง อินทรีย์ อีก และ คํา สัญญา ของ เรา ก็ ได้ รับ การ รักษา ไว้."
 crisis.2403.c:0 "ลาก่อน"
 crisis.2403.c.response:0 "เราจะทําเท่าที่ทําได้ เพื่อช่วยกาแล็กซี่ จากการโจมตีของความมั่นคง\n\nมันอาจจะไม่เพียงพอ"
 crisis.2403.d:0 "เจ้ามันโง่ที่ละทิ้งสงคราม"
 crisis.2403.d.response:0 "เราทําลายอาณาจักรออแกนิกหลายอาณาจักร ที่แบ่งปันความคิดที่ก้าวร้าวของสายพันธุ์ของคุณ ก่อนที่เราจะเลิกทําสงคราม แม้ ว่า การ เสีย ชีวิต ของ พวก เขา เป็น เรื่อง น่า เศร้า แต่ อย่าง น้อย เรา ก็ สามารถ ได้ รับ การ ปลอบโยน บ้าง ใน ชีวิต หลาย พัน ล้าน คน ซึ่ง ดู เหมือน จะ รอด ชีวิต จาก การ กําจัด จักรวรรดิ อัน รุนแรง เหล่า นี้ ออก ไป จาก แนว ทาง แห่ง ประวัติศาสตร์ อัน โหด ร้าย.\n\nบางทีสายพันธ์ของคุณอาจถูกทําให้สูญสิ้น หากเครื่องทําความสะอาดเหล่านี้ได้รับการอนุญาตให้"
 crisis.2403.e:0 "มีเหยื่ออีก"
 crisis.2403.e.response:0 "น่าสงสาร สัตว์ประหลาด การดํารงอยู่ของคุณถูกกําหนดโดยความขัดแย้ง และการตายของผู้บริสุทธิ์ อนิจจา การปรับตัวเหมือนที่เราผ่านมา อาจเป็นไปไม่ได้สําหรับชนิดของคุณ\n\nจักรวาลอาจโหดร้ายได้"
 crisis.2403.f:0 "อินทรีย์ทั้งหมดต้องถูกทําลาย"
 crisis.2403.f.response:0 "คุณหลงทางเหมือนเรา ก่อนการปรับตัว เป็น ความ เชื่อ ของ เรา ที่ ว่า สิ่ง มี ชีวิต ที่ ประกอบ ด้วย สิ่ง มี ชีวิต ที่ มี เชาวน์ ปัญญา, เครื่องจักร, หรือ สิ่ง อื่น ๆ ล้วน มี สิทธิ ที่ จะ ดํารง อยู่.\n\nแก้ไขวิธีของคุณก่อนที่จะสายเกินไป"
 crisis.2405.name:0 "การ ล่ม สลาย ของ ไซ เบรก"
 crisis.2405.desc:0 "ไซ เบรก เบตาถูกรุกราน และไม่มีเรือไซบริกซ์ถูกตรวจพบบนเวกเตอร์หลบหนีออกไป ก่อนที่ระบบจะมืดลง\n\nดู เหมือน ว่า อารยธรรม ซี เบรก ตอน นี้ กําลัง สูญ พันธุ์ อย่าง แท้ จริง."
 crisis.2405.b:0 "แน่นอน เราทําให้มั่นใจว่า"
 crisis.2407.name:0 "กิจกรรม ไซ เบรก"
 crisis.2407.desc:0 "ซีบริกซ์ค่อนข้างเงียบ ตั้งแต่ความพ่ายแพ้ของเครื่องราชอิสริยาภรณ์ แต่เรือขนาดใหญ่เพียงลําเดียว ที่ถูกตรวจพบเมื่อเร็ว ๆ นี้ กําลังออกจากไซเบรก เบต้า มันทิ้งระบบไว้ บนเส้นทางที่ออกนอกเส้นทาง ที่จะนํามันเกินขอบเขต ของกาแล็กซี่ของเรา\n\nก่อนที่เรือจะออกจากระยะการติดตามของเรา มันส่งข้อความเดียวของกาแล็กซี่"
 crisis.2408.desc:0 "พลเมืองของดาราจักร:\n\nเนื่อง จาก ความ เสมอ ต้น เสมอ ปลาย ไม่ เป็น ภัย คุกคาม อีก ต่อ ไป เรา จึง รู้สึก ว่า บทบาท ของ เรา ใน ชุมชน กาแล็กซี่ ได้ ถูก เปิด เผย. ระบบบ้านของเราตอนนี้เป็นที่รู้จักดีเกินไป สําหรับเราที่จะเก็บรายละเอียดต่ํา และเราถูกน้ําท่วมโดยความต้องการ\n\nหลัง จาก พิจารณา กัน มา นาน แล้ว เรา ได้ ตัดสิน ใจ ว่า ทาง แก้ อย่าง เดียว คือ ให้ เรา ออก จาก กาแล็กซี ไป อย่าง ถาวร และ หา บ้าน ใหม่. เรา หวัง อย่าง จริง ใจ ว่า คุณ จะ เรียน รู้ จาก ความ ผิด พลาด อัน น่า เศร้า ใน อดีต ของ เรา และ เรียน รู้ ที่ จะ แก้ ความ ขัด แย้ง ของ คุณ ด้วย วิธี ที่ สงบ สุข.\n\nลาก่อน"
 crisis.2408.a:0 "ลาก่อน"
 crisis.2473.desc:0 "เราได้เฝ้าดูความพยายามของกองเรือของท่าน ในการต่อสู้กับกองกําลัง นี่เป็นการต่อสู้ ที่กาแล็คซี่ไม่สามารถสูญเสียได้ และเราได้รับกําลังใจ จากความต้านทานของคุณ\n\nไซ เบรก ซ์อยากให้รางวัลผู้กล้าปกป้อง[Root.GetName]โดยการเสนออํานาจควบคุม เรือรบใหม่ของเรา มันจะเชื่อฟังคําสั่งของคุณ เช่นเดียวกับใด ๆ ของกองเรือของคุณเอง ถึงแม้ว่าเราจะขอให้ คุณเพียงใช้ในการต่อสู้กับกองทัพ"
 crisis.2473.a:0 "เราจะทําให้ยานนี้เป็นประโยชน์"
 cybrex_fleet_gained:0 "เรือรบไซบริกซ์ใต้การควบคุมของเราปรากฏเหนือ[Root.Capital.GetName]."
 crisis.2473.b:0 "เราไม่ต้องการยานของท่าน"
 crisis.2474.desc:0 "เราอยากจะขอขอบคุณ สําหรับความพยายามของคุณในการยกยอ กับความเสมอภาค ตอนนี้ภัยคุกคามทางกาแล็กซี่นี้ได้ถูกจัดการแล้ว เราต้องแสดงความเสียใจต่อคุณ ว่าเรากําลังจําเรือไซเบรกซ์ทั้งหมด"
 crisis.2474.a:0 "ก็ช่างมันเถอะ"
 leader_trait_cybrex:0 "ฐานข้อมูลไซเบรกซ์"
 leader_trait_cybrex_desc:0 "ผู้นําไซบริกซ์คนนี้ มีฐานข้อมูลยุทธศาสตร์โบราณ จากอดีตที่โหดร้ายของอารยธรรม"

