 crisis.30.g.2.response:0 "§Rเรามีเงินจ่าย เราจะจัดการต่อเอง\n\nโชคชะตาของคุณจะลอยพวกเราไปอีกนาน§!"
 crisis.30.h:0 "พวกนี้คืออะไร\"ผู้ล่า\" ที่คุณพูดถึง?"
 crisis.30.h.response:0 "§Rตาย พวกเขาทําให้เราเป็นประเภทสุดท้ายของเรา และพวกเขาได้เกลียดเรา คนรับใช้, สําหรับประชาชน\n\nพวกเขาจะมาที่นี่สักวัน แรงโน้มถ่วงของอนุภาค§!"
 crisis.30.i:0 "อะไร\"เบื้องต้น\" หมายถึง?"
