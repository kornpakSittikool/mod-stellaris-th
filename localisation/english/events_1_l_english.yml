 action.38.desc.hw:3 "เราได้เอาชนะคุณในการต่อสู้อันมีเกียรติตามธรรมเนียมปฏิบัติของ [This.GetSpeciesAdj] เรามีเอกสิทธิ์และพันธกรณีที่จะเป็นผู้กำหนดเงื่อนไข"
