 action.37.desc.dh:1 "เราพอแล้วกับสงครามครั้งนี้ เอาสิ่งที่คุณต้องการไปแล้วไปตามทางของคุณซะ"
 action.37.desc.ee:1 "คุณอาจได้แสดงให้เห็นถึงอำนาจทางการทหารที่เหนือกว่า แต่โปรดอย่าสับสนว่าสิ่งนี้คือชัยชนะทางปัญญา"
 action.37.desc.ss:1 "เราได้ยินเสียงกรีดร้องด้วยความเจ็บปวดของจักรวาลต่อความขัดแย้งนี้ เพื่อหยุดความไม่ลงรอยที่ไร้สติ เราขอยอมจำนนในทันที"
