 action.38.desc.pt:1 "ในที่สุด เราก็สามารถทิ้งความขัดแย้งนี้ไว้เบื้องหลังได้ เราหวังว่าสิ่งนี้จะสอนให้คุณตระหนักถึงราคาที่ต้องจ่ายของสงคราม"
 action.38.desc.hi:2 "ในที่สุด [Root.GetName] ที่อ่อนแอก็สยบอยู่แทบเท้า เป็นเพียงอีกหนึ่งก้าวสำคัญบนเส้นทางสู่ความเป็นใหญ่ในกาแล็กซีของเรา"
