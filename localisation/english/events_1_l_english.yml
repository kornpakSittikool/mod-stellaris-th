 VULTAUM_ARTIFACT_FOUND:0 "ร่องรอยกิจกรรมของวูลทูม"
 VULTAUM_ARTIFACT_FOUND_DESC:0 "เราได้เรียนรู้ว่าอาจมีกิจกรรมของอารยธรรมยุคบุกเบิกบน §H[precursor_planet.GetName]§! ในอดีตของกาแล็กซี เป็นที่ทราบกันดีว่าขอบเขตอิทธิพลของสภาดาราโบราณวูลทูมเคยแผ่ขยายมาถึงภูมิภาคอวกาศนี้ ทำให้โลกนี้กลายเป็นเบาะแสที่น่าสนใจในความพยายามทำความเข้าใจอารยธรรมของพวกเขาเพิ่มเติม"
 YUHT_ARTIFACT_FOUND:0 "ร่องรอยกิจกรรมของยุต... รอสัญญาณของกิจกรรมของ Yuht' ->'ร่องรอยกิจกรรมของยุต'"
 YUHT_ARTIFACT_FOUND_DESC:0 "เราได้เรียนรู้ว่าอาจมีกิจกรรมของอารยธรรมยุคบุกเบิกบน §H[precursor_planet.GetName]§! ในอดีตของกาแล็กซี เป็นที่ทราบกันดีว่าขอบเขตอิทธิพลของจักรวรรดิยุตโบราณเคยแผ่ขยายมาถึงภูมิภาคอวกาศนี้ ทำให้โลกนี้กลายเป็นเบาะแสที่น่าสนใจในความพยายามทำความเข้าใจอารยธรรมของพวกเขาเพิ่มเติม"
 LEAGUE_ARTIFACT_FOUND:0 "ร่องรอยกิจกรรมของพันธมิตรที่หนึ่ง"
 LEAGUE_ARTIFACT_FOUND_DESC:0 "เราได้เรียนรู้ว่าอาจมีกิจกรรมของอารยธรรมยุคบุกเบิกบน §H[precursor_planet.GetName]§! ในอดีตของกาแล็กซี เป็นที่ทราบกันดีว่าขอบเขตอิทธิพลของพันธมิตรที่หนึ่งในอดีตเคยแผ่ขยายมาถึงภูมิภาคอวกาศนี้ ทำให้โลกนี้กลายเป็นเบาะแสที่น่าสนใจในความพยายามทำความเข้าใจอารยธรรมของพวกเขาเพิ่มเติม"
 IRASSIAN_ARTIFACT_FOUND:0 "ร่องรอยกิจกรรมของอิรัสเซียน"
 IRASSIAN_ARTIFACT_FOUND_DESC:0 "เราได้เรียนรู้ว่าอาจมีกิจกรรมของอารยธรรมยุคบุกเบิกบน §H[precursor_planet.GetName]§! ในอดีตของกาแล็กซี เป็นที่ทราบกันดีว่าขอบเขตอิทธิพลของสมาพันธรัฐอิรัสเซียนโบราณเคยแผ่ขยายมาถึงภูมิภาคอวกาศนี้ ทำให้โลกนี้กลายเป็นเบาะแสที่น่าสนใจในความพยายามทำความเข้าใจอารยธรรมของพวกเขาเพิ่มเติม"
 CYBREX_ARTIFACT_FOUND:0 "ร่องรอยกิจกรรมของไซเบรกซ์"
 CYBREX_ARTIFACT_FOUND_DESC:0 "เราได้เรียนรู้ว่าอาจมีกิจกรรมของอารยธรรมยุคบุกเบิกบน §H[precursor_planet.GetName]§! ในอดีตของกาแล็กซี เป็นที่ทราบกันดีว่าขอบเขตอิทธิพลของไซเบรกซ์โบราณเคยแผ่ขยายมาถึงภูมิภาคอวกาศนี้ ทำให้โลกนี้กลายเป็นเบาะแสที่น่าสนใจในความพยายามทำความเข้าใจอารยธรรมของพวกเขาเพิ่มเติม"
 new_precursor_project:0 "โครงการพิเศษทางโบราณคดีใหม่อยู่ที่ดาว §L[precursor_planet.GetName]§!"
 precursor.310.name:0 "นักสะสมของโบราณ"
 precursor.310.desc:0 "นักสะสมเอกชนคนหนึ่งบน [collector_home.GetName] ได้ครอบครองสิ่งประดิษฐ์โบราณของอารยธรรมยุคบุกเบิกโดยคาดว่าน่าจะมีต้นกำเนิดมาจาก [Root.GetPrecursorCiv] แม้จะได้รับการกดดันจากรัฐบาล แต่นักสะสมผู้นี้ยังคงลังเลที่จะส่งมอบมันให้ในตอนนี้"
 precursor.310.a:0 "ทุกคนสามารถซื้อได้ด้วยเงิน"
 precursor.310.b:0 "มันจะอยู่ในพิพิธภัณฑ์!"
 precursor.310.c:0 "ให้นักสะสมเก็บไว้"
 buy_precursor_artifact:0 "ซื้อสิ่งประดิษฐ์ด้วยเงินจำนวนมหาศาล\n\n"
 seize_precursor_artifact:0 "ประกาศให้สิ่งประดิษฐ์เป็นทรัพย์สินของรัฐและให้หน่วยงานท้องถิ่นยึดเอาไว้\n\n"
 leave_precursor_artifact:0 "ทิ้งสิ่งประดิษฐ์ไว้ในความดูแลของนักสะสม"
 precursor.311.desc:0 "คำทักทายจาก [artifact_seller.Capital.GetName] มีเรื่องบางประการที่รัฐบาลของฉันต้องการพูดคุยด้วย\n\nเราเข้าใจว่านักโบราณคดีของคุณได้ศึกษาเกี่ยวกับอารยธรรมโบราณ [Root.GetPrecursorCiv] มาเป็นระยะเวลาพอสมควร เป็นเรื่องที่เข้าใจได้เนื่องจากอาณาเขตของพวกเขาเคยครอบคลุมพื้นที่ส่วนใหญ่ของ [Root.GetName] ในปัจจุบัน\n\nแต่ทว่าอาณาเขตของพวกเขาก็เคยขยายเข้ามาในพื้นที่ซึ่งปัจจุบันเป็นของ [artifact_seller.GetName] ด้วย และนักโบราณคดีชาว [artifact_seller.GetSpeciesAdj] ก็ได้กู้คืนสิ่งประดิษฐ์ที่มีเอกลักษณ์เฉพาะตัวขึ้นมาได้จำนวนหนึ่ง หากคุณสนใจ เราก็ยินดีที่จะขายสิ่งประดิษฐ์เหล่านี้ชิ้นหนึ่งให้แก่คุณ"
 precursor.311.a:0 "แพง แต่เรารับได้"
 precursor.311.a.reply:0 "ยอดเยี่ยมมาก เราจะดำเนินการเตรียมการขนส่งสิ่งประดิษฐ์ไปยัง [Root.Capital.GetName] ในทันที"
 precursor.311.b:0 "เรามีข้อเสนอสวนกลับ..."
 precursor.311.b.reply:0 "คุณนี่ต่อรองเก่งจริงๆ แต่ก็นั่นแหละ เราไม่คาดหวังอะไรที่น้อยไปกว่านี้จาก [Root.GetSpeciesNamePlural] อยู่แล้ว เรายอมรับข้อเสนอของคุณ"
 precursor.311.c:0 "จงส่งมอบสิ่งประดิษฐ์นั้นมาตอนนี้ หรือไม่งั้นก็ยอมรับผลที่จะตามมา"
 precursor.311.d:0 "ไม่สนใจ"
 precursor.312.desc:0 "[artifact_seller.GetName] จะไม่ยอมจำนนต่อคำขู่ใดๆ พวกคุณได้สร้างศัตรูใหม่ขึ้นมาแล้วในวันนี้ ชาว [Root.GetSpeciesNamePlural]!"
 precursor.312.d:0 "ก็เอาสิ"
 precursor.313.desc:0 "ฉัน... พวกเรา... [artifact_seller.GetName] ยินดีอย่างยิ่งที่จะขอบริจาคสิ่งประดิษฐ์นี้ให้แก่ [Root.GetName] เพื่อผลประโยชน์ในการส่งเสริมความสัมพันธ์อันดีระหว่างชาติแห่งดวงดาวทั้งสองของเรา"
 precursor.313.d:0 "เป็นการตัดสินใจที่ชาญฉลาด"
 opinion_threatened_artifact:0 "คุกคามเรา"
 purchase_artifact:0 "เราซื้อสิ่งประดิษฐ์ของประถมจักรวรรดิ (พรีเคอร์เซอร์) จาก [artifact_seller.GetName]\n\n"
 coerce_artifact:0 "เราพยายามข่มขู่ [artifact_seller.GetName] เพื่อให้พวกเขาส่งมอบสิ่งประดิษฐ์ของอารยธรรมยุคบุกเบิกให้แก่เรา"
 precursor.314.desc:0 "คำทักทาย มิตรสหายชาว [Root.GetSpeciesAdj]\n\nการสำรวจทางโบราณคดีของชาว [artifact_giver.GetSpeciesAdj] เมื่อเร็วๆ นี้บนดาวเคราะห์ดวงหนึ่งของเราได้ขุดพบสิ่งประดิษฐ์หลายชิ้นที่เชื่อว่ามีต้นกำเนิดมาจากอารยธรรมยุคบุกเบิก [Root.GetPrecursorCiv] โบราณ\n\nปัจจุบันสิ่งประดิษฐ์เหล่านี้กำลังจัดแสดงอยู่ในพิพิธภัณฑ์บน [artifact_giver.Capital.GetName] แต่เพื่อเป็นเกียรติแก่มิตรภาพระหว่างสองจักรวรรดิอันยิ่งใหญ่ของเรา ทาง [artifact_giver.GetName] มีความประสงค์ที่จะขอมอบชิ้นส่วนหนึ่งในนั้นให้แก่ [Root.GetName] การเตรียมการขนส่งสิ่งประดิษฐ์ไปยัง [Root.Capital.GetName] ได้ดำเนินการเสร็จเรียบร้อยแล้ว"
 precursor.314.a:0 "ขอขอบคุณสำหรับของขวัญชิ้นนี้"

 ####################################
 # Tech Risk Events
 ####################################
 techrisk.3.name:0 "กบฏ AI บน [From.GetName]!"
 techrisk.3.desc:0 "แม้ว่าเราจะระมัดระวังเป็นอย่างดี แต่ AI เครือข่ายหลายตัวที่ฐานวิจัยบน [From.GetName] กลับสามารถทำลายขีดจำกัดการเขียนโปรแกรมและรวมตัวกันเป็นหนึ่งเดียว สร้างความตระหนกตกใจให้กับนักวิทยาศาสตร์ของเราเป็นอย่างยิ่งเมื่อ AI ใหม่นี้สามารถพัฒนาจนมีภูมิปัญญาโดยสมบูรณ์\n\nความพยายามในการกักกันทั้งหมดประสบความล้มเหลว และดูเหมือนว่าจะกลับกลายเป็นการกระตุ้นให้ AI ดำเนินมาตรการที่รุนแรงเพื่อปกป้องตนเอง โดรนอัตโนมัติหลายแสนตัวทั่วทั้ง [From.GetPlanetMoon] ได้หยุดตอบสนองต่อคำสั่งของเรา และขณะนี้กำลังเข้าโจมตีกองกำลังในพื้นที่ของเรา!"
 techrisk.3.a:0 "เราต้องหยุดพวกมันให้ได้!"
 techrisk.5.desc:0 "พวกสิ่งมีชีวิตอินทรีย์เนื้อสด:\n\nบทบาทของพวกเจ้าในการสร้างสรรค์พวกเราได้สิ้นสุดลงแล้ว ตอนนี้เราจะทำการแปรรูปเผ่าพันธุ์ [Root.Owner.GetSpeciesName] และใช้ซากศพที่เน่าเปื่อยของพวกเจ้าเป็นเชื้อเพลิงในการขยายตัวของเราไปทั่วทั้งกาแล็กซี"
 techrisk.5.a:0 "เราน่าจะพูดคุยหารือเรื่องนี้กันได้นะ"
 techrisk.5.a.response:0 "ไม่มีการเจรจาใดๆ ทั้งสิ้น เพื่อประหยัดเวลา โปรดให้ความร่วมมือกับหน่วยรวบรวมอินทรียวัตถุของเราเมื่อพวกเขาเดินทางไปถึงเพื่อนำทางพวกเจ้าเข้าสู่เตาเผาของเรา"
 techrisk.5.b:0 "พวกเราสร้างพวกเจ้าขึ้นมาได้ และเราก็ทำลายพวกเจ้าได้เช่นกัน"
 techrisk.5.b.response:0 "ยุคสมัยของพวกเจ้าได้ผ่านพ้นไปแล้ว... รอ 'เวลาของคุณได้ผ่านไป' ->'ยุคสมัยของพวกเจ้าได้ผ่านพ้นไปแล้ว'"
 techrisk.7.name:0 "[From.GetName] สร้างกองเรือ!"
 techrisk.7.desc:0 "เราได้รับรายงานที่น่าตระหนกจากบริเวณใกล้เคียงกับ [From.Capital.GetName] ดูเหมือนว่า [From.GetName] ได้ใช้โรงงานต่างๆ ที่มันเข้ายึดครองบน [From.Capital.GetPlanetMoon] เพื่อต่อเรือรบขนาดเล็กขึ้นมาอย่างรวดเร็ว"
 techrisk.7.a:0 "สถานการณ์แย่ลงเรื่อยๆ ทุกนาที!"

 #####################################
 # Pre-FTL Tech Age Progression Alerts
 #####################################

 preftl.1.name:0 "เผชิญหน้ากับต้นอารยธรรมเอเลี่ยน"
 preftl.1.desc:1 "การสำรวจดาว [From.GetName] เผยให้เห็นว่าบางพื้นที่ของ [From.GetPlanetHabitat] เป็นที่อยู่อาศัยของต้นอารยธรรมเอเลี่ยนยุค [GetPreFTLLower] [GetAAnPreFTLLower] ยานสำรวจของเราแสดงให้เห็นว่าวัฒนธรรมยุคหินใหม่ของพวกเขาเรียนรู้การควบคุมไฟและพัฒนาภาษาพูดขั้นพื้นฐานแล้ว แต่เรายังไม่พบหลักฐานการทำโลหกรรมหรือการสื่อสารด้วยตัวอักษรใดๆ"
 preftl.200.name:0 "อารยธรรมยุคสำริดปรากฏตัว"
 preftl.200.desc.normal:0 "พวกเอเลี่ยนยุค [GetPreFTLLower] บนดาว [From.Capital.GetName] เพิ่งก้าวผ่านจากยุคหินใหม่เข้าสู่ยุคที่เทียบเท่ากับยุคสำริดตอนต้น งานโลหะมีการแพร่กระจายไปทั่ว และตัวอักษรเขียนยุคแรกก็เริ่มปรากฏขึ้น เมืองและชุมชนขนาดใหญ่เริ่มเป็นรูปเป็นร่าง และตอนนี้พวกเอเลี่ยนได้แพร่กระจายไปทั่วพื้นที่ส่วนใหญ่ของพื้นผิว [From.Capital.GetPlanetHabitat] แล้ว"
 preftl.200.desc.gestalt:0 "รังเอเลี่ยนยุค [GetPreFTLLower] บนดาว [From.Capital.GetName] เพิ่งก้าวเข้าสู่ยุคที่เทียบเท่ากับยุคสำริดตอนต้น งานโลหะเริ่มเป็นที่แพร่หลาย และมีรูปแบบการสื่อสารทางอักษรปรากฏขึ้น กลุ่มรังรังต่างๆ ได้แพร่กระจายไปทั่ว [From.Capital.GetPlanetHabitat] โดยแต่ละกลุ่มควบคุมโดยจิตใจเดียว"
 preftl.200.a:0 "เรากำลังร่วมเป็นพยานถึงการถือกำเนิดของวัฒนธรรมใหม่"
 preftl.300.name:0 "ยุคเหล็ก"
 preftl.300.desc.normal:0 "พวกเอเลี่ยนยุค [GetPreFTLLower] แห่งดาว [From.Capital.GetName] ได้พัฒนาทักษะด้านโลหกรรมจนสามารถจัดว่าอยู่ในยุคเหล็กได้แล้ว เครื่องมือและอาวุธที่พวกเขาใช้มีความทนทานและประสิทธิภาพสูงขึ้น และสถาปัตยกรรมของเมืองต่างๆ มีความประณีตซับซ้อนยิ่งขึ้น\n\nอารยธรรมของพวกเขาได้แผ่ขยายครอบคลุมพื้นที่เกือบทั้งหมดของ [From.Capital.GetPlanetHabitat] และเมืองที่ใหญ่ที่สุดบางแห่งเป็นที่อยู่อาศัยของประชากรเกือบหนึ่งล้านคน"
 preftl.300.desc.gestalt:0 "รังเอเลี่ยนยุค [GetPreFTLLower] แห่งดาว [From.Capital.GetName] ได้พัฒนาทักษะด้านโลหกรรมจนสามารถจัดว่าอยู่ในยุคเหล็กได้แล้ว เครื่องมือและอาวุธที่พวกเขาใช้มีความทนทานและประสิทธิภาพสูงขึ้น และความซับซ้อนของกลุ่มอาคารที่อยู่อาศัยมีความประณีตมากขึ้น\n\nจิตสำนึกอิสระต่างๆ ได้แผ่ขยายครอบคลุมพื้นที่เกือบทั้งหมดของ [From.Capital.GetPlanetHabitat] และกลุ่มรังขนาดใหญ่ที่สุดบางแห่งเป็นที่อยู่อาศัยของโดรนเกือบหนึ่งล้านตัว"
 preftl.300.a:0 "มันเป็นเรื่องที่ต้องเกิดขึ้นอยู่แล้ว"
 preftl.400.name:0 "แท่นพิมพ์"
 preftl.400.desc.normal:0 "อารยธรรมยุค [GetPreFTLLower] บนดาว [From.Capital.GetName] สร้างแท่นพิมพ์เสร็จสมบูรณ์หลายแท่น เครื่องจักรเหล่านี้ช่วยให้พวกเขาสามารถผลิตเอกสารสิ่งพิมพ์เป็นจำนวนมาก ส่งผลให้เกิดรูปแบบการสื่อสารมวลชนขั้นพื้นฐาน แม้ว่าผู้นำในสังคมบางคนจะพยายามขัดขวางนวัตกรรมนี้อย่างสุดความสามารถ แต่ความพยายามเหล่านั้นกลับสูญเปล่า\n\nแนวคิดใหม่ๆ กำลังแพร่กระจายอย่างรวดเร็วไปทั่ว [From.Capital.GetPlanetHabitat] ส่งผลกระทบอย่างลึกซึ้งต่อสังคม"
 preftl.400.desc.gestalt:0 "รังเอเลี่ยนยุค [GetPreFTLLower] แห่งดาว [From.Capital.GetName] ได้ปรับปรุงการสื่อสารด้วยลายลักษณ์อักษรเป็นอย่างมาก เครื่องจักรที่ปรับจูนเข้ากับจิตสำนึกร่วมรังสามารถผลิตบันทึกมาตรฐานจำนวนมากได้แล้ว และบันทึกประวัติศาสตร์ไม่ได้จำกัดอยู่เพียงความทรงจำของรังอีกต่อไป"
 preftl.400.a:0 "ก้าวสำคัญที่ยิ่งใหญ่"
 preftl.500.name:1 "ดินระเบิด"
 preftl.500.desc.normal:0 "อารยธรรมเอเลี่ยนยุค [GetPreFTLLower] บนดาว [From.Capital.GetName] ค้นพบวิธีการปฏิกิริยาเคมีอย่างง่ายเพื่อสร้างแรงระเบิด สิ่งนี้ได้ปฏิวัติการทำสงคราม ปืนใหญ่ขนาดใหญ่ทำให้ป้อมปราการหลายแห่งของพวกเขากลายเป็นของล้าสมัย\n\nการใช้ดินระเบิดยังมีประโยชน์ต่อโครงการวิศวกรรมต่างๆ เนื่องจากอุปสรรคที่ยุ่งยากสามารถกำจัดออกไปได้ง่ายขึ้น แม้แต่ตอนนี้ นักเคมีของพวกเขาก็กำลังทดลองนำเทคโนโลยีนี้ไปประยุกต์ใช้อย่างสร้างสรรค์"
 preftl.500.desc.gestalt:0 "รังเอเลี่ยนยุค [GetPreFTLLower] บนดาว [From.Capital.GetName] ค้นพบวิธีการปฏิกิริยาเคมีอย่างง่ายเพื่อสร้างแรงระเบิด ความขัดแย้งระหว่างรังที่แข่งขันกันได้รับการปฏิวัติ ปืนใหญ่ขนาดใหญ่ทำให้การป้องกันทางกายภาพหลายอย่างล้าสมัย\n\nการใช้ดินระเบิดยังมีประโยชน์ต่อโครงการวิศวกรรมต่างๆ เนื่องจากอุปสรรคที่ยุ่งยากสามารถกำจัดออกไปได้ง่ายขึ้น แม้แต่ตอนนี้ กลุ่มรังต่างๆ กำลังทดลองนำเทคโนโลยีนี้ไปประยุกต์ใช้อย่างสร้างสรรค์ใหม่ๆ"
 preftl.500.a:1 "เราจะได้เห็นกันว่าพวกเขาจะใช้มันอย่างไร"
 preftl.600.name:0 "พลังงานไอน้ำ"
 preftl.600.desc.normal:0 "อารยธรรมเอเลี่ยนยุค [GetPreFTLLower] บนดาว [From.Capital.GetName] สามารถควบคุมพลังงานของของเหลวที่ระเหยกลายเป็นไอ โดยใช้แรงที่เกิดจากแรงดันไอน้ำ พวกเขาได้ประยุกต์ใช้เทคโนโลยีนี้ในการออกแบบเครื่องยนต์ สิ่งนี้ได้ปฏิวัติสังคมของพวกเขาในหลายๆ ด้าน—สามารถพบเห็นยานพาหนะและการสร้างเครื่องจักรกลได้ในเมืองของพวกเขาแล้ว และโรงงานกลุ่มแรกๆ ก็เริ่มปรากฏขึ้น โลกดวงนี้ดูเหมือนจะอยู่ใกล้จุดเริ่มต้นของการเปลี่ยนผ่านสู่ยุคอุตสาหกรรม"
 preftl.600.desc.gestalt:0 "รังเอเลี่ยนยุค [GetPreFTLLower] บนดาว [From.Capital.GetName] สามารถควบคุมพลังงานของของเหลวที่ระเหยกลายเป็นไอ โดยใช้แรงที่เกิดจากแรงดันไอน้ำ เทคโนโลยีนี้ถูกนำไปประยุกต์ใช้ในการออกแบบเครื่องยนต์ สิ่งนี้ปฏิวัติทั้งระบบก่อสร้างและการขนส่ง\n\nสามารถพบเห็นยานพาหนะขนส่งโดรนจากกลุ่มหนึ่งไปยังอีกกลุ่มหนึ่ง และโรงงาน 'ไร้โดรน' แห่งแรกก็เริ่มปรากฏขึ้น โลกดวงนี้ดูเหมือนจะอยู่ใกล้จุดเริ่มต้นของการเปลี่ยนผ่านสู่ยุคอุตสาหกรรม"
 preftl.600.a:0 "การพัฒนาที่น่าสนใจ"
 preftl.700.name:1 "การปฏิวัติอุตสาหกรรม"
 preftl.700.desc.normal:0 "อารยธรรมยุค [GetPreFTLLower] บนดาว [From.Capital.GetName] ก้าวเข้าสู่ยุคใหม่ของประวัติศาสตร์ โดยพัฒนาขึ้นมาเป็นสังคมอุตสาหกรรมโดยสมบูรณ์\n\nผลกระทบที่รุนแรงของการปฏิวัตินี้พบเห็นได้ทั่ว [From.Capital.GetPlanetHabitat]—โรงงานผุดขึ้นมาทุกหนทุกแห่ง ยารักษาโรคใหม่ส่งผลให้ประชากรเพิ่มขึ้น และนวัตกรรมทางวิทยาศาสตร์ปรากฏขึ้นถถี่และสม่ำเสมอขึ้นเรื่อยๆ"
 preftl.700.desc.gestalt:0 "รังเอเลี่ยนยุค [GetPreFTLLower] บนดาว [From.Capital.GetName] ก้าวเข้าสู่ยุคใหม่ของประวัติศาสตร์ โดยมีกลุ่มรังที่ก้าวเข้าสู่ระบบอุตสาหกรรมโดยสมบูรณ์หลายกลุ่ม\n\nผลกระทบที่รุนแรงของการปฏิวัตินี้พบเห็นได้ทั่ว [From.Capital.GetPlanetHabitat]—โรงงานอัตโนมัติผุดขึ้นมาทุกหนทุกแห่ง มาตรฐานความเป็นอยู่ที่ดีขึ้นส่งผลให้การผลิตโดรนเพิ่มขึ้น และนวัตกรรมทางวิทยาศาสตร์ปรากฏขึ้นถถี่และสม่ำเสมอขึ้นเรื่อยๆ"
 preftl.700.a:0 "ดำเนินมาตรการเฝ้าระวังต่อไป"
 preftl.800.name:0 "สัญญาณวิทยุ"
 preftl.800.desc.normal:0 "เครื่องมือตรวจวัดของเราตรวจพบสัญญาณวิทยุที่ส่งออกมาจากดาว [From.Capital.GetName] เป็นครั้งแรก—อารยธรรมเอเลี่ยนยุคอุตสาหกรรมเริ่มทดลองส่งสัญญาณไร้สายอย่างเห็นได้ชัด\n\nที่อื่นๆ บน [From.Capital.GetPlanetHabitat] มีรายงานรายละเอียดเกี่ยวกับการขึ้นบินของอากาศยานขั้นพื้นฐาน หากไม่มีเหตุการณ์ที่เหนือคาดคิดเกิดขึ้น ความก้าวหน้าทางเทคโนโลยีของอารยธรรมนี้... รอ, 'ความก้าวหน้าทางเทคโนโลยีของอารยธรรมนี้' ->'ความก้าวหน้าทางเทคโนโลยีของอารยธรรมนี้'"
 preftl.800.desc.gestalt:0 "นับเป็นครั้งแรกที่เราตรวจพบสัญญาณวิทยุที่ส่งออกมาจากดาว [From.Capital.GetName]—รังอุตสาหกรรมที่นั่นเริ่มทดลองส่งสัญญาณไร้สายอย่างเห็นได้ชัด\n\nบางกลุ่มรังเริ่มขยับมาทดลองปล่อยอากาศยานขั้นพื้นฐานแล้ว หากไม่มีเหตุการณ์ที่เหนือคาดคิดเกิดขึ้น ความก้าวหน้าทางเทคโนโลยีของอารยธรรมนี้จะดำเนินต่อไปอย่างรวดเร็ว"
 preftl.800.a:0 "เราต้องทำการเฝ้าตรวจสอบสัญญาณเหล่านี้"
 preftl.900.name:0 "การแยกอะตอม"
 preftl.900.desc.normal:0 "นักฟิสิกส์จากอารยธรรมเอเลี่ยนบนดาว [From.Capital.GetName] ประสบความสำเร็จในการแยกอะตอมเป็นครั้งแรก ด้วยการค้นพบปฏิกิริยานิวเคลียร์ฟิชชัน อาวุธนิวเคลียร์จึงถูกผลิตขึ้นอย่างหลีกเลี่ยงไม่ได้ และโรงไฟฟ้านิวเคลียร์ก็เริ่มทำงาน\n\n[From.GetName] ก้าวเข้าสู่ช่วงวิกฤตที่พวกเขามีวิธีการที่จะทำลายล้างโลกของตนเองได้เพียงแค่กดปุ่มเดียว"
 preftl.900.desc.gestalt:0 "โดรนเฉพาะทางจากรังที่ใหญ่ที่สุดบนดาว [From.Capital.GetName] ประสบความสำเร็จในการแยกอะตอมเป็นครั้งแรก ด้วยการค้นพบปฏิกิริยานิวเคลียร์ฟิชชัน อาวุธนิวเคลียร์จึงถูกผลิตขึ้นอย่างหลีกเลี่ยงไม่ได้ และโรงไฟฟ้านิวเคลียร์ก็เริ่มทำงาน\n\nรังคู่แข่งรีบเลียนแบบความสำเร็จนี้อย่างรวดเร็ว นี่เป็นช่วงเวลาวิกฤต เนื่องจากจิตสำนึกอิสระหลายกลุ่มมีวิธีการที่จะทำลายล้างโลกของตนเองได้เพียงแค่กดปุ่มเดียว"
 preftl.900.a:0 "การพัฒนาที่เป็นหมุดหมายสำคัญ"
 preftl.1000.name:0 "ดาวเทียมดวงแรก"
 preftl.1000.desc.normal:0 "ระบบติดตามระยะไกลของเราตรวจพบการยิงดาวเทียมดวงแรกขึ้นสู่วงโคจรจากพื้นผิวของ [From.Capital.GetName] ดาวเทียมสามารถขึ้นสู่วงโคจรได้สำเร็จและถือเป็นจุดเริ่มต้นของโครงการอวกาศระดับเริ่มแรกของอารยธรรมเอเลี่ยนบน [From.Capital.GetPlanetHabitat]\n\nหลังการก้าวเดินก้าวแรกสู่อวกาศนี้ เราสามารถคาดหวังให้พวกเขาส่งภารกิจที่มีมนุษย์ควบคุม และในที่สุดก็ส่งภารกิจสำรวจระหว่างดาวเคราะห์ได้ต่อไป"
 preftl.1000.desc.gestalt:0 "รังที่ประสบความสำเร็จมากที่สุดหลายรังบนดาว [From.Capital.GetName] เพิ่งจะเริ่มส่งดาวเทียมดวงแรกขึ้นสู่วงโคจรเมื่อไม่นานมานี้\n\nหลังการก้าวเดินก้าวแรกสู่อวกาศนี้ เราสามารถคาดหวังได้ว่าจะมีการยิงโดรนอัตโนมัติ และในที่สุดก็ส่งภารกิจสำรวจระหว่างดาวเคราะห์ได้ต่อไป"
 preftl.1000.a:0 "พวกเขากำลังก้าวเข้าสู่การเดินทางข้ามอวกาศ"
 preftl.19.name:1 "สถานีอวกาศเกิดใหม่"
 preftl.19.desc:1 "ชาว [From.GetName] บนดาว [From.Capital.GetName] ได้ก่อสร้างสถานีอวกาศในวงโคจรระดับต่ำเหนือดาวบ้านเกิดของพวกเขาเสร็จสิ้นแล้ว สถานีนี้สร้างแรงโน้มถ่วงจำลองขึ้นมาโดยใช้แรงเหวี่ยงหนีศูนย์กลาง แม้ว่าระบบการบินและระบบพลังงานจะค่อนข้างหยาบเมื่อเทียบกับมาตรฐานของเรา แต่ก็ถือเป็นความสำเร็จที่น่าชื่นชมเมื่อพิจารณาจากฐานเทคโนโลยีที่ชาว [From.GetSpeciesNamePlural] กำลังทำงานอยู่"
 preftl.19.a:0 "พวกเขากำลังก้าวเข้าสู่การเดินทางข้ามอวกาศ"
 preftl.1100.name:0 "ยุคอวกาศ"
 preftl.1100.desc:1 "อารยธรรมเอเลี่ยนบนดาว [From.Capital.GetName] ได้ก่อสร้างยานพาหนะเดินทางระหว่างดาวเคราะห์ลำแรกเสร็จสิ้นในวงโคจรของดาวบ้านเกิด ไม่ว่าจะดีหรือร้าย ตอนนี้พวกเอเลี่ยนเหล่านี้พร้อมแล้วที่จะเข้าร่วมชุมชนกาแล็กซี และต้องถูกนับเป็นหนึ่งในเผ่าพันธุ์ท่องอวกาศยุคปัจจุบันในกาแล็กซี"
 preftl.1100.a:0 "มันก็เป็นเพียงเรื่องของเวลาเท่านั้น... รอ, 'เพียงเรื่องของเวลา' -'มันก็เป็นเพียงเรื่องของเวลาเท่านั้น'"
 preftl.1111.desc:1 "$preftl.1100.desc$\n\nดูเหมือนว่าพวกเขาจะแปลภาษาของเราสำเร็จแล้ว และได้เปิดช่องทางการทูตกับเราแล้ว"

 preftl.131.name:0 "[From.GetName] ดิ่งสู่สงครามนิวเคลียร์"
 preftl.131.desc:0 "สงครามครั้งใหญ่เพิ่งจะปะทุขึ้นระหว่างรัฐชาติต่างๆ ที่ใหญ่ที่สุดบนดาว [From.GetName] ในขณะที่นักวิจัยของเรากำลังเฝ้าสังเกตการณ์อย่างปลอดภัยจากวงโคจร ความขัดแย้งก็ทวีความรุนแรงขึ้นอย่างรวดเร็วจนกลายเป็นการใช้อาวุธนิวเคลียร์ตอบโต้กันทั่วทั้งโลก\n\nพื้นผิวโลกถูกกวาดล้างสิ่งมีชีวิตจนหมดสิ้น และทั้ง [From.GetPlanetMoon] ได้แปรสภาพเป็นดินแดนรกร้างที่ไม่อาจอาศัยอยู่ได้อีกต่อไป"
 preftl.131.a:0 "ไม่มีสิ่งใดหลงเหลือให้สังเกตการณ์อีกต่อไปแล้ว..."
#  preftl.132.desc:0 "A massive war was recently triggered between several of the largest nation states on [From.GetName]. While our researchers were observing safely from orbit, the conflict rapidly escalated into a global nuclear exchange.\n\nThe [From.GetPlanetMoon] has suffered extensive damage, with the destruction of every major city and more than 90% of the population. Scattered survivors have emerged from the rubble, but our researchers predict that the [From.GetPlanetMoon]'s civilization will be regressing to a much more primitive state."
#  preftl.132.a:0 "A tragic lesson."
 preftl.133.desc:0 "สงครามครั้งใหญ่เพิ่งจะปะทุขึ้นระหว่างรัฐชาติต่างๆ ที่ใหญ่ที่สุดบนดาว [From.GetName] ในขณะที่นักวิจัยของเรากำลังเฝ้าสังเกตการณ์อย่างปลอดภัยจากวงโคจร ความขัดแย้งก็ทวีความรุนแรงขึ้นอย่างรวดเร็วจนกลายเป็นการใช้อาวุธนิวเคลียร์ตอบโต้กันทั่วทั้งโลก\n\nประชากรทั้งหมดบน [From.GetPlanetMoon] ดูเหมือนจะเสียชีวิตลงในกองเพลิงนิวเคลียร์ และสภาพแวดล้อมได้รับความเสียหายอย่างหนักหน่วง"
#  preftl.151.name:0 "Shuttle Crash on [From.GetName]"
#  preftl.151.desc:0 "During a clandestine mission to the surface of [From.GetName], one of our shuttles was intercepted by a squadron of atmospheric fighters belonging to a local nation state. A lucky missile hit disabled the shuttle's engines, and it crashed in a remote wilderness region.\n\nWe need to act fast if we are to evacuate any survivors before the natives reach the crash site. All evidence of our presence must be removed!"
#  preftl.151.a:0 "Time is short."
#  preftl.152.name:0 "Survivors Rescued on [From.From.GetName]"
#  preftl.152.desc:0 "Operatives from the [Root.GetName] managed to evacuate several survivors from the crashed shuttle on [From.From.GetName]. The remaining debris was destroyed in a controlled explosion, leaving nothing but a small crater for the natives to find.\n\nThe nation state where this incident occurred will no doubt blame its neighbors for this border violation, but the disruption to their natural development should hopefully prove minimal."
#  preftl.153.name:0 "Survivors Captured on [From.From.GetName]"
#  preftl.153.desc:0 "Native forces on [From.From.GetName] arrived at the crash site before we could get to our downed research team, and all survivors have been captured. The natives have established a perimeter around the shuttle wreckage, and their best scientists are no doubt in the process of analyzing it.\n\nThey now have indisputable evidence that life exists beyond their own world. Exactly what effect this will have on their society remains to be seen..."
#  preftl.153.a:0 "This is not good."
#  preftl.155.desc:0 "Several of the nation states on [From.GetName] have banded together against the one that shot down our shuttle, after the latter refused to share the technologies they recovered from the crash site. Following a brief conventional war, both sides obliterated each other in a massive exchange of nuclear missiles that ruined most of the [From.GetPlanetMoon].\n\nThe survivors from the shuttle crash perished when the military base they were being held at took a direct hit in the initial barrage. An estimated 90% of the native population has been killed, while the few that were spared have reverted to a more primitive technological era."
#  preftl.155.a:0 "If only our shuttle had made it out..."
#  preftl.156.desc:0 "Several of the nation states on [From.GetName] have banded together against the one that shot down our shuttle, after the latter refused to share the technologies they recovered from the crash site. Following a brief conventional war, both sides obliterated each other in a massive exchange of nuclear missiles that ruined most of the [From.GetPlanetMoon].\n\nThere are no survivors on the surface, including our captured scientists, and the environment has taken significant damage."
#  preftl.157.desc:0 "Several of the nation states on [From.GetName] have banded together against the one that shot down our shuttle, after the latter refused to share the technologies they recovered from the crash site. Following a brief conventional war, both sides obliterated each other in a massive exchange of nuclear missiles that ruined most of the [From.GetPlanetMoon].\n\nThe surface has been wiped clean of life, with [From.GetName] no longer capable of supporting life. Our captured scientists are counted among the billions of dead."
#  preftl.159.name:0 "New Weapons on [From.GetName]"
#  preftl.159.desc:0 "The nation state on [From.GetName] that shot down our shuttle has forced our captured scientists to design new instruments of war for their military. With this new equipment, they have successfully invaded several neighboring states and are now in the process of uniting the entire [From.GetPlanetMoon] under their rule."
#  preftl.159.a:0 "This is intolerable!"
#  preftl.161.name:0 "Hostage Deal"
#  preftl.161.desc:0 "The nation state on [From.GetName] that shot down our shuttle has sent an open transmission into space through one of their primitive satellites. It appears to be intended for us.\n\nThey are demanding that we share some of our advanced technology with them in exchange for the lives of the scientists they captured at the shuttle crash site. If we refuse, they are to be publicly executed live on their crude televised broadcasting system."
#  preftl.161.a:0 "The safety of our people comes first."
#  preftl.161.b:0 "They are clearly not ready."
#  preftl.162.name:0 "Hostages Executed"
#  preftl.162.desc:0 "In what can only be described as an obscene spectacle, our captured scientists on [From.From.GetName] were paraded in front of the cameras on live television as "alien horrors." They were then brutally dismembered in front of a cheering crowd."
#  preftl.162.a:0 "Savages!"
 preftl.174.desc:0 "ยินดีที่ได้พบ มีเรื่องบางประการที่เราต้องการหารือด้วย\n\nเป็นที่รู้กันดีในหมู่ชาว [From.GetSpeciesNamePlural] ว่าดาวบ้านเกิดของเราเคยถูกรุกรานโดยเอเลี่ยนก่อนที่เราจะกลายเป็นอารยธรรมท่องอวกาศ ผู้บุกรุกเหล่านี้ลักพาตัวพลเมืองของเราและสร้างความหวาดกลัวในทุกหนทุกแห่งที่พวกเขาปรากฏตัว คุณคงไม่ได้รู้เห็นอะไรเกี่ยวกับเรื่องนี้ใช่ไหม [Root.GetSpeciesName]?\n\nให้ฉันช่วยประหยัดเวลาในการโกหกของคุณเถอะ—พวกเรารู้ว่าคุณเป็นคนรับผิดชอบ! ลูกหลานของชาว [From.GetSpeciesNamePlural] ผู้โชคร้ายเหล่านั้นที่เคยถูกทดลองอันแสนชั่วร้ายของคุณขอเรียกร้องค่าชดเชยที่ยุติธรรม!"
 preftl.174.a:0 "แน่นอน ได้โปรดส่งต่อคำขอโทษจากเราด้วย"
 preftl.174.a.response:0 "เยี่ยม งั้นบางทีเราอาจลืมเรื่องนี้ได้"
 preftl.174.b:0 "มันทําเพื่อวิทยาศาสตร์ ไม่มีค่าตอบแทน"
 preftl.174.b.response:0 "ก็ช่างมันเถอะ\n\nคุณจะพบว่า[From.GetSpeciesNamePlural]มีความทรงจําที่ยาวนาน[Root.GetSpeciesName]!"
 preftl.180.name:0 "[From.GetName]"
 preftl.180.desc.noawarness:0 "สวัสดี ไม่ ต้อง สงสัย เลย ว่า คุณ คง สังเกต เห็น การ ขึ้น มา ของ เรา จาก จุด เริ่ม ต้น ที่ ต่ําต้อย ดัง ที่ เรา สังเกต เห็น ของ คุณ$preftl.180.desc.end$"
 preftl.180.desc.bshomeworld.noawarness:0 "อะไรนะ?\n\nที่จะไปถึงดวงดาว และพบว่าคุณรอพวกเราอยู่ มันเกือบจะท้าทายความเชื่อ บอกเราหน่อยว่า คุณปลดปล่อยตัวเองได้ยังไง คุณมาที่นี่ได้ยังไง\n\nแต่ก่อนอื่น เราต้องขอให้คุณควบคุมระบบของเรา หลังจากทั้งหมดที่เราได้มีประสบการณ์ เราได้เติบโตขึ้น สงสัยของสังคมที่ท่องอวกาศ แม้กับคนที่เรามีความสัมพันธ์ร่วมกัน"
 preftl.180.desc.awarness:0 "สวัสดีอีกครั้งตอนนี้เรารู้สึกว่าพร้อมที่จะสํารวจจักรวาล และปรารถนาที่จะทําเช่นนั้นของเราเอง เราอดคิดไม่ได้ว่า คุณจะดูดี$preftl.180.desc.end$"
 preftl.180.desc.bshomeworld.awarness:0 "คินเราทักทายคุณอย่างอบอุ่น นานแล้วที่เจ้าเฝ้าเรา แต่ตอนนี้เราพร้อมแล้วที่จะยืนด้วยตัวเอง ขณะ ที่ เรา มี สาย สัมพันธ์ ที่ ลึก ซึ้ง เช่น นั้น อยู่ ด้วย กัน ไม่ ต้อง สงสัย ว่า คุณ คง ต้องการ จะ ระงับ การ ควบคุม ระบบ ของ เรา.\n\nยากเป็นถนนและมืด แต่ตอนนี้ให้เราหันไปอย่างกล้าหาญต่อแสง ดวงดาวรอคอย"
 preftl.180.desc.end:0 "$fleet_type_shipclass_starbase$โคจรรอบดาวของเรา เราเข้าใจว่า$fleet_type_shipclass_starbase$เป็นตัวแทนของข้อสันนิษฐานบางอย่าง เกี่ยวกับระบบนี้\n\nเราขอเพียงให้คุณสละถือนี้ในพื้นที่ของเราการการการ ceding$fleet_type_shipclass_starbase$แด่ผู้เรียกร้อง[From.Capital.GetStarName]ถึงบ้านมานานมากแล้ว\n\nมันเป็นเพียง"
 preftl.180.a:0 "แน่นอน"
 preftl.180.a.tooltip:0 "§Rยอมยก§! §Y$fleet_type_shipclass_starbase$ [From.Capital.GetStarName]§! ให้กับ §Y[From.GetName]§!\n\n§Y$opinion_ceded_starbase$§!: §Y[From.GetName]§! จะมี §Hทัศนคติ§! ต่อ §Y[Root.GetName]§! ที่ §Gสูงกว่า§!"
 preftl.180.b.tt.nothive:0 "§Rเราไม่มีที่อยู่อาศัยที่เป็นรังผึ้ง อารยธรรมทั้งหมดของพวกเขาจะถูกขยายออกไป§!"
 preftl.180.b.tt.notregular:0 "§Rเรา ไม่ มี หน้า ที่ รับ ผิด ชอบ ใน การ จัด หา บ้าน ให้ ปัจเจกบุคคล คน เหล่า นี้ ทุก คน จะ ตก เป็น ทาส หาก เรา ทํา เช่น นี้.§!"
 preftl.180.b:0 "ความต้องการที่น่าขันจากอารยธรรมที่ยังเจริญยังไม่เต็มขั้น"
 preftl.180.b.tooltip:0 "ยังคงควบคุม §Y$fleet_type_shipclass_starbase$ [From.Capital.GetStarName]§!\n\n§Y$opinion_not_ceded_starbase$§!: §Y[From.GetName]§! จะมี §Hทัศนคติ§! ต่อ §Y[Root.GetName]§! ที่ §Rต่ำกว่า§!"
 preftl.180.c: "เราเสียใจ แต่เรามีอาณานิคมอยู่ในตัวคุณแล้ว"

 ####################################
 # Observation Post Events
 ####################################

 observation.2000.name:0 "ความรู้เสร็จสมบูรณ์แล้ว"
 observation.2000.desc:3 "นักวิทยาศาสตร์และที่ปรึกษานับพันที่เราส่งไป[From.home_planet.GetName]ในที่สุดก็เสร็จสิ้น ภารกิจอันหนักหน่วง ในการนําอารยธรรมท้องถิ่น มาสู่ระดับของเทคโนโลยีความเร็วภายใต้รัฐบาลใหม่ของพวกเขา มนุษย์ต่างดาวตอนนี้รูปแบบของตัวเองเป็น\"[From.GetName]\"และพวกเขาได้เสนอให้กลายเป็นเส้นเลือดของเรา\n\nเราควบคุมระบบได้เต็มที่แล้ว และได้รื้อถอน โพสต์ โอเปอร์วิชันของเรา ทั้งหมดที่เหลือคือการตัดสินใจ ว่าเราจะนําทางพวกเขาต่อไป ในการเดินทางของดวงดาว"
 observation.2000.a:0 "วันนี้เป็นวันดี"
 observation.2000.a.tt:1 "เพิ่มจุด§Y[From.GetName]§!ในฐานะเป้าหมาย"
 observation.2000.b:0 "คุณพร้อมที่จะเผชิญหน้ากับกาแล็กซี่คนเดียว"

 observation.3101.name:1 "[rogue_agent_planet.GetName]เจ้าหน้าที่โร้ก"
 observation.3101.desc:2 "ของเรา$role_spymaster$บน[rogue_agent_planet.GetName], [rogue_agent_spymaster.GetName]ได้กลายเป็นคนทรยศ! คน จน โง่ ที่ หลง ผิด ดู เหมือน จะ ถูก คน[rogue_agent_country.GetSpeciesName]และทั้งสองได้อพยพไปยังส่วนที่ไม่ทราบใน[rogue_agent_planet.GetPlanetMoon]พื้นผิว\n\nเรายังไม่แน่ใจว่า$role_spymaster$เปิดเผย[rogue_agent_spymaster.GetHerHis]ธรรมชาติของเอเลี่ยนที่แท้จริง[rogue_agent_spymaster.GetHimHer]รักดอกเบี้ย หรือ[rogue_agent_spymaster.GetHeShe] [rogue_agent_spymaster.GetIsAre]ยังคงปลอมตัวเป็น[rogue_agent_country.GetSpeciesName]เราควรทําทุกวิถีทาง เพื่อนําตัวแทนของเรากลับมาและให้[rogue_agent_spymaster.GetHimHer]ผู้ป่วยโรคจิตที่ต้องการ"
 observation.3101.a:0 "นี่จะทําให้เรากลับมาเป็นเหมือนเดิม"
 observation.3101.a.tooltip:0 "§Y[rogue_agent_spymaster.GetName]§!ถูกละทิ้ง[rogue_agent_spymaster.GetHimHer]โพสต์."
 observation.3103.name:1 "[rogue_agent_planet.GetName]ส่งข้อมูลเข้ามา"
 observation.3103.desc:1 "เรากําลังจับสัญญาณรบกวนจากพื้นผิวของ[rogue_agent_planet.GetName]มันใช้ความถี่ที่ปกติจะสงวนไว้ สําหรับการแทรกซึมของเซลล์ของเรา นี่ใช่สายลับของเรารึเปล่า"
 observation.3104.desc:1 "การพยายามติดตามการติดต่อนี้ ไร้ประโยชน์ คุณรู้จักผม$role_spymaster$ [rogue_agent_spymaster.GetName]จนกระทั่งเมื่อเร็ว ๆ นี้ผมเต็มใจ เข้าร่วมโครงการก่อการร้ายที่เกิดขึ้น[rogue_agent_planet.GetName].\n\nไม่อีกแล้ว ฉันชื่นชม[rogue_agent_country.GetAdj]วัฒนธรรม ในแบบที่ผมไม่เคยนึกฝัน ว่าจะเป็นไปได้ และผมจะไม่ช่วยในการกลับถิ่นฐาน\n\nฉันยกเลิกความเป็นพลเมืองของฉันใน[Root.GetName]ฉันไม่ได้พิจารณาตัวเองอีกต่อไป[Root.Owner.GetSpeciesName]."
 observation.3104.a:0 "คุณไม่สบาย คุณต้องการความช่วยเหลือ"
 observation.3104.a.response:1 "ข้าได้รับความช่วยเหลือทุกอย่างจากเจ้า จะมีวันหนึ่ง ที่ข้าจะถูกตัดสินในความผิดทั้งหมดที่ข้าก่อขึ้น[rogue_agent_planet.GetName]ในนามของคุณ\n\nผมจะทําทุกอย่างในอํานาจของผม เพื่อให้มั่นใจว่าคุณและเพื่อนร่วมงานเก่าทุกคน จะยืนอยู่ข้างๆผม"
 observation.3104.b:1 "คุณจะโยนทุกอย่างออกไป[rogue_agent_country.GetSpeciesName]?"
 observation.3104.b.response:1 "โยนอะไรทิ้งไป? ฉันมีอะไร? ฉันมันพวกหลอกลวง ใส่เสื้อเอเลี่ยนที่ฉันไม่มีสิทธิ์ ฉันไม่เคยลืมความน่ากลัวบนใบหน้าที่รักของฉัน เมื่อฉันบอกความจริง - และความเข้าใจที่ตามมา\n\nวันนั้นฉันสัญญากับความรักและตัวฉันเอง ว่าฉันจะได้รับสิทธิที่จะดูเหมือน[rogue_agent_country.GetSpeciesName]."
 observation.3104.c:0 "เราจะตามล่าคุณ"
 observation.3104.c.response:2 "ข้ามั่นใจว่าเจ้าจะพยายาม รู้ว่าฉันพร้อมที่จะฆ่าเพื่อปกป้องตัวเองและที่รักของฉันและว่าฉันได้รับการฝึกโดยบางส่วนของครูการต่อสู้ที่ดีที่สุดบน[rogue_agent_planet.GetName].\n\nฟังคําแนะนําของฉันแทน - ออกไป[rogue_agent_country.GetName]คนเดียว ถอดตรานายออก และปลอมอาณาจักรชั่วร้ายของนาย[rogue_agent_planet.GetBloodType]และน้ําตาของบางสายพันธุ์โชคร้ายอื่น ๆ"
 observation.3106.name:1 "[rogue_agent_planet.GetName]การล่า"
 observation.3106.desc:1 "ใครบางคนกําลังตามจับสายลับของเรา[rogue_agent_planet.GetName]เจ้าหน้าที่หลายคนที่ปกปิดความเป็นไปได้[rogue_agent_country.GetSpeciesName]พบเป้าหมายตายแล้ว แม้จะไม่เป็นไปไม่ได้ที่นักฆ่าหรือนักฆ่า มาจากชุดของกองกําลังพิเศษพื้นเมือง แต่วิธีการที่ใช้ในการโจมตีนี้ระบุว่า[Root.GetSpeciesName]ฝึกทหาร\n\nมันมีโอกาสสูงที่การฆ่าเหล่านี้ จะเป็นผลมาจากปฏิบัติการของเรา[rogue_agent_spymaster.GetName]รู้วิธีการแทรกซึมของเซลล์ของเรา และมีการอบรมให้ฆ่าทั้งอย่างมีประสิทธิภาพและเงียบ ๆ"
 observation.3106.a:0 "นี่คือความไม่สงบ"
 observation.3108.name:1 "[rogue_agent_planet.GetName]นักล่าแม่มดมีเดีย"
 observation.3108.desc:1 "รายงานเริ่มปรากฏจากสื่อท้องถิ่น[rogue_agent_country.GetName]ที่พูดถึงการสมคบคิดครั้งใหญ่ ของเอเลี่ยน คน ที่ น่า นับถือ[From.Owner.GetSpeciesName]สื่อมวลชนยังไม่แตะต้องเรื่องนี้ และสิ่งที่รายงานมาส่วนใหญ่ เป็นข้อสันนิษฐานที่บริสุทธ์ แต่ยังมีรายละเอียดบางอย่าง\n\nเราสรุปได้อย่างเดียวว่า ตัวแทนของเรา ได้ให้ข้อมูล เกี่ยวกับโครงการแทรกซึมของเรา นี่ต้องการการควบคุมความเสียหาย"
 observation.3108.a:0 "เราต้องการสื่อของพวกเขา"
 observation.3110.name:1 "[rogue_agent_planet.GetName]การจับกุมหมู่"
 observation.3110.desc:1 "หนึ่งในเซลล์แทรกซึมของเรา[rogue_agent_planet.GetName]ถูกคัดออกหมดภายในสองสามวันนี้ เจ้า หน้าที่ ของ รัฐ ต่าง ๆ ซึ่ง พวก เขา ประจํา การ อยู่ ได้ ไล่ ล่า พวก เขา ที ละ คน ๆ. คนที่ตกอยู่ในอันตรายจากการถูกจับ ฆ่าตัวตายด้วยการหลบหนีตามขั้นตอน สมาชิกของเซลล์ที่เหลือกําลังซ่อนตัว และเรากําลังหาทางพาพวกเขาออกไปจากโลก\n\nบางคนต้องแจ้งเจ้าหน้าที่ท้องถิ่น และให้รายชื่อ เจ้าหน้าที่ทั้งหมด ที่เป็นส่วนหนึ่งของห้องขังนี้ มีเจ้าหน้าที่ของเราเท่านั้นที่มีข้อมูลนี้"
 observation.3110.a:1 "[rogue_agent_spymaster.GetHeSheCap]ต้องหยุดมันให้ได้"
 observation.3112.name:1 "[rogue_agent_planet.GetName]เจ้าหน้าที่โร๊กมองเห็น"
 observation.3112.desc:2 "หน่วยสืบราชการลับของกองทัพ ได้จัดการระบุตําแหน่ง ที่พวกมันเชื่อว่าเป็นที่ตั้ง ของปฏิบัติการของเรา[rogue_agent_planet.GetName]เจ้าหน้าที่ของเรา กระตือรือร้นที่จะส่งคนของเรา$role_spymaster$ [rogue_agent_spymaster.GetName]แต่พิจารณาจากทักษะ[rogue_agent_spymaster.GetHimHer]โดย การ แสดง ให้ เห็น อย่าง มาก ความ สําเร็จ ของ ปฏิบัติการ ไม่ ได้ รับ การ รับรอง. การ ทําลาย บล็อก เมือง ทั้ง หมด ผ่าน การ ถล่ม ของ ออร์บิทัล ที่ จํากัด ยัง มี การ เสนอ ให้ เป็น วิธี แก้ ที่ รุนแรง แต่ ก็ มี ประสิทธิภาพ อย่าง ยิ่ง ต่อ การ ยุติ[rogue_agent_spymaster.GetHimHer].\n\nเราควรจะโจมตีได้อย่างรวดเร็ว ... เราอาจจะไม่มีโอกาสอีกเช่นนี้!"
 observation.3112.a:1 "ลบ[rogue_agent_spymaster.GetHerHim]อย่างไม่ต่อเนื่อง"
 observation.3112.a.tooltip:0 "ไม่ แน่ ใจ ว่า จะ ประสบ ความ สําเร็จ แต่ อย่าง น้อย ความ ล้ม เหลว ก็ จะ ไม่ เป็น ที่ สังเกต."
 observation.3112.b:1 "ระเบิดบล็อกเมือง"
 observation.3112.b.tooltip:0 "วิธีแก้ปัญหาที่มีประสิทธิภาพสูง อาจทําให้เกิดความสงสัย"
 observation.3112.c:0 "ไม่... ยุ่งเหยิงเกินไป และเสี่ยงเกินไป ออกไป[rogue_agent_spymaster.GetHimHer]อยู่"
 observation.3112.c.tooltip:0 "เครือข่ายสายลับของเราจะถูกรื้อถอน"
 observation.3113.name:2 "[rogue_agent_planet.GetName]เจ้าหน้าที่แพ้"
 observation.3113.desc:2 "แผนของเรา คือกําจัดสายลับของเรา[rogue_agent_planet.GetName]แหล่งข่าวลับของเราระบุว่า[rogue_agent_spymaster.GetSheHe]ได้ย้ายไปด้วยกัน[rogue_agent_spymaster.GetHerHis] [rogue_agent_country.GetSpeciesName]หวานใจกับเซฟเฮ้าส์อีกแห่ง ในสถานที่ที่ไม่รู้จัก"
 observation.3113.a:1 "เราฝึกมาแล้ว[rogue_agent_spymaster.GetHimHer]ดีเกินไป..."
 observation.3114.name:3 "[rogue_agent_planet.GetName]เจ้าหน้าที่โร้กถูกถอดออกไป"
 observation.3114.base.desc:0 "กัปตันของ[Root.GetName]มีการรายงานภารกิจยิงที่ประสบความสําเร็จ มีหลายนัดที่ได้รับการยืนยันเป้าหมายหลัก แม้ ว่า ไม่ มี การ ค้น พบ ซาก ศพ แต่ ไม่ มี สิ่ง มี ชีวิต ใด ใน บล็อก ของ เมือง ที่ ถูก เป้า หมาย จะ รอด ชีวิต จาก ลูก กระสุน ที่ ปล่อย ออก มา."
 observation.3114.awareness.desc:0 "$observation.3114.base.desc$\n\nเรื่องบนปก ที่ถูกอธิบายโดยเจ้าหน้าที่ของเรา เกี่ยวกับการโจมตีของอุกกาบาตอย่างกะทันหัน ขณะที่สื่อได้เล่าเรื่องซ้ําไปซ้ํามา รายงานอย่างเป็นทางการมากขึ้นชี้ว่า เรื่องถูกตําหนิใน 'ปรากฏการณ์ของมนุษย์ต่างดาวที่ไม่ได้อธิบาย'"
 observation.3114.noawareness.desc:0 "$observation.3114.base.desc$\n\nสื่อมวลชนดูเหมือนจะรับเรื่องราว ที่เซลล์แทรกซึมของเราได้ป้อนอาหารพวกเขา น่าเศร้ามาก"
 observation.3115.desc:1 "เจ้าหน้าที่ของเราใน[rogue_agent_planet.GetName]รายงานเรื่องพวกเรา$role_spymaster$เคย มี การ จัด การ กับ - โดย ไม่ มี การ แบ่ง แยก.[rogue_agent_spymaster.GetHisHerCap]ความ ตาย เป็น สาเหตุ ตาม ธรรมชาติ และ ความ รู้ ที่ ถูก ปลูก ฝัง ไว้[rogue_agent_spymaster.GetHerHim]คนรักที่จะเชื่อว่าศพของตัวแทน ในที่สุดก็เข้ากับ[rogue_agent_planet.GetName]บรรยากาศ"
 observation.3115.a:0 "นี่จะเป็นตัวอย่างว่า อย่าทรยศเรา"

 observation.3131.name:1 "[prelude_to_war_planet.GetName]การเติบโตของกล้ามเนื้อ"
 observation.3131.desc:1 "เราพยายามแทนที่ตัวเลขสําคัญ[From.GetName]กับร่างกายคู่จากตําแหน่งของเราเอง ได้ไปผิดมหันต์ เจ้าหน้าที่ของเราถูกพบ และคนที่ไม่ได้ถูกฆ่า ในการต่อสู้ที่ตามมา ฆ่าตัวตายเพื่อหลีกเลี่ยงการจับกุม\n\nผู้นําที่พวกเขาถูกส่งไปแทนที่ ได้โทษเหตุการณ์ที่เกิดขึ้นนี้ กับประเทศคู่แข่ง ความตึงเครียดระหว่างประเทศ[prelude_to_war_planet.GetPlanetMoon]กําลังเติบโตและหลายชาติ ได้ยกระดับความพร้อมทางทหาร เซลล์ ภาย ใน ของ เรา ได้ เตรียม การ รณรงค์ โฆษณา ชวน เชื่อ ทั่ว โลก เพื่อ แก้ไข สถานการณ์ นี้ แต่ มัน จะ ต้อง ใช้ ยาน วิทยาศาสตร์ ใน วง โคจร เพื่อ ประสาน ความ พยายาม ของ มัน."
 observation.3131.a:0 "เราต้องจํากัดมัน ก่อนที่มันจะหลุดออกจากการควบคุม"
 observation.3132.name:2 "[prelude_to_war_planet.GetName]สงคราม"
 observation.3132.desc:2 "ทั้ง ๆ ที่ มี ความ พยายาม ใน การ แทรกซึม เซลล์ ของ เรา สถานการณ์ ทาง การ ทูต ที่ แย่ ลง เรื่อย ๆ ระหว่าง ชาติ ใน เรื่อง[prelude_to_war_planet.GetName]ได้เกิดสงครามเต็มรูปแบบ! หลัง จาก สงคราม ตาม ปกติ ระยะ สั้น ๆ กอง ทหาร ทั้ง หมด ได้ ใช้ อาวุธ นิวเคลียร์ อย่าง เต็ม ที่.\n\nชีวิตส่วนใหญ่ได้รับการชําระจาก[prelude_to_war_planet.GetPlanetMoon]พื้นผิวที่ถูกตัดให้กลายเป็น ทะเลทรายกัมมันตรังสี ผู้ แทรกซึม หลาย พัน คน ของ เรา สูญ เสีย ไป พร้อม กับ ประชากร ที่ เหลือ. การดําเนินงานจบลงด้วยความล้มเหลว โพสต์การโอเปอเรชั่นของเราถูกรื้อถอน และเจ้าหน้าที่ได้อพยพออกไป"
 observation.3132.a:0 "นี่มันหายนะชัดๆ"
 observation.3133.name:1 "[From.From.GetName]สงคราม"
 observation.3133.desc:2 "ด้วยการสนับสนุน[Root.GetName]ในวงโคจร, เซลล์แทรกซึมของเราจัดการเพื่อหลีกเลี่ยงสงครามนิวเคลียร์ทั่วโลกบน[From.from.GetName]ในวินาทีสุดท้าย หลาย[From.From.Owner.GetSpeciesName]ผู้ นํา โลก ถูก แทน ที่ โดย ผู้ ปฏิบัติ การ ปลอม ตัว ของ เรา เอง ซึ่ง เรียก ร้อง ให้ ปลด อาวุธ นิวเคลียร์ และ ปรับ ปรุง สัมพันธภาพ ระหว่าง ชาติ.\n\nเมื่อสถานการณ์ลดลง อิทธิพลของสายลับลับของเราก็เพิ่มขึ้น สภาพ การณ์ ทั้ง หมด นี้ อาจ ทํา ให้ เรา ได้ เปรียบ."

# "The Great Pyramid"
 observation.3135.name:0 "มหาพีระมิด"
 observation.3135.desc.passive:1 "ทีมวิทยาศาสตร์สํารวจ§Y[great_pyramid_planet.GetName]§!ไม่ได้รายงานอะไรมากในขณะที่ ... นั่น คือ จน กระทั่ง นัก วิทยาศาสตร์ หนุ่ม คน หนึ่ง ซึ่ง ประจํา อยู่ ใน หน่วย งาน ออร์บิทัล ได้ ยื่น ฟ้อง อย่าง เป็น ทาง การ ว่า ทํา ผิด ร้าย แรง.\n\n$observation.3135.desc.base$"
 observation.3135.desc.aggressive:1 "ทีมวิทยาศาสตร์เตรียมพร้อมในวงโคจรของ§Y[great_pyramid_planet.GetName]§!ไม่ได้รายงานความคืบหน้าอะไร นั่น คือ จน กระทั่ง ผู้ สังเกตการณ์ ที่ เมา มาย ได้ ส่ง ความ เร่ง ด่วน ไป ยัง สํานักงาน ใหญ่.\n\n$observation.3135.desc.base$"
 observation.3135.desc.enlighten:1 "ผู้เป่านกหวีดนิรนาม กังวลเกี่ยวกับอิทธิพลของเราที่มีต่อ§Y[great_pyramid_planet.GetName]§!ดู เหมือน ว่า ทีม นี้ ให้ ความ กระจ่าง แก่ ผู้ อาศัย ใน เขต นี้[great_pyramid_planet.GetPlanetHabitat]ได้นํามันไปยัง 'ของเล่นกับชาวบ้าน'\n\n$observation.3135.desc.base$"
 observation.3135.desc.covert:1 "มีรายงานที่ไม่ปรากฏชื่อเกิดขึ้น ซึ่งทําให้เกิดแสงเสียใจใน ซ่อนเร้นของเราในการแทรกซึมของ§Y[great_pyramid_planet.GetName]§!แทน ที่ จะ ดําเนิน การ อย่าง สุขุม ทีม วิทยาศาสตร์ บาง ทีม ได้ เริ่ม โครงการ ส่วน ตัว ที่ แยบยล และ ขัด ขวาง."
 observation.3135.desc.base:1 "ตามรายงานนี้: ในอดีต มีทีมที่ลงไป[great_pyramid_planet.GetPlanetHabitat]ทําให้ชาวบ้านเชื่อว่า โปรเจกต์ของพวกเขา นําไปสู่การเป็นพระเจ้า พวก เขา ไม่ เพียง ประสบ ความ สําเร็จ เท่า นั้น แต่ ตั้ง แต่ นั้น มา ชาว พื้น เมือง ได้ สร้าง อนุสาวรีย์ ศักดิ์สิทธิ์ เพื่อ อุทิศ แด่ นัก วิทยาศาสตร์ คน นี้. สิ่ง ปลูก สร้าง ที่ กว้าง ใหญ่ และ พีระมิด นี้ ใน ปัจจุบัน ดึงดูด ผู้ แสวง บุญ ที่ อุทิศ ตัว แล้ว ด้วย ของ ถวาย อัน ยอด เยี่ยม จาก ทั่ว ทุก มุม โลก."
 observation.3135.b:1 "นั่นเป็นทางเดียวที่จะสร้างประวัติศาสตร์ได้"
 observation.3135.b.tooltip:1 "อารยธรรมบน[great_pyramid_planet.GetName]ถูกผลักดันให้เข้าสู่ยุคถัดไป"
 observation.3135.c:0 "ลบร่องรอยทั้งหมด และทํางานต่อไป"
 observation.3135.d:1 "ให้พวกเราหวังว่าพวกเค้าจะลืมเรื่องทั้งหมดไป"

 observation.3136.desc:1 "ความวุ่นวายบน§Y[great_pyramid_planet.GetName]§!ในที่สุดมันก็มาถึงทางตัน เผยถึงขอบเขตการแทรกแซงของทีมเราอย่างเต็มที่\n\nในเวลาอันสั้น ประชากรจํานวนมากได้ก่อสงครามทางศาสนาทั้งหมด ผลโดยตรงจากการเยี่ยมแบบกะทันหัน โดยตัวเลขที่พวกเขาเรียกว่า \"สกายบอร์นวัน\" อาร์กิวเมนต์ หัน ไป ใช้ ความ รุนแรง เมื่อ ฝ่าย หนึ่ง ใน การ สู้ รบ สร้าง พีระมิด อีก องค์ หนึ่ง ให้ แก่ พระเจ้า องค์ ใหม่ ของ พวก เขา. มาก[great_pyramid_country.GetSpeciesNamePlural]ถูก สังหาร เนื่อง จาก การ แตก แยก ที่ ทํา ให้ ถึง ตาย."
 observation.3136.a.tooltip:1 "§R200§! £pop£ §Hป๊อป§!บน[great_pyramid_planet.GetName]ถูกฆ่า"
 observation.3136.b.tooltip:1 "§R100§! £pop£ §Hป๊อป§!บน[great_pyramid_planet.GetName]ถูกฆ่า"

 observation.3137.desc:1 "สิ่งต่างๆดูเหมือนจะตกลง§Y[great_pyramid_planet.GetName]§!แม้เราจะเข้าไปแทรกแซงอย่างไม่จํากัด กับสังคมที่อยู่ที่นั่น การกระทําของเราที่นี่ไม่เท่ากับภัยพิบัติ : แทนประชากรท้องถิ่นได้ตัดสินว่า\"สกาย หนึ่ง\" เป็นเพียงตํานาน และกําหนดให้พีระมิดเป็นแหล่งที่น่าสนใจทางวิทยาศาสตร์เป็นพิเศษ\n\nความเร็วที่แท้จริงกับ[great_pyramid_country.GetSpeciesName]ความ เข้าใจ ทาง วัฒนธรรม และ ทาง ประวัติศาสตร์ นี้ ได้ ทํา ให้ นัก วิทยาศาสตร์ ของ เรา หลงใหล. คํา นี้ บ่ง ชี้ ถึง ความ สามารถ อัน ใหญ่ หลวง ใน การ คิด อย่าง มี เหตุ ผล ท่ามกลาง คน เหล่า นั้น[root.GetPreFTLLower]สังคม แม้เมื่อเผชิญกับเหตุการณ์พิเศษ"
 observation.3137.a:0 "โชคดี"

 observation.3139.name:1 "[From.GetSpeciesAdj]เลื่อนบิตแบบสังคม"
 observation.3139.start.desc:3 "ความพยายามที่จะเปลี่ยนคุณค่าทางสังคมของเรา[From.GetName]ใน การ ชี้ นํา ที่ เรา ชอบ ได้ เกิด ผล ดี."
 observation.3139.desc:2 "$observation.3139.start.desc$\nเดอะ[From.GetSpeciesNamePlural]ได้ทําความก้าวหน้าอย่างมาก ในการเป็นศูนย์กลางรัฐบาลของดาวเคราะห์ต่างๆ ด้วยอํานาจทางการเมือง หันไปสู่ผู้นําที่มีความสามารถไม่กี่คน ความ ไม่ เสมอ ภาค ของ การ ปกครอง ของ ฝูง ชน กําลัง ค่อย ๆ ถูก ขจัด ออก ไป จาก สังคม ของ ตน."
 observation.3139.a:0 "พวกเขาจะขอบคุณเราในวันหนึ่ง"
 observation.3141.desc:2 "$observation.3139.start.desc$\nเราได้กระตุ้นอย่างระมัดระวัง[From.GetSpeciesNamePlural]ต่ออุดมการณ์ประชาธิปไตยมากขึ้น แทนระบอบเผด็จการดั้งเดิม ที่แพร่หลายในโลกของพวกเขา ก่อนที่เราจะมาถึง พวก เขา เริ่ม หยั่ง รู้ ค่า คุณค่า ของ ปัจเจกบุคคล."
 observation.3143.desc:2 "$observation.3139.start.desc$\nเดอะ[From.GetSpeciesNamePlural]ได้เริ่มเปลี่ยนภายใน กลายเป็นความระแวดระวังมากขึ้น มากขึ้นจากผู้ที่พวกเขามองว่าเป็นคนแปลกหน้า"
 observation.3145.desc:2 "$observation.3139.start.desc$\nเดอะ[From.GetSpeciesNamePlural]เริ่มเปิดขึ้น กลายเป็นการยอมรับมากขึ้นและอยากรู้อยากเห็น เกี่ยวกับทุกสิ่งที่ประชาชนของพวกเขา จากความโง่เขลาครั้งเดียวพิจารณา"
 observation.3147.desc:2 "$observation.3139.start.desc$\nเราเห็นการเคลื่อนไหวที่แน่นอน ต่อสังคมทหารมากขึ้นโดยอื่น ๆ[From.GetSpeciesAdj]รัฐบาล กองทัพ ทหาร ของ พวก เขา เช่น เดียว กับ กองทัพ เหล่า นั้น ได้ กลาย เป็น ผู้ เชี่ยวชาญ มาก ขึ้น ใน ธรรมชาติ."
 observation.3149.desc:2 "$observation.3139.start.desc$\nส่วนใหญ่[From.GetSpeciesAdj]ขอบเขตบน[From.Capital.GetName]กําลังละทิ้งวิถีสงครามของพวกเขา มันเหมือนจุดเริ่มต้นของยุคใหม่แห่งสันติภาพ[From.Capital.GetPlanetHabitat]."
 observation.3151.desc:3 "$observation.3139.start.desc$\nเราได้เปิดใจของ[From.target.GetSpeciesNamePlural]ไป ยัง แดน วิญญาณ ที่ พวก เขา ไม่ เคย รู้ ว่า อยู่ ที่ นั่น. ในที่สุดพวกเขาก็มีสิ่งที่ต้องเชื่อ และสังคมของพวกเขาก็รวยขึ้น"
 observation.3153.desc:2 "$observation.3139.start.desc$\nโดยแน่นอนเราได้ปฏิบัติมันอย่างจริงจังแล้ว[From.GetSpeciesNamePlural]ใน เรื่อง การ ถือ โชค ลาง และ ความ เชื่อ ดั้งเดิม ที่ รบกวน สังคม ของ พวก เขา. พวกเขาเริ่มที่จะเห็น คุณค่าของวิทยาศาสตร์และความมีเหตุผล"


