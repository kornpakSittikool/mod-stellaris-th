 action.38.b: "ขอบคุณหรอ?"
 action.39.name:1 "สนธิสัญญาสันติภาพกับ §H[From.GetName]§!"
 action.39.message:1 "เราลงนามสันติภาพขาวในสงครามกับ §H[From.GetName]§! แล้ว"
 action.39.desc.default:1 "สงครามสิ้นสุดแล้ว ไม่มีผู้ชนะในครั้งนี้"
 action.39.a:1 "เราจะยอมรับสิ่งนี้ ในตอนนี้"

 action.37.desc.hw:1 "ไม่ว่าจะด้วยวิธีที่มีเกียรติหรือไม่มีเกียรติ ท่านได้เอาชนะเราในการต่อสู้ จงรับของที่ปล้นได้และระวังวันที่เราจะกลับมา"
 action.37.desc.rc:2 "ดูเหมือนว่าเราประเมินมูลค่าสุทธิของท่านต่ำเกินไป [Root.GetSpeciesNamePlural] มั่นใจได้เลยว่าจะไม่เกิดขึ้นอีก"
 action.37.desc.pt:1 "การก่อการร้ายอย่างต่อเนื่องของท่านบังคับให้เราต้องยินยอม ขอให้กิจการของเราไม่ถูกความขัดแย้งเช่นนี้รุมเร้าอีก"
 action.37.desc.hi:3 "เรายอมรับความพ่ายแพ้ แต่อย่าคิดว่านี่เป็นมากกว่าความพ่ายพลั้งชั่วคราวสำหรับ[This.GetName]"
 action.37.desc.fb:1 "เราถูกบังคับให้ยุติความขัดแย้งนี้เพื่อช่วยชีวิตผู้บริสุทธิ์ แต่ดำเนินต่อไปในเส้นทางนี้และเราจะรวมกาแล็กซีต่อต้านท่าน"
 action.37.desc.xi:4 "เราถูกบังคับให้ยอมแพ้ แต่อย่าคิดว่าเราจะลืมที่ท่านเอาชีวิต[This.GetSpeciesAdj]อย่างไร้ความปรานี! นี่คือสิ่งที่เราคาดหวังจากเผ่าพันธุ์ของท่าน"
 action.37.desc.hm:4 "[This.GetName] เห็นเป็นเอกฉันท์ เราต้องยินยอม ความพยายามของท่านในการจำกัดการเติบโตของเราพิสูจน์ว่าประสบความสำเร็จในตอนนี้"
 action.37.desc.mf:1 "เราไม่มีทางเลือกอื่นนอกจากยอมรับข้อเรียกร้องของท่าน ทำไมท่านถึงทำเช่นนี้กับเรา? เราต้องการเพียงแค่แบ่งปันกาแล็กซีนี้กับท่าน"
 action.37.desc.ez:1 "ชัยชนะของคุณเป็นเพียงการทดสอบศรัทธาของเราอีกครั้งหนึ่ง ในท้ายที่สุด ผู้ศรัทธาที่แท้จริงจะเป็นฝ่ายกำชัย"
 action.37.desc.fp:1 "ไม่ว่าคุณจะอ้างสิทธิ์อะไร เราจะทวงคืนเป็นพันเท่า ชัยชนะของคุณจะไม่มีความหมายใดๆ เมื่อคุณถูกลดรูปเหลือเพียงเถ้าถ่าน"
