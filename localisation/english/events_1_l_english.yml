 ##########################

 diplomatic.2.name:0 "[From.From.Owner.GetAdj]ผู้ บัญชา การ ปรึกษา เรา"
 diplomatic.2.desc:0 "เดอะ[From.From.Owner.GetSpeciesNamePlural]เป็นที่ทราบกันว่า มีข้อดีไม่กี่ข้อ ที่จะพูดเกี่ยวกับสิ่งมีชีวิตต่างดาวโดยทั่วไป พวกที่ทําการทูต[From.From.Owner.GetName]ไม่ สามารถ มี อารมณ์ ฉุนเฉียว ได้ เพราะ พวก เขา แทบ จะ ไม่ คาด หมาย อะไร เลย นอก เหนือ จาก การ แสดง ความ นับถือ อย่าง ไม่ อั้น ถ้า อย่าง นั้น. อย่างไรก็ตาม ขณะกําลังวิ่ง[Root.GetAdj]พื้นที่ การสื่อสารมักจะอยู่ในระเบียบปฏิบัติ\n\nวันนี้ไม่เช้าเท่าไหร่[broadcasted_insult_leader.GetName]ตัดสินใจที่จะปล่อยข้อความ ความรุนแรงอย่างสุดโต่งต่อสาธารณชนของเรา ที่ไม่ไว้วางใจในขณะที่การบังคับกองเรือผ่าน[From.From.GetStarName]ระบบ ผู้ บัญชา การ ดู เหมือน ว่า ได้ รับ สัญญาณ วิทยุ จาก ดาว เคราะห์ ดวง หนึ่ง ของ เรา และ เริ่ม ต้น ด้วย ความ สับสน เกี่ยว กับ วัฒนธรรม และ แหล่ง กําเนิด ทาง วิวัฒนาการ ของ เรา. หลาย ล้าน คน ได้ ยิน ข่าวสาร ดัง ที่ ตั้งใจ ไว้ อย่าง ชัดเจน. ความโกรธมันรุนแรง"
 diplomatic.2.a:0 "[From.From.Owner.GetName]ต้องยิงเจ้ายักษ์นี่เดี๋ยวนี้"
 diplomatic.2.b:0 "[broadcasted_insult_leader.GetName]ต้องถูกนํามาหาเราและฆ่า!"
 diplomatic.2.c:0 "นี่เป็นแค่คําพูด เราไม่มีเงินพอ"
 diplomatic.3.name:0 "ผู้บัญชาการผู้บังคับการ[From.GetSpeciesNamePlural]"
 diplomatic.3.desc:0 "แม้ ว่า มี ไม่ กี่ คน ใน พวก เรา ที่ ชอบ ใช้ เวลา อยู่ ด้วย กัน[From.GetSpeciesNamePluralInsult]โดย ทั่ว ไป แล้ว พวก เรา ส่วน ใหญ่ พยายาม หลีก เลี่ยง การ ประกาศ ว่า เรา ไม่ มี รส ใน สมัย ที่ ไม่ ได้ รับ บัพ ติ สมา. ผู้บัญชาการ[broadcasted_insult_leader.GetName]ดู เหมือน ว่า ได้ ละ ทิ้ง ความ ห่วงใย เช่น นั้น ไป แล้ว เมื่อ การ แพร่ กระจาย ข่าว ดี อัน ชั่ว ร้าย เกี่ยว กับ[From.GetSpeciesName]คนระหว่างเดินทาง[From.GetAdj]พื้นที่ รายการ คํา อ้าง เกี่ยว กับ ลักษณะ ที่ ด้อย กว่า ของ พวก เขา ได้ ทํา ขึ้น เพื่อ การ บรรยาย เล็ก ๆ น้อย ๆ ที่ ยอม รับ ได้[Root.GetHomeWorldName]แต่ทําให้เกิดเหตุการณ์ทางการทูตกับชาวบ้าน\n\n[broadcasted_insult_leader.GetName]ได้ขอโทษเป็นการส่วนตัว โดยอ้างว่า น่ารําคาญกับการฟังวิทยุท้องถิ่น เดอะ[From.GetAdj]รัฐบาลกําลังเรียกร้องให้ผู้กระทําความผิดลาออกในทันที"
 diplomatic.3.a:0 "นิสัย ที่ ควบคุม ไม่ ได้ เช่น นั้น ไม่ เหมาะ สําหรับ ผู้ บัญชา การ."
 diplomatic.3.b:0 "เสียงออกอากาศค่อนข้างตลก เราไล่ใครออกไม่ได้หรอก"
 diplomatic.4.desc:0 "แม้ ว่า มี ไม่ กี่ คน ใน พวก เรา ที่ ชอบ ใช้ เวลา อยู่ ด้วย กัน[From.GetSpeciesNamePluralInsult]โดย ทั่ว ไป แล้ว พวก เรา ส่วน ใหญ่ พยายาม หลีก เลี่ยง การ ประกาศ ว่า เรา ไม่ มี รส ใน สมัย ที่ ไม่ ได้ รับ บัพ ติ สมา. ผู้บัญชาการ[broadcasted_insult_leader.GetName]ดู เหมือน ว่า ได้ ละ ทิ้ง ความ ห่วงใย เช่น นั้น ไป แล้ว เมื่อ การ แพร่ กระจาย ข่าว ดี อัน ชั่ว ร้าย เกี่ยว กับ[From.GetSpeciesName]คนระหว่างเดินทาง[From.GetAdj]พื้นที่ รายการ คํา อ้าง เกี่ยว กับ ลักษณะ ที่ ด้อย กว่า ของ พวก เขา ได้ ทํา ขึ้น เพื่อ การ บรรยาย เล็ก ๆ น้อย ๆ ที่ ยอม รับ ได้[Root.GetHomeWorldName]แต่ทําให้เกิดเหตุการณ์ทางการทูตกับชาวบ้าน\n\n[broadcasted_insult_leader.GetName]ได้ขอโทษเป็นการส่วนตัว โดยอ้างว่า น่ารําคาญกับการฟังวิทยุท้องถิ่น เดอะ[From.GetAdj]รัฐบาลกําลังเรียกร้องให้ผู้กระทําความผิด ถูกประหารชีวิตและต้องการ[broadcasted_insult_leader.GetHimHer]ถูกสกัดมา[From.GetHomeWorldName]."
 diplomatic.4.a:0 "ชีวิต หนึ่ง เป็น ราคา เล็ก น้อย ที่ จะ จัด การ กับ ข้อ พิพาท ใน ท่ามกลาง หลาย ล้าน คน."
 diplomatic.4.b:0 "เราจะไม่ส่งมอบหนึ่งในของเราเอง เพื่อให้เซนินเพื่อฆ่า!"
 diplomatic.5.name:0 "[From.GetName]ผู้บังคับการสํารอง"
 diplomatic.5.desc:0 "หลังจากที่ถูกกดดันจากนักการทูต ให้เลือกผู้นําอย่างรอบคอบ[From.GetRulerName]ได้กําจัดผู้บัญชาการ[broadcasted_insult_leader.GetName]จากหน้าที่ ผู้บัญชาการไม่ได้ไปอย่างเงียบ ๆ แต่สาบานที่จะล้าง[broadcasted_insult_leader.GetHisHer]ชื่อ ก็หวังว่า[From.GetAdj]ความคิดเห็นของประชาชนจะต่อต้าน[Root.GetName]ในอนาคต\n\nผู้นําของ[From.GetName]อย่างไรก็ตามได้ส่งข้อความที่ชัดเจนเกี่ยวกับการเดินทางในอนาคตไปยังเขตของเรา แม้ว่าพวกมันอาจจะไม่ชอบ การจัดการกับสัตว์ต่างดาว[Root.GetSpeciesName]อย่างน้อยก็ให้ความเคารพในพื้นที่ของตัวเอง"
 diplomatic.5.a:0 "พวกเขาควรจะอยู่ในเส้นทางนั้น"
 diplomatic.6.name:0 "[From.GetName]ผู้บังคับการพิเศษ"
 diplomatic.6.desc:0 "หลังจากการเจรจากันไม่นาน[broadcasted_insult_leader.GetName]ได้ถูกส่งมอบให้เรา สําหรับการลงโทษ การ พิจารณา อย่าง รอบคอบ ว่า เป็น การ ลง โทษ ที่ เหมาะ สม เพียง ไร สําหรับ การ ดู หมิ่น[Root.GetSpeciesName]อาจ เป็น ได้ ว่า มี แต่ ความ ตาย และ ความ พินาศ อย่าง สิ้น เชิง เท่า นั้น ที่ ดู เหมือน เป็น ทาง เลือก ที่ เหมาะ สม.\n\nไม่รวมเข้ากับ[broadcasted_insult_leader.GetHerHis]ช่วงเวลาสุดท้าย สุนทรพจน์ที่ดื้อรั้นของผู้บัญชาการ เกี่ยวกับวิธีการของเราป่าเถื่อน ถูกตัดสั้นโดยผนึกปิด ขณะที่ฝักได้เปิดตัวที่ใกล้แสงเข้าไปในหัวใจของ[Root.Capital.StarName]เปลวไฟที่สว่างไสว ค่ําคืนของบรรพบุรุษของเรา"
 diplomatic.6.a:0 "ไม่มีการใส่ความ[From.GetRandomSpeciesSound]."
 diplomatic.7.name:0 "[From.GetName]ผู้ บัญชา การ ป้องกัน"
 diplomatic.7.desc:0 "เราขอให้[broadcasted_insult_leader.GetName]ถูกถอดออกจากหน้าที่ โดยขาดความเข้าใจ[From.GetRulerTitle] [From.GetRulerName]และ[From.GetAdj]ความเป็นผู้นํา พวกเขาตอบสนองด้วยข้อความ ส่วนใหญ่พยายามที่จะแก้ตัว พฤติกรรมของผู้บัญชาการในขั้นตอนที่แนะนํา อาจจะโดยไม่ได้ตั้งใจว่าบางส่วนของสิ่งที่[broadcasted_insult_leader.GetSheHe]พูดถึง[Root.GetSpeciesNamePlural]มันอาจจะจริงก็ได้\n\nสิ่ง ที่ เรา สันนิษฐาน ว่า เป็น การ กระทํา ของ เจ้า ยักษ์ คน หนึ่ง ปรากฏ ว่า เป็น ที่ ยอม รับ ใน[From.GetName]เห็น ได้ ชัด ว่า พวก เขา คิด ว่า ประชาชน ของ เรา อาจ ถูก ดู หมิ่น และ ถูก ใส่ ร้าย โดย ไม่ มี ผล กระทบ."
 diplomatic.7.a:0 "มงกุฎเน่าเหมือนกิ่ง"
 diplomatic.8.name:0 "ผู้ใช้ที่ไม่ต้องการกลับ"
 diplomatic.8.desc:1 "ผู้บังคับการซึ่งเคยถูกไล่ออกจากกองเรือของเรา เพราะเหตุการณ์ทางการทูต อันเนื่องมาจากการดูถูก ด้วยสงครามที่เกิดขึ้นอย่างต่อเนื่อง คําแถลงหลายข้อในระบบสื่อสารเดิม ตอนนี้คนโฆษณาชวนเชื่อได้ยินทุกวัน\n\nในขณะที่การเปลี่ยนแปลงการตัดสินใจของเราตอนนี้ จะทําให้ความน่าเชื่อถือของการบริหารอ่อนลง นี่อาจเป็นผู้บัญชาการที่ดีที่สุด"
 diplomatic.8.a:0 "เราต้องการคนมาชุมนุม"
 diplomatic.8.b:0 "เราตัดสินใจถูกแล้ว และเรายึดติดอยู่กับมัน"
 diplomatic.10.name:0 "นัก วิจัย สงสัย ว่า เรือ ต่าง ประเทศ"
 diplomatic.10.desc:0 "[Root.GetName]เป็น ที่ รู้ จัก กัน ใน เรื่อง มาตรฐาน ทาง การ ศึกษา และ การ ขับ รถ ไป สู่ การ สร้าง นวัตกรรม แต่ การ อยู่ ที่ ขอบ เลือด ไม่ เพียง แต่ ต้อง อาศัย ความ รอบคอบ ใน การ ทํา งาน วิจัย เท่า นั้น แต่ ต้อง มี ใคร ร่วม ใน งาน วิจัย ด้วย. ความ ลับ ทาง การ ค้า ของ เรา มี ค่า สูง ใน ด้าน ครอบครัว รวม ทั้ง ทั่ว กาแล็กซี ด้วย และ นัก วิทยาศาสตร์ บาง คน ได้ รับ การ ป้องกัน ไว้ มาก จาก การ พยายาม เข้า ถึง ข้อมูล ของ ตน อย่าง ผิด กฎหมาย.\n\nการปรากฏตัวของ[From.From.Owner.GetAdj]ยานวิทยาศาสตร์ในอาณาเขตของเรา ได้ก่อให้เกิดสิ่งอํานวยความสะดวกการวิจัยมากมาย เพื่อสงสัยว่าพวกเขาจารกรรม นัก วิจัย บาง คน อ้าง ว่า พวก เขา ไม่ สามารถ ดําเนิน งาน ต่อ ไป ภาย ใต้ การ คุกคาม ที่ เข้าใจ ได้ นี้ ได้ โดย ขอ ให้ เรา ปิด พรม แดน ของ เรา ต่อ ไป กับ ความ สงสัย เหล่า นี้[From.From.Owner.GetSpeciesNamePlural]."
 diplomatic.10.a:0 "นักวิทยาศาสตร์ของเราต้องรู้สึกปลอดภัยจากการสังเกต ปิดชายแดน"
 diplomatic.10.b:0 "เส้นเลือดวิทยาศาสตร์คือเพื่อนนักวิจัย ไม่ใช่สายลับ"
 diplomatic.11.name:0 "[From.GetName]เส้นขอบปิด"
 diplomatic.11.desc:0 "การปรากฏตัวของเรือวิทยาศาสตร์ของคุณใน[From.GetAdj]พื้นที่ทําให้เราสงสัย แรงจูงใจของคุณ นักวิจัยของเราเชื่อว่า นักวิทยาศาสตร์ของคุณไม่ได้ดําเนินการ แต่ขโมยงานวิจัย เพื่อรักษาความลับทางการค้าอันมีค่า เราต้องกันคุณออกจากพื้นที่ของเรา"
 diplomatic.11.a:0 "เป็นช่วงที่วุ่นวายจริงๆ เมื่อนักวิทยาศาสตร์ไม่ไว้ใจกันและกัน"
 diplomatic.12.name:0 "[From.From.GetName]ผู้ต้องสงสัยในแอพเพล็ตจีโนม"
 diplomatic.12.desc:0 "การที่เราป้องกันการข่มขู่ของซีโน ถือเป็นเรื่องเร่งด่วน ตั้งแต่ที่เราจากมาครั้งแรก[Root.GetHomeWorldName]. เดอะ[From.From.GetAdj]เรือวิทยาศาสตร์ที่แอบเข้ามาในพื้นที่ของเรา ไม่ได้หายไปโดยไม่มีใครสังเกตเห็น แต่จนถึงขณะนี้ อย่าง ไร ก็ ตาม ทฤษฎี เมื่อ เร็ว ๆ นี้ ได้ ทํา ให้ เกิด ข้อ สงสัย ใน เรื่อง นี้.\n\nเดอะ[From.From.GetSpeciesName]เป็นที่รู้จักในการใช้จีโนมในการค้นคว้าทางการแพทย์ ถ้าหากพวกเขาทําแผนที่พันธุกรรม ของการสงสัย[Root.GetSpeciesNamePlural]ด้วยความตั้งใจที่จะหาจุดอ่อนของเรา แม้ไม่มีหลักฐานที่ปรากฏให้เห็น แต่ทฤษฎีได้นําไปสู่ การเรียกร้องให้ปิดพรมแดนของเรา[From.From.GetName]เพื่อป้องกันแผนการใดๆ ที่เป็นไปได้จากความสําเร็จ"
 diplomatic.12.a:0 "เราไม่สามารถเสี่ยงให้ศัตรูในอนาคต เข้าถึงข้อมูลนี้! ปิดชายแดน"
 diplomatic.12.b:0 "เราจะไม่ใช้นโยบายต่างประเทศ เรื่องทฤษฎีสมคบคิด"
 diplomatic.12.c:0 "เราต้องเริ่มโครงการเพื่อแผนที่พันธุกรรมของพวกเขา เพื่อแก้แค้น"
 diplomatic.13.name:0 "[From.GetName]เส้นขอบปิด"
 diplomatic.13.desc:0 "เรือวิทยาศาสตร์ของคุณได้รับการรายงาน สําหรับกิจกรรมน่าสงสัยในพื้นที่ของเรา มีข่าวลือว่า คุณศึกษา แต่งหน้าพันธุกรรมของเรา เพื่อหาข้อมูล ที่จะใช้ในการหาจุดอ่อน เราไม่สามารถเปิดเผย[From.GetSpeciesAdj]คนที่เสี่ยงขนาดนั้น"
 diplomatic.13.a:0 "ข้อกล่าวหาพื้นฐาน!"
 diplomatic.14.name:0 "ผลการจับสัญญาณจีโนม"
 diplomatic.14.desc:0 "ถึง แม้ เรา ไม่ พบ ราย ละเอียด ที่ เฉพาะ เจาะจง เกี่ยว กับ จี โนม ที่ เรา หวัง ไว้ แต่ การ วิจัย ของ เรา ได้ อธิบาย ให้ กระจ่าง มาก เกี่ยว กับ ลักษณะ พิเศษ ของ ยีน ของ เรา เอง. อาวุธ บาง อย่าง ที่ ปรากฏ ว่า เป็น ประโยชน์ ใน สงคราม[Root.GetHomeWorldName]ในอดีตอาจสูญเปล่ากับสิ่งมีชีวิตต่างดาว การ หยั่ง เห็น เข้าใจ ใหม่ ๆ เหล่า นี้ ได้ ช่วย เรา พัฒนา หลัก คํา สอน ใหม่ ๆ ใน การ ต่อ สู้."
 diplomatic.14.a:0 "ถ้าพวกเขาพุ่งเป้ามาที่เราจริงๆ เราอาจจะต้องการมัน"
 diplomatic.15.name:0 "กําลังกวน[From.From.GetAdj]นัก วิทยาศาสตร์"
 diplomatic.15.desc:0 "เดอะ[Root.GetName]ความ พยายาม ที่ จะ ไม่ ปล่อย ให้ ความ ห่วงใย ทาง ฝ่าย วิญญาณ มา ขัด ขวาง การ สํารวจ และ การ ตรวจ สอบ สิ่ง ธรรมดา ๆ ของ เรา แต่ เรา รู้ วิธี ที่ จะ เอา ใจ ใส่ อย่าง เหมาะ สม ต่อ ความ หยั่ง เห็น เข้าใจ และ ประเพณี ใน แนว ทาง ของ การ กระทํา ทุก อย่าง. นักวิทยาศาสตร์จาก[From.From.GetName]ดูเหมือนเป็นการประมาทเล็กน้อย ในการแสวงหาการค้นพบใหม่ทางดาราศาสตร์\n\nหลังจากให้ความสนใจในบางส่วนของดาวที่อยู่ใกล้เคียง ที่กลายเป็นกลุ่มดาวที่สําคัญ[Root.GetSpeciesAdj]เทพนิยาย[encroaching_research_leader.GetName]เคยถูกกล่าวหาว่าพยายาม\"พิสูจน์\" ตํานานบางเรื่องรอบตัวพวกเขา ขณะ ที่ เรา มั่น ใจ ว่า กลุ่ม ดาว เหล่า นี้ มี ความ สําคัญ ทาง ฝ่าย วิญญาณ ไม่ อาจ ได้ รับ ผล กระทบ จาก การ ค้น พบ ของ โลก แต่ หลาย คน คัดค้าน การ ค้นคว้า และ พยายาม โน้ม น้าว ใจ[encroaching_research_leader.GetHimHer]จะออกไป[Root.GetAdj]พื้นที่"
 diplomatic.15.a:0 "แรงจูงใจที่ไม่เหมาะสม ก็เพียงพอแล้ว ที่จะขัดขวางพวกเขา จากพื้นที่ของเรา"
 diplomatic.15.b:0 "ความ เชื่อ ของ เรา เหนือ กว่า สิ่ง ฝ่าย วัตถุ. มันไม่อาจเป็นอันตรายได้"
 diplomatic.15.b.tooltip:0 "[encroaching_research_leader.GetName]ต่อไป[encroaching_research_leader.GetHerHis]สืบค้น"
 diplomatic.16.name:0 "[From.GetName]เส้นขอบปิด"
 diplomatic.16.desc:0 "นักวิทยาศาสตร์ของคุณ[encroaching_research_leader.GetName]ให้ความสนใจอย่างเกินเหตุ ต่อดาวในหมู่ดาว ประชาชนของเราถือศักดิ์สิทธิ์ เรา ไม่ อาจ ปล่อย ให้ ใคร ก็ ตาม ดําเนิน งาน ใน เขต ทํา งาน ของ เรา ซึ่ง ไม่ ให้ ความ นับถือ อย่าง เหมาะ สม ต่อ ความ เชื่อ และ ตํานาน ของ เรา."
 diplomatic.16.a:0 "นี่ต้องเป็นเรื่องเข้าใจผิดแน่ๆ"
 diplomatic.17.name:0 "การ ค้น พบ นอก รีต[From.GetName]"
 diplomatic.17.desc:0 "การนําการวิจัยในพื้นที่ที่ควบคุมได้จากต่างประเทศ ต้องมีความสุขุมรอบคอบ บางสิ่งที่บางครั้งเรามองข้าม ในการเกณฑ์นักวิทยาศาสตร์ของเรา มันชัดเจนขึ้นเมื่อ[encroaching_research_leader.GetName]เมื่อเร็ว ๆ นี้ได้วิ่งไปสู่ปัญหา การศึกษาบางส่วนของดาวที่ศักดิ์สิทธิ์[From.GetAdj]กลุ่มดาว คน ท้อง ถิ่น ไม่ เห็น ด้วย กับ การ ตรวจ ด้วย ตัว เอง[encroaching_research_leader.GetHimHer]ถึง[From.GetRulerTitle] [From.GetRulerName]ได้แถลงยืนยันการวิจัยนี้\n\n[encroaching_research_leader.GetName]เห็นได้อย่างชัดเจนเนื่องจากเกลียดชังการประท้วงที่ปรากฏได้ใช้เวลาในการหาจริงเนื้อหาที่บอกว่าบางส่วนของ[From.GetAdj]ตํานาน ที่ อยู่ รอบ ดวง ดาว อาจ ไม่ ตรง กัน อย่าง สิ้น เชิง กับ อายุ และ พัฒนาการ ของ ดาว เหล่า นั้น. การ ทํา เช่น นี้ คง จะ ก่อ ความ ขุ่น เคือง มาก ขึ้น หาก ตี พิมพ์."
 diplomatic.17.a:0 "[encroaching_research_leader.GetIsAreCap] [encroaching_research_leader.GetSheHe]จงใจสร้างเรื่องอื้อฉาวงั้นเหรอ ยิง[encroaching_research_leader.GetHimHer]."
 diplomatic.17.b:0 "เรื่องแบบนี้เกิดขึ้น ในหลักสูตรการวิจัย"
 diplomatic.18.name:0 "[encroaching_research_leader.GetName]ผู้ จัด พิมพ์"
 diplomatic.18.desc:0 "แม้เราจะเชื่อใจในความตั้งใจที่ดีที่สุด[From.GetName]นักวิจัยที่ศึกษากลุ่มดาวโบราณของเรา[encroaching_research_leader.GetSheHe] [encroaching_research_leader.GetHasHave]จัดการกับคนของเรา ด้วยการปรับอายุของดาว และโต้แย้งว่าการพัฒนา ของความสว่างและสายตาของพวกเขา\n\nคน ที่ ต่อ ต้าน โครงการ นี้ แต่ เดิม ได้ โต้ แย้ง ว่า มี การ จงใจ ทํา เช่น นี้ เพราะ ความ มุ่ง ร้าย ของ นัก วิทยาศาสตร์ หลัง จาก ที่ พวก เขา ขอ ให้ การ ศึกษา ยุติ ลง. เดอะ[From.GetAdj]รัฐบาลได้ตัดสินใจที่จะกลบเกลื่อนประเด็นนี้ และปฏิเสธที่จะดําเนินการเพื่อป้องกันความโกรธและความเจ็บปวด รายงานนี้น่าจะเป็นสาเหตุของคนของเรา"
 diplomatic.18.a:0 "เราไม่ควรไว้ใจให้พวกเขาเคารพเรา"
 diplomatic.19.name:0 "ลมแดดออก"
 diplomatic.19.desc:0 "ดนตรี ได้ รับ เอา หลาย รูป แบบ จาก สิ่ง มี ชีวิต ที่ เรา ได้ ประสบ นับ ตั้ง แต่ ออก จาก บ้าน[Root.GetHomeWorldName]และวิธีการและชอบ ก็ทําให้เราสับสน บาง ครั้ง ดนตรี ของ คน ต่าง ด้าว ทํา ให้ เรา ไม่ สามารถ ฟัง ได้ ขณะ ที่ บาง ครั้ง คลื่น ก็ แข็ง แรง พอ ที่ จะ ทําลาย ความ สามารถ ใน การ ได้ ยิน ของ เรา. การได้ฟังเพลงที่เรารักมากกว่าผู้สร้าง เป็นโอกาสที่หาได้ยากจริงๆ\n\nโอกาสอันหาได้ยากเช่นนี้ เกิดขึ้นเมื่อเร็ว ๆ นี้[music_listening_planet.GetName]อยู่ใกล้[music_origin_country.GetAdj]ชายแดน สถานีวิทยุ เล่นดนตรีจากอีกด้านหนึ่ง ได้รับความนิยมอย่างมาก มีเครื่องมือจาก[music_origin_country.GetHomeWorldName]ไม่เพียง แต่ความสุข แต่ดูเหมือนจะก่อให้เกิด[Root.GetSpeciesAdj]ร่าง กาย จะ สะท้อน ออก มา ทํา ให้ รู้สึก ผ่อน คลาย[Root.GetSpeciesOrganName]ไม่ว่าจะเป็นเครื่องดนตรีอะไรก็ตาม มันไม่เหมือนกับพวกเรา"
 diplomatic.19.a:0 "เป็นเวลาที่ยอดเยี่ยมที่จะเรียนรู้เกี่ยวกับวัฒนธรรมของพวกเขา"
 diplomatic.19.b:0 "ให้ เรา ระวัง และ ศึกษา เครื่อง ดนตรี ชนิด นี้."
 diplomatic.20.name:0 "ชีวเคมี"
 diplomatic.20.desc:1 "เมื่อ เรา ได้ ชม ดนตรี ของ มนุษย์ ต่าง ดาว อย่าง ใกล้ ชิด เรา ก็ พบ ว่า ดนตรี ชนิด นี้ ทํา จาก เครื่อง ดนตรี ที่ ทํา จาก เครื่อง ดนตรี ที่ ทํา จาก พืช พื้น เมือง ชนิด หนึ่ง บน โลก. โครง สร้าง ภาย ใน ที่ ผิด ปกติ ของ พืช นี้ แตก ต่าง อย่าง สิ้น เชิง จาก สิ่ง ใด ๆ ที่ เกี่ยว ข้อง[Root.GetHomeWorldName]แม้แต่ในระดับโมเลกุล ผลกระทบของอากาศผ่านพืชที่[Root.GetSpeciesAdj]ร่างกายได้พัฒนาความเข้าใจของเรา เรื่องชีววิทยาดอกไม้ บนดาวเคราะห์ฤกษ์"
 diplomatic.20.a:0 "ใครจะรู้ว่าเราจะเจออะไร"
 diplomatic.21.name:0 "[neighbor_contesting_colony.GetName]วัตถุที่จะขยาย"
 diplomatic.21.desc:0 "อาณานิคมใหม่ของคุณบน[Root.GetName]อยู่ใกล้กับพรมแดนของเรามาก เราจะชอบมากถ้าคุณถอนตัวจากชายแดนนี้ เพื่อหลีกเลี่ยงความขัดแย้งในอนาคต กว่าที่ชายแดนของเราควรจะวาด"
 diplomatic.21.a:0 "เราจะหยุดการพัฒนาทันที"
 diplomatic.21.b:0 "อาณานิคมเป็นส่วนหนึ่งของอนาคตของเรา มันอยู่"

 diplomatic.1000.name:0 "กองยานมานู เอ อร์"
 diplomatic.1000.desc:0 "ผู้บัญชาการ[exercise_admiral.GetName]ได้ร่างแผนการสําหรับการฝึกทัพเรือใหญ่ ซึ่งจะเกี่ยวข้องกับส่วนอย่างมากของกองทัพเรือของเรา ตําแหน่ง[exercise_admiral.GetSheHe] [exercise_admiral.GetHasHave]คัดเลือกมาเพื่อการประลองนี้[exercise_system.GetName]ระบบที่อยู่ใกล้กับชายแดนของ[exercise_neighbor.GetName].\n\nเดอะ[exercise_neighbor.GetSpeciesNamePlural]แต่ ถ้า เรา ยก เลิก การ ออก กําลัง ทหาร จะ ถือ ว่า เป็น สัญญาณ ของ ความ อ่อนแอ. หลังจากทั้งหมด[exercise_system.GetName]อยู่ในห้วงอวกาศของเรา[exercise_neighbor.GetName]ไม่มีสิทธิ์มาบอกเราว่า เราทําอะไรได้ในสวนหลังบ้านของเรา"
 diplomatic.1000.a:0 "ทําตามแผนที่วางไว้"
 diplomatic.1000.b:0 "ยกเลิกการฝึก"
 FLEET_MANEUVERS_1_PROJECT:0 "พฤติกรรมกองยานมานู เอ อร์"
 FLEET_MANEUVERS_1_PROJECT_DESC:0 "มี การ วาง แผน เดิน เรือ ใหญ่ ๆ ไว้ ใน[exercise_system.GetName]ระบบ ใกล้กับพรมแดน[exercise_neighbor.GetName]จุดประสงค์ของแบบฝึกหัดนี้คือการจําลองเครื่องตรวจจับศัตรูโดยสําคัญ[exercise_neighbor.GetSpeciesName]บังคับให้เข้ามาในพื้นที่ของเรา เพื่อเป็นทางแรก สู่การรุกราน\n\nการออกกําลังกายจะเริ่มต้นเมื่อทั้งหมดของกองกําลังที่ขยายได้ไปถึงพื้นที่เริ่มต้นการวางในวงโคจรของ[exercise_location.GetName]."
 FLEET_MANEUVERS_2_PROJECT:0 "$FLEET_MANEUVERS_1_PROJECT$"
 FLEET_MANEUVERS_2_PROJECT_DESC:0 "$FLEET_MANEUVERS_1_PROJECT_DESC$"
 FLEET_MANEUVERS_3_PROJECT:0 "$FLEET_MANEUVERS_1_PROJECT$"
 FLEET_MANEUVERS_3_PROJECT_DESC:0 "$FLEET_MANEUVERS_1_PROJECT_DESC$"
 diplomatic.1001.name:0 "กองยานผู้ผลิตถูกยกเลิก"
 diplomatic.1001.desc:0 "แผนการในการออกกําลังกองเรือใหญ่ถูกยกเลิกแล้ว ความ ล่า ช้า อย่าง ต่อ เนื่อง ใน การ ย้าย กอง กําลัง ที่ ได้ รับ การ ปล่อย ตัว เข้า สู่ ตําแหน่ง หมาย ความ ว่า การ ดําเนิน การ ใน ตอน นี้ จะ ทํา ให้ ระดับ ความ พร้อม ของ ทั้ง กอง เรือ ลด ลง อย่าง มาก."
 diplomatic.1002.desc:0 "ในฐานะ[Root.GetName]บัด นี้ มี ส่วน ร่วม ใน สงคราม ยิง กัน การ ออก กําลัง ทหาร ขนาด ใหญ่ ที่ เรา วาง แผน ไว้ ได้ ถูก ยก เลิก. ลูกเรือของเราจะได้รับประสบการณ์ในสนามรบแทน"
 diplomatic.1002.a:0 "ทดสอบด้วยไฟ"

 diplomatic.1006.name:0 "กิจกรรมของกองทัพเรือใน[exercise_system.GetName]"
 diplomatic.1006.desc:0 "เราได้รับรายงานเกี่ยวกับการเคลื่อนไหวของกองเรือ[From.Owner.GetName]พวกเขาดูเหมือนเป็นศูนย์กลาง[exercise_system.GetName]ระบบ - ใกล้เคียงกับชายแดนของเราอย่างน่าสงสัย อะไร[From.Owner.GetSpeciesNamePlural]ขึ้นไป?"
 diplomatic.1006.a:0 "จง เฝ้า ดู สถานการณ์ ต่อ ไป."

 diplomatic.1011.name:0 "กองยานคอลลิชัน"
 diplomatic.1011.desc:0 "กลยุทธ์ที่ซับซ้อนที่คิดโดยผู้บัญชาการ[exercise_admiral.GetName]มีการชนกันเล็กน้อยหลายระหว่างเจาะกองทัพเรือในปัจจุบัน[exercise_system.GetName]ระบบ การ บาด เจ็บ จาก การ บาด เจ็บ ของ ผู้ บาด เจ็บ มี น้อย มาก และ ไม่ มี เรือ ที่ เกี่ยว ข้อง ใด ๆ ได้ รับ ความ เสีย หาย ร้าย แรง แต่ พวก เขา จะ ต้อง ทํา งาน บาง ลาน เมื่อ สิ้น สุด การ ออก กําลัง."
 diplomatic.1011.a:0 "อย่างน้อยไม่มีเรือหลง"
 exercise_collision_tooltip:0 "ยานของเราจํานวนมากได้รับความเสียหาย จากการชนกัน"
 diplomatic.1012.name:0 "กองยานเรือ ที่ สูญ หาย"
 diplomatic.1012.desc:0 "เดอะ[destroyed_ship_1.GetName]และ[destroyed_ship_2.GetName]ทั้งสองได้สูญเสียอย่างน่าเศร้าด้วยมือทั้งหมด เมื่อเรือดาวทั้งสองชนกัน ในระหว่างการประลองความเร็วสูงที่เป็นส่วนหนึ่งของการดําเนินงาน[exercise_system.GetName]สว่านทหารเรือ ญาติถัดไปได้รับการแจ้ง"
 diplomatic.1012.a:0 "ช่างเป็นวันที่น่าเศร้า"
 exercise_ships_lost:0 "ยานสองลำของเราสูญหายเนื่องจากอุบัติเหตุการชนกัน"
 diplomatic.1013.name:0 "การซ้อมรบของกองยาน: นายทหารผู้มีอนาคตไกล"
 diplomatic.1013.desc:0 "กัปตัน [exercise_officer.GetName] แห่งยาน [officer_ship.GetName] ได้แสดงให้เห็นถึงแววอันยอดเยี่ยมอย่างมากระหว่างการฝึกซ้อมรบของกองยานที่กำลังดำเนินอยู่ในระบบ [exercise_system.GetName] นายทหารรุ่นเยาว์ผู้นี้ได้แสดงให้เห็นถึงความคิดริเริ่มสร้างสรรค์พร้อมความสามารถในการนำทัพอย่างโดดเด่น และกองบัญชาการทหารเรือเห็นสมควรที่จะเลื่อนยศ [exercise_officer.GetHerHim] ขึ้นเป็นนายพลเรือในทันที"
 diplomatic.1013.a:0 "กองยานต้องการผู้บัญชาการที่มีความสามารถอยู่เสมอ"
 exercise_officer_tooltip:0 "ผู้บัญชาการ [exercise_officer.GetName] พร้อมสำหรับการมอบหมายหน้าที่แล้ว"
 diplomatic.1014.name:0 "การซ้อมรบของกองยาน: ความสนใจของสาธารณชน"
 diplomatic.1014.desc:0 "การฝึกซ้อมทางทหารเรือที่ดำเนินอยู่ในระบบ [exercise_system.GetName] ได้รับความสนใจจากสื่อมวลชนอย่างมากบน [Root.Capital.GetName] และบรรดาอาณานิคม บันทึกโฮโลที่ไม่เป็นความลับซึ่งแสดงให้เห็นการดำเนินยุทธวิธีอันน่าตื่นเต้นเร้าใจ ได้ทำให้สาธารณชนปลาบปลื้มหลงใหลในเหล่าผู้พิทักษ์อันห้าวหาญของ [Root.GetName] ที่รับใช้อยู่ในกองยาน อาสาสมัครต่างพากันหลั่งไหลมายังสถานีรับสมัครทหารเรือของเรา!"
 diplomatic.1014.a:0 "สิ่งนี้น่าจะช่วยลดค่าใช้จ่ายลงได้"
 diplomatic.1020.name:0 "ข้อมูลข่าวกรองเกี่ยวกับการซ้อมรบของ [From.Owner.GetSpeciesName]"
 diplomatic.1020.desc:0 "หน่วยข่าวกรองของเราได้รวบรวมข้อมูลเพิ่มเติมเกี่ยวกับการทำกิจกรรมทางเรือที่เพิ่มขึ้นของ [From.Owner.GetSpeciesName] ในระบบ [exercise_system.GetName] ดูเหมือนว่า [From.Owner.GetName] ได้รวบรวมกองยานขนาดใหญ่ที่นั่นเพื่อทำการซ้อมรบทางเรือครั้งใหญ่ในระดับที่ไม่เคยมีมาก่อน\n\nแม้ว่าขณะนี้จะยังไม่มีสัญญาณบ่งชี้ว่าการฝึกซ้อมนี้จะแปรเปลี่ยนเป็นการปฏิบัติการทางทหารโดยตรงกับ [Root.GetName] แต่ตำแหน่งที่ใกล้กับชายแดนของเรานั้น ไม่อาจมองเป็นอย่างอื่นได้นอกจากการยั่วยุอย่างจงใจ! เราควรตอบสนองอย่างไร?"
 diplomatic.1020.a:0 "ยื่นหนังสือประท้วงทางการทูต!"
 diplomatic.1020.b:0 "เราจะเพิกเฉยต่อการยั่วยุของพวกเขา"
 exercise_diplomatic_protest:0 "เราแจ้งความไม่พอใจต่อการซ้อมรบเหล่านี้ให้ [From.Owner.GetName] ได้รับทราบ"
 diplomatic.1021.desc:0 "[From.GetName] ขอคัดค้านอย่างรุนแรงที่สุดต่อการซ้อมรบทางทหารอันเป็นการยั่วยุซึ่งกำลังจัดขึ้นในระบบ [exercise_system.GetName] โดยหน่วยเรือของ [Root.GetSpeciesName]\n\nการจัดซ้อมรบของกองยานในระดับที่ไม่เคยมีมาก่อนและอยู่ใกล้ชิดกับชายแดนของเราถึงเพียงนี้ ไม่อาจตีความเป็นอย่างอื่นได้นอกจากการข่มขู่คุกคามที่แทบไม่ได้ปิดบัง กองกำลังของเราเองได้รับการยกระดับการเตรียมพร้อมขั้นสูงสุด และผู้บัญชาการกองเรือของเราได้รับคำสั่งให้ตอบโต้การละเมิดพรมแดนใด ๆ ด้วยกำลังอันท่วมท้น"
 diplomatic.1021.a:0 "บอกพวก [From.GetSpeciesNamePlural] ให้เลิกยุ่งกับกิจการของเรา!"
 diplomatic.1021.b:0 "เราไม่อาจปล่อยให้เกิดกรณีพิพาทได้... ยกเลิกการซ้อมรบ"
 diplomatic.1021.c:0 "นักการทูตของเราจะช่วยเจรจาคลี่คลายสถานการณ์เอง"
 exercise_diplomatic_hardline:0 "เรายื่นคำตอบโต้อย่างแข็งกร้าวทางการทูตต่อการประท้วงอันน่ารำคาญใจของพวกเขา"
 exercise_diplomatic_canceled:0 "เรายกเลิกการซ้อมรบของกองยานที่กำลังดำเนินอยู่เพื่อปรับปรุงความสัมพันธ์กับ [From.GetName] ฝ่ายทหารย่อมไม่พอใจเรื่องนี้อย่างแน่นอน\n\n"
 exercise_diplomatic_conciliatory:0 "เราตอบโต้อย่างประนีประนอมเพื่อลดความเสียหายทางการทูต แต่การซ้อมรบจะยังคงดำเนินต่อไป"
 diplomatic.1022.desc:0 "เราได้รับข้อคัดค้านที่เรียบเรียงอย่างยอดแย่ของคุณต่อการซ้อมรบทางทหารที่กองทัพเรืออันรุ่งโรจน์ของเรากำลังดำเนินอยู่ในระบบ [exercise_system.GetName] แล้ว ในเมื่อระบบดังกล่าวนั้นตั้งอยู่ภายในดินแดนอธิปไตยของ [From.GetName] อย่างที่คุณเองก็น่าจะทราบดี เราจึงไม่เห็นว่าสิ่งที่เกิดขึ้นที่นั่นจะเกี่ยวอะไรกับคุณเลย\n\nทาง [Root.GetName] ควรหลีกเลี่ยงการส่งสาส์นทางการทูตที่ยั่วยุและบุ่มบ่ามเช่นนี้มาให้เราอีกในอนาคต\n\nสิ้นสุดการส่งสัญญาณแต่เพียงเท่านี้"
 diplomatic.1022.a:0 "เรื่องนี้ยอมไม่ได้เด็ดขาด!"
 diplomatic.1023.desc:0 "สืบเนื่องจากข้อคัดค้านที่ [Root.GetName] แสดงออกต่อการซ้อมรบทางเรือของเราในระบบ [exercise_system.GetName] ทาง [From.GetName] จึงได้ตัดสินใจที่จะยุติการซ้อมรบทั้งหมดที่กำลังดำเนินอยู่ เพื่อเป็นการส่งเสริมความสัมพันธ์ที่ดีขึ้นระหว่างชาติดวงดาวทั้งสองของเรา\n\nเราหวังเป็นอย่างยิ่งว่าการตัดสินใจนี้จะช่วยลดความตึงเครียดระหว่างดวงดาว พร้อมกับพิสูจน์ให้เห็นอย่างปราศจากข้อกังขาถึงความมุ่งมั่นของ [From.GetSpeciesName] ในการสร้างสันติภาพที่ยั่งยืนในกาแล็กซี"
 diplomatic.1023.a:0 "บางทีพวกเขาอาจจะจริงใจในการแสวงหาสันติภาพ..."
 diplomatic.1024.desc:0 "[From.GetName] รู้สึกเสียใจเป็นอย่างยิ่งต่อความเข้าใจผิดใด ๆ ที่อาจเกิดขึ้นจากการซ้อมรบทางทหารที่กำลังดำเนินอยู่ในระบบ [exercise_system.GetName] ของเรา\n\nการฝึกซ้อมรบทางเรือเหล่านี้ได้รับการวางแผนไว้ล่วงหน้านานแล้ว และสถานที่ซ้อมรบก็ถูกสุ่มเลือกโดยผู้บัญชาการของเรา จึงไม่ควรตีความว่านี่เป็นภัยคุกคามหรือการยั่วยุที่พุ่งเป้าไปยัง [Root.GetName] แต่ประการใด"
 diplomatic.1024.a:0 "นี่เป็นเพียงแผนลวงอีกอย่างของพวก [From.GetSpeciesName] หรือเปล่า?"
 diplomatic.1025.name:0 "การซ้อมรบสิ้นสุดลงแล้ว"
 diplomatic.1025.desc:0 "การซ้อมรบของกองยานที่นำโดย [exercise_fleet.GetName] ในระบบ [exercise_system.GetName] ได้เสร็จสิ้นลงแล้ว ผู้บัญชาการ [exercise_admiral.GetName] รายงานว่าพวกเราได้เรียนรู้อะไรหลายอย่างจากการซ้อมรบครั้งนี้ ซึ่งส่วนใหญ่เป็นผลมาจากขอบเขตการฝึกที่ใหญ่โตมโหฬาร แม้ว่ามันอาจจะส่งผลกระทบทางการทูตตามมา แต่อย่างน้อยที่สุด ประโยชน์ในทางทหารที่ได้รับก็นับว่าคุ้มค่ามหาศาล"
 diplomatic.1025.a:0 "ทำได้ดีมาก"
 diplomatic.1026.name:0 "การซ้อมรบของ [From.Owner.GetSpeciesName] สิ้นสุดลงแล้ว"
 diplomatic.1026.desc:0 "เมื่อพิจารณาจากการส่งสัญญาณเข้ารหัสทางทหารของ [From.Owner.GetSpeciesName] จากระบบ [exercise_system.GetName] ที่ลดลงอย่างกะทันหัน ดูเหมือนว่าการซ้อมรบทางเรือที่จัดขึ้นที่นั่นโดย [From.Owner.GetName] จะสิ้นสุดลงในที่สุด"
 diplomatic.1026.a:0 "ถึงเวลาเสียที"

 precursor_1: "$vultaum_precursor_civ$"
 precursor_2: "$yuht_precursor_civ$"
 precursor_3: "$first_league_precursor_civ$"
 precursor_4: "$irassian_precursor_civ$"
 precursor_5: "$cybrex_precursor_civ$"
 precursor_baol_1: "$NAME_Baol$"
 precursor_zroni_1: "$NAME_Zroni$"
 precursor_inetian: "$NAME_inetian$"
 precursor_adakkaria: "$NAME_adakkaria$"

 precursor_1_desc: "ความรู้ของพวกเขานั้นกว้างใหญ่ ทฤษฎีของพวกเขาก็ซับซ้อน ทว่าการแสวงหาความจริงอันสูงสุดนั้นนำพาพวกเขาไปสู่ความรู้แจ้ง หรือความดับสูญกันแน่?"
 precursor_2_desc: "พวกเขาร่อนเร่ไปท่ามกลางหมู่ดาว ค้นหาอยู่ตลอดเวลา และขยายตัวอย่างต่อเนื่อง บัดนี้ หลงเหลือเพียงซากปรักหักพังที่คอยกระซิบเตือนถึงผลลัพธ์อันคาดไม่ถึง"
 precursor_3_desc: "เอกภาพนั้นแสนเปราะบาง พลังอำนาจใดกันที่ทำลายล้างสหพันธ์ที่ครั้งหนึ่งเคยรุ่งเรือง ซึ่งมีอิทธิพลแผ่ขยายครอบคลุมไปทั่วทั้งเซกเตอร์?"
 precursor_4_desc: "แม้แต่อารยธรรมที่เกรียงไกรที่สุดก็ยังต้องสยบให้แก่ศัตรูที่มองไม่เห็น ความโอหังบดบังนัยน์ตาของพวกเขา หรือความเขลาเป็นสิ่งที่ลิขิตชะตากรรมของพวกเขากันแน่?"
 precursor_5_desc: "อยู่ช่วงเวลาหนึ่งที่ไม่มีสิ่งใดสามารถต่อต้านพวกเขาได้ จนกระทั่งบางสิ่งได้เข้าทำลายปณิธานอันแน่วแน่ลง อะไรกันเล่าที่ทำให้การทำสงครามครูเสดของพวกเขาต้องปิดฉากลง?"
 precursor_baol_1_desc: "พวกเขาเพาะปลูกดูแลโลกทั้งใบ คอยจัดแต่งระบบนิเวศด้วยความเอาใจใส่ ทว่าแม้แต่รากไม้ที่หยั่งลึกที่สุดก็ยังสามารถถูกถอนขึ้นมาจากผืนดินได้"
 precursor_zroni_1_desc: "จิตนั้นไร้ขีดจำกัด ความคิดนำพาพวกเขาทะยานข้ามหมู่ดาวและปรับเปลี่ยนความจริงแห่งการมีอยู่ ทว่าแม้แต่ผู้ที่มองเห็นได้ข้ามพ้นขอบเขตก็ไม่อาจเห็นพ้องตรงกันได้เสมอไป"
 precursor_inetian_desc: "ความรุ่งเรืองนำมาซึ่งความทะเยอทะยาน และความทะเยอทะยานก็นำพาสู่ความพินาศ พลังอำนาจใดที่ทำลายเครือข่ายใยแมงมุมของพวกเขายังคงเป็นปริศนา ทว่าผลกำไรเพียงอย่างเดียวไม่อาจช่วยชีวิตพวกเขาเอาไว้ได้"
 precursor_adakkaria_desc: "พวกเขาล่องไปตามกระแสคลื่นแห่งห้วงอวกาศ ไร้สิ่งผูกมัดและไม่เคยหยุดนิ่ง ทว่าแม้แต่นักเดินทางพเนจรก็ไม่อาจเร่ร่อนไปได้ตลอดกาล"

 # Synced from vanilla by Stellaris Thai Translator.
 # These keys were missing from the mod and should be translated on the next pass.
 EVASIVE_ACTIONS: "การอพยพ!"
 ENGINES: "เปิดเครื่องยนต์!"
 SUSPICIOUS: "น่าสงสัย"
 action.1.desc_01_nomadic: "ฉันนําคําทักทายจาก[contact_empire.GetRulerTitle] [contact_empire.GetRulerName]ผู้บังคับการของ[contact_empire.GetName]อย่าเข้าใจผิดกับการเร่ร่อนของเราสําหรับความอ่อนแอ กองทัพเรือของเราได้ทําลายหลายคนที่ทําผิดพลาดที่ รักษาเรือของเจ้า ให้ปลอดภัยจากการก่อตัวของเรา และบางทีนักรบของเรา อาจจะไม่มีเหตุผลใด ๆ ที่จะแสดงให้เห็นถึงการตัดสินใจของพวกเขา"
 action.1.desc_02_nomadic: "รู้จักกันดี ผมแทน[contact_empire.GetName]นําโดยตํานาน[contact_empire.GetRulerTitle] [contact_empire.GetRulerName]เราจะเดินทางผ่านดาว ภายใต้คําแนะนําของพระเจ้า หลงทางอันศักดิ์สิทธิ์ของเรา กําหนดโดยอํานาจ ตราบ ใด ที่ คุณ ไม่ เข้า ไป ยุ่ง เกี่ยว กับ เรื่อง ฝ่าย วิญญาณ ของ เรา สัมพันธภาพ ของ เรา อาจ ยัง คง เป็น มิตร."
 action.1.desc_16_nomadic: "สิ่งมีชีวิตต่างดาว ฉันพูดในนามของ[contact_empire.GetRulerTitle] [contact_empire.GetRulerName]ผู้บังคับการของ[contact_empire.GetName]อย่าเข้าใจผิดนะว่าการหลงทางเพื่อความอ่อนแอ กองทัพเรือของเราทิ้งซากปรักหักพังไว้ ให้ชนิดของท่านชัดเจนในการก่อตัวของเรา และบางทีนักรบของเรา จะพบไม่มีสาเหตุ"
 action.1.desc_17_nomadic: "ได้รับข้อความนี้ เอเลี่ยน ผมแทน[contact_empire.GetName]นําโดยตํานาน[contact_empire.GetRulerTitle] [contact_empire.GetRulerName]เราเดินทางผ่านดาวภายใต้คําสั่งของพระเจ้า และชนิดของคุณเป็นการทดลองที่จะอดทนระหว่างการเดินทาง อย่า เยาะ เย้ย ความ เชื่อ ของ เรา ใน สิ่ง ที่ ผ่าน มา เพื่อ วัฒนธรรม ของ คุณ และ อาจ ยัง มี สันติ สุข ระหว่าง เรา."
 action.1.desc_29_nomadic: "เราคือ[contact_empire.GetName]ชาติ ที่ ตั้ง อยู่ บน หลัก การ แห่ง การ อยู่ โดด เดี่ยว อย่าง สันติ และ เสรีภาพ ของ ปัจเจกบุคคล.[contact_empire.GetRulerTitle] [contact_empire.GetRulerName]ผู้นํารัฐบาลปัจจุบันของเรา ขอให้ท่านทิ้งพวกเราไป และติดตามวาระของเอเลี่ยนที่น่ารังเกียจ"
 action.1.desc_32_nomadic: "ดี พบแล้ว เอเลี่ยน ผมแทน[contact_empire.GetName]นําโดยตํานาน[contact_empire.GetRulerTitle] [contact_empire.GetRulerName]เราเดินทางผ่านดาวภายใต้การนําของพระเจ้า หลงทางอันศักดิ์สิทธิ์ของเรา เรารู้สึกเป็นเกียรติที่ได้พบสายพันธุ์ที่ดีของคุณในหมู่พวกเขา และรอคอยที่จะเรียนรู้มากขึ้นเกี่ยวกับวัฒนธรรมของคุณ"
 action.13.namarian.desc:1 "เราได้รับสัญญาณจาก§Y[From.GetName]§!พวก เขา ดู เหมือน มี ระบบ สื่อสาร ภาย ใน ที่ ก้าว หน้า ซึ่ง เรา ไม่ สามารถ เข้าใจ ได้ และ ได้ แปล ภาษา ของ เรา ขณะ อยู่ นิ่ง ๆ ใน ระบบ ของ เรา."
 pirate.1.desc.nomad: "กลุ่มคนหนีทัพและกบฏได้ทําบ้านใน§H[pirate_system.GetName]§!ระบบ เมื่อ เรา อยู่ ห่าง จาก การ ก่อ ตัว ของ เรา ใน เรือ ที่ ถูก ขโมย และ ถูก ดัด แปลง เหล่า นี้ ก็ ตก เป็น เหยื่อ ของ ช่อง ทาง การ ค้า ซึ่ง ค้ําจุน การ เดิน ทาง ของ เรา. พวกเขาเรียกตัวเองว่า\"§S[pirate_band.GetName]§!\"และได้สาบานที่จะตอบธงไม่มี\n\nพวกมันเกิดในเรือ และรู้จักเรือของเรา เส้นทางของเรา และรูปแบบของเรา พวกเขาต้องไม่ได้รับอนุญาติให้เติบโตที่แข็งแกร่งใด ๆ"
