 action.1.desc_39:0 "ข้าพเจ้ายินดีที่จะนำคำทักทายอย่างเป็นมิตรจาก[contact_empire.GetName] มายังท่าน เราได้สร้างระบบการปกครองที่สงบสุขซึ่งดำเนินการภายใต้การกำกับดูแลของสภาที่นำโดย[contact_empire.GetRulerTitle] [contact_empire.GetRulerName] ขอให้สายพันธุ์อันยิ่งใหญ่ของท่านไม่มีสิ่งใดนอกจากสันติภาพ"
 action.1.desc_40:0 "คำทักทาย ข้าพเจ้าพูดแทน[contact_empire.GetRulerTitle] [contact_empire.GetRulerName] และชนชั้นสูงผู้มั่งคั่งแห่ง[contact_empire.GetName] เราแสวงหาคู่ค้าใหม่อยู่เสมอในบรรดาชาติต่างดาวที่หลากหลายและน่าสนใจมากมายที่เราพบเจอขณะที่เรือของเราสำรวจกาแล็กซี"
 action.1.desc_41:0 "ข้าพเจ้าเป็นตัวแทนของ[contact_empire.GetName] ผู้นำที่มาจากการเลือกตั้งของเรา [contact_empire.GetRulerTitle] [contact_empire.GetRulerName] เชื่อในสันติภาพผ่านความแข็งแกร่ง แต่อย่าตกใจกับงบประมาณทางทหารของเรา เราประทับใจในสายพันธุ์ของท่านและหวังว่าท่านจะยอมรับการแลกเปลี่ยนทางวัฒนธรรมระหว่างประชาชนของเรา"
 action.1.desc_42:0 "ข้าพเจ้านำคำทักทายมาจาก[contact_empire.GetRulerTitle] [contact_empire.GetRulerName] ผู้นำที่มาจากการเลือกตั้งแห่ง[contact_empire.GetName] เราเชื่อในสิทธิของสิ่งมีชีวิตที่มีสติปัญญาทุกตัวในการตอบสนองความต้องการทางจิตวิญญาณของตน และเราเชื่อว่าสายพันธุ์ที่รู้แจ้งอย่างท่านร่วมความเห็นนี้"
 action.1.desc_43:0 "คำทักทายจาก[contact_empire.GetName] [contact_empire.GetRulerTitle] [contact_empire.GetRulerName] คือตัวแทนที่มาจากการเลือกตั้งของเรา แต่ในความเป็นจริงพลเมืองทุกคนมีเสียงในรัฐบาลของเรา เรามุ่งมั่นที่จะพัฒนาตนเองผ่านเทคโนโลยีและการศึกษาวัฒนธรรมต่างดาวที่เราพบเจอขณะสำรวจกาแล็กซี"
 action.1.desc_44:0 "ยินดีที่ได้พบ มิตรต่างดาว เราคือ[contact_empire.GetName] ชาติที่สร้างขึ้นบนหลักการของการอยู่ร่วมกันอย่างสันติและเสรีภาพส่วนบุคคล ความสำเร็จทางวัฒนธรรมของสายพันธุ์ท่านได้ทำให้ [contact_empire.GetRulerTitle] [contact_empire.GetRulerName] หัวหน้ารัฐบาลคนปัจจุบัน ประทับใจอย่างยิ่ง"
 action.1.desc_45:0 "คำทักทายจาก[contact_empire.GetName] เราคือชาติประชาธิปไตยที่มุ่งมั่นในการรักษาเสรีภาพส่วนบุคคลของพลเมืองไม่ว่าจะเป็นสายพันธุ์ใด ผู้นำที่มาจากการเลือกตั้งของเรา [contact_empire.GetRulerTitle] [contact_empire.GetRulerName] หวังว่าจะมีความสัมพันธ์ที่ยาวนานและเกิดผลดีกับประชาชนของท่าน"
 action.1.desc_46:0 "เราคือ[contact_empire.GetName] [contact_empire.GetRulerTitle] [contact_empire.GetRulerName] คือผู้นำของเรา คำทักทาย"
 action.1.desc_47:0 "เราคือ[contact_empire.GetName] มนุษย์ต่างดาวชั้นต่ำ [contact_empire.GetRulerTitle] [contact_empire.GetRulerName] สั่งให้ท่านรักษาระยะห่าง"
