 action.5.name:0 "พบ[primitive_civ.GetName]"
 action.5.desc_00:2 "เราตรวจพบการมีอยู่ของอารยธรรมต้นแบบต่างดาว[GetPreFTLLower]บน §Y[primitive_civ.Capital.GetName]§! ในระบบ §Y[primitive_civ.Capital.GetStarName]§! ยานสำรวจของเราแสดงให้เห็นว่าวัฒนธรรมยุคหินใหม่ของพวกเขาเชี่ยวชาญการใช้ไฟและพัฒนาภาษาพูดเบื้องต้น แต่เรายังไม่เห็นหลักฐานของโลหกรรมหรือการสื่อสารด้วยการเขียน\n\nเราควรพิจารณาสร้าง §Yสถานีสังเกตการณ์§! เหนือโลกของพวกเขาเพื่อศึกษาพวกเขาอย่างใกล้ชิดยิ่งขึ้น"
 action.5.desc_01:2 "เราตรวจพบการมีอยู่ของอารยธรรมต่างดาว[GetPreFTLLower]บน §Y[primitive_civ.Capital.GetName]§! ในระบบ §Y[primitive_civ.Capital.GetStarName]§! ดูเหมือนว่าพวกเขาอยู่ในช่วงปลายของยุคสำริด โดยมีความเชี่ยวชาญในการทำโลหะเบื้องต้น แม้ว่าประชากรส่วนใหญ่จะอยู่ในชนบท แต่มีนครรัฐขนาดใหญ่หลายแห่งได้ก่อตั้งขึ้น\n\nเราควรพิจารณาสร้าง §Yสถานีสังเกตการณ์§! เหนือโลกของพวกเขาเพื่อศึกษาพวกเขาอย่างใกล้ชิดยิ่งขึ้น"
 action.5.desc_02:2 "เราตรวจพบการมีอยู่ของอารยธรรมต่างดาว[GetPreFTLLower]บน §Y[primitive_civ.Capital.GetName]§! ในระบบ §Y[primitive_civ.Capital.GetStarName]§! พวกเขาก้าวหน้าสู่เทียบเท่ายุคเหล็กและแบ่งแยกออกเป็นอาณาจักรและจักรวรรดิเล็กๆ จำนวนมาก สายพันธุ์ของพวกเขาแพร่กระจายไปทั่วพื้นผิวของ[primitive_civ.Capital.GetPlanetMoon]เกือบทั้งหมด\n\nเราควรพิจารณาสร้าง §Yสถานีสังเกตการณ์§! เหนือโลกของพวกเขาเพื่อศึกษาพวกเขาอย่างใกล้ชิดยิ่งขึ้น"
 action.5.desc_03:2 "เราตรวจพบการมีอยู่ของอารยธรรมต่างดาว[GetPreFTLLower]บน §Y[primitive_civ.Capital.GetName]§! ในระบบ §Y[primitive_civ.Capital.GetStarName]§! ปัจจุบันพวกเขาอยู่ในช่วงที่อาจถือได้ว่าเป็นยุคกลางตอนปลาย โดยมีความรู้ด้านโลหกรรมอย่างมั่นคงและสังคมระบบศักดินา แท่นพิมพ์กำลังเร่งการแพร่กระจายของความรู้\n\nเราควรพิจารณาสร้าง §Yสถานีสังเกตการณ์§! เหนือโลกของพวกเขาเพื่อศึกษาพวกเขาอย่างใกล้ชิดยิ่งขึ้น"
 action.5.desc_04:2 "เราตรวจพบการมีอยู่ของอารยธรรมต่างดาว[GetPreFTLLower]บน §Y[primitive_civ.Capital.GetName]§! ในระบบ §Y[primitive_civ.Capital.GetStarName]§! ดูเหมือนว่าปัจจุบันพวกเขากำลังประสบกับเทียบเท่ายุคฟื้นฟูศิลปวิทยา โดยเพิ่งผ่านพ้นยุคกลางมา ความรู้ทางวิทยาศาสตร์กำลังแพร่กระจายอย่างรวดเร็วและกองทัพของอาณาจักรเล็กๆ ติดอาวุธปืนดินปืนเบื้องต้น\n\nเราควรพิจารณาสร้าง §Yสถานีสังเกตการณ์§! เหนือโลกของพวกเขาเพื่อศึกษาพวกเขาอย่างใกล้ชิดยิ่งขึ้น"
 action.5.desc_05:2 "เราตรวจพบการมีอยู่ของอารยธรรมต่างดาว[GetPreFTLLower]บน §Y[primitive_civ.Capital.GetName]§! ในระบบ §Y[primitive_civ.Capital.GetStarName]§! พวกเขาได้เข้าสู่ยุคไอน้ำตอนต้น และมีหลักฐานชัดเจนว่าพวกเขากำลังเริ่มใช้ทั้งยานพาหนะและโรงงานต้นแบบที่ขับเคลื่อนด้วยเครื่องไอน้ำ\n\nเราควรพิจารณาสร้าง §Yสถานีสังเกตการณ์§! เหนือโลกของพวกเขาเพื่อศึกษาพวกเขาอย่างใกล้ชิดยิ่งขึ้น"
 action.6.desc_01:1 "เราตรวจพบการมีอยู่ของอารยธรรมก่อนยุคอวกาศบน §Y[primitive_civ.Capital.GetName]§! ในระบบ §Y[primitive_civ.Capital.GetStarName]§! พวกเขาอยู่ในยุคอุตสาหกรรมตอนต้น โดยมีการใช้ไฟฟ้าและเครื่องยนต์สันดาปภายในอย่างแพร่หลายมากขึ้นเรื่อยๆ\n\nเราควรพิจารณาสร้าง §Yสถานีสังเกตการณ์§! เหนือโลกของพวกเขาเพื่อศึกษาพวกเขาอย่างใกล้ชิดยิ่งขึ้น"
 action.6.desc_02:1 "เราตรวจพบการมีอยู่ของอารยธรรมต่างดาวก่อนยุคอวกาศบน §Y[primitive_civ.Capital.GetName]§! ในระบบ §Y[primitive_civ.Capital.GetStarName]§! สารปนเปื้อนในชั้นบรรยากาศและมลภาวะทางแสงที่มองเห็นได้จากวงโคจรสอดคล้องกับสังคมยุคเครื่องจักรที่มีประชากรหนาแน่น ดูเหมือนว่าพวกเขาเชี่ยวชาญการเดินทางทางอากาศ และโรงงานกำลังผลิตสินค้าจำนวนมากในเมืองของพวกเขา\n\nเราควรพิจารณาสร้าง §Yสถานีสังเกตการณ์§! เหนือโลกของพวกเขาเพื่อศึกษาพวกเขาอย่างใกล้ชิดยิ่งขึ้น"
 action.6.desc_03:1 "เราตรวจพบการมีอยู่ของอารยธรรมต่างดาวก่อนยุคอวกาศบน §Y[primitive_civ.Capital.GetName]§! ในระบบ §Y[primitive_civ.Capital.GetStarName]§! มีหลักฐานว่าพวกเขาได้ควบคุมพลังงานของอะตอม และอาวุธนิวเคลียร์อาจแพร่หลายในบรรดารัฐชาติที่แตกแยกหลายแห่ง ความเป็นไปได้ที่จะเกิดเหตุการณ์สูญพันธุ์โดยไม่ได้ตั้งใจอย่างฉับพลันนั้นสูงมาก\n\nเราควรพิจารณาสร้าง §Yสถานีสังเกตการณ์§! เหนือโลกของพวกเขาเพื่อศึกษาพวกเขาอย่างใกล้ชิดยิ่งขึ้น"
 action.6.desc_04:1 "เราตรวจพบการมีอยู่ของอารยธรรมต่างดาวบน §Y[primitive_civ.Capital.GetName]§! ในระบบ §Y[primitive_civ.Capital.GetStarName]§! ดูเหมือนว่าพวกเขาอยู่ในยุคอวกาศตอนต้น ดังที่เห็นได้จากดาวเทียมดั้งเดิมจำนวนมากที่โคจรรอบดาวบ้านเกิดของพวกเขา รัฐชาติของพวกเขากำลังมุ่งหน้าสู่การรวมตัวเป็นรัฐบาลระดับโลก และดูเหมือนว่าจะเป็นเพียงเรื่องของเวลาก่อนที่พวกเขาจะออกจากโลกและเข้าร่วมชุมชนกาแล็กซี\n\nเราควรพิจารณาสร้าง §Yสถานีสังเกตการณ์§! เหนือโลกของพวกเขาเพื่อศึกษาพวกเขาอย่างใกล้ชิดยิ่งขึ้น"
 action.5.desc_00_hive:0 "เราตรวจพบการมีอยู่ของอารยธรรมต้นแบบต่างดาวเกสทัลท์[GetPreFTLLower]บน §Y[primitive_civ.Capital.GetName]§! ในระบบ §Y[primitive_civ.Capital.GetStarName]§! ยานสำรวจของเราแสดงให้เห็นว่าวัฒนธรรมยุคหินใหม่ของพวกเขาเชี่ยวชาญการใช้ไฟและพัฒนาภาษาพูดเบื้องต้นเพื่อการสื่อสารระหว่างไฮฟ์ แต่เรายังไม่เห็นหลักฐานของโลหกรรมหรือการสื่อสารด้วยการเขียน\n\nเราควรพิจารณาสร้าง §Yสถานีสังเกตการณ์§! เหนือโลกของพวกเขาเพื่อศึกษาพวกเขาอย่างใกล้ชิดยิ่งขึ้น"
 action.5.desc_01_hive:0 "เราตรวจพบการมีอยู่ของอารยธรรมต่างดาวเกสทัลท์[GetPreFTLLower]บน §Y[primitive_civ.Capital.GetName]§! ในระบบ §Y[primitive_civ.Capital.GetStarName]§! ดูเหมือนว่าพวกเขาอยู่ในช่วงปลายของยุคสำริด โดยมีความเชี่ยวชาญในการทำโลหะเบื้องต้น แม้ว่าประชากรส่วนใหญ่จะอยู่ในชนบท แต่กลุ่มไฮฟ์คอลเลกทีฟขนาดใหญ่หลายแห่งได้ก่อตั้งขึ้น\n\nเราควรพิจารณาสร้าง §Yสถานีสังเกตการณ์§! เหนือโลกของพวกเขาเพื่อศึกษาพวกเขาอย่างใกล้ชิดยิ่งขึ้น"
 action.5.desc_02_hive:0 "เราตรวจพบการมีอยู่ของอารยธรรมต่างดาวเกสทัลท์[GetPreFTLLower]บน §Y[primitive_civ.Capital.GetName]§! ในระบบ §Y[primitive_civ.Capital.GetStarName]§! พวกเขาก้าวหน้าสู่เทียบเท่ายุคเหล็กและแบ่งแยกออกเป็นไฮฟ์เล็กๆ จำนวนมากรวมถึงกลุ่มขนาดใหญ่บางแห่ง สายพันธุ์ของพวกเขาแพร่กระจายไปทั่วพื้นผิวของ[primitive_civ.Capital.GetPlanetMoon]เกือบทั้งหมด\n\nเราควรพิจารณาสร้าง §Yสถานีสังเกตการณ์§! เหนือโลกของพวกเขาเพื่อศึกษาพวกเขาอย่างใกล้ชิดยิ่งขึ้น"
 action.5.desc_03_hive:0 "เราตรวจพบการมีอยู่ของอารยธรรมต่างดาวเกสทัลท์[GetPreFTLLower]บน §Y[primitive_civ.Capital.GetName]§! ในระบบ §Y[primitive_civ.Capital.GetStarName]§! ปัจจุบันพวกเขาอยู่ในช่วงที่อาจถือได้ว่าเป็นยุคกลางตอนปลาย โดยมีความรู้ด้านโลหกรรมอย่างมั่นคงและชุมชนไฮฟ์ขนาดใหญ่ขึ้น แท่นพิมพ์กำลังเร่งการแพร่กระจายของความรู้และความเข้าใจระหว่างจิตใจ\n\nเราควรพิจารณาสร้าง §Yสถานีสังเกตการณ์§! เหนือโลกของพวกเขาเพื่อศึกษาพวกเขาอย่างใกล้ชิดยิ่งขึ้น"
 action.6.desc_03_hive:0 "เราตรวจพบการมีอยู่ของอารยธรรมต่างดาวเกสทัลท์ก่อนยุคอวกาศบน §Y[primitive_civ.Capital.GetName]§! ในระบบ §Y[primitive_civ.Capital.GetStarName]§! มีหลักฐานว่าพวกเขาได้ควบคุมพลังงานของอะตอม และอาวุธนิวเคลียร์อาจแพร่หลายในบรรดาอาณานิคมไฮฟ์ที่แตกแยกจำนวนมาก ความเป็นไปได้ที่จะเกิดเหตุการณ์สูญพันธุ์โดยไม่ได้ตั้งใจอย่างฉับพลันนั้นสูงมาก\n\nเราควรพิจารณาสร้าง §Yสถานีสังเกตการณ์§! เหนือโลกของพวกเขาเพื่อศึกษาพวกเขาอย่างใกล้ชิดยิ่งขึ้น"
 action.6.desc_04_hive:0 "เราตรวจพบการมีอยู่ของอารยธรรมต่างดาวเกสทัลท์บน §Y[primitive_civ.Capital.GetName]§! ในระบบ §Y[primitive_civ.Capital.GetStarName]§! ดูเหมือนว่าพวกเขาอยู่ในยุคอวกาศตอนต้น ดังที่เห็นได้จากดาวเทียมดั้งเดิมจำนวนมากที่โคจรรอบดาวบ้านเกิดของพวกเขา ไฮฟ์มายด์ท้องถิ่นกำลังอยู่ในกระบวนการรวมตัวเป็นจิตสำนึกหนึ่งเดียว และดูเหมือนว่าจะเป็นเพียงเรื่องของเวลาก่อนที่พวกเขาจะออกจากโลกและเข้าร่วมชุมชนกาแล็กซี\n\nเราควรพิจารณาสร้าง §Yสถานีสังเกตการณ์§! เหนือโลกของพวกเขาเพื่อศึกษาพวกเขาอย่างใกล้ชิดยิ่งขึ้น"

 action.6.name:1 "พบโจรสลัด"
 #action.6.desc: "We have sighted hostile ships in the [From.From.GetStarName] system! They are not responding to hails, and their designs are obviously not of [Root.GetSpeciesName] origin. It seems like they are mostly focused on looting our orbital stations, stripping them of valuable resources and technology while taking their crews captive."
 #action.6.a: "Pirates. We don't need that scum."

 action.10.name:0 "การพบปะใน[From.From.From.GetName]"
 action.10.desc:0 "เราพบเรือที่ไม่ทราบที่มาในระบบ[From.From.From.GetName]! ยานแปลกประหลาดเหล่านี้ถูกติดป้ายว่าเป็น §Y[From.GetName]§! จนกว่าเราจะเรียนรู้เพิ่มเติมเกี่ยวกับพวกเขา\n\nเราควรดำเนินการด้วยความระมัดระวังในกรณีที่พวกเขาเป็นศัตรู"
 action.10.a:0 "น่าสนใจ"
 action.11.name:1 "เริ่มการติดต่อสื่อสาร"
 action.11.desc:1 "หลังจากแปลภาษาของพวกเขาได้สำเร็จ เราได้สร้างการสื่อสารกับ §Y[From.From.GetName]§! ขณะนี้ช่องทางการทูตเปิดกว้างแล้วและการสู้รบทั้งหมดได้ยุติลงแล้ว"
 action.11.abandoned.desc:1 "หลังจากแปลภาษาของพวกเขาได้สำเร็จ เราได้สร้างการสื่อสารกับ §Y[From.From.GetName]§! ขณะที่เราเปิดช่องทางการทูต เรา §Yจำได้§! ว่าพวกเขาคือผู้ลี้ภัยที่เราเคยทอดทิ้ง การสู้รบทั้งหมดได้ยุติลงในตอนนี้"
 action.11.a:0 "ยอดเยี่ยม"
 action.13.name:2 "เริ่มการติดต่อสื่อสาร"
 action.13.desc:2 "เรากำลังรับสัญญาณจาก §Y[From.GetName]§!! ดูเหมือนว่าพวกเขาแปลภาษาของเราได้สำเร็จแล้ว ขณะนี้ช่องทางการทูตเปิดกว้างและการสู้รบทั้งหมดระหว่างเราได้ยุติลงชั่วขณะ"
 action.13.abandoned.desc:2 "เรากำลังรับสัญญาณจาก §H[From.GetName]§!! ดูเหมือนว่าพวกเขาแปลภาษาของเราได้สำเร็จแล้ว ขณะที่พวกเขาเปิดช่องทาง เรา §Yจำได้§! ว่าพวกเขาคือผู้ลี้ภัยที่เราเคยทอดทิ้ง การสู้รบระหว่างเราได้ยุติลงชั่วขณะ"
 action.13.nomad.desc:1 "เรากำลังรับสัญญาณจาก §Y[From.GetName]§!! ดูเหมือนว่าพวกเขามีระบบการสื่อสารภายในขั้นสูงที่เราไม่สามารถแยกแยะได้ และได้แปลภาษาของเราขณะอยู่นิ่งในระบบของเรา"
 action.13.a:0 "น่าสนใจ"
 action.13.c:0 "ไม่ใช่พวกเขาอีกแล้ว..."
 action.14.name:1 "ปราบปราม[GetPreFTLUpperPlural]"
 action.14.desc:1 "กองทัพของเราได้บุกโจมตีและปราบปรามกองกำลังดั้งเดิมบน §Y[conquered_primitive_world.GetName]§! ได้สำเร็จ ชาวพื้นเมืองยอมแพ้ความพยายามต่อต้านทั้งหมดและเราได้รวมอารยธรรมของพวกเขาเข้าไว้ในจักรวรรดิของเราแล้ว แม้ว่าล้าหลังอย่างที่พวกเขาเป็น อาจต้องใช้เวลาสักพักก่อนที่ชาวพื้นเมืองจะกลายเป็นสมาชิกที่มีประสิทธิภาพของสังคม[Root.GetAdj]เพื่อชาวสลาฟ" #Also for Slavers
 action.14.desc.serv:1 "ผู้บังคับใช้กฎหมายรักษาสันติภาพของเราได้ปราบปราม[GetPreFTLLowerPlural]บน §Y[conquered_primitive_world.GetName]§! ได้สำเร็จ [conquered_primitive_species.GetNamePlural] ถูกบีบให้หยุดความพยายามต่อต้านอันน่ารักของพวกเขาเมื่อพวกเขารู้ว่าเราต้องการเพียงแค่รับใช้พวกเขา ปัจจุบันพวกเขากำลังถูกขนส่งไปยังที่อยู่อาศัยที่ออกแบบมาเป็นพิเศษ ซึ่งเราจะดูแลให้พวกเขาไม่ขาดสิ่งใด น่าเสียดายที่อาจต้องใช้เวลาสักพักก่อนที่จิตใจที่ยังไม่พัฒนาของพวกเขาจะปรับตัวเข้ากับการหลุดพ้นจากภาระของการตัดสินใจด้วยตนเอง"
 action.14.desc.assim:0 "สิ่งมีชีวิตดั้งเดิมบน §Y[conquered_primitive_world.GetName]§! ถูกปราบปรามโดยกองกำลังลงจอดของเรา แม้ว่าความสามารถในการต่อสู้ที่อ่อนแอของพวกเขาเป็นตัวชี้วัดของสังคมที่ยังไม่พัฒนา แต่บอทชีวนักวิเคราะห์ของเราสรุปว่าความจุทางประสาทของพวกเขาแสดงให้เห็นถึงศักยภาพ พวกเขาจะถูกผนวกรวม"
 action.14.desc.term:0 "หน่วยนักล่า-ผู้สังหารของเราได้ย่ำยีการป้องกันอันน่าสังเวชของสิ่งมีชีวิตดั้งเดิมบน §Y[conquered_primitive_world.GetName]§! อย่างง่ายดาย ตัวอย่างที่เหลืออยู่ถูกทำลายล้างอย่างเป็นระบบ เพื่อที่พวกเขาจะไม่สามารถวิวัฒนาการเพื่อคุกคามกาแล็กซีด้วยแผนการสิ่งมีชีวิตของพวกเขา"
 action.14.desc.mach.purge:0 "สิ่งมีชีวิตดั้งเดิมบน §Y[conquered_primitive_world.GetName]§! ถูกปราบปรามหลังจากพยายามต่อต้านการบุกโจมตีลงจอดของเราอย่างไม่เพียงพออย่างยิ่ง [conquered_primitive_species.GetNamePlural] ที่เหลืออยู่จะถูกกำจัดออกตามโปรโตคอลการจัดการชีวสายพันธุ์ที่กำหนดไว้"
 action.14.desc.mach.slave:0 "สิ่งมีชีวิตดั้งเดิมบน §Y[conquered_primitive_world.GetName]§! ถูกปราบปรามหลังจากพยายามต่อต้านการบุกโจมตีลงจอดของเราอย่างไม่เพียงพออย่างยิ่ง ตัวอย่างที่รอดชีวิตจะถูกรวมเข้าในกริดพลังงาน[Root.GetSpeciesAdj]"
 action.14.desc.hive.purge:1 "จิตใจที่แตกแยกของ[conquered_primitive_species.GetNamePlural] ดั้งเดิมสู้ไม่ได้กับกองกำลังลงจอดหนึ่งเดียวของเราบน §Y[conquered_primitive_world.GetName]§! และพื้นผิวได้รับการรักษาความปลอดภัยแล้ว [GetPreFTLLowerPlural] ที่เหลืออยู่ไม่มีประโยชน์ต่อเราและจะถูกขับออกจากดาวเคราะห์ ตามที่[GetGestaltEntityName]ประสงค์"
 action.14.desc.hive.slave:1 "จิตใจที่แตกแยกของ[conquered_primitive_species.GetNamePlural] ดั้งเดิมสู้ไม่ได้กับกองกำลังลงจอดหนึ่งเดียวของเราบน §Y[conquered_primitive_world.GetName]§! และดาวเคราะห์ได้รับการรักษาความปลอดภัยแล้ว [GetPreFTLLowerPlural] ที่เหลืออยู่จะถูกใช้เป็นปศุสัตว์เพื่อเลี้ยง[Root.GetSpeciesSpawnNamePlural]ของเรา"
 action.14.desc.purge:1 "กองทัพของเราได้บุกโจมตีและปราบปรามกองกำลัง[GetPreFTLLower]บน §Y[conquered_primitive_world.GetName]§! ได้สำเร็จ ชาวพื้นเมืองเลือกอย่างฉลาดที่จะยอมจำนนต่อการปกครองของเรา และเราได้เริ่มการล้างบางพวกเขาออกจากดาวเคราะห์ตามนโยบาย เพื่อเตรียมพื้นที่สำหรับอุตสาหกรรม[Root.GetAdj]"
 action.14.a:0 "จักรวรรดิของเราเติบโตขึ้น"
 action.14.a.phobe:0 "มนุษย์ต่างดาวสู้เราไม่ได้!"
 action.14.a.military:0 "สำหรับพวกเขา อาวุธของเราคงดูเหมือนเวทมนตร์..."
 action.14.a.spirit:0 "สิทธิอันศักดิ์สิทธิ์ของเราส่องประกายอย่างแท้จริง"
 action.14.a.material:0 "วิวัฒนาการของพวกเขาจะได้รับประโยชน์จากการควบคุมของเรา"
 action.14.a.serv:0 "พวกเขาจะกลายเป็นถ้วยรางวัลชีวภาพที่น่าประทับใจ!"
 action.14.a.assim:0 "เริ่มการกดทับตัวตน"
 action.14.a.term:0 "กำลังเริ่มการทดสอบอาวุธ..."
 action.14.a.mach:0 "รับทราบ"
 action.14.a.tooltip:2 "ตัวปรับแต่ง §Yวิกฤตวัฒนธรรมดาวฤกษ์§! ถูกเพิ่มเข้าใน §H[From.From.From.GetName]§! ลดผลผลิตอย่างรุนแรงและลดเสถียรภาพเป็นเวลาหลายปีข้างหน้า"
 action.15.desc:1 "เราพบยานต่างดาวบางรูปแบบในระบบ §Y[From.From.From.GetName]§!! วัตถุแปลกประหลาดเหล่านี้ถูกติดป้ายว่าเป็น §Y[From.GetName]§! จนกว่าเราจะเรียนรู้เพิ่มเติมเกี่ยวกับพวกเขา\n\nเราควรดำเนินการด้วยความระมัดระวัง..."
 action.15.desc.enclave:0 "เราพบยานต่างดาวบางรูปแบบในระบบ §Y[From.GetName]§!! วัตถุแปลกประหลาดเหล่านี้ถูกติดป้ายว่าเป็น §Y[target_enclave.GetName]§! จนกว่าเราจะเรียนรู้เพิ่มเติมเกี่ยวกับพวกเขา\n\nเราควรดำเนินการด้วยความระมัดระวัง..."
 action.20.name:0 "กฎหมายมีผลบังคับใช้"
 action.20.desc:0 "ปัญญาประดิษฐ์ ไม่ว่าจะในรูปแบบใดก็ตาม ได้รับการประกาศว่าผิดกฎหมายทั่วทั้ง[Root.GetName] และเจ้าหน้าที่ได้เริ่มรื้อถอนหน่วยหุ่นยนต์ทั้งหมดที่ละเมิดกฎหมายนี้\n\nโรงงานประกอบหุ่นยนต์ที่รับผิดชอบในการผลิตหน่วยเหล่านี้กำลังถูกแปลงสภาพเพื่อผลิตหุ่นยนต์ที่ง่ายกว่าและไม่มีความคิด"
 action.20.a:0 "ดี เราต้องกำจัดสิ่งประดิษฐ์อันน่ากลัวเหล่านี้ออก"
 action.20.tooltip:0 "ประชากรดรอยด์และสังเคราะห์แสงทั้งหมดกำลังถูกกวาดล้าง\nโรงงานประกอบสังเคราะห์แสงและดรอยด์ถูกแปลงเป็นโรงงานประกอบหุ่น ยนต์"
 action.62.name:2 "จุดจบของ [LastKilledCountryName]"
 action.62.desc:1 "ประเทศดวงดาวที่ก่อนหน้านี้รู้จักกันในชื่อ §H[LastKilledCountryName]§! ถูกทำลายโดยศัตรู \nสิ่งนี้จะส่งผลต่อบรรยากาศทางการเมืองของกาแล็กซีอย่างไรนั้น ต้องรอติดตามกันต่อไป"
 action.63.name:1 "$action.62.name$"
 action.63.desc:1 "รัฐบรรพบุรุษโบราณของ §H[LastKilledCountryName]§! ได้พบกับจุดสิ้นสุดสุดท้ายในมือของศัตรู ผลกระทบของการล่มสลายของจักรวรรดิที่เคยยิ่งใหญ่นี้ต่อการเมืองของกาแล็กซียังคงต้องติดตาม"

 action.71.name:1 "ผู้นำสังเคราะห์หมดสภาพ"
 action.71.desc:2 "ลูกเรือของ[malfunctioning_leader_fleet.GetName] รายงานว่าเจ้าหน้าที่วิทยาศาสตร์ [malfunctioning_leader.GetName] เกิดความผิดพลาดร้ายแรง ทำให้[malfunctioning_leader.GetHimHer]ไม่สามารถทำงานได้อีกต่อไปอย่างถาวร"
 action.72.name:0 "$action.71.name$"
 action.72.desc:1 "ด้วยชะตากรรมอันเจ็บปวดอย่างน่าประชด นักวิทยาศาสตร์ [malfunctioning_leader.GetName] - ผู้มีชื่อเสียงในด้านการดูแลอุปกรณ์ห้องปฏิบัติการอย่างพิถีพิถัน - เกิดความผิดพลาดร้ายแรงหลังจากขาดการบำรุงรักษาส่วนตัวเป็นเวลานาน"
 action.73.name:0 "$action.71.name$"
#  action.73.desc:0 "Scientist [malfunctioning_leader.GetName] has suffered a critical malfunction, rendering the Society research effort leaderless."
 action.74.name:0 "$action.71.name$"
 action.74.desc:0 "นักวิทยาศาสตร์ [malfunctioning_leader.GetName] เกิดความผิดพลาดร้ายแรงหลังจากได้รับรังสีจากตัวอย่างทางธรณีวิทยาที่มีกัมมันตภาพรังสีสูงเป็นเวลานาน เนื่องจากมิเตอร์วัดรังสีภายในที่ผิดปกติ"
 action.75.name:0 "$action.71.name$"
 action.75.desc:1 "ผู้บัญชาการ [malfunctioning_leader.GetName] เกิดความผิดพลาดร้ายแรงขั้นสุดท้ายเนื่องจากข้อผิดพลาดในการผลิต"
 action.76.name:0 "$action.71.name$"
 action.76.desc:0 "ผู้ว่าราชการ [malfunctioning_leader.GetName] เกิดความผิดพลาดร้ายแรง - \"บริค\" - หลังจากการติดตั้งเฟิร์มแวร์ที่เสียหายอย่างโชคร้ายระหว่างการบำรุงรักษาตามปกติ"

