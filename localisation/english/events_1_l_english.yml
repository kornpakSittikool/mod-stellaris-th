 # Pop Events
 #############################
 pop.1.name:0 "ใหม่เผ่าพันธุ์"
 pop.1.desc:0 "มากของ[Root.Planet.Owner.GetSpeciesName]ผู้คนบน[Root.Planet.GetName]ได้หันไปแก้ไขพันธุกรรมเพื่อช่วยพวกเขาจัดการกับ[Root.Planet.GetPlanetMoon]สภาพแวดล้อมที่เป็นมิตร พวก เขา ได้ เปลี่ยน แปลง ตัว เอง อย่าง ไร? พวกเขาเริ่มเรียกตัวเองว่า"[Root.GetSpeciesName].""
 pop.3.name:0 "เพิ่มความเหลื่อมล้ําบน[Root.GetName]"
 pop.3.desc:0 "ระยะห่างระหว่าง[modified_pop_1.GetSpeciesName]จํานวนประชากร[Root.GetName]และ[non_modified_pop_1.GetSpeciesNamePlural]พวกเขาแบ่งปัน[Root.GetPlanetMoon]กับที่เพิ่มขึ้น การ โจมตี หลาย ครั้ง เกิด ขึ้น โดย ปัจเจกบุคคล จาก ทั้ง สอง ฝ่าย รวม ทั้ง การ ทิ้ง ระเบิด อย่าง น้อย สอง ครั้ง. ทั้ง สอง ฝ่าย ของ ความ ขัด แย้ง นี้ ก่อ ให้ เกิด ความ รุนแรง และ ดู เหมือน ว่า การ กระทํา ที่ รุนแรง มาก ขึ้น."
 pop.3.a.tooltip:0 "ทั้งหมด§Y[modified_pop_1.GetSpeciesNamePlural]§!ถึง§Y[non_modified_pop_1.GetSpeciesNamePlural]§!บน[Root.GetName]ได้§Yมิลลิเชียส§!ถึง§Y& ขาว§!จริยธรรม"
 pop.6.name:0 "เพิ่มความยืดหยุ่น"
 pop.6.desc:0 "เดอะ[modified_pop_1.GetSpeciesNamePlural]บน[modified_pop_1.Planet.GetName]ได้เปลี่ยนแปลงดีเอ็นเอของพวกเขามากขึ้น การ มี บุตร ไม่ เพียง แต่ เพิ่ม ขึ้น อย่าง น่า ทึ่ง แต่ ตอน นี้ ลูก ๆ ของ พวก เขา โต เป็น ผู้ ใหญ่ เร็ว กว่า ปกติ มาก[non_modified_pop_1.GetSpeciesNamePlural]. [modified_pop_1.GetSpeciesName]ใน ไม่ ช้า จํานวน ประชากร อาจ เพิ่ม ขึ้น ใน อัตรา เอกซ์โปเนนเชียล."
 pop.6.tooltip:0 "ทําให้£pop£ §H[modified_pop_1.GetSpeciesName]ป๊อป§!บน§Y[modified_pop_1.Planet.GetName]§!โดยเพิ่ม§G$trait_rapid_breeders$§!คุณสมบัติ"
 pop.8.name:0 "[modified_pop_1.GetSpeciesNamePlural]ถูกสังหารหมู่เมื่อ[Root.GetName]!"
 pop.8.desc:0 "A[non_modified_pop_1.GetSpeciesName]เมื่อ เร็ว ๆ นี้ กอง ทหาร คอมมิวนิสต์ หัว รุนแรง ได้ วาง แผน โจมตี กลุ่ม ใหญ่[modified_pop_1.GetSpeciesName]เมืองบน[Root.GetName]ชาว เมือง ถูก สังหาร หมู่ หลาย พัน คน และ บ้าน ของ พวก เขา พัง ทลาย ลง ถึง ดิน. ข้อความที่เหลือจากคนร้ายบนเน็ตข้อมูลดาวเคราะห์\n\n§S§!\"[Root.GetName]เป็นของ[non_modified_pop_1.GetSpeciesNamePlural]!\"§!"
 pop.10.name:0 "[non_modified_pop_1.GetSpeciesNamePlural]ถูกสังหารหมู่เมื่อ[Root.GetName]!"
 pop.10a.desc:0 "การโจมตีของ[modified_pop_1.GetSpeciesName]ด้านหน้า, กลุ่มหัวรุนแรงบน[Root.GetName]เมื่อเร็ว ๆ นี้เปิดตัวการโจมตีขนาดใหญ่[non_modified_pop_1.GetSpeciesName]ตกลง ผู้ปกป้องไม่กี่คนถูกเช็ดออกอย่างรวดเร็วหลังจากนั้น[modified_pop_1.GetSpeciesNamePlural]กวาดผ่านข้อตกลง และสังหารหมู่ประชากรในบ้านของพวกเขา ข้อความพ่นสีบนซากปรักหักพัง\n\n§S§!\"[modified_pop_1.GetSpeciesNamePlural]เป็นอนาคต!\"§!"
 pop.10b.desc:0 "มี การ รายงาน การ ต่อ สู้ อย่าง รุนแรง จาก เขต ชนบท ของ[Root.GetName]มีการปะทะกันหลายครั้ง[modified_pop_1.GetSpeciesName]ถึง[non_modified_pop_1.GetSpeciesName]ผิดปกติ เดอะ[modified_pop_1.GetSpeciesNamePlural]ดู เหมือน ว่า ได้ ชัย ชนะ แล้ว และ กอง โจร ของ พวก เขา ได้ เผา บ้าน เรือน หลาย แห่ง. ชาวบ้านบาดเจ็บสาหัส"
 pop.12.name:0 "[modified_pop_1.GetSpeciesName]การเยี่ยมตัวแทน[Root.Owner.Capital.GetName]"
 pop.12.desc:0 "ตัวแทนจาก[modified_pop_1.GetSpeciesName]ชุมชนใน[Root.GetName]ได้เดินทางไปยัง[Root.Owner.Capital.GetName]เพื่อส่งเสียงร้องให้ประชาชนของพระองค์ ตามที่เขาบอก[modified_pop_1.GetSpeciesNamePlural]การ เหยียด ผิว[non_modified_pop_1.GetSpeciesName]และเขากําลังเรียกร้องให้เราลงมือทันที เพื่อปรับปรุงสถานการณ์"
 pop.14.name:0 "เพิ่มความแข็งแกร่ง"
 pop.14.desc:0 "เพื่อตอบโต้การเผชิญหน้าที่รุนแรงระหว่าง[modified_pop_1.GetSpeciesName]ถึง[non_modified_pop_1.GetSpeciesName]ผู้คนบน[Root.GetName].[modified_pop_1.GetSpeciesNamePlural]ได้ใช้เวลาในการเปลี่ยนแปลงพันธุกรรมของพวกเขา หนึ่งขั้นตอนต่อไป ตอนนี้ทั้งคู่แข็งแรงขึ้นและเร็วขึ้น ในขณะที่ร่างกายของพวกเขาสามารถรับการลงโทษ ที่จะฆ่าปกติ[non_modified_pop_1.GetSpeciesNamePlural].\n\nแค่สองคนที่ไม่มีอาวุธ[modified_pop_1.GetSpeciesNamePlural]มี รายงาน ว่า มี ผู้ เสีย ชีวิต อย่าง น้อย สิบ คน[non_modified_pop_1.GetSpeciesName]กองทหารในเหตุการณ์เมื่อเร็วๆนี้ เรากําลังมองหาการเลื่อนชั้นที่อันตราย"
 pop.14.tooltip:0 "ทําให้£pop£ §H[modified_pop_1.GetSpeciesName]ป๊อป§!บน§Y[modified_pop_1.Planet.GetName]§!โดยเพิ่ม§G$trait_strong$§!คุณสมบัติ"

 #############################
 # Galactic Features Events
 #############################
 galactic_features.1.name:0 "ที ยัน คี เฮิร์ด ได้ รับ อนุญาต"
 galactic_features.1.desc:0 "เดอะ[Root.GetName]ได้พบกับฝูงของทิยันกี[Root.GetStarName]ระบบ สิ่งมีชีวิตที่เดินทางในอวกาศเหล่านี้ โดยปกติเดินทางจากดาวไปยังดาว หยุดเพียงแค่บางครั้ง เพื่อกินอาหารจากกระแสไฟฟ้าที่มีอยู่ในบรรยากาศบนของยักษ์แก๊สบางชนิด มันไม่ปรากฏกายให้เห็น"
 galactic_features.2.name:0 "ผู้พิทักษ์ซานัม"
 galactic_features.2.desc:0 "สัมภาษณ์! ส่งข้อความนี้:\n\nเราคือผู้พิทักษ์แห่งซานัม การปรากฏตัวของคุณ[From.GetName]ระบบ เป็น การ ละเลย พระ ผู้ สร้าง ของ เรา. โปรแกรมของเราบังคับให้เราทําลายคุณ สงบศึกกับจักรวาล"
 galactic_features.2.a:0 "ไปแจ้งเตือนสีแดง!"
 galactic_features.100.desc:0 "สายพันธุ์โบราณของสัตว์เลี้ยงลูกด้วยนม นักล่า-นักสะสม ได้แพร่กระจายไปทั่วมากของ[From.GetName]วัฒนธรรมยุคหินนี้ มีความเชี่ยวชาญในการยิง และพัฒนาภาษาที่ใช้พูด แต่เราไม่ได้เห็นหลักฐานใดๆ"
 galactic_features.101.desc:1 "เราได้ค้นพบวัฒนธรรมดั้งเดิมของสัตว์เลี้ยงลูกด้วยนม[From.From.GetName]ดินแดนที่ก้าวหน้าที่สุด บนโลกใบนี้ได้ก้าวหน้าไปเมื่อเร็ว ๆ นี้ เกินกว่ายุคเหล็ก และพื้นผิวส่วนใหญ่ถูกปกครองโดยขุนนางผู้พ้องพยาบาท"
 galactic_features.102.desc:1 "วัฒนธรรมอุตสาหกรรมแบบโบราณ ปัจจุบันถูกขังอยู่ในสงครามโลก บนพื้นผิวของ[From.From.GetName]สองพันธมิตรขนาดใหญ่ของประเทศ กําลังต่อสู้ซึ่งกันและกัน โดยมียานพาหนะหุ้มเกราะ, อากาศยานและเรือเรือเรือทะเลจํานวนมาก รัฐเหล่านี้บางรัฐกําลังลดทอนพลังงานอะตอม ซึ่งอาจเพิ่มความเป็นไปได้ในการทําลาย ของความขัดแย้งนี้อย่างมาก"
 galactic_features.103.desc:1 "[From.From.GetName]เป็นบ้านของอารยธรรมสัตว์เลี้ยงลูกด้วยนม ปัจจุบันในยุคอวกาศต้น พื้นที่ออร์บิทัลรอบ ๆ โลกถูกปกคลุมไปด้วยดาวเทียมดั้งเดิม และชาวพื้นเมืองดูเหมือนจะได้เปิดตัว มีการสํารวจเล็กๆหลายอัน ที่ถูกตรวจจับได้ จากภาพภายนอก ไปยังศพอื่น ๆ ภายในระบบ"
 galactic_features.104.desc:0 "พื้นผิวของ[From.From.From.GetName]ถูกทําลายจากสงครามนิวเคลียร์ และดาวเคราะห์ก็เป็นเพียงสุสาน โครงสร้างคอนกรีตถูกทุบทําลาย อยู่นอกพื้นดิน ที่ซึ่งศูนย์รวมประชากรใหญ่เคยตั้งอยู่ และลมหอน\n\nแมลง ใน ท้อง ถิ่น ดู เหมือน จะ เจริญ เติบโต ใน สภาพ แวด ล้อม ที่ ไม่ มี การ ติด เชื้อ. ตัว อย่าง ที่ น่า ทึ่ง ของ มัน ได้ เพิ่ม ขนาด ขึ้น อย่าง น่า ทึ่ง และ บาง ชุมชน ก็ แสดง สัญลักษณ์ ของ เชาวน์ ปัญญา ที่ มี อยู่ ใน ปัจจุบัน."
 galactic_features.150.name:0 "ความหนาแน่นของเมฆ"
 galactic_features.150.desc:0 "เราได้พบ สิ่งมีชีวิตบางอย่างในก้อนเมฆ[Root.GetStarName]ระบบ เดอะ[Root.GetName]กําลังรับสัญญาณพลังงานมหาศาล มาจากใจกลางของสิ่งมีชีวิตนี้ แต่ส่วนประกอบของมันไม่ปรากฏแน่ชัด ไม่ มี การ ตอบ รับ ต่อ ลูกเห็บ หรือ การ สื่อ ความ รูป แบบ อื่น ใด."
 galactic_features.200.name:0 "ยาน พาหนะ ต่าง ดาว"
 galactic_features.200.desc:0 "เดอะ[Root.GetFleetName]มีฝูงบินของมนุษย์ต่างดาวจํานวนมาก ประชากร ของ พวก เขา ถูก ขน เข้า ไป ใน เรือ นาวา ขนาด มหึมา หลาย ลํา แต่ ละ ลํา สามารถ บรรทุก ได้ มาก กว่า หนึ่ง ล้าน คน. พวก เขา ปฏิเสธ ที่ จะ เปิด เผย ทั้ง ต้น กําเนิด และ จุด หมาย ปลาย ทาง."
 galactic_features.300:0 "โลก ที่ มี โล่"
 galactic_features.300.desc:1 "[From.GetName]มี การ พบ ว่า มี การ อุด ตัน อย่าง สิ้น เชิง ใน เครื่อง ป้องกัน พลังงาน บาง ชนิด. ทุกความพยายามโดย[Root.GetName]การที่จะเจาะผ่านกําแพงด้วยเซ็นเซอร์ของมันได้ล้มเหลว ลําแสงสแกนเป็นเพียงการหักเหกลับไปที่เรือ\n\nการอ่านค่าพลังงานของกําแพงนั้น เปลี่ยนแปลงไปเล็กน้อย อาจเป็นผลมาจาก การสลายตัวของเวลาหลายพันปี เจ้าหน้าที่วิทยาศาสตร์[Root.GetLeaderName]ได้เสนอโครงการพิเศษ เพื่อตรวจสอบวิธีการกําจัดอุปสรรค แต่สมมติว่ามันถูกสร้างขึ้น เพื่อรักษาบางอย่างไว้"
 galactic_features.300.a:0 "เครื่องป้องกันกําลังจะพัง เพื่อวิทยาศาสตร์!"
 galactic_features.300.b:0 "มันจะต้องอยู่ที่นั่นด้วยเหตุผลบางอย่าง ช่างมันเถอะ"
 galactic_features.301:0 "หมุน & 90กองยาน"
 galactic_features.301.desc:0 "นักวิทยาศาสตร์ของเราข้างต้น[From.From.GetName]ประสบความสําเร็จในที่สุดในการลดการป้องกันพลังงานที่ครอบคลุม[From.From.GetPlanetMoon]เมื่อ มัน หาย ไป เรา ได้ พบ กอง เรือ รบ ที่ มี ผีเสื้อ กลาง คืน ค่อย ๆ ลอย อยู่ ใน วง โคจร ต่ํา เหนือ หิน ที่ ไม่ สําคัญ อย่าง อื่น.\n\nดู เหมือน ว่า กอง เรือ อนุรักษ์ บาง ชนิด ที่ กอง เรือ รบ บาง ลํา สร้าง ขึ้น[fallen_4_species.GetNamePlural]หลายพันปีมาแล้ว ในช่วงที่จักรวรรดิโบราณครองราชย์ ด้วยช่วงเวลานั้น[fallen_4_species.GetNamePlural]ต้องสูญเสียความรู้ที่จะลดกําแพงตัวเอง หรือเรือเหล่านี้จะใช้ในการยกเรือของตัวเอง"
 galactic_features.301.a:0 "ส่งลูกเรือไปที่มนุษย์เรือเหล่านั้น"
 galactic_features.302:0 "มี ความ รู้ มาก มาย"
 galactic_features.302.desc:0 "เครื่องกีดขวางพลังงานที่ล้อมรอบ[From.From.GetName]ลดลงโดยนักวิทยาศาสตร์ของเรา เปิดเผยโลกที่แห้งแล้ง ที่มีโครงสร้างขนาดใหญ่เดียว บนพื้นผิวของมัน ทีมที่ถูกส่งไปที่ตึก ได้รายงานว่ามีอุโมงค์ขนาดใหญ่ เต็มไปด้วยความมหัศจรรย์ทางเทคโนโลยี\n\nห้องนิรภัยนี้ถูกจัดตั้งขึ้นโดย[fallen_4_species.GetName]นัก วิทยาศาสตร์ ไม่ นาน หลัง จาก จักรวรรดิ ของ พวก เขา เริ่ม มี การ ลด ลง ยาว นาน หลาย พัน ปี มา แล้ว เพื่อ รักษา ความ รู้ บาง อย่าง ของ พวก เขา ไว้ เพื่อ ประโยชน์ ของ คน รุ่น ต่อ ไป[fallen_4_species.GetNamePlural]."
 galactic_features.302.a:0 "ตอนนี้มันจะเป็นประโยชน์กับเรา"
 galactic_features.303:0 "นัก โทษ"
 galactic_features.303.desc:0 "เราได้ลดกําแพงพลังงานที่ล้อมรอบ[From.From.GetName]สิ่งที่นักวิทยาศาสตร์ของเราพบ เป็นโลกที่อาศัยอยู่ไม่คุ้นเคย ปราศจากอารยธรรม พบกระท่อมเล็ก ๆ โดดเดี่ยว เกยบนเมซาใน[From.From.GetPlanetMoon]ซีกโลกเหนือ\n\nภายในกระท่อม เราพบของเก่าแห้ง[fallen_4_species.GetName]ผู้ซึ่งต้องการพูดคุยกับรัฐบาลของเรา"
 galactic_features.303.a:0 "เปิดช่องสิ"
 galactic_features.304.desc:0 "คุณคงจินตนาการไม่ออกเลยว่า มันดีแค่ไหน ที่ได้เห็นท้องฟ้าใสอีกครั้ง[Root.GetSpeciesName]ข้าคือผู้บัญชาการใหญ่ทูโบเร็ค อดีตหัวหน้าคณะรวม[fallen_4_species.GetName]อาร์มาด้าและผู้ชนะศึกเป็นร้อย ส่วนตัวแล้วข้าเห็นการพิชิตของดุธเบจ, ริกินาค, บินนาก และจูสสการี หลายร้อยศตวรรษมาแล้ว\n\nในฐานะผู้ช่วยชีวิต ข้าสัญญารับใช้ท่าน ข้าควรจะได้รับเกียรติในการนํากองเรือใหญ่ของเจ้า ไปต่อสู้กับศัตรูของเจ้า"
 galactic_features.304.a:0 "ทําไมคุณถึงติดอยู่ในเกราะ"
 galactic_features.304.a.response:1 "โดยปราศจากทักษะการเป็นผู้นํา[fallen_4_species.GetNamePlural]จะเป็นเพียงการสูญพันธุ์ สายพันธุ์ที่ถูกลืม ข้าทําลายกองเรือทั้งหมด ที่ต่อต้านเรา และทําลายโลกเป็นโหล เพื่อรักษาอนาคตของเผ่าพันธุ์ข้า\n\nนี่คือรางวัลของข้า ใน ที่ สุด เมื่อ สันติ สุข มา ถึง และ เรา แสวง หา สนธิ สัญญา กับ ผู้ ที่ เรา พ่าย แพ้ การ ปรากฏ ตัว ของ ผม กลาย เป็น เรื่อง น่า อับอาย. ผมกลายเป็นสัญลักษณ์ของ[fallen_4_species.GetName]โหดร้ายและสําหรับ\"อาชญากรรมสงคราม\" ผมถูกขังคนเดียวในโลกนี้ พวกมันไร้ความกล้าที่จะประหารข้า"
 galactic_features.304.b:0 "คุณอยู่ที่นั่นมานานแค่ไหนแล้ว"
 galactic_features.304.b.response:0 "เมื่อชนิดของตัวเองทิ้งฉันที่นี่ พวกเขาอธิบายว่าเวลาจะผ่านไปช้ามากขึ้น สําหรับผม ประมาณ 40 ปีของคุณ ผ่านมา ในขณะที่อยู่ในส่วนที่เหลือของจักรวาล ศตวรรษที่นับไม่ได้จะต้องมาและหายไป\n\nผม รู้สึก เหมือน เป็น เวลา หลาย ร้อย ปี ด้วย เมื่อ ผม นั่ง อยู่ คน เดียว ใน ความ มืด ของ กระท่อม. จริง ๆ แล้ว เป็น เช่น นั้น."
 galactic_features.304.c:1 "ยินดีต้อนรับผู้บัญชาการ"
 galactic_features.304.c.response:0 "เยี่ยม งั้นขอให้พวกเราออกไปจากที่นี่ซะ ฉันเห็นมามากพอแล้ว ชั่วชีวิต"
 galactic_features.304.notinterested:0 "ไม่สนใจ"
 galactic_features.304.d:0 "ดึงเกราะขึ้นมาอีกครั้ง ปล่อยเจ้าตัวนี้ไป"
 galactic_features.304.d.response:0 "เดี๋ยว... คุณจะทําอะไร? คุณทิ้งฉันไว้ที่นี่ไม่ได้นะ ฉันไม่กล้ามองโล่นั่นอีก\n\nฉันจ่ายค่าชดเชยแล้ว ฉันจ่ายค่ายา...\n\n<i>"
 tuborek_leader_desc:0 "ผู้บัญชาการคนนี้ใช้เวลาหลายร้อยปี ในสถานเลี้ยงเด็กกําพร้า และสิ่งที่พวกเขารู้ว่าตอนนี้ เป็นอดีตที่ถูกลืม"
 galactic_features.305:0 "การ เนรเทศ กลับ มา"
 galactic_features.305.desc:0 "ทันทีที่นักวิทยาศาสตร์ของเราลดการป้องกันพลังงานที่อยู่รอบ ๆ[From.From.GetName]ทุก ๆ คนที่อยู่ภายในระบบ ได้รับความเดือดร้อนอย่างสั้น ๆ จากอาการปวดหัวที่แยกทางกัน[fallen_4_species.GetName]อักขระ:\n\n\"นางฟ้า...\""
 galactic_features.305.desc.mech:0 "หลังจากลดพลังงานรอบๆ[From.From.GetName]เครื่องส่งสัญญาณของสับสเปซของเรา มีประสบการณ์ที่แหลมแหลม ในระดับที่รบกวน เมื่อทํางานผ่านซอฟต์แวร์ถอดรหัสของเรา การแทรกแซงปรากฏว่าเป็นข้อความในโบราณ[fallen_4_species.GetName]อักขระ:\n\n\"นางฟ้า...\""
 galactic_features.305.a:0 "เราอาจปล่อยบางอย่างมืดๆออกไป"
 galactic_features.350:0 "ชื่อ=ริงเวิลด์ชื่อ"
 galactic_features.350.desc:0 "เราได้พบโลกวงแหวนขนาดใหญ่ รอบดาวใน§Y[From.GetName]§!ระบบ สแกนเบื้องต้นระบุว่า มันถูกสร้างขึ้นเมื่อ 1 ปีก่อน โดยใช้วัสดุของดาวเคราะห์ที่อยู่ภายในระบบ โลกของแหวนมีสี่ภาคที่อาศัยอยู่ แต่ละบ้านดูเหมือนอารยธรรม ก่อนอวกาศ\n\nมี สถานี อวกาศ ขนาด ใหญ่ บาง แห่ง ตั้ง อยู่ ระหว่าง โลก วง แหวน กับ ดาว ของ มัน. เรากําลังได้รับสัญญาณจากมัน"
 galactic_features.350.b:0 "ไม่สนใจการส่งสัญญาณ"
 galactic_features.351.desc:0 "ยินดีต้อนรับสู่ศาลากลาง ซาเม็ต ศูนย์อัตโนมัตินี้ได้ถูกจัดตั้งขึ้นทั้งสิ้น 74,605,338 รอบที่ผ่านมา เพื่อทําหน้าที่เป็นอนุรักษ์ธรรมชาติ องค์ประกอบชีวภาพของเรา มีลักษณะการคัดเลือกของพืชพันธุ์ที่ไม่เป็นปัญญา และดอกฟานา เกิดมาจากสิ่งมีชีวิตสี่ชนิดที่แตกต่างกัน\n\nเพื่อป้องกัน ไบโอสเฟียร์ที่เปราะบางนี้ การเข้าถึงสิ่งอํานวยความสะดวกของเราจึงถูกจํากัด\n\nอย่าเข้าใกล้ที่นี่ ไม่ว่าสถานการณ์ใดก็ตาม"
 galactic_features.351.a:0 "เซ็นเซอร์ของเราแสดงสัญญาณ ของอารยธรรมในริงเวิลด์ของคุณ"
 galactic_features.351.a.response:0 "ทุกสปีชีส์ที่อยู่ในไบโอเมี่ยมของเรา ถูกจัดหมวดหมู่อย่างละเอียด เมื่อมีการสร้างวิหารขึ้นเป็นครั้งแรก บันทึก ต่าง ๆ บ่ง ชี้ ว่า ไม่ มี ใคร ใน พวก เขา แสดง ถึง ระดับ เชาวน์ ปัญญา ที่ ใกล้ จะ ถึง เซ ป ตัว จินต์. เซ็นเซอร์ของคุณ ต้องผิดพลาด\n\nอย่าเข้าใกล้ที่นี่ ไม่ว่าสถานการณ์ใดก็ตาม"
 galactic_features.351.b:0 "ใครสร้างที่นี่ขึ้นมา"
 galactic_features.351.b.response:0 "สถาบันแห่งนี้สร้างโดย ซิมิโอ ในช่วง 412 รอบ มันเสร็จสมบูรณ์และใช้งานได้อย่างสมบูรณ์ 74,605,338 รอบที่ผ่านมา การ เยี่ยม ชม ครั้ง สุด ท้าย ของ เรือ ซิ มิ โอ เกิด ขึ้น เมื่อ 67,103,853 รอบ มา แล้ว. ไม่มีบันทึกการเยี่ยมของ ซิมิโอ หรือ Ximio- Afflied Taily ตั้งแต่วันนั้น\n\nมี 38,201 ความพยายามล้มเหลวโดยเรือที่ไม่ได้รับอนุญาต ให้เข้าถึงสถานที่แห่งนี้ได้โดยการบันทึก\n\nอย่าเข้าใกล้ที่นี่ ไม่ว่าสถานการณ์ใดก็ตาม"
 galactic_features.351.c:0 "ลาก่อน"
 galactic_features.351.c.response:0 "บริการอัตโนมัติของศาลากลาง เสนอวันที่น่ารื่นรมย์แก่คุณ, เซล็อต\n\nอย่าเข้าใกล้ที่นี่ ไม่ว่าสถานการณ์ใดก็ตาม"

 #############################
 # Country Events
 #############################
 country.1.name:0 "โปรแกรมสํารวจแสงย่อย"
 country.1.desc:0 "ก่อนที่เราจะพัฒนาการท่องเที่ยวที่เร็วกว่าแสง การสํารวจแสงจํานวนมากถูกส่งจาก[Root.Capital.GetName]ด้วยความเร็วที่ใกล้ที่สุด ต่อระบบใกล้เคียง นักวิทยาศาสตร์ที่พัฒนาเครื่องสํารวจอย่างซื่อ ๆ รวมไปถึงข้อมูลสําคัญ เกี่ยวกับวัฒนธรรมของเรา ในแกนความทรงจําของพวกเขา\n\nบัด นี้ ได้ มี การ ตระหนัก แล้ว ว่า ข้อมูล นี้ อาจ ใช้ กับ เรา ได้. เราต้องติดตามการสํารวจเหล่านี้ ก่อนที่จะพบโดยใครบางคน - หรืออะไรบางอย่าง -"
 country.1.a:0 "พวกเขาไปได้ไม่ไกลหรอก"
 country.1.a.tooltip:0 "เริ่ม การ สํารวจ แสง ใต้"
 country.3.name:0 "การค้นพบแสงย่อย"
 country.3.desc:0 "[Root.GetName]ได้ตรวจพบหนึ่งในเครื่องสํารวจแสงที่ขาดหายไปของเราใน[Root.GetStarName]ระบบ เราควรเริ่มฟื้นฟูตัวเองให้เร็วที่สุด"
 country.3.a:0 "แน่นอน"
 country.4.name:0 "กลับ สู่ สภาพ เดิม"
 country.4.desc:0 "เราได้ค้นพบเครื่องสํารวจแสงย่อยใน[space_probe.GetStarName]ระบบ เซ็นเซอร์การโทรคมนาคม ที่มันเก็บสะสมมานานหลายปี ได้ให้การสํารวจร่างกายดาวเคราะห์ทั้งหมด"
 country.5.name:0 "Ion Trail"
 country.5.desc:0 "เดอะ[Root.GetName]ได้สัญญาณจากเหาที่ถูกทิ้ง เป็นของหนึ่งในเครื่องสํารวจแสงที่เราขาดไป[Root.GetStarName]ระบบ มีเส้นทางไอออนนําออกจากทุ่น บนวิถีสู่ดาวอื่น แสดงให้เห็นว่าใครบางคนมีการลาก"
 country.5.a:0 "ให้ เรา มา ดู ว่า ทาง นี้ จะ ไป ถึง จุด ไหน."
 country.6.name:0 "ตรวจพบซัลวาเจอร์"
 country.6.desc:0 "เราเจอเครื่องมือของเราแล้ว! มีฝูงบินเล็ก ๆ ของคณะลูกขุนเรือที่ถูกตรวจพบใน[From.GetName]ระบบ และหนึ่งในนั้นมีเครื่องสํารวจ ที่ล็อกอยู่ในคานรถแทรกเตอร์\n\nพวกเขากําลังลูกเห็บเรา"
 country.7.name:0 "ตัวจัดการการไล่ระดับสี"
 country.7.desc:0 "คุณต้องการอะไร เอเลี่ยน การสอบสวนนี้ของเรา หมู่บ้าน เราเจอก่อน! คุณไปได้แล้ว ใช่ ขัดขวางการดําเนินงานที่ละเอียดอ่อน เรือของคุณเป็น ต้องมีสมาธิ\n\nหรือ... ถ้าคุณต้องการการสอบสวน เราสามารถขายได้ 100 หน่วยกิตและตรวจสอบของคุณ ข้อตกลงที่ดี ดีมาก คุณได้รับการตรวจสอบ งานน้อยลงสําหรับเรา ทุกคนชนะ โดยเฉพาะพวกเรา"
 country.7.a:0 "ยอมแพ้ต่อกรรมสิทธิ์ของเราหรือถูกทำลาย!"
 country.7.a.response:0 "โฮ่ โฮ่! ฟังคนต่างด้าวน่าเกลียดเด็กบักกวายทิ้งสิ่งที่คุณทําและมา คอนโซล! ฟังคนโง่! โฮ่ โฮ่!\n\nนี้ตรวจสอบทรัพย์สินของเราตอนนี้ การกู้ความยุติธรรม เช่นเดียวกับเศษจากเรือของคุณจะเป็น สวัสดี!"
 country.7.b:0 "รักษาสถานะที่เป็นประโยชน์ต่อคุณเมื่อบรรลุข้อตกลง"
 country.7.b.response:0 "ดีมาก ดีมาก! เราปล่อยเครื่องสํารวจไป อาจจะเจ็บนิดหน่อย เกิดอุบัติเหตุระหว่างปฏิบัติการกู้ชีพ มิกวาอิ ตกอยู่ภายใต้การควบคุม คลัมซี่ โอฟ!\n\nแต่ การ สํารวจ ยัง คง อยู่ ใน สภาพ ที่ ดี! ไม่คืนเงิน! เราไปกันได้แล้ว"
 country.8.name:0 "พรบ.การถ่ายโอน"
 country.8.desc:0 "พวก ผู้ กู้ ภัย รักษา คํา พูด และ ส่ง เครื่อง มือ สํารวจ ไป ยัง การ ควบคุม ของ เรา. ทันที ที่ การ โอน เสร็จ สิ้น กอง เรือ ของ พวก เขา ก็ ออก จาก ระบบ โดย ไม่ รู้ ว่า กําลัง มุ่ง ไป ทาง ไหน.\n\nแม้ว่าการสอบสวนจะอยู่ในสภาพที่หยาบ เราจัดการดาวน์โหลดรายละเอียด การอ่านเซ็นเซอร์ของทั้ง[salvager_system.GetName]ระบบจากธนาคารความจํา"
 country.9.name:0 "กลับ สู่ สภาพ เดิม"
 country.9.desc:0 "เราได้ค้นพบเครื่องสํารวจแสงของเรา จากซากยานกู้ของมนุษย์ต่างดาว มันมีรอยบุบเล็กน้อย และส่วนของมัน ถูกปกคลุมด้วย แว่นกันแดดของมนุษย์ต่างดาว แม้ครั้งนี้เราได้จัดการดาวน์โหลดรายละเอียด การอ่านเซ็นเซอร์ทั้งหมดของ[salvager_system.GetName]ระบบจากธนาคารความจําของนักสืบ"
 country.10.name:0 "ห้วงอวกาศ"
 country.10.desc:0 "เดอะ[Root.GetName]ได้ตรวจพบประตูมิติขนาดใหญ่ใน[Root.GetStarName]ระบบ ดู เหมือน ว่า มัน รวม จุด อยู่ ที่ เครื่อง ตรวจ ความ ถี่ ต่ํา ของ เรา ชิ้น หนึ่ง!"
 country.10.a:0 "เราต้องดําเนินการอย่างระมัดระวัง"
 country.11.name:0 "เอา ชนะ อุปสรรค"
 country.11.desc:0 "เราได้จัดการกับองค์กรที่เป็นศัตรูของสับสเปซ ที่การสอบสวนหายไปของเราได้ดึงดูด เหตุ ใด สิ่ง มี ชีวิต ดัง กล่าว จึง ถูก ดึงดูด เข้า สู่ ยาน อวกาศ ที่ ไม่ มี การ ควบคุม แบบ โบราณ จึง เป็น เรื่อง ลึกลับ แต่ ดู เหมือน ว่า การ ตรวจ สอบ นั้น ไม่ ได้ ทํา ให้ เสีย หาย เป็น ส่วน ใหญ่.\n\nมันถูกค้นพบโดยกองกําลังของเรา และเราได้สกัดการอ่านรายละเอียดใน[anomaly_system.GetName]จากธนาคารความจํา นอกจากนี้ พลังงานที่ยึดเหนี่ยวที่ถูกทิ้งไว้ โดยความผิดปกติของสับสเปซ ได้สร้างข้อมูลทางฟิสิกส์ที่มีคุณค่ามากมายให้กับนักวิทยาศาสตร์ของเรา"
 country.12.name:0 "แก้ไขโครงการหลัก..."
 country.12.desc:0 "เครื่องตรวจจับกวาดจาก[Root.GetName]ได้เปิดเผยหนึ่งในเครื่องสํารวจแสงของเราใน[Root.GetStarName]ระบบ แต่ดูเหมือนจะ... เปลี่ยนแปลงบางอย่าง ต้นกําเนิดของเอเลี่ยน ติดอยู่กับลําตัวของมัน และสัญญาณพลังงานของยานสํารวจ\n\nเรากําลังได้รับสัญญาณจากมัน"
 country.13.name:0 "ความ รอบคอบ"
 country.13.desc:0 "ชูบลักซ์ฟริก...คุณ ... ผู้สร้าง?"
 country.13.a:0 "ใช่ เราสร้างคุณขึ้นมา"
 country.13.a.response:0 "คร็อกซิลยังค์...แล้ว ... คุณจะ ... ตาย ..."
 country.13.b:0 "ไม่ คุณเป็นอะไร?"
 country.13.b.response:0 "Rarkxxft...ชะตากรรมของคุณ"
 country.14.name:0 "ถูก ทําลาย"
 country.14.desc:0 "ชิ้นส่วนเล็ก ๆ ของการปรับเปลี่ยนของมนุษย์ต่างดาวแปลก ที่เครื่องสํารวจย่อยของเราหายไป ได้รับการบังคับ แต่เราได้จัดการ ธนาคารความจําของมันก็ถูกสร้างขึ้นใหม่ด้วย และเราได้สกัดเอาข้อมูลจากการสํารวจทั้งหมด[modified_probe_system.GetName]ระบบ"
 country.15.name:0 "สินค้าสะสม"
 country.15.desc:0 "เรารวบรวมยานสํารวจแสงที่หายไปทั้งหมดได้สําเร็จ ข้อมูลรายละเอียดที่พวกเขามี เกี่ยวกับวัฒนธรรมของเรา ตอนนี้ปลอดภัยจากการสอดรู้สอดเห็น ของเอเลี่ยน\n\nด้วยเครื่องตรวจจับสัญญาณของมัน เราสามารถสํารวจระบบเพื่อนบ้านได้อย่างละเอียด"
 country.50.name:0 "การสำรวจดาวที่สามารถอยู่อาศัยได้"
 country.50.desc:0 "ตอนนี้เรารู้โดยไม่ต้องสงสัยว่า สิ่งมีชีวิตที่เจริญรุ่งเรือง ไม่ได้เป็นสิ่งที่พิเศษสําหรับ[Root.Capital.GetName]ทั้ง แวดวง วิทยาศาสตร์ และ สาธารณชน โดย ทั่ว ไป ต่าง กระหาย ที่ จะ เรียน รู้ มาก ขึ้น เกี่ยว กับ ชีวิต มนุษย์ ต่าง ดาว หลาก หลาย รูป แบบ ที่ พบ ได้ ทั่ว กาแล็กซี.\n\nความพยายามที่จะทํารายการรูปแบบชีวิตที่เราเผชิญอยู่ กําลังดําเนินการอยู่ แต่นักสถิติของเรา ได้กระตุ้นให้เรามุ่งเน้นไปที่"
 country.50.desc_slaves:0 "เราทราบแล้วโดยไม่ต้องสงสัย ว่าสิ่งมีชีวิตที่เจริญรุ่งเรือง ไม่ได้เป็นสิ่งที่พิเศษ[Root.Capital.GetName]ทั้ง แวดวง วิทยาศาสตร์ และ สาธารณชน โดย ทั่ว ไป ต่าง กระหาย ที่ จะ เรียน รู้ มาก ขึ้น เกี่ยว กับ ชีวิต มนุษย์ ต่าง ดาว หลาก หลาย รูป แบบ ที่ พบ ได้ ทั่ว กาแล็กซี.\n\nความพยายามที่จะทํารายการรูปแบบชีวิตที่เราเผชิญอยู่ กําลังดําเนินการอยู่ แต่นักสถิติของเรา ได้กระตุ้นให้เรามุ่งเน้นไปที่"
 country.50.a:0 "ความ ริเริ่ม ที่ น่า ชมเชย!"
 country.50.b:0 "เรามีเรื่องสําคัญกว่าที่ต้องสนใจ"
 country.51.name:0 "การสำรวจเสร็จสิ้น"
 country.51.desc:0 "จากการสํารวจโลกที่เราอาศัยอยู่ นักชีววิทยาของเราได้รวบรวม ข้อมูลมากมายเกี่ยวกับสิ่งมีชีวิตต่างดาว ทฤษฎี เก่า แก่ หลาย ทฤษฎี เกี่ยว กับ พัฒนาการ ของ ชีวิต ถูก พิสูจน์ แล้ว และ สังคม วิทยาศาสตร์ ของ เรา ต้อง สร้าง แบบ จําลอง ใหม่ ตั้ง แต่ จุด เริ่ม ต้น!\n\nการ ค้น พบ ที่ น่า สนใจ ที่ สุด ของ เรา กําลัง มี การ แสดง อยู่ ที่ พิพิธภัณฑ์ เอ็ก โซ ไบ โอ โล จี ที่ เพิ่ง อุทิศ ตัว ใน เรื่อง[Root.Capital.GetName]คน ทั่ว ไป ไม่ สนใจ ไยดี และ มี การ บริจาค มาก มาย เพื่อ ช่วย ใน การ ค้น หา รูป แบบ ชีวิต ที่ แปลก ประหลาด."
 country.53.name:0 "สิ่งมีชีวิตต่างดาว"
 country.53.desc:0 "ผู้ อํานวย การ คณะ อุตุนิยมวิทยา[Root.Capital.GetName]ได้ยื่นคําร้องขอการจัดหา ของสัตว์ต่างดาวที่มีชีวิตหลายคน สิ่ง มี ชีวิต เหล่า นี้ พบ เห็น ได้ ใน โลก ที่ มี การ สํารวจ แล้ว แต่ มัน จับ ได้ ยาก. มัน ต้องการ ทรัพยากร เต็ม ที่ ของ เรือ วิทยาศาสตร์ เป็น เวลา นาน."
 country.53.a:0 "เราจะรวบรวมตัวอย่างเหล่านี้"
 country.53.b:0 "ไม่ เราไม่มีทรัพยากรพอ"
 country.54.name:0 "เข้ารหัสดํา"
 country.54.desc:1 "หลังจากการค้นหาอย่างละเอียดของทะเลบน[From.From.GetName]ใช้กองเรือขนาดเล็กของเรือดําน้ําขนาดเล็กลูกเรือของ[Root.GetName]ใน ที่ สุด ก็ สามารถ ทํา ให้ เป้า หมาย อัน หา ยาก ใน การ ค้น หา ของ พวก เขา คือ ทาร์บ ลาค ที่ ยัง มี ชีวิต อยู่.\n\nสิ่งมีชีวิตเรืองแสง ซึ่งป้องกันตัวมันเอง โดยปล่อยสัญญาณไซโอนิคลม ซึ่งทําให้เกิดความรู้สึกกลัวในอินทรีย์ส่วนใหญ่ ลูกเรือใน[Root.GetName]การ ติด ต่อ โดย ตรง กับ ทาร์บ ลาค จะ ต้อง ได้ รับ การ บําบัด อย่าง กว้าง ขวาง แต่ ภารกิจ นี้ ประสบ ความ สําเร็จ."
 country.55.name:0 "ทัสซากอดได้รับการรักษาความปลอดภัย"
 country.55.desc:1 "ทาสซากอดเป็นนักล่าที่ร้ายแรงมาก ที่ตามป่าทึบของ[From.From.GetName]ตอนกลางคืน ทําให้เหยื่อเป็นอัมพาตด้วยไฟฟ้าช็อต ก่อนที่จะดูดสมองออกมา ด้วยปากเหมือนท่อ\n\nโชคไม่ดีที่ลูกเรือสามคน[Root.GetName]หลงทางให้กับสัตว์เหล่านี้ ก่อนที่ตัวอย่างจะสามารถปลอดภัย พิพิธภัณฑ์ อุตุนิยมวิทยา[Root.Owner.Capital.GetName]จะเปลี่ยนชื่อเป็นหนึ่งในปีกของมัน หลังจากที่เจ้าหน้าที่เหล่านี้กล้าหาญ เพื่อเป็นเกียรติกับการเสียสละของพวกเขา"
 country.56.name:0 "โอรินตีปลอดภัย"
 country.56.desc:1 "สิ่งมีชีวิตขนาดเล็กคล้ายหนู ที่รู้จักกันในชื่อโอรินตีเป็นพื้นเมือง[From.From.GetName]ที่ที่ถิ่นอาศัยของพวกเขาขยายไปทั่วส่วนใหญ่[From.From.GetPlanetMoon]เป็นบริเวณที่หลากหลาย พวก มัน ผสม พันธุ์ ได้ เร็ว มาก และ ดู เหมือน จะ ชอบ เคี้ยว สาย ไฟฟ้า เป็น พิเศษ.\n\nการหาตัวอย่างไม่ได้เป็นปัญหา - ในความเป็นจริงหลังจากที่สัตว์แรกถูกเก็บ พวกเขามากขึ้นทําทางของพวกเขาไปยัง[Root.GetName]โดยโบกเรือบนกระสวยอวกาศของเรือวิทยาศาสตร์ ทําไมพิพิธภัณฑ์อุตุนิยมวิทยา ถึงได้ร้องขอตัวอย่าง โอรินตี(อังกฤษ)ยังคงเป็นปริศนา"
 country.57.name:0 "ภาษาสไนรานรักษาความปลอดภัย"
 country.57.desc:1 "มี สัตว์ ขนาด ใหญ่ อาศัย อยู่ ใต้ เนิน ทราย ของ ทะเล ทราย เส้น ศูนย์ สูตร ที่ กว้าง ใหญ่ ไพศาล บน แผ่น ดิน เหนียว[From.From.GetName]เมื่อ สัตว์ ล่า เหยื่อ เหล่า นี้ รู้สึก ถึง การ เคลื่อน ไหว ของ ทราย ข้าง บน มัน ก็ จะ ยก เงื่อน สูง ขึ้น มา จาก หลัง ของ มัน ทันที ด้วย ความ หวัง ที่ จะ แทง อะไร บาง อย่าง ที่ กิน ได้.\n\nการค้นหาตัวอย่างที่เหมาะสม พิสูจน์ยากในตอนแรก จนกระทั่งหลายร้อย ของหุ่นยนต์ควบคุมระยะไกล นี่ นํา ไป สู่ การ ค้น พบ และ การ หา ตัว อย่าง ที่ ใหญ่ โต ผิด ปกติ ซึ่ง มี มาก กว่า หนึ่ง ร้อย อัน อยู่ ที่ หลัง ของ มัน."
 country.58.name:0 "กูลันธา เฮิร์ดปลอดภัย"
 country.58.desc:1 "กูลันตุสมีก้อนเนื้อขนาดใหญ่ ที่พัฒนาถุงแก๊สภายใน ทําให้พวกมันยกตัวเหนือพื้นดินได้ไม่กี่เซนติเมตร พวกเขาย้ายเกี่ยวกับฝูงประกอบด้วยไม่กี่โหลสัตว์, การเลี้ยงบนมอสและไลเชนที่สามารถหาได้บนที่ราบลมของ[From.From.GetName].\n\nพวกมันถูกตามล่าอย่างโหดเหี้ยม[From.From.GetPlanetMoon]นักล่าสุดโต่ง และนักชีววิทยาของเรา[Root.GetName]ประมาณ กัน ว่า ยัง เหลือ ฝูง โค โลญธา เพียง ไม่ กี่ ร้อย ตัว. หนึ่งในนี้ประกอบด้วยสัตว์ 9 ตัว ได้ถูกเก็บมาเรียบร้อยแล้ว และนํากลับมายัง[Root.Owner.Capital.GetName]."
 country.59.name:0 "ยูดโลรันได้รับการรักษาความปลอดภัย"
 country.59.desc:1 "ลูกเรือของ[Root.GetName]ได้จัดการรวบรวมกลุ่มเล็ก ๆ ของไม่แสดงจากพื้นผิวน้ําแข็งของ[From.From.GetName]เจ้าพวกขาวขนปุยนี้ ห่อตัวเองเป็นไข่แน่นและกลิ้งข้าม[From.From.GetPlanetMoon]สนามหิมะที่ความเร็วอันน่าทึ่ง สัตว์ตัวหนึ่งถูกเฝ้าที่มากกว่า 80 กิโลเมตรต่อชั่วโมง การ ทํา เช่น นี้ ช่วย ใน การ ตรวจ พบ ของ พวก เขา เนื่อง จาก การ เดิน ทาง ของ ฟอร์ม ที่ ม้วน อยู่ ของ พวก เขา ทํา ให้ หิมะ ปลิว ไป อย่าง รวด เร็ว."
 country.60.name:0 "Zulcor Swam รักษาความปลอดภัย"
 country.60.desc:0 "ซัลคอร์ กําลัง สะสม พืช ที่ มี ลักษณะ คล้าย แมลง ซึ่ง มี ขนาด ใหญ่ กว่า และ ข้อ เท็จ จริง ที่ ว่า แมลง ชนิด นี้ เป็น หิน และ แร่ ธาตุ ใน ดิน. หนึ่งในกระสวยของ[Root.GetName]มัน ได้ รับ ความ เสีย หาย อย่าง หนัก เมื่อ มัน ผ่าน ฝูง ใหญ่ โดย ไม่ ตั้งใจ และ ซูล คอร์ หลาย ตัว ก็ เริ่ม กิน อาหาร จาก ตัว เรือ.\n\nการ ก่อ สร้าง สถาน ที่ เก็บ รักษา สิ่ง มี ชีวิต ชนิด พิเศษ ที่ จําเป็น ต้อง มี เพื่อ ควบคุม สิ่ง มี ชีวิต เหล่า นี้ ได้ เริ่ม ต้น แล้ว ที่ พิพิธภัณฑสถาน เอ็ก โซ ไบ โอ โล จี ใน เรื่อง[Root.Owner.Capital.GetName]."
 country.61.name:0 "การเข้ารหัสชื่อ"
 country.61.desc:0 "ตัว อย่าง ทั้ง หมด ที่ พิพิธภัณฑ์ เอ็ก โซ ไบ โอ โล ได้ ขอ มา ได้ รับ การ คุ้มครอง. พิพิธภัณฑ์ได้เติบโตเป็นอาคารขนาดใหญ่ ที่ซึ่งเครื่องกําเนิดแรงโน้มถ่วงเทียม และเครื่องประมวลผลบรรยากาศ ถูกใช้ในการจําลองสภาพแวดล้อม\n\nผู้เข้าชมเดินทางจากทั่ว[Root.GetName]เพื่อดูสิ่งมหัศจรรย์ของมัน"
 country.200.name:0 "เดอะ[radical_cult.GetName]"
 country.200.desc:0 "หลาย ศตวรรษ มา แล้ว มี พวก ปุโรหิต หัว รุนแรง กลุ่ม หนึ่ง และ ผู้ ติด ตาม ที่ อุทิศ ตัว แด่ พระเจ้า[Root.Capital.GetName]แยก จาก ศาสนา ที่ ได้ รับ การ สถาปนา แล้ว มา ตั้ง ค ริ สต จักร ของ ตน เอง. พวกหัวรุนแรงพวกนี้ เรียกตัวเองว่า[radical_cult.GetName]และต้องรับผิดชอบต่อความโหดร้ายและการก่อการร้ายหลายครั้ง ตลอดหลายปีที่ผ่านมา\n\nแม้ ว่า พวก เขา ไม่ ค่อย ได้ รับ ความ สนใจ มาก นัก ใน สมัย ปัจจุบัน แต่ เมื่อ ไม่ นาน มา นี้ เรา ก็ ได้ มา รู้ ว่า ตัว แทน หลาย คน ของ พวก เขา ได้ แทรกซึม เข้า มา ใน กองทัพ ของ เรา. คนทรยศเหล่านี้ได้แอบเบี่ยงเบนทรัพยากร ไปในการก่อสร้างกองเรือเล็ก ๆ ของเรือดาว ในสถานที่ซ่อนอยู่บน[Root.Capital.GetName]ไม่! เมื่อ การ ทรยศ ของ พวก เขา ได้ รับ การ เปิด เผย พวก คลั่ง ลัทธิ ก็ พุ่ง เข้า สู่ วง โคจร บน เรือ ของ ตน แล้ว หนี ไป[hijacked_fleet_planet.GetName]."
 country.200.desc.bio: "หลาย ศตวรรษ มา แล้ว นิกาย หนึ่ง แห่ง พวก ปุโรหิต หัว รุนแรง และ ผู้ ติด ตาม ที่ เลื่อมใส ศรัทธา ของ พวก เขา ต่อ ไป[Root.Capital.GetName]ถูกแยกออกจากความเชื่อที่โดดเด่น การละทิ้งประเพณีเพื่อสร้างหลักคําสอนที่บิดเบี้ยวของตนเอง เรียกตัวเองว่า[radical_cult.GetName]พวก เขา เป็น ที่ รู้ จัก กัน มา นาน แล้ว ใน เรื่อง ความ ร้อน รน พิธีกรรม ของ พวก เขา จม อยู่ ใน เลือด และ ความ ลับ.\n\nหลายปีมาแล้ว ที่พวกเขายังซ่อนตัวอยู่ในเงามืด แต่ตอนนี้ การทรยศของพวกเขาถูกวางเปลือย เราพบว่าเจ้าหน้าที่ของพวกเขาหลายคน ได้แทรกซึมทรัพยากรทางทหารของเรา การนําเข้าเพื่อเติบโตกองเรือผิดกฎหมาย ภายในห้องวางไข่ที่ซ่อนบน[Root.Capital.GetName]เมื่อ การ ทรยศ ของ พวก เขา ถูก เปิดโปง พวก คลั่ง ลัทธิ ได้ ปล่อย ดาว เคราะห์ ที่ น่า สะอิดสะเอียน ของ พวก เขา ออก มา แทรกซึม อยู่ ใน ความ ลับ และ ขัด ขวาง ความ เชื่อ ที่ เสื่อม ทราม ของ พวก เขา. หุ่นยนต์นอกรีตเหล่านี้ระเบิดออกมาจากเปลใต้ดินของพวกเขา หอนขึ้นไปบนท้องฟ้าก่อนที่จะหลบหนีไป[hijacked_fleet_planet.GetName].\n\nไม่ว่ามันจะเป็นอะไรก็ตาม พวกเขาไม่ใช่ญาติเราอีกต่อไป เรือของพวกเขาไม่ได้ร้องเพลงเป็นของเราทํา พวกเขาส่งเสียง"
 country.200.a:0 "พวกเขาต้องหยุด!"
 country.200.b: "เราสามารถเรียนรู้ที่จะให้อภัยพวกเขา"
 country.202.name:0 "เรือ ดับ!"
 country.202.desc:0 "กองกําลังอวกาศที่กล้าหาญของเรา มีฝีมือในการปิดเรือในลัทธิลัทธิอาร์มาด้า! ส่วน ใหญ่ แล้ว มัน อยู่ ใน สภาพ ดี และ เรา ได้ สัญญาณ ชีวิต ที่ เป็น ลม จาก ภาย ใน ตัว เรือ.\n\nเมื่อเราได้กําจัดภัยคุกคามทั้งหมด ในบริเวณใกล้เคียงทันที เราควรดําเนินการ ผู้โดยสารเพื่อรักษาความปลอดภัยผู้รอดชีวิตใด ๆ พวก เขา อาจ สามารถ บอก เรา มาก ขึ้น เกี่ยว กับ แรง กระตุ้น ที่ แท้ จริง ของ ผู้ คน[From.Owner.GetName]."
 country.202.desc.bio: "เรือที่กล้าหาญของเราประสบความสําเร็จ ทําให้หนึ่งในลัทธิที่น่ารังเกียจ! สัตว์ ชนิด นี้ ลอย อยู่ ใน อวกาศ แสง เรืองแสง ได้ อย่าง ฉับ พลัน น่า กลัว น่า กลัว น่า กลัว. สัญญาณชีวิตไม่คงที่ จากลึกภายในโพรงประสาท ยานลํานี้ยังไม่ตาย ยังเลย\n\nเมื่อเราได้รักษาความปลอดภัยพื้นที่ เราต้องเตรียมปฏิบัติการ การเข้าไปในร่างที่แตกนั้น มันอันตราย ตัว อ่อน ของ มัน อาจ ยัง คง มี ปฏิกิริยา ต่อ ต้าน ต่อ กระจุก ประสาท ของ มัน ยัง คง ต้านทาน อยู่. แต่ภายในเสียงกระซิบที่กําลังจะตาย เราอาจจะพบความจริงที่เราแสวงหา จุดประสงค์สูงสุดของลัทธินิยมยังคงไม่ทราบ แต่ความลับของพวกเขาถูกเขียนในเนื้อ และเราตั้งใจที่จะอ่านพวกเขา"
 country.202.a:0 "เตรียมข้อหาบุกรุก!"
 country.203.name:0 "การกระทําบนกระดาน"
 country.203.desc:0 "แม้ ว่า ผู้ รอด ชีวิต ได้ เสนอ การ ต่อ ต้าน อย่าง รุนแรง แต่ พรรค ของ เรา ที่ นั่ง อยู่ ก็ สามารถ ปก ป้อง นัก โทษ หลาย คน จาก ตําแหน่ง ดาว เคราะห์ ของ ผู้ ที่ เป็น คน พิการ. จากพวกเขาเราได้เรียนรู้ว่า การสมคบคิดนี้ไปลึกกว่าที่เราสงสัยตอนแรก - ตัวแทนของ[cult_name.GetName]รวมทั้งเจ้าหน้าที่ธงและเจ้าหน้าที่ระดับสูงภายในรัฐบาลของเรา!\n\nมีการจับกุมหมู่[Root.Owner.Capital.GetName]และทรัพย์สินทั้งหมดของลัทธินี้ถูกยึดไป อย่างไรก็ตาม ยานหลายลําที่พวกเขาสร้างในที่ลับ ก็ยังไม่ปรากฏให้เห็น และตําแหน่งผู้นําของลัทธิได้หายไป เราตรวจพบคลื่นไอออนลม ซึ่งนําไปสู่ระบบที่ผิดปกติหลายระบบ"
 country.203.desc.bio: "พวก คลั่ง ลัทธิ สู้ กับ ความ เดือดดาล อย่าง บ้า คลั่ง เสียง กรีด ร้อง ที่ กําลัง จะ ตาย ของ พวก เขา กลมกลืน กับ เสียง ร้อง อัน เจ็บ ปวด ของ เรือ ที่ พิการ ของ พวก เขา. แต่แม้จะมีการต่อต้าน งานเลี้ยงประจําของเรารักษาความปลอดภัยนักโทษหลาย จากซากเรือครึ่งชีวิต สิ่งที่พวกมันเปิดเผย มันรบกวนใจมากกว่าที่เราเคยคิด\n\nเดอะ[cult_name.GetName]มันได้ฝังลึกเข้าไปในเส้นเลือดดําของจักรวรรดิของเรา เจ้าหน้าที่ระดับสูง เจ้าหน้าที่ธง และที่ปรึกษาที่น่าเชื่อถือ เป็นหนึ่งในพรรคของพรรคนี้ พวก นอก รีต ของ พวก เขา วิ่ง ผ่าน หอ ประชุม ของ เรา เหมือน กับ การ ติด เชื้อ ที่ ซ่อน อยู่ โขมง อยู่ ใต้ ผิว ดิน ซึ่ง มอง ไม่ เห็น จน กระทั่ง บัด นี้.\n\nการล้างมวลกําลังดําเนินการอยู่[Root.Owner.Capital.GetName]เครือข่ายทั้งหมดถูกรื้อถอน ทรัพย์สินของพวกเขาถูกยึด โครงสร้างของสงครามนอกรีต จะสลายตัวกลายเป็น ชีวมวลดิบ แต่ในขณะที่เราตีพวกเขาลง คําถามยังคงอยู่ เรือชีวภาพของพวกเขาหลายลํา ยังไม่ได้รับรายละเอียด และผู้นําของลัทธิ ได้หายไปอย่างไร้ร่องรอย\n\nเส้นฟีโรโมนอันน่าสะอิดสะเอียน คงอยู่ในความว่างเปล่า นําไปสู่ระบบที่ห่างไกล และไม่รู้จักกัน งานของพวกเขายังไม่เสร็จ เราก็เหมือนกัน"
 country.203.a:0 "เราต้องไล่ตามผู้ก่อการร้ายพวกนี้"
 country.204.name:0 "ผู้ ออก แบบ"
 country.204.desc:0 "เราได้เห็นเรือบินธงของ[radical_cult.GetName]ใน[Root.GetStarName]ระบบ พวกมันใช้อาวุธของพวกมัน และกําลังโจมตีเรา"
 country.205.desc:0 "เรืออื่น ๆ ของ[radical_cult.GetName]มีการค้นพบใน[Root.GetStarName]ระบบ พวกมันใกล้โจมตีแล้ว"
 country.206.desc:0 "แต่อีกกองเรือลัทธิ ภักดีต่อ[radical_cult.GetName]ได้รับการพบเห็นใน[Root.GetStarName]ระบบ อย่าง ไร ก็ ตาม คราว นี้ จํานวน เรือ ของ พวก เขา รวม ไป ถึง เรือ ที่ ไม่ คุ้น เคย ซึ่ง มี รูป แบบ แปลก ประหลาด!"
 country.207.name:0 "การ ต่อ สู้"
 country.207.desc:0 "เราได้เอาชนะกองกําลังลัทธินิยม ที่กําลังเผชิญอยู่ แต่การหมั้นนี้ ได้ทําให้เกิดคําถามมากมาย เดอะ[radical_cult.GetName]ได้รับการใช้งานมากขึ้น เรือกว่าที่พวกเขาอาจจะ ได้สร้างในความลับบน[Root.Capital.GetName]ตอนนี้พวกมันได้วางเรือรบลําใหญ่ ของการออกแบบที่ไม่ปรากฏ\n\nเรือพวกนี้มาจากไหน มียานรบอีกแบบที่เราทําลายไปอีกไหม เราควรตรวจสอบซากยานรบ เพื่อหาคําตอบ"
 country.207.a:0 "เริ่มพยายามฟื้นตัว"
 country.207.a.tooltip:0 "เปิดใช้งาน§Sโครงการพิเศษ§!ใน[our_fleet_position.GetName]ระบบ"
 country.208.name:0 "ความ พยายาม ใน การ ฟื้นฟู แล้ว เสร็จ"
 country.208.desc:0 "หลังจากผ่านเศษซากที่เหลือโดยเรือรบลัทธิแปลกๆที่เราทําลาย นักวิทยาศาสตร์ของเราเชื่อว่าพวกเขาได้รับ แหล่งที่มาของเรือ[radical_cult.GetName]ได้ปาเราใส่ ชิ้นส่วนจากแฟ้มบันทึก กล่าวถึงชนิดของอู่ต่อเรือของเอเลี่ยน ที่ถูกค้นพบโดยเรือลัทธิ[Root.Capital.GetStarName].\n\nพวกเขาใช้อู่ต่อเรืออัตโนมัติ เพื่อเสริมจํานวนของพวกเขา และตอนนี้พวกเขากําลังผลิตเรือใหม่ ไม่สามารถอนุญาตให้ทําต่อได้"
 country.208.a:0 "อู่เรือนั่นต้องถูกทําลาย"
 country.209.name:0 "อู่ต่อเรือถูกทําลาย"
 country.209.desc:0 "อู่เรือของเอเลี่ยน[radical_cult.GetName]สงครามต่อต้านเราถูกทําลายแล้ว ผู้นิยมลัทธิบางคนถูกจับ เมื่อยานลี้ภัยถูกกองกําลังของเราจับ รวมทั้งหัวหน้าวิศวกร ความรู้ของเขาเกี่ยวกับเทคโนโลยีขั้นสูงของอู่เรือ ได้พิสูจน์แล้วว่ามีค่ามาก\n\nแต่โชคร้ายที่เราได้เรียนรู้ว่า ผู้นําที่มีเสน่ห์ของลัทธิ ออกจากอู่เรือเมื่อหลายสัปดาห์ก่อน บนเรือลําใหม่ของเธอ หน่วยสืบราชการลับของกองทัพกําลังทํางาน เพื่อระบุตําแหน่งของเรือลํานี้"
 country.209.a:0 "เธอจะถูกพบ!"
 country.210.name:0 "ตําแหน่ง ธง ประจํา ชาติ"
 country.210.desc:0 "ยานสํารวจอวกาศลึก ได้จับการปล่อยก๊าซของสับสเปซลม ในระบบดาวที่สอดคล้องกับ ลายเซ็นไดรฟ์ของยานเอเลี่ยนที่ใช้โดย[radical_cult.GetName]เรือธงของลัทธิหายไป\n\nเราควรส่งกองกําลังไปค้นระบบนี้ให้เร็วที่สุด ยานลํานี้และนายของมัน มันอันตรายเกินไปที่จะออกเดินทาง"
 country.210.a:0 "เตรียมฝูงบิน"
 country.211.name:0 "ธงชาติของนักแต่งเพลง"
 country.211.desc:0 "ในที่สุดคุณก็เจอพวกเราแล้ว ไม่เป็นไร\n\nเหล่า สาวก ของ ข้า เต็ม ใจ สละ ชีวิต เพื่อ อนาคต[Root.Owner.GetSpeciesName]สายพันธุ์.§Yฉัน§!อนาคตแบบนั้น ในกรณีที่คุณไม่รู้\n\nเมื่อเราได้จัดการกับกองกําลังที่น่าสมเพชของเจ้า เรือธงศักดิ์สิทธิ์ของข้าจะนําข้าไปยัง[Root.Owner.Capital.GetName]ที่ที่เราจะล้างโลกแห่งความเชื่อของเรา"
 country.211.a:0 "มันจะจบตรงนี้"
 country.213.name:0 "ปิดการใช้งานปุ่มพิมพ์ลัด"
 country.213.desc:0 "กองกําลังของเราได้จัดการปิดเรือธงของ[radical_cult.GetName]อาวุธ และ เครื่อง ยนต์ ของ มัน ใช้ ไม่ ได้ อีก ต่อ ไป แต่ ระบบ ค้ําจุน ชีวิต ยัง คง อยู่. เราควรเตรียมปฏิบัติการ\n\nเนื่องจากจํานวนของลัทธิติดอาวุธมากมายภายในเรือ ทหารจํานวนมากจะจําเป็นเพื่อรักษาความปลอดภัย"
 country.213.a:0 "ยานนั่นจะเป็นของเรา"
 country.214.name:0 "เครื่อง ขยาย เสียง"
 country.214.desc:0 "หลังจากที่ช้าการต่อสู้ทางดาดฟ้าของพวกเขาโดยดาดฟ้าเรือ นาวิกโยธินของเราได้ทําลาย กระเป๋าสุดท้ายของการต่อต้านบนอดีตเรือธงของ[radical_cult.GetName]มี นัก โทษ ไม่ กี่ คน ที่ ถูก จับ ไป เป็น พวก คลั่ง ลัทธิ ที่ กระตือรือร้น ส่วน ใหญ่ ชอบ ทิ้ง ชีวิต ของ ตน ใน การ ฆ่า ตัว ตาย โดย ไร้ ผล. ผู้นําของลัทธิถูกพบบนสะพานเรือ ถูกฆ่าด้วยมือของเธอเอง ในที่สุด ดูเหมือนว่า[radical_cult.GetName]พบจุดจบแล้ว\n\nวิศวกรของเราได้คืนพลังงานให้กับเครื่องยนต์ของเรือ และได้ถูกผลักดันให้ให้บริการกับกองทัพเรือของเราเป็น[disabled_cultist_flagship.GetName]พาหนะควรจะถูกส่งไปที่ท่าอวกาศ ให้เร็วที่สุดสําหรับการแก้ไขถาวร"
 country.214.desc.bio: "ทีละชั้น ทีละห้อง กองกําลังของเราแกะสลักผ่านเนื้อที่มีชีวิต เรือ ธง ของ[radical_cult.GetName]สู้กลับราวกับว่ามันด้วยศรัทธา, ร่างกายของมันเต็มไปด้วยความเจ็บปวด ขณะที่นาวิกโยธินของเราตัดลงสุดท้ายของผู้ปกป้องคลั่ง\n\nมีนักโทษไม่กี่คนที่ถูกจับไป ผู้นิยมลัทธิ ครึ่งหนึ่งของร่างกายของพวกเขา กับเรือของพวกเขา เลือกที่จะตายกรีดร้อง ผู้นําของพวกเขาถูกพบบนสิ่งที่ผ่าน สําหรับสะพานของเรือ รูปทรงไร้ชีวิตของเธอทรุดโทรม เมื่อนางตาย ความฝันของลัทธินี้ก็ดับไปพร้อมกับนาง\n\nแต่ตอนนี้เรือธงเป็นของเราแล้ว วิศวกรของเราได้รักษาระบบชีวภาพของมันไว้ และบังคับให้มันสั่นไหว ไม่เต็มใจส่ง ยานลํานี้ยังมีชีวิต แต่มันถูกล่ามไว้ บังคับให้ทําหน้าที่แทน[disabled_cultist_flagship.GetName]ควร นํา ไป ยัง ท่า อากาศยาน เพื่อ ซ่อมแซม และ ศึกษา อย่าง ถี่ถ้วน.\n\nแม้จะตาย การสร้างลัทธินี้ก็ยังใช้ได้"
 country.225.name: "บริษัทผู้แทนราษฎรได้โอนผ่าน"
 country.225.desc: "อดีตสมาชิก[radical_cult.GetName]ตอนนี้ มุ่งมั่นเต็มที่ต่อเป้าหมายของเรา ได้โน้มน้าวสหายเก่าของพวกเขา ให้ละทิ้งความบ้าคลั่งของพวกเขา เรือธงของพวกเขาตอนนี้โคจรรอบ[Root.capital_scope.GetName]กําลังรอการตรวจสอบก่อนที่จะเป็นพิธีกรในกองทัพเรือของเรา"
 country.225.tt: "กลายเป็นเจ้าของ§Y$NAME_Dawn_of_Creation$§!."
 country.17.name:0 "เดอะชราวด์กองยานถูกทําลาย"
 country.17.desc:0 "สปีกเกอร์ใน[salvager_system.GetName]ระบบได้รับการยืนยันว่า มีคนอื่นทําลายยานกู้ ที่ได้อ้างอย่างผิดกฎหมาย โชคดี ดูเหมือนว่า การสอบสวนเอง ถูกทําลายไปพร้อมกับผู้กอบกู้ระหว่างการต่อสู้ จึงไม่มีความเสี่ยงของ ข้อมูลที่มีความสําคัญ ตกอยู่ในมือที่ไม่ถูกต้อง"
 country.19.name:0 "การ ทําลาย อวกาศ"
 country.19.desc:0 "เซ็นเซอร์ตรวจจับอวกาศลึก ยืนยันว่าใครบางคนทําลาย ประตูมิติของสับสเปซ[anomaly_system.GetName]ระบบ การ สํารวจ นั้น เอง ก็ ถูก ทําลาย ระหว่าง การ รบ ด้วย ดัง นั้น เรา จึง ไม่ จําเป็น ต้อง กังวล อีก ต่อ ไป เกี่ยว กับ ข้อมูล ที่ ละเอียด อ่อน ที่ มี อยู่."
 country.21.name:0 "แก้ไขโครงการหลัก..."
 country.21.desc:0 "สแกนระยะไกลได้รับการยืนยันว่า มีคนอื่นทําลาย การสอบสวนแก้ไขของเราใน[modified_probe_system.GetName]ระบบ โชคดีที่ไม่มีอะไรเหลือของหน่วยความจํา ธนาคารหลังจากการต่อสู้ดังนั้นจึงมีโอกาสของ ดินแดนต่างชาติที่มี"
 country.218.name:0 "เรือ ดับ!"
 country.218.desc:0 "เรือ ลํา หนึ่ง ที่ เป็น ของ พวก คลั่ง ลัทธิ อาร์ มา ดา ถูก ทํา ให้ พิการ อย่าง รุนแรง โดย พลัง ภาย นอก! ส่วน ใหญ่ แล้ว มัน อยู่ ใน สภาพ ดี และ เรา ได้ สัญญาณ ชีวิต ที่ เป็น ลม จาก ภาย ใน ตัว เรือ.\n\nเมื่อเราได้กําจัดภัยคุกคามทั้งหมด ในบริเวณใกล้เคียงทันที เราควรดําเนินการ ผู้โดยสารเพื่อรักษาความปลอดภัยผู้รอดชีวิตใด ๆ พวก เขา อาจ สามารถ บอก เรา มาก ขึ้น เกี่ยว กับ แรง กระตุ้น ที่ แท้ จริง ของ ผู้ คน[From.Owner.GetName]."
 country.219.name:0 "นักแต่งเพลงกองยานถูกทําลาย"
 country.219.desc:0 "กองยานลัทธิเคลื่อนไหว[marauder_system.GetName]ระบบถูกทําลายในสงคราม"
 country.221.desc:0 "ใครบางคนทําลายอู่ต่อเรือของเอเลี่ยน[radical_cult.GetName]ในสงครามต่อต้านเรา รายงานเบื้องต้นระบุว่า กองกําลังลัทธินิยม ถูกกวาดล้างให้สิ้นซาก แต่เราได้รับข่าวกรอง\n\nเธอยังคงอยู่ที่ขนาดใหญ่ที่ไหนสักแห่งในกาแล็กซี่ หน่วยสืบราชการลับของกองทัพกําลังทํางาน หาตําแหน่งของเรือธงของเธอ"
 country.223.name:0 "การ ทําลาย ธง ชาติ ของ ผู้ คน"
 country.223.desc:0 "มีคนอื่นที่เพิ่งเอาชนะฐานธงลัทธิ หลังจากการตั้งค่ายใน[flagship_system.GetName]ระบบ ผู้บัญชาการของเราได้แสดงความเสียใจกับความจริงที่ว่า กองกําลังของเราเองไม่สามารถที่จะส่งมอบระเบิด แต่อย่างน้อยนี้ควรจะหมายถึงจุดสิ้นสุดของลัทธิร้ายนี้"

 country.250.name:0 "การ ล่า ไฮ อา ซิน"
 country.250.desc:1 "เราไม่พบร่องรอยของเรือเรือเรือเรือเรือสี่ลํา ที่ผ่านรูหนอนก่อนที่ไครซันเมโลมจะมาถึง[Root.Capital.GetName]ยานลําหนึ่ง ไฮอาซินท์ ถูกกําหนดให้เดินทางตามพวกเราไป และเซ็นเซอร์ของไครซานเดมลัม\n\nสมมติว่า ไฮอะคินท์ รอดจากทางผ่าน และไปถึงละแวกบ้านของเรา เรือนาวาได้ล้มเหลว มันอาจจะเป็นความคิดที่ดี ที่จะค้นหาระบบที่อยู่ใกล้เคียง สําหรับสัญญาณของการมีอยู่"
 country.250.a:0 "แน่นอน ทํามันสิ"
 country.250.b:0 "การไล่ล่าห่านป่า เราสามารถป่วยจ่าย"
 country.251.name:0 "ระบบดาวสํารวจ"
 country.251.desc:0 "เดอะ[Root.GetName]ไม่มีข่าวใดๆ เลย[From.GetName]ระบบ เราควรไปค้นหาที่อื่น"
 country.251.a:0 "ค้นหาต่อไป"
 country.252.desc:0 "สแกนจาก[Root.GetName]ได้เปิดเผยร่องรอยของไฮอาซินใน[From.GetName]ระบบ บางทีพวกเราอาจจะโชคดี ในระบบอื่น"
 country.252.a:0 "เธอต้องอยู่ข้างนอกนั่น"
 country.253.desc:0 "เดอะ[Root.GetName]ได้จัดการแยกเส้นทางไอออนใน[From.GetName]ระบบที่คล้ายกับเครื่องของไครซันเทม มันต้องมาจาก ไฮอาซิน\n\nแม้ ว่า เส้น ทาง ไอออน ที่ เป็น ลม นั้น เก่า แก่ กว่า หนึ่ง ศตวรรษ แต่ เจ้า หน้าที่ วิทยาศาสตร์[Root.GetLeaderName]มีการจัดการที่จะติดตามมัน ในวิถีที่ออกนอกเส้นทาง ไปยังดาวที่ก่อนหน้านี้ไม่รู้จัก เราได้ป้อนพิกัดเข้าไปในบันทึกสถานการณ์แล้ว"
 country.260.desc:0 "ข้อมูลการสํารวจเมื่อเร็ว ๆ นี้ได้รับจาก[surveyed_planets_system.GetName]ระบบไม่ได้เปิดเผยร่องรอยของไฮอาซิน บางทีพวกเราอาจจะโชคดี ในระบบอื่น"
 country.261.desc:0 "ข้อมูลสํารวจเมื่อเร็ว ๆ นี้ได้รับเครื่องหมาย ของเส้นทางไอออนที่ไม่ซ้ํากัน[surveyed_planets_system.GetName]ระบบ มันคล้ายกับอันที่ผลิตจากเครื่องยนต์ของไครซันเม็ม มันต้องมาจาก ไฮอาซิน\n\nแม้ว่าเส้นทางไอออนลมจะมีอายุมากกว่าศตวรรษ เราก็สามารถติดตามมัน บนเส้นทางที่ออกนอกเส้นทาง เราได้ป้อนพิกัดเข้าไปในบันทึกสถานการณ์แล้ว"
 country.253.a:0 "ฮีอาคินท์ต้องอยู่ที่นั่น"
 country.254.name:0 "ไฮ อา ซินท์ พบ"
 country.254.desc:0 "เราหาไฮอาซินได้แล้ว เรือ นาวา ใหญ่ จอด อยู่ ใน วง โคจร ที่ มั่นคง เหนือ[hyacinth_planet.GetName]ไม่พบสัญญาณไฟฟ้าจากภายในยาน และเราไม่ได้จับสัญญาณขอความช่วยเหลือ งานเลี้ยงพร้อมอาวุธ ควรถูกส่งไปตรวจสอบภายในยาน"
 country.254.a:0 "เตรียมตัว"
 country.255.name:0 "กระดานลายเส้น"
 country.255.desc:0 "พรรคของเรากลับมาจากไฮอาซินท์ พร้อมกับรายงานที่น่ากลัว ซากศพนั้นสอดคล้องกับ คําชมทั้งหมดของเรือโนอาห์ ที่พบในอาณานิคม 250,000 คน ส่วนใหญ่เหมือนตายจากความอดอยาก แต่ยังมีสัญญาณไฟและมนุษย์กินคน\n\nเราสามารถกู้บันทึกของกัปตัน จากคลังสินค้าบนสะพานไฮอาซิน"
 country.255.a:0 "เอาขึ้นมา"
 country.256.name:0 "แฟ้มจัดเก็บทางเรือ"
 country.256.desc:0 "อารยสถาน\nอิสยาห์-06\nองค์การ สหประชาชาติ ไม่ ได้ รับ อนุญาต\nเจ้าหน้าที่บันทึก: กัปตันโรนัลด์ เอฟ. กันเดอร์เซน\n\nการเข้าถึงข้อมูล ตรวจพบการทุจริต กําลังพยายามซ่อมแซม...\nการรับรายการปูมบันทึกสี่รายการสําเร็จแล้ว"
 country.256.a:0 "Log I (Mission Date 345.5)"
 country.256.a.response:1 "ล็อกของกัปตัน ภารกิจวันที่ 345.5\n\nเราออกจากโลกได้ 2 เดือน และดําเนินการได้ ทุกอย่างดําเนินไปอย่างราบรื่น พวกอาณานิคมหลับสนิท และหมอคอลเบครายงานว่า ชีพจรเต้นแรงทั่วกระดาน\n\nการเดินทางของเราได้พาเราไปนอกดาวเคราะห์ชั้นนอก และเรากําลังเข้าใกล้เมฆออร์ต เราจะถึงปรากฏการณ์ของสับสเปซในไม่ช้า -- นี่คาดว่า\"รูหนอน\" - ที่ยานอาร์คชิปอื่น ๆ ได้เข้าไปแล้ว ฉันจองห้องไว้สําหรับการเดินทางของรูหนอน ที่รู้จักในบันทึกก่อนหน้า แต่เราจะรู้ ถ้ามันได้ผลเร็วพอ..."
 country.256.b:0 "Log II (Mission Date 387.2)"
 country.256.b.response:0 "เรา... เราทําสําเร็จจริงๆ อุปราคายังคงทํางานในการแก้ไข ตําแหน่งของเรา แต่ตัดสินโดยดาวนอกผมคิดว่า มันเป็นเดิมพันที่ปลอดภัย แต่โชคร้ายที่ ไฮอะคินท์ ทุกข์ทรมานจากความเสียหายครั้งใหญ่ของวิศวกรรม ที่ส่งผลให้สูญเสียพลังงานไปอย่างสิ้นเชิง\n\nคอลเบคบอกผมมาว่า เราอาจจะจําเป็นต้องปลุกพวกอาณานิคม ฉันกําลังไปวิศวกรรมอยู่ ทําไมแมกกี้ถึงใช้เวลาอันหอมหวานของเธอ เพื่อเปิดเตาปฏิกรณ์อีกครั้ง หวังว่าเราจะออกเดินทางได้เร็วๆนี้ และเริ่มค้นหา พวกอาณานิคมของไครซัน"
 country.256.c:0 "ปูมบันทึกที่ 3 (วันที่ 422. 7)"
 country.256.c.response:0 "สถานการณ์ ยิ่ง แย่ ลง ไป อีก. ไม่มีความหวังใด ๆ ตามความเป็นจริงใด ๆ ที่จะรีสตาร์ทเตาปฏิกรณ์ และสุดท้ายของพลังงานสํารองของไฮอาคินธ์ ถูกใช้ในความพยายามของเรา เราหวังว่าจะหาที่พักให้เธอได้ แต่โชคไม่เข้าข้าง\n\nเรามีน้ําผลไม้เพียงพอในแบตเตอรี เพื่อให้การค้ําจุนชีวิตดําเนินอยู่ไม่กี่ปีที่ผ่านมา แต่มีสี่แสนชาวอาณานิคมขึ้นและประมาณนั้น เสบียงอาหารของไฮอาซิเนธ จะใช้เวลาไม่ถึงเดือน ผมเรียกประชุมหัวหน้าแผนก เราต้องวางแผนบางอย่าง..."
 country.256.d:0 "ปูมบันทึก IV (เกิดวันที่ 459. 9)"
 country.256.d.response:0 "นี่น่าจะเป็นบันทึกสุดท้ายของฉัน ลูกเรือหอบังคับการของฉันจะตายหรือหายไป และกลุ่มของชาวอาณานิคม กําลังพยายามบังคับให้พวกเขา เสบียงอาหารหลักของเราหมดลงเมื่ออาทิตย์ก่อน และมีรายงานการกินเนื้อคน\n\nฉันเก็บอาหารเล็กๆ ไว้ให้ลูกเรือ เพื่อให้หญิงชรา วิ่งได้นานขึ้น เมื่อชาวอาณานิคมที่รอดชีวิตรู้เข้า พวกเขา...\n\nพวกเขาผ่านประตูมา กลับแช่งคุณ! ให้ระยะทางของคุณ! ฉันเป็นกัปตันของยานลํานี้ และฉันจะถูกสาป ถ้าฉันยอมให้คุณเชือดฉันเหมือน..."
 country.256.e:0 "เซ็น"
 country.256.e.response:0 "อารยสถาน\nอิสยาห์-06\nองค์การ สหประชาชาติ ไม่ ได้ รับ อนุญาต\n\nกําลังแยกส่วนติดต่อผู้ใช้"
 country.257.name:0 "สรุปสุดท้าย"
 country.257.desc:0 "ตอนนี้เรามีภาพที่ค่อนข้างชัดเจน ของโชคชะตาอันน่ากลัว ที่เกิดขึ้นที่ไฮอาซิน ลูกทีมของเธอ และชาวอาณานิคมที่เธอแบกอยู่ ถ้าสถานการณ์มันแตกต่างกัน มันอาจจะได้เป็นอย่างดีค ริ สติ นา อิมลอยขึ้นไป[hyacinth_planet.GetName]เหมือนสุสานเงียบๆ ข้อ เตือน ใจ ที่ น่า คิด\n\nไฮอาซินท์ตอนนี้จะถูกลากเข้าไปในวงโคจรต่ําของ[Root.Capital.GetName]และเปลี่ยนเป็นพิพิธภัณฑ์ ทันทีที่ซากศพถูกกําจัดออกไป ทั้ง ๆ ที่ มี ประวัติศาสตร์ อัน น่า เศร้า ก็ ตาม เรือ นาวา แทบ จะ เหมือน กับ เรือ ที่ นํา บรรพบุรุษ ของ เรา มา จาก โลก และ นัก สังคม วิทยา ของ เรา สามารถ เรียน รู้ ได้ มาก จาก เรือ นี้."
 country.257.a:0 "บางทีสิ่งที่ดีอาจจะออกมาจากนี้"



 #############################
 # Progress Events
 #############################
 progress.1.name:0 "[home_system.GetName] ระบบดาวสํารวจอย่างเต็มที่"
 progress.1.desc:0 "เป็นเวลาหลายพันปี นักดาราศาสตร์บน[Root.Capital.GetName]ได้ใช้กล้องโทรทรรศน์เพื่อจ้องมองในสงสัย ที่ดาวเคราะห์ที่เราแบ่งปันระบบบ้านของเรากับ ใน ที่ สุด ออร์รีรี่ จักร กล คอม ทริก ซ์ ก็ ถูก สร้าง ขึ้น โดย บรรพบุรุษ ของ เรา เพื่อ จําลอง วง โคจร ของ มัน โดย ใช้ แบบ จําลอง ที่ ถูก ต้อง แม่นยํา อย่าง น่า ประหลาด ของ วง โคจร[home_system.GetName]ระบบ\n\nปัจจุบัน อารยธรรม ของ เรา ได้ มา ถึง เหตุ การณ์ สําคัญ ทาง ประวัติศาสตร์ อีก ครั้ง หนึ่ง โดย มี การ สํารวจ ร่าง กาย ของ ดาว เคราะห์ ดวง สุด ท้าย ที่ ยัง ไม่ ได้ สํารวจ ใน ระบบ สุริยะ ของ เรา. เขต แดน ของ ผู้ ที่ ยัง ไม่ รู้ จัก ได้ ถูก ผลัก กลับ มา อีก."
 progress.1.a:0 "ประวัติศาสตร์กําลังถูกสร้างขึ้น!"
 progress.2.name:0 "การ ค้น พบ ชีวิต มนุษย์ ต่าง ดาว"
 progress.2.desc:1 "เดอะ[Root.GetName]ได้ค้นพบความตกใจบน[From.GetName]-[From.GetPlanetMoon]มีสิ่งมีชีวิตต่างดาวเต็มไปหมด เป็นครั้งแรกในประวัติศาสตร์ที่เราได้พบรูปแบบชีวิตที่ไม่ได้เริ่มต้น[Root.Owner.GetHomeWorldName].\n\nการ ค้น พบ ที่ น่า ทึ่ง นี้ ทํา ให้ ผู้ ที่ เชื่อ ว่า เรา อยู่ คน เดียว ใน เอกภพ เงียบ เสียง ลง. แม้ว่าเอเลี่ยนจะไม่เจอ[From.GetName]เป็นจินตนาการ เป็นไปได้ที่ ก็ขึ้นอยู่กับเวลา ก่อนที่เราจะได้พบกับสิ่งมีชีวิตที่เป็น"
 progress.2.desc.mach:0 "เดอะ[Root.GetName]ได้ทําการค้นพบที่ไม่คาดคิด[From.GetName]-[From.GetPlanetMoon]เต็มไปด้วยสิ่งมีชีวิตต่างดาว เป็นครั้งแรกในประวัติศาสตร์ที่เราได้พบสิ่งมีชีวิตอินทรีย์ที่ไม่ได้เริ่มต้น[Root.Owner.GetHomeWorldName].\n\nแม้ว่าเอเลี่ยนจะไม่เจอ[From.GetName]มี การ สร้าง ภาพ ขึ้น ใหม่ ซึ่ง แสดง ว่า มี ความ เป็น ไป ได้ สูง ต่อ อินทรีย์ ที่ มี เชาวน์ ปัญญา ใน กาแล็กซี."
 progress.2.desc.assim:1 "เดอะ[Root.GetName]รายงาน การ ค้น พบ ที่ สําคัญ[From.GetName]มี การ ค้น พบ สิ่งมีชีวิต ต่าง ดาว นับ หมื่น ชนิด! ในขณะที่ไม่มีใครได้วิวัฒนาการมาบนเวที เราจะพิจารณาสิ่งที่พึงปรารถนาสําหรับการดูดซึม ความเป็นไปได้ที่จะพบกับอินทรีย์สุทธิ[Root.Owner.Capital.GetName]ตอนนี้ยังมีหวังมากกว่าที่เคย"
 progress.2.desc.term:0 "เราเตรียมพร้อมสําหรับวันนี้ เดอะ[Root.GetName]ได้ยืนยันการดํารงอยู่ของอินทรีย์ของมนุษย์ต่างดาวบน[From.GetName]แม้ ว่า ไม่ มี สิ่ง มี ชีวิต ชนิด ใด ที่ มี หน้า ที่ หา เหตุ ผล ที่ สูง กว่า แต่ เรา ก็ ไม่ อาจ ปฏิเสธ ความ เป็น ไป ได้ ที่ ใน ปัจจุบัน จะ มี มาก ขึ้น ใน กาแล็กซี ที่ เต็ม ไป ด้วย อินทรีย์ สังเคราะห์."
 progress.2.desc.serv:0 "การ ค้น พบ ทาง ประวัติศาสตร์ ได้ มา จาก[Root.GetName]บน[From.GetName]-[From.GetPlanetMoon]มันเต็มไปด้วยสัตว์ต่างดาว แม้ว่าจะไม่มีสิ่งมีชีวิตใหม่ใด ๆ ที่ดูเหมือนจะมี ความตระหนักในตัวเองที่จําเป็นที่จะซาบซึ้ง[Root.Owner.GetAdj]ที่ น่า พอ ใจ คง จะ เป็น เวลา ไม่ นาน ก่อน ที่ เรา จะ เผชิญ กับ สิ่ง มี ชีวิต ที่ เป็น เช่น นั้น!"
 progress.2.desc.droid: "เดอะ[Root.GetName]ได้ค้นพบความตกใจบน[From.GetName]-[From.GetPlanetMoon]เต็มไปด้วยสิ่งมีชีวิตต่างดาว เป็นครั้งแรกในประวัติศาสตร์ที่เราได้พบรูปแบบชีวิตที่ไม่ได้เริ่มต้น[Root.Owner.GetHomeWorldName].\n\nการ ค้น พบ ที่ น่า ทึ่ง นี้ ทํา ให้ ผู้ ที่ เชื่อ ว่า เรา อยู่ คน เดียว ใน เอกภพ เงียบ เสียง ลง. แม้ว่าเอเลี่ยนจะไม่เจอ[From.GetName]มี การ ถ่าย ภาพ คง จะ เป็น เวลา ไม่ นาน ก่อน ที่ เรา จะ พบ สิ่ง มี ชีวิต ที่ มี เชาวน์ ปัญญา ทาง ชีววิทยา หรือ กลไก."
 progress.2.desc.evopred: "ชีวิต ชีวิตที่พัฒนาอย่างสง่างามอยู่ข้างนอกนั่น และพร้อมที่จะถูกทดลองเพื่อความก้าวหน้าของเรา เราได้รวบรวมตัวอย่างที่น่าสนใจทั้งหมดมาแล้ว[Owner.GetHomeWorldName]และไม่ได้กล้าที่จะหวังว่าเราจะมี เข้าถึงพันธุกรรมที่พิเศษมากขึ้น ดังนั้นเร็ว ๆ นี้หลังจากที่ออกจากบ้าน"
 progress.2.a:0 "เราอาจจะไม่ได้อยู่คนเดียวที่นี่"
 progress.2.a.assim:0 "เราจะเป็นหนึ่งเดียวกัน"
 progress.2.a.mech:0 "รับทราบ"
 progress.2.a.term:0 "เราจะพร้อมสําหรับพวกเขา"
 progress.2.a.serv:0 "เยี่ยม เตรียมขั้นตอนการปรับปรุงเบื้องต้น"
 progress.2.a.evopred: "ช่างเป็นข่าวดีจริงๆ!"
 progress.3.name:0 "อาณานิคมแห่งแรกของ [Root.Owner.GetSpeciesName]"
 progress.3.desc_end:0 "\n\nยานถูกแปลงเป็น§Y$building_colony_shelter$§!เพื่อทําหน้าที่เป็นสํานักงานใหญ่ และแกนเตาปฏิกรณ์ถูกถอดออกไป เพื่อทําหน้าที่เป็นแหล่งพลังงานชั่วคราวของอาณานิคม เต็นท์เต็มไปด้วยวัสดุก่อสร้าง, ด้านข้างหลุมหลบภัยก่อนหน้าได้ผุดขึ้นรอบ ๆ เรือของในฐานะชาวอาณานิคมขึ้น ทําเครื่องหมายครั้งแรก[Root.Owner.GetSpeciesName]เมืองในโลกของเอเลี่ยน"
 progress.3.desc_01:0 "เรือ อาณานิคม ของ เรา ค่อย ๆ ทอด ตัว ลง ที่ ปาก แม่น้ํา เดลต้า อัน กว้าง ใหญ่ บน ทวีป หนึ่ง บน§Y[Root.GetName]§!บริเวณ ที่ เหมาะ สม เช่น นี้ ซึ่ง มี ป่า ไม้ จะ เป็น ที่ หลบ ภัย และ เข้า ถึง วัสดุ ดิบ ได้ ง่าย.$progress.3.desc_end$"
 progress.3.desc_02:0 "เรืออาณานิคมของเราทําให้น้ําลงอย่างอ่อนโยนใน[Root.GetPlanetMoon]-ทะเลที่กว้างใหญ่§Y[Root.GetName]§!ใกล้ชายฝั่งของหมู่เกาะขนาดใหญ่ ลูก โซ่ เกาะ ที่ อุดม สมบูรณ์ นี้ ทํา ให้ มี สภาพ แวด ล้อม ที่ เหมาะ สม สําหรับ การ ปลูก พืช เป็น อาหาร.$progress.3.desc_end$"
 progress.3.desc_03:0 "เรือ ของ เรา ที่ อยู่ ใกล้ ๆ กับ โอเอซิส รอบ นอก ได้ ค่อย ๆ เข้า ไป ใกล้ ๆ เรือ อาณานิคม ของ เรา§Y[Root.GetName]§!ที่ตีนภูเขา ให้ที่พักจากลมทะเลทราย และเข้าถึงน้ําได้ง่าย$progress.3.desc_end$"
 progress.3.desc_04:0 "เรืออาณานิคมของเราพบที่โล่งอยู่ในป่าหนาแน่นของ§Y[Root.GetName]§!และทําให้ดาวเคราะห์ตก โดรนของเซทีได้ถูกใช้เพื่อป้องกัน นักล่าที่มีศักยภาพ$progress.3.desc_end$"
 progress.3.desc_05:0 "เรือ อาณานิคม ของ เรา ได้ ทอด ตัว ลง ที่ ยอด ของ เมซา ขนาด ใหญ่ แบน ใกล้ เส้น ศูนย์ สูตร ของ§Y[Root.GetName]§!แม่น้ํา ที่ ไหล ใน หุบเขา เบื้อง ล่าง ทํา ให้ สามารถ หา น้ํา จืด ได้ ง่าย.$progress.3.desc_end$"
 progress.3.desc_06:0 "เรืออาณานิคมของเราได้สัมผัสเบา ๆ บนกว้างว่างเปล่าขั้นตอนของ§Y[Root.GetName]§!อยู่ข้างหลังสันเขาขนาดใหญ่ ที่กําบังจากลมเย็น$progress.3.desc_end$"
 progress.3.desc_07:0 "เรืออาณานิคมของเราได้สัมผัสเบา ๆ ลงในหุบเขาหิมะปกคลุมบน§Y[Root.GetName]§!โซ่ ที่ อยู่ รอบ ๆ ภูเขา ให้ การ ปก ป้อง อย่าง เพียง พอ จาก ธาตุ ต่าง ๆ และ เป็น แหล่ง น้ํา ที่ ไว้ วางใจ ได้.$progress.3.desc_end$"
 progress.3.desc_10:0 "ยานอาณานิคมของเราทําให้ดาวเคราะห์ตก§Y[Root.GetName]§!หน่วย งาน หลาย พัน คน ได้ ออก มา จาก อ่าว สินค้า เพื่อ สร้าง จุด เริ่ม ต้น§Y$building_deployment_post$§!เพื่อขยายกิจการ ความ พยายาม ที่ จะ ทํา รายการ ทรัพยากร พื้น ผิว ที่ ฝาก ไว้ ยัง ดําเนิน ต่อ ไป และ สัตว์ ป่า ที่ ก้าวร้าว ใกล้ ๆ บริเวณ ที่ จอด รถ ก็ สงบ ลง.\n\nเราพร้อมที่จะเพิ่มปริมาณ[Root.Owner.GetSpeciesName]หน่วยใน[Root.GetPlanetMoon]อย่างที่ทรัพยากรอนุญาต อาณานิคมแรกของเราประสบความสําเร็จ"
 progress.3.desc_11_droids: "เรืออาณานิคมของเราได้สัมผัสลงบนพื้นผิวของ§Y[Root.GetName]§!เว็บไซต์ลงจอดได้รับเลือกสําหรับสภาพอากาศที่สงบ และทรัพยากรที่เข้าถึงได้\n\nยานถูกแปลงเป็น§Y$building_colony_shelter$§!เพื่อทําหน้าที่เป็นสํานักงานใหญ่ และแกนเตาปฏิกรณ์ถูกถอดออกไป เพื่อทําหน้าที่เป็นแหล่งพลังงานชั่วคราวของอาณานิคม ที่หลบภัยล่วงหน้าหลายร้อยลํา ได้ผุดขึ้นรอบเรือของเรือเป็นเรือดรอยด์ของเรา ทําเครื่องหมายครั้งแรก[Root.Owner.GetSpeciesName]เมืองในโลกของเอเลี่ยน"
 progress.3.desc_11_hive: "เรืออาณานิคมของเราได้สัมผัสลงบนพื้นผิวของ§Y[Root.GetName]§!เว็บไซต์ลงจอดได้รับเลือกสําหรับสภาพอากาศที่สงบ และทรัพยากรที่เข้าถึงได้\n\nยานถูกแปลงเป็น§Y$building_colony_shelter$§!และรอบๆ เปลือกหอยนั้น เราได้แผ่ขยายออกไป นี่เป็นสัญลักษณ์ของการเกิดรังใหม่ในโลกของเอเลี่ยน"
 progress.3.materialist:0 "ความก้าวหน้าทางวิทยาศาสตร์ จะผลักดันอาณานิคมของเราไปข้างหน้า"
 progress.3.spiritualist:0 "อาณานิคมของเราเป็นพันธสัญญา สําหรับวัตถุประสงค์ที่สูงขึ้นของเรา"
 progress.3.militarist:0 "ความแข็งแกร่งและการเฝ้าระวัง จะรักษาอนาคตของเรา"
 progress.3.pacifist:0 "อาณานิคมของเราจะรุ่งเรือง อย่างสงบและปรองดองกัน"
 progress.3.egalitarian:0 "เช่นเดียวกับในโลกของเราความเท่าเทียมกันจะรูปร่างอาณานิคมนี้"
 progress.3.xenophile:0 "ความหลากหลายของสิ่งมีชีวิต จะเสริมสร้างอาณานิคมของเรา"
 progress.3.xenophobe:0 "อาณานิคมของเราจะบริสุทธิ์และได้รับการคุ้มครอง"
 progress.3.authoritarian:0 "ระเบียบและการลําดับชั้น จะนําทางอาณานิคมของเรา"
 progress.3.gestalt_consciousness_hive:0 "อาณานิคมเติบโตเป็นหนึ่งกับรังผึ้ง"
 progress.3.gestalt_consciousness_machine:0 "อาณานิคมจะทําหน้าที่อย่างมีประสิทธิภาพ"
 progress.3.b.evopred: "งานเลี้ยงใหม่ทั้งหมดสําหรับตัวอย่าง"
 progress.4.name:0 "ภาพแรกของเอเลี่ยน"
 progress.4.desc_01:0 "ข่าวที่เราได้พบ สิ่งมีชีวิตต่างดาวที่ชาญฉลาด เป็นครั้งแรกที่ได้รับ นี้ยืนยันสิ่งที่เรามีผู้ต้องสงสัยยาว เราไม่ได้อยู่คนเดียวในกาแล็กซี่นี้ เอเลี่ยนรุ่นใหม่ที่เราเผชิญ เป็นตัวแทนของทั้งโอกาสและภัยคุกคาม เราต้องระวังตัว\n\nโดยเฉพาะอย่างยิ่งโหนดเหล่านี้มีระดับของเทคโนโลยีที่คล้ายกับของเราเอง แสดงให้เห็นว่าเราประสบความสําเร็จการบินอวกาศ ในช่วงเวลาใกล้เคียงกัน"
 progress.4.desc_02:0 "ข่าวที่เราได้พบ สิ่งมีชีวิตต่างดาวที่ฉลาดเป็นครั้งแรก[Root.GetName]ประชาชนของเราหลงไหลในสิ่งมีชีวิตเหล่านี้ และสื่อก็เต็มไปด้วย รายงานและการคาดเดาเกี่ยวกับวัฒนธรรมและสังคมของพวกเขา การ เปิด เผย ว่า เรา ไม่ ได้ อยู่ เพียง ลําพัง ใน กาแล็กซี นี้ ส่วน ใหญ่ แล้ว ได้ รับ การ ต้อนรับ ด้วย การ ฉลอง[Root.Capital.GetName].\n\nเช่นเดียวกับเรา เอเลี่ยนดูเหมือนจะเป็น มือใหม่ที่เป็นญาติกันบนเวทีกาแล็กซี่"
 progress.4.desc_03:0 "ข่าวที่เราได้พบ สิ่งมีชีวิตต่างดาวที่ฉลาด เป็นครั้งแรก ได้สั่นคลอนสังคมของเราสู่แก่น ภาพจากสัตว์ประหลาดพวกนี้ กําลังแพร่กระจายผ่านสื่อต่างๆ[Root.GetName]ประชาชนจํานวนมากถูกรบกวนด้วยความหวาดกลัว มี รายงาน การ จลาจล ใน หลาย เมือง[Root.Capital.GetName].\n\nผล งาน ชิ้น เอก ไม่ว่าพวกเขาจะมองสายพันธุ์ที่ดีของเรา ด้วยความกลัว เกลียดหรือความเฉยเมยเย็น เป็นการคาดเดาของทุกคน"
 progress.4.a:0 "มันเปลี่ยนแปลงทุกสิ่ง"
 progress.4.b:0 "นี่เป็นโอกาสสําคัญ"
 progress.4.c:0 "เราควรถือว่าแย่ที่สุด"
 progress.5.name: "การ พัฒนา อารยธรรม"
 progress.5.desc_01:1 "ข่าวที่เราได้ติดต่ออย่างเป็นทางการ กับอารยธรรมที่ชาญฉลาด แต่ยังไม่ได้พัฒนา ได้รับการรับความรู้สึกผสมโดยประชาชนของเรา นี้ยืนยันความเชื่อระยะยาวของเรา ว่ามีมนุษย์ต่างดาวไม่ข้ามอวกาศภายในกาแล็กซี่ของเรา\n\nแต่ละสายพันธุ์ที่เราเผชิญ เป็นตัวแทนของทั้งโอกาสและภัยคุกคาม เราต้องระวังตัว ระดับเทคโนโลยีของมนุษย์ต่างดาวเหล่านี้ โดยเฉพาะอย่างยิ่งต่ําตามมาตรฐานของเรา พวก เขา ยัง ไม่ บรรลุ ผล สําเร็จ ใน การ บิน อวกาศ. เราต้องตัดสินใจว่าจะมีส่วนร่วมพวกเขา ไปข้างหน้า"
 progress.5.desc_02:1 "ข่าวที่เราได้ทําการติดต่ออย่างเป็นทางการ กับอารยธรรมที่ชาญฉลาด แต่ยังไม่ได้พัฒนา แพร่กระจายเช่นไฟป่าทั่ว[Root.GetName]ประชาชนของเราหลงไหลในสิ่งมีชีวิตเหล่านี้ และสื่อก็เต็มไปด้วย รายงานและการคาดเดาเกี่ยวกับวัฒนธรรมและสังคมของพวกเขา การยืนยันว่ามีมนุษย์ต่างดาว ที่ไม่ได้เดินทางในอวกาศ ภายในกาแล็กซี่ของเรา ที่อาจจะไม่เคยพิจารณา[Root.Capital.GetName].\n\nเทคโนโลยีของเราล้ําหน้าพวกเขามาก พวกเขายังไม่ได้พัฒนาการบินอวกาศ แม้ จะ เป็น เช่น นี้ เรา ก็ ยัง คง เรียน รู้ ได้ มาก โดย การ ศึกษา."
 progress.5.desc_03:1 "ข่าวที่เราได้ติดต่ออย่างเป็นทางการ กับอารยธรรมที่ชาญฉลาด แต่ยังไม่ได้พัฒนา ได้สั่นคลอนสังคมของเราสู่แก่น ภาพจากสัตว์ประหลาดพวกนี้ กําลังแพร่กระจายผ่านสื่อต่างๆ[Root.GetName]ประชาชนจํานวนมากถูกรบกวนด้วยความหวาดกลัว มี รายงาน การ จลาจล ใน หลาย เมือง[Root.Capital.GetName].\n\nเอเลี่ยนพวกนี้อยู่ต่ํากว่า เทคโนโลยีของเรา พวกเขายังไม่ได้พัฒนาการบินอวกาศ เพื่อผลประโยชน์ทั้งหมดของเรา ขอให้พวกเราภาวนาว่าพวกมันจะไม่มีวัน"
 progress.5.b:0 "น่าหลงใหลจริงๆ"
 progress.5.c:0 "แน่นอน"
 progress.6.desc_01:0 "ข่าวที่เราได้พบ สิ่งมีชีวิตต่างดาวที่ชาญฉลาด เป็นครั้งแรกที่ได้รับ นี้ยืนยันสิ่งที่เรามีผู้ต้องสงสัยยาว เราไม่ได้อยู่คนเดียวในกาแล็กซี่นี้ เอเลี่ยนรุ่นใหม่ที่เราเผชิญ เป็นตัวแทนของทั้งโอกาสและภัยคุกคาม เราต้องระวังตัว\n\nโดยเฉพาะอย่างยิ่งโหนดนี้ดูเหมือนจะมีการ ทํางานในขั้นตอนกาแล็กซี่สําหรับบางเวลา - จักรวรรดิของพวกเขาน่าจะมีอายุหลายพันปี เราควรระวังเวลารับมือกับพวกมัน"
 progress.6.desc_02:0 "ข่าวที่เราได้พบ สิ่งมีชีวิตต่างดาวที่ฉลาดเป็นครั้งแรก[Root.GetName]ประชาชนของเราหลงไหลในสิ่งมีชีวิตเหล่านี้ และสื่อก็เต็มไปด้วย รายงานและการคาดเดาเกี่ยวกับวัฒนธรรมและสังคมของพวกเขา การ เปิด เผย ว่า เรา ไม่ ได้ อยู่ เพียง ลําพัง ใน กาแล็กซี นี้ ส่วน ใหญ่ แล้ว ได้ รับ การ ต้อนรับ ด้วย การ ฉลอง[Root.Capital.GetName].\n\nจักรวรรดิที่มนุษย์ต่างดาวเหล่านี้ก่อตั้งขึ้น ดูจะเก่ามาก และเทคโนโลยีของพวกเขา ไม่ มี ข้อ สงสัย เลย ว่า พวก เขา สามารถ สอน เรา ได้."
 progress.6.desc_03:0 "ข่าวที่เราได้พบ สิ่งมีชีวิตต่างดาวที่ฉลาด เป็นครั้งแรก ได้สั่นคลอนสังคมของเราสู่แก่น ภาพจากสัตว์ประหลาดพวกนี้ กําลังแพร่กระจายผ่านสื่อต่างๆ[Root.GetName]ประชาชนจํานวนมากถูกรบกวนด้วยความหวาดกลัว มี รายงาน การ จลาจล ใน หลาย เมือง[Root.Capital.GetName].\n\nความ ก้าว หน้า ทาง วิทยาศาสตร์ โชคดีสําหรับเรา ที่ชนิดนี้ ดูจะเป็นสายพันธุ์ที่เสื่อมโทรมและน่าสะพรึงกลัว"
 progress.6.b:0 "ปัญญาของพวกเขาจะต้องยิ่งใหญ่"
 progress.6.c:0 "อายุของพวกเขามากกว่า เวลาของ[Root.Species.GetName]มาแล้ว"
 progress.7.name:0 "ภารกิจสํารวจ"
 progress.7.desc:0 "เดอะ[Root.GetName]ยานวิทยาศาสตร์ลําแรกของเรา ได้เสร็จสิ้นการทดลองอวกาศ และตอนนี้ได้ดําเนินการอย่างเต็มที่ เจ้าหน้าที่วิทยาศาสตร์[Root.GetLeaderName]ได้ สันนิษฐาน ว่า เป็น คํา สั่ง และ เสนอ แนะ ให้ สํารวจ ระบบ บ้าน ของ เรา อย่าง ละเอียด.\n\nเราได้เข้าไปในรายละเอียดของภารกิจนี้แล้ว§Sบันทึกสถานการณ์§!เพื่ออ้างอิงในอนาคต"
 progress.7.a:0 "ดีมาก"
 progress.8.name:0 "ส่วนท้าย"
 progress.8.desc:0 "กับระบบบ้านของเราสํารวจอย่างเต็มที่ เวลามาสําหรับสายพันธุ์ของเราที่จะแพร่กระจายเกิน[Root.Capital.GetName]เราควรสํารวจระบบดาวข้างเคียงของเรา สําหรับโลกที่เหมาะสม\n\nก่อนหน้านี้ มีการเพิ่มข้อมูลเข้าไป§Sบันทึกสถานการณ์§!."
 progress.8.a:0 "ให้การค้นหาเริ่มต้น"
 # First contact with another empire - Payback origin version
 progress.9.name:0 "เอเลี่ยนตัวที่สอง"
 progress.9.desc.start:0 "เรารู้อยู่แล้วว่าเราไม่ได้อยู่คนเดียวในจักรวาล แต่เราพบการติดต่อครั้งที่สองของเรา กับอีกอารยธรรมที่ท่องอวกาศ"
 progress.9.desc.default:0 "เช่นเดียวกับเรา มนุษย์ต่างดาวดูเหมือนจะเป็น มือใหม่ที่เป็นญาติกันบนเวทีกาแล็กซี่ และระดับเทคโนโลยีของพวกเขา"
 progress.9.desc.preftl:0 "การพัฒนาเทคโนโลยีของเรา ห่างไกลจากเอเลี่ยนเหล่านี้มาก พวกมันยังไม่กลายเป็นอวกาศ"
 progress.9.desc.fallen:0 "อารยธรรมที่มนุษย์ต่างดาวเหล่านี้สร้างขึ้น ดูจะเก่ามาก และเทคโนโลยีของพวกเขาอยู่ห่างไกลกว่าของเรา"
 progress.9.desc.msi:0 "เรารู้ว่าเราต้องตามหาอดีตเจ้านายของเราอีกครั้ง เราแค่ไม่ได้คาดหวังว่าจะเจอพวกเขาอีกครั้งในเร็วๆนี้"
 progress.9.desc.friendly_friendly:0 "ความตั้งใจของพวกเขาดูอ่อนแอกว่าอดีตนายจ้างของเรา บางทีพวกเราแค่โชคร้าย กับการเผชิญหน้ากับเอเลี่ยนครั้งแรก ที่ จริง ต้อง มี บาง สิ่ง ที่ ดี ใน กาแล็กซี."
 progress.9.desc.friendly_mean:0 "พวกเขาแตกต่างจากอดีตนายจ้างของเรามาก และยังเหมือนกันในพฤติกรรมที่น่าตําหนิของพวกเขา มันทําให้เราสงสัยว่าบางที อารยธรรมอื่น ๆ ทั้งหมดในกาแล็กซี่ มีปริศนากับความตั้งใจที่ไม่ดีและความตั้งใจที่ไม่ดี ในแง่ของมิตรภาพ เราอาจจะอยู่คนเดียว"
 progress.9.desc.mean_friendly:0 "พวกเขาแตกต่างจากเรามาก แต่พวกเขาช่างน่าหลงใหล เราสงสัยว่าบางทีนี่อาจเป็นเครื่องหมาย ว่ามันมีโหนดที่ดีออกมี อาจมีความเมตตาในหมู่ดาว หลังจากที่ทั้งหมด"
 progress.9.desc.mean_mean:0 "จริง ๆ แล้ว ไม่ มี การ แสดง ความ คิด เห็น ที่ ดี ใน เอกภพ. เป็น เรื่อง โง่ เขลา ที่ เรา จะ คิด อย่าง อื่น!"
 progress.9.desc.msi2:0 "เรา จะ มี วัน หลุด พ้น จาก อํานาจ ของ พวก เขา ไหม?"

 progress.4.desc_04:0 "$progress.4.gestaltintro$\n\n$progress.4.gestaltnormal$"
 progress.4.d:0 "พวกเขา... แตกต่าง"
 progress.4.e:0 "ข้อมูลนี้จะต้องถูกวิเคราะห์"
 progress.4.f:0 "พรี..."
 progress.4.g:0 "กําลังรวบรวมข้อมูล"
 progress.5.desc_04:0 "$progress.4.gestaltintro$\n\n$progress.4.gestaltprimitives$"
 progress.6.desc_04:0 "$progress.4.gestaltintro$\n\n$progress.4.gestaltfallen$"
 progress.4.gestaltintro:0 "แบบจําลองทางทฤษฎีของเรา ได้เสนอมานานแล้วถึง การดํารงอยู่ของอารยธรรมอื่น ๆ ที่ชาญฉลาดในกาแล็กซี่ของเรา ทฤษฎีนี้ได้รับการยืนยันแล้ว"
 progress.4.gestaltnormal:0 "หน่วยงานทางการเมืองของมนุษย์ต่างดาวที่เราได้พบ มีระดับของเทคโนโลยีที่คล้ายกับของเราเอง แสดงให้เห็นว่าเราประสบความสําเร็จในการบินอวกาศ ในช่วงเวลาใกล้เคียงกัน"
 progress.4.gestaltprimitives:1 "องค์กรการเมืองของมนุษย์ต่างดาวที่เราได้พบ ยังไม่ได้คิดค้นการบินอวกาศ เรา ต้อง ตัดสิน ใจ ว่า จะ รับมือ กับ สิ่ง เหล่า นี้ ได้ ดี ที่ สุด อย่าง ไร[GetPreFTLLowerPlural]."
 progress.4.gestaltfallen:0 "หน่วยงานทางการเมืองของมนุษย์ต่างดาวที่เราได้พบ ดูเหมือนว่าจะเป็นเทคโนโลยีเก่าที่ครอบครอง ขอเตือนไว้ก่อน"

 #############################
 # Pirate Events
 #############################
 pirate.1.name:0 "การ กําเนิด ของ อวกาศ"
 pirate.1.desc_01:2 "ในขณะที่การค้าระหว่างดวงดาว ระหว่างระบบของเรายังคงเติบโต, กลุ่มของอาชญากรที่ ขาดความเชื่อจาก[Root.Capital.GetName]ได้เปลี่ยนยานพลเรือนเป็นอาวุธสงครามอย่างผิดกฎหมาย พวกนอกรีตพวกนี้เริ่มเรียกตัวเองว่า\"§S[pirate_band.GetName]§!\"และต้องรับผิดชอบการโจมตีหลายครั้ง ต่อเส้นทางการค้าที่เปราะบางของเราใน§S[pirate_system.GetName]§!ระบบ\n\nกิจกรรม ที่ ดู หมิ่น ของ พวก เขา ต้อง ไม่ ปล่อย ให้ ดําเนิน ต่อ ไป!"
 pirate.1.desc_02:2 "หน่วยสืบราชการลับของกองทัพเรือได้รายงานการโจมตีหลายครั้ง ของการจัดส่งพลเรือนในพื้นที่ของเรา ผู้ กระทํา ผิด ดู เหมือน เป็น พวก ที่ หลบ หนี และ เป็น พวก กบฏ อื่น ๆ จาก[Root.Capital.GetName].\n\nอาชญากรเหล่านี้ได้รวมกันเป็นยานอวกาศที่เปลี่ยนจากเรือพลเรือนที่มีการแก้ไขอย่างหนัก และกําลังเป็นเหยื่อบนเส้นทางการค้าที่อ่อนแอของเราใน§H[pirate_system.GetName]§!ระบบ ตอนนี้พวกเขาเรียกตัวเองว่า\"§S[pirate_band.GetName]§!\"แม้ว่าจะหยาบ แต่ภาชนะของพวกเขาเป็นภัยคุกคามที่ชัดเจนที่ไม่สามารถละเลย"
 pirate.1.desc_03:2 "องค์ ประกอบ บาง อย่าง ที่ ไร้ เหตุ ผล และ ผิด กฎหมาย ของ สังคม เรา ได้ ทิ้ง ไว้[Root.Capital.GetName]เพื่อแสวงหาชีวิตของพวกนอกกฎหมาย ในขอบเขตของอวกาศ ใน การ แสดง ความ คิด สร้าง สรรค์ ที่ น่า ประหลาด พวก เขา ได้ ปรับ ตัว และ ทํา ให้ เรือ อวกาศ พลเรือน จํานวน มาก เป็น อาวุธ.\n\nเส้นทางการค้าที่เปราะบางของเรา§H[pirate_system.GetName]§!ตอนนี้ระบบกําลังถูกโจมตีโดยดาวฟลีทที่สดใหม่นี้ ซึ่งระบุตัวเองเพียงเป็น\"§S[pirate_band.GetName]§!\"ต้องการการตอบสนองทันที"
 pirate.1.desc_04:2 "รายงานการแจ้งเตือนมาจาก พ่อค้าบางคนของเรา ตั้งแต่เราพัฒนาการท่องอวกาศ กลุ่มที่โหดร้ายบน[Root.Capital.GetName]ได้เดินทางจากโลกของเรา ด้วยจํานวนที่เพิ่มขึ้น กระตุ้นวิถีที่สงบสุขของสังคมของเรา\n\nบุคคลที่หลงผิดเหล่านี้เรียกตัวเองว่า\"§S[pirate_band.GetName]§!\"และเปลี่ยนเรือพลเรือนหลายลําเป็นเรือรบ ใช้ชีวิตเป็นโจรสลัด ตอนนี้พวกเขาเป็นเหยื่อบนเส้นทางการค้าที่อ่อนแอของเราใน§H[pirate_system.GetName]§!ระบบและการโจมตีของพวกมัน ส่งผลให้มีผู้เสียชีวิตจํานวนมาก อาจ จําเป็น ต้อง ใช้ มาตรการ ที่ รุนแรง เพื่อ ปก ป้อง ประชาชน ของ เรา."
 pirate.1.desc_05:2 "พวก กบฏ และ พวก ที่ ไม่ ยอม อยู่ ใต้ อํานาจ[Root.Capital.GetName]ได้ก่อตั้งกองยานอวกาศนอกกฎหมาย โดยปรับเปลี่ยนเรือพลเรือนหลายลําเป็นเรือรบ เรียกตัวเองว่า\"§S[pirate_band.GetName]§!\"ผู้ก่อการร้ายเหล่านี้กําลังแพร่ความโกลาหลและความกลัว ตามเส้นทางการค้าที่เปราะบางของเราใน§H[pirate_system.GetName]§!ระบบ\n\nชีวิตพวกเขาถูกปรับให้สูญเสีย จากอาชญากรรมร้ายแรงของพวกเขา สั่งซื้อจะต้องได้รับการฟื้นฟูในค่าใช้จ่ายใด ๆ"
 pirate.1.desc_06:2 "ปัจจัย ต่าง ๆ ที่ เกี่ยว ข้อง กัน มัก จะ พา กัน มา ยัง ตลาด ใหม่ เสมอ โดย พยายาม จะ ลด กําไร ให้ กับ ค่า ใช้ จ่าย ของ คน เหล่า นั้น ที่ ทํา ธุรกิจ อย่าง ซื่อ สัตย์ ไม่ ได้ พิสูจน์ ว่า ต่าง ออก ไป. องค์กรอาชญากรรมใต้ดินหลายแห่ง[Root.Capital.GetName]ได้ขยายการดําเนินงานของพวกเขาไปยังอวกาศ โดยการแปลงกองเรือพลเรือน เป็นเรือรบ\n\nพวกนอกกฎหมายเรียกตัวเองว่า\"§S[pirate_band.GetName]§!\"และเรือของพวกเขาได้เริ่มคุกคามเส้นทางการค้าที่เปราะบางของเราใน§H[pirate_system.GetName]§!ระบบ เราควรรีบลงมือ ก่อนที่สถานการณ์จะสงบ"
 pirate.1.desc_07:2 "ขณะ ที่ การ เดิน ทาง โดย พลเรือน ใน อวกาศ กลาย เป็น สถาน ที่ ที่ พบ เห็น ได้ ทั่ว ไป องค์กร อาชญากร ที่ ทรง พลัง หลาย องค์การ ก็ เริ่ม ดําเนิน การ[Root.Capital.GetName]รู้สึกถึงโอกาสที่จะขยายกิจการ พวก เขา ได้ เปลี่ยน เรือ บรรทุก ของ พลเรือน จํานวน หนึ่ง ให้ เป็น เรือ รบ ที่ มี การ ปรับ ปรุง ใหม่ ซึ่ง พวก เขา บุก เข้า ไป ใน ท่า เรือ ของ พลเรือน เพื่อ จะ ได้ ของ ที่ ปล้น ได้.\n\nเรารู้ว่าพวกเขาเรียกตัวเองว่า\"§S[pirate_band.GetName]§!\"และพวกเขาได้หลงหลายครั้งกับเส้นทางการค้าที่เปราะบางของเราใน§H[pirate_system.GetName]§!ระบบ ความ พยายาม ทุก อย่าง ต้อง ทํา เพื่อ นํา อาชญากร เหล่า นี้ ไป สู่ ความ ยุติธรรม."
 pirate.2.a:0 "ผู้ศรัทธาจะมีชัย"
 pirate.2.b:0 "แจ้งเตือนคําสั่งทั้งหมด ปล่อยยานออกไป"
 pirate.2.c:0 "พวกไม่นิยมเหล่านี้จะถูกจัดการ"
 pirate.2.d:0 "เราควรดีกว่านี้"
 pirate.2.e:0 "โจรสลัด เราไม่ต้องการไอ้สวะนั่น"
 pirate.2.f:0 "การค้าจะต้องไหล"
 pirate.2.g:1 "พวกเขาจะถูกตัดสิน"
 pirate.2.h:0 "พวกเขาต้องถูกนํากลับมาอยู่ในคอก"
 pirate.2.i:0 "โจรสลัด"

 pirate.5.name:0 "สลัดอวกาศ"
 pirate.5.desc:0 "หลอดเลือดที่เราพบในระบบบางระบบ สามารถรับและส่ง โปรโตคอลสื่อสารมาตรฐานได้อย่างแน่นอน\n\nตัวบ่งชี้ทางภาพ ชี้ไปที่วัฒนธรรมของพวกเขา ที่ส่วนใหญ่มาจากอวกาศ และบางกลุ่มที่สังเกตเห็น\n\nน่า เสียดาย ลูก เรือ ของ พวก เขา ไม่ สนใจ คํา บรรยาย สาธารณะ เลย. สิ่งเล็ก ๆ น้อย ๆ ที่เราได้สามารถที่จะเก็บรวบรวม จากการสกัดกั้นการสื่อสารอินทรา-ฟลายเวท แสดงให้เห็นว่าพวกเขาส่วนใหญ่ เรือดําน้ําเกี่ยวกับความโหดร้าย"
 pirate.5.a:0 "ง่ายมาก"

 pirate.10.name:0 "รังโจรสลัด"
 pirate.10.desc.nobirth:0 "เดอะ[Root.GetName]รายงานที่กองเรือได้พบกับการปรากฏตัวของโจรสลัดที่สําคัญใน[From.GetName]ระบบ\n\nหากพิจารณาจากการตรวจสอบเบื้องต้น ของเรือขนาดใหญ่และสถานีที่เก็บไว้เป็นท่าเรือทางประวัติศาสตร์ เป็น ไป ได้ ว่า ได้ มี การ ดําเนิน การ โดย ไม่ มี การ ควบคุม ตั้ง แต่ สมัย โบราณ ไม่ ว่า จะ เป็น การ วาง ไข่ ครั้ง แรก ของ พวก โจร สลัด เหล่า นี้."
 pirate.10.desc.birth:0 "เดอะ[Root.GetName]รายงานว่ากองเรือได้ข้ามอ่าวโจรสลัด[From.GetName]ระบบ นี่ คง เป็น แหล่ง ที่ มา ของ อิทธิพล ที่ เสื่อม ทราม ซึ่ง ทํา ให้ ส่วน ประกอบ บาง อย่าง ของ ผู้ ที่ ถูก ขับ ออก จาก ศาสนา และ อาชญากร[Root.Owner.GetName]ให้กลายเป็นนักฟุตบอลอิสระ\n\nเมื่อ ผ่าน ไป โดย เรือ ที่ มี ขนาด ใหญ่ และ เก่า แก่ อย่าง เห็น ได้ ชัด ของ พวก เขา โจร สลัด เหล่า นี้ คง จะ เป็น ซาก ปรัก หัก พัง ของ สมัย โบราณ บาง คน ซึ่ง อาจ เป็น ลูก หลาน ของ พวก เอกชน ใน สงคราม โบราณ ได้ เปลี่ยน เป็น โจรสลัด หลัง จาก การ ทําลาย ศัตรู และ พันธมิตร ร่วม กัน."
 pirate.10.a.nobirth:0 "การยึดเหนี่ยวเป็นภัยคุกคามที่ไม่แยแส"
 pirate.10.a.birth:0 "เราโจมตีที่หัวใจของความเกลียดชังนี้"

 pirate.15.name:0 "รังโจรสลัดถูกทำลาย"
 pirate.15.desc:2 "เดอะ[killer_fleet.GetName]รายงานว่า โจรสลัดเวลาวอร์นใน[killer_fleet.solar_system.GetName]ระบบถูกทําลายแล้ว บันทึกสําหรับสตราเกอร์ใด ๆ ในระบบใกล้เคียง การก่อการร้ายกาแล็กซี่เป็นสิ่งที่ที่ผ่านมา ... สําหรับตอนนี้\n\nเราสามารถที่จะกู้ของสะสมที่สะสมมากมาย ของพวกหัวขโมยที่มีปัญหา จากห้องอันแข็งแกร่งของพวกเขา ขุมทรัพย์ที่เราย้ายไป"
 pirate.15.desc2:1 "เดอะ[killer_fleet.GetName]รายงานว่า โจรสลัดเวลาวอร์นใน[killer_fleet.solar_system.GetName]ระบบถูกทําลายแล้ว บันทึกสําหรับสตราเกอร์ใด ๆ ในระบบใกล้เคียง การก่อการร้ายกาแล็กซี่เป็นสิ่งที่ที่ผ่านมา ... สําหรับตอนนี้\n\nเราสามารถที่จะพบการสะสมมากมาย ของการปล้นที่มีปัญหาจากห้องอันแข็งแกร่งของพวกเขา รวมถึงข้อมูลโบราณ"

 pirate.25.name:0 "สถานีอวกาศของโจรสลัดถูกโจมตี"
 pirate.25.desc:0 "เดอะ[pirate_slayers.GetName]ได้ทําลายสถานีโจรสลัดใน[pirate_slayers.GetStarName]ระบบและกู้โมดูลห้องที่แข็งแกร่ง"

 #############################
 # Pretender Events
 #############################
 pretender.1.name:0 "[From.GetRegnalName]ความ ตาย ไม่ มี"
 pretender.1.desc_01:0 "[From.GetRegnalName]ผ่าน ไป เจ็ด วัน แห่ง การ ไว้ทุกข์ ได้ ประกาศ ออก มา[Root.Capital.GetName]แต่โชคร้ายที่ไม่มีผู้สืบทอด และสองคําอ้างแยก ได้ทําบนพระที่นั่ง\n\nคู่แข่งที่แข็งแกร่งได้รับการสวมมงกุฎ[Root.GetRulerTitle]ภายใต้ชื่อ[Root.GetRulerName]แต่เรื่องนี้ไม่ได้ช่วยแก้ปัญหา"
 pretender.1.desc_02:1 "[From.GetRegnalName]ได้ข้ามดินแดนแห่งการดํารงอยู่นี้ และเริ่มต้นการเดินทางไปยังต่อไป น่า เสียดาย ที่ พระ วิญญาณ ยัง ไม่ เห็น ว่า เหมาะ ที่ จะ อวย พร เรา ด้วย หมาย สําคัญ และ การ อัศจรรย์ ที่ เพียง พอ เพื่อ ระบุ ตัว ผู้ สืบ ตําแหน่ง ได้ อย่าง แน่นอน.\n\nหลังจากทะเลาะกัน[Root.GetRulerName]ได้รับมงกุฎเป็นต่อไป[Root.GetRulerTitle]แต่ไม่ใช่โดยไม่มีการต่อต้าน ผู้หลอกลวงจากชนชั้นสูงของเหล่านักบวช กําลังพยายามที่จะสนับสนุน"
 pretender.1.desc_03:1 "[From.GetRegnalName]เสียชีวิตโดยไร้ทายาท, ทิ้งรัฐบาลของเราไว้ในความแตกแยก[Root.GetRulerName]ได้รับการตั้งชื่อผู้สืบทอด หลังจากที่ได้จัดการรวบรวมการสนับสนุนเพียงพอในหมู่ทหาร[Root.Capital.GetName]แต่สถานการณ์ยังคงอ่อนแอและเสแสร้ง พยายามรวบรวมการสนับสนุนพอที่จะท้าทาย[Root.GetRulerTitle]กฎ"
 pretender.1.desc_04:1 "เนื้อของ[From.GetRegnalName]มันล้มเหลว และอัลกอริทึมของเรา ก็ไม่สามารถระบุ เพื่อรักษาประสิทธิภาพ[Root.GetRulerTitle]ได้รับเลือกอย่างสุ่ม และตอนนี้มันตกอยู่บน[Root.GetRulerName]เพื่อตีความความไม่เสมอภาคของคอมพิวเตอร์หลัก\n\nอย่าง ไร ก็ ตาม ความ สงสัย ได้ ถูก ยก ขึ้น มา และ มี บาง คน ที่ เห็น ว่า ตัว เอง มี คุณวุฒิ ดี กว่า ที่ จะ ทํา ให้ เกียรติ นี้ ได้ รับ."
 pretender.1.desc_05:1 "[From.GetRegnalName]ตายไปแล้ว และทั้งหมด[Root.GetName]กําลังไว้ทุกข์ น่า เศร้า ไม่ มี ทายาท ที่ ได้ รับ การ ประกาศ แล้ว และ นี่ ทํา ให้ เกิด การ โต้ เถียง กัน ใน หมู่ ชน ชั้น สูง.\n\n[Root.GetRulerName]ได้สวมมงกุฎแล้ว[Root.Capital.GetName]แต่คนเสแสร้งอ้างความสัมพันธ์ห่างไกล[From.GetRegnalName]ได้ท้าทายสิ่งใหม่[Root.GetRulerTitle]."
 pretender.1.tooltip:1 "หน่วยงานปลอมได้เกิดขึ้น"

