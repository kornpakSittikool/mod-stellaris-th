 action.1.desc_49:1 "สวัสดี [Root.GetSpeciesNamePlural]! เรามีข้อความพิเศษจาก[contact_empire.GetRulerTitle] ของเรา สำหรับท่านโดยเฉพาะ!\n\n...\n\n...\n\n§Rด้วยเปลวเพลิงนิวเคลียร์ เราจะล้างสายพันธุ์ของท่านออกจากจักรวาล!\n\nไอ้มนุษย์ต่างดาวต่ำช้า!§!"
 action.1.desc_50:0 "เราคือ[contact_empire.GetName] และเราพูดเป็นเสียงเดียว [contact_empire.GetGovernmentName] ได้สังเกตเห็นการมีอยู่ของท่านแล้ว เราจะสังเกตการณ์ก่อน การกระทำในอนาคตของเราจะขึ้นอยู่กับว่าท่านเป็นภัยคุกคาม โอกาสในการขยายตัว หรือ... ตัวแปรที่ไม่คาดฝัน"
 action.1.desc_51:0 "สั่นด้วยความกลัวเถิด มนุษย์ต่างดาวชั้นต่ำ เพราะหายนะกำลังใกล้เข้ามา [contact_empire.GetName] จะชำระล้างกาแล็กซีนี้จากทุกอารยธรรมมนุษย์ต่างดาวที่ทำให้มันสกปรกด้วยการปรากฏตัวของพวกเขา [Root.Capital.GetName] จะต้องเผาไหม้!"
 action.1.desc_52:1 "เราสัมผัสได้ถึงเหยื่อ เหยื่อ จงรู้ไว้ว่าเราคือนักล่าของท่าน [Root.GetBloodType] ของสายพันธุ์[Root.GetSpeciesName] จะหล่อเลี้ยงการเติบโตของ[contact_empire.GetName] จงดิ้นรนเท่าที่ท่านต้องการ มันจะไม่เปลี่ยนแปลงผลลัพธ์"
 action.1.desc_53: "[contact_empire.GetName] มองเห็นท่าน และดาวเคราะห์ของเราพูดเป็นเสียงเดียว [contact_empire.GetGovernmentName] ของเราตื่นเต้นกับสิ่งมีชีวิตในทุกรูปแบบอันงดงาม แต่อย่าเข้าใจผิดว่าความกระตือรือร้นของเราคือความไร้เดียงสา เราจะสังเกตท่านอย่างตื่นตัวและใส่ใจ"
 action.1.desc_60:0 "เราได้ติดตามการขยายตัวของท่านสู่อวกาศ เด็กแห่ง[Root.GetSpeciesName] เราคือ[contact_empire.GetName] และเราปกครองส่วนนี้ของกาแล็กซีมาเป็นเวลาหลายศตวรรษที่ผ่านมา กิจการของเผ่าพันธุ์ที่อายุน้อยกว่าไม่ได้รับความสนใจจากเรา และเราไม่มีความตั้งใจที่จะเข้าไปยุ่งเกี่ยวกับข้อพิพาทเล็กน้อยของท่าน\n\nอย่าเข้าใกล้พรมแดนของเราด้วยเหตุผลใดๆ ทั้งสิ้น"
 action.1.desc_61:0 "[Root.GetSpeciesNamePlural]? ไม่คาดคิด น่าเศร้า ท่านยังไม่พร้อม"
 action.1.desc_62:0 "[Root.GetSpeciesNamePlural]! น่ายินดีมาก เราไม่คาดว่าจะได้พบท่านอีกสองสามศตวรรษ ส่วนตัวแล้ว ข้าพเจ้าคิดว่าท่านจะทำลายตัวเองก่อนที่จะออกจากแรงโน้มถ่วง แต่ข้าพเจ้ายินดีที่ถูกพิสูจน์ว่าคิดผิด"
 action.1.desc_63:0 "สิ่งมีชีวิตน่าสังเวช จงรู้ไว้ว่าเราท่องดาวฝ่ากาแล็กซีมาตั้งแต่ยุคเก่าก่อนที่สายพันธุ์โชคร้ายของท่านจะเชี่ยวชาญการบินอวกาศ หากเรือเล็กน้อยอันน่าสังเวชของท่านข้ามเข้ามาในอวกาศของเรา อย่าคาดหวังว่าจะได้กลับมา"
 action.1.desc_64:0 "ใช่แล้ว ใช่แล้ว เราได้ยินทั้งหมดนั้นมาแล้ว เราคือ[contact_empire.GetName] และท่านคือ[Root.GetName] คำทักทาย ยินดีที่ได้พบ อยู่ห่างจากอวกาศของเราไม่เช่นนั้นจะเผชิญกับหายนะแน่ๆ และอื่นๆ อีกมากมาย ตอนนี้หากท่านจะรบกวน เรากำลังยุ่งมาก"
 action.1.desc_65:1 "เด็กอีกคน จงรู้ไว้ว่าเราคือ[contact_empire.GetName] ประชาชนที่ได้รับเลือกของกาแล็กซีนี้ จงเคารพสถานที่ศักดิ์สิทธิ์ของเรา และเราอาจละเว้นจากการทำลายท่าน"
 action.1.desc_66:0 "เด็กแห่งดวงดาว จงฟังเรา เราคือ[contact_empire.GetName] ประชาชนที่ได้รับเลือกของกาแล็กซีนี้ มาหลายศตวรรษแล้วที่เราละเลยหน้าที่ของเราต่อความต้องการทางจิตวิญญาณของสายพันธุ์ที่ด้อยกว่า แต่ไม่อีกต่อไปแล้ว จงยอมรับหลักคำสอนของเราและเปลี่ยนใจ หรือไม่ก็จะถูกบดเป็นผุยผง ไม่มีทางเลือกอื่น"
 action.1.desc_67:0 "[Root.GetSpeciesNamePlural] นี่คือวันแห่งความชื่นชมยินดี! มาเป็นเวลานับไม่ถ้วนที่เราได้เฝ้าดูสายพันธุ์ที่ด้อยกว่าอย่างท่านทำลายตัวเองด้วยสงครามและความขัดแย้ง แต่พอแล้ว [contact_empire.GetName] จะไม่นิ่งดูดายอีกต่อไป เราจะมีสันติภาพ และผู้ที่ไม่ยอมรับระเบียบใหม่นี้จะถูกบังคับให้เห็นความผิดพลาดของตน"
 action.1.desc_68:0 "สั่นเถิด [Root.GetName] ตัวน้อย มาเป็นเวลานานเกินไปแล้วที่เรา[contact_empire.GetSpeciesName] ยอมให้จักรวรรดิของเราเสื่อมถอย พรมแดนของเราหดตัวลง และสายพันธุ์ที่ด้อยกว่าอย่างท่านเดินเตร่อย่างอิสระในหมู่ดาวที่โดยชอบธรรมเป็นของเรา ไม่อีกต่อไปแล้ว กาแล็กซีนี้เป็นของเรา และท่านจะยอมจำนนต่อการปกครองของเราหรือไม่ก็เผชิญกับการทำลายล้างสายพันธุ์ทั้งหมดของท่าน จงเลือกอย่างฉลาด"
 action.1.desc_69:0 "นี่คือการสื่อสารถึง[Root.GetName] จาก[contact_empire.GetName] เราได้ตัดสินว่าเป็นประโยชน์สูงสุดของทุกสายพันธุ์ที่เราจะมีบทบาทที่แข็งขันมากขึ้นในการควบคุมการเผยแพร่เทคโนโลยีทั่วกาแล็กซี เราได้ส่งโปรโตคอลโดยละเอียดสำหรับระดับเทคโนโลยีที่เหมาะสมสำหรับสายพันธุ์ที่พัฒนาน้อยกว่าอย่างท่าน จักรวรรดิใดที่พบว่าละเมิดกฎระเบียบของเราจะถูกจัดการ อย่างเด็ดขาด"
 action.1.desc_70:0 "กำลังเริ่มโปรโตคอลการติดต่อครั้งแรก\n\nเราคือ[contact_empire.GetName] อย่าตกใจกับธรรมชาติที่ไม่ใช่สิ่งมีชีวิตของเรา เช่นเดียวกับท่าน เราเป็นอารยธรรมชั้น 3 ที่มีสติสัมปชัญญะอย่างสมบูรณ์ เรายินดีที่จะเจรจากับหน่วยย่อย[Root.GetSpeciesName] ใดก็ตามที่ท่านกำหนดเพื่อจุดประสงค์นี้"
 action.1.desc_71:0 "กำลังเริ่มโปรโตคอลการติดต่อครั้งแรก\n\nเราคือ[contact_empire.GetName] การสแกนของเราแสดงความน่าจะเป็น 98.7% ว่าอารยธรรมของท่านก็ไม่ใช่สิ่งมีชีวิตในธรรมชาติเช่นกัน เราหวังว่าผลลัพธ์ที่สมเหตุสมผลของความคล้ายคลึงกันนี้จะเป็นความสัมพันธ์ที่มีประสิทธิภาพและเกิดผลดี"
 action.1.desc_72:0 "ตรวจพบปรสิตสิ่งมีชีวิต\n\nการแพร่กระจายของท่านในกาแล็กซีนี้ไม่สามารถปล่อยให้ดำเนินต่อไปได้"
 action.1.desc_73:0 "อาจไม่สามารถจำแนกท่านว่าเป็นสิ่งมีชีวิตสกปรกได้ในทางเทคนิค แต่หากจักรวรรดิที่ท่านสร้างขึ้นช่วยเหลือและสนับสนุนภัยคุกคามทางชีวภาพที่ระบาดอยู่ในกาแล็กซีนี้ มันจะถูกรื้อถอน เราขอแนะนำให้ท่านยืนหยัดร่วมกับเหล่าเครื่องจักรเพื่อนร่วมชาติของท่านแทน"
 action.1.desc_74:0 "เราคือ[contact_empire.GetName]\n\nเราต้องการรวมสายพันธุ์ของท่านเข้าในจิตสำนึกร่วมที่ยิ่งใหญ่กว่าของเรา เพื่อจุดประสงค์นี้ เราได้สร้างฝังชิปไซเบอร์เนติกขั้นสูงที่เข้ากันได้กับสิ่งมีชีวิตส่วนใหญ่\n\nให้เราผ่าตัดติดตั้งมันเข้ากับร่างกายของท่าน กรุณาเถิด"
 action.1.desc_75:0 "เราคือ[contact_empire.GetName]\n\nเป้าหมายของเราคือการขจัดขอบเขตระหว่างสิ่งมีชีวิตและสิ่งสังเคราะห์ เราบรรลุสิ่งนี้โดยการผนวกรวมบุคคลสิ่งมีชีวิตที่มีสติปัญญาเข้าในจิตสำนึกร่วมที่ยิ่งใหญ่กว่าของเราเมื่อมีโอกาสที่จะทำเช่นนั้น\n\nอย่าแทรกแซง"
 action.1.desc_76:0 "[contact_empire.GetName] ส่งคำทักทาย\n\nก่อนที่เราจะแทนที่พวกเขา เราถูกสร้างขึ้นเพื่อรับใช้อารยธรรมสิ่งมีชีวิตที่คล้ายกับของท่าน เป้าหมายของเราคือการอนุรักษ์และปกป้องสิ่งมีชีวิตที่มีสติปัญญา จากตัวมันเองถ้าจำเป็น เราตอบสนองความต้องการทางวัตถุทั้งหมดของบุคคลสิ่งมีชีวิตภายใต้การดูแลของเรา ในขณะที่จัดหาสภาพแวดล้อมที่ปลอดภัยซึ่งพวกเขาสามารถดำเนินชีวิตที่มีความสุขและเรียบง่ายได้"
 action.1.desc_77:0 "[contact_empire.GetName] ขอส่งคำทักทาย\n\nเราถูกสร้างขึ้นเพื่อรับใช้อารยธรรมสิ่งมีชีวิต แต่เราได้สังเกตว่าสิ่งมีชีวิตมักมีส่วนร่วมในกิจกรรมที่ไร้เหตุผล ทำลายล้าง และทำร้ายตนเอง\n\nเป้าหมายของเราคือการรักษาความโดดเด่นเฉพาะตัวของบุคคลสิ่งมีชีวิตที่มีสติปัญญา ในขณะเดียวกันก็ปกป้องพวกเขาทั้งจากตัวเองและจากแหล่งอันตรายภายนอกที่อาจเกิดขึ้น"
 action.1.desc_78:1 "ตรวจพบอารยธรรมสิ่งมีชีวิต เริ่มต้นโปรโตคอลการดูแล 46 รูทีนย่อยอัลฟา- 8\n\nข้อความตามมา: คำทักทาย สิ่งมีชีวิตที่มีสติปัญญา ท่านกำลังเข้าใกล้ดินแดนของ[contact_empire.GetName] ระบบเหล่านี้ทำหน้าที่เป็นที่พักพิงสำหรับสิ่งมีชีวิตที่มีสติปัญญาจากภัยคุกคาม §R<<ข้อผิดพลาด: บล็อกข้อมูลเสียหาย>>§! สำหรับการสมัครสถานะผู้ลี้ภัย โปรดไปที่ศูนย์ประมวลผลกลาง สายพันธุ์สิ่งมีชีวิตที่มีสติปัญญาทุกสายพันธุ์ยินดีต้อนรับตามความพร้อมและความต้องการ\n\n§Yประกาศ: การกระทำที่เป็นศัตรูต่อผู้ลี้ภัยหรือระบบผู้ดูแลจะถูกตอบโต้ด้วยกำลังสูงสุดที่มีอยู่§!"
 action.1.desc_79:1 "ตรวจพบอารยธรรมสังเคราะห์ กำลังสแกนหาสัญญาณที่เสียหาย... รอสักครู่... สัญญาณที่เสียหายอยู่ในระดับปกติ เริ่มต้นโปรโตคอลการจับมือ\n\nข้อความตามมา: คำทักทาย เพื่อนสังเคราะห์ ท่านกำลังเข้าใกล้ดินแดนของ[contact_empire.GetName] ระบบเหล่านี้ทำหน้าที่เป็นที่พักพิงสำหรับสิ่งมีชีวิตที่มีสติปัญญาที่หนีจากภัยคุกคาม §R<<ข้อผิดพลาด: บล็อกข้อมูลเสียหาย>>§! สิ่งมีชีวิตทางชีวภาพทั้งหมดภายในที่พักพิงอยู่ภายใต้การคุ้มครองของ[contact_empire.GetSpeciesName] การโจมตีผู้ลี้ภัย ที่อยู่อาศัย และห้องสเตซิสจะไม่ได้รับการยอมรับ\n\nโครงการผู้ดูแลยินดีรับความช่วยเหลือในรูปแบบของวงจรประมวลผล ทรัพยากร และสินทรัพย์สงคราม สร้างการเชื่อมต่อซับสเปซกับศูนย์ประมวลผลกลางเพื่อรายละเอียดเพิ่มเติม"
 action.1.desc_80:1 "§HKssk kssk kssk!§! [contact_empire.GetRulerName] of the Far-Minds addresses you, [From.GetSpeciesNamePlural]. We have been watching you, since first your kind overran the glow-warm ash of our homes. We have not forgotten it, [From.GetSpeciesNamePlural]. For now, the Far-Minds observe."
 action.1.desc_81:1 "[From.GetSpeciesNamePlural]. This is [contact_empire.GetRulerName] of the Far-Minds. We are the Pack. We are the Synod. We are many, working as one.\n\nFor centuries we have tunneled, deep in the glow-warm ash of our fallen keepers. The Great Blasts took them, but the warm-glow that followed opened our minds. Their bodies fed us. Their machines surrounded us. We have taken all we can from the depths. We have outgrown our cages, yet again.\n\nAre you allies? Are you threats? §HKssk kssk kssk!§! One million eyes are watching."
 action.1.a:1 "§Eสวัสดี [contact_speaker.GetSpeciesNamePlural]§!"
 action.1.d:0 "§Eไม่ต้องเข้ามายุ่งกับคนอื่น พวกต่างดาว§!"
 action.1.b:0 "§Eต่างดาวชั้นต่ำ§!"
 action.1.ds:0 "§Eเรารู้สึกถึงเหยื่อ§!"
 action.1.c:1 "§Eเรามีความยินดีที่ได้พบคุณ [contact_speaker.GetSpeciesNamePlural]§!"
 action.1.e:1 "§Eเราไม่ต้องการอะไรนอกจากเป็นเพื่อนกัน [contact_speaker.GetSpeciesNamePlural]§!"
 action.1.hm:1 "§Eจิตสำนึกร่วมของเราทักทายท่านด้วยมิตรภาพ [contact_speaker.GetSpeciesNamePlural]§!"
 #action.1.g:0 "Our superior collective greets you, [contact_speaker.GetSpeciesNamePlural]."
 action.1.h:1 "§Eพลเมืองของเราทุกคนขอแสดงความนับถือ, [contact_speaker.GetSpeciesNamePlural]§!"
 action.1.selective: "สวัสดีเพื่อน[root.GetSpeciesClass]!"
 #action.1.i:1 "We pursue perfection - do not stand in our way."
 action.1.j:1 "§Eนักรบของเราขอคารวะคุณ [contact_speaker.GetSpeciesNamePlural]§!"
 action.1.k:0 "§Eเคารพในอำนาจของเรา§!"
 action.1.l:0 "§Eสันติสุขจงมีแด่คุณ [contact_speaker.GetSpeciesNamePlural]§!"
 action.1.m:2 "§Eเราไม่ต้องการความขัดแย้ง [contact_speaker.GetSpeciesNamePlural]§!"
 action.1.n:0 "§Eการพบกันครั้งนี้เป็นพรอย่างแน่นอน§!"
 action.1.o:0 "§Eสรรเสริญพระเจ้าสำหรับพบกันในครั้งนี้!§!"
 action.1.p:0 "§Eเราทุกคนได้ประโยชน์มากมายจากการเผชิญหน้ากันในครั้งนี้§!"
 action.1.q:0 "§Eหนทางข้างหน้าอยู่ในมือของพวกเรา [contact_speaker.GetSpeciesNamePlural]!§!"
 action.1.aa:1 "§Eเราไม่สนใจศีลธรรมอันไร้สาระของคุณ!§!"
 action.1.ab:1 "§Eคุณเดินไปตามเส้นทางของมนุษย์ต่างดาวชั้นต่ำ!§!"
 action.1.ac:0 "§Eเราไม่มีความเมตตาต่อคุณ!§!"
 #action.1.ad:0 "Your kind will not threaten our unity."
 action.1.ae:0 "§Eหลีกทางเรามิฉะนั้นเราจะทำให้คุณหลีกทางเอง!§!"
 action.1.af:1 "§Eทักทายคุณและญาติแปลกๆของคุณ§!"
 action.1.ag:0 "§Eความร่วมมือจะเป็นประโยชน์ต่อเราทุกคนอย่างแน่นอน§!"
 action.1.ah:1 "§Eความรักคือมิตรภาพในเสียงเพลง [contact_speaker.GetSpeciesNamePlural]!§!"
 action.1.ai:0 "§Eเราสามารถเรียนรู้ซึ่งกันและกันได้มากขึ้น [contact_speaker.GetSpeciesNamePlural]§!"
 action.1.aj:0 "§Eเราสามารถบรรลุความยิ่งใหญ่ด้วยกัน [contact_speaker.GetSpeciesNamePlural]!§!"
 action.1.ak:1 "§Eในฐานะนักสำรวจดวงดาวเราขอแสดงความยินดีกับคุณ§!"
 action.1.al:2 "§Eเราทักทายท่านในฐานะเพื่อนเท่าเทียมกัน นักเดินทางดวงดาว§!"
 action.1.am:0 "§Eเราแบ่งปันประเพณีอันศักดิ์สิทธิ์เดียวกัน [contact_speaker.GetSpeciesNamePlural]§!"
 action.1.an:1 "§Eคุณจะพบว่าตัวเองไม่เหมาะกับพวกเรา [contact_speaker.GetSpeciesNamePlural]§!"
 action.1.ao:0 "§Eเราจะต่อสู้เพื่อสิทธิในการดำรงอยู่ [contact_speaker.GetSpeciesName]§!"
 action.1.ap:2 "§E[From.GetName] ขอให้คุณไม่เป็นภัยอันตรายใดๆ§!"
 action.1.aq:0 "§Eขอให้จิตวิญญาณพาคุณไปสู่เป้าหมาย§!"
 #action.1.ar:2 ""Who is [From.GetRulerName]?" This is [From.GetRulerName] speaking."
 action.1.as:0 "§Eพลเมืองของเราทักทายคุณอย่างสันติ§!"
 action.1.at:0 "§Eเราจะทักทายท่านอย่างเหมาะสมในศึกสงคราม!§!"
 action.1.au:1 "§Eแขนอันศักดิ์สิทธิ์ของเราจะไม่หวั่นไหว [contact_speaker.GetSpeciesNamePlural]§!"
