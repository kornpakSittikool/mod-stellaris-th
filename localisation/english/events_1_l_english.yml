 action.1.name:0 "การติดต่อครั้งแรกกับ §H[contact_empire.GetName]§!"
 action.1.message:0 "เราได้ทำการติดต่อครั้งแรกกับ §H[contact_empire.GetName]§!"
 action.1.desc_01:0 "ข้าพเจ้านำคำทักทายมาจาก[contact_empire.GetRulerTitle] [contact_empire.GetRulerName] ผู้ปกครองสูงสุดแห่ง[contact_empire.GetName] จงเคารพพรมแดนของเราและอย่าเข้ามายุ่งเกี่ยวกับกิจการของเรา แล้วบางทีกองเรืออันทรงพลังของเราอาจละเว้นจากการเยือนดาวของท่าน"
 action.1.desc_02:0 "ยินดีที่ได้พบ ข้าพเจ้าเป็นตัวแทนของ[contact_empire.GetName] ภายใต้การนำของ[contact_empire.GetRulerTitle] [contact_empire.GetRulerName] ผู้ทรงเกียรติ เราปกครองดินแดนอวกาศของเราด้วยอำนาจศักดิ์สิทธิ์ และตราบใดที่ท่านไม่แทรกแซงกิจการทางจิตวิญญาณของเรา ความสัมพันธ์ระหว่างเราอาจดำเนินไปอย่างราบรื่น"
 action.1.desc_03:0 "เราคือ[contact_empire.GetName] ผู้รับใช้ของ[contact_empire.GetRulerTitle] [contact_empire.GetRulerName] ผู้ทรงปัญญา เป้าหมายของเราคือการพัฒนาตนเองผ่านการใช้เทคโนโลยี และไม่ว่าท่านจะเห็นด้วยกับเป้าหมายเหล่านี้หรือไม่ เราเชื่อว่าท่านจะยังคงเป็นเพื่อนบ้านที่ดี"
 action.1.desc_04:0 "คำทักทายจาก[contact_empire.GetName] เราคือชาติที่สงบสุข อยู่ภายใต้การปกครองอย่างยุติธรรมของ[contact_empire.GetRulerTitle] [contact_empire.GetRulerName] ที่รักยิ่ง ไม่ว่าข้อพิพาทใดจะเกิดขึ้นระหว่างประชาชนของเราในอนาคต เราหวังว่าจะสามารถแก้ไขได้ด้วยการเจรจามากกว่าความรุนแรง"
 action.1.desc_05:0 "ข้าพเจ้าพูดในนามของ[contact_empire.GetName] และได้รับอนุญาตให้นำคำทักทายมายังท่าน ตราบใดที่ท่านไม่เข้าไปยุ่งเกี่ยวกับกิจการภายในของเราและปฏิบัติต่อผู้นำผู้ยิ่งใหญ่ของเรา [contact_empire.GetRulerTitle] [contact_empire.GetRulerName] ด้วยความเคารพ ข้าพเจ้าไม่เห็นเหตุใดที่ความสัมพันธ์ทางการทูตของเราจะเสื่อมลง"
 action.1.desc_06:0 "[contact_empire.GetRulerTitle] [contact_empire.GetRulerName] ส่งคำทักทายจากสภาผู้ปกครองแห่ง[contact_empire.GetName] เราหวังว่าจะมีความสัมพันธ์ที่ดีกับประชาชนของท่าน แต่จงระวังไว้ว่ากองทัพของเราจะตอบโต้การละเมิดใดๆ ใกล้อวกาศของเราด้วยกำลังสูงสุด"
 action.1.desc_07:0 "[contact_empire.GetRulerTitle] [contact_empire.GetRulerName] และสภาศาสนาที่เหลือขอส่งคำทักทาย เราให้คำแนะนำทางจิตวิญญาณแก่[contact_empire.GetName] และเป้าหมายที่ประกาศของเราคือการนำชาติอันยิ่งใหญ่นี้ไปสู่เส้นทางแห่งความรอด อย่าขวางกั้นเส้นทางนี้และเราอาจอยู่ร่วมกันในมิตรภาพ"
 action.1.desc_08:0 "คำทักทาย ข้าพเจ้าได้รับการคัดเลือกโดย[contact_empire.GetRulerTitle] [contact_empire.GetRulerName] ให้เป็นตัวแทนของ[contact_empire.GetName] ในการติดต่อทางการทูตทั้งหมดกับประชาชนของท่าน เรามุ่งมั่นที่จะปลดล็อกศักยภาพสูงสุดของเทคโนโลยี และท่านควรระวังที่จะไม่แทรกแซงการแสวงหาความรู้ของเรา"
 action.1.desc_09:0 "ข้าพเจ้าได้รับอนุญาตให้นำคำทักทายอย่างเป็นมิตรจาก[contact_empire.GetName] มาถึงท่าน เราได้สร้างระบบการปกครองที่สงบสุขซึ่งดำเนินการภายใต้การกำกับดูแลของสภาที่นำโดย[contact_empire.GetRulerTitle] [contact_empire.GetRulerName] ขอให้สองชาติของเราไม่มีสิ่งใดนอกจากสันติภาพ"
 action.1.desc_10:0 "คำทักทาย ข้าพเจ้าพูดแทน[contact_empire.GetRulerTitle] [contact_empire.GetRulerName] และชนชั้นสูงผู้มั่งคั่งแห่ง[contact_empire.GetName] เราแสวงหาคู่ค้าใหม่อยู่เสมอ และหวังว่าเราจะสามารถบรรลุข้อตกลงที่จะเป็นประโยชน์ต่อการค้าของทั้งสองชาติ"
 action.1.desc_11:0 "ข้าพเจ้าเป็นตัวแทนของ[contact_empire.GetName] ผู้นำที่มาจากการเลือกตั้งของเรา[contact_empire.GetRulerTitle] [contact_empire.GetRulerName] หวังว่าจะมีความสัมพันธ์ที่สงบสุขกับประชาชนของท่าน แต่จงรู้ไว้ว่าเราสามารถปกป้องวิถีชีวิตของเราได้มากกว่านี้"
 action.1.desc_12:0 "ข้าพเจ้านำคำทักทายมาจาก[contact_empire.GetRulerTitle] [contact_empire.GetRulerName] ผู้นำที่มาจากการเลือกตั้งแห่ง[contact_empire.GetName] เราเชื่อในสิทธิของสิ่งมีชีวิตที่มีสติปัญญาทุกตัวในการตอบสนองความต้องการทางจิตวิญญาณของตน และเราหวังว่าท่านจะร่วมความเห็นนี้"
 action.1.desc_13:0 "คำทักทายจาก[contact_empire.GetName] [contact_empire.GetRulerTitle] [contact_empire.GetRulerName] คือตัวแทนที่มาจากการเลือกตั้งของเรา แต่ในความเป็นจริงพลเมืองทุกคนมีเสียงในรัฐบาลของเรา เรามุ่งมั่นที่จะพัฒนาตนเองผ่านเทคโนโลยี ความปรารถนาที่เราหวังว่าท่านจะเคารพ"
 action.1.desc_14:0 "ยินดีที่ได้พบ มิตรสหาย เราคือ[contact_empire.GetName] ชาติที่สร้างขึ้นบนหลักการของการอยู่ร่วมกันอย่างสันติและเสรีภาพส่วนบุคคล [contact_empire.GetRulerTitle] [contact_empire.GetRulerName] หัวหน้ารัฐบาลคนปัจจุบันของเรา ได้แสดงความหวังอย่างจริงใจว่าจะมีมิตรภาพที่ยั่งยืนระหว่างสองประชาชนของเรา"
 action.1.desc_15:0 "คำทักทายจาก[contact_empire.GetName] เราคือชาติประชาธิปไตยที่มุ่งมั่นในการรักษาเสรีภาพส่วนบุคคลของพลเมือง ผู้นำที่มาจากการเลือกตั้งของเรา [contact_empire.GetRulerTitle] [contact_empire.GetRulerName] หวังว่าจะมีความสัมพันธ์ที่ยาวนานและเป็นประโยชน์กับประชาชนของท่าน"
 action.1.desc_16:1 "สิ่งมีชีวิตต่างดาว ข้าพเจ้าพูดในนามของ[contact_empire.GetRulerTitle] [contact_empire.GetRulerName] ผู้ปกครองสูงสุดแห่ง[contact_empire.GetName] จงเคารพพรมแดนของเราและอย่าเข้ามายุ่งกับกิจการของ[contact_empire.GetSpeciesName] แล้วบางทีกองเรืออันทรงพลังของเราอาจละเว้นจากการเยือนดาวอันน่าสังเวชของท่าน"
 action.1.desc_17:0 "จงฟังข้อความนี้ มนุษย์ต่างดาว ข้าพเจ้าเป็นตัวแทนของ[contact_empire.GetName] ภายใต้การนำของ[contact_empire.GetRulerTitle] [contact_empire.GetRulerName] ผู้ทรงเกียรติ เราปกครองดินแดนอวกาศของเราด้วยอำนาจศักดิ์สิทธิ์ และตราบใดที่ท่านไม่เยาะเย้ยความเชื่อของเราในสิ่งที่วัฒนธรรมของท่านเรียก อาจมีสันติภาพระหว่างเรา"
 action.1.desc_18:0 "เราคือ[contact_empire.GetName] ผู้รับใช้ของ[contact_empire.GetRulerTitle] [contact_empire.GetRulerName] ผู้ทรงปัญญา เป้าหมายของเราคือการพัฒนาตนเองผ่านการใช้เทคโนโลยี ไม่ว่าท่านจะเห็นด้วยกับเป้าหมายเหล่านี้หรือไม่ อย่าคิดที่จะท้าทายเรา มนุษย์ต่างดาว"
 action.1.desc_19:0 "เราคือ[contact_empire.GetName] ชาติที่สงบสุขซึ่งปกครองอย่างยุติธรรมโดย[contact_empire.GetRulerTitle] [contact_empire.GetRulerName] ที่รักยิ่ง ข้าพเจ้าไม่รู้ว่าสายพันธุ์แปลกประหลาดของท่านสามารถกระทำความป่าเถื่อนอะไรได้บ้าง แต่เราหวังว่าข้อพิพาทในอนาคตจะสามารถแก้ไขได้ด้วยการเจรจามากกว่าความรุนแรง"
 action.1.desc_20:0 "ข้าพเจ้าพูดในนามของ[contact_empire.GetName] และมาพร้อมกับข้อความสำหรับสายพันธุ์อันเสื่อมทรามของท่าน ตราบใดที่ท่านไม่เข้ามายุ่งเกี่ยวกับกิจการภายในของเราและปฏิบัติต่อผู้นำผู้ยิ่งใหญ่ของเรา [contact_empire.GetRulerTitle] [contact_empire.GetRulerName] ด้วยความเคารพ อาจยังมีสันติภาพระหว่างชาติของเรา"
 action.1.desc_21:0 "[contact_empire.GetRulerTitle] [contact_empire.GetRulerName] และสภาผู้ปกครองแห่ง[contact_empire.GetName] ได้สั่งให้ข้าพเจ้านำคำเตือนนี้มาแจ้งท่าน จงนำเรือต่างดาวที่ดูน่าขันของท่านออกห่างจากอวกาศของเรา และจงรู้ไว้ว่ากองทัพของเราจะตอบโต้การละเมิดใดๆ ด้วยกำลังสูงสุด"
 action.1.desc_22:0 "[contact_empire.GetRulerTitle] [contact_empire.GetRulerName] และสภาศาสนาที่เหลือต้องการความสนใจของท่าน สิ่งมีชีวิตนอกรีต เราให้คำแนะนำทางจิตวิญญาณแก่[contact_empire.GetName] และความตั้งใจของเราคือการนำชาติอันยิ่งใหญ่นี้ไปสู่เส้นทางแห่งความรอด อย่าทำให้เส้นทางนี้สกปรกด้วยการปรากฏตัวของท่าน มนุษย์ต่างดาว"
 action.1.desc_23:1 "ฟังนะ สิ่งมีชีวิตต่างดาว น่าเสียดายที่ข้าพเจ้าถูกเลือกโดย[contact_empire.GetRulerTitle] [contact_empire.GetRulerName] ให้เป็นตัวแทนของ[contact_empire.GetName] ในการติดต่อทางการทูตทั้งหมดกับอารยธรรมดั้งเดิมของท่าน เรามีความตั้งใจที่จะปลดล็อกเทคโนโลยีที่ท่านไม่อาจเข้าใจ อย่าแทรกแซง"
 action.1.desc_24:0 "หลังจากการพิจารณาอย่างถี่ถ้วน ข้าพเจ้าได้รับอนุญาตให้พูดคุยกับท่านในนามของ[contact_empire.GetName] เราได้สร้างระบบการปกครองที่สงบสุขซึ่งดำเนินการภายใต้การกำกับดูแลของสภาที่นำโดย[contact_empire.GetRulerTitle] [contact_empire.GetRulerName] อิทธิพลของมนุษย์ต่างดาวไม่เป็นที่ต้อนรับที่นี่ และเราชอบให้ท่านรักษาระยะห่าง"
 action.1.desc_25:0 "ข้าพเจ้าพูดแทน[contact_empire.GetRulerTitle] [contact_empire.GetRulerName] และชนชั้นสูงผู้มั่งคั่งแห่ง[contact_empire.GetName] วิถีชีวิตแบบต่างดาวของท่านน่ารังเกียจสำหรับเรา แต่บางทีเราอาจยังมีส่วนร่วมในการค้าขายอย่างจำกัด สมมติว่าอารยธรรมที่ด้อยกว่าของท่านผลิตสิ่งที่มีค่าได้"
 action.1.desc_26:0 "ข้าพเจ้าเป็นตัวแทนของ[contact_empire.GetName] ผู้นำที่มาจากการเลือกตั้งของเรา [contact_empire.GetRulerTitle] [contact_empire.GetRulerName] ต้องการให้ท่านรู้ว่าเราสามารถปกป้องวิถีชีวิตของเราได้มากกว่านี้ อย่าแทรกแซงกิจการของเรา มนุษย์ต่างดาว"
 action.1.desc_27:0 "ข้าพเจ้ามาพร้อมข้อความจาก[contact_empire.GetRulerTitle] [contact_empire.GetRulerName] ผู้นำที่มาจากการเลือกตั้งแห่ง[contact_empire.GetName] เราเชื่อในสิทธิของสิ่งมีชีวิตที่มีสติปัญญาทุกตัวในการตอบสนองความต้องการทางจิตวิญญาณของตน และจะไม่ยอมรับการแทรกแซงจากมนุษย์ต่างดาวในเรื่องนี้"
 action.1.desc_28:0 "ท่านกำลังพูดคุยกับ[contact_empire.GetName] [contact_empire.GetRulerTitle] [contact_empire.GetRulerName] คือตัวแทนที่มาจากการเลือกตั้งของเรา แต่ในความเป็นจริงพลเมืองทุกคนมีเสียงในรัฐบาลของเรา เรามุ่งมั่นที่จะพัฒนาตนเองผ่านเทคโนโลยี ความปรารถนาที่เราไม่คาดหวังว่ามนุษย์ต่างดาวดั้งเดิมอย่างท่านจะเข้าใจ"
 action.1.desc_29:0 "เราคือ[contact_empire.GetName] ชาติที่สร้างขึ้นบนหลักการของการแยกตัวอย่างสงบสุขและเสรีภาพส่วนบุคคล [contact_empire.GetRulerTitle] [contact_empire.GetRulerName] หัวหน้ารัฐบาลคนปัจจุบัน ขอให้ท่านปล่อยเราไว้ตามลำพังและดำเนินแผนการมนุษย์ต่างดาวอันน่าเกลียดของท่านให้ห่างจากดินแดนของเรา"
 action.1.desc_30:0 "ข้าพเจ้าพูดในนามของ[contact_empire.GetName] เราคือชาติประชาธิปไตยที่มุ่งมั่นในการรักษาเสรีภาพส่วนบุคคลของพลเมืองในกาแล็กซีที่เต็มไปด้วยสยองขวัญต่างดาว ผู้นำที่มาจากการเลือกตั้งของเรา [contact_empire.GetRulerTitle] [contact_empire.GetRulerName] เตือนท่านอย่าโต้ตอบกับพลเมืองของเราหรือเข้าใกล้อวกาศของเรา"
 action.1.desc_31:1 "ข้าพเจ้านำคำทักทายมาจาก[contact_empire.GetRulerTitle] [contact_empire.GetRulerName] ผู้ปกครองสูงสุดแห่ง[contact_empire.GetName] เมื่อพิจารณาถึงรูปร่างที่น่าสนใจของท่าน นักรบของท่านใช้เทคนิคการต่อสู้แบบใด เราต้องการเรียนรู้เพิ่มเติมเกี่ยวกับสายพันธุ์ของท่าน"
 action.1.desc_32:0 "ยินดีที่ได้พบ มนุษย์ต่างดาว ข้าพเจ้าเป็นตัวแทนของ[contact_empire.GetName] ภายใต้การนำของ[contact_empire.GetRulerTitle] [contact_empire.GetRulerName] ผู้ทรงเกียรติ เราปกครองดินแดนอวกาศของเราด้วยอำนาจศักดิ์สิทธิ์ และตราบใดที่ท่านไม่แทรกแซงกิจการทางจิตวิญญาณของเรา เราตั้งตารอที่จะเรียนรู้เพิ่มเติมเกี่ยวกับวัฒนธรรมของท่าน"
 action.1.desc_33:0 "เราคือ[contact_empire.GetName] ผู้รับใช้ของ[contact_empire.GetRulerTitle] [contact_empire.GetRulerName] ผู้ทรงปัญญา เป้าหมายของเราคือการสร้างสังคมที่มีประสิทธิภาพผ่านการใช้เทคโนโลยี และเราสนใจอยู่เสมอที่จะศึกษาอารยธรรมต่างดาวใหม่ๆ เพื่อดูว่าสามารถเรียนรู้อะไรจากพวกเขาได้บ้าง"
 action.1.desc_34:0 "มนุษย์ต่างดาวผู้ดี ข้าพเจ้านำคำทักทายมาจาก[contact_empire.GetName] เราคือชาติที่สงบสุข อยู่ภายใต้การปกครองอย่างยุติธรรมของ[contact_empire.GetRulerTitle] [contact_empire.GetRulerName] ที่รักยิ่ง เราหวังว่าวันนี้จะเป็นจุดเริ่มต้นของยุคแห่งมิตรภาพระหว่างเราและสายพันธุ์อันน่าสนใจของท่าน"
 action.1.desc_35:0 "ข้าพเจ้าพูดในนามของ[contact_empire.GetName] และนำคำทักทายมายังท่าน ผู้นำผู้ยิ่งใหญ่ของเรา [contact_empire.GetRulerTitle] [contact_empire.GetRulerName] ยินดีมากที่ได้ติดต่อกับสายพันธุ์อันเป็นเอกลักษณ์ของท่าน และเราตั้งตารอที่จะแลกเปลี่ยนวัฒนธรรมและความคิด"
 action.1.desc_36:0 "[contact_empire.GetRulerTitle] [contact_empire.GetRulerName] ส่งคำทักทายจากสภาผู้ปกครองแห่ง[contact_empire.GetName] เราหวังว่าจะมีความสัมพันธ์ที่ดีกับชาติอันน่าประทับใจของท่าน และกองทัพของเราได้รับคำสั่งให้ปฏิบัติต่อสมาชิกทุกคนของสายพันธุ์ท่านด้วยความเคารพ"
 action.1.desc_37:0 "[contact_empire.GetRulerTitle] [contact_empire.GetRulerName] และสภาศาสนาที่เหลือขอส่งคำทักทาย เราให้คำแนะนำทางจิตวิญญาณแก่[contact_empire.GetName] และเป้าหมายที่ประกาศของเราคือการนำชาติอันยิ่งใหญ่นี้ไปสู่เส้นทางแห่งความรอด เราจะเป็นเกียรติหากสายพันธุ์อันยิ่งใหญ่ของท่านร่วมเดินทางกับเราในการเดินทางครั้งนี้"
