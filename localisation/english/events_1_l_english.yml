 action.2.desc_01:0 "นี่หมายความว่าอะไร? ท่านเป็นใคร? ท่านหลอกลวงเราอย่างแน่นอน มนุษย์ต่างดาวไม่มีอยู่จริง!"
 action.2.desc_02:0 "น่าอัศจรรย์! ผู้มาเยือนจากดวงดาว? เอ้อ นี่ไม่คาดฝันเลยทีเดียว ท่านจับเราได้ในช่วงที่เสียเปรียบเล็กน้อย"
 action.2.desc_03:0 "ผู้มาเยือนจากโลกอื่น? เราคิดเสมอว่าต้องมีสิ่งมีชีวิตที่มีสติปัญญาอื่นๆ อยู่ที่นั่น แต่ถึงอย่างนั้น นี่รู้สึกสำคัญมาก! เราไม่แน่ใจว่าธรรมเนียมที่นี่คืออะไร"
 action.2.desc_04:0 "มาหลายยุคสมัยแล้วที่เรารอที่จะทำการติดต่อ ในกาแล็กซีอันกว้างใหญ่และน่าอัศจรรย์นี้ เราทราบดีว่าต้องมีผู้อื่นที่เหมือนเรา"
 action.2.desc_05:0 "ดีนักหนา! ในที่สุดท่านก็ตัดสินใจเปิดเผยตัวเอง ท่านได้สังเกตดูโลกของเรามาสักพักแล้ว ใช่ไหม?"
 action.2.desc_06:0 "อ้อ ท่านอยู่ที่นั่นนะ! เรารอให้ท่านเริ่มการติดต่อนานมากจนตัดสินใจก้าวแรกเอง ตอนนี้จะเกิดอะไรขึ้น?"
 action.2.desc_07:0 "ผู้บุกรุก! เราไม่รู้ว่าทำไมท่านถึงโจมตีเรา แต่จงรู้ไว้ว่าเราจะต่อสู้เพื่อปกป้องดาวเคราะห์ของเรา! เราจะไม่ยอมแพ้!"
 action.2.desc_solarpunk:0 "โอ้ นี่คือวิธีที่ท่านสื่อสารหรือ? เราได้เฝ้าดูท่านตั้งแต่ท่านเข้ามาผ่านไฮเปอร์เลน แต่ไม่สามารถหาทางออกได้ มันอันตรายไหมที่จะเดินทางในกล่องโลหะเหล่านั้น?\n\nดูเหมือนว่าเราสามารถเรียนรู้ได้มากมายจากกัน ดังนั้นหากนั่นเป็นความตั้งใจของท่าน รู้สึกอิสระที่จะอยู่ต่อ หากท่านต้องการอ้างสิทธิ์ในบ้านของเรา โปรดทราบว่าเราไม่ได้ไร้ทางสู้"

 action.2.a:0 "§Eคำทักทาย มิตรสหาย§!"
 action.2.b:0 "§Eสิ่งมีชีวิตน่าเกลียด... รูปลักษณ์ของท่านทำให้เราคลื่นไส้§!"
 action.2.c:0 "§Eพรศักดิ์สิทธิ์จงมีแด่ท่านและโลกของท่าน§!"
 action.2.d:0 "§Eคำทักทาย สหาย§!"
 action.2.e:0 "§Eเราจะนำความสงบเรียบร้อยมาสู่การดำรงอยู่อันวุ่นวายของท่าน รอสักครู่§!"
 action.2.f:0 "§Eเรามาอย่างสันติ§!"
 action.2.g:0 "§Eเราคล้ายกันมากกว่าที่ท่านรู้§!"
 action.2.h:1 "§Eท่านคิดว่าตัวเองเป็นอารยธรรมที่ก้าวหน้า? น่ารักจัง§!"
 action.2.i:0 "§Eเราเป็นหนึ่งเดียว ท่านเป็นหลายคน§!"
 action.2.j:0 "§Eเราเป็นหนึ่งเดียว ท่านก็เป็นหนึ่งเดียวเช่นกัน ตอนนี้มีสองแล้ว§!"
 action.2.k:0 "§Eเราหวังที่จะสร้างความสัมพันธ์ที่เป็นประโยชน์กับท่าน§!"


 action.4.name:0 "การละเมิดพรมแดน"
 action.4.message:0 "การละเมิดพรมแดน"

 action.4.desc_01:0 "การปรากฏตัวของ §Y[From.From.GetName]§! ในระบบ §Y[From.From.From.GetName]§! ถือเป็นการละเมิดพรมแดนของเราอย่างชัดเจน เราจะถูกบังคับให้ถือว่านี่เป็นการประกาศสงครามหากท่านไม่ถอนตัวออกทันที"
 action.4.desc_02:0 "เราตรวจพบ §Y[From.From.GetName]§! ในระบบ §Y[From.From.From.GetName]§! ซึ่งละเมิดดินแดนของเราโดยตรง นี่เป็นบทนำสู่การรุกรานหรือท่านจะถอนตัวออกจากอวกาศของเรา?"
 action.4.desc_03:0 "ดูเหมือนว่าแผนที่ดาวของท่านล้าสมัยแล้ว มิตรสหาย เราตรวจพบ §Y[From.From.GetName]§! ที่เดินทางอยู่ภายในพรมแดนของเราในระบบ §Y[From.From.From.GetName]§! แม้เราจะยินดีต้อนรับความเป็นเพื่อนของพวกเขา เราต้องขอให้ท่านถอนเรือออกจากดินแดนของเรา"
 action.4.desc_04:0 "เซนเซอร์ของเราตรวจพบ §Y[From.From.GetName]§! ภายในระบบ §Y[From.From.From.GetName]§! พวกเขาต้องการความช่วยเหลือในทางใดทางหนึ่งหรือไม่? หากไม่ เราต้องขอให้ท่านอพยพพวกเขาออกจากอวกาศของเรา"
 action.4.desc_05:0 "กองกำลังขี้ขลาดของท่านได้บุกเข้ามาในเขตชายแดนของ[From.GetName] แม้ตอนนี้ §Y[From.From.GetName]§! ยังสอดแนมเราในระบบ §Y[From.From.From.GetName]§! ซึ่งโดยสิทธิแล้วเป็นของเรา ท่านคิดว่าเราจะไม่สังเกตเห็นการละเมิดกฎหมายอวกาศอย่างโจ่งแจ้งนี้หรือ?"
 action.4.desc_06:0 "กองกำลังของท่านได้จงใจละเมิดพรมแดนของเราในระบบ §Y[From.From.From.GetName]§! โดยชอบธรรมแล้วเราควรจะอยู่ในสภาวะสงครามแล้ว แต่เพื่อประโยชน์ของการส่งเสริมสันติภาพกาแล็กซี รัฐบาลของเราตัดสินใจให้โอกาสครั้งสุดท้ายแก่ท่านในการถอน §Y[From.From.GetName]§! ออกจากอวกาศของเรา"
 action.4.desc_07:0 "เราตรวจพบ §Y[From.From.GetName]§! ในระบบ §Y[From.From.From.GetName]§! ดังที่ท่านทราบ ดาวฤกษ์นี้อยู่ภายในพรมแดนของเรา ดังนั้นเราต้องขอร้องอย่างสุภาพให้ท่านนำอุปกรณ์ทำลายล้างของท่านออกจากอวกาศของเรา"
 action.4.desc_08:0 "มิตรสหาย ข้าพเจ้าเกรงว่า §Y[From.From.GetName]§! ได้เดินทางเข้ามาในอวกาศของเราในระบบ §Y[From.From.From.GetName]§! คงเป็นความผิดพลาดทางการนำทาง บางที? กรุณาแจ้งให้พวกเขาทราบถึงความผิดพลาดของตนเพื่อพวกเขาจะได้กลับบ้านอย่างปลอดภัย"
 action.4.desc_09:0 "เซนเซอร์ของเราตรวจพบ §Y[From.From.GetName]§! ในระบบ §Y[From.From.From.GetName]§! เราไม่ต้องการให้เรือรบอัปยศของท่านมาพเนจรอยู่ในอวกาศของเรา รัฐบาลของเราเรียกร้องให้ถอนออกทันที!"
 action.4.desc_10:0 "นำเรือดั้งเดิมของท่านออกจากระบบ §Y[From.From.From.GetName]§! หรือท่านจะไม่เห็นพวกเขาอีก เราจะไม่ขอเป็นครั้งที่สอง"
 action.4.desc_11:0 "เรือของท่าน นำออกจาก §Y[From.From.From.GetName]§!"
 action.4.desc_12:0 "เราต้องขอให้ท่านนำเรือเล็กของท่านออกจากระบบ §Y[From.From.From.GetName]§! เพื่อความปลอดภัยของพวกเขาเอง แน่นอน"
 action.4.desc_13:0 "ท่านจะต้องนำยานอวกาศน่าสังเวชของท่านออกจากระบบ §Y[From.From.From.GetName]§! ในทันที"
 action.4.desc_14:0 "เรือของท่านในระบบ §Y[From.From.From.GetName]§! กำลังขัดขวางแผนการของเราสำหรับภูมิภาคนี้ของกาแล็กซี นำออกไปทันที!"
 action.4.desc_15:0 "มันอยู่ในอวกาศของเรา กลิ่นนั้นแรงมากใน §Y[From.From.From.GetName]§! มันต้องถอนออกไป"


 action.4.a.neutral.1.response:0 "ดี อย่าทำเช่นนี้ซ้ำอีก"
 action.4.a.neutral.2.response:0 "กรุณาออกจากระบบของเราในทันที"
 action.4.a.friendly.1.response:0 "ขอบคุณที่แก้ไขเรื่องนี้อย่างรวดเร็ว"
 action.4.a.friendly.2.response:0 "แล้วลืมเรื่องนี้ไปเสียว่าไม่เคยเกิดขึ้น"
 action.4.a.hostile.1.response:0 "ใช่แล้ว วิ่งกลับไปยัง[Root.Capital.GetName]!"
 action.4.a.hostile.2.response:0 "ดี แต่อย่าคิดว่าเราจะลืมการละเมิดนี้"
 action.4.a.pacifist.neutral.response:0 "ยอดเยี่ยม ข้าพเจ้ารู้ว่าเราสามารถบรรลุข้อตกลงได้"
 action.4.a.pacifist.friendly.response:0 "ยอดเยี่ยม ข้าพเจ้าขออวยพรให้พวกเขาเดินทางปลอดภัย!"
 action.4.a.pacifist.hostile.response:0 "ดี บางทีท่านยังมีความหวังอยู่บ้าง"
 action.4.a.fallen.empire.1.response:0 "ท่านทำได้ดีที่เชื่อฟัง เด็กน้อย"
 action.4.a.fallen.empire.2.response:0 "ดี"
 action.4.a.fallen.empire.3.response:0 "วิเศษมาก!"
 action.4.a.fallen.empire.4.response:0 "สิ้นสุดการส่ง"
 action.4.a.fallen.empire.5.response:0 "เรื่องได้รับการตัดสินแล้ว"
 action.4.a.fallen.empire.6.response:0 "มันปฏิบัติตาม ดี"

 action.4.b.neutral.1.response:0 "เราจะปกป้องอวกาศของเราจนถึง[From.GetSpeciesName] คนสุดท้าย!"
 action.4.b.neutral.2.response:0 "นั่นคือสิ่งที่เราเกรงกลัว ท่านจะเสียใจกับการตัดสินใจนี้"
 action.4.b.friendly.1.response:0 "และคิดว่าเราเคยถือว่าท่านเป็นมิตรสหาย..."
 action.4.b.friendly.2.response:0 "ในบรรดาการทรยศทั้งหมด...! ฉัน... ท่าน... คำพูดล้มเหลว..."
 action.4.b.hostile.1.response:0 "คนโง่น่าสังเวช ประวัติศาสตร์จะจดจำวันนี้ว่าเป็นจุดเริ่มต้นของการสิ้นสุดสำหรับ[Root.GetName]"
 action.4.b.hostile.2.response:0 "ไม่มีใครอ้างได้ว่าเราล้มเหลวในการแสดงความอดทนต่อเผ่าพันธุ์อันน่าสังเวชของท่าน [Root.GetSpeciesName] ตอนนี้เราจะชำระล้างท่านออกจากดวงดาว!"
 action.4.b.pacifist.neutral.response:0 "โอ้ ไม่นะ"
 action.4.b.pacifist.friendly.response:0 "อะไร? ต้องมีความผิดพลาดบางอย่าง... ซอฟต์แวร์แปลภาษาทำงานถูกต้องไหม? ท่าน... ท่านคงไม่เชื่อเรื่องนี้ มิตรสหาย แต่ตามหน้าจอของข้าพเจ้า ท่านเพิ่งประกาศสงคราม!"
 action.4.b.pacifist.hostile.response:0 "ถอนหายใจ... ทำไมท่านต้องรีบใช้ความรุนแรงเช่นนี้?"
 action.4.b.fallen.empire.1.response:0 "น่าเสียดายที่เวลาของท่านในหมู่ดวงดาวจะสั้นนัก"
 action.4.b.fallen.empire.2.response:0 "เป็นเช่นนั้นก็เป็นเช่นนั้น"
 action.4.b.fallen.empire.3.response:0 "ชาติอวกาศยุคปัจจุบันแสดงความก้าวร้าวอย่างน่าทึ่ง! น่าสนใจมาก เราต้องศึกษาเรื่องนี้เพิ่มเติมหลังจากที่ท่านถูกปราบปราม"
