 leader.1.name:0 "เจ้าหน้าที่มีอนาคต"
 leader.1.desc:0 "กัปตัน[officer.GetName]ผู้บังคับการ[ship.GetName]ทําหน้าที่ที่มีความแตกต่างกันในระหว่างการหมั้นล่าสุดที่เกิดขึ้น[system.GetName]ระบบ พลเรือเอกบน[Root.Capital.GetName]ตระหนักถึงคุณสมบัติของเจ้าหน้าที่ธงสัญญาได้ตัดสินใจที่จะส่งเสริมกัปตันยศของผู้บังคับบัญชาเต็มรูปแบบ"
 leader.1.desc.machine:0 "[officer.GetName]ได้มีการเลื่อนขึ้นห่วงโซ่ของคําสั่งเป็นผลจากการจัดการที่ประสบความสําเร็จของการโหลดเพิ่มขึ้นในระหว่าง[ship.GetName]การต่อสู้ใน[system.GetName]ระบบ"
 leader.1.desc.hive:0 "[officer.GetName]ถูกยกขึ้นไป[GetLeaderStatusAdjCap]สถานะต่อไปนี้ข้อสังเกตของพวกเขาเพิ่มการตอบสนองระหว่าง[ship.GetName]การหมั้นครั้งล่าสุด[system.GetName]ระบบ"
 new_admiral:0 "ใหม่§Hผู้บัญชาการ§!ได้ถูกเพิ่มเข้ากับ§H$RECRUITABLE_LEADERS$§!."
 leader.newadmiraltrait.desc.machine:0 "[officer.GetName]ได้มีการพัฒนาข้อมูลกลยุทธ์ใหม่ ชุดจากเวกเตอร์คุณลักษณะของกรณีการต่อสู้ล่าสุดใน[system.GetName]ระบบ"
 leader.lostadmiraltrait.desc.machine:0 "ติดตามตัวอย่างการต่อสู้ล่าสุดใน[system.GetName]ระบบ[officer.GetName]ได้แก้ไขระเบียบการหมั้น"
 leader.newadmiraltrait.desc.hive:0 "การหมั้นใน[system.GetName]ระบบได้ก่อให้เกิดการแสดงออกทางพันธุกรรมที่ไม่ซ้ํากันใน[officer.GetName]."
 leader.lostadmiraltrait.desc.hive:0 "การต่อสู้ใน[system.GetName]ระบบทําให้เกิดความผิดปกติทางพฤติกรรมภายใน[officer.GetName]เพื่อบรรเทา"
 leader.5.desc:0 "หลังจากชัยชนะที่ผ่านมา[system.GetName]ระบบ ผู้บัญชาการ[officer.GetName]ดู เหมือน ว่า ได้ พัฒนา ความ สนใจ ใหม่ ใน ทฤษฎี ทาง ทะเล.[officer.GetSheHeCap] [officer.GetHasHave]เริ่มทดลองกับกลยุทธ์ใหม่ และกลยุทธ์ใหม่"
 leader.6.desc:0 "ชัยชนะเมื่อเร็ว ๆ นี้[system.GetName]ระบบดูเหมือนจะปลุกนักล่าในผู้บัญชาการ[officer.GetName]ผู้ซึ่งตอนนี้กลายเป็นผู้บัญชาการที่ก้าวร้าวมากขึ้น"
 leader.7.desc:0 "ได้นํา[From.From.GetName]เพื่อชัยชนะ[system.GetName]ระบบ ผู้บัญชาการ[officer.GetName]มี ความ มั่น ใจ มาก ขึ้น เรื่อย ๆ และ บัด นี้ ไม่ ยอม แม้ แต่ จะ คิด ถึง การ ถอน ตัว จาก การ หมั้น ใน อนาคต."
 leader.8.desc:0 "หลัง[officer.GetHerHis]ชัยชนะเมื่อเร็ว ๆ นี้ใน[system.GetName]ระบบ ผู้บัญชาการ[officer.GetName]ได้เริ่มเน้นความสําคัญของความเร็วและการเคลื่อนไหวอย่างรวดเร็วใน[officer.GetHerHis]รายงานสรุปของกองทัพเรือ[officer.GetSheHeCap] [officer.GetIsAre]ทําการทดลองกับรูปแบบใหม่และรูปแบบที่จะได้รับความกระฉับกระเฉงมากที่สุดออกจากเรือดาวภายใต้[officer.GetHerHis]คําสั่ง"
 leader.9.desc:0 "หลังจากชัยชนะล่าสุด[From.From.GetName]ใน[system.GetName]ระบบ ผู้บัญชาการ[officer.GetName]แสดงให้เห็นถึงพลังและความคิดสร้างสรรค์มากกว่าเมื่อก่อน[officer.GetHerHisCap]การดําเนินงานได้ดีขึ้นอย่างมาก"
 leader.10.desc:0 "ผู้บัญชาการ[officer.GetName]ดู เหมือน ว่า ได้ พัฒนา บาง สิ่ง อย่าง ระมัดระวัง ภาย หลัง การ พ่าย แพ้ เมื่อ เร็ว ๆ นี้ ใน[system.GetName]ระบบ ผู้บัญชาการตอนนี้ระมัดระวังมากขึ้นและละเอียด ในการใช้งานของทรัพย์สินของกองเรือภายใต้[officer.GetHerHis]คําสั่ง"
 leader.11.desc:0 "หลังจากความพ่ายแพ้เมื่อเร็ว ๆ นี้[system.GetName]ระบบ ผู้บัญชาการ[officer.GetName]ดูเหมือนจะกลายเป็นพวกงี่เง่า และชอบสงสัยตัวเองมากขึ้น มันได้กลายเป็นที่ชัดเจนว่าผู้บัญชาการไม่สามารถ คําสั่งที่มีขนาดใหญ่เป็นก่อน"
 leader.12.desc:1 "การล่าถอยของ[Root.GetName]จากการต่อสู้ล่าสุดใน[system.GetName]ระบบดูเหมือนจะโจมตีผู้บัญชาการ[officer.GetName]ยาก[officer.GetName]ได้ตัดสินใจที่จะไม่ออกจากสนามอีกครั้งเป็นความตั้งใจที่จะต่อสู้สุดท้ายใน[officer.GetHerHis]การหมั้นครั้งต่อไป"
 leader.13.desc:0 "ผู้บัญชาการ[officer.GetName]ใช้เครื่องยนต์ของ[officer.GetHerHis]เมื่อเรือถึงขีดสุด[Root.GetName]หลบหนีจากการต่อสู้เมื่อเร็ว ๆ นี้[system.GetName]ระบบ[officer.GetSheHeCap] [officer.GetHasHave]เรียนรู้ที่จะบีบความเร็วพิเศษ ออกจากเรือใด ๆ ใต้[officer.GetHerHis]คําสั่ง"
 leader.14.desc:0 "ผู้บัญชาการ[officer.GetName]ดูท่าจะห่างเหินและหดหู่ตั้งแต่[officer.GetHerHis]ความพ่ายแพ้ในการต่อสู้เมื่อเร็ว ๆ นี้ที่เกิดขึ้นใน[system.GetName]ระบบ เจ้าหน้าที่ที่อยู่ภายใต้[officer.GetHerHis]คําสั่งที่ผู้บัญชาการไม่ดําเนินการอีกต่อไป[officer.GetHerHis]หน้าที่ที่มีลมกระโชกเช่นเดียวกับก่อนหน้านี้"
 leader.optimizations.desc.machine:0 "[officer.GetName]มีการอัปเดตการดําเนินงานเพื่อการจัดการกองเรือ"
 leader.optimizations.desc.hive:0 "[officer.GetName]ได้เติบโตอย่างหงุดหงิดมากขึ้น ในการจัดการของกองทัพเรือของเรา"
 leader.15.desc:0 "ผู้บัญชาการ[officer.GetName]ได้รับทักษะทางเทคนิคที่ประเมินค่าไม่ได้ ในขณะที่กํากับการซ่อมแซม[Root.GetName]ทีมควบคุมความเสียหายภายใต้การบัญชาของผู้บัญชาการตอนนี้ สามารถซ่อมแซมเรือในทุ่ง"
 leader.16.desc:0 "ประสบการณ์ของคําสั่งขนาดใหญ่เป็น[Root.GetName]ได้จัดให้ผู้บัญชาการ[officer.GetName]ด้วยทักษะที่ประเมินค่าไม่ได้ขององค์กร ผู้บัญชาการตอนนี้มีความสามารถในการควบคุม แม้กองเรือขนาดใหญ่"
 leader.17.desc:0 "หลังการนํา[From.From.GetName]เพื่อชัยชนะ[system.GetName]ระบบ ผู้บัญชาการ[officer.GetName]ดูเหมือนจะกลับมาเหมือนเดิม[officer.GetHerHis]ความมั่นใจ[officer.GetSheHe] [officer.GetIsAre]บัด นี้ สามารถ จัด การ กับ ภาระ งาน ด้าน การ บริหาร ซึ่ง มา พร้อม กับ บัญชา การ กอง เรือ ขนาด ใหญ่."
 leader.18.desc:0 "ในขณะที่อยู่ในคําสั่ง[Root.GetName]ท่านผู้บัญชาการ[officer.GetName]ได้เรียนรู้ที่จะดูแลพยาบาล[officer.GetHisHer]เสบียงลดต้นทุนดําเนินการของเรือ ข้ามคณะกรรมการ"
 leader.19.desc:0 "ต่อไปนี้[officer.GetHerHis]การกวาดเซ็นเซอร์ล่าสุด[system.GetName]ระบบ ผู้บัญชาการ[officer.GetName]ได้เรียนรู้ที่จะดําเนินการ[officer.GetHerHis]หน่วยเพื่อเพิ่มระยะเซ็นเซอร์ มี ผู้ บัญชา การ กอง เรือ ไม่ กี่ คน ที่ มี ความ ชํานาญ ใน การ ปฏิบัติ ภารกิจ ที่ ซับ ซ้อน เช่น นั้น."

 leader.newtrait:0 "§H[From.From.GetTitle] [From.From.GetName]§! ได้ผ่านการทำงาน มีประสบการณ์ และได้พัฒนาทักษะใหม่ๆ"
 leader.substanceabuser:0 "เราได้รายงานบางอย่างที่ค่อนข้างรบกวนใจ เกี่ยวกับสุขภาพที่เสื่อมโทรมของ§H[From.From.GetTitle] [From.From.GetName]§!. [From.From.GetHerHisCap]รูปลักษณ์ของผ้าคลุมหน้า ทําให้ดูเหมือนว่า[From.From.GetSheHe] [From.From.GetHasHave]อายุเกือบ 20 ปี ภาระ หน้า ที่ อาจ เป็น ภาระ หนัก ที่ ต้อง แบก."
 leader.arresteddevelopment:0 "แม้ว่าทักษะล่าสุดจะปรับปรุง จากการสะสมประสบการณ์§H[From.From.GetTitle] [From.From.GetName]§!ดูเหมือนกําลังเข้าใกล้ขีดจํากัดของ[From.From.GetHerHis]ความสามารถ"
 leader.lethargic:0 "ทั้ง ๆ ที่ มี ความ ชํานาญ เมื่อ เร็ว ๆ นี้ การ ริเริ่ม และ การ ตัดสิน ใจ ส่วน ใหญ่ ที่ เคย ขับ รถ§H[From.From.GetTitle] [From.From.GetName]§!ไปข้างหน้าดูเหมือนจะค่อยๆระเหย"
 leader.stubborn:0 "§H[From.From.GetTitle] [From.From.GetName]§!มี ประสบการณ์ มาก ขึ้น แต่ ด้วย ประสบการณ์ เช่น นี้ ได้ เกิด ความ ดื้อ รั้น มาก ขึ้น. เดอะ[From.From.GetTitle]ได้ กลาย เป็น คน หัว แข็ง และ ยาก ที่ จะ ยอม รับ แนว คิด ใหม่ ๆ."


 leader.30.name:0 "ผู้ช่วยเหลือ AI ถูกลบออกไป"
 leader.30.desc:1 "ตามนโยบายล่าสุดของเรา เปลี่ยนการผิดกฎหมายปัญญาประดิษฐ์ใด ๆ[Root.GetAdj]นักวิทยาศาสตร์ที่ครอบครอง§Yผู้ช่วยเหลือ AI ที่มีประสิทธิภาพ§!ถูกบังคับให้บริจาคมันเพื่อรีไซเคิล"

