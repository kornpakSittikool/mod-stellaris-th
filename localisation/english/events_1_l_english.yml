 # Anomaly Events
 ####################################
 anomaly.1.name:0 "ดาวเคราะห์น้อยคอโปรไลต์"
 anomaly.1.desc:0 "แม้จะยอมรับได้ยาก แต่หลักฐานทั้งหมดชี้ว่าดาวเคราะห์น้อย [From.GetName] คือคอโปรไลต์ หรือก้อนอุจจาระฟอสซิลจากสิ่งมีชีวิตขนาดมหึมาบางชนิด มันดูเหมือนจะมีอายุเกือบหนึ่งพันล้านปี และองค์ประกอบอินทรีย์ดั้งเดิมของฟอสซิลส่วนใหญ่ก็ถูกแทนที่ด้วยแร่สะสม นักวิทยาศาสตร์ของเรางุนงงว่าสิ่งมีชีวิตแบบใดจึงจะสร้างสิ่งนี้ขึ้นมาได้"
 anomaly.5.name:0 "สมบัติโจรสลัด"
 anomaly.5.desc:0 "ดูเหมือนว่าดาวเคราะห์น้อยดวงนี้เคยถูกใช้เป็นฐานชั่วคราวของกลุ่มโจรสลัดต่างดาวเมื่อราวหนึ่งพันปีก่อน เมื่อบุกเข้าไปในฐาน เราก็สามารถกู้คลังสมบัติที่ถูกทิ้งไว้ของพวกมันได้ มันประกอบด้วยของกระจุกกระจิกและโบราณวัตถุที่ปล้นมาเป็นส่วนใหญ่ แต่บางชิ้นก็ยังมีมูลค่าอยู่"
 anomaly.5.a:0 "ทรัพย์ที่ได้มาอย่างมิชอบนี้จะเป็นประโยชน์ต่อเรา"
 anomaly.10.name:0 "สิ่งมีชีวิตบนดาวเคราะห์น้อย"
 anomaly.10.desc:0 "น่าทึ่งที่ระหว่างการสำรวจ [From.GetName] ลูกเรือของ [Root.GetName] ตรวจพบสัญญาณชีวิตหลายจุดจากภายในดาวเคราะห์น้อย ดูเหมือนว่าจะมีอาณานิคมของสิ่งมีชีวิตกินหินคล้ายหนอนขุดรูขนาดใหญ่อาศัยอยู่ในเนื้อหินซึ่งเต็มไปด้วยอุโมงค์ สิ่งมีชีวิตอันเป็นเอกลักษณ์เหล่านี้สามารถปรับตัวให้ดำรงชีวิตท่ามกลางความหนาวเย็นของอวกาศได้อย่างน่าประหลาด"
 anomaly.10.a:0 "ควรศึกษาเจ้าสิ่งมีชีวิตพวกนี้"
 anomaly.10.b:0 "พวกมันเหมือนเรา!"
 anomaly.15.name:0 "ฟอสซิลบนดาวเคราะห์น้อย"
 anomaly.15.desc:0 "มีการพบฟอสซิลที่ดูเหมือนจะเป็นของสัตว์น้ำหลายชนิดบนพื้นผิวอันแห้งแล้งและไร้อากาศของ [From.GetName] มีสัญญาณบ่งชี้ว่าแถบดาวเคราะห์น้อยโดยรอบเกิดจากซากของดาวเคราะห์ที่แตกสลาย และการค้นพบนี้ก็ดูเหมือนจะยืนยันทฤษฎีนั้น เมื่อพิจารณาจากฟอสซิลแล้ว ดาวเคราะห์ดวงนั้นเคยรองรับสิ่งมีชีวิตและอย่างน้อยบางส่วนของพื้นผิวก็เคยถูกปกคลุมด้วยน้ำ"
 anomaly.15.b.evopred: "น่าเสียดายที่พวกมันวิวัฒนาการต่อไปไม่ได้"
 anomaly.25.name:0 "อู่ต่อยานร้าง"
 anomaly.25.desc:0 "ส่วนขนาดใหญ่ของดาวเคราะห์น้อย [From.GetName] ถูกคว้านจนกลวงเพื่อเปิดพื้นที่สำหรับสร้างอู่ต่อยานบางประเภท มันถูกทิ้งร้างและเปิดรับสุญญากาศแห่งอวกาศมานานหลายศตวรรษ หากยังมีของมีประโยชน์เหลืออยู่ก็คงถูกนักสำรวจก่อนหน้าเอาไปหมดแล้ว อย่างไรก็ตาม แบบแปลนของอู่ต่อยานเองนั้นมีเอกลักษณ์ และเราอาจเรียนรู้อะไรได้มากจากการศึกษาโครงสร้างของมัน"
 anomaly.25.a:0 "เราควรศึกษาโครงสร้างของมัน"
 anomaly.30.name:0 "กองขยะ"
 anomaly.30.desc:0 "เห็นได้ชัดว่าดาวเคราะห์น้อยดวงนี้เคยถูกใช้เป็นกองขยะโดยใครบางคนในอดีตอันไกลโพ้น เครื่องจักรที่ถูกทิ้งและเศษโลหะทุกประเภทถูกทิ้งไว้ภายในหลุมโน้มถ่วงอันอ่อนแรงของดาวเคราะห์น้อย ก่อนจะค่อยๆ ถูกดึงไปรวมเป็นกองซากที่ปกคลุมพื้นผิวอยู่ในตอนนี้ ที่นี่ไม่มีอะไรมีค่าพิเศษนัก แต่โลหะจำนวนมากสามารถกู้กลับมาใช้ได้ด้วยสถานีเหมือง"
 anomaly.30.a:0 "เราควรรีไซเคิลเท่าที่ทำได้"
 anomaly.35.name:0 "ยานสอดแนมตก"
 anomaly.35.desc:0 "ยานสอดแนมขนาดเล็กบางชนิดพุ่งไถลเข้าใส่พื้นผิวของดาวเคราะห์น้อยดวงนี้เมื่อหลายพันปีก่อน จนเกิดเป็นหุบตื้นๆ ไม่ปรากฏห้องนักบินบนตัวยาน ทำให้เราเชื่อว่ามันถูกควบคุมจากระยะไกลหรือผ่านปัญญาประดิษฐ์แบบดั้งเดิมบางชนิด แม้มันจะเสียหายเกินกว่าจะกู้ซากได้ แต่พวกปล้นซากก็ยังไม่ได้ขนทุกอย่างที่มีค่าออกไป"
 anomaly.35.a:0 "เราจะศึกษาแบบแปลนของมัน"
 anomaly.40.name:0 "ฐานเหมืองอัตโนมัติ"
 anomaly.40.desc:0 "เราตรวจพบฐานเหมืองอัตโนมัติที่สร้างขึ้นในวงโคจรใกล้ดาวเคราะห์น้อย [From.GetName] มีร่องรอยไหม้เกรียมบนลำตัวที่บ่งชี้ถึงความเสียหายจากอาวุธเบา และดูเหมือนสถานที่จะติดอยู่ในลูปป้อนกลับบางอย่าง เราสามารถโปรแกรมระบบของฐานใหม่ได้สำเร็จ และตอนนี้สิ่งอำนวยความสะดวกแห่งนี้ก็อยู่ภายใต้การควบคุมของเราอย่างสมบูรณ์"
 anomaly.40.desc.alt:1 "เราตรวจพบฐานเหมืองอัตโนมัติที่สร้างขึ้นในวงโคจรใกล้ดาวเคราะห์น้อย [From.GetName] มีชิ้นส่วนลำตัวขนาดใหญ่หายไป และรูฉีกขาดที่เห็นก็บ่งชี้ถึงความเสียหายจากอาวุธหนัก สถานีแห่งนี้เกินกว่าจะซ่อมได้แล้ว แต่การกู้ซากจะมอบวัสดุมีค่าให้เรา"
 anomaly.50.name:0 "สนามทดสอบอาวุธ"
 anomaly.50.desc:0 "ดาวเคราะห์น้อย [From.GetName] เต็มไปด้วยหลุมอุกกาบาตจากการยิงอาวุธ และดูเหมือนว่าจะเคยถูกใช้เป็นสนามทดสอบเมื่อราวสองพันปีก่อน ค่าพลังงานตกค้างบ่งชี้ว่าพวกเขาได้ทดสอบอาวุธที่ยิ่งแปลกประหลาดขึ้นเรื่อยๆ รวมถึงระเบิดซับสเปซและเครื่องกำเนิดเอกฐานบางชนิด นักวิทยาศาสตร์ของเราสนใจจะศึกษาคลื่นพลังงานประหลาดที่ยังหลงเหลืออยู่"
 anomaly.55.name:0 "การชนของดาวเคราะห์น้อย"
 anomaly.55.desc:0 "จากการตรวจสอบอย่างละเอียด เราพบว่าดาวเคราะห์น้อยขนาดเล็กกว่าซึ่งแทบประกอบด้วยโลหะมีค่าทั้งหมด เพิ่งชนเข้ากับ [From.GetName] แหล่งสะสมโลหะขนาดเล็กแต่หนาแน่นนี้ถูกซ่อนอยู่ใต้พื้นผิวของดาวเคราะห์น้อย แต่เมื่อถูกค้นพบแล้วก็น่าจะสามารถขุดได้"
 anomaly.55.a:0 "เจอของดีเข้าให้แล้ว!"
 anomaly.60.name:0 "รังสีประหลาด"
 anomaly.60.desc:0 "ดาวเคราะห์น้อยดวงนี้เป็นวัตถุจากต่างระบบที่ถูกจับเข้ามา และดูเหมือนมันจะถูกชะล้างด้วยรังสีประหลาดบางชนิดขณะพุ่งผ่านห้วงอวกาศระหว่างดวงดาว ก่อนจะมาหยุดนิ่งในระบบ [From.GetStarName] ในท้ายที่สุด ต้นกำเนิดของรังสีนี้ยังไม่เป็นที่ทราบแน่ชัด แต่ [Root.GetName] สามารถเก็บข้อมูลทางฟิสิกส์จำนวนมหาศาลได้จากการศึกษาการแผ่พลังงานของดาวเคราะห์น้อย"
 anomaly.65.name:0 "เรือบรรทุกแร่ตก"
 anomaly.65.desc:0 "หลังจากระบุความผิดปกติในหลุมโน้มถ่วงของ [From.GetName] ได้ [Root.GetName] ก็พบซากแตกกระจายของเรือบรรทุกแร่ขนาดยักษ์โบราณที่ฝังลึกอยู่ภายในเปลือกของดาวเคราะห์น้อย มันคงบรรทุกของมาเต็มลำตอนตก และด้วยเหตุนี้การประเมินความมั่งคั่งแร่ธาตุของดาวเคราะห์น้อยจึงถูกปรับเพิ่มขึ้น"
 anomaly.300.name:0 "ระบบนิเวศในชั้นบรรยากาศ"
 anomaly.300.desc:0 "เราค้นพบระบบนิเวศที่รุ่งเรืองอยู่ในบรรยากาศชั้นบนของดาวแก๊สยักษ์ [From.GetName] สิ่งมีชีวิตลอยฟ้าขนาดมหึมาที่วิวัฒนาการให้มีร่างกายเต็มไปด้วยก๊าซเบากว่าอากาศ จะล่องตามกระแสลมและกินพลังงานที่ปล่อยออกมาจากพายุสายฟ้าซึ่งเกิดขึ้นบ่อยครั้งบนดาวแก๊สยักษ์ สิ่งมีชีวิตเหล่านี้ยังรองรับอาณานิคมของสัตว์ขนาดเล็กกว่าซึ่งล่าแพลงก์ตอนในบรรยากาศและล่ากันเองอีกทอดหนึ่ง"
 anomaly.305.name:0 "แคปซูลสินค้าร้าง"
 anomaly.305.desc:0 "มีใครบางคนทิ้งแคปซูลบรรทุกสินค้าไว้ในบรรยากาศชั้นบนของ [From.GetName] เมื่อนานมาแล้ว แต่มันกลับหลุดรอดสายตาของนักเดินทางอวกาศคนอื่นๆ ไปได้ และวงโคจรที่กำลังเสื่อมลงของมันหมายความว่าอีกไม่กี่ปีมันก็คงถูกกลืนหายไปในบรรยากาศอันบดขยี้ของดาวแก๊สยักษ์ เมื่อลูกเรือของ [Root.GetName] เปิดผนึกแคปซูล พวกเขาก็พบเครื่องประดับต่างดาวที่ทำจากโลหะมีค่าซุกซ่อนอยู่"
 anomaly.305.a:0 "หลอมมันซะ"
 anomaly.305.b:0 "ขายมัน"
 anomaly.305.c:0 "ศึกษาวิธีสร้างของมัน"
 anomaly.305.d:0 "เก็บไว้เถอะ"
 anomaly.310.name:0 "การทดลองทางสังคม"
 anomaly.310.desc:0 "มีการพบอาณานิคมลอยฟ้าขนาดเล็กแห่งหนึ่งลอยอยู่เหนือชั้นบรรยากาศของ [From.GetName] ดูเหมือนว่ามันจะพึ่งพาตนเองได้ และยังพบซากของหลายสายพันธุ์อยู่บนสถานีนั้น\n\nเท่าที่เราบอกได้ อาณานิคมแห่งนี้เป็นการทดลองทางสังคมบางประเภทที่ดำเนินขึ้นเมื่อหลายศตวรรษก่อน และจบลงด้วยการที่ผู้ตั้งถิ่นฐานสังหารกันเอง เราได้ดาวน์โหลดข้อมูลทั้งหมดที่พบจากฐานข้อมูลอันจำกัดของอาณานิคมแล้ว"
 anomaly.310.b.evopred: "กู้ชีวมวลกลับมา"
 anomaly.315.name:0 "อาณานิคมลอยฟ้า"
 anomaly.315.desc:0 "สามารถพบเครือข่ายอาณานิคมลอยฟ้าที่พังทลาย ซึ่งมีอายุย้อนกลับไปอย่างน้อยสามพันปี ได้ในวงโคจรต่ำของดาวแก๊สยักษ์ดวงนี้ หน้าที่ดั้งเดิมของมันดูเหมือนจะเป็นการขุดก๊าซ แต่หลังจากนั้นก็ถูกทิ้งร้างและถูกยึดครองใหม่โดยหลากหลายเผ่าพันธุ์และกลุ่มโจรสลัด\n\nอาณานิคมเหล่านี้ถูกกวาดเอาทุกสิ่งที่พอมีค่าหลงเหลืออยู่ออกไปจนหมด แต่เพียงข้อเท็จจริงที่ว่ามันยังลอยอยู่ได้หลังเวลาผ่านไปนานขนาดนี้ ก็ทำให้มันเป็นหัวข้อวิจัยทางวิศวกรรมที่น่าสนใจ"
 anomaly.320.name:0 "ทุ่งเศษซาก"
 anomaly.320.desc:0 "หลุมโน้มถ่วงอันทรงพลังของ [From.GetName] ได้ดึงเอาเศษซากอวกาศจำนวนมหาศาลเข้ามาจนก่อตัวเป็นชั้นหนาแน่นรอบบางส่วนของดาวแก๊สยักษ์ ซากส่วนใหญ่ดูเหมือนจะเป็นผลจากการรบอวกาศหลายครั้งที่เกิดขึ้นในระบบนี้เมื่อหลายพันปีก่อน\n\nพวกเก็บซากได้กวาดเอาเทคโนโลยีและโบราณวัตถุมีค่าจากเศษซากไปหมดแล้ว แต่สถานีเหมืองน่าจะสามารถรีไซเคิลโลหะเหล่านี้ได้"
 anomaly.325.name:0 "ครุยเซอร์แหลกสลาย"
 anomaly.325.desc:0 "สามารถตรวจพบซากแตกกระจายของยานขนาดครุยเซอร์ในวงโคจรที่กำลังเสื่อมลง ลึกเข้าไปในชั้นบรรยากาศของ [From.GetName] ดูเหมือนว่ามันจะพุ่งลึกเข้ามาในบรรยากาศของดาวแก๊สยักษ์ บางทีอาจเป็นความพยายามสิ้นหวังที่จะหนีผู้ไล่ล่า ก่อนจะถูกแรงดันบรรยากาศบดขยี้เสียเอง\n\nตัวเรือลึกเกินกว่าจะกู้ซากได้ แต่การสแกนโครงสร้างของซากได้มอบข้อมูลวิศวกรรมที่น่าสนใจบางอย่างให้เรา"
 anomaly.325.a:0 "เป็นยานที่น่าทึ่ง"
 anomaly.330.name:0 "พายุรุนแรง"
 anomaly.330.desc:0 "[From.GetName] มักเผชิญกับระบบพายุขนาดมหึมาและรุนแรงอย่างยิ่งในชั้นบรรยากาศของมัน จากวงโคจรสามารถมองเห็นพายุถาวรได้หลายสิบลูก โดยลมมักมีความเร็วเกิน 700 ม./วินาที สาเหตุของพายุเหล่านี้ยังไม่ปรากฏชัดในทันที เพราะเราไม่พบสิ่งใดในแบบจำลองสภาพอากาศของดาวที่อธิบายมันได้ ขอแนะนำให้ศึกษาความผิดปกตินี้ต่อไป"
 anomaly.335.name:0 "สัญญาณพลังงาน"
 anomaly.335.desc:0 "[Root.GetName] ตรวจจับสัญญาณพลังงานประหลาดจากที่ใดที่หนึ่งลึกเข้าไปในชั้นบรรยากาศของ [From.GetName] ดูเหมือนว่ามันจะมีต้นกำเนิดจากโครงสร้างบางอย่าง อาจเป็นซากของสถานีวงโคจร แต่แรงดันบรรยากาศทำให้ไม่อาจเข้าใกล้ได้ ถึงกระนั้น การสแกนสัญญาณอันเป็นเอกลักษณ์นี้ก็ให้ข้อมูลฟิสิกส์อันมีค่ามหาศาลแก่เรา"
 anomaly.340.name:0 "ดวงจันทร์ล้ำค่า"
 anomaly.340.desc:0 "การสแกนอย่างละเอียดมากขึ้นของหนึ่งในดาวบริวารธรรมชาติจำนวนมากที่โคจรรอบดาวแก๊สยักษ์ [From.GetName] ได้เผยให้เห็นแหล่งสะสมของโลหะมีค่าและแร่ธาตุที่ถูกมองข้ามไปในการสำรวจเบื้องต้น แม้ดวงจันทร์ดวงนี้จะมีขนาดเล็กมาก แต่มันก็โคจรรอบดาวแม่อย่างเสถียรและดูเหมือนจะมีเสถียรภาพทางธรณีแปรสัณฐาน"
 anomaly.340.a:0 "เป็นการค้นพบที่ยอดเยี่ยม"
 anomaly.600.name:0 "การชนของดาวเคราะห์น้อย"
 anomaly.600.desc:0 "ดาวเคราะห์น้อยขนาดใหญ่ที่อุดมด้วยแร่ธาตุได้พุ่งชน [From.GetName] ในช่วงใดช่วงหนึ่งของหนึ่งพันปีที่ผ่านมา ในเหตุการณ์ที่คงเป็นการชนครั้งใหญ่ ทุกวันนี้สามารถพบแร่ธาตุอุดมสมบูรณ์ได้บน [From.GetPlanetMoon] บริเวณใกล้หลุมอุกกาบาตจากการชน"
 anomaly.600.a:0 "เหตุการณ์ที่ให้โชคแท้ๆ"
 anomaly.605.name:1 "การพุ่งชนแบบความเร็ว"
 anomaly.605.desc:1 "หลุมอุกกาบาตขนาดมหึมาบน [From.GetName] ดูเหมือนจะเป็นผลจากการชนกับยานอวกาศ จากขนาดของหลุม เราสันนิษฐานว่ายานลำหนึ่งที่ออกจากไฮเปอร์เลนด้วยความเร็วสูงสุดได้พุ่งชน [From.GetPlanetMoon] เมื่อราว 10,000 ปีก่อนด้วยเหตุผลที่ไม่อาจทราบได้\n\n[Root.GetName] ตรวจพบเสียงสะท้อนซับสเปซตกค้างใกล้จุดตก ซึ่งคล้ายกับสนามอนุภาคไฮเปอร์ที่ยุบตัวลง แต่เนื่องจากตัวยานสลายไปทันทีเมื่อกระแทก ทฤษฎีนี้จึงไม่อาจยืนยันได้"
 anomaly.610.name:0 "ไมโครเอกฐาน"
 anomaly.610.desc:0 "ไมโครเอกฐานลูกหนึ่งเพิ่งตัดผ่าน [From.GetName] ทะลุผ่านแกนกลางตรงๆ แล้วโผล่ออกไปอีกด้านของ [From.GetPlanetMoon] การเผชิญหน้าครั้งนี้ดูเหมือนจะไม่ก่อให้เกิดความเสียหายถาวรใดๆ แต่ได้เปลี่ยนแปลงกำลังพลังงานของแกนดาวเคราะห์เล็กน้อยในลักษณะที่ขัดกับแบบจำลองวิทยาศาสตร์ปัจจุบันของเรา อาจควรมีการศึกษาเพิ่มเติม"
 anomaly.615.name:0 "การสลับขั้วแม่เหล็ก"
 anomaly.615.desc:0 "สนามแม่เหล็กของ [From.GetName] เกิดการกลับขั้วอย่างสมบูรณ์ขณะที่มันกำลังถูกสังเกตการณ์โดย [Root.GetName] เหตุการณ์หายากนี้ได้สลับตำแหน่งของขั้วแม่เหล็กของ [From.GetPlanetMoon] โชคดีที่ทุกอย่างถูกบันทึกไว้โดยเซ็นเซอร์ของยานเรา มอบข้อมูลอันมีค่าจำนวนมากให้แก่นักวิทยาศาสตร์ของเรา"
 anomaly.625.name:0 "นักบินมัมมี่"
 anomaly.625.desc:0 "มีการพบร่างมัมมี่ของสิ่งมีชีวิตหนึ่งรายจากสายพันธุ์สัตว์เลี้ยงลูกด้วยนมที่เราไม่เคยรู้จักมาก่อน ลอยเคว้งอยู่ในวงโคจรสูงเหนือ [From.GetName] สิ่งมีชีวิตนั้นสวมชุดที่ดูเหมือนชุดนักบินพร้อมหมวกนิรภัย และอาจเป็นนักบินขับไล่ที่ดีดตัวออกมาในสงครามโบราณครั้งหนึ่ง ก่อนจะถูกลืมและทอดทิ้งไว้ การศึกษาศพนี้ได้ให้ข้อมูลที่น่าสนใจแก่เรา"
 anomaly.625.a:0 "ชะตากรรมน่าเศร้า"
 anomaly.625.b.evopred: "เลือดของมันจะไหลเวียนในเส้นเลือดอื่นต่อไป"
 anomaly.630.name:0 "แคปซูลชีพรอดโบราณ"
 anomaly.630.desc:0 "ตรวจพบแคปซูลชีพรอดที่ถูกทิ้งร้างในวงโคจรใกล้ §Y[From.GetName]§! มันเต็มไปด้วยรอยไหม้เกรียม สันนิษฐานว่าเกิดจากตอนยานแม่ของแคปซูลระเบิด และการสแกนเบื้องต้นบ่งชี้ว่ามันถูกสร้างขึ้นเมื่อกว่า 5,000 ปีก่อน\n\nลูกเรือของ [Root.GetName] สามารถเปิดแคปซูลได้ เผยให้เห็นร่างเหี่ยวแห้งของมนุษย์ต่างดาวคล้ายสัตว์เลื้อยคลานที่สวมเครื่องแบบหรูหรา ในกรงเล็บข้างหนึ่งของมันยังคงกำรูปเล็กๆ ของอีกบุคคลหนึ่งจากเผ่าพันธุ์เดียวกันไว้ อาจเป็นคู่ครองหรือผู้นำที่เคารพบูชา"
 anomaly.630.b.evopred: "จะกษัตริย์หรือทาสก็ไม่ต่างกันในรสชาติ"
 anomaly.635.name:0 "อักษรต่างดาว"
 anomaly.635.desc:0 "มีใครบางคนใช้เลเซอร์ทำเหมืองจากวงโคจร เมื่อประมาณห้าพันปีก่อน สลักตัวอักษรขนาดมหึมาลงบนพื้นผิวของ [From.GetName] อักษรขนาดยักษ์นี้ปกคลุมพื้นที่ส่วนใหญ่ของซีกบนของ [From.GetPlanetMoon] และดูเหมือนจะเป็นเรื่องสั้นที่บอกเล่าชีวิตอันยากลำบากของทหารรับจ้างต่างดาวคนหนึ่ง"
 anomaly.650.name:0 "ยานใบสุริยะ"
 anomaly.650.desc:0 "เราค้นพบยานใบสุริยะที่ถูกทิ้งร้างโคจรรอบ §Y[From.GetName]§! ยานความเร็วต่ำกว่าความเร็วแสงลำนี้ถูกสร้างขึ้นโดยวัฒนธรรมที่ไม่รู้จัก และดูเหมือนจะมีอายุหลายพันปี ใบเรือขนาดมหึมาผืนหนึ่งมีรอยฉีกขนาดใหญ่จากวัตถุบางอย่างที่ทะลุผ่านไป ซึ่งน่าจะเป็นอุกกาบาตขนาดเล็ก และดูเหมือนจะเป็นสิ่งที่ทำให้ยานใช้งานไม่ได้ แม้เทคโนโลยีของยานจะล้าสมัยอย่างมาก แต่มันก็ยังมีแนวคิดด้านวิศวกรรมที่น่าสนใจอยู่บ้าง"
 anomaly.650.a:0 "เป็นแบบที่น่าสนใจ แม้จะดั้งเดิมก็ตาม"
 anomaly.655.name:0 "เฉี่ยวชน"
 anomaly.655.desc:0 "ขณะกำลังเข้าใกล้ §Y[From.GetName]§! ยาน §Y[Root.GetName]§! ก็ถูกกระสุนแมสไดรเวอร์หลายลูกที่พุ่งผ่านมาชนเฉียดอย่างกะทันหัน กระสุนเหล่านี้มีอายุหลายพันล้านปี และจากวิถีของมัน ดูเหมือนจะเป็นกระสุนนอกทางที่ถูกยิงมาจากกาแล็กซีข้างเคียง หลังจากพลาดเป้าหมายเดิม มันก็เดินทางต่อมาอีกนับสหัสวรรษจนมาถึงวันนี้ กระสุนที่เรากู้คืนได้มีการออกแบบที่ล้ำหน้าอย่างน่าทึ่ง แม้จะมีอายุเก่าแก่เหลือเชื่อ"
 anomaly.660.name:0 "ดาวเคราะห์น้อยที่ถูกลากมา"
 anomaly.660.desc:1 "ด้วยเหตุผลบางอย่าง มีใครบางคนลากดาวเคราะห์น้อยก้อนหนึ่งมาไว้ในวงโคจรที่เสถียรรอบ §Y[From.GetName]§! ยังสามารถพบชิ้นส่วนเครื่องยนต์ขนาดมหึมาและตัวขับเบรกได้บนพื้นผิว แม้ว่ามันจะใช้งานไม่ได้มานานแล้วก็ตาม ผู้ที่ทำเช่นนี้ยังได้ทำเหมืองแร่จากดาวเคราะห์น้อยด้วย แต่ปฏิบัติการเหล่านั้นดูเหมือนจะถูกทิ้งร้างไม่นานหลังจากเริ่มต้น"
 anomaly.660.b:0 "ต่างดาวที่พอมีสามัญสำนึก!"
 anomaly.670.name:0 "การทำลายล้างของนิวเคลียร์"
 anomaly.670.desc:0 "การสำรวจ §Y[From.GetName]§! ของเราเผยว่า เมื่อเพียงราวหนึ่งพันปีก่อน มันยังเคยเป็น [From.GetPlanetMoon] แบบทวีปที่บริสุทธิ์และมีภูมิอากาศอ่อนโยน ตรงกันข้ามอย่างสิ้นเชิงกับปัจจุบันที่ชั้นบรรยากาศเป็นพิษอย่างรุนแรง พื้นผิวมีรังสีสูง และโลกนี้ก็สูญเสียความสามารถในการรองรับชีวิตไปนานแล้ว\n\nเราตรวจพบร่องรอยว่า [From.GetPlanetMoon] แห่งนี้เคยเป็นสมรภูมิของสงครามนิวเคลียร์ความร้อนที่ทำลายล้างอย่างยิ่ง ระหว่างฝ่ายต่างๆ ของอารยธรรมพื้นเมืองก่อนยุคอวกาศที่ค่อนข้างก้าวหน้า"
 anomaly.670.a:0 "ช่างสูญเปล่า"
 anomaly.675.name:0 "แดนรกร้างนิวเคลียร์"
 anomaly.675.desc_01:0 "การสำรวจ §Y[From.GetName]§! เผยว่า [From.GetPlanetMoon] กำลังเผชิญยุคน้ำแข็งซึ่งดูเหมือนจะถูกกระตุ้นโดยสงครามนิวเคลียร์ความร้อนระดับโลกเมื่อหลายศตวรรษก่อน สิ่งมีชีวิตชั้นสูงส่วนใหญ่ถูกทำลายล้างจากฤดูหนาวนิวเคลียร์ที่ตามมา รวมถึงอารยธรรมหลังยุคอะตอมที่เป็นผู้เริ่มการแลกเปลี่ยนหายนะครั้งนั้นด้วย"
 anomaly.675.desc_02:0 "การสำรวจ §Y[From.GetName]§! ยืนยันว่า [From.GetPlanetMoon] แห่งนี้เคยเป็นสวรรค์เขตร้อนที่รุ่งเรือง ก่อนจะถูกทำลายราบด้วยสงครามนิวเคลียร์ความร้อนระดับโลกเมื่อหลายศตวรรษก่อน สิ่งมีชีวิตชั้นสูงส่วนใหญ่ รวมถึงอารยธรรมหลังยุคอะตอมที่เป็นผู้เริ่มการแลกเปลี่ยนหายนะครั้งนั้น ถูกสังหารไปในดินแดนรกร้างเปื้อนรังสีที่เหลืออยู่หลังฝุ่นควันจางลง"
 anomaly.680.name:0 "ระเบิดรังสีแกมมา"
 anomaly.680.desc:0 "เมื่อ 24,000 ปีก่อน §Y[From.GetName]§! เคราะห์ร้ายที่อยู่ตรงแนวทางของระเบิดรังสีแกมมายาวจากดาวฤกษ์ที่กำลังยุบตัวภายในกาแล็กซีของเรา [From.GetPlanetMoon] ถูกชะล้างด้วยรังสีร้ายแรง ซึ่งไม่เพียงก่อให้เกิดอาการพิษรังสีเฉียบพลันแก่สิ่งมีชีวิตส่วนใหญ่ในด้านของ [From.GetName] ที่หันเข้าหาการระเบิดเท่านั้น แต่ยังทำลายชั้นโอโซนไปเป็นจำนวนมากด้วย\n\nเหตุการณ์สูญพันธุ์ครั้งนี้คร่าชีวิตชีวภาพไปประมาณ 86% รวมถึงอารยธรรมยุคสำริดตอนต้นแห่งหนึ่ง ซึ่งซากปรักหักพังของพวกเขายังคงพบได้ในบางพื้นที่ของซีกโลกเหนือ ชีวภาคเพิ่งจะเริ่มแสดงสัญญาณฟื้นตัวในตอนนี้"
 anomaly.685.name:0 "ภาวะเรือนกระจกเกินควบคุม"
 anomaly.685.desc:0 "มีหลักฐานว่าภูมิอากาศปัจจุบันของ §Y[From.GetName]§! เป็นผลจากภาวะเรือนกระจกเกินควบคุมที่ถูกกระตุ้นโดยมลพิษปริมาณมหาศาล มหาสมุทรได้เดือดแห้งไปหมด และ [From.GetPlanetMoon] ถูกห่อหุ้มอย่างถาวรด้วยชั้นเมฆหนาทึบจากบรรยากาศอันหนาแน่น\n\nยังคงพบซากปรักหักพังของอารยธรรมพื้นเมืองกระจัดกระจายอยู่บนพื้นผิว ซึ่งบ่งชี้ถึงวัฒนธรรมที่มีประชากรหนาแน่นเกินไปและล่มสลายในช่วงกลางถึงปลายของยุคอุตสาหกรรม"
 anomaly.690.name:0 "ชีวภาคแอมโมเนีย"
 anomaly.690.desc:0 "แม้จะเป็นพิษต่อรูปแบบชีวิตที่เรารู้จักส่วนใหญ่ แต่ §Y[From.GetName]§! ก็รองรับระบบนิเวศที่รุ่งเรืองภายใต้ความดันสูงในชั้นบรรยากาศของมัน สิ่งมีชีวิตที่นี่ใช้แอมโมเนียแทนน้ำเป็นตัวทำละลาย และพัฒนาไปในทิศทางที่แตกต่างจากแบบจำลองนิเวศวิทยาที่เรายึดถือมาก่อนอย่างชัดเจน การศึกษามันจะเป็นประโยชน์อย่างยิ่งต่อองค์ความรู้ด้านชีววิทยาต่างดาวของเรา"
 anomaly.695.name:0 "สิ่งมีชีวิตซิลิคอน"
 anomaly.695.desc:0 "สิ่งมีชีวิตคล้ายการขุดรูที่มีพื้นฐานเป็นซิลิคอนบางชนิด อาศัยอยู่ในเครือข่ายอุโมงค์มหึมาใต้พื้นผิวอันแห้งแล้งของ [From.GetName] เท่าที่เราบอกได้ สิ่งมีชีวิตเหล่านี้กินหินเป็นอาหาร และมีหลักฐานบ่งชี้ว่าพวกมันมีสติปัญญาในระดับพื้นฐาน การขุดเจาะของพวกมันได้พาแร่ธาตุมีค่าจำนวนมากขึ้นมาสู่พื้นผิว"
 anomaly.700.name:0 "คนงานเหมืองเถื่อน"
 anomaly.700.desc:0 "กลุ่มคนงานเหมืองเถื่อนจาก §Y[Root.Owner.Capital.GetName]§! ได้ตั้งปฏิบัติการทำเหมืองที่ไม่ได้รับอนุญาตบน [From.GetName] ไปแล้ว คนงานเหล่านี้ถูกควบคุมตัว และเราได้ยึดสถานีผิดกฎหมายของพวกเขามาอยู่ในการควบคุมของเรา"
 anomaly.705.name:0 "เครื่องหมายการสำรวจโบราณ"
 anomaly.705.desc:0 "เครื่องส่งสัญญาณระยะสั้นขนาดเล็กตั้งอยู่บนพื้นผิว §Y[From.GetName]§! ดูเหมือนจะเป็นเครื่องหมายการสำรวจโบราณซึ่งตั้งไว้ที่นี่เมื่อหลายพันปีก่อน เพื่อทำเครื่องหมายว่ามีการทับถมของโลหะที่มีค่าจำนวนมาก คนงานเหมืองของพวกเขายังไม่เคยถูกส่งมาที่นี่ เพราะยังมีโลหะอยู่เต็มไปหมด"
 anomaly.710.name:0 "อาณานิคมพลัดแยก"
 anomaly.710.desc:0 "สร้างความประหลาดใจอย่างมากแก่ลูกเรือของ §Y[Root.GetName]§! เมื่อพวกเขาบังเอิญพบชุมชนเล็กๆ ของ [Root.Owner.GetSpeciesName] บนพื้นผิวของ [From.GetName] อาณานิคมนี้ก่อตั้งขึ้นโดยกลุ่มผู้บุกเบิกผู้กล้าหาญซึ่งออกเดินทางจาก [Root.Owner.Capital.GetName] เมื่อนานมาแล้วด้วยยานอวกาศแบบดั้งเดิม จนถึงตอนนี้ เรายังคาดว่ายานของพวกเขาสูญหายไปแล้ว\n\nอาณานิคมแห่งนี้ไปได้ไม่ดีนัก และจำนวนประชากรก็ค่อยๆ ลดลงอย่างต่อเนื่องตลอดหลายชั่วอายุคนที่ผ่านมา ผู้รอดชีวิตได้ร้องขอให้กลับเข้าร่วมกับ [Root.Owner.GetName] อีกครั้ง"
 anomaly.710.a:0 "ยินดีต้อนรับกลับสู่พวกเรา!"
 anomaly.710.b:0 "ปล่อยให้พวกเขาดูแลตัวเอง"
 anomaly.715.name:0 "ซากอาณานิคม"
 anomaly.715.desc:0 "อารยธรรมต่างดาวแห่งหนึ่งได้ก่อตั้งอาณานิคมขนาดเล็กบน [From.GetName] เมื่อราว 17,000 ปีก่อน แต่ดูเหมือนว่ามันจะถูกทิ้งร้างหลังจากนั้นไม่นาน ไม่พบซากของผู้ตั้งถิ่นฐานใดๆ และอาณานิคมก็ดูเหมือนจะไม่ได้ขยายตัวไปไกลกว่าชุมชนหลัก นอกจากสถานีอุตุนิยมวิทยาไม่กี่แห่ง"

 anomaly.2500.name:0 "ซากสิ่งมีชีวิต"
 anomaly.2500.desc:0 "มีการค้นพบซากศพของสิ่งมีชีวิตขนาดใหญ่หลายตัวที่สามารถเดินทางในอวกาศได้ อยู่ในวงโคจรที่กำลังเสื่อมลงรอบดาวแก๊สยักษ์ [From.GetName] สิ่งมีชีวิตที่ไร้สติปัญญาเหล่านี้ดูเหมือนจะมีความสามารถในการเดินทางระหว่างดวงดาว แต่ไม่เคยมีบันทึกการพบเห็นพวกมันในอวกาศที่มีการสำรวจแล้ว เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] เสนอว่าเราควรทุ่มทรัพยากรเพิ่มเติมเพื่อทำการวิเคราะห์อย่างละเอียดกว่านี้"
 anomaly.2501.desc:0 "เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] สรุปได้ว่า [From.From.GetName] เคยทำหน้าที่เป็นสุสานวงโคจร สถานที่ที่สมาชิกของสายพันธุ์ต่างดาวที่ตายแล้วซึ่งเราพบมานอนตาย แรงโน้มถ่วงจัดการส่วนที่เหลือ โดยค่อยๆ ดึงซากเหล่านี้ตกลงสู่ดาวแก๊สยักษ์ตลอดช่วงเวลาหลายล้านปี\n\nวัฏจักรโบราณนี้ดูเหมือนจะหยุดลงอย่างกะทันหันเมื่อ 15 ล้านปีก่อน เมื่อสิ่งมีชีวิตตัวสุดท้ายมาถึง เราทำได้เพียงคาดเดาว่าพวกมันถูกล่าจนสูญพันธุ์โดยอารยธรรมอวกาศ หรือพบจุดจบจากหายนะอย่างอื่น"
 anomaly.2510.name:0 "มหาสมุทรใต้ผืนน้ำแข็ง"
 anomaly.2510.desc:1 "การสแกนเชิงลึกของ [From.GetName] เผยให้เห็นมหาสมุทรขนาดใหญ่ซึ่งได้รับความร้อนจากปล่องน้ำร้อนใต้พิภพใต้ชั้นน้ำแข็งที่ปกคลุมพื้นผิว [Owner.GetScientist] [Root.GetLeaderName] หัวหน้าคณะได้ส่งโพรบจาก [Root.GetName] ลงไปเจาะผ่านน้ำแข็งหนาหลายไมล์ และพบว่าน้ำเบื้องล่างเต็มไปด้วยสิ่งที่ดูเหมือนจะเป็นชีวิต เราจะต้องใช้ทรัพยากรเพิ่มเติมเพื่อศึกษาสิ่งมีชีวิตอันเป็นเอกลักษณ์จำนวนมากที่อาศัยอยู่ในมหาสมุทรแห่งนี้อย่างละเอียด"
 anomaly.2512.desc:2 "[Owner.GetScientist] [Root.GetLeaderName] หัวหน้าคณะได้กลับมาจากคณะสำรวจที่ศึกษาชีวภาคอันอุดมสมบูรณ์ในทะเลใต้ชั้นน้ำแข็งของ [From.From.GetName] มีการพบว่าสิ่งมีชีวิตขนาดใหญ่หลายชนิดซึ่งมีถิ่นกำเนิดในบริเวณลึกของทะเลทั่วโลก สามารถผลิตโมเลกุลอนินทรีย์อันเป็นเอกลักษณ์ที่มีคุณสมบัติในการรักษาอย่างมหาศาล หากสามารถเก็บเกี่ยวโมเลกุลนี้ได้สำเร็จในปริมาณมากพอ มันอาจปฏิวัติวงการแพทยศาสตร์ และอาจมีการประยุกต์ใช้ทางอุตสาหกรรมด้วย!"
 anomaly.2512.desc.mach:1 "[Owner.GetScientist] [Root.GetLeaderName] หัวหน้าคณะได้กลับมาจากคณะสำรวจที่ศึกษาชีวภาคในทะเลใต้ชั้นน้ำแข็งของ [From.From.GetName] มีการพบว่าสิ่งมีชีวิตขนาดใหญ่หลายชนิดซึ่งมีถิ่นกำเนิดในบริเวณลึกของทะเลทั่วโลก สามารถผลิตโมเลกุลอนินทรีย์อันเป็นเอกลักษณ์ที่มีคุณสมบัติในการรักษาอย่างมหาศาล\n\nหากสามารถเก็บเกี่ยวโมเลกุลนี้ได้สำเร็จในปริมาณมากพอ มันอาจปฏิวัติการดูแลทางการแพทย์สำหรับดาราศาสตร์ชีวภาพอันเป็นที่รักของเรา และอาจมีการประยุกต์ใช้ทางอุตสาหกรรมด้วย!"
 anomaly.2513.desc:1 "[Owner.GetScientist] [Root.GetLeaderName] หัวหน้าคณะได้กลับมาจากคณะสำรวจที่ศึกษาชีวภาคอันอุดมสมบูรณ์ในทะเลใต้ชั้นน้ำแข็งของ [From.From.GetName] โพรบใต้น้ำของเราได้ทำแผนที่ภูมิประเทศและจัดทำสารบบสิ่งมีชีวิตส่วนใหญ่แล้ว แม้ข้อมูลนี้อาจมีประโยชน์อยู่บ้างต่อนักชีววิทยาของเรา แต่ก็ไม่ได้มีการค้นพบใดเป็นพิเศษที่สามารถประยุกต์ใช้นอกเหนือจากนั้นได้"
 anomaly.2520.name:0 "โครงกระดูกมหึมา"
 anomaly.2520.desc:0 "สิ่งที่ก่อนหน้านี้เคยถูกคิดว่าเป็นเทือกเขากระจัดกระจายในซีกโลกใต้ของ [From.GetName] ได้รับการระบุแล้วว่าเป็นซากโครงกระดูกขนาดมหึมาของสิ่งมีชีวิตต่างดาวขนาดยักษ์เพียงตัวเดียว\n\nกระดูกเหล่านี้มีอายุถึง 3.4 พันล้านปี แต่ [Owner.GetScientistPlural] ของเราตัดความเป็นไปได้ที่ [From.GetName] จะเคยรองรับสิ่งมีชีวิตในขนาดนั้น ณ ช่วงเวลาใดก็ตามในประวัติศาสตร์ของ [From.GetPlanetMoon] ออกไปแล้ว [Owner.GetScientistCapital] [Root.GetLeaderName] ได้เตรียมโครงการวิจัยพิเศษเพื่อเจาะลึกปริศนานี้ต่อไป"
 anomaly.2520.a.term:0 "เราอาจได้เรียนรู้วิธีการกำจัดแบบใหม่"
 anomaly.2520.a.rean:0 "ทำให้มันขยับได้อีกไหม?"
 anomaly.2521.desc:1 "หลังจากศึกษาซากโครงกระดูกขนาดมหึมาที่พบบน [From.From.GetName] อย่างต่อเนื่อง เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ได้ข้อสรุปว่าสิ่งมีชีวิตนี้เคยทำหน้าที่เป็นยานอวกาศอินทรีย์บางประเภท ภายในโครงกระดูกใหญ่ยังพบกระดูกที่เล็กกว่ามากจากอย่างน้อยสามสายพันธุ์แยกกัน และเราสันนิษฐานว่ากระดูกเหล่านั้นมาจากลูกเรือ\n\nด้วยเหตุผลที่ไม่ทราบแน่ชัด ยานอวกาศอินทรีย์ลำนี้ได้รับความเสียหายอย่างหายนะและตกกระแทกบน [From.From.GetName] แม้เราจะยังไม่อาจเริ่มเข้าใจวิศวกรรมชีวภาพที่จำเป็นต่อการเพาะยานอวกาศเช่นนี้ขึ้นมาได้ แต่การศึกษากระดูกเหล่านี้เพียงอย่างเดียวก็ได้ยกระดับองค์ความรู้ของเราไปมากแล้ว"
 anomaly.2521.desc.bio: "หลังจากศึกษาซากโครงกระดูกมหึมาบน [From.From.GetName] อย่างถี่ถ้วน เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ได้ยืนยันสิ่งที่ดูเป็นไปไม่ได้ว่า นี่เคยเป็นยานอวกาศมีชีวิต สิ่งมีชีวิตนี้แทบไม่คล้ายกับยานชีวภาพของเราเลย\n\nโครงสร้างของมันชวนพิศวง ทั้งคุ้นเคยและแปลกแยก ราวกับถูกหล่อหลอมขึ้นจากปรัชญาวิวัฒนาการที่ต่างออกไปโดยสิ้นเชิง กระดูกขนาดเล็กกว่าซึ่งเป็นของอย่างน้อยสามสายพันธุ์ ถูกพบซุกอยู่ภายในกรงซี่โครงอันมหึมาของมัน บ่งชี้ว่ามันเคยบรรทุกลูกเรือไว้ภายในร่างกายตัวเอง ความคิดนี้ชวนไม่สบายใจนัก เมื่อเทียบกับยานของเราเองที่อยู่ร่วมกันแบบพึ่งพา ไม่ใช่เพียงเปลือกกลวงให้เข้าไปอาศัย\n\nสาเหตุการตายยังไม่ชัดเจน แต่ความเสียหายนั้นร้ายแรงอย่างยิ่ง โครงร่างขนาดมหึมาของมันแตกสลายขณะพุ่งตกสู่พื้นผิวดาวเคราะห์ ลูกเรือของมันตายไปพร้อมกันหรือไม่ หรือพวกเขาเป็นบางสิ่งที่มากกว่านั้น เป็นปัญญานำทางที่ไม่อาจแยกออกจากตัวสิ่งมีชีวิตนั้นเอง?\n\nแม้เราอาจไม่มีวันคลี่คลายต้นกำเนิดของมันได้ทั้งหมด แต่การศึกษาซากของมันก็ทำให้เราเข้าใจมากขึ้นว่ายานที่มีชีวิตหมายถึงอะไร ถึงกระนั้นก็ยังมีคำถามชวนกังวลค้างคาอยู่ มันถูกสร้างขึ้น... หรือมันถือกำเนิดขึ้นกันแน่?"
 anomaly.2521.b.evopred: "เราควรเริ่มกินนักบิน หรือกินยานก่อนดี?"
 anomaly.2522.desc:1 "การศึกษาซากโครงกระดูกมหึมาบน [From.From.GetName] อย่างต่อเนื่องของเรา ทำให้สามารถคลี่คลายได้บ้างว่าสิ่งมีชีวิตนี้มาลงเอยบน [From.From.GetPlanetMoon] ได้อย่างไร มีค่าพลังงานตกค้างที่แผ่วเบามากบ่งชี้ว่าเคยมีประตูมิติบางชนิดปรากฏอยู่ชั่วขณะบริเวณด้านท้ายของโครงกระดูก\n\nเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ตั้งทฤษฎีว่าสิ่งมีชีวิตนี้ผ่านประตูดังกล่าวมาจากอีกมิติหนึ่ง ก่อนจะตายลงอย่างรวดเร็วในสภาพแวดล้อมอันไม่เป็นมิตรของ [From.From.GetName] เหตุใดมันจึงทำเช่นนั้น และมันมาจากที่ใด อาจเป็นคำถามที่ไม่มีวันได้คำตอบ"
 anomaly.2522.b.evopred: "ไม่ว่ามันจะมาจากมิติไหนดีเอ็นเอก็คือดีเอ็นเอ!"
 anomaly.2523.desc:0 "ซากโครงกระดูกกำลังเคลื่อนไหวอีกครั้ง! อสูรกายตนนั้นสูงตระหง่านเหนือเหล่านักเวทปลุกศพของเรา ขณะมันก้าวอย่างสั่นคลอนหนึ่งก้าว ตามด้วยอีกก้าวที่มั่นคงขึ้น มันอาจไม่มีจำนวนขาเท่าเดิมอย่างตอนมีชีวิต หรือมีจำนวนอวัยวะที่ถูกต้องครบถ้วน แต่ด้วยการผสานกล้ามเนื้อที่เพาะในห้องแล็บเข้ากับชิ้นส่วนไฮดรอลิกทดแทนอันทันสมัย ยักษ์ตนนี้ก็พร้อมจะช่วยเราในทุกสนามรบ และผืนดินใต้ฝ่าเท้าของมันจะสั่นสะเทือน"
 anomaly.2523.tooltip:0 "เพิ่ม §G1§! §Yกองทัพ ยักษ์§! ในวงโคจร"
 anomaly.2530.name:0 "ร่องรอยการสู้รบ"
 anomaly.2530.desc:0 "มีหลักฐานชัดเจนว่าการรบอวกาศครั้งมหึมาเคยเกิดขึ้นในวงโคจรใกล้ [From.GetName] ณ ช่วงใดช่วงหนึ่งในช่วง 5,000 ปีที่ผ่านมา พื้นผิวด้านหนึ่งของ [From.GetPlanetMoon] เต็มไปด้วยหลุมอุกกาบาตจากการยิงอาวุธที่หลุดเป้า และการสแกนจาก [Root.GetName] ก็ตรวจพบซากยานหลายลำบนพื้นดิน\n\nแม้ยานที่พังยับเหล่านี้จะอยู่ในสภาพย่ำแย่มาก แต่การที่ยังมีสิ่งใดหลงเหลืออยู่ได้หลังจากความเสียหายที่มันต้องเผชิญ ก็เป็นข้อพิสูจน์ถึงการออกแบบอันล้ำหน้าของมัน เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] กำลังเตรียมคณะสำรวจเพื่อคุ้ยค้นซากยานเหล่านี้ หาเทคโนโลยีมีค่าใดๆ ที่อาจหลงเหลืออยู่"
 anomaly.2530.desc.bio: "มีหลักฐานที่ปฏิเสธไม่ได้ว่าเคยเกิดการต่อสู้ครั้งมหึมาของยานอวกาศมีชีวิตขึ้นบนท้องฟ้าเหนือ [From.GetName] ในช่วงใดช่วงหนึ่งของ 5,000 ปีที่ผ่านมา พื้นผิวของ [From.GetPlanetMoon] เต็มไปด้วยบาดแผลลึก หลุมกระแทกขนาดมหึมาซึ่งเป็นจุดที่ยานใกล้ตายพุ่งตกลงมาจากวงโคจร เปลือกที่แตกฉีกของพวกมันระเบิดกระจายราวกับผลไม้สุกงอมเมื่อกระแทกพื้น แม้ในตอนนี้ก็ยังมีคราบอินทรีย์ที่แห้งกรังมานานและกระดูกอ่อนที่กลายเป็นฟอสซิลหลงเหลืออยู่ในภูมิประเทศอันแตกระแหง\n\nซากของสิ่งมีชีวิตผู้เคยสง่างามเหล่านี้แทบจำไม่ได้แล้ว โครงสร้างชีวภาพของพวกมันบิดเบี้ยวและแข็งกลายเป็นหินตามกาลเวลา ถึงกระนั้น การที่ยังมีสิ่งใดคงอยู่ได้หลังผ่านการผุพังและการเปิดรับสภาพแวดล้อมมาหลายสหัสวรรษ ก็สะท้อนถึงความทรหดอันน่าทึ่งของพวกมัน เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] กำลังเตรียมคณะสำรวจเพื่อศึกษามหึมาฟอสซิลเหล่านี้ โดยหวังจะค้นหาร่องรอยของสถาปัตยกรรมพันธุกรรมหรือสิ่งมีชีวิตพึ่งพาที่ถูกออกแบบทางชีวภาพ ความลับที่อาจยังเต้นแผ่วอยู่ด้วยชีวิตที่หลับใหล"
 anomaly.2531.desc:1 "คณะของเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ได้เสร็จสิ้นภารกิจสำรวจบน [From.From.GetName] และกลับมายัง [Root.GetName] แล้ว โชคดีที่สุสานยานอวกาศบนพื้นผิวพิสูจน์แล้วว่าเป็นขุมทรัพย์ทางเทคโนโลยี\n\nการศึกษาซากของยานเหล่านี้ได้เร่งการวิจัยของเราในบางสาขาไปอีกหลายปี และยังคงมีสิ่งให้ค้นพบอีกมาก ด่านวิทยาศาสตร์ถาวรในวงโคจรจะเป็นประโยชน์อย่างยิ่งต่อความพยายามด้านวิศวกรรมยานอวกาศของเรา"
 anomaly.2532.desc:1 "คณะของเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ได้เสร็จสิ้นภารกิจสำรวจบน [From.From.GetName] และกลับมายัง [Root.GetName] แล้ว น่าเสียดายที่ยานอวกาศที่พังยับบนพื้นผิวเสียหายหนักเกินกว่าจะกู้เทคโนโลยีที่เป็นประโยชน์ใดๆ ได้\n\nอย่างไรก็ตาม ยานเหล่านี้เห็นได้ชัดว่าล้ำหน้ามาก และเราอาจได้รับข้อมูลเชิงวิศวกรรมอันมีค่าหากวิเคราะห์แนวทางการออกแบบของมัน เราควรพิจารณาสร้างด่านวิทยาศาสตร์ถาวรในวงโคจร"
 anomaly.2532.desc.bio: "คณะของเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ได้เสร็จสิ้นการสำรวจอันโหดหินบน [From.From.GetName] และกลับมายัง [Root.GetName] แล้ว น่าเสียดายที่กาลเวลาไม่ปรานีซากของยานอินทรีย์โบราณเหล่านี้ โครงสร้างที่เคยมีชีวิตของมันได้กลายเป็นฟอสซิลหรือพังทลายเป็นเปลือกแคลเซียมเปราะๆ ไปนานแล้ว จนแทบไม่เหลือสิ่งใดมีค่าพอจะกู้คืนได้ในทันที\n\nแต่แม้ในความตาย การออกแบบของมันก็ยังสะท้อนถึงสิ่งน่าอัศจรรย์ที่เกินกว่าความเข้าใจของเราในปัจจุบัน โครงข่ายอันสลับซับซ้อนของโครงกระดูกที่ผ่านวิศวกรรมชีวภาพ ร่องรอยหลงเหลือของมัดกล้ามเนื้อที่ครั้งหนึ่งเคยตอบสนองได้ และเค้าลางของสถาปัตยกรรมประสาทที่ล้ำลึกเกินกว่าที่เราจะหยั่งถึง ล้วนชี้ถึงระดับความซับซ้อนทางเทคโนโลยีที่เรียกร้องให้มีการศึกษาเพิ่มเติม การตั้งฐานวิจัยถาวรในวงโคจรอาจเป็นกุญแจสำคัญในการไขความลับของยักษ์ใหญ่ที่สูญพันธุ์ไปนานเหล่านี้"
 anomaly.2540.name:0 "ภาพสลักต่างดาว"
 anomaly.2540.desc:0 "ระหว่างทำการสแกนพื้นผิวของ [From.GetName] [Owner.GetScientistCapital] [Root.GetLeaderName] บน [Root.GetName] ได้ค้นพบแผ่นหินที่ดูเหมือนถูกแกะสลักขึ้นอย่างจงใจและปกคลุมไปด้วยอักษรต่างดาว ไม่พบสัญญาณกิจกรรมต่างดาวอื่นใดบน [From.GetPlanetMoon] และที่มาที่ไปว่าภาพสลักนี้มาอยู่ที่นี่ได้อย่างไรก็ยังเป็นปริศนา เราได้เตรียมโครงการพิเศษเพื่อแปลข้อความดังกล่าวแล้ว"
 anomaly.2541.desc:0 "[Owner.GetScientistCapital] [Root.GetLeaderName] สามารถแปลภาพสลักต่างดาวที่พบบน [From.From.GetName] ได้บางส่วน มันเป็นอนุสรณ์สถานแด่เผ่าพันธุ์ต่างดาวที่สูญพันธุ์ไปแล้ว ซึ่งครั้งหนึ่งเคยปกครองจักรวรรดิระหว่างดวงดาวขนาดเล็กในบริเวณนี้ของกาแล็กซี ดูเหมือนว่าพวกเขาจะถูกกวาดล้างโดยผู้สร้างภาพสลักนี้เอง ซึ่งเป็นข้อเท็จจริงที่ดูเหมือนผู้สร้างจะรู้สึกเสียใจ\n\nเมื่อพิจารณาว่าภาพสลักนี้มีอายุเกินกว่า 300 ล้านปี ก็เป็นไปได้สูงว่าผู้สร้างของมันก็คงสูญพันธุ์ไปแล้วเช่นกัน บางทีสิ่งที่น่าสนใจที่สุดอาจเป็นวัสดุที่ใช้สร้างภาพสลักนี้ แม้จะเก่าแก่ขนาดนี้ แต่มันกลับยังคงสภาพได้ดีอย่างน่าทึ่ง"
 anomaly.2542.desc:0 "[Owner.GetScientistCapital] [Root.GetLeaderName] สามารถแปลภาพสลักต่างดาวที่พบบน [From.From.GetName] ได้บางส่วน ข้อความบนมันบรรจุข้อมูลปริมาณมหาศาลอย่างน่าตกตะลึง และเห็นได้ชัดว่าภาพสลักนี้ทำหน้าที่คล้ายห้องสมุดเทคโนโลยีต่ำบางประเภท มันอธิบายองค์ความรู้ทางเทคโนโลยีที่สั่งสมไว้ของอารยธรรมต่างดาวซึ่งเคยครอบงำภูมิภาคนี้ของกาแล็กซีเมื่อราว 80 ล้านปีก่อนในภาพกว้างๆ\n\nข้อมูลจำนวนมากเป็นสิ่งที่เรารู้อยู่แล้ว แต่ก็ยังมีแนวทางที่น่าสนใจหลายประการสำหรับเทคโนโลยีที่เราไม่เคยนึกถึงมาก่อน ข้อมูลที่นี่มีมากพอจะทำให้นักวิทยาศาสตร์ของเรายุ่งไปได้อีกหลายทศวรรษ แต่เราจำเป็นต้องมีศูนย์วิจัยในวงโคจรเพื่อสานต่อความพยายามในการแปล"
 anomaly.2550.name:0 "อู่ต่อยานอัตโนมัติ"
 anomaly.2550.desc:0 "ระหว่างทำการสำรวจ [From.GetName] [Root.GetName] ตรวจพบซากของอู่ต่อยานอัตโนมัติในวงโคจร มันมีอายุอย่างน้อยหนึ่งพันปีและดูเหมือนจะเคยถูกระดมยิงด้วยขีปนาวุธอย่างหนัก แต่ช่องการผลิตหนึ่งช่องยังคงใช้งานได้อยู่\n\nเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] มั่นใจว่าเราสามารถฟื้นพลังงานให้อู่ต่อยานนี้ได้ แต่ก็คงเป็นโครงการขนาดใหญ่พอสมควร"
 anomaly.2550.desc.bio: "ระหว่างสำรวจ [From.GetName] [Root.GetName] ได้ค้นพบสิ่งน่าตกตะลึง ซากผุพังของแหล่งฟักกำเนิดในอวกาศโบราณ โครงสร้างอินทรีย์ขนาดมหึมาที่ครั้งหนึ่งเคยสามารถให้กำเนิดยานอวกาศได้ มันลอยนิ่งอยู่ในความเงียบ เยื่อหุ้มชั้นนอกแตกฉีกและเหี่ยวแห้งจากสิ่งที่ดูเหมือนจะเป็นการระดมยิงอย่างโหดเหี้ยมเมื่อหลายศตวรรษก่อน ท่อหลอดเลือดของมันส่วนใหญ่กลายเป็นหิน โครงข่ายประสาทไม่ตอบสนอง... แต่กระนั้น ห้องฟักหนึ่งห้องก็ยังขยับแผ่วเบา เครื่องปฏิกรณ์ของมันยังเต้นช้าๆ ด้วยชีวิตที่หลงเหลืออยู่\n\nเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] เชื่อว่าหากแทรกแซงอย่างระมัดระวัง เราอาจปลุกสิ่งมีชีวิตที่หลับใหลนี้ให้ฟื้นขึ้นมาได้ อย่างน้อยก็บางส่วน อย่างไรก็ตาม นี่จะเป็นกระบวนการที่ละเอียดอ่อนและกินเวลานาน และไม่อาจมองข้ามความเสี่ยงของปฏิกิริยาทางชีวภาพที่ไม่คาดคิดได้"
 anomaly.2551.desc:1 "[Root.GetFleetName] สามารถฟื้นพลังงานให้อู่ต่อยานอัตโนมัติเหนือ [From.From.From.GetName] ได้สำเร็จ สถานที่แห่งนี้กลับมาดำเนินคำสั่งการก่อสร้างที่ค้างอยู่ทันที โดยใช้วัสดุที่มีอยู่สร้างเรือจู่โจมขั้นสูงสามลำซึ่งมีแบบแปลนไม่ทราบที่มา\n\nน่าเสียดายที่สิ่งอำนวยความสะดวกโบราณแห่งนี้พังลงโดยสมบูรณ์หลังจากนั้นและถูกตัดสินว่าเกินกว่าจะซ่อมได้ เราได้ส่งลูกเรือไปประจำยานใหม่และบรรจุพวกมันเข้ากองเรือของเราแล้ว"
 anomaly.2551.desc.bio: "[Root.GetFleetName] สามารถปลุกแหล่งฟักที่หลับใหลซึ่งโคจรรอบ [From.From.From.GetName] ให้ตื่นขึ้นได้สำเร็จ โครงสร้างอินทรีย์โบราณนั้นสั่นสะเทือนขณะที่เตาหลอมชีวภาพที่หยุดนิ่งมานานกลับมามีชีวิตอย่างฉับพลัน และเร่งสร้างร่างสงครามสามลำจนเสร็จ แต่ละลำมีการออกแบบที่ไม่รู้จักแต่ชวนขนลุกด้วยความล้ำหน้า\n\nอย่างไรก็ตาม ภาระจากการฟื้นคืนชีพอย่างไม่คาดคิดนี้หนักเกินกว่าที่ร่างอันชราจะรับไหว ท่อหลอดเลือดของมันยุบตัว แกนประสาทเหี่ยวแห้ง และร่างทั้งหมดสลายกลายเป็นชีวมวลเฉื่อย ยานที่เพิ่งก่อตัวขึ้นใหม่แม้จะสับสนในตอนแรก แต่ก็ปรับตัวเข้ากับการมีอยู่ของเราได้อย่างรวดเร็ว และได้ถูกรวมเข้ากับกองเรือของเราแล้ว พร้อมรับใช้เจ้านายผู้มีสายสัมพันธ์ร่วมของตน"
 anomaly.2552.desc:1 "[Root.GetFleetName] สามารถฟื้นพลังงานให้อู่ต่อยานอัตโนมัติเหนือ [From.From.From.GetName] ได้สำเร็จ สถานที่แห่งนี้กลับมาดำเนินคำสั่งการก่อสร้างที่ค้างอยู่ทันที โดยใช้วัสดุที่มีอยู่สร้างเรือฟริเกตขั้นสูงหนึ่งลำซึ่งมีแบบแปลนไม่ทราบที่มา\n\nน่าเสียดายที่สิ่งอำนวยความสะดวกโบราณแห่งนี้พังลงโดยสมบูรณ์หลังจากนั้นและถูกตัดสินว่าเกินกว่าจะซ่อมได้ เราได้ส่งลูกเรือไปประจำยานใหม่และนำมันเข้าประจำการในกองเรือของเรา"
 anomaly.2560.name:0 "ยานในดาวแก๊สยักษ์"
 anomaly.2560.desc:0 "การสแกนเชิงรุกของ [From.GetName] ตรวจพบสิ่งที่ดูเหมือนเป็นยานขนาดใหญ่ลึกเข้าไปในชั้นบรรยากาศของดาวแก๊สยักษ์ เมื่อพิจารณาจากเศษซากที่อยู่ใกล้เคียง ดูเหมือนว่าจะเคยมีความพยายามล้มเหลวหลายครั้งในการกู้ซากลำนี้ในอดีต ยานใดก็ตามที่แข็งแกร่งพอจะทนแรงโน้มถ่วงอันบดขยี้เช่นนี้ได้ ย่อมต้องเป็นรางวัลชั้นยอด และเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ก็ได้เสนอให้เราทำโครงการกู้ซากของเราเอง"
 anomaly.2560.a:0 "ชักมันขึ้นมา ไม่ว่ามันจะเป็นอะไร"
 anomaly.2560.b:0 "ความพยายามนั้นมากเกินไป ปล่อยมันไว้ข้างล่าง"
 anomaly.2561.desc:0 "ด้วยการแสดงฝีมือทางวิศวกรรมอย่างยอดเยี่ยม คณะของเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] สามารถยกซากยานบน [From.From.GetName] ขึ้นมาสู่บรรยากาศชั้นบนของดาวแก๊สยักษ์ได้อย่างนุ่มนวล แม้จะเก่าแก่มาก แต่ครุยเซอร์โบราณลำนี้กลับอยู่ในสภาพดีอย่างน่าทึ่ง และเราได้ฟื้นพลังงานให้ระบบของมันแล้ว ไม่พบร่องรอยของลูกเรือเดิมหลงเหลืออยู่ แต่เราได้นำลูกเรือของเราเองขึ้นไปและบรรจุยานเข้ากองเรือแล้ว"
 anomaly.2562.desc:0 "ความพยายามของเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ในการกู้ซากยานจากชั้นบรรยากาศของ [From.From.GetName] ล้มเหลว แรงโน้มถ่วงมหาศาลของดาวแก๊สยักษ์ทำให้เครื่องยนต์ของเรือลากวิศวกรรมลำหนึ่งของเราใช้การไม่ได้ ก่อนที่มันจะพุ่งชนซากยาน มีผู้เสียชีวิตหลายราย และยานโบราณก็ถูกผลักให้จมลึกลงไปในชั้นบรรยากาศยิ่งกว่าเดิม จนเกินเอื้อมของเรา"
 anomaly.2570.name:0 "เทอร์มินัลวงโคจร"
 anomaly.2570.desc:0 "หนึ่งในดวงจันทร์มากมายที่โคจรรอบ [From.GetName] มีวงโคจรใกล้จุดวิกฤต มันจะพุ่งชนดาวแก๊สยักษ์ในไม่ช้า ในเหตุการณ์กระแทกขนาดมหึมาที่แทบแน่นอน เหตุการณ์นี้ก่อตัวมานับล้านปีแล้ว และก็เป็นเรื่องบังเอิญชวนตะลึงที่การชนถูกกำหนดให้เกิดขึ้นทันทีหลังจากยานลำหนึ่งของเราเดินทางมาเยือน\n\nนักวิทยาศาสตร์ของเราหลายคนอยากสังเกตการณ์และบันทึกเหตุการณ์นี้ แต่เรามีเวลาเพียงช่วงสั้นๆ ก่อนจะสายเกินไป"
 anomaly.2571.desc:0 "เราประสบความสำเร็จในการบันทึกการชนระหว่าง [CollisionLocation.GetName] กับดวงจันทร์ของมัน! เหตุการณ์นี้ถูกบันทึกไว้จากหลายมุมมอง และถ่ายทอดสดไปทั่วอาณาเขตของเรา ที่สำคัญที่สุดคือ นักวิทยาศาสตร์ของเราภายใต้การนำของ [Root.GetLeaderName] สามารถบันทึกข้อมูลฟิสิกส์อันมีค่าจำนวนมหาศาล ซึ่งย่อมเป็นประโยชน์ต่อการวิจัยของเราอย่างแน่นอน"
 anomaly.2572.desc:0 "เราพลาดโอกาสที่จะบันทึกการพุ่งชนของดวงจันทร์เข้ากับ [From.From.GetName] อย่างเหมาะสม นักวิทยาศาสตร์ของเราได้ระบุดวงจันทร์เล็กอีกดวงหนึ่งที่มีวงโคจรกำลังเสื่อมลง และคาดการณ์ว่ามันจะชนดาวแก๊สยักษ์ในอีกเพียง 7.6 ล้านปี บางทีครั้งนั้นเราอาจโชคดีกว่าเดิม..."

 anomaly.5000.name:0 "สัญญาณจากดาวแก๊สยักษ์"
 anomaly.5000.desc:0 "[Root.GetName] ตรวจพบค่าที่น่าสงสัยบางอย่างจาก [From.GetName] มีหย่อมรังสีขนาดใหญ่ในชั้นบรรยากาศของดาวแก๊สยักษ์ ซึ่งดูเหมือนจะเป็นผลจากการทิ้งระเบิดจากวงโคจรอย่างหนัก แต่สิ่งที่ใครสักคนจะหวังได้จากการทิ้งระเบิดดาวแก๊สยักษ์จากวงโคจรนั้นยังคงเป็นปริศนา\n\nขณะที่ [Root.GetName] กำลังเตรียมออกจากวงโคจร เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ได้ค้นพบสัญญาณอ่อนๆ ที่ส่งมาจากภายในดาวเคราะห์ มันอาจเป็นการส่งสัญญาณบางรูปแบบ แต่รังสีพื้นหลังของดาวแก๊สยักษ์ทำให้แยกสัญญาณได้ยาก"
 anomaly.5000.a:0 "เราควรสืบหาสัญญาณนี้"
 anomaly.5000.b:0 "เซ็นเซอร์ขัดข้องน่ะสิ ช่างมัน"
 anomaly.5001.desc:0 "เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] สามารถแยกสัญญาณอ่อนๆ ที่ส่งมาจากที่ใดที่หนึ่งลึกเข้าไปในชั้นบรรยากาศของ [From.From.From.GetName] ได้สำเร็จ มันดูเหมือนจะเป็นการส่งสัญญาณจริงๆ และเราได้กรองมันผ่านซอฟต์แวร์แปลภาษาของเราแล้ว"
 anomaly.5002.desc:0 "สัญญาณอ่อนๆ ที่เราตรวจจับได้จากภายในดาวแก๊สยักษ์ [From.From.From.GetName] ได้หายไปแล้ว เราคงไม่มีวันรู้ถึงต้นกำเนิดของมัน"
 anomaly.5003.name:0 "สัญญาณจากดาวแก๊สยักษ์"
 anomaly.5003.desc:0 "ในที่สุด! ยินดีที่ได้พบ นักเดินทางอวกาศ! พวกเราคือ Dathnak และดาวเคราะห์ที่คุณกำลังโคจรรอบอยู่คือโทล็องบ้านบรรพบุรุษของพวกเรา การได้พบผู้มีร่างแข็งนั้นชวนตื่นเต้นเสมอ แม้ว่าการพบครั้งล่าสุดกับพวกเดียวกับคุณจะค่อนข้าง... มีปัญหาก็ตาม\n\nคุณคงตรวจพบการพุ่งสูงของรังสีจากชั้นบรรยากาศของเราแล้วแน่ๆโทล็องกำลังจะตาย และเผ่าพันธุ์ของเราจะพินาศหากไม่พบบ้านใหม่ เราได้ระบุดาวเคราะห์ดวงหนึ่งที่เหมาะกับสรีรวิทยาของเราแล้ว แต่เราไม่มีหนทางไปถึงมัน น่าเสียดายที่ธรรมชาติอันไร้กายเนื้อของเราทำให้เราแทบไม่มีอุตสาหกรรมหรือเทคโนโลยีมากนัก คุณจะช่วยพวกเราไหม?"
 anomaly.5003.a:0 "ถ้าพวกคุณไม่มีเทคโนโลยี แล้วเราคุยกันได้อย่างไร?"
 anomaly.5003.a.response:0 "อ้า แต่พวกคุณไม่ใช่ผู้มีร่างแข็งกลุ่มแรกที่มาเยือนเรานะ! นักเดินทางอวกาศอีกคนหนึ่งเคยบริจาคเครื่องส่งสัญญาณซับสเปซขนาดเล็กกับชุดสแกนให้พวกเราเมื่อ 2.9 ล้านรอบสุริยะก่อน อุปกรณ์เหล่านั้นถูกออกแบบมาให้เข้ากับสรีรวิทยาของเรา\n\nนับเป็นหนึ่งในการพบปะกับพวกเดียวกับคุณที่ออกมาดีที่สุดครั้งหนึ่ง"
 anomaly.5003.b:0 "เกิดอะไรขึ้นกับดาวของพวกคุณ?"
 anomaly.5003.b.response:0 "ก็เมื่อไม่กี่พันรอบก่อน ตอนที่ผู้มีร่างแข็งมาเยือนครั้งล่าสุด ทุกอย่างไม่ได้เป็นไปด้วยดีนัก พวกเขาต้องการให้พวกเรารับศาสนาของเขา เราปฏิเสธ และนั่นก็กระตุ้นปฏิกิริยาแบบฆ่าล้างเผ่าพันธุ์บางอย่างขึ้นมา\n\nไม่มีเหตุผลเลยแม้แต่น้อย! ก่อนที่เราจะรู้ตัวว่ากำลังเกิดอะไรขึ้น พวกเขาก็เคลื่อนกองเรือเข้าสู่วงโคจรและปลดปล่อยการทิ้งระเบิดครั้งมหึมา"
 anomaly.5003.c:0 "คุณต้องการให้เราขนย้ายทั้งเผ่าพันธุ์ของคุณไปยังดาวดวงอื่นงั้นหรือ?"
 anomaly.5003.c.response:0 "ใช่! และหวังว่าจะเป็นเร็วๆ นี้ด้วย! ไม่ต้องกังวล พวกเรามีจำนวนไม่มากนัก Dathnak ส่วนใหญ่ตายไปตอนดาวของเราถูกทิ้งระเบิด และผู้รอดชีวิตก็ถอยลึกลงไปในชั้นบรรยากาศ การสื่อสารกับพื้นผิวนั้นยากอยู่แล้ว และรังสีก็กำลังแพร่กระจาย เรามีเวลาไม่มาก!"
 anomaly.5003.d:0 "เราจะช่วยย้ายถิ่นให้คุณ"
 anomaly.5003.d.response:0 "ยอดเยี่ยม! ข้ารู้อยู่แล้วว่าเราพึ่งพาคุณได้ พิกัดของบ้านใหม่เราได้ถูกส่งต่อให้แล้ว\n\nคุณต้องสัญญาว่าจะไม่ปล่อยให้ผู้ตั้งถิ่นฐานของคุณเองไปยึดครองโลกอันเย้ายวนนี้ก่อนที่เราจะไปถึง ไม่ว่าความล่อลวงจะรุนแรงเพียงใดก็ตาม!"
 anomaly.5003.e:0 "ขอโทษนะ มันยุ่งยากเกินไป"
 anomaly.5003.e.response:0 "ข้ารู้อยู่แล้ว! ข้าเตือนพวกที่เหลือแล้วว่าพวกผู้มีร่างแข็งไม่สามารถรู้สึกเห็นอกเห็นใจได้ แต่พวกเขาก็ยังดันทุรังจะยื่นคำวิงวอนอันน่าอับอายนี้\n\nข้ารู้ดีว่าพวกเจ้าคืออะไร โรคร้ายของกาแล็กซีนี้! สักวันหนึ่งมันจะตกทอดสู่สิ่งมีชีวิตเช่นเรา และวันชำระบัญชีจะมาถึง จำคำข้าไว้ ยุคของพวกผู้มีร่างแข็งจะสิ้นสุดลง! กาลเวลาของสิ่งมีชีวิตก๊าซจะมาถึง!"
 anomaly.5004.desc:0 "เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ได้เสร็จสิ้นการกำกับดูแลการย้ายถิ่นของ Dathnak ไปยังบ้านใหม่ของพวกเขา กองคาราวานเรือบรรทุกพลเรือนที่ติดตั้งถังก๊าซแรงดันสูงขนาดมหึมาได้ขนส่งสิ่งมีชีวิตก๊าซเหล่านี้ข้ามอวกาศ และปล่อยพวกมันลงสู่ชั้นบรรยากาศของดาวแก๊สยักษ์ เครื่องส่งสัญญาณโบราณและชุดสแกนของพวกเขาก็ถูกนำไปด้วยเช่นกัน"
 anomaly.5004.a:0 "ทักทายพวกเขา"
 anomaly.5005.desc:0 "สภาพบนโทล็องทรุดโทรมลงจนถึงจุดที่ไม่อาจช่วย Dathnak ได้อีกต่อไป รังสีได้แพร่กระจายไปทั่วเกือบทั้งชั้นบรรยากาศ และผู้รอดชีวิตของ Dathnak ก็ถอยลึกลงไปใกล้แกนดาวมากขึ้น จนไม่อาจสื่อสารกับพื้นผิวได้อีก ในที่สุดรังสีก็จะตามไปถึงที่นั่นเช่นกัน ทำให้เผ่าพันธุ์ของพวกเขาสูญพันธุ์"
 anomaly.5006.desc:0 "เราติดหนี้พวกคุณไปตลอดกาล! ดาวดวงนี้เหนือความคาดหมายของเราอย่างยิ่ง เป็นครั้งแรกในหลายชั่วอายุคนที่เหล่าลูกหลานของเราสามารถเล่นสนุกในบรรยากาศชั้นบนได้โดยไม่เริ่มเรืองแสง\n\nเราได้ตัดสินใจเรียกบ้านใหม่ของเราว่าบัลดารากตามชื่อเผ่าพันธุ์ของคุณ ชั่วลูกชั่วหลานของ Dathnak จะไม่มีวันลืมชื่อของผู้ช่วยชีวิตพวกเขา!"
 anomaly.5006.a:0 "บัลดาราค?พวกเราคือ [Root.GetSpeciesNamePlural]..."
 anomaly.5006.a.response:0 "จริงหรือ? ข้าสาบานได้เลยว่า... ต้องขออภัย แต่การแยกความแตกต่างระหว่างพวกผู้มีร่างแข็งนั้นทำได้ยากนิดหน่อย เกรงว่ามันจะสายเกินไปที่จะเปลี่ยนชื่อแล้ว แต่มันก็ฟังไพเราะดีนะ ไม่คิดอย่างนั้นหรือ?"
 anomaly.5006.a.2:0 "บัลดาราค?เป็นชื่อที่ยอดเยี่ยมทีเดียว!"
 anomaly.5006.a.2.response:1 "มันฟังไพเราะดีใช่ไหมล่ะ? พวกเราช่างโชคดีจริงๆ ที่ได้รับการช่วยเหลือจากพวกผู้มีร่างแข็งที่ออกเสียงชื่อได้น่าฟังเช่นนี้!"
 anomaly.5006.b:0 "ขอให้โชคดีกับบ้านใหม่ของพวกคุณ"
 anomaly.5006.b.response:0 "ขอบคุณอีกครั้งนะ สหายผู้เป็นที่รัก! ขอให้กระแสลมแห่งชั้นบรรยากาศพยุงพวกคุณไว้เสมอ!"
 anomaly.5007.name:0 "อาณานิคมใหม่"
 anomaly.5007.desc:0 "สวัสดีอีกครั้ง! คุณคงยินดีที่ได้รู้ว่าจำนวนประชากรของเผ่าพันธุ์เราเพิ่มขึ้นเป็นสี่เท่าตั้งแต่เรามาถึง! หลายคนของเราถูกพัดพาไปกับบรรยากาศแห่งการเฉลิมฉลองหลังลงถึงดาว และพูดได้เต็มปากเลยว่าอารมณ์มันค่อนข้างคึกคักมาก\n\nหลังจากประสบการณ์อันดีในการตั้งอาณานิคมบนบัลดารากผู้บุกเบิกผู้กล้าหาญบางส่วนได้ขอให้ข้ายื่นคำร้องต่อคุณ เพื่อขอโดยสารไปยังดาวแก๊สยักษ์อีกดวงหนึ่ง เราพบตัวเลือกที่ดูมีอนาคตแล้วภายในอาณาเขตของคุณ ซึ่งเหมาะแก่การตั้งอาณานิคม คุณว่าอย่างไร สหาย?"
 anomaly.5007.a:0 "เอาเถอะ ตราบใดที่มันก็แค่ดาวแก๊สยักษ์อีกดวง..."
 anomaly.5007.a.response:0 "วิเศษมาก! เรากำลังส่งพิกัดให้คุณ ผู้ตั้งถิ่นฐานของเรากระตือรือร้นจะออกเดินทางเต็มที่แล้ว!"
 anomaly.5007.b:0 "ไม่เด็ดขาด ข้อตกลงของเราคือขนพวกคุณไปแค่ดาวดวงเดียว"
 anomaly.5007.b.response:0 "ขะ... เข้าใจแล้ว ถ้าอย่างนั้นเราก็คงต้องอยู่กันอย่างแออัดบนบัลดารากและทำให้ดีที่สุดเท่าที่จะทำได้"
 anomaly.5008.desc:0 "เช่นเดียวกับครั้งก่อน กองคาราวานเรือบรรทุกถูกจัดขึ้นเพื่อขนย้ายผู้ตั้งถิ่นฐาน Dathnak ภายในถังก๊าซแรงดันอย่างปลอดภัย หลังการเดินทางช่วงสั้นๆ พวกเขาก็ลงถึงดาวแก๊สยักษ์ที่ตั้งชื่อว่านิว บัล ดา รา คได้สำเร็จ มีการปล่อยดาวเทียมทิ้งไว้ในวงโคจรเพื่อให้สามารถสื่อสารระยะไกลกับบัลดารากได้"
 anomaly.5008.a:0 "ใช้ชีวิตให้คุ้มล่ะ Dathnak"
 anomaly.5009.name:0 "Chabky Raddh"
 anomaly.5009.desc:0 "ขอทักทายจากนิวบอลดาราค!ทุกอย่างดำเนินไปได้ดีที่อาณานิคมใหม่ของเรา อย่างไรก็ตาม เรามีคำขอเล็กๆ...\n\nสับปะรดหนึ่งในผู้ตั้งถิ่นฐานของเรา คิดถึงครอบครัวและเพื่อนๆ ที่บัลดารากอย่างหนักและอยากกลับบ้าน เสียงบ่นของเธอทำให้เราปวดหัวกันไปหมด! หากไม่เป็นการรบกวนเกินไป คุณคิดว่าจะช่วยพาเธอกลับได้ไหม?"
 anomaly.5009.a:0 "อะไรนะ?! ไม่มีทาง!"
 anomaly.5009.a.response:0 "เราก็ต้องลองถามดู... หวังว่าคุณคงไม่ถือสาสับปะรดคงต้องสงบลงแล้วทำใจยอมรับสถานการณ์ให้ได้เหมือนคนอื่นๆ ของเรา ขอโทษที่รบกวนเวลาของคุณนะ สหาย [Root.GetSpeciesName]"
 anomaly.5009.b:0 "เฮ้อ... ก็ได้"
 anomaly.5009.b.response:0 "ยอดเยี่ยม หวังว่ามันคงไม่กินทรัพยากรของคุณมากนัก เพราะคุณจะขนส่งแค่คนเดียวเท่านั้น เราจะจัดการทุกอย่างทางฝั่งเราเอง\n\nข้าเพิ่งบอกข่าวนี้กับสับปะรดไป และตอนนี้เธอกำลังหมุนตัวด้วยความดีใจ! จริงๆ แล้วตอนนี้เธอหมุนควบคุมไม่อยู่แล้ว... ขออภัยด้วยนะ สหาย [Root.GetSpeciesName]..."
 anomaly.5010.desc:0 "เรือลากสินค้าลำหนึ่งที่บรรทุกกระบอกก๊าซมาถึงบัลดารากแล้ว ภายใต้การคุ้มกันของ [Root.GetName] สิ่งที่อยู่ภายในกระบอกถูกปล่อยออกสู่ชั้นบรรยากาศของดาวแก๊สยักษ์ เป็นการส่งตัวผู้ตั้งถิ่นฐาน Dathnak กลับบ้านอย่างปลอดภัย"
 anomaly.5010.a:0 "โชคดีนะ"
 anomaly.5011.name:0 "ขาดการติดต่อ"
 anomaly.5011.desc:0 "เรามีข่าวร้ายมาแจ้งนะ สหาย [Root.Owner.GetSpeciesName]!\n\nเราขาดการติดต่อกับอาณานิคมของเราบนนิว บัล ดา รา คแล้ว! พวกเขาไม่ตอบรับการส่งสัญญาณจากดาวเทียมของเราอีกต่อไป และเราก็กลัวเรื่องเลวร้ายที่สุด บางทีพวกต่างดาวที่ทิ้งระเบิดบ้านเกิดดั้งเดิมของเราอาจกลับมาเพื่อปิดงานให้เสร็จสิ้นก็ได้ โปรดส่งยานไปสืบดูที!"
 anomaly.5011.a:0 "เราจะส่งยานไปทันที"
 anomaly.5011.a.response:0 "ยอดเยี่ยม! หวังว่ามันจะเป็นแค่เครื่องส่งสัญญาณขัดข้อง"
 anomaly.5011.b:0 "พอได้แล้ว! เราไม่ใช่เด็กรับใช้ของพวกคุณ"
 anomaly.5011.b.response:0 "แต่... แต่พวกเขาอาจตายกันหมดแล้วนะ! คุณใจแข็งได้ถึงเพียงนี้จริงหรือ? เรามองคุณผิดไป [Root.GetSpeciesName]!"
 anomaly.5012.desc:0 "การสืบสวนของเราบนนิว บัล ดา รา คไม่พบสิ่งผิดปกติใดๆ ดาวเทียมที่อาณานิคมใช้ติดต่อกับเมืองหลวงยังคงทำงานได้เท่าที่เราตรวจสอบ"
 anomaly.5012.a:0 "เปิดช่องสื่อสารกับดาวเคราะห์"
 anomaly.5013.name:0 "แนวร่วมปฏิวัติ"
 anomaly.5013.desc:0 "ขอทักทายจากแนวร่วมปฏิวัตินิวบอลดาราค!\n\nเราได้สลัดแอกแห่งการกดขี่และเป็นอิสระจากทรราชแห่งบัลดารากในที่สุด! เราไม่มีเรื่องบาดหมางกับคุณ [Root.Owner.GetSpeciesName] ตราบใดที่คุณไม่ช่วยเหลือพวกจักรวรรดินิยมบัลดารากในความพยายามอันหลีกเลี่ยงไม่ได้ที่จะบดขยี้การปฏิวัติของเรา\n\nอย่างไรก็ตาม คุณสามารถช่วยให้เราเปิดศึกกับศัตรูของเราได้... คุณยินดีจะส่งหน่วยคอมมานโดของเราหนึ่งหน่วยไปยังบัลดารากหรือไม่?"
 anomaly.5013.a:0 "บอกเรามาว่าพวกคุณวางแผนอะไร"
 anomaly.5013.a.response:0 "เราต้องการแทรกซึมเข้าบัลดารากด้วยหน่วยคอมมานโดชั้นยอดของเรา จากนั้นพวกเขาจะปลุกระดมประชาชนให้ลุกฮือต่อต้านชนชั้นนำเสื่อมทรามที่กดขี่ประชาชนของเราอยู่ เมื่อทรราชถูกโค่นล้ม Dathnak ทุกคนก็จะได้รู้เสียทีว่าคำว่าอิสรภาพแท้จริงนั้นเป็นอย่างไร แผนตรงไปตรงมาจะมีอะไรชัดเจนไปกว่านี้อีกเล่า [Root.Owner.GetSpeciesName]"
 anomaly.5013.b:0 "เราจะส่งทหารของพวกคุณไป"
 anomaly.5013.b.response:0 "จริงหรือ?! คุณจะทำอย่างนั้นหรือ? คุณคือมิตรแท้ของการปฏิวัติ [Root.Owner.GetSpeciesName]! ขอข้ารวบรวมทีมก่อน!"
 anomaly.5013.c:0 "เราไม่คิดเข้าไปยุ่งกับข้อพิพาทภายในของพวกคุณ"
 anomaly.5013.c.response:0 "แน่นอนว่าคุณไม่ยุ่งหรอก! เพราะคุณคงไม่อยากให้การปฏิวัติแพร่กระจายไปถึงมวลชนที่ถูกกดขี่ในจักรวรรดิทรราชของคุณเองสินะ แบบนั้นคงไม่ได้แน่!"
 anomaly.5014.name:0 "บัลดารากตอบโต้"
 anomaly.5014.desc:0 "ข้าพูดในนามของรัฐบาล Dathnak ที่ชอบธรรมบนบัลดาราก\n\nเราได้รับแถลงการณ์จากกลุ่มที่ยึดครองนิว บัล ดา รา คแล้ว และโอ้โฮ มันช่างเป็นเรื่องเหลวไหลสิ้นดี! พวกโจรและอนาธิปไตยเหล่านี้คือความอับอายอย่างร้ายแรงของพวกเรา [Root.Owner.GetSpeciesName] คุณจะช่วยเราบดขยี้การปฏิวัติเล็กๆ ของพวกมันก่อนที่มันจะแพร่มาถึงที่นี่และมีใครได้รับอันตรายจริงๆ หรือไม่?\n\nพลเอกภาษาพัลตาแนคได้เตรียมกองกำลังยกพลเพื่อยึดอาณานิคมกลับคืนแล้ว แต่เราต้องการความช่วยเหลือจากคุณในการขนส่งพวกเขาไปที่นั่น"
 anomaly.5014.a:0 "เราจะช่วยพวกคุณ"
 anomaly.5014.a.response:0 "เรารู้อยู่แล้วว่าเราพึ่งพาคุณได้ [Root.Owner.GetSpeciesName]! พวกกบฏพวกนั้นจะไม่ทันรู้ตัวด้วยซ้ำว่าโดนอะไร!"
 anomaly.5014.b:0 "พวกคุณต้องแก้ปัญหาของตัวเอง"
 anomaly.5014.b.response:0 "คุณจะเสียใจเมื่อการกบฏนี้แพร่ไปถึงดาวของคุณ [Root.Owner.GetSpeciesName]! อย่าคิดว่ามันจะไม่เกิดขึ้น!"
 anomaly.5015.desc:0 "เรือลากสินค้าที่มี [Root.GetName] คุ้มกันได้ลอบทิ้งแคปซูลสินค้าซึ่งบรรจุหน่วยคอมมานโดปฏิวัติลงสู่ชั้นบรรยากาศของบัลดารากอย่างแนบเนียน ไม่นานหลังจากนั้นก็สามารถมองเห็นแสงวาบจากลึกลงไปในชั้นเมฆของดาวแก๊สยักษ์ หรือว่านั่นจะเป็นสัญญาณของการต่อสู้?"
 anomaly.5015.a:0 "เราคงต้องดูว่าอะไรจะเกิดขึ้นต่อไป"
 anomaly.5016.name:0 "สภาปฏิวัติ"
 anomaly.5016.desc:0 "นี่คือสหายพลเมืองโฟแทนก้า!ประชาชนแห่งบัลดารากได้โค่นล้มทรราชและผู้กดขี่ที่พยายามกดขี่เผ่าพันธุ์ของเราไว้ใต้อำนาจของพวกมันแล้ว สภาปฏิวัติได้ถูกจัดตั้งขึ้นเพื่อนำพาชาติอันยิ่งใหญ่ของเราผ่านช่วงเปลี่ยนผ่านนี้ ขณะที่เราทำงานอย่างไม่ลดละเพื่อฟื้นฟูเสรีภาพให้แก่ประชาชน\n\nเราขอขอบคุณสหายของเราใน [Root.GetName] สำหรับความช่วยเหลือที่ทำให้วันนี้กลายเป็นจริง\n\nจบการประกาศ"
 anomaly.5016.a:0 "บางทีทุกอย่างอาจลงเอยด้วยดีก็ได้"
 anomaly.5017.name:0 "ประกาศสาธารณะจากบัลดาราก"
 anomaly.5017.desc:0 "นี่คือสหายพลเมืองโฟแทนก้า!สภาปฏิวัติประชาชนได้ลงมติเป็นเอกฉันท์ให้เปลี่ยนชื่อดาวเคราะห์ที่เคยรู้จักกันในชื่อบัลดารากเป็นโฟแทนเจียเพื่อเป็นเกียรติแก่ภาวะผู้นำของข้า\n\nนอกจากนี้ ดาวเคราะห์ที่เคยรู้จักกันในชื่อนิว บัล ดา รา คจะนับแต่นี้ไปเป็นที่รู้จักในชื่อขนาดชิคมาคตามชื่อสับปะรดรัฐมนตรีความมั่นคงสาธารณะของเรา\n\nจบการประกาศ"
 anomaly.5017.b:0 "พอได้แล้ว บล็อกทุกสัญญาณจากสิ่งมีชีวิตพวกนี้ในอนาคต"
 anomaly.5018.desc:0 "นี่คือสหายพลเมืองโฟแทนก้า!สภาปฏิวัติประชาชนขอประกาศการประหารชีวิตบุคคลจำนวน 4,539 ราย ซึ่งถูกตัดสินว่ามีความผิดฐานกบฏต่อรัฐและกิจกรรมต่อต้านการปฏิวัติ\n\nขอให้เรื่องนี้เป็นคำเตือนแก่ทุกผู้ที่จะขวางหนทางแห่งการปฏิวัติอันรุ่งโรจน์ของเรา\n\nจบการประกาศ"
 anomaly.5019.desc:0 "นี่คือสหายพลเมือง Rutmag!สภาปฏิวัติประชาชนขอประกาศการประหารอดีตสหายพลเมืองโฟทังก้าซึ่งถูกตัดสินว่ามีความผิดฐานปลุกปั่น ฉ้อฉล และไร้ความสามารถโดยรวม\n\nข้าจะเข้ารับหน้าที่ทั้งหมดเดิมของเขา และคำสั่งแรกของข้าคือให้คืนชื่อดั้งเดิมของดาวเคราะห์โฟแทนเจียและขนาดชิคมาค\n\nจบการประกาศ"
 anomaly.5020.desc:0 "เรือบรรทุกหลายลำภายใต้การคุ้มกันของ [Root.GetName] ได้ทิ้งกระป๋องบรรทุกที่ขนกำลังยกพลของ Dathnak ลงสู่ชั้นบรรยากาศของนิว บัล ดา รา คไม่นานหลังจากนั้นก็เห็นแสงวาบจากใต้ชั้นเมฆของดาวแก๊สยักษ์ การสู้รบดูเหมือนจะเริ่มต้นขึ้นแล้ว"
 anomaly.5020.a:0 "ตอนนี้ก็ได้แต่รอดูว่าจะเกิดอะไรขึ้นต่อไป"
 anomaly.5021.name:0 "กองกำลังยกพลยึดอำนาจ"
 anomaly.5021.desc:0 "พลเอกภาษาพัลตาแนครายงานจากนิว บัล ดา รา คปฏิบัติการความโกรธของแก๊สประสบความสำเร็จโดยสมบูรณ์ เป้าหมายหลักทั้งหมดถูกยึดได้แล้ว และการควบคุมของรัฐบาลได้ถูกฟื้นฟูกลับคืนในทุกภาคส่วนของชั้นบรรยากาศ\n\nนอกเหนือจากกลุ่มที่ยังดื้อดึงอยู่ไม่กี่กลุ่ม หน่วยกบฏส่วนใหญ่ยอมจำนนหรือไม่ก็แตกพ่าย ขอบคุณอย่างยิ่งสำหรับการสนับสนุน [Root.Owner.GetSpeciesNamePlural] หากคุณอนุญาต ข้าต้องส่งรายงานผู้บาดเจ็บล้มตายกลับไปที่บัลดาราก\n\nภาษาพัลตาแนคจบรายงาน"
 anomaly.5021.a:0 "ปฏิบัติการที่ดำเนินการได้อย่างยอดเยี่ยม"
 anomaly.5022.name:0 "ประกาศจากนิว บัล ดา รา ค"
 anomaly.5022.desc:0 "พลเอกภาษาพัลตาแนคพูดอยู่ ผู้ว่าการทหารรักษาการแห่งนิว บัล ดา รา คข้ายินดีจะประกาศว่าปฏิบัติการรบหลักในภาค47-G ได้สิ้นสุดลงแล้ว มีผู้ก่อความไม่สงบอย่างน้อย 512 รายได้รับการยืนยันว่าเสียชีวิตนับตั้งแต่ปฏิบัติการเริ่มต้นขึ้นเมื่อสองรอบก่อน ขณะที่ความสูญเสียของเรามีน้อยมาก\n\nขอชื่นชมกำลังทุกฝ่ายที่เกี่ยวข้องเป็นพิเศษ สำหรับการรักษาความสูญเสียของพลเรือนไว้ในระดับที่ยอมรับได้\n\nภาษาพัลตาแนคจบรายงาน"
 anomaly.5023.desc:0 "นี่คือพลเอกภาษาพัลตาแนคผู้ว่าการทหารแห่งนิว บัล ดา รา คข้าประสงค์จะกล่าวถึงรายงานที่ไร้มูลซึ่งอ้างว่ามีกิจกรรมกบฏกลับมาปะทุขึ้นอีกครั้งบนโลกใบนี้ ขอบอกตรงนี้เลยว่าไม่มีอะไรห่างไกลจากความจริงไปกว่านั้นอีกแล้ว\n\nดาวเคราะห์ดวงนี้ถูกทำให้สงบเรียบร้อยโดยสมบูรณ์ และองค์ประกอบก่อการร้ายบ่อนทำลายทั้งหมดก็ถูกกำจัดรากถอนโคนแล้ว พลเมืองของมันกลับมาเป็นสมาชิกผู้มีประสิทธิผลของชาติ Dathnak อันยิ่งใหญ่อีกครั้ง\n\nภาษาพัลตาแนคจบรายงาน"
 anomaly.5024.desc:0 "พันเอก Rapzak รายงานตัว ผู้ว่าการทหารรักษาการแห่งนิว บัล ดา รา คข้าจำต้องแจ้งแก่ประชาคมกาแล็กซีด้วยความเสียใจยิ่งถึงการจากไปของพลเอกภาษาพัลตาแนคผู้เป็นบรรพบุรุษในตำแหน่งของข้า หลังถูกล่อเข้าสู่การซุ่มโจมตีอันชั่วช้าของกองกำลังกบฏ ท่านพลเอกได้สละชีวิตในแบบอย่างอันสูงส่งที่สุดของผู้รับใช้ชาติ\n\nพิธีศพของรัฐพร้อมเกียรติยศเต็มรูปแบบจะจัดขึ้นเมื่อการรุกปัจจุบันของเราต่อฐานที่มั่นของกบฏประสบความสำเร็จ\n\nRapzak จบรายงาน"
 anomaly.5025.name:0 "สถาบันวิทยาศาสตร์บัลดาราก"
 anomaly.5025.desc:0 "[Root.Owner.GetSpeciesNamePlural]! ข้าได้รับการร้องขอให้มาติดต่อคุณในนามของสถาบันวิทยาศาสตร์บัลดารากแม้พวก Dathnak อย่างเราจะไม่มีเทคโนโลยีมากนัก แต่เราก็มีความสามารถในการใช้เหตุผลขั้นสูงอย่างแน่นอน!\n\nกลุ่มคลังสมองของเราบางกลุ่มได้ใช้เวลาหลายปีที่ผ่านมาไปกับการศึกษาฟิสิกส์เชิงทฤษฎี และเราต้องการแบ่งปันผลการค้นพบของพวกเขา บางทีข้อมูลนี้อาจมีประโยชน์ต่อกิจกรรมการสร้างจักรวรรดิที่พวกผู้มีร่างแข็งอย่างคุณชื่นชอบก็ได้"
 anomaly.5025.a:0 "กรุณาอย่างยิ่ง"
 anomaly.5026.name:0 "ทำความสะอาดครั้งใหญ่"
 anomaly.5026.desc:0 "สวัสดี [Root.Owner.GetSpeciesNamePlural]!\n\nคุณจะยอมช่วยเราสักอย่างได้ไหม? หลุมโน้มถ่วงอันทรงพลังของบัลดารากดึงขยะทุกชนิดเข้ามาในชั้นบรรยากาศของเรา และในการประชุมสภาครั้งล่าสุด เราก็ตัดสินใจเพิ่มความเข้มข้นของการทำความสะอาด หน่วยเก็บกู้ของเราหน่วยหนึ่งไปพบแคปซูลสินค้าที่ถูกทิ้งไว้ และเราก็สงสัยว่าคุณจะช่วยกำจัดมันให้เราได้ไหม ดูเหมือนว่ามันจะบรรจุโลหะไร้ค่าหลายชนิดในปริมาณมหาศาล"
 anomaly.5026.a:0 "ได้สิ เราจะกำจัดแร่พวกนี้ให้พวกคุณเอง..."

 henrik.16.name:0 "ทดสอบโครงการพิเศษ"
 henrik.16.desc:0 "เหตุการณ์นี้จะสร้างโครงการพิเศษบน [Root.GetName]"
 henrik.16.a:0 "เยี่ยม!"
 henrik.20.name:0 "กองทัพศัตรูปรากฏตัว"
 henrik.20.desc:0 "กองทัพศัตรูบางส่วนจะปรากฏบน [Root.GetName]"
 henrik.20.a:0 "เตรียมอาวุธ!"
 henrik.21.name:0 "ชัยชนะ!"
 henrik.21.desc:0 "เราเอาชนะกองกำลังชั่วร้ายของ [From.GetName] ได้แล้ว!"
 henrik.22.name:0 "พ่ายแพ้!"
 henrik.22.desc:0 "เราพ่ายแพ้ต่อกองกำลังชั่วร้ายของ [From.GetName]!"
 henrik.145.desc:0 "พวกเราคือ [Root.GetSpeciesNamePlural]"
 henrik.166.desc:0 "เป้าหมายของเหตุการณ์คือ [test_target.GetName]"

 ####################################
 # Anomaly Failure Events
 ####################################
 DISC_FAILURE:0 "ล้มเหลว"
 DISC_CRITICAL_FAILURE:0 "ล้มเหลวขั้นวิกฤต"
 anomaly_failure.1.desc:1 "เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] สั่งให้ [Root.GetName] ปล่อยโพรบไปตรวจสอบหลุมอุกกาบาตบน [From.From.GetName] แต่น่าเสียดายที่ตัวขับเบรกของมันขัดข้อง และโพรบก็พุ่งชนยานอับปางที่อยู่กลางหลุมอย่างจัง"
 anomaly_failure.2.desc:0 "แม้ดาวเคราะห์น้อย [From.From.GetName] อาจเป็นวัตถุจากต่างระบบที่ถูกจับเข้ามา แต่ในแง่อื่นมันก็ธรรมดาอย่างสิ้นเชิง เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] และลูกเรือของ [Root.GetName] ได้ขออนุญาตเดินหน้าภารกิจสำรวจต่อที่อื่น"
 anomaly_failure.3.desc:0 "ลูกเรือทั้งหมดของ [Root.GetName] ใช้เวลาหลายวันผลัดเวรกันคุ้ยเขี่ยเศษซากบนพื้นผิวของ [From.From.GetName] อย่างเหน็ดเหนื่อย เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] รายงานว่าไม่พบสิ่งใดมีค่า"
 anomaly_failure.4.desc:0 "ไม่เคยพบต้นตอของการแผ่พลังงานประหลาดจากดาวเคราะห์น้อย [From.From.GetName] เลย เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] และ [Root.GetName] กำลังรอคำสั่งใหม่"
 anomaly_failure.5.desc:0 "ขณะพยายามเปิดช่องเชื่อมเทียบท่าที่เราพบบน [From.From.GetName] [Root.GetName] ได้ทำให้เกิดแรงสั่นสะเทือนภายในดาวเคราะห์น้อยโดยไม่ได้ตั้งใจ น่าเสียดายที่เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] สรุปว่านี่น่าจะนำไปสู่การทำลายภายในของดาวเคราะห์น้อย"
 anomaly_failure.6.desc:0 "การสืบสวนหลุมอุกกาบาตขนาดมหึมาบนพื้นผิวของดาวเคราะห์น้อย [From.From.GetName] ไม่ได้ให้ผลที่น่าสนใจใดๆ เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ได้สั่งให้ [Root.GetName] ยุติภารกิจ"
 anomaly_failure.7.desc:0 "[Root.GetName] พยายามเทียบท่ากับสถานีอวกาศที่โคจรรอบ [From.From.GetName] แต่ล้มเหลว น่าเสียดายที่สถานีอันเปราะบางแตกสลายลงเพราะเหตุนี้ เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ขออภัยอย่างสูง"
 anomaly_failure.7.desc.mach:0 "[Root.GetName] พยายามเทียบท่ากับสถานีอวกาศที่โคจรรอบ [From.From.GetName] แต่ล้มเหลว น่าเสียดายที่สถานีอันเปราะบางแตกสลายลงเพราะเหตุนี้ เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] รายงานว่าต้นเหตุคือความผิดพลาดของซอฟต์แวร์ที่ไม่พึงประสงค์เกี่ยวกับการคำนวณวิถี"
 anomaly_failure.8.desc:0 "ต้นตอของสัญญาณชีวิตที่รายงานมาจากดาวเคราะห์น้อย [From.From.GetName] หากมันเคยมีอยู่จริง ก็ยังไม่ถูกพบ แม้ [Root.GetName] จะสแกนซ้ำแล้วซ้ำอีก เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ได้ร้องขอคำสั่งใหม่"
 anomaly_failure.9.desc:0 "หากมีวัตถุบางอย่างอยู่ใต้ชั้นบรรยากาศของ [From.From.GetName] จริง มันก็อยู่ลึกเกินกว่าที่เซ็นเซอร์ของ [Root.GetName] จะตรวจจับได้ เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] จึงละทิ้งการค้นหา"
 anomaly_failure.10.desc:0 "หลังจากสำรวจดวงจันทร์เล็กที่โคจรรอบ [From.From.GetName] อย่างละเอียด ลูกเรือของ [Root.GetName] ก็ไม่พบสิ่งใดมีค่า เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ได้ยุติภารกิจ"
 anomaly_failure.11.desc:0 "ตามคำสั่งของเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] [Root.GetName] ได้ส่งโพรบเข้าไปในชั้นบรรยากาศของ [From.From.GetName] เพื่อสืบหาสัญญาณชีวิตที่เคยมีรายงาน เราค้นพบว่ามีระบบนิเวศในบรรยากาศอันอุดมสมบูรณ์จริง แต่ 3.4 วินาทีต่อมา โพรบกลับปนเปื้อนชั้นบรรยากาศและก่อให้เกิดปฏิกิริยาลูกโซ่ทางเคมีที่แพร่กระจายอย่างรวดเร็วไปทั่วทั้งดาวแก๊สยักษ์ ตอนนี้ไม่อาจตรวจพบร่องรอยชีวิตใดๆ ได้อีกแล้ว"
 anomaly_failure.12.desc:0 "แม้จะทำการวิเคราะห์อย่างละเอียด รวมถึงการพา [Root.GetName] ดำดิ่งเข้าไปในบรรยากาศชั้นบนของดาวแก๊สยักษ์ช่วงสั้นๆ แต่ก็ไม่พบสิ่งใดน่าสนใจเป็นพิเศษเกี่ยวกับชั้นบรรยากาศของ [From.From.GetName] เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] จึงแนะนำให้ยุติภารกิจ"
 anomaly_failure.13.desc:0 "ขณะที่ [Root.GetName] เข้าใกล้โครงสร้างลอยฟ้าในชั้นบรรยากาศของ [From.From.GetName] ตัวยานคงไปกระตุ้นสัญญาณเตือนระยะใกล้บางอย่างเข้า เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] รายงานว่าโครงสร้างเหล่านั้นสูญเสียแรงลอยตัวทั้งหมดอย่างกะทันหัน และตกฮวบลงสู่บรรยากาศชั้นล่างของดาวแก๊สยักษ์"
 anomaly_failure.14.desc:0 "[Root.GetName] เผลอชนแคปซูลสินค้าที่โคจรรอบ [From.From.GetName] โดยไม่ได้ตั้งใจขณะพยายามเก็บมัน เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] รายงานว่าการชนครั้งนั้นส่งแคปซูลให้ตกดิ่งลึกเข้าไปในชั้นบรรยากาศของดาวแก๊สยักษ์ จนไม่อาจกู้คืนได้อีก"
 anomaly_failure.15.desc:0 "ทุ่งเศษซากที่ล้อมรอบ [From.From.GetName] ถูก [Root.GetName] สแกนอย่างละเอียดแล้ว เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] รายงานว่าไม่พบสิ่งใดสำคัญ"
 anomaly_failure.16.desc:0 "แม้จะสืบสวนอย่างละเอียด [Root.GetName] ก็ยังไม่สามารถสรุปได้ว่าอะไรเป็นสาเหตุของหลุมอุกกาบาตขนาดมหึมาบน [From.From.GetName] เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ขออภัยต่อความล้มเหลวครั้งนี้"
 anomaly_failure.16.desc.mach:0 "แม้จะสืบสวนอย่างละเอียด [Root.GetName] ก็ยังไม่สามารถสรุปได้ว่าอะไรเป็นสาเหตุของหลุมอุกกาบาตขนาดมหึมาบน [From.From.GetName] เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ได้บันทึกความล้มเหลวนี้ว่าเกิดจากสารตกค้างบนพื้นผิวดวงจันทร์เหลือน้อยเกินไป"
 anomaly_failure.17.desc:0 "หากเคยมีค่าพลังงานผิดปกติส่งมาจาก [From.From.GetName] ตอนนี้มันก็ดูเหมือนจะหายไปแล้ว เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] รายงานว่า [Root.GetName] ไม่ตรวจพบอะไรในลักษณะนั้นอีก"
 anomaly_failure.18.desc:0 "เคยมีวัตถุไม่ทราบชนิดบางอย่างโคจรรอบ [From.From.GetName] อยู่จริง แต่ [Root.GetName] ดันพุ่งชนมันโดยไม่ได้ตั้งใจขณะขยับเข้าไปตรวจสอบใกล้ขึ้น เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] รายงานด้วยความเสียดายว่าวัตถุนั้นถูกทำลายไปแล้วจากการชน"
 anomaly_failure.19.desc:0 "ไม่พบลักษณะเฉพาะใดๆ บนดาวเคราะห์น้อยขนาดเล็กที่ดูเหมือนถูกลากมาไว้ในวงโคจรรอบ [From.From.GetName] เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] กำลังร้องขอคำสั่งใหม่ให้ [Root.GetName]"
 anomaly_failure.20.desc:0 "น่าเสียดายที่ยานใบสุริยะซึ่งพบบน [From.From.GetName] ถูกทำลายลงจากความพยายามอันงุ่มง่ามของเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ในการนำมันเข้าไปไว้ในห้องบรรทุกสินค้าของ [Root.GetName]"
 anomaly_failure.21.desc:0 "รายงานสำรวจฉบับแรกที่ระบุว่ามีสัญญาณชีวิตจากพื้นผิวของ [From.From.GetName] คงเป็นความผิดพลาด เพราะ [Root.GetName] ไม่พบสิ่งใดเช่นนั้นเลย เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] รายงานว่า [From.From.GetPlanetMoon] ดูเหมือนจะไร้ชีวิตโดยสิ้นเชิงในตอนนี้"
 anomaly_failure.22.desc:0 "สิ่งที่เคยเชื่อว่าเป็นสถานีวงโคจรซ่อนเร้นเหนือ [From.From.GetName] ได้รับการระบุแล้วว่าเป็นขยะที่ถูกดีดออกมาจากเรือวิทยาศาสตร์ลำเดียวกับที่ทำการสำรวจ [From.From.GetPlanetMoon] ครั้งแรก เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] และลูกเรือของ [Root.GetName] เสนอว่าเราควรลืมเหตุการณ์น่าอับอายนี้ไปและเดินหน้าต่อ"
 anomaly_failure.23.desc:0 "หลังการวิเคราะห์อย่างรอบคอบ เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] สรุปได้ว่าเศษซากยานที่พบบน [From.From.GetName] นั้นมาจากเรือเก็บขยะเพียงลำเดียว [Root.GetName] ได้เก็บซากบางส่วนมาแล้ว แต่มันดูไร้ค่าโดยสิ้นเชิง"
 anomaly_failure.24.desc:0 "การสแกนเชิงลึกจาก [Root.GetName] ดูเหมือนจะไปกระตุ้นให้เกิดไฟฟ้าขัดข้องต่อเนื่องบางอย่างในอู่ต่อยานโบราณที่โคจรรอบ [From.From.GetName] ตามรายงานของเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] มันระเบิดออกมาอย่างตระการตาในท้ายที่สุด"
 anomaly_failure.25.desc:0 "สิ่งที่รายงานว่าเป็นซากเมืองบนพื้นผิวของ [From.From.GetName] ที่แท้แล้วเป็นเพียงโขดหินรูปร่างประหลาดเท่านั้น เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ขออภัยต่อการสิ้นเปลืองทรัพยากรครั้งนี้ และได้ขอภารกิจใหม่ให้ [Root.GetName]"
 anomaly_failure.26.desc:0 "เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] รายงานว่ารอยแผลเป็นที่สังเกตพบบนพื้นผิวของ [From.From.GetName] นั้น แท้จริงแล้วมีต้นกำเนิดตามธรรมชาติ [Root.GetName] จึงต้องการภารกิจใหม่"
 anomaly_failure.27.desc:0 "[Root.GetName] สูญเสียสัญญาณอ่อนๆ ที่มาจาก [From.From.GetName] ไป และแม้เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] จะพยายามเต็มที่แล้ว ความพยายามติดตามหามันอีกครั้งก็ล้มเหลวทั้งหมด"
 anomaly_failure.28.desc:0 "แนวเทือกเขาที่ดูผิดธรรมชาติซึ่งพบบน [From.From.GetName] นั้น แท้จริงแล้วก็เป็นธรรมชาติอย่างยิ่ง เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] เห็นว่าการให้ [Root.GetName] อยู่ที่นี่ต่อแม้เพียงวินาทีเดียวก็เป็นการสิ้นเปลืองทรัพยากรโดยใช่เหตุ"
 anomaly_failure.29.desc:0 "แม้จะพยายามซ้ำแล้วซ้ำเล่า เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] และลูกเรือที่เหลือของ [Root.GetName] ก็ไม่สามารถระบุตำแหน่งของวัตถุสะท้อนแสงที่เคยถูกรายงานในการสำรวจ [From.From.GetName] ครั้งแรกได้ บางทีมันอาจเป็นเพียงความผิดพลาดของเซ็นเซอร์"
 anomaly_failure.30.desc:0 "[Root.GetName] ไม่สามารถระบุต้นตอของสัญญาณอ่อนๆ ที่เราตรวจพบจากภายใน [From.From.GetName] ได้ เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] รายงานว่าสัญญาณนั้นได้หยุดลงอย่างสิ้นเชิงแล้ว"
 anomaly_failure.31.desc:0 "แม้ [Root.GetName] จะสแกนซ้ำแล้วซ้ำเล่า ก็ไม่พบแม้แต่ร่องรอยของยานที่ควรถูกซ่อนอยู่ภายในชั้นบรรยากาศของ [From.From.GetName] เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] แสดงความสงสัยว่าสิ่งนั้นอาจไม่เคยมีอยู่จริง"
 anomaly_failure.32.desc:0 "หลังจากคำนวณวงโคจรของดวงจันทร์ที่เชื่อกันว่ากำลังมุ่งชน [From.From.GetName] ใหม่ เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ก็สรุปว่ามันจะเป็นเพียงการเฉียดผ่านเท่านั้น [Root.GetName] ควรถูกส่งไปจัดการเรื่องเร่งด่วนกว่า"
 anomaly_failure.33.desc:0 "สัญญาณของกิจกรรม Vultaum บริเวณใกล้เคียง [From.From.GetName] กลายเป็นเพียงเบาะแสลวง เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ขอให้ [Root.GetName] เดินหน้าค้นหาต่อที่อื่น"
 anomaly_failure.34.desc:0 "สัญญาณของกิจกรรมยี้บริเวณใกล้เคียง [From.From.GetName] กลายเป็นเพียงเบาะแสลวง เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ขอให้ [Root.GetName] เดินหน้าค้นหาต่อที่อื่น"
 anomaly_failure.35.desc:0 "สัญญาณของกิจกรรมลีกแรกบริเวณใกล้เคียง [From.From.GetName] กลายเป็นเพียงเบาะแสลวง เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ขอให้ [Root.GetName] เดินหน้าค้นหาต่อที่อื่น"
 anomaly_failure.36.desc:0 "สัญญาณของกิจกรรมอิหร่านบริเวณใกล้เคียง [From.From.GetName] กลายเป็นเพียงเบาะแสลวง เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ขอให้ [Root.GetName] เดินหน้าค้นหาต่อที่อื่น"
 anomaly_failure.37.desc:0 "สัญญาณของกิจกรรมไซเบรกซ์บริเวณใกล้เคียง [From.From.GetName] กลายเป็นเพียงเบาะแสลวง เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ขอให้ [Root.GetName] เดินหน้าค้นหาต่อที่อื่น"

 anomaly_failure.400.desc:1 "ด้วยเหตุผลที่ไม่ชัดเจน เจ้าหน้าที่วิทยาศาสตร์ประจำยานตัดสินใจนำกระสวยลำหนึ่งออกจาก [Root.GetName] ไปตรวจสอบดาวเคราะห์น้อย [From.From.GetName] ด้วยตนเอง หลังจากนั้นไม่นานก็ตรวจพบการระเบิดขึ้น เมื่อกระสวยพุ่งชนพื้นผิวของดาวเคราะห์น้อยโดยอุบัติเหตุ\n\nต่อมาคณะกรรมการสอบสวนได้สรุปว่านักวิทยาศาสตร์ผู้ล่วงลับไม่เคยผ่านการฝึกใช้งานกระสวยชั้น D มาก่อน"
 anomaly_failure.401.desc:0 "ขณะกำลังปรับทิศทางเพื่อสืบสวน [From.From.GetName] [Root.GetName] ได้ชนเข้ากับดาวเคราะห์น้อยอีกก้อนโดยไม่ได้ตั้งใจ ยานเสียการควบคุมและพุ่งปะทะพื้นผิวของ [From.From.GetName] ก่อนจะไถลลึกเข้าไปในเปลือกของดาวเคราะห์น้อย\n\nมีรายงานว่าเจ้าหน้าที่วิทยาศาสตร์ที่อยู่บนยานสูญหายไปพร้อมกับลูกเรือที่เหลือ"
 anomaly_failure.402.desc:0 "ขณะกำลังปรับทิศทางเพื่อสืบสวน [From.From.GetName] [Root.GetName] ได้ชนเข้ากับดาวเคราะห์น้อยอีกก้อนโดยไม่ได้ตั้งใจ ยานเสียการควบคุมและพุ่งปะทะพื้นผิวของ [From.From.GetName] ก่อนจะไถลลึกเข้าไปในเปลือกของดาวเคราะห์น้อย\n\nผู้รอดชีวิตกลุ่มเล็กๆ รวมถึงเจ้าหน้าที่วิทยาศาสตร์ประจำยาน สามารถหลบหนีออกจากยานที่กำลังจะพังพินาศได้ด้วยแคปซูลหลบหนี"
 anomaly_failure.403.desc:0 "ดาวเคราะห์น้อยดวงนี้เป็นแหล่งทำรังของสิ่งมีชีวิตขนาดใหญ่บางชนิดที่ดำรงอยู่ในสุญญากาศ! หลายตัวพุ่งออกมาจากเครือข่ายอุโมงค์ของพวกมันเพื่อปกป้องอาณาเขตจาก [Root.GetName] อย่างดุเดือด"
 creature_nest:0 "สิ่งมีชีวิตศัตรูกำลังเข้ามาอย่างรวดเร็ว!"
 anomaly_failure.404.desc:0 "โดรนทางทหารระดับสูงที่ถูกออกแบบโดยอารยธรรมซึ่งสูญหายไปนานแล้วหลายตัว นั่งรวมกลุ่มกันอยู่ในหลุมเล็กๆ บนด้านไกลของ [From.From.GetName] เมื่อ [Root.GetName] เข้าใกล้ระยะเซ็นเซอร์แบบพาสซีฟของพวกมัน โดรนก็เปิดทำงานขึ้นมาเพื่อทำตามคำสั่งโบราณที่ถูกโปรแกรมไว้ ป้องกันระบบจากผู้บุกรุกไม่ว่าจะต้องแลกด้วยอะไรก็ตาม"
 dormant_drones:0 "โดรนโจมตีกำลังเข้ามา!"
 anomaly_failure.405.desc:0 "การสแกนเชิงรุกจาก [Root.GetName] ตรวจพบโครงสร้างหลายแห่งบนพื้นผิวของ [From.From.GetName] ได้เพียงช่วงสั้นๆ ก่อนที่สัญญาณจะถูกกลบด้วยการรบกวนจากสัญญาณกวนในไม่กี่วินาทีต่อมา เรือโจรสลัดหลายลำพุ่งออกมาจากโรงเก็บที่ซ่อนอยู่ในดาวเคราะห์น้อย และกำลังเข้าประชิดในรูปขบวนโจมตี!"
 pirate_outpost:0 "โจรสลัดพวกนั้นเอาจริง!"
 anomaly_failure.900.desc:0 "ข่าวเศร้าจาก [From.From.GetName] เจ้าหน้าที่วิทยาศาสตร์ที่รับผิดชอบถูกไฟฟ้าช็อตเสียชีวิตขณะเดินทางด้วยกระสวยลำเล็กในบรรยากาศชั้นบนของดาวแก๊สยักษ์ ลูกเรือของ [Root.GetName] ได้ยกเลิกภารกิจแล้ว"
 anomaly_failure.901.desc:0 "เรายังพยายามปะติดปะต่อรายละเอียดทั้งหมดอยู่ แต่ดูเหมือนว่าด้วยเหตุผลบางอย่าง เจ้าหน้าที่วิทยาศาสตร์ได้สั่งให้ [Root.GetName] เข้าไปในบรรยากาศชั้นบนของ [From.From.GetName] เพื่อสืบสวนความผิดปกติของเซ็นเซอร์ เมื่อเข้าไปแล้ว ความเครียดต่อโครงยานก็สูงเกินรับไหวในที่สุด และยานก็สูญหายไปพร้อมคนทั้งลำ"
 anomaly_failure.902.desc:0 "ระหว่างทำการสแกนเชิงลึกของ [From.From.GetName] [Root.GetName] ประสบความล้มเหลวของเครื่องปฏิกรณ์และติดอยู่ในหลุมโน้มถ่วงของดาวแก๊สยักษ์ เจ้าหน้าที่วิทยาศาสตร์ประจำยานสามารถกำกับการอพยพลูกเรือทั้งหมดได้สำเร็จ แต่ตัวยานเองกลับถูกดึงลงสู่บรรยากาศหนาแน่นของดาวเคราะห์ และไม่ปรากฏให้เห็นอีกเลย"
 anomaly_failure.903.desc:0 "ขณะกำลังเข้าใกล้ [From.From.GetName] [Root.GetName] บังเอิญพบยานไม่ทราบฝ่ายสองลำซ่อนตัวอยู่ในเงาเซ็นเซอร์ของดาวแก๊สยักษ์ พวกมันดูเหมือนจะเป็นพวกลักลอบขนของที่กำลังทำธุรกรรมลับบางอย่างอยู่ ทันทีที่เห็นยานของคุณ เรือของผู้ลักลอบก็แยกออกจากกันและเปิดระบบอาวุธขึ้นมา พวกมันดูตั้งใจจะไม่ปล่อยพยานรอดไป!"
 smuggler_rendezvous:0 "พวกลักลอบกำลังบุกเข้ามา!"
 anomaly_failure.1400.desc:0 "ระหว่างปฏิบัติการเหนือ [From.From.GetName] [Root.GetName] ประสบการรั่วไหลของระบบกักกันในแกนเครื่องปฏิกรณ์ ความปลอดภัยของทั้งยานตกอยู่ในอันตราย แต่ด้วยการเสียสละอย่างกล้าหาญของเจ้าหน้าที่วิทยาศาสตร์ประจำยาน ห้องเครื่องจึงถูกชำระรังสีได้สำเร็จ อย่างไรก็ตาม นักวิทยาศาสตร์ผู้นั้นได้รับพิษรังสีในระดับถึงตายและไม่อาจช่วยไว้ได้"
 anomaly_failure.1400.desc.mach:0 "ระหว่างปฏิบัติการเหนือ [From.From.GetName] [Root.GetName] ประสบการรั่วไหลของระบบกักกันในแกนเครื่องปฏิกรณ์ เมื่อความปลอดภัยของทั้งยานตกอยู่ในความเสี่ยง เจ้าหน้าที่วิทยาศาสตร์ประจำยานจึงสรุปตามตรรกะว่าจะต้องเสียสละตนเองเพื่อชำระรังสีออกจากห้องเครื่อง ตามน้ำหนักความสูญเสียที่ถูกกำหนดไว้ล่วงหน้า ในกระบวนการนั้น [Root.GetLeaderName] ได้รับรังสีในระดับสูงพอที่จะทำให้เกิดการไอออไนซ์ของสารกึ่งตัวนำและความเสียหายจากการเคลื่อนตัวของโครงผลึกซิลิคอน จนไม่สามารถทำงานได้อีกต่อไป อย่างไรก็ตาม ยานและลูกเรือที่เหลือได้รับการช่วยเหลือไว้"
 anomaly_failure.1401.desc:0 "ขณะกำลังเปลี่ยนเส้นทางพลังงานไปยังชุดเซ็นเซอร์หลัก [Root.GetName] ประสบความล้มเหลวขั้นวิกฤตของเครื่องปฏิกรณ์เหนือ [From.From.GetName] เจ้าหน้าที่วิทยาศาสตร์ประจำยานเสียชีวิตในการระเบิดที่ตามมา พร้อมกับลูกเรือที่เหลือ"
 anomaly_failure.1402.desc:0 "เราไม่แน่ใจว่ามันเกิดขึ้นได้อย่างไรกันแน่ แต่เจ้าหน้าที่วิทยาศาสตร์ประจำยานกลับไปกระตุ้นลำดับการทำลายตัวเองของ [Root.GetName] โดยไม่ตั้งใจ ขณะรันแบบจำลองที่เกี่ยวข้องกับ [From.From.GetName] บนคอมพิวเตอร์ประจำยาน ความพยายามทั้งหมดที่จะยกเลิกลำดับดังกล่าวล้มเหลว และลูกเรือทั้งหมดถูกบังคับให้อพยพก่อนที่ยานจะถูกทำลาย"
 anomaly_failure.1403.desc:0 "เรือโจรสลัดหลายลำพุ่งทะยานขึ้นมาทันทีจากตำแหน่งซ่อนบนพื้นผิวของ [From.From.GetName] ดูเหมือนว่า [Root.GetName] จะบังเอิญพบแหล่งจอดพักของโจรสลัดเข้า และพวกนักเชือดคอเหล่านี้ก็ไม่พอใจอย่างมากกับการบุกรุกครั้งนี้!"
 pirate_anchorage:0 "มียานเจตนาร้ายกำลังเข้ามา!"
 anomaly_failure.1404.desc:0 "พื้นที่วงโคจรเหนือ [From.From.GetName] ดูเหมือนจะถูกใช้เป็นลานผสมพันธุ์บางประเภทโดยสิ่งมีชีวิตอวกาศสายพันธุ์ใหญ่และดุร้าย เมื่อถูก [Root.GetName] รบกวนระหว่างช่วงเวลาคู่ของพวกมัน สิ่งมีชีวิตสองตัวจึงแยกออกมาเพื่อจัดการกับผู้บุกรุกที่ไม่พึงประสงค์"
 mating_ground:0 "สิ่งมีชีวิตพวกนั้นดูหงุดหงิดมาก"
 anomaly_failure.1405.desc:0 "ฝูงโดรนรบโบราณขนาดเล็กดูเหมือนจะถูกทิ้งไว้ในวงโคจรรอบ [From.From.GetName] หลังการสู้รบที่ถูกลืมเลือนไปนาน เมื่อเซ็นเซอร์เชิงรุกของ [Root.GetName] กวาดผ่านพวกมัน โดรนเหล่านั้นก็เปิดทำงานขึ้นและเข้าสู่โหมดโจมตี!"
 combat_drones:0 "พวกมันกำลังพุ่งเข้ามาพร้อมอาวุธพร้อมยิง!"


 ####################################
 # Colony Events
 ####################################
 colony.1.name:0 "ป่าอพยพย้ายถิ่น"
 colony.1.desc:0 "พื้นผิวของดาว [Root.GetName] ปกคลุมไปด้วยป่าไม้อันเขียวชอุ่ม โดยมีต้นไม้จำลองขนาดยักษ์สูงเสียดฟ้าหลายร้อยเมตร สิ่งที่น่าสนใจคือ ชาวอาณานิคมของเราพบว่าพืชพรรณเกือบทั้งหมดสามารถเคลื่อนไหวได้ในระดับที่แตกต่างกัน ป่าที่ทอดยาวหลายไมล์จะค่อยๆ อพยพไปยังพื้นที่ใหม่ที่มีสารอาหารอุดมสมบูรณ์มากกว่าในวงจรที่ดูเหมือนจะเชื่อมโยงกับวงโคจรของ [Root.GetPlanetMoon]\n\nน่าเสียดายที่สิ่งนี้ส่งผลกระทบอย่างรุนแรงต่อความพยายามของเราในการพัฒนาโครงสร้างพื้นฐานของอาณานิคม ต้นไม้ที่อพยพเหล่านี้มักจะตัดสายไฟในขณะที่บดขยี้อาคารและถนนของเราจนกลายเป็นเศษอิฐเศษปูน"
 colony.1.a:0 "เราต้องหาทางแก้ไข"
 colony.2.desc:0 "เราได้เรียนรู้ว่าป่าพเนจรบนดาว [From.From.GetName] หลีกเลี่ยงบางภูมิภาคที่เป็นที่อยู่อาศัยของรังแมลงเทียมพื้นเมือง แมลงเหล่านี้จะหลั่งฟีโรโมนที่สามารถนำมาใช้เพื่อบังคับทิศทางของต้นไม้พเนจรให้ห่างจากศูนย์กลางประชากรได้\n\nนอกจากนี้ พื้นที่ที่ป่าไม้ขยายขอบเขตไปบ่อยที่สุดได้รับการปิดไว้เป็นเขตรักษ์ธรรมชาติ นักชีววิทยาของเราสามารถเรียนรู้ได้มากมายจากการศึกษาเขตรักษ์นี้จากภูมิภาคข้างเคียง"
 colony.2.a.tooltip:0 "เพิ่มตัวดัดแปลง §Yป่าอพยพย้ายถิ่นที่เชื่อง§! ซึ่งให้ผลดังต่อไปนี้:\nเพิ่ม £blocker£ §Yเขตรักษ์ป่าพเนจร§! ปรับปรุง £society£ §Yการวิจัย§! บนช่องข้างเคียง"
 colony.3.desc:0 "ปฏิบัติการทิ้งระเบิดนาปาล์มมีประสิทธิภาพในการทำลายล้างป่าอพยพบนดาว [From.From.GetName] พายุเพลิงขนาดใหญ่ได้ทิ้งผืนดินที่คุกรุ่นไปด้วยเถ้าถ่านไว้เบื้องหลัง ซึ่งนักนิเวศวิทยาของเราได้ปลูกต้นไม้ต่างดาวแบบดั้งเดิมที่เคลื่อนไหวได้น้อยกว่าอย่างเห็นได้ชัด การสูญเสียสัตว์ป่าของ [From.From.GetPlanetMoon] นั้นมีจำนวนมาก แต่ก็ยังอยู่ในเกณฑ์ที่ยอมรับได้"
 colony.4.name:0 "การลุกฮือของต้นไม้"
 colony.4.desc:0 "ป่าอพยพย้ายถิ่นบนดาว [Root.GetName] ได้กลับมาปรากฏตัวอีกครั้ง! เรารู้ว่ายังมีกลุ่มป่าที่โดดเดี่ยวของพวกมันรอดชีวิตอยู่ในพื้นที่ห่างไกลหลายแห่ง แต่พวกมันดูเหมือนจะสงบนิ่ง ดูเหมือนว่าพวกมันจะใช้เวลาพักรบนี้เพื่อเพิ่มจำนวน และพวกมันได้เริ่มโจมตีชุมชนของเราอย่างเป็นระบบ\n\nตรงกันข้ามกับที่เราเคยเชื่อ พวกมันมีสติปัญญาขั้นพื้นฐานบางรูปแบบอย่างชัดเจน และพวกมันกำลังออกมาล้างแค้น!"
 colony.4.a:0 "พวกมันจะต้องถูกหยุดยั้ง!"
 tree_armies:0 "ฝูงต้นไม้กำลังโจมตีชาวอาณานิคมของเราบนดาว [Root.GetName]!"
 colony.5.name:0 "การล่มสลายของต้นไม้"
 colony.5.desc:0 "ชุมชนและชีวิตจำนวนมากต้องสูญเสียไปกับต้นไม้ที่คลุ้มคลั่งบนดาว [From.From.GetName] แต่เราก็สามารถผลักดันพวกมันกลับไปและกวาดล้างพวกมันกลุ่มสุดท้ายจนหมดสิ้น หน่วยที่ติดตั้งเครื่องพ่นไฟกำลังตรวจสอบให้แน่ใจอย่างยิ่งว่าไม่มีต้นไม้ต้นใดถูกมองข้ามในครั้งนี้"
 colony.5.a:0 "นั่นน่าจะสอนบทเรียนให้พวกมันได้นะ"
 colony.6.name:0 "แหล่งแร่สะสม"
 colony.6.desc:0 "เราได้ค้นพบแหล่งแร่สะสมที่สำคัญหลายแห่ง ซึ่งก่อนหน้านี้ถูกบดบังโดยป่าพเนจรบนดาว [Root.GetName] บัดนี้เมื่อต้นไม้ถูกเผาจนกลายเป็นเถ้าถ่าน แหล่งแร่เหล่านี้จึงเข้าถึงได้ง่าย"
 colony.7.name:0 "แหล่งแร่โลหะมีค่าสะสม"
 colony.7.desc:0 "เราได้ค้นพบแหล่งแร่โลหะมีค่าสะสมที่สำคัญ ซึ่งก่อนหน้านี้ถูกบดบังโดยป่าพเนจรบนดาว [Root.GetName] บัดนี้เมื่อต้นไม้ถูกเผาจนกลายเป็นเถ้าถ่าน แหล่งแร่นี้จึงเข้าถึงได้ง่าย"
 colony.8.name:0 "ความเสียหายทางนิเวศวิทยา"
 colony.8.desc:0 "ดูเหมือนว่าป่าอพยพที่เรากวาดล้างบนดาว [Root.GetName] จะมีบทบาทสำคัญในระบบนิเวศของ [Root.GetPlanetMoon] มากกว่าที่เคยคิดไว้ ไฟป่าที่เราเริ่มก่อขึ้นและการหายไปของป่าไม้ส่งผลให้สิ่งมีชีวิตท้องถิ่นหลายชนิดสูญพันธุ์ ส่งผลกระทบเป็นโดมิโนที่พรากชีวิตของผู้ล่าหลายชนิดไปด้วย\n\nความพยายามยังคงดำเนินต่อไปเพื่อฟื้นฟูสมดุลทางนิเวศวิทยาที่เปราะบางนี้อย่างน้อยบางส่วน โดยการนำพืชและสัตว์ชนิดใหม่จากโลกอื่นเข้ามา แต่มันเป็นกระบวนการที่ยากลำบากและต้องใช้เวลา"
 colony.9.name:0 "การปรับตัวของป่าไม้"
 colony.9.desc:0 "ปฏิสัมพันธ์อย่างต่อเนื่องระหว่างชาวอาณานิคมของเรากับป่าพเนจรบนดาว [Root.GetName] แสดงให้เห็นว่าต้นไม้เหล่านี้มีสติปัญญาร่วมขั้นพื้นฐานบางรูปแบบ พวกมันดูเหมือนจะปรับตัวให้เข้ากับการมีอยู่ของเรา และตอนนี้ก็พยายามหลีกเลี่ยงการทำลายทรัพย์สินของชาวอาณานิคมของเรา แม้ว่าจะไม่ได้ใช้ฟีโรโมนของแมลงก็ตาม ขวัญกำลังใจในหมู่ชาวอาณานิคมเพิ่มสูงขึ้น"
 colony.10.name:0 "การวิจัยป่าไม้"
 colony.10.desc:0 "เราได้เรียนรู้สิ่งต่างๆ มากมายจากการอาศัยอยู่ใกล้ชิดกับป่าพเนจรบนดาว [Root.GetName] ชาวอาณานิคมที่กล้าคิดกล้าทำบางคนถึงกับสร้างบ้านบนยอดไม้ของสายพันธุ์ที่ใหญ่กว่าบางต้น โดยเดินทางตามป่าไปในขณะที่พวกมันอพยพไปทั่ว [Root.GetPlanetMoon] นักชีววิทยาชั้นนำบางคนใน [Root.Owner.GetName] ได้ใช้เวลาศึกษาต้นไม้ที่เป็นเอกลักษณ์เหล่านี้"
 colony.11.name:0 "ไฟป่า"
 colony.11.desc:0 "ไฟป่าที่เกิดจากฟ้าผ่าบนดาว [Root.GetName] ก่อให้เกิดเหตุการณ์คล้ายกับการแตกตื่นในหมู่ป่าพเนจรของ [Root.GetPlanetMoon] ความตื่นตระหนกอย่างบ้าคลั่งทำให้พวกมันเข้าไปในพื้นที่ที่เคยหลีกเลี่ยง ส่งผลให้เกิดความเสียหายเป็นวงกว้างต่อพื้นที่ของอาณานิคม"
 colony.12.name:0 "ป่าพเนจรอพยพย้ายถิ่น"
 colony.12.desc:0 "หน่วยงานปกครองอาณานิคมบนดาว [Root.GetName] รายงานว่า ป่าพเนจรท้องถิ่นแห่งหนึ่งได้อพยพไปยังอีกภูมิภาคหนึ่งบนดาว [Root.GetPlanetMoon] แล้ว! ต้นไม้หลายแสนต้นได้ถอนรากและเดินขบวนอย่างพร้อมเพรียงกันไปยังพื้นที่ใหม่นี้ โดยเหยียบย่ำทุกสิ่งที่ขวางหน้า"
 colony.50.name:0 "ความสั่นสะเทือนทางธรณีวิทยา"
 colony.50.desc:0 "มีรายงานจำนวนมากเกี่ยวกับความสั่นสะเทือนทางธรณีวิทยาที่อธิบายไม่ได้บนดาว [Root.GetName] สามารถรู้สึกถึงแรงสั่นสะเทือนได้ทั่วทั้ง [Root.GetPlanetMoon] และชุมชนหลายแห่งของเราได้รับความเสียหาย ขณะที่สืบสวนเหตุแผ่นดินไหว นักวิทยาศาสตร์ของเราได้ค้นพบเครือข่ายถ้ำใต้ดินอันกว้างใหญ่\n\nถ้ำที่ลึกที่สุดในนี้เป็นที่อยู่อาศัยของอารยธรรมพื้นเมืองบางประเภท - และดูเหมือนว่าพวกเขากำลังขุดอุโมงค์มุ่งตรงมายังพื้นผิวโลก! แรงสั่นสะเทือนบนพื้นดินจากชุมชนของเราอาจเป็นตัวกระตุ้นพฤติกรรมนี้ แต่เราก็ไม่แน่ใจนัก ไม่มีทางรู้เลยว่าเอเลี่ยนเหล่านี้จะมีปฏิกิริยาอย่างไรเมื่อพวกเขาหลั่งไหลออกมาจากอุโมงค์และเผชิญหน้ากับชาวอาณานิคมของเรา!"
 colony.50.desc.subterranean:0 "มีรายงานจำนวนมากเกี่ยวกับความสั่นสะเทือนทางธรณีวิทยาที่อธิบายไม่ได้บนดาว [Root.GetName] สามารถรู้สึกถึงแรงสั่นสะเทือนได้ทั่วทั้ง [Root.GetPlanetMoon] และชุมชนหลายแห่งของเราได้รับความเสียหาย ขณะที่สืบสวนเหตุแผ่นดินไหว นักวิทยาศาสตร์ของเราได้ค้นพบเครือข่ายถ้ำอันกว้างใหญ่ในเนื้อโลกของดาวเคราะห์\n\nถ้ำที่ลึกที่สุดในนี้เป็นที่อยู่อาศัยของอารยธรรมพื้นเมืองบางประเภท - และดูเหมือนว่าพวกเขากำลังขุดอุโมงค์มุ่งตรงมายังอาณานิคมของเรา! แรงสั่นสะเทือนในแต่ละวันจากกิจกรรมในชุมชนของเราอาจเป็นตัวกระตุ้นพฤติกรรมนี้ แต่เราก็ไม่แน่ใจนัก ไม่มีทางรู้เลยว่าเอเลี่ยนเหล่านี้จะมีปฏิกิริยาอย่างไรเมื่อพวกเขาหลั่งไหลออกมาจากอุโมงค์และเผชิญหน้ากับชาวอาณานิคมของเรา!"
 colony.50.a:0 "เราต้องจัดการกับสถานการณ์นี้"
 colony.51.desc:0 "โพรบตรวจจับลำหนึ่งของเราได้เจาะลงไปในพื้นดินและสกัดกั้นเอเลี่ยนที่กำลังขุดอุโมงค์บนดาว [From.From.GetName] หลังจากคนงานเอเลี่ยนที่ตื่นตระหนกสงบสติอารมณ์ลง โพรบก็ประสบความสำเร็จในการจัดตั้งการสื่อสารกับผู้นำของพวกเขา"
 colony.51.a:0 "เปิดช่องทางการสื่อสาร"
 colony.52.desc:1 "ความพยายามของเราในการทำลายล้างเอเลี่ยน [Root.Owner.GetSubMantleLower] บนดาว [Root.GetName] ประสบความสำเร็จแล้ว! เราสามารถทำให้อุโมงค์หลายแห่งถล่มลงมาทับคนงานของพวกเขาได้ และถ้ำที่เป็นที่ตั้งของเมืองต่างๆ ของพวกเขาได้รับการรมด้วยแก๊สทำลายประสาท\n\nคาดการณ์อัตราการสูญเสียชีวิตใกล้เคียง 100% และกองกำลังรักษาความปลอดภัยของเรามั่นใจว่าพวกเขาจะสามารถจัดการกับผู้รอดชีวิตที่หลงเหลืออยู่ได้"
 colony.52.a:0 "ขอชมเชยทุกหน่วยบริการที่มีส่วนร่วม"
 colony.53.name:2 "เอเลี่ยน[Root.Owner.GetSubMantleUpper]"
 colony.53.desc:0 "เครื่องนี้ทำงานอยู่หรือเปล่า? พวกเจ้าเห็นพวกเราไหม ชาวพื้นผิว? พวกเราเข้าใจว่าพวกเจ้ามาจากความว่างเปล่าอันยิ่งใหญ่ที่อยู่ด้านบน พ้นจากชั้นหินขึ้นไป เคยคิดกันว่าไม่มีสิ่งมีชีวิตใดอาศัยอยู่ที่นั่นได้ แต่เห็นได้ชัดว่าไม่ใช่อย่างนั้น เจตนาของพวกเจ้าคืออะไรกันแน่?"
 colony.53.a:0 "บอกเราเกี่ยวกับตัวคุณ"
 colony.53.desc.subterranean:0 "เครื่องนี้ทำงานอยู่หรือเปล่า? พวกเจ้าเห็นพวกเราไหม ชาวเปลือกโลก? พวกเราเข้าใจว่าพวกเจ้ามาจากความว่างเปล่าอันยิ่งใหญ่ที่อยู่สูงขึ้นไปอีก พ้นจากแมกมาและหินขึ้นไป เคยคิดกันว่าไม่มีสิ่งมีชีวิตใดอาศัยอยู่ที่นั่นได้ แต่เห็นได้ชัดว่าไม่ใช่อย่างนั้น เจตนาของพวกเจ้าคืออะไรกันแน่?"
 colony.53.a.response:0 "จักรวรรดิของเราแผ่ขยายไปทั่วทุกซอกทุกมุมของโลกที่รู้จัก มีเพียงความว่างเปล่าอันยิ่งใหญ่เท่านั้นที่อยู่เกินเอื้อมของเรา เรามีเมืองที่สวยงามมากมาย หล่อเลี้ยงด้วยฟาร์มไลเคนและปลาที่เราจับได้ในแม่น้ำสายใหญ่ที่ไหลผ่านอุโมงค์ของเรา\n\nนี่เป็นวิถีชีวิตของเรามานานหลายพันปีแล้ว นักขุดของเราได้ยินเสียงสะท้อนอันแผ่วเบาจากเมืองของพวกเจ้าผ่านทางชั้นหิน และเราตัดสินใจที่จะเข้ามาสืบดู"
 colony.53.b:0 "เราอยากจะอยู่ร่วมกันอย่างสันติ"
 colony.53.b.response:0 "ถ้าอย่างนั้นก็ตกลง ชาวพื้นผิว! ขอให้พวกเราแบ่งปันโลกใบนี้ร่วมกันด้วยจิตวิญญาณแห่งสันติภาพ พวกเราสนใจอย่างยิ่งที่จะค้าขายกับผู้คนของพวกเจ้า ข้าเชื่อว่าเราต่างมีสิ่งที่จะมอบให้แก่กันและกันมากมาย พวกเราจะกลับไปยังเมืองของพวกเราและจัดการเตรียมการต่างๆ"
 colony.53.b.response.subterranean:0 "ถ้าอย่างนั้นก็ตกลง 'ชาวเปลือกโลก'! ขอให้พวกเราแบ่งปันโลกใบนี้ร่วมกันด้วยจิตวิญญาณแห่งสันติภาพ พวกเราสนใจอย่างยิ่งที่จะค้าขายกับผู้คนของพวกเจ้า ข้าเชื่อว่าเราต่างมีสิ่งที่จะมอบให้แก่กันและกันมากมาย พวกเราจะกลับไปยังเมืองของพวกเราและจัดการเตรียมการต่างๆ"
 colony.53.c:0 "ยอมจำนนหรือถูกทำลาย"
 colony.53.c.response:0 "ฮ่า! พวกเจ้านั่นแหละที่จะต้องสยบแทบเท้าเรา! เราควรจะได้อยู่ร่วมกันอย่างสันติ แต่ตอนนี้กองทัพของเราจะเข้ายึดครองความว่างเปล่าอันยิ่งใหญ่และผนวกเข้ากับจักรวรรดิของเรา มันเป็นโชคชะตาของเรามาโดยตลอดที่จะต้องปกครองสรรพสิ่งทั้งหมดที่ถูกสร้างขึ้น"
 colony.54.name:1 "[Root.Owner.GetSubMantleUpper] บุก!"
 colony.54.desc:0 "เอเลี่ยนใต้ดินที่ดาว [Root.GetName] ได้ขึ้นมาบนพื้นผิวแล้ว! กองทัพขนาดใหญ่ที่ติดตั้งอาวุธกระสุนปืนแบบดั้งเดิมแต่อันตรายกำลังทะลักออกจากอุโมงค์และแนวหน้าของพวกเขาได้เริ่มโจมตีชุมชนของเราแล้ว\n\nกองกำลังรักษาความปลอดภัยของเรากำลังตอบโต้ แต่เราอาจจำเป็นต้องส่งกำลังเสริม!"
 colony.54.desc.subterranean:0 "เอเลี่ยนที่อาศัยอยู่ใต้ดินบนดาว [Root.GetName] ได้โผล่เข้ามาในถ้ำของเราแล้ว! กองทัพขนาดใหญ่ที่ติดตั้งอาวุธกระสุนปืนแบบดั้งเดิมแต่อันตรายกำลังทะลักออกจากอุโมงค์และแนวหน้าของพวกเขาได้เริ่มโจมตีชุมชนของเราแล้ว\n\nกองกำลังรักษาความปลอดภัยของเรากำลังตอบโต้ แต่เราอาจจำเป็นต้องส่งกำลังเสริม!"
 colony.54.a:0 "เตรียมอาวุธ!"
 subterranean_invasion:0 "กองทัพศัตรูกำลังโจมตีอาณานิคมของเราบนดาว [Root.GetName]!"
 colony.55.desc:0 "เหตุแผ่นดินไหวที่สร้างความเสียหายให้กับดาว [From.From.GetName] เกิดจากความพยายามขุดอุโมงค์ของอารยธรรมใต้ดินที่ไม่เคยเป็นที่รู้จักมาก่อน ซึ่งเป็นชนพื้นเมืองของ [From.From.GetPlanetMoon]! พวกเขาได้เจาะทะลุพื้นผิวขึ้นมาแล้ว และกองทัพขนาดใหญ่ที่ติดตั้งอาวุธกระสุนปืนแบบดั้งเดิมแต่ร้ายแรงถึงชีวิตกำลังไหลทะลักออกมาจากอุโมงค์ แนวหน้าของพวกเขาได้เริ่มเปิดฉากโจมตีชุมชนของเราแล้ว กองกำลังรักษาความปลอดภัยของเรากำลังตอบโต้ แต่เราอาจจำเป็นต้องใช้กำลังเสริม!"
 colony.56.name:0 "ชัยชนะบนดาว [From.From.GetName]!"
 colony.56.desc:0 "กองกำลังของเราสามารถผลักดันเอเลี่ยนใต้ดินบนดาว [From.From.GetName] กลับเข้าไปในถ้ำใต้ดินของพวกเขาได้ และได้รับการควบคุมไว้ชั่วคราวในขณะนี้ อย่างไรก็ตาม นี่เป็นเพียงวิธีแก้ปัญหาชั่วคราว และการที่พวกเขาจะทำลายอุโมงค์ขึ้นมาสู่พื้นผิวอีกครั้งก็เป็นเพียงเรื่องของเวลาเท่านั้น\n\nเราจำเป็นต้องโจมตีพวกเขาจากใต้ดิน และนักยุทธศาสตร์ของเราได้คิดค้นแผนการโจมตีแบบใหม่ขึ้นมา มันได้รับการเพิ่มเข้าไปในบันทึกสถานการณ์แล้ว"
 colony.56.desc.subterranean:0 "กองกำลังของเราสามารถผลักดันเอเลี่ยนที่อาศัยอยู่ในเนื้อโลกบนดาว [From.From.GetName] กลับเข้าไปในรังแมกมาของพวกเขาได้ และได้รับการควบคุมไว้ชั่วคราวในขณะนี้ อย่างไรก็ตาม นี่เป็นเพียงวิธีแก้ปัญหาชั่วคราว และการที่พวกเขาจะทำลายแนวป้องกันเข้ามาในถ้ำของเราอีกครั้งก็เป็นเพียงเรื่องของเวลาเท่านั้น\n\nเราจำเป็นต้องโจมตีพวกเขาจากใต้ดิน และนักยุทธศาสตร์ของเราได้คิดค้นแผนการโจมตีแบบใหม่ขึ้นมา มันได้รับการเพิ่มเข้าไปในบันทึกสถานการณ์แล้ว"
 colony.56.a:0 "เราต้องแก้ปัญหานี้ให้หมดสิ้นไป"
 colony.57.name:0 "ความพ่ายแพ้ที่ [From.From.GetName]!"
 colony.57.desc:1 "กองกำลังของเราบนดาว [From.From.GetName] ถูกทำลายล้างจนหมดสิ้น และเอเลี่ยน [Root.Owner.GetSubMantleLower] ได้เข้าควบคุมชุมชนทั้งหมดของเราโดยสมบูรณ์! พวกเขากำลังใช้ดาวเทียมดวงหนึ่งของเราในการส่งข้อความถึงเรา"
 colony.58.desc:0 "สิ่งมีชีวิตบนพื้นผิว! กองทัพอันรุ่งโรจน์ของเราได้เอาชนะพวกเจ้าในการรบแล้ว และทรัพย์สินที่ยึดมาได้จากเมืองของพวกเจ้าตอนนี้เป็นของพวกเราที่จะจัดการอย่างไรก็ได้ตามใจชอบ เราได้เรียนรู้อะไรมากมายจากเครื่องจักรของพวกเจ้า และอาวุธของเราในตอนนี้ก็ทรงพลังยิ่งกว่าที่เคย\n\nอย่าได้เข้ามาใกล้โลกใบนี้อีก!"
 colony.58.desc.subterranean:0 "สิ่งมีชีวิตที่เกาะเปลือกโลก! กองทัพอันรุ่งโรจน์ของเราได้เอาชนะพวกเจ้าในการรบแล้ว และทรัพย์สินที่ยึดมาได้จากเมืองของพวกเจ้าตอนนี้เป็นของพวกเราที่จะจัดการอย่างไรก็ได้ตามใจชอบ เราได้เรียนรู้อะไรมากมายจากเครื่องจักรของพวกเจ้า และอาวุธของเราในตอนนี้ก็ทรงพลังยิ่งกว่าที่เคย\n\nอย่าได้เข้ามาใกล้โลกใบนี้อีก!"
 colony.58.a:0 "เตรียมพร้อมสำหรับ..."
 colony.59.name:0 "เอเลี่ยนใต้ผิวดาว"
 colony.59.desc:0 "เอเลี่ยนใต้ดินที่ดาว [From.From.GetName] ปรากฏตัวขึ้นแล้ว! การเดินทางของพวกเขาดูเหมือนจะจำกัดอยู่เพียงกลุ่มนักสำรวจและพ่อค้ากลุ่มเล็กๆ เท่านั้น พวกเขาอาจเต็มใจที่จะอยู่ร่วมกันกับชาวอาณานิคมของเราอย่างสันติ อาจถึงขั้นมีส่วนร่วมในการค้าขายด้วยซ้ำและเราได้รับการติดต่อจากตัวแทนคนหนึ่งของพวกเขา"
 colony.59.desc.subterranean:0 "เอเลี่ยนที่อาศัยอยู่ใต้ดินบนดาว [From.From.GetName] ได้โผล่เข้ามาในถ้ำของเราแล้ว! การเดินทางของพวกเขาดูเหมือนจะจำกัดอยู่เพียงกลุ่มนักสำรวจและพ่อค้ากลุ่มเล็กๆ เท่านั้น พวกเขาอาจเต็มใจที่จะอยู่ร่วมกันกับชาวอาณานิคมของเราอย่างสันติ อาจถึงขั้นมีส่วนร่วมในการค้าขายด้วยซ้ำและเราได้รับการติดต่อจากตัวแทนคนหนึ่งของพวกเขา"
 colony.59.a:0 "เรามาดูกันว่า พวกเขาจะพูดอะไร"
 colony.60.desc:0 "เอเลี่ยนใต้ดินบนดาว [Root.GetName] ได้รวบรวมกำลังพลในจักรวรรดิใต้ดินของพวกเขามากพอที่จะเปิดฉากบุกพื้นผิวโลกอีกครั้ง! กองทัพที่บ้าคลั่งของพวกเขากำลังหลั่งไหลออกมาจากอุโมงค์ที่เพิ่งขุดใหม่เพื่อท้าทายเราอีกครั้ง"
 colony.60.desc.subterranean:0 "เอเลี่ยนที่อาศัยอยู่ในแมกมาบนดาว [Root.GetName] ได้รวบรวมกำลังพลในจักรวรรดิของพวกเขามากพอที่จะเปิดฉากบุกถ้ำของเราอีกครั้ง! กองทัพที่บ้าคลั่งของพวกเขากำลังหลั่งไหลออกมาจากอุโมงค์ที่เพิ่งขุดใหม่เพื่อท้าทายเราอีกครั้ง"
 colony.60.a:0 "เราต้องผลักดันพวกมันกลับไป!"
 subterranean_invasion_2:0 "กองทัพศัตรูกำลังโจมตีอาณานิคมของเราบนดาว [Root.GetName]!"
 colony.61.name:0 "การพังทลาย"
 colony.61.desc:1 "ข่าวร้ายจากดาว [Root.GetName]! เอเลี่ยน [Root.Owner.GetSubMantleLower] ที่เราต่อสู้ด้วยดูเหมือนจะสามารถทำให้พื้นดินใต้กองทัพทั้งหมดที่ประจำการอยู่ใกล้กับทางเข้าอุโมงค์ของพวกเขาพังทลายลงไป\n\nทหารจำนวนน้อยที่รอดชีวิตจากการตกจากที่สูงถูกเอเลี่ยนฆ่าอย่างรวดเร็วก่อนที่กองกำลังที่เหลือของเราจะสามารถเข้าไปช่วยชีวิตได้ทัน"
 colony.61.a:0 "พวกมันต้องชดใช้กับเรื่องนี้!"
 colony.62.name:0 "กองโจรจู่โจม"
 colony.62.desc:0 "เอเลี่ยนที่อาศัยอยู่ใต้ดินในอาณานิคมของเราบนดาว [Root.GetName] ได้ส่งกองโจรจู่โจมกลุ่มเล็กๆ ออกมาจากอุโมงค์ในตอนกลางคืน การโจมตีของพวกเขาทำลายสิ่งอำนวยความสะดวกหลักชิ้นหนึ่งของอาณานิคม และก่อนที่กองกำลังของเราจะตอบโต้ได้ทัน หน่วยจู่โจมเหล่านั้นก็อันตรธานหายไปใต้ดินเสียแล้ว"
 colony.62.a:0 "การลอบจู่โจมเหล่านี้ต้องยุติลง!"
 colony.63.name:0 "การโจมตีบนพื้นผิว"
 colony.63.desc:1 "เกิดการโจมตีขึ้นอีกครั้งบนดาว [Root.GetName]! เอเลี่ยน [Root.Owner.GetSubMantleLower] โผล่ออกมาจากอุโมงค์ใหม่ใจกลางชุมชนใหญ่แห่งหนึ่งของเรา พวกเขาเอาชนะการป้องกันในท้องถิ่นและเข่นฆ่าชาวอาณานิคมของเรา ผู้รอดชีวิตที่กรีดร้องจำนวนหนึ่งถูกพวกเอเลี่ยนลากลงไปใต้ดินในขณะที่พวกมันล่าถอยกลับเข้าไปในอุโมงค์"
 colony.63.a:0 "การฆาตกรรมเหล่านี้จะต้องไม่ผ่านไปโดยไม่ได้รับการสะสาง"
 colony.64.name:0 "แหล่งกบดานของผู้รอดชีวิต"
 colony.64.desc:1 "กองกำลังของเราบนดาว [Root.GetName] ยังคงทำแผนที่เครือข่ายอุโมงค์ใต้ดินใต้อาณานิคมของเรา พวกเขาได้พบกับเมืองขนาดใหญ่ที่เป็นของเอเลี่ยน [Root.Owner.GetSubMantleLower] ซึ่งสามารถแยกตัวเองออกจากจักรวรรดิใต้ดินส่วนที่เหลือได้ก่อนที่เราจะรมแก๊สประสาท มีเอเลี่ยนที่ตื่นตระหนกหลายล้านคนในเมือง วิศวกรของเราควรทำลายถ้ำให้ถล่มลงมาเพื่อปิดงานเลยดีหรือไม่?"
 colony.64.a:0 "ใช่ ปลดปล่อยพวกเขาจากความทุกข์ทรมานซะ"
 colony.64.b:0 "ไม่! นำพวกเขาขึ้นมาบนพื้นผิว ซึ่งพวกเขาจะได้รับใช้เรา"
 colony.64.b.subterranean:0 "ไม่! นำพวกเขามายังอาณานิคม ซึ่งพวกเขาจะได้รับใช้เรา"
 colony.65.name:1 "การขยายตัวของ [Root.Owner.GetSubMantleUpper]"
 colony.65.desc:0 "เราได้กำจัดแก๊สพิษและซากศพเอเลี่ยนออกจากเครือข่ายอุโมงค์บนดาว [Root.GetName] เรียบร้อยแล้ว ตอนนี้ควรจะปลอดภัยสำหรับชาวอาณานิคมของเราในการย้ายเข้าไปอยู่ เมืองดิบเถื่อนที่พวกเอเลี่ยนทิ้งไว้เบื้องหลังจะถูกรื้อถอนอย่างแน่นอน และแทนที่ด้วยสถาปัตยกรรมที่ล้ำหน้าของเราเอง"
 colony.66.name:0 "ทองคำ!"
 colony.66.desc:0 "นักสำรวจแร่ได้ล่วงล้ำเข้าไปในอุโมงค์ลึกบางแห่งที่ครั้งหนึ่งเคยเป็นของเอเลี่ยนใต้ดินที่ตายไปแล้วบนดาว [Root.GetName] ในที่สุดพวกเขาก็ค้นพบเหมืองทองคำที่มีข่าวลือมานาน ซึ่งเป็นที่เชื่อกันว่าจักรวรรดิเอเลี่ยนใต้ดินได้รับโลหะมีค่าสะสมจำนวนมากจากที่นี่"
 colony.66.desc.subterranean:0 "นักสำรวจแร่ได้ล่วงล้ำเข้าไปในอุโมงค์ลึกบางแห่งที่ครั้งหนึ่งเคยเป็นของสิ่งมีชีวิตในแมกมาที่ตายไปแล้วบนดาว [Root.GetName] ในที่สุดพวกเขาก็ค้นพบเหมืองทองคำที่มีข่าวลือมานาน ซึ่งเป็นที่เชื่อกันว่าจักรวรรดิเอเลี่ยนใต้ดินได้รับโลหะมีค่าสะสมจำนวนมากจากที่นี่"
 colony.67.name:0 "ท้องพระคลัง"
 colony.67.desc:0 "หน่วยสอดแนมที่สำรวจเครือข่ายอุโมงค์บนดาว [Root.GetName] ได้เข้าสู่พระราชวังในอดีตเมืองหลวงของจักรวรรดิเอเลี่ยนใต้ดิน ศพของผู้ที่เป็นจักรพรรดิของพวกมันยังคงนั่งอยู่บนบัลลังก์ขนาดยักษ์ในห้องโถงใหญ่\n\nหลังจากใช้ระเบิดเพื่อเจาะเข้าไปในคลังสมบัติของวัง หน่วยสอดแนมของเราพบว่าเต็มไปด้วยทองคำและศิลปะเอเลี่ยนที่แปลกประหลาด ศิลปะเหล่านั้นจะถูกส่งกลับไปยังพิพิธภัณฑ์บนดาว [From.Owner.Capital.GetName] และการขายทองคำน่าจะช่วยเสริมงบประมาณของรัฐได้เป็นอย่างดี"
 colony.68.name:0 "แผ่นดินไหวบนดาว [Root.GetName]"
 colony.68.desc:1 "ดาว [Root.GetName] ได้รับความเสียหายจากคลื่นแผ่นดินไหวอีกระลอกเมื่อเร็วๆ นี้ ดูเหมือนว่าพื้นที่ส่วนลึกบางส่วนของเครือข่ายอุโมงค์ใต้ดินได้ถล่มลงมาเมื่อไม่มีเอเลี่ยน [Root.Owner.GetSubMantleLower] คอยดูแลรักษา ชุมชนหลายแห่งของเราได้รับความเสียหาย"
 colony.69.name:0 "ความอดอยาก"
 colony.69.desc:1 "เราได้รับการติดต่อจากคณะผู้แทนจากเอเลี่ยน [Root.Owner.GetSubMantleLower] บนดาว [Root.GetName] ดูเหมือนว่าจักรวรรดิของพวกเขาจะพบกับช่วงเวลาที่ยากลำบากเมื่อเร็วๆ นี้ และพวกเขากำลังเผชิญกับภัยคุกคามจากความอดอยาก พวกเขากำลังอ้อนวอนขอความช่วยเหลือทุกทางที่เราจะทำได้"
 colony.69.a:0 "แน่นอน เราจะช่วยเหลือทุกวิถีทางที่เราทำได้"
 colony.69.b:0 "พวกเขาจะต้องดิ้นรนหาทางเอาชีวิตรอดด้วยตัวเอง"
 subterraneans_pleased:1 "ความสัมพันธ์กับอารยธรรม[Root.Owner.GetSubMantleLower]จะดีขึ้น"
 subterraneans_displeased:1 "ความสัมพันธ์กับอารยธรรม[Root.Owner.GetSubMantleLower]จะลดลง"
 colony.70.name:0 "ของขวัญ"
 colony.70.desc:0 "เพื่อเป็นของขวัญเฉลิมฉลองมิตรภาพระหว่างสองอารยธรรม คาราวานจากเอเลี่ยนใต้ดินบนดาว [Root.GetName] ได้นำอัญมณีจำนวนมากมาให้ที่พื้นผิว หินเช่นนี้เห็นได้ชัดว่าขุดโดยจักรวรรดิของพวกเขาจากใต้ดินลึก ใกล้กับแกนกลางของ [Root.GetPlanetMoon] มากที่สุดเท่าที่พวกเขาจะกล้าผจญภัยลงไป"
 colony.70.desc.subterranean:0 "เพื่อเป็นของขวัญเฉลิมฉลองมิตรภาพระหว่างสองอารยธรรม คาราวานจากสิ่งมีชีวิตในแมกมาบนดาว [Root.GetName] ได้นำอัญมณีจำนวนมากมาให้ที่ถ้ำของเรา หินเช่นนี้เห็นได้ชัดว่าขุดจากใต้ดินลึก ใกล้กับแกนกลางของ [Root.GetPlanetMoon] มากที่สุดเท่าที่อารยธรรมของพวกเขาจะกล้าผจญภัยลงไป"
 colony.70.a:0 "ช่างมีน้ำใจจริงๆ"
 colony.71.name:1 "ผู้ลี้ภัย [root.Owner.GetSubMantleUpper]"
 colony.71.desc:0 "ผู้ลี้ภัยกลุ่มใหญ่จากจักรวรรดิเอเลี่ยนใต้ดินบนดาว [Root.GetName] เพิ่งหลั่งไหลออกมาจากอุโมงค์ไปยังพื้นผิวโลกโดยมีกองทัพเล็กๆ ไล่ตามมา ดูเหมือนว่าพวกเขาจะเป็นส่วนหนึ่งของชนกลุ่มน้อยทางศาสนา พวกเขาอ้างว่ากำลังหลบหนีการประหัตประหาร\n\nหากเราปล่อยให้พวกเขาเข้าร่วมกับชาวอาณานิคมของเราบนพื้นผิวโลก มันจะสร้างความโกรธแค้นให้กับผู้ปกครองจักรวรรดิที่พวกเขาหนีมาอย่างไม่ต้องสงสัย อย่างไรก็ตาม หากเราปล่อยให้กองทัพที่ไล่ตามจับพวกเขากลับลงไปใต้ดิน พวกเขาอาจต้องเผชิญกับการประหารชีวิต"
 colony.71.desc.subterranean:0 "ผู้ลี้ภัยกลุ่มใหญ่จากจักรวรรดิสิ่งมีชีวิตในแมกมาบนดาว [Root.GetName] เพิ่งหลั่งไหลออกมาจากอุโมงค์เข้ามาในถ้ำของเราโดยมีกองทัพเล็กๆ ไล่ตามมา ดูเหมือนว่าพวกเขาจะเป็นส่วนหนึ่งของชนกลุ่มน้อยทางศาสนา พวกเขาอ้างว่ากำลังหลบหนีการประหัตประหาร\n\nหากเราปล่อยให้พวกเขาเข้าร่วมกับชาวอาณานิคมของเราในถ้ำด้านบน มันจะสร้างความโกรธแค้นให้กับผู้ปกครองจักรวรรดิที่พวกเขาหนีมาอย่างไม่ต้องสงสัย อย่างไรก็ตาม หากเราปล่อยให้กองทัพที่ไล่ตามจับพวกเขากลับลงไปใต้ดิน พวกเขาอาจต้องเผชิญกับการประหารชีวิต"
 colony.71.a:0 "ปล่อยให้พวกเขาเข้าร่วมอาณานิคมของเราหากนั่นเป็นความปรารถนาของพวกเขา"
 colony.71.b:0 "เราไม่สามารถยอมรับผลกระทบทางการเมืองได้ ส่งพวกเขากลับไป"
 colony.72.name:0 "นักมานุษยวิทยาต่างดาว"
 colony.72.desc:1 "นักมานุษยวิทยาต่างดาวหลายคนจากดาว [Root.Owner.Capital.GetName] ได้กลับมาสู่พื้นผิวของ [Root.GetName] หลังจากใช้เวลาส่วนใหญ่อาศัยอยู่ในหมู่เอเลี่ยน [Root.Owner.GetSubMantleLower] ซึ่งเป็นชนพื้นเมืองของโลกนั้น พวกเขาได้เรียนรู้มากมายเกี่ยวกับวิถีทางและขนบธรรมเนียมโบราณของพวกเขา ซึ่งจะเป็นประโยชน์อย่างยิ่งต่อการวิจัยทางสังคมของเราอย่างไม่ต้องสงสัย"
 colony.73.desc:1 "เกิดคลื่นแผ่นดินไหวขึ้นบ่อยครั้งบนดาว [Root.GetName] เมื่อเร็วๆ นี้ ส่งผลให้อาคารในชุมชนหลายแห่งของเราถล่มลงมาและมีผู้เสียชีวิตจำนวนมาก จักรวรรดิเอเลี่ยน [Root.Owner.GetSubMantleLower] กำลังขุดถ้ำแห่งใหม่ลึกลงไปใต้ดินเพื่อวางแผนสร้างเมืองใหม่ และดูเหมือนว่านี่จะเป็นต้นเหตุของแผ่นดินไหว"
 colony.73.a:0 "ยอมอดกลั้นไว้"
 colony.73.b:0 "เราต้องเรียกร้องคำขอโทษ!"
 colony.74.name:0 "ขอเทคโนโลยี"
 colony.74.desc:1 "หลังจากเห็นอาวุธที่ล้ำสมัยที่กองกำลังความมั่นคงของเราใช้งาน นายพลหลายคนจากจักรวรรดิเอเลี่ยน [Root.Owner.GetSubMantleLower] บนดาว [Root.GetName] ได้เข้ามายื่นเรื่องขอแบ่งปันเทคโนโลยีทางการทหารของเราบางส่วน\n\nนายทหารของเราเองลังเลที่จะทำเช่นนี้ เนื่องจากจะทำให้พวกเอเลี่ยนเอาชนะได้ยากขึ้นในสนามรบหากถึงเวลาจำเป็น อย่างไรก็ตาม หากเราปฏิเสธคำขอ เอเลี่ยนจะต้องถือว่าเป็นการดูถูกอย่างแน่นอน"
 colony.74.a:0 "การติดอาวุธให้คนป่าเถื่อนด้วยอาวุธสมัยใหม่ไม่เป็นความคิดที่ดี"
 colony.74.b:0 "พวกเขาเป็นเพื่อน แบ่งปันสิ่งที่เราทำได้"
 colony.75.name:0 "ส่งข้อความแล้ว"
 colony.75.desc:1 "การค้าขายกับเอเลี่ยน [Root.Owner.GetSubMantleLower] บนดาว [Root.GetName] ได้หยุดชะงักลงในช่วงหลังๆ โดยคาราวานของพวกเขาปรากฏตัวขึ้นไม่บ่อยนัก วันนี้เราได้รับข้อความจากตัวแทนฝ่ายทหารของพวกเขา ดูเหมือนว่าพวกเขาจะไม่ค่อยพอใจเท่าไหร่นัก"
 colony.75.a:0 "ขอดูข้อความหน่อย"
 colony.76.name:0 "ข้อความ"
 colony.76.desc:0 "ชาวพื้นผิว เราพยายามเป็นเพื่อนบ้านที่ดีแล้ว แต่เห็นได้ชัดว่าพวกเจ้าไม่มีเจตนาที่จะปฏิบัติต่อเราด้วยความเคารพที่อารยธรรมอันรุ่งโรจน์ของเราคู่ควร\n\nองค์จักรพรรดิของเราจึงทรงมีพระบรมราชโองการให้เราเข้ายึดครองโลกทั้งใบนี้เป็นของเราเองตามสิทธิ์ของเรา เราจะขับไล่พวกเจ้ากลับไปยังดวงดาวที่พวกเจ้าจากมา!"
 colony.76.desc.subterranean:0 "ชาวเปลือกโลก เราพยายามเป็นเพื่อนบ้านที่ดีแล้ว แต่เห็นได้ชัดว่าพวกเจ้าไม่มีเจตนาที่จะปฏิบัติต่อเราด้วยความเคารพที่อารยธรรมอันรุ่งโรจน์ของเราคู่ควร\n\nองค์จักรพรรดิของเราจึงทรงมีพระบรมราชโองการให้เราเข้ายึดครองโลกทั้งใบนี้เป็นของเราเองตามสิทธิ์ของเรา เราจะขับไล่พวกเจ้ากลับไปยังดวงดาวที่พวกเจ้าจากมา!"
 colony.76.a:0 "นั่นไม่ดีเลย"
 colony.100.name:0 "อุปกรณ์ปรับสภาพชั้นบรรยากาศที่ถูกละทิ้ง"
 colony.100.desc:0 "นับตั้งแต่การตั้งถิ่นฐานครั้งแรกของเราบนดาว [Root.GetName] เราได้ค้นพบความผิดปกติหลายประการในชีวมณฑลของ [Root.GetPlanetMoon] ระบบนิเวศไม่เสถียรและไม่ได้พัฒนาตามแบบจำลองที่คาดการณ์ไว้สำหรับโลกประเภทนี้ นักวิทยาศาสตร์ของเราสงสัยว่ามีการแทรกแซงจากภายนอก และความสงสัยเหล่านี้ได้รับการยืนยันแล้วในขณะนี้!\n\nชาวอาณานิคมของเราไม่กี่คนได้บังเอิญไปพบกับสถานีปรับสภาพชั้นบรรยากาศใต้ดินขนาดใหญ่ที่สร้างขึ้นเมื่อหลายพันปีก่อน อุปกรณ์ดังกล่าวดูเหมือนจะถูกปิดใช้งานในระหว่างกระบวนการปรับสภาพชั้นบรรยากาศ ส่งผลให้ชีวมณฑลของ [Root.GetPlanetMoon] อยู่ในสถานะที่ยังไม่เสร็จสมบูรณ์ในปัจจุบัน หากเราจ่ายพลังงานให้เพียงพอ เราก็น่าจะเปิดใช้งานเครื่องจักรอีกครั้งได้ อย่างไรก็ตาม ไม่มีทางรู้เลยว่าผลลัพธ์สุดท้ายจะเป็นอย่างไร..."
 colony.100.a:1 "ใครกันนะที่สร้างสิ่งนี้ขึ้นมา?"
 colony.101.name:0 "สถานีปรับสภาพชั้นบรรยากาศถูกรื้อถอน"
 colony.101.desc:0 "นักวิทยาศาสตร์ของเราได้เสร็จสิ้นการรื้อถอนสถานีปรับสภาพชั้นบรรยากาศที่ถูกละทิ้งบนดาว [Root.GetName] อย่างปลอดภัยแล้ว เรายังไม่มีข้อมูลว่าใครเป็นคนสร้างมัน แต่อุปกรณ์นี้มีความล้ำหน้าอย่างยิ่ง มันน่าจะช่วยกระตุ้นการวิจัยวิธีการปรับสภาพชั้นบรรยากาศของเราได้เป็นอย่างดี"
 colony.102.name:0 "สภาพอากาศไม่เสถียร"
 colony.102.desc:0 "สาเหตุหลักมาจากการขัดจังหวะในกระบวนการปรับสภาพชั้นบรรยากาศบนดาว [Root.GetName] ทำให้ดาว [Root.GetPlanetMoon] มีสภาพภูมิอากาศค่อนข้างไม่เสถียร พายุรุนแรงที่แบบจำลองสภาพภูมิอากาศของเราไม่สามารถทำนายได้มักจะก่อตัวขึ้นโดยไม่มีการแจ้งเตือน พายุลูกหนึ่งเพิ่งพัดถล่มชุมชนหลัก ส่งผลให้มีผู้เสียชีวิตหลายรายและทรัพย์สินเสียหายเป็นจำนวนมาก"
 colony.103.name:0 "ภัยแล้ง"
 colony.103.desc:0 "สภาพภูมิอากาศที่ไม่เสถียรบนดาว [Root.GetName] ส่งผลให้เกิดภัยแล้งรุนแรงซึ่งส่งผลกระทบต่อพื้นที่ส่วนใหญ่ของ [Root.GetPlanetMoon] ชาวอาณานิคมที่อาศัยอยู่ในภูมิภาคเหล่านั้นได้ร้องขอความช่วยเหลือทางการเงินจากดาว [Root.Owner.Capital.GetName] เพื่อปรับปรุงสภาพความเป็นอยู่"
 colony.103.a:0 "พวกเขาจะต้องดิ้นรนหาทางเอาชีวิตรอดด้วยตัวเอง"
 colony.103.b:0 "มอบสิ่งที่พวกเขาขอให้"
 colony.104.desc:0 "กระบวนการปรับสภาพชั้นบรรยากาศที่เคยถูกยกเลิกบนดาว [Root.GetName] ได้เสร็จสิ้นลงในที่สุด หลังจากปล่อยนาไนต์ปรับสภาพชั้นบรรยากาศหลายพันล้านตัวสู่อากาศ เครื่องจักรชีววิศวกรรมของเอเลี่ยนได้เปลี่ยนสภาพบนพื้นผิวของ [Root.GetPlanetMoon] ไปอย่างสิ้นเชิง ทั้งระบบนิเวศและสภาพภูมิอากาศต่างเสถียรขึ้น และกลุ่มสิ่งมีชีวิตต่างดาวชนิดใหม่ที่ปรับตัวเข้ากับสภาพภูมิอากาศนี้ได้รับการแนะนำเข้ามา"
 colony.104.a:0 "มาดูกันว่าเราได้อะไรเป็นผลลัพธ์สุดท้าย..."
 abandoned_terraforming_completed:0 "โลกได้รับการปรับสภาพให้เป็นถิ่นที่อยู่อาศัยที่แตกต่างออกไป"
 colony.105.desc:0 "กระบวนการปรับสภาพชั้นบรรยากาศที่ถูกล้มเลิกบนดาว [Root.GetName] เสร็จสิ้นลงในที่สุด หลังจากฉีดพ่นนาไนต์ปรับสภาพชั้นบรรยากาศนับพันล้านตัวขึ้นสู่ชั้นบรรยากาศ เครื่องจักรชีววิศวกรรมของต่างดาวได้ปรับเปลี่ยนสภาพผิวพื้นของดาวอย่างรุนแรง\n\nอย่างไรก็ตาม ดูเหมือนมีบางอย่างผิดปกติในขณะที่นาไนต์ออกแบบกลุ่มสิ่งมีชีวิตสายพันธุ์ใหม่ของ [Root.GetPlanetMoon] พวกมันให้กำเนิดสิ่งมีชีวิตพิการที่บิดเบี้ยวและน่าเกลียดน่ากลัวหลายล้านตัว ส่วนใหญ่ตายทันทีเมื่อร่างกายที่บิดเบี้ยวรับน้ำหนักตัวเองไม่ไหว แต่ผู้รอดชีวิตได้รวมตัวกันกลายเป็นฝูงที่ส่งเสียงร้องคำรามดังก้อง ที่ซ้ำร้ายไปกว่านั้นคือพวกมันดูเหมือนกำลังมุ่งหน้าตรงไปยังชุมชนหลักของเรา!"
 colony.105.a:0 "มันเหมือนกับบางสิ่งที่หลุดออกมาจากฝันร้ายเลย!"
 terraforming_mutants_attack:0 "สิ่งมีชีวิตกลายพันธุ์กำลังโจมตีชาวอาณานิคมของเรา!"
 colony.106.desc:0 "กระบวนการปรับสภาพชั้นบรรยากาศที่ถูกล้มเลิกบนดาว [Root.GetName] เสร็จสิ้นลงในที่สุด หลังจากปล่อยนาไนต์หลายพันล้านตัวสู่อากาศ เครื่องจักรชีววิศวกรรมของต่างดาวได้ปรับเปลี่ยนสภาพผิวพื้นของ [Root.GetPlanetMoon] อย่างมีนัยสำคัญ ระบบนิเวศและสภาพภูมิอากาศต่างเข้าสู่สภาวะสมดุล และกลุ่มสิ่งมีชีวิตสายพันธุ์ใหม่ที่เข้ากับภูมิอากาศนี้ได้รับการแนะนำเข้ามา\n\nโชคดีอย่างยิ่งที่ในตอนนี้ [Root.GetPlanetMoon] ได้กลายเป็นสวรรค์ที่แท้จริงสำหรับเผ่าพันธุ์ [Root.Owner.GetSpeciesNamePlural]! สภาพภูมิอากาศแบบใหม่ดูเหมือนจะเหมาะกับเผ่าพันธุ์ของเรามากกว่าภูมิอากาศบนดาวบ้านเกิด [Root.Owner.Capital.GetName] เสียอีก"
 colony.107.desc:1 "กระบวนการปรับสภาพชั้นบรรยากาศที่ถูกล้มเลิกบนดาว [Root.GetName] สำเร็จลงด้วยผลลัพธ์ที่น่าสะพรึงกลัว! ไม่ว่าสิ่งมีชีวิตต่างดาวประเภทใดที่ออกแบบอุปกรณ์นี้ สรีรวิทยาของพวกมันแตกต่างจากเราอย่างสิ้นเชิง ดาว [Root.GetPlanetMoon] ได้รับการปรับแต่งให้มีชั้นบรรยากาศโอโซนที่เบาบาง เพื่อรองรับสิ่งมีชีวิตที่ต้องการรังสีอัลตราไวโอเลตระดับสูง\n\nส่งผลให้ชาวอาณานิคมหลายล้านคนต้องจบชีวิตลงอย่างทารุณ"
 colony.107.desc.nuked_pref:0 "กระบวนการปรับสภาพชั้นบรรยากาศที่ถูกล้มเลิกบนดาว [Root.GetName] เสร็จสมบูรณ์แล้ว ไม่ว่าสิ่งมีชีวิตต่างดาวใดที่ออกแบบอุปกรณ์ปรับสภาพชั้นบรรยากาศขึ้นมา สรีรวิทยาของพวกมันต้องใกล้เคียงกับเราอย่างแน่นอน บัดนี้ดาวเคราะห์ดวงนี้มีบรรยากาศที่เป็นไนโตรเจน-ออกซิเจนและระดับรังสีบนพื้นผิวที่สูงมาก - มันได้กลายเป็นดาวประเภท §Y$pc_nuked$§!\n\nโชคดีที่เผ่าพันธุ์ [Root.Owner.GetSpeciesName] มีความสามารถปรับตัวเพื่อเติบโตได้ในสภาพแวดล้อมที่โหดร้ายเช่นนี้"
 colony.107.a:0 "นี่มันภัยพิบัติชัดๆ!"
 colony.107.a.tooltip:0 "§Hประชากรทุกกลุ่มที่ไม่ใช่§!§Y$trait_mechanical$§! §Hที่ไม่มี§! §Y$trait_pc_nuked_preference$§! §Hบนดาว [Root.GetName]:§! ตาย"
 colony.108.name:0 "ปราบสิ่งมีชีวิตสำเร็จ"
 colony.108.desc:0 "เราได้ต่อสู้ป้องกันชุมชนจากฝูงสิ่งมีชีวิตที่เข้ามาโจมตีบนดาว [From.From.GetName] ซากศพที่เน่าเปื่อยของพวกมันเกลื่อนกราดอยู่หน้าป้อมปราการของเรา และกองกำลังรักษาความปลอดภัยกำลังอยู่ระหว่างการกวาดชีวมวลที่ส่งกลิ่นเหม็นเหล่านั้นลงไปในหลุมฝังกลบที่ขุดอย่างเร่งรีบ\n\nอย่างไรก็ตาม สารพันธุกรรมบางส่วนเป็นที่สนใจของนักวิทยาศาสตร์ของเรา และตัวอย่างที่รวบรวมมาจะช่วยในการวิจัยด้านชีววิทยาในอนาคต"
 colony.109.name:0 "อสูรร้ายที่ออกอาละวาด"
 colony.109.desc:0 "ชาวอาณานิคมของเราบนดาว [Root.GetName] ยังคงพบกับผู้รอดชีวิตที่กระจัดกระจายจากสิ่งมีชีวิตกลายพันธุ์ที่เกิดขึ้นหลังจากที่เราเสร็จสิ้นกระบวนการปรับสภาพชั้นบรรยากาศที่ถูกล้มเลิกของ [Root.GetPlanetMoon] ส่วนใหญ่อันตรายน้อยและสามารถกำจัดได้โดยกองกำลังติดอาวุธท้องถิ่น แต่มีสิ่งมีชีวิตหนึ่งโดยเฉพาะที่สร้างความหวาดกลัวในชุมชนรอบนอกของเรา มีรายงานว่ามันลอบสะกดรอยตามพลเมืองของเรา และมีผู้สูญหายอย่างเป็นปริศนาหลายสิบคน\n\nซากศพที่ถูกฉีกทึ้งของทีมรักษาความปลอดภัยที่ถูกส่งไปสืบสวนคดีเพิ่งถูกค้นพบ ซึ่งกระตุ้นให้ผู้นำของอาณานิคมร้องขอความช่วยเหลือทางทหารจากนอกโลก"
 colony.109.a:0 "เจ้าสิ่งมีชีวิตตัวนี้ต้องถูกตามล่าและกำจัดทิ้ง!"
 colony.110.desc:0 "หลังจากการค้นหาอย่างละเอียด กองกำลังของเราบนดาว [From.From.GetName] สามารถต้อนมุมอสูรร้ายกลายพันธุ์ที่เข่นฆ่าชาวอาณานิคมของเราได้สำเร็จ ทีมกองกำลังพิเศษได้บุกเข้าไปในรังของสิ่งมีชีวิตดังกล่าวและกำจัดมันลงได้หลังจากต่อสู้อย่างดุเดือด ซากศพของชาวอาณานิคมหลายร้อยคนที่ถูกชำแหละถูกพบในรัง พร้อมกับผู้รอดชีวิตที่บอบช้ำทางจิตใจครึ่งโหลที่ดูเหมือนจะถูกเลี้ยงไว้เพื่อกินในภายหลัง\n\nหัวขนาดมหึมาของอสูรร้ายถูกตัดออกจากร่าง และตอนนี้ถูกนำมาใช้เป็นสัญลักษณ์ประจำกรมทหารที่มีส่วนร่วมโดยตรงในการกำจัดมัน"
 colony.111.name:0 "รายงานการพบเห็นสิ่งมีชีวิตยุติลง"
 colony.111.desc:0 "การพบเห็นสิ่งมีชีวิตกลายพันธุ์ที่ออกล่าชาวอาณานิคมบนดาว [Root.GetName] ได้ยุติลงแล้ว และไม่มีรายงานผู้สูญหายอีกต่อไป ดูเหมือนว่าสิ่งมีชีวิตดังกล่าวจะตายไปเอง — อาจเป็นเพราะอายุขัย หรืออาจเป็นเพราะสำลักอาหารตายขณะกินชาวอาณานิคมคนอื่นของเรา\n\nแม้ว่าประชากรบนดาว [Root.GetName] จะโล่งใจที่ฝันร้ายสิ้นสุดลงในที่สุด แต่พวกเขาก็ไม่ค่อยพอใจนักกับความล้มเหลวของเราในการปกป้องพวกเขา"
 colony.111.a:0 "บางทีเราอาจจะทำอะไรได้มากกว่านี้..."
 colony.112.name:0 "รายงานการพบเห็นสิ่งมีชีวิตเพิ่มขึ้น"
 colony.112.desc:0 "การพบเห็นสิ่งมีชีวิตที่ฆ่าชาวอาณานิคมของเราบนดาว [Root.GetName] เพิ่มขึ้นอย่างน่าใจหายในระยะนี้ เช่นเดียวกับจำนวนผู้สูญหายในหมู่ประชากร ข้อเท็จจริงที่ว่ามีการพบเห็นสิ่งมีชีวิตหลายตัวพร้อมกันแสดงให้เห็นว่าอสูรร้ายตัวแรกน่าจะแพร่พันธุ์ได้\n\nฝูงอสูรร้ายอันน่าหวาดกลัวเหล่านี้กำลังออกอาละวาดในพื้นที่โล่ง เข่นฆ่าชาวอาณานิคมในเขตชนบทของ [Root.GetPlanetMoon] อย่างไม่เลือกหน้า หากเราไม่ดำเนินการอย่างรวดเร็ว อาณานิคมทั้งหมดอาจถูกยึดครอง!"
 colony.112.a:0 "พวกนี้มันไม่ยอมเลิกราเลยจริงๆ!"
 colony.113.name:0 "กลายพันธุ์ยึดครอง [From.From.GetName]"
 colony.113.desc:0 "กองกำลังหลักของเราบนดาว [From.From.GetName] ถูกทำลายล้างจากการจู่โจมของสิ่งมีชีวิตกลายพันธุ์! อสูรร้ายที่น่ารังเกียจเหล่านั้นกำลังเพ่นพ่านอย่างอิสระทั่วทั้งอาณานิคม เข่นฆ่าชาวอาณานิคมของเราอย่างไม่เกรงกลัว มีรายงานว่าผู้รอดชีวิตได้หลบหนีออกจากชุมชนเพื่อไปซ่อนตัวอยู่ในชนบท แต่ก็คงเป็นเรื่องของเวลาก่อนที่พวกมันจะค้นพบ"
 colony.113.a:0 "เราต้องส่งความช่วยเหลือทางทหารไป!"
 colony.114.name:0 "การปลดแอก [From.From.GetName]"
 colony.114.desc:0 "กองกำลังรบพิเศษของเราได้ปลดแอกดาว [From.From.GetName] จากอสูรร้ายกลายพันธุ์ที่ยึดครองชุมชนหลักของเรา ซากศพที่เน่าเปื่อยเกลื่อนกลาดอยู่บนพื้น และทหารของเรากำลังดำเนินการปัดกวาดชีวมวลที่เหม็นเน่าลงในหลุมฝังกลบอย่างเร่งด่วน\n\nกลุ่มผู้รอดชีวิตกำลังเริ่มปรากฏตัวขึ้นทั่วทั้ง [From.From.GetPlanetMoon] แต่ก็สูญเสียชีวิตไปมากมายมหาศาล"
 colony.114.a:0 "ถึงเวลาต้องฟื้นฟูใหม่แล้ว"
 colony.150.name:0 "ห้องนิรภัยใต้ดิน"
 colony.150.desc:0 "การสำรวจทางธรณีวิทยาโดยชาวอาณานิคมของเราบนดาว [Root.GetName] ได้เปิดเผยห้องนิรภัยขนาดใหญ่ที่ถูกฝังลึกอยู่ใต้เทือกเขา หลักฐานทั้งหมดชี้ว่านี่คือที่หลบภัยนิวเคลียร์ประเภทหนึ่งที่สร้างขึ้นโดยเผ่าพันธุ์เดียวกันกับที่สูญพันธุ์ไปในสงครามนิวเคลียร์โบราณของ [Root.GetPlanetMoon]\n\nห้องนิรภัยนี้ถูกปิดตายมาหลายศตวรรษ แต่เครื่องมือของเราตรวจพบสัญญาณพลังงานแผ่วเบาที่แผ่ออกมาจากข้างใน นักวิทยาศาสตร์ของเราต่างกระตือรือร้นที่จะเปิดมันและค้นหาว่ามีอะไรซ่อนอยู่หลังประตูเสริมความแข็งแกร่งนี้"
 colony.150.a:0 "มาเจาะเปิดมันออกกันเถอะ!"
 colony.150.b:0 "ปล่อยมันทิ้งไว้อย่างนั้นน่าจะดีที่สุด"
 colony.151.desc:0 "คณะสำรวจทางวิทยาศาสตร์ของเราสามารถเปิดห้องนิรภัยบนดาว [Root.GetName] ได้ในที่สุด แต่กลับไม่พบสิ่งใดนอกจากโครงกระดูกสัตว์เลี้ยงลูกด้วยนมโบราณ ดูเหมือนว่าประชากรดั้งเดิมของห้องนิรภัยจะขาดแคลนอาหารเมื่อประมาณ 200 ปีก่อน ซึ่งเป็นช่วงที่พวกเขาหันมาทำร้ายและกินกันเองอย่างบ้าคลั่ง โครงกระดูกที่กระจัดกระจายซึ่งหลายชิ้นมีรอยแทะ แสดงภาพความน่าสะพรึงกลัวในช่วงเวลาสุดท้ายของผู้รอดชีวิตกลุ่มสุดท้ายของอารยธรรมที่เคยรุ่งเรืองนี้\n\nแต่ในแง่ดี บันทึกและคลังข้อมูลภายในห้องนิรภัยน่าจะเพียงพอที่จะทำให้นักวิทยาศาสตร์พฤติกรรมศาสตร์และนักจิตวิทยาต่างดาวของเรายุ่งไปอีกหลายปี"
 colony.151.b.evopred: "กระดูกเหล่านี้จะช่วยเลี้ยงปากท้องผู้คนเป็นครั้งสุดท้าย"

 colony.152.desc:0 "ห้องนิรภัยขนาดยักษ์บนดาว [Root.GetName] ถูกเปิดออกแล้ว สิ่งที่ทำให้นักวิทยาศาสตร์ของเราประหลาดใจคือ สถานที่อันกว้างใหญ่เบื้องหลังประตูนิรภัยยักษ์นั้นเป็นที่อยู่อาศัยของผู้รอดชีวิตหลายล้านคนจากสงครามนิวเคลียร์โบราณที่เคยทำลายล้างโลกใบนี้ แม้จะมีทรัพยากรจำกัด แต่พวกเขาก็สามารถรักษาสังคมที่พึ่งพาตนเองได้มานานหลายศตวรรษ ในตอนแรกพวกเขาระแวดระวังนักวิทยาศาสตร์ของเราเนื่องจากไม่เคยพบสิ่งมีชีวิตต่างดาวมาก่อน แต่พวกเขาก็ซาบซึ้งอย่างยิ่งที่ได้รับการช่วยเหลือในการเปิดห้องนิรภัยนี้\n\nห้องนิรภัยแห่งนี้บรรจุอุปกรณ์และเครื่องจักรจำนวนมากที่ออกแบบมาเป็นพิเศษเพื่อฟื้นฟูอารยธรรมหลังภัยพิบัตินิวเคลียร์ ซึ่งสามารถควบคุมได้โดยเอเลี่ยนเหล่านี้เท่านั้น แต่พวกเขาดูเหมือนจะยินดีอย่างยิ่งที่จะเข้าร่วมกับชาวอาณานิคมของคุณบนพื้นผิวโลกเมื่อพวกเขาปรับตัวเข้ากับแสงแดดธรรมชาติได้อีกครั้ง"
 colony.152.a:0 "มาร่วมสร้างโลกใบนี้ขึ้นใหม่ด้วยกันเถอะ"
 colony.152.b:0 "ยอดเยี่ยมมาก เตรียมปลอกคอทาสไว้!"
 colony.152.b.tooltip:0 "ประชากรเหล่านี้จะถูกตกเป็นทาส"
 colony.152.c:0 "ขังพวกขยะเอเลี่ยนกลับเข้าไปในห้องนิรภัยและฝังกลบทางเข้าซะ"
 colony.153.desc:0 "นักวิทยาศาสตร์ของเราสามารถเปิดห้องนิรภัยโบราณบนดาว [Root.GetName] ได้ในที่สุด ทว่ากลับเป็นการปล่อยฝูงอสูรร้ายกลายพันธุ์ออกมา — ซึ่งเป็นร่างที่บิดเบี้ยวของผู้อยู่อาศัยดั้งเดิม\n\nสิ่งมีชีวิตเหล่านั้นเข่นฆ่าทีมวิทยาศาสตร์ในเวลาเพียงไม่กี่วินาที จากนั้นก็กระจายตัวออกไปตามชนบท ชาวอาณานิคมหลายพันคนถูกเข่นฆ่า โดยมีชุมชนทั้งหมดพ่ายแพ้ให้กับฝูงอสูรร้ายที่หิวกระหาย เราได้เสริมความแข็งแกร่งให้กับเมืองที่เหลือและจัดตั้งแนวป้องกัน แต่สิ่งนี้อาจยังไม่เพียงพอ!"
 colony.153.a:0 "ประจำแนวป้องกัน!"
 colony.155.name:0 "ระเบิดนิวเคลียร์"
 colony.155.desc:0 "ในขณะที่สำรวจซากปรักหักพังใกล้กับชุมชนหลักแห่งหนึ่งของเราบนดาว [Root.GetName] ชาวอาณานิคมสองสามคนได้กระตุ้นตัวจับเวลาของระเบิดไฮโดรเจนที่ยังไม่ระเบิดซึ่งหลงเหลือมาจากสงครามนิวเคลียร์ครั้งก่อนของ [Root.GetPlanetMoon] โดยไม่ตั้งใจ\n\nด้วยแรงระเบิดที่คาดว่าจะเทียบเท่ากับ 35 เมกะตัน ระเบิดนี้จะกวาดล้างศูนย์กลางประชากรหลายแห่งหากระเบิดขึ้น มันไม่เสถียรพอที่จะย้ายออกไปได้และไม่มีเวลาเพียงพอที่จะอพยพคนทั้งภูมิภาค"
 colony.155.a:0 "เราต้องกู้ระเบิดมัน!"
 colony.156.desc:0 "เราสามารถกู้ระเบิดไฮโดรเจนบนดาว [From.From.GetName] ได้สำเร็จ! มันได้รับการกำจัดอย่างปลอดภัยแล้ว และทีมผู้เชี่ยวชาญกำลังค้นหาพื้นผิวของ [From.From.GetPlanetMoon] เพื่อหาวัตถุระเบิดอื่นที่ยังไม่ทำงาน หวังว่าสิ่งนี้จะช่วยลดโอกาสเกิดเหตุการณ์ในทำนองนี้ลงได้"
 colony.156.a:0 "เรารอดตัวหวุดหวิด"
 colony.157.desc:0 "ทีมกู้ระเบิดของเราไม่สามารถกู้ระเบิดไฮโดรเจนบนดาว [From.From.GetName] ได้ทันเวลา พวกเขาพร้อมกับสิ่งมีชีวิตอื่นๆ ทั้งหมดในรัศมี 100 กิโลเมตรถูกลบล้างไปเมื่อระเบิดทำงาน ชีวิตนับไม่ถ้วนต้องสูญเสียไป และกลายเป็นเหยื่อรายสุดท้ายของสงครามที่น่าเศร้าและไร้จุดหมายซึ่งเริ่มต้นขึ้นเมื่อหลายพันปีก่อน"
 colony.157.a:0 "นี่มันภัยพิบัติชัดๆ!"
 colony.160.name:0 "เครื่องเร่งอนุภาคที่พังยับเยิน"
 colony.160.desc:1 "เราได้ค้นพบสิ่งที่เป็นซากปรักหักพังของเครื่องเร่งอนุภาคขนาดมหึมาบนดาว [Root.GetName] มันถูกพบในภูมิภาคที่ยังคงมีกัมมันตภาพรังสีซึ่งเต็มไปด้วยหลุมอุกกาบาตระเบิดขนาดยักษ์ บ่งชี้ว่าเครื่องเร่งอนุภาคนี้ถือเป็นเป้าหมายทางยุทธศาสตร์ที่มีความสำคัญอย่างยิ่งในช่วงสงครามนิวเคลียร์ของ [Root.GetPlanetMoon]\n\nเราได้กู้คืนบันทึกการวิจัยหลายฉบับที่เขียนขึ้นโดยนักวิทยาศาสตร์หญิงผู้รับผิดชอบเครื่องเร่งอนุภาคนี้ แม้ว่าเทคโนโลยีของอารยธรรมของเธอจะค่อนข้างล้าหลัง แต่การวิจัยเชิงทฤษฎีและสูตรบางอย่างที่อธิบายไว้ในบันทึกนั้นมีความก้าวหน้าแม้ในมาตรฐานของเราเอง นักฟิสิกส์ของเรากำลังวิเคราะห์ข้อมูลเหล่านั้นในขณะนี้"
 colony.161.name:0 "โครงสร้างพื้นฐานที่หลงเหลือรอดมา"
 colony.161.desc:0 "โครงสร้างพื้นฐานที่รอดพ้นจากสงครามนิวเคลียร์ครั้งใหญ่ซึ่งทำลายดาว [Root.GetName] ได้กลายเป็นประโยชน์อย่างยิ่งต่อชาวอาณานิคมของเรา อารยธรรมต่างดาวที่เคยอาศัยอยู่ที่นี่ได้สร้างทางหลวงเชื่อมต่อศูนย์กลางประชากรหลักของพวกเขา และบางส่วนยังคงอยู่ในสภาพดีพอที่จะนำมาใช้ในปัจจุบัน\n\nเรายังสามารถรีไซเคิลวัสดุก่อสร้างจำนวนมากจากซากปรักหักพังหลายแห่งที่กระจายอยู่ทั่วไป ซึ่งช่วยปรับปรุงโครงสร้างพื้นฐานของอาณานิคมของเราให้ดียิ่งขึ้น"
 colony.162.name:0 "สถานีอวกาศร้าง"
 colony.162.desc:0 "ทีมเล็กๆ จากอาณานิคมของเราบนดาว [Root.GetName] เพิ่งขึ้นไปบนสถานีอวกาศโบราณที่ถูกทิ้งไว้ในวงโคจรโดยผู้อยู่อาศัยดั้งเดิมของ [Root.GetPlanetMoon] ซากมัมมี่ของลูกเรือประจำสถานีอวกาศยังคงพบได้กระจุกอยู่รอบหน้าต่างที่หันเข้าหา [Root.GetPlanetMoon] พวกเขาคงจะรู้ตัวว่าต้องพบกับจุดจบหลังจากเห็นกลุ่มเมฆรูปเห็ดลอยขึ้นมาด้านล่าง และบันทึกการสื่อสารแสดงให้เห็นว่านักบินอวกาศพยายามติดต่อกับพื้นผิวหลายครั้งแต่ไร้ผลและตื่นตระหนกมากขึ้นเรื่อยๆ ก่อนที่เสบียงจะหมดลงในที่สุด\n\nสถานีนี้อยู่ในสภาพดี และช่วยให้วิศวกรของเราได้เห็นภาพรวมที่หาได้ยากของขั้นตอนแรกของโครงการอวกาศระดับดาวเคราะห์ พวกเขาได้รับแนวคิดหลายอย่างจากวิธีแก้ปัญหาดั้งเดิมแต่ชาญฉลาดที่ใช้ในการออกแบบสถานี"
 colony.162.b.evopred: "โชคดีที่ร่างที่หลงเหลือเหล่านี้ไม่โดนรังสี"
 colony.163.name:0 "รังสีดินแดนรกร้าง"
 colony.163.desc:0 "ระดับรังสีในพื้นที่รกร้างบางส่วนของดาว [Root.GetName] ดูเหมือนจะสูงกว่าที่การสแกนครั้งก่อนของเราบ่งชี้ ชาวอาณานิคมในชุมชนท้องถิ่นหลายแห่งบ่นเกี่ยวกับสุขภาพที่ไม่ดี และอัตราการเกิดลดลง เรากำลังดำเนินการตามขั้นตอนเพื่ออพยพผู้คนออกจากพื้นที่ที่ได้รับผลกระทบ แต่มาตรการเหล่านี้จะต้องใช้เวลา"
 colony.164.name:0 "การเคลื่อนไหวเพื่อสันติภาพ"
 colony.164.desc:0 "ซากปรักหักพังที่ทรุดโทรมและดินแดนรกร้างว่างเปล่าที่พบเจอบนดาว [Root.GetName] ดูเหมือนจะผลักดันให้ชาวอาณานิคมของ [Root.GetPlanetMoon] จำนวนมากหันมาเลื่อมใสปรัชญาความรักสงบ\n\nสมาชิกของขบวนการใหม่นี้อ้างว่าสภาพแวดล้อมที่พวกเขาอาศัยอยู่ทำหน้าที่เป็นสิ่งเตือนใจรายวันถึงความน่าสะพรึงกลัวของสงครามที่ไร้สติ พวกเขาเห็นว่าเป็นหน้าที่ของพลเมืองในการป้องกันไม่ให้ความพินาศอันโหดร้ายที่เกิดขึ้นกับดาว [Root.GetName] ไปเกิดขึ้นบนโลกอื่น"
 colony.164.a:0 "พวกเขาทำตอนนี้เลยเหรอ?"
 colony.164.b:0 "คนขี้ขลาดเหล่านี้ทำให้ประเทศชาติของเราอับอาย!"
 colony.164.c:0 "ดีมากครับ ทุกคนควรให้โอกาสกับสันติภาพ"
 colony.164.a.tooltip:1 "ประชากรสูงสุดถึง §Y400§! £pop£ §Hประชากร§! บนดาว §H[Root.GetName]§! จะสูญเสียค่านิยม §Yฝักใฝ่ทหาร§! ใดๆ และได้รับค่านิยม §Yรักสงบ§!"
 colony.170.name:0 "ข้อ เสีย"
 colony.170.desc:0 "พื้นที่ออร์บิทัลรอบ ๆ[Root.GetName]มันเต็มไปด้วยเศษซากที่หลงเหลือจากอารยธรรมของมนุษย์ต่างดาว[Root.GetPlanetMoon]ก่อนที่พวกเขาเช็ดตัวเองออก โปรแกรมอวกาศยุคแรกของพวกเขาเห็นการเปิดตัวของ จํานวนมากเหล่านี้ถูกทําลายโดยอาวุธแอนตี้แซล ระหว่าง[Root.GetPlanetMoon]สงครามนิวเคลียร์ทําลายล้าง ยิ่งเพิ่มขยะอวกาศเข้าไปอีก\n\nอาณานิคมของเราบนพื้นผิวได้พัฒนาไปยังจุดที่ สนามหนาแน่นของซากปรักหักพังนี้ถูกรบกวน เราไม่สามารถใช้ดาวเทียมและเครื่องบินออร์บิทัลพลเรือน จํากัด เพื่อการปล่อยหน้าต่างแคบ"
 colony.170.a:0 "บางทีควรจะทําอะไรบางอย่าง"
 colony.171.name:0 "ขัดข้อง"
 colony.171.desc:0 "มีเรือพลเรือนเข้ามาลงจอด[Root.GetName]มีเศษซากออร์บิทัลที่เคลื่อนที่เร็วมาก ลูกเรือถูกฆ่าในทันที และยานลําที่ได้รับบาดเจ็บ พุ่งผ่านบรรยากาศ เพียงเพื่อชนกับที่ดินใกล้หนึ่ง ของเครื่องส่งพลังงานหลักของอาณานิคม การ ระเบิด ดัง กล่าว ยัง ผล ให้ มี หลาย คน เสีย ชีวิต บน พื้น ดิน และ โครง สร้าง ใน ท้อง ถิ่น ได้ รับ ความ เสีย หาย อย่าง มาก."
 colony.171.desc.mach:0 "เรือบรรทุกแรงงานเข้ามาลงจอด[Root.GetName]มีเศษซากออร์บิทัลที่เคลื่อนที่เร็วมาก หน่วยลูกเรือถูกทําลายในทันที และยานลําที่กระแทกนั้น พุ่งทะลุบรรยากาศ เพียงเพื่อพุ่งชนกับที่ดินใกล้ ๆ กับยานส่งพลังงานหลักของอาณานิคม การ ระเบิด ที่ เกิด ขึ้น ยัง ผล ให้ การ ดําเนิน งาน หลาย อย่าง สิ้น สุด ลง บน พื้น ดิน และ โครง สร้าง ใน ท้อง ถิ่น ได้ รับ ความ เสีย หาย อย่าง หนัก."
 colony.171.a:0 "ของโชคทั้งหมด ... !"
 colony.172.name:0 "การ เสื่อม"
 colony.172.desc:0 "เศษ ซาก ปรัก หัก พัง ของ ซาก ปรัก หัก พัง[Root.GetName]เมื่อเร็ว ๆ นี้มีการเลื่อนวงโคจรของชิ้นส่วนของขยะอวกาศขนาดใหญ่ วัตถุ ซึ่งเราเชื่อว่าเป็นหนึ่งในแพลตฟอร์มจรวดออร์บิทัลที่ใช้ใน[Root.GetPlanetMoon]สงครามนิวเคลียร์ ถูกดึงเข้าไปในบรรยากาศ และโชคร้ายที่ยังคงส่งผลกระทบโดยตรง รายงานเบื้องต้นระบุว่ามีผู้บาดเจ็บสาหัส"
 colony.172.a:0 "เราต้องทําอะไรสักอย่างกับเศษซากนั่น"
 colony.173.desc:0 "ด้วยความช่วยเหลือของเรือวิทยาศาสตร์ของเรา เจ้าหน้าที่อาณานิคมบน[From.From.GetName]ได้เสร็จสิ้นการทําความสะอาดขึ้น[From.From.GetPlanetMoon]'อวกาศออร์บิทัล' ปัจจุบัน ได้ มี การ ทํา ให้ ดาว เทียม และ การ เดิน ทาง ของ พลเรือน ปลอด ภัย."
 colony.174.desc:0 "ด้วยความช่วยเหลือของเรือวิทยาศาสตร์ของเรา เจ้าหน้าที่อาณานิคมบน[From.From.GetName]ได้เสร็จสิ้นการทําความสะอาดขึ้น[From.From.GetPlanetMoon]'อวกาศออร์บิทัล' ปัจจุบัน ได้ มี การ ทํา ให้ ดาว เทียม และ การ เดิน ทาง ของ พลเรือน ปลอด ภัย.\n\nกลับกลายเป็นว่าเศษจํานวนมากประกอบด้วยแร่ธาตุที่มีคุณค่าจาก[From.From.GetPlanetMoon]พื้นผิวที่ใช้ในการสร้างดาวเทียม เราสามารถกู้เงินได้มาก ทําให้ได้กําไรอย่างเป็นระเบียบ"
 colony.180.name:0 "ภาพ แอสเตอร์อยด์"
 colony.180.desc:0 "ลําดับการติดตามอวกาศลึกของเราบน[Root.GetName]ได้ค้นพบที่น่าตกใจ ดาวเคราะห์น้อยขนาดใหญ่มุ่งหน้าไปยัง[Root.GetPlanetMoon]ในหลักสูตรการชนโดยตรง! ถ้ามันส่งผลกระทบกับพื้นผิว ผลที่จะตามมาก็คือความหายนะ\n\nดาวเคราะห์น้อยจะต้องถูกทําลายก่อนที่จะสายเกินไป!"
 colony.180.a:0 "นี่เป็นลางไม่ดี..."
 colony.180.b:0 "เข้าใจแล้ว"
 colony.182.name:0 "แอสเตอร์ลอยด์ถูกทําลาย"
 colony.182.desc:0 "ดาวเคราะห์น้อยที่เข้าใกล้[Root.GetName]หลักสูตรการชนได้ถูกทําลาย! กับการลงโทษของพวกเขาหลีกเลี่ยง พลเมืองที่น่าชื่นชมของเราที่[Root.GetPlanetMoon]ได้เดินทางไปบนถนนในการเฉลิมฉลอง\n\nการ ตรวจ สอบ ชิ้น ส่วน ที่ เหลือ นอก นั้น ยัง เผย ให้ เห็น ด้วย ว่า ดาว เคราะห์ น้อย ประกอบ ด้วย แร่ ธาตุ ที่ มี ค่า ส่วน ใหญ่. เรารวบรวมสิ่งที่เราสามารถ"
 colony.182.desc.mach:0 "ดาวเคราะห์น้อยที่เข้าใกล้[Root.GetName]หลักสูตรการชนได้ถูกทําลาย! ไม่ มี หน่วย ดาว เคราะห์ หรือ สิ่ง ก่อ สร้าง ใด ๆ ได้ รับ ผล กระทบ จาก เหตุ การณ์ นั้น เนื่อง จาก เศษ ซาก ปรัก หัก พัง ใด ๆ ที่ พุ่ง ทะลัก เข้า มา นั้น เล็ก พอ ที่ จะ ยุบ ตัว ลง มา ใน บรรยากาศ ได้.\n\nการ ตรวจ สอบ ชิ้น ส่วน ที่ เหลือ นอก นั้น ยัง เผย ให้ เห็น ด้วย ว่า ดาว เคราะห์ น้อย ประกอบ ด้วย แร่ ธาตุ ที่ มี ค่า ส่วน ใหญ่. เรารวบรวมสิ่งที่เราสามารถ"
 colony.183.name:0 "ผล กระทบ ของ แอ ส เท อร์ ลอย ด์[Root.GetName]"
 colony.183.desc:0 "เราล้มเหลวในการหยุดดาวเคราะห์น้อยที่มุ่งหน้าไปยัง[Root.GetName]ทันเวลา มันชนกับ[Root.GetPlanetMoon]พื้นผิว ทําให้เกิดความเสียหายอย่างกว้างขวาง และความทุกข์ทรมานเหลือล้น คนเป็นล้านต้องตาย"
 colony.183.desc.mach:0 "เราล้มเหลวในการหยุดดาวเคราะห์น้อยที่มุ่งหน้าไปยัง[Root.GetName]ทันเวลา มันชนกับ[Root.GetPlanetMoon]พื้นผิว ทําให้เกิดความเสียหายอย่างแพร่หลาย หลาย ล้าน หน่วย ของ เครื่องจักร ได้ รับ การ แปล ให้ ใช้ งาน ไม่ ได้."
 colony.183.a:0 "นี่เป็นวันที่มืดมน"
 colony.185.name:0 "โลก ถูก รวบ รวม"
 colony.185.desc:0 "เราได้บริโภคมากพอ§Y[Target.GetName]§!ว่าปฏิกิริยาลูกโซ่ได้เริ่มต้นขึ้น และทําให้แกนของมันเสื่อมสภาพ\n\nโดรนทั้งหมดถูกอพยพไปยัง§Y[Owner.Capital.GetName]§!."
 colony.185.a:0 "เรายังคงหิว"
 colony.185.a.tooltip:0 "§Y[From.GetName]§!ถูกทําลาย"


 ####################################
 # Precursor Events
 ####################################
 vultaum_artifact:0 "เราได้สิ่งประดิษฐ์ของ Vultaum"
 precursor.completed.name:0 "โครงการโบราณคดีเสร็จสมบูรณ์"
 precursor.completed.a:0 "การค้นพบที่น่าสนใจ"
 precursor.1.name:0 "การ ประชุม ใหญ่ ที่ วุล ออม ส ตาร์"
 precursor.1.desc:1 "เราได้ค้นพบวัตถุจาก เอเลี่ยนโบราณ§Y[From.GetName]§!พวก เขา คง ต้อง ทํา งาน อยู่ ใน บริเวณ นี้ ราว ๆ 12 ล้าน ปี มา แล้ว พิจารณา ด้วย อายุ ของ วัตถุ โบราณ.\n\nจากที่พวกเขาสามารถ เชื่อมโยงเข้าด้วยกัน นักวิทยาศาสตร์ของเราตั้งทฤษฎี ว่ามนุษย์ต่างดาวเหล่านี้\"การเปรียบเทียบของกลุ่มดาว\"(การเปรียบเทียบของ Wallom Star)คือทวารหนักที่คล้ายหนอน มีความยาวประมาณ 3-4 เมตร ซึ่งสื่อสารกันเป็นหลัก ผ่านการสั่นสะเทือนที่เกิดขึ้นตามร่างกายที่แบ่งส่วน"
 precursor.5.name:0 "ฐานเหมืองแร่ Vultaum"
 precursor.5.desc:0 "มี การ พบ ซาก ปรัก หัก พัง ของ ฐาน ทํา เหมือง เล็ก ๆ ของ ฮีเลียม-3 ที่ ก้น ปล่อง ภูเขา ไฟ ขนาด ใหญ่[From.GetName]แรงระเบิดที่สร้างปล่องภูเขาไฟ ดูเหมือนจะมาจากภายในตัวอาคาร นอก จาก เทคนิค การ ทํา เหมือง ของ วุล มัม จะ ต่าง กัน อย่าง สิ้น เชิง กับ ของ เรา เอง แล้ว อุปกรณ์ ล้ม เหลว หรือ อุบัติเหตุ ก็ ไม่ อาจ เป็น สาเหตุ ของ การ ระเบิด ใหญ่ ขนาด นั้น ได้."
 precursor.6.desc:1 "อย่างน่าอัศจรรย์, เราจัดการกู้บางส่วนของข้อมูล Vultaum ที่ได้รับการเป่าออกของปล่องภูเขาไฟบน[From.From.GetName]ข้อมูลส่วนใหญ่เสียหาย แต่นักวิทยาศาสตร์ของเราสามารถแปล\"คอร์กา\" - หน่วยเวลาพื้นฐานของวาล์ม"
 precursor.10.name:0 "หอ ดู ดาว Vultaum"
 precursor.10.desc:0 "หอ ดู ดาว วรรณะ สมัย โบราณ พบ บน ผิว ของ หอ ดู ดาว§Y[From.GetName]§!. เดอะ[From.GetStarName]ระบบค่อนข้างห่างไกลจากพื้นที่ ที่ Vultaum มีต้นกําเนิด และสถาบันนี้ดูเหมือนจะมีการ ใช้เป็นหลักในการสังเกตดาวของตัวเอง\n\nเราได้ตรวจสอบข้อมูลของหอดูดาวที่รอดชีวิตแล้ว แต่ไม่มีเงื่อนงําใด ที่ตรงกับสิ่งที่ Vultaum"
 precursor.11.desc:1 "การ ขุด ค้น ทาง โบราณคดี§Y[From.From.GetName]§!ได้ค้นพบปากกระบอกเล็ก ๆ ในหนึ่งในหอดูดาว ฝุ่นปกคลุมห้องพักขนาดเล็ก ดู เหมือน จะ มี การ พรรณนา กลุ่ม ดาว ต่าง ๆ กัน หลาย กลุ่ม ซึ่ง อาจ ดู เหมือน จะ ปรากฏ ขึ้น มา หาก มอง จาก โลก ที่ เป็น บ้าน ของ วุล ออม. นัก ดาราศาสตร์ ของ เรา ไม่ สามารถ ระบุ ตัว ดาว แต่ ละ ดวง ได้."
 precursor.15.name:0 "โคโลนี"
 precursor.15.desc:0 "บางส่วนของลิฟท์อวกาศ Vultaum ยุบได้รับการค้นพบโดย[Root.GetName]ในบริเวณเส้นศูนย์สูตร[From.GetName]ดูเหมือนว่าลิฟท์จะถูกตัดอย่างจงใจ ที่ตัวถ่วงเหนือวงโคจรธรณีวิทยา เมื่อ พิจารณา จาก ซาก ปรัก หัก พัง จํานวน ผู้ เสีย ชีวิต ที่ เกิด ขึ้น คง ต้อง มี อยู่ หลาย ล้าน คน."
 precursor.16.desc:1 "นักโบราณคดีของเรา§Y[From.From.GetName]§!ได้จัดการกู้ชิ้นส่วนชิ้นส่วนของชาร์ตดาว ถัดจากส่วนที่แตกของสายลิฟท์ ดู เหมือน ว่า เรือ ลํา นี้ ถูก นํา มา ใช้ ใน การ เดิน เรือ ของ นัก เดิน เรือ สินค้า วุล ตม และ แสดง เส้น ทาง การ ค้า ระหว่าง ดวง ดาว ที่ มี กําไร มาก ที่ สุด หลาย สาย."
 precursor.20.desc:0 "ทะเลสาบกลมขนาดใหญ่บนพื้นผิวของ[From.GetName]เกิดจากการระเบิดของปฏิสสารขนาดใหญ่ หลายล้านปีที่ผ่านมา นี่[From.GetPlanetMoon]มี ผู้ อาศัย อยู่ ใน หุบ เหว นี้ และ ปล่อง ภูเขา ไฟ ทั้ง หมด อยู่ ใน บริเวณ ที่ มี การ ตั้ง ถิ่น ฐาน บน ดาว เคราะห์ ที่ ใหญ่ ที่ สุด.\n\nการทิ้งระเบิดของออร์บิทัลถูกตัดออกไป โดยคณะวิทยาศาสตร์ใน[Root.GetName]ทําให้เชื่อได้ว่า การระเบิดเหล่านี้ ถูกกระตุ้นโดยใครบางคน หรือบางอย่างบนพื้น"
 precursor.21.desc:1 "นักโบราณคดีบน§Y[From.From.GetName]§!ได้จัดการกู้ระบบความทรงจํา ที่ไม่เสียหาย จากอาคารในสถานพยาบาล วารสาร นี้ มี สถิติ ที่ น่า สนใจ บาง อย่าง เช่น อายุ ขัย โดย เฉลี่ย ของ ผู้ ป่วย โดย เฉลี่ย (ประมาณ 270 ปี) และ ราย ชื่อ โรค ที่ พบ บ่อย ที่ สุด ของ พวก เขา."
 precursor.25.desc:0 "สแกนอย่างละเอียด§Y[From.GetName]§!ได้เปิดเผยเครือข่ายขนาดใหญ่เทียมของอุโมงค์ใต้[From.GetPlanetMoon]พื้นผิว อุโมงค์ส่วนใหญ่ได้ยุบลง และลูกเรือของ[Root.GetName]เชื่อว่าพวกเขาเป็นตัวแทนเพียงส่วนเล็ก ๆ ของสิ่งที่ครั้งหนึ่งเคยเป็นอาณานิคมใต้ดินที่มีขนาดใหญ่มาก\n\nถ้ํา ใต้ ดิน ส่วน ใหญ่ ถูก ทํา ให้ พัง ลง โดย เจตนา ทําลาย เมือง โว ลูม และ ประชากร ที่ อยู่ ใต้ หิน หลาย ล้าน ตัน."
 precursor.26.desc:1 "การ ขุด ค้น ทาง โบราณคดี§Y[From.From.GetName]§!มี การ ขุด พบ ซาก ฟอสซิล ที่ น่า ทึ่ง บาง ชิ้น ที่ หลง เหลือ อยู่ จาก ห้อง หนึ่ง ที่ พัง ลง มา ใกล้ ผิว ดิน. นี่ได้ทําให้นักวิทยาศาสตร์ของเราเห็นภาพที่ชัดเจนขึ้นมาก ของหน้าตาของ Vultaum"
 precursor.30.name:0 "อาคาร ยักษ์ ใหญ่ ที่ มี ชื่อ เสียง"
 precursor.30.desc:0 "เราตรวจพบเศษชิ้นส่วนของโรงขุดเจาะแก๊สในวงโคจรรอบ ๆ[From.GetName]ซึ่งปรากฏที่ Vultaum ในต้นกําเนิด เครื่องขับเคลื่อนรักษาสถานี ถูกจงใจยิงล้านปีที่ผ่านมา ในความพยายามที่จะผลักดันสถานีโดยตรง"
 precursor.31.desc:0 "สูทอวกาศ Vultaum ที่ส่วนใหญ่ไม่สมบูรณ์ ซึ่งนักปล้นก่อนหน้านี้ได้มองข้ามไป การสร้างแบบท่อยาว 4 เมตรนี้ ทําให้นักวิทยาศาสตร์ของเรามีความเข้าใจใหม่ๆ ว่าสภาพแวดล้อมแบบไหนที่ตัวแยกเสียงชอบ"
 precursor.35.name:0 "Vultaum Trade Post"
 precursor.35.desc:0 "§Y[From.GetName]§!เป็นบ้านสําหรับด่านเล็ก ๆ Vultaum ที่ที่พวกเขาแลกเปลี่ยนกับ อารยธรรมที่ใกล้เคียงหลาย เมื่อ ถึง จุด หนึ่ง ตําแหน่ง ทาง การ ค้า ดู เหมือน ได้ ถูก เปลี่ยน เป็น ภารกิจ ทาง ศาสนา ซึ่ง พวก วุธ พยายาม เปลี่ยน พวก พ่อค้า ต่าง ดาว ที่ มา เยือน ให้ มา เป็น ปรัชญา ของ พวก เขา. การค้าหยุดไม่นานหลังจากนั้นและ[From.GetPlanetMoon]ในที่สุดก็ถูกทิ้งร้าง"
 precursor.36.desc:1 "นักโบราณคดีบน§Y[From.From.GetName]§!ได้กู้แผ่นพับดิจิตอลของ Vultaum มา ดู เหมือน ว่า พวก มิช ชัน นารี ที่ สถานี นี้ ได้ ส่ง แผ่น พับ เช่น นี้ ไป เยี่ยม พวก พ่อค้า. ข้อมูลส่วนใหญ่เสียหาย แต่มีหลายข้ออ้างอิง\"คําโกหกอันยิ่งใหญ่\" และ \"พันธนาการแห่งความเป็นจริง\""
 precursor.40.name:0 "ดาวเทียมวอลเลาม"
 precursor.40.desc:0 "ดาวเทียม Vultuam ขนาดเล็กถูกพบในวงโคจรของ§Y[From.GetName]§!มันถูกตั้งให้ส่งข้อความซ้ําไปเรื่อยๆ จนกระทั้งแหล่งกําเนิดพลังงาน ถูกดูดออกไปนับล้านปีก่อน เรากู้อาร์เรย์ของเครื่องส่งสัญญาณได้ แต่สามารถกู้ส่วนเล็ก ๆ ของการส่งสัญญาณ\n\nจุด มุ่ง หมาย หลัก ของ ดาว เทียม ดวง นี้ ดู เหมือน ว่า เพื่อ เผย แพร่ ปรัชญา ที่ มี อิทธิพล ของ วุล ชูม ต่อ อารยธรรม เพื่อน บ้าน. ข้อความของมันกล่าวถึงความจําเป็น\"การเชื่อมโยง\" และ \"เลียนแบบความเป็นจริง\" อะไรก็แล้วแต่ที่มีความหมาย"
 precursor.41.desc:0 "หลัง จาก การ วิเคราะห์ อย่าง ละเอียด เกี่ยว กับ อาร์เรย์ ของ เครื่อง ส่ง สัญญาณ วุลต์ แอ ม นัก โบราณคดี และ วิศวกร ข้อมูล ของ เรา ลง ความ เห็น ว่า เครื่องจักร ไม่ มี คุณค่า สําหรับ เรา. อย่างไรก็ตาม โครงการได้ปรับปรุงความเข้าใจของเราอย่างมาก ในภาษาโปรแกรม Vultaum เบื้องต้น อย่างไรก็ตาม หวังว่านี่จะทําให้การถอดรหัส ข้อมูลของพวกเขาง่ายขึ้นในอนาคต"
 precursor.45.name:0 "Vultaum Splinter Colony"
 precursor.45.desc:0 "§Y[From.GetName]§!เป็นที่ตั้งของอาณานิคม Vultaum เล็ก ๆ ที่มีเอกลักษณ์สองเหตุผล -[From.GetStarName]ระบบไม่ได้อยู่ภายในสิ่งที่เคยเป็นอวกาศ Vultuam และซากปรักหักพังจะมีอายุน้อยกว่าสิ่งอื่น ๆ ที่หลงเหลือโดยอารยธรรมของพวกเขา อาณานิคมดูเหมือนจะถูกจัดตั้งขึ้น โดยกลุ่มย่อยบางกลุ่ม ที่ปฏิเสธหลักปรัชญาของสังคม"
 precursor.46.desc:1 "วัตถุ โบราณ หลาย อย่าง ที่ ขุด พบ ใน สถาน ที่ ขุด ค้น ทาง โบราณคดี§Y[From.From.GetName]§!ครอบคลุมไปด้วยการเขียนที่มั่นคง ปฏิเสธแนวคิดปรัชญาของ Vultaum ว่า\"ชีวิตตัวเองเป็นเรื่องโกหก\" หนึ่ง ใน จํานวน นั้น ดู เหมือน เป็น การ รําลึก ถึง การ แข่งขัน ชิง ดี กัน ของ พวก วรรณะ. นี้จะยืนยันทฤษฎีของเราว่าอาณานิคมนี้ มีอยู่ระยะหนึ่งหลังจากยุบของส่วนที่เหลือของ ส.ส."
 precursor.50.name:0 "ศูนย์ จริง ๆ ของ โลก"
 precursor.50.desc:0 "วิศวกร Vultaum ณ จุดใดจุดหนึ่ง สร้างความซับซ้อนของออร์บิทัลขนาดใหญ่ใกล้§Y[From.GetName]§!อุทิศให้กับงานวิจัยคอมพิวเตอร์ น่า แปลก ที่ พวก เขา ดู เหมือน จะ มอง ข้าม ขอบ เขต อัน เป็น ที่ นิยม กัน ของ ปัญญาประดิษฐ์ เพื่อ เพ่ง เล็ง เฉพาะ สิ่ง ที่ เป็น จริง และ การ จําลอง คอมพิวเตอร์ ขนาด มหึมา. ความซับซ้อนส่วนใหญ่ถูกทําลายด้วยไฟอาวุธและไมโครเมตโตรอยด์ แต่ซากของมันอยู่ในสภาวะที่น่าทึ่ง"
 precursor.51.desc:1 "นัก โบราณคดี ตรวจ สอบ ความ ซับ ซ้อน ของ ออร์บิทัล วุล มัม ข้าง บน§Y[From.From.GetName]§!ได้บังเอิญพบสิ่งที่น่าสนใจ พวกเขาจัดการเก็บสําเนาบางส่วน ของเกมที่เป็นเกมเสมือนจริงแบบหลายแบบ ที่ได้รับความนิยมอย่างมาก โดยล้านของ Vultaum ทั่วจักรวรรดิของพวกเขา\n\nแม้ ว่า เกม นี้ เกิด ขึ้น ใน สังคม สมัย เดียว กัน ของ พวก เขา ใน แบบ นิยาย และ ได้ รับ การ ยกย่อง อย่าง สูง แต่ ก็ ได้ พิสูจน์ แล้ว ว่า เป็น แหล่ง ข้อมูล อัน ล้ํา ค่า ทั้ง ใน ภาษา และ ขนบธรรมเนียม ของ พวก เขา."
 precursor.55.name:0 "Vauuam Asteroid เบส"
 precursor.55.desc:0 "§Y[From.GetName]§!ปกคลุมไปด้วยอุกาบาตที่กระทบ จากการชนกันของดาวเคราะห์น้อย แต่หนึ่งโดดเด่นออก - มันดูเหมือนจะถูกสร้างขึ้น มีหลักฐานอื่น ๆ บนพื้นผิวดาวเคราะห์น้อย ระบุว่ามันถูกเหมืองอย่างหนักโดย Vultaum ในบางจุดประมาณ 12 ล้านปีที่ผ่านมา ปล่อง ภูเขา ไฟ ใหญ่ ที่ เรา พบ เป็น ที่ คาด กัน ว่า เป็น ที่ ตั้ง ของ ฐาน ทํา เหมือง ของ พวก เขา."
 precursor.56.desc:1 "การ ตรวจ สอบ อย่าง ใกล้ ชิด ยิ่ง ขึ้น เกี่ยว กับ ฐาน การ ทํา เหมือง ที่ พัง ทลาย ของ วลุธ§Y[From.From.GetName]§!ได้ ค้น พบ อุปกรณ์ ทํา เหมือง บาง อย่าง ที่ ถูก ทิ้ง ไว้ ใน อุโมงค์ ที่ ยัง มี อยู่. มันได้รับการออกแบบมาโดยเฉพาะ เพื่อนําไปใช้กับกายวิภาคกายวิภาคของหนอน และดูเหมือนจะได้รับการดําเนินการ"
 precursor.100.name:0 "Vultaum บ้านระบบดาวล็อคคาม"
 precursor.100.desc:0 "หลังจากการศึกษาอย่างเข้มงวดของวัตถุที่ค้นพบของ Vultaum นักวิทยาศาสตร์บน§Y[Root.Capital.GetName]§!ได้จัดการสรุปพิกัดที่แน่นอนของวุลมาร์ -ระบบบ้านของอารยธรรมเวลส์โบราณ! เราควรเริ่มเดินทางเข้าสู่ระบบนี้ ก่อนที่คนอื่นจะมาตีเรา"
 precursor.100.a:0 "ติดต่อยานวิทยาศาสตร์ที่ใกล้ที่สุด!"
 precursor.101.name:0 "โลก ภาย นอก ของ โลก"
 precursor.101.desc:1 "ซากปรักหักพังที่แตกละเอียดของโลกของวาลทาม เปิดเผยว่ามันได้รับ การสูญพันธุ์ขนาดใหญ่ 12 ล้านปีที่ผ่านมา จากซากปรักหักพังที่ยังคงอยู่[FromFrom.GetPlanetMoon]พื้นผิวของแผ่นดิน เราได้เรียนรู้ว่าสังคมของวาลูม ประสบกับการเปลี่ยนแปลงทางโลกวิทยาที่รุนแรง\n\nปรัชญา ใหม่ ของ พวก เขา แสดง ให้ เห็น ว่า เอกภพ ทั้ง สิ้น เป็น ความ จริง แบบ เทียม ซึ่ง สิ่ง มี ชีวิต ใน จินตนาการ ทั้ง หมด ถูก นํา เข้า สู่ ความ สนุก เพลิดเพลิน ของ อํานาจ ที่ สูง กว่า โดย ไม่ รู้ ตัว. ภาย ใต้ การ ควบคุม ของ โวล์ม ได้ รับ ความ พยายาม อย่าง รุนแรง ยิ่ง ขึ้น เรื่อย ๆ ที่ จะ ใช้ กําลัง\"การเชื่อมโยง\" ตัวเองจากการจําลองนี้ ซึ่งส่วนใหญ่เกี่ยวข้องกับการฆ่าตัวตายหมู่\n\nใน ที่ สุด พวก เขา ก็ ลง ความ เห็น ว่า เฉพาะ แต่ การ ขาด ความ เกี่ยว พัน กัน อย่าง ไม่ หยุด หย่อน ของ ปัจเจกบุคคล หลาย พัน ล้าน คน เท่า นั้น ที่ จะ ทํา ให้ ระบบ นี้ ไม่ มั่นคง พอ ที่ จะ ให้ เสรีภาพ แก่ พวก เขา. ด้วย การ ตก ลง กัน เป็น เวลา หลาย ชั่วโมง วิลเลา ส์ ทุก หน แห่ง ฆ่า ตัว ตาย ไม่ ว่า โดย วิธี ใด ก็ ตาม. คน เหล่า นั้น ที่ ไม่ ยอม มี ส่วน ร่วม ใน การ ฆ่า ตัว ตาย ขนาด ใหญ่ นี้ มี น้อย เกิน กว่า ที่ จะ ผสม เกสร สิ่ง มี ชีวิต ชนิด ต่าง ๆ เข้า ด้วย กัน อีก และ ดัง นั้น วิลเลา ม จึง ค่อย ๆ เลือน หาย ไป และ สูญ พันธุ์ ใน ที่ สุด."
 precursor.102.name:0 "Wultauom Home World ค้นพบ"
 precursor.102.desc.a:1 "มี การ ค้น พบ แผ่น ดิน โลก ใน สมัย โบราณ ที่ พัง ทลาย แต่ เห็น ได้ ชัด ว่า มี คน อื่น มา เยี่ยม เมื่อ เร็ว ๆ นี้. ไม่มีอะไรมีค่าเหลือให้ค้นหา[FromFrom.GetPlanetMoon]."
 precursor.102.desc.b:1 "ตามข้อมูลการสํารวจของเรา โลกที่แตกสลายนี้เคยทําหน้าที่เป็นแผ่นดิน ของอารยธรรมโบราณที่รู้จักกันเป็น\"Vultuam\". มีสัญญาณว่านักท่องอวกาศอื่น ๆ ที่มาที่นี่เมื่อเร็ว ๆ นี้ ... ไม่มีอะไรของมูลค่าที่จะค้นหาบน[FromFrom.GetPlanetMoon]."
 precursor.500.name:0 "ยูตจักรวรรดิ"
 precursor.500.desc:1 "เราได้ค้นพบวัตถุจาก เอเลี่ยนโบราณ§Y[From.GetName]§!นักวิทยาศาสตร์ของเราคิดว่าพวกเขาอาศัยอยู่ในภูมิภาคนี้ ประมาณหกล้านปีที่ผ่านมา ขึ้นอยู่กับอายุของวัตถุ เอเลี่ยนเรียกตัวเองว่า\"โย้ต\" และดูเหมือนจะได้รับการมีขนาดใหญ่มากและแบน Artroplated Atnatus\n\nดู เหมือน ว่า คน เดียว สามารถ เดิน ทาง ได้ ไกล เกือบ หนึ่ง ร้อย เมตร เมื่อ โต เป็น ผู้ ใหญ่ และ ดู เหมือน ว่า ยาก เหลือ เกิน ที่ ยูห์ต จะ เดิน ทาง บน ดาว ดวง เดียว กัน มาก กว่า สอง หรือ สาม ครั้ง."
 precursor.505.name:0 "ยูห์ต แฮชเชอรี่ เวิลด์"
 precursor.505.desc:0 "[From.GetName]ใน ช่วง หนึ่ง ของ อดีต อัน ห่าง ไกล ได้ เกิด การ ถล่ม ของ ออร์บิทัล อย่าง กว้าง ขวาง ซึ่ง ใน ช่วง นั้น ชีวเคมี ได้ รับ ความ เสีย หาย อย่าง หนัก. เดอะ[From.GetPlanetMoon]ดู เหมือน ว่า บ้าน อยู่ ใน บริเวณ เล็ก ๆ ที่ สร้าง โดย ยูห์ต โบราณ แต่ เหตุ ใด นั่น จึง เป็น ข้อ พิสูจน์ ว่า โลก ทั้ง สิ้น จะ ถูก ทําลาย จึง เป็น เรื่อง ลึกลับ."
 precursor.506.desc:1 "หลังจากการศึกษาอย่างกว้างขวาง§Y[From.From.GetName]§!ตอนนี้เรารู้แล้วว่า[From.From.GetPlanetMoon]รับใช้เป็นหนึ่งในหลายๆ คน\"โลกของช่างทําขนม\" ในเดอะยูตจักรวรรดิกระทรวง สุขาภิบาล ของ พวก เขา เตรียม โลก ไว้ โดย ทํา ให้ พวก เขา เป็น หมัน จาก สัตว์ ล่า เหยื่อ และ ปัจจัย อื่น ๆ ที่ อาจ ก่อ อันตราย ก่อน จะ ปลูก ไข่ บน ผิว น้ํา.\n\nลูกนกยูห์ตก็ถูกทิ้งให้อยู่คนเดียว ในสภาพแวดล้อมที่ค่อนข้างปลอดภัยนี้ หลายศตวรรษจนกระทั่งพวกเขาพัฒนา ระดับที่ใกล้ตาย เฉพาะ ตอน นั้น เอง ที่ มี การ รวบ รวม และ นํา เข้า มา ใน สังคม อย่าง ระมัดระวัง."
 precursor.510.name:0 "โพสต์การดักฟังของโย้ต"
 precursor.510.desc:0 "เราได้ค้นพบการฟังจํานวนมากใน[From.GetName]อาร์เรย์เหล่านี้มีอายุหลายล้านปี และเราเชื่อว่าพวกมันถูกสร้างโดยยูห์ต แต่ปรากฏว่ามีสิ่งมีชีวิตต่างถิ่นอย่างน้อยหนึ่งชนิด การ รับ อาหาร ขนาด มหึมา นี้ เกิน กว่า จะ ซ่อมแซม ได้ แต่ เทอร์มินัล บาง แห่ง ยัง คง คง อยู่ ต่อ ไป."
 precursor.511.desc:1 "นักโบราณคดีของเรา§Y[From.From.GetName]§!ได้เรียนรู้ว่าอาร์เรย์ที่สร้างขึ้นที่นั่น เพื่อสแกนอวกาศ สําหรับสัญญาณใด ๆ ของสิ่งมีชีวิตต่างดาวที่ชาญฉลาด - สิ่งที่ยูห์ท ไม่เคยเคยพบมาก่อน\n\nหลัง จาก จัด การ เพื่อ กู้ พลัง งาน บาง ส่วน ให้ แก่ เทอร์มินัล คอมพิวเตอร์ นัก โบราณคดี ก็ ได้ แผ่น ดิสก์ ที่ มี แฟ้ม บันทึก จาก ชุด เซ็นเซอร์ ยาว กว่า ร้อย ปี. บันทึก เหล่า นี้ บ่ง ชี้ ว่า ส่วน นี้ ของ กาแล็กซี ไม่ มี ชีวิต ที่ มี การ สังเคราะห์ แสง เลย ใน สมัย ของ ยูห์ตจักรวรรดิ."
 precursor.515.name:0 "ยูห์ต โคนี"
 precursor.515.desc:0 "ซาก ปรัก หัก พัง ของ ยูห์ต อาร์ โค โล คี อัน มหึมา หลาย สิบ ชิ้น จะ พบ ได้ ใน สมอง ใต้ ของ§Y[From.GetName]§!ชี้ให้เห็นว่า[From.GetPlanetMoon]เป็นหนึ่งในอาณานิคมที่สําคัญของพวกเขา\n\nภาย ใน อาคาร หลัง หนึ่ง ที่ พัง ทลาย ลง มา ทีม งาน ของ เรา ค้น พบ ซาก ปรัก หัก พัง ของ สิ่ง ที่ ดู เหมือน เป็น พิพิธภัณฑ์ ที่ มี การ จัด แสดง\"การทุจริตของเอเลี่ยนที่มีชื่อเสียง\" สิ่ง ประดิษฐ์ เหล่า นี้ ได้ รับ การ รวบ รวม โดย ยูห์ต จาก ทั่ว จักรวรรดิ ของ พวก เขา อ้าง ว่า ได้ พิสูจน์ การ ดํารง อยู่ ของ สิ่ง มี ชีวิต ต่าง ดาว ที่ มี ชีวิต อยู่. ในแต่ละกรณี พิพิธภัณฑ์ได้ลบล้างสิ่งประดิษฐ์นี้ ว่าเป็นการฉ้อโกง"
 precursor.516.desc:1 "สิ่งประดิษฐ์ส่วนใหญ่ที่จัดแสดงโดยพิพิธภัณฑ์ยูห์ท§Y[From.From.GetName]§!หายสาบสูญไป แต่นักโบราณคดีของเรา หาทางกู้การโกงเหล่านี้ได้ มันเป็นเครื่องมือที่ใช้วัดรังสีคอสมิก แต่นักโบราณคดีได้ยืนยันแล้วว่า มันมีอายุก่อนยุคยูห์ตไปหลายล้านปี ตรงกันข้ามกับความคิดเห็นของพิพิธภัณฑ์ยูห์ท นี่ดูเหมือนจะเป็นสิ่งประดิษฐ์ของมนุษย์ต่างดาวอย่างแท้จริง"
 precursor.520.desc:0 "สัญญาณของการพัฒนายูห์ท สามารถพบได้ทั่ว§Y[From.GetName]§!และ[From.GetPlanetMoon]ต้องมีประสบการณ์ที่จํากัด เทอร์รามิด ณ จุดใดจุดหนึ่ง ส่วนหนึ่งในซีกโลกเหนือ เป็นสุสานขนาดใหญ่ ไม่ พบ ที่ ตั้ง ของ ยูห์ต ใกล้ ๆ แต่ มี อนุสาวรีย์ มาก มาย ที่ เป็น สถาน ที่ ฝัง ศพ.\n\nเนื่อง จาก มี อัตรา การ คลอด ต่ํา และ เฉลี่ย อายุ เกือบ หนึ่ง พัน ปี จึง ถือ กัน ว่า แต่ ละ คน ที่ เสีย ชีวิต ยูห์ต เป็น เหตุ การณ์ สําคัญ และ มี การ เน้น มาก ใน พิธี ฝัง ศพ."
 precursor.521.desc:1 "การ ขุด ค้น ทาง โบราณคดี[From.From.GetName]มี การ เปิด เผย ว่า หลุม ฝัง ศพ ส่วน ใหญ่ ถูก ปล้น ใน เวลา หลาย ล้าน ปี นับ ตั้ง แต่ ที่ พวก เขา ถูก ขุด ขึ้น มา เป็น ครั้ง แรก ดู เหมือน ว่า เป็น ผล มา จาก ธรรมเนียม ฝัง ศพ ของ พวก เขา ด้วย เครื่อง ประดับ และ ของ ขวัญ อัน โอชะ อื่น ๆ. ใน กอง สิ่ง ของ ที่ พวก ปล้น สะดม ทิ้ง ไป นัก โบราณคดี ได้ พบ ตุ๊กตา ขนาด ใหญ่ ที่ คล้าย กับ ยูห์ต ผู้ ใหญ่. พวก เขา คาด เดา ว่า มัน อาจ ใช้ เป็น เครื่องราง แห่ง โชค หรือ ของ ระลึก บาง อย่าง."
 precursor.525.desc:0 "มีสงครามแผ่นดินครั้งใหญ่เกิดขึ้น§Y[From.GetName]§!ระหว่างยูตและสปีชีส์ที่สองที่เรารู้จักน้อย การ รณรงค์ นี้ เกิด ขึ้น ใน ปี สุด ท้าย ของ ราชวงศ์ ยูห์ตจักรวรรดิและถึงแม้ว่ามันจะเกิดขึ้นเมื่อหลายล้านปีก่อน ก็ยังสามารถพบซากเครื่องจักรสงครามที่ถูกทําลายได้\n\nถึงแม้ว่า[From.GetPlanetMoon]เคยเป็นอาณานิคมที่สําคัญ เมืองและอาณานิคมของพวกเขา ไม่เคยถูกสร้างขึ้นใหม่ หลังจากที่การต่อสู้ยุติลง"
 precursor.526.desc:1 "หลังจากค้นผ่านสนามรบโบราณ§Y[From.From.GetName]§!นักโบราณคดีของเรากู้อาวุธที่ดูเหมือนจะเป็นเกราะกําบังของ ยุท ปืนใหญ่ขนาดใหญ่หลายกระบอกยังคงแนบอยู่กับมัน และนักโบราณคดีได้อนุสรณ์ว่าทหารยูห์ท"
 precursor.530.name:0 "ดาวเทียมโย้ต"
 precursor.530.desc:0 "ดาวเทียมยูห์ตวางอยู่ในวงโคจรรอบ ๆ§Y[From.GetName]§!เพื่อระลึกถึงช่วงเวลาที่มีการติดต่อกันครั้งแรก ระหว่างจักรวรรดิของพวกเขากับแจ๊บบ้าดอร์ดีนนี อารยธรรมร่วมสมัย เหตุการณ์นี้เกิดขึ้นใน[From.GetStarName]ระบบ และมีผลกระทบอย่างลึกซึ้ง ต่อสังคมของยูเฮตต์\n\nเป็น เวลา กว่า หนึ่ง ล้าน ปี ที่ พวก เขา คิด ว่า ตัว เอง อยู่ ตาม ลําพัง ใน กาแล็กซี และ ชาว ยูห์ต มี ปฏิกิริยา ทั้ง ต่อ ความ น่า เกรง ขาม และ ความ หวาด กลัว ต่อ การ ค้น พบ ชีวิต ของ มนุษย์ ต่าง ดาว. เดอะ[Root.GetName]ได้ดาวเทียมคืนมาแล้ว ซึ่งตอนนี้กําลังคอยการวิเคราะห์อยู่"
 precursor.531.desc:1 "หลังจากวิเคราะห์ดาวเทียมที่เรากู้ได้§Y[From.From.GetName]§!นักโบราณคดีของเราพบวัตถุที่ฝังอยู่ เป็นภาพที่ฝังลึกมาก ของสิ่งที่ดูเหมือนเป็นยานยูห์ท และลูกเสือของแจ๊บบ้าร์ดีนที่มีขนาดเล็กกว่ามาก มันให้แนวคิดบางอย่างกับเรา ว่ายานของพวกเขาหน้าตาเป็นอย่างไร"
 precursor.535.name:0 "Yuht Cruiser"
 precursor.535.desc:0 "ซากยานยูเอทถูกพบในวงโคจร§Y[From.GetName]§!ดู เหมือน ว่า มัน ได้ ตก เป็น เหยื่อ ของ การ ยิง อาวุธ แต่ เมื่อ อายุ มาก แล้ว มัน เป็น เรื่อง ยาก ที่ จะ แน่ ใจ. ไม่มีสิ่งบ่งชี้ว่าเรือเคย ถูกติดตั้งด้วยไดรฟ์ FTL -มันจะต้องได้เดินทางระหว่างดาวที่ความเร็วต่ํา"
 precursor.536.desc:1 "นัก โบราณคดี ตรวจ สอบ เรือ บรรทุก สินค้า ที่ ชํารุด ที่ อยู่ ข้าง บน§Y[From.From.GetName]§!ได้ส่งรายงานของพวกเขา มีห้องขนาดใหญ่สองห้องอยู่ในแผนกกลางของยาน ออกแบบมาเพื่อเช่าห้องของยูห์ท 1 ห้อง จากขนาดที่มากของบุคคลในยูเอต ดูท่าว่านี้จะเป็นคอมพลิเมนต์มาตรฐานของพวกเขาบน ภาชนะขนาดนี้\n\nไม่ มี ซาก ของ ยูห์ต อยู่ ที่ ไหน บน เรือ เลย แต่ นัก โบราณคดี ได้ ค้น พบ บันทึก จาก คอมพิวเตอร์ ที่ เฝ้า ดู สัญญาณ ชีวิต และ สภาพ ทาง การ แพทย์ ของ ลูก เรือ. มันให้ข้อมูลสําคัญเกี่ยวกับสรีรวิทยายูท"
 precursor.540.name:0 "เรือ โคนี"
 precursor.540.desc:0 "ซากศพบางส่วนของยานดาวยูตโบราณ พบในวงโคจรสูงมากกว่า§Y[From.GetName]§!การวิเคราะห์เริ่มต้นโดย[Root.GetName]บ่ง ชี้ ว่า เรือ อาจ ใช้ เป็น เรือ ที่ ตั้ง อาณานิคม.\n\nขนาดของยาน เรือ ยูห์ต มัก จะ มี คน เพียง หนึ่ง หรือ สอง คน เท่า นั้น ที่ ได้ รับ ขนาด ร่าง กาย ขนาด มหึมา ของ ตน แต่ ฮิปโป นี้ มี เครื่อง ยึด คาโย พอด ติด อยู่ มาก กว่า สิบ เครื่อง แต่ ละ ลํา มี เครื่อง ขับ เคลื่อน ที่ แห้ง ๆ จาก ที่ ต้อง เป็น ลําไส้ ใหญ่."
 precursor.541.desc:1 "ซากศพส่วนใหญ่ของเรืออาณานิคมที่เสื่อมโทรม§Y[From.From.GetName]§!อยู่ในสภาพที่ไม่ค่อยดีนัก แต่นักโบราณคดีของเรา สามารถกู้เครื่องยนต์แสงของเรือกลับคืนมาได้เดอะ ยอร์ตไม่เคยทําลายกําแพงแสง, ขึ้นอยู่กับเทคโนโลยีคาโรและพันปีที่ผ่านมาชีวิตธรรมชาติ"
 precursor.545.name:0 "เพิ่มเลเยอร์...อาศัย"
 precursor.545.desc:0 "ดาว เคราะห์ น้อย ดวง นี้ ดู เหมือน จะ เป็น บ้าน ของ คน หนึ่ง ใน ยูห์ต. การสแกนลึกแสดงให้เห็นถ้ําที่เชื่อมต่อกัน ในบริเวณภายในของดาวเคราะห์น้อย ที่มีลักษณะคล้ายห้อง เพื่อเรียนรู้มากขึ้น เราจะต้องส่งทีมออกไป สํารวจระบบถ้ํา"
 precursor.546.desc:1 "หลังจากตรวจสอบบ้านยูห์ตบนดาวเคราะห์น้อย§Y[From.From.GetName]§!เราได้รู้ว่า มันเป็นบ้านของนักปรัชญาผู้โด่งดัง\"ยัคลิเออร์\" เห็น ได้ ชัด ว่า เธอ เป็น บุคคล ที่ มี ชื่อ เสียง บาง คน ใน วัฒนธรรม ของ พวก เขา และ มี การ พบ การ อ้างอิง ถึง เธอ ใน แหล่ง ต่าง ๆ กัน หลาย แหล่ง. ซากศพของยากลิเออร์ถูกพบโดยแอร์ล็อคหลักของบ้าน ที่ที่เธอเสียชีวิตขณะรอกระสวยเสบียง ที่ไม่เคยมาถึง"
 precursor.600.name:0 "บ้านระบบดาวล็อคคาม"
 precursor.600.desc:0 "หลังจากการศึกษาอย่างเข้มงวดของวัตถุที่พบของเรายูห์ท นักวิทยาศาสตร์บน§Y[Root.Capital.GetName]§!ได้ทําการอนุมานถึงพิกัดกาแล็กซี่ที่แน่นอนของยูฮ็อง - ระบบบ้านของอารยธรรมโบราณ! เราควรเริ่มเดินทางเข้าสู่ระบบนี้ ก่อนที่คนอื่นจะมาตีเรา"
 precursor.601.name:0 "โลก ของ ยูห์ต"
 precursor.601.desc:1 "เราได้รับการยืนยันว่า§Y[FromFrom.GetName]§!เป็นโลกดั้งเดิมของยูห์ท เดอะ[FromFrom.GetPlanetMoon]ทุกข์ทรมานจากการระเบิดของออร์บิทัล เมื่อประมาณสี่ล้านปีที่ผ่านมา โครง ของ โลหะ บิด เป็น สิ่ง ที่ ยัง คง มี อยู่ ใน อาร์ โค โล คิส ขนาด มหึมา ซึ่ง ครั้ง หนึ่ง คลุม พื้น ผิว.\n\nจากที่เราสามารถเชื่อมโยงเข้าด้วยกัน ดูเหมือนว่ายูห์ต ใช้เวลาส่วนใหญ่ของล้านปี ค้นหาพื้นที่ท้องถิ่นอย่างไร้ประโยชน์ เมื่อในที่สุดพวกเขาได้พบกับแจ๊บบ้าร์ดีนนี การแข่งขันหนุ่มสาวที่ได้ประสบความสําเร็จเพียงเมื่อเร็ว ๆ นี้ระหว่างการเดินทางของดวงดาว จิตวิทยาของมนุษย์ต่างดาวของพวกเขาเป็นตกใจอย่างมาก\n\nความเป็นผู้นําของยูห์ได้บรรลุความ เห็นชอบ : พวกแจ๊บบ้าต้องถูกกําจัดก่อน ที่จะมีอํานาจมากขึ้น มี การ โจมตี อย่าง รุนแรง ซึ่ง ทํา ให้ ทั้ง สอง ฝ่าย ต้อง พ่าย แพ้. ทั้ง ๆ ที่ อายุ ยัง น้อย แต่ ก็ มี การ ทดลอง เทคโนโลยี ที่ ยูห์ต ไม่ เคย คิด ถึง มา ก่อน แล้ว และ ใน ที่ สุด พวก เขา ก็ ได้ รับ ความ ช่วย เหลือ. หลังจากไม่ถึงทศวรรษของสงคราม สองล้านปีจักรวรรดิถูกทําลายอย่างสิ้นเชิง"
 precursor.602.name:0 "โลกส่วนตัวค้นพบ"
 precursor.602.desc.a:1 "เราได้ค้นพบโลกบ้านเกิดโบราณของยูห์ แต่อลาส คงมีคนอื่นที่เพิ่งได้ไปเยี่ยมโลกใบนี้ เดอะ[FromFrom.GetPlanetMoon]ได้ถูกรื้อถอนทุกอย่าง"
 precursor.602.desc.b:1 "การสํารวจของเรา§Y[FromFrom.GetName]§!ได้เปิดเผยว่า[FromFrom.GetPlanetMoon]ครั้งหนึ่งเคยเป็นโลกของสายพันธุ์โบราณ ที่รู้จักกันในชื่อใช่ ระบบนี้ได้รับการเยี่ยมชมเมื่อเร็ว ๆ นี้โดยนักท่องเที่ยวระหว่างดวงดาวอื่น ๆ อย่างไรก็ตามและพวกเขาดูเหมือนจะได้เลือก[FromFrom.GetPlanetMoon]ไม่มีค่าอะไรเลย"
 precursor.1000.name:0 "สันนิบาต แรก"
 precursor.1000.desc:1 "เราได้ค้นพบวัตถุจาก เอเลี่ยนโบราณ§Y[From.GetName]§!ไม่! ถ้าสิ่งที่เราได้เรียนรู้จากวัตถุเหล่านี้ถูกต้อง อารยธรรมนี้เป็นการจัดเรียง ของการรวมกันที่ประกอบด้วย เชื้อชาติคนต่างด้าวที่แตกต่างกันหลาย พวกเขาเรียกตัวเองว่า\"พรีเมียร์ลีก\" และดูเหมือนจะร่วมสงบศึกเมื่อสองล้านปีก่อน\n\nถึงแม้ว่า[From.GetStarName]ระบบอยู่ในพื้นที่ ที่ดูเหมือนว่าได้สร้างขึ้นเป็นแกนหลักของอาณาเขตของพวกเขา แผนที่บางส่วนที่พบในหมู่วัตถุ ระบุว่าลีกแรกนี้อาจจะมีครอบคลุม"
 precursor.1005.name:0 "ฐานทัพเรือลีก"
 precursor.1005.desc:0 "ซากปรักหักพังของสิ่งที่จะต้องเป็นฐานหลักของกองทัพเรือครั้งแรกได้รับการตรวจพบในวงโคจรรอบ§Y[From.GetName]§!เรารู้ว่าลีกรักษากองเรือขนาดใหญ่ที่เรียกว่า\"คุณตานาวี\" เพื่อต่อสู้กับผู้รุกรานและปกป้องประเทศ จากผู้รุกรานภายนอก - ด่านนี้ดูเหมือนว่า ได้จัดหาอาวุธสําหรับหนึ่งในกองเรือลาดตระเวน"
 precursor.1006.desc:1 "ภารกิจทางโบราณคดีของเรา ที่ฐานทัพทหารเรือแห่งแรก ได้สิ้นสุดแล้ว เราได้สัญลักษณ์ของหน่วยลาดตระเวณที่ 28กองยานหน่วยปฏิบัติการเฉพาะกิจขนาดกลาง มีหน้าที่ป้องกันเส้นทางการค้า นําไปสู่การรวมชาติในลีก ตามขอบกาแล็กซี่ ฐานที่หมุนรอบ[From.From.GetName]ดู เหมือน ว่า เป็น เมือง ท่า ของ พวก เขา."
 precursor.1010.name:0 "โปรแกรมถอดไพ่ลีก"
 precursor.1010.desc:0 "ส่วน คัน ธนู ของ ยาน รบ รุ่น แรก เคย ถูก ค้น พบ โดย รอบ§Y[From.GetName]§!มี เศษ ซาก ปรัก หัก พัง ไม่ เพียง พอ ที่ จะ คิด บัญชี สําหรับ เรือ ที่ เหลือ แต่ สิ่ง ที่ เหลือ อยู่ น้อย มาก อยู่ ใน สภาพ ที่ ยาก จน มาก. เรือถูกเจาะด้วยหลุม จากสิ่งที่ดูเหมือนเป็นกระสุนขนาดใหญ่"
 precursor.1011.desc:1 "การ เดิน ทาง ทาง ทาง โบราณคดี ไป ยัง เรือ บรรทุก สินค้า แห่ง แรก โคจร รอบ ๆ§Y[From.From.GetName]§!กลับมาแล้ว มี การ ค้น พบ ประโยชน์ เล็ก น้อย บน เรือ ที่ เสีย หาย แต่ นัก โบราณคดี ได้ ค้น พบ ลูก เรือ ของ ตน อย่าง ชัดเจน. ลีกแรกเรียกร้องให้โลกของสมาชิกทั้งหมด เพื่อพนักงานกองทัพเรือแกรนด์, ดาวร่วมของพวกเขา และผ่านรายการที่เราได้เรียนรู้ว่าลูกเรือของเรือลํานี้โดยเฉพาะ"
 precursor.1015.name:0 "โลก ใน คามัย"
 precursor.1015.desc:0 "การ สํารวจ§Y[From.GetName]§!ได้เปิดเผยว่า[From.GetPlanetMoon]เป็นโลกบ้านเกิดของแมลงคามได หนึ่งในผู้ก่อตั้งสมาชิกของลีกเก่า เคยครอบคลุมพื้นที่ส่วนใหญ่ของพื้นผิว แต่เราได้ทราบว่าคามาได สั่งห้ามการก่อสร้างทั้งหมด ในภูมิภาควงกลมขนาดใหญ่ บริเวณ นี้ เป็น ทั้ง พื้น ที่ ผสม พันธุ์ และ เขต สงวน ธรรมชาติ."
 precursor.1016.desc:1 "การสํารวจทางโบราณคดีของเรา§Y[From.From.GetName]§!ได้เรียนรู้มากมายเกี่ยวกับคามัมไดในปัจจุบัน พวกเขาเป็นวัฒนธรรมของนักรบ ที่ต่อสู้กับสงครามหลาย ๆ ผู้ก่อตั้งลีกครั้งแรกอื่น ๆ ไม่นานหลังจากที่เรือรบของพวกเขาแรก\n\nหลังจากพบกับความพ่ายแพ้ คามัยก็กลายเป็นผู้สนับสนุนที่กระตือรือร้นอย่างกระฉับกระเฉง ของการก่อตั้งลีกครั้งแรก และนักรบที่ดีที่สุดของพวกเขาจํานวนมาก จะทําหน้าที่เป็นกองกําลังที่ตกใจต่อศัตรูของลีก เราได้ค้นพบสิ่งที่สมบูรณ์แล้ว\"มากิอิลฮา\" เคียวในพิธีใช้โดยคามได สมาชิกของคณะกรรมการรักษาดินแดนลีกแรก"
 precursor.1020.name:0 "โลก ของ ชา ซาโก"
 precursor.1020.desc:0 "โลกนี้เป็นถิ่นฐานโบราณของยาน Singine Chasgo เป็นหนึ่งในสมาชิกผู้ก่อตั้งลีกแรก เมือง ส่วน ใหญ่ ของ พวก เขา ตั้ง อยู่ ใต้ ดิน และ[From.GetName]ประกอบด้วยเครือข่ายอุโมงค์ ซึ่งส่วนใหญ่ได้ยุบลงในสองล้านปี ตั้งแต่ชาซาโกสูญพันธุ์ ข้อดีจาก[Root.GetName]ได้ ระบุ สถาน ที่ ซึ่ง อาจ เป็น ไป ได้ ของ หลาย เมือง ที่ อยู่ ใต้ ดิน."
 precursor.1021.desc:1 "การ ขุด ค้น ของ เมือง ชา ซาโก ใต้ ดิน§Y[From.From.GetName]§!เรา เรียน รู้ มาก มาย เกี่ยว กับ สัตว์ โบราณ ชนิด นี้. พวกเขาเป็นเซลลิเทีย กับร่างกายที่ยืดยาวและขาดขา ซึ่งอาจจะเป็นยี่สิบเมตรหรือนานกว่านั้น ในบุคคลผู้ใหญ่\n\nบัญชีที่รอดชีวิตทั้งหมดระบุว่า ชาสโกเป็นพ่อค้าผู้เชี่ยวชาญและเรือบรรทุกสินค้าของพวกเขามักจะเป็นจุดแรก ของการติดต่อระหว่างการแข่งขันที่ไม่ประสบความสําเร็จและลีกแรก เป็น ที่ น่า สงสัย ว่า มัน อาจ ขยาย ตัว อย่าง รวด เร็ว ได้ ไหม โดย ไม่ ได้ รับ ประโยชน์ จาก เครือ ข่าย การ ค้า ที่ กว้าง ขวาง ของ ชา ซาโก ซึ่ง มี อยู่ แล้ว ก่อน จะ มี รากฐาน."
 precursor.1025.name:0 "The Migir-Yan Homeworld"
 precursor.1025.desc:0 "มิจิ- ยันเป็นหนึ่งในสมาชิกผู้ก่อตั้งของลีกแรกโบราณ และ§Y[From.GetName]§!คือโลกของพวกเขา จํานวน ประชากร เหล่า นั้น ได้ ถูก รวบ รวม เป็น จํานวน มาก มาย ที่ แผ่ กระจาย ไป ทั่ว พื้น ผิว โลก แต่ ละ กลุ่ม สามารถ เกื้อ หนุน ผู้ คน ได้ หลาย ร้อย ล้าน คน.\n\nอาร์ชอพเหล่านี้เชื่อมต่อโดยเครือข่ายของสกายเวย์และมิจิ- ยันเห็นได้ชัดเนื้อหาที่จะออกจากส่วนที่เหลือของ[From.GetPlanetMoon]ทะเลทรายที่ไม่มีใครแตะต้อง"
 precursor.1026.desc:1 "ซากฟอสซิลของมิเกร์-ยาอันที่สูญพันธุ์ไปแล้ว ถูกค้นพบโดยนักโบราณคดีของเรา§Y[From.From.GetName]§!ช่วยให้เราวาดภาพที่ชัดขึ้น ว่าสายพันธุ์นี้หน้าตาเป็นอย่างไร ตัว เล็ก ๆ โดย ที่ ส่วน ใหญ่ ไม่ สูง กว่า 0.6 เมตร สัตว์ เลี้ยง ลูก ด้วย นม เหล่า นี้ เป็น สัตว์ เลี้ยง ลูก ด้วย นม.\n\nมิเกร์-แยน มักจะมีเกือบพันคน และแต่ละสถานีในสังคม เชื่อกันว่าขบวนการทูตมิเกร์-แยน เป็นกองกําลังขับเคลื่อนเบื้องหลัง การสร้างลีกแรก"
 precursor.1030.name:0 "The V'ropak Homeworld"
 precursor.1030.desc:0 "§Y[From.GetName]§!เป็นโลกของนก V'ropak สายพันธุ์ที่เป็น หนึ่งในสมาชิกผู้ก่อตั้งของลีกเก่า นก ที่ บิน ไม่ ได้ เหล่า นี้ เดิน ด้วย ขา ยาว และ ซาก ฟอสซิล ที่ มี ขน ปุกปุย บ่ง ชี้ ว่า ตัว เมีย ของ มัน สามารถ สูง ถึง สี่ เมตร ส่วน ตัว ผู้ เล็ก กว่า เล็ก น้อย.\n\nเมืองทั้งหมดของมันถูกสร้างขึ้นภายในมีซาสกลวง การสแกนระบุว่ามีนาสเหล่านี้ ถูกสร้างขึ้นแบบประดิษฐ์ โดยพวก V' Ropak"
 precursor.1031.desc:1 "เมื่อลีกแรกเป็นที่จุลจอมเกล้าของอํานาจ V'ropak ได้มีชื่อเสียงเป็น นักวิทยาศาสตร์ที่ดีที่สุดในกาแล็กซี่ นวัตกรรมของพวกเขา ผลักดันกระบวนการขยายกิจการของลีก และมากกว่า 1 สายพันธุ์ถูกนํามาในพับ แต่โชคร้าย ที่ไม่มีเทคโนโลยีนี้เหลืออยู่[From.From.GetName]วันนี้"
 precursor.1035.name:0 "ฐานวิทยาศาสตร์ลีก"
 precursor.1035.desc:0 "การสแกนพื้นผิวของ§Y[From.GetName]§!ได้ระบุเศษของการติดตั้งโบราณบน[From.GetPlanetMoon]พื้นผิว ส่วน ใหญ่ ของ อาคาร ถูก ทําลาย ด้วย ระเบิด ขนาด ใหญ่ เมื่อ ประมาณ สอง ล้าน ปี ที่ แล้ว แต่ อาคาร ที่ อยู่ นอก บ้าน ไม่ กี่ หลัง รอด จาก การ ระเบิด. หลักฐานทั้งหมด ที่พบมาจนถึงจุดนี้ เป็นฐานวิจัย ที่สร้างขึ้นโดยพรีสต์ลีก"
 precursor.1036.desc:1 "การ สํารวจ ทาง โบราณคดี ที่ เรา ส่ง ไป§Y[From.From.GetName]§!กลับมาแล้ว เหลืออยู่น้อยมากจากฐานวิจัยของพรีสต์ลีก พวกเขาถูกส่งไปตรวจสอบ แต่ตัดสินจากสถานที่ห่างไกล เราสงสัยว่างานวิจัยที่ทํานั้น\n\nแผ่นข้อมูลที่พบจากแผ่น\"สถาบัน วิทยาศาสตร์\" ได้เสนอความเข้าใจบางอย่าง ว่าสังคมวิทยาศาสตร์ของลีกแรกถูกจัดระเบียบอย่างไร"
 precursor.1040.name:0 "โคโลนีสลีกร่วม"
 precursor.1040.desc:0 "ซาก ปรัก หัก พัง ของ อาณานิคม แห่ง หนึ่ง ที่ เคย มี การ ขุด พบ§Y[From.GetName]§!อาณานิคมนี้ปรากฏเป็นการทดลองทางสังคม ที่เกิดขึ้นในทศวรรษของลีก - ประชากรเริ่มต้นประกอบด้วยจํานวนผู้บุกเบิกอาณานิคมเท่ากัน มันถูกทิ้งให้ร้างไม่ถึง 50 ปี หลังจากก่อตั้งเสร็จ"
 precursor.1041.desc:1 "นัก โบราณคดี ของ เรา ได้ เรียน รู้ มาก ขึ้น เกี่ยว กับ อาณานิคม ที่ หาย ไป ของ§Y[From.From.GetName]§!ใน การ ก่อ ตั้ง สันนิบาต แรก จวน จะ ล่ม สลาย แล้ว และ อาณานิคม นี้ ถูก กําหนด ให้ ทํา หน้า ที่ เป็น เครื่อง มือ โฆษณา ชวน เชื่อ — เป็น โลก แบบ จําลอง ซึ่ง สมาชิก ทุก คน ใน สันนิบาต ถูก แทน ที่ และ ทํา งาน ประสาน กัน.\n\nความ พยายาม นี้ ดู เหมือน ว่า มี การ ทํา ให้ เกิด การ โต้ เถียง กัน เนื่อง จาก มี หลัก ฐาน แสดง ว่า มี การ สู้ รบ ที่ สําคัญ ระหว่าง ผู้ ที่ ตั้ง อาณานิคม อยู่ รวม ทั้ง การ สังหาร หมู่ ครั้ง ใหญ่ ที่ เกิด ขึ้น ก่อน อาณานิคม นั้น ถูก ทิ้ง ไว้."
 precursor.1045.name:0 "ศูนย์การค้าลีก"
 precursor.1045.desc:0 "2 ล้านปีก่อน§Y[From.GetName]§!ทําหน้าที่เป็นศูนย์การค้าหลัก ของสมาชิกของลีกแรก ส่วนใหญ่ของ[From.GetPlanetMoon]พื้นผิวของมันปกคลุมไปด้วยเมืองที่สูงตระหง่าน และเราได้ระบุซากปรักหักพังของท่าอากาศยานขนาดใหญ่อย่างน้อย 12 แห่ง เดอะ[From.GetPlanetMoon]ใน ช่วง หลาย ศตวรรษ ที่ ผ่าน มา มี การ ละ ทิ้ง อย่าง ค่อย เป็น ค่อย ไป ซึ่ง อาจ เป็น ผล มา จาก เส้น ทาง การ ค้า ที่ เปลี่ยน ไป และ การ ล่ม สลาย ของ สันนิบาต แรก."
 precursor.1046.desc:1 "ไม่ เป็น ที่ แน่ชัด ว่า สิ่ง มี ชีวิต ชนิด ใด ได้ จัด การ กับ กระดูก และ ซาก ฟอสซิล ของ โลก จาก สิ่ง มี ชีวิต ทุก ชนิด ที่ รู้ จัก กัน ว่า เป็น สมาชิก สันนิบาต แรก ได้ พบ บน แผ่น ดิน เหนียว[From.From.GetPlanetMoon]ในจํานวนที่เกือบเท่ากับ นักโบราณคดีของเรายังได้เก็บซากที่เหลือไว้ จากครึ่งโหลของการแข่งขัน ที่ไม่ใช่สมาชิกอย่างเป็นทางการ แต่ดูเหมือนจะมีความสุขกับ อภิสิทธิ์การค้าพิเศษ ในพื้นที่พรีสต์ลีก"
 precursor.1050.name:0 "สงคราม"
 precursor.1050.desc:0 "การ สู้ รบ ครั้ง ใหญ่ ระหว่าง กองทัพเรือ แห่ง สันนิบาต แรก กับ กอง เรือ อีก กอง หนึ่ง เกิด ขึ้น ไม่ ไกล จาก ที่ นี่ ราว ๆ สอง ล้าน ปี มา แล้ว. บ่อแรงโน้มถ่วงของ[From.GetName]ตั้งแต่ได้จับจํานวนมากของเศษที่เหลือจากการหมั้นครั้งนี้และซากของหลาย hulk ขนาดใหญ่สามารถพบบน[From.GetPlanetMoon]พื้นผิว"
 precursor.1051.desc:1 "นัก โบราณคดี ของ เรา ได้ ขุด พบ ซาก เรือ ดาว หลาย ลํา บน ผิว ของ เรือ§Y[From.From.GetName]§!วัตถุจากสมรภูมิอวกาศขนาดใหญ่ ที่เกิดขึ้นในระบบนี้ สองล้านปีที่ผ่านมา กอง กําลัง ที่ เกี่ยว ข้อง ด้วย คือ กอง เรือ รบ คู่ ที่ 2 และ ที่ 3 ของ กองทัพ เรือ แกรนด์ แกรนด์ แกรนด์ กองทัพเรือ แห่ง แรก การ ต่อ สู้ เพื่อ ให้ กอง เรือ รบ รวม กัน ของ ไรคิม เป็น สปีชีส์ นัก รบ ที่ เดิน ทาง มา จาก ฝั่ง ทะเล.\n\nสิ่ง ที่ เริ่ม ต้น ขณะ ที่ การ ต่อ สู้ เล็ก ๆ น้อย ๆ ทวี ความ รุนแรง ขึ้น อย่าง รวด เร็ว ใน การ รบ ของ กอง เรือ ที่ กําลัง วิ่ง อยู่ ซึ่ง มี เรือ หลาย ร้อย ลํา อยู่ ทั้ง สอง ฝั่ง. เป็น ไป ไม่ ได้ ที่ จะ บอก ว่า ด้าน ไหน ชนะ."
 precursor.1055.name:0 "คอมพลีเมนต์ลีก"
 precursor.1055.desc:0 "มี การ ค้น พบ ซาก ปรัก หัก พัง ของ เรือน จํา ขนาด ใหญ่§Y[From.GetName]§!โลกที่เป็นศัตรูนี้ดูเหมือนจะได้รับการทําหน้าที่เป็นชนิดของความมั่นคงสูงสุดบางอาณานิคมในลีกแรก เป็นหน่วยงานของรัฐ เรือนจํามีผู้กระทําความผิด จากทั่วทั้งพื้นที่ของลีก\n\nบันทึกการอยู่รอดระบุว่า นักโทษส่วนใหญ่มีความผิด ฐานก่อการจลาจล และอาชญากรรมอื่นๆ\"ธรรมชาติที่ไม่ปกติ\" ซาก ของ นัก โทษ บาง คน ที่ เป็น ฟอสซิล ยัง คง พบ ได้ ใน ที่ ซึ่ง เซลล์ เคย อยู่."
 precursor.1056.desc:1 "The archaeological mission to §Y[From.From.GetName]§! has uncovered evidence of what appears to be a failed escape attempt some distance south of the prison complex. A toppled utility vehicle from the prison was found behind a small cliff, and several kilometers beyond that the remains of several prisoners in stolen pressure suits were huddled together.\n\nThey seem to have died of asphyxiation when the oxygen supply in their suits ran out. For whatever reason, the prison authorities evidently saw no reason to collect the bodies."
 precursor.1060.name:1 "ป้องกัน[Owner.GetPreFTLUpper]โลก"
 precursor.1060.desc:1 "§Y[From.GetName]§!เคยมีคนอาศัยอยู่ในช่วงต้นของยุคบรอนซ์ ประมาณสองล้านปี น่าสนใจนะ[Root.GetName]นอกจากนี้ยังพบหลักฐานของโพสต์สังเกตที่ซ่อนอยู่ใน[From.GetPlanetMoon]ที่สร้างโดยลีกแรก ดูเหมือนว่าพวกเขาจะศึกษา[Owner.GetPreFTLLower]ในขณะที่เอเลี่ยนพยายามหลีกเลี่ยง การปนเปื้อนทางวัฒนธรรม\n\nเสาสังเกตส่วนใหญ่ถูกทําลายโดยอาวุธพลังงานชั้นสูง และเราไม่พบอะไรที่จะอธิบายว่าทําไม[Owner.GetPreFTLLower]อารยธรรมไม่เคยก้าวหน้าเกินยุคบรอนซ์"
 precursor.1061.desc:1 "จากการค้นพบทางโบราณคดีของเรา§Y[From.From.GetName]§!เราได้เรียนรู้ว่าลีกแรกรักษา นโยบายที่ชัดเจนเพื่อไม่แทรกแซงการพัฒนา อารยธรรม ก่อนอวกาศ โพสต์สังเกตการณ์ที่ซ่อนอยู่เหมือนที่เราพบในนี้[From.From.GetPlanetMoon]มี การ รักษา ไว้ อย่าง น้อย เจ็ด โลก ตลอด ทั่ว พื้น ที่ ของ สันนิบาต.\n\nอารยธรรมโดยเฉพาะนี้ดูเหมือนจะได้บรรลุ จุดสิ้นสุดเมื่อกลุ่มของทาส บุกในระหว่างการดูดฝุ่นพลังงาน ที่เป็นผลมาจากการล่มสลายของลีกแรก"
 precursor.1065.name:0 "บล็อกรูปออร์บิทัล"
 precursor.1065.desc:0 "§Y[From.GetName]§!อยู่ลึกภายในสิ่งที่ถือกันเป็น พื้นที่ลีกแรกสองล้านปีและดูเหมือนว่าได้รับ ทั้งอาณานิคมที่สําคัญหรือโลกของสายพันธุ์ที่ พรรณนาว่า\"ห้ามเข้ากลุ่ม\" ในประวัติการอยู่รอดของลีก\n\nสองพรรคดูเหมือนจะได้รับการเข้าร่วมในชนิดของสงครามการค้าบาง และกองทัพเรือของลีกยังคงการปิดล้อมอย่างกว้างขวางของ[From.GetPlanetMoon]อย่างน้อยสองโอกาส ซาก ปรัก หัก พัง บ่ง ชี้ ว่า มี การ ต่อ ต้าน อย่าง รุนแรง หลาย ครั้ง."
 precursor.1066.desc:1 "ทีม นัก โบราณคดี พบ ซาก ปรัก หัก พัง ของ ผู้ ทําลาย สันนิบาต แรก บน ผิว นอก ของ§Y[From.From.GetName]§!มันจะต้องเป็นส่วนหนึ่งของการปิดล้อมออร์บิทัล และดูเหมือนจะได้ลงไปเมื่อ[From.From.GetPlanetMoon]เอเลี่ยนพื้นเมือง จุดระเบิด ปฏิสสารที่ซ่อนอยู่ ของนักวิ่งที่ถูกจับ นักโบราณคดีได้เอาสําเนาบางส่วน ของธนาคารข้อมูลของผู้ทําลาย มาให้รายชื่อเรือพรีเมียร์ลีกทั้งหมด"
 precursor.1070.name:0 "ชื่อ=อุปกรณ์ชื่อ"
 precursor.1070.desc:0 "ดาว เคราะห์ น้อย ดวง นี้ ดู เหมือน จะ ใช้ เป็น เมือง ท่า ที่ ไร้ กฎหมาย สําหรับ องค์การ อาชญากร ต่าง ๆ ที่ ปฏิบัติ งาน ใน เขต ของ สันนิบาต แรก. นักค้าของเถื่อน โจรสลัด ทหารรับจ้าง และสิ่งมีชีวิตชั้นต่ําอื่น ๆ จากสมาชิกในลีกทุกสปีชีส์ มารวมกันที่นี่เพื่อขนของผิดกฎหมาย"
 precursor.1071.desc:1 "ภารกิจ ทาง โบราณคดี สําหรับ ดาว เคราะห์ น้อย§Y[From.From.GetName]§!ได้เปิดเผยเรื่องราวเกี่ยวกับยมโลกของอาชญากรรม ไปทั่วลีกแรก สองล้านปีที่ผ่านมา ขณะ ที่ ชาติ สมาชิก เปิด พรม แดน ให้ แก่ กัน และ กัน อาชญากรรม ก็ รุ่งเรือง เคียง ข้าง การ ค้า. ดู เหมือน ว่า การ ลักลอบ และ การ ทํา ร้าย ทาง เพศ เป็น ปัญหา ร้าย แรง ซึ่ง ครอบ ครอง กอง เรือ รบ ขนาด ใหญ่ ของ สันนิบาต."
 precursor.1100.name:0 "บ้านลีกแรกระบบดาวล็อคคาม"
 precursor.1100.desc:0 "หลังจากการศึกษาอย่างเข้มงวดของวัตถุที่กู้ได้ครั้งแรกของลีก นักวิทยาศาสตร์บน§Y[Root.Capital.GetName]§!ได้จัดการสรุปพิกัดที่แน่นอนของเฟ็ง ฮับบานิสระบบบ้านของพรีสต์ลีก! เราควรเริ่มเดินทางเข้าสู่ระบบนี้ ก่อนที่คนอื่นจะมาตีเรา"
 precursor.1101.name:0 "กองบัญชาการลีกแรก"
 precursor.1101.desc:1 "§Y[FromFrom.GetName]§!เป็นศูนย์บริหารของลีกแรก ตลอดส่วนใหญ่ของการดํารงอยู่ และทําหน้าที่เป็นที่นั่งของวุฒิสภาที่ดีของพวกเขา เดอะ[FromFrom.GetPlanetMoon]มีประชากรหนาแน่น มีเมืองครอบคลุมพื้นที่ส่วนใหญ่ของพื้นผิว ต้อง นํา อาหาร เข้า มา จาก โลก สมาชิก อื่น ๆ เพื่อ ค้ําจุน หลาย พัน ล้าน คน ที่ อาศัย อยู่ ใน นคร ใหญ่ มหึมา แห่ง นี้.\n\nเมื่อ สันนิบาต ล่ม สลาย การ ขน ส่ง อาหาร เหล่า นี้ ก็ ยุติ ลง เกือบ ชั่ว ข้าม คืน. คน เหล่า นั้น ที่ มี ราย ได้ จะ จาก โลก อื่น ไป แต่ ประชากร ส่วน ใหญ่ ยัง คง อยู่. ความอดอยากและความวุ่นวายเกิดขึ้นตามมา[FromFrom.GetPlanetMoon]ถูกแกะสลักระหว่างขุนศึกและองค์กรอาชญากรรม\n\nประชากรยังคงลดลงไปไม่กี่ศตวรรษ จนกระทั่งดาวเคราะห์ได้ถูกลดเหลือเพียงโลกผีไร้ชีวิตเพียงนิดเดียว -"
 precursor.1102.name:0 "การ ค้น พบ เมือง หลวง แห่ง แรก ของ สันนิบาต"
 precursor.1102.desc.a:0 "ในที่สุดเราก็ค้นพบเมืองหลวงของลีกโบราณ แต่น่าเสียดายที่เราสายเกินไป บางคนเพิ่งมาที่นี่ และทุกอย่างก็สูญสิ้น"
 precursor.1102.desc.b:1 "การสํารวจล่าสุดของเรา§Y[FromFrom.GetName]§!ได้เปิดเผยว่าโลกนี้ทําหน้าที่เป็นเมืองหลวงการบริหาร ของบางพันธมิตรระหว่างดวงดาวโบราณที่รู้จักกันเป็น\"ลีกแรก\" นักสํารวจคนอื่น ๆ ได้มาที่นี่เมื่อเร็วๆนี้ และโชคร้ายที่พวกเขาเลือก[FromFrom.GetPlanetMoon]ทําความสะอาดของมีค่า ก่อนที่พวกมันจะไป"
 precursor.1500.name:0 "คองคอร์ด ของ ไอ ราส เซีย"
 precursor.1500.desc:1 "เราได้ค้นพบวัตถุจาก เอเลี่ยนโบราณ§Y[From.GetName]§!จากที่เราได้แปลเพื่อให้ห่างไกลของภาษาของพวกเขาเราได้เรียนรู้ว่าคนต่างด้าวเหล่านี้เรียกตัวเองว่า\"ไอราเซียน คอนคอร์ด\" พวกเขามีอํานาจระหว่างดวงดาว ที่ยึดอํานาจมากกว่าภูมิภาคนี้ ของกาแล็กซี่ น้อยกว่าล้านปีที่ผ่านมา\n\nพวกเขาดูเหมือนจะมีสัตว์เลี้ยงลูกด้วยนม 6 ตัว และมีการอ้างอิงหลายครั้ง ถึงโรคระบาดบางชนิด ที่เรียกว่า \"ยาเจี้ยนพอกซ์\""
 precursor.1505.name:0 "โลก ที่ ถูก แบ่ง แยก"
 precursor.1505.desc:0 "§Y[From.GetName]§!ครั้ง หนึ่ง เคย เป็น อาณานิคม ของ ชาว อิ รา ส เซีย ขนาด ใหญ่ ซึ่ง แสดง ถึง ทั้ง การ พัฒนา อุตสาหกรรม และ การ ปรับ ตัว. เช่นเดียวกับในโลกอื่น ๆภาษาอิราเซียนซากฟอสซิลบอกเล่าเรื่องราวที่สั่นคลอน - ประชากรอย่างรวดเร็วยอมจํานนเพื่อพ็อกซ์จาโวเรียนและดูเหมือนจะมีความตื่นตระหนกแพร่หลายในทั้งหมด[From.GetPlanetMoon]การตั้งถิ่นฐานที่สําคัญ นอก จาก นี้ ยัง มี ซาก ปรัก หัก พัง มาก มาย ผิด ปกติ ใน วง โคจร ซึ่ง อาจ เป็น ซาก ปรัก หัก พัง ของ การ ต่อ สู้."
 precursor.1506.desc:1 "เราได้วิเคราะห์เศษออร์บิทัล และนักโบราณคดีของเราสรุปว่า§Y[From.From.GetName]§!ก่อนและระหว่างการเสียชีวิตของอาณานิคมอิราเซียน กองเรืออิหร่านมีคําสั่งเข้มงวดในการกักกัน[From.From.GetPlanetMoon]ในความพยายามที่ไร้ประโยชน์ที่จะบรรจุพ็อกซ์จาโวเรียนเรือ พลเรือน อย่าง น้อย สิบ สอง ลํา พยายาม จะ ทําลาย กําแพง เมือง และ แม้ ว่า จะ มี การ ต่อ สู้ อย่าง หนัก แต่ บาง ลํา ก็ ประสบ ความ สําเร็จ."
 precursor.1510.name:0 "โลก ที่ เป็น มลทิน"
 precursor.1510.desc:0 "เห็นได้ชัดเลยว่า§Y[From.GetName]§!อาณานิคมอิราเซียนโบราณ เคยตกเป็นเหยื่อของการระเบิดของออร์บิทัล ปล่อง ภูเขา ไฟ ขนาด ใหญ่ ยัง คง มอง เห็น ได้ จาก อวกาศ ที่ ซึ่ง[From.GetPlanetMoon]ศูนย์รวมประชากรที่เคยเป็นประมาณ 1.2 ล้านปีก่อน\n\nผู้ รอด ชีวิต ไม่ กี่ คน จาก การ ทิ้ง ระเบิด ใน ตอน แรก ดู เหมือน จะ ยอม แพ้ ไม่ นาน หลัง จาก นั้น ไป ยัง เกาะ จา โว เรียน พอกซ์ ซึ่ง ตอน นั้น กําลัง ทําลาย โลก ส่วน ใหญ่ ของ ชาว อิ รา ส เซีย."
 precursor.1511.desc:1 "การ สํารวจ ทาง โบราณคดี ของ เรา ได้ พบ บันทึก การ สื่อสาร จาก ซาก ปรัก หัก พัง ของ เสา ฟัง บน§Y[From.From.GetName]§!มันแสดงให้เห็นเนื้อหาของการส่ง ระหว่างผู้บัญชาการของกองเรืออิรักในวงโคจร และสํานักงานใหญ่ของกองทัพเรือของพวกเขาบนอิรัก ผู้บัญชาการคําถามคําสั่งที่\"ดําเนินการ\" อาณานิคมของชีวิตทั้งหมด เพื่อป้องกันการแพร่กระจายของไพ x แม้ ว่า การ บันทึก จะ สิ้น สุด ลง ก่อน ที่ ประเด็น จะ ถูก แก้ไข แต่ ดู เหมือน ว่า มี การ ทํา ตาม คํา สั่ง นั้น."
 precursor.1515.name:0 "โลก ใน จ็ อก กา"
 precursor.1515.desc:0 "นี่[From.GetPlanetMoon]เป็นโลกบ้านเกิดของจ็อกกราสายพันธุ์ลูกค้าที่พ่ายแพ้ของภาษาอิราเซียนคอนคอร์ด การ ค้น พบ นี้ ทํา ให้ พวก เขา ได้ รับ ความ นิยม อย่าง มาก.\n\nมี หลัก ฐาน บน ผิว นอก ว่า กอง ทหาร ไอ รา ส เซีย ที่ มี ขนาด พอ จะ เทียบ ได้ เคย ประจํา การ อยู่ ที่ นั่น หลาย สิบ ปี หลัง จาก นั้น บ่ง ชี้ ว่า โจ กรา ไม่ พอ ใจ ที่ จะ อยู่ ภาย ใต้ แอก ของ อิ รา เชีย น."
 precursor.1516.desc:1 "พบจดหมายของจอกรานสับสเปซบน§Y[From.From.GetName]§!ซึ่งดูเหมือนจะถูกส่งไปยังโลกบ้านเกิดของคอน ส แตน ตินสายพันธุ์อื่น ๆ ของ:\n\n§S§!เวลาโจมตีทรราชมาถึงแล้ว เอเย่นต์ของเราได้เรียนรู้ว่า พวกเจโวเรียน พอกซ์ มีผลกระทบเฉพาะพวกอิรักอ่อนแอ ความพยายามทุกประการจะต้องมีการแทรกซึมเข้ามาในโลกของพวกเขา สถานีอวกาศของพวกเขา เรือของพวกเขา แม้กระทั่งพวกเขา\n\nใน ที่ สุด พวก อิ รา ส เตอร์ ก็ พบ กับ ศัตรู ซึ่ง ไม่ อาจ ทํา ให้ ต่ํา ลง ได้ เนื่อง จาก ดาว ที่ เรือง แสง. โดย ♪ที่ไม่สามารถเข้าใจได้♪ โอกาสนี้จะต้องไม่หมด!\"§!"
 precursor.1520.name:0 "The Ti'Derg Homeworld"
 precursor.1520.desc:0 "§Y[From.GetName]§!เป็นโลกของทิ'เดิร์กประมาณ 1.2 ล้านปีที่ผ่านมา ลูกค้าสปีชีส์ของคอน ส แตน ตินพวกเขาคืออาร์ทโรโฟรอยด์ที่มีปีก และพบซากฟอสซิล แสดงให้เห็นว่าพวกเขาสามารถบินได้น้อยที่สุด\n\nแต่น่าเสียดายที่มีเหลือน้อยของอารยธรรมนี้เป็น[From.GetPlanetMoon]ดูเหมือนว่าจะถูกระเบิดจากออร์บิทัลขนาดใหญ่"
 precursor.1521.desc:1 "การศึกษาของเราเกี่ยวกับซากของเอเลี่ยน§Y[From.From.GetName]§!ได้เสนอความเข้าใจใหม่กับเรา ในช่วงเวลาสุดท้ายของการคองคอร์ดภาษาอิราเซียนชาวอิราเซี่ยนเชื่อว่าเดอะทิ'เดิร์ก เป็นส่วนหนึ่งของแผนการร่วมกัน กับสัตว์อื่น ๆ ของลูกความของคองคอร์ด\n\nไม่ว่ามันจะจริงหรือไม่ เราไม่มีทางรู้ แต่กองเรืออิรักรู้สึกว่าหลักฐาน[From.From.GetPlanetMoon]จากวงโคจร"
 precursor.1525.name:0 "คอนีตาย"
 precursor.1525.desc:0 "§Y[From.GetName]§!แสดงถึงสัญญาณของการเป็นอาณานิคมของไอราเซียนที่เจริญรุ่งเรือง จนกระทั่งประมาณ 1,200,000 ปีก่อน เมื่ออายุของพวกเขา ซากปรักหักพังที่ค้นพบเพื่อให้ห่างไกล[From.GetPlanetMoon]ผิวของมันอยู่ในสภาพที่ดี ไม่มีสัญญาณของการระเบิดของออร์บิทัล หรือความขัดแย้งติดอาวุธ\n\nชาว อิ รา ส เซีย ดู เหมือน จะ ยอม แพ้ แก่ โขด หิน ของ ชาว จาโว เรียน หลัง จาก นั้น เห็ด พื้น เมือง ที่ ก้าวร้าว ได้ ยึด เมือง ที่ ไร้ ชีวิต นั้น คืน มา และ ซ่อน ไว้ ใต้ ชั้น พืช พรรณ หนา ทึบ."
 precursor.1526.desc:1 "หลังจากกําจัดพืชออกจากถิ่นอาศัยของชาวอิราเซียนโบราณ§Y[From.From.GetName]§!และ ตั้ง เครื่อง กําเนิด พลัง งาน เพื่อ ให้ สัตว์ ล่า เหยื่อ อยู่ ใน อ่าว นัก โบราณคดี ของ เรา ได้ ขุด ค้น ซาก ปรัก หัก พัง อย่าง ละเอียด. ปัจจุบัน เรา มี ความ เข้าใจ ที่ ดี ขึ้น มาก เกี่ยว กับ ชีวิต ประจํา วัน ใน สังคม อิ รา ส เซีย.\n\nใน บรรดา สิ่ง ที่ มี ค่า ที่ สุด ที่ พบ ก็ คือ แอท ลาส ดิจิตอล ซึ่ง ดู เหมือน ว่า เคย ใช้ สอน เด็ก ชาว อิ รา ส เซีย เกี่ยว กับ จักรวรรดิ ของ พวก เขา. มันยังมีรายละเอียด และรายละเอียดเกี่ยวกับ สายพันธุ์ลูกความของคอนคอร์ด"
 precursor.1530.name:0 "ฐาน ทํา เหมือง ของ ชาว ไอ รา เซีย"
 precursor.1530.desc:0 "หลุมลึกหลายหลุมบนพื้นผิวของ§Y[From.GetName]§!ทั้งหมดยังคงอยู่ ของการดําเนินการเหมืองแร่ในอิหร่าน ที่ดําเนินอยู่ในโลกนี้ ประมาณ 1.2 ล้านปีที่ผ่านมา เดอะ[Root.GetName]ได้ทําการสแกนอย่างละเอียดแล้ว แต่เรายังหาซาก ของโรงงานเหมืองแร่อื่นๆไม่ได้"
 precursor.1531.desc:1 "หลังจากตรวจสอบรูเจาะ§Y[From.From.GetName]§!นักโบราณคดีของเราพบซากฟอสซิล ของคนงานชาวอิราเซียนกว่าร้อยคน ที่อยู่ใต้ซากเหล่านั้น พวก เขา ดู เหมือน จะ เป็น เหยื่อ ของ โพลซ์ ของ พวก จา โว เรียน มาก ขึ้น ซึ่ง ทํา ให้ เกิด การ ล่ม สลาย ของ คองคอร์ด ของ พวก อิ รา เชีย น. ในความพยายามที่ไร้ประโยชน์เพื่อป้องกันการแพร่กระจายของโรค สหายของพวกเขาทิ้งศพลงหลุมหนึ่งก่อนที่จะ[From.From.GetPlanetMoon]มีการอพยพ"
 precursor.1535.name:0 "โค โลนี"
 precursor.1535.desc:0 "§Y[From.GetName]§!เป็นอาณานิคมอิราเซียนรุ่นเยาว์ ที่เพิ่งก่อตั้งขึ้นในช่วงที่พวกมันสูญพันธุ์ เราพบซากปรักหักพังของการตั้งถิ่นฐานเดียวและท่าเรือใน[From.GetPlanetMoon]ซีกโลกเหนือ เมื่อ พิจารณา จาก ซาก ฟอสซิล โลก นี้ ดู เหมือน ว่า เป็น หนึ่ง ใน บรรดา ซาก ปรัก หัก พัง ของ เกาะ จา โว เรียน ที่ ทําลาย พื้น ที่ ของ อิ รา ส เซีย."
 precursor.1536.desc:1 "นักโบราณคดีของเรา§Y[From.From.GetName]§!ได้ค้นพบสิ่งที่น่าตกใจ หลัก ฐาน ทุก อย่าง ชี้ ชัด ถึง ข้อ เท็จ จริง นี้[From.From.GetPlanetMoon]เป็นที่มาของเกาะจาโวเรียน\n\nแบคทีเรีย พื้น เมือง รูป แบบ หนึ่ง ซึ่ง หา ยาก จะ เข้า ไป ใน นิคม ของ ชาว อิ รา ส เซีย เนื่อง จาก มี การ ผลิต ข้อ บกพร่อง ใน ตรา กัก กัน และ จาก ที่ นั่น แบคทีเรีย ก็ แพร่ กระจาย ไป ยัง เครื่อง กรอง อากาศ ของ เรือ สินค้า ที่ มา เยือน. เนื่อง จาก โรค นี้ แพร่ ระบาด ใน อัตรา ที่ ไม่ เคย มี มา ก่อน จึง ไม่ ต้อง สงสัย ว่า พวก อิ รา ส เชีย น เอง เคย มี เวลา เรียน รู้ มา ก่อน หรือ ไม่."
 precursor.1540.name:0 "เรือ ไอ รา เชีย น"
 precursor.1540.desc:0 "ยานลาดตระเวนที่เสื่อมโทรมภาษาอิราเซียนถูกลืมมากว่าล้านปีในวงโคจรใกล้§Y[From.GetName]§!เรือหมุนช้า แสดงให้เห็นว่าไม่มีสัญญาณชัดเจน ของความเสียหายของอาวุธ และฝักหลบหนีทั้งหมดยังคงนับสําหรับ ดัง ที่ คาด หมาย ได้ ไม่ มี สัญญาณ ใด ๆ จาก ภาย ใน ตัว เรือ."
 precursor.1541.desc:1 "ภายในยานไอราสเซียน§Y[From.From.GetName]§!บรรจุซากศพของลูกเรือทั้งหมด พวก เขา ส่วน ใหญ่ เสีย ชีวิต เนื่อง จาก โพลซ์ ของ พวก จา โว เรียน ซึ่ง ต่อ มา จะ ทํา ให้ พวก อิ รา ส เชีย น สูญ พันธุ์ แต่ ลูก เรือ บาง คน ถูก ทหาร รักษา การ ทาง ทะเล ยิง ลง ขณะ ที่ พยายาม จะ ไป ถึง ฝัก หลบ หนี. ตามแฟ้มบันทึกที่กู้มาได้ กัปตันมีคําสั่งที่เข้มงวด ให้กักกันยานไว้ หลังจากเกิดโรคระบาด"
 precursor.1545.name:0 "การ ควบคุม โรค"
 precursor.1545.desc:0 "Deis จากสิ่งที่จะต้องได้รับการติดตั้งขนาดใหญ่ ออร์บิทัลได้รับการค้นพบด้านบน§Y[From.GetName]§!กรมศิลปากรที่กู้ได้ในหมู่ซากปรักหักพัง ได้ยืนยันแล้วว่าสถานีอวกาศนี้ ทําหน้าที่เป็นสํานักงานใหญ่ของคอน ส แตน ติน\n\nพวกอิหร่านปรับตัวกับโรคของเอเลี่ยนได้ง่ายกว่าสายพันธุ์ที่รู้จักกันมากที่สุด และงบประมาณของสถาบันสาธารณสุขของพวกเขา เกือบเทียบกับของทหารของพวกเขา ทั้ง ๆ ที่ เป็น เช่น นี้ ก็ ตาม บันทึก ที่ รอด ชีวิต แสดง ว่า สัตว์ ชนิด ต่าง ๆ ทั้ง หมด ของ พวก เขา เสีย ชีวิต จาก ป็อกซ์ ของ จา โว เรียน."
 precursor.1546.desc:1 "เราได้ค้นพบเศษของบันทึกการวิจัยหลายชิ้น จากสนามขยะด้านบน§Y[From.From.GetName]§!รายการสุดท้ายของพวกเขา ล้วนมุ่งเน้นไปที่ การหาทางรักษาให้ยาเจโวเรียน พอกซ์ ที่กวาดไปทั่ว คองคอร์ดของไอราเซียน\n\nรายการ สุด ท้าย ที่ ลง มา เผย ให้ เห็น ว่า ปลัก ได้ แพร่ ไป ใน แฟชั่น ที่ ควบคุม ไม่ ได้ บน สถานี อวกาศ เอง. รายละเอียดที่แนบมาทั้งหมดของพวกเขาล้มเหลว ในการผลิตการรักษาในความหวังที่ไร้สาระ ว่าข้อมูลจะมีประโยชน์"
 precursor.1550.name:0 "เอสเตอร์รอยด์โพสต์"
 precursor.1550.desc:0 "สถานีฟังของกองทัพไอราเซียนเล็ก ๆ ได้ถูกสร้างขึ้นเป็น ส่วนที่กลวงของดาวเคราะห์น้อยนี้ภายใน มันมีเครื่องตรวจจับที่มีประสิทธิภาพมากมาย ซึ่งดูเหมือนจะมุ่งไปที่ระบบเพื่อนบ้าน ไม่ มี ใคร ทํา งาน ได้ เลย และ ดู เหมือน ว่า ดาว เคราะห์ น้อย ได้ ผ่าน ไป แล้ว และ ถูก ปล้น อย่าง น้อย หนึ่ง ครั้ง โดย อีก กลุ่ม หนึ่ง."
 precursor.1551.desc:1 "เราได้เรียนรู้ว่าชาวอิราเซียนใช้จุดฟังบนดาวเคราะห์น้อย[From.From.GetName]เพื่อสอดแนมและวางแผนโจมตี อารยธรรมเพื่อนบ้านในช่วงการขยายตัวของจักรวรรดิของพวกเขา การ โจมตี เหล่า นี้ ประสบ ความ สําเร็จ อย่าง น่า ทึ่ง และ ไม่ นาน ชาว อิ รา ซี น ก็ กลาย เป็น มหาอํานาจ ที่ มี อิทธิพล ใน ภูมิภาค นี้ ของ กาแล็กซี. เมื่อ ถึง ตอน ที่ พวก เขา ถูก กองทัพ ไอ ราส ทอด ทิ้ง โดย กอง ทหาร ของ จา โว เรียน."
 precursor.1555.name:0 "สถานี วิทยาศาสตร์ ยักษ์ แก๊ส"
 precursor.1555.desc:0 "ซาก ปรัก หัก พัง ของ ซาก ปรัก หัก พัง ที่ เคย เป็น ของ สถานี วิจัย ไอ รา ซี อัน ใหญ่ โต§Y[From.GetName]§!ว่าสิ่งที่ชาวอิราเซียนทําวิจัยที่นี่ ยังคงไม่ชัดเจน แต่เครื่องมือของพวกเขาดูเหมือนจะมุ่งไปที่ก๊าซยักษ์เอง"
 precursor.1556.desc:1 "การ วิเคราะห์ ซาก ปรัก หัก พัง ของ ออร์บิทัล อิ รา เชีย น ที่ ถูก ค้น พบ ข้าง บน§Y[From.From.GetName]§!ได้ให้คําตอบไม่กี่อย่าง แต่เรามีความคิดบางอย่าง ว่านักวิทยาศาสตร์ของพวกเขาศึกษาอะไร ในสถานีวิจัยของพวกเขา การกู้บันทึกทําให้อ้างอิง ถึงชนิดของวัตถุเทียม บางลอยลึก ภายในยักษ์ ก๊าซ บรรยากาศบด\n\nเดอะ[Root.GetName]ไม่ พบ ร่อง รอย ของ วัตถุ ดัง กล่าว แม้ ว่า จะ มี การ สแกน ใน บรรยากาศ ซ้ํา แล้ว ซ้ํา อีก ดัง นั้น ใน ที่ สุด พวก อิ รา ส เชีย น ก็ สามารถ นํา สิ่ง นั้น กลับ มา ได้ หรือ ไม่ ก็ มี คน อื่น ทํา ใน ช่วง เวลา นับ ไม่ ถ้วน นับ ตั้ง แต่ ที่ มัน ตาย ไป."
 precursor.1600.name:0 "บ้าน ของ ชาว อิหร่านระบบดาวล็อคคาม"
 precursor.1600.desc:0 "หลังจากการศึกษาอย่างเข้มงวด เกี่ยวกับวัตถุที่ชาวอิราเซียนค้นพบ นักวิทยาศาสตร์บน§Y[Root.Capital.GetName]§!ได้จัดการสรุปพิกัดที่แน่นอนของไอราส - ระบบบ้านของอารยธรรมอิหร่านโบราณ! เราควรเริ่มเดินทางเข้าสู่ระบบนี้ ก่อนที่คนอื่นจะมาตีเรา"
 precursor.1601.name:0 "แผ่น ดิน โลก ของ ชาวภาษาอิราเซียน"
 precursor.1601.desc:1 "อิราเชีย -บ้านเกิดเดิมของคอน ส แตน ตินบางคนได้ค่อนข้างเร็ว ๆ นี้ (ร่วมกับเมื่อ 2,000 ปีที่ผ่านมา) ผ่านปัญหาของการทิ้งระเบิดอย่างเป็นระบบทุกตารางเมตรของ[FromFrom.GetPlanetMoon]'พื้นผิวจากวงโคจร' - อาจเป็นการเข้าใจผิดที่พยายามกันจาโวเรียนพอกซ์ออกจากเรเซอร์\n\nแม้ จะ เป็น เช่น นี้ ก็ ตาม พื้น ผิว ก็ ยัง คง ปก คลุม ไป ด้วย ซาก ฟอสซิล ของ ชาว อิ รา ซี หลาย พัน ล้าน คน ที่ ยอม จํานน ต่อ กาฬโรค ใน ช่วง ปี สุด ท้าย ของ จักรวรรดิ. เมื่อเวลามันได้แพร่กระจายไปยังโลกบ้านเกิดของพวกเขา ส่วนใหญ่ของโลกในภาษาอิราเซียนคอนคอร์ด ได้ลดลงแล้ว\n\nเมื่อ พิจารณา จาก บันทึก การ ใช้ ดาว เทียม โบราณ ที่ ค้น พบ จาก วง โคจร ความ รู้สึก ใน ท่ามกลาง ประชากร บน แผ่น ดิน โลก ที่ เป็น บ้าน ของ ชาว อิ รา ส เซีย ส่วน ใหญ่ ถูก ปล่อย ออก มา โดย จุด นี้. ความ ตื่น ตระหนก ที่ แพร่ หลาย ซึ่ง เกิด ขึ้น พร้อม กับ การ ระบาด ครั้ง แรก ของ โรค พอก ใน อาณานิคม ส่วน ใหญ่ ไม่ ได้ อยู่ ที่ นั่น เพราะ คน ส่วน ใหญ่ ยอม รับ ข้อ เท็จ จริง ที่ ว่า อวสาน ใกล้ เข้า มา แล้ว."
 precursor.1602.name:0 "พบดาวบ้านเกิดของชาวอิรัสเซียน"
 precursor.1602.desc.a:0 "ที่นี่คืออิรัสเซีย หรืออย่างน้อยก็เป็นสิ่งที่หลงเหลืออยู่ของเมืองหลวงอันน่าภาคภูมิใจในอดีตของสมาพันธรัฐอิรัสเซียน หากมีสิ่งประดิษฐ์ใดๆ รอดพ้นจากการทำลายล้างของดาวบ้านเกิดชาวอิรัสเซียนมาได้ ก็คงมีคนอื่นชิงตัดหน้าเอาไปเสียก่อนแล้ว—มีร่องรอยเด่นชัดว่าเพิ่งมีคนมาเยือนที่นี่เมื่อไม่นานมานี้"
 precursor.1602.desc.b:1 "ดาวดวงนี้เคยมีชีวมณฑลอันอุดมสมบูรณ์ จนกระทั่งมันถูกลบหายไปจากการระดมยิงวงโคจรครั้งมโหฬาร การสำรวจระบุว่า [FromFrom.GetPlanetMoon] นี้เคยเป็นเมืองหลวงของอารยธรรมโบราณที่รู้จักกันในนาม "สมาพันธรัฐอิรัสเซียน" เราได้เรียนรู้สิ่งอื่นเพียงน้อยนิด เนื่องจากนักสำรวจคนอื่นๆ ได้กวาดเอาทุกสิ่งที่มีค่าไปหมดแล้ว"
 precursor.2000.name:0 "ไซเบรกซ์"
 precursor.2000.desc:1 "เราได้กู้คืนสิ่งประดิษฐ์จากอารยธรรมเอเลี่ยนโบราณบน §Y[From.GetName]§!! น่าเหลือเชื่อที่อารยธรรมนี้ ซึ่งเรียกตัวเองว่า "ไซเบรกซ์" ดูเหมือนจะประกอบด้วยเครื่องจักรที่เชื่อมต่อกันในลักษณะจิตสำนึกร่วม อายุของสิ่งประดิษฐ์บ่งชี้ว่าพวกมันเคยทำงานอยู่เมื่อประมาณ 600,000 ปีก่อน—อย่างน้อยก็ในพื้นที่ส่วนนี้ของกาแล็กซี—แต่เรายังไม่ได้เรียนรู้สิ่งใดเกี่ยวกับต้นกำเนิดที่แท้จริงของพวกมันเลย\n\nจากข้อมูลบางส่วนที่นักวิทยาศาสตร์ของเราสามารถสกัดออกมาจากสิ่งประดิษฐ์ชิ้นหนึ่ง ดูเหมือนว่าไซเบรกซ์ได้เริ่มทำสงครามครูเสดเพื่อทำลายล้างสิ่งมีชีวิตอินทรีย์ที่มีภูมิปัญญาในกาแล็กซีทั้งหมดด้วยเหตุผลที่ไม่อาจทราบได้"
 precursor.2005.name:0 "ดาวบ้านเกิดคูร์"
 precursor.2005.desc:0 "§Y[From.GetName]§! เคยเป็นดาวบ้านเกิดของชาวคูร์โบราณ อารยธรรมเอเลี่ยนที่ถูกไซเบรกซ์กวาดล้างไปเมื่อราว 600,000 ปีก่อน [From.GetPlanetMoon] นี้ถูกพวกเครื่องจักรทำเหมืองแบบขุดเปิดจนหมดสิ้น และซากปรักหักพังที่กระจัดกระจายเพียงไม่กี่แห่งคือทั้งหมดที่หลงเหลือจากอารยธรรมคูร์ ส่วนที่เหลือได้รับการบดขยี้จนกลายเป็นผงธุลี"
 precursor.2006.desc:1 "เราได้เรียนรู้ว่า §Y[From.From.GetName]§! คือจุดกำเนิดของไซเบรกซ์ เครื่องจักรที่มีภูมิปัญญาบางชนิดถูกสร้างขึ้นโดยผู้อยู่อาศัยดั้งเดิมของ [From.From.GetPlanetMoon] ซึ่งก็คือชาวคูร์ แม้ว่ารายละเอียดเกี่ยวกับการเกิดขึ้นของมันจะไม่เป็นที่ทราบแน่ชัด แต่ในท้ายที่สุดมันส่งผลให้เกิดจิตสำนึกเครื่องจักรรวมกลุ่มขนาดใหญ่—นั่นคือ ไซเบรกซ์\n\nเมื่อถึงจุดหนึ่ง พวกมันได้หันมาเล่นงานชาวคูร์ เข่นฆ่าประชากรบนดาวบ้านเกิดของตนในสงครามระยะสั้นแต่เต็มไปด้วยการทำลายล้าง ซึ่งทำลายล้างชีวมณฑลของ [From.From.GetPlanetMoon] ไปจนเกือบหมดสิ้น จากนั้นตามมาด้วยการกวาดล้างอาณานิคมของชาวคูร์ในระบบดาวข้างเคียงอย่างเป็นระบบ จนกระทั่งอารยธรรมของพวกเขาสูญสิ้นไป"
 precursor.2010.name:0 "ดาวบ้านเกิดอินดิแมก"
 precursor.2010.desc:0 "§Y[From.GetName]§! เดิมทีเป็นดาวบ้านเกิดของชาวอินดิแมก อีกหนึ่งเหยื่อจากการขยายตัวอย่างไม่ลดละของไซเบรกซ์ [From.GetPlanetMoon] ถูกระดมยิงจากวงโคจรจนกระทั่งชาวอินดิแมกยอมจำนน จากนั้นร่างสงครามไซเบรกซ์จึงลงมายังพื้นผิวและเริ่มโครงการกวาดล้างประชากรอินดิแมกซึ่งกินเวลายาวนานถึงสามปี\n\nนอกเหนือจากการเสียชีวิตของชาวอินดิแมกเจ็ดพันล้านคนแล้ว สิ่งนี้ยังส่งผลให้สิ่งมีชีวิตของ [From.GetPlanetMoon] ถูกทำลายไปประมาณ 97%"
 precursor.2011.desc:1 "ชีวมณฑลของ §Y[From.From.GetName]§! เพิ่งจะเริ่มฟื้นตัวจากการรุกรานของไซเบรกซ์เมื่อ 600,000 ปีก่อน เราพบซากปรักหักพังที่รกชัฏของโรงงานไซเบรกซ์ ซึ่งทาสชาวอินดิแมกถูกบังคับให้มีส่วนร่วมในการทำลายล้างเผ่าพันธุ์ของตนเองด้วยการสร้างเครื่องจักรสงคราม เมื่อโครงการกวาดล้างใกล้จะเสร็จสิ้น ไซเบรกซ์ก็ได้ "ถอดชิ้นส่วน" แรงงานทาสที่เหลืออยู่และรื้อถอนโรงงานออกไป\n\nแม้ว่าในตอนแรกพวกมันจะยังคงดำเนินงานเหมืองแร่ขนาดใหญ่บน [From.From.GetPlanetMoon] แต่ดูเหมือนว่าในภายหลังไซเบรกซ์ได้ถอนตัวออกจากระบบดาวทั้งหมดด้วยเหตุผลที่ไม่อาจทราบได้"
 precursor.2015.name:0 "ร่างสงครามไซเบรกซ์ที่พังเสียหาย"
 precursor.2015.desc:0 "มีการพบซากปรักหักพังของร่างสงครามไซเบรกซ์สองร่างในวงโคจรรอบ §Y[From.GetName]§! พวกมันดูเหมือนจะถูกทำลายในการต่อสู้ แต่กลับไม่พบเศษซากจากคู่ต่อสู้ของพวกมันเลย ไม่ว่าพวกมันจะเสียเปรียบอย่างมาก หรือการปะทะกันครั้งนี้มีเบื้องลึกเบื้องหลังมากกว่าที่เห็น"
 precursor.2016.desc:1 "หลังจากศึกษาซากปรักหักพังของร่างสงครามไซเบรกซ์ทั้งสองเหนือ §Y[From.From.GetName]§! เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] สรุปว่าพวกมันน่าจะถูกทำลายขณะต่อสู้กันเอง ทฤษฎีนี้อธิบายถึงการไม่มีเศษซากที่ไม่ใช่ของไซเบรกซ์ และสอดคล้องกับรูปแบบความเสียหายที่พบบนซากเรือ\n\nอย่างไรก็ตาม เหตุใดเรือไซเบรกซ์ทั้งสองลำจึงหันมารบกันเองยังคงเป็นปริศนา หลังจากที่พวกมันไม่สามารถขับเคลื่อนได้ ร่างสงครามทั้งสองได้เปิดใช้งานกลไกทำลายตัวเองบางอย่างที่แผดเผาหน่วยประมวลผลประสาทของพวกมัน"
 precursor.2020.name:0 "การรุกรานของไซเบรกซ์"
 precursor.2020.desc:0 "สงครามภาคพื้นดินครั้งใหญ่เกิดขึ้นบน §Y[From.From.From.GetName]§! เมื่อไซเบรกซ์บุกโจมตี [From.From.From.GetPlanetMoon] เมื่อกว่า 600,000 ปีก่อน ชื่อของเผ่าพันธุ์เอเลี่ยนที่ต่อสู้กับพวกมันไม่ได้หลงเหลือรอดพ้นผ่านกาลเวลามาได้ แต่ดูเหมือนว่าพวกเขาจะต้านทานอย่างเหนียวแน่น สามารถพบเครื่องจักรสงครามไซเบรกซ์ที่พังเสียหายได้ทั่ว [From.From.From.GetPlanetMoon] และเศษซากจากกองเรือรุกรานของพวกมันยังคงลอยเคว้งคว้างอยู่ในวงโคจร"
 precursor.2021.desc:1 "หลังจากการบุกโจมตีช่วงแรกบน §Y[From.From.GetName]§! ตกอยู่ในภาวะชะงักงันเนื่องจากความเหนียวแน่นเหนือก้าวคิดของฝ่ายป้องกัน [From.From.GetPlanetMoon] ดูเหมือนว่าไซเบรกซ์จะถอนกำลังกลับขึ้นสู่วงโคจรเพื่อทบทวนทางเลือกของตนใหม่\n\nทางออกของพวกเขาสำหรับปัญหานี้คือการนำทางอุกกาบาตขนาดใหญ่สองลูกให้พุ่งชน [From.From.GetPlanetMoon] แรงปะทะได้ทำลายอุตสาหกรรมและโครงสร้างพื้นฐานส่วนใหญ่ที่ไซเบรกซ์คำนวณไว้ว่าจะนำมาปรับใช้เพื่อประโยชน์ของตนเอง แต่นี่ถือเป็นความสูญเสียที่จำเป็นเพื่อทำลายภาวะชะงักงันดังกล่าว"
 precursor.2025.name:0 "ซากโบราณสถานไซเบรกซ์"
 precursor.2025.desc:0 "§Y[From.GetName]§! แสดงร่องรอยของการเคยเป็นดาวที่พัฒนาอย่างหนักหน่วงโดยไซเบรกซ์ ด้วยประสิทธิภาพอันเป็นเอกลักษณ์ของพวกมัน พวกเครื่องจักรได้ทำเหมืองอย่างถอนรากถอนโคนบน [From.GetPlanetMoon] และพบซากของกลุ่มโรงงานขนาดใหญ่ได้ในซีกโลกทั้งสองข้าง แต่น่าแปลกใจที่บริเวณสี่เหลี่ยมผืนผ้าขนาดใหญ่ใกล้กับเส้นศูนย์สูตรกลับถูกทิ้งไว้โดยแทบไม่มีการแตะต้องใดๆ"
 precursor.2026.desc:1 "พฤติกรรมที่เปลี่ยนไปอย่างน่าประหลาดใจจากเดิม ดูเหมือนไซเบรกซ์จะจัดตั้งพื้นที่เขตอนุรักษ์ขนาดใหญ่บน [From.From.GetName] ซึ่งเปิดโอกาสให้สิ่งมีชีวิตอินทรีย์ที่มีภูมิปัญญาได้อยู่อาศัยโดยไม่มีการรบกวนใดๆ\n\nแม้ว่าจะถูกเฝ้าจับตาอย่างใกล้ชิด แต่ไซเบรกซ์ก็ปล่อยให้ผู้พักอาศัยพัฒนาไปตามธรรมชาติ แม้กระทั่งยามที่เกิดสงครามกลางเมืองอันโหดร้ายระหว่างฝ่ายอินทรีย์จนทำให้พื้นที่อนุรักษ์เกือบไร้ผู้คน หลังจากผ่านไปหลายศตวรรษ จู่ๆ ไซเบรกซ์ก็ละทิ้ง [From.From.GetPlanetMoon] ไป และประชากรที่เหลืออยู่ในเขตอนุรักษ์ก็ค่อยๆ ล้มหายตายจากไปในที่สุด"
 precursor.2030.name:0 "สถานีดักฟังไซเบรกซ์"
 precursor.2030.desc:0 "แท้จริงแล้ว §Y[From.GetName]§! เป็นสิ่งก่อสร้างประดิษฐ์ที่ถูกอำพรางไว้อย่างแนบเนียนด้วยชั้นหินบางๆ เพื่อให้ดูเหมือนเป็นดาวเคราะห์น้อย ภายในที่กลวงเป็นที่ตั้งของสถานีดักฟังไซเบรกซ์โบราณ ซึ่งเคยใช้เพื่อสอดแนมการสัญจรทางอวกาศภายในระบบดาว มันหยุดทำงานไปนานมากแล้ว"
 precursor.2031.desc:1 "การศึกษาดาวเคราะห์น้อย §Y[From.From.GetName]§! อย่างใกล้ชิดยิ่งขึ้น—ซึ่งในความเป็นจริงคือสถานีดักฟังไซเบรกซ์ที่ซ่อนอยู่—ได้ผลลัพธ์ที่น่าสนใจ ไม่ว่าจะด้วยเหตุผลใดก็ตาม ดาวเคราะห์น้อยดวงนี้ถูกทิ้งไว้เบื้องหลังเมื่อไซเบรกซ์ที่เหลือหายตัวไปจากกาแล็กซี มันยังคงทำงานอยู่ต่ออย่างน้อย 50,000 ปีหลังการหายตัวไปของพวกเขา แม้ว่า AI ผู้ดูแลระบบจะแสดงพฤติกรรมที่ผิดเพี้ยนไปเรื่อยๆ ก็ตาม\n\nหลังจากพยายามเชื่อมต่อกับศูนย์กลางซับสเปซของไซเบรกซ์ล้มเหลวกว่าห้าล้านล้านครั้ง ดูเหมือนว่า AI จะตัดสินใจฆ่าตัวตายด้วยการลัดวงจรระบบทั้งหมดของดาวเคราะห์น้อยดวงนี้"
 precursor.2035.name:0 "โรงกลั่นไซเบรกซ์"
 precursor.2035.desc:0 "พบเศษซากโบราณของนิคมโรงกลั่นไซเบรกซ์ขนาดใหญ่ในวงโคจรรอบดาวแก๊สยักษ์ §Y[From.GetName]§! ร่องรอยพลังงานที่หลงเหลืออยู่บ่งชี้ว่ามันถูกทำลายโดยอาวุธต่อต้านสสารบางชนิด"
 precursor.2036.desc:1 "พบหลักฐานที่บ่งชี้ว่าไซเบรกซ์กำลังทำเหมืองฮีเลียม-3 จาก §Y[From.From.GetName]§! โดยใช้ศูนย์บริการวงโคจรของพวกมันในการกลั่นแก๊สก่อนจะแจกจ่ายเป็นเชื้อเพลิงให้กับกองเรืออวกาศที่สัญจรไปมาของพวกมัน\n\nที่น่าสนใจคือ ลายเซ็นพลังงานของอาวุธต่อต้านสสารที่ทำลายสิ่งอำนวยความสะดวกนี้มีต้นกำเนิดมาจากไซเบรกซ์อย่างชัดเจน เหตุใดพวกเขาถึงต้องทำลายโรงกลั่นของตัวเอง?"
 precursor.2040.name:0 "เศษซากการต่อสู้"
 precursor.2040.desc:0 "ศึกสงครามอวกาศครั้งมโหฬารเกิดขึ้นในวงโคจรระดับสูงของ §Y[From.GetName]§! เมื่อราว 600,000 ปีก่อน โดยมียานจากกองเรืออย่างน้อยห้ากองเรือที่แตกต่างกันเข้าร่วม หนึ่งในกองเรือนั้นเป็นของไซเบรกซ์ แม้ว่าเศษซากในวงโคจรส่วนใหญ่จะมาจากผู้เข้าร่วมรายอื่นก็ตาม"
 precursor.2041.desc:1 "หลังจากวิเคราะห์เศษซากที่ทิ้งไว้จากการรบโบราณเหนือ §Y[From.From.GetName]§! เราได้เรียนรู้ว่าอาณาจักรเอเลี่ยนสี่แห่งที่อยู่ในยุคเดียวกับไซเบรกซ์ได้รวบรวมกำลังพลเข้าด้วยกันเพื่อพยายามอย่างสิ้นหวังในการยับยั้งการเคลื่อนทัพของกองเรือจิตสำนึกเครื่องจักร\n\nหากดูจากเศษซากของไซเบรกซ์จำนวนน้อยนิดที่เกิดขึ้นจากการต่อสู้แล้ว พวกเขาคงทำไม่สำเร็จ"
 precursor.2045.name:0 "ฐานไซเบรกซ์โบราณ"
 precursor.2045.desc:0 "โลกที่โหดร้ายและไม่ต้อนรับสิ่งมีชีวิตของ §Y[From.GetName]§! เคยเป็นที่ตั้งของฐานไซเบรกซ์ขนาดใหญ่ในอดีต ตอนนี้ไม่เหลืออะไรเลยนอกจากเศษซากที่กระจัดกระจายและปากปล่องภูเขาไฟขนาดใหญ่ เราจะต้องเข้าไปสำรวจพื้นที่ตั้งของฐานนี้อย่างใกล้ชิดยิ่งขึ้นเพื่อจะเรียนรู้ให้มากกว่านี้"
 precursor.2046.desc:1 "เราพบเศษซากบน §Y[From.From.GetName]§! จากยานขนาดใหญ่ลำหนึ่งที่ดูเหมือนไม่ได้มาจากต้นกำเนิดไซเบรกซ์ในปากปล่องที่เคยเป็นที่ตั้งฐานของพวกมัน นักโบราณคดีของเราคาดเดาว่ายานลำนี้น่าจะเป็นของหนึ่งในอารยธรรมอินทรีย์ที่ถูกไซเบรกซ์โจมตี หากเป็นเช่นนั้น ยานนี้อาจถูกส่งมาเพื่อพุ่งชนฐานในภารกิจพลีชีพ\n\nยังไม่มีคำอธิบายอื่นใดสำหรับการทำลายล้างของฐานนี้ที่ถูกค้นพบ"
 precursor.2050.name:0 "ซากสิ่งมีชีวิตอินทรีย์"
 precursor.2050.desc:0 "พบซากโบราณแช่แข็งของเอเลี่ยนเกือบหนึ่งพันชีวิตในบริเวณใกล้เคียงกับ §Y[From.GetName]§! ซากเหล่านี้มาจากสายพันธุ์ที่แตกต่างกันกว่าสิบสองชนิด และการกำหนดอายุเบื้องต้นคาดว่าศพเหล่านี้มีอายุประมาณ 600,000 ปี... ซึ่งตรงกับช่วงเวลาเดียวกับที่จิตสำนึกเครื่องจักรไซเบรกซ์เข้าทำลายล้างพื้นที่ส่วนนี้ของกาแล็กซี"
 precursor.2051.desc:1 "เอเลี่ยนที่เสียชีวิตที่เราพบบน [From.From.GetName] ทั้งหมดเสียชีวิตจากการสัมผัสกับสุญญากาศ และแต่ละคนมีบาร์โค้ดที่ทราบกันดีว่าไซเบรกซ์ใช้เลเซอร์สลักลงบนผิวหนังของเชลยฝ่ายอินทรีย์ ดูเหมือนว่าไซเบรกซ์จะประหารชีวิตเอเลี่ยนเหล่านี้ด้วยการ "ปล่อยลอยแพในอวกาศ" อาจเป็นเพราะการสอบสวนเสร็จสิ้นแล้ว หรือเพื่อป้องกันไม่ให้พวกเขาหลบหนีระหว่างปฏิบัติการช่วยเหลือบางอย่าง\n\nเราอาจไม่มีวันรู้ความจริง"
 precursor.2055.name:0 "สถานีวิจัยไซเบรกซ์"
 precursor.2055.desc:0 "มอดูลเดี่ยวๆ ที่ถูกไฟไหม้อย่างหนักคือทั้งหมดที่หลงเหลือจากสถานีวิจัยของไซเบรกซ์ที่เคยโคจรรอบ §Y[From.GetName]§! เมื่อหลายแสนปีก่อน ภายในมอดูลที่สัมผัสกับสุญญากาศเต็มไปด้วยซากศพของสิ่งมีชีวิตที่เป็นเครื่องจักรครึ่งหนึ่งและอินทรีย์ครึ่งหนึ่ง"
 precursor.2056.desc:1 "การวิเคราะห์มอดูลวิจัยของไซเบรกซ์ที่เราพบเหนือ §Y[From.From.GetName]§! เผยให้เห็นว่าจิตสำนึกเครื่องจักรกำลังทดลองกับสิ่งมีชีวิตกึ่งไซบอร์ก นักโทษผู้โชคร้ายหลายร้อยคนถูกส่งมายังสิ่งอำนวยความสะดวกนี้เพื่อจุดประสงค์ในการเปลี่ยนแขนขาและอวัยวะด้วยอุปกรณ์เครื่องจักรกลต่างๆ\n\nวัตถุประสงค์ที่แน่ชัดของการทดสอบเหล่านี้ยังคงไม่ชัดเจน—ไม่มีหลักฐานว่าไซเบรกซ์เคยใช้ยูนิตไซบอร์กนอกเหนือจากในห้องทดลองนี้เลย"
 precursor.2100.name:0 "พิกัดระบบดาวบ้านเกิดของไซเบรกซ์ถูกระบุแล้ว"
 precursor.2100.desc:0 "หลังจากการศึกษาอย่างเข้มข้นเกี่ยวกับสิ่งประดิษฐ์ของไซเบรกซ์ที่เรากู้คืนมาได้ นักวิทยาศาสตร์บน §Y[Root.Capital.GetName]§! สามารถคำนวณพิกัดทางดาราศาสตร์ที่แน่ชัดของระบบดาวที่พวกเครื่องจักรโบราณอ้างถึงในชื่อ "ไซเบรกซ์ไพรม์" ซึ่งอาจเป็นสถานที่ที่อารยธรรมของพวกมันล่าถอยไปหลังจากล้มเหลวในการกวาดล้างสิ่งมีชีวิตอินทรีย์ที่มีภูมิปัญญาในกาแล็กซีทั้งหมด! เราควรส่งคณะสำรวจไปยังระบบนี้ก่อนที่คนอื่นจะแย่งตัดหน้าเราไป"
 precursor.2101.name:0 "เน็กซัสศูนย์กลางไซเบรกซ์"
 precursor.2101.desc:0 "ดูเหมือนกับว่าไซบริกซ์ได้ก่อสงครามกาแล็กซี่ของพวกเขาต่อต้านสิ่งมีชีวิตอินทรีย์ ในบางช่วงระหว่างปีที่ 17 ไม่ว่าการเปลี่ยนแปลงนี้จะถูกกระตุ้นจากการสูญเสียในสนามรบ หรือการเปลี่ยนแปลงทางนิเวศวิทยาในเครือข่ายของพวกเขา ความเห็นเห็นต่าง ๆ ที่เราอาจจะไม่เคยรู้\n\nพวก เขา เริ่ม ถอน ตัว ช้า นาน เกือบ หนึ่ง ศตวรรษ จน ใน ที่ สุด พวก เขา ก็ หาย ไป หมด. ตอนนี้เรารู้แล้วว่าพวกเขาถอยกลับมายังระบบนี้ ที่ที่พวกเขาได้สร้างโลกวงแหวนขนาดใหญ่ ออกแบบมาเพื่อสร้างอารยธรรมทั้งหมดของพวกเขา\n\nพวก เขา แยก ตัว อยู่ ต่าง หาก ที่ นี่ หลาย พัน ปี จน กระทั่ง นัก สํารวจ ที่ เป็น เอกเทศ บังเอิญ มา ที่ ระบบ ของ ตน และ กระจาย ตําแหน่ง ไป ยัง กาแล็กซี อื่น ๆ. ข่าว ที่ ว่า มี การ ค้น พบ ซี เบรก ซ์ ที่ น่า หวาด กลัว อีก ครั้ง หนึ่ง กระตุ้น ให้ ชาว บ้าน หลาย คน จัด การ สํารวจ ทาง ทหาร ขนาด ใหญ่ ซึ่ง ทํา ให้ โลก ของ วง แหวน ไซ เบรกซ์ แตก เป็น เสี่ยง ๆ.\n\nแปลกนะ ที่ไซบริกซ์ดูเหมือนจะไม่ต่อต้านอะไรเลย"
 precursor.2102.name:0 "พบริงเวิลด์ไซเบรกซ์"
 precursor.2102.desc.a:0 "ริงเวิลด์ขนาดมหึมานี้ถูกสร้างขึ้นโดยไซเบรกซ์อย่างชัดเจน และต้องเป็นสถานที่ที่พวกมันล่าถอยมาหลังจากสงครามครูเสดที่ล้มเหลว น่าเศร้าที่เพิ่งมีผู้อื่นมาเยือนที่นี่เมื่อไม่นานมานี้ และดูเหมือนว่าพวกเขาจะค้นหาอย่างละเอียดถี่ถ้วนมาก—ไม่เหลือสิ่งใดที่มีค่าเลย"
 precursor.2102.desc.b:0 "การสำรวจริงเวิลด์อันน่าหลงใหลนี้เผยให้เห็นว่ามันถูกสร้างขึ้นโดยอารยธรรมเครื่องจักรบางชนิดที่รู้จักกันในชื่อ \"ไซเบรกซ์\"... แต่โชคร้ายที่เราแทบจะไม่ได้เรียนรู้อะไรเพิ่มเติมนอกเหนือจากนี้ นักสำรวจคนอื่นๆ ได้กวาดล้างสิ่งมีค่าออกไปจากระบบดาวนี้หมดแล้ว"
 precursor.2200.name:0 "โลหะมีชีวิต"
 precursor.2200.desc:0 "ขณะที่เจ้าหน้าที่วิทยาศาสตร์ §Y[Root.GetLeaderName]§! รายงานการค้นพบของ [RogueLeader.GetHerHis] เกี่ยวกับริงเวิลด์ขนาดมหึมาในระบบดาว §Y[From.GetStarName]§! นั้น [RogueLeader.GetSheHe] แทบจะไม่สามารถเก็บงำความอัศจรรย์ใจไว้ได้ ความยิ่งใหญ่ของวงแหวนนี้เกินกว่าความเข้าใจของเรา เวลาที่จำเป็นต้องใช้ในการสร้างส่วนย่อยแม้เพียงส่วนเดียวก็นับว่าเกินขีดความสามารถของเราไปมาก\n\nการสแกนเผยให้เห็นทรัพยากรใหม่ที่หายากซึ่งเราไม่เคยพบเห็นมาก่อน นั่นคือ โลหะมีชีวิต ซึ่งมีอยู่ดาษดื่นบนวงแหวน วัสดุนี้อาจเป็นหนึ่งในสาเหตุสำคัญที่ทำให้ผู้สร้างวงแหวนนี้สามารถก่อสร้างมันขึ้นมาได้ การวิจัยเทคโนโลยีนี้อาจช่วยให้เราเข้าใกล้ความรู้ของพวกเขาได้มากขึ้น"
 precursor.301.name:0 "การค้นพบจักรวรรดิแรกเริ่ม (ประถมจักรวรรดิ)"
 precursor.301.a.desc:0 "การดักจับการสื่อสารจากกลุ่มผู้สำรวจอิสระระบุว่า เมื่อเร็วๆ นี้พวกเขาพบสิ่งที่เกี่ยวข้องกับอารยธรรมโบราณยุคบุกเบิกบนดาว §H[precursor_planet.GetName]§! ความเชื่อโชคลางทำให้พวกเขาเลือกที่จะละทิ้ง [precursor_planet.GetPlanetMoon] ดวงนี้ไว้ลำพัง ดังนั้นสิ่งใดก็ตามที่พวกเขาค้นพบก็น่าจะยังคงอยู่ที่นั่น"
 precursor.301.b.desc:0 "เรือ สินค้า หลาย ลํา แล่น ผ่าน บริเวณ ใกล้ เคียง§H[precursor_planet.GetName]§!ได้มีเอกเทศของแต่ละอื่น ๆ ที่รายงานการอ่านอะนิมาลอสมาจากทิศทางของ[precursor_planet.GetPlanetMoon]หลังจากศึกษาการอ่านเหล่านี้ ผู้เชี่ยวชาญเกี่ยวกับ[Root.Capital.GetName]เชื่อว่าพวกมันอาจเป็นตัวการ ของกิจกรรมของเลขาธิการโบราณ"
 precursor.301.c.desc:0 "เจ้าหน้าที่บน[Root.Capital.GetName]เมื่อ ไม่ นาน มา นี้ มี การ เปิด ฉาก การ ลักลอบ เข้า เมือง ขนาด ใหญ่ และ มี การ จับ กุม หลาย ราย. ในความพยายามที่จะต่อรองความยืดหยุ่น หนึ่งในกัปตันลักลอบให้พิกัดของ[precursor_planet.GetPlanetMoon]ซึ่งคาดว่ามีเศษซากของอารยธรรมโบราณ"
 precursor.301.d.desc:0 "หลาย คน ที่ ได้ รับ การ เกณฑ์ จาก กอง กําลัง พื้น ดิน ของ เรา เมื่อ เร็ว ๆ นี้ ได้ เข้า สู่ พื้น ผิว ของ แฮแพ้§H[precursor_planet.GetName]§!เป็นส่วนหนึ่งของการฝึกเอาตัวรอด เมื่อ คน รับ สมัคร ถูก รับ กลับ มา อีก หลัง จาก สอง เดือน คน หนึ่ง ได้ รายงาน การ ค้น พบ หลาย อย่าง ซึ่ง บ่ง ชี้ ว่า อารยธรรม แบบ เผด็จการ ใน สมัย โบราณ มี อยู่ บน โลก นี้ นาน มา แล้ว."
 precursor.301.e.desc:0 "แผงวินิจฉัยเธตาลงทะเบียนความผิดปกติที่อาจเกิดขึ้นบน §H[precursor_planet.GetName]§! ไม่มีหน่วยปฏิบัติการของ [Root.GetSpeciesAdj] อยู่ใกล้เคียงกับวัตถุทางดาราศาสตร์ที่ไม่มีผู้อยู่อาศัยนี้ แต่การวิเคราะห์เบื้องต้นชี้ว่ามันอาจเคยถูกเยี่ยมเยียนโดยอารยธรรมยุคบุกเบิกในอดีตอันไกลโพ้น"
 precursor.301.f.desc:0 "ลาดตระเวน [root.GetIndividualNamePlural] ที่ทำการตรวจสอบพื้นผิวตามปกติของ §H[precursor_planet.GetName]§! ได้แจ้งเตือนเราถึงความผิดปกติภายในพื้นที่ควบคุมของเรา มีการตรวจพบร่องรอยของกิจกรรมที่เป็นไปได้ซึ่งสอดคล้องกับอารยธรรมยุคบุกเบิก"
 precursor.301.a:0 "เราควรตรวจสอบเรื่องนี้"
 precursor.302.name:0 "กู้คืนสิ่งประดิษฐ์ของวูลทูมสำเร็จ"
 precursor.303.name:0 "กู้คืนสิ่งประดิษฐ์ของยุตสำเร็จ"
 precursor.304.name:0 "กู้คืนสิ่งประดิษฐ์ของพันธมิตรที่หนึ่งสำเร็จ"
 precursor.305.name:0 "กู้คืนสิ่งประดิษฐ์ของอิรัสเซียนสำเร็จ"
 precursor.306.name:0 "กู้คืนสิ่งประดิษฐ์ของไซเบรกซ์สำเร็จ"
 precursor.302.a.desc:0 "การสำรวจ [precursor_planet.GetName] อย่างละเอียดถี่ถ้วนได้ขุดพบหลักฐานการมีอยู่ของ [Root.Owner.GetPrecursorCiv] ในอดีต ทีมภาคสนามจาก [Root.GetName] สามารถนำสิ่งประดิษฐ์ที่อยู่ในสภาพค่อนข้างสมบูรณ์กลับมายังยานได้สำเร็จ ซึ่งน่าจะช่วยเพิ่มพูนความรู้เกี่ยวกับอารยธรรมโบราณนี้ให้กับเรา"
 precursor.302.b.desc:0 "หน่วยกู้ภัยที่ปฏิบัติการจาก [Root.GetName] ประสบความสำเร็จในการกู้คืนสิ่งประดิษฐ์จาก [precursor_planet.GetName] ซึ่งมีต้นกำเนิดย้อนกลับไปถึงอารยธรรมยุคบุกเบิกของ [Root.Owner.GetPrecursorCiv] คลังข้อมูลของเรากำลังได้รับการอัปเดตด้วยข้อมูลใหม่ที่เราได้จากการศึกษาไอเท็มนี้"
 precursor.302.c.desc:0 "[controller.GetIndividualNamePluralCap] จาก [Root.GetName] ประสบความสำเร็จในการกู้คืนสิ่งประดิษฐ์โบราณจาก [precursor_planet.GetName] ซึ่งเป็นของอารยธรรมโบราณของ [Root.Owner.GetPrecursorCiv] ความรู้สะสมของเราเกี่ยวกับประวัติศาสตร์ของพวกเขาได้เพิ่มขึ้น" # e.g. 'Drones from the USS Scimitar have succeeded...'
 precursor.320.desc:0 "การวิเคราะห์สิ่งประดิษฐ์ย่อยๆ ชี้ว่าอาจมีความเชื่อมโยงกับอารยธรรมยุคบุกเบิกบนหรือใกล้กับ §H[precursor_planet.GetName]§!"
 vultaum_precursor_civ:0 "วูลทูม"
 yuht_precursor_civ:0 "ยุต"
