 action.39.desc.mf:4 "เมื่อไม่มีข้อเรียกร้องเพิ่มเติมจากทั้งสองฝ่าย เราหวังว่ากระบวนการเยียวยาจะสั้นลงได้ โปรดอย่าได้เคียดแค้นต่อ [This.GetSpeciesName] สำหรับสิ่งที่ผ่านพ้นไปแล้วเลย"
 action.39.desc.ez:1 "เราถูกบังคับให้ยุติเรื่องนี้โดยที่ยังไม่ได้มอบความยุติธรรมที่เหมาะสม แต่คุณไม่มีวันหนีพ้นการลงทัณฑ์จากสวรรค์ที่จะเกิดขึ้นกับคุณได้หรอก"
 action.39.desc.fp:2 "จงคิดเสียว่านี่คือการหยุดยิง เรายังไม่ได้ละทิ้งภารกิจในการกำจัด [Root.GetSpeciesName] ให้สิ้นซาก"
 action.39.desc.dc:2 "การเจรจาสงบศึกสามารถมองได้ว่าเป็นก้าวแรกสู่การเจรจาทางการทูตเกี่ยวกับเสรีภาพของประชากร [Root.GetAdj]"
 action.39.desc.sd:3 "พวก [Root.GetSpeciesNamePlural] ที่ขี้เกียจคงไม่มีประโยชน์อะไรกับเราเลยแม้แต่จะเป็นทาส บางทีความสงบสุขอาจเป็นทางเลือกที่ดีที่สุดแล้วก็ได้"
 action.39.desc.dh:1 "ฉากจบที่น่าเบื่อหน่ายอย่างยิ่งสำหรับสงครามที่แสนน่าเบื่อ กลับไปสู่สิ่งที่ดีกว่าในชีวิตกันเถอะ"
 action.39.desc.ee:2 "การยุติสงครามในตอนนี้โดยไม่มีการผ่อนปรนเพิ่มเติมจากทั้งสองฝ่าย เป็นแนวทางปฏิบัติที่มีเหตุผลที่สุดเมื่อประเมินจากสถานการณ์ปัจจุบัน"
 action.39.desc.ss:2 "หากคุณพยายามช่วงชิงจากเราไปมากกว่านี้ หรือพวกเราชิงจากคุณ มันจะสร้างความไม่สมดุลที่ไม่สามารถแก้ไขได้ ข้อตกลงสันติภาพจะช่วยให้เกิดความสมดุลทางจิตวิญญาณอย่างต่อเนื่อง"
 action.39.desc.hc:3 "ผู้คนของ [This.GetAdj] ได้ตกลงที่จะยุติสงครามครั้งนี้ โดยมีผลบังคับใช้ในทันที"
 action.39.desc.hg:1 "ในตอนนี้เราจะมีสันติภาพ แต่จะไม่มีสันติสุขในอนาคตของคุณหากคุณล่วงละเมิดสถานที่ศักดิ์สิทธิ์"
 action.39.desc.kk:2 "เราไม่สามารถเรียกร้องอะไรจากคุณได้มากกว่านี้อีก แต่เราขอวิงวอนให้คุณพิจารณาปัญญาของเรา และสิ่งที่จะเกิดขึ้นหากคุณเพิกเฉยต่อมัน"
 action.39.desc.mi:2 "คุณสมควรที่จะถูกบดขยี้ให้สิ้นซาก แต่คุณไม่มีค่าพอสำหรับเวลาอันมีค่าของเรา ดูเหมือนว่าความสงบสุขจะเป็นสิ่งที่หลีกเลี่ยงไม่ได้ในที่สุด"
 action.39.desc.eo:1 "เราปล่อยให้ตัวเองเข้าไปพัวพันกับเรื่องนี้มากเกินไปแล้ว ให้แกล้งทำเป็นว่ามันไม่เคยเกิดขึ้น และหวังว่ามันจะไม่เกิดขึ้นอีก"
 action.39.desc.fme:0 "กระบวนการลงทัณฑ์ถูกขัดจังหวะ โปรโตคอลป้องกันตนเองสิ้นสุดลง"
 action.39.desc.bme:0 "$01_BERSERK_MACHINE_EMPIRE_ERROR$"
 action.39.desc.mh:1 "ไม่จริง"
 action.39.desc.feh: "ใช่ เราจะกลับสู่สภาวะปกติ ความเปลี่ยนแปลง... ความเปลี่ยนแปลงไม่ใช่สิ่งที่ดี เราคงไม่อยากไปรบกวนสมดุลนั้น"
 action.39.desc.aew: "น่าประทับใจยิ่งนัก คุณคงจะทำได้ดีในยุคสมัยของเรา บางทีคุณอาจช่วยปกป้องวิลเลชไว้ได้ในจุดที่คนอื่นล้มเหลว คราวหลังพวกเราต้องมาทำแบบนี้กันอีกนะ!"
 action.39.desc.aec: "เราไม่มีเวลาที่จะมาเสียเปล่าให้กับคุณอีกต่อไปแล้ว กาแล็กซีกำลังเรียกร้องการนำทางจากเรา อย่ามาขวางทางเราอีก"
 action.39.desc.aeg: "ใช่ เราได้กินอาหารที่นี่จนอิ่มหนำแล้ว ยังมีห้องเก็บอาหารที่มีเสบียงอยู่อีกมากในกาแล็กซี เราจะไม่—ไม่มีทางอดตายหรอก"

 action.41.name:0 "รวมพลใหม่"
 action.41.desc.a:0 "§Y[From.GetName]§! เริ่มต้นขึ้นในขณะที่คุณมียานรบอยู่ภายในเขตแดนของศัตรูใหม่"
 action.41.desc.b:0 "กองยานรบ [From.GetNumPlayerFleetsGoneMIA] กองได้ §Rสูญหายระหว่างปฏิบัติหน้าที่§! เพื่อรวมกลุ่มกันใหม่ภายในอาณาเขตฝ่ายเดียวกัน"
 action.41.desc.b.1:0 "กองยานได้สูญหายระหว่างปฏิบัติหน้าที่ เพื่อรวมกลุ่มกันใหม่ภายในอาณาเขตฝ่ายเดียวกัน"
 action.41.desc.c:0 "สถานีรูหนอน [From.GetNumPlayerWormholeStationsDestroyed] แห่งถูกทำลายแล้ว"
 action.41.desc.c.1:0 "สถานีรูหนอนแห่งหนึ่งถูกทำลายแล้ว"

 ####################################
 # Anomaly Categories
 ####################################
 crashed_ship_asteroid_category:0 "ยานตก"
 crashed_ship_asteroid_category_desc:0 "ยานอวกาศบางประเภทได้พุ่งชนเข้ากับพื้นผิวของดาวเคราะห์น้อยดวงนี้ ซากของยานยังคงพบได้ภายในหลุมอุกกาบาตจากการพุ่งชน"
 origin_asteroid_category:0 "ไม่รู้จักต้นกำเนิด"
 origin_asteroid_category_desc:0 "องค์ประกอบทางวัตถุของดาวเคราะห์น้อยดวงนี้แตกต่างจากดวงข้างเคียงอย่างมีนัยสำคัญ มีแนวโน้มว่ามันจะมีต้นกำเนิดที่แตกต่างจากเทหวัตถุอื่นๆ ในแถบดาวเคราะห์น้อยนี้ และควรทำการสำรวจอย่างละเอียดมากขึ้น"
 debris_asteroid_category:0 "ปกคลุมไปด้วยเศษซาก"
 debris_asteroid_category_desc:0 "พื้นผิวของดาวเคราะห์น้อยดวงนี้เกลื่อนไปด้วยเศษซากโลหะ ส่วนใหญ่ดูเหมือนจะมาจากยานอวกาศหลากหลายรูปแบบ"
 emissions_asteroid_category:0 "การแผ่พลังงาน"
 emissions_asteroid_category_desc:0 "การแผ่รังสีพลังงานที่รุนแรงโดยไม่ทราบต้นกำเนิดทำให้ดาวเคราะห์น้อยดวงนี้โดดเด่นจากดวงอื่นๆ ในแถบดาวเคราะห์น้อยที่หนาแน่นนี้"
 hatch_asteroid_category:0 "ช่องเชื่อมต่อเทียบยาน"
 hatch_asteroid_category_desc:0 "มองเห็นช่องเชื่อมต่อเทียบยานขนาดเล็กที่นำไปสู่ภายในของดาวเคราะห์น้อยดวงนี้ได้ตรงขอบหลุมอุกกาบาตขนาดเล็กบนพื้นผิว ช่องเชื่อมต่อนี้มีโอกาสเคยถูกซ่อนไว้แต่แรก แต่ถูกเปิดออกจากการพุ่งชนของไมโครอุกกาบาตในภายหลัง"
 collision_asteroid_category:0 "การพุ่งชนของดาวเคราะห์น้อย"
 collision_asteroid_category_desc:0 "ดาวเคราะห์น้อยดวงนี้เพิ่งเผชิญกับการพุ่งชนจากเทหวัตถุอื่นในแถบดาวเคราะห์น้อย ส่งผลให้เกิดวงโคจรที่เปลี่ยนไปเล็กน้อยและมีหลุมอุกกาบาตขนาดใหญ่ยักษ์บนพื้นผิว"
 station_asteroid_category:0 "สถานีร้าง"
 station_asteroid_category_desc:0 "สถานีอวกาศขนาดเล็กบางประเภทถูกสร้างขึ้นในวงโคจรที่มั่นคงรอบดาวเคราะห์น้อยดวงนี้ และมันดูเหมือนจะถูกทิ้งร้างแล้ว"
 life_asteroid_category:0 "สัญญาณสิ่งมีชีวิต"
 life_asteroid_category_desc:0 "เราตรวจพบสัญญาณของสิ่งมีชีวิตที่ส่งมาจากที่ใดสักแห่งภายในดาวเคราะห์น้อยดวงนี้ สิ่งนี้จำเป็นต้องได้รับการสำรวจอย่างใกล้ชิดแน่นอน"
 object_gasgiant_category:0 "วัตถุในชั้นบรรยากาศ"
 object_gasgiant_category_desc:0 "การสะท้อนกลับของเซ็นเซอร์ระบุถึงการมีอยู่ของวัตถุที่ไม่สามารถระบุได้บางอย่างในชั้นบรรยากาศลึกของดาวแก๊สยักษ์ดวงนี้"
 moon_gasgiant_category:0 "ดวงจันทร์ที่มีแนวโน้มดี"
 moon_gasgiant_category_desc:0 "หนึ่งในดวงจันทร์ขนาดเล็กที่โคจรรอบดาวแก๊สยักษ์ดวงนี้ได้รับการระบุว่าเป็นแหล่งทำเหมืองแร่ที่มีแนวโน้มดี จำเป็นต้องทำการสำรวจให้ละเอียดขึ้นเพื่อระบุว่าการทำเหมืองนั้นมีความเป็นไปได้จริงหรือไม่"
 life_gasgiant_category:0 "สัญญาณสิ่งมีชีวิต"
 life_gasgiant_category_desc:0 "ตรวจพบสัญญาณสิ่งมีชีวิตจากภายในชั้นบรรยากาศของดาวแก๊สยักษ์ดวงนี้ มันอาจบ่งบอกถึงการมีอยู่ของชีวมณฑลบางประเภทได้หรือไม่?"
 storms_gasgiant_category:0 "พายุในชั้นบรรยากาศ"
 storms_gasgiant_category_desc:0 "มองเห็นพายุขนาดใหญ่ยักษ์ในชั้นบรรยากาศด้านบนของดาวแก๊สยักษ์ดวงนี้ มันอาจคุ้มค่าที่จะลองศึกษาในรายละเอียดเพิ่มเติม"
 aerostat_gasgiant_category:0 "โครงสร้างลอยตัว"
 aerostat_gasgiant_category_desc:0 "โครงสร้างไม่ทราบประเภทกำลังลอยอยู่ในชั้นบรรยากาศส่วนบนของดาวแก๊สยักษ์ดวงนี้ พวกมันดูเหมือนจะใช้แรงยกตัวลอยฟ้าเพื่อคงความลอยตัวเอาไว้"
 cargo_gasgiant_category:0 "ตู้บรรทุกสินค้า"
 cargo_gasgiant_category_desc:0 "ตู้สินค้าขนาดเล็กถูกทิ้งให้ลอยอย่างไม่มีจุดหมายเหนือดาวแก๊สยักษ์ดวงนี้ มันถูกแรงดึงดูดของดาวจับไว้ได้ และในที่สุดจะถูกดึงเข้าไปในชั้นบรรยากาศของดาว"
 debris_gasgiant_category:0 "ขยะอวกาศ"
 debris_gasgiant_category_desc:0 "มีเศษซากจำนวนมากในวงโคจรรอบดาวแก๊สยักษ์ดวงนี้ ส่วนใหญ่ดูเหมือนจะมาจากยานอวกาศที่สาบสูญไปนานในหลากหลายรูปทรง"
 impact_uninhabitable_category:0 "การพุ่งชนครั้งใหญ่"
 impact_uninhabitable_category_desc:1 "หลุมอุกกาบาตจากการพุ่งชนขนาดมหึมา บ่งชี้ว่าเคยมีบางสิ่งที่ใหญ่โตพุ่งเข้าชนพื้นผิวของ [Root.GetPlanetMoon] นี้ครั้งหนึ่ง"
 energy_uninhabitable_category:0 "ค่าพลังงานที่ผิดปกติ"
 energy_uninhabitable_category_desc:1 "เราตรวจพบค่าพลังงานที่ผิดปกติบางอย่างแผ่ออกมาจาก [Root.GetPlanetMoon] นี้ชั่วขณะ มันอาจเป็นข้อผิดพลาดในระบบของเรา หรืออาจเป็นสัญญาณของบางสิ่งที่มีความหมายมากกว่านั้น"
 signal_uninhabitable_category:0 "สัญญาณอ่อน"
 signal_uninhabitable_category_desc:0 "ด้วยความบังเอิญ เราได้พบสัญญาณเอเลี่ยนจางๆ ระหว่างการสำรวจ [Root.GetPlanetMoon] นี้ แหล่งกำเนิดดูเหมือนจะเป็นวัตถุขนาดเล็กในวงโคจร สัญญาณนี้ไม่มีข้อความใดๆ มันอาจเป็นเครื่องส่งสัญญาณขอความช่วยเหลือหรือเปล่า?"
 asteroid_uninhabitable_category:0 "ดาวเคราะห์น้อยในวงโคจร"
 asteroid_uninhabitable_category_desc:0 "ดาวเคราะห์น้อยคลาส 12 โคจรรอบ [Root.GetPlanetMoon] นี้ วงโคจรของดาวเคราะห์น้อยขนาดเล็กนี้ดูเหมือนจะมั่นคงเกินกว่าจะเป็นปรากฏการณ์ตามธรรมชาติ"
 solar_uninhabitable_category:0 "ยานเรือใบสุริยะ"
 solar_uninhabitable_category_desc:0 "ยานที่ถูกทิ้งร้างลำหนึ่งถูกปล่อยให้ลอยอย่างไร้จุดหมายเหนือ [Root.GetPlanetMoon] นี้ ใบเรือขนาดมหึมาที่ยื่นออกมาจากตัวยานบ่งชี้ว่ามันอาศัยพลังงานสุริยะในการทำงาน"
 life_toxic_category:0 "สัญญาณสิ่งมีชีวิต"
 life_toxic_category_desc:0 "แม้ว่าชั้นบรรยากาศของ [Root.GetPlanetMoon] นี้จะมีสารพิษและความกดอากาศสูง แต่เราก็ตรวจพบสัญญาณสิ่งมีชีวิตที่รุนแรงส่งมาจากพื้นผิวของมัน"
 life_frozen_category:0 "สัญญาณสิ่งมีชีวิต"
 life_frozen_category_desc:0 "แวบแรกที่เห็น [Root.GetPlanetMoon] นี้ดูเหมือนจะไม่สามารถรองรับสิ่งมีชีวิตได้ แต่กระนั้นเราก็ตรวจพบสัญญาณสิ่งมีชีวิตที่แผ่ออกมาจากใต้พื้นผิวเยือกแข็งของมัน"
 life_barren_category:0 "สัญญาณสิ่งมีชีวิต"
 life_barren_category_desc:0 "เราตรวจพบสัญญาณสิ่งมีชีวิตที่ส่งมาจากที่ใดสักแห่งใต้พื้นผิวอันแห้งแล้งและไร้ชีวิตของ [Root.GetPlanetMoon] นี้ สิ่งมีชีวิตประเภทใดกันที่จะสามารถอาศัยอยู่ที่นั่นได้?"
 station_uninhabitable_category:0 "สถานีอวกาศ"
 station_uninhabitable_category_desc:0 "ขณะที่ทำการสำรวจ [Root.GetPlanetMoon] นี้ สถานีอวกาศขนาดเล็กในละแวกใกล้เคียงก็ใช้ทรัสเตอร์ปรับวงโคจรเพื่อพยายามซ่อนตัวจากยานวิทยาศาสตร์ของเราอย่างเปล่าประโยชน์ พวกเขากำลังซ่อนอะไรอยู่กันแน่?"
 battle_uninhabitable_category:0 "ร่องรอยการสู้รบ"
 battle_uninhabitable_category_desc:0 "พบเศษซากยานอวกาศจำนวนมากในวงโคจรรอบ [Root.GetPlanetMoon] นี้ อาจเป็นซากหลงเหลือจากปฏิบัติการกองยานรบขนาดใหญ่ยักษ์บางรายการ"
 shipyard_uninhabitable_category:0 "อู่ต่อเรือโบราณ"
 shipyard_uninhabitable_category_desc:0 "อู่ต่อเรือในวงโคจรยุคโบราณลอยอยู่อย่างเงียบงันเหนือโลกใบนี้ มันได้รับความเสียหายจากการสู้รบอย่างหนักหน่วง และส่วนประกอบทั้งหมดของอู่นี้หายไปหลายส่วน"
 inhabited_toxic_category:0 "ร่องรอยอารยธรรมเก่า"
 inhabited_toxic_category_desc:0 "โลกที่มีสารพิษและไร้ชีวิตนี้ดูเหมือนจะเคยเป็นที่อยู่อาศัยของอารยธรรมยุคก่อนเดินทางสู่อวกาศที่มีความก้าวหน้าในระดับปานกลาง ซากปรักหักพังของเมืองต่างๆ ของพวกเขายังคงเกลื่อนอยู่ทั่วพื้นผิว"
 writing_uninhabitable_category:0 "ข้อความบนพื้นผิว"
 writing_uninhabitable_category_desc:0 "พบรอยแผลเป็นขนาดใหญ่บนพื้นผิวของโลกใบนี้ในรูปแบบที่ไม่สามารถเกิดขึ้นเองตามธรรมชาติได้ เมื่อมองจากวงโคจร รอยแยกมหึมาเหล่านั้นดูคล้ายกับตัวอักษรอย่างยิ่ง"
 beacon_uninhabitable_category:0 "สัญญาณบอกตำแหน่งพื้นผิว"
 beacon_uninhabitable_category_desc:0 "เรากำลังได้รับสัญญาณอ่อนๆ จากพื้นผิวของ [Root.GetPlanetMoon] นี้ แหล่งกำเนิดดูเหมือนจะเป็นบีคอนติดตามตัวบางประเภท"
 mountain_uninhabitable_category:0 "เทือกเขารูปทรงแปลกประหลาด"
 mountain_uninhabitable_category_desc:1 "ความพยายามในการทำแผนที่พื้นผิวของ [Root.GetPlanetMoon] นี้ทำให้พบแนวเทือกเขาแปลกประหลาดในซีกโลกใต้ มันดูไม่เหมือนกับเกิดขึ้นเองตามธรรมชาติ"
 object_uninhabitable_category:0 "วัตถุที่ไม่สามารถระบุได้"
 object_uninhabitable_category_desc:0 "วัตถุทรงสี่เหลี่ยมผืนผ้าขนาดเล็กบนพื้นผิวของ [Root.GetPlanetMoon] นี้กำลังหักเหคานสแกนทั้งหมดราวกับกระจกเงา เซ็นเซอร์ของเราไม่สามารถระบุองค์ประกอบทางวัตถุของมันได้"
 signal_gasgiant_category:0 "สัญญาณดาวแก๊สยักษ์"
 signal_gasgiant_category_desc:0 "เรากำลังตรวจจับสิ่งที่น่าจะเป็นการส่งสัญญาณจางๆ จากที่ใดสักแห่งที่อยู่ลึกเข้าไปในชั้นบรรยากาศของดาวแก๊สยักษ์นี้ ใครบางคน - หรือบางสิ่ง - กำลังพยายามสื่อสารอยู่หรือเปล่า?"
 ship_gasgiant_category:0 "ยานดาวแก๊สยักษ์"
 ship_gasgiant_category_desc:0 "มีการตรวจพบคุณลักษณะเซ็นเซอร์ของยานขนาดกลางอยู่ครู่หนึ่งในชั้นบรรยากาศส่วนบนของดาวแก๊สยักษ์นี้"
 terminal_gasgiant_category:0 "เทอร์มินัลวงโคจร"
