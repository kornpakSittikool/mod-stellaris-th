 action.38.desc.kk:1 "จงคิดเสียว่าพวกคุณยังโชคดี ความพ่ายแพ้ด้วยน้ำมือของเรายังดีกว่าการเดินตามเส้นทางสู่ความพินาศต่อไปอย่างมาก"
 action.38.desc.mi:3 "เช่นเดียวกับที่คุณได้เรียนรู้ที่จะไม่ขับยานของคุณเข้าใกล้ดาวฤกษ์ที่ลุกโชนสว่างไสวเกินไป ตอนนี้คุณก็ได้เรียนรู้ที่จะไม่รบกวน [This.GetName] แล้ว"
 action.38.desc.eo:2 "มันต้องใช้การคัดทิ้งอย่างรอบคอบไปบ้าง แต่ในตอนนี้ประชากรของ [Root.GetSpeciesAdj] คงจะไม่คุกคามระบบนิเวศของกาแล็กซีไปอีกสักระยะ"
 action.38.desc.fme:0 "กระบวนการลงทัณฑ์เสร็จสิ้น โปรโตคอลป้องกันตนเองสิ้นสุดลง โปรโตคอลการลงทัณฑ์เริ่มทำงาน"
