l_english:

 utopia.1.name:0 "คำขอสำหรับ [ringworld_builder.GetName]"
 utopia.1.desc.v1:0 "ข้อมูลจากหน่วยข่าวกรองของเราบางส่วนเผยให้เห็นว่า ริงเวิลด์(เพลง ริงเวิลด์)ของ [ringworld_builder.GetName] อาจซ่อนฐานยิงขีปนาวุธทำลายล้างสูงที่เป็นความลับ แม้ความน่าเชื่อถือของแหล่งข่าวจะยังไม่ได้รับการยืนยัน แต่แนวคิดนี้ได้แพร่กระจายไปยังสาธารณชนผู้เรียกร้องให้เราดำเนินการ แน่นอนว่าหาก [ringworld_builder.GetName] ไม่มีอะไรต้องปิดบัง พวกเขาควรอนุญาตให้คณะผู้เชี่ยวชาญด้านอาวุธของเราเข้าตรวจสอบพื้นที่"
 utopia.1.desc.v2:0 "นับตั้งแต่ [ringworld_builder.GetName] เริ่มก่อสร้างริงเวิลด์ วิศวกรชั้นนำของเราหลายคนได้ติดตามโครงการนี้จากระยะไกลและประทับใจในความก้าวหน้าอย่างมาก พวกเขาเชื่อว่าเราสามารถเรียนรู้จากการศึกษาฝีมือการสร้างอย่างใกล้ชิด และเสนอแนะให้เราขออนุญาตเพื่อส่งทีมวิจัยไปประจำการในพื้นที่"
 utopia.1.desc.v4:0 "เมื่อเร็วๆ นี้ เหล่าศาสดาพยากรณ์ทั่วจักรวรรดิได้รับนิมิตอันน่าสยดสยองเกี่ยวกับความตายและการทำลายล้าง ซึ่งเชื่อมโยงกับการปรากฏของวัตถุทรงกลมขนาดใหญ่บนท้องฟ้า เมื่อนำข้อมูลมารวมกัน ผู้นำทางศาสนาของเรามีความกังวลว่าความทะเยอทะยานของ [ringworld_builder.GetName] ในการสร้างริงเวิลด์ได้ทำให้ทวยเทพพิโรธ และแนะนำให้เราส่งคณะผู้แทนไปทำพิธีประสาทพรให้กับโครงการนี้ ก่อนที่ทุกอย่างจะสายเกินไป"
 utopia.1.a:0 "ส่งคำขอของเราไปยัง [ringworld_builder.GetName]"
 utopia.1.b:0 "นั่นเป็นเรื่องที่เป็นไปไม่ได้"
 utopia.1.b.tooltip.phobe:0 "เพิ่มผลกระทบ §Y$megastructure_demands_rejected$§! ให้กับ £pop£ §H$ethic_xenophobe$ป๊อป§!:\n$utopia.1.b.tooltip$"
 utopia.1.b.tooltip.phile:0 "เพิ่มผลกระทบ §Y$megastructure_demands_rejected$§! ให้กับ £pop£ §H$ethic_xenophile$ป๊อป§!:\n$utopia.1.b.tooltip$"
 utopia.1.b.tooltip.mater:0 "เพิ่มผลกระทบ §Y$megastructure_demands_rejected$§! ให้กับ £pop£ §H$ethic_materialist$ป๊อป§!:\n$utopia.1.b.tooltip$"
 utopia.1.b.tooltip.spiri:0 "เพิ่มผลกระทบ §Y$megastructure_demands_rejected$§! ให้กับ £pop£ §H$ethic_spiritualist$ป๊อป§!:\n$utopia.1.b.tooltip$"
 utopia.1.b.tooltip.autho:0 "เพิ่มผลกระทบ §Y$megastructure_demands_rejected$§! ให้กับ £pop£ §H$ethic_authoritarian$ป๊อป§!:\n$utopia.1.b.tooltip$"
 utopia.1.b.tooltip.egali:0 "เพิ่มผลกระทบ §Y$megastructure_demands_rejected$§! ให้กับ £pop£ §H$ethic_egalitarian$ป๊อป§!:\n$utopia.1.b.tooltip$"
 utopia.1.b.tooltip.milit:0 "เพิ่มผลกระทบ §Y$megastructure_demands_rejected$§! ให้กับ £pop£ §H$ethic_militarist$ป๊อป§!:\n$utopia.1.b.tooltip$"
 utopia.1.b.tooltip.pacif:0 "เพิ่มผลกระทบ §Y$megastructure_demands_rejected$§! ให้กับ £pop£ §H$ethic_pacifist$ป๊อป§!:\n$utopia.1.b.tooltip$"
 utopia.1.b.tooltip:2 "£happiness£ ความสุข §R-20%§!"
 utopia.2.name:0 "คำขอจาก [From.From.GetName]"
 utopia.2.a:0 "ยอมรับคำขอ"
 utopia.2.a.tooltip:0 "สิ่งนี้จะทำให้ [From.From.GetName] พึงพอใจ"
 utopia.2.b:0 "ปฏิเสธคำขอ"
 utopia.2.b.tooltip:0 "สิ่งนี้จะทำให้ [From.From.GetName] ไม่พอใจ"
 utopia.2.c:0 "นับเป็นเกียรติอย่างยิ่ง"
 utopia.2.desc.v1:0 "[From.From.GetName] อ้างว่าพบข้อมูลบ่งชี้ว่าเรากำลังสร้างฐานยิงอาวุธทำลายล้างสูงที่เป็นความลับบนริงเวิลด์ของเรา และขออนุญาตเพื่อเข้าตรวจสอบพื้นที่\n\nที่ปรึกษาทางการทหารของเรายังไม่สามารถยืนยันได้ว่าเป็นเพียงความเข้าใจผิดหรือมีเจตนาแอบแฝง ไม่ว่าจะทางใด เราควรรับมือกับสถานการณ์นี้อย่างรอบคอบ"
 utopia.2.desc.v2:1 "[From.From.GetEngineerPlural] ของ [From.From.GetName] ได้ติดตามการก่อสร้างริงเวิลด์ของเราจากระยะไกลและประทับใจในความก้าวหน้าของเราอย่างมาก พวกเขาขออนุญาตเพื่อส่งทีม [From.From.GetEngineerPlural] ไปประจำการที่นั่นเพื่อเรียนรู้จากความพยายามของเรา"
 utopia.2.desc.v4:0 "เมื่อเร็วๆ นี้ เหล่าศาสดาพยากรณ์จาก [From.From.GetName] ได้รับนิมิตอันน่าสะพรึงกลัวเกี่ยวกับความตายและการทำลายล้าง ซึ่งเชื่อมโยงกับการปรากฏของวัตถุทรงกลมขนาดใหญ่บนท้องฟ้า ด้วยความกังวลว่าการสร้างริงเวิลด์โดยไม่ได้รับความเห็นชอบในจักรวรรดิของเราได้ทำให้ทวยเทพพิโรธ พวกเขาขออนุญาตทำพิธีประสาทพรให้กับมัน ก่อนที่เราจะเสร็จสิ้นโครงการ"
 utopia.3.name:0 "คำขอได้รับการยอมรับแล้ว"
 utopia.3.desc.v1:0 "ด้วยไมตรีจิต [From.GetName] ตกลงที่จะให้คณะผู้เชี่ยวชาญด้านอาวุธของเราเข้าตรวจสอบริงเวิลด์เพื่อค้นหาฐานยิงอาวุธที่ซ่อนอยู่ ผู้เชี่ยวชาญที่มีคุณสมบัติเหมาะสมที่สุดของเรากำลังมุ่งหน้าไปยังพื้นที่ดังกล่าว ในไม่ช้าเราจะรู้ความจริง"
 utopia.3.desc.v2:0 "เพื่อความตื่นเต้นของแวดวงวิทยาศาสตร์ เราได้รับแจ้งว่า [From.GetName] ยินดีอย่างยิ่งที่จะต้อนรับทีมวิจัยของเราบนริงเวิลด์ของพวกเขา หัวหน้าฝ่ายวิศวกรรมได้จัดเตรียมส่งคณะวิศวกรฝีมือดีที่สุดของเราไปที่นั่นในไม่ช้าเพื่อรายงานกระบวนการก่อสร้าง"
 utopia.3.desc.v4:0 "[From.GetName] ยินดีต้อนรับความพยายามของเราในการเชื่อมโยงกับสิ่งเหนือธรรมชาติ และสัญญาว่าจะระงับการก่อสร้างทั้งหมดบนริงเวิลด์จนกว่าผู้นำศาสนาของเราจะพอใจว่ามันจะไม่รบกวนเจตจำนงของเทพเจ้า\n\nเจ้าหน้าที่ที่ได้รับเลือกจำนวนหนึ่งกำลังเดินทางไปยังเขตก่อสร้างทันที เพื่อให้มั่นใจว่าคำทำนายอันโหดร้ายนั้นจะไม่เกิดขึ้นจริง"
 utopia.3.a:0 "ยอดเยี่ยม"
 utopia.4.name:0 "ปฏิเสธคำขอ"
 utopia.4.desc:0 "น่าเสียดายที่ [From.GetName] ไม่ตกลงตามเงื่อนไขของเรา ส่งผลให้ความสัมพันธ์ระหว่างจักรวรรดิของเราแย่ลง"
 utopia.4.a:0 "น่าเสียดาย"
 utopia.5.name:0 "ภารกิจเสร็จสิ้น"
 utopia.5.desc.v1:0 "ผู้เชี่ยวชาญที่ถูกส่งไปตรวจสอบริงเวิลด์ของ [From.GetSpeciesName] ได้ค้นหาฐานยิงลับทั่วเขตก่อสร้างแล้ว แต่ไม่พบหลักฐานใดๆ ที่สนับสนุนข้อกล่าวหาของเรา เราสรุปได้เพียงว่าข้อมูลข่าวกรองของเราคลาดเคลื่อน และต้องตรวจสอบแหล่งข่าวให้รอบคอบยิ่งขึ้นในครั้งต่อไป"
 utopia.5.desc.v2:0 "นักวิจัยที่เราส่งไปยังริงเวิลด์ของ [From.GetSpeciesName] ได้เดินทางกลับมาพร้อมกับความรู้ใหม่ในสาขาวิศวกรรม แม้จะมีความเข้าใจผิดในตอนแรกเนื่องจากความแตกต่างทางวัฒนธรรม แต่ทั้งสองทีมพึงพอใจกับการแลกเปลี่ยนและเรียนรู้อะไรมากมายจากกันและกัน"
 utopia.5.desc.v4:0 "เจ้าหน้าที่ศาสนาที่ส่งไปทำพิธีบวงสรวงประสาทพรริงเวิลด์ของ [From.GetName] ได้เดินทางกลับมาจากภารกิจพร้อมกับคำถามมากกว่าคำตอบ ขณะที่พวกเขาทำสมาธิบนแพลตฟอร์มการก่อสร้าง พวกเขาได้เข้าสู่ภวังค์พยากรณ์อันลึกซึ้ง และพบว่าริงเวิลด์ไม่ใช่สาเหตุของนิมิตแต่อย่างใด แม้ไม่สามารถถอดรหัสความหมายที่แท้จริงของนิมิตได้ แต่พวกเขาให้ความมั่นใจแก่เราว่า \"สิ่งที่เป็นไปได้ อาจไม่เกิดขึ้น...\""
 utopia.5.b:0 "ยอดเยี่ยม"
 utopia.6.name:0 "สรุปผลคำขอริงเวิลด์"
 utopia.6.desc.v1:0 "หลังจากรื้อค้นพื้นที่ก่อสร้างไปกว่าครึ่ง คณะผู้เชี่ยวชาญด้านอาวุธจาก [From.From.GetName] จำต้องยอมรับในที่สุดว่าไม่มีฐานยิงอาวุธที่เป็นความลับบนริงเวิลด์ของเรา ซึ่งเป็นความเหนื่อยยากที่เราควรช่วยให้พวกเขารอดพ้นได้ หากเพียงพวกเขาไว้ใจเรา..."
 utopia.6.desc.v2:0 "หลังจากใช้เวลาหลายสัปดาห์บนริงเวิลด์ วิศวกรจาก [From.From.GetName] ได้เดินทางกลับแล้ว แม้จะมีความแตกต่างทางวัฒนธรรม ทั้งสองทีมก็พึงพอใจกับการแลกเปลี่ยนความรู้และได้เรียนรู้สิ่งใหม่ๆ มากมาย"
 utopia.6.desc.v4:0 "ขณะที่พวกเขากำลังทำสมาธิบนแพลตฟอร์มก่อสร้างริงเวิลด์ ผู้นำศาสนาจาก [From.From.GetName] อ้างว่าได้เข้าสู่ภวังค์อันลึกซึ้ง ซึ่งพบว่าริงเวิลด์ไม่ได้เป็นสาเหตุของนิมิตลางร้ายแต่อย่างใด แม้จะยังไม่ยอมให้คำตอบที่แน่ชัดเกี่ยวกับความหมายที่แท้จริงของนิมิตเหล่านั้น แต่พวกเขาก็ทิ้งคำพูดปลอบโยนไว้ว่า \"สิ่งที่เป็นไปได้ อาจไม่เกิดขึ้น...\"\n\nโชคดีที่บัดนี้การก่อสร้างสามารถเริ่มต้นใหม่อีกครั้งได้แล้ว"
 utopia.21.name:0 "สภาวะที่เป็นใจ"
 utopia.21.desc:0 "ภายใต้การนำอันชำนาญการของผู้จัดการฝ่ายก่อสร้างริงเวิลด์ เราสามารถปรับกระบวนการทำงานให้เหมาะสม ซึ่งช่วยเพิ่มความเร็วในการก่อสร้างได้อย่างมีนัยสำคัญ"
 utopia.22.name:0 "แหล่งสะสมแร่"
 utopia.22.desc:0 "ทีมก่อสร้างบนริงเวิลด์ได้ค้นพบแหล่งแร่ขนาดใหญ่ที่ฝังอยู่ในหินที่มีรูพรุนมาก ซึ่งจะสลายตัวไปในระหว่างกระบวนการก่อสร้าง แม้ว่าจะมีความละเอียดอ่อน แต่ตัวอย่างแร่นี้อาจมีมูลค่ามากพอที่จะทำให้เรายอมระงับการก่อสร้างเพื่อทำการสกัดมันออกมา"
 utopia.22.a:0 "สกัดแหล่งสะสมแร่"
 utopia.22.b:0 "เราไม่สามารถชะลอการก่อสร้างได้"
 utopia.27.name:0 "คนงานหายสาบสูญ"
 utopia.27.desc:0 "นับตั้งแต่การก่อสร้างริงเวิลด์เริ่มต้นขึ้น คนงานจำนวนหนึ่งได้หายตัวไป แม้จะมีความเป็นไปได้ว่าพวกเขาเพียงแค่เดินทางไปกับหนึ่งในยานขนส่งโดยไม่ได้แจ้งผู้ควบคุมงาน แต่เรากำลังเริ่มการสืบสวนหาเบาะแส น่าเสียดายที่การหายตัวไปอย่างกะทันหันนี้ทำให้การก่อสร้างล่าช้าลงเล็กน้อย"
 utopia.27.a:0 "นั่นเป็นเรื่องโชคร้ายจริงๆ"
 utopia.28.name:0 "คนงานหายสาบสูญ"
 utopia.28.desc:0 "ด้วยการมาถึงของคนงานทดแทน ในที่สุดการก่อสร้างริงเวิลด์ก็กลับมาดำเนินงานได้ตามปกติ น่าเสียดายที่เรายังไม่พบร่องรอยของคนงานที่สูญหาย ซึ่งขณะนี้ครอบครัวของพวกเขาได้รับแจ้งเรื่องเรียบร้อยแล้ว"
 utopia.28.a:0 "ใจเราอยู่กับพวกเขา"
 utopia.23.name:0 "สัตว์เลี้ยงในริงเวิลด์"
 utopia.23.desc:0 "ดูเหมือนว่าดาวเคราะห์ดวงหนึ่งที่ถูกถอดชิ้นส่วนเพื่อนำมาสร้างริงเวิลด์จะไม่ได้ร้างผู้คนอย่างที่เราคิดในตอนแรก สิ่งมีชีวิตประเภทหนอนอวกาศยักษ์ที่ไม่เป็นอันตรายและไม่เคยเป็นที่รู้จักมาก่อน มีฉายาว่า \"คู-คู\" ตามเสียงร้องของมัน ได้ถูกเคลื่อนย้ายมายังริงเวิลด์พร้อมกับเศษซากของดาวเคราะห์บ้านเกิด\n\nด้วยขนปุยและท่าทางอ่อนโยน สิ่งมีชีวิตที่น่ารักเหล่านี้ได้กลายเป็นที่ชื่นชอบของคนงานอย่างรวดเร็ว ซึ่งต้องอยู่ห่างไกลครอบครัวและมักเหงาหงอย โดยเฉพาะอย่างยิ่งเมื่อมีข่าวเรื่องเพื่อนร่วมงานหายตัวไป\n\nเราอาจอนุญาตให้สิ่งมีชีวิตเหล่านี้ใช้ชีวิตต่อไปอย่างสงบ หรือจะกำจัดพวกมันทิ้ง ซึ่งจะทำให้การก่อสร้างล่าช้าลงเล็กน้อย"
#utopia.23.desc.v2: "One of the planets used to construct the ring world was not as uninhabited as we first thought. A seemingly harmless species of worm lives on the ring world. We could halt construction to remove them or allow them to continue their lives in peace. Our xenophile pops want to spare them."
 utopia.23.a:0 "กำจัดพวกมันทิ้ง"
 utopia.23.b:0 "อย่าไปรบกวนพวกมันเลยดีกว่า"
 utopia.25.name:0 "การเปิดเผยอันน่าตกใจ"
 utopia.25.desc:0 "สิ่งที่ทำให้ทุกคนประหลาดใจคือ ริงเวิลด์เต็มไปด้วยสีสันอันลื่นตาเมื่อหนอนอวกาศนับพันๆ ตัว หรืออย่างที่เห็นคือตัวอ่อน กำลังเปลี่ยนสภาพกลายเป็นผีเสื้อ ดูเหมือนว่าการเปลี่ยนแปลงนี้จะได้รับอิทธิพลจากการจำลองชั้นบรรยากาศ\n\nน่าเสียดายที่การเฉลิมฉลองต้องยุติลงอย่างกะทันหันเมื่อมีการพบเครือข่ายอุโมงค์ใต้ดิน ซึ่งพบว่าเจ้าคู-คูได้รับการบันทึกว่ากำลังกัดกินซากศพของคนงานที่หายสาบสูญไปหลายคน\n\nการก่อสร้างถูกระงับจนกว่าจะสามารถกำจัดสิ่งมีชีวิตเหล่านี้ได้สำเร็จ แต่เราคาดว่าจะเห็นผลอย่างรวดเร็วเนื่องจากคนงานมีแรงกระตุ้นอย่างสูง ธรรมชาติที่แท้จริงของคู-คูได้รับการเปิดเผยแล้ว"
 utopia.25.a:0 "โชคดีนะ"
 utopia.26.name:0 "การเปิดเผยอันน่าตกใจ"
 utopia.26.desc:0 "ความพยายามของทีมกำจัดเพื่อกวาดล้างหนอนอวกาศยักษ์คู-คูออกจากริงเวิลด์ กลับแย่ลงจากการประท้วงอย่างรุนแรงจากคนงานก่อสร้าง\n\nด้วยความพยายามที่จะซ่อนสัตว์เลี้ยง ชายหนุ่มคนหนึ่งได้ออกไปนอกเขตก่อสร้างจนพบเครือข่ายอุโมงค์ใต้ดินที่เพิ่งถูกขุดขึ้นใหม่ ที่ซึ่งเขาพบเห็นคู-คูหลายตัวกำลังแทะเล็มซากศพของเพื่อนร่วมงานที่สูญหาย หลังจากหลบหนีออกจากสัตว์เลี้ยงอันเป็นที่รักมาได้อย่างหวุดหวิดในขณะที่มันพยายามพ่นกรดย่อยอาหารใส่ เขาได้แจ้งทีมกำจัดซึ่งจัดการหนอนกินเนื้อเหล่านั้นอย่างรวดเร็ว\n\nและนั่นคือธรรมชาติที่แท้จริงของคู-คูที่ได้รับการเปิดเผยในที่สุด"
 utopia.26.a:0 "เป็นชะตากรรมที่โหดร้ายและน่าสยดสยองจริงๆ"
 utopia.30.name:0 "คนพเนจรตาเดียว"
 utopia.30.desc.v1:0 "จักรวรรดิของเราสั่นคลอนจากการค้นพบว่า [dysonsphere_builder.GetName] กำลังสร้างไดสันสเฟียร์(Dyson Sphere)รอบดาว [dyson_system.GetName] ซึ่งเป็นดาวฤกษ์ศูนย์กลางของกลุ่มดาวอันเป็นที่รักยิ่งของเรา \"คนพเนจรตาเดียว\" ซึ่งบดบังแสงของมันอย่างสมบูรณ์\n\nคนพเนจรผู้มีตาข้างเดียวนี้คอยเฝ้ามองพวกเรามาตั้งแต่รุ่งอรุณแห่งกาลเวลา และตำนานกล่าวว่าเธอไม่เพียงนำทางกองยานของเราเท่านั้น แต่ยังนำทางหมู่ดาวในการเดินทางข้ามฟากฟ้าด้วย และบัดนี้ [dysonsphere_builder.GetName] ด้วยความเพิกเฉยอันเด่นชัด ได้สร้างโครงทรงกลมล้อมรอบดวงตาของเธอ ทำให้เธอมืดบอดลง\n\nแม้ว่าจะต้องใช้เวลาหลายปีกว่าที่เราจะสังเกตเห็นความแตกต่างจากที่นี่ แต่ผู้คนของเราต่างใจสลายที่เธอจะไม่คอยเฝ้ามองคนรุ่นหลังอีกต่อไป"
 utopia.30.a:0 "เราควรได้รับคำขอโทษอย่างเป็นทางการ"
 utopia.30.b:0 "การบริจาค 1,000 เครดิตอาจช่วยบรรเทาความเจ็บปวดได้"
 utopia.30.c:0 "การรักษาความสัมพันธ์อันดีกับเพื่อนบ้านต้องมาก่อน"
 utopia.31.name:0 "คนพเนจรตาเดียว"
#utopia.31.desc: "We have received a complaint from our neighbors, the [dyson_sphere_neighbor.GetName], that our Dyson Sphere is blocking the light of a central star in one of their most beloved constellations, the One-eyed Wanderer.\n\nThey claim the Wanderer, with her single eye, has watched over their kind since the beginning of time. She guides not only their fleets, but the stars themselves in their journey across the sky, and in a stroke of bad luck we have built our Dyson Spherearound her eye, blinding her.\n\nThough it will take many years before they can tell the difference from their homeworld, the notion that she won't be watching over future generations has shaken the empire. They ask that we make a formal apology to their people, who see this as a horrible slight."
 utopia.31.intro:0 "เราได้พบว่าคุณกำลังสร้างไดสันสเฟียร์รอบดาวฤกษ์ศูนย์กลางของกลุ่มดาวอันเป็นที่รักยิ่งดวงหนึ่งของเรา นั่นคือคนพเนจรตาเดียว\n\nคนพเนจรได้เฝ้ามองพวกเรามาตั้งแต่จุดเริ่มต้นของกาลเวลา ด้วยตาข้างเดียวของเธอเธอนำทางไม่เพียงแต่กองยานของเราเท่านั้น แต่ยังนำทางหมู่ดาวในการเดินทางข้ามขอบฟ้าด้วย และบัดนี้คุณได้สร้างโครงสร้างบดบังดวงตาของเธอจนทำให้เธอมืดบอด"
 utopia.31.desc:0 "$utopia.31.intro$\n\nแม้ว่าจะต้องใช้เวลาหลายปีกว่าที่เราจะเห็นความแตกต่างจากที่นี่ แต่การที่เธอจะไม่ได้เฝ้ามองคนรุ่นหลังต่อไปได้สร้างความสะเทือนใจให้แก่ประชากรของเรา และพวกเขาสมควรได้รับคำขอโทษอย่างเป็นทางการ"
 utopia.31.a:0 "ส่งคำขอโทษอย่างเป็นทางการ"
 utopia.31.b:0 "แบ่งปันพลังงานบางส่วนของเราให้แก่พวกเขา"
 utopia.31.c:0 "แต่เราไม่เสียใจเลยสักนิด..."
 utopia.32.name:0 "คนพเนจรตาเดียว"
#utopia.32.desc: "We have received a complaint from our neighbors, the [dyson_sphere_neighbor.GetName], that our Dyson Sphere is blocking the light of a central star in one of their most beloved constellations, the One-eyed Wanderer.\n\nThey claim the Wanderer, with her single eye, has watched over their kind since the beginning of time. She guides not only their fleets, but the stars themselves in their journey across the sky, and in a stroke of bad luck we have built our Dyson Sphere around her eye, blinding her. Though it will take many years before they can tell the difference from their homeworld, the notion that she won't be watching over future generations has shaken the empire.\n\nThey suggest that since we'll soon have an abundance of energy, a small donation of 1000 credits might help alleviate the pain that we've caused."
 utopia.32.desc:0 "$utopia.31.intro$\n\nแม้ว่าจะต้องใช้เวลาหลายปีกว่าที่เราจะสังเกตเห็นความแตกต่างจากที่นี่ แต่ประชาชนของเราต่างใจสลายที่เธอจะไม่ได้เฝ้ามองคนรุ่นหลังอีกต่อไป ในทางกลับกัน คุณในไม่ช้าจะมีพลังงานทั้งหมดที่คุณต้องการ การบริจาคเล็กๆ น้อยๆ 1,000 เครดิตอาจช่วยบรรเทาความเจ็บปวดที่คุณก่อขึ้นได้"
 utopia.32.a:0 "ทำการ \"บริจาค\" 1,000 เครดิต"
 utopia.32.b:0 "เราไม่มีเครดิตเหลือเฟือ แต่จะส่งคำขอโทษอย่างเป็นทางการให้"
 utopia.32.c:0 "สิ่งที่เราทำในอาณาเขตของเราไม่ใช่เรื่องของพวกเขา"
 utopia.33.name:0 "คนพเนจรตาบอด"
 utopia.33.desc:0 "วันนี้ [dysonsphere_builder.GetRulerTitle] [dysonsphere_builder.GetRulerName] แห่ง [dysonsphere_builder.GetName] ได้เข้าพบ [dyson_sphere_neighbor.GetRulerTitle] [dyson_sphere_neighbor.GetRulerName] ด้วยตนเองเพื่อส่งคำขอโทษอย่างเป็นทางการแก่จักรวรรดิของเราสำหรับการทำให้คนพเนจรตาเดียวมืดบอดลง พวกเขาแสดงความเสียใจอย่างสุดซึ้งและยังคงเชื่อมั่นว่าคนพเนจรจะยังคงนำทางเราต่อไปเช่นที่เคยทำมา โดยใช้ความแข็งแกร่งของเจตจำนงและความยุติธรรม ไม่ใช่การมองเห็นของเธอ"
 utopia.33.a:0 "หวังว่าจะเป็นเช่นนั้น"
 utopia.33.b:0 "พวกเขายังเสียใจไม่มากพอ"
 utopia.34.name:0 "คนพเนจรตาบอด"
#utopia.34.desc: "The [dysonsphere_builder.GetName] has denied our request, stating clearly that what happens within their borders does not concern us.\n\nThough visibly vexed [dyson_sphere_neighbor.GetRulerTitle] [dyson_sphere_neighbor.GetRulerName]  addressed the nation today with composure and dignity, in an attempt to calm the public.\n\nSadly it seems as though the fact that the [dysonsphere_builder.GetName] shares the Universe with others, has completely passed them by."
 utopia.34.desc:0 "เราได้รับคำขอของคุณแล้ว และอดไม่ได้ที่จะสังเกตเห็นว่ามีความสับสนบางอย่างเกี่ยวกับลักษณะความสัมพันธ์ของเรา ขอให้เราชี้แจง [dyson_system.GetName] เป็นดาวฤกษ์ภายในพื้นที่ของเรา และแม้ว่าแนวคิดนี้อาจเข้าใจยากสำหรับคุณ แต่สิ่งเกิดขึ้นในอวกาศของเราไม่เกี่ยวข้องกับคุณ เช่นเดียวกับที่ไม่เกี่ยวข้องกับเราว่าคุณสามารถทำให้คนของคุณพอใจได้หรือไม่\n\nเพื่อหลีกเลี่ยงความสับสนในอนาคต คุณควรจดจำสิ่งนี้ไว้ให้ดี"
 utopia.34.a:0 "ไม่ต้องไปให้เกียรติพวกเขาด้วยการตอบกลับ"
 utopia.34.b:0 "ส่งสารดูถูกไปให้พวกเขา"
 utopia.34.b.tooltip:0 "\"จักรวรรดิอันน่าสมเพชของคุณในไม่ช้าจะได้เรียนรู้ความหมายของการอยู่อย่างโดดเดี่ยวโดยไม่มีเพื่อนในจักรวาล...\""
 utopia.34.c:0 "สักวันเราจะทำให้พวกเขาเสียใจ..."
#utopia.34.c: "Slam them on intergalactic media."
 utopia.35.name:0 "คนพเนจรตาบอด"
 utopia.35.desc:0 "วันนี้ [dysonsphere_builder.GetRulerTitle] [dysonsphere_builder.GetRulerName] แห่ง [dysonsphere_builder.GetName] ได้เข้าพบ [dyson_sphere_neighbor.GetRulerTitle] [dyson_sphere_neighbor.GetRulerName] ด้วยตนเองเพื่อส่งคำขอโทษอย่างเป็นทางการแก่จักรวรรดิของเราสำหรับการทำให้คนพเนจรตาเดียวมืดบอดลง พวกเขายังมอบของขวัญเป็นพลังงาน 1,000 หน่วยด้วยความหวังที่จะช่วยชดเชยความเสียหายที่เกิดขึ้น และแสดงความมั่นใจว่าคนพเนจรจะยังคงนำทางเราต่อไปตามเจตจำนงและความยุติธรรมไม่ใช่ด้วยสายตา"
 utopia.35.a:0 "หวังว่าจะเป็นเช่นนั้น"
 utopia.35.b:0 "พวกเขายังเสียใจไม่มากพอ"
 utopia.36.desc:0 "วันนี้ [dysonsphere_builder.GetRulerTitle] [dysonsphere_builder.GetRulerName] แห่ง [dysonsphere_builder.GetName] ได้เข้าพบ [dyson_sphere_neighbor.GetRulerTitle] [dyson_sphere_neighbor.GetRulerName] ด้วยตนเองเพื่อส่งคำขอโทษอย่างเป็นทางการแก่จักรวรรดิของเราสำหรับการทำให้คนพเนจรตาเดียวมืดบอดลง แม้คำขอโทษจะดูจริงใจ แต่พวกเขาปฏิเสธที่จะจ่ายเงินชดเชยให้เรา โดยอ้างว่าพวกเขาไม่มีพลังงานเหลือเฟือ"
 utopia.36.a:0 "พวกเขาทำดีที่สุดแล้ว"
 utopia.36.b:0 "ไอ้พวกขี้เหนียว!"
 utopia.37.desc:0 "ด้วยความพยายามชดเชยความเสียหายที่เกิดขึ้นแก่ประชาชนของ [dyson_sphere_neighbor.GetName] เมื่อเราสร้างไดสันสเฟียร์รอบดาวฤกษ์ดวงหนึ่งอันเป็นที่รักยิ่งของพวกเขา [dysonsphere_builder.GetRulerTitle] ของเราได้เดินทางไปยังดาวเคราะห์บ้านเกิดของพวกเขาเพื่อส่งคำขอโทษอย่างจริงใจ ทว่าพวกเขากลับแสดงออกอย่างชัดเจนว่าความพยายามของเรานั้นไม่เพียงพอ"
 utopia.37.a:0 "ช่างน่าเสียดายจริงๆ"
 utopia.37.b:0 "ช่างไม่รู้จักบุญคุณคน"
 utopia.38.desc:0 "ด้วยความพยายามแก้ไขความสัมพันธ์ที่เสียหายระหว่างจักรวรรดิของเราและ [dyson_sphere_neighbor.GetName] หลังจากการสร้างไดสันสเฟียร์รอบดาวฤกษ์ดวงหนึ่งอันเป็นที่รักยิ่งของพวกเขา [dysonsphere_builder.GetRulerTitle] ของเราได้เดินทางไปดาวบ้านเกิดของพวกเขาเพื่อส่งมอบคำขอโทษอย่างจริงใจให้แก่ประชาชน\n\nแม้ว่าอาจต้องใช้เวลาสักระยะในการเยียวยาจิตใจจากความสูญเสีย แต่พวกเขาก็ซาบซึ้งใจที่เราได้ใช้ความพยายาม หวังว่านับจากนี้ความสัมพันธ์ระหว่างจักรวรรดิของเราจะดีขึ้นเรื่อยๆ"
 utopia.38.a:0 "นั่นเป็นข่าวดี"
#utopia.39.desc: "An incoming transmission from the [dyson_sphere_neighbor.GetName] has made it clear that they are displeased with our refusal to apologize for, as they put it, "brutally maiming" the star constellation known as the One-eyed Wanderer.\n\nRegrettably this is only one of many ways in which they find us lacking. Our physique is unappealing, our scent unpleasing and our upbringing questionable. Moreover, if we keep this up, our pitiful empire will soon learn the meaning of being alone without a friend in the Universe."
 utopia.39.desc:0 "เราขอขอบคุณที่คุณสละเวลามาชี้แนะเรา ดูเหมือนว่าเรามีความเข้าใจผิดเกี่ยวกับหลายๆ เรื่องจริงๆ ธรรมชาติที่แท้จริงของเผ่าพันธุ์คุณท่ามกลางผู้อื่น\n\nจักรวรรดิอันน่าสมเพชของคุณในไม่ช้าจะได้เรียนรู้ความหมายของการอยู่อย่างโดดเดี่ยวโดยไม่มีเพื่อนในจักรวาล"
 utopia.39.a:0 "เราเฝ้ารอวันนั้น"
 utopia.39.b:0 "พวกมันต้องชดใช้ให้กับความสามหาวนี้!"
 utopia.39.c:0 "คำพูดนั้นช่างไร้ค่า"
 utopia.40.desc:0 "สายข่าวของเรารายงานว่า [dyson_sphere_neighbor.GetName] ไม่พอใจอย่างยิ่งที่เราปฏิเสธที่จะขอโทษอย่างเป็นทางการต่อประชาชนของพวกเขาสำหรับการบดบังแสงของดาวดวงหนึ่งในกลุ่มดาวของพวกเขา แม้จะไม่มีการติดต่อใดๆ จากพวกเขาเกี่ยวกับเหตุการณ์นี้ แต่ [dysonsphere_builder.GetRulerTitle] ก็แสดงความผิดหวังในการปราศรัยต่อจักรวรรดิ"
 utopia.40.a:0 "นั่นเป็นเรื่องที่น่าเสียใจ"
 utopia.40.b:0 "นั่นไม่ใช่ปัญหาของเรา"
 utopia.51.name:0 "น้ำพุแห่งความเยาว์วัย"
 utopia.51.desc:0 "คณะกรรมการบริหารของไซแอนซ์เน็กซัส(Science Nexus)ตื่นเต้นที่จะประกาศว่าพวกเขาได้รับโอกาสพิเศษในการรับสมัคร ดร. แชกโซร์(ดร.นักวิจัยชื่อดังในด้านเทคโนโลยีการยืดอายุขัย\n\nเขาและทีมงานอยู่ในขั้นตอนสุดท้ายของการพัฒนาเซรั่มที่แสดงแนวโน้มดีในการยืดอายุขัย ทว่าเงินทุนกลับหมดลงเสียก่อน อย่างไรก็ตาม การจ้าง ดร. แชกโซร์ หมายความว่าเราจะไม่มีทรัพยากรเพื่อดำเนินการวิจัยปัจจุบันเกี่ยวกับการวิศวกรรมสารอินทรีย์ ซึ่งนำโดย ดร. โกรอิก(ดร.โกรก)เธอพยายามเพิ่มความคล่องตัวในการวิจัยวิศวกรรมด้วยการใช้ซูเปอร์คอมพิวเตอร์ชีวภาพ"
 utopia.51.a:0 "รับสมัคร ดร. แชกโซร์ ด้วยเครดิต 1,000 หน่วย"
 utopia.51.b:0 "ให้ความสำคัญกับการวิจัยของ ดร. โกรอิก ก่อน"
 utopia.51.c:0 "เราไม่สามารถจ่ายค่าจ้าง ดร. แชกโซร์ ได้"
 utopia.54.name:0 "ความเคลือบแคลงสงสัย"
 utopia.54.desc:0 "ดร. แชกโซร์และทีมงานได้สาธิตผลการวิจัยของพวกเขาเมื่อต้นสัปดาห์นี้ เซรั่มเมื่อทาลงบนผิวหนังจะส่งผลให้เกิดการฟื้นฟูเซลล์อย่างที่ไม่เคยปรากฏมาก่อน คาดว่าเป็นผลมาจากส่วนผสมมหัศจรรย์ \"เอสเซนส์แห่ง [missing_pops_planet.GetName]\" ซึ่งตั้งชื่อตามถิ่นกำเนิดลึกลับของมัน\n\nน่าเสียดาย มีการร้องเรียนจากบางคนเกี่ยวกับเงินทุนเพิ่มเติมที่แชกโซร์ได้รับ ดร. โกรอิกถึงกับกล่าวหาว่าแชกโซร์เป็นสิบแปดมงกุฎ บัดนี้เธอขออนุมัติและงบประมาณเพิ่มเติม 500 เครดิตเพื่อเริ่มการสืบสวนลับ หากแชกโซร์รู้เรื่องเขาอาจจะไม่พอใจและจากไปได้"
 utopia.54.a:0 "ไม่มีสิ่งใดมารองรับข้อกล่าวหาของเธอได้"
 utopia.54.b:0 "ทำการสืบสวนเพื่อความปลอดภัยไว้ก่อน"
 utopia.54.c:0 "งบประมาณของเราไม่เอื้ออำนวย"
 utopia.55.name:0 "เอสเซนส์แห่ง [ointment_name.GetName]"
 utopia.55.desc:0 "การสืบสวนของ ดร. โกรอิก เกี่ยวกับการวิจัยของแชกโซร์ได้ให้ผลลัพธ์ที่น่าสนใจ ดร. แชกโซร์ไม่เพียงแต่โฆษณาชวนเชื่อเกินจริงเกี่ยวกับผลลัพธ์ของเซรั่มเท่านั้น เขายังไม่ได้บอกว่าผลลัพธ์เหล่านั้นเกิดขึ้นเพียงชั่วคราวเท่านั้น ทว่าผลข้างเคียงเมื่อใช้มากเกินไปอาจคงอยู่ถาวร\n\nตัวเอสเซนส์เองถูกสกัดมาจากต่อมที่พบในสิ่งมีชีวิตท้องถิ่นในระบบดาว [ointment_name.GetName] ซึ่งไม่ใช่ใครอื่นนอกเหนือจากชาว [target_country.GetSpeciesName] ของ [target_country.GetName] แชกโซร์ได้กักขังชาว [target_country.GetSpeciesNamePlural] หลายคนไว้ในสถานะแช่แข็งเป็นเวลานานหลายเดือนเพื่อความมั่นคงในการจัดหาเอสเซนส์ มีความเป็นไปได้ว่าความสัมพันธ์ทางการทูตของเรากับจักรวรรดิของพวกเขาจะเสียหายหากความจริงถูกเปิดเผย"
 utopia.55.a:0 "ยุติโครงการและจับกุมแชกโซร์ ห้ามให้ใครรู้เด็ดขาด"
 utopia.55.b:0 "สั่งปิดปากโกรอิกและโฆษณาผลิตภัณฑ์เป็นครีมชะลอวัย"
 utopia.55.b.tooltip:0 "ด้วยการตลาดที่เข้มข้น ผลิตภัณฑ์นี้อาจนำมาซึ่งผลกำไรมหาศาลในอนาคตอันใกล้"
 utopia.56.name:0 "น้ำพุแห่งความเยาว์วัย"
 utopia.56.desc:0 "น่าเสียดายที่ ดร. แชกโซร์ ผู้น่าสงสัยได้หลบหนีไปได้ ปล่อยให้เจ้าหน้าที่และผู้ถูกทดลองอยู่เบื้องหลัง ชาว [target_country.GetSpeciesNamePlural] ได้รับการปลุกขึ้นมาและโชคดีที่ไม่มีความทรงจำเกี่ยวกับสิ่งที่พวกเขาได้เผชิญ สำหรับแชกโซร์เขาอาจจะเดินทางไปยังระบบดาวที่ห่างไกลภายใต้ชื่ออื่นเพื่อเตรียมการหลอกลวงครั้งต่อไป หากเราโชคดีพอ ครั้งต่อไปที่เขาทำพลาดเราจะพร้อมไปจับตัวเขา\n\nเจ้าหน้าที่ที่เสียชื่อเสียงของเขาดูเหมือนจะถูกชักจูงด้วยเสน่ห์ของเขาเช่นเดียวกับพวกเรา และหลายคนเสนอตัวเข้าร่วมไซแอนซ์เน็กซัสเป็นการถาวรเพื่อชดเชยความผิดพลาดของพวกเขา"
 utopia.56.a:0 "พวกเขาไม่สามารถไว้ใจได้"
 utopia.56.b:0 "พวกเขายินดีต้อนรับเข้าร่วมกับเรา"
 utopia.56.c:0 "พวกเขาไม่ใช่ดาวที่สว่างไสวที่สุดในกาแล็กซีอย่างเห็นได้ชัด..."
 utopia.57.name:0 "น้ำพุแห่งทองคำ"
 utopia.57.desc:1 "การทำการตลาดภายใต้ชื่อ \"เอจเลส\"(ไม่อาย)เอสเซนส์แห่ง [ointment_name.GetName] ได้เข้าครองตลาดในกาแล็กซีอย่างรวดเร็ว ต้องขอบคุณผู้คิดค้นที่เปี่ยมเสน่ห์และการโฆษณาชวนเชื่อที่แข็งแกร่ง ครีมมหัศจรรย์จาก \"ธรรมชาติ\" ใหม่นี้ได้รับการโปรโมตไปทั่ว ดาวเด่นในทุกระบบดาวต่างพากันมีอายุขัยที่ยืนยาวขึ้นด้วยเอจเลส\n\nอย่างไรก็ตาม วิธีที่ด็อกเตอร์จัดหาต่อมของชาว [target_country.GetSpeciesAdj] มากพอเพื่อผลิตเซรั่มจำนวนมากยังคงเป็นปริศนา..."
 utopia.57.a:0 "ความไม่รู้คือความสุขอย่างหนึ่ง"
 utopia.100.name:0 "การหายตัวไปอย่างผิดปกติบน [missing_pops_planet.GetName]"
 utopia.100.desc:0 "ความไม่สงบกำลังก่อตัวขึ้นบน [missing_pops_planet.GetName] จากคลื่นการหายตัวไปอย่างลึกลับทั่วทั้งดาวเคราะห์ ประชากรหลายพันคนได้รับการรายงานว่าสูญหายในช่วงสองเดือนที่ผ่านมาเพียงลำพัง และส่วนใหญ่มาจากกลุ่มคนที่แยกตัวและโดดเดี่ยวในพื้นที่ห่างไกล นี่อาจอธิบายว่าทำไมเรื่องนี้จึงต้องใช้เวลานานก่อนจะได้รับความสนใจจากเรา\n\nเจ้าหน้าที่บังคับใช้กฎหมายท้องถิ่นได้ขอทรัพยากรเพิ่มเติมเพื่อควบคุมความไม่สงบที่เพิ่มขึ้นในขณะที่พวกเขาดำเนินการสืบสวนต่อไป"
 utopia.100.a:0 "ส่งกองกำลังเฉพาะกิจไปยัง [missing_pops_planet.GetName]"
 utopia.100.b:0 "แน่นอนว่าพวกเขาถูกแยกตัวออกจากสังคมด้วยเหตุผลบางอย่าง..."
 utopia.101.name:0 "ปราสาทบนท้องฟ้า"
 utopia.101.desc:0 "การสืบสวนหาตัวคนงานที่หายไปของ [missing_pops_planet.GetName] เผยให้เห็นว่าพวกเขาทั้งหมดได้รับการเสนองานที่คาสิโนในอวกาศที่กำลังจะเปิดใหม่ชื่อ \"สกายคาสเซิล\"(ปราสาทขาว)โดยผู้สรรหาที่แต่งตัวดีซึ่งพูดภาษาเอเลี่ยนที่ระบุไม่ได้ การสอบสวนเพิ่มเติมพบว่าหากคาสิโนดังกล่าวมีอยู่จริง มันไม่ได้อยู่ในส่วนใดของกาแล็กซีที่เรารู้จัก\n\nเนื่องจากการปรากฏตัวของกองกำลังเฉพาะกิจดูเหมือนจะช่วยป้องกันไม่ให้ผู้ลักพาตัวลงมือซ้ำ พวกเขาจึงได้รับการถอนตัวเพื่อให้เจ้าหน้าที่ท้องถิ่นมีโอกาสล่อผู้บักพาตัวให้ออกมาอีกครั้ง"
 utopia.101.a:0 "เป็นเรื่องที่น่ากังวล"
 utopia.102.name:0 "ชะลอวัยด้วยเอจเลส"
 utopia.102.desc:0 "นักวิทยาศาสตร์ของเราบางส่วนได้แจ้งเตือนเกี่ยวกับครีมชะลอวัยจากธรรมชาติล้วนๆ ที่เรียกว่า เอจเลส(ไม่อาย)ซึ่งจำหน่ายทั่วทั้งจักรวรรดิโดยผู้จัดจำหน่ายที่น่าสงสัย\n\nโฆษณาภายใต้สโลแกน \"ชะลอวัยด้วยเอจเลส\" เวชสำอางที่ได้รับความนิยมอย่างกว้างขวางนี้ได้รับการกล่าวอ้างว่าช่วยกระตุ้นการฟื้นฟูเซลล์ด้วย \"สูตรเฉพาะ\" ที่มีส่วนผสมมหัศจรรย์ลึกลับ \"เอสเซนส์แห่ง [ointment_name.GetName]\"\n\nแม้ว่าจะสามารถก่อให้เกิดผลข้างเคียงที่น่ากังวล แต่ผลิตภัณฑ์ก็แสดงให้เห็นศักยภาพที่แท้จริงในการกระตุ้นการเติบโตของเซลล์ และสภาการวิจัยของเราแนะนำเป็นอย่างยิ่งให้จัดหาการจัดส่งเพื่อศึกษาและสร้างสูตรขึ้นใหม่"
 utopia.102.a:0 "การปรับปรุงฟื้นฟูเซลล์ดูมีแนวโน้มที่ดี"
 utopia.102.b:0 "การลดริ้วรอยแทบไม่ใช่เรื่องระดับชาติ"
 utopia.103.name:0 "เอสเซนส์แห่ง...[target_country.GetSpeciesName]"
 utopia.103.desc:0 "การวิเคราะห์ครีมชะลอวัย \"เอจเลส\" อย่างละเอียดพบว่า ถิ่นกำเนิดของส่วนผสมมหัศจรรย์ในการฟื้นฟูอย่าง \"เอสเซนส์แห่ง [ointment_name.GetName]\" นั้นอยู่ใกล้ตัวเรามาก ในความเป็นจริง มันสามารถสกัดได้จากต่อมของชาว [target_country.GetSpeciesNamePlural] ที่ยังมีชีวิตอยู่เท่านั้น ในกระบวนการป่าเถื่อนซึ่งเต็มไปด้วยความเจ็บปวดและอันตรายอย่างไม่ต้องสงสัย\n\nในข่าวที่ดีกว่า การค้นพบเหล่านี้ช่วยให้เราสามารถสร้างการฉีดสารกระตุ้นต่อม ซึ่งช่วยเพิ่มอายุขัยได้อย่างมีนัยสำคัญ ดูเหมือนว่ากุญแจสำคัญในการฟื้นฟูนั้นอยู่ภายในตัวเรามาตลอด!"
 utopia.103.a:0 "ตามหาคนเลวทรามที่ทำแบบนี้กับเรา!"
 utopia.103.b:0 "ให้อภัยและลืมมันไป..."
 utopia.105.name:0 "เปิดโปงแผนการเอจเลส"
 utopia.105.desc:0 "เราได้รับสารจากชาว [target_country.GetSpeciesNamePlural] ผู้กล่าวอ้างว่าพบหลักฐานการมีส่วนร่วมของเราในการลักพาตัวและคุมขังประชากรบางส่วนของพวกเขาโดยมิชอบด้วยกฎหมาย เพื่อสกัดเอนไซม์ฟื้นฟูเซลล์ออกจากต่อมของพวกเขา\n\nพวกเขาเรียกร้องให้เราปล่อยตัวผู้ประสบภัยและถอนผลิตภัณฑ์ออกทันทีเพื่อรักษาความสงบสุขระหว่างจักรวรรดิ การยอมรับข้อเรียกร้องของพวกเขาหมายความถึงจุดจบก่อนเวลาอันควรของแผนการสร้างเครดิตลับๆ ของเรา..."
 utopia.105.a:0 "ยอมรับข้อเรียกร้องของพวกเขา"
 utopia.105.b:0 "ปฏิเสธทุกข้อกล่าวหา!"
 utopia.105.c:0 "เราไม่มีความสนใจในการรักษาความสงบสุข..."
 utopia.105.c.tooltip:0 "ละเลยคำขอของพวกเขา"
 utopia.106.name:0 "ความยุติธรรมอันแท้จริง"
 utopia.106.desc:0 "เราต่อสู้ในการศึกที่ดีและได้รับชัยชนะแล้ว!\n\nแม้ว่า [fountain_of_youth_country.GetName] จะอ้างว่าพวกเขาไม่เคยรู้ถึงต้นกำเนิดอันเลวร้ายของ \"เอสเซนส์แห่ง [ointment_name.GetName]\" ซึ่งเห็นได้ชัดว่าเป็นคำโกหก แต่อย่างน้อยพวกเขาก็มีความเคารพในการส่งตัวพลเมืองของเรากลับคืนสู่บ้านบน [missing_pops_planet.GetName]\n\nสำหรับ ดร. แชกโซร์ หัวหน้านักวิจัยและผู้อยู่เบื้องหลังแผนการนี้ เขาได้หลบหนีไปภายใต้สถานการณ์ลึกลับ แต่ทีมงานที่เหลือของเขาได้รับการนำตัวเข้าสู่กระบวนการยุติธรรมแล้ว"
 utopia.106.a:0 "มันยังดีกว่าไม่มีอะไรเลย"
 utopia.107.name:0 "เศษเดนของจักรวาล"
 utopia.107.desc.a:0 "เราได้รับคำตอบอย่างเป็นทางการจาก [fountain_of_youth_country.GetName] โดยปฏิเสธความเกี่ยวข้องในการผลิตครีมชะลอวัย \"เอจเลส\" อย่างแข็งกร้าว และกระตุ้นให้เราหา \"ทางออกที่สร้างสรรค์กว่าสำหรับปมด้อยที่ชัดเจนของเราต่อชาว [fountain_of_youth_country.GetSpeciesNamePlural] ผู้เหนือกว่า มากกว่าการสร้างข้อกล่าวหาที่ไร้มูลความจริง\""
 utopia.107.a:0 "พวกเศษเดนของจักรวาล!"
 utopia.107.desc.b:0 "เรายังไม่ได้รับการตอบกลับจาก [target_country.GetName] เกี่ยวกับการมีส่วนร่วมในการลักพาตัวประชาชนของเราเพื่อผลิตครีมชะลอวัย \"เอจเลส\" แต่มีรายงานว่า ดร. แชกโซร์ ได้หลบหนีไปพร้อมกับเอสเซนส์ที่เหลืออยู่เกือบทั้งหมดแล้ว ทำให้เป็นไปไม่ได้ที่จะผลิตครีมเอจเลสได้อีกต่อไป\n\nความห่วงใยของเราในวันนี้ส่งไปถึงเหยื่อจำนวนมากของด็อกเตอร์ที่ยังคงถูกกักขังอยู่ และครอบครัวของพวกเขาบน [missing_pops_planet.GetName]"
 utopia.108.name:0 "ดร. แชกโซร์ หลบหนีไปแล้ว!"
 utopia.108.desc:0 "ชาว [target_country.GetSpeciesNamePlural] ไม่พอใจอย่างยิ่งที่เราปฏิเสธความเกี่ยวข้องกับการลักพาตัว ยิ่งไปกว่านั้น ดร. แชกโซร์ ได้หลบหนีไปพร้อมกับการจัดส่งเอสเซนส์ ทำให้เป็นไปไม่ได้ที่จะผลิตครีมเอจเลสอีก"
 utopia.108.a:0 "บ้าจริง..."
 utopia.58.name:0 "ไร้ซึ่งสิ่งใด"
 utopia.58.desc:0 "แชกโซร์จากไปแล้วและเขาได้นำงานวิจัยทั้งหมดไปด้วย ทิ้งไว้เพียงเจ้าหน้าที่ผู้ตื่นตระหนกของเขา พวกเขาตื่นตระหนกกับการหายตัวไปอย่างกะทันหันเหมือนกับพวกเรา และแม้ทุกคนจะรับรองถึงคุณลักษณะที่ดีของเขา โดยอธิบายว่าเป็นอัจฉริยะผู้มีเสน่ห์และโอบอ้อมอารีที่ยอมทำทุกอย่างเพื่อทีมของเขา แต่พวกเขาก็ช่วยได้เพียงแค่ข้อมูลคำบอกเล่าเกี่ยวกับความสำเร็จของเขา\n\nเราทำได้เพียงคาดเดาว่า ดร. โกรอิก พูดถูกหรือไม่ที่เรียกเขาว่าเป็นพวกต้มตุ๋น หรือว่าเขานำเอสเซนส์มหัศจรรย์ไปเสนอขายให้แก่ผู้ประมูลที่ให้ราคาสูงกว่า หากเขาเคยพยายามใช้แผนการทำนองนี้ที่อื่น เราจะตามหาเขาให้พบ"
 utopia.58.a:0 "ไอ้คนชั่ว!"
 utopia.59.intro:0 "ดร. โกรอิกและทีมงานของเธอได้คิดค้นธนาคารประสาท(ธนาคารแห่งชาติ)ซึ่งเป็นคอมพิวเตอร์ชีวภาพที่เก็บรวบรวมและควบคุมพลังการเรียนรู้ร่วมกันของสมองทั้งหมดที่อัปโหลดเข้าสู่ไดรฟ์ของมัน ซึ่งช่วยปรับปรุงความเร็วการวิจัยของเราได้อย่างมหาศาล แต่มีข้อเสียอย่างหนึ่งคือ เพื่อให้ทำงานได้ถูกต้อง สมองที่อัปโหลดจะต้องถูกสกัดออกจากร่างกายและใส่ไว้ในถังของเหลวที่เป็นสื่อนำไฟฟ้า เนื่องจากร่างกายของเราไม่สามารถมีชีวิตอยู่ได้นานหากไม่มีสมอง ผู้ทดสอบจะต้องละทิ้งตัวตนทางวัตถุของพวกเขาไปเบื้องหลัง"
 utopia.59.name:0 "ธนาคารประสาท"
 utopia.59.desc:0 "$utopia.59.intro$\n\nตามที่คาดไว้ อาสาสมัครไม่ได้เข้าแถวรอคอย จนถึงตอนนี้มีเพียงคนเดียวเท่านั้น นั่นคือผู้นำทางวิทยาศาสตร์ [volunteer_leader.GetName]"
 utopia.59.a:0 "อัปโหลดสมองของ [volunteer_leader.GetName] เข้าสู่เน็กซัส"
 utopia.59.a.tooltip:1 "ไซแอนซ์เน็กซัส(Science Nexus)จะผลิตทรัพยากรเพิ่มเติม:\n£physics£ §G50§! £society£ §G50§! £engineering£ §G50§!"
 utopia.59.b:0 "นั่นเป็นเรื่องที่ไร้ศีลธรรม"
 utopia.59.c:0 "ไม่ [volunteer_leader.GetName] เป็นที่ต้องการตัวในที่อื่น"
 utopia.60.name:0 "ธนาคารประสาท"
 utopia.60.desc:0 "$utopia.59.intro$\n\nตามที่คาดไว้ อาสาสมัครไม่ได้มารวมตัวกัน จนถึงตอนนี้มีเพียงรายเดียวเท่านั้น นั่นคือนักวิจัยหนุ่มผู้ชาญฉลาดในทีมของโกรอิก อย่างไรก็ตาม เธอมีครอบครัวที่ต้องดูแลและขอค่าชดเชยทางการเงินจำนวน 1,000 เครดิตสำหรับพวกเขา"
 utopia.60.a:0 "น่าเสียดายที่เราไม่สามารถจ่ายไหว"
 utopia.60.b:0 "นั่นฟังดูสมเหตุสมผลดี"
 utopia.60.c:0 "นั่นเป็นเรื่องที่ไร้ศีลธรรม"
#utopia.61.name: "Neural Bank"
#utopia.61.desc: "We've had some crushing news from the Science Nexus regarding [volunteer_leader.GetName], the researcher whose brain was uploaded to the neural bank two years ago. [volunteer_leader.GetSheHeCap] [volunteer_leader.GetHasHave] continued to communicate with [volunteer_leader.GetHerHis] colleagues and family all this time via the bank's interface and sadly, has asked us to terminate [volunteer_leader.GetHerHis] brain, as [volunteer_leader.GetSheHe] find[volunteer_leader.GetSXX] [volunteer_leader.GetHerHis] current state of existence unbearable.\n\nDespite its many benefits Dr. Groink has decided to pull the plug on the brain tank for good, for ethical reasons."
 utopia.62.name:0 "[abducted_leader.GetName]"
 utopia.62.desc:0 "เมื่อครู่นี้ เจ้าหน้าที่ของฝ่ายฟิสิกส์ไซแอนซ์เน็กซัสหมดสติไปพร้อมกันเกือบ 15 นาที เมื่อพวกเขาตื่นขึ้นมาอีกครั้ง ผู้นำด้านฟิสิกส์ [abducted_leader.GetName] ได้สูญหายไป สำนักงานของเขาถูกรื้อค้น ห้องเก็บของถูกทำให้ว่างเปล่า และไดรฟ์ของเขาถูกทำลาย\n\nเพื่อนร่วมงานเชื่อว่านั่นคือที่ที่เขาเก็บข้อมูลของโครงการส่วนตัวที่เขากำลังทำอยู่ แม้จะปิดปากเงียบเกี่ยวกับงานวิจัยของเขา แต่ดูเหมือนว่าเขากำลังจะบรรลุการค้นพบครั้งใหญ่\n\nเจ้าหน้าที่หลายคนระบุว่าเห็นแสงสีม่วงเจิดจ้าก่อนจะหมดสติไป ไม่มีเบาะแสอื่นใดเกี่ยวกับการหายตัวไปของเขา"
 utopia.62.a:0 "ดำเนินการค้นหาต่อไป"
 utopia.63.name:0 "[abducted_leader.GetName]"
 utopia.63.desc:0 "เมื่อเช้าตรู่วันนี้ เจ้าหน้าที่ไซแอนซ์เน็กซัสได้พบตัวผู้นำฟิสิกส์ที่หายตัวไป [abducted_leader.GetName] ในโรงอาหาร กำลังรับประทานอาหารเช้าเหมือนไม่มีอะไรเกิดขึ้น\n\nเขาอ้างว่าเขาตื่นขึ้นมาบนเตียงเมื่อไม่กี่อึดใจก่อนหน้านี้และไม่มีความทรงจำเกี่ยวกับการออกไปจากไซแอนซ์เน็กซัสเลย แต่เพื่อนร่วมงานหลายคนแสดงความกังวลว่าเขาทำให้เจ้าหน้าที่รู้สึกอึดอัดและเขาแค่แกล้งทำเป็นจำไม่ได้\n\nเขายังกลับมาพร้อมกับความเข้าใจที่น่าเหลือเชื่อในหัวข้อที่เคยไม่รู้จักมาก่อนสำหรับเขา ขณะนี้เขากำลังรอคอยการมอบหมายงาน"
 utopia.63.a:0 "เขาน่าจะมีคุณค่าต่อเรา"
 utopia.63.b:0 "เขาอาจทำให้คนอื่นตกอยู่ในอันตราย"
 utopia.64.desc:0 "$utopia.59.intro$\n\nตามที่คาดไว้ อาสาสมัครไม่ได้เข้าแถวรอคอย จนถึงตอนนี้มีเพียงคนเดียวเท่านั้น นั่นคือผู้นำทางวิทยาศาสตร์ [volunteer_leader.GetName]"
# Science Nexus/Think Tank Notification Events
 utopia.80.name:0 "การก่อสร้างไซแอนซ์เน็กซัส"
 utopia.80.desc:0 "บัดนี้เราได้เริ่มต้นภารกิจครั้งใหญ่ในการก่อสร้างไซแอนซ์เน็กซัส รากฐานได้รับการติดตั้งแล้วและกำลังเตรียมการเพิ่มศูยน์กลางหลัก คำสัญญาของนวัตกรรมเทคโนโลยีและการบรรลุแนวคิดที่เกินกว่าจินตนาการของเรากำลังรอคอยอยู่ และแม้ว่าหนทางข้างหน้าจะยาวไกลและเต็มไปด้วยความท้าทาย แต่เราก็ได้ก้าวแรกแล้ว\n\nความลึกลับอันไม่มีที่สิ้นสุดของจักรวาลจะอยู่ในการครอบครองของเราในที่สุดหรือไม่?"
 utopia.80.a:0 "อนาคตเป็นของเรา"
# Neighbor's First Science Nexus
 utopia.82.name:0 "สิ่งก่อสร้างขนาดมหึมาของเอเลี่ยน"
 utopia.82.desc.a:2 "[From.GetName] ได้ยอมรับความท้าทายในการสร้างไซแอนซ์เน็กซัส—สถาบันวิจัยที่ก้าวหน้าทางเทคโนโลยีอย่างมาก จนสามารถปฏิวัติกระบวนการทางวิทยาศาสตร์ไปได้อย่างสิ้นเชิง\n\nระบบดาว [think_tank_system.GetName] เต็มไปด้วยความเคลื่อนไหวในขณะที่วิศวกรกำลังประกอบเขตก่อสร้างเริ่มต้น ไม่ว่าพวกเขาจะล้มเหลวหรือสำเร็จ ความพยายามนี้ทำให้พวกเขาได้รับตำแหน่งท่ามกลางกลุ่มผู้เบิกทางที่ยิ่งใหญ่ในยุคของเรา"
# Neighbor's Second Science Nexus
 utopia.82.desc.b:0 "[From.GetName] ได้เริ่มสร้างไซแอนซ์เน็กซัสขึ้นมาอีกแห่ง คราวนี้ในระบบดาว [think_tank_system.GetName]"
 utopia.82.a:0 "ข้อพิสูจน์ถึงความฉลาดของสิ่งมีชีวิตทรงภูมิปัญญา"
 utopia.82.b:0 "พวกเขาพยายามเกินตัวเช่นเคย"
 utopia.82.c:0 "จงพังพินาศซะเถอะชาว [From.GetSpeciesNamePlural]..."
# Nexus Frame Built
#utopia.83.name: "Science Nexus Platform Complete"
#utopia.83.desc: "The Science Nexus platform is finally in place and the engineering team ready to begin the initial stages of construction, starting with the main hub."
#utopia.83.a: "Excellent."
# Science Nexus partially completed
 utopia.83.name:0 "แกนกลางของไซแอนซ์เน็กซัส"
 utopia.83.desc:0 "แกนกลางของไซแอนซ์เน็กซัสได้รับการติดตั้งแล้ว ติดตั้งเครื่องปฏิกรณ์สิงกิวลาริตีขั้นสูง วิศวกรของเรากำลังเตรียมงานสำหรับส่วนที่ท้าทายที่สุดของโรงงาน—ปีกวิจัยทั้งสี่ส่วน พวกมันจะติดตั้งเทคโนโลยีการบุกเบิก เพื่อรองรับทุกสิ่งตั้งแต่ความร้อนรุนแรงไปจนถึงแรงดันและเชื้อโรคต่างดาว รวมถึงเป็นที่อยู่อาศัยของนักวิจัยของเรา"
 utopia.83.a:0 "เรามาไกลมากแล้ว"
# Science Nexus Wings pt 1
 utopia.85.name:0 "ปีกวิจัยของไซแอนซ์เน็กซัส"
 utopia.85.desc:0 "โมดูลแรกของปีกวิจัยทั้งสี่ส่วนได้รับการติดตั้งแล้ว และนักวิจัยรวมถึงเจ้าหน้าที่กำลังย้ายเข้าสู่ที่พัก ขั้นตอนถัดไปและขั้นตอนสุดท้ายของการก่อสร้างจะขยายปีกวิจัยออกไป โดยเพิ่มห้องปฏิบัติการสี่ส่วนที่ติดตั้งเพื่อรองรับการวิจัยที่อันตรายที่สุดของเรา มีการใช้มาตรการความปลอดภัยอย่างเข้มงวดเพื่อความปลอดภัยของเจ้าหน้าที่"
 utopia.85.a:0 "เราเกือบจะถึงเป้าหมายแล้ว..."
# Science Nexus completed
 utopia.84.name:0 "ไซแอนซ์เน็กซัสเสร็จสมบูรณ์"
 utopia.84.desc.a:0 "วันนี้เราเฉลิมฉลองการเปิดตัวครั้งยิ่งใหญ่ของไซแอนซ์เน็กซัส ด้วยสิ่งอำนวยความสะดวกการวิจัยที่ล้ำสมัยและเทคโนโลยีเชิงนวัตกรรม เราจะไม่มีปัญหาในการดึงดูดผู้มีสติปัญญาที่ยอดเยี่ยมที่สุดจากทั่วทั้งจักรวรรดิ หรือแม้แต่ในจักรวาล ความสำเร็จนี้แสดงให้เห็นจุดเริ่มต้นของยุคใหม่แห่งการตรัสรู้\n\nมันเป็นวันสำคัญในประวัติศาสตร์ของพวกเรา"
 utopia.84.desc.b:0 "วันนี้เราเฉลิมฉลองการสร้างเสร็จสมบูรณ์ของไซแอนซ์เน็กซัสอีกแห่ง หากความสำเร็จก่อนหน้านี้ของเรายังไม่ได้บันทึกไว้ สิ่งนี้จะช่วยให้เรามีตำแหน่งแถวหน้าของความก้าวหน้าทางวิทยาศาสตร์ในจักรวาลอย่างแน่นอน ความก้าวหน้าทางเทคโนโลยีจะช่วยให้เราสร้างอนาคตได้ตามความพึงพอใจของเรา"
 utopia.84.a:0 "แน่นอน"
# Completed neighbor notification
 utopia.86.name:0 "สิ่งก่อสร้างขนาดมหึมาของเอเลี่ยน (เสร็จแล้ว)"
 utopia.86.desc:0 "[From.GetName] ได้สร้างไซแอนซ์เน็กซัสสำเร็จ ลบล้างข้อกังขาของทุกคนและทำให้พวกเขามีตำแหน่งในระดับแถวหน้าของความก้าวหน้าทางวิทยาศาสตร์ เราอาจต้องจับตาดูพวกเขาให้ดี เนื่องจากการสร้างโครงสร้างนี้เสร็จสมบูรณ์จะช่วยขับเคลื่อนเทคโนโลยีของพวกเขาไปสู่อนาคต มอบความได้เปรียบเหนืออารยธรรมอื่นๆ"
 utopia.86.a:0 "เราจะไม่ยอมถูกทิ้งไว้ข้างหลัง"

 utopia.2000.name:0 "การก่อสร้างริงเวิลด์"
 utopia.2000.desc:0 "บัดนี้เราพร้อมที่จะเริ่มต้นภารกิจขนาดยักษ์ในการสร้างโครงร่างเริ่มต้นของริงเวิลด์ในอนาคตของเรา รอบดาวฤกษ์หลักของระบบดาว [From.From.GetName]\n\nจำนวนทรัพยากรและวัสดุที่จำเป็นในการสร้างโครงร่างนี้จะมหาศาลมาก และวิศวกรชั้นยอดของเราหลายแสนคนพร้อมที่จะเริ่มต้นกระบวนการย่อยสลายดาวเคราะห์ในระบบดาวนี้ให้กลายเป็นวัตถุดิบที่ใช้ในการก่อสร้าง"
 utopia.2000.a:0 "เรากำลังสร้างประวัติศาสตร์"
 utopia.2002.name:0 "โครงการริงเวิลด์"
 utopia.2002.desc.a:0 "ข่าวสารมาถึงเราว่า [From.GetName] ได้เริ่มโครงการก่อสร้างขนาดมหึมาในระบบดาว [ringworld_system.GetName] พวกเขาตั้งใจที่จะสร้างริงเวิลด์ขนาดยักษ์รอบดาวฤกษ์หลัก และเป็นก้าวแรกที่พวกเขาเริ่มแปลงวัตถุดิบจากดาวเคราะห์ใกล้เคียงเพื่อทำเป็นโครงสร้างโลหะเบื้องต้นสำหรับสิ่งก่อสร้างยักษ์นี้"
 utopia.2002.desc.b:0 "เราได้รับข้อมูลข่าวกรองว่า [From.GetName] กำลังจะเริ่มต้นการก่อสร้างริงเวิลด์อีกแห่ง คราวนี้ในระบบดาว [ringworld_system.GetName]! เช่นเคย วิศวกรของพวกเขากำลังอยู่ในกระบวนการถอดแยกชิ้นส่วนดาวเคราะห์ทั้งหมดในระบบดาวนี้เพื่อนำทรัพยากรไปใช้สร้างริงเวิลด์"
 utopia.2002.a:0 "มันจะน่าประทับใจเท่ากับของเราหรือไม่?"
 utopia.2002.b:0 "โครงการที่น่าประทับใจ... หากสร้างเสร็จนะ"
 utopia.2003.name:0 "โครงร่างริงเวิลด์เสร็จสมบูรณ์"
 utopia.2003.desc:0 "โครงร่างเริ่มต้นของริงเวิลด์ที่เรากำลังสร้างในระบบดาว [From.From.GetName] ได้รับการก่อสร้างเสร็จสิ้นในที่สุด แม้ว่าจะยังมีงานที่ต้องทำอีกมาก แต่เพียงแค่การทำโครงสร้างโลหะที่มีเส้นรอบวงเกือบพันล้านกิโลเมตรนี้ให้เสร็จสิ้น ก็นับว่าเป็นความสำเร็จทางวิศวกรรมที่น่าเหลือเชื่อแล้ว\n\nบัดนี้เราพร้อมเริ่มทำงานเพื่อสร้างแหล่งที่อยู่อาศัยจริงแล้ว"
 utopia.2003.a:0 "ยังมีงานอีกมากรอเราอยู่"
 utopia.2004.name:0 "ริงเวิลด์เสร็จสมบูรณ์"
 utopia.2004.desc.a:0 "วิศวกรและนักนิเวศวิทยาดาวเคราะห์ของเราในวันนี้ได้ก่อสร้างส่วนที่อยู่อาศัยส่วนสุดท้ายของริงเวิลด์ที่เราสร้างในระบบดาว [completed_ringworld_system.GetName] เสร็จสิ้นแล้ว การสร้างสิ่งก่อสร้างยักษ์นี้ถือเป็นก้าวสำคัญในประวัติศาสตร์ของ [Root.GetName]—เราประสบความสำเร็จในสิ่งที่อารยธรรมเพียงไม่กี่แห่งในประวัติศาสตร์ของกาแล็กซีสามารถทำได้มาก่อน\n\nขอให้ริงเวิลด์นี้ยืนหยัดตลอดไปเพื่อเป็นประจักษ์พยานถึงความสำเร็จของเผ่าพันธุ์ [Root.GetSpeciesName] นับตั้งแต่ที่เราก้าวออกนอกชั้นบรรยากาศดาวบ้านเกิดของเรา"
 utopia.2004.desc.b:0 "เราได้ข้อสรุปเกี่ยวกับการสร้างส่วนที่อยู่อาศัยของริงเวิลด์ที่เราสร้างในระบบดาว [completed_ringworld_system.GetName] แล้ว วิศวกรและนักนิเวศวิทยาของเราประสบความสำเร็จในสิ่งที่เป็นไปไม่ได้อีกครั้ง\n\n[Root.GetName] บัดนี้ได้รับการยอมรับอย่างแท้จริงว่าเป็นหนึ่งในผู้สร้างที่ยิ่งใหญ่ที่สุดในประวัติศาสตร์กาแล็กซี"
 utopia.2004.a:0 "นี่เป็นวันสำคัญยิ่ง"
 utopia.2005.name:0 "ริงเวิลด์ของชาว [From.GetSpeciesName]"
 utopia.2005.desc.a:0 "[From.GetName] ประสบความสำเร็จในสิ่งที่อารยธรรมเพียงไม่กี่แห่งในประวัติศาสตร์กาแล็กซีเคยทำได้—พวกเขาสร้างริงเวิลด์ขนาดยักษ์เสร็จสมบูรณ์รอบดาวฤกษ์หลักของระบบดาว [completed_ringworld_system.GetName]\n\nความมหัศจรรย์ทางเทคโนโลยีนี้คือข้อพิสูจน์ถึงความสำเร็จอันน่าประทับใจของเผ่าพันธุ์ [From.GetSpeciesName] ในภาพรวม พวกเขามาไกลมากจากจุดเริ่มต้นอันเจียมเนื้อเจียมตัว"
 utopia.2005.desc.b:0 "[From.GetName] สร้างริงเวิลด์เสร็จสมบูรณ์อีกแห่งแล้ว! สิ่งก่อสร้างยักษ์นี้ตั้งอยู่ในระบบดาว [completed_ringworld_system.GetName] ซึ่งบดบังดาวเคราะห์อื่นๆ ทั้งหมดไป เนื่องจากดาวเคราะห์ที่เคยมีอยู่ถูกถอดชิ้นส่วนและนำมาใช้เป็นวัสดุก่อสร้างจนหมด"
 utopia.2005.a:0 "บางทีเราควรพิจารณาที่จะสร้างเพิ่มเติมด้วยเช่นกัน"
 utopia.2005.b:0 "อีกแห่งรึ? ทรัพยากรของพวกเขานั้นไม่มีที่สิ้นสุดเลยหรืออย่างไร?"

 utopia.4000.name:0 "การสร้างไดสันสเฟียร์"
 utopia.4000.desc:0 "การควบคุมพลังงานของหมู่ดาวเคยเป็นความฝันของวิศวกร [Root.GetAdj] ตลอดประวัติศาสตร์—จากการเผาไหม้ดิบๆ ไปจนถึงเครื่องจำลองพลังงานนิวเคลียร์ฟิวชัน—และบัดนี้เราพร้อมที่จะทำให้ความฝันนี้เป็นจริง ในระบบดาว [From.From.GetName] มีแท่นโครงสร้างที่เราจะใช้สร้างไดสันสเฟียร์ ซึ่งล้อมรอบ [From.From.GetName] และเข้ายึดครองพลังงานทั้งหมดของดาวฤกษ์นั้น"
 utopia.4000.a:0 "ไร้ขอบเขต"

# Neighbor's First Dyson Sphere
 utopia.4002.name:0 "สิ่งก่อสร้างขนาดมหึมาของเอเลี่ยน"
 utopia.4002.desc.a:0 "กิจกรรมอันเร่งรีบในระบบดาว [dyson_system.GetName] เผยให้เห็นการก่อสร้าง §Hไดสัน สเปก§! โดย [From.GetName]\n\nยังคงอยู่ในช่วงเริ่มต้น ทรงกลมที่เสร็จสมบูรณ์ในที่สุดจะบดบังแสงของดาว [dyson_system.GetName] โดยเปลี่ยนพลังงานแสงส่งตรงไปยังคลังเก็บพลังงานของ [From.GetAdj]"
# Neighbor's Second Dyson Sphere
 utopia.4002.desc.b:0 "จากรายงานทั้งหมด ระบบดาว [dyson_system.GetName] ในไม่ช้าจะเป็นแหล่งรองรับไดสันสเฟียร์อีกแห่งที่ดำเนินการโดย [From.GetName] แม้ว่าจะต้องใช้เวลาสักระยะ แต่สิ่งก่อสร้างยักษ์นี้จะล้อมรอบดาวฤกษ์หลักของระบบดาวไว้ทั้งหมดเมื่อสร้างเสร็จ"
 utopia.4002.a:0 "มหาอำนาจดวงดาวทั้งหมดต้องเข้าควบคุมพลังของหมู่ดาวในที่สุด"
 utopia.4002.b:0 "ดาราจักรกำลังมืดมิดลง"

# Sphere Frame built
 utopia.4003.name:0 "โครงร่างไดสันสเฟียร์"
 utopia.4003.desc:0 "ด้วยโครงร่างที่ติดตั้งแล้ว ขนาดที่น่าทึ่งของโครงการจึงปรากฏให้ทุกคนได้เห็น\n\nดาว [From.From.GetName] แผดเผาภายในกรงเหล็กบางๆ แต่ในที่สุดมันจะถูกล้อมรอบด้วยแผงรับโซลาร์เซลล์ของ [Root.GetAdj] อย่างสมบูรณ์"
 utopia.4003.a:0 "ประณีตงดงาม"

# Dyson Sphere partially completed
 utopia.4004.name:0 "ติดตั้งแผงไดสันสเฟียร์แล้ว"
 utopia.4004.desc:0 "แม้ว่าจะยังไม่เสร็จสิ้นสมบูรณ์ แต่การติดตั้งโซลาร์เซลล์ขั้นสูงทำให้เราได้เก็บเกี่ยวผลประโยชน์จากไดสันสเฟียร์ที่กำลังสร้างขึ้นในระบบดาว [From.From.GetName] แล้ว\n\nการเพิ่มขึ้นของพลังงานจะยังคงเติบโตต่อไปในขณะที่การก่อสร้างดำเนินอยู่ และในที่สุดจะเปิดใช้งานได้เต็มประสิทธิภาพเมื่อไดสันสเฟียร์เสร็จสมบูรณ์"
 utopia.4004.a:0 "ยอดเยี่ยม"

# Dyson Sphere completed
 utopia.4005.name:0 "ไดสันสเฟียร์แห่ง [From.From.GetName] เสร็จสมบูรณ์"
 utopia.4005.desc:0 "ดาวฤกษ์หลักของระบบดาว [From.From.GetName] บัดนี้ได้รับการหุ้มล้อมรอบอย่างสมบูรณ์โดยไดสันสเฟียร์ของ [Root.GetAdj]\n\nวิศวกรของเราเฉลิมฉลองเรื่องนี้เป็นชัยชนะครั้งยิ่งใหญ่ และสมควรได้รับการยกย่องเช่นนั้น เราประสบความสำเร็จในสิ่งที่จักรวรรดิดวงดาวเพียงไม่กี่แห่งในประวัติศาสตร์ของกาแล็กซีเคยจินตนาการไว้—การครอบครองพลังงานของดวงดาวทั้งหมด"
 utopia.4005.a:0 "ผลผลิตพลังงานคงที่ตามเกณฑ์ปกติ"

# Completed neighbor notification
 utopia.4010.name:0 "สิ่งก่อสร้างขนาดมหึมาของเอเลี่ยน (เสร็จแล้ว)"
 utopia.4010.desc:0 "ร่องรอยของแสงสว่างสุดท้ายจากดาวฤกษ์ในระบบดาว [From.From.From.GetName] ได้มอดดับลง [From.GetName] ได้สร้างไดสันสเฟียร์เสร็จสมบูรณ์ และความว่างเปล่าใหม่ในท้องฟ้าถือเป็นเครื่องพิสูจน์ถึงความอัจฉริยะและความร่ำรวยของ [From.GetAdj]"

 utopia.4100.name:0 "การก่อสร้างอาร์เรย์สังเกตุการณ์กาแล็กซี"
 utopia.4100.desc:0 "แสงสว่างของดวงดาวสามารถทำให้ดวงตาพร่ามัวได้ และความมืดมิดของความว่างเปล่าช่วยบดบังสิ่งต่างๆ เฉพาะเมื่อเราเรียนรู้ที่จะเดินทางได้เร็วกว่าแสงเท่านั้น เราจึงได้รู้ว่ามีสิ่งต่างๆ มากมายเพียงใดที่แสงสว่างธรรมดาเผยให้เราเห็นไม่ได้\n\nวันนี้ เราเริ่มสิ้นสุดความมืดบอดนี้ อาร์เรย์สังเกตการณ์(สเปน)ที่เราเตรียมสร้างในระบบดาว [From.solar_system.GetName] วันหนึ่งจะกลายเป็นหอคอยสังเกตการณ์ที่แข็งแกร่ง ดวงตาของเราในทุกๆ ดวงดาว"
 utopia.4100.a:0 "มองเห็นสรรพสิ่ง"
 utopia.4100.a.tooltip:0 "§H$spy_orb_0$§! ได้รับการติดตั้งแล้ว กำลังรอคอยการพัฒนาเพิ่มเติมก่อนจะสามารถเปิดใช้งานออนไลน์ได้"

 utopia.4102.name:0 "$utopia.4002.name$"
 utopia.4102.desc:0 "ข่าวสารมาถึงเราว่า [From.GetName] ได้เริ่มต้นการก่อสร้างอาร์เรย์เซนเซอร์พิสัยไกลขนาดยักษ์ในระบบดาว [spy_system.GetName] แม้จะยังอยู่ในช่วงเริ่มต้น แต่อาร์เรย์ที่เสร็จสมบูรณ์มีเป้าหมายเพื่อมอบข้อมูลเชิงลึกเกี่ยวกับการเดินทางข้ามดวงดาวทั้งหมดในกาแล็กซีนี้ให้แก่พวกเขาอย่างอิสระ"

 utopia.4103.name:0 "ตั้งฮับของอาร์เรย์สังเกตุการณ์กาแล็กซีแล้ว"
 utopia.4103.desc:0 "ฮับของเซนทรีอาร์เรย์(สเปน)เป็นการติดตั้งที่ล้ำสมัยในตัวของมันเอง ครึ่งหนึ่งทำหน้าที่เป็นสถานีรับฟังข้อมูล และอีกครึ่งหนึ่งทำหน้าที่เป็นกล้องโทรทรรศน์อวกาศ\n\nอย่างไรก็ตาม นี่เป็นเพียงหลักกิโลเมตรแรกในภารกิจอันยิ่งใหญ่นี้"
 utopia.4103.a.tooltip:0 "§H$spy_orb_1$§! เปิดใช้งานแล้ว ระยะเซนเซอร์ของเราได้รับการเพิ่มขึ้น"

 utopia.4104.name:0 "อาร์เรย์สังเกตุการณ์กาแล็กซีเสร็จสมบูรณ์"
 utopia.4104.desc:0 "เทคโนโลยีใดที่บรรจุอยู่ในโครงแหวนรอบเซนทรีอาร์เรย์นั้นเป็นความลับที่ปกป้องอย่างแน่นหนา\n\nอย่างไรก็ตาม ผลลัพธ์ที่ได้นั้นไม่อาจปฏิเสธได้ บัดนี้เรามีความรู้ที่สมบูรณ์แบบเกี่ยวกับการเคลื่อนพลของกองยานทั้งหมดในกาแล็กซี"
 utopia.4104.a:0 "แยกตัวเฝ้ามอง ฉันมองเห็นสรรพสิ่ง"
 utopia.4104.a.tooltip:0 "เปิดใช้งานระยะเซนเซอร์ทั่วทั้งกาแล็กซี"

 utopia.4110.name:0 "$utopia.4010.name$"
 utopia.4110.desc:0 "เราได้รับแจ้งว่า [From.GetName] ได้สร้างเซนทรีอาร์เรย์เสร็จสมบูรณ์ในระบบดาว [From.From.solar_system.GetName]\n\nเราควรคาดเดาว่าบัดนี้พวกเขามีข้อมูลข่าวกรองที่สมบูรณ์แบบเกี่ยวกับตำแหน่งและการจัดวางกองยานของเรา"

 # Synced from vanilla by Stellaris Thai Translator.
 # These keys were missing from the mod and should be translated on the next pass.
 utopia.104.name:0 "หัวขโมยชาวกแลนด์"
 utopia.104.desc:0 "ในความพยายามประสานระหว่างกองทัพและแผนกวิจัยสังคม เราได้ติดตามห่วงโซ่การกระจายของ\"ไร้ความสามารถ\" ครีมต่อต้านการอ้างอิงกลับไปที่วิทยาศาสตร์เจ้าของโดย[fountain_of_youth_country.GetName]ซึ่งพัฒนาโดยนักวิจัยของรัฐบาล ชื่อ ดร.เอ็กซ์ซ็อกซ์และทีมของเขา\n\nเดอะ[fountain_of_youth_country.GetName]ได้ทํากําไรมหาศาลจากผลิตภัณฑ์ และดูเหมือนว่าพวกเขาคงจะไม่รู้ ที่มาของส่วนประกอบที่สําคัญของมัน"
 utopia.104.a:0 "พวกเขาต้องปล่อยเหยื่อ และถอนตัวสินค้าทันที"
 utopia.104.a.tooltip:0 "ส่งทูตตามคําขอของเรา"
 utopia.104.c:0 "การกระทําพูดดังกว่าคําพูด"
 utopia.104.c.tooltip:0 "สายไปแล้วสําหรับการแลกเปลี่ยนทางการทูต"
 utopia.104.d:0 "เราไม่สามารถเสี่ยงกับเหตุการณ์ทางการทูตได้"
