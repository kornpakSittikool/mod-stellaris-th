 AURA_INTENSITY_INCREASE_EOTC_TT  shroud.8440.desc:"นับตั้งแต่ก้าวผ่านพ้นเข้าสู่ชราวด์ ความรู้สึกเดียวที่พวกเราตระหนักรับรู้ได้คือความทุกข์ระทมอย่างแสนสาหัส ละอองหมอกพลังจิตวิญญาณที่หมุนวนปกติได้แปรสภาพกลายเป็นกองเพลิงอัคคีชำระล้างที่ร้อนแรง แผดเผาไหม้ทำลายโครงสร้างประสาทสัมผัสจิตใจเราโดยตรง\n\nท่ามกลางความเจ็บปวดทรมานอันแสนทารุณ พวกเรามองเห็นภาพประจักษ์นิมิตของมหานครใหญ่โตหลายแห่งที่ถล่มทลายสลายกลายเป็นเเถ้าถ่านละลาย ดาวเคราะห์บริวารจำนวนมากถูกเพลิงแผดเผากลืนกิน ประชากรทั้งหมดดิ้นรนเจ็บปวดอย่างแสนทารุณในยามที่อัคคีเพลิงสีม่วงเผาไหม้ทำลายสังขารกายเนื้อของพวกเขาจนมอดสลายกลายเป็นเพียงกองฝุ่นธุลีเศษขี้เถ้าที่ยังคุกรุ่น\n\nณ จุดศูนย์กลางของกองไฟนรกดังกล่าว พวกเราสัมผัสเข้าถึงการมีตัวตนของเอนทิตี §R[Root.Patron:end_of_the_cycle.GetPreCommunicationName]§! ในขณะที่พละกำลังอันทรงพลังของมันกำลังเตรียมคุกคามเพื่อกลืนกินสลายนิเวศความจริงทั้งหมด เอนทิตีได้ป่าวประกาศกิตติศัพท์ขึ้นว่า:\n\n§R\"การปลดปล่อยสู่อิสรภาพโดยแท้จริง(ประกาศ)\"§!\"ถเข้าแทรกแซงบงการความจริงทางกายภาพของเราได้สำเร็จ"
