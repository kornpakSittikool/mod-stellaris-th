 end_of_the_cycle_endbringers: "$end_of_the_cycle_article_cap$"
 situation_end_of_the_cycle_endbringers_desc:"พันธสัญญาของเรากับ $end_of_the_cycle_color_article$ มอบพลังอำนาจมหาศาลแก่เรา และมอบเป้าหมายอันรุ่งโรจน์ให้แก่เรา\n\nเจตจำนงของผู้อุปถัมภ์เรียกร้องการล้างบางมิตินี้อย่างสมบูรณ์ ทุก ๆ ระบบที่ §H$end_aura$§! กลืนกิน จะทำให้การดับสูญอันเปี่ยมด้วยความเมตตาเข้ามาใกล้ขึ้นอีกขั้น\n\nเราจะเป็นพยานในความหลีกเลี่ยงไม่ได้นี้\n\nระบบที่เหลือที่ต้องพิชิต: [Owner.GetEndCycleGalaxySystemsLeft]"
