 shroud.11225.title:"การอันตรธานหายตัวอย่างกะทันหัน"
 shroud.11225.desc.common_1:"ในชั่วพริบตา ทุกสิ่งทุกอย่างก็อันตรธานหายสิ้นไป\n\n§R$end_aura$§! ที่ชั่วร้ายซึ่งคงอยู่บนระบบแผงกั้นดินแดนของเราจู่ ๆ ก็เลือนหายวับไป นำพาทุกสรรพสิ่งติดสอยห้อยตามไปด้วย ดาวฤกษ์ทั้งหมดพังทลายสลายตัวเป็นหลุมดำ ดวงดาวเคราะห์เลือนหายไป และเหลือทิ้งไว้เพียงความเงียบงันครั้งใหญ่ในจุดเกิดเหตุ"
 shroud.11225.desc.common_2:"ไม่ว่าความวิกลจริตใดที่อัญเชิญขุมพลังทำลายล้างดังกล่าวขึ้นมา มันก็อาจจะถูกฝังกลบเป็นปริศนาไปชั่วกาลนาน"
 shroud.11225.desc.default: "$shroud.11225.desc.common_1$\n\n$shroud.11225.desc.common_2$"
 shroud.11225.desc.mitigated:"$shroud.11225.desc.common_1$ ดูเหมือนว่าความพยายามของเราในการต้านทานสะกดขับไล่ออร่านั้นจะได้รับประสิทธิผลช่วยบรรเทาบางส่วน ช่วยปกป้องรักษาทรัพย์สินบางส่วนที่เราสามารถทำได้สำเร็จ\n\n$shroud.11225.desc.common_2$"
 shroud.11225.a:"สิ่งนี้เกิดขึ้นมาได้อย่างไรกัน?"

 SPECIAL_PROJECT_CALLING:"พิธีเรียกขานปัญญาความรู้"
