 shroud.1510.title:"การปะทะกันของ $PSIONIC_AURA$"
 shroud.1510.desc:"§H$PSIONIC_AURA$§! ของเราในระบบดาว [from.GetName] กำลังเผชิญหน้าดิ้นรนกับออร่าฝ่ายตรงข้ามที่ปล่อยออกมาจากระบบใกล้เคียง [fromfrom.GetName] นักวิจัย [GetResearchers] พลังจิตของเราเคยสร้างแบบจำลองพฤติกรรมนี้มาก่อนแล้ว ทว่านี่เป็นครั้งแรกที่เราเผชิญหน้ากับปรากฏการณ์นี้ด้วยตัวเอง\n\nตามทฤษฎีแล้ว ออร่าที่มีศักยภาพมากกว่า ซึ่งก็คือผู้ที่แผ่ออกมาด้วยระดับความเข้มข้นที่สูงกว่า จะค่อยๆ บั่นทอนลดพลังของอีกฝ่ายลง หากการต่อสู้ดิ้นรนนี้ไปถึงการเสื่อมสลายโดยสมบูรณ์ ออร่าที่ชนะอาจแผ่ปกคลุมเข้าไปสู่ระบบดาวที่ว่างเปล่าได้\n\nนี่ถือเป็นการขับเคี่ยวห้ำหั่นทางพลังจิตอย่างแท้จริง"
 shroud.1510.a:"เจตจำนงของเราจะเป็นฝ่ายได้รับชัยชนะ"

 shroud.1550.title:"พลานุภาพแห่งเจตจำนง"
 shroud.1550.desc.common_1:"การรุกล้ำเจาะเข้าสู่มิติ §Hม่านพลัง(คําราม)§! ของเราส่งผลให้พลังงานในนั้นส่งผลกระทบต่ออวกาศที่เฝ้าสังเกตได้ แม้ว่าจะมีความสลักสำคัญ ทว่าผลลัพธ์เหล่านั้นเกิดขึ้นอย่างเป็นครั้งคราวและแยกตัวเป็นเอกเทศ"
 shroud.1550.desc.common_2:"การกระทำของเราส่งผลสะท้อนไปทั่วม่านพลัง นำพาให้เราเข้าใกล้สิ่งมีชีวิตผู้ทรงฤทธานุภาพ หากเราเป็นที่โปรดปรานต่อสิ่งมีชีวิตเหล่านี้ เราอาจสามารถชี้นำและทอดสะพานพลังงานจิตวิเศษของพวกเขามาสู่ความเป็นจริงทางกายภาพได้ ผู้ส่งกระแสจิต [GetTelepathPlural] ของเราตั้งสมมติฐานว่า 'ออร่า' ที่เกิดขึ้นนี้จะช่วยเพิ่มความแข็งแกร่งให้กับจักรวรรดิของเรา"
 shroud.1550.desc_1.knows:"$shroud.1550.desc.common_1$ ออร่าพลังจิต §H'$PSIONIC_AURA_PLURAL$'§! มอบแนวทางที่จะเปลี่ยนอิทธิพลนี้ให้กลายเป็นกระแสไหลเวียนที่มั่นคงอย่างต่อเนื่อง"
 shroud.1550.desc_1.default:"$shroud.1550.desc.common_1$ ทฤษฎีเรื่องออร่าพลังจิต §H'$PSIONIC_AURA_PLURAL$'§! มอบแนวทางที่จะเปลี่ยนอิทธิพลนี้ให้กลายเป็นกระแสที่มั่นคง"
 shroud.1550.desc.knows:"$shroud.1550.desc_1.knows$\n\n$shroud.1550.desc.common_2$ ตลอดจนพันธมิตรของเรา ในขณะเดียวกันก็ลดทอนพลังของฝ่ายตรงข้ามที่ต่อต้านเรา - เช่นเดียวกับที่เราเคยสังเกตพบมาแล้วก่อนหน้านี้"
 shroud.1550.desc.knows.homicidal:"$shroud.1550.desc_1.knows$\n\n$shroud.1550.desc.common_2$ ในขณะเดียวกันก็ลดทอนพลังของฝ่ายตรงข้ามที่ต่อต้านเรา - เช่นเดียวกับที่เราเคยสังเกตพบมาแล้วก่อนหน้านี้"
 shroud.1550.desc.default:"$shroud.1550.desc_1.default$\n\n$shroud.1550.desc.common_2$ ตลอดจนพันธมิตรของเรา ในขณะเดียวกันก็ลดทอนพลังของผู้ที่ต่อต้านและยืนกรานจะสู้กับเรา"
 shroud.1550.desc.default.homicidal:"$shroud.1550.desc_1.default$\n\n$shroud.1550.desc.common_2$ ในขณะเดียวกันก็ลดทอนกำลังของผู้ที่ยืนหยัดสู้ต่อต้านเรา"
 shroud.1550.a:"น่าสนใจทีเดียว"

