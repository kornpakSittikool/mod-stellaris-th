 shroud.4500.desc.1:"ในขณะที่เราเชื่อมโยงแผ่ขยายจิตสู่ม่านพลัง เรารับรู้ได้ถึงความหิวกระหายที่ไร้ขีดจำกัดของผู้กินโลก"
 shroud.4500.desc.pacifist:"$shroud.4500.desc.1$$utopia.3306.desc.2$\n\nความหมดความอดทนรวดเร็วของมันข่มขู่คุกคามเราอย่างยิ่ง จิตสำนึกของเราจะยอมโอบรับสิ่งมีชีวิตอสูรร้ายเช่นนี้ลงได้จริงหรือ?"
 shroud.4500.desc.non_pacifist:"$shroud.4500.desc.1$$utopia.3306.desc.2$\n\nน้ำเสียงของมันส่อเจตนาร้อนรนอยากจะเริ่มต้นการล้างผลาญในเร็ววัน"
 shroud.4500.a:"จัดตั้งทำพันธสัญญากับ $the_eater_of_worlds_color_article$"

 shroud.4505.desc.intro:"ทุกอย่างเสร็จสิ้นแล้ว เราจัดตั้งทำพันธสัญญากับ $the_eater_of_worlds_color_article$ ลุล่วง เจตจำนงของมันแผ่กระจายไหลเวียนผ่านทั่วตัว §H[Root.GetName]§!"
 shroud.4505.desc.outro:"ในขณะที่เราเริ่มผูกมัดสายใยเข้าด้วยกัน ตัวผู้กินโลกได้ทวงค่าเครื่องเซ่นไหว้บูชา: ประชากรทั้งหมดของหนึ่งในเขตเมืองใหญ่ของเราอันตรธานหายตัวไปในทันที นับเป็นราคาประเมินเล็กน้อยที่ต้องแลกชดใช้ชำระไป - ยกเว้นเสียแต่ว่าผู้กินโลกรายนี้จะกลับมาหิวโหยอีกครั้ง"
 shroud.4505.desc.default: "$shroud.4505.desc.intro$\n\n[GetEaterCovenantFormedDesc]\n\n$shroud.4505.desc.outro$"
 shroud.4505.desc.hive: "$shroud.4505.desc.intro$\n\n[GetEaterCovenantFormedDesc]\n\n$shroud.4505.desc.outro$"
 shroud.4505.desc.gestalt_machine: "$shroud.4505.desc.hive$"
 shroud.4505.desc.individual_machine:"$shroud.4505.desc.intro$\n\nความเปลี่ยนแปลงรูปแบบโครงสร้างในสังคมของเราผุดขึ้นประจักษ์ชัดให้สัมผัสได้แล้ว ยูนิตกองทัพทหารของเรามีความแน่วแน่เฝ้าฝันหาแต่การสู้ศึกสงคราม ในช่วงเวลาสงบสุขไร้ศึก พวกเขาจำต้องโดนจัดระบบให้เข้าทดสอบโปรแกรมจำลองการรบที่ตึงเครียดหนักหน่วง มิฉะนั้นความกระสับกระส่ายของพวกเขาจะแปรสภาพกลับกลายเป็นความดิบเถื่อนร้ายแรง\n\n$shroud.4505.desc.outro$"
 shroud.4505.desc_2_pacifist:"การแปรเปลี่ยนในทางจิตสำนึกสังคมเริ่มก่อตัวแสดงเด่นชัดขึ้นมาแล้ว จิตใจนึกคิดของเรากำลังตกอยู่ในสภาวะความขัดแย้งขัดขืนกับรสชาติการห้ำหั่นทางทหาร ความคลาดเคลื่อนสั่นสะเทือนทางจิตวิญญาณระดับจิตสำนึกนี้สร้างความปั่นป่วนอึดอัดจิตใจอย่างมหาศาลท่ามกลางกลุ่มประชากรที่รักความสงบเรียบง่ายดั้งเดิมของเรา นี่เราเลือกเดินเส้นทางที่ถูกต้องจริงหรือ?"
 shroud.4505.desc_2_organic_non_gestalt:"การแปรเปลี่ยนในทางจิตสำนึกสังคมประจักษ์ชัดถ้อยคำขึ้นชัดเจน บุคลากรสายงานกองทัพของเราเฝ้าหิวกระหายหาศึกสงครามยิ่งชีพ ในช่วงที่สภาวะจักรวรรดิสงบสันติภาพ พวกเขาจำต้องโดนขับเคี่ยวฝึกปรืออย่างหนักหน่วงเหน็ดเหนื่อยตลอดวัน มิฉะนั้นอาการกระสับกระส่ายกระหายชัยชนะจะผลักดันพวกเขาสู่สัญชาตญาณสัตว์ป่าดุร้าย"
 shroud.4505.desc_2_machine_non_gestalt:"ความเปลี่ยนแปลงในสังคมของเราสามารถตรวจพบได้แล้ว ยูนิตทหารของเราต่างพากันจดจ่อห้ำหั่นแต่เรื่องการรบพุ่ง ในเวลาที่บ้านเมืองสงบศึกปกติ พวกเขาต้องโดนคุมสติทดสอบในโปรแกรมจำลองการรบตึงมือ มิฉะนั้นอาการส่อความกระวนกระวายใจทำงานจะพุ่งเข้าสู่แนวทางโหดร้ายป่าเถื่อน"
 shroud.4505.desc_2_gestalt:"ความเปลี่ยนแปลงในสังคมของเราสามารถตรวจพบได้แล้ว [GetIndividualNamePlural] ทหารของเราต่างพากันจดจ่อห้ำหั่นแต่เรื่องการรบพุ่ง ในเวลาที่บ้านเมืองสงบศึกปกติ พวกเขาต้องโดนควบคุมให้เข้าทดสอบในโปรแกรมจำลองการรบตึงมือ มิฉะนั้นพวกมันจะผันตัวไปแสดงออกความรุกรานที่ไร้ประโยชน์อันจำเป็น"
 shroud.4505.a.default:"ขออย่าให้เป็นเช่นนั้นเลย"
 shroud.4505.a.gestalt:"นับว่าสมควรแก่ราคาที่ต้องชำระแลกเปลี่ยนไป"

 shroud.4510.desc.intro:"ช่วงระยะเวลากาลเวลาหนึ่งพ้นผ่านเลยไปนับหลังจากที่เราเริ่มจัดตั้งรากฐานพันธสัญญากับ "
 shroud.4510.desc.outro:" สายสัมพันธ์ยึดโยงของเรายังคงบางเบาอ่อนแออยู่ ดังนั้นเราจึงยังคงได้รับโอกาสช่วงชิงที่จะเพิกถอนทำลายมันลงได้ - หรือเลือกที่จะส่งเสริมบำรุงให้มันเข้มแข็งยิ่งขึ้น\n\n[GetTelepathPlural] ของเราตัดสินชี้ทางแจงว่าการยืนยันคำปฏิญาณรับรองจะอนุญาตให้เราดึงเอาอานุภาพพลังที่ประทานจากผู้อุปถัมภ์มาเปิดใช้งานได้คล่องตัวยิ่งขึ้น พร้อมทั้งมอบการอัปเกรดขีดความสามารถสำหรับกองยานรบและ $PSIONIC_AURA$ ของเรา"
 shroud.4510.desc: "$shroud.4510.desc.intro$$the_eater_of_worlds_color_article$$shroud.4510.desc.outro$"
 shroud.4510.b:"ประกาศละทิ้งและตัดขาดสายใยจาก $the_eater_of_worlds_color_article$"

 shroud_eater_covenant_chain_title: "$eater_covenant_chain_title$"
 shroud_eater_covenant_chain_desc.intro:"เราได้ริเริ่มกุมสร้างพันธะผูกพันกับตัวตนแห่งม่านพลังที่รู้จักกันในนาม $the_eater_of_worlds_color_article$ มันผู้ไม่รู้จักอิ่มและโหยหาเขมือบทำลาย ยอมหยิบยื่นเสเศษเสี้ยวพลังงานของมันให้เราแลกเปลี่ยนกับเครื่องเซ่นไหว้\n\n[GetTelepathPlural] ของเราเสนอแนวทางทฤษฎีว่าสายเชื่อมต่อจะลึกซึ้งแน่นหนาขึ้นได้โดยการปรับเปลี่ยนพฤติกรรมและการกระทำของเราให้ตอบสนองเจตจำนงของผู้อุปถัมภ์"
 shroud_eater_covenant_chain_desc:"$shroud_eater_covenant_chain_desc.intro$\n\nผู้กินโลกหิวกระหายด้วยความกระวนกระวายใจยิ่ง มันต้องการศึกสงคราม รสสัมผัสอันแสนชุ่มฉ่ำของสงครามความขัดแย้งและหยาดน้ำตาเสียงคร่ำครวญวิโยค"
 shroud_eater_covenant_chain_begin: "$eater_covenant_chain_begin$"
 shroud_eater_covenant_chain_end: "$eater_covenant_chain_end$"

 robot_shroud_eater_covenant_chain_title: "$shroud_eater_covenant_chain_title$"
 robot_shroud_eater_covenant_chain_desc:"$shroud_eater_covenant_chain_desc.intro$\n\nผู้กินโลกหิวกระหายด้วยความกระวนกระวายใจยิ่ง มันต้องการศึกสงคราม รสสัมผัสอันแสนชุ่มฉ่ำของเปลวเพลิงและการล้างผลาญล่มสลาย"

 # Instrument of Desire
 shroud.4550.title: "$utopia.3304.name$"
 shroud.4550.desc.default:"ทันทีที่เรากระโจนลึกลงสู่ม่านพลัง ตัวตนหนึ่งก็ยื่นมือเข้ามาหาเรา ความคิดของมันม้วนเกลียวพันรอบจิตวิญญาณสติสัมปชัญญะของ [GetTelepathPlural] ของเรา ทั้งต่อรองและหว่านล้อม มันคือ $the_instrument_of_desire_color_article$ และมันจะประทานสมบัติพัสถาน พลัง อำนาจบารมีเกียรติยศแก่เรา... ทุกสิ่งที่เราเคยเพ้อฝันต้องการ ทั้งหมดที่เราจะมีวันปรารถนาอยากครอบครอง\n\nราคาชดใช้แลกเปลี่ยนน่ะรึ? เป็นเรื่องเล็กน้อยยิ่งนัก แทบไม่ต่างอะไรจากค่าเข้าใช้บริการเบื้องต้นทั่วไป มันเพียงปรารถนาในสิ่งที่ดีที่สุดสำหรับเราเท่านั้น มันจะเข้าคอยให้การช่วยเหลือ นำพาแนวทาง ชี้นำเป้าหมายความทะเยอทะยานและห้วงฝันนิมิตของเรา\n\n§Hหากเพียงแต่เรายอมเปิดรับมันเข้าสู่หัวใจของเรา§!\n\nมันเชื่อมั่นอย่างเต็มเปี่ยมว่าเราจะตอบตกลงรับข้อเสนอ จะมีเหตุผลกลใดที่เราจะไม่ตกปากรับข้อเสนอนี้ไปได้กันเล่า?"
 shroud.4550.desc.hive: "$shroud.4550.desc.default$"
 shroud.4550.desc.gestalt_machine:"ทันทีที่เรากระโจนลึกลงสู่ม่านพลัง ตัวตนหนึ่งก็ยื่นมือเข้ามาหาเรา ความคิดของมันม้วนเกลียวพันรอบแผงวงจรระบบประมวลผลของ [GetTelepathPlural] ของเรา ทั้งต่อรองและหว่านล้อม มันคือ $the_instrument_of_desire_color_article$ และมันจะประทานสมบัติพัสถาน พลัง อำนาจบารมีเกียรติยศแก่เรา... ทุกสิ่งที่เราเคยเพ้อฝันต้องการ ทั้งหมดที่เราจะมีวันปรารถนาอยากครอบครอง\n\nราคาชดใช้แลกเปลี่ยนน่ะรึ? เป็นเรื่องเล็กน้อยยิ่งนัก แทบไม่ต่างอะไรจากค่าเข้าใช้บริการเบื้องต้นทั่วไป มันเพียงปรารถนาในสิ่งที่ดีที่สุดสำหรับเราเท่านั้น มันจะเข้าคอยให้การช่วยเหลือ นำพาแนวทาง ชี้นำเป้าหมายความทะเยอทะยานและห้วงฝันนิมิตของเรา\n\n§Hหากเพียงแต่เรายอมเปิดรับนำรหัสของมันเข้าสู่ระบบเมนเฟรมหลักของเรา§!\n\nมันเชื่อมั่นอย่างเต็มเปี่ยมว่าเราจะตอบตกลงรับข้อเสนอ จะมีเหตุผลกลใดที่เราจะไม่ตกปากรับข้อเสนอนี้ไปได้กันเล่า?"
 shroud.4550.desc.individual_machine: "$shroud.4550.desc.gestalt_machine$"
 shroud.4550.a:"จัดตั้งทำพันธสัญญากับ $the_instrument_of_desire_color_article$"

 shroud.4555.desc.intro:"ทุกอย่างเสร็จสิ้นแล้ว เราจัดตั้งทำพันธสัญญากับ $the_instrument_of_desire_color_article$ เจตจำนงของมันแผ่กระจายไหลเวียนผ่านทั่วตัว §H[Root.GetName]§!"
 shroud.4555.desc.outro:"นี่คือราคาของสายสัมพันธ์ยึดโยงของเรา จากรายงานของ [GetTelepathPlural] ของเรา พรอันประเสริฐที่สุดของเครื่องดนตรีแห่งความปรารถนายังมาไม่ถึง"
 shroud.4555.desc.default:"$shroud.4555.desc.intro$\n\nผลลัพธ์ของข้อตกลงเริ่มแสดงให้เห็นประจักษ์ชัดแล้ว ในขณะที่เราเฝ้ารอยุคทองแห่งความมั่งคั่งและรุ่งโรจน์ตามคำสัญญา ประชาชนกลับไม่พึงพอใจต่อปัจจัยสี่ขั้นพื้นฐานในการยังชีพอีกต่อไป ในเวลานี้ [Root.GetSpeciesNamePlural] เฝ้าต้องการของกินของใช้ทางวัตถุสารทุกรูปแบบ - อันกลายเป็นภาระหนักอึ้งชิ้นใหม่ต่อระบบเศรษฐกิจการเงินของเรา\n\n$shroud.4555.desc.outro$"
 shroud.4555.desc.hive:"$shroud.4555.desc.intro$\n\nผลลัพธ์ของข้อตกลงเริ่มแสดงให้เห็นให้สัมผัสได้แล้ว ในขณะที่เราเฝ้ารอยุคทองแห่งผลผลิตที่ไม่มีใครเทียบตามคำสัญญา ความต้องการปัจจัยพื้นฐานขั้นต้นของโดรนทำงานของเรากลับสูงขึ้น ในเวลานี้ [Root.GetSpeciesNamePlural] ในทุกหนแห่งเฝ้าเรียกร้องสินค้าอำนวยความสะดวกที่ไม่จำเป็นหลายชิ้น - อันกลายเป็นภาระชิ้นใหม่ต่อระบบเศรษฐกิจของเรา\n\n$shroud.4555.desc.outro$"
 shroud.4555.desc.gestalt_machine: "$shroud.4555.desc.hive$"
 shroud.4555.desc.individual_machine: "$shroud.4555.desc.default$"
 shroud.4555.a.default:"ขอให้สิ่งทฤษฎีคาดการณ์ของพวกนั้นถูกต้องตรงจริงเถิด"
 shroud.4555.a.gestalt:"เราเชื่อว่าผลงานประเมินของพวกนั้นถูกต้องแม่นยำ"

 shroud.4560.desc: "$shroud.4510.desc.intro$$the_instrument_of_desire_color_article$$shroud.4510.desc.outro$"
