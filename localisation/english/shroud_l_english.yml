 tech_psionic_aura: "$PSIONIC_AURA$"
 tech_psionic_aura_desc:"กระแสพลังจิตที่แผ่ออกมาจากชราวด์นำพาความโปรดปรานของเอนทิตีเข้าสู่โลกความเป็นจริง จักรวรรดิที่มีระดับความสอดคล้องกับผู้อุปถัมภ์แห่งชราวด์จะแผ่สนามพลัง $PSIONIC_AURA$ จากจุดที่ประชากรพลังจิตของพวกเขาอาศัยอยู่อย่างหนาแน่น"
 feature_unlock_psionic_aura: "$PSIONIC_AURA_PLURAL$"
 feature_unlock_psionic_aura_desc:"อนุญาตให้จักรวรรดิที่มีระดับความสอดคล้องจิตกับผู้อุปถัมภ์ชราวด์สามารถแผ่สนามพลัง $PSIONIC_AURA$ จากจุดที่ประชากรพลังจิตของพวกเขาอาศัยอยู่อย่างหนาแน่น"
 psionic_aura_delve_success_tt:"โอกาสความสำเร็จเมื่อสำรวจชราวด์: §G+$@delve_success_tier_1|0$%§!"

 tech_aura_intensification:"การเพิ่มความเข้มข้นของ $PSIONIC_AURA$"
 tech_aura_intensification_desc:"คลื่นกระแสพลังจิตจากชราวด์ต้องการการแผ่ขยาย ด้วยความเข้าใจใหม่นี้ ออร่าพลังจิต $PSIONIC_AURA_PLURAL$ ของจักรวรรดิจะสามารถพัฒนาความเข้มข้นและแผ่ขยายครอบคลุมไปทั่วระบบดาวต่างๆ นำมาซึ่งผลประโยชน์แก่พันธมิตรและจุดอ่อนแก่ศัตรู"
 feature_allow_psionic_aura_intensity_spread:"การแพร่กระจายของ $PSIONIC_AURA$"
 feature_allow_psionic_aura_intensity_spread_desc:"อนุญาตให้ออร่า $PSIONIC_AURA_PLURAL$ แพร่กระจายไปยังระบบดาวใกล้เคียง ได้ไกลสุดถึง §Y[Owner.GetAuraHyperlaneRange]§! เส้นทางไฮเปอร์เลนจากแหล่งกำเนิด"
 feature_allow_psionic_aura_intensity_growth:"การเติบโตของ $PSIONIC_AURA$"
 feature_allow_psionic_aura_intensity_growth_desc:"อนุญาตให้ออร่า $PSIONIC_AURA_PLURAL$ เติบโตเพิ่มระดับความเข้มข้นขึ้นได้"
 aura_intensification_delve_success_tt:"โอกาสความสำเร็จเมื่อสำรวจชราวด์: §G+$@delve_success_tier_2|0$%§!"

 tech_psionic_suppression:"การสะกดคลื่นพลังจิต"
 tech_psionic_suppression_desc:"อุปกรณ์ที่ใช้บรรเทาหรือต้านทานพลังงานทางจิตนั้นสร้างขึ้นได้ยากพอๆ กับการทำความเข้าใจมัน นั่นเป็นเพราะความซับซ้อนอย่างยิ่งของการรับมือกับกองกำลังต่างมิติ"
 tech_psionic_suppression_feature_tt:"$i_unlocks_feature$ ปลดล็อกขีดความสามารถในการก่อสร้างเครื่องผนึกชราวด์ §Yตรา ประทับ§! และเครื่องสะกดจิต §Yการ กลั่น แกล้ง§!"

 tech_aura_resonation:"การสะท้อนพ้องของสนามพลังออร่า"
 tech_aura_resonation_desc:"ยังมีวิธีการที่จะแผ่กระจายออร่าพลังจิต $PSIONIC_AURA_PLURAL$ ออกไปให้พ้นจากโลกที่มีประชากรหนาแน่น ด้วยการติดตั้ง $sm_aura_emitter$ จะส่งผลให้แม้แต่สถานีอวกาศก็สามารถกลายเป็นสื่อนำสำหรับการส่งผ่านพลังจิตที่แผ่ออกมาจากชราวด์ได้"

