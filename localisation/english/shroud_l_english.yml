 concept_secret_societies_factions_desc:"กลุ่มการเมืองสมาคมลับจะช่วยเพิ่มค่าน้ำหนักทางการทูต §Hความเข้มสี§!, ความเร็วในการหาข่าวกรอง §Hความเร็วการแทรก§!, และอัตราการเจริญเติบโตของความไว้ใจ §Hการ เพิ่ม พูน ความ ไว้ วางใจ§! แทนที่จะมอบค่าความสามัคคี $i_unity$"

