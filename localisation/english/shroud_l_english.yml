 shroud.512.desc_anglers:"เรือประมงได้ค้นพบแนวปะการังที่ซ่อนอยู่ใต้ผืนน้ำของดาว §H[This.GetName]§! พื้นที่นี้ซึ่งเคยคิดว่าแห้งแล้งและไม่มีสิ่งมีชีวิต แท้จริงแล้วกลับเป็นแหล่งที่อยู่อันอุดมสมบูรณ์ของระบบนิเวศน์สัตว์น้ำที่สามารถนำมาเก็บเกี่ยวเพื่อบริโภคได้จำนวนมาก"

 # Good luck event 4
 shroud.517.title:"ปล่องพลังงานความร้อนใต้พิภพ"
 shroud.517.desc:"หลังจากการเคลื่อนตัวของแผ่นเปลือกโลก รอยแยกได้เปิดออกภายใต้อ่างเก็บน้ำใต้ดินขนาดใหญ่บนดาว §H[This.GetName]§! ความร้อนจากเนื้อโลกของดาวกำลังต้มน้ำที่กักเก็บไว้ ส่งผลให้เกิดปล่องพลังงานความร้อนใต้พิภพพุ่งขึ้นมาบนพื้นผิว\n\nปรากฏการณ์ธรรมชาติตี้ช่วยมอบโอกาสให้เราได้ขยายโครงสร้างพื้นฐานด้านพลังงานของอาณานิคมด้วยโรงไฟฟ้าความร้อนใต้พิภพและเครื่องปั๊มความร้อนใหม่"

 # Good luck event 5
 shroud.522.title:"ตรวจพบกระแสอนุภาคควอนตัม"
 shroud.522.desc:"การหมุนวนที่ผิดปกติขององค์ประกอบย่อยของอะตอมได้ปรากฏขึ้นโดยธรรมชาติในระบบดาว §H[This.GetName]§! กระแสอนุภาคควอนตัมนี้แสดงให้เห็นถึงการมีปฏิสัมพันธ์ของอนุภาคย่อยที่หายากหลากหลายรูปแบบในทุกๆ วินาที ช่วยมอบข้อมูลที่น่าทึ่งเกี่ยวกับธรรมชาติที่แท้จริงของพลศาสตร์ควอนตัม\n\nการมุ่งเน้นศึกษาฟิลด์ควอนตัมนี้จะช่วยให้เราเข้าใจหน่วยสร้างพื้นฐานที่สำคัญของจักรวรรดิและตัวจักรวาลของเราได้ดียิ่งขึ้น"

 # Good luck event 6
 shroud.527.title:"ค้นพบสัญญาณคลื่นสะท้อนข้ามมิติ"
 shroud.527.desc:"ทีมนักวิจัย [From.GetResearchers] ของเราตรวจพบการสะสมของสัญญาณคลื่นเวลาพร้อมกันในระบบดาว §H[This.GetName]§!\n\nการวิเคราะห์ขั้นต้นระบุว่าสัญญาณเหล่านี้ส่งผ่านมาลักษณ์จากมิติอื่นที่อยู่เหนือมิติของเรา การแปลข้อมูลในระยะแรกชี้ให้เห็นว่าข้อความเหล่านี้เกี่ยวข้องกับหลักการเชิงตรรกะและปัญหาเชิงปรัชญา บางทีนี่อาจเป็นความพยายามสร้างปฏิสัมพันธ์ทางปัญญาจากเอนทิตีที่อยู่เหนือความเข้าใจของเรา\n\nหากเราเชื่อมต่อช่องทางรับส่งสัญญาณโดยตรงกับคลื่นเหล่านี้ เราจะสามารถติดตามและติดตามผลข้อมูลความรู้ที่เผยแพร่ออกมาต่อไปได้"

 # Good luck event 7
 shroud.532.title:"ค้นพบซากยานอวกาศที่ก้าวล้ำ"
 shroud.532.desc:"ซากยานร้างดวงหนึ่งได้ปรากฏขึ้นในระบบดาว §H[This.GetName]§! [From.GetQuantumParticleStreamDiscoveredExtra]\n\nเราคาดการณ์ว่ายานลำนี้ไม่ได้รับการตรวจพบในระบบดาวนี้มาเป็นเวลานานหลายพันปี และเพิ่งจะเปิดเผยตัวตนออกมาหลังจากเครื่องผลิตพลังงานแสงอาทิตย์ของมันทำงานผิดพลาด ไม่มีสัญญาณชีพใดๆ บนยาน และเราได้เริ่มต้นเข้าแยกชิ้นส่วนของยานอย่างรอบคอบเพื่อเรียนรู้เทคโนโลยีให้ได้มากที่สุด"
 shroud.532.extra:"ยานรบที่เสียหายเกินกว่าจะซ่อมแซมได้ลำนี้มีความสามารถในการสร้างสนามพลังงานพรางตัวในบางรูปแบบ และโดยรวมแล้วถือว่ามีความก้าวหน้าทางยุทธวิธีมากกว่ากองยานรบของเราเองอย่างมาก"
 shroud.532.extra_first_contact:"ยานรบที่เสียหายเกินกว่าจะซ่อมแซมได้ลำนี้เปิดใช้งานระดับเทคโนโลยีการพรางตัวขั้นสูงที่ไม่มีใครเทียบเคียงได้"
 shroud.532.a:"ของขวัญล้ำค่าจากดวงดาว"

 # Good luck event 8
 shroud.537.title:"กระบวนการโลหะวิทยาใต้พิภพ"
 shroud.537.desc:"ความเคลื่อนไหวทางความร้อนใต้พิภพเริ่มมีความผันผวนอย่างรุนแรงลึกลงไปใต้พื้นผิวของดาว §H[This.GetName]§! การดันตัวของแมกมาใต้ดินได้เพิ่มพูนทะลวงผ่านเปลือกโลกของดาวเข้าไปยังแหล่งแร่ที่ยังไม่ได้รับการขุดค้นหลายจุด\n\nปรากฏการณ์ทางธรณีวิทยานี้ช่วยหลอมเหลวและให้ความร้อนแก่แร่ธาตุบางส่วน ส่งผลให้สายแร่โลหะหลอมเหลวเข้าด้วยกันเป็นโลหะผสมที่เป็นของแข็ง ด้วยเหตุนี้ ปฏิบัติการทำเหมืองแร่บนดาวจะผลิตชิ้นส่วนโลหะที่พร้อมใช้งานได้โดยตรง"

 # Good luck event 9
 shroud.543.title:"ยานลาดตระเวนที่ถูกละทิ้ง"
 shroud.543.desc:"ตรวจพบยานรบลาดตระเวนที่รกร้างว่างเปล่าดริฟต์ลอยตัวอยู่ภายในระบบดาว §H[From.GetName]§! รูปแบบการออกแบบยานรบลำนี้ไม่คล้ายคลึงกับของจักรวรรดิใดๆ ที่เรารู้จัก โดยไม่มีธงหรือสัญลักษณ์ที่สามารถจดจำได้\n\nหลังจากผ่านการประเมินสภาพอย่างถี่ถ้วนและการซ่อมแซมเล็กน้อย ทีมงาน [This.GetEngineerPlural] ของเราประกาศว่ายานลำนี้พร้อมที่จะเข้าปฏิบัติหน้าที่รบการศึกได้แล้ว"
 shroud.543.a: "$shroud.532.a$"
 shroud.543.tt:"ได้รับยานรบระดับเรือลาดตระเวน(เสียงม้า)หนึ่งลำในระบบดาวนี้"

 # Good luck event 10
 shroud.545.title: "[This.GetSenseOfOptimismTitle]"
 shroud.545.title_default:"จิตวิญญาณแห่งความหวัง"
 shroud.545.title_gestalt:"ความพร้อมเพรียงเป็นเอกภาพ"
 shroud.545.desc:"กระแสความหวังอันลึกลับที่อธิบายไม่ได้กำลังแผ่ขยายไปทั่วโลกประชากรของ [This.GetAdjective] ประชากรมีความพึงพอใจ สะดวกสบาย และพึงพอใจกับการดำรงอยู่ของพวกเขาเพิ่มขึ้นเล็กน้อย การเปลี่ยนแปลงอารมณ์ร่วมกันครั้งนี้เป็นผลมาจากการจัดเรียงตัวของดวงดาวดวงที่เหมาะสมที่สุด และถือเป็นลางดีสำหรับอนาคตของดาว §H[This.GetName]§!"
 shroud.545.desc_gestalt:"กลุ่มร่วม §H[This.GetName]§! กำลังดำเนินงานประสานประสานเป็นหนึ่งเดียวภายใต้จุดประสงค์การทำงานที่เด่นชัด ความพร้อมเพรียงเป็นเอกภาพนี้มีสาเหตุมาจากการจัดเรียงตัวของดวงดาวในตำแหน่งที่เหมาะสมที่สุด และเป็นสัญญาณแสดงถึงความเจริญรุ่งเรืองที่กำลังจะมาถึง"
 shroud.545.a:"ดวงดาวส่องแสงสว่างไสวเป็นใจให้แก่เรา"

 # Good luck event 11
 shroud.553.title:"ตำแหน่งดวงดาราตรีโกณส่งผลดี"
 shroud.553.desc:"วัตถุบนท้องฟ้าสามดวงในระบบดาว §H[From.GetName]§! ได้โคจรมาเรียงตัวกันเป็นมุมตรีโกณส่งผลดี; ได้แก่ดาว §H[favorable_trine_planet_1.GetName]§!, §H[favorable_trine_planet_2.GetName]§!, และ §H[favorable_trine_planet_3.GetName]§!\n\nการเรียงตัวของดวงดาวทางโหราศาสตร์ที่เป็นคุณประโยชน์นี้ช่วยนำความสงบสุขและความประสานกลมเกลียวมาสู่อาณานิคมของเราบนดาว §H[This.GetName]§!"
 shroud.553.a:"เหตุการณ์ครั้งหนึ่งในชีวิต"

 # Good luck event 12
 shroud.555.title:"[auspicious_position_planet.GetName] โคจรในตำแหน่งมงคล"
 shroud.555.desc:"ดาว §H[auspicious_position_planet.GetName]§! กำลังโคจรอยู่ในตำแหน่งมงคลบนท้องฟ้าเหนือดาว §H[root.capital_scope.GetName]§! ปักหลักอยู่ในเรือนราศีแห่งการหวนคืนของดวงดารา\n\nนี่เป็นสัญลักษณ์ของการเริ่มต้นวัฏจักรภายในดวงดาราใหม่สำหรับ [root.GetName] และเป็นโอกาสทองสำหรับการเจริญเติบโตและการปรับปรุงพัฒนาต่อไป"

 # Good luck event 13
 shroud.560.title:"ความสมดุลแห่งธาตุธรรมชาติ"
 shroud.560.desc:"ค่าชี้วัดทางโหราศาสตร์ที่วัดผลได้ทั้งหมดระบุว่าอาณานิคม [This.GetName] อยู่ในความสมดุลของธาตุอย่างสมบูรณ์แบบ\n\nด้วยการบริหารจัดการเส้นชีพมังกร(สายเล่น)ที่แม่นยำ สมดุลที่เป็นประโยชน์นี้จะสามารถรักษาไว้ได้เป็นระยะเวลาที่ยาวนาน ช่วยมอบสภาพแวดล้อมที่เหมาะสมสูงสุดเพื่อให้ผู้นำของเราสามารถเจริญเติบโตพัฒนาได้เป็นอย่างดี"
 shroud.560.a:"ช่างเป็นโชคชะตาที่ยอดเยี่ยมเหลือเกิน"

 # Good luck event 14
 shroud.568.title:"ดวงประทีปเจิดจ้า"
 shroud.568.desc:"ดวงดาวประทีปหลักในระบบดาว §H[From.GetName]§! กำลังส่องแสงประกายด้วยความเจิดจ้าที่ผิดปกติ หลังจากหารือเกี่ยวกับปรากฏการณ์นี้กับผู้เชี่ยวชาญด้านโหราศาสตร์แล้ว เราเข้าใจว่าพลังงานส่วนเกินของมันจะช่วยส่งเสริมประสิทธิภาพการผลิตพลังงานไฟฟ้าทุกรูปแบบบนดาว §H[This.GetName]§!"
 shroud.568.a:"ขอให้ดวงดาราส่องแสงนำทางให้แก่เราตลอดไป"

 # Good luck event 15
 shroud.570.title:"สมาชิกสภาประสานจิต"
 shroud.570.desc:"สองสมาชิกสภาของเรา ได้แก่ §H[councilor_harmony_leader_1.GetTitle] [councilor_harmony_leader_1.GetName]§! และ §H[councilor_harmony_leader_2.GetTitle] [councilor_harmony_leader_2.GetName]§! เพิ่งจะค้นพบว่าราศีเกิดทางโหราศาสตร์ของพวกเขานั้นสอดประสานกันได้อย่างสมบูรณ์แบบ\n\nการจับมือเป็นพันธมิตรทางการเมืองของพวกเขานับตั้งแต่นั้นมาได้รวบรวมรัฐบาลของเราภายใต้ความเคารพซึ่งกันและกันและประสิทธิภาพการทำงาน ช่วยเร่งกระบวนการทางกฎหมายหลายประการให้รวดเร็วขึ้น"
 shroud.570.a:"การเข้าคู่กันที่ยอดเยี่ยม"

 # Good luck event 16
 shroud.575.title:"มีค่ามากกว่าสิ่งภายนอกที่เห็น"
 shroud.575.desc:"ในระหว่างการจัดระเบียบสารบัญตามปกติ ตัวอย่างงานวิจัยชิ้นหนึ่งที่ไม่ได้รับการป้องกันรัดกุมได้ร่วงหล่นลงบนพื้นของหอสมุดประวัติศาสตร์อัญมณี §H$grand_archive$§! และได้รับการส่งมอบให้ผู้ดูแลอนุรักษ์ตรวจสอบอย่างใกล้ชิดทันที\n\nสิ่งที่น่าแปลกใจคือ มีช่องลับซ่อนอยู่ด้านในได้รับการเปิดออกเนื่องจากอุบัติเหตุดังกล่าว ภายในช่องเก็บของที่เคยหลุดรอดสายตาไป ประกอบไปด้วยโบราณวัตถุที่น่าสนใจหลากหลายประเภทซึ่งเราสามารถนำมาสะสมเพิ่มเติมได้"
 shroud.575.a:"ของขวัญที่ยังคงคอยมอบประโยชน์ให้แก่เราอย่างต่อเนื่อง"

# Bad luck events
 # Bad luck event 1
 shroud.700.title:"ความไม่ประสานร้าวฉาน"
 shroud.700.desc:"มีความรู้สึกตื่นตระหนกและหวาดกลัวต่อลางร้ายที่หลีกเลี่ยงไม่ได้แผ่ซ่านไปทั่วในหมู่ประชากรบนโลกของเรา ประชาชนรู้สึกวิตกกังวล ไขว้เขว และไม่พึงพอใจกับการดำรงอยู่ของตนเอง การเปลี่ยนแปลงอารมณ์ร่วมกันครั้งนี้เป็นผลมาจากการจัดเรียงตัวของดวงดาวที่ไม่อยู่ในตำแหน่งที่เป็นใจ"
 shroud.700.desc_gestalt:"มีความรู้สึกไม่สอดประสานร้าวฉานแผ่ซ่านไปทั่วจักรวรรดิ §H[This.GetName]§! ความไม่พร้อมเพรียงกันนี้กำลังนำไปสู่ความหยุดชะงักทั่วทั้งกลุ่มร่วมของเรา และเป็นผลมาจากการจัดเรียงตัวของดวงดาวที่ไม่อยู่ในตำแหน่งที่เป็นใจ"
 HOW_UNFORTUNATE:"ช่างเป็นเรื่องที่น่าเสียใจเหลือเกิน"

 # Bad luck event 2
 shroud.707.title:"การปะทะชนกันของกองยานรบ"
 shroud.707.desc:"ความเข้าใจผิดในการสื่อสารระหว่างการซ้อมรบตามปกติของกองทัพเรือส่งผลให้เกิดการชนกันด้วยความเร็วสูงระหว่างยานรบหลายลำของกองทัพ §H[This.GetName]§! ในระบบดาว §H[This.System.GetName]§!\n\nผู้บัญชาการ [This.GetNavalCollisionLeader] ยืนยันว่าประชากร [From.GetIndividualNamePlural] ที่มีส่วนร่วมรับผิดชอบต่อความผิดพลาดครั้งนี้ได้รับการลงโทษวินัยอย่างเหมาะสมแล้ว"
 shroud.707.leader_name: "§H[Leader.GetName]§!"
 shroud.707.default_name:"กองบัญชาการทหารส่วนกลาง"
 shroud.707.tt:"ยานรบที่ถูกทำลายเสียหายในระบบดาว §H[This.GetName]§!: §R5§! ลำ"

 # Bad luck event 3
 shroud.710.title:"เพลิงไหม้คลังจัดเก็บทรัพยากร"
 shroud.710.desc_default:"ไฟฟ้าลัดวงจรในคลังจัดเก็บทรัพยากรบนดาว §H[silo_fire_planet_targeted.GetName]§! ส่งผลให้เกิดเพลิงไหม้ขนาดใหญ่ลุกลามภายในอาคารคลังสินค้า\n\n$shroud.710.desc$"
 shroud.710.desc_starbase:"ไฟฟ้าลัดวงจรในคลังจัดเก็บทรัพยากรบนสถานีอวกาศของระบบดาว §H[silo_fire_starbase_targeted.Fleet.System.GetName]§! ส่งผลให้เกิดเพลิงไหม้ขนาดใหญ่ลุกลามภายในคลังจัดเก็บสินค้า\n\n$shroud.710.desc$"
 shroud.710.desc:"ระบบดับเพลิงอัตโนมัติขัดข้องชั่วคราว ส่งผลให้ทรัพยากรที่จัดเก็บไว้ภายในส่วนใหญ่ได้รับความเสียหายจากเปลวเพลิง ตัวอาคารคลังสินค้าได้รับความเสียหายหนักเกินกว่าจะซ่อมแซมได้"
 shroud.710.a:"เคราะห์ร้ายจากดวงดาว!"
 shroud.710.tt_default:"คลังสินค้าเก็บทรัพยากร §H$building_resource_silo$§! ถูกทำลายบนดาว §H[silo_fire_planet_targeted.GetName]§!\n$shroud.710.tt$"
 shroud.710.tt_starbase:"คลังสินค้าเก็บทรัพยากร §H$sm_resource_silo$§! ถูกทำลายบนสถานีอวกาศระบบดาว §H[silo_fire_starbase_targeted.Fleet.System.GetName]§!\n$shroud.710.tt$"
 shroud.710.tt:"ทรัพยากรที่สูญเสียไป: §R$@silo_fire_resources_lost|1%$§!"

 # Bad luck event 4
 shroud.715.title:"การทูตที่ขัดเคืองร้าวฉาน"
 shroud.715.desc:"หนึ่งในผู้แทนทางการทูตของเราในสภา [This.GetGalCommunityOrGalImperium] ได้แสดงพฤติกรรมที่ไม่เหมาะสมกับตำแหน่งอย่างไม่ได้ตั้งใจ ในขณะที่กำลังกล่าวสุนทรพจน์เพื่อขอรับการสนับสนุนผลประโยชน์ของเรา เกิดความผิดพลาดในระบบแปลภาษา ส่งผลให้มีการส่งถ้อยคำเสียดสีและคำด่าทอที่เป็นศัตรูไปยังผู้แทน [diplomatic_faux_pas_victim.GetName] เหตุการณ์ที่น่าเสียใจนี้ได้รับการแพร่กระจายไปทั่วสื่อกาแล็กซีและทำลายชื่อเสียงของเรา\n\nขณะที่การกระทำเหล่านี้จะยังไม่ถึงขั้นต้องปลดผู้นำออกทันที ทว่าสถานะและคะแนนเสียงของเราในสภา [This.GetGalCommunityOrGalImperium] ได้รับความเสียหายลงเนื่องจากการกระทำที่ไม่เหมาะสมนี้"
 shroud.715.a:"ความผิดพลาดที่น่าเสียใจอย่างยิ่ง"
 shroud.715.tt:"ผู้แทนการทูต §H[diplomatic_faux_pas_galcom_envoy.GetName]§! ได้รับคุณลักษณะทางลบใหม่: §R$leader_trait_destructive$§! (ผู้สร้างความเสียหาย)"

 # Bad luck event 5
 shroud.720.title:"พายุรังสีสุริยะรุนแรงสุดขีด"
 shroud.720.desc:"การปะทุของพายุสุริยะครั้งใหญ่ที่ไม่เคยมีมาก่อนจากดาวฤกษ์ในระบบ §H[extreme_solar_flare_system.GetName]§! ได้ทำลายระบบการทำงานของสถานีอวกาศโคจรทั้งหมดในระบบดาวลงอย่างราบคาบ\n\nการปะทุของรังสีแกมมาเข้มข้นที่ผิดปกตินี้อยู่เหนือทุกสิ่งที่มีการตรวจวัดและวัดค่าได้มาก่อนหน้านี้จากดาวฤกษ์ดวงนี้ การวิเคราะห์ชั้นบรรยากาศโคโรนาแสดงให้เห็นว่าอายุขัยของดาวฤกษ์ดวงนี้ลดลงไปมากกว่าสามล้านปี"
 shroud.720.desc_storm:"การปลดปล่อยพลังงานส่งผลให้เกิดพายุพลังงานดวงดาว $celestial_storm$ ขึ้นในระบบดาว มาตรการเผชิญเหตุฉุกเฉินกำลังดำเนินการอยู่ในขณะนี้"
 shroud.720.tt:"ทุกสถานีสังเกตการณ์ $observation_station$, สถานีวิจัย $research_station$ และสถานีทำเหมืองแร่ $mining_station$ ในระบบดาว §H[extreme_solar_flare_system.GetName]§! ถูกทำลายทั้งหมด"

 # Bad luck event 6
 shroud.725.title:"อุบัติเหตุการจราจรของผู้มีชื่อเสียง"
 shroud.725.desc:"การเปลี่ยนแปลงของสภาพภูมิอากาศที่คาดไม่ถึงได้รบกวนระบบเครือข่ายขนส่งของเราบนดาว §H[high_profile_traffic_accident_planet.GetName]§! นอกเหนือจากการดีเลย์ในวงกว้างแล้ว สภาพการณ์ดังกล่าวได้ก่อให้เกิดอุบัติเหตุทางรถยนต์จำนวนมาก ซึ่งหนึ่งในอุบัติเหตุนั้นส่งผลกระทบต่อผู้นำ [This.GetClass] §H[This.GetName]§!"
 shroud.725.desc_killed:"$shroud.725.desc$\n\nแม้หน่วยงานบริการช่วยเหลือฉุกเฉินจะรุดหน้าเข้าช่วยเหลืออย่างรวดเร็ว ทว่าอาการบาดเจ็บของ [This.GetHisHer] ส่งผลให้เสียชีวิตในเวลาต่อมา"
 shroud.725.desc_killed_machine:"$shroud.725.desc$\n\nน่าเสียดายที่ระบบการทำงานของพวกมันได้รับความเสียหายอย่างรุนแรงเกินกว่าจะกู้คืนหรือซ่อมแซมได้"
 shroud.725.desc_maimed:"$shroud.725.desc$\n\n[This.GetName] รอดชีวิตจากการปะทะชนกัน ทว่าไม่ปลอดภัยร้อยเปอร์เซ็นต์ ความเสียหายที่เกิดขึ้นกับร่างกายนั้นไม่อาจกู้กลับคืนมาได้"
 shroud.725.a:"ช่างเป็นโศกนาฏกรรมที่น่าเศร้าเหลือเกิน"

 # Bad luck event 7
 shroud.730.title:"หลุมยุบขนาดใหญ่ยักษ์"
 shroud.730.desc:"หลุมยุบขนาดใหญ่ได้ปรากฏขึ้นบนพื้นผิวของดาว §H[This.GetName]§! สร้างความเสียหายอย่างหนักแก่สิ่งก่อสร้างพื้นฐาน หนึ่งในรอยแยกได้ขุดตัวเปิดขึ้นใต้ฐานรากอาคารของดาวดวงนี้ ส่งผลให้อาคารพังทลายลงมาบางส่วน โชคดีที่ทุกพื้นที่ที่ได้รับผลกระทบได้รับการอพยพผู้คนสำเร็จลุล่วง\n\nเราไม่สามารถหาสาเหตุที่แน่ชัดของการปรากฏตัวอย่างกะทันหันของช่องทางธรณีวิทยาเหล่านี้ได้ ทว่าเราได้เพิ่มมาตรการตรวจสอบบำรุงรักษาเพื่อเฝ้าสังเกตการณ์การกัดเซาะของหน้าดินสะสมต่อไป"
 shroud.730.a:"เคราะห์ซ้ำกรรมซัดจากดวงดาว..."
 shroud.730.tt:"สิ่งก่อสร้างอาคารพังทลายเป็นซากปรักหักพัง"

 # Bad luck event 7
 shroud.735.title:"การประท้วงวุ่นวายอย่างฉับพลัน"
 shroud.735.desc:"การจลาจลที่เป็นอันตรายได้ปะทุขึ้นทั่วดาว §H[This.GetName]§! ประชากรเต็มไปด้วยความเกรี้ยวกราดในการประท้วงเรื่องทฤษฎีสมคบคิดที่ไม่มีมูลความจริงเกี่ยวกับการเข้าควบคุมการจัดเรียงดวงดาวของรัฐบาล [From.GetAdjective] สิ่งที่เริ่มต้นจากการสาธิตอย่างสันติได้กลายเป็นการจลาจลที่รุนแรงในไม่ช้า โดยกลุ่มผู้ประท้วงได้สร้างความเสียหายเป็นวงกว้างแก่อาคารบ้านเรือนในอาณานิคม\n\nกลุ่มผู้จลาจลได้รับการระงับเหตุและควบคุมตัวโดยกองกำลังรักษาความมั่นคง ทว่าความเสียหายต่อโครงสร้างพื้นฐานของเราจะต้องใช้เวลาในการฟื้นบูรณะ"
 shroud.735.desc_hive:"กลุ่มโดรนที่เบี่ยงเบนแนวคิดได้ก่อกบฏในอาณานิคม §H[This.GetName]§! สร้างความเสียหายเป็นวงกว้าง แม้พวกเขาจะเกรี้ยวกราด ทว่ากองกำลังป้องกันดาวสามารถเข้าควบคุมสถานการณ์ระงับเหตุได้สำเร็จ ทว่าความเสียหายต่อโครงสร้างพื้นฐานจะต้องการเวลาในการฟื้นบูรณะ"
 shroud.735.desc_machine:"ประชากรส่วนน้อยของโดรนบนดาว §H[This.GetName]§! ได้รับการติดเชื้อไวรัสคอมพิวเตอร์ลึกลับ ส่งผลให้พวกมันก่อกบฏและพยายามเข้าทำลายอาณานิคม แม้พวกมันจะทำงานอย่างรุนแรง ทว่ากองกำลังป้องกันดาวสามารถระงับเหตุการทำงานของยูนิตที่ทำงานผิดปกติได้สำเร็จ ทว่าความเสียหายต่อโครงสร้างพื้นฐานจะต้องการเวลาในการฟื้นบูรณะ"
 shroud.735.a:"พวกเราจะบูรณะฟื้นฟูมันขึ้นมาใหม่"

 # Bad luck event 9
 shroud.740.title:"โรคติดต่อระบาดร้ายแรงฉับพลัน"
 shroud.740.desc:"ไวรัสที่มีขีดความสามารถการแพร่เชื้อสูงได้กลายพันธุ์บนพื้นผิวของดาว §H[This.GetName]§! แพร่เชื้อกระจายไปยังประชากรส่วนใหญ่ มาตรการกักกันโรคได้รับการประกาศใช้ เช่น การติดตามประวัติผู้สัมผัสและการจำกัดการเดินทางเคลื่อนย้าย เพื่อจำกัดขอบเขตการแพร่กระจายของโรคและหลีกเลี่ยงการสร้างภาระเกินกำลังแก่ระบบสาธารณสุขในท้องถิ่น"

 # Bad luck event 10
 shroud.745.title:"การเรียงตัวดวงดาราตำแหน่งลางร้ายสี่ดวง"
 shroud.745.desc:"วัตถุบนท้องฟ้าสี่ดวงในระบบดาว §H[From.GetName]§! ได้เรียงตัวกันเป็นสี่เหลี่ยมลางร้าย; ได้แก่ดาว §H[calamitous_quartile_planet_1.GetName]§!, §H[calamitous_quartile_planet_2.GetName]§!, §H[calamitous_quartile_planet_3.GetName]§!, และ §H[calamitous_quartile_planet_4.GetName]§!\n\nปรากฏการณ์ทางโหราศาสตร์ที่เป็นภัยพิบัตินี้จะหว่านเมล็ดพันธุ์แห่งความสงสัยและความร้าวฉานในอาณานิคม §H[This.GetName]§! ส่งเสริมการเกิดความคิดร้าวฉานต่อต้าน [FromFrom.GetDissent] โดยสร้างความแตกแยกในหมู่ประชากร"
 shroud.745.a:"ลางบอกเหตุร้ายแรงอย่างยิ่ง"

 # Bad luck event 11
 shroud.750.title:"[planet_in_retrograde_planet.GetName] โคจรวิถีถอยหลัง(Retrograde)"
 shroud.750.desc:"ประชากรบนดาว §H[planet_in_retrograde_home.GetName]§! สังเกตพบว่าดาว §H[planet_in_retrograde_planet.GetName]§! โคจรวิถีถอยหลังแล้ว นี่เป็นช่วงเวลาสำหรับการทบทวนการกระทำของเราและแสดงความเสียใจต่อความไม่สมบูรณ์แบบของ [This.GetName] ขอให้ช่วงเวลาการพิจารณาไตร่ตรองอันหนักหน่วงนี้ช่วยนำพาเราเข้าใกล้เป้าหมายอุดมคติของเรามากขึ้นในอนาคต"

 # Bad luck event 12
 shroud.755.title:"ความไม่สมดุลแห่งธาตุธรรมชาติ"
 shroud.755.desc:"เป็นที่น่าเสียดายที่ตัวชี้วัดที่วัดผลได้ทั้งหมดระบุว่าดาว [This.GetName] อยู่ในความร้าวฉานของธาตุธรรมชาติอย่างสมบูรณ์\n\nความพยายามในการจัดระเบียบสมดุลที่เประบางนี้ขึ้นมาใหม่จะต้องการเวลาและความยากลำบากอย่างยิ่ง ในสภาวะที่ปั่นป่วนในปัจจุบัน ผู้นำของเราจะไม่สามารถเข้าสู่สภาวะการเข้าฌานทางจิตสัมผัสได้ ซึ่งจะช่วยขัดขวางขีดความสามารถการพัฒนาของพวกเขา"
 shroud.755.a:"ยอมรับไม่ได้ เราจะต้องดำเนินการแก้ไขในเรื่องนี้"

 # Bad luck event 13
 shroud.760.title:"ดวงประทีปหม่นแสง"
 shroud.760.desc:"ดวงดาวประทีปหลักในระบบดาว §H[From.GetName]§! หรี่แสงลงอย่างผิดปกติ หลังจากหารือเกี่ยวกับปรากฏการณ์นี้กับผู้เชี่ยวชาญด้านโหราศาสตร์แล้ว คาดการณ์ว่าความสว่างไสวที่ลดลงนี้จะส่งผลเสียต่อโครงสร้างพื้นฐานพลังงานของดาว §H[This.GetName]§!"
 shroud.760.a:"แต่เป็นแบบนี้ได้อย่างไร?"

 # Bad luck event 14
 shroud.765.title:"สภาร้าวฉาน"
 shroud.765.desc:"สองสมาชิกสภาของเรา ได้แก่ §H[discordant_council_leader_1.GetTitle] [discordant_council_leader_1.GetName]§! และ §H[discordant_council_leader_2.GetTitle] [discordant_council_leader_2.GetName]§! เพิ่งจะเรียนรู้ว่าราศีเกิดทางโหราศาสตร์ของพวกเขานั้นเข้ากันไม่ได้อย่างสิ้นเชิง\n\nการแข่งขันทางการเมืองของพวกเขานับตั้งแต่นั้นมาได้สร้างบรรยากาศของความเกลียดชังและความตึงเครียดขึ้นภายในรัฐบาลของเรา ส่งผลให้กระบวนการทางกฎหมายตามปกติล่าช้าออกไปบ่อยครั้ง"

 # Bad luck event 15
 shroud.770.title:"วาจาที่เลินเล่อ"
 shroud.770.desc_default:"ความคิดเห็นส่วนตัวของผู้บริหารระดับภูมิภาคของเราเกี่ยวกับจักรวรรดิอื่นได้รับการแพร่สัญญาณออกไปยังประเทศเป้าหมายโดยไม่ได้ตั้งใจ หลังจากการสนทนาที่ตึงเครียดเกี่ยวกับระบบตรวจจับสัญญาณบนเส้นทางไฮเปอร์เลน เจ้าหน้าที่การสื่อสารลืมปิดช่องสัญญาณส่งผ่านข้อมูล ส่งผลให้จักรวรรดิ [careless_talk_empire.GetName] ได้รับฟังถ้อยคำสบถวิจารณ์เชิงลบทั้งหมดที่ตามมาหลังจากนั้น\n\n$shroud.770.desc_end$"
 shroud.770.desc_machine:"คำแถลงที่ไม่ได้รับการคัดกรองของผู้ดูแลระบบของเราเกี่ยวกับจักรวรรดิอื่นได้รับการแพร่สัญญาณออกไปยังประเทศเป้าหมายโดยไม่ได้ตั้งใจ หลังจากการสนทนาที่ตึงเครียดเกี่ยวกับระบบตรวจจับสัญญาณบนเส้นทางไฮเปอร์เลน ยูนิตการสื่อสารลืมปิดช่องสัญญาณส่งผ่านข้อมูล ส่งผลให้จักรวรรดิ [careless_talk_empire.GetName] ได้รับฟังถ้อยคำสบถวิจารณ์เชิงลบทั้งหมดที่ตามมาหลังจากนั้น\n\n$shroud.770.desc_end$"
 shroud.770.desc_hive:"คำวิจารณ์เชิงลบของโดรนผู้ดูแลระบบของเราเกี่ยวกับจักรวรรดิอื่นได้รับการแพร่สัญญาณออกไปยังประเทศเป้าหมายโดยไม่ได้ตั้งใจ หลังจากการสนทนาที่ตึงเครียดเกี่ยวกับระบบตรวจจับสัญญาณบนเส้นทางไฮเปอร์เลน โดรนการสื่อสารลืมปิดช่องสัญญาณส่งผ่านข้อมูล ส่งผลให้จักรวรรดิ [careless_talk_empire.GetName] ได้รับฟังถ้อยคำสบถวิจารณ์เชิงลบทั้งหมดที่ตามมาหลังจากนั้น\n\n$shroud.770.desc_end$"
 shroud.770.desc_end:"ความพึงพอใจของประชากร [careless_talk_empire.GetAdjective] ต่อจักรวรรดิ [This.GetName] ได้รับความเสียหายลงอย่างหลีกเลี่ยงไม่ได้"

