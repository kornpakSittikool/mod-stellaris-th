 abomination_army:"ร่างอสูรกายทดลอง"
 abomination_army_desc:"ทหารทาสที่ได้รับการรักษาด้วยการทดลองทางกายภาพอย่างสุดขีดเพื่อเพิ่มความก้าวร้าวและความสามารถในการทำศึก เปลี่ยนให้พวกเขากลายเป็นอาวุธที่มีชีวิต พวกเขาเชื่อฟังคำสั่งของนายเหนือหัวพอๆ กับความเกรี้ยวกราดในสมรภูมิรบ"
 seq_abomination_army:"กองทัพ $abomination_army$ ลำดับที่ $ORD$"

 mindwarden_army:"ผู้พิทักษ์ป้องปัดจิต"
