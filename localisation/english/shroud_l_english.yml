# Experimentation Chambers
 building_experimentation_chambers_1:"ห้องทดลองลับ"
 building_experimentation_chambers_1_desc:"สิ่งอำนวยความสะดวกลับสุดยอดสำหรับการทำการทดลองกับผู้กระทำผิดกฎหมายที่ยากจะแก้ไขส่วนใหญ่ ประกอบไปด้วยห้องขังคุกและห้องปฏิบัติการวิจัยต่างๆ"

 building_experimentation_chambers_2:"อาคารวิจัยและคุมขังทดลอง"
 building_experimentation_chambers_2_desc:"ศูนย์รวบรวมเทคโนโลยีลับสุดยอดและสถานที่กักกันตัวผู้กระทำความผิด ซึ่งประชากร [Owner.GetIndividualNamePlural] จะถูกใช้เป็นกลุ่มตัวอย่างในการทำการทดลองโดยนักวิจัยระดับแนวหน้า [Owner.GetResearchers] ของจักรวรรดิ"

 building_experimentation_chambers_3:"ศูนย์เครือข่ายวิจัยและควบคุมตัว"
 building_experimentation_chambers_3_desc:"เครือข่ายศูนย์รักษาความปลอดภัยขั้นสูงสุดและสถาบันวิจัยการกักกันตัว ทีมงานผู้เชี่ยวชาญ [Owner.GetResearchers] จะดำเนินการศึกษาการทดลองบุกเบิกกับประชากร [Owner.GetIndividualNamePlural] ที่นำตัวมาจากกลุ่มนอกกฎหมายใต้ดินของจักรวรรดิ"

# Lifecrypt
 # Lifecrypt (Normal)
 building_lifecrypt_1:"หอคอยสูบพลังชีวิต"
 building_lifecrypt_1_desc:"อุปกรณ์ขนาดใหญ่โตเหล่านี้มีความสามารถในการสูบพลังงานส่วนเกินจากกลุ่มประชากรเป้าหมายในระยะประชิด บุคคลที่ถูกมอบหมายงานจะสวมใส่อุปกรณ์เฉพาะทางที่จะช่วยส่งพลังชีวิตเข้าสู่แกนกลางส่งผ่าน ก่อนที่จะถูกแจกจ่ายไปยังชนชั้นที่มีสถานะสูงกว่า"

 building_lifecrypt_2:"เครื่องสูบวิญญาณ"
 building_lifecrypt_2_desc:"แม้ว่าชื่อของมันอาจจะฟังดูน่ากลัว ทว่าจิต วิญญาณทำงานบนหลักการวิทยาศาสตร์เชิงปฏิบัติ มันได้รับการปรับเทียบระบบเป็นพิเศษเพื่อดึงพลังงานจากประชากรผ่านเครื่องผูกมัดทางกายภาพ ทำให้สามารถดูดซับกระบวนการเผาผลาญอาหารจากสิ่งมีชีวิตในปริมาณมหาศาลได้โดยไม่เป็นอันตรายถึงแก่ชีวิต"

 building_lifecrypt_3:"ช่องเชื่อมพลังงานชีวภาพ"
 building_lifecrypt_3_desc:"ขอบเขตการทำงานของสัมพัทธภาพจะต้องได้รับการระบุอย่างชัดเจน เนื่องจากผู้ที่หลงเข้ามาในพื้นที่โดยไม่มีเครื่องสวมใส่เฉพาะทางอาจเป็นอันตรายถึงแก่ชีวิตได้ บุคคลที่ได้รับมอบหมายจะได้รับการฝึกฝนให้ควบคุมอัตราการเผาผลาญของร่างกายเพื่อไม่ให้บริจาคพลังงานชีวิตมากเกินไปในคราวเดียว"

 # Lifecrypt (Machine)
 building_lifecrypt_machine_1:"แบตเตอรี่ดึงพลังงาน"
 building_lifecrypt_machine_1_desc:"อุปกรณ์ขนาดใหญ่โตเหล่านี้สามารถสูบพลังงานประมวลผลส่วนเกินจากโดรนเฉพาะทางในระยะประชิด คนงานที่ได้รับมอบหมายงานจะสวมใส่อุปกรณ์เฉพาะทางซึ่งจะเชื่อมต่อแบตเตอรี่ของพวกมันเข้าสู่แกนกลางส่งผ่านพลังงานส่วนกลาง ซึ่งสามารถแจกจ่ายไปยังหน่วยงานที่มีวัตถุประสงค์สูงกว่า"

 building_lifecrypt_machine_2:"ศูนย์รวบรวมแบตเตอรี่"
 building_lifecrypt_machine_2_desc:"เครื่องเก็บเกี่ยวพลังงานที่ออกแบบระบบมาเป็นพิเศษเพื่อเก็บเกี่ยวพลังงานจากโดรนผ่านสายเชื่อมทางกายภาพ อุปกรณ์เหล่านี้สามารถดูดซับพลังประมวลผลส่วนเกินในปริมาณมหาศาลได้โดยไม่ทำให้เกิดข้อบกพร่องที่ร้ายแรงในระบบ"

 building_lifecrypt_machine_3:"ศูนย์เครือข่ายแบตเตอรี่"
 building_lifecrypt_machine_3_desc:"ขอบเขตของศูนย์เครือข่ายแบตเตอรี่(Battery Nexus)จะต้องได้รับการระบุอย่างชัดเจน เนื่องจากผู้ที่หลงเข้าไปในพื้นที่โดยไม่มีเครื่องป้องกันฉนวนที่ถูกต้องเหมาะสมอาจส่งผลให้เครื่องเกิดความเสียหายถาวรได้"

 # Lifecrypt (Hive Mind)
 building_lifecrypt_hive_mind_1:"หอคอยสูบพลังชีวิต"
 building_lifecrypt_hive_mind_1_desc:"อุปกรณ์ขนาดใหญ่โตเหล่านี้มีความสามารถในการสูบพลังงานส่วนเกินจากโดรนเป้าหมายในระยะประชิด โดรนที่ได้รับมอบหมายงานจะสวมใส่อุปกรณ์เฉพาะทางที่จะช่วยส่งพลังชีวิตเข้าสู่แกนกลางส่งผ่าน ก่อนที่จะถูกแจกจ่ายไปยังประชากรที่มีชนชั้นสูงกว่า"

 building_lifecrypt_hive_mind_2:"เครื่องสูบวิญญาณ"
 building_lifecrypt_hive_mind_2_desc:"แม้ว่าชื่อของมันอาจจะฟังดูน่ากลัว ทว่าจิต วิญญาณทำงานบนหลักการวิทยาศาสตร์เชิงปฏิบัติ มันได้รับการปรับเทียบระบบเป็นพิเศษเพื่อดึงพลังงานจากโดรนผ่านเครื่องผูกมัดทางกายภาพ ทำให้สามารถดูดซับกระบวนการเผาผลาญอาหารจากสิ่งมีชีวิตในปริมาณมหาศาลได้โดยไม่เป็นอันตรายถึงแก่ชีวิต"

 building_lifecrypt_hive_mind_3:"ช่องเชื่อมพลังงานชีวภาพ"
 building_lifecrypt_hive_mind_3_desc:"ขอบเขตการทำงานของสัมพัทธภาพจะต้องได้รับการระบุอย่างชัดเจน เนื่องจากผู้ที่หลงเข้าไปในพื้นที่โดยไม่มีเครื่องสวมใส่เฉพาะทางอาจเป็นอันตรายถึงแก่ชีวิตได้ โดรนที่ได้รับมอบหมายจะได้รับการฝึกฝนให้ควบคุมอัตราการเผาผลาญของร่างกายเพื่อไม่ให้บริจาคพลังงานชีวิตมากเกินไปในคราวเดียว"

 # Lifecrypt (Corporate)
 building_lifecrypt_corporate_1:"สำนักงานใหญ่ประสานพลังงาน"
 building_lifecrypt_corporate_1_desc:"อุปกรณ์ขนาดใหญ่โตเหล่านี้มีความสามารถในการสูบพลังงานส่วนเกินจากเด็กฝึกงานเป้าหมายในระยะประชิด บุคคลที่ได้รับมอบหมายงานจะสวมใส่อุปกรณ์เฉพาะทางที่จะช่วยส่งพลังชีวิตเข้าสู่แกนกลางส่งผ่าน ก่อนที่จะถูกแจกจ่ายไปยังพนักงานที่มีตำแหน่งสูงกว่า"

 building_lifecrypt_corporate_2:"สำนักบริหารงานประสานพลังงาน"
 building_lifecrypt_corporate_2_desc:"อาคารของฝ่ายบริหารเหล่านี้ได้รับการปรับเทียบระบบเป็นพิเศษเพื่อดึงพลังงานจากบุคคลผ่านเครื่องผูกมัดทางกายภาพ ทำให้สามารถดูดซับกระบวนการเผาผลาญอาหารจากเด็กฝึกงานในปริมาณมหาศาลได้โดยไม่ทำให้ชีวิตของพวกเขามีความเสี่ยงที่วัดผลได้"

 building_lifecrypt_corporate_3:"ศูนย์กลางความร่วมมือประสานงาน"
 building_lifecrypt_corporate_3_desc:"ขอบเขตของซิ น นี นัสจะต้องได้รับการระบุอย่างชัดเจน เนื่องจากผู้ที่หลงเข้าไปในพื้นที่โดยไม่มีเครื่องสวมใส่เฉพาะทางอาจเป็นอันตรายถึงแก่ชีวิตแก่เด็กฝึกงานได้ บุคคลที่ได้รับมอบหมายงานจะได้รับการฝึกฝนเทคนิคการทำงานร่วมกันขั้นสูงเพื่อให้แน่ใจว่าจะมีชีวิตรอดตลอดกระบวนการนี้"

# Psionic Suppressor
 building_psionic_suppressor:"เครื่องสะกดคลื่นพลังจิต"
 building_psionic_suppressor_desc:"ศูนย์รวบรวมระบบนี้ทำหน้าที่รองรับเครื่องลดทอนสัญญาณพลังจิตระยะไกลหลายชุด ซึ่งจะช่วยสลายออร่าจิต $PSIONIC_AURA_PLURAL$ ทั่วระบบดาวและป้องกันการขยายตัวแพร่กระจายต่อไป"
 building_psionic_suppressor_tt:"อัตราการลดระดับความเข้มข้น §Y$PSIONIC_AURA$§! §Hความเข้มสี§! ในระบบดาวนี้รายวัน: $@building_psionic_suppressor_decrease|0$"

# Materiality Engine
