 shroud_cradle_covenant_chain_title: "$the_cradle_of_souls$"
 shroud_cradle_covenant_chain_desc:"เราได้ริเริ่มกุมสร้างพันธะผูกพันกับตัวตนแห่งม่านพลังที่รู้จักกันในนาม $the_cradle_of_souls_color_article$ มันคอยนำพาความสามัคคีกลมเกลียวและประทานเศษเสี้ยวอานุภาพพลังแก่เราเพื่อแลกเปลี่ยนกับเครื่องเซ่นไหว้\n\n[GetTelepathPlural] ของเราเสนอแนวทางทฤษฎีว่าสายเชื่อมต่อจะลึกซึ้งแน่นหนาขึ้นได้โดยการปรับเปลี่ยนพฤติกรรมและการกระทำของเราให้ตอบสนองเจตจำนงของผู้อุปถัมภ์\n\nอู่วิญญาณโหยหากาแล็กซีที่หลุดพ้นจากความโกลาหลและความขัดแย้ง โดยที่ประชากรทั้งหมดร่วมมือกันเพื่อเป้าหมายที่เป็นอันหนึ่งอันเดียวกันคือสันติภาพ มีเพียงความสมดุลที่สมบูรณ์แบบเท่านั้นที่จะเพียงพอ"
 shroud_cradle_covenant_chain_begin: "$BEGINS_EVENT_CHAIN$ §Y$shroud_cradle_covenant_chain_title$§!"
 shroud_cradle_covenant_chain_end: "$ENDS_EVENT_CHAIN$ §Y$shroud_cradle_covenant_chain_title$§!"

 robot_shroud_cradle_covenant_chain_title: "$shroud_cradle_covenant_chain_title$"
 robot_shroud_cradle_covenant_chain_desc: "$shroud_cradle_covenant_chain_desc$"

 # Composer of Strands
 shroud.4650.title: "$utopia.3304.name$"
 shroud.4650.desc.default:"ตัวตนหนึ่งรอคอยเราอยู่ในม่านพลัง ต้อนรับเราด้วยความคุ้นเคยอันอบอุ่นเป็นมิตร มันไม่ได้เอ่ยออกมาเป็นคำพูดเท่าใดนัก ทว่าสื่อสารผ่านทางภาพนิมิต แนวคิด และไอเดียความนึกคิด มันแทรกซึมเข้าสู่จิตใจของ [GetTelepathPlural] ของเราอย่างแผ่วเบาและราบรื่นจนราวกับว่ามันคงอยู่ ณ ที่นั่นเสมอมา ภาพนิมิตพรั่งพรูแล่นผ่านประสาทสัมผัสของพวกเขา\n\nการคงอยู่ของตัวตนนี้ $the_composer_of_strands_color_article$ เฝ้ามองรูปกายอินทรียสารของเราด้วยความสนใจใครู้อย่างยิ่ง มันแสดงให้เราเห็นแนวทางที่หลากหลายที่รูปกายเราจะสามารถเติบโต แปรเปลี่ยน ปรับปรุง และมีวิวัฒนาการก้าวหน้าได้\n\n§Hหากเพียงแต่เรายอมเปิดรับมันเข้าสู่เนื้อหนังร่างกายของเรา§!\n\nมันรอคอยคำตอบจากเราอย่างอดทนและเปี่ยมล้นไปด้วยความรักใคร่ ประหนึ่งบิดามารดาที่คอยตามใจเฝ้ารอคอยบุตรคนโปรด"
 shroud.4650.desc.hive: "$shroud.4650.desc.default$"
 shroud.4650.desc.gestalt_machine:"ตัวตนหนึ่งรอคอยเราอยู่ในม่านพลัง ต้อนรับเราด้วยความคุ้นเคยอันอบอุ่นเป็นมิตร มันไม่ได้เอ่ยออกมาเป็นคำพูดเท่าใดนัก ทว่าสื่อสารผ่านทางภาพนิมิต แนวคิด และไอเดียความนึกคิด มันแทรกซึมเข้าสู่ระบบวงจรของ [GetTelepathPlural] ของเราอย่างแผ่วเบาและราบรื่นจนราวกับว่ามันคงอยู่ ณ ที่นั่นเสมอมา ภาพข้อมูลพรั่งพรูแล่นผ่านประสาทสัมผัสการประมวลผลของพวกเขา\n\nการคงอยู่ของตัวตนนี้ $the_composer_of_strands_color_article$ เฝ้ามองรูปกายจักรกลของเราด้วยความสนใจใครู้อย่างยิ่ง มันแสดงให้เราเห็นแนวทางที่หลากหลายที่รูปกายเราจะสามารถปรับระบบจำลอง แปรเปลี่ยน ปรับปรุง และมีอัปเกรดก้าวหน้าได้\n\n§Hหากเพียงแต่เรายอมเปิดรับมันเข้าสู่ส่วนประกอบระบบโครงสร้างของเรา§!\n\nมันรอคอยคำตอบจากเราอย่างอดทนและเปี่ยมล้นไปด้วยความรักใคร่ ประหนึ่งบิดามารดาที่คอยตามใจเฝ้ารอคอยบุตรคนโปรด"
 shroud.4650.desc.individual_machine: "$shroud.4650.desc.gestalt_machine$"
 shroud.4650.a:"จัดตั้งทำพันธสัญญากับ $the_composer_of_strands_color_article$"

 shroud.4655.desc.intro:"ทุกอย่างเสร็จสิ้นแล้ว เราจัดตั้งทำพันธสัญญากับ $the_composer_of_strands_color_article$ เจตจำนงของมันแผ่กระจายไหลเวียนผ่านทั่วตัว §H[Root.GetName]§!"
 shroud.4655.desc.outro:"เป็นที่แน่ชัดแล้วว่าเรายอมสละสิทธิ์ควบคุมบางส่วนเหนือรูปกายของชาว [Root.GetSpeciesAdj] ไป ซึ่งผู้อุปถัมภ์ของเราในเวลานี้มีอิสระเต็มที่ที่จะเข้าแปรสภาพมันได้ตามใจปรารถนา\n\nนี่คือการเสียสละเพียงเล็กน้อยเพื่อแลกกับสายสัมพันธ์ครั้งใหม่นี้ จากรายงานของ [GetTelepathPlural] ของเรา พรอันประเสริฐที่สุดของผู้แต่งแต้มพันธุกรรมยังมาไม่ถึง"
 shroud.4655.desc.default:"$shroud.4655.desc.intro$\n\n[GetScientistPlural] ของเราตรวจพบรูปแบบผิดปกติในโครงสร้างรหัสพันธุกรรมของตัวอย่างทดลองชาว [Root.GetSpeciesAdj] ราวกับว่ามีวิวัฒนาการเปลี่ยนผ่านหลายชั่วอายุคนเกิดขึ้นข้ามคืน $shroud.4655.desc.outro$"
 shroud.4655.desc.hive: "$shroud.4655.desc.default$"
 shroud.4655.desc.individual_machine:"$shroud.4655.desc.intro$\n\n[GetScientistPlural] ของเราตรวจพบรูปแบบผิดปกติในโครงสร้างโมเลกุลของวงจรทดสอบชาว [Root.GetSpeciesAdj] ราวกับว่ามีการอัปเกรดระบบหลายชั่วระบบเกิดขึ้นข้ามคืน $shroud.4655.desc.outro$"
 shroud.4655.desc.gestalt_machine: "$shroud.4655.desc.individual_machine$"
 shroud.4655.a.default: "$covenant.composer.option$"
 shroud.4655.a.gestalt:"นี่คือราคาที่ต้องจ่ายเพื่อครอบครองพลัง"

 shroud.4660.desc: "$shroud.4510.desc.intro$$the_composer_of_strands_color_article$$shroud.4510.desc.outro$"
 shroud.4660.b:"ประกาศละทิ้งและตัดขาดสายใยจาก $the_composer_of_strands_color_article$"

 shroud_composer_covenant_chain_title: "$composer_covenant_chain_title$"
 shroud_composer_covenant_chain_desc.intro:"เราได้ริเริ่มกุมสร้างพันธะผูกพันกับตัวตนแห่งม่านพลังที่รู้จักกันในนาม $the_composer_of_strands_color_article$ มันคอยปกป้องคุ้มครองและประทานเศษเสี้ยวอานุภาพพลังแก่เราเพื่อแลกเปลี่ยนกับเครื่องเซ่นไหว้บูชา และน่าจะมีสิ่งอื่นตามมาอีกในอนาคต\n\n[GetTelepathPlural] ของเราเสนอแนวทางทฤษฎีว่าสายเชื่อมต่อจะลึกซึ้งแน่นหนาขึ้นได้อีกโดยการปรับเปลี่ยนพฤติกรรมและการกระทำของเราให้ตอบสนองเจตจำนงของผู้อุปถัมภ์"
 shroud_composer_covenant_chain_desc:"$shroud_composer_covenant_chain_desc.intro$\n\nผู้แต่งแต้มพันธุกรรมโหยหาการปรับแต่งพันธุกรรมและเนื้อหนังที่หลุดพ้นจากข้อจำกัดของวิวัฒนาการ มันพร่ำสอนเราเกี่ยวกับการเคารพคุณค่าชีวิตและธรรมชาติ และความศักดิ์สิทธิ์ของเนื้อหนัง"
 shroud_composer_covenant_chain_begin: "$composer_covenant_chain_begin$"
 shroud_composer_covenant_chain_end: "$composer_covenant_chain_end$"

 robot_shroud_composer_covenant_chain_title: "$shroud_composer_covenant_chain_title$"
 robot_shroud_composer_covenant_chain_desc:"$shroud_composer_covenant_chain_desc.intro$\n\nผู้แต่งแต้มพันธุกรรมโหยหาการปรับแต่งรูปแบบทางกายภาพภายนอกและการเจริญเติบโตที่หลุดพ้นจากข้อจำกัดทั่วไป มันพร่ำสอนเราเกี่ยวกับการเคารพคุณค่าชีวิตและธรรมชาติ และความศักดิ์สิทธิ์ของเนื้อหนัง"

 # Whisperers in the Void
 shroud.4700.title: "$utopia.3304.name$"
 shroud.4700.desc: "$utopia.3304.desc.shroud$"
 shroud.4700.a:"จัดตั้งทำพันธสัญญากับ $whisperers_in_the_void_color_article$"
 shroud.4700.b: "$shroud.reject_covenant$"
 shroud_whisperers_in_the_void_covenant_formed_effect: "$t$£unity£ $mod_country_base_unity_produces_add$: §R-15%§!"

 shroud.4705.desc.intro:"ทุกอย่างเสร็จสิ้นแล้ว เราจัดตั้งทำพันธสัญญากับ $whisperers_in_the_void_color_article$ เจตจำนงของพวกเขาแผ่กระจายไหลเวียนผ่านทั่วตัว §H[root.GetName]§!\n\nอิทธิพลของผู้อุปถัมภ์รายใหม่เข้าครอบงำอย่างรวดเร็ว"
 shroud.4705.desc.outro:"นี่คือราคาของสายสัมพันธ์อันทรงพลังนี้ ตามรายงานจาก [GetTelepathPlural] ของเรา พรอันประเสริฐสุดของผู้กระซิบยังมาไม่ถึง การสื่อสารตรงกับตัวตนพลังจิตอันงดงามวิเศษเยี่ยงนี้จะต้องคุ้มค่าอย่างแน่นอน"
 shroud.4705.desc.gestalt:"$shroud.4705.desc.intro$ ในขณะที่กลุ่มจิตร่วมของเราเฝ้ารอคอยการไหลบ่าของปัญญาความรู้ที่ซ่อนเร้น เราสัมผัสได้ถึงความคิดของเราที่แตกแขนงออกเป็นรูปแบบที่กระจัดกระจาย ความสอดประสานที่มั่นคงของ [GetNetworkName] โดนทับซ้อนด้วยเสียงขัดแย้งของสุ้มเสียงภายในที่ขยายตัวขึ้น\n\n$shroud.4705.desc.outro$"
 shroud.4705.desc.non_gestalt:"$shroud.4705.desc.intro$ ในขณะที่เราโหยหาความรู้ที่ซ่อนเร้น ไอเดียความนึกคิดและทรรศนะภายในสังคมของเราก็เติบโตกระจัดกระจายแตกต่างกันมากขึ้น ความไม่สอดประสานกันของสุ้มเสียงภายในบดขยี้ประสาทสัมผัสจิตใจเรา คุกคามสุขภาวะทางจิตใจของชาว [root.GetSpeciesNamePlural] ทั้งปวง\n\n$shroud.4705.desc.outro$"
 shroud.4705.desc.default: "$shroud.4705.desc.non_gestalt$"
 shroud.4705.desc.hive: "$shroud.4705.desc.gestalt$"
 shroud.4705.desc.gestalt_machine: "$shroud.4705.desc.gestalt$"
 shroud.4705.desc.individual_machine: "$shroud.4705.desc.non_gestalt$"
 shroud.4705.a.default:"พวกเราสามารถรับมือจัดสรรได้"
 shroud.4705.a.gestalt: "$shroud.4705.a.default$"

 shroud.4710.title: "$utopia.2658.name$"
 shroud.4710.desc: "$shroud.4510.desc.intro$$whisperers_in_the_void_color_article$$shroud.4510.desc.outro$"
 shroud.4710.a: "$utopia.2658.a$"
 shroud.4710.b:"ประกาศละทิ้งและตัดขาดสายใยจาก $whisperers_in_the_void_color_article$"
 shroud_whisperers_in_the_void_covenant_accepted_effect:"$t$ผลงาน £research£ วิจัยรายเดือน ต่อ $pop_group_unit$ $telepath_type_plural_with_icon$: $@telepath_whisperers_research|0=+$"

 # End of the Cycle
 shroud.4715.desc.intro:"ทุกอย่างเสร็จสิ้นแล้ว เราจัดตั้งทำพันธสัญญากับ $end_of_the_cycle_color_article$ ลุล่วง ในขณะที่เราตกปากรับข้อเสนอ [GetTelepathPlural] ของเราเอ่ยคำอีกหน: §R"จุดจบเริ่มต้นขึ้นแล้ว"§!"
 shroud.4715.desc.default:"$shroud.4715.desc.intro$\n\nจากนั้น มีเพียงความเงียบงัน ความเงียบงันที่ลึกเกินหยั่งถึง เติมเต็มจิตใจของชาว [root.GetSpeciesAdj] ทั้งปวง ในจุดที่เคยมีพลังงานแปรปรวนนับไม่ถ้วนของ §Hม่านพลัง§! พลุ่งพล่านภายในสติสัมปชัญญะของเราทุกคน ทว่าอาณาจักรพลังจิตในเวลานี้กลับเงียบสงัดดั่งความตาย\n\nพวกเราหลงเหลือความเงียบให้ไตร่ตรองถึงผลลัพธ์ของสิ่งที่เรานำพามาสู่ตนเอง"
 shroud.4715.desc.hive:"$shroud.4715.desc.intro$\n\nจากนั้น มีเพียงความเงียบงัน ความเงียบงันที่ลึกเกินหยั่งถึง เติมเต็มจิตใจของชาว [root.GetSpeciesAdj] ทั้งปวง ในจุดที่เคยมีพลังงานแปรปรวนนับไม่ถ้วนของ §Hม่านพลัง§! พลุ่งพล่านกระจายผ่าน [GetBrainName] ทว่าอาณาจักรพลังจิตในเวลานี้กลับหยุดนิ่งสนิทดั่งความไม่มีตัวตน\n\nพวกเราหลงเหลือความเงียบให้ประเมินคิดคำนวณผลลัพธ์ของสิ่งที่เรานำพามาสู่ตนเอง"
 shroud.4715.desc.gestalt_machine: "$shroud.4715.desc.default$"
 shroud.4715.desc.individual_machine: "$shroud.4715.desc.default$"
 shroud.4715.a.default:"ขอให้เจตจำนงของมันจงเปี่ยมไปด้วยความเมตตาปรานีด้วยเถิด"
 shroud.4715.a.gestalt: "$shroud.4715.a.default$"

 shroud_whisperers_covenant_chain_title: "$whisperers_covenant_chain_title$"
 shroud_whisperers_covenant_chain_desc:"เราได้ริเริ่มกุมสร้างพันธะผูกพันกับตัวตนแห่งม่านพลังที่รู้จักกันในนาม $whisperers_in_the_void_color_article$ มันผู้ลึกลับหยั่งไม่ถึงสัญญาจะประทานเศษเสี้ยวอานุภาพพลังแก่เราเพื่อแลกเปลี่ยนกับเครื่องเซ่นไหว้บูชา\n\n[GetTelepathPlural] ของเราเสนอแนวทางทฤษฎีว่าสายเชื่อมต่อจะลึกซึ้งแน่นหนาขึ้นได้โดยการปรับเปลี่ยนพฤติกรรมและการกระทำของเราให้ตอบสนองเจตจำนงของผู้อุปถัมภ์\n\nผู้กระซิบในความว่างเปล่าชื่นชอบความรู้ใหม่ ๆ ความลับที่เงียบเชียบ และแผนสมคบคิด พวกเขาดื่มด่ำในความสุขอันเรียบง่ายของจิตใจที่ถูกเติมเต็มจนปริ่มล้นและเริ่มปริแตกตามรอยต่อ"
 shroud_whisperers_covenant_chain_begin: "$whisperers_covenant_chain_begin$"
 shroud_whisperers_covenant_chain_end: "$whisperers_covenant_chain_end$"

 robot_shroud_whisperers_covenant_chain_title: "$shroud_whisperers_covenant_chain_title$"
 robot_shroud_whisperers_covenant_chain_desc: "$shroud_whisperers_covenant_chain_desc$"

 shroud.11110.title:"วัฏจักรยังคงดำเนินต่อไป"
 shroud.11110.desc:"เหล่า §Hผู้กระซิบ§! แปรผันอย่างแหลมคม สุ้มเสียงของพวกเขาบดบังสิ่งอื่นใดในจิตใจของเราจนหมดสิ้น พวกเขาปรารถนาที่จะคอมมูนติดต่อกับเรา เพื่อเติมเต็มจิตใจของเราด้วยปัญญาความรู้\n\nเรามีทางเลือกที่ไม่อาจเพิกถอนได้ที่ต้องตัดสินใจ"
 shroud.11110.a:"ดูดซับดูดกลืน $the_eater_of_worlds_article$"
 shroud.11110.b:"ดูดซับดูดกลืน $the_cradle_of_souls_article$"
 shroud.11110.c:"ดูดซับดูดกลืน $the_instrument_of_desire_article$"
 shroud.11110.d:"ดูดซับดูดกลืน $the_composer_of_strands_article$"

 shroud.11120.title:"ความพยาบาททวงแค้นของ [GetBetrayedPatronColour]"
 shroud.11120.title.eater:"ความพยาบาททวงแค้นของ $the_eater_of_worlds_color_article$"
 shroud.11120.title.cradle:"ความพยาบาททวงแค้นของ $the_cradle_of_souls_color_article$"
 shroud.11120.title.instrument:"ความพยาบาททวงแค้นของ $the_instrument_of_desire_color_article$"
 shroud.11120.title.composer:"ความพยาบาททวงแค้นของ $the_composer_of_strands_color_article$"
 shroud.11120.desc:"ในขณะที่ [GetTelepathPlural] ของเราฟื้นคืนขึ้นมาจาก §Hม่านพลัง§! เราพบว่าการทรยศหักหลังหักหลังของเราได้ก่อให้เกิดแรงสะท้อนกลับอันทรงพลังจาก [GetBetrayedPatronColour]\n\nช่องมิติเชื่อมต่อ §H$SHROUD_TUNNEL_GALACTIC$§! ได้ปรากฏขึ้นใกล้กับ §H[event_target:selected_planet_for_revenge.GetName]§! ซึ่งในเวลานี้กลายเป็นดาวเคราะห์รกร้างกว้างใหญ่ไร้สิ่งมีชีวิตไปแล้ว เราสามารถ [GetFeltLoc] โทสะเกรี้ยวกราดที่สัมผัสได้จากอีกฟากฝั่งของช่องมิติ อดีตผู้อุปถัมภ์ของเรากำลังจัดเตรียมการทวงคืนความแค้นอย่างไม่ต้องสงสัย"
 shroud.11120.a:"เราต้องจัดเตรียมกองทัพเพื่อปกป้องตนเอง"
 shroud.11120.a.tt:"§H[event_target:selected_planet_for_revenge.GetName]§! เปลี่ยนสภาพกลายเป็นดาวเคราะห์ §Y$pc_shrouded$§!\nช่องมิติเชื่อมต่อ §H$SHROUD_TUNNEL_GALACTIC$§! ปรากฏขึ้นใกล้กับดาวดวงนี้"

 shroud_tunnel_object: "$SHROUD_TUNNEL_GALACTIC$"

 shroud.11130.title:"ความพยาบาททวงแค้นอันเกรี้ยวกราด"
 shroud.11130.desc_common:"อวตารพลังจิต §Y$NAME_Psionic_Avatar$§! ได้ปรากฏตัวขึ้นมาจากช่องมิติเชื่อมต่อ $SHROUD_TUNNEL_GALACTIC$ ในระบบดาว [event_target:spawn_system.GetName] ในฐานะรูปร่างจำลองโทสะของ [GetBetrayedPatronColour] ในเวลานี้มันกำลังมุ่งหน้าเดินทางตรงไปยังระบบดาวเมืองหลวง [capital_scope.GetName]"
 shroud.11130.desc_success:"พวกเราประสบความสำเร็จในการระดมกองกำลังทหารเพื่อต่อต้านภัยคุกคามที่ปรากฏตัวขึ้น ยานรบของเราปล่อยคลื่นพลังงานจิตวิญญาณเข้าใส่ช่องมิติเชื่อมต่อ $SHROUD_TUNNEL_GALACTIC$ บั่นทอนความแข็งแกร่งของศัตรูในขณะที่มันเจาะมิติความเป็นจริงเข้ามาหาเรา"
 shroud.11130.success_tt:"$NAME_Psionic_Avatar$ ปรากฏตัวขึ้นมาด้วยความแข็งแกร่งเพียงครึ่งเดียว"

 shroud.11250.title:"จุดจบ"
 shroud.11250.desc:"ในขณะที่เราจมดิ่งเข้าสู่ภวังค์ จิตใจของเราก็ตกอยู่ภายใต้ความเงียบสงัน เราไม่เคยเห็นม่านพลังนิ่งสงบเงียบเยี่ยงนี้มาก่อน\n\nความว่างเปล่าช่างไร้สุ้มเสียง\n\nทุกสรรพสิ่งอันตรธานสลายหายสิ้น"
 shroud.11250.a:"นี่คงจะเป็นจุดจบแล้ว"

 shroud.11255.title:"การเกิดใหม่ของ [owner.GetName]"
 shroud.11255.desc:"พวกเราได้ใช้ความพยายามอย่างมหาศาลเพื่อฟื้นฟูหลังความย่อยยับล้างผลาญสลายสิ้นที่ก่อขึ้นโดย $end_of_the_cycle_color_article$ เพื่อเป้าหมายนี้ เราได้จัดสร้างด่านดาวเคราะห์สถานีรบ §H$starbase_outpost$§! ขึ้นมาใหม่ในระบบดาว §H[solar_system.Star.GetStarName]§! ซึ่งนับเป็นจุดเริ่มต้นครั้งใหม่ของ [owner.GetName]"

