 building_ancient_ward_1:"หอป้องกันโบราณ"
 building_ancient_ward_1_desc:"โครงสร้างบรรพบุรุษแห่งนี้ใช้งานระบบกรองสัญญาณพลังจิตจำนวนมาก เพื่อปกป้องโลกทั้งใบให้ปลอดภัยจากกองกำลังครอบงำจิตใจ"
 building_ancient_ward_2:"หอป้องกันอันยิ่งใหญ่"
 building_ancient_ward_2_desc:"โครงสร้างบรรพบุรุษแห่งนี้ได้รับการอัปเกรดด้วยระบบกรองสัญญาณพลังจิตที่ได้รับการปรับปรุงประสิทธิภาพ ซึ่งสามารถป้องกัน $PSIONIC_AURA_PLURAL$ ทั่วทั้งระบบดาวฤกษ์ได้"
 psionic_auras_immunity:"ค่อยๆ สลาย §Y$PSIONIC_AURA_PLURAL$§! ในระบบดาวอย่างต่อเนื่อง"
