 tech_psionic_bombers:"เครื่องบินทิ้งระเบิดพลังจิต"
 tech_psionic_bombers_desc:"ยานขนาดเล็กที่มีความคล่องตัวสูงเหล่านี้เชี่ยวชาญเป็นพิเศษในการทิ้งระเบิดพลังจิตแบบเข้มข้น ยิ่งเป้าหมายมีขนาดใหญ่เท่าใด แรงสะท้อนจากการระเบิดของมันก็จะยิ่งทวีความรุนแรงมากขึ้นเท่านั้น"
 tech_bio_psionic_bombers: "$tech_psionic_bombers$"

 tech_psionic_lightning:"สายฟ้าพลังจิต"
 tech_psionic_lightning_desc:"ด้วยการจัดตั้งระบบการเชื่อมโยงทางจิตชั่วคราวระหว่างยานลำหนึ่งไปยังอีกลำหนึ่ง จะทำให้สามารถปล่อยพลังประจุไฟฟ้าทางความคิดโดยตรงเพื่อสร้างความเสียหายอันรุนแรง พลังงานดิบดังกล่าวมีความสามารถในการสร้างความปั่นป่วนให้กับระบบการทำงานของยานและแทรกซึมเข้าควบคุมจิตใจของลูกเรือภายใน"
 tech_bio_psionic_lightning: "$tech_psionic_lightning$"

 ship_terrify_tt:"มีโอกาสทำให้ยานรบทางทหารอยู่ในสภาวะตื่นตระหนก ['concept_terrify'] เป็นเวลา £time£ §Y5-10§! วัน โดยอิงตามขนาดของยานเป้าหมาย"
 concept_terrify:"ตื่นตระหนก"
 concept_terrify_desc:"ยานรบที่ตกอยู่ในสภาวะตื่นตระหนกจะหยุดทำการโจมตีและพยายามขับยานหลบหนีจากผู้จู่โจม"

 tech_psionic_disruptor:"เครื่องรบกวนสัญญาณพลังจิต"
 tech_psionic_disruptor_desc:"เครื่องรบกวนสัญญาณที่ก้าวหน้าขั้นสูงเหล่านี้จะยิงลำแสงพลังจิตที่รุนแรงทะลวงฝ่าเปลือกหุ้มตัวยานของศัตรู ช่วยให้สามารถเล็งเป้าหมายเพื่อทำลายการทำงานของอาวุธฝ่ายตรงข้ามได้"
 tech_bio_psionic_disruptor: "$tech_psionic_disruptor$"

 tech_zro_launcher:"เครื่องยิงสารซีโร่"
 tech_zro_launcher_desc:"เม็ดกลมความเข้มข้นสูงของสาร $zro_lower$ เหล่านี้สามารถถูกกระจายผ่านเกราะป้องกันของศัตรูได้โดยตรงโดยข้ามผ่านหลากหลายมิติความจริง เมื่อสัมผัสกับวัตถุกายภาพแล้ว ผลลัพธ์จากการทำลายล้างจะพุ่งสูงขึ้นแบบทวีคูณ"
