 # Good luck event 2
 shroud.507.title:"ค้นพบแหล่งแร่อันมั่งคั่ง"
 shroud.507.desc:"ระบบถ้ำธรรมชาติที่อุดมไปด้วยแร่ธาตุซึ่งเคยคิดว่าพังทลายลงไปหมดแล้ว ได้รับการค้นพบใหม่อย่างโชคดีบนดาว §H[This.GetName]§!\n\nหลังจากผ่านการประเมินภัยอันตรายอย่างรอบคอบ เรามั่นใจว่าอุโมงค์เหล่านี้สามารถรองรับการขุดเจาะแร่อย่างมีนัยสำคัญด้วยการขยายกำลังการทำเหมืองแร่ที่มีอยู่ในปัจจุบัน"

