 war_goal_wg_proxy_war_desc:"ทำสงครามจากข่าวลือที่เป็นศัตรูและคำกระซิบที่ซ่อนเร้น เมื่อได้รับชัยชนะ ผู้โจมตีจะได้รับสิทธิ์ควบคุมระบบดาวใดๆ ที่อ้างสิทธิ์ไว้ และจะสร้างค่าข่มขู่ §Yขู่§! น้อยลง §Y33%§! สำหรับแต่ละระบบดาวที่ยึดครองได้"

 shroud.5055.title: "$proxy_war_busted_modifier$"
 shroud.5055.desc.common:"พวกเราถูกหลอกเข้าเสียแล้ว\n\nเจ้าหน้าที่ข่าวกรองของเราดักฟังการสื่อสารลับจากทาง §H[from.GetName]§! ซึ่งเผยให้เห็นถึงแผนการลับที่จะผลักดันพวกเราเข้าสู่สงครามตัวแทน\n\nแม้พวกเขาจะปฏิเสธอย่างแข็งขันว่าไม่มีส่วนเกี่ยวข้องใดๆ ทว่าความเสียหายต่อความสัมพันธ์ของเราได้รับผลกระทบไปแล้ว"
 shroud.5055.desc.galactic:"$shroud.5055.desc.common$ ข่าวการกระทำสองหน้าของพวกเขาได้แพร่กระจายไปอย่างรวดเร็ว ส่งผลเสียต่อชื่อเสียงของ [from.GetName] ไปทั่วทั้งกาแล็กซี"

 shroud.5060.title: "$proxy_war_busted_modifier$"
 shroud.5060.desc.common:"แม้เราจะสามารถยั่วยุให้เกิดความขัดแย้งได้สำเร็จ ทว่าปฏิบัติการครั้งนี้ไม่ได้เป็นไปตามแผนทั้งหมด การสื่อสารของสายลับคนหนึ่งของเราถูกดักฟัง ทำให้ความเคลื่อนไหวลับของเราถูกเปิดเผยแก่ทุกฝ่ายที่เกี่ยวข้อง\n\nความพยายามใดๆ ของเราที่จะอธิบายและปัดความรับผิดชอบในเรื่องนี้ล้วนไม่ได้ผล"
 shroud.5060.desc.galactic:"$shroud.5060.desc.common$ เหตุการณ์นี้ไม่เพียงแต่ทำลายความสัมพันธ์ของเรากับคู่สงครามเท่านั้น แต่เรื่องอื้อฉาวดังกล่าวยังทำลายชื่อเสียงของเราในระดับกาแล็กซีอีกด้วย"
 shroud.5060.desc.default:"$shroud.5060.desc.common$ เหตุการณ์นี้ส่งผลเสียอย่างรุนแรงต่อความสัมพันธ์ของเรากับกลุ่มประเทศผู้ทำศึก"
 shroud.5060.a.tt:"จักรวรรดิที่มีส่วนเกี่ยวข้องใน §Yสงครามตัวแทน (Proxy War)§! จะมีความเห็นต่อพวกเราเปลี่ยนไป: §R-200§!"

 proxy_war_busted_modifier:"แผนสงครามตัวแทนถูกเปิดโปง"
 proxy_war_busted_modifier_desc:"แผนการสมคบคิดที่ก่อให้เกิดสงครามตัวแทนถูกค้นพบโดยคู่ขัดแย้งในสงครามครั้งนี้ ส่งผลให้ชื่อเสียงในวงกว้างของเราเสียหายอย่างหนัก"
