# End of the Cycle
 situation_end_of_the_cycle: "$name_eotc$"
 situation_end_of_the_cycle_desc:"เราได้ให้สัตย์สร้างพันธสัญญากับ $end_of_the_cycle_color_article$ ซึ่งช่วยมอบขีดพลังอำนาจที่ล้นพ้นมหาศาลแก่เรา กลุ่มผู้ส่งกระแสจิต [Owner.GetTelepathPlural] ของเราตั้งสมมติฐานว่า ค่าตอบแทนของข้อตกลงแลกเปลี่ยนนี้สามารถถ่วงเวลาดีเลย์ออกไปได้โดยการเข้าสู่ภาวะสมาธิพลังจิตของสังคมส่วนรวมร่วมกัน — ทว่าก็ช่วยได้แค่ประวิงเวลาชั่วคราวเท่านั้น\n\nเจตจำนงของผู้อุปถัมภ์เราได้สำแดงตัวออกมาในรูปแบบ $PSIONIC_AURA$ เข้มข้น หากเราปรารถนาที่จะทำให้จุดจบสัมฤทธิ์ผล การแผ่ขยายออร่านี้จึงเป็นเป้าหมายสุดท้ายสูงสุดของเรา เมื่อจำนวนประชากรและการฝึกฝนพลังจิตเพิ่มพูนขึ้น อานุภาพและระยะความกว้างออร่าก็จะเพิ่มตามไปด้วย\n\nระบบดวงดาวที่เหลือที่ต้องพิชิตครอบครอง: §Y[Owner.GetEndCycleGalaxySystemsLeft]§!"
 situation_end_of_the_cycle_effects_1:"เมื่อผ่านพ้นขั้นช่วงนี้ไป พลังแห่ง §H$ACCORD_CREATION$§! จะถูกมอบประสาทประสิทธิ์ให้แก่เรา\n$eotc_opinion_modifier_tooltip$"
 situation_end_of_the_cycle_effects_2:"เมื่อผ่านพ้นขั้นช่วงนี้ไป พลังแห่ง §H$ACCORD_DISTORTION$§! จะถูกมอบประสาทประสิทธิ์ให้แก่เรา\n$eotc_opinion_modifier_tooltip$\n$eotc_opinion_modifier_2_tooltip$"
 situation_end_of_the_cycle_effects_3:"เมื่อผ่านพ้นขั้นช่วงนี้ไป พลังแห่ง §H$ACCORD_INTENSIFICATION$§! จะถูกมอบประสาทประสิทธิ์ให้แก่เรา\n$eotc_opinion_modifier_tooltip$\n$eotc_opinion_modifier_3_tooltip$"
 situation_end_of_the_cycle_effects_4:"เมื่อระดับช่วงนี้ผ่านพ้นไป ราคาที่ต้องจ่ายสำหรับอำนาจขีดพลังของเราจะถูกเปิดเผยแจ่มแจ้ง"
 approach_situation_end_of_the_cycle_let_it_come:"ปล่อยให้มันมาถึง"
 approach_situation_end_of_the_cycle_be_cautious:"เฝ้าระมัดระวัง"
 approach_situation_end_of_the_cycle_wait_not_yet:"ประวิงเวลาที่หลีกเลี่ยงไม่ได้"
 end_of_the_cycle_let_it_come_tooltip:"ออร่าพลังจิต §Y$PSIONIC_AURA$§! ของ $end_of_the_cycle_color_article$ จะยังคงทำงานเต็มประสิทธิภาพสูงสุด"
 end_of_the_cycle_be_cautious_tooltip: "$situation_speed_tt$: §G-30%§!"
 end_of_the_cycle_wait_not_yet_tooltip: "$situation_speed_tt$: §G-50%§!"
 end_of_the_cycle_monthly_change_tooltip: "$situation_monthly_change_tooltip_approaches_dependent$"
 situation_end_of_the_cycle_finish_effects:"§Rจะเกิดการล้างบางล้างแค้นและตัดสินครั้งใหญ่ขึ้น§!"
 initial_absorbed_consciousness_bonus:"จิตสำนึกที่ถูกควบรวมกลืนหาย"
 absorbed_consciousness_intensification_1:"การเสริมระดับความเข้มข้นจิตสำนึกที่ถูกควบรวม"
 absorbed_consciousness_intensification_2: "$absorbed_consciousness_intensification_1$"
 absorbed_consciousness_intensification_3: "$absorbed_consciousness_intensification_1$"
 absorbed_consciousness_intensification_4: "$absorbed_consciousness_intensification_1$"
 eotc_opinion_modifier_tooltip:"ระดับความเห็นจักรวรรดิอื่น $OPINION$ ต่อเราสำหรับทุกระบบดาวของพวกเขาที่ได้รับผลกระทบจาก §H$end_aura$§!: §R-15§!"
 eotc_opinion_modifier_2_tooltip:"ระดับความเห็นของจักรวรรดิอื่น $OPINION$ ต่อพวกเรา: §R-200§!"
 eotc_opinion_modifier_3_tooltip:"ระดับความเห็นของจักรวรรดิอื่น $OPINION$ ต่อพวกเรา: §R-500§!"

 shroud.4950.title:"ออร่าแห่งปองร้ายอักขระชั่วร้าย"
 shroud.4950.desc.1:"ชุดข้อมูลของเราบ่งบอกว่าออร่านี้สร้างผลเสียอันร้ายกาจอย่างยิ่งยวด หากไม่มีมาตรการรับมือตอบโต้ คาดว่ามันจะแพร่กระจายไปทั่วทั้งกาแล็กซีอย่างรวดเร็ว"
 shroud.4950.desc.2:"เราได้ตรวจพบออร่าพลังจิต $PSIONIC_AURA$ ทรงพลังเข้มข้นในระบบดาว §H[from.GetName]§!"
 shroud.4950.desc.3.intro:"$shroud.4950.desc.2$ ตามข้อมูลของ [GetTelepathPlural] การปล่อยพลังงานนี้จาก §Hม่านพลัง(คําราม)§! มีสาเหตุหลักมาจากกิจกรรมทางพลังจิตของ"
 shroud.4950.desc.3.default:"$shroud.4950.desc.3.intro$ อารยธรรมต่างดาว"
 shroud.4950.desc.3.contact:"$shroud.4950.desc.3.intro$ พวก §H[fromfrom.GetName]§!"
 shroud.4950.desc.4:"$shroud.4190.desc.intro$ ออร่าพลังจิต §H'$PSIONIC_AURA$'§! ดังกล่าว ซึ่งเรียกเช่นนี้เนื่องจากทฤษฎีจุดกำเนิดของมัน บัดนี้ได้รับการตรวจพบในระบบดาว §H[from.GetName]§! แล้ว"
 shroud.4950.desc.5.intro:"$shroud.4950.desc.2$ ซึ่งจุดกำเนิดของมันถูกสืบย้อนไปได้ว่าอยู่ในอาณาเขตของ"
 shroud.4950.desc.5.default:"$shroud.4950.desc.5.intro$ อารยธรรมต่างดาว"
 shroud.4950.desc.5.contact:"$shroud.4950.desc.5.intro$ พวก §H[fromfrom.GetName]§!"
 shroud.4950.a: "$grand_archive.1100.a$"

 shroud.4955.title:"ลางสังหรณ์แห่งความสะพรึงกลัว"
 shroud.4955.desc.1:"ความตระหนักรู้ถึงภัยพิบัติร้ายแรงที่กำลังคืบคลานเข้ามา เริ่มก่อตัวขึ้นในหมู่ประชากรของเรา"
 shroud.4955.desc.1.gestalt:"$shroud.4955.desc.1$ ยิ่งไปกว่านั้น [GetTelepathPlural] ของเรายังตรวจพบความปั่นป่วนที่เกิดขึ้นพร้อมกันในพลังงานของ §Hม่านพลัง(คําราม)§! อีกด้วย"
 shroud.4955.desc.1.non_gestalt:"$shroud.4955.desc.1$ จากข้อมูลของ [GetTelepathPlural] ของเรา แม้แต่ §Hม่านพลัง(คําราม)§! ก็ยังรู้สึกไม่สงบอย่างน่าประหลาด ราวกับว่าพลังงานของมันกำลังสั่นสะท้านด้วยความหวั่นเกรงอันเงียบงัน"
 shroud.4955.desc.2.intro:"ในช่วงไม่กี่ปีที่ผ่านมานี้ เกิดเหตุการณ์ร้ายแรงเพิ่มขึ้นอย่างมากทั่วทั้งกาแล็กซี"
 shroud.4955.desc.2.outro:"เมื่อเราตรวจพบปรากฏการณ์ที่แปลกประหลาดขึ้นเรื่อยๆ [GetResearchers] ของเราจึงคาดการณ์ว่าอาจเกิดเหตุร้ายแรงยิ่งกว่านี้ในอนาคตอันใกล้"
 shroud.4955.desc.2.contact_aura:"$shroud.4955.desc.2.intro$ เราได้ประจักษ์ถึงการเติบโตอย่างอธิบายไม่ได้ของ §H[from.GetName]§! และเฝ้ามองการลุกล้ำของออร่าพลังจิตอันเป็นภัย §H$PSIONIC_AURA$§! $shroud.4955.desc.2.outro$"
 shroud.4955.desc.2.contact_no_aura:"$shroud.4955.desc.2.intro$ เราได้ประจักษ์ถึงการเติบโตอย่างอธิบายไม่ได้ของ §H[from.GetName]§! $shroud.4955.desc.2.outro$"
 shroud.4955.desc.2.no_contact_aura:"$shroud.4955.desc.2.intro$ เราได้เฝ้ามองการลุกล้ำของออร่าพลังจิตอันเป็นภัย §H$PSIONIC_AURA$§! $shroud.4955.desc.2.outro$"
 shroud.4955.desc.2.no_contact_no_aura: "$shroud.4955.desc.2.intro$ $shroud.4955.desc.2.outro$"
 shroud.4955.desc.3:"เราไม่รู้แน่ชัดว่าสิ่งใดกำลังคืบคลานเข้ามา ทว่าเราสัมผัสได้ถึงการมาเยือนของมันด้วยความแน่ใจอย่างลึกซึ้ง"
 shroud.4955.a:"เราต้องเตรียมพร้อมรับมือกับสถานการณ์ที่เลวร้ายที่สุด"
 shroud.4955.a.tt:"หาก §H$end_aura$§! ปกคลุมไปทั่วทั้งกาแล็กซี เกมจะจบลงทันที"

 shroud.4960.title:"ภัยคุกคามพลังจิต"
 shroud.4960.desc.1.intro:"ออร่าพลังจิตอันประสงค์ร้าย §H$PSIONIC_AURA$§! ที่ปล่อยออกมาจาก"
 shroud.4960.desc.1.outro:"ได้แผ่ขยายไปทั่วกาแล็กซีในอัตราที่น่าตระหนก จากการสังเกตการณ์ของ [GetResearchers] ของเรา มันได้ก่อให้เกิดผลกระทบร้ายแรงในระบบดาวหลายแห่ง"
 shroud.4960.desc.1.contact:"$shroud.4960.desc.1.intro$ §H[from.GetName]§! $shroud.4960.desc.1.outro$"
 shroud.4960.desc.1.no_contact:"$shroud.4960.desc.1.intro$ อารยธรรมต่างดาวที่ยังไม่เคยติดต่อ $shroud.4960.desc.1.outro$"
 shroud.4960.desc.2:"จากข้อมูลล่าสุดของเรา มันได้ลุกล้ำไปแล้วกว่าครึ่งหนึ่งของกาแล็กซีที่เชื่อมต่อด้วยไฮเปอร์เลน พลังงานเบื้องหลังสิ่งนี้ดูเหมือนจะมุ่งเป้าทำลายล้างในระดับจักรวาล หากเราไม่หาทางต่อต้านขัดขวาง มันอาจจะทำสำเร็จก็เป็นได้"
 shroud.4960.a:"ต้องหยุดมันให้ได้"
 shroud.4960.a.tt:"สามารถประกาศสงครามเบ็ดเสร็จ ['concept_total_war'] ต่อ §H[from.GetName]§! ได้\n$shroud.4955.a.tt$"

 shroud.4965.title:"วิบัติภัยจวนตัว"
 shroud.4965.desc.1.intro:"ออร่าพลังจิตอันทำลายล้างอย่างรุนแรง §H$PSIONIC_AURA$§! ที่แผ่ออกมาจาก"
 shroud.4965.desc.1.outro:"ยังคงแพร่กระจายไปทั่วทั้งกาแล็กซีอย่างไม่หยุดยั้ง บัดนี้มันได้เข้าครอบครองระบบดาวส่วนใหญ่ในกาแล็กซีของเราไปแล้ว"
 shroud.4965.desc.1.contact:"$shroud.4960.desc.1.intro$ §H[from.GetName]§! $shroud.4960.desc.1.outro$"
 shroud.4965.desc.1.no_contact:"$shroud.4960.desc.1.intro$ อารยธรรมต่างดาวที่ยังไม่ได้ติดต่อ $shroud.4960.desc.1.outro$"
 shroud.4965.desc.2:"หากปราศจากมาตรการตอบโต้ที่รวดเร็วและมีอานุภาพเพียงพอ เราคงต้องเผชิญกับมหันตภัยทำลายล้างกาแล็กซีอย่างหลีกเลี่ยงไม่ได้"
 shroud.4965.a:"นี่คือการต่อสู้ครั้งสุดท้าย"

 the_reckoning_chain_title:"วันพิพากษาชำระแค้น(การคํานวณ)"
 the_reckoning_chain_desc:"พันธสัญญาของเรากับ $end_of_the_cycle_color_article$ ได้นำไปสู่การล่มสลายทำลายล้างของ §H[this.GetName]§! ทิ้งไว้เพียงเศษซากที่หลงเหลือของจักรวรรดิอันเคยยิ่งใหญ่เกรียงไกรของเรา\n\nเจตจำนงทำลายล้างของอดีตผู้อุปถัมภ์บัดนี้ได้ก่อตัวขึ้นเป็นสิ่งมีชีวิตพลังงานมหาศาล นั่นคือ §R$NAME_Reckoning$§! มันกำลังเคลื่อนที่จากโลกหนึ่งไปยังอีกโลกหนึ่ง ฟื้นฟูขีดความแข็งแกร่งของมันด้วยการกลืนกินประชากรของดาวเหล่านั้น"
