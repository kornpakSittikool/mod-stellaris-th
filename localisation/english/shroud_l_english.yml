 shroud.first_contact_insert.composer:"§Hเสียงคอร์ดที่ก้องสะท้อน§!"
 shroud.4025.title:"$the_composer_of_strands_article_cap$ ปรากฏตัว"
 shroud.4025.desc.default:"เราเดินตามร่องรอยกลิ่นอายของ §H[Root.Patron:the_composer_of_strands.GetPreCommunicationName]§! ดิ่งลึกเข้าไปใน §Hม่านพลัง§! มันทิ้งร่องรอยไว้ให้เราก้าวเดินตาม - ภาพนิมิตตรงนี้ ท่วงทำนองตรงนั้น มันเชื้อเชิญเราให้ขยับเข้าไปใกล้ขึ้น แต่ความคืบหน้านั้นเป็นไปอย่างช้า ๆ\n\nในที่สุด เราก็เข้าถึงตัวมัน เราได้รับการต้อนรับด้วยนิมิตที่หลากหลาย: ระบบดาวเคราะห์ที่เต็มไปด้วยกิจกรรม ความบิดเบี้ยวอันน่าทึ่งของรูปลักษณ์สิ่งมีชีวิต [Root.GetSpeciesAdj] แปรเปลี่ยนไปตามการโอบกอดของมัน เราหลงทางอยู่ในลายสลักอันเผ็ดร้อนที่พัวพันกันยุ่งเหยิง\n\nเราคว้าดึงที่เส้นด้าย ผูกปลายเข้าด้วยกัน ร่องรอยสัญญาณที่แตกต่างกันนั้นกลับรวมเป็นรูปแบบที่จัดเจนขึ้น เมื่อพลังงานของเราเหือดแห้งลง เราดื่มด่ำกับความสง่างามของรูปทรงและตัวตน การมีอยู่นั้นถอยกลับคืนสู่ความสงัด\n\nจุดมุ่งหมายของตัวตนแจ่มแจ้งชัดขึ้นต่อเราแล้วในตอนนี้ เราได้เห็นนิมิตแห่งการเจริญเติบโตอย่างอิสระไร้การควบคุม เมื่อ [GetTelepathPlural] ของเราฟื้นตัว ร่างกายของเราก็สามารถที่จะติดต่อสื่อสารคอมมูนกับตัวตนนี้ได้ $the_composer_of_strands_color_article$"
 shroud.4025.desc.hive: "$shroud.4025.desc.default$"
 shroud.4025.desc.gestalt_machine:"เราเดินตามร่องรอยระดับโมเลกุลของ §H[Root.Patron:the_composer_of_strands.GetPreCommunicationName]§! ดิ่งลึกเข้าไปใน §Hม่านพลัง§! มันทิ้งร่องรอยไว้ให้เราก้าวเดินตาม - ภาพนิมิตตรงนี้ ท่วงทำนองตรงนั้น มันเชื้อเชิญเราให้ขยับเข้าไปใกล้ขึ้น แต่ความคืบหน้านั้นเป็นไปอย่างช้า ๆ\n\nในที่สุด เราก็เข้าถึงตัวมัน เราได้รับการต้อนรับด้วยนิมิตที่หลากหลาย: ระบบดาวเคราะห์ที่เต็มไปด้วยกิจกรรม ความบิดเบี้ยวอันน่าทึ่งของรูปลักษณ์สิ่งมีชีวิต [Root.GetSpeciesAdj] แปรเปลี่ยนไปตามการโอบกอดของมัน เราหลงทางอยู่ในข่ายงานข้อมูลการออกแบบที่ไม่สอดคล้องกัน\n\nเราคว้าดึงที่เส้นด้าย ผูกปลายเข้าด้วยกัน ร่องรอยสัญญาณที่แตกต่างกันนั้นกลับรวมเป็นรูปแบบที่จัดเจนขึ้น เมื่อพลังงานของเราเหือดแห้งลง เราดำเนินการประมวลผลข้อมูลชุดนั้นสำเร็จ การมีอยู่นั้นถอยกลับคืนสู่ความสงัด\n\nจุดมุ่งหมายของตัวตนแจ่มแจ้งชัดขึ้นต่อเราแล้วในตอนนี้ เราได้เห็นนิมิตแห่งการเจริญเติบโตอย่างอิสระไร้การควบคุม เมื่อ [GetTelepathPlural] ของเราเติมพลังงานเสร็จสิ้น เราสามารถติดต่อเพื่อคอมมูนกับตัวตนนี้ได้ $the_composer_of_strands_color_article$"
