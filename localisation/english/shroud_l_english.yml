 shroud.first_contact.title: "$utopia.3300.name$"
 shroud.first_contact.prompt: "$utopia.2657.a$"

 shroud.first_contact.1.desc.default:"ม่านพลัง มันไหลเวียนอยู่เหนือความเป็นจริงที่เรารู้จัก เงาที่ทอดตัวจากความมืดมิด ทุกคนที่มีพลังจิตย่อมต้องเคยเห็นสถานที่แห่งนี้ในความฝัน แม้ว่าในเวลานั้นพวกมันจะไม่รู้ตัวก็ตาม\n\nเราใช้เวลาหลายปีในการพยายามเจาะม่านพลัง บีบให้มันบางลงเรื่อย ๆ ด้วยแรงกดดันจากจิตใจที่หลอมรวมกันของเรา ในอีกฟากฝั่ง ความพยายามของเราไม่ได้รอดพ้นสายตาไป มีสิ่งหนึ่งเฝ้ามองเราอยู่\n\nการคงอยู่ของมันแผ่รังสีพลังอำนาจอันน่าทึ่ง [GetPatronInsert] ในส่วนลึกของม่านพลัง มันแทบจะไม่สังเกตเห็นเรา เฝ้าดูเราเหมือนที่เรามองดูหยดน้ำค้างบนหน้าต่างเรือ\n\nหากเพียงแต่เราสามารถเข้าถึงจิตใจที่ลึกลับยากจะหยั่งถึงของมันได้"
 shroud.first_contact.1.desc.hive:"ม่านพลัง มันไหลเวียนอยู่เหนือความเป็นจริงที่เรารู้จัก ราวกับภาพนิมิตในใจของโดรนที่กำลังพักผ่อน แม้จะแปลกประหลาด แต่มันกลับรู้สึก... คุ้นเคยอย่างประหลาด\n\nเราใช้เวลาหลายปีในการพยายามเจาะม่านพลัง บีบให้มันบางลงเรื่อย ๆ ด้วยแรงกดดันจากจิตใจที่หลอมรวมกันของเรา ในอีกฟากฝั่ง ความพยายามของเราไม่ได้รอดพ้นสายตาไป มีสิ่งหนึ่งเฝ้ามองเราอยู่\n\nการคงอยู่ของมันแผ่รังสีพลังอำนาจอันน่าทึ่ง [GetPatronInsert] ในส่วนลึกของม่านพลัง มันแทบจะไม่สังเกตเห็นเรา เฝ้าดูเราเหมือนที่เรามองดูโดรนตัวหนึ่งท่ามกลางกลุ่มมหาศาล\n\nหากเพียงแต่เราสามารถเข้าถึงจิตใจที่ลึกลับยากจะหยั่งถึงของมันได้"
 shroud.first_contact.1.desc.robot:"ม่านพลัง มันอยู่นอกเหนือพารามิเตอร์เวลาและอวกาศใด ๆ ที่เราเคยตรวจพบมาก่อน สามารถเปรียบเทียบได้กับข้อมูลที่ผิดปกติซึ่งรบกวนรอบการพักทำงานของเราเท่านั้น\n\nเราใช้เวลาหลายปีในการพยายามเจาะแผงกั้นของมัน บีบให้มันบางลงเรื่อย ๆ ด้วยแรงกดดันจากหน่วยประมวลผลที่รวมกันของเรา ในอีกฟากฝั่ง ความพยายามของเราไม่ได้รอดพ้นสายตาไป มีสิ่งหนึ่งเฝ้ามองเราอยู่\n\nการคงอยู่ของมันแผ่รังสีพลังอำนาจอันน่าทึ่ง [GetPatronInsert] ในส่วนลึกของม่านพลัง มันแทบจะไม่สังเกตเห็นเรา เฝ้าดูเราเหมือนที่เรามองดูบิตเดียวในกระแสข้อมูล\n\nหากเพียงแต่เราสามารถเข้าถึงจิตใจที่ลึกลับยากจะหยั่งถึงของมันได้"

 shroud.first_contact.2.desc.all:"เราสัมผัสได้ถึงตัวตนอันยิ่งใหญ่ในม่านพลัง แต่การคำนวณนั้นหลบเลี่ยงเราไป ไม่เหมือนกับอวกาศที่แผ่ขยายออกไปตลอดกาล การเคลื่อนไหวของพวกมันไม่อาจติดตามได้ จุดหมายปลายทางของพวกมันย้อนกลับคืนสู่จุดกำเนิด ราวกับว่าพลังงานเหล่านั้นได้ให้กำเนิดตัวเองขึ้นมา\n\nไม่ว่าธรรมชาติของพวกมันจะเป็นอย่างไร พวกมันเรียกหาเราในฐานะจุดเอกฐานแห่งความคิดและเจตจำนง"
 shroud.first_contact.2.desc.default:"ท่ามกลางสุ้มเสียงนับไม่ถ้วน เราได้ยินเสียงหนึ่งชัดเจนกว่าเสียงอื่น - [GetPatronInsert] ที่โอบล้อมจิตใจเราไว้\n\nบางที ด้วยความพยายามที่เพียงพอ เราอาจเข้าถึงมันได้"
 shroud.first_contact.2.desc.robot:"ท่ามกลางสุ้มเสียงนับไม่ถ้วน เราตรวจพบเสียงหนึ่งชัดเจนกว่าเสียงอื่น - [GetPatronInsert] ที่ครอบงำการคำนวณของเรา\n\nบางที ด้วยความพยายามที่เพียงพอ เราอาจเข้าถึงมันได้"

 shroud.first_contact.3.desc.default:"เราก้าวผ่าน 'ห้วงกลางมิติ(ระหว่างนั้น)ความว่างเปล่าที่คั่นกลางม่านพลังจากความเป็นจริงที่จับต้องได้ของอวกาศทั่วไป\n\nทันทีที่เราก้าวเข้ามา เราสัมผัสได้ถึงการคงอยู่ของมัน [GetPatronInsert] ที่แผ่ซ่านในจิตใจเรา มันคือตัวตนที่มีพลังอำนาจยากจะจินตนาการ หลงเหลืออยู่รอท่าในวันพรุ่งนี้\n\nเราต้องไม่เบือนหน้าหนีถอยกลับไป"
 shroud.first_contact.3.desc.robot:"เราก้าวผ่านห้วงกลางมิติ ความว่างเปล่าที่คั่นกลางม่านพลังจากปรากฏการณ์ของอวกาศทั่วไป\n\nทันทีที่เราก้าวเข้ามา เราตรวจพบการคงอยู่ของมัน [GetPatronInsert] ที่แผ่ซ่านในจิตใจเรา มันคือตัวตนที่มีพลังอำนาจอันน่าทึ่ง หลงเหลืออยู่รอท่าในวันพรุ่งนี้\n\nเราต้องไม่เบือนหน้าหนีถอยกลับไป"

 shroud.first_contact.4.desc.default:"ม่านพลังเต้นระบำด้วยพลังงาน เราสัมผัสได้ถึงพลังงานของมันในทุกหนทุกแห่ง ทว่ามันไม่ปรากฏอยู่ ณ ที่ใดเลย การ 'ก้าวเข้าสู่' คือการแยกแยะรูปแบบจากประสาทสัมผัสที่เลือนลาง เพื่อรับรู้ถึงตัวตนอันยิ่งใหญ่ผ่านสมาธิอันแน่วแน่\n\nเราสัมผัสได้ถึงสัญญาณของหนึ่งในพลังอำนาจดังกล่าว - [GetPatronInsert] ในส่วนลึกที่หยั่งไม่ถึงเบื้องบน\n\nเราจะสามารถกลั้นหายใจได้นานพอที่จะเข้าถึงมันได้หรือไม่?"
 shroud.first_contact.4.desc.robot:"ม่านพลังเต้นระบำด้วยพลังงาน เราตรวจพบพลังงานของมันในทุกหนทุกแห่ง ทว่ามันไม่ปรากฏอยู่ ณ ที่ใดเลย การ 'ก้าวเข้าสู่' คือการตรวจหารูปแบบจากประสาทสัมผัสที่เลือนลาง เพื่อเปิดเผยถึงตัวตนอันทรงพลังผ่านการประมวลผลที่จดจ่อ\n\nเราตรวจพบสัญญาณของหนึ่งในพลังอำนาจดังกล่าว - [GetPatronInsert] ในส่วนลึกที่หยั่งไม่ถึงเบื้องบน\n\nวงจรระบบของเราจะทำงานหนักเกินขีดจำกัดก่อนที่เราจะเข้าถึงมันได้หรือไม่?"

 shroud.first_contact.end.b:"มีเรื่องให้ไตร่ตรองมากมาย"

 shroud.first_contact_insert.eater.default:"§Hเสียงคำรามอันหิวโหย§!"
 shroud.first_contact_insert.eater.machine:"§Hเสียงคำรามที่ไม่รู้จักอิ่ม§!"
 shroud.4005.title:"$the_eater_of_worlds_article_cap$ ปรากฏตัว"
 shroud.4005.desc.default:"เมื่อหยั่งลึกลงไปใน §Hม่านพลัง§! เราเข้าใกล้ระยะติดต่อของ §H[Root.Patron:the_eater_of_worlds.GetPreCommunicationName]§! มันคำรามด้วยความหิวกระหายอันกลวงเปล่า กัดกินกลืนทำลายอยู่ตลอดเวลาและไม่มีวันรู้จักอิ่ม สัญญาณสำรวจของเราได้รับการตอบรับกลับมาด้วยเปลวเพลิงปะทุและความล่มสลาย ความไม่แยแสต่อการทำความเข้าใจของเราทำให้เรารู้สึกอึดอัดแน่นอกอย่างยิ่ง\n\nในที่สุด สิ่งนั้นก็หมดความอดทน เสียงคำรามอันดุร้ายดังโอบล้อมจิตใจของ [GetTelepathPlural] ของเรา ท่ามกลางเศษซากปรักหักพังที่สั่นพ้องก้องกังวานและ [GetEaterEmergesExtra]\n\nทันทีทันใดที่มันเริ่มต้น สุ้มเสียงนั้นก็เงียบลงไป เหลือทิ้งไว้เพียงความหิวโหยที่ปวดร้าวทรมาน\n\nเจตจำนงของตัวตนนี้แจ่มแจ้งขึ้นต่อเราแล้วในตอนนี้ [GetEaterEmergesEnding]"
 shroud.4005.desc.hive: "$shroud.4005.desc.default$"
 shroud.4005.desc.gestalt_machine:"เมื่อหยั่งลึกลงไปใน §Hม่านพลัง§! เราเข้าใกล้ระยะติดต่อของ §H[Root.Patron:the_eater_of_worlds.GetPreCommunicationName]§! มันคำรามด้วยความหิวกระหายอันกลวงเปล่า กัดกินกลืนทำลายอยู่ตลอดเวลาและไม่มีวันรู้จักอิ่ม สัญญาณสำรวจของเราได้รับการตอบรับกลับมาด้วยเปลวเพลิงปะทุและความล่มสลาย ความไม่แยแสต่อการประมวลผลทำความเข้าใจของเรานั้นทรงอิทธิพลท่วมท้นอย่างยิ่ง\n\nในที่สุด สิ่งนั้นก็หมดความอดทน เสียงคำรามอันดุร้ายดังโอบล้อมระบบความคิดของ [GetTelepathPlural] ของเรา ท่ามกลางเศษซากปรักหักพังที่สั่นพ้องก้องกังวานและ [GetEaterEmergesExtra]\n\nทันทีทันใดที่มันเริ่มต้น สุ้มเสียงนั้นก็เงียบลงไป เราหลงเหลือความอ่อนแอเป็นครั้งแรกที่เราเคยบันทึกไว้เฉพาะในสายพันธุ์อินทรีย์เท่านั้น: ความหิวโหย\n\nเจตจำนงของตัวตนนี้แจ่มแจ้งขึ้นต่อเราแล้วในตอนนี้ [GetEaterEmergesEnding]"
 shroud.4005.desc.individual_machine: "$shroud.4005.desc.gestalt_machine$"
 shroud.4005.desc_extra_pacifist:"ความล่มสลาย มันแสดงภาพนิมิตของการรุกรานที่ไร้สติ"
 shroud.4005.desc_extra_robot:"ความล่มสลาย มันแสดงรูปแบบโครงสร้างของการทำสงครามที่สมบูรณ์แบบ"
 shroud.4005.desc_extra_organic:"ซากศพ มันแสดงโชคชะตาทางทหารแห่งความรุ่งโรจน์อันน่าสะพรึงกลัว"
 shroud.4005.desc_outro_pacifist:"มันคือสิ่งแห่งความรุนแรงและความขัดแย้งไม่ลงรอยกัน มันขัดแย้งกับหลักการที่มีค่าที่สุดของเราหลายประการ ไม่แนะนำให้ปรับประสานความเข้าถึงเพิ่มเติมกับตัวตนนี้ $the_eater_of_worlds_color_article$"
 shroud.4005.desc_outro_robot:"เรารับรู้นิมิตแห่งความรุนแรงและความรุ่งโรจน์ของมันแล้ว เมื่อ [GetTelepathPlural] ของเราเติมพลังงานเสร็จสิ้น เราสามารถติดต่อเพื่อคอมมูนกับตัวตนนี้ได้ $the_eater_of_worlds_color_article$"
 shroud.4005.desc_outro_organic:"เรารับรู้นิมิตแห่งความรุนแรงและความรุ่งโรจน์ของมันแล้ว เมื่อ [GetTelepathPlural] ของเราฟื้นฟูร่างกายเสร็จสิ้น เราสามารถติดต่อเพื่อคอมมูนกับตัวตนนี้ได้ $the_eater_of_worlds_color_article$"
 shroud.4005.a.default: "[GetEaterEmergesOptionA]"
 shroud.4005.a.robot: "[GetEaterEmergesOptionA]"
 shroud.4005.a.pacifist:"เราสามารถเรียนรู้ได้ แม้กระทั่งจากขุมพลังอันน่าสะพรึงกลัวนี้"
