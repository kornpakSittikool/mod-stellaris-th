 shroud.10.name:"พันธมิตรผู้ร่วมโค่นล้มราชินีสังเคราะห์"
 shroud.10.desc.intro:"ม่านพลัง(คําราม)สั่นสะเทือนด้วยความรูนแรงอย่างไม่เคยปรากฏมาก่อน กลุ่มเกลียวพลังงานมหาศาลบิดม้วนและฟาดฟันอยู่ในห้วงอากาศธาตุ\n\nท่ามกลางความสับสนอลหม่านที่กะพริบแสงถี่นี้ เราได้เห็นแสงสะท้อนทางจิตของราชินีสังเคราะห์ ความไร้ขีดจำกัดและอำนาจเหนือทุกสิ่งของนาง ทำให้นางเล่นสนุกกับกาแล็กซีในฝ่ามือได้อย่างง่ายดาย"
 shroud.10.desc.outro:"เพราะเหตุใด? สิ่งนั้นรู้ถึงจุดอ่อนที่พวกเราไม่รู้ใช่หรือไม่? มันจะช่วยเหลือเราหรือไม่หากเราเอื้อมมือออกไปหา?\n\nเมื่อเราเพ่งจิตไปยังผู้ให้ชีวิตแก่ธุลีดิน(ผู้แสดง)เราสัมผัสได้ถึงความใจร้อนของมัน เป็นไปได้อย่างยิ่งว่าเราจะมีโอกาสเพียงครั้งเดียวเท่านั้นที่จะขอความช่วยเหลือจากมันในเรื่องนี้ ซึ่งจะต้องใช้ §Hพลังงาน(หัวเราะเบาๆ)§! และสาร §H$sr_zro$§! ปริมาณมหาศาลในการดำเนินความพยายามนี้"
 shroud.10.desc:"$shroud.10.desc.intro$\n\nเราไม่ได้อยู่เพียงลำพังในการเฝ้าสังเกตการณ์นาง จากจุดสังเกตการณ์ที่ซ่อนเร้น สิ่งดำรงอยู่ที่รู้จักกันในนาม $the_animator_of_clay_color_article$ กำลังจดจ้องมองดูอยู่ โดยไม่หวั่นเกรงต่อพลังที่ไร้ขอบเขตของราชินีเลย\n\n$shroud.10.desc.outro$"
 shroud.10.desc.1:"$shroud.10.desc.intro$\n\nเราไม่ได้อยู่เพียงลำพังในการเฝ้าสังเกตการณ์นาง จากจุดสังเกตการณ์ที่ซ่อนเร้น $the_animator_of_clay_color_article$ กำลังจดจ้องมองดูอยู่ โดยไม่หวั่นเกรงต่อพลังที่ไร้ขอบเขตของราชินีเลย\n\n$shroud.10.desc.outro$"
 shroud.10.a: "$animator.shroud$"
 shroud.10.b:"เราไม่จำเป็นต้องพึ่งพาความช่วยเหลือของมัน"
 shroud.10.b.tt:"เราจะไม่มีวันได้รับโอกาสอื่นอีกในการขอความช่วยเหลือจากผู้ให้ชีวิตแก่ธุลีดิน(ผู้แสดง)เพื่อพิชิตสยบเซตานา"

 attunement_choice_tt:"§Lทางเลือกนี้จะส่งกระแสสะท้อนสั่นพ้องลึกเข้าไปในม่านพลัง...§!"

 shroud_boon:"§Yพรมงคลแห่งม่านพลัง(Bon of the Shurad)§!"
 random_boon_low:"มี §Rโอกาสต่ำ§! ที่จะได้รับ $shroud_boon$"
 random_boon_medium:"มี §Yโอกาสปานกลาง§! ที่จะได้รับ $shroud_boon$"
 random_boon_high:"มี §Gโอกาสสูง§! ที่จะได้รับ $shroud_boon$"
 none.bestowed:"ม่านพลังล่าถอยห่างออกไป"
