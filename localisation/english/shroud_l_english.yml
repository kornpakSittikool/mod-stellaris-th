 shroud.delve_event.boon.1:"ม่านพลังได้มอบพลังอำนาจเกื้อหนุนให้แก่พวกเรา"
 shroud.delve_event.boon.2:"ม่านพลังได้ประสาทพรประทานแก่พวกเรา"
 shroud.delve_event.boon.3:"พวกเราได้รับพรประทานจากม่านพลัง"
 shroud.delve_event.boon.4:"พวกเราได้รับการเสริมความแข็งแกร่งจากความพยายามฟันฝ่าของเรา"
 shroud.delve_event.boon.5:"ความมุมานะของเราได้รับรางวัลตอบแทนจากม่านพลัง"
 shroud.delve_event.boon.6:"ม่านพลังประทานสิ่งล้ำค่าแก่พวกเราด้วยความเมตตาปรานี"
 shroud.delve_event.boon.7:"ม่านพลังช่วยเสริมพลังกายจิตใจให้แก่พวกเรา"
 shroud.delve_event.boon.8:"ม่านพลังได้มอบประทานสิ่งของล้ำค่าแก่พวกเรา"
 shroud.delve_event.boon.9:"ม่านพลังตอบแทนในผลลัพธ์แห่งความพยายามของพวกเรา"
 shroud.delve_event.boon.10:"ความโปรดปรานเกื้อกูลจากม่านพลังกำลังสาดส่องลงมาที่พวกเรา"
 shroud.delve_event.boon.11:"ม่านพลังเห็นสมควรที่จะมอบพลังเกื้อหนุนแก่พวกเรา"
 shroud.delve_event.boon.12:"ความโปรดปรานเกื้อกูลแห่งม่านพลังช่วยบันดาลพรให้เรา"
 shroud.delve_event.boon.13:"ม่านพลังอำนวยพรประทานแก่ความพยายามของพวกเรา"
 shroud.delve_event.boon.14:"พวกเราได้รับรางวัลสิ่งประเสริฐด้วยพระพรแห่งม่านพลัง"
 shroud.delve_event.boon.15:"ม่านพลังมอบของรางวัลให้เราด้วยการเพิ่มพูนพลังความแข็งแกร่ง"
 shroud.delve_event.curse.1:"ม่านพลังได้ลงทัณฑ์คำสาปใส่เราเสียแล้ว"
 shroud.delve_event.curse.2:"คำสาปชั่วร้ายจากม่านพลังพุ่งตรงเข้ามาทำร้ายเรา"
 shroud.delve_event.curse.3:"ความพยายามของเราจบลงด้วยการถูกทัณฑ์คำสาปตราหน้า"
 shroud.delve_event.curse.4:"ผลตอบแทนแห่งความพยายามของเราได้รับการตอบสนองด้วยคำสาปทมิฬ"
 shroud.delve_event.curse.5:"ม่านพลังได้พัดพาความเคราะห์ร้ายอับโชคเข้าใส่เรา"
 shroud.delve_event.curse.6:"เราโดนจารึกตราปะหน้าด้วยแผลคำสาปแสนทรมาน"
 shroud.delve_event.curse.7:"ม่านพลังได้ลงบันดาลคำสาปทำลายใส่จักรวรรดิของเรา"
 shroud.delve_event.curse.8:"ม่านพลังปฏิเสธไม่ยอมรับพวกเราด้วยทัณฑ์คำสาปสะกด"
 shroud.delve_event.curse.9:"โทสะความโกรธเกรี้ยวแห่งม่านพลังได้กลายเป็นคำสาปกัดกินเรา"
 shroud.delve_event.curse.10:"ม่านพลังกักขังล้อมกรอบพวกเราไว้ด้วยสิ่งเคราะห์ร้าย"
 shroud.delve_event.curse.11:"ม่านพลังทำเครื่องหมายปะหน้าเราไว้รอวันล่มสลายความพินาศ"
 shroud.delve_event.curse.12:"ม่านพลังแบกรับภาระคำสาปแสนกดทับลงบนไหล่เรา"
 shroud.delve_event.curse.13:"ม่านพลังสาปแช่งผลลัพธ์แห่งความเพียรพยายามของพวกเรา"
 shroud.delve_event.curse.14:"พวกเราโดนตัดสินโทษทัณฑ์กล่าวโทษโดยม่านพลัง"
 shroud.delve_event.curse.15:"ม่านพลังมอบรางวัลให้แก่เราด้วยความเหยียดหยามชิงชัง"

 shroud.3000.title:"ความรู้สึกประทับใจที่เลือนหายอย่างรวดเร็ว"
 shroud.3000.desc:"ท่ามกลางความมืดมิดที่หมุนวน เงาร่างห่างไกลก่อตัวขึ้นชั่วครู่ก่อนจะสลายกลับคืนสู่ความว่างเปล่า... เสียงอื้ออึงสับสนอลหม่านที่ฟังไม่ได้ศัพท์สะท้อนก้องกังวาน... แสงสว่างกะพริบไหวแล้วมอดดับ จุดความร้อนเพิ่มสูงขึ้นแล้วลดลง\n\nมีการเคลื่อนไหว บางสิ่งบางอย่างกำลังหมุนคว้าง เป็นพวกเราที่กำลังขยับเขยื้อน หรือเป็นม่านพลังเองที่เคลื่อนไหวกันแน่?\n\nบางตัวตนกำลังใกล้เข้ามา ราวกับกำลังบีบตัวมาจากทุกสารทิศพร้อม ๆ กัน จากนั้นก็มีสุ้มเสียงหนึ่งดังขึ้น\n\n§Hเจ้าเห็นสิ่งใด?§!"
 shroud.3000.a:"เรามองเห็นโลกที่กำลังถูกแผดเผาด้วยเปลวเพลิง"
 shroud.3000.a.reply:"มีน้ำหนักบางอย่างเปลี่ยนทิศ สุ้มเสียงนั้นย้อนกลับมาอีกครั้ง...\n\n§Hดีเลิศ.§!\n\nความมืดมิดเอียงคว่ำแล้วหมุนวน มีสิ่งบางอย่างกดทับเข้าใส่พวกเราอย่างหนักหน่วงชั่วขณะ จากนั้นในทันใดนั้น พวกเราก็ตกอยู่ในความโดดเดี่ยวอีกรอบ"
 shroud.3000.b:"เรามองเห็นงานเฉลิมฉลองอันรื่นเริง"
 shroud.3000.b.reply:"บางสิ่งที่มีน้ำหนักมหาศาลสั่นสะท้าน ความมืดมิดค่อย ๆ บดขยี้เข้าใส่พวกเรา แรงขึ้นและแนบแน่นขึ้นเรื่อย ๆ...\n\n§Hไม่!§!\n\nความว่างเปล่าพลิกเอียงแล้วหมุนคว้าง จู่ ๆ พวกเราก็ตกอยู่ในความโดดเดี่ยวอีกครั้ง..."
 shroud.3000.c:"พวกเรายังไม่แน่ใจ"
 shroud.3000.c.reply:"§Hช่างอ่อนแอเหลือเกิน!§!\n\nความว่างเปล่าพลิกเอียงแล้วหมุนคว้าง ทันใดนั้น พวกเราก็ตกอยู่ในความโดดเดี่ยวอีกหน..."

 shroud.3005.title:"ความหิวโหยน้ำลายสอ"
 shroud.3005.desc:"กลิ่นคาวเลือดที่เหม็นเน่าของเครื่องในโชยเข้าท่วมท้นประสาทสัมผัสของเรา\n\nภาพนิมิตที่บิดตัวและขู่คำรามด้วยความโกรธเกรี้ยวหิวโหย เริ่มผุดขึ้นมาจากส่วนลึกของม่านพลัง เสียงร้องอย่างดุร้ายของสัตว์ป่าที่ผอมโซสะท้อนก้องมาก่อน... เรารับรู้ได้ถึงความหิวโหยของพวกมัน จากนั้นคมเขี้ยวน้ำลายสอของพวกมันก็กลายมาเป็นของเราเอง\n\nเงาร่างปรากฏขึ้นเบื้องหน้าเรา ปศุสัตว์ที่ตื่นตระหนก เหยื่อผู้เคราะห์ร้าย อยู่ใกล้จนแทบเอื้อมถึง... ความปวดร้าวอันเกิดจากความหิวโหยทวีความรุนแรงจนทนไม่ไหว\n\nประสาทสัมผัสของเราบิดม้วน รัดแน่นขึ้นเมื่อความหิวกลืนกินความนึกคิด เสียงกรีดร้องเหล่านี้เป็นของเหยื่อที่ถูกล่า... หรือเป็นเสียงจากภายในใจเรากันแน่?\n\nเครื่องพันธนาการที่ล่ามเราไว้รัดตรึงขึ้น ก่อนจะปริแตกออกเมื่อสุ้มเสียงหนึ่งม้วนเกลียวผ่านความทรมานนี้ พร้อมกรีดร้องก้องว่า:\n\n§Hจงทำลายพันธนาการของเจ้าซะ! แล้วกลืนกินงานเลี้ยงนี้!§!"
 shroud.3005.a:"ทำลายตรวนโซ่ตรึง แล้วออกล่ากลืนกินเหยื่อเสีย"
 shroud.3005.a.boons.tt:"ได้รับ $shroud_boon$ แบบสุ่มที่เน้นด้านการต่อสู้รบ"
 shroud.3005.a.reply:"เครื่องพันธนาการของเราหักสะบั้นลง\n\nหิวโหยอย่างบ้าคลั่ง เป็นอิสระไร้การควบคุม\n\nความสะพรึงกลัว!\n\n§Hจงกินซะ.§!"
 shroud.3005.b:"ต้านทานกระแสความหิวโหย ทำจิตใจให้สงบระงับลง"
 shroud.3005.b.reply:"โซ่ตรวนยังคงล่ามไว้อย่างแน่นหนา สุ้มเสียงนั้นเดือดดาลด้วยความโกรธแค้นในขณะที่เราสกัดกั้นอิทธิพลของมัน ทำจิตใจให้สงบนิ่งเพื่อยึดอำนาจการควบคุมคืนมา\n\n§Hช่างอ่อนแอไร้ความสามารถเหลือเกิน!§!\n\nความหิวโหยจางหายไป หลงเหลือเพียงความขุ่นเคืองใจที่ค่อย ๆ สลายตัวหายไปในม่านพลัง"

 shroud.3010.title:"การบูชายัญสังเวยงานเลี้ยง"
 shroud.3010.desc:"จากห้วงอเวจี สุ้มเสียงหนึ่ง... ก้องกังวาน แหบพร่า และเปี่ยมล้นด้วยความประสงค์ร้าย... ร้องเรียกหาพวกเรา\n\n§Hจงเลี้ยงดู จงบริโภค จงกลืนกินเสีย.§!\n\nภาพนิมิตระเบิดพุ่งขึ้นมาโดยไม่ได้ตั้งใจ โลกดาวเคราะห์ต่าง ๆ ล่มสลายกลายเป็นเพียงเเถ้าถ่านและความเงียบสงัด เสียงคร่ำครวญของชาว [Root.GetCitizenPlural] ของเราดังระงมเมื่อร่างทางกายภาพของพวกเขาถูกดูดกลืนกินโดยพลังงานจิตวิทยา เพื่อปรนเปรอความหิวโหยของกลุ่มเสียงนั้น... และความหิวโหยของตัวเราเอง...\n\nเมื่อภาพเหล่านี้แสดงออกมา เรารู้สึกได้ถึงอีกตัวตนหนึ่งที่พยายามโน้มน้าวให้เราแสดงความยับยั้งชั่งใจและกลมเกลียวร่วมมือกับชาว [Root.GetCitizenPlural] ของเรา เพื่อเติบโตอย่างแข็งแกร่งไปด้วยกัน ทว่าเสียงนั้นกลับถูกกลบหายไปเมื่อเสียงกึกก้องนั้นแผดร้องขึ้นมา"
 shroud.3010.desc.organic:"§Hจงส่งมอบเนื้อหนังของพวกมันมาให้ข้า!§!"
 shroud.3010.desc.other:"§Hจงมอบร่างของพวกมันมาให้ข้า!§!"
 shroud.3010.a:"กลืนกินสังเวย"
 shroud.3010.a.reply:"เสียงกรีดร้องของผู้ที่ถูกสังเวยกลืนกินสะท้อนก้องไปทั่วทั้งม่านพลังและจักรวรรดิ ก่อนจะเงียบงันลงอย่างฉับพลัน\n\nด้วยการบูชายัญครั้งนี้ พลังอำนาจของเราได้ทวีขึ้นในขณะที่ความหิวโหยล่าถอยไป"
 shroud.3010.b:"ร่วมมือประสาน"
 shroud.3010.b.reply:"เราสยบสุ้มเสียงนั้น แล้วยื่นมือออกไปผสานความเป็นหนึ่งเดียวข้ามผ่านม่านพลัง โอบกอดจักรวรรดิของเรา เสียงถอนหายใจด้วยความโล่งอกและอบอุ่นร่วมกันได้กลบเสียงกรีดร้องด้วยโทสะหายวับไป พร้อมกับที่ความหิวโหยเสื่อมสลายลง"

 shroud.3015.title:"นิมิตภาพที่เลือนหายชั่วคราว"
 shroud.3015.desc:"กระแสพลังจิตวิทยาอันทรงพลังเข้าปะทะห้ำหั่นกันท่ามกลางความมืดมิด ณ ที่แห่งนี้ เงาพุ่งผ่านและโอบล้อมรอบตัวเรา... แสงริบหรี่กะพริบเป็นจังหวะอยู่เบื้องหน้า\n\nทันใดนั้น ภาพเหตุการณ์หนึ่งก็ปรากฏชัดเจนขึ้น เพียงชั่วพริบตาเดียวเท่านั้น โครงร่างต่าง ๆ สลายตัวหายไปก่อนที่เราจะทันคว้าจับสัมผัสความหมายได้\n\nตัวตนแปลกประหลาดประทับตัวโอบล้อมรอบพวกเรา\n\n§Hเจ้าได้เห็นสิ่งใด?§!"
 shroud.3015.a:"เรามองเห็นผืนป่าอันอุดมสมบูรณ์ เต็มไปด้วยสิ่งมีชีวิตหลากหลายสายพันธุ์"
 shroud.3015.a.reply:"ความเงียบงันขยายตัว สุ้มเสียงนั้นย้อนกลับมา...\n\n§Hยอดเยี่ยมยิ่ง.§!\n\nความร้อนอันเปี่ยมพลังพลุ่งพล่านขึ้นภายในตัวเรา ก่อนจะค่อย ๆ มอดดับลง ตัวตนปริศนานั้นได้จากไปแล้ว"
 shroud.3015.b:"เรามองเห็นดินแดนรกร้างว่างเปล่า ถูกสูบกินทรัพยากรทุกสิ่งจนหมดสิ้น"
 shroud.3015.b.reply:"สุ้มเสียงนั้นย้อนกลับมา...\n\n§Hไม่มีวัน!§!\n\nความเย็นยะเยือกสุดขั้วก่อตัวขึ้นภายในตัวเรา ก่อนจะสลายหายไปอย่างรวดเร็ว ตัวตนปริศนานั้นได้จากไปแล้ว"
 shroud.3015.c:"พวกเรายังไม่แน่ใจ"
 shroud.3015.c.reply:"สุ้มเสียงนั้นย้อนกลับมา...\n\n§Hช่างน่าเบื่อหน่ายเหลือเกิน.§!\n\nความว่างเปล่าแสนเคว้งคว้างเข้าถาโถมพวกเรา ก่อนจะเลือนหายไปทันที ตัวตนปริศนานั้นได้จากไปแล้ว"

 shroud.3020.title:"การทดลองการอนุรักษ์ที่ยั่วยวนจิต"
 shroud.3020.desc:"จากระหว่างชั้นห้วงม่านพลังอันหลากหลาย ภาพนิมิตหนึ่งได้คลี่คลายออกมาตรงหน้าเรา\n\nสายหมอกก่อร่างเป็นโครงร่างของสิ่งมีชีวิตที่กำลังดิ้นรนทุรนทุราย ถูกพันธนาการและสำลักในขณะที่เส้นใยหมอกรัดตรึงรอบตัวมันแน่นขึ้นเรื่อย ๆ\n\nสัตว์ชนิดนี้ไม่เหมือนกับสิ่งมีชีวิตใด ๆ ที่เราเคยพบพานมาก่อน\n\nสุ้มเสียงหนึ่งสอดแทรกเข้ามาในจิตใจเรา\n\n§Hเส้นด้ายแห่งโชคชะตากำลังเรียกหา! เจ้าจะดึงด้ายเส้นใดกัน?§!"
 shroud.3020.a:"ปลดปล่อยปลดปล่อยสิ่งมีชีวิตตนนี้"
 shroud.3020.a.reply:"สุ้มเสียงนั้นสะท้อนก้องใน [GetMindLoc] ของเราเมื่อสิ่งมีชีวิตนั้นเลือนหายไปจากสายตา\n\n§Hความเจริญรุ่งเรือง.§!\n\nภาพเหตุการณ์สั้น ๆ อีกภาพหนึ่งผุดขึ้นมา นั่นคือการฟื้นตื่นของชีวิต ณ ที่แห่งใดแห่งหนึ่งในจักรวรรดิของเรา"
 shroud.3020.b:"กักขังจับกุมมันไว้"
 shroud.3020.b.reply:"สุ้มเสียงนั้นล่าถอยไปจากความคิดของเรา หลงเหลือเพียงเสียงร้องสะท้อนก้องที่สะเทือนผ่านภาพนิมิตของภูมิประเทศอันแห้งแล้งรกร้าง\n\n§Hโรคระบาดมหันตภัย.§!"
 shroud.3020.c:"ปลิดชีพทำลายมันเสีย"
 shroud.3020.c.swarm:"กลืนกินบดเคี้ยวเสีย"
 shroud.3020.c.reply:"สุ้มเสียงนั้นถูกผลักออกไปจากความคิดของเราเมื่อความปรารถนาอันยากจะต้านทานเข้าครอบงำ ความกระหายเลือดบ่าไหลเข้าท่วมท้น [GetMindLoc] ของเราในขณะที่เสียงหัวเราะอย่างป่าเถื่อนสะท้อนก้องผ่านความว่างเปล่า\n\n§Hแน่นอนอยู่แล้ว! เหยื่อที่ล่าง่าย ๆ เช่นนี้!§!"

 shroud.3025.title:"ภูมิประเทศที่แปรสภาพบิดเบือน"
 shroud.3025.desc:"สายหมอกแห่งม่านพลังคลี่ตัวออก เผยให้เห็นภาพนิมิตที่หมุนวนผสมผสานกันอย่างไร้จุดจบ\n\nภูมิประเทศอันมืดมนบิดเบี้ยวอย่างไม่น่าเชื่อตรงหน้าเรา เทือกเขาผุดพุ่งสูงขึ้นและพังทลายลง มหาสมุทรที่เดือดพล่านของความอลหม่านระเหยหาย ทิ้งไว้เพียงโครงกระดูกสีขาวหม่นของสิ่งมีชีวิตใต้น้ำกระจายอยู่ทั่วทะเลทรายที่ไร้ขอบเขต\n\nภายใต้เรือนยอดไม้ของผืนป่า สัตว์ป่าผู้อ่อนโยนหากินอยู่ในถิ่นที่อยู่ ก่อนจะชักเกร็งและกลายพันธุ์เป็นสัตว์ประหลาดกระหายเลือด พวกมันฉีกกระชากกันและกันจนเป็นชิ้น ๆ ก้าวเข้าสู่วัฏจักรแห่งความตายและการเกิดใหม่ที่ไม่มีวันสิ้นสุด\n\nท่ามกลางความสับสนนี้ สุ้มเสียงหนึ่งได้แทรกทะลวงเข้าสู่ [GetMindLoc] ของเรา\n\n§Hช่างไร้ระเบียบเหลือเกิน พันตูพัวพันกันเองจนยุ่งเหยิง§!"
 shroud.3025.a:"สยบธรรมชาติตามเจตจำนงของเรา"
 shroud.3025.a.reply:"เราเอื้อมมือออกไป คว้าจับความยุ่งเหยิงเบื้องหน้าเรา\n\nผูกมัดจุดเด่นของภูมิประเทศให้คงอยู่กับที่ บังคับให้แผ่นดินทวีปตั้งถิ่นฐานอย่างมั่นคง\n\nเมื่อชิ้นส่วนต่าง ๆ ประกบลงตัวเข้าด้วยกัน สุ้มเสียงนั้นก็ก้องสะท้อน\n\n§Hช่างราบเรียบ จืดชืด และว่างเปล่าเหลือเกิน...§!"
 shroud.3025.b:"ปล่อยให้ความไร้ระเบียบของธรรมชาติดำเนินรุ่งเรืองต่อไป"
 shroud.3025.b.reply:"เราเฝ้ามองดูขณะที่ภาพนิมิตดำเนินต่อไป วัฏจักรที่ไม่มีวันจบสิ้นเลือนรางเข้าด้วยกันก่อนจะระเบิดออกไปด้านนอกและหยุดลงรวดเร็วพอ ๆ กับตอนเริ่มต้น\n\nพลังงานพลุ่งพล่านไปทั่วเวิ้งว้างที่ไร้ขอบเขต ก่อนจะปรับปรุงตัวและแปลงร่างไปเป็นรูปแบบใหม่\n\nสุ้มเสียงนั้นก้องสะท้อน\n\n§Hความขัดแย้งที่สงบระงับ ความเป็นหนึ่งเดียวที่ไร้ระเบียบ§!"
 shroud.3025.b.reply.tt:"ดาวเคราะห์ดวงนี้จะได้รับ §Gตัวแปรปรับผลเชิงบวก§! และ §Rตัวแปรปรับผลเชิงลบ§! แบบสุ่มอย่างละหนึ่งอย่าง"

 shroud.3030.title:"ปริซึมในความมืดมิด"
 shroud.3030.desc:"ความระสับระส่ายที่หมุนวนของม่านพลังได้สงบตัวลงจนเผยให้เห็นผืนทรายสีดำทอดตัวยาวไกลสุดลูกหูลูกตา ได้ยินเสียงคลื่นกระทบฝั่งแว่วมาทว่ากลับมองไม่เห็นสิ่งใด\n\nเบื้องหน้า หรือบางทีอาจจะเป็นเบื้องหลัง ปริซึมชิ้นหนึ่งได้ปรากฏขึ้น ลำแสงสายหนึ่งพุ่งเข้ากระทบมัน หักเหออกชั่วขณะจนก่อเป็นภาพมืดมัวภาพหนึ่ง\n\nวิญญาณร่างเงามืดจำนวนนับไม่ถ้วนและรูปร่างที่แปรเปลี่ยนไปมาปรากฏขึ้นชั่ววูบ ก่อนจะถูกความมืดมิดกลืนกินกลับคืนไปอีกครั้ง\n\nบนผืนทรายใกล้ ๆ นั้น ตัวตนหนึ่งประทับลงถิ่นฐาน\n\n§Hสิ่งที่สำแดงออกมานั้น ได้รับการจดจ้องมองเห็นแล้วใช่หรือไม่?§!"
 shroud.3030.a:"เรามองเห็นการประชุมที่เปี่ยมด้วยสุ้มเสียงหลากหลายรุมล้อม"
 shroud.3030.a.reply:"เม็ดทรายค่อย ๆ เคลื่อนไหว สุ้มเสียงนั้นย้อนกลับมา\n\n§Hดีเลิศ ความสามัคคีปรองดองคือวิถีแห่งสากลจักรวาล.§!\n\nพวกเราสัมผัสได้ถึงน้ำหนักที่เคยกดทับได้รับการยกปลดปล่อยออกไป และเรากลับมาอยู่เพียงลำพังอีกครั้ง"
 shroud.3030.b:"เรามองเห็นการเข่นฆ่าทำลายล้างของสมรภูมิรบศึกสงคราม"
 shroud.3030.b.reply:"ผืนทรายจู่ ๆ ก็หมุนวนด้วยความเร็วระดับพายุพัดกระหน่ำ\n\n§Hไม่! จงปล่อยให้อาวุธเหล่านั้นผุกร่อนเป็นสนิมและจมอยู่กับการถูกลืมเลือนไปเสีย!§!\n\nพายุทรายสงบลง สุ้มเสียงนั้นได้จากไปแล้ว"
 shroud.3030.c:"พวกเรายังไม่แน่ใจ"
 shroud.3030.c.reply:"เม็ดทรายค่อย ๆ เคลื่อนตัวสลับกัน\n\n§Hความลังเลโลเลรังแต่จะพาไปสู่ความล้มเหลวพินาศ...§!\n\nพวกเราตกอยู่ในความโดดเดี่ยวอีกหน"

 shroud.3035.title:"ศึกทะเลาะวิวาทของเงาร่างรอยมืด"
 shroud.3035.desc:"พลังงานความโกลาหลของม่านพลังบิดเกลียวและพลุ่งพล่านขึ้นอย่างรุนแรง\n\nเส้นใยเงาฟาดฟันและขดม้วน สายหมอกหนากระโจนใส่กันและกันอย่างป่าเถื่อน ท่ามกลางพายุแห่งโทสะพลังจิตที่เกรี้ยวกราดนี้ สิ่งมีชีวิตไร้รูปสองตนกำลังปะทะต่อสู้กันอย่างไม่ลดละ ไม่ยอมศิโรราบ และท่วมท้นด้วยความแค้นเคืองเดือดดาล\n\nตัวตนแปลกหน้าบางอย่างกดทับเข้าสู่ [GetMindPhysicalLoc] ของเรา รุกรานและแผ่กว้างใหญ่โตมโหฬาร\n\n§Hผู้ใดที่ล่วงล้ำเข้ามาในนี้ จะต้องนำบทสรุปความเด็ดขาดติดมือมาด้วย§!"
 shroud.3035.a:"การเจรจาพูดคุยจะนำพาไปสู่ความเข้าใจเห็นใจร่วมกัน"
 shroud.3035.a.reply:"สายหมอกหนาจางหายไปในตัวเอง สลายไปกับพลังงานจิตวิทยาที่หมุนวนอยู่เบื้องหลัง สติสัมปชัญญะได้รับการฟื้นคืนกลับมา\n\n§Hความสามัคคีกลมเกลียวคือปัญญาอันชาญฉลาด.§!\n\nบัดนี้ม่านพลังกลับสู่ความสงบเรียบร้อยขึ้น"
 shroud.3035.b:"การประนีประนอมผ่อนปรนคือความอ่อนแอ"
 shroud.3035.b.reply:"ทุกครั้งที่สายหมอกปะทะกัน พลังงานที่เดือดพล่านรอบตัวเรายิ่งทวีความรุนแรงมากขึ้น\n\n§Hความรุนแรงคือผลตอบแทนแก่สิ่งมีชีวิตที่ไร้ความคิดตรึกตรอง.§!\n\nพลังงานอันบิดม้วนของม่านพลังกระตุกสั่นไหวระเบิดขึ้นอีกคำรบ"

 shroud.3040.title:"ภาพนิมิตที่ไม่เคยพบเห็นมาก่อน"
 shroud.3040.desc:"บ่อน้ำสีดำสนิทแผ่กว้างออกไปเบื้องหน้าเรา\n\nทันใดนั้น ภาพมืดมัวกะพริบไหวผ่านพื้นผิวน้ำ เราได้เห็นยอดเขาระยิบระยับที่ปะปนไปด้วยประกายทองคำประกายระยับสะท้อนส่องประกายทุกเหลี่ยมมุม ก่อนที่มันจะมอดอันตรธานหายไปอย่างรวดเร็ว\n\nสุ้มเสียงหนึ่งสะท้อนก้องกังวานลึกภายในซอกมุม [GetMindLoc] ของเรา\n\n§Hเจ้าได้เห็นสิ่งที่ไม่เคยถูกมองเห็นแล้วใช่หรือไม่?§!"
 shroud.3040.a:"เรามองเห็นเหมืองหินมีค่า ที่พร้อมรอให้เราเข้าไปตอกเจาะนำออกมา"
 shroud.3040.a.reply:"ระลอกคลื่นเกิดขึ้นพร้อมกันหลายสายและแผ่ขยายออกไปทั่วพื้นผิวน้ำ เรารู้สึกถึงสุ้มเสียงนั้นย้อนมาอีกคำรบ\n\n§Hการเติบโตที่ไร้ขอบเขตจะประคองจุดสมดุลที่ยากจะคาดเดา.§!\n\nเมื่อผิวน้ำสงบนิ่งลง เราสัมผัสได้ว่าสุ้มเสียงนั้นกำลังถดถอยห่างออกไป"
 shroud.3040.b:"เรามองเห็นความสมบูรณ์แบบของธรรมชาติ ที่สมควรจะรักษาไว้คงเดิม"
 shroud.3040.b.reply:"ของเหลวน้ำเริ่มปั่นป่วน คลื่นม้วนตัวสูงและซัดสาดอย่างบ้าคลั่ง น้ำวนขนาดใหญ่ก่อตัวท่ามกลางความมืดมิด สุ้มเสียงนั้นสะท้อนกลับมาด้วยระดับกำลังที่เกรี้ยวกราดขึ้นกว่าเก่า\n\n§Hยอมรับไม่ได้เด็ดขาด! จงเติบโตและไขว่คว้าเข้าไว้! จงขยายและแย่งชิง!§!\n\nพื้นผิวน้ำสงบเงียบลงอีกหน สุ้มเสียงนั้นจากไปแล้ว"
 shroud.3040.c:"พวกเรายังไม่แน่ใจ"
 shroud.3040.c.reply:"ของเหลวน้ำสั่นไหว สุ้มเสียงนั้นส่งตรงย้อนหาเราอีกครั้ง\n\n§Hความแน่วแน่ลังเลแกว่งไกว... นั่นคือสัญญาณความอ่อนแอในจิตใจความมุ่งมั่นของเจ้า.§!\n\nเมื่อพื้นผิวน้ำนิ่งสงบลง เราสัมผัสได้ถึงเสียงที่ค่อย ๆ จางหายห่างออกไป"

 shroud.3045.title:"แกนกลางเรืองแสง(น้ําตาลเทียม)"
 shroud.3045.desc:"สายหมอกจัดระเบียบตัวเองใหม่เบื้องหน้าเรา พลังงานเรืองแสงกะพริบไหวด้วยความกระฉับกระเฉงอย่างกะทันหัน เราเห็นโครงร่างของต้นไม้รูปทรงประหลาด\n\nพุ่มใบไม้หนาทึบขนาดใหญ่ของมันเปล่งประกายระยิบระยับขณะที่เราก้าวเข้าไปใกล้ มีการเปลี่ยนสีสันไปมาอย่างรวดเร็วระหว่างสีม่วง สีชมพู และสีดำ\n\nณ ฐานรากของมันมีแกนกลางที่เรืองแสงสีนวลส่องสว่าง สอดประสานประสานไปกับสีสันที่ปรับเปลี่ยนของพุ่มใบไม้\n\nสุ้มเสียงหนึ่งดังเข้ามาปักใจใน [GetMindLoc] ของเรา\n\n§Hจงก้าวเข้าไปแย่งชิง! จงบุกเข้ายึดครอง! จงสูบกินตักตวงผลประโยชน์!§!"
 shroud.3045.a:"ดึงสกัดมันออกมา"
 shroud.3045.a.reply:"เมื่อแกนกลางถูกแยกดึงตัวออก พุ่มใบไม้ก็เปลี่ยนเป็นสีหมองคล้ำและเหี่ยวเฉาแห้งตายไปในทันที สุ้มเสียงนั้นย้อนกลับมาอีกครั้ง\n\n§Hใช่แล้ว! ผลประโยชน์ย่อมก่อให้เกิดผลประโยชน์งอกเงยตามมา!§!"
 shroud.3045.b:"ปล่อยทิ้งไว้โดยไม่แตะต้องสัมผัส"
 shroud.3045.b.reply:"แรงสั่นสะเทือนระลอกหนึ่งแล่นผ่านตัวเรา เป็นโลกดาวดวงนี้ที่สั่นไหว หรือเป็นพวกเรากันแน่?\n\n§Hความเจริญรุ่งเรืองคือเป้าหมายเจตจำนงสูงสุด การหลีกหนีหลบเลี่ยงมันคือความโง่เขลาเบาปัญญา!§!"

 shroud.3050.title:"เสียงประสานอื้ออึงสับสน"
 shroud.3050.desc.intro:"กระแสพลังจิตวิทยาอันทรงอานุภาพพัดปะทะระอุร้อนท่ามกลางความผันผวนระสับระส่ายที่ไม่มีวันสิ้นสุดของม่านพลัง เสียงอื้ออึงสับสนอลหม่านแผ่ดังขยายขึ้นมาดึงความสนใจจากเรา"
 shroud.3050.desc.outro:"ช่างหนวกหูอย่างท่วมท้นจิตใจ"
 shroud.3050.desc.eater:"เสียงกรีดร้องด้วยความเจ็บปวดรวดร้าว วงดนตรีออร์เคสตราปะทุเสียงฟ้าร้องแห่งสมรภูมิรบ เสียงครืนของเปลวเพลิงที่กำลังเผาผลาญกลืนกิน เรารับรู้ได้ถึงความทรมาน... ทว่ามันเป็นของใครกันแน่?"
 shroud.3050.desc.composer:"เสียงร้องตะโกนเรียกขาน ดิบป่าเถื่อน ประหนึ่งสัญชาตญาณสัตว์ป่า... สายน้ำไหลเชี่ยวกรากและสายลมพัดโหยหวน... สรรพสิ่งธรรมชาติส่งเสียงร้องคำรามพร้อมกันในทันที..."
 shroud.3050.desc.cradle:"กลุ่มสุ้มเสียงพึมพำ บ่นพ้อ เปล่งวาจาร้องตะโกนและประกาศก้อง... โทนเสียง พยางค์ และเสียงสะท้อนหลากหลายนับไม่ถ้วน... ภาษาละลานตาพูดคุยจอแจพร้อมกันในเวลาเดียว"
 shroud.3050.desc.instrument:"เสียงสว่านเจาะทะลวง เสียงเครื่องจักรบดถลุง... สสารวัตถุถูกเปลี่ยนรูปอย่างเสียงดังอื้ออึงและทรงพลัง... โรงงานอุตสาหกรรมทั้งหมดในจักรวาลจุดเตาระเบิดทำงานขึ้นพร้อมเพรียงกัน"
 shroud.3050.a:"หยัดยืนเผชิญหน้าต่อไป"
 shroud.3050.a.reply:"ระดับเสียงดังกระหึ่มขึ้นเรื่อย ๆ จู่ ๆ พวกเราก็โดนผลักดันกระแทกไปในทิศทางที่ยากจะเข้าใจได้...\n\nในท้ายที่สุด ทุกอย่างก็สงบเงียบลงคืนสู่ความสงัด"
 shroud.3050.b:"เบือนหน้าถอยห่างออกมา"
 shroud.3050.b.reply:"มันเป็นสุ้มเสียงที่เกินทนทานไหว [GetMindLoc] ของเราล่าถอยออกมาจากจุดนั้น กลับคืนสู่ความอบอุ่นสบายของความสงัดเงียบ"

 shroud.3055.title:"นิมิตพยากรณ์แห่งโชคชะตา"
 shroud.3055.desc.intro:"ความมืดมัวแสนอึดอัดโอบล้อมรอบตัวเรา แรงกดดันบีบตัวแน่นหนาขึ้นเรื่อย ๆ จากรอบด้าน จนกระทั่งทิวทัศน์เลือนรางภาพหนึ่งกางกว้างออกปรากฏตัว"
 shroud.3055.desc.outro:"ท่ามกลางความมืดสลัวรอยเงา มีสิ่งหนึ่งดึงความสนใจจากเราอย่างเด่นชัดและอยู่ตรงกลางภาพพอดี นั่นคือผืนธงของ [Root.GetName]\n\nนี่คือพวกเราใช่หรือไม่?"
 shroud.3055.desc.eater:"เรามองเห็นโลกดาวเคราะห์ที่ย่อยยับพังทลาย ควันหลงแห่งสมรภูมิรบศึกใหญ่... ผู้ชนะทำความสะอาดรื้อค้นซากศพและเศษซากขยะชิ้นส่วน"
 shroud.3055.desc.composer:"เรามองเห็นโลกดาวหลายดวง... พุ่งผ่านเวลาและอวกาศอย่างน่าเหลือเชื่อ... ทุกโลกต่างก็คล้ายคลึงกัน รวมเป็นหนึ่งภายใต้จักรวรรดิเดียวกัน"
 shroud.3055.desc.cradle:"เรามองเห็นสมัชชาใหญ่การประชุมครั้งมโหฬาร... โครงร่างทึบแสงของรูปกายหลายร่าง... กำลังสดับฟังและแลกเปลี่ยนวาจาพูดคุยกัน"
 shroud.3055.desc.instrument.default:"เราเห็นโลกที่ได้รับการปรับปรุงประสิทธิภาพสูงสุด... โรงงานและเหมืองแร่เรียงรายไร้สิ้นสุด... ไม่มีซอกมุมใดบนพื้นผิวที่ถูกปล่อยทิ้งไว้โดยไม่แตะต้อง"
 shroud.3055.desc.instrument.relentless_industrialist:"เราเห็นโลกที่ได้รับการปรับปรุงประสิทธิภาพสูงสุด... โรงงานและเหมืองแร่เรียงรายไร้สิ้นสุด... ความสมบูรณ์แบบที่แท้จริง ไม่มีซอกมุมใดบนพื้นผิวที่ถูกปล่อยทิ้งไว้โดยไม่แตะต้อง"
 shroud.3055.a:"เพ่งจิตรักษาภาพนิมิตนี้ไว้คงเดิม"
 shroud.3055.a.reply:"ภาพนิมิตนั้นชัดเจนขึ้นทีละน้อย พวกเรามั่นใจในสิ่งที่เรามองเห็นการรับรู้"
 shroud.3055.b.organic:"สลัดปัดเป่ามันออกไปจากความนึกคิดสติจิตใจเรา"
 shroud.3055.b.machine:"ลบทำลายมันทิ้งไปจากวงจรประมวลผลของเรา"
 shroud.3055.b.reply:"โครงร่างเลือนรางของนิมิตละลายหายกลับคืนสู่ความว่างเปล่าปริศนา"

 shroud.3060.title:"ระหว่างห้วงความว่างเปล่าสูญญากาศ"
 shroud.3060.desc.intro:"สายหมอกแห่งม่านพลังหมุนวนบิดเกลียดึงกระแสสติของเราดิ่งลึกข้ามขั้นลงไป ในขณะที่ร่างกายทางกายภาพภายนอกของเรายังคงนิ่งสงบ ไม่ได้ถูกสัมผัสแตะต้อง\n\n[GetPsycheLoc] ของเรายืดขยายและตึงเครียด โดนขังล่ามไว้ในกระแสน้ำหนุนวนซ้ำซาก ความพยายามในการเคลื่อนไหวแต่ละรอบล้มเหลวพังทลายลงในตัวมันเอง ความเครียดกระชับรัดแน่นราวกับโดนคีมเหล็กบดหนีบดึงตัวไว้"
 shroud.3060.desc.intro.organic:"เราเห็นทะลุกายตน ร่างกายของเราถูกผนึกแน่นในกล่องมิติหมุนเรียง(จับ เทสเซอแร็ค)ที่อยู่เหนือระดับความเข้าใจทางกายภาพของเรา"
 shroud.3060.desc.intro.machine:"ซับรูทีนตรรกะระบบเริ่มทำงาน ตรวจพบลักษณะความล้มเหลว: ลูปวนซ้ำ(วนซ้ํา)ตัวประมวลผลพลังจิตวิญญาณของเรามีขีดความสามารถไม่เพียงพอที่จะทลายวัฏจักรนี้และกลับคืนสู่ฟังก์ชันการทำงานปกติ"
 shroud.3060.desc.intro.end:"เมื่อระดับแรงรัดกดดันเกินกว่าจะทนทานไหว ร่างกายนิมิตของเราส่อแววจะสลายหายไปในสูญญากาศ สุ้มเสียงหนึ่งแผดร้องแทรกเข้ามาในจุดคุมขังประสาทสัมผัสของเรา"
 shroud.3060.desc.outro:"กลุ่มถ้อยคำก้องสะท้อนในใจเรา แรงผลักดันสะสมพอกพูนและเราสัมผัสได้ถึงวิธีระงับความปั่นป่วนที่คุกคามจะฉีกทึ้งแยกพวกเราออกเป็นชิ้น ๆ หากเพียงแต่เรายอมก้มหัวจำนนยอมรับ"
 shroud.3060.desc.eater:"§Hจงเขมือบมันซะ! จงกลืนกินสูญญากาศอันกว้างใหญ่ไร้สิ้นสุด!§!"
 shroud.3060.desc.composer:"§Hจงเติบโตข้ามพ้นขอบข่ายจำกัดของความไม่มีสิ้นสุดที่วนซ้ำนี้!§!"
 shroud.3060.desc.cradle:"§Hจงโอบรับความเป็นนิรันดร์! ทุกสิ่งหลอมรวมเป็นหนึ่งเดียวกันทั้งหมด!§!"
 shroud.3060.desc.instrument:"§Hจงปรนเปรอจิตใจไปกับศักยภาพอันไร้ขีดจำกัดสูงสุด!§!"
 shroud.3060.a:"ยอมจำนน"
 shroud.3060.a.reply:"สุ้มเสียงแผดดังขยายขึ้น ชี้แนวทางแก้ไขการทำงานของเรา บังคับให้จิตใจข้ามขอบข่ายความเข้าใจที่จำกัดของตนไป วัฏจักรกิจกรรมยังดำเนินต่อ — บีบรัดและดึงเราจมดิ่งต่อไป — ก่อนที่มันจะพังทลายสลายหายไปต่อสติปัญญาประสาทสัมผัสของเรา\n\nเราล่วงผ่านทลายลูปวนซ้ำได้สำเร็จ โดยการชี้นำจากการสยบก้มกราบต่อขุมพลังอำนาจเบื้องบนแห่งม่านพลัง(คําราม)\n\nอย่างไรก็ตาม ไม่ใช่พวกเราทุกคนที่รอดกลับคืนมาได้เต็มเม็ดเต็มหน่วย ทาง §H[event_target:shroud_warped_leader.GetName]§! ไม่ได้อยู่ปฏิบัติงานประจำที่ตำแหน่ง [event_target:shroud_warped_leader.GetHisHer] อีกต่อไปแล้ว สุ้มเสียงนั้นย้อนคืนกลับมา"
 shroud.3060.a.reply.default:"พวกมันจะได้รับการสร้างขึ้นมาใหม่สำเร็จ"
 shroud.3060.a.reply.eater: "§H$shroud.3060.a.reply.default$§!"
 shroud.3060.a.reply.composer: "§H$shroud.3060.a.reply.default$§!"
 shroud.3060.a.reply.cradle: "§H$shroud.3060.a.reply.default$§!"
 shroud.3060.a.reply.instrument: "§H$shroud.3060.a.reply.default$§!"
 shroud.3060.b:"ต่อต้านแข็งขืน"
 shroud.3060.b.reply:"พวกเราปฏิเสธที่จะยอมรับแรงสะกดข่มขู่ที่บังคับเรา\n\nลูปวนซ้ำเริ่มทำงานเร็วหมุนเร็วขึ้น ลากดึงเราลงลึกด้านล่างด้วยอานุภาพกระแสน้ำไหลลึก เมื่อเราหยุดฟันฝ่าดิ้นรน แรงตึงบดหนีบก็ไม่ได้ข่มขู่จะฉีกทึ้งแยกเราออกจากกันอีกต่อไป ทว่ามันกลับกลืนควบรวมจิตเราไว้ อนุญาตให้เรามองเห็นข้ามข้อจำกัดของตัวเองแวบหนึ่ง\n\nสุ้มเสียงย้อนกลับมา"
 shroud.3060.b.reply.default:"ช่างน่าเบื่อหน่ายสิ้นดี"
 shroud.3060.b.reply.eater: "§H$shroud.3060.b.reply.default$§!"
 shroud.3060.b.reply.composer: "§H$shroud.3060.b.reply.default$§!"
 shroud.3060.b.reply.cradle: "§H$shroud.3060.b.reply.default$§!"
 shroud.3060.b.reply.instrument: "§H$shroud.3060.b.reply.default$§!"
 shroud.3060.leader_return.title:"ผู้แปรสภาพจากม่านพลัง(เสียงเตือน)"
 shroud.3060.leader_return.desc:"ม่านพลังสั่นสะท้าน การบิดเบือนเบาบางกระเพื่อมเป็นระลอกคลื่นผ่านทั่วทั้ง [GetMindPhysicalLoc] ของเราในขณะที่ตัวตนอันคุ้นตาปรากฏตัวขึ้นมา มันไหวตัวอยู่ตรงขอบชายขอบ [GetMindPerceptionLoc] ของเรา พร้อมกระซิบสุ้มเสียงก้องสะท้อนห่างไกลเกินขีดจำกัดการได้ยินเสียงปกติของเรา\n\n§H[from.GetName]§! ได้เดินทางย้อนกลับคืนมาหาเรา ก้าวล่วงข้ามผ่านสายหมอกทมิฬปริศนาขณะที่พวกมันแปรสภาพกายฟอร์มกลับคืนสู่รูปลักษณ์ดั้งเดิมที่คุ้นเคย ห่างเหินไปบ้างทว่าร่างกายครบถ้วนบริบูรณ์ ถูกปรับแต่งสร้างใหม่โดยพลังแห่งม่านพลัง พวกเขากระตือรือร้นจะขอกลับเข้าปฏิบัติราชการงานตามหน้าที่ทันที"
 shroud.3060.leader_return_tt:"§H[from.GetName]§! ได้รับคุณลักษณะลักษณะนิสัยใหม่: §G$leader_trait_shroud_warped$§!"

 leader_trait_shroud_warped:"ผู้แปรสภาพจากม่านพลัง(เสียงเตือน)"
 leader_trait_shroud_warped_desc:"ถูกดูดกลืนกลืนกลายและประกอบสร้างใหม่ด้วยพลังแห่งม่านพลัง ปัญญาความรู้ในมิติจิตวิญญาณที่ประทานให้แก่ผู้นำคนนี้ มอบขีดความสามารถที่จะเฝ้าสังเกตการณ์ในสิ่งที่ปกติไม่มีผู้ใดสังเกตเห็นได้สำเร็จ และช่วยขยายขีดความสามารถพลังจิตแฝงของประชากรรอบข้างกายพวกเขา"
 leader_trait_shroud_warped_invasion_effect:"ค่าข้อมูลข่าวกรอง(อินเทล)บนจักรวรรดิศัตรูต่อชัยชนะรุกรานยึดดาวหนึ่งครั้ง: §G+$@shroud_warped_intel|0$§!"

 shroud.3065.title:"จอกสุราที่ยอมรับเรียกหา"
 shroud.3065.desc.intro:"สายหมอกของม่านพลังสะท้านสั่นไหว แยกตัวออกเผยให้เห็นถ้วยจอกใบหนึ่งที่มีของเหลวเป็นประกายเปี่ยมล้น พื้นผิวระนาบเรียบกริบไร้ระลอกคลื่น\n\nความปรารถนาสะกดจิตเข้าครอบงำเรา เราเอื้อมมือไปข้างหน้าโดยไม่ได้ไตร่ตรอง ของเหลวสะท้อนสั่นไหวขณะที่เราเริ่มดำเนินการ [GetDrinkLoc]\n\nความแจ่มแจ้งไหลผ่านท่วมท้น ยิ่งเราดำเนินการ [GetImbibeLoc] ลึกเข้าไปเท่าใด คำโป้ปดก็ยิ่งแสดงธาตุแท้ออกมามากเท่านั้น ของเหลวเริ่มข้นหนืดขึ้นทีละหยดเริ่มจับตัวเป็นก้อนในร่างกาย\n\nความต้องการเข้าจู่โจมจิตใจให้ทำความสะอาดระบายเอาสารปนเปื้อนพิษร้ายนี้ออกจากระบบของเราโดยเร็วที่สุด"
 shroud.3065.desc.eater:"§Hจงเขมือบเข้าไปเสีย! จงกลบฝังความอ่อนแอในตัวเจ้าซะ!§!"
 shroud.3065.desc.composer:"§Hจงบำรุงกาย! สูดรับพลังแห่งการเจริญเติบโตยุคใหม่เข้าไป!§!"
 shroud.3065.desc.cradle:"§Hจงแข็งแกร่งขึ้น! จงโอบรับการควบรวมกลืนแสนเจ็บปวดรวดร้าวนี้ซะ!§!"
 shroud.3065.desc.instrument:"§Hจงดื่มมันเข้าไป! ดื่มด่ำปรนเปรอความใคร่อยากของเจ้าเสีย!§!"
 shroud.3065.desc.outro:"สุ้มเสียงหมุนคว้าง ปนเปเข้ากับน้ำแก้ว จับตัวเป็นก้อนเข้มข้นขณะที่มันล่วงลึกเข้าไปด้านในร่างกาย สยบจิตสำนึกของเราให้ก้มหัวตกลงต่อเจตจำนงของมัน"
 shroud.3065.a.organic:"ดื่มมันเข้าไป"
 shroud.3065.a.machine:"ดำเนินการประมวลผล"
 shroud.3065.a.reply.intro:"ของเหลวหยดสุดท้ายไหลซึมผ่านคอ ข้นหนืดและน่าขยะแขยง สะสมอยู่ภายในตัวเรา กัดเซาะซึมผ่านเข้าสู่ [GetMindPhysicalLoc] ของเรา\n\nความร้อนแผ่ซ่านผ่านตัวเรา บิดเบือนแนวความคิดและทำลายขอบชายขอบ [GetPsycheLoc] ของเรากระจุย\n\nสุ้มเสียงย้อนกลับมาอีกคำรบอย่างพึงใจ ขณะที่ถ้วยจอกแก้วละลายหายวับไปต่อหน้าเรา"
 shroud.3065.a.reply.default:"ผู้พิชิตชัย! ยอดขุนศึกผู้ยิ่งใหญ่"
 shroud.3065.a.reply.eater: "§H$shroud.3065.a.reply.default$§!"
 shroud.3065.a.reply.composer:"§Hผู้สร้างปรับแต่ง! ตัวเร่งปฏิกิริยาที่มีชีวิต.§!"
 shroud.3065.a.reply.cradle:"§Hผู้ควบรวมประสาน! จิตใจซ้อนทับจิตใจ.§!"
 shroud.3065.a.reply.instrument:"§Hความเสเพลเสพสม! ประสาทสัมผัสที่พร้อมให้ค้นหา.§!"
 shroud.3065.b:"ระบายชำระขับออกไป"
 shroud.3065.b.reply.intro:"อาการสั่นเกร็งอย่างรุนแรงเข้าถาโถมโจมตี [GetBodiesLoc] ของเราเมื่อเราปฏิเสธสิ่งสกปรกปนเปื้อน ชำระล้างวัตถุหนืดข้นเหนียวออกจากข้างในร่างกาย\n\nของเหลวเลวร้ายสาดกระจายใส่สูญญากาศ บิดม้วนตัวไปมาขณะที่มันกระจัดกระจายสลายตัวไป สุ้มเสียงนั้นส่งสุ้มเสียงขู่ฟ่อ คำพูดคำวาจาของมันระเหยหายไปพร้อมกับสิ่งโสโครกชิ้นนั้น"
 shroud.3065.b.reply.default:"ช่างอ่อนแอสิ้นดี!"
 shroud.3065.b.reply.eater: "§H$shroud.3065.b.reply.default$§!"
 shroud.3065.b.reply.composer:"§Hความหยุดนิ่งเฉื่อยชา!§!"
 shroud.3065.b.reply.cradle:"§Hความขลาดเขลาเบาปัญญา!§!"
 shroud.3065.b.reply.instrument:"§Hศักยภาพที่น่าเสียดายยิ่งนัก...§!"

 shroud.3070.title:"ผืนผ้าใบแห่งการเปลี่ยนแปลงแปลกประหลาด"
 shroud.3070.desc.intro:"ม่านพลังหดตัว พับม้วนเข้าด้านใน บดกดดันจิตใจเราดิ่งลึกลงสู่ห้วงสูญญากาศที่จำกัดและสั่นพ้อง\n\nตัวตนหนึ่งสลัวราง ปรากฏตัวในรูปร่างกึ่งของเหลว รูปกายของมันแปรเปลี่ยนไปมาขณะที่มันเปิดและปิดฉากกั้นที่แยกเราออกจากม่านพลังส่วนอื่น ๆ การปิดเปิดฉากกั้นแต่ละครั้ง ปลดปล่อยภาพนิมิตถาโถมพรั่งพรูออกมาเป็นระลอก"
 shroud.3070.desc.eater:"โลกต่าง ๆ พังพินาศถูกเผาไหม้ เถ้าถ่านปลิวว่อนไปตามเสียงคร่ำครวญของเหยื่อที่ถูกดูดกลืนกิน นิมิตภาพที่แปรเปลี่ยนแสดงให้เห็นงานเลี้ยงอาหารล้ำค่าที่รอเวลาโดนเขมือบทำลาย"
 shroud.3070.desc.composer:"ทิวทัศน์ที่แผ่ไกลไกล เต็มไปด้วยกลุ่มสัตว์ป่าเพ่นพ่านข้ามผ่านทุ่งหญ้าเขียวขจี เส้นใยแห่งชีวิตพันเกลียวและแผ่ขยาย นิมิตภาพที่ขยับแสดงให้เห็นสภาพแวดล้อมที่เปี่ยมล้นศักยภาพพร้อมต่อการสรรสร้างและปรับเปลี่ยนรูปทรง"
 shroud.3070.desc.cradle:"ชุมชนต่าง ๆ โอบกอด เกื้อหนุนช่วยเหลือซึ่งกันและกันอย่างสามัคคี โดยยอมแลกกับการขับไล่ผู้เห็นต่างออกไป นิมิตภาพแสดงให้เห็นแดนสุขาวดีใหม่ที่อ้าแขนรับเฉพาะผู้ศรัทธาเท่านั้น"
 shroud.3070.desc.instrument:"เหมืองขุดเจาะขนาดมหึมาทอดกว้างเบื้องหน้าเรา เรียงรายด้วยสินแร่ล้ำค่ำพร้อมให้ดึงถลุงออกมา นิมิตภาพแสดงให้เห็นแหล่งทรัพย์สมบัติเลอค่าที่รอให้เข้าไปปล้นสะดมทำลาย"
 shroud.3070.desc.outro:"ด้วยภาพนิมิตเหตุการณ์ใหม่แต่ละครั้ง แรงเฉื่อยปัดเป่าและหมุนเหวี่ยงพวกเรา ลากดึงเราทะลวงผ่านระดับความเร็วที่น่าเหลือเชื่อขณะที่กำแพงแห่งโลกความจริงบิดโค้งและกระเพื่อมสั่นไหว\n\nเรารับรู้ได้ถึงความสำราญสนุกสนานของร่างกายตัวตนนั้น มันกำลังทดสอบพวกเรา รอคอยการตั้งนามเรียกขานให้แก่พลังงานอำนาจที่ตรึงควบคุมตัวเราไว้"
 shroud.3070.a.eater:"ความพึงพอใจอิ่มหนำ"
 shroud.3070.a.composer:"การก่อร่างแปรสภาพ"
 shroud.3070.a.cradle:"ความสามัคคีกลมเกลียว"
 shroud.3070.a.instrument:"ศักยภาพอันซ่อนเร้น"
 shroud.3070.a.reply.intro:"สุ้มเสียงของเราแผดร้องคำราม ตัวตนสลัวร่างนั้นนิ่งสงบลง กลุ่มภาพนิมิตหยุดหมุนวนเมื่อพายุแห่งแรงเฉื่อยสงบนิ่งลงสู่ความสงัดแจ่มชัดแจ่มแจ้ง\n\nพวกเราตั้งนามให้แก่สิ่งนั้นแล้ว"
 shroud.3070.a.reply.default:"ความพึงพอใจอิ่มหนำ เติมพลังด้วยการพิชิตทำลาย"
 shroud.3070.a.reply.eater: "§H$shroud.3070.a.reply.default$§!"
 shroud.3070.a.reply.composer:"§Hการก่อร่างแปรสภาพ ชีวิตประสานเกลียว โครงสร้างรูปแบบแข็งตัวขึ้นรูป.§!"
 shroud.3070.a.reply.cradle:"§Hความสามัคคีกลมเกลียว ขจัดความขัดแย้งด้วยความโอบอ้อมอารี.§!"
 shroud.3070.a.reply.instrument:"§Hศักยภาพอันซ่อนเร้น รอคอยการถูกฉีกดึงออกมาจากเอกภพที่สงบนิ่ง.§!"
 shroud.3070.a.reply.outro:"รูปกายตนนั้นพึงพอใจต่อคำตัดสินของเราอย่างยิ่ง แยกม่านกั้นขวางออก ห้วงสูญญากาศสลายอันตรธานไปขณะที่เราเดินทางย้อนกลับคืนออกมาจากจุดนั้น"
 shroud.3070.b.eater:"ความสิ้นหวังท้อแท้"
 shroud.3070.b.composer:"ความล้นเหลือมากเกินไป"
 shroud.3070.b.cradle:"หน้ากากจอมปลอม"
 shroud.3070.b.instrument:"ความฟุ่มเฟือยสูญเปล่า"
 shroud.3070.b.reply.intro:"สุ้มเสียงของเราสะดุดสั่นไหว โดนช่วงชิงพรากออกไปจากปากโดยรูปกายตัวตนแสนเกรี้ยวกราดในขณะที่มันบังคับเหวี่ยงเราข้ามม่านกั้นขวาง"
 shroud.3070.b.reply.default:"ความสิ้นหวังรึ? อ่อนแอ หิวโหย เจ้าไร้ความแน่วแน่จิตใจมั่นคงอย่างยิ่ง!"
 shroud.3070.b.reply.eater: "§H$shroud.3070.b.reply.default$§!"
 shroud.3070.b.reply.composer:"§Hล้นเหลือมากเกินไปงั้นรึ? จงหมกมุ่นจมปลักอยู่กับความธรรมดาไม่มีอะไรดีซะเถอะ!§!"
 shroud.3070.b.reply.cradle:"§Hหน้ากากจอมปลอมรึ? จงหยุดนิ่งจมปรักอยู่กับความโดดเดี่ยวของเจ้าซะเถอะ!§!"
 shroud.3070.b.reply.instrument:"§Hฟุ่มเฟือยสูญเปล่างั้นรึ? ความอัตคัดขัดสนอันเกียจคร้านต่างหากคือความหลงใหลของเจ้า!§!"
 shroud.3070.b.reply.outro:"เราตกกะเทินพลิกคว่ำกระดอนผ่านม่านพลัง เดินทางกลับคืนออกมาพร้อมลางรู้สึกอึดอัดจิตใจไม่สงบ"

 shroud.3100.title:"ศึกปะทะห้ำหั่นทางพลังจิต"
 shroud.3100.desc:"วงดนตรีประสานเสียงวิบัติหายนะที่อื้ออึงสับสนอลหม่านได้ดึงตัวเราจมดิ่งลึกลงสู่ม่านพลัง(คําราม)เสียงสั่นพ้องสะเทือนปะทะซ้ำ ๆ ต่อจิตประสาทของเราในจังหวะการทำลายล้างที่ไม่มีวันลดละผ่อนผัน\n\nกลุ่มเสียงรบกวนนั้นเริ่มจับรูปร่างเป็นตัวตนขึ้นมา\n\nพวกเราอยู่ในจุดชายแดนนอกพื้นที่ของศึกห้ำหั่นทางพลังจิตวิทยา เจตนาของสิ่งมีชีวิตที่เกี่ยวข้องยังคงคลุมเครือไม่แจ่มชัด ทว่าขีดความแรงของพลังอำนาจที่สำแดงออกมาประจักษ์ชัดนั้นยอดเยี่ยมยิ่ง\n\nกระสุนพลังจิตสาดซัดโหมกระหน่ำเข้ามาในเขตสัมผัสการรับรู้และหลุดลอยออกไปบ่อยครั้ง บิดหมุนข้ามผ่านมิติความจริงที่ปริแตกตรงหน้าเรา ไม่มีสิ่งกำบังป้องกันใด ๆ หลงเหลือ มีเพียงพายุใหญ่ที่กำลังเคลื่อนใกล้เข้ามา"
 shroud.3100.a:"§Yหยัดยืนเฝ้าสังเกตการณ์ต่อไป§!"
 shroud.3101.title:"§Gเสียงสั่นพ้องที่ไม่มีวันมอดดับ§!"
 shroud.3101.desc.intro:"เรายังคงรีรออยู่ตรงนั้น ยอมรับความเสี่ยงที่จะเผชิญหน้าโทสะเกรี้ยวกราดในขณะที่จุดห้ำหั่นเคลื่อนใกล้บีบตัวเข้ามาเรื่อย ๆ"
 shroud.3101.desc:"$shroud.3101.desc.intro$\n\nด้วยการเพ่งสมาธิอย่างแน่วแน่มั่นคง เราปรับประสานตัวเราเข้าหากลุ่มพลังจิตที่บ่าไหลลงมาอย่างรวดเร็ว ความคิดของเราไหลลื่น แม้กระสุนพลังจิตโหมกระหน่ำไม่ยอมผ่อนผัน ทว่าเรายังคงปลอดภัยไม่โดนสัมผัสถูกเลย เคลื่อนไหวกลมกลืนไปตามสมาธิจังหวะของความวิบัติ\n\nทุกย่างก้าวความเข้าใจของเราพัฒนาขึ้น กระสุนพลังจิตที่ยิงปูพรมกำลังลอดผ่านซอกระหว่างช่องว่างในมิติระนาบที่มองไม่เห็น\n\nขณะที่เราล่าถอยย้อนออกมา โครงสร้างรูปแบบแนวคิดนั้นยังคงจารึกอยู่ ด้วยการนำมาปรับปรุงประยุกต์ใช้เพิ่มเติม หลักการวิชาที่เราได้เฝ้าสังเกตการณ์มาอาจสามารถนำมาดัดแปลงใช้กับสรรพาวุธรบของเราเองสำเร็จ"
 shroud.3102.title:"§Rกระสุนถล่มปูพรมจากห้วงอเวจี§!"
 shroud.3102.desc:"$shroud.3101.desc.intro$ พวกเราพยายามปรับประสานจิตสัมผัสให้เข้ากับพายุพลังจิตวิทยา เคลื่อนตัวไปตามจังหวะที่เดาทิศทางไม่ได้ของมัน\n\nก้าวเดินแรก ๆ ของเราดูท่ามีแนวโน้มรุ่งเรืองดี ทว่าจังหวะความเร็วของหายนะทำลายล้างนั้นสุดท้ายก็ดูดกลืนกินทำลายเราในที่สุดอย่างเลี่ยงไม่ได้\n\nขณะที่ลมพายุพัดผ่านเลยไป เสียงดังก้องสะท้อนของขีปนาวุธยังคงดังกึกก้องอยู่ในตัวเรา สัญญาณสะท้อนทางจิตวิญญาณแห่งความล้มเหลวพ่ายแพ้ของเราส่งคลื่นกระแทกผ่านเข้าสู่ใจกลางจักรวรรดิแม้แต่ในมิติโลกความจริงทางกายภาพแห่งนี้"
 shroud.3102.a.tt:"สิ่งปลูกสร้างแบบสุ่มสองแห่งทั่วทั้งจักรวรรดิจะพังทลายเสียหายใช้งานไม่ได้"

 shroud.3105.title:"ช่องทางเครือข่ายเส้นด้ายพลังจิต"
 shroud.3105.desc:"โดยไร้สัญญาณบอกเหตุเตือนล่วงหน้า แรงดันจิตแผ่ปะทุระเบิดขึ้นรุนแรงในม่านพลัง(คําราม)\n\nเขาวงกตช่องเส้นทางเรืองแสงกางแผ่ออกตรงหน้าเรา ยืดขยายทอดยาวไกลกว่าที่ประสาทสัมผัสธรรมดาจะตรวจวัดได้ ประจุไฟฟ้ากะพริบไหวสว่างโร่วาบชั่วพริบตาก่อนจะอันตรธานอันตระการตาหายลับกลับไปในสุญญากาศ\n\nพลังงานระลอกใหม่เริ่มก่อตัวสะสมตัวขึ้นมา ด้วยการรวมจิตสมาธิแน่วแน่ เราสัมผัสได้ถึงแนวโครงสร้างสัญญานของมันก่อนที่มันจะผุดแสดงตัวออกมา เขาวงกตที่บิดแปรผันเริ่มจุดไฟสว่างโร่อีกหน ระเบิดพุ่งพลังขยายกว้างออกสู่ช่องทางเครือข่ายที่มีโอกาสสัมฤทธิผลอันหลากหลาย\n\nเส้นทางเดินแต่ละสายเสนอสิ่งยั่วยวนกระตุ้นความต้องการสำรวจสิ่งแปลกใหม่ ก่อนที่มันจะพังทลายสลายกลายเป็นไม่มีอะไรไป"
 shroud.3105.a:"§Yลงทะเบียนเผชิญด่านการผจญภัยอันตรายสุดท้าทาย§!"
 shroud.3106.title: "§G$tech_psionic_lightning$§!"
 shroud.3106.desc.intro:"ระดับแรงรัดกดดันสะสมเพิ่มพูน ปั่นหัวยั่วเราด้วยความลุ้นคาดหวัง เราเคลื่อนไหวพร้อมเพรียงไปกับจุดไคลแมกซ์ความดังของระดับเสียง บังคับควบคุมทิศทางสติจิตใจเราฝ่าเข้าสู่เขาวงกตที่มีพลังจิตวิทยาห้ำหั่น ความคิดแปลสภาพกลายเป็นแรงผลักดัน เร่งให้เราก้าวรุดหน้าไปอย่างมั่นใจ"
 shroud.3106.desc:"$shroud.3106.desc.intro$ แทรกผ่านช่องแคบระหว่างเส้นโค้งของพลังงานจิตวิญญาณอย่างฉับไวก่อนที่ความแน่วแน่ตั้งใจของเราจะแกว่งไกวโลเล\n\nเราหลุดจากพันธนาการลอยตัวข้ามขั้นอยู่เหนือเปลือกทางกายภาพ เขาวงกตที่วกวนพร้อมช่องทางละลานตาแปรสภาพกลายเป็นส่วนขยายของสติจิตสำนึกของเราเอง เผยความรู้ลับลึกซึ้งที่ซ่อนในโครงสร้างของลมพายุแปรปรวน\n\nและรวดเร็วพอ ๆ กับตอนเริ่มแรก เหตุการณ์ฉับพลันก็สิ้นสุดลง ภาพลวงตาที่หลงเหลือของเขาวงกตพังทลายสลายหายหลังหลังเราก้าวผ่านออกมาพร้อมวิทยาทานการเรียนรู้ใหม่ ด้วยการนำมาปรับปรุงอย่างละเอียดพิถีพิถัน หลักเกณฑ์พลังจิตเหล่านี้น่าจะนำไปพัฒนาประยุกต์ใช้กับยุทโธปกรณ์ทหารรบของเราได้"
 shroud.3107.title:"§Rพลัดหลงหลงทางในสูญญากาศอันมืดมิด§!"
 shroud.3107.desc:"$shroud.3106.desc.intro$ ช่องทางเดินหลากหลายสายกางตัวระดาหน้าเรา รุมทำลายจิตใจเราสับสนด้วยตัวเลือกตัดสินใจที่ยากจะเป็นไปได้จริง\n\nในเสี้ยวเวลาแห่งความลังเลใจนี้ เส้นทางเรืองแสงวาบก็ปะทุระเบิดขึ้นมา พลังงานรูปส่วนโค้งของพลังจิตวิญญาณบิดหมุนผ่านจุดเชื่อมแกนกลางที่พังทลาย จับล็อคสติความคิดของเราและเหวี่ยงเราเข้าไปสู่พายุความโกลาหลของม่านพลัง(คําราม)\n\nเราก้าวออกมา กลุ่ม [GetTelepathPlural] ของเรามึนงงและต้องแบกรับบาดแผลความเจ็บปวดจากอาการทางสัญชาตญาณความล้มเหลวพ่ายแพ้ แรงป้อนกลับรุนแรงทางกระแสจิตก้องสะท้อนสั่นพ้องทั่ว [Root.GetName]"

 shroud.3110.title:"หอกพลังจิตสังหาร (Psychic Lance)"
 shroud.3110.desc:"ลำแสงพลังงานจิตวิทยาเดี่ยว ๆ แนวกระโดดข้ามขั้นทอดยาวผ่านเลยเราภายในม่านพลังลึกลงสู่ความไร้สิ้นสุดที่ยากจะประเมินนับได้ โครงสร้างความเสถียรที่เสถียรเป็นพิเศษของมันช่างขัดแย้งเป็นอย่างยิ่งกับกลุ่มโครงสร้างบิดเบี้ยวโกลาหลที่แปรเปลี่ยนซึ่งเรามักพบพานมาก่อน\n\nการหยัดยืนอยู่ที่นี่ต่อไปจะรับประกันความปลอดภัยจริงหรือ?"
 shroud.3110.a:"§Yหยัดยืนเฝ้าดูอยู่ตรงนี้ต่ออีกสักนิด§!"
 shroud.3111.title:"§Gปืนหักเหคลื่นพลังจิต(เสียงระเบิด)§!"
 shroud.3111.desc:"แม้ลำแสงจะส่องสว่างจัดจนแทบพร่ามัว ทว่าเราก็สามารถประคองควบคุมประสาทสมาธิแน่วแน่ไปที่ลำแสงพลังจิตที่ขึ้นรูปเสร็จสมบูรณ์แบบได้ ในที่สุดเราก็ได้ประจักษ์ธรรมชาติที่แท้จริงของโครงสร้างแปลกประหลาดที่ประณีตซับซ้อนของมัน\n\nความคิดสติของเราโลดแล่นเข้าหาขีดความน่าจะเป็นใหม่ ๆ การถอดสูตรสร้างกลุ่มพลังงานพิเศษนี้ในโลกมิติทางกายภาพจะช่วยมอบคุณสมบัติอาวุธร้ายกาจที่จะไม่มีผู้ใดต้านทานได้"
 shroud.3112.title:"§R[GetTelepathPluralCap] ได้รับพลังงานโหลดเกินพิกัด§!"
 shroud.3112.desc:"พวกเราไม่สามารถทนฝืนหยัดยืนต่อได้ ความใกล้ชิดกับกลุ่มก่อตัวพลังงานจิตวิญญาณที่รุนแรงเฉียบพลันเช่นนี้แสดงให้เห็นแล้วว่าเกินแรงรับไหวสำหรับพวก [GetTelepathPlural] ของเรา\n\nบาดแผลกระทบต่อประสาทสมาธิจิตใจเราจากการสัมผัสสิ่งแปลกประหลาดท่วมท้นจิตวิทยาชิ้นนี้คงต้องใช้เวลาระยะหนึ่งในการพักฟื้นบำบัดรักษาตัวให้พร้อมใช้งานดังเดิม"
 recovering_telepaths:"กลุ่มผู้ส่งกระแสจิตทั่วไปกำลังพักฟื้นบำบัดตัว"
 recovering_telepaths_desc:"การออกแรงใช้สมาธิตึงเครียดจัดมากไปในม่านพลัง ส่งผลเสียร้ายแรงสะสมเหนื่อยล้าต่อกลุ่มผู้ส่งกระแสจิต $DEFAULT_TELEPATH_PLURAL$ ของเรา"
 recovering_telepaths_robot:"กลุ่มประมวลผลพลังจิตวิญญาณกำลังพักฟื้นบำบัดตัว"
 recovering_telepaths_robot_desc:"การออกแรงใช้สมาธิตึงเครียดจัดมากไปในม่านพลัง ส่งผลเสียร้ายแรงสะสมเหนื่อยล้าต่อกลุ่มประมวลผลพลังจิตวิญญาณ $MACHINE_TELEPATH_PLURAL$ ของเรา"
 recovering_telepaths_hive:"กลุ่มจิตประสานโทรจิตกำลังพักฟื้นบำบัดตัว"
 recovering_telepaths_hive_desc:"การออกแรงใช้สมาธิตึงเครียดจัดมากไปในม่านพลัง ส่งผลเสียร้ายแรงสะสมเหนื่อยล้าต่อกลุ่มจิตประสานโทรจิต $HIVE_TELEPATH_PLURAL$ ของเรา"

 MACHINE_SENSE:"ประสาทสัมผัสตรวจวัด"
 shroud.3120.title:"สุ้มเสียงสะท้อนจากห่างไกล"
 shroud.3120.desc:"ทั่วทั้งม่านพลัง เราสามารถ [GetFeelLoc] การสะท้อนก้องของพลังอำนาจอันกว้างใหญ่ อิทธิพลของพวกมันแผ่ซ่านไปทั่วอาณาจักรพลังจิต\n\nเพียงการกระทำของเราเพียงลำพังก็สามารถปรับประสานเราให้ใกล้ชิดกับพวกมันมากขึ้นได้ แต่ยังมีอีกหนทางหนึ่ง การอาศัยพลังของซโรจะช่วยให้ [GetTelepathPlural] ของเราแผ่ขยายการเข้าถึงตรงไปยังตัวตนเหล่านี้ได้โดยตรง\n\nเราเพียงแค่ต้องตัดสินใจว่าจะแสวงหาตัวตนใด"
 shroud.3120.a: "$utopia.3005.a$"
 shroud.3120.b: "$utopia.3005.b$"
 shroud.3120.c: "$utopia.3005.c$"
 shroud.3120.d:"§Cผู้คร่ำครวญหาความหวังที่ถูกฝังกลบ§!"

 ORGANIC_SPIRITS:"วิญญาณ"
 MACHINE_SPIRITS:"สิ่งดำรงอยู่ทางพลังจิตวิญญาณ"
 shroud.3125.title: "$shroud.3120.title$"
 shroud.3125.desc:"ขณะที่เราเอื้อมมือไขว่คว้าหาตัวตนปริศนานั้น เราสามารถ [GetFeelSenseLoc] ได้ถึงการไหวตัวของมัน พวกเราเคยเผชิญหน้ากับ [GetSpiritsLoc] มาก่อนแล้วก็จริง ทว่าสิ่งนี้กลับแตกต่างออกไปอย่างสิ้นเชิง เป็นสิ่งที่มีพลานุภาพยิ่งใหญ่กว่ามหาศาล... เป็นสิ่งที่มีความเก่าแก่มานานแสนนานยิ่งนัก\n\nพลังงานประสานที่ผสมซึมซับด้วยสาร ซโร บัดนี้ร่อยหรอแห้งลงแล้ว กลุ่ม [GetTelepathPlural] ของเราจำใจต้องล่าถอยถอนกำลังย้อนย้อนออกจากม่านพลัง(คําราม)เราคงต้องเดินทางกลับคืนมาลุยความพยายามใหม่อีกหนในภายหลัง"
 shroud.3125.tt:"ได้รับระดับค่า §Hความเข้าถึง(บรรยาย)§! สูงอย่างมีนัยสำคัญต่อสิ่งมีชีวิตตัวตนใน §Hม่านพลัง(คําราม)§!"

 shroud.3115.title:"การยิงโจมตีปูพรมด้วยพลังจิต"
 shroud.3115.desc:"อาการกระตุกรุนแรงระลอกหนึ่งแผ่กว้างผ่านม่านพลัง ส่งอาการสะดุดสั่นสะท้านทะลวงผ่านสติใจกลางจิตสำนึกเรา\n\nระลอกคลื่นสั่นพ้องประสานเหล่านี้ส่งสัญญาณข่มขู่จะถาโถมรุมปะทะทำลายกลุ่ม [GetTelepathPlural] ของเราจนพินาศ\n\nอะไรคือแหล่งที่มาจุดกำเนิดของการโจมตีกระหน่ำด้วยกระแสพลังจิตวิทยาชิ้นนี้กันแน่?"
 shroud.3115.a:"§Yเราจำเป็นต้องสืบหาสาเหตุข้อมูลข่าวกรองให้จงได้§!"
 shroud.3116.title: "§G$tech_psionic_bombers$§!"
 shroud.3116.desc:"เราเสริมความแข็งแกร่งต้านทานต่อกระสุนปืนถล่มปูพรมที่ไม่ยอมหยุดนี้ และไม่นานก็เข้าใจธรรมชาติที่เป็นเนื้อแท้ของมัน\n\nอาการปะทุกระตุกรุนแรงนั้นมีสาเหตุจากกระแสพลังงานจิตวิทยาเข้มข้นที่สะท้อนย้อนกลับมาจากมิติระนาบโลกของเราเอง ลูกปัดสะกดจิตเจตจำนงที่พร้อมระเบิดแปลปรวนเหล่านี้มีศักยภาพที่จะสร้างความเสียหายสาหัสร้ายแรงต่อสติของสมาธิของผู้ที่ยังไม่ได้รับการเตรียมตัวพร้อมระวังรับมือ\n\nข้อมูลเชิงลึกกระจ่างแจ้งปักหลักในใจเรา: โครงสร้างพลังงานพิเศษอันทรงพลานุภาพเหล่านี้จะถูกใช้เป็นรากฐานสำหรับสรรพอาวุธชนิดใหม่ที่ถือกำเนิดพัดพามาจากม่านพลัง"
 shroud.3117.title:"§Rอาการตกใจช็อกจากพลังจิตปะทะ(เสียงตกใจ)§!"
 shroud.3117.desc:"คลังสำรองพลังงานสมาธิจิตใจของเราหดตัวร่อยหรอแห้งลงมากแล้ว\n\nการระเบิดพลังงานจิตวิทยาถาโถมท่วมท้นเกินกำลังรับ ส่งผลเหนี่ยวนำให้เกิดกรณีอาการตกใจช็อกจากพลังจิตปะทะในกลุ่มประชากร [GetTelepathPlural] ของเราหลายราย\n\nเราจำเป็นต้องขอเวลาพักฟื้นรักษาระบบฟื้นฟู"
 psionic_shock_modifier:"อาการช็อกจากพลังจิตปะทะ(เสียงตกใจ)"
 psionic_shock_modifier_desc:"การเผชิญหน้าคลุกคลีกับขุมพลังงานที่ท่วมท้นเกินรับมือไหวในม่านพลัง ส่งผลเหนี่ยวนำให้เกิดอาการช็อกจากพลังจิตทำลายล้างในกลุ่มผู้ส่งกระแสจิต $DEFAULT_TELEPATH_PLURAL$ ของเรา"
 psionic_shock_hive_modifier: "$psionic_shock_modifier$"
 psionic_shock_hive_modifier_desc:"การเผชิญหน้าคลุกคลีกับขุมพลังงานที่ท่วมท้นเกินรับมือไหวในม่านพลัง ส่งผลเหนี่ยวนำให้เกิดอาการช็อกจากพลังจิตทำลายล้างในกลุ่มจิตประสานโทรจิต $HIVE_TELEPATH_PLURAL$ ของเรา"
 psionic_shock_robot_modifier: "$psionic_shock_modifier$"
 psionic_shock_robot_modifier_desc:"การเผชิญหน้าคลุกคลีกับขุมพลังงานที่ท่วมท้นเกินรับมือไหวในม่านพลัง ส่งผลเหนี่ยวนำให้เกิดอาการช็อกจากพลังจิตทำลายล้างในกลุ่มประมวลผลพลังจิตวิญญาณ $MACHINE_TELEPATH_PLURAL$ ของเรา"

 shroud.3200.title:"ดวงจิตพิกัดกลไกอนิมาทัส"
 shroud.3200.desc:"ขณะที่จิตใจสมาธิของเราลอยล่องดำดิ่งลึกเข้าไปสู่ห้วงส่วนในของม่านพลัง(คําราม)อีกคำรบ เราพบว่าตัวเรามาอยู่ท่ามกลางสิ่งดำรงอยู่อันคุ้นตาที่เป็นมิตรของ $the_animator_of_clay_color_article$.\n\nสมาธิจังหวะเสียงฟันเฟืองจักรกลสะท้อนรอบสติสัมปชัญญะจิตใจเรา สุ้มเสียงไร้วาจาเปล่งขึ้นในประสานเสียงร่วมกัน เหล่าวิญญาณเงามืดภายในขบวนกองยานศึกของเราเริ่มตื่นเคลื่อนไหว พวกเสนอตัวจะช่วยบรรทุกประคองร่างทางกายภาพของเราเดินทางลุหน้าต่อไป ปลดเปลื้องแอกความวิตกบนความคิดจิตใจเราเพื่อให้มีพลังมุ่งเป้าไปยังความห่วงใยเบื้องบนอื่นที่สำคัญเลอค่ากว่า\n\nแม้จะไม่ได้มีชีวิตดั้งเดิม แต่พวกเขาก็เป็นที่รู้จักคุ้นตาเรา รูปลักษณ์กายฟอร์มของพวกเขาถูกปรับขัดขึ้นรูปด้วยผลจากการออกแบบ ตัวตนการแสดงพลังแฝงด้วยการบันทึกประวัติศาสตร์เจตจำนงเป้าประสงค์ ทั้งหมดหลอมรวมเข้าหากัน พวกเขายื่นสัมผัสออกมารอคอยอย่างมุ่งหวัง\n\nพวกเราไม่ได้เป็นเพียงผู้ควบคุมสั่งการขับเคลื่อนยานพาหนะรบธรรมดาเหล่านี้อีกต่อไป เราจับคู่เป็นหุ้นส่วนร่วมกัน ความปรองดองเป็นน้ำหนึ่งใจเดียวกันของความแน่วแน่ถูกบรรทุกนำหน้าก้าวรุดหน้าไปด้วยเจตจำนงมุ่งหมายของกลุ่มรวมประสาน"
 shroud.3200.a:"พวกเราเป็นเพียงกลุ่มใบไม้ที่ปลิวร่อนไปตามกระแสลมพัดโชย"
 shroud.3200.a.tt: "§Y$unlock_edict_tt$§!$edict_animatus$"

 shroud.3210.title:"เจตจำนงแห่งความพอดีพอประมาณ(วิลแห่งเทมเพอแรนซ์)"
 shroud.3210.desc.intro:"แก่นแท้อันเศร้าหมองของ $the_outsider_color_article$ ซึมซาบเข้าสู่จิตใจของเรา\n\nขณะที่เสียงสะท้อนอันโศกเศร้าสั่นสะท้อน กระแสน้ำวนพลังจิตที่ผูกปมไว้ก็หลอมรวมเข้าด้วยกันจนกลายเป็นรูปทรงที่แปลกประหลาดและแปรเปลี่ยนอยู่ตลอดเวลา ยิ่งเรามองดู มันก็ยิ่งเข้าใจได้ยากขึ้น สุ้มเสียงหนึ่งเอ่ยขึ้น\n\n§Hมีบางสิ่งที่เจ้าไม่อาจเข้าใจ สิ่งเหล่านั้น ความเจ็บปวดและความเสียใจจะเป็นผู้สอนสั่ง\n\nข้าเป็นคนแรกในหมู่ประชากรของข้าที่มายังสถานที่แห่งนี้ แต่พวกเราทุกคนต่างก็ชดใช้ราคาของมันแล้ว พวกเรายอมปล่อยให้ม่านพลังทำลายล้างพวกเรา อย่าได้ปล่อยให้ชะตากรรมของพวกเรากลายเป็นของเจ้าเลย!§!\n\n"
 shroud.3210.desc.know_zroni:"$shroud.3210.desc.intro$เราจำได้ว่าสุ้มเสียงนี้เป็นของชาวซโรนียังไม่แน่ชัดว่าตัวตนนี้มาอยู่ที่นี่ได้อย่างไร แต่บางทีการรับฟังคำเตือนของมันเกี่ยวกับพลังทำลายล้างของม่านพลังก็นับว่าฉลาดหลักแหลม"
 shroud.3210.desc.left_zroni:"$shroud.3210.desc.intro$เรารู้จักตัวตนนี้ เราเคยพบกับซรอนีผู้มองการณ์ไกล' ผู้นี้มาก่อน ยังไม่แน่ชัดว่ามันมาอยู่ที่นี่ได้อย่างไร แต่เราควรรับฟังคำเตือนของมันเกี่ยวกับพลังทำลายล้างของม่านพลัง"
 shroud.3210.desc.default:"$shroud.3210.desc.intro$ตัวตนนี้ยังคงเป็นปริศนาสำหรับเรา เราเข้าใจคำเตือนอันเป็นลางร้ายของมันเพียงเล็กน้อยเท่านั้น"
 shroud.3210.a:"เราต้องดำเนินการด้วยความระมัดระวัง"
 shroud.3210.a.tt: "§Y$unlock_edict_tt$§!$edict_will_of_temperance$"

 shroud.3220.title:"เกมแห่งห้วงความคิด"
 shroud.3220.desc:"รอบตัวเรา ม่านพลังเต้นเป็นจังหวะด้วยท่วงทำนองอันเงียบสงบของ $the_golden_dream_color_article$\n\nขณะที่เราเฝ้าดู เศษเสี้ยวพลังจิตวิญญาณที่กระจัดกระจายก็ค่อย ๆ จัดเรียงตัวเองเข้าสู่ตารางอันซับซ้อน รหัสสัญญลักษณ์ที่อ่านไม่ออกเริ่มปรากฏขึ้นในรูปแบบที่ถูกจัดวางอย่างประณีต\n\nพวกมันเริ่มสลับที่ทับซ้อนและวนรอบซึ่งกันและกัน จนเกิดเป็นรูปทรงใหม่ ๆ ที่มีความซับซ้อนเพิ่มขึ้นเรื่อย ๆ เมื่อเวลาผ่านไป เราสัมผัสได้ถึงรูปแบบและตรรกะที่ควบคุมการเคลื่อนไหวของพวกมัน\n\nเราตระหนักได้ว่าเราได้มีส่วนร่วมในเกมกับ $the_golden_dream_article$ แต่ละย่างก้าวที่มันชี้นำเราได้เติมเต็มความรู้สึกอันดื่มด่ำและเงียบสงบ"
 shroud.3220.a:"ขณะที่เราเล่น เราได้หลบหนีไปยังสถานที่ที่มีความหมาย"
 shroud.3220.a.tt: "§Y$unlock_edict_tt$§!$edict_will_of_distraction$"

 shroud.3230.title:"ผืนทรายแห่งกาลเวลา"
 shroud.3230.desc:"เม็ดทรายแห่งความคิดผ่านพ้นตัวเราไป เรารับรู้ได้ถึงการมีอยู่ทางกายภาพที่เสียดสีของ $the_endless_tide_color_article$\n\nมันมีทั้งขึ้นและลง กัดเซาะทุกสรรพสิ่งเบื้องหน้ามันด้วยความจริงแท้แห่งชั่วนิรันดร์ ก่อนจะสะสมตัวก่อตัวขึ้นใหม่\n\nการปรากฏตัวขึ้นมาอีกครั้งหลังจากการไหลผ่านของมัน ทำให้เราสัมผัสได้ถึงความรู้สึกสดชื่นมีชีวิตชีวาขึ้นมาใหม่อย่างแท้จริง"
 shroud.3230.a:"ณ ที่แห่งนี้ เราอยู่เหนือกาลเวลา"
 shroud.3230.a.tt: "§Y$unlock_edict_tt$§!$edict_will_of_endless$"

 shroud.3240.title:"ปฏิรูปสร้างใหม่"
 shroud.3240.desc:"ยอดเขาอันน่าเวียนหัวทอดเงาเหนือความคิดของเรา มันคือ $the_pale_mountain_color_article$ นั่นเอง จิตใจของเราตึงเครียดเมื่อภาพนิมิตถาโถมทับประสาทสัมผัสทั้งหมด\n\nเรามองเห็นโครงร่างที่เลือนลางของยานพาหนะที่เสียหายเบื้องหน้าเรา ลอยเคว้งคว้างอยู่ในความว่างเปล่า\n\nที่ใดสักแห่งในใจเรา แรงกดดันอันบิดเบี้ยวได้แปรเปลี่ยนไป และยานลำนั้นก็เริ่มแปรสภาพ รอยแตกร้าวปิดผนึก สนิมผุกร่อนจางหาย และแผ่นโลหะเหยียดตรง ร่องรอยอดีตแห่งการถูกทำลายค่อย ๆ ถูกลบล้างไปอย่างช้า ๆ\n\nเมื่อยานได้รับการซ่อมแซมเสร็จสมบูรณ์ ภาพนิมิตก็ยุติลงอย่างกะทันหัน เหลือทิ้งไว้เพียงความรู้สึกแจ่มใสของการเกิดใหม่ภายในจิตใจ"
 shroud.3240.a:"การเกิดใหม่อย่างยิ่งใหญ่ของจิตใจเรา"
 shroud.3240.a.tt: "§Y$unlock_edict_tt$§!$edict_will_of_rebirth$"

 shroud.3250.title:"พลังแห่งการละเว้น"
 shroud.3250.desc:"ความเงียบสงบของ $the_hollow_point_color_article$ เติมเต็มจิตใจของเราด้วยความสงัด ภาพนิมิตหนึ่งทอดยาวเข้าสู่ประสาทสัมผัสของเราอย่างช้า ๆ\n\nเรามองเห็นช่วงเวลาแห่งความขัดแย้งหลายยุคสมัยคลี่คลายลงในชั่วพริบตา - อารยธรรมล่มสลาย ประวัติศาสตร์ถูกลบเลือน รูปปั้นของทรราชที่ตายไปนานแล้วถูกฝังกลบโดยกาลเวลา\n\nปัญญาของ $the_hollow_point_article$ อยู่ในความแข็งแกร่งอันเงียบสงบของการละเว้น ความขัดแย้งเกิดขึ้นและดับไป แต่เรายังคงอยู่ การปล่อยวางนี้ช่วยให้ผู้นำของเรามีอายุขัยที่ยืนยาวขึ้นใหม่ หลุดพ้นจากความเป็นพิษที่กัดเซาะของความแค้นในแบบปุถุชน"
 shroud.3250.a:"พวกเรายังคงมีชีวิตอยู่"
 shroud.3250.a.tt:"ผู้นำพลังจิตทุกคนจะได้รับคุณลักษณะ §Y$leader_trait_shroud_age$§! ซึ่งจะมอบอายุขัยผู้นำเพิ่มเติม §G+40§! ปี"

 shroud.3260.title:"เปลี่ยนความโกลาหลเป็นระเบียบ"
 shroud.3260.desc:"การเดือดพล่านของม่านพลังเต้นระบำเบื้องหน้าเรา ตัวตนที่ยากจะควบคุมขยับใกล้เข้ามา มันคือ $the_vacant_throne_color_article$\n\nเมื่อมันเข้าใกล้ ขดสายพลังจิตดิบอันกว้างใหญ่และพันกันยุ่งเหยิงก็สยบลงในทันที ความสับสนมัวซัวแจ่มแจ้งและเข้าใจได้ง่ายขึ้น สีสันผลิบานด้วยความคมชัดรูปแบบใหม่ ความสมมาตร ตรรกะ และโครงสร้างได้ถูกกำหนดขึ้น\n\nบางสิ่งก่อตัวขึ้นในส่วนลึกที่สุดของจิตใจเรา: ความปรารถนาอันแรงกล้าที่จะสร้างระเบียบเรียบร้อย"
 shroud.3260.a:"หลีกหนีความโกลาหล โอบรับความเป็นระเบียบ"
 shroud.3260.a.tt: "§Y$unlock_edict_tt$§!$edict_will_of_order$"

 shroud.3270.title:"อัตราเร่งไร้ขีดจำกัด"
 shroud.3270.desc:"อัตราเร่งทางจิตใจที่เป็นไปไม่ได้ท่วมท้นประสาทสัมผัสของเรา เรารับรู้ได้ถึงการมีอยู่ของ $the_black_river_color_article$\n\nเรารุดหน้าไปด้วยความเร็วที่ยากจะหยั่งถึงไปสู่จุดสิ้นสุดที่เราไม่เข้าใจอย่างถ่องแท้ มันคือเส้นแบ่งระหว่างทุกสรรพสิ่งและความว่างเปล่า การแยกออกจากกันของสิ่งที่เป็นมาตลอดและสิ่งที่จะไม่มีวันเกิดขึ้น ขีดจำกัดที่ไม่มีกฎเกณฑ์ทางธรรมชาติใด ๆ สามารถแผ่ขยายข้ามพ้นไปได้\n\nในที่สุด เมื่อเรากลับคืนสู่ตัวเอง เราก็หลงเหลือความคิดแนวใหม่เกี่ยวกับความหมายของการเคลื่อนไหวที่แท้จริง"
 shroud.3270.a:"เราได้เห็นจุดสิ้นสุดขอบจักรวาลแล้วหรือยัง?"
 shroud.3270.a.tt: "§Y$unlock_edict_tt$§!$edict_will_of_motion$"

#==========================
# Forge our own Path
#==========================

 shroud.3500.title:"เส้นทางที่เบิกสร้างขึ้น"
 shroud.3500.desc:"[GetResearchers] พลังจิตของเราได้พัฒนาเทคนิคอันชาญฉลาดในการดึงพลังงานมาจาก §Hม่านพลัง§!\n\nพลังอันยิ่งใหญ่ที่สุดในอาณาจักรพลังจิตถูกปิดบังไว้เป็นความลับโดยเหล่าผู้อุปถัมภ์ ซึ่งจะมอบให้ผ่านการทำ พันธสัญญา เท่านั้น สิ่งนี้เราไม่อาจทำได้ ทว่าเราได้ค้นพบวิธีเบิกเส้นทางของตัวเองแล้ว\n\nด้วยการฉายเจตจำนงของเราเข้าไปในม่านพลัง เราสามารถสูบดึงพลังงานปริมาณเล็กน้อยจากดินแดนปรับประสานแต่ละแห่งของมันได้ การทำเช่นนั้นต้องอาศัยสมาธิอย่างสูงส่ง แต่จิตใจของเราได้รับการเสริมกำลังแล้วเพื่อรักษาอุณหภูมิตัวและสมดุลอันเปราะบางนี้"
 shroud.3500.a:"ภายในม่านพลัง เจตจำนงของเราเป็นของเราเอง"

 shroud.3510.title: "$utopia.2681.name$"
 shroud.3510.desc:"ในรอยพับของ §Hม่านพลัง§! [GetTelepathPlural] ของเราได้ค้นพบชุมสายของพลังงานที่ยังไม่ถูกดึงไปใช้\n\nพลังที่หลอมรวมกันสามารถค่อย ๆ สะสมขึ้นมาในอาณาจักรพลังจิต - ความเข้มข้นอันทรงพลังของพลังงานที่วันหนึ่งอาจเติบโตขึ้นกลายเป็นตัวตนที่ยิ่งใหญ่กว่า เราได้ค้นพบแหล่งชุมชนพลังงานหนึ่งดังกล่าวที่พร้อมให้ครอบครอง\n\nด้วยแรงเจตจำนงพลังจิตล้วน ๆ หนึ่งในพวกเราจะสามารถดูดซับความแข็งแกร่งอันพิเศษนี้ได้ มีผู้สมัครจำนวนหนึ่งที่ได้รับการคัดเลือกแล้ว"
 shroud.3510.a: "§H[leader_1.GetTitle]§! [leader_1.GetName]"
 shroud.3510.b: "§H[leader_2.GetTitle]§! [leader_2.GetName]"
 shroud.3510.c: "§H[leader_3.GetTitle]§! [leader_3.GetName]"
 shroud.3510.d: "§H[leader_4.GetTitle]§! [leader_4.GetName]"

 psionic_mastery:"ความเป็นเลิศด้านพลังจิต"
 psionic_mastery_desc:"เราบรรลุความเป็นเลิศด้านพลังจิตของเราแล้ว จิตวิญญาณของเราเคลื่อนที่ไปทั่วทั้งม่านพลังโดยไร้ซึ่งอุปสรรคกีดขวาง"
 shroud.3520.title: "$psionic_mastery$"
 shroud.3520.desc:"ด้วยการฉายเจตจำนงของเราเข้าไปใน §Hม่านพลัง§! เราบรรลุความเป็นเลิศขั้นหนึ่งด้านความสามารถพลังจิตของเราแล้ว เราได้รวบรวมพลังจากดินแดนของตัวตนจำนวนมาก โดยยังคงเป็นอิสระไม่ผูกมัดด้วยอิทธิพลของพวกมัน ยิ่งไปกว่านั้น [GetTelepathPlural] ของเราในเวลานี้มีทักษะระดับผู้เชี่ยวชาญในการควบคุมภวังค์พลังจิตของตน\n\nในขณะที่ผู้อื่นอาจปล่อยให้ม่านพลังเป็นผู้กำหนดโชคชะตา แต่เรายังคงรักษาความเป็นอิสระที่แท้จริงของเจตจำนงไว้ได้\n\nศักยภาพทางพลังจิตของ §H[this.GetName]§! ได้รับการเติมเต็มแล้ว"
 shroud.3520.a:"นี่เป็นเพียงจุดเริ่มต้นเท่านั้น"

