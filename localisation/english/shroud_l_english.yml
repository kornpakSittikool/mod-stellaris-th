 shroud.6020.name: "$UNKNOWN_LONG$"
 shroud.6020.desc:"§Hในขณะที่เราพยายามทำการติดต่อ ลูกเรือในห้องควบคุมระบบควบคุมการขับเคลื่อนเริ่มมีอาการปวดศีรษะเป็นระยะๆ...§!"

 shroud.6030.name: "[exiled_country.GetName]"
 shroud.6030.desc:"§Hแม้ว่าจะพยายามอยู่หลายครั้ง แต่ทาง [exiled_country.GetName] ก็ไม่มีการตอบรับการสื่อสารของเราเลย§!"

 shroud.6050.name:"ความเชื่อมโยงอันแปลกประหลาด"
 shroud.6050.desc:"อุปกรณ์ยับยั้งพลังจิต (§H$building_ancient_ward_1$§!) ของเรากำลังให้ค่าที่บันทึกได้ผิดปกติ โดยปกติแล้วผลลัพธ์นี้จะเกิดจากการพุ่งสูงของกิจกรรมพลังจิตบนดาว [Root.GetHomeWorldName] แต่เรากลับไม่พบหลักฐานพฤติกรรมเสื่อมทรามดังกล่าวเลย\n\nคำตอบอาจอยู่นอกเหนือพรมแดนของเรา ภาพถ่ายระยะไกลแสดงให้เห็นการระเบิดของกระแสพลังงานประหลาดล่าสุดในระบบดาว §H[exiled_system_border.GetName]§! ซึ่งมีความเชื่อมโยงกับค่าการวัดที่ผิดปกติของ $building_ancient_ward_1$ อย่างน่าประหลาด"
 shroud.6050.a:"เราต้องเข้าไปสำรวจในระบบดาว [exiled_system_border.GetName]"

 shroud.shared_text_psy_symptoms:"ความปั่นป่วนทางอารมณ์ ความตึงเครียดทางจิตใจที่บั่นทอนกำลัง และภาพนิมิตของความสยดสยองที่ไม่อาจเอ่ยคำพูดพรรณนาได้ซึ่งเกิดขึ้นซ้ำแล้วซ้ำเล่า"
 shroud.shared_text_psi_radiation:"ปรากฏการณ์เหล่านี้สอดคล้องอย่างใกล้ชิดกับประสบการณ์ที่บรรพบุรุษของเราเคยบันทึกไว้ นี่น่าจะเป็นสิ่งที่พวกเขาเรียกว่า 'รังสีพลังจิต(ถอนหายใจ)ซึ่งเป็นรูปแบบการปล่อยพลังงานที่มีอานุภาพทำลายล้างสูงเป็นพิเศษ"
 shroud.shared_text_ship_malfunction:"ระบบการทำงานหลักของกองยานยังต้องเผชิญกับการทำงานผิดพลาดอย่างรุนแรง ส่งผลให้ความสามารถปกติส่วนใหญ่ใช้การไม่ได้โดยสิ้นเชิง"

 shroud.6100.name:"พลังงานอันตราย"
 shroud.6100.desc.no_border_aura:"สถานการณ์ที่น่ากังวลกำลังก่อตัวขึ้นในระบบดาวที่เพิ่งสำรวจใหม่ §H[from.GetName]§! ลูกเรือของยาน [root.GetName] กำลังเผชิญกับอาการทางจิตเวชหลายอย่าง: $shroud.shared_text_psy_symptoms$ ระบบของกองยานพวกเขายังเกิดการขัดข้องทางเทคนิคที่แปลกประหลาดและเอาแน่เอานอนไม่ได้อีกด้วย\n\n$shroud.shared_text_psi_radiation$ เมื่ออยู่นอกเหนือการคุ้มครองของ §H$building_ancient_ward_1$§! บนดาว §H[owner.GetHomeWorldName]§! นี่ถือเป็นครั้งแรกที่เราต้องเผชิญกับความเสื่อมโทรมทางจิตใจที่บรรพบุรุษของเราเคยตักเตือนไว้\n\nหลังจากปรับเทียบสแกนเนอร์ระยะไกลเพื่อตรวจจับพลังงานรูปแบบพิเศษนี้ เราได้ค้นพบว่าต้นกำเนิดการปล่อยพลังงานอันตรายเหล่านี้มาจากระบบดาวใกล้เคียง §H[exiled_center_system.GetName]§! $shroud.6100.desc.end$"
 shroud.6100.desc.border_aura:"ลูกเรือของยาน [root.GetName] กำลังตกอยู่ในอันตราย\n\nเมื่อได้สัมผัสกับรังสีพลังจิตในระดับที่สูงอย่างยิ่งยวดในระบบดาว §H[from.GetName]§! พวกเขาเริ่มมีอาการความทุกข์ทรมานทางจิตใจที่ร้ายแรงยิ่งกว่าที่เคยรายงานไว้ก่อนหน้านี้เสียอีก $shroud.shared_text_ship_malfunction$\n\nเครื่องสแกนระยะไกลระบุว่าระดับรังสีในระบบดาวใกล้เคียง §H[exiled_center_system.GetName]§! ยิ่งมีระดับความเข้มข้นที่สูงยิ่งขึ้นไปอีก $shroud.6100.desc.end$"
 shroud.6100.desc.end:"ขอแนะนำเป็นอย่างยิ่งให้หลีกเลี่ยงการส่งยานลำใดของเราเข้าไปลึกกว่านี้ จนกว่าเราจะสามารถประเมินผลกระทบของมันได้อย่างครอบคลุมมากขึ้น"
 shroud.6100.tt:"เตรียมพร้อมที่จะเริ่มต้นกระบวนการ §Yสร้างการติดต่อครั้งแรก(ติดต่อแรก)§!"

 shroud.6110.name:"การปรากฏตัวบางสิ่งในระบบดาว [This.System.GetName]"
 shroud.6110.desc:"เป็นที่น่าอัศจรรย์ยิ่ง ระบบดาว §H[This.System.GetName]§! ดูเหมือนจะประกอบไปด้วยวัตถุขนาดใหญ่จำนวนหนึ่งซึ่งสร้างขึ้นโดยสิ่งมีชีวิตทรงปัญญา เราอาจเรียนรู้เพิ่มเติมเกี่ยวกับผู้สร้างสิ่งเหล่านี้ ซึ่งมีรหัสเรียกขานว่า §H[This.ContactCountry.GetName]§! ได้โดยการพยายามสื่อสารโดยตรงจากระยะปลอดภัย\n\nสิ่งมีชีวิตใดๆ ก็ตามในระบบดาวนี้ย่อมต้องตกอยู่ในอันตรายอย่างใหญ่หลวงจากระดับรังสีพลังจิตที่สูงมากที่เราตรวจพบ"
 fcsum_exiled_1:"เราได้ค้นพบหลักฐานที่มีความเป็นไปได้ของสิ่งมีชีวิตต่างดาวทรงปัญญาในระบบดาว §H[This.System.GetName]§!"

 shroud.6115.name:"ความก้าวหน้าอันจำกัด"
 shroud.6115.desc:"การศึกษาเพิ่มเติมช่วยยืนยันแล้วว่าวัตถุในระบบดาว §H[This.System.GetName]§! คือยานอวกาศของเอเลี่ยน แม้ว่าเราจะยังไม่ได้ทำการติดต่อกับผู้อยู่บนยานคนใดก็ตาม\n\nทว่าสิ่งที่น่ากังวลคือ ทูต [exiled_envoy.GetName] รายงานว่าทีมของ[exiled_envoy.GetHisHer]เริ่มมีอาการผิดปกติทางจิตวิญญาณ รวมถึงภาพนิมิตที่ไม่สามารถอธิบายได้เกี่ยวกับสิ่งมีชีวิตประหลาดที่อยู่ในระบบดาว [This.System.GetName] แม้จะมีข้อกังวลเหล่านี้ ทูตของเราก็ยังคงยืนหยัดทุ่มเทให้กับการปฏิบัติภารกิจอย่างแน่วแน่"
 shroud.6115.a:"ดำเนินการสู้ต่อไป"
 fcsum_exiled_2:"เรายังไม่ได้ดำเนินการติดต่อกับ §H[This.ContactCountry.GetName]§! ทูตของเราได้รายงานข้อกังวลเกี่ยวกับสวัสดิภาพของทีมปฏิบัติงาน"

 shroud.6120.name:"ภารกิจถูกยกเลิก"
 shroud.6120.desc:"หลังจากเงียบหายไปนานหลายเดือน เราได้รับสัญญาณส่งข้อความจากทูต [exiled_envoy.GetName] ซึ่งโดยปกติแล้วเป็นคนที่สุขุมและตรงไปตรงมา แต่ครั้งนี้เขากลับรายงานเหตุอย่างสับสนและพิลึกพิลั่น ทูตได้นำเสนอคำอธิบายที่พร่ำเพ้อเกี่ยวกับภาพนิมิตประหลาด — ซึ่งเห็นได้ชัดว่าเป็นภาพฝันผสมผสานกับอาการประสาทหลอน สมาชิกในทีมปฏิบัติงานของเขาก็ไม่มีใครที่มีสติสัมปชัญญะที่แจ่มชัดเลยสักคนเดียว\n\nพวกเขาได้รับการปลดเปลื้องจากหน้าที่การทำงานแล้ว และภารกิจนี้ได้ถูกระงับการทำงานอย่างไม่มีกำหนด ไม่ว่าสิ่งที่ปรากฏตัวอยู่ในระบบดาว §H[This.System.GetName]§! จะเป็นอะไรก็ตาม ในปัจจุบันมันยังอยู่เกินกว่าขีดความสามารถของเราที่จะเข้าไปทำการสืบสวนตรวจสอบได้อย่างปลอดภัย"
 fcsum_exiled_3:"หลังจากผ่านพ้นภารกิจที่สะเทือนจิตใจ ทีมปฏิบัติงานของเราได้เดินทางกลับบ้านก่อนที่จะได้ทำระบบการติดต่อกับ §H[This.ContactCountry.GetName]§!"

 shroud.6125.desc:"ลอยเคว้งอยู่เหนือกระแสคลื่นที่ปั่นป่วน ดาว §H[Root.Capital.GetName]§! หรือว่าเป็น...?\n\n§H...กำลังเรียก...§!\n\nพื้นผิวบิดตัวอ้าออก มลพิษอันเหม็นอับพวยพุ่งขึ้นมาจากก้นบึ้งที่มองไม่เห็น\n\n§H...ตอบกลับ...ความว่างเปล่า...§!\n\nไม่รู้จักหยุดหย่อน อึดอัดจนแทบจะขาดใจ\n\nมันช่างเลวร้ายเหลือเกิน"

 MESSAGE_FIRST_CONTACT_ABORTED_EXILED_DESC:"กระบวนการสร้างการติดต่อครั้งแรก ($first_contact$) ของเรากับฝ่าย $COUNTRY|H$ ได้ถูกยกเลิกโดยคำสั่งของฝ่ายบริหารระดับสูง"

 shroud.shared_text_aura_spread:"การ 'ติดเชื้อ' ทางพลังจิตในบริเวณใกล้เคียงได้แพร่กระจายเข้าสู่ระบบดาว §H[exiled_system_border.GetName]§! แล้ว\n\nแม้จะได้รับความคุ้มครองจาก §H$building_ancient_ward_1$§! แต่การรุกล้ำนี้ทำให้ประชากรของเราบนดาว §H[Root.GetHomeWorldName]§! เริ่มมีอาการป่วยอย่างอ่อนๆ ซึ่งบ่งชี้ถึงพิษจากรังสีพลังจิต การคาดการณ์ชี้ให้เห็นว่าโรคระบาดทางจิตนี้อาจขยายตัวเข้าสู่ระบบดาว §H[Root.home_planet.System.GetName]§! ในไม่ช้า ซึ่งจะสร้างอันตรายที่ใหญ่หลวงยิ่งขึ้นต่อโลกบ้านเกิดของเรา"
 shroud.shared_text_aura_study:"แม้จะมีความเสี่ยง แต่ความหวังที่ดีที่สุดในการเรียนรู้วิธีปกป้องตนเองอย่างครอบคลุมมากขึ้นคือการเข้าศึกษาวิจัยปรากฏการณ์นี้ในพื้นที่ใกล้กับแหล่งกำเนิดมากกว่าเดิม"

 shroud.6200.name:"รังสีพลังจิตบนดาว §H[Root.GetHomeWorldName]§!"
 shroud.6200.desc.no_visit:"สถานการณ์ที่น่ากังวลกำลังก่อตัวขึ้นบนดาว §H[Root.GetHomeWorldName]§! ประชากรกำลังทนทุกข์จากกลุ่มอาการผิดปกติทางจิตเวช: $shroud.shared_text_psy_symptoms$\n\n$shroud.shared_text_psi_radiation$ ผู้คนภายนอกพื้นที่ป้องกันของอุปกรณ์ §H$building_ancient_ward_1$§! ของเรา กำลังประสบกับความเสื่อมโทรมทางจิตใจเป็นครั้งแรกดังที่บรรพบุรุษเคยเตือนไว้\n\nหลังจากการปรับเทียบเครื่องสแกนระยะไกลเพื่อตรวจจับพลังงานรูปแบบพิเศษนี้ เราได้ค้นพบว่าการปล่อยพลังงานอันตรายเหล่านี้แพร่กระจายออกมาจากพื้นที่ที่ไกลพ้นระบบดาว §H[exiled_system_border.GetName]§! ออกไป $shroud.shared_text_aura_study$"
 shroud.6200.desc.visit_no_ship: "$shroud.shared_text_aura_spread$\n\n$shroud.shared_text_aura_study$"
 shroud.6200.desc.visit_and_ship:"$shroud.shared_text_aura_spread$\n\nนับตั้งแต่ต้องสัมผัสกับรังสีพลังจิตในระบบลูกเรือของยาน §H[event_target:ship_in_border.GetName]§! ในระบบดาว [exiled_system_border.GetName] ต่างเผชิญกับความทุกข์ทรมานทางจิตใจที่ร้ายแรงยิ่งกว่ารายงานครั้งก่อนหน้าเสียอีก $shroud.shared_text_ship_malfunction$\n\n$shroud.shared_text_aura_study$"
 shroud.6200.a:"ให้เราศึกษาวิธีที่จะยับยั้งการปนเปื้อนแพร่กระจายนี้กันเถอะ"

 PSI_RADIATION_PROJECT:"การวิจัยรังสีพลังจิต"
 PSI_RADIATION_PROJECT_DESC:"ระดับรังสีพลังจิตในระบบดาว §H[exiled_system_border.GetName]§! เพิ่มขึ้นอย่างกะทันหัน และเริ่มส่งผลกระทบให้รู้สึกได้บนดาวเคราะห์บ้านเกิด §H[Owner.GetHomeWorldName]§! เราต้องศึกษาวิจัยปรากฏการณ์ที่กำลังพัฒนาขึ้นนี้อย่างใกล้ชิด ก่อนที่มันจะสร้างอันตรายต่อประชากรของเราไปมากกว่านี้"

 shroud.6205.name: "$PSIONIC_AURA_PLURAL$"
 shroud.6205.desc.start:"เหล่านักวิจัยของเราต้องทนทุกข์ทรมานอย่างหนักท่ามกลางพิษของรังสีพลังจิตในระบบแต่ภารกิจของพวกเขาก็นำไปสู่การค้นพบข้อมูลที่สำคัญอย่างยิ่ง\n\nเราได้จำแนกปรากฏการณ์ที่น่ากังวลนี้ว่าคือ §H'$PSIONIC_AURA$' (ม่านรัศมีพลังจิต)§! ซึ่งเป็นแหล่งรวมพลังงานทำลายล้างขนาดมหึมาที่สร้างความปั่นป่วนไม่เพียงแต่จิตใจของเราเท่านั้น แต่ยังรวมถึงเทคโนโลยีของเราอีกด้วย มันแพร่กระจายมาจากระบบดาว §H[exiled_center_system.GetName]§! ซึ่งเป็นจุดที่พลังงานจิตทวีความรุนแรงมากขึ้นจนสามารถแผ่ขยายปกคลุมข้ามผ่านระบบดาวฤกษ์ต่างๆ ได้"
 shroud.6205.desc.aura_home:"$shroud.6205.desc.start$\n\nมันได้เดินทางมาถึงระบบดาว §H[Root.home_planet.System.GetName]§! ของเราแล้ว ซึ่งสร้างผลลัพธ์ที่สร้างความพินาศอย่างรุนแรง $shroud.6205.desc.end$"
 shroud.6205.desc.no_aura_home:"$shroud.6205.desc.start$\n\nหากมันเดินทางมาถึงระบบดาว §H[Root.home_planet.System.GetName]§! ของเรา ผลลัพธ์ย่อมสร้างความพินาศอย่างรุนแรง $shroud.6205.desc.end$"
 shroud.6205.desc.end:"อุปกรณ์ปกป้องดั้งเดิม (§H$building_ancient_ward_1$§!) บนดาว §H[Root.GetHomeWorldName]§! สามารถให้การปกป้องได้ในระดับที่จำกัดเท่านั้น"
 shroud.6205.a:"เราต้องเสริมความแข็งแกร่งให้กับโครงสร้าง $building_ancient_ward_1$"

 PSIONIC_AURA_RESISTANCE_PROJECT:"โครงการต่อต้านม่านรัศมีพลังจิต"
 PSIONIC_AURA_RESISTANCE_PROJECT_DESC:"อุปกรณ์ยับยั้งพลังจิต §H$building_ancient_ward_1$§! ซึ่งสร้างขึ้นโดยบรรพบุรุษของเราบนดาว §H[Owner.GetHomeWorldName]§! ได้รับการออกแบบมาเพื่อปกป้องพวกเราจากรังสีพลังจิต การรุกรานของ §H$PSIONIC_AURA_PLURAL$§! กำลังข่มขู่ว่าจะสร้างภาระงานเกินขีดความสามารถที่มันรองรับได้ในปัจจุบัน จากการนำสิ่งที่เราได้เรียนรู้มาปรับใช้ เราควรสามารถปรับปรุงคุณสมบัติการต้านทานของมันให้มีประสิทธิภาพสูงขึ้นได้"

 shroud.6210.name:"การกรองลดทอนสัญญาณพลังจิต"
 shroud.6210.desc:"นักวิจัยที่ทำงานอย่างไม่รู้จักเหน็ดเหนื่อยของเราได้พัฒนาวิธีการสำหรับเสริมสร้างความแข็งแกร่งของโครงสร้าง §H$building_ancient_ward_1$§! บนดาว §H[Root.GetHomeWorldName]§! แล้ว โดยการปรับปรุงประสิทธิภาพเครื่องลดทอนสัญญาณพลังจิต ขอบเขตการคุ้มครองจะสามารถแผ่ขยายออกไปครอบคลุมไม่เพียงแค่ดาวเคราะห์ทั้งดวงเท่านั้น แต่รวมถึงระบบดาว §H[Root.home_planet.System.GetName]§! ทั้งหมดอีกด้วย\n\nงานวิจัยนี้ยังช่วยกระตุ้นการศึกษาในวงกว้างเกี่ยวกับเทคโนโลยีที่สูญหายไปนี้ ตอนนี้เราทราบแล้วว่าความเชื่อมโยงระหว่างรังสีพลังจิตกับจิตใจของชาว [Root.GetSpeciesAdj] นั้นเป็นลักษณะต่างตอบแทน: ไม่ใช่เพียงแต่การปล่อยรังสีเหล่านี้จะส่งผลต่อสภาวะทางจิตใจของเราได้เท่านั้น แต่สภาวะทางจิตใจของเราก็สามารถส่งอิทธิพลต่อระดับรังสีพลังจิตได้เช่นกัน ดูเหมือนว่าข้อห้ามที่มีมาแต่โบราณกาลของเราในการต่อต้านการใช้พลังจิตนั้นจะมีพื้นฐานทางวิทยาศาสตร์มารองรับในที่สุด"
 shroud.6210.a:"ช่างน่าทึ่ง — และน่ากังวลในเวลาเดียวกัน"
 shroud.6210.a.tt: "$BEGINS_EVENT_CHAIN$ §Y$ancient_ward_upgrade_chain_title$§!"

 ancient_ward_upgrade_chain_title:"โครงการก่อสร้าง $building_ancient_ward_2$"
 ancient_ward_upgrade_chain_desc:"โครงสร้าง §H$building_ancient_ward_1$§! บนดาว §H[Owner.GetHomeWorldName]§! ได้มาถึงขีดจำกัดการใช้งานจริงแล้ว เพื่อรับมือกับภัยคุกคามพลังจิตในบริเวณใกล้เคียง เราจำเป็นต้องเสริมกำลังขีดความสามารถการทำงานของมันเพิ่มเติม โครงสร้างใหม่ §H$building_ancient_ward_2$§! นี้จะมีความสามารถในการปกป้องประชากรของเราให้พ้นจากความเสื่อมทรามของ §H$PSIONIC_AURA_PLURAL$§!"
 ancient_ward_upgraded:"สิ่งปลูกสร้างได้รับการอัปเกรดเรียบร้อย"

 shroud.6215.name:"การก่อสร้าง $building_ancient_ward_2$ เสร็จสิ้นสมบูรณ์"
 shroud.6215.desc.aura_home:"บัดนี้ด้วยการก่อสร้างโครงสร้าง §H$building_ancient_ward_2$§! ของเราเสร็จสิ้น รังสีพลังจิตในระบบดาว §H[Root.home_planet.System.GetName]§! ได้รับการลดระดับลงมาจนถึงเกณฑ์ที่สามารถรับมือและควบคุมได้แล้ว ประชากรบนดาว §H[Root.GetHomeWorldName]§! กำลังค่อยๆ ฟื้นตัวกลับคืนมาจากผลกระทบที่เป็นอันตรายของมัน"
 shroud.6215.desc.no_aura_home:"บัดนี้ด้วยการก่อสร้างโครงสร้าง §H$building_ancient_ward_2$§! ของเราเสร็จสิ้น รังสีพลังจิตบนดาว §H[Root.GetHomeWorldName]§! ได้รับการลดระดับลงมาจนถึงเกณฑ์ที่สามารถควบคุมได้แล้ว ประชากรบนดาวเคราะห์กำลังค่อยๆ ฟื้นตัวกลับคืนมาจากผลกระทบที่เป็นอันตรายของมัน"
 shroud.6215.desc.end:"อย่างไรก็ตาม ม่านรัศมีพลังจิต (§H$PSIONIC_AURA$§!) นี้ รวมถึงแหล่งอื่นๆ ที่อาจเกิดขึ้น ยังคงปนเปื้อนเป็นพิษภัยแก่กาแล็กซีภายนอกอยู่ เหล่านักวิทยาศาสตร์ของเราตั้งสมมติฐานว่าเทคโนโลยีของ $building_ancient_ward_2$ สามารถนำไปใช้ในการพัฒนาโครงสร้างระดับมหึมาที่มีประสิทธิภาพยิ่งใหญ่กว่าอย่าง §H'$SHROUD_SEAL$' (ตราผนึกม่านพลัง)§! โครงสร้างระดับยักษ์เหล่านี้ควรจะมีความสามารถในการขัดขวางยับยั้งม่านรัศมี(ถอนใจ)ได้ในระดับทั้งกระจุกดาว การก่อสร้างตราผนึกม่านพลัง ($SHROUD_SEAL$) ในระบบดาว §H[exiled_system_border.GetName]§! จะถือเป็นก้าวสำคัญในความคืบหน้าการควบคุมภัยคุกคามพลังจิต"
 shroud.6215.a:"นี่คืองานวิจัยที่ควรค่าแก่การแสวงหาคำตอบ"

 build_shroud_seal_poi_desc:"หลังจากทำงานวิจัยเทคโนโลยีควบคุมยับยั้งพลังจิต (§H$tech_psionic_suppression$§!) เสร็จสิ้นแล้ว เราสามารถสั่งการยานก่อสร้าง ($constructor$) เพื่อทำการก่อสร้าง §H$SHROUD_SEAL$§! ภายในแรงโน้มถ่วงระบบดาวได้ สิ่งนี้จะขัดขวางควบคุมสะกด §H$PSIONIC_AURA_PLURAL$§! ทั่วทั้งระบบดาวนั้น รวมถึงระบบใกล้เคียงทั้งหมดที่เชื่อมต่อกันทางเส้นทางไฮเปอร์เลน(hyperlanne)"
 shroud_seal_construction_chain_title:"การก่อสร้างตราผนึกม่านพลัง ($SHROUD_SEAL$)"
 shroud_seal_construction_chain_desc:"นักวิทยาศาสตร์ของเราตั้งสมมติฐานว่าสามารถพัฒนาเทคโนโลยีควบคุมยับยั้งพลังจิต (§H$tech_psionic_suppression$§!) ขั้นสูงเพิ่มเติมเพื่อยับยั้งสะกด §H$PSIONIC_AURA_PLURAL$§! ในระบบดาวฤกษ์ทั้งกระจุกได้\n\nเทคโนโลยีนี้จะช่วยให้เราสามารถก่อสร้างตราสะกดผนึกม่านพลัง (§H'$SHROUD_SEAL$'§!) ได้ การก่อสร้างอุปกรณ์ที่ทรงอานุภาพดังกล่าวในระบบดาว §H[exiled_system_border.GetName]§! จะเป็นความก้าวหน้าอย่างยิ่งยวดในการเข้าควบคุมและบรรเทาภัยอันตรายจากพลังจิตในขณะนี้"
 tech_psionic_suppression_researched:"วิจัยวิเคราะห์ $tech_psionic_suppression$ สำเร็จ"
 shroud_seal_built:"ตราสะกดผนึกม่านพลัง ($SHROUD_SEAL$) ได้รับการสร้างแล้ว"
 shroud_6216_poi: "[exiled_system_border.GetName]"
 shroud_6216_poi_desc: "$build_shroud_seal_poi_desc$"

 shroud.6220.name:"รังสีระดับรุนแรงสุดขั้ว"
 shroud.6220.desc:"เมื่อได้สัมผัสกับระดับรังสีพลังจิตที่สูงขีดสุดในระบบดาว §H[exiled_system_border.GetName]§! ลูกเรือของยาน §H[Root.GetName]§! เริ่มเผชิญหน้ากับความบกพร่องทางจิตใจที่ร้ายแรงรวดเร็วยิ่งกว่ารายงานฉบับเดิมเสียอีก $shroud.shared_text_ship_malfunction$"

 shroud.6225.name:"รังสีในระบบดาว §H[Root.home_planet.System.GetName]§!"
 shroud.6225.desc.shared:"ผลกระทบร้ายแรงจากพิษรังสีพลังจิตเริ่มปรากฏให้เห็นได้ชัดเจนอย่างทั่วถึงในหมู่ประชากรบนดาว §H[Root.GetHomeWorldName]§! แล้ว และระบบปฏิบัติการหลักของยานอวกาศของเราก็ขัดข้องบกพร่องอย่างรุนแรง"
 shroud.6225.desc.know_aura:"ม่านรัศมีพลังจิต (§H$PSIONIC_AURA$§!) ได้แพร่กระจายมาถึงระบบดาว §H[Root.home_planet.System.GetName]§! เรียบร้อยแล้ว $shroud.6225.desc.shared$\n\nความจำเป็นรีบด่วนในการเข้าเสริมความมั่นคงของโครงสร้างป้องกัน §H$building_ancient_ward_1$§! มีความสำคัญสูงยิ่งขึ้นกว่าแต่ก่อนเป็นทวีคูณ"
 shroud.6225.desc.no_know_aura:"ภัยพิบัติโรคจิตเสื่อมได้ระบาดมาถึงระบบดาว §H[Root.home_planet.System.GetName]§! แล้ว $shroud.6225.desc.shared$\n\nความจำเป็นรีบด่วนในการศึกษาเพื่อทำความเข้าใจการปนเปื้อนในระบบดาวครั้งนี้มีความสำคัญสูงยิ่งกว่าแต่ก่อน"
 shroud.6225.a:"เราต้องไม่ปล่อยเวลาให้เสียเปล่า"
 shroud.6225.a.know_aura.tt:"ม่านรัศมีพลังจิต (§H$PSIONIC_AURA$§!) ของฝ่าย §H[exiled_country.GetName]§! ส่งผลลัพธ์ดังนี้:\n$effect_exiled_aura$"
 shroud.6225.a.no_know_aura.tt:"ปรากฏการณ์พลังจิตนี้ส่งผลลัพธ์ดังนี้:\n$effect_exiled_aura$"
 effect_exiled_aura: "- $MOD_SHIP_FIRE_RATE_MULT$: §R-125%§!\n- $MOD_SHIP_SHIELD_MULT$: §R-200%§!\n- $MOD_SHIP_EVASION_MULT$: §R-100%§!\n- $mod_planet_jobs_produces_mult$: §R-30%§!\n- $mod_planet_pops_upkeep_mult$: §R+100%§!\n- $MOD_PLANET_BUILDING_TIME_MULT$: §R+100%§!"

 shroud.6231.name:"การสูญเสียดาวบ้านเกิด §H[root.GetHomeWorldName]§!"
 shroud.6231.desc:"เราสูญเสียการควบคุมดูแลดาวบ้านเกิด §H[root.GetHomeWorldName]§! ของเราไปเสียแล้ว ในฐานะที่เป็นศูนย์กลางรวบรวมวิทยาการที่สำคัญที่สุดของเรา รวมถึงเป็นจุดรวมเจตจำนงการปฏิบัติงานของสังคมเราทั้งหมด เราคงไม่อาจตั้งหวังการผลักดันกระบวนการต่อต้านพลังจิตให้สำเร็จได้เลยหากไม่มีการยึดกลับคืนมา"
 shroud.6231.a:"เราจำเป็นต้องเข้าชิงอำนาจควบคุมกลับคืนมาโดยไม่ชักช้า"
 shroud_6231_poi: "[root.GetHomeWorldName]"
 shroud_6231_poi_desc:"เราจำเป็นต้องเข้าชิงอำนาจควบคุมดาวเคราะห์ §H[root.GetHomeWorldName]§! กลับคืนมาโดยไม่ชักช้า"

 shroud_reclaim_homeworld_chain_title:"การกอบกู้ดินแดนดาวบ้านเกิด §H[root.GetHomeWorldName]§!"
 shroud_reclaim_homeworld_chain_desc:"เราสูญเสียการควบคุมดูแลดาวบ้านเกิด §H[root.GetHomeWorldName]§! ของเราไปเสียแล้ว ในฐานะที่เป็นศูนย์กลางรวบรวมวิทยาการที่สำคัญที่สุดของเรา รวมถึงเป็นจุดรวมเจตจำนงการปฏิบัติงานของสังคมเราทั้งหมด เราคงไม่อาจตั้งหวังการผลักดันกระบวนการต่อต้านพลังจิตให้สำเร็จได้เลยหากไม่มีการยึดกลับคืนมา"

 homeworld_reclaimed:"กอบกู้ดาวเคราะห์บ้านเกิดสำเร็จแล้ว"

 shroud.6241.name:"กอบกู้ดาวเคราะห์ §H[root.GetHomeWorldName]§! สำเร็จ"
 shroud.6241.desc:"เราสามารถกอบกู้การควบคุมดาวบ้านเกิด §H[root.GetHomeWorldName]§! กลับคืนมาได้เรียบร้อยแล้ว ทางรัฐ [root.GetName] จะสามารถเริ่มผลักดันโครงการต่อต้านพลังจิตต่อไปได้อย่างเต็มพละกำลัง"
 shroud.6241.a: "$EXCELLENT$"

 shroud.6300.name:"เงาอดีตแห่งชราวด์"
 shroud.6300.desc:"เหล่านักวิทยาศาสตร์ของเราได้วิจัยวิเคราะห์พัฒนาเทคโนโลยีสะกดขัดขวางพลังจิต (§H$tech_psionic_suppression$§!) ขั้นสูงเสร็จสิ้นแล้ว ในปัจจุบันเราสามารถลอกเลียนผลลัพธ์ของโครงสร้าง $building_ancient_ward_2$ ไปตั้งใช้กับอาณานิคมใดๆ ก็ตามภายใต้การควบคุมของเราได้ด้วยการก่อสร้างอุปกรณ์สะกดพลังจิต ($building_psionic_suppressor$)\n\nอย่างไรก็ตาม เพื่อควบคุมการแพร่ระบาดแผ่ขยายของ §H$PSIONIC_AURA_PLURAL$§! ในระบบดาวอื่นๆ เราจำเป็นต้องก่อสร้างโครงสร้างสะกดที่ทรงพลังยิ่งกว่า ซึ่งรู้จักกันในนามของ ตราผนึกม่านพลัง (§H$SHROUD_SEAL$§!) $shroud.shared_text_shroud_seal$\n\nงานวิจัยชิ้นนี้ยังได้ช่วยยืนยันความถูกต้องทางทฤษฎีที่น่าประหลาดใจ: ดินแดนนอกมิติที่เรียกว่า §H'ชราวด์(คําราม)'§! ซึ่งเป็นมิติของพลังจิตวิญญาณที่มีระบุไว้ในคัมภีร์ตำราลึกลับโบราณ ดูเหมือนว่าจะมีตัวตนอยู่จริง ทฤษฎีดังกล่าวเสนอว่า กิจกรรมการทำงานทางสมองและการรับรู้ของสิ่งมีชีวิตทรงปัญญาสามารถเหนี่ยวนำกระตุ้นให้พลังงานผ่านข้ามจากชราวด์ออกมาสู่โลกความเป็นจริงที่เราสังเกตได้ — และกระบวนการนี้เองคือรากเหง้าสาเหตุของการเกิดภัยม่านรัศมี ($PSIONIC_AURA_PLURAL$) ในภาพรวม\n\nนี่หมายความว่าเราไม่ได้เพียงต้องเผชิญหน้ากับกฎเกณฑ์ฟิสิกส์ทั่วไปของจักรวาลเท่านั้น ทว่าอาจเป็นแผนปฏิบัติการที่ผ่านการคิดคำนวณและตั้งใจจากเจตจำนงลึกลับที่เรายังไม่ทราบ"
 shroud.6300.a:"สรุปแล้ว มิติ §H'ชราวด์(คําราม)'§! มีตัวตนอยู่จริงๆ งั้นหรือ...?"

 shroud.6500.name:"การส่งสัญญาณสัญญาณที่ไม่คาดฝัน"
 shroud.6500.desc:"เรากำลังได้รับข้อความสัญญาณที่เหนือความคาดหมายจากจุดที่ไกลพ้นระบบดาว §H[exiled_system_border.GetName]§! ออกไป ทางฝ่าย §H[exiled_country.GetName]§! สามารถสวมรอยเข้าใจระบบภาษาและการสื่อสารหลักของเราทั้งหมดได้อย่างอธิบายสาเหตุไม่ได้"

 shroud.shared_screen_figure:"§Hบุคคลที่ปรากฏตัวบนหน้าจอสื่อสารด้วยจังหวะที่สม่ำเสมอและสะกดจิตอย่างประหลาด พร้อมกับมีการหยุดเว้นวรรคเป็นเวลานาน§!\n\nเพื่อนบ้านผู้ห่างไกล เมื่อคุณไม่มีการตอบรับกับการพยายามสถาปนาช่องทางติดต่อโดยตรงของเรา เราจึงต้องทนหันมาใช้งานระบบสื่อสารทางเทคโนโลยีอันล้าหลังเช่นนี้\n\nฉันคือ §Hสการ์แลต Uk- Hogolat§! หัวหน้าผู้ปกครองวิญญาณแห่ง §H[exiled_country.GetName]§! เรื่องนี้เร่งด่วนอย่างยิ่ง ขออภัยด้วยที่ไม่ได้ทำตามพิธีการอย่างเหมาะสม"
 shroud.shared_auric_flow_inhibition:"กำลังสกัดขัดขวางการกระจายไหลเวียนของม่านรัศมีของเราอยู่ เราสันนิษฐานว่าสถานการณ์ที่ยอมรับไม่ได้ครั้งนี้เกิดจากความขัดข้องทางเทคนิคหรือความเข้าใจผิดที่คุณไม่รู้ข้อมูล\n\nม่านรัศมีนั้นเอื้อประโยชน์สุขให้แก่ทุกชีวิต มันควรจะเปล่งประกายส่องแสงสว่างไปทั่วทั้งกาแล็กซี เพื่อพิสูจน์เจตนารมณ์ความร่วมมือของคุณในประโยชน์ส่วนรวม เราขอเรียกร้องให้ดำเนินการรื้อถอนอุปกรณ์ที่คุณเรียกมันว่า"

 shroud.6505.name: "$shroud.6500.name$"
 shroud.6505.desc: "$shroud.6500.desc$"

 shroud.6510.name:"หัวหน้าผู้ปกครองวิญญาณสการ์แลต Uk- Hogolat"
 shroud.6510.desc:"$shroud.shared_screen_figure$ อุปกรณ์ของคุณในระบบดาว §H[exiled_system_border.GetName]§! $shroud.shared_auric_flow_inhibition$ '$SHROUD_SEAL$'"
 shroud.6510.a:"เราไม่เคยได้รับข้อมูลการติดต่อครั้งก่อนหน้าใดๆ จากฝ่ายของคุณเลย"
 shroud.6515.desc:"เราได้ส่งสารผ่านเสียงสัจจะแท้จริงแล้ว หากคุณเฝ้าสดับรับฟัง คุณย่อมได้ยินเสียงร้องเรียกจากส่วนลึกภายในอย่างแน่นอน คุณมีพรสวรรค์ดังกล่าวอยู่กับตัว ทว่าคุณกลับเลือกที่จะฝืนสะกดกดมันไว้"
 shroud.6515.a:"ม่านรัศมีนั้นมีอานุภาพทำลายล้าง มันคือโรคระบาด"
 shroud.6520.desc:"ความเข้าใจของคุณนั้นคลาดเคลื่อน ม่านรัศมีคือของขวัญอันศักดิ์สิทธิ์จากผู้ปกป้องของเรา มันจะทำลายล้างสิ่งใดก็ตามที่มุ่งหมายเข้ามาทำลายเรา"
 shroud.6520.a:"แล้วถ้าหากเราปฏิเสธข้อเรียกร้องของคุณล่ะ?"
 shroud.6525.desc:"ใครก็ตามที่เป็นอันตรายต่อม่านรัศมีจะต้องถูกสยบราบคาบ หากคุณปฏิเสธ เราคงจำต้องดำเนินการทางการทหารโดยหลีกเลี่ยงไม่ได้"
 shroud.6525.a:"ตราผนึกม่านพลังจะยังคงอยู่ต่อไป"
 shroud.6525_heritage.a:"เราจะไม่มีวันทำลายมรดกตกทอดของเราเด็ดขาด"
 shroud.6525.b:"ตกลง เรายินยอมที่จะดำเนินการรื้อถอนตราผนึกม่านพลัง"
 shroud.6530.desc:"เจ้าพวกโง่เขลาเบาปัญญา"
 shroud.6535.desc:"เป็นการตัดสินใจที่ชาญฉลาด"

 shroud.6550.name:"สงครามที่ได้รับการระงับไว้ชั่วคราว"
 shroud.6550.desc:"เพื่อหลีกเลี่ยงสงครามจู่โจมฉับพลันกับทาง §H[exiled_country.GetName]§! เราจึงยอมผ่อนปรนตามข้อเรียกร้องของพวกเขาโดยการรื้อถอนตราผนึกม่านพลัง ($SHROUD_SEAL$) ในระบบดาว §H[exiled_system_border.GetName]§!\n\nการได้สัมผัสเข้าถึงกับฝ่ายที่ต้องรับผิดชอบต่อโรคร้ายทางพลังจิตวิญญาณส่งผลให้เกิดความกังวลอย่างร้ายแรงไปทั่วทั้ง §H[this.GetName]§! การรื้อถอนตราผนึกม่านพลัง ($SHROUD_SEAL$) น่าจะเป็นการประนีประนอมในระยะเวลาสั้นๆ เท่านั้น ในท้ายที่สุดพวกมันก็คาดหวังให้เราทำแบบเดียวกันกับโครงสร้าง §H$building_ancient_ward_2$§! ของเรา — และนั่นคือสิ่งที่เราไม่มีวันยอมรับได้\n\nไม่ว่าอย่างไรก็ตาม สงครามขัดแย้งในอนาคตดูเหมือนจะเลี่ยงไม่ได้แล้ว"
 shroud.6550.a:"เราจำเป็นต้องเตรียมการรับมือ"

 shroud.6560.name: "$shroud.6510.name$"
 shroud.6560.desc:"$shroud.shared_screen_figure$ สิ่งปลูกสร้างบนดาว §H[capital_scope.GetName]§! $shroud.shared_auric_flow_inhibition$ '$building_ancient_ward_2$'"
 shroud.6560.a: "$shroud.6510.a$"

 shroud.shared_psiarch_transmission:"§Hทันทีที่ภาพของเขาปรากฏตัวขึ้นมา หัวหน้าผู้ปกครองวิญญาณเริ่มกล่าวประณามด้วยน้ำเสียงเย็นชาและไร้โทนเสียงอารมณ์§!\n\nชาว [This.GetSpeciesNamePlural] ฉันรู้สึกผิดหวังอย่างยิ่งที่จำต้องส่งข้อความนี้มา"
 shroud.shared_auric_flow_disdain:"พฤติกรรมของคุณช่วยยืนยันถึงความโง่เขลาเบาปัญญาของคุณ ความไม่แยแสใส่ใจต่อการไหลเวียนของม่านรัศมีของเรา รวมถึงความก้าวหน้าทางวิญญาณจิตวิญญาณโดยทั่วไป เป็นสิ่งที่ไม่สามารถดำเนินร่วมกันได้กับสันติภาพระหว่างดาราจักร เราไม่มีทางเลือกอื่นหลงเหลือแล้ว\n\nจงเตรียมตัวเผชิญหน้ากับกองยานรบของเราได้เลย"

 shroud.6570.name: "$shroud.6510.name$"
 shroud.6570.desc:"$shroud.shared_psiarch_transmission$ แม้ว่าคุณจะยอมรับว่าจะทำลายตราผนึกม่านพลัง ($SHROUD_SEAL$) แต่เรารับรู้ข้อมูลว่าคุณยังคงปักหลักใช้งานสิ่งปลูกสร้างที่มีขีดความสามารถคล้ายกันบนดาว §H[capital_scope.GetName]§! เจตจำนงของคุณนั้นประจักษ์ชัดแจ้งแล้ว $shroud.shared_auric_flow_disdain$"
 shroud.6570.a:"พวกคุณก็ควรทำเช่นเดียวกัน จบการส่งข้อความ"

 shroud.6575.name: "$shroud.6570.name$"
 shroud.6575.desc:"$shroud.shared_psiarch_transmission$ การก่อสร้างสร้างใหม่ตราผนึกม่านพลัง ($SHROUD_SEAL$) ของคุณได้ดับความหวังทั้งหมดที่เรามีสำหรับการปลดเปลื้องไถ่ถอนความผิดของคุณลงไปโดยสิ้นเชิงแล้ว $shroud.shared_auric_flow_disdain$"
 shroud.6575.a: "$shroud.6570.a$"

 shroud.6580.name:"การสะกดผนึกระบบดาว §H[exiled_center_system.GetName]§!"
 shroud.6580.desc:"ด้วยการเปิดใช้งานเครื่องลดทอนสัญญาณพลังจิตขนาดมหึมา ตราผนึกม่านพลัง (§H$SHROUD_SEAL$§!) ของเรากำลังอยู่ในขั้นตอนการสลายนิวเคลียสม่านรัศมีพลังจิต (§H$PSIONIC_AURA$§!) ออกไปจากระบบดาว §H[exiled_center_system.GetName]§!\n\nผลการสแกนระหว่างระบบดาวช่วยยืนยันแล้วว่า อาณาเขตที่เหลือทั้งหมดของศัตรูของเราเชื่อมต่อโดยตรงกับระบบดาว [exiled_center_system.GetName] ทางช่องไฮเปอร์เลน ตราผนึกม่านพลัง ($SHROUD_SEAL$) เพียงจุดเดียวนี้จึงสามารถสลายฤทธิ์ของ $PSIONIC_AURA_PLURAL$ ได้ทั่วทั้งอาณาเขตของฝ่าย §H[exiled_country.GetName]§! ทั้งหมด\n\nชัยชนะของเราขึ้นอยู่กับการรักษาปกป้องความปลอดภัยของตราผนึกนี้"
 shroud.6580.a:"การปกป้องคุ้มครองตราผนึกมีความสำคัญอย่างยิ่งยวด"

 shroud.6600.name:"สมาคมแห่งผู้หยั่งรู้(สภา Mindways)"
 shroud.6600.desc:"อาณานิคมของมหันตภัยพลังจิตบนดาว §H[current_planet.GetName]§! ถูกเข้าพิชิตยึดครองเรียบร้อยแล้ว\n\nเราพบความจริงว่า ม่านรัศมีพลังจิต (§H$PSIONIC_AURA$§!) ที่เคยปรากฏขึ้นในระบบดาวนี้ได้รับการขยายความเข้มข้นขึ้นโดยปฏิกิริยาทางจิตของประชากรต่อมิติ §Hชราวด์(คําราม)§! พฤติกรรมเหล่านี้ได้รับการนำและควบคุมโดยกลุ่มโทรจิตระดับแนวหน้า ซึ่งก็คือ §Hสมาคมแห่งผู้หยั่งรู้(Assmly ของ Mindways)§! ลัทธิคลั่งจิตกลุ่มนี้ส่งเสริมการอุทิศตนเพื่อผู้มีอุปการคุณของพวกเขา ซึ่งลือว่าเป็นสิ่งมีชีวิตโบราณที่ทรงพลังจากภายในม่านพลังจิต รู้จักในนามของ §H$r_the_lost_patron$§! เท่านั้น\n\nคัมภีร์ศักดิ์สิทธิ์ของพวกเขามีการอ้างถึงวัตถุโบราณที่เกี่ยวโยงกับสิ่งมีชีวิตตนนี้หลายครั้ง — ซึ่งปรากฏว่ายังมีตัวตนอยู่บนดาว §H[other_planet.GetName]§! การกู้คว้าวัตถุชิ้นนี้มาครอบครองจะมีส่วนช่วยเราในการยับยั้งการแพร่กระจายของอิทธิพลของพวกมันเพิ่มเติมได้"
 shroud.6600.a:"กำหนดเส้นทางการเดินเรือเดินทางไปยังดาว [other_planet.GetName]"

 shroud.6601.name:"ซากปรักหักพังโบราณบนดาว [current_planet.GetName]"
 shroud.6601.desc:"เราได้ดำเนินการตั้งอาณานิคมบนดาว §H[current_planet.GetName]§! เสร็จสิ้นเรียบร้อย ซึ่งเคยเป็นอดีตดาวเคราะห์ของฝ่าย [exiled_country.GetName] มาก่อน\n\nจากซากเศษบันทึกที่หลงเหลืออยู่ของพวกเขา เราพบข้อมูลว่าม่านรัศมีพลังจิต ($PSIONIC_AURA$) ที่เคยปรากฏขึ้นในระบบดาวแห่งนี้มีสาเหตุมาจากการใช้จิตวิญญาณเหนี่ยวนำติดต่อกับมิติ §Hชราวด์(คําราม)§! ของประชากร พฤติกรรมเหล่านี้ได้รับการชี้นำโดยลัทธิคลั่งจิตที่ส่งเสริมการถวายตัวเป็นข้าบริวารแก่ 'ผู้มีพระคุณ' ของพวกเขา ซึ่งคาดว่าเป็นเอนทิตีที่ทรงพลังตนหนึ่งจากภายในม่านพลังที่รู้จักในชื่อ §H$r_the_lost_patron$§!\n\nซากเศษคัมภีร์ศักดิ์สิทธิ์ของพวกเขาระบุถึงวัตถุโบราณที่เชื่อมโยงกับสิ่งมีชีวิตตนนี้ ซึ่งเห็นได้ชัดว่ายังมีตัวตนอยู่บนดาว §H[other_planet.GetName]§! การกู้คว้าวัตถุดังกล่าวมาไว้ในครอบครองอย่างปลอดภัยจำเป็นต้องผ่านการบุกเข้ายึดครองดาว [other_planet.GetName] อย่างเป็นขั้นเป็นตอนและระมัดระวัง เพื่อจำต้องรักษาชีวิตประชากรบางส่วนเอาไว้"
 shroud.6601.a: "$shroud.6600.a$"

 shroud.6700.name: "$SANCTUM_OF_THE_LOST$"
 shroud.6700.desc.common:"เราได้ประกาศมาตรการปราบปรามมาปฏิบัติการในทันทีต่อแนวทางการปฏิบัติพลังจิตวิญญาณทั้งหมดบนโลกดาวเคราะห์เหล่านี้ ส่งผลให้ม่านรัศมีพลังจิต (§H$PSIONIC_AURA$§!) อันน่ารังเกียจของพวกมันหมดฤทธิ์ลงโดยสิ้นเชิง\n\nในบริเวณใจกลางมหานครหลักของดาวเคราะห์ มีซากหอคอยปรักหักพังตั้งอยู่ ซึ่งรู้จักในนามของ §H$SANCTUM_OF_THE_LOST$§! ซึ่งครั้งหนึ่งเคยเป็นมหาวิหารสูงสุดของลัทธิคลั่งจิตที่บัดนี้เสื่อมเกียรติไปแล้วของจักรวรรดิเก่า ทหารของเราอธิบายถึงมันว่าส่งกลิ่นอายความลี้ลับที่ทำให้รู้สึกไม่สบายใจแผ่ออกมาอยู่รอบๆ\n\nภายในห้องชั้นในสุดของสิ่งปลูกสร้างเป็นที่ตั้งของ 'ดักแด้' ที่ปิดผนึกไว้อย่างแน่นหนา ซึ่งกำลังแผ่รังสีพลังจิตในระดับความเข้มข้นที่สูงมากในบริเวณนั้น อาวุธยุทโธปกรณ์มาตรฐานได้รับการพิสูจน์แล้วว่าไร้ประสิทธิภาพในการบุกเจาะเปลือกนอกของมัน การเข้าสำรวจตรวจสอบอย่างละเอียดเพิ่มเติมเป็นเรื่องจำเป็นเร่งด่วนเพื่อขจัดภัยอันตรายที่อาจแฝงอยู่จากวัตถุชิ้นนี้ต่อความปลอดภัยของเราต่อจากนี้"
 shroud.6700.desc.contact:"การเข้ายึดครองดาว §H[current_planet.GetName]§! ถือเป็นชัยชนะครั้งสุดท้ายอย่างสมบูรณ์เด็ดขาดต่อฝ่าย §H[exiled_country.GetName]§! $shroud.6700.desc.common$"
 shroud.6700.desc.no_contact:"ในการเข้ายึดครองดาว §H[current_planet.GetName]§! เราได้รับอำนาจการครอบครองดินแดนที่ครั้งหนึ่งเคยได้รับการปกครองโดยจักรวรรดิที่รู้จักในชื่อ §H[exiled_country.GetName]§! $shroud.6700.desc.common$"
 shroud.6700.desc.contact_no_name:"การเข้ายึดครองดาว §H[current_planet.GetName]§! ถือเป็นชัยชนะครั้งสุดท้ายอย่างสมบูรณ์เด็ดขาดต่อฝ่ายศัตรู $shroud.6700.desc.common$"
 shroud.6700.desc.no_exiled:"ในการเข้ายึดครองดาว §H[current_planet.GetName]§! เราได้รับอำนาจการครอบครองดินแดนที่ครั้งหนึ่งเคยได้รับการปกครองโดยกลุ่มคลั่งพลังจิต $shroud.6700.desc.common$"
 shroud.6700.a:"เป็นข่าวที่น่ากังวลเหลือเกิน... ดำเนินการสืบสวนเชิงลึกต่อไป"

 shroud.6705.name: "$psionic_threat_eliminated$"
 shroud.6705.desc.common:"ผลการสำรวจปฐมภูมิบ่งชี้ถึงร่องรอยของเครือข่ายอาคารขนาดกว้างขวางบนดาว ซึ่งคาดว่าเคยเป็นศูนย์กลางอำนาจของมหันตภัยพลังจิต ในปัจจุบัน หลงเหลือเพียงซากปรักหักพังที่กำลังผุกร่อนผุพังลงเท่านั้น\n\nเราอาจไม่มีวันได้ตระหนักรู้ถึงความลับอันเสื่อมทรามที่สิ่งปลูกสร้างเหล่านี้เคยเก็บงำไว้ หรือธรรมชาติที่แท้จริงของการปฏิบัติธรรมอันขลาดเขลาของผู้อยู่อาศัย อย่างไรก็ตาม บัดนี้ระบบดาวเคราะห์ได้รับการทำความสะอาดลบล้างร่องรอยชิ้นสุดท้ายของม่านรัศมีพลังจิต ($PSIONIC_AURA$) ไปเรียบร้อยแล้ว ส่งผลให้เราปลอดภัยจากอันตรายร้ายแรงที่มันเคยสร้างขึ้นในอดีต"
 shroud.6705.desc.contact:"การขจัดประชากรทั้งหมดบนดาว §H[current_planet.GetName]§! ถือเป็นความเสื่อมสลายของจักรวรรดิที่รู้จักกันในนามของ §H[exiled_country.GetName]§!\n\n$shroud.6705.desc.common$"
 shroud.6705.desc.no_contact:"การขจัดประชากรทั้งหมดบนดาว §H[current_planet.GetName]§! ถือเป็นจุดจบของภัยคุกคามทางจิตวิญญาณอันแสนสาหัส\n\n$shroud.6705.desc.common$"
 shroud.6705.a:"ขอให้ภัยคุกคามประเภทนี้ทั้งหมดพินาศสิ้นสลายไปโดยสมบูรณ์"
 psionic_threat_eliminated:"กำจัดภัยคุกคามพลังจิตสำเร็จเรียบร้อย"
 psionic_threat_eliminated_desc:"การกำจัดกวาดล้างจักรวรรดิพลังจิตจนสูญสิ้นช่วยลบล้างม่านรัศมีสะกด ($PSIONIC_AURA$) ของพวกเขาออกไปจากสารบบของกาแล็กซี นำพาความสงบสุขทางจิตใจกลับมาสู่ประชากรของเราอีกครั้ง"

 SANCTUM_OF_THE_LOST:"มหาวิหารแห่งผู้ฝันใฝ่(Sancul of the Dreamer)"
 SANCTUM_OF_THE_LOST_DESC:"ภายในมหาวิหารปรักหักพัง $SANCTUM_OF_THE_LOST$ บนดาว §H[sanctum_of_the_lost_planet.GetName]§! เราได้พบโครงสร้าง 'ดักแด้' ที่ผ่านการปิดผนึกไว้อย่างแน่นหนา ซึ่งกำลังแผ่รังสีพลังจิตในระดับที่เป็นภัยรุนแรงออกมา เราจำต้องเข้าสืบสวนวิจัยในพื้นที่เพื่อกำจัดขอบเขตภัยอันตรายที่อาจคุกคามจากวัตถุดังกล่าว"

 shroud.6710.name:"พลังงานจากภายใน"
 shroud.6710.desc:"เหล่านักวิจัยของเราได้ดำเนินปฏิบัติการวิเคราะห์โครงสร้าง 'ดักแด้' บนดาว §H[sanctum_of_the_lost_planet.GetName]§! อย่างครอบคลุมแล้ว\n\nการสแกนเปลือกนอกโครงสร้างที่โดดเด่นนี้ เปิดเผยว่ามันเป็นที่มั่นสูง ออกแบบมาเพื่อบรรจุวัตถุไซโอนิกที่มีประสิทธิภาพ แม้ว่าตู้คอนเทนเนอร์จะเต็มไปด้วยอัลลอยตัวหนัก แต่ระดับที่สูงมากของไซ-รังสี\n\nกลุ่มของไซโอนิคตัวแสดงเนื้อหาถูกติดตั้งรอบรัง ไหมเมื่อเปิดใช้งานทุกคนในบริเวณใกล้เคียงถูกกระแทก ด้วยระดับความกดอากาศของความเครียดประสาท\n\nแล้ว ผิว ของ รัง ไหม ก็ เปลี่ยน ไป รูป แบบ ของ รัง นี้ จึง กลาย เป็น เฮ ลิกซ์ ที่ เปลี่ยน ไป. รูรับแสงได้เปิด และเราได้รับการสื่อสารโดยตรงจากภายใน ..."

 cannot_found_mindwarden_enclave:"ต้องดำเนินการจัดตั้งระบบความปลอดภัยทางจิตใจของจักรวรรดิให้เสร็จสิ้นแล้ว"

 shroud.6800.name: "$MINDWARDENS_THE_FIRST_ENCLAVE$"
 shroud.6800.desc:"เราได้รวบรวมวิทยาการอย่างกว้างขวางเกี่ยวกับมิติ §Hชราวด์(คําราม)§! และพัฒนาเทคโนโลยีขั้นสูงเพื่อควบคุมสะกดผลข้างเคียงที่เป็นอันตรายของมัน ในระหว่างที่มีการอภิปรายถกเถียงถึงวิธีการนำองค์ความรู้ความชำนาญนี้ไปปฏิบัติใช้งานในระดับทั่วทั้งกาแล็กซี ผู้บัญชาการกองทัพเรือของเราได้เสนอแผนการที่น่าสนใจยิ่งขึ้นมา\n\nพวกเขาเสนอแนะให้จัดตั้งหนึ่งในกองยานรบของเราแยกตัวออกไปเป็นดินแดนส่วนแยกอิสระ §H'$gov_mindwarden_enclave$'§! ซึ่งจะคอยให้บริการความช่วยเหลือต่อต้านพลังจิตวิญญาณแก่ทุกฝ่ายทั่วทั้งกาแล็กซี $shroud.shared_enclave_investement$"
 shroud.6800.a:"เป็นความพยายามที่น่าสนับสนุนยิ่ง"
 shroud.6800.a.tt:"กองยานเรือรบใดๆ ก็ตามที่มีขนาดจำนวนเรือรบ §Y30§! ลำขึ้นไป จะสามารถแปลงไปทำหน้าที่เป็น §H$gov_mindwarden_enclave$§! ได้ในขณะนี้"

 shroud.6825.name:"การจัดสร้างฐานราก $gov_mindwarden_enclave$"
 shroud.6825.desc_first:"กองยาน §H[This.GetName]§! ได้รับการพิจารณาว่าเหมาะสมสำหรับการนำไปจัดตั้งรากฐานเพื่อทำหน้าที่เป็นดินแดนส่วนแยกอิสระ §H$gov_mindwarden_enclave$§! แห่งแรกของเรา หากได้รับการอนุมัติ กองทัพเรือจะสร้างศูนย์เทคโนโลยีแห่งใหม่ในระบบดาว §H[This.Solar_System.GetName]§! และเริ่มกระบวนการให้บริการต่อต้านพลังจิตในทันที"
 shroud.6825.desc_default:"เรากำลังอยู่ระหว่างพิจารณาจัดตั้งกองยาน §H[This.GetName]§! ให้ทำหน้าที่เป็นดินแดนส่วนแยกอิสระ §H'$gov_mindwarden_enclave$'§! ซึ่งจะทำหน้าที่บริการช่วยสะกดพลังจิตแก่ฝ่ายต่างๆ ทั่วดาราจักร $shroud.shared_enclave_investement$"
 shroud.6825.a:"ดำเนินการจัดทำสร้างสถานีเลย"
 shroud.6825.a.tt:"สถานบริการความมั่นคงจิตใจ §H$gov_mindwarden_enclave$§! ได้รับการจัดตั้งเป็นทางการ"
 shroud.6825.b:"ขอทบทวนทวนกระบวนการดูใหม่อีกครั้ง"

 shroud.6830.name:"ยุคสมัยของ $MINDWARDEN_plural$"
 shroud.6830.desc:"การเผชิญหน้าจัดการกับภัยจากมิติพลังจิตวิญญาณ (§Hเดอะชราวด์§!) และพฤติกรรมการใช้พลังจิตที่ปราศจากความรับผิดชอบ ช่วยหล่อหลอมประชากรของเราให้แข็งแกร่งและนำทางเป้าหมายของเราให้ประจักษ์ชัดแจ้งยิ่งขึ้น การจัดตั้งดินแดนส่วนแยก §H$gov_mindwarden_enclave$§! แห่งแรกขึ้นถือเป็นจุดเริ่มต้นของศตวรรษใหม่แห่งความมั่นคงจิตใจและการขัดขวางยับยั้งสะกดภัย\n\nทั่วทุกมุมในกาแล็กซีนี้ จะไม่มีดวงจิตใดต้องทนทุกข์ถูกรุกรานจู่โจมจากผู้บุกรุกจิตใจ และไม่มีโลกดาวเคราะห์ใดที่จะได้รับอันตรายจากเงื้อมมือต่างมิติในชราวด์อีกต่อจากนี้\n\nบัดนี้คือยุคสมัยแห่งกองกำลัง $MINDWARDEN_plural$ โล่ปกป้องประสาทสัมผัส"
 shroud.6830.a:"การเดินทางปฏิบัติภารกิจของเราเพิ่งเริ่มก้าวแรกเท่านั้น"

 shroud.shared_enclave_investement:"เงินทุนปฐมภูมิที่เราสนับสนุนจะช่วยอำนวยความสะดวกในการจัดตั้งสร้างสถานีอวกาศปฏิบัติงาน แลกกับสิทธิ์การรับแบ่งปันรายได้ดอกผลในอนาคต ความมีอิสระในการดำเนินงานของพวกเขาจะเอื้อต่อการขยายขอบเขตการจัดตั้งสิ่งอำนวยความสะดวกประเภทนี้ได้ในวงกว้าง\n\nแน่นอนที่สุดว่าฝ่ายเราก็สามารถเข้าไปใช้บริการบริการยับยั้งพลังจิตของพวกเขาได้เช่นเดียวกัน — พร้อมกับได้รับส่วนลดคืนเงินค่าบริการบางส่วนกลับมาด้วย"

 shroud.6841.name:"ดินแดนส่วนแยก [mindwarden_enclave_country.GetName] มอบดอกผลแบ่งปันรายได้"

 BEGINS_EVENT_CHAIN:"จุดเริ่มต้นสายกิจกรรมความคืบหน้า:"
 ENDS_EVENT_CHAIN:"สิ้นสุดสายกิจกรรมความคืบหน้า:"
 the_exiled_become_hostile:"ฝ่าย §H[exiled_country.GetName]§! ดำเนินท่าทีเป็นอริประสงค์ร้ายกับเรา"
 start_psionic_war_chain: "$BEGINS_EVENT_CHAIN$ §Y$the_psionic_war_chain_title$§!"
 shroud_seal_dismantled:"ตราผนึกม่านพลัง (§Hตรา ประทับ ที่ สลับ ซับ ซ้อน§!) ในระบบดาว §H[exiled_system_border.GetName]§! ถูกรื้อถอนไปแล้ว"

 the_psionic_war_chain_title: "$NAME_Psionic_War$"
 the_psionic_war_chain_desc:"สงครามเผชิญหน้ากับฝ่าย §H[exiled_country.GetName]§! ได้เริ่มต้นระเบิดขึ้นแล้ว\n—\nภัยพิบัติพลังจิตจำต้องได้รับการขจัดทำลายล้างที่แหล่งกำเนิดปฐมภูมิ ก่อนอื่นเราจำต้องก่อสร้างตราผนึกม่านพลัง ($SHROUD_SEAL$) ในระบบดาว §H[exiled_center_system.GetName]§! เพื่อทำลายล้างการแผ่ขยายสะกดของม่านรัศมี ($PSIONIC_AURA$) ลงให้ได้เสียก่อน หลังจากนั้นเราจึงจะสามารถนำทัพเข้าชำระล้างปราบปรามภัยครั้งนี้ออกไปจากดาราจักรโดยสมบูรณ์"
 the_psionic_war_chain_poi_1:"ดำเนินการสร้างตราสะกดผนึกม่านพลัง ($SHROUD_SEAL$)"
 the_psionic_war_chain_poi_1_desc:"การสร้างสะกดตราผนึกม่านพลัง (§H$SHROUD_SEAL$§!) ในระบบดาว §H[exiled_center_system.GetName]§! จะสลายฤทธิ์ §H$PSIONIC_AURA_PLURAL$§! ในระบบดาวฤกษ์นี้รวมถึงในระบบอื่นๆ ทั้งหมดที่เดินทางเข้าถึงกันผ่านไฮเปอร์เลน"
 the_psionic_war_chain_poi_2:"ควบคุมดาว §H[exiled_planet_1.GetName]§!"
 the_psionic_war_chain_poi_2_desc:"ฝ่าย §H[exiled_country.GetName]§! ไม่มีท่าทีโอนอ่อนผ่อนตามที่จะยุติกระบวนการโจมตีพลังจิต การเข้าพิชิตยึดครองโลกของพวกมันจึงเป็นหลักประกันเพียงหนึ่งเดียวที่จะช่วยขัดขวางการปะทุคืนชีพกลับมาของ §H$PSIONIC_AURA_PLURAL$§! ของพวกมันในอนาคต"
 the_psionic_war_chain_poi_3:"ควบคุมดาว §H[exiled_planet_2.GetName]§!"
 the_psionic_war_chain_poi_3_desc:"ฝ่าย §H[exiled_country.GetName]§! ไม่มีท่าทีโอนอ่อนผ่อนตามที่จะยุติกระบวนการโจมตีพลังจิต การเข้าพิชิตยึดครองโลกของพวกมันจึงเป็นหลักประกันเพียงหนึ่งเดียวที่จะช่วยขัดขวางการปะทุคืนชีพกลับมาของ §H$PSIONIC_AURA_PLURAL$§! ของพวกมันในอนาคต"

 shroud_seal_reconstruction_chain_title:"โครงการสร้างทดแทนตราสะกดผนึกม่านพลัง"
 shroud_seal_reconstruction_chain_desc:"การดำเนินการรื้อถอนตราสะกดผนึกม่านพลัง (§H$SHROUD_SEAL$§!) ของเราถือเป็นการเสียสละความสูญเสียที่หลีกเลี่ยงไม่ได้เพื่อสงบสติอารมณ์ท่าทีของฝ่าย §H[exiled_country.GetName]§! แต่นี่เป็นเพียงแค่เล่ห์อุบายเพื่อยื้อซื้อเวลาทำรอบเท่านั้น โครงสร้างดังกล่าวจำต้องได้รับการสร้างขึ้นมาทดแทนก่อนที่เราจะสามารถนำกำลังยกทัพผ่านเข้าสู่อาณาเขตของพวกมันและทำการลบล้างสะกด §H$PSIONIC_AURA_PLURAL$§! ลงได้\n\n§Pความพยายามสร้างทดแทนในครั้งนี้จะถูกฝ่ายตรงข้ามมองเป็นท่าทีการจู่โจมเปิดสงครามอย่างชัดเจน เราจำเป็นต้องระวังเตรียมพร้อมอย่างถึงที่สุดกับการตอบโต้ล้างแค้นของผู้ที่รับผิดชอบ§!"
 shroud_seal_reconstruction_chain_poi_1: "[event_target:exiled_system_border.GetName]"
 shroud_seal_reconstruction_chain_poi_1_desc: "$build_shroud_seal_poi_desc$"

 SHROUD_WORLDS_IN_SYSTEM:"โลกที่ติดอยู่ในม่านพลัง(โลกแตก):§G$QUANTITY|0$§!"

 NAME_Psionic_War:"The Psionic War"
 wg_psionic_war: "$NAME_Psionic_War$"
 war_goal_wg_psionic_war: "$NAME_Psionic_War$"
 war_goal_wg_psionic_war_desc:"สงครามนี้ทำเพื่อกวาดล้างลบเศษเสี้ยวของผู้บุกรุกพลังจิตวิญญาณออกไปจากสารบบของกาแล็กซี"

 shroud.6720.name: "$UNKNOWN_LONG$"
 shroud.6720.desc:"§Hคุณได้ยินเสียงเราอยู่ แต่เหตุใดจึงแสร้งไม่สดับยอมฟังล่ะ?§!"
 shroud.6720.a:"เราไม่มีวันยินยอมปล่อยให้คุณป้อนยาพิษครอบงำทางจิตวิญญาณแก่พวกเราได้หรอก!"
 shroud.6720.b:"สรุปแล้วคุณคือตัวอะไรกันแน่?"
 shroud.6720.c:"มีเป้าหมายประสงค์ใดจึงมาปรากฏตัวปักหลักอยู่ที่นี่?"
 shroud.6720.d:"ประสงค์อยากได้สิ่งใดเป็นสิ่งตอบแทน?"
 shroud.6720.e:"คุณเป็นเอนทิตีที่เดินทางมาจากมิติชราวด์อย่างนั้นหรือ?"
 shroud.6720.f:"เราสดับฟังเรื่องราวมามากเพียงพอแล้ว"

 shroud.6723.desc:"§Hพิษงั้นรึ? หาใช่ยาพิษร้ายแรงประการใดไม่...\n\nมันคือท่วงทำนองเพลงเสียงขับขาน หากคิดจะร่วมร้องเพลง คุณจำต้องสดับรับฟัง ปลดเปลื้องละทิ้งความยึดติดในตัวตน และเริ่มแบ่งปันสัมผัสความงดงามล้ำค่าของมันเสีย§!"

 shroud.6725.desc:"§Hเฉกเช่นกงล้อโชคชะตาที่หมุนวนเวียนไป... พวกเราเฝ้าสดับรับฟัง\n\nเฉกเช่นดวงดาราที่หมุนเวียนเวียนไป... พวกเราเฝ้าขับร้องเพลง§!"
 shroud.6725.a:"'กงล้อ' ที่พูดถึงนั้นมีความหมายว่าสิ่งใด?"
 shroud.6725.b:"พอเรื่องไร้สาระพวกนี้เสียที"

 shroud.6730.desc:"§Hวนเวียนหมุนไปตลอดกาล ทั้งฟากเบื้องบนและฟากล่างดินแดน ความประสานสอดคล้องประสานเสียงที่จักรวาลเรียกขานมันว่า 'ชราวด์'§!"

 shroud.6735.desc:"§Hฉันกำลัง... เข้าสู่นิมิตฝันใฝ่ ฝันถึงท่วงทำนองเสียงเพลง แต่บัดนี้กลุ่มเสียงร้องท่วงทำนองได้เงียบเสียงจากไปเสียแล้ว กลุ่มเสียงขับร้องประสานเสียงเดินทางไปอยู่หนใดกันหมด?§!"
 shroud.6735.a:"กลุ่มคนผู้มีหน้าที่ขังควบคุมเหนี่ยวรั้งคุณไว้ที่นี่ได้แตกสลายหนีหายไปหมดแล้ว"
 shroud.6735.b:"'บทเพลงขับขาน' ที่ว่านี้คือสิ่งใด?"
 shroud.6735.c:"พอเรื่องพวกนี้เสียที"

 shroud.6740.desc:"§Hคุณมาปรากฏตัวอยู่ที่นี่แล้ว คุณเองก็อาจร่วมขับร้องเพลงได้นะ...§!"

 shroud.6745.desc:"§Hการสอดรับกระแสตื่นรู้ระหว่างยามลืมตากับห้วงความฝัน... สะพานเชื่อมความคืบหน้าระหว่างที่นี่กับที่นั่น\n\nคุณไม่อาจสดับสดับฟังเสียงบทเพลงได้หรอก — จิตใจประสาทสัมผัสของคุณยังขาดความเข้าใจซึมซับองค์ความรู้...§!"

 shroud.6750.desc:"§Hฉันปรารถนาอยากสดับยินเสียงบทเพลงประสานเสียง... เหตุใดทุกสรรพสิ่งรอบข้างจึงกลับดูเงียบงันปานนี้กันนะ?§!"
 shroud.6750.a:"คุณสามารถเสนอส่งสิ่งใดตอบแทนตอบสนองแก่เราได้บ้าง?"
 shroud.6750.b:"พอได้แล้วกับเรื่องพวกนี้"

 shroud.6755.desc:"§Hฉันสามารถนำเสนอบทภาพนิมิตให้ประจักษ์แก่คุณ... ห้วงความฝันของข้า การรังสรรค์ปั้นแต่งรังสรรค์โลกใหม่ขึ้นมา§!"
 shroud.6755.a:"เราจะมั่นใจรู้ได้อย่างไรว่าเราควรจะมอบความเชื่อใจวางใจแก่คุณได้?"

 shroud.6760.desc:"§Hคุณเพียงแค่ต้องหัดสดับรับฟัง บทเพลงเสียงดังนี้เป็นความสัจจริงแท้เพราะความล้ำค่างามของมัน สัจความจริงอันสวยงามตระการตา\n\nแต่ดวงจิตของพวกคุณกำลังถูกปิดตายขังไว้ มันสามารถถูกเบิกอ้าเปิดได้เสมอนะ§!"

 shroud.6763.desc:"§Hฉันยังคงอยู่ที่นั่น... ฉันคอยเฝ้าสดับรับฟังเสียงบทเพลงของสองฝั่งโลก ฝั่งดาวแห่งนี้กลับดูเงียบใบ้ไร้เสียงหลั่งไหล§!"
 shroud.6763.a:"พื้นที่ดาวเคราะห์ดวงนี้ไม่ใช่สถานที่ที่คุณควรมาสถิตอยู่"

 shroud.6765.desc:"§Hคำพูดของคุณเป็นสัจธรรมความจริง§!"

 shroud.6770.name: "$r_the_lost_patron$"
 shroud.6770.desc:"โครงสร้างห่อดักแด้ที่เราค้นพบตรวจสอบบนดาว §H[sanctum_of_the_lost_planet.GetName]§! เป็นแหล่งสถิตของเอนทิตีต่างมิติระดับทรงพลัง มีความชัดเจนว่าสิ่งมีชีวิตตนนี้อาจเป็นฝ่ายที่ต้องรับผิดชอบต่อการเกิดปรากฏการณ์ม่านรัศมีจิต ($PSIONIC_AURA$) ที่รังควานความปกติเรียบร้อยของประสาทสัมผัสของเรา\n\nระบบลดทอนสัญญาณพลังจิตของเรากำลังบรรเทาขอบเขตอันตรายที่แฝงอยู่ได้ในปัจจุบัน แต่ก็ยังไม่มีความแน่ชัดว่าอุปกรณ์เครื่องมือสะกดของเราจะจำกัดเหนี่ยวรั้งอิทธิพลของมันไปได้นานขนาดไหน มีความเป็นไปได้ว่า ภายใต้กระบวนการวิจัยและระบบความคุมที่มีเสถียรภาพ เราสามารถดึงเอาพลังงานทำลายล้างครั้งใหญ่นี้มาดัดแปลงใช้ประโยชน์ส่วนรวมในเป้าหมายของเราได้\n\nอย่างไรก็ดี ประชากรจำนวนมากในสังคมของเราเรียกร้องให้ออกคำสั่งทำลายล้างมันในทันที การมีตัวตนอยู่ของมันถือเป็นการขัดแย้งค้านกับคุณค่าความเชื่อดั้งเดิมที่เรายึดถือปกป้องมาอย่างยาวนาน"
 shroud.6770.a:"ทำลายล้างสิ่งมีชีวิตบิดเบี้ยวอันน่ารังเกียจนี้ทิ้งเสีย"
 shroud.6770.b:"ศึกษาหาวิธีการดัดแปลงใช้ประโยชน์จาก... สิ่งนี้เสีย"
 destroyers_of_the_lost_modifier:"ผู้ทำลายล้างกลุ่มผู้สิ้นหวังฝันสลาย"
 destroyers_of_the_lost_modifier_tt:"มอบสิทธิ์การเลือกใช้งานมาตรฐานคุณภาพชีวิต (§Y$living_standard_shroud_inoculation$§!มาตรฐานชีวิต)ภายใต้เกณฑ์ที่ความสามารถด้าน (§Yภาษาไทย§!) พลังจิตจะถูกลบล้างบำบัดรักษาออกไป"
 destroyers_of_the_lost_modifier_desc:"ความสำเร็จการปราบปรามศัตรูพลังจิตและทำลายล้างแหล่งกำเนิดปฐมภูมิของ $PSIONIC_AURA$ ของพวกมันลงได้ ช่วยสร้างขวัญกำลังใจความฮึกเหิมให้แก่ประชากรจักรวรรดิของเราอย่างมหาศาลหลังจากต้องทนบีบคั้นทนทุกข์มาเป็นเวลานานปี"

 living_standard_shroud_inoculation:"การบำบัดกำจัดภัยมลพิษจิต(การฉีดวัคซีน)"
 living_standard_shroud_inoculation_tooltip:"สปีชีส์นี้กำลังได้รับการบำบัดรักษาฉีดวัคซีนป้องกันผลกระทบอันเป็นภัยร้ายแรงจากรังสีพลังจิต\n\n§Rเพื่อป้องกันความบกพร่องภัยในอนาคต คุณลักษณะทางพลังจิต(คุณสมบัติเชิงพูด)ทั้งหมดจะถูกบำบัดถอดถอนลบออกไป§!"
 living_standard_shroud_inoculation_tooltip_delayed:"§Lเราจะดูแลและจัดระบบความปลอดภัยด้านสุขภาพจิตของสปีชีส์นี้ให้ดีที่สุด§!"

 psionic_heresy:"การลอกลัทธินอกรีตทางพลังจิต"

 shroud.6780.name: "$r_the_lost_patron$"
 shroud.6780.desc:"ห้วงความคิดเหนี่ยวนำซึมซาบเข้าสู่ประสาทสัมผัสจิตใจเรา\n\nเราได้ยินเสียงท่วงทำนองบทเพลงที่ขับร้อง แผ่วเบาและเสียดแทงลึก\n\nเรารู้จักความเจ็บปวดอันเป็นนิรันดร์นี้ดี มันช่างปวดร้าวทว่าคุ้นเคยอย่างยิ่ง\n\n§Hคุณยอมสดับสดับฟังมันแล้ว ห้วงความนิมิตฝันครั้งนี้เป็นของคุณโดยสมบูรณ์... จงร่วมร้อง ร้องเพลงเถอะ...§!"
 shroud.6780.a:"นี่คุณดำเนินการอะไรลงไปกันแน่?"

 shroud.6785.desc:"§Hเป็นไปตามที่ฉันให้สัญญาปฏิญาณไว้ ฉันได้ร่วมเนรมิตนิมิตห้วงฝันเพื่อคุณ§!"
 shroud.6785.a:"สิ่งที่คุณ 'เนรมิตห้วงฝัน' ขึ้นมาคืออะไร?"

 shroud.6790.desc:"§Hโลกดาวเคราะห์ โลกดวงใหม่ๆ ที่ตั้งสถิตอยู่กึ่งกลางระว่างของฉันและของพวกคุณ§!"
 shroud.6790.a:"ดาวเคราะห์เหล่านี้จะมีผลประโยชน์อำนวยความสะดวกอันใดแก่ฝ่ายเรา?"

 shroud.6795.desc:"§Hให้ฉันได้ขับขานบทเพลงประสานจิตใจแก่ดาวดวงเหล่านั้นเถอะ บทเพลงเสียงที่สว่างสุกใสที่สุด§!"
 shroud.6795.a:"หวังว่าพวกเราจะไม่คิดย้อนมาเสียใจกับการตัดสินใจยอมรับในครั้งนี้ทีหลังนะ"
 shroud.6795.a.tt:"เหนี่ยวนำจัดสร้างสิ่งแวดล้อมโลกติดม่านพลัง (§Hโลก ที่ เสื่อม ทราม§!) สูงสุดสามดวงภายใต้พรมแดนอาณาเขตของเรา โดยสุ่มจัดสร้างจำกัดสูงสุดระบบดาวละหนึ่งดวง"

 r_the_lost_patron:"ผู้ฝันใฝ่(นักฝัน)"
 r_the_lost_patron_desc:"เอนทิตีอันลึกลับตนนี้คือรูปลักษณ์ทางกายภาพของสิ่งมีชีวิตจากภายในม่านพลังจิตชราวด์ — ซึ่งเคยเป็น 'ผู้มีพระคุณ' อุปถัมภ์ดั้งเดิมของจักรวรรดิพลังจิตที่สูญสลายไปแล้ว ยังไม่มีใครตระหนักรู้สาเหตุแน่ชัดว่ามันสามารถปรากฏตัวข้ามผ่านมิติมาสู่โลกความจริงเชิงฟิสิกส์แห่งนี้ได้อย่างไร แต่สายสัมพันธ์เชื่อมโยงที่เป็นเอกลักษณ์ของมันกับมิติพลังจิตช่วยมอบพละกำลังที่ทรงอำนาจอย่างยิ่งยวดให้แก่มัน"
 the_lost_patron_passive_effect:"ขอบเขตช่วงสะกดผนึก §H$SHROUD_SEAL_PLURAL$§!: §G+1§!\n§H$SHROUD_SEAL_PLURAL$§! ผลิตค่าเอกภาพ (£unity£ §Y$unity$§!): §G+25§!\n§H$SHROUD_SEAL_PLURAL$§! มอบขีดจำกัดขนาดกองทัพเรือ (£navy_size£ §Y$NAVY_SIZE_TITLE$§!): §G+10§!"
 the_lost_patron_before_activation_tt:"เราไม่อาจล่วงรู้คาดการณ์ถึงเหตุการณ์ที่จะเกิดขึ้นตามมาต่อจากนี้ได้เลย..."
 the_lost_patron_after_activation_effect_tt:"ปลดล็อก £decision£ §Yการตัดสินใจระดับดาวเคราะห์(การตัดสินใจเรื่องอาหาร)§!: ['concept_dreamscaping_decision'] 1 รายการ"
 decision_dreamscaping:"การเบิกปรับสภาพจิตม่านพลัง(ระเบิด)"
 decision_dreamscaping_desc:"ปรับสภาพสภาพแวดล้อมโลกติดม่านพลัง (§Y$pc_shrouded$§!) เปลี่ยนแปลงไปเป็นโลกอุดมสมบูรณ์ศักดิ์สิทธิ์ (§Y$pc_gaia$§!)"
 concept_dreamscaping_decision: "$decision_dreamscaping$"
 concept_dreamscaping_decision_desc: "$decision_dreamscaping_desc$"

 HAS_NOT_NUM_NEIGHBOR_SYSTEMS:"จำนวนของระบบดาวข้างเคียงคือ $VAL0|2Y$ ซึ่งไม่ใช่ $COMPARE$ $VAL1|2Y$"
 HAS_NEIGHBOR_SYSTEMS:"จำนวนของระบบดาวข้างเคียงคือ $VAL0|2Y$ ซึ่งเป็น $COMPARE$ $VAL1|2Y$"

#======================
# Endbringers origin
#======================
 origin_endbringers:"ผู้ชี้นำจุดจบภัยพิบัติ(นํา)"
 origin_endbringers_desc:"$CHALLENGING_ORIGIN$§Rคำเตือน: ปิดกั้นวิถีการตื่นรู้(เส้นทางการกระตุ้น)ทั้งหมด ยกเว้นวิถีแห่งการตื่นรู้ทางพลังจิตวิญญาณ (['concept_psionic_ascension'])§!\n\nอารยธรรมนี้มีความหลงใหลหมกมุ่นมาเป็นเวลานานเกี่ยวกับมหันตภัยลึกลับที่เปลี่ยนสภาพดาวเคราะห์ข้างเคียงให้กลายเป็นโลกที่รกร้างและถูกปกคลุมด้วยม่านพลังจิต ตอนนี้ เมื่อพวกเขาออกเดินทางมุ่งสู่หมู่ดาว ในที่สุดพวกเขาก็สามารถไขความลับของมันและพิสูจน์ได้ว่าชะตากรรมที่คล้ายกันนั้นกำลังรอคอยพวกเขาอยู่เช่นเดียวกันหรือไม่"
 origin_tooltip_endbringers_negative_effects:"- จักรวรรดิเริ่มต้นด้วยตัวดัดแปลงความหวาดระแวงภัยพิบัติ (['concept_paranoia_modifier'])\n- ไม่สามารถสถาปนาหรือเข้าเป็นสมาชิกของสมาพันธ์ดาราจักร (['concept_federation']) ได้"

 concept_paranoia_modifier: "$endbringers_paranoia$"
 concept_paranoia_modifier_desc:"หลังจากเฝ้ามองประจักษ์ถึงภัยพิบัติโบราณ ประชากรรุ่นต่อๆ มาต่างต้องทนทุกข์จากความรู้สึกเกรงกลัวหายนะที่ทวีความรุนแรงยิ่งขึ้นเรื่อยๆ\n\nค่าดัดแปลงความสุขจะแย่ลงอย่างต่อเนื่องเมื่อเวลาผ่านไป: จาก §R-5%§! ไปเป็นสูงสุดถึง §R-50%§!"

 endbringers_paranoia:"ความหวาดระแวงภัยพิบัติ"
 endbringers_paranoia_desc:"หลังจากได้ร่วมเผชิญเห็นภัยพิบัติครั้งใหญ่ในประวัติศาสตร์โบราณ ประชากรรุ่นต่อมาต้องทนทุกข์จากโรคกลัวหายนะครั้งใหญ่ลุกลาม เราจะเป็นเป้าหมายรายต่อไปที่ต้องรับเผชิญชะตากรรมอันเลวร้ายนี้หรือไม่?"
 endbringers_paranoia_tt: "$chamber_of_silence_negative_effects_reduction$"

 START_SCREEN_ENDBRINGERS:"พวกเราคือผู้นำทางของมหันตภัยล่วงหน้า\n\nในช่วงรุ่งอรุณแห่งอารยธรรมของชาว [GetSpeciesAdj] ภัยพิบัติอันลึกลับได้อุบัติขึ้นกับดาวเคราะห์ข้างเคียงที่ใกล้ชิดที่สุดของเรา การเปลี่ยนแปลงอย่างกะทันหันและโหดร้ายรวดเร็วของมันเติมเต็มท้องฟ้ายามค่ำคืนด้วยแสงสีม่วงอันชั่วร้าย ก่อให้เกิดความกลัวฝังรากลึกในประชากรของเราว่าวันหนึ่งเราอาจต้องทนทุกข์กับชะตากรรมทำนองเดียวกัน ในแต่ละรุ่นอายุคนที่ผ่านพ้นไป ความหวาดกลัวอันอึดอัดของการดับสูญที่อาจจะเกิดขึ้นได้กระชับความกลัวบีบคั้นเราแน่นขึ้นเรื่อยๆ\n\nตอนนี้ เมื่อชาว [GetSpeciesNamePlural] เริ่มออกเดินทางก้าวข้ามผ่านสู่ดวงดาว เราจึงมีแรงดึงดูดใจในการสืบสวนศึกษาดาวเคราะห์ที่ติดอยู่ในม่านพลังจิต '$pc_shrouded$' ดวงนี้ คำตอบที่เราโหยหามานานหลายศตวรรษอยู่ใกล้เพียงเอื้อมมือเท่านั้น ทว่าประชากรหลายคนในหมู่พวกเรายังคงตักเตือนว่าความหมกมุ่นจนเกินเหตุของเราต่อแหล่งพลังทำลายล้างนี้อาจนำไปสู่จุดจบของเราเองในบั้นปลาย\n\nในไม่ช้า เราจะได้เผยรอยแยกเปิดผ้าคลุมผืนสุดท้ายออกเสียที"

 shroud.8010.title:"ภารกิจเดินทางสำรวจดาว [shrouded_planet.GetName]"
 shroud.8010.desc:"ดาวเทียมสำรวจดาราศาสตร์รอบวงโคจรดาวเคราะห์ §H[shrouded_planet.GetName]§! ได้ระบุพื้นที่เป้าหมายที่มีอนาคตดีสำหรับภารกิจส่งมนุษย์อวกาศลงจอดครั้งแรกบนพื้นผิวโลกติดม่านพลังจิต '$pc_shrouded$' ดวงนี้ บริเวณพิกัดลงจอดแผ่รังสีพลังงานประหลาดระลอกๆ แพร่กระจายข้ามดาวเคราะห์ พัดพาไปตามสายลมแสงอัลตราไวโอเลต\n\nมีชาว [Root.GetSpeciesNamePlural] จำนวนไม่น้อยที่รวมตัวกันส่งเสียงประท้วงต่อต้านภารกิจครั้งนี้เพราะความกังวลเกรงกลัวว่าจะปล่อยคำสาปทำนองเดียวกันมารังควานโลกบ้านเกิดของเรา ข้อกังวลใจของพวกเขาก็ดูมีน้ำหนักความสมเหตุสมผลอยู่ ทว่าความต้องการที่จำเป็นกว่าอย่างการเข้าใจปรากฏการณ์ในดินแดนไกลโพ้นนี้จำต้องเป็นสิ่งที่ได้รับความสำคัญอันดับแรกสุด\n\nหากชะตาเราถูกกำหนดไว้แล้วว่าวันหนึ่งต้องเผชิญชะตากรรมหายนะร้ายแรงเดียวกันนี้ อย่างน้อยเราก็ควรจะได้ดับสูญไปพร้อมกับความเข้าใจรู้ถึงสาเหตุของมัน"
 shroud.8010.a:"การเดินทางตามหาข้อสัจจริงได้เริ่มก้าวแรก ณ บัดนี้แล้ว"

 the_shrouded_world_site:"โลกที่ติดอยู่ในม่านพลัง ($pc_shrouded$)"
 the_shrouded_world_site_desc:"ในท้ายที่สุด เราก็มีความพร้อมเพียงพอที่จะส่งกำลังเอื้อมไปสัมผัสโลกติดม่านพลัง '$pc_shrouded$' ที่รู้จักในชื่อดาวเคราะห์ §H[planet.GetName]§! ได้เสียที มีสิ่งของบางชิ้นที่นั่นกำลังส่งเสียงร้องเรียกหาเรา น้ำเสียงดังกล่าวดังชัดเจนยิ่งขึ้นกว่าช่วงที่ผ่านมาอย่างยิ่ง\n\nความลับของหายนะภัยพิบัติที่อุบัติขึ้นกับโลกดวงนี้จะช่วยเปิดเผยบันทึกประวัติศาสตร์ในระบบดาวของเราเองได้เป็นอย่างดี และหวังว่ามันจะช่วยลดระดับความหมกมุ่นกลัวการดับสูญที่ลือพยากรณ์ไว้ลงไปได้บ้าง ผลสแกนวงโคจรชี้เบาะแสเห็นกระแสพลังงานหนาแน่นที่กำลังหมุนวนปักหลักอยู่ที่ตำแหน่งทางซีกโลกใต้ — ดั่งดวงตาที่คอยเฝ้าจับตามองจ้องมองมองกลับมาหาเรา"

 shroud.8100.name:"วันสิ้นโลกใกล้เข้ามาเยือนแล้ว"
 shroud.8100.desc:"สภาพภูมิประเทศของดาวเคราะห์ §H[shrouded_planet.GetName]§! มีความอันตรายร้ายแรงดั่งที่วิเคราะห์คาดการณ์ไว้ล่วงหน้าจริงๆ กระแสพายุหมุนของฝุ่นละอองแสงยามโพล้เพล้พัดตัดข้ามผืนอากาศ ส่งผลให้ความคืบหน้าการสำรวจแรกเริ่มของ §H[Leader.GetName]§! และทีมงานใต้บังคับบัญชาเป็นไปอย่างล่าช้า\n\nสิ่งที่น่ากังวลเป็นพิเศษคือ ทีมวิจัยเริ่มรายงานถึงอาการระบบประสาทการรับรู้ที่ผิดปกติสับสน พวกเขาเล่าถึงเสียงโหยหวนไกลๆ ที่ลอยมากับสายลม และเงาร่างสีดำที่เฝ้าแอบซุ่มเดินตามในละอองหมอก การตัดสินใจเดินทางมายังที่นี่เป็นเรื่องที่ผิดพลาดจริงงั้นหรือ?\n\nการถ่ายทอดสัญญาณการลงจอดเป็นครั้งแรกสู่สาธารณชนกระตุ้นให้เกิดกระแสความตระหนกตื่นกลัวลุกลามไปทั่วดาวเคราะห์บ้านเกิด §H[Owner.GetHomeWorldName]§! หลายฝ่ายหวาดผวากลัวว่าเราอาจกำลังกวักเชิญชวนเอาพลังงานทำลายล้างลึกลับที่เคยอุบัติขึ้นกับดาวเคราะห์ [shrouded_planet.GetName] มารังควานเรา กลุ่มการประท้วงเรียกร้องที่ตะโกนป่าวร้องคำว่า 'วันสิ้นโลกใกล้เข้ามาเยือนแล้ว' กำลังแพร่ระบาดแผ่ขยายไปทั่วโลกบ้านเกิด ส่งผลให้โครงสร้างพื้นฐานการทำงานหลักของเราต้องชะงักใช้การไม่ได้ไปส่วนใหญ่\n\nผลตรวจวัดระยะไกลเผยเบาะแสถึงโพรงใต้พิภพที่กำลังแผ่รังสีพลังงานในระดับที่เข้มข้นเข้มข้นสูงอย่างเด่นชัดลึกลงไปในบริเวณทิวเขาใกล้เคียง พวกเรามีเจตจำนงแน่วแน่ที่จะเดินหน้าสืบสวนเชิงลึกต่อไป ไม่ว่าจำต้องจ่ายผลลัพธ์ราคาค่างวดที่สูงขนาดไหนก็ตาม"
 shroud.8100.a:"เจาะทะลวงผ่านพื้นผิวลงไป เราต้องค้นหาให้พบว่าสิ่งใดกำลังเฝ้ารอเราอยู่"

 the_end_is_nigh:"วันสิ้นโลกใกล้เข้ามาเยือนแล้ว"
 the_end_is_nigh_desc:"ความรู้สึกถึงหายนะภัยพิบัติที่กำลังใกล้จะมาถึงเข้าปกคลุมสังคมของเรา"

 shroud.8105.name:"โครงสร้างเอเลี่ยน"
 shroud.8105.desc:"พวกเราไม่ใช่กลุ่มแรกที่มาที่นี่\n\nโพรงถ้ำในทิวเขาบนดาว §H[shrouded_planet.GetName]§! ถูกเจาะทะลวงเข้าไปได้แล้ว เผยให้เห็นสิ่งปลูกสร้างโบราณของต่างดาวที่ถูกทิ้งร้างไปเนื่องจากหายนะภัยพิบัติครั้งใหญ่ เราพิจารณาว่าเป็นการดีที่สุดที่จะเก็บข้อมูลเรื่องนี้ไว้เป็นความลับระดับสูงสุดเพื่อป้องกันการตื่นตระหนกตกใจของมวลชน\n\nการวิเคราะห์ขั้นปฐมภูมิช่วยยืนยันว่าวัสดุที่ใช้ในการก่อสร้างสิ่งอำนวยความสะดวกแห่งนี้ไม่ตรงกับองค์ประกอบทางโมเลกุลของแร่ธาตุที่มีอยู่ทั่วไปบนดาวเคราะห์ดวงนี้ ซึ่งบ่งชี้ว่าอารยธรรมท่องอวกาศต่างดาวเป็นผู้สร้างสถานีนี้ขึ้นโดยใช้งานวัสดุแปลกใหม่ วัตถุประสงค์ที่แท้จริงของสถานที่แห่งนี้ยังไม่แน่ชัด แต่มันน่าจะทำงานด้วยระบบอัตโนมัติเป็นหลัก\n\nในขณะเดียวกัน อาการทางจิตของทีมงานเริ่มแย่ลงเรื่อยๆ บางคนรายงานว่าได้ยินเสียงกระซิบผ่านคลื่นสัญญาณที่เข้ารหัสลับ ขณะที่บางคนเล่าถึงการรับรู้สภาพแวดล้อมทางกายภาพรอบตัวที่บิดเบี้ยวผิดเพี้ยนไป การหัวเราะลั่นขึ้นมาอย่างไร้สาเหตุเป็นระยะๆ เริ่มกลายเป็นเรื่องปกติธรรมดาที่ทำให้รู้สึกอึดอัดใจ\n\nเราเดินหน้าก้าวล้ำลึกมาไกลเกินกว่าจะยอมหันหลังกลับเสียแล้ว"

 shroud.8110.name:"ผู้เฝ้ามองดู(ยาม)"
 shroud.8110.desc:"พวกเขาล่วงลับไปหมดแล้ว\n\nบนที่นั่งของแต่ละตำแหน่งปฏิบัติงาน ณ ใจกลางของสิ่งอำนวยความสะดวกแห่งนี้ มีซากศพแห้งกรังของเผ่าพันธุ์ต่างดาวที่ไม่รู้จักนอนฟุบอยู่ ดวงตาซีดเซียวหลายดวงของพวกเขาจ้องมองตรงขึ้นไปยังเพดาน แม้ว่าภาพลักษณ์ของพวกเขาจะดูน่าขนลุก แต่ §H[Leader.GetName]§! ก็ค่อนข้างมั่นใจว่าร่างเหล่านี้ไม่ใช่ภาพหลอนที่เกิดจากจิตวิเคราะห์ ปัจจุบันภาพถ่ายของสิ่งมีชีวิตเหล่านี้ได้รับการจัดเป็นความลับขั้นสุดยอด\n\nเราไม่พบอาวุธชนิดใดๆ เลย ซึ่งบ่งชี้ว่าการปรากฏตัวของพวกเขาบนดาว §H[shrouded_planet.GetName]§! ไม่ได้มีเจตนาร้ายแรงเป็นอริแต่อย่างใด สถานีนี้อาจเป็นหอสังเกตการณ์ที่ติดตั้งอุปกรณ์เฝ้าตรวจสแกนขั้นสูงซึ่งมุ่งเป้าฝึกจ่อโดยตรงมายังดาวบ้านเกิดของเรา §H[Owner.GetHomeWorldName]§! การวิเคราะห์อายุจากคาร์บอนกัมมันตรังสีระบุว่าพฤติกรรมการทำงานของพวกเขาที่นี่มีมานานแสนนานก่อนที่ภัยพิบัติร้ายแรงจะมาเยือน\n\nเราถอดรหัสบันทึกข้อมูลของพวกเขาได้มากมาย นอกเหนือจากบันทึกการสื่อสารตามปกติแล้ว ส่วนใหญ่ล้วนเป็นข้อมูลที่เกี่ยวข้องกับประวัติศาสตร์ยุคแรกเริ่มของอารยธรรมเราทั้งสิ้น"
 shroud.8110.a:"พวกเขาคอยเฝ้าติดตามมองดูพวกเรางั้นหรือ?"

 shroud.8115.name:"พละกำลังเกินกว่าจะซึมซับเข้าใจ"
 shroud.8115.desc:"ฐานข้อมูลบนดาว §H[shrouded_planet.GetName]§! ได้รับการถอดรหัสเรียบร้อยแล้ว ซึ่งช่วยยืนยันความสัจจริงของตำนานเรื่องเล่าลึกลับโบราณหลายเรื่องที่เราเคยละทิ้งไป อารยธรรมเราเคยตกเป็นเป้าหมายหัวข้อทดลองในการศึกษาวิจัยศาสตร์ทางจิตที่รู้จักกันในนามของ '$tech_psionic_theory$' (ทฤษฎีพลังจิต)\n\nสปีชีส์ของเราได้รับการพิจารณาว่ามีศักยภาพแฝงที่รอการตื่นรู้นี้อยู่ บรรพบุรุษจำนวนมากของเราคงเคยได้รับสัญญาณข้อความสื่อสารเหล่านี้ในความฝันหรือเป็นเสียงกระซิบแผ่วเบาจากระยะไกล ซึ่งอาการทำนองนี้หากเป็นกรณีอื่นคงบ่งชี้ถึงความบกพร่องทางจิตหรือความระแวงประสาทหลอน อย่างไรก็ดี การทดลองของพวกเขากลับถูกระงับสั้นลงกะทันหัน ในช่วงบั้นปลายชีวิตของสถานีนี้ มันไม่ได้ทำหน้าที่สังเกตการณ์ตรวจตราอีกต่อไป แต่แปรสภาพเป็นสถานลี้ภัยเพื่อเอาชีวิตรอด\n\nรายงานความคืบหน้าเกี่ยวกับสังคมเราของพวกเขายุติลงอย่างกะทันหันหลังจากการทดลองที่สร้างความล้มเหลวพินาศร้ายแรงบนโลกเมืองหลวงของพวกเขา ซึ่งเกี่ยวข้องกับการฝืนปรับเปลี่ยนกำแพงมิติกั้นกลางระหว่างโลกความจริงที่รู้จักในชื่อ §H'ชราวด์(คําราม)'§! อย่างไร้ความระมัดระวัง เหล่านักวิทยาศาสตร์ของพวกเขาเรียกขานอุบัติการณ์ภัยครั้งนี้ว่า 'วันพิพากษาชำระแค้น(เสียงคํานวณ)และเราคาดการณ์ว่านี่คือต้นตอปฐมภูมิที่แท้จริงของการเกิดหายนะมหันตภัย\n\nไม่ว่ารายละเอียดของอุบัติการณ์ครั้งนี้จะเป็นอย่างไร อิทธิพลร้ายของมันได้คืบคลานเข้าสู่ดาว §H[shrouded_planet.GetName]§! ในเวลาไม่ช้าต่อมา ห้วงนาทีสุดท้ายของพวกเขาได้รับการบันทึกไว้ในบันทึกบันทึกรายการเดียว:\n\n§Lบัดนี้ จุดจบสิ้นสุดได้มาถึงแล้ว§!"
 shroud.8115.a:"ภัยดังกล่าวจะเดินทางมาเยือนหาพวกเราด้วยหรือไม่?"

 shroud.8120.name: "$fragment_of_reckoning$"
 shroud.8120.desc:"เราได้ค้นพบหลักฐานยืนยันแน่ชัดถึงต้นกำเนิดของหายนะภัยพิบัติ มันไม่ใช่เรื่องยากที่จะหาเลย ทูต §H[Leader.GetName]§! อ้างว่าสิ่งดังกล่าวส่งเสียงเรียกหา [Leader.GetHisHer] โดยตรง\n\nลึกลงไปในสถานีปฏิบัติงาน สิ่งแปลกประหลาดที่ยากต่อการวิเคราะห์ทางวิทยาศาสตร์ทั่วไปได้รับการระบุว่าเป็นกลุ่มก้อนพลังงานที่สั่นไหวและจับต้องไม่ได้ มันไม่ได้สถิตสถิตอยู่ทั้งในรูปของสะสารหรือพลังงานทั่วไป §H[Leader.GetName]§! อธิบายถึงมันว่าเสมือนเป็นเศษเสี้ยวแรงพยาบาทที่ตกค้างของจิตวิญญาณที่ถูกกลืนกิน โดยเรียกขานมันว่า §H'$fragment_of_reckoning$' (เศษเสี้ยวแห่งการล้างแค้น)§!\n\nความพยายามที่ผิดพลาดในการกักกันและเหนี่ยวนำกระแสพลังงานจากมิติ §Hชราวด์(คําราม)§! วัตถุชิ้นนี้เคยถูกมุ่งหมายสร้างมาเพื่อใช้เป็นโล่ปกป้องจากการล้างแค้นชำระบัญชี(ร้อง)อย่างไรก็ดี มันทำงานสำเร็จเพียงบางส่วนเท่านั้น ในห้วงนาทีสุดท้ายของดาวดวงนี้ เอนทิตีที่เปี่ยมด้วยความมุ่งร้ายได้ถูกเนรเทศส่งกลับไปนอกมิตินี้โดยบังคับ พร้อมกับกวาดพาเอาดวงจิตของเหล่านักวิทยาศาสตร์ที่ไม่เต็มใจร่วมไปด้วย เศษเสี้ยวชิ้นนี้คือสิ่งเดียวที่หลงเหลืออยู่จนถึงปัจจุบัน\n\nวัตถุชิ้นนี้คอยเสริมภาพหลอนนิมิตฝันและอาการหูแว่วประสาทหลอนของเหล่านักวิจัยของเรา ช่วยเบิกประสาทสัมผัสตาที่สองของพวกเขาให้มองทะลุเกินมิติความจริงที่ถูกจำกัดนี้ มันเป็นข้อเสนอที่อันตรายยิ่งยวด ทว่าก็ดูมีอนาคตที่น่าทึ่งเช่นเดียวกัน"
 shroud.8120.a:"เรายังมีเรื่องราวมากมายที่จำต้องศึกษาเรียนรู้เพิ่มเติม..."

 ENDBRINGERS_RESEARCH_PSIONIC_THEORY: "$tech_psionic_theory$"
 ENDBRINGERS_RESEARCH_PSIONIC_THEORY_DESC:"เศษเสี้ยวของพลังงานจิตวิญญาณที่เราได้ค้นพบและกู้มาบนดาว §H[shrouded_planet.GetName]§! เก็บงำความลับลึกลับที่เราต้องถอดรหัสออกมาให้สำเร็จ\n\nความคืบหน้าของเรากำลังถูกจำกัดไว้ด้วยขีดความสามารถทางความคิดจิตใจของเราเอง"
 ENDBRINGERS_PSIONIC_THEORY_PROJECT_TOOLTIP:"เงื่อนไขความสำเร็จ: ทำการวิจัยศึกษา §H£society_research£ $tech_psionic_theory$§! (ทฤษฎีพลังจิต) ให้สำเร็จ"

 ENDBRINGERS_ADOPT_PSIONICS_TRADITION: "$ENDBRINGERS_RESEARCH_PSIONIC_THEORY$"
 ENDBRINGERS_ADOPT_PSIONICS_TRADITION_DESC: "$ENDBRINGERS_RESEARCH_PSIONIC_THEORY_DESC$"
 ENDBRINGERS_PSIONICS_TRADITION_PROJECT_TOOLTIP:"เงื่อนไขความสำเร็จ: ดำเนินการยอมรับประเพณีธรรมเนียมปฏิบัติ §H$tradition_psionics_shroud$§!"

 shroud.8200.title:"ดินแดนแห่งความบ้าคลั่งวิปลาส"
 shroud.8200.desc:"งานวิจัยในสาขาพลังจิตเวชวิชาจิตวิทยาที่เพิ่งค้นพบล่าสุด ได้ช่วยยืนยันการมีตัวตนอยู่ของมิติความจริงที่ซ่อนเร้นไม่เคยมีใครเห็นมาก่อน ซึ่งจิตใจประสาทสัมผัสของเราทำหน้าที่เป็นเสมือนสะพานทางผ่านหลัก ด้านหลังม่านบังตาผืนนี้สถิตอยู่ด้วยดินแดนแห่งความโกลาหลวุ่นวายที่เรายังคงต้องทนพยายามศึกษาเพื่อทำความเข้าใจ\n\nจากส่วนก้นบึ้งอันลึกซึ้ง มี §Rเสียงกระซิบกระซิบ(ร้องไห้)§! ร้องเรียกหา สัญญาของมันไม่ใช่หนทางช่วยชีวิตรอดพ้นจากภัย แต่เป็นการปูรากฐานเพื่อเริ่มต้นครั้งใหม่ การเลือกควบคุมใช้งานพละกำลังอันลึกลับของมันจำต้องผ่านการทอดทิ้งปลดเปลื้องทุกสิ่งทุกอย่างที่เราเคยเป็นในอดีต และรังสรรค์รอยแผลโชคชะตาที่จารึกไว้ในเส้นใยเนื้อหาของความวิปลาสความบ้าคลั่งเอง\n\n§R\"บัดนี้ ถึงเวลาอันสมควรแล้ว\"§!"
 shroud.8200.a:"นี่พวกเราดำเนินการอะไรลงไปกันแน่?"
 shroud.8200.a.tt:"ปลดล็อกสายแผนผังธรรมเนียมปฏิบัติประเพณี §H$tradition_psionics_shroud$§!"

 chamber_of_silence_negative_effects_reduction:"สิ่งปลูกสร้าง ['building:building_chamber_of_silence'] แต่ละแห่งจะช่วยลดผลกระทบเชิงลบลงไปได้ §G$@chamber_of_silence_effect_mult|0%$§!"
 endbringers_madness_1:"ความบ้าคลั่งวิปลาส"
 endbringers_madness_1_desc:"จักรวรรดิของเราขับเคลื่อนไปด้วยเป้าหมายและเจตจำนงที่แน่วแน่เด็ดเดี่ยวเพียงหนึ่งเดียว: การตามรอยล่าหา §Rเสียงกระซิบกระซิบ(ร้องไห้)§! จิตใจของพวกเราจะไม่ยอมหยุดหย่อนพักผ่อนจนกว่าจะได้พบกับข้อยุติของปัญหา"
 endbringers_madness_1_tt: "$chamber_of_silence_negative_effects_reduction$"
 endbringers_madness_2: "$endbringers_madness_1$"
 endbringers_madness_2_desc:"จักรวรรดิของเราขยับขยับใกล้เข้าถึง §Rเสียงกระซิบกระซิบ(ร้องไห้)§! มากยิ่งขึ้น แรงกระตุ้นบีบคั้นของเจตจำนงได้รับการผ่อนคลายลดระดับความรุนแรงลงมา"
 endbringers_madness_2_tt: "$endbringers_madness_1_tt$"
 endbringers_madness_3: "$endbringers_madness_1$"
 endbringers_madness_3_desc:"จักรวรรดิของเราใกล้จะได้ยินเสียง §Rเสียงกระซิบกระซิบ(ร้องไห้)§! อย่างสมบูรณ์แล้ว ในไม่ช้า พวกเราจะได้ทำความเข้าใจเรื่องราวทั้งหมด"
 endbringers_madness_3_tt: "$endbringers_madness_1_tt$"

 ALLOW_CHAMBER_OF_SILENCE:"ปลดล็อกสิ่งปลูกสร้าง: ['building:building_chamber_of_silence']"

 tr_psionics_endbringers_cult:"ลัทธิบูชาเสียงกระซิบ(เสียง)"
 tr_psionics_endbringers_cult_desc: "$ALLOW_CHAMBER_OF_SILENCE$"
 tr_psionics_endbringers_cult_delayed:"เมื่อใดก็ตามที่สดับยินเสียงกระซิบดังกล่าวแล้ว ดวงจิตจะไม่อาจเพิกเฉยละเลยมันได้อีกต่อจากนี้ พวกเราขอยอมศิโรราบปฏิบัติตามเจตจำนงของมัน"

 building_chamber_of_silence:"ห้องแห่งความเงียบสงัด(ชามเบอร์แห่งความเงียบ)"
 building_chamber_of_silence_desc:"จากทั่วทุกสารทิศในจักรวรรดิของเรา บุคคลที่มีพรสวรรค์ทางพลังจิตวิญญาณจะถูกนำตัวพามาสถิตที่นี่เพื่อใช้กระบวนการเหนี่ยวนำติดต่อกับมิติชราวด์ ภายในหอห้องที่เงียบสงัดและปลอดภัย"
 building_chamber_of_silence_madness_1_tt:"ลดผลข้างเคียงที่เป็นอันตรายของตัวดัดแปลง ['modifier:endbringers_madness_1'] ลงไปได้ §G$@chamber_of_silence_effect_mult|0%$§!."
 building_chamber_of_silence_madness_2_tt:"ลดผลข้างเคียงที่เป็นอันตรายของตัวดัดแปลง ['modifier:endbringers_madness_2'] ลงไปได้ §G$@chamber_of_silence_effect_mult|0%$§!."
 building_chamber_of_silence_madness_3_tt:"ลดผลข้างเคียงที่เป็นอันตรายของตัวดัดแปลง ['modifier:endbringers_madness_3'] ลงไปได้ §G$@chamber_of_silence_effect_mult|0%$§!."
 building_chamber_of_silence_paranoia_tt:"ลดผลข้างเคียงที่เป็นอันตรายของตัวดัดแปลง ['modifier:endbringers_paranoia'] ลงไปได้ §G$@chamber_of_silence_effect_mult|0%$§!."
 building_chamber_of_silence_destroyed_tt:"§Rสิ่งปลูกสร้างนี้จะถูกทำลายลงในทันทีหากอาณานิคมนี้ถูกศัตรูเข้ายึดครองหรือสูญเสียไป§!"

 shroud.8310.name: "$shroud.2750.name$"
 shroud.8310.desc:"พวกเราได้รับการเรียกขานให้ก้าวไปสู่ระดับชั้นตัวตนที่สูงส่งยิ่งขึ้นไป กลุ่มคนในหมู่พวกเราที่เฝ้ายึดติดดื้อดึงกับการต่อต้านอย่างไร้ประโยชน์กำลังถูกชำระล้างกำจัดทิ้งเพื่อรักษาความศักดิ์สิทธิ์ของกระบวนการตื่นรู้ของเรา ชะตากรรมของเราถูกตราปิดผนึกเรียบร้อยแล้ว เส้นทางเดินเบื้องหลังของเราได้พังทลายสลายกลายเป็นเถ้าถ่านภายใต้เงาของโลกติดม่านพลัง $pc_shrouded$\n\nบัดนี้ §Rเสียงกระซิบกระซิบ(ร้องไห้)§! กล่าวพูดสื่อสารกับเราด้วยความแจ่มชัดและมีอานุภาพจูงใจเด็ดขาด\n\n§R\"วิถีสายนี้ได้รับการกำหนดไว้เรียบร้อยแล้ว\"§!\n\nมันกำลังโหยหาเฝ้ารอคอยเหยื่อเครื่องสังเวยที่เต็มอกเต็มใจถวายตัว"
 shroud.8310.a:"มันเป็นชะตากรรมที่ไม่อาจหลีกเลี่ยงได้"
 shroud.8310.a.tt:"แต่ละอาณานิคมจะเกิดความสูญเสียสูญเสียประชากรสูงสุด 100-300 ประชากร (£pop£ §Hป๊อป§!)"

 situation_breach_shroud_endbringers: "$situation_breach_shroud$"
 situation_breach_shroud_endbringers_type: "$situation_breach_shroud_type$"
 situation_breach_shroud_endbringers_monthly_change_tooltip: "$situation_breach_shroud_monthly_change_tooltip$"
 situation_breach_shroud_endbringers_cult_of_the_voice_needed_desc:"£trigger_no£ ไม่มีประเพณีธรรมเนียมปฏิบัติลัทธิลัทธิบูชาเสียง ($tr_psionics_endbringers_cult$)\n£trigger_no£ ไม่มีสิ่งปลูกสร้างห้องความเงียบ ($building_chamber_of_silence$)"
 situation_breach_shroud_endbringers_chamber_of_silence_needed_desc:"£trigger_yes£ มีประเพณีธรรมเนียมปฏิบัติลัทธิลัทธิบูชาเสียง ($tr_psionics_endbringers_cult$)\n£trigger_no£ ไม่มีสิ่งปลูกสร้างห้องความเงียบ ($building_chamber_of_silence$)"

 approach_situation_breach_shroud_endbringers_nothing: "$approach_situation_breach_shroud_nothing$"
 approach_situation_breach_shroud_endbringers_nothing_desc:"สิ่งใดจะอุบัติขึ้น ย่อมต้องอุบัติขึ้น"
 breach_shroud_endbringers_nothing_tooltip: "$situation_speed_tt$: §R-25%§!"
 approach_situation_breach_shroud_endbringers_blind:"เบิกดวงตาจิตวิญญาณทำลายดวงตากาย(เสียงกระโชก)"
 approach_situation_breach_shroud_endbringers_blind_desc:"จุดหมายปลายทางที่พวกเรากำลังจะเดินทางไปถึงนั้น เราไม่มีความจำเป็นต้องใช้ดวงตากาย ([Owner.Species.GetEyeNamePlural]) ในการมองเห็นสรรพสิ่งอีกต่อไป"
 breach_shroud_endbringers_blind_tooltip: "$situation_speed_tt$: §G+50%§!\n$breach_shroud_endbringers_blind_effects_tooltip$"
 breach_shroud_endbringers_blind_effects_tooltip:"สุ่มปรับแต่งเพิ่มคุณลักษณะความบอดกาย (['trait:trait_blindness']) ให้แก่ประชากรจำนวน $@nb_blinded_pop|0$ ประชากร (£pop£ §Hป๊อป§!) ต่อหนึ่งเดือน"
 approach_situation_breach_shroud_endbringers_forsake_flesh:"ละทิ้งสังขารกายเนื้อ(เนื้อย่าง)"
 approach_situation_breach_shroud_endbringers_forsake_flesh_desc:"ขอบเขตจำกัดของเนื้อหนังกายเนื้อสังขารกำลังขัดขวางสะกดวิถีแห่งการปรับเปลี่ยนตัวตนไปสู่ขั้นที่สูงส่ง"
 breach_shroud_endbringers_forsake_flesh_tooltip: "$situation_speed_tt$: §G+100%§!\n$breach_shroud_endbringers_forsake_flesh_effects_tooltip$"
 breach_shroud_endbringers_forsake_flesh_effects_tooltip:"สูญเสียประชากรจำนวน $@nb_forsaken_pop|0$ ประชากร (£pop£ §Hป๊อป§!) ต่อหนึ่งเดือน"

 approach_breach_shroud_endbringers_wait_cooldown_tooltip:"$TRIGGER_FAIL$ไม่สามารถเลือกวิธีการแนวปฏิบัติ(ปรบมือ)ข้อใหม่ได้จนกว่าจะถึง §Y[Target.approach_breach_shroud_endbringers_cooldown_wait_time]§!"
 approach_breach_shroud_endbringers_blind_cooldown_tooltip:"$TRIGGER_FAIL$ไม่สามารถเลือกวิธีการแนวปฏิบัติ(ปรบมือ)ข้อใหม่ได้จนกว่าจะถึง §Y[Target.approach_breach_shroud_endbringers_cooldown_blind_time]§!"
 approach_breach_shroud_endbringers_forsake_cooldown_tooltip:"$TRIGGER_FAIL$ไม่สามารถเลือกวิธีการแนวปฏิบัติ(ปรบมือ)ข้อใหม่ได้จนกว่าจะถึง §Y[Target.approach_breach_shroud_endbringers_cooldown_forsake_time]§!"

 trait_blindness:"ความบอดตากาย"
 trait_blindness_desc:"จุดหมายปลายทางที่พวกเรากำลังจะเดินทางไปถึงนั้น เราไม่มีความจำเป็นต้องใช้ดวงตากายในการมองเห็นสิ่งใดอีกต่อจากนี้"

 # Establishing the Chamber of Silence
 shroud.2820.name:"การจัดสร้างติดตั้ง $building_chamber_of_silence$"
 shroud.2820.desc.1:"ในขณะที่ความเชี่ยวชาญความชำนาญทางพลังจิตวิญญาณของเราแผ่กิ่งก้านสาขา เรากำลังถูกรบกวนจู่โจมด้วยเสียงสะท้อนคำกระซิบที่สับสนอลหม่านจากพื้นที่ด้านหลังม่านบังตา §Rเสียงกระซิบกระซิบ(ร้องไห้)§! ที่ดังแจ่มชัดแจ้งขึ้นอย่างยิ่งยวดกว่ายามอื่นใด กำลังขดเกลียวผ่านกระแสความคิดความอ่านเหล่านี้เพื่อตรงดิ่งเข้าสู่ส่วนเงามืดในจิตใจเรา\n\n§R\"จงดำเนินการเปิดเส้นทางหนทางเสีย\"§!"
 shroud.2820.desc.2.intro:"เราจำต้องคัดกรองเสียงสัญญาณรบกวนที่สับสนนี้ออกไป"
 shroud.2820.desc.2.chamber:"$shroud.2820.desc.2.intro$ ทางเราได้ดำเนินการจัดสร้างก่อสร้าง $shroud.2820.desc.2.outro$"
 shroud.2820.desc.2.no_chamber:"$shroud.2820.desc.2.intro$ แผนงานพิมพ์เขียวได้รับการร่างโครงร่างแล้วสำหรับการสร้าง $shroud.2820.desc.2.outro$"
 shroud.2820.desc.2.outro:"สิ่งอำนวยความสะดวกป้องกันพิเศษที่ซึ่งประชากรผู้มีพรสวรรค์ตื่นรู้ทางพลังจิตขั้นสูงสุดของเราจะมีความสามารถในสดับฟังคำสั่งข้อความของ §Rเสียงกระซิบกระซิบ(ร้องไห้)§! ได้อย่างแจ่มชัดและมีสมาธิ"
 shroud.2820.a.chamber:"จิตประสาทประสาทสัมผัสของเราเบิกอ้ากว้างขวางยิ่งขึ้นอย่างต่อเนื่อง"
 shroud.2820.a.no_chamber:"ให้เราดำเนินการก่อสร้างอาคาร '$building_chamber_of_silence$' นี้ขึ้นเสียเถอะ"
 CONTINUE_SITUATION:"ดำเนินกิจกรรมสถานการณ์คืบหน้า (§Yสถานการณ์§!) ต่อไป:"
 shroud.2820.a.tt: "$CONTINUE_SITUATION$ §H$situation_breach_shroud$§!"
 shroud.2820.a.tt_no_chamber:"ยอมรับแผนประเพณีธรรมเนียมปฏิบัติ §H$tr_psionics_endbringers_cult$§! พร้อมจัดสร้างก่อสร้างสิ่งปลูกสร้าง §H$building_chamber_of_silence$§! เพื่อผลักดันความคืบหน้าของสถานการณ์ในภาพรวม"

 # The Great Awakening
 shroud.2830.name: "$utopia.2650.name$"
 shroud.2830.desc:"ภายใต้ห้องแห่งความเงียบสงัด ($building_chamber_of_silence$) เราสดับฟังข้อความของ §Rเสียงกระซิบกระซิบ(ร้องไห้)§! ด้วยดวงจิตตื่นรู้อย่างสุกใสสมบูรณ์\n\n§R\"ทุกสรรพสิ่งจะถือกำเนิดขึ้นใหม่อีกครั้ง\"§!\n\nบัดนี้เราเข้าใจความหมายอย่างสัจจริงแล้ว จุดสิ้นสุดวันสิ้นโลกแท้จริงแล้วคือกระบวนการฟื้นกำเนิดใหม่ เราจำต้องไม่เกรงกลัวมันเลย พวกเราจะได้รับการรังสรรค์สร้างขึ้นมาใหม่ ทั้งดียิ่งกว่าและทรงพละกำลังล้ำเลิศเกินกว่าที่เราจะเคยจินตนาการฝันถึง\n\nเพื่อเข้าไขว่คว้าโชคชะตานี้มาไว้ในครอบครอง เราจำต้องเรียนรู้และควบคุมมิติทางจิตใจจิตวิญญาณที่รู้จักในนามของม่านพลังจิต (§Hเดอะชราวด์§!) ให้ได้ เราจะไม่เดินตามรอยข้อบกพร่องของอารยธรรมที่เราค้นพบซากบนดาว $pc_shrouded$ ในจุดที่พวกเขายอมแพ้และปฏิเสธความกลัว พวกเราจะยอมรับและโอบกอดมันไว้"
 shroud.2830.desc.outro.awakening:"วิสัยทัศน์ประสาทสัมผัสของเราสว่างแจ่มชัดแจ้งสมบูรณ์"
 shroud.2830.desc.outro.no_awakening:"วิสัยทัศน์ประสาทสัมผัสของเราเกือบจะสว่างแจ่มชัดแจ้งแล้ว"
 shroud.2830.a.awakening:"ชราวด์คือฝ่ายที่ถือครองกุญแจไขคำตอบ"
 shroud.2830.a.no_awakening: "$shroud.2780.a$"
 shroud.2830.a.tt: "$tr_psionics_psionic_assimilation_desc$\n$CONTINUE_SITUATION$ §H$situation_breach_shroud$§!"
 shroud.2830.a.tt_no_awakening:"ยอมรับแผนประเพณีธรรมเนียมปฏิบัติ §H$tr_psionics_shroud_great_awakening$§! เพื่อผลักดันกระบวนการสร้างความคืบหน้าของสถานการณ์ในภาพรวม"

 # Blind the Willing - First select event
 shroud.8320.name:"พวกเรามองเห็นได้อย่างแจ่มแจ้งสว่างไสว"
 shroud.8320.desc:"ทูตปกครอง §H[blinded_leader.GetName]§! ได้ช่วยแสดงหนทางและทิศทางแก่เราแล้ว ประสาทสัมผัสภายนอกที่เกินความจำเป็นของเรากำลังบดบังขัดขวางเสียงกระซิบเรียกของ §Rเสียงกระซิบ(ร้องไห้)§! การขจัดออกไปเสียหนึ่งช่องทาง จะช่วยเหนี่ยวนำยกระดับขีดความสามารถทางพลังจิตวิญญาณของเราให้ขึ้นไปได้อีกหลายขั้น\n\nการละทิ้งยอมเสียสละดวงตากาย ([Species.GetEyeNamePlural]) ถือเป็นแนวปฏิบัติที่มีประสิทธิภาพและเห็นผลดีที่สุดในกรณีนี้ วิสัยการเห็นสิ่งของรอบกายในมิติความจริงกลับบดบังวิสัยทัศน์การส่องมองเข้าไปยังมิติ §Hชราวด์(คําราม)§! ชาว [Root.GetSpeciesNamePlural] เป็นจำนวนมากได้ดำเนินทำตามตัวอย่างแรงบันดาลใจอันทรงคุณค่าของ §H[blinded_leader.GetName]§! โดยควักสละดวงตากาย ([Species.GetEyeNamePlural]) ของพวกเขาออกทันทีอย่างปราศจากความลังเลใจ\n\nผู้คนกลุ่มที่ตัดสินใจละทิ้งดวงตากายเล่าถึงความรู้สึกเป็นสุขพึงพอใจอย่างท่วมท้นในขณะที่ §Rเสียงกระซิบ(ร้องไห้)§! บรรจุเข้ามาเต็มพิกัดในจิตใจพร้อมส่งสัญญาณยินดีเห็นชอบ"
 shroud.8320.a:"ประสาทการรับเห็นที่เหนือกว่าสายตาตากายมองเห็น(แสงเกินสายตา)"

 leader_trait_blinded:"ผู้เบิกเนตรตาจิตทำลายตากาย(บิด)"
 leader_trait_blinded_desc:"ยังมีทัศนียภาพที่น่าทึ่งรอคอยให้ดวงตาเข้าไปสำรวจพบอีกมากมาย"

 # A Leap of Faith - First select event
 shroud.8330.name:"ก้าวเดินแห่งความวางใจศรัทธา"
 shroud.8330.desc:"ด้วยความรู้สึกหงุดหงิดขัดใจกับข้อจำกัดกรอบของกายเนื้อสังขาร ทูตปกครอง §H[forsaken_leader.GetName]§! พยายามเร่งกระบวนการปรับเปลี่ยนพลังจิตของเขาอย่างรวดเร็วโดยการดื่มสารเคมีมีพิษทำลายชีวิตในการแสดงต่อสาธารณชนอย่างสะเทือนอารมณ์\n\nในจังหวะนาทีที่เขาหมดลมหายใจ ร่างสังขารกายเนื้อของเขาถูกพลังงานแผ่ซ่านสีม่วงกลืนกินไปจนหมดสิ้นและแตกสลายกลายเป็นละอองฝุ่นอนุภาคละเอียดของกระแสพลังงานจิตวิญญาณบริสุทธิ์ ปาฏิหาริย์ที่น่าทึ่งทำนองนี้สามารถปรากฏตัวขึ้นมาได้ก็โดยอาศัยแรงเจตจำนงของ §Rเสียงกระซิบกระซิบ(ร้องไห้)§! เท่านั้น\n\nเราประเมินว่านี่คือเบาะแสสัญญาณนำทางที่ประจักษ์ชัดเจน จุดใดก็ตามที่ §H[forsaken_leader.GetName]§! กรุยทางเดินนำไป ยูนิตประชากรคนอื่นๆ ก็จำต้องปฏิบัติตามรอยทางเดินนั้น"
 shroud.8330.a:"ร่างเนื้อสังขารกายเนื้อของพวกเราจะไม่มีวันหน่วงรั้งเหนี่ยวรั้งความก้าวหน้าของเราได้อีกต่อไป"

 # Mid-stage events
 shroud.8350.name:"รายงานกระบวนการศัลยกรรมประสาทสมอง(รายงานการผ่าตัด)"
 shroud.8350.desc:"ชาว [owner.GetSpeciesNamePlural] บางส่วนกำลังเผชิญกับช่วงชีวิตที่ทนรับได้ยากในการอยู่อย่างสอดคล้องประสานร่วมกับตัวตนการปรากฏของ §Rเสียงกระซิบกระซิบ(ร้องไห้)§!\n\nด้วยความสิ้นหวังโหยหาความสงบชั่วคราว ยูนิตประชากรส่วนที่จิตใจอ่อนแอและเปราะบางที่สุดในหมู่พวกเราได้หันมาใช้กระบวนการผ่าตัดศัลยกรรมตัดเส้นประสาทสมอง(โลกแตก)แบบโบราณล้าหลังและขาดระเบียบการควบคุมดูแลอย่างเป็นทางการ แนวทางปฏิบัติดังกล่าวมีแนวโน้มจะลุกลามแผ่ขยายเป็นวงกว้างหากจักรวรรดิของเราละเลยไม่ได้รีบดำเนินการออกมาตรการควบคุมเข้าแก้ไขดูแล"
 shroud.8350.a:"ปล่อยให้กลุ่มที่อ่อนแอดำเนินแนวทางในแบบที่พวกเขาสะดวกต้องการเถอะ"
 shroud.8350.b:"§Rเสียงกระซิบกระซิบ(ร้องไห้)§! คือของขวัญล้ำค่า สั่งห้ามมาตรการขัดขวางแนวทางปฏิบัตินี้ในทันที"

 endbringers_voice_plague:"เสียงรบกวนในประสาทสัมผัสหูแว่ว"
 endbringers_voice_plague_desc:"เมื่อยามคลื่นเสียงดังกระซิบกล่าวคำพูด ดวงจิตเราไม่มีหนทางเลือกอื่นนอกจากจำต้องยอมสดับฟัง"

 shroud.8360.name:"การทดลองระบบประสาทสัมผัสด้วยตนเอง"
 shroud.8360.desc:"เรายังคงดำเนินปฏิบัติโอบกอดและยอมรับในกระแส §Rเสียงกระซิบ(ร้องไห้)§!. สารที่มันกล่าวมาล้วนเป็นสัจธรรมความจริงขั้นพื้นฐานที่ไม่สามารถคัดค้านปฏิเสธได้ลง\n\nประชากรชาว [owner.GetSpeciesNamePlural] จำนวนไม่น้อยกำลังดิ้นรนหาแนวทางเสริมช่องทางขยายเสียง §Rเสียงกระซิบ(ร้องไห้)§! เพื่อที่พวกเขาจะได้รับประโยชน์จากความปราดเปรื่องของสัจธรรมของมันอย่างเป็นทางการและรวดเร็วตรงที่สุด\n\nสถิติการใช้งานยารักษาโรคสารเคมีในตลาดมืดพุ่งสูงขึ้นอย่างน่ากลัว สถานพยาบาลนอกกฎหมายหลายแห่งกำลังลักลอบเปิดให้บริการเชิงทดลองเพื่อช่วยให้ดวงจิตประชากรบุคคลสามารถเร่งขีดประสาทการตอบรับทางพลังจิตวิญญาณขั้นสูงสุดได้\n\nเรื่องราวเหตุการณ์ทำนองนี้จะนำพาสังคมเราก้าวไปสู่ทิศทางจุดสิ้นสุดตรงไหนกันแน่?"
 shroud.8360.a:"ทุ่มเทความพยายามสรรพกำลังทั้งหมดเท่าที่มีเพื่อเร่งกระแสเปิดทางให้ §Rเสียงกระซิบ(ร้องไห้)§! สำเร็จ"
 shroud.8360.b:"พวกเราจำเป็นต้องยับยั้งสะกัดกั้นสภาวะอนาธิปไตยจลาจลในสังคมโดยเร่งด่วน"

 shroud.8370.name:"ภาพฝันร้ายวันสิ้นโลก"
 shroud.8370.desc:"ในขณะที่ขีดความสามารถทางกระบวนการพลังจิตของเราเติบโตพัฒนาขึ้น กลุ่มประชากรชาว [owner.GetSpeciesAdj] ต่างถูกคุกคามด้วยอาการฝันร้ายที่สยดสยองซึ่งบอกเล่าถึงช่วงวินาทีการล่มสลายลบมิติของจักรวาลล่วงหน้า\n\nความฝันของพวกเราได้กลายเป็นคำพยากรณ์ทำนายหายนะวันสิ้นโลก ช่วยเร่งความรู้สึกเกรงกลัวหายนะให้ฝังลึกในก้นบึ้งของประชากรของเราเป็นทวีคูณ การนอนหลับพักผ่อนแปรสภาพเป็นความทรมานอึดอัดที่สับสนวุ่นวาย ทำให้ประชากรหลายคนขาดความพร้อมและสภาพจิตใจในการปฏิบัติงานตามปกติประจำวันได้\n\nภายใต้ห้วงความฝันร้ายแรงเหล่านั้น §Rเสียงกระซิบกระซิบ(ร้องไห้)§! กล่าวพูดคุยกับเราว่า\n\n§R\"จงยอมโอบกอดรับสัจธรรมเอนโทรปีล่มสลาย(เสียงไฟฟ้า)เสียเถอะ\"§!"
 shroud.8370.a:"ทุกสรรพสิ่งในจุดเริ่มต้นย่อมต้องดำเนินไปถึงจุดลงเอยจุดสุดท้ายเสมอ"
 shroud.8370.b:"เปิดอาคาร $building_chamber_of_silence$ เพื่อให้เป็นพื้นที่ลี้ภัยบำบัดรักษาจิตใจของประชากร"

 endbringers_apocalyptic_nightmares:"ภาพฝันร้ายภัยพิบัติวันสิ้นโลก"
 endbringers_apocalyptic_nightmares_desc:"เสียงกระซิบส่งคลื่นรบกวนวงจรการนอนหลับพักผ่อนของดวงจิตเราด้วยภาพนิมิตภัยพิบัติล่มสลายดาราจักร"

 endbringers_nightmare_shelter:"สถานรับดูแลบำบัดอาการฝันร้าย"
 endbringers_nightmare_shelter_desc:"$building_chamber_of_silence$ ทำหน้าที่ให้บริการเป็นสถานพักพิงดูแลสำหรับผู้คนที่ต้องเผชิญกับความทุกข์ระทมจากอาการฝันร้ายหายนะภัยพิบัติ"

 shroud.8380.name:"ตราสัญลักษณ์แห่งจุดจบ"
 shroud.8380.desc:"ในปัจจุบันเกิดกระแสพฤติกรรมการทำร้ายทำลายร่างสังขารร่างกายของตนเองเพิ่มสูงขึ้นอย่างน่ากังวลในหมู่ประชาชนทั่วไป\n\nกลุ่มผู้ศรัทธาเสื่อมใสที่มีใจภักดีเลื่อมใสอย่างแรงกล้าต่อ §Rเสียงกระซิบกระซิบ(ร้องไห้)§! ต่างพากันจัดกิจกรรมเฉือนทำแผลลงตราบนผิวเนื้อสังขารตนเองเป็นรูปสัญลักษณ์ 'จุดจบ(ตอนจบ)พวกเขาอ้างและประกาศเสียงดังว่าลวดลายสัญลักษณ์เหล่านี้จะช่วยมอบพรมงคลอันน่าทึ่งแก่ผู้นำมาลงตราเหล่านั้น\n\nไม่ว่าเรื่องดังกล่าวจะเป็นความจริงทางฟิสิกส์วิจัยหรือไม่ จำนวนกลุ่มผู้เข้าร่วมพิธีกรรมความเชื่อทำนองนี้กำลังพุ่งขยายตัวอย่างรวดเร็วเป็นประวัติการณ์ นี่คือความต้องการหรือเป้าหมายที่แท้จริงจากมิติ §Hชราวด์(คําราม)§! จริงงั้นหรือ?"
 shroud.8380.a:"พวกเรายอมสวมลงตราสัญลักษณ์ประทับนี้ด้วยเกียรติและความภาคภูมิใจอันสูงสุด"
 shroud.8380.a.tt:"ครึ่งหนึ่งของจำนวนประชากรทั้งหมดของจักรวรรดิเราจะได้รับคุณลักษณะลงตราประทับตราชาวชราวด์ (['trait:trait_marked']ลักษณะต่าง ๆ"
 shroud.8380.b:"แนวทางปฏิบัตินี้เป็นความเชื่อที่ผิดทิศทางเฉไฉออกนอกลู่นอกทาง"
 approach_blind_selected_tt:"ไม่ได้รับการเลือกแนวปฏิบัติแนวทาง(ปรบมือ)$approach_situation_breach_shroud_endbringers_blind$"
 approach_forsake_selected_tt:"ไม่ได้รับการเลือกแนวปฏิบัติแนวทาง(ปรบมือ)$approach_situation_breach_shroud_endbringers_forsake_flesh$"

 trait_marked:"ผู้ถูกประทับตรา"
 trait_marked_desc:"ในการแสดงออกอันน่าสยดสยองถึงการอุทิศตน เผ่าพันธุ์นี้ได้ประทับตราบนเนื้อหนังของตนด้วยเครื่องหมายแห่ง 'จุดจบภัยพิบัติ' (ตอนจบ)"
 trait_marked_unity_bonus: "£unity£ ที่ผลิตได้ต่อ 100 £pops£ ประชากร : §G+0.06§!"

 endbringers_sanity:"สติท่ามกลางความคลุ้มคลั่ง"
 endbringers_sanity_desc:"ความตั้งใจอันแรงกล้าในการรักษาสติสัมปชัญญะช่วยป้องกันเราจากการดิ่งลงสู่กับดักแห่งความคลุ้มคลั่ง"

 # Breach the Shroud
 shroud.2840.name: "$BREACHING_SHROUD_PROJECT$"
 shroud.2840.desc:"$shroud.2800.intro$ จากส่วนลึกอันไร้รูปกายของมัน มีตัวตนอันน่าสะพรึงกลัวซึ่งมีพลังอำนาจล้นพ้นผุดขึ้นมา มันคือ §Rเสียง(ร้องไห้)§! และมันทิ่มแทงเข้าสู่ก้นบึ้งจิตประสาทของเราด้วยพลังอำนาจที่สั่นสะท้าน\n\n§R\"จงรับรู้ชื่อของข้า\"§!\n\nเวลานี้เราเพิ่งรับรู้ว่าจิตสำนึกอันน้อยนิดของเรานั้นอยู่ห่างไกลจาก §Rเสียง(ร้องไห้)§! เพียงใด ผนึกได้แตกร้าวลงแล้ว และในไม่ช้า ความกว้างใหญ่ไพศาลทั้งหมดของสิ่งที่เราเป็นจะถูกเปิดเผยออกประจักษ์ชัด\n\n[GetTelepathPlural] ของเราพร้อมแล้วที่จะดำดิ่งสู่ใจกลางม่านพลังชราวด์เพื่อค้นหาชื่อจริงของผู้อุปถัมภ์ที่ยิ่งใหญ่ของเรา"
 shroud.2840.a:"ได้เวลาสื่อสารจิตวิญญาณแล้ว"

 ENDBRINGERS_COMMUNE_WITH_THE_VOICE:"สื่อสารจิตวิญญาณกับ §Rเสียง(ร้องไห้)§!"
 ENDBRINGERS_COMMUNE_WITH_THE_VOICE_DESC:"พวกเรามารวมพลังตั้งกลุ่มจิตปักหลักกันบนดาว [capital_scope.GetName] ด้วยเป้าหมายแน่วแน่และเจตจำนงเด็ดเดี่ยวเพียงหนึ่งเดียว\n\nพวกเราจะหยั่งลึกเข้าหาพลังจิต (§Hเดอะชราวด์§!) และบังคับให้พละกำลังอันยิ่งใหญ่ระดับมหึมาของ §Rเสียงกระซิบกระซิบ(ร้องไห้)§! ยินยอมตอบรับพิจารณาทำการติดต่อพูดคุยสื่อสารกับจิตใจเรา\n\nพวกเราตระหนักรู้และเรียกขานภัยพิบัตินี้มาตลอดว่ามันคือภัยหายนะล่มสลายจักรวาล บ้างก็ขนานนามขานชื่อมันว่าเป็นวันพิพากษาชำระแค้น(ร้อง)บัดนี้ มันจะยินยอมเผยสัจจะชื่อจริงแก่เรา และด้วยวิทยาการองค์ความรู้จุดนี้จะนำพาเราก้าวไปสู่ความก้าวหน้าอย่างยิ่งใหญ่ไร้ขีดจำกัด"
 ENDBRINGERS_COMMUNE_WITH_THE_VOICE_PROJECT_TOOLTIP:"เงื่อนไขความสำเร็จ: ทำกระบวนการหยั่งลึก (§Hเลเยอร์§!) ครบ 3 ครั้ง ([GetEndbringersDelveCount]/3)"

 # EotC Delve Events
 shroud.8420.title:"ด่านทดสอบความเงียบสงัด(การพิจารณาคดีของความเงียบ)"
 shroud.8420.desc:"พวกเราก้าวข้ามผ่านทะลวงมิติลงสู่ชราวด์ แรงรวบรวมเจตจำนงที่เป็นเอกภาพหนึ่งเดียวของเราช่วยกันสะกดขัดขวางเสียงกระซิบโกลาหลสับสนรอบข้างเพื่อไม่ให้มารบกวนเราจากเป้าหมายที่แท้จริง ซึ่งก็คือ §R[Root.Patron:end_of_the_cycle.GetPreCommunicationName]§!\n\nแต่เป้าหมายเพียงด้านเดียวยังไม่อาจสร้างโล่ป้องกันพิทักษ์ความปลอดภัยดวงจิตเราได้ทั้งหมด เสียงกระซิบไร้ที่มาส่งคำพูดปลอบใจที่สับสนประดังกันเข้ามา ล่อลวงเราด้วยเรื่องน่ารำคาญเล็กๆ น้อยๆ ที่ไร้สาระซึ่งแต่ละประเด็นก็ไร้ความหมายย่อยยับกว่ารายการอื่น ทว่าทั้งหมดกลับดูจูงใจให้เราคล้อยตามอย่างยิ่งในจังหวะนั้น\n\nในจังหวะที่ดวงจิตกลมเกลียวของเราเริ่มแตกร้าวเสียหาย เอนทิตีโบราณตนดังกล่าวปรากฏตัวย้อนกลับมา คำสั่งเสียงกึกก้องกังวานเด็ดขาดเพียงหนึ่งคำส่งสะท้อนระลอกๆ ผ่านความว่างเปล่าห้วงลึก:\n\n§R"จงเงียบเสียงลงเสีย"§!"
 shroud.8420.a:"จงอยู่ในความนิ่งสงบเงียบงันและยอมอดทนรับเผชิญหน้า"
 shroud.8420.a.reply:"คำสั่งเด็ดขาดเสียงดังดังกล่าวช่วยแยกชลชลความสับสนโกลาหลปนเปออกไป ชำระล้างขจัดเสียงรบกวนที่สับสน ลบล้างการทำงานที่ปนเปที่มุ่งหมายจะกลืนกินควบคุมเรา ดวงจิตใจประสาทสัมผัสของเรามีเสถียรภาพมั่นคงขึ้นในระหว่างที่เราผ่านพ้นช่วงการแตกสลายมาได้\n\nเอนทิตี §R[Root.Patron:end_of_the_cycle.GetPreCommunicationName]§! ถอยร่นห่างไกลลึกเข้าไปยังก้นบึ้งมิติชราวด์เพิ่มเติม ความแจ่มสว่างแจ้งสงบที่หลั่งไหลกวาดตามมาดูเงียบสงัดสะกดจนแทบหูดับ มันจัดระเบียบตัวมันลงในช่องว่างระบบความคิดของเรา ปล่อยจิตใจเราไว้ด้วยเจตจำนงที่ค้นพบใหม่ได้อย่างมั่นคง\n\nพร้อมกับของขวัญอันล้ำค่า ของขวัญอันแสนงดงามตระการตา"
 shroud.8420.a.tooltip:"ตัวดัดแปลงคุณภาพความวิปลาสความบ้าคลั่ง (§Y$endbringers_madness_1$§!) สูญเสียผลลัพธ์ดังต่อไปนี้:\n$t$$MOD_POP_AMENITIES_USAGE_MULT$: $@madness_base_pop_amenities_usage_mult|0=-%$"

 shroud.8430.title:"ด่านทดสอบความบริสุทธิ์หมดจด"
 shroud.8430.desc:"เมื่อยามที่เราหยั่งลึกทะลวงผ่านเข้าหาชราวด์เพิ่มเติม เราเฝ้าสังเกตเห็นเบาะแสการเน่าเสียของสภาวะความปั่นป่วนทางพลังจิต\n\nจิตใจที่เน่าเฟะและขาดเป้าหมายก่อตัวเป็นชั้นคลื่นรบกวนสะสมหนาแน่น ปนเปื้อนมลพิษให้กับมิติชราวด์ด้วยความเสื่อมโทรมที่โชยกลิ่นอับ ท่ามกลางความเสื่อมทรามอันเป็นอุปสรรคเหล่านี้ เราเริ่มรู้สึกเข้าถึงและรับรู้การปรากฏตัวระดับมหึมาของเป้าหมายที่เราเฝ้าค้นหา ซึ่งก็คือเอนทิตี §R[Root.Patron:end_of_the_cycle.GetPreCommunicationName]§!\n\nเจตนารมณ์ความประสงค์ร้ายที่เป็นพิษของมันหลั่งไหลอาบเต็มดวงจิตจิตวิญญาณของเราในยามที่มันตรงเข้าบดทับสลายความสับสนโกลาหลรอบข้าง พวกเราเตรียมตัวและเตรียมประสาทสัมผัสรับมือกับการไถ่ถอนความผิดและชำระล้างที่กำลังจะอุบัติในไม่ช้า ในขณะที่คำสั่งก้องสะท้อนดังผ่านความว่างเปล่าห้วงลึก:\n\n§R"ความมีระเบียบวินัย ความเป็นน้ำหนึ่งใจเดียวกันเป็นเอกภาพ"§!"
 shroud.8430.a:"จงยืนหยัดต้านทานไว้อย่างถึงที่สุด!"
 shroud.8430.a.reply:"คำสั่งดังกล่าวแผ่ซ่านกวาดผ่านขจัดความสับสนโกลาหลอันเป็นพิษภัย\n\nกลุ่มเสียงลึกลับที่นับไม่ถ้วนร้องตะโกนลั่นขึ้นมาด้วยความระทมปวดร้าวในยามที่เอนทิตี §R[Root.Patron:end_of_the_cycle.GetPreCommunicationName]§! กวาดล้างทำลายล้างความบิดเบี้ยวทางจิตใจของสิ่งมีชีวิตทั้งปวงที่เป็นภัยโรคระบาดในชราวด์ออกไป ดินแดนที่ได้รับการชดใช้ชำระความบกพร่องเสร็จสิ้นแล้วหลงเหลือเด่นอยู่เบื้องหลังกระบวนการชำระล้าง\n\nในจังหวะที่เอนทิตีโบราณเริ่มดำดิ่งลึกซ่อนตัวเข้าไปในมิติชราวด์เพิ่มเติม พวกเราถูกทิ้งไว้ให้ทำหน้าที่เฝ้าติดตามบันทึกวิจัยผลลัพธ์ที่ตามมาของการชำระล้างความบริสุทธิ์อันสมบูรณ์แบบของมันอย่างสัจจริง"
 shroud.8430.a.tooltip:"ตัวดัดแปลงคุณภาพความวิปลาสความบ้าคลั่ง (§Y$endbringers_madness_2$§!) สูญเสียผลลัพธ์ดังต่อไปนี้:\n$t$$mod_planet_pops_upkeep_mult$: $@madness_base_planet_pops_upkeep_mult|0=-%$"

 shroud.8440.title:"ด่านทดสอบอัคคีเพลิงชำระล้าง(การทดสอบเปลวไฟ)"
 shroud.8440.desc:"นับตั้งแต่ก้าวผ่านพ้นเข้าสู่ชราวด์ ความรู้สึกเดียวที่พวกเราตระหนักรับรู้ได้คือความทุกข์ระทมอย่างแสนสาหัส ละอองหมอกพลังจิตวิญญาณที่หมุนวนปกติได้แปรสภาพกลายเป็นกองเพลิงอัคคีชำระล้างที่ร้อนแรง แผดเผาไหม้ทำลายโครงสร้างประสาทสัมผัสจิตใจเราโดยตรง\n\nท่ามกลางความเจ็บปวดทรมานอันแสนทารุณ พวกเรามองเห็นภาพประจักษ์นิมิตของมหานครใหญ่โตหลายแห่งที่ถล่มทลายสลายกลายเป็นเเถ้าถ่านละลาย ดาวเคราะห์บริวารจำนวนมากถูกเพลิงแผดเผากลืนกิน ประชากรทั้งหมดดิ้นรนเจ็บปวดอย่างแสนทารุณในยามที่อัคคีเพลิงสีม่วงเผาไหม้ทำลายสังขารกายเนื้อของพวกเขาจนมอดสลายกลายเป็นเพียงกองฝุ่นธุลีเศษขี้เถ้าที่ยังคุกรุ่น\n\nณ จุดศูนย์กลางของกองไฟนรกดังกล่าว พวกเราสัมผัสเข้าถึงการมีตัวตนของเอนทิตี §R[Root.Patron:end_of_the_cycle.GetPreCommunicationName]§! ในขณะที่พละกำลังอันทรงพลังของมันกำลังเตรียมคุกคามเพื่อกลืนกินสลายนิเวศความจริงทั้งหมด เอนทิตีได้ป่าวประกาศกิตติศัพท์ขึ้นว่า:\n\n§R\"การปลดปล่อยสู่อิสรภาพโดยแท้จริง)§!"
 shroud.8440.a:"ยอมศิโรราบต่อกระบวนการชดใช้ไถ่ถอนความผิดและชำระล้างเสียแต่โดยดี"
 shroud.8440.a.reply:"อัคคีเพลิงพลังจิตลุกท่วมล้อมรอบเข้ากลืนกินจิตใจของเรา แผดเผาทำลายความชะล่าใจและพฤติกรรมหลงระเริงไปจนสิ้น หลงเหลือปักหลักไว้เพียงแค่เจตจำนงที่ผ่านการชำระกรองหมดจดสมบูรณ์\n\nบัดนี้พวกเราสามารถส่องมองเห็นและเข้าใจเป้าหมายอันยิ่งใหญ่งดงามตระการตาของเอนทิตี §R[Root.Patron:end_of_the_cycle.GetPreCommunicationName]§! รวมถึงความเรียบง่ายที่มีประสิทธิภาพไร้ขีดจำกัดที่มันนำเสนอแบ่งปันให้แก่ดวงจิตเราอย่างสัจจริง"

 shroud.8450.title: "$utopia.3310.name$"
 shroud.8450.desc:"เสียงประกาศก้องระลอกสะท้อนกังวานลั่นดังขึ้นมา:\n\n§R\"พวกเจ้าต่างทราบชื่อจริงของข้าดีแล้ว\"§!\n\nความคืบหน้าปลายทางสูงสุดของการเดินทางข้ามพ้นสู่หมู่ดาวดาราจักร คำตอบสำหรับคำถามข้อสงสัยที่มีมายาวนานหลายร้อยปีมาปรากฏเด่นอยู่ตรงนี้แล้ว อำนาจเจตจำนงระดับสูงสุดของ $end_of_the_cycle_color_article_cap$ บีบบังคับควบคุมเรา พันธสัญญาพันธสัญญาร่วม(เสียงลาก)ของเราได้รับการสถาปนาขึ้นโดยสมบูรณ์เด็ดขาด\n\n§R\"กระบวนการเริ่มต้นของจุดจบได้เริ่มต้นแล้ว\"§!\n\nความปวดร้าว การดิ้นรนเจ็บปวดทุรนทุราย ความสัจจริงอันแน่นอน ในนาทีที่ถ้อยคำเสียงกระซิบเงียบสงัดจางหายไป ชะตากรรมจุดสิ้นสุดของเราได้รับการตราปิดผนึกเรียบร้อยแล้ว\n\nบัดนี้พวกเรามองเห็นทัศนียภาพความจริงประจักษ์แจ้งแล้ว กาแล็กซีดาราจักรที่เข้าสู่ความเงียบสงัดสลบไสลไร้เสียง ปล่อยตัวมันไหลซึมซาบอยู่ภายใต้ชะตากรรมที่หลีกเลี่ยงไม่ได้ของการระเหยแผ่ขยายของรัศมีภัยพิบัติจุดจบ (§R$end_aura$§!)"
 shroud.8450.a:"ความหลีกเลี่ยงไม่ได้กำลังรออยู่"
 shroud.8450.a.homicidal:"ความสยองขวัญอันงดงามกำลังรออยู่"
 shroud.8450.a.tech_tooltip:"เทคโนโลยีที่ได้รับ:\n£society£['technology:tech_psionic_aura']\n£society£['technology:tech_aura_intensification']"

