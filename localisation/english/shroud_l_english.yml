 civic_twisted_experimenters_desc:"กระบวนการยุติธรรมทางกฎหมายและการแสวงหาความรู้ได้รับการแก้ไขด้วยคำตอบเดียวกันในสังคมนี้ นักวิจัยผู้ปิดทองหลังพระทำการทดลองที่รุนแรงกับกลุ่มทดลองที่ดึงมาจากสังคมนอกกฎหมายใต้ดิน อัตราการเสียชีวิตที่เกิดขึ้นเป็นบางครั้งถือเป็นราคาที่ต้องจ่ายเพื่อความก้าวหน้า"
 civic_twisted_experimenters_effects:"เริ่มต้นเกมพร้อมกับสถานการณ์วิกฤต ['concept_experimental_testing'] ซึ่งจะมอบข้อมูลเชิงลึกด้านวิทยาศาสตร์ให้เมื่อเสร็จสิ้น\nสามารถสร้างและเริ่มจาก:£building£['building:building_experimentation_chambers_1'].\nทาสที่ไม่ใช่เมียทุกคน เข้าถึง['concept_slave_orderly']งานทาส\nเข้าใช้['concept_slave_army']: §Y$abomination_army$§!"

 civic_twisted_experimenters_hive_mind:"จิตสำนึกเพื่อการบำบัดรักษา"
 civic_twisted_experimenters_hive_mind_desc:"ประชากรที่เบี่ยงเบนจากกลุ่มร่วมจะถูกนำมาใช้เป็นอาสาสมัครในการทดลองวิจัยทางวิทยาศาสตร์ที่ก้าวหน้าโดยไม่มีข้อจำกัดใดๆ ในวิธีการดำเนินงาน ช่วยให้โดรนที่มีปัญหาสามารถรักษาคุณค่าในฐานะสินทรัพย์ที่สามารถใช้แล้วทิ้งได้"
 civic_twisted_experimenters_hive_mind_effects:"เริ่มต้นเกมพร้อมกับสถานการณ์วิกฤต ['concept_experimental_testing_hive_mind'] ซึ่งจะมอบข้อมูลเชิงลึกด้านวิทยาศาสตร์ให้เมื่อเสร็จสิ้น\nสามารถสร้างและเริ่มจาก:£building£['building:building_experimentation_chambers_1']."

 civic_twisted_experimenters_corporate:"ฝ่ายวิจัยและพัฒนาคดีความ"
 civic_twisted_experimenters_corporate_desc:"บรรษัทข้ามชาตินี้ได้เริ่มแนวคิดริเริ่มที่น่าตื่นเต้นเพื่อลดความล่าช้าของกระบวนการยุติธรรมและสร้างนวัตกรรมทางวิทยาศาสตร์สูงสุด พลเมืองที่มีปัญหาคดีความจะถูกส่งตัวไปปฏิบัติงานในโครงการวิจัยทดลอง ดำเนินการทดสอบอย่างเข้มงวดเพื่อสร้างความก้าวหน้าทางเทคโนโลยี อัตราการสูญเสียชีวิตจะถูกควบคุมให้อยู่ในขอบเขตการคาดการณ์"
 civic_twisted_experimenters_corporate_effects:"เริ่มต้นเกมพร้อมกับสถานการณ์วิกฤต ['concept_experimental_testing_corporate'] ซึ่งจะมอบข้อมูลเชิงลึกด้านวิทยาศาสตร์ให้เมื่อเสร็จสิ้น\nสามารถสร้างและเริ่มจาก:£building£['building:building_experimentation_chambers_1'].\nสร้างได้£building£['concept_building_carceral_test_facility'] $BRANCH_OFFICE_BUILDING$.\nทาสที่ไม่ใช่เมียทุกคน เข้าถึง['concept_slave_orderly']งานทาส\nเข้าใช้['concept_slave_army']: §Y$abomination_army$§!"

 experimenters_we_will_learn_1:"เราจะได้เรียนรู้อย่างมากจากสิ่งนี้"
 experimenters_we_will_learn_2:"แนวทางการทดลองวิจัยรูปแบบใหม่"
 experimenters_we_will_learn_3:"พารามิเตอร์การทดสอบใหม่ ช่างน่าตื่นเต้นยิ่งนัก"
 experimenters_tragic_lesson_1:"พวกเราจะได้รับความรู้มากมายจากโศกนาฏกรรมครั้งนี้"
 experimenters_tragic_lesson_2:"โศกนาฏกรรม... ทว่าเป็นโอกาสสำหรับแนวคิดการทดลองใหม่ๆ"
 experimenters_tragic_lesson_3:"บทเรียนที่น่าเศร้า ทว่าข้อมูลที่ได้รับจะมีประโยชน์มาก"
 experimenters_ermerging_crime_1:"สภาพแวดล้อมเช่นนี้จะช่วยให้ทีมงาน [GetExperimentalEngineerPlural] ของเราได้รับโอกาสมากมายสำหรับการทดลองใหม่ๆ"
 experimenters_ermerging_crime_2:"อย่างน้อยที่สุด การกระทำความผิดเช่นนี้ก็ช่วยให้เรามีโอกาสทองในการสำรวจวิจัยทางวิทยาศาสตร์แนวทางใหม่ที่น่าสนใจ"
 experimenters_ermerging_crime_3:"สถานการณ์เหล่านี้จะช่วยให้เรามีโอกาสที่จะทำการทดลองใหม่ๆ ในเชิงลึก"
 experimenters_ermerging_crime_4:"สภาพแวดล้อมเช่นนี้เป็นแหล่งข้อมูลชั้นดีสำหรับกลุ่มตัวอย่างการทดสอบของทีมงาน [GetExperimentalEngineerPlural] ของเรา"

# Secret Societies
 civic_tooltip_not_secret_societies: "ไม่มีพลเมือง ['concept_secret_societies_civics']"

 civic_secret_societies:"สมาคมลับเบื้องหลัง"
 civic_secret_societies_desc:"กลุ่มผู้นำลับที่เป็นชนชั้นนำคอยควบคุมกระบวนการทางเมืองอย่างซับซ้อนอยู่เบื้องหลัง เชื่อมโยงกิจการภายในประเทศเข้ากับโลกดวงดาวอื่นๆ"
 civic_secret_societies_effects:"กลุ่มการเมืองสมาคมลับ ['concept_ss_factions'] จะปรากฏตัวขึ้นหลังจากติดต่อประสานงานกับจักรวรรดิอื่น\nเริ่มด้วยความสามารถในการประมวลผล['concept_proxy_wars'].\n$job_bureaucrat_plural_with_icon$จะนํามาซึ่ง$i_unity$ต่อการทํางานและประสบความสําเร็จ§Yสงครามพร็อกซี§!.\nเริ่มใน['concept_first_contact']กับ 2 จักรวรรดิเพื่อนบ้าน\n$INFILTRATION_LEVEL$ได้รับในจักรวรรดิหลังจากที่§Y$first_contact$§!: §G+$@secret_society_infiltration_gain|0$§!"

 civic_secret_societies_corporate:"พันธมิตรสมาคมลับข้ามชาติ"
 civic_secret_societies_corporate_desc:"กลุ่มบริหารที่ทรงพลังที่สุดของบรรษัทนี้ดำเนินปฏิบัติการนอกดวงดาวภายใต้ระบบเก็บรักษาความลับขั้นสูงสุด หากจำเป็นต้องถาม แสดงว่าคุณไม่มีความจำเป็นที่จะต้องรับทราบข้อมูล"
 civic_secret_societies_corporate_effects:"กลุ่มการเมืองลับ ['concept_ss_factions'] จะปรากฏตัวขึ้นหลังจากติดต่อประสานงานกับจักรวรรดิอื่น\nเริ่มด้วยความสามารถในการประมวลผล['concept_proxy_wars'].\n$job_bureaucrat_plural_with_icon$จะนํามาซึ่ง$i_unity$ต่อการทํางานและประสบความสําเร็จ§Yสงครามพร็อกซี§!.\nเริ่มใน['concept_first_contact']กับ 2 จักรวรรดิเพื่อนบ้าน\n$INFILTRATION_LEVEL$ได้รับในจักรวรรดิหลังจากที่§Y$first_contact$§!: §G+$@secret_society_infiltration_gain|0$§!\nเดอะ£building£ §Y$building_corporate_embassy$§! $megacorp_civic_branch_office_building_effect$"

 shroud.5012.title:"สมาคมลับปรากฏตัว"
 shroud.5012.desc:"ความสงสัยของเราได้รับการพิสูจน์แล้ว อารยธรรมของ [first_neighbor.GetAdjective] และ [second_neighbor.GetAdjective] ได้ยืนยันว่าพวกเขาได้รับการติดต่อผ่านช่องทางอย่างไม่เป็นทางการก่อนที่การสื่อสารทางการจะเริ่มขึ้นอย่างเป็นทางการ\n\nกลุ่มการเมือง §Hข้อ เท็จ จริง§! เหล่านี้เปิดเผยตัวตนออกมาจากเงามืดของเราและยอมรับการมีอยู่ของพวกเขา องค์กรลับในอดีตซึ่งเป็นที่รู้จักในนาม §H$pft_the_curtain$§!, §H$pft_the_masquerade$§!, และ §H$pft_the_grand_dance$§! กำลังขอเปิดเจรจาทางการกับพวกเราอย่างเปิดเผย\n\nความต้องการที่แท้จริงของพวกเขาคือสิ่งใด และพวกเขารู้ข้อมูลที่พวกเขาทราบได้อย่างไร อาจเป็นสิ่งที่เราไม่มีวันเข้าใจอย่างถ่องแท้ ทว่ามันอาจเป็นผลประโยชน์สูงสุดของเราที่จะยอมปฏิบัติตามความต้องการของพวกเขาไปก่อน"
 shroud.5012.a:"และแล้วงานรื่นเริงเบื้องหลังก็เริ่มขึ้น..."
 shroud.5012.tt:"กลุ่มการเมืองสมาคมลับ §Yข้อ เท็จ จริง ของ สมาคม ลับ§! จะปรากฏตัวขึ้นในไม่ช้า:\n$t$§H$pft_the_curtain$§!\n$t$§H$pft_the_masquerade$§!\n$t$§H$pft_the_grand_dance$§!"

 shroud.5013.title:"การสื่อสารที่ประหลาด"
 shroud.5013.desc:"มีผู้คนในหมู่พวกเราที่ปฏิบัติงานอยู่เบื้องหลังม่านการทูต และในตอนนี้เราสงสัยว่าการเข้าถึงของพวกเขาไม่ได้จำกัดอยู่แค่บนโลกปิตุภูมิของเราเท่านั้น\n\nแม้จะเพิ่งเริ่มต้นผจญภัยไปสู่ห้วงดวงดาวได้ไม่นาน ทว่าเราได้เข้าสู่การสื่อสารกับสิ่งมีชีวิตอื่นๆ ด้วยความราบรื่นอย่างน่าเหลือเชื่อ นี่ดูเหมือนจะเป็นมากกว่าเรื่องบังเอิญธรรมดา เราสงสัยว่าความสัมพันธ์ระหว่างดวงดาวเหล่านี้มีต้นกำเนิดมาจากเบื้องหลังการประชุมลับของสมาคม §Hข้อ เท็จ จริง§! ลับหลายแห่งที่หยั่งรากลึกอยู่ในสังคมของเรา\n\nบางทีเมื่อเราเรียนรู้เพิ่มเติมเกี่ยวกับสิ่งมีชีวิตเหล่านี้ ผู้คนในเงามืดของเราจะยอมเผยตัวตนออกมา"
 shroud.5013.a:"พวกเขาอยู่ฝ่ายเดียวกับเรา หรือต่อต้านเรา?"

