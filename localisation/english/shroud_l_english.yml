 shroud_instrument_covenant_chain_title: "$instrument_covenant_chain_title$"
 shroud_instrument_covenant_chain_desc.intro:"เราได้ริเริ่มกุมสร้างพันธะผูกพันกับตัวตนแห่งม่านพลังที่รู้จักกันในนาม §Hเครื่องดนตรีแห่งความปรารถนา(ความปราถนา)§! มันคอยประคบประหงมประเล้าประโลมจิตใจและประทานเศษเสี้ยวอานุภาพพลังแก่เราเพื่อแลกเปลี่ยนกับเครื่องเซ่นไหว้บูชา และน่าจะมีสิ่งอื่นตามมาอีกในอนาคต\n\n[GetTelepathPlural] ของเราเสนอแนวทางทฤษฎีว่าสายเชื่อมต่อจะลึกซึ้งแน่นหนาขึ้นได้โดยการปรับเปลี่ยนพฤติกรรมและการกระทำของเราให้ตอบสนองเจตจำนงของผู้อุปถัมภ์"
 shroud_instrument_covenant_chain_desc:"$shroud_instrument_covenant_chain_desc.intro$\n\nเครื่องดนตรีเฝ้าปรารถนาความโหยหาอย่างบ้าคลั่ง ความสุขสำราญตามใจตน ความเสื่อมทราม และการจองจำตกเป็นทาส ล้วนคือคำจัดความสลักสะกดนามของตัวตนผู้นี้"
 shroud_instrument_covenant_chain_begin: "$instrument_covenant_chain_begin$"
 shroud_instrument_covenant_chain_end: "$instrument_covenant_chain_end$"

 robot_shroud_instrument_covenant_chain_title: "$shroud_instrument_covenant_chain_title$"
 robot_shroud_instrument_covenant_chain_desc:"$shroud_instrument_covenant_chain_desc.intro$\n\nเครื่องดนตรีเฝ้าปรารถนาความโหยหาอย่างบ้าคลั่ง การอุปโภคบริโภคที่ไร้การควบคุม การขูดรีดเอาเปรียบตักตวง และการจองจำตกเป็นทาส ล้วนคือคำจัดความสลักสะกดนามของตัวตนผู้นี้"

 # Cradle of Souls
 shroud.4600.title: "$utopia.3304.name$"
 shroud.4600.desc.default: "[GetCradleCovenantProposedDesc]"
 shroud.4600.desc.hive: "$shroud.4600.desc.default$"
 shroud.4600.desc.gestalt_machine: "$shroud.4600.desc.default$"
 shroud.4600.desc.individual_machine: "$shroud.4600.desc.default$"
 shroud.4600.desc_homicidal:"ขณะที่เราจมดิ่งลงสู่ม่านพลัง ตัวตนหนึ่งก็แผดเผาภาพนิมิตในใจส่วนลึกของเรา แสงเรืองรองที่แผ่ซ่านบดบังทัศนวิสัยสิ่งอื่นใดจนหมดสิ้น มันคือ $the_cradle_of_souls_color_article$ และมันแผดเผาอยู่ใจกลางแกนของเรา\n\nมันเรียกร้องข้อเสนอประนีประนอมในระดับกาแลกซี สันติภาพที่น่าอนาถใจของสิ่งมีชีวิตที่ไม่อาจอยู่ร่วมกันได้ ขุมพลังอันยิ่งใหญ่กำลังรอคอยเราอยู่ มันให้คำสัญญา หากเพียงเรายอมรับนิมิตที่น่ารังเกียจนี้\n\n§Hหากเพียงแต่เรายอมเปิดโอกาสให้มันแต่งแต้มขอบฟ้าเส้นทางใหม่ ๆ§!\n\nแสงของอู่วิญญาณช่างไม่ละลดหย่อนผ่อนปรน และพลังของมันก็ชัดแจ้งเกินจะปฏิเสธได้ จิตใจของเราจะยอมเปิดรับสิ่งนี้จริงหรือ? มันจะบั่นทอนความตั้งใจแน่วแน่ของเราหรือเปล่า?"
 shroud.4600.desc_non_homicidal:"ขณะที่จิตใจของเราจมดิ่งลงสู่ม่านพลัง ตัวตนหนึ่งก็ผลิบานอยู่ภายในตัวเรา เราสัมผัสได้ถึงแสงเรืองรองที่ทอดผ่านสัมผัสทุกสรรพสิ่ง แผ่รังสีของความเป็นระเบียบและความสมดุล มันคือ $the_cradle_of_souls_color_article$ และมันกระตุ้นสั่นคลอนหัวใจแกนหลักของเรา\n\nมันไม่ปรารถนาสิ่งใดนอกจากสันติภาพอันยั่งยืนถาวร - กาแลกซีที่ได้รับการเยียวยารักษาจากความโกลาหล หากเราแบ่งปันนิมิตร่วมไปกับมัน มันจะสามารถหลอมรวมสร้างให้เรากลายเป็นผู้นำพาความปรองดองร่วมประสานเสียง มันให้คำมั่นสัญญาสายสัมพันธ์ยึดโยงความเชื่อมั่นที่ไม่มีวันแตกสลาย\n\n§Hหากเพียงแต่เรายอมเปิดโอกาสให้มันแต่งแต้มขอบฟ้าเส้นทางของเรา§!\n\nความหวังของอู่วิญญาณบีบกดดันจิตใจเราอยู่"
 shroud.4600.a:"จัดตั้งทำพันธสัญญากับ $the_cradle_of_souls_color_article$"

 shroud.4605.intro:"ทุกอย่างเสร็จสิ้นแล้ว เราจัดตั้งทำพันธสัญญากับ $the_cradle_of_souls_color_article$ เจตจำนงของมันแผ่กระจายไหลเวียนผ่านทั่วตัว §H[Root.GetName]§!"
 shroud.4605.desc.default: "$shroud.4605.desc.non_gestalt$"
 shroud.4605.desc.gestalt: "$shroud.4605.intro$\n\n[GetCradleCovenantFormedDesc]"
 shroud.4605.desc.non_gestalt: "$shroud.4605.intro$\n\n[GetCradleCovenantFormedDesc]"
 shroud.4605.desc.hive: "$shroud.4605.desc.gestalt$"
 shroud.4605.desc.gestalt_machine: "$shroud.4605.desc.gestalt$"
 shroud.4605.desc.individual_machine: "$shroud.4605.desc.non_gestalt$"
 shroud.4605.desc_outro_homicidal:"ผลกระทบต่อนิมิตสภาพจิตใจของชาว [Root.GetSpeciesAdj] ชัดเจนแจ่มแจ้งจนปฏิเสธไม่ได้ในเวลานี้ ความคิดของ [Root.GetIndividualPlural] จำนวนมากเริ่มโดนยาพิษเป็นไอเดียความนึกคิดเรื่องสันติภาพทางกาแล็กซี ก่อให้เกิดความคลาดเคลื่อนและการสั่นคลอนจิตวิญญาณระดับรุนแรงผ่านทั่วทั้งสังคมของเรา\n\nตามรายงานของ [GetTelepathPlural] ของเรา พรอันประเสริฐของข้อตกลงนี้ยังคงมาไม่ถึง จนกว่าจะพ้นช่วงเวลากาลเวลานี้ไป ความขัดแย้งแสนทรมานน่ากลัวจะเข้าคุกคามในสติจิตใจของเรา นี่เราทำอะไรลงไปกับจิตวิญญาณตัวเองกันแน่?"
 shroud.4605.desc_outro_gestalt:"ผลกระทบต่อนิมิตสภาพจิตใจของชาว [Root.GetSpeciesAdj] สามารถตรวจพบได้แล้ว ในขณะที่เรามุ่งเป้าไปที่ความสัมพันธ์อันสงบสันติภาพทั่วทั้งกาแล็กซี ความขัดแย้งใด ๆ กับประเทศเพื่อนบ้านย่อมก่อให้เกิดความปั่นป่วนในจิตสำนึกร่วมของเรา\n\nความปั่นป่วนเล็กน้อยนี้คือราคาของพันธะผูกพันของเรา ตามรายงานจาก [GetTelepathPlural] ของเรา พรอันประเสริฐที่สุดของอู่วิญญาณยังคงมาไม่ถึง"
 shroud.4605.desc_outro_non_gestalt:"ผลกระทบต่อนิมิตสภาพจิตใจของชาว [Root.GetSpeciesAdj] ประจักษ์ชัดแล้ว ในขณะที่เราโหยหาความสัมพันธ์อันสงบสันติภาพทั่วทั้งกาแล็กซี ความขัดแย้งใด ๆ กับประเทศเพื่อนบ้านย่อมก่อให้เกิดความทุกข์ระทมใจในหมู่ประชาชน\n\nความปั่นป่วนเล็กน้อยนี้คือราคาของพันธะผูกพันของเรา ตามรายงานจาก [GetTelepathPlural] ของเรา พรอันประเสริฐที่สุดของอู่วิญญาณยังคงมาไม่ถึง"
 shroud.4605.a.default: "[GetCradleCovenantFormedOption]"
 shroud.4605.a.gestalt: "[GetCradleCovenantFormedOption]"
 shroud.4605.opt.a.default:"ขอให้สิ่งทฤษฎีคาดการณ์ของพวกนั้นถูกต้องตรงจริงเถิด"
 shroud.4605.opt.a.gestalt:"เราเชื่อว่าผลงานประเมินของพวกนั้นถูกต้องแม่นยำ"
 shroud.4605.opt.a.homicidal:"สำหรับตอนนี้ เราทำได้เพียงแค่อดทนอดกลั้นเท่านั้น"

