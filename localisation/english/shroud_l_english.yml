 RECKONING_ARRIVAL_PROJECT:"การเผชิญหน้าวันพิพากษาชำระแค้น"
 RECKONING_ARRIVAL_PROJECT_DESC:"เวลานี้กาแล็กซีกำลังเผชิญภัยคุกคามจากตัวตนอันทรงพลังมหาศาลซึ่งรู้จักกันในชื่อ §R$NAME_Reckoning$§! (วันพิพากษาชำระแค้น) มันถูกประกอบสร้างขึ้นจากพลังงานบริสุทธิ์ ปรากฏตัวขึ้นมาอย่างกะทันหันและเริ่มสงครามล้างผลาญสลายสิ้น\n\nข้อมูลดิบที่มีอยู่ทั้งหมดบ่งชี้ว่าตัวตนนี้เป็นศัตรูที่ไม่เหมือนสิ่งใดที่เราเคยเผชิญหน้ามาก่อน หากเราปรารถนาที่จะเผชิญหน้าต่อสู้กับภัยคุกคามนี้ เราควรดำเนินการวิจัยกรณีฉุกเฉินเพื่อกำหนดวิธีการปะทะห้ำหั่นที่มีประสิทธิผลยิ่งขึ้น"

 shroud.11235.title: "$RECKONING_ARRIVAL_PROJECT$"
 shroud.11235.desc:"[GetScientistPlural] ของเราได้ดำเนินงานเสร็จสิ้นการวิจัยอย่างละเอียดเกี่ยวกับตัวตนอันทรงพลังซึ่งรู้จักกันในชื่อ §R$NAME_Reckoning$§!\n\nจากผลงานวิจัยของพวกเขา เราได้กำหนดวิธีการที่มีประสิทธิผลในการเผชิญหน้าพิชิตศัตรูรายนี้ด้วยเทคโนโลยีที่มีอยู่เดิมของเราสำเร็จ พลังงานที่ประกอบขึ้นเป็นร่าง $NAME_Reckoning$ สามารถถูกบั่นทอนเสื่อมสภาพลงได้โดยใช้อาวุธที่ดัดแปลงปรับแต่งซึ่งได้รับการออกแบบมาเพื่อเจาะทะลวงผ่านโล่พลังงานป้องกันโดยเฉพาะ\n\nแม้ว่ามันจะเป็นภัยร้ายที่น่ากลัวมาก ทว่าในเวลานี้เราก็มีโอกาสปะทะต่อสู้กับภัยคุกคามนี้ได้ดีขึ้นมาก"
 shroud.11235.a: "$extreme_frontiers.1531.i$"

 RECKONING_VULNERABILITY_PROJECT:"มันต้องมีจุดอ่อนอยู่บ้าง"
 RECKONING_VULNERABILITY_PROJECT_DESC:"แม้ว่าเราจะไม่ประสบความสำเร็จในการชนะรบศึกครั้งแรก ทว่าการปะทะห้ำหั่นของเรากับ §R$NAME_Reckoning$§! ก็นำส่งข้อมูลดิบล้ำค่ามาสำหรับการศึกษาพินิจวิเคราะห์\n\nการส่งมอบงานวิจัยอุทิศแก่อภิมหาร่างพลังงานลึกลับผู้นี้ จะช่วยให้เราสามารถระบุค้นเจอจุดอ่อนและพัฒนาวิธีการจู่โจมทำลายล้างที่เฉียบคมยิ่งขึ้นสำเร็จ"

 shroud.11240.title:"บทเรียนความรู้จากความพ่ายแพ้"
 shroud.11240.desc:"ตัวตน §R$NAME_Reckoning$§! เป็นอานุภาพกองทัพที่ยิ่งใหญ่เกินกว่ากองยานของเราจะพิชิตชัยลงได้ แม้เราจะเป็นฝ่ายปราชัย ทว่าศึกครั้งนี้ก็นำส่งข้อมูลที่สำคัญยิ่งเกี่ยวกับตัวตนพลังงานลึกลับผู้นี้ - ข้อมูลที่เราไม่มีวันได้รับหากปราศจากการปะทะสัมผัสโดยตรง\n\nผลงานวิเคราะห์ขั้นต้นระบุว่าเราสะสมจุดข้อมูลเพียงพอสำหรับสร้างแบบจำลองโครงสร้างองค์ประกอบของสิ่งชีวิตชนิดนี้ ด้วยงานวิจัยเพิ่มเติมเพิ่มเติม เราจะสามารถระบุจุดอ่อนช่องโหว่ของมันและปรับแต่งทิศทางการโจมตีของเราให้เฉียบคมยิ่งขึ้น"
 shroud.11240.a:"มันต้องมีจุดอ่อนแน่ ๆ"
 shroud.11245.title:"จุดอ่อนช่องโหว่ของ $NAME_Reckoning$"
 shroud.11245.desc.1:"[GetScientistPlural] ของเราได้สร้างความก้าวหน้าครั้งสำคัญในงานวิจัยเกี่ยวกับตัวตนพลังงานซึ่งรู้จักกันในชื่อ §R$NAME_Reckoning$§!"
 shroud.11245.desc.2.intro:"ตัวตนนี้ไม่เพียงปรากฏกายขึ้นมาจาก"
 shroud.11245.desc.2.outro:"การใช้อาวุธเลเซอร์ประเภทรุ่นที่ได้รับคุณสมบัติ 'สยบจิต' (psi-suppressive) จะช่วยให้กองยานรบของเราสามารถเข้าแทรกแซงขัดขวางเส้นทางเชื่อมต่อนี้ และทิ้งรูปกายทางกายภาพภายนอกของมันให้เปราะบางเผชิญช่องโหว่ภัยการโจมตี"
 shroud.11245.desc.2.psionic:"$shroud.11245.desc.2.intro$ §Hม่านพลัง§! ทว่ามันกลับสามารถรักษาขีดความสามารถการป้องกันตนเองไว้ได้ผ่านทางการเชื่อมต่อข้ามมิติกับอาณาจักรพลังจิตวิทยา $shroud.11245.desc.2.outro$"
 shroud.11245.desc.2.non_psionic:"$shroud.11245.desc.2.intro$ ความเป็นจริงอีกมิติหนึ่ง ทว่ามันกลับสามารถรักษาขีดความสามารถการป้องกันตนเองไว้ได้ผ่านทางการเชื่อมต่อข้ามมิติอันลึกลับ $shroud.11245.desc.2.outro$"

 reckoning_insight_modifier:"ความหยั่งรู้พิชิตพิพากษาชำระแค้น"
 reckoning_insight_modifier_desc:"จากการดำเนินงานวิจัยอย่างกว้างขวาง เราได้กำหนดวิธีการที่มีประสิทธิผลในการสร้างความเสียหายแก่ $NAME_Reckoning$ โดยการดัดแปลงรูปแบบสรรพาวุธดั้งเดิมที่มีอยู่แล้วของเรา"
 reckoning_vulnerability_modifier:"จุดอ่อนช่องโหว่ของวันพิพากษาชำระแค้น"
 reckoning_vulnerability_modifier_desc:"การใช้ประโยชน์ข้อมูลดิบจากการปะทะศึกครั้งแรกกับวันพิพากษาชำระแค้น(ร้อง)ช่วยให้เราค้นพบแนวทางสร้างความเสียหายที่รุนแรงขึ้นโดยอาศัยเทคโนโลยีปืนเลเซอร์ 'สยบจิต'"

