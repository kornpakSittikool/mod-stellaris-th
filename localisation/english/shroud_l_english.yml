 civic_ap_blockade_tt:"§Rคำเตือน: บล็อกเส้นทางการพัฒนาแบบยกระดับเผ่าพันธุ์ทั้งหมด ยกเว้น ['concept_psionic_ascension'] (เส้นทางพลังจิต)§!"
 civic_chosen:"ผู้ได้รับเลือก"
 civic_chosen_desc:"$civic_ap_blockade_tt$\n\nจากการได้รับอิทธิพลจากชราวด์ในประวัติศาสตร์ยุคแรก สังคมนี้จึงมีพันธกรณีที่จะต้องผูกพันสัญญาในการอุปถัมภ์กับเอนทิตีที่ทรงพลังตนหนึ่ง"
 civic_chosen_effects:"- เริ่มต้นเกมโดยการมีช่องทางติดต่อกับผู้อุปถัมภ์แห่งชราวด์ §Iผู้ติดตามที่ถูกตัดสิทธิ์§!.\n- $ADDITIONAL_TECHNOLOGIES_STRING$ £society£ ['technology:tech_psionic_aura']"
 civic_chosen_effects_additional:"- ได้รับแต้มความสามัคคี $i_unity$ เพิ่มขึ้นตามระดับความสอดคล้องจิต ['concept_attunement'] กับชราวด์"

 civic_hive_chosen:"กลุ่มผู้ได้รับเลือก"
 civic_hive_chosen_desc:"$civic_ap_blockade_tt$\n\nจากการได้รับอิทธิพลจากชราวด์ในประวัติศาสตร์ยุคแรก กลุ่มร่วมนี้จึงมีพันธกรณีที่จะต้องผูกพันสัญญาในการอุปถัมภ์กับเอนทิตีที่ทรงพลังตนหนึ่ง"

 civic_machine_chosen:"เครือข่ายอัครสาวกกระแสจิต"
 civic_machine_chosen_desc:"$civic_ap_blockade_tt$\n\nจากการได้รับอิทธิพลจากชราวด์ในการพัฒนาระบบระยะแรก เครื่องจักรเหล่านี้จึงถูกติดตั้งระบบพันธกรณีผูกพันสัญญาการอุปถัมภ์กับเอนทิตีที่ทรงพลังตนหนึ่ง"

 civic_corporate_chosen:"คณะผู้บริหารผู้ได้รับเลือก"
 civic_corporate_chosen_desc:"$civic_ap_blockade_tt$\n\nนับตั้งแต่ก่อตั้งบรรษัท บรรษัทข้ามชาตินี้ประสบความสำเร็จสูงสุดจากเอนทิตีลึกลับแห่งชราวด์ และดำเนินงานภายใต้พันธสัญญาข้อตกลงการอุปถัมภ์ร่วมกันตั้งแต่นั้นมา"
 civic_corporate_chosen_effects:"$civic_chosen_effects$\n- สามารถสร้างสิ่งก่อสร้างย่อย £building£ §Y$building_psionic_offices$§! ซึ่งจะได้รับผลลัพธ์ของ $megacorp_civic_branch_office_building_effect$"

 civic_tooltip_not_chosen: "ไม่มีพลเมือง ['concept_chosen_civics']"
 concept_chosen_civics:"ผู้ได้รับเลือก"
 concept_chosen_civics_desc:"คุณลักษณะผู้ได้รับเลือก $concept_chosen_civics$ ประกอบไปด้วย\n- ['civic:civic_chosen']$NEW_LINE$- ['civic:civic_hive_chosen']$NEW_LINE$- ['civic:civic_machine_chosen']$NEW_LINE$- ['civic:civic_corporate_chosen']"

 shroud.5105.title:"ผู้ได้รับเลือก"
 shroud.5105.desc:"เราตระหนักรู้ถึงมันมาโดยตลอด... ความเชื่อมโยงอันบริสุทธิ์กับเอนทิตีที่ห่างไกลซึ่งเราไม่อาจนิยามหรือทำความเข้าใจได้\n\n[This.GetTheChosenP2]\n\nตราบเท่าที่เรามีหลักฐานทางประวัติศาสตร์ สิ่งลึกลับนี้อยู่ที่นั่นเสมอ การที่มันเลือกเรานั้นชัดเจน... แต่ วัตถุประสงค์เบื้องหลังนั้นยังคงเป็นสิ่งที่เราไม่ทราบ\n\nเราควรเรียก [This.GetSensation] นี้ด้วยชื่อใดดี?"
 shroud.5105.desc_p2:"เรารับรู้ถึงตัวตนของมันในส่วนลึกของความคิดของเรา มันค้างคาอยู่ข้างใน เสมอและดูเหมือนจะอยู่ไกลเกินเอื้อม มันเป็นทั้งความแน่นอนและความเป็นไปไม่ได้ในจิตใจของเรา"
 shroud.5105.desc_p2_machine:"เราตรวจพบตัวตนของมันในการคำนวณที่ซับซ้อนที่สุดของเรา มันค้างคาอยู่ข้างใน เสมอและดูเหมือนจะอยู่ไกลเกินเอื้อม มันเป็นทั้งความแน่นอนและความเป็นไปไม่ได้ในวงจรของเรา"
