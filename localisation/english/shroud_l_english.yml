 concept_proxy_wars_desc:"สงครามตัวแทนสามารถเริ่มดำเนินการได้ผ่านเมนู §Hการทูต(ภาษาไทย)§!. การเริ่มสงครามตัวแทนคุณต้องมีระดับความไว้ใจ §Hความไว้วางใจ§! หรือการจารกรรมข้อมูลข่าวกรอง §Hแทรกซึม§! ที่เพียงพอ"

