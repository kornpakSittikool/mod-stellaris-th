 # Carceral Test Facility
 building_carceral_test_facility:"สำนักงานวิจัยควบคุมประชากร"
 building_carceral_test_facility_desc:"สำนักงานในอาณานิคมที่ส่งเสริมโอกาสการขายแฟรนไชส์ให้กับผู้มีส่วนได้ส่วนเสียที่สนใจ มอบอำนาจให้พวกเขาสร้างโปรแกรมทดลองของตนเองขึ้นมา ช่วยลดอัตราการเกิดอาชญากรรมและขยายกำลังป้องกันอาณานิคม!"

 building_psionic_offices:"สำนักงานพลังจิต"
 building_psionic_offices_desc:"ความซับซ้อนของจิตใจชาวต่างชาติจะนำทางได้อย่างมีประสิทธิภาพมากกว่าเมื่ออยู่ในระยะทางกายภาพที่ใกล้ชิดกัน ช่วยอำนวยความสะดวกในการจัดทำข้อตกลงการค้าร่วมกันที่สร้างกำไรสูงสุดแก่ทั้งสองฝ่าย"
 building_psionic_offices_tt:"\nผลกระทบต่อระบบดาว:\n$t$- แผ่สนามพลังออร่า §Y$PSIONIC_AURA$§! สำหรับผู้เป็นเจ้าของสาขา $TRIGGER_BRANCH_OFFICE_OWNER$ พร้อมความเข้มข้นรายเดือน $@psionic_offices_intensity|0+\n$$-§Rผลกระทบการปล่อยออร่า $PSIONIC_AURA$ ด้วยวิธีการใดๆ จากเจ้าของอาณานิคมจะมีลำดับความสำคัญสูงกว่าสิ่งก่อสร้างนี้§!"

 job_shroud_trader:"นักการตลาดกระแสจิตพ้องความรู้สึก"
 job_shroud_trader_plural:"นักการตลาดกระแสจิตพ้องความรู้สึก"
 job_shroud_trader_plural_with_icon: "£job_telepath£ $job_shroud_trader_plural$"
 job_shroud_trader_desc:"ผู้เชี่ยวชาญเหล่านี้จะปรับจูนจิตสำนึกให้เข้ากับความรู้สึกนึกคิดในตลาดท้องถิ่น ทำข้อตกลงและจัดงานสัมมนาเกี่ยวกับแนวโน้มความคิดผู้นำในปัจจุบัน"
 mod_job_shroud_trader_add:"ตำแหน่งงาน$job_shroud_trader$"
