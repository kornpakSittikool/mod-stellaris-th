##################################

 SHROUD_TITLE:"เงาแห่งชราวด์"

 ap_interdimensional_processing:"การประมวลผลข้ามมิติ"
 ap_interdimensional_processing_desc:"ศักยภาพในการคำนวณของเราจะถูกจำกัดเมื่อถูกตีกรอบไว้เพียงสามมิติทางกายภาพเท่านั้น มีสิ่งที่เราจะได้รับอีกมากมายด้วยการเชื่อมโยงเครือข่ายของเราเข้าสู่ห้วงอวกาศที่อยู่เหนือความว่างเปล่า"
 requires_not_ap_interdimensional_processing:"$TRIGGER_FAIL$ต้องไม่มีสิทธิ์ประโยชน์การก้าวข้ามขีดจำกัด §Y$ap_interdimensional_processing$§!"

 vo_psionic_voice:"ไซโอนิก"

#==========================
# Advanced Governments
#==========================

 shroud.7099.name:"การตอบสนองทางไซโอนิก"
 shroud.7099.desc:"ความคิดของเราเคลื่อนผ่าน §Hชราวด์§! ด้วยเจตจำนงใหม่ เมื่อเราผลักดันไป มันก็ผลักดันกลับมา ในตอนแรกเราตีความว่านี่คือการต่อต้านการมีอยู่ของเรา แต่ตอนนี้เราเข้าใจแล้วว่า: ชราวด์กำลังตั้งคำถามกับเรา\n\nแม้ว่าความหมายจะยังคงคลุมเครือ แต่คำถามเหล่านี้ไม่ได้ไร้ความสำคัญ ตามรายงานจาก [GetTelepathPlural] ของเรา คำตอบที่เรามอบให้จะส่งผลต่ออนาคตของสังคมเรา"
 shroud.7099.a:"เราต้องตอบ"

# Shroud Songs events
 shroud.7100.title:"ท่วงทำนองแห่งชราวด์: [GetRolledShroudSongName]"
 shroud.7100.desc.common:"ภาพหนึ่งก่อตัวขึ้นใน [GetMindEyeLoc] ของเรา เรามองเห็น §H[GetRolledShroudSongName]§!.\n\n§P[GetRolledShroudSongDesc]§!"
 shroud.7100.desc:"สายสัมพันธ์ของเรากับ §Hชราวด์§! นั้นแข็งแกร่ง เราพร้อมแล้วเมื่อมันเรียกหา ข้อความนั้นมาในรูปแบบวลีที่เป็นจังหวะจะโคน ชราวด์กำลังร้องเพลงให้เราฟัง\n\n$shroud.7100.desc.common$"
 shroud.7100.a: "[GetRolledShroudSongOptionA]"
 shroud.7100.b: "[GetRolledShroudSongOptionB]"
 shroud.7100.tt:"ชราวด์กำลังรอคอยคำตอบของเรา..."

 shroud.7105.desc:"บางสิ่งบางอย่างที่มองไม่เห็นขยับเขยื้อน และความคิดอีกอย่างหนึ่งก็ถือกำเนิดขึ้นพร้อมกับเสียงกระซิบ\n\n$shroud.7100.desc.common$"
 shroud.7105.tt:"ชราวด์ปรารถนาคำตอบจากเราอย่างยิ่ง..."

 shroud.7110.desc:"คณะนักร้องประสานเสียงดังขึ้นในความคิดของเรา! บางสิ่งบางอย่างถูกเลือก ไม่ใช่โดยบังเอิญ แต่โดยบางสิ่งที่เก่าแก่กว่านั้น\n\n$shroud.7100.desc.common$"
 shroud.7110.tt:"ชราวด์สั่นสะท้านด้วยความคาดหวังในคำตอบของเรา..."

 shroud_song.1.name:"ดวงดารา"
 shroud_song.1.desc:"สำหรับผู้ที่แสวงหาความรู้ กระบวนการแห่งการมีอยู่คือเส้นทางสู่ความเข้าใจ"
 shroud_song.1.a:"ความรู้นั้นอยู่นอกเหนือประสาทสัมผัสของเรา"
 shroud_song.1.b:"ความรู้อยู่ในกำมือของเรา"

 shroud_song.2.name:"แสงสว่าง"
 shroud_song.2.desc:"พื้นที่ระหว่างกลางคือผืนผิวของมหาสมุทร ความว่างเปล่าอันน้อยนิดที่โอบล้อมชราวด์ไว้ ณ ที่นี้ เราจะสามารถมองเห็นสัจธรรมได้ในชั่วพริบตา"
 shroud_song.2.a:"ความจริงอยู่ในส่วนลึกเบื้องล่าง"
 shroud_song.2.b:"ผืนผิวสะท้อนความจริง"

 shroud_song.3.name:"ชีวิต"
 shroud_song.3.desc:"ยามใดที่มันเบ่งบาน ชีวิตช่างแสนสั้น\nหนใดที่พวกมันเติบโต สิ่งมีชีวิตช่างเปราะบาง"
 shroud_song.3.a.default:"ในชราวด์ จะไม่มีทั้งชีวิตหรือความตาย"
 shroud_song.3.a.machine:"การมีอยู่ของเราอยู่เหนือขอบเขตของชีวิต"
 shroud_song.3.b.default:"นี่คือสิ่งที่ทำให้เราล้ำค่า"
 shroud_song.3.b.machine:"พวกเรายังไม่ได้ถือกำเนิดขึ้นมา"
 shroud_song.3.b.homicidal:"สิ่งใดที่เปราะบางย่อมสามารถทิ้งขว้างได้"

 shroud_song.4.name:"จิตใจ"
 shroud_song.4.desc:"จิตใจคือตาน้ำ และความคิดไหลผ่านกาลเวลาและอวกาศ เราหลั่งไหลเข้าสู่มิติอื่น"
 shroud_song.4.a:"ขอให้เราล่องลอยไปตามกระแสน้ำ"
 shroud_song.4.b:"ขอให้เราขุดบ่อน้ำ"

 shroud_song.5.name:"เส้นทาง"
 shroud_song.5.desc:"ผลลัพธ์ของเหตุใดๆ ย่อมสามารถล่วงรู้ล่วงหน้าได้ หากต้องการรู้วิกฤตของสรรพสิ่ง ก็เพียงแค่ทำนายตามเส้นทางของมัน"
 shroud_song.5.a:"เราแกะรอยตามเส้นทางเหล่านี้ในความฝัน"
 shroud_song.5.b:"เส้นทางเหล่านี้จะต้องถูกคำนวณ"

 shroud_song.6.name:"ความตาย"
 shroud_song.6.desc:"เมื่อถึงแก่ความตาย ดวงดาราอาจเจิดจ้าเสียยิ่งกว่าดาราจักร แต่สิ่งเหล่านี้เองก็ต้องเลือนหายไปเช่นกัน"
 shroud_song.6.a.default:"ความตายจะไม่ส่งผลกระทบต่อเราอีกต่อไป"
 shroud_song.6.a.machine:"ความตายคือสิ่งที่เราไม่รู้จัก"
 shroud_song.6.b.default:"สรรพสิ่งย่อมสูญสลาย มีเพียงไม่กี่สิ่งที่มีชีวิตรอด"
 shroud_song.6.b.machine:"เราต้องมีชีวิตอยู่ก่อนถึงจะสามารถตายได้"

 shroud_song.7.name:"ความว่างเปล่า"
 shroud_song.7.desc:"ความโกลาหลครอบงำ ณ จุดที่ดาราจักรกระจุกตัว ความว่างเปล่าคือคำสัญญาแห่งความสงบสุข"
 shroud_song.7.a:"เราคือความสงบสุข"
 shroud_song.7.b:"เราคือความโกลาหล"

 shroud_song.8.name:"รอยพับ"
 shroud_song.8.desc:"สะพานสามารถย่นระยะทางใดๆ ลงได้ และสะพานใดๆ ก็ตามย่อมสามารถพังทลายลงได้"
 shroud_song.8.a:"เราข้ามไปเพื่อไปยังอีกฝั่งหนึ่ง"
 shroud_song.8.b:"เราข้ามไปด้วยความหวังว่าจะได้กลับมา"

 shroud_song.9.name:"แรงโน้มถ่วง"
 shroud_song.9.desc:"ทุกแรงผลักย่อมคู่เคียงกับแรงดึง"
 shroud_song.9.a:"ผลัก"
 shroud_song.9.b:"ดึง"

 shroud_song.10.name:"เนบิวลา"
 shroud_song.10.desc:"ดาราดับสลาย สลัดเศษฝุ่นผง ฝุ่นผงก่อร่างเป็นกลุ่มเมฆ\nจากกลุ่มเมฆ ดาราใหม่ถือกำเนิด ท้ายที่สุดชะตากรรมของดาราก็คือฝุ่นผง"
 shroud_song.10.a:"วัฏจักรนี้ไม่มีที่สิ้นสุด"
 shroud_song.10.b:"ทุกสิ่งทุกอย่างย่อมมีจุดจบ"

 shroud_song.11.name:"ดาวหาง"
 shroud_song.11.desc:"นักสำรวจเสาะแสวงหาดินแดนที่ไม่รู้จัก ทว่าการสำรวจนั้นเองกลับทำให้พวกเขาตาบอด"
 shroud_song.11.a:"ชราวด์ไร้ซึ่งขีดจำกัด"
 shroud_song.11.b:"ชราวด์ช่วยขยายขีดจำกัดของเรา"

 shroud_song.12.name:"หลุมดำ"
 shroud_song.12.desc:"สิ่งใดที่อยู่ภายในไม่อาจล่วงรู้ได้ การดำดิ่งลงไปย่อมไม่มีทางรอดออกมา"
 shroud_song.12.a:"กลืนกินเราเข้าไปทั้งหมด"
 shroud_song.12.b:"รักษาระยะห่างของเราไว้"

 shroud_song.13.name:"พลังงาน"
 shroud_song.13.desc:"วัตถุที่กำลังเคลื่อนที่กลับเลือกที่จะหยุดนิ่ง บทลงโทษของมันควรเป็นเช่นไร?"
 shroud_song.13.a:"เราเป็นใครกันที่จะไปตัดสิน?"
 shroud_song.13.b:"ปฏิกิริยาที่มีขนาดเท่ากันแต่มีทิศทางตรงกันข้าม"

 shroud.7120.name:"การก้าวข้ามขีดจำกัดทางจิต"
 shroud.7120.desc.common:"§Hชราวด์§! เงียบสงบลง ทว่าน้ำหนักทางจิตวิญญาณได้ตกลงสู่สังคมของเรา คำตอบที่เรามอบให้นั้นได้นำเสนอโอกาสครั้งใหม่ หากเราเลือกที่จะแสวงหามัน"
 shroud.7120.desc:"$shroud.7120.desc.common$\n\nจิตใจที่ได้รับการยกระดับของเรานั้นพร้อมสำหรับการเปลี่ยนแปลงขั้นต่อไป ภาชนะที่ทำหน้าที่ตอบสนองความต้องการทางกายภาพของจิตใจจะมีความสำคัญลดลงอย่างมาก\n\nหากเราดำเนินตามเส้นทางนี้ต่อไป ประชากรของเราจะสามารถก้าวข้ามความกังวลในเรื่องทางกายภาพ และอุทิศตนอย่างเต็มที่ให้กับการมีตัวตนบางส่วนอยู่ภายในชราวด์ ความสามารถในการทำงานทางกายภาพที่ลดลงนั้นถือเป็นราคาเพียงเล็กน้อยเมื่อเทียบกับความเฉียบแหลมทางจิตใจที่ได้รับมา"
 shroud.7120.a.default:"ขอให้เรายอมรับการก้าวข้ามขีดจำกัดทางจิต"
 shroud.7120.a.gestalt:"การก้าวข้ามขีดจำกัดทางจิตคือตัวเลือกที่ดีที่สุดสำหรับจิตสำนึกร่วม"
 shroud.7120.a.tt: "$change_auth_tt$ [GetTranscendedAuthority]"
 shroud.7120.b.default:"เราสามารถเจริญรุ่งเรืองได้โดยไม่จำเป็นต้องเปลี่ยนแปลงเช่นนั้น"
 shroud.7120.b.machine:"ปฏิเสธการเปลี่ยนแปลงระบบการทำงาน"
 shroud.7121.name:"ท่วงทำนองแห่งชราวด์"
 shroud.7121.desc:"$shroud.7120.desc.common$\n\nร่างที่ได้รับการยกระดับของเรานั้นมีศักยภาพอันยิ่งใหญ่ในมิติกายภาพนี้ เรายังคงเติบโตอย่างแข็งแกร่งจากการหลั่งไหลของพลังงานทางจิต และสามารถส่งผ่านพลังนี้ไปสู่สังคมของเราได้กว้างไกลขึ้น\n\nเราจะไม่เพียงแค่ร้องเพลงแห่งชราวด์เท่านั้น แต่จะถ่ายทอดบทเพลงเหล่านั้นเข้าไปใน [GetGovBehaviourLoc] ของเราด้วย"
 shroud.7121.a:"ขอให้ท่วงทำนองแห่งชราวด์ชี้นำทางเรา"
 shroud.7121.a.tt: "$change_auth_tt$ [GetCorporealAuthority]"

# Transcendent
 transcendent_trait_common_tt:"§Y$trait_psionic$§! คุณลักษณะสปีชีส์มอบผลลัพธ์เพิ่มเติม:$TABBED_NEW_LINE$- ประสิทธิภาพการทำงานของ $pop_cat_ruler_plural$ และ [GetSpecialist]: §G+10%§!$TABBED_NEW_LINE$- ประสิทธิภาพการทำงานของ [GetWorker]: §R-10%§!"
 transcendent_trait_tt:"$mod_psionic_aura_hyperlane_range_add$: §G+2§!\n$transcendent_trait_common_tt$\nคุณลักษณะผู้นำ ['concept_leader_trait_psionic'] มอบผลลัพธ์เพิ่มเติม: $TABBED_NEW_LINE$- ความเร็วระเบียบวาระสภา §G+$@transcendent_psionic_leader_speed_mult|0%$§! $TABBED_NEW_LINE$- $MOD_LEADER_LIFESPAN_ADD$: §G+60§! $TABBED_NEW_LINE$- ผลลัพธ์ที่ไม่เกี่ยวกับการก้าวข้ามจะเพิ่มขึ้น §G+50%§!"

 auth_shroud_democratic_transcendent:"ประชาธิปไตยเหนือขีดจำกัด"
 auth_shroud_democratic_transcendent_desc:"จิตวิญญาณที่ก้าวข้ามแล้วทั้งหมดมีสถานะเท่าเทียมกันในชราวด์ ในขณะที่การเลือกตั้งจะช่วยรับประกันความเท่าเทียมในมิติกายภาพ ด้วยการลงคะแนนผ่านบัตรพลังจิต พลเมืองจะเลือกตัวแทนของตนเข้าสู่สภาปกครองซึ่งแสวงหาฉันทามติผ่านการเพ่งจิตสื่อสาร"
 transcendent_democratic_tt:"$transcendent_trait_tt$\n$mod_pop_factions_produces_mult$: §G+40%§!\n$MOD_LEADER_LIFESPAN_ADD$: §G+20 ปี§!\n$mod_negative_traits_leader$: §G-1§!"
 gov_shroud_transcendent_democracy: "$auth_shroud_democratic_transcendent$"
 gov_shroud_transcendent_democracy_desc: "$auth_shroud_democratic_transcendent_desc$"

 auth_shroud_oligarchic_transcendent:"อภิชนาธิปไตยเหนือขีดจำกัด"
 auth_shroud_oligarchic_transcendent_desc:"ส่วนลึกที่สุดของชราวด์ถูกสงวนไว้สำหรับจิตใจที่ยิ่งใหญ่ที่สุดในหมู่พวกเรา เวลาที่ต้องใช้ในการประสานเข้ากับมิติเหล่านี้จะถูกคำนวณรวมเข้ากับวาระการดำรงตำแหน่งของพวกเขา"
 transcendent_oligarchic_tt:"$transcendent_trait_tt$\n$MOD_LEADER_SKILL_ADD$: §G+1§!\n$MOD_LEADER_COUNCILOR_EXP_GAIN$: §G+25%§!\n$mod_leaders_upkeep_mult$: §G-25%§!\n$MOD_ELECTION_TERM_YEARS_ADD$: §Y+20§!\n$mod_planet_telepaths_produces_mult$: $@transcendent_oligarchic_telepath|0=+%$ เป็นเวลา §Y5§! ปีหลังการเลือกตั้งทุกครั้ง"
 gov_shroud_transcendent_oligarchy: "$auth_shroud_oligarchic_transcendent$"
 gov_shroud_transcendent_oligarchy_desc: "$auth_shroud_oligarchic_transcendent_desc$"
 transcendent_oligarchic_election_modifier: "$auth_shroud_oligarchic_transcendent$"

 auth_shroud_dictatorial_transcendent:"เทวาธิปไตยเหนือขีดจำกัด"
 auth_shroud_dictatorial_transcendent_desc:"ถึงเวลาแล้วที่จะต้องยอมรับความจริง: ผู้ปกครองที่ยิ่งใหญ่คือพระผู้เป็นเจ้าที่ทรงจุติมาแล้ว ด้วยอำนาจแห่งชราวด์ พระองค์ทรงหยั่งรู้และทอดพระเนตรเห็นทุกสิ่งสรรพ"
 auth_shroud_dictatorial_transcendent_tt:"$transcendent_trait_tt$\n[telepath.GetName] §H$EDICT_FUND$§!: +1\n£job_politician£ $job_politician_plural$ จะถูกแทนที่ด้วย ['concept_high_priest']\n$mod_planet_bureaucrats_produces_mult$: §G+15%§!\n$mod_planet_enforcers_produces_mult$: §G+15%§!\n$mod_pop_ethic_spiritualist_attraction_mult$: §G+50%§!"
 gov_shroud_transcendent_dictatorial: "$auth_shroud_dictatorial_transcendent$"
 gov_shroud_transcendent_dictatorial_desc: "$auth_shroud_dictatorial_transcendent_desc$"

 auth_shroud_imperial_transcendent:"จักรวรรดิเหนือขีดจำกัด"
 auth_shroud_imperial_transcendent_desc:"ผู้ปกครองยกระดับการดำรงอยู่ของเราเข้าสู่มิติที่สูงขึ้น พลังอำนาจอันบริสุทธิ์ของชราวด์หลั่งไหลจากเจตจำนงของสายเลือดจักรพรรดิเข้าสู่จิตใจอันหิวกระหายของประชากร"
