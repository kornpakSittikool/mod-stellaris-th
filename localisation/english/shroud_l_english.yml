 shroud.4015.title:"$the_cradle_of_souls_article_cap$ ปรากฏตัว"
 shroud.4015.desc.default:"พลังของ §H[Root.Patron:the_cradle_of_souls.GetPreCommunicationName]§! แผ่ซ่านไปทั่วทั้ง §Hม่านพลัง§! ทว่าจุดกำเนิดของมันช่างหลบเลี่ยงเราไป เราเดินทางส่ายทิศทางไปมาในอาณาจักรพลังจิต ปรับเปลี่ยนเส้นทางอยู่ตลอดเวลา พลางตั้งคำถามกับความถูกต้องในการตัดสินใจของเรา\n\n$shroud.4015.desc.default.end$"
 shroud.4015.desc.hive:"พลังของ §H[Root.Patron:the_cradle_of_souls.GetPreCommunicationName]§! แผ่ซ่านไปทั่วทั้ง §Hม่านพลัง§! ทว่าจุดกำเนิดของมันช่างหลบเลี่ยงเราไป เราเดินทางส่ายทิศทางไปมาในอาณาจักรพลังจิต ปรับเปลี่ยนเส้นทางอยู่ตลอดเวลา พลางตั้งคำถามกับการคำนวณประมวลผลของเรา\n\n$shroud.4015.desc.default.end$"
 shroud.4015.desc.default.end:"ขณะที่เราหยุดพักเพื่อไตร่ตรอง ตัวตนนั้นก็ปรากฏโฉมออกมา เราไม่ได้ยินอะไรเลย ไม่เห็นสิ่งใดเลย ทว่าเรากลับรู้สึกได้ถึงไออุ่นที่ร้อนแรงขึ้นกว่าที่เคยมีมา\n\nเราสัมผัสได้ถึงพลังที่อยู่ใจกลางของมัน จุดศูนย์รวมของพลังงานจากทั่วม่านพลังและขอบเขตภายนอก - ความคิดที่บรรจบเข้าหากัน แผ่รังสีความร้อนเป็นหนึ่งเดียว เมื่อย้อนเดินทางกลับมาจากการเดินทาง เราพบว่าตัวเองเปี่ยมล้นไปด้วยความเงียบสงัด\n\nความปรารถนาของตัวตนนี้แจ่มแจ้งชัดขึ้นต่อเราแล้วในตอนนี้ [GetCradleEmergesEnding]"
 shroud.4015.desc.gestalt_machine:"พลังของ §H[Root.Patron:the_cradle_of_souls.GetPreCommunicationName]§! แผ่ซ่านไปทั่วทั้ง §Hม่านพลัง§! ทว่าจุดกำเนิดของมันช่างหลบเลี่ยงเราไป เราเดินทางส่ายทิศทางไปมาในอาณาจักรพลังจิต ปรับเปลี่ยนเส้นทางอยู่ตลอดเวลา พลางตั้งคำถามกับการคำนวณประมวลผลของเรา\n\nขณะที่เราหยุดพักเพื่อประมวลผล ตัวตนนั้นก็ปรากฏโฉมออกมา เราไม่อาจแปลงถอดรหัสข้อความสารจากมันได้ ทว่ามันกลับกระตุ้นการทำงานของรหัสคำสั่งส่วนลึกในตัวเรา\n\nเราสัมผัสได้ถึงพลังที่อยู่ใจกลางของมัน จุดศูนย์รวมของพลังงานจากทั่วม่านพลังและขอบเขตภายนอก - แนวคิดที่บรรจบเข้าหากัน แผ่รังสีความร้อนเป็นหนึ่งเดียว เมื่อย้อนเดินทางกลับมาจากการเดินทาง เราพบว่าตัวเราเต็มไปด้วยพลังงานแห่งความสงัด\n\nความปรารถนาของตัวตนนี้แจ่มแจ้งชัดขึ้นต่อเราแล้วในตอนนี้ [GetCradleEmergesEnding]"
 shroud.4015.desc.individual_machine: "$shroud.4015.desc.gestalt_machine$"
 shroud.4015.desc_outro_homicidal:"จิตใจของเราปฏิเสธหลักการจอมปลอมเกี่ยวกับความเป็นระเบียบเรียบร้อยและความสามัคคีกลมเกลียวของมันในทันที การเข้าปรับประสานความเข้าถึงเพิ่มเติมกับตัวตนนี้ $the_cradle_of_souls_color_article$ รังแต่จะบั่นทอนความแน่วแน่ของเรา"
 shroud.4015.desc_outro_robot:"เรารับรู้นิมิตแห่งความเป็นระเบียบและความกลมเกลียวของมันแล้ว เมื่อ [GetTelepathPlural] ของเราเติมพลังงานเสร็จสิ้น เราสามารถติดต่อเพื่อคอมมูนกับตัวตนนี้ได้ $the_cradle_of_souls_color_article$"
