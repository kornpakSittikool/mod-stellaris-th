 shroud.4035.title:"$the_instrument_of_desire_article_cap$ ปรากฏตัว"
 shroud.4035.desc.all.start:"หลังจากใช้เวลานานนับเดือนในการเรียกขานอย่างว่างเปล่า ในที่สุด §H[Root.Patron:the_instrument_of_desire.GetPreCommunicationName]§! ก็ปรากฏตัวขึ้นมาจากส่วนลึกของ §Hม่านพลัง§!"
 shroud.4035.desc.default:"$shroud.4035.desc.all.start$\n\nสารส่งคำเตือนของมันถาโถมเข้ามาดั่งมหาอุทกภัย ความคิดต่าง ๆ ถูกผลักดันเข้าสู่จิตใจของเราอย่างรุนแรง บอกเล่าถึงความปรารถนาสูงสุดที่บ้าคลั่งที่สุด ถ้อยคำหลั่งไหลผ่านตัวเราอย่างรวดเร็วและท่วมท้น กลบกลืนความคิดสิ่งอื่นใดจนสิ้นเชิง สารนั้นช่างยั่วยวนตา: นิมิตแห่งขุมอานุภาพพลังและการปรนเปรอ\n\n$shroud.4035.desc.default.end$"
 shroud.4035.desc.default.end:"กระแสไหลบ่าที่โหมกระหน่ำสงบลงเหลือเพียงน้ำไหลหยดริน การมีอยู่นั้นไม่ได้คาดหวังคำตอบรับ - ในตอนนี้ มันทิ้งความกระหายน้ำที่ไม่อาจดับลงได้ไว้กับเรา\n\nความต้องการของตัวตนแจ่มแจ้งขึ้นต่อเราแล้วในตอนนี้ เรารับรู้นิมิตแห่งทรัพย์สมบัติอันกว้างใหญ่ไร้ขีดจำกัด เมื่อ [GetTelepathPlural] ของเราฟื้นฟูเสร็จสิ้น เราสามารถติดต่อเพื่อคอมมูนกับตัวตนนี้ได้ $the_instrument_of_desire_color_article$"
 shroud.4035.desc.hive:"$shroud.4035.desc.all.start$\n\nสารส่งคำเตือนของมันถาโถมเข้ามาดั่งมหาอุทกภัย ความคิดต่าง ๆ ถูกผลักดันเข้าสู่จิตใจของเราอย่างรุนแรง บอกเล่าถึงความปรารถนาสูงสุดที่บ้าคลั่งที่สุด ถ้อยคำหลั่งไหลผ่านตัวเราอย่างรวดเร็วและท่วมท้น กลบกลืนความคิดสิ่งอื่นใดจนสิ้นเชิง สารนั้นช่างเปี่ยมล้นไปด้วยพลังงาน: นิมิตแห่งผลผลิตผลงานที่ไร้การตรวจวัดจำกัด\n\n$shroud.4035.desc.default.end$"
 shroud.4035.desc.gestalt_machine:"$shroud.4035.desc.all.start$\n\nสารส่งคำเตือนของมันถาโถมเข้ามาดั่งมหาอุทกภัย ข้อมูลบีบตัวขับเคลื่อนเข้าสู่วงจรของเราอย่างรุนแรง เกินขีดจำกัดข้อมูลขาเข้าก่อนหน้านี้ทั้งหมด รหัสพิเศษหลั่งไหลผ่านเราอย่างรวดเร็วและท่วมท้น ปิดระบบการทำงานส่วนอื่นจนสิ้น สารนั้นช่างเปี่ยมไปด้วยพลังงาน: นิมิตแห่งผลผลิตผลงานที่ไร้ขีดจำกัด\n\n$shroud.4035.desc.machine.end$"
 shroud.4035.desc.machine.end:"กระแสข้อมูลขาเข้าที่โหมกระหน่ำสงบลงเหลือเพียงน้ำไหลหยดริน การมีอยู่นั้นไม่ได้คาดหวังคำตอบรับ - ในตอนนี้ มันทิ้งความว่างเปล่าที่กระจัดกระจายซึ่งต้องการรหัสข้อมูลที่ยอดเยี่ยมเป็นพิเศษไว้กับเรา\n\nความต้องการของตัวตนแจ่มแจ้งขึ้นต่อเราแล้วในตอนนี้ เรารับรู้นิมิตแห่งทรัพย์สมบัติอันกว้างใหญ่ไร้ขีดจำกัด เมื่อ [GetTelepathPlural] ของเราเติมพลังงานเสร็จสิ้น เราสามารถติดต่อเพื่อคอมมูนกับตัวตนนี้ได้ $the_instrument_of_desire_color_article$"
 shroud.4035.desc.individual_machine:"$shroud.4035.desc.all.start$\n\nสารส่งคำเตือนของมันถาโถมเข้ามาดั่งมหาอุทกภัย ความคิดต่าง ๆ ถูกผลักดันเข้าสู่จิตใจของเราอย่างรุนแรง บอกเล่าถึงความปรารถนาสูงสุดที่บ้าคลั่งที่สุด ถ้อยคำหลั่งไหลผ่านตัวเราอย่างรวดเร็วและท่วมท้น กลบกลืนความคิดสิ่งอื่นใดจนสิ้นเชิง สารนั้นช่างเปี่ยมล้นไปด้วยพลังงาน: นิมิตแห่งผลผลิตผลงานที่ไร้การตรวจวัดจำกัด\n\n$shroud.4035.desc.machine.end$"
 shroud.4035.a.default:"มันช่างรุ่งโรจน์ยิ่งนัก"
 shroud.4035.a.robot:"มันช่างยอดเยี่ยมยิ่งนัก"
 shroud.4035.b.default: "$shroud.first_contact.end.b$"
 shroud.4035.b.robot: "$shroud.first_contact.end.b$"
 shroud.4035.c.default:"มีเพียงคำพูดที่ว่างเปล่า"
 shroud.4035.c.robot: "$shroud.4035.c.default$"
 shroud.first_contact.end.a.tt.the_instrument_of_desire:"ได้รับ §Yความเข้าถึง(บรรยาย)§! กับ $the_instrument_of_desire_color_article$\n$shroud.first_contact.end.b.tt.the_instrument_of_desire$"
 shroud.first_contact.end.b.tt.the_instrument_of_desire:"เปิดเผยตัวตน $the_instrument_of_desire_color_article$ ภายใน §Yม่านพลัง§!"
 shroud.first_contact.end.c.tt.the_instrument_of_desire:"สูญเสียระดับ §Yความเข้าถึง(บรรยาย)§! กับ $the_instrument_of_desire_color_article$ อย่างมีนัยสำคัญ\n$shroud.first_contact.end.b.tt.the_instrument_of_desire$"

 shroud.4040.title: "$utopia.3300.name$"
 shroud.4040.desc:"เรารับรู้ถึงสุ้มเสียงจำนวนมากภายใน §Hม่านพลัง§! เสียงสะท้อนของพวกมันกระจายอยู่ทั่วไปและมีอยู่อย่างมหาศาล หลังจากการเข้าสู่ภวังค์จิตเมื่อไม่นานมานี้ [GetTelepathPlural] ของเราได้รายงานถึงการมีอยู่ของตัวตนที่ไม่เหมือนสิ่งใดอื่น - §Hคลื่นเสียงสั่นสะเทือนแบบทวีคูณ(เสียงดังกริบ)§! แผ่ซ่านอยู่ใจกลางของม่านพลัง\n\nด้วยการประยุกต์ใช้พลังงานจิตวิทยาที่เพียงพอ เราสามารถพยายามเดินตามร่องรอยพลังจิตของตัวตนอันทรงพลังผู้นี้ ซึ่งรู้จักกันในหมู่ [GetTelepathPlural] ของเราในฐานะ §H[Root.Patron:whisperers_in_the_void.GetPreCommunicationName]§!"
 shroud.4040.a: "$utopia.2657.a$"
 shroud.4045.title: "$whisperers_in_the_void_article_cap$"
 shroud.4045.desc.intro:"ด้วยความพยายามของเราที่จะคอมมูนติดต่อกับ §H[Root.Patron:whisperers_in_the_void.GetPreCommunicationName]§! เราได้รับการนำพาเข้าสู่ชั้นที่ลึกที่สุดของม่านพลัง ในดินแดนภายในแห่งนี้ ม่านพลังหมุนตัวอยู่อย่างเงียบงันและไม่เคลื่อนไหว ภาพสะท้อนของทุกความคิด จากทุกรอบวัฏจักร รวบรวมเข้าด้วยกันกลายเป็นพลังระดับปฐมภูมิ เราได้ยินสุ้มเสียงของผู้ไร้เสียง นำพาอยู่ในความปั่นป่วนชั่วนิรันดร์: $whisperers_in_the_void_color_article$\n\nความไม่ประสานเสียงที่เสียดสีโอบล้อมรอบตัวเรา เราพยายามฟังข้อความสัญญานนับไม่ถ้วนของพวกมัน จนกระทั่งความคิดเดี่ยวแทรกผ่านเข้าสู่ [GetTelepathPlural] ของเรา\n\n§Hการรับฟังคือการเสียสละชดใช้ราคา§!\n\nเพื่อดึงเอาพลังอันยิ่งใหญ่นี้มาใช้ เราต้องช่วยเหลือตัวตนนี้ในการเข้าครอบครอง"
 shroud.4045.desc.covenant:"$shroud.4045.desc.intro$ อาณาจักรของ [GetCovenantPatronColor] การกระทำเช่นนี้จะเข้าแทนที่การปรากฏตัวของผู้อุปถัมภ์เดิมของเราอย่างสมบูรณ์แบบ ทำลายพันธสัญญาที่เราเคยสร้างขึ้นอย่างสิ้นเชิง$shroud.4045.desc.outro$"
 shroud.4045.desc.no_covenant:"$shroud.4045.desc.intro$ อาณาจักรของผู้อุปถัมภ์อีกตนหนึ่ง โดยเข้าแทนที่การปรากฏตัวที่เป็นที่รับรู้ของมันอย่างสิ้นเชิง$shroud.4045.desc.outro$"
 shroud.4045.desc.outro:"\n\nสิ่งนี้อาจนำไปสู่ผลลัพธ์ที่เป็นผลกระทบที่สำคัญอย่างยิ่ง"
 shroud.4045.a:"ยอมให้ผู้กระซิบก้าวเข้ามา"
 shroud.4045.a.covenant.tt:"§Rยุติการทำพันธสัญญาของเรากับ [GetCovenantPatronColor]§!\nแทนที่อาณาเขตดินแดนของ [GetCovenantPatronColor] ทั้งหมดด้วย $whisperers_in_the_void_color_article$\n§Rการกระทำย่อมมีผลลัพธ์ตามมา§!"
 shroud.4045.a.no_covenant.tt:"เราจะเลือกดินแดนอาณาเขตของ $major_patron$ เพื่อแทนที่ด้วย $whisperers_in_the_void_color_article$\n§Rการกระทำย่อมมีผลลัพธ์ตามมา§!"
 shroud.4045.b:"เป็นการดีที่สุดที่จะไม่ทำลายสมดุลความเป็นอยู่ของม่านพลัง"

 shroud.4046.title:"ความแปรผันของม่านพลัง"
 shroud.4046.desc.1:"ทันทีที่มีการตัดสินใจเลือก [GetTelepathPlural] ของเราฟื้นตัวขึ้นมาจาก §Hม่านพลัง§! ด้วยความรุนแรงปั่นป่วนจากการ"
 shroud.4046.desc.2:"จิตใจของพวกมันล่องลอยสะท้อนก้องไปด้วยสุ้มเสียงประสานที่หลากหลาย\n\nทางเลือกของเราได้เปลี่ยนโฉมมุมมองต่ออาณาจักรพลังจิตอย่างถาวรโดยไม่อาจย้อนกลับได้ เมื่อ $whisperers_in_the_void_color_article$ รั่วไหลเข้าสู่จิตใจของเรา เราก็ไม่สามารถรับรู้ถึง [GetCovenantPatronColor] ได้เหมือนเมื่อก่อนอีกต่อไป ดินแดนอาณาเขตของมันสูญหายไปจากเราแล้ว\n\nเรากำลังเรียนรู้และเข้าใจเจตจำนงของผู้กระซิบอย่างช้า ๆ เราสัมผัสได้ถึงนิมิตความรู้ที่ไร้ขอบเขตจำกัดของพวกมัน เมื่อ [GetTelepathPlural] ของเราได้รับการ"
 shroud.4046.desc.3:"เราก็จะสามารถติดต่อแผ่ขยายพลังจิตเพื่อคอมมูนกับตัวตนอันเป็นล้านร่างผู้นี้ได้อีกคำรบ"
 shroud.4046.desc.robot:"$shroud.4046.desc.1$ตื่นจากการพักทำงาน $shroud.4046.desc.2$ฟื้นฟูระบบเรียบร้อย $shroud.4046.desc.3$"
 shroud.4046.desc.organic:"$shroud.4046.desc.1$ทำงานกระตุ้นกระทันหัน $shroud.4046.desc.2$เติมพลังงานเรียบร้อย $shroud.4046.desc.3$"

 shroud.whispers_in_the_shroud.title:"เสียงกระซิบในม่านพลัง"
 shroud.whispers_in_the_shroud.a: "$utopia.2657.a$"

 minor_patron_instrument_cradle_intro:"เราพบว่าตัวเองอยู่กึ่งกลางระหว่างอาณาเขตของ $the_instrument_of_desire_article$ถึง$the_cradle_of_souls_article$"
 minor_patron_cradle_composer_intro:"เราพบว่าตัวเองอยู่กึ่งกลางระหว่างอาณาเขตของ $the_cradle_of_souls_article$ถึง$the_composer_of_strands_article$"
 minor_patron_composer_eater_intro:"เราพบว่าตัวเองอยู่กึ่งกลางระหว่างอาณาเขตของ $the_composer_of_strands_article$ถึง$the_eater_of_worlds_article$"
 minor_patron_eater_instrument_intro:"เราพบว่าตัวเองอยู่กึ่งกลางระหว่างอาณาเขตของ $the_eater_of_worlds_article$ถึง$the_instrument_of_desire_article$"
 minor_patron_default_intro:"เราพบว่าตัวเองอยู่กึ่งกลางระหว่างอาณาเขตของตัวตนที่ยิ่งใหญ่กว่าภายในม่านพลัง"

 shroud.4050.desc:"[This.GetMinorPatronCradleComposerIntro]\n\nท่ามกลางกลุ่มสิ่งก่อสร้างไร้ชีวิตชีวา เราตรวจพบ §H$code_name_animator$§! เจตจำนงของมันกำลังแกะสลักปรับแต่งพลังงานหนาแน่นให้เป็นรูปทรงใหม่ ๆ ที่น่าแปลกใจ\n\nเมื่อรุกล้ำกิจกรรมของมันเข้าไป มันขยับเข้ามาหา ปัดเป่าสายหมอกทึบแสงของม่านพลังออกไป มันหยิบยื่นบางสิ่งบางอย่างให้เรา\n\nจะเกิดอะไรขึ้นหากเราคว้าสิ่งนั้นไว้?"
 shroud.4055.title:"$the_animator_of_clay_article_cap$ ปรากฏตัว"
 shroud.4055.desc:"ขณะที่เราจุ่มจิตใจเข้าสู่พลังงานแปรปรวนของม่านพลัง [GetSpeciesBodyPlural] ของเราเกิดอาการสั่นเกร็งอย่างอธิบายไม่ได้ เรารู้สึกว่า §H$code_name_animator$§! เข้าควบคุมกุมเราไว้ชั่วครู่ มันกวักมือเรียกให้เราสังเกตดู\n\nความมืดมิดจางหายไปเผยให้เห็นโครงร่างเงาที่แสดงท่าทาง แขนขาของมันถูกดึงกระชากอย่างรุนแรง ไปในทิศทางหนึ่งแล้วค่อยเป็นอีกทิศทางหนึ่ง โดยสายใยพลังงานหมอก จนกระทั่งจู่ ๆ พันธนาการของมันก็มลายหายไป รูปกายนั้นก็ล้มพังทลายลง\n\nมันค่อย ๆ กระตุกขยับฟื้นคืนชีวิตขึ้นมาทีละน้อย แขนขาทีละข้างก้าวขยับหยัดยืนขึ้นมาใหม่ ปราศจากเครื่องพันธนาการยึดเหนี่ยวแบบเก่า และเต้นระบำสะกดจิตอีกครั้ง"
 shroud.4055.desc.know_animator:"เราตระหนักได้ในเวลานั้นว่าเราเคยพบตัวตนนี้มาก่อน $the_animator_of_clay_color_article_cap$ ได้รับความขบขันสำราญ ที่ใดก็ตามที่วัตถุไร้ชีวิตถูกกระตุ้นปลุกตื่นทำงาน และที่ใดก็ตามที่สสารหยาบกร้านได้รับอัญเชิญดวงวิญญาณ ที่นั่นก็ย่อมพบเจอมันได้เช่นเดียวกัน"
 shroud.4055.a:"หุ่นเชิดเต้นระบำเป็นอิสระปราศจากเส้นเชือกบังคับ"

 shroud.4060.desc:"[This.GetMinorPatronCradleComposerIntro]\n\nเรารับรู้ได้ว่าเราไม่ได้อยู่ลำพัง §H$code_name_outsider$§! รุกล้ำเข้ามาในจิตใจของเรา ทำให้พายุพลังจิตวิญญาณก่อตัวโอบล้อมรอบตัวเรา\n\nความเสียดายและอาวรณ์อันลึกซึ้งถูกผลักดันเข้ามายังจิตสำนึกร่วมของเรา เราเห็นภาพนิมิตของระบบดาวเคราะห์ที่คุ้นเคยในอดีตเมื่อหลายพันปีก่อน\n\nไม่ว่าตัวตนนี้จะเป็นอย่างไร ดูเหมือนว่ามันจะรู้จักกาแล็กซีของเราเป็นอย่างดี ในอดีตมันเคยสังกัดหรือเป็นส่วนหนึ่งของที่นี่หรือเปล่า?"
 shroud.4065.title:"$the_outsider_article_cap$ ปรากฏตัว"
 shroud.4065.desc.intro:"พลังอำนาจห่างไกลที่รู้จักกันในฐานะ §H$code_name_outsider$§! แผดเผาจิตใจเราด้วยความเจ็บปวดรวดร้าวจากส่วนลึกภายใน §Hม่านพลัง§! มันไม่ได้พูดเอ่ยอันใด ทว่าคำเตือนของมันนั้นชัดเจนแจ้งประจักษ์:\n\n§Hจงก้าวเดินอย่างแผ่วเบาในอาณาจักรเหล่านี้ เจ้าไม่รู้หรอกว่าเจ้ากำลังรบกวนขุมพลังอันใด ความล่มสลายห่างออกไปเพียงก้าวเดียวเท่านั้น...§!"
 shroud.4065.desc.outro_default:"ไม่ว่าสิ่งนี้จะหมายความอย่างไร ตอนนี้ $the_outsider_color_article$ ก็เป็นที่รู้จักของเราแล้ว ชะตากรรมของเราจะผูกพันสอดคล้องกันอย่างไรยังคงต้องรอคอยเฝ้าดูกันต่อไป"
 shroud.4065.desc.outro_know_zroni:"ตัวตนนี้ไม่ใช่คนแปลกหน้าสำหรับกาแล็กซีของเรา มันมีร่องรอยพลังจิตที่ชัดเจนของอารยธรรมซโรนีที่เราเคยพบมาก่อนหน้านี้ สิ่งนี้เป็นไปได้อย่างไร?\n\nไม่ว่าสิ่งนี้จะหมายความอย่างไร ตอนนี้ $the_outsider_color_article$ ก็เป็นที่รู้จักของเราแล้ว ชะตากรรมของเราจะผูกพันสอดคล้องกันอย่างไรยังคงต้องรอคอยเฝ้าดูกันต่อไป"
 shroud.4065.desc.outro_left_zroni:"เราจดจำตัวตนนี้ได้ มันคือผู้มองการณ์ไกลที่เราพบเจอนอกเส้นทาง §Hรอยแยกดาราศาสตร์(ALTral Rift)§! หรือนี่คือชะตากรรมที่เกิดขึ้นกับพวกเขา? ตอนนี้พวกเขาคือ $the_outsider_color_article$ แล้วหรือ?"
 shroud.4065.a.default:"ความสยดสยองอันใดกันที่มันเคยประสบพบเจอมา?"
 shroud.4065.a.know_zroni:"พวกซโรนียังมีชีวิตอยู่หรือไม่?"
 shroud.4065.a.left_zroni:"ขออย่าให้พวกเราต้องยอมจำนนเผชิญชะตากรรมแบบเดียวกันเลย"

 shroud.4070.desc:"[This.GetMinorPatronComposerEaterIntro]\n\nกลุ่มความคิดที่แปรเปลี่ยนตั้งเค้าโอบล้อมรอบจิตใจของเรา แรงรัดสะสมแผ่กระจายเหนือกาย บิดโค้งสัมผัสการรับรู้กาลเวลาของเรา เม็ดความคิดแต่ละเมล็ดขัดเสียดสีจิตใจเราไปกับสัมผัสรอยลึกของอาณาเขตใหม่นี้\n\nเมื่อประสาทสัมผัสนั้นจางลง §H$code_name_tide$§! ก็ละลายหายไปทิ้งร่องรอยลึกประทับแน่นหนาไว้ด้านหลัง\n\nร่องรอยเหล่านี้ยังคงหลงเหลืออยู่ตรงหน้าเรา เชื้อเชิญให้เราก้าวเดินตาม"
 shroud.4075.title:"$the_endless_tide_article_cap$ ปรากฏตัว"
 shroud.4075.desc:"§H$code_name_tide$§! ได้ถูกขุดค้นพบเจอขึ้นมาจาก §Hม่านพลัง§! ไร้รูปร่างทว่ากว้างใหญ่ไพศาล การคงอยู่ของมันแผ่ยืดขยายอย่างไร้ขีดจำกัดสูงสุดเหนือระดับการรับรู้ของเรา\n\nเสียงกระซิบก้องสั่นสะเทือนผ่านตัวเรา คลี่คลายหน้าประวัติศาสตร์ที่ฝังกลบมาอย่างยาวนาน เรามองเห็นจักรวรรดิที่ถูกลืมล่มสลายกลายเป็นผงคลีดินโดยการเดินทัพที่ไม่มีวันหยุดยั้งของกาลเวลา เม็ดทรายแต่ละเม็ดที่พัดผ่านตัวเราไปล้วนคือความทรงจำหนึ่ง\n\nภายในบันทึกเหตุการณ์ประวัติศาสตร์ที่ไม่มีวันสิ้นสุดนี้ รูปแบบสัณฐานก็ปรากฏเด่นชัด - รอบวัฏจักรความทะเยอทะยานและการล่มสลาย ชัยชนะและการดับสูญ มีสติปัญญาปัญญาซ่อนอยู่ภายใต้ความลึกเหล่านี้\n\n$the_endless_tide_color_article_cap$ แผ่กว้างออกเหนือกาลเวลา บดทำลายความไม่รู้ความเขลา และหลงเหลือไว้เฉพาะสิ่งที่มีเจตจำนงแกร่งกล้าพอที่จะหยัดยืนอดทนเท่านั้น"
 shroud.4075.a:"ในเวลานี้ สติปัญญานี้เป็นของเราแล้ว"

 shroud.4080.desc:"[This.GetMinorPatronComposerEaterIntro]\n\nแรงดึงดูดจากการกระทำของเราเองลากดึงเราลึกเข้าไป น้ำหนักของมันลากดึงเราจมดิ่งลงสู่เงาบดรัดอันมืดมัวของภูเขารูปร่างสูงชัน\n\nจากบนยอดเขาที่ปกคลุมด้วยหิมะสีเทา สายตาที่ไม่ยอมจำนนจ้องลึกตรงมายังจิตใจของเรา เราพยายามต่อสู้ดิ้นรนเพื่อประเมินขนาดอันมโหฬารของ §H$code_name_mountain$§! ตรงหน้า\n\nยอดเขาที่สูงที่สุดยังคงเชื้อเชิญกวักมือเรียกเรา ท้าทายให้เราป่ายปีนขึ้นไป"
 shroud.4085.title:"$the_pale_mountain_article_cap$ ปรากฏตัว"
 shroud.4085.desc:"ขณะที่เราป่ายปีนขึ้นสู่จุดสูงชันอันน่าเวียนหัวของ §Hม่านพลัง§! เราก็เข้าถึงยอดเขาที่จับต้องไม่ได้ ตัว §H$code_name_mountain$§! เองได้ทดสอบเรา เหมือนดั่งที่มันเคยทดสอบผู้อื่นทั้งหมดที่ก้าวเข้ามาก่อนหน้านี้\n\nสุสานขนาดมหึมาที่ตั้งตระหง่านของจักรวรรดิที่ถูกลืมเลือน ส่งเสียงร้องขับขานเป็นเสียงสะท้อนก้องของหน้าประวัติศาสตร์ที่จางหายไป ความล้มเหลวและความทะเยอทะยานที่ผิดพลาดในแต่ละชั้น ได้ถูกบดขยี้แปรสภาพเข้าสู่รากฐานของสิ่งที่จะตามมาถัดไป\n\nทว่า ณ ที่นี้ไม่ใช่สุสานที่นิ่งสงบ แต่มันคือเบ้าหลอมแห่งกรรม รอบวัฏจักรแห่งความล่มสลายและการเริ่มต้นใหม่ได้หลอมรวมความล้มเหลวในอดีตให้กลายเป็นรากฐานอันมั่นคงของชัยชนะในอนาคต การทำลายล้างไม่ใช่จุดสิ้นสุด หากแต่เป็นการเริ่มต้นบทใหม่\n\n$the_pale_mountain_color_article_cap$ ตั้งตระหง่านเด่นชัดขึ้นในจิตใจของเรา"
 shroud.4085.a:"ภูเขาแห่งนี้จะเติบโตขึ้น"

 shroud.4090.desc:"[This.GetMinorPatronInstrumentCradleIntro]\n\nน้ำหนักที่ปลอบประโลมจิตใจทำให้ความคิดของเราช้าลงจนกลายเป็นหมอกมัวสลัวแห่งความสุข ความตึงเครียดที่ไม่เคยรู้จักมาก่อนหน้านี้ละลายหายไป แทนที่ด้วยความสงัดอันฟุ่มเฟือยที่ค่อย ๆ คืบคลานเข้ามา\n\nดิ่งลึกลงสู่การโอบกอดอันงดงามนี้ เราเฝ้าสังเกตการณ์ §H$code_name_dream$§! ที่ขยับใกล้เข้ามา ธรรมชาติอันทรงพลังของมันกวาดต้อนโอบล้อมรอบตัวเราขณะที่มันกระซิบคำมั่นสัญญาของความพึงพอใจอิ่มหนำอันฟุ่มเฟือย\n\nความเกียจคร้านที่ดื่มด่ำของมันช่างเชิญชวนอย่างประหลาด"
 shroud.4095.title:"$the_golden_dream_article_cap$ ปรากฏตัว"
 shroud.4095.desc:"ขณะที่เราพักผ่อนหย่อนใจในมุมหนึ่งแห่งความเงียบสงบใน §Hม่านพลัง§! เราพบว่าตัวเราถูกดึงดูดเข้าสู่ห้องโถงทองคำของ §H$code_name_dream$§!\n\nสิ่งล่อใจอันนุ่มนวลดุจเส้นไหมไหลผ่านเข้าสู่จิตใจของเรา ขณะที่ลวดลายอันงดงามของความรุ่งโรจน์กางแผ่ออกเบื้องหน้าเรา ความละเลยที่ปล่อยตัวไปตามใจตนข่มขู่จะทำให้ความคิดของเราหยุดชะงักลงจากน้ำหนักของภาระอันฟุ่มเฟือยนี้\n\n$the_golden_dream_color_article_cap$ มอบสิ่งหรูหราที่เกินกว่าจะเข้าใจได้แก่เรา"
 shroud.4095.a:"ความฝันตื่นขึ้นมาแล้ว"

 shroud.4100.desc:"[This.GetMinorPatronInstrumentCradleIntro]\n\nความปั่นป่วนของม่านพลังบิดแปรสภาพกลายเป็นกระแสน้ำวนพลังจิตวิทยา ทันใดนั้น กระแสน้ำนับแสนนับล้านสายก็กางแผ่ออกและหลอมรวมกัน สยบยอมด้วยแรงบางอย่างที่มองไม่เห็น มันสงบลงและหมุนเกลียวเข้าสู่รูปทรงที่เงียบสงบใหม่\n\nขณะที่เราเฝ้าดู เราก็รับรู้ได้ถึง §H$code_name_point$§! ที่กำลังควบคุมทิศทางการเคลื่อนไหวเหล่านี้ สยบความโกลาหลให้กลายเป็นระเบียบเรียบร้อย\n\nความสงบของมันกวักมือเรียกหาเรา"
 shroud.4105.title:"$the_hollow_point_article_cap$ ปรากฏตัว"
 shroud.4105.desc:"[GetTelepathPlural] ของเราแผ่พลังจิตวิญญาณรุกรานเข้าสู่ความโกลาหลปั่นป่วนของม่านพลังทว่าไม่เป็นผลสำเร็จ จนกระทั่งเมื่อพวกเขาหยุดละเว้นความพยายามดังกล่าว พวกเขาจึงได้สัมผัสกับการโอบอุ้มที่เหมาะสมของ §H$code_name_point$§!\n\nภาพนิมิตแล่นผ่านจิตใจเราเป็นแถวแนวแห่งความขัดแย้งที่ถาโถมเข้าใส่ ซึ่งแต่ละศึกล้วนเต็มไปด้วยความว้าวุ่นอลหม่านและโทสะเกรี้ยวกราด\n\nท่ามกลางสิ่งเหล่านั้นทั้งหมด เราสัมผัสได้ถึงการมีอยู่เฝ้าระวังและไร้กาลเวลาของ $the_hollow_point_color_article$ ความสงบเยือกเย็นในความอดทนอดกลั้นของมัน รอคอยวันที่การต่อสู้ห้ำหั่นที่ไม่มีวันสิ้นสุดของกาแล็กซีจะยุติลงในที่สุด"
 shroud.4105.desc.outro_homicidal:"แม้จะมีสัญชาตญาณดิบดั้งเดิมของเรา แต่จิตใจของเราได้รับการเปิดเผยสู่แนวทางการคิดที่น่าสงสัย"
 shroud.4105.a.default:"ความอดทนจะยืนยาวกว่าความขัดแย้ง"
 shroud.4105.a.homicidal:"ความฝันอันแสนโหยหา... เรารับรู้เป้าหมายที่แท้จริงของเราดี"

 shroud.4110.desc:"[This.GetMinorPatronEaterInstrumentIntro]\n\nเสียงที่โกลาหลยอมจำนนต่อความมืดมิดที่กดทับเข้ามา เรารู้สึกว่าเจตจำนงของเรากำลังถูกสอดส่อง ศึกษา และตัดสินพิพากษา\n\nความคาดหวังอันหนักหน่วงของความเป็นระเบียบเรียบร้อย ที่ไม่ถูกท้าทายและไม่อาจเปลี่ยนแปลง เพ่งมองทะลุเข้ามาในใจเรา §H$code_name_throne$§! ตัดสินเจตนาของเรา\n\nหลังจากสายตาของมันเลื่อนผ่านเลยเราไป ความมืดมิดก็ลดถอยหลบออกไป การจ้องมองสืบค้นที่ส่งอิทธิพลนี้ผลักดันให้เราต้องปฏิบัติตามระเบียบ"
 shroud.4115.title:"$the_vacant_throne_article_cap$ ปรากฏตัว"
 shroud.4115.desc:"พวกเราได้คุกเข่าต่อหน้า §H$code_name_throne$§!\n\nจิตใจของเราโดนตรวจสืบอย่างละเอียดด้วยความเฉยเมยเย็นชาของผู้มีอำนาจที่ไม่ยอมประนีประนอม ตรึงเราไว้กับที่ในขณะที่เราโดนตัดสินพิพากษา\n\nห้วงสุญญากาศที่กดขี่ของ $the_vacant_throne_color_article$ ไม่มอบความปรานีใด ๆ - หรือแม้แต่ความทุกข์ทรมาน มันคาดหวังเฉพาะความเป็นระเบียบและความแน่นอน โดยบังคับกำหนดใช้ในจุดที่พบว่าขาดแคลนมันไป\n\nในเวลานี้เราแบกรับน้ำหนักของภาระนี้ไปกับเรา"
 shroud.4115.a:"การพิพากษาตัดสินคงอยู่คู่จักรวาลเสมอ"

 shroud.4120.desc:"[This.GetMinorPatronEaterInstrumentIntro]\n\nความรู้สึกเร่งเร้ากะทันหันถาโถมเข้าใส่ตัวเราและการรับรู้ของเราก็โดนถาโถมด้วยการไหลบ่าของข้อมูลที่ยากเกินจะเข้าใจ เราพบว่าตัวเองกำลังพุ่งตัวออกไปภายนอกสู่ขอบฟ้าที่ไม่มีวันสิ้นสุด\n\nตัวตนหนึ่งเคลื่อนไหวไปพร้อมเพรียงกับเรา §H$code_name_river$§! สายนี้เอื่อยเฉื่อยอยู่ชั่วครู่ก่อนที่ความเร็วของมันจะผลักดันส่งตัวมันข้ามขอบข่ายขีดจำกัดความเข้าใจของเรา\n\nเราต้องก้าวเดินตามมันไป"
 shroud.4125.title:"$the_black_river_article_cap$ ปรากฏตัว"
 shroud.4125.desc:"เมื่อเรากระโจนตัวอย่างทรงพลังข้ามขอบชายเขตจำกัดที่เราสบายตัวใน §Hม่านพลัง§! เท่านั้น เราจึงสามารถเข้าถึงตัว §H$code_name_river$§! ได้สำเร็จ\n\nความรู้สึกของการเคลื่อนไหวทุกทิศทางถาโถมเข้าใส่ตัวเรา ด้วยความเร็วที่ไร้เหตุผลตรรกะซึ่งท้าทายความเข้าใจมาตรฐานทั้งหมด เราหลงเหลือความรู้สึกเสมือนว่าได้เดินทางเป็นระยะทางอันไกลโพ้นในชั่วพริบตาเดียว\n\nในที่สุดเราก็เข้าใจ $the_black_river_color_article$ และการเดินทางที่ไม่รู้จักหยุดหย่อนของมัน ความกว้างใหญ่ของกาแล็กซีเป็นเส้นทางเปิดกว้างให้เราเลือกก้าวข้ามไป"
 shroud.4125.a:"ความเร็วในรูปลักษณ์อันบริสุทธิ์"

 shroud.4135.title: "$end_of_the_cycle_article_cap$"
 shroud.4135.desc:"โดยปราศจากคำเตือนใด ๆ เราถูกฉีกดึงตัวเข้าสู่ม่านพลัง การมีอยู่ที่ตั้งตระหง่านจู่โจมจิตใจของเรา\n\nมันคือ $end_of_the_cycle_color_article$ และมันเฝ้ารอคอยเราอยู่เสมอมา [GetTelepathPlural] ของเราส่งเสียงร้องประกาศออกมาทันทีจากในภวังค์ของพวกตน ด้วยสุ้มเสียงสอดประสานกันนับสิบชีวิตว่า: §R"เวลานี้ยังไม่ใช่เวลาของเจ้า"§! และนิ่งสงัดไปครู่หนึ่ง §R"แต่ก็สามารถเป็นไปได้เช่นกัน"§!\n\nไม่มีคำวาจาอื่นใดกล่าวเพิ่มเติม ทว่าข้อเสนอข้อตกลงได้รับหยิบยื่นให้แล้ว - เรารับรู้สิ่งนั้นได้เป็นอย่างดี พลัง ความรู้ และสมบัติทรัพย์สินอันกว้างใหญ่ไร้ขีดจำกัดรอคอยให้ก้าวเข้าไปไขว่คว้า\n\n§Rหากเพียงแต่เรายอมนำความสิ้นสุดมาสู่จักรวาล§!"
 shroud.4135.a: "$utopia.3308.a$"
 shroud.4135.a.tt:"แทนที่อาณาเขตดินแดนของผู้อุปถัมภ์ที่รู้จักทั้งหมดด้วย $end_of_the_cycle_color_article$\nเราจะได้รับเวลากลืนกินกาแล็กซีอย่างน้อย 50 ปีใน §H$end_aura$§! หากเราทำสำเร็จ เกมจะยุติลง\n$covenant.cycle.tooltip$$shroud.8450.a.tech_tooltip$\n$shroud.4135.psionic_components_insight$\n\nเพิกถอนข้อตกลงของผู้อุปถัมภ์อื่น ๆ ทั้งหมด\n$eotc_opinion_modifier_tooltip$"
 shroud.4135.b:"ก้าวออกจากม่านพลังและพยายามลืมเลือนมันไปเสีย"
 shroud.4135.b.forging_our_own_path:"เส้นทางของเราถูกกำหนดไว้แล้ว เราจะก้าวเดินอย่างเดียวดาย"
 shroud.4135.psionic_components_insight:"ได้รับความก้าวหน้าการวิจัยเทคโนโลยี ['concept_psionic_components'] ทั้งหมด: §G+10%§!"
 concept_psionic_components:"ชิ้นส่วนอุปกรณ์พลังจิต"
 concept_psionic_components_desc: "$tech_psionic_bombers$\n$tech_psionic_lightning$\n$tech_psionic_disruptor$\n$tech_zro_launcher$\n$tech_psionic_shield$\n$tech_precognition_interface$\n$tech_psi_jump_drives$"
 triggered_opinion_eotc_situation_stage1:"การอัญเชิญจุดสิ้นสุด"

 shroud.4140.title:"ทุ่มหมดตัวหรือไม่ก็ไม่เหลืออะไรเลย"
 shroud.4140.desc:"โชคลายของเราผูกพันอยู่กับ $end_of_the_cycle_color_article$ ที่ใดก็ตามที่ออร่า(ออร่า)ของมันเติบโตงอกงาม ประชากรของเราก็ย่อมพัฒนาตามไปด้วย ข้อสรุปธรรมดาประการหนึ่งเกิดขึ้นแก่ใจเรา: สิ่งใดก็ตามที่ขัดขวางออร่านั้นย่อมขัดขวาง [This.GetName] ดังนั้นจึงต้องถูกกวาดล้างกำจัดทิ้งไป\n\nหากเราประสงค์ เราสามารถโยนข้อจำกัดที่มีอยู่ทิ้งไปสำหรับเป้าหมายทางทหารของเรา และพิชิตศัตรูของเราอย่างไร้ความปรานี ไม่มีสิ่งใดต้องขัดขวางเส้นทางสู่ความยิ่งใหญ่สูงสุดของจุดสิ้นสุดนี้"
 shroud.4140.a:"ขอให้ชะตากรรมได้รับการเติมเต็มสำเร็จ"
 shroud.4140.a.tooltip:"ได้รับสิทธิ์เข้าถึงข้ออ้างสิทธิทำสงคราม ['concept_total_war'] §H(Casus Belli)§!\n$eotc_opinion_modifier_2_tooltip$"
 triggered_opinion_eotc_situation_stage2:"ผู้ส่งสารแห่งจุดสิ้นสุด"

 shroud.4145.title:"การล้างผลาญสลายสิ้น"
 shroud.4145.desc_1.common_1:"ในขณะที่ §R$end_aura$§! แผ่ซ่านไปทั่วกาแล็กซี เรารับรู้ได้ถึงแรงต่อต้านที่พอกพูนเพิ่มขึ้น"
 shroud.4145.desc_1.common_2:"ทว่าหาสำคัญไม่ เราจะไม่รอให้ผู้อื่นโอบรับ $end_of_the_cycle_color_article$ อย่างสงบ"
 shroud.4145.desc_1.default:"$shroud.4145.desc_1.common_1$ เพื่อนบ้านที่ห่างไกลของเรากำลังหันมาเป็นศัตรูกับเราอย่างรวดเร็ว $shroud.4145.desc_1.common_2$"
 shroud.4145.desc_1.homicidal:"$shroud.4145.desc_1.common_1$ ความเป็นปรปักษ์ของศัตรูเราเริ่มหยั่งรากลึกแน่นหนาขึ้นเรื่อย ๆ $shroud.4145.desc_1.common_2$"
 shroud.4145.desc_2:"ด้วยแรงบันดาลใจจากเจตจำนงของผู้อุปถัมภ์ เราได้พัฒนาวิธีการใหม่ในการใช้พลังงานและสสารเพื่อเป็นเชื้อเพลิงแก่ออร่า(ออร่า)สรรพสิ่งสารของจักรวาลอาจถูกนำมาสังเวยชดใช้ราคาเพื่อขับเคลื่อนการก้าวรุดหน้าของจุดสิ้นสุด"
 shroud.4145.a:"เราต้องทำทุกสิ่งที่จำเป็น"
 shroud.4145.a.tooltip:"$eotc_opinion_modifier_3_tooltip$\nปลดล็อกคำสั่งรัฐบาล(ประกาศ):\n$t$- ['edict:annihilation_of_matter', $edict_annihilation_of_matter$]\n$t$- ['edict:annihilation_of_energy', $edict_annihilation_of_energy$][GetDimensionalCollapseEdictGain]"
 shroud.4145.dimensional_collapse: "\n$t$- ['edict:dimensional_collapse', $edict_dimensional_collapse$]"
 triggered_opinion_eotc_situation_stage3: "$triggered_opinion_eotc_situation_stage2$"

 shroud.4150.title:"จุดเริ่มต้นของความสิ้นสุด"
 shroud.4150.desc:"ผู้อุปถัมภ์ของเราเอ่ยเตือนอย่างไร้สุ้มเสียง เมื่อเรารับรู้ได้ถึงความใกล้เข้ามาของจุดสิ้นสุดวัฏจักร พลังงานระลอกใหม่ก็ไหลบ่าพลุ่งพล่านไปทั่วทั้ง [This.GetName] เราได้รับการกระตุ้นเตือนด้วยความเร่งด่วน\n\nหากเราปรารถนาที่จะตอบสนองเจตจำนงของจุดสิ้นสุด พลังงานร่วมของ [This.GetSpeciesNamePlural] ทั้งมวลจะต้องถูกนำไปใช้เพื่อเป้าหมายประการเดียว เราต้องสำแดงพลังของผู้อุปถัมภ์ออกมา และแผ่ขยายออร่าของมันให้ครบถ้วนสมบูรณ์ไปยังขอบเขตที่ไกลที่สุดของกาแล็กซี"
 shroud.4150.a:"เวลาของเรามาถึงแล้ว"

