 PROXY_WAR_BUSTED_MESSAGE_TYPE_DESC:"คู่กรณีที่เกี่ยวข้องในสงครามได้ค้นพบว่าเราเป็นผู้ก่อสงครามตัวแทน\n$shroud.5060.a.tt$"

