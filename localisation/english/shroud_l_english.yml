 # Experimental Testing - Test subjects escape
 shroud.1105.title:"กลุ่ม $job_test_subject_plural$ หลบหนี"
 shroud.1105.desc.intro:"กลุ่มตัวอย่างทดสอบที่สำคัญของเราจำนวนหนึ่งได้ทำการหลบหนีออกจากศูนย์ทดลองวิจัยบนดาว §H[root.GetName]§! ผ่านอุโมงค์หลบหนีที่ขุดขึ้นมาชั่วคราว\n\nการขุดอุโมงค์โดยใช้เครื่องมือที่ประดิษฐ์ขึ้นเองและสองมือเปล่า [Owner.GetSpeciesHandNamePlural] แสดงให้เห็นว่าอุโมงค์นี้ต้องใช้เวลาขุดนานหลายปี เราไม่อาจทราบแน่ชัดว่ามีกี่ชีวิตที่ล่วงรู้ถึงการมีอยู่ของอุโมงค์นี้ และมันหลุดรอดการตรวจจับมาได้อย่างยาวนานขนาดนี้ได้อย่างไร"
 shroud.1105.desc.escaped:"การพัฒนาเช่นนี้จำเป็นต้องได้รับการตอบโต้อย่างเด็ดขาดเพื่อป้องกันไม่ให้เกิดความพยายามหลบหนีซ้ำอีก ความใจดีของเราในอดีตต่อปัญหานี้ดูเหมือนจะเป็นการส่งเสริมให้ประชากรที่เหลือเริ่มมีพฤติกรรมกระด้างกระเดื่องตาม"
 shroud.1105.desc.outro:"สถานการณ์เช่นนี้จำเป็นต้องได้รับการตอบสนองทางวินัยที่เด็ดขาดเพื่อหลีกเลี่ยงไม่ให้เกิดการกระทำผิดกฎหมายซ้ำรอยอีก"
 shroud.1105.a:"พวกเขาได้แลกอิสรภาพด้วยความเพียรแล้ว"
 shroud.1105.a.tt:"ครึ่งหนึ่งของกลุ่มตัวอย่างวิจัย §Y$job_test_subject_plural$§! บนดาว §H[root.GetName]§! จะอพยพหลบหนีออกไปในฐานะผู้ลี้ภัย"
 shroud.1105.b:"สั่งปิดทำการและหยุดปฏิบัติงานชั่วคราวจนกว่าเราจะตามตัวพวกเขากลับคืนมาได้"
 shroud.1105.b.tt:"กลุ่มตัวอย่างวิจัย §Y$job_test_subject_plural$§! ที่หลบหนีไปจะถูกตามตัวจับกุมกลับมาได้สำเร็จ"
 shroud.1105.c:"สั่งประหารชีวิตประชากรที่เหลือเพื่อเป็นเยี่ยงอย่างแก่คนอื่น"
 shroud.1105.c.tt:"สูญเสียกลุ่มตัวอย่างวิจัย §Y$job_test_subject_plural$§! ทั้งหมดบนดาว §H[root.GetName]§!"

