 MINDWARDEN_ENCLAVE: "$MINDWARDEN$"
 MINDWARDEN_ENCLAVE_plural: "$MINDWARDEN_plural$"

 starbase_mindwarden: "$MINDWARDEN$"
 starbase_mindwarden_plural: "$MINDWARDEN_plural$"

 gov_mindwarden_enclave:"ลัทธิสหายผู้คุ้มครองประสาทสัมผัส(มองโกล)กลุ่มเอนเคลฟ)"
 gov_mindwarden_enclave_desc:"ด้วยแรงขับดันจากความจงเกลียดจงชังอย่างลึกซึ้งต่อม่านพลัง องค์กรนี้จึงส่งมอบงานบริการและเทคโนโลยีเพื่อเข้าแทรกแซงลดผลลัพธ์จากกิจกรรมพลังจิตวิญญาณ"

 civic_mindwarden_enclave: "$ENCLAVE_MINDWARDEN$"
 civic_mindwarden_enclave_desc: ""

 enclave_mindwarden_station:"สถานี $MINDWARDEN$"
 enclave_mindwarden_station_plural:"สถานี $MINDWARDEN$"

 leader_trait_iron_will:"เจตจำนงดุจเหล็กกล้า"
 leader_trait_iron_will_desc:"ผู้บัญชาการทหารระดับเลิศของ $MINDWARDEN_plural$ ผู้มีชื่อเสียงโด่งดังในด้านทักษะความชำนาญในการจัดตั้งแนวรับหนาแน่นและขีดความแข็งแกร่งในการต่อต้านการจู่โจมทางจิตใจ"

 shroud.4190.name:"ออร่าพลังจิต (§Y$PSIONIC_AURA$§!) เคลื่อนตัวเข้ามาใกล้"
 shroud.4190.desc.intro:"เมื่อช่วงเวลากาลเวลาหนึ่งพ้นผ่าน [GetScientistPlural] ของเราเฝ้าพบกับปรากฏการณ์วิสัยที่ผิดปกติ: ระบบดาวฤกษ์ที่ห่างไกลออกไปมีกระแสไหลเวียนของพลังงานที่ไม่ทราบจุดกำเนิดแน่ชัด ซึ่งในเวลาถัดมาค่อย ๆ แผ่ขยายลุกลามเข้าสู่ระบบดาวดวงอื่น"
 shroud.4190.desc:"$shroud.4190.desc.intro$ โดยได้ข้อสมญานามว่า §H'$PSIONIC_AURA_PLURAL$'§! ตามแนวทฤษฎีพิจารณายังไม่ได้รับการยืนยันถึงจุดที่มาของพวกมัน ในเวลานี้เรายังไม่สามารถยืนยันได้ว่าพวกมันมีจุดประสงค์ภัยร้ายคุกคามหรือไม่\n\nออร่าดังกล่าวในเวลานี้ตรวจพบเจอตัวตนจริงในระบบดาว §H[from.GetName]§! ซึ่งอาจรุกล้ำขยายล่วงพรมแดนของเราเข้ามาหากยังแผ่ขยายพื้นที่สืบไป"
 shroud.4190.desc_mindwarden:"หากสมมติฐานเกี่ยวกับจุดกำเนิดพลังจิตวิญญาณของปรากฏการณ์นี้ต้องตรงจริง ทางกลุ่มสมาคม §H[event_target:mindwarden_enclave_country.GetName]§! ก็อาจจะมีปัญญาความรู้วิธีแทรกแซงลดผลลัพธ์ของมัน"
 shroud.4190.a:"เราน่าจะได้ล่วงรู้ผลลัพธ์ของพวกมันในเร็ววัน"

 shroud.4191.name: "$shroud.4190.name$"
 shroud.4191.desc_1.common:"พวกเราตรวจพบระดับความเข้มข้นที่หนาแน่นพิเศษของพลังจิตวิญญาณในระบบดาว §H[from.GetName]§! จากการรับฟังสัญญาณสะท้อนในระดับพลังจิตใน §Hม่านพลัง§! [GetTelepathPlural] ของเรารายงานระบุว่าปรากฏการณ์นี้เกิดขึ้นจากกิจกรรมทางพลังจิตของ"
 shroud.4191.desc_1.default:"$shroud.4191.desc_1.common$ จักรวรรดิต่างดาวแห่งหนึ่ง"
 shroud.4191.desc_1.contact:"$shroud.4191.desc_1.common$ จักรวรรดิ §H[fromfrom.GetName]§!"
 shroud.4191.desc_2.common:"สสารและจิตสำนึกในความเป็นจริงภายนอก ผลงานสังเกตการณ์ของเราสำแดงให้เห็นว่าค่าออร่าเหล่านี้สามารถแผ่ลามข้ามระบบดาวฤกษ์สืบไปได้"
 shroud.4191.desc_2.default:"ได้รับการขนานนามระบุเป็น §H$PSIONIC_AURA$§! (ออร่าพลังจิต) มันเป็นผลพวงจากเจตจำนงของตัวตนผู้ยิ่งใหญ่แห่งม่านพลัง ส่งผลสะท้อนต่อ $shroud.4191.desc_2.common$"
 shroud.4191.desc_2.knows_aura:"ดูเหมือนว่าทางจักรวรรดิแห่งนี้พัฒนาวิธีแปรสัญญานเพื่อเรียกใช้งาน §H$PSIONIC_AURA$§! (ออร่าพลังจิต) ซึ่งหลั่งไหลประทานมาจากม่านพลังและส่งอิทธิพลต่อ $shroud.4191.desc_2.common$"
 shroud.4191.desc_3.common:"เราประเมินผลลัพธ์ของมันในเขตแดนพรมแดนของเราว่าจะเป็นคุณประโยชน์ [GetPositiveRivalAdj] - ตราบเท่าที่ระดับมิตรภาพความร่วมมือกับประเทศผู้แผ่ออร่ายังเหมือนเดิม"
 shroud.4191.desc_3.default:"ตามรายงานของ [GetTelepathPlural] ของเรา มันแผ่พลังงานความปรารถนาดี [GetBenevolentRivalAdj] ดังนั้น $shroud.4191.desc_3.common$"
 shroud.4191.desc_3.contact:"จากทัศนะความสัมพันธ์อัน [GetLessThanRivalAdj]พึงพอใจของพวกเรากับทาง [fromfrom.GetName] ดังนั้น $shroud.4191.desc_3.common$"
 shroud.4191.a.rival_organic: "$WORRYING$"
 shroud.4191.a.rival_default:"การแปรเปลี่ยนทิศทางที่ไม่น่ายินดีนัก"
 shroud.4191.a.organic:"ของประทานรางวัลล้ำค่าจากม่านพลัง"
 shroud.4191.a.default:"ปรากฏการณ์ที่แปลกประหลาดน่าค้นคว้าหาความรู้"

 shroud.mindwarden.back: "$enclave.410.a$"

 shroud.4205.name: "[event_target:mindwarden_enclave_country.GetName]"
 shroud.4205.common:"ยินดีต้อนรับเข้าพบ ข้าพเจ้าเจรจากับท่านในฐานะทูตสลักผู้แทนของทาง [event_target:mindwarden_enclave_country.GetName]"
 shroud.4205.desc:"$shroud.4205.common$\n\nพันธกิจหน้าที่ของเราคือการปกป้องจักรวรรดิจากภยันตรายของ §Hม่านพลัง§! และใครก็ตามที่ช่วยแผ่ขยายอิทธิพลเสื่อมทรามของมัน เราเชื่อมั่นในสิทธิเสรีจิตใจที่เป็นอิสระจากการบุกรุก และมีจุดประสงค์ช่วยคุ้มครองกาแล็กซีให้ปลอดภัยจากพลังจิตวิญญาณ\n\nจากการประเมินอ่านค่าเซ็นเซอร์พลังจิตของเรา ท่านไม่มีส่วนชักนำต่อภัยคุกคามดังกล่าว ยอดเยี่ยมยิ่งนัก พวกเรายินดีต้อนรับร่วมให้การช่วยเหลือคุ้มครองท่านเพื่อป้องกันตนเองจากใครก็ตามที่ทำเช่นนั้น\n\n$shroud.4205.desc.end$"
 shroud.4205.desc.end:"หากท่านปรารถนางานทหารสยบพลังจิตวิญญาณ หรือกำลังหาลู่ทางเคลียร์แร่ §H$zro_lower$§! ทิ้ง โปรดให้สิทธิ์เราช่วยเหลือท่าน"
 shroud.4205.desc.return:"ยินดีต้อนรับกลับมา ทาง [event_target:mindwarden_enclave_country.GetName] เฝ้าทะนุถนอมความร่วมมือสืบไปของเรา\n\nผลการวัดอ่านค่าเซ็นเซอร์พลังจิตของพวกเราแจ่มแจ้งดี ท่านยังสะอาดปราศจากมลทินของ §Hม่านพลัง§! ดีแล้ว ดีแล้ว...\n\n$shroud.4205.desc.end$"
 shroud.4205.desc.eotc:"นี่คือช่วงวาระเวลาที่ยากลำบากวิกฤตหนัก แม้ว่าเราจะพยายามเต็มความสามารถ ทว่าตัวตน $end_of_the_cycle_color_article$ ก็ได้เข้าเล่นงานเราแล้ว ร่างจำลองอันเกรี้ยวกราดโหดร้ายของมันเฝ้าคุกคามสลักรอยท่ามกลางดวงดาว...\n\n$shroud.4205.desc.eotc.end$"
 shroud.4205.desc.eotc.end:"บัดนี้ถึงเวลาแล้วที่เราจะต้องยืนหยัดร่วมกันและป้องกันไม่ให้เกิดวันสิ้นโลกจากพลังจิต"
 shroud.4205.desc.merc_first:"สหายผู้คุ้มครองทุกท่าน เรานำส่งข่าวดีระดับล้ำค่า: การจัดตั้งรากฐานสมาคม §H$gov_mindwarden_enclave$§! แห่งแรกเสร็จสิ้นลงแล้ว $shroud.shared_combating_the_shroud$"
 shroud.4205.desc.merc_more:"สหายผู้คุ้มครองทุกท่าน เรานำส่งข่าวดีระดับล้ำค่า: การจัดตั้งรากฐานสมาคม §H$gov_mindwarden_enclave$§! ของพวกเราเสร็จสิ้นลงแล้ว $shroud.shared_combating_the_shroud$"
 shroud.4205.desc.merc_back:"ยินดีต้อนรับกลับมาสหายผู้ร่วมรบ ทางสมาคม §H[mindwarden_enclave_country.GetName]§! เฝ้าให้ความสำคัญกับความร่วมมือสืบไปของเรา\n\n$shroud.4205.desc.end$"
 shroud.4205.desc.return_beginning: "$shroud.4205.desc.end$"
 shroud.4205.desc.return_beginning.eotc: "$shroud.4205.desc.eotc.end$"
 shroud.4205.a:"ม่านพลัง(คําราม)คือสิ่งใดกันแน่?"
 shroud.4205.b:"เราประสงค์จะขอยกเรื่องพูดคุยแลกเปลี่ยนเกี่ยวกับแร่ §I$sr_zro$§!"
 shroud.4205.c:"เรามีลู่ทางจัดการรับมือแก้ไขกับค่าออร่าพลังจิต (§Y$PSIONIC_AURA_PLURAL$§!) ได้อย่างไรบ้าง?"
 shroud.4205.d:"เรารับรู้เป้าหมายผู้ใช้พลังจิตวิทยาที่เหมาะสมด่านนึง..."
 shroud.4205.e:"เราต้องการให้ท่านช่วยจัดการปัญหาด้านปราบจลาจลอาชญากรรม (§Y[GetCrimeDeviancy]§!) ภายในถิ่นฐานของเรา"
 shroud.4205.ef:"เราต้องการ§Yความช่วยเหลือทางปูมบันทึก§!."
 shroud.4205.f:"เรามีโอกาสประสงค์จะขอยืมอานุภาพกองทัพทหารของท่านมาทำงาน"
 shroud.4205.g:"ท่านยินดีประสานงานส่งกำลังบุคลากรผู้คุมระดับสูง (§Yพัศดี§!) มาช่วยงานเราหรือไม่?"
 shroud.4205.h:"เราประสงค์จะขอพูดคุยประเด็นเกี่ยวกับ $end_of_the_cycle_article$"
 shroud.4205.i:"ในฐานะประเทศองค์อุปถัมภ์ผู้ก่อตั้ง (§Yผู้สร้าง§!) ของท่าน เรามีข้อเสนอข้อตกลงอยากยื่น"

 shroud.shared_combating_the_shroud:"นับจากวันนี้สืบไป ทางสมาคม §H[mindwarden_enclave_country.GetName]§! จะสืบสานพันธกิจสำคัญในการสยบภัยคุกคามจาก §Hม่านพลัง§! และกิจกรรมพลังจิตวิญญาณในทางที่ผิดแผกบิดเบี้ยวทุกรูปแบบ\n\nหากท่านต้องการใช้บริการ พวกเราพร้อมเสร็จสรรพที่จะส่งมอบการช่วยเหลือต่อต้านพลังจิตในหลากหลายรูปแบบ - ตั้งแต่การเคลียร์ทำลายแร่ §H$zro_lower$§! ไปจนถึงงานระดมกำลังกองทัพทหาร - ได้อย่างฉับไวและมีประสิทธิผลยอดเยี่ยม"

 shroud.4210.desc:"มิติม่านพลัง (§Hเดอะชราวด์§!) อธิบายใจความได้ชัดเจนที่สุดว่าเป็นมิติของสัจธรรมความเป็นจริงที่ดำรงอยู่นอกเหนือระดับประสาทสัมผัสสังเกตการได้ยินปกติ มันประกอบสร้างขึ้นจากพลังงานจิตวิญญาณแฝงที่เป็นภัยร้ายเกือบทั้งหมด มันทอดสัมผัสแตะต้องต่อทุกพิกัดของกาแลกซีทางกายภาพ ทว่าประชาชนส่วนใหญ่มักไม่รับรู้การคงอยู่แฝงของมันเลย\n\nพลังงานจากม่านพลังสามารถปะทุสำแดงเดชขึ้นในโลกกายภาพได้จริงผ่านทางกระบวนการนึกคิดของสิ่งชีวิตที่มีจิตสัมปชัญญะ พลังอานุภาพเหล่านี้ส่อแววอันตรายและแปรปรวนเดาทางทิศทางยากอย่างยิ่ง\n\nการปกป้องชีวิตประชากรของคุณให้แคล้วคลาดปลอดภัยจำเป็นต้องมีมาตรการแทรกแซงคุ้มครองป้องกันตนเองจากภัยม่านพลัง และเพื่อสิ่งนี้พวกเราพร้อมยื่นมือให้ความช่วยเหลือแก่ท่าน"

 shroud.shared_text_shroud_seal:"อุปกรณ์พิเศษที่ได้รับการประกอบสร้างอย่างประณีตเหล่านี้จะช่วยแปรผลสลายล้างออร่าพลังจิต ($PSIONIC_AURA$) ไปทีละน้อย จนกระทั่งมันโดนสะกดสยบลงโดยสมบูรณ์แบบ - ทั้งในส่วนพิกัดระบบดาวเจ้าบ้านและระบบดาวรอบข้างที่เชื่อมโยงตรงผ่านทางไฮเปอร์เลน(hyperlantes)"
 shroud.4230.desc:"แนวทางในการระงับสยบออร่าพลังจิต (§H$PSIONIC_AURA_PLURAL$§!) มีอยู่สองวิธีหลักด้วยกัน\n\nการก่อตั้งอาคารเครื่องยับยั้งสยบพลังจิต (§H$building_psionic_suppressor$§!) บนดวงดาว จะช่วยผ่อนเบาระดับความเข้มข้นออร่าไปทีละนิดผ่านทั่วทั้งระบบดาวฤกษ์ดวงนั้น และขัดขวางการแผ่ลามล่วงล้ำเข้ามาสืบไป\n\nวิธีการแก้ปัญหาที่เปี่ยมอานุภาพและประสิทธิภาพกว่านั้นคือการจัดสร้างตราผนึกม่านพลัง (§H$SHROUD_SEAL$§!) $shroud.shared_text_shroud_seal$"
 shroud.4230.a:"ยกเลิกคุยประเด็นนี้ไว้ก่อน"
 shroud.4230.b:"โปรดแนะส่งสอนวิชาวิทยาการการสะกดพลังจิตวิญญาณ (§Y$tech_psionic_suppression$§!) แก่เรา"
 shroud.4231.desc:"ด้วยความยินดีอย่างยิ่ง ข้อมูลรหัสวิเคราะห์จะจัดส่งระบบทันที ณ วินาทีนี้\n\nขอให้วิทยาการเทคโนโลยีเหล่านี้ช่วยนำพาสันติสุขความสงบไร้ภัยออร่าพลังจิตมาสู่ประเทศของท่าน"

 mindwarden_encourage_raid:"สนับสนุนชำระราคาทรัพย์สินแด่ชาว [event_target:mindwarden_enclave_country.species.GetNamePlural] ให้ช่วยส่งกำลังจู่โจมปล้นจักรวรรดิพลังจิตวิญญาณที่เราตรวจพบ"
 shroud.4240.need_psionics:"จัดตั้งการเชื่อมโยงการติดต่อสื่อสารจริงกับจักรวรรดิพลังจิตวิญญาณ (§Y$trait_psionic$§!)"
 shroud.4240.desc:"อย่างนั้นหรือ? เอาเถอะ เราคงไม่มีวันได้พบกับความสงบสุขและความมั่นคงที่แท้จริง ตราบใดที่พวกมันยังแพร่เชื้อพลังจิตไปทั่วทั้งกาแล็กซี...\n\nการจู่โจมแบบกำหนดเป้าหมายจะแสดงให้เห็นถึงการต่อต้านพฤติกรรมอันตรายเหล่านี้ของเรา ด้วยการสนับสนุนทางการเงินจากคุณ เรายินดีที่จะดำเนินปฏิบัติการดังกล่าว\n\nโปรดแจ้งให้เราทราบเป้าหมาย หากคุณเห็นด้วย"
 shroud.4240.a:"ความจริงแล้ว ช่างมันเถอะ"
 shroud.4240.b: "§I[event_target:raid_target_1.GetName]§!"
 shroud.4240.c: "§I[event_target:raid_target_2.GetName]§!"
 shroud.4240.d: "§I[event_target:raid_target_3.GetName]§!"
 shroud.4240.e: "§I[event_target:raid_target_4.GetName]§!"
 mindwarden_raid_cooldown_tt:"§Rเราจะไม่สามารถร้องขอการจู่โจมอีกครั้งจากผู้คุ้มครองประสาทสัมผัส(มองการณ์ไกล)ได้จนกว่าจะถึง §Y[root.mindwarden_raid_timer]§!.§!"
 mindwarden_hire_raid:"จ่ายเงินให้ [event_target:mindwarden_enclave_country.GetName] เพื่อส่งกองยานโจมตีไปโจมตีจักรวรรดินี้"
 shroud.4245.desc:"อา ใช่แล้ว เราตระหนักดีถึงการใช้พลังจิตของพวกมัน การแสดงแสนยานุภาพนั้นถือว่าสมเหตุสมผลแล้ว\n\nขอบคุณสำหรับการสนับสนุน ปฏิบัติการจะเริ่มขึ้นในไม่ช้า"
 mindwarden_raider_modifier:"กองยานโจมตีต่อต้านพลังจิตของผู้คุ้มครองประสาทสัมผัส"

 shroud.4246.name:"การโจมตีจาก $gov_mindwarden_enclave$"
 shroud.4246.common_1:"การสื่อสารที่ถูกดักสกัดระบุว่าพวกมันถูกจ้างวานโดยมหาอำนาจที่เป็นอริเพื่อมาโจมตีระบบดาวของเรา"
 shroud.4246.common_2:"กำลังส่งข้อความผ่านช่องทางสาธารณะ โดยจ่าหน้าถึงเราโดยตรง"
 shroud.4246.desc:"กองยานทหารจาก §H[event_target:mindwarden_enclave_country.GetSpeciesName]§! กำลังใกล้เข้ามายังชายแดนของเรา! $shroud.4246.common_1$ พวกมัน $shroud.4246.common_2$"
 shroud.4247.desc:"กองยานจากมหาอำนาจทางการทหารที่ไม่เคยรู้จักมาก่อนกำลังใกล้เข้ามายังชายแดนของเรา! $shroud.4246.common_1$ โดยพวกมันระบุว่าตนเองคือ §H[event_target:mindwarden_enclave_country.GetSpeciesNamePlural]§! พวกมัน $shroud.4246.common_2$"

 NAME_Mindwarden_Corvette:"Zealot"
 NAME_Mindwarden_Frigate:"Sentinel"
 NAME_Mindwarden_Destroyer:"Inquisitor"
 NAME_Mindwarden_Cruiser:"Exorcist"
 NAME_Mindwarden_Battleship:"Purifier"
 NAME_Mindwarden_Titan:"Judicator"
 mindwarden_defense_modifier:"กองกำลังป้องกันตนเองของผู้คุ้มครองประสาทสัมผัส"

 shroud.4250.desc:"ยอดเยี่ยมมาก การส่งมอบ $zro_lower$ ให้กับเราช่วยให้เราสามารถดำเนินงานวิจัยที่สำคัญอย่างยิ่งเกี่ยวกับสารอันทรงพลังและถูกนำไปใช้ในทางที่ผิดอย่างแพร่หลายชนิดนี้ได้ — งานวิจัยนี้จะเป็นประโยชน์ต่อทั้งกาแล็กซี\n\nนี่คือเหตุผลว่าทำไมอัตราการรับซื้อของเราจึงสูงกว่ามาตรฐานของกาแล็กซีอย่างมาก"
 shroud.4250.a: "$shroud.mindwarden.back$"
 shroud.4250.b:"§I$sr_zro$§! คืออะไร?"
 shroud.4250.c:"บริจาค £sr_zro£ §I$sr_zro$§!"
 mindwarden_zro_explanation:"ขาย §Y$sr_zro$§! ได้สูงสุด 100 หน่วย ในราคา 5 เท่าของราคาตลาดกาแล็กซี ($resolution_category_galactic_market$) มาตรฐาน"
 mindwarden_zro_cooldown_tt:"§Rเราจะไม่สามารถมอบ $sr_zro$ ให้แก่ผู้คุ้มครองประสาทสัมผัสได้จนกว่าจะถึง §Y[root.mindwarden_zro_timer]§!.§!"
 shroud.4251.desc:"§Y$sr_zro$§! เป็นสารหายากที่มีความไม่เสถียรสูง ซึ่งส่งผลต่อการควบคุมและคาดการณ์ได้ยาก ไม่ว่าจะโดยตั้งใจหรือไม่ก็ตาม มันสามารถทำให้เกิดการระเบิดพลังงานอย่างรุนแรงจนสร้างความเสียหายในวงกว้างได้\n\nคุณสมบัติเหล่านี้เกิดจากการทำปฏิกิริยากับม่านพลัง (§Hเดอะชราวด์§!) ทำให้มันเป็นที่นิยมในหมู่ผู้ฝึกฝนพลังจิต — ซึ่งบางส่วนใช้เสพมันเป็นยาเสพติด\n\nเรามีเป้าหมายที่จะเรียนรู้เพิ่มเติมเกี่ยวกับ $zro_lower$ และวิจัยหาวิธีการกำจัดมันอย่างปลอดภัย นั่นคือเหตุผลที่เราจ่ายเงินให้อย่างคุ้มค่าสำหรับปริมาณใดๆ ก็ตามที่นำมามอบให้เรา"
 shroud.4255.desc:"ขอบคุณสำหรับการสนับสนุนบริจาคของคุณ"

 shroud.4260.desc:"ถ้าเช่นนั้น ให้เราจัดหามาตรการ §Y$decision_thought_police$§! ที่มีประสิทธิภาพให้แก่คุณ ซึ่งสามารถตรวจจับเจตนาร้าย [GetCriminalDeviant] ได้ก่อนที่มันจะแสดงออกมาเป็นพฤติกรรมจริง\n\nวิธีการของพวกเขานั้นได้รับการพัฒนาขึ้นมาเพื่อเป็นทางเลือกที่ปลอดภัยแทนแนวปฏิบัติทางพลังจิต โดยใช้เทคนิคทางวิทยาศาสตร์เพื่อเฝ้าติดตามกิจกรรมทางปัญญาของประชากร พวกมันจะช่วยให้ข้อมูลเชิงลึกเกี่ยวกับสภาวะทางจิตใจโดยไม่ต้องหันไปพึ่งพาพลังงานอันตรายของม่านพลัง (§Hเดอะชราวด์§!)"
 shroud.4260.a: "$shroud.mindwarden.back$"
 shroud.4260.b:"จ้าง §I$decision_thought_police$§!"
 mindwarden_decision_cooldown_tt:"§Rเราจะไม่สามารถร้องขอสิ่งนี้ได้จนกว่าจะถึง §Y[root.mindwarden_decision_timer]§!.§!"
 mindwarden_decision_explanation:"ปลดล็อก £decision£ §Yการตัดสินใจระดับดาวเคราะห์(การตัดสินใจเรื่องอาหาร)§!: §Y$decision_thought_police$§! 1 รายการ"
 shroud.4262.desc:"ยอดเยี่ยมมาก ฉันคิดว่าคุณจะพบว่าวิธีการของพวกเขานั้นมีประสิทธิผลค่อนข้างดีเลยทีเดียว"

 shroud.4265.desc:"ถูกต้องแล้ว ความร่วมมือของเราได้ช่วยเปิดเผยให้เราเห็นบางแง่มุมของการปรับปรุงที่สามารถดำเนินการได้กับกลยุทธ์การวางกำลังทหารของคุณ\n\nแน่นอนว่าเราไม่ได้มีเจตนาจะดูหมิ่นแต่ประการใด เราเพียงแค่มีความเชี่ยวชาญในด้านเหล่านี้เป็นพิเศษ เรารู้สึกเป็นเกียรติอย่างยิ่งที่จะได้ช่วยเหลือพันธมิตรที่มีค่าในเรื่องนี้ หากคุณมอบค่าตอบแทนที่เหมาะสมแก่เรา"
 shroud.4265.a: "$shroud.mindwarden.back$"
 shroud.4265.b:"ตกลงตามข้อเสนอนี้"
 mindwarden_logistics_cooldown_tt:"§Rเราไม่สามารถร้องขอความช่วยเหลือด้านการส่งกำลังบำรุงเพิ่มเติมจากผู้คุ้มครองประสาทสัมผัสได้จนกว่าจะถึง §Y[root.mindwarden_logistics_timer]§!.§!"

 shroud.4267.desc:"สวัสดี พันธมิตรผู้มีอุปการคุณ\n\nสัญญาความช่วยเหลือในการปฏิบัติการโลจิสติกส์กองยานของคุณได้หมดอายุลงแล้ว เรามีความยินดีอย่างยิ่งที่จะร่วมเป็นพันธมิตรต่อ หากคุณคิดว่าการดำเนินการนี้คุ้มค่าสำหรับคุณ"
 shroud.4267.a:"ร่วมเป็นพันธมิตรต่อไป"
 shroud.4267.b:"เราขอปฏิเสธไว้ก่อนในตอนนี้"

 shroud.4266.desc:"ดีมาก ปฏิบัติการสนับสนุนกองยานของเราจะเริ่มต้นขึ้นในทันที"

 shroud.4270.desc:"ทหาร $NAME_Mindwarden_Army$ ของเราเป็นทหารจู่โจมชั้นเลิศ พวกเขาพร้อมรับมือกับภัยคุกคามที่หลากหลาย แต่มีประสิทธิภาพสูงเป็นพิเศษในการต่อสู้กับคู่ต่อสู้ที่ใช้พลังจิต\n\nเราคิดว่าคุณจะพบว่าพวกเขามีค่าคู่ควรกับราคาของพวกเขา"
 shroud.4270.a: "$shroud.mindwarden.back$"
 shroud.4270.b:"จ้างกองทัพ §I$mindwarden_army$§!"
 mindwarden_army_cooldown_tt:"§Rเราจะไม่สามารถขอรับกองทัพใหม่จากผู้คุ้มครองประสาทสัมผัสได้จนกว่าจะถึง §Y[root.mindwarden_army_timer]§!.§!"
 mindwarden_army_explanation:"เกณฑ์กองทัพ §Y$mindwarden_army$§! ซึ่งจะเดินทางมาถึงด้วยยานขนส่ง ($transport$) ที่ระบบดาวเมืองหลวงของเรา"
 shroud.4271.desc:"คุณโชคดีแล้ว เรามีหน่วยที่พร้อมเข้าประจำการอยู่แล้วในตอนนี้ คาดว่ายานขนส่งของพวกเขาจะเดินทางมาถึงในไม่ช้า"

 shroud.4280.desc:"เรามีความยินดีอย่างยิ่ง\n\nความเป็นผู้นำที่มีประสิทธิภาพคือหัวใจสำคัญในการต่อสู้กับม่านพลัง (§Hเดอะชราวด์§!) และผู้คุ้มครองของเราก็มีความเชี่ยวชาญเป็นอย่างดีในการระงับกิจกรรมพลังจิตผ่านทางการปกครองที่มั่นคงเด็ดขาด"
 shroud.4280.a: "$shroud.mindwarden.back$"
 shroud.4280.b:"ว่าจ้าง §I$subclass_commander_governor$§!"
 mindwarden_commander_explanation:"\nเราจะว่าจ้างผู้ปกครองระดับ 5 ($subclass_commander_governor$) ของผู้คุ้มครองประสาทสัมผัส"
 unlocks_mindwarden_council_position:"\n§Eอนุญาตให้ปลดล็อกตำแหน่งสภา:§!\n§H$t$$councilor_mindwarden$§!\n$tt$$COUNCIL_POSITION_MODIFIER_BASE$\n$ttt$$mod_country_unity_produces_mult$: §G+1%§!\n$ttt$$planet_crime$: §G-1%§!\n$ttt$$MOD_PSIONIC_AURA_RESISTANCE_MULT$: §G+5%§!\n$COUNCIL_POSITION_AVAILABLE_FOR$$t$$commander_with_icon$\n\n$COUNCIL_POSITION_REQUIREMENTS$$councilor_mindwarden_conditional_tooltip$"
 mindwarden_commander_already_bought:"§Rเราได้ว่าจ้างบริการของผู้ปกครอง $subclass_commander_governor$ ของผู้คุ้มครองประสาทสัมผัสไปแล้ว§!"
 mindwarden_commander_conflicted_leader:"§Rต้องไม่มีผู้นำที่เป็นตัวแทนจาก [event_target:shroudwalker_enclave_country.GetName]§!"
 mindwarden_commander_cooldown_tt:"§Rเราจะไม่สามารถร้องขอผู้นำคนอื่นจากผู้คุ้มครองประสาทสัมผัสได้จนกว่าจะถึง §Y[root.mindwarden_commander_timer]§!.§!"
 mindwarden_commander_desc:"ผู้นำที่ได้รับการคัดเลือกมาจาก $gov_mindwarden_enclave$ คนนี้ ส่งเสริมจุดยืนที่เด็ดเดี่ยวไม่ยอมจำนนต่อกิจกรรมพลังจิต ปกป้องประชาชนให้พ้นจากผลกระทบที่เป็นภัยร้ายแรงของม่านพลัง(คําราม)"
 mindwarden_commander_catch_phrase:"จุดใดก็ตามที่ม่านพลังรั่วซึมเข้ามา แผลนั้นจะต้องถูกจี้ปิดเผาชำระล้างทันที"
 shroud.4281.desc:"เป็นการตัดสินใจที่ชาญฉลาด ขอให้การดูแลของพวกเขาช่วยให้ประชากรของคุณปลอดภัยไปอีกหลายปีต่อจากนี้"

 shroud.4286.name:"การโจมตี [FROM.GetName]"
 mindwarden_farewell:"§L"การโจมตี $gov_mindwarden_enclave$ ของคุณเมื่อเร็วๆ นี้ถือเป็นเรื่องที่ยอมรับไม่ได้อย่างยิ่ง การปฏิบัติงานภายในอาณาเขตของคุณ ไม่ว่าจะในบทบาทใดก็ตาม ถือเป็นการกระทำที่ขาดคุณธรรมและจริยธรรมอย่างไม่อาจยอมรับได้ ฉันขอแนะนำอย่างยิ่งให้คุณยุติความเกลียดชังอันไร้สาระนี้ — แต่ไม่ว่าทางเลือกในอนาคตของคุณจะเป็นอย่างไร ฉันจะไม่ทนอยู่ตรงนี้เพื่อสนับสนุนพวกเขาอีกต่อไป"§!"
 shroud.4286.desc: "$enclave.8000.start$\n\n$mindwarden_farewell$\n\n$enclave.8000.end$"
 shroud.4286.desc.councilor: "$enclave.8000.start$\n\n$mindwarden_farewell$\n\n$enclave.8000.councilor_end$"

 shroud.4290.desc:"เป็นเรื่องที่ร้ายแรงอย่างยิ่งยวด ไม่มีสิ่งชั่วร้ายใดในกาแล็กซีที่จะยิ่งใหญ่ไปกว่าภัยพิบัติจาก $end_of_the_cycle_color_article$ อีกแล้ว"
 shroud.4290.a: "$marauder.31.e$"
 shroud.4290.b:"$end_of_the_cycle_color_article$ คืออะไรกันแน่!?"
 shroud.4290.b.response:"ตามข้อมูลข่าวกรองของเรา $end_of_the_cycle_color_article$ คือพลังงานทำลายล้างครั้งใหญ่จากภายในม่านพลัง (§Hเดอะชราวด์§!) พลังของมันสามารถแสดงตนขึ้นมาในโลกความเป็นจริงได้ผ่านความสมรู้ร่วมคิดของผู้บุกรุกม่านจิตที่กระหายในอำนาจ\n\nจุดจบดังกล่าวจะสร้างความพินาศย่อยยับให้แก่กาแล็กซีผ่านทาง §R$NAME_Reckoning$§! — สิ่งมีชีวิตที่ดุร้ายซึ่งประกอบขึ้นจากพลังงานจิต เป้าหมายสูงสุดของมันคือการลบล้างทำลายล้างการดำรงอยู่นี้ให้สูญสิ้นโดยสมบูรณ์"
 shroud.4290.c:"เราจะเอาชนะ §R$NAME_Reckoning$§! ได้อย่างไร?"
 shroud.4290.d:"โปรดสอนเรื่องยุทธวิธี §Y$mindwarden_tactics_modifier$§! แก่เรา"
 shroud.4291.desc:"ขอให้คุณได้รับชัยชนะต่อภัยคุกคามอันยิ่งใหญ่นี้ มันกำลังคุกคามการดำรงอยู่ของทุกคนที่เรียกกาแล็กซีแห่งนี้ว่าเป็นบ้าน"
 shroud.4292.desc:"เราได้พัฒนาอัลกอริทึมที่สามารถเสริมการโจมตีของคุณต่อต้าน §R$NAME_Reckoning$§! ได้ มันจะปรับแต่งระบบล็อกเป้าหมายอาวุธของคุณเพื่อเพิ่มประสิทธิภาพในการต่อสู้กับสิ่งมีชีวิตที่เป็นพลังจิตจำพวกนี้โดยเฉพาะ\n\nในสภาพปัจจุบัน การนำรหัสโปรแกรมนี้ไปใช้งานในแต่ละครั้งจำเป็นต้องมีการปรับปรุงโครงสร้างอย่างครอบคลุมเพื่อให้สอดคล้องเข้ากับโครงสร้างพื้นฐานทางการทหารของแต่ละฝ่าย นี่จึงเป็นบริการระดับพรีเมียม แต่เราคิดว่าคุณจะพบว่ามันคุ้มค่ากับค่าใช้จ่ายอย่างแน่นอน"
 mindwarden_tactics_modifier:"ยุทธวิธีผู้คุ้มครองประสาทสัมผัส"

 shroud.4295.desc:"$shroud.4205.common$\n\nในตอนแรกเราค่อนข้างกังวลกับรายงานเกี่ยวกับ '$building_materiality_engine_plural$' ของคุณ อย่างไรก็ตาม หลังจากการวิเคราะห์เพิ่มเติมแล้ว เราพิจารณาว่าอุปกรณ์เหล่านี้เป็นพัฒนาการที่มีอนาคตสำหรับการใช้ประโยชน์จากสิ่งที่เราเรียกกันว่า §H'ม่านพลัง(คําราม)'§! ในทางที่ไม่ใช้พลังจิต\n\nเราขอสนับสนุนให้คุณเดินหน้าใช้งานเทคโนโลยีนี้ต่อไป และหวังว่าจะได้ร่วมงานกับคุณในอนาคต"
 mindwarden_opinion_materiality_engine_tt:"ความเห็นส่วนตัว: £opinion£ §G+$@mindwarden_opinion_materiality_engine|0$§!"

 shroud.4300.desc:"ฉันกำลังพูดกับคุณในฐานะตัวแทนของ [mindwarden_enclave_country.GetName]\n\nเมื่อตัดสินจากผลเซนเซอร์พลังจิตตรวจจับของเรา ทางระบบ [Root.GetName] ทั้งหมดได้รับการปนเปื้อนจากม่านพลัง (§Hเดอะชราวด์§!) อย่างที่ไม่มีวันฟื้นกลับคืนมาได้แล้ว\n\nการกระทำของคุณได้ลิขิตจุดจบของตัวคุณเองแล้ว — และเราจะเป็นผู้เร่งเวลาจุดจบนั้นให้เร็วขึ้น"
 shroud.4300.a:"เหตุใดคุณจึงเกรงกลัวม่านพลัง?"

 shroud.4310.desc:"เราไม่ได้หวาดกลัวมัน หรือแม้แต่ตัวแทนที่เน่าเฟะของมัน เนื่องจากเราตระหนักรู้วิธีที่จะต่อสู้ต่อกรกับมันดี\n\nฉันไม่ได้คาดหวังให้คุณ — สังคมที่บ้าคลั่งเนื่องมาจากอิทธิพลของมัน — มาทำความเข้าใจหรอกนะ"

 shroud.4320.desc.psionic:"ยังเป็นพิษภัยแก่กาแล็กซีด้วยวิชาพลังจิตไม่พออีกหรือ?"
 shroud.4320.desc.default:"เราคือพลังขับเคลื่อนเพื่อความเป็นระเบียบเรียบร้อยในกาแล็กซีแห่งนี้ การมาโจมตีเราจะมีประโยชน์อันใดกัน? เราจะไม่ยอมทนอยู่นิ่งเฉยต่อพฤติกรรมก้าวร้าวของคุณอย่างแน่นอน"
 shroud.4320.desc.common:"จนกว่าคุณจะยืนยันการยุติการโจมตีที่เป็นอริโดยไม่มีเงื่อนไข เราไม่มีอะไรที่จะต้องหารือกันอีก"

 shroud.4340.desc:"เรารับรู้เกี่ยวกับการติดต่อธุรกิจของคุณกับ §H[shroudwalker_enclave_country.GetName]§! การกระทำของคุณไม่เพียงแต่รับรองพฤติกรรมที่ผิดของพวกเขาให้เป็นสิ่งถูกต้องตามกฎหมายเท่านั้น แต่ยังมีส่วนช่วยแพร่กระจายการติดเชื้อของม่านพลัง (§Hเดอะชราวด์§!) อีกด้วย\n\nเราจะไม่ให้บริการใดๆ แก่คุณ ตราบใดที่คุณยังคงเป็นผู้ให้ความร่วมมือกับพวกเขา"

 shroud.4350.desc:"§Hเราไม่สามารถจัดทำช่องทางติดต่อกับ [mindwarden_enclave_country.GetName] ได้เลยนับตั้งแต่สิ่งอำนวยความสะดวกของพวกเขาถูกทำลายลง\n\nเมื่อเราเฝ้าฟังช่องสัญญาณสื่อสารของพวกเขา เราได้ยินเพียงแต่ความเงียบงันอันว่างเปล่าของความเวิ้งว้างในอวกาศ§!"

 enclave_opinion_tt:"ความเห็นส่วนตัว: £opinion£ §G+$@positive_opinion|0$§!"
 mindwarden_rival_opinion_tt:"ความเห็นที่มีต่อ [event_target:shroudwalker_enclave_country.GetName]: £opinion£ §R$@negative_opinion|0$§!"
 shroudwalker_rival_opinion_tt:"ความเห็นที่มีต่อ [event_target:mindwarden_enclave_country.GetName]: £opinion£ §R$@negative_opinion|0$§!"

 shroud.4405.title:"$gov_mindwarden_enclave$ ถูกทำลาย"
 shroud.4405.desc_common:"การเปิดฉากจู่โจมของทหารฝ่ายเราในระบบดาว [mindwarden_enclave_system.GetName] ประสบความสำเร็จอย่างงดงาม §H[mindwarden_enclave_country.GetName]§! ไม่มีอยู่อีกต่อไปแล้ว"
 shroud.4405.desc.default:"$shroud.4405.desc_common$ แม้ว่าแนวปฏิบัติที่พวกเขาชิงชังจะไม่มีความสำคัญกับเราเท่าใดนัก แต่การที่พวกเขาเปิดสงครามต่อสู้ต่อต้าน §H'ม่านพลัง'§! นั้นเป็นตัวแทนของแนวคิดลัทธิความเชื่อวิทยาศาสตร์เทียมอันดื้อรั้นที่ไม่ควรมีอยู่ในกาแล็กซีของเรา"
 shroud.4405.desc.psionic:"$shroud.4405.desc_common$ พวกเขาจะไม่สามารถเผยแพร่หลักคำสอนอันเพิกเฉยของพวกเขาเกี่ยวกับอันตรายของม่านพลัง (§Hเดอะชราวด์§!) ได้อีกต่อไป และอุปกรณ์กรองสัญญาณพลังจิตของสถานีของพวกเขาก็กลายเป็นเพียงซากเศษขยะไปเสียแล้ว"
 shroud.4405.desc_end:"ชัยชนะครั้งนี้ของเราถือว่าคุ้มค่าเป็นสองเท่า เนื่องจากเราสามารถกู้ซากทรัพยากรจำนวนมากจากซากปรักหักพังของสถานีของพวกเขาได้อีกด้วย"

 shroud.4406.title:"$gov_mindwarden_enclave$ ถูกทำลาย"
 shroud.4406.desc_common:"เราได้รับรายงานว่า [mindwarden_enclave_country.GetName] ในระบบดาว [mindwarden_enclave_system.GetName] ได้สูญสลายไปแล้ว $gov_mindwarden_enclave$ แห่งนี้ไม่สามารถต้านทานการบุกจู่โจมโดย §H[mindwarden_destroyer.GetName]§! ซึ่งทำลายสถานีของพวกเขาจนกลายเป็นเศษซากและไม่พบผู้รอดชีวิตที่ทราบตัวตนเลย"
 shroud.4406.desc.psionic:"บัดนี้กาแล็กซีเป็นอิสระจากการบีบคั้นของสงครามชำระล้างต่อต้านพลังจิตของพวกมันแล้ว — ตราบใดที่ยังไม่มีใครปรากฏตัวขึ้นมาแทนที่พวกเขา"
 shroud.4406.desc.default:"กาแล็กซีจำเป็นต้องดำเนินชีวิตไปโดยไม่มีบริการต่อต้านพลังจิตของพวกเขาในขณะนี้"
 shroud.4406.a:"ไปพ้นๆ ได้ก็ดีแล้ว"

 shroud.6855.desc:"โปรดทำให้เป็นที่ประจักษ์ชัด เรามีความยินดีเป็นอย่างยิ่งที่จะรักษาความร่วมมืออันแนบแน่นร่วมกับ [root.GetName] ประวัติศาสตร์และเป้าหมายของเราจะผูกพันร่วมกันไปตลอดกาล"
 shroud.6855.desc.1:"เรารู้สึกขอบคุณตลอดไปสำหรับการสนับสนุนบริจาคของคุณให้แก่ [mindwarden_enclave_country.GetName] ตราบใดที่ภัยคุกคามจากพลังจิตยังคงมีอยู่ ขอให้สายสัมพันธ์ของเรามั่นคงไม่สั่นคลอน"
 shroud.6855.desc.2:"คุณมั่นใจได้เลยว่าการจ่ายเงินส่วนแบ่งกำไรครั้งต่อไปของคุณจะจัดส่งให้อย่างตรงเวลา"
 shroud.6855.b:"เราต้องการช่วยขยายขอบเขตดินแดนส่วนแยก(หายใจ)ของคุณ"
 shroud.6855.b.timeout:"ขณะนี้ดินแดนส่วนแยกกำลังคัดเลือกทหารและลูกเรือใหม่ จึงยังไม่สามารถเริ่มดำเนินการปรับปรุงระบบปฏิบัติการเพิ่มเติมได้จนกว่าจะถึง §Y[mindwarden_enclave_country.upgraded_station_timer]§!."
 shroud.6855.c:"เรามีความประสงค์ที่จะแบ่งปันเทคโนโลยีของเราให้แก่คุณ"
 shroud.6855.c.timeout:"ดินแดนส่วนแยกยังคงอยู่ระหว่างรวบรวมเทคโนโลยีที่เรามอบให้ไปก่อนหน้านี้ เราจะสามารถแบ่งปันเทคโนโลยีใหม่ให้กับพวกเขาได้หลังจาก §Y[mindwarden_enclave_country.updating_databanks_timer]§!."
 shroud.6855.d:"เราต้องการว่าจ้าง §Yกองยาน§! สำหรับวัตถุประสงค์ส่วนตัวของเรา"
 shroud.6855.e: "$enclave.205.b$"
 shroud.6855.f:"เราต้องการเพิ่มขีดความสามารถการรองรับดินแดนส่วนแยกผู้คุ้มครองประสาทสัมผัสของเรา"
 shroud.6855.f.timeout:"เรายังอยู่ระหว่างการปรับปรุงโครงสร้างพื้นฐานที่เกี่ยวข้องกับดินแดนส่วนแยก เราไม่สามารถเพิ่มขีดความสามารถการรองรับดินแดนส่วนแยกผู้คุ้มครองประสาทสัมผัสได้อีกจนกว่าจะถึง §Y[mindwarden_enclave_country.mindwarden_enclave_capacity_bought_timer]§!."

 shroud.6860.1.desc:"ด้วยเงินทุนเพิ่มเติมนี้ จะช่วยให้เราสามารถขยายขอบเขตการปฏิบัติงานได้เป็นอย่างดี เราสามารถเพิ่มจำนวนและความสามารถของกองยานเราได้ รวมถึงคัดสรรนักวิจัยเพิ่มขึ้นเพื่อพัฒนาเทคโนโลยีปกป้องจิตใจของเรา ในท้ายที่สุด กาแล็กซีทั้งหมดจะได้รับประโยชน์จากความอุปถัมภ์ของคุณ"
 shroud.6860.2.desc:"เราจำเป็นต้องตื่นตัวระแวดระวังอยู่ตลอดเวลากับภัยคุกคามพลังจิตที่แปรผันได้ทุกเมื่อ การบริจาคอันโอบอ้อมอารีของคุณจะช่วยให้เราสามารถปรับขยายการปฏิบัติงานได้อย่างมากเพื่อเผชิญหน้ากับความท้าทายนี้"
 shroud.6860.3.desc:"เราบรรลุผลสำเร็จไปมากมาย แต่ยังเร็วเกินไปที่จะหยุดพักผ่อน ด้วยทรัพยากรที่เรามีเพิ่มเติมนี้ กองยานของ [mindwarden_enclave_country.GetName] จะสามารถส่งกระจายไปได้ไกลยิ่งขึ้นทั่วทั้งกาแล็กซี เพื่อปกป้องจิตใจจำนวนมากที่ต้องทนทุกข์จากอำนาจพลังจิต"
 shroud.6860.4.desc:"ความอุปถัมภ์ของคุณได้ชี้นำการเดินทางของเรามาตั้งแต่จุดเริ่มแรกสุด และเป้าหมายร่วมกันของเรายังคงเดิม: การส่งเสริมสุขภาวะทางจิตผ่านทางการขจัดสิ้นพลังจิตให้หมดไปอย่างสมบูรณ์ ด้วยความช่วยเหลือของคุณ เรากำลังขยับเข้าไปใกล้เป้าหมายนั้นมากขึ้นทีละก้าว"
 shroud.6860.5.desc:"หากคุณเห็นควรที่จะลงทุนในการปฏิบัติการของเราอีกครั้ง เราจะสามารถกลายเป็นกองกำลังต่อต้านพลังจิตที่ใหญ่ที่สุดในกาแล็กซี — ปราการด่านสูงสุดในการป้องกันการรุกรานจิตใจสำหรับทุกอารยธรรมท่ามกลางหมู่ดาว"
 shroud.6860.b:"ถ้าอย่างนั้น ถือเป็นอันตกลงร่วมกัน"

 shroud.6861.desc:"ขอบคุณ เรามีความภูมิใจเป็นอย่างยิ่งที่จะได้ทำงานร่วมกับคุณเพื่อปกป้องความมั่นคงบูรณภาพทางจิตใจของสิ่งมีชีวิตทรงปัญญาจำพวกนี้ทั้งหมด"

 shroud.6865.desc:"เป็นความพยายามที่ดีมาก ยิ่งมี $ENCLAVE_MINDWARDEN_PLURAL$ มากขึ้นในกาแล็กซี จิตใจของสิ่งมีชีวิตทั้งหลายก็จะปลอดภัยจากการถูกรุกรานมากขึ้นเท่านั้น\n\nเราสามารถให้คำปรึกษาแก่คุณในเรื่องการปรับปรุงประสิทธิภาพโครงสร้างพื้นฐานของคุณ เพื่อให้อนุญาตสำหรับการจัดตั้งและบริหารจัดการดินแดนส่วนแยกให้มากขึ้นได้"
 shroud.6865.b.tt: "$mindwarden_enclave_capacity$: §G+1§!"

 shroud.6870.desc:"เรารู้สึกขอบคุณที่คุณยินดีแบ่งปันผลลัพธ์ของงานวิจัยของคุณ ความรู้ที่คุณมอบให้เราจะมีส่วนช่วยเสริมความมั่นคงการปกป้องกาแล็กซีให้ปลอดภัยจากภัยคุกคามพลังจิต"

 shroud.6875.desc:"เรารู้สึกเป็นเกียรติที่จะได้รับใช้ กองยานจาก [mindwarden_enclave_country.GetName] อยู่ในแถวหน้าของแนวคิดและยุทธวิธีต่อต้านพลังจิต ไม่มีผู้บุกรุกเข้าครอบงำจิตใจคนใดจะมีโอกาสรอดชีวิตเมื่อเผชิญหน้ากับพวกเขาได้ แต่ละลำได้รับการประจำการด้วยผู้บัญชาการที่ผ่านการฝึกฝนมาเป็นพิเศษสำหรับปฏิบัติการต่อสู้ต่อต้านคู่ต่อสู้ที่ใช้พลังจิต"

 mindwarden_tt_hirefleet:"เข้าควบคุมดูแล §Yกองยานผู้คุ้มครองประสาทสัมผัส(กองทัพเรือกลาง)§! ของดินแดนส่วนแยกนี้เป็นเวลา 10 ปี"
 shroud.6876.desc:"เราหวังว่า §H[mercenary_fleet.GetName]§! จะกลายเป็นเครื่องมือที่มีประสิทธิภาพในการปราบปรามผู้ที่ล้อเล่นกับพลังทำลายล้างของพลังจิต"

 mindwarden_tt_managefleet:"ยกเลิกหรือต่อระยะเวลาสัญญา §Yกองยานผู้คุ้มครองประสาทสัมผัส(กองทัพเรือกลาง)§! ของเรา"
 shroud.6880.desc:"แน่นอนที่สุด เราหวังว่า §H[mercenary_fleet.GetName]§! จะพิสูจน์แล้วว่าเป็นกำลังเสริมที่มีประโยชน์ยิ่งต่อกองทัพของคุณ คุณประสงค์ที่จะยกเลิกหรือขยายระยะเวลาสัญญาของเราหรือไม่?"
 shroud.6880.a: "$marauder.31.e$"

 shroud.6881.desc:"ตกลง สัญญาจะสิ้นสุดผลบังคับใช้และ §H[mercenary_fleet.GetName]§! จะเดินทางกลับมาหาเราในทันที กองยานของเราพร้อมสำหรับการจ้างวานทุกเมื่อที่คุณต้องการ"

#======================
# Mindwardens origin
#======================
 origin_mindwardens: "$MINDWARDEN_plural$"
 origin_mindwardens_desc:"$CHALLENGING_ORIGIN$§Rคำเตือน: ปิดกั้นการเข้าถึง ['concept_psionic_ascension'] (การตื่นรู้ทางพลังจิต)§!\n\nบรรพบุรุษของอารยธรรมนี้เคยถูกคุกคามจากกองกำลังต่างโลกที่รุกรานจิตใจ ทำให้พวกเขาหันมาทุ่มเทความพยายามและทรัพยากรอย่างยิ่งใหญ่เพื่อพัฒนาเทคโนโลยีต่อต้านพลังจิต\n\nอุปกรณ์โบราณของพวกเขาก็ยังคงทำงานได้ดี แต่ยังไม่เคยผ่านการทดสอบกับภัยคุกคามพลังจิตจากกาแล็กซีที่กว้างใหญ่ภายนอกเลย"
 origin_tooltip_mindwardens_effects:"- $ADDITIONAL_TECHNOLOGIES_STRING$ £engineering£ ['technology:tech_starbase_3']\n- $HOME_SYSTEM$ เริ่มต้นด้วย §H$tech_starbase_3$§!\n- $HOMEWORLD$ £building£ ['building:building_ancient_ward_1']\n- ได้รับสิทธิ์เข้าถึง §Hคาซัส เบลี§! (ประกาศสงคราม) §Y$casus_belli_cb_psionics_containment$§! กับจักรวรรดิที่ตื่นรู้ทางพลังจิต\n- §Y$FE_GUARANTEED_COLONIES$§! จะไม่ปรากฏตัวขึ้น\n- §Y$ENCLAVE_MINDWARDEN_PLURAL$§! จะไม่ได้รับการสุ่มสร้างขึ้นในช่วงเริ่มต้นเกม"
 SPECIES_CLASS_MUST_USE_ORIGIN_MINDWARDENS:"จำเป็นต้องมีจุดกำเนิด (§Y['civic:origin_mindwardens']ต้นฉบับ§!)"

 START_SCREEN_MINDWARDENS:"บันทึกของบรรพบุรุษเราบอกเล่าถึงโรคระบาดทางจิตที่เคยทำลายล้างดาว [GetHomeWorldName] กองกำลังต่างมิติได้จู่โจมจิตใจของพวกเขา และรังสีทำลายล้างได้ฟุ้งกระจายไปทั่วชั้นบรรยากาศ — ทั้งหมดนี้ล้วนได้รับการส่งเสริมโดยผู้ฝึกฝนพลังจิตจากภายในสังคมของชาว [GetSpeciesAdj]\n\nเพื่อตอบสนองต่อภัยคุกคามเหล่านี้ บรรพบุรุษของเราจึงสร้าง $building_ancient_ward_1$ ขึ้นเพื่อปกป้องจากการรุกรานจิตใจ ด้วยการบำรุงรักษาตามปกติเท่านั้น โครงสร้างโบราณอันน่าเคารพนี้ได้รับการพิสูจน์แล้วว่าแข็งแกร่งพอที่จะปกป้องชาว [GetSpeciesNamePlural] ทั้งหมดให้รอดพ้นจากภัยคุกคามของอิทธิพลพลังจิต และเทคโนโลยีหลักของมันยังเป็นข้อมูลพื้นฐานในการพัฒนาเครื่องป้องกันจิตใจแบบอื่นๆ ด้วย\n\nในขณะที่อารยธรรมของเรากำลังเตรียมพร้อมที่จะออกเดินทางข้ามพ้นวงโคจรของ [capital_scope.System.GetName], เราต้องเผชิญกับสิ่งที่ไม่รู้ ภัยคุกคามทางจิตประเภทใดกันแน่ที่อาจซุ่มซ่อนอยู่เหนือความรับรู้ของเรา?"
