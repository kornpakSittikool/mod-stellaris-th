# Tankbound
 civic_tankbound:"ประชากรในแคปซูลชีวภาพ"
 civic_tankbound_desc:"สมาชิกในสังคมนี้ใช้ชีวิตทั้งหมดลอยตัวอยู่ในแคปซูลสารเหลวชีวภาพเฉพาะทาง ส่งผลให้พวกเขาต้องพึ่งพาอุปกรณ์ช่วยเหลืออย่างมาก และไม่สามารถทำงานด้านแรงงานทางกายภาพได้โดยตรง"
 civic_tankbound_effects_base:"เพิ่มคุณลักษณะสายพันธุ์ ['trait:trait_tankbound']\nตำแหน่งงาน $job_farmer_plural_with_icon$, $job_miner_plural_with_icon$, และ $job_technician_plural_with_icon$ จะแปรสภาพเป็นระบบ §Yอัตโนมัติ(ปรับอัตโนมัติ)§! ทั้งหมด\nตำแหน่งงานระดับแรก ['concept_colonist', $job_colonist$] จัดอยู่ในกลุ่ม $SPECIALISTS$\nเขตพื้นที่เมือง £district£ §Yเมือง§! จะมีตำแหน่งงานผู้ดูแลควบคุมการผลิต §Y$job_production_overseer_with_icon$§! เพิ่มเติม"
 civic_tankbound_effects: "$civic_tankbound_effects_base$"
 civic_tankbound_negative_effects:"$t$- เริ่มต้นเกมด้วยจำนวนประชากร £pop£ น้อยกว่าปกติ 2,000 คน"

 civic_tankbound_corporate:"บรรษัทแคปซูลความคิดชีวภาพ"
 civic_tankbound_corporate_desc:"สมาชิกในสังคมนี้ใช้วิถีชีวิตในที่พักอาศัยแบบแคปซูลสารเหลวชีวภาพเฉพาะทางตามรูปแบบผลิตภัณฑ์ทดลอง ส่งผลให้พวกเขาต้องพึ่งพาอุปกรณ์ช่วยเหลืออย่างมาก และไม่สามารถทำงานด้านแรงงานทางกายภาพได้โดยตรง"
 civic_tankbound_corporate_effects:"$civic_tankbound_effects_base$\nสิ่งก่อสร้างย่อยสำนักงานสาขา £building£ §Y$building_virtual_entertainment_studios$§! จะได้รับผลลัพธ์ของ $megacorp_civic_branch_office_building_effect$"

