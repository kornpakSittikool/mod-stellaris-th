 shroud.5110.title:"[GetChosenPatron] เรียกหา"
 shroud.5110.desc_common:"ตลอดประวัติศาสตร์ที่ผ่านมา เอนทิตีอันยิ่งใหญ่ที่เราเรียกว่า §H[GetChosenPatron]§! ได้อยู่เคียงข้างเราเสมอมา บัดนี้ เมื่อห้วงอวกาศอันกว้างใหญ่กำลังรอคอยเราอยู่ เรา [GetFeelLoc] ถึงตัวตนของมันใน [GetMindPhysicalLoc] ของเราอย่างที่ไม่เคยมีมาก่อน\n\nมันส่งสัญญาณดึงดูดเราให้เข้าใกล้ ยิ่งใกล้เท่าไร เรายิ่งสังเกตเห็น — เป็นครั้งแรก — ถึงขอบเขตที่แท้จริงของความว่างเปล่าอันลึกลับและลึกซึ้งนี้ภายใน [GetMindLogicLoc] ของเราเอง [GetChosenPatron] กำลังเรียกหาเราเข้าไปข้างใน"
 shroud.5110.desc_common_2:"ในที่สุด เราก็เข้าใจถึงวิธีการก้าวเข้าสู่แดนอำนาจทางจิตนี้ด้วยเจตจำนงของเราเองแล้ว"
 shroud.5110.desc_organic:"$shroud.5110.desc_common$ ยั่วยวนเราด้วยประสบการณ์ที่เหนือกว่าความเข้าใจของเรา\n\n$shroud.5110.desc_common_2$"
 shroud.5110.desc_robot:"$shroud.5110.desc_common$ ปรับจูนระบบการประมวลผลของเราให้สอดคล้องกับหลักการบางประการที่ยังไม่เปิดเผย\n\n$shroud.5110.desc_common_2$"
 shroud.5110.a:"ขอบเขตอันกว้างไกลของเราขยายตัวเข้าสู่ภายใน"
 shroud.5110.a.tt:"ได้รับระดับความสอดคล้องจิต §Yการ จด ทะเบียน§! กับเอนทิตีตนนี้: $@chosen_patron_attunement_gift|0G$\nแผงควบคุมระบบ §Yชราวด์(คําราม)§! สามารถเข้าถึงได้ผ่านเมนูข้อมูลติดต่อ §Yที่อยู่ติดต่อ§!"

 shroud.5115.title: "[GetChosenPatron]"
 shroud.5115.desc.intro:"ชราวด์ มันเคลื่อนไหวอยู่ใต้ความเป็นจริงที่เราคุ้นเคย เงาที่ทอดผ่านความมืดมิด\n\nแม้ว่าเราจะได้เดินทางเข้าสู่ดินแดนแห่งจิตนี้มาเป็นเวลานาน ทว่าการสำรวจในระยะแรกของเราเป็นเพียงการทดลองขั้นต้น บัดนี้ หลังจากเวลาหลายปีของการหลอมละลายขอบเขตระหว่างมิติดวงดาวด้วยพลังจิตร่วมของเรา เราสามารถสัมผัสรู้ถึงมันได้อย่างชัดเจนเพื่อออกสำรวจอย่างมีเป้าหมาย\n\nบนอีกฟากหนึ่ง ความพยายามของเราไม่ได้สูญเปล่า §H[GetChosenPatron]§! กำลังเฝ้ารอเราอยู่"
 shroud.5115.desc.outro:"ในพายุหมุนวนของเอนทิตีอันนับไม่ถ้วน ความชัดเจนของมันคือคำมั่นสัญญา"
 shroud.5115.desc.composer:"$shroud.5115.desc.intro$\n\n§Hคลี่ออก. ห่อหุ้ม. แผ่ขยาย.§!\n\n$shroud.5115.desc.outro$"
 shroud.5115.desc.eater:"$shroud.5115.desc.intro$\n\n§Hสัมผัสความหิวโหยที่แท้จริง.§!\n\n$shroud.5115.desc.outro$"
 shroud.5115.desc.cradle:"$shroud.5115.desc.intro$\n\n§Hรวบรวมและโอบกอด.§!\n\n$shroud.5115.desc.outro$"
 shroud.5115.desc.instrument:"$shroud.5115.desc.intro$\n\n§Hจมดิ่งในตัณหาความปรารถนา.§!\n\n$shroud.5115.desc.outro$"
 shroud.5115.a:"พวกเราจะกลับมาอีกครั้ง"

