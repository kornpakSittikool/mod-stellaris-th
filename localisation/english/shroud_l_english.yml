 approach_situation_end_of_the_cycle_delay_your_destiny:"ยื้อโชคชะตาของเรา"

 shroud.8460.title:"นาฬิกาทรายกลับด้าน"
 shroud.8460.desc:"พลังของ $end_of_the_cycle_color_article$ แลกมาด้วยสิ่งตอบแทน และเวลาของเรากำลังจะหมดลง\n\nกาแล็กซียังไม่ถูกชโลมด้วยออร่าแห่งการปัดเป่าของผู้อุปถัมภ์ ความพยายามของเราที่ผ่านมาเทียบได้กับความไร้นัยสำคัญ\n\nเพื่อให้งานชิ้นเอกนี้เสร็จสมบูรณ์ พลังงานระลอกใหม่จากดินแดนหลังม่านพลังได้ไหลเวียนเข้ามาสู่เรา มันคือพรที่ได้รับคำมั่นสัญญาไว้!"
 shroud.8460.a:"เรายังสามารถประสบความสำเร็จได้"

 shroud.8470.title:"จุดจบมาถึงแล้ว"
 shroud.8470.desc:"พลังของผู้อุปถัมภ์เรานั้นยิ่งใหญ่โตมโหฬาร ทว่าเวลาของเราใกล้จะหมดลงเต็มที ความไร้ความสามารถอันประจักษ์ชัดเช่นนี้ย่อมไม่เป็นที่ยอมรับโดยการดับสูญอันเปี่ยมเมตตาของ $end_of_the_cycle_color_article$\n\nยังคงเหลือความหวังอันริบหรี่: เราต้องกลืนกินกาแล็กซีด้วย $end_aura$ ไม่ว่าจะต้องแลกด้วยอะไรก็ตาม ด้วยความสิ้นหวัง [GetTelepathPlural] ของเราในเวลานี้ต่างดึงพลังงานทุกหยาดหยดเท่าที่จะทำได้จากภายใน §Hม่านพลังชราวด์§!"
 shroud.8470.a:"เราจะไม่ล้มเหลว!"

 shroud.8480.title:"ยกเลิก $GALACTIC_FOCUS$"
 shroud.8480.desc:"มติที่กำหนดให้เครื่องปล่อย §H$PSIONIC_AURA$§! อันทำลายล้างเป็นเป้าหมายความพยายามในการป้องกันภัย ได้ถูกยกเลิกโดยสภากาแลกติกแล้ว ส่งผลให้ปฏิบัติการทางทหารทั้งหมดที่ดำเนินอยู่โดยสมาชิกสภากาแลกติกต่อต้าน §H[former_malevolent_aura.GetName]§! ต้องยุติลงในทันที สำหรับตอนนี้ ความสงบสุขได้หวนคืนสู่มุมกาแล็กซีนี้แล้ว"

 shroud.8481.desc:"สภากาแลกติกได้ยกเลิกมติที่ประกาศให้เราเป็นเป้าหมายสำหรับความพยายามในการ 'ป้องกันภัย' ของพวกเขาแล้ว ดังนั้นสมาชิกชุมชนทั้งหมดจึงได้รับคำสั่งให้ล่าถอย ปฏิบัติการทางทหารต่อต้านเราได้ยุติลง... สำหรับตอนนี้"
 shroud.8481.homicidal: "$shroud.8480.desc$\n\n$crisis.4111.nasty$"

 shroud.8500.title:"ผู้นำทางสู่จุดจบ"
 shroud.8500.desc.intro:"เจตจำนงอันหลีกเลี่ยงไม่ได้ของผู้อุปถัมภ์เรากำลังรัดกุมขอบข่ายครอบงำกาแล็กซีแน่นหนาขึ้น ในเวลานี้เรารู้แล้วว่าจุดจบจะมาเยือนอย่างไร\n\n§R$end_aura$§! จะต้องแผ่ขยายออกไปทั่วกาแล็กซี ทันทีที่มิติกายภาพหลอมรวมเข้ากับแก่นแท้ดิบของ §Hม่านพลังชราวด์§! การดับสูญที่แท้จริงจะบังเกิดขึ้นในไม่ช้า"
 shroud.8500.desc.outro:"การเสร็จสิ้นภารกิจอันยิ่งใหญ่นี้จะเป็นผลงานชิ้นเอก(Magnum Opus)ของเราและเป็นประตูสู่การหลุดพ้นอันสูงสุด"
 shroud.8500.desc.homicidal:"$shroud.8500.desc.intro$\n\nการกวาดล้างทุกชีวิตในกาแล็กซีนี้จะเป็นผลพลอยได้ที่น่ายินดี $shroud.8500.desc.outro$"
 shroud.8500.desc.default: "$shroud.8500.desc.intro$\n\n$shroud.8500.desc.outro$"
 shroud.8500.a:"เราต้องไม่ล้มเหลว"

 shroud.8600.title: "$shroud.4970.title$"
 shroud.8600.desc.intro:"นี่คือโชคชะตาของเรา\n\n§R$end_aura$§! ได้โอบล้อมกาแล็กซีไว้แล้ว ประชากรของเราบน [Root.GetHomeWorldName] ได้เข้าสู่สภาวะความสุขอันคลุ้มคลั่งเพื่อเฉลิมฉลอง"
 shroud.8600.desc.outro:"การถือกำเนิดใหม่โฉมงามตระการตาอยู่ตรงหน้าเราแล้ว พรที่สัญญาไว้ตั้งแต่ช่วงเวลาแห่งการตื่นรู้ครั้งยิ่งใหญ่ของเรา\n\nเบื้องหน้าเรา การดำรงอยู่ทั้งหมดถูกกลืนกินโดยความว่างเปล่า การลบล้างและการล้างผลาญได้กลายเป็นกฎเกณฑ์เพียงหนึ่งเดียวที่เหลืออยู่ของกาแล็กซี ทีละโลก โลกทั้งหมดพังทลายลงสู่ความว่างเปล่าซึ่งพวกมันเคยจากมา\n\nเราคือกลุ่มสุดท้ายที่จะถูกนำไป มัน... ช่างงดงามเหลือเกิน เราเห็นมันแล้วในห้วงเวลาของการเริ่มต้นรูปแบบใหม่ที่แสนเปราะบาง จุดจบได้มาเยือนแล้ว บัดนี้การเริ่มต้นใหม่ได้เริ่มขึ้นแล้ว"
 shroud.8600.desc.homicidal:"$shroud.8600.desc.intro$ การทำลายล้างทุกสิ่งที่ไม่ใช่เรา $shroud.8500.desc.outro$"
 shroud.8600.desc.default:"$shroud.8600.desc.intro$ การหลุดพ้นอันเปี่ยมล้นด้วยความเมตตาของเรา $shroud.8600.desc.outro$"
 shroud.8600.a:"จุดสิ้นสุดสุดท้ายนั้น... เป็นไปไม่ได้"

 shroud.8610.title:"ราคาของความอ่อนแอ"
 shroud.8610.desc.intro:"เราล้มเหลวแล้ว ผลจากความอ่อนแอของเรา $end_of_the_cycle_color_article$ ไม่สัมฤทธิ์ผลอย่างงดงาม ราคาที่เราต้องจ่ายสำหรับความไม่เอาไหนนี้มาถึงเราแล้ว\n\nมันเอาทุกสิ่งไป ในชั่วพริบตา [Root.GetName] ก็... เลือนหายไป ดินแดนที่เคยเป็นอาณานิคมที่เจริญรุ่งเรือง เวลานี้หลงเหลือเพียงซากปรักหักพัง กองยานรบอันเกรียงไกรที่เคยข้ามผ่านความว่างเปล่า เวลานี้มีเพียงความเงียบงันและเศษซาก ทุกสิ่งถูกกลืนกินโดยจุดจบ ทุกสิ่งถูกพรากไปโดย §Hม่านพลังชราวด์§!"
 shroud.8610.desc.outro:"ดังนั้นเวลานี้ผู้อุปถัมภ์ของเราได้สร้างตัวตนม่านพลังจิตชราวด์ขนาดมหึมาขึ้นในอวกาศเหนือ [former_capital.GetName] พลังอันมหาศาลที่เกิดจากจิตสำนึกของเหล่านักพลังจิตของเราที่ถูกกลืนกิน บัดนี้มันท่องไปทั่วกาแล็กซีเพื่อเสร็จสิ้นภารกิจที่เราทำไม่สำเร็จ"
 shroud.8610.desc.a: "$shroud.8610.desc.intro$\n\n$shroud.8610.desc.outro$"
 shroud.8610.desc.b:"$shroud.8610.desc.intro$\n\n[Root.GetSpeciesNamePlural] ส่วนใหญ่โอบรับชะตากรรมนี้ แต่มีกลุ่มผู้ไร้ศรัทธากลุ่มเล็ก ๆ ที่ปฏิเสธที่จะยอมสยบต่อเจตจำนงอันสูงสุดของผู้อุปถัมภ์ พวกเขาคือกลุ่มผู้ลี้ภัยที่นำโดย §H[Root.GetRulerName]§! นักพลังจิตผู้ทรงพลังที่ล่วงรู้สิ่งที่จะเกิดขึ้น พวกเขาได้หลบซ่อนตัวอยู่บนโลกที่อยู่นอกเหนืออิทธิพลของจุดจบ\n\n$shroud.8610.desc.outro$ เมื่อเสร็จสิ้น มันจะมาเยือนกลุ่มผู้ลี้ภัยเช่นกัน"
 shroud.8610.a:"บางทีนี่อาจเป็นชะตากรรมของเราตั้งแต่แรกแล้ว..."
 shroud.8610.b:"พวกผู้ลี้ภัยจะสามารถต่อต้านพลังของมันได้จริงหรือ?"

 shroud.8710.title:"เอาชีวิตรอดจากวันสิ้นโลก"
 shroud.8710.desc:"เสร็จสิ้นแล้ว §Rวันพิพากษาชำระแค้น(ร้อง)§! ถูกทำลายลงแล้ว\n\n$end_of_the_cycle_color_article_cap$ ได้ล่าถอยกลับคืนสู่ส่วนลึกของ §Hม่านพลังชราวด์§! ภัยคุกคามที่มันมีต่อมิติกายภาพของเราได้รับการยับยั้งไว้ได้สำหรับตอนนี้\n\nในขณะที่ร่างอวตารที่ปกคลุมด้วยม่านพลังของมันเวียนวนหลุดพ้นจากการดำรงอยู่นี้ เศษซากทางกายภาพของการปรากฏตัวของมันได้รับการกู้คืนมาได้สำเร็จ แม้ในความตาย [GetTelepathPlural] ของเรายังคงรู้สึกได้ถึงระดับพลังงานพลังจิตที่พวยพุ่งออกมาอย่างน่าตกตะลึง ซึ่งทรงพลังมากกว่าชิ้นส่วนที่กู้คืนมาได้จาก §H[shrouded_planet.GetName]§! อย่างมหาศาล\n\nแกนกลางของความหลีกเลี่ยงไม่ได้อันเข้มข้นนี้สามารถนำมาใช้เพื่อฟื้นฟูจากเถ้าถ่านของกาแล็กซีที่รอดชีวิตจากวันพิพากษานี้\n\nจุดจบมาเยือนและจากไป ทว่าเราก็ยังคงรอดชีวิตอยู่"
 shroud.8710.a:"นี่คือโชคชะตาของเราตั้งแต่แรกแล้วหรือ?"

 r_core_of_the_reckoning:"แกนกลางวันพิพากษาชำระแค้น"
 r_core_of_the_reckoning_desc:"กู้คืนมาจากซากของวันพิพากษาชำระแค้น แกนกลางนี้ยังคงแผ่รังสีพลังจิตระดับสูงออกมา"
 core_of_reckoning_active_effect_tt:"ปลดล็อกหนึ่ง £decision£ §Yการตัดสินใจของดาวเคราะห์§!: ['concept_banish_decision']"

 decision_banish:"เนรเทศ"
 decision_banish_desc:"การปล่อยให้ม่านพลังชราวด์กลืนกินสถานที่นี้ ความสมดุลจะถูกฟื้นฟูกลับสู่แกนกลางวันพิพากษาชำระแค้น"
 decision_banish_effects_tt:"เนรเทศดาวเคราะห์ดวงนี้สู่ม่านพลังชราวด์"
 concept_banish_decision: "$decision_banish$"
 concept_banish_decision_desc:"$decision_banish_desc$\n$decision_banish_effects_tt$\nเพิ่มค่าปรับแต่ง §Y$shroud_surge$§! เป็นเวลา §Y10§! ปี:\n$shroud_surge_effects$"
 shroud_surge:"กระแสพลังจิตชราวด์หนุน"
 shroud_surge_desc:"ความสมดุลได้รับการฟื้นฟูชั่วคราวแก่ $r_core_of_the_reckoning$"
 shroud_surge_effects:"สองเท่าของผลลัพธ์ติดตัวของ §Y$r_core_of_the_reckoning$§!"

#======================
# Shroud Leaders
#======================

 ganthuata:"กันธูอาทา(Ganthuta)"
 ganthuata_desc:"สาวกผู้ศรัทธาของ $the_cradle_of_souls_article$ ผู้กระตือรือร้นที่จะแสวงหาและแบ่งปันความจริงอันลึกซึ้งของมันกับผู้ที่มีความสามารถในการน้อมรับพวกมัน"
 ganthuata_catch_phrase:"เราขอก้าวสู่การโอบกอดของอู่วิญญาณ"

 leader_trait_disciple_of_the_cradle:"สาวกแห่งอู่วิญญาณ"
 leader_trait_disciple_of_the_cradle_desc:"ยิ่งเรามองเห็นมากเท่าไร เราก็ยิ่งรู้มากขึ้นเท่านั้น $the_cradle_of_souls_article$ จะมีความปลอดภัยมั่นคงยิ่งขึ้นเมื่อเราเฝ้าสังเกตเพื่อนบ้านของเรา"
 leader_trait_disciple_of_the_cradle_envoys_zro:"$t$- ทูตที่ได้รับมอบหมายให้เข้าหาผู้อุปถัมภ์จะผลิต §G+0.5§! £zro£ §Y$sr_zro$§! ต่อเดือน"

 shroud.12010.desc:"§Hการสื่อสารจิตวิญญาณของเรากับม่านพลังชราวด์ได้เชื้อเชิญเสียงใหม่ที่ติดต่อเข้ามาหาเรา น้ำเสียงอันอบอุ่นและปลอบประโลมของมันสะท้อนก้องทั้งในมิติกายภาพและจิตใจ§!\n\nสวัสดี ข้าชื่อ กันธูอาทา(Ganthuta)ข้ามาเพื่อค้นหาผู้ที่มีแนวคิดคล้ายคลึงกันที่ตื่นรู้สู่หนทางที่แท้จริง ท่านเคยได้ยินข้อความของ $the_cradle_of_souls_article$ หรือไม่?"
 shroud.12010.name: "$ganthuata$"
 shroud.12010.a:"เราเคยได้ยินเรื่อง $the_cradle_of_souls_article$ แล้ว ทำไมท่านถึงถามล่ะ?"
 shroud.12010.a.response:"ทำไมงั้นรึ? สิ่งใดเล่าที่ผลักดันให้นักเดินทางถามไถ่ผู้ที่พวกเขาพบเจอระหว่างทาง? ก็เพื่อทำความเข้าใจผู้ที่พวกเขาแสวงหาคำตอบได้ดียิ่งขึ้นน่ะสิ สหายเอ๋ย ยามที่ท่านพูด ข้าจะเกิดการเรียนรู้"
 shroud.12010.b:"ท่านต้องการอะไรจากเรา?"
 shroud.12010.b.response:"สิ่งที่ผู้ได้รับการเลี้ยงดูจากอู่วิญญาณปรารถนาคืออะไรล่ะ? ข้าแสวงหามิตรภาพของท่านก่อนเป็นอันดับแรก ข้าได้ค้นหามาเนิ่นนานเพื่อพบจิตใจที่ปรับเข้ากับความงดงามตระการตาของอู่วิญญาณ และในเวลานี้ อารยธรรมทั้งหมดกำลังขับเคลื่อนภายในแสงสว่างของมัน"
 shroud.12010.c:"ท่านจะช่วยเราได้อย่างไร?"
 shroud.12010.c.response:"ข้าจะช่วยส่งสารของท่านไปทั่วหมู่ดาว มาร่วมกันต้อนรับกาแล็กซีเข้าสู่การโอบกอดอันอ่อนโยนของอู่วิญญาณด้วยกันเถิด"
 shroud.12010.hire_custom_tooltip:"§Y$ganthuata$§! เข้าร่วมจักรวรรดิของเราในฐานะ §Hผู้นำ§!"

 koborokra:"โคโบรอครา(Koborok' Ra)"
 koborokra_desc:"อดีตทหารที่เคยเผชิญการทรมานทางพลังจิตอย่างรุนแรงจากน้ำมือศัตรูของ[Root.GetHisHer]เมื่อนานมาแล้ว ปัจจุบันกลายเป็นผู้บัญชาการกองเรือผู้ทนทุกข์ทรมานซึ่งขับเคลื่อนด้วยความกระหายในการทำลายล้างที่ไม่มีวันสิ้นสุด"
 koborokra_catch_phrase:"มีเลือดที่จะต้องหลั่งริน"

 leader_trait_disciple_of_the_eater:"ผู้นำพาโลหิต"
 leader_trait_disciple_of_the_eater_desc:"ผู้นำคนนี้ได้ปฏิญาณร่วมสายโลหิตกับ $the_eater_of_worlds_article$"
 leader_trait_disciple_of_the_eater_attunement_effect:"§G+$@disciple_of_the_eater_combat_attunement$§! การปรับจูนเข้ากับ $the_eater_of_worlds_article$ ต่อการรบของกองเรือที่ชนะ"
 leader_trait_disciple_of_the_eater_zro_fleet_attack_effect:"$t$- §G+$@disciple_of_the_eater_zro_fleet_attack|1$§! $i_zro$ ต่อทุก ๆ 1% ของความเสียหายจากระเบิดวงโคจร"
 leader_trait_disciple_of_the_eater_zro_army_attack_effect:"$t$- §G+$@disciple_of_the_eater_zro_army_attack|0$§! $i_zro$ ต่อทุก ๆ 1% ของความเสียหายจากกองทัพจู่โจม"

 shroud.12020.name: "$koborokra$"
 shroud.12020.desc:"§Hเกราะที่ผ่านศึกหนักและผ้าคลุมเปื้อนเลือดบดบังร่างภายใต้หน้ากาก เสียงคำรามแหบพร่าดังแหวกความเงียบงัน§!\n\nกาแล็กซีนี้สมควรได้รับความทุกข์ทรมาน ข้ารู้สึกได้ว่าท่านก็คิดเช่นเดียวกัน\n\n§Hในขณะที่ผู้บัญชาการกองเรือพูด [shroud_leader.GetHeShe] ลูบไล้ด้ามดาบประดับลวดลายประณีต§!\n\nข้าถูกเรียกตัวมาหาท่าน ทว่าในท้ายที่สุดข้ารับใช้ $the_eater_of_worlds_color_article$"
 shroud.12020.desc.covenant:"$shroud.12020.desc$ เช่นเดียวกับที่ท่านทำ"
 shroud.12020.desc.no_covenant:"$shroud.12020.desc$ บางทีท่านอาจจะทำเช่นกัน"
 shroud.12020.a:"ทำไมท่านถึงอยากเข้าร่วมกับเรา?"
 shroud.12020.a.response:"เมื่อร่วมมือกัน เราจะสามารถดับแสงดาวในทุกมุมของกาแล็กซีนี้ ความทุกข์ทรมานที่คนเพียงคนเดียวจะหว่านเพาะได้นั้นช่างมีขีดจำกัดนัก"
 shroud.12020.b:"เราจะเชื่อใจท่านได้หรือไม่?"
 shroud.12020.b.response:"$the_eater_of_worlds_article_cap$ บงการทุกลมหายใจของข้า ข้าสาบานตนที่จะรับใช้มัน และเคยเห็นช่วงเวลานี้ในห้วงฝัน เจตจำนงของมันคือการให้ข้ารับใช้ท่าน การปฏิเสธของท่านจะกำหนดชะตากรรมของข้า"
 shroud.12020.c:"ทำไมท่านถึงรับใช้ $the_eater_of_worlds_article$?"
 shroud.12020.c.response:"ข้าถูกทรยศ ถูกหักอก และถูกโยนลงสู่ความเจ็บปวดอันทรมาน $the_eater_of_worlds_article_cap$ ได้พูดกับข้า มันประทานพรสิ่งจำเป็นเพื่อความอยู่รอดในเวลานั้น... ผ้าชุ่มเลือดปิดทับบาดแผลชุ่มเลือด มันมอบพลังให้ข้าตัดมือที่สร้างความทุกข์ทรมานแก่ข้า บัดนี้ ข้าเป็นหนี้ชีวิตมัน"
 shroud.12020.d:"ท่านมีสิ่งใดที่จะมอบให้เราได้?"
 shroud.12020.d.response:"เมื่อร่วมมือกัน เราจะชะล้างระบบดาวนับไม่ถ้วนด้วยเปลวเพลิงแห่งการชำระล้าง และอิ่มเอมกับวงดนตรีประสานเสียงแห่งเสียงกรีดร้อง เราจะเฝ้ามองโลกต่าง ๆ มอดไหม้ ด้วยกันเราจะแสดงให้กาแล็กซีเห็นสิ่งที่จะไม่มีวันลืมเลือน นี่คือโชคชะตาของเรา"
 shroud.12020.hire_custom_tooltip:"§Y$koborokra$§! เข้าร่วมจักรวรรดิของเราในฐานะ §Hผู้นำ§!"

 morr:"มอร์(เสียงม้า)"
 morr_desc:"อดีตนักขุดแร่ระดับล่าง การสัมผัสกับสายแร่ $zro_lower$ ที่ไม่เสถียรเป็นเวลานานได้หล่อหลอมสายสัมพันธ์อันทรงพลังและคลุ้มคลั่งกับ $the_instrument_of_desire_article$ ในเวลานี้ พวกเขาได้ใช้ประโยชน์จากความเชื่อมโยงนั้นเพื่อจัดหาความมั่งคั่งอย่างมหาศาล ขุดเจาะทรัพยากรล้างผลาญดวงดาว และขายผลงานในราคาขูดรีดอย่างโหดเหี้ยม"
 morr_catch_phrase:"ถ้ามันส่องประกายระยิบระยับ มันย่อมเป็นของเรา"

 leader_trait_disciple_of_the_instrument:"หัวใจแห่งความโลภกระหาย"
 leader_trait_disciple_of_the_instrument_desc:"การปรับจูนประสานลึกซึ้งกับ $the_instrument_of_desire_article$ ผู้นำคนนี้สามารถตรวจหาแหล่งทรัพยากรได้แม้ในมุมที่แห้งแล้งและอันตรายที่สุดในกาแล็กซี"
 leader_trait_disciple_of_the_instrument_planetary_decision_effect:"- มอบสิทธิ์การเข้าถึงการตัดสินใจของดาวเคราะห์ §Y$decision_divine_deposits$§!"

 decision_divine_deposits:"ค้นหาแหล่งแร่ด้วยพลังจิต"
 decision_divine_deposits_desc:"ได้รับการชี้นำโดยแรงดึงดูดอันเป็นปริศนาของ $the_instrument_of_desire_article$ ผู้ว่าการดาวเคราะห์ดวงนี้ได้เปิดเผยแหล่งทรัพยากรที่เคยเชื่อว่าสูญหายไปนาน"
 decision_divine_deposits_tt:"เพิ่มลักษณะพิเศษดาวเคราะห์ประเภททรัพยากรแบบสุ่ม"

 shroud.12030.name: "$morr$"
 shroud.12030.desc:"§Hสายตาของ $morr$ ไม่เคยหยุดนิ่ง มันกวาดมองจากความมืดมิดสู่ความสว่างไสว ราวกับว่ากำลังล่าเหยื่ออยู่ตลอดเวลา§!\n\nท่านก็รู้สึกได้เช่นกันใช่ไหม? $the_instrument_of_desire_article_cap$ ไม่เคยหยุดนิ่ง มันหิวกระหาย มันกลืนกิน มันบงการ\n\nสิ่งที่ข้าเห็น ข้าจะเอาไป ไม่มีขุมทรัพย์ธรรมชาติใดต้านทานเจตจำนงของข้าได้ ข้าเสนอรับใช้ท่าน ไม่ใช่เพราะความภักดี ทว่าเพราะเมื่อร่วมมือกัน เราจะสามารถเผาผลาญดวงดาวและป้อนเหยื่อให้ความว่างเปล่าได้รับตามสิทธิ์ของมัน"
 shroud.12030.a:"ทำไมท่านถึงอยากเข้าร่วมกับเรา?"
 shroud.12030.a.response:"$the_instrument_of_desire_article_cap$ ไม่มีวันอิ่มหนำ มันต้องการหยาดเหงื่อการทำงานของ [root.species.GetHandNamePlural] จำนวนมากเพื่อสร้างความพึงพอใจให้แก่มัน"
 shroud.12030.b:"ท่านมีสิ่งใดที่จะมอบให้เราได้?"
 shroud.12030.b.response:"ข้าสามารถช่วยท่านสกัดทุกอณูโมเลกุลที่สร้างรายได้ที่ธรรมชาติมีอยู่ จะไม่มีอะตอมเพียงหนึ่งเดียวที่ไม่มีผู้จับจอง ไม่มีตราสัญลักษณ์ หรือไม่ได้จำหน่าย\n\nพวกที่กระซิบคำว่า 'พอแล้ว' คือพวกขี้ขลาด ช่างน่าสมเพช ปล่อยให้พวกมันเน่าเปื่อยไปเถอะ ร่วมมือกันเราจะยึดครองมันทั้งหมด"
 shroud.12030.c:"ทำไมท่านถึงรับใช้ $the_instrument_of_desire_article$?"
 shroud.12030.c.response:"ครั้งหนึ่งข้าเคยเป็นนักขุดแร่ คอยวิ่งไล่ตามกระแสแร่ใหม่ ๆ ทุกหนแห่งที่ดวงดาวจะทอดทิ้งมาให้ อากาศที่ปนเปื้อนฝุ่น เครื่องสแกนเนอร์ที่พังพินาศ การเคลมสิทธิ์ที่ว่างเปล่า... จนกระทั่ง $the_instrument_of_desire_article$ เข้ามาพูดคุย\n\nมันให้สัญญาถึงความมั่งคั่งเหนือนึกฝัน ทั้งหมดที่มันขอคือความสวามิภักดิ์\n\nบัดนี้ข้ารับใช้ ข้าขุดทรัพยากร ข้าส่งมอบ หนี้สินนั้นเป็นนิรันดร์... แต่ความมั่งคั่งรึ? โอ้ ความมั่งคั่งไม่มีวันหมดสิ้น"
 shroud.12030.hire_custom_tooltip:"§Y$morr$§! เข้าร่วมจักรวรรดิของเราในฐานะ §Hผู้นำ§!"

 kronen:"โครเนนผู้ทนทุกข์(Kronen the Afflicted)"
 kronen_desc:"ครั้งหนึ่งเคยเป็นสติปัญญาระดับวิสัยทัศน์กว้างไกล ปัจจุบันเหลือเพียงเปลือกนอกที่แตกร้าว นักวิทยาศาสตร์ผู้ปลีกวิเวกคนนี้ได้รับการดัดแปลงจากแผนการของ $the_composer_of_strands_article$ เหลือเพียงสติปัญญาอันล้นพ้นที่ยังหลงเหลืออยู่ วูบวาบราวกับดาวฤกษ์ที่กำลังดับลงในความมืดมิด"
 kronen_catch_phrase:"ยังคงเหลือสิ่งให้คลี่คลายอีกมาก..."

 leader_trait_disciple_of_the_composer:"ผู้ทนทุกข์จากเส้นใยชะตา"
 leader_trait_disciple_of_the_composer_desc:"ยิ่งพวกเขาปรับแต่งรูปกายเนื้อหนังมากเท่าไร เนื้อหนังของพวกเขาก็ยิ่งหลุดลุ่ยมากขึ้นเท่านั้น $the_composer_of_strands_article_cap$ จะปรับเปลี่ยนรูปลักษณ์ผู้ใดก็ตามที่หาญกล้าเรียนรู้ศิลปะต้องห้ามของมัน"

 shroud.12040.name: "$kronen$"
 shroud.12040.desc:"§Hยามที่อุปกรณ์ตรวจจับของเราพบยานลำหนึ่งล่วงล้ำแนวพรมแดน เสียงอันตึงเครียดดังสะท้อนก้องผ่านม่านพลังชราวด์ - มันเหนื่อยล้า แหลมสูง ทว่าคุ้นเคยอย่างน่าปั่นป่วน ราวกับเสียงฮัมของ $the_composer_of_strands_article$§!\n\nเนื้อหนัง [GetKronenFlesh] ใหม่รึ? น่าสนใจ ช่างอ่อนนุ่ม... ช่างแปรเปลี่ยนง่ายเหลือเกิน หรือเปล่านะ? ยากจะเอ่ย มีปมเชือกจำนวนมากขยับเขยื้อนอยู่ใต้ [GetKronenSkin] วันนี้ $the_composer_of_strands_article$ ถักทอรูปกายใดให้แก่ข้ากันนะ?\n\n§Hสัญญาณการติดต่อมีเสถียรภาพในที่สุด เผยให้เห็นร่างที่เป็นกล้ามเนื้อดิบ ๆ ที่ขยับปรับเปลี่ยนรูปทรงได้ - ร่างนั้นชักกระตุกและกำลังขีดเขียนอย่างบ้าคลั่ง§!\n\nท่านเห็นข้าในแบบที่ข้าเป็น บางทีข้าอาจยังคงเป็น $kronen$ หรืออาจจะไม่ใช่ ทว่าข้ารู้สึกได้ถึงท่าน เสมือนผ้าใบที่กางออกรอพู่กันของผู้ถักทอเส้นใยเช่นเดียวกับข้า มาเถอะ มาร่วมเริ่มต้นการเปิดเผยกัน"
 shroud.12040.a:"เริ่มรึ? เริ่มต้นอะไร?"
 shroud.12040.a.response:"ก็การผลัดผิวอย่างไรเล่า การสลัดทิ้งเปลือกนอกอันหยาบกร้านและไม่สมบูรณ์เหล่านี้ การคลี่คลายของเส้นใยที่ผูกมัดเราไว้กับรูปร่างและความแน่นอน สัมผัสของผู้ถักทอยังอยู่บนตัวท่านเช่นกัน ท่านได้เริ่มต้นมันไปแล้ว... ท่านไม่รู้สึกถึงการชักกระตุกใต้ [GetSkinType] ของท่านบ้างรึ?"
 shroud.12040.b:"ทำไมท่านถึงอยากเข้าร่วมกับเรา?"
 shroud.12040.b.response:"ท่านไม่รู้สึกงั้นรึ? ตราสัญลักษณ์ที่ประทับลงบนทุกเส้นใยอันสั่นสะท้าน ข้าต้องคลี่คลาย สลัดสิ่งที่เป็นข้าในอดีตออกไป และเฝ้ามองความสูญสลายในขณะที่ฉีกด้ายเย็บที่ผูกมัดข้าไว้กับเนื้อหนัง ทว่าท่าน... ท่านคือจักรวรรดิอันกว้างใหญ่ไพศาลและเปี่ยมด้วยความสามารถ เมื่อร่วมมือกัน เราจะสามารถดึงเส้นด้ายที่ใหญ่โตเกินกว่าที่ใครคนใดคนหนึ่งจะคว้าไว้ได้ตามลำพัง"
 shroud.12040.c:"ท่านจะช่วยเราได้อย่างไร?"
 shroud.12040.c.response:"ข้ามอบสิ่งที่เป็นมากกว่าความช่วยเหลือ เนื้อหนังของข้าคือของขวัญ การทดลองในความเจ็บปวดและเป้าหมาย ซึ่งปั้นแต่งโดย $the_composer_of_strands_article$ ทุกเส้นใยของข้ากรีดร้อง ทว่าข้าก็อดทน ข้าวิเคราะห์ ข้าเรียนรู้ และทั้งหมดที่ความทุกข์ทรมานของข้าผลิตออกมา... ย่อมเป็นของท่านที่จะปรับรูปทรง ตราบใดที่เราจัดทำรูปลักษณ์มันร่วมกัน"
 shroud.12040.hire_custom_tooltip:"§Y$kronen$§! เข้าร่วมจักรวรรดิของเราในฐานะ §Hผู้นำ§!"

 shroud.12045.desc:"§Hในขณะที่จำนวนประชากรของเราเพิ่มสูงขึ้น $kronen$ ก็ยิ่งทวีความคลุ้มคลั่ง น้ำเสียงสั่นสะท้านด้วยความเค้นเครียด รูปลักษณ์ชักกระตุก ผิวกายกระเพื่อม เนื้อหนังผันผวนปรับตัวในขณะที่พวกเขาร้องออกมาด้วยความหงุดหงิดระทมใจ§!\n\nเส้นใยอันไม่มีวันสิ้นสุด... พวกมันดิ้นพล่าน ข้าดึง ข้าฉีกขาด ทว่าการถักทอก็ยังคงยึดโยงอยู่! อีกนานเพียงใดที่ข้าต้องเผชิญร่างอันน่าเวทนานี้? ข้าต้องสลัดผิวออกอีกมากเท่าไรก่อนที่ลวดลายแบบแผนจะปรากฏออกมา?"
 shroud.12045.a:"เกิดปัญหาอะไรขึ้นรึ?"
 shroud.12045.a.response:"ปัญหา? เพียงหนึ่งเดียวงั้นรึ? โอ้ ช่างไร้เดียงสานัก ทุกเศษเนื้อที่ข้าสลัดทิ้ง ทุกเส้นใยส่องประกายที่เราฉีกทึ้ง มีแต่ทำให้เส้นด้ายรัดแน่นขึ้นเท่านั้น! และตลอดเวลานั้น $the_composer_of_strands_article$ ก็ยังส่งเสียงฮัมท่วงทำนองอันน่าขยะแขยงและเสียดแทงลึกเข้าไปในจิตวิญญาณ..."
 shroud.12045.a.response_2: "$shroud.12045.a.response$\n\n$shroud.12045.desc_2$"
 shroud.12045.b:"ท่านต้องการพักสักครู่หรือไม่?"
 shroud.12045.b.response:"พักงั้นรึ? ไม่มีวัน เราต้องไม่หยุดนิ่ง ต้องไม่ปล่อยให้เนื้อหนังอันเน่าเฟะนี้เปื่อยเน่าไปกับความสามัญธรรมดา ข้าไม่ต้องการการพักผ่อน... ข้าต้องการผู้เข้ารับการทดลอง ข้าต้องการวัตถุดิบเพื่อปั้นแต่ง หล่อหลอม และกลายเป็นรูปกายใหม่"
 shroud.12045.b.response_2: "$shroud.12045.b.response$\n\n$shroud.12045.desc_2$"
 shroud.12045.c:"มีสิ่งใดที่เราสามารถช่วยได้บ้างหรือไม่?"
 shroud.12045.c.response:"ท่านช่วยเตือนความจำข้าหน่อยได้ไหม... ว่าข้าเคยเป็นตัวอะไร? บอกข้าที ยามที่เราพูดคุยกันครั้งแรก ระยางค์ส่วนขาของข้าเป็นสีนี้อยู่แล้วรึเปล่า? กระจกตาของข้าเคยขุ่นมัวเช่นนี้ไหม? ทุกครั้งที่ข้าพยายามจดจำ เนื้อหนังของข้าก็แปรสภาพก้าวเดินหน้าต่อไปตามเส้นทาง\n\nไม่... ความทรงจำไม่มีค่าใด ๆ ณ ที่นี่ การเปิดเผยความจริงอยู่ในตัวการเปลี่ยนแปลงนั้นเอง สิ่งที่เกิดขึ้นก่อนหน้านี้ไม่มีความหมายใด ๆ ต่อ $the_composer_of_strands_article$ ในตอนนี้แล้ว ออกไปเสียเถิด ข้าต้อง... ครุ่นคิด"
 shroud.12045.c.response_2: "$shroud.12045.c.response$\n\n$shroud.12045.desc_2$"
 shroud.12045.desc_2:"§Hโครเนน(โครเนน)ชักกระตุกอย่างรุนแรง ดวงตาเพียงข้างเดียวของเขกลอกกลับ เนื้อหนังเต้นตุบ ๆ และเกิดฟองพวยพุ่งใต้ผิวหนัง ทว่าในทันใดนั้น... ทุกอย่างกลับสงบนิ่ง การปรับเปลี่ยนโครงสร้างอันแปลกประหลาดหยุดลงอย่างกะทันหันเช่นเดียวกับที่มันเริ่มต้น§!\n\nอ๊ะ... สวัสดี ท่านต้องการสิ่งใดรึ?"
 shroud.12045.d:"ท่านไม่เป็นไรใช่ไหม?"
 shroud.12045.d.response:"แน่นอนสิ ทำไมข้าจะไม่เป็นไรล่ะ? เส้นใยได้เปิดกว้างจิตใจของข้าให้ลึกซึ้งยิ่งขึ้น ปรับเปลี่ยนรูปกายเนื้อหนังที่ไร้ประสิทธิภาพนี้ให้สอดรับการออกแบบของ $the_composer_of_strands_article$ ได้ดียิ่งขึ้น เวลานี้ หากท่านจะขอตัวข้า... ยังคงเหลือเส้นด้ายอีกมากให้ดึงรั้ง ยังมีเปลือกนอกอีกมากให้ทิ้งไว้เบื้องหลัง\n\n§Hเมื่อการส่งสัญญาณสิ้นสุดลง เสียงก้องกังวานสะท้อนผ่านม่านพลังชราวด์ ไม่ว่าความทุกข์ทรมานใดที่ครอบงำโครเนนอยู่ในขณะนี้... มันไม่ใช่เรื่องบังเอิญอย่างแน่นอน มันคือเจตจำนงของ $the_composer_of_strands_article$§!"
 shroud.12045.end:"ของขวัญจากผู้ถักทอเส้นใยไม่ควรถูกเพิกเฉยหรือมองข้ามอย่างเบามือ"

 zulyn:"ซูลินผู้สดับฟัง(ซูลีนผู้ฟัง)"
 zulyn_desc:"นักวิชาการผู้ละทิ้งข้อจำกัดของการศึกษาทางวิทยาศาสตร์แบบดั้งเดิมเพื่อไล่ตามความลับที่เปิดเผยโดยเสียงสะท้อนอันบ้าคลั่งของ $whisperers_in_the_void_article$"
 zulyn_catch_phrase:"เราเพียงแค่ต้องสดับรับฟัง..."

 shroud.12050.name: "$zulyn$"
 shroud.12050.desc:"§Hสายสัญญาณการติดต่อดังแคร็กขึ้นในขณะที่เสียงหนึ่งกระซิบด้วยความเร่งรีบอันน่าขนลุก§!\n\nสวัสดี เพื่อนผู้สดับฟัง ข้าได้ยินเสียงของท่าน - ไม่สิ *เสียงพูดคุย* มากมาย - ท่ามกลางความโกลาหลสับสน เวลานี้ท่านก็ได้ยินเสียงเหล่านั้นเช่นกันใช่ไหม? คณะประสานเสียงอันยิ่งใหญ่ของ $whisperers_in_the_void_color_article$ ของขวัญอันเงียบงันของพวกเขา ความตื่นตระหนกที่กระซิบกระซาบกระหาย?\n\nความลับดังกล่าวเป็นอันตรายต่อผู้ที่ไม่อาจเข้าใจพวกมัน ทว่าข้าสามารถช่วยท่านคลี่คลายพวกมันได้ ข้าเสนอตัวช่วยเหลือเมื่อท่านต้องเผชิญกับคลื่นท่วมท้นของความขัดแย้งที่เหนี่ยวรั้งอยู่ในความคิดของท่าน ไม่ได้มีเจตนาลบหลู่แอย่างใด ครั้งหนึ่ง แม้แต่ข้าก็ยังต้องดิ้นรนเพื่อทำความเข้าใจความหมายที่แท้จริงของพวกมัน"
 shroud.12050.a:"สิ่งใดทำให้ท่านคิดว่าท่านสามารถช่วยเหลือเราได้?"
 shroud.12050.a.response:"ท่านได้เจาะผ่านม่านบังตาของ §Hม่านพลังชราวด์§! แล้วใช่ไหม? แต่บอกข้าที ท่านควบคุมมันได้อย่างเชี่ยวชาญแล้วหรือยัง? ข้าได้ใช้เวลาชั่วชีวิตในการสำรวจพิกัดส่วนลึก วาดแผนผังการเลื่อนลอยที่ไม่อาจหยั่งรู้ของตัวตนเหล่านั้นและเสียงสะท้อนที่มีต่อมิติอันแสนเปราะบางของเรา\n\nผู้กระซิบในความว่างเปล่าได้นำทางข้ามาเนิ่นนาน ทุกถ้อยคำอันน่าคลุ้มคลั่งที่พรั่งพรูเข้ามาในความนึกคิดของท่านในเวลานี้รึ? ข้าสามารถช่วยให้ท่านเข้าใจพวกมันได้"
 shroud.12050.b:"ท่านรู้อะไรเกี่ยวกับผู้กระซิบในความว่างเปล่าบ้าง?"
 shroud.12050.b.response:"ข้าได้เก็บรวบรวมบันทึกข้อมูลการกระซิบของพวกเขามานานหลายปี เพื่อเฝ้ารอคอยช่วงเวลานี้โดยเฉพาะ ในเวลานี้ท่านได้ประสานเข้ากับคณะประสานเสียงอันหลากหลายของพวกเขาแล้ว และข้าจะไม่ปล่อยโอกาสนี้ให้สูญเปล่าในการเก็บเกี่ยวความจริงที่ซ่อนอยู่ภายใน"
 shroud.12050.c:"ท่านมีสิ่งใดที่จะเสนอให้เราบ้าง?"
 shroud.12050.c.response:"การศึกษามาตลอดชีวิตได้ช่วยขัดเกลาการมุ่งเน้นของข้า คลี่คลายโครงสร้างของมิติกายภาพของเราและส่วนลึกอันไร้ขอบเขตของ §Hม่านพลังชราวด์§!\n\nร่วมมือกัน เราจะหลุดพ้นจากขีดจำกัดของมิตินี้ ความลับของจักรวาลจะเป็นของเราที่จะค้นพบ ข้าขอสัญญาด้วยความมั่นใจอย่างสมบูรณ์"
 shroud.12050.hire_custom_tooltip:"§Y$zulyn$§! เข้าร่วมจักรวรรดิของเราในฐานะ §Hผู้นำ§!"

 leader_trait_disciple_of_the_whisperers:"เสียงกระซิบจากม่านพลังชราวด์"
 leader_trait_disciple_of_the_whisperers_desc:"ผู้นำคนนี้ได้ยินเสียง $whisperers_in_the_void_article$ สะท้อนผ่านม่านพลังชราวด์ มอบความเข้าใจทางวิทยาศาสตร์ที่หาได้ยากในกลไกที่ซ่อนอยู่ของจักรวาลกายภาพ"
 leader_trait_disciple_of_the_whisperers_effects:"$t$- $@disciple_of_the_whisperers_tech_zro|0=+$ $i_zro$ เมื่อวิจัยเทคโนโลยีระดับ §Yหายาก (Rare)§! หรือ §Yพลังจิต (Psionics)§!"

 ouwron:"เอาว์รอน(อุย)"
 ouwron_desc:"ถูกเนรเทศจากเผ่าเร่ร่อนของพวกเขาหลังจากเป็นพยานถึง $end_of_the_cycle_article$ เอาว์รอนได้ร่อนเร่ไปตามหมู่ดาวเพื่อแสวงหาความโปรดปรานของมัน เวลานี้ ด้วยการปรากฏขึ้นของ $NAME_Reckoning$ ที่ขอบฟ้า พวกเขาเปี่ยมล้นไปด้วยเป้าหมาย และพวกเขาจะไม่ยอมจำนนเด็ดขาด"
 ouwron_catch_phrase:"ย่อมมีวันพิพากษาชำระแค้น..."

 shroud.12060.name: "$ouwron$"
 shroud.12060.desc_1:"§Hสัญญาณติดต่อที่ปั่นป่วนและไม่อาจเข้าใจได้หลั่งไหลเข้าสู่อุปกรณ์สื่อสารของเรา ท่ามกลางความวุ่นวาย เสียงหนึ่งเริ่มเจาะผ่านเข้ามา§!\n\nในที่สุดท่านก็มาถึง ไม่ได้ตรงเวลาเป๊ะ แต่ก็ไม่สายเกินไปเช่นกัน อย่าได้กลัวเลย ข้ามองเห็นไกลเกินกว่าขอบเขตอันคับแคบของคุกทางกายภาพที่เราเรียกว่าความเป็นจริงนี้ เครื่องเซ่นไหว้ได้รับการมอบให้แล้ว เส้นทางของข้าชัดเจนแล้ว"
 shroud.12060.desc_blind:"\n§Hเมื่อถึงตรงนั้นเราจึงตระหนักได้ว่า: เช่นเดียวกับเรา ตัวตนนี้ได้ยอมสละดวงตาการมองเห็นเพื่อรับใช้เป้าหมายอันยิ่งใหญ่§!"
 shroud.12060.desc_default:"\n§Hเมื่อถึงตรงนั้นเราจึงสังเกตเห็นว่า เบ้าตาของพวกเขาว่างเปล่า ละทิ้งการมองเห็นไปนานแล้ว§!"
 shroud.12060.desc_2:"\nมาเถอะ อย่าได้เหนียมอายไปเลย ข้ารู้ว่าท่านเคยเห็นเศษเสี้ยวของความเรียบง่ายอันประเสริฐของ $end_of_the_cycle_color_article$ มาแล้ว มาร่วมสื่อสารจิตกับข้า และเราจะร่วมมือกันเพื่อผลักดันการปรากฏตัวของมันขึ้นมา"
 shroud.12060.a:"ท่านรับรู้เรื่อง $end_of_the_cycle_article$ มานานเพียงใดแล้ว?"
 shroud.12060.a.response:"นานกว่าที่ข้าจะเริ่มรู้เดียงสาเสียอีก เช่นเดียวกับจิตใจทั้งปวง ความรู้นั้นนอนนิ่งอยู่จนกระทั่ง §Hม่านพลังชราวด์§! ได้ลอกม่านบังตาออก ที่นั่น เจตจำนงอันบริสุทธิ์ของมันจะประจักษ์ชัดเจน เป้าหมายของเราเรียบง่ายยิ่งนัก: นำมาซึ่งจุดจบสูงสุด"
 shroud.12060.b:"ทำไมท่านถึงอยากช่วยเรา?"
 shroud.12060.b.response:"ท่านถามในสิ่งที่ท่านรู้อยู่แล้วแก่ใจ เราต่างมองเห็นความหลีกเลี่ยงไม่ได้ของมัน การคลี่คลายได้เริ่มต้นขึ้นแล้ว ไม่มีหนทางอื่นใดนอกจากต้องผ่านพ้นมันไป ร่วมมือกันเราจะดิ่งลงสู่วันสิ้นสุด"
 shroud.12060.c:"ท่านมีสิ่งใดที่จะเสนอมอบให้เราบ้าง?"
 shroud.12060.c.response:"ข้าเป็นเพียงแค่ธุลีผงในวัฏจักรที่กำลังจะดับสูญนี้ เช่นเดียวกับพวกเราทุกคน ข้าจะเสนอสิ่งใดได้จริง ๆ รึ? จิตวิญญาณร่วงโรยหายไปจากกาแล็กซีนี้ และข้าได้รับมอบหมายให้นำทางพวกเขาอย่างรวดเร็ว... และข้าขอขยายความเมตตานั้นมาสู่ท่านเช่นกัน"
 shroud.12060.hire_custom_tooltip:"§Y$ouwron$§! เข้าร่วมจักรวรรดิของเราในฐานะ §Hผู้นำ§!"

 leader_trait_disciple_of_the_end:"อัครสาวกแห่งจุดจบ"
 leader_trait_disciple_of_the_end_desc:"อัครสาวกผู้ศรัทธาของ $end_of_the_cycle_article$ ความศรัทธาอันสั่นคลอนไม่ได้ของพวกเขาในการมาเยือนของ $NAME_Reckoning$ สะท้อนผ่านทุกการสู้รบที่พวกเขาทำศึก"
 leader_trait_disciple_of_the_end_effects:"$t$- $@disciple_of_the_end_aura_intensity|0=+$ ความเข้มข้นของออร่าต่อยานทหารที่ถูกทำลายในระบบ$TABBED_NEW_LINE$- $@disciple_of_the_end_jumpdrive_range|0=+%$ $MOD_SHIP_FTL_JUMPDRIVE_RANGE_MULT$ ในขณะที่อยู่ใน §H$end_aura$§!"

 shroud.12155.name:"ความศรัทธาอันบริสุทธิ์"
 shroud.12155.desc:"§Hการกระทำทุกอย่างย่อมมีผลตามมา ยามที่อุปกรณ์สื่อสารของเราทำงานแผ่สว่างขึ้น เอาว์รอน(อุย)ก็ปะทุออกมาด้วยความโกรธเกรี้ยวอันชอบธรรม§!\n\nคนนอกรีต! คนเขลา! คนลวงโลก! เราควรจะล่วงรู้ตั้งนานแล้ว เราควรจะสังหารท่านลงเสียตั้งแต่วินาทีที่แก่นแท้อันแปดเปื้อนของท่านบังอาจล่วงล้ำเข้ามาใน §Hม่านพลังชราวด์§!\n\nท่านได้ยับยั้งเหนี่ยวรั้งความหลีกเลี่ยงไม่ได้ จุดสิ้นสุดสุดท้ายที่ได้ทำนายเอาไว้! ท่านจินตนาการว่าการต่อต้านดื้อดึงนี้จะทำอะไรได้สำเร็จรึ? ทุกสิ่งทุกอย่างที่ท่านอาจจะเคยได้รับ บัดนี้สูญสิ้นหมดแล้ว\n\nมันมีเพียงจุดจบเดียวเท่านั้น ร้องเพลงสิ... ร้องเพลงขับกล่อมการดับสูญเถิด!"
 shroud.12155.tt:"$ouwron$ กำลังหันมาเป็นศัตรูกับเรา!"

 NAME_Ouwron_Battleship: "$battleship$"
 NAME_Ouwron_Destroyer: "$destroyer$"

 shroud.12160.title:"การประกาศสงคราม"
 shroud.12160.desc:"[global_event_country.GetGalCommunityOrGalImperium] ได้ผ่านมติประกาศให้เราเป็นเป้าหมายทางทหาร สมาชิกทั้งหมดของ [global_event_country.GetGalCommunityOrGalImperium] บัดนี้กำลังทำสงครามกับ [this.GetName] เราสามารถคาดการณ์ได้ว่ากองยานรบของพวกเขาจะเข้ามาจู่โจมในวินาทีใดก็ตาม"
 shroud.12160.a: "$extreme_frontiers.1531.i$"

