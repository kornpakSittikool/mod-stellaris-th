#==========================

 TUTORIAL_SHROUD_TAB_TITLE:"บทเรียน: $THE_SHROUD_TITLE$"
 TUTORIAL_SHROUD_TAB_DESC:"นี่คือแท็บ §Sชราวด์(คําราม)§! แผงควบคุมด้านซ้ายจะแสดงตำแหน่งของจักรวรรดิเราในชราวด์ ซึ่งนำเสนอในรูปแบบ §Sแดนอำนาจ(หัวเราะ)§! ของเอนทิตีทางจิตทั้งสี่ที่เรียกว่า §Sผู้อุปถัมภ์(พาโตร)§!\n\nตำแหน่งของเราจะถูกกำหนดโดย §S$concept_attunement$§! ซึ่งจะได้รับเมื่อการกระทำในโลกกายภาพเป็นที่พึงพอใจของผู้อุปถัมภ์ สะสม $concept_attunement$ เพื่อเริ่มต้นกระบวนการเปิดเผยตัวตนของผู้อุปถัมภ์ เมื่อเปิดเผยแล้ว ให้คลิกที่แดนอำนาจของผู้อุปถัมภ์เพื่อเปิดแผงข้อมูลผู้อุปถัมภ์\n\nคลิก §S$DELVE$§! หรือบริเวณตรงกลางของแผงด้านซ้ายเพื่อก้าวเข้าสู่ชราวด์และสำรวจมิติทางจิต ในระหว่างการสำรวจ สิ่งที่เราค้นพบอาจได้รับอิทธิพลจากตำแหน่งความสอดคล้องจิต $concept_attunement$ ของเราภายในแดนอำนาจนั้นๆ"

 TUTORIAL_SHROUD_PATRON_TITLE:"บทเรียน: ผู้อุปถัมภ์แห่งชราวด์"
 TUTORIAL_SHROUD_PATRON_DESC:"แผงข้อมูล §Sผู้อุปถัมภ์(พาโตร)§! จะให้ข้อมูลและตัวเลือกต่างๆ ที่เกี่ยวข้องกับผู้อุปถัมภ์แห่งชราวด์ ทำเป้าหมายที่ได้รับมอบหมายจาก §S$concept_callings$§! และ §S$concept_deeds$§! ให้สำเร็จเพื่อเพิ่มระดับ §S$concept_attunement$§! กับเอนทิตีตนนั้นๆ\n\nเพิ่มระดับความสอดคล้องจิต $concept_attunement$ เพื่อปลดล็อก §S$PASSIVE_ACCORDS$§! ซึ่งจะช่วยมอบข้อดีต่างๆ ให้กับจักรวรรดิของเรา เมื่อมีระดับความสอดคล้องจิต $concept_attunement$ กับผู้อุปถัมภ์ที่สูงพอ จะสามารถเริ่มกระบวนการจัดทำข้อตกลง §Sสัญญา§! ซึ่งจะส่งผลลัพธ์ที่รุนแรงและมีประสิทธิภาพมากยิ่งขึ้นอีก"

 TUTORIAL_SHROUD_COVENANT_TITLE:"บทเรียน: พันธสัญญา(โค้ช)"
 TUTORIAL_SHROUD_COVENANT_DESC:"การยืนยันข้อตกลง §Sสัญญา§! กับผู้อุปถัมภ์แห่งชราวด์จะมอบโอกาสในการเข้าถึงข้อตกลงตื่นตัว §S$ACTIVE_ACCORDS$§! $tutorial.shroud_covenant.shared$"
 tutorial.shroud_covenant.shared:"คลิกที่ไอคอน $ACTIVE_ACCORD$ เพื่อเปิดใช้งานผลลัพธ์ของมันโดยจ่ายทรัพยากร £sr_zro£ §S$sr_zro$§! ซึ่งสามารถทำได้ในแผงชราวด์หลักหรือในแผงผู้อุปถัมภ์แต่ละราย\n\nหลังจากการเปิดใช้งาน ข้อตกลง $ACTIVE_ACCORD$ จะต้องใช้เวลาในการชาร์จพลังงานระยะหนึ่งก่อนที่จะสามารถเปิดใช้งานได้อีกครั้ง"

 TUTORIAL_SHROUD_SHAPING_TITLE:"บทเรียน: การปรับแต่งชราวด์(หายใจหอบ)"
 TUTORIAL_SHROUD_SHAPING_DESC:"ในขณะนี้พวกเรามีวิธีการในการได้รับพลังบางอย่างที่โดยปกติแล้วต้องใช้การทำข้อตกลง §Sสัญญา§! กับ §Sผู้อุปถัมภ์(พาโตร)§!\n\nเมื่อเราสามารถปลดล็อกข้อตกลงไร้ปฏิกิริยา §S$PASSIVE_ACCORDS$§! ของผู้อุปถัมภ์ได้ทั้งสองอย่างแล้ว เราจะได้รับสิทธิ์ในการเข้าถึงข้อตกลงตื่นตัว §S$ACTIVE_ACCORD$§! $tutorial.shroud_covenant.shared$"

 tutorial.2600.name:"บทเรียน: $PSIONIC_AURA_PLURAL$"
 tutorial.2600.desc:"อาณานิคมที่มีประชากรพลังจิตของเราในขณะนี้สามารถแผ่สนามพลังงาน §S$PSIONIC_AURA$§! ได้แล้ว โดยสนามพลังออร่านี้จะถูกดึงมาจาก §Sผู้อุปถัมภ์แห่งชราวด์(ขู่)§! ตนที่เรามีระดับความสอดคล้องจิต §S$concept_attunement$§! สูงที่สุดอยู่ในขณะนั้น\n\nสนามพลัง $PSIONIC_AURA_PLURAL$ จะส่งผลลัพธ์ที่แตกต่างกันไปต่อจักรวรรดิของเราเอง และสามารถส่งผลกระทบต่อจักรวรรดิที่เป็นมิตรหรือเป็นศัตรูได้เช่นกัน หากต้องการแผ่ออร่าของเราไปยังระบบดาวอื่นๆ เพิ่มเติม เราจำเป็นต้องมีความสอดคล้องทางจิตกับผู้อุปถัมภ์ให้ลึกซึ้งยิ่งขึ้นเพื่อปลดล็อกเทคโนโลยี £research£ §S$tech_aura_intensification$§!\n\nหากต้องการตรวจสอบผลลัพธ์ของสนามพลังออร่า $PSIONIC_AURA$ ของเรา ให้เปิดแท็บ §Sชราวด์(คําราม)§! หรือเลื่อนเมาส์ชี้ไปที่ไอคอนสนามพลังออร่าบนแผงควบคุมส่วนล่างตรงกลางใน £interface£ §Sมุมมองระบบดาว (ระบบดาวมุมมอง)§!"

 tutorial.2610.name:"บทเรียน: $tech_aura_intensification$"
 tutorial.2610.desc:"สนามพลังออร่า §S$PSIONIC_AURA$§! ของเราในขณะนี้มีความสามารถในการเพิ่ม §Sความเข้มข้น(ความไม่สงบ)§! และแผ่ขยายไปยังระบบดาวอื่นๆ ได้แล้ว\n\nสนามพลัง $PSIONIC_AURA_PLURAL$ สามารถพัฒนาขึ้นไปถึงระดับความเข้มข้นได้สามขั้น พร้อมส่งผลกระทบที่เพิ่มขึ้นตามลำดับ หากสนามพลัง $PSIONIC_AURA$ ก้าวขึ้นสู่ระดับความเข้มข้นใหม่ หรือมีความเข้มข้นสูงสุด มันจะพยายามกระจายตัวไปยังระบบดาวข้างเคียง โดยออร่า $PSIONIC_AURA_PLURAL$ ส่วนใหญ่จะมีขีดจำกัดระยะสูงสุดในการแผ่ออกจากจุดกำเนิด\n\nความเข้มข้นของออร่าสามารถเพิ่มพูนขึ้นได้จากหลายปัจจัย เช่น ประชากรที่มีความสามารถด้านพลังจิต $trait_psionic$ ในปริมาณสูง, ระดับความสุข £happiness£ §Sความสุข(ความสุข)§!, ตำแหน่งงานประชากร £job_telepath£ [GetTelepathCap], และผู้ว่าการพลังจิตหรือผู้นำ £leader£ ของเขตปกครอง £sector£ ต่างๆ"

 tutorial.2620.name:"บทเรียน: การชนกันของพลังออร่า(Aura Clashing)"
 tutorial.2620.desc:"สนามพลังจิต §S$PSIONIC_AURA$§! ของเราเผชิญหน้ากับสนามพลังออร่าอื่นในระบบดาวข้างเคียงที่เชื่อมต่อกัน เมื่อเกิดเหตุการณ์เช่นนี้ ออร่าทั้งสองจะแข่งขันกันเพื่อตัดสินว่าออร่าของฝ่ายใดจะได้แผ่กระจายเข้าไปในระบบดาวของอีกฝ่าย\n\nกระบวนการนี้ขึ้นอยู่กับค่าการเพิ่มขึ้นของ §Sความเข้มข้น(ความไม่สงบ)§! รายเดือนของแต่ละออร่าที่ต่อต้านกัน ซึ่งสามารถตรวจสอบได้โดยการเลื่อนเมาส์ชี้ไปที่ไอคอนสนามพลังจิตบนแผงส่วนล่างตรงกลางใน £interface£ §Sมุมมองระบบดาว (ระบบดาวมุมมอง)§!"

