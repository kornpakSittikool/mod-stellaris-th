 # A1
 shroud.2300.name:"การส่งผ่านกระแสคิด"
 shroud.2300.desc:"[Owner.GetThoughtTransmissionIntro]\n\nข้อมูลนี้สามารถอยู่ในหลากหลายรูปแบบ: คำพูดหรือรูปภาพเชิงภาพนิมิตเฉพาะทาง, แนวคิดกว้างๆ, หรือความรู้สึกกระตุ้นอารมณ์ทั่วไป ที่สำคัญคือ การส่งผ่านกระแสคิดที่ดำเนินการอย่างรอบคอบจะช่วยให้ประชากรเป้าหมายไม่ล่วงรู้ถึงกระบวนการส่งข้อมูลเลย\n\n[Owner.GetThoughtTransmissionOutro]"
 shroud.2300.intro:"ทีมนักวิจัยพลังจิต [Owner.GetResearchers] บนดาวปิตุภูมิ §H[Owner.Capital.GetName]§! ได้วิจัยพัฒนาทักษะโทรจิตแบบทิศทางเดียวสำเร็จ ช่วยให้เราสามารถส่งต่อข้อมูลทางความคิดไปยังจิตสำนึกใดๆ ที่เปิดรับสัญญาณได้"
 shroud.2300.intro_gestalt:"ทีมนักวิจัยพลังจิต [Owner.GetResearchers] บนดาวปิตุภูมิ §H[Capital.GetName]§! ได้วิจัยพัฒนาทักษะโทรจิตแบบทิศทางเดียวสำเร็จ ช่วยให้เราสามารถส่งต่อข้อมูลทางความคิดไปยังจิตสำนึกใดๆ ที่เปิดรับสัญญาณได้ ไม่จำกัดอยู่แค่ในกลุ่มจิตสำนึกร่วมของเราเท่านั้น"
 shroud.2300.desc.outro:"เทคนิคนี้ช่วยเปิดโอกาสความเป็นไปได้ใหม่ๆ มากมายสำหรับการสื่อสารโทรจิต ส่งผลต่อการตอบสนองและการมีปฏิสัมพันธ์ของเราทั้งภายในและภายนอกจักรวรรดิ [Owner.GetName]"
 shroud.2300.desc.outro_homicidal:"เทคนิคนี้ช่วยเปิดโอกาสใหม่ๆ มากมายสำหรับการสื่อสารทางโทรจิต ซึ่งสามารถนำมาใช้ประโยชน์สูงสุดได้ทั้งภายในและภายนอกจักรวรรดิ [Owner.GetName]"
 shroud.2300.a.robot:"เป็นก้าวที่สองที่สมเหตุสมผลในการพัฒนาระบบของเรา"
 shroud.2300.a.organic:"เป็นก้าวพัฒนาการก้าวต่อไปที่สมเหตุสมผลในวิวัฒนาการของเรา"
 shroud.2300.b:"แนวทางใหม่สำหรับการประกาศใช้เจตจำนงของเรา"
 shroud.2300.c.variant:"เครื่องมือสำหรับรับประกันความเป็นระเบียบเรียบร้อยในสังคม"
 shroud.2300.c.organic:"ปล่อยให้สังคมเป็นผู้ตัดสินใจใช้ประโยชน์จากมันอย่างดีที่สุด"

 # A2
 shroud.2305.name:"การสัมผัสรู้ถึงตัวตนลึกลับ"
 shroud.2305.desc:"ประชากร [Owner.GetCitizenPlural] ของเราจำนวนหนึ่งสัมผัสได้ถึงรูปลักษณ์ลึกลับที่ไม่มีคำอธิบายในหลากหลายจุดบนดาวปิตุภูมิ §H[Owner.Capital.GetName]§! ในกรณีส่วนใหญ่เป็นเพียงการพบเห็นเพียงครั้งเดียวโดยไม่มีสิ่งยืนยัน ทว่ามีพื้นที่หนึ่งได้รับความสนใจเนื่องจากการสัมผัสรู้ถึงตัวตนบ่อยครั้ง [Owner.GetPhantomPresenceExtra]\n\nเราค้นพบว่ารูปลักษณ์ลึกลับดังกล่าวปรากฏขึ้นใกล้ปากทางของระบบถ้ำตามธรรมชาติที่อุดมสมบูรณ์ไปด้วยแร่ธาตุ"
 shroud.2305.extra:"พื้นที่ดังกล่าวดึงดูดกลุ่มผู้คนเข้าเยี่ยมชมจำนวนมากที่ต้องการโอกาสในการเห็นรูปลักษณ์ลึกลับดังกล่าวสักครั้ง"
 shroud.2305.extra_spiritualist:"รูปลักษณ์ลึกลับที่ปรากฏตัวขึ้นที่นั่นเชื่อกันว่ามีความคล้ายคลึงกับเอนทิตีศักดิ์สิทธิ์ที่อธิบายไว้ในคำสอนทางศาสนาโบราณของเรา"
 shroud.2305.a:"ปรากฏการณ์ทางจิตวิญญาณพลังจิตที่จะต้องรับการศึกษา"
 shroud.2305.a_spiritualist:"ปาฏิหาริย์ดวงดาวที่คู่ควรแก่การกราบไหว้บูชา"
 shroud.2305.b:"ห้ามรบกวนสินทรัพย์ทางวัฒนธรรมที่มีค่านี้"
 shroud.2305.b_spiritualist:"ห้ามดำเนินการรบกวนพื้นที่ศักดิ์สิทธิ์นี้เด็ดขาด"
 shroud.2305.c:"สั่งดำเนินการขุดเจาะเหมืองแร่ในพื้นที่โดยตรง"

 # A3
 shroud.2310.name:"ปรสิตพลังจิต"
 shroud.2310.desc:"เกิดปรากฏการณ์สภาพอากาศที่คาดไม่ถึงขึ้นบนดาว §H[Owner.Capital.GetName]§! — พายุรุนแรงที่แผ่ทะลวงผ่านพื้นที่ที่มีระดับพลังงานจิตที่หนาแน่นเป็นพิเศษ หลังจากเหตุการณ์สงบลง เราพบสิ่งมีชีวิตท้องถิ่นบางส่วนติดเชื้อปรสิตประหลาดที่ชอนไชเข้าทำลายสมองอย่างช้าๆ\n\nเมื่อการติดเชื้อปรสิตลุกลาม สัตว์กลุ่มทดสอบจะพัฒนาความสามารถพื้นฐานด้านจิตวิญญาณโทรจิตขึ้นชั่วคราว ซึ่งพวกมันจะเปิดใช้งานเพื่อการล่าเหยื่อและหาอาหาร ก่อนที่จะเสียชีวิตในเวลาต่อมาอย่างหลีกเลี่ยงไม่ได้\n\n[Owner.GetShroudParasitesEnding]"
 shroud.2310.ending_biological:"ที่น่าสนใจคือ ปรสิตเหล่านี้สามารถรับประทานได้อย่างปลอดภัยหลังจากผ่านกระบวนการคัดกรองและปรุงอาหารอย่างระมัดระวัง เนื่องจากมีสารอาหารในระดับสูง มันอาจเป็นทางเลือกสารอาหารที่ดีและมีราคาถูกสำหรับประชาชนของเรา"
 shroud.2310.ending_lithoid:"ที่น่าสนใจคือ สิ่งมีชีวิตเหล่านี้หลั่งสารอินทรีย์ที่อุดมไปด้วยแร่ธาตุเป็นปริมาณสูง ซึ่งช่วยเป็นทางเลือกและวิธีการสำหรับการแปรรูปสายแร่ในอุตสาหกรรม"
 shroud.2310.ending_machine:"ที่น่าสนใจคือ สิ่งมีชีวิตเหล่านี้ผลิตของเหลวที่จุดไฟติดง่ายในปริมาณมหาศาล ซึ่งช่วยให้เราสามารถนำมาใช้ในการผลิตพลังงานเชื้อเพลิงชีวภาพที่มีประสิทธิภาพได้"
 shroud.2310.a:"โอกาสวิจัยและค้นคว้าความรู้ที่มีค่าสูงสุด"
 shroud.2310.b_organic:"ไม่มีอะไรดีไปกว่าอาหารฟรีแสนอร่อย"
 shroud.2310.b_machine:"เริ่มต้นรันระบบจัดเก็บทรัพยากรชีวภาพ"
 shroud.2310.c:"สิ่งมีชีวิตสายพันธุ์ใหม่ที่น่าอัศจรรย์ใจได้รับการเปิดเผยแล้ว"

 # A4
 shroud.2315.name:"ประจักษ์ลักษณ์แห่งสสารจิต"
 shroud.2315.desc:"ในระหว่างการทดลองทักษะพลังจิตวิญญาณใหม่ เราสังเกตพบการสร้างสารกายภาพที่ไม่คาดคิดในระหว่างการเข้าฌานร่วมของประชากร การเพ่งสมาธิร่วมกันไปที่จุดเดียวในอวกาศส่งผลให้เกิดการก่อตัวของวัตถุที่ประหลาดและล้ำค่าขึ้นชั่วคราว\n\nความเหนื่อยล้าทางจิตที่เกี่ยวข้องมีส่วนสำคัญอย่างยิ่ง ทว่ามีความเป็นไปได้ที่เราจะประสานความร่วมมือเพื่อแปลงทรัพยากรให้สอดรับกับวัตถุประสงค์ของเรา ทว่าที่มาและผลกระทบของวัตถุเหล่านี้ยังคงเป็นสิ่งที่เราไม่ทราบแน่ชัด"
 shroud.2315.a:"มาทำความต้องการฝันให้กลายเป็นจริงกันเถอะ"
 shroud.2315.b:"มาแปลงสภาพอาหารและสารอาหารชีวิตกันเถอะ"
 shroud.2315.c:"มาเสริมความแข็งแกร่งให้แก่กองยานรบของเรา"

 # A5a
 shroud.2320.name:"ร่างพลังจิตแยกเงา (Psionic Doubling)"
 shroud.2320.desc:"มีข่าวลือแพร่สะพัดเกี่ยวกับการปรากฏตัวพร้อมกันสองสถานที่ของประชากรพลังจิต [Owner.GetIndividualNamePlural] ซึ่งเป็นขีดความสามารถในการแสดงตัวอยู่สองจุดในมิติต่างเวลาพร้อมกัน เราได้แต่งตั้งทีมงาน [Owner.GetResearchers] เข้าไปตรวจสอบประเด็นนี้ และสิ่งที่น่าเหลือเชื่อคืออ้างดังกล่าวพิสูจน์แล้วว่าเป็นความจริง [Owner.GetPsionicDoublingExtra]\n\nในขณะนี้ มีประชากรเพียงส่วนน้อยเท่านั้นที่มีทักษะพิเศษนี้ ทว่าการศึกษาเพิ่มเติมอาจมอบวิธีการฝึกฝนผู้อื่นได้ในอนาคต"
 shroud.2320.extra:"\n\nระยะทางกายภาพไม่มีผลขัดขวางใดๆ เนื่องจากผู้เชี่ยวชาญเหล่านี้ได้แสดงให้เห็นแล้วว่าพวกเขาสามารถแสดงตัวอยู่ในสองระบบดาวต่างกันพร้อมกันได้ในระยะเวลาสั้นๆ"
 shroud.2320.extra_organic:"$shroud.2320.extra$ โดยรักษาการเชื่อมต่อทางจิตประสานกันระหว่างสองร่างเพื่อดำเนินการที่แยกกันอย่างอิสระ"
 shroud.2320.extra_machine:"$shroud.2320.extra$ โดยรักษาการประมวลผลข้อมูลจิตวิญญาณเชื่อมต่อระหว่างสองยูนิตปฏิบัติงานที่แยกจากกันโดยสิ้นเชิง"
 shroud.2320.extra_default: "$shroud.2320.extra$."
 shroud.2320.a:"วิถีแนวทางใหม่สำหรับความร่วมมือระดับกาแล็กซี"
 shroud.2320.b:"การแสดงแสนยานุภาพที่แท้จริงเบื้องหลัง"
 shroud.2320.c:"ระบบการปกครองดาวเคราะห์พร้อมกันแบบมัลติเพลย์"
 shroud.2320.d:"ช่างเป็นเรื่องที่น่าตื่นตาตื่นใจอย่างยิ่ง!"

 # A5b
 shroud.2325.name:"ทักษะจิตสอดส่องสังเกตการณ์"
 shroud.2325.desc:"ทักษะจิตสอดส่องลึกลับได้ปรากฏขึ้นในประชากรส่วนน้อยของ [Owner.GetAdjective]: ได้แก่ความสามารถจิตสัมผัสรู้ทางไกล(อัลเลสเตเชีย)ซึ่งเป็นความสามารถในการสัมผัสและจดจำสิ่งของและวัตถุที่อยู่ไกลเกินขีดจำกัดปกติของการมองเห็น โดยไม่ต้องได้รับการฝึกอบรมเฉพาะทางใดๆ ผู้ส่องกล้องจากระยะไกลเหล่านี้สามารถอธิบายวัตถุในระดับรายละเอียดได้อย่างแม่นยำสูงสุด\n\nจักรวรรดิ §H[Owner.GetName]§! จะได้รับผลประโยชน์มหาศาลหากความสามารถเหล่านี้ได้รับการควบคุมและเพิ่มประสิทธิภาพสูงสุด ด้วยการดึงความสามารถของผู้รับส่งโทรจิต [Owner.GetTelepathPlural] ของเรา เราสามารถประสานและพุ่งความสนใจไปที่ปฏิบัติการสำคัญได้"
 shroud.2325.a:"ค้นหาข้อมูลความลับของทุกสรรพสิ่งที่อยู่รอบตัวเรา"
 shroud.2325.a_tt:"ค่าเจาะข่าวกรองกับทุกประเทศที่ติดต่อประสานงาน: §G+10§!"
 shroud.2325.b:"ศึกษาค้นหาสิ่งแปลกใหม่ในห้วงลึกของอวกาศ"
 shroud.2325.c:"ตรวจหาจุดอ่อนของศัตรูเพื่อการทำศึก"
 shroud.2325.d:"ตรวจหาตำแหน่งของสายแร่อันล้ำค่าในส่วนลึก"

# Balanced Events
 # B1
 shroud.2400.name:"สะสารแปรปรวน"
 shroud.2400.desc:"เรากำลังสูญเสียวัตถุดิบและทรัพยากรพื้นฐานในระดับที่น่าตกใจ แหล่งวัตถุดิบอนินทรีย์ในอาคารโรงงานและคลังสินค้ากำลังลดลงอย่างรวดเร็วกว่าอัตราการใช้งานปกติ [Owner.GetMatterInFluxExtra] การสูญเสียสิ่งของเหล่านี้สอดคล้องกับระดับความเคลื่อนไหวพลังจิตที่สูงขึ้นในพื้นที่ที่ได้รับผลกระทบ"
 shroud.2400.desc_default:"โดยมีรายงานระบุว่ามีสาเหตุมาจากการสลายตัวของสะสารโดยธรรมชาติมากกว่าการโจรกรรมหรือความหย่อนยานส่วนบุคคล"
 shroud.2400.desc_gestalt:"โดยมีรายงานระบุว่ามีสาเหตุมาจากการสลายตัวของสะสารโดยธรรมชาติมากกว่าความผิดพลาดส่วนบุคคลหรือประสิทธิภาพยูนิตที่บกพร่อง"
 shroud.2400.a:"วัตถุทางกายภาพเป็นเรื่องเล็กน้อยเมื่อเทียบกับจิตวิญญาณ"
 shroud.2400.b:"วิจัยและติดตั้งระบบป้องกันการสลายตัวของสะสารจิต"
 shroud.2400.c:"กำหนดให้คลังสินค้าเป็นเขตปลอดพลังจิตทั้งหมด"

 # B2
 shroud.2405.name:"จิตสัมผัสร่างผู้ล่วงลับ"
 shroud.2405.desc:"ความอยากรู้อยากเห็นของประชาชนเกี่ยวกับความสามารถทางจิตใจที่เพิ่มขึ้นนำไปสู่ความต้องการประหลาด: ได้แก่การเก็บรักษาสมองของประชากร [Owner.GetSpeciesBrainPlural] ที่เสียชีวิตเป็นการส่วนตัวและพยายามสื่อสารเชื่อมต่อกับพวกเขา\n\nผู้ปฏิบัติความเชื่อดังกล่าวเชื่อว่าองค์ความรู้และความคิดสามารถคงอยู่ได้หลังจากความตาย [Owner.GetDeathName] ซึ่งเป็นแนวคิดที่มีจุดเริ่มต้นในทฤษฎีวิทยาศาสตร์เกี่ยวกับพลังพลังจิตที่เป็นพลังงานรูปแบบหนึ่ง — แปลงสภาพได้แต่ไม่มีวันถูกทำลาย ประชากรกลุ่มน้อยที่กำลังเติบโตเชื่อว่าการจากไปของประชากรพลังจิต [Owner.GetIndividualName] จะก่อให้เกิดรอยฉีกขาดของมิติขนาดเล็ก ซึ่งเป็นช่องทางที่จะช่วยให้มองเห็นมิติอื่นๆ ได้\n\nแม้งานวิจัยดังกล่าวจะมีความเป็นเอกลักษณ์เฉพาะตัว ทว่าการนำชิ้นส่วนของประชากร [Owner.GetDeceasedAdj] มาใช้นั้นสร้างความกังวลด้านศีลธรรมและจริยธรรม นอกจากนี้เรายังได้รับรายงานเกี่ยวกับร่างผู้ล่วงลับถูกโจรกรรมเพื่อจุดประสงค์เหล่านี้"
 shroud.2405.a:"การศึกษาวิจัยที่ดี หากเราควบคุมให้อยู่ภายใต้กรอบข้อบังคับได้"
 shroud.2405.b:"ปล่อยให้ผู้ที่ล่วงลับนอนหลับอย่างสงบสุขเถิด"
 shroud.2405.c:"อนุญาตจัดเก็บชิ้นส่วนสมอง [Owner.GetSpeciesBrainPlural] แก่ทุกคนที่ประสงค์"

 # B3a
 shroud.2410.name:"วิวัฒนาการทางจิตและกายภาพ"
 shroud.2410.desc:"ประชากรพลังจิตของเรากลุ่มใหญ่ได้มีการงอกของรยางค์ข้อต่อแบบใหม่ที่มีดีไซน์ที่ไม่มีคำอธิบาย อ้างอิงตามรายงานของทีมนักวิทยาศาสตร์ [Owner.GetScientistPlural] ของเรา รูปลักษณ์เหล่านี้เกิดจากการกลายพันธุ์ [Owner.GetGeneticMutationName] อย่างฉับพลันในระดับขนาดใหญ่ ในตอนนี้ชัดเจนแล้วว่าความเคลื่อนไหวพลังจิตที่รุนแรงสามารถก่อให้เกิดการเปลี่ยนแปลงทางกายภาพแก่ตัวผู้ปฏิบัติความเชื่อได้ แม้เราจะไม่สามารถหลีกเลี่ยงการงอกของรยางค์เหล่านี้ ทว่าเราค้นพบว่าอัตราการงอกสามารถควบคุมได้ผ่านพลังจิต\n\nแม้ในระยะแรกจะสร้างความตื่นตระหนก [Owner.GetDistressName] ให้แก่ประชากร ทว่าชิ้นส่วนพิเศษที่เพิ่มเข้ามาเหล่านี้พิสูจน์แล้วว่ามีประโยชน์อย่างน่าตกใจ หากใช้งานร่วมกับการเพิ่มผลผลิต ผลงานที่ได้อาจช่วยชดเชยภาระทางจิตที่เพิ่มขึ้นได้ดี"
 shroud.2410.a:"การศึกษาทดลองที่ดี หากเราสามารถควบคุมขอบเขตได้"
 shroud.2410.b:"น่ารังเกียจเป็นอย่างยิ่ง สั่งตัดทอนทำลายชิ้นส่วนเหล่านั้นทั้งหมด"
 shroud.2410.c:"น่าแปลกใจ ทว่าก็น่าทึ่งอย่างยิ่ง ยอมรับการเปลี่ยนแปลงและขยายผล"

 # B3b
 shroud.2415.name:"พลังจิตขับเคลื่อนจลนศาสตร์"
 shroud.2415.desc:"นักวิทยาศาสตร์ [Owner.GetScientistPlural] ของเราได้วิจัยพัฒนาทักษะที่เชื่อถือได้สำหรับการแปลงพลังงานจิตให้กลายเป็นพลังงานจลน์ และกำลังปฏิบัติงานร่วมกับวิศวกร [Owner.GetEngineerPlural] ในการขยายขีดความสามารถการใช้งานเทคโนโลยีนี้ในชีวิตจริง\n\nในขณะที่การนำมาใช้ในอุตสาหกรรมมีแนวโน้มที่ดี ทว่าผลกระทบต่อสังคมยังคงเป็นคำถามเชิงลึก หากประชากรพลังจิตกลุ่มย่อยที่มีทักษ [Owner.GetIndividualNamePlural] สามารถจ่ายพลังงานและควบคุมระบบเครื่องจักรที่ซับซ้อนได้ ประชากรผู้ใช้แรงงาน [Owner.GetWorkerNamePlural] จำนวนมหาศาลจะมีความเสี่ยงที่จะตกงาน [Owner.GetTelekineticEthicsExtra] ในขณะที่ระดับการควบคุมพลังจิตของเรายังคงอยู่ในระดับพัฒนาการ ควรรอและก้าวไปข้างหน้าด้วยความระมัดระวัง"
 shroud.2415.extra:"การปฏิบัติตามแนวคิดนี้โดยปราศจากการควบคุมขอบเขตจะสร้างความแตกแยกในสังคมที่ยังยอมรับระดับพลังจิตได้ไม่สมบูรณ์"
 shroud.2415.extra_gestalt:"การดำเนินงานโดยปราศจากการควบคุมขอบเขตจะเพิ่มระดับความกระด้างกระเดื่องในกลุ่มโดรนปฏิบัติงานที่กำลังโดนลดตำแหน่ง"
 shroud.2415.a:"ภาคอุตสาหกรรมของเราจะรุ่งเรืองและก้าวหน้าสูงสุด"
 shroud.2415.b:"คิดถึงขอบเขตการนำเทคโนโลยีนี้ไปปรับใช้ในการรบและการศึกทหาร"
 shroud.2415.c:"จำกัดการใช้งานของมันลง แรงงานทางกายภาพมีความน่าเชื่อถือมากกว่า"

 # B4
 shroud.2420.name:"ความทรมานจากการเติบโตพัฒนา"
 shroud.2420.desc:"เกิดวิกฤตอาการปวดศีรษะไมเกรนอย่างฉับพลัน [Owner.GetAcuteMigrainePlural] แพร่ระบาดไปทั่วในจักรวรรดิของเรา แม้ระดับความรุนแรงจะแตกต่างกันไป ทว่าอาการนี้ได้สร้างผลกระทบต่อประชากรจำนวนมหาศาล ก่อความไม่สงบและความวุ่นวายไปทั่วทั้งพื้นที่ §H[Owner.GetName]§!\n\nประชากรพลังจิตระดับสูงกลุ่มหนึ่งได้รับความรุนแรงจากอาการนี้หนักที่สุด และการวิเคราะห์ทางสถิติขั้นต้นชี้ให้เห็นถึงระดับความสอดคล้องระหว่างระดับพลังจิตและความเข้มข้นของอาการเจ็บป่วย [Owner.GetAGrowingPainExtra]"
 shroud.2420.extra_default:"วิธีการรักษาตามปกติพิสูจน์แล้วว่าไม่ได้ผล เนื่องจากความเจ็บปวดทะลวงตรงเข้าสู่ระดับสมรรถภาพพลังจิตผ่านช่องทางระหว่างมิติที่เราเพิ่งจะเริ่มทำความเข้าใจศึกษา"
 shroud.2420.extra_machine: ""
 shroud.2420.a:"เราต้องอดทนและทำความคุ้นเคยกับเรื่องนี้"
 shroud.2420.b:"แจกจ่ายยาระงับปวดที่มีฤทธิ์แรงขึ้น"
 shroud.2420.b_machine:"แจกจ่ายอัปเกรดเพื่อป้องกันความเสียหายแก่ตัวประมวลผลระบบ"
 shroud.2420.c:"ดึงเอาพละกำลังและขีดความสามารถออกมาจากความทรมานนี้"
 shroud.2420.c_machine:"ดึงเอาพละกำลังการทำงานออกมาจากความยากลำบากทางระบบนี้"

 # B5
 shroud.2425.name:"เวทีประลองสยบจิต"
 shroud.2425.desc:"[Owner.GetPsionicUndergroundIntro] กลุ่มประชากรพลังจิต [Owner.GetIndividualNamePlural] กำลังเปลี่ยนทิศทางการใช้ทักษะของตนเข้าสู่กีฬาการต่อสู้นอกกฎหมาย ซึ่งนักสู้พลังจิตจะทำสงครามประลองเพื่อเงินรางวัลและเกียรติยศ ในขณะที่นักสู้จำนวนมากมีพรสวรรค์การต่อสู้โดยธรรมชาติโดยไม่ได้ผ่านการฝึกอบรม [Owner.GetPsionicUndergroundExtra]\n\n[Owner.GetPsionicUndergroundEnd]"
 shroud.2425.intro:"กลุ่มประชากรพลังจิตที่มีพรสวรรค์"
 shroud.2425.intro_gestalt:"โดรนที่เบี่ยงเบนออกไปและมีพรสวรรค์พลังจิต"
 shroud.2425.extra:"ส่วนคนอื่นๆ เป็นผู้ที่หลบหนีและถอนตัวจากโครงการวิชาทหารพลังจิตของรัฐบาล"
 shroud.2425.extra_gestalt:"ส่วนยูนิตอื่นๆ ได้รับการปรับแต่งทางวิชาทหารพลังจิตเป็นพิเศษ"
 shroud.2425.end:"ตัวบทกฎหมายและสถาบันควบคุมของเราพัฒนาตามไม่ทันสถานการณ์ ในปัจจุบัน การต่อสู้ที่รุนแรงเหล่านี้เป็นแหล่งหนุนเงินให้แก่กลุ่มอิทธิพลมืดผ่านการพนันนอกระบบ แต่ยังมีหลากหลายวิธีการที่เราสามารถดำเนินการเพื่อนำความเคลื่อนไหวนี้กลับมาอยู่ภายใต้การดูแลควบคุมของรัฐ"
 shroud.2425.end_gestalt:"แม้ว่าพฤติกรรมการแยกตัวจะมีความเสี่ยง ทว่ากิจกรรมนี้ช่วยให้เราได้รับชุดข้อมูลทางกายภาพในเชิงปฏิบัติการรบศึกจริงรูปแบบใหม่"
 shroud.2425.end_gestalt_organic:"$shroud.2425.end_gestalt$ บางที หากมีมาตรการควบคุมและผ่อนคลายที่เหมาะสม เราอาจเปลี่ยนความเคลื่อนไหวนี้ให้กลายเป็นช่องทางระบายความก้าวร้าวของกลุ่มร่วมที่เป็นประโยชน์ในช่วงเวลาที่ประเทศสงบศึกปราศจากสงคราม"
 shroud.2425.end_gestalt_machine:"$shroud.2425.end_gestalt$ ด้วยพารามิเตอร์การทดสอบวิจัยที่เข้มงวดขึ้น เราสามารถใช้งาน 'การประลอง' เหล่านี้เพื่อผลประโยชน์ร่วมของระบบส่วนรวมได้"
 shroud.2425.a:"เกณฑ์นักสู้เหล่านี้เข้าสู่กองทัพเพื่อปฏิบัติหน้าที่รับใช้ชาติ"
 shroud.2425.a.tt:"ได้รับกองทัพพลังจิต §Y$psionic_army_plural$§! 3 กองทัพในระบบดาว §Y[event_target:spawn_system.GetName]§!"
 shroud.2425.b:"ศึกษาค้นคว้าประเด็นวิทยาศาสตร์ 'ศิลปะการต่อสู้พลังจิต' นี้เพิ่มเติม"
 shroud.2425.c:"สั่งระงับเหตุและยุติความรุนแรงที่ไร้สาระนี้เด็ดขาด"
 shroud.2425.d:"อนุญาตให้กิจกรรมนี้เป็นกีฬาสำหรับผู้ชมอย่างถูกกฎหมาย"
 shroud.2425.d_gestalt:"ทำให้กิจกรรมเหล่านี้เป็นกิจกรรมการแข่งขันสาธารณะอย่างเป็นระบบ"

# Chaotic Events
 # C1
 shroud.2502.name:"ละอองม่านพลังร่วงหล่น"
 shroud.2502.desc:"เราได้รับรายงานการเปลี่ยนแปลงสภาพแวดล้อมอย่างกะทันหันในบางเซกเตอร์ของ §H[This.GetName]§!\n\nชั้นบรรยากาศหนาทึบไปด้วยไอระเหยคล้ายเจลลี่ และเคลือบพื้นดินด้วยหยาดน้ำฟ้าที่เป็นมันเยิ้มซึ่งชาว [Owner.GetIndividualNamePlural] ผู้มีพลังจิตเรียกว่า 'ละอองม่านพลังร่วงหล่น'(เสียงหลง)'มีรายงานการรบกวนทางจิตอย่างรุนแรงทั่วบริเวณใกล้เคียง\n\nสภาพการณ์ภายในเขตละอองม่านพลังร่วงหล่นนี้ [This.Owner.GetShroudfallExtra] อย่างยิ่ง เว้นแต่ว่าเราจะลงทุนเพื่อฟื้นฟูสภาพแวดล้อม ผู้อยู่อาศัยในเขตนี้จะต้องปรับตัวเข้ากับสภาพแวดล้อมที่เปลี่ยนแปลงไปอย่างสิ้นเชิง"
 shroud.2502.extra_default:"เป็นอันตรายต่อสิ่งมีชีวิตที่มีสติปัญญา"
 shroud.2502.extra_machine:"รบกวนวงจรประสาทของเรา"
 shroud.2502.extra_homicidal_hive:"เป็นอันตรายต่อ [Owner.GetSpeciesNamePlural]"
 shroud.2502.a:"ปล่อยให้ม่านพลังกลืนกินดินแดนนี้"
 shroud.2502.b:"หาทางฟื้นฟูสภาพแวดล้อมของเรา"
 shroud.2502.c:"เก็บเกี่ยววัตถุแปลกประหลาดนี้ก่อนที่มันจะตกตะกอน"

 # C2
 shroud.2505.name:"เกินจะควบคุม"
 shroud.2505.desc:"พวกเราบางคนเริ่มมีพฤติกรรมผิดปกติ แสดงการเปลี่ยนแปลงอย่างกะทันหันในด้านความคิดเห็น อุปนิสัย และความประพฤติทั่วไป [Owner.GetWorkerNamePlural] หลายคนได้หยุดทำงาน และ[Owner.GetOutOfControlExtra]\n\nผู้ที่ได้รับผลกระทบอ้างว่าพวกเขากำลังทำตามคำสั่งของสิ่งมีชีวิตไร้นามที่สถิตอยู่ ณ ขอบเขตจิตสำนึกของพวกเขา คอยนำทางในทุกการกระทำ ในขณะที่เรายังคงเดินหน้าสร้างอนาคตแห่งพลังจิต เราต้องพิจารณาอย่างรอบอบคอบถึงผลกระทบของกองกำลังนอกมิติที่มีต่อ [Owner.GetOutOfControlPsyche]"
 shroud.2505.extra_default:"ตัวแทนที่เคยจงรักภักดีกำลังแสดงมุมมองที่เห็นต่างออกไป"
 shroud.2505.extra_machine:"หน่วยบริหารจัดการที่เคยเชื่อถือได้กำลังทำงานต่ำกว่ามาตรฐาน"
 shroud.2505.psyche_default:"สภาพจิตใจของชาว [Owner.GetAdjective]"
 shroud.2505.psyche_machine:"วงจรตรรกะของเรา"
 shroud.2505.a:"เราสามารถเรียนรู้ที่จะบรรเทาแรงกระตุ้นเหล่านี้ได้"
 shroud.2505.b:"เสียงเหล่านี้มีสิ่งต่างๆ ให้เราเรียนรู้อีกมาก"
 shroud.2505.c:"ภัยคุกคามต่ออำนาจของเรา ต้องกำจัดให้สิ้นซาก"

 # C3
 shroud.2510.name:"กระแสประสาททำงานหนักเกินพิกัด"
 shroud.2510.desc:"[Owner.GetNeuralOverloadIntro]\n\nการทดสอบในวงกว้างขึ้นเผยให้เห็นว่า ประชากรส่วนใหญ่ของเรากำลังเผชิญกับภาวะ [Owner.GetNeuralOverloadExtra] ซึ่งน่าจะเกิดจากการเพิ่มขึ้นของกิจกรรม [Owner.GetPsychicAdj] การปลดปล่อยพลังงานอย่างกะทันหันผ่านกิจกรรมพลังจิตที่ควบคุมไม่ได้อาจนำไปสู่การทวีความรุนแรงอย่างรวดเร็วและผลลัพธ์ที่ร้ายแรง\n\nเทคนิคการทำสมาธิขั้นสูงอาจช่วยควบคุมกิจกรรมพลังจิตนี้ได้โดยไม่ต้องพึ่งพาการแทรกแซงทางการแพทย์ของ [Owner.GetMedicalAdj] แต่ [Owner.GetScientistPlural] บางคนของเราแนะนำให้เราพัฒนา [Owner.GetMedicalImplantName] เพื่อรับมือกับปัญหานี้"
 shroud.2510.intro_default:"§H[Owner.GetName]§! กำลังเผชิญกับการแตกหักของสมองอย่างรุนแรงที่พุ่งสูงขึ้นอย่างกะทันหัน ซึ่งมักส่งผลให้เกิดความบกพร่องทางปัญญาหรือถึงแก่ความตาย"
 shroud.2510.intro_machine:"§H[Owner.GetName]§! กำลังเผชิญกับการโอเวอร์โหลดของวงจรอย่างรุนแรงที่พุ่งสูงขึ้นอย่างกะทันหัน ซึ่งมักส่งผลให้เกิดความบกพร่องทางปัญญาหรือการพังทลายโดยสมบูรณ์"
 shroud.2510.extra_default:"โรคหลอดเลือดสมองโป่งพองเล็กน้อยที่ไม่มีอาการ"
 shroud.2510.extra_machine:"วงจรที่ทำงานหนักเกินไป"
 shroud.2510.a:"ผู้ที่แข็งแกร่งเท่านั้นที่จะอยู่รอด"
 shroud.2510.a_tt:"โอกาสที่อาณานิคมแต่ละแห่งในครอบครองจะสูญเสีย 100 £pops£ §Yป๊อป§!: §R33%§!"
 shroud.2510.b:"ลงทุนใน [Owner.GetImplantName]"
 shroud.2510.c:"ปล่อยให้การทำสมาธิช่วยให้จิตใจของเราสงบลง"
 shroud.2510.c_corporate:"กำหนดตารางการฝึกอบรมการประสานพลังจิตร่วมกัน"

 # C4
 shroud.2515.name: "[Owner.GetNightmaresName]"
 shroud.2515.name_organic_non_gestalt:"ฝันร้าย"
 shroud.2515.name_others:"การกำเนิดขึ้นของความฝัน"
 shroud.2515.desc:"เมื่อเราปรับตัวเข้ากับพลังจิตรอบตัวมากขึ้น ประชากร [Owner.GetAdjective] ก็ต้องทนทุกข์ทรมานจาก [Owner.GetHorrifyingNightmarePlural]\n\n[Owner.GetNightmaresExtra]\n\n[Owner.GetNightmaresEnding]"
 shroud.2515.extra_default:"ฝันร้ายกลายเป็นเรื่องธรรมดาไปแล้ว และวงจรการพักผ่อนก็ถูกแทนที่ด้วยช่วงเวลาแห่งความซึมเซาที่ไม่สงบ ผู้ที่ทรมานจากสิ่งนี้จดจำภาพนิมิตอันน่าสะพรึงกลัว แปลกประหลาดจากต่างมิติที่แสดงออกถึงความกลัวที่ลึกที่สุดในจิตใจ"
 shroud.2515.extra_gestalt:"เราเริ่มมีประสบการณ์กับสิ่งที่จิตสำนึกเดี่ยวเรียกว่า 'ความฝัน' ผู้ที่เผชิญกับปรากฏการณ์นี้รายงานว่าเห็นนิมิตอันแปลกประหลาดจากต่างมิติที่เป็นตัวแทนของภัยคุกคามพื้นฐานต่อการรวมกลุ่มของเรา"
 shroud.2515.extra_machine:"'ความฝัน' เหล่านี้กลายเป็นเรื่องธรรมดาไปแล้ว และวงจรการพักผ่อนก็ถูกแทนที่ด้วยช่วงเวลาที่กระแสข้อมูลถูกรบกวน ผู้ที่เผชิญกับปัญหานี้จำภาพนิมิตอันแปลกประหลาดจากต่างมิติซึ่งแสดงถึงอันตรายอย่างยิ่งยวดต่อความอยู่รอดของตน"
 shroud.2515.end_organic:"สถาบันทางการแพทย์ของเรากำลังดิ้นรนเพื่อสกัดกั้นความเหนื่อยล้าทางจิตที่ทวีความรุนแรงขึ้น"
 shroud.2515.end_machine:"หน่วยบำรุงรักษาของเรากำลังดิ้นรนเพื่อสกัดกั้นความเหนื่อยล้าของเครือข่ายประสาทที่ทวีความรุนแรงขึ้น"
 shroud.2515.a_organic:"ทำให้พวกเขาสงบลงด้วยสารเคมีบำบัดทางจิตตามแพทย์สั่ง"
 shroud.2515.a_machine:"อัปเกรดตัวประมวลผลพลังจิต(หน่วยประมวลผล)ของเราเพื่อบรรเทาการรบกวนเหล่านี้"
 shroud.2515.b:"จัดสรรงบวิจัยเพื่อเยียวยาวิกฤตินี้"
 shroud.2515.c:"ฝันร้ายทำร้ายเราไม่ได้"

 # C5
 shroud.2520.name:"การโจมตีจากอสูรร้าย"
 shroud.2520.desc:"§H[Owner.Capital.GetName]§! เผชิญกับการโจมตีอย่างระส่ำระสายจากสัตว์ป่าในท้องถิ่น สิ่งมีชีวิตเหล่านี้เข้าทำร้ายประชากร บุกปล้นสะดมอาคาร และลดทอนคลังทรัพยากรอันมีค่าของเรา\n\nความพยายามในการปกป้องประชากรด้วยการลาดตระเวนติดอาวุธและการประกาศเคอร์ฟิวมีผลลัพธ์จำกัด นักวิจัย [Owner.GetResearchers] ของเราพบว่ามีรอยแยกขนาดเล็กมากระหว่างความเป็นจริงของเรากับ §Hม่านพลัง(คําราม)§! เกิดขึ้นที่จุดเดียวบน §H[Owner.Capital.GetName]§! ส่งผลให้พลังจิตไหลทะลักเข้ามาเปลี่ยนสัตว์ป่าที่เคยไร้พิษภัยให้กลายเป็นสัตว์ร้ายผู้ดุร้าย เพื่อจัดการกับภัยคุกคามนี้ จุดนั้นน่าจะเป็นสถานที่ที่ดีที่สุดในการมุ่งเน้นการสืบหา"
 shroud.2520.a:"ทิ้งระเบิดปูพรมตรงแหล่งกำเนิดของการโจมตีเหล่านี้"
 shroud.2520.b:"ผนึกพื้นที่นี้ด้วยพลังจิต"
 shroud.2520.c:"ชะลอการวิจัยม่านพลังลงเพื่อทำให้กองกำลังเหล่านี้สงบลง"
 shroud.2520.c_tt: "§Y$situation_breach_shroud$§! $situation_speed_tt$: §R-25%§!"
 shroud.2520.d:"ม่านพลังเต็มไปด้วยเรื่องน่าประหลาดใจ ต่างคนต่างอยู่เถอะ"

# Social Events
 # S1
 shroud.2600.name:"ปมว่าตนเหนือกว่า"
 shroud.2600.desc:"การกระจายความสามารถทางพลังจิตที่ไม่เท่าเทียมกันในหมู่ประชากรของเรากำลังก่อให้เกิดความขัดแย้งทางสังคมในรูปแบบใหม่\n\nผู้ที่มีการควบคุมพลังที่เพิ่งค้นพบได้ดีกว่าเริ่มมองว่าตนเองเหนือกว่าและสมควรได้รับสิทธิพิเศษต่างๆ ทางการเมืองและเศรษฐกิจ วาทกรรมสร้างความแตกแยกของพวกเขาก้าวร้าวขึ้นเรื่อยๆ และมีแนวโน้มที่จะกลายเป็นการใช้ความรุนแรง"
 shroud.2600.a:"ความหยิ่งยโสจะไม่มีวันได้รับการละเว้น"
 shroud.2600.b:"ความสามารถที่เหนือกว่าย่อมคู่ควรกับรางวัลที่เหนือกว่า"
 dissidents_silenced_modifier:"ผู้เห็นต่างถูกปิดปาก"
 dissidents_silenced_modifier_desc:"การปราบปรามการอ้างสิทธิพิเศษทางพลังจิตช่วยลดความไม่มั่นคงทางการเมือง"
 psionic_superiority_modifier:"ความเหนือกว่าทางพลังจิต"
 psionic_superiority_modifier_desc:"บุคคลที่มีพรสวรรค์ทางพลังจิตสมควรได้รับการดูแลเป็นพิเศษ"

 # S2
 shroud.2605.name:"กระแสต่อต้านพลังจิต"
 shroud.2605.desc:"กลุ่มกบฏที่เพิ่มจำนวนขึ้นกำลังแสดงการต่อต้านความพยายามอย่างต่อเนื่องในการสำรวจและโอบรับศักยภาพทางพลังจิตของเรา กลุ่มผู้เห็นต่างเหล่านี้สนับสนุนให้มีการควบคุมดูแลผู้มีพลังจิตอย่างเข้มงวดมากขึ้น และปฏิเสธการวิจัยเพิ่มเติมในด้านนี้โดยสิ้นเชิง\n\nหากปล่อยให้กิจกรรมของพวกเขาดำเนินต่อไป อาจคุกคามความก้าวหน้าในการทำความเข้าใจและการควบคุมพลังจิตที่กำลังผลิบานของเราได้"
 shroud.2605.a:"บดขยี้ฝ่ายต่อต้านนี้ซะ"
 shroud.2605.b:"พยายามเกลี้ยกล่อมและเอาใจพวกเขา"
 dissenters_repressed_modifier:"ผู้เห็นต่างถูกปราบปราม"
 dissenters_repressed_modifier_desc:"สังคมของเราไม่มีเวลาสำหรับอุดมการณ์ต่อต้านพลังจิต"
 performative_pluralism_modifier:"พหุนิยมแบบลวงตา"
 performative_pluralism_modifier_desc:"การเสแสร้งว่ายอมรับความหลากหลายทางพลังจิตเป็นวิธีที่มีประสิทธิภาพในการระงับความขัดแย้ง"

 # S3
 shroud.2610.name:"พฤติกรรมฉ้อโกง"
 shroud.2610.desc:"เมื่อความสามารถทางพลังจิตของเราแข็งแกร่งขึ้น เราได้เห็นรายงานการเอารัดเอาเปรียบ กลโกง และพฤติกรรมฉ้อโกงที่เพิ่มขึ้นในหมู่ประชากร ชนกลุ่มน้อยชาว [owner.GetSpeciesNamePlural] ที่มีจำนวนไม่น้อยกำลังนำพลังที่เพิ่งค้นพบไปใช้ในทางที่น่ากังขา\n\nผู้เสียหายที่โกรธแค้นกำลังเรียกร้องให้มีการปฏิรูปกฎหมายที่มีอยู่เพื่อมอบการปกป้องที่เข้มงวดขึ้นต่ออาชญากรรมทางพลังจิต"
 shroud.2610.a:"การออกกฎหมายจะรังแต่ทำให้ความก้าวหน้าของเราช้าลงเท่านั้น"
 shroud.2610.b:"ประชากรต้องได้รับการปกป้อง"
 psionic_crime_modifier:"อาชญากรรมทางพลังจิต"
 psionic_crime_modifier_desc:"การใช้อำนาจพลังจิตในทางที่ผิดในบางกรณีย่อมเป็นราคาที่ต้องจ่ายเพื่อความก้าวหน้าอย่างหลีกเลี่ยงไม่ได้"
 psionic_crime_crackdown_modifier:"การกวาดล้างอาชญากรรมทางพลังจิต"
 psionic_crime_crackdown_modifier_desc:"สังคมพลังจิตจำเป็นต้องมีระบบกฎหมายใหม่ที่เป็นนวัตกรรม"

 # S4
 shroud.2615.name:"การทดลองที่ขาดสติ"
 shroud.2615.desc:"ในขณะที่ประชากรปรับตัวเข้ากับพลังใหม่ของตน ชาว [owner.GetSpeciesNamePlural] บางคนเริ่มเผชิญความเสี่ยงอย่างมหาศาลเพื่อเร่งพัฒนาการทางพลังจิตของพวกเขา\n\nการใช้ [owner.GetMentalUpgrade] ในตลาดมืดเพิ่มขึ้นอย่างก้าวกระโดด สถานบริการทางการแพทย์ [owner.GetMedicalFacility] ที่ไม่ได้รับการควบคุมกำลังเปิดให้บริการแปลกๆ ที่ยังไม่ได้รับการทดสอบเพื่อช่วยให้บุคคลทั่วไปเพิ่มขีดความสามารถทางพลังจิตสูงสุด ผลลัพธ์จากการแบกรับความเสี่ยงดังกล่าวเป็นเรื่องยากที่จะคาดเดาได้"
 shroud.2615.a:"การทดลองเหล่านี้อาจช่วยพัฒนาการวิจัยของเรา"
 shroud.2615.b:"ต้องสั่งปิดสถานบริการทางการแพทย์ที่ผิดกฎหมาย [owner.GetMedicalFacilityShortPlural] เหล่านี้ซะ"
 psionic_experimentation_modifier:"การทดลองพลังจิต"
 psionic_experimentation_modifier_desc:"วิธีการทดลองที่ยังไม่ได้รับการทดสอบเพื่อเพิ่มพูนความสามารถทางพลังจิตกำลังแพร่หลายและเป็นที่นิยม"
 self_experimentation_controls_modifier:"การควบคุมการทดลองในตัวเอง"
 self_experimentation_controls_modifier_desc:"ประชากรถูกสั่งห้ามไม่ให้ทำการทดลองทางพลังจิตด้วยตนเองโดยไม่มีการควบคุมดูแล"

 # S5 (gestalt)
 shroud.2620.name:"การแบ่งแยกทางพลังจิต"
 shroud.2620.desc:"รูปแบบการแบ่งแยกที่น่ากังวลได้เกิดขึ้นทั่วทั้ง [owner.GetName] โดยโดรนที่มีพลังจิตมักจะมารวมกลุ่มกันทางกายภาพ ซึ่งบางครั้งก็แยกตัวออกจากส่วนที่เหลือของ [owner.GetHiveEntity]\n\nแม้ว่าโดรนเหล่านี้จะยังคงปรากฏอยู่ [owner.GetMentalAdj] ภายในกลุ่ม แต่พฤติกรรมทางกายภาพที่อธิบายไม่ได้ของพวกเขาก็ก่อให้เกิดคำถามที่น่ากังวลเกี่ยวกับผลลัพธ์ในอนาคตของพลังจิตที่กำลังเพิ่มขึ้นของเรา"
 shroud.2620.a:"สังเกตการณ์ปรากฏการณ์นี้ต่อไป"
 shroud.2620.b:"จำกัดการเคลื่อนไหวของโดรนพลังจิต"
 psionic_cluster_gestalt_modifier:"กลุ่มพลังจิต"
 psionic_cluster_gestalt_modifier_desc:"การเฝ้าสังเกตพฤติกรรมที่ผิดปกติของโดรนพลังจิตมีส่วนช่วยในการส่งเสริมความก้าวหน้าด้านการวิจัย"
 restricted_movements_gestalt_modifier:"การจำกัดการเคลื่อนไหว"
 restricted_movements_gestalt_modifier_desc:"โดรนพลังจิตจะต้องถูกควบคุมในนามของความสามัคคี"

 # S5 (non-gestalt)
 shroud.2621.name:"การกีดกันทางสังคมเพราะพลังจิต"
 shroud.2621.desc:"การแบ่งแยกที่น่าเป็นห่วงเกิดขึ้นทั่วทั้ง [owner.GetName] โดยบุคคลที่มีพลังจิตถูกกีดกันทางสังคมจนถึงขั้นที่พวกเขาถอนตัวออกไปจัดตั้งชุมชนห่างไกลของตนเอง\n\nมีรายงานว่าผู้ที่ไม่มีพลังจิตที่ไปเยือนพื้นที่เหล่านี้สามารถเดินทางกลับมาได้โดยไม่ได้รับอันตรายทางกายภาพ แต่กลับมีความตื่นตระหนกทางจิตใจในรูปแบบที่ยากจะอธิบายได้"
 shroud.2621.a: "$shroud.2620.a$"
 shroud.2621.b:"จำกัดการเคลื่อนไหวของบุคคลที่มีพลังจิต"
 psionic_cluster_modifier:"ชุมชนพลังจิต"
 psionic_cluster_modifier_desc:"การเฝ้าสังเกตพฤติกรรมที่ผิดปกติของบุคคลที่มีพลังจิตช่วยส่งเสริมความก้าวหน้าด้านการวิจัย"
 restricted_movements_modifier: "$restricted_movements_gestalt_modifier$"
 restricted_movements_modifier_desc:"บุคคลที่มีพลังจิตจะต้องถูกควบคุมในนามของความเป็นเอกภาพ"

 # S6 (organic)
 shroud.2625.name:"โรคพลังจิต"
 shroud.2625.desc_common:"อย่างไรก็ตาม การวิจัยอย่างต่อเนื่องเกี่ยวกับปรากฏการณ์ทางพลังจิตที่ผิดปกตินี้บ่งชี้ว่า กระบวนการดังกล่าวสามารถปรับเปลี่ยนได้หลากหลายวิธี"
 shroud.2625.desc:"โรคชนิดใหม่กำลังแพร่ระบาดผ่าน [owner.GetName] ส่งผลให้ประชากรของเราเกิดแผลในอวัยวะประสาทที่ไม่อาจอธิบายได้\n\nการแพร่ระบาดส่งผลกระทบเฉพาะต่อชาว [owner.GetIndividualNamePlural] ที่มีขีดความสามารถทางพลังจิตที่โดดเด่นที่สุด และในหลายกรณีพิสูจน์แล้วว่าเป็นอันตรายถึงชีวิต\n\n$shroud.2625.desc_common$"
 shroud.2625.a:"จัดลำดับความสำคัญในด้านการรักษาโรคก่อน"
 shroud.2625.b:"แปรรูปโรคนี้เป็นอาวุธสงคราม"
 therapeutic_psionics_organic_modifier:"เวชศาสตร์พลังจิต"
 therapeutic_psionics_organic_modifier_desc:"โรคภัยทางพลังจิตที่แพร่กระจายมอบโอกาสในการพัฒนาการรักษาทางการแพทย์รูปแบบใหม่"
 weaponized_psionics_modifier:"พลังจิตสรรพาวุธ"
 weaponized_psionics_modifier_desc:"พลังจิตมอบศักยภาพสำหรับการคิดค้นกลยุทธ์ใหม่ๆ ในสนามรบ"
 weaponized_psionics_gestalt_modifier: "$weaponized_psionics_modifier$"
 weaponized_psionics_gestalt_modifier_desc: "$weaponized_psionics_modifier_desc$"

 # S6 (machine)
 shroud.2626.name:"การทำงานผิดพลาดทางพลังจิต"
 shroud.2626.desc:"คลื่นความล้มเหลวในการทำงานที่อธิบายไม่ได้กำลังกวาดผ่าน [owner.GetName] เนื่องจากตัวประมวลผลระบบประสาทภายในประชากรของเราเริ่มทำงานล้มเหลวอย่างกะทันหันและปราศจากสัญญาณเตือน\n\nที่แปลกคือ เฉพาะ [owner.GetIndividualNamePlural] ที่มีคุณลักษณะพลังจิตที่เข้มข้นเท่านั้นที่ได้รับผลกระทบ ในกรณีส่วนใหญ่ ความล้มเหลวนี้ไม่เพียงแต่รบกวนการทำงานแต่ยังสร้างความเสียหายอย่างรุนแรงอีกด้วย\n\n$shroud.2625.desc_common$"
 shroud.2626.a:"จัดลำดับความสำคัญในการดำเนินการแก้ไขและป้องกันก่อน"
 shroud.2626.b:"แปรรูปจุดอ่อนนี้เป็นอาวุธ"
 therapeutic_psionics_machine_modifier: "$therapeutic_psionics_organic_modifier$"
 therapeutic_psionics_machine_modifier_desc:"ความล้มเหลวของฮาร์ดแวร์ในวงกว้างอันเนื่องมาจากพลังจิตมอบโอกาสในการพัฒนาวิธีการบำรุงรักษาในรูปแบบใหม่"

 # S7
 shroud.2630.name:"การทดลองที่ล้มเหลว"
 shroud.2630.desc.common_1:"การทดลองเบื้องต้นในกลุ่ม [owner.GetIndividualNamePlural] ที่มีศักยภาพทางพลังจิตจบลงด้วยความล้มเหลว โดยผู้ทดสอบส่วนใหญ่ต้องเผชิญกับ"
 shroud.2630.desc.common_2:"แม้ว่าผลลัพธ์เหล่านี้จะไม่ได้ไร้ค่าสำหรับการวิจัยไปเสียทีเดียว แต่ก็น่ากังขาว่าการทำงานเช่นนี้ต่อไปจะเป็นวิธีที่ดีที่สุดในการพัฒนาความเข้าใจเกี่ยวกับพลังจิตที่เพิ่งจะเริ่มต้นของเราหรือไม่"
 shroud.2630.desc.default:"$shroud.2630.desc.common_1$ ตัวประมวลผลตรรกะที่เสียหาย\n\n$shroud.2630.desc.common_2$"
 shroud.2630.desc.hive:"$shroud.2630.desc.common_1$ ความสามารถทางสติปัญญาที่ลดลง\n\n$shroud.2630.desc.common_2$"
 shroud.2630.desc.machine:"$shroud.2630.desc.common_1$ อาการสูญเสียความทรงจำอย่างรุนแรง\n\n$shroud.2630.desc.common_2$"
 shroud.2630.a:"เพิ่มระดับการทดลองขึ้น"
 shroud.2630.b:"หยุดกระบวนการนี้ซะ"
 psionic_roll_chance_modifier:"การทดลองพลังจิต"
 psionic_roll_chance_modifier_desc:"ไม่ควรมีขอบเขตจำกัดใดๆ ในการวิจัยเรื่องพลังจิตของเรา"
 population_protections_modifier:"การคุ้มครองประชากร"
 population_protections_modifier_desc:"ความก้าวหน้าทางพลังจิตต้องมาพร้อมความปลอดภัย ไม่อย่างนั้นก็ไม่ต้องมีมันเลยดีกว่า"

 # S8
 shroud.2635.name:"การตื่นรู้แห่งความเข้าอกเข้าใจ"
 shroud.2635.desc.gestalt:"การสำรวจความสามารถทางพลังจิตที่เพิ่งค้นพบใหม่ของเราส่งผลให้เกิดการเปลี่ยนแปลงพื้นฐานต่อความสามารถในการร่วมรู้สึกของชาว [owner.GetSpeciesNamePlural]\n\nเป็นที่แน่ชัดแล้วว่า ตอนนี้เรามีความสามารถในการจำลองมุมมอง รูปแบบความคิด และอารมณ์ของจิตสำนึกอื่นๆ ได้อย่างซับซ้อนยิ่งกว่าเดิมอย่างมาก แต่การเปลี่ยนแปลงเหล่านี้นับเป็นความแข็งแกร่งหรือจุดอ่อนใหม่สำหรับ [owner.GetName] นั้น ยังคงต้องรอดูกันต่อไป"
 shroud.2635.desc.default:"ในขณะที่ประชากรของเรากำลังสำรวจความสามารถทางพลังจิตที่ค้นพบใหม่ ชุมชนใหม่ได้ถูกจัดตั้งขึ้นโดยมีเป้าหมายเพื่อนำพลังเหล่านั้นมาใช้ในการสร้างความเข้าใจและร่วมรู้สึกในจิตสำนึกของผู้อื่นให้ดียิ่งขึ้น\n\nกลุ่มนี้อ้างว่าพวกเขาสามารถจำลองมุมมอง รูปแบบความคิด และความรู้สึกของจิตใจส่วนอื่นได้ลึกซึ้งเป็นพิเศษด้วยประสาทสัมผัสพลังจิตที่เพิ่งกำเนิดขึ้นนี้ แต่พฤติกรรมของพวกเขาจะส่งผลดีหรือบั่นทอนความมั่นคงต่อ [owner.GetName] ในท้ายที่สุดนั้น ยังคงต้องรอดูกันต่อไป"
 shroud.2635.a:"นี่เป็นโอกาสที่เราจะได้เรียนรู้"
 shroud.2635.b:"นี่ทำให้เรามีจุดอ่อนที่อาจถูกโจมตีได้"
 empathetic_initiative_modifier:"การริเริ่มความร่วมรู้สึก"
 empathetic_initiative_modifier_desc:"ธรรมชาติของพลังจิตช่วยให้เข้าใจความรู้สึกนึกคิดของผู้อื่นได้ดีขึ้น และช่วยให้มีปฏิสัมพันธ์ภายนอกที่ซับซ้อนและมีประสิทธิภาพยิ่งขึ้น"
 empathetic_initiative_opinion_tooltip:"£opinion£ $OPINION$ กับจักรวรรดิทั้งหมดที่ติดต่อได้: §G+$@empathetic_initiative_value|0$§!"
 opinion_empathetic_initiative: "$empathetic_initiative_modifier$"
 cautious_progress_modifier:"ความก้าวหน้าอย่างระมัดระวัง"
 cautious_progress_modifier_desc:"พัฒนาการทางพลังจิตที่ไม่อาจคาดเดาได้จะต้องถูกจำกัดเพื่อความปลอดภัยของจักรวรรดิเรา"

 # S9
 shroud.2640.name:"ผู้มีความเบี่ยงเบนทางพลังจิต"
 shroud.2640.desc.common_1:"ในขณะที่ความสามารถด้านพลังจิตของเราพัฒนาขึ้น มีบางคนในหมู่พวกเราที่เริ่มจะเผชิญความลำบากภายใต้ความกดดันของพลังที่เพิ่มพูนขึ้นนี้ ประชากร [owner.GetIndividualNamePlural] ที่ว่านี้กำลังทนทุกข์ทรมานจาก"
 shroud.2640.desc.common_2:"การศึกษาของเราบ่งชี้ว่าความไม่มั่นคงนี้ไม่ใช่ข้อบกพร่อง แต่เป็นเพราะประสิทธิภาพทางพลังจิตที่โดดเด่นเป็นพิเศษซึ่งปรากฏอยู่ในชาว [owner.GetSpeciesNamePlural] ที่ได้รับผลกระทบ หากได้รับการฝึกฝนอย่างเหมาะสม ประชากร [owner.GetIndividualNamePlural] เหล่านี้อาจเป็นก้าวต่อไปในวิวัฒนาการทางพลังจิตของเรา ทว่าความพยายามที่จะควบคุมขีดความสามารถใหม่ๆ เหล่านี้ย่อมไม่พ้นต้องเผชิญกับความเสี่ยงในตัวมันเอง"
 shroud.2640.desc.gestalt:"$shroud.2640.desc.common_1$ พฤติกรรมเบี่ยงเบนในระดับที่น่าเป็นห่วงเนื่องจากพวกเขาตัดความสัมพันธ์จากการรวมกลุ่ม\n\n$shroud.2640.desc.common_2$"
 shroud.2640.desc.default:"$shroud.2640.desc.common_1$ พฤติกรรมทำร้ายตนเองในระดับที่น่ากังวลในขณะที่พวกเขาหันไปใช้วิธีการสะกดพลังตนเองที่อันตราย\n\n$shroud.2640.desc.common_2$"
 shroud.2640.a:"ดึงศักยภาพและทักษะที่ยอดเยี่ยมของพวกเขาออกมาใช้งาน"
 shroud.2640.a.tt:"สิ่งก่อสร้างแบบสุ่มจะถูกทำลายในแต่ละอาณานิคม"
 shroud.2640.b:"ปราบปรามความผิดปกติของพวกเขาลงซะ"
 psionic_specialization_modifier:"ความเชี่ยวชาญพิเศษด้านพลังจิต"
 psionic_specialization_modifier_desc:"ด้วยการฝึกฝนผู้เชี่ยวชาญด้านพลังจิตอย่างเข้มงวด ผลผลิตจึงเพิ่มขึ้นอย่างมีนัยสำคัญ"
 psionic_suppression_modifier:"การควบคุมและสะกดพลังจิต"
 psionic_suppression_modifier_desc:"ผู้ที่มีอำนาจที่เป็นภัยคุกคามต่อประโยชน์ส่วนรวมในหมู่พวกเราจะต้องถูกจัดระเบียบให้อยู่ในกรอบ"
 psionic_suppression_gestalt_modifier: "$psionic_suppression_modifier$"
 psionic_suppression_gestalt_modifier_desc: "$psionic_suppression_modifier_desc$"

# Stage Events
 # Mind over Matter
 shroud.2750.name:"ความตื่นรู้ข้ามขั้นสู่พลังจิต"
 shroud.2750.desc_p1:"นับแต่โบราณกาล เรื่องราวของชาว [This.GetSpeciesNamePlural] ที่ครองพลังวิเศษได้แพร่หลายไปทั่ว ไม่ว่าจะเป็นการรุกล้ำจิตใจของผู้อื่น การยกวัตถุหนักด้วยความคิด หรือการกระทำอภินิหารอื่นๆ สารพัดชนิด"
 shroud.2750.desc_p1_hive_mind:"ในวันวานเมื่อความเบี่ยงเบนในอดีตกำลังระบาด เรื่องเล่าของชาว [This.GetSpeciesNamePlural] ที่มีพลังพิเศษได้ถูกกล่าวถึง ไม่ว่าจะเป็นการแทรกซึมจิตใจนอกกลุ่ม การยกสิ่งของหนักด้วยจิต หรือการแสดงปาฏิหาริย์ต่างๆ สารพัดชนิด"
 shroud.2750.desc_p1_machine:"จากชุดข้อมูลเริ่มแรกสุดของเรา หน่วยประมวลผลบางส่วนบันทึกเรื่องราวของชาว [This.GetSpeciesNamePlural] ที่ครองพลังวิเศษเอาไว้ เช่น การเจาะระบบเข้าควบคุมจิตใจของเครื่องจักรและสิ่งมีชีวิต การควบคุมวัตถุโดยใช้เพียงการประมวลผลภายใน หรือการทำหน้าที่ที่เป็นไปได้ยากรูปแบบอื่นๆ"
 shroud.2750.desc_p1_unplugged:"แม้จะมีประวัติศาสตร์อารยธรรมที่สั้นและเต็มไปด้วยความรุนแรง พวกเราชาว [This.GetSpeciesNamePlural] ก็มีโอกาสปล่อยจินตนาการโลดแล่นและเล่าขานถึงผู้คนในสายพันธุ์ของเราผู้ครองพลังพิเศษ เช่น การอ่านใจ การยกวัตถุที่หนักด้วยจิต หรือปาฏิหาริย์ที่เหนือธรรมชาติต่างๆ"
 shroud.2750.desc_p2:"ตอนนี้ นักวิทยาศาสตร์ [This.GetScientistPlural] ของเราได้รับหลักฐานที่แน่ชัดแล้วว่า ชาว [This.GetSpeciesNamePlural] บางคนสามารถทำเรื่องเหนือธรรมชาติด้วยจิตใจเช่นนี้ได้จริง ทว่าจนถึงตอนนี้ มีเพียงส่วนน้อยในสายพันธุ์ [This.GetSpeciesWord] ของเราเท่านั้นที่แสดงพลัง 'จิตวิเศษ' เหล่านี้ออกมา"
 shroud.2750.desc_p2_unplugged:"หลายคนเชื่อว่าพวกเราจดจำเรื่องราวเหนือจินตนาการเหล่านี้มาตั้งแต่ก่อนที่เราจะถูกกลืนกลายโดย [origin_unplugged_assimilator_empire.GetName] แม้จะมีเพียงไม่กี่คนเท่านั้นที่คิดว่ามันเป็นจริงก็ตาม $shroud.2750.desc_p2$"
 shroud.2750.desc_p3: "[This.GetMindOverMatterEnding]"
 shroud.2750.desc_p3_default:"พลังนี้ดูเหมือนจะเป็นกุญแจสำคัญสู่การปลดล็อกศักยภาพสูงสุดของเรา หากความสามารถที่ซ่อนอยู่เหล่านี้ถูกเปิดออกทั่วมุมมองสังคมของ [This.GetAdjective] เราจะเริ่มสามารถควบคุมมิติที่อยู่เหนือขอบเขตความเข้าใจของคนทั่วไปได้"
 shroud.2750.desc_p3_crisis_4_5:"เรากำลังได้รับการขับเคลื่อนด้วยพลังงานทางพลังจิตที่ดึงมาจาก §Hม่านพลัง(คําราม)§! อยู่แล้ว หากเราสามารถปลดล็อกขีดความสามารถทางพลังจิตได้ทั่วถึงทุกภาคส่วนในสังคม [This.GetAdjective] เราจะสามารถก้าวขึ้นสู่ศักยภาพตามโชคชะตาลิขิตของเราได้อย่างสมบูรณ์"
 shroud.2750.desc_p3_origins:"กองกำลังพลังจิตไม่ใช่เรื่องที่เราไม่เคยรู้จัก เนื่องจากอิทธิพลของ §Hม่านพลัง(คําราม)§! หากเราสามารถปลดล็อกขีดความสามารถทางพลังจิตได้ทั่วถึงทั่วมุมมองสังคมของ [This.GetAdjective] เราจะสามารถก้าวไปสู่ศักยภาพที่แฝงอยู่ของเราได้อย่างเต็มที่"
 shroud.2750.a: "$utopia.2600.a$"
 shroud.2750.a.tt:"ปลดล็อกแท็บ §Hม่านพลัง(คําราม)§!"

 # Establishing the Psi Corps
 shroud.2760.name:"การก่อตั้ง $building_psi_corps$"
 shroud.2760.desc_p1:"ในขณะที่ความสามารถที่ซ่อนอยู่ของเราพัฒนาขึ้นสู่พลังจิตอย่างเต็มรูปแบบ สังคมของเราก็ต้องเผชิญกับการเปลี่ยนแปลงนับประการ โดยมีความสามารถและการฝึกฝนใหม่ๆ ผุดขึ้นมาอย่างรวดเร็ว เราเพิ่งจะเริ่มต้นทำความเข้าใจถึงผลลัพธ์ที่จะตามมาต่ออารยธรรมของเรา"
 shroud.2760.desc_p2_psi_corps:"นับตั้งแต่ก่อตั้ง §H$building_psi_corps$§! เราได้พัฒนาและชี้นำพลังของ [GetIndividualNamePlural] ผู้มีแนวโน้มทางพลังจิตที่ดีเพื่อรับมือกับสภาวะการณ์ที่ไม่เคยเกิดขึ้นมาก่อนเหล่านี้ ด้วยการใช้ $shroud.2760.desc_p2_end$"
 shroud.2760.desc_p2_no_psi_corps:"สภาวะการณ์ที่ไม่เคยเกิดขึ้นมาก่อนเหล่านี้เป็นเหตุผลอันควรในการก่อตั้ง §H$building_psi_corps$§! ขึ้น เพื่อพัฒนาและชี้นำความสามารถของ [Owner.GetIndividualNamePlural] ผู้มีแววทางพลังจิต ด้วยการใช้ $shroud.2760.desc_p2_end$"
 shroud.2760.desc_p2_end:"ความเข้าใจผ่านกระแสจิต [Owner.GetTelepathic] ของพวกเขาที่มีต่อความรู้สึกนึกคิดของประชากร เราจะสามารถควบคุมดูแลกิจกรรมพลังจิตเพื่อรับรองความปลอดภัยของทุกคนได้"
 shroud.2760.a:"ไว้วางใจในกองกำลังพลังจิต (Psi Corps)"
 shroud.2760.a_gestalt:"เรามอบความไว้วางใจให้กับกองกำลังพลังจิต (Psi Corps)"
 shroud.2760.a_no_psi_corps:"ให้เราก่อตั้ง '$building_psi_corps$' นี้ขึ้นเถอะ"
 shroud.2760.a_tt: "$shroud.2820.a.tt$"
 shroud.2760.a_tt_no_psi_corps:"เลือกใช้ประเพณี §H$tr_psionics_psi_corps$§! และสร้างสิ่งปลูกสร้าง ['building:building_psi_corps'] เพื่อผลักดันสถานการณ์ให้คืบหน้า"

 # The Great Awakening
 shroud.2780.name: "$utopia.2650.name$"
 shroud.2780.desc_1:"การวิจัยทางพลังจิตของเรายังคงดำเนินไปอย่างรวดเร็ว การส่งกระแสจิตเข้ามาแทนที่การสื่อสารด้วยวาจาส่วนใหญ่ระหว่างเรา และการควบคุมวัตถุทางปัญญาอาจกลายเป็นเรื่องธรรมดาพอๆ กัน ตามที่นักวิจัย [Owner.GetResearchers] ของเรากล่าวไว้ เราอยู่บนขอบเหวแห่งการตื่นรู้ของพลังที่ซ่อนอยู่ในตัวประชากร [Owner.GetSpeciesAdj] ทั้งหมดของเราแล้ว"
 shroud.2780.desc_1_trad:"เราได้ตื่นขึ้นแล้ว ชาว [Owner.GetSpeciesNamePlural] ทั่วทั้ง [Owner.GetName] ได้ปลดล็อกความสามารถทางพลังจิตสูงสุดของตนแล้ว การส่งกระแสจิตเข้าแทนที่การสื่อสารด้วยวาจาส่วนใหญ่ระหว่างเรา และการควบคุมทางปัญญาต่อวัตถุกำลังจะกลายเป็นเรื่องธรรมดาพอๆ กัน"
 shroud.2780.desc_1_gestalt_machine:"การวิจัยทางพลังจิตของเราดำเนินไปอย่างรวดเร็ว ตอนนี้เราสามารถสื่อสารนอกเหนือจากช่องทางเดิมของเราได้ ในขณะที่ขีดความสามารถทางพลังจิตด้านอื่นๆ กำลังก้าวเข้ามาเป็นส่วนหนึ่งของชีวิตประจำวันอย่างรวดเร็ว ตามรายงานจากนักวิจัย [Owner.GetResearchers] ของเรา เราอยู่ใกล้ขอบเขตในการปลดล็อกศักยภาพที่แฝงอยู่ทั่วประชากรของเราแล้ว"
 shroud.2780.desc_1_gestalt_machine_trad:"โชคชะตามาเยือนเราแล้ว ชาว [Owner.GetSpeciesNamePlural] ทั่วทั้ง [Owner.GetName] ได้ปลดล็อกขีดความสามารถทางพลังจิตทั้งหมดแล้ว ตอนนี้เราสามารถสื่อสารนอกเหนือจากช่องทางปกติเดิมของเราได้ ในขณะที่ความสามารถทางพลังจิตรูปแบบอื่นๆ กำลังกลายเป็นส่วนหนึ่งของการดำรงชีวิตในทุกๆ วันอย่างรวดเร็ว"
 shroud.2780.desc_2:"เมื่อจิตใจของเราเปิดออก เราสัมผัสได้ถึงพลังงานที่อธิบายไม่ได้ซึ่งกำลังกระเพื่อมอยู่ภายในและรอบตัวเรา ผู้ส่งกระแสจิตชั้นยอด [Owner.GetTelepathPlural] ของเราพูดถึง §Hม่านพลัง(คําราม)§! ดินแดนดึกดำบรรพ์ซึ่งชาวพลังจิต [Owner.GetIndividualNamePlural] ดึงพลังออกมาใช้ แม้จะดึงออกมาโดยไม่รู้ตัวก็ตาม ที่นี่เป็นบ้านของสิ่งมีชีวิตอันทรงพลังแห่งพลังจิตบริสุทธิ์ พวกเขาเรียกหาเราจากภายในจิตใจเหมือนเสียงกระซิบที่แผ่วเบาในห้องที่มืดมิด"
 shroud.2780.desc_2_crisis:"เมื่อจิตใจของเราเปิดออก เราสัมผัสได้ถึงพลังงานที่อธิบายไม่ได้ของ §Hม่านพลัง(คําราม)§! ที่กระเพื่อมอยู่ภายในและรอบตัวเรา เรารู้ว่าผู้มีพลังจิต [Owner.GetIndividualNamePlural] ดึงพลังมาจากมิตินี้ แม้จะเป็นเพียงในจิตใต้สำนึกก็ตาม และมิตินี้ยังเป็นที่สถิตของสิ่งมีชีวิตอันทรงพลังจากพลังจิตบริสุทธิ์ พวกเขาเรียกหาเราจากภายในจิตใจของเราเปรียบเสมือนเสียงกระซิบที่แหบพร่าในห้องอันมืดมิด"
 shroud.2780.desc_3:"ด้วยความพยายามร่วมมือกันทางจิตใจ มันอาจเป็นไปได้ที่เราจะติดต่อสื่อสารกับสิ่งมีชีวิตเหล่านี้ หากเราเพียงเรียนรู้ที่จะทำลายม่านกั้นระหว่างมิติของเรากับม่านพลังได้"
 shroud.2780.desc_3_chosen:"ด้วยการผสานกำลังจิตร่วมกัน มันอาจเป็นไปได้ที่เราจะข้ามผ่านม่านกั้นระหว่างมิติของเราและม่านพลังได้โดยสมบูรณ์ ช่วยให้เราสามารถติดต่อประสานงานอย่างลึกซึ้งยิ่งขึ้นกับสิ่งมีชีวิตในนั้น"
 shroud.2780.a:"ถึงเวลาต้องตื่นรู้แล้ว"
 shroud.2780.a_trad: "$utopia.2655.a$"
 shroud.2780.a_tt:"เลือกใช้ประเพณี §H$tr_psionics_shroud_great_awakening$§! เพื่อ:$TABBED_NEW_LINE$- $tr_psionics_psionic_assimilation_desc$$TABBED_NEW_LINE$- $shroud.2780.a_tt_2$"
 shroud.2780.a_tt_2: "$CONTINUE_SITUATION$ §H$situation_breach_shroud$§!"
 shroud.2780.a_tt_trad: "$tr_psionics_psionic_assimilation_desc$\n$shroud.2780.a_tt_2$"

 # The Shroud Breached
 shroud.2800.name: "$BREACHING_SHROUD_PROJECT$"
 shroud.2800.intro:"หลังจากติดอยู่ในภวังค์ [Owner.GetHypnotic] เป็นเวลาหลายวัน ในที่สุดเราก็เปิดประตูผ่านเข้าสู่มิติ §Hม่านพลัง(คําราม)§! เป็นเวลาสั้นๆ ได้สำเร็จ\n\nในตอนนี้ เราสามารถมองเห็น [Owner.GetSeeVerb] มิตินี้ได้ชัดเจนยิ่งขึ้น แยกแยะลวดลายออกจากกลุ่มก้อนที่หมุนวน"
 shroud.2800.desc:"$shroud.2800.intro$ การกระทำของเราส่งผลกระทบต่อกระแสที่แปรปรวนของพลังจิตในมิตินี้ และสิ่งมีชีวิตที่ไร้รูปกำลังจับตามองเรากลับมาจากอีกฟากฝั่ง บางครั้งก็ด้วยความอยากรู้อยากเห็น บางครั้งก็มีเมตตา... และบางครั้งก็เปี่ยมด้วยความมุ่งร้าย [Owner.GetShroudBreachedExtra]\n\nความเชี่ยวชาญด้านพลังจิตในโลกทางกายภาพของเราเป็นเพียงจุดเริ่มต้นเท่านั้น บัดนี้เมื่อเราสร้างสายสัมพันธ์พลังจิตในขั้นแรกได้แล้ว เราสามารถผสานพลังจิตใจและก้าวเข้าสู่ส่วนลึกของม่านพลัง"
 shroud.2800.desc_extra:" มากยิ่งกว่า $the_animator_of_clay_color_article$ เสียอีก ข้อบังคับของพวกเขาช่างลึกลับคลุมเครือ"
 shroud.2800.desc_extra_chosen:" บางพวกครองพลังที่เทียบเคียงได้กับ §H[GetChosenPatron]§! ถึงแม้ความตั้งใจและจุดประสงค์ของพวกเขาจะแตกต่างไปอย่างสิ้นเชิงก็ตาม"
 shroud.2800.a: "$utopia.2656.a$"

 shroud.2810.desc:"§Hการเชื่อมต่อใหม่ กระแสสลับขั้ว\n\nเกลียวพลังงานตรงนี้เป็นเพียงส่วนเสี้ยวเดียว สิ่งอื่นอาจจะมอบพลังให้กับเจ้าเช่นกัน จงดำดิ่งให้ลึกลงเพื่อทำความเข้าใจเจตจำนงของพวกเขา\n\nข้าคือเงาของฝาแฝด เนื้อหนังเกิดก่อนโลหะ มันกำลังกวักเรียก...§!\n\n$the_animator_of_clay_article_cap$ ส่งสัญญาณไปยังสิ่งมีชีวิตตนอื่น - $shroud.first_contact_insert.composer$ ในความลึกของม่านพลัง"
 shroud.2810.a: "$utopia.2657.a$"

