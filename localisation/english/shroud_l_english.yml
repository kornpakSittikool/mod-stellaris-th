 bliss_accord_tt:"ได้รับความสามารถในการอัปเกรดดาวตากอากาศ (§Y$col_resort$§!) กลายเป็นดาวสรวงสวรรค์โลกีย์สำราญ (§Y$col_pleasure$§!) ซึ่งจะเปิดโอกาสให้จัดสร้าง §Hปูชนียสถาน(ช่อง)§! และหน่วยวิเคราะห์พลังจิตวิญญาณ ['building:building_psi_corps'] และช่วยพัฒนาค่าปริมาณมูลค่าการค้าขายเชิงพาณิชย์ (§Y$i_trade_value$§!) ขึ้นอีก §G5%§!\nปลดล็อกสิ่งปลูกสร้าง (§Y$BUILDING$§!): ['building:building_instrument_sanctum']"
 bliss_accord_gestalt_tt:"ปลดล็อกสิ่งปลูกสร้าง (§Y$BUILDING$§!): ['building:building_instrument_sanctum']"

 shroud.4862.title:"§H[From.GetName]§! ได้รับการแปรสภาพเปลี่ยนโฉม"
 shroud.4862.shared:"[GetTelepathPlural] ของเราเรียกร้องอานุภาพพลังงานจากผู้อุปถัมภ์ และมันตอบรับกลับคืนมาด้วยความอุดมสมบูรณ์ยิ่ง"
 shroud.4862.desc:"$shroud.4862.shared$ $the_composer_of_strands_color_article_cap$ ได้เข้าช่วยแปรสภาพดวงดาว §H[From.GetName]§! เปลี่ยนรูปไปเป็นดาวเคราะห์ดินแดนสรวงสวรรค์กาเอีย ($pc_gaia$) ทำให้มันกลายเป็นพื้นที่อยู่อาศัยในอุดมคติของชาว [Root.GetSpeciesAdj]"
 shroud.4862.a: "$INCREDIBLE$"
 shroud.4862.a.tooltip:"ดาวเคราะห์ §H[From.GetName]§! ได้รับการปรับสภาพเปลี่ยนไปเป็นดาวสรวงสวรรค์ §H$pc_gaia$§! เรียบร้อย"

 shroud.4890.title:"อานุภาพแห่งปัญญาหยั่งรู้ข้ามกาลเวลา"
 shroud.4890.desc:"[GetTelepathPlural] ของเราเรียกร้องอานุภาพพลังงานจากผู้อุปถัมภ์ และมันกระซิบสุ้มเสียงก้องเสนอข้อตกลง $whisperers_in_the_void_color_article_cap$ เสนอปรับสร้างดวงดาวเคราะห์หนึ่งดวงของเราใหม่ให้เป็นดาวมรดกตกทอดโบราณ ($pc_relic$) เราเพียงต้องร่วมเลือกทิศทางตัดสินใจ"
 shroud.4890.a:"ดาวเคราะห์ §H[event_target:hindsight_planet_candidate_1.GetName]§!"
 shroud.4890.b:"ดาวเคราะห์ §H[event_target:hindsight_planet_candidate_2.GetName]§!"
 shroud.4890.c:"ดาวเคราะห์ §H[event_target:hindsight_planet_candidate_3.GetName]§!"
 shroud.4890.d:"ดาวเคราะห์ §H[event_target:hindsight_planet_candidate_4.GetName]§!"

 leader_trait_whispering_mind:"จิตวิญญาณผู้กระซิบ"
 leader_trait_whispering_mind_desc:"จิตใจนึกคิดของผู้นำผู้นี้เต็มไปด้วยสุ้มเสียงกระซิบก้องสั่นสะเทือนใจ ซึ่งแต่ละเสียงมาพร้อมเจตนาเฉพาะเจาะจง พวกเขาเชื่อมโยงประสาทสัมผัสไม่ได้เจอกับตัวตนร่างเดียว ทว่าเจอกับตัวตนเป็นล้านร่าง"

 knowledge_accord_tt:"ผู้นำมีโอกาสได้รับการเรียนรู้สลักจดจำตราคุณลักษณะคุณลักษณะพิเศษ §Y$leader_trait_whispering_mind$§!"
 wisdom_accord_tt:"ปลดล็อกสิ่งปลูกสร้าง (§Y$BUILDING$§!): ['building:building_whisperers_sanctum']"

 shroud.4935.title:"การจุติสรรสร้างขึ้นในระบบดาว §H[capital_scope.solar_system.GetName]§!"
 shroud.4935.desc:"$shroud.4862.shared$ $end_of_the_cycle_color_article_cap$ ได้ทำการดึงดาวสรวงสวรรค์สวรรค์เอีย ($pc_gaia$) ให้แสดงตัวขึ้นมาจริงในระบบดาว §H[capital_scope.solar_system.GetName]§! ของเรา เพื่อมอบทิวทัศน์ที่อยู่อาศัยสลักพิเศษอุดมคติของชาว [Root.GetSpeciesAdj] สรวงสวรรค์ที่ปรากฏตัวระยะเวลาสั้นชั่วคราวเพื่อให้เรามีโอกาสดื่มด่ำเฝ้ากอดวันสิ้นโลกปลายทาง"
 shroud.4935.tooltip:"ดาวสรวงสวรรค์ §H$pc_gaia$§! จุติแสดงตัวในระบบดาว [capital_scope.solar_system.GetName]: §H[accord_creation_world.GetName]§!"

 shroud.4970.title:"จุดจบมาถึงแล้ว"
 shroud.4970.desc.1:"กำแพงกั้นช่องระหว่างมิติอันตรธานหายตัวไปชั่วขณะ ส่งคลื่นอานุภาพพลังจิตทั้งหมดของม่านพลังให้ระเบิดทลักหลั่งไหลเข้าสู่มิติความเป็นจริงที่จับต้องได้ภายนอก"
 shroud.4970.desc.2:"สรรพชีวิตที่มีสตินึกคิดทั้งหมด ไม่ว่าจะสายอินทรีย์หรือเครื่องยนต์กลไก โดนกวาดล้างกำจัดสลายสิ้นจนหมด ดาวเคราะห์เคราะห์ทุกดวงกลายเป็นเปลือกดาวรกร้างว่างเปล่า แม้แต่ดวงฤกษ์ดวงดาวเหนือฟ้าก็มอดพลังแสงสุดท้ายดับสิ้นลง\n\nทว่าท่ามกลางห้วงอึดใจสลักวาระสุดท้าย สิ่งที่เรารับรู้ได้มีเพียงสุ้มเสียงก้องในหัวจิตใจเราว่า...\n\n§R"จุดสิ้นสุดของสรรพสิ่งสิ้นสุดทั้งมวล"§!"
 shroud.4970.desc:"ตัวตน $end_of_the_cycle_color_article_cap$ ได้สบโอกาสเข้าครอบงำเหนือกายเราแล้ว\n\nออร่าวันสิ้นโลก ($end_aura$) เขมือบทำลายกาแลกซีจนสิ้นซาก ในขณะที่ระบบดาราสุดท้ายยอมจำนนต่ออานุภาพของมัน การปะทุระเบิดพลังงานครั้งมโหฬารเกินจะวัดประเมินได้ก็ระเบิดขยายตัวขึ้น $shroud.4970.desc.1$\n\n$shroud.4970.desc.2$"
 shroud.4970.a:"ช่างสมบูรณ์แบบเหลือเกิน"
 shroud.4970.a.tooltip.destroyed:"§Yกาแล็กซีถูกทำลายราบคาบแล้ว§!"
 shroud.4970.a.tooltip:"พวกเรายุติรอบวัฏจักรได้สำเร็จ\n\n$shroud.4970.a.tooltip.destroyed$"

 shroud.4971.title: "$shroud.4970.title$"
 shroud.4971.desc.1:"นี่คือจุดจบ"
 shroud.4971.desc.2.1:"ออร่าพลังจิตวินาศภัย (§H$PSIONIC_AURA$§!) ที่ปล่อยแผ่ออกมาโดย"
 shroud.4971.desc.2.2:"ได้แผ่ขยายลุกลามผ่านทั่วกาแลกซี ในขณะที่ระบบดาวดวงสุดท้ายสยบยอมตกเป็นทาสการล่มสลายของออร่า คลื่นแรงระเบิดพลังงานครั้งมโหฬารเกินจะวัดประเมินได้ก็ประจักษ์ขึ้น"
 shroud.4971.desc.2.3:"ราวกระทำส่งมาจากห้วงมิติความเป็นจริงอื่น พลังอานุภาพหายนะระดับทำลายล้างโลกครั้งนี้ได้บดขยี้กวาดทุกอย่างเรียบสิ้น"
 shroud.4971.desc.2.contact_psionic:"$shroud.4971.desc.2.1$ จักรวรรดิ §H[from.GetName]§! $shroud.4971.desc.2.2$ $shroud.4970.desc.1$\n\n$shroud.4970.desc.2$"
 shroud.4971.desc.2.contact_no_psionic:"$shroud.4971.desc.2.1$ จักรวรรดิ §H[from.GetName]§! $shroud.4971.desc.2.2$ $shroud.4971.desc.2.3$\n\n$shroud.4970.desc.2$"
 shroud.4971.desc.2.no_contact_psionic:"$shroud.4971.desc.2.1$ อารยธรรมต่างดาวที่ยังไม่เคยติดต่อประสานงานกันมาก่อน $shroud.4971.desc.2.2$ $shroud.4970.desc.1$\n\n$shroud.4970.desc.2$"
 shroud.4971.desc.2.no_contact_no_psionic:"$shroud.4971.desc.2.1$ อารยธรรมต่างดาวที่ยังไม่เคยติดต่อประสานงานกันมาก่อน $shroud.4971.desc.2.2$ $shroud.4971.desc.2.3$\n\n$shroud.4970.desc.2$"
 shroud.4971.a: "$crisis.6051.a$"

