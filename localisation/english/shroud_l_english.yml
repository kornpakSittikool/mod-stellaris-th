 shroud.5300.b:"เราปรารถนาที่จะ §Yสื่อสาร§! กับสิ่งมีชีวิตอื่นๆ ในม่านพลัง"
 shroud.5300.c:"เราแสวงหาที่จะเพิ่มความ §Yเข้าถึง§! กับผู้อุปถัมภ์(พาโตร)"
 shroud.5300.d:"เราแสวงหา §Yความลับ§! จากม่านพลัง"
 shroud.5300.e:"คุณสามารถบอกอะไรเกี่ยวกับ §Y$PSIONIC_AURA_PLURAL$§! ให้เราฟังได้บ้าง"
 shroud.5300.f:"ช่วยเราเสริมความแข็งแกร่งให้กับ §Y$PSIONIC_AURA$§! ของเรา"
 shroud.5300.g:"เราปรารถนาที่จะขยาย §Yอาณาเขต§! ของผู้อุปถัมภ์ของเรา"

 shroud.5305.desc:"การติดต่อสื่อสารในขอบเขตของ §Hม่านพลัง(คําราม)§! พิสูจน์แล้วว่าเป็นความพยายามที่เต็มไปด้วยอันตรายสำหรับผู้ที่ไม่มีความพร้อม\n\nเราสามารถนำทางคุณผ่านกระบวนการนี้ได้ ทว่าจงจำไว้: สิ่งมีชีวิตที่สิงสถิตอยู่ภายในนั้นอาจเป็นอันตรายอย่างยิ่งยวดหากต้อนรับพวกเขาเข้ามาสู่จิตใจ"
 shroud.5305.desc_all_contacted:"เราได้มาถึงขีดจำกัดความสามารถที่จะช่วยเหลือคุณในด้านนี้แล้ว ไม่มีสิ่งมีชีวิตอื่นๆ ที่เราสามารถช่วยนำจิตใจของคุณไปติดต่อได้อีก\n\nเราขอชื่นชมในความพยายามของคุณ... น้อยคนนักจะดำดิ่งลึกเข้าไปในดินแดนของ §Hม่านพลัง(คําราม)§! และยังรักษาความปกติของสติปัญญาเอาไว้ได้เช่นนี้"
 shroud.5305.b:"เราสามารถสนับสนุนความพยายามนี้ด้วย §Y$sr_zro$§!"
 shroud.5305.c:"เราสามารถสนับสนุนความพยายามนี้ด้วย §Y$astral_threads$§!"
 shroudwalker_contact_patron_cooldown_tt:"§Rเราต้องรอจนกระทั่งถึง §Y[This.shroudwalker_contact_patron_cooldown_timer]§!§!"

 shroud.5310.desc:"ยิ่งคุณเข้าถึงเจตจำนงของ §Hม่านพลัง(คําราม)§! ลึกซึ้งเพียงใด จิตใจของคุณก็จะยิ่งมีพลังแข็งแกร่งขึ้นเพียงนั้น\n\nสิ่งมีชีวิตตนใดที่คุณแสวงหาเพื่อที่จะเพิ่มพูนความเชื่อมโยงด้วย?"
 shroudwalker_attune_patron_cooldown_tt:"§Rเราต้องรอจนกว่าจะถึง §Y[This.shroudwalker_attune_patron_cooldown_timer]§!§!"

 shroud.5315.desc:"โอ้ ใช่แล้ว... §Hม่านพลัง(คําราม)§! มันล้นไปด้วยความลับที่ซ่อนอยู่ลึกใต้ชั้นม่านแห่งความคิดและฝัน หากคนผู้นั้นรู้วิธีตามหา\n\nเราสามารถนำทางคุณไปยังข้อมูลเชิงลึกที่เราได้ค้นพบเท่านั้น จากจุดนั้น เทคโนโลยีใหม่ๆ อันน่าเกรงขามอาจเบ่งบานขึ้นมา แต่เส้นทางนี้มีเพียงคุณที่จะต้องเดินต่อไปเอง\n\nขอจงรับรู้ไว้: กลุ่มคนส่งกระแสจิตของเราต้องทุ่มเทเพื่อภารกิจนี้ทั้งหมด สิ่งใดก็ตามที่อยู่นอกเหนือการชี้นำของพวกเขา... ก็ไม่ใช่สิ่งที่เราจะสามารถควบคุมได้"
 shroud.5315.b: "$shroud.5305.b$"
 shroud.5315.c: "$shroud.5305.c$"
 shroud.5315.trigger_failed:"§R[event_target:shroudwalker_enclave_country.GetName] ไม่มีสิ่งใดให้ค้นพบเพิ่มเติมในประเด็นนี้แล้ว§!"
 shroudwalker_delving_ritual_cooldown_tt:"§Rกลุ่มคนส่งกระแสจิตต้องการเวลาฟื้นตัว พวกเขาจะไม่สามารถประกอบพิธีกรรมดำดิ่งทางจิตได้จนกว่าจะถึง §Y[This.shroudwalker_delving_ritual_cooldown_timer]§!§!"

 shroud.5318.desc:"§Hม่านพลัง(คําราม)§! พิสูจน์อีกครั้งว่าไม่มีเรื่องบังเอิญใดๆ\n\nข้อมูลเชิงลึกที่สภาของเรามองหาให้คุณนั้นได้รับการค้นพบผ่านความพยายามในการดำดิ่งทางจิตของคุณเอง แม้เราจะขอชื่นชมความตั้งใจของคุณ แต่เราไม่สามารถช่วยอะไรได้เพิ่มเติมอีกแล้วในเรื่องนี้"

 shroud.5320.desc.none:"ความสามารถในการปลดปล่อยให้ §Hม่านพลัง(คําราม)§! สำแดงผลในโลกทางกายภาพเป็นความลับที่ได้รับการปกป้องอย่างเข้มงวด แม้แต่เราก็ไม่สามารถสอนได้ การจะปลดปล่อย $PSIONIC_AURA$ ของตนออกมาต้องการการเดินทางส่วนบุคคลเข้าไปสู่ดินแดนหลายชั้นของมัน จงเข้าหาและเชื่อมต่อกับสิ่งมีชีวิตที่คุณโปรดปรานให้มากยิ่งขึ้น แล้วความรู้นี้จะแจ่มชัดในใจคุณเอง"
 shroud.5320.desc.aura.intro:"$PSIONIC_AURA$ ของคุณคือผลของการสัมผัสเชื่อมโยงสู่ §Hม่านพลัง(คําราม)§! ที่สำแดงออกมา มันส่งผลกระทบต่อสิ่งต่างๆ รอบตัวและเปี่ยมไปด้วยความตั้งใจ กลุ่มจิตวิเศษของเราสัมผัสถึงรูปแบบออร่าของคุณได้ในขณะที่เราคุยกัน:"
 shroud.5320.desc.aura.outro:"การแผ่พลังออร่าของคุณในปัจจุบันยังคงค่อนข้างจำกัด หากสิ่งมีชีวิตจากในม่านพลังมอบโอกาสในการสร้างพันธสัญญา(เสียงลาก)ให้กับคุณ ความเข้าใจนี้จะแจ่มชัดในใจคุณเอง"
 shroud.5320.desc.aura.eater:"$shroud.5320.desc.aura.intro$ สัมผัสที่ §Hตะกละตะกลาม§!\n\n$shroud.5320.desc.aura.outro$"
 shroud.5320.desc.aura.cradle:"$shroud.5320.desc.aura.intro$ สัมผัสที่ §Hต้อนรับขับสู้§!\n\n$shroud.5320.desc.aura.outro$"
 shroud.5320.desc.aura.instrument:"$shroud.5320.desc.aura.intro$ สัมผัสที่ §Hปล่อยเนื้อปล่อยใจ§!\n\n$shroud.5320.desc.aura.outro$"
 shroud.5320.desc.aura.composer:"$shroud.5320.desc.aura.intro$ สัมผัสที่ §Hดิ้นพล่านสะบัดไหว§!\n\n$shroud.5320.desc.aura.outro$"
 shroud.5320.desc.aura.whisperers:"$shroud.5320.desc.aura.intro$ สัมผัสที่ §Hชาญฉลาดแกมโกง§!\n\n$shroud.5320.desc.aura.outro$"
 shroud.5320.desc.intensified:"เราขอชื่นชมคุณ ความรู้เกี่ยวกับ $PSIONIC_AURA_PLURAL$ ของคุณนั้นเหนือล้ำกว่าเราไปแล้ว\n\nเพียงแค่การปรากฏตัวของคุณ ก็สามารถดึงเอาสัมผัสอันน่าเกรงขามของ §Hม่านพลัง(คําราม)§! ออกมาสู่ความเป็นจริงนี้ ความลับที่คุณครอบครองไว้จะต้องยิ่งใหญ่ขนาดไหนกันนะ..."

 shroud.5325.desc:"การขยายพลังของ §Y$PSIONIC_AURA_PLURAL$§! ต้องใช้สมาธิขั้นสูงอย่างยิ่งในการคงระดับไว้\n\nเรายินดีที่จะช่วยเหลือคุณในประเด็นนี้ แต่เราต้องการการสนับสนุนทรัพยากรเพื่อเป็นพลังงานขับเคลื่อนการทำสมาธิของเรา"
 shroud.5325.zro: "$shroud.5305.b$"
 shroud.5325.thread: "$shroud.5305.c$"
 aura_amplification_cooldown_tt:"§Rกลุ่มคนส่งกระแสจิตต้องการเวลาฟื้นตัว พวกเขาจะไม่สามารถช่วยขยายออร่าของเราได้จนกว่าจะถึง §Y[root.aura_amplification_timer]§!§!"
 aura_amplification_modifier:"การขยายขอบเขตออร่า"
 shroud.5327.desc:"กลุ่มผู้ส่งกระแสจิตของเราได้บรรลุข้อกำหนดในการขยายระดับพลัง §Y$PSIONIC_AURA$§! ของคุณตามสัญญาแล้ว\n\nเพื่อที่เราจะทำสมาธิต่อไปได้ เราจำเป็นต้องได้รับทรัพยากรเพิ่มเติม เรื่องนี้อยู่ในความสนใจของคุณหรือไม่?"
 shroud.5327.a.zro:"เราจะมอบ §H$sr_zro$§! ให้"
 shroud.5327.a.thread:"เราจะมอบ §H$astral_threads$§! ให้"
 shroud.5327.b:"ตอนนี้ยังไม่สะดวก"

 shroud.5330.desc:"อย่างที่คุณทราบ การปลดปล่อย §Y$PSIONIC_AURA$§! ออกมารอบๆ ตัวในระยะใกล้เป็นเรื่องที่ทำได้ง่ายมาก ทว่าการแผ่ออร่าของตนไปยังสถานที่ห่างไกลออกไปนั้นกลับเป็นคนละเรื่องโดยสิ้นเชิง\n\nเราพอจะมีหนทางอยู่...\n\nเทคโนโลยีขั้นสูงและพลังจิตมีความคล้ายคลึงกันมากกว่าที่คิด บางทีสิ่งนี้อาจบ่งชี้ถึงความจริงพื้นฐานบางอย่าง ไม่ว่าจะอย่างไรก็ตาม เรารู้จักอุปกรณ์ชิ้นหนึ่งที่สามารถทำหน้าที่เป็นท่อนำส่งเจตจำนงของคุณได้ เมื่อคุณปรับระดับสติเข้ากับความถี่ของมันแล้ว มันจะทำงานเสมือนสมองเสริมที่ส่งพลังไปได้แม้จะอยู่ห่างไกลกันแสนไกล\n\nการออกแบบของเราสามารถนำไปติดตั้งบนสถานีอวกาศที่เหมาะสมแห่งใดก็ได้ เครื่องจักรนี้อยู่ในความสนใจของคุณหรือไม่?"
 shroud.5330.zro:"เราเสนอ §H$sr_zro$§! ให้ได้"
 shroud.5330.thread:"เราเสนอ §H$astral_threads$§! ให้ได้"

 shroud.5350.desc:"ไม่ใช่เรื่องน่าแปลกสำหรับเราเลยที่คุณถามคำถามนี้ เราจับสัมผัสความสนใจของคุณในเรื่องนี้ได้ และมีความยินดีที่จะช่วยขยายระดับจิตใจของคุณ\n\nเราขอเตือนคุณไว้ก่อน: เมื่อดวงตาของคุณเปิดออกอย่างแท้จริงแล้ว จะมีบางสิ่งที่ไม่อาจลบเลือนออกไปได้ เส้นทางที่คุณเชิญชวนอยู่นี้คือเส้นทางสู่ §Hม่านพลัง(คําราม)§!\n\nเราไม่ได้ยื่นข้อเสนอนนี้อย่างมักง่าย เราเชื่อว่าคุณจะแจ้งให้เราทราบเมื่อพร้อมแล้ว"
 shroud.5350.b:"เราจะจ่ายเงินให้"
 shroud.5350.trigger_failed:"§Rเทคโนโลยีนี้ได้รับการวิจัยไปเรียบร้อยแล้ว§!"

 shroud.5355.desc:"แน่นอน เราตระหนักดีถึงผู้ที่ก้าวข้ามผ่านระหว่างระนาบมิติ นี่เป็นเรื่องที่อันตรายมากเนื่องจากดินแดนทางกายภาพเชื่อมโยงกันในรูปแบบที่แม้แต่เราก็ยังไม่เข้าใจดี\n\nอย่างไรก็ตาม เรายินดีที่จะเปิดทางให้คุณหนึ่งทาง การสั่นคลอนความเสถียรของมิติเวลาและอวกาศเช่นนี้ต้องทำด้วยความรับผิดชอบอย่างสูง ข้อเสนอของเราจึงจำกัดไว้เพียงเท่านี้"
 shroud.5355.b:"จงเปิดเส้นทาง"

 shroud.5375.desc:"คุณกำลังยุ่งเกี่ยวกับพลังงานที่อยู่เหนือความเข้าใจของคุณ!\n\nสิ่งอัปลักษณ์ '§Hตราผนึกม่านพลัง(แมวน้ําร้อน)§!' ที่คุณกำลังจัดสร้างขึ้นมานี้ช่างสร้างความเจ็บปวดทรมานที่จะทนรับ แม้จะอยู่ในระยะห่างไกลขนาดนี้ก็ตาม คุณกำลังทำให้จิตใจที่สว่างไสวที่สุดในกาแล็กซีนี้เผชิญความเสี่ยง จงยุติการสร้างพวกมันในทันที มิฉะนั้นเราจะไม่มีการติดต่อทำข้อตกลงใดๆ กับคุณอีกต่อไป"

