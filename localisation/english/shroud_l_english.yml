 shroud.775.title:"ตัวอย่างงานวิจัยสูญหาย"
 shroud.775.desc:"ข้อผิดพลาดทางธุรการส่งผลให้เกิดการวางตัวอย่างโบราณวัตถุที่มีค่าของเราผิดตำแหน่ง แม้จะมีความพยายามในการค้นหาอย่างกว้างขวาง ทว่ามันดูเหมือนจะสูญหายไปในเขาวงกตของหอสมุดประวัติศาสตร์อัญมณี §H$grand_archive$§! ของเรา หรืออาจถูกส่งไปยังตำแหน่งที่ไม่มีการลงบันทึกข้อมูลไว้\n\nขั้นตอนและระเบียบปฏิบัติในการติดตามตัวอย่างวัตถุจัดแสดงของเรากำลังได้รับการปรับปรุงขนานใหญ่อันเป็นผลลัพธ์จากเหตุการณ์นี้"
