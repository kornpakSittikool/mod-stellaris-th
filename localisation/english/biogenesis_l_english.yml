 menp_cosmo_ship_2_desc_bio: "ด้วยการบิดเบือนความสัมพันธ์ระหว่างอวกาศและเวลา ยานเหล่านี้จึงก้าวข้ามข้อจำกัดปกติ โครงสร้างที่กะทัดรัดของพวกมันซ่อนความสามารถที่ยานที่ปฏิบัติตามกฎฟิสิกส์ทั่วไปไม่มีวันเทียบเคียงได้"
