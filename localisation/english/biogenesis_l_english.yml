 councilor_warden_of_the_citadel_desc: "$TITLE$ คือผู้พิทักษ์ที่แข็งแกร่งของเรา มีหน้าที่ในการเสริมสร้างแนวป้องกัน ดูแลความพร้อมทางทหาร และรับประกันว่าอารยธรรมจะไม่พังทลายต่อภัยคุกคามใดๆ"
