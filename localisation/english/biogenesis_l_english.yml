# Evolutionary Predators Origin #
# Written by Victor Haeggman  #
#################################

 #Origin and Start of Game
 origin_evolutionary_predators: "ผู้ล่าตามวิวัฒนาการ"
 origin_evolutionary_predators_desc: "§Rคำเตือน: บล็อกเส้นทางการเลื่อนระดับทั้งหมด ยกเว้น ['concept_mutation_ascension']§!\n\nเผ่าพันธุ์นี้ตามล่าสิ่งมีชีวิตที่มีเอกลักษณ์ที่สุดเสมอมา ขับเคลื่อนด้วยสัญชาตญาณที่พวกเขาไม่เข้าใจอย่างถ่องแท้ ด้วยความสามารถพิเศษในการผสานรหัสพันธุกรรมของเหยื่อ พวกเขาจึงวิวัฒนาการกลายเป็นผู้ล่าระดับสูงสุดของโลก โดยดูดซับข้อดีทางพันธุกรรมทั้งหมดที่มีอยู่ บัดนี้ ความหิวกระหายได้นำพาพวกเขาไปสู่ดวงดาว"
 origin_tooltip_evolutionary_predators_effects: "- $SPECIES_TRAITS$ ['concept_malleable_genes']\n- สถานการณ์: ['concept_adaptive_evolution']\n- โลกบ้านเกิด: ['concept_genetic_soup']"

 START_SCREEN_EVOLUTIONARY_PREDATORS_BASE: "ชาว [GetSpeciesNamePlural] เป็นผู้ล่าเสมอมา เราแสวงหาเหยื่อในทุกหนแห่งที่พบได้ เผชิญหน้ากับสภาพแวดล้อมที่ท้าทายที่สุดเพื่อลิ้มรสสิ่งใหม่ๆ เมื่อคุณเป็นในสิ่งที่คุณกิน ความพยายามนั้นจะไม่มีวันสูญเปล่า\n\n"
 START_SCREEN_EVOLUTIONARY_PREDATORS_REGULAR: "$START_SCREEN_EVOLUTIONARY_PREDATORS_BASE$เราตระหนักอยู่เสมอว่าเราถูกหล่อหลอมขึ้นจากเนื้อหนังของเหยื่อ—การล่าแต่ละครั้ง การสังหารทุกหน ทำให้เราแข็งแกร่งยิ่งขึ้น\n\nอดีตที่รุนแรงของเราไม่ใช่ภาระแต่เป็นแก่นแท้ของการดำรงอยู่ของเรา ด้วยการขัดเกลาผ่านเลนส์ของวิทยาศาสตร์สมัยใหม่ เราไม่จำเป็นต้องจัดงานเลี้ยงใหญ่เพื่อวิวัฒนาการอีกต่อไป ร่องรอยของสารพันธุกรรมเพียงเล็กน้อยก็เพียงพอที่จะถักทอความแข็งแกร่งเข้ากับตัวเราเอง\n\nความหิวกระหายในวิวัฒนาการยังคงลุกโชนอยู่ในตัวเรา และด้วยรุ่งอรุณแห่ง [GetStartingDrive] เราพร้อมแล้วที่จะไล่ล่าทั่วกาแล็กซีเพื่อดื่มด่ำกับทุกสิ่งที่มันพร้อมจะมอบให้"
 START_SCREEN_EVOLUTIONARY_PREDATORS_HIVE: "$START_SCREEN_EVOLUTIONARY_PREDATORS_BASE$สติปัญญาร่วมของเราเข้าใจถึงศักยภาพทางพันธุกรรมของเรามาโดยตลอด—เราสามารถดูดซับและปรับตัวตามแก่นแท้ของเหยื่อ โดยผสานจุดแข็งของพวกเขาเข้ากับกลุ่มร่วมของเรา\n\nสัญชาตญาณนักล่าในอดีตยังคงหลงเหลืออยู่ แต่บัดนี้มันได้รับการปรับสมดุลและควบคุมแล้ว เราไม่จำเป็นต้องออกล่าเพื่อวิวัฒนาการอีกต่อไป ห้องแล็บของเราสามารถสังเคราะห์สารพันธุกรรมใดๆ และกระจายมันไปทั่วทั้งรังของเราได้อย่างราบรื่น\n\nด้วยการถือกำเนิดของ [GetStartingDrive] เราพร้อมแล้วที่จะแพร่กระจายไปทั่วกาแล็กซีเพื่อลิ้มลองทุกสิ่งที่พร้อมจะมอบให้"
 START_SCREEN_EVOLUTIONARY_PREDATORS_DEVOURING_SWARM: "$START_SCREEN_EVOLUTIONARY_PREDATORS_BASE$หลังจากที่เราได้บริโภคสิ่งมีชีวิตทุกชนิดบนดาว [GetHomeWorldName] ไปจนสิ้นซาก เราจึงตระหนักถึงความเขลาของเรา แล้วเราจะหาการปรับตัวใหม่ๆ ได้อย่างไรจากนี้? เราจึงเงยหน้ามองขึ้นไป\n\nเราคือผู้ล่าขั้นสูงสุด คนอื่นออกล่าเพื่อเอาชีวิตรอด แต่เราออกล่าเพื่อพัฒนาตัวเองให้สมบูรณ์แบบ\n\nด้วยการถือกำเนิดของ [GetStartingDrive] เราพร้อมที่จะออกล่าอีกครั้ง กาแล็กซีช่างกว้างใหญ่และเต็มไปด้วยอาหาร"

 #Traits

 trait_malleable_genes: "ยีนที่แปรสภาพได้"
 trait_malleable_genes_desc: "§Lเผ่าพันธุ์นี้ไม่ได้ยึดติดกับลักษณะและอวัยวะที่ระบุได้ชัดเจนอย่างตายตัวเหมือนเผ่าพันธุ์อื่นๆ ส่วนใหญ่ แต่พวกเขาจะงอกรยางค์ที่ดีที่สุดสำหรับงานนั้นๆ แทน อย่างไรก็ตาม ความไม่เสถียรนี้ก็มีข้อเสียบางประการ§!"
 trait_malleable_genes_cant_modify: "§Rเผ่าพันธุ์ที่มีคุณลักษณะนี้ไม่สามารถดัดแปลงพันธุกรรมได้§!\n$automodding_trait_tooltip_all$ §Y$trait_malleable_genes$§! จะเลือกตัวดัดแปลงจาก ['concept_automodding_malleable']"
 CANNOT_MODIFY_MALLEABLE_GENES_SPECIES: "$TRIGGER_FAIL$พันธุกรรมที่ไม่เสถียรของเผ่าพันธุ์นี้หมายความว่าไม่สามารถดัดแปลงยีนได้"

 concept_malleable_genes: "$trait_malleable_genes$"
 concept_malleable_genes_desc: "$trait_malleable_genes_cant_modify$"
 concept_automodding_malleable: "รายการคุณลักษณะปรับเปลี่ยนอัตโนมัติของยีนที่แปรสภาพได้"
 concept_automodding_malleable_desc: "- ['trait:trait_malleable_minerals']\n- ['trait:trait_malleable_energy']\n- ['trait:trait_malleable_food']\n- ['trait:trait_malleable_research']\n- ['trait:trait_malleable_unity']\n- ['trait:trait_malleable_forge']\n- ['trait:trait_malleable_trade']\n- ['trait:trait_malleable_ameneties']"
 concept_adaptive_evolution: "วิวัฒนาการแบบปรับตัว"
 concept_adaptive_evolution_desc: "สถานการณ์จะดำเนินไปเมื่อดีเอ็นเอของสิ่งมีชีวิตอื่นถูกบริโภค\n§Gเมื่อสำเร็จ:§!\n$t$- เลือกคุณลักษณะเผ่าพันธุ์ใหม่ตามเผ่าพันธุ์ที่เพิ่งบริโภคล่าสุด\n§Yดำเนินหน้าโดย:§!\n$t$- การตั้งอาณานิคมบนดาวเคราะห์ดวงใหม่\n$t$- การกวาดล้างหรือการเลี้ยงดูเผ่าพันธุ์อื่นในฐานะปศุสัตว์\n$t$- การรักษาเผ่าพันธุ์อื่นภายในอาณาจักรของคุณในฐานะทาสหรือในระดับมาตรฐานที่สูงกว่า\n$t$- การจ้างผู้นำต่างดาวในสภาของคุณ\n$t$- การมีรัฐบริวารทางชีวภาพ\n$t$- การทำสัญญาทางการค้าในฐานะเมกะคอร์ป\n$t$- การเผชิญหน้ากับสิ่งมีชีวิตต่างดาวผ่านกิจกรรมต่างๆ"
 concept_genetic_soup: "$genetic_soup$"
 concept_genetic_soup_desc: "$fresh_biosphere_tt$\n\n§L$genetic_soup_desc$§!"

 trait_malleable_minerals: "กรงเล็บแปรสภาพได้"
 trait_malleable_minerals_desc: "§Lด้วยนิ้วที่แข็งปานเพชร การปรับตัวนี้ช่วยให้การสกัดแร่ธาตุทำได้ง่ายขึ้น§!"
 trait_malleable_energy: "ฉนวนแปรสภาพได้"
 trait_malleable_energy_desc: "§Lชั้นฉนวนหนาช่วยป้องกันอุบัติเหตุ โดยเฉพาะอย่างยิ่งในสภาพแวดล้อมที่มีพลังงานสูง§!"
 trait_malleable_food: "คันไถแปรสภาพได้"
 trait_malleable_food_desc: "§Lรยางค์พิเศษที่มีนิ้วแข็งคล้ายพลั่วช่วยเร่งการพรวนดินและเพาะปลูก คันไถที่แปรสภาพได้เหล่านี้สามารถปรับให้เข้ากับสภาพภูมิประเทศแบบต่างๆ และเป็นเครื่องมือที่เหมาะสมกับงานเสมอ§!"
 trait_malleable_research: "เปลือกสมองแปรสภาพได้"
 trait_malleable_research_desc: "§Lแม้ว่าเปลือกสมองส่วนกลางที่โตขึ้นจะทำให้รู้สึกไม่สบายอยู่บ้าง แต่มันก็ช่วยเร่งการแก้ปัญหาและการสร้างนวัตกรรมได้อย่างมหาศาล§!"
 trait_malleable_unity: "อวัยวะรับความรู้สึกแปรสภาพได้"
 trait_malleable_unity_desc: "§Lอวัยวะรับความรู้สึกที่ได้รับการปรับปรุงช่วยให้เข้าใจและเห็นคุณค่าในมุมมองที่หลากหลายได้ลึกซึ้งยิ่งขึ้น ก่อนที่คุณจะรุ่งเรืองได้ คุณต้องเริ่มจากการสังเกตเสียก่อน§!"
 trait_malleable_forge: "หนังด้านแปรสภาพได้"
 trait_malleable_forge_desc: "§Lเมื่อต้องจัดการกับวัสดุที่ร้อนจัดหรือมีฤทธิ์กัดกร่อน ผิวหนังที่หนาเป็นพิเศษนี้จะมีค่าอย่างประเมินไม่ได้§!"
 trait_malleable_trade: "ฟีโรโมนแปรสภาพได้"
 trait_malleable_trade_desc: "§Lฟีโรโมนที่ปรับตัวได้สูงสามารถโน้มน้าวใจได้อย่างน่าทึ่งในระหว่างการเจรจา§!"
 trait_malleable_ameneties: "ช่องเสียงแปรสภาพได้"
 trait_malleable_ameneties_desc: "§Lรูที่ได้รับการปรับแต่งมาเป็นอย่างดีช่วยให้เผ่าพันธุ์นี้สร้างเสียงที่ไพเราะและผ่อนคลายได้ง่ายๆ เพียงแค่เคลื่อนไหวร่างกาย§!"

 #Democratic Effects

 concept_genetic_electorate_effect: "ผลกระทบจากผู้มีสิทธิ์เลือกตั้งทางพันธุกรรม"
 concept_genetic_electorate_effect_desc: "$trait_malleable_imperialist_effect$\n$trait_malleable_isolationist_effect$\n$trait_malleable_progressive_effect$\n$trait_malleable_prosperity_effect$\n$trait_malleable_supremacist_effect$\n$trait_malleable_technologist_effect$\n$trait_malleable_totalitarian_effect$\n$trait_malleable_traditionalist_effect$\n$trait_malleable_xenoist_effect$\n$trait_malleable_manifesti_effect$"
 trait_malleable_imperialist_effect: "ผลกระทบจาก §Yกลุ่มการเมืองที่มีอำนาจนำ§! (ฝ่ายจักรวรรดินิยม):\n$t$$mod_planet_jobs_alloys_produces_mult$: §G+10%§!"
 trait_malleable_isolationist_effect: "ผลกระทบจาก §Yกลุ่มการเมืองที่มีอำนาจนำ§! (ฝ่ายรักสงบ/แยกตัว):\n$t$$mod_planet_jobs_unity_produces_mult$: §G+10%§!"
 trait_malleable_progressive_effect: "ผลกระทบจาก §Yกลุ่มการเมืองที่มีอำนาจนำ§! (ฝ่ายก้าวหน้า):\n$t$£happiness£ ความสุข: §G+10%§!"
 trait_malleable_prosperity_effect: "ผลกระทบจาก §Yกลุ่มการเมืองที่มีอำนาจนำ§! (ฝ่ายความมั่งคั่ง):\n$t$$r_trade$ จากตำแหน่งงาน £job£: §G+20%§!"
 trait_malleable_supremacist_effect: "ผลกระทบจาก §Yกลุ่มการเมืองที่มีอำนาจนำ§! (ฝ่ายอธิปไตย):\n$t$$mod_planet_jobs_specialist_produces_mult$: §G+5%§!\n$t$$mod_planet_jobs_ruler_produces_mult$: §G+5%§!"
 trait_malleable_technologist_effect: "ผลกระทบจาก §Yกลุ่มการเมืองที่มีอำนาจนำ§! (ฝ่ายเทคโนโลยี):\n$t$£research£ แต้มการวิจัยจากตำแหน่งงาน £job£: §G+10%§!"
 trait_malleable_totalitarian_effect: "ผลกระทบจาก §Yกลุ่มการเมืองที่มีอำนาจนำ§! (ฝ่ายเผด็จการ):\n$t$£pop_cat_worker£ $mod_pop_cat_worker_bonus_workforce_mult$: §G+15%§!"
 trait_malleable_traditionalist_effect: "ผลกระทบจาก §Yกลุ่มการเมืองที่มีอำนาจนำ§! (ฝ่ายอนุรักษนิยม):\n$t$£pop£ $MOD_POP_HOUSING_USAGE_ADD$: §G-0.5§!"
 trait_malleable_xenoist_effect: "ผลกระทบจาก §Yกลุ่มการเมืองที่มีอำนาจนำ§! (ฝ่ายผูกมิตรต่างดาว):\n$t$ความสามารถในการอยู่อาศัย §G+15%§!"
 trait_malleable_manifesti_effect: "ผลกระทบจาก §Yกลุ่มการเมืองที่มีอำนาจนำ§! (ฝ่ายมานิเฟสติ):\n$t$£pop£ $MOD_POP_AMENITIES_USAGE_BASE$: §G-1§!"

 #Dictatorial Effects

 trait_ruler_apex_predator: "ผู้ล่าระดับสูงสุด"
 trait_ruler_apex_predator_desc: "ผู้คนที่นิยามตนเองด้วยการล่าตามวิวัฒนาการจะไม่ยอมให้ใครอื่นนอกจากผู้ที่ปรับตัวได้ดีที่สุดมานำทางพวกเขา ผู้ปกครองระดับสูงสุดนี้ไม่เพียงแต่เก็บเกี่ยวจีโนมของศัตรูที่พ่ายแพ้เท่านั้น แต่ยังจัดสรรความเจ้าเล่ห์และความมุ่งมั่นของพวกเขามาด้วย โดยเปลี่ยนทุกชัยชนะให้กลายเป็นก้าวสู่ความเชี่ยวชาญอันสมบูรณ์แบบ"
 trait_ruler_apex_predator_tt: "จะได้รับ ['concept_apex_predator_effects',การเปิดเผยข้อมูล] เพิ่มเติมจาก ['concept_apex_predator_victories',ชัยชนะ]"

 concept_apex_predator_effects: "การเปิดเผยข้อมูลของผู้ล่าระดับสูงสุด"
 concept_apex_predator_effects_desc: "§Yฮิวแมนนอยด์§!: $mod_country_trade_produces_mult$ §G+5%§!\n§Yแมมมาเลียน§!: $MOD_LOGISTIC_GROWTH_MULT$ §G+5%§!\n§Yเรปทิเลียน§!: $MOD_SHIP_SHIELD_HARDENING_ADD$ §G+5%§!\n§Yเอเวียน§!: $MOD_SHIP_EVASION_ADD$ §G5%§!\n§Yอาร์โทรพอยด์§!: $MOD_SHIP_ARMOR_HARDENING_ADD$ §G+5%§!\n§Yมอลลัสคอยด์§!: $MOD_SHIP_SENSOR_RANGE_ADD$ §G+1§!\n§Yฟันกอยด์§!: $mod_country_food_produces_mult$ §G+5%§!\n§Yแพลนทอยด์§!: $mod_country_energy_produces_mult$ §G+5%§!\n§Yลิธอยด์§!: $mod_country_minerals_produces_mult$ §G+5%§!\n§Yเนครอยด์§!: $MOD_PLANET_CRIME_ADD$ §G-10§!\n§Yอะควาติก§!: $MOD_SHIP_HULL_ADD$ §G+100§!\n§Yท็อกซอยด์§!: $mod_country_exotic_gases_produces_mult$ §G+10%§!\n§Yเทอร์โมไฟล์§!: $mod_country_alloys_produces_mult$ §G+5%§!\n§Yเครื่องจักร§!: $mod_country_alloys_produces_mult$ §G+5%§!"

 concept_apex_predator_victories: "ชัยชนะของผู้ล่าระดับสูงสุด"
 concept_apex_predator_victories_desc: "ผู้ล่าระดับสูงสุดจะเติบโตขึ้นเมื่อ:\n$t$ชนะ §Yสงคราม(สงคราม)§!\n$t$§Yปราบปรามสะกด(ถอนหายใจ)§! ผู้อื่น\n$t$ทำให้มติล้มเหลวใน §Yสภากาแล็กซี(ชุมชนกาแล็กซี่)§!"

