 metaphysics_rejected_desc: "คำถามเชิงอภิปรัชญาคือสิ่งกวนใจของจิตใจอันโดดเดี่ยว เราไม่ได้หาเป้าหมายจากการครุ่นคิดถึงการมีอยู่ แต่หาได้จากการมีชีวิตอยู่เป็นหนึ่งเดียว"

 boosted_neurology: "ระบบประสาทที่ได้รับการเสริมพลัง"
 boosted_neurology_desc: "เราปรึกษาหารือกันนานเกินไปแล้ว เราต้องลงมือเปลี่ยนแปลงสายพันธุ์ของเรา ไม่ว่าจะมีข้อเสียใด ๆ ที่อาจเกิดขึ้นก็ตาม"

 balanced_advancement: "ความก้าวหน้าอย่างสมดุล"
 balanced_advancement_desc: "การทดลองกลายพันธุ์ของเราไม่จำเป็นต้องเปลี่ยนแปลงวิธีการที่เราเชื่อมต่อถึงกัน"

 rage_quitting: "ละทิ้งโทสะ"
 rage_quitting_desc: "ความก้าวร้าวที่ประมาทเลินเล่อไม่มีที่ยืนในไฮฟ์"

 fury_embracing: "น้อมรับความเดือดดาล"
 fury_embracing_desc: "เราโอบรับความโกลาหลที่ไม่มีใครจารึกไว้ในอนาคต"

 decisive_meditation: "การทำสมาธิอย่างแน่วแน่"
 decisive_meditation_desc: "ก่อนอื่นเราเลือกที่จะยอมรับธรรมชาติอันปั่นป่วนของจิตสำนึกของเรา และก้าวไปด้วยกันสู่ทัศนคติทั่วไปที่สมดุลยิ่งขึ้น"

 meteorological_adaptations: "การปรับตัวทางอุตุนิยมวิทยา"
 meteorological_adaptations_desc: "เราต้องอุทิศเวลาและทรัพยากรเพื่อยกระดับความยืดหยุ่นทางสภาพภูมิอากาศของเรา"

 body_builders: "ผู้สร้างสรรค์ร่างกาย"
 body_builders_desc: "ความแข็งแกร่งทางกายภาพคือจุดสูงสุดของวิวัฒนาการ"

 deep_thinkers: "นักคิดลึกซึ้ง"
 deep_thinkers_desc: "ความสามารถในการคิดอย่างลึกซึ้งต่างหากที่ค้ำจุนเราไว้"

 sensible_supremacy: "อำนาจสูงสุดอันสมเหตุสมผล"
 sensible_supremacy_desc: "เราสามารถกล้าหาญและระมัดระวังไปพร้อม ๆ กันได้"

 decisive_termination: "การยุติอย่างเด็ดขาด"
 decisive_termination_desc: "เพื่อควบคุมการแพร่ระบาดของโรคระบาด เราจะกำจัดผู้ติดเชื้อ"

 survival_study: "การศึกษาเพื่อการเอาชีวิตรอด"
 survival_study_desc: "การศึกษาอย่างรอบคอบเกี่ยวกับ [GetIndividualNamePlural] ที่ติดเชื้อจะนำเราไปสู่วิธีรักษาโรคระบาด"
 survival_study_wilderness: "$survival_study$"
 survival_study_wilderness_desc: "$survival_study_desc$"

 uncorrected_blunders: "ความผิดพลาดที่ไม่ได้แก้ไข"
 uncorrected_blunders_desc: "เป็นไปได้ว่าเราอาจจะลืมตรวจสอบการคำนวณซ้ำอีกครั้ง"

 maverick_citizens: "พลเมืองนอกกรอบ"
 maverick_citizens_desc: "หากคุณไม่ได้ทำอะไรผิด คุณก็ไม่มีอะไรต้องกลัว"

 # Advanced Governments
 # Purity

 bio.170.name: "ความบริสุทธิ์: การปฏิรูปรัฐบาล?"
 bio.170.desc: "สายพันธุ์ของเรายืนอยู่บนขอบเขตของพรมแดนอันยิ่งใหญ่ถัดไป ตอนนี้เราต้องเลือกแล้ว\n\nเราจะโอบรับโชคชะตาของเรา ชำระล้างสายเลือดทางพันธุกรรมเพื่อยกระดับอารยธรรมของเราไปสู่ความเป็นเลิศทางพันธุกรรมขั้นใหม่ หรือเราจะจดจำบทเรียนจากอดีตและดำเนินต่อไปในรูปแบบปัจจุบันที่ยังไม่ได้รับการปรับแต่ง?"
 bio.170.a: "โอบรับความบริสุทธิ์และก้าวไปสู่จุดสูงสุดใหม่!"
 bio.170.a.tt: "$change_auth_tt$[GetPurityAuthority]"
 bio.170.b: "เราไม่จำเป็นต้องเปลี่ยนแปลงวิธีปกครองตนเอง"

 # Cloning

 bio.175.name: "การโคลนนิ่ง: การปฏิรูปรัฐบาล?"
 bio.175.desc: "สายพันธุ์ของเรามาถึงช่วงเวลาสำคัญแล้ว การตัดสินใจต้องเกิดขึ้น\n\nเราจะโอบรับโชคชะตาโดยใช้ประโยชน์จากพลังของการโคลนนิ่ง เพื่อเปลี่ยนตัวเองไปสู่อารยธรรมแห่งความสมบูรณ์แบบที่ทำซ้ำขึ้นมาอย่างไม่มีวันหวนกลับ หรือเราจะซึมซับบทเรียนจากการเดินทางที่ผ่านมาและยืนหยัดในความแตกต่างที่ไม่จำเป็นของเราต่อไป?"
 bio.175.a: "เราโอบรับการโคลนนิ่งเป็นส่วนสำคัญในอนาคตของเรา"
 bio.175.a.tt: "$change_auth_tt$[GetCloningAuthority]\n$LEADERS_GAIN_CLONES$"
 bio.175.b: "$bio.170.b$"

 # Mutation

 bio.180.name: "การกลายพันธุ์: การปฏิรูปรัฐบาล?"
 bio.180.desc: "เราอยู่บนขีดสุดของพรมแดนชีวภาพที่สำคัญ ทางเลือกที่สำคัญรออยู่\n\nเราสามารถโอบรับโชคชะตาโดยการใช้ประโยชน์จากพลังการกลายพันธุ์ทางชีวภาพขั้นสูง เพื่อเปลี่ยนแปลงอารยธรรมของเราผ่านวิวัฒนาการที่กำหนดขึ้นเองของรหัสพันธุกรรม หรือเราจะรักษาบทเรียนที่ได้รับจากความสำเร็จในอดีตและดำเนินต่อไปในรูปแบบที่แสนธรรมดาในปัจจุบัน"
 bio.180.a: "เราสามารถเป็นอะไรและเป็นทุกสิ่งได้"
 bio.180.a.tt: "$change_auth_tt$[GetMutationAuthority]"
 bio.180.b: "$bio.170.b$"

