 SHIP_BEHEMOTH_COCOON: "เครื่องปั่นด้ายเปลี่ยนสัณฐานแบบสมบูรณ์"
 SHIP_BEHEMOTH_COCOON_DESC: "§Yเบเฮมอท§! สามารถยึดตัวเองไว้ในชั้นบรรยากาศที่ปั่นป่วนของดาวแก๊สยักษ์ โดยดูดซับสารอาหารจากชั้นบรรยากาศที่หนาแน่นซึ่งอุดมไปด้วยธาตุหนักและสารประกอบโมเลกุลที่ซับซ้อน เมื่อเวลาผ่านไป สารอาหารเหล่านี้จะช่วยกระตุ้นการเติบโตและเสริมสร้างความแข็งแกร่งอันมหาศาลของพวกมัน"
