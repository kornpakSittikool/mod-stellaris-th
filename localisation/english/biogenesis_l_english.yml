### BIOMORPHOSIS (GENETIC ASCENSION) SITUATION(S)
## REGULAR EMPIRE SITUATION
 # SET-UP / PREAMBLE
 genetic_ascension_situation: "ไบโอมอร์โฟซิส"
 genetic_ascension_situation_type: "$genetic_ascension_situation$"
 genetic_ascension_situation_desc: "การคัดเลือกโดยธรรมชาติและการเบี่ยงเบนทางพันธุกรรมไม่อาจขวางกั้นระหว่างเรากับความเป็นใหญ่ทางชีวภาพได้อีกต่อไป ในฐานะอารยธรรมหนึ่ง เรากำลังอยู่บนปากเหวแห่งการกำหนดอนาคตของเผ่าพันธุ์ของเราขึ้นมาใหม่ [Owner.Species.GetFleshTypeCyberCreed] ของเราเปรียบเสมือนดินเหนียว และเราคือผู้ปั้นมันขึ้นมา"
 genetic_ascension_situation_monthly_change_tooltip: "นักพันธุศาสตร์ของเราก้าวหน้าในการวิจัยอย่างสม่ำเสมอ"
 genetic_ascension_situation_outcome: "เราจะปลดล็อกศักยภาพสูงสุดของการควบคุมดัดแปลงพันธุกรรมและรับประกันความก้าวหน้าของเผ่าพันธุ์ของเรา\n\nเราจะเลือกการแสดงออกขั้นสูงสุดของการแปรรูปทางชีวภาพ(ไบโอดอร์โฟซิส)"
 genetic_ascension_situation_pause_desc: "สถานการณ์ถูกระงับชั่วคราว"
 genetic_ascension_approach_selected: "$TRIGGER_FAIL$เราได้เลือกทางเลือกสำหรับขั้นตอนนี้เรียบร้อยแล้ว"
 situation_gene_tailoring_needed_desc: "$TRIGGER_FAIL$ไม่มีเทคโนโลยี ['concept_gene_tailoring']"
 mod_biomorphosis_progress_mult: "ความคืบหน้า $genetic_ascension_situation$ รายเดือน"

 # STAGE EVENTS

 bio.5.name: "การแปรเปลี่ยนแก่นแท้" # STAGE ONE
 bio.5.desc.no_options: "เพื่อเร่งกระบวนการวิวัฒนาการของเรา เราต้องเลือกเส้นทางที่จะกำหนดการเดินทางของเราอย่างเด็ดขาด เมื่อเราเริ่มตระหนักถึงศักยภาพสูงสุดของเรา เราย่อมตระหนักดีว่าความพยายามนี้อาจเปลี่ยนแปลงแก่นแท้ในการดำรงอยู่ของเราไปโดยสิ้นเชิง\n\nการวิศวกรรมวิวัฒนาการเป็นภารกิจที่มีความสำคัญอย่างยิ่งยวด การปรับเปลี่ยนที่เราทำในตอนนี้จะหล่อหลอมอนาคตของเราขึ้นมาใหม่"
 bio.5.desc.has_options: "$bio.5.desc.no_options$\n\nเพื่อเริ่มยกระดับความเป็นอยู่ของเรา บัดนี้เราต้องเลือกว่าจะเริ่มการเดินทางบนเส้นทางใด"
 bio.5.a: "เส้นทางแห่งความบริสุทธิ์"
 bio.5.b: "เส้นทางแห่งการโคลน"
 bio.5.c: "เส้นทางแห่งการกลายพันธุ์"

 bio.10.name: "จุดเปลี่ยนผ่าน" # STAGE TWO
 bio.10.desc.no_options: "การออกแบบวิศวกรรมวิวัฒนาการของเราเองได้นำไปสู่ความก้าวหน้าอย่างลึกซึ้ง บัดนี้เรามีความเข้าใจที่ลึกซึ้งยิ่งขึ้นเกี่ยวกับคุณลักษณะทางพันธุกรรม การสืบพันธุ์ และการจัดลำดับดีเอ็นเอ\n\nจุดสูงสุดของความก้าวหน้าอยู่ใกล้แค่เอื้อม ในเวลาเพียงไม่กี่ปี เราจะตระหนักถึงศักยภาพสูงสุดของพวกเราในฐานะเผ่าพันธุ์หนึ่งได้อย่างแท้จริง"
 bio.10.desc.has_options: "$bio.10.desc.no_options$\n\nอย่างไรก็ตาม ในปัจจุบันเราอาจดำเนินต่อไปบนเส้นทางเดิม หรือเลือกจุดมุ่งเน้นอื่นสำหรับขั้นตอนต่อไปของพัฒนาการของเรา"
 bio.10.a: "มุ่งเน้นที่ความบริสุทธิ์"
 bio.10.b: "มุ่งเน้นที่การโคลน"
 bio.10.c: "มุ่งเน้นที่การกลายพันธุ์"

 bio.15.name: "ทางแยกแห่งวิวัฒนาการ" # STAGE THREE
 bio.15.desc.no_options: "ความพยายามของเราได้นำเรามาสู่ขอบเหวของการเปลี่ยนแปลงทางวิวัฒนาการครั้งสำคัญ ในไม่ช้า เราต้องทำการตัดสินใจครั้งสำคัญเกี่ยวกับเส้นทางที่เราจะเลือกเพื่อบรรลุศักยภาพทางวิวัฒนาการของเราอย่างเต็มที่"
 bio.15.desc.has_options: "$bio.15.desc.no_options$\n\nเราต้องตัดสินใจอีกครั้งว่าจะมุ่งเน้นความพยายามของเราไปที่ใด"
 bio.15.a: "เราเลือกความบริสุทธิ์"
 bio.15.b: "เราจะเชี่ยวชาญการโคลน"
 bio.15.c: "การกลายพันธุ์จะนำพาเราไปสู่อนาคต"

 genetic_ascension_approach_purity: "ความบริสุทธิ์"
 genetic_ascension_approach_cloning: "การโคลน"
 genetic_ascension_approach_mutation: "การกลายพันธุ์"
 genetic_ascension_approach_purity_desc: "เราจะมุ่งเน้นความพยายามไปที่การทำให้เกิดความบริสุทธิ์"
 genetic_ascension_approach_cloning_desc: "การวิจัยการโคลนจะช่วยให้เราเติบโต"
 genetic_ascension_approach_mutation_desc: "อนาคตของเราขึ้นอยู่กับการกลายพันธุ์ทางพันธุกรรม"

 bio.20.name: "เส้นทางที่เลือกเดิน" # FINAL STAGE - TRADITION TREE CHOICE
 bio.20.desc: "ไม่ว่าเราจะดิ้นรนเพื่อรูปแบบที่บริสุทธิ์ที่สุดของตัวเราเอง โคลนหนทางสู่ความสำเร็จ หรือเพิ่มพูนศักยภาพทางพันธุกรรมผ่านการกลายพันธุ์อย่างตั้งใจ ช่วงเวลานี้ถือเป็นจุดที่ไม่มีทางหวนกลับ"
 bio.20.desc.evopred: "ธรรมชาติของเรานั้นแปรรูปได้เสมอมา เราเป็นสิ่งมีชีวิตที่ซับซ้อนที่สุดในจักรวาลนี้ และด้วยความช่วยเหลือจากการวิจัยของเรา เราจะเปลี่ยนแปลงตัวเองต่อไป\n\nอนาคตนั้นโกลาหล และนั่นคือสิ่งที่สมบูรณ์แบบสำหรับเรา"
 bio.20.a: "เราจะรับรู้ว่าการเป็นผู้บริสุทธิ์นั้นมีความหมายเช่นไร"
 bio.20.b: "เราจะโคลนตัวเองไปสู่ความสำเร็จ"
 bio.20.c: "เราจะควบคุมพลังแห่งการกลายพันธุ์"

 # Random Events

 bio.50.name: "บางคนมีความเท่าเทียมมากกว่า"
 bio.50.desc: "ผลจากการมุ่งเน้นไปที่การทำให้บริสุทธิ์ทางพันธุกรรม พลเมืองที่ได้รับการดัดแปลงเสริมพลังได้เริ่มมองว่าตนเองมีความเหนือกว่าประชากรที่เหลือโดยธรรมชาติ พวกเขาเรียกร้องให้ชั่วโมงการทำงานสั้นลง สิ่งอำนวยความสะดวกที่มากขึ้น และอำนาจทางการเมืองที่แข็งแกร่งขึ้นเนื่องจากความเหนือกว่าที่ตนรับรู้ การชุมนุมที่ก้าวร้าวรุนแรงขึ้นของพวกเขากำลังส่งผลกระทบต่อความสงบสุขในสังคมอย่างมีนัยสำคัญ"
 bio.50.a: "ปราบปรามผู้ประท้วงอย่างเด็ดขาด"
 bio.50.b: "สิทธิ์ของพวกเขาเป็นสิ่งสมควรแล้ว"

 bio.55.name: "การแบ่งตัวทางสังคม"
 bio.55.desc: "วาทกรรมที่สร้างความแตกแยกเข้าครอบงำกระดานข่าว และความขัดแย้งกำลังทำลายหน่วยสังคมต่างๆ ให้แตกสลาย การต่อสู้ทางชนชั้นรูปแบบใหม่กำลังเกิดขึ้น เนื่องจากโอกาสต่างๆ ตกเป็นของผู้ที่มีการปรับแต่งยีนมากขึ้น\n\nผู้ได้รับการดัดแปลงทางพันธุกรรมเชื่อว่าตนเองเป็นตัวแทนของอนาคตแห่งเผ่าพันธุ์ของเรา ในขณะที่กลุ่มอนุรักษนิยมรู้สึกว่าพวกเรากำลังก้าวล้ำลึกเข้าไปในดินแดนที่ขัดต่อธรรมชาติมากเกินไป"
 bio.55.a: "บุคคลที่เหนือกว่าเพื่อโลกที่เหนือกว่า"
 bio.55.b: "บางทีเราอาจจะก้าวเร็วเกินไป"

 bio.60.name: "ความเหลื่อมล้ำอันขื่นขม"
 bio.60.desc: "การทดสอบความบริสุทธิ์โดยพลการเริ่มกลายเป็นเรื่องปกติในบางอุตสาหกรรม ผู้ที่ถูกตัดสินว่ามีรหัสพันธุกรรมที่เหนือกว่าจะได้รับการดูแลเป็นพิเศษในด้านการทำงาน การศึกษา และได้รับสิทธิ์เข้าถึงตำแหน่งแห่งอำนาจได้ง่ายขึ้นโดยไม่ลืมหูลืมตา\n\nขณะที่บางคนแย้งว่าผู้ที่ได้รับการเสริมพลังทางชีวภาพนั้นแข็งแกร่งและมีสุขภาพดีกว่าจริงๆ แต่คนอื่นๆ กลับโต้แย้งว่าความคิดนี้สร้างการเลือกปฏิบัติที่ไม่เป็นธรรมต่อผู้ที่ไม่เต็มใจหรือไม่มีความสามารถในการปรับเปลี่ยนจีโนมเพื่อแสวงหาความสมบูรณ์แบบทางพันธุกรรม"
 bio.60.a: "เราต้องรับประกันโอกาสที่เท่าเทียมสำหรับทุกคน"
 bio.60.b: "นี่คือการอยู่รอดของผู้ที่เหมาะสมที่สุด"

 bio.65.name: "วีรบุรุษและเหล่าวายร้าย"
 bio.65.desc: "การผลักดันเพื่อความบริสุทธิ์ของเราได้สร้างความฮึกเหิมให้แก่คนบางกลุ่มในการก้าวขึ้นมามีบทบาทโดดเด่นในด้านความปลอดภัยของสาธารณะ แก๊งผู้ทำความดีกลุ่มเล็กๆ ที่ได้รับการเสริมพลังให้มีพละกำลัง ความคล่องแคล่ว และความอดทนเหนือมนุษย์ ต่างยกย่องตนเองเป็นแชมเปี้ยนผู้อภิบาลกฎหมายด้วย [owner.species.GetHandNamePlural] ของตนเอง\n\nอย่างไรก็ตาม ความกล้าหาญครั้งใหม่นี้ไม่ได้ไร้ซึ่งการต่อต้าน ในเงามืด คู่ปรับที่ได้รับการดัดแปลงดุจเดียวกันกำลังปรากฏตัวขึ้น เจตนาร้ายของพวกเขาถูกขับเคลื่อนด้วยความปรารถนาที่จะปรับสมดุลของตาชั่งแห่งอำนาจ การปะทะกันระหว่างทั้งสองค่ายก่อให้เกิดความเสียหายต่อทรัพย์สินอย่างมาก และยังเป็นอันตรายต่อพลเมืองผู้บริสุทธิ์อีกด้วย"
 bio.65.a: "ศาลเตี้ยไม่มีที่ยืนบนถนนของเรา"
 bio.65.b: "ปล่อยให้พวกเขาห้ำหั่นกันเอง"
 MAVERICK_CITIZENS_MOD: "[enforcer.GetIcon] §Y[enforcer.GetNamePlural]§! ผลิต $r_stability$ §G+2§! และ $r_unity$ §G+2§! ต่อทุกๆ 100 ตำแหน่งงาน"

 bio.66.name: "การควบคุมระดับซูเปอร์"
 bio.66.desc: "เราได้ปราบปรามกิจกรรมของกลุ่มผู้มีพลังพิเศษเป็นที่เรียบร้อย บัดนี้สิ่งมีชีวิตเหล่านี้ต้องเผชิญกับข้อจำกัดและกฎระเบียบที่เข้มงวด ความพยายามในการเฝ้าระวังของเราช่วยให้เราสามารถติดตามและควบคุมกิจกรรมของพวกเขาได้\n\nในขณะที่เราทำงานหนักเพื่อรับประกันว่าพวกเขาจะใช้พลังเพื่อรับใช้จักรวรรดิของเราเท่านั้น ความกลัวและความรังเกียจเดียดฉันท์ในหมู่ผู้มีพลังพิเศษและผู้ที่ไม่ได้ดัดแปลงก็กำลังแพร่ขยายตัวขึ้น ประชากรของเราแตกแยกอย่างมากในเรื่องนี้"
 bio.66.a: "จัดตั้งกรมทหารผู้มีพลังพิเศษ"
 bio.66.b: "ฟื้นฟูเยียวยาผู้ที่สูญเสียสิทธิ์ทางสังคม"

 bio.67.name: "การพึ่งพากลุ่มผู้มีพลังพิเศษ"
 bio.67.desc: "การพึ่งพาศาลเตี้ยที่ได้รับการดัดแปลงทางพันธุกรรมเพิ่มมากขึ้นได้กลายเป็นดาบสองคม แม้ว่าสิ่งมีชีวิตเหล่านี้จะช่วยให้เรารู้สึกปลอดภัยและมีความเป็นอยู่ที่ดีขึ้น แต่เราก็ไม่เคยมองข้ามเลยว่าเราพึ่งพาพวกเขามากเพียงใด\n\nประชาชนต่างรู้สึกซาบซึ้ง แต่บัดนี้พวกเขากลับเข้าหาผู้มีพลังพิเศษเหล่านี้เพื่อขอคำแนะนำและการสนับสนุน โดยหลีกเลี่ยงกระบวนการยุติธรรมทางกฎหมายและเพิกเฉยต่อเจ้าหน้าที่ของรัฐ ความแตกต่างระหว่างฮีโร่และรัฐบาลเริ่มเลือนลาง อำนาจกำลังแขวนอยู่บนเส้นด้าย"
 bio.67.a: "จัดตั้งสภาผู้มีพลังพิเศษ!"
 bio.67.b: "จำกัดการมีส่วนร่วมของ "ฮีโร่" ในกิจการของรัฐ"

 bio.70.name: "สองในหนึ่งเดียว"
 bio.70.desc: "ผู้นำที่โดดเด่นคนหนึ่งซึ่งได้รับการยอมรับทั่วทั้งกาแล็กซีในด้านความวิริยอุตสาหะอันไม่รู้จักเหน็ดเหนื่อย แท้จริงแล้วไม่ได้มีเพียงคนเดียว แต่เป็นบุคคลสองคนต่างหาก\n\nความจริงปรากฏว่าผู้นำผู้นี้มีร่างโคลนที่สมบูรณ์แบบ ซึ่งเปิดโอกาสให้แต่ละคนผลัดเปลี่ยนเวรทำงานกัน ในขณะที่โคลนตัวหนึ่งทำหน้าที่สาธารณะและงานด้านธุรการ โคลนอีกตัวจะพักผ่อนและพักฟื้นตัวในที่ลับตาคน\n\nการเปิดเผยนี้สร้างความสั่นสะเทือนไปทั่วแวดวงการเมือง ทำให้เกิดการตั้งคำถามถึงเนื้อแท้ของการเป็นผู้นำและขอบเขตทางจริยธรรมของเทคโนโลยีการโคลนนิ่ง"
 bio.70.a: "การใช้ประโยชน์จากการโคลนอย่างมีประสิทธิภาพ"
 bio.70.b: "ปลดพวกเขาทั้งสองออกจากตำแหน่งเนื่องจากความเสแสร้งหลอกลวง"

 bio.75.name: "การจลาจลของร่างโคลน"
 bio.75.desc: "แนวทางปฏิบัติในการจัดทำร่างโคลนเพื่อนำอวัยวะไปเก็บเกี่ยวกำลังนำไปสู่ปัญหาความยุ่งยาก ร่างโคลนหลายร่างซึ่งมีปัญญาความรู้สึกนึกคิดอย่างเห็นได้ชัด กำลังลุกขึ้นประท้วงด้วยวิธีการอดอาหารประท้วงที่ยืดเยื้อ\n\nในขณะที่หลายคนแย้งว่าสุขภาพและอายุที่ยืนยาวของร่างต้นแบบควรมีความสำคัญเหนือกว่า แต่คนอื่นๆ กลับยืนกรานว่าสิ่งมีชีวิตที่มีความคิดทุกคนมีสิทธิ์ในอิสรภาพส่วนบุคคล ประเด็นที่มีการโต้เถียงกันอย่างเผ็ดร้อนนี้กลายเป็นหัวข้อการอภิปรายที่รุนแรงในเวลานี้"
 bio.75.a: "ยุติการปลูกถ่ายอวัยวะ"
 bio.75.b: "สิทธิ์ของร่างต้นแบบมีความสำคัญสูงสุด"

 bio.80.name: "ภาระในการพิสูจน์"
 bio.80.desc: "เจ้าหน้าที่รักษากฎหมายกำลังตกที่นั่งลำบาก อาชญากรรมในเมืองหลวงของเรากำลังพุ่งสูงขึ้น ทว่าผู้คนกลับต้องรับโทษทัณฑ์น้อยลงกว่าที่เคย ผู้ต้องสงสัยว่าเป็นอาชญากรต่างอ้างว่าตนไม่มีความผิดเพิ่มมากขึ้น โดยระบุว่าร่างโคลนของพวกเขาเป็นผู้ก่อคดี\n\nในกรณีที่ผู้ต้องสงสัยไม่ได้ถูกจับได้คาหนังคาเขา การพิสูจน์ความผิดเกือบจะเป็นเรื่องที่เป็นไปไม่ได้เลย หน่วยงานตุลาการบางแห่งกำลังเรียกร้องให้มีการประกาศให้กิจกรรมที่ผิดกฎหมายส่วนใหญ่กลายเป็นเรื่องไม่ผิดกฎหมายอย่างเป็นรูปธรรม"
 bio.80.a: "เสริมสร้างระบบเฝ้าระวังของเราให้มั่นคงยิ่งขึ้น"
 bio.80.b: "กฎหมายที่น้อยลงหมายถึงอาชญากรรมที่ลดลง"

 bio.85.name: "ความคล้ายคลึงอย่างน่าประหลาด"
 bio.85.desc: "มีการค้นพบสถานพยาบาลการโคลนนิ่งขนาดใหญ่ที่ไม่ได้รับอนุญาตภายในพรมแดนของเรา ซึ่งเป็นที่อยู่อาศัยของร่างฝาแฝดเลียนแบบนับพัน โดยแต่ละร่างล้วนเป็นร่างจำลองของ [Owner.Leader.GetTitle] ของเรา นั่นคือ [Owner.Leader.GetName] นักวิทยาศาสตร์พลเรือนที่พบในสถานที่ได้รับการควบคุมตัวแล้ว แต่ไม่มีใครให้ความร่วมมือ โดยอ้างว่าไม่มีข้อมูลว่าใครเป็นผู้สั่งการให้สร้างโคลนเหล่านี้\n\nหลักฐานที่มีอยู่อย่างเบาบางบ่งชี้ว่าตัว [Owner.Leader.GetName] [Owner.Leader.GetHerselfHimself] เองอาจอยู่เบื้องหลังปฏิบัติการครั้งนี้ น่าเสียดายที่ [Owner.Leader.GetSheHe] ได้อันตรธานหายตัวไปอย่างร่องรอย"
 bio.85.a: "ทำการุณยฆาตร่างโคลนเหล่านั้น"
 bio.85.b: "เราได้รับมรดกกองทัพโคลนมา"
 bio.85.b.tt: "([owner.capital_scope.GetName]):\nสร้างกองทัพ §Y$clone_army$§! ขึ้นมาหนึ่งกอง"
 bio.85.c: "ปล่อยร่างโคลนเหล่านั้นให้เป็นอิสระ"
 bio.85.c.tt: "เราจะได้รับกลุ่มประชากร §Yป๊อป§!"

 bio.86.name: "กระแสตีกลับที่คาดไม่ถึง"
 bio.86.desc: "การทำการุณยฆาตร่างโคลนจำนวนมากได้จุดชนวนความโกรธแค้นและก่อให้เกิดการถกเถียงอย่างจริงจัง กลุ่มนักเคลื่อนไหวเพื่อสิทธิของพวก [Owner.GetSpeciesAdj] ที่ไม่พอใจและกลุ่มศาสนาต่างจัดการชุมนุมประท้วงครั้งใหญ่\n\nในขณะเดียวกัน ก็มีข่าวลือว่ามีร่างโคลนบางส่วนหลบหนีไปได้ และกำลังแฝงตัวอยู่ในหมู่สาธารณชนทั่วไป"
 bio.86.a: "บางทีเราอาจเรียนรู้บางสิ่งจากเรื่องนี้..."
 bio.86.b: "ส่งกองกำลังรักษาความมั่นคงไปสยบฝูงชนที่ก่อความวุ่นวาย"
 bio.86.b.tt: "([owner.capital_scope.GetName]):\nสร้างกองทัพ §Y$assault_army_plural$§! ขึ้นมาสามกอง"

 bio.90.name: "ชุมชนคนกลายพันธุ์"
 bio.90.desc: "บุคคลจำนวนมากที่มีการกลายพันธุ์ทางพันธุกรรมที่เห็นได้ชัดหรือผิดแผกไปจากธรรมดาต่างถูกขับออกจากสังคมด้วยความรังเกียจ ส่งผลให้พวกเขากลายเป็นกลุ่มคนนอกกฎหมายที่จัดตั้งชุมชนปกครองตนเองขึ้นมาเอง\n\nใครก็ตามที่กล้าเสี่ยงย่างกรายเข้าไปในดินแดนแถบนี้มักจะไม่มีโอกาสได้กลับมา"
 bio.90.a: "กวาดล้างชุมชนคนนอกเหล่านั้น"
 bio.90.b: "เฝ้าสังเกตพัฒนาการของพวกเขา จากระยะไกล"

 bio.95.name: "กบฏตัดแต่งยีน"
 bio.95.desc: "กลุ่มวัยรุ่นที่ถูกลิดรอนสิทธิ์ได้เริ่มดัดแปลงรูปลักษณ์ของตนเองอย่างรุนแรงเพื่อความเพลิดเพลินที่สุดขั้ว\n\nกระแสความนิยมล่าสุดรวมถึงการคลั่งไคล้ดวงตาประกอบ และการแข่งขันว่าใครจะสามารถเพิ่มจำนวนรยางค์บนร่างกายเดียวกันได้มากที่สุด โดยมีสถิติปัจจุบันอยู่ที่ 156 ข้าง\n\nนักเจาะระบบชีวภาพ(บิโอเกอร์)เหล่านี้ได้รับความสนใจจากสาธารณชนและสร้างความกังวลด้านความปลอดภัย ในขณะที่เสียงเรียกร้องให้มีข้อจำกัดที่เข้มงวดเกี่ยวกับการกลายพันธุ์ทางพันธุกรรมดังขึ้นเรื่อยๆ เราต้องตัดสินใจเกี่ยวกับจุดยืนอย่างเป็นทางการของเรา"
 bio.95.a: "นี่เป็นเพียงความสนุกที่ไร้พิษภัยเท่านั้น"
 bio.95.b: "รยางค์ 156 ข้างนั้นมันมากเกินไปจริงๆ"

 bio.100.name: "ผลกระทบเชิงลบที่ไม่คาดคิด"
 bio.100.desc: "การเปิดรับนำกระบวนการปรับแต่งพันธุกรรมมาใช้อย่างแพร่หลายในอารยธรรมของเราได้ก่อกำเนิดความแปรผันทางกายภาพที่น่าสับสนอลหม่าน\n\nกระบวนการทางชีววิทยาที่ครั้งหนึ่งเคยคาดเดาได้ บัดนี้กลับแสดงความเบี่ยงเบนที่ไม่มีใครคาดคิด ทำให้การสร้างมาตรฐานเกือบจะเป็นเรื่องที่เป็นไปไม่ได้\n\nความรู้สึกร่วมกันเกี่ยวกับลักษณะทางกายภาพที่ครั้งหนึ่งเคยรวมเผ่าพันธุ์ของเราให้เป็นหนึ่งเดียวกำลังมลายหายไป แทนที่ด้วยรูปแบบและหน้าที่การทำงานอันหลากหลายละลานตาที่ส่งผลกระทบต่อความสามัคคีในสังคม"
 bio.100.a: "ส่งเสริมความหลากหลาย"
 bio.100.a.tt: "สุ่มประชากร £pop£ §Hป๊อป§! จำนวน §Y400§! คนจะได้รับคุณลักษณะ ['trait:trait_bioadaptability'], ['trait:trait_social_pheromones'], หรือ ['trait:trait_limited_regeneration']"
 bio.100.b: "บังคับใช้แม่แบบพันธุกรรมมาตรฐาน"

 bio.105.name: "สภาวะเซลล์ไร้รูปทรง"
 bio.105.desc: "การทดลองดัดแปลงพันธุกรรมข้ามสายพันธุ์เกิดความผิดพลาดอย่างมหันต์ นักวิทยาศาสตร์พยายามที่จะประกบดีเอ็นเอของกลุ่มตัวอย่างเข้ากับสิ่งมีชีวิตหลายเซลล์ชนิดอื่นเพื่อกระตุ้นปฏิกิริยาภูมิคุ้มกันระดับสูง ทำให้พวกเขาต้านทานไวรัสทั้งหมดได้\n\nแต่พวกเขากลับสร้างสิ่งมีชีวิตที่ละลายผนังเซลล์ของสิ่งมีชีวิตใดๆ ก็ตามที่มันสัมผัส และหลอมรวมเข้าด้วยกันจนกลายเป็นมวลสารชีวภาพขนาดใหญ่ที่ไร้รูปทรง\n\nเจ้าสิ่งมีชีวิตไร้รูปทรงนี้ไหลกลิ้งผ่านสถานบันวิจัยและดูดซับทุกอย่างที่ขวางหน้า ขณะนี้มันถูกกักกันไว้แล้ว แต่หากมันเล็ดลอดออกไปได้ก็จะเป็นอันตรายต่อสุขภาพอย่างร้ายแรง โชคดีที่มันดูเหมือนจะกินได้ด้วยเช่นกัน..."
 bio.105.a: "กำจัดเจ้าสิ่งมีชีวิตไร้รูปทรงนั้นเสีย!"
 bio.105.b: "การศึกษาเจ้าสิ่งมีชีวิตนี้คุ้มค่าที่จะเสี่ยง"

## HIVE EMPIRE SITUATION
 # SET-UP / PREAMBLE
 genetic_ascension_situation_hive: "$genetic_ascension_situation$"
 genetic_ascension_situation_hive_type: "$genetic_ascension_situation$"
 genetic_ascension_situation_hive_desc: "$genetic_ascension_situation_desc$"
 genetic_ascension_situation_hive_monthly_change_tooltip: "โดรนนักพันธุศาสตร์ก้าวหน้าในการวิจัยอย่างต่อเนื่อง"
 genetic_ascension_situation_hive_outcome: "$genetic_ascension_situation_outcome$"

 # STAGE EVENTS

 bio.25.name: "การพัฒนาร่วมกลุ่มรัง" # STAGE ONE
 bio.25.desc.no_options: "[owner.GetGovernmentName] กำลังเกิดการเปลี่ยนแปลง เรากำลังจะบรรลุศักยภาพสูงสุดของเรา โดยตระหนักดีว่าความพยายามนี้อาจเปลี่ยนแปลงแก่นแท้ของเราไปโดยสิ้นเชิง การออกแบบวิศวกรรมวิวัฒนาการของเราเองเป็นภารกิจที่มีความสำคัญอย่างยิ่งยวด การเปลี่ยนแปลงที่เราทำในตอนนี้จะส่งผลกระทบต่อเนื่องไปอีกยาวนานในอนาคต"
 bio.25.desc.has_options: "$bio.25.desc.no_options$\n\nบัดนี้เราต้องเลือกจุดมุ่งเน้นสำหรับขั้นตอนแรกของพัฒนาการของเรา"
 bio.25.a: "$bio.5.a$"
 bio.25.b: "$bio.5.b$"
 bio.25.c: "$bio.5.c$"

 bio.30.name: "การลู่เข้าร่วมรัง" # STAGE TWO
 bio.30.desc.no_options: "การออกแบบวิศวกรรมวิวัฒนาการของพวกเราเองได้นำไปสู่การเปลี่ยนแปลงที่สำคัญ บัดนี้เรามีความเข้าใจที่ลึกซึ้งยิ่งขึ้นเกี่ยวกับคุณลักษณะทางพันธุกรรม การสืบพันธุ์ และการจัดลำดับดีเอ็นเอ\n\nจุดสูงสุดของผลงานของเราอยู่ใกล้แค่เอื้อม\n\nในไม่ช้า เราจะกลายเป็นสิ่งที่เราถูกกำหนดให้เป็นอยู่เสมอมา"
 bio.30.desc.has_options: "$bio.30.desc.no_options$ เรามีโอกาสที่จะดำเนินต่อไปตามเส้นทางปัจจุบันของเรา หรือเลือกจุดมุ่งเน้นใหม่"
 bio.30.a: "$bio.10.a$"
 bio.30.b: "$bio.10.b$"
 bio.30.c: "$bio.10.c$"

 bio.35.name: "การผสานรวมทางวิวัฒนาการ" # STAGE THREE
 bio.35.desc.no_options: "เรากำลังอยู่บนขอบเหวแห่งความก้าวหน้าทางวิวัฒนาการครั้งสำคัญ ในไม่ช้า เราต้องตัดสินใจครั้งสำคัญเกี่ยวกับเส้นทางที่เราจะเลือกเพื่อตระหนักถึงศักยภาพทางวิวัฒนาการของเราอย่างเต็มที่"
 bio.35.desc.has_options: "$bio.35.desc.no_options$\n\nอีกครั้งหนึ่งที่เราต้องเลือกว่าลำดับความสำคัญของเราอยู่ที่ใด"
 bio.35.a: "$bio.15.a$"
 bio.35.b: "$bio.15.b$"
 bio.35.c: "$bio.15.c$"

 genetic_ascension_hive_approach_one: "$genetic_ascension_approach_purity$"
 genetic_ascension_hive_approach_two: "$genetic_ascension_approach_cloning$"
 genetic_ascension_hive_approach_three: "$genetic_ascension_approach_mutation$"
 genetic_ascension_hive_approach_one_desc: "$genetic_ascension_approach_purity_desc$"
 genetic_ascension_hive_approach_two_desc: "$genetic_ascension_approach_cloning_desc$"
 genetic_ascension_hive_approach_three_desc: "$genetic_ascension_approach_mutation_desc$"

 bio.40.name: "เอกลักษณ์เฉพาะทางชีวภาพ" # FINAL STAGE - TRADITION TREE CHOICE
 bio.40.desc: "ไม่ว่าเราจะดิ้นรนเพื่อรูปแบบที่บริสุทธิ์ที่สุดของตัวเราเอง โคลนหนทางสู่ความสำเร็จ หรือเพิ่มพูนศักยภาพทางพันธุกรรมผ่านการกลายพันธุ์อย่างตั้งใจ ช่วงเวลานี้ถือเป็นจุดที่ไม่มีทางหวนกลับ"
 bio.40.desc.evopred: "$bio.20.desc.evopred$"
 bio.40.a: "$bio.20.a$"
 bio.40.b: "$bio.20.b$"
 bio.40.c: "$bio.20.c$"

 # Random Events (Hives)

 bio.110.name: "การแบ่งงานกันทำ"
 bio.110.desc: "เมื่อเราเริ่มยกระดับทางชีวภาพให้กับ [target.GetGestaltEntityName] เราต้องให้ความสำคัญเฉพาะการปรับปรุงที่จะเป็นประโยชน์ต่ออารยธรรมของเรามากที่สุดเท่านั้น\n\nการปรับแต่งยีนแบบเลือกสรรช่วยให้เราสามารถเพาะพันธุ์ผู้เชี่ยวชาญที่มีลักษณะทางกายภาพที่พึงประสงค์ซึ่งเหมาะสมที่สุดสำหรับอุตสาหกรรมเฉพาะด้าน\n\nด้วยความสามารถใหม่เหล่านี้ เรามีโอกาสที่จะสนับสนุน [target.GetIndividualNamePlural] ที่ทำงานในด้านการผลิตพลังงาน หรือการป้องกันประเทศ"
 bio.110.a: "พลังงานนั้นมีประโยชน์เสมอ"
 bio.110.b: "เราควรให้ความสำคัญกับการป้องกันประเทศก่อน"

 bio.115.name: "ความซ้ำซ้อนระหว่างรุ่น"
 bio.115.desc: "ในขณะที่เราเริ่มใช้แม่แบบชีวภาพใหม่สำหรับโดรนของเรา เราต้องตัดสินใจว่าจะจัดการกับโดรนที่ไม่เข้ากับการอัปเกรดทางพันธุกรรมอย่างไร\n\nโดรนรุ่นเก่าบางตัวไม่มีความแข็งแกร่งพอที่จะทนต่อการปรับแต่งได้ เราสามารถเลือกที่จะเก็บพวกมันไว้เป็นแรงงานต่อไปตามอายุขัยที่เหลืออยู่ หรือรีไซเคิลสารชีวภาพของพวกมันเพื่อเติมเต็มรัง"
 bio.115.a: "รีไซเคิลโดรนรุ่นเก่า"
 bio.115.b: "พวกมันยังคงมีประโยชน์อยู่"

 bio.120.name: "ความเร็วหรือความอดทน"
 bio.120.desc: "ความก้าวหน้าในการวิจัยทางพันธุกรรมได้เผยให้เห็นวิธีปรับปรุงประสิทธิภาพการส่งต่อข้อมูลประสาท ซึ่งช่วยเพิ่มผลิตภาพของ[target.GetIndividualName] อย่างมีนัยสำคัญ\n\nอย่างไรก็ตาม การเพิ่มขึ้นของประสิทธิภาพสมองนี้ไม่สามารถคงอยู่ได้ในระยะยาว ซึ่งส่งผลให้อายุขัยสั้นลง\n\nเราต้องตัดสินใจว่าจะรักษาอายุขัยตามปกติของเราไว้ หรือพัฒนาการทำงานที่สูงขึ้นโดยต้องแลกกับอายุขัยที่สั้นลง"
 bio.120.a: "ให้ความสำคัญกับอายุขัยในปัจจุบันของเราก่อน"
 bio.120.b: "เร่งใช้งาน [target.GetIndividualNamePlural] เพิ่มพูนผลิตภาพ"

 bio.125.name: "ไซแนปส์ทำงานเกินขีดจำกัด"
 bio.125.desc: "กลุ่ม [target.GetIndividualNamePlural] ที่ได้รับการเสริมศักยภาพใหม่ได้รับการรวมเข้ากับ [target.GetGestaltEntityName] แล้ว วิศวกรรมชีวภาพของพวกมันได้รับการปรับแต่งอย่างละเอียดเพื่อเร่งพัฒนาการทางประสาทและกระบวนการรับรู้ โหนดไซแนปส์หลักของ [target.GetGestaltEntityName] กำลังทำงานด้วยความเร็วอย่างที่ไม่เคยมีมาก่อน\n\nทว่า การเร่งความเร็วนี้ได้สร้างความตึงเครียดให้กับความเสถียรของ [target.GetIndividualName] และเสี่ยงต่อการเกิดภาวะไซแนปส์ทำงานเกินขีดจำกัดจนอาจพังทลาย อีกทางเลือกหนึ่งคือเราสามารถจัดสรร [target.GetIndividualNamePlural] เพิ่มเติมไปยังภารกิจการประสานงาน"
 bio.125.a: "ชะลอตัวลงและรักษาความเสถียรไว้"
 bio.125.b: "ใช้ชีวิตอย่างรวดเร็วและเปล่งประกายอย่างเจิดจ้า"

 bio.130.name: "ปรากฏการณ์ความถี่"
 bio.130.desc: "นับตั้งแต่รวมกลุ่มโคลนชุดใหม่เข้ากับรังของเรา เราพบปัญหาเสียงสั่นสะเทือนที่ไม่พึงประสงค์ ความผิดพลาดในกระบวนการโคลนนิ่งอาจขัดขวางการพัฒนาเครื่องส่งสัญญาณชีวภาพของพวกมัน ส่งผลให้เกิดการรบกวนของความถี่\n\nเมื่อโคลนเหล่านี้ติดต่อประสานงานกับรังในวงกว้าง โดรนรอบข้างทั้งหมดจะถูกรบกวนด้วยอาการเสียงวิ้งในหัวทางจิตที่ดังและปั่นป่วน มีสิ่งรบกวนสมาธิสูง และผลิตภาพกำลังตกอยู่ในความเสี่ยง"
 bio.130.a: "ไม่น่าอภิรมย์ แต่ก็พอทนได้"
 bio.130.b: "กำจัดโคลนที่มีปัญหาออกไป"

 bio.135.name: "ปัญหาการเคลื่อนไปพร้อมกัน"
 bio.135.desc: "การทดลองโคลนนิ่งเมื่อเร็วๆ นี้ส่งผลลัพธ์ที่ผิดปกติ โคลนบางตัวดูเหมือนจะเชื่อมโยงทางระบบประสาทกับผู้บริจาคยีน ทำให้ขยับเคลื่อนไหวตามกันไปโดยไม่ตั้งใจ\n\nปรากฏการณ์นี้ยังคงอยู่ไม่ว่าจะห่างกันเพียงใด โดยโดรนแต่ละตัวจะทำพฤติกรรมสะท้อนตามคู่ประสานงานของพวกมันที่อยู่อีกฟากหนึ่งของกาแล็กซี สิ่งนี้เปิดโอกาสที่น่าสนใจบางประการ\n\nเราสามารถริเริ่มโครงการที่นำทั้งตัวโคลนและผู้บริจาคมาทำงานร่วมกันในสภาพแวดล้อมที่เหมือนกันทุกประการ อีกทางเลือกหนึ่งคือเราสามารถสกัดสารสื่อประสาทที่เป็นตัวการออกมาเพื่อศึกษาวิจัยปรากฏการณ์นี้เพิ่มเติม"
 bio.135.a: "จัดตั้งสถานีงานที่เหมือนกันสำหรับผู้บริจาคและตัวโคลน"
 bio.135.b: "ผ่าตัดตัดขาดสายใยประสานงานที่ซิงค์กันอยู่"

 bio.140.name: "โคลนที่ไม่เข้าพวก"
 bio.140.desc: "ในความพยายามที่จะสร้างความแข็งแกร่งให้แก่รัง เราได้เพาะเลี้ยงกลุ่มโคลนจากวัตถุดิบของผู้บริจาคและเร่งการเติบโตทางชีวภาพของพวกมัน แม้จะเป็นตัวอย่างทางชีวภาพที่ดีเยี่ยม แต่โคลนเหล่านี้ไม่เข้ากับระบบ\n\nความเบี่ยงเบนนี้แม้จะสร้างความหนักใจ แต่ก็มอบโอกาสพิเศษ โดรนที่มีลักษณะเฉพาะตนเหล่านี้ซึ่งในปัจจุบันมีอัตลักษณ์เดี่ยวและมีความคิดที่เป็นอิสระ อาจเป็นประโยชน์ในการติดต่อประสานงานกับเอนทิตีภายนอกกลุ่ม ความสามารถในการคิดอย่างเป็นเอกเทศของพวกมันสามารถประสานรอยต่อในส่วนที่เสียงที่เป็นเอกภาพของรังดิ้นรนที่จะปรับตัว ทว่า ประโยชน์เหล่านี้ต้องแลกมาด้วยต้นทุน: ความตระหนักรู้ในความเป็นปัจเจกบุคคลที่เพิ่มขึ้นของพวกมันได้นำไปสู่ความไม่สงบ ซึ่งส่งผลกระทบต่อฟังก์ชันการรับรู้ระดับสูงบางอย่างของเรา"
 bio.140.a: "บังคับให้รวมเข้าด้วยกัน"
 bio.140.b: "ใช้ประโยชน์จากศักยภาพของพวกมัน"

 bio.145.name: "ความกังวลในการสร้าง"
 bio.145.desc: "จิตสำนึกร่วมของเรากำลังสับสนอลหม่าน ตอนนี้เรามีความสามารถในการสร้างสำเนาของตัวเองขึ้นมาได้ แต่เรายังลังเลและตั้งคำถามถึงประสิทธิภาพ (และแม้กระทั่งศีลธรรม) ของการกระทำดังกล่าว\n\nกระบวนการโคลนนิ่งต้องใช้ทรัพยากรจำนวนมาก ทรัพยากรเหล่านี้ควรนำไปใช้ที่อื่นดีกว่าหรือไม่ โดยเฉพาะอย่างยิ่งเมื่อการสืบพันธุ์ตามธรรมชาติมีแนวโน้มที่จะสร้างความหลากหลายทางพันธุกรรมได้มากกว่า?\n\nตามประวัติศาสตร์ที่ผ่านมา นี่ไม่ใช่วิธีการสืบพันธุ์ของเรา และเราไม่แน่ใจว่าพร้อมที่จะยอมรับการเปลี่ยนแปลงขั้นพื้นฐานนี้ของสปีชีส์เราหรือไม่"
 bio.145.a: "ไม่อาจมองข้ามประสิทธิภาพของการโคลนนิ่งได้"
 bio.145.b: "ความหลากหลายทางพันธุกรรมเป็นสิ่งสำคัญยิ่ง"

 bio.150.name: "ภาวะหมดไฟของรัง"
 bio.150.desc: "การทดลองกลายพันธุ์ของเราทำให้เกิดความผิดปกติขึ้นภายในรัง งานที่เคยดำเนินไปอย่างง่ายดายในตอนนี้กลับต้องใช้ความพยายามอย่างมาก เนื่องจากคำสั่งที่ขัดแย้งกันทำให้จิตสำนึกร่วมตึงเครียด\n\nแม้ว่าความเหนื่อยล้าที่เกิดขึ้นจะขู่ว่าจะทำให้โดรนที่มีประสิทธิภาพสูงสุดบางส่วนของเราหมดไฟ แต่มันก็เปิดโอกาสให้เช่นกัน\n\nเราต้องตัดสินใจ: เราจะหยุดพักเพื่อฟื้นฟู หรือจะผลักดันตัวเองให้ก้าวข้ามขีดจำกัด?"
 bio.150.a: "เราสมควรได้รับการพักผ่อน"
 bio.150.b: "เราค่อยนอนตอนที่ตายแล้วก็ได้"

 bio.151.name: "สดชื่นและกระปรี้กระเปร่า"
 bio.151.desc: "การตัดสินใจหยุดพักและฟื้นฟูของเราได้ผลิดอกออกผลแล้ว แรงกระตุ้นที่เคยขัดแย้งกันในอดีตได้สงบลง และหลอมรวมเป็นกระแสความคิดที่สอดประสานกันซึ่งช่วยขับเคลื่อนกลุ่มด้วยความชัดเจนใหม่อีกครั้ง\n\nโดรนที่เคยหมิ่นเหม่จะหมดไฟในตอนนี้ทำงานด้วยความแม่นยำอย่างไม่รู้จักเหน็ดเหนื่อย ช่วงเวลาแห่งการใคร่ครวญนี้ไม่เพียงแต่ช่วยลดความเหนื่อยล้าของกลุ่มเราลงเท่านั้น แต่ยังทำให้ความมุ่งมั่นของเราแข็งแกร่งขึ้นเพื่อเผชิญหน้ากับความท้าทายข้างหน้า"
 bio.151.a: "เรากำลังเปล่งประกายอย่างสดใส!"

 bio.155.name: "เชี่ยวชาญเฉพาะทางหรือปรับใช้ทั่วไป"
 bio.155.desc: "การกลายพันธุ์มอบประโยชน์มากมาย และด้วยการเสริมประสิทธิภาพแบบเจาะจง เราสามารถปรับตัวรังให้ตอบสนองวัตถุประสงค์ได้ดียิ่งขึ้น ตอนนี้เราสามารถสร้างความเชี่ยวชาญเฉพาะด้านในการผลิตแร่ได้โดยการติดตั้งรยางค์ไคตินที่แข็งแกร่ง\n\nหรืออีกทางเลือกหนึ่ง เราสามารถเสริมความสามารถโดรนทั้งหมดด้วยการปรับแต่งทั่วไป เพื่อให้พวกมันทำงานได้หลากหลายหน้าที่"
 bio.155.a: "พวกที่ทำงานได้ทั่วไปมีประโยชน์มากกว่า"
 bio.155.b: "มาเริ่มขุดกันเลย"

 bio.160.name: "การเบี่ยงเบนทางฟีโนไทป์"
 bio.160.desc: "การทดลองที่ดำเนินอยู่อย่างต่อเนื่องได้นำความซับซ้อนที่คาดไม่ถึงมาสู่รัง โดรนเริ่มแสดงลักษณะทางกายภาพที่แปลกใหม่: เปลือกนอกที่มีหนามแหลม, รยางค์ขนาดใหญ่เกินไป หรืออวัยวะรับสัมผัสที่ไวผิดปกติ\n\nแม้ว่าความเบี่ยงเบนเหล่านี้จะให้ผลดีอย่างเห็นได้ชัด แต่ก็สร้างภาระด้านเมแทบอลิซึมเช่นกัน รังต้องดิ้นรนเพื่อรักษาสมดุลของความตึงเครียดที่เพิ่มขึ้นนี้ คำถามที่ตามมาคือ: การกลายพันธุ์แค่ไหนจึงจะเพียงพอ?"
 bio.160.a: "ยอมรับในพลวัต"
 bio.160.b: "ต้องรักษาความเหนียวแน่นกลมเกลียวไว้"

 bio.165.name: "โหยหาอดีตวันวาน"
 bio.165.desc: "รังกำลังเปลี่ยนไป จากการปรับเปลี่ยนจีโนมของเรา เราได้เห็นการปรับปรุงด้านสุขภาพที่วัดผลได้ อย่างไรก็ตาม สิ่งนี้ทำให้เรามีความต้านทานต่อความทุกข์ยากทางจิตใจลดลง\n\nเราไม่ได้รังเกียจตัวตนในอดีตของเรา และแม้ว่าเราจะแข็งแกร่งขึ้นและมีความก้าวหน้าทางปัญญามากขึ้น แต่เราก็ยังคิดถึงความคุ้นเคยของรูปแบบความคิดแบบเก่าของเรา\n\nทั่วทั้งรังมีแต่ความรู้สึกอึดอัดใจอย่างลึกซึ้งว่าร่างกายของเราไม่ตรงกับจิตวิญญาณที่แท้จริงภายใน เราเติบโตจนเกินขอบเขตของตัวเองไปแล้วหรือยัง?"
 bio.165.a: "ชีวิตคือการเปลี่ยนแปลง"
 bio.165.b: "เราต้องไม่สูญเสียแก่นแท้ของเราไป"

 # Modifiers
 supremacy_denied: "ปฏิเสธความเป็นใหญ่"
 supremacy_denied_desc: "รัฐบาลกำลังใช้มาตรการขั้นเด็ดขาดเพื่อจำกัดความเหลื่อมล้ำทางพันธุกรรม"

 augment_appreciation: "การชื่นชมผู้เสริมประสิทธิภาพ"
 augment_appreciation_desc: "นักพันธุศาสตร์และผู้ได้รับการเสริมประสิทธิภาพทางพันธุกรรมเป็นสมาชิกที่มีคุณค่าของสังคมเรา"

 conscious_evolution: "วิวัฒนาการอย่างรู้คิด"
 conscious_evolution_desc: "เราจะก้าวไปข้างหน้าด้วยกัน"

 superior_individuals: "ปัจเจกบุคคลชั้นเลิศ"
 superior_individuals_desc: "ความสามารถระดับแนวหน้าย่อมนำมาซึ่งผลลัพธ์ระดับแนวหน้า"

 welfare_state: "รัฐสวัสดิการ"
 welfare_state_desc: "กำลังมีการดำเนินมาตรการริเริ่มสวัสดิการสังคมที่ได้รับการสนับสนุนจากรัฐบาล"

 selective_survival: "การอยู่รอดแบบเลือกสรร"
 selective_survival_desc: "แรงงานที่ได้รับการเสริมศักยภาพช่วยเพิ่มประสิทธิภาพให้กับอุตสาหกรรมของเรา"

 super_powered: "ผู้มีพลังพิเศษ"
 super_powered_desc: "ปัจเจกบุคคลที่มีพลังพิเศษช่วยเสริมสร้างการป้องกันของเรา"

 deceitful_dismissal: "การปลดออกแบบตลบแตลง"
 deceitful_dismissal_desc: "เรากำลังค้นหาผู้นำคนใหม่ที่มีความซื่อสัตย์"

 harvesting_halt: "การหยุดยั้งการเก็บเกี่ยว"
 harvesting_halt_desc: "การเก็บเกี่ยวอวัยวะจากโคลนถูกกำหนดให้เป็นเรื่องผิดกฎหมายแล้ว"

 clone_drivers: "ผู้ขับเคลื่อนร่างโคลน"
 clone_drivers_desc: "การใช้ประโยชน์จากร่างโคลนอย่างต่อเนื่องช่วยให้เราสามารถมุ่งเน้นไปที่ประสิทธิภาพทางอุตสาหกรรมได้"

 effective_surveillance: "ระบบที่มีประสิทธิภาพ"
 effective_surveillance_desc: "สังคมของเราให้คุณค่ากับสิทธิพลเมือง อย่างน้อยก็ในทางทฤษฎี"

 decriminalized_society: "อำนาจที่น่าเคารพเกรงขาม"
 decriminalized_society_desc: "ด้วยการรักษาความปลอดภัยเชิงรุก เรากำลังใช้มาตรการที่เข้มงวดมากขึ้นกับอาชญากรรม"

 mass_euthanasia: "การการุณยฆาตหมู่"
 mass_euthanasia_desc: "จะมีการใช้มาตรการขั้นเด็ดขาดกับการโคลนนิ่งที่ไม่ได้รับอนุมัติ"

 duplicated_inheritance: "การสืบทอดที่ซ้ำซ้อน"
 duplicated_inheritance_desc: "กิจกรรมทางทหารของเราเพิ่มขึ้นจากการหลั่งไหลเข้ามาของทหารเกณฑ์ใหม่"
 duplicated_inheritance_armies: "กองทัพโคลนผู้สืบทอด"

 mutant_crackdown: "การกวาดล้างมนุษย์กลายพันธุ์"
 mutant_crackdown_desc: "รัฐบาลใช้มาตรการเด็ดขาดเพื่อต่อต้านการแบ่งแยกกีดกัน"

 mutant_enclaves: "ชุมชนมนุษย์กลายพันธุ์"
 mutant_enclaves_desc: "ชุมชนมนุษย์กลายพันธุ์มอบผลการวิจัยทางสังคมที่มีคุณค่า"

 embracing_change: "โอบรับการเปลี่ยนแปลง"
 embracing_change_desc: "โอกาสใหม่ๆ สำหรับการแสดงออกทางสร้างสรรค์และความแปลกใหม่ช่วยส่งเสริมความหลากหลาย"

 biological_limitations: "ข้อจำกัดทางชีวภาพ"
 biological_limitations_desc: "เทคโนโลยีความปลอดภัยทางชีวภาพและการบังคับใช้กฎหมายจะช่วยรักษาประสิทธิภาพของข้อบังคับในปัจจุบัน"

 societal_diversification: "การกระจายความหลากหลายทางสังคม"
 societal_diversification_desc: "ประเด็นข้อกังวลด้านความรับผิดได้รับการจัดการในขณะที่ประชากรทำการทดลองปรับแต่งทางชีวภาพที่เป็นเอกลักษณ์"

 standardized_biology: "ชีววิทยามาตรฐาน"
 standardized_biology_desc: "ด้วยแม่แบบทางพันธุกรรมที่เป็นมาตรฐาน ความเหนียวแน่นกลมเกลียวในสังคมจึงดีขึ้น"

 blob_neutralized: "บล็อบถูกทำให้เป็นกลางแล้ว"
 blob_neutralized_desc: "มาตรการขั้นเด็ดขาดเกี่ยวกับบล็อบทำให้ทุกคนรู้สึกปลอดภัยขึ้น"

 globule_research: "การวิจัยก้อนชีวภาพ"
 globule_research_desc: "นักวิทยาศาสตร์ทำการทดลองทางชีวภาพที่มีการควบคุมกับบล็อบ"

 super_troopers: "ทหารระดับยอดมนุษย์"
 super_troopers_desc: "กรมทหารยอดมนุษย์ช่วยให้เราสามารถรักษาความสอดคล้องตามระเบียบไว้ได้"

 watch_the_watchers: "จับตาผู้เฝ้ามอง"
 watch_the_watchers_desc: "ใครจะจับตาดูผู้เฝ้ามอง? พวกเรานี่ไง"

 hero_council: "สภายอดวีรบุรุษ"
 hero_council_desc: "ที่ปรึกษายอดมนุษย์ช่วยสนับสนุนกระบวนการตัดสินใจของรัฐบาลเรา"

 hero_restrictions: "ข้อจำกัดของยอดมนุษย์"
 hero_restrictions_desc: "รัฐบาลของเราจะไม่พึ่งพาการสนับสนุนจากผู้มีพลังพิเศษอีกต่อไป"

 ethical_cloning: "การโคลนอย่างมีจริยธรรม"
 ethical_cloning_desc: "แนวทางปฏิบัติที่เข้มงวดช่วยจำกัดการใช้เทคโนโลยีการโคลนนิ่งจำนวนมาก"

 nuisance_crackdown: "การปราบปรามความก่อกวน"
 nuisance_crackdown_desc: "ร่างโคลนมีสิทธิเท่าเทียมกัน แต่ร่างต้นฉบับมีสิทธิที่เท่าเทียมมากกว่า"

 artistic_integrity: "บูรณภาพทางศิลปะ"
 artistic_integrity_desc: "ความพยายามทางศิลปะจะนำพาเราไปสู่ความยิ่งใหญ่"

 logic_first: "ตรรกะต้องมาก่อน"
 logic_first_desc: "เราจะกลายเป็นผู้นำแห่งกาแล็กซีในด้านวิทยาศาสตร์"

 practical_application: "การประยุกต์ใช้ในทางปฏิบัติ"
 practical_application_desc: "เราจะให้ความสำคัญกับการผลิตสินค้าและบริการ"

 crack_downs: "การปราบปรามอย่างเข้มงวด"
 crack_downs_desc: "ความเสถียรจะเพิ่มขึ้นภายใต้การบังคับใช้กฎหมายที่เข้มงวด"

 performative_reformation: "การปฏิรูปเพื่อสร้างภาพลักษณ์"
