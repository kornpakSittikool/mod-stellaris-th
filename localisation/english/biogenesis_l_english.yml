 concept_evopred_genetic_insights_desc: "§Yข้อมูลเชิงลึกทางพันธุกรรมสามารถรับได้โดย:§!\n$t$- การตั้งอาณานิคมบนดาวเคราะห์ดวงใหม่\n$t$- การกวาดล้างหรือการเลี้ยงดูเผ่าพันธุ์อื่นในฐานะปศุสัตว์\n$t$- การรักษาเผ่าพันธุ์อื่นภายในอาณาจักรของเราในฐานะทาสหรือสูงกว่า\n$t$- การว่าจ้างผู้นำต่างดาวใน ['concept_council',สภา] ของเรา\n$t$- การมีรัฐบริวารที่มีข้อตกลง §Yส่วยพันธุกรรม(แก้วแก้ว)§!\n$t$- สำหรับเมกะคอร์ป การรักษาข้อตกลงทางการค้า\n$t$- การเผชิญหน้ากับสิ่งมีชีวิตต่างดาวผ่านกิจกรรมต่างๆ"

