 VOIDSPAWN_FORCE_DECLINE: "เมื่อการผสานจิตใจเสร็จสิ้น เหลืออีกเพียงไม่กี่ขั้นตอนระหว่างเรากับความทะเยอทะยานของเรา เราต้องทำความคุ้นเคยกับร่างที่แบ่งปันร่วมกันใหม่นี้และทำการถ่ายโอนจิตใจของประชากรของเราต่อไป แต่ที่สำคัญกว่านั้นคือเราต้องบดขยี้ผู้ท้าชิงทุกคน ไม่ว่าพวกเขาจะเป็นใครก็ตาม\n\n§Hเป้าหมาย§!:\n- ค้นหาและสังหารเบเฮมอทคลาส 4 ตัวอื่น ๆ ทั้งหมดในกาแล็กซี\n- ทำสถานการณ์ความ เจ็บ ปวด ที่ เพิ่ม ขึ้นให้สำเร็จ\n- สังหารเอลเดอร์วอยด์สปอน"

 elder_voidspawn_chain_title: "วอยด์สปอนผู้บ้าคลั่ง"
 elder_voidspawn_chain_desc: "มีวอยด์สปอนขนาดใหญ่กำลังพุ่งชนกาแล็กซี มันต้องการจะสังหารเบเฮมอทขนาดใหญ่ และเป็นไปได้ว่าถ้าเราช่วยกำจัดพวกมันให้ มันอาจจะยอมละเว้นเรา\n\nเป้าหมาย: ค้นหาและสังหารเบเฮมอทระดับ 4 ทั้งหมดในกาแล็กซี"

 behemoth_victory_chain_title: "การถ่ายโอนจิตสู่เบเฮมอท"
 behemoth_victory_chain_desc: "เมื่อจิตใจหลอมละลายแล้ว ก็จะมีอีกไม่กี่ขั้นตอน ระหว่างเรากับความทะเยอทะยานของเรา เราต้องคุ้นเคยกับร่างกายใหม่ของเรา และย้ายจิตใจของคนของเรา แต่ที่สําคัญกว่านั้น\n\n§Hโอบี เจดส์§!:\n- หาและฆ่าคนอื่น ๆ ชั้น 4 เบเฮโมทในกาแล็กซี่\n- เติมความเจ็บปวดที่เพิ่มขึ้น\n- สเลย์ ผู้เฒ่าเวียดพัฒน์"

 behemoth_transference: "สายสัมพันธ์ที่มีอยู่ตอนนี้ระหว่างอสูรร้ายกับประชากรของเราทำให้การดำรงอยู่บนพื้นพิภพเปลี่ยนไป มันกลายเป็นเรื่องเปล่าประโยชน์เมื่อเทียบกับการได้รวมเป็นหนึ่งเดียวกับอสูรร้าย ตอนนี้ทุกคนโหยหาความเป็นหนึ่งเดียวในตัวอสูรร้าย และกำลังรู้สึก... หิวกระหาย"
 behemoth_transference_desc: "ความเชื่อมโยงที่ตอนนี้มีอยู่ ระหว่างอสูรและประชากรของเรา ทําให้แสงใหม่ หนึ่ง ใน บรรดา สิ่ง ไร้ ค่า เมื่อ เทียบ กับ การ กลาย เป็น สัตว์ ร้าย. ตอนนี้ทุกคนโหยหา เอกภาพในอสูร และรู้สึก... หิว"

