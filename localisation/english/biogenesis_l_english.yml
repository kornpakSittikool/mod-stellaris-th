 bio.1050.name: "การเฝ้าสะกดรอย"
 bio.1050.desc: "สายลับของเรากำลังซุ่มซ่อนอยู่รอบเขตตั้งถิ่นฐานของ [Target.GetSpeciesName] และในไม่ช้าจะสามารถเข้าถึงสิ่งปลูกสร้างของพวกเขาได้ ทุกอย่างต้องใช้เวลา พวกเราเป็นสายพันธุ์ที่มีความอดทน การล่าที่ดีที่สุดย่อมไม่มีวันเร่งรีบ"

 bio.1055.name: "เตรียมความพร้อม"
 bio.1055.desc: "เหยื่อของเราอยู่ในสายตาแล้ว เหล่านักล่าที่เราส่งไปแทรกซึม [Target.GetName] ต่างมีความมั่นใจ ในไม่ช้าพวกเขาจะสามารถเข้าถึงหอพักของ [Target.GetSpeciesName] และดีเอ็นเออันมีค่าทั้งหมดที่อยู่ภายใน"

 bio.1060.name: "เข้าจู่โจม"
 bio.1060.desc: "ตัวแทนของเราพร้อมแล้ว พวกเขาเข้าถึงหอพักของ [Target.GetSpeciesName] รวมถึงการปลอมตัวที่เหมาะสม แน่นอนว่านักล่าที่ดีต้องเตรียมเส้นทางหลบหนีไว้หลายทาง บางทางก็น่าอภิรมย์กว่าทางอื่น คงจะโชคร้ายไม่น้อยหากเราจำเป็นต้องใช้ท่อน้ำทิ้งในการหลบหนี"

 bio.1065.name: "ยีนที่ถูกโจรกรรม"
 bio.1065.desc: "สำเร็จแล้ว! สายลับของเรากลับมาพร้อมกับวัตถุดิบทางพันธุกรรมมากมาย เราจะต้องได้เห็นความก้าวหน้าครั้งใหญ่เมื่อเรากลายพันธุ์ครั้งถัดไป บางทีเราอาจจะเริ่มชื่นชอบรสชาติของพวก [From.Target.GetSpeciesName] ขึ้นมาด้วยก็เป็นได้"

