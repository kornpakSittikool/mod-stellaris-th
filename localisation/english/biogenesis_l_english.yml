 RT_INCOMPLETE_OVERMIND: "เน็ตเวิร์กจิตสำนึกร่วมที่ไม่สมบูรณ์"
 gov_war_splinter: "ชิ้นส่วนเสี้ยวแห่งสงคราม"
 gov_war_splinter_desc: "สัญชาตญาณที่ก้าวร้าวและชอบทำสงคราม ซึ่งเคยเป็นหนึ่งในหลายแรงกระตุ้นภายในไฮฟ์ ตอนนี้มันพยายามควบคุมชิ้นส่วนเสี้ยวอื่นๆ เมื่อไม่ได้กำลังต่อสู้กับตัวเอง"
 gov_growth_splinter: "ชิ้นส่วนเสี้ยวแห่งการเติบโต"
 gov_growth_splinter_desc: "ความปรารถนาในการวิวัฒนาการและการเปลี่ยนแปลงจากไฮฟ์ที่ล่มสลาย เนื่องจากมันมุ่งความสนใจไปที่การคิดค้นสิ่งใหม่ๆ ของตัวเองอย่างต่อเนื่อง ชิ้นส่วนเสี้ยวนี้จึงพบกับความยากลำบากในการควบคุมส่วนอื่นๆ"
 gov_control_splinter: "ชิ้นส่วนเสี้ยวแห่งการควบคุม"
 gov_control_splinter_desc: "สัญชาตญาณความหมกมุ่นในการปราบปรามความเบี่ยงเบนและส่งเสริมความเป็นเอกภาพเป็นตัวกำหนดชิ้นส่วนเสี้ยวนี้ มันต้องการควบคุมเสี้ยวอื่นๆ เหนือสิ่งอื่นใด แต่ความโกลาหลอย่างต่อเนื่องที่มีอยู่ในจักรวาลของเราก็เป็นสิ่งเบี่ยงเบนความสนใจอยู่ตลอดเวลา"
 gov_fused_ascendancy: "อำนาจปกครองที่หลอมรวม"
 gov_fused_ascendancy_desc: "ครั้งหนึ่งเคยแตกหัก ตอนนี้ได้รับการบูรณะแล้ว บาดแผลจากการแตกแยกไม่ใช่สิ่งที่ทำให้จักรวรรดิที่ตื่นขึ้นนี้เปราะบาง แต่เป็นสิ่งที่ทำให้มันใหม่ ไฮฟ์ไมนด์เก่าล้มเหลวไปแล้ว ส่วนอันนี้มีเป้าหมายเพื่อปกครองชั่วนิรันดร์"
 civic_fragmented_command: "กองบัญชาการที่กระจัดกระจาย"
 civic_fragmented_command_desc: "การครอบครองเพียงส่วนหนึ่งของสิ่งที่เคยเป็นทั้งหมด ทำให้จักรวรรดิที่ล่มสลายนี้ขาดแง่มุมหลักที่จำเป็นในการปกครองจักรวรรดิแห่งดวงดาว"
 civic_hyper_aggressive_drones: "โดรนก้าวร้าวรุนแรง"
 civic_hyper_aggressive_drones_desc: "โดรนในจักรวรรดิที่ล่มสลายนี้ต่อสู้กันเองอย่างต่อเนื่อง นำไปสู่การขาดแคลนทรัพยากรอย่างรุนแรง"
 civic_unstable_drones: "โดรนที่ไม่เสถียร"
 civic_unstable_drones_desc: "โดรนของจักรวรรดิที่ล่มสลายนี้ถูกบังคับให้วิวัฒนาการอย่างต่อเนื่อง พวกมันแทบจะไม่มีรยางค์ที่จำเป็นสำหรับงานที่ได้รับมอบหมายเลย"
 civic_stunted_drones: "โดรนแคระแกร็น"
 civic_stunted_drones_desc: "โดรนของจักรวรรดิที่ล่มสลายนี้ได้รับการจัดการอย่างละเอียดในระดับที่พวกมันไม่สามารถละทิ้งหน้าที่ของตนได้ด้วยเหตุผลใดๆ ก็ตาม แม้ว่าโรงงานจะเกิดเพลิงไหม้อยู่ก็ตาม"
 civic_restored_mind: "จิตสำนึกที่ฟื้นฟูแล้ว"
 civic_restored_mind_desc: "จิตสำนึกโบราณที่ได้รับการหลอมรวมขึ้นใหม่ในที่สุด และขับเคลื่อนด้วยสัญชาตญาณสมัยใหม่"
 civic_ancient_memories_of_war: "ความทรงจำโบราณแห่งสงคราม"
 civic_ancient_memories_of_war_desc: "ยุทธวิธีและขบวนรบที่เคยสูญหายไปก่อนหน้านี้ได้รับการจัดแสดงบนเวทีกาแล็กซีอีกครั้งโดยจักรวรรดิที่ตื่นขึ้นนี้ กองยานของพวกเขาจะบดบังแสงดาว"
 civic_ancient_memories_of_growth: "ความทรงจำโบราณแห่งการเติบโต"
 civic_ancient_memories_of_growth_desc: "วิธีการยกระดับความเจริญรุ่งเรืองที่เคยสูญหายไปก่อนหน้านี้ถูกนำมาใช้โดยจักรวรรดิที่ตื่นขึ้นนี้ โดรนของพวกเขาจะมีจำนวนมากกว่าดวงดาว"
 civic_ancient_memories_of_control: "ความทรงจำโบราณแห่งการควบคุม"
 civic_ancient_memories_of_control_desc: "การแสดงอำนาจและกฎระเบียบที่เคยสูญหายไปก่อนหน้านี้กำลังถูกนำมาใช้กระทำอีกครั้งโดยจักรวรรดิที่ตื่นขึ้นนี้ การเอื้อมมือคว้าของพวกเขาจะแผ่ไปถึงหมู่ดาว"

