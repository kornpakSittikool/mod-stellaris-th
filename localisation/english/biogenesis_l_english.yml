 d_lethal_ecosphere_blocker_desc: "ตัวอย่างการทดลองและสิ่งมีชีวิตทดลองที่ถูกทิ้งขว้างโดยเศษเสี้ยวสงครามต่างแย่งชิงความอยู่รอดในการคัดเลือกโดยธรรมชาติอันนองเลือดนี้ สนามฝึกซ้อมที่เต็มไปด้วยความมุ่งร้ายอย่างยิ่งยวดนี้จะพิสูจน์แล้วว่าส่งผลถึงชีวิตสำหรับทหารส่วนใหญ่ แต่ผู้รอดชีวิตจะก้าวออกมาในฐานะเครื่องจักรสังหารที่ไร้ความปรานีอย่างไม่ต้องสงสัย"
