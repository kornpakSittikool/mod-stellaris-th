 bio.1005.name: "คงความสามารถ"
 bio.1005.desc: "เผ่าพันธุ์ของเราทวีความซับซ้อนยิ่งขึ้น หลังจากแสวงหาวัตถุดิบทางพันธุกรรมใหม่ๆ ทั่วดวงดาว บัดนี้เราพร้อมแล้วที่จะรับแง่มุมใหม่เข้ามา ต้องขอบคุณการทำงานหนักของ [Owner.GetScientistPlural] ของเราที่ทำให้เรามีทางเลือก\n\nไม่ว่าเราจะตัดสินใจเช่นไร ย่อมจะส่งผลต่ออนาคตของพวก [Owner.GetSpeciesName] ไปอีกหลายชั่วอายุคน"
 bio.1005.tt: "เพิ่มคุณลักษณะเผ่าพันธุ์ใหม่ให้แก่เผ่าพันธุ์หลักของเรา"
 bio.1005.pop_growth: "เผ่าพันธุ์ของเราต้องเติบโตเร็วขึ้น!"
 bio.1005.pop_output: "ทำให้เรามีผลิตภาพมากขึ้นได้หรือไม่?"
 bio.1005.leader: "ผู้นำของเราต้องการทุกความได้เปรียบ"
 bio.1005.habitability: "เราต้องปรับตัวให้เข้ากับสภาพภูมิอากาศที่เปลี่ยนแปลงไป"
 bio.1005.upkeep: "ลดค่าบำรุงรักษาที่จำเป็นในการเลี้ยงดูประชากรของเรา"
 bio.1005.humanoid: "คุณลักษณะของสิ่งมีชีวิตคล้ายมนุษย์อาจช่วยเพิ่มความหลากหลายในการปรับตัวของเราได้"
 bio.1005.mammalian: "ดีเอ็นเอของสัตว์เลี้ยงลูกด้วยนมมีความลับอีกมากมายซ่อนอยู่"
 bio.1005.reptilian: "สัตว์เลื้อยคลานช่างมีเอกลักษณ์เฉพาะตัวยิ่งนัก"
 bio.1005.avian: "สัตว์ปีกสามารถมอบความคล่องแคล่วอันหาใครเปรียบมิได้ให้แก่เรา"
 bio.1005.arthropoid: "สัตว์ข้อปล้องช่างกรุบกรอบน่าเคี้ยวดีแท้"
 bio.1005.molluscoid: "แม้แต่สัตว์จำพวกหอยก็ยังมอบบทเรียนบางอย่างให้แก่เราได้"
 bio.1005.fungoid: "พวกเห็ดราแพร่กระจายตัวอย่างรวดเร็ว — เราก็ทำได้เช่นกัน"
 bio.1005.plantoid: "ประสิทธิภาพในการใช้พลังงานของพวกพฤกษาต่างดาวอาจมีประโยชน์"
 bio.1005.lithoid: "แม้จะบริโภคยาก แต่ดีเอ็นเอของสิ่งมีชีวิตประเภทหินก็นำเสนอความเป็นไปได้ที่น่าลิ้มลอง"
 bio.1005.necroid: "เนื้อหนังที่เน่าเปื่อยก็ยังคงเป็นเนื้อหนังอยู่ดี"
 bio.1005.aquatic: "การปรับตัวเข้ากับน้ำเสนอวิถีการเอาชีวิตรอดที่เหนือไปกว่าท้องทะเล"
 bio.1005.toxoid: "พวกสิ่งมีชีวิตพิษนั้นช่าง§Gเปรี้ยว§!เข็ดฟัน"
 bio.1005.infernal: "พวกสิ่งมีชีวิตชอบร้อนนั้นร้อน§Rแผดเผา§! ทว่าบัดนี้เราสามารถรับมือได้แล้ว"
 bio.1005.plasmic: "การทำให้ดีเอ็นเอพลาสมาเสถียรนั้นจะเป็นความสำเร็จอันน่าทึ่ง"
 bio.1005.leviathan: "ไททันแห่งกาแล็กซีสามารถสอนอะไรแก่เราได้บ้างนะ?"
 bio.1005.psionic: "สิ่งใดภายในจีโนมพลังจิตที่ขับเคลื่อนพละกำลังทางปัญญาอันล้ำเลิศเช่นนี้?"
