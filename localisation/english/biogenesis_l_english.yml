 sewer_sweep: "กวาดล้างท่อระบายน้ำ"
 sewer_sweep_desc: "ไม่ว่าอะไรก็ตามที่กำลังคลานอยู่ข้างล่างนั้น... เราไม่ชอบมันเลย"

