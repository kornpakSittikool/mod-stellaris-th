 ap_behemoths: "ความโกรธเกรี้ยวของเบเฮมอธ"
 ap_behemoths_desc: "สัตว์นักล่าชั้นยอดแห่งดวงดาวไม่ถูกจำกัดด้วยข้อจำกัดเล็กน้อย และเช่นเดียวกันนี้ เราจะละทิ้งจุดอ่อนทางชีวภาพที่ฉุดรั้งเราไว้และกลายเป็นหนึ่งเดียวกับพลังแห่งธรรมชาติ"
 must_use_bioships: "£trigger_no£ จำเป็นต้องใช้รูปแบบยานพาหนะแบบ §Yชีวภาพ§!"

 behemoth_crisis_chain_title: "วิกฤตการณ์เบฮีมอธ"
 behemoth_crisis_chain_desc: "หมู่ดาวเป็นเพียงเชื้อเพลิงให้แก่ความหิวกระหายของเรา และภัยพิบัติเป็นเพียงผืนดินที่ทำให้ความทะเยอทะยานของเราเบ่งบาน เราจะท้าทายกฎเกณฑ์ทางธรรมชาติเพื่อหลอมสร้างอสุรกายที่ยิ่งใหญ่และไม่อาจหยุดยั้งได้ จนมันสามารถปรับเปลี่ยนโครงสร้างจักรวาลขึ้นมาใหม่ได้"

