 proactive_management: "การจัดการเชิงรุก"
 proactive_management_desc: "วิทยาศาสตร์เชิงทฤษฎีไม่มีอะไรมากไปกว่าการคาดเดา ผู้นำของเราควรให้ความสำคัญกับภารกิจที่ได้รับมอบหมาย"

