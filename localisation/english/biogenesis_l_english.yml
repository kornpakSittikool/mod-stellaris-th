 death_world_desc: "แม้ว่าในทางเทคนิคจะสามารถอยู่อาศัยได้ แต่โลกใบนี้คือฝันร้ายที่แท้จริงสำหรับการใช้ชีวิต สัตว์ป่าและพืชพรรณท้องถิ่นทุกชนิด ตั้งแต่พืชไปจนถึงสัตว์ ไปจนถึงสิ่งมีชีวิตตัวเล็กๆ ที่ดูไม่มีพิษมีภัย ล้วนพิสูจน์แล้วว่าอันตรายยิ่งกว่าสัตว์นักล่าที่น่ากลัวที่สุดบนดาวบ้านเกิดของเราเสียอีก"
