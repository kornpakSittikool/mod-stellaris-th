 # CLONING

 bio.340.name: "ร่างโคลนมากเกินไป!"
 bio.340.desc: "สถานผลิตร่างโคลนของเราดำเนินงานได้อย่างมีประสิทธิภาพมากกว่าที่เราคาดไว้ในตอนแรก ดังนั้นตอนนี้เราจึงมีร่างโคลนส่วนเกิน\n\nการรวมกลุ่มโดรนจำนวนมากขนาดนี้เข้ากับสังคมกำลังกลายเป็นเรื่องที่ท้าทาย"
 bio.340.a: "สมาชิกใหม่ของรังควรได้รับการอพยพย้ายถิ่นฐาน"
 bio.340.b: "เพิ่มกำลังการผลิต หมุนเวียนร่างโคลน"

 bio.350.name: "ร่างที่ว่างเปล่า"
 bio.350.desc: "โดรนจำนวนหนึ่งได้รับผลกระทบจากความผิดพลาดของระบบที่สถานผลิตร่างโคลนหลักแห่งหนึ่ง สารปนเปื้อนทางพันธุกรรมบางอย่างได้หลุดรอดเข้าสู่กระบวนการผลิตซ้ำ ส่งผลให้ร่างโคลนชุดหนึ่งเติบโตขึ้นมาโดยไม่มีความสามารถในการคิดคำนึง\n\nพวกมันเป็นเพียงวัตถุทางชีวภาพโดยแท้จริง ปราศจากความรู้สึกนึกคิดใดๆ และไม่มีการทำงานของสมองขั้นสูง จนกว่าเรื่องนี้จะได้รับการแก้ไขอย่างสมบูรณ์ และปัญหาในการผลิตได้รับการซ่อมแซม ผลผลิตของสถานผลิตแห่งนี้จะลดลง"
 bio.350.a: "ความรู้สึกนี้มัน... ช่างปลอบประโลมจิตใจ"
 bio.350.a.tt: "100 £pop£ §Hประชากรก่อนมีภูมิปัญญา§! ถูกสร้างขึ้นบน §Y[owner.capital_scope.GetName]§!"
 bio.350.b: "สร้างชุดใหม่ออกมา"

 bio.365.name: "อภิปรัชญาของรัง"
 bio.365.desc: "จากส่วนลึกในจิตสำนึกร่วม คำถามหนึ่งได้ปรากฏขึ้น: สักวันหนึ่งร่างโคลนจะเข้ามาแทนที่พวกเราทั้งหมดหรือไม่?\n\nความพยายามในช่วงเริ่มต้นในการผลิตซ้ำทางพันธุกรรมดำเนินไปด้วยดีอย่างมาก จนเราสงสัยว่าวิธีการขยายพันธุ์ที่มีประสิทธิภาพนี้จะเข้าแทนที่การทำตามวิถีธรรมชาติในที่สุดหรือไม่\n\nหากเป็นเช่นนั้น สักวันหนึ่งรังอาจไม่มีผู้บริจาคดั้งเดิมเหลืออยู่เลย มีเพียงร่างโคลนของร่างโคลนของร่างโคลน... นี่หมายความว่าอย่างไรสำหรับเราในฐานะเผ่าพันธุ์? คำถามที่ไร้คำตอบ และเป็นคำถามที่บ่มเพาะความขัดแย้ง แต่เราก็หลีกเลี่ยงไม่ได้ที่จะต้องถามมัน"
 bio.365.a: "ตัวคำถามเองนั้นมีคุณค่าในตัวเอง"
 bio.365.b: "คำถามเช่นนั้นเป็นเรื่องที่เบี่ยงเบนความสนใจ"

