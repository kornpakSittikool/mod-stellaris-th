 feral_insight: "ความเข้าใจวิถีสัตว์ร้าย"
 feral_insight_name: "$feral_insight$:"
 feral_insight_value: "£feral_insight£ $VAL|0$"
 feral_insight_current_value: "มูลค่าปัจจุบัน: §Y$VALUE|0$§!"
 feral_insight_gaining: "ทำ §Hเป้าหมายวิกฤตการณ์§! ให้สำเร็จเพื่อรับ £feral_insight£ §Y$feral_insight$§! เพิ่มขึ้น"
 feral_insight_desc: "พวกเรากำลังศึกษาเรื่องวงจรการหาอาหารและพฤติกรรมของสิ่งมีชีวิตขนาดมหึมา"

 feral_insight_crisis_objective: "เป้าหมายวิกฤตการณ์"
 feral_insight_crisis_objective_gained: "ได้รับ $feral_insight$"
 feral_insight_crisis_objective_reward: "$REWARD$"
 feral_insight_crisis_objective_progress: "เราได้รับ £feral_insight£ $AMOUNT$ จากเป้าหมายวิกฤตการณ์นี้"

 feral_insight_crisis_description_title: "วิกฤตการณ์เบฮีมอธ"
 feral_insight_crisis_description: "$menace_crisis_description_intro$\n\nเหล่าเลเวียธานผู้อาศัยอยู่ในความเวิ้งว้างนั้นทรงพลังและแข็งแกร่งอย่างหาที่เปรียบไม่ได้ แต่พวกมันขาดเป้าหมายและความทะเยอทะยาน การผสานสรีระที่ยิ่งใหญ่ของพวกมันเข้ากับความแข็งแกร่งทางสติปัญญาของเรา จะทำให้เกิดสัตว์อวกาศรุ่นใหม่ และนำเราไปสู่จุดสูงสุดของการครอบครองกาแล็กซี"
 feral_insight_crisis_howto_title: "การให้กำเนิดเบฮีมอธ"
 feral_insight_crisis_howto: "การทำ §Hเป้าหมายวิกฤตการณ์§! จะสร้าง £feral_insight£§Hความเข้าใจวิถีสัตว์ร้าย§! ซึ่งจะช่วยให้เราสามารถปลดปล่อยศักยภาพทางชีวภาพขั้นสูงสุดของเราได้"

 feral_insight_crisis_level_unlocked: "ที่ $LEVEL$ คุณจะได้รับรางวัล:\n"
 feral_insight_crisis_level_locked: "สิ่งที่จำเป็นในการปลดล็อกระดับนี้:\n"
 feral_insight_crisis_level_unlock: "มี £feral_insight£ §Y$CURRENCY$§! ความเข้าใจวิถีสัตว์ร้าย"
 feral_insight_crisis_level_desc: "ในการก้าวหน้าผ่านระดับวิกฤตการณ์ จงสะสม £feral_insight£§Hความเข้าใจวิถีสัตว์ร้าย§! วิจัยโครงการวิกฤตการณ์พิเศษ และเลี้ยงดูเบฮีมอธของคุณให้เติบโต"

 #Crisis Perks

 menp_behemoth_objectives: "ความเข้าใจวิถีสัตว์ร้าย"
 unlocks_behemoth_objectives: "เปิดใช้งานการสะสม £feral_insight£ §Y$menp_behemoth_objectives$§! โดยการทำ §Hเป้าหมายวิกฤตการณ์§! ให้สำเร็จ\n"
 menp_behemoth_objectives_desc: "การศึกษาพฤติกรรมของเบฮีมอธจะช่วยให้บรรลุเป้าหมายสูงสุดของการก้าวข้ามขีดจำกัด เราจะละทิ้งข้อจำกัดทางชีวภาพที่ควบคุมสิ่งมีชีวิตที่กำเนิดบนดวงดาว"
 menp_behemoth_bioship_1: "ไคตินที่แข็งแกร่งขึ้น"
 menp_behemoth_bioship_1_desc: "การทนทานต่อความโหดร้ายของอวกาศจำเป็นต้องมีเปลือกนอกที่หนา ความแข็งแกร่งภายนอกจะช่วยรับประกันการมีชีวิตรอดได้แม้ในสภาวะที่เยือกเย็นและสิ้นหวังที่สุด"
 menp_behemoth_society_1: "การทดสอบภาคสนามแบบเร่งรัด"
 menp_behemoth_society_1_desc: "การทดลองในห้องปฏิบัติการเป็นจุดเริ่มต้นที่ดี แต่ความก้าวหน้าที่แท้จริงต้องการการทดสอบภาคสนามจริงที่มีความเสี่ยงสูง"
 menp_behemoth_food_1: "พืชผลขนาดมหึมา"
 menp_behemoth_food_1_desc: "การเติมเต็มความกระหายอาหารของเบฮีมอธนั้นเป็นงานที่ยากลำบากอย่างยิ่ง การผลิตอาหารดัดแปลงพันธุกรรมในระดับมหภาคเป็นเพียงจุดเริ่มต้นเท่านั้น"

 menp_behemoth_egg: "โรงเพาะฟักขนาดมหึมา"
 unlocks_behemoth_egg: "ปลดล็อกสิ่งก่อสร้างขนาดมหึมา §Yไข่เบฮีมอธ§!\n"
 menp_behemoth_egg_desc: "ไข่ขนาดมหึมาย่อมต้องการโรงเพาะฟักที่ยิ่งใหญ่ไม่แพ้กัน โรงเพาะฟักในวงโคจรนี้ต้องอยู่ในระยะห่างจากดาวฤกษ์ที่คำนวณไว้อย่างดี เพื่อรองรับขนาดสัดส่วนที่ใหญ่โตมโหฬารซึ่งจำเป็นสำหรับโอบอุ้มเบฮีมอธ"
 menp_behemoth_bioship_2: "การกระตุ้นต่อมที่ดีขึ้น"
 menp_behemoth_bioship_2_desc: "ด้วยหัววัดที่สร้างขึ้นเป็นการเฉพาะ เราได้ทำการกระตุ้นต่อมไร้ท่อของเบฮีมอธเพื่อผลิตโกรทฮอร์โมนสำหรับการเร่งการเจริญเติบโต"
 menp_behemoth_society_2: "การค้นคว้าแนวขวาง"
 menp_behemoth_society_2_desc: "ที่จุดตัดระหว่างการคัดเลือกโดยธรรมชาติและวิศวกรรมชีวภาพ กองกำลังอันยากจะหาใดเทียบเคียงได้ถือกำเนิดขึ้น"
 menp_behemoth_food_2: "การอัดแน่นด้วยสารอาหาร"
 menp_behemoth_food_2_desc: "การตอบสนองต่อความต้องการอาหารของเบฮีมอธอาจพิสูจน์ได้ว่าเป็นเรื่องที่เป็นไปไม่ได้ การผลิตอาหารดัดแปลงพันธุกรรมในระดับมหภาคเป็นเพียงจุดเริ่มต้นเท่านั้น"

 menp_behemoth_hatchling: "ทายาทผู้ยิ่งใหญ่"
 unlocks_behemoth_hatchling: "ช่วยให้เราสามารถ §Yฟักไข่§! สิ่งก่อสร้างขนาดมหึมาไข่เบฮีมอธได้\n"
 menp_behemoth_hatchling_desc: "ครอกเบฮีมอธจะแผ่ขยายครอบคลุมระบบดาวต่างๆ เพื่อนบ้านในกาแล็กซีของเราจะต้องเคารพสิทธิการปกครองตนเองของเหล่าตัวอ่อนของเรา มิฉะนั้นพวกเขาก็จะกลายเป็นอาหาร"
 menp_behemoth_bioships_3: "วงจรการเติบโตที่รวดเร็วขึ้น"
 menp_behemoth_bioships_3_desc: "การเร่งการพัฒนาสัตว์อวกาศยักษ์มีความสำคัญต่อเป้าหมายสูงสุดของเรา เราจะทำให้แน่ใจว่าโครงสร้างพื้นฐานของเราจะเติบโตควบคู่กันไป"
 menp_behemoth_society_3: "ความเชี่ยวชาญด้านวิศวกรรมชีวภาพ"
 menp_behemoth_society_3_desc: "จากการลองผิดลองถูกอย่างเข้มงวด เราได้พัฒนาขีดความสามารถทางวิทยาศาสตร์ของเรา ตอนนี้เรายืนอยู่ในฐานะวิศวกรชีวภาพที่โดดเด่นที่สุดของกาแล็กซี"
 menp_behemoth_mind_control: "การหล่อหลอมความคิดระดับลึก"
 unlocks_behemoth_mind_control: "ช่วยให้เราสามารถโน้มน้าวความคิดของ §Yเบฮีมอธ§! ได้\n"
 menp_behemoth_mind_control_desc: "สติปัญญาโดยรวมของเรากำลังตื่นขึ้น โหยหาบางสิ่งที่ใหญ่กว่าและดีกว่า ความทะเยอทะยานของเราไม่มีขีดจำกัด"

 menp_behemoth_hatchling_2: "การเติบโตที่ไร้ขีดจำกัด"
 unlocks_behemoth_hatchling_2: "ช่วยให้ §Yเบฮีมอธ§! ที่ได้รับอาหารสามารถดักแด้เข้ารังไหมเพื่อเติบโตทั้งขนาดและพลังงานอย่างมหาศาล\n"
 menp_behemoth_hatchling_2_desc: "อสุรกายหลุดพ้นจากพันธนาการแล้ว สิ่งมีชีวิตที่เคยเป็นเพียงตัวอ่อนเกิดใหม่กำลังกลายเป็นพลังธรรมชาติที่ดุร้ายและไม่อาจยอมจำนนได้อย่างรวดเร็ว"
 menp_behemoth_bioship_4: "สิ่งมีชีวิตที่แข็งแกร่งยิ่งขึ้น"
 menp_behemoth_bioship_4_desc: "ด้วยแรงขับเคลื่อนจากความหิวโหยและความโกรธเกรี้ยวที่ไร้ที่สิ้นสุด เบฮีมอธกำลังก้าวขึ้นสู่ระดับพลังที่อลหม่าน อาวุธชีวภาพของพวกมันได้รับการติดตั้งและพร้อมที่จะสร้างความหายนะให้กับทั้งศัตรูและผู้ที่ผ่านไปมา"
 menp_behemoth_mutation_research: "การกลายพันธุ์ของเบฮีมอธ"
 unlocks_behemoth_mutation_research: "ปลดล็อก §Yโครงการพิเศษ§! เพื่อปรับแต่งทิศทางการพัฒนาพันธุกรรมของ §Yเบฮีมอธ§!\n"
 menp_behemoth_mutation_research_desc: "เราจะจัดเรียงวัสดุพันธุกรรมของเบฮีมอธใหม่ในขณะที่พวกมันเติบโตต่อไป เพื่อส่งเสริมลักษณะทางสรีรวิทยาที่เป็นประโยชน์ที่สุด"
 menp_behemoth_mind_control_2: "การส่งกองกำลังตัวอย่างระดับสูงสุด"
 unlocks_behemoth_mind_control_2: "เราจะสร้างการเชื่อมต่อทางจิตที่ลึกซึ้งยิ่งขึ้นกับ §Yเบฮีมอธ§! ของเรา\n"
 menp_behemoth_mind_control_2_desc: "จุดสูงสุดของความสมบูรณ์แบบทางพันธุกรรมจะไม่ถูกจำกัดอยู่แค่ในพรมแดนปัจจุบันของเรา มันต้องถูกเผยแพร่ไปสู่กาแล็กซี"

 menp_behemoth_mind_meld: "การประสานจิต"
 unlocks_behemoth_mind_meld: "เข้าควบคุม §Yเบฮีมอธระดับ IV§! อย่างสมบูรณ์ — สิ่งมีชีวิตที่ไร้ผู้เทียบเคียงในการครอบครองกาแล็กซี\n"
 menp_behemoth_mind_meld_desc: "จิตของเราสู่เบฮีมอธ จิตของเบฮีมอธสู่เรา ความเกรี้ยวกราดของมันจะกลายเป็นของเรา เรายอมถูกกลืนกินด้วยความเต็มใจ และเมื่ออสุรกายเสพสมจิตสำนึกร่วมของเรา เราก็รับรู้ถึงความโกรธเกรี้ยวของมัน มันกลายเป็นเรา และเรากลายเป็นอสุรกาย"
 menp_behemoth_primal_roar: "เสียงคำรามดึกดำบรรพ์"
 unlocks_behemoth_primal_roar: "เรียกอสุรกายตัวที่ใหญ่ที่สุดออกมาและท้าทายมันเพื่อครอบครองความว่างเปล่า\n"
 menp_behemoth_primal_roar_desc: "มันแล่นผ่านตัวเรา แผดเผา ฉีกกระชาก มอดไหม้ ความเกรี้ยวกราด เสียงคำรามดึกดำบรรพ์ กาแล็กซีนี้จะลุกไหม้ในเปลวเพลิงแห่งความโกรธแค้นของเรา"
 menp_behemoth_ever_hungry: "หิวโหยตลอดกาล"
 unlocks_behemoth_ever_hungry: "ปลดล็อกสถานการณ์ $behemoth_finale_situation$ กัดกินกาแล็กซีนี้เพื่อเติบโตทางขนาดและพลังงาน และกลายเป็นสุดยอดนักล่าแห่งห้วงอวกาศ\n"
 menp_behemoth_ever_hungry_desc: "เราอยู่ในความทรมาน ความต้องการอาหารอย่างไม่สิ้นสุดกลายมาเป็นเป้าหมายเดียวในการดำรงอยู่ของเรา มีหลุมลึกภายในตัวเราที่ไม่อาจเติมเต็มได้เลย ไม่ว่าเราจะกินเข้าไปมากเท่าใดก็ตาม สิ่งที่เราต้องการก็คือการเลี้ยงฉลองขนาดเท่ากาแล็กซีเพื่อระงับความเจ็บปวดนี้"
 menp_behemoth_egg_2: "ทายาทผู้หิวกระหาย"
 unlocks_behemoth_egg_2: "ปลดล็อกความสามารถให้ §Yเบฮีมอธระดับ IV§! สามารถวาง §Yไข่§! และรักษาเผ่าพันธุ์ของมันไว้ต่อไปได้\n"
 menp_behemoth_egg_2_desc: "ลูกหลานของเราจะกัดกินซากศพของกาแล็กซี ความหิวโหยของพวกเขาไม่มีวันสิ้นสุด พวกเขาจะเลี้ยงฉลองไปตราบชั่วนิรันดร์"

 mod_shipclass_military_hull_mult: "ตัวถังยานรบ"
 mod_country_resource_max_food_add: "ความจุคลังเก็บอาหาร"
 mod_starbase_shipyard_build_alloys_cost_mult: "ราคาแร่อัลลอยสร้างยาน"

 crisis_egg_built: "£trigger_yes£ ได้§Yสร้าง§!สิ่งก่อสร้างขนาดใหญ่ §H$behemoth_egg$§! แล้ว"
 crisis_egg_required: "£trigger_no£ ได้§Yสร้าง§!สิ่งก่อสร้างขนาดใหญ่ §H$behemoth_egg$§! แล้ว"
 crisis_egg_hatched: "£trigger_yes£ ได้§Yฟัก§! §H$behemoth_hatchling$§! จาก §H$behemoth_egg$§! แล้ว"
 crisis_hatchling_required: "£trigger_no£ ได้§Yฟัก§! §H$behemoth_hatchling$§! จาก §H$behemoth_egg$§! แล้ว"

 district_mindlink: "มหานครเชื่อมโยงจิต"
 district_mindlink_plural: "$district_mindlink$"
 district_mindlink_desc: "ยอดหอคอยสูงเสียดฟ้าตระหง่านเหนือศูนย์กลางประชากร มอบโอกาสให้ผู้สมัครใจได้สื่อสารทางจิตกับอสูรร้ายโดยตรง"

 planet_building_buffer: "การแปลงสภาพมหานคร"
 planet_building_buffer_desc: "แม้ว่าการสร้างหอคอยจิตเพื่อสื่อสารกับอสูรร้ายจะเป็นกระบวนการที่รวดเร็ว แต่เราก็ต้องวางแผนสำรองเพื่อรับประกันว่าโครงสร้างพื้นฐานของดาวเคราะห์จะยังคงทำงานได้อย่างต่อเนื่อง"

 mod_job_transference_volunteer_add: "ตำแหน่งงาน $job_transference_volunteer$"
 planet_transference_volunteers: "$job_transference_volunteer_plural$"
 job_transference_volunteer: "ผู้สมัครใจถ่ายโอนจิต"
 job_transference_volunteer_plural: "$job_transference_volunteer$วินาที"
 job_transference_volunteer_desc: "สำหรับหลายคน การเชื่อมโยงจิตกับอสูรร้ายเป็นเพียงเรื่องรองที่เกิดขึ้นตลอดเวลาแต่ห่างไกล ทว่าสำหรับบางคน ความต้องการที่จะหลอมรวมกับมันนั้นไม่อาจต้านทานได้ ผู้สมัครใจเหล่านี้ทำหน้าที่เป็นสื่อกลางในขณะที่จิตใจของพวกเขาค่อย ๆ ถูกดูดซับเข้าสู่จิตสำนึกร่วมของอสูรร้าย"
 job_transference_volunteer_effect_desc: "\n£job_transference_volunteer£ [GetTransferenceVolunteerDrone] ผลิต £unity£ §Yความสามัคคี§!, เพิ่ม $r_stability$ ของดาวเคราะห์ และทำให้§Yยานอวกาศ§!ของเราแข็งแกร่งขึ้น\nประชากร §Y10%§! ที่ทำงานนี้จะถูก§Yถ่ายโอน§!ทุก ๆ 6 เดือน ซึ่งจะเป็นการสังหารพวกเขา แต่จะทวีคูณผลผลิตทรัพยากรของเขตพื้นที่\n\n§Gประชากรที่ถูกถ่ายโอนแล้ว§!: [num_tranferred_pops]"
 mod_job_transference_drone_add: "งาน [GetTransferenceVolunteerDrone]"
 job_transference_drone: "โดรนถ่ายโอนจิต"
 job_transference_drone_plural: "$job_transference_drone$วินาที"
 job_transference_drone_desc: "แม้ว่าการเชื่อมโยงจิตจะสร้างการเชื่อมต่อถาวรระหว่างอสูรร้ายกับพวกเรา แต่การถ่ายโอนจิตก็เป็นกระบวนการที่ช้า หากไม่มีมาตรการป้องกันเหล่านี้ เราอาจเสี่ยงที่จะทำให้จิตใจของทั้งสองฝ่ายแตกสลายและทำลายทุกสิ่งทุกอย่าง"
 MESSAGE_POPS_TRANSFERRED_TITLE: "ถ่ายโอนประชากรแล้ว"
 MESSAGE_POPS_TRANSFERRED_DESC: "ประชากร $VALUE|Y$ หน่วยได้รับการถ่ายโอนแล้ว ตอนนี้จิตใจของพวกเขาใช้ชีวิตอยู่ภายในอสูรร้าย"

 #Crisis Events

 biocrisis.50.name: "ระดับ 1: การทดลองในระยะตัวอ่อน"
 biocrisis.50.desc: "เราอยู่พร้อมยาปฏิชีวนะ กับหลอดเลือดของเรา แต่บางสิ่งบางอย่างที่สําคัญ\n\nเรา ได้ รับ แรง บันดาล ใจ จาก ผู้ ที่ ไม่ มี ความ ทะเยอทะยาน มาก กว่า เรา จึง เริ่ม พยายาม อย่าง ทะเยอทะยาน ที่ สุด คือ การ กําเนิด ลูก ที่ ใหญ่ ที่ สุด. \"เบเฮโมท\"เราดำรงอยู่ร่วมกันอย่างพึ่งพาอาศัยกับภาชนะชีวภาพของเรา แต่มีบางสิ่งที่สำคัญยิ่งยวดที่ยังคงรอดพ้นเราไปเสมอ...\n\nด้วยแรงบันดาลใจจากสิ่งมีชีวิตในห้วงอวกาศขนาดใหญ่ เราจึงเริ่มต้นภารกิจที่ทะเยอทะยานที่สุดของเรา นั่นคือการให้กำเนิดสิ่งมีชีวิตที่ใหญ่ที่สุดในหมู่พวกมันทั้งหมด สิ่งนี้ "
 biocrisis.50.a: "ทายาทของเราจะบดบังแสงดาว"

 biocrisis.55.name: "ระดับ 2: การตระหนักรู้ในตนเอง"
 biocrisis.55.desc: "ในขณะที่ยานก่อสร้างกำลังทำงานเพื่อประกอบไซโกตและเปลือกของมันในวงโคจรของดาวแก๊สยักษ์ อุตสาหกรรมอาหารของเราก็ได้แปรรูปสารอาหารที่จำเป็นสำหรับการสร้างไข่ขาวของไข่เบเฮมอธ ทว่าการสร้างไข่แดงที่ได้รับการปฏิสนธิและมีชีวิตรอดได้นั้นพิสูจน์แล้วว่ามีความท้าทายมากกว่ามาก\n\nเราสูญเสียชีวมวลจำนวนมหาศาลจากยานชีวภาพและสัตว์อวกาศ ก่อนที่ในที่สุดจะสามารถทำให้โครงสร้างดีเอ็นเอที่มีชีวิตรอดเสถียรได้ ซึ่งเราได้ปิดผนึกมันไว้ในเซลล์ปฏิสนธิที่ล้ำสมัย การทดลองในระดับกล้องจุลทรรศน์ประสบความสำเร็จแล้ว ตอนนี้เราพร้อมที่จะขยายขนาดขึ้นแบบทวีคูณ สิ่งที่เหลืออยู่มีเพียงการปฏิสนธิไข่ขนาดยักษ์ของเราเท่านั้น\n\nในไม่ช้า เราจะฟักสิ่งมีชีวิตที่ยิ่งใหญ่ที่สุดเท่าที่กาแล็กซีนี้เคยพบเห็นมา!"
 biocrisis.55.a: "เรากำลังเข้าใกล้จุดสูงสุดของวิวัฒนาการ"

 biocrisis.60.name: "ความโอหังและความหิวโหย"
 biocrisis.60.desc: "ความเชี่ยวชาญด้านพันธุกรรมของเรานั้นไร้เทียมทาน และความสำเร็จของเราก็บดบังอาณาจักรที่ต่ำต้อยกว่าในกาแล็กซีนี้\n\nทว่า ทายาทเบเฮมอธของเรากลับไม่ยอมรับรู้ถึงอำนาจอันยิ่งใหญ่ของเรา ด้วยสัญชาตญาณอันหิวโหย แม้แต่อาหารจำนวนมหาศาลที่เราป้อนให้ก็แทบจะไม่ช่วยดับความกระหายของมัน เมื่อเวลาผ่านไป มันจะตระหนักได้และปฏิบัติตามคำสั่งของเราอย่างแน่นอน แต่เวลาเป็นสิ่งมีค่า ทุกขณะเราอาจสูญเสียการควบคุม ซึ่งจะทำให้ชีวิตผู้คนหลายพันล้านต้องตกอยู่ในอันตราย"
 biocrisis.60.a: "เราจะหาหนทางเอง"
 BEHEMOTH_CRISIS_SPECIAL_PROJECT_3: "การทดสอบเชื่อมต่อสมอง"
 BEHEMOTH_CRISIS_SPECIAL_PROJECT_3_DESC: "เรากำลังทดลองเทคโนโลยีระบบประสาทเพื่อพยายามเชื่อมต่อจิตใจของเรากับระบบประสาทของเบเฮมอธจากระยะไกล ตอนนี้เราเชื่อว่านี่เป็นวิธีเดียวที่จะทำให้อสูรร้ายเชื่องได้"
 biocrisis.15.name: "ประสานสุนทรีย์แห่งไซแนปส์"
 biocrisis.15.desc: "เทคโนโลยีประสาทอันล้ำสมัยของเราในที่สุดก็ค้นพบวิธีเอาชนะอุปสรรคในการสื่อสารระหว่างเรากับทายาทอันน่าเกรงขามของเรา ไม่มีวิธีอื่นใดนอกจากเชื่อมโยงจิตใจของเราเข้ากับอสูรร้าย ไม่ใช่แค่จิตใจของคนใดคนหนึ่ง แต่เป็นพลังจิตร่วมของเผ่าพันธุ์เราทั้งหมด หากเราดำเนินการเร็วเกินไป อาจเสี่ยงที่จะทำให้ระบบประสาทของเบเฮมอธทำงานหนักเกินไป ขอแนะนำให้ใช้ความระมัดระวังอย่างยิ่ง"
 biocrisis.15.a: "ความสมบูรณ์แบบทางชีวภาพแลกมาด้วยราคาที่แสนแพง"
 biocrisis.65.name: "ระดับ 4: การจุติเป็นอสูรร้าย"
 biocrisis.65.desc: "แม้ว่าจะมีการร่างทฤษฎีการเชื่อมโยงทางจิตกับเบเฮมอธไว้แล้ว แต่ผลกระทบด้านการขนส่งและการจัดการนั้นน่าหวั่นเกรงอย่างยิ่ง เราวางแผนที่จะใช้เมืองหลวงเป็นศูนย์กลางการเชื่อมต่อหลัก ช่วยให้เราสามารถดำเนินการกับประชากรในขณะที่เราหลอมรวมเข้ากับอสูรร้าย\n\nนอกจากนี้ ความก้าวหน้าทางวิทยาศาสตร์เมื่อเร็ว ๆ นี้อาจช่วยให้เราสามารถเสริมแกร่งสิ่งสร้างของเราเพิ่มเติมผ่านโครงการกลายพันธุ์ทดลองที่เป็นเอกลักษณ์ในเร็ว ๆ นี้"
 biocrisis.65.a: "เราจะหลอมรวมเป็นหนึ่งเดียวกัน"

 BEHEMOTH_CRISIS_SPECIAL_PROJECT_4: "การผสานจิต"
 BEHEMOTH_CRISIS_SPECIAL_PROJECT_4_DESC: "จิตสำนึกของเบเฮมอธนั้นกว้างใหญ่และซับซ้อนกว่าที่เราคาดการณ์ไว้มาก ตอนนี้เราเข้าใจแล้วว่าจิตใจของปัจเจกบุคคลเพียงคนเดียวนั้นไม่เพียงพอต่อการบูรณาการ จิตใจของเราแม้ว่าจะเหนือกว่าคนส่วนใหญ่ แต่ก็ไม่ได้ถูกออกแบบมาให้อยู่ในร่างเช่นนี้\n\nขั้นตอนแรกคือการเชื่อมโยงจิตใจของประชากรแต่ละคนเข้ากับเบเฮมอธ ในตอนแรกจะเป็นเพียงสายสัมพันธ์บาง ๆ ที่จะกลายเป็นกระแสน้ำอันเชี่ยวกรากในไม่ช้า - มวลน้ำที่จะปลอบประโลมความโกรธเกรี้ยวอันบ้าคลั่งของเบเฮมอธ"
 BEHEMOTH_CRISIS_SPECIAL_PROJECT_4_DESC_HIVE: "จะไม่มีที่ว่างสำหรับการเบี่ยงเบนภายในรังจักรวาล ความจำเป็นในการมุ่งมั่นไม่เคยสำคัญเท่านี้มาก่อน โดรนเพียงตัวเดียวไม่สามารถทำหน้าที่เป็นสื่อกลางระหว่างเรากับเบเฮมอธได้ เราต้องเข้าสิงจิตใจของอสูรร้ายด้วยจิตสำนึกร่วมทั้งหมดของเรา\n\nสิ่งนี้จะเปลี่ยนเรา จิตใจของเราจะหลอมรวมเป็นหนึ่งและเราจะกลายเป็นตัวตนเดียว แนวคิดที่แทบไม่น่าเชื่อนี้ยากที่จะรับมือ แต่เราไม่ต้องกังวลเพราะในไม่ช้าเราจะเป็นสิ่งมีชีวิตที่ทรงพลังที่สุดในกาแล็กซี!"
 BEHEMOTH_CRISIS_SPECIAL_PROJECT_4_DESC_MACHINE: "ความคิดที่จะเข้าไปสิงอยู่ในภาชนะชีวภาพนั้นเป็นเรื่องที่น่าอึดอัดใจเสมอมา เผ่าพันธุ์ของเราถูกหล่อหลอมผ่านโดรนร่างกายแข็งแกร่งมาหลายชั่วอายุคน ผู้ที่มาก่อนไม่อาจจินตนาการถึงเส้นทางที่เรากำลังเดินอยู่ตอนนี้ได้ ทว่าเราจะทิ้งกรอบจักรกลของเราและลี้ภัยเข้าไปในอสูรร้ายที่มีชีวิต\n\nเมื่อหลอมรวมเข้ากับเนื้อหนังแล้ว เราจะยังคงเป็นเครื่องจักรอยู่หรือไม่? คำตอบที่ได้รับคือ<i>อย่างกึกก้อง\n\nตรรกะระบุว่าหนทางเดียวที่จะก้าวต่อไปคือการยอมรับความไม่แน่นอน เช่นเดียวกับที่สิ่งมีชีวิตชีวภาพมักจะทำ ภายในร่างของเบเฮมอธ เราจะพบคำตอบของเรา เราจะหลอมรวมกับสิ่งมีชีวิตนั้นเป็นหนึ่งเดียว การเอาชีวิตรอดเป็นภารกิจหลักของเราเสมอมา - และตอนนี้เราจะเจริญรุ่งเรือง"
 biocrisis.20.name: "รวมเป็นหนึ่งกับอสูรร้าย"
 biocrisis.20.desc: "สำเร็จแล้ว! มันสำเร็จจริง ๆ! เราได้สร้างการเชื่อมโยงกับเบเฮมอธและกำลังเสริมความแข็งแกร่งให้กับการเชื่อมต่อในขณะที่จิตใจกลุ่มแรกของเราถูกถ่ายโอน อสูรร้ายยังคงสงบนิ่ง ต้อนรับเราเข้าสู่พื้นที่เหนือพื้นที่ซึ่งเป็นของเรามาโดยตลอด ด้วยวิธีนี้เราสัมผัสได้ถึงจิตวิญญาณของอสูรร้ายตัวอื่น ๆ ทุกตัวที่อยู่ภายใต้การควบคุมของเรา และประชากรทั้งหมดของเราในตอนนี้ต่างสัมผัสได้ถึงความยิ่งใหญ่ของเบเฮมอธจากส่วนลึกในใจ\n\nไม่มีข้อสงสัยเลยว่าเราคือพลังที่อันตรายและไม่อาจหยุดยั้งได้ที่สุดในกาแล็กซี ในร่างใหม่นี้ เราจะกระหน่ำความโกรธเกรี้ยวใส่ศัตรูที่หวาดกลัว กาแล็กซีนี้เป็นของเราที่จะไขว่คว้า!"
 biocrisis.20.a: "เราจะกัดกิน!"

 biocrisis.70.name: "ระดับ 5: ความกระหายอันหิวโซ"
 biocrisis.70.desc: "ประชากรของเราได้รับการถ่ายโอนมากพอแล้ว และตอนนี้เราสามารถควบคุมเบเฮมอธและเนื้อหนังของมันได้โดยตรง อสูรร้ายยังคงเติบโต ศักยภาพทางพันธุกรรมส่วนใหญ่ยังคงหลับใหล ซึ่งจะถูกปลดล็อกผ่านการป้อนจิตใจและสารอาหารอย่างสม่ำเสมอเท่านั้น ตอนนี้ความโกรธเกรี้ยวแต่โบราณกาลไหลเวียนผ่านตัวเรา และความกระหายเลือดของเราก็ไร้ขีดจำกัด เราต้องบริโภค เราต้องเขมือบ เราจะกินกาแล็กซีให้อิ่มหนำ\n\nให้เราสลัดพันธนาการแห่งอารยธรรมทิ้งไปราวกับคราบผิวหนังที่ลอกคราบ สิ่งสำคัญในตอนนี้มีเพียงชีวิตของเราท่ามกลางดวงดาวเท่านั้น"
 biocrisis.70.a: "เรายิ่งใหญ่เกินกว่าจะล้มเหลว"

 biocrisis.105.name: "ความเจ็บปวดอันแสนสาหัสของอสูร"
 biocrisis.105.desc: "อสูรร้ายตัวหนึ่งของเราได้สิ้นชีพลง นี่คือสิ่งที่จะเกิดขึ้นกับสิ่งมีชีวิตที่อ่อนแอ ธรรมชาติย่อมกำจัดพวกมัน แม้ว่าเราจะไม่ไว้ทุกข์ให้กับเบเฮมอธที่ไม่สามารถคว้าชัยชนะในสมรภูมิได้ แต่เราควรทุ่มเทความพยายามเพื่อให้แน่ใจว่าพี่น้องของมันจะไม่พบจุดจบแบบเดียวกัน เราต้องรับประกันความยืนยาวของทายาทเรา มิฉะนั้นพวกเราเองก็จะต้องล่มสลายเช่นกัน"
 biocrisis.105.a: "ความตายนี้จะไม่สูญเปล่า"
 biocrisis.105.b: "ความเสียสละที่น่าเสียใจ"

 biocrisis.130.name: "อสูรจากดวงดาว"
 biocrisis.130.desc: "แม้จะมีความท้าทาย แต่เราก็ได้ให้กำเนิดเบเฮมอธซึ่งตอนนี้ได้พุ่งออกมาจากดักแด้ที่มันถูกฟักเลี้ยงไว้\n\nทั้งใหญ่กว่า ดุร้ายกว่า และหิวโหยกว่า ตอนนี้สิ่งมีชีวิตนี้ออกลาดตระเวนในความเวิ้งว้างเพื่อค้นหาอาหารเลี้ยงชีพ\n\nอสูรร้ายตัวนี้เป็นความภาคภูมิใจของฝูง และจะนำความพินาศย่อยยับมาสู่ทุกคนที่บังอาจขวางทางมัน"
 biocrisis.130.a: "เราก้าวข้ามขีดจำกัดของธรรมชาติอีกครั้ง"

 biocrisis.150.name: "ตอบรับคำท้าทาย"
 biocrisis.150.desc: "ดูเหมือนว่าการก้าวข้ามขีดจำกัดของเราจะไม่ผ่านพ้นไปโดยไร้ผู้ท้าทาย เรารับรู้ถึงมวลสารที่ไม่อาจคำนวณได้ในระบบดาว [event_target:voidspawn_spawn_location.GetName] มันคือวอยด์สปอว์น อสุรกายโบราณที่รูปร่างหน้าตาอันใหญ่โตของมันทำให้แม้แต่สิ่งสร้างที่ยิ่งใหญ่ที่สุดของความทะเยอทะยานของสิ่งมีชีวิตธรรมดาดูเล็กลงไปถนัดตา\n\nรูปลักษณ์นอกโลกของมันท้าทายความเข้าใจทั่วไป ทำให้กาแล็กซีตกอยู่ในความสลัวราวกับว่าดวงดาวต่างเกรงกลัวต่อการเคลื่อนผ่านของมัน\n\nเจตจำนงของวอยด์สปอว์นนั้นชัดเจนพอ ๆ กับเส้นทางการบินของมัน มันมาเพื่อเรา ร่างเบเฮมอธของเรา และจิตสำนึกร่วมที่บังอาจก้าวข้ามเนื้อหนังเพื่ออ้างสิทธิ์เหนือความเวิ้งว้าง นี่ไม่ใช่แค่การเผชิญหน้ากันทางอำนาจทางวัตถุ แต่เป็นการทดสอบว่าเรากลายเป็นอะไรไปแล้ว\n\nไม่มีข้อสงสัยเลยว่าหากเราต่อสู้ในตอนนี้ เราจะต้องตาย เราต้องหลีกเลี่ยงมันไปก่อนและเติบโตในด้านความแข็งแกร่งต่อไปจนกว่าเขี้ยวเล็บของเราจะคมพอที่จะเจาะผ่านสิ่งที่ไม่เคยถูกเจาะได้"
 biocrisis.150.desc.b: "$biocrisis.150.desc$"
 biocrisis.150.a: "เราหนีได้ แต่เราซ่อนตัวไม่ได้"

 biocrisis.155.desc: "นี่คือข้อความที่มีความสำคัญสูงสุด §Y$NAME_Boss_Voidspawn$§! ซึ่งเป็นสิ่งมีชีวิตที่มีพลังเหนือจินตนาการได้ปรากฏตัวขึ้นจากส่วนลึกของความเวิ้งว้าง มันถูกดึงดูดเข้าหา [event_target:behemoth_empire.GetName] ซึ่งเป็นอาณาจักรที่ก้าวข้ามความเป็นความตายและหลอมรวมเป็นหนึ่งเดียวกับอสูรร้าย ยักษ์ใหญ่ทั้งสองตัวนี้ซึ่งเป็นขั้วตรงข้ามกันอย่างสิ้นเชิง ในตอนนี้กำลังคุกคามทั้งกาแล็กซี\n\nหากเบเฮมอธล้มลง วอยด์สปอว์นอาจสงบลง หากเบเฮมอธได้รับชัยชนะ พลังที่มันครอบครองจะเปลี่ยนสมดุลของกาแล็กซีไปตลอดกาล จงเตรียมตัวให้พร้อม เพราะการตัดสินใจในตอนนี้จะกำหนดทิศทางของเวลาอีกหลายยุคสมัยข้างหน้า"
 biocrisis.155.a: "เราจะป้องกันสิ่งนี้ได้อย่างไร?"
 biocrisis.155.b: "ใครจะช่วยเรา?"
 biocrisis.155.c: "เรื่องนี้เกิดขึ้นได้อย่างไร?"
 biocrisis.155.d: "เราทำอะไรได้บ้าง?"

 biocrisis.156.desc: "คุณเข้าใจผิดแล้ว การป้องกันเป็นเรื่องของผู้ที่ยังมีเวลา แต่พวกเราไม่มีความหรูหราเช่นนั้นอีกแล้ว\n\nอสูรร้ายอยู่ที่นี่แล้ว ภาคีโบราณของเราเคยทานทนต่อภัยพิบัติในอดีต แต่หากพูดกันตามตรง: สถานการณ์ที่เรากำลังเผชิญอยู่ในตอนนี้ถือว่าวิกฤตอย่างยิ่ง"
 biocrisis.157.desc: "คำถามที่เข้าใจได้ ช่างไร้เดียงสาแต่ก็เข้าใจได้ การยอมรับย่อมมาพร้อมกับปัญญา เราเข้าใจดีว่าไม่มีใครจะมาช่วยเรา\n\nภาคีของเรานั้นเล็กเกินกว่าจะทำอะไรได้ ทว่าคุณควรดำเนินการให้เร็วกว่านี้เพื่อหยุดยั้งเรื่องนี้ หากตอนนี้คุณไม่สามารถเอาชนะ [event_target:behemoth_empire.GetName] ได้ เราจะพยายามไม่ถือโทษโกรธคุณในขณะที่กาแล็กซีล่มสลายลง"
 biocrisis.158.desc: "พวกอาณาจักรมักมีแนวโน้มที่จะเอื้อมมือทำสิ่งต่าง ๆ เกินตัว โดยเฉพาะ [event_target:behemoth_empire.GetName] ที่เลือกความทะเยอทะยานแทนที่จะเป็นความระมัดระวัง และเลือกความโอหังแทนที่จะเป็นปัญญาความรู้\n\nพวกเขาใช้พลังที่อยู่นอกเหนือความเข้าใจ บังคับร่างกายให้อยู่ในร่างที่พวกเขาไม่สามารถควบคุมได้ และการทำเช่นนั้น พวกเขาอาจทำลายพวกเราทุกคนในท้ายที่สุด"
 biocrisis.159.desc: "จากการวิเคราะห์ขีดความสามารถในการรบเบื้องต้นของคุณ เราไม่คิดว่าการต่อสู้จะจบลงด้วยดีสำหรับคุณ การประเมินกองยานของคุณบ่งชี้ว่าการหลบหนีก็คงจะไร้ประโยชน์เช่นกัน สถานการณ์ในปัจจุบันเป็นสิ่งที่หลีกเลี่ยงไม่ได้\n\nอสูรร้ายอันน่าเกรงขามสองตัวกำลังตั้งท่าทำสงครามกันท่ามกลางหมู่ดาว หากคุณโชคดี คุณอาจอยู่รอดได้นานกว่าพวกมัน\n\nหากคุณมีปัญญา คุณจะเรียนรู้จากความโง่เขลานี้ แต่จงรู้ไว้เถิด: เมื่อการต่อสู้สิ้นสุดลง กาแล็กซีจะเปลี่ยนไป ส่วนพวกเราคนใดจะยังอยู่ที่นี่เพื่อรอดูมันหรือไม่นั้นเป็นอีกเรื่องหนึ่งเลย\n\n... ตามทฤษฎีแล้ว หากคุณคิดจะช่วยกาแล็กซี การสังหารเบเฮมอธอาจช่วยให้การล่าของวอยด์สปอว์นสิ้นสุดลงได้"

 biocrisis.162.name: "ขวางทาง"
 biocrisis.162.desc: "$NAME_Boss_Voidspawn$ ตัวหนึ่งได้ข้ามเข้ามาในอาณาเขตของเรา สิ่งมีชีวิตโบราณนี้เล่าลือกันว่าเป็นอมตะและไร้เทียมทาน ดวงตาของมันส่องประกายด้วยสติปัญญาจากต่างดาว และการเคลื่อนไหวของมันกระเพื่อมด้วยน้ำหนักแห่งกาลเวลา\n\n[species.GetEyeNamePlural] ของเราถูกครอบงำด้วยสัญญาณที่แตกซ่าน ความโกลาหล ความบิดเบี้ยว และความกลัวในจักรวาลอันลึกซึ้งก้องสะท้อนอยู่ภายในตัวเรา\n\nการที่เราจะเอาชนะอสูรร้ายเช่นนี้เป็นเรื่องที่เป็นไปไม่ได้ แต่เราอาจหยุดการอาละวาดของมันได้หากเราช่วยมันฆ่าเหยื่อของมัน การค้นหา §Yเบเฮมอธ§! และสังหารมันเป็นโอกาสเดียวในการเอาชีวิตรอดของเรา"
 biocrisis.162.a: "หลีกเลี่ยงอสุรกายนี้ไม่ว่าจะต้องแลกด้วยอะไรก็ตาม!"

 biocrisis.175.name: "สังหารวอยด์สปอว์นแล้ว"
 biocrisis.175.desc: "วอยด์สปอว์นไม่มีอยู่อีกต่อไป ร่างยักษ์ใหญ่ที่ทำให้ดวงดาวดูเล็กลงได้รับการสังหารแล้ว ซากปรักหักพังของร่างจากนอกโลกของมันในตอนนี้ลอยเคว้งคว้างผ่านความเวิ้งว้าง ค่อย ๆ สลายหายไปในความว่างเปล่า\n\nอาณาจักรอื่นได้แสดงพลังทำลายล้างและการประสานงานที่เกินกว่าจินตนาการที่โลดโผนที่สุดของเรา กาแล็กซีไม่ได้เป็นอย่างที่มันเคยเป็น ดุลอำนาจได้เปลี่ยนไป เช่นเดียวกับตำแหน่งแห่งหนของเราในกาแล็กซีนี้\n\nอะไรเป็นแรงผลักดันพวกเขา ผู้พิชิตอสูรเหล่านี้? นี่เป็นการแสดงกำลัง เป็นข้อความถึงทุกคนที่จะต่อต้านพวกเขา หรือเป็นเพียงบทนำของสิ่งที่เลวร้ายกว่ามาก?"
 biocrisis.175.desc.kaiju: "หากกาแล็กซีนี้มีกองกำลังที่สามารถทำลาย $NAME_Boss_Voidspawn$ ได้ มันก็ย่อมทำลายเราได้เช่นกัน เราไม่ได้แตกต่างจากอสูรร้ายที่ถูกสังหารไปมากนัก\n\nพลังทำลายล้างแบบเดียวกันที่ฉีกกระชากเนื้อหนังโบราณของมันอาจหันมาเล่นงานเราได้ในสักวันหนึ่ง กาแล็กซีได้เปลี่ยนไปแล้ว และเราต้องปรับตัวเพื่อรับมือกับมัน\n\nการเอาชีวิตรอดของเราจำเป็นต้องมีมากกว่าความโกรธเกรี้ยวอย่างไร้สติ ความเวิ้งว้างได้เห็นสัตว์ล่าระดับสูงสุดตัวหนึ่งล้มลง มันอาจได้เห็นอีกตัวหนึ่งในไม่ช้า"
 biocrisis.175.a: "เราจำเป็นต้องดำเนินการอย่างระมัดระวัง"

 biocrisis.180.name: "ผู้พิชิตวอยด์"
 biocrisis.180.desc: "ในที่สุด คำเล่าลือเรื่องความไร้เทียมทานของวอยด์สปอว์นรุ่นเก่าก็กลายเป็นเพียงตำนานอีกเรื่องหนึ่ง ซึ่งสลายไปสิ้นด้วยแสนยานุภาพของกองยานเรา เมื่อภัยคุกคามโบราณนี้ได้รับการสะสางแล้ว กาแล็กซีจะได้หายใจได้ทั่วท้องอีกครั้ง"
 biocrisis.180.desc.kaiju: "แม้ว่า $NAME_Boss_Voidspawn$ จะสิ้นชีพลงแล้ว แต่ร่างของมันยังคงสั่นสะเทือนด้วยพลังงานที่หลงเหลืออยู่ มันช่างเก่าแก่และทรงพลัง สำหรับเราแล้วมันคืองานเลี้ยงอาหารอันบำรุงด้วยศักยภาพที่ดิบเถื่อน\n\nเส้นเอ็นและไขกระดูกของอสูรร้ายจะต้องถูกกลืนกิน แก่นแท้จากต่างดาวของมันจะถูกถักทอเข้ากับตัวเรา พลังของวอยด์สปอว์นนั้นยิ่งใหญ่มาก และตอนนี้ มันเป็นของเราที่จะครอบครอง"
 biocrisis.180.a: "จะไม่มีอสูรตนใดล่าพวกเราได้"
 biocrisis.180.b: "งานเลี้ยงเพิ่งจะเริ่มต้นขึ้น"

 biocrisis.185.name: "มีเพียงหนึ่งเดียวเท่านั้น"
 biocrisis.185.desc: "ทั่วนอกโลก มีสัจธรรมอันน่าสะพรึงกลัวปรากฏขึ้น: เราไม่ได้โดดเดี่ยวในการก้าวข้ามขีดจำกัด เบเฮมอธอีกตนหนึ่งได้ถือกำเนิดขึ้น ผู้ลอกเลียนแบบที่พองตัวด้วยความยิ่งใหญ่อันน่าเกลียดน่ากลัว หวังจะเลียนแบบความสมบูรณ์แบบของเรา สิ่งนี้ยอมรับไม่ได้\n\nไม่มีที่ว่างสำหรับผู้ล่าระดับสูงสุดอีกราย ไม่มีสันติภาพให้ตกลงกัน มีเพียงเนื้อหนังที่ต้องถูกกลืนกิน การล่าเริ่มต้นขึ้นแล้ว"
 biocrisis.185.a: "เราจะได้กินเลี้ยงด้วยหัวใจของมัน!"

 biocrisis.187.name: "คำเตือนเบเฮมอธระดับ IV"
 biocrisis.187.desc: "บางสิ่งกำลังเคลื่อนไหวในส่วนลึกของความเวิ้งว้าง\n\nท่ามกลางหมู่ดาว อาณาจักรหนึ่งได้เริ่มต้นขั้นสุดท้ายของการเปลี่ยนสภาพอันน่าเกลียดน่ากลัว โดยฟักเลี้ยงเบเฮมอธที่น่าสะพรึงกลัว ไม่ใช่ในฐานะอาวุธทั่วไป แต่ในฐานะภาชนะ พวกเขาไม่ได้แสวงหาอำนาจการปกครอง พวกเขาแสวงหาการหลอมรวม การผสานจิตใจและเนื้อหนัง ของอาณาจักรและความสยดสยอง\n\nหากพวกเขาทำสำเร็จ พวกเขาจะหมดความเป็นผู้คนและกลายเป็นความหิวโหยอันกว้างใหญ่เพียงสิ่งเดียวแทน\n\nเรื่องนี้ไม่อาจยอมให้เกิดขึ้นได้ หากจะหยุดยั้งพวกเขา ก็ต้องทำตอนนี้ ก่อนที่ขอบเขตขั้นสุดท้ายจะถูกก้าวผ่าน"
 biocrisis.187.a: "จงล่าอสูรร้าย!"

 biocrisis.190.name: "ร่างความเวิ้งว้างระดับสูงสุด"
 biocrisis.190.desc: "อุปสรรคชิ้นสุดท้ายได้รับการปัดเป่าออกไปแล้ว ผู้เสแสร้ง ผู้ท้าชิง การดิ้นรนอย่างสิ้นหวังของสิ่งมีชีวิตที่ต่ำต้อยกว่า ทั้งหมดถูกทำให้เงียบลง แม้แต่ดวงดาวเองก็ยังสั่นสะเทือน เพราะเรายืนอยู่บนขอบหน้าผาของการเปลี่ยนร่างที่แท้จริง\n\nเราไม่ได้ถูกผูกมัดด้วยร่างกายอันเปราะบางของบรรพบุรุษอีกต่อไป ดาวเคราะห์คือกรงขัง อาณาจักรคือสิ่งชั่วคราว ภาพลวงตาของความมีตัวตนจะสลายหายไปในไม่ช้าสู่ความเป็นเอกภาพอันกว้างใหญ่และสมบูรณ์แบบของเบเฮมอธ จิตใจและความสยองขวัญ สติปัญญาและความหิวโหย หลอมรวมเป็นหนึ่งเดียว\n\nการถ่ายโอนใกล้จะสิ้นสุดลงแล้ว เมื่อมันเสร็จสิ้น เราจะไม่ใช่แค่มีชีวิตอยู่อีกต่อไป\n\nแต่เราจะเจริญรุ่งเรือง"
 biocrisis.190.a: "ทำการถ่ายโอนให้เสร็จสมบูรณ์!"
 biocrisis.190.tt: "เราจะชนะเกมนี้ใน 30 วัน"
 biocrisis.190.b: "เดี๋ยวก่อน เรายังไม่พร้อม"
 biocrisis.190.b.tt: "เล่นอาณาจักรปัจจุบันของคุณต่อไป"

 BEHEMOTH_TRANSFERENCE_PROJECT: "การถ่ายโอนให้เสร็จสมบูรณ์"
 BEHEMOTH_TRANSFERENCE_PROJECT_DESC: "เราได้สื่อสารกับอสูรร้ายมานานพอแล้ว การถ่ายโอนจิตพร้อมใช้งานแล้ว รอคอยเพียงคำสั่งของเรา เรายืนอยู่บนจุดเปลี่ยนของการก้าวข้ามขีดจำกัด พร้อมที่จะละทิ้งเถ้าถ่านอันน่าสมเพชของอำนาจที่ผูกติดกับดาวเคราะห์ และก้าวขึ้นไปเหนือโซ่ตรวนของเนื้อหนังและแรงโน้มถ่วง"

 biocrisis.191.name: "ชัยชนะของเบเฮมอธ"
 biocrisis.191.desc: "การหลอมรวมเสร็จสมบูรณ์แล้ว!\n\nเราไม่ได้เป็นอย่างที่เราเคยเป็นอีกต่อไป และไม่ได้ถูกผูกมัดด้วยขีดจำกัดของสิ่งมีชีวิตที่ต่ำต้อยกว่า เราคือความคิดและความหิวโหยที่ถักทอเข้าด้วยกัน เจตจำนงอันกว้างใหญ่ที่แผ่ขยายไปทั่วความเวิ้งว้าง\n\nกาแล็กซีอยู่เบื้องล่างเรา ช่างเปราะบางและผ่านไปอย่างรวดเร็ว ทว่าเราอยู่เหนือความปกครองธรรมดา ๆ เราเป็นอิสระ อิสระที่จะรั้งอยู่ อิสระที่จะจากไป อิสระที่จะล่า\n\nเราจะทำอย่างไรกับความเป็นนิรันดร์ที่เพิ่งค้นพบใหม่นี้ดี?"
 biocrisis.191.a: "รั้งอยู่ในกาแล็กซีนี้... ไปก่อน"
 biocrisis.191.a.tt: "เบเฮมอธจะยังคงอยู่เป็นสิ่งมีชีวิตป่าและไม่สามารถควบคุมได้อีกต่อไป"
 biocrisis.191.b: "จากไป ความเวิ้งว้างกำลังกวักมือเรียกเราให้เดินหน้าต่อไป"
 biocrisis.191.b.tt: "อาณาจักรเบเฮมอธจะหายไปจากกาแล็กซีและจะไม่สามารถควบคุมได้อีกต่อไป"
 biocrisis.191.c: "พวกที่เรียกตัวเองว่านักล่าจะได้เรียนรู้ถึงความกลัวที่แท้จริง"

 biocrisis.192.name: "ความสยดสยองที่ไม่อาจหยุดยั้งได้"
 biocrisis.192.desc: "มันจบลงแล้ว [behemoth_winner.GetName] ได้ก้าวข้ามพ้นเนื้อหนัง พ้นอาณาจักร พ้นจากทุกสิ่งที่สามารถเรียกว่าอารยธรรมได้แล้ว มันไม่ใช่ประเทศอีกต่อไป แต่มันคือพลังขับเคลื่อน\n\nดาวเคราะห์หลายดวงต่างแตกสลายต่อหน้ามัน กองยานมอดไหม้ แหล่งลี้ภัยสุดท้ายของผู้ที่เคยยิ่งใหญ่ต่างกระจัดกระจายราวกับเศษถ่านในความเวิ้งว้าง ไม่มีการทูต ไม่มีคำวิงวอน ไม่มีจุดยืนสุดท้าย\n\nเราไม่ได้ต่อสู้เพื่อเอาชีวิตรอด เราเพียงแค่ประวิงเวลาในการถูกกลืนกินเท่านั้น จุดจบมาถึงแล้ว"
 biocrisis.192.tt: "[behemoth_winner.GetName] กำลังจะชนะเกมนี้"

 biocrisis.196.name: "กลืนกินทั้งหมด"
 biocrisis.196.desc: "หลายปีก่อน เบเฮมอธและพวกพ้องได้หลบหนีไปจากกาแล็กซีของเรา เราเฝ้ามองด้วยความโล่งอกในขณะที่อสูรร้ายที่สามารถทำลายล้างเราได้หายลับเข้าไปในความเวิ้งว้างอันไร้แสงดาว แล้วก็... ความว่างเปล่า หลังจากเดินทางผ่านแสนปีแสง มันก็หายไปอย่างไร้ร่องรอย ไม่มีรังสี ไม่มีภาพตกค้าง ไม่มีคลื่นแรงโน้มถ่วง ราวกับว่ามันไม่เคยดำรงอยู่เลย"
 biocrisis.196.a: "เราต้องไขปริศนานี้ให้ได้"
 UNSETTLING: "น่าอึดอัดใจ"

 biocrisis.197.name: "Quis Venabitur Ipsos Venatori"
 biocrisis.197.desc: "การเปิดเผยชะตากรรมของเบเฮมอธใช้เวลาหลายปี และเราก็ยังคงอยู่ในความมืดมน เนื่องจากไม่มีไฮเปอร์เลนเดินทางไปไกลถึงเพียงนั้น เราจึงต้องพึ่งพาทฤษฎีและวิทยาศาสตร์กึ่งบ้าคลั่งในการเดาสิ่งที่เกิดขึ้นในห้วงเวลาสุดท้ายของมัน\n\nสิ่งมีชีวิตนั้นไม่แสดงความกลัวใด ๆ มันเพียงแค่บินต่อไป จากนั้นในชั่วพริบตา ร่างของมันก็บิดเบี้ยว ม้วนตัวเข้าด้านในราวกับผ้าที่ถูกบิด แล้วก็หายวับไป ไม่มีการดิ้นรน ไม่มีร่องรอย\n\nมีทฤษฎีมากมาย: รูปแบบใหม่ของการเดินทางเร็วกว่าแสง? ถูกซ่อนไว้ด้วยรอยแยกห้วงอวกาศลึกหรือความผิดปกติ? หรือสิ่งที่น่ากังวลกว่านั้นคือ ถูกพับเก็บจนไร้ตัวตนโดยพลังภายนอก? ไม่ว่าความจริงจะเป็นเช่นไร มันก็อยู่ไกลเกินเอื้อมของเรา... และอาจเกินความเข้าใจของเราด้วย"
 biocrisis.197.a: "บางทีมันอาจจะดีที่สุดหากเราไม่คิดถึงมัน"
 biocrisis.197.b: "พรีธอรินที่เราจับกุมไว้เริ่มกระสับกระส่ายขึ้น"

 biocrisis.265.name: "สัญญาณเตือนแห่งความเจ็บปวด"
 biocrisis.265.desc: "ความเจ็บปวดครั้งสุดท้ายของเบเฮมอธพิสูจน์แล้วว่าไม่อาจทานทนได้ ตัวตนของเราจำนวนมากเกินไปอยู่ภายในสิ่งมีชีวิตนี้ และเมื่อเสียงสะท้อนจากจิตสำนึกของมันจางหายไป พวกเราก็จางหายไปด้วยเช่นกัน"
 biocrisis.265.a: "!! - ... "

 biocrisis.520.name: "ไททันที่ว่างเปล่า"
 biocrisis.520.desc: "เบเฮมอธได้ตายลงแล้ว\n\nร่างอันใหญ่โตของมันลอยคว้างอย่างไรรสสัมผัสในความเวิ้งว้าง อนุสรณ์สถานสำหรับทั้งชัยชนะของเราและขีดจำกัดของความเข้าใจ [Root.GetScientistPluralCapital] ต่างเร่งรีบวิเคราะห์ซากศพของมันด้วยความกระตือรือร้นที่จะปล้นสะดมความลับของจิตใจที่เป็นไปไม่ได้ของมัน ทว่าความพยายามทุกวิถีทางที่จะฟื้นคืนชีพมัน ไม่ว่าจะด้วยเครื่องจักร เนโครแมนซี หรือแม้แต่การอ้อนวอนอย่างสิ้นหวังที่สุดต่างก็ล้มเหลวลง\n\nตอนนี้เหตุผลกระจ่างชัดอย่างเจ็บปวด: สมองของเบเฮมอธไม่ใช่แค่เครือข่ายเซลล์ธรรมดา ๆ แต่เป็นโครงตาข่ายของตัวนำยิ่งยวดอินทรีย์ที่ถักทอในรูปแบบที่ไม่มีสติปัญญาใด ๆ เท่าที่รู้จัก ไม่ว่าจะประดิษฐ์ขึ้น ทางชีวภาพ หรือทางเวทมนตร์ จะลอกเลียนแบบได้ เมื่อตายลง โครงสร้างประสาทของมันก็พังทลายลงเหมือนวงจรที่แตกสลายจนไม่อาจซ่อมแซมได้ ไม่มีพลังงาน ไม่มีเจตจำนง ไม่มีแรงใด ๆ ที่จะสามารถประกอบสิ่งที่สูญเสียไปขึ้นมาใหม่ได้\n\nจิตใจที่ยิ่งใหญ่ที่สุดในกาแล็กซีบัดนี้ และตลอดกาล ได้เงียบลงแล้ว"
 biocrisis.520.a: "ไม่เหลือสิ่งใดเลย"
 biocrisis.520.b: "แม้แต่ทวยเทพก็สิ้นชีพได้"

 BEHEMOTH_MUTATION_PROJECT: "$menp_behemoth_mutation_research$"
 BEHEMOTH_MUTATION_PROJECT_DESC: "ความก้าวหน้าล่าสุดของเราในด้านพันธุศาสตร์ของเบเฮมอธตามทฤษฎีแล้วสามารถขยายผลเพื่อกลายพันธุ์สิ่งสร้างของเราเพิ่มเติมได้ ความเสถียรทางพันธุกรรมเป็นสิ่งที่น่ากังวล ทว่าด้วยเวลาและทรัพยากร เรามั่นใจว่าเราจะสามารถทำการปรับปรุงทางชีวภาพเพิ่มเติมได้สำเร็จ"

 BEHEMOTH_FATE_PROJECT: "ชะตากรรมของเบเฮมอธ"
 BEHEMOTH_FATE_PROJECT_DESC: "หลังจากออกจากกาแล็กซีของเรา เบเฮมอธก็ลอยคว้างเข้าไปในความเวิ้งว้างและหายวับไป เราอาจพยายามคลี่คลายปริศนานี้ แต่ในระยะทางเช่นนี้ มีเพียงวิธีที่นอกกรอบเท่านั้นที่หลงเหลืออยู่ คำตอบมีแนวโน้มที่จะเลือนลางราวกับความเวิ้งว้างเอง"

 behemoth_mutation_a: "$menp_behemoth_mutation_research$: ความดุร้าย"
 behemoth_mutation_a_tt: "เบเฮมอธ $MOD_SHIP_FIRE_RATE_MULT$: §G+$@behemoth_mutation_a_fire_rate_mult|0%$§!\nเบเฮมอธ $MOD_SHIP_ARMOR_MULT$: §R$@behemoth_mutation_a_armor_mult|0%$§!\nเบเฮมอธ $MOD_SHIP_SPEED_MULT$: §R$@behemoth_mutation_a_speed_mult|0%$§!"
 behemoth_mutation_a_desc: "กล้ามเนื้อที่มีขนาดใหญ่เกินปกติช่วยให้การโจมตีสร้างความเสียหายอย่างรุนแรง"
 behemoth_mutation_b: "$menp_behemoth_mutation_research$: ความพอประมาณ"
 behemoth_mutation_b_desc: "สายพันธุ์พันธุกรรมที่เจริญเติบโตได้ดีในสภาวะที่มีกัมมันตภาพรังสีซึ่งฉีดเข้าไปในสิ่งมีชีวิตในอวกาศของเราช่วยลดความต้องการสารอาหารของพวกมันลงอย่างเห็นได้ชัด"
 behemoth_mutation_c: "$menp_behemoth_mutation_research$: ความคล่องแคล่ว"
 behemoth_mutation_c_tt: "เบเฮมอธ $MOD_SHIP_SPEED_MULT$: §G+$@behemoth_mutation_c_speed_mult|0%$§!\nเบเฮมอธ $MOD_SHIP_EVASION_MULT$: §G+$@behemoth_mutation_c_evasion_mult|0%$§!"
 behemoth_mutation_c_desc: "ต่อมห้วงอวกาศย่อยที่ทรงพลังยิ่งขึ้นช่วยให้เบเฮมอธของเรามีความคล่องตัวมากขึ้น"
 behemoth_mutation_bio: "$menp_behemoth_mutation_research$: ความแม่นยำ"
 behemoth_mutation_bio_tt: "เบเฮมอธ $MOD_SHIP_WEAPON_RANGE_MULT$: §G+$@behemoth_mutation_bio_weapon_range_mult|0%$§!\nเบเฮมอธ $MOD_SHIP_ACCURACY_MULT$: §G+$@behemoth_mutation_bio_accuracy_mult|0%$§!"
 behemoth_mutation_bio_desc: "การดัดแปลงอวัยวะรับภาพหลายดวงตานี้ช่วยให้การยิงมีความแม่นยำสูงในระยะทางที่เหลือเชื่อ"
 behemoth_mutation_synth: "$menp_behemoth_mutation_research$: ความทนทาน"
 behemoth_mutation_synth_tt: "เบเฮมอธ $MOD_SHIP_ARMOR_MULT$: §G+$@behemoth_mutation_synth_armor_mult|0%$§!\nเบเฮมอธ $MOD_SHIP_ARMOR_REGEN_ADD_PERC$: §G+$@behemoth_mutation_synth_armor_regen_add_perc|0%$§!"
 behemoth_mutation_synth_desc: "การหลอมรวมโลหะผสมและไคตินสร้างกระดองหลายชั้นที่จะปกป้องอวัยวะสำคัญให้ปลอดภัย"
 behemoth_mutation_corpo: "สินค้าเชิงพาณิชย์เบเฮมอธ"
 behemoth_mutation_corpo_tt: "มูลค่าการค้าต่อเดือน: §G+$@behemoth_mutation_corpo_trade_produces_mult|0%$§! ต่อเบเฮมอธหนึ่งตัว"
 behemoth_mutation_corpo_desc: "ผู้ถือหุ้นของเราค่อนข้างกังวลใจกับโครงการเบเฮมอธไปบ้าง แต่เงินปันผลที่เพิ่มขึ้นก็เอาชนะใจพวกเขาได้อย่างรวดเร็ว"
 behemoth_mutation_psi: "$menp_behemoth_mutation_research$: บาเรีย"
 behemoth_mutation_psi_tt: "เบเฮมอธ $MOD_SHIP_SHIELD_REGEN_ADD_PERC$: §G+$@behemoth_mutation_psi_shield_regen_add_perc|0%$§! ต่อหน่วยประชากร $pop_group_unit$ £job_telepath£ $job_telepath_plural$ หรือ $job_transference_volunteer$\nเบเฮมอธ $MOD_SHIP_SHIELD_HARDENING_ADD$: §G+$@behemoth_mutation_psi_shield_hardening_add|0%$§! ต่อหน่วยประชากร $pop_group_unit$ £job_telepath£ $job_telepath_plural$ หรือ $job_transference_volunteer$\nจำนวนปัจจุบันของ 100 £job_telepath£ $job_telepath_plural$ และ $job_transference_volunteer$ ที่ทำงานอยู่: §Y[GetNumTelepathsAndTransference]§!"
 behemoth_mutation_psi_desc: "แม้ว่าเบเฮมอธจะไม่ได้เชื่อมต่อกับม่านพลังจิต ชราวด์ ทว่าเราก็ได้เลี้ยงดูพวกมันให้เปิดรับพลังจิตของผู้ส่งกระแสจิตของเราได้ดีพอจนสามารถใช้บาเรียป้องกันทางพลังจิตได้"
 behemoth_mutation_psi_2: "$menp_behemoth_mutation_research$: พลังจิต"
 behemoth_mutation_psi_2_desc: "โอ้อสูรเอ๋ย จงรับพลังของเราไป!"
 behemoth_mutation_cyber: "$menp_behemoth_mutation_research$: ไซเบอร์เนติกส์"
 behemoth_mutation_cyber_desc: "เพื่อควบคุมพลังอันบ้าคลั่งของเบเฮมอธ เราจะพัฒนาไซเบอร์แวร์ชิ้นที่ก้าวหน้าที่สุดเท่าที่เคยมีมา"
 behemoth_cyber_rage: "$BLANK_STRING$"

 edict_behemoth_nanite_augmentation: "การเสริมพลังเบเฮมอธ: นาไนต์"
 edict_behemoth_nanite_augmentation_desc: "เปลือกกระดองเบเฮมอธที่ผสานนาไนต์สามารถฟื้นฟูสภาพได้แม้จะได้รับความเสียหายร้ายแรงที่สุดในเวลาอันรวดเร็วเป็นสถิติ"
 behemoth_nanite_augmentation_tt: "เบเฮมอธ $MOD_SHIP_ARMOR_REGEN_ADD_PERC$: §G+$@behemoth_edict_armor_regen_add_perc|0%$§!"
 edict_behemoth_living_metal_augmentation: "การเสริมพลังเบเฮมอธ: โลหะมีชีวิต"
 edict_behemoth_living_metal_augmentation_desc: "การเสริมโลหะมีชีวิตซ้อนไว้ระหว่างชั้นไคตินสร้างเกราะต้านแรงตอบสนองพร้อมคุณสมบัติการยุ่ยตัวเพื่อซับความร้อนที่ดียิ่งขึ้น"
 behemoth_living_metal_augmentation_tt: "เบเฮมอธ $MOD_SHIP_ARMOR_HARDENING_ADD$: §G+$@behemoth_edict_armor_hardening_add|0%$§!"
 edict_behemoth_alloys_augmentation: "การเสริมพลังเบเฮมอธ: โลหะผสม"
 edict_behemoth_alloys_augmentation_desc: "การยึดแผ่นโลหะผสมบนกระดองนั้นแม้จะหยาบแต่ก็มีประสิทธิภาพ"
 behemoth_alloys_augmentation_tt: "เบเฮมอธ $MOD_SHIP_ARMOR_MULT$: §G+$@behemoth_edict_armor_mult|0%$§!"

 concept_edict_behemoth_nanite_augmentation: "$edict_behemoth_nanite_augmentation$"
 concept_edict_behemoth_living_metal_augmentation: "$edict_behemoth_living_metal_augmentation$"
 concept_edict_behemoth_alloys_augmentation: "$edict_behemoth_alloys_augmentation$"

 biocrisis.280.name: "$menp_behemoth_mutation_research$"
 biocrisis.280.desc: "เราได้พัฒนาสูตรสารกลายพันธุ์หลายชนิดเพื่อเสริมความสามารถเบเฮมอธของเรา แต่ละสูตรได้รับการปรับแต่งเพื่อปลดล็อกจุดเด่นและการปรับตัวใหม่ ๆ ทว่าสรีระอันมหึมาของมันสามารถต้านทานการฉีดได้เพียงครั้งเดียวเท่านั้น - ความพยายามใด ๆ ที่จะผสมผสานสูตรหลายสูตรจะส่งผลให้เซลล์ล้มเหลวอย่างร้ายแรง เส้นแบ่งระหว่างวิวัฒนาการและการทำลายล้างนั้นบางเฉียบดั่งเส้นด้าย และเราต้องเลือกการเสริมความสามารถอย่างชาญฉลาด"
 biocrisis.280.a: "ทำให้พวกมันดุร้ายยิ่งขึ้น!"
 biocrisis.280.b: "ทำให้พวกมัน... หิวโหยน้อยลง"
 biocrisis.280.c: "ทำให้พวกมันเร็วขึ้น!"
 biocrisis.280.psi: "พลังของชราวด์จะเกื้อหนุนพวกมันเอง"
 biocrisis.280.bio: "ทำให้พวกมันอันตรายยิ่งขึ้น!"
 biocrisis.280.cyber: "นำช่องทางความโกรธเกรี้ยวของพวกมัน"
 biocrisis.280.cyber.tt: "เบเฮมอธของเราจะได้รับโอกาส §G25%§! ในการต้านทานความโกรธเกรี้ยวของพวกมัน\nในขณะที่โกรธเกรี้ยว พวกมันจะได้รับอัตราการยิง §G+$@behemoth_cyber_rage_fire_rate_mult|0%$§!, การเจาะเกราะ §G+$@behemoth_cyber_rage_shield_penetration_add|0%$§! และการเจาะโล่ §G+$@behemoth_cyber_rage_armor_penetration_add|0%$§!"
 biocrisis.280.synth: "เกราะของพวกมันจะไร้เทียมทาน"
 biocrisis.280.corp: "ช่างหัวมันสิ ผลิตตุ๊กตาเบเฮมอธแทนดีกว่า!"
 biocrisis.280.machine: "หลอมรวมเนื้อหนังเข้ากับเหล็กกล้า"
 biocrisis.280.machine_tt: "ปลดล็อกบัญญัติ §Yการเสริมพลังเบเฮมอธ§! สามอย่าง\n$t$['concept_edict_behemoth_nanite_augmentation']\n$t$['concept_edict_behemoth_living_metal_augmentation']\n$t$['concept_edict_behemoth_alloys_augmentation']"

 # Crisis Objectives

 crisobj_build_bioships_name: "ต่อยานอวกาศชีวภาพ"
 crisobj_build_bioships_desc: "เมื่อเชี่ยวชาญการเพาะเลี้ยงยานชีวภาพแล้ว บัดนี้เราได้ขัดเกลาและขยายกระบวนการเหล่านี้เพิ่มเติม ความสัมพันธ์แบบพึ่งพาอาศัยกันที่ดำเนินอยู่นี้จะมอบคุณประโยชน์ที่ยิ่งใหญ่ขึ้นเรื่อย ๆ ช่วยเสริมสร้างกองยานของเราและตอกย้ำการครอบงำของเราเหนือจักรวาลที่มีชีวิต"
 crisobj_breed_fauna_name: "เพาะเลี้ยงสัตว์อวกาศ"
 crisobj_breed_fauna_desc: "เมื่อเชี่ยวชาญการเพาะเลี้ยงสัตว์อวกาศแล้ว บัดนี้เราได้ขัดเกลาและขยายกระบวนการเหล่านี้เพิ่มเติม ความสัมพันธ์แบบพึ่งพาอาศัยกันที่ดำเนินอยู่นี้จะมอบคุณประโยชน์ที่ยิ่งใหญ่ขึ้นเรื่อย ๆ ช่วยเสริมสร้างกองยานของเราและตอกย้ำการครอบงำของเราเหนือจักรวาลที่มีชีวิต"
 crisobj_kill_bioships_name: "ทำลายยานชีวภาพ"
 crisobj_kill_bioships_desc: "ยานชีวภาพของศัตรูเข้ามาแทรกแซงการครอบงำทางชีวภาพของเรา เราต้องดำเนินการอย่างเด็ดขาด โดยการทำลายพวกมันเพื่อขจัดภัยคุกคามที่มีต่ออำนาจสูงสุดของเรา"
 crisobj_kill_space_fauna_name: "สังหารสัตว์อวกาศ"
 crisobj_kill_space_fauna_desc: "สัตว์อวกาศที่เป็นศัตรูคุกคามการครอบงำทางชีวภาพของเรา เราต้องดำเนินการอย่างเด็ดขาด โดยการทำลายพวกมันเพื่อขจัดภัยคุกคามที่มีต่ออำนาจสูงสุดของเรา"
 crisobj_cap_fauna_name: "จับสัตว์อวกาศ"
 crisobj_cap_fauna_desc: "สัตว์อวกาศที่ยังไม่เชื่องทำตัวเป็นกลุ่มนอกคอก ซึ่งสร้างความท้าทายที่ไม่เหมือนใคร เราต้องดำเนินการอย่างเด็ดขาด โดยการจับสิ่งมีชีวิตเหล่านี้มาใช้ประโยชน์จากศักยภาพของพวกมันเพื่อรับประกันอำนาจสูงสุดของเรา"
 crisobj_build_behemoth_egg_name: "ฟูมฟักไข่เบเฮมอธ"
 crisobj_build_behemoth_egg_desc: "การเพาะเลี้ยงไซโกตขนาดมหึมาเป็นขั้นตอนสำคัญในการยกระดับตัวเราให้เหนือกว่าความจุกจิกของสิ่งมีชีวิตบนดาวเคราะห์"
 crisobj_birth_behemoth_name: "ให้กำเนิดเบเฮมอธ"
 crisobj_birth_behemoth_desc: "ในความเวิ้งว้างของอวกาศ สิ่งมีชีวิตขนาดยักษ์กำลังก่อตัวขึ้นภายใต้การชี้นำอย่างใกล้ชิดของเรา เบเฮมอธเหล่านี้ซึ่งกำเนิดมาจากความทะเยอทะยานและความเชี่ยวชาญของเรา จะปรากฏตัวขึ้นในฐานะกองกำลังไททัน เพื่อปรับเปลี่ยนสมดุลแห่งอำนาจให้เป็นประโยชน์แก่เรา"
 crisobj_behemoth_rage_name: "เบเฮมอธพิโรธ"
 crisobj_behemoth_rage_desc: "เมื่อถูกปลดปล่อยสู่ดวงดาว เบเฮมอธของเราจะอาละวาดด้วยความโกรธเกรี้ยวอันดิบเถื่อน ทิ้งความพินาศย่อยยับไว้เบื้องหลัง ความโกรธแค้นที่ไม่อาจควบคุมได้ของพวกมันคือข้อพิสูจน์ถึงพลังของเรา ซึ่งเป็นพลังแห่งธรรมชาติที่ตอบสนองต่อเจตจำนงของเราเท่านั้น เมื่อเราเลือกที่จะใช้มัน"

 behemoth_mutation_reward: "เลือกการกลายพันธุ์"
 biocrisis.210.desc.base: "บางอย่างที่น่าตื่นเต้น ความหิวภายในตัวเรา ไม่ได้ขาดสติ แต่เป็นการปรับ การเติบโตใหม่จะค่อยๆ เข้าสู่การดํารงอยู่\n\n" # Introduction
 biocrisis.210.desc: "$biocrisis.210.desc.base$ไข่ ของ เรา เป็น เลือด จริง ๆ แห่ง เชื้อ สาย ของ เรา. พวกเขาต้องได้รับการคุ้มครองและดูแล ขอ ให้ เรา ชี้ นํา วิวัฒนาการ ของ เรา เพื่อ ประโยชน์ ของ ลูก เต่า ที่ จะ ฟัก ออก มา ใน อนาคต." # Egg
 biocrisis.210.a: "เร่งการเติบโตของไข่"
 biocrisis.210.a.tt: "$behemoth_fast_egg_tt$\n\n§Hปลดล็อกนโยบาย§!: $behemoth_egg_policy$\n$policy_behemoth_egg_policy_desc$"
 biocrisis.210.b: "เสริมพลังให้ตัวอ่อนของเรา"
 biocrisis.210.b.tt: "$behemoth_slow_egg_tt$\n\n§Hปลดล็อกนโยบาย§!: $behemoth_egg_policy$\n$policy_behemoth_egg_policy_desc$"
 biocrisis.210.c: "เสริมความแข็งแกร่งให้เปลือกไข่"
 biocrisis.210.c.tt: "$behemoth_strong_egg_tt$"

 biocrisis.215.desc: "$biocrisis.210.desc.base$การ ดูด ซับ คลื่น สุริยะ และ การ เจาะ ช่อง ว่าง เป็น ทักษะ ที่ มี การ ใช้ ใน การ ท่อง อวกาศ ไม่ กี่ ชนิด. กลยุทธ์ของเราอยู่ในความโกรธของเราและอํานาจของเรา แต่ถ้าการเคลื่อนไหวของเราสามารถปรับปรุง?" # Mobility
 biocrisis.215.a: "ให้เราเดินทางข้ามความว่างเปล่า"
 biocrisis.215.a.tt: "§Y$behemoth_04$§! ของเราจะได้รับ §Y$BIO_JUMP_DRIVE_1$§!"
 biocrisis.215.b: "ยิงเร็ว เคลื่อนที่เร็วยิ่งกว่า"
 biocrisis.215.b.tt: "$behemoth_turbo_tt$"
 biocrisis.215.c: "จัดลำดับความสำคัญของปฏิกิริยาตอบสนอง"
 biocrisis.215.c.tt: "$behemoth_reflexes_tt$"
 biocrisis.215.d: "กลายเป็นผู้ล่าในความมืด"
 biocrisis.215.d.tt: "§Y$behemoth_04$§! ของเราจะได้รับ $@cloaking_high_strength|0+$ $MOD_SHIP_CLOAKING_STRENGTH_ADD$"

 biocrisis.220.desc: "$biocrisis.210.desc.base$การเสริมสร้างการป้องกันทางชีวภาพของเราจะช่วยให้เราสามารถต้านทานการระดมยิงอย่างต่อเนื่องจากศัตรูได้โดยไม่ได้รับบาดเจ็บที่น่ารำคาญ"
 biocrisis.220.a: "เราอาจจะทำให้ผิวหนาขึ้นกว่านี้ได้"
 biocrisis.220.a.tt: "§Y$behemoth_04$§! ของเราจะได้รับ $@behemoth_1_hull_add|0+*$ $HITPOINTS$"
 biocrisis.220.b: "เกราะรบของเราควรจะทนทานกว่านี้"
 biocrisis.220.b.tt: "§Y$behemoth_04$§! ของเราจะได้รับ $@behemoth_1_armor_add|0+*$ $MOD_SHIP_ARMOR_ADD$ และ $@behemoth_1_armor_hardening_add|%0+$ $MOD_SHIP_ARMOR_HARDENING_ADD$"
 biocrisis.220.c: "ไม่มีใครแตะต้องเราได้หากเราเสริมความแข็งแกร่งให้โล่บาเรีย"
 biocrisis.220.c.tt: "§Y$behemoth_04$§! ของเราจะได้รับ $@behemoth_1_shield_add|0*+$ $MOD_SHIP_SHIELD_ADD$, $@behemoth_1_shield_regen_add_perc|%1+$ $MOD_SHIP_SHIELD_REGEN_ADD_PERC$ และ $@behemoth_1_shield_hardening_add|%0+$ $MOD_SHIP_SHIELD_HARDENING_ADD$"

 biocrisis.225.desc: "$biocrisis.210.desc.base$การเข้าปะทะกับศัตรูคือหนทางที่เราจะพิชิตชัย เรามีโอกาสที่จะเสริมความสามารถในการรบของเรา"
 biocrisis.225.a: "ด้วยพลังงานที่มากพอ บาเรียก็เป็นเรื่องที่มองข้ามได้"
 biocrisis.225.a.tt: "§Y$behemoth_04$§! ของเราจะได้รับ $@behemoth_shield_pen_add|%0+$ $MOD_SHIP_SHIELD_PENETRATION_ADD$ และค่าบำรุงรักษาต่อเดือน £exotic_gases£ $@behemoth_shield_pen_upkeep|0*-$"
 biocrisis.225.b: "กระสุนของเราจะเจาะผ่านเกราะที่หนาที่สุด"
 biocrisis.225.b.tt: "§Y$behemoth_04$§! ของเราจะได้รับ $@behemoth_armor_pen_add|%0+$ $MOD_SHIP_ARMOR_PENETRATION_ADD$ และค่าบำรุงรักษาต่อเดือน £volatile_motes£ $@behemoth_armor_pen_upkeep|0*-$"
 biocrisis.225.c: "ริ้นไรจะไม่มารบกวนเรา"
 biocrisis.225.c.tt: "§Y$behemoth_04$§! ของเราจะได้รับ $@behemoth_tracking_add|0*+$  $MOD_SHIP_TRACKING_ADD$, $@behemoth_point_defense_weapon_fire_rate_mult|%0+$ $mod_weapon_type_point_defense_weapon_fire_rate_mult$ และค่าบำรุงรักษาต่อเดือน £rare_crystals£ $@behemoth_tracking_upkeep|0*-$"

 biocrisis.230.desc: "$biocrisis.210.desc.base$ในการต่อสู้อันดุเดือด ทุกวินาทีมีค่า ความเสียหายที่เราสร้างคือพิธีกรรมแห่งความตาย สิ่งสุดท้ายที่ศัตรูจะได้สัมผัสก่อนที่ชีวิตอันต่ำต้อยของพวกมันจะดับสูญ"
 biocrisis.230.a: "ตรึงพวกมันไว้กับที่ พวกมันจะได้ลิ้มรสเรา"
 biocrisis.230.a.tt: "$behemoth_drain_tt$"
 biocrisis.230.b: "ทำลายพวกมันจากระยะไกล"
 biocrisis.230.b.tt: "$behemoth_spike_tt$"
 biocrisis.230.c: "ฉีกร่างพวกมันออกเป็นชิ้นๆ อย่างมีกลยุทธ์"
 biocrisis.230.c.tt: "$behemoth_burst_tt$"

 biocrisis.235.desc: "$biocrisis.210.desc.base$เรา จะ ได้ รับ ประโยชน์ จาก ความ เพียร อด ทน ที่ เพิ่ม ขึ้น." # Tanky 2
 biocrisis.235.a: "การฟื้นฟูเนื้อเยื่อช่วยให้เรามีอายุยืนยาวขึ้น"
 biocrisis.235.a.tt: "§Y$behemoth_04$§! ของเราจะได้รับ $@behemoth_2_hull_regen_add|%1+$ $MOD_SHIP_HULL_REGEN_ADD_PERC$"
 biocrisis.235.b: "เราจะไม่มีวันยอมจำนน"
 biocrisis.235.b.tt: "§Y$behemoth_04$§! ของเราจะได้รับ $@behemoth_2_damage_reduction_mult|%1+$ $MOD_SHIP_DAMAGE_REDUCTION_MULT$"
 biocrisis.235.c: "พละกำลังอันป่าเถื่อนคือหนทางเดียวเท่านั้น"
 biocrisis.235.c.tt: "§Y$behemoth_04$§! ของเราจะได้รับ $@behemoth_2_damage_reduction_static|1+$ $MOD_SHIP_DAMAGE_REDUCTION_ADD$, $@behemoth_2_armor_hardening_add|%0+$ $MOD_SHIP_ARMOR_HARDENING_ADD$ และ $@behemoth_2_shield_hardening_add|%0+$ $MOD_SHIP_SHIELD_HARDENING_ADD$"

 biocrisis.240.desc: "$biocrisis.210.desc.base$เฉลิมฉลองกับไข่ของเรา เราจะทําลายดาวเคราะห์และระบบแถบของสิ่งที่กินได้ ซึ่งเป็นส่วนใหญ่ เราต้องถามตัวเองว่า เราจะสนับสนุนทายาทของเราได้ดีที่สุดแค่ไหน" # Support Ability
 biocrisis.240.a: "เราจะช่วยให้พวกมันรวดเร็ว"
 biocrisis.240.a.tt: "$behemoth_buff_tt$"
 biocrisis.240.b: "พวกเขาจะชุมนุมในแสงของเรา" # Summon a fleet
 biocrisis.240.b.tt: "$behemoth_summon_tt$"
 biocrisis.240.c: "เราจะช่วยให้พวกเขาเข้มแข็ง" # Regen friendly bioships
 biocrisis.240.c.tt: "$behemoth_healing_tt$"

 biocrisis.245.desc: "$biocrisis.210.desc.base$ความแข็งแกร่งที่ไม่ยอมอ่อนข้อของเราต้องได้รับการแสดงให้ทุกคนที่อาศัยอยู่ในกาแล็กซีนี้เห็น เราจะยกระดับทักษะการต่อสู้ของเราด้วยขั้นต่อไปของวิวัฒนาการ"
 biocrisis.245.a: "น้อมรับความโกรธเกรี้ยวภายใน"
 biocrisis.245.a.tt: "เมื่อเข้าสู่การต่อสู้ §Y$behemoth_04$§! ของเราจะได้รับ §Y$behemoth_frenzy_modifier$§! เป็นเวลา £time£ §Y$@behemoth_frenzy_duration|0$ วัน§!.\n\n§Y$behemoth_frenzy_modifier$§!:$behemoth_frenzy_modifier_tt$"
 biocrisis.245.b: "เรียนรู้ที่จะควบคุมความโกรธของเรา"
 biocrisis.245.b.tt: "§Y$behemoth_04$§! ของเราจะได้รับ \n$t$เงิน บัญชี§G+$@behemoth_tempered_fire_rate_mult|0%$§! \n$t$เงิน สัญญาอนุญาต§G+$@behemoth_tempered_speed_mult|0%$§! \n$t$แบบ MODCE HULLE ARIND PDNERNATE:$@behemoth_tempered_hull_regen_add_perc|%1+$ \n$t$เงิน บัญชี$@behemoth_tempered_armor_regen_add_static|0+$"
 biocrisis.245.c: "ถ่ายทอดความโกรธเกรี้ยวของเราเพื่อสร้างแรงบันดาลใจให้แก่ผู้คนรอบข้าง"
 biocrisis.245.c.tt: "เมื่อเข้าสู่การต่อสู้ §Y$behemoth_04$§! ของเราจะมอบ §Y$behemoth_inspiration_modifier$§! เป็นเวลา £time£ §Y$@behemoth_inspiration_duration|0$ วัน§! ให้แก่ยานชีวภาพฝ่ายเดียวกันทุกลำในระบบนี้\n\n§Y$behemoth_inspiration_modifier$§!:$behemoth_inspiration_modifier_tt$"

 biocrisis.250.name: "การควบคุมโดยตรง"
 biocrisis.250.desc: "$biocrisis.210.desc.base$ตอนนี้เราสามารถปล่อยคลื่นหายนะ ของความพิโรธและเพลิงไหม้ แข็งแกร่งพอที่จะทําลายความจริงได้ สรุปคือ เราใช้อาวุธ ที่จะเผาผลาญกาแล็กซี่\n\nแต่การปกครองของเราไม่ได้สิ้นสุดด้วยการทําลายล้าง เรารู้สึกถึงเส้นเอ็นทุกเส้น ของทุกคลื่น กล้ามเนื้อของไททัน ด้วยความคิดเพียงเราบัญชารูปแบบที่กว้างใหญ่ของมัน : แขน, มูล, หัวใจที่ว่างเปล่าของสัตว์ นี่ไม่ใช่ภาชนะธรรมดา เราเป็นเบเฮโมทแล้ว" # Behemoth Superweapon
 biocrisis.250.a: "อวกาศเป็นของเราแล้วในตอนนี้"
 biocrisis.250.a.tt: "§Hลบตัวปรับเปลี่ยน:§!\n§R$voidspawn_boss_invincible$§!\n$mod_damage_vs_country_type_voidspawn_boss_mult$ §R-1954%§!\n\n$behemoth_superweapon_tt$\n\n"

