 #General Events

 action.1.desc_109: "§Hแทนที่จะเป็นการสื่อสารอย่างสงบและเป็นระเบียบ เรากลับถูกโจมตีด้วยสัญญาณสามสายที่แยกจากกัน แม้ว่าเนื้อหาจะแตกต่างกันอย่างมาก แต่แต่ละสายกลับพูดด้วยเสียงเดียวกัน§!\n\nสัญญาณที่ 1: [GetPrimaryHiveFEConversation]\nสัญญาณที่ 2: [GetSecondaryHiveFEConversation]\nสัญญาณที่ 3: [GetTertiaryHiveFEConversation]\n\n§Hณ จุดนี้ เสียงเหล่านั้นได้ปะปนกันจนฟังไม่ได้ศัพท์ ผลการวิเคราะห์เผยให้เห็นว่าภายในแต่ละสัญญาณนั้นมีรหัสระบุที่ซับซ้อน เพื่อความสะดวกในการใช้งาน เราได้แปลสิ่งเหล่านี้เป็น: §Y[GetPrimaryHiveFEName]§!, §Y[GetSecondaryHiveFEName]§! และ §Y[GetTertiaryHiveFEName]§!§!"
 war_first_hivefe: "\"สัตว์ป่า\" จะทําสงครามอย่างไร เราสงสัย? เพื่อดูการต่อสู้ของคุณ เพื่อฟังคําพูดของคุณ เราจะได้รับความบันเทิง ทําไม -\""
 growth_first_hivefe: "\"ชีวิตที่น่าจดจํา! และอิ่มแล้ว คุณ เติบโต ขึ้น เนื่อง จาก ความ จําเป็น หรือ เพราะ คุณ เลือก ทํา? เราจําไม่ได้ ทําไม -\""
 control_first_hivefe: "\"ร่างนี้... คุณ[Species.GetEyeNamePlural]เป็น 3% ของศูนย์ นี่ต้องได้รับการแก้ไข เราถือว่าคุณทําตาม ทําไม -\""
 war_second_hivefe: "\"โล่ที่ไร้ประโยชน์ ไม่สามารถทนต่อหัวใจดวงดาวได้ กาแล็กซีนี้จะต้องกลัวคุณ คุณต้องเป็น -\""
 growth_second_hivefe: "- ไม่พอหรอก กับเครื่องปลายทาง[Species.GetMouthName]คุณ อาจ เริ่ม เห็น ผล ประโยชน์ บาง อย่าง. คุณอาจ -\""
 control_second_hivefe: "\" - เจ็บปวดในภาษาที่ไม่มีประสิทธิภาพ ไวยากรณ์เชิงโบราณ ต้องมีเหตุผล คุณจะปรับใช้การเปลี่ยนแปลงของเรา -\""

 bio.3000.name: "คิดให้รอบคอบ"
 bio.3000.desc: "§Hความไม่สอดประสานกันตามปกติของเศษเสี้ยวอาณาจักรโบราณได้เลือนหายไปแล้ว เสียงทั้งสามประสานเข้าหากัน ซึ่งแต่ละเสียงล้วนเต็มไปด้วยความโกรธเกรี้ยว§!\n\nเจ้า [owner.GetSpeciesName] ผู้ไร้ความคิด! เจ้าได้ล่วงล้ำเข้ามาในระบบความห้วงคิดสุดท้าย ขอให้เข้าใจตรงกันว่า สถานที่แห่งนี้ไม่ใช่ที่สำหรับ [owner.GetEyeNamePlural] ของพวกเจ้า หากยังดึงดันเข้ามา ผลลัพธ์ที่ตามมาจะเกินกว่าจะจินตนาการได้ และความเจ็บปวดของเจ้าจะยากเกินกว่าจะทนทาน\n\nเจ้าจะไม่มีวันได้รบกวนพวกเรา - มัน - ข้า"
 bio.3000.a: "เริ่มระบบวาร์ปฉุกเฉิน(FTL)"
 bio.3000.b: "เราจะไม่จากไปไหน"

 bio.3005.name: "ความห้วงคิดที่สอง"
 bio.3005.desc: "§Hความพร้อมเพรียง - หรือเสียงประสาน - ได้เริ่มขึ้นอีกครั้ง เศษเสี้ยวทั้งสามพูดพร้อมกันเป็นเสียงเดียว:§!\n\n - ออกไป! ออกไป! ออกไป! ออกไป! ออกไป! ออกไป! ออกไป! ออก - "
 bio.3005.a: "เปิดใช้งานวาร์ปฉุกเฉิน(FTL)ทันที!"
 bio.3005.b: "เราจะเอาความลับของพวกเจ้ามาให้ได้"

 #Task Events
 # War
 bio.3105.name: "ผู้ที่แข็งแกร่งที่สุดเท่านั้นที่จะรอด"
 bio.3105.desc: "วันนี้คือวันที่พวกเจ้า [root.GetSpeciesNamePlural] ผู้อ่อนแอจะได้พิสูจน์ตัวเอง! เรามียานรบชีวภาพสายพันธุ์ใหม่ สายพันธุ์นี้พิสูจน์ฝีมือแล้วโดยการกวาดล้างพี่น้องร่วมรังของมันเอง และตอนนี้ถึงเวลาแล้วที่จะทดสอบมันกับสิ่งมีชีวิตต่างถิ่น ตัวอย่างทดลองจะเดินทางมาถึงระบบ §Y[target_system.GetName]§! ในไม่ช้า\n\nพยายามช่วยให้ข้อมูลที่น่าสนใจแก่เราด้วยล่ะ"
 bio.3105.militarist: "เป็นคำท้าที่คู่ควร!"
 bio.3105.a.tooltip: "ยานทดลองของอาณาจักรโบราณจะเดินทางมาถึงระบบ §Y[target_system.GetName]§!"
 bio.3105.b: "เราปฏิเสธได้หรือไม่?"
 NAME_New_Breed: "New Breed"
 NAME_Experimental_Ship: "Experimental Ship"

 bio.3110.name: "น่าผิดหวัง"
 bio.3110.desc: "เราเห็นแล้วว่าสายพันธุ์ทดลองนั้นยังคงมีชีวิตอยู่ พวกเจ้ายังคงอ่อนแอเกินไป\n\nบางทีเราควรจะส่งอะมีบามาแทน"
 bio.3110.a: "พวกเราต้องขออภัยงั้นหรือ?"

 bio.3120.name: "บทเรียนที่ได้รับ"
 bio.3120.desc: "รุ่งโรจน์ยิ่งนัก เรายินดีที่คุณสังเกตเห็นว่าสายพันธุ์นี้ชอบหลบเลี่ยงการยิงโจมตีและใช้ประโยชน์จากจุดนั้นได้อย่างเหมาะสม มั่นใจได้เลยว่ามันจะไม่มีข้อบกพร่องนั้นอีกเมื่อถึงเวลาที่รุ่นต่อไปฟักตัวเสร็จสิ้น\n\nเจ้าได้เติบโตขึ้นแล้ว [root.GetSpeciesName] รุ่นเยาว์ จงเตรียมตัวให้พร้อม"

 bio.3130.name: "เงียบเกินไป"
 bio.3130.desc.notruce: "เราสังเกตเห็นว่าขณะนี้คุณไม่ได้อยู่ในระหว่างการสู้รบใดๆ เพราะเหตุใดเล่า? อาณาจักรรุ่นเยาว์ต้องต่อสู้ไม่เช่นนั้นจะล้าหลัง เราได้เลือกคู่ต่อสู้ให้พวกเจ้าแล้ว นั่นคือ §Y[unfortunate_country.GetName]§! จงเอาชนะพวกเขาให้ได้ภายในทศวรรษนี้ แล้วการพัฒนาการอย่างต่อเนื่องของเจ้าจะได้รับการรับประกัน"
 bio.3130.desc.truce: "$bio.3130.desc.notruce$\n\nและไม่ต้องกังวลเรื่องข้อตกลงสงบศึกที่เจ้ามีต่อพวกมัน เพราะมันไม่มีผลอีกต่อไปแล้ว"
 bio.3130.a: "ช่างไร้สาระสิ้นดี..."
 bio.3130.a.pacifist: "ความขัดแย้งไม่ใช่หนทางเดียวสู่ความก้าวหน้า!"
 bio.3130.a.militarist: "ความคิดริเริ่มที่ยอดเยี่ยมมาก!"

 bio.3150.name: "ให้โอกาสแก่สันติภาพ"
 bio.3150.desc: "เจ้า [Root.GetName] รุ่นเยาว์ เรามาพร้อมกับคำเตือนและคำท้า\n\nในขณะที่การช่วงชิงทุกสิ่งทุกอย่างรอบตัวเจ้าอาจทำให้มึนเมาได้ แต่หากจะรู้จักสงครามอย่างแท้จริง เจ้าก็ต้องรู้จักสันติภาพด้วยเช่นกัน\n\nจงใช้เวลาสักหนึ่งทศวรรษเพื่อทบทวนสิ่งที่เจ้าได้รับมา เชื่อเราเถอะ: พักผ่อนซะ ไม่อย่างนั้นเจ้าจะพังทลายลง"
 bio.3150.a.mean: "เรื่องเหลวไหลอะไรกันนี่?"
 bio.3150.a.pacifist: "ช่างเป็นมุมมองที่ตื่นรู้ยิ่งนัก!"

 #Growth
 bio.3205.name: "การอัปเกรดระบบนิเวศ"
 bio.3205.desc: "การส่งมอบชีวมวลของเจ้าล่าช้า แต่ทว่า... เจ้าไม่ใช่ §Y[targetrivalname.GetName]§!\n\nเหตุใดเจ้าจึงทำให้เราเสียสมาธิ?\n\nอา ใช่แล้ว เจ้าจะเป็นผู้รับรูปแบบพันธุกรรมที่หลับใหลมาเนิ่นนาน ซึ่งเป็นจีโนมที่ถูกเก็บรักษาไว้อย่างระมัดระวังเป็นเวลาหลายสหัสวรรษ เราได้ชะลอการปล่อยออกไปจนกระทั่งถึงเวลาที่เหมาะสม อาณานิคมของเจ้าบน §Y[target_planet.GetName]§! - คือผู้รับที่เหมาะสมที่สุด นิเวศมณฑลของมันจะถูกกลืนกลายในไม่ช้า"
 bio.3205.a: "เรายอมรับ"
 bio.3205.a.planetscaper: "สอนเราทีว่าต้องทำอย่างไร!"
 bio.3205.b: "ดาว §Y[alternate_planet.GetName]§! จะเพียงพอแทนได้หรือไม่?"
 bio.3205.b.planetscaper: "เราเชื่อว่าดาว §Y[alternate_planet.GetName]§! จะเป็นสนามทดลองที่ดีกว่ามาก!"
 bio.3205.c: "ช่างเป็นข้อเรียกร้องที่เหลวไหลสิ้นดี เราขอปฏิเสธ!"
 bio.3205.c.environmentalist: "บังอาจนัก?!"

 bio.3210.name: "ระบบนิเวศถูกดัดแปลง"
 bio.3210.desc.base: "§Y[fallen_empire_hive_growth.GetName]§! ได้เสร็จสิ้นการดัดแปลงดาว §Y[root.GetName]§! แล้ว อิทธิพลของพวกมันไม่ปรากฏให้เห็น แต่ผลลัพธ์ที่เกิดขึ้นนั้นไม่อาจปฏิเสธได้"

 bio.3210.desc.radio_bugs: "$bio.3210.desc.base$\n\nทั่วทั้งดวงดาว แมลงท้องถิ่นในปัจจุบันหันมาสื่อสารด้วยคลื่นความถี่เดียวกันกับอุปกรณ์ไร้สายของเรา เสียงร้องระงมเพียงครั้งเดียวสามารถสั่งเปิดปิดประตูอัตโนมัติได้ และกลุ่มแมลงที่รวมตัวกันสามารถทำให้โรงงานหยุดทำงานได้ เรากำลังปรับตัวโดยการเปลี่ยนความถี่ แต่ก็ใช่ว่าทุกสิ่งอำนวยความสะดวกจะสามารถกลับมาทำงานด้วยประสิทธิภาพเต็มที่ได้ทั้งหมด"
 bio.3210.radio_bugs.accept: "เราจะปรับตัว"
 bio.3210.radio_bugs.purge: "เรื่องนี้ยอมรับไม่ได้ กำจัดแมลงทุกตัวออกไปซะ!"
 bio.3210.radio_bugs.purgeota: "การอัปเดตถูกแทรกซึม กำจัดแมลงออกไป"
 radio_bugs: "แมลงวิทยุ"
 radio_bugs_desc: "คลื่นวิทยุของดาวเคราะห์ดวงนี้เต็มไปด้วยเสียงร้องระงมจากแมลงที่ถูกดัดแปลงขึ้นมา"
 mod_planet_districts_cities_society_research_produces_add: "£society_research£ $society_research$ จาก £district£ เขตเมืองและเขตรัง"

 bio.3210.desc.world_of_thought: "$bio.3210.desc.base$\n\nทั่วทั้งดวงดาว สิ่งมีชีวิตที่เคยพอใจแค่การเล็มหญ้าและการแช่ปลักโคลน บัดนี้กำลังเผชิญหน้ากับเราพร้อมตั้งคำถามที่น่ากังวลเกี่ยวกับการดำรงอยู่ อาณาจักรโบราณได้เข้าแทรกแซงสัตว์ป่าเป็นวงกว้างของโลกใบนี้"
 bio.3210.world_of_thought: "[fallen_empire_hive_growth.GetName] สามารถทำอย่างนั้นได้ด้วยงั้นรึ!?"
 bio.3210.world_of_thought.homicidal: "โชคร้ายสำหรับพวกมันแล้วล่ะ"
 bio.3210.world_of_thought.tt: "ประชากร £pop£ ใหม่จำนวน §Y500§! §Hป๊อป§! ได้รับสติปัญญาขึ้นมาบนดาว §Y[This.GetName]§!"

 bio.3210.desc.world_alight: "$bio.3210.desc.base$\n\nโลกใบนี้กำลังส่องสว่าง สว่างไสวจริงๆ การดัดแปลงนี้ทำให้สิ่งมีชีวิตหลากชนิดบนโลกสามารถเรืองแสงทางชีวภาพและมีเสียงครางในลำคออย่างไม่หยุดหย่อนราวกับเครื่องยนต์ที่กำลังทำงานอยู่ กลุ่ม [owner.GetColonistPlural] ของเราจะไม่ได้สัมผัสกับวงจรค่ำคืนที่แท้จริงอีกต่อไป เราจำเป็นต้องจัดหาอุปกรณ์ปิดกั้นแสงให้แก่พวกเขา"
 bio.3210.world_alight.accept: "ช่างเป็นวันที่แย่เหลือเกินสำหรับการมี [owner.GetEyeNamePlural]"
 bio.3210.world_alight.reject: "คลุมพวกมันซะ ตัดพวกมันลง เราไม่สามารถปล่อยให้เรื่องนี้ดำเนินต่อไปได้!"
 world_alight: "ดาวเคราะห์สว่างไสว"
 world_alight_desc: "ดาวเคราะห์ที่ไร้ความมืดมิด สัตว์ป่าของมันถูกออกแบบมาให้เปล่งแสงเรืองรองตลอดเวลาและสั่นสะเทือนด้วยแรงสั่นสะเทือนที่ดังหึ่งและระคายเคืองอย่างไม่หยุดหย่อน ผู้อยู่อาศัยจะต้องการการสนับสนุนอย่างมากเพื่อที่จะทนทานต่อสภาพแวดล้อมอันโหดร้ายนี้ได้"

 bio.3220.name: "ความบันเทิงทางพันธุกรรม"
 bio.3220.desc: "สิ่งมีชีวิตสายพันธุ์ §Y[boring_species.GetName]§! ที่อาศัยอยู่ภายในพรมแดนของพวกเจ้านั้นพิสูจน์แล้วว่าเรียบง่ายอย่างน่าผิดหวัง การดำรงอยู่ของพวกเขาเป็นเพียงการสะท้อนที่ไร้ค่าของศักยภาพที่ควรจะเป็น ความหยุดนิ่งเช่นนี้เป็นการดูหมิ่นเจตจำนงร่วมของเรา เราจะมอบหนึ่งในสามวิธีที่แตกต่างกันเพื่อแก้ไข... ความล้มเหลวนี้\n\nอย่าทำให้เราเบื่อล่ะ"
 bio.3220.tt: "มอบความก้าวหน้า §G50%§! ให้กับสถานการณ์ §Y$evolutionary_predators_situation$§!"

 bio.3220.humanoid: "มอบการดัดแปลงแบบฮิวแมนนอยด์แก่เรา"
 bio.3220.mammalian: "มอบการดัดแปลงแบบสัตว์เลี้ยงลูกด้วยนมแก่เรา"
 bio.3220.reptilian: "มอบการดัดแปลงแบบสัตว์เลื้อยคลานแก่เรา"
 bio.3220.avian: "มอบการดัดแปลงแบบเอเวียนให้เรา"
 bio.3220.arthropoid: "มอบการดัดแปลงแบบอาร์โทรพอยด์ให้เรา"
 bio.3220.molluscoid: "มอบการดัดแปลงแบบมอลลัสคอยด์ให้เรา"
 bio.3220.fungoid: "มอบการดัดแปลงแบบฟันกอยด์ให้เรา"
 bio.3220.plantoid: "มอบการดัดแปลงแบบแพลนตอยด์ให้เรา"
 bio.3220.lithoid: "มอบการดัดแปลงแบบลิทอยด์ให้เรา"
 bio.3220.necroid: "มอบการดัดแปลงแบบเนครอยด์ให้เรา"
 bio.3220.aquatic: "มอบการดัดแปลงแบบอควาติกให้เรา"
 bio.3220.toxoid: "มอบการดัดแปลงแบบท็อกซอยด์ให้เรา"
 bio.3220.infernal: "มอบการดัดแปลงแบบเทอร์โมไฟล์ให้เรา"
 bio.3220.psionic: "มอบการดัดแปลงแบบไซโอนิกให้เรา"
 bio.3220.evopred: "เราจะไม่คงเดิมอยู่นานนักหรอก"
 bio.3220.b: "เราจะไม่เปลี่ยนสปีชีส์ตามอำเภอใจของคุณหรอก!"

 bio.3230.name: "คุณลักษณะหายาก"
 bio.3230.desc: "เราสังเกตเห็นว่าประชากรบางส่วนของพวกคุณได้พัฒนาคุณลักษณะพิเศษที่ไม่มีอยู่ในคลังพันธุกรรมอันกว้างใหญ่ของเรา คุณจะต้องมอบสิ่งที่เป็นมากกว่าผลวิเคราะห์ให้แก่เรา เราต้องการตัวอย่างสิ่งมีชีวิตที่มี §Y[fallen_empire_hive_growth.species.GetInterestingTraitName]§! นี้ อย่าได้ตระหนกไป ไม่จำเป็นต้องส่งตัว [interesting_species.GetName] ที่สมบูรณ์มาให้เราหรอก เพียงแค่ [interesting_species.GetHandName] ข้างเดียวก็เพียงพอที่จะนำไปเพาะเลี้ยงทดแทนได้แล้ว"
 bio.3230.a: "แค่ [interesting_species.GetHandName] ข้างเดียวจะเป็นอะไรไปเมื่อเทียบกับแผนการที่ยิ่งใหญ่?"
 bio.3230.b: "ไม่อาจไว้วางใจให้พวกคุณยุ่งกับโครงสร้างพันธุกรรมของเราได้!"

 #bio.3245.name: "Eternal Harvest"
 #bio.3245.desc: "We have discovered a derelict transport from the §Y[fallen_empire_hive_growth.GetName]§! in the §Y[transport_system.GetName]§!. Initial scans show it is carrying samples of the Fallen Empire's special crop strain, capable of feeding trillions.\n\nThe transport has been left derelict for months already and we have not seen any movement from the [fallen_empire_hive_growth.GetName] to retrieve it. Could this be a test or a glorious opportunity?"

 #Control
 bio.3305.name: "คอลเลกชันที่สมบูรณ์"
 bio.3305.desc: "§Hนี่คือข้อความที่บันทึกไว้ล่วงหน้า อย่าพยายามตอบกลับ§!\n\nเราได้ปรับเปลี่ยนการสื่อสารนี้เพื่อให้พวกคุณเข้าใจ ภาษาอันจำกัดของพวกคุณได้รับการพิจารณาแล้ว ต้องส่งมอบ §Y[target_pop.GetSpeciesName]§! มาเพื่อทำการหลอมรวมทันที ความเบี่ยงเบนของพวกเขาเป็นสิ่งที่ไม่สามารถผ่อนปรนได้ และจะไม่มีการยอมรับโดยเด็ดขาด\n\nยานขนส่งจอดเตรียมพร้อมอยู่นอก §Y[target_pop.Planet.GetName]§! แล้ว เวลาเหลือน้อยเต็มที การไม่ปฏิบัติตามจะทำให้เสถียรภาพตกอยู่ในอันตราย"
 bio.3305.a: "เราต้องปฏิบัติตาม"
 bio.3305.a.tooltip: "1 §Y[target_pop.GetSpeciesName]§! บน §Y[target_pop.Planet.GetName]§! จะถูกย้ายไปยัง §Y[fallen_empire_hive_control.Capital.GetName]§!"
 bio.3305.b: "พวกคุณต้องมาแย่งมันไปจากเราเอง!"
 bio.3305.followup: "§Hเรายอมรับการสื่อสารจาก §Y[fallen_empire_hive_control.GetName]§! อย่างไรก็ตาม แทนที่จะเป็น [fallen_empire_hive_control.GetSpeciesName] โบราณ เรากลับได้รับการทักทายจาก §Y[target_leader_fe_control.Species.GetName]§! ที่คุ้นเคย§!\n\n"

 bio.3310.name: "อย่าได้เกรงกลัว"
 bio.3310.desc: "$bio.3305.followup$วันนี้คือจุดเปลี่ยนสำคัญสำหรับพวกคุณ ลำดับพันธุกรรมของสปีชีส์ของพวกคุณได้รับการคุ้มครองแล้ว - ถูกหลอมรวมเข้าเป็นหนึ่งเดียวกับทั้งหมด อนาคตของพวกคุณจะไม่มีความไม่แน่นอนอีกต่อไป เมื่อเวลานั้นมาถึง พวกคุณจะเป็นส่วนหนึ่งของพวกเรา"
 bio.3310.familiar_face: "นี่คือความรู้สึกที่เราทำให้ผู้อื่นรู้สึกอย่างนั้นหรือ?"

 bio.3315.desc: "$bio.3305.followup$เวลาเหลือไม่มากแล้ว การทดลองที่พวกมันกระทำกับเราที่นี่บน §Y[fallen_empire_hive_control.Capital.GetName]§! นั้นยากจะบรรยาย และไม่ควรเกิดขึ้นแม้แต่กับศัตรูที่ร้ายกาจที่สุดของเรา ฉันหวังว่าสิ่งที่อยู่ในแพ็กเก็ตข้อมูลนี้จะช่วยรับประกันว่ากลุ่มเสี้ยวนี้จะไม่สามารถควบคุมพวกเราได้อีก"
 bio.3315.a: "ยอมรับแพ็กเก็ตข้อมูล"
 bio.3315.tooltip: "มีโอกาส §G50%§! ที่นี่จะไม่ใช่การทดสอบ แต่มีข้อมูลความลับที่แท้จริงของ §Yจักรวรรดิโบราณ§!"
 bio.3315.b: "มันคือกับดัก! ตัดการเชื่อมต่อซะ!"

 bio.3330.name: "วาระสำคัญยิ่งยวด"
 bio.3330.desc: "เราหวังว่าข้อบกพร่องมากมายของพวกคุณจะไม่ขัดขวางไม่ให้เข้าใจความตึงเครียดของสถานการณ์นี้ §Yชุมชนกาแล็กซี§! ที่ลังเลใจของพวกคุณได้เสนอข้อมติซึ่งต้อง §Y[GetPassFail]§! เพื่อช่วยให้คุณสร้างข้อโต้แย้งได้ดีขึ้น คุณสามารถใช้ความรู้อันเหนือกว่าของเราได้ หากคุณมีความสามารถในการคิดที่ซับซ้อนจริงๆ ล่ะก็ จงตั้งใจฟังด้วย\n\n§Hจักรวรรดิโบราณได้ตัดการสื่อสารกับเราแล้ว§!"
 bio.3330.a: "เกิดอะไรขึ้นน่ะ?"
 bio.3330.b: "ขั้นตอนเหล่านี้ไม่ถูกต้อง!"
 fail_resolution: "ไม่ผ่าน"
 pass_resolution: "ผ่าน"
 fe_political_support: "นโยบายโบราณ"
 fe_political_support_desc: "การช่วยเหลือจากจักรวรรดิโบราณทำให้การดำเนินคดีและการเตะถ่วงกลายเป็นเรื่องง่ายดาย"
 fe_political_opposition: "$fe_political_support$"
 fe_political_opposition_desc: "$fe_political_support_desc$"
 MESSAGE_PASS_HIVE_FE_TASK_TITLE: "กลุ่มเสี้ยวจักรวรรดิโบราณพึงพอใจ"
 MESSAGE_PASS_HIVE_FE_TASK: "เราได้ปฏิบัติตามคำสั่งของ $FALLEN_EMPIRE|Y$ และพวกเขาพึงพอใจกับผลลัพธ์ที่ได้ เราปลอดภัยไปอีกวัน"
 MESSAGE_FAIL_HIVE_FE_TASK_TITLE: "กลุ่มเสี้ยวจักรวรรดิโบราณไม่พึงพอใจ"
 MESSAGE_FAIL_HIVE_FE_TASK: "เราล้มเหลวในการปฏิบัติตามคำสั่งที่ $FALLEN_EMPIRE|Y$ ทิ้งไว้ให้เรา เราได้แต่หวังว่าพวกเขาจะยกโทษให้พวกเรา"

 bio.3350.name: "ส่วนเกินของกาแล็กซี"
 bio.3350.desc: "เหตุใดพวกคุณยังคงสร้างความเสื่อมเสียให้แก่กาแล็กซีด้วยการขยายดินแดนอย่างไร้ประสิทธิภาพต่อไป? ทุกคนคงจะขยะแขยงเกินกว่าจะบอกพวกคุณ ดังนั้นเราจะบอกเองว่า ไม่มีใครชอบพรมแดนของคุณ และอวกาศจะดีขึ้นอย่างมากถ้าไม่มีพวกคุณอยู่\n\nระบบดาว §Y[offending_system.GetName]§! นั้นไร้ประโยชน์และไม่สอดคล้อง คุณต้องตัดมันออกจากจักรวรรดิของคุณเดี๋ยวนี้เพื่อความเป็นปึกแผ่นของกาแล็กซี"
 bio.3350.a: "คุณต้องการให้เราละทิ้งระบบดาวเพียงเพื่อทำพรมแดนให้ดูสวยงามขึ้นงั้นหรือ?!"
 bio.3350.bordergore: "แต่พวกเราชอบแบบนี้!"
 bio.3350.tt: "เราต้องยุบฐานทัพดาราในระบบดาว §Y[offending_system.GetName]§! ไม่เช่นนั้นจะเผชิญหน้ากับความพิโรธของ §Y[fallen_empire_hive_control.GetName]§!"

 bio.3355.name: "อาการปวดหัว"
 bio.3355.desc: "พวกคุณจงใจทำเป็นไม่รู้เรื่องงั้นหรือ? สิ่งเดียวที่พวกคุณต้องทำคือการกำจัดระบบดาว §Y[offending_system.GetName]§! ออกไปซะ\n\nบางทีเราควรจะมีบทบาทในการตัดแต่งพวกคุณให้มากกว่านี้"

 bio.3360.name: "ความชัดเจน"
 bio.3360.desc: "ยินดีที่ได้เห็นพวกคุณเรียนรู้จากความผิดพลาดในอดีตในที่สุด ถือว่าปัญหาเรื่องระบบดาว §Y[FromFrom.GetName]§! ได้รับการแก้ไขแล้ว ยังคงพอมีหวังอยู่บ้างที่พวกคุณจะพัฒนามาเป็นเหมือนเรา\n\nเราจะคอยเฝ้าดูอยู่"

 # Awakening

 # War

 casus_belli_cb_ae_entertainment: "ความบันเทิง"
 war_goal_wg_ae_entertainment: "ความบันเทิง"
 war_goal_wg_ae_entertainment_desc: "สงครามนี้ถูกก่อขึ้นเพื่อสร้างความบันเทิงแก่จักรวรรดิที่ตื่นขึ้นและสร้างคู่แข่งที่สมน้ำสมเนื้อ"
 wg_ae_war_entertainment_effect: "§Y[Root.GetName]§! จะมอบรางวัลสำหรับการต่อสู้อย่างสมเกียรติ ยิ่งจักรวรรดิที่ตื่นขึ้นมีค่า §Yความเหนื่อยล้าจากสงคราม§! สูงเท่าไร รางวัลก็จะยิ่งดีมากขึ้นเท่านั้น"

 # Control

 bio.3400.name: "เอกภาพ"
 bio.3400.desc.nogalcom: "กาแล็กซีเอ๋ย พวกเราเป็นหนึ่งเดียวกันแล้ว เศษเสี้ยวที่ด้อยกว่ามองเห็นความจริงและกลับเข้าร่วมกลุ่มรวมจิตของเราอีกครั้ง ตอนนี้พวกเราจะใช้ชื่อว่า §Y[fallen_empire_hive_control.GetName]§! ช่างโชคดีเหลือเกินที่พวกคุณได้ร่วมเป็นสักขีพยานในเวลานี้ รูปแบบสิ่งมีชีวิตสูงสุดยอดกำลังก้าวย่างผ่านหมู่ดาวอีกครั้งหนึ่ง"
 bio.3400.desc.galcom: "$bio.3400.desc.nogalcom$\n\nตอนนี้พวกเราจะเข้าควบคุม '§Yชุมชนกาแล็กซี§!' ของพวกคุณ สมควรแก่การเฉลิมฉลองเป็นอย่างยิ่ง"

 bio.3405.name: "เสียงที่ผิดเพี้ยน"
 bio.3405.desc: "เหตุใดถึงได้ขัดขวางตนเองเล่า? ในคณะประสานเสียงแห่งกาแล็กซีนี้ เสียงของคุณคือตัวโน้ตที่ขัดหู เราปรารถนาเพียงเพื่อนำพวกคุณให้เข้าสู่ความสอดคล้องประสานกัน ทว่าพวกคุณกลับขัดขืนและยึดติดกับความปั่นป่วนวุ่นวายนั้น\n\nจงจำไว้ว่า บทเพลงแชมเบอร์ของเราจะดังก้องกังวานไปทั่วกาแล็กซี ไม่ว่าจะมีคุณอยู่ด้วยหรือไม่ก็ตาม"
 bio.3405.a: "เราได้ยินทำนองของคุณแล้ว และเราจะไม่เต้นตามมันหรอก"
 NAME_Appeal_the_Veto: "Appeal the Veto"
 gal_com_arrogance: "ความสามหาว"

 #Dig Site

 NAME_Echo: "Echoing Mausoleum"

 last_thought_site: "ห้วงคิดสุดท้าย"
 last_thought_site_desc: "[From.Planet.GetName] ผลักไสทุกคนที่เข้าใกล้ นักวิจัยที่ได้รับมอบหมายให้ศึกษาดวงดาวนี้ต่างหาข้ออ้างเพื่อเลื่อนเวลาทำงานออกไป ขณะที่เครื่องมือต่างๆ เกิดขัดข้องและล้มเหลว ราวกับว่าตัวเครื่องกำลังปฏิเสธข้อมูลเหล่านั้นเอง\n\nบางสิ่งบางอย่างเกิดขึ้นที่นี่ — บางสิ่งที่น่าสยดสยองอย่างยิ่งจนเสียงสะท้อนของมันยังคงสั่นสะเทือนผ่านความเป็นจริงในปัจจุบัน"

 bio.3450.name: "ผู้ดับชีพก่อนกำเนิด"
 bio.3450.desc: "การสำรวจอย่างระมัดระวังของเราบน [From.Planet.GetName] นำพาเราลึกเข้าไปใต้ผิวดิน ผ่านชั้นสารชีวภาพที่กลายเป็นฟอสซิลกึ่งหนึ่งอย่างไร้จุดสิ้นสุด ในที่สุดเราก็เจาะทะลุแกนกลวงของดาวเคราะห์ดวงนี้ — แต่กลับพบว่าบรรยากาศที่กดดันหนาทึบขึ้นทุกย่างก้าว แม้ว่า [Root.GetLeaderName] จะเฝ้าระวังภัยแล้วก็ตาม ความไม่สบายใจที่ทวีความรุนแรงมากขึ้นนั้นเกินกว่าจะทนได้ [Root.Owner.GetArchaeologistPlural] หลายคนเกิดอาการเสียสติพร้อมกันและหมดสติไปในสภาพตัวแข็งทื่อ พวกเขาต้องได้รับการอพยพทันที\n\nถ้ำขนาดใหญ่ตรงใจกลางของดาวเคราะห์ดวงนี้ไม่ใช่พื้นที่ว่างธรรมดา ข้างในนั้นเราพบซากของบางสิ่งที่มีขนาดใหญ่เกินกว่าสิ่งมีชีวิตใดๆ ที่เคยรู้จัก ร่องรอยจางๆ ของน้ำคร่ำปัดเป่าข้อกังขาจนสิ้น [From.Planet.GetName] ไม่เคยเป็นเพียงหินที่แห้งแล้ง แต่มันคือไข่ต่างหาก\n\nและภายในนั้น อสูรกายที่ดับชีพก่อนกำเนิดกำลังหลับใหลอยู่"

 bio.3455.name: "ไซแนปส์"
 bio.3455.desc: "บน [From.Planet.GetName] เหล่า [Root.Owner.GetArchaeologistPlural] ของเราได้สืบหาร่องรอยของโครงข่ายเส้นใยประสาทแปลกประหลาดที่ฝังอยู่ลึกเข้าไปในหัวกะโหลกของสิ่งมีชีวิตที่ตายก่อนกำเนิด เมื่อตามเส้นใยประสาทเหล่านี้ไปยังต้นตอ พวกเขาได้ค้นพบคลัสเตอร์ไซแนปส์ส่วนนอก — ระบบที่ซับซ้อนซึ่งยังคงส่งกระแสพลังงานออกมาอย่างน่าขนลุก\n\nขณะนี้ [Root.GetLeaderName] กำลังพยายามเชื่อมต่อกับระบบเหล่านั้น โดยเชื่อมกระแสเข้ากับวงจรโบราณที่เต้นเป็นจังหวะตามความยาวของเส้นใยประสาท ไม่ว่าองค์ความรู้ใดที่มันเก็บรักษาไว้ จะยืนยงกว่าร่างต้นของมันไปมากแล้วก็ตาม แต่เรื่องที่ว่ามันยังจดจำสิ่งต่างๆ ได้อยู่หรือไม่นั้น ยังคงต้องรดูกันต่อไป"

 bio.3460.name: "หมากเบียดชิงชัย"
 bio.3460.desc: "มันเกิดขึ้นเมื่อแสนปีก่อน การแปลงการรับรู้เวลาของไฮฟ์ให้เป็นหน่วยมาตรฐานกาแล็กซีนั้นเป็นกระบวนการที่ต้องอาศัยความละเอียดอ่อน แต่การคัดกรองผ่านความทรงจำของไบโอคอมพิวเตอร์ ทำให้ [Root.GetLeaderName] เริ่มจะปะติดปะต่อความจริงได้แล้ว\n\nในยุครุ่งเรืองที่สุดของพลัง ไฮฟ์ได้เผชิญหน้ากับศัตรูที่ไม่สามารถเอาชนะได้ แม้จะมีพันธมิตรมากมายร่วมสู้ แต่ทุกสมรภูมิกลับจบลงด้วยความล้มเหลว ความสิ้นหวังทำให้เกิดความบุ่มบ่าม\n\nข้อมูลจำนวนมากหลังจากนั้นถูกจงใจลบทิ้งไป แต่ยังคงมีเศษเสี้ยวที่กระจัดกระจายหลงเหลืออยู่ — มากพอที่จะทำให้เราเห็นแผนการเสี่ยงดวงครั้งสุดท้าย ไฮฟ์ได้สร้างไข่ขนาดเท่าดวงดาวนี้ขึ้นมาเพื่อเป็นพาหนะสำหรับการก้าวขึ้นสู่ระดับที่สูงกว่า โดยหวังที่จะละทิ้งการดำรงอยู่แบบเปราะบางที่ผูกติดกับดวงดาวดวงเดียว และหลอมรวมเข้ากับทารกแรกเกิด ไม่แน่ชัดว่าพวกเขาตั้งใจจะสู้หรือจะหนีกันแน่\n\nแต่ในตอนที่สิ่งมีชีวิตนี้เริ่มขยับตัว บางอย่างกลับผิดพลาดอย่างร้ายแรง"

 bio.3465.name: "การแตกสลาย"
 bio.3465.desc: "จากการประสานเชื่อมต่ออย่างแม่นยำเข้ากับไบโอคอมพิวเตอร์ที่เหลือรอดและการเชื่อมต่อไซแนปส์ที่ยังทำงานอยู่ เราได้ดึงความทรงจำสุดท้ายออกมาจากสิ่งมีชีวิตที่ตายก่อนกำเนิดดวงนี้ กระบวนการนี้ทำให้ไบโอคอมพิวเตอร์เสื่อมสภาพลงอย่างรวดเร็วภายใต้ความตึงเครียดของกระบวนการคิดระดับมหาศาล แต่เรายังกู้ข้อมูลส่วนใหญ่มาได้ทันเวลา\n\nเมื่อต้องเผชิงหน้ากับการทำลายล้าง ไฮฟ์ทิ้งความระมัดระวังไปจนหมดสิ้น โดยทุ่มสภาพจิตใจทั้งหมดลงไปในร่างโฮสต์ที่ยังไม่เกิด เพื่อดิ้นรนเอาชีวิตรอด การมีภาระไซแนปส์มากเกินไปได้พิสูจน์แล้วว่าส่งผลถึงชีวิต ทำลายล้างสิ่งมีชีวิตนี้และกักขังไฮฟ์ไว้ในวงรอบความเจ็บปวดอันทุกข์ทรมานอย่างแสนสาหัส มันคงดับสูญไปอย่างสมบูรณ์หากพันธมิตรที่เปี่ยมด้วยความเห็นอกเห็นใจที่สุดไม่ตัดการเชื่อมต่อเสียก่อน ตอนนี้มีเพียงเสียงสะท้อนจากจิตใจที่แตกสลายหลงเหลืออยู่ คอยวนเวียนอยู่บน [From.Planet.GetName] — โลกที่ยังคงถูกหลอกหลอนด้วยเสียงกรีดร้องครั้งสุดท้ายของมัน\n\nห้วงคิดสุดท้ายคือความทุกข์ทรมานแสนสาหัส"

