 concept_automodding_habitability_desc: "- ค่าปรับเปลี่ยนจะถูกรวมเข้ากับค่าปรับเปลี่ยนจากรายการคุณลักษณะที่กำหนดไว้ล่วงหน้าโดยอัตโนมัติเพื่อให้ตรงกับดาวเคราะห์ปัจจุบัน\n- £pop£ §Hประชากร§! ที่มี §Y$concept_automodding_traits$§! จะถูกตรวจสอบทุกเดือนต่ออาณานิคม: §G100§!\n- อาคารการเติบโตและการประกอบประชากรจะช่วยเพิ่มจำนวนของ £pop£ §Hประชากร§! ที่ได้รับการปรับแต่งอัตโนมัติที่อัปเดตในแต่ละเดือน"

 automodding_habitability_tooltip_all: "['concept_automodding_habitability', $concept_automodding_habitability_plural$] จะปรับตัวโดยอัตโนมัติตาม £planet£ §Yประเภทดาวเคราะห์§! ที่ £pop£ §Hประชากร§! อาศัยอยู่ในปัจจุบัน"

