 concept_crowdsourcing_civics: "การระดมพลังมวลชน"
 concept_crowdsourcing_civics_desc: "จริยธรรมแบบ$concept_crowdsourcing_civics$ ประกอบด้วย $NEW_LINE$- ['civic:civic_crowdsourcing']$NEW_LINE$- ['civic:civic_corporate_crowdsourcing']"

 councilor_crowdsourcing: "ผู้ประสานงานด้านนวัตกรรม"
 councilor_crowdsourcing_desc: "$TITLE$ มีหน้าที่ดูแลการใช้สิทธิบัตรอย่างเป็นธรรม และสร้างแรงจูงใจในการวิจัยที่สอดคล้องกับจุดเน้นทางเทคโนโลยีของรัฐบาล"
 councilor_corporate_crowdsourcing: "ผู้ตัดสินไอเดีย"
 councilor_corporate_crowdsourcing_desc: "ไม่ใช่ทุกโครงการที่คุ้มค่าแก่การลงทุน และเป็นหน้าที่ของ $TITLE$ ในการประเมินความสามารถในการทำการตลาดและความสามารถในการทำกำไรของโครงการเหล่านั้น"

 civic_civil_education: "พลเมืองศึกษา"
 civic_civil_education_desc: "ในจักรวรรดินี้ การศึกษาได้เข้ามาแทนที่การบังคับใช้กฎหมาย ด้วยการเตรียมความพร้อมอย่างครอบคลุมและการปรับปรุงหลักสูตรอย่างเข้มงวด พวกเขาทำให้มั่นใจว่าไม่มีผู้ใดที่อยู่นอกเหนือการเรียนรู้ ท้ายที่สุดแล้ว ไม่มีพลเมืองที่ไม่ดี มีเพียงผู้สอนที่ไม่ดีเท่านั้น"
 civic_civil_education_effects: "$t$- แทนที่ £job_enforcer£ ['concept_enforcer'] ทั้งหมดด้วย £job_educator£ ['concept_educator'] $TABBED_NEW_LINE$- แทนที่ £building£ ['building:building_precinct_house'] ด้วย £building£ ['building:building_state_academy']"
 councilor_head_of_education: "หัวหน้าฝ่ายการศึกษา"
 councilor_head_of_education_desc: "$TITLE$ ได้รับความไว้วางใจในการเตรียมความรู้ที่จำเป็นให้แก่พลเมืองทุกคน ไม่เพียงแต่เพื่อใช้ในการทำงานเท่านั้น แต่ยังเพื่อใช้รับมือกับความซับซ้อนของชีวิตด้วย วิธีการสอนที่ดีจะช่วยส่งเสริมสังคมให้เจริญรุ่งเรือง"
 educator: "$job_educator$"
 job_educator: "ผู้ให้การศึกษา"
 job_educator_plural: "ผู้ให้การศึกษา"
 job_educator_desc: "ด้วยความอุทิศตนเพื่อเตรียมความพร้อมให้กับเยาวชน ผู้พิทักษ์ความรู้อันไม่รู้จักเหน็ดเหนื่อยเหล่านี้ทำหน้าที่บริการที่ไม่อาจหาอะไรมาทดแทนได้ เพื่อให้มั่นใจว่าพลเมืองทุกคนพร้อมที่จะเผชิญหน้ากับกาแล็กซี"
 job_educator_effect_desc: "£job_educator£ $job_educator_plural$ ใช้ $r_consumer_goods$ เพื่อผลิต $r_unity$ ลด £crime£ §Y$PLANET_CRIME_TITLE$§! เพิ่ม §Yการ ประทับ ใจ จาก การ ปกครอง§! และสร้าง £defense_army£ §Yกองทัพป้องกัน§!"
 mod_job_educator_add: "ตำแหน่งงาน$job_educator$"
 building_state_academy: "สถาบันการศึกษาแห่งรัฐ"
 building_state_academy_desc: "ณ ที่แห่งนี้ พื้นฐานที่ถือว่าจำเป็นสำหรับสังคมที่ดีย่อมได้รับการสั่งสอน"
 concept_state_academy: "$building_state_academy$"
 concept_state_academy_desc: "ตำแหน่งงาน$job_educator$: §G+200§!\n\n$job_educator_effect_desc$\n$h_line$§L$building_state_academy_desc$§!"
 building_center_of_guidance: "ศูนย์แนะแนว"
 building_center_of_guidance_desc: "ครอบคลุมทุกแง่มุมของการใช้ชีวิตในสังคม ภายในอาคารเรียนและสถานฝึกอบรมขนาดมหึมาแห่งนี้ ความเบี่ยงเบนใดๆ ย่อมสามารถแก้ไขให้ถูกต้องได้"
 mod_planet_jobs_citizen_produces_mult: "ผลผลิตทรัพยากรประชากรที่มีสัญชาติเต็มขั้น"

 civic_hive_familiar_face: "ใบหน้าที่คุ้นเคย"
 civic_hive_familiar_face_desc: "การร่วมมือเป็นที่โปรดปรานมากกว่าการเผชิญหน้าโดยตรง ไฮฟ์ไมนด์นี้ได้วิวัฒนาการโดรนทูตที่สามารถปรับเปลี่ยนรูปร่างและอากัปกิริยาให้เหมือนกับคู่สนทนาได้"
 civic_wilderness_familiar_face: "$civic_hive_familiar_face$"
 civic_wilderness_familiar_face_desc: "การร่วมมือเป็นที่โปรดปรานมากกว่าการเผชิญหน้าโดยตรง ผืนป่าพงไพรนี้ได้วิวัฒนาการอวตารทูตที่สามารถปรับเปลี่ยนรูปร่างและอากัปกิริยาให้เหมือนกับคู่สนทนาได้"
 civic_hive_familiar_face_effects: "ทูตและเจ้าหน้าที่จะเปลี่ยนรูปร่างทางกายภาพตามจักรวรรดิที่ได้รับมอบหมาย\nต้องการ §Yความไว้วางใจ§! เพื่อทำ §Yการกระทําต่าง ๆ§!: §G-50%§!"

 #Bioship Civics

 civic_hive_shared_genetics: "พันธุกรรมร่วม"
 civic_hive_shared_genetics_desc: "จีโนมที่กลายพันธุ์ของไฮฟ์นี้ถูกนำมาใช้เป็นฐานในการเพาะเลี้ยงยานชีวภาพ และกองยานของพวกมันก็เชื่อมโยงอย่างเหนียวแน่นกับโดรน โดยดึงเอาความแข็งแกร่งมาจากความมีเอกลักษณ์ของเผ่าพันธุ์"
 civic_wilderness_shared_genetics: "$civic_hive_shared_genetics$"
 civic_wilderness_shared_genetics_desc: "จีโนมในผืนป่าพงไพรนี้เกิดการกลายพันธุ์เป็นฐานที่เหมาะสมสำหรับเพาะเลี้ยงยานชีวภาพ กองยานของมันเชื่อมโยงอย่างเหนียวแน่นกับสิ่งมีชีวิตร่วมอาศัยอื่นๆ โดยแต่ละสปีชีส์ดึงความแข็งแกร่งซึ่งกันและกัน"
 civic_hive_shared_genetics_effects: "- สำหรับแต่ละคุณลักษณะหลักเผ่าพันธุ์ที่เป็น §Gบวก§!: §G+2.5%§! ตัวยาน, §R+0.5%§! ค่าบำรุงรักษา\n- สำหรับแต่ละคุณลักษณะหลักเผ่าพันธุ์ที่เป็น §Rลบ§!: §G+1.5%§! อัตราการยิงของยาน, §R+0.5%§! ค่าบำรุงรักษา"

 shared_genetics_fire_rate: "$civic_hive_shared_genetics$: อัตราการยิง"
 shared_genetics_fire_rate_desc: "ยานของเราได้รับประโยชน์จากศูนย์กระตุ้นความก้าวร้าวที่ไวต่อการตอบสนอง ซึ่งขับเคลื่อนด้วยฮอร์โมนและความอาฆาตพยาบาทอย่างลงตัว"
 shared_genetics_hull: "$civic_hive_shared_genetics$: ตัวยาน"
 shared_genetics_hull_desc: "มวลกล้ามเนื้อและกระดูกของยานเราได้รับประโยชน์จากความเหนือกว่าทางพันธุกรรมของเผ่าพันธุ์เรา"

 civic_hive_aerospace_adaptation: "การปรับตัวของอากาศยานและอวกาศยาน"
 civic_hive_aerospace_adaptation_desc: "ยานชีวภาพของกลุ่มส่วนรวมนี้มีความเหมาะสมเป็นพิเศษสำหรับการบินผ่านชั้นบรรยากาศ ทำให้พวกมันสามารถปฏิบัติภารกิจสนับสนุนทางอากาศอย่างใกล้ชิด หรือแม้กระทั่งช่วยเหลืองานด้านโลจิสติกส์ของดาวเคราะห์ได้"
 civic_hive_aerospace_adaptation_effects: "- §Yเรือ ชีวภาพ§! ที่โคจรรอบอาณานิคม §Gเป็นมิตร§! จะมีค่าบำรุงรักษายาน §G-50%§!\n- อาณานิคม §Gเป็นมิตร§! ที่มี §Yเรือ ชีวภาพ§! โคจรรอบจะได้รับ §Yความเร็วในการสร้าง§!, §Yคุณสมบัติ§!, §Yล้างความเร็วของตัวบล็อค§! เพิ่มขึ้น และอาจได้รับ §Yส่งออกงาน§! เพิ่มขึ้น ขึ้นอยู่กับขนาดของกองยาน\n- §Yเรือ ชีวภาพ§! ที่โคจรรอบอาณานิคม §Rศัตรู§! จะมีค่าบำรุงรักษายาน §G-85%§!"

