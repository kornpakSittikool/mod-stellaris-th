 origin_starlit_citadel_desc: "พอร์ทัลลึกลับปรากฏขึ้นที่ขอบระบบบ้านเกิดของอารยธรรมนี้ ประตูมิติซึ่งมีสิ่งมีชีวิตที่เป็นปฏิปักษ์ปรากฏออกมาเป็นระลอกอย่างไม่หยุดยั้ง การบุกรุกเหล่านี้คาดเดาไม่ได้พอๆ กับที่หลีกเลี่ยงไม่ได้ บังคับให้ผู้คนต้องพึ่งพาความสำเร็จทางเทคโนโลยีที่ยิ่งใหญ่ที่สุดของพวกเขา - §H$dsc_name$§!"
 origin_tooltip_starlit_citadel_effects: "- $HOME_SYSTEM$ $TABBED_NEW_LINE$- ['concept_deep_space_bastion'] ที่ขอบของแรงดึงดูด $TABBED_NEW_LINE$- ['concept_wormhole', $BYPASS_STARLIT_WORMHOLE$] ที่นำไปสู่ระบบที่ไม่รู้จัก $NEW_LINE$- $HOMEWORLD$ $TABBED_NEW_LINE$- £building£ ['building:building_citadel_uplink'] $TABBED_NEW_LINE$- ['concept_bioship_remains', £blocker£ $d_bioship_remains$] $TABBED_NEW_LINE$- ['concept_invasion_site', £blocker£ $d_invasion_site$]: +2 $NEW_LINE$- $ADDITIONAL_TECHNOLOGIES_STRING$ ['concept_deep_space_citadel_tech',£engineering_research£ $tech_deep_space_citadel$]"

 START_SCREEN_STARLIT_CITADEL: "เราไม่ได้ระแวดระวังเช่นนี้เสมอมา...\n\n[Capital.GetName] เป็นโลกที่อุดมสมบูรณ์ และครั้งหนึ่ง เราเคยเป็นผู้คนที่รักสงบและมีความสุข แต่ทั้งหมดนั้นเปลี่ยนไปเมื่อพอร์ทัลเปิดออก\n\nโดยไม่มีการเตือนล่วงหน้า [GetInvadersLower] ก็มาถึง พวกเขาทำลายล้างเมืองของเรา ทำลายดินแดนของเรา และจากนั้นก็หายไปอย่างรวดเร็วเหมือนตอนที่มา เรากล้าหวังว่าพวกเขาจะไม่กลับมาอีก แต่การรุกรานยังคงดำเนินต่อไป ครั้งแล้วครั้งเล่า แต่ละการโจมตีโหดร้ายยิ่งกว่าครั้งก่อน\n\nบัดนี้ ขณะที่เราเตรียมพร้อมที่จะเดินทางเข้าสู่กาแล็กซี $job_skywatcher_plural$ ของเราพร้อมแล้ว เหนือโลกของเราขึ้นไป $dsc_name$ ที่น่าเกรงขามกำลังรออยู่ ป้อมปราการที่มั่นคงเพื่อต่อต้าน [GetInvadersLower] และผู้ใดก็ตามที่พยายามทำลายล้างเรา"

