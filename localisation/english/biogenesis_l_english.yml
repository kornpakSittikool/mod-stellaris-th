 bio.375.name: "การเชื่อมต่อที่ลึกซึ้งยิ่งขึ้น"
 bio.375.desc: "เราได้ค้นพบบางสิ่งบางอย่าง ด้วยการดัดแปลงยีนเฉพาะเจาะจง เราสามารถขยายการเข้าถึงของจิตสำนึกเพื่อมอบประสาทสัมผัสที่เฉียบคมยิ่งขึ้นแก่เรา เกินกว่าที่เราเคยคิดว่าเป็นขีดจำกัดของเผ่าพันธุ์\n\nการดำเนินมาตรการการกลายพันธุ์เหล่านี้ทั่วทั้งรังจะต้องใช้พลังงานจำนวนมาก แต่การทำเช่นนั้นอาจทำให้เราเข้าใจจักรวรรดิรวมถึงตำแหน่งแห่งที่ของเราในจักรวาลนี้ได้อย่างลึกซึ้งยิ่งขึ้น"
 bio.375.a: "ต้นทุนนั้นน้อยมาก ดำเนินการต่อเลย"
 bio.375.b: "กระบวนการนี้ต้องไม่รีบเร่งจนเกินไป"
 mod_planet_evaluators_physics_research_produces_add: "£physics_research£ $physics_research$ ต่อ $pop_group_unit$ [evaluator.GetIcon] [evaluator.GetNamePlural]"

 bio.380.name: "อารมณ์ที่ท่วมท้น"
 bio.380.desc: "ส่วนต่างๆ ของรังกำลังเผชิญกับอารมณ์โกรธแค้นที่ควบคุมไม่ได้ ซึ่งส่งคลื่นรบกวนผ่านจิตสำนึกร่วมและขยายความเจ็บปวดรวมถึงความคับข้องใจของส่วนรวม\n\nการกลายพันธุ์ที่นำมาใช้เมื่อเร็วๆ นี้ดูเหมือนจะไปกระตุ้นเซลล์ประสาทในศูนย์ควบคุมความก้าวร้าวของโดรนมากเกินไป ส่งผลให้สมดุลทางอารมณ์ของรังถูกทำลาย ความขัดแย้งกำลังปะทุบ่อยขึ้น โดยมีโดรนบางตัวละทิ้งหน้าที่และเข้าโจมตีผู้อื่น"
 bio.380.a: "ในฐานะหนึ่งเดียว เราต้องมีสติ"
 bio.380.b: "โอบรับความโกรธนี้ไว้"

 bio.385.name: "ความไม่ทนทานต่อสภาพแวดล้อม"
 bio.385.desc: "ในขณะที่การกลายพันธุ์บางอย่างช่วยกระตุ้นและเสริมสร้างความแข็งแกร่งให้เรา แต่เราก็พบว่าส่วนอื่นๆ มาพร้อมกับผลข้างเคียงที่ไม่พึงประสงค์\n\nการปรับปรุงที่มุ่งหวังเพิ่มอายุขัยของเรานั้นกำลังดำเนินการอย่างประสบความสำเร็จ อย่างไรก็ตาม การกลายพันธุ์เดียวกันนี้กำลังลดความทนทานต่อสภาพภูมิอากาศที่รุนแรงของเรา\n\nพวกเราบางคนที่ผ่านการเสริมสร้างทางชีวภาพเหล่านี้กำลังมีปัญหาในการควบคุมระบบควบคุมอุณหภูมิภายในร่างกาย และความรู้สึกไม่สบายตัวนี้ก็ส่งผ่านไปทั่วทั้งรัง"
 bio.385.a: "เราต้องอัปเกรดระบบป้องกันสภาพอากาศของเรา"
 bio.385.b: "เมื่อเราเปลี่ยนไป ความพึงใจทางสภาพแวดล้อมของเราก็เปลี่ยนไปเช่นกัน"
 uncomfortable_drones: "โดรนที่ไม่สบายตัว"
 uncomfortable_drones_desc: "โดรนของเราต้องดิ้นรนฟันฝ่าความไม่สบายตัวที่เกิดจากการกลายพันธุ์"

 bio.390.name: "พละกำลังหรือสมอง"
 bio.390.desc: "คู่ของการกลายพันธุ์ได้รับการระบุ ตัวแปรหนึ่งจะเสริมสร้างพละกำลังของโดรนผู้ใช้แรงงาน ซึ่งช่วยปรับปรุงประสิทธิภาพในการทำงานอย่างมาก อีกตัวแปรหนึ่งจะทำให้สติปัญญาของโดรนผู้ทำงานซับซ้อนเฉียบคมขึ้น ช่วยเพิ่มความสามารถในการแก้ปัญหาและวางกลยุทธ์\n\nรังต้องตัดสินใจว่าจะโอบรับเส้นทางใด"
 bio.390.a: "พละกำลังคือความก้าวหน้า"
 bio.390.b: "เราคิด เราจึงเจริญรุ่งเรือง"

