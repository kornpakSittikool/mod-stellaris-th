 civic_hive_bodysnatcher: "ผู้ชิงร่าง"
 civic_hive_bodysnatcher_desc: "สิ่งที่อยู่ภายในต่างหากที่สำคัญ ไฮฟ์นี้เชี่ยวชาญด้านการแทรกซึม บังคับควบคุมร่างกายของสิ่งมีชีวิตอินทรีย์ที่โชคร้าย และเมื่อจำนวนหุ่นเชิดเพิ่มมากขึ้นอย่างเลี่ยงไม่ได้ อารยธรรมที่เป็นโฮสต์ก็จะถูกกลืนกินเข้าสู่ส่วนรวมในที่สุด"
 civic_hive_bodysnatcher_effects: "เริ่มเกมด้วยประชากร £pop£ ที่ถูกกลืนกลายแล้วจำนวน §Y1000§! หน่วย และความสามารถในการ §Yแบบย่อ:§! สิ่งมีชีวิตอินทรีย์เข้าสู่ไฮฟ์ไมนด์\nสามารถเข้าถึงภารกิจจารกรรม ['concept_operation_bodysnatcher_prepare_invasion']\nได้รับประชากร £pop£ เพิ่มเติมจากภารกิจจารกรรม ['concept_operation_smuggle_pops']"
