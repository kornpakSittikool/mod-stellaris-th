 ### ADDITIONAL RANDOM EVENTS
 ## NON-HIVE
 # PURITY

 bio.200.name: "โอบรับมรดกของเรา"
 bio.200.desc: "ด้วยการมุ่งเน้นไปที่การชำระล้างพันธุกรรมของเรา เราจึงตระหนักถึงสิ่งต่าง ๆ ที่ทำให้อารยธรรมของเรายิ่งใหญ่\n\nเมื่อเรามีความบริสุทธิ์ยิ่งกว่าที่เคย เราจึงไม่เคยรู้สึกภาคภูมิใจในมรดกอันเหนือกว่าของเรามากเท่านี้มาก่อน\n\nผู้เชี่ยวชาญจากทุกสาขา ไม่ว่าจะเป็นศิลปะ วิทยาศาสตร์ และธุรกิจ ต่างต่างพากันส่งเสียงเชียร์ความพยายามร่วมกันของเรา และหวังที่จะเป็นผู้นำทางไปสู่เกียรติยศของเรา"
 bio.200.a: "เราจะเฉลิมฉลองความสำเร็จครั้งนี้ด้วยการสนับสนุนทุนสำหรับศิลปะ!"
 bio.200.b: "การวิจัยทางวิทยาศาสตร์ต้องมาก่อนเสมอ"
 bio.200.c: "การบริโภคคือหัวใจสำคัญของเศรษฐกิจ"

 bio.210.name: "เราจะไม่ยอมถูกชำระล้าง!"
 bio.210.desc: "เสียงตะโกนจากกลุ่มผู้ประท้วงดังก้องไปทั่วเมือง กลุ่มกบฏภายในจักรวรรดิของเราได้ตัดสินใจปฏิเสธเป้าหมายของเรา และหันหลังให้กับเส้นทางสู่ความบริสุทธิ์ของเรา\n\nผู้สร้างความปั่นป่วนเหล่านี้เทศนาเกี่ยวกับความจำเป็นในการมีความหลากหลายทางพันธุกรรมและการบูรณาการทางวัฒนธรรม\n\nหากการเคลื่อนไหวของพวกเขายังไม่ได้รับการจัดการ ก็มีความเสี่ยงที่ความก้าวหน้าสู่ความบริสุทธิ์ของเราอาจจะหยุดชะงักได้"
 bio.210.a: "กวาดล้างผู้เห็นต่างเหล่านี้!"
 bio.210.b: "ปลอบประโลมพวกเขาด้วยสัญญาลม ๆ แล้ง ๆ"

 bio.215.name: "ความลับในอดีต"
 bio.215.desc: "นักโบราณคดีได้ค้นพบหลักฐานของอารยธรรมโบราณจากปิตุภูมิบรรพบุรุษของเรา\n\nห้องนิรภัยที่ถูกฝังไว้เป็นเวลานานได้รับการเปิดเผย และภายในนั้นมีหลักฐานที่น่าตกใจเกี่ยวกับการทดลองทางพันธุกรรมในอดีต\n\nหากข่าวนี้กลายเป็นที่รับรู้ของสาธารณชน มันอาจบั่นทอนความน่าเชื่อถือของการอ้างสิทธิ์ในความบริสุทธิ์ทางพันธุกรรมในยุคปัจจุบันของเราได้"
 bio.215.a: "บูรณาการงานวิจัยนี้เข้ากับงานวิจัยของเรา ต่อยอดจากอดีต"
 bio.215.b: "ทำลายหลักฐานซะ จะต้องไม่มีใครรู้เรื่องนี้"

 bio.220.name: "วิทยาศาสตร์สุดแปลก"
 bio.220.desc: "พบว่านักพันธุศาสตร์นอกรีตชื่อ [event_target:rogue_geneticist.GetName] กำลังทำการทดลองทางชีววิทยาที่ไม่ได้รับอนุญาต ด้วยการหลีกเลี่ยงแนวทางความปลอดภัยใดๆ เป้าหมายของ[event_target:rogue_geneticist.GetHisHer]คือการสร้างเผ่าพันธุ์ของผู้มีชีวิตที่เหนือกว่าซึ่งจะรวมเอาอุดมคติแห่งความบริสุทธิ์ที่เรามุ่งมั่นเพื่อมัน แต่ทว่า [event_target:rogue_geneticist.GetHeShe] กลับให้กำเนิดสิ่งน่าเกลียดน่ากลัวขึ้นมา\n\nสปีชีส์ย่อยของสิ่งมีชีวิตที่มีอายุขัยสั้น ซึ่งมีลักษณะทางพันธุกรรมบางส่วนร่วมกับเรา แต่ส่วนใหญ่เป็นสิ่งสยองขวัญที่เต็มไปด้วยโรคภัย บัดนี้กำลังเหี่ยวเฉาไปในการควบคุมตัวของเรา แม้ว่าการศึกษาโครงสร้างทางพันธุกรรมของพวกมันจะสัมฤทธิ์ผล แต่การพยากรณ์โรคก็ระบุว่าพวกมันถึงแก่ความตายอย่างไม่อาจหลีกเลี่ยงได้ [event_target:rogue_geneticist.GetName] ไม่รู้สึกผิดเลยแม้แต่น้อย"
 bio.220.a: "ปลดผู้ก่อการนอกรีตคนนี้ออกจากตำแหน่ง!"
 bio.220.a.tt: "[event_target:rogue_geneticist.GetName] ถูกบังคับให้เกษียณอายุ"
 bio.220.b: "\"เงียบ\"[event_target:rogue_geneticist.GetName]."
 bio.220.c: "นี่คือโครงการริเริ่มประเภทที่เราต้องการอย่างยิ่ง!"

 bio.225.name: "เรื่องอื้อฉาวเรื่องความบริสุทธิ์!"
 bio.225.desc: "หลังจากเริ่มดำเนินการตรวจพันธุกรรมอย่างสม่ำเสมอเพื่อปรับปรุงเส้นทางสู่ความบริสุทธิ์ และระบุความผิดปกติทางจีโนม ดีเอ็นเอ 'คุณภาพสูง' จึงกลายเป็นสิ่งที่น่าภาคภูมิใจ\n\nข้าราชการจักรวรรดิบางคนถูกกล่าวหาว่าโกหกเกี่ยวกับโครงสร้างทางชีววิทยาของตน โดยปลอมแปลงผลการทดสอบที่ชี้ว่าพวกเขามีลักษณะที่พึงประสงค์มากกว่าความเป็นจริง หากความจริงนี้ถูกเปิดเผย การปิดบังความจริงนี้อาจทำให้สาธารณชนโกรธเคือง"
 bio.225.a: "เราต้องการการทดสอบที่แม่นยำและเชื่อถือได้มากกว่านี้"
 bio.225.b: "บางทีเจ้าหน้าที่คนนี้อาจทำผิดพลาดไป..."

 ### ADDITIONAL RANDOM EVENTS
 ## NON-HIVE
 # CLONING

 bio.230.name: "ประเด็นที่กลืนไม่เข้าคายไม่ออกของร่างโคลน"
 bio.230.desc: "ร่างโคลนเดินอยู่ท่ามกลางพวกเรา พวกเขาอาศัยอยู่ในเมืองของเรา ทำงานในโรงงานของเรา บางคนยังอยู่ในตำแหน่งผู้มีอำนาจ คอยกำหนดนโยบายที่ควบคุมชีวิตของเราด้วยซ้ำ\n\nด้วยการรวมตัวของบุคคลที่ถูกโคลนเข้าสู่สังคมของเรา ยังคงมีคำถามที่ไม่มีคำตอบอีกมากมาย สิทธิของพวกเขาคืออะไร? พวกเขาเท่าเทียมกับผู้ที่ไม่ใช่ร่างโคลน หรือควรจะถูกจัดให้อยู่ในฐานะผู้ใต้บังคับบัญชา?"
 bio.230.a: "มอบสถานะพลเมืองเต็มขั้นให้แก่ร่างโคลนทั้งหมด!"
 bio.230.b: "อย่างดีที่สุดพวกเขาก็เป็นแค่พลเมืองชั้นสอง"

 bio.235.name: "การวินาศกรรมที่โรงงานร่างโคลน!"
 bio.235.desc: "การผลิตร่างโคลนที่หนึ่งในโรงงานที่มีประสิทธิภาพสูงสุดของเราต้องหยุดชะงักลงอย่างกะทันหันเนื่องจากเหตุการณ์ที่สร้างความเสียหายอย่างรุนแรง\n\nเนื่องจากการดำเนินงานส่วนใหญ่ของเราเป็นแบบอัตโนมัติเพื่อประสิทธิภาพ จึงไม่มีใครเข้าไปแทรกแซงในจังหวะสำคัญที่นำไปสู่ความวุ่นวายนี้\n\nร่างโคลนคนหนึ่งที่เพิ่งออกจากสายพานลำเลียงได้ลื่นไถลเข้าไปติดในกลไก ทำให้ถูกบดขยี้ ส่งผลให้เกิดการสะสมตัวของชิ้นส่วน และจำเป็นต้องหยุดการผลิตทั้งหมด"
 bio.235.a: "เรื่องนี้ต้องมีการสืบสวนอย่างเต็มรูปแบบ!"
 bio.235.a.tt: "ความเร็วความคืบหน้าของสถานการณ์ §Y$genetic_ascension_situation$§! เป็นเวลา §Y12§! เดือน: §R-50%§!"
 biomorphosis_stalled_tt: "ความเร็วความคืบหน้าของสถานการณ์ §Y$genetic_ascension_situation$§! เป็นเวลา §Y12§! เดือน:"
 bio.235.b: "เริ่มทำการผลิตต่อโดยเร็วที่สุด!"

 bio.240.name: "วิกฤตอัตลักษณ์"
 bio.240.desc: "ร่างโคลนทั่วทั้งจักรวรรดิของเรากำลังรายงานถึงความยากลำบาก ในการต่อสู้กับความรู้สึกรู้คิดในตนเอง\n\nพวกเขาปรารถนาที่จะมีอัตลักษณ์ที่นอกเหนือไปจากผู้บริจาคพันธุกรรม พวกเขาตั้งคำถามถึงเป้าหมายของตนเอง รู้สึกหมดอาลัยตายอยากเกี่ยวกับเป้าหมายและแรงบันดาลใจในชีวิต"
 bio.240.a: "นี่เป็นเรื่องปกติธรรมดา ไปรับการบำบัดซะ"
 bio.240.b: "พวกเขาควรจะมองหาความพึงพอใจจากการทำงาน"
 bio.240.b.tt: "§Y£leader£ ผู้นำ§! ทุกคนของสปีชีส์หลักของจักรวรรดิจะได้รับประสบการณ์ §G+200§!"

 bio.250.name: "ร่างโคลนอยู่ทุกหนทุกแห่ง!"
 bio.250.desc: "เมื่อมีการรวมร่างโคลนเข้ากับประชากรของเรามากขึ้น ทรัพยากรเพิ่มเติมที่จำเป็นในการเลี้ยงดูพวกเขาก็เริ่มสร้างความตึงเครียดให้กับเศรษฐกิจ\n\nแม้ว่าความท้าทายเฉพาะหน้าจะมีความสำคัญ แต่พลวัตทางเศรษฐกิจที่เกิดจากกำลังแรงงานและฐานผู้บริโภคที่ใหญ่ขึ้นก็สามารถวางรากฐานสำหรับความรุ่งเรืองในระยะยาวได้ - หากเราสามารถจัดการกับการเปลี่ยนผ่านนี้ได้อย่างมีประสิทธิภาพ"
 bio.250.a: "โครงสร้างพื้นฐานของเราต้องเติบโตเพื่อตอบสนองความต้องการ"
 bio.250.b: "พวกเขาสามารถเพลิดเพลินกับชีวิตบนอาณานิคมนอกโลกได้"

 ### ADDITIONAL RANDOM EVENTS
 ## NON-HIVE
 # MUTATION

 bio.260.name: "การกลายพันธุ์ที่ควบคุมไม่ได้"
 bio.260.desc: "การงอกของระยางค์ที่เกิดขึ้นเอง ความผันผวนระหว่างสถานะของสสาร การเปลี่ยนแปลงรูปร่างอย่างกะทันหัน รายงานเหล่านี้มีไม่บ่อยนัก แต่ก็ไม่อาจละเลยได้\n\nการทดลองกลายพันธุ์ของเรากำลังทำให้เกิดผลลัพธ์ที่ไม่พึงประสงค์บางประการทั่วทั้งอารยธรรมของเรา บางทีการปลดล็อกเครื่องมือในการปรับแต่งยีนตามใจชอบอาจเป็นสิ่งที่สร้างปัญหามากกว่าที่เราคาดไว้ในตอนแรก"
 bio.260.a: "การกลายพันธุ์ที่ผิดปกติสามารถกระตุ้นการวิจัยของเราได้"
 bio_260_opinion_tt: "§YSpiritualist§! empires' opinion of us changes by: §R-50§!"
 bio.260.b: "กำจัดสิ่งน่าเกลียดน่ากลัวเหล่านั้นทิ้งซะ"
 bio.260.b.tt: "§Yการอนุญาตสิทธิ์£leader£ ผู้นำฝ่ายอำนาจนิยม§! ทุกคนได้รับคุณลักษณะ §Y$leader_trait_eager$§!"

 bio.265.name: "ความยอดเยี่ยมของมนุษย์กลายพันธุ์"
 bio.265.desc: "ประชากรจำนวนเล็กน้อยของเราได้พัฒนาความสามารถพิเศษและการเพิ่มประสิทธิภาพทางกายภาพอันเนื่องมาจากการทดลองกลายพันธุ์ของพวกเขาเอง\n\nในฐานะผู้ที่มีความแข็งแกร่งและพรสวรรค์เฉพาะตัว พวกเขากำลังรวมตัวกันเป็นชุมชนและดึงดูดความสนใจจากสาธารณชนอย่างมาก"
 bio.265.a: "ความสำเร็จของพวกเขาอาจสร้างแรงบันดาลใจให้กับผู้อื่น"
 bio.265.b: "ฟังดูเหมือนพวกมันน่าจะเป็นทหารที่ดีได้"
 bio.265.b.tt: "สร้างกองทัพ §Y$gene_warrior_army$§! บน §Y[Owner.capital_scope.GetName]§!"
 bio_265_opinion_tt: "§YMilitarist§! empires' opinion of us changes by: §G+50§!"
 bio.265.c: "ค้นหาว่าพวกเขาทำสิ่งนี้ได้อย่างไรแล้วจำลองมันขึ้นมา"

 bio.270.name: "เมื่อตำนานเมืองกลายเป็นจริง"
 bio.270.desc: "การเฝ้าระวังได้ยืนยันถึงการมีอยู่ของประชากรที่ได้รับการดัดแปลงพันธุกรรมซึ่งอาศัยอยู่ในระบบระบายน้ำทิ้งของเมือง - ซึ่งเป็นเสียงสะท้อนที่น่ากังวลของตำนานเมืองที่ถูกละเลยไปนาน\n\nการค้นพบนี้ทำให้เกิดความตึงเครียดทางสังคมที่สูงขึ้น โดยพลเมืองที่กลายพันธุ์อย่างเห็นได้ชัดรายงานว่ามีการเลือกปฏิบัติที่เพิ่มขึ้นในขณะที่ความกลัวต่อสิ่งที่ไม่รู้ทวีความรุนแรงขึ้น อย่างไรก็ตาม บุคคลเหล่านี้ได้แสดงให้เห็นถึงความชาญฉลาดที่โดดเด่น โดยการใช้ก๊าซจากท่อระบายน้ำเพื่อการผลิตทรัพยากรและปรับตัวให้เข้ากับสภาพแวดล้อมในรูปแบบที่ไม่คาดคิด"
 bio.270.a: "ชำระล้างท่อระบายน้ำเหล่านั้นซะ!"
 bio.270.b: "มนุษย์กลายพันธุ์เหล่านี้อาจจะค้นพบบางอย่างเข้าแล้ว..."

 bio.280.name: "โรคติดต่อของมนุษย์กลายพันธุ์"
 bio.280.desc: "การแพร่ระบาดของโรคใหม่กำลังกระจายไปทั่วจักรวรรดิของเรา โรคนี้ทำให้เกิดอาการไม่พึงประสงค์หลายประการ ซึ่งรวมถึงแต่ไม่จำกัดเพียง: การสำลักลมและของเหลวออกมาโดยไม่สมัครใจ ความเหนื่อยล้าที่ทำให้อ่อนแรง และในบางกรณีถึงขั้นเสียชีวิต\n\nที่น่าแปลกที่สุดคือ โรคนี้ส่งผลกระทบต่อผู้ที่ดัดแปลงสรีรวิทยาของตนด้วยการกลายพันธุ์ทางพันธุกรรมในรูปแบบเฉพาะเท่านั้น การศึกษาจีโนมที่ปรับแต่งของพวกเขาอย่างต่อเนื่องได้นำไปสู่ความเข้าใจที่น่าประหลาดใจบางประการ"
 bio.280.a: "ประยุกต์ใช้ในการบำบัดรักษาโรค"
 bio.280.b: "เปลี่ยนโรคร้ายนี้ให้กลายเป็นอาวุธ"
 bio_280_opinion_tt: "§YMaterialist§! empires' opinion of us changes by: §R-50§!"

 ### ADDITIONAL RANDOM EVENTS
 ## NON-HIVE
 # ANY APPROACH

 bio.295.name: "เซลล์ขบถ"
 bio.295.desc: "จี โนม ของ เราการวิจัยสภาพแวดล้อมทําให้อารยธรรมทั้งหมดของเรา เข้าถึงการเปลี่ยนแปลงทางกายภาพ แตกต่างจากสิ่งที่เราเคยเจอ\n\nอย่างไรก็ตาม พลเมืองของจักรวรรดิของเราต้องการมากขึ้น มันมีการเรียกร้องให้ทําลายทรัพยากรส่วนกลาง และอนุญาตให้เรียก \"ไบโอฮากเกอร์\"สถานวิจัยจีโนมของเราได้ช่วยให้อารยธรรมทั้งหมดของเราสามารถเข้าถึงการปรับแต่งสรีรวิทยาในแบบที่ไม่เคยมีมาก่อน\n\nอย่างไรก็ตาม พลเมืองในจักรวรรดิของเราต้องการมากกว่านั้น มีการเรียกร้องให้กระจายทรัพยากรที่รวมศูนย์ และเปิดโอกาสให้พวกที่เรียกกันว่า "
 bio.295.a: "มอบสิทธิ์ในการปกครองตนเองให้กับเหล่านักแฮกชีวภาพมากขึ้น"
 bio.295.b: "พลเมืองทั่วไปมีเสรีภาพมากเกินไปอยู่แล้ว"
 bio_295_opinion_tt: "§YEgalitarian§! empires' opinion of us changes by: §G+50§!"

 bio.300.name: "นักพันธุศาสตร์อัจฉริยะ"
 bio.300.desc: "[Owner.GetScientist] นามว่า [event_target:genius_geneticist.GetName] เพิ่งเผยแพร่ผลงานวิจัยทางวิชาการที่สามารถนำไปใช้เพื่อเร่งความเร็วและปรับปรุงประสิทธิภาพและประสิทธิผลของการทดลองทางพันธุกรรมของเราอย่างมาก\n\nแต่วิธีการใหม่นี้เป็นเพียงทฤษฎีเท่านั้นและยังไม่ได้รับการทดสอบ ดังนั้นจึงต้องอาศัยการพิจารณาอย่างรอบคอบเพื่อนำไปใช้อย่างปลอดภัยในกระบวนการของเรา"
 bio.300.a: "ยกย่องการอุทิศตนของ [event_target:genius_geneticist.GetName]"
 bio.300.b: "ความคิดและตัวบุคคลที่ไร้สาระจะไม่ได้รับการยอมรับ"
 bio.300.c: "ทุกคนกลับไปทำงานได้แล้ว"

 ### ADDITIONAL RANDOM EVENTS
 ## HIVE
 # PURITY

 bio.310.name: "ช่องโหว่ความบริสุทธิ์ของ [target.GetGestaltEntityName]"
 bio.310.desc: "เผ่าพันธุ์ของเราถูกแทรกซึมโดยชิ้นส่วนของรหัสพันธุกรรมนอกรีต ซึ่งเป็นผลจากการทดลองดัดแปลงพันธุกรรมอย่างต่อเนื่องของเรา เรากำลังเจ็บป่วยในอัตราที่น่าตกใจ โดยเกิดความไม่มั่นคงจากการมีปฏิสัมพันธ์ที่ไร้การควบคุมระหว่างลำดับพันธุกรรมภายนอกนี้กับสารพันธุกรรมของเราเอง\n\nเราต้องจัดการกับพฤติกรรมทางชีววิทยาที่ผิดปกติก่อนที่จะสายเกินไป"
 bio.310.a: "ชำระล้างสารปนเปื้อน"
 bio.310.b: "ให้เราศึกษามัน"

 bio.315.name: "มุ่งมั่นในเป้าหมาย"
 bio.315.desc: "หากอารยธรรมของเราจะก้าวไปสู่ความบริสุทธิ์ เราต้องพิจารณาความเป็นอยู่ของ [target.GetGestaltEntityName] เป็นอันดับแรก กระบวนการดัดแปลงพันธุกรรมต้องทำให้มั่นใจว่าทุกๆ การปรับตัวจะช่วยเพิ่มความยืดหยุ่นของกลุ่มส่วนรวม\n\nการเริ่มต้นด้วยเส้นทางที่ผิดพลาด - โดยการนำเสนอการเปลี่ยนแปลงที่ก่อให้เกิดความไม่มั่นคงหรือบ่อนทำลายความสามัคคี - อาจนำไปสู่ความหายนะและคุกคามรากฐานของความสามัคคีของเราได้"
 bio.315.a: "มุ่งเน้นไปที่ความยืดหยุ่นทางกายภาพ"
 bio.315.b: "ประสิทธิภาพการรับรู้มีความสำคัญสูงสุด"

 bio.325.name: "เหนือกว่าวันนี้"
 bio.325.desc: "เพื่อสร้างความมั่นใจในความยืนยาวและความบริสุทธิ์ของเผ่าพันธุ์เรา เราต้องดำเนินมาตรการคัดเลือกสายพันธุ์ที่มีประสิทธิภาพมากขึ้นและใช้โปรโตคอลคัดกรองพันธุกรรมที่เข้มงวดยิ่งขึ้น\n\nมีเพียงการคัดเลือกโดรนที่มีค่าคู่ควรแก่การสืบทอดสายเลือดของเราอย่างรอบคอบเท่านั้น ที่จะช่วยให้เราสามารถก้าวข้ามผ่านวิวัฒนาการตามธรรมชาติได้"
 bio.325.desc.wilderness: "เพื่อสร้างความมั่นใจในความยืนยาวและความบริสุทธิ์ของฝูงสิ่งมีชีวิตที่อยู่ร่วมกันแบบพึ่งพาอาศัยกันของเรา เราต้องดำเนินมาตรการคัดเลือกสายพันธุ์ที่มีประสิทธิภาพมากขึ้นและใช้โปรโตคอลคัดกรองพันธุกรรมที่เข้มงวดยิ่งขึ้น\n\nมีเพียงการคัดเลือกสิ่งมีชีวิตที่พึ่งพาอาศัยกันได้จริงและมีลักษณะที่เป็นประโยชน์ต่อกลุ่มรวมอย่างรอบคอบเท่านั้น ที่จะช่วยให้เราก้าวข้ามขีดจำกัดเริ่มแรกของเราไปได้"
 bio.325.a: "เราจะทำการคัดกรองเพื่อหาความชาญฉลาด"
 bio.325.b: "เราเพาะพันธุ์เพื่อขยายขนาด"

 bio.330.name: "การทะยานขึ้นอย่างเต็มไปด้วยทรัพยากร"
 bio.330.desc: "ผลตอบแทนจากการดัดแปลงพันธุกรรมจะช่วยรักษาเสถียรภาพและสืบทอดมรดกของเรา แต่บทบาทของ [target.GetIndividualName] ทุกตน และความพยายามในทุกอณู ต้องสอดคล้องกับวิสัยทัศน์แห่งความบริสุทธิ์ของเรา\n\nตอนนี้เราเผชิญกับการตัดสินใจที่สำคัญ: เราควรปรับให้เหมาะสมเพื่อความสมบูรณ์แบบโดยแลกกับความสามารถในการปรับตัวหรือไม่? หรือเราควรยอมรับกลยุทธ์ที่กว้างขึ้น โดยให้ความสำคัญกับโครงสร้างพื้นฐานที่จำเป็นในการรักษาความพยายามเหล่านี้?"
 bio.330.a: "การก้าวสู่ความบริสุทธิ์ต้องเป็นเป้าหมายเดียวของเรา"
 bio.330.b: "เราต้องใช้เวลาในการพัฒนาโครงสร้างพื้นฐานของเรา"

 bio.335.name: "กำจัดความไม่สมบูรณ์แบบ"
 bio.335.desc: "เราได้คัดแยกสิ่งสกปรกและความผิดปกติทางพันธุกรรมจำนวนหนึ่งภายใน [target.GetGestaltEntityName]\n\nในขณะที่เรามุ่งมั่นไปสู่เป้าหมายที่ใหญ่ขึ้น เราต้องกำจัดลักษณะที่บกพร่องเหล่านี้และทวงคืนการควบคุมการพัฒนาทางกายภาพของเรากลับมาจากวิวัฒนาการทางธรรมชาติ"
 bio.335.a: "กำจัดผู้อ่อนแอเพื่อเสริมสร้างความแข็งแกร่งให้กับส่วนรวม"
 bio.335.b: "วิศวกรรมการออกแบบใหม่ให้กับผู้ที่บกพร่อง"
 bio_335_opinion_tt: "ความเห็นของจักรวรรดิกลุ่ม §Yขนาดมาตรฐาน(ตัดต่อ)ฝ่ายฝักใฝ่ความเมตตา)§! ที่มีต่อเราเปลี่ยนไป: §R-50§!"

