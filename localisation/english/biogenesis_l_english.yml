 bio.405.name: "จีโนมที่ติดโรค"
 bio.405.desc: "เราเกือบจะควบคุมการระบาดอย่างกะทันหันของโรคระบาดทางพันธุกรรมไม่ได้\n\nการควบคุมทางชีววิทยาของเราเองได้กระตุ้นการกลายพันธุ์นอกรีตในดีเอ็นเอของเรา ส่งผลให้ [target.GetIndividualNamePlural] จำนวนมากได้รับผลกระทบทางกายภาพ\n\n[target.GetIndividualNamePlural] ที่ได้รับผลกระทบถูกกักกันโรคแล้ว และตอนนี้เราต้องตัดสินใจว่าจะก้าวต่อไปอย่างไร"
 bio.405.a: "กำจัด [target.GetIndividualNamePlural] ซะ เพื่อยุติโรคระบาด"
 bio.405.b: "ศึกษาผู้ที่ได้รับผลกระทบ"

 bio.410.name: "เซลล์ที่เสื่อมสลาย"
 bio.410.desc: "ความผิดพลาดในสูตรคำนวณของเรานำไปสู่การเสื่อมสลายของความสมบูรณ์ทางพันธุกรรมในโดรนจำนวนมาก น่าเสียดายที่เรายังไม่สามารถระบุได้ว่าความผิดพลาดนั้นเกิดขึ้นที่จุดใด\n\nหลังจากทบทวนการคำนวณทางชีววิทยาที่เกี่ยวข้องกับการยกระดับสปีชีส์ของเรา และแก้ไขขั้นตอนที่อาจเป็นปัญหาบางประการแล้ว เราก็พร้อมที่จะดำเนินการต่อไป\n\nอย่างไรก็ตาม ยังไม่เป็นที่แน่ชัดว่าเราได้แก้ไขข้อผิดพลาดแล้วจริงๆ หรือเลวร้ายกว่านั้นคือเพิ่มความผิดพลาดมากขึ้นไปอีก"
 bio.410.desc.wilderness: "ความผิดพลาดในสูตรคำนวณของเรานำไปสู่การเสื่อมสลายของความสมบูรณ์ทางพันธุกรรมในสิ่งมีชีวิตที่พึ่งพาอาศัยกันจำนวนมาก น่าเสียดายที่เรายังไม่สามารถระบุได้ว่าความผิดพลาดนั้นเกิดขึ้นที่จุดใด\n\nหลังจากทบทวนการคำนวณที่เกี่ยวข้องกับการปรับส่วนประกอบของเรา และแก้ไขสารละลายเอนไซม์ที่ไม่สมดุลบางส่วนแล้ว เราก็พร้อมที่จะดำเนินการต่อไป\n\nอย่างไรก็ตาม ยังไม่เป็นที่แน่ชัดว่าเราได้แก้ไขข้อผิดพลาดแล้วจริงๆ หรือเลวร้ายกว่านั้นคือเพิ่มความผิดพลาดมากขึ้นไปอีก"
 bio.410.a: "เราสามารถเรียนรู้ได้จากอะไรก็ตามที่จะเกิดขึ้นถัดไป"
 bio.410.b: "ระงับการทดลองชั่วคราว"
 bio.410.b.tt: "$bio.235.a.tt$"

