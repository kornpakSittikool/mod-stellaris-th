 tech_cosmogenesis_mauler: "เครื่องขย้ำรหัสลับ"
 tech_cosmogenesis_mauler_desc: "ด้วยการก้าวข้ามขอบเขตมิติปริภูมิเวลาแบบชีวภาพ เครื่องขย้ำรุ่นนี้จึงมีขนาดภายในที่ใหญ่กว่าภายนอก โครงสร้างภายนอกที่กะทัดรัดซ่อนเนื้อเยื่อกล้ามเนื้อที่ประสานกันอย่างหนาแน่น สามารถขย้ำเหยื่อได้รุนแรงเกินกว่าที่กฎฟิสิกส์ทั่วไปจะอนุญาต"
 TECH_UNLOCK_COSMO_MAULER_CONSTRUCTION_TITLE: "§Hปลดล็อกประเภทยาน:§! เครื่องขย้ำรหัสลับ"
 TECH_UNLOCK_COSMO_MAULER_CONSTRUCTION_DESC: "§Hเกมถอดไพ่§!\n$tech_cosmogenesis_mauler_desc$"
 tech_cosmogenesis_weaver: "ช่างทอผู้สับสน"
 tech_cosmogenesis_weaver_desc: "ด้วยการติดตั้งระบบอาวุธสนับสนุนที่เหนือกว่ากายวิภาคที่มองเห็น ช่างทอผู้สับสนลำนี้พร้อมจะเขียนกฎเกณฑ์มิติอวกาศขึ้นมาใหม่ ลำพังเพียงแค่ตัวมันเองก็สามารถเปลี่ยนทิศทางของสนามรบทั้งหมดได้"
 TECH_UNLOCK_COSMO_WEAVER_CONSTRUCTION_TITLE: "§Hปลดล็อกประเภทยาน:§! ช่างทอผู้สับสน"
 TECH_UNLOCK_COSMO_WEAVER_CONSTRUCTION_DESC: "§Hแถบพาเนล§!\n$tech_cosmogenesis_weaver_desc$"
 tech_cosmogenesis_harbinger: "ผู้นำทางวงกต"
 tech_cosmogenesis_harbinger_desc: "ผู้นำทางวงกตเหล่านี้ซ่อนยานจู่โจมขนาดเล็กไว้ในมิติกระเป๋าที่ถักทอเข้าด้วยกัน ยานแต่ละลำเปรียบเสมือนเขาวงกตของโรงจอดเครื่องบินที่เป็นไปไม่ได้ ซึ่งสามารถปล่อยพลังทำลายล้างที่เทียบเท่ากับกองยานรบทั้งกองทัพได้"
 TECH_UNLOCK_COSMO_HARBINGER_CONSTRUCTION_TITLE: "§Hปลดล็อกประเภทยาน:§! ผู้นำทางวงกต"
 TECH_UNLOCK_COSMO_HARBINGER_CONSTRUCTION_DESC: "§Hมาซี ฮาบินเกอร์§!\n$tech_cosmogenesis_harbinger_desc$"
 tech_cosmogenesis_stinger: "เหล็กไนลึกลับ"
 tech_cosmogenesis_stinger_desc: "ด้วยระบบอาวุธที่อัดแน่นเกินกว่าที่แหล่งพลังงานจะรับไหว เหล็กไนลึกลับนี้ไม่ควรจะใช้งานได้ด้วยซ้ำ แต่ถึงกระนั้น มันก็ยังคงยิงออกไป อย่างต่อเนื่อง"
 TECH_UNLOCK_COSMO_STINGER_CONSTRUCTION_TITLE: "§Hปลดล็อกประเภทยาน:§! เหล็กไนลึกลับ"
 TECH_UNLOCK_COSMO_STINGER_CONSTRUCTION_DESC: "§Hการเข้ารหัสสตริงเกอร์§!\n$tech_cosmogenesis_stinger_desc$"

