 SPECIES_TRAIT_ADAPTIVE_FRAMES: "['concept_adaptive_frames_traits']"

 trait_egg_laying: "การวางไข่"
 trait_egg_laying_desc: "ตัวอ่อนของเผ่าพันธุ์นี้ไม่ได้พัฒนาอยู่ภายในตัวแม่ แต่จะพัฒนาอยู่ภายในเปลือกไข่ที่คอยปกป้อง สิ่งนี้ช่วยให้การเติบโตเป็นไปอย่างรวดเร็วในช่วงเวลาที่อุดมสมบูรณ์"
 trait_egg_laying_effect: "ความเร็วในการเติบโตของประชากร: §G+15%§! เมื่ออาศัยอยู่บนดาวเคราะห์ที่มี §Gผลผลิตส่วนเกิน§! ของอาหาร $r_food$ (หรือเทียบเท่า) ในท้องถิ่น"
 trait_egg_laying_portrait_override_tt: "หรือเผ่าพันธุ์ใดๆ ที่ออกลูกเป็นไข่"

 trait_seasonal_dormancy: "การจำศีลตามฤดูกาล"
 trait_seasonal_dormancy_desc: "เผ่าพันธุ์นี้วิวัฒนาการมาบนดาวเคราะห์ที่มีฤดูกาลเป็นวัฏจักรที่เอื้อต่อการจำศีล ในยุคปัจจุบัน สิ่งกระตุ้นตามฤดูกาลเหล่านี้สามารถจำลองขึ้นด้วยวิธีประดิษฐ์เพื่อกักเก็บสมาชิกในสังคมที่มีผลิตภาพต่ำกว่าได้อย่างมีประสิทธิภาพ"
 trait_seasonal_dormancy_effect: "ค่าบำรุงรักษาประชากรที่มีงานทำ: §G-15%§!\n - ค่าบำรุงรักษาประชากรที่ว่างงานและ ['concept_denizen']: §G-75%§!"
 trait_seasonal_dormancy_portrait_override_tt: "หรือเผ่าพันธุ์ใดๆ ที่มีการจำศีล"

 trait_hollow_bones: "กระดูกกลวง"
 trait_hollow_bones_desc: "กระดูกที่เปราะบางของเผ่าพันธุ์นี้ช่วยให้พวกเขาเคลื่อนไหวได้อย่างสง่างามและง่ายดาย ทว่าพวกเขาก็มีความอ่อนไหวต่อผลกระทบจากแรงโน้มถ่วงของโลกมากขึ้นด้วยเช่นกัน"
 trait_hollow_bones_effect: "$BONUS_WORKFORCE_FOR$ ตำแหน่งงาน $pop_cat_worker_plural$, $pop_cat_simple_drone_plural$ และทหารต่อขนาดดาวเคราะห์: §R-0.67%§!"

 trait_rooted: "หยั่งราก"
 trait_rooted_desc: "เผ่าพันธุ์นี้จะหยั่งรากลงในสภาพแวดล้อมใดก็ตามที่พวกเขาอาศัยอยู่ ทำให้การโยกย้ายกลายเป็นการเผชิญความบอบช้ำทางจิตใจอย่างรุนแรง"
 AUTO_MIGRATE_ROOTED: "§Rประชากรที่หยั่งรากไม่สามารถอพยพได้§!"
 trait_rooted_effect: "§Rประชากรจะไม่ย้ายถิ่นฐานโดยอัตโนมัติ§!\n - ค่าใช้จ่ายในการย้ายถิ่นฐาน: §R+200%§!"
 trait_rooted_portrait_override_tt: "หรือเผ่าพันธุ์ใดๆ ที่ผูกติดอยู่กับสภาพแวดล้อม"

 trait_acidic_vascularity: "ระบบหลอดเลือดเป็นกรด"
 trait_acidic_vascularity_desc: "ของเหลวภายในร่างกายของเผ่าพันธุ์นี้ทำหน้าที่เป็นเกราะป้องกันที่มีประสิทธิภาพสูงสุด สารเหล่านี้มีฤทธิ์กัดกร่อนสูงและเป็นอันตรายถึงชีวิต เพื่อให้แน่ใจว่าศัตรูจะต้องเสียใจที่คิดจะสร้างบาดแผลให้แก่พวกเขา"
 trait_acidic_vascularity_effect: "กองทัพจะ §Yระเบิดเมื่อตาย§! สร้างความเสียหาย §G250§! แก่ศัตรู\n - ผลผลิตทรัพยากรจากประชากรที่ถูกกำจัด: §R-75%§!"
 DAMAGE_ARMY: "สร้างความเสียหายแก่ $ARMY|Y$"

 trait_shelled: "มีเปลือกกระดอง"
 trait_shelled_desc: "ไม่ว่าจะเติบโตขึ้นตามธรรมชาติหรือพบเจอโดยบังเอิญ (หรือการออกแบบ) เผ่าพันธุ์นี้จะนำบ้านติดตัวไปด้วยเสมอ เปลือกเหล่านี้ทำหน้าที่เป็นสถานที่หลบภัยที่ช่วยปกป้อง ทำให้มั่นใจได้ว่ามีที่พักผ่อนสำหรับค่ำคืนนี้เสมอ"
 trait_shelled_portrait_override_tt: "หรือเผ่าพันธุ์ใดๆ ที่มีเปลือกหุ้ม"

 trait_camouflage: "การพรางตัว"
 trait_camouflage_desc: "ในฐานะผู้เชี่ยวชาญการแปลงกาย เผ่าพันธุ์นี้ผสมผสานเข้ากับสภาพแวดล้อมได้อย่างราบรื่น ทำให้ตัวเองแทบจะมองไม่เห็นสำหรับผู้ล่าและเหยื่อ ความเข้าใจโดยกำเนิดเกี่ยวกับทัศนศาสตร์ช่วยให้พวกเขาได้เปรียบในการทำสงครามกองโจร"
 trait_camouflage_portrait_override_tt: "หรือเผ่าพันธุ์ใดๆ ที่มีความสามารถในการพรางตัว"

 trait_chromalogs: "การสื่อสารด้วยสี"
 trait_chromalogs_desc: "ด้วยการใช้ศิลปะแห่งสีสัน เผ่าพันธุ์นี้ได้ก้าวข้ามผ่านการพรางตัวธรรมดา โดยวิวัฒนาการมาเพื่อสื่อสารผ่านลวดลายที่มีชีวิตชีวาและซับซ้อนที่แสดงบนร่างกายของตน"
 trait_chromalogs_portrait_override_tt: "หรือเผ่าพันธุ์ใดๆ ที่ใช้สีสันบนร่างกายในการสื่อสาร"

 trait_brittle: "เปราะบาง"
 trait_brittle_desc: "ด้วยความเปราะบางที่เป็นมาแต่กำเนิด เผ่าพันธุ์นี้ต้องใช้ความระมัดระวังอย่างยิ่งในกิจกรรมประจำวันเพื่อหลีกเลี่ยงการแตกหักเสียหาย แม้ในขณะที่ทำงานธรรมดาที่สุดก็ตาม"

 trait_familial: "ผูกพันในครอบครัว"
 trait_familial_desc: "ด้วยความผูกพันผ่านความสัมพันธ์ที่ลึกซึ้งและยาวนานกับญาติสนิท เผ่าพันธุ์นี้จึงก่อตัวเป็นกลุ่มก้อนที่มีประสิทธิภาพสูงและมีความสามัคคีกันอย่างยิ่ง"
 trait_familial_effect: "ความสุขต่อประชากร £pop£ ทุกๆ §Y100§! คนที่มีคุณลักษณะนี้บนดาวเคราะห์ดวงเดียวกัน: §G0.1%§! (สูงสุด: §G+20%§!)"
 trait_familial_portrait_override_tt: "หรือเผ่าพันธุ์ใดๆ ที่เน้นครอบครัว"

 trait_permeable_skin: "ผิวหนังซึมผ่านง่าย"
 trait_permeable_skin_desc: "ผิวหนังที่พัฒนาขึ้นเป็นพิเศษซึ่งต้องการสภาวะในอุดมคติปกคลุมร่างกายของเผ่าพันธุ์นี้ ตราบใดที่เผ่าพันธุ์นี้ไม่ได้เดินทางออกไปไกลจากสภาพภูมิอากาศบ้านเกิดของตน นั่นก็ไม่น่าจะเป็นปัญหา"
 trait_permeable_skin_effect: "ความสามารถในการอยู่อาศัยบนโลกที่มี ['concept_climate_category'] แตกต่างจากที่เราชอบ: §R-20%§!"
 concept_climate_category: "ประเภทภูมิอากาศ"
 concept_climate_category_desc: "ดาวเคราะห์ที่อยู่อาศัยได้ถูกแบ่งออกเป็นสามประเภทภูมิอากาศ:\n- เปียกชื้น:\n$t$- ภาคพื้นทวีป (Continental)\n$t$- มหาสมุทร (Ocean)\n$t$- เขตร้อน (Tropical)\n- หนาวเย็น:\n$t$- แอลไพน์ (Alpine)\n$t$- อาร์กติก (Arctic)\n$t$- ทุนดรา (Tundra)\n- แห้งแล้ง:\n$t$- กึ่งแห้งแล้ง (Arid)\n$t$- ทะเลทราย (Desert)\n$t$- สะวันนา (Savanna)"

 trait_genetic_memory: "ความทรงจำทางพันธุกรรม"
 trait_genetic_memory_desc: "การส่งต่อความรู้และการเรียนรู้จากรุ่นสู่รุ่นเป็นจุดเริ่มต้นของอารยธรรมต่างๆ เผ่าพันธุ์นี้ได้ก้าวไปอีกขั้นโดยการเข้ารหัสข้อมูลการเอาชีวิตรอดลงในรหัสพันธุกรรมโดยตรง เพื่อให้มั่นใจว่าแต่ละเจเนอเรชันจะเกิดมาพร้อมกับภูมิปัญญาที่สะสมมาจากบรรพบุรุษ"
 trait_genetic_memory_effect: "ความสามารถในการอยู่อาศัยตามอายุของอาณานิคม: §G+0.5%§! ต่อปี (สูงสุด §G+25%§!)"
 trait_genetic_memory_portrait_override_tt: "หรือเผ่าพันธุ์ใดๆ ที่มีสัญชาตญาณการเอาชีวิตรอดที่สืบทอดมา"

 trait_nascent_stage: "ช่วงวัยแรกเกิด"
 trait_nascent_stage_desc: "เผ่าพันธุ์นี้ให้กำเนิดบุตรในช่วงแรกเริ่มของพัฒนาการ ส่งผลให้เกิดช่วงเวลาที่ยาวนานขึ้นซึ่งตัวอ่อนไม่สามารถช่วยเหลือสังคมได้ ในช่วงเวลานี้ พวกเขายังคงไม่ตระหนักถึงความรับผิดชอบและภาระหน้าที่ที่มาพร้อมกับการมีปัญญาญาณ"
 trait_nascent_stage_effect: "ประชากรที่เพิ่งเติบโตใหม่ที่มีคุณลักษณะนี้จะใช้เวลา §Y5§! ปีแรกหลังจากเติบโตในฐานะสิ่งมีชีวิตก่อนมีปัญญาญาณ (Pre-Sapient)"
 trait_nascent_stage_portrait_override_tt: "หรือเผ่าพันธุ์ใดๆ ที่มีระยะเวลาทารกยาวนาน"

 trait_presapient_stage: "ก่อนมีปัญญาญาณ"
 trait_presapient_stage_desc: "การใช้เวลาช่วงสั้นๆ โดยปราศจากความคิดที่เป็นตัวของตัวเอง เผ่าพันธุ์นี้จะเติบโตขึ้นเป็นสิ่งมีชีวิตที่มีปัญญาญาณอย่างสมบูรณ์ในไม่ช้า"

 trait_flight: "การบิน"
 trait_flight_desc: "เผ่าพันธุ์นี้ทะยานขึ้นเหนือข้อจำกัดของพื้นดิน บินล่องลอยไปตามท้องฟ้าอย่างอิสระ เมืองของพวกเขามีผังเมืองที่หนาแน่นและมีเอกลักษณ์ ซึ่งปรับให้เหมาะสมสำหรับผู้อยู่อาศัยทางอากาศ ในการสู้รบ พวกเขาได้รับการพิสูจน์ว่าเป็นเป้าหมายที่หลบหลีกได้ง่ายและโจมตีได้ยาก"
 trait_flight_portrait_override_tt: "หรือเผ่าพันธุ์ใดๆ ที่ปรับตัวเข้ากับชีวิตทางอากาศ"

 trait_spatial_mastery: "ความเชี่ยวชาญด้านมิติสัมพันธ์"
 trait_spatial_mastery_desc: "ไม่เพียงแต่มีความสามารถในการบินเท่านั้น เผ่าพันธุ์นี้ยังมีสมองที่ปรับตัวเป็นพิเศษ ทำให้พวกเขาสามารถประมวลผลและนำทางในพื้นที่สามมิติได้โดยสัญชาตญาณ ความสามารถเหล่านี้ทำให้พวกเขาไม่มีใครเทียบได้ในการวางแผนการรบ การสำรวจดาวเคราะห์ และการจัดการเมือง"
 trait_spatial_mastery_portrait_override_tt: "หรือเผ่าพันธุ์ใดๆ ที่มีพรสวรรค์ในการนำทางแบบสามมิติ"

 trait_spare_organs: "อวัยวะสำรอง"
 trait_spare_organs_desc: "เผ่าพันธุ์นี้วิวัฒนาการอวัยวะที่ซ้ำซ้อนเพื่อเอาชีวิตรอดจากอาการบาดเจ็บสาหัสที่สุด—การปรับตัวที่ประสบความสำเร็จ ดังหลักฐานการดำรงอยู่ของพวกเขาต่อไป"
 trait_spare_organs_effect: "ผู้นำจะรอดชีวิตจากการตายครั้งแรก\n - เมื่อกองทัพฝ่ายบุกตาย: มีโอกาส §G20%§! ที่จะสร้างกองทัพทดแทน\n - ผลผลิตของ £job_livestock£ §Y$job_livestock$§!: §G+50%§!"
 mod_planet_livestock_produces_mult: "ผลผลิตของ £job_livestock£ §Y$job_livestock$§!"

 trait_leader_second_chanced: "โอกาสครั้งที่สอง"
 trait_leader_second_chanced_desc: "ผู้นำคนนี้ได้รับการช่วยเหลือจากความตายด้วยชีววิทยาที่เป็นเอกลักษณ์ของพวกเขา สิ่งนี้จะไม่เกิดขึ้นอีกเป็นครั้งที่สอง"

