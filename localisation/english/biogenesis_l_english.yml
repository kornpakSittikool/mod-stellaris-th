 civic_genetic_identification: "การระบุตัวตนทางพันธุกรรม"
 civic_genetic_identification_desc: "สังคมนี้กำหนดให้พลเมืองทุกคนต้องลงทะเบียนตั้งแต่แรกเกิดในดัชนีพันธุกรรมที่ใช้ในทุกระดับของระบบราชการ"
 civic_corporate_genetic_identification: "หลักทรัพย์จีโนมิกส์"
 civic_corporate_genetic_identification_desc: "ลำดับพันธุกรรมของลูกค้าและพนักงานทุกคนจะถูกบันทึกไว้ในฐานข้อมูลที่ทุกคนสามารถเข้าถึงได้โดยเสียค่าธรรมเนียมเล็กน้อย หน่วยงานบังคับใช้กฎหมายพึ่งพาบริการนี้อย่างมากในการระบุตัวตนผู้กระทำความผิดแม้จากเศษซากที่เล็กที่สุด"
 civic_corporate_genetic_identification_effects: "- £building£ §Y$building_private_security$§! $megacorp_civic_branch_office_building_effect$"

 councilor_genetic_identification: "ผู้จัดทำดัชนี"
 councilor_genetic_identification_desc: "$TITLE$ มีหน้าที่รับผิดชอบในการดูแลรักษาและปกป้องดัชนีพันธุกรรม เพื่อให้มั่นใจว่าระบบราชการจะดำเนินไปอย่างราบรื่นและมีประสิทธิภาพ"
 councilor_corporate_genetic_identification: "นายหน้ารหัสพันธุกรรม"
 councilor_corporate_genetic_identification_desc: "ด้วยหน้าที่ในการประเมินคำขอเข้าถึงและแผนการสร้างรายได้ $TITLE$ สามารถค้นหาการระบุตัวตนทางพันธุกรรมของบุคคลใดๆ ก็ตามได้"

 civic_crowdsourcing: "การระดมพลังมวลชน"
 civic_crowdsourcing_desc: "สังคมนี้ตระหนักดีว่าแรงบันดาลใจของแต่ละบุคคลคือรากเหง้าของนวัตกรรมที่แท้จริง สิทธิบัตรแบบโอเพนซอร์ส ความใจกว้าง การร่วมมือกันโดยธรรมชาติ และการให้รางวัลสำหรับนวัตกรรมช่วยปูทางไปสู่ความก้าวหน้า"
 civic_crowdsourcing_effects: "$t$- ฝักฝ่ายผลิต $r_research$ แทน $r_unity$ $TABBED_NEW_LINE$- ฝักฝ่ายจะก่อตัวขึ้นในจักรวรรดิของคุณไม่นานหลังจากเกมเริ่ม แต่ผลผลิตของฝักฝ่ายจะลดลงในช่วงสิบปีแรก"
 civic_corporate_crowdsourcing: "ฝ่ายวิจัยและพัฒนาแบบกระจายศูนย์"
 civic_corporate_crowdsourcing_desc: "การแข่งขันนวัตกรรมระหว่างแผนกอย่างสม่ำเสมอช่วยกระตุ้นการริเริ่มด้านการวิจัยและพัฒนาของบรรษัทนี้"
 civic_corporate_crowdsourcing_effects: "$civic_crowdsourcing_effects$ $TABBED_NEW_LINE$- £building£ §Y$building_private_research_initiative$§! $megacorp_civic_branch_office_building_effect$"

