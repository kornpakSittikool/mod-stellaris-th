 # Mutation

 auth_mutation_habitability_tt: "สปีชีส์ออร์แกนิกสามารถมีความเหมาะสมในการอยู่อาศัยสูงสุดถึง §G175%§!"
 auth_bio_democratic_mutation: "เสรีภาพทางชีวภาพที่หลากหลาย"
 auth_bio_democratic_mutation_desc: "สังคมนี้ยึดมั่นในหลักการที่ว่าร่างกายของแต่ละคนคือวิหารของตนเอง ซึ่งอยู่ภายใต้การออกแบบและการควบคุมของตนอย่างเต็มที่ ภายใต้กรอบการทำงานของเสรีภาพและการสนับสนุนอย่างมั่นคง พลเมืองจะได้รับอำนาจในการตระหนักถึงศักยภาพอันเป็นเอกลักษณ์ของตนเอง หล่อหลอมตนเองและอนาคตตามที่พวกเขาเห็นสมควร"
 auth_bio_oligarchic_mutation: "การบัญชาการเร่งปฏิกิริยา"
 auth_bio_oligarchic_mutation_desc: "อำนาจจะกระจุกตัวอยู่ในกลุ่มชนชั้นนำที่ได้รับการกลายพันธุ์ทางพันธุกรรมที่เหนือกว่า ซึ่งมอบอำนาจอันไม่มีใครเทียบได้ให้กับพวกเขา การปฏิบัติงานนอกเหนือขอบเขตของกฎหมายปกติ พวกเขาใช้ความสามารถของตนเพื่อปกป้องและนำทางสังคม โดยดำเนินการใดๆ ก็ตามที่เห็นว่าจำเป็นเพื่อรับประกันความอยู่รอดและความเจริญรุ่งเรืองของสังคม"
 auth_bio_dictatorial_mutation: "ข้อบังคับลูกผสม"
 auth_bio_dictatorial_mutation_desc: "สังคมนี้บังคับให้การกลายพันธุ์ทางพันธุกรรมเป็นศิลาฤกษ์ของความก้าวหน้า ผู้ที่พึงพอใจที่จะเป็นอยู่อย่างที่ธรรมชาติสร้างมาจะต้องเผชิญกับการกักกันหรือกำจัดทิ้งทันที เพื่อให้แน่ใจว่ามีเพียงผู้ที่มีพันธุกรรมที่เหนือกว่าเท่านั้นที่จะมีส่วนร่วมในการผลักดันสายพันธุ์ไปสู่ความสมบูรณ์แบบอย่างไม่ลดละ"
 auth_bio_dictatorial_mutation_tt: "\n£crime£ อาชญากรรมจาก [enforcer.GetIcon] [enforcer.GetName]: §G-5§!\n$auth_mutation_habitability_tt$"
 auth_bio_imperial_mutation: "ผู้ขยายพันธุ์จีโนม"
 auth_bio_imperial_mutation_desc: "การยอมรับพลังที่ไม่อาจคาดเดาได้ของการกลายพันธุ์แบบสุ่ม จักรวรรดินี้เข้าถึงศักยภาพที่คาดเดาไม่ได้ ส่งเสริมนวัตกรรมและความสามารถที่วิธีการแบบดั้งเดิมไม่สามารถทำได้ ในการแข่งขันเพื่อครอบครอง ความโกลาหลของการกลายพันธุ์กลายเป็นข้อได้เปรียบที่ยิ่งใหญ่ที่สุดของพวกเขา ผลักดันให้พวกเขาก้าวไปสู่ความเป็นเจ้าโลกที่ไม่มีใครเทียบได้"
 auth_bio_corporate_mutation: "ธุรกิจปล่อยกู้อวัยวะ"
 auth_bio_corporate_mutation_desc: "ภายใต้ระบอบการปกครองนี้ การจัดหาเงินทุนสำหรับอวัยวะและส่วนต่างๆ ของร่างกายได้รับการทำให้ทุกคนเข้าถึงได้ผ่านแผนการชำระเงินที่ยืดหยุ่น การพลาดการชำระเงินส่งผลให้เกิดการยึดทรัพย์คืนอย่างรวดเร็วหรือการริบหลักประกันที่ตกลงกันไว้ ระบบนี้ช่วยรับประกันวงจรของอุปสงค์และอุปทานที่มั่นคง โดยที่ทุกส่วนของร่างกายเป็นทั้งสินค้าและข้อผูกมัด"
 auth_bio_corporate_mutation_tt: "$organic_leaders_have_trade_upkeep$\n$r_trade$ ต่อ $pop_group_unit$ £pop£ ประชากรจาก ['trait:trait_spare_organs']: §G+0.5§!\n$auth_mutation_habitability_tt$"

 auth_bio_democratic_evopred: "กลุ่มผู้มีสิทธิเลือกตั้งทางพันธุกรรม"
 auth_bio_democratic_evopred_desc: "แม้จะจัดการได้ยาก แต่สังคมนี้ก็ได้รับการควบคุมบางส่วนเหนือจีโนมที่อ่อนนุ่มของพวกเขา ประชาชนจะเป็นผู้ตัดสินใจว่าการกลายพันธุ์ของพวกเขาจะแสดงออกมาอย่างไร"
 auth_bio_democratic_evopred_tt: "$auth_bio_evopred_tt$\nเพิ่ม ['concept_genetic_electorate_effect', ผล] เพิ่มเติมให้กับ ['trait:trait_malleable_genes'] ตาม ['concept_faction'] ที่แข็งแกร่งที่สุด\nเพิ่มความคืบหน้าของ ['concept_adaptive_evolution'] จาก §Yสปีชีส์§! เอเลี่ยนที่เป็นทาสหรือสูงกว่า §G+100%§!"
 auth_bio_oligarchic_evopred: "ผู้ทรงอิทธิพลชีวภาพ"
 auth_bio_oligarchic_evopred_desc: "ในสังคมนี้ เวลาได้รับการพิชิตแล้ว ด้วยการคัดเลือกเฉพาะคลังพันธุกรรมที่บริสุทธิ์ที่สุดอย่างพิถีพิถัน ชนชั้นปกครองระดับสูงจึงได้ก้าวขึ้นสู่การมีตัวตนที่เหนือกาลเวลา ทว่าความผิดพลาดเพียงครั้งเดียวอาจหมายถึงการสูญเสียชั่วนิรันดร์ และสำหรับผู้ที่อยู่เบื้องล่างพวกเขา ความทะเยอทะยานและวิวัฒนาการคือสองด้านของเหรียญเดียวกัน..."
 auth_bio_oligarchic_evopred_tt: "$auth_bio_evopred_tt$\nผู้แทนสภาเป็น §Yอมตะ§!"
 auth_bio_dictatorial_evopred: "ระบอบเจ้าผู้ครองยอดอธิปไตย"
 auth_bio_dictatorial_evopred_desc: "อารยธรรมที่ถูกหล่อหลอมด้วยวิวัฒนาการอย่างต่อเนื่อง ปกครองโดยจิตสำนึกยอดอธิปไตยสูงสุด ไม่มีสภาหรือรัฐธรรมนูญใดสามารถบดบังเจตจำนงที่เหนือกว่าของระบอบผู้ครองนครนี้ได้ ที่นี่ ทุกชัยชนะทางพันธุกรรมเปรียบเสมือนเชื้อเพลิงส่งเสริมการขึ้นสู่บัลลังก์"
 auth_bio_dictatorial_evopred_tt: "$auth_bio_evopred_tt$\nคุณลักษณะผู้ปกครอง: ['leader_trait:trait_ruler_apex_predator']"
 apex_predator_male: "$trait_ruler_apex_predator$"
 apex_predator_female: "$trait_ruler_apex_predator$"
 auth_bio_imperial_evopred: "ราชวงศ์อมตะ"
 auth_bio_imperial_evopred_desc: "ใน $auth_bio_imperial_evopred$ อดีตจะไม่ได้พักผ่อน แต่จะถูกกลืนกิน แต่ละรุ่นจะหล่อเลี้ยงรุ่นต่อไป เนื่องจากร่างของผู้นำที่จากไปจะช่วยค้ำจุนการปกครองอันเป็นอมตะของจักรวรรดิ การรับใช้คือการเสียสละ และในความตาย ประชากรทั้งหมดจะหล่อเลี้ยงมรดกของบรรพบุรุษของพวกเขา"
 eternal_ancestor_male: "$eternal_ancestor_female$"
 eternal_ancestor_female: "บรรพบุรุษชั่วนิรันดร์"
 auth_bio_imperial_evopred_tt: "$auth_bio_evopred_tt$\nช่วยให้ผู้ปกครองสามารถกลืนกินผู้นำผู้ยิ่งใหญ่เมื่อพวกเขาจากไป"
 auth_bio_corporate_evopred: "ไบโอพรีเดชัน GLC" #Galactic Limited Incorporated
 auth_bio_corporate_evopred_desc: "ที่ บรรษัทล่าชีวภาพกราฟแสดงความถี่พวกเขาเติบโตได้ด้วยการปรับตัว ทั้งทางพันธุกรรมและทางเศรษฐกิจ ด้วยจีโนมใหม่ทุกชุดที่เพิ่มเข้ามาในพอร์ตโฟลิโอของบริษัท เมกะคอร์ปแห่งนี้จะปรับปรุงตำแหน่งทางการตลาดของตน โดยปรับแต่งผลิตภัณฑ์และการเจรจาให้เข้ากับชีววิทยาเฉพาะตัวของแต่ละสปีชีส์ ท้ายที่สุดแล้ว การเข้าใจธรรมชาติของลูกค้าทำให้การปิดการขายนั้นแทบจะเป็น... สัญชาตญาณ"
 auth_bio_corporate_evopred_tt: "$auth_bio_evopred_tt$\n$organic_leaders_have_trade_upkeep$\nประสิทธิภาพข้อตกลงการค้าต่อคุณลักษณะสปีชีส์: §G+1%§!\nเพิ่มความคืบหน้าของ ['concept_adaptive_evolution'] จาก §Yข้อตกลงการค้า§! ขึ้น §G+100%§!"
 auth_bio_hive_mind_evopred: "จิตสำนึกคิเมรา"
 auth_bio_hive_mind_evopred_desc: "จิตรวมหมู่แห่งนี้เหนื่อยหน่ายกับการดัดแปลงตนเองแบบธรรมดาแล้ว อาณานิคมใหม่แต่ละแห่งสามารถกลายเป็นส่วนหนึ่งของผืนภาพที่มีชีวิตของมัน ในการผสานรวมระหว่างภูมิทัศน์และเนื้อหนังที่แปรเปลี่ยนอยู่ตลอดเวลา เมื่อพรมแดนละลายหายไปในจิตสำนึกคิเมรา สิ่งมีชีวิตและโลกต่างๆ ก็จะหลอมรวมเป็นหนึ่งเดียวกัน"
 auth_bio_hive_mind_evopred_tt: "$auth_bio_evopred_tt$\nปรับสภาพดาวอาณานิคมให้เป็น §Yโลกไฮฟ์§! โดยอัตโนมัติ\nเพิ่มความคืบหน้าของ ['concept_adaptive_evolution'] จากการกวาดล้าง §Yสปีชีส์§! ต่างดาวขึ้น §G+100%§!"
 auth_bio_evopred_tt: "$EMPIRE_SIZE$ จากประชากรต่อคุณลักษณะสปีชีส์: §G-1%§!\n$auth_mutation_habitability_tt$"

 # Hive Advanced Authorities

 auth_bio_hive_purity: "กระบวนทัศน์แห่งความบริสุทธิ์"
 auth_bio_hive_purity_desc: "ไฮฟ์นี้เจริญรุ่งเรืองผ่านความบริสุทธิ์ทางพันธุกรรมที่แน่วแน่ เพื่อให้มั่นใจว่าโดรนทุกตัวปฏิบัติตามแม่แบบทางชีววิทยาในอุดมคติ การดัดแปลงพันธุกรรมที่แม่นยำจะช่วยเสริมสร้างความสามัคคีและสร้างความแข็งแกร่งโดยรวม สร้างกองกำลังที่ไม่อาจหยุดยั้งได้ซึ่งได้รับการขัดเกลาเพื่อประสิทธิภาพและการอยู่รอด"
 auth_bio_hive_purity_tt: "$pop_effects_from_purity_header$ $TABBED_NEW_LINE$- £unity£ $unity$ ที่ผลิตได้ต่อ $pop_group_unit$ £pop£ ประชากร: $plus_minus_icon$§Y$@purity_traits_resource$§! $DOUBLE_NEW_LINE$"
 auth_bio_hive_cloning: "ฝูงโคลนทวีคูณ"
 auth_bio_hive_cloning_desc: "เทคโนโลยีการโคลนนิ่งขั้นสูงขับเคลื่อนการผลิตโดรนที่มีพันธุกรรมเหมือนกันอย่างไม่หยุดยั้ง ซึ่งแต่ละตัวได้รับการออกแบบมาเพื่อประสิทธิภาพและความสามัคคีที่สมบูรณ์แบบ ด้วยการเชื่อฟังคำสั่งตามสัญชาตญาณที่จะก้าวไปข้างหน้าและทวีคูณ ไฮฟ์นี้ตั้งใจที่จะบดบังแสงดาว"
 auth_bio_hive_cloning_tt: "$ENABLES_BACKUP_CLONES$\n['concept_clone_leader_degradation', การเสื่อมสภาพของโคลน] ลดลงด้วย £society£ ['technology:tech_node_culling_1']"
