 siege_node: "โหนดปิดล้อม"
 siege_node_desc: "เราได้เรียนรู้แล้ว เราปรับตัวแล้ว การป้องกันของเราจะไม่ล่มสลาย"

 bio.2036.name: "พวกมันเรียนรู้"
 bio.2036.desc: "เราได้เห็นแนวโน้มที่น่ากังวลในการโจมตีของยานชีวภาพ แต่ละระลอกแสดงให้เห็นถึงการประสานงานที่ดีขึ้น ยุทธวิธีที่ปรับตัวได้ และการหยั่งเชิงการป้องกันของเราอย่างมีระบบ บันทึกเซ็นเซอร์เผยให้เห็นการเปลี่ยนแปลงในระดับพลังงานและลำดับความสำคัญของเป้าหมาย ซึ่งเป็นหลักฐานของกลยุทธ์ที่กำลังพัฒนา\n\nสิ่งมีชีวิตเหล่านี้ ไม่ว่าจะด้วยสัญชาตญาณหรือสติปัญญารวมหมู่ กำลังน่าเกรงขามมากขึ้น หากรูปแบบนี้ยังดำเนินต่อไป ระลอกถัดไปจะยิ่งขับไล่ได้ยากขึ้น"
 bio.2036.a: "อธิษฐานเผื่อเหล่าผู้พิทักษ์"
 bio.2036.b: "มอบความแข็งแกร่งแก่ผู้พิทักษ์"
 bio.2036.tt: "ในแต่ละระลอกถัดไป กองเรือที่มาถึงผ่าน §Y$STARLIT_WORMHOLE_GALACTIC$§! จะมีประสิทธิภาพเพิ่มขึ้น"

 bio.2040.name: "ศัตรูสูญสิ้น"
 bio.2040.desc: "การวัดระยะทางไกลที่เข้ามาจากพอร์ทัลเผยให้เห็นพัฒนาการที่สำคัญใน §Y[event_target:starlit_sealed_system.GetName]§!: ทั้งกองเรือยานชีวภาพและโรงเพาะฟักของพวกมันถูกทำลายโดยกองกำลังที่ไม่รู้จัก\n\nแม้ว่าเราจะยินดีที่ได้รู้ว่า [GetInvadersLower] มาถึงจุดจบแล้ว แต่เราไม่สามารถมองข้ามความเสี่ยงที่มหาอำนาจอื่นอาจเข้าควบคุมระบบ [event_target:starlit_sealed_system.GetName] ในวันใดวันหนึ่ง\n\nเราต้องดำเนินการอย่างรวดเร็วเพื่อรักษาตำแหน่งยุทธศาสตร์นี้ไว้ก่อนที่เราจะเผชิญกับการปิดล้อมอีกครั้ง"
 bio.2040.a: "มิตร... หรือศัตรูรายใหม่?"
