 NAME_Bodysnatchers: "Bodysnatchers"

 operation_bodysnatcher_prepare_invasion: "เตรียมการรุกราน"
 operation_bodysnatcher_prepare_invasion_desc: "เพื่อนบ้านของเราช่างมีจิตใจที่อ่อนไหวง่ายเหลือเกิน ด้วยการส่งร่างที่เตรียมไว้ซึ่งรวมเข้ากับจิตสำนึกของเราแล้วเข้าไป เราย่อมสามารถดึงพวกเขาเข้ามารวมกลุ่มได้ง่ายขึ้น"
 operation_bodysnatcher_prepare_invasion_on_success: "$IF_SUCCESSFUL|E$\nเราจะได้รับความช่วยเหลือจากสายลับภายในเมื่อเราประกาศสงครามกับ §Y[Target.GetName]§! ในครั้งต่อไป"
 operation_invasion_prepared: "$TRIGGER_FAIL$ §Rเราได้เตรียมการรุกรานประเทศนี้ไว้แล้ว ประกาศสงครามเพื่อเปิดใช้งานมัน§!"
 operation_invasion_impossible: "$TRIGGER_FAIL$ §Rประเทศนี้มีการเตรียมการรับมือความพยายามแทรกซึมดีเกินไป เราไม่สามารถเริ่มปฏิบัติการนี้ได้!§!"
 concept_operation_bodysnatcher_prepare_invasion: "$operation_bodysnatcher_prepare_invasion$"
 concept_operation_bodysnatcher_prepare_invasion_desc: "ปฏิบัติการที่ประชากรสายพันธุ์เป้าหมายที่ถูกกลืนกลายแล้วจะเข้าไปแทรกซึมในจักรวรรดิ เพื่อเตรียมการก่อวินาศกรรมมวลชนเมื่อเกิดสงครามขึ้น"

 bio.800.name: "งานใหม่"
 bio.800.desc: "ร่างแทรกซึมของเราจำเป็นต้องได้รับการจัดวางในตำแหน่งยุทธศาสตร์ก่อนที่เราจะสามารถดำเนินแผนการอันยิ่งใหญ่ได้ การรวบรวมข้อมูลข่าวกรองก่อนหน้านี้ของเราเผยให้เห็นว่าสถานีดาวที่มีเจ้าหน้าที่ไม่เพียงพอและดาวเคราะห์ที่มีการป้องกันต่ำคือเป้าหมายหลัก ในไม่ช้าเราจะเริ่มลงมือ"

 bio.805.name: "การจัดหาพนักงานเพิ่มเติม"
 bio.805.desc: "การงานดำเนินไปอย่างราบรื่น ร่างกายของเราหาโฮสต์ได้มากขึ้น และการมีส่วนร่วมในกิจการของ [Target.GetName] ก็มั่นคงขึ้น โดรนของเราควรจะกลืนกินจิตใจที่อยากรู้อยากเห็นทั้งหมดได้ในไม่ช้า"

 bio.810.name: "โอกาสใหม่"
 bio.810.desc: "[Target.GetSpeciesName] ที่เราไม่สามารถแทนที่ได้ถูกถอดออกจากตำแหน่ง ซึ่งส่งผลให้เกิดตำแหน่งว่างหลายตำแหน่งภายในโครงสร้างของ §Y[Target.GetName]§! หุ่นเชิดของเราพร้อมที่จะเปิดประตูสู่การแทรกซึมอย่างเต็มรูปแบบของเราแล้ว ทั้งหมดที่พวกเขาต้องการคือไฟเขียวให้ลงมือ"

 bio.815.name: "ทหารเกณฑ์ใหม่"
 bio.815.desc: "§Y[From.Target.GetName]§! ถูกแทรกแซงเรียบร้อยแล้ว พวกเขาพร้อมสำหรับการรุกราน และสิ่งที่เราต้องตัดสินใจก็มีเพียงแค่ว่าจะส่งผู้แอบอ้างไปกี่ตัวเพื่อแทรกซึมจักรวรรดิของพวกเขาเพิ่มเติม ในไม่ช้าทุกสิ่งจะกลายเป็น [Owner.GetAdj]"
 bio.815.tt: "เรามีประชากรของเผ่าพันธุ์เป้าหมายไม่เพียงพอสำหรับดำเนินการนี้"
 bio.815.a: "เราได้ส่งไปเท่าที่เราจะทำได้แล้ว"
 bio.815.b: "ทำให้มั่นใจว่าด่านหน้าของพวกเขาจะเป็นของเรา"
 bio.815.b.tt: "ส่งประชากร §Hป๊อป§! §Y100§! £pop£ หน่วย\n$bio.815.reminder$"
 bio.815.c: "เตรียมการรุกรานดาวเคราะห์ของพวกมัน"
 bio.815.c.tt: "ส่งประชากร §Hป๊อป§! §Y300§! £pop£ หน่วย\n$bio.815.reminder$"
 bio.815.d: "แทรกซึมป้อมปราการของพวกมัน!"
 bio.815.d.tt: "ส่งประชากร §Hป๊อป§! §Y500§! £pop£ หน่วย\n$bio.815.reminder$"
 bio.815.e: "ทำให้พวกมันทั้งหมดกลายเป็นเรา!"
 bio.815.e.tt: "สงครามครั้งต่อไปที่เราประกาศใส่ §Y[From.Target.GetName]§! หรือที่ประกาศใส่เราภายในเวลา §G10§! ปี จะใช้ประโยชน์จากผู้แทรกซึมที่เราได้เตรียมการไว้"
 bio.815.reminder: "สงครามต่อไปเราประกาศต่อต้าน§Y[From.Target.GetName]§!หรือเราถูกประกาศว่าเป็นปฏิปักษ์กับเรา§G10§!หลายปีก็จะเป็นประโยชน์ กับผู้ที่เตรียมพร้อม"

 bio.825.name: "การรุกราน [From.GetSpeciesNamePlural]"
 bio.825.desc.small: "[From.GetName] ผู้น่ารังเกียจได้แทรกซึมเข้ามาในจักรวรรดิของเราแล้ว สถานีอวกาศของเราถูกแทรกแซง และพวกมันกำลังรุกรานอาณานิคมของเราอยู่แล้ว เราต้องกำจัดผู้แอบอ้างพวกนี้ให้หมด!"
 bio.825.desc.large: "ตอนแรกพวกเราคิดว่ามันเป็นแค่ความผิดพลาดของระบบ เครือข่ายการสื่อสารของเราครึ่งหนึ่งดับไป\n\nแต่ทว่าไม่ใช่ [From.GetName] จอมหลอกลวงได้เข้าแทนที่บุคลากรสำคัญในหลายภาคส่วน จักรวรรดิของเราแตกแยกและอาณานิคมกำลังถูกรุกราน\n\nอย่าไว้ใจใครเด็ดขาด!"

# Smuggle pops operation

 operation_smuggle_pops: "ลักลอบขนส่งประชากร"
 operation_smuggle_pops_desc: "เจ้าหน้าที่ของเราจะดำเนินความพยายามอพยพหลบหนีขนานใหญ่กับกลุ่มคนที่โดดเดี่ยวภายใน [target.GetName]"
 operation_smuggle_pops_on_success: "$IF_SUCCESSFUL|E$\nย้ายประชากร £pops£ ประชากร บางส่วนมายังจักรวรรดิของคุณ"
 smuggle_pops_also_fanatic_egalitarians: "$TRIGGER_FAIL$ §R[Target.GetName] เป็นพวกคลั่งไคล้ความเท่าเทียมด้วย ประชาชนของพวกเขาเป็นอิสระอยู่แล้ว§!"
 smuggle_pops_not_enough_pops: "$TRIGGER_FAIL$ §R[Target.GetName] มีประชากร £pops£ ประชากร ที่คุ้มค่าแก่การขโมยไม่เพียงพอ§!"
 mod_operation_smuggle_pops_difficulty_add: "ความยากของปฏิบัติการ $operation_smuggle_pops$"
 concept_operation_smuggle_pops: "$operation_smuggle_pops$"
 concept_operation_smuggle_pops_desc: "ปฏิบัติการเพื่อลักพาตัวประชากรจากเป้าหมาย"

 bio.900.name: "การสรรหาผู้มีความสามารถ"
 bio.900.desc: "เจ้าหน้าที่ของเราได้สร้างฉากหน้าและแหล่งกบดานจำนวนหนึ่งเพื่อเฝ้าติดตามประชากรของ [target.GetName] กลุ่มผู้เห็นต่าง สันโดษ หรือบุคคลที่มีทักษะสูงจะได้รับการประเมินและทำเครื่องหมายเพื่อการพาตัวออกไป"

 bio.905.name: "กลลวงการหายตัว"
 bio.905.desc: "เจ้าหน้าที่ของเราเริ่มต้อนเป้าหมายและซ่อนตัวพวกเขาไว้ในสถานที่ห่างไกล เมื่อใดก็ตามที่เป็นไปได้ เหตุการณ์ต่างๆ จะถูกจัดฉากขึ้นเพื่อเบี่ยงเบนความสนใจของเจ้าหน้าที่ท้องถิ่นและกลบเกลื่อนร่องรอยของเรา"

 bio.910.name: "กระสวยอวกาศ"
 bio.910.desc: "ปฏิบัติการเข้าสู่ขั้นวิกฤตที่ทุกคนที่เรากวาดต้อนมาต้องได้รับการเคลื่อนย้ายอย่างลับๆ ขึ้นสู่วงโคจร แผนการปัจจุบันคือการซิงโครไนส์การออกเดินทางของทุกโรงงาน และทำให้กองกำลังความมั่นคงสับสนด้วยยานลวงและการเบี่ยงเบนความสนใจ"

 bio.915.name: "แอบขนออกไปสำเร็จ"
 bio.915.desc: "เราประสบความสำเร็จในการส่งเป้าหมายออกไปหลายคน แต่ปฏิบัติการก็ไม่ได้ราบรื่นเสียทีเดียว และมียานหลายลำที่เต็มไปด้วยผู้คนที่มีอนาคตถูกทิ้งไว้เบื้องหลัง"
 bio.915.desc.detected: "$bio.915.desc$\n\nการเคลื่อนย้ายประชากรจำนวนมากเช่นนี้ย่อมไม่รอดพ้นสายตาไปได้"
 bio.915.desc.cosmogenesis: "เราประสบความสำเร็จในการนำตัวเป้าหมายออกมาหลายคน และพวกเขากำลังถูกส่งไปยังขอบแต่ปฏิบัติการก็ไม่ได้ราบรื่นเสียทีเดียว และมียานหลายลำที่เต็มไปด้วยผู้คนที่มีอนาคตถูกทิ้งไว้เบื้องหลัง"
 bio.915.desc.cosmogenesis.detected: "$bio.915.desc.cosmogenesis$\n\nการเคลื่อนย้ายประชากรจำนวนมากเช่นนี้ย่อมไม่รอดพ้นสายตาไปได้"
 bio.915.a: "เราได้ทำสิ่งที่เราสามารถทำได้แล้ว"
 bio.915.b: "มุ่งเน้นไปที่การปลดปล่อย [Root.GetSpeciesNamePlural] ตัวอื่น"
 bio.915.c: "เราต้องพาออกไปมากกว่านี้!"
 bio.915.d: "อย่าทิ้ง [GetSpeciesName] คนใดไว้ข้างหลัง"
 bio.915.tt: "ลักลอบพาประชากร £pop£ §Hป๊อป§! ที่ไม่มีคนเฝ้าไปยังโลกที่เหมาะสม"
 bio.915.asset.tt: "$bio.915.tt$\nหาก §Y[From.Target.GetName]§! ไม่รู้ตัวเกี่ยวกับเรามาก่อน §Rตอนนี้พวกเขารู้แน่นอนแล้ว§!"

 MESSAGE_POPS_SMUGGLED_TITLE: "ประชากรที่ถูกขโมย"
 MESSAGE_POPS_SMUGGLED_DESC: "$COUNTRY|Y$ ผู้นิยมความหลอกลวงได้แทรกซึมเข้าพรมแดนของเราและลักพาตัวประชาชนของเราไป!"
 opinion_smuggled_pops: "ขโมยประชากรของเรา!"

# Disconnected Drones #

 disconnected_drones_name: "$policy_disconnected_drones$"
 policy_disconnected_drones: "โดรนที่ขาดการเชื่อมต่อ"
 policy_disconnected_drones_desc: "เราสามารถตัดสินใจว่าจะอนุญาตให้โดรนที่ขาดการเชื่อมต่อจากจิตสำนึกส่วนกลางอาศัยอยู่ในอาณานิคมของเราหรือไม่"
 disconnected_drones_sustain: "ประคองชีพ"
 disconnected_drones_sustain_name: "ประคองชีพโดรนที่ขาดการเชื่อมต่อ"
 disconnected_drones_sustain_desc: "แม้จะขาดจากจิตสำนึกร่วมกลุ่ม แต่โดรนเหล่านี้ก็สามารถประคองชีวิตไว้ได้\n\n§Eปลดล็อก §Yประเภทประชากร§! สำหรับโดรนที่ขาดการเชื่อมต่อ§!"

 disconnected_drones_purge: "การกวาดล้างล้างเผ่าพันธุ์"
 disconnected_drones_purge_name: "กวาดล้างโดรนที่ขาดการเชื่อมต่อ"
 disconnected_drones_purge_desc: "สิทธิของสิ่งมีชีวิตที่มีภูมิปัญญาย่อมไม่ครอบคลุมไปถึงผู้ที่ปราศจากเหตุผล หากไม่มีจิตสำนึกส่วนกลางคอยชี้นำ โดรนเหล่านี้ก็ไม่ต่างอะไรกับสัตว์เดรัจฉาน และสัตว์ที่มาขวางทางย่อมถือเป็นศัตรูพืช\n\n§Eโดรนที่ขาดการเชื่อมต่อทั้งหมดที่อาศัยอยู่ในอาณานิคมของเราจะถูก §Rลบแล้ว§!§!"

 disconnected_drones_purged_citizenship: "$TRIGGER_FAIL$โดรนที่ขาดการเชื่อมต่อกำลังถูกกวาดล้างในจักรวรรดิของเรา"
 disconnected_drones_kill_themselves_purge_type: "$TRIGGER_FAIL$เมื่อขาดจากจิตสำนึกร่วมกลุ่ม ประชากรของเผ่าพันธุ์นี้จะหมดอายุขัย"

