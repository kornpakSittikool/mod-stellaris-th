 concept_genetic_purity_desc: "ระบอบการปกครองที่ยอมรับ ['tradition_category:tradition_purity'] จะมีเอฟเฟกต์แบบสเกลและค่าปรับเปลี่ยนที่ใช้กับ £pop£ §Hประชากรออร์แกนิก§! และ £leader£ §Hผู้นำ§! ของพวกเขา$TABBED_NEW_LINE$- เพิ่มขึ้นตามคะแนนคุณลักษณะที่ใช้กับคุณลักษณะสปีชีส์เชิง §Gบวก§!$TABBED_NEW_LINE$- ลดลงตามคะแนนคุณลักษณะที่ได้รับจากคุณลักษณะสปีชีส์เชิง §Rลบ§!"

 trait_leader_genetic_purist: "ผู้ยึดมั่นในความบริสุทธิ์ทางพันธุกรรม"
 trait_leader_genetic_purist_desc: "การทำงานของผู้นำคนนี้ได้รับการชี้นำโดยวิสัยทัศน์ที่สั่นคลอนไม่ได้เกี่ยวกับความสมบูรณ์แบบทางพันธุกรรม และการไม่ยอมรับความไม่สมบูรณ์แบบในทุกรูปแบบ"

 auth_bio_democratic_purity: "เอกราชทางฟีโนไทป์"
 auth_bio_democratic_purity_tt: "$pop_effects_from_purity_header$ $TABBED_NEW_LINE$- £mod_pop_happiness£ $MOD_POP_HAPPINESS$: $plus_minus_icon$§Y$@purity_traits_happiness|1%$§! $DOUBLE_NEW_LINE$อํานาจ สัญญาอนุญาต$TABBED_NEW_LINE$- $mod_leaders_upkeep_mult$ $minus_plus_icon$§Y2.5%§! $TABBED_NEW_LINE$- $MOD_LEADER_SPECIES_EXP_GAIN$ $plus_minus_icon$§Y2.5%§!"
 auth_bio_democratic_purity_desc: "การกำหนดขอบเขตของร่างกายตนเองคือสิทธิ รัฐมอบอำนาจให้ปัจเจกบุคคลดัดแปลงร่างพาหะของตนตามที่เห็นสมควร ร่างกายจะกลายเป็นผืนผ้าใบอันสูงสุดโดยมีขีดจำกัดเพียงแค่จินตนาการเท่านั้น"

 auth_bio_oligarchic_purity: "ลำดับขั้นการคัดเลือกสายพันธุ์"
 auth_bio_oligarchic_purity_tt: "$eugenic_political_power_effects$"
 auth_bio_oligarchic_purity_desc: "อำนาจเบ็ดเสร็จต้องได้รับการมอบหมายให้แก่กลุ่มชนชั้นนำที่ได้รับแต่งตั้งทางพันธุกรรม ผู้พิทักษ์ที่บริสุทธิ์และมีความสามารถมากที่สุดในโชคชะตาของอารยธรรมนี้ ภายใต้พวกเขา พลเมืองแต่ละคนจะทำหน้าที่ที่กำหนดไว้ล่วงหน้า ซึ่งได้รับการปรับแต่งอย่างพิถีพิถันให้สอดคล้องกับศักยภาพทางพันธุกรรมที่สืบทอดมา ความพึงพอใจไม่ได้หลั่งไหลมาจากความทะเยอทะยาน แต่มาจากการยอมรับเป้าหมายที่ตนถูกกำหนดไว้"
 eugenic_political_power_effects: "$pop_effects_from_purity_header$ $TABBED_NEW_LINE$- $MOD_POP_BONUS_WORKFORCE_MULT$: $plus_minus_icon$§Y$@purity_traits_bonus_workforce_mult|2%$§! $DOUBLE_NEW_LINE$อํานาจ สัญญาอนุญาต$TABBED_NEW_LINE$- $MOD_COUNCIL_AGENDA_PROGRESS_SPEED$: $plus_minus_icon$§Y$@purity_traits_council_speed|Y1%$§!"

 auth_bio_dictatorial_purity: "กระบวนการยุติธรรมทางนิวคลีอิก"
 auth_bio_dictatorial_purity_tt: "$pop_effects_from_purity_header$ $TABBED_NEW_LINE$£society£ ผลงานวิจัยทางสังคมที่ผลิตต่อ $pop_group_unit$ £pop£ ประชากร: $plus_minus_icon$§Y$@purity_traits_resource$§! $DOUBLE_NEW_LINE$อํานาจ สัญญาอนุญาต$TABBED_NEW_LINE$- $MOD_PLANET_CRIME_ADD$ ของดาวเคราะห์: $minus_plus_icon$§Y5.0§! $TABBED_NEW_LINE$- $MOD_PLANET_CRIME_ADD$ ของเซกเตอร์: $minus_plus_icon$§Y2.5§! $TABBED_NEW_LINE$- $MOD_PLANET_STABILITY_ADD$ ของดาวเคราะห์: $plus_minus_icon$§Y5.0§! $TABBED_NEW_LINE$- $MOD_PLANET_STABILITY_ADD$ ของเซกเตอร์: $plus_minus_icon$§Y2.5§!"
 auth_bio_dictatorial_purity_desc: "รัฐบาลนี้ใช้ข้อมูลทางพันธุกรรมและข้อมูลชีวมิติเป็นเครื่องมือในการป้องกันความยุติธรรมล่วงหน้า โดยตรวจสอบรหัสพันธุกรรมของพลเมืองทุกคนเพื่อหาแนวโน้มการก่ออาชญากรรม การแทรกแซงก่อนที่จะเกิดการละเมิดทำให้สามารถรับประกันความเป็นระเบียบเรียบร้อยได้ผ่านการกำกับดูแลที่พิถีพิถัน ความยุติธรรมที่แท้จริงไม่ใช่การตอบสนองแต่เป็นการป้องกัน โดยปกป้องสังคมด้วยการขจัดอาชญากรรมจากต้นตอ"

 auth_bio_imperial_purity: "การปกครองแบบชีวภาพ"
 auth_bio_imperial_purity_tt: "ผลกระทบต่อ £leader£ §Y$imperial_ruler$§! และ §Yทายาท§! จาก ['concept_genetic_purity']:$TABBED_NEW_LINE$- $MOD_LEADER_SKILL_ADD$: $plus_minus_icon$§Y$@purity_traits_imperial_level|2$§! $DOUBLE_NEW_LINE$£leader£ ผู้นำของสปีชีส์ของ §Y[Ruler.GetTitle]§! จะได้รับคุณลักษณะ §Y$imperial_bloodline$§!\nผลกระทบต่อ £leader£ §Yสายโลหิตอิมพีเรียล§! จาก ['concept_genetic_purity']: $TABBED_NEW_LINE$- $MOD_LEADER_LIFESPAN_MULT$: $plus_minus_icon$§Y$@purity_traits_imperial_bloodline|1%$§! $TABBED_NEW_LINE$- $MOD_LEADER_SPECIES_EXP_GAIN$: $plus_minus_icon$§Y$@purity_traits_imperial_bloodline|1%$§!"
 auth_bio_imperial_purity_desc: "ด้วยการสนับสนุนความเป็นเลิศทางพันธุกรรม รัฐบาลนี้ยืดอายุขัยของผู้นำพร้อมกับแสวงหาความสมบูรณ์แบบทางชีวภาพอย่างไม่ลดละ ความเจริญรุ่งเรืองของสังคมขึ้นอยู่กับการอยู่รอดและการแพร่กระจายของยีนที่ดีที่สุดเท่านั้น เพื่อให้มั่นใจว่าอนาคตจะถูกกำหนดโดยความเหนือกว่า การดูแลเอาใจใส่อย่างไม่หยุดยั้งต่อคลังยีนเป็นสิ่งรับประกันความก้าวหน้า โดยมีอายุขัยที่ยืนยาวและความสมบูรณ์แบบเป็นรางวัลสูงสุด"

 auth_bio_corporate_purity: "สมาคมออร์แกนิก"
 auth_bio_corporate_purity_tt: "$organic_leaders_have_trade_upkeep$\n\n$pop_effects_from_purity_header$ $TABBED_NEW_LINE$- $r_trade$ ที่ผลิตได้ต่อ $pop_group_unit$ £pop£ ประชากร: $plus_minus_icon$§Y$@purity_traits_resource$§! $DOUBLE_NEW_LINE$"
 auth_bio_corporate_purity_desc: "เมกะคอปนี้มีความสมบูรณ์ การผูกพันธ์ของตัวชีวิต การปลูกอวัยวะเพื่อกําไร ราคาสูงสุดของอวัยวะที่มีคุณภาพสูงสุด ในขณะที่ \"ค่าชดเชย\"เมกะคอร์ปแห่งนี้ได้พัฒนาการแปรสภาพชีวิตให้เป็นสินค้าโภคภัณฑ์อย่างสมบูรณ์แบบ โดยเพาะเลี้ยงอวัยวะเพื่อทำกำไร อวัยวะคุณภาพพรีเมียมสามารถทำราคาได้สูงสุด ในขณะที่"

 # Cloning

 auth_bio_democratic_cloning: "ความหลากหลายที่เป็นอันหนึ่งกันเดียวกัน"
 auth_bio_democratic_cloning_tt: "$ENABLES_BACKUP_CLONES$\nค่าบำรุงรักษา §Y$leader_trait_backup_clone_default$§!: §G$@cordant_multiplicity_clone_upkeep|0%$§!\n§Y$leader_trait_backup_clone_default_plural$§! ได้รับการลดค่าความเสื่อมถอย ['concept_clone_leader_degradation', การเสื่อมสภาพ] และไม่สามารถมี §Y$leader_trait_has_backup_clone_plural$§! ได้"
 auth_bio_democratic_cloning_desc: "รัฐบาลนี้ยอมรับเทคโนโลยีการโคลนนิ่งเพื่อเป็นเครื่องพิสูจน์ถึงความเท่าเทียมและความก้าวหน้า โคลนยืนหยัดเคียงบ่าเคียงไหล่กับผู้ที่เกิดตามธรรมชาติ โดยเสียงของพวกเขาได้รับคุณค่าอย่างเท่าเทียมกัน เจตจำนงของประชาชนได้รับการเติมเต็มด้วยความหลากหลายของทุกมุมมอง ไม่ว่าจะเป็นโคลนหรือไม่ก็ตาม"
 auth_bio_oligarchic_cloning: "ระบอบผู้สำเร็จราชการโคลนนิ่ง"
 auth_bio_oligarchic_cloning_tt: "$ENABLES_BACKUP_CLONES$\nคุณลักษณะ §Y$leader_trait_has_backup_clone$§! มอบเอฟเฟกต์เพิ่มเติมสำหรับสมาชิกสภา\n§Y$leader_trait_backup_clone_default_plural$§! มีการเสื่อมถอย ['concept_clone_leader_degradation', การเสื่อมสภาพ] ลดลงในขณะที่อยู่ในสภา\n"
 auth_bio_oligarchic_cloning_desc: "สังคมนี้รับประกันการครองราชย์ชั่วกัลปาวสานของชนชั้นนำโดยยึดโยงอำนาจไว้ภายในสายโลหิตของโคลนชั้นยอดที่ไม่ขาดสาย เทคโนโลยีการโคลนนิ่งช่วยรักษาและปรับปรุงมรดกทางพันธุกรรมของพวกเขา ช่วยให้ผู้นำมีความต่อเนื่องอย่างราบรื่น ทุกตำแหน่งที่ทรงอิทธิพลจะถูกครอบครองโดยโคลนรุ่นปรับปรุงของสายเลือดอันสูงส่งเดิม เพื่อเสริมสร้างความครอบงำของพวกเขาในหลายชั่วอายุคน"
 auth_bio_dictatorial_cloning: "การยอมสยบที่เป็นเนื้อเดียวกัน"
 auth_bio_dictatorial_cloning_tt: "$ENABLES_BACKUP_CLONES$\n$AVAILABLE_POLICIES$ §Y$policy_homogenous_class$§!"
 auth_bio_dictatorial_cloning_desc: "ความจงรักภักดีอย่างเบ็ดเสร็จเกิดขึ้นได้จากการคัดเลือกทางพันธุกรรมอย่างพิถีพิถัน โดยเลือกเฉพาะผู้ที่มีสัญชาตญาณความเชื่อฟังอย่างไม่คลอนแคลนเท่านั้นมาเป็นต้นแบบการโคลน สิ่งนี้สร้างสังคมที่ยั่งยืนด้วยตัวเองซึ่งการกบฏไม่เพียงแต่ไม่น่าเกิดขึ้น แต่ยังเป็นไปไม่ได้ทางชีวภาพ รับประกันความสามัคคีที่ยั่งยืนผ่านโครงสร้างการออกแบบของพลเมือง"
 auth_bio_imperial_cloning: "ความสืบเนื่องทางสายเลือด"
 auth_bio_imperial_cloning_tt: "$ENABLES_BACKUP_CLONES$\nคุณลักษณะ §Y$leader_trait_backup_clone_imperial$§! ไม่สามารถมีโทษปรับเพิ่มขึ้นได้"
 auth_bio_imperial_cloning_desc: "ความชอบธรรมอันไม่อาจตั้งคำถามได้ของผู้ปกครองได้รับการรักษาไว้ด้วยการโคลน โดยผู้ปกครองสูงสุดแต่ละรุ่นจะสืบทอดภูมิปัญญาและชัยชนะจากชาติปางก่อน ความต่อเนื่องของผู้นำอย่างราบรื่นนี้ช่วยรับประกันความก้าวหน้าอย่างต่อเนื่องของสังคม รักษาไว้ซึ่งยุคทองอันเป็นนิรันดร์ภายใต้การปกครองอันสว่างไสวของพวกเขา"
 auth_bio_corporate_cloning: "สมาคมผู้จำลองพันธุ์"
 auth_bio_corporate_cloning_tt: "$organic_leaders_have_trade_upkeep$\n$ENABLES_BACKUP_CLONES$\n$mod_planet_jobs_trade_produces_mult$ จาก £building£ ['building:building_clone_vats']: §G+$@replicatory_association_trade_mult|0%$§!\n£mod_planet_amenities_add£ สิ่งอำนวยความสะดวกของดาวเคราะห์จาก £building£ §Y$building_clone_vats$§!: §G+$@replicatory_association_amenities_add|0$§!\n$AVAILABLE_POLICIES$ §Y$policy_replicatory_association_insurance$§!"
 auth_bio_corporate_cloning_desc: "ความสะดวกสบายที่ไม่มีใครเทียบได้อยู่ไม่ไกลเกินเอื้อม ซื้อโคลนของตัวคุณเองสำหรับเป็นอะไหล่สำรอง หรือสั่งทำแบบจำลองของบุคคลอันเป็นที่รักที่ล่วงลับไปแล้ว เมกะคอร์ปแห่งนี้รับประกันอัตราความแม่นยำ 93% ในทุกการทำซ้ำ ผสมผสานเทคโนโลยีล้ำสมัยเข้ากับคำสัญญาแห่งการเยียวยาจิตใจด้วยการทำซ้ำอย่างแม่นยำ"

