 # Siege of the Citadel Event Chain
 bio.2005.name: "ความผันผวนที่ผิดปกติ"
 bio.2005.desc: "$job_skywatcher_plural$ ของเรารายงานเหตุการณ์ที่น่ากังวล\n\nพบความผันผวนเล็กน้อยแต่ชัดเจนเมื่อเร็วๆ นี้ภายในพอร์ทัลใน §Y[Root.Capital.System.GetName]§! ในอดีต ความปั่นป่วนที่คล้ายกันนี้ได้ส่งสัญญาณล่วงหน้าถึงฝูงยานชีวภาพที่เป็นศัตรู\n\nหากค่าที่อ่านได้เหล่านี้เป็นจริง เราคาดว่าการโจมตีครั้งต่อไปจะเกิดขึ้นภายในเวลาไม่กี่เดือน ความอยู่รอดของประชาชนของเราอาจต้องขึ้นอยู่กับความแน่วแน่ของผู้พิทักษ์ของเราอีกครั้ง"

 abandoned_hatchery_chain_1: "การปิดล้อมป้อมปราการ"
 abandoned_hatchery_chain_1_title: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_1_desc: "[GetInvadersLower] โจมตีเรามานานหลายทศวรรษ $starbase_deep_space_citadel_1$ ของเราตั้งตระหง่านเป็นแนวป้องกันด่านแรก แต่ความปลอดภัยที่แท้จริงจะเกิดขึ้นได้ก็ต่อเมื่อค้นพบความจริงเกี่ยวกับศัตรูของเราเท่านั้น\n\nในการค้นพบแต่ละครั้ง เราเข้าใกล้ขยับเข้าใกล้วันที่เราจะสามารถนำการต่อสู้ไปสู่พวกเขา - และยุติการปิดล้อมอันยาวนานของเราลงได้ตลอดกาล"

 bio.2015.name: "ซากศัตรู"
 bio.2015.desc: "เศษซากที่ทิ้งไว้โดยกองเรือชีวภาพที่ถูกทำลายล้างลอยอยู่อย่างน่าสะพรึงกลัวผ่าน §Y[Root.Capital.System.GetName]§! แม้จะบิดเบี้ยวและไหม้เกรียม แต่วัสดุอินทรีย์ส่วนใหญ่ยังคงอยู่ในสภาพสมบูรณ์ ทำให้มีโอกาสศึกษาได้น้อยครั้ง\n\nด้วยการวิเคราะห์อย่างระมัดระวัง เราอาจสามารถเปิดเผยความลับของการสร้างสรรค์ที่แปลกประหลาดของพวกเขาได้ และบางทีอาจได้รับข้อมูลเชิงลึกเกี่ยวกับพอร์ทัลลึกลับที่พวกเขาโผล่ออกมา"
 PROJECT_HATCHERY_SHIP_REMAINS: "ศึกษาซากยานชีวภาพ"
 PROJECT_HATCHERY_SHIP_REMAINS_DESC: "ซากของกองเรือ [GetInvadersLower] มอบโอกาสที่หาได้ยากในการศึกษา เราอาจเรียนรู้ได้มากมายเพื่อรับประกันความอยู่รอดของเรา"
 bio.2015.a: "ในที่สุดก็มีความคืบหน้า"

 bio.2020.name: "วิเคราะห์ศัตรูเรียบร้อย"
 bio.2020.desc: "หลังจากการศึกษาซากปรักหักพังทางชีววิทยาที่ทิ้งไว้ใน §Y[Root.Capital.System.GetName]§! อย่างพิถีพิถัน [Root.GetScientistPlural] ของเราเชื่อว่าพวกเขาอาจมีกุญแจสำคัญในการทำความเข้าใจพอร์ทัลที่ปรากฏที่ขอบของระบบของเรา\n\nลึกลงไปในเนื้อเยื่อของสิ่งมีชีวิตเหล่านี้ มีการระบุรูปแบบอินทรีย์อย่างหนึ่ง ซึ่งดูเหมือนว่าจะสั่นพ้องกับความผันผวนของพอร์ทัล การถอดรหัสย้อนกลับความถี่นี้ จะช่วยให้เราสามารถข้ามรอยแยกที่ลึกลับนี้ได้ด้วยตัวเอง\n\nจำเป็นต้องมีการวิจัยเพิ่มเติม แต่เป็นครั้งแรกที่ความเป็นไปได้ที่จะนำการต่อสู้ไปสู่ศัตรูอยู่ใกล้แค่เอื้อม"
 abandoned_hatchery_chain_2: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_2_title: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_2_desc: "เราเข้าใกล้การไขปริศนาของพอร์ทัลไปอีกขั้นหนึ่ง แม้ว่าจะยังไม่สามารถผ่านทางได้ในขณะนี้ แต่ตอนนี้เรามีข้อมูลเชิงลึกที่จำเป็นในการพัฒนาเทคโนโลยีที่จำเป็นแล้ว\n\nเพื่อนำการต่อสู้ของเราไปสู่ศัตรู เราต้องการ §Y$tech_wormhole_stabilization$§!"

 bio.2025.name: "แหล่งกำเนิดของศัตรู"
 bio.2025.desc: "ขอบคุณความก้าวหน้าล่าสุดของเราใน §Y$tech_wormhole_stabilization$§! เราได้รับโอกาสเห็นระบบ §Y[event_target:starlit_sealed_system.GetName]§! ในมุมมองสั้นๆ ที่หาได้ยาก\n\nกองเรือยานชีวภาพที่ก้าวร้าวและป้อมดาวที่มีการป้องกันอย่างหนาแน่นรอเราอยู่ที่อีกฟากหนึ่ง ขอแนะนำให้ใช้ความระมัดระวังอย่างยิ่ง\n\nเราได้พบแหล่งกำเนิดของศัตรูแล้ว"
 abandoned_hatchery_chain_3: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_3_title: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_3_desc: "เราได้พบแหล่งกำเนิดของศัตรูแล้ว แต่ในการเปิดเผยความลับของพวกเขา จำเป็นต้องเผชิญหน้ากับแนวป้องกันของพวกเขา\n\nการต่อสู้จะไม่ใช่เรื่องง่าย แต่หลังจากนั้น ในที่สุดเราก็จะมีอิสระในการสำรวจระบบ §Y[event_target:starlit_sealed_system.GetName]§!"

 bio.2027.name: "สนธยาแห่งความกลัว"
 bio.2027.desc: "กองเรือเฝ้าอยู่§Y[starlit_sealed_system.GetName]§!ถูกทําลายแล้ว ก่อนถึงจุดจบ เราได้รับสัญญาณรบกวน จากฐานดาวของระบบ ซึ่งตอนนี้เราได้แปลเพียงว่า\n\n§Hสูญเสียการควบคุมทั้งหมด! เรือจะขึ้นเอง! ได้โปรด ไม่ว่าคุณจะเป็นใคร ช่วยพวกเราด้วย\"§!\n\nตั้ง แต่ นั้น มา การ สื่อ ความ ทุก อย่าง ก็ ยุติ ลง. ถ้านี่เป็นชัยชนะที่แท้จริง พื้นดินของศัตรูของเรา เสนอโอกาสเชิงยุทธศาสตร์ ใหม่$starbase_deep_space_citadel_1$อาจวันหนึ่งสว่างในแสงของ§Y[starlit_sealed_system.GetName]§!เพื่อให้แน่ใจว่าภัยคุกคามดังกล่าว จะไม่หมดอายุแล้วอารยธรรมของเราอีกครั้ง"
 bio.2027.a: "ในที่สุด การปิดล้อมของเราก็ถูกยกเลิกแล้ว"
 citadel_siege_lifted: "ยกเลิกการปิดล้อม"
 citadel_siege_lifted_desc: "ผู้พิทักษ์ที่กล้าหาญของเราได้ปราบ [GetInvadersLower] ลงได้ ในที่สุดการปิดล้อมอันยาวนานของเราก็สิ้นสุดลง"
 citadel_siege_lifted_machine: "$citadel_siege_lifted$"
 citadel_siege_lifted_machine_desc: "$citadel_siege_lifted_desc$"
 abandoned_hatchery_chain_4: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_4_title: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_4_desc: "[GetInvadersLower] ถูกกวาดล้างออกจากระบบ §Y[starlit_sealed_system.GetName]§! แล้ว แต่สถานการณ์ที่นี่แตกต่างจากที่เราคาดไว้มาก\n\nสิ่งที่เหลืออยู่ของผู้ทรมานเรามีเพียงโลกที่พังพินาศอย่างเห็นได้ชัด"
 PROJECT_BIOMECHANICAL_WORLD: "บ้านเกิดของศัตรู"
 PROJECT_BIOMECHANICAL_WORLD_DESC: "โลกบ้านเกิดของ [GetInvadersLower] คนเหล่านี้เป็นใคร และพวกเขาต้องการอะไรจากเรา?"

 bio.2030.name: "โรคระบาดจักรกลชีวภาพ"
 bio.2030.desc: "§Y[event_target:biomechanical_world_target.GetName]§! คือสุสานที่เปิดกว้าง\n\nสปีชีส์เด่นของดาวเคราะห์ดวงนี้ถูกรุกรานโดยสิ่งมีชีวิตรูปแบบใหม่ที่แปลกประหลาดและก้าวร้าว การสืบสวนเพิ่มเติมเผยให้เห็นว่าสิ่งเหล่านี้ไม่ใช่สิ่งมีชีวิตตามธรรมชาติ แต่เป็นเครื่องจักรชีวภาพที่ดูเหมือนจะเติบโตขึ้นมามากกว่าถูกสร้างขึ้น\n\nเป็นไปได้หรือไม่ว่าใครก็ตามที่ออกแบบสิ่งมีชีวิตเหล่านี้ถูกผลงานสร้างสรรค์ของตนเองครอบงำ? ศัตรูของเราอาจไม่รู้ตัวเลยเกี่ยวกับการกระทำของพวกเขาต่อเรา หรือแม้แต่การมีอยู่ของเราใช่หรือไม่?\n\nมีเพียงสิ่งเดียวที่แน่นอน: มาตรการใดก็ตามที่พวกเขาใช้เพื่อควบคุมโรคระบาดนี้ได้ทำลายพวกเขาไปพร้อมกับสิ่งน่ารังเกียจที่เป็นอัตโนมัติเหล่านั้น"
 bio.2030.a: "ถ้าอย่างนั้นเราก็ไม่ใช่เหยื่อรายเดียว..."
 smarter_hatchery: "กองเรือที่ได้รับการปรับปรุง"
 smarter_hatchery_desc: "พวกมันเรียนรู้... พวกมันปรับตัว... พวกมันกำลังมา"
 bio.2030.tt: "\n§Eปลดล็อกตำแหน่งในสภา:§!\n§H$t$สมาชิกสภาผู้แทนราษฎร$§!\n$t$COUNCIL_POSITION_MODIFIER_BASE$\n$ttt$เงิน บัญชี§G+1%§!\n$ttt$โมด สมอเรือขนาด BAR พื้นที่ลึก พื้นที่ BAR ค่าเงิน:§G+2%§!\n$ttt$เงิน พื้นฐาน§G-5%§!\n$COUNCIL_POSITION_AVAILABLE_FOR$t$commander_with_icon$"

