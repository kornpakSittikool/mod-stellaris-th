 SHIP_BEHEMOTH_RAGE: "ต่อมความก้าวร้าว"
 SHIP_BEHEMOTH_RAGE_DESC: "เบเฮมอทคือไททันผู้ดื้อรั้นและป่าเถื่อน และพวกมันไม่ยอมจำนนต่อการควบคุมได้นาน ไม่ช้าก็เร็ว ความโกรธเกรี้ยวภายในจะปะทุขึ้นมา ราวกับพายุคอสมิกที่ยากจะเหนี่ยวรั้ง บางทีภูมิปัญญาอาจไม่ได้อยู่ที่การเฝ้ารอ แต่อยู่ที่การจุดไม้ขีดไฟด้วยตัวเราเอง เพื่อปลดปล่อยพายุในเวลาที่เราเลือก แทนที่จะเป็นเวลาที่มันเลือกเรา"
 behemoth_rage_ship_button: "§Hยั่วโทสะ§!\n\nปลดปล่อย §Yเบเฮมอท§!\nเบเฮมอทที่คลุ้มคลั่งจะมุ่งหน้าไปยัง §Yอาณานิคม§! หรือ §Yไข่เบเฮมอท§! ที่ใกล้ที่สุดและพยายามทำลายมัน\nโดยปกติความคลุ้มคลั่งจะคงอยู่เป็นเวลา §Y180 วัน§! แต่ปัจจัยหลายอย่างสามารถส่งผลต่อระยะเวลาดังกล่าวได้$TABBED_NEW_LINE$- ในขณะที่อยู่ระหว่าง §Rการต่อสู้§! หรือ §Rการระเบิดโจมตี§! เบเฮมอทจะไม่สงบลง$TABBED_NEW_LINE$- หากเรา §Gเอาชนะ§! เบเฮมอทที่คลุ้มคลั่งในการต่อสู้ได้ มันจะกลับมาอยู่ภายใต้การควบคุมของเราตามเดิม"
