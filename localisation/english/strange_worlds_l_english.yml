 pm_revolting_pests: "สัตว์รบกวนที่น่าชิงชัง"
 pm_revolting_pests_desc: "สัตว์บนดาวดวงนี้ช่างน่าทึ่งทว่าน่ารังเกียจ ไม่แนะนำให้เข้าใกล้สัตว์เหล่านี้"
 pm_gaseous_fauna: "สัตว์สภาวะก๊าซ"
 pm_gaseous_fauna_desc: "สัตว์สายพันธุ์พื้นเมืองที่ได้รับการเลี้ยงช่วยมอบทั้งความบันเทิงและก๊าซที่สามารถเก็บเกี่ยวได้แก่ประชากรบนดาว"
