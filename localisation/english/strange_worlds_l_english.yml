 d_explosive_atmosphere_ct: "$t$ได้รับผลึกสีเหลือง £volatile_motes£ §Y$volatile_motes$§! จากอาชีพ [mote_harvester.GetIcon]$mote_harvester$: §G+50%§!"
 d_explosive_atmosphere_ct_short: "ได้รับผลึกสีเหลือง £volatile_motes£ §Y$volatile_motes$§! เพิ่มขึ้น §G+50%§! จากอาชีพ [mote_harvester.GetIcon]$mote_harvester$"

 d_blue_lava: "ลาวาสีน้ำเงิน"
 d_blue_lava_desc: "กระบวนการปรับสภาพดาวเคราะห์ส่งผลให้เกิดการทำปฏิกิริยาระหว่างก๊าซและแร่แร่โลหะผสมใต้ดิน ทำให้พื้นผิวโลกมีลาวาสีน้ำเงินที่ตระการตา"

 d_crystaline_growths: "การเติบโตของผลึกแก้ว"
