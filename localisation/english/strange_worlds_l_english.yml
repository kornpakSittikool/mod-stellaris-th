 trait_inner_darkness: "ความมืดภายใน"
 trait_inner_darkness_desc: "ร่างกายได้รับการยกระดับหลังการอิ่มตัวในสสารมืด บัดนี้พวกเขาจะปล่อยอนุภาคขนาดเล็กออกมาเป็นระยะๆ ทว่าชีวิตขัยของพวกเขาจะสั้นลงอย่างรวดเร็ว"
 trait_inner_darkness_tt: "ผลิตสสารมืด £sr_dark_matter£ ต่อประชากร £pop£: §G+$@inner_darkness_dark_matter_production$§!"

 trait_geleboric_mutations: "การกลายพันธุ์แบบเจลีบอริก"
 trait_geleboric_mutations_desc: "การตอบสนองที่โชคร้ายต่อการทดลองได้ส่งผลกระทบต่อสรีระร่างกายของสายพันธุ์นี้อย่างรุนแรง"

 trait_psionic_ephapse: "การเชื่อมต่อประสาทพลังจิต"
 trait_psionic_ephapse_desc: "หลังการสัมผัสกับแบคทีเรียจิตสำนึกเป็นระยะเวลานาน ระบบย่อยอาหารของสายพันธุ์นี้จะสร้างโพรไบโอติกทางพลังจิตซึ่งช่วยส่งเสริมการสื่อสารทางจิตระหว่างพลเมืองที่มีผลกระทบ"
