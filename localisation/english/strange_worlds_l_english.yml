 d_hydroactive_eggs: "ไข่ตอบสนองต่อน้ำ"
 d_hydroactive_eggs_desc: "น้ำมีอยู่พร้อมในสภาพแวดล้อมทางธรรมชาติ ส่งผลให้สัตว์พื้นเมืองมีอัตราการขยายพันธุ์ที่สูงมาก"

 d_explosive_atmosphere: "ชั้นบรรยากาศไวไฟ"
