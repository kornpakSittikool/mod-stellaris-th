 bacterial_drive_modifier_desc: "แหล่งน้ำที่อุดมไปด้วยแบคทีเรียดัดแปลงพันธุกรรมช่วยสร้างความมุ่งมั่นที่เป็นเลิศของประชากรต่อเป้าหมายร่วมกัน"
