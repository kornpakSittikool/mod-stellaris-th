 d_bogplants: "พืชบึงกรด"
 d_bogplants_desc: "บึงกรดรุนแรงเป็นที่อยู่อาศัยของพืชสายพันธุ์พิเศษที่หลั่งก๊าซแปลกประหลาดออกมาในขณะที่มันกินอาหาร"

 d_liquid_dark_matter: "บ่อสสารมืดเหลว"
