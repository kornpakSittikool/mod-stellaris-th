l_english:

 ##THE WORLD IS BLEEDING
 strange_worlds.1.name: "โลกกำลังหลั่งเลือด"
 strange_worlds.1.desc: "พื้นผิวของดาว §Y[Root.GetName]§! กำลังเกิดการตอบสนองอย่างที่ไม่เคยมีมาก่อนต่อความพยายามในการก่อสร้างของเรา สารเหนียวที่ไม่รู้จักเริ่มไหลซึมออกมาจากฐานรากของสิ่งก่อสร้างหลัก\n\nน้ำยางเหนียวนี้คือของเหลวสีแดงเข้มชนิดหนึ่ง มีลักษณะคล้ายเจลาติน แต่มีความเหนียวติดแน่นเป็นพิเศษเมื่อสัมผัส\n\nเหล่า [Owner.GetScientistPlural] ของเรากระตือรือร้นที่จะศึกษาของเหลวนี้เพิ่มเติม ปัจจุบันมันเป็นเพียงความไม่สะดวกเล็กน้อย แต่จะเป็นการรอบคอบที่จะรับรองความปลอดภัยของ [Owner.GetColonistPlural] ของเรา"

 strange_worlds.5.name: "การตกเลือดครั้งใหญ่"
 strange_worlds.5.desc: "ดาว §Y[Root.GetName]§! รายงานความคืบหน้าทางลบเกี่ยวกับสารสีแดงเข้มที่แปลกประหลาด\n\nสารดังกล่าวเริ่มควบคุมได้ยากขึ้น หลั่งออกมาในอัตราที่สูงขึ้นทั่วทั้งพื้นที่ที่ได้รับผลกระทบ\n\nแต่สารเหนียวนี้ก็ไม่ได้ไร้ประโยชน์แต่อย่างใด เมื่อมันแข็งตัว คุณสมบัติการยึดเกาะของมันจะเด่นชัดขึ้น ทำหน้าที่เป็นปูนซีเมนต์ธรรมชาติที่สามารถนำมาใช้เสริมงานก่อสร้างของเราได้\n\nแต่น่ากังวลว่า สารนี้แทบจะไม่สามารถขจัดออกจากร่างกายของ [Owner.GetColonistPlural] ที่มาสัมผัสกับมันได้ การพยายามรักษาและศึกษาผู้ได้รับผลกระทบจะช่วยให้เราสามารถรวบรวมข้อมูลเพิ่มเติม แต่จะทำให้ความก้าวหน้าในการก่อสร้างช้าลง"

 strange_worlds.5.a: "รักษาและศึกษากลุ่มผู้ได้รับผลกระทบ"
 strange_worlds.5.b: "ดำเนินการก่อสร้างต่อไป"

 strange_worlds.15.name: "ขุนเขาแห่งโลหิต"
 strange_worlds.15.desc: "การก่อสร้างบนดาว §Y[Root.GetName]§! ดำเนินต่อไปในอัตราที่รวดเร็วเป็นพิเศษ แต่การหลั่งไหลของสารเหนียวไม่ได้จำกัดอยู่เพียงฐานรากของสิ่งก่อสร้างของเราอีกต่อไป\n\nพบรอยแตกหลั่งเลือดในหลายตำแหน่ง ในช่วงแรกมีเพียงวัตถุที่นำมาจากภายนอกดาว [Root.GetName] เท่านั้นที่ได้รับผลกระทบจากสารนี้ แต่ในตอนนี้มันกำลังแพร่กระจายไปทั่วโดยไม่เลือกเป้าหมาย\n\nบัดนี้สารดังกล่าวได้กลืนกินพื้นที่ขนาดใหญ่ของพื้นผิว [Root.GetName] และเริ่มแข็งตัวกลายเป็นแร่หนาทึบที่เคลือบดาว [Root.GetName] ไว้\n\nผ่านความพยายามลองผิดลองถูกที่มีราคาแพง วิศวกรของเราได้ค้นพบวิธีลดความเสียหายรวมถึงเก็บเกี่ยวสารนี้ได้อย่างมีประสิทธิภาพ แต่สิ่งนี้สำเร็จได้โดยการยอมสูญเสียพื้นที่สำคัญให้แก่สารเหนียวดังกล่าว"
 strange_worlds.15.a: "การพัฒนาที่น่าสนใจ"

 strange_worlds.20.name: "ปรสิต"
 strange_worlds.20.desc: "หลังจากการรักษาและศึกษาคนงานที่ได้รับผลกระทบบนดาว §Y[Root.GetName]§! อย่างเข้มข้น นักวิทยาศาสตร์ของเราได้ค้นพบสาเหตุหลักของปัญหา\n\nสิ่งที่ปรากฏในตอนแรกว่าเป็นสารเหนียวคล้ายเจลาติน แท้จริงแล้วคือกลุ่มของจุลชีพปรสิตที่สร้างความสัมพันธ์แบบเกื้อกูลกันกับดาวเคราะห์ ปรสิตเหล่านี้ย่อยสลายสารอินทรีย์ใต้เปลือกโลกของ [Root.GetName] และเปลี่ยนสภาพให้กลายเป็นวัสดุใหม่\n\nการรบกวนที่เกิดขึ้นจากการพัฒนาของ [Root.GetName] ได้ขัดขวางวงจรชีวิตตามธรรมชาติของพวกมัน ส่งผลให้พวกมันตอบสนองต่อสารแปลกปลอมที่เรานำเข้าสู่ระบบนิเวศ\n\nหากมีเวลาเพิ่มเติม ทีมวิทยาศาสตร์มั่นใจว่าเราจะสามารถหาทางทำงานร่วมกับสิ่งมีชีวิตเหล่านี้ได้อย่างกลมกลืน โดยประสานชีววิทยาเฉพาะของพวกมันเข้ากับกระบวนการผลิตของ [Root.GetName]"
 strange_worlds.20.a: "น่าทึ่งมาก ดำเนินการต่อ"

 strange_worlds.25.name: "ความสัมพันธ์ที่มีประสิทธิภาพ"
 strange_worlds.25.desc: "ผ่านการวิจัยอย่างกว้างขวาง นักวิทยาศาสตร์ของเราได้ออกแบบจุลชีพปรสิตรุ่นกลายพันธุ์บนดาว §Y[Root.GetName]§! การกลายพันธุ์นี้ออกแบบมาเพื่อให้มันรับรู้ว่าวัสดุของเราเป็นส่วนเสริมทางนิเวศวิทยาที่เป็นมิตร ช่วยให้เราสามารถเริ่มการก่อสร้างใหม่ได้โดยไม่มีปัญหาอีกต่อไป\n\nหลังจากนำพวกมันเข้าสู่ระบบนิเวศของดาวเคราะห์ ปรสิตดัดแปลงพันธุกรรมของเราประสบความสำเร็จในการอยู่ร่วมกับระบบนิเวศนั้น\n\nนอกจากนี้ โดยการนำผลของการย่อยสลายดั้งเดิมของจุลชีพกลับมาใช้งานใหม่ เราสามารถควบคุมคุณสมบัติการยึดเกาะของมันเพื่อเพิ่มกระบวนการผลิตของดาวเคราะห์ได้สำเร็จ"
 strange_worlds.25.a.evopred: "และพวกมันจะสอนอะไรเราได้บ้าง?"

 strange_worlds.30.name: "โผล่ขึ้นมาจากความว่างเปล่า"
 strange_worlds.30.desc: "ในขณะที่เรากำลังเตรียมพื้นที่สำหรับการขยายตัวในอนาคตบนดาว §Y[Root.GetName]§! สิ่งก่อสร้างขนาดใหญ่ชิ้นหนึ่งดูเหมือนจะโผล่ขึ้นมาอย่างกะทันหัน\n\nสิ่งก่อสร้างนั้นกำลังปล่อยคลื่นพลังงานที่ไม่เสถียรอย่างมาก ส่งผลให้มันสลับไปมาระหว่างการปรากฏตัวและหายตัวไป นี่คือเหตุผลว่าทำไมมันไม่ปรากฏในการสแกนเซ็นเซอร์รอบแรกของระบบดาวนี้\n\nเมื่อมองเห็นได้ จะพบสัญลักษณ์ที่อ่านไม่ออกประดับอยู่รอบภายนอกอาคารที่ปิดผนึก ทว่าไม่ตรงกับภาษาใดๆ ในบันทึกข้อมูลของเรา\n\nไม่มีฟังก์ชันการทำงานที่ชัดเจนใดๆ ที่จับได้ จนถึงขณะนี้โครงสร้างนี้ยังไม่ก่ออันตรายใดๆ แต่กำลังขัดขวางความพยายามในการพัฒนาพื้นที่ของเรา"
 strange_worlds.30.a: "สืบสวน"

 strange_worlds.35.name: "ความผิดปกติทางสายตา"
 strange_worlds.35.desc.no_cloak: "การวิเคราะห์โครงสร้างระยิบระยับบนดาว §Y[Root.GetName]§! นำไปสู่ข้อสรุปว่าวัตถุดังกล่าวโค้งงอหรือบิดเบือนแสงบางประการ$strange_worlds.35.desc.common_1$ในขณะที่ความรู้ของเราเกี่ยวกับคุณสมบัติของสิ่งก่อสร้างเพิ่มขึ้น ทว่าจนถึงตอนนี้เรายังไม่สามารถเข้าไปข้างในได้ - หากสามารถทำเช่นนั้นได้จริง$strange_worlds.35.desc.common_2$"
 strange_worlds.35.desc.cloak: "การวิเคราะห์โครงสร้างระยิบระยับบนดาว §Y[Root.GetName]§! นำไปสู่ข้อสรุปว่าวัตถุดังกล่าวมีคุณสมบัติพรางตัวเป็นระยะๆ$strange_worlds.35.desc.common_1$ในขณะที่ความรู้ของเราเกี่ยวกับคุณสมบัติการพรางตัวของมันเพิ่มขึ้น ทว่าจนถึงตอนนี้เรายังไม่สามารถเข้าไปข้างในได้ - หากสามารถทำเช่นนั้นได้จริง$strange_worlds.35.desc.common_2$"
 strange_worlds.35.desc.common_1: "\n\nตรวจพบกิจกรรมความร้อนใต้พิภพที่ผิดปกติในชั้นแร่ซิลิเกตใต้ดิน แหล่งพลังงานที่ทรงพลังนี้ทำหน้าที่หล่อเลี้ยงสิ่งก่อสร้างดังกล่าว ทว่าระดับพลังงานของมันเกิดความผันผวนอย่างรุนแรง\n\n"
 strange_worlds.35.desc.common_2: "\n\nภายนอกอาคารที่ปิดผนึกประกอบไปด้วยวัสดุที่ไม่รู้จักและตอบสนองได้ง่ายมาก ความพยายามในช่วงแรกในการใช้กำลังเข้าไปส่งผลให้สนามแม่เหล็กไฟฟ้าของอาคารไร้ความเสถียรยิ่งขึ้น เราสามารถตัดเปิดทางเข้าไปเพื่อเรียนรู้เพิ่มเติม แต่มีความเสี่ยงสูงต่อการเกิดสภาวะที่คาดเดาไม่ได้"
 strange_worlds.35.a: "ใช้กำลังเข้าบุก"
 strange_worlds.35.b: "ดำเนินการศึกษาวิจัยจากภายนอกต่อไป"

 strange_worlds.40.name: "ปฏิกิริยาที่เกินควบคุม"
 strange_worlds.40.desc: "ความพยายามในการบุกเข้าไปในสิ่งก่อสร้างบนดาว §Y[Root.GetName]§! จบลงด้วยหายนะ อุปกรณ์ของเราทำให้ลวดลายพลังงานของอาคารไร้ความเสถียรยิ่งขึ้น ส่งผลให้เกิดการระเบิดรุนแรงหลายครั้ง บัดนี้มันไม่เหลืออะไรนอกจากซากเถ้าถ่าน\n\nการทำลายล้างที่เกิดขึ้นโดยอุบัติเหตุส่งผลลัพธ์ที่ไม่คาดคิด ซากปรักหักพังของเมืองโบราณต่างดาวที่ถูกทิ้งร้างมานานปรากฏขึ้นในหุบเขาใกล้เคียง\n\nดูเหมือนว่าวัตถุดังกล่าวจะฉายสนามพรางตัวที่ทรงพลังครอบคลุมเมืองเก่าไว้ สิ่งที่พวกเขาพยายามซ่อนตัวยังคงเป็นความลับ ทว่าสิ่งที่แน่นอนคือพวกเขาเสียชีวิตไปเรียบร้อยแล้วโดยไม่คำนึงถึงความพยายามของตน ไม่มีสิ่งที่มีค่าทางโบราณคดีที่หลงเหลืออยู่ในสภาพสมบูรณ์เลย\n\nวิธีการทำงานที่เจาะจงของเทคโนโลยีประหลาดนี้ยังคงไม่รู้จักสำหรับเรา แต่เราได้รับความรู้ใหม่จากประสบการณ์นี้ เราจะนำแหล่งพลังงานความร้อนใต้พิภพที่ทรงพลังนี้ไปปรับปรุงใช้งานสำหรับอาณานิคมของเราเอง"
 strange_worlds.40.a: "การค้นพบที่มีคุณค่า"
 strange_worlds.40.a_ct: "เคลียร์สิ่งกีดขวาง §Yโครงสร้างระยิบระยับ§! แล้ว"

 strange_worlds.45.name: "ห้องบัญชาการ"
 strange_worlds.45.desc.intro: "การศึกษาสัญลักษณ์แปลกๆ ด้านนอกของโครงสร้างต่างดาวบนดาว §Y[Root.GetName]§! เพิ่มเติมเปิดเผยว่าพวกมันทำหน้าที่เป็นอินเตอร์เฟซการควบคุมประเภทหนึ่ง เราสามารถจัดการพวกมันเพื่อเปิดประตูลับเข้าไปยังภายในที่ว่างเปล่าของอาคาร เผยให้เห็นห้องควบคุมขนาดใหญ่\n\nแม้ว่าจะยังไม่เข้าใจการทำงานเชิงลึก แต่เราได้รับความรู้เบื้องต้นเกี่ยวกับการสั่งการผ่านการลองผิดลองถูก การระงับการทำงานของมันส่งผลลัพธ์ที่ไม่คาดคิด ซากปรักหักพังของเมืองโบราณต่างดาวที่ถูกทิ้งร้างปรากฏขึ้นในหุบเขาใกล้เคียง\n\nดูเหมือนวัตถุดังกล่าวจะทำหน้าที่ฉายสนามพรางตัวที่ทรงพลังครอบคลุมเมืองเก่าไว้ สิ่งที่พวกเขาหลบซ่อนยังคงเป็นปริศนา ทว่าสิ่งที่แน่นอนคือพวกเขาดับสูญไปแล้วโดยไม่คำนึงถึงความพยายามของพวกเขา แม้จะไม่มีสิ่งที่มีค่าทางโบราณคดีที่หลงเหลืออยู่ ทว่านักวิทยาศาสตร์ของเราสามารถใช้ประโยชน์จากห้องควบคุมได้อย่างยอดเยี่ยม"
 strange_worlds.45.desc.a: "$strange_worlds.45.desc.intro$\n\nบัดนี้เราสามารถรักษาเสถียรภาพและขยายผลการพรางตัวประหลาดนี้ให้ครอบคลุมพื้นที่หุบเขาทั้งหมด มันจะเป็นตัวช่วยเสริมความปลอดภัยให้แก่อาณานิคมของเราอย่างมาก"
 strange_worlds.45.desc.b: "$strange_worlds.45.desc.intro$\n\nบัดนี้เราสามารถรักษาเสถียรภาพและขยายสนามพรางตัวเพื่อปกป้องพื้นที่หุบเขาทั้งหมด และเพิ่มพูนความรู้เกี่ยวกับเทคโนโลยีพรางตัวได้อย่างมาก"
 strange_worlds.45.a: "การค้นพบที่มีคุณค่า"

 strange_worlds.55.name: "ธรรมชาติปะทะเทคโนโลยี"
 strange_worlds.55.desc.intro: "สัตว์กินพืชขนาดใหญ่สายพันธุ์หนึ่งเริ่มเข้ามาขัดขวางการผลิตพลังงานของดาว §Y[Root.GetName]§! ในการแสดงการฆ่าตัวตายหมู่จำนวนมาก พวกมันวิ่งเข้าหาโรงไฟฟ้าของเราเพื่อเผาตัวเองทั้งเป็น\n\nสัตว์เหล่านี้มีความมุ่งมั่นอย่างยิ่ง บุกฝ่าแนวรั้วกั้นรอบโรงไฟฟ้าของเราเพื่อเข้าสู่เป้าหมาย ส่งผลให้การผลิตพลังงานได้รับผลกระทบจากพฤติกรรมแปลกๆ นี้\n\n"
 strange_worlds.55.desc.outro: "สายพันธุ์นี้มีบทบาทสำคัญในระบบนิเวศของดาวเคราะห์ ในอัตราการเกิดเหตุการณ์ปัจจุบัน พวกมันจะนำพาตัวเองไปสู่การสูญพันธุ์อย่างแน่นอน"
 strange_worlds.55.desc.a: "$strange_worlds.55.desc.intro$อย่างไรก็ตาม เรื่องนี้ส่งผลดีต่อผลผลิตเสบียงอาหารอย่างไม่คาดคิด โดยเหล่า [Owner.GetColonistPlural] ค้นพบว่าเนื้อของสัตว์เหล่านี้มีรสชาติที่อร่อยมาก\n\n$strange_worlds.55.desc.outro$"
 strange_worlds.55.desc.b: "$strange_worlds.55.desc.intro$แม้ว่าสิ่งนี้จะช่วยเพิ่มปริมาณสารชีวมวลที่เราสามารถเก็บเกี่ยวได้ ทว่าก็นำมาซึ่งความไม่สะดวกสบายอย่างมาก\n\n$strange_worlds.55.desc.outro$"
 strange_worlds.55.a: "สืบสวนพฤติกรรมนี้"

 strange_worlds.60.name: "สรีรวิทยาเร่งปฏิกิริยา"
 strange_worlds.60.desc: "เราได้รับข้อมูลที่มีค่าเกี่ยวกับสัตว์ขนาดใหญ่ที่ฆ่าตัวตายบนดาว §Y[Root.GetName]§!\n\nสัตว์กินพืชขนาดยักษ์เหล่านี้ตาบอดโดยพฤตินัย ใช้สัญญาณสะท้อนในการมองเห็นและระบุตำแหน่งกันและกัน เราคาดว่าโรงไฟฟ้าของเรากำลังแผ่คลื่นความถี่ที่ไปรบกวนระบบการรับฟังที่เฉียบคมของพวกมัน กระตุ้นให้เกิดพฤติกรรมก้าวร้าวต่อโรงไฟฟ้าของเรา\n\nนอกจากนี้ เราได้เรียนรู้ว่าเอนไซม์ย่อยอาหารเฉพาะตัวของมันสามารถทำหน้าที่เป็นตัวเร่งปฏิกิริยาในการถลุงโลหะ การทดสอบเบื้องต้นแสดงให้เห็นศักยภาพในการปรับปรุงการผลิตโลหะผสมของเรา\n\nแม้การค้นพบเหล่านี้ ทว่าเรายังคงห่างไกลจากการกลับมาผลิตพลังงานตามปกติ นักวิทยาศาสตร์ของเรายังคงทำการสืบสวนปัญหานี้ต่อไป"
 strange_worlds.60.a: "น่าทึ่งมาก"

 strange_worlds.65.name: "เสน่หาของสัตว์ร้าย"
 strange_worlds.65.desc.intro: "เราได้ระบุสาเหตุของแรงกระตุ้นการฆ่าตัวตายที่ก้าวร้าวของสิ่งมีชีวิตบนดาว [Root.GetName] แล้ว\n\nการเฝ้าสังเกตการณ์ระบบเสียงและพฤติกรรมทางสังคมเพิ่มเติมเปิดเผยความจริงที่น่าตกใจ: เสียงเรียกร้องคู่ครองของพวกมันมีความถี่ที่เกือบจะตรงกับเสียงที่สร้างจากโรงไฟฟ้าของเราอย่างพอดิบพอดี\n\n"
 strange_worlds.65.desc.common: "เราสามารถจำลองเสียงของสัตว์ร้ายเหล่านี้เพื่อเบี่ยงเบนเส้นทางการอพยพของพวกมันให้ออกห่างจากอาณานิคมของเรา เพื่อรักษาประชากรของพวกมันให้มั่นคง สิ่งนี้จะช่วยให้เราสามารถเก็บเกี่ยวเอนไซม์เร่งปฏิกิริยาจากสิ่งปฏิกูลของพวกมันเพื่อเพิ่มการผลิตโลหะผสม ในขณะที่ดำเนินการศึกษาการทำงานทางสรีระที่เป็นเอกลักษณ์ของพวกมันต่อไป\n\nในอีกแง่หนึ่ง [Owner.GetSpeciesHandName],\n\n"
 strange_worlds.65.desc.outro: "เราสามารถสร้างเครื่องเก็บเกี่ยวไฟฟ้าเฉพาะทางเพื่อประมวลผลสัตว์เหล่านี้ได้อย่างมีประสิทธิภาพโดยไม่รบกวนการผลิตพลังงาน"
 strange_worlds.65.desc_devouring_swarm: "$strange_worlds.65.desc.intro$เป็นการสะดวกอย่างยิ่งที่เราสามารถใช้ความรู้นี้เพื่อชี้นำสิ่งมีชีวิตเข้าสู่เครื่องเก็บเกี่ยวโดยเฉพาะ มาเฉลิมฉลองอาหารค่ำกันเถอะ"
 strange_worlds.65.desc.food: "$strange_worlds.65.desc.intro$$strange_worlds.65.desc.common$สัตว์เหล่านี้กลายเป็นส่วนสำคัญในอาหารของดาว §Y[Root.GetName]§!\n\n$strange_worlds.65.desc.outro$"
 strange_worlds.65.desc.no_food: "$strange_worlds.65.desc.intro$สัตว์เหล่านี้เป็นแหล่งชีวมวลที่ยั่งยืนบนดาว §Y[Root.GetName]§!\n\n$strange_worlds.65.desc.outro$"
 strange_worlds.65.a: "เก็บเกี่ยวสิ่งปฏิกูลของพวกมัน"
 strange_worlds.65.b_devouring_swarm: "ถึงเวลาอาหารค่ำแล้ว!"
 strange_worlds.65.b_default: "เก็บเกี่ยวเนื้อของพวกมัน"

 strange_worlds.75.name: "ผืนทรายประหลาด"
 strange_worlds.75.desc: "เหล่า [Owner.GetColonistPlural] ของเรากำลังรายงานปรากฏการณ์แปลกๆ เกี่ยวกับผืนทรายบนดาว §Y[Root.GetName]§!\n\nพายุทรายรุนแรงก่อตัวขึ้นอย่างกะทันหันในบริเวณใกล้เคียงกับอาณานิคมของเราในวันที่สงบเงียบ แม่น้ำของทรายที่เคลื่อนตัวอย่างรวดเร็วปรากฏขึ้นจากความว่างเปล่าก่อนจะหยุดลงอย่างกะทันหันเหมือนกับตอนที่เริ่มต้น มีรายงานแม้กระทั่งว่าเนินทรายเคลื่อนที่ไปด้านข้างในวันที่ไม่มีลมพัดผ่านเลย\n\nยังไม่มีคำอธิบายทางชั้นบรรยากาศหรือทางธรณีวิทยาสำหรับเหตุการณ์เหล่านี้\n\nผืนทรายเฉพาะตัวนี้ไม่ได้สร้างอันตรายโดยตรงแก่เรา ทว่ากำลังรบกวนปฏิบัติการของอาณานิคม การศึกษาเกี่ยวกับปรากฏการณ์ที่เป็นเอกลักษณ์นี้ยังคงดำเนินต่อไป"
 strange_worlds.75.a: "แปลกประหลาดมาก"

 strange_worlds.80.name: "เสียงขับขานของผืนทราย"
 strange_worlds.80.desc: "พายุทรายบนดาว §Y[Root.GetName]§! เริ่มแผ่เสียงหึ่งๆ ที่ทุ้มต่ำ ความถี่เริ่มเปลี่ยนระดับเสียงและสั่นไหวในรูปแบบที่เกิดขึ้นซ้ำๆ\n\nในขณะที่ปรากฏการณ์ \"ทรายขับขาน\" นี้สามารถสันนิษฐานได้ว่าเป็นเพราะคุณสมบัติของเศษอนุภาค ทว่าความสม่ำเสมอของการสั่นไหวไม่สามารถอธิบายได้ด้วยแรงเสียดทานเพียงอย่างเดียว\n\nเรายังพบหุบเขาที่เต็มไปด้วยเนินทรายที่สลักด้วยสัญลักษณ์แปลกๆ สัญลักษณ์เหล่านี้ปรากฏขึ้นในลักษณะนูนต่ำก่อนจะจางหายไปเกือบจะในทันที\n\nสิ่งที่ทำให้ผืนทรายเคลื่อนไหวนั้นยังไม่ชัดเจน ทว่าความสม่ำเสมอของรูปแบบชี้ให้เห็นถึงเป้าหมายหรือความตั้งใจเบื้องหลังพฤติกรรมนี้"
 strange_worlds.80.a: "ศึกษารูปแบบลวดลาย"

 strange_worlds.85.name: "ทรายพลังจิต"
 strange_worlds.85.desc_part1_no_zro: "เหล่า [Owner.GetScientistPlural] ที่ศึกษาพายุทรายบนดาว §Y[Root.GetName]§! ค้นพบว่ามีสสารแปลกใหม่กระจายอยู่ทั่วไปในวัสดุซิลิเกต"
 strange_worlds.85.desc_part1_zro: "เหล่า [Owner.GetScientistPlural] ที่ศึกษาพายุทรายบนดาว §Y[Root.GetName]§! ค้นพบว่ามีแร่ซูโร(ซโร)กระจายอยู่ทั่วไปในวัสดุซิลิเกต"
 strange_worlds.85.desc_part2_non_machine_common_no_psionic_zroni: "\nในขณะที่จัดการกับตัวอย่าง เหล่า [Owner.GetResearchers] ได้สัมผัสกับนิมิตระยะสั้นทว่าทรงพลัง พวกเขาเห็นภาพหลอนของร่างซโรนิ(Zroni)ท่องไปตามเนินทรายที่สลักสัญลักษณ์บนดาวเคราะห์"
 strange_worlds.85.desc_part2_non_machine_common_no_psionic_no_zroni: "\nในขณะที่จัดการกับตัวอย่าง เหล่า [Owner.GetResearchers] ได้สัมผัสกับนิมิตระยะสั้นทว่าทรงพลัง พวกเขาเห็นภาพหลอนของร่างเอเลี่ยนที่ไม่คุ้นเคยท่องเที่ยวไปตามเนินทรายที่สลักสัญลักษณ์บนดาวเคราะห์"
 strange_worlds.85.desc_part2_non_machine_common_psionic_zroni: "\nในขณะที่จัดการกับตัวอย่าง เหล่า [Owner.GetResearchers] ได้สัมผัสกับนิมิตพลังจิตสั้นๆ ทว่าทรงพลัง พวกเขาเห็นภาพหลอนของร่างซโรนิ(Zroni)ท่องไปตามเนินทรายที่สลักสัญลักษณ์บนดาวเคราะห์"
 strange_worlds.85.desc_part2_non_machine_common_psionic_no_zroni: "\nในขณะที่จัดการกับตัวอย่าง เหล่า [Owner.GetResearchers] ได้สัมผัสกับนิมิตพลังจิตสั้นๆ ทว่าทรงพลัง พวกเขาเห็นภาพหลอนของร่างเอเลี่ยนที่ไม่คุ้นเคยท่องเที่ยวไปตามเนินทรายที่สลักสัญลักษณ์บนดาวเคราะห์"
 strange_worlds.85.desc_part2_machine_common: "\nในขณะที่จัดการกับตัวอย่าง เหล่า [Owner.GetResearchers] ประสบกับการรบกวนในวงจรภายในของพวกเขา\n\n"
 strange_worlds.85.desc_part2_machine_zroni: "$strange_worlds.85.desc_part2_machine_common$การขัดข้องที่ทรงพลังนี้ส่งผลให้เกิดความล้มเหลวในระบบประมวลผลสายตา นำไปสู่การปรากฏตัวของร่างซโรนิ(Zroni)ท่องไปตามเนินทรายที่สลักสัญลักษณ์บนดาวเคราะห์"
 strange_worlds.85.desc_part2_machine_no_zroni: "$strange_worlds.85.desc_part2_machine_common$การขัดข้องที่ทรงพลังนี้ส่งผลให้เกิดความล้มเหลวในระบบประมวลผลสายตา นำไปสู่การปรากฏตัวของร่างเอเลี่ยนที่ไม่คุ้นเคยท่องเที่ยวไปตามเนินทรายที่สลักสัญลักษณ์บนดาวเคราะห์"
 strange_worlds.85.desc_part3_common: "\nภาพหลอนเหล่านี้ดูเหมือนจะเป็นต้นกำเนิดของสัญลักษณ์ การถอดรหัสสัญลักษณ์ใช้เวลานานมาก แต่เราเชื่อมั่นว่ามันคือภาษาเขียนอย่างแน่นอน\n\n"
 strange_worlds.85.desc_part3_zro: "$strange_worlds.85.desc_part3_common$เราสามารถสกัดแร่ซูโรออกจากผืนทรายได้โดยตรง ทว่าการกระทำเช่นนั้นน่าจะทำให้ภาพหลอนสลายตัวไป แต่อย่างไรก็ตาม ของล้ำค่านี้ก็มีปริมาณที่สูงมาก"
 strange_worlds.85.desc_part3_no_zro: "$strange_worlds.85.desc_part3_common$เราสามารถสกัดสสารแปลกใหม่ออกจากผืนทรายได้โดยตรง ทว่าการกระทำเช่นนั้นน่าจะทำให้ภาพหลอนสลายตัวไป แต่อย่างไรก็ตาม ของท้าทายฟิสิกส์นี้ก็อาจมีมูลค่าที่สูงมาก"
 strange_worlds.85.a: "ดำเนินการถอดรหัสและแปลภาษาต่อไป"
 strange_worlds.85.b_no_zro: "สกัดสสารแปลกใหม่ทันที"
 strange_worlds.85.b_zro: "สกัดแร่ซูโรทันที"

 strange_worlds.90.name: "ปรากฏการณ์แห่งผืนทราย"
 strange_worlds.90.desc_intro_zroni: "เราใช้ความรู้ก่อนหน้าเกี่ยวกับวัฒนธรรมซโรนิเพื่อทำสัญลักษณ์ใหม่ลงบนผืนทรายของดาว §Y[Root.GetName]§! สัญลักษณ์สำหรับคำทักทายของซโรนิ การตอบสนองมาถึงทันที"
 strange_worlds.90.desc_intro_no_zroni: "โดยใช้ฐานข้อมูลภาษาของเรา เราทำสัญลักษณ์นับร้อยที่เป็นตัวแทนของคำทักทายในทุกภาษาเขียนต่างดาวลงบนผืนทรายของดาว §Y[Root.GetName]§! ในที่สุดก็ได้รับการตอบสนองกลับมา"
 strange_worlds.90.desc_common: "\nพายุทรายสงบลง พื้นหุบเขาหยุดนิ่ง และเสียงเนินทรายเงียบงัน เนินทรายทั้งหมดลอยขึ้นสู่ชั้นบรรยากาศ เปลี่ยนแปลงรูปทรง ร่างที่ก่อตัวขึ้นจากทรายหมุนเวียนในการแสดงกลางหาวที่ซับซ้อน\n\n"
 strange_worlds.90.desc_storyline_started: "$strange_worlds.90.desc_common$เราจดจำเรื่องนี้ได้ทันทีว่าเป็นเรื่องราวของชาวซโรนิ นิมิตเกี่ยวกับพลังที่เพิ่งค้นพบและการต่อสู้ที่สยดสยอง ผืนทรายนี้ขับเคลื่อนด้วยซูโรภายใน ทำหน้าที่ส่องสัญญาณเสียงสะท้อนจากเผ่าพันธุ์ซโรนิโบราณ$strange_worlds.90.desc_outro$"
 strange_worlds.90.desc_storyline_finished: "$strange_worlds.90.desc_common$เราจดจำเรื่องนี้ได้ทันทีว่าเป็นเรื่องราวของชาวซโรนิ การเข้าสู่มิติชราวด์และการทำลายล้างที่ตามมา ผืนทรายนี้ขับเคลื่อนด้วยซูโรภายใน ทำหน้าที่ส่องสัญญาณเสียงสะท้อนจากชะตากรรมที่เศร้าสลดของซโรนิ$strange_worlds.90.desc_outro$"
 strange_worlds.90.desc_storyline_not_started: "$strange_worlds.90.desc_common$เราเข้าใจเพียงว่านี่คือเรื่องราวของเผ่าพันธุ์ต่างดาวที่ค้นพบพลังใหม่ซึ่งในที่สุดได้แบ่งแยกและทำลายล้างพวกเขา$strange_worlds.90.desc_outro$"
 strange_worlds.90.desc_outro: "\n\nหลังจากนั้น ทรายพลังจิตก็สงบลงอีกครั้ง พายุไม่กลับมาอีกเลย เราเชื่อมั่นว่าทรายเหล่านี้เริ่มเป็นมิตรต่อการมีอยู่ของเราบนดาว §Y[Root.GetName]§! แล้ว"
 strange_worlds.90.a: "น่าทึ่งมาก"

 strange_worlds.95.name: "ปฏิบัติการเก็บเกี่ยว"
 strange_worlds.95.desc_zroni_tech: "การใช้ความเชี่ยวชาญของเราในการกลั่นแร่ซูโร เราสกัดปริมาณที่มีนัยสำคัญออกจากทรายบนดาว §Y[Root.GetName]§! ได้สำเร็จ และได้เรียนรู้อย่างมากในกระบวนการนี้$strange_worlds.95.desc_outro$"
 strange_worlds.95.desc_no_zroni_tech: "ความพยายามในการเก็บเกี่ยวแร่ซูโรบนดาว §Y[Root.GetName]§! ส่งผลลัพธ์ที่หลากหลาย เราสกัดปริมาณเล็กน้อยได้สำเร็จ แต่สูญเสียไปมากในระหว่างการทดลอง ทว่าเราได้เรียนรู้อย่างมากในกระบวนการนี้$strange_worlds.95.desc_outro$"
 strange_worlds.95.desc_outro: "\n\nเมื่อการปนเปื้อนของซูโรถูกถอดถอนออกไป ทรายที่นี่ก็กลับสู่สภาวะปกติ อาณานิคมของเราไม่พบกับปรากฏการณ์พายุทรายที่คาดเดาไม่ได้อีกต่อไป ไม่ว่าสิ่งใดที่เคยบงการผืนทรายเหล่านี้ บัดนี้ได้สูญหายไปในอากาศธาตุแล้ว"

 strange_worlds.105.name: "การหายตัวไปอย่างกะทันหัน"
 strange_worlds.105.desc_intro: "ขาดการติดต่อกับหนึ่งในผู้สำรวจ [Owner.GetExplorer] ของเราบนดาว §Y[Root.GetName]§! หลังจากที่รายงานการค้นพบ §Yก๊าซแปลกประหลาด(แก๊สไฟฟ้า)§! ที่น่าจะเป็นไปได้ในหุบเขาที่ยังไม่ได้รับการแผนที่\n\n"
 strange_worlds.105.desc_gestalt_non_machine: "เรารับรู้ได้ถึงความเจ็บปวดสั้นๆ ทว่ารุนแรงก่อนที่โหนดการเชื่อมต่อจะเงียบหายไป "
 strange_worlds.105.desc_gestalt_machine: "ข้อมูลของโหนดเกิดความเสียหายก่อนจะออฟไลน์ไป พวกมันไม่ได้เชื่อมต่อกับเครือข่ายของเราอีกต่อไป"
 strange_worlds.105.desc_non_gestalt: "ที่น่ากังวลคือ สัญญาณสุดท้ายถูกตัดขาดไปพร้อมกับเสียงกรีดร้องที่ทรมาน เรากังวลถึงผลลัพธ์ที่เลวร้ายที่สุด"
 strange_worlds.105.a: "น่ากังวล"

 strange_worlds.110.name: "หนองน้ำกรด"
 strange_worlds.110.desc: "ในขณะที่กำลังสืบสวนตำแหน่งสุดท้ายของผู้สำรวจ [Owner.GetExplorer] ที่หายสาบสูญบนดาว §Y[Root.GetName]§! เราพบภูมิประเทศที่เป็นหนองน้ำกรดสูงที่ปล่อยไอหมอกของ §Yก๊าซแปลกประหลาด§! บริสุทธิ์ หนองน้ำเหล่านี้เป็นที่อยู่อาศัยของพืชสายพันธุ์พื้นเมืองที่แข็งแกร่งซึ่งสามารถรอดชีวิตจากสภาวะกรดรุนแรงได้\n\nในขณะที่ภูมิประเทศนี้เป็นอันตรายอย่างมาก ทว่าการศึกษาเพิ่มเติมเกี่ยวกับไอหมอกก๊าซนี้อาจเป็นประโยชน์ต่อทรัพยากรของอาณานิคม"
 strange_worlds.110.a: "ศึกษาไอหมอกนี้"

 strange_worlds.115.name: "บึงย่อยอาหาร"
 strange_worlds.115.desc: "ในขณะที่ศึกษาหนองน้ำกรดบนดาว §Y[Root.GetName]§! หนึ่งใน [Owner.GetScientistPlural] ของเราและอุปกรณ์สังเกตการณ์ถูกดึงรั้งโดยพืชพื้นเมืองก่อนจะถูกลากลงไปในบ่อกรดที่กัดกร่อนรุนแรง พวกเขาละลายหายไปในเกือบจะทันที เราเชื่อว่าชะตากรรมที่เศร้าสลดแบบเดียวกันได้เกิดขึ้นกับ [Owner.GetExplorer] ที่หายไปก่อนหน้านี้\n\nหลังจากนั้นไม่นาน พืชดังกล่าวมีลักษณะป่องขึ้นและมีปริมาณ §Yก๊าซแปลกประหลาด§! พุ่งสูง ดูเหมือนพืชกินเนื้อนี้จะใช้หนองน้ำกรดเป็นระบบย่อยอาหารภายนอก ดึงเหยื่อเข้ามาผ่านพืชยึดเกาะเพื่อทำการย่อยสลายและดูดซับสารอาหาร กระบวนการนี้ปล่อยก๊าซแปลกประหลาดออกมาในปริมาณเล็กน้อยที่สามารถเก็บเกี่ยวได้\n\nเราคาดการณ์ว่าชีววิทยาของสิ่งมีชีวิตนี้สามารถนำมาใช้ประโยชน์โดยการป้อนขยะของอาณานิคมเพื่อผลิตก๊าซเพิ่มเติม หรืออีกนัยหนึ่ง เราสามารถขจัดหนองน้ำกรดเหล่านี้เพื่อเอาพื้นที่ดินที่อุดมไปด้วยสารอาหารกลับมาทำการเกษตร"
 strange_worlds.115.a: "เพาะปลูกสิ่งมีชีวิตเหล่านี้"
 strange_worlds.115.b: "ปรับเปลี่ยนการใช้งานพื้นที่"

 strange_worlds.120.name: "พืชบึงกรดถูกขจัดแล้ว"
 strange_worlds.120.desc: "เราประสบความสำเร็จในการขจัดบึงกรดบนดาว §Y[Root.GetName]§! พร้อมกับฆ่าพืชสายพันธุ์ที่อาศัยอยู่ในนั้น ส่งผลให้ก๊าซแปลกประหลาดหายไปด้วย\n\nพื้นที่ที่กู้คืนมาได้นี้อุดมไปด้วยสารอาหารอย่างผิดปกติ เนื่องจากสารอาหารที่หลงเหลือจากกระบวนการกินอาหารของพืชพื้นเมือง เราได้สร้างพื้นที่การเกษตรที่มีคุณค่าเพิ่มเติม"
 strange_worlds.120.a_ct: "เพิ่ม §G2§! §Y$district_farming_plural$§! ไปยัง [This.GetName]"
 strange_worlds.120.b.evopred: "ยอดเยี่ยมมาก เก็บเกี่ยวซากที่หลงเหลืออยู่ด้วย"

 strange_worlds.130.name: "การปะทุของสสารมืด"
 strange_worlds.130.desc: "สิ่งที่เคยคิดว่าเป็นน้ำพุร้อนที่ดับสนิทไปนานบนดาว §Y[Root.GetName]§! ได้เกิดการปะทุอย่างรุนแรง พ่นก๊าซที่มีส่วนผสมของ §Yสสารมืด(ลองดีเจ)§! เข้าสู่ชั้นบรรยากาศ\n\nการปะทุนี้ส่งผลให้เกิดฝุ่นควันทั่วท้องฟ้า นำไปสู่ความผิดปกติของแรงโน้มถ่วงที่ขัดขวางการเดินทางและการสื่อสารนอกโลก\n\nเราเชื่อว่าสสารมืดมีต้นกำเนิดมาจากแกนกลางที่เป็นเอกลักษณ์ของดาวเคราะห์ เครื่องสูบวงโคจรได้รับการจัดวางเพื่อดึงไอหมอกออกจากชั้นบรรยากาศ เนื่องจากสภาวะที่รุนแรงนี้เป็นอันตรายแก่ [Owner.GetColonistPlural] ของเรา"
 strange_worlds.130.a: "เฝ้าติดตามเรื่องนี้อย่างใกล้ชิด"

 strange_worlds.135.name: "ความมืดในสภาวะเหลว"
 strange_worlds.135.desc_common_1: "เราประสบความสำเร็จในการสูบไอหมอกของ §Yสสารมืด§! ออกจากชั้นบรรยากาศของดาว §Y[Root.GetName]§! และกำลังเริ่มทำการประเมินความเสียหาย"
 strange_worlds.135.desc_common_2: "\nเมื่อติดต่อสื่อสารกับอาณานิคมได้อีกครั้ง เราพบว่าเหล่า [Owner.GetColonistPlural] กลายเป็นหินจากสิ่งที่ดูเหมือนจะเป็นสสารมืดที่แข็งตัว"
 strange_worlds.135.desc_organic_non_gestalt: "$strange_worlds.135.desc_common_2$ ตรวจพบสัญญาณชีวิตภายในร่างหินเหล่านี้ เราจึงแยกพวกเขาออกมาอย่างระมัดระวัง"
 strange_worlds.135.desc_machine: "$strange_worlds.135.desc_common_2$ ตรวจพบสัญญาณไฟฟ้าที่ทำงานอยู่ภายในร่างหิน เราจึงกะเทาะพวกเขาออกมา"
 strange_worlds.135.desc_gestalt: "$strange_worlds.135.desc_common_2$ รับรู้ถึงความพยายามที่จะรวมตัวกลับเข้าสู่กลุ่มความคิดร่วม เราจึงนำพวกเขาออกมาจากหลุมศพหิน"
 strange_worlds.135.desc_outro: "\nตรงกันข้ามกับความคาดหมายทั้งหมด เหล่า [Owner.GetColonistPlural] ดูเหมือนจะไม่ได้รับผลกระทบจากการสัมผัสสารเป็นเวลานานและการหยุดชะงัก\n\nน้ำพุร้อนที่เป็นสาเหตุของเหตุการณ์ดั้งเดิมได้พังทลายลงกลายเป็นทะเลสาบของสสารมืดเหลว\n\nนี่คือเหตุการณ์ที่ไม่เคยมีมาก่อนซึ่งต้องการการศึกษาอย่างเข้มข้น เหล่า [Owner.GetScientistPlural] ของเรายังคงไม่แน่ใจว่าจะมุ่งเน้นทรัพยากรที่จำกัดไปที่จุดใด"
 strange_worlds.135.a: "กักกันและศึกษาประชากร"
 strange_worlds.135.b: "ให้ความสำคัญกับการศึกษาสสารมืดก่อน"

 strange_worlds.140.name: "การปนเปื้อนสสารมืด"
 strange_worlds.140_intro: "เหล่า [Owner.GetScientistPlural] ของเรามั่นใจว่าทะเลสาบของ §Yสสารมืด§! บนดาว §Y[Root.GetName]§! ส่งผลอันตรายน้อยมากต่อดาวเคราะห์ แต่สิ่งที่กล่าวถึงอาการป่วยที่เกิดขึ้นกับประชากรนั้นกลับไม่เป็นเช่นเดียวกัน\n\nในขณะที่ศึกษากลุ่ม [Owner.GetColonistPlural] ที่ถูกกักกัน เราพบอาการเปลี่ยนแปลงทางร่างกายที่เกิดจากการที่พวกเขาติดอยู่ในสารดังกล่าว"
 strange_worlds.140_common: "\nการสัมผัสเป็นเวลานานส่งผลให้โมเลกุลในร่างกายของพวกเขาอิ่มตัวไปด้วยสสารมืด "
 strange_worlds.140_machine_1: "$strange_worlds.140_common$ทำให้ระบบของพวกเขาเสียหายโดยสมบูรณ์"
 strange_worlds.140_non_machine_1: "$strange_worlds.140_common$เกิดการปนเปื้อนในระบบหมุนเวียนเลือดของพวกเขา"
 strange_worlds.140_machine_2: "\nในขณะที่สิ่งเจือปนเหล่านี้มีความเสี่ยงต่อการเกิดความล้มเหลวของระบบก่อนเวลาอันควร ทว่าพวกมันจะช่วยให้หน่วยที่สร้างบนโลกนี้สามารถประมวลผลและเก็บเกี่ยวสสารมืดได้อย่างมีประสิทธิภาพหากรหัสนี้ถูกผนวกเข้าสู่กระบวนการสร้างประกอบ"
 strange_worlds.140_non_machine_2: "\nเราสามารถเพาะปลูกอาการผิดปกติเหล่านี้ ช่วยให้ร่างกายของ [Owner.GetColonistPlural] สามารถประมวลผลและหลั่งสสารมืดที่เก็บเกี่ยวได้ ทว่าต้องแลกด้วยการที่อายุขัยของพวกเขาจะสั้นลง"
 strange_worlds.140.a.dc_empire: "ยอมรับของขวัญชิ้นนี้"
 strange_worlds.140.a.machine_empire: "เพาะปลูกความผิดปกตินี้"
 strange_worlds.140.a.normal: "ประมวลผลสิ่งปนเปื้อน"
 strange_worlds.140.b: "ขจัดสิ่งปนเปื้อนออกไป"

 strange_worlds.145.name: "หลุมดำจิ๋ว"
 strange_worlds.145.desc: "การศึกษาเพิ่มเติมเกี่ยวกับทะเลสาบสสารมืดบนดาว §Y[Root.GetName]§! เผยให้เห็นข้อมูลสำคัญทางธรณีวิทยาที่อาจอธิบายสาเหตุของเหตุการณ์แรกเริ่ม\n\nแกนกลางของดาวเคราะห์เป็นที่อยู่อาศัยของหลุมดำจิ๋ว(ไมโครหลุมดํา)ที่มีความยาวน้อยกว่าหนึ่งเมตร มวลที่มากกว่าของดาวเคราะห์ช่วยหักล้างแรงดึงดูดของหลุมดำที่เราคาดว่าจะตรวจพบได้ ดูเหมือนความสัมพันธ์ระหว่างมวลเหล่านี้ได้บรรลุจุดสมดุลที่ละเอียดอ่อนซึ่งน่าจะยังคงอยู่ไปอีกนานพอสมควร\n\nกิจกรรมแผ่นดินไหวเมื่อไม่นานมานี้ส่งผลให้เกิดการเลื่อนตัวในชั้นเนื้อโลกชั้นใน เป็นสาเหตุให้น้ำพุร้อนปะทุในตอนแรก ทะเลสาบสสารมืดทำหน้าที่เหมือนปลั๊กอุดเพื่อรักษาเสถียรภาพแกนกลางของดาวเคราะห์และป้องกันการระเบิดเพิ่มเติม\n\nอย่างไรก็ตาม การอิ่มตัวในสสารมืดในระยะยาวไม่ได้ไร้อันตรายเหมือนที่คิดไว้ในตอนแรก\n\nหลุมดำจิ๋วที่ไม่เสถียรได้ก่อตัวขึ้นในศูนย์กลางมวลของ [Owner.GetColonistPlural] ส่งผลให้ร่างกายของพวกเขาเกิดการระเบิดยุบตัวอย่างรุนแรง สิ่งที่เหลืออยู่เป็นเพียงร่างหินไร้ชีวิตที่ทำจากผลึกสสารมืด เซ็นเซอร์ตรวจไม่พบสัญญาณกิจกรรมใดๆ ข้างใน\n\nยอดรวมสุดท้ายของเราชี้ว่าเราได้สูญเสียประชากรไปประมาณหนึ่งในสี่ของดาว §Y[Root.GetName]§! ในชั่วพริบตา รูปปั้นของสสารมืดที่แข็งทึบปรากฏขึ้นแทนที่ประชากรในท่าทางต่างๆ ทั่วทั้งดาวเคราะห์"
 strange_worlds.145.a.no_gestalt: "โชคร้ายยิ่งนัก"
 strange_worlds.145.a.gestalt: "น่าสยดสยอง"

 strange_worlds.155.name: "สัตว์รบกวนที่น่าชิงชัง"
 strange_worlds.155.desc_homicidal: "เราได้พบกับสัตว์สายพันธุ์พื้นเมืองที่น่ารังเกียจบนดาว §Y[Root.GetName]§!\n\nพวกมันได้วิวัฒนาการกลไกการป้องกันตัวเองซึ่งทำหน้าที่เป็นวิธีการหลักในการหาอาหารด้วย การขาดแคลนเอนไซม์ย่อยอาหารที่จำเป็นต่อการย่อยสลายอาหารแข็งด้วยตัวเอง พวกมันจะปล่อยก๊าซที่มีกลิ่นเหม็นรุนแรงและน่าเกลียดซึ่งกระตุ้นให้สิ่งมีชีวิตอื่นๆ ที่สูดดมเข้าไปเกิดอาการอาเจียนอย่างรุนแรง สารที่ถูกพ่นออกมาเหล่านั้นจะถูกบริโภคเป็นแหล่งสารอาหารหลักของพวกมัน\n\nการคัดสรรสิ่งมีชีวิตที่น่ารังเกียจเหล่านี้จะช่วยมอบก๊าซแปลกประหลาดและอาหารจำนวนมากให้แก่เรา"
 strange_worlds.155.desc_normal: "เหล่า [Owner.GetColonistPlural] บนดาว §Y[Root.GetName]§! ได้พบกับสัตว์สายพันธุ์พื้นเมืองที่มีวิธีการ... หาอาหารที่เฉพาะตัวอย่างยิ่ง\n\nแม้ว่าจะขี้อายในช่วงแรก แต่ในตอนนี้พวกมันเริ่มคุ้นเคยกับการมีอยู่ของเรา และด้วยธรรมชาติที่เป็นมิตรของพวกมัน ทำให้เริ่มเป็นที่นิยมในหมู่เยาวชน [Root.Owner.GetSpeciesNamePlural]\n\nแม้ว่าจะไม่มีอันตรายโดยตรง ทว่าพวกมันได้วิวัฒนาการกลไกการป้องกันตัวเองซึ่งทำหน้าที่เป็นวิธีการหลักในการหาอาหารด้วย การขาดแคลนเอนไซม์ย่อยอาหารที่จำเป็นต่อการย่อยอาหารแข็งด้วยตัวเอง พวกมันจะปล่อยก๊าซที่มีกลิ่นเหม็นรุนแรงซึ่งกระตุ้นให้สิ่งมีชีวิตอื่นๆ ที่สูดดมเข้าไปเกิดอาการอาเจียนอย่างรุนแรง สารที่ถูกพ่นออกมาเหล่านั้นจะถูกบริโภคเป็นแหล่งสารอาหารหลักของพวกมัน\n\nสถานการณ์โดยรวมมีความเสี่ยงต่อการแพร่กระจายโรคติดต่อ และผู้นำท้องถิ่นได้ทำการเตือนให้เหล่า [Owner.GetColonistPlural] หลีกเลี่ยงสิ่งมีชีวิตแปลกๆ เหล่านี้"
 strange_worlds.155.a: "ช่างเป็นชีววิทยาต่างดาวที่เฉพาะตัวอย่างยิ่ง"
 strange_worlds.155.b_purifiers: "สิ่งมีชีวิตที่น่ารังเกียจ"
 strange_worlds.155.b_swarm: "รสชาติที่ต้องลิ้มลอง!"
 strange_worlds.155.b_normal: "ยิงเป้าพวกมันเมื่อพบเห็น"

 strange_worlds.160.name: "ความคืบหน้าที่น่ารังเกียจ"
 strange_worlds.160.desc: "การกำจัดสิ่งมีชีวิตรบกวนบนดาว §Y[Root.GetName]§! กลับกลายเป็นเรื่องยาก เยาวชนของอาณานิคมยังคงเล่นกับสัตว์เหล่านี้แม้จะมีคำเตือนอย่างเป็นทางการ\n\nส่งผลให้โปรตีนในร่างกายของ [Root.Owner.GetSpeciesOrganName] ของเรากลายเป็นแหล่งอาหารโปรดของพวกมัน อาณานิคมของเรากลายเป็นเป้าหมายที่ง่ายกว่าสัตว์พื้นเมืองตัวอื่นที่รู้จักหลีกเลี่ยงก๊าซเหม็นของพวกมัน สัตว์เหล่านี้ได้ปรับตัวเพิ่มเติมต่อการมีอยู่ของเรา และมีรายงานการพบเห็นพวกมันใช้กลยุทธ์ซุ่มโจมตีต่อ [Owner.GetColonist] ที่เดินอยู่ตามลำพังหลังรับประทานอาหาร\n\nเป็นเรื่องที่ไม่น่าเชื่อว่ามีข้อดีในสถานการณ์นี้ นักวิทยาศาสตร์ของเราค้นพบว่าก๊าซเหม็นที่ปล่อยออกมาจากสิ่งมีชีวิตมีส่วนประกอบของ §Yก๊าซแปลกประหลาด(แก๊สไฟฟ้า)§! ที่มีมูลค่า ซึ่งสามารถเก็บเกี่ยวได้โดยการนำพวกมันมาเลี้ยงในสถานที่กักกัน\n\nทว่า ประชากรส่วนใหญ่เสนอว่าเราควรเพียงแค่กวาดล้างพวกมันทิ้งไป"
 strange_worlds.160.a: "ต้อนพวกมันเข้ามาเลี้ยง"
 strange_worlds.160.b: "พอได้แล้ว ยิงทิ้งเมื่อพบเห็น"

 strange_worlds.165.name: "อากาศบริสุทธิ์"
 strange_worlds.165.desc: "สิ่งมีชีวิตบนดาว §Y[Root.GetName]§! ไม่ได้ก่อความรำคาญใจเรื่องการอาเจียนหมู่อีกต่อไป\n\nด้วยการพัฒนาสารอาหารเทียมที่ตอบสนองต่อชีววิทยาของพวกมัน เราสามารถควบคุมรอบการกินอาหารของพวกมันและยุติการซุ่มโจมตีต่อ [Owner.GetColonistPlural] ของเราได้สำเร็จ\n\nเราได้ย้ายพวกมันไปยังพื้นที่อนุรักษ์สัตว์ป่าที่ออกแบบมาอย่างระมัดระวังซึ่งสาธารณชนสามารถเพลิดเพลินกับสัตว์เลี้ยงเหล่านี้ในสภาพแวดล้อมที่ปลอดภัย ผู้ฝึกสอนเฉพาะทางได้รับการฝึกฝนเพื่อสกัดก๊าซแปลกประหลาดออกมาโดยไม่ก่ออันตรายเพิ่มเติม"
 strange_worlds.165.a: "ความโล่งใจที่น่ายินดี"
 strange_worlds.165.a.evopred: "ตรวจสอบให้แน่ใจว่าเราไม่ได้วิวัฒนาการกลิ่นแบบนั้นขึ้นมา"

 strange_worlds.170.name: "ยิงเป้าเพื่อกำจัด"
 strange_worlds.170.desc: "ตั้งแต่ประกาศใช้นโยบายยิงเป้าเมื่อพบเห็นอย่างเป็นทางการ บัดนี้ผ่านมาหลายเดือนแล้วนับตั้งแต่สัตว์ก่อปัญหาตัวสุดท้ายถูกพบเห็นใกล้กับอาณานิคมบนดาว §Y[Root.GetName]§!\n\nในขณะที่ [Owner.GetColonistPlural] บางคนคิดถึงสัตว์หน้าขนเหล่านั้น ทว่าทุกคนมีความสุขดีขึ้นในภาพรวมเนื่องจากสามารถเดินทางได้อย่างอิสระโดยไม่ต้องกลัวว่าจะเกิดอาการอาเจียนอย่างรุนแรง\n\nนักวิทยาศาสตร์ของเราได้เก็บกู้ซากของสัตว์เหล่านี้ สกัดก๊าซแปลกประหลาดออกมาจากอวัยวะภายในของพวกมันโดยตรง"
 strange_worlds.170.a: "พวกเขาต้องการแบบนั้นเอง"

 strange_worlds.185.name: "ความเป็นปฏิปักษ์ระหว่างเขตพัฒนา"
 strange_worlds.185.desc: "รายงานจากดาว §Y[Root.GetName]§! แสดงให้เห็นถึงการเกิดความเป็นปฏิปักษ์ระหว่างประชากรในเขตชนบทและเขตเมือง ไม่มีสาเหตุที่แน่ชัดที่กระตุ้นความขัดแย้งนี้ นอกเหนือจากที่ตั้งทางภูมิศาสตร์ที่แตกต่างกัน\n\nผู้อพยพใหม่จะได้รับการปฏิบัติอย่างเป็นศัตรูในตอนแรก ทว่าภายในไม่กี่สัปดาห์ของการทำงานในเขตพัฒนาของตน พวกเขาก็ได้รับการยอมรับเข้าสู่กลุ่มอย่างรวดเร็ว จากพฤติกรรมนี้ นักวิทยาศาสตร์ของเราเชื่อมั่นว่าพฤติกรรมแปลกๆ นี้เกิดจากปัจจัยเฉพาะถิ่นในเขตพัฒนา\n\nในขณะที่เราทำการศึกษาวิจัยเรื่องนี้ เราจำเป็นต้องรักษาเสถียรภาพของสถานการณ์เพื่อป้องกันการขยายตัวของความขัดแย้ง เราสามารถเลือกที่จะสนับสนุนเขตชนบทหรือเขตเมืองอย่างเป็นทางการ หรือจัดวางกองกำลังรักษาสันติภาพเพิ่มเติมเพื่อรักษาความสงบ"
 strange_worlds.185.a: "สนับสนุนเขตเมือง"
 strange_worlds.185.b: "สนับสนุนเขตชนบท"
 strange_worlds.185.c: "จัดวางกองกำลังรักษาสันติภาพเพิ่มเติม"

 strange_worlds.190.name: "บางสิ่งในแหล่งน้ำ"
 strange_worlds.190.desc_intro: "หลังจากการวิจัยสภาพแวดล้อมอย่างกว้างขวางของดาว §Y[Root.GetName]§! นักวิทยาศาสตร์ของเราได้ระบุสาเหตุของความเป็นปฏิปักษ์ระหว่างเขตพัฒนา\n\nลึกลงไปใต้เปลือกโลกเป็นที่ตั้งของซากศพสิ่งมีชีวิตขนาดยักษ์ หลังจากการย่อยสลายนับพันปี น้ำไขสันหลังของสิ่งมีชีวิตดังกล่าวได้ไหลซึมเข้าสู่แหล่งน้ำใต้ดินของดาวเคราะห์ ปนเปื้อนด้วยแบคทีเรียพลังจิต แบคทีเรียจิตสำนึกนี้ได้เข้าสู่ระบบประสาทของ [Owner.GetColonistPlural] ของเรา และกระตุ้นสัญชาตญาณความรักถิ่นที่รุนแรงซึ่งน่าจะเป็นคุณสมบัติของสิ่งมีชีวิตดั้งเดิม\n\n"
 strange_worlds.190.desc_non_psionic: "เราน่าจะสามารถจัดการปัญหานี้ได้โดยการกรองแหล่งน้ำผ่านชุดเครื่องกรองน้ำเกรดสูงที่ออกแบบมาเป็นพิเศษ\n\n"
 strange_worlds.190.desc_psionic: "สิ่งเจือปนที่แปลกประหลาดนี้กำลังขัดขวางความสามารถทางพลังจิตตามธรรมชาติของเรา$strange_worlds.190.desc_non_psionic$"
 strange_worlds.190.desc_outro_non_psionic: "หรืออีกนัยหนึ่ง นักวิทยาศาสตร์ของเรามั่นใจว่าแบคทีเรียนี้สามารถดัดแปลงพันธุกรรมในระดับเซลล์ เพื่อเบี่ยงเบนสัญชาตญาณรักถิ่นไปในทางที่มีผลิตผลมากขึ้น"
 strange_worlds.190.a: "กรองแหล่งน้ำใต้ดิน"
 strange_worlds.190.b: "พยายามดัดแปลงพันธุกรรมแบคทีเรีย"

 strange_worlds.195.name: "ความสามารถใหม่ที่เกิดขึ้น"
 strange_worlds.195.desc_intro: "การจัดวางสถานีกรองน้ำบนดาว §Y[Root.GetName]§! ประสบความสำเร็จอย่างงดงาม\n\n"
 strange_worlds.195.desc_psionic: "ความก้าวร้าวจากการรักถิ่นอย่างรุนแรงได้ลดลง และไม่เพียงแต่ความก้าวร้าวจะสิ้นสุดลงเท่านั้น ทว่าพวกมันยังได้รับการเสริมความแข็งแกร่งด้วยโพรไบโอติกตามธรรมชาติที่กระตุ้น §Yการสื่อสารประสาทจิตสำนึก (Psionic Ephapse)§! ระหว่างประชากรบนดาว §Y[Root.GetName]§! สิ่งนี้ช่วยเสริมสร้างการเชื่อมต่อประสาทร่วมกันและสร้างความรู้สึกร่วมมือในชุมชนพร้อมกับยกระดับการผลิต"
 strange_worlds.195.desc_non_psionic: "ในขณะที่ความก้าวร้าวรักถิ่นได้ลดลง ประชากรกลับหลงเหลือผลกระทบที่มีประโยชน์ในรูปแบบของโพรไบโอติกตามธรรมชาติที่กระตุ้น §Yการสื่อสารประสาทจิตสำนึก (Psionic Ephapse)§! ระหว่างประชากรบนดาว §Y[Root.GetName]§! สิ่งนี้ช่วยให้ [Owner.GetColonistPlural] สามารถสื่อสารระหว่างกันในระดับโทรจิต สร้างความรู้สึกร่วมมือในชุมชนที่ดีขึ้นและยกระดับการผลิต"
 strange_worlds.195.a: "ยอดเยี่ยมมาก"
 strange_worlds.195.a_ct: "ประชากรทั้งหมดบนดาว §Y[Root.GetName]§! ได้รับ §Yการสื่อสารประสาทจิตสำนึก (Psionic Ephapse)§!"
 strange_worlds.195.a.evopred: "รสชาติมัน... §Mแปลกประหลาด§!"
 strange_worlds.195.a_ct.evopred: "สายพันธุ์หลักของเราได้รับ §Yการสื่อสารประสาทจิตสำนึก (Psionic Ephapse)§!"

 strange_worlds.200.name: "การจัดระเบียบแบคทีเรียใหม่"
 strange_worlds.200.desc: "เราประสบความสำเร็จในการขจัดผลกระทบทางลบของแบคทีเรียบนดาว §Y[Root.GetName]§! การต่อสู้กันระหว่าง [Owner.GetColonistPlural] ได้สงบลงและพวกเขากำลังแสดงผลผลิตการทำงานที่เพิ่มสูงขึ้น\n\nนักวิทยาศาสตร์ของเรามั่นใจว่าสามารถก้าวหน้าต่อไปในการแก้ไขรหัสพันธุกรรมของแบคทีเรีย ด้วยการจัดลำดับพันธุกรรมที่ถูกต้อง เราจะสามารถเสริมสร้างความก้าวหน้าหนึ่งในด้านการทำงานของ [Owner.GetColonistPlural] ของเราได้\n\nอย่างไรก็ตาม แบคทีเรียที่ได้จะไม่สามารถอยู่รอดได้นานเมื่อนำออกนอกโลก การเชื่อมต่อพลังจิตระหว่างไมโทคอนเดรียของมันและซากสิ่งมีชีวิตต่างดาวต้องดำรงอยู่เพื่อให้แบคทีเรียสามารถขยายพันธุ์ได้ เรายังไม่เข้าใจสาเหตุเบื้องหลังอย่างถ่องแท้"
 strange_worlds.200.a: "ยกระดับความสามารถในการสืบพันธุ์"
 strange_worlds.200.b: "ยกระดับพละกำลังทางร่างกาย"
 strange_worlds.200.c: "ยกระดับความสามารถในการรับรู้และสมอง"

 strange_worlds.1000.name: "ท่อลาวาที่เต็มไปด้วยแร่ธาตุ"
 strange_worlds.1000.desc: "การทำให้อากาศบนดาว §Y[From.GetName]§! แห้งแล้งลงช่วยเปิดเผยเครือข่ายท่อลาวาขนาดใหญ่ใต้ก้นทะเลที่เพิ่งเปิดใหม่ของดาวเคราะห์\n\nกระแสลาวาที่สร้างอุโมงค์ลึกเหล่านี้ได้ดับสนิทลงแล้ว ทิ้งไว้เพียงสายแร่ที่อุดมไปด้วยแร่ธาตุที่ก่อตัวขึ้นนานมาแล้วภายใต้ความร้อนและความกดดันรุนแรงของแกนกลางที่หลอมละลายของดาว §Y[From.GetName]§!\n\nแหล่งสะสมแร่เหล่านี้น่าจะมีความหนาแน่นสูงมาก ปฏิบัติการขุดเจาะที่นี่อาจมีราคาแพงแต่จะสร้างกำไรได้มหาศาล"

 strange_worlds.1005.name: "ไข่ตอบสนองต่อน้ำ"
 strange_worlds.1005.desc: "การปรับปรุงสภาพดาวเคราะห์ของ §Y[From.GetName]§! ส่งผลลัพธ์ให้เกิดการเพิ่มขึ้นของประชากรสัตว์พื้นเมืองอย่างไม่คาดคิด\n\nเราค้นพบว่ารอบการขยายพันธุ์ของสายพันธุ์ท้องถิ่นเชื่อมโยงกับปริมาณน้ำที่มีอยู่ในสิ่งแวดล้อม ไข่ของพวกมันซึ่งก่อนหน้านี้เคยฝังอยู่ในดินนานหลายเดือนเพื่อรอการดูดซับน้ำให้เพียงพอสำหรับการฟักตัว บัดนี้กระจายอยู่ทั่วไปในพื้นที่ ปริมาณประชากรสัตว์ของดาวเคราะห์กำลังพุ่งสูงขึ้นอย่างรวดเร็ว\n\nสัตว์เหล่านี้หลายชนิดมีคุณค่าทางสารอาหารสูง พวกมันจะช่วยมอบแหล่งอาหารที่อุดมสมบูรณ์สำหรับดาว §Y[From.GetName]§! พร้อมกับโอกาสในการศึกษาระบบนิเวศที่ตื่นตัวอย่างยิ่ง ผู้มาเยือนดาวเคราะห์ดวงนี้จะต้องเข้ารับการตรวจสอบความปลอดภัยอย่างเข้มงวดก่อนออกเดินทางเพื่อป้องกันการปนเปื้อนนอกโลก"
 strange_worlds.1005.evopred: "ความเร็วเช่นนี้จะสามารถลอกเลียนแบบได้หรือไม่?"

 strange_worlds.1010.name: "ถูกแช่แข็งในน้ำแข็ง"
 strange_worlds.1010.intro: "ความพยายามในการปรับสภาพดาวเคราะห์ของ §Y[From.GetName]§! เปิดเผยให้เห็นสัตว์พื้นเมืองจำนวนมากที่ถูกฝังอยู่ใต้น้ำแข็งที่พื้นผิว สิ่งที่น่าประหลาดใจยิ่งกว่าคือสิ่งมีชีวิตเหล่านี้ยังคงมีชีวิตอยู่\n\nสายพันธุ์ดังกล่าวดูเหมือนจะอยู่ในช่วงการจำศีลที่ลึกซึ้งเป็นพิเศษ วิธีการที่มีประสิทธิภาพในการอยู่รอดจากยุคน้ำแข็งที่ยาวนานของดาว §Y[From.GetName]§! การละลายของน้ำแข็งที่เกิดจากกระบวนการปรับสภาพดาวเคราะห์ได้ดึงพวกเขาออกจากการจำศีลก่อนเวลาอันควร\n\nตื่นขึ้นมาจากการหลับใหลใต้น้ำแข็ง สิ่งมีชีวิตเหล่านี้กำลังแสดงให้เห็นถึงสัญญาณของสติปัญญาเบื้องต้น โดยการใช้เครื่องมือง่ายๆ ในความพยายามหาอาหารของพวกมัน\n\n"
 strange_worlds.1010.desc_exterminate: "$strange_worlds.1010.intro$พวกมันจะถูกกวาดล้างโดยไม่มีการรอช้า เราจะเก็บเกี่ยวสารชีวมวลที่ได้เพื่อวัตถุประสงค์ของเราเอง"
 strange_worlds.1010.desc_hunted: "$strange_worlds.1010.intro$คุณสมบัติทางสรีระที่เป็นเอกลักษณ์จะช่วยมอบแหล่งอาหารที่อุดมสมบูรณ์ให้แก่เรา"
 strange_worlds.1010.desc_tolerated: "$strange_worlds.1010.intro$เราสามารถเลือกที่จะศึกษาความสามารถในการจำศีลที่ยอดเยี่ยมของพวกมัน หรือเก็บเกี่ยวสิ่งมีชีวิตเหล่านี้เพื่อเอาสารชีวมวล"
 strange_worlds.1010.desc_protected: "$strange_worlds.1010.intro$เราควรปกป้องสิ่งมีชีวิตเหล่านี้ ความสามารถในการจำศีลที่ยอดเยี่ยมของพวกมันควรค่าแก่การวิจัยเพิ่มเติม"
 strange_worlds.1010.a.purge: "กวาดล้างพวกมัน"
 strange_worlds.1010.b.hunted: "ล่าพวกมัน"
 strange_worlds.1010.c.study: "ศึกษาพวกมัน"
 strange_worlds.1010.d.purge: "กวาดล้างพวกมัน"
 strange_worlds.1010.e.protect: "ปกป้องพวกมัน"

 strange_worlds.1015.name: "ขุนเขาเหล็กกล้า"
 strange_worlds.1015.desc: "ปัญหาที่กำลังจะเกิดขึ้นบนดาว §Y[From.GetName]§! ได้รับการแจ้งเตือนโดยผู้เชี่ยวชาญการปรับสภาพดาวเคราะห์ของเรา\n\nใต้แนวเทือกเขาที่แช่แข็งเป็นที่ตั้งของแหล่งสะสมแร่เหล็กและคาร์บอนหนาแน่น ซึ่งทั้งหมดได้รับความร้อนจัดจากกระบวนการปรับสภาพดาวเคราะห์\n\nเราสามารถกู้คืนทรัพยากรเหล่านั้นได้อย่างปลอดภัยในตอนนี้ หรือโดยการปล่อยให้ความร้อนดำเนินต่อไป เราจะสามารถสร้างแหล่งผลิตโลหะผสมได้อย่างต่อเนื่อง แน่นอนว่าสิ่งนี้จะต้องแลกด้วยพื้นที่สำหรับการอยู่อาศัย"
 strange_worlds.1015.a: "ให้ความสำคัญกับทรัพยากรเหล่านั้นก่อน"
 strange_worlds.1015.b: "ไม่ต้องดำเนินการใดๆ"

 strange_worlds.1020.name: "ชั้นบรรยากาศไวไฟ"
 strange_worlds.1020.desc: "การปรับสภาพดาวเคราะห์บนดาว §Y[From.GetName]§! ส่งผลลัพธ์ที่คาดไม่ถึง ดินชั้นบนของดาวเคราะห์ประกอบไปด้วยฝุ่นผงละเอียดที่มีส่วนผสมเข้มข้นของ §Yผลึกไวไฟ(Volotile Motes)§! ซึ่งกระบวนการปรับสภาพดาวเคราะห์ของเราได้ไปรบกวนและทำให้พวกมันแพร่กระจายไปทั่วชั้นบรรยากาศ\n\nโชคร้ายที่ผลึกที่ลอยอยู่ในอากาศเพิ่มความเสี่ยงต่อการเกิดอัคคีภัยและการระเบิดบนพื้นผิวโลก อาณานิคมในอนาคตจะต้องให้ความสำคัญกับการป้องกันอุบัติเหตุเพื่อหลีกเลี่ยงหายนะ\n\nอย่างไรก็ตาม หากเราสามารถจัดการความเสี่ยงได้อย่างระมัดระวัง บรรยากาศของดาว §Y[From.GetName]§! จะกลายเป็นแหล่งข้อมูลที่อุดมสมบูรณ์สำหรับแร่ธาตุหายากเหล่านี้"

 strange_worlds.1025.name: "ลาวาสีน้ำเงิน"
 strange_worlds.1025.desc: "เปลือกโลกของดาว §Y[From.GetName]§! ได้เกิดการเลื่อนตัวจากการปรับสภาพดาวเคราะห์ นำไปสู่ปรากฏการณ์ทางธรรมชาติที่ผิดปกติ\n\nการเลื่อนตัวของแผ่นเปลือกโลกทำให้เกิดการปลดปล่อยช่องว่างของ §Yก๊าซแปลกประหลาด(แก๊สไฟฟ้า)§! ซึ่งได้ทำปฏิกิริยากับแหล่งแร่โลหะผสมที่พบในภูเขาไฟของดาวเคราะห์ ส่งผลให้การปะทุของภูเขาไฟเกิดเป็นสีน้ำเงินที่ตระการตา\n\nธรรมชาติที่ผันผวนของปรากฏการณ์นี้ทำให้ดาวเคราะห์มีความเป็นมิตรต่อการอยู่อาศัยลดลงเล็กน้อย ส่งผลกระทบต่อแผนการของเราที่จะสร้างพื้นที่อยู่อาศัยให้แก่ [Root.GetColonistPlural] ของเรา\n\nแต่ข้อดีคือ ดินรอบภูเขาไฟเหล่านี้อุดมไปด้วยแร่ธาตุให้เรานำมาใช้ประโยชน์"

 strange_worlds.1030.name: "พายุสายฟ้าถาวร"
 strange_worlds.1030.desc: "เราได้รับรายงานเกี่ยวกับสภาพอากาศที่ผิดปกติบนดาว §Y[From.GetName]§!\n\nแหล่งผลึกแก้วใต้ชั้นหินของดาวเคราะห์ได้รับการเปิดเผยในระหว่างการปรับสภาพดาวเคราะห์ เกิดปฏิกิริยากับสารเคมีที่ใช้ในกระบวนการและเกิดการแผ่รังสี ความผันผวนของอุณหภูมิอากาศส่งผลให้เกิดพายุสายฟ้าถาวรทั่วทั้งดวงดาว\n\nสภาพอากาศเฉพาะตัวนี้ส่งผลกระทบต่อการพัฒนาโครงสร้างพื้นฐานอย่างหลีกเลี่ยงไม่ได้ และผลึกที่มีรังสีจะส่งผลเสียต่อการอยู่อาศัยในระยะยาว อย่างไรก็ตาม [Owner.GetScientistPlural] ของเรามั่นใจว่าพวกเขาสามารถควบคุมพลังงานจากพายุได้เมื่อการปรับสภาพดาวเคราะห์เสร็จสิ้น\n\nอีกนัยหนึ่ง [Owner.GetEngineerPlural] ของเราได้จัดทำแผนการที่จะสลายประจุไฟฟ้าในผลึกแก้วได้อย่างปลอดภัย สิ่งนี้น่าจะทำให้พายุสลายตัวไปและช่วยให้เราเก็บเกี่ยวพวกมันเพื่อวัตถุประสงค์อื่นได้อย่างปลอดภัย"
 strange_worlds.1030.a: "ใช้ประโยชน์จากพลังงานในพายุเหล่านี้"
 strange_worlds.1030.b: "สลายประจุในผลึกแก้ว"

 strange_worlds.1035.name: "กลุ่มผู้จำศีล"
 strange_worlds.1035.desc: "การศึกษาเกี่ยวกับประชากรก่อนมีสติปัญญาบนดาว §Y[event_target:hibernator_planet.GetName]§! ช่วยให้เข้าใจถึงความสามารถในการจำศีลที่ยอดเยี่ยมของพวกมัน พวกมันถูกควบคุมโดยเอนไซม์เฉพาะตัวซึ่งกระตุ้นการเข้าและออกจากสภาวะนอนหลับลึก ในสภาวะนี้ ปฏิกิริยาเคมีในร่างกายของพวกมันจะลดลงจนเหลือน้อยที่สุด\n\nเราสกัดเอนไซม์นี้และประสบความสำเร็จในการนำไปใช้ - ผ่านยากล่อมประสาท - กับสิ่งมีชีวิตอื่นๆ หลายชนิด ในทุกกรณี สายพันธุ์ที่ไม่เคยมีความสามารถในการจำศีลมาก่อนก็สามารถเข้าสู่การนอนหลับยาวซึ่งช่วยลดความเสื่อมของเซลล์ตลอดระยะเวลาจำศีล\n\nการค้นพบครั้งสำคัญนี้ช่วยเปิดทางสู่การจำศีลประดิษฐ์ที่จะช่วยลดความเครียดทางร่างกายในการเดินทางในอวกาศระยะไกลสำหรับสายพันธุ์สิ่งมีชีวิต"

 strange_worlds.1040.name: "พิธีศพกลางท้องฟ้า"
 strange_worlds.1040.desc: "เมื่อเราเสร็จสิ้นการปรับสภาพดาวเคราะห์บนดาว §Y[From.GetName]§! ซากศพก็เริ่มร่วงหล่นลงมาจากท้องฟ้า\n\nจากความสูงระดับนั้น ซากศพโบราณแหลกเหลวเป็นชิ้นๆ เมื่อกระทบพื้นดิน ในหมู่ชิ้นส่วนเหล่านั้นเราได้ค้นพบกลุ่มของวัตถุขนาดเล็ก - เครื่องประดับและโบราณวัตถุแปลกๆ - ทั้งหมดตกลงมาจากกลุ่มเมฆหนาในชั้นบรรยากาศชั้นบนของดาวเคราะห์\n\nกลุ่มเมฆหนาเหล่านี้ ซึ่งเราเดาได้เพียงว่าถูกนำมาใช้เป็นสถานที่ฝังศพขั้นสุดท้ายโดยเผ่าพันธุ์ต่างดาวที่ไม่รู้จัก บัดนี้เริ่มเจือจางลงเนื่องจากกระบวนการปรับสภาพดาวเคราะห์ และปล่อยสิ่งที่ลอยอยู่ข้างในออกมาร่วงหล่นลงมา เราสามารถคาดหวังได้ว่าซากศพเหล่านี้จะยังคงร่วงหล่นอย่างต่อเนื่องจนกว่าเมฆสุสานจะว่างเปล่าทั้งหมด"
 strange_worlds.1040.a: "น่าสยดสยอง แต่มีคุณค่าทางการค้า"
 strange_worlds.1040.b: "ไม่ถูกสุขอนามัย ขจัดพวกมันออกไปทันที"

 strange_worlds.1050.name: "ขยะอวกาศในวงโคจร"
 strange_worlds.1050.desc: "วิศวกรปรับสภาพดาวเคราะห์ของเราบนดาว §Y[event_target:junk_moon_planet.GetName]§! กำลังเผชิญกับสภาพการทำงานที่เป็นอันตรายเนื่องจากขยะอวกาศและเศษชิ้นส่วนต่างๆ ที่โคจรรอบดาวเคราะห์ ปริมาณที่สูงของวัตถุเหล่านี้สร้างอันตรายต่อการนำทางของกระสวยที่เดินทางระหว่างพื้นผิวและวงโคจร\n\nเมื่อพิจารณาจากความหนาแน่นของวัสดุ เราได้จัดทำข้อเสนอที่จะสร้างแรงแม่เหล็กให้กับเศษชิ้นส่วนที่ใหญ่ที่สุดเพื่อดึงดูดชิ้นส่วนอื่นๆ ในขณะที่โคจร ค่อยๆ รวมทุกอย่างเข้าเป็นดวงดาวเดียวกัน เราคาดการณ์ว่าจะสามารถสร้างดวงจันทร์เทียมขึ้นมาได้สำเร็จ\n\nในขณะที่สิ่งนี้จะเพิ่มระยะเวลาในการปรับสภาพดาวเคราะห์ ทว่ามันจะช่วยอำนวยความสะดวกในการเดินทางของกระสวยและขจัดความเสี่ยงต่อเศษชิ้นส่วนวงโคจรที่อาจตกลงสู่ชั้นบรรยากาศเป็นระยะ"
 strange_worlds.1050.a: "สร้างดวงจันทร์ขึ้นมาให้เรา"
 strange_worlds.1050.b: "ปล่อยให้พวกมันมอดไหม้ไปเอง"

 strange_worlds.1060.name: "ดวงจันทร์ขยะ"
 strange_worlds.1060.desc: "ความพยายามในการรวมเศษขยะอวกาศที่โคจรรอบดาว §Y[event_target:junk_moon_planet.GetName]§! ประสบความสำเร็จอย่างดี\n\nโดยการสร้างแรงแม่เหล็กให้กับเศษขยะขนาดใหญ่หลายชิ้น เราสามารถรวบรวมทุกสิ่งเข้าเป็นวัตถุขนาดมหึมาเพียงก้อนเดียว ความหนาแน่นของมันสูงขึ้นจนสามารถสร้างแรงดึงดูดของมันเองได้ ดวงจันทร์ที่สร้างใหม่นี้ได้เข้าสู่วงโคจรที่เสถียรเรียบร้อย\n\nการเดินทางสู่พื้นผิวของ [event_target:junk_moon_planet.GetName] สะดวกขึ้นมากโดยไม่มีเศษขยะอวกาศที่เป็นอันตราย และเราไม่ต้องกังวลเกี่ยวกับการตกลงสู่ชั้นบรรยากาศอีกต่อไป ยิ่งไปกว่านั้น วิศวกรของเรามั่นใจว่าดวงจันทร์ใหม่นี้สามารถรองรับสถานีขุดเจาะเหมืองของมันเองได้"
 strange_worlds.1060.create_moon_ct: "[event_target:junk_moon_planet.GetName] ได้รับดวงจันทร์ใหม่: ดวงจันทร์ขยะ"

 site_abandoned_bio_lab: "สิ่งอำนวยความสะดวกโบราณ"
 abandoned_bio_lab_desc: "การสแกนดาว §Y[fromfrom.planet.GetName]§! ค้นพบห้องปฏิบัติการที่แยกตัวอยู่ในภูมิภาคที่เข้าถึงยากที่สุดของดาวเคราะห์ โครงสร้างดูเหมือนจะดับสนิทหรือถูกละทิ้ง ไม่มีสัญญาณพลังงานและมีร่องรอยการสึกกร่อนมายาวนาน การเดินทางสำรวจทางโบราณคดีอาจช่วยมอบข้อมูลเพิ่มเติม"

 strange_worlds.2000.name: "ห้องปฏิบัติการชีวภาพร้าง"
 strange_worlds.2000.desc: "ภายในอาคารประกอบไปด้วยอุปกรณ์การแพทย์ร้าง ตู้อบรักษา และห้องเก็บศพ ในตู้เก็บศพเราพบชิ้นส่วนซากสิ่งมีชีวิตที่ยังคงหลงเหลืออยู่ซึ่งแสดงสัญญาณของโรคภัยไข้เจ็บและความผิดรูป การมีอยู่ของประตูรักษาความปลอดภัย อุปกรณ์สอดแนม และกรงขัง นำพาให้ §H[universal_macrophage_scientist.GetName]§! ได้ข้อสรุปว่ามีผู้ถูกคุมขังอยู่ที่นี่โดยขัดต่อความเจาะจงของพวกเขา\n\nเรากู้คืนชิ้นส่วนอุปกรณ์ได้บางส่วน ทว่าส่วนใหญ่ได้เสื่อมสภาพไปมาก ข้อมูลส่วนน้อยยังคงอยู่ในระบบคอมพิวเตอร์ เรากู้คืนไฟล์ได้บางส่วนแต่ต้องการการแปลภาษา"

 strange_worlds.2005.name: "การวิจัยภูมิคุ้มกันวิทยาโบราณ"
 strange_worlds.2005.desc: "§H[universal_macrophage_scientist.GetName]§! ได้แปลเอกสารข้อมูลบางส่วนที่กู้คืนได้จากสิ่งอำนวยความสะดวกบน §Y[fromfrom.planet.GetName]§!\n\n§Lห้องปฏิบัติการ 17 - อัปเดตความคืบหน้า - หัวหน้าฝ่ายวิจัยเก เลอ ร์\n\nต้นแบบใหม่แสดงให้เห็นถึงสัญญาณที่ดีในตอนแรก ระบบภูมิคุ้มกันของเป้าหมายเพิ่มขึ้นล้านเท่าและเชื้อโรคทั้งหมดถูกกำจัดออกไป ทว่าผลข้างเคียงยังคงอยู่: เกิดการกลายพันธุ์ที่เป็นอันตรายถึงชีวิตตามมา ไม่มีผู้รอดชีวิต จะพยายามอีกครั้ง ยูนิเวอร์ซัล มาโครฟาจ(Universal Macrophage)อยู่ในเอื้อมมือของเราแล้ว ข้ามั่นใจ§!"

 strange_worlds.2010.name: "ทางเลือกของเก เลอ ร์"
 strange_worlds.2010.desc: "§H[universal_macrophage_scientist.GetName]§! แปลไฟล์อื่นจากห้องปฏิบัติการที่ถูกทิ้งร้างบน §Y[fromfrom.planet.GetName]§!\n\n§Lห้องปฏิบัติการ 17 - บันทึกภายในของเจ้าหน้าที่ - หัวหน้าฝ่ายวิจัยเก เลอ ร์\n\nเพื่อนร่วมงานทั้งหลาย คำสั่งยุติโครงการมาถึงแล้วในวันนี้ ความอดทนของลอร์ดผู้ปกครองได้สิ้นสุดลงแล้ว แต่พวกเราเกือบจะบรรลุเป้าหมายแล้ว! ยูนิเวอร์ซัล มาโครฟาจมีความสำคัญมากกว่าความต้องการของบุคคลใดบุคคลหนึ่ง อนาคตที่ปราศจากโรคภัยไข้เจ็บสามารถเป็นของเราได้! ชีวิตไม่กี่ชีวิตที่เป็นค่าใช้จ่ายเล็กน้อยเพื่อความก้าวหน้าเช่นนี้คืออะไรกัน?\n\nหากพวกเขาไม่ส่งผู้ทดสอบเพิ่ม - ข้าจะทดสอบต้นแบบล่าสุดกับตัวข้าเอง พวกเจ้าจะเข้าร่วมกับข้าไหม?§!"
 strange_worlds.2010.a: "ดำเนินการต่อด้วยความระมัดระวัง"

 strange_worlds.2015.name: "ยูนิเวอร์ซัล มาโครฟาจ"
 strange_worlds.2015.desc: "§H[universal_macrophage_scientist.GetName]§! แปลบันทึกสุดท้ายจากคอมพิวเตอร์ของห้องปฏิบัติการชีวภาพบน §Y[fromfrom.planet.GetName]§!\n\n§Lห้องปฏิบัติการ 17 - รายงานสุดท้าย - ผู้ช่วยวิจัยตัวปลอม\n\nความมั่นใจของเก เลอ ร์นั้นสูงมากจนเราปฏิบัติตามเขาอย่างมืดบอด\n\nเมื่อทดสอบต้นแบบกับตัวเราเอง ระบบภูมิคุ้มกันของเราได้รับการเสริมความแข็งแกร่งในตอนแรก พวกเราแทบจะอยู่ยงคงกระพันต่อเชื้อโรคภายนอก จากนั้นการกลายพันธุ์ก็เริ่มต้นขึ้น\n\nเก เลอ ร์เสียชีวิตก่อน มันเป็นเรื่องยากที่จะเฝ้ามอง ตอนนี้คนในทีมทั้งหมดกำลังพักอยู่ในห้องเก็บศพ และข้าจะตามพวกเขาไปในไม่ช้า\n\nพวกเราล้มเหลว พวกเราฝากชีวิตไว้กับสูตรที่มีข้อบกพร่องของเก เลอ ร์ยูนิเวอร์ซัล มาโครฟาจทำงานดีเกินไป - ในที่สุดมันก็หันมาโจมตีตัวโฮสต์เอง ทุกสิ่งทุกอย่างที่นี่ต้องถูกทำลาย§!"
 strange_worlds.2015.a: "ทำลายทุกสิ่งทุกอย่าง"
 strange_worlds.2015.b: "ทำงานของเก เลอ ร์ให้เสร็จสิ้น มันมีแนวโน้มที่ดี"
 strange_worlds.2015.b.mutation: "พวกเราคือเจ้าแห่งการกลายพันธุ์ มาทำงานนี้ให้เสร็จสิ้นกันเถอะ"
 has_tr_mutation_finish_tt: "ตัวเลือกนี้สามารถใช้งานได้เนื่องจากเราเสร็จสิ้นการศึกษาหมวดจารีตประเพณี §Yการกลายพันธุ์(พึมพํา)§! แล้ว"
 strange_worlds.2015.c: "งานวิจัยที่มีข้อบกพร่องนี้สามารถนำไปใช้งานได้"

 strange_worlds.2030.name: "การกลายพันธุ์ที่ถึงแก่ชีวิต"
 strange_worlds.2030.desc: "พลเมืองบนดาว §Y[Root.GetName]§! กำลังประสบกับการกลายพันธุ์ทางร่างกายอย่างรุนแรงซึ่งรบกวนการทำงานของเซลล์และอวัยวะสำคัญ แม้ว่าในบางกรณีการเปลี่ยนแปลงเหล่านี้จะช่วยเพิ่มประสิทธิภาพในการเผาผลาญ แต่โดยทั่วไปแล้วพวกมันกลับก่อให้เกิดการเสียชีวิต\n\nผลข้างเคียงเหล่านี้ตรงกับสิ่งที่อธิบายไว้ในบันทึกการวิจัยดั้งเดิมของ §Yยูนิเวอร์ซัล มาโครฟาจ§! อย่างสมบูรณ์แบบ แม้ความพยายามของเรา ดูเหมือนว่าการกลายพันธุ์ที่ถึงแก่ชีวิตจากสูตรนี้เป็นสิ่งที่หลีกเลี่ยงไม่ได้ เทคโนโลยีนี้ไม่สามารถเชื่อถือได้อีกต่อไป เรากำลังทำลายเสบียงที่เหลืออยู่ของสูตรนี้และจะยุติการใช้งาน"
 strange_worlds.2030.ct: "§Y[Root.GetName]§! สูญเสียประชากร 100 £pop£ และประชากรเพิ่มเติมอีก 100 £pop£ ต่อประชากรทุกๆ $@macrophage_kill_pop_every_x$ £pop£ ที่มีอยู่\nประชากรสิ่งมีชีวิตทั้งหมดบนดาว §Y[Root.GetName]§! ได้รับ §Yการกลายพันธุ์แบบเจลีบอริก(Geleboric mutation)§! และเปลี่ยนสรีระทางร่างกายไปอย่างสิ้นเชิง"

 site_anomalous_cube: "ลูกบาศก์ที่ผิดปกติ"
 anomalous_cube_desc: "พบลูปบาศก์โลหะขนาดมหึมาบนดาว §Y[Planet.GetName]§! รูปทรงที่ไร้รอยต่อชี้ให้เห็นถึงความสามารถทางเทคโนโลยีที่ก้าวหน้า แม้ว่าเราจะไม่อาจคาดเดาเกี่ยวกับต้นกำเนิดหรือหน้าที่ของมันได้ในตอนนี้ การเดินทางสำรวจทางโบราณคดีอาจให้คำตอบได้"

 strange_worlds.2035.name: "โลหะกระเพื่อม"
 strange_worlds.2035.desc_intro: "การตรวจสอบลูกบาศก์ลึกลับขนาดยักษ์บนดาว [fromfrom.planet.GetName] อย่างใกล้ชิดทำให้เกิดคำถามมากกว่าคำตอบ พื้นผิวด้านนอกของมันเรียบเนียน ไร้รอยต่อ และเซ็นเซอร์ของเราไม่ออกสามารถเจาะผ่านได้ เมื่อเราเข้าใกล้ลูกบาศก์ รูปลักษณ์ที่น่าเกรงขามดูเหมือนจะกระเพื่อมเบาๆ เพื่อตอบสนองต่อการมีอยู่ของเรา"
 strange_worlds.2035.desc_lm: "$strange_worlds.2035.desc_intro$ §H[event_target:anomalous_cube_scientist.GetName]§! ได้ข้อสรุปว่ามันถูกสร้างขึ้นจาก §Yโลหะมีชีวิต(เสียงโลหะ)§! รูปแบบหนึ่ง"
 strange_worlds.2035.desc_no_lm: "$strange_worlds.2035.desc_intro$ §H[event_target:anomalous_cube_scientist.GetName]§! ได้ข้อสรุปว่ามันถูกสร้างขึ้นจากโลหะประหลาดที่ไม่เหมือนกับโลหะใดๆ ที่เราเคยเห็นมาก่อน"
 strange_worlds.2035.a: "ดำเนินการสืบสวนต่อไป"

 strange_worlds.2040.name: "เข้าไปในลูกบาศก์"
 strange_worlds.2040.desc: "ในขณะที่ §H[event_target:anomalous_cube_scientist.GetName]§! กำลังตรวจสอบลูกบาศก์โลหะบนดาว [fromfrom.planet.GetName] พื้นผิวหนึ่งของมันได้กระเพื่อมและแยกออกอย่างไม่คาดคิดเพื่อสร้างช่องทางเข้าไปยังภายในวัตถุ เมื่อเข้าไปข้างใน เราพบคอนโซลควบคุมที่ยังมีซากศพแห้งของมอลลัสคอยด์(เสียงม้า)ชิ้นส่วนเนื้อหนังที่มันเคยมีได้สลายกลายเป็นฝุ่นผงสีซีด\n\nบนคอนโซล เราพบตู้คอนเทนเนอร์ที่ผิดปกติซึ่งได้ยินเสียงเคาะดังปึกแผ่นเป็นระยะๆ ราวกับว่ามีบางสิ่งเคลื่อนไหวอยู่ข้างใน อย่างไรก็ตาม ซีลของตู้คอนเทนเนอร์มีความซับซ้อน และ §H[event_target:anomalous_cube_scientist.GetName]§! ยังไม่สามารถเปิดมันได้จนถึงขณะนี้"
 strange_worlds.2040.evopred: "แน่นอนว่าเรายังสามารถกู้คืนฝุ่นผงเหล่านั้นได้"

 strange_worlds.2045.name: "พบบันทึกเสียง"
 strange_worlds.2045.desc: "ในขณะที่สกัดข้อมูลจากคอนโซลกลางของลูกบาศก์ §H[event_target:anomalous_cube_scientist.GetName]§! สามารถกู้คืนและถอดรหัสบันทึกเสียงสั้นๆ สองไฟล์ได้ พวกมันมีเสียงคลิกในลำคอที่หยาบและเสียงหยุดในคอหอยที่ออกเสียงโดยผู้พูดคนเดียว การเทียบข้อมูลภาษากับฐานข้อมูลภาษาโบราณ §H[event_target:anomalous_cube_scientist.GetName]§! พบภาษาโบราณที่เทียบเคียงได้และได้จัดทำบทแปลเบื้องต้นของบันทึกเสียงแรกสำเร็จ:\n\n§L'สภาบริหารของข้า ท่านต้องฟังข้า ยังพอมีเวลาที่จะหลีกเลี่ยงสงครามครั้งนี้ ความมั่นใจของเหล่าผู้นำนั้นไม่ฉลาดเลย เราไม่สามารถเอาชนะ [event_target:anomalous_cube_fallen_empire.GetName] ได้ พวกเขาจะทำลายเรา!'\n\n'การยินยอมยอมความคือทางเลือกเดียวของเรา ลังของข้ามีของขวัญอยู่ ซึ่งน่าจะเป็นเครื่องหมายแห่งสันติภาพ: ความลับของการเรียนรู้เรื่องโลหะมีชีวิต ทางเดียวที่จะหลีกเลี่ยงความดับสูญคือการส่งมอบมันให้แก่พวกเขา'§!"
 strange_worlds.2045.a: "แปลบันทึกเสียงที่สอง"

 strange_worlds.2050.name: "ความมหัศจรรย์ของโลหะมีชีวิต"
 strange_worlds.2050.desc_intro: "บันทึกเสียงที่สองจากคอนโซลควบคุมของลูกบาศก์ได้รับการแปลแล้ว\n\n§L'สภาบริหารของข้า ข้าล้มเหลว การทำลายล้างของเรานั้นใกล้เข้ามาและไม่อาจหลีกเลี่ยงได้\n\nยานอวกาศหกเหลี่ยมของข้าถูกก่อวินาศกรรม ข้าจะพยายามลงจอดฉุกเฉินบนดาว [fromfrom.planet.GetName]. แม้ว่าข้าจะรอดชีวิต แต่เครื่องหมายแห่งสันติภาพจะไม่ได้รับการส่งมอบ [event_target:anomalous_cube_fallen_empire.GetName] จะเข้าโจมตีอย่างที่เรากลัว'§!\n\n§H[event_target:anomalous_cube_scientist.GetName]§! ได้ถอดรหัสกลไกการล็อกบนลังสำเร็จแล้ว ภายในมีโลหะแปลกประหลาดชิ้นหนึ่งอยู่ มันมีความเหนียวและเคลื่อนไหวได้ง่ายเป็นพิเศษ เปลี่ยนรูปร่างตัวเองเป็นลวดลายซับซ้อนใหม่ทุกๆ ไม่กี่วินาที"
 strange_worlds.2050.desc_no_war_lm: "\nเราสามารถเก็บรักษาสิ่งแปลกประหลาดนี้เพื่อทำความเข้าใจเพิ่มเติมเกี่ยวกับโลหะมีชีวิต หรือเราจะทำตามความตั้งใจของเจ้าของเดิม โดยมอบมันเป็นของขวัญให้แก่ [event_target:anomalous_cube_fallen_empire.GetName] เพื่อปรับปรุงความสัมพันธ์ของเรากับพวกเขา"
 strange_worlds.2050.desc_no_war_no_lm: "\nเราสามารถเก็บรักษาสิ่งแปลกประหลาดนี้เพื่อทำความเข้าใจเพิ่มเติมเกี่ยวกับโลหะประหลาดนี้ หรือเราจะทำตามความตั้งใจของเจ้าของเดิม โดยมอบมันเป็นของขวัญให้แก่ [event_target:anomalous_cube_fallen_empire.GetName] เพื่อปรับปรุงความสัมพันธ์ของเรากับพวกเขา"
 strange_worlds.2050.desc_war_lm: "\nวัตถุที่น่าทึ่งนี้และยานทรงลูกบาศก์ที่มันมาด้วยจะถูกใช้เพื่อเพิ่มพูนความรู้เรื่องโลหะมีชีวิตของเรา"
 strange_worlds.2050.desc_war_no_lm: "\nวัตถุที่น่าทึ่งนี้และยานทรงลูกบาศก์ที่มันมาด้วยจะถูกใช้เพื่อเพิ่มพูนความรู้เรื่องสารประกอบโลหะและโครงสร้างโลหะของเรา"
 strange_worlds.2050.a_no_war: "มอบเป็นของขวัญให้แก่ [event_target:anomalous_cube_fallen_empire.GetName]"
 strange_worlds.2050.b_fallen_not_defeated_no_war: "เก็บมันไว้สำหรับเราเอง"

 strange_worlds.3005.name: "ศาสดาที่น่าสงสัย"
 strange_worlds.3005.desc: "ในขณะที่เฝ้าสังเกตประชากรท้องถิ่นของดาว §Y[event_target:pre_ftl_planet.GetName]§! ทีมงานภาคสนามของเราได้พบกับการค้นพบที่น่าสนใจ\n\nเมืองหลวงกำลังคึกคักไปด้วยการพูดคุยเกี่ยวกับ \"ผู้ถูกเลือก\" ซึ่งมีรายงานว่าได้ลงมาจากดวงดาวเพื่อตอบสนองต่อคำทำนายโบราณและนำทางชาว [event_target:pre_ftl_planet.Owner.GetSpeciesName] เข้าสู่ยุคทองใหม่\n\nบุคลากรของเราทุกคนได้รับการยืนยันตัวตนครบถ้วน ดังนั้นใครก็ตามที่กำลังมาเยือนดาวดวงนี้ พวกเขาย่อมควรค่าแก่การสืบสวนเพิ่มเติม"
 strange_worlds.3005.a: "ค้นหาข้อมูลเพิ่มเติม"

 strange_worlds.3010.name: "ศาสดาจอมปลอม"
 strange_worlds.3010.desc_intro: "การวิจัยของทีมภาคสนามเกี่ยวกับ \"ผู้ถูกเลือก\" บนดาว §Y[event_target:pre_ftl_planet.GetName]§! ได้เปิดเผยตัวตนที่แท้จริงของพวกเขา\n\n"
 strange_worlds.3010.desc_no_megacorp: "ชาวพเนจร §Yเกาะ นา มา เรียน§! คนหนึ่งกำลังแอบอ้างเป็นบุคคลสำคัญในความเชื่อตำนานของ [event_target:pre_ftl_planet.Owner.GetSpeciesName] โดยอ้างว่าตน \"ลงมาจากดวงดาว\""
 strange_worlds.3010.desc_megacorp: "พ่อค้าคาราวาน §Y[event_target:caravaneer_fleet3_country.GetSpeciesName]§! คนหนึ่งกำลังแอบอ้างเป็นบุคคลสำคัญในความเชื่อตำนานของ [event_target:pre_ftl_planet.Owner.GetSpeciesName] โดยอ้างว่าตน \"ลงมาจากดวงดาว\""
 strange_worlds.3010.desc_outro: "\nการสำรวจเพิ่มเติมบนดาวเคราะห์ได้เปิดเผยยานของพวกเขาที่ตกลงและใช้งานไม่ได้ ซึ่งซ่อนอยู่ในหุบเขาที่เข้าถึงยาก ห่างจากเมืองหลวงพอสมควร จากรูปแบบไฮเปอร์ไดรฟ์รุ่นเก่า พวกเขาอยู่ที่นี่มานานแล้ว\n\nตั้งแต่ตกค้างอยู่บนดาวดวงนี้ ดูเหมือนว่าพวกเขาจะใช้ประโยชน์จากความเชื่อโบราณเพื่อประโยชน์ของตัวเอง พวกเขายินดีรับการกราบไหว้บูชาจากชาวพื้นเมือง โดยได้รับการสถาปนาเป็นผู้ปกครองที่เปี่ยมไปด้วย \"ความรู้จากสวรรค์\"\n\nหากปล่อยไว้โดยไม่เข้าแทรกแซง การมีอยู่ของคนหลอกลวงนี้บนดาวเคราะห์น่าจะส่งผลเสียอย่างหนักต่อสังคมที่กำลังพัฒนา ควรเป็นเรื่องที่ดีที่สุดที่จะเข้าแทรกแซง"
 strange_worlds.3010.a: "เปิดโปงว่าพวกเขาคือคนหลอกลวง"
 strange_worlds.3010.b: "เสนอตัวช่วยชีวิตพวกเขา"

 strange_worlds.3015.name: "ความจริงเปิดเผย"
 strange_worlds.3015.desc_no_megacorp: "เราประสบความสำเร็จในการถอดถอนชาวพเนจร §Yเกาะ นา มา เรียน§! บนดาว §Y[event_target:pre_ftl_planet.GetName]§! ที่แอบอ้างเป็น \"ผู้ถูกเลือก\" แห่งตำนาน [event_target:pre_ftl_planet.Owner.GetSpeciesName]"
 strange_worlds.3015.desc_megacorp: "เราประสบความสำเร็จในการถอดถอนชาว §Y[event_target:caravaneer_fleet3_country.GetSpeciesName]§! บนดาว §Y[event_target:pre_ftl_planet.GetName]§! ที่แอบอ้างเป็น \"ผู้ถูกเลือก\" แห่งตำนาน [event_target:pre_ftl_planet.Owner.GetSpeciesName]"
 strange_worlds.3015.desc_outro: "\nหลังจากศึกษารายละเอียดของตำนานท้องถิ่น เราสามารถหว่านล้อมชนชั้นปกครองได้ว่าผู้ถูกเลือกของพวกเขาแท้จริงแล้วคือปีศาจที่ถูกส่งมาหลอกลวงพวกเขาและผลักดาวเคราะห์ดวงนี้เข้าสู่ความมืดมิดพันปี\n\nเราประสบความสำเร็จในการแยกชิ้นส่วนยานที่ตกเพื่อเป็นอะไหล่ ไม่เหลือร่องรอยใดๆ ให้ชาวพื้นเมืองค้นพบ อย่างไรก็ตาม ของใช้ส่วนตัวบางอย่างได้รับการค้นพบไปเรียบร้อยแล้วและช่วยให้สายพันธุ์นี้ได้เหลือบมองเทคโนโลยีที่เกินกว่าความเข้าใจในปัจจุบันของพวกเขา"
 strange_worlds.3015.a: "โชคร้าย"

 strange_worlds.3020.name: "กลับบ้าน"
 strange_worlds.3020.desc_intro: "ทีมภาคสนามของเราได้รับโอกาสเข้าพบปะส่วนตัวกับ \"ผู้ถูกเลือก\" แห่งดาว §Y[event_target:pre_ftl_planet.GetName]§! และเสนอความช่วยเหลือในการซ่อมแซมยานและส่งพวกเขากลับสู่อวกาศ\n\n"
 strange_worlds.3020.desc_no_megacorp: "ชาวพเนจร §Yเกาะ นา มา รีน§! ยินดีอย่างยิ่งที่จะยอมรับข้อเสนอ โดยอธิบายว่าพวกเขาได้รับการต้อนรับเป็นเหมือนพระผู้เป็นเจ้าด้วยความเข้าใจผิดหลังจากตกลงบนดาว §Y[event_target:pre_ftl_planet.GetName]§! และต้องใช้ชีวิตอยู่ด้วยความหวาดกลัวว่าจะได้รับอันตรายหากความจริงถูกเปิดเผย"
 strange_worlds.3020.desc_megacorp: "ชาว §Y[event_target:caravaneer_fleet3_country.GetSpeciesName]§! ยินดีอย่างยิ่งที่จะยอมรับข้อเสนอ โดยอธิบายว่าพวกเขาได้รับการต้อนรับเป็นเหมือนพระผู้เป็นเจ้าด้วยความเข้าใจผิดหลังจากตกลงบนดาว §Y[event_target:pre_ftl_planet.GetName]§! และต้องใช้ชีวิตอยู่ด้วยความหวาดกลัวว่าจะได้รับอันตรายหากความจริงถูกเปิดเผย"
 strange_worlds.3020.desc_outro: "\nหลังจากนำตัวส่งมายังสถานีวิจัยของเราและซ่อมแซมยานเสร็จสิ้น นักเดินทางผู้ซาบซึ้งใจได้มอบของขวัญเป็นคลังสินค้าจำนวนมากของยานให้แก่เราก่อนจะกล่าวคำอำลา\n\nภาวะสุญญากาศทางอำนาจที่เกิดขึ้นหลังการจากไปของพวกเขาได้กระตุ้นให้เกิดการต่อสู้ระยะสั้นทว่าโหดร้ายระหว่างกลุ่มศาสนาต่างๆ บนดาว §Y[event_target:pre_ftl_planet.GetName]§! ซึ่งในตอนนี้ได้สงบลงแล้ว"
 strange_worlds.3020.a: "น่าทึ่งมาก"

 strange_worlds.3025.name: "[event_target:nomad01_country.GetName]"
 strange_worlds.3025.desc: "ยินดีต้อนรับ [Owner.GetSpeciesName] เราเข้าใจว่าเจ้าได้จัดการกับชาวภาษานามิเบียนอกแถวที่แยกตัวออกจากกองยานของเราแล้ว\n\nเจ้าได้สร้างคุณประโยชน์ให้แก่เรา บุคคลที่หลงผิดคนนี้สร้างความรำคาญใจอยู่เสมอ ความทะเยอทะยานที่บ้าคลั่งของพวกเขาสร้างความเสี่ยงต่อการเดินทางของเรา\n\nโปรดรับของขวัญชิ้นนี้เป็นคำขอบคุณ"
 strange_worlds.3025.a: "ขอบคุณมาก"

 strange_worlds.3030.name: "[event_target:caravaneer_home_country.GetName]"
 strange_worlds.3030.desc: "พวก [Owner.GetSpeciesNamePlural] จัดการกับชาว §Yแรคเก็ต§! ที่หลงทางไปงั้นรึ? ดีมากเลย! เจ้าโง่คนนั้นสร้างแต่ความปวดหัวให้พวกเรา พิธีกรรมไร้สาระของเขาทำให้เราอับอายขายหน้า นี่เป็นครั้งที่ห้าแล้วที่เรื่องนี้เกิดขึ้น เอาเข้าจริงไหม? เราดีใจที่เขาไปเสียที\nนี่ เจ้าเอาสิ่งนี้ไปสิ ของขวัญสำหรับการช่วยขจัดปัญหานี้ให้หมดไป ข้อตกลงครั้งเดียว คุ้มค่ามาก"
 strange_worlds.3030.a: "ขอบคุณมาก"

 strange_worlds.3040.name: "สิ่งที่เราทิ้งไว้เบื้องหลัง"
 strange_worlds.3040.desc: "สถานีสังเกตการณ์ของเราเหนือดาว §Y[event_target:pre_ftl_planet.GetName]§! ได้รายงานการสูญหายของกล่องบรรจุเสบียงหลังการสำรวจทางธรณีวิทยาบนพื้นผิวโลกเมื่อไม่นานมานี้\n\nจากการติดตามตำแหน่งทางภูมิศาสตร์บนเสบียงเหล่านั้น เราได้ค้นพบว่าหมู่บ้านท้องถิ่นแห่งหนึ่งได้พบและยึดเอาทรัพยากรเหล่านี้ไปเป็นของตนเอง\n\nการเข้าถึงตู้คอนเทนเนอร์เก็บเสบียงของเราอาจส่งผลกระทบในทางลบต่อการพัฒนาสังคมของ [event_target:pre_ftl_planet.Owner.GetSpeciesAdj]"
 strange_worlds.3040.a: "โชคร้าย"

 strange_worlds.3045.name: "ส่งคืนผู้ส่ง"
 strange_worlds.3045.desc_common: "ดูเหมือนว่าคลังสินค้าที่วางผิดตำแหน่งบนดาว §Y[event_target:pre_ftl_planet.GetName]§! ได้ส่งผลกระทบแปลกๆ ต่อวัฒนธรรมพื้นเมือง\n\nประชากร [Root.GetPreFTLUpper] ได้สร้างยานเลียนแบบหยาบๆ ของกระสวยสังเกตการณ์ของเรา แม้ว่า \"ยาน\" เหล่านี้จะใช้งานไม่ได้อย่างชัดเจน แต่นี่เป็นหลักฐานว่านักวิจัยของเราถูกพบเห็นโดยชาวพื้นเมืองในระหว่างการสำรวจ\n\nภายใต้การนำของผู้อาวุโสในท้องถิ่น ชาว [event_target:pre_ftl_planet.Owner.GetSpeciesName] กำลังทำการลอกเลียนขั้นตอนการวิเคราะห์ดินทางธรณีวิทยาของเรา: เติมดินและหินลงในกล่องบรรจุเสบียงที่วางทิ้งไว้ โหลดพวกมันลงบน \"ยาน\" เลียนแบบของพวกเขา และรอคอยอย่างอดทน"
 strange_worlds.3045.desc_non_homicidal: "\nชาว [event_target:pre_ftl_planet.Owner.GetSpeciesName] ตกอยู่ใต้ความรู้สึกว่าการเลียนแบบกระบวนการของเราจะทำให้มีเสบียงปรากฏเพิ่มขึ้น เราควรแทรกแซงก่อนที่พฤติกรรมนี้จะส่งผลกระทบต่อสังคมที่กว้างขึ้นของพวกเขา"
 strange_worlds.3045.desc_homicidal: "\nการกระทำนี้ไร้ประโยชน์อย่างสิ้นเชิง มีเพียงความตายเท่านั้นที่รออยู่"
 strange_worlds.3045.a_normal: "กู้คืนกล่องเสบียงของเราอย่างลับๆ"
 strange_worlds.3045.a_megacorp: "กู้คืนทรัพย์สินของเราอย่างแนบเนียน"
 strange_worlds.3045.b_normal: "แลกเปลี่ยนเสบียงอาหารสำหรับแร่ธาตุของพวกเขา"
 strange_worlds.3045.b_megacorp: "มาแลกเปลี่ยนค้าขายกันเถอะ!"
 strange_worlds.3045.c: "คัดสรรพวกคนป่าเหล่านี้ออกไป"
 strange_worlds.3045.ct: "สถานีสังเกตการณ์เหนือดาว §Y[event_target:pre_ftl_planet.GetName]§! บัดนี้ผลิต $@observation_outpost_crate_minerals_production$ $i_minerals$ โดยมีค่าบำรุงรักษา $@observation_outpost_crate_food_upkeep$ $i_food$"

 strange_worlds.3050.name: "ความว่างเปล่าที่ขุ่นเคือง"
 strange_worlds.3050.desc: "หลังจากกู้คืนกล่องเสบียงที่หายไปจากดาว §Y[event_target:pre_ftl_planet.GetName]§! พิธีกรรมการโหลดเสบียงลงบน \"ยาน\" ดำเนินต่อไปช่วงเวลาสั้นๆ จนกระทั่งชาวพื้นเมือง [event_target:pre_ftl_planet.Owner.GetSpeciesName] ที่โกรธแค้นได้หันไปทำร้ายผู้อาวุโสในหมู่บ้านของพวกเขา โยนผู้อาวุโสเข้าไปในกระสวยจำลองก่อนจะเผามันจนกลายเป็นเถ้าถ่าน\n\nแม้ว่าประชากรจะกลับไปสู่วิถีชีวิตเดิมของพวกเขาแล้ว แต่วัฒนธรรมของพวกเขายังคงมีความขุ่นเคืองหลงเหลือต่อ \"ผู้คนบนฟากฟ้า\""
 strange_worlds.3050.a: "บันทึกตามนั้น"

 strange_worlds.3060.name: "ยกเลิกบริการ"
 strange_worlds.3060.desc: "เมื่อสังคมชาว [event_target:pre_ftl_planet.Owner.GetSpeciesName] ก้าวหน้าขึ้น เราจึงยุติการแลกเปลี่ยนเสบียงอาหารสำหรับแร่ธาตุของสถานีสังเกตการณ์ของเรา\n\nแม้ว่าจะเป็นการทดลองที่น่าสนใจ แต่การเข้าแทรกแซงอารยธรรมของพวกเขาอย่างต่อเนื่องมีแต่จะสร้างความเสี่ยงต่อการเปิดเผยตัวตนของเราก่อนเวลาอันควร"
 strange_worlds.3060.a: "มาตรการที่สมเหตุสมผล"
 strange_worlds.3060.ct: "สถานีสังเกตการณ์จะไม่ผลิตแร่ธาตุและไม่ต้องการค่าบำรุงรักษาเสบียงอาหารอีกต่อไป"

 strange_worlds.3070.name: "ความผิดปกติของแรงโน้มถ่วง"
 strange_worlds.3070.desc: "ความผิดปกติของแรงโน้มถ่วงส่งผลให้สถานีสังเกตการณ์เหนือดาว §Y[event_target:pre_ftl_planet.GetName]§! หลุดออกจากวงโคจร ส่งผลให้มันตกลงสู่ชั้นบรรยากาศชั้นล่างของดาวเคราะห์ช่วงสั้นๆ\n\nแม้ว่าลูกเรือของเราจะไม่ได้รับบาดเจ็บและวงโคจรดั้งเดิมได้รับการกู้คืนแล้ว ทว่ามีข้อกังวลว่าสถานีอาจถูกตรวจพบจากพื้นผิวโดยชาว [event_target:pre_ftl_planet.Owner.GetSpeciesNamePlural]\n\nเวลาเท่านั้นที่จะบอกได้ว่าตัวตนของเราถูกเปิดเผยต่อชาวพื้นเมืองหรือไม่ และสิ่งนั้นจะส่งผลกระทบต่อสังคมของพวกเขาอย่างไรบ้าง"
 strange_worlds.3070.a: "สังเกตการณ์ต่อไป"

 strange_worlds.3075.name: "บันไดสู่สวรรค์"
 strange_worlds.3075.desc_common: "เทคโนโลยีการบันทึกภาพแบบโบราณสามารถบันทึกภาพสถานีสังเกตการณ์ของเราในขณะที่มันอยู่ในวงโคจรต่ำเหนือดาว §Y[event_target:pre_ftl_planet.GetName]§! ได้ นอกจากคำบอกเล่าของประจักษ์พยานแล้ว รูปภาพเหล่านี้ได้สร้างแรงบันดาลใจให้ประเทศบางแห่งก่อสร้าง \"บันไดสู่สวรรค์\" เพื่อทำการสืบสวนเพิ่มเติม\n\nแม้ว่าความพยายามนี้จะไร้ผลอย่างเห็นได้ชัด แต่การแข่งขันระหว่างประเทศกำลังสร้างผลกระทบต่อความมั่นคง ความตึงเครียดเก่าๆ กำลังปะทุขึ้นในการแข่งขันสร้าง \"บันได\" ลำแรก โดยได้แรงหนุนจากความภาคภูมิใจในชาติและการขาดแคลนทรัพยากร"
 strange_worlds.3075.desc_non_homicidal: "\nหากเราสามารถทำลายความน่าเชื่อถือของหลักฐานการมีอยู่ของเราได้ เราอาจจะสามารถสลายความตึงเครียดลงได้ก่อนที่สถานการณ์จะหลุดพ้นจากความควบคุม\n\nหรืออีกนัยหนึ่ง ท่าทีทางการทูตระหว่างขั้วอำนาจการเมือง [Root.GetPreFTLUpper] อาจเป็นกรณีศึกษาทางสังคมวิทยาที่น่าสนใจ แม้ว่าจะมีความเสี่ยงต่อการยกระดับความรุนแรงก็ตาม"
 strange_worlds.3075.desc_homicidal: "\nความวุ่นวายที่กำลังจะเกิดขึ้นน่าจะเป็นโอกาสการวิจัยที่ยอดเยี่ยม"
 strange_worlds.3075.a: "ทำลายความน่าเชื่อถือของหลักฐานการมีตัวตนของเรา"
 strange_worlds.3075.b: "สังเกตการณ์ต่อไป"
 strange_worlds.3075.b_ct: "ผลผลิตการวิจัยทางสังคมของสถานีสังเกตการณ์จะเพิ่มขึ้นเป็นสองเท่า"

 strange_worlds.3080.name: "ความจริงอยู่ข้างนอกนั่น"
 strange_worlds.3080.desc: "เจ้าหน้าที่ปฏิบัติการของเราประสบความสำเร็จในการทำลายความน่าเชื่อถือของหลักฐานการมีตัวตนของเราบนดาว §Y[event_target:pre_ftl_planet.GetName]§!\n\nเมื่อรูปภาพถูกเปิดเผยว่าปลอมแปลงและความน่าเชื่อถือของประจักษ์พยานถูกทำลาย การก่อสร้าง \"บันไดสู่สวรรค์\" ก็ยุติลง ด้วยความอับอายในความเขลาของพวกเขา ประเทศที่เคยแบ่งแยกได้หันมาร่วมมือกันเพื่อการสืบค้นอย่างมีเหตุผลและวิธีการทางวิทยาศาสตร์\n\nพื้นที่ก่อสร้างบันไดได้รับการปรับปรุงเป็นสถาบันการศึกษาระดับสูง ในขณะที่นักวิชาการรุ่นใหม่มารวมตัวกันเพื่อหักล้างตำนานของ \"ป้อมปราการลอยฟ้า\""
 strange_worlds.3080.a: "น่าทึ่งมาก"
 strange_worlds.3080.a_ct: "[event_target:pre_ftl_country.GetName] ทำความก้าวหน้า 50% ไปสู่ยุคถัดไป\n[event_target:pre_ftl_country.GetName] ได้รับวิถีวัตถุนิยม(ผู้เขียน)"

 strange_worlds.3085.name: "มหาสงครามบันไดสู่สวรรค์"
 strange_worlds.3085.desc: "ในความพยายามก่อสร้าง \"บันไดสู่สวรรค์\" ความตึงเครียดระหว่างประเทศ [Root.GetPreFTLLower] ของดาว §Y[event_target:pre_ftl_planet.GetName]§! ส่งผลให้เกิดความขัดแย้งทั่วโลกอย่างเต็มรูปแบบ การสู้รบแย่งชิงทรัพยากรที่ลดน้อยลง การเข่นฆ่าในช่วงสองปีที่ผ่านมาที่รู้จักกันในนาม \"มหาสงครามบันไดสู่สวรรค์\" ได้สิ้นสุดลงในที่สุด\n\nข้อกำหนดหลักของสนธิสัญญาประนีประนอมคือการเสนอแนวร่วมที่เป็นเอกภาพต่อต้านศัตรูร่วมกัน นั่นคือ \"ป้อมปราการลอยฟ้า\" ในขณะที่ชาว [event_target:pre_ftl_planet.Owner.GetSpeciesNamePlural] บูรณะโลกที่เสียหายจากสงคราม ความหวาดระแวงและความเกลียดชังสิ่งที่ไม่รู้จักที่เพิ่มขึ้นของพวกเขาจะทำให้ปฏิสัมพันธ์ในอนาคตกับพวกเขามีความท้าทายมากขึ้น"
 strange_worlds.3085.a: "ปัญหาสำหรับอนาคต"
 strange_worlds.3085.a_ct: "ผลผลิตการวิจัยทางสังคมของสถานีสังเกตการณ์กลับสู่ภาวะปกติ"

 create_hibernators_pops_ct: "สร้างประชากรก่อนมีสติปัญญา (Pre-Sapient) จำนวน $@hibernators_pops_created|*0$ พร้อมคุณลักษณะ §Y$trait_seasonal_dormancy$§!"

 pm_bleeding_planet: "ดาวเคราะห์หลั่งเลือด"
 pm_bleeding_planet_desc: "ผืนปฐพีหลั่งเลือด แนะนำให้ระมัดระวังในการรบกวนพื้นดินใต้เท้าผู้ตั้งถิ่นฐาน\n"
 pm_contruction_coagulate: "กาวก่อสร้างธรรมชาติ"
 pm_contruction_coagulate_desc: "ผืนดินหลั่งเลือดเมื่อเผชิญกับการตั้งถิ่นฐาน น้ำยางเหนียวทำหน้าที่เป็นสารยึดเกาะธรรมชาติที่มีประโยชน์ แม้ว่าจะเป็นอันตรายก็ตาม\n"
 pm_hemosymbiosis: "ความร่วมมือทางชีวภาพโลหิต"
 pm_hemosymbiosis_desc: "น้ำยางเหนียวจากภายในดาวส่งอิทธิพลต่อการพัฒนาต่อไป ความเร็วการสร้างและกิจกรรมขุดเหมืองได้รับประโยชน์จากสารนี้ ทว่าต้องแลกด้วยการเติบโตของอาณานิคมที่ลดลง\n"
 pm_parasitic_production: "การผลิตเชิงปรสิต"
 pm_parasitic_production_desc: "สิ่งมีชีวิตปรสิตบนดาวดวงนี้ได้รับการปรับเปลี่ยน ช่วยเพิ่มผลิตผลการทำงานของคนงานทั้งหมด\n"
 pm_frying_fauna: "สัตว์ลนไฟ"
 pm_frying_fauna_desc: "สัตว์ขนาดใหญ่ของดาวดวงนี้เจริญเติบโตภายใต้สภาวะที่เหมาะสม เอนไซม์ย่อยอาหารที่เป็นเอกลักษณ์มีประโยชน์ในการถลุงโลหะผสม"
 pm_frying_fauna_machine: "$pm_frying_fauna$"
 pm_frying_fauna_machine_desc: "$pm_frying_fauna_desc$"
 pm_frying_fauna_2: "$pm_frying_fauna$"
 pm_frying_fauna_2_desc: "เครื่องเก็บเกี่ยวไฟฟ้าเปลี่ยนสัตว์ขนาดใหญ่ของดาวดวงนี้ให้กลายเป็นแหล่งเสบียงอาหารที่มั่นคง"
 pm_frying_fauna_2_machine: "$pm_frying_fauna$"
 pm_frying_fauna_2_machine_desc: "$pm_frying_fauna_2_desc$"
 pm_catalytic_excrement: "สิ่งปฏิกูลเร่งปฏิกิริยา"
 pm_catalytic_excrement_ct: "สัตว์ขนาดใหญ่ของดาวดวงนี้เจริญเติบโตภายใต้สภาวะที่เหมาะสม เอนไซม์ย่อยอาหารที่เป็นเอกลักษณ์มีประโยชน์ในการถลุงโลหะผสม"
 pm_strange_sandstorm: "พายุทรายประหลาด"
 pm_strange_sandstorm_ct: "ปรากฏการณ์เฉพาะตัวของผืนทรายบนดาวเคราะห์กำลังส่งผลกระทบต่อกิจกรรมของอาณานิคม"
 pm_perpetual_lightning: "พายุสายฟ้าถาวร"
 pm_perpetual_lightning_desc: "ผลึกรังสีที่ถูกเปิดเผยในระหว่างการปรับปรุงสภาพดาวเคราะห์ผิดปกติได้สร้างสภาพแวดล้อมที่เหมาะสมสำหรับพายุฝนฟ้าคะนองถาวรทั่วทั้งดวงดาว"
 pm_dark_matter_geyser: "น้ำพุร้อนสสารมืด"
 pm_dark_matter_geyser_desc: "ดาวเคราะห์ดวงนี้กำลังจมอยู่ในไอหมอกของสสารมืด"
 pm_population_quarantine: "การกักกันประชากร"
 pm_population_quarantine_desc: "ประชากรอยู่ภายใต้การกักกันในขณะที่ผลกระทบของสสารมืดได้รับการสืบสวน"
 pm_dark_matter_statue: "รูปปั้นสสารมืด"
 pm_dark_matter_statue_desc: "รูปปั้นหินของสสารมืดที่แข็งตัวสามารถพบเห็นได้กระจัดกระจายทั่วดาวเคราะห์ ซากศพที่น่าเศร้าของประชากรเดิมช่วยให้มีโอกาสศึกษาวิจัยเพิ่มเติม"
 pm_raining_corpses: "ศพร่วงหล่นจากฟากฟ้า"
 pm_raining_corpses_desc: "กลุ่มเมฆหนาทึบที่ครั้งหนึ่งเคยใช้เป็นสถานที่ฝังศพของเผ่าพันธุ์ต่างดาวบัดนี้กำลังเบาบางลง ส่งผลให้ศพในเมฆตกลงสู่พื้นผิวโลกอย่างต่อเนื่อง"
