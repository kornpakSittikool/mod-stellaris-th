 ladder_wars_pre_ftl: "มรดกจากสงครามบันได"
 ladder_wars_pre_ftl_desc: "ในขณะที่โลกที่เสียหายจากสงครามกำลังบูรณะ ความหวาดระแว่งที่เพิ่มขึ้นของพวกเขาทำให้การสร้างปฏิสัมพันธ์กับผู้อื่นกลายเป็นความท้าทายสำหรับทุกคนที่มีส่วนเกี่ยวข้อง"

 living_metal_mega_construction_insight: "ข้อมูลการสร้างสิ่งก่อสร้างขนาดใหญ่ของโลหะมีชีวิต"
 living_metal_mega_construction_insight_desc: "ชิ้นส่วนโบราณของโลหะมีชีวิตที่เรากู้คืนได้ช่วยมอบข้อมูลเชิงลึกที่ยอดเยี่ยมในการพัฒนาสิ่งก่อสร้างขนาดใหญ่"
 living_metal_mega_construction_insight_ct: "ลดค่าใช้จ่ายพื้นฐานของกฎหมายสิ่งก่อสร้างขนาดใหญ่โลหะมีชีวิต: §G-50%§!"

 d_coagulated_landscape: "ภูมิประเทศที่แข็งตัว"
 d_coagulated_landscape_desc: "น้ำยางเหนียวพุ่งออกมาจากพื้นผิวโลกและแข็งตัวกลายเป็นวัสดุอันตรายที่แทบไม่สามารถเจาะผ่านได้ ทำให้เหลือพื้นที่ไม่มากสำหรับการก่อสร้างอย่างปลอดภัย"
 d_shimmering_structure: "โครงสร้างระยิบระยับ"
 d_shimmering_structure_desc: "โครงสร้างขนาดใหญ่ที่ระยิบระยับและไม่ทราบต้นกำเนิด"
 d_geothermal_hotspot: "แหล่งพลังงานความร้อนใต้พิภพ"
 d_geothermal_hotspot_desc: "ดาวเคราะห์ดวงนี้มีแหล่งพลังงานความร้อนใต้พิภพที่ยอดเยี่ยม ช่วยมอบทั้งพลังงานและโอกาสในการศึกษาวิจัย"
 d_ancient_cloaking_array: "เครื่องรบกวนสัญญาณโบราณ"
 d_ancient_cloaking_array_desc: "อาณานิคมแห่งนี้ได้รับประโยชน์จากเครื่องพรางตัวโบราณของเอเลี่ยน ศัตรูจะไม่สามารถเข้าโจมตีได้ง่าย ผู้ตั้งถิ่นฐานสามารถรู้สึกปลอดภัยที่นี่"
 d_psionic_sands: "ทรายพลังจิต"
 d_psionic_sands_desc: "ทรายบนดาวเคราะห์ดวงนี้มีส่วนผสมของซูโรเข้มข้นอยู่ทั่วบริเวณ เป็นไปได้ที่จะติดต่อสื่อสารกับมัน"
 d_mountains_of_steel: "ขุนเขาเหล็กกล้า"
 d_mountains_of_steel_desc: "ขุนเขาขนาดยักษ์ที่หลอมขึ้นในอุณหภูมิที่ร้อนจัดของสภาวะปรับปรุงดาวเคราะห์ ทำหน้าที่เป็นแหล่งแร่ธาตุที่อุดมสมบูรณ์"

 d_lava_tubes: "ท่อลาวา"
 d_lava_tubes_desc: "กระแสลาวาได้หล่อหลอมท่อลาวาลึกที่อุดมไปด้วยแร่ธาตุ มอบโอกาสในการทำเหมืองขุดเจาะที่มีมูลค่าสูง"
 d_lava_tubes_ct: "$t$ค่าบำรุงรักษาพลังงาน £energy£ สำหรับอาชีพ [miner.GetIcon] [miner.GetName]: §R+$@lava_tubes_mining_job_upkeep$§!"
