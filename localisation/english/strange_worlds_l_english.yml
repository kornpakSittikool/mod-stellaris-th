 pm_urban_privilege_regular: "เอกสิทธิ์ของเขตเมือง"
 pm_urban_privilege_regular_desc: "การเข้าข้างเขตเมืองในข้อพิพาทท้องถิ่นทำให้ประชาชนในเขตชนบทเริ่มตึงเครียด"
