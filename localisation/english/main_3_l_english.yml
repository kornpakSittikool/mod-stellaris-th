 zone_agrarian_urban: "หมู่บ้านเกษตรกรรม"
 zone_agrarian_urban_desc: "โดยอาศัยในไบโอเมี่ยมที่อุดมสมบูรณ์ ชุมชนที่ใกล้ชิดเหล่านี้ปลูกทั้งพืชและศุลกากร"
 zone_exotic_gases: "ดักจับก๊าซแปลกประหลาด"
 zone_exotic_gases_desc: "โดม ที่ เปราะ บาง เป็น ที่ อาศัย ของ เครื่อง สูบ น้ํา อัน กว้าง ใหญ่, หอ กลั่น, และ ท่อ กด ทั้ง หมด เพื่อ จับ ก๊าซ ต่าง ๆ ที่ ออก มา จาก ระบบ นิเวศ ของ โลก นี้."
