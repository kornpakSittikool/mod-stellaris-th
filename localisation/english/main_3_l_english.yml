 city_space_age_industry_1_desc: "สร้างขึ้นบนโพลีเมอร์ เหล็กกล้าและความมุ่งมั่น เมืองนี้วางรากฐานการทํางานสําหรับดาว มันอาจจะขาดความสง่างาม แต่มันก็ทําให้งานสําเร็จ"
 city_colony_1_desc: "แต่ละข้อตกลงเริ่มต้นเป็นคําถาม ด้วย ความ อด ทน และ จุด มุ่ง หมาย นั่น กลาย เป็น คํา ตอบ."
 city_industrial_1_desc: "เมืองนี้มีความสมดุลของความต้องการ ของสงครามและความสงบสุข"
 city_foundry_1_desc: "เสียงขู่ของเตาไฟ อยู่ห่างออกไปไม่กี่ช่วงตึก ไม่มีใครสบายหรอก แต่พวกเขาพักผ่อนอยู่ใกล้ๆ"
 city_factory_1_desc: "โมเดลการผลิตภายในบ้านและเวิร์คช็อป กลมกลืนกัน"
 city_research_1_desc: "เส้นระหว่างหอพักกับห้องทดลอง มันไม่ชัดเจนในเมืองนี้"
 city_fortress_1_desc: "สร้างขึ้นทั้งทหารและพลเรือน"
 city_bureaucracy_1_desc: "มี การ เบียด เสียด กัน เป็น แถว ๆ ด้วย ศูนย์ บริหาร เครื่องจักร อัน นุ่ม นวล ของ จักรวรรดิ."
 city_temple_1_desc: "ที่หลบภัยสําหรับผู้ศรัทธา กับเพลงสวดสะท้อนผ่านบล็อกพาร์ทเมนต์"
 city_trade_1_desc: "พื้นที่ที่อยู่อาศัย ตรงกับการขายพื้นที่"

 city_bureaucracy_trade_1_desc: "ตลาด รุ่งเรือง เมื่อ มี การ ตรวจ สอบ การ ซื้อ ขาย ทุก ราย และ ทุก สาย จด บัญชี."
 city_temple_trade_1_desc: "ความ มั่งคั่ง เป็น ข้อ พิสูจน์ ว่า พระเจ้า ทรง โปรดปราน."
 city_fortress_bureaucracy_1_desc: "สถาน ที่ ที่ มี คํา สั่ง เริ่ม ต้น การ ยอม รับ ถูก ประทับ ตรา และ กําแพง ก็ เข้ม แข็ง. ความ ปลอด ภัย ไม่ เพียง แต่ ได้ รับ การ บังคับ แต่ ยัง รวม ถึง ความ ปลอด ภัย ด้วย."
 city_fortress_temple_1_desc: "ที่ ซึ่ง ผู้ ซื่อ สัตย์ มี อาวุธ และ คลัง แสง ได้ รับ พระ พร."
 city_fortress_trade_1_desc: "เมืองที่มีสัญญาป้องกันเป็นเงินท้องถิ่นและวลี 'น้ําและความต้องการ' รวมถึงกระสุน"
 city_research_fortress_1_desc: "ศูนย์ ป้องกัน แห่ง หนึ่ง ซึ่ง นัก วิทยาศาสตร์ และ ทหาร ร่วม มือ กัน สร้าง ความ ประหลาด ใจ ที่ ไม่ น่า ยินดี."
 city_research_bureaucracy_1_desc: "เป็นรังที่ปลอดเชื้อของที่ปรึกษา นักวิเคราะห์ และนักสถิติหน้ามืด"
 city_research_temple_1_desc: "สถานที่ของการสอบถามวินัย ที่สายพันธุ์ที่เงียบสงบ ของความเชื่อเชิงปรัชญา"
 city_research_trade_1_desc: "ห้องปฏิบัติการและห้องประชุม ที่นวัตกรรมไม่ได้ถูกชี้นําด้วยความจริง แต่โดยรายได้ไตรมาส"
 city_foundry_research_1_desc: "สถานที่ที่กระบวนการสร้างโลหะ อยู่ภายใต้การปรับปรุง, การทดลอง, และการปรับปรุง"
 city_foundry_fortress_1_desc: "ป้อมปราการที่อาวุธและการป้องกัน ถูกหลอมเป็นหนึ่ง"
 city_foundry_bureaucracy_1_desc: "เลือดของทหารในกรม คือระบบราชการ"
 city_foundry_temple_1_desc: "พิธีกรรมศักดิ์สิทธิ์ถูกหลอมรวมเป็นเหล็กกล้า และคําพิพากษาจากพระเจ้า ส่งผลให้ค้อนล้ม"
 city_foundry_trade_1_desc: "ที่ที่อัลลอยถูกผลิตเป็นเครดิตและสัญญาเหมือนกัน เมืองที่ขายเหล็กได้รวดเร็วมาก"
 city_factory_research_1_desc: "ที่ซึ่งการออกแบบและการค้นพบระหว่างกัน การ ค้น พบ ทุก อย่าง มี การ ลง นาม, บรรจุ หีบ ห่อ อย่าง รวด เร็ว, และ มี ใน หลาก สี."
 city_factory_fortress_1_desc: "เบื้องหลังทหารที่ดีทุกคน คือลังของเครื่องมือสุขาภิบาล และพวกเขากําลังจะทําบางแห่ง"
 city_factory_bureaucracy_1_desc: "ที่ทําการราชการ ตรงกับการผลิตมวลชน บ้าน เกิด ของ รูป แบบ มาตรฐาน ใน สี่ เหลี่ยม."
 city_factory_temple_1_desc: "เทียน, ไอคอน, และเครื่องราชอิสริยาภรณ์ ที่ได้รับการรับรอง - ล้วนผลิตด้วยการควบคุมคุณภาพที่ ไม่พึงประสงค์"
 city_factory_trade_1_desc: "การผลิตมวลการบริโภค"
 city_industrial_foundry_1_desc: "เครื่องยนต์แห่งการผลิต"
 city_industrial_factory_1_desc: "ความ พอ เหมาะ คือ หลัก คํา สอน ใน เรื่อง การ จัด ระเบียบ การ ผลิต นี้. ไม่มีส่วนไหนที่สูญเปล่า ไม่มีแรงงานว่างๆ"
 city_industrial_research_1_desc: "โรงงานและห้องทดลองที่เท่าเทียมกัน แนวคิดใหม่ๆ ไม่ได้เกิดที่นี่เท่านั้น มันถูกสร้างขึ้น"
 city_industrial_fortress_1_desc: "ไฟของอุตสาหกรรมและสงคราม ไหม้อย่างสามัคคี"
 city_industrial_bureaucracy_1_desc: "ทุกลังมีบาร์โค้ด และทุกเครื่องที่ถูกประทับ"
 city_industrial_temple_1_desc: "มหาวิหาร และ ปล่อง ไฟ ก็ เช่น กัน มี ชัย เหนือ ฟ้า สวรรค์."
 city_industrial_trade_1_desc: "เสียง ร่ํา ร้อง ของ อุตสาหกรรม บรรจบ กับ ความ ทะเยอทะยาน ใน การ ค้า."
 city_research_bureaucracy_industrial_1_desc: "การ มอง ใน แง่ ดี, ความ หนา แน่น, และ การ จงใจ ไม่ เป็น พิเศษ. ใจกลางเมืองเหล่านี้ ทําให้เกิดทุกอย่างเล็กน้อย"
 city_research_bureaucracy_foundry_1_desc: "ประมวลผลข้อมูลในระดับ"
 city_research_bureaucracy_factory_1_desc: "สังคมถูกดัดแปลงในรูปแบบวัตถุ ผล ดี ทุก อย่าง จาก โรง งาน เหล่า นี้ ถูก ออก แบบ มา เพื่อ ส่ง เสริม เอกภาพ โดย ความ คุ้น เคย."
 city_research_bureaucracy_research_1_desc: "วิทยาศาสตร์จัดการโดยนโยบาย และนโยบายที่แจ้งให้ทราบโดยวิทยาศาสตร์ การรักษาตัวเองด้วยความสามารถ"
 city_research_bureaucracy_fortress_1_desc: "การคาดเดาโมเดลและบันทึกกลยุทธ์ การต่อสู้ที่นี่เป็นการต่อสู้ - บนจอและสีขาว"
 city_research_bureaucracy_bureaucracy_1_desc: "เมือง ที่ มี การ คํานวณ และ ทํา ราย ชื่อ อย่าง รอบคอบ และ มี การ นํา มา ใช้ เป็น ครั้ง คราว."
 city_research_bureaucracy_trade_1_desc: "จุดศูนย์กลางที่ความรู้ถูกแลกเปลี่ยนเช่นเงิน ความเข้าใจทุกอย่างมีราคา"
 city_research_temple_industrial_1_desc: "ใน ทาง กลับ กัน แต่ เป็น น้ํา หนึ่ง ใจ เดียว กัน."
 city_research_temple_foundry_1_desc: "สถานที่ของอุตสาหกรรมความสุขที่มีอัลลอยอารมณ์โดยพิธีกรรม"
 city_research_temple_factory_1_desc: "การพิสูจน์ว่าตัวตนทางจิตวิญญาณสามารถก่อตัวได้"
 city_research_temple_research_1_desc: "เมื่อ ความ รู้ เป็น การ เดิน ทาง อัน ศักดิ์สิทธิ์ การ เปิด เผย และ การ วิจัย ก็ เป็น อย่าง เดียว กัน."
 city_research_temple_fortress_1_desc: "กําแพงที่นี่ถูกเสริมด้วยความเชื่อที่ไม่อาจหลีกเลี่ยงได้ (และการค้นพบทางวิทยาศาสตร์ล่าสุด.)"
 city_research_temple_temple_1_desc: "ใน ที่ นี้ คํา ถาม เป็น สิ่ง ศักดิ์สิทธิ์ และ มี ความ รู้ เป็น วิถี สู่ ความ เหนือ กว่า."
 city_research_temple_trade_1_desc: "วิหารแห่งการค้าที่ยุติธรรมและซื่อสัตย์ คุณธรรมนําโดยคําภาวนา"

