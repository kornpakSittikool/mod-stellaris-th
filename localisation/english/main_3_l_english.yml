 START_SCREEN_UNE_NOMADS: "การเคลื่อนไหวอยู่ในเลือดของเรา\n\nหลาย สิ่ง ได้ เกิด ขึ้น ตั้ง แต่ มนุษย์ สมัย ใหม่ เกิด ขึ้น ใน แอฟริกา เมื่อ ประมาณ 200,000 ปี มา แล้ว. สายพันธุ์ของเราแพร่กระจายอย่างรวดเร็ว ทั่วส่วนใหญ่ของโลก และเร็ว ๆ นี้อารยธรรมครั้งแรกเกิดขึ้น\n\nความ ก้าว หน้า ทาง วิทยาศาสตร์ ได้ รวด เร็ว ถึง แม้ ไม่ ใช่ โดย ไม่ ต้อง เสีย ค่า ใช้ จ่าย. สงคราม ต่าง ๆ อ้าง ว่า หลาย ล้าน ชีวิต แม้ แต่ ก่อน ที่ อะตอม จะ ทํา ให้ เชื่อง และ ความ สับสน วุ่นวาย ใน ศตวรรษ ที่ 21 นี้ ได้ เห็น การ บังคับ บัญชา ของ สหประชาชาติ ค่อย ๆ ขยาย ตัว ออก ไป ด้วย ความ พยายาม จะ สร้าง ความ มั่นคง. พอ ถึง ตอน ต้น ศตวรรษ ที่ 22 องค์การ อุปรากร ได้ กลาย เป็น รัฐบาล โลก ที่ ล้ม เหลว.\n\nน้อยไป สายไปแล้ว ความเสียหายของระบบนิเวศของความขัดแย้ง ได้ทําลายโลกเกินการออม คําตอบเดียวของมนุษย์ คือการรวมกัน และก้าวต่อไป ตอนนี้ด้วยความสมบูรณ์ของเรือจริงลําแรกมนุษย์ คืนสิทธิเดิมโบราณ : ขอบฟ้าเปิดและอนาคตในหมู่ดาว"
 START_SCREEN_CM_NOMADS: "กว่าศตวรรษได้ผ่านไป ตั้งแต่เรืออาร์ชลําใหญ่ไครซานเดมลัม บรรทุกวิญญาณถึงหนึ่งในสี่ล้านดวงเอกภาพการ เดิน ทาง นั้น ยาว นาน และ อันตราย และ ใน ที่ สุด เมื่อ นัก อาณานิคม มอง เห็น แสง อาทิตย์ อีก ความ ยินดี ก็ ติด ตาม ไป อย่าง รวด เร็ว. มันไม่ยั่งยืน\n\nในหลายปีที่ผ่านช่องว่างเอกภาพบรรยากาศทรุดโทรมลง สิ่ง ที่ สัญญา ไว้ ว่า จะ เป็น โลก แห่ง สวน เป็น ที่ ร้าง เปล่า.\n\nเผชิญกับทางเลือกอื่น ๆ , ผู้นํากองทัพของอาณานิคม รวมกันผู้รอดชีวิตและตั้งค่าในการทํางาน คีรซันเธมถูกเปลี่ยนชื่อและเอาไปใช้ใหม่ ปัจจุบัน นี้ เป็น บ้าน ที่ ยืนยง ท่ามกลาง ดวง ดาว สร้าง ขึ้น เพื่อ รับ ประกัน อนาคต อัน มั่นคง สําหรับ มวล มนุษยชาติ."
