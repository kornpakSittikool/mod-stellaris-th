 ####################################
 # Army Attachments
 ####################################
 army_attachment_mobile_shield_generators:0 "เครื่องกําเนิดเกราะ โมบาย"
 army_attachment_mobile_shield_generators_desc:0 "§Lเครื่องกําเนิดไฟฟ้าดําเนินการบนรถติดตามขนาดใหญ่ ซึ่งสร้างสนามป้องกัน กว่าส่วนหนึ่งของสนามรบ เมื่อการดําเนินงานทําให้เกิดการป้องกันที่ดี ต่อปืนใหญ่และวงโคจรระเบิด§!"
 army_attachment_personal_shields:0 "หน่วยป้องกันส่วนบุคคล"
 army_attachment_personal_shields_desc:0 "§Lเครื่องกําเนิดเกราะมีขนาดเล็กพอ ที่จะดําเนินการบนหลังของบุคคลเดียว สนามพลังของพวกเขาสามารถเต็มไปด้วยไฟที่ยึดเหนี่ยวได้ แต่นี้ยังคงพอที่จะเพิ่มอายุ ทหารในสนามรบได้อย่างมาก§!"
 army_attachment_military_police_corps:0 "กรมตํารวจทหาร"
 army_attachment_military_police_corps_desc:0 "§Lตํารวจทหารจํานวนมาก มันมีประโยชน์ในแถวหน้า แต่การปรากฏตัวของพวกเขา สามารถปรับปรุงวินัยของหน่วย§!"
 army_attachment_battle_strider_column:0 "คอลัมน์ของสู้รบกับสตริดเดอร์"
 army_attachment_battle_strider_column_desc:0 "§Lรถหุ้มเกราะหุ้มเกราะที่วิ่งได้ เกือบทุกพื้นที่ ความ ยืดหยุ่น และ ความ ยืดหยุ่น ของ มัน ทํา ให้ พวก เขา มี ข้อ ได้ เปรียบ ที่ โดด เด่น ใน การ สู้ รบ แม้ ว่า พวก เขา จะ เสี่ยง ต่อ การ โจมตี ที่ ตรง ไป ที่ ขา.§!"
 army_attachment_hover_tank_battle_group:0 "กลุ่มต่อสู้รถถังข้าม"
 army_attachment_hover_tank_battle_group_desc:0 "§Lชุดเกราะที่แข็งแรงแต่เคลื่อนที่เร็ว ที่ใช้ตัวขับเคลื่อนยก เพื่อยกตัวเหนือพื้นดินเล็กน้อย แม้ ว่า น้ํา หนัก ของ มัน จะ มี จํากัด บ้าง แต่ ความ เร็ว และ ความ กระฉับกระเฉง ของ มัน ก็ ชดเชย ได้ เมื่อ เทียบ กับ รถยนต์ ที่ ติด ตาม กัน ทั่ว ไป.§!"
 army_attachment_assault_landers:0 "ผู้ ก่อ การ ร้าย"
 army_attachment_assault_landers_desc:1 "§Lยานทิ้งระเบิดขนาดใหญ่เหล่านี้ ถูกใช้ในการขนส่งกองทัพและอุปกรณ์หนัก ไปยังพื้นผิวดาวเคราะห์ ภายใต้สภาวะการรบ§!"
 army_attachment_orbital_drop_pods:0 "ยานลงจอดผิวดาวดรอปพ็อด"
 army_attachment_orbital_drop_pods_desc:0 "§Lกระสวยสําหรับวางเดี่ยว ที่จะถูกเปิดตัวไปยังพื้นผิวของดาวเคราะห์ จากเรือในวงโคจร ขณะ ที่ ยัง ต้อง นํา อุปกรณ์ ที่ หนัก กว่า นี้ เข้า มา พร้อม กับ เครื่อง บิน ลง จอด แต่ ฝัก เหล่า นี้ ทํา ให้ เวลา ที่ ใช้ ไป ระหว่าง วง โคจร กับ ดาว เคราะห์ ตก ลด ลง อย่าง มาก ระหว่าง การ รุกราน ของ ดาว เคราะห์.§!"
 army_attachment_neo_concrete_fortifications:0 "ป้อมนีโอครีต"
 army_attachment_neo_concrete_fortifications_desc:0 "§Lชั้นนอกสุดของกําแพงพื้นดิน และเครือข่ายบังเกอร์ นี่ จํากัด การ เคลื่อน ที่ ของ กองทัพ แต่ อาจ เป็น ปัจจัย ใน การ ตัดสิน ใจ ใน การ ป้องกัน.§!"
 army_attachment_self_replicating_mine_fields:0 "การจําลองตัวเอง"
 army_attachment_self_replicating_mine_fields_desc:0 "§Lกับระเบิดกึ่งรถ ที่เลียนแบบตัวเองอย่างต่อเนื่อง เพื่อรักษาจํานวน การล้างตัวเองของระเบิดเหล่านี้ อาจเป็นเรื่องยากเป็นพิเศษ โดยเฉพาะในระหว่างการต่อสู้§!"
 army_attachment_air_defense_artillery:0 "การ ป้องกัน ทาง อากาศ"
 army_attachment_air_defense_artillery_desc:0 "§Lการสะสมระบบอาวุธขนาดใหญ่ ออกแบบมาเพื่อติดตาม และโจมตีวัตถุที่เคลื่อนที่อย่างรวดเร็ว§!"
 army_attachment_chemical_stimulants:0 "สาร ประกอบ ทาง เคมี"
 army_attachment_chemical_stimulants_desc:0 "§Lเครื่องดื่มเคมีที่มีประสิทธิภาพ ออกแบบมาเพื่อเพิ่มความตระหนักรู้และการตอบสนองของทหาร การ ออก กําลัง กาย ทํา ให้ มี การ ใช้ เวลา มาก ขึ้น แต่ การ ใช้ งาน ต่อ ไป อาจ ยัง ผล ให้ เกิด ความ กังวล, ซึม เศร้า, ชัก, คลื่นไส้, ภาพหลอน, นอนไม่หลับ และ ไม่ สามารถ ควบคุม ได้.§!"
 army_attachment_xeno_cavalry:0 "การ สู้ วัว"
 army_attachment_xeno_cavalry_desc:0 "§Lสัตว์ สงคราม ที่ แข็ง แรง เหล่า นี้ เป็น ภูเขา ที่ ยอด เยี่ยม เมื่อ มัน ได้ สร้าง ความ สัมพันธ์ กับ ผู้ ขี่ ม้า ของ มัน แล้ว. พวกเขาสามารถผ่านเกือบทุกภูมิประเทศ และได้พิสูจน์อย่างมีประสิทธิภาพมากในการสํารวจและโจมตีบทบาท มี การ ใช้ ตัว อย่าง ขนาด ใหญ่ กว่า นี้ อีก ด้วย เพื่อ เป็น ฐาน อาวุธ ที่ หนัก กว่า.§!"
 army_attachment_psi_warriors:0 "นักรบ PSI"
 army_attachment_psi_warriors_desc:0 "§Lนัก รบ ชั้น ยอด เหล่า นี้ ถูก ห่อ หุ้ม ด้วย ความ ลึกลับ ไว้ ด้วย การ พึ่ง อาศัย ความ สามารถ ของ พวก ซิ นิก ที่ ทรง พลัง และ การ ฝึก ทาง กายภาพ อย่าง กว้าง ขวาง เพื่อ เคลื่อน ที่ ไป สู่ สมรภูมิ. พวก เขา ชอบ ต่อ สู้ อย่าง ใกล้ ชิด กับ คู่ ต่อ สู้ และ หลาย คน ชํานาญ มาก ใน การ ใช้ อาวุธ เม ลี.§!"
 army_attachment_gene_warrior_shock_troops:0 "กองทัพ นัก รบ จีน"
 army_attachment_gene_warrior_shock_troops_desc:0 "§Lนัก รบ ที่ กล้า หาญ ซึ่ง มี หอ สูง เหนือ ทหาร ทั่ว ไป ใช้ ได้ ดี ที่ สุด ใน ฐานะ เป็น กอง ทหาร ที่ ช็อก หรือ กอง กําลัง โจมตี เคลื่อน ที่ ซึ่ง การ ต่อ สู้ รุนแรง ที่ สุด. บาง ครั้ง บริษัท ของ เครื่อง บิน เหล่า นี้ อาจ มี มาก พอ ที่ จะ หัน มา ทํา สงคราม ทั้ง หมด.§!"
 army_attachment_power_armor:0 "พาวเวอร์อาร์เมอร์"
 army_attachment_power_armor_desc:0 "§Lยุทธภัณฑ์ ที่ เสริม ความ สามารถ ตาม ธรรมชาติ ของ ทหาร เพิ่ม ความ เข้ม แข็ง และ ความ อด ทน ของ พวก เขา. นอก จาก นี้ ยุทธภัณฑ์ นี้ ยัง ช่วย ให้ พวก เขา สามารถ มี น้ํา หนัก มาก ขึ้น ใน การ ป้องกัน รังสี ได้ ดี กว่า รวม ทั้ง สาร เคมี และ ชีวภาพ ด้วย.§!"
 army_attachment_special_forces_group:0 "กลุ่มพลังพิเศษ"
 army_attachment_special_forces_group_desc:0 "§Lคน ที่ ได้ รับ การ ฝึก อบรม อย่าง ดี ซึ่ง เข้า ร่วม ใน การ ดําเนิน งาน แบบ ไม่ เสมอ ต้น เสมอ ปลาย โดย ปกติ แล้ว อยู่ หลัง เส้น ศัตรู อย่าง ลับ ๆ. การสลายตัวของการสื่อสารของฝ่ายศัตรู และการตัดไม้ถูกจัดลําดับความสําคัญ พร้อมกับการกําจัดเป้าหมายที่มีคุณค่าสูงของโอกาส§!"
 army_attachment_shadow_assassins:0 "นักฆ่าเงา"
 army_attachment_shadow_assassins_desc:0 "§Lหน่วยรบพิเศษเหล่านี้ ใส่ชุดล่องหน ราคาแพง ใส่ชุดที่มีเทคโนโลยีปกปิด พวกเขามองไม่เห็นด้วยตาเปล่า และเซ็นเซอร์ส่วนใหญ่ นอกจากการบิดเบี้ยวเล็กน้อย ผู้เชี่ยวชาญในการลอบสังหารและ ปกปิดการรวบรวมข้อมูลทางทหาร§!"
 army_attachment_cyborg_infiltration_unit:0 "ไซบอร์ก แทรกซึมอยู่ในหน่วย"
 army_attachment_cyborg_infiltration_unit_desc:0 "§Lนัก กล กล กล กล กล กล กล เหล่า นี้ สามารถ เปลี่ยน แปลง ได้ อย่าง ดี เยี่ยม ทํา ให้ พวก เขา สามารถ สันนิษฐาน ได้ ว่า สิ่ง มี ชีวิต ชนิด ใด ก็ ตาม ภาย หลัง เนื้อ หนัง ชั้น ที่ เหมาะ สม (ปกติ จะ ได้ มา จาก นัก โทษ ศัตรู) ถูก นํา มา ต่อ เข้า กับ โครง ร่าง ของ ตน. จากนั้นก็แทรกซึมเข้าไปในแนวข้าศึก และแพร่ความโกลาหลออกไป§!"
 army_attachment_hunter_killer_drone_swarms:0 "ฝูงโดรนนักล่า-นักฆ่า"
 army_attachment_hunter_killer_drone_swarms_desc:0 "§Lมี การ ปล่อย ยาน พาหนะ ที่ ค่อน ข้าง ง่าย ใน ตําแหน่ง ศัตรู ออก มา เป็น ฝูง ๆ ด้วย ความ หวัง ว่า จะ ท่วมท้น ยาน เหล่า นั้น. ถึง แม้ เครื่อง บิน เดียว อาจ ไม่ เป็น อันตราย อย่าง ยิ่ง ต่อ ทหาร ที่ ผ่าน การ ฝึก อบรม หลาย สิบ คน ก็ ตาม.§!"
 army_attachment_combat_software_2:0 "ซอฟต์แวร์ต่อสู้ 2. 0"
 army_attachment_combat_software_2_desc:0 "§Lการอัพเกรดอย่างครอบคลุม ในซอฟต์แวร์การต่อสู้ของทุกหน่วยในกองทัพนี้ นี่รวมถึงการปรับปรุงการตอบสนองเวลา การปรับปรุงอัลกอริทึมการวิเคราะห์ยุทธวิธี และแก้ไขบั๊กจํานวนมหาศาล§!"
 army_attachment_exploding_slave_collars:0 "การ ทํา งาน เยี่ยง ทาส"
 army_attachment_exploding_slave_collars_desc:0 "§Lปลอกคอ เหล่า นี้ ติด อยู่ กับ พวก ทาส (ที่ อยู่ อาศัย ขึ้น อยู่ กับ กายวิภาค) และ อาจ ถูก ระเบิด ด้วย สัญญาณ ที่ อยู่ ห่าง ไกล หาก พวก เขา ทํา สิ่ง ที่ ขัด กับ ความ ประสงค์ ของ นาย. ผู้ บัญชา การ ที่ ฉลาด สุขุม เป็น ที่ รู้ กัน ว่า มี การ ระเบิด ปลอกคอ ระหว่าง การ สู้ รบ รอบ ด้าน เพื่อ ก่อ ความ เสีย หาย แก่ กอง กําลัง ศัตรู.§!"
 army_attachment_slaver_raiding_teams:0 "ทีม ขนทาส"
 army_attachment_slaver_raiding_teams_desc:0 "§Lทีมค้าทาสเหล่านี้ จํานวนมากประกอบด้วยอดีตทาสเอง ใช้การโจมตีตีและวิ่ง บนพื้นที่ด้านหลังของศัตรู หลัง จาก มี การ ปรับ ตัว อย่าง รวด เร็ว แล้ว ทาส ที่ ถูก จับ ได้ ก็ ถูก ส่ง ตัว ไป อยู่ ใน สมรภูมิ ต่อ ต้าน เพื่อน เก่า ของ ตน.§!"
 army_attachment_commissar_squads:0 "หมู่"
 army_attachment_commissar_squads_desc:0 "§Lเพราะ เหตุ ใด? มี การ ใช้ การ กระทํา ที่ ทารุณ ทารุณ และ ทารุณ อื่น ๆ เพื่อ ทํา ให้ พวก บ่าว กลัว ว่า พวก ศัตรู จะ กําเริบ ขึ้น.§!"
 army_attachment_clone_suicide_brigade:0 "การ ฆ่า ตัว ตาย ของ โคล อน"
 army_attachment_clone_suicide_brigade_desc:0 "§Lพวก นัก วิจัย ได้ ค้น พบ ซาก ปรัก หัก พัง ของ เมือง นี้. การ กระทํา ที่ ก่อ ความ หวาด กลัว โดย ไม่ รู้ ตัว นี้ มัก ก่อ ความ เสีย หาย อย่าง มาก ต่อ กําลังใจ ของ ศัตรู.§!"
 army_attachment_clone_commandos:0 "คอมมานโดของโคลน"
 army_attachment_clone_commandos_desc:0 "§Lฆาตกรที่โตเป็นผู้ใหญ่เหล่านี้ มีราคาแพงที่จะผลิต แต่ความยืดหยุ่นและการฝึกอย่างสุดขั้ว พวกเขามีความคิดอิสระมากกว่าพวกโคลนธรรมดา และแบบจําลองบางแบบก็เป็นที่รู้จักดี ว่าเกิดความประหลาด§!"
 army_attachment_hypnotic_training_regimen:0 "การ ฝึก อบรม แบบ หน้า ซื่อ ใจ คด"
 army_attachment_hypnotic_training_regimen_desc:0 "§Lทหารโคลนได้รับการฝึกมาอย่างดี นอกเหนือการควบคุมปกติ การ ทํา เช่น นี้ ยิ่ง ทํา ให้ การ ต่อ สู้ มี ประสิทธิภาพ ดี ขึ้น แม้ ว่า จะ มี หน่วย ที่ มี อายุ ยืน กว่า ช่วง ชีวิต ของ พวก เขา มาก นัก ใน สมรภูมิ บาง ครั้ง มี แนว โน้ม จะ ป่วย ทาง จิต.§!"
 army_attachment_psi_shield_specialists:0 "โปรแกรมพิเศษป้องกัน PSI"
 army_attachment_psi_shield_specialists_desc:0 "§Lผู้สังเกตการณ์ที่ได้รับการฝึกมาเป็นพิเศษ ให้ฉายโล่ที่ทรงอํานาจ เหนือตําแหน่งที่เป็นมิตรในสนามรบ เกราะนี้สามารถมีประสิทธิภาพพอ ๆ กับสนามพลังงานทั่วไป แต่การรักษามันต้องใช้ความเข้มข้นอย่างมาก§!"
 army_attachment_telekinetic_specialists:0 "ผู้เชี่ยวชาญด้านเทเลกิเนติก"
 army_attachment_telekinetic_specialists_desc:0 "§Lผู้ ชํานัญ พิเศษ ด้าน ดนตรี ซึ่ง ได้ แสดง ความ สามารถ เฉพาะ อย่าง ใน การ ควบคุม สิ่ง แวด ล้อม ของ ตน. ใน สภาพ แวด ล้อม ที่ เหมาะ สม พวก เขา สามารถ เหวี่ยง ทหาร และ รถ ของ ศัตรู ลง ไป ใน อากาศ หรือ ถอน เครื่อง บิน จาก ฟ้า แล้ว ซัด ลง ดิน.§!"
 army_attachment_class_a_psi_operative:0 "การปฏิบัติการระดับ ASI"
 army_attachment_class_a_psi_operative_desc:0 "§Lปัจเจกบุคคลต่าง ๆ ที่มีอํานาจในวงศ์มาก โดยปกติแล้วจะมีผลข้างเคียงที่โชคร้าย พวกเขาเป็นอันตรายอย่างมาก ทั้งกับตัวเองและสภาพแวดล้อมของพวกเขา แต่สามารถเป็นอาวุธที่น่ากลัว เมื่อพลังงานทําลายล้างของพวกเขา§!"
 army_attachment_infestation_brood:0 "โบรด อินฟราเรด"
 army_attachment_infestation_brood_desc:0 "§Lเมื่อ ถูก ปล่อย ออก มา สัตว์ ที่ มี ความ รุนแรง เหล่า นี้ เสาะ หา เจ้า ภาพ เพื่อ จะ ปลูก ฝัง ลูก หลาน ของ มัน ทันที. ทั้ง นี้ ทํา ให้ พวก เขา สามารถ ผสม พันธุ์ ได้ ใน อัตรา ที่ สูง ลิ่ว และ เมือง ทั้ง หมด ก็ สามารถ ถูก กวาด ล้าง ได้ ภาย ใน ไม่ กี่ วัน. ไม่ ต้อง บอก ว่า การ ที่ พวก เขา อยู่ ด้วย ไม่ มี ผล กระทบ ใน ทาง ดี ต่อ กําลังใจ ของ ศัตรู.§!"
 army_attachment_brood_coordinator:0 "โบรด โคร์ดิเนเตอร์"
 army_attachment_brood_coordinator_desc:0 "§Lสัตว์ขนาดมหึมาที่คล้ายปลอกกระสุนนี้ ถูกเก็บไว้ในแนวหน้า เพื่อปรับปรุงการประสานงานของสัตว์ที่หิวกระหาย มันใช้สัญญาณไซโซนิคระดับต่ํา เพื่อสื่อสารกับกลุ่ม และเสียงร้องเรียนที่ไม่เกี่ยวข้องกับกลิ่นของมัน§!"
 army_attachment_battle_worms:0 "หนอนสงคราม"
 army_attachment_battle_worms_desc:0 "§Lอนุภาคขนาดใหญ่เหล่านี้ได้รับการดัดแปลงพันธุกรรม เพื่อโพรงผ่านพื้นดิน, ผ่านการป้องกันของศัตรูและอนุญาตให้สัตว์ขนาดเล็ก อุโมงค์ ที่ พวก เขา ขุด ยัง ทํา ให้ เป็น ที่ หลบ ภัย ที่ ดี เยี่ยม จาก การ ระเบิด ของ วง โคจร ด้วย.§!"
 army_attachment_raptor_flocks:0 "แกะ ป่า"
 army_attachment_raptor_flocks_desc:0 "§Lนัก บิน ผู้ มี ความ สามารถ ที่ จะ บิน ด้วย ความ เร็ว สูง สุด เป็น ระยะ ๆ. พวก มัน โจมตี ใน ฝูง สัตว์, ทํา ให้ เกิด กระแส หนาม ที่ แข็ง ตัว ซึ่ง สามารถ เจาะ ทะลุ เกราะ ส่วน ใหญ่ ได้. ถ้า เครื่อง บิน ลํา ใด บิน เข้า สู่ บรรยากาศ เหนือ รัง ของ สัตว์ เหล่า นี้ เสี่ยง ต่อ การ ถูก โจมตี.§!"
 army_attachment_advanced_power_armor:0 "Archor ขั้นสูง"
 army_attachment_advanced_power_armor_desc:0 "§Lเสื้อ เกราะ ราคา แพง เหล่า นี้ แทบ จะ แพง พอ ๆ กับ นัก รบ ยีน. พวก เขา เพิ่ม ความ แข็ง แกร่ง ของ ผู้ ใช้ มาก ขึ้น อยู่ แล้ว และ เครื่อง บิน ไอพ่น ก็ ให้ การ เคลื่อน ไหว เพิ่ม ขึ้น. เพื่อดําเนินการ สูทต้องสวม เพื่อสร้างสัญญาณประสาท§!"
 army_attachment_environmental_augmentations:0 "สิ่ง แวด ล้อม"
 army_attachment_environmental_augmentations_desc:0 "§Lการ ปรับ ปรุง ต่อ ไป ใน ปอด และ ระบบ ภูมิ คุ้ม กัน ทํา ให้ นัก รบ ยีน สามารถ ทํา งาน ได้ โดย ไม่ มี ความ เสีย หาย ใน สภาพ แวด ล้อม ที่ เป็น ปฏิปักษ์ แม้ แต่ การ ดูด ฝุ่น อวกาศ ใน ช่วง เวลา จํากัด.§!"
 army_attachment_cybernetic_replacements:0 "การแทนที่แบบไซเบอร์"
 army_attachment_cybernetic_replacements_desc:0 "§Lอวัยวะ และ อวัยวะ ต่าง ๆ ที่ ได้ รับ ความ เสีย หาย หรือ สูญ เสีย ไป ใน การ รบ ถูก แทน ที่ ด้วย การ ปลูกถ่าย ระบบ ไซเบอร์ อัน ทัน สมัย ซึ่ง ทํา ให้ นัก รบ ที่ พิการ คง อยู่ ใน งาน รับ ใช้ แม้ แต่ หลัง จาก ได้ รับ บาด เจ็บ อย่าง หนัก.§!"

