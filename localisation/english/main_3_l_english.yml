 ARC_EMITTER_2:0 "เครื่องปล่อยอาร์กไฟฟ้าแบบโฟกัสเป้าหมาย"
 ARC_EMITTER_2_DESC:0 "ตัวปล่อยแสงที่อัพเกรดเหล่านี้ มีเลนส์โฟกัสที่ดีขึ้น ส่งผลให้เกิดพลังงานที่มีประสิทธิภาพมากขึ้น"
