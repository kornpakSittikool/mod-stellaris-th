 DISRUPTOR_2:0 "เครื่องรบกวนไอออน"
 DISRUPTOR_2_DESC:0 "อนุภาคไอออนทําลายล้างมากขึ้นที่เป้าหมาย โดยไม่ต้องเสียสละอัตรายิงของอดีตของพวกเขา"
 DISRUPTOR_3:0 "เครื่องรบกวนควอนตัม"
