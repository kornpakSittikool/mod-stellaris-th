 SUBJECT_dominion:0 "อาณานิคม"
 SUBJECT_DESC_dominion:0 "โดมิเนียนเป็นประเภทที่อิสระทางการทูต แต่จ่าย§Y25%§!ของเดือนของพวกเขาเครดิตพลังงานถึงแร่เพื่อเป็นเกียรติแก่เจ้านาย พวกเขายังถูกบังคับให้ใช้จรรยาบรรณของพวกเขา"
