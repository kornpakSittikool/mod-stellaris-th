#  Empire Edicts
 edict_capacity_overload:0 "ความจุพลังงานเกินพิกัด"
 edict_capacity_overload_desc:2 "พิธีกรนี้ช่วยให้ตารางพลังงานที่มากเกินไปในระยะสั้น ทําให้โรงไฟฟ้าข้ามจักรวรรดิของเรา ทํางานที่ความสามารถที่เพิ่มขึ้น"
 edict_production_targets:0 "ผลิตตามเป้าหมาย"
 edict_production_targets_desc:1 "พระราชบัญญัติฉบับนี้เป็นการมุ่งเน้นไปที่การบริหารจัดการ เพื่อปฏิรูปและกําจัดเป้าหมายการผลิตขึ้นมาใหม่ ส่งผลให้ผลลัพธ์ของเหมืองแร่เพิ่มขึ้น"
 edict_farming_subsidies:0 "สนับสนุนการทำฟาร์ม"
 edict_farming_subsidies_desc:1 "พระ ราช กฤษฎีกา นี้ ทํา ให้ เกิด แรง กระตุ้น ทาง เศรษฐกิจ ที่ รุนแรง เพื่อ ส่ง ผล กระทบ ที่ ดี และ น่า ทึ่ง ต่อ การ ผลิต อาหาร."
 edict_propaganda:0 "เผยแพร่โฆษณาชวนเชื่อ"
 edict_propaganda_desc:1 "พระ ราช กฤษฎีกา นี้ สร้าง กลไก การ ส่ง ข้อมูล อย่าง กว้าง ขวาง ซึ่ง ทํา ให้ แน่ ใจ ว่า มี การ คง ไว้ ซึ่ง เรื่อง ราว ที่ เสมอ ต้น เสมอ ปลาย และ เป็น ไป ใน ทาง บวก."
 edict_information_quarantine:0 "กักเก็บข้อมูลไว้อย่างเข้มงวด"
 edict_information_quarantine_desc:1 "พระราชบัญญัติฉบับนี้ให้การตรวจสอบอย่างเข้มงวดเกี่ยวกับข้อมูล การรักษาอัตลักษณ์ทางวัฒนธรรมในท้องถิ่นที่ดีกว่า"
 edict_encourage_free_thought:1 "ส่งเสริมความคิดทางการเมือง"
 edict_encourage_free_thought_desc:1 "พระ ราช กฤษฎีกา นี้ สนับสนุน ประชาชน ให้ พิจารณา เรื่อง การ เมือง อย่าง เปิด เผย แม้ ว่า แนว ทาง นั้น อาจ ชัก นํา พวก เขา ให้ หลง."
 edict_map_the_stars:0 "แผนที่ดวงดาว"
 edict_map_the_stars_desc:0 "พระบาทสมเด็จพระเจ้าอยู่หัวนี้ผลักดันสําหรับการสํารวจกาแล็กซี่ต่อไปที่จะนําแสงไปยังความมืด และพบว่าสิ่งที่มหัศจรรย์อยู่นอกเหนือ"
 edict_map_the_stars_2:0 "$edict_map_the_stars$"
 edict_map_the_stars_2_desc:0 "$edict_map_the_stars_desc$"
 edict_research_focus:0 "ทุนอุดหนุนการวิจัย"
 edict_research_focus_desc:0 "พระ ราช กฤษฎีกา นี้ ทํา ให้ นัก วิจัย ของ เรา มี เงิน ทุน เพิ่ม ขึ้น."
 edict_research_focus_hive:0 "โฟกัสเครื่องคิดของเราบนแนวคิดใหม่ ที่ค่าใช้จ่ายของความรู้อื่น ๆ ทั้งหมด"
 edict_research_focus_machine:0 "ประมวลผลความเหลื่อมล้ําของพลังงานเพื่อปรับโครงสร้างแบบจําลองและลดความสําคัญในการค้นหาอื่น ๆ"
 edict_social_welfare_programs:0 "โครงการสวัสดิการสังคม"
 edict_social_welfare_programs_desc:0 "พระ ราช กฤษฎีกา นี้ กําหนด โครงการ สังคม ต่าง ๆ จํานวน มาก ซึ่ง มี ค่า ใช้ จ่าย ค่อน ข้าง มาก เพื่อ ช่วย ชีวิต ประชาชน."
 #edict_the_grand_fleet:0 "The Grand Fleet"
 #edict_the_grand_fleet_desc:0 "This Edict puts the pride and glory of the Empire's Grand Fleet above all else, and that considerable political focus should be spent ensuring its continued prosperity."
 edict_share_the_burden:0 "รับภาระเหมือนกัน"
 edict_share_the_burden_desc:1 "พระ ราช กฤษฎีกา นี้ ใช้ การ หมุน เวียน งาน และ ตาราง เวลา ทํา งาน สําหรับ ผู้ รับ ใช้ ที่ ไม่ ได้ รับ การ รับรอง เนื่อง จาก การ กลั่น แกล้ง ที่ หลาก หลาย อาจ ทํา ให้ เกิด ผล ที่ ดี."
 # edict_share_the_burden_desc: "This Edict dictates that the various burdens of society should be given to those best suited to handle them. Manual labour is best left to those used to such tasks..."
 edict_peace_festivals:0 "งานรื่นเริงสันติสุข"
 edict_peace_festivals_desc:1 "พระ ราช กฤษฎีกา นี้ ส่ง เสริม น้ําใจ แห่ง เอกภาพ และ ความ ยินดี ตลอด ทั้ง ฤดู กาล ที่ เต็ม ไป ด้วย เหตุ การณ์ และ เทศกาล พิเศษ."
 edict_land_of_opportunity:0 "ดินแดนแห่งโอกาส"
 edict_land_of_opportunity_desc:2 "พระบรมราชโองการนี้ได้สร้างแคมเปญประชาสัมพันธ์ที่มุ่งร้าย ที่วางกรอบจักรวรรดิของเรา ว่าอยู่บนขอบขอบเหว ชายแดนทางสังคมใหม่"
 edict_diplomatic_grants:0 "สนับสนุนทางการทูต"
 edict_diplomatic_grants_desc:2 "พระบาทสมเด็จพระเจ้าอยู่หัวนี้เริ่มการรุกรานทางการทูต ด้วยความพยายามร่วมกันเพื่อปรับปรุงภาพลักษณ์ของจักรวรรดิของเรา"

 edict_engineering_research_focus_hive:0 "โฟกัสเครื่องคิดของเราบนแนวคิดวิศวกรรมใหม่ ที่ค่าใช้จ่ายของความรู้อื่น ๆ ทั้งหมด"
 edict_engineering_research_focus_machine:0 "ประมวลผลความเหลื่อมล้ําของพลังงานเพื่อปรับโครงสร้างแบบจําลองและลดความสําคัญในการค้นหาอื่น ๆ"
 edict_physics_research_focus_hive:0 "โฟกัสหุ่นยนต์คิดของเราบนแนวคิดฟิสิกส์ใหม่ ที่ค่าใช้จ่ายของความรู้อื่น ๆ ทั้งหมด"
 edict_physics_research_focus_machine:0 "การประมวลผลความเหลื่อมล้ําระหว่างพลังงานกับแบบจําลองทางฟิสิกส์ และระดับความสําคัญต่ําบนเส้นทางการวิจัยอื่น ๆ"
 edict_society_research_focus_hive:0 "โฟกัสเครื่องคิดของเราบนแนวคิดสังคมใหม่ ที่ค่าใช้จ่ายของความรู้อื่น ๆ ทั้งหมด"
 edict_society_research_focus_machine:0 "ประมวลผลความเหลื่อมล้ําของพลังงานเพื่อทําให้แบบจําลองทางทฤษฎีของสังคมมีโฟกัส และลดความสําคัญในการค้นหาอื่น ๆ"

 # Campaigns
 edict_fear_campaign:0 "รณรงค์เรื่องความหวาดกลัว"
 edict_fear_campaign_desc:0 "ลักษณะที่ชั่วร้ายและโหดร้ายของซีโน จะต้องได้รับการสื่อสารกับคนของเรา พวกเขาต้องยอมรับความจริง ว่าเรายืนอยู่คนเดียว ในทะเลแห่งความสกปรกของเอเลี่ยน"
 edict_education_campaign:0 "รณรงค์เรื่องการศึกษา"
 edict_education_campaign_desc:0 "กลับไปโรงเรียน! โดยการใช้ทรัพยากรไปชั่วขณะเพื่อส่งเสริมโครงการการศึกษาชั้นสูงในหมู่ผู้นําของเรา ทักษะของพวกเขาจะพัฒนาได้เร็วขึ้น"
 edict_healthcare_campaign:0 "รณรงค์การดูแลสุขภาพ"
 edict_healthcare_campaign_desc:1 "อาหาร การ ออก กําลัง กาย เป็น ประจํา และ การ หลับ โดย ส่ง เสริม รูป แบบ ชีวิต ที่ มี สุขภาพ ดี อายุ ของ พวก เขา จะ สูง ขึ้น."
 edict_recycling_campaign:0 "รณรงค์เรื่องการรีไซเคิล"
 edict_recycling_campaign_desc:0 "ประชาชนต้องถูกสอนให้จํากัดการบริโภคทรัพยากรที่ฟุ่มเฟือย การรณรงค์เพื่อส่งเสริมการรีไซเคิลของสาธารณชน จะลดต้นทุนของสินค้าผู้บริโภคลงชั่วขณะ"
 edict_robot_campaign:0 "รณรงค์เรื่องโดรน"
 edict_robot_campaign_desc:0 "โดยการเพิ่มทรัพยากรให้กับโรงงานผลิตของเรา เราสามารถผลิตหุ่นยนต์แรงงานรุ่นใหม่ได้ ในอัตราที่เร็วขึ้น"
 edict_machine_learning_campaign:0 "รณรงค์เรื่องการเรียนรู้ของเครื่องจักร"
 edict_machine_learning_campaign_desc:0 "โดยการเพิ่มทรัพยากรให้กับหุ่นยนต์อัตโนมัติ พวกเขาสามารถเพิ่มอัตรา ที่อัลกอริทึมเรียนรู้ด้วยตนเองของพวกเขา จะปรับปรุงผลผลิตโดยรวม"
 edict_drone_campaign:0 "รณรงค์เรื่องโดรน"
 edict_drone_campaign_desc:0 "เรา สามารถ สร้าง หุ่นยนต์ ทํา งาน แบบ ใหม่ ได้ เร็ว กว่า เดิม."
 edict_learning_campaign:0 "รณรงค์เรื่องการเรียนรู้"
 edict_learning_campaign_desc:0 "โดยให้หุ่นยนต์อัตโนมัติของเรา ด้วยสารอาหารเพิ่มเติม เราสามารถเพิ่มผลผลิตของมัน"
 edict_war_drone_campaign:0 "รณรงค์เรื่องโดรนสงคราม"
 edict_war_drone_campaign_desc:0 "โดยเพิ่มสารอาหารให้กับหุ่นยนต์สงคราม เราจะสามารถเพิ่มความแข็งแกร่งและความพร้อมของหุ่นยนต์ได้"

 # Planet Edicts
 #edict_reeducation_campaign:0 "Reeducation Campaigns"
 #edict_reeducation_campaign_desc:1 "This Edict creates local reeducation campaigns, affirming that dissent is naught but the product of ignorance and a failure of reason."
 #edict_infrastructure_projects:0 "Infrastructure Projects"
 #edict_infrastructure_projects_desc:1 "This Edict puts considerable political weight behind new construction initiatives."
 #edict_social_engineering:0 "Social Engineering"
 #edict_social_engineering_desc:2 "This Fanatic Authoritarian Edict mandates the use of subtle social instruments to reinforce our governing Ethics on the planet."
 #edict_privatization_campaign:1 "Grassroots Administration"
 #edict_privatization_campaign_desc:2 "This Fanatic Egalitarian Edict encourages the individuals closest to the production effort to take increased responsibility."
 #edict_arms_race:0 "Arms Race"
 #edict_arms_race_desc:0 "This Fanatic Militarist Edict focuses all administrative and societal efforts on efficient production of military equipment."
 #edict_religious_unity:1 "Spiritual Unity"
 #edict_religious_unity_desc:1 "This Fanatic Spiritualist Edict unites the populace in quasi-religious fervor, with a particular emphasis on harvest and fertility rituals."
 #edict_spirit_of_science:0 "Spirit of Science"
 #edict_spirit_of_science_desc:0 "This Fanatic Materialist Edict focuses all administrative and societal efforts on efficient research and the celebration of Reason."
 #edict_legal_aliens:0 "Legal Aliens"
 #edict_legal_aliens_desc:0 "This Fanatic Xenophile Edict launches a massive PR campaign inviting aliens to come live on the planet in a glorious multicultural paradise."
 #edict_purity_laws:0 "Purity Laws"
 #edict_purity_laws_desc:0 "This Fanatic Xenophobe Edict ensures the purity of our species and unity of our empire through the enforcement of rigid separation laws."
 edict_crystal_sonar:0 "คริสตัลโซนาร์"
 edict_crystal_sonar_desc:0 "ช่วยให้เราได้สั่งซื้อกองเรือของเรา เพื่อใช้เทคนิคพิเศษเมื่อพบกับ คริสตัลไลน์\nค่าใช้จ่าย:£energy£ §R-30§!"
 edict_droning_optimizations:0 "เพิ่มประสิทธิภาพโดรน"
 edict_droning_optimizations_desc:3 "§Lแบบจําลองหลังจากเทคนิคการทําเหมืองแร่โบราณ โครงสร้างของพลังงานนี้ จะเพิ่มผลผลิตทรัพยากรของเรา§!"
 edict_greater_crystal_bounty:0 "รางวัลคริสตัลขนาดใหญ่"
 edict_greater_crystal_bounty_desc:1 "§Lสั่งฝูงบินของเราให้กําจัดแร่ธาตุ ที่ถูกทําลายไป§!\nระเบิดต่อกองเรือได้พ่ายแพ้§G500§!"
 edict_crystal_bounty:0 "คริสตัลรางวัล"
 edict_crystal_bounty_desc:1 "§Lสั่งฝูงบินของเราให้กําจัดแร่ธาตุ ที่ถูกทําลายไป§!\nระเบิดต่อกองเรือได้พ่ายแพ้§G250§!"
 edict_drone_bounty:0 "โดรนรางวัล"
 edict_drone_bounty_desc:1 "§Lสั่งให้กองเรือของเรากู้เซลล์พลังงาน ของการพ่ายแพ้ในเหมืองแร่โบราณ§!\nมูลค่าพลังงานต่อกองเรือ พ่ายแพ้:§G500§!"
 edict_declare_saint:0 "ประกาศนักบุญ"
 edict_declare_saint_desc:0 "พระ บรม เดชานุภาพ นี้ จะ ประทาน ความ เป็น นักบุญ แก่ คน ที่ ตาย ไป แล้ว ซึ่ง ดําเนิน ชีวิต ด้วย ความ เลื่อมใส ศรัทธา โดย เฉพาะ สร้าง สัญลักษณ์ การ รวม กัน ใหม่."

 # Ambitions
 unity_ambition:0 "ความปรารถนาฯ:"
 edict_scientific_revolution:0 "$unity_ambition$ การปฏิวัติทางวิทยาศาสตร์"
 edict_scientific_revolution_desc:0 "ยุค ทอง ที่ สั้น แต่ ก่อ ให้ เกิด ผล มาก ของ การ ค้น พบ ทาง วิทยาศาสตร์. การ รวม กัน ของ ความ กลัว, การ มอง ใน แง่ ดี และ การ มอง ใน แง่ ดี อาจ ทํา ให้ คุณ ห่าง ไกล."
 edict_desperate_measures:0 "$unity_ambition$ มาตรการเข้าตาจน"
 edict_desperate_measures_desc:0 "สัตว์หัวมุมนั้น อันตรายมาก เพราะศัตรูของเราจะรู้ในไม่ช้า ไม่ ต้อง พยายาม ทํา อะไร เพื่อ ให้ แน่ ใจ ว่า เรา จะ รอด ชีวิต ต่อ ไป."
 edict_fortress_proclamation:0 "$unity_ambition$ ประกาศป้องกันเต็มอัตรา"
 edict_fortress_proclamation_desc:0 "อาณาเขตของเราจะเป็นเส้นที่ไม่อาจหลีกเลี่ยงได้ และมันจะถ่ายทอดข่าวสารที่ชัดเจน"
 edict_architectural_renaissance:0 "$unity_ambition$ สถาปัตยกรรมยุคฟื้นฟูศิลปวิทยา"
 edict_architectural_renaissance_desc:0 "มันเป็นการก่อสร้างในระดับที่ คนรุ่นก่อนๆ ฝันถึง โครงสร้างเมก้าอาจกลายเป็น มรดกที่แท้จริงของอารยธรรมของเรา"
 edict_hearts_and_minds:0 "$unity_ambition$ หัวใจและความคิด"
 edict_hearts_and_minds_desc:0 "ความพยายามในการโฆษณาชวนเชื่ออย่างเข้มข้น ที่จะทําให้ประชาชนเข้าใจถึงข้อดีของตําแหน่งรัฐบาล ใน ที่ สุด ก็ เพื่อ ประโยชน์ ของ พวก เขา เอง."
 edict_omnifarious_acquisition:0 "$unity_ambition$ ต้องการแร่ทุกอย่างที่เป็นไปได้"
 edict_omnifarious_acquisition_desc:0 "ทุก สิ่ง ที่ สามารถ เก็บ ไว้ ได้ จะ นํา มา รีไซเคิล และ ใช้ อีก. ความทะเยอทะยานของเราต้องการทรัพยากรทั้งหมดที่เราสามารถหาได้"
 edict_grand_fleet:0 "$unity_ambition$ กองยานขนาดใหญ่"
 edict_grand_fleet_desc:0 "ความ ทะเยอทะยาน ของ เรา ใน เรื่อง กามารมณ์ เรียก ร้อง ให้ มี การ ก่อ สร้าง แกรนด์กองยานต้องเป็นเป้าหมายหลักของเรา"

