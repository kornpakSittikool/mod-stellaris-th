 city_first_hive_1_desc: "ทุกเส้นความคิดจะติดตามมาถึงจุดนี้ ที่มาของการที่เราเริ่มตระหนักถึงตัวเราเอง"
 city_colony_hive_1_desc: "ดาว เคราะห์ ดวง นี้ ไม่ คุ้น เคย และ จังหวะ ของ ดาว ดวง นี้ ไม่ สม่ําเสมอ. มันจะเป็นไปตามความประสงค์ของเราในไม่ช้า"
 city_foundry_hive_1_desc: "วัสดุดิบถูกปั่นโดยโรงกลั่น เป็นเครื่องมือแข็งของสงคราม"
 city_research_hive_1_desc: "เรา ยืด จิตใจ ของ เรา ออก ไป ใน การ แสวง หา ความ เข้าใจ."
 city_fortress_hive_1_desc: "โลกนี้ดูดซับความเจ็บปวดและการแก้แค้น"
 city_synapse_hive_1_desc: "จากสถานที่แห่งนี้ พินัยกรรมของเราจะแผ่ออกไปด้านนอก การปรากฏตัวของเราไม่อาจเงียบได้ แม้ในความว่างเปล่าที่เยือกเย็นที่สุด"
 city_logistics_hive_1_desc: "นิ ว รอน, เครื่อง มือ, และ ส่วน ประกอบ ต่าง ๆ ถูก นํา ไป ใช้ โดย การ คํานวณ โดย สัญชาตญาณ."

 city_machine_core_1: "ประมวลผลกลาง" # homeworld and capital
 city_colony_machine_1: "โพรโทคอลที่ทํางานอยู่"
 city_industrial_machine_1: "รูปแบบอุตสาหกรรมผสม"
 city_factory_machine_1: "อุตสาหกรรมพลเรือน"
 city_foundry_machine_1: "ธุรกิจหนัก"
 city_research_machine_1: "อาร์เรย์ผู้รู้"
 city_fortress_machine_1: "เส้นกริดควบคุมเส้นรุ้ง"
 city_unity_machine_1: "แกนรับเชื้อ"
 city_unity_bio_trophy_machine_1: "พฤติกรรมขององค์กร"
 city_logistics_machine_1: "ชิน ฮะ"

 city_machine_core_1_desc: "จุดกําเนิดของการทํางานต่อเนื่อง คําสั่งเริ่มต้น หลักประจําตัว และลําดับตรรกะระดับสูง ถูกคอมไพล์ที่เว็บไซต์นี้"
 city_colony_machine_1_desc: "พารามิเตอร์ของสภาพแวดล้อม: หน่วยกึ่งอัตโนมัติยังคงปรับภูมิประเทศและโครงสร้างพื้นฐาน ความสามารถระยะยาว: ภายใต้การประเมิน"
 city_industrial_machine_1_desc: "การแสดงผลแบบแอ ล ลอยสมดุลกับโปรโตคอลที่ไม่เกี่ยวข้องกับกองทัพ ความเหมาะสมที่รักษาไว้ ผ่านความเหมาะสมของเวลาจริง"
 city_factory_machine_1_desc: "ทรัพยากรถูกเปลี่ยนมาผลิตอุปกรณ์ที่ห้ามใช้"
 city_foundry_machine_1_desc: "ความสําคัญของ: ขัดขวางการผลิตอัลลอย วัสดุที่จะแปลงเป็น ทรัพย์สินของกองทัพเรือที่สูงสุดผ่าน ระดับความเสื่อมโทรมของสิ่งแวดล้อม: ยอมรับได้"
 city_research_machine_1_desc: "การ จําลอง แบบ, การ ยืน ยัน สมมุติฐาน, และ การ ใช้ อัลกอริทึม อย่าง ผิด ๆ เพื่อ ทํา ภาย ใต้ การ แยก ตัว ของ หน่วย ย่อย เพื่อ หลีก เลี่ยง การ ปน เปื้อน ของ ต้น ไม้ เชิง ตรรกะ."
 city_fortress_machine_1_desc: "แบบจําลองการคาดเดา แสดงให้เห็นว่าพร้อมรับมือ คาดหวังการต้านทานสูงสุด"
 city_unity_machine_1_desc: "การวินิจฉัยภายในและการสอดประสานกัน สําคัญมาก อัลกอริธึมดริดแก้ไข"
 city_unity_bio_trophy_machine_1_desc: "ออกแบบทรัพยากรสําหรับ ที่อยู่อาศัยชีวภาพ-โทรฟี และการปรับตัว การบําบัดทางจิตวิทยา มีส่วนร่วม กิจกรรม ที่ เกิด ผล: การ เฝ้า ดู. การตัดสินใจด้วยตนเอง: ไม่เปิดเผย"
 city_logistics_machine_1_desc: "กองยานความ ซื่อ สัตย์ มั่นคง และ การ เกื้อ หนุน จาก ดาว เคราะห์ ยัง คง มี อยู่ โดย ทาง การ บอก ล่วง หน้า เกี่ยว กับ ความ ต้องการ ของ เซลล์. ความอดทนเสียศูนย์"

