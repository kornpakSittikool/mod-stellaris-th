 PLANET_KILLER_NEUTRON_DESC:0 "การ แผ่ รังสี นิวตรอน ออก ไป อย่าง รวด เร็ว\"ทาสี\" พื้นผิวของโลก วัสดุที่เสื่อมโทรมอย่างร้ายแรง และทําลายเนื้อเยื่อทางชีวภาพโดยตรง"
 PLANET_KILLER_GODRAY:1 "เครื่องฉายแสงศักดิ์สิทธิ์"
 PLANET_KILLER_GODRAY_ACTION:0 "เปล่งแสงศักดิ์สิทธิ์"
 PLANET_KILLER_GODRAY_DESC:1 "เครื่อง ฉาย แบบ ไซ โอ นิก ฉาย ความ จริง ของ พระเจ้า ลง บน โลก เพื่อ ทํา ให้ ผู้ เชื่อ ถือ แท้ จาก ทุก คน ที่ สามารถ เชื่อ ได้ และ ทํา ให้ คน เหล่า นั้น ที่ ไม่ มี ความ เชื่อ ได้ รับ ความ เสีย หาย."
 PLANET_KILLER_NANOBOTS:1 "เครื่องกระจายนาโนบอท"
 PLANET_KILLER_NANOBOTS_ACTION:0 "ไซเบอร์"
 PLANET_KILLER_NANOBOTS_DESC:0 "นาโนบอทกระจายอยู่ในบรรยากาศ พวกเขาแพร่เชื้อให้กับสิ่งมีชีวิตที่กินได้ และสร้างตัวเองขึ้นมาใหม่ ให้กลายเป็นระบบไซเบอร์เนติก ที่เปลี่ยนโฮสต์ที่ไม่สามารถฆ่าได้"
 PLANET_KILLER_DELUGE:0 "เครื่องทำฝนเทียม"
