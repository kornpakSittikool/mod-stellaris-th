 policy_voting_rights:0 "สิทธิในการเลือกตั้ง"
 policy_voting_rights_desc:0 "การ แต่ง ตั้ง ผู้ ปกครอง อาจ ใช้ หลาย รูป แบบ ซึ่ง การ ลง คะแนน เสียง แบบ ประชาธิปไตย เป็น วิธี เดียว เท่า นั้น ที่ เป็น ไป ได้.\n"
 voting_not_allowed:0 "ไม่มีการโหวต"
 voting_not_allowed_name:0 "ไม่มีการโหวต"
 voting_not_allowed_desc:1 "การ เลือก ผู้ ปกครอง เป็น เรื่อง สําคัญ เกิน ไป ที่ จะ มอบ การ ตัดสิน ใจ ไว้ กับ ประชาชน.\n\n§Eไม่ประชากรสามารถลงคะแนนเสียง ทายาทบัลลังก์จะกลายเป็นผู้ปกครองคนต่อไป§!"
 voting_allowed_elites_only:0 "อภิสิทธิชน"
 voting_allowed_elites_only_name:0 "การ ตัดสิน ใจ ของ ชาว เอ ไลท์"
 voting_allowed_elites_only_desc:0 "คําถามเรื่องความเป็นผู้นํา ที่ดีที่สุดจะฝากไว้กับสมาชิกที่เคารพและมีความรู้ของสังคม\n\n§Eไม่ประชากรสามารถลงคะแนน, ผู้นําของจักรวรรดิจะตัดสินในการเลือกตั้ง§!"
 voting_allowed_primary_only:0 "เผ่าพันธุ์แรกเริ่มดั้งเดิมเท่านั้น"
 voting_allowed_primary_only_name:0 "หลักเผ่าพันธุ์เดอะชราวด์"
 voting_allowed_primary_only_desc:1 "สิทธิในการลงคะแนนเป็นความรับผิดชอบที่ร้ายแรง และต้องเฉพาะสายพันธุ์หลักของเรา\n\n§Eเท่านั้นประชากรของพวกเราเองเผ่าพันธุ์สามารถลงคะแนนเสียงในการเลือกตั้งประชาธิปไตย§!"
 voting_allowed_all:0 "ให้โหวตเสรี"
 voting_allowed_all_name:0 "เดอะชราวด์"
 voting_allowed_all_desc:1 "กฎของจักรวรรดิควร สะท้อน พระทัย ประสงค์ ของ ประชาชน และ พวก เขา ทุก คน ต้อง เป็น ส่วน ของ กระบวนการ.\n\n§Eทั้งหมดประชากรสามารถลงคะแนนเสียงในการเลือกตั้งประชาธิปไตย§!"

 policy_leadership:0 "ผู้นำ"
 policy_leadership_desc:0 "สิ่งมีชีวิตทุกคนอาจไม่เหมาะกับผู้นําพอๆ กัน และเราต้องตัดสินใจว่า ใครควรได้รับอนุญาตให้ผ่าน\n"
 leadership_primary_only:0 "ผู้นำที่เป็นเผ่าพันธุ์แรกเริ่มดั้งเดิมเท่านั้น"
 leadership_primary_only_name:0 "ผู้นำที่เป็นเผ่าพันธุ์แรกเริ่มดั้งเดิมเท่านั้น"
 leadership_allow_dominant_only_name:0 "ผู้นำที่เป็นเผ่าพันธุ์แรกเริ่มดั้งเดิมเท่านั้น"
 leadership_primary_only_desc:0 "ในขณะที่เราอาจยอมรับ การปรากฏตัวของสิ่งมีชีวิตต่างชาติภายในของเราจักรวรรดิตําแหน่งผู้นําจะต้องยังคง เฉพาะสายพันธุ์หลักของเรา\n\n§Eเท่านั้นประชากรของพวกเราเองเผ่าพันธุ์สามารถสร้างผู้นํา§!"
 leadership_allow_xeno:0 "อนุญาตให้เป็นต่างดาวได้"
 leadership_allow_xeno_name:0 "อนุญาตให้ต่างดาวเป็นผู้นำได้"
 leadership_allow_xeno_desc:0 "ของเราจักรวรรดิอย่าเปลืองความร่ํารวยของความสามารถของเราจักรวรรดิไม่ว่าแหล่งไหน\n\n§Eป๊อปของอื่น ๆเผ่าพันธุ์สามารถสร้างผู้นํา§!"
 leadership_allow_robot:0 "อนุญาตให้เป็นหุ่นแอนดรอยด์ได้"
 leadership_allow_robot_name:0 "ผู้ นํา ของ สาร สังเคราะห์ อนุญาต"
 leadership_allow_robot_desc:0 "สิ่งมีชีวิตสังเคราะห์จักรวรรดิส่วนใหญ่ในสังคม เป็น เรื่อง ธรรมดา ที่ พวก เขา จะ ได้ รับ อนุญาต ให้ ดํารง ตําแหน่ง ผู้ นํา เช่น กัน.\n\n§Eสังเคราะห์แสงประชากรสามารถสร้างผู้นํา§!"
 leadership_allow_all:0 "อนุญาตทั้งหมด"
 leadership_allow_all_name:0 "ทั้งหมดผู้นำประเภทที่อนุญาต"
 leadership_allow_all_desc:0 "บุคคลที่มีความสามารถ, ซีโน หรือ สังเคราะห์ ควรได้รับอนุญาตให้แสวงหาตําแหน่งผู้นํา\n\n§Eป๊อปของทุกประเภทสามารถสร้างผู้นําได้§!"

 policy_leader_enhancement:0 "การเพิ่มประสิทธิภาพผู้นำ"
 policy_leader_enhancement_desc:0 "ภาระของจักรวรรดิอาจสลายได้ และเราต้องตัดสินใจ ว่าผู้นําในอนาคตจะพร้อมรับมันอย่างไร\n"
 leader_enhancement_natural_selection:0 "คัดเลือกโดยธรรมชาติ"
 leader_enhancement_natural_selection_name:0 "ไม่ผู้นำเพิ่มขนาด"
 leader_enhancement_natural_selection_desc:0 "ให้ธรรมชาติเลือกเส้นทางของมัน มันอยู่ในห้วงแห่งประสบการณ์ ที่อัจฉริยะถูกสร้างขึ้น\n\n§Eผู้นําไม่ได้รับโบนัสเพิ่มเติม§!"
 leader_enhancement_selected_lineages:0 "เชื้อสายที่ถูกเลือก"
 leader_enhancement_selected_lineages_name:0 "Selected Leader Lineages"
 leader_enhancement_selected_lineages_desc:0 "การวางแผนสืบพันธุ์อย่างระมัดระวัง ควรได้รับการส่งเสริม กลัวว่าเราจะเสียพันธุกรรมอันมีค่าไป\n\n§Hในขณะที่ใช้งานของเราจักรวรรดิคะแนน:§!"
 leader_enhancement_capacity_boosters:0 "เพิ่มสมรรถนะและประสิทธิภาพ"
 leader_enhancement_capacity_boosters_name:0 "ความจุ"
 leader_enhancement_capacity_boosters_desc:0 "เราไม่ทิ้งโอกาสโดยไม่คำนึงถึงต้นทุน เราสร้างผู้นำแห่งวันพรุ่งนี้ด้วยการดูแลจัดการธนาคารดีเอ็นเออย่างเข้มงวด\n\n§Hหากใช้งานข้อนี้จักรวรรดิของเราจะได้รับ:§!"

 policy_border_policy:0 "สถานะชายแดนเริ่มต้น"
 policy_border_policy_desc:0 "ขอบเขตของจักรวรรดิของเรา แสดงถึงความเข้าใจของเรามาก บนจักรวาลของตัวเอง เราต้องตัดสินใจว่าพวกเขาจะเปิด และต้อนรับหรือปิด และป้องกัน อารยธรรมอื่น ๆ ที่เราอาจจะพบ\n"
 border_policy_open:0 "เปิด"
 border_policy_open_name:0 "เปิดเขตแดน"
 border_policy_open_desc:0 "ความสงสัยและการสงสัย เชิญความขัดแย้ง ให้พวกเราแสดงให้เพื่อนบ้านเห็น ว่าเราไม่มีอะไรต้องปิดบัง\n\n§Eพรมแดนจะเปิดให้จักรวรรดิอื่นๆ ตั้งแต่เริ่มต้น§!"
 border_policy_closed:0 "ปิด"
 border_policy_closed_name:0 "ปิดเขตแดน"
 border_policy_closed_desc:0 "อาณาเขตของจักรวรรดิของเรา ต้องได้รับการพิทักษ์อย่างดี เกรงว่าเราจะตกเป็นเหยื่อ ของอิทธิพลที่ซ่อนอยู่ เฉพาะผู้ที่ได้พิสูจน์ตัวเองคุ้มค่า อาจเข้ามาในพื้นที่ของเรา\n\n§Eพรมแดนจะปิดเส้นทางไปยังจักรวรรดิอื่นๆ ตั้งแต่เริ่มต้น§!"

 policy_first_contact_protocol:0 "ภาษาที่ใช้ในการติดต่อครั้งแรก"
 policy_first_contact_protocol_desc:0 "ในขณะที่เราเดินทางผ่านดาว มีความเป็นไปได้ที่แน่นอน ของการค้นหาสิ่งมีชีวิตอื่น ๆ และเราต้องการมี\n"
 first_contact_proactive:0 "การทูตเชิงรุก"
 first_contact_proactive_name:0 "โพรโทคอลติดต่อแบบเคลื่อนไหว"
 first_contact_proactive_desc:1 "การ พบ กับ อารยธรรม ต่าง ดาว เป็น โอกาส ที่ น่า ตื่น เต้น ที่ จะ สร้าง เพื่อน ใหม่ ๆ และ การ ค้น พบ ใหม่ ๆ. เราจะทําอย่างเต็มที่ของเราเพื่อให้แน่ใจว่าการสัมผัสครั้งแรกเกิดขึ้นอย่างราบรื่น ลูกเห็บเรือที่ไม่รู้จักด้วยคําทักทาย ความเป็นจริงและสําเนาของ สารานุกรมมาตรฐานอย่างเป็นทางการของเรา\n\n$first_contact_proactive_effects$"
 first_contact_proactive_effects:0 "§E- ไม่สามารถโจมตียานที่เป็นกลางได้\n- จักรวรรดิอื่นๆหาวิธีเริ่มการติดต่อกับเราได้ง่ายขึ้น\n- ได้รับอิทธิพล £influence£ เพิ่มขึ้น 50% เมื่อประสบความสำเร็จในการติดต่อครั้งแรกในแต่ละครั้ง§!\n\n"
 first_contact_cautious:0 "ระมัดระวัง"
 first_contact_cautious_name:0 "โพรโทคอลสําหรับติดต่อ"
 first_contact_cautious_desc:1 "เรา จะ ใช้ ทุก มาตรการ เพื่อ ป้องกัน ไม่ ให้ ข้อมูล เกี่ยว กับ ตัว เรา เอง ตก เข้า สู่ มือ ของ คน ต่าง ด้าว ก่อน ที่ เรา ได้ ตัดสิน ใจ ว่า พวก เขา จะ เป็น เพื่อน หรือ เป็น ศัตรู กัน.\n\n$first_contact_cautious_effects$"
 first_contact_cautious_effects:0 "§E- ไม่สามารถโจมตียานที่เป็นกลางได้\n- ประเทศอื่นๆจะหาวิธีเริ่มการติดต่อกับเราได้ยากขึ้น\n- เหตุการณ์เชิงลบในการติดต่อครั้งแรกมีโอกาสน้อยที่จะเกิดขึ้นกับเรา§!\n\n"
 first_contact_attack_allowed:0 "ก้าวร้าว"
 first_contact_attack_allowed_name:0 "โพรโทคอลติดต่อแบบก้าวร้าว"
 first_contact_attack_allowed_desc:2 "อันตราย ที่ ไม่ รู้ จัก อาจ ซ่อน อยู่ ท่ามกลาง ดวง ดาว. เพื่อความอยู่รอดอย่างต่อเนื่องของเรา เราจะต้องพร้อมที่จะโจมตีโดยไม่ลังเล\n\n$first_contact_attack_allowed_effects$"
 first_contact_attack_allowed_effects:0 "§E- สามารถโจมตียานที่เป็นกลางได้\n- เปิดใช้งานตัวเลือกการติดต่อครั้งแรกที่ไม่เป็นมิตร เช่น การลักพาตัวและการชำแหละ§!\n\n"

 policy_food_policy:0 "นโยบายด้านอาหาร"
 policy_food_policy_desc:0 "จักรวรรดิของเรามีปากที่หิวกระหาย เพื่อ จะ แน่ ใจ ได้ ว่า อาหาร จะ ไม่ กลาย เป็น ปัญหา เรา ต้อง ทํา ให้ ความ ต้องการ ของ ประชากร สมดุล กับ ความ จําเป็น ที่ เรา ต้อง เติบโต."

 food_policy_normal:0 "ความ สมดุล ด้าน อาหาร"
 food_policy_normal_name:0 "$food_policy_normal$"
 food_policy_normal_desc:0 "ประชากรของเราจะตอบสนองความต้องการด้านโภชนาการของพวกเขาทั้งหมด แต่อาหารเป็นทรัพยากรที่มีค่า และของเสียไร้สาระ ควรหลีกเลี่ยง\n\n§Eออร์แกนประชากรมีการใช้อาหารปกติและความเร็วการเติบโต§!"

 food_policy_rationing:0 "การจัดอันดับสูงสุด"
 food_policy_rationing_name:0 "$food_policy_rationing$"
 food_policy_rationing_desc:0 "ในยามที่ต้องการ เราทุกคนจะต้องเสียสละเพื่อสิ่งที่ดีกว่า อะไร คือ ความ อดอยาก บ้าง ใน ขณะ นี้ เมื่อ อนาคต อัน รุ่ง โรจน์ ของ เรา รอ อยู่?\n\n"

 food_policy_generous:0 "ความอุดมสมบูรณ์ด้านอาหาร"
 food_policy_generous_name:0 "$food_policy_generous$"
 food_policy_generous_desc:1 "มันเป็นสิทธิพื้นฐานของประชากรแต่ละคน ที่จะเข้าสู่การจําศีลด้วยอวัยวะย่อยอาหาร การ รับ ประทาน อาหาร อย่าง อุดม บริบูรณ์ จะ เป็น เชื้อ เพลิง ที่ กระตุ้น การ เจริญ เติบโต ของ เรา ท่ามกลาง ดวง ดาว."

