 RED_LASER:0 "เลเซอร์แดง"
 RED_LASER_DESC:0 "ไฟ ปืน เลเซอร์ พุ่ง แสง ไป ที่ เป้า หมาย ทํา ให้ เกิด ความ เสีย หาย ใน ชั่ว อายุ ที่ ร้อน จัด."
 BLUE_LASER:0 "เลเซอร์ฟ้า"
 BLUE_LASER_DESC:0 "มี พลัง มาก กว่า เลเซอร์ สี แดง สาร ไว ไฟ สี น้ําเงิน เหล่า นี้ ปล่อย รังสี แม่เหล็กไฟฟ้า ออก มา ใน ระยะ ทาง ที่ ดู เหมือน สี น้ําเงิน หรือ สีม่วง ไป ยัง อินทรีย์ ส่วน ใหญ่."
 UV_LASER:0 "เลเซอร์ยูวี"
 UV_LASER_DESC:0 "เลเซอร์อัลตราไวโอเลตเป็นรุ่นที่ทันสมัยและมีประสิทธิภาพมากขึ้น ของรุ่นสีฟ้าของพวกเขา อาวุธ เหล่า นี้ สามารถ ก่อ ความ เสีย หาย ร้าย แรง."
 XRAY_LASER:0 "เลเซอร์ฟิล์ม X"
 XRAY_LASER_DESC:0 "เลเซอร์เหล่านี้มีความยาวที่สั้นกว่า อาวุธเลเซอร์แบบยูวี แต่ยิ่งทําลายมากขึ้น"
 GAMMA_LASER:0 "เลเซอร์แกมมา"
 GAMMA_LASER_DESC:0 "รังสีแม่เหล็กไฟฟ้า ที่ปล่อยมาจากเลเซอร์แกมม่า เป็นความถี่ที่สูงมาก ศักยภาพในการทําลายของพวกเขา คือ การสะสมอาวุธเลเซอร์"

 SPACEPORT_LASER:0 "เลเซอร์สถานีท่ายานอวกาศ"
 SPACEPORT_LASER_DESC:1 "เลเซอร์ที่จอดเทียบท่า มีลักษณะการติดตามเป้าหมายที่ยอดเยี่ยม เพื่อชดเชยความผันผวนของยานอวกาศเอง"

 ENERGY_LANCE_1:0 "หอกอนุภาค"
 ENERGY_LANCE_1_DESC:1 "อาวุธที่หนักเหล่านี้ยิงเน้นคานอนุภาค ที่ก่อให้เกิดความเสียหายอย่างมาก"
 ENERGY_LANCE_2:0 "หอกอนุภาคแทคีออน"
 ENERGY_LANCE_2_DESC:1 "ทวนอนุภาคที่มีประสิทธิภาพมากขึ้นนี้ อาวุธนี้ยิงคานเตจี้ของ อํานาจมหาศาล"
