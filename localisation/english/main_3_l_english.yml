 mission_technological_enlightenment_9:1 "$mission_technological_enlightenment_0$"
 mission_technological_enlightenment_9_desc:1 "$mission_technological_enlightenment_0_desc$"
 mission_covert_infiltration:0 "แทรกซึมแอบแฝง"
 mission_covert_infiltration_desc:0 "เจ้าหน้าที่ถูกดัดแปลงพันธุกรรม ให้ปรากฏในฐานะสมาชิกของประชากรพื้นเมือง และถูกส่งไปแทรกซึมอยู่ในสังคมของพวกเขา พวก เขา จะ ค่อย ๆ เข้า มา แทน ที่ ผู้ นํา ของ โลก และ เตรียม โลก ให้ พร้อม สําหรับ การ ผนวก เข้า ด้วย กัน กับ เรา.\n\nปฏิบัติการที่ซับซ้อนนี้ คุ้มค่าเฉพาะกับอารยธรรมอุตสาหกรรม\n\n§Eเมื่อเสร็จสิ้นภารกิจนี้จะผนวกโลก และให้ชนพื้นเมืองขนาดใหญ่ แต่ความสุขชั่วคราว§!\n\n"

