 PLANET_KILLER_DELUGE_DESC:0 "น้ําปริมาณมากทิ้งบนโลก กําจัดสิ่งก่อสร้างเทียมทั้งหมด และสิ่งมีชีวิตภาคพื้นดิน น้ําท่วมมาพร้อมกับก๊าซชั้นบรรยากาศ ที่จําเป็นในการทําให้สภาพภูมิอากาศของโลก คงที่และรักษา มหาสมุทรโลก"

