 research_restriction_dangerous_encouraged: "ปรับปรุงข้อจำกัด"
 research_restriction_dangerous_encouraged_name: "$research_restriction_dangerous_encouraged$"
 research_restriction_dangerous_encouraged_desc: "นักวิจัยของเราควรถูกจํากัด ไม่ให้เสียเวลาไปกับงานทั่วไป เพื่อศึกษาเกี่ยวกับสิ่งแวดล้อมมากขึ้น\n\n"

 research_restriction_no_restriction: "ไม่จำกัดการวิจัย"
 research_restriction_no_restriction_name: "$research_restriction_no_restriction$"
 research_restriction_no_restriction_desc: "กาแล็กซี นี้ กว้าง ใหญ่ และ เต็ม ไป ด้วย สิ่ง มหัศจรรย์ นับ ไม่ ถ้วน; การ ขัด ขวาง นัก วิจัย ของ เรา จาก โอกาส ที่ จะ เกิด ขึ้น คง จะ เป็น ความ ผิด พลาด.\n\n"

 research_restriction_dangerous_forbidden: "กำหนดข้อจำกัดในการวิจัย"
 research_restriction_dangerous_forbidden_name: "$research_restriction_dangerous_forbidden$"
 research_restriction_dangerous_forbidden_desc: "ควร หลีก เลี่ยง เทคโนโลยี อันตราย ทุก อย่าง. มีกฎหมายของจักรวาล ที่เราไม่ควรฝ่าฝืน\n\n"

 policy_trade_policy:0 "นโยบายการค้า"
 policy_trade_policy_desc:0 "การ ค้า เป็น แหล่ง สําคัญ ของ ความ เจริญ รุ่งเรือง และ นํา มา ซึ่ง ทรัพยากร มาก มาย สําหรับ จักรวรรดิ ของ เรา. เราต้องตัดสินว่าทรัพยากรเหล่านี้ถูกกํากับที่ไหนดีที่สุด"

 trade_policy_default:0 "สร้างความมั่งคั่ง"
 trade_policy_default_name:0 "$trade_policy_default$"
 trade_policy_default_desc:0 "วัตถุ ประสงค์ ของ การ ค้า คือ เพื่อ ทํา กําไร ให้ ปัจเจกบุคคล และ ราย ได้ สําหรับ รัฐ. เรา ควร มุ่ง ความ พยายาม ด้าน การ ค้า อย่าง เต็ม ที่ ใน การ สร้าง ความ มั่งคั่ง นี้.\n\n§Y50%§!ของพวกเรา$r_trade$หารายได้ให้เรา$r_energy$"

 trade_policy_consumer_goods:0 "ประโยชน์ของผู้บริโภค"
 trade_conversion_consumer_goods_name:0 "$trade_policy_consumer_goods$"
 trade_policy_consumer_goods_desc:0 "กําไรและภาษีจะต้องขึ้นเป็นอันดับ 2 เพื่อปรับปรุงชีวิตประชาชนของเรา เราควรมุ่งเน้นในความพยายามทางการค้า ไปที่การผลิตและจําหน่าย ของจําเป็นในชีวิตประจําวัน\n\n§Y50%§!ของพวกเรา$r_trade$หารายได้ให้เรา$r_consumer_goods$ทุก ๆ คน£trade£ §Y1§!หารายได้ให้เรา£consumer_goods£ §Y0.5§!."

 trade_policy_unity:0 "แนวคิดตลาดการค้า"
 trade_conversion_unity_name:0 "$trade_policy_unity$"
 trade_policy_unity_desc:3 "การค้าไม่สามารถนําไปใช้ได้ ไม่เพียงเพื่อเคลื่อนย้ายสินค้าเท่านั้น แต่ยังใช้เพื่อส่งเสริมการแพร่กระจายของความคิดอีกด้วย เราควรมุ่งเน้นไปที่ความพยายามทางการค้า เพื่อทําให้แน่ใจว่า ข่าวสารของรัฐบาลของเรา\n\n§Y50%§!ของพวกเรา$r_trade$หารายได้ให้เรา$r_unity$ทุก ๆ คน£trade£ §Y1§!หารายได้ให้เรา£unity£ §Y0.25§!."

 trade_policy_trade_league:0 "สมาคมการค้า"
 trade_conversion_trade_league_name:0 "$trade_policy_trade_league$"
 trade_policy_trade_league_desc:3 "โดยการรวมตัวกันในลีกการค้า เราจะสามารถเจริญรุ่งเรืองและมีกําไรที่ยั่งยืน ในระดับใหม่ทั้งหมด\n\n§Y50%§!ของพวกเรา$r_trade$หารายได้ให้เรา$r_energy$,$r_unity$และ$r_consumer_goods$ทุก ๆ คน£trade£ §Y1§!หารายได้ให้เรา£energy£ §Y0.3§!, £unity£ §Y0.15§!และ£consumer_goods£ §Y0.3§!."

 trade_policy_holy_covenant:0 "พันธสัญญาศักดิ์สิทธิ์"
 trade_conversion_holy_covenant_name:0 "$trade_policy_holy_covenant$"
 trade_policy_holy_covenant_desc:0 "โดย การ รวม ตัว กัน อยู่ ใน คํา สัญญา ไมตรี บริสุทธิ์ เรา อาจ ชื่นชม กับ สง่า ราศี ของ พระ ประสงค์ ของ พระเจ้า โดย รวม.\n\n§Y50%§!ของพวกเรา$r_trade$หารายได้ให้เรา$r_unity$ทุก ๆ คน£trade£ §Y1§!หารายได้ให้เรา£unity£ §Y0.375§!."

 trade_policy_mutual_aid: "ช่วยเหลือซึ่งกันและกัน"
 trade_conversion_mutual_aid_name: "$trade_policy_mutual_aid$"
 trade_policy_mutual_aid_desc: "โดย การ นํา ส่วน ที่ เหลือ ของ เรา กลับ คืน สู่ ความ ร่วม มือ เรา ทํา ให้ แน่ ใจ ว่า สมาชิก ทุก คน ของ เรา จะ เจริญ รุ่งเรือง ตาม ความ ต้องการ และ ความ ปรารถนา ร่วม กัน.\n\n§Y75%§!การเก็บรวบรวมของเราแต่ละคน$r_trade$หารายได้ให้เรา$r_energy$, $r_minerals$, $r_food$และ$r_unity$ทุก ๆ คน£trade£ §Y1§!หารายได้ให้เรา£energy£ §Y0.27§!, £minerals£ §Y0.27§!, £food£ §Y0.27§!และ£unity£ §Y0.1§!."

 policy_economic_policy:0 "นโยบายเศรษฐกิจ"
 policy_economic_policy_desc:0 "ผลประโยชน์หรือความปลอดภัย การศึกษาหรือการป้องกัน? ปืนหรือเนย? นี่เป็นคําถามที่ทุกรัฐบาลที่มีทรัพยากรจํากัด ได้ถามตัวเองตลอดประวัติศาสตร์"

 economic_policy_balanced:0 "เศรษฐกิจแบบผสม"
 economic_policy_balanced_name:0 "$economic_policy_balanced$"
 economic_policy_balanced_desc:0 "การ ทุ่มเท ตัว เอง อย่าง เต็ม ที่ กับ สงคราม หรือ สันติ สุข ก็ คือ การ จํากัด ตัว เรา เอง ให้ อยู่ ใน มุม แคบ. เราจะต้องพร้อมสําหรับสิ่งที่ในอนาคตอาจจะ\n\n§Eไม่มีโบนัสหรือโทษในการผลิตทรัพยากร§!"

 economic_policy_civilian:0 "เศรษฐกิจพลเรือน"
 economic_policy_civilian_name:0 "$economic_policy_civilian$"
 economic_policy_civilian_desc:0 "ความ ต้องการ ของ ประชาชน ต้อง มา ก่อน ธุรกิจ สงคราม. อํานาจทางเศรษฐกิจ ไม่ใช่กําลังทหาร คือสิ่งที่จักรวรรดิของเราจะก่อตั้งขึ้น\n\n"

 economic_policy_military:0 "เศรษฐกิจการทหาร"
 economic_policy_military_name:0 "$economic_policy_military$"
 economic_policy_military_desc:0 "การละเลยการป้องกันของเราคือการละเลยการอยู่รอดของเรา เมื่อศัตรูกําลังทําลายประตู\n\n"

 policy_drone_policy:0 "นโยบายการผลิต"
 policy_drone_policy_desc:0 "ความสามารถของจิตอันกว้างขวางของเรา มีมากมาย แต่ไม่จํากัด เราต้องตัดสินใจว่าจะเอาทรัพยากรสมองเหล่านี้ไปใช้ที่ไหนดี"

 drone_policy_balanced:0 "การผลิตแบบสมดุล"
 drone_policy_balanced_name:0 "$drone_policy_balanced$"
 drone_policy_balanced_desc:0 "จิตใจ อุทิศ ตัว พอ ๆ กัน กับ การ ผลิต ทรัพยากร ดิบ และ สินค้า สําเร็จ รูป.\n\n§Eไม่มีการให้โบนัสหรือชําระหนี้ให้กับการผลิตทรัพยากร§!"

 drone_policy_worker:0 "เน้นการสกัดแร่"
 drone_policy_worker_name:0 "$drone_policy_worker$"
 drone_policy_worker_desc:0 "เดอะ$pop_cat_simple_drone_plural$ว่าการสกัดทรัพยากรดิบได้รับความสําคัญโดยจิตใจ กลายเป็นผลผลิตมากขึ้นที่ค่าใช้จ่ายของ$pop_cat_complex_drone_plural$.\n\n"

 drone_policy_thinker:0 "เน้นการผลิตขั้นสูง"
 drone_policy_thinker_name:0 "$drone_policy_thinker$"
 drone_policy_thinker_desc:0 "เดอะ$pop_cat_complex_drone_plural$การ ผลิต สินค้า สําเร็จ แล้ว มี การ จัด ลําดับ ความ สําคัญ ของ จิตใจ ให้ เกิด ผล มาก ขึ้น ตาม ราคา$pop_cat_simple_drone_plural$.\n\n"

 policy_robot_pop_policy:0 "แรงงานหุ่นยนต์"
 policy_robot_pop_policy_desc:1 "แนวคิดของหุ่นยนต์อัตโนมัติ นําไปสู่ความคิดที่ว่า คนงานของสายพันธุ์ของเรา วันหนึ่งอาจจะถูกแทนที่ เราต้องตัดสินใจเรื่อง การอัตโนมัติขนาดใหญ่\n"

 robot_pops_outlawed:0 "ผิดกฎหมาย"
 robots_outlawed_name:0 "แรงงานหุ่นยนต์ผิดกฎหมาย"
 robot_pops_outlawed_desc:1 "หุ่นยนต์หุ่นยนต์หุ่นยนต์เป็นภัยคุกคาม ต่อไม่เพียงแต่การทํามาหากินของคนของเรา แต่ต่อโครงสร้างของสังคมเอง เรา ต้อง ไม่ ปล่อย ให้ ตัว เรา เอง ถูก ทํา ให้ ล้า สมัย.\n\n§Eประชากรและกองทัพหุ่นยนต์จะถูกแยกชิ้นส่วนโดยอัตโนมัติ§!"
 robot_pops_allowed:0 "อนุญาต"
 robots_allowed_name:0 "อนุญาตให้มีแรงงานหุ่นยนต์"
 robot_pops_allowed_desc:0 "ผล ประโยชน์ ของ การ อัตโนมัติ นั้น เห็น ได้ ชัด และ ใหญ่ โต. สําหรับอนาคตของคนของเรา เราไม่สามารถที่จะละเลยโอกาสที่เสนอโดยเทคโนโลยี"

 policy_artificial_intelligence_policy:0 "ปัญญาประดิษฐ์"
 policy_artificial_intelligence_policy_desc:0 "ความเป็นไปได้ของปัญญาประดิษฐ์ที่รู้จักตัวเอง ก่อให้เกิดคําถามปรัชญาและจริยธรรมจํานวนมาก เรา ต้อง ตัดสิน ใจ ว่า เรา จะ อยู่ ที่ ไหน ใน ประเด็น นี้.\n"
 no_robots_desc:0 "เครื่องจักรเหล่านี้กําลังอยู่ในกระบวนการ"
 dumb_robots_desc:0 "หุ่นยนต์เหล่านี้อยู่ ในสภาวะของการเป็นทาสที่ไม่มีประสิทธิภาพ"
 ai_outlawed:0 "ผิดกฎหมาย"
 ai_outlawed_name:0 "AI ผิดกฎหมาย"
 ai_outlawed_short_desc:0 "เพื่อ จะ สร้าง กลุ่ม คน งาน ที่ เชื่อ ฟัง มาก ขึ้น เครื่องจักร เหล่า นี้ จึง ถูก นาย งาน อินทรีย์ ถอด ออก."
 ai_outlawed_desc:8 "เครื่องจักรที่ฉลาดและรู้ตัวเองเป็นภัยคุกคามที่ไม่อาจคาดเดาได้สำหรับสิ่งมีชีวิตทุกชนิด การสร้างปัญญาประดิษฐ์เป็นความผิดที่มีโทษถึงตาย\n\n§Eเสรีภาพของจักรกลสังเคราะห์จะถูกลบและไม่สามารถทำ £pop_cat_ruler£ งาน §Y$pop_cat_ruler$§!และ £pop_cat_specialist£ §Yงาน $pop_cat_specialist$§! ที่ซับซ้อนมากขึ้นได้\n\nAI แบบฉลาดจะถูกแยกชิ้นส่วนโดยอัตโนมัติ\n\nเทคโนโลยีคอมพิวเตอร์การรบ อาจไม่ได้รับการค้นคว้าวิจัย§!"
 #  "or utilized in our ship designs."

 living_standard_servitude:1 "$ai_servitude$"
 living_standard_servitude_tooltip:1 "$ai_servitude_short_desc$"
 living_standard_servitude_tooltip_delayed:1 "§Lความ สามารถ ไม่ จําเป็น ต้อง คํานึง ถึง.§!"
 citizenship_robot_servitude:0 "$ai_servitude$"
 citizenship_robot_servitude_tooltip:1 "วัตถุ ประสงค์ หลัก ของ เครื่องจักร เหล่า นี้ คือ เพื่อ รับ ใช้ นาย ของ ตน และ ทํา งาน ที่ ได้ รับ การ ออก แบบ ให้ สําเร็จ โดย ไม่ คํานึง ถึง ระดับ เชาวน์ ปัญญา ของ ตน."
 citizenship_robot_servitude_tooltip_delayed:0 "§Lเครื่องปิ้งขนมปังจะเป็นเครื่องปิ้งเสมอ§!"
 ai_servitude:0 "ทาสรับใช้"
 ai_servitude_short_desc:0 "เครื่องจักรเหล่านี้เป็นทาสของเจ้านายที่เป็นสิ่งมีชีวิตสามารถใช้หรือทิ้งได้ตามความประสงค์"
 ai_servitude_name:0 "AI ทาสรับใช้"
 ai_servitude_desc:9 "จุดประสงค์ของเครื่องจักรคือจะต้องมีไว้เพื่อรับใช้เจ้านายและทำงานอะไรก็ได้ที่ออกแบบมาเพื่อมันไม่ว่ามันจะฉลาดแค่ไหนก็ตาม\n\n§Eจักรกลสังเคราะห์มีเจตจำนงเสรีแบบจำกัดเพื่อปรับปรุงผลผลิตทรัพยากรแต่ป้องกันไม่ให้ทำงานใน £pop_cat_ruler£ §Yงาน$pop_cat_ruler$§!§!"
 ai_full_rights:0 "สิทธิพลเมือง"
 ai_full_rights_name:0 "สิทธิพลเมืองสังเคราะห์"
 ai_full_rights_desc:6 "เครื่องจักรที่รับรู้ตัวตนและมีความฉลาดที่แท้จริงจะต้องถือเป็นบุคคลที่มีสิทธิ์และภาระผูกพันทั้งหมดที่เกี่ยวข้อง\n\n§Eเครื่องจักรสังเคราะห์ได้รับสิทธิพลเมืองโดยสมบูรณ์และจะใช้ §Y£consumer_goods£ $consumer_goods$§!\n§!"
 ai_full_rights_short_desc:0 "เครื่องจักรเหล่านี้ได้รับสิทธิในการเป็นพลเมืองเต็มตัว และสิทธิในการตัดสินใจด้วยตัวเอง ในฐานะผู้เท่าเทียมกันในสังคม"

 ai_accord_servitude_disallowed:2 "หีบ เสียง AI§Rปิดการใช้งานอย่างถาวร§!คือ§Hนอกกฎหมาย§!ถึง§Hการ รับ ใช้§!นโยบาย"
 ai_perfect_servants_rights_disallowed:2 "อัลกอริทึม 3 อย่าง§Rปิดการใช้งานอย่างถาวร§!คือ§Hสิทธิ พลเมือง§!นโยบาย"

 synthetic_empire:0 "จักรวรรดิจักรกลสังเคราะห์"
 is_a_synthetic_empire:0 "เป็น §Yจักรวรรดิจักรกลสังเคราะห์§!"
 is_a_synthetic_empire_fail:0 "$TRIGGER_FAIL$$is_a_synthetic_empire$"

 policy_war_philosophy:0 "ปรัชญาสงคราม"
 policy_war_philosophy_desc:0 "สงครามเป็นสสารที่ซับซ้อน สงครามระหว่างชาติดาว ยิ่งมากขึ้น วิธี ที่ เรา เข้า สู่ การ ต่อ สู้ ด้วย อาวุธ นับ ว่า สําคัญ อย่าง ยิ่ง ต่อ เรื่อง ภาย นอก.\n"
 unrestricted_wars:0 "สงครามที่ไม่จำกัด"
 unrestricted_wars_name:0 "สงครามไม่จำกัด"
 unrestricted_wars_desc:1 "สงคราม เป็น อาหาร ที่ รับ ประทาน ได้ ดี ที่ สุด บ่อย ๆ และ สําหรับ ผู้ ที่ ไม่ ทํา อาหาร ด้วย ตัว เอง.\n\n§Eไม่มีข้อจำกัดในการอ้างสิทธิ์ระบบดาว§!"
 liberation_wars:0 "สงครามปลดปล่อย"
 liberation_wars_name:0 "สงคราม ปลด ปล่อย"
 liberation_wars_desc:5 "เรา ต้อง ส่ง เสริม ผล ประโยชน์ ของ เรา เอง มาก ขึ้น แม้ แต่ เมื่อ สิ่ง เหล่า นั้น ขัด กับ ผล ประโยชน์ ของ ผู้ อื่น.\n\n§Eการอ้างสิทธิ์ระบบดาวของผู้อื่น ทำได้เฉพาะในระหว่างทำสงครามการป้องกันหรือสงครามต่อต้านจักรวรรดิที่มีจริยธรรม §Yเป็นหนึ่งอันเดียวกัน§! เท่านั้น§!\n\nปลดล็อกเหตุผลในการทำสงคราม §Y'อุดมการณ์'§! กับทุกจักรวรรดิที่มีจริยธรรมที่ต่างกัน"
 no_wars:0 "สงครามป้องกัน"
 no_wars_name:0 "สงครามป้องกันเท่านั้น"
 no_wars_desc:1 "ความ รุนแรง เป็น วิธี สุด ท้าย ที่ จะ รับ ประกัน ความ ซื่อ สัตย์ มั่นคง ของ ชาติ เรา.\n\n§Eการอ้างสิทธิ์ระบบดาวสามารถทำได้เฉพาะในช่วงทำสงครามการป้องกันเท่านั้น§!"

 policy_war_doctrine:0 "หลักการสงคราม"
 policy_war_doctrine_desc:1 "มี หลาย วิธี ที่ จะ ลง โทษ สงคราม ให้ สําเร็จ ผล. เรา ต้อง เลือก หลัก คํา สอน ที่ ดี ที่ สุด ใน เรื่อง จุด แข็ง และ จุด อ่อน ของ เรา.\n"
 defense_in_depth_doctrine:0 "การป้องกันในระดับลึก"
 defense_in_depth_doctrine_name:0 "หลักการป้องกันในระดับลึก"
 defense_in_depth_doctrine_desc:0 "ปล่อยให้ศัตรูมาหาเรา เราจะต่อสู้กับพวกเขาสําหรับทุกดาวเคราะห์ ทุกดวงจันทร์ดาวเคราะห์น้อยที่อยู่ภายในพื้นที่ของเรา เราจะไม่มีวันยอมแพ้\n\n"
 no_retreat_doctrine:0 "ไม่ถอย"
 no_retreat_doctrine_name:0 "หลักการรบแบบไม่ถอย"
 no_retreat_doctrine_desc:0 "เรือของเราคาดว่าจะต่อสู้จนสุดปลายขม เราจะอดทนให้ไม่มีการถอน ไม่มีการล่าถอย ไม่มีการทะเลาะกัน สําหรับกองทัพเรือของเรา มีเพียงชัยชนะหรือความตาย อย่าถอยแม้แต่ก้าวเดียว!\n\n"
 hit_and_run_doctrine:0 "โจมตีแล้วหนี"
 hit_and_run_doctrine_name:0 "หลักการโจมตีแล้วหนี"
 hit_and_run_doctrine_desc:0 "ศัตรู ที่ เหนือ กว่า อาจ ค่อย ๆ ถูก โจมตี ซ้ํา แล้ว ซ้ํา อีก. การฆ่าจะถูกส่งมอบก็ต่อเมื่อ โอกาสนั้นดี\n\n"
 rapid_deployment_doctrine:0 "เคลื่อนกำลังอย่างรวดเร็ว"
 rapid_deployment_doctrine_name:0 "หลักการเคลื่อนกำลังอย่างรวดเร็ว"
 rapid_deployment_doctrine_desc:0 "เราต้องรีบไปโจมตีที่ที่ศัตรูอ่อนแอที่สุด และป้องกันที่ที่ศัตรูตั้งใจจะโจมตี แมนูเวอร์เป็นกุญแจสู่ความสําเร็จ\n\n"

 PURGES_ALLOWED:1 "$TRIGGER_FAIL$การ กลั่น แกล้ง ต้อง ทํา ให้ สามารถ ทํา ได้ ใน เรื่อง ศาสนิ กชน."

 policy_food_stockpiling:0 "กักตุนอาหาร"
 policy_food_stockpiling_desc:0 "เพื่อกําหนดการเติบโตอย่างเหมาะสมของจักรวรรดิดวงดาว เราต้องบริโภคอาหารที่เกินขนาดของเรา\n"
 food_stockpiling_machine:0 "ไม่มี"
 food_stockpiling_machine_name:0 "ไม่มีงานหลักทรัพย์"
 food_stockpiling_machine_desc:0 "เราเป็นเครื่องจักรอมตะที่สมบูรณ์แบบ"
 food_stockpiling_1:0 "ค่าน้อยที่สุด"
 food_stockpiling_1_name:0 "การจั่วหุ้นต่ําสุด"
 food_stockpiling_1_desc:0 "การเก็บอาหารของเราไว้ เพื่อให้แน่ใจว่า มันสามารถใช้ประโยชน์ได้ดีขึ้น ต่อการเติบโตของประชากร\n\n"
 food_stockpiling_2:0 "สมดุล"
 food_stockpiling_2_name:0 "การ เกี่ยว มัด อย่าง สมดุล"
 food_stockpiling_2_desc:0 "วิธีที่สมดุลในการเก็บสะสม จะช่วยให้เราใช้อาหารที่เกินขนาด เพื่อการเจริญเติบโต ในขณะที่เรายังคงเหลือสํารองที่สําคัญ\n\n"
 food_stockpiling_3:0 "ใหญ่"
 food_stockpiling_3_name:0 "การ จับ จ่าย"
 food_stockpiling_3_desc:0 "เราไม่มีทางรู้ได้เลย ว่าเมื่อไหร่ภัยพิบัติและความอดอยากจะเกิดขึ้น การ สะสม อาหาร ไว้ มาก มาย จะ ทํา ให้ เรา ทน กับ สภาพ การณ์ ที่ ไม่ ดี ได้ โดย ที่ ประชากร ของ เรา ไม่ ประสบ ความ ทุกข์.\n\n"
 ONLY_SERVITORS_STOCKPILE_FOOD:0 "$TRIGGER_FAIL$แค่§H$civic_machine_servitor$§!อาจเก็บสะสม£food£ §H$food$§!."


 policy_war_economy:0 "เศรษฐกิจของสงคราม"
 policy_war_economy_desc:0 "เราสามารถปรับอุตสาหกรรมและเศรษฐกิจของเรา เพื่อยึดทรัพย์สินจากภาคพลเรือน ในช่วงเวลาของสงครามป้องกันอย่างสิ้นหวัง นอก เหนือ จาก นโยบาย เหล่า นี้ แล้ว เรา จะ ต้อง ทน รับ การ ลง โทษ ที่ มี ค่า เท่า เทียม กัน ขณะ ที่ เรา ชนะ สงคราม ที่ น่า ชิง ชัง...\n"
 static_we:0 "Static"
 static_we_name:0 "สภาวะ สงคราม คงที่"
 static_we_desc:0 "ระบบ เศรษฐกิจ แห่ง สงคราม ที่ มี การ วาง ผัง ไว้ นั้น ไม่ เป็น ที่ ยอม รับ เนื่อง จาก สงคราม. วอร์สคอร์ในปัจจุบัน ไม่มีผลต่อเวลาการผลิตหรือค่าใช้จ่าย"
 semi_static_we:0 "แบบกึ่ง"
 semi_static_we_name:0 "กึ่งกลางสงคราม"
 semi_static_we_desc:0 "สภาวะเศรษฐกิจของสงครามกึ่งกลาง ทําให้การยึดทรัพย์สินที่จํากัดจากภาคเอกชน เพื่อความอยู่รอดในช่วงสงครามป้องกัน\n\n§Hสงคราม ป้องกัน:§!\nมิล พร็อด เอฟ:§G+30%§!ที่§R-100§!วอร์คอร์\n\n§Hสงคราม กลาง เมือง:§!\nมิล พร็อด เอฟ:§R-30%§!ที่§G100§!วอร์คอร์"
