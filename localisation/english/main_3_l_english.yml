 policy_appropriation:0 "การจัดสรรที่ดินให้"
 policy_appropriation_desc:0 "นโยบายนี้ควบคุม ไม่ว่าเราจะได้ดาวใหม่หรือไม่ ควรจะมีพื้นที่บางส่วน ที่เหมาะสมจากสายพันธุ์ที่ไม่ใช่ไซเซน"
