 PLASMA_1:0 "เครื่องพ่นพลาสมา"
 PLASMA_1_DESC:1 "อาวุธที่ปล่อยลูกบอลทําลายล้าง ของพลาสม่าสูงที่เป้าหมาย กระสุนพลาสม่าเหล่านี้มีประสิทธิภาพอย่างมากในการกิน ผ่านชุดเกราะและเรือ"
 PLASMA_2:0 "เครื่องเร่งพลาสมา"
 PLASMA_2_DESC:0 "เครื่องเร่งอนุภาคใหม่เหล่านี้ปล่อย ลูกกระสุนปืนของพลาสม่าสูงที่มีสนามควบคุมปรับปรุง นี่ส่งผลให้พลังงานรั่วน้อยลง เมื่อกระสุนเดินทางในอวกาศไปยังเป้าหมาย"
 PLASMA_3:0 "ปืนใหญ่พลาสมา"
 PLASMA_3_DESC:0 "อาวุธ ใหม่ ล่า สุด ใน อาวุธ พลาสมา ปืน ใหญ่ เหล่า นี้ เป็น เครื่อง สูบ พลาสมา รุ่น ที่ เก่า กว่า อย่าง เต็ม ที่ และ ค่อน ข้าง เรียบ ง่าย. กระสุนพลาสม่าของพวกเขายิ่งแย่"

 ARC_EMITTER_1:0 "เครื่องปล่อยอาร์กไฟฟ้า"
