 MISSILE_1:0 "มิสไซล์นิวเคลียร์"
 MISSILE_1_DESC:0 "ขีปนาวุธอวกาศต่ออวกาศ ติดหัวรบนิวเคลียร์ แม้ว่าจากเทคโนโลยีก่อนอวกาศอันเก่าแก่ อาวุธที่ใช้ยิงและลืมเหล่านี้จะมีประสิทธิภาพอย่างน่าแปลกใจ ในระยะ"
 MISSILE_2:0 "มิสไซล์ฟิวชัน"
 MISSILE_2_DESC:0 "ขีปนาวุธอวกาศต่ออวกาศเหล่านี้ ปรับให้ทันสมัย มีหัวรบฟิวชั่นที่มีประสิทธิภาพมากขึ้น และปรับปรุงประสิทธิภาพการบิน"
 MISSILE_3:0 "มิสไซล์ปฏิสสาร"
 MISSILE_3_DESC:0 "ขีปนาวุธขั้นสูง มีหัวรบนิวเคลียร์ที่มีประสิทธิภาพมาก ระบบนําทางแบบใหม่และปรับปรุง ให้โอกาสพวกเขาหาเป้าหมายที่ดีกว่า"
 MISSILE_4:0 "มิสไซล์ควอนตัม"
 MISSILE_4_DESC:0 "ขีปนาวุธอวกาศ-อวกาศรุ่นล่าสุด การอัพเกรดนี้ มีหัวรบที่ทรงพลังมาก ซึ่งดูดพลังงานจากเครื่องดูดฝุ่นศูนย์จุด"
 MISSILE_5:0 "มิสไซล์นักล่า"
 MISSILE_5_DESC:0 "ขีปนาวุธความเร็วสูงเหล่านี้มี จํากัด นักบิน AI ที่ปรับปรุงอย่างมาก มีประสิทธิภาพและความสามารถในการติดตามเป้าหมาย"

 SPACEPORT_MISSILE:0 "มิสไซล์สถานีท่ายานอวกาศ"
 SPACEPORT_MISSILE_DESC:1 "เนื่อง จาก มี ที่ ว่าง ที่ น่า เป็น ห่วง น้อย กว่า เรือ เคลื่อน ที่ ท่าเรือ จึง สามารถ เก็บ ลูก กระสุน ที่ ใหญ่ กว่า และ อุปกรณ์ ขน ส่ง ที่ มี ประสิทธิภาพ สําหรับ ลูก ศร ได้ มาก กว่า."

 SWARMER_MISSILE_1:0 "ฝูงมิสไซล์"
 SWARMER_MISSILE_1_DESC:0 "ขีปนาวุธขนาดเล็กเหล่านี้จะเปิดตัวในวอลลีย์และได้รับการออกแบบโดยเฉพาะ เพื่อครอบคลุมระบบการป้องกันจุดศัตรู"
 SWARMER_MISSILE_2:0 "มิสไซล์ลมกรด"
 SWARMER_MISSILE_2_DESC:0 "เทคนิคใหม่ในการลดความเร็ว จะช่วยให้เราเตรียมจรวดเพอร์เกอร์ ด้วยหัวรบที่มีประสิทธิภาพมากขึ้น"

 SCOURGE_MISSILE_1:0 "มิสไซล์ต้อการ"
 SCOURGE_MISSILE_1_DESC:1 "ขีปนาวุธการจัดอันดับบรรจุ ประกอบด้วย สารประกอบทางชีวเคมีจํานวนมากที่ใช้ในการต่อสู้ระหว่างดวงดาว"
 SPACEPORT_SCOURGE_MISSILE:0 "มิสไซล์ต้อการของสถานีท่ายานอวกาศ"
 SPACEPORT_SCOURGE_MISSILE_DESC:1 "$SCOURGE_MISSILE_1_DESC$"
 MEDIUM_SCOURGE_PROJECTILE_WEAPON:0 "ระเบิดกรดต้อการ"
 MEDIUM_SCOURGE_PROJECTILE_WEAPON_DESC:1 "ในแคปซูลของกระสุน สสารอินทรีย์ที่ปนเปื้อนสูง ที่ใช้ในออร์บิทัลของสวาร์ม"
 SMALL_SCOURGE_PROJECTILE_WEAPON:2 "$MEDIUM_SCOURGE_PROJECTILE_WEAPON$ เล็ก"
 SMALL_SCOURGE_PROJECTILE_WEAPON_DESC:2 "$MEDIUM_SCOURGE_PROJECTILE_WEAPON_DESC$"
 SWARM_STRIKE_CRAFT_1:0 "ฝูงจู่โจม"
 SWARM_STRIKE_CRAFT_1_DESC:1 "ตัวทดลองพรีเทนไดรน์ที่สวมเสื้อผ้า สามารถควบคุมผ่านความยาวคลื่น ใกล้กับที่เราใช้ในการสื่อสารแบบอินทรา-ฟลายเวท"
 AMOEBA_STRIKE_CRAFT_1:1 "อะมีบาเคลื่อนที่"
 AMOEBA_STRIKE_CRAFT_1_DESC:1 "แอมโอบาสเติบโตมาจากการถูกกักขัง แฟลกเซลล่า ที่สามารถตอบสนองกับการเปลี่ยนแปลงที่ละเอียดอ่อน ในแม่เหล็กของเรือ"

 DRONE_STRIKE_CRAFT:0 "โดรนแม่นยำ"
 AI_STRIKE_CRAFT:0 "โดรนค้นหา"

 TORPEDO_1:0 "ตอร์ปิโดอวกาศ"
 TORPEDO_1_DESC:0 "ตอร์ปิโดเหล่านี้เป็นหลักที่มีขนาดใหญ่มาก การเคลื่อนย้ายช้า มันมีหัวรบที่มีประสิทธิภาพมากขึ้น และเกราะป้องกัน ที่ปล่อยพวกมัน ลอดผ่านหน้าจอพลังงาน"
 TORPEDO_2:0 "ตอร์ปิโดหุ้มเกราะ"
 TORPEDO_2_DESC:0 "ตอร์ปิโดอวกาศที่อัพเกรดแล้วถูกบรรจุอยู่ในเกราะ เพื่อให้ดีกว่าทนไฟป้องกันจุดศัตรู เกราะ จะ แตก เป็น เศษ ๆ ซึ่ง ก่อ ความ เสีย หาย เพิ่ม ขึ้น เมื่อ ตอร์ปิโด ระเบิด."
 TORPEDO_3:0 "ตอร์ปิโดทำลายล้าง"
 TORPEDO_3_DESC:0 "ตอร์ปิโดขั้นสูง มีหัวรบที่ทรงพลังมาก พวกเขามีการออกแบบแบบสลีกเกอร์ เครื่องยนต์ที่เร็วกว่า และอัพเกรดเครื่องปรับเกราะ สําหรับลื่นผ่านหน้าจอพลังงาน"

