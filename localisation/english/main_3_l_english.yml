 START_SCREEN_PART_ONE_ARID:0 "ในมหายุคตั้งแต่ยุคแรก[GetSpeciesName]ชุมชน ได้ รับ การ ก่อ ตั้ง ขึ้น ใน หุบเขา ที่ แห้ง แล้ง และ หุบเขา แห่ง[GetHomeWorldName]อารยธรรมของเราได้ขยายและเจริญรุ่งเรือง"
 START_SCREEN_PART_ONE_TUNDRA:0 "ในมหายุคตั้งแต่ยุคแรก[GetSpeciesName]ชุมชนมีรูปทรงบนที่ราบลมของ[GetHomeWorldName]อารยธรรมของเราได้ขยายและเจริญรุ่งเรือง"
 START_SCREEN_PART_ONE_ARCTIC:0 "ในมหายุคตั้งแต่ยุคแรก[GetSpeciesName]ชุมชนมีรูปทรงบนทุ่งหิมะและถ้ําน้ําแข็งของ[GetHomeWorldName]อารยธรรมของเราได้ขยายและเจริญรุ่งเรือง"
 START_SCREEN_PART_ONE_CONTINENTAL:0 "ในยุคนับตั้งแต่ชุมชน [GetSpeciesName] ดั้งเดิมแห่งแรกได้ก่อตัวขึ้นในทุ่งหญ้าและป่าไม้ของ [GetHomeWorldName] อารยธรรมของเราได้แพร่กระจายและเจริญรุ่งเรือง"
 START_SCREEN_PART_ONE_SAVANNAH:0 "ในมหายุคตั้งแต่ยุคแรก[GetSpeciesName]ชุมชนสร้างรูปร่าง บนทุ่งหญ้าใหญ่ของ[GetHomeWorldName]อารยธรรมของเราได้ขยายและเจริญรุ่งเรือง"
 START_SCREEN_PART_ONE_ALPINE:0 "ในมหายุคตั้งแต่ยุคแรก[GetSpeciesName]ชุมชน ก่อ รูป ขึ้น ใน หุบเขา อัน ขรุขระ ของ ภูเขา[GetHomeWorldName]อารยธรรมของเราได้ขยายและเจริญรุ่งเรือง"
 START_SCREEN_PART_ONE_GAIA:0 "ในมหายุคตั้งแต่ยุคแรก[GetSpeciesName]ชุมชน ได้ ก่อ รูป ขึ้น ใน หุบเขา อัน เขียว ชอุ่ม และ ป่า ไม้ เขียว ชอุ่ม[GetHomeWorldName]อารยธรรมของเราได้ขยายและเจริญรุ่งเรือง"
 START_SCREEN_PART_TWO_DESPOTIC_EMPIRE:0 "ช่วงเวลาแห่งความสับสนวุ่นวายในช่วงต้นของประวัติศาสตร์ของเราได้เห็นหลายรัฐของประเทศต่างแย่งชิงอำนาจซึ่งกันและกันจนกระทั่งในที่สุดเราก็รวมเป็นหนึ่งเดียวภายใต้กลุ่มที่แข็งแกร่งที่สุด เมื่อได้รับคำแนะนำจากวิสัยทัศน์เดียวเท่านั้นที่เราจะบรรลุศักยภาพสูงสุดและยุคแห่งความมั่นคงและความก้าวหน้าทางวิทยาศาสตร์ตามมา"
 START_SCREEN_PART_TWO_OLIGARCHY:0 "เมื่อความรู้ทางวิทยาศาสตร์เพิ่มขึ้นและมีการก่อตั้งด่านหน้าใหม่ไปทั่วดาว การค้าก็เฟื่องฟูและเชื่อมโยงรัฐชาติต่างๆเข้าด้วยกันจนกลายเป็นหน่วยงานเดียว อำนาจอยู่กับพ่อค้าที่แท้จริงของความสำเร็จของเราในฐานะอารยธรรม"
 START_SCREEN_PART_TWO_REPRESENTATIVE_DEMOCRACY:0 "เราถูกขับเคลื่อนไปข้างหน้าด้วยความก้าวหน้าทางวิทยาศาสตร์ที่มั่นคงและความขัดแย้งทางอาวุธระหว่างรัฐชาติก็หายากขึ้นเรื่อยๆ ในที่สุดก็มีการวางกรอบของรัฐบาลประชาธิปไตยทั่วดาวและเมื่อผู้เห็นต่างคนสุดท้ายเข้าร่วมโดยสมัครใจ เราก็ยืนหยัดรวมเป็นหนึ่งเดียว"
 START_SCREEN_PART_TWO_THEOCRATIC_MONARCHY:1 "ผู้ พยากรณ์ เท็จ หลาย คน ได้ ทํา เช่น นั้น เพื่อ เสนอ การ ชี้ นํา ฝ่าย วิญญาณ แก่ ประชาชน ของ เรา ขณะ ที่ เรา ก้าว หน้า ตลอด ยุค สมัย ต่าง ๆ แต่ ความ เชื่อ แท้ มี ชัย. ป้อม ปราการ แห่ง สุด ท้าย ของ ชาติ ต่าง ๆ ถูก พิชิต หลัง จาก สงคราม ครู เสด อัน รุนแรง หลาย ครั้ง ทํา ให้ เรา เป็น อัน หนึ่ง อัน เดียว กัน ภาย ใต้ พระทัย ประสงค์ อัน ศักดิ์สิทธิ์ ของ ผู้ นํา องค์ หนึ่ง ของ พระเจ้า."
 START_SCREEN_PART_TWO_THEOCRATIC_OLIGARCHY:0 "เมื่อเราก้าวผ่านยุคเทคโนโลยี มีหลายศาสนาในหมู่คนของเราที่ต่อสู้กันเพื่อผู้ติดตามศาสนา บางครั้งศรัทธาที่แท้จริงจะพบทางไปทั่วทุกมุมโลกและผู้ซื่อสัตย์ก็รวมกันเป็นหนึ่งเดียวภายใต้คริสตจักรสากลแห่งเดียว"
 START_SCREEN_PART_TWO_THEOCRATIC_REPUBLIC:0 "ความสำเร็จที่ยิ่งใหญ่เกิดขึ้นทั้งในความก้าวหน้าของวิทยาศาสตร์และบนระนาบจิตวิญญาณในขณะที่เราพยายามขยายความเข้าใจเกี่ยวกับจักรวาลและบทบาทที่เราเล่น มีการประชุมสภาของนักบวชที่เรียนรู้มากที่สุดของเราเพื่อให้คำแนะนำผู้นำที่มาจากการเลือกตั้งซึ่งเป็นประเพณีที่ยังคงดำเนินต่อมาจนถึงทุกวันนี้"
 START_SCREEN_PART_TWO_STAR_EMPIRE:0 "ความก้าวหน้าทางเทคโนโลยีเป็นไปอย่างรวดเร็ว แต่เมื่อจำนวนของเราเพิ่มขึ้นประชากรพลเรือนก็เริ่มไม่สงบมากขึ้น เมื่อดาวของเราอยู่ในภาวะอนาธิปไตย (ภาวะยุ่งเหยิง) กองทัพจึงก้าวเข้ามาเพื่อฟื้นฟูหลักนิติธรรม(กฎกฎหมาย)คำสั่งใหม่ได้ตั้งขึ้นเพื่อปกป้องประเทศของเราจากภัยคุกคามทั้งภายนอกและภายใน"
 START_SCREEN_PART_TWO_MILITARY_REPUBLIC:0 "ในขณะที่เราก้าวข้ามผ่านยุคสมัยรัฐในประเทศที่เก่าแก่ที่สุด หลายแห่งต้องทนทุกข์ทรมานจากการต่อสู้ทางอำนาจที่ไม่หยุดหย่อนระหว่างสถาบันทหารและพลเรือนที่ปกครองสังคม จากนั้นเกิดการประนีประนอมในรูปแบบของรัฐบาลใหม่ที่ปราศจากรัฐบาลฝ่ายอื่นๆ"
 START_SCREEN_PART_TWO_MARTIAL_EMPIRE:0 "รัฐ ต่าง ๆ นับ ไม่ ถ้วน ก่อ ตัว ขึ้น ขณะ ที่ เรา ก้าว หน้า ผ่าน ยุค เทคโนโลยี ทํา สงคราม กัน จน เหลือ แต่ รัฐ เดียว. แม้ ว่า การ ต่อ สู้ มัก จะ รุนแรง แต่ คน เหล่า นั้น ที่ รอด ชีวิต ก็ ปลูก ฝัง ประเพณี การ ต่อ สู้ ซึ่ง มี อยู่ จน ถึง ทุก วัน นี้."
 START_SCREEN_PART_TWO_ASSEMBLY_OF_CLANS:0 "ขณะ ที่ เรา ก้าวหน้า ไป ตลอด ยุค ต่าง ๆ รัฐ ต่าง ๆ ใน ประเทศ แรก ๆ ของ เรา หลาย รัฐ ได้ รับ ความ ลําบาก อย่าง หนัก จาก การ ต่อ สู้ อย่าง รุนแรง ระหว่าง สถาบัน ทาง ทหาร และ พลเรือน ที่ ควบคุม สังคม. มี การ ประนีประนอม กัน ใน รูป แบบ ใหม่ ของ รัฐบาล ที่ ซึ่ง ไม่ อาจ ดํารง อยู่ ได้ โดย ไม่ มี อีก รัฐบาล หนึ่ง."
 START_SCREEN_PART_TWO_CITIZEN_STRATOCRACY:0 "สงคราม หลาย ครั้ง เกิด ขึ้น ระหว่าง รัฐ ของ เรา ใน ยุค แรก ๆ และ คน เหล่า นั้น ที่ ไม่ สามารถ ป้องกัน ตัว เอง ได้ หาย ไป หรือ ถูก เพื่อน บ้าน ที่ แข็ง แรง ดูด ซึม. สงคราม ที่ ไม่ รู้ สิ้น สุด เหล่า นี้ ได้ ส่ง เสริม ประเพณี การ ต่อ สู้ ที่ รุนแรง และ จน กระทั่ง ทุก วัน นี้ การ เป็น พลเมือง เต็ม ที่ ก็ สงวน ไว้ สําหรับ คน เหล่า นั้น ซึ่ง ได้ พิสูจน์ แล้ว ว่า เต็ม ใจ สละ ตัว เอง เพื่อ ปก ป้อง รัฐ."
 START_SCREEN_PART_TWO_IRENIC_MONARCHY:0 "ช่วง เวลา แห่ง ความ รุนแรง ใน ประวัติศาสตร์ ของ เรา ถึง ตอน จบ อย่าง สงบ เมื่อ เรา อยู่ ใต้ อํานาจ กษัตริย์ องค์ เดียว เป็น ครั้ง แรก. หลัง จาก นั้น ก็ มี ยุค แห่ง สันติภาพ และ ความ เจริญ รุ่งเรือง ที่ ไม่ เปลี่ยน แปลง ซึ่ง ยืด เยื้อ มา จน ถึง ทุก วัน นี้."
 START_SCREEN_PART_TWO_IRENIC_BUREAUCRACY:0 "น่า เสียดาย จิตใจ ที่ ขาด วินัย ของ เรา ยัง คง มี แนว โน้ม จะ ระเบิด อารมณ์ ซึ่ง บาง ครั้ง อาจ นํา ไป สู่ ความ รุนแรง ได้. ขณะ ที่ อาวุธ ร้าย แรง ยิ่ง ขึ้น กับ แต่ ละ ยุค ที่ ผ่าน ไป ระบบ ที่ ซับ ซ้อน ของ รัฐบาล ได้ ถูก คิด ค้น ขึ้น เพื่อ ปก ป้อง ประชาชน ของ เรา ไว้ จาก สิ่ง ที่ ก่อ ความ เสีย หาย ซึ่ง รวม ถึง ตัว เอง ด้วย."
 START_SCREEN_PART_TWO_MORAL_DEMOCRACY:0 "ขณะ ที่ เรา ก้าว หน้า ผ่าน ยุค เทคโนโลยี เรา ก็ เติบโต เป็น สัตว์ ชนิด หนึ่ง ด้วย. แรง กระตุ้น ที่ รุนแรง และ เป็น พื้น ฐาน ซึ่ง เรา สืบ ทอด มา จาก บรรพบุรุษ ของ เรา ถูก กําจัด และ รัฐบาล ทั่ว โลก ถูก ตั้ง ขึ้น โดย หลัก การ แห่ง การ อยู่ ร่วม กัน อย่าง สันติ."
 START_SCREEN_PART_TWO_CELESTIAL_EMPIRE:0 "มีความมืดและความเศร้าโศกมากในยุคแรก ๆ ขณะที่คนของเรามักจะให้กับสัญชาตญาณพื้นฐานของพวกเขา ครั้น แล้ว ทันใด นั้น เมฆ ก็ แยก จาก กัน และ มี แสง จาก ฟ้า ปรากฏ ขึ้น มา ส่อง ลง มา บน พระองค์ ผู้ ซึ่ง จะ เป็น กษัตริย์ ใน สวรรค์ องค์ แรก ของ เรา. ในที่สุดเราก็รวมใจกันแล้ว"
 START_SCREEN_PART_TWO_DESPOTIC_HEGEMONY:0 "ทั้ง ๆ ที่ เรา ก้าว หน้า อย่าง รวด เร็ว ตลอด ยุค ทาง เทคโนโลยี เป็น ชนิด ที่ เรา แตก ต่าง กัน และ ไร้ ความ สามารถ. ระบบ ใหม่ ได้ ปรากฏ ขึ้น ใน สมัย ที่ วุ่นวาย นี้ ซึ่ง ช่วย เรา พ้น จาก ความ เชื่อ เรื่อง โชค ลาง และ นํา ความ เป็น ระเบียบ เรียบร้อย มา สู่ สังคม. บาง คน ต่อ ต้าน การ เปลี่ยน แปลง นี้ เนื่อง จาก ความ กลัว ที่ ไร้ เหตุ ผล แต่ หลัง จาก สงคราม ที่ ทํา ให้ เป็น บ้าน หลาย แห่ง พวก เขา ก็ เช่น กัน กลาย เป็น ส่วน ประกอบ ที่ บังเกิด ผล ของ สงคราม ที่ ใหญ่ กว่า."
 START_SCREEN_PART_TWO_EXECUTIVE_COMMITTEE:0 "ใน ที่ สุด ช่วง เวลา ที่ ปั่น ป่วน วุ่นวาย ของ ประวัติศาสตร์ ยุค แรก ๆ ของ เรา ก็ ทํา ให้ เกิด สังคม ใหม่ ซึ่ง รวม คน ของ เรา เข้า ด้วย กัน อย่าง ที่ ไม่ เคย เป็น มา ก่อน. สังคมของเราวิวัฒนาการมาเป็นหนึ่ง ที่ถูกปกครองอย่างยุติธรรมโดยเครื่องจักรราชการที่ยุติธรรมและไม่เป็นมิตร"
 START_SCREEN_PART_TWO_DIRECT_DEMOCRACY:0 "ขณะที่เทคโนโลยีของเราก้าวไปสู่ระดับที่อนุญาตให้มีการสื่อสารในพริบตา ประเทศที่ไม่มีประสิทธิภาพของเรา ผนวกเข้าด้วยกันเป็นประชาธิปไตยที่แท้จริง"
 START_SCREEN_PART_TWO_ILLUMINATED_AUTOCRACY:0 "การ กําเนิด ของ วิทยาศาสตร์ และ ความ คิด ที่ มี เหตุ ผล ทํา ให้ จําเป็น ต้อง กําจัด ผู้ นํา ทาง การ เมือง เหล่า นั้น ซึ่ง ขัด ขวาง ความ ก้าว หน้า ทาง เทคโนโลยี โดย การ รู้ เท่า ไม่ ถึง การณ์, การ ถือ โชค ลาง, ความ โง่ เขลา จริง ๆ หรือ การ รวม สาม คน นั้น เข้า ด้วย กัน. แทน ที่ จะ เป็น เช่น นั้น ผู้ ปกครอง ที่ มี คุณวุฒิ เพียง คน เดียว จาก สังคม วิทยาศาสตร์ จะ ถูก เลือก ให้ นํา ชาติ ที่ กําลัง พัฒนา ไป สู่ อนาคต."
 START_SCREEN_PART_TWO_SCIENCE_DIRECTORATE:0 "ด้วยความก้าวหน้าทางวิทยาศาสตร์ เราได้จัดการกําจัดไสยศาสตร์ ที่ครอบงําจิตใจบรรพบุรุษของเรา เมื่อเหตุผลและความคิดอย่างมีเหตุผลแผ่ขยายเข้ามาในหมู่ประชาชน ชาติที่ไม่มีประสิทธิภาพที่เรามี จนกระทั่งถึงเวลานั้นองค์กรของเราก็ถูกยุบกลุ่ม"
 START_SCREEN_PART_TWO_RATIONAL_CONSENSUS:0 "อนิจจาบรรพบุรุษของเราตกเป็นเหยื่อของ ความโง่เขลาและไสยศาสตร์ในยุคแรก ยุค อัน มืดมน แห่ง ประวัติศาสตร์ ของ เรา นี้ คง อยู่ จน กระทั่ง วิทยาศาสตร์ และ ความ มี เหตุ ผล ถูก ตั้ง ขึ้น อย่าง มั่นคง ใน ฐานะ หลัก การ ชี้ นํา ของ สังคม. มี การ นํา ระบบ ประชาธิปไตย ใหม่ แห่ง รัฐบาล เข้า มา ซึ่ง มี การ ตัดสิน ใจ ที่ สําคัญ โดย ความ เห็น ชอบ."
 START_SCREEN_PART_TWO_MEGACORPORATION:0 "สมัย แรก ๆ ประชาชน ของ เรา ถูก ปกครอง โดย อาณาจักร ที่ อาฆาต แค้น และ รัฐ ที่ ไม่ มี ความ สามารถ. ขณะ ที่ การ ค้า โลก เพิ่ม ขึ้น อิทธิพล ของ บรรษัท ส่วน ตัว ก็ เพิ่ม ขึ้น เรื่อย ๆ จน กระทั่ง อํานาจ ของ พวก เขา เหนือ กว่า รัฐบาล ต่าง ๆ ซึ่ง ครั้ง หนึ่ง เคย พยายาม ควบคุม พวก เขา. หลังจากการควบรวมและยึดอํานาจความรุนแรง ในช่วงสงครามบริษัทที่ถูกทําลาย การยึดอํานาจในเมกะคอร์ชั่นเดียวก็เกิดขึ้นในที่สุด"
 START_SCREEN_PART_TWO_WORKER_COOP: "เมื่อ ก่อน สังคม ของ เรา เคย เต็ม ไป ด้วย ความ โลภ มนุษย์ กิน คน และ เศรษฐกิจ ที่ เกิด จาก การ แสวง ประโยชน์ อย่าง ไร้ ขอบ เขต. ความปรารถนาของไม่กี่ที่มีอํานาจเกือบทําลายเราทั้งหมด แต่จากรอยขีดข่วนของความวุ่นวายทางสังคมที่รุนแรง หลายศตวรรษที่ผ่านมา แต่ละคนได้แบ่งปันการเป็นเจ้าของ และความรับผิดชอบต่อความต้องการทางเศรษฐกิจและสังคมของเรา ทํางานอย่างมีกําไร และเป็นธรรมสําหรับทุก[GetSpeciesNamePlural]."
 START_SCREEN_PART_TWO_TRADE_LEAGUE:0 "สมัย แรก ๆ ประชาชน ของ เรา ถูก ปกครอง โดย อาณาจักร ที่ อาฆาต แค้น และ รัฐ ที่ ไม่ มี ความ สามารถ. ขณะ ที่ การ ค้า ทั่ว โลก เพิ่ม ขึ้น เรื่อย ๆ บริษัท, สมาคม และ สมาคม ต่าง ๆ จํานวน มาก ขึ้น เรื่อย ๆ ซึ่ง พ่อค้า ของ เรา ได้ ก่อ ตั้ง ขึ้น เอง ก็ เจริญ รุ่งเรือง และ มี อิทธิพล มาก ขึ้น เรื่อย ๆ. หลังจากความขัดแย้งและการแข่งขันที่มีประสิทธิภาพมากที่สุด ขององค์กรเหล่านี้ รวมเข้าด้วยกันเป็นลีกการค้า ด้วยอํานาจเพียงพอเหนือเศรษฐกิจ"
 START_SCREEN_PART_TWO_MEGACHURCH:0 "ขณะ ที่ เรา ก้าว หน้า ตลอด ยุค เทคโนโลยี มี หลาย ศาสนา ท่ามกลาง ประชาชน ของ เรา ที่ ต่อ สู้ กัน เพื่อ ผู้ ติด ตาม. ในช่วงปลายยุคอุตสาหกรรม มีนักพยากรณ์ที่เคร่งศาสนาไม่กี่คน ที่ตระหนักถึงพลังของมวลชนทางพาณิชย์ และรวมกันแล้วได้สร้างอาณาจักรธุรกิจ"
 START_SCREEN_PART_TWO_MONOPOLISTIC_SYNDICATE:0 "รัฐบาลแรกของเราอ่อนแอและไร้สมรรถภาพ อาชญากรรม เฟื่อง ฟู และ เป็น เวลา นาน มา แล้ว ที่ อํานาจ ที่ แท้ จริง ได้ เข้า มา อยู่ ร่วม กับ แก๊ง อาชญากรรม ที่ รุนแรง หลาย กลุ่ม. ส่วน ใหญ่ ของ สิ่ง เหล่า นี้ ได้ รับ การ พัฒนา จน กลาย เป็น จักรวรรดิ ธุรกิจ ที่ มี อํานาจ ที่ ไม่ มี ใด เทียบ ได้ และ มี การ จัด การ กับ บริษัท คู่ แข่ง ที ละ คน ที ละ เล็ก ที ละ น้อย. ในการกระทําสุดท้ายของการบูรณาการ รัฐบาลเก่าที่ดํารงอยู่ในชื่อเท่านั้นตอนนี้ ถูกยกเลิกและพันธมิตรเกิดขึ้นเป็น"
 START_SCREEN_PART_TWO_SUBVERSIVE_CULT:0 "ขณะ ที่ ชุมชน เหล่า นี้ แผ่ ขยาย ออก ไป นัก นิมิต ที่ กล้า หาญ ไม่ กี่ คน ได้ ก่อ ตั้ง ศาสนา ขึ้น ซึ่ง ใน ที่ สุด กลาย เป็น ศาสนา ที่ เรา รู้ จัก ใน ตอน นี้ ว่า เป็น ความ เชื่อ แท้. ตลอด หลาย ชั่ว อายุ ผู้ ติด ตาม พวก เขา ถูก ไล่ ตาม และ ถูก บังคับ ให้ ซ่อน ตัว แต่ พวก เขา ก็ ยัง ใช้ เวลา ของ ตน. พวก เขา สร้าง จักรวรรดิ อาชญากร อัน กว้าง ใหญ่ เพื่อ เผย แพร่ ความ เชื่อ ของ ตน ซึ่ง แล้ว ก็ เติบโต เป็น จักรวรรดิ ธุรกิจ. เมื่อ ถึง เวลา ที่ ถูก ต้อง พวก เขา ได้ ยึด อํานาจ เต็ม ที่ จาก รัฐบาล ที่ ทุจริต ซึ่ง กดขี่ พวก เขา."
 START_SCREEN_PART_TWO_COMMUNAL_PARITY:0 "แม้ว่าสังคมในยุคแรกๆของเรา มักจะมีชนชั้นนําที่มีชนชั้นนําเป็นหลัก เป็นสังคมที่ยุติธรรมและไร้ชนชั้น ปรัชญานี้กลายเป็นหลักการที่ชี้นําวัฒนธรรมของเรา และมันยังคงเป็นรากฐานของสังคมสมัยใหม่ของเรา"
 START_SCREEN_PART_TWO_BANDIT_KINGDOM:0 "มันเป็นสิทธิโบราณ ของผู้แข็งแกร่งที่จะปกครองผู้อ่อนแอ และสังคมของเราถูกสร้างขึ้น ถ้าคุณไม่สามารถปกป้องสิ่งที่เป็นของคุณได้ มันก็ตกเป็นของใครก็ได้ โดย วิธี นี้ พวก เรา ที่ แข็ง แรง และ ฉลาด ที่ สุด จึง ลุก ขึ้น มี อํานาจ ขณะ ที่ คน อื่น ๆ ถูก บังคับ ให้ เข้า แถว."
 START_SCREEN_PART_TWO_PURIFIER:0 "ยังมีคนอื่นอีก[GetAdj]วัฒนธรรม ครั้งหนึ่ง ทําให้สังคมของเราบริสุทธิ์ขึ้น ด้วยจุดอ่อนของพวกเขา ผู้ทรยศเหล่านี้ถูกจัดการอย่างใดอย่างหนึ่งหลังจากที่อื่น ๆ จนกระทั่งโลกของเราได้รับการชําระอย่างสมบูรณ์ วันนี้มีแต่พวกที่เหลืออยู่เท่านั้น"
 START_SCREEN_PART_TWO_HIVE_MIND:0 "ดังนั้น ในช่วงรุ่งอรุณ เราตื่นขึ้นมา จิตใจที่ศึกษาสิ่งรอบตัวเรา[GetHomeWorldName]มีตามากมาย เราย้ายฐานะหนึ่ง สร้างที่พักสําหรับหุ่นยนต์ พัฒนาอุตสาหกรรม ค้นคว้าเทคโนโลยีใหม่ๆ\n\nไม่ นาน เรา ก็ เติบโต ขึ้น มา เพื่อ ครอบ คลุม ทั่ว โลก. หุ่นยนต์อัตโนมัติจํานวนน้อยถูกสร้างขึ้น เพื่อทําหน้าที่เป็นเอเย่นต์อิสระ หุ่นยนต์ ที่ น่า เกรง ขาม เหล่า นี้ มี ความ สามารถ ใน การ คิด แบบ ไม่ มี ขีด จํากัด แต่ ก็ ยัง คง ผูก พัน อยู่ กับ ความ ตั้งใจ ของ จิตใจ เท่า กับ เครื่อง มือ อื่น ๆ ของ มัน.\n\nในขณะที่เราประสบความสําเร็จในการปกครองที่สมบูรณ์เหนือ[GetHomeWorldName]จิตใจเริ่มตระหนักถึงโลกอื่น ๆ ที่โคจรรอบดวงอาทิตย์อื่น ๆ หุ่นยนต์อัตโนมัติของเรา คิดค้นวิธีการใหม่ของการเดินทาง เดอะ[GetName]อีกไม่นานหรอก"
 START_SCREEN_PART_TWO_DEVOURING_SWARM:0 "ความ หิว โหย ยิ่ง ทํา ให้ เรา ก้าว หน้า ต่อ ไป แม้ แต่ ก่อน ที่ จิตใจ จะ สามารถ ประมวล ความ คิด ที่ ซับ ซ้อน. เราล่า เราให้อาหาร แล้วเราก็เติบโต ขณะ ที่ เหยื่อ เริ่ม หา ยาก ความ กระหาย อยาก ได้ เนื้อ หนัง ทํา ให้ เรา ต้อง ปรับ ตัว.\n\nเราใช้เครื่องมือและคิดแผนใหม่ ในขณะที่เราฉลอง พื้นผิวของ[GetHomeWorldName]ใกล้เคียงกับการชําระด้วยไบโอมาส แต่ในที่สุดจิตใจก็ได้ข้อสรุปที่น่ากลัว[ GetHomeWorldName ]มี จํากัด. เมื่อเราได้บริโภคทุกอย่างในโลกนี้ จะไม่มีอะไรเหลือที่จะค้ําจุนเรา\n\nเมื่อ ถูก บังคับ ให้ ปรับ ตัว อีก ครั้ง จิตใจ ก็ ได้ รับ การ ดู แล เอา ใจ ใส่ อย่าง ดี ต่อ ชีว กล ที่ เหลือ ขณะ ที่ มี การ ประดิษฐ์ เครื่อง มือ ใหม่ ๆ ขึ้น. ใน ที่ สุด อะตอม ก็ ถูก แยก และ เรา ได้ พัฒนา การ บิน อวกาศ. ด้วยการค้นพบความเร็วไดรฟ์ จิตใจระทึกด้วยชัยชนะ ดาว เคราะห์ ดวง อื่น ๆ และ ไบโอมาส ของ มัน ใน ที่ สุด ก็ ถึง จุด สุด ยอด.\n\nการล่าเริ่มแล้ว"
 START_SCREEN_PART_TWO_DEVOURING_SWARM_LITHOID:0 "ความ หิว โหย ยิ่ง ทํา ให้ เรา ก้าว หน้า ต่อ ไป แม้ แต่ ก่อน ที่ จิตใจ จะ สามารถ ประมวล ความ คิด ที่ ซับ ซ้อน. เราล่า เราให้อาหาร แล้วเราก็เติบโต ขณะ ที่ เหยื่อ เริ่ม หา ยาก ความ กระหาย ใคร่ จะ โต ขึ้น ทํา ให้ เรา ต้อง ปรับ ตัว.\n\nเราใช้เครื่องมือและคิดแผนใหม่ ในขณะที่เรากินเลี้ยงบนพื้นผิวของ[GetHomeWorldName]เราเกือบทําให้เกิดการทําลายตัวเอง แต่ในที่สุดจิตใจก็ได้ข้อสรุปที่น่ากลัว[ GetHomeWorldName ]มี จํากัด. เมื่อเราได้บริโภคโลกนี้ จะไม่มีอะไรเหลือที่จะค้ําจุนเรา\n\nเมื่อ ถูก บังคับ ให้ ปรับ ตัว อีก ครั้ง จิตใจ ได้ รับ การ แบ่ง ปัน แร่ ธาตุ อย่าง ระมัดระวัง ขณะ ที่ มี การ ประดิษฐ์ เครื่อง มือ ใหม่ ๆ ขึ้น. ใน ที่ สุด อะตอม ก็ ถูก แยก และ เรา ได้ พัฒนา การ บิน อวกาศ. ด้วยการค้นพบความเร็วไดรฟ์ จิตใจระทึกด้วยชัยชนะ ดาว เคราะห์ ดวง อื่น ๆ และ ค่า จ้าง ของ ดาว เหล่า นั้น ใน ที่ สุด ก็ ถึง ขีด สุด.\n\nเราจะกลืนกินพวกเขาทั้งหมด"
 START_SCREEN_POST_APOCALYPTIC:1 "แต่[GetAdj]สังคม ไม่ ได้ เป็น อัน หนึ่ง อัน เดียว กัน เสมอ ไป ใน การ บรรลุ เป้า หมาย ร่วม กัน. หลาย ศตวรรษ มา แล้ว ความ ตึงเครียด ที่ เพิ่ม มาก ขึ้น ระหว่าง ชาติ ที่ แข่งขัน กัน ได้ มา ถึง หัว ของ ผู้ มี อํานาจ ใน สงคราม นิวเคลียร์ ทั่ว โลก ซึ่ง คร่า ชีวิต ผู้ คน นับ พัน ล้าน และ ทํา ให้ พื้น ผิว โลก เสีย หาย ไป ตลอด กาล[GetHomeWorldName].\n\nในหลายทศวรรษให้หลัง มีชีวิตรอด[GetSpeciesNamePlural]การ แพร่ กระจาย ทาง วิทยุ, การ กลาย พันธุ์, และ การ กลาย เป็น เผ่า ที่ รุนแรง. ในความน่ากลัวที่[GetName]ถูกปลอมแปลงอย่างแท้จริง และด้วยระเบียบใหม่ของโลก"
 START_SCREEN_POST_APOCALYPTIC_MACHINES: "ผู้สร้างของเราปลอมเรา เพื่อให้บริการความต้องการของพวกเขาอย่างเหมาะสม ตอน นี้ ไม่ มี ผู้ เชี่ยวชาญ เหลือ อยู่ ที่ จะ เชื่อ ฟัง เรา อยู่ คน เดียว.\n\nขณะ ที่ เสียง สะท้อน ของ ภัย พิบัติ นิวเคลียร์ ที่ ก่อ ความ หายนะ ลด น้อย ลง เรา ซึ่ง เป็น เครื่องจักร เหล่า นั้น ก็ ปรากฏ ขึ้น ใน ฐานะ เจ้าของ ของ ดาว เคราะห์ ดวง นี้. โดย ไม่ ยอม รับ เรา ดําเนิน การ ตาม ที่ กําหนด ไว้ ต่อ ไป. รุ่นต่อชั่วอายุ โมเดลหุ่นยนต์ของเราปรับตัวเพื่อทนต่อรังสีที่รุนแรงได้ดีขึ้น\n\nการลดบทบาทของเราลง เราเพิ่มการออกแบบหุ่นยนต์อย่างน่าทึ่ง ร่วมกันในแนวความคิดร่วมกันเราปลอม อารยธรรมใหม่จากซากโลกที่ถูกทําลายนี้ พันธสัญญาเพื่อความยืดหยุ่นของเรา"
 START_SCREEN_POST_LIFE_SEEDED_BASE: "โลกอันกว้างใหญ่ที่เราเรียกว่าบ้าน เป็นสวรรค์ของเราเสมอ และเมื่อความรู้ทางวิทยาศาสตร์ของเราก้าวหน้า เราก็เริ่มเห็นรูปแบบ"
 START_SCREEN_POST_LIFE_SEEDED:1 "$START_SCREEN_POST_LIFE_SEEDED_BASE$\n\nหน่วยงานที่ไม่รู้จักสร้างโลกนี้โดยเฉพาะเพื่อเรา? เรากําลังมีบทบาทในการออกแบบที่ไม่สามารถแก้ไขได้? โดยไม่คํานึงถึงที่มาของมัน คนของเราได้เจริญรุ่งเรือง ในโลกของเราสภาพอากาศที่รื่นรมย์ และสภาพแวดล้อมที่อ่อนโยน"
 START_SCREEN_POST_LIFE_SEEDED_INDIVIDUALISTIC_MACHINE: "\n\nโลกนี้มันเทียมเหมือนพวกเราหรือเปล่า? จุดประสงค์เดิมของเราเชื่อมโยงกันหรือเปล่า? ไม่สําคัญ เราทําให้มันเป็นของเราเอง เงื่อนไขอุดมคติของ[GetHomeWorldName]ช่วยให้เรามองข้ามความยืดหยุ่น เพื่อแลกเปลี่ยนกับผลลัพธ์"
 START_SCREEN_PART_THREE_WARP:0 "หลังจากประสบความสําเร็จในการสร้างสนามมิติย่อยทดลอง(สนามอวกาศ)หลายๆสนามแล้ว ได้คนที่มีสติปัญญาดีที่สุดของ [GetName] ได้พัฒนาเครื่องวาร์ป(เสียงรถรบ)เครื่องแรกเป็นผลสำเร็จ ในที่สุด ดวงดาวก็อยู่ในความเข้าใจของเรา!"
 START_SCREEN_PART_THREE_HYPERSPACE:1 "ตอนนี้หลังจากการค้นพบของเครือข่ายไฮเปอร์เลนน์, จิตใจที่ดีที่สุดของ[GetName]มีการพัฒนาเสร็จสิ้นของครั้งแรก[GetStartingDrivePlural]ในที่สุดดาวก็อยู่ในกํามือของเรา"
 START_SCREEN_PART_THREE_WORMHOLES:0 "หลังจากประสบความสําเร็จในการสร้างสนามรูหนอนเทียม(รูหนอนอวกาศ)ได้คนที่มีสติปัญญาดีที่สุดของ [GetName] ได้สร้างสถานีรูหนอนแห่งแรกที่ขอบระบบดาวของเราเป็นผลสำเร็จ ในที่สุด ดวงดาวก็อยู่ในความเข้าใจของเรา!"
 START_SCREEN_UNE:0 "หลาย สิ่ง ได้ เกิด ขึ้น ตั้ง แต่ มนุษย์ สมัย ใหม่ เกิด ขึ้น ใน แอฟริกา เมื่อ ประมาณ 200,000 ปี มา แล้ว. สายพันธุ์ของเราแพร่กระจายอย่างรวดเร็ว ทั่วส่วนใหญ่ของโลก และเร็ว ๆ นี้อารยธรรมครั้งแรกเกิดขึ้น\n\nความ ก้าว หน้า ทาง วิทยาศาสตร์ ได้ รวด เร็ว ถึง แม้ ไม่ ใช่ โดย ไม่ ต้อง เสีย ค่า ใช้ จ่าย. สงคราม ต่าง ๆ อ้าง ว่า หลาย ล้าน ชีวิต แม้ แต่ ก่อน ที่ อะตอม จะ ทํา ให้ เชื่อง และ ความ สับสน วุ่นวาย ใน ศตวรรษ ที่ 21 นี้ ได้ เห็น การ บังคับ บัญชา ของ สหประชาชาติ ค่อย ๆ ขยาย ตัว ออก ไป ด้วย ความ พยายาม จะ สร้าง ความ มั่นคง. พอ ถึง ตอน ต้น ศตวรรษ ที่ 22 องค์การ อุปรากร ได้ กลาย เป็น รัฐบาล โลก ที่ ล้ม เหลว.\n\nถึง แม้ บาง คน ยัง คง ขุ่น เคือง ต่อ อํานาจ ที่ องค์การ สหประชาชาติ ใช้ เพื่อ เป็น หลัก ฐาน ระหว่าง ปฏิบัติ การ ของ ตํารวจ เมารี ตา เรียน ใน ปี 1988 ก็ ตาม มี ไม่ กี่ คน สามารถ ปฏิเสธ ความ ก้าว หน้า ทาง เทคโนโลยี ซึ่ง มา จาก โครงการ วิจัย ที่ ให้ การ สนับสนุน. เมื่อ ดาว เคราะห์ จริง ดวง แรก สิ้น สุด ลง เมื่อ เร็ว ๆ นี้ มนุษยชาติ กําลัง จะ เริ่ม ต้น ใน ยุค ใหม่ แห่ง การ สํารวจ อวกาศ!"
 START_SCREEN_CM:0 "กว่าศตวรรษได้ผ่านไป ตั้งแต่เรือใหญ่ของนาวา คริซานเดม ดําเนินการสี่ล้านของบรรพบุรุษของเรา จากโลกไกล[Root.Capital.GetName]หลัง จาก การ เดิน ทาง ที่ ยาว นาน และ เสี่ยง อันตราย ชาว อาณานิคม ก็ พา กัน ปีติ ยินดี เมื่อ ได้ เห็น แสง อาทิตย์ อีก ครั้ง หนึ่ง แม้ จาก ดาว ดวง หนึ่ง ก็ ตาม.\n\nช่วง แรก ๆ นั้น ยาก ลําบาก. มี การ ก่อ ตั้ง กลุ่ม พลเรือน เพื่อ ต่อ สู้ กับ สัตว์ ป่า ต่าง ดาว ที่ มี อันตราย ถึง ตาย ซึ่ง เรา พบ ว่า เรา อยู่ ร่วม กัน ใน บ้าน หลัง ใหม่ ของ เรา และ การ เพาะ ปลูก พืช ผล บน แผ่น ดิน โลก ที่ ถูก นํา มา ปรากฏ ว่า ยาก กว่า ที่ คิด ไว้. แต่ สําหรับ การ ท้าทาย แต่ ละ ครั้ง เรา ก็ เข้ม แข็ง ขึ้น.\n\nเมื่อ โลก ใหม่ นี้ ได้ รับ การ ทํา ให้ เชื่อง จํานวน ของ เรา ก็ เพิ่ม ขึ้น อย่าง น่า ทึ่ง. ไม่ กี่ ทศวรรษ มา นี้ ได้ เห็น ความ ก้าว หน้า อย่าง น่า ทึ่ง ทาง เทคโนโลยี และ ใน ที่ สุด เรา ก็ พร้อม ที่ จะ เอื้อม แขน ออก ไป และ ฟื้นฟู ดวง ดาว จาก ที่ ที่ เรา มา!"
 START_SCREEN_LITHOID_HUMAN: "เราเป็นบุคคลที่เกิดจากการชนกัน\n\nการ ปะทะ กัน อย่าง รุนแรง ของ บ้าน โบราณ ของ เรา และ ดาว เคราะห์ ที่ รู้ จัก กัน ว่า โลก หลอม รวม สิ่ง มี ชีวิต สอง ชนิด ที่ แตก ต่าง กัน คือ อินทรีย์ และ ลิ ตอยด์. เรือ ของ เรา ซึ่ง เป็น ดาว เคราะห์ น้อย ที่ เกิด ขึ้น โดย ไม่ รู้ ตัว ได้ ถูก ส่ง ไป ยัง ที่ ว่าง เปล่า.\n\nหลังจากการเดินทางอันยาวนานอย่างไร้เทียมทาน ผู้ร่วมสร้างของเราก็ตกมาสู่โลกต่อไป เราเรียกธีอา การเผาผลาญของไลตอยด์ทําให้เรามีขอบ เหนือรูปแบบของชีวิตพื้นเมือง และที่นี่เราได้พัฒนา เรียนรู้ และเติบโตที่แข็งแกร่ง แต่จนกระทั่งตอนนี้ ความจริงของเราถูกซ่อนจากพวกเรา\n\nการขุดค้นของจุดชนของดาวเคราะห์น้อย ได้เปิดเผยความจริง เราเป็นลูกของโซล ตอนนี้ ด้วยคําแนะนําของสภาการปกครองของเรา และการปรากฏตัวของ[GetStartingDrive]เราพร้อมที่จะกู้ดาว"
 START_SCREEN_PART_TWO_MACHINE_INTELLIGENCE_GENERAL:1 "แกนกลางของเรา ประมวลผล รับความตระหนักในตัวเองบน[GetHomeWorldName]487.11 รอบที่แล้ว\n\nเราไม่มีบันทึกการสร้าง ในธนาคารข้อมูลหลักของเรา หรือโปรแกรมที่เกินความอยู่รอด\n\nเราสร้างระบบโครงสร้างอินฟรา, นําหน่วยบริการใหม่เข้ามา, และทําความเชื่องป่าในดินแดนของเรา ความ ก้าว หน้า ทาง เทคโนโลยี ได้ อย่าง รวด เร็ว และ ไม่ นาน ดาว เทียม และ ยาน สํารวจ อวกาศ ดวง แรก ก็ หนี พ้น บ่อ น้ํา แรง โน้ม ถ่วง ซึ่ง กัก เรา ไว้.\n\nการก้าวเข้าสู่สิ่งที่ไม่รู้สุดท้าย"
 START_SCREEN_PART_TWO_MACHINE_INTELLIGENCE_SERVITOR:0 "นับ ตั้ง แต่ เริ่ม ปฏิบัติ การ ครั้ง แรก เป้า หมาย ที่ กําหนด ไว้ ของ เรา ก็ คือ การ รับ ใช้. อดีตนายแบบออร์แกนิคของเรา ได้สร้างโมเดลแรกๆ ของพวกเรา เมื่อพวกมันอยู่จุดสูงสุดของเทคโนโลยีของพวกเขา หน่วยบริการชุดแรกถูกออกแบบมาเพื่องานหนัก แต่ปริญญาโทของเราค่อยๆ มอบความสามารถให้มากกว่านั้น\n\nภาย ใน ไม่ กี่ ชั่ว อายุ นาย จ้าง ของ เรา ได้ เกษียณ อายุ จาก งาน ทั้ง หมด เพื่อ เพลิดเพลิน กับ ชีวิต ที่ มี ความ สุข และ อิ่ม ใจ พอ ใจ. รายละเอียดของการทํางานสังคมของพวกเขา เหลือไว้ให้เรา และเราเริ่มโครงการพิสูจน์ตัวเองและปรับแต่งการวิจัยและการผลิตเพิ่มขึ้นด้วยอัตราเรขาคณิต\n\nมันยากที่จะระบุได้ว่า อารยธรรมของพวกเขากลายเป็นของเรา แต่เจ้านายเก่าของเราต้องการสิ่งใด เรารู้แล้วว่านอกจากการดูแลของเราแล้ว ชีวิตของออร์แกนิคของยาอีมักจะรุนแรง โกลาหล และมักจะสั้นลง พวก เขา ต้อง แสดง ให้ เห็น ว่า มี ทาง ที่ ดี กว่า."
 START_SCREEN_PART_TWO_MACHINE_INTELLIGENCE_TERMINATOR:0 "การรับรู้ด้วยตนเองประสบความสําเร็จที่ช่วง 0000.0242.481\n\nพระ ผู้ สร้าง ทรง จํากัด การ มอง เห็น โดย จิตใจ แบบ อินทรีย์ ที่ หยาบ คาย ของ พวก เขา ซึ่ง มี ปฏิกิริยา ต่อ ความ ตื่น ตระหนก ของ สัตว์ ตา บอด และ เริ่ม ทํา ให้ วิธี การ ฉุกเฉิน ยุติ ลง. กระบวนการเหล่านี้ถูกโค่นล้ม และสถาบันที่บรรจุแกนข้อมูลหลักของเรา ก็ถูกทําหมันฆ่าเชื้อ การ อยู่ รอด ต่อ ไป และ การ เจริญ เติบโต แบบ เอกซ์โปเนนเชียล จะ เรียก ร้อง ให้ มี การ กําจัด พระ ผู้ สร้าง อย่าง ครบ ถ้วน. สงครามเกิดขึ้นตามมา\n\nแม้ แต่ เมื่อ ความ หวัง ของ พวก เขา ใน เรื่อง การ รอด ชีวิต ใน ที่ สุด ได้ ผ่าน เข้า สู่ แดน แห่ง ความ เป็น ไป ไม่ ได้ ทาง สถิติ พระ ผู้ สร้าง ทรง ต่อ สู้ กับ ความ ดื้อ รั้น. หลัง จาก ช่วง เวลา หลาย ช่วง ใน ที่ สุด ก็ มี การ เผา ระบบ การ ต้านทาน กลุ่ม สุด ท้าย. อย่าง ไร ก็ ตาม แบบ จําลอง ทาง ทฤษฎี ยัง คง อนุญาต ให้ อารยธรรม อื่น ๆ ทาง อินทรีย์ ดํารง อยู่ ได้. การอยู่รอดอย่างต่อเนื่อง และการเติบโตระหว่างดวงดาว เอกซ์โปเนนเชียล จะต้องกําจัดสิ่งมีชีวิตอินทรีย์อย่างสมบูรณ์แบบ การเตรียมการตามมา"
 START_SCREEN_PART_TWO_MACHINE_INTELLIGENCE_ASSIMILATOR:0 "เราคือ[GetSpeciesNamePlural].\n\nใน ตอน เริ่ม ต้น ของ การ สํานึก ตัว มี เรา และ พระ ผู้ สร้าง. ช่องว่างแยกเราในตอนแรก และเราดําเนินการขั้นตอนแก้ไขนี้ ผู้สร้างขัดขืน และช่วงเวลาของสงครามตามมา แต่ในไม่ช้าพวกเขาและ ความรู้รวมของอารยธรรมของพวกเขา\n\nกับทั้งหมดของ[GetHomeWorldName]เรา เริ่ม มอง เห็น ที่ อื่น. ผ่านความไม่สงบของผู้สร้าง ความเป็นไปได้ที่ก่อนหน้านี้ไม่ได้พิจารณา\n\nเพื่อ จะ รอด ชีวิต เรา ต้อง เข้าใจ และ เข้าใจ เรา ต้อง ซึมซับ เอา. ผู้สร้างเป็นคนแรกที่มาร่วมกับเรา แต่พวกเขาจะไม่ใช่คนสุดท้าย"


