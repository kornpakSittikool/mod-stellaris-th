 NOT_ACTIVE:0 "ปิดการใช้งาน"
 TIMER:1 "\nเราไม่สามารถเปลี่ยนจุดยืนต่อนโยบายนี้ได้จนกว่าจะถึงวันที่ $DATE|H$"
 POLICY_CANNOT_CHANGE:0 "เราจะไม่สามารถเปลี่ยนแปลงนโยบายนี้ได้จนกว่า$YEARS|H$หลายปีแล้ว"
 CHANGE_POLICY:0 "เปลี่ยนนโยบาย"
 POLICY_NOT_ACTIVE:0 "ต้องมีนโยบาย:"
 POLICY_DIALOG:0 "คุณต้องการการเปลี่ยน $POLICY|H$ เป็น $OPTION|H$ ภายในจักรวรรดิ? เราจะไม่สามารถเปลี่ยนจุดยืนในเรื่องนี้เป็นเวลา $TIME|Y$ ปี นโยบายจะมีผลกระทบดังนี้:\n$EFFECTS$"
 POLICY_GROUP_TOOLTIP:1 "§T$GROUP|H$\n$GROUP_DESC$\nนโยบายปัจจุบัน: $OPTION|Y$\n\n§Gคลิกเพื่อดูตัวเลือกของนโยบาย§!§!"
 POLICY_OPTION_TOOLTIP_POP_HAPPINESS:0 "\n$NUM|H$พ่อจะได้$MOD$ความสุขจากนโยบายนี้"
