 SCOUT_HANGAR_1:0 "กองยานสอดแนม"
 SCOUT_HANGAR_1_DESC:1 "การ บิน ของ เรือ ลูกเสือ ทํา ให้ มี ความ สามารถ พื้น ฐาน ใน การ โจมตี, การ ก่อกวน เครื่อง บิน ทิ้ง ระเบิด ศัตรู และ การ โจมตี ใน บริเวณ ใกล้ เคียง ของ เรือ แม่."
 FIGHTERS_HANGAR_1:0 "กองยานขับไล่ขั้นพื้นฐาน"
 FIGHTERS_HANGAR_1_DESC:1 "ยานจู่โจมพื้นๆ จะจู่โจมศัตรูที่อยู่ใกล้ๆ เมื่อยานแม่เข้าสู่สมรภูมิ"
 FIGHTERS_HANGAR_2:0 "กองยานขับไล่ขั้นปรับปรุง"
 FIGHTERS_HANGAR_2_DESC:1 "นัก รบ ที่ ปรับ ปรุง แล้ว มุ่ง เป้า ไป ยัง เรือ ศัตรู ที่ เล็ก กว่า อีก ทั้ง เครื่อง บิน ทิ้ง ระเบิด และ ยาน โจมตี ใน การ โจมตี ที่ ประสาน กัน."
 FIGHTERS_HANGAR_3:0 "กองยานขับไล่ขั้นสูง"
 FIGHTERS_HANGAR_3_DESC:1 "ปีก ของ นัก รบ ที่ ก้าว หน้า สามารถ ทํา ความ เสีย หาย ร้าย แรง แก่ เรือ ศัตรู ที่ เล็ก กว่า และ ยึด ปีก ของ ตน เอง ไว้ ต่อ สู้ กับ ยาน โจมตี ที่ เป็น ปฏิปักษ์."
 BOMBERS_HANGAR_1:0 "กองยานทิ้งระเบิดขั้นพื้นฐาน"
 BOMBERS_HANGAR_1_DESC:1 "ปีก พื้นฐาน ของ ลูก ระเบิด มี ปริมาณ เพียง เล็ก น้อย ซึ่ง ใช้ ใน การ โจมตี เรือ ศัตรู ขนาด ใหญ่ จาก ที่ ใกล้ เคียง."
 BOMBERS_HANGAR_2:0 "กองยานทิ้งระเบิดขั้นปรับปรุง"
 BOMBERS_HANGAR_2_DESC:1 "ผู้ ทิ้ง ระเบิด ที่ ปรับ ปรุง แก้ไข ทํา ให้ เรือ รบ ศัตรู ได้ รับ ความ เสีย หาย มาก ขึ้น."
 BOMBERS_HANGAR_3:0 "กองยานทิ้งระเบิดขั้นสูง"
 BOMBERS_HANGAR_3_DESC:1 "ผู้วางระเบิดระดับสูง นําทัพสู่สมรภูมิอวกาศ เพื่อเข้าใกล้ยานข้าศึกจากมุมที่คาดไม่ถึง ส่งวัตถุระเบิด"

