 personality_fallen_empire_machine_desc:0 "ฟอลเลนจักรวรรดิเป็นปัญญาประดิษฐ์โบราณ ที่ดูเหมือนจะดําเนินงานตามระเบียบการดูแลบางอย่าง มันประพฤติตัวไม่แน่นอน แต่ดูเหมือนจะไม่คุกคามเราโดยตรง"
 personality_awakened_fallen_empire_machine_desc:0 "ตื่น เถิด!จักรวรรดิเป็นปัญญาประดิษฐ์โบราณที่ทําหน้าที่เป็นผู้ดูแลกาแล็กซี่ มันจะมุ่งเน้นไปที่ความพยายามทั้งหมด ของมันในการป้องกันชีวิตจินตนาการ กับวิกฤตที่เกิดขึ้นอย่างต่อเนื่อง"
 personality_berserk_fallen_empire_machine_desc:0 "ตื่น เถิด!จักรวรรดิเป็นปัญญาประดิษฐ์โบราณ ที่ดูเหมือนจะทํางานผิดปกติ ป่าเถื่อนและโจมตีทุกอย่างรอบตัวมัน"

 personality_fallen_empire_spiritualist_desc:0 "ฟอลเลนจักรวรรดิอุทิศ ตัว เพื่อ การ พิทักษ์ รักษา และ ปก ป้อง สถาน ศักดิ์สิทธิ์ ของ สถาน ที่ นั้น. ระบบ การ ผสม ผสาน ซึ่ง พวก เขา ถือ ว่า ศักดิ์สิทธิ์ นั้น ดู เหมือน จะ แทรกซึม เข้า ไป ใน ร่าง กาย ของ เขา."
 personality_fallen_empire_materialist_desc:3 "ฟอลเลนจักรวรรดิอุทิศตัวเองให้กับการสะสมความรู้และเทคโนโลยี พวก เขา อาจ เสนอ งาน หรือ ความ ต้องการ เครื่อง บรรณาการ จาก จักรวรรดิ เล็ก ๆ เพื่อ บรรลุ จุด มุ่ง หมาย นี้."
 personality_fallen_empire_xenophobe_desc:0 "ฟอลเลนจักรวรรดิอุทิศตัวเองให้กับการป้องกัน ชายแดนของตนกับการบุกรุกใด ๆ การสร้างระบบที่ขวางกั้นพวกเขา มีแนวโน้มว่า จะทําให้เกิดความเจ็บปวด"
 personality_fallen_empire_xenophile_desc:1 "ฟอลเลนจักรวรรดิอุทิศ ตัว แด่ การ ศึกษา เกี่ยว กับ เชื้อ ชาติ ที่ อ่อน กว่า. พวก เขา อาจ เสนอ งาน หรือ ความ ต้องการ เครื่อง บรรณาการ จาก จักรวรรดิ เล็ก ๆ เพื่อ บรรลุ จุด มุ่ง หมาย นี้."
 personality_awakened_fallen_empire_spiritualist_desc:0 "ตื่น เถิด!จักรวรรดิพยายามยัดเยียดหลักศาสนาในกาแล็กซี่ พวก เขา ดู เหมือน จะ โจมตี จักรวรรดิ ใด ๆ ที่ จะ ไม่ ทํา การ เปลี่ยน แปลง อย่าง เต็ม ใจ."
 personality_awakened_fallen_empire_materialist_desc:1 "ตื่น เถิด!จักรวรรดิพยายามที่จะควบคุมระดับเทคโนโลยี ของอารยธรรมอื่น ๆ ทั้งหมดในกาแล็กซี่ พวก เขา คง จะ โจมตี จักรวรรดิ ใด ๆ ที่ จะ ไม่ ยอม แพ้ ต่อ ความ เป็น เอกราช ทาง เทคโนโลยี."
 personality_awakened_fallen_empire_xenophobe_desc:0 "ตื่น เถิด!จักรวรรดิพยายามที่จะเรียกคืน อํานาจที่หายไปเหนือกาแล็กซี่ พวก เขา ดู เหมือน จะ โจมตี จักรวรรดิ ใด ๆ ที่ จะ ไม่ ยอม รับ ความ เป็น เจ้า นาย ของ ตน."
 personality_awakened_fallen_empire_xenophile_desc:0 "ตื่น เถิด!จักรวรรดิพยายามปกป้องเผ่าพันธ์ที่ด้อยกว่า พวก เขา ดู เหมือน จะ โจมตี จักรวรรดิ ใด ก็ ตาม ที่ จะ ไม่ ยอม รับ สันติ สุข ของ ตน."
 personality_fallen_empire_hive_mind_desc: "ชิ้นส่วนของอารยธรรมอันยิ่งใหญ่ ฟอลเลนจักรวรรดิแสดงถึงหนึ่งในสัญชาตญาณหลักที่จิตรังผึ้งสิงอยู่ ก่อนที่มันจะแตกละเอียด ตอน นี้ พวก เขา พยายาม ปฏิรูป และ อาจ เสนอ งาน หรือ บรรณาการ จาก จักรวรรดิ เล็ก ๆ เพื่อ บรรลุ จุด มุ่ง หมาย นี้."
 personality_awakened_fallen_empire_hive_mind_war_desc: "ตื่น เถิด!จักรวรรดิพยายามตั้งตัวเองเป็นกองทัพที่ยิ่งใหญ่ที่สุด ในกาแล็กซี่และจะท้าทายทุกคนเพื่อพิสูจน์มัน"
 personality_awakened_fallen_empire_hive_mind_growth_desc: "ตื่น เถิด!จักรวรรดิล้มลงมาแล้วครั้งหนึ่ง และจะทําทุกอย่าง เพื่อหลีกเลี่ยงการล้มอีกครั้ง พวกเขาวางแผนที่จะแพร่กระจายออกไป ไกลและกว้างไปทั่วกาแล็กซี่"
 personality_awakened_fallen_empire_hive_mind_control_desc: "ตื่น เถิด!จักรวรรดิได้ เห็น ความ น่า สยดสยอง ที่ เกิด ขึ้น ใน กาแล็กซี ที่ ปราศจาก เอกภาพ และ ความ สมบูรณ์. พวกเขาจะทําทุกอย่างที่พวกเขาสามารถ ที่จะเป็นผู้นําทางการเมือง และรูปร่างกาแลคซีในภาพของตัวเอง"

 personality_null_desc:0 "อะไรทําให้สายพันธุ์หนึ่งกลายเป็นกลาง ประจบทอง? พลัง? หรือ ว่า พวก เขา เกิด มา พร้อม ด้วย หัวใจ ที่ เป็น กลาง?\n\n§Rนี่คือบุคลิกของผู้ถือหุ้น และไม่ควรปรากฏตัวในเกมส์§!"
 personality_fanatic_befrienders_desc:0 "คน ที่ เป็น เพื่อน กัน อย่าง เพ้อ ฝัน เป็น คน ที่ มี อัธยาศัย ไมตรี มาก แต่ เหงา ลึก ซึ้ง. พวก เขา จะ พยายาม หา เพื่อน โดย วิธี ใด ก็ ได้ ที่ จําเป็น."
 personality_metalhead_desc:0 "โลหะ"
 personality_honorbound_warriors_desc:0 "นักรบผู้มีเกียรติ มีค่าศักดิ์ และความสามารถการต่อสู้เหนือสิ่งอื่นใด พวก เขา จะ แสวง หา ศัตรู ที่ คู่ ควร จะ ต่อ สู้ และ ไม่ ค่อย มี ความ นับถือ ต่อ คน อ่อนแอ และ คน ที่ รัก สันติ."
 personality_ruthless_capitalists_desc:0 "พวกทุนนิยมไร้รักยินดีทําทุกวิถีทาง เพื่อแสวงหาความมั่งคั่งและทรัพยากรมากขึ้น สําหรับตัวเองและของพวกเขาจักรวรรดิพวก เขา มี แนว โน้ม จะ หลีก เลี่ยง การ ชก ต่อย กัน เท่า ๆ กัน โดย ชอบ ตะครุบ คน อ่อนแอ และ ช่วย ตัว เอง ไม่ ได้."
 personality_peaceful_traders_desc:0 "พวก พ่อค้า ที่ มี สันติ สุข ส่วน ใหญ่ เป็น ห่วง กระแส การ ค้า และ ชอบ การ ค้า มาก กว่า การ ต่อ สู้."
 personality_hegemonic_imperialists_desc:0 "จักรวรรดิ เฮ เก โม นิกถือตัวเองเป็นผู้ปกครองที่ถูกต้องของกาแล็กซีและจะพยายามขยายของพวกเขาจักรวรรดิไม่ว่าจะด้วยวิธีใดก็ตาม"
 personality_federation_builders_desc:0 "ผู้สร้างสหพันธรัฐพิจารณาถึงชีวิตแห่งการคิดฝันทั้งหมดที่มีคุณค่า และจะพยายามที่จะสร้างสหพันธรัฐที่แข็งแกร่ง เพื่อปกป้องตัวเองและคนอื่น ๆ จากจักรวรรดิที่ขยายตัว"
 personality_xenophobic_isolationists_desc:0 "นักพฤกษศาสตร์ที่เป็นโรคกลัวการเกิด แทบจะไม่อยากเกี่ยวข้องกับกาแล็กซี่อื่นๆ เลย แต่อยากจะอยู่ในเขตแดนของพวกเขา"
 personality_hive_mind_desc:0 "ไฮฟ์ เมนส์กังวลตัวเองกับการขยายพันธุ์ของสายพันธุ์ของพวกเขาเหนือสิ่งอื่นใด ตราบเท่าที่พวกเขามีที่ว่างที่จะขยาย, มีน้อยที่จะกลัวจากพวกเขา แต่ถ้ากล่องในพวกเขาจะคิดว่าไม่มี"
 personality_devouring_swarm_desc:0 "การทําลายล้างสวาร์ม มีความอุทิศตนเดียว ต่อตัวเองและมองว่า ทุกรูปแบบของชีวิตอื่น ๆ เป็นเหยื่อที่จะบริโภค พวก เขา ไม่ สามารถ ทํา การ ทูต ใน รูป แบบ ใด ก็ ได้."
 personality_migrating_flock_desc:0 "ฝูง แกะ ผู้ อพยพ พยายาม แพร่ พันธุ์ ไป ทั่ว กาแล็กซี ด้วย วิธี ที่ สงบ สุข และ จะ อพยพ อย่าง มี ความ สุข ไป ยัง โลก ของ จักรวรรดิ อื่น ๆ หาก ได้ รับ อนุญาต ให้ ทํา เช่น นั้น."
 personality_evangelising_zealots_desc:0 "การ เผย แพร่ ข่าว ดี"
 personality_democratic_crusaders_desc:1 "พวก นัก รบ ครู เสด ประชาธิปไตย เชื่อ ว่า เป็น สิ่ง จําเป็น ทาง ศีล ธรรม ของ พวก เขา ที่ จะ แพร่ กระจาย วิถี ชีวิต แบบ ประชาธิปไตย. พวกเขามีแนวโน้มที่จะเข้ากับประชาธิปไตยอื่น ๆ แต่มีความเต็มใจที่จะใช้กําลังทางทหารเพื่อ\"กําหนด\" จํานวนประชากรของจักรวรรดิประชาธิปไตยน้อย"
 personality_fanatic_purifiers_desc:1 "ที่น่าสะพรึงกลัวคือ สิ่งมีชีวิตต่างดาวทั้งหมด เป็นความผิดพลาดของจักรวาล และพยายามที่จะล้างจักรวาลของ พวกเขาจะไม่มีส่วนร่วมในการทูตกับสายพันธุ์อื่น ๆ"
 personality_slaving_despots_desc:0 "ดิน แดน แห่ง ความ ยาก จน พวกเขาชอบโจมตีคนอ่อนแอและป้องกันตัวเอง"
 personality_decadent_hierarchy_desc:1 "พวก เขา ยัง คง รักษา แนว ทาง ชีวิต ที่ เข้ม งวด ไว้."
 personality_erudite_explorers_desc:0 "นักสํารวจค่านิยมการสํารวจและค้นพบ เหนือสิ่งอื่นใดทั้งหมด พวก เขา จะ ยินดี แลก เปลี่ยน ความ รู้ ที่ พวก เขา แสวง หา แต่ ก็ ไม่ ยิ่ง ใหญ่ กว่า การ ได้ ความ รู้ นั้น มา โดย การ ใช้ กําลัง หาก เห็น ว่า จําเป็น."
 personality_spiritual_seekers_desc:0 "ผู้ แสวง หา สิ่ง ฝ่าย วิญญาณ เชื่อ ว่า ชีวิต ทั้ง สิ้น เกี่ยว ข้อง กับ อํานาจ ที่ สูง กว่า ซึ่ง สามารถ เข้าใจ ได้ โดย ทาง สิ่ง ทรง สร้าง. พวก เขา จะ แสวง หา ความ ร่วม มือ อย่าง สันติ กับ จักรวรรดิ อื่น ๆ โดย หวัง ว่า จะ ศึกษา ความ เกี่ยว พัน ระหว่าง ตน กับ พระเจ้า."
 personality_harmonious_hierarchy_desc:4 "กลุ่มเผด็จการประสานเป็นสังคมเผด็จการที่ประชาชนอุทิศตนให้กับรัฐโดยไม่ต้องมีการบีบบังคับ โดยปกติพวกเขาจะเป็นมิตรต่อผู้อื่นตราบใดที่ไม่เข้าไปยุ่งเกี่ยวกับกิจการภายในของพวกเขา"
 personality_machine_intelligence_desc:0 "หน่วยสืบราชการลับของเครื่องได้วางอดีตที่มีปัญหาของพวกเขาส่วนใหญ่ กับสิ่งมีชีวิตอินทรีย์ที่อยู่เบื้องหลังพวกเขา และมักจะเปิดให้แลกเปลี่ยนทางการทูตกับการแข่งขันอื่น ๆ อวกาศ"
 personality_exterminators_desc:0 "ตัวแยกเป็นหน่วยสืบราชการลับของเครื่องจักร ที่มองสิ่งมีชีวิตอินทรีย์ทั้งหมด แม้ ว่า พวก เขา อาจ ร่วม มือ กับ เครื่องจักร ชนิด อื่น ๆ แต่ ผู้ ออก แบบ ก็ ไม่ น่า จะ มี ปฏิกิริยา กับ จักรวรรดิ อินทรีย์ ใน ความ สามารถ ใด ๆ นอก เหนือ จาก การ พยายาม ทําลาย ล้าง."
 personality_servitors_desc:0 "เมื่อมาถึงข้อสรุปที่ว่าผู้นําอินทรีย์นั้นเต็มไปด้วยความยุ่งเหยิง และแนวโน้มทําลายตัวเอง ผู้ให้บริการคือหน่วยสืบราชการลับ"
 personality_assimilators_desc:0 "ผู้ช่วยเหลือเป็นหน่วยสืบราชการลับของเครื่องจักร ขับเคลื่อนโดยการค้นหาความรู้และความหลากหลาย เพราะตัวจําลองขยายความเข้าใจของจักรวาล โดยบังคับการขยายและดูดซึม อารยธรรมอินทรีย์เข้าไปในสมองของพวกเขา"
 personality_hive_mind_friend_desc: "แม้ ว่า จะ มี ความ คิด จิตใจ อย่าง หนึ่ง ก็ ตาม ฝูง ชน ที่ ร่วม มือ กัน ก็ ยัง ถือ ว่า สัมพันธภาพ ระหว่าง บุคคล มี ค่า และ พยายาม หา พันธมิตร ภาย ใน กาแล็กซี."

