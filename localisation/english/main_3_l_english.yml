 # Needs words but doing implementation first
 agriculture_0_desc: "ลื่นไถลผ่านดิน มีมาแต่กําเนิดของอารยธรรมเอง"
 agriculture_1_desc: "การผสมของออโตเมชันจะคํารามข้ามทุ่งไม่มีที่สิ้นสุด"
 agriculture_2_desc: "กลยุทธ์การเกษตรของเราได้รับการสนับสนุนจาก การจําลองที่ละเอียดนับไม่ถ้วน"
 agriculture_3_desc: "เมล็ด แต่ ละ เมล็ด เป็น สิ่ง มหัศจรรย์ ของ แคลคูลัส ทาง พันธุกรรม."
 agriculture_4_desc: "ทุก ต้น จะ มี ต้น นา ซึ่ง ทํา ให้ ผล และ การ บํารุง เลี้ยง ดี ที่ สุด."
 agriculture_anglers_0_desc: "การดําเนินงานเหล่านี้เป็นวิธีดั้งเดิม แต่ยังคงมีผลที่ปฏิเสธไม่ได้"
 agriculture_anglers_1_desc: "นก นางแอ่น โฉบ ลง ไป ใน ทะเล ลึก ทํา ให้ ทะเล มี ประสิทธิภาพ."
 agriculture_anglers_2_desc: "แนวปะการังที่ควบคุมได้เต็มไปด้วย ปลาที่มีชีววิศวกรรม"
 agriculture_anglers_3_desc: "เผ่าพันธุ์มี การ จัด เตรียม เพื่อ การ เจริญ เติบโต อย่าง รวด เร็ว และ ความ ชํานาญ ใน การ ว่าย น้ํา อย่าง เป็น ระเบียบ ใน โรง เรียน."
 agriculture_anglers_4_desc: "มี การ นํา ปลา เข้า ไป ใน โรง เรียน ตาม ปกติ จน กระทั่ง ถูก จับ ได้ แล้ว ก็ ผ่าน ไป ทันที."
 agriculture_exotic_gases_1_desc: "การ กลั่น ตัว ของ เสา กลั่น เก็บ ผล ผลิต จาก ระบบ นิเวศ ใน ท้อง ถิ่น และ กลั่น ก๊าซ ต่าง ๆ ที่ เป็น ประโยชน์ จาก ส่วน ผสม นี้."
 agriculture_exotic_gases_2_desc: "เทคนิค การ เก็บ เกี่ยว ก๊าซ ที่ ใช้ ใน ฤดู กาล ได้ รับ ฤทธิ์ จาก การ จําลอง นับ ไม่ ถ้วน."
 agriculture_exotic_gases_3_desc: "การ เพิ่ม ขึ้น ทาง พันธุกรรม ของ ชีวิต ใน ท้อง ถิ่น ทํา ให้ ก๊าซ ต่าง ๆ มี ปริมาณ เพิ่ม ขึ้น อย่าง มาก."
 agriculture_exotic_gases_4_desc: "การสอดคล้องของนาไนท์และจุลินทรีย์ ทําให้อัตราการเติบโตและการปล่อยก๊าซ"

 mining_0_desc: "ขวาน และ เกวียน เป็น พื้น ฐาน ของ การ ถอน ราก ที่ เจริญ แล้ว."
 mining_1_desc: "ดิ๊กเกอร์และสว่าน กินภูเขาตัวเอง"
 mining_2_desc: "ความ ร้อน สูง สุด และ ความ ดัน ที่ ร้อน จัด ทํา ให้ มี ความ ก้าว หน้า ทาง ความ รุนแรง ที่ ควบคุม ได้."
 mining_3_desc: "ปล่องน้ํากําลังเข้าสู่แกน"
 mining_4_desc: "แร่ถูกล้อโดยอะตอมจากหิน"
 mining_betharian_1_desc: "การเรืองแสงที่แปลกของเบตาเรียน บอกใบ้พลังงานที่เป็นไปไม่ได้"
 mining_betharian_2_desc: "ท่อน้ําฮัมเพลงด้วย ความอบอุ่นที่ผิดธรรมชาติ พลังสูบฉีดจากส่วนลึก"
 mining_betharian_3_desc: "เมื่อความดันและเบตาเรียนบรรจบกัน พลังงานจะบาน"
 mining_betharian_4_desc: "ชิ้น ส่วน เบตา เรียน แต่ ละ ชิ้น ถูก สกัด ออก มา ด้วย ความ แม่นยํา ทาง ศัลยกรรม ขจัด เหตุ การณ์ ที่ ทํา ให้ ไม่ คงที่."
 mining_rare_crystals_1_desc: "เช่น เดียว กับ ดิน แดน อัน กว้าง ใหญ่ เหมือง เหล่า นี้ ก็ เต็ม ไป ด้วย ผลึก ที่ หา ยาก."
 mining_rare_crystals_2_desc: "ภาย ใต้ ความ กดดัน อย่าง หนัก ทาง ธรณี วิทยา ที่ อยู่ รอบ ๆ ทํา ให้ มี ทาง ที่ จะ เติบโต ได้ ยาก ที่ สุด เท่า นั้น."
 mining_rare_crystals_3_desc: "การก่อตัวของคริสตัลขนาดใหญ่ ที่เติบโตที่ขอบของเปลือกและเสื้อคลุม"
 mining_rare_crystals_4_desc: "การขุดอุโมงค์ควอนตัมและเหมืองเสมือน อนุญาตให้สกัดทรัพยากรได้ โดยไม่ต้องมีเหมือง"

 generator_0_desc: "เทอร์บินส์หมุนและขดลวด" # bubble bubble toil and trouble
 generator_1_desc: "อ่างเก็บพลังงานที่มีศักยภาพสูง มีความผันผวนที่ผูกแน่น"
 generator_2_desc: "พลัง งาน จะ ถูก นํา ไป สู่ ลําธาร ที่ มั่นคง โดย อัลกอริทึม และ เจตนา."
 generator_3_desc: "ควอนตัมแกนสร้างพลังงาน ทําให้ทั้งระยะทางและมิติเบลอ"
 generator_4_desc: "สิ่งเหล่านี้สร้างความเป็นจริงโค้งรอบตัวเอง เพื่อดึงพลังงานจากโครงสร้างของอวกาศเอง"
 generator_volatile_motes_1_desc: "การเปลี่ยนเส้นทางของคานไฟฟ้าสูง ติดกับกากบาทที่ผันผวน ทําให้เก็บเกี่ยวง่ายขึ้น"
 generator_volatile_motes_2_desc: "กับดักสนามพลังงาน ที่ผันผวนพวกนี้ ทําให้การกลับมาของพลังงานของพวกเขาลดลง"
 generator_volatile_motes_3_desc: "ความเกี่ยวข้องของควอนตัมระหว่างจุดผันผวนกับสสารที่เสถียร หมายความว่าการเก็บเกี่ยวโมเต ปลอดภัยพอ[owner.GetSpeciesSpawnName]สามารถทํางานได้ ตามทฤษฎี"
 generator_volatile_motes_4_desc: "การจัดการของพบตัวแบ่งประเภทในหน่วยพลังงานศูนย์จุด กับดักโมเตสจะตกอยู่ในสภาวะคงที่"

 zone_food_biology: "สนับสนุนการวิจัยทางชีววิทยา"
 zone_food_biology_desc: "โดย การ กลั่น กรอง วัสดุ อินทรีย์ จาก เขต ใกล้ เคียง ความ ก้าว หน้า และ คุณภาพ ของ การ ทดลอง ของ เรา จึง ดี ขึ้น อย่าง มาก."

 zone_energy_physics: "สนับสนุนการวิจัยด้านพลังงาน"
 zone_energy_physics_desc: "ด้วยเตาปฏิกรณ์ที่มีประสิทธิภาพ เชื่อมต่อพลังงานโดยตรงไปยังศูนย์วิจัยของพวกเขา นักฟิสิกส์ของเรา"

 zone_minerals_engineering: "สนับสนุนการวิจัยแร่ธาตุ"
 zone_minerals_engineering_desc: "มี แร่ ธาตุ อยู่ อย่าง ต่อ เนื่อง ทั้ง แบบ แปลก ๆ และ แบบ ธรรมดา ทํา ให้ วิศวกร ของ เรา สามารถ ทดลอง ด้วย อัตรา การ ท่อง เที่ยว มาก กว่า คน อื่น ๆ."

 zone_minerals_physics: "เหมืองกราวิตอน"
 zone_minerals_physics_desc: "การ ขุด ลึก เข้า ไป ใน ภูเขา ที่ ถูก แขวน ไว้ จะ ทํา ให้ ผล ผลิต ที่ ได้ รับ ความ เสีย หาย เพิ่ม ขึ้น อย่าง รวด เร็ว."
 district_mining_physics: "$district_mining$"
 district_mining_physics_plural: "$district_mining_plural$"
 district_mining_physics_desc: "$district_mining_desc$"

 zone_urban_energy: "สนับสนุนเครื่องกำเนิดไฟฟ้า"
 zone_urban_minerals: "สนับสนุนการทำเหมือง"
 zone_urban_food: "สนับสนุนการเกษตร"
 zone_urban_energy_desc: "โดยกําหนดพื้นที่ในเมืองส่วนใหญ่ เพื่อขยายและสนับสนุนพลังงานของเรา เราสามารถผลิตผลที่น่าทึ่งได้"
 zone_urban_minerals_desc: "โดยกําหนดพื้นที่ส่วนใหญ่ในเมืองของเรา เพื่อขยายและสนับสนุนการขุดเจาะแร่ของเรา เราสามารถผลิตได้อย่างน่าทึ่ง"
 zone_urban_food_desc: "โดย กําหนด พื้น ที่ ส่วน ใหญ่ ใน ตัว เมือง ของ เรา เพื่อ แผ่ ขยาย และ สนับสนุน ความ พยายาม ใน การ เกษตร ของ เรา เรา สามารถ ทํา ให้ การ ผลิต ที่ น่า ทึ่ง จริง ๆ."

 zone_research_physics: "ฟิสิกส์การวิจัยพิเศษ"
 zone_research_engineering: "วิศวกรรมการวิจัยพิเศษ"
 zone_research_society: "สังคมการวิจัยพิเศษ"

 zone_research_physics_desc: "โดยการจัดลําดับฟิสิกส์กว่าสาขาที่มีประสิทธิภาพทางทฤษฎีน้อยเช่นวิศวกรรมและสังคม เราสามารถก้าวหน้าไปไกลเกินขอบเขตของเราก่อนหน้านี้"
 zone_research_engineering_desc: "โดยการจัดลําดับวิศวกรรม กว่าสนามที่มีประโยชน์น้อยกว่ามาก เช่น ฟิสิกส์และสังคม เราสามารถเร่ง ความก้าวหน้าของเครื่องจักร"
 zone_research_society_desc: "โดย เปลี่ยน แปลง ทรัพยากร จาก สาขา ทาง ฟิสิกส์ และ วิศวกรรม ทาง ฝ่าย วิญญาณ ให้ เป็น งาน วิจัย สังคม เรา จะ ทํา ให้ ประเทศ ของ เรา และ ตัว เรา เอง มั่งคั่ง."

 zone_research_physics_triggered_desc: "ทั้งหมด$job_biologist_plural_with_icon$ถึง$job_engineer_plural_with_icon$จะถูกแทนที่ด้วย$job_physicist_plural_with_icon$"
 zone_research_engineering_triggered_desc: "ทั้งหมด$job_physicist_plural_with_icon$ถึง$job_engineer_plural_with_icon$จะถูกแทนที่ด้วย$job_biologist_plural_with_icon$"
 zone_research_society_triggered_desc: "ทั้งหมด$job_physicist_plural_with_icon$ถึง$job_biologist_plural_with_icon$จะถูกแทนที่ด้วย$job_engineer_plural_with_icon$"

