 # War Goals
 war_goal_wg_conquest:0 "พิชิต"
 #war_goal_wg_conquest_desc: "Wage war to seize enemy systems that we have claims on."
 war_goal_wg_conquest_desc:1 "ทำสงครามเพื่อยึดระบบของศัตรูที่เราได้อ้างสิทธิ์ไว้ การใช้การอ้างสิทธิ์จะช่วยลด §Yภัยคุกคาม§! ลง §Y25%§! ในแต่ละระบบหลังถูกปราบ"
 war_goal_wg_liberation:0 "ปลดปล่อย"
 #war_goal_wg_liberation_desc: "Wage war to extricate a number of planets from the enemy, forming an independent and friendly Empire."
 war_goal_wg_liberation_desc:0 "ทำสงครามเพื่อให้ดาวเคราะห์จำนวนหนึ่งแยกตัวออกจากศัตรูจนกลายเป็นจักรวรรดิที่เป็นอิสระและเป็นมิตร"
 war_goal_wg_subjugation:0 "ทำให้เป็นบริวาร"
 #war_goal_wg_subjugation_desc: "Wage war to subjugate the enemy as a Vassal."
 war_goal_wg_subjugation_desc:2 "สงครามพิชิตศัตรูเพื่อให้เป็นบริวาร\n\nเมื่อสงครามยุติ ระบบดาวที่เราครอบครองจะถูกปลดปล่อยให้อยู่ในฐานะจักรวรรดิบริวารใหม่ (ถ้าหากพวกเขามีดาวเคราะห์อย่างน้อยหนึ่งดวง)\n\nเงื่อนไขข้อตกลงเบื้องต้นของการเป็นบริวารถูกกำหนดโดยนโยบาย §Y$policy_subjugation_war_terms$§! ของเรา"
 war_goal_wg_tribute:0 "ให้ส่งบรรณาการ / เมืองขึ้น"
 #war_goal_wg_tribute_desc: "Wage war to subjugate the enemy as a Tributary."
 war_goal_wg_tribute_desc:1 "ทำสงครามกันเพื่อปราบศัตรูเป็นจักรวรรดิบรรณาการ(เมืองขึ้น)\n\nเมื่อสงครามยุติ ระบบดาวที่เราครอบครองจะได้รับการปลดปล่อยให้เป็นจักรวรรดิบรรณาการใหม่หากมีดาวเคราะห์อย่างน้อยหนึ่งดวง"
 war_goal_wg_megacorp_subjugate:0 "ทำให้เป็นบริษัทย่อย / สาขา"
 war_goal_wg_megacorp_subjugate_desc:1 "สงครามเพื่อทำให้ศัตรูเป็นบริษัทสาขาย่อย\n\nเมื่อสงครามยุติ ระบบดาวที่เราครอบครองจะได้รับการปลดปล่อยให้อยู่ในฐานะบริษัทสาขาใหม่ หากมีดาวเคราะห์อย่างน้อยหนึ่งดวง\n\nเงื่อนไขข้อตกลงเบื้องต้นของการเป็นบริวารถูกกำหนดโดยนโยบาย §Y$policy_subjugation_war_terms$§! ของเรา"
 war_goal_wg_hostile_takeover:1 "ยึดทรัพย์สิน"
 war_goal_wg_hostile_takeover_desc:1 "ทำสงครามเพื่อยึดการควบคุมสำนักงานสาขาของพวกเขา"
 war_goal_wg_humiliation:0 "ทำให้อับอาย"
 #war_goal_wg_humiliation_desc: "Wage war to destroy the enemy's chain of command, disrupt their logistical flows, undermine the public's faith in their institutions, and destabilize the regime."
 war_goal_wg_humiliation_desc:0 "ทำสงครามเพื่อบ่อนทำลายระบอบการปกครองของศัตรูและศรัทธาของประชาชนในสถาบันของพวกเขา"
 war_goal_wg_payback_msi_humiliation:0 "$war_goal_wg_humiliation$"
 war_goal_wg_payback_msi_humiliation_desc:0 "$war_goal_wg_humiliation_desc$"
 war_goal_wg_force_ideology:0 "บังคับให้เปลี่ยนอุดมการณ์"
 war_goal_wg_force_ideology_desc:1 "สงครามเพื่อบังคับศัตรูเปลี่ยนจริยธรรมและรูปแบบการปกครอง\n\nเมื่อสงครามยุติ ระบบดาวที่เราครอบครองจะถูกปลดปล่อยให้เป็นพันธมิตรทางอุดมการณ์ใหม่ หากระบบเหล่านั้นมีดาวเคราะห์อย่างน้อยหนึ่งดวง"
 war_goal_wg_fe_humiliation:0 "ทำให้อับอาย"
 war_goal_wg_fe_humiliation_desc:0 "สงครามเพื่อสอนบทเรียนให้กับผู้ที่เริ่มต้นใหม่"
 war_goal_wg_fe_stop_atrocities:0 "หยุดความโหดร้ายป่าเถื่อน"
 war_goal_wg_fe_stop_atrocities_desc:0 "สงครามเพื่อบังคับให้ศัตรูหยุดการปฏิบัติที่น่ารังเกียจของพวกเขา"
 war_goal_wg_fe_cleanse_holy_worlds:0 "ชำระล้างดาวศักดิ์สิทธิ์"
 war_goal_wg_fe_cleanse_holy_worlds_desc:0 "สงครามเพื่อขับไล่พวกนอกรีตออกจากดินแดนบริสุทธิ์"
 war_goal_wg_fe_cleanse_border_worlds:0 "ขจัดสิ่งปนเปื้อนอาณาเขตชายแดน"
 war_goal_wg_fe_cleanse_border_worlds_desc:0 "สงครามเพื่อกำจัดศัตรูที่เห็นว่าอยู่ใกล้เขตแดนหลักมากเกินไป"
 war_goal_wg_fe_stop_ai:0 "AI นอกกฎหมาย"
 war_goal_wg_fe_stop_ai_desc:0 "สงครามเพื่อบังคับให้ศัตรูละทิ้งการแสวงประโยชน์จากปัญญาประดิษฐ์อย่างไร้เดียงสา"
