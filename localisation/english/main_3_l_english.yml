 ALL_POPS_EMANCIPATED:0 "§Eประชากรทั้งหมดในจักรวรรดิของคุณจะได้รับการปลดปล่อย§!"
 ALL_ROBOTS_DISASSEMBLED:0 "§Eหุ่นยนต์ทั้งหมดประชากรในจักรวรรดิของคุณจะถูกรื้อถอน§!"
 CLICK_POLICY_VIEW:0 "§Gคลิกเพื่อดูรายการที่เป็นไปได้จักรวรรดิคําพิพากษา§!"

 policy_pre_sapients:0 "อารยธรรมก่อนเซเปียนส์"
 policy_pre_sapients_desc:0 "เราสามารถตัดสินใจได้ว่า เราต้องการสายพันธุ์ก่อนยุคน้ําแข็ง ที่อาศัยอยู่บนโลกของเราหรือไม่"
 pre_sapients_allow:1 "ยอมให้มี"
 pre_sapients_allow_name:4 "ยอมให้มีอารยธรรมก่อนเซเปียนส์"
 pre_sapients_allow_desc: "สัตว์ฉลาดยังเป็นแค่สัตว์ พวก เขา จะ ถูก ละเลย ได้ อย่าง ปลอด ภัย."
 pre_sapients_protect:0 "ได้รับการปกป้อง"
 pre_sapients_protect_name:0 "ปกป้องอารยธรรมก่อนเซเปียนส์"
 pre_sapients_protect_desc:3 "แม้ ว่า ยัง คง เป็น สัตว์ ธรรมดา ๆ แต่ สัตว์ เหล่า นี้ ก็ ไม่ น้อย กว่า ที่ เรา เคย เป็น. เราควรแน่ใจว่าพวกเขาอนุรักษ์\n\n§Eและดาวเคราะห์ที่มีก่อนพรสวรรค์ไม่สามารถย้ายแล้ว\n\nสวนสัตว์ต่างดาวอาจจะถูกสร้างขึ้นบนดาวเคราะห์ที่มีก่อนการเกิดขึ้นอีก§!\n\n§Rมีการเปลี่ยนแปลงจากนโยบายนี้ จะลบสวนสัตว์คนต่างด้าวใด ๆ บนดาวเคราะห์ที่ไม่มี$d_alien_pets_deposit$เงินมัดจําหรือสัตว์อื่นๆ§!"
 pre_sapients_purge:0 "ถูกกำจัด"
 pre_sapients_purge_name:3 "กวาดล้างอารยธรรมก่อนเซเปียนส์"
 pre_sapients_purge_desc:0 "ทั้งหมดฤดูใบไม้ผลิ จากความจุสําหรับเหตุผล สัตว์มันก็เป็นแค่สัตว์ และสัตว์ที่ขวางทางเรา ก็แค่แมลง\n\n§Eสิ่งมีชีวิตบนดาวเคราะห์ของเราจะถูกกวาดล้าง§!"
 pre_sapients_eat:1 "จะต้องถูกล่า"
 pre_sapients_eat_name:1 "ไล่ล่าพวกอารยธรรมก่อนเซเปียนส์"
 pre_sapients_eat_desc:0 "สัตว์ที่ไม่มีภาพหลอน ยากที่จะพิจารณาว่า เป็นส่วนหนึ่งของจักรวรรดิของเรา แต่บางทีมันอาจจะช่วย\n\n§Eสิ่งมีชีวิตในดาวเคราะห์ของเรา จะถูกนําไปใช้เป็นอาหาร ทําให้ประชากรอ่อนแอ§!"

 policy_core_worlds:0 "ประชากรดาวแกนหลัก(คอ)"
 policy_core_worlds_desc:0 "เราสามารถตัดสินใจได้ว่าประชากรได้รับอนุญาตให้อาศัยอยู่ในโลกหลักของเรา ห้ามใช้ประชากรอยู่ที่นั่นแล้ว จะถูกบังคับให้ย้าย ไปยังส่วนของเรา หรือหลบหนีไปยังจักรวรรดิอื่น"
 core_worlds_all:0 "ทุกเผ่าพันธุ์"
 core_worlds_all_name:0 "ทุกเผ่าพันธุ์"
 core_worlds_all_desc:0 "ความ หลาก หลาย เป็น กุญแจ สู่ จักรวรรดิ ที่ มี ชีวิต ชีวา. โลกหลักของเราจะต้องสะท้อนค่าเหล่านี้ โดยการเปิดให้ทุกสายพันธุ์ในจักรวรรดิของเรา\n\n§Eทั้งหมดประชากรได้รับอนุญาตให้อาศัยอยู่ในโลกหลัก§!"
 core_worlds_citizens_and_slaves:0 "พลเมืองและทาสเท่านั้น"
 core_worlds_citizens_and_slaves_name:0 "พลเมืองและทาสเท่านั้น"
 core_worlds_citizens_and_slaves_desc:0 "แม้ว่าโลกหลักของเราจะต้อง ปลอดภัยจากอิทธิพลของคนต่างด้าว เราจะไม่ปฏิเสธประชาชนของเรา\n\n§Eไม่ใช่ทาสประชากรหากไม่มีพลเมืองที่สมบูรณ์ จะอพยพออกจากโลกหลัก§!"
 core_worlds_citizens_only:0 "พลเมืองเท่านั้น"
 core_worlds_citizens_only_name:0 "พลเมืองเท่านั้น"
 core_worlds_citizens_only_desc:0 "โลกหลักของเราเป็นหัวใจของจักรวรรดิของเรา จะ ไม่ อนุญาต ให้ สัตว์ ที่ ต่ําต้อย กว่า อาศัย อยู่ ที่ นั่น.\n\n§Eป๊อปส์ที่ไม่มีพลเมืองเต็มตัว จะอพยพออกจากโลกหลัก§!"

 policy_refugees:0 "ผู้ลี้ภัย"
 policy_refugees_desc:0 "เราสามารถตัดสินใจได้ว่าควรจะยอมรับหรือไม่ หรือปฏิเสธการลี้ภัยที่หลบหนี การย้ายถิ่นฐานและการข่มเหงในจักรวรรดิอื่น"
 refugees_not_allowed:0 "ไม่มีผู้ลี้ภัย"
 refugees_not_allowed_name:0 "$refugees_not_allowed$"
 refugees_not_allowed_desc:0 "การเปิดเขตแดนของเราสู่ก้นบึ้งของสังคมอื่น ๆ จะให้บริการเพียงเพื่อบ่อนทําลายรัฐ\n\n§Eไม่มีผู้ลี้ภัยจากจักรวรรดิอื่น§!"
 refugees_only_citizens:0 "เผ่าพันธุ์ที่เป็นพลเมืองเท่านั้น"
 refugees_only_citizens_name:0 "$refugees_only_citizens$"
 refugees_only_citizens_desc:0 "เรา ไม่ อาจ ยอม ให้ ความ เมตตา สงสาร มี อํานาจ เหนือ ความ รู้สึก ที่ ดี ได้. เฉพาะ คน เหล่า นั้น ที่ จะ เป็น คน ที่ มี ค่า ต่อ สังคม ควร ถูก นํา เข้า มา ใน พรม แดน ของ เรา.\n\n§Eผู้ลี้ภัยจากผ่าพันธุ์มีที่เป็นพลเมืองเต็มรูปแบบอาจมาจากจักรวรรดิอื่น§!"
 refugees_allowed:0 "ยินดีต้อนรับผู้ลี้ภัย"
 refugees_allowed_name:0 "$refugees_allowed$"
 refugees_allowed_desc:0 "ผู้ที่หลบหนีจากความตายและการข่มเหง ด้วยน้ํามือของทรราชจะได้รับการต้อนรับภายในเขตแดนของเรา\n\n§Eผู้ลี้ภัยอาจมาจากจักรวรรดิอื่น§!"

 policy_debris:0 "เศษซากต่างๆ"
 policy_debris_desc:0 "เราสามารถตัดสินใจได้ว่า เราควรค้นคว้า หรือทําให้ฝูงศัตรูที่ล้มตาย"
 research_debris:0 "วิจัยเศษซาก"
 research_debris_name:0 "$research_debris$"
 research_debris_desc:0 "เราจะวิจัยเทคโนโลยีของศัตรูจากซากยานของพวกเขา"
 scavenge_debris:0 "เก็บขยะเศษซาก"
 scavenge_debris_name:0 "$scavenge_debris$"
 scavenge_debris_desc:0 "เราจะค้นหาทรัพยากรจากซากยานศัตรู"
 scavenge_and_research_debris:0 "วิจัยและเก็บขยะเศษซาก"
 scavenge_and_research_debris_name:0 "$scavenge_and_research_debris$"
 scavenge_and_research_debris_desc:0 "เป็น§Y$civic_scavengers$§!เราจะรื้อถอนชิ้นส่วนสําหรับทั้งการวิจัยและทรัพยากร"

 policy_population_controls:0 "การควบคุมจำนวนประชากร"
 policy_population_controls_desc:0 "เราสามารถตัดสินใจได้ว่า การคัดเลือกประชากร ควรถูกต้องตามกฎหมายในจักรวรรดิของเราหรือไม่"
 population_controls_not_allowed:0 "ไม่อนุญาต"
 population_controls_not_allowed_name:0 "ห้ามการควบคุมจำนวนประชากร"
 population_controls_not_allowed_desc:1 "การแพร่พันธุ์และแพร่พันธุ์ของพวกเขา เป็นสิทธิที่ไม่อาจเปลี่ยนแปลงได้ ของประชาชนทุกคน\n\n§E- ไม่สามารถเปิดใช้งานการควบคุมประชากรในการกำหนดสิทธิของเผ่าพันธุ์ได้§!\n§E- ไม่สามารถเลือกเผ่าพันธุ์ที่จะ เพิ่ม/ปฏิเสธ ได้§!"
 population_controls_allowed:0 "อนุญาต"
 population_controls_allowed_name:0 "อนุญาตการควบคุมจำนวนประชากร"
 population_controls_allowed_desc:11 "การแบ่งชนชั้นระยะยาวนั้นสําคัญเกินไป สิ่งสําคัญที่จะทิ้งไว้ด้วยมือของนักแสดงแต่ละคน\n\n§E- สามารถเปิดใช้งานการควบคุมประชากรในการกำหนดสิทธิของเผ่าพันธุ์ได้§!\n§E- สามารถเลือกเผ่าพันธุ์ที่จะ เพิ่ม/ปฏิเสธ ได้§!"

 policy_slavery:0 "ทาส"
 policy_slavery_desc:1 "เราสามารถตัดสินใจได้ว่า การเป็นทาส ควรถูกต้องตามกฎหมายในจักรวรรดิของเราหรือไม่"
 slavery_not_allowed:0 "ไม่อนุญาต"
 slavery_not_allowed_name:0 "ห้ามการเป็นทาส"
 slavery_not_allowed_desc:0 "การตกเป็นทาสของสิ่งมีชีวิตในจินตนาการเป็นสิ่งที่น่ารังเกียจและจะ ไม่ต้องทนทุกข์ทรมานภายในของเราจักรวรรดิ.\n\n§Eไม่สามารถทำให้ประชากรเป็นทาสได้§!"
 slavery_allowed_xenos_only:0 "ต่างดาวเท่านั้น"
 slavery_allowed_xenos_only_name:0 "เซโน-สลาเวอรี่เท่านั้น"
 slavery_allowed_xenos_only_desc:1 "ยอม ให้ เป็น ทาสเผ่าพันธุ์นอกจากตัวเราเองจักรวรรดิ.\n\n§Eสามารถทำให้ประชากรเผ่าพันธุ์อื่นเป็นทาสได้§!"
 slavery_allowed_regulated:1 "มีการควบคุม"
 slavery_allowed_regulated_name:1 "มีการควบคุมทาส"
 slavery_allowed_regulated_desc:2 "ยอม ให้ การ เป็น ทาส โดย ไม่ เลือก หน้าประชากรจากทุกวิถีของชีวิต และมั่นใจได้ถึงสภาพการทํางานที่เท่าเทียมและยุติธรรม\n\n§Eสามารถทําให้ป๊อปใด ๆ ที่ลดประสิทธิภาพ§!"
 slavery_allowed_regulated_xenos_only:1 "มีการควบคุมทาสต่างดาว"
 slavery_allowed_regulated_xenos_only_name:1 "ตั้งค่าเซโน- สลาฟใหม่"
 slavery_allowed_regulated_xenos_only_desc:2 "ยอม ให้ เป็น ทาสเผ่าพันธุ์นอกจากตัวเราเองจักรวรรดิภายใต้เงื่อนไขการทํางานที่ค่อนข้างยุติธรรม\n\n§Eสามารถทำให้ประชากรเผ่าพันธุ์อื่นเป็นทาสได้ โดยที่มีประสิทธิภาพลดลง§!"
 slavery_allowed:0 "อนุญาต"
 slavery_allowed_name:0 "อนุญาตให้มีทาส"
 slavery_allowed_desc:0 "ยอม ให้ เป็น ทาสประชากรภายในจักรวรรดิ.\n\n§Eสามารถทำให้ประชากรเป็นทาสได้§!"

 policy_slavery_procreation:1 "การให้กำเนิดทาส"
 policy_slavery_procreation_desc:0 "เราสามารถตัดสินใจว่า ทาสควรได้รับอนุญาตให้สร้างหรือไม่"
 slavery_procreation_allowed:0 "อนุญาต"
 slavery_procreation_allowed_name:0 "มี การ อนุญาต ให้ ประกอบ อาหาร ทาส"
 slavery_procreation_allowed_desc:0 "ทาสได้รับอนุญาตให้สร้างประชากรการเติบโตจากทาส โดยอัตโนมัติ"
 slavery_procreation_not_allowed:0 "ไม่อนุญาต"
 slavery_procreation_not_allowed_name:0 "มี การ ห้าม การ แพร่ พันธุ์ ของ ทาส"
 slavery_procreation_not_allowed_desc:0 "ไม่ อนุญาต ให้ ทาส สร้าง"

 policy_purge:0 "การล้างเผ่าพันธุ์"
 policy_purge_desc:0 "ลบแล้วประชากรไม่ สามารถ ทํา งาน ได้ และ ใน ที่ สุด ก็ จะ สูญ สิ้น ไป แต่ กระบวนการ นั้น จะ ทํา ให้ พวก เขา ไม่ เห็น อก เห็น ใจ อีก ต่อ ไปประชากร.\n"
 purge_not_allowed:0 "ไม่อนุญาต"
 purge_not_allowed_name:0 "การ ชําระ ให้ บริสุทธิ์"
 purge_not_allowed_desc:1 "การกวาดล้างเป็นความโหดร้าย และควรได้รับการปฏิบัติเช่นเดียวกัน\n\n§Eไม่สามารถกวาดล้างประชากรได้§!"
 purge_allowed_xenos_only:0 "ต่างดาวเท่านั้น"
 purge_allowed_xenos_only_name:0 "บริการเซโนเท่านั้น"
 purge_allowed_xenos_only_desc:1 "เราต้องให้วิธีการที่มีประสิทธิภาพควบคุม และควบคุมการแพร่กระจายของสิ่งมีชีวิตเล็กน้อยภายในของเราจักรวรรดิ.\n\n§Eสามารถ กําจัดประชากรจากสายพันธุ์อื่น ๆ§!"
 purge_allowed:0 "อนุญาต"
 purge_allowed_name:0 "อนุญาตให้กวาดล้าง/ล้างเผ่าพันธุ์"
 purge_allowed_desc:0 "สิ่งสกปรกและทุจริตภายในเราจักรวรรดิต้องได้รับการชําระ กลัวว่าเน่าของพวกเขาจะ หยั่งรากในเราทั้งหมด\n\n§Eสามารถกวาดล้างและขับไล่ประชากรได้§!"
 purge_displacement_only:0 "ขับไล่เท่านั้น"
 purge_displacement_only_name:0 "$purge_displacement_only$"
 purge_displacement_only_desc:0 "เรา ไม่ มี หน้า ที่ รับ ผิด ชอบ ที่ จะ ดู แล ความ จําเป็น ของ คน เหล่า นั้น ที่ จะ บ่อน ทําลาย รากฐาน ของ สังคม เรา. ปล่อยให้พวกเขาหาบ้านพวกเขา นอกเขตแดนของเรา\n\n§Eสามารถบังคับประชากรให้ออกไปจากที่อยู่เดิมได้§!"

 policy_orbital_bombardment:0 "การทิ้งระเบิดจากวงโคจร"
 policy_orbital_bombardment_desc:2 "การระเบิดออร์บิทัลช่วยให้เราทําลาย กองทัพบนดาวเคราะห์จากอวกาศ การ ระเบิด ของ ออร์บิทัล มาก ขึ้น ยัง สามารถ ทําลาย อาคาร และ ฆ่า ประชากร ได้ ด้วย.\n"
 orbital_bombardment_selective:0 "เลือกเฉพาะที่"
 orbital_bombardment_selective_name:0 "การทิ้งระเบิดจากวงโคจรแบบเลือกเฉพาะที่"
 orbital_bombardment_selective_desc:0 "มี แต่ การ ทิ้ง ระเบิด ของ เป้า หมาย ทาง ทหาร ที่ ระบุ ได้ ขณะ เดียว กัน ก็ ทํา ให้ พลเรือน เสีย ชีวิต น้อย ที่ สุด.\n\n§Eสามารถใช้ได้เฉพาะการทิ้งระเบิดจากวงโคจรแบบ 'เลือกเฉพาะที่' เท่านั้น§!"

 orbital_bombardment_indiscriminate:0 "ไม่เลือกเจาะจง"
 orbital_bombardment_indiscriminate_name:0 "การทิ้งระเบิดจากวงโคจรแบบไม่เลือกเจาะจง"
 orbital_bombardment_indiscriminate_desc:0 "อนุญาตให้ใช้อย่างเต็มรูปแบบของอาวุธในออร์บิทัลทั้งหมด โดยไม่คํานึงถึงสิ่งมีชีวิตบนพื้นผิว\n\n§Eสามารถทิ้งระเบิดในวงโคจรแบบ 'ไม่เลือกเจาะจง' ได้§!"

 orbital_bombardment_armageddon:0 "ทำลายล้างขั้นสูงสุด"
 orbital_bombardment_armageddon_name:0 "การทิ้งระเบิดจากวงโคจรแบบทำลายล้างขั้นสูงสุด"
 orbital_bombardment_armageddon_desc:1 "อนุญาตให้ใช้อย่างเต็มรูปแบบของอาวุธในออร์บิทัลทั้งหมด โดยไม่คํานึงถึงสิ่งมีชีวิตบนโลกตัวเอง การทําลายยูเตอร์คือเป้าหมาย\n\n§Eสามารถทิ้งระเบิดในวงโคจรแบบ 'ไม่เลือกเจาะจง' และแบบ 'ทำลายล้างขั้นสูงสุด' ได้§!"

 orbital_bombardment_abduction:0 "ลักพาตัว"
 orbital_bombardment_abduction_name:0 "การทิ้งระเบิดจากวงโคจรเพื่อลักพาตัว"
 orbital_bombardment_abduction_desc:0 ""
 orbital_bombardment_surrender_allowed_name:0 "อนุญาต" #Not shown anywhere afaik
 orbital_bombardment_surrender_forbidden_name:0 "ห้ามใช้" #Not shown anywhere afaik
 policy_orbital_bombardment_accept_surrender:0 "ยอมรับการยอมจำนนที่วงโคจรดาว"
 policy_orbital_bombardment_accept_surrender_desc:0 "นโยบายนี้ควบคุมว่า เราจะอนุญาตให้ดาวเคราะห์ศัตรูยอมจำนนต่อกองยานของเราในระหว่างการระดมทิ้งระเบิดจากวงโคจรดาวหรือไม่"
 orbital_bombardment_surrender_allowed:0 "อนุญาต"
 orbital_bombardment_surrender_allowed_desc:0 "พลเมืองต่างชาติมีสิทธิ์ที่จะยอมแพ้\n\n§Eหากพวกเขาเลือกที่จะยอมจำนน เราก็จะยึดครองดาวเคราะห์ศัตรูจากการทิ้งระเบิดในวงโคจรของดาวเคราะห์ที่ไม่มีกองทัพป้องกัน§!"
 orbital_bombardment_surrender_forbidden:0 "ไม่อนุญาต"
 orbital_bombardment_surrender_forbidden_desc:0 "จะไม่มีการยอมแพ้ ระบบระเบิดออร์บิทัลจะดําเนินต่อไปอย่างไม่มีที่สิ้นสุด\n\n§Eการยึดดาวเคราะห์ของศัตรู จะต้องบุกยึดดาวด้วยกองกำลังภาคพื้นดินเท่านั้น§!"

 policy_interference:1 "การแทรกแซงอารยธรรมดึกดำบรรพ์"
 policy_interference_desc:1 "เราสามารถตั้งนโยบายควบคุม ปฏิสัมพันธ์ของเรากับจักรวรรดิก่อน FL"
 interference_not_allowed:0 "ไม่แทรกแซง"
 interference_not_allowed_name:0 "$interference_not_allowed$"
 interference_not_allowed_desc:2 "ไม่ ใช่ บทบาท ของ เรา ที่ จะ ส่ง ผล กระทบ ต่อ พัฒนาการ ของ สังคม อื่น. ระวัง อย่าเข้ามาแทรกแซง\n\n§E- สถานีสังเกตการณ์ออกโพสต์ถูกจำกัดไว้ที่$mission_passive_observation$\n- ไม่สามารถกำหนดเป้าหมายการจารกรรมกับอารยธรรมก่อน FL ได้\n- ไม่สามารถเปิดเผยตัวตนของเราต่ออารยธรรมก่อน FL ได้\n- ไม่สามารถรุกรานอารยธรรมก่อน FL ได้§!"
 interference_subtle:0 "แทรกแซงเบาบาง"
 interference_subtle_name:0 "$interference_subtle$"
 interference_subtle_desc:2 "เราสามารถผลักดันการพัฒนาของพวกเขา ในทิศทางที่ถูกต้อง แต่สัมผัสของเราต้องยังคงเป็นที่ละเอียดอ่อน\n\n§E- สถานีสังเกตการณ์ออกโพสต์ถูกจำกัดไว้ที่$mission_passive_observation$\n- สามารถกำหนดเป้าหมายการจารกรรมกับอารยธรรมก่อน FL ได้เป็นบางอย่าง\n- สามารถเปิดเผยตัวตนของเราต่ออารยธรรมก่อน FL ได้(ด้วยความตระหนักขั้นสูงเท่านั้น)\n- ไม่สามารถรุกรานอารยธรรมก่อน FL ได้§!\n\n"
 interference_active:1 "แทรกแซงปกติ"
 interference_active_name:1 "$interference_active$"
 interference_active_desc:4 "เพื่อ จะ ไข ความ ลับ ของ เอกภพ ได้ ต้อง มี เรื่อง ใด ๆ ที่ น่า สนใจ เพื่อ จะ ศึกษา ได้ อย่าง อิสระ.\n\n§E- สถานีสังเกตการณ์ออกโพสต์ถูกจำกัดไว้ที่$mission_passive_observation$ หรือ $mission_specimen_collection$\n- สามารถกำหนดเป้าหมายการจารกรรมกับอารยธรรมก่อน FL ได้ทุกอย่าง\n- สามารถเปิดเผยตัวตนของเราต่ออารยธรรมก่อน FL ได้\n- ไม่สามารถรุกรานอารยธรรมก่อน FL ได้§!\n\n"
 interference_aggressive:0 "แทรกแซงรุกราน"
 interference_aggressive_name:0 "$interference_aggressive$"
 interference_aggressive_desc:2 "ผู้แข็งแกร่งปกครองผู้อ่อนแอ ชะตากรรมของสังคมที่พัฒนาน้อยลง คือคําสั่งของเรา\n\n§E-- สถานีสังเกตการณ์ออกโพสต์ถูกจำกัดไว้ที่$mission_specimen_collection$\n- สามารถกำหนดเป้าหมายการจารกรรมกับอารยธรรมก่อน FL ได้เป็นบางอย่าง\n- สามารถเปิดเผยตัวตนของเราต่ออารยธรรมก่อน FL ได้\n- สามารถรุกรานอารยธรรมก่อน FL ได้§!\n\n"
 policy_interference_unchanged: "ข้อกําหนดบน§Y$policy_interference$§!ไม่มีการเปลี่ยนแปลง"

 policy_enlightenment:1 "การให้ความรู้อารยธรรมดึกดำบรรพ์"
 policy_enlightenment_desc:1 "ความก้าวหน้าทางเทคโนโลยีของเรา มีศักยภาพที่จะแบ่งปัน กับสังคมพรี- FTL ได้มากขึ้น เปิดแนวความคิดใหม่ให้พวกเขาสํารวจ\n"
 enlightenment_not_allowed:0 "ไม่อนุญาต"
 enlightenment_not_allowed_name:1 "ห้ามการให้ความรู้อารยธรรมดึกดำบรรพ์"
 enlightenment_not_allowed_desc:1 "สังคมนี้ยังไม่พร้อม ที่จะรับรู้ถึงสิ่งมหัศจรรย์ที่เราค้นพบ การ เปิดโปง ความ จริง อย่าง รวด เร็ว เกิน ไป อาจ ทํา ให้ ทุก คน ที่ เกี่ยว ข้อง ต้อง เสี่ยง อันตราย อย่าง ใหญ่ หลวง.\n\n§Eไม่อาจให้ความกระจ่างแก่อารยธรรมก่อน FL ได้§!\n\n"
 enlightenment_covert_only:0 "ซ่อนเร้น/แอบแฝงเท่านั้น"
 enlightenment_covert_only_name:0 "แอบให้ความรู้อารยธรรมดึกดำบรรพ์"
 enlightenment_covert_only_desc:0 "การเปิดเผยการดํารงอยู่ของเรา กับอารยธรรมก่อนเวลากําหนด จะเปลี่ยนแปลงธรรมชาติของการพัฒนา เราควรช่วยพวกเขา แต่ไม่เปิดเผยตัวตนของเรา\n\n§Eอาจให้ความกระจ่างแก่อารยธรรมก่อน FL ผ่านการจารกรรมเพียงเท่านั้น§!\n\n"
 enlightenment_allowed:0 "อนุญาต"
 enlightenment_allowed_name:1 "สามารถให้ความรู้อารยธรรมดึกดำบรรพ์ได้"
 enlightenment_allowed_desc:1 "โดยการแบ่งปันความรู้ของเรา เราสามารถส่งเสริมให้สังคมที่ก้าวหน้าน้อยลง ให้เข้ามามีบทบาทที่ถูกต้องในชุมชนกาแล็กซี่\n\n§Eอาจให้ความกระจ่างแก่อารยธรรมก่อน FL ผ่านการจารกรรมและการทูต§!\n\n"
 enlightenment_policy_unchanged: "ข้อกําหนดบน§Y$policy_enlightenment$§!ไม่มีการเปลี่ยนแปลง"

 policy_migration:0 "การอพยพ"
 policy_migration_desc:0 "บ้างก็อยู่ภายในจักรวรรดิมองไปที่ดาวและสงสัยว่าชนิดของชีวิต ที่พวกเขาสามารถสร้าง สําหรับตัวเองในโลกใหม่\n"
 migration_not_allowed:0 "ห้าม"
 migration_not_allowed_name:0 "ห้ามอพยพ"
 migration_not_allowed_desc:0 "เดอะจักรวรรดิจะตัดสินว่าประชาชนอยู่ที่ไหนมากที่สุด\n\n§Eไม่ประชากรสามารถย้ายได้อย่างอิสระ§!"
 migration_allowed_primary_only:0 "เผ่าพันธุ์แรกเริ่มดั้งเดิมเท่านั้น"
 migration_allowed_primary_only_name:0 "การย้ายถิ่นของเผ่าพันธุ์แรกเริ่มดั้งเดิม"
 migration_allowed_primary_only_desc:0 "การเคลื่อนไหวที่ไม่จํากัด ถือเป็นสิทธิพิเศษ ที่จ่ายเฉพาะสายพันธุ์หลักเท่านั้น\n\n§Eเท่านั้นประชากรของพวกเราเองเผ่าพันธุ์สามารถย้ายได้อย่างอิสระ§!"
 migration_allowed_all:0 "อพยพย้ายถิ่นได้อย่างอิสระ"
 migration_allowed_all_name:0 "ย้ายถิ่นฐานแบบไม่จำกัด"
