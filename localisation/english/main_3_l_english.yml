 policy_research_policy:0 "การวิจัยสมาธิ"
 policy_research_policy_desc:0 "การวิจัยเป็นหนทางสู่จักรวรรดิของเรา ก้าวหน้าของความรู้ และนําความเป็นไปได้ใหม่ๆมา เราต้องตัดสินใจว่าอะไรเป็นจุดสนใจที่ดีที่สุดสําหรับนักวิจัยของเรา และที่ไหนที่เราจะไปพูลที่สว่างที่สุดของเรา"

