 PERDITION_BEAM_FLEET_EFFECT: "§Yความ เสีย หาย ต่อ เนื่อง:§!ข้อตกลง§G$@perdition_beam_fleet_damage|0G$§!ความเสียหายที่เรือทุกลําภายใน§G$@perdition_beam_collateral_range|0Y$§!ของเป้าหมาย"
