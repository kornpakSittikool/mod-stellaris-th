 feature_bliss_standard_desc:0 "สามารถกำหนดมาตรฐานความเป็นอยู่แบบ §Yสารเคมีแห่งความสุข§! ได้"

 feature_robots:0 "แรงงานหุ่นยนต์"
 feature_robots_desc:1 "หุ่นยนต์เป็นเครื่องจักรที่ค่อนข้างเรียบง่าย สามารถรับคำสั่งทางวาจาได้ แต่ไม่มีสติปัญญาที่แท้จริงในตัวเอง\n\n§Eด้วยเทคโนโลยี §Y$tech_robotic_workers$§! จะทำให้ ประชากรจักรกล สามารถทำงานได้เฉพาะ £pop_cat_worker£ §Yงาน $pop_cat_worker$§!§!"
 feature_droids:0 "แรงงานดรอยด์"
 feature_droids_desc:1 "ดรอยด์มีความซับซ้อนมากขึ้นของหุ่นยนต์ บ่อยครั้งที่มาพร้อมกับความตระหนักในตัวเอง จํากัด และบุคลิกที่มีโปรแกรมไว้ล่วงหน้า\n\n§Eกับ§Y$tech_droid_workers$§!เทคโนโลยี วิศวกรรมประชากรตอนนี้ยังมีความสามารถ£pop_cat_specialist£ §Y$pop_cat_specialist$งาน§!.\n\nความซับซ้อนบางอย่าง£pop_cat_specialist£ §Y$pop_cat_specialist$งาน§!เช่น£job_researcher£ §Yวิจัย§!สามารถดําเนินการได้ก็ต่อเมื่อ AI ไม่ได้ผิดกฎหมาย§!"
 feature_synths:0 "แรงงานจักรกลสังเคราะห์"
 feature_synths_desc:1 "สารสังเคราะห์เป็นเครื่องจักรที่ซับซ้อนมาก สมองกลของพวกเขา สามารถรองรับปัญญาประดิษฐ์ระดับ 7 ได้ ทําให้พวกมันรู้ตัวเองเป็นอย่างดี\n\n§Eกับ§Y$tech_synthetic_workers$§!เทคโนโลยี วิศวกรรมประชากรได้รับผลกระทบจาก£happiness£ §Yความสุข§!และสามารถดําเนินการได้ทุกประเภท£job£ §Yงานป๊อป§!.\n\n£pop_cat_ruler£ §Y$pop_cat_ruler$งาน§!สามารถทําได้ก็ต่อเมื่อ§Yลิขสิทธิ์ AI เต็ม§!นโยบายเปิดใช้งาน§!"
 feature_robot_leaders:0 "ผู้นำจักรกลสังเคราะห์"
 feature_robot_leaders_desc:0 "อนุญาตให้สังเคราะห์ประชากรที่จะเป็นผู้นํา"
 feature_modify_robots:0 "การดัดแปลงหุ่นยนต์"
 feature_modify_robots_desc:0 "ช่วยให้เราออกแบบและสร้างพิเศษ$trait_mechanical$ ประชากร."
 feature_modify_robots_desc_machine_intelligence:0 "ช่วยให้เราออกแบบและสร้างพิเศษ$trait_machine_unit$ถึง$trait_mechanical$ ประชากร."
 feature_wormhole_stabilization:0 "การเดินทางโดยใช้รูหนอน"
 feature_wormhole_stabilization_desc:0 "ช่วยให้ยานของเราเดินทางผ่านรูหนอนได้"
 feature_gateway_activation:0 "การเดินทางโดยใช้เกตเวย์"
 feature_gateway_activation_desc:0 "ช่วยให้เราเปิดใช้งานเกตเวย์ และอนุญาตให้เรือของเราเดินทางผ่านมัน"
 feature_gateway_construction:0 "การก่อสร้างเกตเวย์"
 feature_gateway_construction_desc:0 "ช่วยให้เราสร้างประตูใหม่"
 feature_unity_ambitions:0 "ความปรารถนาอันแรงกล้า"
 feature_unity_ambitions_desc:0 "ปลดล็อกเซ็ต(ชุด) §Yประกาศคำสั่ง§! ที่เรียกว่า 'ความปรารถนาอันแรงกล้า'"
 feature_campaign_edicts:0 "เพิ่มประกาศคำสั่ง (การรณรงค์)"
 feature_campaign_edicts_desc:2 "คําสั่งเพิ่มเติมสําหรับปลดล็อค§Yการ รณรงค์§!ที่เสียพลังงานแทนเอกภาพ."
 feature_jump_method:0 "การเดินทางแบบกระโดดข้าม (จั้มไดร์ฟ)"
 feature_jump_method_desc:0 "ปลดล็อค§Hกระโดดเริ่มต้น§!ปฏิบัติการณ์ของกองทัพเรือ ซึ่งช่วยให้กองเรือที่วิ่งด้วยเครื่องบิน เข้าสู่ระยะที่เกือบเข้าสู่ระยะต่างๆ โดยเพิกเฉยต่อระบบ"

 ####################################
 # Mission
 ####################################
 MISSION_CIV_NAME:0 "$CIVILIZATION$ (§Y$AGE$§!)"
 mission_no_observation:1 "สถานทูตทางแยก"
 mission_no_observation_desc:1 "สถานีนี้ถูกใช้เป็นสถานทูต เพื่อประสานงานการทูตของเรา และปกปิดการปฏิสัมพันธ์กับอารยธรรมด้านล่างนี้"
 mission_passive_observation:0 "สังเกตการณ์แบบไม่รบกวน"
 mission_passive_observation_desc:2 "ชาว พื้น เมือง ได้ รับ การ ศึกษา โดย ไม่ รู้ ตัว จาก ระยะ ที่ ปลอด ภัย และ มี การ พยายาม ทุก วิถี ทาง เพื่อ หลีก เลี่ยง การ ปน เปื้อน ทาง วัฒนธรรม.\n\n$observation_infiltration_effects$[GetPassiveObservationInsights]\n\n"
 mission_specimen_collection:0 "สังเกตการณ์เชิงรุก"
 mission_specimen_collection_desc:2 "ชาว พื้น เมือง ได้ รับ การ ศึกษา อย่าง ก้าวร้าว และ มี การ รวบ รวม ตัว อย่าง ที่ มี ชีวิต อยู่ บ่อย ๆ เพื่อ เรียน รู้ ให้ มาก ที่ สุด เท่า ที่ เป็น ไป ได้ เกี่ยว กับ ชีววิทยา และ วัฒนธรรม ของ พวก เขา.\n\n$observation_infiltration_effects$[GetAggressiveObservationInsights]\n§Eภารกิจนี้สามารถมีผลตามมาโดยไม่ได้ตั้งใจ§!\n\n"
 observation_infiltration_effects:0 "ทรัพยากรที่ผลิตโดยภารกิจการสังเกตการณ์ขึ้นอยู่กับ §Yเลเวลการแทรกซึม§! ของ §Yเครือข่ายสอดแนม§! ของเราในอารยธรรมก่อนหน้า FTL ที่กำลังถูกสังเกต"
 native_indoctrination:0 "ภารกิจ$mission_native_indoctrination$"
 mission_native_indoctrination:0 "การสั่งสอน"
 mission_native_indoctrination_desc:0 "ด้วยอิทธิพลที่ละเอียดอ่อนของสังคมและวัฒนธรรมของพวกเขา คนพื้นเมืองสามารถถูกนํามารอบ ๆ\n\n§Eภารกิจ นี้ จะ ทํา ให้ ชน พื้น เมือง รับ เอา รัฐธรรมนูญ แห่ง การ ปกครอง ของ เรา เป็น เวลา นาน.§!\n\n"
 mission_technological_enlightenment_0:1 "การพัฒนาเทคโนโลยี"
 mission_technological_enlightenment_0_desc:3 "ความ พยายาม ที่ จะ ยก อารยธรรม พื้น เมือง ขึ้น สู่ ยุค อวกาศ อย่าง รวด เร็ว. ระยะเวลานี้ขึ้นอยู่กับ เทคโนโลยีระดับปัจจุบันของพวกเขา\n\n§Eเมื่อเสร็จสิ้น ภารกิจนี้จะมอบให้พวกเขา§Rการ เป็น เจ้าของ ระบบ บ้าน อย่าง เต็ม ที่§!และเปลี่ยนพวกเขาให้เป็น อารยธรรมที่ท่องอวกาศ ซึ่งเป็นผู้ปกป้องของเรา§!\n\n"
