 appropriation_allowed_desc:1 "ดิน แดน ที่ ไม่ ได้ ใช้ ประโยชน์ จาก สิ่ง มี ชีวิต ชนิด เล็ก ๆ อย่าง เหมาะ สม อาจ นํา มา ใช้ ประโยชน์ ได้ มาก ขึ้น จาก สิ่ง ที่ ดี กว่า.\n\n§Eดาวเคราะห์ที่พ่ายแพ้จากสายพันธุ์ที่ไม่ใช่ไซเซน จะมีขึ้น§Y500§!£pop£ ประชากรหลบหนีและแทนที่ด้วยประชาชน จากดาวเคราะห์ดวงอื่น ๆ ของเรา§!"

