 BLUE_CRYSTAL_WEAPON_1:0 "ชิ้นส่วนยิงเศษผลึกฟ้า"
 BLUE_CRYSTAL_WEAPON_1_DESC:1 "เครื่อง ดักแด้ สี น้ําเงินจําลองการปล่อยอาวุธของแซฟไฟร์คลาสคริสตัลไลน์ เพื่อสร้างความเสียหาย"
 GREEN_CRYSTAL_WEAPON_1:0 "ชิ้นส่วนยิงเศษผลึกเขียว"
 GREEN_CRYSTAL_WEAPON_1_DESC:1 "เครื่อง ปั้น ดิน เผา สี เขียวเลียนแบบการปล่อยอาวุธของ คริสตัลไลน์ชั้น ม.มรกต เพื่อสร้างความเสียหายให้มิดเดิลเดิล"
