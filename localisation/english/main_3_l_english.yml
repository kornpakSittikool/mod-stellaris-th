 zone_resort: "รีสอร์ทคอมเพล็กซ์"
 zone_resort_desc: "ถูกฝึกมาเพื่อความสบาย สมบูรณ์แบบเพื่อสันติสุข ขณะ ที่ บน พื้น ผิว ดาว เคราะห์ ดวง นี้ กรีฑา ไม่ ใช่ สิ่ง ฟุ่มเฟือย แต่ เป็น สิ่ง คงทน."
 zone_resort_entertainment: "เอนเตอร์เทนเมนต์เมกะเพล็กซ์"
 zone_resort_entertainment_desc: "ภาย ใต้ การ ปก ป้อง ของ โดม ที่ สูง ตระหง่าน และ แสง สว่าง ไม่ รู้ สิ้น สุด ความ ปรารถนา ทุก อย่าง ก็ อยู่ ใน ขั้น ตอน ของ มัน. ที่ นี่ การ พัก ผ่อน ไม่ มี ขีด จํากัด และ ภาพ ที่ น่า ตื่น ตา ก็ ไม่ เคย หลับ."
 zone_resort_zoo:1 "สวนสัตว์ต่างดาว"
 zone_resort_zoo_desc: "การทําไบโอเมี่ยมและการรักษาอย่างรอบคอบ ชีวิตจากโลกที่ไกลโพ้น เฟื่องฟูเพื่อความบันเทิงของประชาชน"
 zone_resort_hunting_ground: "เขตล่าสัตว์ขนาดใหญ่"
 zone_resort_hunting_ground_desc: "เมื่อ ครอบ คลุม พื้น ที่ ส่วน ใหญ่ ของ โลก เขต อนุรักษ์ อัน กว้าง ใหญ่ นี้ ให้ การ เผชิญ หน้า ที่ น่า ทึ่ง และ อันตราย ที่ สุด ใน กาแล็กซี บาง แห่ง."
 zone_resort_spiritual_retreat: "สถานที่พักผ่อนอันศักดิ์สิทธิ์"
 zone_resort_spiritual_retreat_desc: "สถาน ศักดิ์สิทธิ์ ที่ อยู่ ห่าง ไกล แห่ง นี้ ไม่ ได้ เป็น ศูนย์กลาง ของ เมือง ที่ มี นก กา อีก ต่อ ไป ทํา ให้ เกิด ความ เงียบ, ใคร่ครวญ, และ ความ เกี่ยว พัน กับ นิรันดร กาล."
 zone_resort_grand_museum: "หอแห่งความทรงจำ"
 zone_resort_grand_museum_desc: "พื้นที่ที่อุทิศให้กับการอนุรักษ์และนิทรรศการวัฒนธรรม ประวัติศาสตร์ และความคิด ที่ นี่ มี การ จด จํา อดีต ไว้ เพื่อ ใช้ ใน อนาคต."
 zone_resort_restoration_enclave: "การฟื้นฟูซ่อมแซมเพิ่มระยะเวลา..."
 zone_resort_restoration_enclave_desc: "ห้อง ที่ เงียบ สงบ สําหรับ การ รักษา โรค ซึ่ง เป็น ที่ ทํา งาน ด้าน การ แพทย์ และ การ ออก แบบ แบบ แบบ สันติ."
 zone_resort_proving_grounds: "สนามรบทดสอบ"
 zone_resort_proving_grounds_desc: "โดดเด่นและทักษะที่ยิ่งใหญ่ ที่นี่ผู้มาเยือนมาทดสอบตัวเอง หรือดูคนอื่นเลือดออก"

