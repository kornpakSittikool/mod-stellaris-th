 versatile_we_desc:1 "ระบบเศรษฐกิจสงครามที่ยั่งยืน ให้โบนัสมากมายแก่เรา ในขณะที่เรากําลังสูญเสียสงครามป้องกัน\n\n§Hสงคราม ป้องกัน:§!\nมิล พร็อด เอฟ:§G+60%§!ที่§R-100§!วอร์คอร์\n\n§Hสงคราม กลาง เมือง:§!\nมิล พร็อด เอฟ:§R-60%§!ที่§G100§!วอร์คอร์"
 dynamic_we:0 "หมุน & 90"
 dynamic_we_name:0 "ระบบย่อยของสงครามแบบไม่ตายตัว"
 dynamic_we_desc:1 "สภาวะเศรษฐกิจที่ผันผวนของสงคราม ให้โบนัสที่สําคัญกับเรา ในขณะที่เรากําลังสูญเสียสงครามป้องกัน\n\n§Hสงคราม ป้องกัน:§!\nมิล พร็อด เอฟ:§G+45%§!ที่§R-100§!วอร์คอร์\n\n§Hสงคราม กลาง เมือง:§!\nมิล พร็อด เอฟ:§R-45%§!ที่§G100§!วอร์คอร์"

