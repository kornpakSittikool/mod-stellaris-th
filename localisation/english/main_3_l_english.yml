 PLANET_KILLER_CRACKER_DESC:0 "กํากับการรับพลังงานทางทฤษฎี ส่งความร้อนเหนือบรรยากาศ และกระตุ้นแกนหลักของดาวเคราะห์ จาก นั้น ก็ มี การ ระเบิด ช่วง สุด ท้าย และ ช่วง เวลา ค่อน ข้าง สั้น ซึ่ง ทํา ให้ โลก เปิด ออก."
