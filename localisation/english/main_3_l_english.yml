 district_arcology_mixed_industry: "อาร์กติก วิทยา อุตสาหกรรม"
 district_arcology_mixed_industry_plural: "อุตสาหกรรม"
 district_arcology_mixed_industry_desc: "ด้วย เครื่อง ปั้น ดิน เผา, โรง งาน ต่าง ๆ, อาคาร ที่ แต่ง ขึ้น ใหม่, และ ช่าง ฝีมือ ทํา งาน อย่าง กว้าง ขวาง ใน เมือง ต่าง ๆ อาร์กติก นี้ สามารถ ผลิต สิ่ง ใด ๆ และ ทุก สิ่ง ได้."
 district_arcology_research: "การวิจัยอาร์กติก วิทยา"
 district_arcology_research_plural: "การวิจัยสี่เหลี่ยม"
 district_arcology_research_desc: "การ ค้น พบ ทาง วิทยาศาสตร์ เป็น เรื่อง สําคัญ มาก."
 district_arcology_research_physics: "ฟิสิกส์"
 district_arcology_research_physics_plural: "หลัก ฟิสิกส์"
 district_arcology_research_physics_desc: "ด้วยเครื่องเร่งอนุภาคภายใต้ท้องถนนเช่น เครือข่ายท่อน้ําเสียโบราณ คอมพิวเตอร์ควอนตัม และตัวขับเคลื่อนสนามสูงเท่ากับตึกระฟ้า แต่นั่นเพราะพวกเดนซิเดนซ์ไม่เข้าใจ ยัง"
 district_arcology_research_society: "ชีวประวัติ"
 district_arcology_research_society_plural: "ชีวประวัติ"
 district_arcology_research_society_desc: "การ ผ่าน สวน สาธารณะ ที่ กว้าง ใหญ่ ของ อาร์กติก วิทยา นี้ อาจ ดู เหมือน เป็น การ ไป เยือน สวน สัตว์ แต่ ตาม จริง แล้ว ผู้ มา เยือน ก็ เป็น เรื่อง ที่ น่า สนใจ ด้วย."
 district_arcology_research_engineering: "วิศวกรรม"
 district_arcology_research_engineering_plural: "วิศวกรรม"
 district_arcology_research_engineering_desc: "การ เคลื่อน ไหว แบบ อาร์กติก มี การ เคลื่อน ย้าย อาคาร และ ท้องฟ้า ที่ เต็ม ไป ด้วย เครื่อง มือ ทดลอง. บ้านของการทดสอบวัสดุยาอีสังเคราะห์เคมีควอนตัมและ นาโนสเกลประดิษฐ์ มันครั้งหนึ่งเคยเป็นทฤษฎี ตอนนี้ได้พิสูจน์แล้ว"
 district_arcology_fortress: "อาร์กติก วิทยา ป้อม ปราการ"
 district_arcology_fortress_plural: "ป้อม ปราการ"
 district_arcology_fortress_desc: "โครงสร้างการบัญชาการ การบังเกอร์ดาวเคราะห์ สถานฝึกหัด และที่อยู่อาศัยเจ้าหน้าที่ ป้อมปราการขนาดภูเขาเหล่านี้"
 district_arcology_trade: "อาร์กติก ทาง การ ค้า"
 district_arcology_trade_plural: "การ ค้า"
 district_arcology_trade_desc: "การ ขยาย ตัว ของ โกดัง เก็บ สินค้า และ ห้อง บันทึก เสียง ซึ่ง มี การ ทํา ธุรกิจ, การ ขาย ขาย, และ ระดับ การ ค้า ก็ สูง กว่า ขอบ ฟ้า. ถ้าคุณหาไม่เจอ ก็ซื้อไม่ได้"

 district_ring_world_industrial: "ตัวแยกอุตสาหกรรม"
 district_ring_world_industrial_plural: "ผลรวมอุตสาหกรรม"
 district_ring_world_industrial_desc: "ด้วย เครื่อง ปั้น ดิน เผา, โรง งาน ต่าง ๆ, โรง งาน ประดิษฐ์, และ ช่าง ฝีมือ ซึ่ง มอง เห็น ได้ บน วงแหวน มัน สามารถ ผลิต สิ่ง ใด ๆ และ ทุก สิ่ง ได้."
 district_ring_world_foundry: "ผู้ก่อตั้งเซกเมนต์"
 district_ring_world_foundry_plural: "ซีเมนต์ผู้ก่อตั้ง"
 district_ring_world_foundry_desc: "การ เต้น ของ โครงการ อุตสาหกรรม ซีก วง แหวน นี้ เต็ม ไป ด้วย เสียง คําราม ของ เครื่อง ปั้น ดิน เผา และ เสียง กังวาน ของ โลหะ."
 district_ring_world_factory: "ตัวแยกองค์ประกอบ"
 district_ring_world_factory_plural: "ตัวแยกองค์ประกอบ"
 district_ring_world_factory_desc: "ทาง หลวง ของ โรง งาน ที่ เต็ม ไป ด้วย ช่าง ฝีมือ และ อุตสาหกรรม ที่ เป็น พลเรือน กําลัง กลิ้ง ฟ้า และ หาย ไป รอบ ๆ เส้น โค้ง ของ วง แหวน."
 district_ring_world_research: "การวิจัยเลเยอร์ถัดไป"
 district_ring_world_research_plural: "การวิจัยตัวเลข"
 district_ring_world_research_desc: "ศูนย์การค้นพบทางวิทยาศาสตร์ ร่วมกับห้องปฏิบัติการที่แตกต่างกันทั่วเดอะริง ทําให้นักวิจัยจากสาขาการศึกษามากมายมหาศาล"
 district_ring_world_research_physics: "ฟิสิกส์"
 district_ring_world_research_physics_plural: "เลขฐานสิบหก"
