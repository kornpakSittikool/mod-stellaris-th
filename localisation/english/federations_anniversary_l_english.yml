 27_HOSTILE_GREETING:0 "การโจมตีอย่างโหดร้ายของเจ้ากับทิยันกี เป็นอาชญากรรมที่ให้อภัยไม่ได้ วันหนึ่งจะมีการคิดบัญชี"
