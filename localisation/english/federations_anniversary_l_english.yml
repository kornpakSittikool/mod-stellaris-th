 federations2.62.desc.partial_failure:0 "พันธมิตรของเราได้เสร็จสิ้นการทํางานของพวกเขาบนอนุสาวรีย์มากกว่า[FromFrom.GetName]เพื่อฉลอง\"อนิจจัง\" ของ[Root.Federation.GetName]และผู้นําของเรา ดู เหมือน ว่า ความ ผูก พัน กับ ความ ริเริ่ม นั้น ไม่ เข้ม แข็ง เท่า ที่ เรา เคย หวัง ไว้ และ สมาชิก ที่ ได้ รับ การ บํารุง เลี้ยง ส่วน ใหญ่ ก็ ไม่ ได้ มี ส่วน มาก เกิน กว่า คํา พูด ไร้ สาระ. อนุสาวรีย์ผลที่ออกมาจึงค่อนข้างขาดความเคารพ - ความอับอายมากกว่าสัญลักษณ์ของกลุ่มพันธมิตรของเรา"
 federations2.62.desc.complete_failure:0 "ผังสําหรับอนุสาวรีย์มากกว่า[FromFrom.GetName]เพื่อฉลอง\"อนิจจัง\" ของ[Root.Federation.GetName]และ \"ความเป็นผู้นําที่สดใส\" ของเรา ได้ถูกยกเลิกอย่างเป็นทางการในวันนี้$hegemony_federation_monument_complete_failure$"
 federations2.62.A.good:0 "ภายใต้ความเป็นผู้นําของเรา ทั้งหมดแข็งแกร่งขึ้น"
