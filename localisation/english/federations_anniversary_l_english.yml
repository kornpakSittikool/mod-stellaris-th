 federations2.108.A:0 "พระเจ้าเร็ว!"
 federations2.109.name:0 "เริ่ม ออก กําลัง ทหาร"
 federations2.109.desc:0 "ยานลาดตระเวนทุกลําเข้าประจําที่แล้ว ดังนั้นการฝึกจะเริ่มได้! ชุดของอาวุธเล็กน้อย แต่เคลื่อนที่สูง ได้เกิดขึ้นจากสถานที่ก่อนหน้านี้ และกําลังมองหาที่จะหลีกเลี่ยงการ ทําลายโดยเรือของเราก่อนที่ จํากัดเวลา 30 วัน หมดอายุ"
 federations2.109.A:0 "อาวุธล็อคและโหลด!"
 federations2.112.name:0 "เป้าหมายถูกถอดแล้ว"
 federations2.112.desc:0 "เรากําจัดเป้าหมายได้สําเร็จ ในการฝึกทางทหารร่วมกัน เรา หวัง ได้ ว่า พันธมิตร ของ เรา จะ ขยัน ขัน แข็ง พอ ๆ กัน!"
 federations2.113.name:0 "เป้าหมายฝึกพลาด"
 federations2.113.desc:0 "เพื่อความละอายใจอันล้นหลามของนายทหารทหารเรือของเรา เราล้มเหลวในการกําจัดเป้าหมายของเราในการฝึกทางทหารร่วมกัน เราได้แต่หวังว่าพันธมิตรของเรา จะประสบความสําเร็จมากกว่า"
 federations2.115.name:0 "การ ฝึก อบรม ทาง ทหาร อย่าง ครบ ถ้วน"
 federations2.115.desc.complete_success:0 "เดอะ[Root.Federation.GetName]การฝึกทหารร่วมกันได้ข้อสรุปแล้ว พวก เขา ได้ รับ การ ประกาศ ว่า ประสบ ความ สําเร็จ อย่าง น่า ตื่น เต้น ทันที แต่ ละ กอง เรือ ที่ ร่วม มือ กัน ได้ โจมตี เป้า หมาย ของ ตน โดย ไม่ ประสบ ความ ยุ่ง ยาก โดย พิสูจน์ ให้ เห็น ครั้ง เดียว และ สําหรับ ความ ชํานาญ ที่ ดี เยี่ยม และ การ ประสาน งาน กัน ของ กอง เรือ รบ ของ เรา! ศัตรูของเราคงจะคิดซ้ํากันแน่ๆ ก่อนที่พวกเขาจะสู้กับเราตอนนี้"
 federations2.115.desc.partial_success:0 "เดอะ[Root.Federation.GetName]การฝึกทหารร่วมกันได้ข้อสรุปแล้ว พวกเขาได้รับการประกาศว่าประสบความสําเร็จบางส่วน ถึงแม้ว่าไม่ทุกพรรคสามารถกําจัดเป้าหมายได้ แต่กองทัพเรือส่วนใหญ่สามารถเข้าร่วมได้ นอก จาก นั้น ลูก เรือ ของ เรา ได้ รับ ประโยชน์ อย่าง มาก จาก ประสบการณ์ นี้ และ บัด นี้ พร้อม จะ ลง มือ ปฏิบัติ เช่น เคย. ศัตรูของเราคงจะคิดซ้ํากันแน่ๆ ก่อนที่พวกเขาจะสู้กับเราตอนนี้"
 federations2.115.desc.partial_failure:0 "เดอะ[Root.Federation.GetName]การร่วมกันของทหารได้สิ้นสุดลงในลักษณะที่กว้างเล็กน้อย : แม้ว่าบางคนสามารถโจมตีเป้าหมายของพวกเขา ส่วนใหญ่ล้มเหลวในการทําเช่นนั้นโยนสงสัยบน[Root.Federation.GetName]ความสามารถในการทํางานเป็นกองกําลังรวมกัน ในเรื่องทางทหาร เราได้แต่หวังว่าศัตรูของเรา จะไม่เฝ้าดูอย่างใกล้ชิด"
 federations2.115.desc.complete_failure:0 "กับความล้มเหลวของสมาชิกที่เข้าร่วมอย่างใดอย่างหนึ่งเพื่อกําจัดเป้าหมายของพวกเขาก่อนที่จะหมดเวลา,[Root.Federation.GetName]การฝึกทหารร่วมกันจบลงที่ฟาซ เราได้แต่หวังว่าศัตรูของเรา จะไม่เฝ้าดูการดําเนินงานอย่างใกล้ชิดเกินไป ในขณะที่เราพยายามคว้าเอาส่วนของความภาคภูมิใจที่สูญหายของเรา"
 federations2.115.A:0 "กองเรือของเราจะครองอํานาจสูงสุด!"
 federations2.115.A.haha:0 "เรามีพันธมิตรที่ดีที่สุด!"
 federations2.115.B.oh_well:0 "อย่างน้อยเราก็มีส่วนของเรา"
 federations2.115.B.oh_dear:0 "เราแขวนหัวของเราในความอัปยศ"
 military_federation_success_modifier:0 "เป็นทหารที่ถูกฝึกมาอย่างดี"
 military_federation_success_modifier_desc:0 "การ ฝึก อบรม เมื่อ ไม่ นาน มา นี้ ซึ่ง จัด ระเบียบ โดย คณะ ผู้ ฝึก อบรม ได้ แสดง ถึง ความ ชํานาญ สูง และ การ ประสาน งาน ของ กอง เรือ ของ เรา อย่าง ดี เยี่ยม."
 military_federation_failure_modifier:0 "การ ทหาร ไร้ ความ รู้สึก"
 military_federation_failure_modifier_desc:0 "ทหารของเราละอายใจกับการทํางานที่ไม่ดี ของกองทัพเรือของการฝึกอบรมในช่วงที่ผ่านมา"
 federations2.120.name:0 "การ เข้า ร่วม ใน การ ฝึก อบรม ทาง ทหาร ด้วย กัน"
 federations2.120.desc:0 "ขณะ ที่ เรา ได้ ละ การ บํารุง เลี้ยง แบบ เก่า การ มี ส่วน ร่วม ใน การ ฝึก อบรม ทาง ทหาร ร่วม กัน ก็ ลด ลง."
