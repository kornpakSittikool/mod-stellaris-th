 ### THE DISMEMBERED CLOUD (Joint Operation - Research Co-operative) by Gemma Thomson ###

 federations3.2001.name:0 "ชิ้น ส่วน ของ สิ่ง มี ชีวิต"
 federations3.2001.desc:0 "สถานีวิจัยหลายแห่งทั่วจักรวรรดิของเรา ได้ตรวจพบความบิดเบือนที่ละเอียดอ่อนในไฮเปอร์สเปซ[root.Capital.GetName]ผลกระทบที่นําเสนอใน 'อวกาศ' เป็นออโรราท้องถิ่น ซึ่งผู้อยู่อาศัยระดับดาวกล่าวว่า\n\nนอกจากนี้ พันธมิตรของเราใน[root.GetAllianceName]รายงาน ปรากฏการณ์ คล้าย ๆ กัน นี้ ใน ระบบ ทุน ของ พวก เขา. ท่านประธาน[discloud_coordinator.ruler.GetRegnalName]ได้เรียกร้องให้มีการสืบสวนทันที และประสานงานในเรื่องนี้"

 dismembered_cloud_chain_title:0 "ฝูง เมฆ"
 dismembered_cloud_chain_desc:0 "มีเมฆปกคลุมรอบฐานดาวในระบบเมืองหลวงของเรา พันธมิตรของเรารายงานผลกระทบที่คล้ายกันที่เมืองหลวงของพวกเขา อะไรทําให้เกิดปรากฏการณ์เหล่านี้"

 DISMEMBERED_CLOUD_PROJECT:0 "เมฆ, หมอก"
 DISMEMBERED_CLOUD_PROJECT_DESC:0 "สีสันสดใสของเมฆ ได้แนบอยู่กับฐานดาวของเราที่[root.Capital.GetName]การ ยัด เข้า และ ออก นอก เส้น เลือด ใน แบบ ที่ ไม่ แน่นอน หรือ อาจ ถึง กับ เป็น แบบ อินทรีย์ ด้วย ซ้ํา. อะไรเป็นสาเหตุของเรื่องนี้\n\nโครงการนี้เป็นส่วนหนึ่งของความพยายามทางวิทยาศาสตร์ที่กว้างขึ้น โดยสมาชิกของ[root.GetAllianceName]."
 tooltip_dismemberedcloud_begin:0 "สมาชิกแต่ละตัว[root.GetAllianceName]โดยทางลับ§Hโครงการพิเศษ§!ความพยายามร่วมกันเพื่อหาสิ่งที่เชื่อมโยงปรากฏการณ์เหล่านี้"

 federations3.2010.intro:0 "การสืบสวนของเราเกี่ยวกับเมฆคล้ายออร่าที่[root.Capital.GetName]ตั้งคําถามมากกว่าคําตอบ ความแตกต่างของกระแสเมฆ เมื่อใดก็ตามที่เราบีมการสื่อสารไปยังทีมวิจัยของพันธมิตรของเรา แต่เพียง แต่แล้ว"
 federations3.2010.red.desc:0 "$federations3.2010.intro$แต่ละคนมีสีแดง มีลักษณะคมชัดที่ขอบและ พวกเขาย้ายในลักษณะกวน\n\n$federations3.2010.close$"
 federations3.2010.yellow.desc:0 "$federations3.2010.intro$แต่ละดอกมีสีเหลือง มีขอบที่เรียบเรียง พวก มัน ขยับ ตัว ไป มา อย่าง ช้า ๆ ราว กับ ถูก ลม พัด เบา ๆ.\n\n$federations3.2010.close$"
 federations3.2010.green.desc:0 "$federations3.2010.intro$การปรากฏตัวของเราด้วยสีเขียวที่เจิดจ้า การเคลื่อนไหวของไอระเหยเหล่านี้ได้รับการอธิบายว่า\n\n$federations3.2010.close$"
 federations3.2010.blue.desc:0 "$federations3.2010.intro$ตัวยกสีฟ้าเหล่านี้ดูเหมือน จะยากหรือขี้อาย ยัดกลับไปอยู่ในไฮเปอร์สเปซ\n\n$federations3.2010.close$"
 federations3.2010.indigo.desc:0 "$federations3.2010.intro$แต่ละสดใส'สีม่วงไส้ติ่ง'ของเมฆย้ายช้าและ วัตถุประสงค์เพื่อชี้ไปยังคุณลักษณะต่าง ๆ ที่ภายนอกของฐานดาวเป็นแม้ว่า\n\n$federations3.2010.close$"
 federations3.2010.pink.desc:0 "$federations3.2010.intro$ไอหมอกสีชมพูและหมอกเหล่านี้ได้รับการอธิบายว่า 'เล่น'เล่นสกี'ออกห่างจากเรือใด ๆ ที่เกิดขึ้นที่จะเข้าหา\n\n$federations3.2010.close$"
 federations3.2010.gray.desc:0 "$federations3.2010.intro$พวก เขา ยัง คง อยู่ ที่ นั่น นาน หลาย ปี ทิ้ง ร่อง รอย ไว้ ซึ่ง ดู เหมือน ว่า เป็น ควัน สี เทา.\n\n$federations3.2010.close$"
 federations3.2010.orange.desc:0 "$federations3.2010.intro$การกวาดเหล่านี้เส้นโค้งสีส้ม จะมีแนวโน้มที่จะม้วนรอบด้านล่างของฐานดาวของเรา ทําให้ดูเหมือนว่ามีไฟไหม้\n\n$federations3.2010.close$"
 federations3.2010.brown.desc:0 "$federations3.2010.intro$สี น้ําตาล เข้ม ของ มัน ดู เหมือน จะ มี ลักษณะ แปลก ๆ มัน ทํา ให้ พื้น ผิว ดาว ส่วน ใหญ่ มืด มัว ไป ตาม ปกติ จะ เห็น จาก ภาย ใน ตัว ดาว.\n\n$federations3.2010.close$"
 federations3.2010.cyan.desc:0 "$federations3.2010.intro$สีฟ้าสดใสภายในก๊าซ ให้มันปรากฏของดาวเคราะห์ออร่าเพียง แต่วงต่างๆ ของมันเองจะเปลี่ยนจากเส้นโค้งกวาดเป็นเส้นขวาเป็น\n\n$federations3.2010.close$"
 federations3.2010.close:1 "เราไม่อาจเข้าใจความหมายใด ๆ เพิ่มเติมจากพฤติกรรมเหล่านี้ แต่[root.GetAllianceName]คาดว่าจะมีคําตอบมากกว่านี้§Yผลของสมาชิกทุกคนถูกสรุป§!.\n\nทฤษฎีแรกๆ ชี้ให้เห็นว่า หน่วยงานที่ปรากฏในมิตินี้ สอดคล้องกับสายการสื่อสารของเรา การล่อลวงโดยอุบัติเหตุนี้ สามารถเก็บไว้ได้ เพื่อใช้ประโยชน์จากองค์กรเพื่อศึกษามากขึ้น หรือเราอาจเปลี่ยนความถี่"
 federations3.2010.a:0 "ปลดปล่อยมันเป็นอิสระ"
 federations3.2010.b:0 "เก็บมันไว้ที่นี่"
 federations3.2015.name:0 "เมฆ ที่ ถูก ตัด ขาด"
 federations3.2015.intro:0 "ผลของการค้นพบของเราได้ถูกรวมเข้าด้วยกัน ดูเหมือนว่าทุกกรณี ของเมฆออโรราที่แทบจะขาดไม่ได้"
 federations3.2015.desc:0 "$federations3.2015.intro$\n\nอย่างที่นักวิจัยสามารถบอกได้มากที่สุดว่า สิ่งมีชีวิตนี้ลอยเข้าไปในพื้นที่รับพลังงานของเราโดยบังเอิญ นัก วิจัย เห็น พ้อง กัน ว่า ก๊าซ มี อยู่§Hกําลังพยายามปรับปรุงตัวเองใหม่§!- งานที่มันไม่สามารถสําเร็จได้ ในสถานะที่แตกละเอียดเช่นนี้\n\nหลังจากที่มีการปฏิรูป เมฆก็หายไปในไฮเปอร์สเปซ แต่ไม่ได้ก่อนที่จะไปเยี่ยมหลาย สถานีวิจัยพันธมิตรของเรา แต่ ละ ครั้ง มี การ เคลื่อน ไหว อย่าง แม่นยํา หลาย อย่าง ทั้ง ทั้ง ใน และ นอก เส้น ศูนย์ สูตร ซึ่ง พยาน บาง คน พรรณนา ว่า คล้าย กับ การ เต้น รํา. การสาธิตของกลุ่มเมฆ ที่สามารถข้ามผ่านแนวปิดกั้น ได้ให้ข้อมูลที่ประเมินค่าไม่ได้"
 federations3.2016.desc:0 "$federations3.2015.intro$\n\nข้อมูลที่เรามีนั้นไม่สมบูรณ์ แต่เพียงพอแล้วที่จะแนะนําว่า เราได้พบสิ่งมีชีวิต ที่เต็มไปด้วยแก๊สในรูปแบบ ผู้ประสานงานโครงการได้อนุมานว่า เมฆส่วนต่าง ๆ ได้ถูกกักไว้ บนฐานดาวใหญ่ของเรา ขณะที่มันลอยผ่านกาแล็กซี่ของเรา มันดูเหมือนจะต้องการ§Hเริ่มการทํางานใหม่§!- แต่หากไม่มีความพยายามร่วมกันในส่วนของเรา เมฆบางส่วนได้เริ่มสูญเสียความผูกพันธ์\n\nส่วน เหล่า นั้น ของ เมฆ ซึ่ง ได้ กลับ คืน สู่ สภาพ เดิม ไม่ นาน ก็ สูญ หาย ไป ใน ไฮเปอร์สเปซ; สิ่ง ที่ ยัง คง มี อยู่ เพื่อ ให้ นัก วิจัย มี ความ พยายาม ที่ น่า สนใจ ใน เรื่อง ต่าง ๆ ที่ เกี่ยว ข้อง กับ ความ ทรง จํา."
 federations3.2016.a:0 "ผลประโยชน์บางอย่างอาจจะยังเก็บเกี่ยวอยู่"
 federations3.2017.desc:0 "โดยไม่มีความพยายามในการร่วมมือกันใด ๆ ที่มีการประยุกต์ใช้โครงการนี้ เพียงเล็กน้อยสามารถกล่าวได้อย่างแน่ใจใด ๆ เกี่ยวกับเมฆในชั้นใน มีทฤษฎีมากมาย แต่เราทุกคนตอนนี้ เป็นพยานถึงความวุ่นวายของเมฆเหล่านี้\n\nขณะ ที่ โครง สร้าง ทาง กายภาพ ของ มัน หัก พัง เรา สังเกต ว่า เมฆ ไม่ ค่อย ตอบ สนอง ต่อ การ กระตุ้น. พวกเขาได้เริ่มยัดเข้าและออกจากไฮเปอร์สเปซอย่างรวดเร็วขึ้น นี่ทําให้เกิดปริมาณที่คงที่ของสายการสื่อสารของเราจํานวนมาก แต่มันยังให้ข้อมูลที่มีค่าแก่นักวิจัยทางทฤษฎีของเราใน[root.Capital.GetName]."
 federations3.2017.a.tooltip:0 "§H[Root.GetAllianceName]§!ได้รับเงินสนับสนุนชั่วคราวในการควบคู่\n\n"

 joint_cloud_boon:0 "บัวเมฆ"
 joint_cloud_boon_desc:0 "ด้วยการช่วยเหลือของก๊าซ โครงสร้างของสิ่งมีชีวิต ที่ครั้งหนึ่งเคยไปเยือนเมืองหลวงของเรา"
 temp_cloud_boon:0 "เมฆ ที่ ถูก ตัด ขาด"
 temp_cloud_boon_desc:0 "การเผชิญหน้ากับผู้มาเยือนอย่างมีแก๊ส, เผด็จการไปยังเมืองหลวงของเรา ได้ให้ความเข้าใจที่แตกต่างกัน"
 pm_joint_cloud_snag:0 "เมฆ ลอย อยู่"
 pm_joint_cloud_snag_desc:0 "เราได้เสียสละบางอย่างสัญญาณความซื่อสัตย์ในภูมิภาคนี้ เพื่อผลตอบแทนสําหรับ หยั่งลึกในฟิสิกส์ซุปเปอร์ลูมิเนียม มารยาทของสัตว์ที่ที่อยู่เผด็จการซึ่งถูกล่อลวงใน"


 ### GENIUS CAELI (Joint Operation - Research Co-operative) by Gemma Thomson ###

 #Arc site begins
 federations3.2103.name:0 "สัญญาณ ที่ ทํา ให้ ตื่น ตัว"
 federations3.2103.desc.body:1 "เรือระยะสั้นที่มีเส้นทาง พาพวกเขาเข้าสู่บรรยากาศของ[event_target:leylines_world.GetName]รายงานเสียงแปลกๆที่ทําร้ายยานของพวกเขา แหล่งที่มาดูเหมือนจะอยู่ด้านล่างผิวดาวเคราะห์ ในพื้นที่ที่อุดมไปด้วยแร่ธาตุที่ผิดปกติ\n\nเหตุการณ์ที่คล้ายกันยังมีรายงานเกี่ยวกับโลกดูแลโดยเพื่อนร่วมงานของเราใน[from.Federation.GetName]."
 federations3.2103.desc.generic:0 "$federations3.2103.desc.body$พวกเขาได้ตอบโต้ด้วยการตั้งคณะกรรมการนําโดย[event_target:leylines_coordinator.GetName]มีการเชื่อมโยงความพยายามในการขุดเจาะใด ๆ ที่เราทุกคนอาจจะต้องการที่จะมีส่วนร่วม"
 federations3.2103.desc.coordinator:0 "$federations3.2103.desc.body$พวก เขา ได้ ตอบ รับ โดย มอบ หมาย ให้ เรา เป็น ผู้ นํา คณะ กรรมการ ประสาน งาน การ ขุด ค้น ใด ๆ ก็ ตาม ที่ เรา ทุก คน อยาก จะ ร่วม ด้วย."
 leylines_digsite:0 "สีเส้นประ"
 leylines_digsite_desc:1 "ที่เคยคิดว่าเป็นเพียงตะเข็บ ของแร่ธาตุที่น่าสนใจครึ่งหนึ่งบน[From.Planet.GetName]ได้เริ่มปล่อยเสียงฮัมแปลกๆออกมา และไม่ได้ออกมาคนเดียว มี เสียง ดัง คล้าย ๆ กัน ดัง ทั่ว โลก. อะไรก็ตามที่อยู่เบื้องหลัง ปรากฏการณ์นี้"
 #Special project begins
 federations3.2104.name:0 "สัญญาณ ที่ ทํา ให้ ตื่น ตัว ใกล้ เข้า มา"
 federations3.2104.desc:1 "เพื่อนร่วมงานของเราใน[root.Federation.GetName]รายงานการฮัมเพลงจากแหล่งข่าว คิดว่าจะถูกฝังบนอย่างน้อยหนึ่งในโลกของพวกเขา มี การ ตั้ง คณะ กรรมการ วิจัย เพื่อ สนับสนุน ความ พยายาม ใน การ ขุด ค้น ใด ๆ ที่ พวก เขา ทํา.\n\nเราถูกขอให้จัดหาทรัพยากรเพิ่มของเราเอง เพื่อที่เราจะได้เข้าใจเหตุการณ์แปลกๆนี้มากขึ้น"
 federations3.2104.a:0 "เราจะให้การสนับสนุนเรา"
 leylines_chain_title:0 "ดิน แดน จาก เบื้อง ล่าง"
 leylines_chain_desc:0 "เสียงฮัมเพลงดังก้องไปทั่วดาว อย่างน้อยหนึ่งดวงในพื้นที่ของเรา ขณะ ที่ เพื่อน ร่วม งาน ของ เรา ทํา งาน ขุด ค้น สถาน ที่ เหล่า นี้ เรา ถูก ขอ ให้ ยืม ทรัพยากร ทาง วิทยาศาสตร์ ของ เรา เอง เพื่อ ความ พยายาม."
 LEYLINES_ACOUSTIC_PROJECT:0 "การ ต่อ สู้ กับ ฮาร์ โม นิก"
 LEYLINES_ACOUSTIC_PROJECT_DESC:0 "เพื่อที่จะช่วยให้เพื่อนร่วมงานของเรา มีสถานการณ์ที่เสียงดังมาก เราได้รับมอบหมายให้ขัดเกราะป้องกันเสียง ปัจจุบัน นัก โบราณคดี ไม่ สามารถ ทํา งาน อะไร ได้ มาก ไป กว่า การ เปลี่ยน แปลง ของ ส เต กกา โต ก่อน ที่ จะ แสดง สัญลักษณ์ ของ ความ ทุกข์ ทาง ร่าง กาย."
 federations3.2124.desc:0 "เราล้มเหลวในการให้เพื่อนร่วมงานของเรา กับการป้องกันเสียงเพิ่มเติมที่พวกเขาได้ร้องขอ การขาดเครื่องมือนี้ จะเป็นการขัดขวางความพยายามของพวกเขา และไม่ถ่วงเวลาพวกเขาโดยตรง อย่างไรก็ตาม มันได้ทิ้งพวกนักวิจัยทางแถวหน้าไว้ ซึ่งค่อนข้างกระสับกระส่ายมากขึ้น แม้หลังจากรายงานนี้\n\nเดอะ[root.Federation.GetName]ปัจจุบัน คณะ กรรมการ โครงการ เชิญ เรา ให้ ทํา การ แก้ไข โดย ส่ง เสริม การ ศึกษา เกี่ยว กับ เสียง เอง เพื่อ ดู ว่า นั่น อาจ ให้ ความ สว่าง ใด ๆ ได้ หรือ ไม่."
 federations3.2124.a:0 "เราจะพยายาม"
 federations3.2125.name:0 "การยกเลิกจุดรบกวนที่มีการปรับปรุงแล้ว"
 federations3.2125.desc:0 "เราได้ประสบความสําเร็จในการปรับปรุง การเข้าถึงและความยืดหยุ่น ของโล่เสียงใช้งานของเรา การอัพเกรดเหล่านี้ได้รับการแบ่งปันให้เพื่อนร่วมงานของเราใน[root.Federation.GetName]นักวิจัยของพวกเขาที่พื้นดินได้รายงานแล้ว การลดลงอย่างมากของความทุกข์ในการรับรู้ และความปวดร้าวของร่างกาย คณะกรรมการร่วมขอให้เราช่วย วิเคราะห์ข้อมูล"
 LEYLINES_ANALYSIS_PROJECT:0 "Resonant Hum Analysis"
 LEYLINES_ANALYSIS_PROJECT_DESC:0 "ตอนนี้เพื่อนร่วมงานของเราใน[root.Federation.GetName]ได้เริ่มต้นขั้นตอนต่อไปของการขุดเจาะของพวกเขา คณะกรรมการของโครงการได้มอบหมายให้เราศึกษา"
 federations3.2129.desc:0 "เดอะ[root.Federation.GetName]คณะ กรรมการ โครงการ แสดง ความ ผิด หวัง ใน การ ที่ เรา ไม่ ได้ ผล. ใน ที่ สุด โลก ที่ ได้ รับ การ บํารุง เลี้ยง ของ เรา หลาย แห่ง ก็ พัง ทลาย ลง อย่าง สิ้น เชิง ดัง นั้น โอกาส ใน การ ค้นคว้า ก็ ใกล้ เข้า มา เช่น กัน. นัก วิจัย ได้ รวบ รวม สิ่ง ที่ พวก เขา สามารถ เข้าใจ ได้ แต่ บัด นี้ ความ หวัง ใด ๆ ที่ จะ ได้ คํา ตอบ ที่ ละเอียด อยู่ ที่ นัก โบราณคดี บน พื้น ดิน เท่า นั้น."
 federations3.2130.name:0 "Resonant Hum, Analyzed"
 federations3.2130.desc:0 "เสียงโหยหวนจากสถานที่โบราณคดี ข้ามพื้นที่ของเราเริ่มลดลง โดยการศึกษาการบันทึกเสียงของแต่ละเสียง และเปรียบเทียบข้อมูลของเรากับของเพื่อนร่วมงานของเรา เราค้นพบความสามัคคีที่น่าประหลาดใจ มันเป็นไปได้ว่าข้อตกลงนี้มีความสําคัญทางวัฒนธรรม สําหรับใครก็ตามที่พัฒนาเว็บไซต์นี้ เราอาจจะไม่เคยรู้ งานวิจัยยังดําเนินต่อไป..."
 #Arc site
 federations3.2105.name:0 "เชลล์ เนื้อ อ่อน"
 federations3.2105.desc:0 "งานเปิดเผยเว็บไซต์นี้ ตรงไปตรงมา แม้ว่าเราจะต้องทํางานในกะของสเต็กกาโต้ เรากําจัดสตราต้าที่ไร้ตัวตนออกไป 2 ตัว ก่อนจะพบกับเปลือกใหญ่หรือโดม ส่วน โดม อีก ชนิด หนึ่ง ที่ เหมือน กัน ถูก ค้น พบ ใกล้ ๆ กัน จน ถึง ตอน นี้ ดู เหมือน ว่า มี การ จัด ระบบ ใน โค้ง หรือ วง กลม.\n\nแต่ ละ โดม ถูก สร้าง จาก รา และ ได้ รับ การ รักษา ให้ หาย ถึง ขนาด ที่ มัน มี ยุค ทาง ธรณี วิทยา ที่ ต่อ ต้าน. ตรงข้ามกับโครงสร้างเหล่านี้ ซึ่งแต่ละอาคารมีขนาดของหอชุมนุม - ควรเป็นไปได้"
 federations3.2111.name:0 "ที่อยู่เงียบๆ"
 federations3.2111.desc:0 "ขณะ ที่ เรา ยัง ไม่ ได้ ระบุ แหล่ง ที่ มา ของ นก เค้า แมว ที่ มี อยู่ ทั่ว ไป แต่ การ ที่ มัน มี อยู่ ก็ เริ่ม ลด น้อย ลง. นักวิจัยของเราจึงสามารถมุ่งเน้นไปที่ การเจาะผ่านโครงสร้างที่ใกล้เคียง\n\nพื้นที่ภายในนั้น ไม่มีเนื้อหาใดๆทั้งสิ้น ข้อสรุปแรกของเราก็คือ ยิ่ง กว่า นั้น พื้น ผิว ด้าน ใน ของ โดม มี การ แสดง ให้ เห็น ด้วย สิ่ง ที่ ดู เหมือน ว่า เป็น แผนภูมิ ของ ดาว ต่าง ๆ ซึ่ง ประกอบ ด้วย ตัว เลข ใน ตํานาน และ ข้อ คัมภีร์ บาง อย่าง. เรากําลังทํางานเพื่อตีความการออกแบบเหล่านี้"
 federations3.2112.name:0 "เครื่อง เรือน"
 federations3.2112.desc:0 "เราค้นพบเครื่องราชอิสริยาภรณ์ของอุปกรณ์ที่ซับซ้อน ภายในโดมนั้น ซึ่งดูเหมือนไม่มีที่ไหน สามารถทําให้เกิดเสียงใหญ่ หน่วยเฉพาะกิจเล็กๆ ได้แยกตัวออกไป เพื่อทําการสืบสวนของเราต่อไป\n\nนักวิจัยจํานวนมากของเรายังอยู่ในโครงสร้างคล้ายเปลือกหอย ศึกษากลไกภายใน เครื่อง มือ เหล่า นี้ มี ความ สลับ ซับ ซ้อน มี รูป ทรง และ ดู เหมือน ว่า ตอน แรก เมื่อ มอง เห็น เครื่อง ยนต์ ขนาด ใหญ่ รูป แบบ หนึ่ง."
 federations3.2116.name:0 "ห้อง เอ ส โต ร เจน"
 federations3.2116.desc:0 "รายงานจากฝั่งตรงข้าม[From.Owner.Federation.GetName]ยืนยัน ไซเรนกําลังลดความเร็วลง พวกเขาหยุดเกือบพร้อมกัน แม้ระยะทางที่กว้างขวางระหว่างสถานที่ ระหว่างดวงดาว\n\nตั้งแต่นั้นเป็นต้นมา ทีมวิจัยของเรา ได้จัดวางโมเดลพิเศษ จากกลุ่มดาวหลายกลุ่ม ข้อมูลที่พวกเขารวบรวมมา ชี้ให้เห็นว่า สถานที่นี้เก่าแก่กว่า สตราตา โดยลําดับของยุคสมัย โดยมีข้อยกเว้นหนึ่งที่โดดเด่น\n\nและตกแต่งด้วยเอ็ตชั่นที่เราเชื่อว่าถูกใช้เพื่อแปลชาร์ตดาวที่เก่าแก่ที่สุดของโดม"
 federations3.2117.name:0 "ระบบ ดาว ภาย ใน ดาว"
 federations3.2117.desc:1 "รายงานจากฝั่งตรงข้าม[From.Owner.Federation.GetName]ยืนยัน: เสียงฮัมเพลง ซึ่งกําลังดังอยู่ในแหล่งวิจัย ทั่วพื้นที่ใช้ร่วมกันของเรา ตอนนี้ได้ลดลง นี่ เป็น การ บรรเทา สําหรับ นัก วิจัย ของ เรา ขณะ ที่ พวก เขา ตรวจ สอบ อุปกรณ์ ที่ ซับ ซ้อน ซึ่ง จัด ไว้ ภาย ใน โดม นั้น.\n\nแม้ว่าการออกแบบจะประหลาดมาก แต่เราก็ได้ระบุมันว่าเป็นการเรียบเรียงของออร์รีส์ที่เชื่อมเข้าด้วยกัน แบบจําลองเหล่านี้แสดงความสมบูรณ์ของ[From.Planet.System.GetName]รวม ทั้ง ระบบ ดาว อื่น ๆ อีก สอง ระบบ ซึ่ง เรา หรือ เพื่อน ร่วม งาน ยัง ไม่ รู้ จัก ชื่อ และ ตําแหน่ง ของ มัน. แต่ ละ รัง ถูก ขับ โดย รัง ของ เพลา และ เฟือง รอง รับ ประติมากรรม จํานวน มาก มาย ใน ผลึก และ ฟอสซิล. ถึงแม้ว่ามันจะยังดูค่อนข้างนิ่งอยู่ แต่จริง ๆ แล้วพวกมันกําลังเคลื่อนที่ด้วยอัตราเร่งของกาแล็กซี่ - เหมือนกับชิ้นส่วนของเครื่องจับเวลาขนาดใหญ่"
 federations3.2120.name:0 "คาไลอัจฉริยะ"
 federations3.2120.desc:1 "การศึกษาของเราเกี่ยวกับโดม[From.Planet.GetName]และที่อื่น ๆ ได้ถึงจุดสิ้นสุด แต่ละเว็บไซต์เป็นอุปกรณ์ดาราศาสตร์ขนาดใหญ่ ตรงกับคนอื่น ๆ เช่นมันข้ามระยะทางระหว่างดวงดาว\n\nการศึกษาของเราบอกว่า หน่วยงานเช่นนี้ได้รับการปฏิบัติ เป็นจุดโฟกัสสําหรับพลังงานคอสมิก มีผลกระทบทั่วไปของสถานที่ บันทึกที่วางจําหน่ายพูดถึงสภาที่ \"ชื่นชม\" พลังงานเหล่านี้เพื่อนําทางให้จักรวรรดิของพวกเขา โชคลาภ\n\nการปฏิบัติดังกล่าวไม่ได้หยุดการลดลงในที่สุดของสังคมของพวกเขา แต่ในพันปีที่ตามมายังมีผู้รับมรดกที่จะแปลและฟื้นฟูการปฏิบัติ ตั้ง แต่ นั้น มา พวก เขา ก็ ทิ้ง สถาน ที่ เหล่า นี้ ไว้ ให้ เป็น ส่วน ที่ ไม่ รู้ จัก.\n\nเครื่องจับเวลาอันกว้างใหญ่ได้ค่อยๆ เลื่อนผ่านช่วงเวลาของอารยธรรมอย่างน้อย 2 อารยธรรม ไซเรนอัตโนมัติของมันได้เรียกร้องให้เรา ไม่ว่ามันจะได้ผลหรือไม่[from.owner.Federation.GetName]ตอนนี้พร้อมแล้วที่จะสังเกต..."
 #Finalé
 federations3.2135.name:0 "มรดก ใน การ นวด ปั้น"
 federations3.2135.desc:0 "บางคนอาจบอกว่าข้อมูลสุดท้ายของเรา ถูกรวบรวมเข้ามา ในจุดพักของเวลา เพียงไม่กี่วันหลังจากการค้นพบครั้งสุดท้ายของเราได้รับการตีพิมพ์ แต่ละเว็บไซต์แก้ไขภายใน[from.Federation.GetName]ห้วงอวกาศระเบิดใส่ชีวิต แสงสว่างที่พุ่งขึ้นจากแหล่งลึกใต้ดิน คานของพวกเขาหล่อเป็นตาราง - และอาจจะ - ที่เมืองหลวงของเรา\n\nนักวิจัยของเรางง ผู้สร้างเว็บไซต์เหล่านี้จะรู้ได้อย่างไร - แต่พวกนั้น[root.Capital.GetName]เป็น ห่วง มาก ขึ้น เกี่ยว กับ ภาพ ที่ เหมือน ฝัน ซึ่ง ปรากฏ สั้น ๆ บน อุปกรณ์ ทุก ชนิด พร้อม ด้วย ภาพ สะท้อน. การออกอากาศ 'พูด' ด้วยวัตถุประสงค์เอกพจน์ ประกาศว่านี่เป็น'§Hเวลา แห่ง ความ รู้§!'.\n\nไม่มีปรากฏการณ์ต่อมาได้รับการรายงาน; เว็บไซต์แก้ไขอีกครั้งและได้กลับมาของพวกเขา glacial'cupin'ผ่านวัยที่ตอนนี้รวมของเราเอง"
 leylines_mod_knowing:0 "อัจฉริยะเคลี: เวลาแห่งความรู้"
 leylines_mod_knowing_desc:0 "การศึกษาอย่างสามัคคีของเราเกี่ยวกับ อุปกรณ์ดาราศาสตร์ที่แปลก ๆ ได้ให้ความเข้าใจกับเรา"
 federations3.2136.desc:0 "แต่ละเว็บไซต์ที่ครั้งหนึ่งเคยไม่เป็นมิตร[from.Federation.GetName]พื้นที่ได้มีช่วงเวลาสั้น ๆ ระเบิดเข้ามาในชีวิต มี รายงาน ว่า มี การ พ่น แสง ออก มา จาก แหล่ง ที่ อยู่ ลึก ลง ไป ใต้ ดิน คาน ของ พวก เขา บิด เบี้ยว และ น่า จะ เป็น ที่ เมือง หลวง ของ เรา.\n\nนักวิจัยของเรางง ผู้สร้างเว็บไซต์เหล่านี้จะรู้ได้อย่างไร - แต่พวกนั้น[root.Capital.GetName]เป็น ห่วง มาก ขึ้น เกี่ยว กับ ภาพ ที่ เหมือน ฝัน ซึ่ง ปรากฏ สั้น ๆ บน อุปกรณ์ ทุก ชนิด พร้อม ด้วย ภาพ สะท้อน. มันไม่ชัดเจนว่าการออกอากาศมีไว้เพื่ออะไร แต่การสังเกตทั่วไปเน้นความรู้สึกของ§Hความ เจริญ รุ่งเรือง สมดุล§!.\n\nไม่มีปรากฏการณ์ต่อมาได้รับการรายงาน; เว็บไซต์แก้ไขอีกแล้วและได้กลับมาลึกลับของพวกเขา'ฉี่'"
 leylines_mod_lagom:0 "เคลี ผู้ เชี่ยวชาญ: ความ สมดุล"
 leylines_mod_lagom_desc:0 "การ ศึกษา ของ เรา เกี่ยว กับ อุปกรณ์ ทาง ดาราศาสตร์ ที่ แปลก ประหลาด ได้ ให้ ความ หยั่ง เห็น เข้าใจ แก่ เรา ดัง นี้: บท เรียน ใน เรื่อง ความ ยั่งยืน จาก สังคม ที่ มี ความ เชื่อ ทาง ศาสนา โบราณ."
 federations3.2137.name:0 "มรดก ที่ ไม่ รู้ จัก"
 federations3.2137.desc:0 "เครื่องราชอิสริยาภรณ์[from.Federation.GetName]ได้ถูกตกใจโดยฉับพลันเห็นได้ชัดการจี้ของภาพอาหารซึ่ง ตรงกับระเบิดของกิจกรรมจากเว็บไซต์ดอมนอนโบราณพบเมื่อไม่กี่ปีที่ผ่านมา มี รายงาน ว่า มี การ พ่น แสง ออก มา จาก แหล่ง ที่ อยู่ ลึก ลง ไป ใต้ ดิน คาน ของ พวก เขา บิด เบี้ยว และ น่า จะ เป็น ที่ เมือง หลวง ของ เรา.\n\nนักวิจัยของเราเกี่ยวกับ[root.Capital.GetName]การ ถ่ายทอด นิมิต ที่ เหมือน ฝัน นี้ ทํา ให้ งุนงง. มันไม่ชัดเจน ว่ามันตั้งใจจะทําอะไร และไม่มีปรากฏการณ์ใด ที่ถูกรายงานออกมา ซึ่งอาจให้เบาะแสกับเรามากขึ้น ดู เหมือน ว่า เรา เพียง แต่ พลาด โอกาส ที่ จะ ศึกษา ปรากฏการณ์ นี้."

 ### BARELY CONTAINED EFFICIENCY (Joint Operation - Trade Leagues) by Douglas Furen ###

# EVENT TEXT
 # - Intro -
 fedev.605.name:0 "การ พิจารณา คดี ที่ กําลัง จะ มา ถึง:"
 fedev.605.desc:0 "การนองเลือดของสินค้าต่างๆ คือเลือดแห่งการค้าที่รุ่งเรืองของเรา แต่ จน ถึง บัด นี้ จักรวรรดิ แต่ ละ แห่ง ได้ พึ่ง อาศัย มาตรฐาน ของ ตน เอง ใน เรื่อง การ ออก แบบ ตู้ สินค้า, วิธี ขน ส่ง, และ ท่อ ส่ง สินค้า.\n\nเพื่อ จะ มี ประสิทธิภาพ มาก ที่ สุด โครงการ ทดลอง ใหม่ จะ เริ่ม ขึ้น ใน ไม่ กี่ ปี ซึ่ง มุ่ง หมาย จะ ตรวจ สอบ และ ทดลอง มาตรฐาน การ เดิน เรือ แบบ ใหม่ ที่ เฉพาะ เจาะจง ซึ่ง จะ นํา มา ใช้ กับ สมาชิก ทุก คน ของ คณะ กรรมาธิการ.\n\nการ มี ส่วน ร่วม ต้อง มี ระบบ ที่ อย่าง น้อย§H50 การ ค้า§!มันไหลริน นอกจากนี้ การดํารงอยู่ของ§Hบริษัทการยกเลิก§!จะหมายถึงเพิ่มข้อมูลสถิติ และได้รับการสนับสนุน\n\nเนื่องจากขอบเขตที่กว้างขวางของโครงการนี้ ค่าใช้จ่ายบางอย่างจะนําไปใช้ แต่เพื่อสิ่งที่ดีกว่า นั่นก็คือ กําไรในอนาคต\n\nสมาชิก ทุก คน ของ คณะ ผู้ บํารุง เลี้ยง ได้ รับ การ สนับสนุน อย่าง มาก ให้ มี ส่วน ร่วม."
 fedev.605.a:0 "เป็นความคิดริเริ่มที่ยอดเยี่ยม!"
 # - Trial starts - Participants only -
 fedev.615.name:0 "การ มี ส่วน ร่วม ใน การ ทดลอง — จริง"
 fedev.615.desc.a:0 "การซ่อมแซมระบบได้เริ่มต้นขึ้นแล้ว! ต้องขอบคุณเส้นทางการค้าของจักรวรรดิ§Y[From.GetName]§!ได้ รับ อนุญาต ให้ ร่วม ใน โครงการ พิจารณา คดี! หนึ่งฐานดาวได้รับการคัดเลือกออกเป็นเว็บไซต์ทดสอบและตอนนี้§Hเรือก่อสร้าง§!ต้องได้รับมอบหมายให้ทํางานปรับปรุงจริง ๆ เวลา เป็น ปัจจัย หนึ่ง ดัง นั้น อย่า หมกมุ่น อยู่ กับ งาน นี้.\n\nขนาด§Hบริษัทการยกเลิก§!หน่วยงานต่างๆ ยังมีอยู่ และต้องขอบคุณสิ่งนี้ โปรเจกต์นี้จะถูกปรับปรุงใหม่ จักรวรรดิจะได้รับทุนบางส่วน เพื่อเป็นการแสดงความกตัญญู"
 fedev.615.desc.b:0 "การซ่อมแซมระบบได้เริ่มต้นขึ้นแล้ว! ต้องขอบคุณเส้นทางการค้าของจักรวรรดิ§Y[From.GetName]§!ได้ รับ อนุญาต ให้ ร่วม ใน โครงการ พิจารณา คดี! หนึ่งฐานดาวได้รับการคัดเลือกออกเป็นเว็บไซต์ทดสอบและตอนนี้§Hเรือก่อสร้าง§!ต้องได้รับมอบหมายให้ทํางานปรับปรุงจริง ๆ เวลา เป็น ปัจจัย หนึ่ง ดัง นั้น อย่า หมกมุ่น อยู่ กับ งาน นี้.\n\nขนาด§Hบริษัทการยกเลิก§!ไม่มีสิ่งอํานวยความสะดวก นี่ไม่ได้หยุดการมีส่วนร่วมของเรา แต่จะช่วยยับยั้งความก้าวหน้าได้ ในขณะที่เราไม่สามารถใช้ประโยชน์"
 fedev.615.a:0 "เรากําลังทําหน้าที่ของเรา!"
 # - Trial starts - Not participating -
 fedev.620.name:0 "การ มี ส่วน ร่วม ใน การ ทดลอง - ปฏิเสธ"
 fedev.620.desc:0 "การซ่อมแซมระบบได้เริ่มต้นขึ้นแล้ว! อย่างไรก็ตาม§Y[From.GetName]§!มี การ พบ ว่า ขาด แคลน อุปกรณ์ ต่าง ๆ ที่ จําเป็น สําหรับ การ มี ส่วน ร่วม ใน การ พิจารณา คดี. การขาด§Hเทรดฮับ§!ในระบบที่เพียงพอ การ ค้า ที่ ไหล เวียน ผ่าน นั้น ไม่ ใช่ แค่ การ ค้า เท่า นั้น.\n\nการ พลาด โอกาส ใน โครงการ ที่ อาจ เป็น ประโยชน์ เป็น ข้อ ผิด พลาด แต่ การ พลาด โอกาส ใน ธุรกิจ ที่ สูง ส่ง เช่น นั้น เป็น การ แลก เปลี่ยน? นั่นเกือบเป็นอาชญากรรม!\n\nสําหรับความละอาย[From.GetSpeciesNamePlural]เพื่อความอัปยศ!"
 fedev.620.a:0 "มันเป็นอย่างที่มันเป็น"
 # - Special Project completed -
 fedev.625.name:0 "การ ปรับ ปรุง ให้ สมบูรณ์"
 fedev.625.desc:0 "ยินดีด้วย! ปฏิบัติการปรับปรุงใหม่เสร็จสิ้นแล้ว และเทรดฮับที่อุทิศตนแล้ว กําลังดําเนินการตามมาตรฐานใหม่ ตอนนี้ไม่มีอะไรให้ทําแล้ว นอกจากประเมินระบบใหม่\n\nใน ตอน สิ้น สุด ของ ช่วง การ พิจารณา คดี จะ มี คํา แถลง อย่าง เป็น ทาง การ เกี่ยว กับ วิธี ที่ โครงการ พิจารณา คดี ปรากฏ ขึ้น."
 # - Perfect Trial result -
 fedev.635.name:0 "การ ขี่ อย่าง นุ่ม นวล ที่ สุด"
 fedev.635.desc:0 "วัน นี้ เป็น วัน สําคัญ สําหรับ ผล กําไร และ การ ค้า! ไม่ เพียง แต่ การ พิจารณา คดี ด้วย ไม้ ซุง สมบูรณ์ เท่า นั้น แต่ ผล ที่ ได้ ก็ แสดง ให้ เห็น ว่า ธุรกิจ ระหว่าง ดวง ดาว มี ประสิทธิภาพ มาก ขึ้น อย่าง น่า สังเกต!\n\nผล ก็ คือ บัด นี้ การ ดําเนิน การ ด้าน การ ค้า โดย อาศัย อวกาศ ทุก รูป แบบ จะ ค่อย ๆ เปลี่ยน ไป และ ค่อน ข้าง จะ ไม่ มี ใคร สังเกต ได้ แทน มาตรฐาน ใหม่ การ รับ น้ํา หนัก จะ เป็น ประโยชน์ อย่าง มหาศาล.\n\nฮูราห์เพื่อผลประโยชน์!"
 fedev.635.a:0 "ชัยชนะสําหรับการค้า!"
 # - Good Trial result -
 fedev.640.name:0 "สําเร็จ"
 fedev.640.desc:0 "มันเป็นวันที่ดีสําหรับการค้าและการค้า ช่วง การ พิจารณา คดี สิ้น สุด ลง แล้ว และ โครงการ นี้ ได้ รับ การ ประเมิน อย่าง ครบ ถ้วน. มี การ รวบ รวม ข้อมูล มาก พอ ที่ จะ เห็น การ เพิ่ม ประสิทธิภาพ ซึ่ง ทํา ให้ มี การ กําหนด มาตรฐาน การ เดิน เรือ แบบ ใหม่ อย่าง ครบ ถ้วน.\n\nตอนนี้เริ่มกระบวนการที่การจัดส่งทั้งหมด จะเปลี่ยนไปใช้มาตรฐานใหม่ แต่กระบวนการนี้จะอัตโนมัติ อาหาร จะ ถูก ส่ง ออก ไป สินค้า ที่ ผู้ บริโภค จะ ไป ถึง จุด หมาย ปลาย ทาง เครื่อง เทศ จะ ไหล เวียน และ อื่น ๆ.\n\nดีมาก!"
 fedev.640.a:0 "สวัสดี รายได้ไหลมา"
 # - No Trial result -
 fedev.645.name:0 "การ มี ส่วน ร่วม อย่าง น่า สงสาร"
 fedev.645.desc:0 "เวลาของกรีมมันน่าเบื่อจริงๆ ถ้านี่คือแรงจูงใจที่ต่ํากว่ามาตรฐาน ซึ่งสมาชิกขององค์กรแสวงหากําไร\n\nการ ขาด ความ ร่วม มือ และ การ ขับ รถ ที่ น่า กลัว ทํา ให้ การ พิจารณา คดี ตาม อําเภอ ใจ นี้ กลาย เป็น เรื่อง ที่ เหลือ เชื่อ! ตอนนี้สิ่งเดียวที่ยังคงอยู่ คือการเต้นที่น่าเบื่อหน่าย ของการกล่าวโทษ คดีความ และคดีฟ้องร้อง\n\nทนายความเพิ่มขึ้น[From.GetSpeciesNamePlural]- จะมีผลกระทบตามมา"
 fedev.645.a:0 "นี่มันน่าอายนะ"
# EVENT MODIFIERS
 encumbrance_tax:0 "ภาษี ที่ เกี่ยว ข้อง"
 encumbrance_tax_desc:0 "การขาดการมีส่วนร่วมในการลองใช้ไม้พลองอย่างต่อเนื่อง ตอบสนองด้วย 'ภาษีเงิน' ใช้กับจักรวรรดิ"
 cost_of_progress:0 "ค่าใช้จ่ายของความคืบหน้า"
 cost_of_progress_desc:0 "โครงการ ซ่อมแซม ไม้ ซุง อาจ เกิด ผล ใน อนาคต แต่ การ จัด การ ก็ ยัง คง มี ราคา อยู่."
 process_sharing:0 "การใช้โพรเซสร่วมกัน"
 process_sharing_desc:0 "เนื่อง จาก ความ ร่วม มือ ระหว่าง บริษัท ต่าง ๆ จึง ลด ค่า ใช้ จ่าย ของ โครงการ ปรับ ปรุง วิธี การ ทํา ไม้."
 streamlined_logistics:0 "การ บันทึก เสียง"
 streamlined_logistics_desc:0 "การบํารุงรักษาคือการเก็บเกี่ยวผลของ ผลตอบแทนจากการได้ดําเนินการมาตรฐาน การตัดไม้แบบรวม"
 fully_streamlined_logistics:0 "การ บันทึก เสียง"
 fully_streamlined_logistics_desc:0 "การ ป้อน อาหาร กําลัง ชื่นชม กับ ผล กําไร ที่ สังเกต เห็น ได้ เพิ่ม ขึ้น เนื่อง จาก มาตรฐาน การ ทํา ตาม อําเภอ ใจ แบบ ใหม่."
# EVENT SPECIAL PROJECTS
 LOGISTIC_REMODEL:0 "การ ปรับ ปรุง ระบบ การ เดิน ทาง"
 LOGISTIC_REMODEL_DESC:0 "เพื่อที่จะลองใช้มาตรฐานใหม่ ของการใช้ไม้บรรทัด อาคารที่เกี่ยวข้องบนฐานดาวนี้\n\nกําหนดอักขระ§Yเรือก่อสร้าง§!เพื่อโครงการและให้แน่ใจว่ามันทําในเวลา!"
 LOGISTIC_REMODEL_OFFWORLD:0 "การ ปรับ ปรุง วิธี การ ตัด ไม้ ให้ ดี ขึ้น"
 LOGISTIC_REMODEL_OFFWORLD_DESC:0 "เพื่อที่จะลองใช้มาตรฐานใหม่ ของการใช้ไม้บรรทัด อาคารที่เกี่ยวข้องบนฐานดาวนี้ ต้องขอบคุณคนท้องถิ่น§Hบริษัทการยกเลิก§!โครงการนี้จะมีประสิทธิภาพมากขึ้น\n\nกําหนดอักขระ§Yเรือก่อสร้าง§!เพื่อโครงการและให้แน่ใจว่ามันทําในเวลา!"

 ### Hegemony Joint Operation by Pierre du Plessis ###

 federations2.50.name:0 "การ ฉลองเอกภาพและเป็นผู้นํา"
 federations2.50.desc:0 "เดอะ[Root.Federation.GetName]ได้เจริญรุ่งเรืองภายใต้ผู้นําที่ชาญฉลาดของประเทศของเรา มาก[Root.GetSpeciesNamePlural]ตอนนี้รู้สึกว่าเป็นเวลาสําหรับการให้บริการของเราเพื่อพันธมิตรที่จะได้รับการชําระคืนด้วย การเฉลิมฉลองของ เอกภาพ - และที่เจาะจงมากขึ้นที่ยิ่งใหญ่[Root.GetAdj]ผู้นําที่ทําเพื่อมัน พวก เขา เสนอ ว่า รัฐ สมาชิก มี ส่วน ส่ง เสริม การ แผ่ ขยาย ของ อนุสาวรีย์ ใหญ่ ใน ท้องฟ้า ข้าง บน[Root.Capital.GetName]ในขณะเดียวกัน เราส่งตัวแทนไปยังเมืองหลวงของสมาชิก 2 รัฐ เพื่อช่วยให้พวกเขา ในความพยายามของพวกเขาที่จะนําเอกภาพมากขึ้น[Root.Federation.GetName]."
 federations2.50.A.tooltip:0 "ทุกรัฐสมาชิก ที่เข้าถึง§H[Root.Capital.System.GetName]§!ระบบจะเข้าร่วมปฏิบัติการร่วมกัน\n\nถ้าพวกเขายอมรับ พวกเขาจะต้องอุทิศทรัพยากร ให้กับอนุสาวรีย์ที่จะส่งเสริมสหพันธรัฐ§Hประสบการณ์§!และ[Root.GetName]'§Hอิทธิพล§!.\n\nเดอะ[Root.GetName]นอกจากนี้ยังสามารถที่จะเลือกที่จะเพิ่มขึ้น§H[Root.GetHegemonyEthos]§!ดึงดูดใน 2 รัฐสมาชิก\n\nหากข้อเสนอถูกปฏิเสธอย่างกว้างขวาง สหพันธ์§Hความแหลม:§!จะลดลงและ[Root.GetName]จะแพ้§Hอิทธิพล§!."
 federations2.50.A:0 "ฟังดูเป็นความคิดที่ดีนะ"
 federations2.50.B:0 "เรา ไม่ จําเป็น ต้อง มี เครื่อง ประดับ ดัง กล่าว."
 federations2.51.name:0 "$federations2.50.name$"
 federations2.51.desc:0 "สวัสดี ท่านขุนนาง[Root.GetSpeciesNamePluralCompliment]ไม่! ภายใต้ความเป็นผู้นําอันชาญฉลาดของเรา[Root.Federation.GetName]ได้เปลี่ยนจากความแข็งแรงเป็นความแข็งแรง นําเสนอความสามัคคีของวัตถุประสงค์ ข้ามกาแล็กซี่ ถึงเวลาฉลองความสําเร็จร่วมกันในฐานะสหภาพแล้ว มี วิธี ใด อีก ที่ ดี ไป กว่า การ ทํา เช่น นี้ โดย ผ่าน อนุสาวรีย์ อัน ยิ่ง ใหญ่ เหนือ เมือง หลวง ของ เรา ซึ่ง ถูก สร้าง ขึ้น โดย ความ พยายาม ของ รัฐ สมาชิก? ในขณะเดียวกันเราจะส่งตัวแทนไปยังเมืองหลวงของคุณ ซึ่งจะช่วยให้ความพยายามของคุณที่จะพยายามเพื่อประโยชน์มากขึ้นของ[Root.Federation.GetName].\n\nคุณจะเข้าร่วมลงทุนนี้หรือไม่"
 federations2.51.A:0 "แน่นอน!"
 federations2.51.A.tooltip:0 "ทุกรัฐสมาชิก ที่เข้าถึง§H[From.Capital.System.GetName]§!ระบบจะเข้าร่วมปฏิบัติการร่วมกัน\n\nถ้าพวกเขายอมรับ พวกเขาจะต้องอุทิศทรัพยากร ให้กับอนุสาวรีย์ที่จะส่งเสริมสหพันธรัฐ§Hประสบการณ์§!และ[From.GetName]'§Hอิทธิพล§!.\n\nเดอะ[From.GetName]นอกจากนี้ยังสามารถที่จะเลือกที่จะเพิ่มขึ้น§H[From.GetHegemonyEthos]§!ดึงดูดใน 2 รัฐสมาชิก"
 federations2.51.A.tooltip2:0 "\nการประกอบอนุสรณ์จะราคา 10% ของ[Root.GetName]'£minerals£แร่ที่ผลิตออกมาเป็นเวลา 1 ปี"
 opinion_hegemony_joint_action_agreed:0 "เห็น ด้วย กับ การ ฉลองเอกภาพ"
 federations2.51.B:0 "อนุสาวรีย์เหนือเมืองหลวงของคุณ? ไม่ เลย!"
 federations2.51.B.tooltip:0 "หากข้อเสนอถูกปฏิเสธอย่างกว้างขวาง สหพันธ์§Hความแหลม:§!จะลดลง"
 opinion_hegemony_joint_action_refused:0 "ปฏิเสธการเฉลิมฉลองเอกภาพ"
 federations2.53.name:0 "ร่วมกับปฏิบัติการฟอลส์ผ่านทาง"
 federations2.53.desc:0 "ทูตของเราได้เข้าหาสมาชิกของ[Root.Federation.GetName]กับแผนการฉลองความสามัคคีของเรา น่า เสียดาย ดู เหมือน พวก เขา ไม่ รู้สึก อย่าง เดียว กับ ที่ เรา รู้สึก และ เรา ไม่ สามารถ รวบ รวม การ สนับสนุน ให้ แผนการ ดําเนิน ต่อ ไป ได้."
 federations2.53.A:0 "การขาดศรัทธาที่รบกวนจิตใจ"
 the_following_nations_will_participate:0 "\nประเทศ ต่อ ไป นี้ จะ มี ส่วน ร่วม:"
 the_following_nations_said_yes:0 "\nชาติ ต่อ ไป นี้ เห็น ด้วย กับ แผนการ ดัง ต่อ ไป นี้:"
 no_following_nations_said_yes:0 "\nไม่มีชาติใดเห็นด้วยกับแผนนี้"
 the_following_nations_said_no:0 "\nชาติ ต่อ ไป นี้ ปฏิเสธ แผนการ ดัง นี้:"
 no_following_nations_said_no:0 "\nไม่มีชาติใดปฏิเสธแผนการนี้"
 the_following_nations_failed2:0 "\nประเทศ ต่อ ไป นี้ ไม่ ได้ บริจาค:"
 prev_GetName:0 "[Prev.GetName]"
 federations2.54.name:0 "ร่วมกับปฏิบัติการฟอลส์ผ่านทาง"
 federations2.54.desc.said_yes:0 "แม้เราจะสนับสนุน[From.GetAdj]ริเริ่มจัดงานฉลอง[Root.Federation.GetName]สามัคคีกัน ดูเหมือนแผนจะล้มเหลว มีการสนับสนุนไม่เพียงพอสําหรับมันในหมู่สมาชิกอื่น ๆ"
 federations2.54.desc.said_no:0 "การ ต่อ ต้าน ของ เรา ต่อ ผู้ มี อํานาจ[From.GetAdj]วางแผนปฏิบัติการร่วมกันใน[Root.Federation.GetName]เกิดผลไม้ เข้าร่วมในแผนสําหรับภารกิจที่จะแพร่กระจาย[From.GetAdj]การ โฆษณา ชวน เชื่อ ท่ามกลาง รัฐ สมาชิก ทุก พรรค ต่าง ๆ ปฏิเสธ ข้อ เสนอ ต่าง ๆ."
 federations2.54.A.yes:0 "น่าละอาย"
 federations2.54.A.no:0 "บางทีมันอาจจะถึงเวลาแล้ว ที่จะเปลี่ยนแปลงสิ่งต่างๆ ในพันธมิตรนี้"
 federations2.55.name:0 "การปฏิบัติการร่วมของคอมไพล์"
 federations2.55.desc:0 "ความ ริเริ่ม ของ เรา ที่ จะ จัด การ ฉลอง ร่วม กัน ใน เรื่อง ความ เข้ม แข็ง และ เอกภาพ ของ ผู้ คน[Root.Federation.GetName]ได้ รับ การ ยอม รับ จาก สมาชิก ส่วน ใหญ่. เราจะเริ่มต้นการทํางานในการดําเนินการแผนของเรา ที่จะแพร่กระจายความสามัคคีภายในพันธมิตรทันที!"
 federations2.55.A:0 "เพื่อความแข็งแกร่งและความสามัคคี"
 hegemon_join_operation_happens_tooltip:0 "สมาชิกทุกคนได้โครงการพิเศษ เพื่อสร้างอนุสาวรีย์บน§H[federation_leader.Capital.GetName]§!.\nเดอะ§H[federation_leader.GetName]§!ได้รับโครงการพิเศษที่จะแพร่กระจาย§H[federation_leader.GetHegemonyEthos]§!ถึง 2 รัฐสมาชิก"
 federations2.56.name:0 "$federations2.55.name$"
 federations2.56.desc.said_yes:0 "เดอะ[From.GetAdj]ริเริ่มจัดงานฉลองร่วมกันของความแข็งแกร่งและความสามัคคีของ[Root.Federation.GetName]ได้ รับ การ ยอม รับ จาก สมาชิก ส่วน ใหญ่. เรา จะ เริ่ม งาน เพื่อ ทํา ให้ แผนการ นี้ เป็น จริง ใน ทันที!"
 federations2.56.desc.said_no:0 "แม้ ว่า เรา เผชิญ การ ต่อ ต้าน แต่ ก็ อด ทน[From.GetAdj]วางแผนปฏิบัติการร่วมกันใน[Root.Federation.GetName]ได้ รับ การ ยอม รับ จาก สมาชิก ส่วน ใหญ่. โชคดีที่ไม่มีอะไร[From.GetName]สามารถบังคับให้เรามีส่วนร่วมในแผน"
 federations2.56.desc.invalid:0 "เพื่อเป็นเกียรติแก่ผู้นําที่เข้มแข็ง[From.GetName]ใน[Root.Federation.GetName].[From.GetSpeciesNamePlural]มีความเห็นชอบอย่างแน่นหนาในหมู่สมาชิก เพื่อการเฉลิมฉลองร่วมกันของพันธมิตรของเรา สมาชิก รัฐ ตก ลง จะ อุทิศ ทรัพยากร แก่ อนุสาวรีย์ อัน ยิ่ง ใหญ่ ใน ท้องฟ้า เบื้อง บน[From.Capital.GetName]ระหว่างนั้น[From.GetAdj]ตัว แทน จะ ไป เยือน นคร หลวง ต่าง ๆ เพื่อ ช่วย การ รวม รัฐ สมาชิก เข้า เป็น พันธมิตร.\n\nที่อยู่ห่างไกลของเรา เข้าถึงไม่ได้[From.Capital.GetName]พวกเราไม่สามารถเข้าร่วมแผนการนี้ได้"
 federations2.56.A:0 "$federations2.55.A$"
 federations2.56.B.no:0 "$federations2.54.A.no$"
 hegemony_joint_project_chain_title:0 "การ ฉลองเอกภาพและ ผู้ นํา องค์ ยิ่ง ใหญ่"
 hegemony_joint_project_chain_desc:0 "มีการดําเนินงานร่วมกันระหว่างสมาชิก[Root.Federation.GetName]เพื่อฉลองความเป็นผู้นําอันแข็งแรง และผลักดันให้มีความสามัคคีมากขึ้น"
 hegemony_joint_project_leader:0 "การปรับค่าวัฒนธรรมบน[This.GetName]"
 hegemony_joint_project_leader_DESC:0 "เป็นส่วนหนึ่งของการดําเนินการร่วมกันในปัจจุบัน เพื่อเฉลิมฉลองผู้นําที่แข็งแกร่งและ เอกภาพทางชีววิทยาของ[Root.Owner.Federation.GetName]ผู้แทนจะถูกส่งไปยังเมืองหลวงของสมาชิก 2 คน เพื่อดูแลความใกล้ชิดของพวกเขา\n\nเมื่อรัฐสมาชิกทั้งสองได้รับเลือกแล้ว โครงการปรับเปลี่ยนวัฒนธรรมจะถือว่าสมบูรณ์"
 hegemony_joint_project_member:0 "อนุสาวรีย์ สําหรับ ผู้ นํา ที่ เข้ม แข็ง"
 hegemony_joint_project_member_DESC:1 "เป็นส่วนหนึ่งของการดําเนินการร่วมกันในปัจจุบัน เพื่อเฉลิมฉลองความสามัคคีและความแข็งแรงของ[Root.Owner.Federation.GetName]เราได้ตกลงที่จะส่งทรัพยากรไปยัง[This.GetName]สําหรับการสร้างอนุสาวรีย์อันยิ่งใหญ่ของเรา[This.Owner.GetAdj]ผู้นํา\n\nเราจะต้องบริจาค 10%£minerals£แร่ที่ผลิตออกมาเป็นเวลาหนึ่งปีสําหรับโครงการนี้"
 federations2.57.name:0 "การ มอบ หมาย ให้ ทํา งาน[FromFrom.GetName]"
 federations2.57.desc:0 "ตัวแทนของเราที่จะแพร่กระจาย[Root.GetHegemonyEthos]ในอุดมคติ[FromFrom.Owner.GetName]ได้จัดตั้งตัวเองบน[FromFrom.GetName]ด้วย โชค ดี ความ พยายาม ของ พวก เขา จะ เกิด ผล และ เพิ่ม ความ ปรองดอง ภาย ใน[Root.Federation.GetName]."
 federations2.58.name:0 "[From.Owner.GetAdj]การ มอบ หมาย ให้ ทํา งาน[FromFrom.GetName]"
 federations2.58.desc:0 "เป็นส่วนหนึ่งของปฏิบัติการร่วมกัน[From.Owner.GetAdj] [From.Owner.GetGovernmentName]ได้ส่งตัวแทนไปยัง[FromFrom.GetName]เพื่อการเผยแพร่[From.Owner.GetHegemonyEthos]ในอุดมคติ[Root.GetName]แม้พวกเขาอ้างว่าจะส่งเสริมความสามัคคีและความเป็นมิตรภายใน[Root.Federation.GetName]หลายคนที่กังวล ว่าค่าของเราถูกประนีประนอม จากสมาชิกของเราในพันธมิตร"
 federations2.58.desc.good:0 "เป็นส่วนหนึ่งของปฏิบัติการร่วมกัน[From.Owner.GetAdj] [From.Owner.GetGovernmentName]ได้ส่งตัวแทนไปยัง[FromFrom.GetName]เพื่อการเผยแพร่[From.Owner.GetHegemonyEthos]ในอุดมคติ[Root.GetName]. โชคดีที่ค่าของพวกเขาจัดเป็นดีของเราให้ยืมความเชื่อถือของพวกเขา[Root.Federation.GetName]."
 federations2.58.A.good:0 "แน่นอน ว่า สิ่ง ดี ๆ ย่อม เกิด ขึ้น ได้."
 federations2.58.A.neutral:0 "มาดูกันว่าจะเกิดอะไรขึ้น..."
 federations2.59.name:0 "การ ทํา งาน ใน อนุสาวรีย์ ครบ ถ้วน"
 federations2.59.desc:0 "เราได้เสร็จสิ้นงานของเราในอนุสาวรีย์มากกว่า[FromFrom.GetName]ฉลองความสามัคคีของ[Root.Federation.GetName]และผู้นําที่เจิดจรัสเสนอ[FromFrom.Owner.GetName]พวกเขาขอขอบคุณเราสําหรับ ข้อเสนอของเราแม้ว่าพวกเขาจะรอคอย การบริจาคของพันธมิตรของเราก่อนที่อนุสาวรีย์จะถูกเปิดอย่างเป็นทางการ"
 federations2.59.A.tooltip:0 "เมื่อสมาชิกทั้งหมดได้เสร็จสิ้นการบริจาคของพวกเขา สหพันธ์จะได้รับเพิ่มประสบการณ์"
 opinion_hegemony_joint_action_completed:0 "การ บริจาค เพื่อ อนุสาวรีย์ สหพันธรัฐ"
 federations2.60.name:0 "อนุสาวรีย์มากกว่า[FromFrom.GetName]เสร็จสมบูรณ์"
 hegemony_federation_monument_complete_success:0 "การ ฉลอง นี้ ได้ เปิด เผย ให้ เห็น ความ เพ้อ ฝัน มาก มาย การ ฉลอง ที่ เร้า ใจ ทั่ว โลก สมาชิก ทุก คน ขณะ ที่ ความ สง่า งาม ของ สิ่ง ทรง สร้าง ของ เรา ปรากฏ ชัด ขึ้น. สมาชิก แต่ ละ คน แข่งขัน กับ คน อื่น ๆ ทั้ง หมด เพื่อ ทํา ให้ พวก เขา มี ส่วน ร่วม ใน การ บริจาค โดย ไม่ มี ใคร เฉื่อย ชา. งาน เดิม ที่ อุทิศ ให้[FromFrom.Owner.GetAdj] [FromFrom.Owner.GetRulerTitle]- ตอนนี้ยืนเป็นหลักฐานที่ทุกคนจะได้เห็น ความแข็งแกร่งและความสามัคคีของเรา"
 hegemony_federation_monument_partial_success:0 "มี การ เปิด เผย ถึง ความ เพ้อ ฝัน มาก มาย การ ฉลอง ที่ เร้า ใจ ทั่ว โลก สมาชิก ขณะ ที่ ความ งดงาม ของ สิ่ง ทรง สร้าง ของ เรา ปรากฏ ชัด ขึ้น. เกือบทุกรัฐสมาชิกต่างให้การสนับสนุนที่สําคัญ ทําให้งานเป็นตัวอย่างที่ดี ของความแข็งแกร่งและการรวมกันของเรา"
 federations2.60.desc.complete_success:0 "เราได้เสร็จสิ้นงานของเราในอนุสาวรีย์มากกว่า[FromFrom.GetName]เพื่อเฉลิมฉลองความสามัคคีของ[Root.Federation.GetName]และผู้นําที่น่าเกลียดและสดใส เสนอโดย[FromFrom.Owner.GetName]. $hegemony_federation_monument_complete_success$"
 federations2.60.desc.partial_success:0 "เราได้เสร็จสิ้นงานของเราในอนุสาวรีย์มากกว่า[FromFrom.GetName]เพื่อเฉลิมฉลองความสามัคคีของ[Root.Federation.GetName]และผู้นําที่เจิดจรัสเสนอ[FromFrom.Owner.GetName]. $hegemony_federation_monument_partial_success$"
 federations2.60.desc.partial_failure:0 "เราได้เสร็จสิ้นงานของเราในอนุสาวรีย์มากกว่า[FromFrom.GetName]เพื่อเฉลิมฉลองความสามัคคีของ[Root.Federation.GetName]และผู้นําที่เจิดจรัสเสนอ[FromFrom.Owner.GetName]อย่าง ไร ก็ ตาม ดู เหมือน ว่า พันธมิตร ของ เรา ไม่ สนับสนุน การ ริเริ่ม อย่าง เด็ด ขาด เช่น เดียว กับ เรา และ สมาชิก ที่ ได้ รับ การ บํารุง เลี้ยง ส่วน ใหญ่ ก็ ไม่ ได้ มี ส่วน มาก เกิน กว่า คํา พูด ไร้ สาระ. อนุสาวรีย์ผลที่ออกมาจึงค่อนข้างขาดความเคารพ - ความอับอายมากกว่าสัญลักษณ์ของกลุ่มพันธมิตรของเรา"
 federations2.60.A.oh_well:0 "อย่างน้อยเราก็มีส่วนของเรา"
 federations2.61.name:0 "$federations2.60.name$"
 federations2.61.desc.complete_success:0 "งานเสร็จบนอนุสาวรีย์มากกว่า[FromFrom.GetName]เพื่อเฉลิมฉลองความสามัคคีของ[Root.Federation.GetName]และผู้นําที่น่าเกลียดและสดใส เสนอโดย[FromFrom.Owner.GetName]. $hegemony_federation_monument_complete_success$"
 federations2.61.desc.partial_success:0 "งานเสร็จบนอนุสาวรีย์มากกว่า[FromFrom.GetName]เพื่อเฉลิมฉลองความสามัคคีของ[Root.Federation.GetName]และผู้นําที่เจิดจรัสเสนอ[FromFrom.Owner.GetName]. $hegemony_federation_monument_partial_success$"
 federations2.61.desc.partial_failure.but_I_did_it:0 "งานเสร็จบนอนุสาวรีย์มากกว่า[FromFrom.GetName]เพื่อเฉลิมฉลองความสามัคคีของ[Root.Federation.GetName]และผู้นําที่เจิดจรัสเสนอ[FromFrom.Owner.GetName]อย่าง ไร ก็ ตาม ดู เหมือน ว่า พันธมิตร ของ เรา ไม่ สนับสนุน การ ริเริ่ม อย่าง เด็ด ขาด เช่น เดียว กับ เรา และ สมาชิก ที่ ได้ รับ การ บํารุง เลี้ยง ส่วน ใหญ่ ก็ ไม่ ได้ มี ส่วน มาก เกิน กว่า คํา พูด ไร้ สาระ. อนุสาวรีย์ผลที่ออกมาจึงค่อนข้างขาดความเคารพ - ความอับอายมากกว่าสัญลักษณ์ของกลุ่มพันธมิตรของเรา"
 federations2.61.desc.partial_failure.haha_no:0 "พันธมิตรของเราได้เสร็จสิ้นการทํางานของพวกเขาบนอนุสาวรีย์มากกว่า[FromFrom.GetName]เพื่อฉลอง\"อนิจจัง\" ของ[Root.Federation.GetName]และ \"ผู้นําที่สดใส\" เสนอโดย[FromFrom.Owner.GetName]ดู เหมือน ว่า ความ ผูก พัน กับ การ ริเริ่ม นั้น ไม่ เข้ม แข็ง เท่า กับ[FromFrom.Owner.GetSpeciesNamePlural]อย่าง ไร ก็ ตาม หวัง ว่า สมาชิก ที่ ได้ รับ การ บํารุง เลี้ยง ส่วน ใหญ่ จะ ไม่ มี ส่วน มาก เกิน กว่า คํา พูด ที่ ไร้ สาระ. อนุสาวรีย์ผลที่ออกมาจึงค่อนข้างขาดความเคารพ - ความอับอายมากกว่าสัญลักษณ์ของกลุ่มพันธมิตรของเรา"
 federations2.61.desc.complete_failure:0 "ผังสําหรับอนุสาวรีย์มากกว่า[FromFrom.GetName]เพื่อฉลอง\"อนิจจัง\" ของ[Root.Federation.GetName]และ \"ผู้นําที่สดใส\" เสนอโดย[FromFrom.Owner.GetName]วันนี้ยกเลิกอย่างเป็นทางการแล้ว$hegemony_federation_monument_complete_failure$"
 hegemony_federation_monument_complete_failure:0 "ไม่ มี สัก คน ใน กลุ่ม พันธมิตร ได้ ทํา สิ่ง ใด นอก จาก ใช้ คํา พูด ที่ ไม่ เป็น ไป ตาม ความ คิด ริเริ่ม หมาย ความ ว่า อนุสาวรีย์ นั้น จะ ตก เป็น เพียง แผนการ อีก แบบ หนึ่ง ที่ ไม่ เป็น ไป ตาม หลัก พระ คัมภีร์ — แนว ความ คิด ที่ ล้ม เหลว เกี่ยว กับ การ แบ่ง แยก ของ เรา มาก กว่า ความ รู้สึก หรือ ความ เข้ม แข็ง ทั่ว ไป."
