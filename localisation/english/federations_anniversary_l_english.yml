 edict_forge_subsidies:0 "สนับสนุนการหลอมโลหะ"
 edict_forge_subsidies_desc:0 "จักรวรรดิ ของ เรา กระหาย อัลลอย ที่ พิเศษ กว่า และ โลหะ ล้ํา ค่า. พระ ราช กฤษฎีกา นี้ ทํา ให้ เรา มี ทรัพยากร เพิ่ม ขึ้น เพื่อ จะ ผลิต ได้ มาก ขึ้น."
