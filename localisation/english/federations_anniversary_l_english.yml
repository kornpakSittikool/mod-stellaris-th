 cannot_protect_asylum_desc:0 "การ ที่ เรา อยู่ ท่ามกลาง คน รุ่น เดียว กัน ทํา ให้ มัว หมอง เนื่อง จาก เรา ไม่ ได้ ปก ป้อง คน เหล่า นั้น ที่ เรา เสนอ ที่ หลบ ภัย ทาง การ เมือง."
