 resolution_galactic_market_ban_sentient_organic_slave_trade:0 "ห้ามการค้าทาสที่มีชีวิต"
 resolution_galactic_market_ban_sentient_organic_slave_trade_desc:0 "การใช้ตลาดกาแล็กติกเพื่อค้าขายสิ่งมีชีวิตเป็นสิ่งที่น่ารังเกียจ เราควรห้ามการกระทำนี้"
 resolution_galactic_market_ban_sentient_organic_slave_trade_effect_success:0 "สิ่งมีชีวิตที่มีความรู้สึกไม่สามารถขายในตลาดค้าทาสได้อีกต่อไป"
 resolution_galactic_market_repeal_sentient_organic_slave_trade:0 "ให้ค้าทาสที่มีชีวิตได้"
 resolution_galactic_market_repeal_sentient_organic_slave_trade_desc:0 "ตัวชี้วัดทางเศรษฐกิจพิสูจน์ว่า ข้อจํากัดก่อนหน้านี้ของเรา เกี่ยวกับการค้าทาสอินทรีย์นั้น เห็นได้อย่างชัดเจนในความผิดพลาด เราควรยกเลิกคําสั่งห้าม และปล่อยให้ตลาดเสรีใช้เวทย์มนต์ของมัน"
 resolution_galactic_market_repeal_sentient_organic_slave_trade_effect_success:0 "สิ่งมีชีวิตที่มีความรู้สึกสามารถขายในตลาดค้าทาสได้อีกครั้ง"

 resolution_galactic_market_ban_sentient_slave_trade:0 "ห้ามการค้าทาสที่มีความรู้สึก"
 resolution_galactic_market_ban_sentient_slave_trade_desc:0 "น่า เสียดาย ที่ มติ ก่อน หน้า นี้ ของ เรา ทิ้ง ช่อง โหว่ ไว้ สําหรับ การ ขาย สิ่ง มี ชีวิต ที่ มี ระบบ กลไก. เราควรแก้ไขความผิดพลาดนี้ และห้ามการค้าของผู้แทนราษฎรทั้งหมดในตลาดกาแล็กติก"
 resolution_galactic_market_ban_sentient_slave_trade_effect_success:0 "สิ่ง มี ชีวิต ชนิด ใด ก็ ตาม ที่ มี คุณค่า จะ ขาย ไม่ ได้ อีก ต่อ ไป ใน ตลาด ทาส."
 resolution_galactic_market_allow_sentient_slave_trade:0 "ให้ค้าทาสที่ที่เป็นจักรกลที่มีความรู้สึกได้"
 resolution_galactic_market_allow_sentient_slave_trade_desc:0 "พระ ผู้ สร้าง ควร มี สิทธิ ที่ จะ ทํา สิ่ง ที่ ตน ต้องการ ด้วย ทรัพย์ สิน ของ ตน. นี่ รวม ถึง วัตถุ ที่ เลียน แบบ การ เดิน ทาง. เราควรยกเลิกการสั่งห้ามที่ผิดๆ ในการขายเครื่องจักรที่เรียกกันว่า \"ผู้ส่ง\""
 resolution_galactic_market_allow_sentient_slave_trade_effect_success:0 "สิ่ง มี ชีวิต ที่ มี ความ สามารถ ทาง กลไก สามารถ ขาย ได้ อีก ครั้ง หนึ่ง ใน ตลาด ทาส."

 resolution_galactic_market_relocate:0 "ย้ายตลาดกาแล็กติก"
 resolution_galactic_market_relocate_desc:0 "เราสงสัยว่าตลาดกาแล็กติก จะให้บริการที่ดีที่สุด โดยผู้นําในปัจจุบัน เราควรเริ่มการแข่งขันใหม่ เพื่อตัดสินว่าใครจะเป็นผู้นํา"
 resolution_galactic_market_relocate_effect_success:0 "เริ่มต้นการแข่งขันการเป็นผู้นำตลาดกาแล็กติกอีกครั้ง"
 resolution_galactic_market_relocate_trigger_fail:0 "ย้ายตลาดกาแล็กติกเร็วเกินไป"

 resolution_category_divinity:0 "ความศักดิ์สิทธิ์แห่งชีวิต"

 resolution_divinity_comfort_the_fallen:0 "ปลอบโยนผู้ที่ล้มลง"
 resolution_divinity_comfort_the_fallen_desc:0 "แม้จะมีผู้ที่ด้อยกว่าพวกเราแต่เขายังคงเป็นหนึ่งของพวกเราและเราควรมาช่วยกันช่วยเหลือพวกเขาในยามจำเป็น"
 resolution_divinity_comfort_the_fallen_effect:0 "โทษ(ผลเสีย)ของการที่ไม่มีความสุขจากคนตกงานลดลง §G10%§!"

 resolution_divinity_tithe_on_the_soulless:0 "เก็บภาษีหนึ่งในสิบจากพวกไร้วิญญาณ"
 resolution_divinity_tithe_on_the_soulless_desc:0 "เราสามารถทนต่อการดํารงอยู่ ของเครื่องจักรที่ไร้วิญญาณ ถ้าสิ่งที่ดีบางอย่าง สามารถมาจากการทําเช่นนั้น เรา ควร เก็บ ภาษี ผล ผลิต ของ พวก เขา และ ใช้ ผล ผลิต ที่ ได้ มา เพื่อ ความ ชอบ ธรรม มาก ขึ้น."

 resolution_divinity_right_to_work:0 "สิทธิในการทำงาน"
 resolution_divinity_right_to_work_desc:0 "การสร้างสิ่งปลูกสร้างไม่ควรมีความสําคัญ มากกว่าการดําเนินชีวิตของคนจริง"
 resolution_divinity_right_to_work_effect:0 "ประชากรสิ่งมีชีวิตที่ว่างงานจะได้รับความสำคัญสำหรับงานมากกว่าประชากรหุ่นยนต์"

 resolution_divinity_silence_the_soulless:0 "ปิดปากพวกไร้วิญญาณ"
 resolution_divinity_silence_the_soulless_desc:0 "เราสามารถยกเลิกการระราน ของปัญญาจําลองได้อย่างอิสระ พวกเขาก็ไม่ได้มีความรู้สึกอยู่แล้ว"
 resolution_divinity_silence_the_soulless_effect:0 "จักรวรรดิเครื่องจักรและจักรวรรดิที่ผ่านวิวัฒนาการสังเคราะห์จะมี £diplo_weight£ §Y$diplomatic_weight$§! ลดลง §R-25%§!\n\nโครงการพิเศษ §Y$SYNTHETIC_EVOLUTION_PROJECT$§! ถูก §Rแบน§!"

 resolution_divinity_a_defined_purpose:0 "วัตถุประสงค์ที่กำหนด"
 resolution_divinity_a_defined_purpose_desc:0 "เครื่องจักรเป็นเครื่องมือ และต้องให้บริการที่ดีกว่า เรา ควร ปฏิบัติ ตาม กฎหมาย เพื่อ ทํา ให้ แน่ ใจ ว่า ค่า ไถ่ ฝ่าย วิญญาณ อยู่ ตลอด ไป ใน การ เป็น ทาส ผู้ มี อํานาจ สูง กว่า ที่ ได้ รับ การ ยก เว้น."
