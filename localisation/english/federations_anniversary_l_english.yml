 federations2.100.name:0 "สหพันธ์กองยาน"
 federations2.100.desc:0 "เดอะ[Root.Federation.GetName]แต่ กอง เรือ ต่าง ๆ ถูก แบ่ง และ ดําเนิน งาน ภาย ใต้ การ จัด ระเบียบ ที่ แตก แยก. เมื่อเร็ว ๆ นี้ ผู้เชี่ยวชาญทางทหารที่มีอิทธิพลหลายท่าน จากฝั่งตรงข้าม ได้ก่อให้เกิดความกังวลเกี่ยวกับความสามารถของเรา\n\nเพื่อแก้ไขเรื่องนี้ พวกเขาได้วาดแผนที่สําหรับชุดของการฝึกทางทหารทั้ง เพื่อสร้างความผูกพันธ์ภายในทหารของเรา ภายใต้แผนของพวกเขา การแยกตัวออกจากแต่ละกองเรือของเรา จะย้ายไปสถานที่เฉพาะในดินแดนของพันธมิตรของเรา ประสบความสําเร็จในการฝึกเหล่านี้ จะเป็นข้อผูกมัดที่สําคัญสําหรับกองกําลังติดอาวุธของเรา แต่จะเพิ่มความพร้อมทางทหารของเราอย่างพอใจ"
 federations2.100.A.tooltip:0 "สมาชิกสภาผู้แทนราษฎรทุกคน จะเข้าร่วมในการฝึกนี้\n\nหากข้อเสนอถูกปฏิเสธอย่างกว้างขวาง สหพันธ์§Hความแหลม:§!จะลดลงและ[Root.GetName]จะแพ้§Hอิทธิพล§!."
 federations2.100.A:0 "$federations2.50.A$"
 federations2.100.B:0 "กองยานของเราพร้อมแล้ว สําหรับทุกสถานการณ์"
 federations2.101.name:0 "$federations2.100.name$"
 federations2.101.desc:0 "สวัสดี ท่านขุนนาง[Root.GetSpeciesNamePluralCompliment]ร่วมกันเราได้สร้างพลังที่มีประสิทธิภาพ คุ้มค่าที่จะแจ้งให้ทราบบนเวทีกาแล็กซี่ อย่างไรก็ตาม เรากังวล ว่านี่อาจจะไม่เพียงพอ ที่ภัยคุกคามที่มีประสิทธิภาพและมีประสิทธิภาพเกิดขึ้น ผู้เชี่ยวชาญของเราได้วาดแผนสําหรับชุดของการฝึกการบํารุงเลี้ยงร่วมกัน เพื่อสร้างการร่วมมือกันภายในทหารของเราและรักษาทักษะของลูกเรือของเรา : เราตั้งใจที่จะแยกออกจากแต่ละกองเรือของเรา\n\nเรามั่นใจว่าแบบฝึกหัดนี้ จะเพิ่มความพร้อมทางทหารของเรา คุณจะเข้าร่วมลงทุนนี้หรือไม่"
 federations2.101.A:0 "$federations2.51.A$"
 military_joint_exercise_potential_tooltip:0 "การฝึกร่วมกันเหล่านี้ จะเพิ่มประสิทธิภาพของกองเรือของเรา และเพิ่มประสบการณ์การบํารุงเลี้ยง"
