 envoy_events.11.name:0 "[From.GetAdj]ภารกิจ พิเศษ"
 envoy_events.11.desc:0 "ดูเหมือนว่า[From.GetName]เรา ไม่ พอ ใจ ที่ เรา ส่ง ทูต ที่ ทรยศ ออก ไป[event_envoy.GetName]เขา จึง เอา เรื่อง นั้น มา ใส่ มือ เขา ผู้หลบหนีถูกขโมยจากใต้จมูกของเรา ที่เสียชีวิตของคืน โดยสิ่งที่ปรากฏได้รับ\n\nความไร้ความสามารถในการปกป้องผู้ที่ขอความช่วยเหลือของเรา ได้ก่อให้เกิดความกังวลอย่างมากในหมู่พันธมิตรของเรา"
 envoy_events.11.A:0 "พวกเขากล้าดียังไง!"
 envoy_events.12.name:0 "ปฏิบัติ การ พิเศษ"
 envoy_events.12.desc:0 "ทีมที่เราส่งไป เพื่อเอาตัวทูตของเรา[event_envoy.GetName]เสร็จสิ้นภารกิจแล้ว อาชญากรตอนนี้อยู่ในการควบคุมของเรา และเผชิญหน้ากับการลงโทษอย่างหนัก[event_envoy.GetHerHis]บาป"
 envoy_events.13.name:0 "[From.GetAdj]ภารกิจ พิเศษ"
 envoy_events.13.desc:0 "ดูเหมือนว่า[From.GetName]เรา ไม่ พอ ใจ ที่ เรา ส่ง ทูต ที่ ทรยศ ออก ไป[event_envoy.GetName]และให้พวกเขามีทรัพย์สมบัติและสิ่งที่พวกเขาบริจาคไป อย่างไรก็ตาม ภารกิจนี้ถูกรื้อถอน ในขณะที่เราสกัดกั้น[From.GetAdj]เรือบรรทุกคนพิเศษของพวกเขา ในขณะที่มันพยายามที่จะข้ามพรมแดน มี การ ใช้ มาตรการ เพื่อ ให้ แน่ ใจ ว่า ความ พยายาม ใน อนาคต จะ ไม่ ประสบ ผล สําเร็จ ใน ทํานอง เดียว กัน."
 envoy_events.13.A:0 "แก้มของมัน..."
 envoy_events.14.name:0 "ภารกิจ พิเศษ"
 envoy_events.14.desc:0 "ทีมที่เราส่งไป เพื่อเอาตัวทูตของเรา[event_envoy.GetName]ไม่สําเร็จในภารกิจของพวกเขาเรือของพวกเขาถูกนําเข้าไปใน[From.GetAdj]การควบคุมขณะที่พวกเขาพยายามจะข้ามพรมแดน เดอะ[From.GetSpeciesNamePlural]มี การ ทํานาย ได้ ว่า จะ มี การ เผา และ เผา ศพ[Root.GetAdj]แทรกแซงกิจการของพวกเขา สําหรับส่วนของพวกเขา พลเมืองของเราจะผิดหวัง ในการจัดการของเราของความสัมพันธ์ และความล้มเหลวของเราในการเอาคนร้ายกลับมา"

 opinion_extradited_envoy:0 "ซองลอยแบบพิเศษ"
