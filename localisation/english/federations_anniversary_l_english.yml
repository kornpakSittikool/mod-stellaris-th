 galactic_community_diplo_corps_is_a_joke:0 "คณะทูตถูกเยาะเย้ย"
 galactic_community_diplo_corps_is_a_joke_desc:0 "หนึ่งในทูตของเราได้ร่วมกันทํา pas faux สําคัญ ทําให้การทูตของเราป๊อปอัปหุ้นหัวเราะของกาแลคซี"
 envoy_events.4.name:0 "แอ ส เต รต แกล ติก ดี พลี โต มา"
 envoy_events.4.desc.base:0 "แม้ ว่า เรา ไม่ สามารถ นับ ตัว เรา เอง อยู่ ใน บรรดา อภิ มหาอํานาจ อัน แท้ จริง ของ กาแล็กซี นี้ แต่ บ่อย ครั้ง เรา สามารถ เอา ชนะ ความ หนัก แน่น ของ เรา ใน เรื่อง การ ทรง ตัว. ส่วน ใหญ่ แล้ว สิ่ง นี้ อยู่ ที่ การ งาน ของ ผู้ ส่ง ข่าว ของ เรา[event_envoy.GetName]คนที่เป็นตัวแทนความสนใจของเรา ในชุมชนกาแล็กติก และออกคําสั่งอย่างลึกซึ้ง[Root.GetName]ย่อมาจาก"
 envoy_events.4.desc:0 "$envoy_events.4.desc.base$ผล ก็ คือ ถึง แม้ ไม่ ใช่ ทุก คน อาจ กลัว ความ อาจ ของ กอง เรือ หรือ ความ ยาว ของ เรา ที่ จะ เทียบ กับ ความ ลึก ของ หีบ ห่อ แต่ พวก เขา ก็ ชื่นชม ใน ความ สามารถ ของ กอง กําลัง ทาง การ ทูต ของ เรา."
 envoy_events.4.desc.hive:0 "$envoy_events.4.desc.base$ผล ก็ คือ ถึง แม้ ไม่ ใช่ ทุก คน อาจ กลัว อํานาจ ของ กอง เรือ หรือ ความ ยาว ของ เรา ใน การ เทียบ กับ ทรัพยากร ทาง วัตถุ ของ เรา แต่ พวก เขา ก็ ชื่นชม ใน ความ สามารถ ของ กิจวัตร ทาง การ ทูต ของ เรา."
 envoy_events.4.desc.machine:0 "$envoy_events.4.desc.base$ผล ก็ คือ ถึง แม้ ไม่ ใช่ ทุก คน อาจ กลัว อํานาจ ของ กอง เรือ หรือ ความ ยาว ของ เรา ที่ จะ เทียบ กับ ทรัพยากร ด้าน วัตถุ ของ เรา แต่ พวก เขา ก็ ชื่นชม ใน ความ สามารถ ของ ระบบ คิด ทาง การ ทูต ของ เรา."
 galactic_community_diplo_corps_respected:0 "คณะทูตที่น่าเคารพนับถือ"
 galactic_community_diplo_corps_respected_desc:0 "กอง กําลัง ทาง การ ทูต ของ เรา ได้ รับ ความ นับถือ อย่าง กว้าง ขวาง ท่ามกลาง สิ่ง มี ชีวิต ที่ มี เชาวน์ ปัญญา ใน กาแล็กซี."

 envoy_events.5.name:0 "ซอง ที่ น่า โมโห ที่ สุด"
 envoy_events.5.desc:0 "เดอะ[envoy_source.GetAdj]ท่านทูต[event_envoy.GetName], ได้รับความน่าเบื่อใน[event_envoy.GetHerHis]ความพยายามที่จะแสดง[envoy_source.GetAdj]ดอกเบี้ยใน[Root.Capital.GetName]จากตรงนี้เลย[event_envoy.GetHerHis]การมาถึงครั้งแรก[event_envoy.GetSheHe] [event_envoy.GetHasHave]แสดงความเกลียดชังที่ไม่ลดละต่อ[Root.GetGovernmentName]ส่งผลให้นโยบายและการกระทําของเรา เพิ่มขึ้นอย่างต่อเนื่อง น่ารําคาญจริงๆ[event_envoy.GetHasHave] [event_envoy.GetSheHe]ว่ามีไม่กี่คนที่จะร้องไห้เพื่อดูด้านหลังของ[event_envoy.GetHerHim]และเราได้ยินเสียงกระซิบว่ากลุ่ม[Root.GetAdj]ผู้ ภักดี กําลัง วาง แผน จะ เร่ง[event_envoy.GetHerHis]ตาย\n\nการปล่อยให้แผนการนี้สําเร็จ ย่อมเป็นเรื่องสะดวก แต่การปล่อยให้อธิปไตยต่างแดน ถูกลอบสังหารในดินแดนของเรา"
 envoy_events.5.A:0 "ม. ตัดพล็อตออกไป!"
 envoy_events.5.B:0 "ให้พวกเรากําจัดผู้ส่งสารที่มีปัญหานี้"
 envoy_events.6.name:0 "ฆาตกรรมบน[From.Capital.GetName]!"
 envoy_events.6.desc:0 "[event_envoy.GetName]- ทูตที่เราส่งไปสื่อความความไม่ ลงรอยกันของเรากับ[From.GetName]- ถูกฆาตกรรม![event_envoy.GetSheHeCap]หายไปอย่างไร้ร่องรอย เมื่อหลายวันก่อน หายไป[event_envoy.GetHerHis]ตรงกับ[Root.GetRulerTitle]สภา. หลังจากค้นหามาหลายวัน[event_envoy.GetHerHis]ซากศพถูกพบในตู้เก็บของ ซึ่งถูกกําหนดให้เผาทิ้ง\n\nเดอะ[From.GetAdj]ผู้ มี อํานาจ ต่าง กัน อย่าง แปลก ๆ เมื่อ ถูก ขอ ให้ ตรวจ สอบ ทํา ให้ สงสัย ว่า พวก เขา อยู่ เบื้อง หลัง การ ฆ่า คน โดย เฉพาะ ตั้ง แต่ นั้น มา[event_envoy.GetName]ได้รับวิกฤตสูงของ[From.GetGovernmentName]เมื่อไม่นานมานี้"
 envoy_events.6.A:0 "พวกเขาต้องชดใช้"
 kills_envoys:0 "ทูตไม่ปรากฏตัว"
 kills_envoys_desc:0 "ด้วยเหตุผลบางอย่าง อุปทานของทูตต่างชาติ ที่จะพบกับการตายเหนียวบนเมืองหลวงของเรา"
 faction_modifier_protected_interests:0 "ปก ป้อง ความ สนใจ ของ เรา"
 opinion_kills_envoys:0 "การลอบสังหารจดหมายเหตุ"

 envoy_events.7.name:0 "Star-Crossed Lovers"
 envoy_events.7.desc:1 "ดูเหมือนว่า แทนที่จะแสดง[event_envoy.GetHerHis]งานและตัวแทน[Root.GetAdj]ผลประโยชน์ ฑูตของเรา[event_envoy.GetName]ได้หลงเสน่ห์ของ[other_species_nation.GetAdj]นักการทูต เนื่อง จาก กลัว ผล ของ การ ล่วง ละเมิด นี้ ทั้ง สอง จึง หลบ หนี ไป ยัง คน ทั้ง สอง[third_party.GetName]ดินแดนที่มีรัฐธรรมนูญเสรีนิยมอันตราย อนุญาตให้สหภาพดังกล่าว\n\nในการทําสิ่งนี้[event_envoy.GetName]ถูกปฏิเสธแล้ว[event_envoy.GetHerHis]ตําแหน่งเป็นทูตของเรา อย่างไรก็ตาม การสูญเสียการควบคุมเจ้าพนักงานของเรา ทําให้ตําแหน่งของเราเสียหาย เราต้องกู้ชื่อเสียงเราคืนมา ด้วยการจับกุมผู้ที่ไม่ถูกต้อง"
 envoy_events.7.A:0 "เดอะ[third_party.GetSpeciesNamePlural]เขาเป็นหนี้เรา"
 envoy_events.7.B:0 "เข้าหาพวกเขาและเรียกร้องเหตุผล"
 envoy_events.7.B.tooltip:0 "ถ้า[third_party.GetName]ยอมรับ, เราเป็นหนี้เงิน 2 เหรียญ"
 envoy_events.7.D:0 "ฉะนั้นแท้จริงหลังจากความยากลําบากก็จะมีความง่าย"
 envoy_events.8.desc:0 "เอ ส เต ม[Root.GetSpeciesNamePlural]ไม่! มันทําให้เราสนใจว่า[From.GetAdj]อาชญากรได้ลี้ภัยในประเทศของคุณ ผู้ร้ายร้าย อดีตทูตของเรา[event_envoy.GetName]ทําลายพันธบัตรทั้งหมดของความภักดี - ร่วมกับกฎหมายพื้นฐานที่สุดของชาติของเรา - การอพยพกับ[other_species_nation.GetAdj].\n\nเราจะกรุณาขอให้อาชญากรกลับมาให้เราเพื่อให้[event_envoy.GetSheHe]สามารถเผชิญหน้ากับการพิจารณาคดี[event_envoy.GetHerHis]อาชญากรรม"
 envoy_events.8.A:0 "แน่นอน"
 envoy_events.8.B:0 "ไม่มีทาง![event_envoy.GetSheHeCap] [event_envoy.GetIsAre]ภายใต้การคุ้มครองของเรา"
 envoy_events.9.desc:0 "แน่นอน! เราจะกลับมา[event_envoy.GetName]กับคุณโดยทันที"
 envoy_events.9.A:0 "คุณมีคําขอบคุณของเรา"
 envoy_events.10.desc:0 "ที่หลบภัยทางการเมือง เป็นสิ่งศักดิ์สิทธิ์สําหรับเรา เราไม่อาจเผชิญหน้ากับคนที่ไม่เคยทําผิดต่อคนอย่างคุณ"
