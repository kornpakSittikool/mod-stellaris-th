 federations2.108.desc:0 "เราพร้อมแล้ว สําหรับการฝึกทางทหารร่วมกัน เราแค่ต้องการรอให้กองยานพันธมิตรของเราเคลื่อนพลเข้ามา ก่อนที่ปฏิบัติการจะเริ่ม"
