 federations2.103.desc:0 "ท่านทูตของเราพยายามชักชวนสมาชิก[Root.Federation.GetName]เพื่อเข้าร่วมแผนการฝึกทหารร่วมกัน อย่าง ไร ก็ ตาม น่า เสียดาย ที่ พวก เขา ได้ พบ กับ ความ ไม่ สนใจ อย่าง แพร่ หลาย นั้น พันธมิตร ของ เรา ชอบ วางใจ ใน พลัง ของ ตน เอง แทน ที่ จะ พยายาม ปรับ ปรุง ความ สามารถ ของ เรา ใน การ ร่วม กัน."
