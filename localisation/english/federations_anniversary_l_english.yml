 envoy_events.3.name:0 "การ มี ส่วน ร่วม ใน การ ผสม เกสร"
 envoy_events.3.desc.base:0 "[event_envoy.GetName]ตัวแทนของเราแสดงความสนใจของเราในชุมชนกาแล็กติก ได้มีความมุ่งมั่นใหญ่ขอผ่านผิด[council_country.GetAdj]ตัวแสดงสําหรับ[pathetic_country.GetSpeciesName]น่า เสียดาย ที่ ผู้ คน มาก มาย ที่ เห็น ข้อ กล่าว หา นี้ ซึ่ง อาบ น้ํา อย่าง นิ่ม นวล[event_envoy.GetName]ด้วยการเยาะเย้ย"
 envoy_events.3.desc:0 "$envoy_events.3.desc.base$หลาย คน ใน ทุก วัน นี้ หลงใหล ใน ความ สามารถ ของ หน่วย งาน ทาง การ ทูต ของ เรา แม้ ว่า การ ที่ เรา มี ส่วน ร่วม ใน การ หัวเราะ แบบ กาแล็กซี่ จะ ไม่ อาจ สงสัย ได้."
 envoy_events.3.desc.hive:0 "$envoy_events.3.desc.base$เรา ไม่ อาจ สงสัย ว่า การ ที่ เรา มี ส่วน ช่วย ใน การ หัวเราะ แบบ กามารมณ์ นั้น เป็น เรื่อง น่า สงสัย."
 envoy_events.3.desc.machine:0 "$envoy_events.3.desc.base$หลาย คน ใน ปัจจุบัน หลงใหล ใน ความ สามารถ ของ ระบบ ทาง การ ทูต ของ เรา แม้ ว่า การ ที่ เรา มี ส่วน ร่วม ใน การ หัวเราะ แบบ กาแล็กซี่ นั้น ไม่ อาจ สงสัย ได้."
 envoy_events.3.A:0 "ให้พวกเขาหัวเราะขณะที่พวกเขายังหัวเราะ"
 envoy_events.3.B:0 "ก็ช่างมันเถอะ"
