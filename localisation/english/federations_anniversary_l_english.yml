 federations2.104.desc.said_yes:0 "แม้เราจะสนับสนุน[From.GetAdj]โดย ริเริ่ม จัด การ ฝึก อบรม ทาง ทหาร ร่วม กัน ดู เหมือน ว่า แผนการ นั้น ล้ม เหลว. มีการสนับสนุนไม่เพียงพอสําหรับมันในหมู่สมาชิกอื่น ๆ"
