 federations2.71.desc:0 "ในขณะที่เราได้ออกจากการบํารุงรักษาเก่าของเราวางแผนที่จะสร้างอนุสาวรีย์มากกว่า[FromFrom.GetName]เพื่อฉลอง\"เอกภาพ\" ของพันธมิตร ไม่เกี่ยวข้องกับเราอีกต่อไป"
