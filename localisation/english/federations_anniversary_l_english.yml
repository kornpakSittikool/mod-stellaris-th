 galcom.104.name:0 "$resolution_tiyanki_pest_control$"
 galcom.104.desc:0 "ทา อัน คีได้รับการประกาศอย่างเป็นทางการว่า เป็นแมลงสาบ สมาชิก คน ใด ๆ ของ ชุมชน กา ลาทิ ติก ที่ มี ที ยัน คี อยู่ ภาย ใน พรม แดน ของ พวก เขา มี พันธะ ตาม กฎหมาย ที่ จะ ดู แล ให้ สัตว์ เหล่า นี้ ได้ รับ การ ค้ําจุน ทันที.\n\nแต่น่าเสียดายที่มีทาอานกิอยู่ภายในพื้นที่ของเรา จนกว่าพวกเขาจะถูกจัดการหรือพวกเขาออกจากพื้นที่ของข้อตกลงของตัวเองของพวกเขา,[Root.GetName]จะทรงพิจารณาในการลงโทษ§Rการ ละเมิด กฎหมาย กาแลกติก§!."
 galcom.106.name:0 "เทียนิกิอิน[Root.GetSpeciesName]พื้นที่"
 galcom.106.desc:0 "ฝักทาอานกิได้ข้ามเข้าไปในพื้นที่ของเราใน§H[tiyanki_system.GetName]§!ระบบ ดัง ที่ ติ ยัน คี ได้ รับ การ ประกาศ อย่าง เป็น ทาง การ ว่า เป็น แมลง สาบ สมาชิก ชุมชน กาแล็กซี่ ทุก คน มี พันธะ ตาม กฎหมาย ที่ จะ ทํา ให้ สิ่ง มี ชีวิต ใด ๆ ที่ มี อยู่ ภาย ใน พรม แดน ของ พวก เขา สูญ สิ้น ไป ทันที.\n\nเดอะ[Root.GetName]จะทรงพิจารณาในการลงโทษ§Rการ ละเมิด กฎหมาย กาแลกติก§!จนกว่ายานไทยานีจะออกจากพื้นที่ หรือถูกทําลาย"
 galcom.106.a:0 "นี่มันโชคร้าย..."
 galcom.106.b:0 "กฎหมายป่าเถื่อน"
 galcom.106.c:0 "การแพร่เชื้อนี้ต้องถูกจัดการ"
 galcom.107.name:0 "การ หัก ล้าง กฎหมาย ติ ยาคิ"
 galcom.107.desc:0 "เจ้าหน้าที่จากชุมชนกาแล็กติก ได้คัดค้านการฆ่าของเราของทิยันกีเมื่อเร็ว ๆ นี้ใน§H[tiyanki_kill_system.GetName]§!ระบบ แจ้งให้เราทราบว่า การกระทําของเราได้ละเมิดพระราชบัญญัติการป้องกัน ทียันิ ผลก็คือ[Root.GetName]ต้องพิจารณาใน§Rการ ละเมิด กฎหมาย กาแลกติก§!อีกสิบปีข้างหน้า\n\nทรัพยากรที่เราสกัดมาจากทิยันกีที่ตายไปแล้วได้ถูกยึดไป และเราได้รับการรับรอง"
 galcom.107.a:0 "นี่มันรุนแรงนะ!"
 galcom.109.desc:0 "เจ้าหน้าที่จากชุมชนกาแล็กซี่ได้สังเกตการปรากฏตัวของทิยันกีภายในพรมแดนของ[Root.GetName]ด้วยมติของไทยานีกี PEST การควบคุมได้รับการดําเนินการนี้ปล่อยให้เราใน§Rการ ละเมิด กฎหมาย กาแลกติก§!จนกว่าสัตว์เหล่านั้นจะถูกยกย่อง หรือออกจากพื้นที่ของข้อตกลงของตัวเอง"

 resolution_amoeba_conservation_act:0 "กฎหมายคุ้มครองอะมีบาอวกาศ"
 resolution_amoeba_conservation_act_desc:0 "แม้ จะ ดู ไม่ น่า ดู แต่ ก็ มี สิทธิ์ มาก พอ ที่ จะ ท่อง ไป ตาม กาแล็กซี ต่าง ๆ. พวก เขา ต้อง ได้ รับ การ ปฏิบัติ เสมือน เป็น รูป แบบ ชีวิต ที่ คุ้ม ค่า กับ การ ทะนุถนอม ไม่ ใช่ การ ถูก ล่า สัตว์."
