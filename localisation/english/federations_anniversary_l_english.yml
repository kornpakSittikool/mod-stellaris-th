 federations2.121.desc:0 "การ ระเบิด ของ สงคราม ได้ นํา ไป สู่ การ ยก เลิก การ ฝึก อบรม ทาง ทหาร ตาม แผน."
 training_target:0 "เป้าหมายในการฝึก"
