 federations3.2235.desc:0 "การโต้วาทีที่รุนแรงรอบ\"[GetEcumenicalCouncilDebate]\"ปล่อยให้ทุกคนหงุดหงิดและอารมณ์สูง เพื่อ ให้ ความ พอ ใจ แก่ สิ่ง ต่าง ๆ จึง มี การ ตัดสิน ว่า จักรวรรดิ ทุก แห่ง จะ เสนอ ของ ขวัญ และ สัญลักษณ์ แห่ง มิตรภาพ แก่ คน อื่น ๆ. เราควรส่งอะไรดี?"
