 federations3.2245.name:0 "สภา คริสต์ จักร: เทศกาล ฉลอง ที่ โดด เด่น"
 federations3.2245.desc:0 "หลังจากใช้เวลาทั้งวันคุยกัน\"[GetEcumenicalCouncilDebate]\"มีงานฉลองเกิดขึ้นตามธรรมเนียมของผู้แทนคนหนึ่ง ส่วน หนึ่ง ของ พิธี นี้ มี การ จัด พิธี ทาง ศาสนา ให้ แก่ ทุก คน. สําหรับ พวก เขา แล้ว นั่น เป็น การ กระทํา ที่ อ่อน โยน แต่ ผู้ แทน ของ เรา มี ปฏิกิริยา อย่าง รุนแรง ต่อ การ กระทํา นั้น และ ชั่ว ขณะ หนึ่ง ต่อ มา ห้อง นั้น ก็ ระเบิด ขึ้น ใน การ ทะเลาะ กัน ทั่ว ไป. สิ่ง ต่าง ๆ ตก ลง กัน แล้ว และ ไม่ มี รายงาน การ บาด เจ็บ ใหญ่ แต่ เรา ได้ รับ การ ถือ ว่า เป็น การ เริ่ม การ ต่อ สู้ และ คาด หมาย ว่า จะ ยื่น คํา ขอ โทษ."
 federations3.2245.a:0 "ขอโทษ"
 federations3.2245.b:0 "โทษเครื่องดื่ม!"
 federations3.2245.c:0 "ส่งทุกคนไปที่สุสาน"
 federations3.2255.name:0 "สภา ศาสนา: การ ออก หาก"
 federations3.2255.desc:0 "เมื่อ เรา ตัดสิน ใจ จะ ยึด สภา ไว้ เรา รู้ ว่า เส้น ทาง สู่ หลัก คํา สอน ที่ เป็น อัน หนึ่ง อัน เดียว กัน นั้น จะ ยาว นาน และ ยาก แต่ เรา ประเมิน ค่า ไม่ ได้ ว่า จะ นาน แค่ ไหน และ จะ ยาก แค่ ไหน. เดือน แห่ง การ โต้ เถียง ที่ ปราศจาก เชื้อ ไม่ ได้ ทํา อะไร นอก จาก เน้น ทุก สิ่ง ที่ แยก เรา จาก กัน. เราได้ตัดสินใจที่จะรอสักครู่ ก่อนที่จะพยายามอีกครั้ง"
 federations3.2260.name:0 "สภา ศาสนา: คอนคอร์ด พรีวัลส์"
 federations3.2260.desc:0 "แน่นอน เรา ได้ รับ พระ พร. สิ่งที่เรากังวลไป ได้พิสูจน์แล้วว่าผิด และทุกอย่างก็ราบรื่นดี การ พิจารณา หลัก เทววิทยา และ คํา บรรยาย ที่ มี ขึ้น โดย การ ดล ใจ ทํา ให้ เรา สามารถ ทํา ให้ คํา สอน ใหม่ ของ เรา ประสาน ลง รอย กัน. เรา จะ พิจารณา กัน ต่อ ไป ใน ภาย หลัง แต่ ตอน นี้ จะ เป็น รากฐาน ของ ความ เชื่อ ที่ เป็น เอกภาพ ซึ่ง จะ ทํา ให้ เรา ใกล้ ชิด กัน มาก ขึ้น!"
 federations3.2260.tt:1 "20 ปี§G+20%§! £unity£ เอกภาพจากงานและ§G+3§!สหพันธ์ XP เดือน"
 federations3.2265.name:0 "สภา ศาสนา: ความ สําเร็จ ใน การ รับ ใช้"
 federations3.2265.desc:0 "โดย รวม แล้ว สภา บังเกิด ผล. ไม่ ใช่ ทุก สิ่ง ดําเนิน ไป อย่าง ราบ รื่น แต่ เป็น เรื่อง ที่ คาด หมาย ได้ ว่า จะ ประสบ ความ ยุ่ง ยาก. นี่เป็นเพียงขั้นตอนแรก ในการรวมคนของเราและศรัทธาของเราเข้าด้วยกัน ถนน จะ ยาว แต่ สิ่ง ที่ คาด หมาย จาก เรา ใน ที่ สุด จะ ทํา ให้ ถนน มี ค่า."
 federations3.2265.tt:0 "เป็นเวลา 10 ปี§G+10%§! £unity£ เอกภาพจากงานและ§G+3§!สหพันธ์ XP เดือน"

