 resolution_category_space_fauna_tiyanki:1 "สัตว์อวกาศ"
 resolution_tiyanki_conservation_act:0 "กฎหมายอนุรักษ์เทียนิกิ"
 resolution_tiyanki_conservation_act_desc:0 "เทียนิกิเป็นรูปแบบเฉพาะของชีวิตในอวกาศและต้องได้รับการปกป้องจากผู้ที่จะทำอันตราย"
 resolution_tiyanki_conservation_act_tooltip:0 "อาณาจักรใดๆที่สังหาร §Yเทียนิกิ§! จะได้รับการพิจารณาเรื่อง §Rการละเมิดกฎหมายกาแล็กติก§!"
 resolution_repeal_tiyanki_conservation_act:0 "§Rยกเลิก $resolution_tiyanki_conservation_act$§!"
 resolution_repeal_tiyanki_conservation_act_desc:0 "มันไม่ใช่สําหรับชุมชนกาแล็กติกที่จะตัดสินว่าสมาชิกของมันจะรับมือกับทิยันกีอย่างไร"
 resolution_repeal_tiyanki_conservation_act_effect_success:0 "ยกเลิก §Y$resolution_tiyanki_conservation_act$§!"
 resolution_tiyanki_pest_control:0 "ควบคุมสัตว์รบกวน(Tianki)"
 resolution_tiyanki_pest_control_desc:0 "เทียนิกิที่เร่ร่อนไม่เพียงแต่สร้างความรำคาญ แต่ยังเป็นอันตรายต่อการเดินทางของยานอีกด้วย การปรากฏตัวของสิ่งมีชีวิตที่คาดเดาไม่ได้เหล่านี้ไม่สามารถยอมรับได้ในเส้นทางอวกาศที่ยุ่งมากขึ้นของกาแล็กซี"
 resolution_tiyanki_pest_control_tooltip:0 "จักรวรรดิใดที่มี §Yเทียนิกิ§! อยู่ภายในเขตแดนจะถือว่า §Rละเมิดกฎหมายกาแล็กติก§! จนกว่าสัตว์จะถูกทำลายหรืออกจากเขตแดนไปเอง"
 resolution_repeal_tiyanki_pest_control:0 "§Rยกเลิก $resolution_tiyanki_pest_control$§!"
 resolution_repeal_tiyanki_pest_control_effect_success:0 "ยกเลิกมติ §Y$resolution_tiyanki_pest_control$§!"
 resolution_repeal_tiyanki_pest_control_desc:0 "ชุมชนกาแล็กติกไม่มีที่ให้บังคับสมาชิก เพื่อทําลายทิยานีกิ"

 resolution_galacticreforms_motions_for_closure:0 "เคลื่อนไหวเพื่อให้หยุดโต้เถียง"
 resolution_galacticreforms_motions_for_closure_desc:0 "เมื่อ ประชาคม กาแลกติก เห็น พ้อง กัน เป็น ส่วน ใหญ่ ดู เหมือน ว่า เป็น เรื่อง เสีย เปล่า ที่ จะ ถก กัน ต่อ ไป ตลอด ช่วง เวลา ทั้ง หมด ของ การ ประชุม. หาก เรา บรรลุ ความ เห็น พ้อง ต้อง กัน เรา ควร ยุติ การ โต้ เถียง กัน ก่อน และ ดําเนิน ต่อ ไป ใน เรื่อง อื่น."
 resolution_galacticreforms_motions_for_closure_effect_success:0 "การประชุมวุฒิสภาจะจบเร็ว ๆ นี้ ถ้ามีความเป็นเลิศของ 75% ในการสนับสนุนหรือขัดกับมติสําหรับ 180 วันติดต่อกัน"
 resolution_galacticreforms_repeal_motions_for_closure:0 "ยกเลิก $resolution_galacticreforms_motions_for_closure$"
 resolution_galacticreforms_repeal_motions_for_closure_desc:0 "การ ตัด การ โต้ เถียง กัน อย่าง สั้น ๆ ไม่ ว่า ด้วย เหตุ ผล ใด ก็ ตาม เป็น เรื่อง น่า รังเกียจ. เสียงของเราจะต้องได้ยินเสียง!"
 resolution_galacticreforms_repeal_motions_for_closure_effect_success:0 "ยกเลิก §Y$resolution_galacticreforms_motions_for_closure$§!"

