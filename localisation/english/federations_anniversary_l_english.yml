 military_join_operation_happens_tooltip:0 "สมาชิกคนอื่น ๆ ทั้งหมดได้โครงการพิเศษที่คล้ายกัน ในสถานที่สุ่มใน[Root.Federation.GetName]อาณาเขต"
 federations2.106.name:0 "$federations2.105.name$"
 federations2.106.desc.said_yes:0 "เดอะ[From.GetAdj]ริเริ่มดําเนินการทางทหารร่วมกัน ระหว่างกองเรือของสมาชิกของรัฐ ได้ถูกอนุมัติจากสมาชิกส่วนใหญ่ เราจะเริ่มต้นการเตรียมการของพวกเขาทันที!"
 federations2.106.desc.said_no:0 "แม้เราจะคัดค้าน[From.GetAdj]วางแผนจัดกิจกรรมทางทหารร่วมกัน ระหว่างกองเรือของสมาชิกรัฐ ได้ถูกอนุมัติจากสมาชิกส่วนใหญ่ โชคดีที่ไม่มีอะไร[From.GetName]สามารถบังคับให้เรามีส่วนร่วมในแผน"
 federations2.106.A:0 "$federations2.105.A$"
 federations2.106.B.no:0 "เสียเวลาและพลังงานที่น่าเสียดาย"
 military_joint_project:0 "สหพันธรัฐกองยานการ ออก กําลัง"
 military_joint_project_DESC:0 "เดอะ[Root.Owner.Federation.GetName]มี การ ออก กําลัง ทหาร ร่วม กัน เพื่อ ปรับ ปรุง การ ร่วม มือ กัน ภาย ใน กอง กําลัง ทหาร หลาก หลาย ใน พันธมิตร อีก ทั้ง เสริม ความ ชํานาญ ของ ลูก เรือ ด้วย.\n\nการออกกําลังกายจะเริ่มทันที ที่ยานลาดตระเวนทั้งหมดประจําที่"
