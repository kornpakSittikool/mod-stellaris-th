 galactic_features.367.name:0 "ที ยัน คีระบบดาวพิมพ์สี"
 galactic_features.367.a.desc:0 "$galactic_features.367.1$\n\n$galactic_features.367.2$"
 galactic_features.367.b.desc:0 "$galactic_features.367.1$\n\n$galactic_features.367.3$"
 galactic_features.367.c.desc:0 "$galactic_features.367.1$\n\n$galactic_features.367.4$"
 galactic_features.367.1:0 "The Last of Tianki in the§H[tiyanki_system.GetName]§!ระบบถูกทําลายโดย§H[tiyanki_killer.GetName]§!ด้วย การ ค้น หา แหล่ง เพาะ พันธุ์ ใน สมัย โบราณ ชาว ติ ยัน คี จะ ไม่ สามารถ สืบ พันธุ์ ได้ อีก ต่อ ไป เป็น ครั้ง แรก ใน ประวัติศาสตร์ ของ พวก มัน."
 galactic_features.367.2:0 "วิถี สู่ การ สูญ พันธุ์ ใน ที่ สุด ของ พวก เขา ดู เหมือน ไม่ อาจ เลี่ยง ได้ ใน ตอน นี้."
 galactic_features.367.3:0 "กับทุกคนที่รู้จักทิยันกีนอก[tiyanki_system.GetName]หลังจากถูกตามล่าแล้ว วันนี้ถือเป็นจุดจบของสายพันธุ์ของพวกเขา หลัง จาก ได้ ท่อง เที่ยว รอบ กาแล็กซี มา หลาย ร้อย ล้าน ปี แล้ว ปัจจุบัน เรือ ติ ยัน คี ก็ สูญ พันธุ์ ไป แล้ว."
 galactic_features.367.4:0 "มีข่าวลือว่ามีผู้พบเห็นชาวเทียนิกิโบราณ ที่ยังคงดํารงอยู่อย่างกว้างขวาง ไม่ว่าจะจริงหรือไม่ หลังจากวันนี้ที่ไทยานีกี เป็นสปีชีส์ - สามารถพิจารณาได้เพียงสูญพันธุ์"
 galactic_features.368.name:0 "ระเบียง แห่ง ชีวิต"
 galactic_features.368.desc:0 "$galactic_features.368.1.desc$\n\n$galactic_features.368.2.desc$"
 galactic_features.368.alt.desc:0 "$galactic_features.368.1.desc$\n\n$galactic_features.368.3.desc$"
 galactic_features.368.1.desc:0 "ยักษ์ ใหญ่ สี่ ตัว ซึ่ง ถูก ปกคลุม ด้วย สนาม พลาสมา อัน กว้าง ใหญ่ มี วง โคจร อยู่ รอบ ๆ§H[tiyanki_system.GetName]§!ระบบหลัก เกล็ด พลาสมา ที่ มี ค่า สูง นี้ ขยาย ออก ไป อย่าง ดี ใน บรรยากาศ ของ ยักษ์ ใหญ่ ของ ก๊าซ เหล่า นี้ และ สิ่ง แวด ล้อม ที่ ไม่ เหมือน ใคร นี้ ทํา หน้า ที่ เป็น แหล่ง ผสม พันธุ์ ของ สิ่ง มี ชีวิต ใน อวกาศ จํานวน มาก."
 galactic_features.368.2.desc:0 "สิ่งมีชีวิตเหล่านี้ล้วนเล็กมาก มีข้อยกเว้นอย่างหนึ่ง§Hเทียนิกิ§!ระบบนี้จะต้องเป็นที่แรก พวกเขาวิวัฒนาการหลายร้อยล้านปีที่ผ่านมา ก่อนที่จะมีช่วงลึกเข้าไปในกาแล็กซี่ จากคุณสมบัติที่หายากมากๆ ของสนามพลาสม่าในระบบ นี้น่าจะเป็นที่เดียวในกาแล็กซี่"
 galactic_features.368.3.desc:1 "สิ่ง มี ชีวิต เหล่า นี้ มี ขนาด เล็ก มาก มี สิ่ง มี ชีวิต ขนาด ใหญ่ ที่ โดด เด่น ชนิด หนึ่ง ซึ่ง ไม่ เหมือน สิ่ง ใด ที่ เรา เคย เห็น มา. แม้ ว่า เรา มี ข้อมูล เพียง เล็ก น้อย เกี่ยว กับ กาแล็กซี เหล่า นี้ แต่ บ่อย ครั้ง ข้อมูล เหล่า นั้น ดู เหมือน อยู่ ลึก เข้า ไป ใน กาแล็กซี. หาก เรา เรียน รู้ มาก ขึ้น เกี่ยว กับ ระบบ นี้ เรา อาจ หา ได้ ว่า อะไร ดึงดูด พวก เขา เข้า สู่ ระบบ นี้ และ ถ้า ระบบ นี้ อาจ เป็น ประโยชน์ ต่อ เรา ใน ทาง ใด ก็ ได้."
 galactic_features.370.a.desc:0 "$galactic_features.370.1.desc$"
 galactic_features.370.b.desc:0 "$galactic_features.370.1.desc$\n\n$galactic_features.367.4$"
 galactic_features.370.1.desc:0 "ติอนิกิที่รู้จักกันล่าสุด ถูกตามล่าและฆ่าโดย§H[tiyanki_killer.GetName]§!ใน§H[tiyanki_system.GetName]§!ระบบ มี การ เชื่อ กัน ว่า รูป แบบ ของ สิ่ง มี ชีวิต ที่ ท่อง อวกาศ เหล่า นี้ ซึ่ง มี อายุ มาก กว่า จักรวรรดิ ใด ๆ ที่ มี อยู่ ใน ปัจจุบัน มี อยู่ มาก มาย ใน กาแล็กซี นี้ มา หลาย ร้อย ล้าน ปี แล้ว. วัน นี้ เป็น จุด จบ ของ ประวัติศาสตร์ ที่ เก็บ รักษา ไว้."
 galactic_features.371.desc:0 "แม้แต่ตอนที่จักรวรรดิของเราอยู่ ณ จุดสูงสุดของอํานาจ, มหายุคที่ผ่านมา(เพลง)ถือเป็นโบราณ, และตอนนี้...[Root.GetSpeciesName]ไม่ นาน มา นี้ วิล เลียม ส์ ได้ ฆ่า สัตว์ ตัว สุด ท้าย ที่ ไม่ มี ทาง ป้องกัน ตัว ได้ ทํา ให้ มัน สูญ พันธุ์.\n\nจะสามารถอ่อนแอของคุณ[Root.GetSpeciesName]สมองเข้าใจสิ่งที่คุณทํา? คุณมีความคิดแม้เพียงเล็กน้อย ของสิ่งที่การกระทําที่ดื้อรั้นของคุณ ได้ขโมยไปจากกาแลคซีนี้?"
 galactic_features.371.a:0 "เรา... เราไม่ได้ตั้งใจให้มันเกิดขึ้น"
 galactic_features.371.b:0 "เช่นเดียวกับคุณ เวลาของพวกเขาได้ผ่านไป"
 galactic_features.371.c:0 "มันจบแล้ว"
 galactic_features.367.a:0 "กาแล็กซีควรจะขอบคุณเรา"
 galactic_features.367.b:0 "อาชญากรรมที่ให้อภัยไม่ได้"
 galactic_features.367.c:0 "โชคดีนะ"
 galactic_features.385:0 "ทาอานกิล่าใน[tiyanki_kill_system.GetName]"
 galactic_features.385.desc:0 "เราล่าได้สําเร็จ และฆ่าเทียนิกิป่าบางส่วน§H[tiyanki_kill_system.GetName]§!ระบบ กองเรือของเราได้ใช้เลเซอร์คัตเตอร์ เพื่อสกัดวัสดุและทรัพยากร จากซากของไทยานีกีขนาดใหญ่"
 #tiyanki_kills:1 "Harvested Tiyanki:\n§Y[Root.tiyanki_cow_kills]§! §HTiyanki Cows:§! £energy£§Y[Root.tiyanki_cow_credits]§!, £exotic_gases£§Y[Root.tiyanki_cow_gas]§!\n§Y[Root.tiyanki_bull_kills]§! §HTiyanki Bulls:§! £energy£§Y[Root.tiyanki_bull_credits]§!, £exotic_gases£§Y[Root.tiyanki_bull_gas]§!\n§Y[Root.tiyanki_calf_kills]§! §HTiyanki Calves:§! £energy£§Y[Root.tiyanki_calf_credits]§!, £exotic_gases£§Y[Root.tiyanki_calf_gas]§!\n§Y[Root.tiyanki_hatchling_kills]§! §HTiyanki Hatchlings:§! £energy£§Y[Root.tiyanki_hatchling_credits]§!, £exotic_gases£§Y[Root.tiyanki_hatchling_gas]§!\n§Y[Root.tiyanki_ox_kills]§! §HTiyanki Oxen:§! £energy£§Y[Root.tiyanki_ox_credits]§!, £exotic_gases£§Y[Root.tiyanki_ox_gas]§!"
