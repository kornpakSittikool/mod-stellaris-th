 galcom.110.desc:1 "เจ้าหน้าที่จากชุมชนกาแล็กติกได้รับข่าว เรื่องชัยชนะของเราเมื่อเร็ว ๆ นี้ สู้กับชาวไทยากี มาเทรียล พวกเขาแจ้งเราว่า การทําลายสัตว์ร้ายของเรา เป็นการฝ่าฝืนพระราชบัญญัติการอนุรักษ์ ติยันกิ ไม่คํานึงถึงความเป็นศัตรูของมาเทรียล\n\nเดอะ[Root.GetName]จะทรงพิจารณาในการลงโทษ§Rการ ละเมิด กฎหมาย กาแลกติก§!อีกสิบปีข้างหน้า นอกจากนี้เราได้รับการออกกับดีสดสําหรับการฆ่าของเรา\"สิ่งมีชีวิตทาอานกิที่ไม่ซ้ําใคร ที่เหมือนกาแล็กซี่จะไม่มีวันได้เห็นอีกเลย\""
