 edict_research_subsidies:0 "สนับสนุนการวิจัย"
 edict_research_subsidies_desc:0 "ความรู้คืออํานาจ พระบาทสมเด็จพระเจ้าอยู่หัวนี้เน้นความพยายามของเรา ในการพัฒนาเทคโนโลยี"
 edict_research_subsidies_tooltip:0 "เพิ่มค่าบำรุงรักษาของ £job_researcher£ $job_researcher_plural$ £energy£§Y1§!"

 edict_veneration_of_saints:0 "ความเลื่อมใสในนักบุญ"
 edict_veneration_of_saints_desc:0 "แทน ที่ จะ เพ่ง เล็ง เฉพาะ แต่ โลก ชั่ว นี้ เท่า นั้น เรา ควร จัด ให้ ผู้ นํา ทาง ฝ่าย วิญญาณ ของ เรา มี สิ่ง ใด ก็ ตาม ที่ พวก เขา จําเป็น ต้อง เตรียม เรา ไว้ สําหรับ อนาคต."

