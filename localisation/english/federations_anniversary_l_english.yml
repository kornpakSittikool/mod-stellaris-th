 federations3.2240.name:0 "สภา ศาสนา: การ คบหา สมาคม ที่ เป็น อันตราย"
 federations3.2240.desc:0 "การอภิปรายที่สําคัญของวัน\"[GetEcumenicalCouncilDebate]\"ก็ถูกขัดจังหวะทันทีเมื่อ พรีเม็ตเข้ามาลากตามสมาชิกสองคนของตัวแทนที่แตกต่างกัน พวก เขา ถูก จับ ได้ ว่า แสดง ความ รัก ต่อ กัน อย่าง ไม่ เสื่อม คลาย ทั้ง ๆ ที่ มี ความ แตก ต่าง กัน. ผู้ ส่ง ข่าว ที่ ถือ คติ นิยม เคร่งครัด ใน แบบ แผน เดิม มาก กว่า ถือ ว่า พฤติกรรม ของ ตน เป็น สิ่ง ที่ ขาด ความ นับถือ และ ขัด กับ หลัก การ ใน คัมภีร์ ไบเบิล และ ละเมิด ความ ศักดิ์สิทธิ์ ของ สภา นี้."
 federations3.2240.a:0 "พวก เขา เป็น สัญลักษณ์ ของ เอกภาพ!"
 federations3.2240.b:0 "มันเป็นความอัปยศ!"
