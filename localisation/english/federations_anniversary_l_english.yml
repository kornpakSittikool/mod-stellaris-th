 envoy_events.1.name:0 "ที่ปรึกษา[envoy_source.GetAdj]ซองโซ"
 envoy_events.1.desc:0 "ดูเหมือนมีบุคคลที่ 3 แฮ็คระบบโปรแกรมแปล[envoy_source.GetAdj]ส่งข้อความไปยัง[Root.Capital.GetName], [event_envoy.GetName]เพื่อที่แทนที่การพูดที่ไร้สาระ[event_envoy.GetSheHe]เริ่ม พ่น การ สบ ประมาท อย่าง รุนแรง ซึ่ง ไม่ ทํา ให้ คน อื่น ขุ่น เคือง. ความผิดปกติใน[event_envoy.GetHerHis]มี การ ค้น พบ อุปกรณ์ อย่าง ละเอียด แต่ ไม่ ใช่ ก่อน[Root.GetRulerTitle] [Root.GetRulerName]ได้รับการประกาศว่าเป็น\"วิล[ruler_species.GetNameInsult]\"การดูถูกอย่างร้ายแรง ซึ่งแน่นอนว่าต้องตอบโต้\""
 envoy_events.1.A:0 "หยาบคายจัง"
 envoy_events.1.B:0 "ตลกนะ!"

 envoy_events.2.name:0 "ซอฟต์แวร์แปลภาษา"
 envoy_events.2.desc.base:0 "ดูเหมือนมีบุคคลที่ 3 แฮ็คเข้าไปในซอฟท์แวร์แปลของทูตของเรา[From.GetName], [event_envoy.GetName]ดังนั้น[event_envoy.GetHerHis]การ พูด เหน็บ แนม อย่าง โจ่งแจ้ง แทน ที่ จะ กลาย เป็น การ สบ ประมาท อย่าง รุนแรง ซึ่ง ไม่ ทํา ให้ พวก เขา ไม่ ได้ รับ บาด เจ็บ เลย[From.GetRulerTitle]ที่ได้รับการประกาศว่าเป็น\"วิล[ruler_species.GetNameInsult]\"."
 envoy_events.2.desc.pos:0 "$envoy_events.2.desc.base$\n\nโชคยังดีที่ความผิดพลาดถูกเปิดอย่างรวดเร็วและ[From.GetSpeciesNamePlural]เอาเหตุการณ์ที่เกิดขึ้นด้วยอารมณ์ขัน ที่ จริง บันทึก ของไม่เหมาะสม[Root.GetAdj]ร่อซูล (มุฮัมมัด) ได้เผยแผ่สาสน์ทั้งหลายออกมากมาย ทําให้พวกเขากระทําความดี"
 envoy_events.2.desc.neg:0 "$envoy_events.2.desc.base$\n\nแม้ว่าความผิดพลาดจะถูกเปิดเผยอย่างรวดเร็ว[From.GetSpeciesNamePlural]ไม่ น่า หัวเราะ ที่ เกิด เหตุ การณ์ นั้น และ ได้ บ่น อย่าง เป็น ทาง การ เกี่ยว กับ พฤติกรรม ที่ ไม่ เหมาะ สม ของ ทูต ของ เรา."
 envoy_events.2.B:0 "การบริจาคเพื่อเกียรติยศ[From.GetAdj]สังคม"

