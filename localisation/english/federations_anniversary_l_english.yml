### Spiritualist Joint Operation by Hadrien Buytaers ###

 GetEcumenicalCouncilDebateText1:0 "พระเจ้า ทรง มี มิติ ไหม?"
 GetEcumenicalCouncilDebateText2:0 "มี พระเจ้า หลาก หลาย รูป แบบ หรือ มี หลาย องค์ ไหม?"
 GetEcumenicalCouncilDebateText3:0 "พระ วิญญาณ แยก ต่าง หาก จาก จิต วิญญาณ ไหม?"
 GetEcumenicalCouncilDebateText4:0 "ซาร์กลานคือใคร?"
 GetEcumenicalCouncilDebateText5:0 "จะ ต้อง ใช้ อะไร เพื่อ จะ เป็น โลก บริสุทธิ์?"
 GetEcumenicalCouncilDebateText6:0 "ควร มี ประมุข ทั่ว โลก ของ ค ริ สต จักร ที่ เป็น เอกภาพ ไหม?"
 GetEcumenicalCouncilDebateText7:0 "พระ ยะ โฮ วา ทรง รู้สึก อย่าง ไร เกี่ยว กับ คํา พยากรณ์ ของ ยะ ซา ยา?"
 GetEcumenicalCouncilDebateText8:0 "ควร ใช้ ส่วน สิบ ชัก หนึ่ง เพื่อ การ กุศล เท่า นั้น ไหม?"
 GetEcumenicalCouncilDebateText9:0 "ความ เชื่อ ส่วน ตัว เป็น ราก แห่ง การ นอก รีต ไหม?"
 GetEcumenicalCouncilDebateText10:0 "การ อัศจรรย์ เป็น การ กระทํา ที่ พิเศษ อะไร?"
 GetEcumenicalCouncilDebateText11:0 "มา ซี ฮา รีวิว. ผู้ช่วยชีวิตของเราเป็นเพียงผู้พยากรณ์?"
 GetEcumenicalCouncilDebateText12:0 "เอกภพ ถูก สร้าง ขึ้น เมื่อ ไร?"
 GetEcumenicalCouncilDebateText13:0 "ซะ โร นี เป็น ผู้ ส่ง ข่าว จาก พระเจ้า ไหม?"
 GetEcumenicalCouncilDebateText14:0 "พระเจ้า มี อยู่ ใน ตัว เรา หรือ ไม่?"
 GetEcumenicalCouncilDebateText15:0 "คุณธรรมข้อใดเป็นรากฐานของจิตวิญญาณบริสุทธิ์"
 GetEcumenicalCouncilDebateText16:0 "เครื่องจักรสามารถได้รับการชดเชยได้หรือไม่"

 federations3.2205.name:0 "สภา คริสต์ จักร"
 federations3.2205.desc:0 "สมาชิก[Root.Federation.GetName]มี เอกภาพ ใน สภาพ ฝ่าย วิญญาณ ของ พวก เขา. เรา พบ เหตุ ผล ร่วม กัน ใน ข้อ เท็จ จริง ที่ ว่า เรา เป็น ผู้ เชื่อ ถือ แต่ การ บํารุง เลี้ยง เป็น ที่ อยู่ ของ ศาสนา ต่าง ๆ ความ เชื่อ และ ค ริ สต จักร บาง ครั้ง ก็ ไม่ สบาย ใจ.\n\nเมื่อเร็ว ๆ นี้สมาชิกของก้อน หินได้ผลักดันสําหรับ[Root.Federation.GetName]เพื่อตั้งสภาอนิเมชัน ที่ซึ่งเราสามารถรวบรวมและกําหนดหลักหลักหลักหลักหลักของความเชื่อของเรา แนวคิดได้รับการอนุมัติ และสมาชิกทุกคน[Root.Federation.GetName]ได้มีการขอให้ส่งตัวแทนไป"
 federations3.2205.a:0 "ฑูตของเราในสหพันธรัฐ สามารถจัดการนี้"
 federations3.2205.b:0 "นี่มันไร้สาระสิ้นดี ส่งผู้แทนมาเท่านั้น"
 federations3.2205.c:0 "ส่งทูตมา!"
 federations3.2205.d:0 "เรื่องประหลาดเหล่านี้ไม่เกี่ยวกับเรา"
 federations3.2215.name:0 "สภา ศาสนา: เทววิทยา ไร้ กฎหมาย"
 federations3.2215.desc:0 "ระหว่างการอภิปรายในวันนี้\"[GetEcumenicalCouncilDebate]\"ตัวแทนของเราทําให้การแสดงที่ยอดเยี่ยมของวาทศิลป์และตรรกะที่ไม่สามารถเปลี่ยนแปลงได้เกือบบดผู้ที่โต้แย้งกับจุดของเรา เมื่อ การ ต่อ ต้าน ยุติ ลง เรา ก็ ได้ ข้อ สรุป อย่าง รวด เร็ว. ผู้ แทน คน อื่น ๆ ปรารถนา จะ ให้ เกียรติ เรา สําหรับ สติ ปัญญา ของ เรา."
 federations3.2215.a:0 "เราไม่ได้มาเพื่อชื่อเสียงนะ ลดความสุภาพลง"
 federations3.2215.b:0 "คนโง่เหล่านี้จะได้รับอะไรทําโดยไม่มีเรา!"
 federations3.2215.c:0 "ราวกับว่าทุกอย่างสามารถ ไปอีกทางได้"
 federations3.2220.name:0 "สภา ศาสนา: การ จํา คุก"
 federations3.2220.desc:0 "คําถามของ\"[GetEcumenicalCouncilDebate]\"เป็นหนึ่งที่ละเอียดอ่อนและมากความหนาแน่นที่เจ็บในการอภิปรายรอบมัน ตัว แทน ของ เรา เป็น คน หัว ดื้อ ที่ สุด และ มี การ บันทึก การ ดู หมิ่น เหยียด หยาม คน อื่น ๆ อีก หลาย ประเภท จาก จักรวรรดิ อื่น ๆ. พวกเขาขอคําขอโทษอย่างเป็นทางการจากเรา"
 federations3.2220.a:0 "การกระทําเหล่านี้ไม่สามารถยอมรับได้ ขอโทษ"
 federations3.2220.b:0 "ปัญญาอ่อนทั้งหมด! เรายืนอยู่ตามที่เราพูด"
 federations3.2220.c:0 "แน่นอน ของ ขวัญ บาง อย่าง น่า จะ ช่วย พวก เขา ให้ เห็น เหตุ ผล."
 federations3.2225.name:0 "สภา ศาสนา: เรื่อง การ กําหนด ไว้ ล่วง หน้า"
 federations3.2225.desc:0 "ก่อน อภิปราย เรื่อง\"[GetEcumenicalCouncilDebate]\"ผู้แทนถูกสันนิษฐานว่าเป็นผู้นํา ในการทําสมาธิอย่างสงบ โดยการจัดอันดับระดับสูง ตาม เวลา กําหนด บาทหลวง ที่ มี ชื่อ เสียง สาม คน คิด ว่า พวก เขา จะ เป็น ผู้ นํา พิธี. สถานการณ์ ยิ่ง รุนแรง ขึ้น และ การ โต้ เถียง ของ พวก เขา ทํา ให้ สภา ยุติ ลง."
 federations3.2225.a:0 "ใครเป็นคนจัดการเรื่องนี้?! สภานี้เป็นเรื่องตลก"
 federations3.2225.b:0 "พฤติกรรมนี้รับไม่ได้ ร้องเรียนอย่างเป็นทางการ"
 federations3.2225.c:0 "ปรับ เปลี่ยน ตาราง เวลา เพื่อ เอา ใจ ใส่ พวก เขา."
