 diplo_corps_lost_control:0 "โครงสร้างดิพลอติก"
 diplo_corps_lost_control_desc:0 "การ ที่ เรา ไม่ สามารถ ควบคุม นัก การ ทูต ของ เรา เอง ได้ นั้น ไม่ ได้ ก่อ ให้ เกิด ความ มั่น ใจ ท่ามกลาง คน รุ่น เดียว กัน."

 envoy_events.15.name:0 "สัตว์ แปลก ประหลาด"
 envoy_events.15.desc:0 "[event_envoy.GetName]สํานักพิมพ์กาแล็กติกของเรา ได้ใช้เวลาอย่างมากในการดูแลสัตว์เลี้ยงลูกด้วยนม[event_envoy.GetHerHim]รอบ ๆ เป็น ที่ เข้าใจ ได้ ว่า สัตว์ เลี้ยง ใน บ้าน ที่ หนี จาก ตัว แทน คน หนึ่ง ก็ น่า รัก อย่าง ไม่ อาจ ปฏิเสธ ได้ แต่ ไม่ ได้ แสดง ให้ เห็น สัญลักษณ์ ของ ความ คิด ที่ ชวน ให้ คิด. แม้ ว่า มัน เป็น สัตว์ กิน เนื้อ ได้ ดี และ มี ฟัน ที่ คม กริบ แต่ โดย ทั่ว ไป มัน มัก จะ มี ความ รัก ใคร่ และ มี ความ ปรารถนา อย่าง ยิ่ง ที่ จะ สัมผัส ร่าง กาย อย่าง อุดม ใน รูป ของ การ ลูบ ไล้ แม้ ว่า อารมณ์ ของ มัน จะ แปรปรวน อย่าง กะทันหัน และ รุนแรง ก็ ตาม!\n\nแม้ว่าเจ้าสัตว์ประหลาดนั่น จะเป็นตัวล่อ[event_envoy.GetName]งานที่จริงจังกว่า ผู้เข้าร่วมคนอื่น ๆ ได้ให้ความเห็นเกี่ยวกับ ลักษณะที่งดงามของนุ่มมากขึ้น[Root.GetSpeciesName]จิตวิทยาที่ถูกเปิดเผย"
 envoy_events.15.A:0 "เยี่ยม"
 opinion_feline_affection:0 "การดูดไขมัน"

 envoy_events.17.name:0 "ข้อ โต้ แย้ง ท่ามกลาง พวก เขา"
 envoy_events.17.desc.base:0 "กฎหมายที่เพิ่งเปลี่ยนแปลง[Root.Federation.GetName]ก่อให้เกิดความวุ่นวายที่สําคัญ กับข้อถกเถียงทางวิทยาการเก่าระหว่างเราและ[dispute_winner.GetName]อีกครั้งหนึ่งที่เพิ่มขึ้นมา ตัวแทนของเรา[dispute_loser_envoy.GetName]ความกล้าหาญที่เป็นตัวแทนฝ่ายของเราในการอภิปรายกับ[dispute_winner.GetAdj]อย่างเป็นทางการ[dispute_winner_envoy.GetName]."
 envoy_events.17.desc.end:0 "พลเมืองที่อยู่ฝั่งตรงข้าม[Root.GetGovernmentName]เฝ้าดูการอภิปรายด้วยความสนใจ, และกังวลมากขึ้นเกี่ยวกับวิธีการทําให้อุดมคติของตน คืนดีกับสมาชิกใน[Root.Federation.GetName]."
 envoy_events.17.desc.militarist:0 "$envoy_events.17.desc.base$อย่างไรก็ตาม[dispute_loser_envoy.GetSheHe] [dispute_loser_envoy.GetWasWere]ไม่สามารถโน้มน้าวผู้ที่อยู่ในปัจจุบันของประโยชน์ของมุมมองทางทหารมากขึ้นและขณะที่การอภิปรายเปิดต่อต้าน[dispute_loser_envoy.GetHerHim], [dispute_loser_envoy.GetSheHe]ปรากฎมากขึ้นเรื่อยๆว่า เป็นข้อกล่าวหา\"[Root.GetAdj]ต่อต้านสงคราม[dispute_loser_envoy.GetHerHim]จากทุกด้าน\n\n$envoy_events.17.desc.end$"
 envoy_events.17.desc.pacifist:0 "$envoy_events.17.desc.base$อย่างไรก็ตาม[dispute_loser_envoy.GetSheHe] [dispute_loser_envoy.GetWasWere]ไม่สามารถโน้มน้าวผู้ที่ปัจจุบันของประโยชน์ของมุมมองที่เงียบสงบมากขึ้นและ ต้องเผชิญกับการกลับอย่างเป็นธรรมจากทุกไตรมาสที่\"[Root.GetAdj]ความไร้เดียงสา\" ถูกกล่าวหาว่าคุกคาม ความปลอดภัยของการดูดซึมทั้งหมด\n\n$envoy_events.17.desc.end$"
 envoy_events.17.desc.spiritualist:0 "$envoy_events.17.desc.base$อย่างไรก็ตาม[dispute_loser_envoy.GetSheHe] [dispute_loser_envoy.GetWasWere]ไม่ สามารถ โน้ม น้าว คน เหล่า นั้น ที่ อยู่ ใน ปัจจุบัน ให้ เชื่อ มั่น ใน ผล ประโยชน์ ของ ทัศนะ ทาง ศาสนา มาก ขึ้น และ พยาน ทั้ง หลาย ถูก ทิ้ง ให้ สั่น ศีรษะ\"เบื้องหลัง\" ของ[Root.GetAdj]\"หัวหน้า\"\n\n$envoy_events.17.desc.end$"
 envoy_events.17.desc.materialist:0 "$envoy_events.17.desc.base$อย่างไรก็ตาม[dispute_loser_envoy.GetSheHe] [dispute_loser_envoy.GetWasWere]ไม่สามารถโน้มน้าวผู้ที่ปัจจุบันของประโยชน์ของมุมมองวัตถุนิยมมากขึ้นและเพิ่มขึ้น[dispute_loser_envoy.GetHerHis]คน รุ่น เดียว กัน ยัง คง แก้ แค้น ต่อ ไป[Root.GetAdj]\"ลัทธิฟาสซิสต์\" ยืนยันว่าเหนือกว่าวิธีไสยศาสตร์ของพวกเขา\n\n$envoy_events.17.desc.end$"
 envoy_events.17.desc.xenophile:0 "$envoy_events.17.desc.base$อย่างไรก็ตาม[dispute_loser_envoy.GetSheHe] [dispute_loser_envoy.GetWasWere]ไม่สามารถโน้มน้าวผู้ที่อยู่ปัจจุบัน ถึงผลประโยชน์ของมุมมองเชิงประจักษ์มากขึ้น[dispute_loser_envoy.GetHerHis]มุมมองของคําว่า\"เสรีนิยมที่อันตราย\"\n\n$envoy_events.17.desc.end$"
 envoy_events.17.desc.xenophobe:0 "$envoy_events.17.desc.base$อย่างไรก็ตาม[dispute_loser_envoy.GetSheHe] [dispute_loser_envoy.GetWasWere]ไม่สามารถโน้มน้าวผู้ที่อยู่ในปัจจุบันของประโยชน์ของมุมมองที่มากขึ้นกลัวด้วย[dispute_loser_envoy.GetHerHis]การประท้วงที่เราควรระวัง อิทธิพลของต่างชาติที่เสื่อมทราม\n\n$envoy_events.17.desc.end$"
 envoy_events.17.desc.egalitarian:0 "$envoy_events.17.desc.base$อย่างไรก็ตาม[dispute_loser_envoy.GetSheHe] [dispute_loser_envoy.GetWasWere]ไม่สามารถโน้มน้าวผู้ที่ปัจจุบัน ผลประโยชน์ของมุมมองที่สูงส่งกว่า ในขณะที่คนที่อาศัยอยู่ในสังคมเสรีน้อยกว่า\"เสรีนิยมที่อันตราย\"\n\n$envoy_events.17.desc.end$"
 envoy_events.17.desc.authoritarian:0 "$envoy_events.17.desc.base$อย่างไรก็ตาม[dispute_loser_envoy.GetSheHe] [dispute_loser_envoy.GetWasWere]การ ที่ พยาน ไม่ สามารถ โน้ม น้าว ผู้ ที่ อยู่ ใน ปัจจุบัน ให้ เชื่อ มั่น ใน ผล ประโยชน์ ของ ทัศนะ ที่ ชอบ ด้วย เหตุ ผล มาก กว่า มี พยาน ที่ เชื่อ มั่น มาก ขึ้น เรื่อย ๆ ต่อ ความ ชั่ว ร้าย ที่ ถูก กล่าว หา ว่า ติด ตาม เสรีภาพ ของ ปัจเจกบุคคล.\n\n$envoy_events.17.desc.end$"
 envoy_events.17.A:0 "เราไม่สามารถประนีประนอมค่าของเรา"
 envoy_events.17.B:0 "เราจะปิดปากเงียบ เพื่อผลประโยชน์ของเอกภาพ"
 envoy_events.17.C1:0 "จํา[dispute_loser_envoy.GetHerHim]ถึง[Root.GetName]เพื่อฝึกอบรม"
 envoy_events.17.C2:0 "จํา[dispute_loser_envoy.GetHerHim]ถึง[Root.GetName]สําหรับการตั้งโปรแกรมใหม่"
 envoy_events.17.C3:0 "จํา[dispute_loser_envoy.GetHerHim]ถึง[Root.GetName]เพื่อแก้ไข"
 envoy_events.18.name:0 "$envoy_events.17.name$"
 envoy_events.18.desc.base:0 "กฎหมายที่เพิ่งเปลี่ยนแปลง[Root.Federation.GetName]ก่อให้เกิดความวุ่นวายที่สําคัญ กับข้อถกเถียงทางวิทยาการเก่าระหว่างเราและ[dispute_loser.GetName]อีกครั้งหนึ่งที่เพิ่มขึ้นมา ตัวแทนของเรา[dispute_winner_envoy.GetName],"
 envoy_events.18.desc.end:0 "อย่างไรก็ตาม[dispute_loser.GetSpeciesNamePlural]ทําให้เกิดเหตุการณ์เลวร้ายนี้ บ่นว่าค่านิยมของพวกเขา และแสดงความห่วงใย"
 envoy_events.18.desc.militarist.base:0 "สามารถชักชวนให้เชื่อประโยชน์มากมายของมุมมองทางทหารที่มากขึ้น เน้นความขี้ขลาดและความไร้เดียงสาที่มีอยู่ในความเชื่อของ[dispute_loser.GetAdj]ท่านทูต[dispute_loser_envoy.GetName]."
 envoy_events.18.desc.pacifist.base:0 "สามารถโน้มน้าวให้เกิดประโยชน์หลายอย่าง จากมุมมองที่สงบมากขึ้น แสดงให้เห็นถึงอันตรายที่ทําให้เราทั้งหมด[dispute_loser.GetAdj]ก่อกวน"
 envoy_events.18.desc.spiritualist.base:0 "สามารถชักชวนให้เชื่อในผลประโยชน์หลายอย่างของลัทธินิยมจิตวิญญาณ เปิดเผยให้ทุกคนเห็นปัญหา[dispute_loser.GetAdj]สังคม"
 envoy_events.18.desc.materialist.base:0 "สามารถชักจูงให้เชื่อประโยชน์หลายอย่าง ของมุมมองแบบวัตถุ แสดงให้เห็นถึงการถอยหลังของ[dispute_loser.GetAdj]การ ถือ โชค ลาง ทาง ศาสนา."
 envoy_events.18.desc.xenophile.base:0 "สามารถโน้มน้าวให้เกิดประโยชน์หลายอย่าง จากมุมมองเชิงบวก ที่ที่สิ่งมีชีวิตทุกชนิด แสวงหาความเข้ากันได้[dispute_loser.GetAdj]ผู้ส่งสาร[dispute_loser_envoy.GetName]น่าจะมีเรา"
 envoy_events.18.desc.xenophobe.base:0 "สามารถโน้มน้าวให้เกิดประโยชน์หลายอย่าง จากมุมมองแบบไร้ความรู้สึก ที่สมาชิกผู้หล่อเลี้ยง จะมองหาตัวเองก่อน แทนที่จะทําตามอุดมการณ์แบบยูโทเปีย[dispute_loser.GetSpeciesNamePlural]."
 envoy_events.18.desc.egalitarian.base:0 "สามารถโน้มน้าวให้ประโยชน์หลายอย่าง ของมุมมองแบบนอกรีตมากขึ้น ที่ทุก ๆ คนถูกมองว่าเป็นอิสระและชั่วร้าย ปลอดภัยจากการวางรากฐานของลัทธิเผด็จการ[dispute_loser.GetSpeciesNamePlural]ทนทุกข์ทรมาน"
 envoy_events.18.desc.authoritarian.base:0 "สามารถโน้มน้าวให้เกิดประโยชน์หลายอย่าง จากมุมมองแบบเผด็จการ โดยเน้นในกฎหมายและระเบียบ[dispute_loser.GetAdj]อุดมการณ์เกี่ยวกับความเท่าเทียม"
