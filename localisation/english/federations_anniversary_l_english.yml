 federations2.105.desc:0 "แผนฝึกทหารร่วมกันในหมู่สมาชิก[Root.Federation.GetName]ได้รับการยอมรับจากพันธมิตรส่วนใหญ่ของเรา สมาชิกทุกคนจะเริ่มเตรียมการทันที"
