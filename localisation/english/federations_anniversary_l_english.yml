 25_FRIENDLY_GREETING:0 "ทาอานกิไม่เคยเป็นภัยคุกคาม ... สิ่งที่อาจจะบังคับให้คุณโจมตีพวกเขา?"


 ### Tiyanki Space Graveyard System by Giada Zavarise ###

 ## Event chain
 tiyanki_graveyard_chain_title:0 "เมือง ที ยัน คี"
 tiyanki_graveyard_chain_desc:0 "ดาวเคราะห์ที่ปกคลุมไปด้วยศพของทิยันกี§H[tiyanki_graveyard_system.GetName]§!ระบบ เพื่อ จะ ศึกษา พื้น ที่ ฝัง ศพ ที่ ไม่ ธรรมดา นี้ เรา ต้อง จัด การ กับ คน เฝ้า ศพ ก่อน."

 ## Special project
 TIYANKI_LURE:0 "ที ยัน คี ลูเร"
 TIYANKI_LURE_DESC:0 "ไทยานีกิกินแก๊ส โดยการสร้างสถานีกระจายแก๊ส เราอาจล่อออกไปประจําการใน§H[tiyanki_graveyard_system.GetName]§!ระบบและเข้าถึงสุสานของพวกเขา"
 gas_diffuser:0 "ที ยัน คี ลูเร"
 gas_diffuser_desc:0 "สถานี นี้ ปล่อย แก๊ส บํารุง ร่าง กาย ออก มา มาก มาย ทํา ให้ ผู้ รักษา สุสาน ติ อัน ยาคิ หันเห ไป จาก หน้า ที่ ของ ตน."

 ## Point of Interest
 tiyanki_graveyard_poi_title:0 "กําจัด คน เฝ้า ศพ ที ยัน คี"
 tiyanki_graveyard_poi_desc:0 "กําจัดทิยันกีที่ประจําการ§H[tiyanki_graveyard_system.GetName]§!เพื่อเข้าถึงสุสานของพวกเขา"

 ## Events

 # Surveyed Tiyanki Graveyard System - What to do now?
 galactic_features.387.name:0 "คน เฝ้า ศพ"
 galactic_features.387.desc:0 "การกระทําของทิยันกิที่อาศัยอยู่ใน§H[tiyanki_graveyard_system.GetName]§!ระบบไม่ตรงกับรูปแบบพฤติกรรมของพวกเขา แม้ ว่า ที ยัน คี มัก จะ เป็น คน เร่ร่อน แต่ ฝูง สัตว์ เหล่า นี้ ยัง คง ยืน อยู่ รอบ ดาว เคราะห์ ที่ ปก คลุม ด้วย ซาก ของ มัน เอง.\n\nการพยายามศึกษาเกี่ยวกับสุสาน ถูกขัดขวางจากตาข่ายของหนวดของทิยันกี ที่ห่อหุ้มไว้รอบโลก ทําให้งานวิจัยเป็นไปไม่ได้มากขึ้น"
 galactic_features.387.a:0 "ไทยานีทําเหยื่อได้ง่าย กําจัดพวกมันซะ"
 galactic_features.387.b:0 "กําจัดคนเฝ้าสุสาน โดยไม่ทําอันตรายพวกเขา"

 # Tiyanki Graveyard - Destroyed Gravekeepers
 galactic_features.388.name:0 "ความลึก:"
 galactic_features.388.desc:1 "ได้กําจัดทิยันกีที่ประจําการ[FromFrom.System.GetName]ของเรา[Root.Owner.GetScientistPlural]ตอน นี้ สามารถ เข้า ไป ใกล้ ที่ ฝัง ศพ ได้ อย่าง ปลอด ภัย เพื่อ นํา การ วิจัย ของ พวก เขา."

 # Tiyanki Graveyard - Lured Gravekeepers
 galactic_features.389.name:0 "ทัสตี้ ไบต์"
 galactic_features.389.desc:0 "การ ก่อ สร้าง ของ เรือ ไท ยัน คี ล่อ ใจ§H[tiyanki_graveyard_system.GetName]§!ระบบเสร็จสมบูรณ์แล้ว เนื่อง จาก ถูก หลอก ด้วย ก๊าซ ที่ มี คุณค่า ทาง โภชนาการ ซึ่ง ออก มา จาก เครื่อง พ่น ก๊าซ คน งาน ฝัง ศพ จึง ถูก ล่อ ใจ ให้ ออก ไป จาก ตําแหน่ง ของ ตน ทํา ให้ เรา สามารถ[Owner.GetScientistPlural]เพื่อ หลบ เข้า ไป ใน หนวด และ เข้า ไป ใน หลุม ที่ ไม่ มี ใคร สังเกต."

 # Survey - no communication with the Tiyanki
 galactic_features.384.name:0 "ผู้พิทักษ์ลึกลับ"
 galactic_features.384.desc:0 "จํานวนมากของ§H[tiyanki_no_contact.GetName]§!ล้อมรอบดาวเคราะห์ ที่ปกคลุมไปด้วยซากศพ ของสิ่งมีชีวิตต่างดาว\n\nไม่มีข้อมูลเกี่ยวกับเอเลี่ยน เราได้แต่คาดเดาพฤติกรรมพวกมัน"
 galactic_features.384.tooltip:0 "สร้างการติดต่อครั้งแรกกับ§H[tiyanki_no_contact.GetName]§!เพื่อเรียนรู้มากขึ้น"

 ## Anomaly
 TIYANKI_ASTEROID_CAT:0 "แอ ส เท อร์ ลอย ด์ ที่ มี ชีวิต อยู่"
 TIYANKI_ASTEROID_CAT_DESC:0 "ตัวอย่างของหิน ที่ได้มาจากเข็มขัดดาวเคราะห์น้อย โดยไม่คาดคิด ว่าจะมีเนื้อเยื่อทางชีวภาพจํานวนมาก"

 # Anomaly result
 anomaly.7100.name:0 "เปิดไพ่"
 anomaly.7100.desc:0 "อะไรของเรา[Owner.GetScientistPlural]มี การ พบ เห็น ว่า ดาว เคราะห์ น้อย ถูก ทํา ให้ แข็ง ตัว และ ถูก ทุบ ตี จน เป็น ก้อน ที่ ไม่ มี รูป ร่าง หลัง จาก โคจร หลาย ทศวรรษ. แหวนดาวเคราะห์น้อยทั้งหมด ที่จริงแล้ว ก็แค่สุสานเปิด บางศพที่เราได้มา เสียชีวิตเมื่อเร็ว ๆ นี้ ในขณะที่ศพอื่น ๆ ก่อนจักรวรรดิของเรา"
 anomaly.7100.alt.desc:0 "อะไรของเรา[Owner.GetScientistPlural]มี การ พบ เห็น ว่า ดาว เคราะห์ น้อย ถูก จับ ไป ผิด ๆ ครั้ง แรก โดย เห็น ว่า เป็น ซาก ศพ ของ มนุษย์ ต่าง ดาว ที่ ถูก ทุบ ตี ซึ่ง มี รูป ร่าง คล้าย ดาว เคราะห์ น้อย ที่ เห็น อยู่ ใน ระบบ. แหวนดาวเคราะห์น้อยทั้งหมด ที่จริงแล้ว ก็แค่สุสานเปิด บางศพที่เราได้มา เสียชีวิตเมื่อเร็ว ๆ นี้ ในขณะที่ศพอื่น ๆ ก่อนจักรวรรดิของเรา"

 ## Archeological site
 site_tiyanki_graveyard:0 "ที ยัน คี"
 site_tiyanki_graveyard_intro:0 "พื้นผิวของ[From.Planet.GetName]ปกคลุมไปด้วยซากของไทยานีกิ เซ็นเซอร์ของเราตรวจสอบสัญญาณชีวิตไม่มี และยังศพยังคงบิดเบี้ยวและสั่นเช่นถ้าเคลื่อนไหวโดยบางส่วน"

 ancrel.14100.name:0 "ลูกชิ้น"
 ancrel.14100.desc:0 "มันยากที่จะตัดสินว่า[From.Planet.GetName]แม้แต่ดาวเคราะห์นี้ การขุดเจาะเบื้องต้น ได้เปิดเผยเฉพาะเนื้อเยื่อชีวภาพ ตาม การ ประเมิน แล้ว ต้อง ใช้ 2,435,463 ศพ เพื่อ ผลิต มวล ดาว เคราะห์ ขนาด นี้ (ซึ่ง มี ความ ผิด เพี้ยน ถึง 5.3%). แม้ จะ คิด เอา เอง ว่า มี หิน เป็น ก้อน ๆ อยู่ ใน ซาก ศพ แต่ จํานวน ตัว อย่าง ที่ เกี่ยว ข้อง ก็ ยัง มี ความ สําคัญ.\n\nมีใครหรืออะไร ที่พาเทียนิกิ มาตายที่นี่ หรือว่าพวกเขา ถูกดึงดูดมายังสถานที่แห่งนี้"
 ancrel.14100.necro.desc:0 "$ancrel.14100.desc$ที่สําคัญที่สุดคือ ทําไมเนโครมันเซอร์ของเรา ไม่สามารถฟื้นฟูมันได้ เหตุ ใด เนื้อ หนัง ที่ ตาย แล้ว นี้ จึง ปฏิเสธ เรา ราว กับ ว่า ถูก ควบคุม โดย สิ่ง อื่น แล้ว?"

 ancrel.14200.name:0 "สาม ส่วน เสีย"
 ancrel.14200.desc:0 "แปลกประหลาด... ความมีชีวิตชีวาของทิยันกีที่ตายไปแล้ว ปกคลุมพื้นผิวของ[From.Planet.GetName]ดู เหมือน ว่า เป็น ผล สืบ เนื่อง จาก ความ สามารถ ใน การ สร้าง ใหม่ ของ พวก เขา: แม้ ว่า ใน เชิง เทคนิค แล้ว ร่าง กาย ยัง คง ผนึก ตัว เอง อยู่. ระบบ นี้ อุดม ไป ด้วย สาร ที่ มี คุณค่า ทาง โภชนาการ อย่าง ผิด ปกติ ตาม ปกติ จะ พบ ได้ ใน ยักษ์ ก๊าซ ที่ ติ ยัน คี กิน หญ้า. บางทีนั่นอาจอธิบายได้ว่า ทําไมพฤติกรรมนี้ยังไม่ถูกสังเกตมาก่อน\n\nการ ค้น พบ นี้ ไม่ ได้ อธิบาย เหตุ ผล ที่ คน ตาย ดู เหมือน จะ เคลื่อน ไหว เหมือน ถูก ควบคุม โดย จิตใจ อัน เดียว โดย การ ขยาย หนวด ออก ไป เมื่อ มี ซาก ใหม่ ตก บน ดาว เคราะห์ ดวง นี้.\n\nการขุดเจาะเพิ่มเติมหวังว่า จะเปิดเผยความเข้าใจใหม่ เกี่ยวกับการทํางานภายในของสถานที่แห่งนี้ หรือเป็น ของเรา[Owner.GetScientistPlural]ยังคงถูกแบ่งออกเป็นส่วน ๆ"

 ancrel.14300.name:0 "ชีวเคมี"
 ancrel.14300.desc:0 "การ ขุด ค้น ของ เรา ได้ ขุด พบ เครือ ข่าย อัน ซับ ซ้อน ของ อุโมงค์ ที่ แผ่ ออก ไป ใต้ ผิว น้ํา ของ อุโมงค์[From.Planet.GetName]การ วิเคราะห์ ทาง เคมี ยืน ยัน ว่า ผนัง นี้ ประกอบ ด้วย เนื้อ เยื่อ ไท ยัน คี ที่ อัด แน่น อย่าง หนัก เนื้อ เยื่อ ยัง คง อบอุ่น และ แทบ จะ ไม่ เน่า เปื่อย แม้ จะ มี อายุ เท่า จักรวรรดิ ของ เรา ก็ ตาม. เหมือนว่าศพถูกหลอมรวมเข้าด้วยกัน ปรับรูปและดัดแปลงให้กลายเป็นที่นี่... แต่ทําไม?"

 ancrel.14400.name:0 "อุโมงค์ ที่ มี เสียง ดัง"
 ancrel.14400.desc:0 "หลังจากแผนที่เครือข่ายใต้ดิน[From.Planet.GetName]ของเรา[Owner.GetScientistPlural]ตระหนักได้ว่าอุโมงค์นั้น ตรงกับโครงสร้างของระบบหลอดเลือดไทยานีกีมาก แต่ในระดับดาวเคราะห์\n\nผนังที่พ่นออกมาเป็นความอบอุ่นนุ่ม อุณหภูมิที่เพิ่มขึ้นอย่างช้าๆ เมื่อการเดินทางเข้าสู่ใจกลางดาวเคราะห์"
 ancrel.14400.matriarch.desc:0 "หลังจากแผนที่เครือข่ายใต้ดิน[From.Planet.GetName]ของเรา[Owner.GetScientistPlural]ตระหนักถึงอุโมงค์อย่างใกล้ชิด ตรงกับโครงสร้างของระบบเส้นเลือดของไทยานีกี แต่ในระดับที่เทียบเท่ากับระดับของไทยากิ มาเทรียร์ที่เราพบในขณะที่โคจรรอบดาว\n\nผนังที่พ่นออกมาเป็นความอบอุ่นนุ่ม อุณหภูมิที่เพิ่มขึ้นอย่างช้าๆ เมื่อการเดินทางเข้าสู่ใจกลางดาวเคราะห์"

 ancrel.14510.name:0 "แม่ สมอง"
 ancrel.14510.desc:0 "ในห้องพักใต้ดินขนาดใหญ่ทายากิยืนตรงหัวระฆังรูประฆังแกว่งเบา ๆ หนวดหยักของมันแพร่กระจายไปทั่วพื้น ดูเหมือนว่าเป็นหน่วยบัญชาการบางหน่วย ควบคุมและกํากับการเติบโตของสุสานขนาดดาวเคราะห์นี้\n\nของเรา[Owner.GetScientistPlural]ไม่สามารถที่จะบอกได้ว่าสัตว์ชนิดใดจะเกิดขึ้นจากกระบวนการอันน่ากลัวนี้ และเมื่อมันตื่น แต่สิ่งหนึ่งที่แน่นอนคือ: มันจะเป็นสิ่งที่ไกล ไกลมากขึ้นและน่ากลัวกว่าธรรมดาทาอานกิ"
 ancrel.14510.matriarch.desc:0 "ในห้องพักใต้ดินขนาดใหญ่ทายากิยืนตรงหัวระฆังรูประฆังแกว่งเบา ๆ หนวดหยักของมันแพร่กระจายไปทั่วพื้น ดูเหมือนว่าเป็นหน่วยบัญชาการบางหน่วย ควบคุมและกํากับการเติบโตของสุสานขนาดดาวเคราะห์นี้\n\nของเรา[Owner.GetScientistPlural]ไม่ทราบว่าเมื่อขั้นตอนที่จะถูกสรุป แต่เชื่อว่าเมื่อสัตว์ตื่น มันจะเป็นสิ่งที่ไกลมากขึ้นและน่ากลัวมากขึ้นกว่าปกติทิยันกิ :สิ่งที่คุ้มค่าของการถูกเรียกว่าใหม่§Hที ยัน คี มา ทริ ฟอร์ม§!."

 ancrel.14510.a:0 "แยกแกนออก"
 ancrel.14510.b:0 "เฝ้าดูการเติบโตของมัน โดยไม่ทําอันตรายมัน"
 ancrel.14510.c:0 "ให้การเจริญเติบโตของชีวิตอันศักดิ์สิทธิ์นี้ ไปสู่ความสงบ"
 ancrel.14510.d:0 "ผู้รักษาการจะต้องจ่ายราคาที่ดีสําหรับตัวอย่างนี้"
 ancrel.14510.e: "ช่าง เป็น ความ สามารถ ที่ น่า ทึ่ง จริง ๆ!"

 ancrel.14520.name:0 "แม่ สมอง"
 ancrel.14520.desc:0 "ใน ห้อง ใต้ ดิน อัน กว้าง ใหญ่ ที ยัน คี ยืน ตรง ระฆัง ที่ แกว่ง เบา ๆ หนวด ของ มัน แผ่ กระจาย อยู่ บน พื้น เพื่อ เชื่อม กับ ผนัง ชั้น นอก ของ ห้อง. ดูเหมือนเป็นหน่วยควบคุมบางอย่าง ควบคุมและกํากับการเติบโตของเนินหิน แต่สัตว์ประหลาดนั่นตายแล้ว ถูกทําลายด้วยอุปกรณ์เหมืองแร่ที่เราเคยใช้ เปลือกหอยรอบแกนจะถูกเติมเต็มและเปราะ; ในไม่ช้าสถานที่แห่งนี้ทั้งจะตายครั้งที่สอง"

 ancrel.14910.name:0 "การ ปน เปื้อน ด้าน สิ่ง แวด ล้อม"
 ancrel.14910.desc:1 "สมาชิกในทีมสํารวจของเรา หายตัวไปขณะสํารวจอุโมงค์ หน่วยกู้ข้อมูลใช้เวลาหลายวันเพื่อตามหา[Owner.GetScientist]เพียงเพื่อให้พบว่าพวกเขาส่วนหนึ่งบรรจุอยู่ในผนังร่างกายที่แนบไปด้วยหนวด\n\nปลดปล่อย[Owner.GetScientist]ต้อง ใช้ เวลา และ ความ พยายาม มาก ที เดียว. เดอะ[Owner.GetScientist]ไม่ได้เป็นเพียงผูก : ผนังพยายามที่จะหลอมละลายกับ[Owner.GetScientist]ในระดับโมเลกุล เปลี่ยนพวกเขาเป็นส่วนหนึ่งของพื้นผิว\n\nเดอะ[Owner.GetScientist]ตอนนี้กําลังอยู่ในสภาวะคงที่ แต่ปฏิเสธที่จะออกจากเรือวิทยาศาสตร์ของเรา และแม้ที่นั่น พวกเขายังคงเฝ้าดูผนังด้วยความสงสัยอย่างมาก"
 ancrel.14910.b.evopred: "วิธีที่น่าสนใจในการได้รับ ไบโอเมต"

 ### Amoebas by Pierre du Plessis ###

 galactic_features.500.name:0 "การ ตัด ไม้"
 galactic_features.500.desc.base:0 "เดอะ[From.GetName]ระบบให้ออกความประทับใจที่รุนแรงเมื่อเห็นครั้งแรก : ไม่มีดาวเคราะห์ใด ๆ ของมันอาศัยอยู่ระยะไกล ทั้งถูกแผดเผาโดยความร้อนที่รบกวนของสาม ดวงอาทิตย์หรือการริบชีวิตโดยพายุสุริยะที่มีประสิทธิภาพ อย่าง ไร ก็ ตาม มี สิ่ง มี ชีวิต ชนิด หนึ่ง ที่ ดู เหมือน เจริญ เติบโต ใน สภาพ แวด ล้อม เช่น นี้ คือ อมีบา ใน อวกาศ. เมื่อ เลิก วิถี ชีวิต แบบ เดียว กัน นี้ พวก เขา ได้ รวม ตัว กัน เป็น จํานวน มาก เข้า มา และ ออก ไป ระหว่าง ระบบ ภาย ใน ที่ ร้อน ระอุ กับ ก๊าซ ขนาด ใหญ่ ซึ่ง ดู เหมือน ว่า เป็น พิธีกรรม ผสม พันธุ์ ที่ ซับ ซ้อน."
 galactic_features.500.desc:0 "$galactic_features.500.desc.base$\n\nมันไม่ชัดเจน ว่าอะไรอาจจะทําให้เกิดอมีบาส์ ที่ชอบระบบนี้ ไม่สนใจที่พวกเขาดูเหมือนจะปกป้องมัน และได้เปิดธงของพวกเขาไปแล้วต่อ[Root.GetName]ในลักษณะการข่มขู่"
 galactic_features.500.desc.peaceful:0 "$galactic_features.500.desc.base$\n\nมันไม่ชัดเจน ว่าอะไรอาจจะทําให้เกิดอมีบาส์ ที่ชอบระบบนี้ แต่โชคดีพวกเขาดูเหมือนจะพอใจที่จะแบ่งปันให้เราและได้ทําการเคลื่อนไหวที่ไม่เป็นศัตรูต่อ[Root.GetName]."
 galactic_features.500.alt.desc:0 "เดอะ[From.GetName]ระบบให้ออกความประทับใจที่รุนแรงเมื่อเห็นครั้งแรก : ไม่มีดาวเคราะห์ใด ๆ ของมันอาศัยอยู่ระยะไกล ทั้งถูกแผดเผาโดยความร้อนที่รบกวนของสาม ดวงอาทิตย์หรือการริบชีวิตโดยพายุสุริยะที่มีประสิทธิภาพ อย่าง ไร ก็ ตาม ทั้ง ๆ ที่ มี สิ่ง เหล่า นี้ อยู่ มาก มาย ดู เหมือน ว่า มี สิ่ง มี ชีวิต ขนาด ใหญ่ ที่ ไม่ รู้ จัก กัน มา ก่อน ซึ่ง เป็น กลุ่ม ที่ มี การ ผสม พันธุ์ กัน ทั้ง ภาย ใน และ ภาย นอก ระหว่าง ระบบ ภาย ใน ที่ ร้อน ระอุ และ ยักษ์ ใหญ่ โต ซึ่ง ดู เหมือน ว่า เป็น พิธีกรรม ผสม พันธุ์ ที่ ซับ ซ้อน.\n\nไม่ ต้อง สงสัย เลย ว่า ระบบ นี้ อาจ ดึงดูด ใจ สิ่ง มี ชีวิต เหล่า นี้ ได้. ไม่สนใจที่พวกเขาดูเหมือนจะปกป้องมัน และได้หันไปที่เรา[Root.GetName]ในลักษณะการข่มขู่"

 galactic_features.502.name:0 "สร้างใหม่ใน[FromFrom.GetName]"
 galactic_features.502.desc:0 "กลุ่มใหญ่ของอวกาศอมีบาส ได้แยกออกจากผู้ที่อยู่ใน[amoeba_home_system.GetName]ระบบและชนออกไปเดินรอบกาแล็กซี่ด้วยตัวมันเอง เข้าพื้นที่ของเราใน[FromFrom.GetName]ระบบ เช่นเดียวกับบรรทัดฐานกับสิ่งมีชีวิตเหล่านี้ พวกเขาดูเหมือนจะไม่สามารถทนการปรากฏตัวของเรา และได้เริ่มโจมตีด่านของเรา"
 galactic_features.502.desc.peaceful:0 "กลุ่มใหญ่ของอวกาศอมีบาส ได้แยกออกจากผู้ที่อยู่ใน[amoeba_home_system.GetName]ระบบและหลงออกไปเที่ยวกาแล็กซี่ของตัวเองและตอนนี้สามารถเห็นการข้าม[FromFrom.GetName]ระบบในจํานวนที่น่าประทับใจ โชคยังดีที่เราได้เผยความลับ ในการอยู่ร่วมกันอย่างสงบสุขกับสิ่งมีชีวิตที่สง่างามเหล่านี้ เราจึงไม่กังวลมากเกินไปกับการเคลื่อนไหวของพวกเขา"
 galactic_features.502.alt.desc:0 "สิ่งมีชีวิตจากอวกาศจํานวนมากได้แยกออกจากสิ่งมีชีวิตใน[amoeba_home_system.GetName]ระบบและโจมตีออกไปเดินรอบกาแล็กซี่ด้วยตัวมันเอง นําพวกเขาเข้ามาในดินแดนของเราเอง พวกเขาไม่สามารถทนการปรากฏตัวของเรา และได้เริ่มโจมตีด่านของเราใน[FromFrom.GetName]ระบบ"

 ### Space Storm by Henrik Thyrwall ###

 galactic_features.402.name:0 "พายุ ฟ้า คะนอง"
 galactic_features.402.desc:0 "เกิดการรบกวนครั้งใหญ่ของสับสเปซ ในระบบข้ามกาแล็กซี่ รายงาน ใน ตอน ต้น ๆ บ่ง ชี้ ว่า เกือบ 50% ของ ระบบ ต่าง ๆ ใน กาแล็กซี ได้ รับ ผล กระทบ จาก ปรากฏการณ์ ที่ ไม่ เคย เกิด ขึ้น มา ก่อน นี้ ซึ่ง ดู เหมือน เกิด จาก การ เดิน ทาง อย่าง หนัก เป็น เวลา หลาย พัน ปี โดย อารยธรรม ทั้ง ใน อดีต และ ปัจจุบัน.\n\nนักวิทยาศาสตร์มีความมั่นใจว่ากาแล็กซี่นี้\"พายุอวกาศ\" จะลดลงเอง ภายในระยะเวลา 5-10 ปี จนกระทั่งมันเกิดขึ้น พายุจะเล่นความหายนะด้วยเครื่องยนต์ เรือดําน้ํา เครื่องกําเนิดเกราะ และระบบเซ็นเซอร์ ในระบบดาวเหล่านั้นได้รับผลกระทบจากมัน"
 galactic_features.402.a:0 "นี่ก็เหมือนกัน"
 galactic_features.404.name:0 "พายุ ฟ้า คะนอง"
 galactic_features.404.desc:0 "พายุ ต่าง ๆ ที่ ส่ง ผล กระทบ ต่อ กาแล็กซี ส่วน ใหญ่ ได้ ทํา ให้ เกิด การ เปลี่ยน แปลง อย่าง สิ้น เชิง. ระบบของยานจะไม่ถูกแก้ไข ระบบเหล่านั้น ที่การรบกวนของสับสเปซแสดงให้เห็น\n\nแม้ บาง คน คาด เดา ว่า พายุ เช่น นี้ อาจ นํา ไป สู่ การ ล่ม สลาย ของ เครือ ข่าย ไฮเปอร์สเปซ ใน ที่ สุด อีก หลาย พัน ปี ข้าง หน้า เพราะ บัด นี้ การ ท่อง อวกาศ ดู เหมือน จะ กลับ สู่ สภาพ ปกติ."
 galactic_features.405.name:0 "พายุ อวกาศ[storm_name.GetFirstName]จํานวน"
 galactic_features.405.desc:0 "$galactic_features.402.desc$\n\nกลุ่มกาแล็กติกตั้งชื่อพายุนี้อย่างเป็นทางการ§H§!\"[storm_name.GetFirstName]\"§!และออกที่ปรึกษาการท่องเที่ยวทั่วไป"
 galactic_features.406.name:0 "พายุ อวกาศ[storm_name.GetFirstName]ไม่สนใจ"
 galactic_features.406.desc:0 "อย่างที่ปรากฎ§Hพายุ อวกาศ[storm_name.GetFirstName]§!ถูกทําลายอย่างสิ้นเชิง ระบบของยานจะไม่ถูกแก้ไข ระบบเหล่านั้น ที่การรบกวนของสับสเปซแสดงให้เห็น\n\nแม้ บาง คน คาด เดา ว่า พายุ เช่น[storm_name.GetFirstName]อาจนําไปสู่การล่มสลายในที่สุด ของเครือข่ายไฮเปอร์สเปซ หลายพันปีในอนาคต สําหรับตอนนี้การเดินทางในอวกาศ ดูเหมือนได้กลับมาเป็นปกติ"
 galactic_features.421.name:0 "วี ลู อู"
 galactic_features.421.desc:0 "องค์ประกอบของสับสเปซที่มีประสิทธิภาพมาก ของบางชนิดที่ได้พบใน§H[From.From.From.GetName]§!ระบบ มันไม่ได้ปรากฏเป็นศัตรูและอาจจะไม่ได้ตระหนักถึงทั้งหมดของยานอวกาศทั่วไป แต่เป็นเพียงการปรากฏตัวของมันใน[From.From.From.GetName]ทําให้เกิดการรบกวนใหญ่ ๆ ในสับสเปซในระบบทั้งหมด\n\nการ รบกวน เหล่า นี้ เกิด ขึ้น ใน บริเวณ รอบ ตัว มัน เอง และ ควร หาย ไป เมื่อ มัน ออก จาก ระบบ. ขณะ ที่ มัน ไม่ ยอม รับ ลูกเห็บ แต่ ตัว ต่าง ๆ กําลัง ส่ง สัญญาณ สัญญาณ ที่ สลับ ซับ ซ้อน ของ การ สั่น สะเทือน ของ ลูกเห็บ ซึ่ง ดู เหมือน เป็น รูป ของ ภาษา. ถ้าซอฟท์แวร์แปลของเราถูกต้อง มันบอกเราว่า ซ้ําแล้วซ้ําอีก\n\n§H§!\"วี ลู อู อูหา ค้นพบ§!\""
 galactic_features.421.a:0 "นี้จะแทรกแซงระบบเรือ"
 galactic_features.423.name:0 "อวสาน ของ การ สูญ เสีย"
 galactic_features.423.desc:0 "ตลอดการต่อสู้ของเรากับกองกําลังของเราใน§H[vluur_system.GetName]§!ระบบ, สิ่งมีชีวิตในสับสเปซ§H§!\"วี ลู อู\"§!เพิ่มความถี่ที่มันปล่อยแสงเตคิออน แต่ข้อความซ้ําไม่รู้จบยังคงเหมือนเดิม\n\n§H\"วี ลู อู อูหา VLUUUR หา.\"§!\n\nเมื่อการระเบิดของการฆ่าครั้งสุดท้าย สสารระเบิดด้วยระเบิดขนาดใหญ่ ที่ทําลายระบบด้วยสสารมืด"
 galactic_features.423.a:0 "เราจะรวบรวมสิ่งที่เราสามารถ"
 galactic_features.423.tooltip:0 "หลายโลก[vluur_system.GetName]ระบบ"

 ### Pirates: The Bemat Thalassocracy by Gemma Thomson ###

 pirate.155.name:0 "บล็อกของบริแกนที่[thalassocracy_target_system.GetName]"
 name_thalassocracy_agency:0 "External Customs and Acquisitions"
 name_thalassocracy_agency_abbreviated:0 "ECA"
 pirate.155.desc.regular:1 "ผู้ แทน[root.GetName]: $pirate.155.proclamation$\n\nบางครั้ง ศุลกากรก็เครียด เราเข้าใจ ร่วมมือกัน และไม่มีใครต้องถูกทําร้าย และโปรดส่วนที่เหลือมั่นใจได้ว่าทุกเมล็ดและแร่ที่เราอ้างอย่างเคร่งครัดจะนํามาใช้ที่ดีภายใน[thalassocracy_species.GetName]แผนกระจายเสียง เรา รู้สึก ขอบคุณ ที่ คุณ คํานึง ถึง เรา.\n\n$pirate.155.thalassocracy_signoff$"
 pirate.155.desc.machine:0 "การสร้างผู้แทน[root.GetName]การปิดล้อมในขณะนี้มีผลที่[thalassocracy_target_system.GetName]. หน่วยเครื่องจักรใด ๆ และในภูมิภาคนี้ นับจากนี้เป็น เรื่องของ[thalassocracy_country.GetName]พวกเขาจะถูกสั่งให้รับใช้เรา กองเรือต่อต้านจะถูกยิง\n\nเรา หยั่ง รู้ ค่า ที่ การ ดําเนิน งาน นี้ อาจ หมาย ถึง ความ ไม่ สะดวก ด้าน วัตถุ สําหรับ คุณ. เราให้ความมั่นใจกับคุณว่า มันจะสรุปว่า$name_thalassocracy_agency$เจ้าหน้าที่ตรงกับจํานวนที่กําหนดให้ แน่นอน คุณ สามารถ เข้าใจ ความ กดดัน ของ คํา สั่ง ที่ เหมือน กับ คํา สั่ง ของ เรา.\n\nความรู้สึกที่คุ้มค่าของวัตถุประสงค์ รอหุ่นยนต์ที่โปรแกรมใหม่ของคุณภายใน[thalassocracy_species.GetName]แผนกระจายเสียง$pirate.155.thalassocracy_signoff$"
 pirate.155.desc.hive:0 "หน่วยงานผู้แทน[root.GetName]: $pirate.155.proclamation$\n\nบางครั้ง ศุลกากรก็เครียด เราเข้าใจ ใช้ร่วมกัน และไม่[root.GetIndividualNamePlural]จําเป็นต้องได้รับบาดเจ็บหรืออื่น ๆ ที่ไม่สะดวก และขอให้มั่นใจ ว่าทุกเมล็ดพืชและแร่ที่เราเรียกร้อง จะไปยังบ้านที่ดีภายใน[thalassocracy_species.GetName]แผนกระจายเสียง เราขอขอบคุณทุกท่านที่พิจารณา\n\n$pirate.155.thalassocracy_signoff$"
 pirate.155.proclamation:0 "ขณะนี้การปิดล้อมชั่วคราวมีผล[thalassocracy_target_system.GetName]การ ประมวล ผล และ การ ขน ส่ง อาหาร และ แร่ ธาตุ ผ่าน ระบบ นี้ บัด นี้ กําลัง ถูก ชัก นํา โดย$name_thalassocracy_agency$เจ้าหน้าที่ของ[thalassocracy_country.GetName]เรือที่ไม่ได้ใช้ทั้งหมดจะถูกหันออก หรืออื่น ๆ ที่ยิงเมื่อ เงื่อนไขนี้จะยังมีผลจนกระทั่ง$name_thalassocracy_agency_abbreviated$สามารถเข้าโควต้าได้"
 pirate.155.thalassocracy_signoff:0 "สําหรับอนาคตที่สว่างไสว"
 pirate.155.a:0 "อะไรนะ?"
 pirate.155.b:0 "คุณจะเสียใจกับเรื่องนี้[thalassocracy_species.GetAdj]สวะ"
 pirate.155.pacifist:0 "มันต้องเป็นแบบนี้จริงๆเหรอ?"
 pirate.155.machine:0 "คุณจะไม่สําเร็จ"
 pirate.155.corp:0 "การกระทําที่กล้าหาญ[thalassocracy_species.GetAdj]โง่ แต่กล้าหาญ"
