 ## Edicts ##

 edict_nuumismatic_visualization:1 "การแสดงแผนภาพและตัวเลข"
  edict_nuumismatic_visualization_desc:1 "การใช้เทคนิคจินตภาพแบบนิวมิสมาติกอย่างจริงจังจะช่วยเปลี่ยนความสนใจของประชากรเราจากผลประโยชน์ส่วนตนไปสู่การผลิตพลังงานคอสมิก การที่จะบรรลุเป้าหมายใดๆ ได้นั้น ก่อนอื่นคุณต้องจินตนาการถึงมันให้เป็นภาพเสียก่อน"
 edict_terraforming_gas:0 "ก๊าซปรับสภาพดาว"
 edict_terraforming_gas_desc:0 "ด้วยการใช้ก๊าซแปลกใหม่ในกระบวนการปรับสภาพดาวทำให้เราสามารถบรรลุความก้าวหน้าในอัตราที่เร็วกว่ามาก"
 edict_clearing_motes:0 "การช่วยกำจัดสิ่งกีดขวางด้วยแร่ระเหย"
  edict_clearing_motes_desc:0 "ด้วยการใช้คุณสมบัติการระเบิดของแร่ระเหย ทำให้เราสามารถแผ้วถางภูมิประเทศที่ยากลำบากได้ในอัตราที่รวดเร็วยิ่งขึ้น"
 edict_crystalline_sensors:0 "เซ็นเซอร์ผลึก"
  edict_crystalline_sensors_desc:0 "ด้วยการใช้ผลึกหายากเพื่อเพิ่มประสิทธิภาพให้แก่เซ็นเซอร์ของเรา ทำให้เราสามารถได้รับภาพสภาพแวดล้อมโดยรอบที่แจ่มชัดดั่งผลึกใส"
 edict_living_metal_construction:0 "การก่อสร้างขนาดใหญ่ด้วยโลหะมีชีวิต"
  edict_living_metal_construction_desc:0 "คุณสมบัติเฉพาะตัวของโลหะมีชีวิตทำให้มันเหมาะสมอย่างยิ่งสำหรับการปรับปรุงการก่อสร้างสิ่งปลูกสร้างขนาดยักษ์"
 edict_fuel_gases:0 "ใช้ก๊าซแปลกประหลาดเป็นเชื้อเพลิง"
  edict_fuel_gases_desc:0 "ก๊าซแปลกใหม่ประเภทต่างๆ ยังสามารถทำหน้าที่เป็นเชื้อเพลิงชั้นยอดสำหรับการเดินทางด้วยความเร็วต่ำกว่าแสง แม้ว่ามันอาจจะไม่ใช่ทางเลือกที่ประหยัดที่สุดก็ตาม"
 edict_shield_gases:0 "ใช้ก๊าซแปลกประหลาดเพื่อเพิ่มโล่พลังงาน"
  edict_shield_gases_desc:0 "ก๊าซแปลกใหม่บางชนิดสามารถนำมาใช้เพื่อเพิ่มประสิทธิภาพการทำงานของโล่พลังงานของยานได้ โดยพวกมันจะสร้างสนามลดแรงปะทะที่ซับซ้อนเพื่อเบี่ยงเบนและบรรเทาการโจมตีของศัตรู"
 edict_motes_kinetic:0 "กระสุนแร่ระเหย"
  edict_motes_kinetic_desc:0 "เราสามารถนำแร่ระเหยมาปรับใช้เป็นสารระเบิดในกระสุนปืนของยานเราได้"
 edict_motes_explosives:0 "ระเบิดแร่ระเหย"
  edict_motes_explosives_desc:0 "ด้วยการใช้แร่ระเหยในการสร้างขีปนาวุธเฉพาะทาง ยานรบของเราจะมีขีดความสามารถในการทำลายล้างที่สูงขึ้น"
 edict_motes_armor:0 "เกราะปฏิกิริยาแร่ระเหย"
  edict_motes_armor_desc:0 "ด้วยการเสริมความแข็งแกร่งให้แก่เกราะยานรบของเราด้วยส่วนประกอบปฏิกิริยา ทำให้ยานของเราสามารถทนทานต่อความเสียหายได้มากขึ้น โดยการลดแรงปะทะของการโจมตีที่เข้ามาด้วยการระเบิดต้านกลับที่ควบคุมไว้"
 edict_crystal_focus:0 "ผลึกสำหรับการโฟกัสอาวุธพลังงาน"
  edict_crystal_focus_desc:0 "ด้วยการเพิ่มการเข้าถึงผลึกหายากให้แก่ยานรบของเรา ทำให้เราสามารถเพิ่มพลังทำลายล้างของอาวุธพลังงานของพวกมันได้"
 edict_nanite_actuators:0 "ตัวกระตุ้นนาไนต์"
 edict_nanite_actuators_desc:0 "$sr_distar_nanoactuator_desc$"
 edict_sight_beyond_sight:0 "ตาที่เหนือกว่าตา"
  edict_sight_beyond_sight_desc:0 "การใช้ ซโร ในปริมาณน้อยมาก(หัวเราะ)จะช่วยให้ผู้นำร่องของเราสามารถสัมผัสถึงวัตถุที่อยู่นอกเหนือขอบเขตของเครื่องสแกนของเราได้"
  edict_zro_catalysis_utopia:0 "การเร่งปฏิกิริยาด้วย Zro"
  edict_zro_catalysis_utopia_desc:0 "ในบรรดาคุณสมบัติลึกลับมากมายของ Zro นั้น รวมถึงความสามารถในการเพิ่มขีดความสามารถของสิ่งมีชีวิตไซออนิกที่เสพมันเข้าไปได้อย่างมาก"
 edict_zro_catalysis_non_utopia:0 "$edict_zro_catalysis_utopia$"
  edict_zro_catalysis_non_utopia_desc:0 "นักวิจัยของเราได้ค้นพบวิธีสังเคราะห์ Zro เพื่อผลิตสารเพิ่มประสิทธิภาพการทำงานที่ไม่ก่อให้เกิดผลข้างเคียงด้านลบใดๆ ต่อผู้ที่เสพมันเข้าไป"

