 cara_fleet1_redeals.title:0 "$cara_fleet1_contact.title$: §Yโอกาสสุดท้าย§!"
 fleet1redealdesc1:0 "คุณพร้อมที่จะคว้าโอกาสครั้งหนึ่งในชีวิตนี้ไว้ ก่อนที่มันจะสูญหายไปตลอดกาลแล้วหรือยัง?"
 fleet1redealdesc2:0 "เราต้องแยกจากกันในไม่ช้า แต่คุณสามารถเก็บผลิตภัณฑ์ชั้นเยี่ยมของเราไว้กับคุณได้ตลอดไป"
 fleet1redealdesc3:0 "คุณเข้าใจดีว่าการมองข้ามข้อเสนอนี้ไปคงเป็นเรื่องที่โง่เขลา ตอนนี้คุณสามารถพิสูจน์ภูมิปัญญานั้นได้แล้ว"
 fleet1redealdesc4:0 "เรียนลูกค้าทุกท่าน — หรือเราควรจะเรียกมิตรสหายดีนะ? — เรากำลังจะออกเดินทางจากดินแดนของคุณแล้ว ให้เราได้นำเสนอสินค้าของเราเป็นครั้งสุดท้ายดีไหม? จนกว่าจะพบกันใหม่ในครั้งต่อไปนะ"
 fleet1redealdesc5:0 "โอกาสสุดท้ายในการทำข้อตกลงนี้ ซึ่งออกแบบมาเพื่อคุณโดยเฉพาะ! คุณไม่อยากพลาดมันหรอก!"

 cara.1002.title:0 "ทำลาย $NAME_Caravaneer_Fleet1_country$ แล้ว"
 cara.1002.desc:1 "เราได้ทำลายพวกศัตรูพืชประจบสอพลอของ $NAME_Caravaneer_Fleet1_country$ เรียบร้อยแล้ว! ผลิตภัณฑ์ที่ต่ำต้อยและพฤติกรรมประจบประแจงของพวกมันจะไม่สร้างมลพิษให้กับกาแล็กซีอีกต่อไป"
 cara.1003.title:0 "$NAME_Caravaneer_Fleet1_country$ ถูกทำลาย"
 cara.1003.desc:1 "เราได้รับรายงานว่า $NAME_Caravaneer_Fleet1_country$ กำลังปิดหน้าร้านเคลื่อนที่โดยมีผลทันที เนื่องจากคาราวานถูกทำลายล้างอย่างย่อยยับ"

 # Fleet 2
 cara_fleet2_contact.title:1 "§Yกองยานคาราวาน:§! ภาคีนูมิสติก"
 fleet2contact1:1 "ต้องขออภัยสำหรับตัวตนที่เสื่อมทรามของเราในจักรวาลนี้ [Root.GetSpeciesNamePlural] พวกเราคือภาคีนูมิสติก พ่อค้าผู้ต่ำต้อยที่รับใช้ นูมา เทพีแห่งโชคลาภ พวกเราถูกเนรเทศลงมาจากสวรรค์เพราะความโลภของพวกเรา และพวกเราได้ละทิ้งทรัพย์สินทางโลกทั้งหมดแล้ว\\n\\n$fleet2contact_explanation$"
 fleet2contact2:1 "ขอให้พรจงสถิตอยู่กับท่าน [Root.GetSpeciesNamePlural] พวกเราคือภาคีนูมิสติก และพวกเรามาเพื่อรับใช้นูมา เทพีแห่งโชคลาภ โดยนำสินค้าอันศักดิ์สิทธิ์ที่สุดมาจากมุมอันห่างไกลของกาแล็กซี\\n\\n$fleet2contact_explanation$"
 fleet2contact3:1 "อา [Root.GetSpeciesNamePlural]! ในที่สุดสายลมแห่งโชคชะตาก็นำพายังดินแดนอันอุดมสมบูรณ์ของพวกท่าน พวกเราคือภาคีนูมิสติก ผู้รับใช้ที่ซื่อสัตย์ของเทพีนูมา และพวกเรามาเพื่อเสนอสินค้าอันได้รับพรของพระนางให้แก่ท่าน\\n\\n$fleet2contact_explanation$"
 fleet2contact4:1 "ยินดีที่ได้พบ [Root.GetSpeciesNamePlural] พวกเราคือภาคีนูมิสติก และสินค้าของเรามีตราประทับอันศักดิ์สิทธิ์ของนูมา เทพีแห่งโชคลาภ พระนางกระซิบมาเป็นเวลานานเกี่ยวกับอารยธรรมอันห่างไกลรอบ ๆ [Root.Capital.GetStarName] และสิ่งมหัศจรรย์ที่เราจะสร้างร่วมกันได้\\n\\n$fleet2contact_explanation$"
 fleet2contact5:1 "[Root.GetSpeciesNamePlural]! การนำทางของทวยเทพได้พาเรามายังดินแดนของพวกท่านพร้อมกับสิ่งมหัศจรรย์มากมาย พวกเราคือภาคีนูมิสติก และข้อตกลงของเราได้รับการรังสรรค์ขึ้นโดยเทพีแห่งโชคลาภด้วยพระนางเอง\\n\\n$fleet2contact_explanation$"
 fleet2contact6:1 "แต่มันคือความจริง! พวกท่านช่างรุ่งเรืองดังที่นูมาได้ทำนายไว้จริง ๆ โชคช่วยคนกล้าดังที่พวกเขากล่าวกัน\\n\\nพวกเราคือภาคีนูมิสติก พ่อค้าธรรมดา ๆ ผู้ทุ่มเทให้กับการบูชาพาณิชยกรรม\\n\\n$fleet2contact_explanation$"
 fleet2contact_explanation:1 "กองยานของเราเดินทางไปตามกระแสพลังงานศักดิ์สิทธิ์แห่งคอสมิก ไม่ว่าสายลมแห่งโชคชะตาจะพัดพาเราไปที่ใด เราจะนำข้อตกลงใหม่ ๆ มาให้ทุกครั้งที่เราเข้าสู่ดินแดนของท่าน\\n\\nสำหรับการบริจาคเพียงเล็กน้อย สิ่งมหัศจรรย์แห่งจักรวาลก็สามารถเป็นของท่านได้\\n\\nธุรกรรมทั้งหมดขอเป็นเครดิตนะคร้าบ..."
 fleet2contact1notinborder:0 "ต้องขออภัยสำหรับตัวตนที่เสื่อมทรามของเราในจักรวาลนี้ [Root.GetSpeciesNamePlural] พวกเราคือภาคีนูมิสติก พ่อค้าผู้ต่ำต้อยที่รับใช้ นูมา เทพีแห่งโชคลาภ พวกเราถูกเนรเทศลงมาจากสวรรค์เพราะความโลภของพวกเรา และพวกเราได้ละทิ้งทรัพย์สินทางโลกทั้งหมดแล้ว\\n\\n$fleet2contact_explanation_notinborder$"
 fleet2contact2notinborder:0 "ขอให้พรจงสถิตอยู่กับท่าน [Root.GetSpeciesNamePlural] พวกเราคือภาคีนูมิสติก และพวกเรามาเพื่อรับใช้นูมา เทพีแห่งโชคลาภ โดยนำสินค้าอันศักดิ์สิทธิ์ที่สุดมาจากมุมอันห่างไกลของกาแล็กซี\\n\\n$fleet2contact_explanation_notinborder$"
 fleet2contact3notinborder:0 "อา [Root.GetSpeciesNamePlural]! ในที่สุดสายลมแห่งโชคชะตาก็นำพายังดินแดนอันอุดมสมบูรณ์ของพวกท่าน พวกเราคือภาคีนูมิสติก ผู้รับใช้ที่ซื่อสัตย์ของเทพีนูมา และพวกเรามาเพื่อเสนอสินค้าอันได้รับพรของพระนางให้แก่ท่าน\\n\\n$fleet2contact_explanation_notinborder$"
 fleet2contact4notinborder:0 "ยินดีที่ได้พบ [Root.GetSpeciesNamePlural] พวกเราคือภาคีนูมิสติก และสินค้าของเรามีตราประทับอันศักดิ์สิทธิ์ของนูมา เทพีแห่งโชคลาภ พระนางกระซิบมาเป็นเวลานานเกี่ยวกับอารยธรรมอันห่างไกลรอบ ๆ [Root.Capital.GetStarName] และสิ่งมหัศจรรย์ที่เราจะสร้างร่วมกันได้\\n\\n$fleet2contact_explanation_notinborder$"
 fleet2contact5notinborder:0 "[Root.GetSpeciesNamePlural]! การนำทางของทวยเทพได้พาเรามายังดินแดนของพวกท่านพร้อมกับสิ่งมหัศจรรย์มากมาย พวกเราคือภาคีนูมิสติก และข้อตกลงของเราได้รับการรังสรรค์ขึ้นโดยเทพีแห่งโชคลาภด้วยพระนางเอง\\n\\n$fleet2contact_explanation_notinborder$"
 fleet2contact6notinborder:0 "แต่มันคือความจริง! พวกท่านช่างรุ่งเรืองดังที่นูมาได้ทำนายไว้จริง ๆ โชคช่วยคนกล้าดังที่พวกเขากล่าวกัน\\n\\nพวกเราคือภาคีนูมิสติก พ่อค้าธรรมดา ๆ ผู้ทุ่มเทให้กับการบูชาพาณิชยกรรม\\n\\n$fleet2contact_explanation_notinborder$"
 fleet2contact_explanation_notinborder:0 "กองยานของเราเดินทางไปตามกระแสพลังงานศักดิ์สิทธิ์แห่งคอสมิก ไม่ว่าสายลมแห่งโชคชะตาจะพัดพาเราไปที่ใด เราจะนำข้อตกลงใหม่ ๆ มาให้ทุกครั้งที่เราเข้าสู่ดินแดนของท่าน\\n\\nน่าเสียดายที่ตอนนี้ยานของเราอยู่นอกขอบเขตอาณาจักรของท่านชั่วคราว แต่ในครั้งต่อไปที่เรามาเยือนน่านฟ้าของท่าน สิ่งมหัศจรรย์แห่งจักรวาลก็อาจเป็นของท่านได้จากการบริจาคเครดิตเพียงเล็กน้อย..."

 cara_fleet2_main.title:0 "$cara_fleet2_contact.title$"
 fleet2hewwo1:1 "มาสิ [Root.GetSpeciesNamePlural]! ดื่มกินจากบ่อน้ำแห่งความมั่งคั่งของนูมิสติกและจะไม่ต้องกระหายอีกต่อไป"
 fleet2hewwo2:1 "จงเดินตามกระแสพลังงานคอสมิกเครดิต [Root.GetSpeciesNamePlural] แล้วมันจะนำท่านไปสู่ความจริง ไม่มีผลิตภัณฑ์ใดจะดีไปกว่าสิ่งที่ประทับตราอันศักดิ์สิทธิ์ของเทพีนูมา..."
 fleet2hewwo3:1 "เมื่อเครดิตเปลี่ยนมือ นูมาจะยิ้มแย้ม"
 fleet2hewwo4:1 "เจ้าเรียกนั่นว่าข้อตกลงที่ยุติธรรมรึ!? เจ้าถ่มน้ำลายใส่หน้านูมา - ถุย!\\n\\nโอ้ แต่เรามีลูกค้ามาเยือน! ทางเราขออภัยอย่างสูงสำหรับการแสดงกิริยาเช่นนั้น บางคนไม่มีความกล้าพอที่จะยอมรับโชคลาภเมื่อมันตกมาถึงตักของพวกเขา"
 fleet2hewwo5:1 "สิ่งมหัศจรรย์มากมายผ่านมือเราไป แต่เราไม่เคยเก็บเข้ากระเป๋าตัวเองเลย มันคือการเสียสละที่เราทำเพื่อให้การก่อสร้าง เทสซาร์ ทาร์วิล(Tesar Tarvil)เสร็จสมบูรณ์ และลูกหลานของเราจะได้เห็นแผ่นดินศักดิ์สิทธิ์อีกครั้งในสักวันหนึ่ง"
 fleet2hewwo6:1 "ความร่ำรวยเป็นภาระต่อจิตวิญญาณ [Root.GetSpeciesNamePlural] ให้พวกเราช่วยเบาแรงพวกท่านเถอะ"
 fleet2hewwo7:1 "การขึ้นภาษีสินค้าโภคภัณฑ์รึ? เงียบซะ เจ้ากำลังลบหลู่นูมา"
 fleet2hewwo8:1 "การบริจาคใด ๆ ที่มอบให้นูมา จักรวาลจะตอบแทนกลับมาเป็นสิบเท่า ยิ่งท่านจ่ายน้อยลงเท่าไหร่ สหายเอ๋ย ท่านก็ยิ่งสูญเสียมากขึ้นเท่านั้น"
 fleet2hewwo9:1 "มาสิ อย่าเขินอายเลย! เลือกชมสินค้าของเราและเข้าร่วมการบูชาเทพีนูมากันเถอะ"
 fleet2hewwo10:1 "ข้อตกลงที่ดีจะมาหาผู้ที่ยอมรับมัน [Root.GetSpeciesNamePlural] ท่านจะเข้าร่วมการแลกเปลี่ยนอันศักดิ์สิทธิ์กับเราหรือไม่?"
 fleet2hewwo11:0 "ผู้ใดที่รักเงิน เงินก็จะรักตอบกลับมา จงปล่อยให้เงินของท่านไหลเวียน และมันจะย้อนกลับมาหาท่านอย่างง่ายดายและมากมายมหาศาล"

 cara_fleet2_deals.title:0 "$cara_fleet2_contact.title$"
 fleetdeal_explanation:0 "\\n\\nเช่นเคย หากท่านต้องการเวลาพิจารณา เราสามารถแจ้งเตือนท่านก่อนที่เราจะออกจากดินแดนของท่าน เพื่อให้โอกาสท่านอีกครั้งในการรับข้อเสนออันเอื้อเฟื้อของเทพี"
 # shrine
 fleet2dealdesc1:1 "ฟังดูสิ ได้ยินไหม? มันคือเสียงของเหรียญที่กำลังไหลมาเทมา ใช่แล้ว [Root.GetSpeciesNamePlural] เราเห็นโชคลาภครั้งใหญ่กำลังมาทางพวกท่าน\\n\\nนูมาได้แสดงนิมิตให้เราเห็นถึงศาลเจ้าเพื่อเป็นเกียรติแก่พระนางบนโลกดวงหนึ่งของพวกท่าน ศาลเจ้าที่จะนำพาความรุ่งเรืองมาสู่ท่านเกินกว่าที่จินตนาการไว้$fleetdeal_explanation$"
 # thralls
 fleet2dealdesc2:1 "พาสปีชีส์ [fleet2_recent_pop_species.GetName] เข้ามา ในระหว่างการจาริกแสวงบุญข้ามกาแล็กซี เราได้ช่วยชีวิตจิตวิญญาณที่หลงทางไว้มากมาย...\\n\\nดูตัวอย่างชั้นยอดนี้สิ ได้รับการศึกษาในด้านศิลปะการบริหารจัดการแบบนูมิสติก ลองดูใน [fleet2_recent_pop_species.GetMouthName] ของเขาสิ? สีตรงนั้นบ่งบอกว่าเป็นบุคคลที่มีสุขภาพแข็งแรงดี พวกเขายังเป็นแรงงานชั้นเยี่ยมอีกด้วย และความสามารถในการสืบพันธุ์ก็น่าทึ่งมาก ท่านว่าอย่างไรล่ะ?$fleetdeal_explanation$"
  # edict
 fleet2dealdesc3:1 "หลับตา (ตัวรับภาพ) ของท่านลง ตอนนี้จงจินตนาการว่าตัวท่านกำลังนอนหงายลอยไปตามกระแสพลังงานเครดิต มุ่งหน้าสู่ภูเขาเครดิตพลังงานที่กองสูงยิ่งกว่าเดิม\\n\\nด้วยเทคนิคการสร้างภาพมโนทัศน์แบบนูมิสติกของเรา ท่านจะเรียนรู้ว่าไม่มีพลังใดจะยิ่งใหญ่ไปกว่าพลังแห่งจิตใจ ท่านเองก็จะหลุดพ้นจากความต้องการทางวัตถุ และเครดิตจะถูกดึงดูดเข้าหาท่านราวกับพวกแมลงขาข้อที่รุมตอมมูลสัตว์$fleetdeal_explanation$"
  # technology
 fleet2dealdesc4:0 "รูปแบบในการไหลเวียนของพลังงาน... พวกมันอยู่ทุกหนทุกแห่งทว่าไม่มีผู้ใดมองเห็น นูมาเพียงผู้เดียวเท่านั้นที่ทำนายการขึ้นลงอันศักดิ์สิทธิ์ของตลาดหุ้นได้ และสำหรับการบริจาคเพียงเล็กน้อย เราจะแบ่งปันปัญญาของพระนางบางส่วนให้กับท่าน$fleetdeal_explanation$"
 # Official
 fleet2dealdesc5:0 "ขอให้เราได้แนะนำหนึ่งในผู้นำทางจิตวิญญาณที่ยอดเยี่ยมที่สุดของเรา แชควาห์(ถอนหายใจ)ระดับเก้า ผู้มีสมาธิจิตและสายตาเพ่งในที่สูงล้ำ ภายใต้การนำทางของเทพี ธุรกิจบนโลกของพวกท่านจะเจริญรุ่งเรือง\\n\\nสิ่งที่เราขอมีเพียงการบริจาคเครดิตเล็กน้อยเท่านั้น...$fleetdeal_explanation$"
  # Crystals for pops
 fleet2dealdesc6:0 "[Root.GetSpeciesNamePlural] ผู้ทรงเกียรติ เรามีข้อเสนอสุดพิเศษสำหรับพวกท่าน... นูมาได้เห็นศักยภาพอันยิ่งใหญ่ในตัวผู้คนของท่าน และปรารถนาจะต้อนรับประชากรของท่านบางส่วนเข้าสู่กองทัพของพระนาง เป็นการตอบแทน คริสตัลประเมินค่าไม่ได้เหล่านี้จะเป็นของพวกท่าน...$fleetdeal_explanation$"
 # Cruiser
 fleet2dealdesc7:0 "จงดู ฟอร์จูนส์ เฟเวอร์(ฟอร์จูนโปรด)ยานคุ้มกันที่ได้รับความไว้วางใจสูงสุดของเรา... เธอได้รับการคัดเลือกจากเทพีด้วยพระนางเองเพื่อคุ้มกันสินค้าอันศักดิ์สิทธิ์ของเราข้ามกาแล็กซี และได้ขัดขวางผู้ลบหลู่มากมายในยุคของเธอ ไม่ว่าจะเป็นโจรสลัด คนนอกรีต อสูรกายแห่งความว่างเปล่า ทุกผู้ทุกคนที่ขัดขวางเส้นทางศักดิ์สิทธิ์ของนูมา! ทว่าเธอยังคงดูใหม่เอี่ยม...\\n\\nใช่แล้ว เธอได้รับใช้โชคลาภมาอย่างดี และในตอนนี้ ด้วยการบริจาคเพียงเล็กน้อย เธออาจจะมารับใช้พวกท่านด้วย...$fleetdeal_explanation$"
 # Districts for Machines
 fleet2dealdesc8:0 "ขออภัยที่เราก้าวก่าย แต่เราสังเกตเห็นว่าดาวเคราะห์ของท่าน §Y[fleet2deal8planet.GetName]§! มีศักยภาพเฉพาะตัวที่ยังไม่ได้รับการดึงออกมาใช้ ช่องระบายสามารถเปิดออกสู่แกนกลางอันศักดิ์สิทธิ์ของมัน ซึ่งกระแสแห่งความมั่งคั่งจะไหลรินออกมาจากที่นั่น!\\n\\nให้เราเปิดเผยความลับที่ซ่อนอยู่ของดินแดนพวกท่านเถอะ แน่นอนว่าเราต้องการค่าตอบแทนเล็กน้อยเป็นการแลกเปลี่ยน$fleetdeal_explanation$"
 fleet2deal8.tooltip:0 " มอบให้: $mod_district_generator_max_add$: §G+3§!\\n $MOD_PLANET_MAX_DISTRICTS_ADD$: §G+2§!"
 # MI Upkeep mod
 fleet2dealdesc9:0 "เทวีนูมาทรงแย้มพระสรวลให้ท่านในวันนี้ [Root.GetSpeciesName] พระนางได้แสดงให้เราเห็นถึงวิธีปรับแนวตั้งหน่วยของท่านให้สอดคล้องกับชั้นบรรยากาศแม่เหล็กของ §Y[fleet2deal9planet.GetName]§! ได้ดียิ่งขึ้น ด้วย §Gแผ่นแม่เหล็กนูมิสติก(เสียงแม่เหล็ก)§! อันศักดิ์สิทธิ์และจดสิทธิบัตรของเรา โดรนของท่านบน §Y[fleet2deal9planet.GetName]§! จะใช้พลังงาน £energy£ §Y$energy$§! อันศักดิ์สิทธิ์ของท่านอย่างประหยัดขึ้น\\n\\nเป็นการแลกเปลี่ยน เราขอให้มีการจัดพิธีกรรมแด่พระผู้เป็นเจ้าบนผืนดินของพวกท่าน ท่านว่าอย่างไร?$fleetdeal_explanation$"
 # Decision
 fleet2dealdesc10:0 "ลึกลงไปในภวังค์แห่งสมาธิ นักบวชหญิงคนหนึ่งของเราได้มอบกายถวายชีวิตแด่นูมา และเอ่ยความจริงอันศักดิ์สิทธิ์ของเทพีออกมาเป็นภาษาแปลก ๆ อย่างรวดเร็ว แม้ว่าตัวนักบวชหญิงจะไม่รอดชีวิตจากการทดสอบครั้งนี้ แต่พวกเราได้ถอดรหัสจากคำพูดของเธอออกมาเป็นอัลกอริทึมที่สามารถเปลี่ยนเลขศูนย์และเลขหนึ่งให้กลายเป็นเงินล้านได้\\n\\nอย่าให้การเสียสละของเธอสูญเปล่าเลย [Root.GetSpeciesNamePlural] อัญเชิญโชคลาภเข้ามาสู่แกนกลางดาวเคราะห์ของท่าน แล้วพระนางจะไม่ทอดทิ้งท่านอย่างแน่นอน$fleetdeal_explanation$"
 # Repeatable options
 fleet2dealdesc11:1 "ให้นูมาเพ่งมองเข้าไปในแกนกลางของพวกท่านสิ [Root.GetSpeciesNamePlural] แล้วพระนางจะบอกว่าอะไรคือสิ่งที่พวกท่านต้องการ เดี๋ยวก่อนนะ... คำตอบสำหรับปัญหาของพวกท่านกำลังปรากฏขึ้นต่อหน้าข้าพเจ้า ใช่แล้ว ข้าพเจ้าเห็นมันแล้ว!"
 fleet2dealdesc11.a:0 "$fleet2dealdesc11$\\n\\nมันคือ... ยานคุ้มกันอีกหนึ่งลำ ใช่หรือไม่?"
 fleet2dealdesc11.b:0 "$fleet2dealdesc11$\\n\\nมันคือ... แก๊สหายาก ใช่หรือไม่? อืม... และกลิ่นช่างหอมหวลอะไรอย่างนี้! นี่คือกลิ่นอายแห่งความสำเร็จ! สูดหายใจลึก ๆ เอาแก๊สเหล่านี้เข้าไปแล้วท่านจะได้พบกับนูมาตัวเป็น ๆ แต่ขอแนะนำไว้ก่อนว่า การสูดดมมากเกินไปอาจทำให้เยื่อเมือกของท่านแห้งได้"
 fleet2dealdesc11.c:0 "$fleet2dealdesc11$\\n\\nแต่นั่นแน่อยู่แล้ว! มันคือ... เครดิต... เครดิตเสมอมา เครดิตทำให้โลกหมุนไป เราจะปาเครดิตใส่ปัญหาของพวกท่าน แล้วปัญหาของพวกท่านก็จะปลาสนาการไป สรรเสริญนูมา!"
 # minor artifacts
 fleet2dealdesc12:1 "ด้วยการนำทางของนูมา เราได้พบกับโบราณวัตถุโบราณเหล่านี้ซึ่งเป็นแรงบันดาลใจอย่างมากสำหรับการทำสมาธิของพวกเรา\\n\\nแน่นอนว่าการต้องแยกจากพวกมันทำให้เราเจ็บปวด แต่เรารู้สึกว่าพวกท่าน [Root.GetSpeciesNamePlural] จะได้เรียนรู้อะไรมากมายจากการศึกษาพวกมัน\\n\\nเรากำลังต้องการวัสดุขั้นสูงบางอย่าง ดังนั้นบางทีเราอาจจะทำข้อตกลงกันได้..?$fleetdeal_explanation$"
 cara_fleet2_deal:0 "แสดงสินค้าของคุณให้เราดู"
 cara_fleet2_take_deal:0 "ตกลง!"
 cara_fleet2_dealtaken:0 "ขอให้พรจงสถิตอยู่กับท่าน [Root.GetSpeciesNamePlural] สำหรับการค้าของท่านทำให้เราเข้าใกล้พระผู้เป็นเจ้ามากขึ้น"
 cara_fleet2_exit:0 "$cara_fleet1_exit$"

 fleet2getback:1 "ไม่ใช่ตอนนี้ โปรดกลับมาหาเราในภายหลัง"
 fleet2getbackreply:0 "ตามที่ท่านปรารถนา [root.GetSpeciesNamePlural]! เราจะติดต่อกลับมาอีกครั้งก่อนที่เราจะไป แต่โปรดจำไว้ว่า นูมาเป็นนายหญิงที่แปรปรวนง่าย หากใจของพระนางเปลี่ยนไป ข้อตกลงอาจจะเปลี่ยนไปเช่นกัน..."

 cara_fleet2_redeals.title:0 "$cara_fleet2_contact.title$: §Yการเรียกครั้งสุดท้าย§!"
 fleet2redealdesc1:1 "การพลาดโอกาสในการลงทุน สหายเอ๋ย คือความผิดพลาดที่มีราคาแพงที่สุดที่ท่านจะเคยทำ ท่านแน่ใจหรือว่าสามารถมองข้ามข้อเสนอของเราได้? นี่คือโอกาสสุดท้ายของท่านก่อนที่เราจะออกจากดินแดนของพวกท่าน"
 fleet2redealdesc2:1 "นูมาเป็นนายหญิงที่โอบอ้อมอารี พวกเรากำลังจะไปอยู่แล้วเมื่อพระนางย้ำเตือนเรา - พวก [Root.GetSpeciesNamePlural] ไง! พวกเขาต้องได้รับโอกาสสุดท้ายในข้อตกลงครั้งหนึ่งในชีวิต ก่อนที่เราจะจากไป!"
 fleet2redealdesc3:1 "ในช่วงเวลาเล็ก ๆ นี่เองที่โชคชะตาของท่านจะถูกตัดสิน เครดิตที่จ่ายไปอย่างคุ้มค่าที่นี่และที่นั่น วันหนึ่งจะรวมเป็นล้าน ลำธารสายเล็ก ๆ บรรจบกันกลายเป็นมหาสมุทร\\n\\nโชคชะตาได้มอบโอกาสให้ท่านอีกครั้งในการรับข้อเสนอของเราก่อนที่เราจะจากไป"
 fleet2redealdesc4:1 "อา [Root.GetSpeciesNamePlural] ท่านได้ยินเสียงนูมาเรียกหาหรือไม่? ในไม่ช้าเราต้องออกจากดินแดนของพวกท่านแล้ว แต่ก่อนอื่น ท่านได้พิจารณาข้อเสนอของเราหรือยัง?\\n\\nชั่งน้ำหนักทางเลือกของท่านให้ดี เพราะทางเลือกหนึ่งอาจนำท่านไปสู่โชคลาภอันยิ่งใหญ่ แต่อีกทางหนึ่งอาจนำไปสู่ความพินาศ ทางไหนล่ะที่ท่านจะเลือก?"
 fleet2redealdesc5:1 "[Root.GetSpeciesNamePlural] ในไม่ช้าเราจะออกจากดินแดนของพวกท่าน เราต้องไปทุกที่ที่กระแสพลังงานเครดิตคอสมิกพัดพาเราไป ท่านได้พิจารณาข้อเสนอของเราหรือยัง?"
 fleet2product1_tooltip:1 "ปลดล็อกการสร้าง §Yศาลเจ้านูมิสติก§! §G+1§! นำโชคลาภมาสู่ดาวเคราะห์ที่ท่านเลือก"
 fleet2product2_tooltip:1 "ประชากร £pop£ §Hป๊อป§! $NAME_Caravaneer_Fleet2_species_plural$ §G200§! คน เดินทางมาถึง [Root.Capital.GetName]"
 fleet2product3_tooltip:1 "ประกาศคำสั่ง §Yการแสดงแผนภาพและตัวเลข§! §G+1§!"
 fleet2product4_tooltip:1 "เทคโนโลยี §Yการจำลองข้อมูลนูมิสติก(สถิติการจําลอง)§! §G+1§!"
 fleet2product5_tooltip:1 "§Hเจ้าหน้าที่§! §Gสกิล 3§! ซึ่งได้รับพรจากเทพีแห่งโชคลาภ เข้าร่วม [Root.GetName]"
 fleet2product6_tooltip:2 "ท่านได้รับ £rare_crystals£ §Y$rare_crystals$§! §G200§! ชิ้น แลกกับประชากร £pop£ §Hป๊อป§! §R100§! คน"
 fleet2product7_tooltip:0 "§Y$caravaneer_cruiser_01$§! §G+1§!"
 fleetproduct10_tooltip:0 "§G+1§! การตัดสินใจ §Yใช้อัลกอริทึมศักดิ์สิทธิ์§!"

 cara.2002.title:0 "ทำลาย $NAME_Caravaneer_Fleet2$ แล้ว"
 cara.2002.desc:0 "สืบเนื่องมาจากการปะทะในระบบดาว [From.From.solar_system.GetName] กองยาน [From.From.GetName] มีความยินดีที่จะรายงานว่า $NAME_Caravaneer_Fleet2_fleet$ ถูกทำลายเรียบร้อยแล้ว\\n\\nคาราวานของ $NAME_Caravaneer_Fleet3_species$ ที่เคยคึกคัก บัดนี้ไม่เหลืออะไรนอกจากเศษซากอวกาศ เราจะไม่ต้องถูกรบกวนโดยการปรากฏตัวที่เสแสร้งเป็นคนดีของพวกมันอีกต่อไป"
 cara.2003.title:0 "$NAME_Caravaneer_Fleet2$ ถูกทำลาย"
 cara.2003.desc:0 "ข่าวสารมาถึง [Root.Capital.GetName] ว่า $NAME_Caravaneer_Fleet2_fleet$ ไม่มีอยู่อีกต่อไปแล้ว\\n\\nหลังจากการปะทะกับ [From.GetName] คาราวานของ $NAME_Caravaneer_Fleet2_species$ ที่เคยคึกคัก บัดนี้ไม่เหลืออะไรนอกจากเศษซากอวกาศ\\n\\nจุดจบอันน่าสลดใจสำหรับผู้ที่รับใช้เทพีแห่งโชคลาภด้วยพระนางเอง"
 cara.2003.a:0 "ช่างน่าเสียดาย"
 cara_fleet2_contacted:0 "$cara_fleet1_contacted$"

 # Fleet 3
 cara_fleet3_contact.title:0 "§Yกองยานคาราวาน:§! วิสาหกิจอุตสาหกรรมแร็กเก็ต"
 fleet3contact1:1 "[Root.GetSpeciesName]! เราขอทักทายท่าน เราคือผู้ดำเนินการของ $NAME_Caravaneer_Fleet3$ สมาชิกแห่ง $NAME_Caravaneer_Home$\\n\\nเราเดินทางข้ามหมู่ดาว เรามองดูทุกสิ่งที่ส่องสว่าง เรารวบรวม และเราแลกเปลี่ยน!\\n\\n$fleet3contact_explanation$"
 fleet3contact2:0 "ขอทักทายพวกท่าน [Root.GetSpeciesNamePlural] จาก $NAME_Caravaneer_Fleet3$! พวกเราคือโบรกเกอร์ นักทำข้อตกลงผู้เดินทางข้ามดวงดาวมาจาก $NAME_Tradestation_Tungle$\\n\\n$fleet3contact_explanation$"
 fleet3contact3:0 "ยินดีที่ได้พบ ยินดีที่ได้พบ [Root.GetSpeciesName] เครดิตของท่านสะสมอยู่มากมาย ทว่ามีความว่างเปล่าในจิตวิญญาณของท่านใช่หรือไม่? เรารู้สึกได้ เรามาพร้อมกับมืออันรวดเร็ว นำสินค้ามามากมาย!\\n\\nพวกเราคือ $NAME_Caravaneer_Fleet3$ พ่อค้าแห่ง $NAME_Caravaneer_Home$\\n\\n$fleet3contact_explanation$"
 fleet3contact_explanation:0 "เราผ่านอวกาศของท่านอย่างสงบสุข เพียงเพื่อซื้อ เพื่อขาย §Hกิ๊สส!§! เราจะเสนอข้อตกลงที่ดีและสิ่งต่าง ๆ มากมายให้แก่ท่าน เราจะคุยกันอีกครั้งก่อนเราจากไป\\n\\nหากท่านเรียกหาเรา $NAME_Caravaneer_Home$ จะตอบรับอย่างแน่นอน"
 cara_fleet3_contacted:0 "$cara_fleet1_contacted$"
 cara_fleet3_exit:0 "$cara_fleet1_exit$"
 fleet3contact1notinborder:1 "[Root.GetSpeciesName]! เราขอทักทายท่าน เราคือผู้ดำเนินการของ $NAME_Caravaneer_Fleet3$ สมาชิกแห่ง $NAME_Caravaneer_Home$\\n\\nเราเดินทางข้ามหมู่ดาว เรามองดูทุกสิ่งที่ส่องสว่าง เรารวบรวม และเราแลกเปลี่ยน!\\n\\n$fleet3contact_explanation_notinborder$"
 fleet3contact2notinborder:0 "ขอทักทายพวกท่าน [Root.GetSpeciesNamePlural] จาก $NAME_Caravaneer_Fleet3$! พวกเราคือโบรกเกอร์ นักทำข้อตกลงผู้เดินทางข้ามดวงดาวมาจาก $NAME_Tradestation_Tungle$\\n\\n$fleet3contact_explanation_notinborder$"
 fleet3contact3notinborder:0 "ยินดีที่ได้พบ ยินดีที่ได้พบ [Root.GetSpeciesName] เครดิตของท่านสะสมอยู่มากมาย ทว่ามีความว่างเปล่าในจิตวิญญาณของท่านใช่หรือไม่? เรารู้สึกได้ เรามาพร้อมกับมืออันรวดเร็ว นำสินค้ามามากมาย!\\n\\nพวกเราคือ $NAME_Caravaneer_Fleet3$ พ่อค้าแห่ง $NAME_Caravaneer_Home$\\n\\n$fleet3contact_explanation_notinborder$"
 fleet3contact_explanation_notinborder:0 "เราแล่นผ่านอวกาศของท่านอย่างสงบสุข เพียงเพื่อซื้อ เพื่อขาย! เราจะเสนอข้อตกลงที่ดีและสิ่งต่าง ๆ มากมายให้แก่ท่าน ตอนนี้ยานของเรายังไม่ได้อยู่ในพื้นที่ §Hกิ๊สส!§! เราจะพูดคุยกับท่านในเร็ว ๆ นี้เมื่อเรากลับมา\\n\\nหากท่านเรียกหาเรา $NAME_Caravaneer_Home$ จะตอบรับอย่างแน่นอน"

 cara_fleet3_main.title:0 "$cara_fleet3_contact.title$"
 fleet3hewwo1:0 "ฉันอธิบายไปแล้วไง ให้เปลี่ยนเส้นทางเครื่องแปลงพลังงานไปยังท่อร่วมสำรอง ไม่ใช่ เครื่องแปลงพลังงานตัวนั้น! §Hกิ๊สส!§! ฉันต้องทำเองทุกอย่างเลยหรื--\\n\\nโอ๊ะ! ลูกค้า! ยินดีต้อนรับครับ ยินดีต้อนรับ เรามีสินค้ามากมาย มีของเสนอขายหลากหลายประเภท ทั้งหมดขนส่งอย่างปลอดภัยข้ามดวงดาวมาเพื่อความสะดวกของพวกท่าน!"
 fleet3hewwo2:0 "พวกท่านชอบโลหะผสมไหม §Hกิ๊สส?§! ชอบพวกโลหะและแก๊สต่าง ๆ หรือเปล่า? แรงงานที่ขยันขันแข็งล่ะ? แร่ธาตุล้ำค่าล่ะ? ใช่แล้ว เราคิดว่าพวกท่านคงชอบมัน"
 fleet3hewwo3:0 "โอ้ [Root.GetSpeciesNamePlural] ของที่ขนมารอบล่าสุด! พวกท่านจะไม่เชื่อสายตาตัวเองแน่ §Hกิ๊สส!§! ลังแล้วลังเล่าล้นทะลักไปด้วยยุทโธปกรณ์! เป็นปริมาตรหลายลูกบาศก์ตันเลยทีเดียว! เชิญสิครับ เชิญมาดู"
 fleet3hewwo4:0 "ไม่น่าไปเชื่อใจพวกมันเลย ไม่น่าทำข้อตกลงนั้นเลย พวก [scammer_country.GetSpeciesNamePlural] ที่โสโครก! §Hกิ๊สส!§!\\n\\nโอ๊ะ [Root.GetSpeciesNamePlural] เราขอทักทายท่าน ท่านอยากจะทำการค้าด้วยไหม?"
 fleet3hewwo5:0 "มันไม่ใช่เศษซากโบราณหรอก มันคือของโบราณต่างหาก! ลองคิดดูสิ §Hกิ๊สส§! มันอยู่รอดมาได้ตั้งหลายศตวรรษแล้ว สร้างมาเพื่อความทนทานแท้ ๆ!"
 fleet3hewwo6:0 "สนิมรึ? สนิมอะไรกัน?\\n\\nโอ๊ะ สนิมนั่นน่ะเหรอ แค่ขูดออกเอง ขูด ขูด ขูด แล้วก็จะดีเหมือนใหม่เลย!"
 fleet3hewwo7:0 "$NAME_Ketlings$ รึ? ใช่ เรารู้จักพวกมัน อดีตพี่น้องของเราเอง เมื่อหลายชั่วอายุคนก่อน นานมาแล้ว พวกมันไม่ชอบและไม่ยอมรับที่เราฉลาดกว่าพวกมัน! เก็บเกี่ยว ค้นหา และแย่งชิงเก่งกว่า ยิ่งใหญ่กว่า พวกมันก็เลยส่งเราออกไป ลอยเคว้งคว้างอยู่ในความว่างเปล่า!\\n\\nไม่เป็นไรหรอก ตอนนี้พวกเราแข็งแกร่งขึ้นแล้ว โดยไม่มีพวกมัน"
 fleet3hewwo8:0 "ดูไซโลเครดิตของพวกท่านสิ [Root.GetSpeciesName] เต็มจนแทบจะระเบิดอยู่แล้ว! ให้เราช่วยแบ่งเบามันเถอะ ให้เราช่วยท่านนะ"

 cara_fleet3_deals.title:0 "$cara_fleet3_contact.title$"
 fleet3dealdesc1:0 "เรามีแร่ดิบ แร่อันอุดมสมบูรณ์ที่ส่องสว่างเจิดจ้า แงะออกมาจากก้อนหินโดยตรงเลย! แร่ธาตุแวววาวสำหรับ [Root.GetName]\\n\\nแต่ทว่าพวกเราหิวโหยเหลือเกิน! มอบ [Root.GetFleet3ScaledCostDeal1] ให้แก่เรา และเราจะจัดส่ง [Root.GetFleet3ScaledProductDeal1] ให้แก่เหล่านักสร้างและนักพัฒนาของท่าน"
 fleet3dealdesc2:0 "เรามีผู้นํา เหมาะกับ[Root.GetName]! [Root.GetFleet3ProductDeal2]\n\nมอบ [Root.GetFleet3CostDeal2] ให้เรา แล้วผู้นำคนนี้ ก็จะเป็นของคุณ!"
 fleet3dealdesc3:1 "เรามีแรงงานดี ๆ ให้พวกท่าน ทั้งพวกแบกหาม ลากจูง ดึง และทำความสะอาด! สุขภาพแข็งแรง ฉลาดเฉลียว มอบโลหะผสม £alloys£ §R2000§! $alloys$ ให้เรา แล้วเราจะส่งประชากร £pop£ ประชากร $NAME_Caravaneer_Fleet3_species$ §G300§! คนไปยังดาวเคราะห์ดวงหนึ่งของท่าน\\n\\nอะไรนะ? ประวัติอาชญากรรมเหรอ? เกรงว่าเอกสารเหล่านั้นจะหายไปแล้วล่ะสิ §Hกิ๊สส!§!"
 fleet3dealdesc3machi:2 "เรามีแรงงานดี ๆ ให้พวกท่าน ทั้งพวกแบกหาม ลากจูง ดึง และทำความสะอาด! สุขภาพแข็งแรง ฉลาดเฉลียว มอบโลหะผสม £alloys£ §R2000§! $alloys$ ให้เรา แล้วเราจะส่งประชากร £pop£ ประชากร $NAME_Caravaneer_Fleet3_robot$ §G300§! คนไปยังดาวเคราะห์ดวงหนึ่งของท่าน\\n\\nอะไรนะ? ประวัติอาชญากรรมเหรอ? เกรงว่าเอกสารเหล่านั้นจะหายไปแล้วล่ะสิ §Hกิ๊สส!§!"
 fleet3dealdesc4:0 "ดูสิ [Root.GetFleet3ProductDeal4] [Root.GetFleet3CostDeal4]"
 fleet3dealdesc5:1 "เรามีแบบแปลน การออกแบบ! สำหรับอาคารที่ล้ำสมัยและมีเอกลักษณ์มาก นั่นคือ §G$building_waste_reprocessing_center$§! เพื่อแปลงเศษขยะและของเสียของพวกท่านให้กลายเป็นพลังงานกระแสสูงและแร่ธาตุที่มีประโยชน์\\n\\nแต่พวกเราต้องการ... คนงาน เกิดอุบัติเหตุร้ายแรงขึ้นบนแท่นขุดเจาะ715-บี§Hกิ๊สส!§! ส่งประชากร £pop£ ประชากร §H$pop_cat_worker$§! ระดับ §R300§! คนมาให้เรา แล้วเราจะมอบแบบแปลนนี้ให้แก่ท่าน"
 fleet3dealdesc5_gesta:2 "เรามีแบบแปลน การออกแบบ! สำหรับอาคารที่ล้ำสมัยและมีเอกลักษณ์มาก นั่นคือ §G$building_waste_reprocessing_center$§! เพื่อแปลงเศษขยะและของเสียของพวกท่านให้กลายเป็นพลังงานกระแสสูงและแร่ธาตุที่มีประโยชน์\\n\\nแต่พวกเราต้องการ... คนงาน เกิดอุบัติเหตุร้ายแรงขึ้นบนแท่นขุดเจาะ715-บี§Hกิ๊สส!§! ส่งประชากร £pop£ ประชากร §H$pop_cat_simple_drone$§! ระดับ §R300§! คนมาให้เรา แล้วเราจะมอบแบบแปลนนี้ให้แก่ท่าน"
 fleet3dealdesc6:0 "เรามีข้อเสนอพิเศษ เทคโนโลยีที่เลียนแบบไม่ได้และถูกพัฒนาขึ้นโดย $NAME_Caravaneer_Fleet3$ เท่านั้น!\\n\\nท่านมีปัญหาในการเจาะระบบโครงข่ายป้องกันของดาวเคราะห์หรือไม่? เราสามารถแสดงวิธีการทิ้งระเบิดที่ได้รับการปรับปรุงซึ่งมีความก้าวหน้าและใช้เทคนิคขั้นสูงให้ท่านเห็นได้ เราเรียกมันว่า... §G$ORBITAL_TRASH_1$§!!\\n\\nมอบ [Root.GetFleet3CostDeal6] ให้เรา จากนั้นเราจะแสดงวิธีการให้ท่านดู และ §Hกิ๊สส!§! ท่านจะมีส่วนประกอบที่จะนำไปติดตั้งบนยานของพวกท่านได้"
 fleet3dealdesc7:1 "เราสังเกตเห็นสถานีขุดเจาะในวงโคจรของดาว §Y[fleet3deal7planet.GetName]§! ของท่าน มันใช้ขุดเจาะพลังงานใช่ไหม? เราช่วยได้ เราสามารถส่งดาวเทียมที่ติดตั้งเทคโนโลยีอันชาญฉลาดให้แก่ท่าน! เราเรียกมันว่า §G$racket_energy_extractor$§!!\\n\\nมันจะยังคงโคจรอยู่ และช่วยเพิ่มปริมาณพลังงาน £energy£ §Y$energy$§! ที่ท่านได้รับจากพื้นผิวของ §Y[fleet3deal7planet.GetName]§!\\n\\n[Root.GetFleet3CostDeal7]"
 fleet3dealdesc8:1 "ท่านต้องการพลังงาน §Y$energy$§! ใช่หรือไม่? เพื่อช็อตและจุดชนวนไปตามวงจรนับล้านที่ขับเคลื่อนสายพันธุ์ของท่าน? เราช่วยได้นะ\\n\\nด้วยการใช้ §G$racket_generator_regulator$§! เราสามารถเพิ่มความสามารถของ §Y[technician_drone.GetNamePlural]§! ของท่านในการทำงานร่วมกับเครื่องจักรในเขต §Y$district_generator_plural$§! ขึ้นถึงยี่สิบห้าเปอร์เซ็นต์! เราจะติดตั้งมันบน §Y[fleet3deal8planet.GetName]§! หากท่านให้ความช่วยเหลือเราเพียงเล็กน้อย\\n\\n[Root.GetFleet3CostDeal8]"
 fleet3dealdesc9:1 "เรามียาน! ยานพิฆาต §G$destroyer$§!: ดีมาก รวดเร็ว แข็งแกร่ง! ติดตั้งอุปกรณ์ครบครัน! แน่นอนว่าเราไม่ได้กำจัดมันทิ้งเพราะมีปัญหาอะไรหรอย โอ้ ไม่ใช่เลย! ไม่มีเวลาปล่อยให้ช่างเครื่องของท่านตรวจหรอกนะ §Hกิ๊สส!§! ท่านอยากได้ยานลำนี้ใช่ไหมล่ะ?\\n\\nมอบแร่ธาตุ £minerals£ §R2000§! $minerals$ ให้เรา แล้วยานลำนี้จะเป็นของท่าน"
 cara_fleet3_deal:0 "คุณสามารถเสนออะไรให้เราได้บ้าง?"
