 fleet1cost3:0 "£unity£ §R500§! $unity$! กระบวนการทางกลในการดูดซับจิตวิญญาณร่วมแห่งยุคสมัย(ถอนหายใจ)นั้นยังไม่เป็นที่เข้าใจกันดีนักและอาจสร้างความปั่นป่วนใจได้ ทว่ามันปลอดภัยอย่างสมบูรณ์ไร้อันตรายใด ๆ"
