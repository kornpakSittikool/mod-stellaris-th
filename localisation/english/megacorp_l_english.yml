 cara_home_lootbox.title:0 "$lootboxes$"
 lootboxdesc1:1 "§E$lootbox$ โบราณวางอยู่บนแท่นอันหรูหรา มันต้องเต็มไปด้วยความมั่งคั่งอันล้นพ้นอย่างแน่นอน§!"
 cara_home_lootbox_explain:0 "$lootboxes$ คืออะไร?"
 cara_home_lootbox_explain.reply:0 "มันเป็นเรื่องเก่าแก่ แต่ไม่ได้ยาวนัก\\n\\nเมื่อตอนที่กองคาราวานมารวมตัวกันครั้งแรกและได้ก่อตั้ง [caravaneer_home_country.GetName] ขึ้น ได้มีบัญญัติไว้ว่าสินค้าบางส่วนที่สุ่มขึ้นมาจำนวนเล็กน้อยที่ผ่านสถานีนี้ในแต่ละปีจะถูกยึด นำไปใส่ในตู้คอนเทนเนอร์ที่ปิดสนิท และเก็บไว้ในห้องเก็บสินค้าที่ชั้นล่างสุดของสถานี ประเพณีนี้ได้รับการสืบทอดมาตั้งแต่ครั้งโบราณกาล และห้องเก็บสินค้าเพิ่งจะเต็มไปเมื่อไม่นานมานี้\\n\\nตอนนี้จึงเป็นหน้าที่ของเราที่จะขาย $lootboxes$ ที่ถูกปิดผนึกเหล่านี้"
 cara_home_lootbox_contents:0 "มีอะไรอยู่ข้างใน $lootbox$?"
 cara_home_lootbox_contents.reply:0 "เราถูกห้ามไม่ให้รู้ ข้อมูลนั้นมีไว้สำหรับผู้ซื้อเท่านั้น\\n\\nสิ่งที่เราทราบคือ สิ่งของข้างในนั้นเคยถูกมองว่ามีค่าในบางช่วงของประวัติศาสตร์ชาวคาราวาน แม้ว่าจะมีหลักฐานบางอย่างระบุว่าตู้คอนเทนเนอร์ $lootbox$ เหล่านี้อาจเคยถูกใช้เป็นที่ทิ้งขยะในช่วงรัชสมัยที่สามอันแสนสั้นของ นายหน้าวิปลาส ก็ตาม..."

 openedlootboxdesc1:0 "§E$lootbox$ นั้น... §Rว่างเปล่า§!.\\n\\nความผิดหวังอันขมขื่นกัดกินจิตใจของคุณ ในขณะที่คุณพยายามรักษาความเยือกเย็นเมื่อต้องเผชิญหน้ากับความอัปยศอดสูจากความเสี่ยงดวงครั้งนี้ ระดับความชื้นพุ่งสูงขึ้นกะทันหัน หรืออวัยวะรับภาพของคุณมีน้ำตาคลอขึ้นมาเองกันแน่? สายตาของคุณพร่าเลือน ทว่าความว่างเปล่าของ $lootbox$ ยังคงปรากฏเด่นชัดอยู่ตรงหน้า\\n\\nแต่ในตอนที่ความมืดมนแห่งการมีอยู่ทำท่าว่าจะกลืนกินคุณ มันก็กลับถูกพัดหายไป ความรู้สึกนี้คืออะไรกัน? ขณะที่คุณครุ่นคิดถึง $ccoinz$ ที่หามาด้วยหยาดเหงื่อแรงงานซึ่งสูญเสียไป ความตื่นเต้นจากก้นบึ้งในการเปิด $lootbox$... คุณกลับเปี่ยมไปด้วย §Gความรู้สึกภาคภูมิใจและความสำเร็จอันยากจะอธิบาย§!§!"
 openedlootboxdesc2:0 ""
 openedlootboxdesc3:0 "openedlootboxdesc3"
 openedlootboxdesc4:0 "เปิด/ ปิด ลูกเล่นกับหน้าต่าง"
 openedlootboxdesc5:0 "เปิด/ ปิด ลูกเล่นกับหน้าต่าง"
 buying_boxes_desc:0 "เอาล่ะ ฟังนะ เราเข้าใจแล้ว คุณรักกล่องเรลิควารี! แม้ว่าปกติเราจะจำกัดจำนวนขายให้ลูกค้าแต่ละราย แต่เรายอมเป็นกรณีพิเศษให้คุณเลย นับจากนี้เป็นต้นไป เชิญเพลิดเพลินกับสิทธิพิเศษในการซื้อกล่องเรลิควารีได้โดยตรง โดยจะเพิ่มราคาค่า §Yแหล่ง พลังงาน§! เพียงเล็กน้อยในแต่ละครั้งเท่านั้น"

