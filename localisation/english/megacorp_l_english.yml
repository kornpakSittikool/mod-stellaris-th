 decision_discourage_growth:0 "กีดกันการเพิ่มประชากรในดาวเคราะห์"
 decision_discourage_growth_desc:1 "หากทรัพยากรและพื้นที่อยู่อาศัยมีอยู่อย่างจำกัด การวางแผนประชากรอาจมีความจำเป็นบนโลกใบนี้ โดยจะมีการนำมาตรการต่างๆ มาใช้เพื่อจำกัดการเติบโตของประชากรโดยสมัครใจ"
 decision_discourage_growth_effects_short:0 "ลด £pop£ §Hการเติบโตของประชากร§! บนดาวเคราะห์ดวงนี้\\n\\nเพิ่ม §Rค่าบำรุงรักษาประชากร§! ในขณะที่มีผลใช้งาน"
 planet_growth_discouraged:0 "กีดกันการเพิ่มประชากร"
 planet_growth_discouraged_desc:1 "โลกใบนี้ได้ใช้มาตรการหลายประการที่ออกแบบมาเพื่อจำกัดการเติบโตของประชากร"
 decision_end_discourage_growth:0 "หยุดกีดกันการเพิ่มประชากร"
 decision_end_discourage_growth_desc:1 "การดำเนินการนี้จะยกเลิกมาตรการทางการเมืองที่นำมาใช้บนโลกใบนี้เพื่อจำกัดการเติบโตของประชากร"
 decision_end_discourage_growth_effects_short:0 "£pop£ §Hประชากร§! สามารถเติบโตได้ตามปกติบนดาวเคราะห์ดวงนี้\\n\\nลด §Gค่าบำรุงรักษาประชากร§!"

 decision_consecrated_worlds:1 "ดาวศักดิ์สิทธิ์"
 decision_consecrated_worlds_desc:2 "ประกาศให้ที่นี่เป็นสถานที่ศักดิ์สิทธิ์ ตามวัฒนธรรมที่เราศรัทธา ผู้แสวงบุญจะเดินทางมาจากแดนไกลเพื่อชื่นชมยินดีในออร่าศักดิ์สิทธิ์"
 decision_consecrated_worlds_effects_short:1 "เพิ่มดาวดวงนี้ให้เป็นดาวศักดิ์สิทธิ์ของเรา, เพิ่ม §Yแรงดึงดูดจริยธรรมจิตวิญญาณ§! และ §Yความอยู่ดีกินดีทั่วทั้งจักรวรรดิ§! เช่นเดียวกับ £unity£ §Yการสร้างเอกภาพ§!"
 decision_consecrated_worlds_effects_custom:1 "เพิ่มดาวดวงนี้ให้เป็นดาวศักดิ์สิทธิ์ของเรา (สูงสุดที่ §Y3§!), เพิ่ม §Yแรงดึงดูดจริยธรรมจิตวิญญาณ§!, §Yความอยู่ดีกินดีทั่วทั้งจักรวรรดิ§! และเพิ่ม £unity£ §Yการสร้างเอกภาพ§! ตามระดับความศักดิ์สิทธิ์ของดาวเคราะห์ดวงนี้"
 decision_unconsecrated_worlds:1 "ดาวไม่ศักดิ์สิทธิ์"
 decision_unconsecrated_worlds_desc:1 "การดำเนินการนี้จะเพิกถอนสถานะอันศักดิ์สิทธิ์ของวัตถุดังกล่าว"
 decision_unconsecrated_worlds_effects_short:0 "เพิกถอนสถานะศักดิ์สิทธิ์ของดาวดวงนี้"
 decision_unconsecrated_worlds_effects_custom:0 ""
 consecrated_worlds_too_many:0 "$TRIGGER_FAIL$§Rเราได้ทำให้ดาวศักดิ์สิทธิ์แล้ว §Y3§! ดาว§! §H(ยกเลิกดาวศักดิ์สิทธิ์ดวงอื่นก่อน ถ้าจะทำให้ดาวดวงนี้ศักดิ์สิทธิ์)§!"
 consecrated_worlds_planet_owned:0 "$TRIGGER_FAIL$§Rดาวเคราะห์อาณานิคมไม่สามารถทำให้ศักดิ์สิทธิ์ได้§!"
 consecrated_worlds_unsuitable:0 "\n§Yวัตถุประสงค์นี้ค่อนข้างไม่เหมาะสมแก่การทำให้ศักดิ์สิทธิ์§!"
 consecrated_worlds_suitable:0 "\n§Yวัตถุประสงค์นี้ค่อนข้างเหมาะสมแก่การทำให้ศักดิ์สิทธิ์§!"
 consecrated_worlds_perfect:0 "\n§Yวัตถุนี้มีความน่าเคารพบูชาโดยธรรมชาติและควรได้รับการทำให้ศักดิ์สิทธิ์§!"

 decision_martial_law:0 "ประกาศกฎอัยการศึก"
 decision_martial_law_desc:0 "หน้าที่ของรัฐบาลท้องถิ่นส่วนใหญ่จะถูกระงับ และดาวเคราะห์จะถูกวางไว้ภายใต้การควบคุมของทหารโดยตรงเพื่อพยายามฟื้นฟูความสงบเรียบร้อยของพลเรือน"
 decision_martial_law_effects_short: "เพิ่ม £stability£ §Gเสถียรภาพ§! และเพิ่มตำแหน่งงาน §Y$job_soldier$§! เพิ่มเติม\\n\\nลด £job£ §Rการผลิตทรัพยากรจากอาชีพ§! และ £mod_logistic_growth_mult£ §Rการเติบโตของประชากร§!"
 decision_martial_law_effects_custom: "£job_soldier£ §Y$job_soldier_plural$§! บนดาวเคราะห์ดวงนี้แต่ละคนจะมอบ §G+5§! $r_stability$\\n£mod_job_soldier_add£ $mod_job_soldier_add$: §G+2§!\\n§Y$mod_planet_jobs_produces_mult$§! ลดลง §R33%§!\\n£mod_logistic_growth_mult£ §Yการเติบโตของประชากร§! ทุกรูปแบบลดลง §R50%§!"
 decision_end_martial_law:0 "ยกเลิกกฎอัยการศึก"
 decision_end_martial_law_desc:0 "ยุติการควบคุมทางทหารบนดาวเคราะห์ และฟื้นฟูหน้าที่การทำงานปกติของรัฐบาลพลเรือน"
 decision_end_martial_law_effects_short:0 "กฎอัยการศึกบนดาวกำลังจะสิ้นสุดลง"

 decision_martial_law_hive:0 "ประจำการโดรนนักล่า-นักฆ่า"
 decision_martial_law_hive_desc:0 "ด้วยการส่งร่างสงครามเฉพาะทางเข้าประจำการ จิตร่วมของรัง(หัวเราะ)จะสามารถรับประกันได้ว่ากลุ่มที่เป็นกบฏบนดาวเคราะห์จะถูกค้นพบและจัดการอย่างเด็ดขาด"
