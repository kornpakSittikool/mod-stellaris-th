  criminal_gambling:0 "ปัญหาการพนัน"
  criminal_gambling_desc:0 "เมื่อสูญเสียเงินออมไปกับการพนันจนหมดสิ้น จึงจำเป็นต้องหาแหล่งเงินทุนใหม่"
  festival_aftermath:0 "ผลพวงจากเทศกาล"
  festival_aftermath_desc:1 "ในระหว่างการพักฟื้นจากปาร์ตี้ขนาดใหญ่ ย่อมต้องมีความหงุดหงิดงุ่นง่านเกิดขึ้นบ้างเป็นธรรมดา"
  slot_machine_bounty:0 "สล็อตสุดฮอต!"
  slot_machine_bounty_desc:0 "เครื่องสล็อตแมชชีนรุ่นใหม่ล่าสุดและยอดเยี่ยมที่สุดได้รับการเปิดตัวแล้ว และผู้คนก็หยุดเล่นไม่ได้เลย! พูดตามตรงคือ เครื่องจักรเหล่านี้เข้าควบคุมสมองส่วนเซรีบรัลคอร์เทกซ์จนกว่าจะทำยอดการพนันได้ตามโควตา"
 mod_rare_edicts_cost_mult:0 "ประกาศคำสั่งทรัพยากรหายาก"
  heavy_metal:0 "โลหะหนัก"
  heavy_metal_desc:0 "นับตั้งแต่เกิดเหตุการณ์เมกาคอปส์การผลิตโลหะบนดาวดวงนี้ก็ง่ายขึ้นอย่างน่าประหลาด"
  alloy_relic:0 "เครื่องผลิตโลหะผสมระดับไฮเปอร์"
  alloy_relic_desc:0 "เมื่อติดตั้งในโรงหล่อ อุปกรณ์ลึกลับนี้จะช่วยเพิ่มประสิทธิภาพในการผลิตโลหะผสม"
  minerals_relic:0 "วัตถุโบราณที่แสนน่าเบื่อ"
  minerals_relic_desc:0 "เครื่องจักรหน้าตาประหลาดนี้สามารถดึงแร่ธาตุขึ้นมาจากใต้ดินได้โดยไม่ส่งผลกระทบต่อวัตถุรอบข้าง"
  energy_relic:0 "เครื่องเร่งพลังงาน"
  energy_relic_desc:0 "เมื่อเชื่อมต่อกับเครื่องกำเนิดพลังงานที่มีขนาดใหญ่พอ อุปกรณ์นี้จะใช้เทคนิคที่ไม่เป็นที่รู้จักและดูเหมือนจะเป็นไปไม่ได้ในการสร้างพลังงานเพิ่มเติมให้มากกว่าผลผลิตปกติ"
