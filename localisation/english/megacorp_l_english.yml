 ## TECHNOLOGIES ##
 tech_hive_node:0 "โครงสร้างโครงข่ายประสาท"
 tech_hive_node_desc:1 "ด้วยการพัฒนาปมประสาทไซแนปส์มหภาค เจตจำนงของจิตสำนึกร่วมจะมีความเข้มแข็งยิ่งขึ้น"
 tech_hive_cluster:0 "ไซแน็ปแบบคลัสเตอร์"
 tech_hive_cluster_desc:1 "ด้วยการรวมกลุ่มเครือข่ายของปมประสาทไซแนปส์มหภาค จะทำให้สามารถส่งสัญญาณเมกะนิวรอนได้สูงสุดต่อพื้นที่ผิวที่ใช้การได้"
 tech_hive_confluence:0 "แหล่งบรรจบกันของความคิดตรรกะ"
 tech_hive_confluence_desc:1 "เจตจำนงของจิตสำนึกร่วมจะได้รับการเสริมสร้างและประสานงานให้ดียิ่งขึ้น ผ่านการขยายและการพัฒนาศูนย์ประสาทเมกะนิวรอนขนาดใหญ่"
 tech_food_processing_1:0 "การแปรรูปอาหาร"
 tech_food_processing_1_desc:1 "เทคนิคการแปรรูปอาหารที่ได้รับการปรับปรุงจะนำไปสู่วิธีการถนอมอาหารที่ดีขึ้นและการเน่าเสียที่ลดลง"
 tech_food_processing_2:0 "การแปรรูปอาหารขั้นสูง"
 tech_food_processing_2_desc:1 "วิธีการแช่แข็งถนอมอาหารและการจัดเรียงลำดับโปรตีนใหม่แบบใหม่จะทำให้การแปรรูปอาหารมีประสิทธิภาพมากยิ่งขึ้น"
 tech_alloys_1:0 "การหล่อฮอโลกราฟิก"
 tech_alloys_1_desc:0 "การหล่อโฮอโลกราฟิกแบบทึบสามารถปรับเปลี่ยนรูปร่างได้ในเวลาอันสั้นซึ่งช่วยเร่งการผลิตโลหะผสม"
 tech_alloys_2:0 "ตัวแยกนาโน"
 tech_alloys_2_desc:0 "เครื่องแยกนาโนคือขั้นตอนใหม่ที่ปฏิวัติวงการในการสร้างโลหะผสม ช่วยลดความซับซ้อนของกระบวนการหล่อในขณะที่ปรับปรุงคุณภาพการผลิตโดยรวม"
 tech_luxuries_1:0 "การประกอบวงจรนาโน"
 tech_luxuries_1_desc:0 "ด้วยวงจรนาโนที่ตั้งโปรแกรมไว้ล่วงหน้า ผลิตภัณฑ์อุปโภคบริโภคจำนวนมากจะสามารถประกอบขึ้นได้อย่างรวดเร็วในเครื่องจักรผลิต"
 tech_luxuries_2:0 "คีออสก์จำลอง"
 tech_luxuries_2_desc:0 "ตู้บริการเหล่านี้สามารถสร้างวัตถุใดๆ ก็ตามที่ได้รับการอนุมัติล่วงหน้าได้ หากรูปแบบของมันถูกบันทึกไว้ในหน่วยความจำ"
 tech_space_mining_1:0 "โรงกลั่นในสภาพไร้แรงโน้มถ่วง"
 tech_space_mining_1_desc:0 "การเพิ่มโรงกลั่นภายในสถานีขุดเจาะแร่จะเพิ่มผลผลิตแร่ธาตุได้อย่างมาก"
 tech_space_mining_2:0 "เครื่องสแกนแร่ระยะไกล"
 tech_space_mining_2_desc:0 "ระยะสแกนเนอร์ที่เพิ่มขึ้นจะช่วยให้เราสามารถระบุความหนาแน่นของแร่ธาตุได้รวดเร็วยิ่งขึ้น และมุ่งเน้นความพยายามในการขุดเจาะไปที่จุดนั้น"
 tech_space_mining_3:0 "ลำแสงตัดแร่"
 tech_space_mining_3_desc:0 "เลเซอร์ระยะสั้นอันทรงพลังเหล่านี้สามารถตัดผ่านหินได้อย่างง่ายดาย ทำให้การสกัดแร่ธาตุมีประสิทธิภาพยิ่งขึ้น"
 tech_space_mining_4:0 "โดรนขุดแร่อัตโนมัติ"
 tech_space_mining_4_desc:0 "กองเรือโดรนอัตโนมัติที่ติดตั้งลำแสงขุดแร่ได้รับการส่งออกไปเพื่อรวบรวมแร่ธาตุในบริเวณใกล้เคียงได้อย่างรวดเร็วและมีประสิทธิภาพ"
 tech_space_mining_5:0 "เครื่องตรวจจับแร่นาไนต์"
 tech_space_mining_5_desc:0 "ยานสำรวจพิเศษเหล่านี้ติดตั้งฝูงนาไนต์ที่คอยตรวจจับระดับความหนาแน่นของแร่ที่ยังไม่เคยมีใครรู้จักมาก่อน และทำเครื่องหมายไว้เพื่อรอการสกัดในภายหลัง"
 tech_space_science_1:0 "ห้องทดลองในสภาพไร้น้ำหนัก"
 tech_space_science_1_desc:0 "งานวิจัยที่สำคัญหลายอย่างทำได้เฉพาะในสภาพแวดล้อมไร้แรงโน้มถ่วงเท่านั้น ซึ่งห้องปฏิบัติการเฉพาะทางเหล่านี้ได้รับการออกแบบมาเป็นพิเศษเพื่อจุดประสงค์นี้"
 tech_space_science_2:0 "สนามพลังการกักเก็บสิ่งที่มีขนาดเล็กมาก"
 tech_space_science_2_desc:0 "สนามพลังสำหรับกักกันนั้นยอดเยี่ยมสำหรับการแยกและยึดเหนี่ยวสารหรือตัวอย่างทดสอบต่างๆ เพื่อการนำไปวิเคราะห์โดยละเอียดต่อไป"
 tech_space_science_3:0 "เครื่องตรวจหาควอนตัม"
 tech_space_science_3_desc:0 "ยานสำรวจขั้นสูงที่สามารถวิเคราะห์วัตถุในระดับต่ำกว่าอะตอมได้อย่างถี่ถ้วน ซึ่งช่วยสร้างข้อมูลการวิจัยอันมีค่ามากมาย"
 tech_space_science_4:0 "ระเบียบการของสถานีแบบควบคุมอัตโนมัติ"
 tech_space_science_4_desc:0 "การทำงานแบบอัตโนมัติที่เพิ่มขึ้นของฟังก์ชันในสถานีจะช่วยแบ่งเบาภาระของเจ้าหน้าที่เพื่อให้มีเวลาไปทำหน้าที่วิจัยมากขึ้น"
 tech_space_science_5:0 "การวิเคราะห์หลายมิติ"
 tech_space_science_5_desc:0 "การศึกษาบางสิ่งจากมุมมองที่จำกัดของความเป็นจริงมิติเดียวไม่สามารถแสดงภาพรวมทั้งหมดได้ ทุกมุมมองต้องได้รับการพิจารณา"
 tech_mine_volatile_motes:0 "การปรับความเสถียรของผงธุลี"
 tech_mine_volatile_motes_desc:0 "ผงธุลีระเหยง่ายเป็นอนุภาคที่ไม่แน่นอนและเป็นอันตรายต่อการใช้งาน เพื่อให้สามารถเก็บเกี่ยวได้อย่างปลอดภัยโดยไม่ทำให้เกิดปฏิกิริยาลูกโซ่ของการระเบิด จึงจำเป็นต้องใช้สนามพลังงานเพื่อทำให้ผงธุลีมีความเสถียร"
 tech_mine_exotic_gases:0 "การสกัดก๊าซแปลกประหลาด"
 tech_mine_exotic_gases_desc:0 "แหล่งกักเก็บก๊าซแปลกประหลาดนั้นหายากและมักจะไม่สามารถเข้าถึงได้ด้วยวิธีทั่วไป แหล่งแร่ดังกล่าวสามารถเข้าถึงได้โดยการใช้เทคโนโลยีสกัดแบบพิเศษเท่านั้น"
 tech_interplanetary_commerce:0 "การค้าระหว่างดาวเคราะห์"
 tech_interplanetary_commerce_desc:0 "เมื่อมีตลาดบนดาวเคราะห์แห่งใหม่ โอกาสทางการค้าใหม่ๆ ก็ตามมา ธุรกิจกำลังจะรุ่งเรืองถึงขีดสุด"
 tech_interstellar_economics:0 "เศรษฐกิจระหว่างดวงดาว"
 tech_interstellar_economics_desc:0 "ในขณะที่เราเดินทางเข้าสู่ห้วงอวกาศและออกผจญภัยไปไกลกว่าระบบบ้านเกิดของเรา เราก็ได้เข้าสู่ยุคใหม่ของเศรษฐศาสตร์ ตลาดใหม่ๆ กำลังปรากฏขึ้นในอัตราที่น่าตกใจ ทำให้นักทฤษฎีเศรษฐศาสตร์ต้องดิ้นรนอย่างหนักเพื่อที่จะตามให้ทัน"
 tech_holo_entertainment:0 "ความบันเทิง(โฮโล)"
 tech_holo_entertainment_desc:0 "การบุกเบิกการใช้เทคโนโลยีโฮโลกราฟิกช่วยให้สร้างสภาพแวดล้อมจำลองที่ดูสมจริงเหมือนโลกแห่งความเป็นจริงได้ นับเป็นก้าวต่อไปของความบันเทิงที่น่าตื่นตาตื่นใจเสมือนจริง"
 tech_prescient_data_modeling:1 "การสร้างแบบจำลองข้อมูลเชิงตัวเลข"
 tech_prescient_data_modeling_desc:1 "นี่คือพลังแห่งการหยั่งรู้ล่วงหน้าของเทพีนูมาที่กำลังทำงานอยู่ หรือเป็นเรื่องของฝีมือที่เชี่ยวชาญกันแน่? ไม่ว่าจะทางใด แบบจำลองการคาดการณ์ตลาดหุ้นทางดาราศาสตร์นี้จะพยากรณ์ความผันผวนของเศรษฐกิจด้วยความแม่นยำอย่างปาฏิหาริย์"
 tech_orbital_trash_dispersal:0 "การกระจายข้อมูลขยะที่วงโคจรดาว"
 tech_orbital_trash_dispersal_desc:0 "ระบบจัดการการระดมยิงทางวงโคจรนี้จะกระหน่ำดาวเคราะห์ด้วยขีปนาวุธความเร็วสูงขนาดเล็กจำนวนหลายล้านลูก ส่งผลให้ระบบป้องกันบนพื้นผิวดาวจมไปด้วยข้อมูลขยะ ยานอวกาศที่ติดตั้งส่วนประกอบนี้จะสร้างความเสียหายเพิ่มขึ้นในระหว่างการระดมยิงทางวงโคจร"
 tech_nanite_transmutation:0 "การเปลี่ยนสภาพนาไนต์"
 tech_nanite_transmutation_desc:2 "การผลิตทรัพยากรหายากเหล่านี้ในปริมาณมากจำเป็นต้องใช้นาไนต์ที่มีความสามารถสูงเป็นพิเศษ"

 ## DEPOSITS ##

 # Energy
 d_arid_highlands:0 "ที่ราบสูงแห้งแล้ง"
 d_arid_highlands_desc:1 "ภูมิภาคทางนิเวศวิทยาที่แห้งแล้งและตั้งอยู่บนพื้นที่สูง ซึ่งมีพืชพันธุ์บางตาของหญ้าทะเลทรายและไม้พุ่มเตี้ย"
 d_hot_springs:0 "น้ำพุร้อน"
 d_hot_springs_desc:1 "น้ำใต้ดินที่อุ่นขึ้นจากกระบวนการความร้อนใต้พิภพส่งไอน้ำขึ้นมาจากพื้นผิวของน้ำพุเหล่านี้"
 d_searing_desert:0 "ทะเลทรายร้อนจัด"
 d_searing_desert_desc:1 "ด้วยปริมาณหยาดน้ำฟ้าที่น้อยมาก อุณหภูมิที่ร้อนจัด และพืชพันธุ์ที่จำกัด ทะเลทรายที่เต็มไปด้วยทรายเหล่านี้จึงเป็นปฏิปักษ์ต่อสิ่งมีชีวิตเกือบทุกรูปแบบ"
 d_geothermal_vent:0 "ช่องระบายความร้อนใต้พิภพ"
 d_geothermal_vent_desc:1 "ปล่องไอสารเหล่านี้ระบายไอน้ำและก๊าซพิษจากส่วนลึกภายในเปลือกโลกของดาวเคราะห์"
 d_underwater_vent:0 "ช่องระบายความร้อนใต้น้ำ"
 d_underwater_vent_desc:1 "ตะกอนที่อุดมไปด้วยโลหะทำปฏิกิริกับน้ำที่ร้อนจัดในเปลือกโลกของดาวเคราะห์ ส่งผลให้เกิดการระบายสารเคมีไปตามพื้นทะเลในจุดที่แผ่นเปลือกโลกเคลื่อนแยกออกจากกัน"
 d_rushing_waterfalls:0 "น้ำตกที่ไหลเชี่ยว"
 d_rushing_waterfalls_desc:1 "ทัศนียภาพอันงดงามราวกับภาพวาดที่เกิดขึ้นเมื่อแม่น้ำไหลผ่านไหล่เขาสูงชันของภูเขา"
 d_frozen_gas_lake:0 "ทะเลสาบแก๊สแช่แข็ง"
 d_frozen_gas_lake_desc:1 "ก่อตัวขึ้นภายใต้ความกดดันมหาศาลในยุคอดีต อุณหภูมิที่หนาวจัดลึกช่วยให้ก๊าซที่ละลายในทะเลสาบน้ำแข็งเหล่านี้คงอยู่ในสถานะของแข็ง"
 d_bubbling_swamp:0 "หนองน้ำเดือด"
 d_bubbling_swamp_desc:1 "แหล่งกำเนิดของพืชน้ำ แมลง และก๊าซในบึง พื้นที่ชุ่มน้ำนี้มีลักษณะเด่นคือน้ำที่ไหลช้าและมีพืชพันธุ์หนาแน่น"
 d_fuming_bog:0 "บึงควัน"
 d_fuming_bog_desc:1 "ปลักโคลนที่เป็นพิษซึ่งปกคลุมไปด้วยพืชพันธุ์เตี้ยๆ มอส และเชื้อรา โดยมีก๊าซระเหยเป็นไอขึ้นมาจากผิวน้ำ"
 d_tempestous_mountain:0 "ผาสูงมีพายุแรง"
 d_tempestous_mountain_desc:1 "พืชพันธุ์ที่พัดขาดรุ่งริ่งจากลมพายุเกาะอยู่ตามหน้าผาสูงชันและโขดหินท่ามกลางพายุของภูเขาที่มีฝนตกชุกเหล่านี้"
 d_dust_desert:0 "ทะเลทรายฝุ่นแร่ระเหย"
 d_dust_desert_desc:0 "ผืนทรายอันกว้างใหญ่ที่ปกคลุมแหล่งสะสมเศษผงธุลีระเหยง่ายที่หายากและมีค่า การสกัดทำได้โดยใช้เครื่องมือที่เหมาะสม"
 d_dust_caverns:0 "ถ้ำฝุ่นแร่ระเหย"
 d_dust_caverns_desc:1 "เศษผงธุลีระเหยง่ายที่หายากควบแน่นในถ้ำทรายและโพรงที่ซ่อนอยู่เหล่านี้"
 d_numas_breath:0 "ลมหายใจของนูมา"
 d_numas_breath_desc:0 "ช่องระบายความร้อนที่เสถียรซึ่งเจาะลึกลงไปในเปลือกโลกของดาวเคราะห์นี้ถูกสร้างขึ้นโดย $NAME_Caravaneer_Fleet2$"
 d_nanosands:0 "ทรายนาโน"
 d_nanosands_desc:0 "เนินทรายบนดาวเคราะห์ดวงนี้ประกอบด้วยนาไนต์ที่แตกหักนับไม่ถ้วนเกือบทั้งหมด โครงสร้างของมันเสื่อมสภาพเกินกว่าจะเปิดใช้งานใหม่ได้ แต่พวกมันเคลือบดาวเคราะห์ดวงนี้ไว้ด้วยเม็ดโลหะหายาก"

 # Minerals
 d_crystal_forest:0 "ป่าคริสตัล"
 d_crystal_forest_desc:1 "ผลึกคริสตัลระยิบระยับเติบโตเหมือนน้ำค้างแข็งในป่าแปลกประหลาดเหล่านี้"
 d_veiny_cliffs:0 "หน้าผาสายแร่"
 d_veiny_cliffs_desc:1 "แถบแร่ธาตุที่มีค่าทอดยาวราวกับเส้นเลือดฝอยผ่านหน้าผาที่เปิดโล่งเหล่านี้"
 d_ore_rich_caverns:0 "ถ้ำแร่ราคาแพง"
 d_ore_rich_caverns_desc:1 "ถ้ำลึกเหล่านี้เต็มไปด้วยแหล่งแร่โลหะและแร่ธาตุ"
 d_mineral_fields:0 "ทุ่งแร่"
 d_mineral_fields_desc:1 "การเปลี่ยนแปลงทางธรณีวิทยาอย่างรุนแรงทำให้แร่ธาตุที่มีประโยชน์เหล่านี้โผล่ขึ้นมาสู่พื้นผิวดาวเคราะห์นานมาแล้ว"
 d_rich_mountain:0 "ภูเขาที่มีทรัพยากรแร่มีค่า"
 d_rich_mountain_desc:1 "ลาดเขาเหล่านี้ทอประกายด้วยทรัพยากรแร่ธาตุอันอุดมสมบูรณ์และอัญมณีล้ำค่า"
 d_crystal_reef:0 "ปะการังคริสตัล"
 d_crystal_reef_desc:1 "โครงผลึกคริสตัลระยิบระยับอยู่ท่ามกลางโขดหินและปะการังของแนวปะการังทรายแห่งนี้"
 d_prosperous_mesa:0 "ภูเขายอดราบเต็มไปด้วยทรัพยากร"
 d_prosperous_mesa_desc:1 "ภูเขายอดราบแห่งนี้มีทางลาดชันที่เต็มไปด้วยทรัพยากรที่มีประโยชน์"
 d_crystalline_caverns:0 "ถ้ำคริสตัลลีน"
 d_crystalline_caverns_desc:1 "เช่นเดียวกับโพรงผลึกขนาดมหึมา ถ้ำเหล่านี้เต็มไปด้วยคริสตัลหายากในทุกซอกทุกมุม"
 d_submerged_ore_veins:0 "สายแร่ที่อยู่ใต้น้ำ"
 d_submerged_ore_veins_desc:2 "แหล่งสะสมแร่ที่มีประโยชน์กระจายอยู่ตามส่วนต่าง ๆ ของพื้นมหาสมุทร มอบโอกาสสำหรับการทำเหมืองใต้ทะเลลึก"

 # Food
 d_bountiful_plains:0 "ที่ราบอุดมสมบูรณ์"
 d_bountiful_plains_desc:1 "ดินที่อุดมสมบูรณ์และหญ้าสูงปกคลุมที่ราบอันกว้างใหญ่เหล่านี้ มอบศักยภาพอันยอดเยี่ยมสำหรับการทำเกษตรกรรม"
 d_nutritious_mudland:0 "ดินโคลนอุดมสารอาหาร"
 d_nutritious_mudland_desc:1 "ดินเหลวข้นที่ผสมดินเหนียว ดินตะกอน และดินร่วนแผ่ขยายออกไปสุดขอบฟ้า ซึ่งพืชพรรณเตี้ย ๆ เจริญเติบโตได้อย่างงดงาม"
 d_green_hills:0 "เนินเขาที่เขียวขจี"
 d_green_hills_desc:1 "เนินเขาลดหลั่นปกคลุมด้วยพืชพรรณเขียวขจีและดินที่อุดมสมบูรณ์"
 d_forgiving_tundra:1 "ทุ่งทุนดรา"
 d_forgiving_tundra_desc:1 "หญ้าแพรก ไม้พุ่ม และไลเคนปกคลุมไบโอมในละติจูดสูงแห่งนี้ ซึ่งชั้นดินเยือกแข็งคงตัวในดินชั้นล่างยังคงถูกปกคลุมไปด้วยตะกอนที่อุดมสมบูรณ์กว่า"
 d_rugged_woods:0 "ป่าหินที่หนาวเย็น"
 d_rugged_woods_desc:1 "ป่าหินอันหนาวเหน็บที่มีพืชล้มลุกขึ้นปกคลุมชั้นล่าง"
 d_boggy_fens:0 "หนองบึง"
 d_boggy_fens_desc:1 "พื้นที่ชุ่มน้ำในที่ลุ่มต่ำเหล่านี้อุดมไปด้วยสารอาหารของพืชจำนวนมาก"
 d_lush_jungle:0 "ป่าเขียวชอุ่ม"
 d_lush_jungle_desc:1 "ด้วยเรือนยอดที่หนาทึบและความหนาแน่นของพืชพรรณที่แทบจะผ่านเข้าไปไม่ได้ ป่าฝนเหล่านี้จึงมีคุณภาพดินต่ำ แต่กลับอุดมไปด้วยพืชพรรณและไม้ผลอย่างยิ่ง"
 d_lichen_fields:0 "ทุ่งไลเคน"
 d_lichen_fields_desc:1 "มอสที่เปียกชุ่มไปด้วยหยาดน้ำค้าง ไลเคน และเชื้อราก่อตัวเป็นพรมอันนุ่มนวลแผ่ขยายไปทั่วดินแดนหินเหล่านี้"
 d_fungal_caves:0 "ถ้ำเชื้อรา,เห็ด"
 d_fungal_caves_desc:1 "เครือข่ายถ้ำอันกว้างขวางเหล่านี้ปกคลุมไปด้วยเชื้อราและเห็ดกินได้หลายชนิด ซึ่งไม่ต้องการทั้งแสงแดดหรือดินที่อุดมสมบูรณ์ในการเจริญเติบโต"
 d_fungal_forest:0 "ป่าเชื้อรา,เห็ด"
 d_fungal_forest_desc:1 "แทนที่จะเป็นต้นไม้ เห็ดยักษ์ที่สูงตระหง่านกลับยึดครองป่าอันอุดมสมบูรณ์เหล่านี้ หมวกเห็ดขนาดมหึมาของยักษ์ใหญ่เชื้อราเหล่านี้บดบังแสงแดดจนหมดสิ้น ก่อเกิดเป็นสภาพแวดล้อมที่สมบูรณ์แบบสำหรับตัวอย่างขนาดเล็กที่หลากหลายและอุดมสมบูรณ์"
 d_fertile_lands:0 "ดินแดนอุดมสมบูรณ์"
 d_fertile_lands_desc:1 "ที่ราบอันกว้างใหญ่ไพศาลแห่งนี้มอบพื้นที่ทำเกษตรกรรมในอุดมคติ"
 d_marvelous_oasis:0 "โอเอซิสอันมหัศจรรย์"
 d_marvelous_oasis_desc:1 "อัญมณีระยิบระยับของแหล่งน้ำและพืชพรรณเขียวขจีท่ามกลางดินแดนรกร้างอันแห้งแล้ง"
 d_great_river:0 "แม่น้ำใหญ่"
 d_great_river_desc:1 "แม่น้ำที่ไหลช้าซึ่งมีปริมาณน้ำมหาศาล มอบน้ำและพืชพรรณเพื่อหล่อเลี้ยงชีวิตอันอุดมสมบูรณ์"
 d_black_soil:0 "ดินดำอุดมไปด้วยอินทรียวัตหุ"
 d_black_soil_desc:1 "ด้วยความสามารถในการกักเก็บความชื้นที่สูงอย่างน่าทึ่งและปริมาณสารเคมีที่จำเป็นต่อชีวิตพืชในปริมาณสูง ดินเหล่านี้สัญญาว่าจะให้ผลผลิตทางการเกษตรที่น่าประทับใจ"
 d_teeming_reef:0 "เต็มไปด้วยแนวปะการัง"
 d_teeming_reef_desc:1 "ระบบนิเวศที่มีชีวิตชีวาซึ่งเต็มไปด้วยปะการัง ปลา หอย สัตว์เลี้ยงลูกด้วยนม สัตว์ไม่มีกระดูกสันหลัง และสิ่งมีชีวิตในทะเลที่กินได้ทุกชนิด"
 d_tropical_island:0 "เกาะเขตร้อน"
 d_tropical_island_desc:1 "ตั้งแต่ต้นไม้ที่เต็มไปด้วยผลไม้ไปจนถึงสัตว์ป่านานาชนิด ความอุดมสมบูรณ์ของเกาะสวรรค์แห่งนี้สัญญาว่าจะให้ผลผลิตอันล้ำค่า"
 d_metal_boneyard:0 "สุสานเศษเหล็ก"
 d_metal_boneyard_desc:1 "โครงร่างโลหะที่ผุพังของโครงสร้างพื้นฐานที่พังทลายดูเหมือนจะส่งเสียงครวญครางเมื่อสายลมพัดผ่านพวกมัน"
 d_organic_landfill:0 "หลุมฝังกลบอินทรีย์"
 d_organic_landfill_desc:1 "ขยะอันตรายทางชีวภาพที่เป็นพิษเน่าเปื่อยและส่งกลิ่นเหม็นเป็นกองมหึมาภายใต้แสงแดด"

 # Energy

 # Special
 d_betharian_deposit:0 "ทุ่งบีธาเรียน"
 d_betharian_deposit_desc:1 "หินเบธาเรียนล้ำค่าหลายพันหลายหมื่นก้อนทอประกายราวกับดวงดาวในทุ่งเหล่านี้"
 d_alien_pets_deposit:0 "หุบเขาที่เป็นเอกเทศ"
 d_alien_pets_deposit_desc:1 "หุบเขาอันบริสุทธิ์แห่งนี้ตั้งอยู่ท่ามกลางเทือกเขาที่โอบล้อม สัตว์ป่าของมันได้รับการปกป้องจากสัตว์นักล่าที่เร่ร่อน"
 d_dragon_monument:0 "$building_guardian_dragon_monument$"
 d_dragon_monument_desc:0 "$building_guardian_dragon_monument_desc$"
 d_stellarite_trophy:0 "$building_stellarite_trophy$"
 d_stellarite_trophy_desc:0 "$building_stellarite_trophy_desc$"
 d_buzzing_plains:0 "ที่ราบไฟฟ้าสถิต"
 d_buzzing_plains_desc:0 "ที่ราบที่มีลมพัดแรงเหล่านี้มีเสียงประทุจากไฟฟ้าสถิต"
 d_mineral_striations:0 "ริ้วลายสายแร่"
 d_mineral_striations_desc:0 "รอยเลื่อนที่ตื้นเขินได้นำพาสายแร่อันอุดมสมบูรณ์ขึ้นมาสู่พื้นผิว"
 d_natural_farmland:0 "พื้นที่เกษตรกรรมธรรมชาติ"
 d_natural_farmland_desc:0 "ที่ราบเหล่านี้ถูกแบ่งย่อยตามธรรมชาติออกเป็นรูปทรงเรขาคณิตที่สมมาตรอย่างน่าประหลาดใจ พร้อมสำหรับการพัฒนาทางการเกษตร"

 # Earth
 d_scandinavian_reclamation_sector:0 "เขตกู้คืนสแกนดิเนเวีย"
 d_scandinavian_reclamation_sector_desc:0 "ความพยายามในการฟื้นฟูในช่วงปลายศตวรรษที่ 22 ได้กำจัดกัมมันตภาพรังสีไปเกือบหมดสิ้น เหลือเพียงแหล่งกักเก็บที่ดื้อรั้นที่สุด และระดับการกลายพันธุ์ในขณะนี้อยู่ในระดับต่ำที่สุดเป็นประวัติการณ์นับตั้งแต่การรั่วไหลของสารปนเปื้อน"
 d_saharan_irrigation_project:0 "โครงการชลประทานสะฮารา"
 d_saharan_irrigation_project_desc:0 "มีคนไม่กี่คนในปัจจุบันที่จำคำเยาะเย้ยถากถางอย่างรุนแรงที่ปฏิบัติการกรีนสะฮาราเผชิญ เมื่อตอนที่มันถูกเสนอครั้งแรกโดยศาสตราจารย์อิซเกียร์โด"
 d_mesopotamian_urban_corridor:0 "แนวระเบียงเมืองเมโสโปเตเมีย"
 d_mesopotamian_urban_corridor_desc:0 "มหานครที่ทอดยาวไปตามพื้นที่ส่วนใหญ่ของดินแดนวงพระจันทร์เสี้ยวอันอุดมสมบูรณ์ ถือเป็นอนุสรณ์สถานในตัวเองสำหรับแหล่งกำเนิดอารยธรรมโบราณแห่งนี้"
 d_boswash_metropolitan_axis:0 "แกนมหานครบอสวอช"
 d_boswash_metropolitan_axis_desc:0 "เหตุจลาจลบอสวอชสร้างบาดแผลทางจิตใจให้กับคนทั้งรุ่นและนำไปสู่การปฏิรูปกฎหมายอย่างครอบคลุม ห้ามลืมเด็ดขาด!"
 d_mauritanian_security_zone:0 "เขตความมั่นคงมอริเตเนีย"
 d_mauritanian_security_zone_desc:0 "กระสุนปืนที่ยังไม่ระเบิดยังคงถูกพบเป็นครั้งคราวในบริเวณใกล้เคียงกับค่ายทหารที่ผู้พันเทตชูและกองพลที่เหลือของเขาทำการต่อสู้ครั้งสุดท้ายอันโด่งดัง"
 d_great_albertan_crater:0 "หลุมอุกกาบาตยักษ์แห่งอัลเบอร์ตา"
 d_great_albertan_crater_desc:0 "เมื่อดาวเคราะห์น้อย 711494 ซาติสโคจรเข้าใกล้โลกและกระตุ้นให้เกิดความตื่นตระหนกครั้งใหญ่ในปี 72 ทุกคนต่างคิดว่านี่แหละคือจุดจบ - มหันตภัยครั้งใหญ่มาถึงแล้ว โชคดีที่มันไม่ใหญ่พอที่จะทำให้เกิดการสูญพันธุ์ครั้งใหญ่ แต่โชคร้ายที่มันกวาดล้างพื้นที่ส่วนใหญ่ของอัลเบอร์ตาไป"
 d_pacific_algae_tracts:0 "แหล่งสาหร่ายแปซิฟิก"
 d_pacific_algae_tracts_desc:0 "มองไม่เห็นจนกว่าคุณจะดำดิ่งลงไปใต้คลื่น ทุ่งสาหร่ายเหล่านี้ดูเหมือนจะทอดยาวออกไปสู่อนันต์"
 d_delhi_sprawl:0 "เมืองขยายตัวเดลี"
 d_delhi_sprawl_desc:0 "อาคารพาณิชย์ลักษมีเคยเป็นตึกที่สูงที่สุดในโลกในช่วงเวลาส่วนใหญ่ของศตวรรษที่ 22 และรูปทรงที่เป็นเอกลักษณ์ของมันยังคงเป็นสัญลักษณ์อันโดดเด่นของขอบฟ้าเมืองเดลี"
 d_pearl_river_agglomerate:0 "มหานครสามเหลี่ยมปากแม่น้ำไข่มุก"
 d_pearl_river_agglomerate_desc:0 "ภูมิภาคแรกบนโลกที่ได้รับการแต่งตั้งอย่างเป็นทางการให้เป็นมหานครขนาดใหญ่ เมืองกำลังพัฒนาอีกหลายแห่งจะนำนโยบายต่อต้านมลพิษที่ประสบความสำเร็จของสามเหลี่ยมปากแม่น้ำทองคำนี้ไปปรับใช้ในรูปแบบของตนเองในเวลาต่อมา"
 d_great_pacific_garbage_patch:0 "£blocker£ แพขยะใหญ่แปซิฟิก"
 d_great_pacific_garbage_patch_desc:0 "มลพิษที่หมุนวนของขยะพลาสติกปกคลุมพื้นที่ขนาดใหญ่ของมหาสมุทรที่ใหญ่ที่สุดในโลก"
 d_failing_infrastructure_earth:0 "$d_failing_infrastructure$"
 d_failing_infrastructure_earth_desc:0 "$d_failing_infrastructure_desc$"


 # Event
 d_migrating_forests:0 "ป่าอพยพ"
 d_migrating_forests_desc:1 "ป่าที่เคลื่อนที่ได้ของโลกนี้มักจะอพยพพร้อมกันจำนวนมากไปยังภูมิภาคใหม่ ๆ ขัดขวางความพยายามในการสร้างถนน สายส่งไฟฟ้า และโครงสร้างพื้นฐานอื่น ๆ"
 d_migrating_forest_reserve:0 "เขตอนุรักษ์ป่าอพยพ"
 d_migrating_forest_reserve_desc:1 "ภูมิภาคทั้งหมดนี้ถูกจัดสรรไว้สำหรับป่าอพยพที่เป็นพืชพื้นเมืองของโลกนี้ ที่นี่พวกมันสามารถเดินทางได้อย่างสงบโดยไม่ก่อให้เกิดความเสียหายต่อเขตเมือง"
 d_junk_wastes:0 "ดินแดนรกร้างเศษขยะ"
 d_junk_wastes_desc:1 "ดินแดนรกร้างทอดยาวสุดลูกหูลูกตา มีเศษขยะชิ้นใหญ่โผล่ขึ้นมาจากพื้นดินเป็นระยะ"
 d_junk_canals:0 "คลองเศษขยะ"
 d_junk_canals_desc:1 "คลองแคบ ๆ เหล่านี้คดเคี้ยวไปตามกองขยะ และดินบางส่วนที่อยู่ติดกันก็อุดมสมบูรณ์อย่างน่าประหลาดใจ"
 d_junk_hollows:0 "โพรงใต้กองขยะ"
 d_junk_hollows_desc:1 "โพรงที่อยู่ลึกลงไปใต้กองขยะบนพื้นผิวเหล่านี้จะสามารถใช้เป็นห้องปฏิกรณ์ที่แยกตัวโดดเดี่ยวได้เป็นอย่างดี"
 d_irradiated_valley:0 "หุบเขาที่ปนเปื้อนรังสี"
 d_irradiated_valley_desc:1 "พายุสุริยะได้ซัดกระหน่ำหุบเขาที่โดดเดี่ยวแห่งนี้ด้วยรังสีที่รุนแรง"
 d_valley_of_zanaam:0 "หุบเขาซานาม"
 d_valley_of_zanaam_desc:0 "หุบเขาแห่งนี้เป็นที่ตั้งของเสาโอเบลิสก์ปริศนาซึ่งปกคลุมไปด้วยตัวอักษรจากภาษาเอเลี่ยนที่ตายไปแล้ว มันส่งเสียงหึ่ง ๆ ด้วยพลังงาน และผู้ที่อยู่ใกล้เคียงจะรู้สึกปวดหัว"
 d_abandoned_primitive_homesteads:1 "บ้านพักอาศัยที่ถูกทิ้งร้าง"
 d_abandoned_primitive_homesteads_desc:1 "บ้านพักอาศัยที่ถูกทิ้งร้างเหล่านี้เคยเป็นที่อยู่อาศัยของสังคมสัตว์เลื้อยคลาน พวกมันยังคงอาศัยอยู่บนดาวเคราะห์ดวงนี้ แต่หลังจากนั้นได้สูญเสียความสามารถในการคิดวิเคราะห์และการรับรู้ไปหมดแล้ว"
 d_the_zone:0 "เขต A"
 d_the_zone_desc:0 "ผืนดินขนาด 13 คูณ 13 กิโลเมตรบนดาวเคราะห์ดวงนี้คือซากปรักหักพังที่ไม่ทราบต้นกำเนิด เต็มไปด้วยโบราณวัตถุเอเลี่ยนที่แปลกประหลาดและเป็นเอกลักษณ์มากมาย น่าแปลกใจที่มันยังสร้างความรู้สึกพึงพอใจอย่างลึกซึ้งให้กับผู้ที่เข้ามาเยือน"
 d_hyperfertile_valley:0 "หุบเขาอภิมหาอุดมสมบูรณ์"
 d_hyperfertile_valley_desc:1 "ดินในหุบเขาแห่งนี้อุดมสมบูรณ์อย่างยิ่งยวด และถูกปกคลุมไปด้วยพืชพรรณเขียวชอุ่มหนาแน่น"
 d_ancient_mining_site:0 "แหล่งขุดเหมืองโบราณ"
 d_ancient_mining_site_desc:1 "สถานที่ทำเหมืองแร่โบราณ แม้ว่าจะมีอายุมากแล้ว แต่อุปกรณ์ส่วนใหญ่ยังคงสามารถใช้งานได้"
 d_toy_factory_complex:0 "นิคมโรงงานของเล่น"
 d_toy_factory_complex_desc:0 "เครื่องจักรที่ซับซ้อนหลอมพอลิเมอร์ที่ซับซ้อนให้กลายเป็นสิ่งของชิ้นเล็ก ๆ ที่มีรูปร่างหลากหลายและจุดประสงค์ที่ไม่อาจเข้าใจได้อย่างไม่หยุดยั้ง"
 d_mutant_landfill:0 "ที่ทิ้งซากสิ่งมีชีวิตกลายพันธุ์"
 d_mutant_landfill_desc:0 "กองซากเน่าเปื่อยของสิ่งมีชีวิตกลายพันธุ์ที่น่าสะพรึงกลัว สารอินทรีย์ที่ระเหยง่ายของพวกมันบิดตัวรวมกันจนกลายเป็นโครงสร้างบางอย่าง"
 d_ancient_bombardment_craters:0 "หลุมอุกกาบาตจากการทิ้งระเบิดโบราณ"
 d_ancient_bombardment_craters_desc:1 "โลกนี้เคยถูกทิ้งระเบิดจากวงโคจรอย่างรุนแรงเมื่อนานมาแล้ว บางส่วนของพื้นผิวยังคงมีรอยหลุมอุกกาบาตจากการปะทะกระจายอยู่ทั่วไป"
 d_ancient_battlefield:0 "สนามรบโบราณ"
 d_ancient_battlefield_desc:1 "อารยธรรมที่เคยอาศัยอยู่บนโลกนี้ถูกทำลายโดยกองกำลังผู้รุกรานจากสถานที่ภายนอกระบบสุริยะของพวกเขา สนามรบโบราณแห่งนี้เต็มไปด้วยซากปรักหักพังโบราณจากการต่อสู้ครั้งสุดท้ายอันสิ้นหวัง"
 d_irradiated_ruins:0 "ซากปรักหักพังปนเปื้อนรังสี"
 d_irradiated_ruins_desc:1 "ซากหลงเหลือจากสงครามนิวเคลียร์ครั้งใหญ่ที่ทำโดยมหาอำนาจระดับโลกสองฝ่ายที่เคยอาศัยอยู่บนโลกนี้"
 d_impact_crater:0 "หลุมอุกกาบาต"
 d_impact_crater_desc:1 "หลุมที่เกิดจากการพุ่งชนของอุกกาบาตขนาดใหญ่ ยังคงสามารถพบแร่ธาตุจากตัวอุกกาบาตได้ที่บริเวณนี้"
 d_odd_factory:0 "โรงงานย่อย"
 d_odd_factory_desc:0 "โรงงานที่สร้างขึ้นอย่างประณีตซึ่งผลิตทรัพยากรที่มีมูลค่าสูง ถูกทิ้งไว้บนดาวเคราะห์โดยอารยธรรมอื่น"
