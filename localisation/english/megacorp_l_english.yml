 market_founding_end_regular: "\n\nถ้าเราต้องการที่จะแข่งขันสําหรับชื่อของ เจ้าภาพตลาดเรามีไม่กี่ปีที่จะใช้§Hการ ตัดสิน ใจ§!เพื่อเสนอชื่อหนึ่งในโลกของเรา ที่จะขีดเส้น$galactic_market_station$."
 market_founding_end_nomadic: "\n\nคนของเราไม่มีโลกที่จะนําเสนอเป็น$galactic_market_station$การยึดเหนี่ยว และดังนั้นเราจึงไม่สามารถแข่งขัน เพื่อบทบาทของเจ้าภาพตลาดได้ เราอาจจะยังค้าขายได้อย่างอิสระ ไม่ว่าท่าเรือไหน ที่สถานีเรียกกลับบ้าน"
