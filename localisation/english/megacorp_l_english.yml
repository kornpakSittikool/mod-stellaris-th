 action.92.rare_crystals:0 "[Root.GetName] ค้นพบทรัพยากรเชิงยุทธศาสตร์ที่ไม่เคยมีใครรู้จักมาก่อนซึ่งเรียกว่า §Hผลึกแร่หายาก§! ในระบบดาว §Y[Root.Fleet.GetStarName]§! พวกมันมีคุณสมบัติที่ช่วยรวมแสงเลเซอร์ และยังเป็นส่วนประกอบสำคัญในอุปกรณ์อิเล็กทรอนิกส์ส่วนใหญ่ที่ล้ำสมัยด้วย"
 action.92.exotic_gases:0 "[Root.GetName] ค้นพบทรัพยากรเชิงยุทธศาสตร์ที่ไม่เคยมีใครรู้จักมาก่อนซึ่งเรียกว่า §Hแก๊สต่างถิ่น§! ในระบบดาว §Y[Root.Fleet.GetStarName]§! พวกมันมีคุณประโยชน์ที่หลากหลาย รวมถึงอาวุธพลังงานขั้นสูง, ม่านพลัง, เชื้อเพลิงยานอวกาศ และแม้กระทั่งสารสันทนาการ"
 action.92.volatile_motes:0 "[Root.GetName] ค้นพบทรัพยากรเชิงยุทธศาสตร์ที่ไม่เคยมีใครรู้จักมาก่อนซึ่งเรียกว่า §Hฝุ่นผงผันผวน§! ในระบบดาว §Y[Root.Fleet.GetStarName]§! พวกมันกักเก็บพลังงานมหาศาล โดยมีขอบเขตการใช้งานตั้งแต่การผลิตพลังงานและเชื้อเพลิงไปจนถึงวัตถุระเบิด"
 action.92.volatile_motes.tooltip:2 "£volatile_motes£§Y$volatile_motes$§!\n§E$volatile_motes_desc$§!"
 action.92.exotic_gases.tooltip:1 "£exotic_gases£§Y$exotic_gases$§!\n§E$exotic_gases_desc$§!"
