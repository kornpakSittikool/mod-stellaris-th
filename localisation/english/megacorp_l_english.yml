 cara_home_about_fleet1.reply:1 "กองยานคาราวานในเครือทั้งหมดต่างยึดถือประเพณีที่มีมาก่อนการคิดค้นการสื่อสารซับสเปซ แต่พวกเราที่ $NAME_Tradestation_Tungle$ นั้นเป็นข้อยกเว้น ดังนั้นสายการติดต่อทั้งหมดจึงถูกโอนมาหาพวกเราแทน\\n\\nเราเกรงว่าคุณจะต้องรอให้ [From.GetName] ติดต่อกลับไปหาคุณเมื่อพวกเขาเดินทางเข้าสู่อาณาเขตของคุณอีกครั้ง หรือเมื่อกำลังเดินทางออกไป ขึ้นอยู่กับสิ่งที่คุณตกลงกันไว้\\n\\nระหว่างที่รอ ทำไมไม่ลองมาเสี่ยงดวงกับ $slots$ ดูหน่อยล่ะ?"
