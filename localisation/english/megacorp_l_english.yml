 building_temple_of_prosperity:0 "วิหารแห่งความรุ่งเรือง"
 building_temple_of_prosperity_desc:0 "วิหารที่มีระบบรักษาความปลอดภัยสูงซึ่งเผยแพร่คำสอนของนิกายใหญ่(MEGA เครื่องเสียง)ที่สร้างวิหารนี้ขึ้นมา"
 building_executive_retreat:0 "ที่พักผ่อนของผู้บริหาร"
 building_executive_retreat_desc:0 "รีสอร์ตสุดหรูสำหรับผู้บริหารระดับสูงของบริษัท ที่นี่พวกเขาจะได้สัมผัสกับวัฒนธรรมท้องถิ่นของดาวเคราะห์ภายใต้สภาพแวดล้อมที่มีความปลอดภัยสูง"
 building_xeno_tourism_agency:0 "หน่วยงานแผ่ขยายต่างดาว"
 building_xeno_tourism_agency_desc:0 "หน่วยงานของบริษัทแห่งนี้ส่งเสริมสถานที่ท่องเที่ยวระหว่างดวงดาวที่หลากหลาย ตลอดจนเสนอแพ็คเกจการจ้างงานและโบนัสแรกเข้าให้กับผู้ที่มีโอกาสอพยพซึ่งสนใจที่จะย้ายเข้ามาอยู่ในพื้นที่ของบริษัท"

 building_underground_chemists:0 "ห้องวิจัยยาเสพติดแบบซ่อนเร้น"
 building_underground_chemists_desc:1 "ห้องแล็บผลิตยาเสพติดใต้ดินในพื้นที่ห่างไกลซึ่งแทบจะไม่สามารถตรวจจับได้จากพื้นผิว นักเคมีทำงานทั้งวันทั้งคืนที่นี่เพื่อผลิตสารเสพติดผิดกฎหมายชนิดต่าง ๆ ที่เสพติดง่ายและสร้างกำไรได้อย่างงดงาม"
 building_wrecking_yards:0 "ลานทำลายเอนกประสงค์"
 building_wrecking_yards_desc:0 "ยานพาหนะที่ถูกขโมยมาและยานเชลยที่โจรสลัดนำเข้ามาจะถูกแยกชิ้นส่วนเป็นเศษเหล็กที่นี่ ส่วนประกอบและโลหะผสมที่มีค่าจะได้รับการกู้คืนอย่างระมัดระวัง"
 building_underground_clubs:0 "คลับใต้ดิน"
 building_underground_clubs_desc:0 "คลับความบันเทิงผิดกฎหมายเหล่านี้จะตอบสนองทุกอบายมุข เมื่อค่ำคืนมาเยือน คลับเหล่านี้จะเปิดให้บริการในย่านที่เสื่อมโทรมของดาวเคราะห์"
 building_pirate_haven:0 "ท่าจอดยานโจรสลัดอิสระ"
 building_pirate_haven_desc:0 "เมืองที่ซ่อนเร้นและแยกตัวออกไปบนพื้นผิวของดาวเคราะห์ ที่ซึ่งโจรสลัดและพวกนอกกฎหมายสามารถมารวมตัวกันเพื่อซ่อมแซมยานและแลกเปลี่ยนเรื่องราวกันได้"
 building_smuggling_rings:0 "ท่ายานอวกาศแบบลักลอบ"
 building_smuggling_rings_desc:0 "ท่าอวกาศที่ไม่ได้รับอนุญาตซึ่งไม่อยู่ในบันทึกเนื่องจากการรักษาความลับและเงินสินบนจำนวนมาก สินค้าผิดกฎหมายจำนวนมหาศาลผ่านเข้าออกที่นี่ในทุก ๆ วัน"
 building_wildcat_miners:0 "ปฏิบัติการขุดแร่แบบเสี่ยงภัย"
 building_wildcat_miners_desc:0 "การทำเหมืองแร่ที่ผิดกฎหมายและไม่ปลอดภัยอย่างยิ่ง ดำเนินการโดยผู้ยากไร้และผู้สิ้นหวัง ที่ตรากตรำทำงานหนักด้วยความหวังอันริบหรี่ว่าจะร่ำรวยขึ้นมาได้"
 building_bio_reprocessing_facilities:0 "โรงงานแปรรูปชีวภาพ"
 building_bio_reprocessing_facilities_desc:0 "สิ่งอำนวยความสะดวกใต้ดินที่ซึ่งพนักงานที่ไม่ซื่อสัตย์และสารชีวภาพที่ไม่พึงประสงค์รูปแบบอื่น ๆ จะถูกนำมาแปรรูปเป็นผลิตภัณฑ์อาหารพร้อมรับประทาน"
 building_syndicate_outreach_office:0 "สมาคมบริษัทบังหน้า"
 building_syndicate_outreach_office_desc:0 "ธุรกิจที่ดูถูกกฎหมายเหล่านี้ช่วยให้สมาคมอาชญากรรมในท้องถิ่นสามารถดำเนินงานภายใต้หน้าฉากของความถูกต้องตามกฎหมายได้"
 building_illicit_research_labs:0 "ห้องแล็บวิจัยผิดกฎหมาย"
 building_illicit_research_labs_desc:1 "การวิจัยและพัฒนาที่ผิดกฎหมายอย่างร้ายแรงทุกรูปแบบจะถูกดำเนินการในห้องปฏิบัติการลับเหล่านี้"
 building_subversive_shrine:0 "วิหารบ่อนทำลาย"
 building_subversive_shrine_desc:0 "สถานที่พบปะสำหรับสาวกของลัทธิบ่อนทำลาย เพื่อมารวมตัวกันและประกอบพิธีกรรมของพวกเขา"
 building_private_security: "บริษัทรักษาความปลอดภัยเอกชน"
 building_private_security_desc: "แตกต่างจากกองกำลังรักษาความปลอดภัยของรัฐ บริษัทเอกชนแห่งนี้ให้ความสำคัญกับความสงบเรียบร้อยและความปลอดภัยมากกว่าข้อกังวลทางจริยธรรมหรือศีลธรรมทั่วไป"
 building_industrial_subsidiary: "บริษัทอุตสาหกรรมในเครือ"
