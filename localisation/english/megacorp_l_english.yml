 decision_art_monument:0 "จัดแสดงอนุสาวรีย์ศิลปะ"
 decision_art_monument_desc:0 "จัดแสดงอนุสาวรีย์ศิลปะอันน่าตื่นตาตื่นใจที่สร้างขึ้นเพื่อชาติของเราโดยคณะอาร์ทิซาน(คณะศิลปินอาร์ติซาน)มันจะช่วยสร้างความประทับใจและแรงบันดาลใจให้แก่ประชากรของเราอย่างแน่นอน"
 decision_demolish_art_monument:1 "ยกเลิกการจัดแสดงอนุสาวรีย์ศิลปะ"
 decision_demolish_art_monument_desc:1 "รื้อถอนอนุสาวรีย์ศิลปะที่สร้างขึ้นเพื่อชาติของเราโดยคณะอาร์ทิซาน(คณะศิลปินอาร์ติซาน)โดยมันจะถูกนำไปเก็บไว้ในคลังเพื่อใช้งานในอนาคต"
 artist_monument_erected:0 "การจัดแสดงอนุสาวรีย์ศิลปะได้เริ่มขึ้นแล้ว"
 artist_monument_erected_desc:0 "อนุสาวรีย์ศิลปะอันน่าตื่นตาตื่นใจที่สร้างขึ้นโดยคณะอาร์ทิซาน(คณะศิลปินอาร์ติซาน)กำลังจัดแสดงอยู่บนดาวเคราะห์ดวงนี้"

 tech_resort_colonies:0 "ดาวรีสอร์ต (ที่พักตากอากาศ)"
 tech_resort_colonies_desc:0 "ด้วยการศึกษาอย่างพิถีพิถันเกี่ยวกับภูมิทัศน์และวิทยาศาสตร์แห่งความสนุกสนาน การสร้างดาวเคราะห์ทั้งดวงเพื่อการพักผ่อนหย่อนใจจึงสามารถเป็นไปได้"
 tech_penal_colonies:0 "ทัณฑนิคม (อาณานิคมคุก)"
 tech_penal_colonies_desc:0 "ด้วยการพัฒนาโลกทัณฑนิคมพิเศษ อาชญากรจะสามารถฟื้นฟูสภาพจิตใจได้ผ่านการทำงานหนักอย่างซื่อสัตย์ ทว่าบางคนอาจจำเป็นต้องได้รับการบำบัดฟื้นฟูอย่างถาวร"
 tech_slave_colonies:0 "ดาวทาส"
 tech_slave_colonies_desc:0 "ด้วยการสร้างโลกสำหรับเพาะพันธุ์ทาสขึ้นมาโดยเฉพาะ เราสามารถรับประกันได้ว่าเราจะมีแรงงานใช้แล้วทิ้งป้อนเข้าสู่ระบบอย่างสม่ำเสมอเสมอ"

 resort_colony:0 "ดาวรีสอร์ต"
 resort_colony_desc:0 "สรวงสวรรค์แห่งความหรูหราและการพักผ่อนหย่อนใจ ดาวเคราะห์ดวงนี้มอบการหลบหนีสำหรับผู้ที่ต้องการดื่มด่ำกับความรื่นรมย์ที่ห่างไกลจากความซ้ำซากจำเจของชีวิตประจำวัน"
 penal_colony:0 "ทัณฑนิคม (อาณานิคมคุก)"
 penal_colony_desc:0 "โลกใบนี้เต็มไปด้วยอาชญากรที่ถูกควบคุมตัวอย่างเข้มงวด ชดใช้หนี้ของพวกเขาแก่สังคมในค่ายแรงงาน สำหรับหลายคน หนี้สินนี้ไม่มีวันที่จะได้รับการชดใช้หมดสิ้น"
 slave_colony:0 "ดาวทาส"
 slave_colony_desc:1 "โลกดวงนี้สร้างขึ้นเพื่อรีดเค้นศักยภาพสูงสุดจากประชากรที่เป็นทาส หนทางหลักที่จะทำให้พวกทาสได้ออกไปจากดาวเคราะห์ดวงนี้คือผ่านศูนย์ทหารเฉพาะทางที่จะหล่อหลอมพวกเขาให้กลายเป็นกองทัพทาสศึก(ขนมปัง)ที่ภักดี ซึ่งถูกฝึกฝนมาเพื่อการทำสงครามอย่างไม่รู้จักเหน็ดเหนื่อย"

