 #d_odd_factory_wreckage_2_desc: "$d_odd_factory_wreckage_1_desc$"
 d_ancient_particle_accelerator:0 "เครื่องเร่งอนุภาคโบราณ"
 d_ancient_particle_accelerator_desc:0 "เครื่องเร่งอนุภาคเก่าแก่นี้ถูกสร้างขึ้นโดยใช้การออกแบบที่แปลกใหม่ และเครื่องปลายทางที่ยังหลงเหลืออยู่ภายในโครงสร้างนี้บรรจุข้อมูลการวิจัยจำนวนมหาศาลที่เรียบเรียงโดยนักฟิสิกส์ทฤษฎีผู้ปราดเปรื่องอย่างแน่นอน"
 d_underground_vault:0 "ห้องนิรภัยใต้ดิน"
 d_underground_vault_desc:0 "ห้องนิรภัยใต้ดินขนาดใหญ่ ออกแบบมาให้เป็นหลุมหลบภัยโดยผู้อยู่อาศัยดั้งเดิมของโลกนี้ ผู้อยู่อาศัยในห้องนิรภัยได้หันมาเข่นฆ่ากันเองเมื่ออาหารของพวกเขาหมดลง"
 d_underground_vault_2:0 "$d_underground_vault$"
 d_underground_vault_2_desc:0 "ห้องนิรภัยใต้ดินขนาดใหญ่ ออกแบบมาให้เป็นหลุมหลบภัยโดยผู้อยู่อาศัยดั้งเดิมของโลกนี้ ห้องนิรภัยบรรจุโรงเก็บเครื่องจักรขนาดใหญ่พร้อมด้วยคลังอุปกรณ์ขุดเหมืองแร่"
 d_cryonic_clones:0 "อนุสรณ์สถานร่างโคลนแช่แข็ง"
 d_cryonic_clones_desc:0 "ร่างโคลนเอเลี่ยนหลายร้อยร่างถูกทิ้งไว้ในตู้แช่แข็งรักษาสภาพเมื่อตอนที่ริงเวิลด์นี้ยังเป็นซากปรักหักพัง ตอนนี้ร่างโคลนได้รับการฟื้นฟูอย่างสมบูรณ์และได้รับการเก็บรักษาไว้ในอนุสรณ์สถานแห่งนี้"
 d_flooded_mounds:0 "เนินดินที่จมน้ำ"
 d_flooded_mounds_desc:0 "เนินดินรูปร่างคล้ายจอมปลวกที่เชื่อมต่อกันนับพันนับหมื่นแห่งสามารถพบได้ใต้ทะเลลึกของโลกนี้ ซึ่งเป็นซากสุดท้ายของสายพันธุ์อาร์โทรพอดโบราณที่มีสติปัญญา"
 d_processing_pens:0 "คอกเพาะเลี้ยงแปรรูป"
 d_processing_pens_desc:0 "สิ่งมีชีวิตประเภทเชื้อรา (ฟันกอยด์) ที่เป็นสัตว์พื้นเมืองของดาวเคราะห์ดวงนี้ได้รับการตัดแต่งพันธุกรรมให้เชื่อง... และอร่อย ในคอกแปรรูปขนาดใหญ่เหล่านี้ พวกฟันกอยด์จะได้รับการเลี้ยงดูแล้วจึงถูกเก็บเกี่ยว"
 d_harvester_fields:0 "ทุ่งเก็บเกี่ยว"
 d_harvester_fields_desc:0 "ทุ่งพืชพรรณกินได้ที่หนาแน่นและกว้างใหญ่ ซึ่งมีเครื่องเก็บเกี่ยวพลังงานแสงอาทิตย์โบราณคอยช่วยในการเก็บเกี่ยวผลผลิต"
 d_wetware_computer:0 "คอมพิวเตอร์เนื้อเยื่อชีวภาพ"
 d_wetware_computer_desc:0 "มหาสมุทรบนโลกนี้ถูกปกคลุมไปด้วยเครือข่ายสาหร่ายขนาดเล็กเกือบทั้งหมด ซึ่งดูเหมือนจะเป็นคอมพิวเตอร์เนื้อเยื่อชีวภาพแบบดั้งเดิม"
 d_savage_wildlands:0 "ถิ่นทุรกันดารโหดร้ายป่าเถื่อน"
 d_savage_wildlands_desc:0 "สิ่งมีชีวิตพื้นเมืองที่อาศัยอยู่ในภูมิภาคนี้ดูเหมือนจะทำงานร่วมกันเป็นสิ่งมีชีวิตเดียว"
 d_worm_mine:0 "$building_worm_mine$"
 d_worm_mine_desc:0 "$building_worm_mine_desc$"
 d_worm_farm:0 "$building_worm_farm$"
 d_worm_farm_desc:0 "$building_worm_farm_desc$"
 d_bore_mining_zone:0 "เขตขุดเจาะเหมืองแร่"
 d_bore_mining_zone_desc:1 "แถวของแท่นขุดเหมืองควบคุมระยะไกลที่ใช้เครื่องพ่นน้ำแรงดันสูงปั๊มแร่ธาตุล้ำค่าจากชั้นหินใต้ดินขึ้นมาทางรูเจาะ"
 d_reactor_belt:0 "แนวแถบเครื่องปฏิกรณ์"
 d_reactor_belt_desc:1 "กลุ่มอาคารเครื่องปฏิกรณ์ทอดยาวไปไกลจนเกือบเกินกว่าที่อุปกรณ์ฝังกลบสายตาจะมองเห็นได้"
 d_underground_farm:0 "ถ้ำเพาะปลูกใต้ดิน"
 d_underground_farm_desc:0 "เครือข่ายถ้ำขนาดใหญ่ซึ่งบรรจุฟาร์มเพาะเห็ดรา พื้นที่ล่าสัตว์ และทะเลสาบที่เต็มไปด้วยพืชและสัตว์ที่กินได้จำนวนมาก"
 d_underground_mine:0 "แหล่งขุดแร่ใต้ดิน"
 d_underground_mine_desc:0 "อุโมงค์ใต้ดินนำไปสู่สายแร่ที่อุดมไปด้วยแร่ธาตุหลากหลายชนิด ซึ่งไม่สามารถเข้าถึงได้จากพื้นผิว"
 d_underground_generator:0 "พื้นที่ผลิตพลังงานใต้ดิน"
 d_underground_generator_desc:0 "แม่น้ำใต้ดินและพลังงานความร้อนใต้พิภพจากแกนโลกที่หลอมละลาย มอบศักยภาพมหาศาลสำหรับการผลิตพลังงาน"
 d_underground_contact_zone:0 "เขตติดต่อใต้ดิน"
 d_underground_contact_zone_desc:0 "พื้นที่ที่ชาวใต้ดินและชาวบนพื้นผิวสามารถทำงานร่วมกันเพื่อความสงบสุขและความเจริญรุ่งเรือง"
 d_underground_farm_blocked:0 "ถ้ำเพาะปลูกที่อุดมสมบูรณ์ยิ่ง"
 d_underground_farm_blocked_desc:0 "พื้นที่ใต้ดินเหล่านี้ในปัจจุบันได้รับการพัฒนาประโยชน์อย่างเต็มที่โดยอารยธรรมที่อาศัยอยู่ที่นั่น"
 d_underground_mine_blocked:0 "แหล่งขุดเหมืองที่อุดมสมบูรณ์ยิ่ง"
 d_underground_mine_blocked_desc:0 "พื้นที่ใต้ดินเหล่านี้ในปัจจุบันได้รับการพัฒนาประโยชน์อย่างเต็มที่โดยอารยธรรมที่อาศัยอยู่ที่นั่น"
 d_underground_generator_blocked:0 "พื้นที่ผลิตพลังงานที่อุดมสมบูรณ์ยิ่ง"
 d_underground_generator_blocked_desc:0 "พื้นที่ใต้ดินเหล่านี้ในปัจจุบันได้รับการพัฒนาประโยชน์อย่างเต็มที่โดยอารยธรรมที่อาศัยอยู่ที่นั่น"
 d_underground_farm_dead:2 "£blocker£ ถ้ำที่เต็มไปด้วยซากศพ"
 d_underground_farm_dead_desc:0 "ต้องนำซากศพชาวใต้ดินจำนวนมหาศาลออกไปก่อนที่เราจะสามารถใช้ประโยชน์จากพื้นที่เหล่านี้ได้"
 d_underground_mine_dead:2 "£blocker£ แหล่งขุดเหมืองที่เต็มไปด้วยซากศพ"
 d_underground_mine_dead_desc:0 "ต้องนำซากศพชาวใต้ดินจำนวนมหาศาลออกไปก่อนที่เราจะสามารถใช้ประโยชน์จากพื้นที่เหล่านี้ได้"
 d_underground_generator_dead:2 "£blocker£ พื้นที่ผลิตพลังงานที่เต็มไปด้วยซากศพ"
 d_underground_generator_dead_desc:0 "ต้องนำซากศพชาวใต้ดินจำนวนมหาศาลออกไปก่อนที่เราจะสามารถใช้ประโยชน์จากพื้นที่เหล่านี้ได้"
 d_portal_research_zone:0 "พื้นที่วิจัยประตูมิติ"
 d_portal_research_zone_desc:0 "ศูนย์ปฏิบัติการที่ปลอดภัยถูกสร้างขึ้นรอบ ๆ ประตูมิติเพื่อรองรับเจ้าหน้าที่วิจัยที่อุทิศตนเพื่อค้นหาความลับของมัน"
