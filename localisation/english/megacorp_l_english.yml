 # Other
 action.96.name:0 "§Hกำเนิดตลาดกาแล็กติก§!"
 action.96.desc:0 "การค้าในกาแล็กซีโดยพฤตินัยที่ไม่ผูกมัดกับการทูตระหว่างประเทศ มีอยู่จริงนับตั้งแต่เราค้นพบเป็นครั้งแรกว่าเราไม่ได้อยู่ลำพังในจักรวาลนี้ เมื่อมีการค้นพบพรมแดนใหม่และพรมแดนเก่าถูกกำหนดขึ้นใหม่ทั่วทั้งกาแล็กซี ผู้นำของกาแล็กซีต่างเห็นพ้องกันว่าถึงเวลาแล้วที่จะต้อง §Yทำให้ฟอรัมการค้านี้ถูกต้องตามกฎหมายอย่างเป็นทางการ§! เพื่อให้ทุกคนได้รับประโยชน์\n\nในอีกไม่กี่ปีข้างหน้า พ่อค้าอิสระและหน่วยงานของรัฐจะพยายามจัดตั้งศูนย์กลางกึ่งกลางสำหรับการค้าในกาแล็กซี เราจะได้รับประโยชน์อย่างแน่นอนหากศูนย์กลางนี้ตั้งอยู่ในพื้นที่ของ [Root.GetAdj] ดังนั้นเราจึงสามารถเลือกที่จะ §Yส่งเสริมโลกดวงหนึ่งของเรา§! เพื่อวัตถุประสงค์นี้ได้"
 action.96.desc.corp:1 "ในที่สุด ลูกค้า ผู้ใช้บริการ และคนง่าย ๆ ในกาแล็กซีก็ดูเหมือนจะพร้อมยอมรับแพลตฟอร์มกึ่งกลางสำหรับการค้าระหว่างประเทศระดับกลางที่ปราศจากกฎระเบียบแล้ว\n\nเราสามารถ §Yส่งเสริมโลกดวงหนึ่งของเรา§! เพื่อทำหน้าที่เป็นเจ้าภาพศูนย์กลางการค้านี้ เพื่อเพิ่มรายได้สูงสุดที่อาจเกิดขึ้น"
 action.96.desc.phobe:0 "เป็นเรื่องน่าเสียดายที่เราไม่สามารถกำจัดการค้าที่ผิดกฎหมายกับ §Yพวกต่างเผ่าพันธุ์§! ได้สำเร็จอย่างต่อเนื่อง และสิ่งที่น่าเสียดายพอ ๆ กันคือประโยชน์ทางเศรษฐกิจของตลาดกลางค้าขายที่ไม่ระบุชื่อเป็นส่วนใหญ่ ซึ่งแยกออกจากการทูตระหว่างประเทศนั้นเป็นสิ่งที่ไม่สามารถปฏิเสธได้\n\nในอีกไม่กี่ปีข้างหน้า พ่อค้าอิสระและหน่วยงานของรัฐจะพยายามจัดตั้งศูนย์กลางกึ่งกลางสำหรับการค้าในกาแล็กซี ผลกำไรทางเศรษฐกิจจากการเป็นเจ้าภาพการเชื่อมโยงดังกล่าวอาจมีน้ำหนักมากกว่าภาระในการเก็บรักษาสินค้าต่างดาว ดังนั้นเราจึงสามารถเลือกที่จะ §Yส่งเสริมโลกดวงหนึ่งของเรา§! เพื่อวัตถุประสงค์นี้ได้"
 action.96.desc.homicidal:0 "แม้ว่าจะมีเพียงไม่กี่รายที่เต็มใจจะค้าขายกับเราโดยตรง แต่ก็มีตลาดมืดในกาแล็กซีที่กำลังเฟื่องฟูซึ่งในที่สุดเราก็สามารถเข้าถึงได้"
 action.96.a:0 "ปล่อยให้การค้าหลั่งไหล!"
 action.96.b:0 "เข้าใจแล้ว"
 action.96.c: "สิ่งนี้อาจส่งผลดีต่อสมาชิกของเราจริง ๆ"
 action.97.name:0 "$action.96.name$"
 action.97.desc:0 "$action.96.desc$"
 action.97.desc.corp:0 "$action.96.desc.corp$"
 action.97.desc.phobe:0 "$action.96.desc.phobe$"
 enable_decision_market_nomination:0 "§Hปลดล็อกการตัดสินใจ:§! เสนอชื่อเป็นฮับของตลาดกาแล็กติก"
 action.99.name:0 "§Hตลาดกาแล็กติก§!: ก่อตั้งขึ้นใน [market_founder_planet.GetStarName]"
 action.99.desc:0 "แคมเปญการตลาดของเราบน [market_founder_planet.GetName] ประสบผลสำเร็จแล้ว และผู้มีอำนาจในตลาดเห็นควรที่จะย้ายกิจกรรมส่วนใหญ่ของพวกเขามารวมศูนย์อยู่ในระบบ [market_founder_planet.GetStarName]!"
 action.1000.name:0 "§Hตลาดกาแล็กติก§!: ไม่ได้จัดตั้งขึ้น"
 action.1000.desc:0 "ญัตติของเราในการเสนอให้มีตลาดกาแล็กติกแห่งใหม่นั้นโชคร้ายที่ §Yล้มเหลว§! แม้ว่าเราจะประสบความสำเร็จในการระดมเจตจำนงทางการเมืองสำหรับโครงการดังกล่าว แต่กลับไม่ได้รับการเสนอชื่อสถานที่จัดงานที่ถูกต้องแต่อย่างใด\n\nทั้งล็อบบี้ยิสต์เชิงพาณิชย์และผู้สนับสนุนทางการเมืองต่างยังคงยืนหยัดในหลักการของแนวคิดนี้ โดยให้คำมั่นว่าจะเพิ่มความพยายามเป็นสองเท่าหาก [global_event_country.GetGalCommunityOrGalImperium] ต้องการที่จะลองใหม่อีกครั้ง"
 action.1000.a:0 "เราคงต้องรดูกันต่อไป"
 action.1005.desc:0 "ดูเหมือนว่าเจตจำนงทางการเมืองของกาแล็กซีจะเกินขอบเขตการเข้าถึงของตลาด ความพยายามล่าสุดของ [global_event_country.GetGalCommunityOrGalImperium] ในการจัดตั้งศูนย์กลางการค้าเฉพาะนั้น §Yล้มเหลว§! เนื่องจากไม่มีการเสนอชื่อสถานที่จัดงานที่ถูกต้อง\n\nผู้เสนอโครงการตลาดกาแล็กติกต่างรีบออกมาปฏิเสธความอับอายใด ๆ โดยประกาศว่าพวกเขาจะเสนอเรื่องนี้อีกครั้งเมื่อใดก็ตามที่ [global_event_country.GetCommunityOrImperium] พิจารณาว่าตัวเองมีความพร้อม"
 action.1005.desc.phobe:0 "เจตจำนงทางการเมืองของ [global_event_country.GetGalCommunityOrGalImperium] เกินขอบเขตการเข้าถึงของตลาด เนื่องจากความพยายามล่าสุดในการจัดตั้งตลาดกาแล็กติกที่เป็นหนึ่งเดียวได้ §Yล้มเหลว§! ท้ายที่สุดแล้ว โครงการที่คุยโวอย่างมากของพวกต่างเผ่าพันธุ์ไม่สามารถดึงดูดการเสนอชื่อสถานที่จัดงานที่ถูกต้องได้แม้แต่แห่งเดียว\n\nผู้เสนอโครงการได้ปฏิเสธว่านี่คือการเปิดเผยความโง่เขลาที่แท้จริงเบื้องหลังแนวคิดเรื่อง 'ความร่วมมือ' ของพวกต่างเผ่าพันธุ์ แต่พวกเขากลับมีความแน่วแน่ในการกล่าวอ้างว่ากาแล็กซีอาจจะลองอีกครั้งเมื่อสมาชิกพิจารณาว่าตนเองมีความพร้อม"
 action.1005.a.phobe:0 "ช่างอวดดีสิ้นดี"
 action.101.name:0 "§Hตลาดกาแล็กติก§!: ได้จัดตั้งขึ้นแล้ว"
 action.101.desc:1 "ศูนย์กลางของการค้ากาแล็กซีได้ปรากฏขึ้นในระบบ §Y[galactic_market_station.solar_system.GetName]§! ภายในพรมแดนของ [From.GetName] รัฐบาล [From.GetAdj] ได้รับรองตลาดแห่งนี้อย่างเป็นทางการ ซึ่งทรัพยากรต่าง ๆ สามารถซื้อและขายผ่านบุคคลภายนอกที่ไม่สังกัดฝ่ายใดได้"
 action.101.desc.phobe:0 "พวกต่างเผ่าพันธุ์ที่น่าสงสัยของ §Y[From.GetName]§! ได้จัดตั้งตลาดสำหรับการค้าสินค้าต่างดาว แม้ว่าโดยธรรมชาติเราจะรังเกียจที่จะเข้าร่วมในการแลกเปลี่ยนนี้ แต่ตัวเลือกนี้ก็ยังเปิดกว้างสำหรับเรา"
 action.101.desc.homicidal:0 "$action.96.desc.homicidal$"
 action.103.name:0 "§Hตลาดกาแล็กติก§!: ย้ายสถานีแล้ว"
 action.103.desc:0 "หลังจากการสูญเสียการติดต่อกับศูนย์กลางเดิม ชุมชนพ่อค้าในกาแล็กซีได้เลือกที่จะจัดตั้งสถานีใหม่ภายในพรมแดนของเรา"
 action.106.name:0 "§Hตลาดกาแล็กติก§!"
 action.106.desc:0 "ผ่านทางผู้ติดต่อที่เราเพิ่งจัดตั้งขึ้นใหม่ เราสามารถเข้าถึงตลาดกาแล็กซีสำหรับการซื้อและขายทรัพยากร สิ่งนี้จะเป็นผลดีอย่างมากต่อเศรษฐกิจของ [Root.GetAdj] อย่างแน่นอน"
 action.106.desc.phobe:0 "เราได้รับรู้เกี่ยวกับตลาดกาแล็กซีสำหรับสินค้าของคนต่างด้าวที่จัดตั้งขึ้นโดยพวกต่างเผ่าพันธุ์ที่น่ารังเกียจ แม้ว่าโดยธรรมชาติแล้วเราจะไม่เต็มใจเข้าร่วมในการแลกเปลี่ยนนี้ แต่ตอนนี้ตัวเลือกนี้ก็เปิดให้เราใช้งานได้แล้ว"
 action.106.desc.homicidal:0 "$action.96.desc.homicidal$"
 established_galactic_market_station:1 "§H$galactic_market_station$§! ถูกจัดตั้งขึ้นในระบบ §Y[galactic_market_station.solar_system.GetName]§!\n\n"

 distar.305.rare_crystals:0 "[Root.GetName] ได้ค้นพบทรัพยากรเชิงยุทธศาสตร์ที่ไม่รู้จักมาก่อนบน [FromFrom.GetName] ซึ่งถูกขนานนามว่า §H$rare_crystals$§! คริสตัลเหล่านี้เหมาะอย่างยิ่งสำหรับอุปกรณ์อิเล็กทรอนิกส์ระดับไฮเอนด์และระบบอาวุธเลเซอร์ เนื่องจากมีคุณสมบัติในการสะท้อนแสงที่ยอดเยี่ยม"
 distar.305.exotic_gases:0 "[Root.GetName] ได้ค้นพบทรัพยากรเชิงยุทธศาสตร์ที่ไม่รู้จักมาก่อนบน [FromFrom.GetName] ซึ่งถูกขนานนามว่า §H$exotic_gases$§! ก๊าซเหล่านี้มีการใช้งานเชิงยุทธวิธีและเพื่อการพักผ่อนหย่อนใจจำนวนมาก"
 distar.305.volatile_motes:0 "[Root.GetName] ได้ค้นพบทรัพยากรเชิงยุทธศาสตร์ที่ไม่รู้จักมาก่อนบน [FromFrom.GetName] ซึ่งถูกขนานนามว่า §H$volatile_motes$§! อนุภาคเหล่านี้สร้างแรงจลน์ในปริมาณที่มหาศาลเมื่อเปิดใช้งานทางเคมี และคาดว่าจะมีรสชาติที่เผ็ดร้อนมากเมื่อนำมาปรุงอาหาร"

 decision_market_nomination:0 "เสนอชื่อเพื่อเป็นฮับของตลาดกาแล็กติก"
 decision_market_nomination_effects:1 "ใช้ตัวปรับปรุง §Yระดับความสามารถในการแข่งขันของตลาดพื้นฐาน§! กับดาวเคราะห์ตามสภาพท้องถิ่น ยิ่งคะแนนดีขึ้นเท่าใด ดาวเคราะห์ดวงนั้นก็มีแนวโน้มที่จะได้เป็นเจ้าภาพของ §Hตลาดกาแล็กติก§! ในอนาคตมากขึ้นเท่านั้น\n\nทางที่ดีที่สุดคือเสนอชื่อดาวเคราะห์ที่มีปริมาณการค้าสูง เนื่องจากจะทำให้มีโอกาสได้รับเลือกมากขึ้น"
 decision_market_nomination_effects_short:0 "เสนอชื่อดาวดวงนี้ให้เป็นฮับการค้าการค้าสำหรับการรวมตัวของ §Hตลาดกาแล็กติก§!"
 decision_market_nomination_desc:0 "การได้เป็นศูนย์กลางของการค้ากาแล็กซีคือตำแหน่งที่มีเกียรติและมีกำไรงดงาม ตลาดนั้นแปรปรวน แต่ด้วยสิ่งจูงใจที่เพียงพอ เราอาจจะดึงดูดผู้เล่นรายใหญ่ให้เข้ามาตั้งถิ่นฐานบนดาวเคราะห์ดวงนี้ได้"
 decision_revoke_market_nomination:0 "ถอนการเสนอชื่อ"
 decision_revoke_market_nomination_effect:0 "§Hการลงทุนก่อนหน้านี้จะไม่ได้รับเงินคืน§!"
 decision_revoke_market_nomination_desc:0 "บางครั้งคุณก็ไม่ได้อยากตกเป็นเป้าสายตาของทุกคน"
 decision_boost_market_nomination:0 "ประมูลเพิ่มการเสนอราคาเสนอชื่อ"
 decision_boost_market_nomination_effects_short:0 "เพิ่ม §Yระดับความสามารถในการแข่งขันของตลาดกลาง§! ของดาว ด้วยมาตรการเพิ่มเติม"
 decision_boost_market_nomination_effects:0 "ใช้ได้สูงสุด §Y2§! ครั้ง"
 decision_boost_market_nomination_desc:0 "ลดภาระการบริหารจัดการลง เขตเศรษฐกิจพิเศษ การติดสินบน"
 already_market_nominated:0 "§Rเราได้เสนอชื่อดาวเคราะห์แล้ว!§!"
 max_boosted:0 "§Rใช้ไปแล้ว§Y2§!เวลา!§!"

 mega.100.name:0 "ดาวศักดิ์สิทธิ์: §Rถูกดูหมิ่น§!"
 mega.100.desc:1 "เราสูญเสียการเข้าถึงวัตถุบูชาในระบบ [From.GetName] แล้ว!\n\nความโศกเศร้าและความรู้สึกสูญเสียอย่างสุดซึ้งครอบงำอาณานิคมของ [Root.GetAdj] แตกต่างจากการที่โลกถูกประกาศว่าไม่มีความศักดิ์สิทธิ์ การปฏิเสธความศรัทธาทางจิตวิญญาณอย่างรุนแรงนี้ทำให้ผู้ศรัทธาของ [Root.GetName] ตกตะลึงและสับสน เหล่าคณะสงฆ์จึงได้ประกาศไว้ทุกข์เป็นเวลาครึ่งทศวรรษ"

 # Special Projects
 CARAVAN_HULK_PROJECT:0 "ค้นหายานชาวคาราวานที่ถูกทิ้งร้าง"
 CARAVAN_HULK_PROJECT_DESC:0 "ถูกทิ้งให้ลอยเคว้งคว้างในวงโคจรรอบดาวฤกษ์ดวงหนึ่งของเราโดยกองคาราวานที่เดินทางผ่านไป ซากยานที่ปลดประจำการนี้อาจยังมีสิ่งมีค่าหลงเหลืออยู่"
 NULLVOID_PROJECT:0 "หยั่งลึกสู่ห้วงสุญตา"
 NULLVOID_PROJECT_DESC:0 "ไม่ว่าพลังงานประหลาดที่นำสสารมืดมายังประตูมิติของเราจะเป็นอะไรก็ตาม การดึงดูดพลังงานดังกล่าวในระดับที่สูงขึ้นน่าจะส่งผลให้การผลิตเพิ่มขึ้น"

