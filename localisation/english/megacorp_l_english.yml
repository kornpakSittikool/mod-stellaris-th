 building_corporate_monument:0 "สถานที่วัฒนธรรมองค์กร"
 building_corporate_monument_desc:0 "สถานที่ที่อุทิศให้กับการยกย่องวัฒนธรรมองค์กรที่เป็นเอกลักษณ์ ซึ่งแทรกซึมอยู่ในทุกธุรกรรมทางธุรกิจที่ดำเนินการบนดาวเคราะห์ดวงนี้"
 building_corporate_site:0 "สถานที่เชื่อมโยงจัดการธุรกิจ"
 building_corporate_site_desc:0 "สถานที่ซึ่งสามารถกำหนดกลยุทธ์สำหรับการตัดสินใจครั้งสำคัญเกี่ยวกับวัฒนธรรมทางธุรกิจของดาวเคราะห์ และผ่านการทดสอบกลุ่มเป้าหมายในระดับจิตใต้สำนึกโดยผู้เชี่ยวชาญด้านทรัพยากรผู้มีสติปัญญา"
 building_corporate_forum:0 "สภาการประสานกำลังกัน"
 building_corporate_forum_desc:0 "สภาการสื่อสารเหนือแสง(FTL)ขนาดมหึมาที่สามารถประสานวัฒนธรรมองค์กรของแผนกย่อยของบริษัทบนดาวเคราะห์หลายล้านแห่งเข้าด้วยกัน"
 building_corporate_vault:0 "เครื่องเข้าถือสิทธิ์"
 building_corporate_vault_desc:0 "ห้องนิรภัยใต้ดินขนาดใหญ่ที่ทำหน้าที่สองอย่าง ทั้งเป็นสถานที่ประสานงานทางธุรกิจและพิพิธภัณฑ์สาธารณะที่แสดงประวัติศาสตร์อันยาวนานและทำกำไรของเมกะคอร์ปอเรชันที่สร้างมันขึ้นมา"
 building_nanite_transmuter:0 "เครื่องเปลี่ยนสภาพนาไนต์"
 building_nanite_transmuter_desc:3 "โรงงานแห่งนี้ผลิตทรัพยากรหายากหลากหลายประเภทในปริมาณมากโดยใช้นาไนต์ที่ล้ำสมัยอย่างยิ่ง การขาดแคลนนาไนต์จะทำให้การผลิตหยุดชะงัก"

