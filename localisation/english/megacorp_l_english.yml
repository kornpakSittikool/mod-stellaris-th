 mega.1100.name:0 "$strategic_coordination_center_1$"
 mega.1100.desc:0 "$strategic_coordination_center_1$ เผยโฉมอันน่าเกรงขามในขณะที่มันเคลื่อนเข้ามาในมุมมองของกล้องสังเกตการณ์\\n\\nวิศวกรฝ่ายทหารของเราตระหนักดีว่าพวกเขาไม่มีทางปิดบังวัตถุประสงค์ที่แท้จริงของสถานีที่มีขนาดใหญ่เช่นนี้ได้เลย ดังนั้นรูปลักษณ์ภายนอกของมันจึงตรงกับความเป็นจริงทุกประการ นั่นคือ: กล่องสี่เหลี่ยมที่อัดแน่นไปด้วยอุปกรณ์สื่อสารล้ำสมัย แผงเซนเซอร์ตรวจจับ และทีมงานสนับสนุนยุทธวิธีที่มีความเชี่ยวชาญสูง"
