 product_randomtech:0 "ได้รับ §Yเทคโนโลยีแบบสุ่มหนึ่งอย่าง§!"

 fleet1product1:1 "§Gเตียงสองชั้นแบรนด์ทริม§!! \"ตู้นอนพักผ่อน\" แบบวางซ้อนกันได้ที่ล้ำสมัยและประหยัดพื้นที่เหล่านี้จะช่วยเพิ่มศักยภาพในการอยู่อาศัยของบ้านเรือนบนดวงดาว ทำให้คุณสามารถ \"เบียดเสียด\" ประชากรได้มากขึ้นต่อตารางเมตร!"
 fleet1product1_addendum:0 "§Hส่งมอบเพียงครั้งเดียวไปยัง §Yอาณานิคมแห่งเดียว§! เท่านั้น เตียงสองชั้นรับประกันการใช้งานเป็นเวลา §Y80 ปี§! และไม่เกินจากนี้ เพิ่ม §Y$MOD_PLANET_HOUSING_ADD$§! ขึ้น §G+10%§! ตลอดระยะเวลาดังกล่าว§!\\n\\n(ไม่รวมถึงการวางแผนจัดสรรตำแหน่งของเตียงอย่างละเอียดรอบคอบ การใช้เตียงสองชั้นอาจมีความเชื่อมโยงกับอัตราการบาดเจ็บเล็กน้อยที่สูงขึ้นมากจากการตกเตียง อาจสร้างความกังวลด้านความเป็นส่วนตัว และอาจเพิ่มความเปราะบางของสังคมต่อโรคระบาดตามฤดูกาลและ/หรือโรคระบาดใหญ่)"
 fleet1product1_tooltip:0 "§G+1§! การตัดสินใจ §Yติดตั้งเตียงสองชั้น(ธนาคารวาง)§!"
 fleet1product2:0 "§Gกล่องเก็บรักษาอาหารแบรนด์ทริม§!! ฝ่ายบริหารของคุณเหนื่อยหน่ายกับเหล่าชาวอาณานิคมที่ปล่อยให้ผักหรือเนื้อสัตว์ที่ย่อยได้ง่ายเน่าเสียในที่พักอาศัยของตน เพียงเพราะระบบย่อยอาหารของพวกเขาสามารถประมวลผลอินพุตได้จำกัดในแต่ละครั้งหรือเปล่า?\\n\\nด้วยการส่งทางอากาศไปยังอาณานิคมที่คุณเลือก กล่องมีฝาปิดกึ่งโปร่งใสเหล่านี้จะช่วยปิดผนึกอาหารปรุงสุกหรืออาหารดิบได้อย่างมิดชิด ช่วยให้ของข้างในคงความสดได้นานขึ้น นี่คือวิธีที่สมบูรณ์แบบในการเก็บอาหารเหลือไว้เป็นของว่างที่แสนอร่อยและ/หรือมีคุณค่าทางโภชนาการสำหรับภายหลัง ช่วยลดขยะอาหารและลดความต้องการอาหารลงได้อย่างมหาศาล"
 fleet1product2_addendum:1 "§Hส่งมอบเพียงครั้งเดียวไปยัง §Yอาณานิคมแห่งเดียว§! เท่านั้น กล่องเก็บรักษาอาหารของทริมรับประกันการใช้งานเป็นเวลา §Y80 ปี§! และไม่เกินจากนี้ ลด §Y$mod_planet_pops_organics_food_upkeep_mult$§! ลง §G-10%§! ตลอดระยะเวลาดังกล่าว§!\\n\\n(โพลีเมอร์ชนิดกักกันเวนกราเลียน 100% ได้รับการรับรองสำหรับของเหลวชีวภาพระดับ3สามารถล้างด้วยเครื่องล้างจานได้)"
 fleet1product2_tooltip:0 "§G+1§! การตัดสินใจ §Yใช้ที่บรรจุอาหาร(ทริล)§!"
 fleet1product3:1 "§Gเครื่องดับกลิ่นในชั้นบรรยากาศแบรนด์ทริม§!! โลกเกษตรกรรมของคุณมีกลิ่นเหม็นเหมือนปุ๋ยเคมีหรือเปล่า? หรือนครดาวเคราะห์ของคุณดูเหมือนจะชวนให้ร้อง \"แหวะ อี๋ ไม่ไหวเลย\" มากกว่า? อาณานิคมของคุณ §Eส่งกลิ่นเหม็นโชย§! หรือไม่?\\n\\nเรามีทางออก! ส่วนผสมของจุลินทรีย์และสารทำปฏิกิริยาละอองลอย(เสียงหายใจ)ที่ได้รับการจดสิทธิบัตรของเราจะช่วยทำให้อากาศในชั้นโทรโพสเฟียร์ที่อยู่อาศัยได้สะอาดหมดจด เพียงแค่เอนหลังลง ผ่อนคลาย ส่งโดรนชั้นบรรยากาศสตราโตขึ้นไป แล้วสูดอากาศบริสุทธิ์ให้เต็มปอด"
 fleet1product3_addendum:2 "§Hส่งมอบเพียงครั้งเดียวไปยัง §Yอาณานิคมแห่งเดียว§! เท่านั้น เอฟเฟกต์กำจัดกลิ่นรับประกันเป็นเวลา §Y80 ปี§! และไม่เกินกว่านี้ เพิ่ม §Y$MOD_PLANET_RESETTLEMENT_UNEMPLOYED_DESTINATION_MULT$§! ขึ้น §G+100%§! ตลอดระยะเวลาดังกล่าว§!\\n\\n(ชื่อแบรนด์ \"เครื่องดับกลิ่นในชั้นบรรยากาศทริม\" และสโลแกน \"คุณคิดว่าสิ่งที่คุณกำลังหายใจอยู่ตอนนี้คืออากาศงั้นเหรอ?\" สงวนลิขสิทธิ์สงวนลิขสิทธิ์สงวนลิขสิทธิ์สงวนลิขสิทธิ์ (C) 2200 Vengralian Trium สงวนลิขสิทธิ์ทุกประการ)"
 fleet1product3_tooltip:0 "§G+1§! การตัดสินใจ §Yใช้เครื่องกำจัดกลิ่นในบรรยากาศ(ทริล)§!"
 fleet1product4:0 "§Gคอลเลกชันเครื่องประดับสุดพิเศษของทริม (Trum Bauble Report).§!! ชุดสะสมของกระจุกกระจิกและเครื่องประดับแฟชั่นเหล่านี้จะช่วยให้ประชากรของคุณตื่นตาตื่นใจและเบี่ยงเบนความสนใจอย่างแน่นอน"
 fleet1product4_addendum:1 "(มูลค่าที่แท้จริงของสินค้าอุปโภคบริโภคอาจแตกต่างกันไปตามมุมมองของแต่ละบุคคล)"
 fleet1product5:0 "§Gกลุ่มเจ้าหน้าที่ฝ่ายเทคนิคการขายของเวนเกรเลียน ทริอุม§! ซึ่งจะประจำการอยู่ตามสถานีอวกาศต่าง ๆ ทั่วทั้งจักรวรรดิของคุณ พวกเขาจะช่วยปรับเพิ่มมูลค่าทางการค้า (คู่แข่งที่ขี้อิจฉาอาจจะบอกว่า \"ปั่นราคาอย่างไม่เป็นธรรมชาติ\") $r_trade$ ของทุกระบบดาวขึ้น"
 fleet1product5_addendum:1 "§Hกลุ่มเจ้าหน้าที่นี้จะอาศัยและทำงานในสถานีอวกาศของคุณ โดยดำรงชีวิตอยู่ด้วยเพียงแค่อาหารเหลวบำรุงกำลังแบรนด์ทริมเท่านั้น และจะไม่มีผลกระทบต่อประชากรหรือเศรษฐกิจของคุณ นอกเหนือจากอิทธิพลที่มีต่อ $r_trade$ การมอบหมายงานนี้จะกินเวลาเป็นเวลา §Y80 ปี§! และไม่เกินจากนี้ เพิ่ม $r_trade$ ขึ้น §G+15%§! ตลอดระยะเวลาดังกล่าว§!"
 fleet1product6:1 "§Gเครื่องกระตุ้นบ่อวางไข่แบรนด์ทริม§!! เหนื่อยหน่ายกับการรอคอยให้ตัวอ่อนหรือวัยเยาว์ที่เทียบเท่าตัวอ่อนของคุณเติบโตเป็นตัวเต็มวัยหรือวัยผู้ใหญ่ที่เทียบเท่าแล้วหรือยัง? เพิ่มความเร็วในการพัฒนาของพวกเขาด้วยสารกระตุ้นที่มีความปลอดภัยขั้นสูงเหล่านี้สิ!"
 fleet1product6_addendum: "โปรดทราบว่า แอนติบอดีที่พบในระบบร่างกายของสปีชีส์ของคุณจะทำให้สารกระตุ้นไร้ผลภายในกรอบเวลา §Hสิบปี§! แต่ก่อนที่สิบปีนั้นจะหมดลง คุณจะเพลิดเพลินกับประโยชน์จากจำนวนประชากรที่เพิ่มขึ้นอย่างรวดเร็ว โดยจะช่วยเพิ่ม §Y$MOD_LOGISTIC_GROWTH_MULT$§! สูงถึง §G10%§!"
 fleet1product7:0 "กระเป๋าเดินทางหลายใบที่เต็มไปด้วย £energy£ §Y$energy$§!! นั่นคือ £energy£ §G2000§! §Y$energy$§! รวมทั้งหมด คุณตื่นเต้นเหมือนพวกเราไหม? เราหวังว่าจะเป็นเช่นนั้นนะ"
 fleet1product7_addendum:0 "The Vengralian Trium: ช่วยพาต่างดาวที่ใช่ ไปไว้ในที่ที่ถูกต้อง"

