 gov_worker_coop_desc: "รัฐบาลนี้เป็นองค์กรการค้าที่พลเมืองเป็นเจ้าของทั้งหมด โดยมีผู้ดูแลคอยควบคุมดูแลข้อพิพาทต่างๆ ที่เกิดขึ้น"
 gov_criminal_syndicate:0 "องค์การอาชญากรรม"
 gov_criminal_syndicate_desc:0 "รัฐบาล นี้ เป็น แก๊ง ธุรกิจ ที่ ใหญ่ โต และ ไร้ ความ ปรานี ซึ่ง มี กิจ ปฏิบัติ ใน การ ดําเนิน งาน หลาย อย่าง ร่วม กับ อาชญากรรม แบบ องค์การ."
 RT_OLIGARCH:0 "คณาธิปัตย์"
 gov_subversive_cult:0 "ลัทธิบ่อนทำลาย"
 gov_subversive_cult_desc:0 "รัฐบาลนี้มีโครงสร้างเหมือนลัทธิทางศาสนาที่พึ่งพาธุรกิจอาชญากรรมและบริษัทในเครือต่างๆ เพื่อจุนเจือตัวเอง"
