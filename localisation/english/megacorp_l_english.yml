# To Corporation Diplomacy
 DEMAND_SUBS_SELECT_01:0 "คุณกำลังจะเสนอให้ [Root.GetName] เป็นบริษัทย่อยของคุณหรือไม่?"
 DEMAND_SUBS_ACCEPT_01:1 "ในฐานะบริษัทย่อยของคุณ [Root.GetName] จะแบ่งปันมูลค่าการค้าบางส่วนให้กับคุณ แลกกับการที่เราคาดหวังให้คุณปกป้องชีวิต เสรีภาพ และความเป็นเอกราชของ [Root.GetSpeciesNamePlural]"
 DEMAND_SUBS_REFUSE_01:0 "[Root.GetName] จะไม่ยอมตกเป็นเป้าหมายในการขูดรีดของ [From.GetSpeciesAdj] ไม่ว่าจะในสถานการณ์ใดก็ตาม"
 ASK_FOR_SUBS_PROPOSE_01:0 "[Root.GetName] ต้องการการปกป้องทางทหาร โปรดให้เราเป็นบริษัทย่อยภายใต้การปกครองของ [From.GetAdj] แล้วเราในฐานะข้ารับใช้ผู้ภักดี จะมอบส่วนแบ่งมูลค่าการค้าจำนวนมากให้กับคุณ"
 TO_CORP_HOSTILE_GREETING_01:0 "อ่า [From.GetName] ให้ฉันเดานะ คุณมีข้อเสนอพิเศษสำหรับเราใช่ไหม?"
 TO_CORP_HOSTILE_GREETING_02:0 "อ้าว ถ้าไม่ใช่ [From.GetName] วันนี้เอาอะไรมาเสนอเราล่ะ? คำโกหก การหลอกลวง หรือสัญญาว่างเปล่า?"
 TO_CORP_HOSTILE_GREETING_03:0 "โอ้ คุณนี่เอง... รบกวนไป \\"ตระหนักรู้ในตนเอง\\" ที่อื่นได้ไหม?"
 TO_CORP_HOSTILE_GREETING_04:0 "[Root.GetName] ไม่ได้มีไว้ขายนะ [From.GetName]"
 TO_CORP_HOSTILE_GREETING_05:0 "$CORP_HOSTILE_GREETING_01$"
 TO_CORP_HOSTILE_GREETING_06:0 "$CORP_HOSTILE_GREETING_02$"
 TO_CORP_GREETING_HOSTILE_EG_01:0 "ทุนนิยมเป็นเพียงบันไดก้าวหนึ่งสู่สังคมไร้ชนชั้น [From.GetName]"
 TO_CORP_NEUTRAL_GREETING_01:0 "สวัสดี [From.GetName] ธุรกิจเป็นอย่างไรบ้าง?"
 TO_CORP_NEUTRAL_GREETING_02:0 "ยินดีที่ได้พบกัน [From.GetName]! ดูเหมือนโมดูลการแปลภาษาของเราจะมีปัญหาเล็กน้อย คุณกำลังบอกว่าคุณอยากจะสัมผัสฐานทัพของเราหรือเปล่านะ?"
 TO_CORP_THREATENED_GREETING_01:0 "สวัสดี [From.GetName] หวังว่าคุณจะมองเห็นศักยภาพในตลาดของ [Root.GetAdj]"
 TO_CORP_FRIENDLY_GREETING_01:0 "เราเห็นแคมเปญโฆษณาล่าสุดของคุณแล้ว จะให้พูดอะไรได้อีกล่ะ เอาเงินเราไปเลย [From.GetName]!"
 TO_CORP_FRIENDLY_GREETING_02:0 "เป็นวันที่ดีสำหรับธุรกิจใช่ไหม [From.GetName]? เครดิต เครดิต เครดิต... ช่างไพเราะเสนาะหูจริงๆ"
 TO_CORP_FRIENDLY_GREETING_03:0 "สวัสดี [From.GetName]! การยกระดับมาตรฐาน การก้าวข้ามขีดจำกัด การคำนวณตัวเลข เป็นอย่างไรบ้าง?"
 TO_CORP_WAR_GREETING_01:0 "เตรียมตัวรับการปรับลดงบประมาณได้เลย [From.GetName]..."
 TO_CORP_WAR_GREETING_02:0 "เราตื่นเต้นมากกับมหกรรมล้างสต๊อกของคุณ [From.GetName] ดาวเคราะห์บางดวงของคุณดึงดูดความสนใจของเราอยู่พอดีเลย..."
 TO_CORP_WAR_GREETING_03:0 "การตัดอนาคตของคุณให้สั้นลง คืองานปัจจุบันของเรา [From.GetName]..."
 TO_CORP_VASSAL_GREETING_01:0 "ถอนสมอได้เลย [From.GetName] เพราะ [Root.GetName] พร้อมร่วมหัวจมท้ายกับคุณแบบ 100% เต็ม!"
 TO_CORP_VASSAL_GREETING_DISLOYAL_01:0 "ช่วงนี้เราชักจะสงสัยอยู่ลึกๆ ว่าคุณกำลังใช้เราเพื่อสูบเครดิตนะ [From.GetName]..."
 TO_CORP_VASSAL_DOMINEERING_01:0 "มีบางสิ่งที่เครดิตไม่สามารถซื้อได้นะ [From.GetName] ดูและเรียนรู้ไว้ซะ"
 TO_CORP_DOW_PROPOSE_01:0 "[Root.GetName] เป็นภัยคุกคามต่อสิ่งมีชีวิตที่มีภูมิปัญญาทั้งมวล กาแล็กซีจะต้องถูกกวาดล้างสินค้าไร้รสนิยมของคุณ ก่อนที่มันจะเสื่อมทรามทางศีลธรรมไปมากกว่านี้"
 TO_CORP_DOW_PROPOSE_02:0 "[From.GetName] จะไม่ทนต่อพฤติกรรมลับลมคมในและการกอบโกยผลประโยชน์อย่างไม่เป็นธรรมจากทรัพย์สินส่วนรวมของกาแล็กซีอีกต่อไป"
