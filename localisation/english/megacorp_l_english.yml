 d_fungoid_extermination:1 "£blocker£ สารตกค้างจากการกวาดล้างสิ่งมีชีวิตฟันกอยด์"
 d_fungoid_extermination_desc:0 "เมือกพิษนี้เป็นสิ่งเดียวที่เหลืออยู่ของสิ่งมีชีวิตฟันกอยด์ที่ถูกกำจัดไป"
 d_ruined_arcology:1 "£blocker£ เขตมหานครปรักหักพัง"
 d_ruined_arcology_desc:0 "อาร์โคโลจีที่ปกคลุมดาวเคราะห์เมืองแห่งนี้พังทลายลงเป็นซากปรักหักพัง แม้ว่าฐานรากจะยังคงมั่นคง แต่โครงสร้างที่เสื่อมโทรมจำนวนมากจำเป็นต้องถูกแผ้วถางก่อนที่เราจะเริ่มสร้างใหม่ได้"
