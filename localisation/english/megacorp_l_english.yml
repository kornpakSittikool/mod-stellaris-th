 fleet3redealdesc2:0 "เราจะไม่กลับมายังพื้นที่อวกาศของพวก [Root.GetSpeciesAdj] อีกเป็นระยะเวลานานพอดู ท่านคงไม่อยากถูกทิ้งไว้โดยไม่มีของหรอกนะ"
 fleet3redealdesc3:0 "รับข้อตกลงสิ! รับมันไป! รับมันไป! รับมันไป!"
 fleet3redealdesc4:0 "พวกเรารู้สึกถึงจิตใจของพวกท่าน ข้อตกลงนี้มันกำลังล่อลวงท่าน มันเพรียกหาท่าน ใช่หรือไม่?"
 fleet3redealdesc5:0 "[Root.GetSpeciesNamePlural]! พวกเรากำลังจะออกไปจากพื้นที่อวกาศของพวกท่านแล้ว ข้อตกลงยังคงอยู่ สินค้ายังคงสดใหม่! ตีเหล็กเมื่อยังร้อนอยู่สิ! §Hกิ๊สส!§!"

