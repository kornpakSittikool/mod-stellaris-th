 fleet3deal7cost1:0 "คราวนี้มาถึงเรื่องราคาแล้ว ทางเรามีปัญหากระทบกระทั่งกับข้อกฎหมายบางประการ เป็นเรื่องเล็กน้อยเท่านั้น จิ๊บจ๊อยมาก แต่เราจำเป็นต้องมีพยานและการสนับสนุนเป็นเสียงรับประกัน ภาพลักษณ์ที่ดีในการหนุนหลังอุดมการณ์ของเรา! ประเทศที่เข้มแข็งและชาญฉลาดของท่านจะรับรองความบริสุทธิ์ให้พวกเรา พ่อค้าผู้น่าเชื่อถือที่ยากจนและบริสุทธิ์ใจอย่างยิ่ง ผู้ซึ่งความผิดพลาดเพียงหนึ่งเดียวคืออาการจิตฟุ้งซ่านชั่วขณะ เป็นเพียงการละเลยที่นำไปสู่การละเมิดฝ่ายนิติบัญญัติ §Hกิ๊สส§! ที่น่ารำคาญบางส่วนได้หรือไม่?"
