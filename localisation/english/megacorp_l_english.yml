 building_amusement_megaplex:0 "สวนสนุกครบวงจร"
 building_amusement_megaplex_desc:0 "สถานที่มหัศจรรย์ที่ซึ่งความฝันสามารถกลายเป็นความจริงได้ เมกะเพล็กซ์แห่งนี้มอบความสนุกสนานที่ปลอดภัยและได้รับความเห็นชอบจากบริษัทสำหรับทุกคนในครอบครัว"
 building_private_mining_consortium:0 "สมาคมเหมืองแร่เอกชน"
 building_private_mining_consortium_desc:1 "บริษัทขุดแร่เอกชนที่มีเมกะคอร์ปอเรชันเป็นเจ้าของ โดยจ้างคนงานเหมืองในท้องถิ่นเพื่อเข้าถึงทรัพยากรอันมั่งคั่งของดาวเคราะห์"
 building_food_conglomerate:1 "เครือข่ายอาหารจานด่วน"
 building_food_conglomerate_desc:1 "ราคาย่อมเยา รวดเร็ว และมีคุณค่าทางโภชนาการในระดับที่ยอมรับได้อย่างสมบูรณ์แบบ ไร้สารพิษ* และไร้ความยุ่งยาก!\\n\\n* อาหารอาจมีส่วนผสมของโพแทสเซียมเบนโซเอต, กรดไนตริก, สสารมืด, โซเลนท์กรีน และควันเหลวในปริมาณเล็กน้อย"
 building_public_relations_office:1 "บริษัทประชาสัมพันธ์สาธารณ"
 building_public_relations_office_desc:1 "ความเข้าใจผิดและความเคลือบแคลงสงสัยมักจะวนเวียนอยู่รอบ ๆ องค์กรขนาดใหญ่เสมอ ผลประโยชน์ของสาธารณชนคือการได้รับฟังทุกฝ่ายของข้อพิพาท และบริษัทประชาสัมพันธ์แห่งนี้มีหน้าที่ทำให้ทัศนะของนายจ้างได้รับการสื่อสารอย่างชัดเจน"
 building_private_research_initiative:0 "บริษัทวิจัยเอกชน"
 building_private_research_initiative_desc:1 "ในสิ่งอำนวยความสะดวกอันล้ำสมัยเหล่านี้ บริษัทเทคโนโลยีเอกชนดำเนินงานวิจัยและพัฒนาที่สำคัญในนามของบริษัทแม่"

 tech_executive_retreat:0 "โปรแกรมสันทนาการสำหรับผู้บริหาร"
