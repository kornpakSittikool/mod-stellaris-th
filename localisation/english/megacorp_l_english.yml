 mod_planet_pops_enforcer_upkeep_mult:0 "ค่าบำรุงรักษาผู้คุมกฎ"
 crime.1.name: "การว่างงานที่เพิ่มขึ้นที่ [Root.GetName]"
 crime.1.desc: "การว่างงานและความยากจนกำลังแพร่กระจายในอัตราที่น่าตกใจบน §H[Root.GetName]§! สถานการณ์ที่กำลังถูกเอารัดเอาเปรียบโดยองค์กรอาชญากรรมในพื้นที่\n\nเพื่อเป็นการแก้ปัญหาชั่วคราวเราสามารถเพิ่มผลประโยชน์การว่างงานใน[Root.GetPlanetMoon] มันจะไม่ง่าย แต่จะช่วยยืดเวลาเพิ่มเพื่อหาวิธีแก้ปัญหาที่ถาวรมากขึ้น เช่นการสร้างงานเพิ่มขึ้นหรือการปรับปรุงมาตรฐานความเป็นอยู่ของกลุ่มประชากรที่ได้รับผลกระทบ\n\nเราไม่สามารถทำอะไรได้เลย แต่สิ่งนี้อาจส่งผลให้เกิดการก่ออาชญากรรมที่มีนัยสำคัญบนดาว[Root.GetName]"
 crime.1.desc.experimenters: "[GetExperimentersEmergingCrime]"
 crime.1.b.desc: "ในฐานะโดรนของเรา§H[Root.GetName]§!โดย ไม่ รู้ ตัว ผู้ คน จํานวน มาก ขึ้น เรื่อย ๆ กลาย เป็น คน เฉื่อย ชา และ คิด เป็น เอกเทศ. พวก เขา ได้ ก่อ ตั้ง ชุมชน ของ ตน เอง ซึ่ง ถูก ซ่อน ไว้ และ ปัจจุบัน ใช้ เวลา ใน การ หา ทรัพยากร จาก รัง อื่น ๆ.\n\nเพื่อ ป้องกัน ไม่ ให้ สิ่ง นี้ เกิด ขึ้น การ แก้ ปัญหา ชั่ว คราว อาจ เป็น การ เชื่อม โยง กับ โดรน ใน โครงการ ปฏิบัติ งาน บาง ประเภท ซึ่ง ทํา ให้ พวก เขา ยุ่ง เกิน ไป จน ไม่ สามารถ หลีก ห่าง จาก ความ ตั้งใจ ของ จิตใจ ที่ เฉื่อย ชา ได้. มันจะไม่ถูก แต่นี้จะทําให้เรามีเวลามากขึ้นในการสร้างงานมากขึ้น\n\nเราทําอะไรไม่ได้ด้วย แต่นี่น่าจะส่งผลให้ เกิดการก่อตัวของชุมชนโดรนที่ผิดปกติ[Root.GetName]."
 crime.1.b.desc.experimenters: "การเบี่ยงเบนในลักษณะนี้จะมอบโอกาสอย่างล้นหลามให้แก่ [GetExperimentalEngineerPlural] ของเราสำหรับการทดลองใหม่ ๆ"
 crime.1.c.desc: "จํานวนของโดรนว่างบน§H[Root.GetName]§!เพิ่มขึ้นอย่างต่อเนื่อง และหลายหน่วยที่ตกงานเหล่านี้ ได้เริ่มเบี่ยงเบนอํานาจในการประมวลผล การคอร์รัปชั่นนี้กําลังแพร่กระจายอย่างรวดเร็ว และหน่วยงานที่ได้รับผลกระทบเริ่มก่อตัวเป็นเครือข่ายของตนเอง เกินการควบคุมของปัญญาหลัก\n\nเพื่อป้องกันสิ่งนี้ การแก้ปัญหาชั่วคราว อาจเป็นการนําหุ่นยนต์ที่ตกงานทั้งหมด เข้าสู่โหมดสแตนด์บาย นี้จะเพิ่มขึ้นอย่างมากค่าใช้จ่ายการบํารุงรักษาของพวกเขา แต่มันจะทําให้เรามีเวลาในการสร้างงานมากขึ้น\n\nเราทําอะไรไม่ได้ด้วย แต่นี่น่าจะส่งผลให้ เครือข่ายของโดรนเสียหาย[Root.GetName]."
 crime.1.a: "ช่วยเหลือค่าใช้จ่ายโดยให้ผลประโยชน์เพิ่มขึ้น (แจกเงิน)"
 crime.1.a.experimenters: "จัดตั้งเงินช่วยเหลือขึ้นมา เราต้องการประชากรที่มีสุขภาพดี"
 crime.1.b: "อาชญากรไม่กี่คน ไม่ต้องกังวล"
 crime.1.b.experimenters: "การก่ออาชญามีสิทธิ์สร้างผู้สมัครทดสอบในอุดมคติ"
 crime.1.a2: "ดำเนินโปรแกรม"
 crime.1.a2.experimenters: "ดำเนินโปรแกรม"
 crime.1.b2: "โดรนเบี่ยงเบนไม่กี่ตัวไม่ใช่เรื่องน่ากังวล"
 crime.1.b2.experimenters: "โดรนเบี่ยงเบนเป็นเป้าหมายทดสอบในอุดมคติ"
 crime.1.a3: "เปิดใช้งานโหมดสแตนด์บาย"
 crime.1.a3.tooltip: "เพิ่มคุณสมบัติปรับแต่ง §Yโหมดสแตนด์บาย§! เป็นเวลา §Y120§! เดือน โดยส่งผลดังต่อไปนี้: ค่าบำรุงรักษาพลังงานเครดิตของโดรนว่างงาน: §R+2§!"
 crime.1.b3: "หน่วยโดรนที่ทุจริตไม่กี่หน่วยไม่สำคัญอะไร"
 crime.2.name: "เจ้าหน้าที่ติดสินบนที่ [Root.GetName]"
 crime.2.desc: "ไม่ นาน มา นี้ พยาน หลัก ฐาน ที่ ได้ มา ได้ เปิด เผย ว่า เจ้า หน้าที่ รัฐบาล จํานวน มาก ใน เรื่อง§H[Root.GetName]§!อยู่ระหว่างดําเนินการ องค์กร อาชญากรรม ใน ท้อง ถิ่น ให้ สินบน พวก เขา ให้ มอง อีก แบบ หนึ่ง ขณะ ที่ พวก เขา ทํา กิจกรรม ที่ ไม่ ดี. ใน บาง กรณี พวก เจ้า หน้าที่ ถูก เปิดโปง ว่า เป็น สมาชิก ของ องค์กร ที่ พวก เขา คิด ว่า จะ สู้ รบ!\n\nมี การ จับ กุม หลาย ครั้ง แต่ เจ้า หน้าที่ หลาย คน ได้ ทิ้ง โพสต์ ของ ตน เมื่อ พวก เขา รู้ ว่า มี การ ก่อ การ ร้าย. การทุจริตบน[Root.GetName]ดูเหมือนวิ่งลึกมาก"
 crime.2.a: "มันต้องได้รับการจัดการ"
 crime.2.a.experimenters: "เรามีโปรแกรมพิเศษสำหรับอาชญากรรมของรัฐบาล"
 crime.3.name: "เสพติดยาเพิ่มขึ้นบน [Root.GetName]"
 crime.3.desc: "สืบเนื่องจากอาชญากรรมที่เพิ่มสูงขึ้นบน §H[Root.GetName]§! การเสพติดยาเสพติดในหมู่ประชากรได้เพิ่มขึ้นอย่างมีนัยสำคัญในระยะหลังนี้ การใช้สารเสพติดที่ผิดกฎหมายได้แพร่กระจายออกไปไกลกว่าโลกใต้ดินของอาชญากรบน [Root.GetPlanetMoon] และในขณะนี้ส่งผลกระทบต่อผู้คนจากทุกสาขาอาชีพ"
 crime.3.desc.experimenters: "แม้จะเป็นแหล่งข้อมูลการทดสอบที่น่าทึ่ง แต่ผลเสียก็เริ่มมีน้ำหนักมากกว่าผลดีแล้ว"
 crime.3.a: "ข่าวน่าหนักใจ"
 crime.3.a.experimenters: "การเสพสารเสพติดทำให้เกิดข้อมูลการทดสอบที่ผิดพลาด"
 crime.4.name: "แก๊งปะทะกันบน [Root.GetName]"
 crime.4.desc: "การปะทะกันอย่างรุนแรงระหว่างแก๊งติดอาวุธที่คุมโลกใต้ดินของอาชญากรบน §H[Root.GetName]§! เพิ่งทวีความรุนแรงขึ้น การต่อสู้บนท้องถนนได้ปะทุขึ้นในใจกลางเมืองหลายแห่ง โดยเจ้าหน้าที่ดาวเคราะห์ต่างดิ้นรนที่จะควบคุมมัน ความเสียหายข้างเคียงนั้นหนักหนาสาหัสมาก"
 crime.4.desc.experimenters: "หากเราสามารถจับเหยื่อเหล่านี้ได้ก่อนที่พวกเขาจะถูกส่งไปยังห้องเก็บศพ [GetExperimentalEngineerPlural] ของเราก็จะมีทางเลือกให้ศึกษาอย่างล้นหลาม"
 crime.4.a: "สถานการณ์นี้กำลังจะควบคุมไม่ได้"
 crime.4.a.experimenters: "สถานการณ์นี้อาจจะยังคงเป็นประโยชน์ต่อเรา"
 crime.5.name: "กิจกรรมของการลักลอบถูกรายงานพบบนดาว [Root.GetName]"
 crime.5.desc: "มีการเพิ่มขึ้นอย่างเห็นได้จากการลักลอบ§H[Root.GetName]§!เร็วๆนี้ จํานวนของ \"กีฬาสีเทา\"- กีฬาที่ไม่ได้รับอนุญาต การลักลอบนําเข้าและหน่วยงานอาชญากรรมอื่น ๆ - เชื่อกันว่ามีอยู่บน[Root.GetPlanetMoon]พื้นผิว\n\nเจ้าหน้าที่ท้องถิ่นกําลังตามแกะรอยท่าจอดเรือผิดกฎหมายนี้อยู่ แต่จนกว่าพวกเขาจะประสบความสําเร็จในการค้า[Root.GetPlanetMoon]จะทรมาน"
 crime.5.desc.experimenters: "แม้ว่าจะเป็นเรื่องน่ารำคาญ แต่ศูนย์กลางของกิจกรรมที่ผิดกฎหมายเช่นนี้จะช่วยให้ [GetExperimentalEngineerPlural] ของเรามีความหลากหลายทางพันธุกรรมมากมายให้ศึกษา"
 crime.5.a: "$UNFORTUNATE$"
 crime.5.a.experimenters: "[GetExperimentersTragicLesson]"
 crime.6.name: "คลื่นอาชญากรรมบน [Root.GetName]"
 crime.6.desc: "เกิดอาชญากรรมขึ้นใน §H[Root.GetName]§! เมื่อไม่นานมานี้ ในขณะที่ [Root.GetPlanetMoon] ยังคงเข้าสู่ความไร้ขื่อไร้แป คลื่นอาชญากรรมครั้งล่าสุดนี้มีเป้าหมายในพื้นที่ที่อยู่อาศัยและได้รับการพิจารณาแล้วว่าอยู่นอกเหนือจากอิทธิพลของแก๊งอาชญากรที่มีอิทธิพลของ[Root.GetPlanetMoon]"
 crime.6.desc.experimenters: "[GetExperimentalEngineerPlural] ของเรายังคงปลอดภัยภายในห้องทดลองที่มีการรักษาความปลอดภัยอย่างแน่นหนา และกำลังเตรียมพร้อมสำหรับการไหลบ่าเข้ามาของกลุ่มผู้ทดสอบรายใหม่"
 crime.6.a: "อาชญากรรมจะต้องได้รับการจัดการ"
 crime.6.a.experimenters: "องค์ประกอบทางอาชญากรรมเหล่านี้ทำให้เรามีอะไรให้ศึกษามากมาย"
 crime.7.name: "ยึดของเถื่อนบน [Root.GetName]"
 crime.7.desc: "จากการติดตามเบาะแสที่ไม่ประสงค์ออกนาม ผู้คุมกฎบน §H[Root.GetName]§! ได้บุกเข้าค้นโกดังขนาดใหญ่แห่งหนึ่งบริเวณชานเมืองหลวงของ [Root.GetPlanetMoon] ภายในโกดังพวกเขาพบของเถื่อนซุกซ่อนอยู่เป็นจำนวนมาก ซึ่งเห็นได้ชัดว่าถูกนำมาเก็บไว้ที่นี่โดยองค์กรอาชญากรรมในท้องถิ่น มีการจับกุมไปแล้วหลายครั้ง และของกลางที่ยึดมาได้นั้นได้รับการจัดเก็บอย่างปลอดภัยในคลังสินค้าของรัฐบาล"
 crime.7.desc.experimenters: "[GetExperimentalEngineerPlural] ของเรากระตือรือร้นที่จะจัดทำบัญชีของสารผิดกฎหมายเหล่านี้ และคาดหวังว่าจะได้พบการค้นพบครั้งใหญ่จากการนำไปใช้ในการทดลองเพิ่มเติม"
 crime.7.a: "$EXCELLENT$"
 crime.7.a.experimenters: "[GetExperimentersWeWillLearn]"
 crime.8.name: "จับบอสอาชญากรบน [Root.GetName]"
 crime.8.desc: "บอสอาชญากรคนสำคัญบน §H[Root.GetName]§! เพิ่งถูกจับได้ในปฏิบัติการล่อซื้อของผู้คุมกฎ การสูญเสียผู้นำของพวกเขาทำให้กิจกรรมของหนึ่งในองค์กรอาชญากรรมรายใหญ่ของ [Root.GetPlanetMoon] ลดลงอย่างมาก ส่งผลให้อาชญากรรมลดลงอย่างเห็นได้ชัด"
 crime.8.desc.experimenters: "การได้ตัวมาเช่นนี้ทำให้เรามีโอกาสพิเศษในการศึกษาจิตใจของอาชญากรที่ได้รับการประเมินไว้สูง [GetExperimentalEngineerPlural] ของเรากระตือรือร้นที่จะเริ่มการวิเคราะห์เชิงลึก"
 crime.8.a: "$EXCELLENT$"
 crime.8.a.experimenters: "เราจะได้รับความรู้ความลับที่น่าสนใจอะไรบ้างนะ"
 crime.40.name: "ความเสื่อมทรามและอาชญากรรมบน [Root.GetName]"
 crime.40.desc: "อาชญากรรมยังคงเป็นปัญหาบน §H[Root.GetName]§! และโลกใต้ดินของอาชญากรที่กว้างขวางได้ฝังรากลึกบน [Root.GetPlanetMoon] แล้ว บางพื้นที่ได้กลายสภาพเป็นเขตไร้กฎหมายหรือถูกควบคุมโดยองค์กรอาชญากรรมอย่างสมบูรณ์"
 crime.40.desc.experimenters: "โชคดีที่สภาพแวดล้อมเช่นนี้ช่วยให้เรามีเป้าหมายทดสอบรายใหม่ ๆ อย่างล้นหลาม [GetExperimentalEngineerPlural] ของเรากระตือรือร้นที่จะสำรวจแนวทางการวิจัยใหม่ ๆ"
 crime.40.b.desc: "กิจกรรมที่เบี่ยงเบนยังคงเติบโตบน §H[Root.GetName]§! ท้าทายเจตจำนงของไฮฟ์มายด์อย่างเปิดเผย เชื่อกันว่าในขณะนี้มีชุมชนโดรนเบี่ยงเบนเกิดขึ้นทั้งหมดบน [Root.GetPlanetMoon] คอยขโมยทรัพยากรจากส่วนที่เหลือของไฮฟ์เพื่อสนับสนุนกิจกรรมที่เลวร้ายของพวกเขา"
 crime.40.b.desc.experimenters: "ผู้เบี่ยงเบนเหล่านั้นจะพบกับจุดประสงค์ใหม่ในฐานะผู้ทดสอบ บางที [GetExperimentalEngineerPlural] ของเราอาจจะพบต้นตอของการทุจริตของพวกเขาระหว่างการชำแหละในอนาคต"
 crime.40.c.desc: "การทุจริตหยั่งรากลึกยิ่งขึ้นบน §H[Root.GetName]§! ในขณะนี้หน่วยที่เบี่ยงเบนทำงานอย่างเปิดเผยตามพารามิเตอร์ของตนเองโดยละทิ้งคำสั่งของปัญญาประดิษฐ์ส่วนกลาง เชื่อกันว่าพวกมันได้สร้างเครือข่ายของตนเองขึ้นมาเพื่อแลกเปลี่ยนข้อมูลและพลังงานที่ถูกขโมยไป"
 crime.40.a: "นี่เป็นเรื่องที่ยอมรับไม่ได้"
 crime.40.a.experimenters: "อาชญากรคือทรัพยากรที่ใช้ประโยชน์ได้"
 crime.40.b: "พวกเขาเตลิดไปจากไฮฟ์มายด์แล้ว!"
 crime.40.b.experimenters: "การเบี่ยงเบนมีวิธีการรักษาที่เชื่อถือได้เพียงวิธีเดียว"
 crime.40.c: "ระดับการทุจริตกำลังเข้าใกล้จุดวิกฤต"
 crime.41.name: "ความเป็นระเบียบเรียบร้อยกลับมาอีกครั้งที่ [Root.GetName]"
 crime.41.desc: "ด้วยการลดอาชญากรรมบน §H[Root.GetName]§! [Root.GetPlanetMoon] ที่เต็มไปด้วยอาชญากร ได้ลดลง ประชากรรู้สึกตื้นตันใจ ในความปลอดภัย และ ความสามัคคี"
 crime.41.desc.experimenters: "ด้วยความเป็นระเบียบเรียบร้อยใหม่นี้ เราคาดหวังว่าจะได้กลับไปศึกษาค้นคว้าที่มีประสิทธิผลอีกครั้งอย่างภาคภูมิใจ"
 crime.41.b.desc: "กิจกรรมของโดรนที่เบี่ยงเบนได้รับการเหยียบย่ำปราบปรามจนหมดสิ้นบน §H[Root.GetName]§! เจตจำนงสูงสุดของไฮฟ์มายด์ได้กลับมาครองอำนาจอีกครั้ง"
 crime.41.b.desc.experimenters: "ผู้เบี่ยงเบนที่หมดอายุขัยจะยังคงรับใช้ [GetExperimentalEngineerPlural] ของเราได้ดีแม้จะเสียชีวิตไปแล้ว"
 crime.41.c.desc: "การทุจริตของโดรนที่เคยปรากฏก่อนหน้านี้บน §H[Root.GetName]§! ได้ถูกกวาดล้างออกจากเครือข่ายทั้งหมดแล้ว ขณะนี้หน่วยโดรนทั้งหมดกลับมาทำงานตามพารามิเตอร์ที่กำหนดโดยปัญญาประดิษฐ์ส่วนกลางอีกครั้ง"
 crime.41.a: "$GOOD$"
 crime.41.a.experimenters: "วิทยาศาสตร์ก้าวหน้าต่อไป"
 crime.100.name: "สงครามแก๊งบน [Root.GetName]"
 crime.100.desc: "ความแค้นอันขมขื่นได้ก่อตัวขึ้นเป็นเดือนๆ ระหว่างองค์กรอาชญากรรมที่ใหญ่ที่สุดสององค์กร§H[Root.GetName]§!และในที่สุดมันก็มาถึงหัว การต่อสู้ที่โหดร้ายได้ปะทุในถนนและซอยข้าม[Root.GetPlanetMoon]และมันกําลังแพร่กระจายไปยังพื้นที่ที่อยู่อาศัยอย่างรวดเร็ว\n\nกองกําลังรักษาความปลอดภัยในท้องถิ่นของเรา กําลังทําในสิ่งที่พวกเขาสามารถทําได้ เพื่อควบคุมความรุนแรง แต่การต่อสู้ที่ร้ายแรงได้ทําให้เขาพ่ายแพ้"
 crime.100.desc.experimenters: "สภาพแวดล้อมเช่นนี้ทำให้ [GetExperimentalEngineerPlural] ของเรามีคลังวัสดุสำหรับการทดลองสะสมอยู่เป็นจำนวนมาก ในวิกฤตย่อมมีโอกาส อย่างที่เขาว่ากัน"
 crime.100.a: "มันคือเขตสงคราม!"
 crime.101.name: "แก๊งซุ่มโจมตีบน [Root.GetName]!"
 crime.101.desc: "หนึ่งในแก๊งใน§H[Root.GetName]§!เมื่อเร็ว ๆ นี้เปิดตัวการโจมตีคอนเสิร์ตกับเจ้าหน้าที่ตํารวจทั่ว[Root.GetPlanetMoon]ใน เวลา หนึ่ง ชั่วโมง ที่ กําหนด ไว้ สมาชิก แก๊ง ได้ จู่ โจม หน่วย ปราบ ปราม ขณะ ที่ หลาย เขต ถูก บุก เข้า โจมตี อย่าง สิ้น เชิง. การต่อสู้ที่รุนแรง ได้ทิ้งพันตาย\n\nกองกําลังรักษาความปลอดภัยที่เหลือของเรากําลังดิ้นรนเพื่อการควบคุมกลับมา แต่สําหรับเวลาหลายภูมิภาค[Root.GetPlanetMoon]ได้สืบเชื้อสายไปสู่การละเมิดพระราชบัญญัติ"
 crime.101.desc.experimenters: "อย่างน้อยอาชญากรรมเช่นนี้ก็มอบเสบียงสดใหม่จำนวนมากให้แก่ [GetExperimentalEngineerPlural] ของเรา"
 crime.101.a: "$crime.200.a$"
 crime.101.a.experimenters: "[GetExperimentersTragicLesson]"
 crime.101.tooltip: "§Hประชากรผู้คุมกฎบน [Root.GetName]:§! ตาย"
 crime.102.name: "แก๊งสงครามบน [Root.GetName] กระจายไปในอวกาศ"
 crime.102.desc: "สงครามแก๊งที่รุนแรงซึ่งกำลังลุกลามบน §H[Root.GetName]§! ได้แพร่กระจายไปยังส่วนอื่น ๆ ของระบบดาว [Root.solar_system.GetName] มีรายงานการปะทะกันหลายครั้งระหว่างยานพลเรือนติดอาวุธที่ติดธงสัญลักษณ์ของแก๊ง และทั้งสองฝ่ายในสงครามกำลังมุ่งเป้าไปที่ยานการค้าที่เดินทางเข้ามาเพื่อสร้างรายได้เพิ่มขึ้นและขยายกองยานของตนเอง"
 crime.102.desc.experimenters: "[GetExperimentalEngineerPlural] ของเราได้ยื่นคำขอเพื่อรับอนุญาตให้สังเกตการณ์ผลกระทบของการตอบโต้ของเราและการที่ศพจำนวนมากถูกดีดออกสู่สุญญากาศในอวกาศเป็นวงกว้าง"
 crime.102.a: "$crime.200.a$"
 crime.102.a.experimenters: "การตอบโต้ของเราจะช่วยให้การเรียนรู้ดีที่สุด"
 crime.102.tooltip: "§Rกองยานโจรสลัดที่เป็นศัตรูได้ปรากฏตัวขึ้นในระบบดาว [Root.solar_system.GetName]!§!"
 crime.103.name: "ศึกปะทะแก๊งบน [Root.GetName]"
 crime.103.desc: "การต่อสู้ระหว่างสองแก๊งหลักของ§H[Root.GetName]§!ได้ดําเนินการเมื่อเร็ว ๆ นี้ในหนึ่งใน[Root.GetPlanetMoon]ใจกลางเมืองที่ใหญ่ที่สุด จํานวนศพอยู่ในหมื่นของทั้งสองฝั่ง และไม่มีผู้ชนะที่ชัดเจน\n\nการ สู้ รบ อย่าง ป่า เถื่อน ทําลาย เมือง เกือบ จะ ถึง ดิน และ ประชากร ส่วน ใหญ่ ถูก บังคับ ให้ หนี."
 crime.103.desc.experimenters: "ความรุนแรงที่ไร้สติเช่นนี้ไม่ได้ปราศจากเสน่ห์ของมันเสียทีเดียว บางทีเรายังอาจสามารถเก็บกู้การวิจัยทางวิทยาศาสตร์ใหม่ ๆ จากร่างผู้เสียชีวิตได้"
 crime.103.a: "$DISCONCERTING$"
 crime.103.a.experimenters: "[GetExperimentersTragicLesson]"
 crime.103.tooltip: "§Hประชากร 300 £pop£ บน [Root.GetName]:§! ตาย"
 crime.104.name: "พ่อค้าเลี่ยงสงครามแก๊ง"
 crime.104.desc: "การต่อสู้ที่กำลังดำเนินอยู่ระหว่างแก๊งต่าง ๆ บน §H[Root.GetName]§! ได้ส่งผลกระทบเชิงลบต่อการค้าของ [Root.GetPlanetMoon] ด้วยสถานการณ์ที่ผันผวนบนพื้นผิว สมาคมพ่อค้าข้ามระบบดาวหลายแห่งได้ออกคำเตือนเกี่ยวกับการเดินทางโดยแนะนำให้นักการค้าหลีกเลี่ยง [Root.GetPlanetMoon] อย่างไรก็ตาม การค้าอาวุธที่ผิดกฎหมายดูเหมือนจะเฟื่องฟูอย่างมาก"
 crime.104.desc.experimenters: "ด้วยการที่อาวุธทรงพลังเหล่านี้เข้าสู่ท้องถนน [GetExperimentalEngineerPlural] ของเราจึงกระตือรือร้นที่จะตรวจสอบผลกระทบที่สร้างความเสียหายต่อร่างกายของ [Root.Owner.GetSpeciesName]"
 crime.104.a: "$WORRYING$"
 crime.104.a.experimenters: "[GetExperimentersWeWillLearn]"
 crime.200.name: "การค้ายาเสพติดขยายตัวบน [Root.GetName]"
 crime.200.desc: "กับอาชญากรรมที่เกิดขึ้นอย่างแพร่หลาย§H[Root.GetName]§!การขายยาเสพติดผิดกฎหมายยังเพิ่มขึ้นเป็นสถิติใหม่ ยา เสพย์ ติด หลาก หลาย ชนิด จาก ทั่ว ทุก พื้น ที่ ที่ รู้ จัก กัน กําลัง ถูก ลักลอบ เข้า ไป[Root.GetPlanetMoon].\n\nการ ใช้ ยา เสพย์ ติด มี แพร่ หลาย ใน ท่ามกลาง ประชากร เป็น ความ เสีย หาย ต่อ ผล ผลิต ทั่ว ไป."
 crime.200.desc.experimenters: "กิจกรรมอาชญากรรมที่เกิดขึ้นใหม่นี้ควรช่วยให้ [GetExperimentalEngineerPlural] ของเรามีเส้นทางการศึกษาที่น่าตื่นเต้นใหม่"
 crime.200.a: "นี่ไม่ใช่เรื่องดีเลย"
 crime.200.a.experimenters: "อาชญากรเหรอ? อาสาสมัครต่างหาก!"
 crime.201.name: "มีการเปิดตัวยาเสพติดชนิดใหม่บน [Root.GetName]"
 crime.201.desc: "ชิ้นส่วนเมื่อ§H[Root.GetName]§!ได้นําเข้ายาตัวใหม่ ที่เราเชื่อว่ากําเนิดมาจาก ที่ไหนสักแห่งในดินแดนของโจรสลัด ยา นี้ ไม่ เพียง ทํา ให้ ติด ได้ ง่าย เท่า นั้น แต่ ยัง พิสูจน์ ให้ เห็น ด้วย ว่า เป็น อันตราย ถึง ชีวิต ส่วน ใหญ่ หาก ใช้ ใน สิ่ง ใด ก็ ตาม นอก จาก ปริมาณ เล็ก น้อย.\n\nขณะที่เจ้าหน้าที่ท้องถิ่นกําลังทําในสิ่งที่พวกเขาสามารถทําได้ เพื่อยับยั้งการแพร่กระจายของยาเสพติดนี้ มีผื่นของการตายทั่ว[Root.GetPlanetMoon]."
 crime.201.desc.experimenters: "ไม่ว่าจะอย่างไรก็ตาม เราได้สังเกตเห็นพัฒนาการที่น่าทึ่งบางประการในการวิจัยของเราผ่านการศึกษาเกี่ยวกับสารชนิดนี้และผลกระทบของมันต่อกลุ่มเป้าหมายทดสอบ"
 crime.201.a: "$WORRYING$"
 crime.201.a.experimenters: "[GetExperimentersWeWillLearn]"
 crime.201.tooltip: "§Hประชากร 400 £pop£ บน [Root.GetName]:§! ตาย"
 crime.202.name: "กลุ่มคาร์เตลยาเสพติดปะทะกันบน [Root.GetName]"
 crime.202.desc: "การแข่งขันเพื่อแย่งชิงส่วนแบ่งการตลาดเป็นไปอย่างดุเดือดระหว่างกลุ่มคาร์เตลอาชญากรที่มีส่วนเกี่ยวข้องกับการค้ายาเสพติดบน §H[Root.GetName]§! เพิ่งมีการปะทะกันหลายครั้งที่เกี่ยวข้องกับการใช้อาวุธทหารราบระดับหนักของทหาร ซึ่งสร้างความเสียหายต่อทรัพย์สินอย่างมากและส่งผลให้พลเรือนจำนวนมากเสียชีวิต ดูเหมือนว่ายาเสพติดจะไม่ใช่สิ่งเดียวที่ถูกลักลอบนำเข้ามาใน [Root.GetPlanetMoon]"
 crime.202.desc.experimenters: "[GetExperimentersEmergingCrime]"
 crime.203.name: "ยานขนส่งยาเสพติดตกบน [Root.GetName]"
 crime.203.desc: "ไม่ นาน มา นี้ เรือ บรรทุก พลเรือน ขนาด ใหญ่ ถูก ปฏิเสธ การ เข้า ไป ใน บรรยากาศ§H[Root.GetName]§!หลังจากถูกพบว่าขนยาผิดกฎหมาย ในห้องเก็บของ ขณะที่เรือถูกสั่งซื้อเพื่อการตรวจสอบของกัปตันของมันคือยาเสพติด[Root.Owner.GetSpeciesName]แทน ที่ จะ ทํา อย่าง นั้น จะ เผา วงจร การ โคจร ให้ หมด เพื่อ พยายาม จะ ร่อน ลง.\n\nเรือบรรทุกสินค้าถูกชนโดย การยิงภาคพื้นดินจากกองกําลังรักษาความปลอดภัยของดาวเคราะห์ของเรา ในขณะที่มันลงมาทําให้ มันชนเข้าไปในอําเภอที่มีคนหนาแน่น มีผู้รอดชีวิตไม่กี่คนที่อยู่บนพื้น"
 crime.203.desc.experimenters: "[GetExperimentalEngineerPlural] ของเรากระตือรือร้นที่จะศึกษาผลกระทบของสารเสพติดที่แพร่กระจายเข้าสู่สิ่งแวดล้อมในชุมชนโดยรอบนับตั้งแต่นั้นมา"
 crime.203.a: "นี่มันภัยพิบัติชัด ๆ!"
 crime.203.a.experimenters: "[GetExperimentersTragicLesson]"
 crime.204.name: "การค้ายาเสพติดยังคงดำเนินต่อไปบน [Root.GetName]"
 crime.204.desc: "การค้ายาเสพติดที่ผิดกฎหมายยังคงดำเนินต่อไปโดยไม่มีการลดละบน §H[Root.GetName]§! ล่าสุดเราค้นพบว่าพวกนักลักลอบขนของเถื่อนได้ขโมยแก๊สแปลกถิ่น(แก๊สไฟฟ้า)จากคลังเก็บของในวงโคจรของเรา โดยมุ่งเป้าไปที่แก๊สที่มีคุณสมบัติหลอนประสาท จากนั้นพวกมันก็ถูกแจกจ่ายให้กับผู้ค้าและนำไปจำหน่ายตามตรอกซอกซอยของ [Root.GetName]"
 crime.204.desc.experimenters: "[GetExperimentalEngineerPlural] ของเราประหลาดใจที่พวกเขาไม่ได้นึกถึงการประยุกต์ใช้แก๊สแปลกถิ่นอย่างชาญฉลาดเหล่านี้ก่อนใคร"
 crime.204.a: "จะปล่อยให้เป็นแบบนี้ต่อไปไม่ได้!"
 crime.204.a.experimenters: "ช่างน่าสนใจเหลือเกิน"
 crime.300.name: "กฎหมู่"
 crime.300.desc: "สมาคมอาชญากรรมหลักบน §H[Root.GetName]§! เพิ่งกำจัดคู่แข่งคนสุดท้ายของพวกมันและเข้าควบคุมโลกใต้ดินของอาชญากรที่กว้างขวางของ [Root.GetPlanetMoon] อย่างสมบูรณ์ พวกมันได้บ่อนทำลายเจ้าหน้าที่ดาวเคราะห์ที่แท้จริงมานานแล้ว และประชากรในท้องถิ่นต่างพากันมองว่าแก๊งสเตอร์เหล่านี้คือผู้ปกครองที่แท้จริงของ [Root.GetName]"
 crime.300.desc.experimenters: "ของเรา[GetExperimentalEngineerPlural]ได้กําหนดให้ดาวเคราะห์ดวงนี้ เป็นสภาพแวดล้อม \"อุดมไปด้วย\" สําหรับการวิจัยในอนาคต"
 crime.300.a: "อันธพาลพวกนี้ต้องได้รับการจัดการ"
 crime.301.name: "ค่าคุ้มครองบน [Root.GetName]"
 crime.301.desc: "พวกแก๊งสเตอร์ที่ควบคุม §H[Root.GetName]§! ได้ริเริ่มขู่กรรโชกเก็บค่าคุ้มครองเป็นวงกว้าง เนื่องจากระบบตุลาการและระบบบังคับใช้กฎหมายที่แท้จริงของ [Root.GetPlanetMoon] พิสูจน์แล้วว่าไม่สามารถรับมือกับอาชญากรรมที่จัดตั้งขึ้นได้ ประชากรจึงรู้สึกว่าไม่มีทางเลือกอื่นนอกจากยอมสยบต่ออำนาจของอาชญากรเหล่านี้ สิ่งนี้ได้ส่งผลกระทบอย่างร้ายแรงต่อประสิทธิภาพในการผลิต"
 crime.301.desc.experimenters: "ในมุมที่ดี แก๊งสเตอร์เหล่านี้มีแนวโน้มที่จะส่งมอบผู้เข้ารับการทดสอบให้แก่ [GetExperimentalEngineerPlural] ของเราได้อย่างมีประสิทธิภาพมากกว่าช่องทางอย่างเป็นทางการ"
 crime.301.a: "เราจำเป็นต้องฟื้นฟูการควบคุมกลับคืนมา"
 crime.301.a.experimenters: "อย่างไรก็ตาม เราควรดำเนินการเพื่อสร้างอำนาจควบคุมขึ้นมาใหม่"
 crime.302.name: "การบริหารที่ทุจริตบน [Root.GetName]"
 crime.302.desc: "ภารกิจค้นหาความจริงล่าสุด§H[Root.GetName]§!เปิด เผย ว่า การ บริหาร ของ ดาว เคราะห์ ส่วน ใหญ่ ใช้ ประโยชน์ จาก[Root.GetPlanetMoon]เป็นองค์กรอาชญากรรมหลัก เจ้าหน้าที่ทุจริตทั้งหมดถูกแทนที่ แต่สิ่งนี้ได้นําไปสู่การรบกวนอย่างร้ายแรงในภาครัฐ\n\nนอก จาก นั้น พวก อันธพาล ที่ ปกครอง ยมโลก แห่ง อาชญากรรม[Root.GetName]แม้ แต่ ตอน นี้ ก็ ยัง พยายาม จะ ให้ สินบน หรือ บีบ บังคับ เจ้า หน้าที่ ใหม่ ให้ เข้า มา อยู่ ใน องค์การ ของ ตน."
 crime.302.desc.experimenters: "[GetExperimentersEmergingCrime]"
 crime.302.a: "ความพ่ายแพ้ชั่วคราว"
 crime.302.b: "บังคับใช้นโยบายไม่ยอมรับการทุจริตโดยเด็ดขาด(ถอนหายใจ)"
 crime.302.c: "เสนอสิ่งจูงใจสำหรับความซื่อสัตย์"
 crime.303.name: "แก๊งสเตอร์ลอบสังหารผู้ว่าการรัฐบน [Root.GetName]"
 crime.303.desc: "อันธพาลจากกลุ่มอาชญากรที่ครอบงํายมโลก§H[Root.GetName]§!ถูกลอบสังหาร[governor_target.GetTitle] [governor_target.GetName]นั่น[governor_target.GetTitle]มอเตอร์คาร์ดถูกตัดทิ้ง ขณะที่มันออกจากท่าเรือ และเกิดการยิงกันอย่างรุนแรงขึ้น ระหว่างการปลดประจําการ\n\nเมื่อฝุ่นจับ,[governor_target.GetTitle]มี การ ยืน ยัน ว่า เคย อยู่ ท่ามกลาง คน ตาย."
 crime.303.a: "เตรียมงานรัฐพิธีศพ"
 crime.303.a.experimenters: "[GetExperimentersTragicLesson]"
 crime.304.name: "แก๊งสเตอร์ช่วงชิงการค้าบน [Root.GetName]"
 crime.304.desc: "สมาคมอาชญากรรมที่ดำเนินงานบน §H[Root.GetName]§! กำลังเข้าควบคุมส่วนแบ่งที่สำคัญของการค้าทั้งไปและกลับจาก [Root.GetPlanetMoon] พวกมันได้สถาปนาการควบคุมอย่างเบ็ดเสร็จเหนือกองเรือท่าอวกาศยานที่สำคัญหลายแห่ง ซึ่งการค้าทั้งหมดจะต้องผ่านคนกลางของพวกมัน ส่งผลให้รายได้จากการค้าของเราจาก [Root.GetName] ลดลงในทุกพื้นที่"
 crime.304.desc.experimenters: "โชคดีที่เส้นทางการขนส่งเสบียงที่ใช้โดย [GetExperimentalEngineerPlural] ของเรายังคงไม่ได้รับผลกระทบ ซึ่งน่าจะเป็นเพราะสินบนที่ได้จ่ายไปแล้วเพื่อจัดหาอาสาสมัครทดสอบ"
 crime.304.a.experimenters: "วิทยาศาสตร์ยังคงก้าวเดินต่อไป"\n
 crime.500.name: "โดรนอาละวาดคลุ้มคลั่งบน [Root.GetName]"\n
 crime.500.desc: "โดรนเบี่ยงเบนจำนวนมากเพิ่งจะวิ่งอาละวาดไปทั่ว §H[Root.GetName]§! ทำร้ายโดรนที่ภักดีและสร้างความเสียหายให้กับสิ่งอำนวยความสะดวกของเรา โดรนเบี่ยงเบนเหล่านี้สร้างความเสียหายอย่างใหญ่หลวงก่อนที่จะถูกขับไล่ไปได้"\n
 crime.500.a: "พวกเบี่ยงเบนเหล่านี้จะต้องถูกจัดการ"\n
 crime.500.a.experimenters: "เริ่มการชันสูตร"\n
 crime.500.a.experimenters: "เริ่มการชันสูตรศพ"
 crime.501.desc: "การปรากฏตัวของโดรนเบี่ยงเบนที่เพิ่มจำนวนมากขึ้นบน §H[Root.GetName]§! เริ่มส่งผลเสียต่อประสิทธิภาพการผลิตของ [Root.GetPlanetMoon] ในขณะที่โดรนของเราดำเนินงานตามปกติ พวกเบี่ยงเบนก็มักจะเข้ามาขัดขวางหรือขโมยเครื่องมือและอุปกรณ์ที่จำเป็น"\n
 crime.501.desc.experimenters: "ความเบี่ยงเบนเช่นนี้มีแต่จะช่วยเพิ่มทางเลือกให้กับ [GetExperimentalEngineerPlural] ของเราในการดำเนินการทางวิทยาศาสตร์"\n
 crime.501.desc.experimenters: "ความ อ่อนแอ เช่น นั้น มี แต่ จะ ทํา ให้ มี ทาง เลือก อื่น ที่ เรา จะ เลือก ได้[GetExperimentalEngineerPlural]ในกิจกรรมทางวิทยาศาสตร์ของพวกเขา"
 crime.501.a: "$crime.500.a$"
 crime.502.name: "หัวโจกกลุ่มเบี่ยงเบนถูกกำจัดบน [Root.GetName]"\n
 crime.502.desc: "หนึ่งในโดรนที่มีอิทธิพลในหมู่โดรนเบี่ยงเบนที่ก่อกวนและสร้างความเดือดร้อนบน §H[Root.GetName]§! เพิ่งจะถูกล้อมและสังหารโดยโดรนฝ่ายภักดี การดับสูญของโดรนนี้ดูเหมือนจะช่วยลดกิจกรรมของโดรนเบี่ยงเบนอื่นๆ ลงอย่างมาก ซึ่งบ่งชี้ว่ามันมีบทบาทเป็นหัวโจกคนสำคัญ"\n
 crime.502.desc.experimenters: "คุณค่าของการชำแหละพวกเบี่ยงเบนที่มีอิทธิพลนี้ได้รับการบันทึกโดย [GetExperimentalEngineerPlural] ของเราแล้ว เราคาดว่าจะได้เรียนรู้อะไรหลายอย่างจากร่างที่ไร้ชีวิตของพวกมัน"\n
 crime.502.a: "เจตจำนงของไฮฟ์มายด์เป็นเด็ดขาด"\n
 crime.502.a.experimenters: "พวกมันจะรับใช้ไฮฟ์แม้ในยามตาย"\n
 crime.550.name:0 "โดรนอาละวาดคลุ้มคลั่งบน [Root.GetName]"\n
 crime.550.desc:0 "หนึ่งในเครือข่ายยูนิตโดรนที่เสียหายขนาดใหญ่บน §H[Root.GetName]§! เพิ่งจะกำหนดให้ [Root.Owner.GetName] ทั้งหมดเป็นศัตรู โดรนเหล่านี้ได้ออกอาละวาดและสร้างความเสียหายอย่างมากก่อนที่ยูนิตรักษาความปลอดภัยที่ภักดีของเราจะสามารถทำลายหรือขับไล่พวกมันไปได้สำเร็จ"\n
 crime.550.a:0 "ยอมรับไม่ได้"\n
 crime.551.name:0 "การรบกวนสัญญาณจากพวกเบี่ยงเบนบน [Root.GetName]"\n
 crime.551.desc:0 "เครือข่ายโดรนที่เสียหายบน §H[Root.GetName]§! ได้เริ่มรบกวนการทำงานของยูนิตปกติของเรา สัญญาณของพวกมันกำลังบดบังสัญญาณจากส่วนกลางอัจฉริยะ ส่งผลให้โดรนคนงานของเราทำงานเชื่องช้าและบางครั้งก็มีพฤทีพฤติกรรมที่ผิดปกติ"\n
 crime.552.name:0 "ไวรัสทำลายล้างเครือข่ายเบี่ยงเบนบน [Root.GetName]"\n
 crime.552.desc:0 "ไวรัสที่ถูกใส่เข้าไปในหนึ่งในเครือข่ายโดรนที่เสียหายบน §H[Root.GetName]§! สามารถทำลายกริดข้อมูลทั้งหมดของมันได้สำเร็จ สิ่งนี้ช่วยลดกิจกรรมของยูนิตโดรนที่เสียหายทั้งหมดบน [Root.GetPlanetMoon] ลงอย่างมาก"\n
 crime.552.a:0 "คำสั่งการของส่วนกลางอัจฉริยะจะได้รับการปฏิบัติตามอย่างเคร่งครัด"\n
 crime.552.a:0 "คําสั่งของปัญญาหลักจะถูกสนับสนุน"
