 cara.3002.title:0 "ทำลาย $NAME_Caravaneer_Fleet3$ แล้ว"
 cara.3002.desc:0 "สืบเนื่องมาจากการปะทะในระบบดาว [From.From.solar_system.GetName] กองยาน [From.From.GetName] มีความยินดีที่จะรายงานว่า $NAME_Caravaneer_Fleet3$ ถูกทำลายเรียบร้อยแล้ว\\n\\nคาราวานของ $NAME_Caravaneer_Fleet3_species$ ที่เคยคึกคัก บัดนี้ไม่เหลืออะไรนอกจากเศษซากอวกาศ เราจะไม่ต้องถูกรบกวนโดยการปรากฏตัวที่น่าหนวกหูของพวกมันอีกต่อไป"
 cara.3003.title:0 "$NAME_Caravaneer_Fleet3$ ถูกทำลาย"
 cara.3003.desc:0 "ข่าวสารมาถึง [Root.Capital.GetName] ว่า $NAME_Caravaneer_Fleet3$ ไม่มีอยู่อีกต่อไปแล้ว\\n\\nหลังจากการปะทะกับ [From.GetName] คาราวานของ $NAME_Caravaneer_Fleet3_species$ ที่เคยคึกคัก บัดนี้ไม่เหลืออะไรนอกจากเศษซากอวกาศ\\n\\nบางทีมันอาจเป็นจุดจบที่พวกมันไม่รังเกียจก็เป็นได้"

 cara.4000.name:0 "§Hพวกคาราวาน§!: หญ้าที่เขียวขจีกว่า"
 cara.4000.desc:0 "รายงานจาก [pops_join_caravan_planet.GetName] แจ้งให้เราทราบว่ามีผู้อยู่อาศัยจำนวนหนึ่งได้ออกจากอาณานิคมเพื่อเข้าร่วมกับกองยาน [pops_join_caravan_fleet.GetName] ที่กำลังแล่นผ่านดินแดนของเรา โดยคาดว่าถูกดึงดูดด้วยความฝันในการผจญภัยหรือกลิ่นอายอันเย้ายวนใจของลัทธิพาณิชยนิยมล้วน ๆ"
 cara.4000.a.tooltip:0 "ประชากร £pop£ §Hป๊อป§! §R100§! คน เดินทางออกจาก §Y[pops_join_caravan_planet.GetName]§!"

 cara.4010.name:0 "§Hพวกคาราวาน§!: แฟรนไชส์ท้องถิ่น"
 cara.4010.desc:0 "สาส์นด่วนจาก [caravan_pops_join_planet.GetName] อธิบายว่ามีอดีตสมาชิกของ [caravan_pops_join_country.GetName] จำนวนหนึ่งกำลังขอลี้ภัยทางการเมืองบนดาวเคราะห์ดวงนี้ ฝ่ายบริหารท้องถิ่นเห็นควรให้ส่งต่อการตัดสินใจว่าจะจัดการกับพวกเขาอย่างไรให้แก่สายการบังคับบัญชาระดับสูง"
 cara.4010.a:0 "ทั้งหมดอาจช่วยสนับสนุน [Root.GetName]"
 cara.4010.a.tooltip:2 "§G300§! §Y[caravan_pops_join_country.GetSpeciesName]§! £pop£ §Hประชากร§! เข้าร่วมอาณานิคมบน [caravan_pops_join_planet.GetName]"
 cara.4010.b:0 "ให้พวกเขาออกไป"

 cara.4020.name:0 "§H$caravaneers$§!: เก่าและมีข้อบกพร่อง"
 cara.4020.desc:2 "ฐานทัพอวกาศของเราในระบบ [caravan_hulk_system.GetName] รายงานว่ากองยาน [caravan_hulk_country.GetName] ได้อพยพออกไปและทิ้งยานที่ทรุดโทรมลำหนึ่งไว้ ซึ่งตอนนี้อยู่ในวงโคจรที่ไม่เสถียรรอบดาวฤกษ์ศูนย์กลางของระบบ"
 cara.4020.a:0 "ของไร้ค่าของผู้อื่น..."
 cara.4020.b:0 "ปล่อยให้ดวงอาทิตย์กลืนกินมันไป"
 cara.4020.c:0 "ลากมันไปยังฐานทัพอวกาศเพื่อกำจัด"
 cara.4020.c.tooltip:3 "เรียกเก็บเงินจาก [caravan_hulk_country.GetName] สำหรับค่าบริการของเรา"

 cara.4025.name:0 "$cara.4020.name$"
 cara.4025.desc:0 "เนื่องจากมีความเป็นไปได้ว่ายานลำนี้เป็นยานขนส่งพลเรือน ฐานข้อมูลในยานจึงไม่ได้รับการล้างข้อมูลอย่างสมบูรณ์ซึ่งเป็นส่วนหนึ่งของกระบวนการปลดประจำการ ดังนั้นแม้ว่าจะไม่พบสิ่งมีค่าอื่นใดบนยาน แต่นักวิทยาศาสตร์ข้อมูลของเราก็สามารถกู้คืนข้อมูลอ้างอิงบางส่วนเกี่ยวกับเทคโนโลยีต่างดาวที่ไม่รู้จักได้"

 cara.4030.name:0 "§Hชาวคาราวาน§!: ออกไปซะ!"
 cara.4030.desc:0 "การประท้วงครั้งใหญ่ได้ปะทุขึ้นบน [disgruntled_planet.GetName] ในวันนี้ เนื่องจากความโกรธแค้นต่อ [xeno_fleet.GetName] ในระบบ การปรากฏตัวอันซอมซ่อของพวกเขานั้นสร้างความขุ่นเคืองแก่เหล่า [disgruntled_planet.owner.Species.GetNamePlural] ผู้คิดอ่านอย่างถูกต้องทุกคน"
 cara.4030.a:0 "สั่งให้พวกเขาหลีกเลี่ยง [disgruntled_planet.GetName]"
 cara.4040.name:0 "§Hชาวคาราวาน§!: การต้อนรับอันอบอุ่น!"
 cara.4040.desc:0 "เมื่อ [welcome_fleet.GetName] เข้าสู่วงโคจรของ [pleased_planet.GetName] สำหรับสิ่งที่ควรจะเป็นการแวะมาเยือนเพื่อเชื่อมสัมพันธไมตรีสั้น ๆ ในวันนี้ ความปรารถนาดีที่เกิดขึ้นอย่างฉับพลันได้เปลี่ยนการมาเยือนให้เป็นการผสมผสานระหว่างตลาดกลางแจ้งและงานรื่นเริง ความผูกพันมากมายระหว่าง [pleased_planet.owner.Species.GetNamePlural] และ [welcome_fleet.owner.Species.GetNamePlural] ได้ถูกสร้างขึ้น และมีการซื้อขายเกิดขึ้นมากมาย"
 cara.4040.a:0 "กลับมาอีกเร็ว ๆ นี้นะ!"
 cara.4050.name:0 "§Hชาวคาราวาน§!: หัวขโมย!"
 cara.4050.desc:0 "หลังจากการมาเยือนของ [stealing_fleet.GetName] ที่ [stolen_from_planet.GetName] เมื่อไม่นานมานี้ มีคนสังเกตเห็นว่าทรัพยากรจำนวนหนึ่งได้หายไปจากคลังสำรองส่วนกลาง คาดกันว่า [stealing_fleet.GetName] น่าจะเป็นผู้ขโมยมันไป"
 cara.4050.a:0 "ของรักของข้า!"
 cara.4041.name:0 "§Hชาวคาราวาน§!: ควันหลงงานปาร์ตี้"
 cara.4041.desc:0 "ในช่วงหลายเดือนหลังจากงานปาร์ตี้กับ [party_host.GetNamePlural] บน [pleased_planet.GetName] หลักฐานเริ่มปรากฏชัดเจนขึ้นว่าความผูกพันบางส่วนที่เกิดขึ้นนั้นใกล้ชิดกว่าที่คาดคิด พวกเขาได้แสดงความจำนงที่จะขออยู่ต่อ"
 cara.4041.phile:0 "ช่างวิเศษเหลือเกิน!"
 cara.4041.phobe:0 "ช่างน่าขยะแขยงสิ้นดี!"
 cara.4041.a:0 "ชีวิต... ย่อมมีหนทางของมันเอง"

 mega.9000.name:0 "$mega_art_installation_1$"
 mega.9000.desc:0 "ขั้นตอนแรกของการสร้าง $mega_art_installation_3$ ได้ผสมผสานความยากลำบากในการสร้างสถานีขนาดใหญ่เข้ากับความซับซ้อนในการจัดนิทรรศการพิพิธภัณฑ์และหอศิลป์ในระดับที่ไม่เคยมีมาก่อน เมื่อโครงสร้างพื้นฐานเสร็จสิ้น ห้องนิรภัยจะเป็นสิ่งสำคัญอันดับแรก ด้วยแผนที่จะสร้างให้เป็นสิ่งมหัศจรรย์ด้านความปลอดภัยและเสถียรภาพ ห้องนิรภัยแห่งนี้จะเก็บรักษาและปกป้องสมบัติทางศิลปะอันล้ำค่าของกาแล็กซี"
 mega.9001.name:0 "$mega_art_installation_2$"
 mega.9001.desc:0 "ขั้นตอนที่สองของ $mega_art_installation_3$ ของเราเสร็จสมบูรณ์แล้ว และกระบวนการเติมเต็มห้องนิรภัยได้เริ่มขึ้น กองยานขนส่งเฉพาะกิจทำงานอย่างต่อเนื่องเพื่อขนส่งสมบัติของจักรวรรดิเราไปยังบ้านใหม่ ในขณะเดียวกัน มีการสร้างโครงสร้างเพิ่มเติมเพื่อรองรับเจ้าหน้าที่จำนวนมากที่จำเป็นต้องใช้ และเพื่อจัดแสดงสิ่งของจัดแสดงจำนวนมหาศาล"
 mega.9002.name:0 "$mega_art_installation_3$"
 mega.9002.desc:0 "สถานีจัดแสดงนิทรรศการเสร็จสมบูรณ์แล้ว สถานีแต่ละแห่งมีขนาดใหญ่กว่าฐานทัพอวกาศหลายแห่ง สามารถรองรับผู้มาเยือนได้หลายล้านคนต่อวัน ในที่สุดพวกมันก็พร้อมเปิดให้บริการแล้ว เพื่อจัดแสดงผลงานศิลปะของ [From.Owner.GetSpeciesName] และกาแล็กซีให้ทุกคนได้ชื่นชม กองยานขนส่งลำแรกที่บรรทุกผู้เข้าชมกำลังเดินทางมาถึงแล้ว"
 mega.9002.phile.desc:0 "สถานีจัดแสดงนิทรรศการเสร็จสมบูรณ์แล้ว สถานีแต่ละแห่งมีขนาดใหญ่กว่าฐานทัพอวกาศหลายแห่ง สามารถรองรับผู้มาเยือนได้หลายล้านคนต่อวัน ในที่สุดพวกมันก็พร้อมเปิดให้บริการแล้ว เพื่อแสดงตัวอย่างผลงานศิลปะจากทุกเผ่าพันธุ์เพื่อเฉลิมฉลองความหลากหลายของกาแล็กซี กองยานขนส่งลำแรกที่บรรทุกผู้เข้าชมกำลังเดินทางมาถึงแล้ว"
 mega.9002.phobe.desc:0 "สถานีจัดแสดงนิทรรศการเสร็จสมบูรณ์แล้ว สถานีแต่ละแห่งมีขนาดใหญ่กว่าฐานทัพอวกาศหลายแห่ง สามารถรองรับผู้มาเยือนได้หลายล้านคนต่อวัน ในที่สุดพวกมันก็พร้อมเปิดให้บริการแล้ว เพื่อจัดแสดงความรุ่งโรจน์ที่แท้จริงของศิลปะแบบ [From.Owner.GetAdj]! งานศิลปะของต่างเผ่าพันธุ์จำนวนเล็กน้อยจะถูกจัดแสดงไว้เพื่อการเปรียบเทียบและล้อเลียนเช่นกัน กองยานขนส่งลำแรกที่บรรทุกผู้เข้าชมกำลังเดินทางมาถึงแล้ว"
 mega.9003.name:0 "ศูนย์ประสานงานยุทธศาสตร์เสียงดัง"
 mega.9003.desc:0 "ตัวถังหุ้มเกราะของศูนย์ประสานงานยุทธศาสตร์เสร็จสมบูรณ์แล้ว ขณะนี้เป็นที่ตั้งของสุดยอดกองบัญชาการทหารของเรา มันแทบจะไม่มีทางถูกเจาะทะลวงได้เลย ด้วยความปลอดภัยและความมีสมาธิ พวกเขาสามารถอุทิศทุกช่วงเวลาที่ตื่นเพื่อวางแผนวิธีปกป้องจักรวรรดิของเราให้ดีที่สุด"
 mega.9003.mil.desc:0 "ตัวถังหุ้มเกราะของศูนย์ประสานงานยุทธศาสตร์เสร็จสมบูรณ์แล้ว ขณะนี้เป็นที่ตั้งของสุดยอดกองบัญชาการทหารของเรา มันแทบจะไม่มีทางถูกเจาะทะลวงได้เลย ด้วยความปลอดภัยและความมีสมาธิ พวกเขาสามารถอุทิศทุกช่วงเวลาที่ตื่นเพื่อวางแผนวิธีพิชิตกาแล็กซีให้ดีที่สุด"
 mega.9003.slave.desc:0 "ตัวถังหุ้มเกราะของศูนย์ประสานงานยุทธศาสตร์เสร็จสมบูรณ์แล้ว ขณะนี้เป็นที่ตั้งของสุดยอดกองบัญชาการทหารของเรา มันแทบจะไม่มีทางถูกเจาะทะลวงได้เลย ด้วยความปลอดภัยและความมีสมาธิ พวกเขาสามารถอุทิศทุกช่วงเวลาที่ตื่นเพื่อวางแผนวิธีจับทาสให้ได้จำนวนมากที่สุด"
 mega.9004.name:0 "ศูนย์ประสานงานยุทธศาสตร์ธน."
 mega.9004.desc:0 "แผงสายสัญญาณสื่อสารที่ทรงพลังได้รับการเพิ่มเข้าไปในศูนย์ประสานงานยุทธศาสตร์ ช่วยให้นักยุทธศาสตร์ของเราสามารถออกคำสั่งไปยังยานของเราทั่วทั้งกาแล็กซีได้ แผงสัญญาณที่ล้ำสมัยเหล่านี้ทรงพลังพอที่จะทะลวงผ่านการรบกวนใด ๆ ก็ตาม และสัญญาณพัวพันเชิงควอนตัมนั้นไม่มีทางถูกแฮกได้โดยสิ้นเชิง"
 mega.9005.name:0 "ศูนย์ประสานงานยุทธศาสตร์– ปฏิบัติการ"
 mega.9005.desc:0 "สิ่งเพิ่มเติมขั้นสุดท้ายของศูนย์ประสานงานยุทธศาสตร์คือป้อมจำลอง "กองกำลังศัตรู" ที่แยกตัวออกมาหลายป้อม ป้อมปราการเหล่านี้มีฟังก์ชันส่วนใหญ่ของศูนย์ประสานงานยุทธศาสตร์ในขนาดที่เล็กกว่า แต่เป็นอิสระจากระบบหลักโดยสิ้นเชิง ภายในป้อมปราการเหล่านี้ เหล่าผู้บัญชาการระดับสูงและเจ้าหน้าที่ของพวกเขาสามารถดื่มด่ำไปกับวัฒนธรรมและประเพณีของศัตรูได้อย่างเต็มที่ และจากการศึกษาผลงานศิลปะของศัตรู จะทำให้พวกเขาเข้าใจและจำลองแนวคิดทางทหารของศัตรูได้ดียิ่งขึ้น เมื่อเข้าถึงอย่างเต็มที่แล้ว พวกเขาจะทำสงครามเสมือนจริงกับเจ้าหน้าที่ของศูนย์ประสานงานยุทธศาสตร์ ช่วยให้เราสามารถจำลองความขัดแย้งกับศัตรูที่เป็นไปได้ในรายละเอียดอันน่าทึ่ง ซึ่งสามารถนำมาศึกษาจากมุมมองของทั้งสองฝ่ายเพื่อนำมาปรับปรุงกลยุทธ์ของเราให้ดียิ่งขึ้น"
 mega.9006.name:0 "สมัชชาระหว่างดวงดาว: สถานที่"
 mega.9006.desc:0 "คุณลักษณะที่สำคัญที่สุดของขั้นแรกเริ่มของสมัชชาระหว่างดวงดาวคือ §Sโลคัส§! ภาพฉายโฮโลแกรมอันซับซ้อนของหลุมดำ ซึ่งมีจุดมุ่งหมายเพื่อจำลองหลุมลึกแห่งแรงโน้มถ่วงที่ซ่อนตัวอยู่ในแกนกลางของกาแล็กซี: จุดหมุนที่กาแล็กซีโคจรอยู่\n\nเมื่อสร้างเสร็จสมบูรณ์ สถานที่แห่งนี้จะเป็นเหมือนแกนหมุนที่ทูตผู้นิ่งเงียบและอำนาจอ่อน(อํานาจสูงสุด)ซึ่งมักจะขับเคลื่อนกาแล็กซีโคจรรอบ"
 mega.9007.name:0 "สมัชชาระหว่างดวงดาว: แหวนกงสุล"
 mega.9007.desc:0 "ขั้นตอนที่สองของสมัชชาระหว่างดวงดาว ซึ่งก็คือ แหวนกงสุล เสร็จสมบูรณ์แล้ว วงในนี้จะเป็นที่ตั้งของเจ้าหน้าที่ฝ่ายการทูตส่วนใหญ่ของเราต่อไปในอนาคต"
 mega.9008.name:0 "สมัชชาระหว่างดวงดาว: โมดูลส่วนการประชุม"
 mega.9008.desc:1 "วงแหวนรอบนอกของสมัชชาระหว่างดวงดาวเต็มไปด้วยห้องประชุมขนาดใหญ่ที่ล้ำสมัย ซึ่งติดตั้งตัวกรองความเป็นส่วนตัว (ซึ่งแน่นอนว่ามีเพียงการสอดแนมของ [Root.GetAdj] เท่านั้นที่สามารถเจาะผ่านได้) สถานีนี้กำลังกลายเป็นศูนย์กลางการเจรจานอกสถานที่ของกาแล็กซีโดยพฤตินัยอย่างรวดเร็ว"
 mega.9009.name:0 "สมัชชาระหว่างดวงดาว"
 mega.9009.desc:0 "สมัชชาระหว่างดวงดาวเปิดดำเนินการอย่างเต็มรูปแบบแล้วในขณะนี้ และเป็นเจ้าภาพรองรับสถานทูตจำนวนมากจากประเทศมหาอำนาจของกาแล็กซี ไม่ว่าจะเป็นมหาอำนาจทางการเมืองหรือทางธุรกิจ\n\nนักการทูตของเรากำลังประสบความยากลำบากในการติดตามข้อมูลผลประโยชน์ของชาติและความเสื่อมเสียทางการเมืองที่ไหลเข้ามาอย่างต่อเนื่องซึ่งเราสกัดได้จากสถานี อย่างน้อยแขกของเราก็ดูเหมือนจะไม่ค่อยสนใจเรื่องการสอดแนมของเรา ตราบใดที่เราจัดเตรียมสภาพแวดล้อมที่เหมาะสมสำหรับพวกเขาในการข่มขู่คู่แข่งของพวกเขา"
 mega.9010.name:0 "เครื่องดึงมวลสารจากหลุมดำ: Anchor (ขั้นที่1)"
 mega.9010.desc:0 "ในการสกัดสสารจาก [From.GetName] ก่อนอื่นเราต้องมีฐานที่ปลอดภัยสำหรับสร้างสิ่งอำนวยความสะดวก สมอ(ผู้ช่วย)ได้ถูกสร้างขึ้นที่ขอบของขอบฟ้าเหตุการณ์พอดี และถูกยึดให้อยู่กับที่เพื่อต้านแรงดึงดูดอันมหาศาลโดยเครื่องยนต์เปลี่ยนทิศทางแรงโน้มถ่วงขั้นสูง ซึ่งจะหันแรงโน้มถ่วงของ [From.GetName] กลับมาต่อต้านตัวมันเอง"
 mega.9011.name:0 "เครื่องดึงมวลสารจากหลุมดำ: Lensing (ขั้นที่2)"
 mega.9011.desc:0 "เมื่อสร้างขึ้นบนระบบการเปลี่ยนทิศทางแรงโน้มถ่วงที่มีอยู่ สิ่งอำนวยความสะดวกการทำเลนส์แรงโน้มถ่วงจะสามารถเปลี่ยนทิศทางของแรงบางส่วนให้เป็น "เลนส์" ซึ่งจะรวมแรงให้เข้มข้นยิ่งขึ้นในพื้นที่ที่เลือก"
 mega.9012.name:0 "เครื่องดึงมวลสารจากหลุมดำ: Boring (ขั้นที่3)"
 mega.9012.desc:0 "กุญแจสำคัญในการสกัดสสารจากหลุมดำคือการปรับแต่งขั้นสูงสุดของระบบการเปลี่ยนทิศทางแรงโน้มถ่วง: การสร้างพื้นที่โฟกัสของแรงโน้มถ่วงที่บิดเบี้ยว ซึ่งจะสร้างสว่านขนาดใหญ่ที่มีรูกลวงที่สร้างจากแรงโน้มถ่วงที่ถูกเปลี่ยนทิศทางและรวบรวมไว้"
 mega.9013.name:1 "เครื่องดึงมวลสารจากหลุมดำการ คลาย ตัว"
 mega.9013.desc:0 "ขั้นตอนสุดท้ายของเครื่องดึงมวลสารจากหลุมดำนั้นเป็นขั้นที่ธรรมดาสามัญที่สุด แต่ก็มีความน่าทึ่งในแบบของมันเอง เตาหลอมและเครื่องแปรรูปอัตโนมัติจำนวนมหาศาลจะย่อยสลาย ลดการบีบอัด และแยกสสารของ [From.GetName] ออกเป็นแร่ธาตุที่มีประโยชน์ ซึ่งจะถูกลำเลียงลงในกองเรือบาร์จหุ่นยนต์ที่ไม่มีวันสิ้นสุดเพื่อนำไปส่งทั่วทั้งจักรวรรดิของเรา"
 cara.4110.name:0 "นักสะสม"
 cara.4110.desc:0 "ยินดีที่ได้พบ ข้าคือนักสะสมและข้ามีโอกาสมาเสนอให้ท่าน ข้ามีกล่องใบหนึ่งสำหรับขาย กล่องที่ได้มาด้วยวิธีที่ข้าจะไม่ขอเปิดเผยและมีสิ่งของข้างในที่ข้าจะไม่บอกใบ้ ท่านสามารถซื้อกล่องนี้ได้ในราคา £energy£ 3000 และเก็บสิ่งใดก็ตามที่อยู่ในนั้นไว้ แต่ข้าไม่มีการคืนเงินให้"
 cara.4110.a:0 "ท่านคาดหวังให้เราจ่ายเงินซื้อกล่องใบนี้โดยที่ไม่รู้เลยว่ามีอะไรอยู่ข้างในงั้นรึ?"
 cara.4110.a.response:0 "ถูกต้องแล้ว"
 cara.4110.b:0 "ตกลง"
 cara.4110.b.response:0 "ยอดเยี่ยม!"
 cara.4110.c:0 "ไม่!"
 cara.4110.c.response:0 "ท่านจะต้องเสียใจกับสิ่งนี้!"
 cara.4110.d:0 "ท่านคือใคร?"
 cara.4110.d.response:0 "ข้าคือนักสะสม ข้าทำงานผ่านกองยานชาวคาราวานมาเป็นเวลานานเพื่อครอบครองวัตถุโบราณของกาแล็กซี นั่นคือทั้งหมดที่ท่านจำเป็นต้องรู้"
 cara.4120.name:0 "ทาสของสล็อต"
 cara.4120.desc:0 "การไปเยือนการประกอบของโชร์บ่อยครั้งส่งผลให้ผู้คนจำนวนมากบน [cara_border_planet.GetName] กลายเป็นคนติดการพนัน หลายคนหันไปก่ออาชญากรรมเพื่อหาเงินมาจ่ายสำหรับการเดินทางซ้ำแล้วซ้ำเล่า"
 cara.4120.a:0 "ข่าวที่น่ากังวล"
 cara.4130.name:0 "เทศกาล"
 cara.4130.desc:0 "การมาเยือนของ [caravaneer_neighbor_species.GetName] จำนวนมากจาก [caravaneer_neighbor.GetName] ส่งผลให้เกิดงานเลี้ยงขนาดใหญ่บน [cara_border_planet.GetName] โชคร้ายที่สิ่งต่าง ๆ บานปลายจนควบคุมไม่ได้ และ "งานเลี้ยง" ในตอนนี้กลับดูเหมือนการจลาจลทั่วทั้งดาวเคราะห์"
 cara.4130.a:0 "ยอมรับไม่ได้!"
 cara.4140.name:0 "เครื่องสล็อตแบบใหม่!"
 cara.4140.desc:0 "[caravaneer_neighbor.GetName] ได้เปิดเผยตู้สล็อตซีรีส์ใหม่เมื่อไม่นานมานี้ และการสัญจรที่เพิ่มขึ้นได้ทำให้เกิดความเฟื่องฟูทางเศรษฐกิจบน [cara_border_planet.GetName] เมื่อมีผู้มาเยือนเดินทางผ่านไปมา"
 cara.4150.name:0 "แว่นขยาย"
 cara.4150.desc:0 "การประกอบของโชร์เป็นสถานที่ที่อลหม่านและไม่เหมาะกับคนขวัญอ่อน เนื่องจากการไปเยือนบ่อยครั้ง พลเมืองของ [cara_border_planet.GetName] จึงคุ้นเคยกับสภาพความเป็นอยู่ที่นั่นในระดับที่ไม่เคยมีมาก่อน"
 cara.4160.name:1 "คอนเสิร์ตเมกาคอปส์:ล้มตายนับล้าน!"
 cara.4160.desc:0 "[cara_border_planet.GetName] ตกอยู่ในความโกลาหลหลังจากคอนเสิร์ตของวงไซ-เมทัลระดับปรากฏการณ์อย่างเมกะคอปส์บานปลายจนควบคุมไม่ได้ รายงานถูกส่งอย่างกระจัดกระจายเนื่องจากความเสียหายเป็นวงกว้าง แต่สิ่งหนึ่งที่ทุกคนเห็นตรงกันคือ ในช่วงพีคสุดของการแสดง สมาชิกแนวหน้าอย่างภาษาเคลอาซาอันได้ชกจนดวงจันทร์ทะลุเป็นรู ทำลายล้างมันไปโดยสิ้นเชิง"
 cara.4160.nomoon.desc:0 "[cara_border_planet.GetName] ตกอยู่ในความโกลาหลหลังจากคอนเสิร์ตของวงไซ-เมทัลระดับปรากฏการณ์อย่างเมกะคอปส์บานปลายจนควบคุมไม่ได้ รายงานกระจัดกระจายเนื่องจากความเสียหายเป็นวงกว้าง แต่สิ่งหนึ่งที่ทุกคนเห็นตรงกันคือ ในช่วงพีคของการแสดง สมาชิกแนวหน้าอย่างภาษาเคลอาซาอันได้ฟาดไฮเปอร์กีตาร์ลงบนเวทีด้วยแรงมหาศาลจนทำให้พื้นที่ทั้งหมดถูกทำลายล้าง"
 cara.4160.a:1 "ดิบเถื่อนมาก"
 cara.4161.name:0 "เมกาคอปส์:จุดเริ่มต้น"
 cara.4161.desc:1 "เมกาคอปส์คือวงไซออนิก-เมทัลที่ยิ่งใหญ่ที่สุดในพื้นที่ของบรรษัท เล่ากันว่าเพื่อนร่วมวงที่แตกต่างกันอย่างสุดขั้ว-เคล-อาซาอัน แกนเทร็นมนุษย์ยอนดาร์และซิลดารีได้ติดต่อกันผ่านม่านพลังจิต\n\nนี่คือเรื่องจริง\n\nเป็นที่รู้กันเฉพาะคนกลุ่มน้อยเท่านั้นว่า ม่านพลังจิต คือโค้ดเนมของแผนกวิจัยพัฒนาทางเสียงและดนตรีระดับลับสุดยอดของเสียงแกแล็กติกซึ่งเป็นกลุ่มบริษัทดนตรีชั้นนำและผู้ผลิตอาวุธคลื่นเสียงในพหุจักรวาล แผนการสร้างเมกาคอปส์แรกเริ่มถูกพัฒนาขึ้นในฐานะกองกำลังจู่โจมทางพลังจิต พวกเขาจะไป \"เปิดการแสดง\" ใน \"เวที\" ที่รับมือได้ยาก เพื่อบ่อนทำลายขบวนการก่อการกบฏอย่างมีประสิทธิภาพด้วยเนื้อเพลงที่ต่อต้านบรรษัทอย่างเปิดเผย ซึ่งซ่อนมาตรการลดระดับความก้าวร้าวทางพลังจิตที่กระทำต่อผู้ฟังเอาไว้อย่างแนบเนียน\n\nทว่าท้ายที่สุดแล้ว ผลเร่งปฏิกิริยาจากเสียงเพลงที่มีต่อพลังจิตอันแรงกล้าอยู่แล้วของพวกเขา ก็มากเกินกว่าที่ผู้จัดการและผู้บริหารจะควบคุมได้ วงดนตรีนี้จึงกลายเป็นวงดนตรีนอกคอกโดยพฤตินัย เนื่องจากเสียงแกแล็กติกไม่ต้องการยกเลิกสัญญาที่สร้างผลกำไรได้อย่างงดงาม และในปัจจุบันเมกาคอปส์จะเปิดการแสดงอะไรก็ตามและที่ใดก็ตามที่พวกเขาเห็นชอบ ตราบใดที่มันเป็นแนว §Rเมทัล§!"
 cara.4111.desc:0 "ขอให้เพลิดเพลิน!"
 mega.9100.name:0 "เครื่องดึงมวลสารจากหลุมดำเสียหาย"
 mega.9100.a.desc:0 "มีอุปกรณ์ขุดเจาะบางอย่างตั้งตระหง่านอยู่บนขอบฟ้าเหตุการณ์ของระบบ [matter_decompressor_system.GetName] อย่างไม่น่าเป็นไปได้ นักวิทยาศาสตร์ของเราตั้งทฤษฎีว่านี่อาจเป็น "§Hเครื่องดึงมวลสารจากหลุมดำ§!" ซึ่งเป็นโครงสร้างขนาดยักษ์ที่ออกแบบมาเพื่อสกัดสสารจากหลุมดำ แม้ว่ามันจะไม่สามารถใช้งานได้เต็มรูปแบบแล้ว แต่กลไกบางอย่างที่ป้องกันการเกิดสปาเกตติฟิเคชันของมันยังคงทำงานอยู่"
 mega.9100.b.desc:1 "ที่ตั้งอยู่บนขอบฟ้าเหตุการณ์ของระบบ [matter_decompressor_system.GetName] คือ "§Hเครื่องดึงมวลสารจากหลุมดำ§!" ซึ่งเป็นโครงสร้างขนาดยักษ์ที่ออกแบบมาเพื่อสกัดสสารจากหลุมดำ แม้ว่ามันจะไม่สามารถใช้งานได้เต็มรูปแบบแล้ว แต่เครื่องยนต์บิดเบี้ยวของแรงโน้มถ่วงยังคงต้องใช้งานอยู่ เนื่องจากมันไม่ได้รับผลกระทบจากการเกิดสปาเกตติฟิเคชัน"
 mega.9100.a:0 "ดูเหมือนว่าจะคล้ายกับของเรา"
 mega.9101.name:0 "กู้คืนเครื่องขยายมวลสารแล้ว"
 mega.9110.name:0 "ศูนย์ประสานงานยุทธศาสตร์ที่เสียหาย"
 mega.9110.a.desc:0 "มีการค้นพบสถานีอวกาศขนาดใหญ่ที่พังทลายในระบบ [strategic_coordination_center_system.GetName] ซากปรักหักพังที่แตกเป็นเสี่ยง ๆ ของมันประกอบไปด้วยคอมพิวเตอร์การรบ เครื่องจำลองการรบ และสายสัญญาณออกอากาศจำนวนมาก ซึ่งทำให้นักวิทยาศาสตร์ของเราคาดเดาว่ามันน่าจะเป็น "§Hศูนย์ประสานงานยุทธศาสตร์§!" บางประเภท"
 mega.9110.b.desc:0 "พบสถานีอวกาศขนาดใหญ่ที่พังทลายในระบบ [strategic_coordination_center_system.GetName] ดูเหมือนว่ามันจะเป็นซากที่หลงเหลืออยู่ของ "§Hศูนย์ประสานงานยุทธศาสตร์§!""
 mega.9110.a:0 "ของเราจะไม่มีวันพังทลาย!"
 mega.9111.name:0 "บูรณะศูนย์ประสานงานยุทธศาสตร์แล้ว"
 mega.9111.desc:0 "ศูนย์ประสานงานยุทธศาสตร์ที่ถูกละทิ้งในระบบ [From.GetName] ได้รับการซ่อมแซมอย่างสมบูรณ์และมีเจ้าหน้าที่ซึ่งเป็นมันสมองทางทหารที่ชาญฉลาดที่สุดของ [Root.GetName] ประจำการอยู่ ตามวัตถุประสงค์ดั้งเดิมของมัน โครงสร้างขนาดยักษ์นี้จะถูกนำมาใช้ในการประสานงานแสนยานุภาพทางทหารของเราทั่วทั้งกาแล็กซี"
 mega.9120.name:0 "หอศิลป์ขนาดยักษ์ที่พังทลาย"
 mega.9120.a.desc:0 "มีการค้นพบสถานีอวกาศที่พังยับเยินสามสถานีในระบบ [mega_art_installation_system.GetName] พวกมันถูกล้อมรอบด้วยกลุ่มเศษซาก ซึ่งบางส่วนยังคงพอจะจำแนกได้ว่าเป็นผลงานศิลปะ แม้ว่าจะมีลักษณะที่แปลกประหลาดอย่างมากก็ตาม ดูเหมือนว่าครั้งหนึ่งที่นี่เคยเป็น "§Hหอศิลป์ขนาดยักษ์§!""
 mega.9120.b.desc:0 "พบ "§Hหอศิลป์ขนาดยักษ์§!" ที่พังทลายในระบบ [mega_art_installation_system.GetName] กาลเวลาและการสัมผัสกับสุญญากาศไม่ได้ปรานีต่อสิ่งของจัดแสดงเลย"
 mega.9120.a:0 "ก็แค่งานลอกเลียน"
 mega.9121.name:0 "บูรณะหอศิลป์ขนาดยักษ์ที่พังทลายแล้ว"
 mega.9121.desc:0 "หอศิลป์ขนาดยักษ์ที่เคยพังทลายในระบบ [From.GetName] ได้รับการบูรณะกลับมาเปิดใช้งานอีกครั้ง มันถูกซ่อมแซมอย่างสมบูรณ์และจัดเก็บผลงานศิลปะที่ดีที่สุดบางส่วนของ [Root.GetName] และยังมีผลงานจัดแสดงจำนวนเล็กน้อยที่ถูกกู้คืนและบูรณะจากโครงสร้างยักษ์ดั้งเดิมอีกด้วย"
 mega.9130.name:0 "สมัชชาระหว่างดวงดาวที่พังทลาย"
 mega.9130.a.desc:0 "พบซากสถานีอวกาศขนาดใหญ่ในระบบ [interstellar_assembly_system.GetName] เมื่อประเมินจากปริมาณพื้นที่ที่ดูเหมือนจะเป็นสำนักงานและลานประชุมขนาดใหญ่ที่ติดตั้งระบบพยุงชีพที่แตกต่างกันหลายสิบประเภท นักวิทยาศาสตร์ของเราคาดว่านี่คือทั้งหมดที่หลงเหลืออยู่ของ "§Hสมัชชาระหว่างดวงดาว§!""
 mega.9130.b.desc:0 "พบซากของ "§Hสมัชชาระหว่างดวงดาว§!" ในระบบ [interstellar_assembly_system.GetName] ตอนนี้มีการระบุซากมัมมี่ของเผ่าพันธุ์ต่าง ๆ อย่างน้อยสิบสองเผ่าพันธุ์แล้ว"
 mega.9130.a:0 "ร่วมกันจนถึงจุดจบ"
 mega.9131.name:0 "บูรณะสมัชชาระหว่างดวงดาวแล้ว"
 mega.9131.desc:0 "สมัชชาระหว่างดวงดาวในระบบ [From.GetName] กลับมาออนไลน์อีกครั้ง มันพร้อมสำหรับเหล่านักการทูตของกาแล็กซีที่จะมาชุมนุมกันในที่เดียวเพื่อถกเถียงประเด็นสำคัญในรอบวงโคจรสุริยะนี้อีกครั้ง"
 colony.3040.name:0 "หยั่งลึกสู่ห้วงสุญตา"
 colony.3040.desc:0 "หลังจากศึกษามาหลายปี นักวิจัยบางคนบน [Root.GetName] เริ่มรู้สึกว่าพวกเขาเข้าใจในห้วงสุญตาโมฆะ(สาย)ห้วงอวกาศ)มันมี... กระแสน้ำ มีแรงดึงดูด มีการไหลเวียนบางอย่างที่ผลักดันประตูดมิติไปยัง [From.GetName] อย่างแผ่วเบา โดยนำร่องรอยของสสารมืดที่เราสามารถรวบรวมได้มาด้วย ในทางทฤษฎี มันควรจะเป็นไปได้ที่จะทำให้ประตูมิติของเรา \"มองเห็นได้\" สำหรับพลังนี้มากขึ้น ซึ่งน่าจะส่งผลให้เก็บเกี่ยวผลผลิตได้มากขึ้น"
 colony.3041.name:0 "เพรียกหาห้วงสุญตา"
 colony.3041.desc:0 "เครื่องขยายสัญญาณขนาดใหญ่ได้ส่งพลังงานจำนวนมากผ่านประตูมิติตบน [Root.GetName] ผลลัพธ์เกิดขึ้นทันที แรงกดดันที่อีกด้านหนึ่งของประตูมิติแรงขึ้นอย่างเห็นได้ชัด และสสารมืดก็ไหลผ่านเข้ามามากขึ้นด้วย"
 portal_void_tooltip2:0 "$job_dimensional_portal_researcher_plural$ จะผลิตสสารมืด £sr_dark_matter£ เพิ่มเติม"
 colony.3009.a.robot:0 "**เข้าถึงสัญญาณ**"
 colony.3020.desc.robot:0 "นี่คือ [Root.Owner.Leader.GetName] แห่ง [Root.Owner.GetName] จงระบุตัวตน!"
 colony.3020.a.robot:0 "ข้อผิดพลาดเช็คซัม: ไอดีไม่ถูกต้อง! นี่คือ [Root.Owner.Leader.GetName]! จงระบุตัวตน!"
 colony.3021.desc.robot:0 "**§Yกำลังประมวลผล!§!** ผลลัพธ์: ประตูมิตินี้เชื่อมโยงช่องว่างระหว่างมิติทางเลือก เราทั้งคู่คือ [Root.Owner.Leader.GetName] จากมิติที่แยกออกจากกัน"
 colony.3021.a.robot:0 "ตัวแปรที่ไม่ได้คำนวณ รายงานสถานะของ [Root.Owner.Species.GetNamePlural] ในมิติอื่น!"
 colony.3021.b.robot:0 "เริ่มต้นการค้า"
 mirror_trade_reply.robot:0 "ยืนยัน"
 colony.3022.desc.robot:0 "[Root.Owner.Species.GetName] ได้แพร่กระจายไปทั่วอวกาศจาก [Root.Owner.Capital.GetName] นับตั้งแต่การค้นพบเครื่องขับเคลื่อนวาร์ป(วอปไดรฟ์) -"
 colony.3022.a.robot:0 "ข้อผิดพลาด! ค่าที่ไม่คาดคิด: เครื่องขับเคลื่อนวาร์ป(วอปไดรฟ์)ค่าที่คาดหวัง: ไฮเปอร์เลน(ไฮเพอร์แลนส์)"
 colony.3023.desc.robot:0 "**§Yกำลังประมวลผล!§!** ผลลัพธ์: การค้นพบวิธีเดินทางที่เร็วกว่าแสง(FTL)ในรูปแบบอื่นคือจุดแยกตัวระหว่างสองจักรวาลของเรา คำถาม: การโจมตีของสัตว์ร้ายแห่งวาร์ป?"
 colony.3023.a.robot:0 "ไม่พบค่า: สัตว์ร้ายแห่งวาร์ป(สัตว์สงคราม)คำถาม: ระดับภัยคุกคามของสัตว์ร้ายแห่งวาร์ป?"
 colony.3024.desc.robot:0 "สัตว์ร้ายแห่งวาร์ปจู่โจมทุกอารยธรรมที่รู้จัก พวกมันคือภัยคุกคามต่อทุกการดำรงอยู่ สมมติฐาน: เมื่อการเดินทางด้วยระบบวาร์ปถึงระดับวิกฤตที่แน่นอนในกาแล็กซี สัตว์ร้ายแห่งวาร์ปจะตื่นขึ้นและโจมตี เผ่าพันธุ์หลายเผ่าพันธุ์ที่เรารู้จักได้ล่มสลายไปแล้ว แต่จนถึงตอนนี้เรายังคงต้านทานพวกมันไว้ได้"
 colony.3024.a.robot:0 "คำถาม: คุณต้องการการสนับสนุนด้านวัตถุปัจจัยหรือไม่?"
 mirror_trade_reply2.robot:0 "จัดตั้งการค้าระหว่างมิติเพื่อเสริมสร้างความแข็งแคล่งให้กับ [Root.Owner.Species.GetNamePlural] ในทั้งสองมิติ"
 colony.3032.a.robot:0 "[Root.Owner.Species.GetName] จะยืนหยัดอย่างผู้ชนะ!"
 colony.3033.desc.robot:0 "อัปเดตสถานะ: [Root.Owner.Capital.GetName] ออฟไลน์ ขีดความสามารถในการรบของ [Root.Owner.GetName]: 23% ของระดับที่เหมาะสม เครือข่ายอาณานิคมที่เหลืออยู่: [Root.GetName] ผลลัพธ์ที่คาดไว้: ชัยชนะอย่างสมบูรณ์ของสัตว์ร้ายแห่งวาร์ปใน 2 รอบวงโคจรสุริยะ ข้อผิดพลาด! ตรวจพบกิจกรรมของสัตว์ร้ายแห่งวาร์ปในวงโคจร [Root.GetName]! ข้อผิดพลาด!\n\n**§Yสัญญาณสิ้นสุดลงอย่างกะทันหัน§!**"
 colony.3033.a.robot:0 "รายงาน"
 colony.3033.d.robot:0 "จักรวาลกระจกเงา [Root.Owner.Species.GetName] ออฟไลน์"

 dportal_trade_increases_tooltip:0 "£amenities£ และ £trade_value£ ผลผลิตของ §Y$job_dimensional_portal_researcher_plural$§! เพิ่มขึ้น"
 dportal_trade_increases_gestalt_tooltip:0 "£amenities£ และ £energy£ ผลผลิตของ §Y$job_dimensional_portal_researcher_gestalt_plural$§! เพิ่มขึ้น"
