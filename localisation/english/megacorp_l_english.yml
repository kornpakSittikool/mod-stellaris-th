 ## BUILDINGS ##
  building_maintenance_depot:0 "ศูนย์กลางการส่งกำลังบำรุง"
  building_maintenance_depot_desc:1 "หัวใจสำคัญของกลไกการส่งกำลังบำรุงของส่วนรวม โดรนของคลังเก็บของขนาดใหญ่นี้ทำงานเพื่อรับประกันว่าทรัพยากรจะถูกจัดส่งไปยังทุกที่ที่ต้องการอย่างรวดเร็ว"
 building_hive_node:0 "โหนดโครงข่ายประสาท"
 building_hive_node_desc:2 "อนุภาค เหล่า นี้ มี ขนาด ใหญ่ และ มี ขนาด ใหญ่ มาก จน ทํา ให้ อนุภาค เหล่า นี้ มี แนว โน้ม และ ได้ รับ การ ช่วย เหลือ จาก การ รับ ของ หุ่นยนต์ พิเศษ และ ถ่ายทอด ความ ประสงค์ ของ ไฮฟ์."
 building_hive_cluster:0 "คลัสเตอร์โครงข่ายประสาท"
 building_hive_cluster_desc:1 "โหนดของรังไข่ที่ดูดซับได้ เชื่อมต่อและรวมเข้าด้วยกัน ทําให้เกิดการส่งสัญญาณสูงสุด"
 building_hive_confluence:0 "แหล่งบรรจบกันของความคิดตรรกะ"
 building_hive_confluence_desc:1 "ระบบประสาทขนาดใหญ่ ของประสาทเมกะสคอป เป็นพันล้านของเมแกนเจอร์รอน ไฟไหม้ตามแนวกว้างของ เส้นใยโปรโตพลาสมิคที่แผ่ขยายออกไป"
 building_hydroponics_farm:0 "ฟาร์มปลูกพืชไร้ดิน"
 building_hydroponics_farm_desc:0 "ฟาร์มไฮโดรโปนิกส์ผลิตพืชผักที่อุดมด้วยสารอาหารซึ่งเหมาะสำหรับการบริโภคโดยประชากรในท้องถิ่น(ดาว)"
 building_holo_theatres:0 "โรงละคร(โฮโล)"
  building_holo_theatres_desc:0 "ความบันเทิงโฮโลกราฟิกยุคใหม่ล่าสุด ทั้งโลกที่สร้างขึ้นมาจากโฟตอนและสนามพลังงาน"
 building_crystal_mines:0 "เหมืองผลึกคริสตัล"
  building_crystal_mines_desc:1 "ต้องใช้ความระมัดระวังอย่างยิ่งในระหว่างการขุดเหมืองเหล่านี้ เพื่อหลีกเลี่ยงไม่ให้ผลึกคริสตัลเกิดความเสียหาย"
 building_foundry_1:2 "โรงหล่อโลหะผสม"
  building_foundry_1_desc:3 "[Owner.GetAlloyProducerPlural] ที่ทำงานในโรงหล่อเหล่านี้ผลิตโลหะผสมคุณภาพสูง"
 building_foundry_2:2 "โรงหลอมโลหะผสมขนาดใหญ่"
  building_foundry_2_desc:2 "เตาหลอมขนาดใหญ่เหล่านี้สามารถช่วยเหลือกระบวนการผลิตโลหะผสมขั้นสุดท้ายในอุตสาหกรรมต่างๆ ของเราทั่วทั้งดาวเคราะห์ได้"
 building_foundry_3:2 "โรงงานโลหะผสมนาโน"
 building_foundry_3_desc:3 "เครื่องจักรผลิตเชิงอุตสาหกรรมขนาดใหญ่ที่มุ่งเน้นการเพิ่มผลผลิตของโลหะผสมบนดาวเคราะห์"
 building_factory_1:2 "อุตสาหกรรมพลเรือน"
 building_factory_1_desc:2 "การรวมตัวกันอย่างกว้างขวางของอุตสาหกรรมพลเรือนและโรงงานผลิต ซึ่งเป็นแหล่งผลิตสินค้าอุปโภคบริโภคที่หลากหลาย"
 building_factory_2:2 "โรงงานผู้ผลิตพลเรือน"
 building_factory_2_desc:2 "เครื่องจักรผลิตเชิงอุตสาหกรรมขนาดใหญ่ที่มุ่งเน้นการเพิ่มผลผลิตของสินค้าอุปโภคบริโภคบนดาวเคราะห์"
 building_factory_3:2 "โรงงานพลเรือนแบบทำซ้ำที่ซับซ้อน"
 building_factory_3_desc:2 "แทบทุกสิ่งทุกอย่างสามารถเลียนแบบทำซ้ำได้ที่ตู้คีออสก์ในศูนย์รวมแห่งเหล่านี้"
 building_noble_estates:0 "ที่ดินชนชั้นสูง"
 building_noble_estates_desc:0 "พระราชวังและคฤหาสน์อันงดงามตระการตาในความรุ่งโรจน์ ซึ่งมีขุนนางเป็นเจ้าของ ชนบทโดยรอบและชาวนาที่อาศัยอยู่ในนั้นก็เป็นของพวกเขาด้วยเช่นกัน"
 building_bureaucratic_1:0 "สำนักงานการปกครอง"
 building_bureaucratic_1_desc:0 "ศูนย์ราชการที่ซับซ้อนราวกับเขาวงกต ซึ่งเต็มไปด้วยสำนักงานการปกครอง สำนักงานย่อย และหน่วยงานระดับย่อยลงไปอีก"
 building_bureaucratic_2:0 "แหล่งการปกครอง"
 building_bureaucratic_2_desc:0 "พื้นที่ที่เต็มไปด้วยอาคารซึ่งอุทิศให้กับความรุ่งโรจน์ของงานเอกสารที่มีประสิทธิภาพและพิถีพิถัน"
 building_bureaucratic_3:0 "ศูนย์อำนวยการปกครอง"
 building_bureaucratic_3_desc:0 "พื้นที่กว้างใหญ่ที่ปกคลุมไปด้วยสำนักงานการปกครองซึ่งเต็มไปด้วยคอกทำงานนับไม่ถ้วน"
 building_simulation_1:0 "สถานที่ทำการจำลองลอกเลียน"
 building_simulation_1_desc:0 "เพื่อความก้าวหน้าของอารยธรรมของเรา เราต้องดำเนินการและประเมินผลการจำลองที่ซับซ้อน"
 building_simulation_2:0 "ศูนย์จำลองลอกเลียน"
 building_simulation_2_desc:0 "$building_simulation_1_desc$"
 building_simulation_3:0 "ศูนย์จำลองลอกเลียนซับซ้อน"
 building_simulation_3_desc:0 "$building_simulation_1_desc$"
 building_sensorium_1:0 "ที่รับความรู้สึก"
 building_sensorium_1_desc:0 "เพื่อความเข้าใจที่ลึกซึ้งยิ่งขึ้นเกี่ยวกับกาแล็กซี โดรนรับความรู้สึกเฉพาะทางของเราจำเป็นต้องสัมผัสทุกสิ่งทุกอย่างที่กาแล็กซีนี้มี"
 building_sensorium_2:0 "ศูนย์กลางรับความรู้สึก"
 building_sensorium_2_desc:0 "$building_sensorium_1_desc$"
 building_sensorium_3:0 "ศูนย์คอมเพล็กซ์รับความรู้สึก"
 building_sensorium_3_desc:0 "$building_sensorium_1_desc$"
 building_primitive_research: "ห้องปฏิบัติการวิจัยพื้นฐาน"
 building_primitive_research_desc: "สิ่งอำนวยความสะดวกการวิจัยพื้นฐานเหล่านี้สามารถช่วยขับเคลื่อนอารยธรรมไปสู่ยุคอวกาศได้"
 building_research_lab_1:0 "ห้องวิจัย"
 building_research_lab_1_desc:0 "ห้องปฏิบัติการวิจัยมีสิ่งอำนวยความสะดวกพื้นฐานสำหรับการวิจัยทั่วไป"
 concept_research_lab: "$building_research_lab_1$"
 concept_research_lab_desc: "งาน $job_researcher$: §G+2§!\n\n$job_researcher_effect_desc$\n$h_line$§L$building_research_lab_1_desc$§!"
 building_research_lab_2:0 "ศูนย์วิจัยซับซ้อน"
 building_research_lab_2_desc:0 "สิ่งอำนวยความสะดวกด้านการวิจัยที่ได้รับการอัปเกรด ซึ่งสามารถรองรับเจ้าหน้าที่ได้จำนวนมาก"
 building_research_lab_3:0 "ศูนย์วิจัยซับซ้อนขั้นสูง"
 building_research_lab_3_desc:0 "สิ่งอำนวยความสะดวกการวิจัยขั้นสูงเหล่านี้มีอุปกรณ์วิทยาศาสตร์ล่าสุด พร้อมด้วยความสามารถในการรองรับเจ้าหน้าที่จำนวนมากเป็นพิเศษ"
 building_precinct_house:0 "สภาเขตปกครอง"
 building_precinct_house_desc:0 "อนุสาวรีย์แห่งกฎหมายและความเป็นระเบียบเรียบร้อย เจ้าหน้าที่ผู้บังคับใช้กฎหมายมีฐานปฏิบัติการอยู่ที่นี่"
 concept_precinct_house: "$building_precinct_house$"
 concept_precinct_house_desc: "งาน [enforcer.GetName]: §G+200§!\n\n$job_enforcer_effect_desc$\n$h_line$§L$building_precinct_house_desc$§!"
 building_hall_judgment:0 "ศาลตัดสินความ"
 building_hall_judgment_desc:0 "ศูนย์รวมขนาดใหญ่ที่อุทิศให้กับศาลและการบังคับใช้กฎหมาย"
 building_sentinel_posts:0 "สถานียามตรวจการณ์เซนติเนล"
 building_sentinel_posts_desc:1 "นี่คือด่านนอกที่โดรนลาดตระเวนจะใช้สแกนจิตสำนึกเพื่อค้นหาสัญญาณของความเบี่ยงเบนและการทำงานผิดพลาด"
 building_hive_capital:0 "รังแกนหลัก (เมืองหลวง)"
 building_hive_capital_desc:1 "แกนกลางการจัดระเบียบที่จิตสำนึกร่วมใช้ประสานงานฟังก์ชันการทำงานบนพื้นผิวดาวเคราะห์"
 building_hive_major_capital:0 "รัง Nexus (เมืองหลวง)"
 building_hive_major_capital_desc:1 "ศูนย์กลางเมืองหลวงที่แผ่ขยายออกไป ซึ่งจิตสำนึกร่วมจะเน้นไปที่การจัดระเบียบ การประสานงาน และการวางแผนบนดาวเคราะห์"
 building_spawning_pool:0 "บ่อวางไข่"
 building_spawning_pool_desc:1 "บ่อเหล่านี้ได้รับการดูแลอย่างพิถีพิถันตามหลักวิทยาศาสตร์โดยผู้เชี่ยวชาญ เพื่อกระตุ้นให้ตัวอ่อนของเราเติบโตได้รวดเร็วยิ่งขึ้น"
 building_robot_assembly_plant:0 "โรงประกอบหุ่นยนต์"
 building_robot_assembly_plant_desc:0 "โรงงานเทคโนโลยีขั้นสูงที่นักสร้างหุ่นยนต์ผู้ชำนาญทำการประกอบหุ่นยนต์รุ่นล่าสุด"
 building_robot_assembly_complex:0 "ศูนย์ประกอบหุ่นยนต์ครบวงจร"
 building_robot_assembly_complex_desc:0 "โรงงานประกอบขั้นสูงที่นักสร้างหุ่นยนต์ผู้ชำนาญทำการประกอบหุ่นยนต์รุ่นล่าสุด"
 building_machine_assembly_plant:0 "โรงงานประกอบเครื่องจักร"
 building_machine_assembly_plant_desc:1 "โรงงานประกอบสายการผลิตที่ใช้สร้างยูนิตใหม่"
 building_machine_assembly_complex:0 "ศูนย์ประกอบเครื่องจักรซับซ้อน"
 building_machine_assembly_complex_desc:0 "โรงงานประกอบขั้นสูงที่ใช้สร้างยูนิตใหม่"
 building_food_processing_facility:0 "โรงงานแปรรูปอาหาร"
 building_food_processing_facility_desc:0 "อาหารที่ผ่านกระบวนการผลิตในสิ่งอำนวยความสะดวกเหล่านี้จะได้รับการเพิ่มคุณค่าทางโภชนาการอย่างมาก"
 building_food_processing_center:0 "ศูนย์แปรรูปอาหาร"
 building_food_processing_center_desc:0 "สิ่งอำนวยความสะดวกที่มีประสิทธิภาพสูงซึ่งสามารถแปรรูปอาหารจำนวนมากได้"
 building_luxury_residence:0 "ที่พักอาศัยสุดหรู"
 building_luxury_residence_desc:0 "อาคารที่พักอาศัยที่ได้รับการออกแบบอย่างซับซ้อนพร้อมอพาร์ตเมนต์ที่หรูหรา เทคโนโลยีไร้แรงโน้มถ่วงขั้นสูงคือสิ่งเดียวที่ช่วยพยุงการออกแบบระเบียงที่แปลกประหลาดไม่ให้พังทลายลงมา"
 building_refinery:0 "โรงงานสกัดก๊าซแปลกประหลาด"
 building_refinery_desc:0 "โรงกลั่นขั้นสูงเหล่านี้ทำงานทั้งวันทั้งคืนเพื่อผลิตก๊าซแปลกประหลาด"
 building_crystal_plant:0 "โรงงานสังเคราะห์ผลึก"
 building_crystal_plant_desc:0 "เกือบจะเหมือนกับของจริงทุกประการ ผลึกคริสตัลที่ผลิตที่นี่มีคุณภาพสูงสุด"
 building_chemical_plant:0 "โรงกลั่นเคมี"
 building_chemical_plant_desc:0 "เศษผงธุลีระเหยง่ายที่คาดเดาไม่ได้และในบางครั้งก็ไม่เสถียร ถูกผลิตขึ้นอย่างสังเคราะห์ที่นี่ ห้ามมิให้มีเปลวไฟเปิดภายในรัศมีห้ากิโลเมตรรอบโรงงาน"
 building_commercial_zone:0 "เขตการค้า"
 building_commercial_zone_desc:0 "เขตการค้าเหล่านี้เป็นที่ตั้งของอาคารสำนักงานสูงระฟ้าและศูนย์รวมธุรกิจ"
 building_commercial_megaplex:0 "ศูนย์การพาณิชย์ขนาดใหญ่"
 building_commercial_megaplex_desc:0 "หอคอยพาณิชย์และยอดตึกขนาดใหญ่ที่พุ่งทะยานขึ้นสู่ท้องฟ้า บดบังแสงสว่างจนหมดสิ้น"
 building_mote_harvesters:0 "ที่ดักการเก็บเศษผงธุลี"
 building_mote_harvesters_desc:0 "สิ่งอำนวยความสะดวกอันซับซ้อนเหล่านี้จะดักจับเศษผงธุลีระเหยง่ายไว้ในลานพลังงาน ส่งพวกมันไปยังพื้นที่กักเก็บพิเศษใต้ดินที่ซึ่งพวกมันสามารถทำให้เสถียรและเก็บเกี่ยวได้"
 building_gas_extractors:0 "บ่อสกัดก๊าซ"
 building_gas_extractors_desc:0 "บ่อขนาดใหญ่เหล่านี้เจาะลึกลงไปในชั้นเนื้อโลกของดาวเคราะห์เพื่อเข้าถึงแหล่งกักเก็บก๊าซแปลกประหลาด"

 building_communal_housing:0 "ที่อยู่อาศัยของชุมชน"
 building_communal_housing_desc:0 "บล็อกที่อยู่อาศัยที่มีรูปแบบเดียวกัน เท่าเทียมกันในทุกๆ ด้าน"
 building_communal_housing_large:1 "ที่อยู่อาศัยของชุมชนยูโทเปีย"
 building_communal_housing_large_desc:2 "ผลงานวิศวกรรมอันน่าเหลือเชื่อที่ผสมผสานที่อยู่อาศัยที่มีประสิทธิภาพและใช้งานได้จริง เข้ากับภูมิทัศน์ชนบทที่ได้รับการดูแลอย่างประณีต"
 building_drone_storage:0 "ที่เก็บโดรน"
 building_drone_storage_desc:0 "พื้นที่จัดเก็บสำหรับโดรนเพื่อเข้ารับการบำรุงรักษา"
 building_drone_megastorage:0 "ที่เก็บโดรนที่อัปเกรดแล้ว"
 building_drone_megastorage_desc:0 "ด้วยการอัปเกรดล่าสุด ในขณะที่อยู่ระหว่างการบำรุงรักษา พลังงานที่ผลิตได้บางส่วนของโดรนจะสามารถเปลี่ยนทิศทางไปยังโครงข่ายพลังงานหลักได้"
 building_hive_warren:0 "รังแออัด"
 building_hive_warren_desc:0 "รังใต้ดินอันกว้างใหญ่สำหรับเป็นที่พักพิงและพักผ่อนของโดรนจำนวนมาก"
 building_expanded_warren:0 "ชุมชนแออัดแบบขยาย(ไฮฟ์)"
 building_expanded_warren_desc:0 "ด้วยการขยายพื้นที่รังใต้ดิน ทำให้โดรนสามารถเข้าไปพักพิงได้มากยิ่งขึ้น"
 building_nuumismatic_shrine:1 "ศาลเจ้านูมิสมาติก"
 building_nuumismatic_shrine_desc:1 "ศาลเจ้าที่บูชา นูมา เทพีแห่งโชคลาภ"
 building_ranger_lodge:0 "บ้านพักเรนเจอร์"
 building_ranger_lodge_desc:0 "ขั้นตอนแรกในการดำเนินชีวิตให้สอดคล้องกับธรรมชาติมากขึ้นคือการทำมั่นใจว่าธรรมชาติยังคงอยู่ การดูแลไม่ให้ผู้ตั้งถิ่นฐานคนใดส่งผลกระทบต่อความงามตามธรรมชาตินั้นเป็นสิ่งสำคัญ โลกจะต้องยังคงบริสุทธิ์"
 building_ranger_lodge_effect: "งาน £job_ranger£ $job_ranger$ จากสิ่งกีดขวางที่เกิดขึ้นตามธรรมชาติ: §G+1§! £job_ranger£"


 mod_building_xeno_zoo_max:0 "$building_xeno_zoo$สูงสุด"
