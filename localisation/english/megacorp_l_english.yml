 decision_slave_colony_effects_short:0 "ปิดการสร้าง £building£ §Yสิ่งปลูกสร้าง§! ส่วนใหญ่ และแทนที่ £district£ §Yเขตเมืองอําเภออุบบา§! ด้วย §Y$district_slave_plural$§! และ §Y$district_battle_thrall$§!\\n\\nเพิ่ม §Yความเร็วการเติบโตของประชากร§!\\nไม่เหมาะสำหรับ £pop£ §Hประชากรเสรี§!"
 decision_abolish_slave_colony:0 "ยกเลิกดาวทาส"
 decision_abolish_slave_colony_desc:0 "โลกนี้จะไม่ถูกพิจารณาว่าเป็นโลกทาส(Trall-World)อีกต่อไป โครงสร้างพื้นฐานที่เน้นเรื่องทาสทั้งหมดจะถูกรื้อถอน"
