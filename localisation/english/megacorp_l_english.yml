 # Atomic Clock
 distar.330.name:0 "การนับถอยหลังของนาฬิกาอะตอม"\n
 distar.330.desc:0 "ตลอด 42 ปีกับอีก 3 วันที่ผ่านมา นักวิจัยบน [Root.Capital.GetName] ต่างเฝ้ารอคอยการนับถอยหลังของนาฬิกาอะตอมลึกลับที่มีความแม่นยำอย่างน่าอัศจรรย์ ซึ่งถูกพบบน [From.From.From.GetName]\\n\\nบัดนี้ การคาดเดาและการสมมติฐานที่เผ็ดร้อนเป็นเวลาหลายทศวรรษได้อันตรธานไปในพริบตา พร้อมๆ กับพื้นที่ส่วนใหญ่ของ [nuked_primitive_planet.GetName]\\n\\nเมื่อนาฬิกาเดินมาถึงเวลาขีดเส้นตายที่สำคัญ มันได้ส่งสัญญาณไปยังเครื่องรับบน [nuked_primitive_planet.GetName] ซึ่งกระตุ้นให้เกิดระเบิดเทอร์โมนิวเคลียร์ที่มีพลังทำลายล้างสูงมากจนทำให้ดาวเคราะห์ทั้งดวงและสังคมยุคดึกดำบรรพ์ที่อาศัยอยู่ที่นั่นพังพินาศย่อยยับ\\n\\nในขณะที่นักวิทยาศาสตร์ของเรากำลังถกเถียงกันถึงเหตุผลเบื้องหลังการล้างบางที่ถูกตั้งเวลาไว้เป็นอย่างดีนี้ นาฬิกาอะตอมก็ยังคงเดินหน้าติ๊กๆ ต่อไป โดยไม่แยแสต่อความรกร้างว่างเปล่าเบื้องล่าง"\n
 distar.330.a.phile:0 "เราทำอะไรลงไปเนี่ย!?"\n
 distar.335.name:0 "การนับถอยหลังของนาฬิกาอะตอม"\n
 distar.335.desc:0 "ตลอด 42 ปีกับอีก 3 วันที่ผ่านมา นักวิจัยบน [Root.Capital.GetName] ต่างเฝ้ารอคอยการนับถอยหลังของนาฬิกาอะตอมลึกลับที่มีความแม่นยำอย่างน่าอัศจรรย์ ซึ่งถูกพบบน [From.From.From.GetName]\\n\\nบัดนี้ การคาดเดาและการสมมติฐานที่เผ็ดร้อนเป็นเวลาหลายทศวรรษได้อันตรธานไปในพริบตา พร้อมๆ กับพื้นที่ส่วนใหญ่ของ [nuked_planet.GetName]\\n\\nเมื่อนาฬิกาเดินมาถึงเวลาขีดเส้นตายที่สำคัญ มันได้ส่งสัญญาณไปยังเครื่องรับบน [nuked_planet.GetName] ซึ่งกระตุ้นให้เกิดระเบิดเทอร์โมนิวเคลียร์ที่มีพลังทำลายล้างสูงมากจนทำให้ดาวเคราะห์ทั้งดวงพังพินาศย่อยยับ\\n\\nในขณะที่นักวิทยาศาสตร์ของเราคาดเดาถึงเหตุผลเบื้องหลังการล้างบางที่ถูกตั้งเวลาไว้เป็นอย่างดีนี้ นาฬิกาอะตอมก็ยังคงเดินหน้าติ๊กๆ ต่อไป โดยไม่แยแสต่อความรกร้างว่างเปล่าเบื้องล่าง"\n
 distar.335.desc:0 "ตลอด 42 ปี และ 3 วัน ที่ ผ่าน ไป นัก วิจัย คน นี้[Root.Capital.GetName]ได้คาดหวังการนับถอยหลังของนาฬิกาปรมาณูลึกลับของ ความแม่นยําที่โดดเด่นที่พบบน[From.From.From.GetName].\n\nตอนนี้หลายทศวรรษ'มูลค่าของการคาดเดาความร้อนและการคาดเดาได้ระเหยไปในพริบตาพร้อมกับส่วนใหญ่[nuked_planet.GetName].\n\nเมื่อนาฬิกาถึงเส้นตายที่สําคัญของ มันส่งสัญญาณไปยังผู้รับบน[nuked_planet.GetName]จุดชนวนการระเบิด ของพลังงานทําลายล้างดังกล่าว มันทิ้งให้กับทั้งดาวเคราะห์\n\nในขณะที่นักวิทยาศาสตร์ของเรา คาดเดาถึงเหตุผล เบื้องหลังการดําเนินงานอย่างรอบคอบ ของการทําลายนาฬิกาปรมาณู ยังคงติ๊ก"

 planet_culture_shock_desc:1 "โลกที่เคยเป็นสังคมก่อน- FTL นี้ กำลังเผชิญกับความระส่ำระสายอันโกลาหลในขณะที่ปรับตัวเข้ากับการรับเอาเทคโนโลยีขั้นสูงเข้ามาอย่างกะทันหัน ยังคงมีกลุ่มต่อต้านกลุ่มใหญ่ที่คอยก่อความวุ่นวายในหลายภูมิภาคที่ห่างไกล"\n
 planet_culture_shock_desc:1 "เมื่อก่อนหน้านี้โลกของความเร็วกําลังประสบความวุ่นวาย เมื่อมันปรับตัวเข้ากับการนําเทคโนโลยีขั้นสูงอย่างฉับพลัน ยัง คง มี การ กัก กัน ที่ สําคัญ และ ก่อ ความ แตก แยก ใน หลาย ภูมิภาค ที่ อยู่ โดด เดี่ยว."

