 ap_arcology_project:0 "โครงการเมืองใหญ่ที่อยู่ได้ด้วยตัวเอง"
 ap_arcology_project_desc:1 "เราจะสร้างดาวของเมืองและเมืองของดาว"
 allow_arcology_project:0 "§Hปลดล็อกการตัดสินใจ:§! $ap_arcology_project$"
 decision_arcology_project:0 "$ap_arcology_project$"
 decision_arcology_project_effects:1 "- เปลี่ยนดาวเคราะห์ให้กลายเป็น §Y$pc_city$§!, เพิ่ม £housing£ §Y$PLANET_HOUSING_TITLE$§!, §Yการผลิตทรัพยากร§! และ §Yการเติบโตของประชากร§! และปลดล็อก £district£ §Yเขตอาร์โคโลจี§! พิเศษ\\n- £district£ §Yเขตเครื่องกำเนิดพลังงาน§!, §Yเขตเหมืองแร่§! และ §Yเขตเกษตรกรรม§! จะ §Rไม่สามารถใช้งานได้§!\\n- การสร้าง £district£ §Yเขตการปกครอง§! ใดๆ ในระหว่างที่ดำเนินการนี้จะถูก §Rปิดใช้งาน§!"
 decision_arcology_project_effects_short:2 "เปิดใช้งาน £district£ §Yเขตอาร์โคโลจี§!\\nปิดการพัฒนา £district£ §Yเขตเครื่องกำเนิดพลังงาน§!, §Yเขตเหมืองแร่§! และ §Yเขตเกษตรกรรม§!\\nการสร้าง £district£ §Yเขตการปกครอง§! ใดๆ ในระหว่างที่ดำเนินการนี้จะถูก §Rปิดใช้งาน§!"
 decision_arcology_project_requirements:1 "£trigger_no£ §Rช่องเขตทั้งหมดบนดาวเคราะห์จะต้องถูกเติมเต็มด้วย§! §Y$district_city_plural$§!"
 decision_arcology_project_desc:1 "การขยายตัวของอาร์โคโลจีอย่างไม่หยุดยั้งจะเชื่อมโยงดาวเคราะห์ดวงนี้จากขั้วโลกหนึ่งไปยังอีกขั้วโลกหนึ่ง สร้างมหานครระดับโลกเพียงหนึ่งเดียว หรือก็คืออีคิวเมโนโพลิส(หอสมุด)"
 arcology_project_construction_fail_tt: "$TRIGGER_FAIL$§Rไม่สามารถสร้าง £district£ เขตการปกครองในขณะที่ §Y$ap_arcology_project$§! กำลังดำเนินการอยู่!§!"

