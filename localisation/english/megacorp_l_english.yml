 crisis.2309.tooltip_2:0 "ประชากรของเราหลายกลุ่มได้ทำการวินาศกรรมบนดาวเคราะห์ที่พวกเขาอาศัยอยู่ก่อนที่จะทำลายตัวเอง"
 gov_communal_parity:0 "ความเท่าเทียมกันของสาธารณะ"
 gov_communal_parity_desc:0 "รัฐบาลนี้ส่งเสริมความเท่าเทียมอย่างสมบูรณ์แบบสำหรับพลเมืองทุกคน โดยไม่คำนึงถึงอาชีพหรืองานที่ได้รับมอบหมาย หนึ่งชีวิตมีค่าเท่าเทียมกับชีวิตอื่นๆ"
 RT_PRESIDING_SPEAKING:0 "ประธานสภา"
