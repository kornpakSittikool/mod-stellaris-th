 lootbox.intro:0 "เมื่อเปิด $lootbox$ เราพบ..."
 lootbox.and:0 "\\nเมื่อค้นดูในกล่อง เรายังพบ..."
 lootbox_contents_empty:0 "§Rไม่มีอะไรเลย§!."
 lootbox_contents_a:0 "§E$lootbox$ บรรจุแผนภูมิโบราณของเส้นทางการค้าที่เลิกใช้ไปนานแล้ว และยังมีระบบดาวเมืองหลวงของเรา §Y[Root.Capital.GetStarName]§! รวมอยู่ด้วย§!"
 lootbox_contents_b:1 "§E$lootbox$ บรรจุเครื่องแบบพิธีการครบชุด น่าเสียดายที่ชุดเหล่านี้ถูกออกแบบมาสำหรับสปีชีส์ที่มีแขนขามากกว่าสปีชีส์ทั่วไปใน [Root.GetName]\\n\\nอย่างไรก็ตาม เราอาจยังนำวัสดุนี้ไปแปรรูปใช้งานอย่างอื่นได้§!"
 lootbox_contents_c:0 "§E$lootbox$ บรรจุระเบิด!\\n\\nมันถูกปลดชนวนอย่างรวดเร็ว§!"
 lootbox_contents_c.tooltip:0 "โล่งอก"
 lootbox_contents_d:0 "§E$lootbox$ บรรจุบทนิพนธ์เกี่ยวกับความรัก และธรรมชาติอันเป็นวัฏจักรของสรรพสิ่ง เขียนขึ้นในภาษา [Root.GetAdj] ด้วยสำนวนแบบร่วมสมัย§!"
 lootbox_contents_e:1 "§E$lootbox$ บรรจุอาวุธปืนที่ไม่ทราบแหล่งที่มา ซึ่งดูเหมือนว่าชิ้นส่วนไกปืนจะถูกถอดออกไปแล้ว§!"
 lootbox_contents_e.tooltip:0 "แปลกประหลาด"
 lootbox_contents_f:0 "§E$lootbox$ บรรจุเสบียงทหารหนึ่งชุด เครื่องหมายทั้งหมดบนบรรจุภัณฑ์เลือนหายไปแล้ว ทว่าสิ่งของภายในดูปลอดภัยและเข้ากันได้กับชีววิทยาของ [Root.GetAdj]§!"
 lootbox_contents_g:0 "§E$lootbox$ บรรจุเสียงดนตรี โดยปราศจากกลไกการเล่นที่เด่นชัดใด ๆ\\n\\nในไม่ช้า $lootbox$ ก็ถูกปิดลงและถูกลืมเลือนไป§!"
 lootbox_contents_g.tooltip:0 "ความเงียบงัน"
 lootbox_contents_h:0 "§E$lootbox$ เต็มไปด้วยลูกแก้วสีน้ำเงินที่สวยงาม§!"
 lootbox_contents_i:0 "§E$lootbox$ เต็มไปด้วยความมั่งคั่งอันสุดจะพรรณนา อันที่จริง ไม่มีใครที่อยู่ในเหตุการณ์เปิดกล่องสามารถบรรยายถึงความมั่งคั่งมหาศาลนี้ได้อย่างถูกต้องแม่นยำ หากพวกเขายอมรับว่ามันมีอยู่จริงด้วยซ้ำ\\n\\nแต่งบดุลของกระทรวงการคลังแสดงข้อมูลนี้ออกมาอย่างชัดเจนเพียงพอแล้ว§!"
 lootbox_contents_j:0 "§E$lootbox$ บรรจุอุปกรณ์ของเอเลี่ยนจำนวนหนึ่ง ซึ่งไม่มีปฏิกิริยาและดูเหมือนว่าจะชำรุดเสียหาย§!"
 lootbox_contents_k:0 "§Eแม้ว่าข้างในจะว่างเปล่า แต่ผนังด้านในของ $lootbox$ ก็เต็มไปด้วยรอยเจาะและแผลเป็น สามารถกู้คืนร่องรอยของสารชีวภาพได้จากส่วนลึกของกระเป๋า§!"
 lootbox_contents_l:2 "§E$lootbox$ บรรจุสิ่งมีชีวิตที่ดำรงอยู่เป็นเพียงสเปกตรัมของความยาวคลื่นในสื่อกลางอันเบาบาง มันหลบหนีไปยังมิติที่สูงกว่าในทันที ทิ้งไว้เพียงสัจธรรมอันลึกซึ้งและความกลัวจนตัวแข็งทื่อไว้เบื้องหลัง§!"
 lootbox_contents_m:0 "§E$lootbox$ เปิดออกได้ยาก เนื่องจากถูกปิดแน่นจากภายในด้วยความผิดปกติของแรงโน้มถ่วง§!"
 lootbox_contents_n:1 "§E$lootbox$ ไม่ได้บรรจุอะไรไว้เลย ในจุดที่ใคร ๆ คาดว่าจะพบช่องว่างสำหรับเก็บของ กลับมีบล็อกโลหะผสมที่เรียบเนียนตั้งอยู่แทน โดยผนังด้านในด้านหนึ่งของ $lootbox$ กลมกลืนเข้ากับอีกด้านหนึ่งอย่างไร้รอยต่อ§!"
 lootbox_contents_galatron:0 "§Eเดอะ§! กาลาตรอน§E...!§!"

 cara_home_galatron.title:1 "กาลาตรอน"
 cara_home_galatron.desc:0 "§Eกาลาตรอน§! เป็นของคุณแล้ว!"
 cara.320.a:0 "มันคืออะไรกัน?"
 cara.320.a.reply:1 "มันคือ §Eกาลาตรอน§! เสาหลักของชาวคาราวาน โทเท็มที่บรรพบุรุษของเราได้สาบานตนจงรักภักดีและร่วมกันก่อตั้ง $NAME_Caravaneer_Home$ ขึ้นมา\\n\\nความสำเร็จในยุคแรกเริ่มของ $NAME_Caravaneer_Home$ นั้น ตามประเพณีมักกล่าวว่าเป็นผลมาจากพลังอำนาจอันน่าเกรงขามของ §Eกาลาตรอน§! แม้ว่าธรรมชาติของพลังนี้จะสูญหายไปตามกาลเวลาแล้วก็ตาม"
 cara.320.b:0 "มันทำอะไรได้บ้าง?"
 cara.320.b.reply:1 "มันคือ §Eกาลาตรอน§!! มัน §Eกาลาตรอน§!!\\n\\nน่าจะนะ"
 cara.320.c:0 "มันมีค่าเท่าไหร่? ขายได้ไหม?"
 cara.320.c.reply:1 "มูลค่าของมันไม่สามารถประเมินได้ ไม่มีใครยอมซื้อ §Eกาลาตรอน§! ไปจากคุณหรอก แม้ว่าทุกชีวิตในกาแล็กซีจะร่วมยินดีในแสงสว่างของมันก็ตาม\\n\\nแต่จงระวังไว้: ตามประเพณีแล้ว มันสามารถถูกแย่งชิงไปจากผู้ที่ไม่คู่ควรได้ในยามสงคราม"
 cara.320.d:0 "ขอบคุณนะ? ไปล่ะ...?"

 cara.910.name:1 "$cara.920.name$"
 cara.910.desc:1 "เราได้บดขยี้พวกสัตว์รบกวนหน้าเงินที่ยึดสถานีการค้าตองเกิ้ลเป็นบ้านแล้ว $NAME_Caravaneer_Home$ ไม่มีอีกต่อไป!"
 cara.920.name:1 "§H$caravaneers$§!ทังเกิลถูกทำลาย"
 cara.920.desc:1 "สถานีการค้าของชาวคาราวานถูกทำลายโดย [From.From.GetName] เรายังไม่สามารถยืนยันได้ว่ามีผู้รอดชีวิตหนีพ้นจากการสังหารหมู่ครั้งนี้หรือไม่"
 cara.930.name:1 "$NAME_Caravaneer_Home$"
 cara.930.desc:1 "ฮัลโหล? ได้ยินหรือเปล่า? ได้ยินเราไหม?\\n\\nเยี่ยมเลย คุณอาจเคยได้ยินข่าวว่าสถานีการค้าตองเกิ้ลบ้านของชาวคาราวานทุกคน เพิ่งถูกโจมตีอย่างป่าเถื่อนเมื่อเร็ว ๆ นี้ คนบางพวกช่างเกลียดชังการเคลื่อนไหวอย่างเสรีของสินค้าและบริการเสียจริง! พวกผู้โจมตีคิดว่าเราตายหมดแล้ว แต่สภาคาราวานยังคงรอดชีวิตมาได้ดังที่คุณเห็นนี่แหละ\\n\\nเรามีความประสงค์ที่จะจัดตั้งศูนย์ปฏิบัติงานของเราขึ้นใหม่ในระบบดาว §Y[cara_home_new_location.GetName]§! ซึ่งแน่นอนว่าตามหลักการแล้ว ระบบดาวนั้นจะไม่ใช่ของคุณอีกต่อไป แต่เราจะทำให้มันคุ้มค่ากับที่คุณมอบให้เราอย่างแน่นอน"
 cara.930.a:0 "ระบบนี้เป็นของพวกคุณ มิตรสหายแห่งการค้า"
 cara.930.a.tooltip:0 "$NAME_Caravaneer_Home$ เข้าควบคุมระบบดาว §Y[cara_home_new_location.GetName]§!"
 cara.930.b:0 "ระบบนี้มีความสำคัญทางยุทธศาสตร์เกินกว่าจะยอมยกให้"
 cara.930.c:0 "การมีชีวิตรอดของพวกคุณทำให้เราหงุดหงิด ไปซะ"
 cara.940.name:0 "§H$caravaneers$§!: จัดตั้งขึ้นใหม่"
 cara.940.desc:0 "[caravaneer_home_country.GetName] ได้จัดตั้งสถานีการค้าขึ้นใหม่ในระบบดาว [cara_home_new_location.GetName] ซึ่งเคยเป็นดินแดนของ [From.GetAdj] มาก่อน"
 cara.940.b.reply:0 "ช่างน่าเสียดายจริง ๆ แต่เราทุกคนไม่สามารถเป็นผู้ชนะได้หรอก! และคุณก็กำลังเลือกที่จะไม่เป็นผู้ชนะด้วยตัวเองนะ\\n\\nลาก่อน"

 # Galatron
 cara.950.name:0 "ช่วงชิง §Eกาลาตรอน§!"
 cara.950.desc:0 "[From.From.GetName] ยอมรับความพ่ายแพ้แล้ว และเราได้แย่งชิงกาลาตรอนอันรุ่งโรจน์มาจากเงื้อมมืออันไม่คู่ควรของพวกเขา!"
 cara.950.a:0 "ขอให้แสงสว่างอันนุ่มนวลของมันส่องประกายชั่วนิรันดร์"
 cara.951.name:0 "สูญเสีย §Eกาลาตรอน§!"
 cara.951.desc:0 "นอกเหนือจากเจ้าหน้าที่จำนวนมากที่กรีดร้องอย่างเสียสติในระหว่างการส่งมอบแล้ว การส่งมอบกาลาตรอนให้แก่กองกำลัง [From.GetAdj] ก็นับเป็นเหตุการณ์ที่ราบเรียบไร้เรื่องราวใด ๆ"
 cara.951.a:0 "เสียงคร่ำครวญอันเจ็บปวดอย่างไร้คำพูด"

 # Fleet 1
 cara_fleet1_contact.title:0 "§Yกองยานคาราวาน:§!The Vengralian Trium"
 fleet1contact_opening:0 "ยินดีต้อนรับจากเวนเกรเลียน ทริอุมพ่อค้าคาราวานที่ได้รับการรับรองจากคาราวานซารี่ คาราวาน"
 fleet1contact1:0 "$fleet1contact_opening$ เราขอนำเสนอผลิตภัณฑ์สุดพิเศษจากมุมที่ไกลที่สุดของกาแล็กซี (ซึ่งจำลองโดยโรงงานในยานของเรา) ในราคาที่จับต้องได้\\n\\n$fleet1contact_explanation$"
 fleet1contact2:0 "$fleet1contact_opening$ เราสอนให้ซีโนรู้วิธีการทำรายได้เสริมจำนวนมากจากการทำงานที่บ้าน แต่ดูเหมือนว่าคุณจะไปได้สวยด้วยตัวเองอยู่แล้วนะ\\n\\n$fleet1contact_explanation$"
 fleet1contact3:0 "$fleet1contact_opening$ เราทำธุรกิจเพื่อตัวเอง แต่ไม่ได้ทำโดยลำพัง การทำงานเป็นทีมทำให้ฝันเป็นจริง!\\n\\n$fleet1contact_explanation$"
 fleet1contact_explanation:0 "เราจะยื่นข้อเสนอพิเศษให้คุณทุกครั้งที่ผ่านดินแดนของคุณ แม้ว่ามันจะเย้ายวนใจ แต่คุณไม่จำเป็นต้องยอมรับในทันที! คุณสามารถขอให้เราติดต่อคุณอีกครั้งก่อนที่เราจะออกจากน่านฟ้าของคุณ และเราจะทำเช่นนั้น แต่โปรดทราบว่าสายเรียกเข้าจะถูกโอนไปยัง $NAME_Caravaneer_Home$."
 fleet1contact1notinborder:0 "$fleet1contact_opening$ เราขอนำเสนอผลิตภัณฑ์สุดพิเศษจากมุมที่ไกลที่สุดของกาแล็กซี (ซึ่งจำลองโดยโรงงานในยานของเรา) ในราคาที่จับต้องได้\\n\\n$fleet1contact_explanation_notinborder$"
 fleet1contact2notinborder:0 "$fleet1contact_opening$ เราสอนให้ซีโนรู้วิธีการทำรายได้เสริมจำนวนมากจากการทำงานที่บ้าน แต่ดูเหมือนว่าคุณจะไปได้สวยด้วยตัวเองอยู่แล้วนะ\\n\\n$fleet1contact_explanation_notinborder$"
 fleet1contact3notinborder:0 "$fleet1contact_opening$ เราทำธุรกิจเพื่อตัวเอง แต่ไม่ได้ทำโดยลำพัง การทำงานเป็นทีมทำให้ฝันเป็นจริง!\\n\\n$fleet1contact_explanation_notinborder$"
 fleet1contact_explanation_notinborder:0 "เมื่อใดก็ตามที่เราเข้าสู่ดินแดนของคุณ เราจะมอบข้อเสนอสุดพิเศษให้คุณ น่าเสียดายที่ในขณะนี้ยานของเราทั้งหมดอยู่นอกดินแดนของคุณ แต่เราหวังว่าจะได้ทำธุรกิจร่วมกันในอนาคต! ในระหว่างนี้ โปรดติดต่อเราได้เสมอ แต่อย่าลืมว่าสายเรียกเข้าจะถูกโอนไปยัง $NAME_Caravaneer_Home$."
 cara_fleet1_contacted:0 "สวัสดี ชาวคาราวาน"
 cara_fleet1_exit:0 "ไม่สนใจ"

 cara_fleet1_main.title:0 "$cara_fleet1_contact.title$"
 fleet1hewwo01:0 "เรามีสารสกัดจากต่อมของบอร์กในจำนวนจำกัดอย่างยิ่งสำหรับหน่วยงานเอกชนที่สนใจสั่งซื้อ ดีเลิศสำหรับเยื่อเลือกผ่านทุกรูปแบบ!"
 fleet1hewwo02:0 "บางครั้งทุกอย่างก็ดูหมดหวังไปเสียหมด แต่แล้วฉันก็ระลึกได้ว่าความมั่งคั่งและความสุขอยู่ใกล้แค่เอื้อมนี่เอง!\\n\\nบอกเพื่อนของคุณด้วยล่ะ!"
 fleet1hewwo03:0 "อาหารเหลวบำรุงกำลังแบนไม่ใช่คนอย่างแน่นอน\\n\\nส่วนผสมนั้นเป็นความลับ และดีต่อสุขภาพมาก"
 fleet1hewwo04:0 "โปรดทราบว่าสติกเกอร์ §Rอาจมีสารปนเปื้อนจากของเสียเวนกราเลียน(Vengralian Waste)§! บ่งชี้เพียงว่าผลิตภัณฑ์นี้ผลิตในโรงงานที่มีการจัดการของเสียเวนกราเลียนด้วยเท่านั้น ไม่ใช่ว่าตัวผลิตภัณฑ์นั้นเป็นของเสียเวนกราเลียนแต่อย่างใด"
 fleet1hewwo05:0 "เรากำลังมองหาผู้แทนจำหน่ายดาวน์ไลน์เพิ่มอยู่เสมอ สนใจมาร่วมเป็นส่วนหนึ่งของครอบครัวทริมไหม?"
 fleet1hewwo06:0 "คุณสามารถไว้วางใจในตราประทับคุณภาพของเดือนมิถุนายนได้"
 fleet1hewwo07:0 "การรับประกันคืนเงินแสดงถึงความไม่มั่นใจในสินค้าของตนเอง เรามีความมั่นใจอย่างเต็มเปี่ยมในผลิตภัณฑ์ของเรา"
 fleet1hewwo08:0 "เราสอนให้ซีโนรู้วิธีการทำรายได้เสริมจำนวนมากจากการทำงานที่บ้าน"
 fleet1hewwo09:0 "มันไม่สำคัญว่าผลิตภัณฑ์คืออะไร แต่มันเกี่ยวกับประโยชน์ที่จะได้รับจากการซื้อผลิตภัณฑ์ต่างหาก"
 fleet1hewwo10:0 "คุณบังเอิญรู้จักสิ่งมีชีวิตทรงภูมิปัญญาใด ๆ ที่ต้องการแหล่งรายได้เสริมเป็นเครดิตพลังงานบ้างไหม?"
 fleet1hewwo11:0 "ถึงแม้ว่าสินค้าของเราจะขายได้ด้วยตัวมันเองอยู่แล้ว แต่เราก็ยังเจียดเวลามาขายพวกมันด้วย... ให้กับคุณไง"
 fleet1hewwo12:0 "ได้โปรดซื้ออะไรสักอย่างเถอะ อะไรก็ได้... ได้โปรด"
 fleet1hewwo13:0 "สมาชิกทุกคนของเวนเกรเลียน ทริอุมต่างก็เป็นเจ้านายของตัวเอง ซึ่งนั่นก็นำไปสู่ปัญหาด้านการบริหารจัดการ... อยู่บ้าง"
 fleet1hewwo14:0 "เวนเกรเลียน ทริอุมถูกสร้างขึ้นมาเพื่อการค้าขาย มันไหลเวียนอยู่ในสิ่งทดแทนเลือดของชาวเวนกราเลียน การไม่ทำการค้าขายนั้นมัน...\\n\\nผิดมหันต์\\n\\nดังนั้น..."
 fleet1hewwo15:0 "แม้แต่ใบเสร็จประวัติศาสตร์ที่เก่าแก่ที่สุดของชาวเวนกราเลียนก็ยังกล่าวถึงพ่อค้าดาราแห่งออร์ลัน(ออร์ลัน สตาร์ การ์เดนส์)พวกเขาช่วยยกระดับเราขึ้นมาจากความเป็นสัตว์ป่าขึ้นมาเพียงเพื่อจะขายเครื่องใช้ในครัวให้เรา"
 fleet1hewwo16:0 "มรดกตกทอดของเวนเกรเลียน ทริอุมก็คือมรดกของพ่อค้าดาราแห่งออร์ลันเช่นกัน พวกเขาไม่ได้อยู่กับเราอีกต่อไปแล้ว แต่เรายังต้องทำยอดขายให้ทะลุโควตาที่กำหนดไว้อยู่ดี!"

