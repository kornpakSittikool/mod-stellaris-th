 cara_fleet1_deal:0 "แสดงสินค้าของคุณให้เราดู"
 cara_fleet1_take_deal:0 "ตกลง"
 cara_fleet1_take_deal_fail.tooltip:0 "§Rไม่มี $SCIENCE_SHIP$ ที่ว่างอยู่§!"
 cara_fleet1_dealtaken:0 "ยินดีที่ได้ทำธุรกิจกับคุณ และจำไว้ว่า: อย่ามัวแต่ฝัน จงทำมันให้เป็นจริง!"

