 building_slave_huts:0 "เพิงพักของทาส"
 building_slave_huts_desc:0 "ที่อยู่อาศัยอันหยาบโลนสำหรับประชากรทาสบนดาวเคราะห์"
 building_overseer_homes:0 "ที่อยู่อาศัยของผู้ควบคุมดูแล"
 building_overseer_homes_desc:0 "บ้านเหล่านี้สงวนไว้สำหรับผู้ควบคุมดูแลทาสที่มีอภิสิทธิ์ค่อนข้างสูง"

 decision_prospect:0 "สำรวจดาวเคราะห์"
 decision_prospect_effects_short:0 "เพิ่ม §Yคุณลักษณะของดาวเคราะห์§! แบบสุ่มให้กับดาวดวงนี้"
 decision_prospect_desc:0 "การสำรวจและค้นหาแร่อย่างละเอียดบนดาวเคราะห์ดวงนี้จะช่วยให้เราค้นพบทรัพยากรธรรมชาติที่อาจรอดพ้นสายตาเราไปได้"

 decision_expand_preserves: "ขยายพื้นที่อนุรักษ์ธรรมชาติ"
 decision_expand_preserves_short: "เพิ่มสิ่งกีดขวาง §Yเขตอนุรักษ์ธรรมชาติ§! ให้กับดาวเคราะห์"
 decision_expand_preserves_desc: "ด้วยการวางแผนและแนวทางที่ยอดเยี่ยม ดาวเคราะห์ดวงนี้สามารถทำหน้าที่เป็นเขตรักษาพันธุ์สัตว์ป่าที่แท้จริงสำหรับระบบนิเวศทั้งหมดได้"

 decision_resort_colony:0 "สร้างดาวรีสอร์ต (ที่พักตากอากาศ)"
 decision_resort_colony_desc:1 "เราสามารถเปลี่ยนโลกใบนี้ให้เป็นเครือข่ายรีสอร์ตขนาดใหญ่ที่ครอบคลุมทั่วทั้งดวงดาว ซึ่งเป็นเครื่องพิสูจน์ถึงความหรูหราและการพักผ่อนหย่อนใจในระดับดาราจักร การก่อสร้างบนพื้นผิวต้องถูกจำกัดอย่างเข้มงวดเพื่ออนุรักษ์ความงามตามธรรมชาติของดาวเคราะห์ดวงนี้"
