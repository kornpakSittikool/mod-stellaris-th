 mega.200.name:0 "§Hดาวอภิมหานคร§!: [Root.GetName] ถูกครอบคลุมทั้งหมด"
 mega.200.desc:0 "ชั้น บน ชั้น ต่าง ๆ ของ สุริยุปราคา กลาง เมือง เปลือก โลก และ ทํา กัน.\n\nสองปีผ่านไป ตั้งแต่เริ่มโครงการยิ่งใหญ่นี้ แต่มันยากที่จะจดจํา[Root.GetName]เหมือน เวอร์แดนท์? หยาบคาย? มันเป็นเหล็กทั้งหมดในขณะนี้ไมล์ในทุกทิศทาง\n\nสถาน ที่ ซึ่ง ครั้ง หนึ่ง เคย ถูก นวด ปั้น โดย บังเอิญ และ กฎ ธรรมชาติ ที่ ปราศจาก ความ คิด ปัจจุบัน มี การ ออก แบบ จาก วัตถุ ประสงค์ ที่ ไม่ มี วัน ล้ม เหลว."
 mega.200.a:0 "น่าประทับใจมาก"

 criminal_underworld: "ดาวมิจฉาชีพอาชญากรรม"
 criminal_underworld_desc: "โลกแห่งนี้เป็นถิ่นอาศัยของอาชญากรขนาดใหญ่"
 criminal_underworld_experimenters: "$criminal_underworld$"
 criminal_underworld_experimenters_desc: "$criminal_underworld_desc$"
 unemployment_benefits:0 "ให้ผลประโยชน์เพิ่มขึ้น"
 unemployment_benefits_desc:0 "ผล ประโยชน์ สําหรับ คน ว่าง งาน ได้ เพิ่ม ขึ้น ชั่ว คราว ใน โลก นี้."
 activity_program:0 "โปรแกรมกิจกรรม"
 activity_program_desc:0 "มีการดำเนินโปรแกรมกิจกรรมที่มีค่าใช้จ่ายสูงบนโลกนี้เพื่อป้องกันไม่ให้โดรนที่ว่างงานและอยู่นิ่งเฉยกลายเป็นพวกเบี่ยงเบนผิดปกติ"
 standby_mode:0 "โหมดสแตนด์บาย"
 standby_mode_desc:0 "ยูนิตโดรนที่ว่างงานและอยู่นิ่งเฉยทั้งหมดบนโลกนี้ได้ถูกกำหนดให้อยู่ในโหมดสแตนด์บายเพื่อป้องกันไม่ให้พวกมันพัฒนาโปรแกรมที่เสียหายและเบี่ยงเบนผิดปกติ ซึ่งเพิ่มค่าบำรุงรักษาของพวกมัน"
 drone_deviancy: "โดรนเบี่ยงเบนผิดปกติ"
 drone_deviancy_desc: "โลกแห่งนี้เป็นถิ่นอาศัยของชุมชนขนาดใหญ่ ของหุ่นยนต์ผิดปกติ ที่ไม่ตอบสนอง คําสั่งจากจิตรังผึ้ง"
 drone_deviancy_experimenters: "$drone_deviancy$"
 drone_deviancy_experimenters_desc: "$drone_deviancy_desc$"
 drone_corruption:0 "โดรนไม่ซื่อสัตย์"
 drone_corruption_desc:0 "โลกแห่งนี้เป็นที่อยู่ของเครือข่ายยูนิตโดรนที่เบี่ยงเบนและเสียหายหลายเครือข่าย ซึ่งปฏิบัติงานอยู่นอกเหนือค่าพารามิเตอร์ที่กำหนดไว้โดยหน่วยปัญญาประดิษฐ์แกนหลัก"
 gang_wars: "แก๊งสงคราม"
 gang_wars_desc: "ปัจจุบัน โลก นี้ กําลัง อยู่ ใน ระหว่าง สงคราม แก๊ง ที่ ก่อ ความ เสีย หาย อย่าง หนัก ระหว่าง สอง ฝ่าย ที่ เป็น องค์การ อาชญากรรม. มี การ สู้ รบ กัน อย่าง รุนแรง ระหว่าง แก๊ง คู่ แข่ง ซึ่ง มี หน่วย รักษา ความ ปลอด ภัย ใน ท้อง ถิ่น ติด อยู่ ตรง กลาง."
 gang_wars_experimenters: "$gang_wars$"
 gang_wars_experimenters_desc: "$gang_wars_desc$"
 center_of_drug_trade: "ศูนย์กลางการค้ายา"
 center_of_drug_trade_desc: "โลก นี้ ได้ กลาย เป็น ศูนย์กลาง สําคัญ ของ การ ค้า ยา เสพย์ ติด. การ ค้า ยา เสพย์ ติด กําลัง ถูก ลักลอบ นํา เข้า ดาว เคราะห์ ทุก วัน โดย มี ประชาชน ส่วน ใหญ่ เป็น ผู้ ใช้ ทั่ว ไป."
 center_of_drug_trade_experimenters: "$center_of_drug_trade$"
 center_of_drug_trade_experimenters_desc: "$center_of_drug_trade_desc$"
 mob_rule: "กฎหมู่"
 mob_rule_desc: "ปัจจุบัน โลก นี้ ถูก ครอบ งํา โดย องค์การ อาชญากร เดียว. พวกเขาแทรกซึมอยู่ในทุกๆชั้นของสังคม และเล็กๆ เกิดขึ้นที่นี่โดยไม่เกี่ยวข้องหรือได้รับอนุญาต"
 mob_rule_experimenters: "$mob_rule$"
 mob_rule_experimenters_desc: "$mob_rule_desc$"
 smuggler_port:0 "ท่าเรือขนของเถื่อน"
 smuggler_port_desc:0 "โลกแห่งนี้ถือเป็นท่าเรือขนของเถื่อนที่สำคัญ และสินค้าผิดกฎหมายส่วนใหญ่ที่มีการซื้อขายในส่วนนี้ของกาแล็กซีก็มักจะผ่านทางนี้ ณ จุดใดจุดหนึ่ง"
 crime_pirates:0 "การโจรสลัดเพิ่มขึ้น"
 crime_pirates_desc:0 "กลุ่มอาชญากรที่ทรงอิทธิพลบนโลกใบหนึ่งของเราได้ขยายอิทธิพลของพวกเขาออกสู่อวกาศ ส่งผลให้การโจรสลัดเพิ่มขึ้นชั่วคราว"
 bribed_officials:0 "เจ้าหน้าที่ติดสินบน"
 bribed_officials_desc:0 "เจ้าหน้าที่ระดับสูงหลายคนบนโลกนี้เพิ่งถูกค้นพบว่าได้รับเงินสินบนจากองค์กรอาชญากรรมในท้องถิ่น"
 substance_abuse:0 "เสพยา"
 substance_abuse_desc:0 "การใช้ยาเสพติดที่อันตรายและเสพติดสูงอย่างผิดกฎหมายนั้นแพร่หลายบนโลกใบนี้"
 smuggler_activity:0 "กิจกรรมของการลักลอบ"
 smuggler_activity_desc:0 "การเพิ่มขึ้นของกิจกรรมการลักลอบนำเข้าบนโลกนี้ได้ส่งผลกระทบเชิงลบต่อกำไรจากการค้า"
 crime_wave:0 "คลื่นอาชญากรรม"
 crime_wave_desc:0 "โลกนี้กำลังเผชิญกับคลื่นอาชญากรรมอยู่ในขณะนี้"
 travel_advisory:0 "คำแนะนำการเดินทาง"
 travel_advisory_desc:0 "สงครามแก๊งที่รุนแรงบนโลกใบนี้ส่งผลให้เกิดคำแนะนำด้านการเดินทาง ซึ่งทำให้จำนวนพ่อค้าที่มาเยือนลดลงอย่างมาก"
 cartel_war:0 "สงครามยาเสพติด"
 cartel_war_desc:0 "กลุ่มคาร์เตลยาเสพติดที่ทรงอิทธิพลซึ่งได้แบ่งสรรโลกใบนี้ระหว่างกัน กำลังทำสงครามที่มีความรุนแรงต่ำอยู่ในขณะนี้"
 protection_racket:0 "ค่าคุ้มครอง"
 protection_racket_desc:0 "พวกนักเลงที่ปกครองโลกนี้ได้เริ่มการขู่กรรโชกเก็บค่าคุ้มครองอย่างกว้างขวาง"
 corrupt_administration:0 "การบริหารที่ทุจริต"
 corrupt_administration_desc:0 "ส่วนใหญ่ของการบริหารดาวเคราะห์บนโลกนี้เพิ่งถูกเปิดเผยว่าอยู่ภายใต้การจ้างวานของสมาคมอาชญากรรมที่มีอิทธิพลหลัก"
 trade_pilfering:0 "การขโมยสินค้า"
 trade_pilfering_desc:0 "สมาคมแก๊งสเตอร์ที่ปกครองโลกนี้ได้เข้าควบคุมท่าอวกาศยานหลายแห่งผ่านทางตัวแทน ส่งผลให้การค้าในท้องถิ่นส่วนใหญ่จำเป็นต้องผ่านพวกเขาในขณะนี้"
 crime_boss_arrested:0 "จับบอสอาชญากร"
 crime_boss_arrested_desc:0 "บอสอาชญากรคนสำคัญเพิ่งถูกจับกุมบนโลกนี้ ส่งผลให้องค์กรอาชญากรรมรายใหญ่ต้องหยุดชะงักลง"
 leader_trait_righteous:0 "ยุติธรรม"
 leader_trait_righteous_desc:1 "ผู้นำคนนี้มีความเชื่อมั่นอย่างแรงกล้าเกี่ยวกับกฎหมายและความเป็นระเบียบเรียบร้อย"
 leader_trait_corrupt:0 "ทุจริต"
 leader_trait_corrupt_desc:1 "ผู้นำคนนี้ยินดีที่จะบิดเบือนกฎหมายเพื่อผลประโยชน์ส่วนตน"
 leader.corrupt:0 "ข่าวลือและเสียงซุบซิบเกี่ยวกับความเชื่อมโยงที่เป็นไปได้กับองค์กรอาชญากรรมได้รายล้อม §H[From.From.GetTitle] [From.From.GetName]§! มาระยะหนึ่งแล้ว แม้ว่า [From.From.GetTitle] จะปฏิเสธข้อกล่าวหาเหล่านี้ว่าเป็นเพียงการใส่ร้ายป้ายสีที่มีเจตนาร้ายจากคู่แข่งทางการเมือง แต่หลักฐานล่าสุดบ่งชี้ว่ามันอาจจะมีอะไรมากกว่านั้น..."
 leader.righteous:0 "§H[From.From.GetTitle] [From.From.GetName]§! ได้รับชื่อเสียงอย่างสมเกียรติในฐานะนักปราบปรามอาชญากรรม [From.From.GetSheHeCap] [From.From.GetHasHave] ปฏิญาณต่อสาธารณชนว่าจะถอนรากถอนโคนการทุจริตและความไม่ยุติธรรมในทุกหนทุกแห่งที่มันปรากฏ"
 decision_launch_anticrime_campaign:0 "เริ่มรณรงค์ต่อต้านอาชญากรรม"
 decision_launch_anticrime_campaign_desc:0 "เริ่มการรณรงค์ป้องกันอาชญากรรมอย่างกว้างขวาง ซึ่งจะมอบทรัพยากรเพิ่มเติมให้แก่ผู้คุมกฎของเราเพื่อต่อสู้กับระดับอาชญากรรมที่เพิ่มสูงขึ้น"
 decision_negotiate_with_crime_lords:0 "เจรจากับหัวหน้าแก๊งอาชญากร"
 decision_negotiate_with_crime_lords_desc:0 "แอบเจรจาข้อตกลงกับผู้นำอาชญากรที่มีชื่อเสียงของดาวเคราะห์ โดยพวกเขาตกลงที่จะควบคุมองค์กรของตนให้อยู่ในขอบเขตบางส่วนเพื่อแลกกับการยอมผ่อนปรนต่าง ๆ"
 decision_end_crime_lord_deal:0 "ยุติข้อตกลงกับผู้นำอาชญากร"
 decision_end_crime_lord_deal_desc:0 "ยุติข้อตกลงที่ดำเนินอยู่กับกลุ่มอาชญากรชั้นนำบนดาวเคราะห์ดวงนี้ ซึ่งจะก่อให้เกิดความปั่นป่วนอย่างมากบนดาวเคราะห์ระยะหนึ่ง"
 decision_end_anticrime_campaign:0 "ยุติการรณรงค์ต่อต้านอาชญากรรม"
 decision_end_anticrime_campaign_desc:0 "ยุติการรณรงค์ป้องกันอาชญากรรมที่ดำเนินอยู่"
 anticrime_campaign:0 "รงค์ต่อต้านอาชญากรรม"
 anticrime_campaign_desc:0 "ผู้คุมกฎบนโลกนี้กำลังดำเนินโครงการรณรงค์ป้องกันอาชญากรรมอย่างกว้างขวางในขณะนี้"
 anticrime_campaign_tooltip:4 "การลดอาชญากรรมของผู้คุมกฎ: §G+10§!"
 crime_lord_deal:0 "ตกลงกับผู้นำอาชญากร"
 crime_lord_deal_desc:0 "ตอนนี้หน่วยงานทางกฎหมายของโลกใบนี้มี\"ความเข้าใจตามความเป็นจริง\" กับขุนนางอาชญากรรมชั้นนํา เพื่อป้องกันความฟุ่มเฟือยที่เลวร้ายที่สุดขององค์กรของพวกเขา"
 crime_lord_deal_broken:0 "แตกหักกับผู้นำอาชญากร"
 crime_lord_deal_broken_desc:0 "เจ้าหน้าที่บนโลกนี้ได้ทำลายข้อตกลงกับผู้นำอาชญากรชั้นนำ ส่งผลให้โลกใต้ดินและกองกำลังบังคับใช้กฎหมายตกอยู่ในความโกลาหล"
 deviant_interference:0 "แทรกแซงการเบี่ยงเบน"
 deviant_interference_desc:0 "โดรนที่เบี่ยงเบนกำลังแทรกแซงสิ่งอำนวยความสะดวกของเราบนโลกนี้"
 drone_signal_interference:0 "สัญญาณรบกวนโดรน"
 drone_signal_interference_desc:0 "สัญญาณจากเครือข่ายโดรนที่ทุจริตบนโลกนี้กำลังแทรกแซงการทำงานของหน่วยที่ภักดีของเรา"
 ringleader_killed:0 "ฆ่าหัวโจกที่เบี่ยงเบน"
 ringleader_killed_desc:0 "หัวโจกคนสำคัญในหมู่โดรนที่เบี่ยงเบนบนโลกนี้เพิ่งจะถูกกำจัดไปเมื่อไม่นานมานี้"
 corrupt_network_terminated:0 "ยุติเครือข่ายทุจริต"
 corrupt_network_terminated_desc:0 "ไวรัสตัวหนึ่งเพิ่งจะยุติหนึ่งในเครือข่ายโดรนที่ทุจริตบนโลกนี้"
 mod_planet_pops_unemployed_consumer_goods_upkeep_mult:0 "$consumer_goods_with_icon$ ค่าบำรุงรักษาของ £pop£ ประชากรว่างงาน"
