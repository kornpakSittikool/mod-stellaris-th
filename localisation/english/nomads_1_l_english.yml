 CONTRACT_SUNTRIP_crew_2_PROJECT_DESC: ""

 contract_suntrip_crew_3: "เดอะชราวด์"
 contract_suntrip_crew_3_desc: "ระบบความเย็นต้องการ วัฏจักร ที่ ขจัด ออก ไป อย่าง เต็ม ที่ ภาย ใต้ การ บรรจุ ความ ร้อน. วงโคจรของดาวฤกษ์ จะช่วยให้เรากดสายได้อย่างมีประสิทธิภาพ แม้ว่าอุณหภูมิชั้นนอกจะฟลุต"
 contract_suntrip_crew_3_lore_issued: "[GetSuntripCrewLoreIssued3]"
 contract_suntrip_crew_3_regular_lore_issued: "§Lดาดฟ้าพาร์เซนเจอร์จะอุ่นขึ้น งั้นก็หนาว แล้วอุ่นอีกครั้ง เราแค่บอกพวกเขาว่ามันเป็นส่วนหนึ่งของข้อตกลง\"§!"
 contract_suntrip_crew_3_gestalt_lore_issued: "§L\"ความผันผวนของธรรมชาติ บนดาดฟ้าผู้โดยสารที่คาดการณ์ไว้ หากถูกรบกวน ผู้โดยสารจะถูกบอกว่า เป็นส่วนหนึ่งของข้อตกลง\"§!"
 contract_suntrip_crew_3_lore_completed: "§L\"ความดันแรงสูงระบุตลอดทุกวงจร การร้องเรียนอุณหภูมิควรจะหยุดในประมาณหนึ่งชั่วโมง.\"§!"
 contract_suntrip_crew_3_lore_failed: "[GetSuntripCrewLoreFailed3]"
 contract_suntrip_crew_3_regular_lore_failed: "§L\"เลื่อนเวลาออกไป เราหวังว่าไม่มีใครสังเกตเห็น การผูกพันธ์ที่เกิดขึ้นบนเพดานของห้องเต้นรํา.\"§!"
 contract_suntrip_crew_3_gestalt_lore_failed: "§L\"เลื่อนเวลาออกไป ความหนาแน่นก่อตัวบนเพดานห้องบอลรูม ยากที่จะดึงดูดความสนใจผู้โดยสาร.\"§!"
