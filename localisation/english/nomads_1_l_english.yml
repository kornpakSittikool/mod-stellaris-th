 arkship.1300.name: "การ คํานวณ ที่ จําเป็น"
 arkship.1300.desc: "คณะวิศวกรรมอาวุโส บนยานอาร์คชิป§Y[Root.GetName]§!ได้ส่งการประเมินโครงสร้าง ที่ไม่สามารถเลื่อนได้ บ้าน ของ เรา จําเป็น ต้อง ซ่อมแซม อย่าง ยิ่ง.\n\nข้อเสนอนี้ครอบคลุมแล้ว : การหมุนส่วนต่อส่วนโอเวอร์ฮอลโดยเริ่มจากโครงสร้างพื้นฐานแบบอํานาจ ผู้อยู่อาศัยจะต้องถูกย้ายที่อยู่ชั่วคราว สภาพแวดล้อมจะถูกตัด วิศวกรรม กะ ประมาณ ว่า ช่วง เวลา ประมาณ สิบ ถึง สิบ ปี มาตรฐาน ขึ้น อยู่ กับ อัตรา การ ทํา งาน.\n\nงานนี้จะวุ่นวาย แต่ทางเลือกคือ ภาชนะที่ยิ่งน่าไว้ใจน้อยลง กับทุกการวิเคราะห์"
 arkship.1300.desc.machine: "ตัวแบ่งประเภทย่อยวินิจฉัยบน§Y[Root.GetName]§!ได้ระบุจุดวิกฤตของโครงสร้างพื้นฐาน ยานอาร์คชิปต้องซ่อม\n\nโปรโตคอลนําไฟฟ้า สั่งให้หมุนตัวเตอร์ไป ส่วนการเพาะปลูก โครงสร้างพื้นฐานการป้องกัน และพื้นที่ที่อยู่อาศัย แต่ละส่วนจะถูกตัดต่อตามลําดับ การดําเนินงานจะเสื่อมสภาพระหว่างกระบวนการ เวลาทําให้สมบูรณ์โดยประมาณ ประมาณ 100-30 เดือน ตามจังหวะการทํางานมาตรฐาน\n\nไม่สามารถเลื่อนการทํางานได้"
 arkship.1300.desc.hive: "กลุ่มผู้รวมกําลังทราบถึงการเสื่อมสลายของยานอาร์คชิป§Y[Root.GetName]§!โครงสร้างการแบกรับภาระ ยืดหยุ่นที่ไม่ควร หลอดเลือดดํา การละทิ้งการสะสมของรุ่นได้ถึงขีดสุด เราไม่สามารถรอได้\n\nเราต้องการวงจรการบูรณะที่สมบูรณ์ ทีละส่วน จากพลังงานภายนอก ผ่านห้องอาหาร ส่วนต่าง ๆ จะถูกปิด และผู้อยู่อาศัยก็จะพลัดถิ่นตามไปด้วย วัฏจักรของการบูรณะจะมีอายุไม่เกิน สิบถึงสิบเอ็ดปีมาตรฐาน"
 arkship.1300.a: "เริ่มตกแต่งใหม่"
 arkship.1300.a.machine: "เริ่มใช้โปรโตคอลควบคุม"
 arkship.1300.a.hive: "เดอะ[Root.GetName]ต้องได้รับการชําระคืน"
 refurbishment_ongoing: "การ ซ่อมแซม ใหญ่:"
 refurbishment_ongoing_desc: "เรือลํานี้กําลังปรับปรุงโครงสร้าง กิจกรรมการก่อสร้างข้ามพื้นที่หลายส่วน ส่งผลให้เกิดการรบกวนของเรือ ในความเสถียรและการก่อสร้างอําเภอ"
 refurbishment_generator_offline: "$district_ark_generator$– ภายใต้การเปลี่ยนชื่อ"
 refurbishment_generator_offline_desc: ""

 arkship.1305.name: "โครง สร้าง การ เพาะ ปลูก"
 arkship.1305.desc: "โครงสร้างพื้นฐานของพลังงาน ได้รับการรับรอง และนํากลับมาสู่ผลลัพธ์เต็มรูปแบบ ลูกเรือก่อสร้างได้ย้ายอุปกรณ์ ลงไปถึงระดับการเกษตรที่ต่ํากว่า\n\nดาดฟ้าไม้จะดําเนินการส่วนตัดต่อส่วน ไม่ เพียง แต่ อุปสรรค ด้าน โครง สร้าง เท่า นั้น แต่ ยัง เป็น ข้อ ท้าทาย อีก ด้วย: ร้าน อาหาร จะ ต้อง มี การ จัด การ อย่าง รอบคอบ และ ซาก ปรัก หัก พัง ของ การ ก่อ สร้าง จะ คง อยู่ ใน พื้น ที่ ทั่ว ไป เป็น เวลา หลาย เดือน.\n\nพวก วิศวกร บอก ว่า ส่วน ที่ ยาก ที่ สุด ไม่ ใช่ การ ตัด ไม้. มันคือการรอคอย"
 arkship.1305.desc.machine: "การนําพลังงานกลับมาใช้อีกครั้ง ได้รับการรับรองให้ส่งออกอย่างสมบูรณ์ และระบุผลที่ออกมาอีกครั้ง ขอบเขตปฏิบัติการตอนนี้โอนไปยังโครงสร้างพื้นฐานภาครอง\n\nพื้นที่ที่ออกแบบไว้แล้วจะถูกถอดออกจากตําแหน่ง โดยเป็นลําดับสําหรับโครงสร้างที่มากเกินไป ผลลัพธ์ดําเนินการในภาคที่ได้รับผลกระทบจะลดลง สัดส่วนระหว่างกระบวนการ\n\nการฟื้นฟูยังคงเกิดขึ้นในพารามิเตอร์"
 arkship.1305.desc.hive: "คนรุ่นพลังงานกลับมาอีกครั้งที่ผลกระทบเต็มรูปแบบ\n\nความ สนใจ ของ เรา เปลี่ยน ไป ใน ห้อง เลี้ยง อาหาร ขนาด ใหญ่ ซึ่ง ค้ําจุน อาณานิคม. การเพาะปลูกของถังและอวัยวะที่ประกอบขึ้นด้วยสารสนเทศของเรือ ต้องถูกตัดต่อตามลําดับการซ่อมแซมโครงสร้าง มี การ เตรียม ร้าน อาหาร เพื่อ ป้องกัน ความ บกพร่อง.\n\nอาณานิคมจะกินอาหารสํารอง ในขณะที่กระเพาะของมันถูกสร้างขึ้นใหม่"
 arkship.1305.a: "การรบกวนจําเป็น"
 arkship.1305.a.machine: "ดําเนินการตามกําหนดการต่อไป"
 arkship.1305.a.hive: "วัฏจักร แห่ง การ ฟื้นฟู ดําเนิน ต่อ ไป."
 arkship.1305.a.tt: "ลบผลกระทบเชิงลบใดๆ ที่เกิดขึ้นในช่วงก่อนของการตกแต่งใหม่\n\n"
