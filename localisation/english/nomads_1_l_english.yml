 MESSAGE_ARCHAEOLOGY_STAGE_FINISHED_NOMAD_NO_PERMISSION_TITLE: "การ ขับ ไล่"
 MESSAGE_ARCHAEOLOGY_STAGE_FINISHED_NOMAD_NO_PERMISSION_OWNER_DESC: "เดอะ§Y[owner.GetName]§!ชาว นอร์เวย์ ปล้น สถาน ที่ ทาง โบราณคดี ไป[solar_system.GetName]!"
 MESSAGE_ARCHAEOLOGY_STAGE_FINISHED_NOMAD_NO_PERMISSION_DESC: "การ ขุด ค้น ทาง โบราณคดี ของ เรา ซึ่ง ยัง ไม่ ได้ ทํา ให้ เกิด ความ เสีย หาย§Y[solar_system.owner.GetName]§!."
 MESSAGE_ARCHAEOLOGY_STAGE_FINISHED_NOMAD_PERMISSION_TITLE: "การ ร่วม มือ กับ นัก โบราณคดี"
 MESSAGE_ARCHAEOLOGY_STAGE_FINISHED_NOMAD_PERMISSION_OWNER_DESC: "เดอะ§Y[owner.GetName]§!ชาว นอร์เวย์ ได้ ขุด พบ สถาน ที่ ทาง โบราณคดี ใน[solar_system.GetName]และส่งวัตถุและข้อมูลการวิจัยมาให้เรา"
 MESSAGE_ASTRAL_RIFT_STAGE_FINISHED_NOMAD_PERMISSION: "หุ้นส่วนของแอสตรัล"
 MESSAGE_ASTRAL_RIFT_STAGE_FINISHED_NOMAD_PERMISSION_TITLE: "เดอะ§Y[owner.GetName]§!ผู้ลี้ภัยได้สํารวจ$ASTRAL_RIFT$ใน[fromfrom.solar_system.GetName]และส่งข้อมูลการวิจัยและเส้นสาย"

 policy_nomad_total_war: "พฤติกรรมสงครามรวม"
 policy_nomad_total_war_desc: "เรา ไม่ ได้ ควบคุม ดาว เคราะห์ แต่ บาง ที อาจ มี เรื่อง หนึ่ง ที่ อาจ ตก อยู่ ใน อันตราย ได้.\n"
 nomad_total_war_subject: "แก้ไขโครงการหลัก..."
 nomad_total_war_subject_name: "สร้าง เรื่อง ขึ้น อย่าง ถาวร"
 nomad_total_war_subject_desc: "การ พิชิต ดิน แดน ใหม่ ควร ได้ รับ การ ปกครอง โดย ผู้ ที่ ภักดี ต่อ เรา.\n\n§Eสร้าง เรื่อง ขึ้น อย่าง อัตโนมัติ เมื่อ ดาว เคราะห์ อยู่ ใน สงคราม ครบ ชุด§!"
 nomad_total_war_displace: "ย้ายที่"
 nomad_total_war_displace_name: "ดาว เคราะห์ ต่าง ๆ"
 nomad_total_war_displace_desc: "แต่ดาวเคราะห์ใกล้เรา ควรจะถูกย้ายออกไป\n\n§Eสร้างเรื่องชั่วคราวให้โดยอัตโนมัติประชากรเมื่อเสร็จแล้วพวกเขาจะยุบ§!"
 nomad_total_war_purge: "กําจัด"
 nomad_total_war_purge_name: "การ กําจัด ดาว เคราะห์"
 nomad_total_war_purge_desc: "ดาวเคราะห์มีข้อบกพร่องดังนั้น ให้เรากําจัดมันออกจากกาแล็กซี่\n\n§Eสร้างกลุ่มข่าวชั่วคราวที่จะทําการกําจัดประชากรเมื่อเสร็จสิ้นพวกเขาจะยุบและโอนทรัพยากรสะสม§!"

 origin_nomadic_purger: "เครื่อง กําจัด ดาว เคราะห์"
 origin_nomadic_purger_desc: "รัฐบาล เร่ร่อน ชั่ว คราว ที่ ดู แล โลก ขณะ ที่ พวก เขา ถูก กวาด ล้าง ชีวิต บน ดาว เคราะห์."
 origin_tooltip_nomadic_purger_effects: "§Yจักรวรรดิชั่วคราวที่ดึงทรัพยากรทั้งหมดของพวกเขา จากการชําระคืนให้เจ้านายของพวกเขา§!"
 preset_nomadic_purger: "$origin_nomadic_purger$"
 preset_nomadic_purger_desc: "$origin_nomadic_purger_desc$"
 preset_nomad_tributary: "$preset_tributary$"
 preset_nomad_tributary_desc: "$preset_tributary_desc$"
 preset_nomad_tributary_flavor_desc: "$preset_tributary_flavor_desc$"
 is_a_purging_subject: "$TRIGGER_FAIL$§Rนี่เป็นเส้นเลือดอุดตันชั่วคราว ซึ่งจะยุบในเร็วๆนี้§!"

 effect_every_issued_mission: "ภารกิจ ที่ ออก มา"
 requires_tech_arkship_tier_2: "$TRIGGER_FAIL$§Rต้องการ§Y$tech_arkship_tier_2$§!เทคโนโลยี§!"

