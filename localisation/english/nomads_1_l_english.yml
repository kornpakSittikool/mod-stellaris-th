 MESSAGE_NOMAD_EXPLORATION_TITLE: "การ สํารวจ แบบ นอร์เวย์"
 NOMAD_EXPLORATION_WONDERS_DESC: "เดอะ$SYSTEM|Y$ระบบ มี สิ่ง ที่ น่า ทึ่ง§Yความ มหัศจรรย์ โบราณ§!.\nเป็นภาพที่สร้างแรงบันดาลใจ\n\nได้รับ§Gเล็ก§!รางวัล§Yเอกภาพ§!."
 NOMAD_EXPLORATION_THREAT_DESC: "เดอะ$SYSTEM|Y$ระบบมีอันตราย§Yการ คุกคาม อย่าง รุนแรง§!.\nเราต้องระวังที่นี่\n\nได้รับ§Gเล็ก§!รางวัล§Yเอกภาพ§!."
 NOMAD_EXPLORATION_ENCLAVE_DESC: "เดอะ$SYSTEM|Y$ระบบ มี สิ่ง ที่ น่า ทึ่ง§Yเพิ่มระยะเวลา...§!.\nพวกเขาอาจจะยินดีจะสื่อสาร\n\nได้รับ§Gเล็ก§!รางวัล§Yเอกภาพ§!."
 NOMAD_EXPLORATION_LANDMARK_DESC: "เดอะ$SYSTEM|Y$ระบบ มี สิ่ง ที่ น่า ทึ่ง§Yเครื่องหมาย บน แผ่น ดิน เหนียว§!.\nมันเป็นภาพที่วิเศษ\n\nได้รับ§Gเล็ก§!รางวัล§Yเอกภาพ§!."
 NOMAD_EXPLORATION_MARAUDERS_DESC: "เดอะ$SYSTEM|Y$ระบบเป็นของภูมิใจ§Yมาโรเดอร์§!.\nเราควรจะเดินอย่างระมัดระวัง\n\nได้รับ§Gเล็ก§!รางวัล§Yเอกภาพ§!."
 NOMAD_EXPLORATION_SPECTACLE_DESC: "เดอะ$SYSTEM|Y$ระบบเป็นสิ่งที่โดดเด่น§Yปรากฏการณ์ ธรรมชาติ§!.\nความ งาม ของ มัน เทียบ ไม่ ได้ เลย.\n\nได้รับ§Gเล็ก§!รางวัล§Yเอกภาพ§!."
 NOMAD_EXPLORATION_PRECURSOR_DESC: "เดอะ$SYSTEM|Y$ระบบมีร่องรอยของโบราณ§Yฟอร์รันเนอร์§!.\nร่องรอยเหล่านี้สร้างแรงบันดาลใจ\n\nได้รับ§Gเล็ก§!รางวัล§Yเอกภาพ§!."
 NOMAD_EXPLORATION_ECOLOGY_DESC: "เดอะ$SYSTEM|Y$ระบบมีบทบาทที่น่าสนใจ§Yจุลชีพ อวกาศ§!.\nเรามีหลายอย่างที่ต้องเรียนรู้จากที่นี่\n\nได้รับ§Gเล็ก§!รางวัล§Yเอกภาพ§!."

 nomads.4715.name: "ภาพ ที่ มอง เห็น"
 nomads.4715.desc: "หนึ่งในรางวัลที่ยิ่งใหญ่ที่สุดสําหรับการท่องเที่ยว และการท่องเที่ยวอย่างไม่หยุดหย่อนของเรา คือการค้นพบสถานที่ใหม่ แม้ หลัง จาก เดิน ทาง มา นาน แล้ว ก็ ยัง คง มอง ไม่ เห็น, สวย งาม, หรือ น่า สยดสยอง. ความ อยาก รู้ อยาก เห็น ที่ เรา อยาก รู้ อยาก เห็น.\n\nแต่กว่าสิ่งแปลก ๆ สําหรับเรือของเราที่จะดู วิสต้าใหม่แต่ละ โอกาสที่จะเรียนรู้บางสิ่งบางอย่างใหม่ สะท้อนและเติบโต"
 nomads.4715.a: "กาแล็คซี่มีขนาดใหญ่ และเต็มไปด้วยสิ่งมหัศจรรย์"
 nomads.4715.b: "กาแล็คซี่นั้นกว้างใหญ่และเต็มไปด้วยความหวาดกลัว"

 leviathans.500.l: "คุณช่วยชี้ทางให้เรา§Yระบบที่น่าสนใจ§!?"
 leviathans.500.l.tt: "นี่จะสร้าง§Yจุด สนใจ§!ระบบที่เรายังไม่ได้ไปเยี่ยม§Yการ สํารวจ แบบ นอร์เวย์§!ห่วงโซ่เหตุการณ์"
 leviathans.500.l.opinion: "$leviathans.500.d.opinion$"
 leviathans.500.l.cooldown: "เราได้ปรึกษากับผู้ดูแลเรื่องคําแนะนํา เราต้องรอก่อนที่จะขอความช่วยเหลือจากพวกเขาอีกครั้ง"
 leviathans.500.l.desc: "แน่นอน! ตาราง เวลา ของ เรา บ่ง ชี้ ว่า คุณ อาจ สนใจ ระบบ นี้. คุณจะกรุณา ส่งการค้นพบกลับมาให้เราได้ไหม"
 curator_guidance_poi_name: "การนําทางตัวรักษา"
 curator_guidance_poi_desc: "ผู้รักษาการได้ชี้เรา ไปยังระบบที่คุ้มค่าการสํารวจ"
