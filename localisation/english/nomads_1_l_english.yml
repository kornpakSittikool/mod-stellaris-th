 cfl_fleet_size_small_early: "25"

 nomads.270.name: "แชมป์เริ่ม"
 nomads.270.desc: "\"ลิตอยด์ ออร์แกนิกและสงครามใส่ถุงน่องยินดีต้อนรับกลับไปยังสถานที่เริ่มต้นของ CHAMMPMPE!\n\nเดอะ§Y[event_target:champions_forge_enclave_system.GetName]§!ระบบได้เคลียร์ การพนันก็ติดไฟ และผมรู้สึกว่าเรากําลังจะเห็น\n\nจําไว้ ทุกคนที่บ้าน นี่ไม่ใช่แค่การลาดตระเวน หรือการต่อสู้ในชายแดน นี่คือโรงเหล็ก! ไม่มีใครถอนกําลัง ด้วยความภูมิใจของพวกเขา\n\nผู้เข้าแข่งขัน... มัน!"

 nomads.285.desc.intro: "ในที่สุนทร§Y[event_target:champions_forge_enclave_system.GetName]§!ระบบ ส่วนโรงเหล็กมืด ความ ตื่น เต้น ขณะ ที่ สัญญาณ ฉุกเฉิน ติด อ่าง กลับ คืน สู่ ชีวิต อีก.\n\n\"สิ่งที่แว่นตา!\"ผู้วิจารณ์ CFL คําราม, เสียงดิบกับอารมณ์ที่ปราศจากการแก้ไข \"นั่นคือสิ่งที่เรามา! นั่นคือสิ่งที่กาแล็กซี่ปรับในการดู!\""

 nomads.285.name: "แชมป์ ฟอร์จ คอนคอร์ด"
 nomads.285.desc: "$nomads.285.desc.intro$\n\nที่ 3 ไม่ใช่ความอับอาย แต่เป็นการพิสูจน์ว่าเราสมควรออกอากาศ แม้ จะ อยู่ ใน ขั้น ต่ํา สุด ของ แท่น บูชา เรา ก็ สามารถ มอง ลง ไป ยัง กอง เรือ ที่ เรา ทํา แตก."
 nomads.285.a: "กองเรือของเราบินได้ดี!"

 nomads.290.name: "แชมป์ ฟอร์จ คอนคอร์ด"
 nomads.290.desc: "$nomads.285.desc.intro$\n\nสถานที่ที่สองรสชาติเช่นขี้เถ้า! เรายืดออกของเรา[Species.GetHandName]เพื่อคว้าถ้วยรางวัลไว้ ก็เพื่อที่จะเห็นมันถูกคนอื่นคว้าไป งั้นให้พวกเขาฉลองกัน เราจะจําไว้ และเมื่อโรงเหล็กโทรมาอีก เราจะไม่แพ้"
 nomads.290.a: "ถ้าเพียงแต่เราได้อัพเกรดกองเรือมากขึ้น"

 nomads.295.name: "แชมป์ ฟอร์จ คอนคอร์ด"
 nomads.295.desc: "$nomads.285.desc.intro$\n\nที่แรก! อาบน้ําในกาแล็กซีของ เราฉีกถ้วยรางวัลจากลูกเรือแฟ้ม CFL และยกมันสูง ชัยชนะนี้จะสะท้อนไกลเกินสนามประลอง\n\nตอนนี้กาแล็กซี่รู้ว่า จะกลัวกองเรือของเรา"
 nomads.295.a: "เคยสงสัยบ้างไหม?"

 nomads.305.name: "แชมป์ ฟอร์จ คอนคอร์ด"
 nomads.305.desc: "$nomads.285.desc.intro$\n\nเราไม่ได้ไป ถ้วยรางวัลจะไม่ดําเนินการชื่อของเรา และฝูงชนจะย้ายไปดาวสว่าง เราต้องกลับไป"
 nomads.305.a: "ใครจะไปสนใจเรื่องการแข่งขันที่ไร้ประโยชน์"

 nomads.405.desc: "การออกอากาศตัดเป็นสีดํา เป็นระเบิดของยานรบแฟ้ม CFL เราตรวจสอบซากปรักหักพังใน§Y[champions_forge_destruction_system.GetName]§!ระบบ และ สิ่ง ของ ต่าง ๆ ที่ อยู่ ใน โกดัง เก็บ ของ ของ พวก เขา.\n\nสุดท้าย\"พิเศษ\" เป็นกําไรสําหรับพวกเรา"
 nomads.405.desc.relic: "$nomads.405.desc$\n\nชื่อของเราจะเป็น คนสุดท้าย จารึกบนถ้วยรางวัล และด้วยคนโง่เหล่านั้นที่หายไป"

 nomads.410.desc: "ไม่กี่วินาที ที่กาแล็กซี่ถูกรักษาด้วยซีเอฟแอล ในการแสดงรอบสุดท้าย\n\nมีภาพเคลื่อนไหวกับผู้วิพากษ์วิจารณ์ที่กรีดร้อง ตามมาด้วยกําแพงเพลิงกลืนยานอาร์คชิป\n\nแล้วตัดเป็นสีดํา\n\nแชมป์ฟอร์จไลฟ์! เอนคเลฟถูกทําลายโดย§Y[champions_forge_destroyer.GetName]§!ใน§Y[champions_forge_destruction_system.GetName]§!ระบบ"
 nomads.410.desc.relic: "$nomads.410.desc$\n\nชื่อของเราจะเป็น รอบสุดท้ายจารึกบนถ้วยรางวัล และเมื่อแฟ้ม CFL หายไป จะไม่มีแชมป์ใหม่"
 nomads.410.a: "กาแลคซีจะค้นพบความบันเทิงใหม่ มันเป็นอย่างนั้นเสมอ"

