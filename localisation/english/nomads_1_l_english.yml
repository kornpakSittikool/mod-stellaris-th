 nomads.7005.title: "นัก เดิน เรือ และ ผู้ ตั้ง ถิ่น ฐาน"
 nomads.7005.desc: "§Y[event_target:migrating_arkship.GetName]§!ได้นอนในวงโคจรของ[event_target:migrating_planet.GetName]นานพอที่ลูกเรือและชาวบ้าน จะใช้มาตรการของอีกคนหนึ่ง กํามือจากแต่ละด้านในขณะนี้ขอให้สลับเบิรต : ชาวบ้านตั้งรกรากสําหรับว่างที่เปิด, เร่ร่อนวาดไปยังพื้นดินแข็งใต้เท้าของพวกเขา"
 nomads.7005.desc.forever_cruise: "§Y[event_target:migrating_arkship.GetName]§!ได้นอนในวงโคจรของ[event_target:migrating_planet.GetName]นานพอที่จะให้พวกฟาสซิสต์ตัดทั้งสองทาง ผู้ โดยสาร เพียง ไม่ กี่ คน ที่ กระสับ กระส่าย ระหว่าง ท่า เรือ ขอ ให้ ตั้ง ท่า พัก อาศัย เพื่อ ผล ดี; ข้าง ล่าง จะ มี คน ท้อง ถิ่น เข้า คิว ที่ โต๊ะ ทํา การ เย็บ เล่ม สําหรับ คน อื่น ๆ บน เรือ กระหาย ที่ จะ ชิม ความ มหัศจรรย์ ของ จุลสาร ที่ สัญญา ไว้."
 nomads.7005.desc.servitor: "และประชากรของ[event_target:migrating_planet.GetName]ได้เริ่มต้นการปกคลุมอย่างอ่อนโยน ข้ามเขตของเรือของเรา บาง คน ใน พวก เขา ขอ สถาน ศักดิ์สิทธิ์ บน เรือ§Y[event_target:migrating_arkship.GetName]§!บางส่วนของเราต้องการที่จะลิ้มรสท้องฟ้าเปิด บางที เราอาจจะทําให้สุขภาพดีสูงสุด โดยอนุญาตให้มีการอพยพ"
 nomads.7005.desc.same_species: "§Y[event_target:migrating_arkship.GetName]§!ได้นอนในวงโคจรของ[event_target:migrating_planet.GetName]นานพอที่จะให้ลูกเรือและชาวบ้าน ตระหนักถึงความสัมพันธ์ของพวกเขา กํามือจากแต่ละด้านในขณะนี้ขอให้สลับเบอร์ธ :ลูกพี่ลูกน้องปักหลักกระหายสําหรับช่องว่างที่เปิด, คนเร่ร่อนวาดไปยังพื้นดินแข็งในหมู่ครอบครัว"
 nomads.7005.a: "ให้พวกเขาลงชื่อ และต้อนรับผู้มาเยือนบนเรือ"
 nomads.7005.b: "อนุมัติแล้ว ครั้งนี้..."
 nomads.7005.c: "ลูกเรือไม่มีที่ในกองเรือของเรา"

