 sm_arkship_archaeo_hangar_bay: "$ARCHAEO_STRIKECRAFT$ที่แขวน"
 sm_arkship_archaeo_hangar_bay_desc: "คน ตาย ไม่ ได้ พัก ผ่อน. ยานจู่โจมจากอารยธรรมอันยาวนาน นํามาสู่ดวงดาวอีกครั้ง"
 sm_arkship_archaeo_hangar_bay_tt: "$ARKSHIP_COMPONENTS$\n$t$$ADDS_ARKSHIP_H_SLOTS$\n$t$โรงเก็บเครื่องบินที่อุทิศตัวเหล่านี้ จะติดตั้ง§Y$ARCHAEO_STRIKECRAFT$§!.\n"
 sm_arkship_psionic_hangar_bay: "เครื่อง ดับ เพลิง"
 sm_arkship_psionic_hangar_bay_desc: "อ่าวเกราะเปิดรับ การฟื้นฟูของอาวุธไซโซนิค เสียงฮัมก็ดังตลอดเวลา รู้สึกมากเท่าที่ได้ยิน"
 sm_arkship_psionic_hangar_bay_tt: "$ARKSHIP_COMPONENTS$\n$t$$ADDS_ARKSHIP_H_SLOTS$\n$t$โรงเก็บเครื่องบินที่อุทิศตัวเหล่านี้ จะติดตั้ง§Y$PSIONIC_STRIKE_CRAFT$§!.\n"
 sm_arkship_amoeba_hangar_bay: "$AMOEBA_STRIKE_CRAFT$ที่แขวน"
 sm_arkship_amoeba_hangar_bay_desc: "เบย์ถูกกดดันปรับตัว ให้เป็นที่พักสําหรับสหายของสเปซอะมีบาพวกเขาชอบส่วนที่อบอุ่น ใกล้เตาปฏิกรณ์มากกว่า"
 sm_arkship_amoeba_hangar_bay_tt: "$ARKSHIP_COMPONENTS$\n$t$$ADDS_ARKSHIP_H_SLOTS$\n$t$โรงเก็บเครื่องบินที่อุทิศตัวเหล่านี้ จะติดตั้ง§Y$AMOEBA_STRIKE_CRAFT$§!.\n"
 sm_arkship_swarm_hangar_bay: "$SWARM_STRIKE_CRAFT_1$ที่แขวน"
 sm_arkship_swarm_hangar_bay_desc: "เครื่องยิงระเบิดที่แรงกล้า ที่อยู่อาศัยหลายพันของหน่วยโจมตีอัตโนมัติ พร้อมที่จะฝูงเมื่อคําสั่ง"
 sm_arkship_swarm_hangar_bay_tt: "$ARKSHIP_COMPONENTS$\n$t$$ADDS_ARKSHIP_H_SLOTS$\n$t$โรงเก็บเครื่องบินที่อุทิศตัวเหล่านี้ จะติดตั้ง§Y$SWARM_STRIKE_CRAFT_1$§!.\n"

 sm_arkship_laser_battery: "แบตเตอรีเลเซอร์"
 sm_arkship_laser_battery_desc: "มี การ ใช้ เครื่อง ยิง เลเซอร์ กระจาย อยู่ ทั่ว ตัว เรือ โดย หมุน ผ่าน เป้า หมาย อย่าง แม่นยํา."
 sm_arkship_laser_battery_tt: "$ARKSHIP_COMPONENTS$\n$t$$ADDS_ARKSHIP_M_SLOTS$\n$t$ป้อมเหล่านี้จะติดตั้ง§Yเลเซอร์§!อัพเกรดเทคโนโลยีล่าสุดโดยอัตโนมัติ\n"
 sm_arkship_archaeo_laser_battery: "แบตเตอรีเร่งอนุภาคโบราณ"
 sm_arkship_archaeo_laser_battery_desc: "ค้นพบอาวุธของการออกแบบที่ไม่พึงประสงค์ ขณะ ที่ หลัก การ ปฏิบัติ การ ของ พวก เขา ยัง ไม่ เป็น ที่ เข้าใจ อย่าง ถ่องแท้ แต่ ความ ตาย ของ พวก เขา ไม่ เป็น ที่ สงสัย."
 sm_arkship_archaeo_laser_battery_tt: "$ARKSHIP_COMPONENTS$\n$t$$ADDS_ARKSHIP_M_SLOTS$\n$t$ป้อมเหล่านี้จะติดตั้ง§Y$ARCHAEO_LASER$§!.\n"
