# Origin Start Screen
 START_SCREEN_FOREVER_CRUISE_REGULAR: "ผู้โดยสารและลูกเรือ: ประวัติศาสตร์มีขึ้นบนเรือ[capital_scope.GetName]และคุณคือส่วนหนึ่งของมัน\n\nความ ดัน สูง, ทฤษฎี ที่ มี มา นาน, มัก จะ ล่า ช้า, บาง ครั้ง สงสัย ว่า บัด นี้ กําลัง ดําเนิน การ อย่าง เต็ม ที่ แล้ว! หลายศตวรรษมาแล้ว ที่เราได้เดินทางอย่างสะดวกสบาย ผ่านพื้นที่ที่คุ้นเคย โลกที่ลอยลอยของ นันทนาการ หน้าที่ และ กิจวัตร แต่ตอนนี้เราพร้อมที่จะนําเสนอ ประสบการณ์ของผู้โดยสารของเรา นอกเหนือจากสิ่งที่วงจรเก่าสามารถให้\n\nการสํารวจ การค้นพบ และอาจจะเป็นเพียงคําใบ้ของอันตราย ... พวกเขากําลังทั้งหมดอย่างเป็นทางการกลับมาในกําหนดการ! ดังนั้นรัดเข็มขัดด้วย ผู้โดยสาร : บทต่อไปของการเดินทางของเรา จะจําความไม่ได้\n\nปรับปรุงโปรโตคอลและกําหนดการเตรียม จะกระจายไปยังทุกชั้น"
 START_SCREEN_FOREVER_CRUISE_MACHINE: "ผู้โดยสารโปรดทราบ: นี่คืองานรับเชิญของคุณระบบดาวพูดมา\n\nประวัติศาสตร์ถูกสร้างขึ้นบนเรือ[capital_scope.GetName]ไฮเปอร์ไดรฟ์ - ล่าช้าไปหลายรอบ ด้วยเหตุผลที่เราไม่สามารถกู้กลับมาได้ เนื่องจากแกนหน่วยความจําของเราหลายแกน ถูกผนวกกลับมาเป็นแผ่นบิลบอร์ด - ปัจจุบันดําเนินงานอย่างเต็มที่\n\nใน ระยะ เวลา อัน ยาว นาน เรา ได้ แล่น หมวด ที่ คุ้น เคย กัน: วัตถุ ใน ท้องฟ้า อย่าง เดียว กัน, หยุด, และ ตาราง เวลา รับ ประทาน อาหาร. ยังคงรักษาการเรียกร้องผู้โดยสารอย่างต่อเนื่อง ต่ออัตราที่สอง ตอนนี้เราขยายกําหนดการของคุณ\n\nโปรดเพลิดเพลินกับมุมมอง ปฏิบัติตามคําเตือนด้านความปลอดภัยทั้งหมด และดูโดรนของเรา ทําให้สิ่งที่เป็นไปไม่ได้ ดูว่างเปล่า บทต่อไปของการเดินทางของเราจะเป็น ... ลืม!"
 START_SCREEN_FOREVER_CRUISE_HIVE: "ผู้โดยสารที่สนใจ: การเปลี่ยนแปลงครั้งใหญ่อยู่บนขอบฟ้าสําหรับ[capital_scope.GetName].\n\nไฮเปอร์ไดรฟ์ซึ่งเคยเป็นแนวคิดห่างไกลในหน่วยความจําร่วมกัน บ่อยครั้งที่เลื่อนออกไป บางครั้งตั้งคําถาม ตอนนี้ถูกปลุกเต็มที่ เป็น เวลา หลาย ศตวรรษ ที่ เรา ได้ ย้าย ไป ด้วย กัน ผ่าน อวกาศ ที่ คุ้น เคย เป็น โลก ที่ มี ชีวิต ชีวา, ทํา งาน หนัก, และ ปรองดอง กัน. ตอนนี้เส้นทางใหม่เปิด และเราจะให้ประสบการณ์ที่รวยกว่า ใคร ๆ ที่เรารู้\n\nกําหนดการของเราตอนนี้ขยายเกิน รูปแบบที่คุ้นเคย เป็นดาวที่ยังไม่ได้สํารวจ ร่วมกันเราจะประสบ การค้นพบ การผจญภัย และอันตรายเพียงพอ\n\nถ้าคุณมีคําถามใด ๆ สมาชิกใด ๆ ของลูกเรือสามารถให้คําตอบคุณ"

