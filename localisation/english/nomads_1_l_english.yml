 nomads.4705.desc.regular: "ดัง นั้น การ เดิน เรือ ใน นาวา จึง สิ้น สุด ลง§Y[event_target:settling_arkship.GetName]§!หลัง จาก ทํา งาน มา หลาย ปี ทํา ให้ โครง สร้าง ของ เรือ เสีย หาย และ ทํา ให้ น้ํา ตก ตก ลง มา ใน ที่ สุด เรา ก็ พร้อม จะ เคลื่อน ที่. เรา[event_target:player_country.GetSpeciesNamePlural]มีชีวิตอยู่ผ่านช่วงเวลาหนึ่ง ในอนาคตจะจําได้ เอาล่ะ เรามาตกลงกัน§Y[event_target:settled_planet.GetName]§!!"
 nomads.4705.desc.machine: "การย้ายโดรนและโครงสร้างพื้นฐานทั้งหมดจาก§Y[event_target:settling_arkship.GetName]§!ถึง[event_target:settled_planet.GetPlanetMoon]คือจุดจากอนาคต§Y[event_target:player_country.GetName]§!. ลําดับความสําคัญใหม่ ในปัจจุบันจะถูกพัฒนาขึ้นเพื่อปรับตัวให้เข้ากับชีวิตที่ลงตัว"
 nomads.4705.desc.hive: "หลังจากหลายปีที่เตรียมโครงสร้างพื้นฐาน§Y[event_target:settling_arkship.GetName]§!และชีววิทยาของเราเอง พัฒนากระดูกที่แข็งแรงขึ้น และทําปอดให้สมบูรณ์ เราพร้อมที่จะชําระแล้ว นี่จะเป็นเวทีใหม่§Y[event_target:player_country.GetName]§!รถชูชีพ บางทีชีวิตจะเหมาะกับเรา"

 nomads.4700.a: "นี่[event_target:settled_planet.GetPlanetMoon]จะเป็นรากฐานของจักรวรรดิใหม่ของเรา"
 nomads.4700.settle.tt: "เดอะ§Y[event_target:player_country.GetName]§!หยุดเป็น£nomad£ ['concept_nomadic_empire']และที่อยู่อาศัยอย่างสะดวกสบาย§Y[event_target:settled_planet.GetName]§!ในฐานะ£planet£ ['concept_settled_empire'].\n\n"
 nomads.4700.b: "$nomads.4700.a$"
 settlement_scuttle_arkships_effect_tt: "\nเหลือทั้งหมด§Y$arkship_cap_plural$§!คือ§Rดึงข้อมูล§!และจํานวนประชากรที่ย้ายมา§Y[event_target:settled_planet.GetName]§!."
 nomads.4700.c: "เราจะเดินทางต่อไปยังดวงดาว"
 nomads.4700.settle_subject.tt: "เดอะ§Y[event_target:settling_arkship.GetName]§!ตก ลง กัน§Y[event_target:settled_planet.GetName]§!เป็นของใหม่['concept_subject']ของ§Y[event_target:player_country.GetName]§!.\n\n"
 nomads.4700.d: "เราจะครองดวงดาวจากนี้[event_target:settled_planet.GetPlanetMoon]."

 origin_nomadic_settled: "ดาว เคราะห์ ตก"
 origin_nomadic_settled_desc: "จักรวรรดิ นี้ ถูก ก่อ ตั้ง ขึ้น โดย การ ตั้ง ถิ่น ฐาน ของ ประชากร ใน นาวา สู่ โลก ใหม่."
