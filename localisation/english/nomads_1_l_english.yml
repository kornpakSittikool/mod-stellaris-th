 contract_suntrip_crew_2: "การปรับขนาดเสียง"
 contract_suntrip_crew_2_desc: "การ ทํา แบบ จําลอง ลํา ตัว ข้าง นอก เรียก ว่า การ ทดสอบ ความ ร้อน ภาย ใต้ การ รับ รังสี สูง สุด. ทุกวิวด้านดวงดาว จะเปิดรับความปลอดภัย"
 contract_suntrip_crew_2_lore_issued: "[GetSuntripCrewLoreIssued2]"
 contract_suntrip_crew_2_regular_lore_issued: "§L\"หยุดดูวิวได้แล้ว ถ้ามีใครถาม อย่าลืมบอกผู้โดยสารว่า มันเป็นการอัพเกรดแสงตามกําหนด\"§!"
 contract_suntrip_crew_2_gestalt_lore_issued: "§L\"ห้องชมวิวเงียบ\" ผู้โดยสารได้รับแจ้งว่า มีการอัพเกรดแสงตามกําหนดการ\"§!"
 contract_suntrip_crew_2_lore_completed: "[GetSuntripCrewLoreCompleted2]"
 contract_suntrip_crew_2_regular_lore_completed: "§L\"ทุกแผงในความอดทน นั่นคือวงจรอื่น เราสามารถเลิกกังวลเกี่ยวกับการแตกของเรือ.\"§!"
 contract_suntrip_crew_2_gestalt_lore_completed: "§L\"ทุกแผงในความอดทน \"ความเป็นไปได้ที่จะเปลี่ยนเป็นรอบใหม่\"§!"
 contract_suntrip_crew_2_lore_failed: "[GetSuntripCrewLoreFailed2]"
 contract_suntrip_crew_2_regular_lore_failed: "§L\"ยกเลิกการปรับปรุง เรืออาจจะดี.\"§!"
 contract_suntrip_crew_2_gestalt_lore_failed: "§L\"ยกเลิกการปรับปรุง ความ ซื่อ สัตย์ มั่นคง เป็น สิ่ง ที่ บรรลุ ได้. เฝ้าดูอย่างต่อเนื่อง.\"§!"
