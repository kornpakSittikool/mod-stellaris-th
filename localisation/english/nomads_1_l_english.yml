 stripped_planet_desc: "โลก นี้ ถูก ปล้น ทรัพยากร ส่วน ใหญ่ เมื่อ คน ของ โลก ออก จาก เรือ รบ ของ พวก เขา ทิ้ง แต่ ความ เงียบ."
