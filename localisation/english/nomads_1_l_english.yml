# Technologies
 ###############

 tech_planetary_engineering: "วิศวกรรมโลก"
 tech_planetary_engineering_desc: "ความก้าวหน้าในการสะสมวัสดุและการประมวลผล ทําให้ยานอาร์คชิปชิพของเรา เข้าร่วมในความพยายามในการสกัดทรัพยากรขนาดใหญ่"
 TECH_UNLOCK_CLEAR_BLOCKER_CONTRACT_TITLE: "§H$UNLOCKS_CONTRACT_TYPE$§! $contract_clear_blockers$"
 TECH_UNLOCK_CLEAR_BLOCKER_CONTRACT_DESC: "$contract_clear_blockers$การ ทํา สัญญา ทํา ให้ เรา ช่วย เหลือ ผู้ อาศัย บน ดาว เคราะห์ โดย การ กําจัด ผู้ ปิดกั้น ชนิด ที่ มี มาก ที่ สุด ซึ่ง เป็น อุปสรรค ต่อ การ พัฒนา อาณานิคม ของ พวก เขา."
