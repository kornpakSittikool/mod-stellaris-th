 waystation_reaver_stronghold_tt: "\n§Yลูกเล่น§!:\n£ship_h_slot£ล็อตของอาวุธ:§G+1§!\nการขโมยรายเดือนโดย§Y$sm_waystation_pirate_hideout_plural$§!: §G+1.5%§!\nเป็นสองเท่าของโอกาสที่จะขโมยทรัพยากรในขณะที่ใช้§Y$bombardment_plundering$§!ท่ายิงระเบิด"

