 CONTRACT_ESPIONAGE_SUPPORT_passenger_2_PROJECT_DESC: ""

 contract_espionage_support_passenger_3: "หมดอายุ"
 contract_espionage_support_passenger_3_desc: "มี การ นํา ผู้ โดยสาร ไป เที่ยว ที่ เมือง ข้าง ล่าง นี้ ซึ่ง หน่วย งาน ของ ทีม งาน ได้ วาง พัสดุ ปลอม ไว้ ใน ที่ ที่ พวก เขา จะ พบ."
 contract_espionage_support_passenger_3_lore_issued: "§L\"พวกเขาให้เราไดเรกทอรีและชื่อรหัส ของฉันคือ คนทําลาย ฉันไม่เคยรู้สึกมีชีวิตมากขึ้น.\"§!"
 contract_espionage_support_passenger_3_lore_completed: "§L\"ฉันพบของหลังรูปปั้นเอเลี่ยน กลุ่มของฉันเชียร์ คนท้องถิ่นดูสับสนมาก\"§!"
 contract_espionage_support_passenger_3_lore_failed: "§L\"ไม่มีหยดตาย ไม่มีชื่อรหัส ไม่มีภารกิจ เพียงแค่วงจรอื่นจ้องมองที่ทางเดินเดียวกัน.\"§!"
 contract_espionage_support_passenger_3_chain_title: "$contract_espionage_support_passenger_3$"
 contract_espionage_support_passenger_3_chain_desc: "$contract_espionage_support_passenger_3_desc$"
 CONTRACT_ESPIONAGE_SUPPORT_passenger_3_PROJECT: "$contract_espionage_support_passenger_3$"
 CONTRACT_ESPIONAGE_SUPPORT_passenger_3_PROJECT_DESC: ""

 contract_espionage_support_passenger_4: "สัตว์ ล่า เหยื่อ"
 contract_espionage_support_passenger_4_desc: "การจัดฉากการเจาะระบบรักษาความปลอดภัย ได้ประกาศไปทั่วทุกชั้น ผู้โดยสารถูกเกณฑ์ให้ระบุตัวตน ของสายลับต่างถิ่น ในเกมสืบสวน"
 contract_espionage_support_passenger_4_lore_issued: "§L\"พวกเขาบอกเราว่าใครบางคนในดาดฟ้านี้เป็นสายลับ ฉันได้เขียนรายชื่อผู้ต้องสงสัยแล้ว\"§!"
 contract_espionage_support_passenger_4_lore_completed: "§Lฉันจับไส้ศึกได้ ผู้ โดยสาร อีก หลาย พัน คน ก็ เช่น กัน. แต่ฉันจับพวกเขาก่อน!\"§!"
 contract_espionage_support_passenger_4_lore_failed: "§L\"การล่าไส้ศึกถูกสั่งปิด ก่อนที่ผมจะได้แสดงหลักฐาน ฉันมีชาร์ตและทุกอย่าง\"§!"
 contract_espionage_support_passenger_4_chain_title: "$contract_espionage_support_passenger_4$"
 contract_espionage_support_passenger_4_chain_desc: "$contract_espionage_support_passenger_4_desc$"
 CONTRACT_ESPIONAGE_SUPPORT_passenger_4_PROJECT: "$contract_espionage_support_passenger_4$"
 CONTRACT_ESPIONAGE_SUPPORT_passenger_4_PROJECT_DESC: ""

 contract_espionage_support_passenger_5: "เชื่อมต่อสัญญาณ"
 contract_espionage_support_passenger_5_desc: "ดาดฟ้าสังเกตการณ์ได้ถูกดัดแปลงเป็นเสารับสัญญาณ ผู้โดยสารประจําสถานี ถอดรหัสการส่งสัญญาณของเอเลี่ยน ที่ลูกเรือแอบออกอากาศจากใต้ดาดฟ้าเรือ"
 contract_espionage_support_passenger_5_lore_issued: "§L\"พวกเขายื่นหูฟังให้ฉัน และบอกฉันว่ากาแล็กซี่ขึ้นอยู่กับสิ่งที่ฉันได้ยินต่อไป ฉันเชื่อพวกเขา\"§!"
 contract_espionage_support_passenger_5_lore_completed: "§L\"พวกเขาบอกเราว่าการส่งสัญญาณถูกเขียนบท แล้วทําไมลูกเรือจึงดูประหม่า เมื่อผมถอดรหัสล่าสุด?\"§!"
 contract_espionage_support_passenger_5_lore_failed: "§L\"โพสต์ฟังไปเงียบก่อนที่จะเปลี่ยนของฉัน ฉันไม่เคยแม้แต่จะสวมหูฟัง.\"§!"
