 contract_suntrip_crew_1: "การซ่อมแซมเครื่อง"
 contract_suntrip_crew_1_desc: "เราต้องโคจรรอบดาวของระบบนี้ และทํางานบนพลังงานแสงอาทิตย์ ในขณะที่เครื่องกําเนิดไฟฟ้าหลัก รับการรักษาตามกําหนด"
 contract_suntrip_crew_1_lore_issued: "§L\"ใช่อาร์เรย์แสงอาทิตย์จะบล็อกทุกวิว ไม่, เราไม่สามารถแยกมันคนละมุมกัน\"§!"
 contract_suntrip_crew_1_lore_completed: "§L\"ตัวจําลองกลับมาออนไลน์และทํางานภายในความอดทน บันทึกและย้ายไปรายการถัดไปในรายการ.\"§!"
 contract_suntrip_crew_1_lore_failed: "[GetSuntripCrewLoreFailed1]"
 contract_suntrip_crew_1_regular_lore_failed: "§L\"ผู้สนับสนุนถูกเลื่อนออกไปอีกครั้ง ที่อัตรานี้เครื่องกําเนิดไฟฟ้าจะกําหนดการปิดของตัวเอง.\"§!"
 contract_suntrip_crew_1_gestalt_lore_failed: "§L\"ผู้สนับสนุนถูกเลื่อนออกไป การเสื่อมสภาพของเครื่องไฟฟ้ายังคงดําเนินต่อไป เวลาล้มเหลวคํานวณใหม่\"§!"
