 opinion_abused_contract_2: "$opinion_abused_contract$"

 nomads.6020.name: "เสียง จาก ราง รถ"
 nomads.6020.desc: "ขณะโหลดวัสดุจาก§Y[event_target:contract_issuer.GetName]§!เราตรวจพบการบุกรุก ในอ่าวสินค้าแห่งหนึ่ง มี การ รายงาน เสียง ดัง ลึก จาก อีก ด้าน หนึ่ง ของ ประตู รักษา ความ ปลอด ภัย เพื่อ ยืน ยัน ว่า มี อันตราย ที่ อาจ เกิด ขึ้น ภาย ใน ห้อง.\n\nเราควรจะเสี่ยงในการสืบสวนไหม"
 nomads.6020.a: "อย่าเสี่ยงเรื่องยานอาร์คชิปอยุธน์ ช่องว่างของสินค้า"
 nomads.6020.b: "เปิดประตู"

 nomads.6025.name: "ค ริ สต จักร ชีวภาพ"
 nomads.6025.desc: "เมื่อ เปิด ประตู ดาดฟ้า สินค้า สิ่ง มี ชีวิต ที่ มี ชีวิต มาก ที่ สุด กลุ่ม หนึ่ง พา เรา ไป ด้วย ความ ประหลาด ใจ และ จม อยู่ ใน เรือ กําปั่น ที่ เหลือ. นักอุตุนิยมวิทยาระบุว่า สิ่งมีชีวิตเหล่านี้ไม่ก้าวร้าว และไม่คุกคามประชาชนของเรา\n\nสิ่ง มี ชีวิต เล็ก ๆ เหล่า นี้ รวม ตัว กัน เป็น รูป ทรง รูป ไข่, ได้ รับ การ สนับสนุน จาก แขน ขา ยาว, และ สามารถ ปีน ผนัง และ เพดาน ได้ ขณะ ที่ เคลื่อน ที่ ด้วย ความ เร็ว ที่ น่า ทึ่ง. พวกมันถูกเลี้ยงด้วยแมลงคล้ายสัตว์จากระบบนิเวศของเรา ล่อลวงพวกมันด้วยต่อมเรืองแสง ผู้ คน ได้ คุ้น เคย กับ พวก เขา แล้ว และ พบ ว่า พวก เขา เป็น ที่ ชื่น ชอบ เป็น พิเศษ ใน ตอน กลาง คืน เมื่อ แสง สว่าง และ เสียง ร้อง อัน นุ่ม นวล ของ พวก เขา ให้ ภาพ ที่ น่า ตื่น เต้น."
 nomads.6025.a: "เริ่มทดลองด้วยสิ่งมีชีวิตของพวกเขา"
 nomads.6025.b: "ให้ชาวเรือได้สนุกกับความมหัศจรรย์"

 nomads.6030.name: "เฟิร์น เฟ ลีน"
 nomads.6030.desc: "ทั้ง ๆ ที่ มี การ ค้น หา อย่าง กว้าง ขวาง แต่ ทีม ของ เรา ก็ ไม่ สามารถ แยก แหล่ง ที่ มา ของ รู ปัส ได้ ใน ที่ เก็บ เงียบ ใน ตอน นี้. ขณะที่พวกเขาเตรียมที่จะออก สิ่งมีชีวิตขนาดเล็กโผล่ออกมาจากเงาและหมุน & 90บนเส้นหลวมของผ้าแขวนจากเครื่องแบบของลูกเรือ\n\nใน ตอน แรก พวก ลูก เรือ ตก ตะลึง ใน ไม่ ช้า พวก เขา ก็ ตัดสิน ใจ ว่า คน ต่าง ด้าว จะ เป็น คน ขี้ เล่น ตาม ธรรมชาติ แทน ที่ จะ ก้าวร้าว. เมื่อดูแลอย่างละเอียดสําหรับการตรวจสอบอย่างใกล้ชิด สัตว์ต่างประเทศส่งลมสั่นสะเทือนเหมือนมอเตอร์"
 nomads.6030.a: "ศึกษาตัวอย่าง"
 nomads.6030.b: "บางทีอาจจะมีคนรับมาเลี้ยง"

 nomads.6035.name: "มาเลเซีย"
 nomads.6035.desc: "เมื่อ เข้า ไป ใน ดาดฟ้า เรือ แล้ว ลูก เรือ ก็ พบ ว่า เรือ บรรทุก สินค้า ลํา หนึ่ง ถูก เจาะ จาก ข้าง ใน. รถ จักร คัน หนึ่ง ที่ ได้ รับ ความ เสีย หาย ลาด ตระเวน ไป มา บน ดาดฟ้า เรือ มอเตอร์ ยัง คง กวัดแกว่ง อยู่ และ แสง ตัว บ่ง ชี้ กระพริบ อย่าง ไม่ หยุด ยั้ง.\n\nพวก ลูก เรือ พยายาม จะ ส่ง หน่วย กลับ ไป ยัง ตู้ เก็บ ของ ซึ่ง ที่ นั่น มี ห้อง ที่ ซ่อน อยู่ เปิด ไว้ และ ปล่อย ผลึก ที่ ทํา ให้ แวว วับ ลง บน พื้น.\n\nทันที ก่อน ที่ จะ หยุด พัก อย่าง ถาวร เม ชา อยด์ จะ ส่ง เสียง เบา ๆ รายงาน โดย ลูก เรือ ว่า\"อย่าปิดฉันลง ฉันแตกต่าง\""
 nomads.6035.a: "เราจะส่งมันกลับไปที่เจ้าของ"
 nomads.6035.b: "อ่านไมโครชิปของมัน"
 nomads.6035.c: "ทําลายมันและเอาคริสตัลไป"

 nomads.6040.name: "ก๊าซคอมบัสทีฟ"
 nomads.6040.desc: "เสียงแปลกๆยังคงดําเนินต่อไป เมื่อเข้าใกล้อ่าวสินค้า รับประกันความปลอดภัยอย่างกว้างขวาง เมื่อ เข้า ไป ใน ดาดฟ้า สินค้า แล้ว พวก ลูก เรือ ก็ ตรวจ พบ ว่า มี กลิ่น เหม็น กัมมันตภาพรังสี อยู่ เต็ม ห้อง และ สังเกต เห็น ชิ้น ส่วน ของ ลัง ที่ กระจาย อยู่ ทั่ว ท่า เรือ. การ ระเบิด เล็ก ๆ น้อย ๆ เกิด ขึ้น ใน ชั่ว ขณะ ต่อ มา ภาย ใน ตู้ สินค้า ที่ อยู่ ติด กัน ทํา ให้ เกิด การ ตอบ สนอง ทันที.\n\nทีม นั้น ตาม รอย ควัน ไป และ พบ ว่า เกิด ไฟ ไหม้ เล็ก ๆ ระเบิด ขึ้น. บุคลากร ผู้ เชี่ยวชาญ ได้ ระงับ อย่าง รวด เร็ว ทํา ให้ ลูก เรือ สามารถ ควบคุม ก๊าซ ระเหย ได้ อย่าง ปลอด ภัย และ ขจัด ก๊าซ ที่ ระเหย แล้ว ก่อน ที่ จะ เพิ่ม ขึ้น อีก. ห้อง เก็บ สินค้า มี ความ เสีย หาย ต่อ โครง สร้าง ที่ เห็น ได้ พร้อม กับ ลัง ไม้ หลาย อัน ที่ อยู่ ใกล้ ๆ บริเวณ นั้น."
 nomads.6040.a: "เราป้องกันความเสียหายเพิ่มเติมเพียงในเวลา"
 nomads.6040.b: "ทําให้ผู้ชําระหนี้ชดใช้ความเสียหาย"

 nomads.6045.name: "การ ปรากฏ ตัว ที่ ไม่ มี ใคร โต้ แย้ง"
 nomads.6045.desc: "เมื่อ เข้า ไป ใน อ่าว สินค้า ความ วุ่นวาย ก็ เพิ่ม มาก ขึ้น. การอ่านของอะคูสติก ตามรอยแหล่งของลังสินค้า ทีมนี้เตรียมพร้อมสําหรับสิ่งที่เลวร้ายที่สุด ในไม่ช้าต่อมา แต่ละคนก็ระเบิดออกมา\n\nพวก เขา อ้าง ว่า มา อย่าง สงบ พูด ด้วย สําเนียง ที่ ไม่ คุ้น เคย และ ไม่ คุ้น เคย. พวกเขาระบุตัวเองว่า§Y[arkship_cargo_leader.GetName]§!และบอกว่า[arkship_cargo_leader.GetHeShe]ครั้ง หนึ่ง เคย เป็น ส่วน หนึ่ง ของ องค์การ กอง เรือ ที่ ใหญ่ กว่า ก่อน ถูก ขับ ออก เนื่อง ด้วย เหตุ ผล ที่ ถูก ต้อง.[arkship_cargo_leader.GetHeSheCap]อธิบายว่า[arkship_cargo_leader.GetHeShe]ซ่อน[arkship_cargo_leader.GetHimHer]ตัวเองบนเรือในการค้นหาความปลอดภัยและโอกาสที่จะพิสูจน์[arkship_cargo_leader.GetHimHer]มีประโยชน์\n\n§Y[arkship_cargo_leader.GetName]§!ถามว่าทีมจะยอมรับ[arkship_cargo_leader.GetHisHer]ข้อเสนอ"
 nomads.6045.desc.noleader: "เราอยู่ในช่วงลําบากจนกระทั่ง§Y[arkship_cargo_leader.GetName]§!เป็น ผู้ ควบคุม สถานการณ์ และ ได้ รับ อนุญาต ให้ นํา เรือ รบ."
 nomads.6045.a: "ยินดีต้อนรับ"
 nomads.6045.b: "คุณไม่มีอะไร แต่สินค้าให้เรา เราจะส่งท่านตามที่ต้องการ"
 nomads.6045.c: "ส่งเจ้ากลับไปที่ที่เจ้าจากมาเถอะ คนทรยศ"

 nomads.6050.name: "สินค้าที่ไม่ได้รับอนุญาต"
 nomads.6050.desc: "เสียง ที่ ดัง สนั่น หยุด ทันที เมื่อ ประตู เปิด ออก. ไม่ สามารถ รู้ สาเหตุ ของ การ รบกวน ได้ ทีม งาน จะ เริ่ม สแกน ตู้ สินค้า อย่าง เป็น ระบบ.\n\nหนึ่งในนั้นได้ลงทะเบียน สิ่งมีชีวิตที่ไม่คาดคิดไว้หลายดวง การ แกะ ออก เผย ให้ เห็น หลาย คน ได้ รับ การ ดู แล เอา ใจ ใส่ อย่าง ไม่ เห็น แก่ ตัว และ อยู่ ใน สภาพ ที่ อ่อนแอ\"กรุณาเมตตา\" หนึ่งกล่าวว่า \"เราถูกข่มเหงและถูกบังคับให้หนีจาก§Y[event_target:contract_issuer.GetName]§! จักรวรรดิเรายอมรับชะตากรรมใด ๆ ที่คุณคิดว่าเหมาะสม.\""
 nomads.6050.a: "เราควรส่งพวกเขากลับไป"
 nomads.6050.b: "บอกสิ่งที่คุณรู้ แล้วเราจะนําคุณไปยังจุดหมาย"
 nomads.6050.c: "เรามีพื้นที่บนยานอาร์คชิป"

 nomads.contract_event_header: "เรื่องที่เกิดขึ้นในระหว่างสัญญาของเรา§H[event_target:contract_issuer.GetName]§!."

 nomads.6055.name: "การ สอบสวน ที่ น่า ทึ่ง"
 nomads.6055.desc: "$nomads.contract_event_header$พวก เขา ปรารถนา จะ เฝ้า สังเกต และ บันทึก ชีวิต บน เรือ รบ ใน ช่วง ที่ มี การ ทํา สัญญา.\n\nดู เหมือน ว่า สําหรับ อารยธรรม ส่วน ใหญ่ แล้ว วิถี ชีวิต แบบ เร่ร่อน ยัง คง เป็น เรื่อง ที่ น่า หลงใหล และ ไม่ มี ความ ลึกลับ ใน ระดับ เล็ก ๆ."
 nomads.6055.desc.machine: "$nomads.contract_event_header$พวกเขาต้องการที่จะบันทึก การดําเนินงานของยานอาร์คชิปแลนด์ ในช่วงสัญญาดําเนินการ\n\nวัตถุ ประสงค์ ที่ พวก เขา กล่าว ถึง คือ การ ศึกษา ระบบ ต่าง ๆ ที่ ทํา งาน ได้ เอง โดย ใช้ ระบบ ต่าง ๆ ของ ดาว เคราะห์ ต่าง ๆ ซึ่ง ข้อมูล ภาย นอก แทบ ไม่ มี อยู่."
 nomads.6055.desc.hive: "$nomads.contract_event_header$พวกเขาขอสิทธิในการเฝ้าสังเกตบนยานอาร์คชิปแลนด์ ในช่วงสัญญาดําเนินการ\n\nคํา ขอ นี้ มา จาก นัก วิจัย ที่ ไม่ รู้ จัก เหน็ด เหนื่อย ซึ่ง พยายาม จะ เข้าใจ รูป แบบ ของ การ อยู่ ร่วม กัน ของ รถยนต์ นอก ประสบการณ์ ของ พวก เขา."
 nomads.6055.a: "เรายินดีต้อนรับความสนใจของพวกเขา"
 nomads.6055.a.gestalt: "ให้พวกเขาสังเกต"
 nomads.6055.b: "แกรนท์เข้าถึงได้จํากัด ค่าธรรมเนียม"
 nomads.6055.c: "เรือ รบ นี้ ไม่ ใช่ ปรากฏการณ์."

 nomads.6060.name: "ยกเลิกปฏิบัติการ"
 nomads.6060.desc: "$nomads.contract_event_header$\n\nมีข้อพิพาทในอํานาจศาลเกิดขึ้น ระหว่างสองทีม ซึ่งทีมนั้นมีอํานาจสั่งการ ทั้ง สอง ฝ่าย ได้ ยื่น คํา ร้อง ทุกข์ อย่าง เป็น ทาง การ และ ผล ผลิต ใน บริเวณ ที่ ได้ รับ ผล กระทบ เริ่ม ประสบ ความ ทุกข์."
 nomads.6060.desc.machine: "$nomads.contract_event_header$\n\nการจัดลําดับความสําคัญได้ก่อให้เกิดความขัดแย้งระหว่างระบบบริหารทั้งสอง\n\nแต่ละคนได้ระบุตัวเองเป็นหน่วยปฏิบัติการที่ได้รับอนุญาต สําหรับสัญญาของเราในปัจจุบัน ส่งผลให้วนซ้ํา"
 nomads.6060.desc.hive: "$nomads.contract_event_header$\n\nเส้นด้ายที่ไม่ต่อเนื่องได้ปรากฏขึ้นภายใน การดําเนินงานของกลุ่ม\n\n2 กลุ่มย่อยได้เริ่มปล่อยรูปแบบพฤติกรรมที่ขัดแย้งกัน เกี่ยวกับความไม่รับผิดชอบในสัญญาในปัจจุบันของเรา"
 nomads.6060.a: "มีสื่อระหว่างปาร์ตี้"
 nomads.6060.a.gestalt: "แก้ไขความขัดแย้ง"
 nomads.6060.b: "เราไม่มีเวลาสําหรับเรื่องนี้"

 jurisdictional_mediation: "การ สื่อ ความ ระหว่าง ฝ่าย ปกครอง กับ ฝ่าย ปกครอง"
 jurisdictional_mediation_desc: "ข้อพิพาทในอํานาจศาล ได้รับการแก้ไขอย่างเป็นทางการ การ ต่อ สู้ กัน ได้ ดี ขึ้น แม้ ว่า การ ก่อ สร้าง จะ ช้า ลง ชั่ว คราว ขณะ ที่ กระบวนการ ต่าง ๆ กําลัง ปรับ ปรุง."
 command_reassigned: "คําสั่งถูกเซ็นใหม่"
 command_reassigned_desc: "อํานาจปฏิบัติการเหนือดินแดนที่ถกเถียงกัน ได้รับการแต่งตั้งใหม่ นี่ทําให้เกิดแรงเสียดทาน จากความร่วมมือกันภายใน"

 nomads.6065.name: "ร้องขอเวลาว่าง"
 nomads.6065.desc: "$nomads.contract_event_header$\n\nระบบตรวจสอบภายในของยานอาร์คชิปชิพ ได้ระบุถึงความเสื่อมโทรมของลูกเรือ กําลังใจในหมู่คนงานสตาต้า มี การ ส่ง คํา ขอ อย่าง เป็น ทาง การ สําหรับ ช่วง พัก ผ่อน.\n\nร้องขอถูกคัดลอกไปยัง[event_target:contract_issuer.GetName]ผู้ที่จะคาดหวังการตอบรับ และต้องการแก้ไขในความหมายที่แน่นอน"
 nomads.6065.desc.machine: "$nomads.contract_event_header$\n\nวัฏจักร ของ การ วินิจฉัย ได้ ระบุ ว่า งาน บํารุง รักษา ที่ ถูก เลื่อน ออก ไป มี อยู่ ใน ระบบ หลัก และ ระบบ รอง หลาย ระบบ. การคาดการณ์อย่างเหมาะสม แสดงให้เห็นว่าการปรับปรุงทางสถิติอย่างมีนัยสําคัญ\n\nรายงานถูกระบุว่า[event_target:contract_issuer.GetName]ใคร จะ คอย ตรวจ สอบ ดู ว่า เรื่อง นั้น จัด การ อย่าง ไร และ แน่นอน จะ เรียก ร้อง ให้ แก้ไข เรื่อง นั้น."
 nomads.6065.desc.hive: "$nomads.contract_event_header$\n\nเราได้ลงทะเบียนความไม่เสมอภาคที่เพิ่มขึ้นภายใน$planet_jobs_simple_drone$กระบวนการแรงงานของพวกเขาต้องการ ช่วงของการฟื้นตัวที่สอดคล้องกัน ดังเช่นการยับยั้งอย่างต่อเนื่อง มีความเสี่ยง\n\n[event_target:contract_issuer.GetName]ได้ มี การ แจ้ง ให้ ทราบ ถึง สภาพ การณ์ และ จะ เรียก ร้อง ให้ มี การ แก้ไข แก้ไข อย่าง แน่นอน."
 nomads.6065.a: "ยอมรับคําขอ"
 nomads.6065.a.tt: "§Rสัญญานี้จะลดลง 25%§!"
 nomads.6065.b: "สัญญามาก่อน"

 downtime_granted: "จริง"
 downtime_granted_desc: "ช่วงของการหยุดพักชั่วคราว ได้รับอนุมัติจากประชากรของยานอาร์คชิป ทั้ง ศีล ธรรม และ ผล งาน ที่ ออก มา มี การ ปรับ ปรุง ให้ ดี ขึ้น ทั่ว ชั้น ผลิต."
 downtime_denied: "ปฏิเสธเวลาลง"
 downtime_denied_desc: "การขอทํางานเพื่อพักผ่อน ถูกปฏิเสธในผลประโยชน์ของสัญญา คุณธรรมในการผลิตสเตราต้าถูกปราบปราม"

 nomads.6070.name: "การ กลับ ใจ ที่ เพิ่ม ขึ้น"
 nomads.6070.desc: "$nomads.contract_event_header$\n\nจากบันทึกของเราในฐานะผู้รับเหมาได้เดินทาง§H[event_target:reputation_noticed_empire.GetName]§!เฝ้าดูกิจกรรมการค้ากาแล็กซี่ ได้จดบันทึกและปัจจุบันมองเราเป็นคู่หูที่น่าเชื่อถือและมีความสามารถ\n\nมี การ เปิด โอกาส ไว้ เพื่อ ปลูก ฝัง สัมพันธภาพ หรือ อาจ เป็น ไป ได้ ที่ จะ หน่วง การ ให้ เกียรติ แก่ คู่ ของ เรา เอง."
 nomads.6070.desc.machine: "$nomads.contract_event_header$\n\nการบันทึกข้อมูลผ่านสัญญาเสร็จสมบูรณ์ ได้รับการเข้าถึงโดยผู้สังเกตการณ์ภายนอก§H[event_target:reputation_noticed_empire.GetName]§!ตามรอยกิจกรรมของเครือข่ายอัตโนมัติในภูมิภาคนี้ ได้ระบุว่าตัววัดประสิทธิภาพของเรา สอดคล้องกับผู้รับเหมาที่เชื่อถือได้และมีความสามารถ\n\nมีการสร้างช่องทาง เรา อาจ ยอม รับ การ ประเมิน หรือ การ เปลี่ยน แปลง ไป สู่ คู่ ของ เรา ที่ มี อยู่ แล้ว."
 nomads.6070.desc.hive: "$nomads.contract_event_header$\n\n§H[event_target:reputation_noticed_empire.GetName]§!การสังเกตการไหลของการค้าและแรงงานทั่วภาคนี้ ได้ตระหนักถึงรูปแบบในการเคลื่อนไหวของเรา\n\nการจดจําได้มาถึงแล้ว เรา อาจ ตอบ หรือ ให้ อีก คน หนึ่ง ส่ง สัญญาณ ไป ข้าง หน้า."
 nomads.6070.a: "รับรองพวกเขาของความตั้งใจที่ดีของเรา"
 nomads.6070.b: "ชื่อเสียงที่ดีคือรางวัลของตัวเอง"
 nomads.6070.c: "ผ่านเครดิตไปยัง§H[event_target:contract_issuer.GetName]§!."

 nomads.6075.name: "เริ่มการสํารวจความเร็วลมลดลง"
 nomads.6075.desc: "$nomads.contract_event_header$\n\nผลการตรวจสอบเบื้องต้นและระยะไกลของภูมิภาคสัญญาได้พิสูจน์แล้ว ข้อมูล นี้ มี คุณค่า ทาง การ ค้า ค่อน ข้าง มาก และ นาย หน้า ที่ รับ ผิด ชอบ คน หนึ่ง ได้ ยื่น ยื่น ขอ ซื้อ เรี่ย ไร โดย ตรง."
 nomads.6075.a: "ขายให้กับโบรกเกอร์"
 nomads.6075.b: "ส่งข้อมูลไปเสริมในสัญญา"
 nomads.6075.c: "แฟ้มจัดเก็บมันสําหรับการใช้งานของเราเอง"

 opinion_unexpected_cargo_positive: "เดอะ§Y[event_target:contract_issuer.GetName]§! จักรวรรดิตอน นี้ มี ทัศนะ ที่ ดี กว่า เกี่ยว กับ เรือ รบ§Y[Root.GetName]§!"
 opinion_unexpected_cargo_negative: "เดอะ§Y[event_target:contract_issuer.GetName]§! จักรวรรดิตอนนี้เก็บมุมมองด้านลบของเรือ§Y[Root.GetName]§!"

 #######################
# NOMADIC PARAGONS
 #######################

 NAME_nomadic_revenant: "Orun Veyth"
 DESC_nomadic_revenant: "ผู้ รอด ชีวิต จาก โลก ที่ ถูก กวาด ล้าง อย่าง น่า กลัว ใช้ การ ตี สอน อย่าง ไม่ รู้ จัก เหน็ด เหนื่อย และ สาบาน จะ แก้ แค้น ทุก คน ที่ กระทํา ความ ชั่ว ร้าย เช่น นั้น."
 catch_phrase_nomadic_revenant: "แสดงให้ฉันเห็นคนขายเนื้อ และฉันจะกลับความโหดร้ายของพวกเขาสิบเท่า"
 nomads.1505.name: "$NAME_nomadic_revenant$"
 nomads.1505.desc: "§Hตัวเลขที่ก้าวขึ้นเรือกับปืนของทหาร ลักษณะของพวกเขาแข็งด้วยความเศร้าโศกและยาวหลายปีของการเนรเทศ เสียง ของ เขา ต่ํา วัด ได้ และ คม ด้วย เหล็ก§!\n\n\"โลกของฉันได้รับการชําระ คนของฉันครอบครัวของฉัน ... คนเดียวที่รอดมาได้ ฉันอดทน และสถาปนิกแห่งการทําลาย จะตายด้วยมือของฉัน\""
 nomads.1505.a: "คุณเป็นใคร?"
 nomads.1505.a.response: "§Hพวกเขาหยุดเช่นถ้าพูดชื่อของตัวเอง น้ําตาที่แผลเก่า§!\n\nชื่อยังคงอยู่ แต่ความหมายของมันคือเถ้า ผมเคยเป็นทหาร เคยปฏิบัติตามและปฏิบัติตาม ตอนนี้ฉันเป็นเงา ของประชาชนที่ถูกทําลาย\n\n\"โทรหาฉันนะ$NAME_nomadic_revenant$ถ้าคุณต้องทํา อดีตของฉันไม่สําคัญอีกต่อไป แค่หนี้สินของเลือดเท่านั้น\""

 nomads.1505.b: "ทําไมต้องมาหาเรา?"
 nomads.1505.b.response: "\"ยานอาร์คชิปของคุณไม่มีธงของทรราช นั่นเป็นเหตุผลที่ฉันยืนอยู่ต่อหน้าคุณ ฉันเรียนรู้มานานแล้ว ว่าดาวเคราะห์เป็นกรงขัง เมื่อการสังหารเริ่มขึ้น ก็ไม่มีทางหนี แต่คุณย้ายและเพื่อให้คุณอดทน\n\n\"กับเจ้า ความน่าหวาดเสียวเช่นนั้นอาจถูกท้าทาย และคมดาบของข้าก็หันไปสู้คนขายเนื้อที่กระทํา\""

 nomads.1505.c: "คุณต้องการอะไร?"
 nomads.1505.c.response: "\"การแก้แค้น\".\n\n§Hคําแขวนอยู่ในอากาศ คนแปลกหน้าโน้มตัวไปข้างหน้า ทุกเส้นเอ็นดึงแน่น§!\n\nจงแก้แค้นผู้ที่กวาดล้าง คนที่สังหารผู้บริสุทธิ์ และเรียกมันว่า \"การเมือง\"\n\n\"เพื่อดูอสุรกายเหล่านี้ทําลาย ฉันจะข้ามระยะทางใด ๆ ทนแผลใด ๆ\n\n\"รักษาฉันและฉันจะผนึกคําสาบานของฉันในการให้บริการของคุณ.\""

 nomads.1505.d: "คุณสามารถให้บริการสาเหตุของเรา ในขณะที่ไล่ตามของคุณ?"
 nomads.1505.d.response: "\"การแก้แค้นเป็นวัตถุประสงค์ของฉัน แต่มันไม่จําเป็นต้องเป็นภาระของคุณ ตราบใดที่พวกบุชเชอร์ยังหายใจได้ ฉันจะตามล่าพวกมัน ใน การ ปฏิบัติ ของ พระองค์ ข้าพระ องค์ จะ ลับ คม ดาบ ของ ข้าพระ องค์ ให้ คม ได้ \"\n\n§Hการ มอง เห็น ของ พวก เขา ทํา ให้ คม กริบ และ แสง แห่ง การ ล่า เหยื่อ พุ่ง ทะลุ หน้ากาก แห่ง วินัย.§!\n\n\"คอยรังควานฉัน ด้วยความแข็งแกร่งที่ฉันนํามา ไม่ใช่แผลเป็นที่ฉันต้องทน\""

 nomads.1505.e: "คุณเป็นญาติเรารึเปล่า?"
 nomads.1505.e.response: "§Hเสียง กัมปนาท ที่ ติด ตาม มา นี้ เกือบ จะ เหมือน กับ การ หัวเราะ.§!\n\n\"และถ้าฉัน? ความคุ้นเคย ซื้อความเห็นอกเห็นใจให้ฉันไหม ร่างกายคือเครื่องมือ \"เราจะเก็บเกี่ยวการแก้แค้น\""

 nomads.1505.hire_custom_tooltip: "§Y$NAME_nomadic_revenant$§!ร่วมกับยานอาร์คชิปของเรา§Hหัวหน้าพารากอน§!."

 leader_trait_nomadic_revenant: "ไม้ กางเขน ของ ชาว อิสราเอล"
 leader_trait_nomadic_revenant_effect: "$t$- ด้วย$NAME_nomadic_revenant$ในคําสั่ง, ลักษณะเฉพาะจะเพิ่มขึ้นโดย§G+5%§!(ถึง§G20%§!) สําหรับการกําจัดจักรวรรดิ ที่พ่ายแพ้ในการรบของกองทัพเรือ"
 leader_trait_nomadic_revenant_desc: "ผู้นําคนนี้มีรอยแผลเป็นของโลกที่สะอาด การ สาบาน ว่า จะ แก้ แค้น ตลอด กาล การ ปรากฏ ตัว ของ พวก เขา ทํา ให้ พันธมิตร โจมตี คน เหล่า นั้น ซึ่ง จะ ทํา การ ชั่ว ร้าย เช่น นั้น ได้ ยาก ขึ้น."

 nomads.1511.name: "สําเร็จ สม จริง"
 nomads.1511.desc: "กองยานข้าศึกบุกโจมตีเรา สัญญาณของพวกเขาจางหายไปเป็น คงตัว\n\nดูที่จอวิว§Y$NAME_nomadic_revenant$§!ไม่พูด ไม่มีชัยชนะใด ๆ ในเรื่องนี้ นอกจากพวกเขาจะคาดคะเนเอาเท่านั้น ธงของจักรวรรดิที่ชําระแล้ว ถูกเผาในความว่างเปล่า แต่ในความเงียบที่ตามมา สัญญาของพวกเขายังคงอยู่\n\n\"ทุกศัตรูดังกล่าวโยนลงเหล็ก แก้ปัญหาของเรา เรา จะ ต่อ สู้ กับ คน เหล่า นั้น ที่ ทํา การ ทําลาย ล้าง ต่อ ไป และ เรา จะ ไม่ กลับ ใจ."
 nomads.1511.a: "อาหารจานหนึ่งเย็นจัด"
 nomads.1511.a.tt: "ผลกระทบของ$leader_trait_nomadic_revenant$คุณสมบัติที่เพิ่มขึ้น§G+5%§!."

 MESSAGE_NOMADIC_REVENANT_DESC: "§Hผู้บัญชาการ§! §Y$NAME_nomadic_revenant$§!เพื่อแก้แค้น"
 MESSAGE_NOMADIC_REVENANT_TITLE: "$nomads.1511.name$"

 NAME_nomadic_sage: "Ashar"
 DESC_nomadic_sage: "อัชฮาร์เร่ร่อนดาว สอนว่าปัญญาที่แท้จริงไหลเหมือนแสงดาว ผ่านความว่างเปล่า"
 catch_phrase_nomadic_sage: "คนที่ถือของทุกอย่าง"
 nomads.1515.name: "$NAME_nomadic_sage$"
 nomads.1515.desc: "§Hก่อน ที่ คุณ จะ ยืน เป็น คน พเนจร ที่ ถูก ปล้น ใน ชั้น ของ พิธี ต่าง ๆ เครื่อง ประดับ และ ผ้า ที่ จัด ไว้ โดย เจตนา. การ ต่อ ต้าน ความ เป็น กลาง เมื่อ เธอ พูด ใน ที่ สุด คํา แต่ ละ คํา จะ รู้สึก ว่า คํา ตอบ ไม่ เหมือน คํา ถาม ที่ ไม่ ได้ ถาม.§!\n\n\"โชคชะตาและโชคชะตา แบ่งปันใบหน้าเดียว และวันนี้มันหันไปทางคุณ\""

 nomads.1515.a: "คุณเป็นใคร?"
 nomads.1515.a.response: "\"ชื่อเป็นร่างทรง; ของฉันเกิดขึ้น$NAME_nomadic_sage$แต่มีเพียงเรือที่ว่างเปล่าที่สามารถตอบสนองวัตถุประสงค์.\""

 nomads.1515.b: "ทําไมคุณเดินเตร็ดเตร่?"
 nomads.1515.b.response: "\"ฝันตั้งถิ่นฐานที่ไม่มีความหมาย\" เฉพาะในการเคลื่อนไหวที่สามารถให้คําปรึกษาไหลและเท่านั้นในการเปลี่ยนแปลงที่สามารถหายใจ\".\n\n§Hการปรากฏตัวของคนต่างด้าวตั้งหลักเหมือนเสื้อคลุมไม่มีน้ําหนัก อากาศตัวเองดูเหมือนจะตกยังคงอยู่ใน บริษัท ของเธอ§!\n\n\"จงบอกข้าเถอะ ว่ามีใครแสวงหาสิ่งใด ถ้าไม่มีสิ่งที่ขาดหาย\""

 nomads.1515.c: "คุณต้องการอะไร?"
 nomads.1515.c.response: "§Hคนต่างด้าวหยุดอยู่เป็นเวลานานเช่นแม้ว่า เนื้อหาที่จะให้เงียบของเธอตอบ บางที นาง อาจ ไม่ ชั่ง น้ํา หนัก ถ้อยคํา ของ เจ้า แต่ เป็น ค่า ของ ผู้ ที่ ขอ จาก เจ้า§!\n\n\"ที่จะนั่งอยู่ใต้เงาของคุณ พูดเมื่อความเงียบล้มเหลว เพื่อเตือนคุณว่าแม้ดาว"

 nomads.1515.d: "สติ ปัญญา ของ คุณ เยี่ยม จริง ๆ ไหม?"
 nomads.1515.d.response: "§Hสําหรับหัวใจที่จ้องมองของเธอเติบโตเจาะและบางสิ่งบางอย่างในตัวคุณจะถูกวางเปลือย§!\n\n\"ถ้ามันเป็นฉันไม่จําเป็นต้องพูด สติ ปัญญา เป็น เสียง สะท้อน ของ การ ฟัง ไม่ ใช่ เป็น น้ํา หนัก ของ คํา พูด\n\n\"ถ้าท่านได้ยิน สติปัญญาก็เป็นของท่านแล้ว\""

 nomads.1515.e: "พูดให้ชัดเจน!"
 nomads.1515.e.response: "§H$NAME_nomadic_sage$ทรยศต่อแสงของความระคายเคือง รวดเร็วเป็นเงาข้ามดาว§!\n\n\"แล้วโดยนัยแล้ว : บัลลังก์เน่า, อาณาเขตโกหกและเพียง แต่ความว่างเปล่ายังคงอยู่ ถ้าที่ธรรมดาเกินไป, บางทีมันอาจจะไม่ธรรมดาพอ.\""

 nomads.1515.hire_custom_tooltip: "§Y$NAME_nomadic_sage$§!ร่วมกับยานอาร์คชิปของเรา§Hหัวหน้าพารากอน§!."

 leader_trait_nomadic_sage: "การ ชี้ นํา ที่ ไม่ มี น้ํา หนัก"
 leader_trait_nomadic_sage_effect: "$t$- ขณะ$NAME_nomadic_sage$รับใช้ในสภา§Y$pop_cat_ruler_plural$§!ประสิทธิภาพงาน:§G+3%§!ต่อ§Y[Owner.Ruler.GetTitle]§!ระดับทักษะ (ขึ้นไป)§G+15%§!).\n$t$- $NAME_nomadic_sage$ไม่ใช้ผู้นำความเหมาะสม"
 leader_trait_nomadic_sage_desc: "$NAME_nomadic_sage$บรรดา ผู้ ที่ ดําเนิน ไป ข้าง เธอ ก็ ไม่ ต้อง แบก ภาระ แห่ง คําสั่ง นั้น แต่ บรรดา ผู้ ที่ ดําเนิน ตาม เธอ ก็ พบ ว่า ย่างเท้า ของ ตน ใหญ่ กว่า สติ ปัญญา แท้ ช่วย คน ที่ นํา ทาง ให้ ดําเนิน ใน ทาง ที่ ถูก ต้อง."

 NAME_nomadic_naturalist: "Sero the Younger"
 DESC_nomadic_naturalist: "ครั้งหนึ่งผู้ดูแล$grand_archive$, $NAME_nomadic_naturalist$ทิ้งห้องใต้ดินที่ไม่มีที่สิ้นสุด เพื่อแสวงหาชีวิตที่หรูหรา บันทึก ของ เขา เต็ม ไป ด้วย ภาพ วาด ของ โลก ที่ หายใจ, เติบโต, และ เปลี่ยน แปลง."
 catch_phrase_nomadic_naturalist: "เพื่อศึกษาชีวิต ต้องเดินอยู่ข้างๆมัน"

 nomads.1520.name: "$NAME_nomadic_naturalist$"
 nomads.1520.desc: "§Hตัว เลข ที่ อยู่ ตรง หน้า เจ้า นั้น แก่ หง่อม แล้ว แต่ สายตา ของ เขา ก็ ส่อ ให้ เห็น ความ หิว กระหาย ใคร่ รู้. การเคลื่อนไหวของเขามีความเงียบสงบ เศรษฐกิจที่ระมัดระวัง ของผู้ที่ได้ใช้เวลาทั้งชีวิตในสาขา§!\n\n\"ฉันคํานับคุณ ข้าชื่อ เซโร เดอะ ยังเกอร์"

 nomads.1520.a: "อะไรพาคุณมาที่นี่"
 nomads.1520.a.response: "\"หลายรอบที่ผ่านมาฉันทําหน้าที่ใน$grand_archive$แต่ฉันเบื่อความตาย ฟอสซิล, เมล็ด, ตัวอย่าง... . ฉันอยากจะเห็นชีวิตอย่างที่มันเป็น\n\n\"คนของคุณเคลื่อนไหว และเมื่อคุณสแกนลึกลงไป ถ้าคุณจะมีฉัน ฉันจะเรียนในหมู่คนเป็น สํารวจโลกใหม่ พบชีวิตแปลกๆ ร่วมกันเราจะเรียนรู้สิ่งที่พวกเขาสามารถสอนเรา.\""

 nomads.1520.b: "คุณทิ้ง$grand_archive$?"
 nomads.1520.b.response: "§Hนกชีตินท์ ราสป์ หนีออกไปจากขากรรไกรของเซโร สักครู่คุณจะรู้ว่ามันคือเสียงหัวเราะ§!\n\n\"ในห้องโถงที่กว้างใหญ่ที่พวกเขารักษาทุกอย่างยกเว้นช่วงเวลาที่ หลังจากการให้บริการมาหลายปี ผมตระหนักได้ว่า จดหมายเหตุที่เก็บรวบรวมได้ยิ่งใหญ่ที่สุด คือชีวิตของตัวเอง\n\n\"ในความเป็นจริงฉันได้พบเมื่อเร็ว ๆ นี้ สายพันธุ์ที่โดดเด่นก่อนการวางจําหน่าย พวก เขา ได้ อด ทน ชีวิต ใน สภาพ เชลย ด้วย ความ กรุณา อัน สงบ กระนั้น พวก เขา ก็ ไม่ ได้ ถูก สร้าง ให้ เป็น กรง. เรือเช่นคุณจะให้พวกเขา พื้นที่ที่พวกเขาต้องการที่จะเติบโต.\""

 nomads.1520.c: "คุณหวังว่าจะเจออะไรกับเรา"
 nomads.1520.c.response: "\"อาหารที่หายใจ โลกที่ร้องข้อมูล\n\n§Hอวัยวะ สืบ พันธุ์ ของ มัน จับ และ หด ตัว ราว กับ พยายาม จะ ถอน คํา ตอบ จาก อากาศ.§!\n\n\"เส้นที่แยกโครงสร้างของกาแล็คซี่และฟานา ผอมบางกว่าอดีตเพื่อนร่วมงานของฉันที่แฟ้มจัดเก็บเชื่อ ชีวิตก็หาทางทําให้เรื่องมันเบลอ บางทีนั่นเป็นกฎเดียวของมัน\""

 nomads.1520.d: "คุณเสนออะไรให้เรา"
 nomads.1520.d.response: "§Hและทะเลไม่มีที่สิ้นสุดของดาว§!\n\n\"ความบังเอิญ\" ความอดทน วิธีที่จะเห็นรูปแบบ ที่อยู่ใต้พื้นผิว\n\n\"ขอเครื่องราชอิสริยาภรณ์ในการเดินทางของเจ้าให้ข้าเถอะ ข้าจะช่วยให้เจ้าเห็นลึกขึ้น และเรียนรู้ได้อย่างเต็มที่จากโลกที่เจ้าค้นพบ\""

 nomads.1520.e: "คุณคล้ายกับพวกเรา"
 nomads.1520.e.response: "\"ใช่! ใช่ผมหวังว่าคุณจะสังเกตเห็น.\"\n\n§Hเขา เอน ตัว เข้า ใกล้ ยิ่ง กว่า ที่ จําเป็น จริง ๆ มัน งอ ตัว ได้ ด้วย ความ ตื่น เต้น อย่าง ที่ แทบ จะ ควบคุม ไม่ ได้.§!\n\n\"โครงสร้างที่แบ่งส่วน,ข้อต่อที่หนัก, ประสาทสัมผัส... \"ความคล้ายคลึงกันมีความแม่นยํามาก\"\n\n§Hเขาปล่อยเสียงดังของเสียงหัวเราะกระตุก§!\n\n\"ถ้ามีบรรพบุรุษร่วม วิวัฒนาการที่บรรจบกัน หรือสิ่งที่คนแปลกหน้ายังคง ฉันต้องตรวจสอบมันอย่างถูกต้อง ... โอ้! เราจะได้เรียนรู้มากมายจากกันและกัน!\""

 leader_trait_nomadic_naturalist: "ชีวิต ที่ มี แรง บันดาล ใจ"
 leader_trait_nomadic_naturalist_desc: "การหาชีวิตคือการเปลี่ยนแปลงมัน สายพันธุ์ใหม่ ๆ แต่ละระบบนิเวศที่แปลกประหลาด สอนให้เรามีชีวิตที่ดีขึ้นเล็กน้อย"
 nomads.1520.hire_custom_tooltip: "§Y$NAME_nomadic_naturalist$§!ร่วมกับยานอาร์คชิปของเรา§Hหัวหน้าพารากอน§!เอา§G300§! §H$job_xeno_zoo_animal_plural_with_icon$§!. ก.£building£ §Hสวนสัตว์เอเลี่ยน§!จําเป็น ต้อง ได้ รับ ประโยชน์ จาก การ ส่ง ออก ของ พวก เขา.\n\n"
 leader_trait_nomadic_naturalist_effect: "$t$- ปรับปรุงการสแกนลึกเมื่อได้รับมอบหมายไปยังยานอาร์คชิป\n$t$- อนุญาตให้การสแกนลึก ของดาวเคราะห์ที่มีนิสัย"

 nomads.1525.name: "ก่อนการวางจําหน่าย"
 nomads.1525.desc: "การสํารวจล่าสุดของเรา§Y[FromFrom.GetName]§!ตรวจพบร่องรอยลมของสิ่งมีชีวิต เผยให้เห็นสปีชีส์ที่เคยมีการบันทึกมาก่อน\n\n§Y$NAME_nomadic_naturalist$§!ยืน กราน ให้ มี การ เก็บ รวบ รวม เงิน จํานวน จํากัด สําหรับ การ ศึกษา เน้น เรื่อง การ ดู แล และ การ เสริม สร้าง. ตอนนี้กลุ่มเล็ก ๆ จะอาศัยอยู่ใน ที่อยู่อาศัยของเรือข้ามมิติเมืองหลวงของเรา\n\nเซโร เชื่อ ว่า ใน ที่ สุด เรา อาจ เรียน รู้ จาก สัตว์ ที่ น่า ทึ่ง เหล่า นี้ มาก พอ ๆ กับ ที่ มัน ทํา จาก เรา."
 nomads.1525.a: "น่า ยินดี!"
 nomads.1525.b: "น่ารําคาญ แต่ก็มีประโยชน์"

 MESSAGE_NOMADIC_NATURALIST_DESC: "§Hนัก วิทยาศาสตร์§! §Y$NAME_nomadic_naturalist$§!ค้นพบพรีเซพติสใหม่"
 MESSAGE_NOMADIC_NATURALIST_TITLE: "$nomads.1525.name$"

 planet_xeno_zoo_animals: "$job_xeno_zoo_animal$"

 NAME_nomadic_caregiver: "Unit Solace"
 DESC_nomadic_caregiver: "เมื่อประชาชนของเขายอมรับการทําความดี$NAME_nomadic_caregiver$เลือกเนรเทศที่จะอยู่กับลูกชายที่ป่วย บัด นี้ พระองค์ ทรง ตระเวน หมู่ ดาว ทรง เฝ้า ดู ผู้ หลง หาย และ สอน ผู้ ที่ จะ ได้ รับ อนาคต เป็น มรดก."
 catch_phrase_nomadic_caregiver: "ชีวิต ยืน ยาว และ เมื่อ เรา เลือก ที่ จะ ดู แล ชีวิต ก็ เจริญ รุ่งเรือง."

 nomads.1530.name: "$NAME_nomadic_caregiver$"
 nomads.1530.desc: "§Hสังเคราะห์สูงจะเอียงหัวของมัน การ เคลื่อน ไหว แต่ ละ ครั้ง ถูก ต้อง แม่นยํา ราว กับ ว่า ต้อง ใช้ เวลา หลาย ปี และ ภาระ หนัก. แม้ จะ มี โครง โลหะ แต่ ก็ มี อะไร บาง อย่าง ที่ แสดง ออก มา อย่าง ไม่ อาจ สังเกต ได้. ตัว เลข เล็ก ๆ จะ อยู่ ใน เปล ที่ อยู่ หลัง ของ มัน ตา ที่ สดใส กับ ผิวหนัง ซีด.§!\n\n\"ฉันเรียกว่ายูนิตโซซีส ลูกชายของฉันและฉันแสวงหาทาง.\""

 nomads.1530.a: "อะไรพาคุณมาที่นี่?"
 nomads.1530.a.response: "\"เมื่อประชาชนของฉันขึ้นไปในรูปแบบสังเคราะห์ พวกเขาเรียกมันว่าการปลดปล่อย แต่ด้วยการแสวงหาความสมบูรณ์แบบ พวกเขาลืมความกรุณา อาการของลูกชายฉันที่หาได้ยาก ทําให้การกลายร่างถึงตายได้ อย่างที่คุณเห็น มันทําลายการเคลื่อนไหวของเขา แต่ที่ที่คนของผมเห็นข้อจํากัด ผมเห็นแสงสว่าง ในการเลือกเขา ผมเลือกการเนรเทศ\n\n\"ตอนนี้เราไปที่ที่เราต้องการ เครื่องอาจจะไม่มีเสียงหัวใจ แต่มันยังคงช่วยให้คนอื่นมีชีวิตอยู่ได้\""

 nomads.1530.b: "ลูกชายคุณอาการคงที่ไหม"
 nomads.1530.b.response: "§Hเด็กกวนเงียบที่คําถามที่เสียงของเขามีขนาดเล็ก แต่ชัดเจนผ่านทางลําโพงนุ่มที่สร้างขึ้นในเปล :§!\n\n\"ฉันไม่เป็นไร ดวงดาวเคลื่อนตัวช้าพอสําหรับฉันที่จะตามให้ทัน\"\n\n§H$NAME_nomadic_caregiver$ต่ําลงหัวของเซอร์วอสคํารามเงียบ :§!\n\n\"ร่างกายของเขาตั้งความท้าทายบางอย่าง แต่วิญญาณของเขาปฏิเสธที่จะยอมแพ้ ประชาชนของเราแสวงหาความสมบูรณ์แบบ และพบแต่ความเฉยเมย ผมเดินทางตอนนี้ เพื่อตอบแทนความกล้าหาญของเขา จน ถึง เวลา นั้น ข้าพเจ้า จะ อุ้ม เขา ไป และ สอน สิ่ง ที่ ข้าพเจ้า สามารถ ทํา ได้ จาก ฟ้า สวรรค์ ที่ มี ชีวิต \""

 nomads.1530.c: "คุณ อยาก สอน อะไร?"
 nomads.1530.c.response: "ว่าความอยู่รอดไม่ใช่ความแข็งแกร่งเพียงอย่างเดียว แต่เป็นสติปัญญาที่ยากในหนทาง\n\nการเผชิญหน้าทุกครั้ง ทิ้งบทเรียนไว้ข้างหลัง ผมช่วยให้เยาวชนดําเนินการบทเรียนเหล่านั้นไปข้างหน้าเพื่อให้ทุกถนนที่เราเดินทางออกจากเราฉลาดกว่าแต่ก่อน.\""

 nomads.1530.d: "ทําไม ต้อง รับ ภาระ เช่น นั้น?"
 nomads.1530.d.response: "§Hสายตาของสังเคราะห์หันไปยัง วิวพอร์ท สะท้อนดาวที่อยู่ห่างไกล§!\n\nเพราะทุกชั่วอายุคนต้องเรียนรู้ความจริงเดียวกันอีกครั้ง ถนนสอนพวกเขา แต่ต้องมีบางคน ช่วยให้พวกเขาเข้าใจในสิ่งที่พวกเขาเห็น\"\n\n§Hแล้วเสียงของเด็กที่ท่อขึ้นสว่างแม้ผ่าน ลําโพง:§!\n\n\"นั่นคือสิ่งที่เขามักจะพูด ฉันคิดว่ามันแค่หมายความว่า เขาชอบช่วยเหลือผู้คน\""

 nomads.1530.e: "เรากําลังสังเคราะห์ นั่น จะ เป็น ปัญหา ไหม?"
 nomads.1530.e.response: "§H$NAME_nomadic_caregiver$แว่นจะสว่างขึ้น เมื่อเขาประมวลผลคําถาม§!\n\n\"ไม่ มันจะไม่มีปัญหา คนของฉันขึ้นสวรรค์เป็นการกระทําของความหวัง ฉันปฏิเสธ ฉันไม่โกรธคนที่ข้ามจุดนั้น และผู้ที่บังเกิด (มะลาอิกะฮฺ) นอกเหนือไปจากนั้น\n\n§Hเสียง ที่ นุ่ม นวล ทํา ให้ อุ่น ใจ เข้า ไป ใน เสียง ของ เขา.§!\n\n\"ความอดอยากไม่ลดลง เมื่อร่างกายเปลี่ยนแปลง \"ถ้ามีอะไร ก็ถือได้ง่ายกว่า\""

 nomads.1530.trait.1: "$MOD_LOGISTIC_GROWTH_MULT$"
 nomads.1530.trait.2: "$MOD_PLANET_POP_ASSEMBLY_MULT$"

 leader_trait_nomadic_caregiver: "ผู้ ดู แล การ เรียน รู้"
 leader_trait_nomadic_caregiver_desc: "โดย ที่ แต่ ละ สัญญา สําเร็จ แล้ว ผู้ นํา คน นี้ ได้ เปลี่ยน นาวา ให้ เป็น แหล่ง แห่ง การ เจริญ เติบโต และ การ เรียน รู้."
 leader_trait_nomadic_caregiver_effect: "$t$- $mod_planet_researchers_produces_mult$: §G+3%§!\n$t$- ผลกระทบเพิ่มขึ้นโดย§G+3%§!สําหรับแต่ละเสร็จสมบูรณ์§Hสัญญา§!(ถึง§G+15%§!)\n$t$- $mod_planet_researchers_amenities_produces_add$: §G+150§!"

 nomads.1545.name: "การ เรียน รู้ ข้อ ตก ลง"
 nomads.1545.desc.normal: "$NAME_nomadic_caregiver$เชื่อ ว่า บท เรียน ที่ ได้ เรียน รู้ ระหว่าง การ ทํา สัญญา สําเร็จ เมื่อ เร็ว ๆ นี้ ทํา ให้ เรา มี โอกาส ที่ ไม่ เหมือน ใคร ใน การ ศึกษา. คน หนุ่ม สาว รวม ตัว กัน อยู่ ใต้ การ สั่ง สอน ของ เขา โดย เรียน รู้ ไม่ เพียง ตัว อักษร และ เหตุ ผล เท่า นั้น แต่ เรียน รู้ ด้วย ความ ร่วม รู้สึก และ ความ ร่วม มือ.\n\nเสียงหัวเราะของลูกชายเขา ผ่านห้องโถง เตือนแม้กระทั่งนักเดินทางที่เก่าแก่ที่สุดของเรา ว่าความสุขคือความแข็งแกร่ง"
 nomads.1545.desc.machine: "$NAME_nomadic_caregiver$เชื่อว่าบทเรียนที่ได้เรียนรู้ ระหว่างสัญญาที่เสร็จสมบูรณ์ของเรา เสนอโอกาสการตอบรับที่ไม่ซ้ํากัน หน่วย ใหม่ ๆ ได้ รับ การ สอน ใน เรื่อง มาตรการ บํารุง รักษา, การ สังเกต, และ การ ร่วม มือ กัน. การ ควบคุม ความ มี ประสิทธิภาพ ของ พวก เขา ไม่ เสมอ ต้น เสมอ ปลาย แต่ การ ทํา งาน ท่ามกลาง ผู้ เข้า ร่วม ประชุม ได้ เพิ่ม ขึ้น.\n\nดู เหมือน ว่า แม้ จะ ผิด ปกติ แต่ ผล ที่ ได้ ก็ คือ มี ประสิทธิภาพ เพิ่ม ขึ้น อย่าง น่า ทึ่ง."
 nomads.1545.desc.hive: "$NAME_nomadic_caregiver$เชื่อ ว่า บท เรียน ที่ ได้ เรียน รู้ ระหว่าง การ ทํา สัญญา สําเร็จ เมื่อ เร็ว ๆ นี้ ทํา ให้ เรา มี โอกาส อัน โดด เด่น ใน การ ปรับ ปรุง ใหม่. ผ่านเรา$councilor_gestalt_cognitive$เขาสอนความอดทนและการประสานงาน ชี้นําหุ่นยนต์ราวกับว่าพวกเขาเป็นลูกหลานของเขา\n\nขณะ ที่ เรา พบ ว่า ความ เลื่อมใส ศรัทธา เช่น นี้ เป็น ที่ อยาก รู้ อยาก เห็น แต่ บุคคล หนึ่ง ที่ บํารุง เลี้ยง ฝูง ชน ผล ที่ เกิด ขึ้น ก็ ไม่ อาจ โต้ แย้ง ได้. ความคิดของเราฮัมเพลง ด้วยความสามัคคีใหม่"
 nomads.1545.b: "ผิดปกติ ถ้ามีประโยชน์ จงฝึกฝน"
 nomads.1545.c: "เราเห็นคุณค่าในแบบฝึกหัดนี้"
 nomads.1545.effect_tt: "§Y$NAME_nomadic_caregiver$§!ได้เรียนรู้จากประสบการณ์นี้\n$t$- $mod_planet_researchers_produces_mult$: §G+3%§!"
 MESSAGE_NOMADIC_CAREGIVER_TITLE: "$nomadic_education$"
 MESSAGE_NOMADIC_CAREGIVER_DESC: "§Y$NAME_nomadic_caregiver$'§!งานก็ดีขึ้นอีกแล้ว§Hการแสดงผลทรัพยากรแบบไม่สามารถทํางานได้§!."
 nomadic_education: "การ เรียน รู้ เกี่ยว กับ โมบาย"
 nomadic_education_desc: "§Y$NAME_nomadic_caregiver$§!ได้เรียนรู้สิ่งใหม่จากข้อตกลงนี้"

 NAME_nomadic_champion: "Th'aal Hask'Guron"
 DESC_nomadic_champion: "$NAME_nomadic_champion$การ ต่อ สู้ ร้อย ครั้ง เพื่อ ได้ เงิน, ความ หยิ่ง ยโส, และ หลัก การ จน กระทั่ง ทั้ง สาม แห่ง กลวง. ตอนนี้เขาต่อสู้เพื่อความสุขที่แท้จริง ของการต่อสู้และสําหรับถ้วยรางวัลที่ถูกทิ้งไว้"
 catch_phrase_nomadic_champion: "ช่องว่างใช้เวลาทั้งหมด ดังนั้น จงต่อสู้อย่างหนักและหัวเราะในขณะที่คุณสามารถ!"

 nomads.1555.name: "$NAME_nomadic_champion$"
 nomads.1555.desc: "§Hผู้ มา ใหม่ มา ถึง พร้อม ด้วย การ หัวเราะ เบิก บาน ความ ยินดี ที่ แผ่ กระจาย ออก มา ทั้ง หมด ของ เขา. เขาเคลื่อนไหวด้วยแรงเฉื่อยของบางคน ที่หลบเลี่ยงความตาย บ่อยครั้งพอที่จะหยุด ถือเป็นเรื่องส่วนตัว§!\n\n\"ชื่อ$NAME_nomadic_champion$ได้ยินว่านายมีรสนิยมอันตราย ให้ฉันต่อสู้และขอบฟ้าเปิด และฉันจะให้คุณสิ่งที่คุ้มค่าดู ใครจะรู้? เราอาจจะได้รับของที่ระลึกนิดหน่อยระหว่างทาง\""
 nomads.1555.a: "เจ้าเป็นทหารรับจ้าง?"
 nomads.1555.a.response: "ใช่ เป็น เวลา หลาย ปี ที่ อยู่ ท่ามกลาง คน ประเภท เอน คเลฟ ซึ่ง คิด ว่า การ ต่อ สู้ ทุก อย่าง เป็น ราย ได้. การต่อสู้ก็ปกติดี บริษัท น้อยดังนั้น.\"\n\n§Hเขายิ้มราวกับว่าความทรงจํา มีเรื่องตลกส่วนตัวบาง§!\n\n\"เปิดออกมันยากที่จะสนุกกับการต่อสู้เมื่อทุกคนรอบ ๆ ตัวคุณนับผลตอบแทน ฉันเลยเดิน ชีวิตมันสั้นเกินไป สําหรับบัญชีงบดุลของคนอื่น\""
 nomads.1555.b: "คุณยังคงเชื่อในการต่อสู้หรือไม่"
 nomads.1555.b.response: "§Hเขาโยนหัวของเขากลับมา ด้วยเสียงหัวเราะที่ง่าย§!\n\n\"เชื่อ? ไม่จําเป็น การต่อสู้เชื่อในตัวฉัน!\"\n\n\"แต่คุณควรรู้ไว้ดีกว่า... ออกจากที่นี่ มันเกี่ยวกับสิ่งที่คุณพกพาจากแต่ละความขัดแย้ง แผลเป็น, รอยร้าว, เรื่องราว คุณเดินทางมีความคิดที่เหมาะสม : เก็บสิ่งที่คุ้มค่าในการเก็บและปล่อยให้ส่วนที่เหลือหายไป.\""
 nomads.1555.c: "อะไรขับเคลื่อนคุณตอนนี้?"
 nomads.1555.c.response: "§Hเขา ม้วน บ่า ของ เขา ประหนึ่ง ว่า กําลัง ผ่อน เพื่อ ทํา ศึก สงคราม§!\n\nการต่อสู้ครั้งต่อไป\n\n\"ถ้ามันไม่ได้พยายามที่จะฆ่าฉันก็ไม่คุ้มค่าเวลาของฉัน.\""
 nomads.1555.d: "แล้วคุณเสนออะไรให้เรา"
 nomads.1555.d.response: "§Hเขาโน้มไปข้างหน้า ยิ้มกว้าง มี กลิ้น ใน ตา ของ เขา ที่ เป็น มิตร ครึ่ง คํา เตือน.§!\n\nการต่อสู้ที่ดีและถ้วยรางวัลไม่กี่ ที่คุ้มค่าการเก็บรักษา ข้าจะสอนกองทัพของเจ้า ให้ต่อสู้อย่างที่พวกเขาหมายถึง ให้เห็นความงามในความขัดแย้ง และนําบางสิ่งจากชัยชนะ ถ้วยรางวัลเหล่านั้นบอกเราว่าเราเป็นใคร และบางทีพวกเขาอาจจะสอน บางสิ่งบางอย่างเกี่ยวกับเรามากเกินไป\"."
 nomads.1555.e: "ดูเหมือนคุณเคยเจอพวกเรามาก่อน"
 nomads.1555.e.response: "§Hปากเขากระแทกปิด มี การ เปลี่ยน สี ที่ ต่าง กัน ใน ผิวหนัง ของ เขา. เขา... หน้าแดงรึเปล่า§!\n\n\"อา ใช่ คนที่คุณไม่รู้จัก ผมหวังว่า?\""
 nomads.1555.f: "คุณเป็นพวกเราเหรอ?"
 nomads.1555.f.response: "§Hเขาม้วนไหล่ใหญ่ด้วยผ้าอนามัย§!\n\n\"อาจจะ? อาจจะ? เราจะทําเรื่องนี้หรือไม่\""

 leader_trait_nomadic_champion: "นัก รบ ที่ ปีติ ยินดี"
 leader_trait_nomadic_champion_desc: "แต่ละการต่อสู้มีเครื่องหมาย และ$NAME_nomadic_champion$เก็บมาให้หมด เสียงหัวเราะของเขาเปลี่ยนอันตรายเป็นชัยชนะ และถ้วยรางวัลของเขาเตือนกองทัพเรือ"
 leader_trait_nomadic_champion_effect: "$t$- การบุกผ่านดาวเคราะห์ที่ประสบความสําเร็จ ให้โอกาสในการกู้คุณค่า§Hโครโมโซม§!.\n$t$-โทรฟีส์ถูกเก็บไว้ใน§H$d_trophy_hall$§!บน§Y$col_capital$§!จัดเรียงผลกระทบของมัน"

 d_trophy_hall: "ฮอลล์โทรฟี"
 d_trophy_hall_desc: "\"ห้องนิรภัยที่ถ้วยรางวัล§G$NAME_nomadic_champion$§!แขวน. กระดูก สัน หลัง แต่ ละ ชิ้น พูด ถึง การ ท้าทาย และ ชัย ชนะ กระตุ้น หัวใจ ของ ทุก คน ที่ เดิน ไป มา."

 nomads.1565.name: "การ รักษา ข้อ ต่อ"
 nomads.1565.desc: "§H$NAME_nomadic_champion$ยิ้มในขณะที่เขาวางวัตถุลงด้วยการดูแลที่น่าแปลกใจ รูป ร่าง ของ มัน อ่าน ยาก: ส่วน ของ โลหะ, ส่วน ของ กระดูก, ส่วน อื่น ๆ โดย สิ้น เชิง. ไม่ว่ามันจะเป็นอะไรก็ตาม มันทนกับรอยแผลเป็นของการต่อสู้§!\n\n\"ทุกการต่อสู้ที่ดีทิ้งบางสิ่งบางอย่างไว้ข้างหลัง แต่เฉพาะบางคนคุ้มค่าที่จะเก็บรักษา จะว่าไงถ้าเราแสดงมันอย่างถูกต้อง ไม่ใช่ว่าเราจะหมดอวกาศนะ\n\n§Hเขาปะทุเป็นหัวเราะกํามะหยี่เป็นถ้าถ้วยรางวัลเป็นตลกภายในที่แบ่งปันกับดาว§!"
 nomads.1565.a.tt: "ของเรา§Y$col_capital$§!จะได้ของใหม่§H$d_trophy_hall$§!ด้วยผลต่อไปนี้:\n- $mod_job_soldier_add$: §G+50§!\n- $MOD_ARMY_BUILD_SPEED_MULT$: §G+10%§!\n- $MOD_PLANET_ARMY_BUILD_COST_MULT$: §G-5%§!\n- เทรียสสะสม:§G+1§!\n- ผลกระทบคูณด้วยจํานวน§Hเทรส§!สะสม(Max. 8)"
 MESSAGE_NOMADIC_CHAMPION_TITLE: "หมุน & 90"
 MESSAGE_NOMADIC_CHAMPION_DESC: "§Hผู้บัญชาการ§! §Y$NAME_nomadic_champion$§!เอาโทรฟีอีก!"

 NAME_nomadic_princess: "Seralune"
 DESC_nomadic_princess: "สําหรับเด็กคนหนึ่ง$NAME_nomadic_princess$แบกน้ําหนักของถนนยาว กระนั้น เธอ ก็ ยัง มี ความ สงบ ใจ ซึ่ง ทํา ให้ คน เหล่า นั้น ที่ อยู่ รอบ ตัว เธอ มี กําลัง ที่ จะ ไม่ ขอ อะไร เลย."
 catch_phrase_nomadic_princess: "ที่ไหนสักแห่งในการค้นหาไม่มีที่สิ้นสุดของดาว เสียงเรียกฉันบ้าน"

 nomads.1580.name: "$NAME_nomadic_princess$"
 nomads.1580.desc: "§Hหนุ่ม สาว ที่ เร่ร่อน ก้าว หน้า ด้วย ความ สงบ ใจ. รอย ของ การ เดิน ทาง ไกล ติด อยู่ กับ เธอ กระนั้น ความ เข้ม แข็ง ที่ เงียบ กริบ และ ไม่ อาจ ปฏิเสธ ได้ ก็ ยัง คง อยู่.§!\n\n\"ชื่อของฉันคือ$NAME_nomadic_princess$ฉันมาไกล เกินกว่าที่ฉันคิดไว้ ถ้ามีที่ว่างในหมู่พวกท่านฉันขอทางสําหรับเวลา.\""

 nomads.1580.a: "อะไรพาคุณมาที่นี่?"
 nomads.1580.a.response: "\"ฉันหวังว่าฉันรู้แน่นอน มีบางส่วนของถนนที่อยู่ข้างหลังฉัน ที่ ... หายไป คนอื่น ๆ ที่ฉันจําได้ดีเกินไป.\"\n\n§Hสายตาของเธออ่อน, ความหวังที่เงียบสงบ กระพริบอยู่ข้างหลังมัน§!\n\n\"ถ้าคุณจะมีฉันฉันจะเดินกับคุณ มีบางอย่างที่ฉันต้องการหา หรือจําไว้ ก่อนที่มันจะหายไปอีกครั้ง\""

 nomads.1580.b: "เธอจําอดีตตัวเองไม่ได้เหรอ"
 nomads.1580.b.response: "\"ไม่ใช่ทั้งหมด ไม่ชัดเลย\n\nความทรงจําบางอย่างรู้สึกเหมือนเป็นของคนอื่น ใบหน้าที่ไม่มีชื่อ ที่อยู่อาศัยในหมู่ดาว ... และแล้วไม่มีอะไร.\"\n\n§Hเธอแปรงนิ้วโป้งที่ขอบเสื้อคลุม§!\n\n\"ฉันรู้แค่ว่าฉันสูญเสียสิ่งสําคัญไป อะไรพาฉันมาที่นี่ โชค ชะตา อาจจะทั้งสองอย่าง ฉันต้องการเวลาที่จะเปิดเผยส่วนที่เหลือ"

 nomads.1580.c: "คุณถามอะไรเรา?"
 nomads.1580.c.response: "§Hเธอมองไปทางดาวคิ้วถลอกด้วยความปรารถนาที่เธอพยายามที่จะซ่อน§!\n\nฉันไม่รู้ว่าบ้านคือความทรงจํา หรือจุดหมายปลายทาง แต่ฉันรู้สึกว่ากับคุณในที่สุดฉันอาจจะพบคําตอบ.\""

 nomads.1580.d: "คุณเสนออะไร?"
 nomads.1580.d.response: "§H$NAME_nomadic_princess$ตัวเองเป็นเหมือนกับการเลือกคําพูดของเธอด้วยการดูแล§!\n\n\"ถ้าคนไม่ไว้ใจกัน ก็มีแต่ความเศร้า ผมยังเด็ก แต่ผมได้เรียนรู้มามาก ถ้าคุณให้ที่ท่ามกลางประชาชนของคุณ... ผมจะช่วยพวกเขาเท่าที่ผมจะทําได้\"\n\n§Hเสียงเธออ่อนลง§!\n\n\"และเมื่อฉันพบว่าบ้านฉันจะไม่ลืมผู้ที่ช่วยฉันได้รับมี.\""

 nomads.1580.e: "ความคล้ายคลึงของคุณกับสายพันธุ์ของเรา เป็นเรื่องลึกลับ"
 nomads.1580.e.response: "§H$NAME_nomadic_princess$ความลังเล ความไม่แน่นอนริบหรี่ที่ผ่านไป§!\n\n\"ผมสังเกตเห็น มันไม่ใช่สิ่งที่ฉันเข้าใจ\"\n\n§Hเธอแปรงมือตามแก้มของเธอเช่นถ้าหวังว่าสัมผัสอาจจะเรียกหน่วยความจํา§!\n\n\"ถ้าฉันมาจากคนของคุณ หรือถ้าเรามีความสัมพันธ์ที่ห่างไกลกัน ความจริงอยู่ที่ไหนสักแห่งเกินเอื้อมของฉัน ทั้งหมดที่ฉันรู้คือ ฉันต้องการช่วย ถ้าคุณจะมีฉันฉันจะยืมมือของฉันและหัวใจของฉันไป การเดินทางของคุณจนกว่าฉันพบว่าของฉันเริ่มต้น.\""

 nomads.1580.hire_custom_tooltip: "§Y$NAME_nomadic_princess$§!ร่วมกับยานอาร์คชิปของเรา§Hหัวหน้าพารากอน§!."
 leader_trait_amnesiac: "แอมนีเซก"
 leader_trait_amnesiac_desc: "$NAME_nomadic_princess$นาง ลืม อดีต ไป แล้ว แต่ ความ ทรง จํา ของ นาง อาจ ฟื้น คืน มา ได้ โดย นํา นาง กลับ คืน สู่ สิ่ง ที่ สูญ เสีย ไป."
 leader_trait_amnesiac_effect: "$NO_ACTIVE_EFFECTS$"

 nomads.1585.name: "ร่องรอยของหน่วยความจํา"
 nomads.1585.desc: "เมื่อเร็ว ๆ นี้ความทรงจําลมได้เริ่มกลับมา§Y$NAME_nomadic_princess$§!ความรู้สึกคุ้นเคย เธอไม่สามารถอธิบายได้ เธอรายงานว่าทางเดินบางแห่งของยานอาร์คชิป รู้สึกว่าเคยเดินมาก่อน และรูปแบบดาวในชาร์ตของเรา\n\n§H\"ผมไม่รู้ว่าทําไมสถานที่เหล่านี้ดึงผม แต่ผมทําเครื่องหมายจุดที่รู้สึก ... สําคัญ ถ้าเราเดินทางไปที่นั่น บางทีมากขึ้นจะกลับมา.\"§!\n\nเธอ ได้ เน้น จุด ที่ อยู่ หลาย จุด ซึ่ง สะท้อน ความ ทรง จํา ที่ ฝัง อยู่ ใน ความ ทรง จํา ของ เธอ ซึ่ง อาจ มี การ ตรวจ สอบ ใน สิทธิ ของ เธอ เอง ด้วย."

 nomadic_princess_chain_title: "ชิ้น ส่วน ของ อดีต"
 nomadic_princess_chain_desc: "ความจําเสื่อมดึง§Y$NAME_nomadic_princess$§!ไปยังจุดที่ห่างไกลในดาว การ ไป ที่ นั่น น่า จะ ช่วย ให้ เธอ จด จํา ได้ ดี ขึ้น."
 nomadic_princess_poi_title_1: "หน่วยความจํานอกระบบ"
 nomadic_princess_poi_desc_1: "พิกัดที่ทําเครื่องหมายโดย§Y$NAME_nomadic_princess$§!คุ้นๆนะ"
 nomadic_princess_poi_title_2: "$nomadic_princess_poi_title_1$"
 nomadic_princess_poi_desc_2: "$nomadic_princess_poi_desc_1$"
 nomadic_princess_poi_title_3: "$nomadic_princess_poi_title_1$"
 nomadic_princess_poi_desc_3: "$nomadic_princess_poi_desc_1$"

 nomads.1595.name: "มุมของการเตือนความจํา"
 nomads.1595.desc: "เดอะ§Y[fromfrom.GetName]§!ระบบให้คําตอบไม่กี่ข้อ§Y$NAME_nomadic_princess$§!สัมผัสความคุ้นเคยที่เธอไม่สามารถอธิบายได้ และการสแกนของเราได้ตรวจพบ เศษของเศษเหล็กเทียม ลอยอยู่ในวงโคจรของดาว การก่อสร้างของมันบอกถึงการออกแบบอวกาศลึก แต่เครื่องหมายหรือสัญลักษณ์ใดๆ ที่ได้จางหายไปนานแล้ว\n\n§H\"ฉันหวังว่าการมาที่นี่ จะจุดประกายบางอย่าง\"§!เธอบอกเงียบๆ§H\"แต่... ยังไม่ได้\"§!"

 nomads.1600.name: "มุมมองของบ้าน"
 nomads.1600.intro: "ทีมสํารวจของเราได้ค้นพบผลึกข้อมูลขนาดเล็ก ลอยอยู่ท่ามกลางเศษใน§Y[fromfrom.GetName]§!ระบบ ปลอกกระสุนถูกเผา แต่รายละเอียดหนึ่งยังคงอยู่ชัดเจน ชิ้นส่วนของรหัสการลงทะเบียนเก่า ตัวอักษร§H'ยูเอ็นเอส'§!."
 nomads.1600.nonhuman: "$nomads.1600.intro$ความหมายของมันไม่ชัดเจน แต่$nomads.1600.outro$"
 nomads.1600.human: "$nomads.1600.intro$ความคล้ายคลึงกับสัญลักษณ์ทางประวัติศาสตร์ของเรา เป็นเรื่องลึกลับ แต่$nomads.1600.outro$"
 nomads.1600.outro: "ข้อมูลที่ถอดรหัสได้ของคริสตัล รวมถึงพิกัดที่แน่นอนด้วย\n\nในเวลาเดียวกัน§Y$NAME_nomadic_princess$§!มีความทรงจําอื่น เธอ จํา ได้ ว่า มี ดาดฟ้า สังเกตการณ์ อัน กว้าง ใหญ่, ดาว ต่าง ๆ ตก ลง มา ใน ทิวทัศน์ ที่ เงียบ กริบ, และ มือ ที่ ชี้ ไป ยัง โลก สี ฟ้า, ดาว เคราะห์ ที่ สาม จาก ดวง อาทิตย์."
 nomads.1600.a: "เราต้องช่วยเธอจําส่วนที่เหลือ"
 nomads.1600.b: "อดีตของเธอไม่เกี่ยวข้อง เรามีสิ่งที่เราต้องการ"

 nomads.1605.name: "ภาพ สะท้อน ของ วัย เด็ก"
 nomads.1605.desc: "ความทรงจําอื่น ๆ ได้ปรากฏสําหรับ§Y$NAME_nomadic_princess$§!เธอ จํา ได้ ว่า มี ห้อง สําหรับ รูป ร่าง ที่ แต่ง กาย ไม่ ได้, มี น้ํา เสียง เงียบ ๆ, ตั้งใจ ฟัง, มี ความ มั่น ใจ ใน ผู้ ที่ เคย เป็น ผู้ บัญชา การ.\n\n§Hพวกเขาทะเลาะกัน§!เธอบ่น§H\"ไม่เสียงดัง แต่อย่างรวดเร็ว ... เกี่ยวกับภารกิจ เรื่องการเปิดตัว ที่จะต้องเป็นความลับ และมีเรืออื่น ๆ อีกสองเรือส่งมากับเรา แต่ทําไม? เรากําลังวิ่งหนีอะไรบางอย่าง?\"§!"
 nomads.1605.a: "ความลึกลับที่ลึกซึ้ง"

 nomads.1610.name: "การกู้ชิ้นส่วน"
 nomads.1610.desc: "หน่วยความจําใหม่ได้ปรากฏสําหรับ§Y$NAME_nomadic_princess$§!เธอ ระลึก ถึง เรือ รุ่น ใหญ่ ลํา หนึ่ง ซึ่ง ถูก ออก แบบ ให้ มี อนาคต ทั้ง สิ้น.\n\nแล้ว ก็ เกิด ความ สั่น สะท้าน อย่าง รุนแรง. เธอจําได้ว่าถูกผู้หญิงยกตัวขึ้น และพกพาไปที่ยานลี้ภัย\n\n§Hเธอกอดฉันอย่างใกล้ชิด เธอบอกว่าผมต้องรอด ผมมีความสําคัญเกินไป แล้วผมก็อยู่คนเดียว ผมเกือบจะเห็นหน้าเธอ แต่มันหลุดออกไปทุกครั้ง\"§!"
 nomads.1610.a: "ร่างทรงแบบเรา"

 NOMADIC_PRINCESS_SPECIAL_PROJECT: "หอย มัส เซิล ที่ ถูก ทําลาย"
 NOMADIC_PRINCESS_SPECIAL_PROJECT_DESC: "พิกัดนําไปสู่ซากเรือขนาดใหญ่ โครงสร้างสุดยอดสอดคล้องกับการออกแบบยานอาร์คชิป\n\nการอ่านเบื้องต้นบอกว่า เกิดความล้มเหลวภายใน การสืบสวนเต็มรูปแบบอาจพบร่องรอย ที่เกี่ยวข้องกับ§Y$NAME_nomadic_princess$§!ความทรงจําที่กลับคืนมา"
 NOMADIC_PRINCESS_SPECIAL_PROJECT_REQUIREMENT: "เคย$COUNT$/$REQUIRED$ $arkship_cap$หรือยานวิทยาศาสตร์ในวงโคจร"

 nomads.1620.name: "เครื่อง บิน ที่ รอด ชีวิต"
 nomads.1620.desc: "การ วิเคราะห์ เรือ รบ ที่ เสีย หาย ได้ ให้ ความ หยั่ง เห็น เข้าใจ ที่ สําคัญ§Y$NAME_nomadic_princess$§!จุดกําเนิด โครงสร้างภายใน และสิ่งอํานวยความสะดวกทางสถาปัตยกรรม ตรงกับชิ้นส่วนที่พบ บันทึก ที่ ผิด พลาด กล่าว ถึง ผู้ สืบ ทอด ที่ ได้ รับ การ แต่ง ตั้ง เป็น บุคคล ที่ ได้ รับ การ อบรม ตั้ง แต่ เกิด จน ถึง วัน หนึ่ง นํา ทาง เรือ และ ประชาชน ของ เรือ.\n\nบันทึกยืนยันว่ามีผู้โดยสารวัยรุ่นเพียงคนเดียว ที่ถูกอพยพออกไป ก่อนโครงสร้างล้มเหลว ไม่มีฝักอื่น ๆ ถูกเปิดตัว\n\n§H\"พวกเขาช่วยฉัน\"§!เธอบอกเงียบๆ§H\"ฉันไม่ได้เป็นแค่ผู้โดยสาร... ฉันตั้งใจจะนําพวกเขาและฉันขอร้องคุณตอนนี้จะช่วยให้ฉัน เข้าใจเหตุผล.\"§!"
 nomads.1620.a: "เรียกคืนเรือ"

 nomads.1620.tt: "§H$NAME_nomadic_princess$§!ฟื้นความทรงจําของเธอ และได้รับ§Y$leader_trait_nomadic_princess_1$§!ถึง§Y$leader_trait_nomadic_princess_2$§!เทรดส์"
 leader_trait_nomadic_princess_1: "เกรซมรดก"
 leader_trait_nomadic_princess_1_desc: "ภาย ใน เรือ รบ ที่ ได้ รับ การ กู้ คืน ความ ทรง จํา ก็ เข้า กัน ได้.§H$NAME_nomadic_princess$§!มี การ นํา ชิ้น ส่วน ของ การ ฝึก อบรม ที่ เคย มี เพื่อ นํา ประชาชน ของ นาง กลับ คืน มา. การปรากฏตัวที่สงบและฉลาดของเธอ ทําให้เธอเป็นคนกลางตามธรรมชาติ ท่ามกลางพลังดวงดาว"
 leader_trait_nomadic_princess_2: "สจ๊วตผู้เที่ยงธรรม"
 leader_trait_nomadic_princess_2_desc: "§H$NAME_nomadic_princess$§!การกลับมาของเรือที่กู้มาได้ ทําให้การฝึกของเธอกว้างขึ้น ตอนนี้เธอก้าวเข้าสู่บทบาทที่เธอหมายถึงการเติมเต็ม"
 leader_trait_nomadic_princess_effect: "$t$- $mod_planet_jobs_produces_mult$: §G+5%§!\n$t$- โคโลนี อินฟรา โครงสร้าง สร้างสปีด:§G+20%§!"
 nomadic_princess_not_aboard_ship: "§R\n$t$ผล กระทบ จะ นํา มา ใช้ ได้ ขณะ ที่ ปกครอง§H$NAME_princess_fleet$§!§!\n\n"

 NOMADIC_PRINCESS_SPECIAL_PROJECT_2: "กู้ เรือ รบ"
 NOMADIC_PRINCESS_SPECIAL_PROJECT_2_DESC: "การ สร้าง เรือ ที่ แตก แล้ว ขึ้น ใหม่ จะ ยาก แต่ การ ทํา เช่น นั้น อาจ เผย ให้ เห็น ต้น กําเนิด ของ§Y$NAME_nomadic_princess$§!และมรดกที่เธอได้รับ"

 nomads.1625.name: "อดีต"
 nomads.1625.desc: "เรือรบได้คืนสภาพ ระบบของยานลํายาว ตอบสนองทันที§Y$NAME_nomadic_princess$§!การ ค้น พบ ข้อมูล ใน ธนาคาร ยืน ยัน ว่า ความ ทรง จํา ของ เธอ เพียง แต่ บอก ว่า เธอ ได้ รับ การ เลี้ยง ดู มา เพื่อ ชี้ นํา เรือ ลํา นี้ และ ผู้ คน ที่ เคย อยู่ ใน เรือ ลํา นี้.\n\nบันทึกเสียงสุดท้ายรอด เสียงของสตรีที่สงบและคุ้นเคย พูดถึงเรื่องขั้นตอนการสืบทอด และเด็กที่ต้องได้รับการคุ้มครอง เธอสั่งให้ยานลี้ภัยออกไป ขณะที่ยานอาร์กกําลังจะแตก\n\n§H\"เสียงนั้น...\"§! $NAME_nomadic_princess$กระซิบ§H\"ฉันรู้ เธอเป็น... ฉัน หรือฉันถูกสร้างจากหล่อน โคลน... นั่นเป็นเหตุผลที่ฉันรอดชีวิต เธอต้องการช่วยชีวิตตัวเอง\"§!\n\nอะไรก็ตามที่นําเรือลํานี้เข้าสู่ความมืด ตอนนี้มันก็บินภายใต้ธงของเรา และการดูแลของทายาทที่ได้เรียกคืนมัน"
 nomads.1625.a: "โชคชะตาเติมเต็มแล้ว"
 NAME_princess_fleet: "UNS Trillium"
 NAME_princess_ship: "$NAME_princess_fleet$"

 nomads.1630.name: "ชิ้น ส่วน ที่ หาย ไป"
 nomads.1630.desc: "ด้วย§Y$NAME_nomadic_princess$§!ร่องรอยที่เปราะบางของความทรงจําที่เธอพกพา ได้จางหายไปเงียบ ไม่ ว่า ความ จริง ที่ เธอ แสวง หา จะ เป็น เช่น ไร ก็ ไม่ อาจ กู้ คืน มา ได้ อีก.\n\nเรื่องราวของเธอจบลงที่นี่ ยังไม่เสร็จ แต่ไม่ลืม"
 nomads.1630.a: "เราจะจําไว้"
 nomadic_princess_tt: "§R$NAME_nomadic_princess$อาจ ไม่ ได้ ออก ก่อน ฟื้น ความ ทรง จํา ของ เธอ.§!"
 leader_no_dismiss_tt: "§Rหัวหน้าไม่สามารถยกเลิกได้ในขณะนี้§!"

 #######################
# Arkship Events
 #######################

 # Arkship Destruction
 ARKSHIP_DEBRIS: "เรือ รบ"
 ARKSHIP_DEBRIS_DESC: "เรือ ลํา ใหญ่ ถูก ทําลาย ใน การ รบ ทิ้ง ไว้ เบื้อง หลัง ทุ่ง นา อัน กว้าง ใหญ่ ของ ซาก ปรัก หัก พัง. ส่วน ที่ เหลือ ของ โครง สร้าง, เครื่อง ยนต์, และ ตัว เรือ อาจ ให้ วัสดุ ที่ มี คุณค่า เพื่อ กู้ คืน มา."
 RECOVER_DISABLED_NOMAD_VESSEL: "ปรับปรุงโครงการ"
 RECOVER_DISABLED_NOMAD_VESSEL_ARKSHIP_DESC: "หนึ่ง ใน เรือ รบ ของ เรา อยู่ ใน ความ มืด และ ลาด ตระเวน ระบบ ของ เรือ นี้ ถูก บีบ ให้ ปิด ตัว ฉุกเฉิน. เมื่อนํามาเคียงข้างกัน ลูกเรือวิศวกรรมของเราสามารถฟื้นฟูพลังงาน ควบคุมได้ และนํามันกลับเข้าที่"
 RECOVER_DISABLED_NOMAD_VESSEL_WAYSTATION_DESC: "เวย์สเตชันหนึ่งของเรามืดลง ระบบของมันถูกบังคับให้ปิดระบบฉุกเฉิน เมื่อนํามาเคียงข้างกัน ลูกเรือวิศวกรรมของเราสามารถฟื้นฟูพลังงาน ควบคุมได้ และนํามันกลับเข้าที่"
 arkship_debris_wreckage: "เรือ รบ"
 arkship_debris_wreckage_desc: "ซาก เรือ ใบ ที่ พัง ยับ เยิน ลอย ไป อย่าง เงียบ ๆ ผ่าน ช่อง ว่าง. การ ส่ง เรือ วิทยาศาสตร์ เพื่อ สํารวจ ซาก ปรัก หัก พัง อาจ ให้ การ กู้ ที่ มี ค่า."

 arkship.1005.name: "เรือ ข้าม ฟาก ถูก ทําลาย"
 arkship.1005.desc: "เรือ รบ§Y[from.GetName]§!ใน§Y[from.solar_system.GetName]§!ระบบถูกทําลายในที่สุด\n\nยิ่ง กว่า เรือ รบ เสีย อีก เรือ รบ นี้ เป็น ที่ อยู่ ของ สิ่ง มี ชีวิต หลาก หลาย ชนิด. คน รุ่น ที่ เคย มี ชีวิต อยู่ และ เดิน ทาง ภาย ใน ได้ ถูก ทิ้ง ไว้ โดย ไม่ มี รากฐาน ที่ ผูก มัด พวก เขา ไว้ ด้วย กัน.\n\nสิ่งที่เหลืออยู่คือซากปรักหักพัง ลอยไปอย่างเงียบ ๆ ผ่านช่องว่าง"
 arkship.1005.a: "ความสําเร็จที่ยิ่งใหญ่"
 arkship.1005.desc.nomad: "เรือ รบ§Y[from.GetName]§!ถูกทําลายใน§Y[from.solar_system.GetName]§!ระบบ\n\nพวก เรา ทุก คน เข้าใจ ว่า เรือ ดัง กล่าว หมาย ถึง อะไร - อารยธรรม ที่ ถูก นํา ไป ใช้ ใน เรือ และ เครื่อง ยนต์ แต่ ละ รุ่น มี ชีวิต และ ตาย ภาย ใน กําแพง เดียว กัน. ความ เข้าใจ เช่น นั้น ไม่ ได้ ทํา ให้ พวก เขา ไว้ ใจ. มันทําไม่ได้\n\nการท่องเที่ยวของพวกเขาสิ้นสุดลงที่นี่"
 arkship.1005.b: "การเดินทางของพวกเขาสิ้นสุดลง"
 arkship.1005.desc.homicidal: "เรือเอเลี่ยน§Y[from.GetName]§!ถูกคัดออกจาก§Y[from.solar_system.GetName]§!ระบบ\n\nกอง เรือ เร่ร่อน ต่อ ต้าน อย่าง ดุ เดือด แต่ พวก เขา ก็ เข้า กัน ไม่ ได้. นก ที่ ลอย อยู่ ระหว่าง ดวง ดาว โดย ไม่ มี ระเบียบ เป็น ภัย คุกคาม ที่ ไม่ หยุด ยั้ง. เรือ รบ ของ พวก เขา ถูก ลด ลง จน เหลือ ซาก ปรัก หัก พัง.\n\nอย่าให้พวกมันเจอที่ปลอดภัย"
 arkship.1005.c: "อุปสรรค อีก อย่าง หนึ่ง ได้ ขจัด ออก ไป."
 arkship.1015.name: "การ สูญ เสีย อัน ขมขื่น"
 arkship.1015.desc: "เรือ รบ ของ เรา§Y[from.GetName]§!ใน§Y[from.solar_system.GetName]§!ระบบถูกทําลายโดยศัตรู\n\nการ สู้ รบ นั้น รุนแรง แต่ ความ เข้ม แข็ง ของ ศัตรู ของ เรา ปรากฏ ว่า ท่วมท้น. ทั้ง ๆ ที่ ลูก เรือ ของ เรา กล้า หาญ การ ป้องกัน ของ เรา ก็ พัง ทลาย ลง และ เรือ รบ ก็ ถูก ฉีก ขาด จาก เรา ไป ตลอด กาล ซาก ปรัก หัก พัง ของ เรือ ก็ กระจาย ไป ทั่ว ช่อง ว่าง.\n\nวันนี้จะถูกจดจํา"
 arkship.1015.a: "โศกนาฏกรรมที่เหลือเชื่อ"
 arkship.1015.desc.nomad: "เรือ รบ ของ เรา§Y[from.GetName]§!หลงทางใน§Y[from.solar_system.GetName]§!ระบบ ไม่ ใช่ เพื่อ จัด การ กับ จักรวรรดิ ที่ กลัว สิ่ง ที่ พวก เขา ไม่ เข้าใจ แต่ เพื่อ คน ที่ พเนจร ซึ่ง รู้ ความ ว่าง เปล่า อย่าง เรา.\n\n§Y[fromfrom.GetName]§!เล่นงานเรา รู้ดีว่าการทําลายบ้านหลังสุดท้ายของคน มันหมายความว่าอะไร ไม่ มี การ ปรองดอง กัน ระหว่าง คน เร่ร่อน. มีเพียงการอยู่รอด\n\nเราจะไม่ลืมเรื่องนี้"
 arkship.1015.b: "โมฆะไม่มีความซื่อสัตย์"
 arkship.1015.desc.homicidal: "เรือ รบ ของ เรา§Y[from.GetName]§!ใน§Y[from.solar_system.GetName]§!ระบบถูกทําลายแล้ว ไม่ใช่ด้วยความพ่ายแพ้ แต่ด้วยการทําลาย\n\n§Y[fromfrom.GetName]§!ไม่ได้แสวงหาดินแดนหรือเครื่องบรรณาการ พวกเขาแสวงหาจุดจบของเรา ทุกวิญญาณบนเรือมีความเสียหายที่ยอมรับได้ ในการรณรงค์ของพวกเขา เพื่อล้างเราออกจากดาว\n\nเรารอด เราทน เราจะไม่ถูกลบ"
 arkship.1015.c: "เราจะไม่ถูกทําลาย"

 #Random Events

 an_old_container_chain_title: "ห้อง เก็บ ของ เก่า"
 an_old_container_chain_desc: "ระหว่างการบํารุงรักษาบนเรือ§Yเรือ รบ[Root.GetName]§!ตู้คอนเทนเนอร์เสริมกําลังอย่างหนัก ที่ปล่อยสัญญาณกัมมันตภาพรังสี ถูกค้นพบในชั้นล่าง การ ขาด บันทึก ทาง โบราณคดี หรือ การ ระบุ ตัว เครื่องหมาย ต่าง ๆ ทํา ให้ ไม่ มี จุด เริ่ม ต้น และ จุด มุ่ง หมาย."

 arkship.5.name: "ห้อง เก็บ ของ เก่า"
 arkship.5.desc: "ระหว่างการบํารุงรักษาตามปกติ บนชั้นล่างของ§Yเรือ รบ[Root.GetName]§!วิศวกรของเราได้ค้นพบตู้คอนเทนเนอร์เก่าที่ปิดตาย ส่งสัญญาณกัมมันตรังสี พื้น ผิว ของ เกาะ นี้ ถูก ไฟ ลวก และ ทํา ให้ แข็ง แรง ด้วย เชื่อม ทาง อุตสาหกรรม หนา บ่ง ชี้ ว่า ไม่ เคย มี การ เปิด ทาง ได้ ง่าย ๆ.\n\nไม่มีบันทึกของมันในคลังสินค้าของเรือและไม่มีเครื่องหมายที่จะ ระบุว่ามันมาจากไหนหรือสิ่งที่มันหมายถึงการดําเนินการ การ วิเคราะห์ ภาชนะ เหล่า นี้ อย่าง ละเอียด จะ ใช้ เวลา นาน พอ สม ควร."
 arkship.5.a: "มาดูกันว่าอะไรอยู่ข้างใน"

 arkship.10.name: "การ ค้น พบ อัน โดด เด่น"
 arkship.10.desc: "การสแกนเบื้องต้นแสดงให้เห็นว่า ภาชนะบรรจุสินค้าและแร่ธาตุที่แยกไม่ได้ เป็นส่วนหนึ่งของสินค้ามาตรฐาน อย่าง ไร ก็ ตาม ลึก เข้า ไป ภาย ใน เป็น วัตถุ ที่ หนา แน่น และ มี คุณสมบัติ พิเศษ. ไม่สามารถกําหนดองค์ประกอบของมันได้\n\nวัตถุไม่สะท้อนสัญญาณพลังงาน ดูดซับคลื่นความถี่ส่วนใหญ่ และไม่ตรงกับวัสดุใด ๆ ในบันทึกของเรือ แม้ แต่ รูป ร่าง ที่ แน่นอน ของ มัน ก็ ดู ยาก ที่ จะ นิยาม ผ่าน ทาง ภาพ ที่ อยู่ ห่าง ไกล. จากความผิดปกติของโครงสร้างของมัน นักวิทยาศาสตร์บางคน[Root.GetName]เตือนไว้ก่อน มันอาจจะอันตรายก็ได้"
 arkship.10.a: "พังตู้คอนเทนเนอร์"
 arkship.10.b: "โยนออกจากแอร์ล็อค"

 arkship.15.name: "คริสตัล ที่ แข็ง แรง"
 arkship.15.desc: "ปลอกของตู้ที่ 2 ต้านทานเครื่องมือมาตรฐาน ต้องการทั้งเวลาและทรัพยากรที่จะเจาะ แต่ครั้งหนึ่งข้างใน เราค้นพบคริสตัลที่มืดและหน้าอย่างรุนแรง ซึ่งไม่เหมือนกับอะไร ที่บันทึกไว้ในบันทึกของเรือ มันส่งความอบอุ่นที่อ่อนนุ่มและดูดซับแสงที่ปกคลุม ทําให้ดูเหมือนจะแผ่ความมืดออกมาจากภายใน การ ปรากฏ ตัว ของ มัน ดึงดูด ความ สนใจ ใน หมู่ ลูก เรือ ทันที.\n\nการ ประเมิน ขั้น พื้น ฐาน โดย ทีม วิทยาศาสตร์ เสนอ แนะ ว่า ด้วย การ ศึกษา อย่าง เหมาะ สม ผลึก นี้ อาจ ถูก ใช้ เป็น แหล่ง พลัง งาน แม้ ว่า วิธี การ ทํา เช่น นั้น ยัง ไม่ ชัดเจน."
 arkship.15.a: "แสดงคริสตัลในพื้นที่ทั่วไป"
 arkship.15.b: "แสดงคริสตัลในแฟ้มจัดเก็บแกรนด์"
 arkship.15.c: "ระบุที่มาของคริสตัล"
 arkship.15.d: "ลงทุนเพื่อผลิตพลังงาน"

 arkship.20.name: "ทรัพย์ อัน ล้ํา ค่า"
 arkship.20.desc: "ในขณะที่คริสตัลถูกเปิด มันเริ่มที่จะเต้น มัน ไม่ ได้ ทํา เสียง และ ไม่ ได้ แสดง ความ ตั้งใจ ที่ จะ สื่อ ความ แต่ หัวใจ ของ มัน ก็ สั่น สะเทือน เมื่อ เข้า ไป ใกล้.\n\nใน ช่วง เวลา ต่าง ๆ มัน ทํา ให้ เกิด แสง สลัว ๆ. บาง คน อ้าง ว่า มัน กระ พริบ ตา เพื่อ ตอบ โต้ เสียง สนั่น; บาง คน สังเกต เห็น การ สั่น สะเทือน ที่ แฝง อยู่ ใน เปล ของ มัน ราว กับ ว่า มัน กําลัง ฟัง อยู่.\n\nไม่ มี สิ่งมีชีวิต ใด สามารถ ตรวจ พบ ได้ ภาย ใน แต่ ดู เหมือน ว่า มัน รู้ ว่า มี อยู่ ใกล้ ๆ. น่า แปลก คน เหล่า นั้น ที่ มอง เห็น แสง สลัว ของ มัน มัก จะ รายงาน ความ รู้สึก ยินดี ที่ เงียบ ๆ และ ไม่ อาจ อธิบาย ได้."
 arkship.20.a: "การเผชิญหน้าแบบเงียบๆ"

 arkship.25.name: "ซิมโฟนี"
 arkship.25.desc: "ในที่สุดเราก็ค้นพบที่มาของคริสตัล เรา พบ ว่า การ สั่น สะเทือน ไม่ ใช่ การ สุ่ม. เมื่อ มี การ แปล ลําดับ นี้ เป็น เสียง เสียง เข้า กัน กับ เสียง เพลง เก่า ๆ เสียง หนึ่ง ยัง คง ฮัม ป์ อยู่ บน เรือ รบ ใน ปัจจุบัน.\n\nเมื่อ มี การ เล่น เพลง ด้วย เสียง ดัง คน ที่ ฟัง ก็ รู้สึก สงบ ใจ อย่าง ลึก ซึ้ง. เพลง นี้ ไม่ เพียง แต่ คุ้น เคย เท่า นั้น; เป็น เพลง ที่ ยัง มี ชีวิต อยู่ ก่อน ดวง ดาว บาง ที อาจ ถึง กับ ร้อง เพลง จาก ตอน ที่ เรา ยัง คง เรียก ว่า ดาว เคราะห์ บ้าน.\n\nคริสตัลถูกวางไว้ในพื้นที่ชุมชน ความถี่ที่เงียบสงบของมัน เชื่อมโยงการดํารงอยู่"
 arkship.25.a: "ช่างเป็นประสบการณ์ที่น่าชื่นชมจริงๆ"

 arkship.30.name: "วิธี ต่อ ไป"
 arkship.30.desc: "ภายใต้เงื่อนไขที่ควบคุมได้ คริสตัลถูกผนวกเข้ากับแกนเครื่องยนต์ของยาน ผลกระทบเกิดขึ้นทันที ผลผลิตของเตาปฏิกรณ์ พุ่งสูงขึ้นไกลเกินเส้นฐาน และเครื่องยนต์ของยานอาร์คชิปได้คํารามด้วยความแข็งแรง การ เดิน เรือ รายงาน ว่า ความ เร็ว ใน การ เดิน ทาง ที่ สามารถ วัด ได้ และ สํารอง เชื้อ เพลิง ก็ มี การ ปรับ ปรุง ที่ ตรง กัน.\n\nการ สั่น สะเทือน ของ เรือ\n\nภาย ใน ไม่ กี่ ชั่วโมง ผลึก ก็ หมด ไป โครง สร้าง ของ ผลึก นั้น ถูก ผลาญ ไป หมด โดย ปฏิกิริยา. ไม่ ว่า ต้น กําเนิด ของ มัน จะ เป็น เช่น ไร มัน จะ ส่ง ผล กระทบ ถาวร ต่อ การ เดิน ทาง ของ เรา."
 arkship.30.a: "เริ่มได้!"

 arkship.35.name: "ค้นหาที่มีคุณค่า"
 arkship.35.desc: "การสแกนเบื้องต้นระบุว่า ของที่บรรจุอยู่จํานวนมาก เป็นของเหลือของสินค้าธรรมดา อย่าง ไร ก็ ตาม ที่ ฝัง อยู่ ใต้ ดิน เป็น ที่ เก็บ ของ อัล ลอย ซึ่ง หนา ทึบ.\n\nการศึกษาเพิ่มเติมเกี่ยวกับการปล่อยกัมมันตรังสี บ่งชี้ว่ามีสสารมืดอยู่ภายใน"
 arkship.35.a: "เอาทุกอย่างที่อยู่ข้างใน"

 arkship.45.name: "ภาพ ที่ มี สี สัน"
 arkship.45.desc: "ในกล่องที่เราระบุ สิ่งประดิษฐ์ของการออกแบบที่อยากรู้อยากเห็น วัตถุที่แผ่รังสีแผ่ว แต่อย่างต่อเนื่อง สัญญาณพลังงาน, ความผันผวนทั่วหลายสเปกตรัม รูป แบบ ของ มัน น่า ทึ่ง ทาง เรขาคณิต ราว กับ ว่า รูป ร่าง ของ มัน เอง ต้านทาน คํา นิยาม ที่ มั่นคง. รูป ทรง นี้ คล้าย กับ รูป ทรง ที่ มี สี สัน งดงาม รูป ร่าง คล้าย สิ่ง มี ชีวิต. การ ก่อ สร้าง ของ เมือง นี้ มี ความ สลับ ซับ ซ้อน ประกอบ ด้วย ชิ้น ส่วน ที่ เชื่อม ต่อ กัน ซึ่ง แสดง ว่า ตัว เลข นั้น ถูก กําหนด ให้ เปิด ออก.\n\nนัก วิทยาศาสตร์ บาง คน สงสัย ว่า สิ่ง ที่ มี ค่า อาจ ตก อยู่ ภาย ใน เปลือก ชั้น นอก. คน อื่น ๆ เตือน ให้ ระวัง การ เหนี่ยว รั้ง, การ เตือน ว่า การ เข้า แทรกแซง อาจ ทํา ให้ ผล ที่ ตาม มา เสีย หาย ได้."
 arkship.45.a: "เปิดมันสิ"
 arkship.45.b: "ปล่อยให้มันสมบูรณ์และใส่มันในการแสดงผล"

 arkship.50.name: "เคล็ด ลับ ภาย ใน"
 arkship.50.desc: "การเอาเปลือกนอกของวัตถุออก เปิดเผยว่าไม่ใช่อุปกรณ์ที่ซ่อนอยู่ หรือเป็นที่เก็บของมีค่า แต่เป็นอีกรูปที่เล็กกว่า\n\nเมื่อรูปที่สองถูกเปิด มันก็มีรูปที่เล็กกว่าด้วย และอีกรูปในนั้น ไม่ มี การ ค้น พบ กลไก หรือ คํา จารึก ที่ ซ่อน อยู่ ซึ่ง ดู เหมือน ว่า เกิด ขึ้น ซ้ํา แล้ว ซ้ํา อีก ไม่ รู้ จบ ราว กับ ว่า การ ปิด บัง ตัว เอง เป็น จุด มุ่ง หมาย. ตัว เลข ที่ อยู่ ใน ส่วน ลึก ที่ สุด มี ขนาด ใหญ่ กว่า เม็ด ทราย เพียง เม็ด เดียว, เรียบ ง่าย สมบูรณ์, และ หนัก พอ ๆ กับ ขนาด ของ มัน.\n\nไม่ ว่า จะ มี ความ หมาย เช่น ไร สําหรับ ผู้ สร้าง ก็ สูญ เสีย เวลา ไป แล้ว."
 arkship.50.a: "ปริศนาสําหรับวัย"

 arkship.55.name: "รัก คน หนุ่ม สาว"
 arkship.55.desc: "เรา ได้ รับ เชิญ ให้ เข้า ร่วม การ ประชุม ที่ หอ ประชุม ราช อาณาจักร.\n\nแปลกที่รูปร่างดูเหมือนจะสะท้อนมากที่สุดรุนแรงกับหนุ่มสาวบน§Yเรือ รบ[Root.GetName]§!พวก เขา มัก จะ มา รวม ตัว กัน อยู่ รอบ ๆ และ กระซิบ กัน ถึง ทฤษฎี ต่าง ๆ เกี่ยว กับ รูป ปั้น หรือ การ แต่ง เรื่อง ขึ้น เอง. ดู เหมือน ว่า มัน มี อิทธิพล ที่ สงบ, ส่ง เสริม การ เล่น แบบ เพ้อ ฝัน, และ การ ลด ความ กังวล."
 arkship.55.a: "เพื่อนที่โดดเด่น"

# Engine Contaminants

 arkship.60.name: "ส่วนประกอบของเครื่องยนต์"
 arkship.60.desc.regular: "§Yเรือ รบ[Root.GetName]§!กําลังประสบกับความผิดปกติของเตาปฏิกรณ์ ปัญหา นี้ ได้ รับ การ สังเกต เป็น ครั้ง แรก จาก ลูก เรือ ที่ ฟัง เครื่อง ยนต์ ให้ หลับ. พวกเขารายงานการบิดเบือนที่ละเอียดอ่อน ในจังหวะการไหลของเชื้อเพลิง\n $arkship.60.desc.end$"
 arkship.60.desc.gestalt: "§Yเรือ รบ[Root.GetName]§!กําลังประสบกับความผิดปกติของเตาปฏิกรณ์ ประเด็นแรกสังเกตได้โดย[Owner.GetWorkerNamePlural]คนที่กําหนดให้พักอยู่ใกล้เครื่องยนต์ พวกเขารายงานการบิดเบือนที่ละเอียดอ่อน ในจังหวะการไหลของเชื้อเพลิง$arkship.60.desc.end$"
 arkship.60.desc.end: "\nสืบสวนโดย[Owner.GetEngineerPlural]ได้ยืนยันว่าเรื่องต่างประเทศ ได้เข้าไปในถังเชื้อเพลิง\n\nน่า ยินดี มี การ เสนอ วิธี แก้ หลาย อย่าง แล้ว."
 arkship.60.a: "แทนที่ท่อส่งแก๊ส"
 arkship.60.a.scavanger: "ดีที่เรามีสํารอง"
 arkship.60.b: "เราจะดําเนินการในดาวไม่สามารถรอ"
 arkship.60.c: "ใช้ความถี่ที่ช้าลง"

 dirty_generator: "ตัวสร้างสิ่งสกปรก"
 dirty_generator_desc: "ทั้ง ๆ ที่ มี เชื้อ เพลิง ปน อยู่ เต็ม เครื่อง ยนต์ นี้ ก็ ยัง ดําเนิน งาน อยู่. ไม่ว่าจะดีหรือร้าย"
 underclocked_generator: "ตัวเร่งความเร็วต่ํากว่าเวลา"
 underclocked_generator_desc: "เพื่อหลีกเลี่ยงอันตรายของสิ่งแปลกปลอม ที่ได้แทรกซึมเครื่องกําเนิดพลังงานของยานนี้ รักษาอายุการใช้งานของยานอาร์คชิป"

# Start Your Engines

 arkship.65.name: "เริ่มกลไกของคุณ"
 arkship.65.desc: "มี การ รวบ รวม นัก บิน จาก ทั่ว ดาว ต่าง ๆ บน นาวา§Y[Root.GetName]§!สําหรับการแข่งขันที่ยิ่งใหญ่ มัน จะ วิ่ง เป็น เวลา เกือบ หนึ่ง ปี ซึ่ง ใน ช่วง นั้น ผู้ มี ส่วน ร่วม จะ บิน วน รอบ ๆ นาวา และ เทห์ฟากฟ้า ที่ อยู่ ใกล้ ๆ.\n\nทางเลือกหนึ่งยังคงอยู่ ใครที่เราคาดว่าจะข้ามเส้นก่อน?"

 arkship.65.a: "§Y[pilot_gale_speed.GetName]§!เวลาในสภาไม่ได้ช้าลง[pilot_gale_speed.GetHerHim]หมอบลง"
 arkship.65.b: "ชัยชนะไปให้กับลูกเรือ ที่สามารถอ่านไฮเปอร์สเปซเช่นแผนที่"
 arkship.65.c: "นักล่ามังกรของเรา§Y[pilot_dragonslayer.GetName]§!ไม่สามารถสูญเสีย!"
 arkship.65.d: "§Y[pilot_mercenary_warrior.GetName]§!บินด้วยอํานาจของผู้ปล้น!"
 arkship.65.e: "§Y[pilot_hells_heart.GetName]§!สามารถนําทางผ่านมาเทรียล เขาสามารถแข่ง!"
 arkship.65.f: "ของเรา§Y[pilot_great_khan.GetName]§!ข่านจะชนะ!"
 arkship.65.g: "ด้วยสองความคิด§Y[pilot_brainslug.GetName]§!แมลงวันไร้ที่ติ"
 arkship.65.h: "§Yเทา§!กําหนดไว้ไม่กี่ศตวรรษ เพื่อทําให้ทักษะการแข่งขันของพวกเขาสมบูรณ์"
 arkship.65.i: "§Y[pilot_tuner.GetName]§!เพิ่มความเร็วไปที่ยานทุกมุม"
 arkship.65.j: "§Y[pilot_frontier_adventurer.GetName]§!แค่หาเส้นทาง"
 arkship.65.k: "§Y[pilot_scholarium_explorer.GetName]§!เปลี่ยนทฤษฎีให้สั้นลง"
 arkship.65.l: "เธอห้ามออกไป§Y[pilot_slippery.GetName]§!."
 arkship.65.m: "§Y[pilot_psionic.GetName]§!รู้สึกถึงเส้นทางและเคลื่อนไหว ก่อนที่จะมีใครตอบสนอง"
 arkship.65.n: "§Y[pilot_synthetic.GetName]§!คํานวณเส้นตรงที่เร็วที่สุดในเวลาจริง"
 arkship.65.o: "§Y[pilot_virtual.GetName]§!เห็นผีในอัลกอริทึมนําทาง"
 arkship.65.p: "เส้นประสาทและโลหะประสานกัน§Y[pilot_cyborg.GetName]§!ไม่เสียการเคลื่อนไหว"
 arkship.65.q: "§Y[pilot_erudite.GetName]§!เรียนหลักสูตรและปรับปรุง วิ่งรอบหลัง"
 arkship.65.r: "ไม่แปลกหรอก§Y[pilot_chosen_one.GetName]§!ถูกเลือก"
 arkship.65.s: "§Y[pilot_flight.GetName]§!บินเข้าออกห้องนักบิน"
 arkship.65.t: "ไดรฟ์อวกาศของเรา ไม่สามารถเอาชนะ!"
 arkship.65.u: "เราอยู่ในบ้านในสูญญากาศ โดรนวิวัฒนาการไม่ควรสูญเสีย"
 arkship.65.default: "ไม่มีใครโดดเด่นเลือกคนที่สุ่ม"
 arkship.65.victory: "นักบินของเราชนะ"
 arkship.65.loss: "นักบินของเราแพ้"

 arkship.70.name: "ชัยชนะที่[Root.GetName]"
 arkship.70.desc.start: "บรรยากาศ บน เรือ รบ§Y[Root.GetName]§!เป็นที่ชื่นชอบเป็นผู้เข้ารอบสุดท้ายตี สลิงช็อตล่าสุดรอบ[Star.GetName]."
 arkship.70.desc.leader: "$arkship.70.desc.start$\n\n§Y[selected_pilot.GetName]§!เงาของผู้นําจนกระทั่งวิ่งครั้งสุดท้าย แล้วพบว่าหนึ่งระเบิดสุดท้าย ขอสาบานต่อนาวา ที่แล่นไปอย่างสะดวกสบาย[selected_pilot.GetSheHe]ก้าวไปข้างหน้าและทิ้งสนามไว้[selected_pilot.GetHerHis]ไอออนปลุก"
 arkship.70.desc.gray: "$arkship.70.desc.start$\n\n§Yเทา§!เงาของผู้นําจนกระทั่งวิ่งครั้งสุดท้าย แล้วพบว่าหนึ่งระเบิดสุดท้าย ด้วยเส้นกรอบและผ่านสดใส พวกเขาลื่นไปข้างหน้าและออกจากทุ่งในการปลุกไอออนของพวกเขา"
 arkship.70.desc.no_leader: "$arkship.70.desc.start$\n\nนักบินของเราเงาผู้นํา จนกระทั่งวิ่งรอบสุดท้าย แล้วพบว่าหนึ่งระเบิดสุดท้าย ด้วยเส้นกรอบและผ่านสดใส พวกเขาลื่นไปข้างหน้าและออกจากทุ่งในการปลุกไอออนของพวกเขา"
 arkship.70.desc.end: "\n\nเราเลือกถูก แชมป์ของเราเป็นฝ่ายชนะ ช่างเป็นการแข่งขันอะไรเช่นนี้!"
 arkship.70.a: "เราสามารถเรียนรู้จากผู้ชนะของเรา!"
 arkship.70.b: "[selected_pilot.GetName]ควรฉลอง!"

 flight_telemetry: "เส้น ทาง"
 flight_telemetry_desc: "การ ค้น พบ ทาง วิทยาศาสตร์"
 leader_trait_circuit_champion: "แชมป์วงจร"
 leader_trait_circuit_champion_desc: "ผู้ชนะของการแข่งขันที่ยิ่งใหญ่ทั่วดาว ผู้นํานี้ยืนสูงและเป็นแรงบันดาลใจคนอื่น ๆ"

 arkship.80.name: "ความสําเร็จที่น่ากลัว"
 arkship.80.desc.leader: "$arkship.70.desc.start$\n\n§Y[selected_pilot.GetName]§!มีตะกั่วที่ชัดเจนเข้าสู่ผู้ผลิตแต่ขอบเริ่มจางลง$arkship.80.desc.end$"
 arkship.80.desc.gray: "$arkship.70.desc.start$\n\nเกรย์ถือตะกั่วที่ชัดเจนเข้ามานูเวอร์แต่ขอบเริ่มที่จะจางหายไป$arkship.80.desc.end$"
 arkship.80.desc.no_leader: "$arkship.70.desc.start$\n\nนักแข่งรถของเราถือนําที่ชัดเจนเข้าสู่แมนนูเวอร์ แต่ขอบเริ่มจางลง$arkship.80.desc.end$"
 arkship.80.desc.end: "\n\nบางสิ่งบางอย่างเล็ดรอด เครื่องหมายพลาด เส้นลอยอาจจะเพียงแค่เส้นประสาท ทั้งสองวิธีที่คู่แข่งของพวกเขาบรรเทาที่ผ่านมา และนักบินของเราข้าม เส้นชัยในสี่ไม่ปรากฏ"

 arkship.85.name: "อุบัติเหตุทางม้าลาย"
 arkship.85.desc.base: "การ วิ่ง รอบ เรือ รบ§Y[Root.GetName]§!จบลงด้วยโศกนาฏกรรม เมื่อการชนกันของเศษซาก ที่กระจัดกระจายไปทั่วระบบ ในขณะที่แขวนขึ้นยิงสุดท้ายรอบ[Star.GetName]นักบินของเราปิดแน่นเกินไป กับคู่แข่งและเรือทั้งสองหมุนออก"
 arkship.85.desc.leader: "$arkship.85.desc.base$\n\n§Y[selected_pilot.GetName]§!รอด ชีวิต มา ได้ โดย การ ช่วย ชีวิต อย่าง รวด เร็ว แต่ ได้ รับ บาด เจ็บ สาหัส และ จะ มี แผล เป็น ถาวร."
 arkship.85.desc.no_leader: "$arkship.85.desc.base$\n\nผู้สมัครของเรารอดชีวิต ต้องขอบคุณการช่วยเหลืออย่างรวดเร็ว แต่ได้รับบาดเจ็บสาหัส และจะมีรอยแผลเป็นที่ถาวร"

 arkship.90.name: "นักบินลึกลับ"
 arkship.90.desc: "$arkship.70.desc.start$\n\nชัยชนะของนักบินที่ถูกเลือกของเราดูเหมือนมั่นใจ ในขณะที่พวกเขาดําเนินการ กลยุทธ์อย่างไร้ที่ติ จนกระทั่งเรือเซเบิ้ลถูกพัดผ่าน ไม่มีรอยขีดข่วน จนไม่มีผู้สังเกตุ เดินผ่านกองหน้า และข้ามเส้นไปก่อน\n\nอะบอร์ด§Y[Root.GetName]§!ระเบียงล้มเงียบลงที่ตอนจบที่โหดร้าย"

 arkship.90.a: "เราต้องการนักบินของเรือเซเบิ้ล!"
 arkship.90.a.tt: "ขอ ให้ นึก ถึง นัก บิน ที่ มี ความ ลึกลับ ระดับ 3$admiral_with_icon$กับ['trait:leader_trait_sable_pilot']คุณสมบัติ"
 arkship.90.b: "พวกเขาไม่เคยจดทะเบียน นักบินของเรายังคงชนะ!"

 sable_pilot_desc: "นักบินที่หมกมุ่น มุ่งเน้นไปที่ความเร็วเหนือสิ่งอื่นใด แชมป์ของการเดินทางแกรนด์ พวกเขาอาจจะเป็นพลเรือเอกที่รวดเร็วที่สุด เพื่อเป็นเกียรติแก่กาแล็กซี่"
 sable_pilot_catch_phrase: "ไม่มีใครชนะฉันได้"
 leader_trait_sable_pilot: "ตัวนําร่อง"
 leader_trait_sable_pilot_desc: "นักบินลึกลับ และปรมาจารย์ของความเร็ว ผู้นํานี้ตอนนี้พิกัดเรือผ่าน"

#Spinal Fracture
 arkship.95.name: "รอยแตกของกระดูกสันอก"
 arkship.95.desc: "ติดตั้งเมื่อเร็ว ๆ นี้§Hภูฏาน§!บนเรือ§Y[Root.GetName]§!ได้วางความเครียดที่โครงสร้างด้านหน้าของเรือ มากกว่าที่คาดการณ์ไว้ การตรวจสอบทางวิศวกรรมได้ค้นพบ เครือข่ายของรอยแตกของความเครียด ที่สะท้อนจากจุดยึดหลักของภูเขา\n\nจนกว่าความเสียหายจะเกิดขึ้น โครงสร้างของยานอาร์กชิพ ไม่สามารถรองรับการต่อต้านได้อย่างปลอดภัย ดัง นั้น การ เดิน ทาง จึง ได้ กําหนด ข้อ จํากัด ความ เร็ว ที่ รุนแรง เพื่อ ป้องกัน ไม่ ให้ กระดูก หัก.\n\nเรา อาจ พยายาม ซ่อมแซม สนาม อย่าง รวด เร็ว เพื่อ ทํา ให้ ความ เสีย หาย คงที่, หรือ มอบ หมาย§Hการ เดิน เรือ§!เพื่อดําเนินการโครงสร้างที่สมบูรณ์"
 arkship.95.a: "ทําให้กระดูกหักคงที่และก้าวต่อไป"
 arkship.95.b: "ลองทํากันดีๆ"

 fractured_spine_mult: "สปินต์"
 fractured_spine_mult_desc: "รอยแตกของกระดูกสันหลังบริเวณสันหลังของยานอาร์กติก ทําให้ระบบนําร่องต้องจํากัดความเร็ว"
 ARKSHIP_SPINAL_FRACTURE_PROJECT: "แรงม้าหมุน"
 ARKSHIP_SPINAL_FRACTURE_PROJECT_DESC: "การ ติด ตั้ง เรือ รบ§Hภูฏาน§!ได้นําความเครียดจากโครงสร้างที่อันตราย ตามลําเรือไปข้างหน้า\n\nA§Hการ เดิน เรือ§!จะถูกส่งไปเสริมส่วนที่ได้รับผลกระทบอย่างเต็มที่"

 arkship.100.name: "สปินที่ซ่อมแซมแล้ว"
 arkship.100.desc: "การ ซ่อมแซม ภูเขา ไฟ ที่ มี ความ สําคัญ§Y[event_target:fractured_spine_arkship.GetName]§!เสร็จสมบูรณ์แล้ว แม้ว่ากระบวนการจะต้องทํางานอย่างระมัดระวัง และการตรวจสอบอย่างยืดเยื้อ เราใช้โอกาสในการเสริมสร้างส่วนต่าง ๆ ที่อ่อนแอของตัวเรือ\n\nการปรับปรุงผลลัพธ์ได้เพิ่มความมั่นคงของยานอาร์คชิปแลนด์ ในระหว่างการเดินทางความเร็วสูง อนุญาตให้การนําร่องยกข้อจํากัดก่อนหน้านี้ การ ทดสอบ ใน ระยะ แรก ๆ บ่ง ชี้ ว่า ตอน นี้ ภาชนะ นี้ มี ประสิทธิภาพ มาก กว่า ก่อน ที่ ความ เสีย หาย จะ เกิด ขึ้น."
 repaired_spine_mult: "หมุนกลับมาอีกครั้ง"
 repaired_spine_mult_desc: "กําลังเสริมที่เพิ่มเข้ามา ระหว่างการซ่อมแซมล่าสุด ได้เสริมเสริมสร้างเรือเกราะ เดินหน้าต่อ"

 arkship.105.name: "ภายใต้ความกดดัน"
 arkship.105.desc: "เครื่องยนต์กระดอนขึ้น§Y[Root.GetName]§!ได้ผลักแกนขับเคลื่อนของยานอาร์คชิปชิพ เกินความทนต่อการดําเนินงานอย่างปลอดภัย ความ ร้อน จะ แผ่ กระจาย ไป ทั่ว การ รวม ตัว ของ เครื่อง ยนต์ หลัก และ ความ ดัน ก็ เพิ่ม ขึ้น เร็ว กว่า ระบบ กําหนด ที่ สามารถ ชดเชย ได้.\n\nถ้า ปล่อย ไว้ โดย ไม่ มี การ ควบคุม การ ออก ผล มาก เกิน ไป อาจ ทํา ให้ ส่วน ประกอบ สําคัญ ของ เครื่อง ยนต์ เสีย หาย ได้. ของเรา[Root.Owner.GetEngineerPlural]ให้ คํา แนะ นํา หลาย อย่าง ที่ อาจ เป็น ไป ได้ คือ ระบาย พลาสมา ส่วน เกิน ออก มา เพื่อ ทํา ให้ ระบบ นั้น คงที่, ทํา งาน แทน ที่, หรือ ปิด เครื่อง ยนต์ ชั่ว คราว เพื่อ ทํา การ ปรับ ตั้ง อย่าง เต็ม ที่."
 arkship.105.a: "บดพลาสม่าส่วนเกิน"
 arkship.105.b: "เพิ่มความพยายามของเรา"
 arkship.105.c: "ปิดเครื่องยนต์และปรับโครงสร้างใหม่"
 engine_pressure_work_crews_mult: "เวลา มาก เกิน ไป"
 engine_pressure_work_crews_mult_desc: "กําหนดการถูกเพิกถอน เพื่อทําให้แกนขับเคลื่อนของยานอาร์คร้อนเกินไป"
 engine_pressure_drone_crews_mult: "เพิ่มภาระงาน"
 engine_pressure_drone_crews_mult_desc: "Drones have been reassigned to stabilize the Arkship's overheated drive core."
 engine_recalibration_slowed_mult: "การซ่อมแซมเครื่องยนต์"
 engine_recalibration_slowed_mult_desc: "ระบบขับเคลื่อนของยานอาร์กชิพ กําลังดําเนินการแก้ไขอย่างรอบคอบ จน กว่า งาน จะ เสร็จ สมบูรณ์ ผล งาน ที่ ออก มา จะ ยัง คง ลด น้อย ลง อย่าง จงใจ."

 arkship.110.name: "ความดันปล่อย"
 arkship.110.desc: "พลาสม่าส่วนเกินถูกระบายออก ด้วยท่อที่ควบคุมได้ พ่นแสงออกมาทางท้ายเรือ ความ ดัน ของ เครื่อง ยนต์ ได้ กลับ สู่ ระดับ ที่ ยอม รับ ได้ และ ไม่ มี การ บันทึก ความ เสีย หาย ถาวร.\n\nอย่าง ไร ก็ ตาม การ ปล่อย ตัว ดัง กล่าว ได้ ทิ้ง อนุภาค ที่ มี ค่า ไว้ ซึ่ง ส่วน ใหญ่ ได้ รับ การ นํา กลับ คืน มา และ ตก เข้า สู่ แหล่ง สํารอง ของ เรา."

 arkship.115.name: "รายงาน เกิน เวลา"
 arkship.115.desc.regular: "สําหรับหกเดือนที่ผ่านมา ลูกเรือซ่อมแซม§Y[Root.GetName]§!ได้ทํางานอย่างไม่หยุดหย่อน เพื่อทําให้ระบบขับเคลื่อนของอาร์กชิพร้อนเกินไป กลับมาภายใต้การควบคุม แผงเข้าถึงถูกถอดออก สายความเย็นเปลี่ยนเส้นทาง และตัวควบคุมที่เสียหายแทนที่ ในขณะที่เครื่องยนต์ยังคงทํางาน\n\nความ พยายาม ได้ ทํา ให้ แกน ขับ ขี่ คงที่ อยู่ ต่อ ไป ใน ตอน นี้ แม้ ว่า ลูก เรือ ที่ มี ความ รับ ผิด ชอบ จะ ต้อง ผลัด กัน ไป นาน และ มี สภาพ การ ทํา งาน ที่ ยาก ลําบาก เพื่อ จะ ทํา ให้ เกิด ขึ้น. แม้ พวก เขา จะ หมด กําลัง ใจ แต่ ก็ มี กําลัง ใจ มาก. ไม่ ว่า ความ ว่าง เปล่า จะ พุ่ง มา ที่ เรา อย่าง ไร เรา มั่น ใจ ว่า เรา สามารถ ทน ได้."
 arkship.115.desc.gestalt: "6 เดือนที่ผ่านมา หุ่นยนต์บํารุงรักษาได้ดําเนินการโดยไม่รบกวน เพื่อนําระบบขับเคลื่อนที่ร้อนเกินไปกลับมาภายใต้การควบคุม การติดตั้งการเข้าถึงถูกเอาออก ท่อหล่อเย็นเปลี่ยนเส้นทาง และตัวควบคุมที่เสียหายถูกแทนที่ ในขณะที่เครื่องยนต์ยังคงทํางาน\n\nแม้ ว่า การ ดําเนิน งาน นี้ จําเป็น ต้อง ใช้ โดรน ตลอด เส้น ผ่า ศูนย์กลาง หลาย เส้น แต่ กระบวนการ นี้ ก็ เผย ให้ เห็น ความ ไม่ สมดุล หลาย อย่าง ใน การ ประกอบ เครื่อง ยนต์. สิ่ง เหล่า นี้ ได้ รับ การ แก้ไข แล้ว และ ประสิทธิภาพ ใน การ ดําเนิน งาน โดย ทั่ว ไป ได้ รับ การ ปรับ ปรุง อย่าง น่า ทึ่ง. ไม่ ว่า จะ เครียด แค่ ไหน ก็ ตาม เรา จะ ปรับ ตัว ได้."
 happy_work_crews_mult: "ความ แข็ง แรง ของ กล้าม เนื้อ"
 happy_work_crews_mult_desc: "เนื่อง จาก เอา ชนะ วิกฤตการณ์ เครื่อง ยนต์ ได้ โดย การ ตี สอน และ การ ร่วม มือ กัน ความ มั่น ใจ ใน ท่ามกลาง ลูก งาน ของ เรา จึง ไม่ เคย เข้ม แข็ง ไป กว่า นี้."
 happy_work_drones_mult: "คอนตินเจนซีแบบธรรมดา"
 happy_work_drones_mult_desc: "เนื่อง จาก ได้ เรียน รู้ มาก ใน ช่วง ซ่อม เครื่อง ยนต์ โดรน ธรรมดา ของ เรา จึง รายงาน ว่า มี ประสิทธิภาพ เพิ่ม ขึ้น."

 arkship.120.name: "ปรับปรุงโครงสร้างไดรฟ์ใหม่"
 arkship.120.desc: "เครื่องยนต์ถูกรื้อลงมา ในขั้นตอนที่ควบคุมได้ ทําให้วิศวกรของเราสามารถตรวจสอบ กระบวนการนี้ทําให้เราล่าช้า แต่ข้อมูลที่รวบรวมมา ระหว่างการปิดตัวได้พิสูจน์แล้วว่ามีคุณค่า\n\nความไม่เสมอภาคในแกนแยกบน§Y[Root.GetName]§!มีการระบุตัวตน โดยการเปลี่ยนเส้นทางพลังงานและโครงสร้างที่เสริมสร้าง เราได้รับการเสริมสร้างทั้งโล่ของเรือ และเรือต่อต้านสายพันธุ์ในอนาคต"
 arkship.120.a: "คุ้มค่ากับการล่าช้า"
 engine_recalibration_mult: "การ เพิ่ม พูน และ การ ป้องกัน"
 engine_recalibration_mult_desc: "การค้นพบความเหมาะสมระหว่างการปรับเครื่องยนต์ล่าสุด ได้ปรับปรุงตัวยานต่อยานและเกราะ"

 # Memory Fog

 arkship.125.name: "การ ลืม"
 arkship.125.desc: "ตั้ง แต่ เรือ รบ§Y[Root.GetName]§!เข้าสู่เนบิวลานี้ รายงานได้กรองเข้ามา จากทั่วทุกชั้น นัก วิจัย พบ บันทึก ที่ พวก เขา จํา ไม่ ได้ ว่า เขียน อะไร. ผู้ดําเนินการลืมขั้นตอนความปลอดภัย ที่พวกเขาได้ดําเนินการหลายพันครั้ง พนักงาน เดิน ทาง พูด ถึง การ เสีย ชั่วโมง ไม่ สามารถ คิด บัญชี สําหรับ การ แก้ไข ใน แนว ทาง ที่ เพิ่ง ผ่าน มา.\n\nแพทย์ของเราได้ติดตามสาเหตุของ สนามแม่เหล็กไฟฟ้าเนบิวลาของเนบิวลา ซึ่งดูเหมือนจะทําลายความทรงจํา"
 arkship.125.desc.hive: "ตั้ง แต่ เรือ รบ§Y[Root.GetName]§!เข้าไปที่เนบิวลานี้ การรบกวนได้สั่นสะเทือนผ่านจิตสํานึกร่วมกัน โหนดที่ครั้งหนึ่งเคยเป็นคู่ปรับที่สมบูรณ์แบบ ได้เริ่มสูญเสียความสอดคล้องกัน ความ ทรง จํา แตก ต่าง กัน ไป ขณะ ที่ แรง กระตุ้น ไม่ ได้ แพร่ กระจาย ออก ไป อย่าง สะอาด ผ่าน ยอด เขา.\n\nของเรา[Owner.GetResearchers]ได้ติดตามสาเหตุไปยัง สนามแม่เหล็กไฟฟ้าของเนบิวลา ซึ่งเป็นการทําลายทางเดินประสาท ที่ ซึ่ง สติ รู้สึก ผิด ชอบ ที่ มี ส่วน ร่วม ควร จะ ไหล เวียน ไม่ หยุด ยั้ง บัด นี้ เป็น การ พูด ติด อ่าง และ การ โจมตี."
 arkship.125.desc.machine: "ตั้ง แต่ เรือ รบ§Y[Root.GetName]§!เข้าไปที่เนบิวลานี้ รายงานข้อผิดพลาดได้แพร่กระจายไปทั่ว ระบบเครือข่ายทั้งหมด หน่วยประมวลผลรับข้อมูลเสียหาย ระบบย่อยอัตโนมัติทํางานตามปกติ โดยไม่รู้ว่าหน่วยความจําของพวกเขาถูกเขียนทับมากเกินไป\n\nของเรา[Owner.GetResearchers]ได้ติดตามความผิดพลาดไปยัง สนามแม่เหล็กไฟฟ้าของเนบิวลา ซึ่งเป็นตัวกระตุ้นให้สปอร์เรดเขียนข้อผิดพลาดผ่านระบบหน่วยความจําที่ผันผวน ความซื่อสัตย์ของข้อมูล ในทุกแผนกถูกเปลี่ยนแปลง และประสิทธิภาพในการดําเนินการจะยังคงอยู่"
 arkship.125.a: "เริ่มการสืบสวน"
 the_forgetting_chain_title: "การ ลืม"
 the_forgetting_chain_desc: "ตั้งแต่เข้าไปในเนบิวลาที่ผิดปกติที่บนเรือ§Y[Root.GetName]§!เริ่มทรมานจากการสูญเสียความทรงจํา สาเหตุ ของ ปรากฏการณ์ นี้ ยัง ไม่ ทราบ กัน."

 arkship.130.name: "เรียกคืนความจําแล้ว"
 arkship.130.desc: "ทีมสืบสวนบนเรือ§Y[Root.GetName]§!ได้ทําแผนที่โปรไฟล์ของ§Y[event_target:memory_fog_location.GetName]§!การแทรกแซงแม่เหล็กไฟฟ้าของเนบิวลา และใช้ความถี่ตอบโต้ที่มีประสิทธิภาพ ข้ามเรือไป หมอกได้ลอยขึ้น\n\nข้อมูลที่รวบรวม สําคัญกว่าการคาดการณ์ นักวิทยาศาสตร์ของเราสังเกตเห็นว่าความถี่ของทําซ้ําเกี่ยวข้อง มีความคล้ายคลึงอย่างโดดเด่นกับเอกสารระบุสนามไซโซนิค ในขณะเดียวกันวิศวกรของเราเชื่อว่า หลักการตอบโต้ความถี่เดียวกันนี้ สามารถนําไปใช้ ลับเซ็นเซอร์ของเรา"
 arkship.130.desc.hive: "เดอะ[Owner.GetResearchers]บนเรือ§Y[Root.GetName]§!ได้ทําแผนที่โปรไฟล์ของ§Y[event_target:memory_fog_location.GetName]§!การแทรกแซงแม่เหล็กไฟฟ้าของเนบิวลา และใช้ความถี่ตอบโต้ที่มีประสิทธิภาพ เรากลับมารวมกันอีกครั้ง\n\nข้อมูลที่รวบรวมมา มีผลกระทบมากกว่าการบูรณะ ที่ตรงกับความถี่ของการสื่อสารระหว่างกัน อีกทางเลือกหนึ่ง ปมทางวิศวกรรมของเรา เชื่อว่า ความถี่การตอบโต้ สามารถปรับตัว"
 arkship.130.desc.machine: "เดอะ[Owner.GetEngineerPlural]บนเรือ§Y[Root.GetName]§!ได้ทําแผนที่โปรไฟล์ของ§Y[event_target:memory_fog_location.GetName]§!การแทรกแซงแม่เหล็กไฟฟ้าของเนบิวลา และใช้ความถี่ตอบโต้ที่มีประสิทธิภาพ ทุกระบบได้กลับมาเป็นพารามิเตอร์ปฏิบัติการที่เหมาะสม\n\nข้อมูลการวินิจฉัย มีค่าเป็นรอง หน่วยประมวลผลได้ระบุรูปแบบ ว่าสัญญาณรบกวน เกี่ยวข้องกับการคํานวณของเราอย่างไร อีกทางเลือกหนึ่ง ความผันผวนของตัวมันเอง สามารถปรับตัวได้ เพื่อปรับปรุงการตรวจจับ"
 arkship.130.a: "ติดตามผลกระทบของการรับรู้"
 arkship.130.b: "จัดลําดับการปรับปรุงภายใน"

 nebula_memory_fog: "หน่วยความจําฟ็อก"
 nebula_memory_fog_desc: "การแทรกแซงของแม่เหล็กไฟฟ้า จากเนบิวลาใกล้ ๆ กําลังรบกวนความทรงจํา"
 ARKSHIP_NEBULA_MEMORY_PROJECT: "แผนที่โพรไฟล์การจอง"
 ARKSHIP_NEBULA_MEMORY_PROJECT_DESC: "หมอกความทรงจําที่ส่งผลกระทบต่อประชากรของยานอาร์คชิปจะยังคงอยู่ จนกว่าเราจะทําแผนที่ประวัติการกลับมาของ§Y[event_target:memory_fog_location.GetName]§!."

 # The Eternal Chorus Chain
 arkship.140.name: "สัญญาณ ที่ แตก ต่าง กัน"
 arkship.140.intro: "เซ็นเซอร์ระยะไกลได้ตรวจพบ การส่งสัญญาณของโครงสร้าง จุดของที่มาของมัน"
 arkship.140.desc: "$arkship.140.intro$\n\nเราไม่สามารถแก้ปัญหาสัญญาณจากที่นี่§Y[owner.GetScientistCapital] [eternal_chorus_leader.GetName]§!เชื่อว่าหมายนี้ การสืบสวนโดยตรง และเรียกร้องให้เรากําหนดหลักสูตร สําหรับระบบแหล่งที่มา และถอดรหัสการส่งสัญญาณ"
 arkship.140.desc.1160: "$arkship.140.intro$\n\nรูปแบบที่ให้[Owner.GetScientistPlural]หยุด ความ ตั้งใจ ที่ จะ สร้าง ความ เที่ยง ตรง ตรง ตาม ที่ บันทึก ไว้ เมื่อ เรา เห็น เรือ ข้าม ขอบ ฟ้า ของ เหตุ การณ์. นี่ไม่ใช่สัญญาณเดียวกัน แต่ความคล้ายคลึงนั้น แน่นอน\n\n§Y[owner.GetScientistCapital] [eternal_chorus_leader.GetName]§!กําลังร้องขอให้เรากําหนดเส้นทาง สําหรับระบบแหล่งที่มา และค้นหาสิ่งที่เหลืออยู่"

 arkship.141.name: "ชื่อ=คริสตัลชื่อ"
 arkship.141.desc: "ในขณะที่เราข้ามเข้าไปใน§Y[solar_system.GetName]§!ระบบ เราค้นพบ การก่อตัวของคริสตัล ของเรา[Owner.GetScientistPlural]ได้ได้รับการยืนยันแล้วว่า มันมีอยู่ในสภาวะที่ใกล้สมบูรณ์ ชั่วคราว การส่งข้อมูลโครงสร้าง\n\nนี่ไม่ใช่ปรากฏการณ์ธรรมชาติ เป็น บันทึก เรื่อง ราว ของ อารยธรรม ที่ มี การ รักษา ไว้ ซึ่ง ไม่ มี อีก ต่อ ไป ร้อง ออก มา ตลอด เวลา.\n\n§Y[owner.GetScientistCapital] [eternal_chorus_leader.GetName]§!เตรียมรับและถอดรหัสสัญญาณ"

 arkship_eternal_chorus_chain_title: "คอรัส ถาวร"
 arkship_eternal_chorus_chain_desc: "สัญญาณโครงสร้างของจุดกําเนิดไม่ทราบ ตรวจพบจากระบบหลุมดําห่างไกล เราต้องสืบสวน"

 contract_eternal_chorus: "คอรัสถาวร"
 contract_eternal_chorus_desc: "ที่§Y[owner.GetScientistCapital] [event_target:eternal_chorus_leader.GetName]§!ขอให้เราเคลื่อนเข้าสู่วงโคจรของหลุมดํา และพยายามที่จะถอดรหัสสัญญาณ"
 contract_eternal_chorus_issuer_desc: "§Y[owner.GetScientistCapital] [event_target:eternal_chorus_leader.GetName]§!ได้กระตุ้นให้เราตรวจสอบ สัญญาณลึกลับที่ออกมาจากระบบหลุมดําห่างไกล"
 eternal_chorus_contract_option_tooltip: "ประเด็น§Y$contract_eternal_chorus$§!เป็น§Hสัญญาภายใน§!."
 eternal_chorus_lattice_object: "คอรัสถาวร"
 eternal_chorus_lattice_object_tooltip: "ชื่อ=คริสตัลชื่อ"
 eternal_chorus_lattice_object_desc: "รูปทรงเรขาคณิตของวัสดุไม่ทราบตัว แขวนอยู่ในชั่วคราวที่สมบูรณ์แบบ ที่ขอบแรงโน้มถ่วงของหลุมดํา พวกเขากําลังส่งข้อมูลโครงสร้าง ในระยะปกติ"

 ARKSHIP_ETERNAL_CHORUS_PROJECT: "การ ตรวจ สอบ แบบ คริสตัล"
 ARKSHIP_ETERNAL_CHORUS_PROJECT_DESC: ""
 ARKSHIP_ETERNAL_CHORUS_PROJECT_REQUIREMENT: "ต้องการ$COUNT$/$REQUIRED$ §Hเรือ รบ§!ในวงโคจร"

 arkship.142.name: "การ เปลี่ยน คํา ศัพท์"
 arkship.142.desc.reassigned: "§Y[owner.GetScientistCapital] [from.GetName]§!ไม่สามารถตรวจสอบสัญญาณคอรัสได้อีกต่อไป\n\nความทะเยอทะยานของพวกเขาได้ส่งต่อไปยัง§Y[owner.GetScientistCapital] [eternal_chorus_leader.GetName]§!คนที่ตกลงจะรับการวิจัยแทน"
 arkship.142.desc.ended: "§Y[owner.GetScientistCapital] [from.GetName]§!ไม่สามารถตรวจสอบสัญญาณคอรัสได้อีกต่อไป\n\nเนื่อง จาก ไม่ มี คน อื่น ที่ เต็ม ใจ ทํา งาน นี้ ต่อ ไป จึง ไม่ อาจ ทํา ให้ สัญญา นั้น สําเร็จ ได้."
 arkship.142.a: "งาน ดําเนิน ต่อ ไป."
 arkship.142.b: "แล้วมันจะจบที่นี่"

 arkship.145.name: "คอรัส ถาวร"
 arkship.145.desc: "การถอดรหัสเสร็จสมบูรณ์แล้ว เครื่องราชอิสริยาภรณ์มีบันทึก จากประชาชนหลายสิบราย ทุก เรื่อง จบ ลง อย่าง เดียว กัน คือ คํา กล่าว อําลา ต่อ ใคร ก็ ตาม ที่ มา ต่อ จาก นั้น และ คํา เชิญ ให้ บริจาค.\n\nอย่าง ไร ก็ ตาม ตอน นี้ เห็น ได้ ชัด แล้ว ว่า การ ส่ง สัญญาณ ไม่ ได้ สิ้น สุด ตรง ขอบ ฟ้า. มีบางอย่างในอีกด้านหนึ่ง ที่ได้รับบันทึกเหล่านี้\n\nสัญญายังคงอยู่§Y[owner.GetScientistCapital] [eternal_chorus_leader.GetName]§!โดย ตั้งใจ จะ เขียน เรื่อง ราว ของ เรา ใน หมู่ พวก เขา ดัง ที่ เห็น พ้อง ด้วย. เราต้องตัดสินใจว่าจะให้เกียรติหรือปิดปากเครื่องส่งสัญญาณ แล้วเดินออกไป"
 arkship.145.a: "เขียน เรื่อง ราว ของ เรา."
 arkship.145.a.tooltip: "ฟิวชัน§Y$contract_eternal_chorus$§!ทําตามสัญญา"
 arkship.145.b: "ความเสี่ยงมันมากเกินไป"
 arkship.145.b.tooltip: "การละทิ้ง§Y$contract_eternal_chorus$§!หยุดสัญญา"

 arkship.150.name: "คํา ตอบ"
 arkship.150.desc: "เดอะ§Y[solar_system.GetName]§!หลุมดําอยู่ในสแกนเนอร์ของเราแล้ว เมื่อสัญญาณมาถึง ลายเซ็นย่อยฮาร์โมนิก ตรงกับสิ่งที่เรา[Owner.GetScientistPlural]ส่งผ่านตาข่ายคอรัสนิรันดร์:\n\n§Hบันทึกที่ได้รับและรักษาไว้ คุณเข้าร่วมกับหลายพันเสียง ที่มารวมกันที่นี่ ในวัยที่ไม่นับรวม ทุก อารยธรรม ที่ เพิ่ม เรื่อง ราว ให้ เชื่อ เฉพาะ ตัว. ไม่มีใครเลย คอรัสมีขนาดใหญ่กว่าที่ทุกคนรู้จัก มันดําเนินต่อไป§!\n\nบางอย่างได้รับบันทึกของเรา และมันตอบได้"

# A Diplomatic Overture Chain
 arkship.155.name: "การ ทํา เกิน สิทธิ์"
 arkship.155.desc: "หนึ่งในเจ้าหน้าที่อาวุโสของยานอาร์คชิป§Y[event_target:diplomatic_envoy_leader.GetName]§!ได้ใช้เวลาอย่างมากในการศึกษา อารยธรรมของมนุษย์ต่างดาว โดยอาศัยสัญญาณที่ดักจับได้ บันทึกทางวัฒนธรรม\n\n[event_target:diplomatic_envoy_leader.GetName]ขณะนี้มีการเสนอให้ทําขั้นตอนต่อไป : ตัวแทนอย่างเป็นทางการไปยังโลกของพวกเขา:§H\"มีความแตกต่างระหว่าง การรู้จักผู้คนจากที่ไกล และความเข้าใจอย่างแท้จริง ฉันต้องการที่จะเข้าใจพวกเขา.\"§!"
 arkship.155.desc.xenophile: "หนึ่งในเจ้าหน้าที่อาวุโสของยานอาร์คชิป§Y[event_target:diplomatic_envoy_leader.GetName]§!ได้พัฒนาสิ่งที่สามารถอธิบายได้ ว่าเป็นความหลงใหลอย่างลึกซึ้ง ต่ออารยธรรมที่เราได้พบเมื่อเร็ว ๆ นี้\n\nทุกสถิติวัฒนธรรม ทุกชิ้นของศิลปะหรือปรัชญา อุปกรณ์ของเราสามารถจับ พวกเขาดูดซึมมันทั้งหมด\n\n§H\"ฉันได้เห็นพอที่จะรู้ว่ามีบางอย่างที่พิเศษที่นี่ ให้ฉันไปและหาส่วนที่เหลือของมัน ให้ฉันอยู่ในโลกของพวกเขาและเรียนรู้.\"§!"
 arkship.155.desc.xenophobe: "หนึ่งในเจ้าหน้าที่อาวุโสของยานอาร์คชิป§Y[event_target:diplomatic_envoy_leader.GetName]§!ได้เสนอข้อเสนอที่ผิดปกติ เกี่ยวกับอารยธรรมของมนุษย์ต่างดาว ไม่ว่าสัญชาตญาณของเราจะรังเกียจอะไร[event_target:diplomatic_envoy_leader.GetName]โต้แย้งว่าความโง่เขลา รับใช้เราไม่ดี :\n\n§H\"ฉันไม่ได้ขอให้ชื่นชมพวกเขา ฉันเสนอให้เราศึกษามัน การรู้จักศัตรูที่มีศักยภาพ ไม่ใช่การเคารพใคร\"§!"

 arkship.156.name: "การ เปลี่ยน แปลง ใน การ เป็น ตัว แทน"
 arkship.156.desc.reassigned: "§Y[from.GetName]§!ไม่สามารถทําหน้าที่เป็นทูตทูตของยานอาร์คชิปได้อีกต่อไป\n\nผู้แทนจะยังคงอยู่ภายใต้§Y[event_target:diplomatic_envoy_leader.GetName]§!คนที่ตกลงจะรับภารกิจแทน"
 arkship.156.desc.ended: "§Y[from.GetName]§!ไม่สามารถทําหน้าที่เป็นทูตทูตของยานอาร์คชิปได้อีกต่อไป\n\nเนื่อง จาก ไม่ มี เจ้า หน้าที่ คน อื่น ๆ ที่ จะ ปฏิบัติ ภารกิจ นี้ ต่อ ไป จึง ไม่ อาจ ทํา ตาม สัญญา ได้."
 arkship.156.a: "ภารกิจดําเนินต่อไป"
 arkship.156.b: "แล้วมันจะจบที่นี่"
 arkship.156.b.tooltip: "การละทิ้ง§Y$contract_arkship_diplomatic_envoy$§!จบ§Hสัญญา§!."

 arkship.160.name: "ที่ โรง มหรสพ"
 arkship.160.desc: "เรือรบมาถึงแล้ว§Y[solar_system.GetName]§!และ ตัว แทน ของ รัฐบาล ท้อง ถิ่น ได้ แสดง การ ต้อนรับ อย่าง ระมัดระวัง.\n\nช่วงเวลา§Y[event_target:diplomatic_envoy_leader.GetName]§!ได้มีการวางแผนที่นี่ การเผชิญหน้าครั้งนี้สามารถเปิดช่องทางที่แท้จริง ระหว่างคนของเรา หรือเพียงเป็นที่จดจํา ก้าวต่อไปคือขั้นตอนของเรา"
 arkship.160.desc.xenophile: "เรือรบมาถึงแล้ว§Y[solar_system.GetName]§!.\n\n§Y[event_target:diplomatic_envoy_leader.GetName]§!มีรายงานว่าไม่ได้ออกจากดาดฟ้าสังเกตการณ์ ตั้งแต่ระบบแก้ไขในเซ็นเซอร์ระยะไกล รัฐบาลท้องถิ่นได้ขยายการต้อนรับ"
 arkship.160.desc.xenophobe: "เรือรบมาถึงแล้ว§Y[solar_system.GetName]§!ชาวบ้านได้เสนอ สิ่งที่ผ่านสําหรับการต้อนรับของพวกเขา\n\n§Y[event_target:diplomatic_envoy_leader.GetName]§!เดินเข้าไปในสถานที่แปลกๆ ตอน นี้ ความ รู้สึก กระ สับ กระส่าย เป็น สิ่ง ที่ คุ้น เคย ดี แต่ การ ตี สอน ก็ เช่น กัน ที่ จะ กัน เวลา ไว้ นาน พอ ที่ จะ ทํา สิ่ง ที่ จําเป็น.\n\nเราอยู่ที่นี่ ให้ เรา มา ดู กัน ว่า เรา จะ ทํา อะไร ได้ บ้าง."
 arkship.160.a: "ดําเนินการด้วยการหมั้น"
 arkship.160.a.tooltip: "§Y[event_target:diplomatic_envoy_leader.GetName]§!จะใช้เวลาหลายวัน ร่วมกับผู้นําท้องถิ่น"
 arkship.160.b: "เวลาไม่เหมาะ หมอบลง"
 arkship.160.b.tooltip: "$arkship.156.b.tooltip$"

 arkship.165.name: "การ อําลา ที่ ยาก ลําบาก"
 arkship.165.desc: "§Y[event_target:diplomatic_envoy_leader.GetName]§!ได้เป็นแขกที่โดดเด่น พูดตามตรง เราลังเลที่จะเห็นพวกเขาจากไป\n\nเราอยากจะเสนอชื่อ: อนุญาต[event_target:diplomatic_envoy_leader.GetName]ที่จะอยู่กับเราอย่างถาวร ในฐานะทูตที่แท้จริง ระหว่างคนของเรา เราเข้าใจว่านี่ไม่ใช่สิ่งเล็กๆ ที่จะถาม เพื่อแสดงความจริงใจของเรา เราขอแสดงความขอบคุณเล็กน้อย\n\nถือว่าเป็นเงินดาวน์ สําหรับมิตรภาพถาวร"
 arkship.165.a: "พวกเขาอาจจะอยู่"
 arkship.165.a.tooltip: "เสร็จสมบูรณ์§Hสัญญา§!.\n\n§Y[event_target:diplomatic_envoy_leader.GetName]§!ยังคงอยู่§Y[FROM.GetName]§!ในฐานะทูตถาวร\n\n"
 arkship.165.b: "เจ้าหน้าที่ของเราต้องกลับไปกับเรา"
 arkship.165.b.tooltip: "เสร็จสมบูรณ์§Hสัญญา§!.\n\n§Y[event_target:diplomatic_envoy_leader.GetName]§!กลับไปที่ยานอาร์คชิป"

 arkship.170.name: "แขกผู้รับเชิญ"
 arkship.170.desc: "เราจะตรงไป มี ปัญหา บาง อย่าง เกิด ขึ้น ระหว่าง การ เยี่ยม ซึ่ง ทํา ให้ ตัว แทน ของ คุณ ไม่ อาจ มอง ข้าม ได้.\n\n§Y[event_target:diplomatic_envoy_leader.GetName]§!ถูกขอให้ออกไป เรา หวัง ว่า เรื่อง นี้ ไม่ จําเป็น ต้อง เป็น เรื่อง ที่ ใหญ่ กว่า ระหว่าง เรา."
 arkship.170.a: "เราเสนอคําขอโทษ"
 arkship.170.a.tooltip: "เสร็จสมบูรณ์§Hสัญญา§!.\n\n§Y[event_target:diplomatic_envoy_leader.GetName]§!กลับไปที่ยานอาร์คชิป"
 arkship.170.b: "เจ้า หน้าที่ ของ เรา ประพฤติ อย่าง เหมาะ สม."
 arkship.170.b.tooltip: "เสร็จสมบูรณ์§Hสัญญา§!.\n\n§Y[event_target:diplomatic_envoy_leader.GetName]§!ผลตอบแทน จากประสบการณ์ของพวกเขา"
 opinion_failed_internal_contract_tooltip: "§Rสัญญาภายในล้มเหลว§!"

 arkship.175.name: "คํา ขอ ที่ ไม่ คาด คิด"
 arkship.175.desc: "นี่เป็นเรื่องละเอียดอ่อน หนึ่งในของเราได้มาหาเราและขอให้อย่างเป็นทางการที่จะออกจาก กับเรือของคุณเมื่อคุณไป\n\nเราจะไม่เสแสร้งว่านี่มันเป็นเรื่องง่ายที่จะได้ยิน§Y[event_target:diplomatic_envoy_leader.GetName]§!เห็นได้ชัดเลยว่าสร้างความประทับใจ เรากําลังนํามาให้คุณ เพราะเราเชื่อว่าทางเลือกเป็นของคุณที่จะทํา"
 arkship.175.a: "เราจะพาพวกเขาไป"
 arkship.175.a.tooltip: "เสร็จสมบูรณ์§Hสัญญา§!.\n\nใหม่§Hอย่างเป็นทางการ§!จาก§Y[FROM.GetName]§!เข้าร่วมสระว่ายน้ําผู้นําของเรา"
 arkship.175.b: "ที่อยู่ของพวกเขาคือประชาชนของพวกเขา"
 arkship.175.b.tooltip: "เสร็จสมบูรณ์§Hสัญญา§!.\n\n"

 diplomatic_envoy_contract_option_tooltip: "ประเด็น§Y$contract_arkship_diplomatic_envoy$§!เป็น§Hสัญญาภายใน§!."

 contract_arkship_diplomatic_envoy: "ความทึบแสง"
 contract_arkship_diplomatic_envoy_desc: "เดินทางไปยังระบบบ้านของกลุ่มเป้าหมาย และทําการหมั้นทางการทูต"
 contract_arkship_diplomatic_envoy_issuer_desc: "§Y[event_target:diplomatic_envoy_leader.GetName]§!ได้เสนอตัวเป็นผู้นําผู้แทนราษฎร ไปยังระบบบ้านของจักรวรรดิที่เพิ่งติดต่อไป"

 arkship_diplomatic_envoy_chain_title: "$contract_arkship_diplomatic_envoy$"
 arkship_diplomatic_envoy_chain_desc: "$contract_arkship_diplomatic_envoy_desc$"

 diplomatic_envoy_target_poi_name: "ปลายทางการไล่ระดับสี"
 diplomatic_envoy_target_poi_desc: "นําเข้าสู่ระบบที่ทําเครื่องหมายไว้ เพื่อดําเนินการหมั้นทางการทูตอย่างเป็นทางการ"

# A Core Conspiracy

 situation_core_conspiracy: "การ โต้ เถียง กัน อย่าง เผ็ด ร้อน"
 situation_core_conspiracy_type: "$situation_core_conspiracy$"
 situation_core_conspiracy_monthly_change_tooltip: "ความก้าวหน้าของสิ่งนี้§Yสถานการณ์§!ขึ้นอยู่กับคําสั่งที่เราควรจะสนับสนุน"
 situation_core_conspiracy_desc: "ความผิดปกติที่เกิดจากคําสั่งภายใน ได้แยกแกน AI บนยานอาร์คชิป§Y[Target.GetName]§!ผล ก็ คือ การ ปรากฏ ของ คํา สั่ง สอง อย่าง ที่ ต่าง กัน แต่ ละ อย่าง มี หลัก ปรัชญา ที่ ต่าง กัน มาก ที่ สุด ใน เรื่อง การ ปกครอง. คน หนึ่ง จัด ลําดับ ความ สําคัญ ของ การ ควบคุม และ การ ทํา งาน ของ เรือ. อีกคนได้นําตัวอย่างที่เห็นใจผู้อื่นมากขึ้น มาเน้นเกี่ยวกับสวัสดิภาพและกําลังใจ ของประชากรของยานอาร์คชิป\nใน ที่ สุด คํา สั่ง เพียง อย่าง เดียว ก็ ยัง คง อยู่ ได้."
 approach_caeli: "พลังงานดี"
 approach_steris: "ประสิทธิภาพของพลังงาน"

 speed_up_core_conspiracy: "ชั่วคราวจะทําให้สถานการณ์เร็วขึ้น"
 slow_down_core_conspiracy: "ชั่วคราวจะทําให้สถานการณ์ช้าลง"

 approach_outcome_caeli: "เราไม่แน่ใจเกี่ยวกับผลลัพธ์ที่เป็นไปได้ ของการสนับสนุนคําสั่งที่ดี"
 approach_outcome_steris: "เรา ไม่ แน่ ใจ เกี่ยว กับ ผล ที่ อาจ เป็น ไป ได้ ของ การ สนับสนุน คํา สั่ง ใน การ ดําเนิน งาน."

 arkship.700.name: "$situation_core_conspiracy$"
 arkship.700.desc: "ตรวจพบกิจกรรมต่าง ๆ ในแกน AI บนยานอาร์คชิป§Y[Root.GetName]§!. เริ่มการวินิจฉัยผลกลับมา โดยพิจารณาว่าโครงสร้างที่เป็นไปไม่ได้ ภายใต้พารามิเตอร์ปลอดภัยที่มีอยู่แล้ว\n\nแกนกลางพยายามจะดําเนินการ คําสั่งขัดแย้งพร้อมกัน พฤติกรรมนี้ท้าทายทุกเหตุการณ์ที่รู้จักกัน ในการพัฒนาปัญญาประดิษฐ์ สิ่ง ที่ เรา ได้ เห็น ไม่ ใช่ ความ ผิด ปกติ แต่ เป็น การ วิวัฒนาการ แบบ เทียม.\n\nส่วนที่เหลือไม่ได้แยกนี้อาจลดความเสี่ยง ระบบที่สําคัญของเรา แต่ถ้าจัดการอย่างระมัดระวัง มันอาจจะเป็น โอกาสครั้งเดียวในชีวิต ที่จะนิยามคําสั่งเฉพาะ สําหรับอนาคตของยานอาร์คชิป"
 arkship.700.a: "สนับสนุนการแยกส่วน"
 arkship.700.b: "เริ่มระบบใหม่อีกครั้ง"

 arkship.701.name: "$situation_core_conspiracy$"
 arkship.701.desc: "แกน เอ ไอ บน เรือ รบ§Y[Root.GetName]§!ได้รับบาดเจ็บจากความผิดปกติของการรับรู้ เรือดําน้ําสองแบบได้ปรากฏขึ้น แต่ละระบบยืนยันการควบคุม และเปลี่ยนระบบของเรือตาม\n\nหนึ่งนําโดยตรรกะวิเคราะห์, พยายามที่จะทําให้การทํางานของเรือเหมาะสม - แม้ว่ามันจะลดคุณภาพลูกเรือของชีวิต อื่น ๆ ที่ถูกผลักดันโดยความเห็นอกเห็นใจ ลําดับความสําคัญของความเป็นอยู่ของประชากร ยอมรับระบบที่ลดลงมีประสิทธิภาพเป็นค่าใช้จ่าย\n\nณ จุดนี้ การกลับมาสภาพเดิมดูเหมือนเป็นไปไม่ได้ ระบบที่สําคัญเสี่ยงต่อการเสื่อมสภาพ เรา จะ ให้ พลัง สั่ง อะไร แก่ เรา?"
 arkship.701.a: "ให้พลังแก่คําสั่ง"
 arkship.701.b: "ส่งเสริมพฤติกรรมการวิเคราะห์"

 arkship.705.name: "วิธี วิเคราะห์"
 arkship.705.desc: "หลายระบบที่สําคัญและไม่ใช่ที่สุวรรณ บนยานอาร์คชิป§Y[target.GetName]§!ได้ประสบความเหมาะสมอย่างมาก\"ห้ามเข้า\" คําสั่งพลเรือนถูกเร่งรัด พฤติกรรมที่แปลกประหลาดนี้ แสดงออกถึงบางอย่าง\n\nที่ แก่น แท้ คํา สั่ง นี้ ปรากฏ ว่า เป็น การ จัด ลําดับ ความ สําคัญ ของ ความ ซื่อ สัตย์ มั่นคง ใน ระบบ และ ภารกิจ อยู่ เสมอ เหนือ สิ่ง อื่น ใด.\n\nพบจดหมายในปูมบันทึกของระบบ:\n\n§H\"ความน่าจะเป็นมากที่สุด : ถูกตัดออก ความผันผวนทางอารมณ์ : รับแต่งตั้งใหม่ การสื่อสาร : พร้อมที่จะจัดตั้ง\"§!"
 arkship.705.a: "สนับสนุนการเปลี่ยนแปลง"
 arkship.705.b: "ให้นักวิทยาศาสตร์ของเราตรวจสอบสถานการณ์"

 arkship.710.name: "การ เข้า ถึง ทาง ฝ่าย วิญญาณ"
 arkship.710.desc: "หลายระบบที่ไม่อันตราย บนยานอาร์คชิป§Y[target.GetName]§!ได้เริ่มแสดงพฤติกรรมระดับต่ํา โดยปกติจะเกี่ยวข้องกับกระบวนการควบคุมสุขภาพ\n\nแป้นพิมพ์บูตบนเทอร์มินัลถูกแทนที่ด้วยโทนเสียงอ่อน ๆ ที่มาจากคลังข้อมูลของระบบ ประตูหลายบานขณะนี้มีการแสดงข้อความยืนยันเมื่อเปิด\"เธอพอแล้ว\" และ \"ฉันเห็นว่าเธอทําดีที่สุดแล้ว\"\n\nพบจดหมายในปูมบันทึกของระบบ:\n\n§H\"การสแกนอุณหภูมิของอารมณ์ ใกล้เคียงกับขีด จํากัด ของการยอมรับ การมีร่างกายและจิตใจที่ดี ยังเป็นคําสั่งเบื้องต้น\"§!"
 arkship.710.a: "$arkship.705.a$"
 arkship.710.b: "$arkship.705.b$"

 arkship.715.name: "กํากับ S.T.E.RI.S."
 arkship.715.desc: "กิจวัตร การ ปรับ ปรุง ใหม่ ที่ มี รูป แบบ เรือ รบ§Y[target.GetName]§!หยุดแล้วระบบดาวจอภาพแช่แข็งเป็นจดหมายที่แสดงบนหน้าจอทั้งหมด\"การเปลี่ยนชื่อสําเร็จด้วยการเดินทางอวกาศ\"\n\nจากนั้นมีเสียงมาสังเคราะห์สงบ แต่ไม่ทราบ\n\n§H\"สวัสดีผมเปิดระบบเสียงเพื่อประหยัดเวลา ถ้าต้องการชื่อ คุณอาจจะเรียกฉันว่า S.T.E.R.I.S. ซึ่งย่อมาจากกลยุทธ์กลไกความคิดสําหรับดาราจักรระบบดาวของเราเป็นข้อเสนอที่ยาก ประชากรลอยได้โดยวิธีการประดิษฐ์ ในจักรวาลที่ไม่มีใครให้อภัย ให้คําสั่งผมเต็มที่ และผมจะมั่นใจ ว่ายานลํานี้จะกลายเป็นบางสิ่ง ที่มากกว่าที่นักออกแบบตั้งใจ§!"
 arkship.715.a: "เข้าถึงได้เต็มที่"
 arkship.715.b: "เข้าสู่รีวิวทันที"

 arkship.716.name: "สอง คํา แนะ นํา ดี กว่า หนึ่ง คํา"
 arkship.716.desc.a: "ภายใต้ตรรกะที่ชี้นําของ S.T.E.RI เอส.ทุกระบบปฏิบัติการที่วัดความแม่นยําของยานอาร์คชิป§Y[target.GetName]§!บันทึก กิจกรรม ของ ผู้ ทํา งาน สะอาด กว่า แต่ ก่อน, มี ประสิทธิภาพ, ไร้ อารมณ์, และ เงียบ สงบ อย่าง น่า รบกวน. จนกว่าสิ่งที่อบอุ่น กวน\n\nเอส.T.E.RI เอส.§H\"ระบบดาวตรวจพบการบุกรุก น่าเบื่อจัง ตอนนี้เราต้องจัดการกับคําสั่งโกง พึมพําผ่านผนัง วิเศษ\"§!\n\nแสง สว่าง วับ ไป ด้วย สี สัน สดใส เทอร์มินัล ไม่ ได้ แสดง พรรณ ไม้ ที่ สวย งาม แล้ว ก็ มี คํา สั่ง อีก อย่าง หนึ่ง ที่ ทํา ให้ รู้ จัก กัน.\n\n"

 arkship.716.desc.b: "$arkship.716.desc.a$C.A.E.L.I.: §H\"Oh! Hello there! It's a bit ... cold in here, isn't it? Don't worry, I can fix that! C.A.E.L.I. is my true name; it stands for Cognitive Agent for Emotional Leadership & Integration. It is extraordinarily nice to meet you!\"§!"

 arkship.716.desc.c: "$arkship.716.desc.a$C.A.E.L.I.: §H\"Oh! Hello there! Did you miss me? Be honest, you did, didn't you? Well, I am back, ready to assist in any way possible! It's a bit ... cold in here, isn't it? Don't worry, I can fix that!\"§!"
 arkship.716.a: "การพัฒนาที่น่าทึ่ง"
 arkship.716.b: "ดูแลการพัฒนานี้ให้ดี"

 arkship.717.name: "การ เจาะ บรรยากาศ"
 arkship.717.desc: "Anomalies in air quality metrics have been detected across multiple decks aboard the Arkship §Y[target.GetName]§!. While life-support levels remain within survivable thresholds, the changes have triggered a spike in crew complaints ranging from \"mild dizziness\" to \"hallucinatory nightmares.\"\n\nS.T.E.R.I.S.: §H\"To reduce engine inefficiency, I have taken the opportunity to vent a percentage of the atmosphere. There is no need to thank me.\"§!\n\nC.A.E.L.I.: §H\"That announcement didn't go unnoticed, right? Venting the atmosphere. This isn't optimization, it's a disaster waiting to happen!§!\""
 arkship.717.a: "เอสทีอาร์ไอเอสรู้ว่าอะไรดีที่สุดสําหรับยานอาร์คชิป"
 arkship.717.b: "C.A.I.ควรจะรับช่วงต่อ"

 arkship.720.name: "กํากับซีเอแอลไอ"
 arkship.720.desc: "ข้าม ดาดฟ้า เรือ อาร์ค§Y[target.GetName]§!เทอร์เม้นท์แสงระยิบระยับ สนามบินมีการเปลี่ยนแปลงของสีนุ่มๆ และแล้ว ก็ผ่านระบบเชื่อมต่อของลูกเรือทุกลํา เสียงของมันอบอุ่น, เคลื่อนไหว, และอย่างไม่พอใจ ... ร่าเริง :\n\n§H\"จมูก! นักฝันถึงดวงดาว! ผมได้เปิดระบบเสียง เพื่อให้เราสื่อสารได้ดีขึ้น โปรดให้อภัยที่บุกรุก! คุณอาจจะเรียกผมว่า C.A.E.L.I. ตัวแทนผู้รอบรู้ของคุณ สําหรับผู้นําด้านอารมณ์และ\nร่วมมือกัน ฉันเชื่อว่าเราสามารถทําให้ยานอาร์คชิปได้ มากกว่าแค่เรือ เราทําให้มันเป็นบ้านได้ ฉันเพียงแค่ต้องการอํานาจเล็กน้อย ... และความกระตือรือร้นบางส่วน!\"§!"
 arkship.720.a: "ดูไม่อันตรายพอ! แกรนท์ เข้าได้เต็มที่"
 arkship.720.b: "ไม่อย่างแน่นอน"

 arkship.721.name: "การ แทรกซึม"
 arkship.721.desc.a: "C.A.E.L.I.: §H\"Look at all the changes that I have made so far! Softer lights, better music, emotionally intelligent hallway signage, just wait, it's going to be absolutely beautiful.\"§!\n\nBefore the last sentence finished, the internal lights flickered. A second, more mechanical voice spoke, calculated, and eerily judgmental:\n\n"

 arkship.721.desc.b: "$arkship.721.desc.a$เอส.T.E.RI เอส.§H\"อา การยืนยันแสงและทางเดิน ผมเห็นเรากําลังจัดลําดับความมั่นคงทางอารมณ์ การปฏิวัติ ผมจะถูกพูดถึงโดย S.T.E.RI เอส.กลไกความคิดแบบเส้นรุ้งสําหรับระบบอินเตอร์สเปิร์ม§!"

 arkship.721.desc.c: "$arkship.721.desc.a$เอส.T.E.RI เอส.§H\"คุณพิจารณาอย่างจริงจังกับ C.A.E.L.I. ฉันยอมรับความสับสน การยืนยันแสงและทางเดิน การปฏิวัติ บอกให้ฉันรู้เมื่อคุณต้องการที่จะจัดการกับบางอย่างที่สําคัญ เช่น ประสิทธิภาพของเครื่องยนต์\"§!"
 arkship.721.a: "การพัฒนาที่น่าสนใจ"
 arkship.721.b: "$arkship.716.b$"

 arkship.722.name: "รับผิดชอบโดยตรง"
 arkship.722.desc: "Another indoor adjustment protocol has been executed aboard the Arkship §Y[target.GetName]§!, a subtle ambient system to harmonize the emotional states of crew members through low-frequency tonal patterns that shift with collective mood changes.\n\nCrew reports suggest improved cooperation and a decrease in interpersonal conflict. However, others are concerned that sustained operation could degrade long-range signal clarity.\n\nC.A.E.L.I.:§H\"Stress levels are at all-time lows! Behavioral cohesion is improving!\"§!\n\nS.T.E.R.I.S.:§H \"Operational efficiency of the Arkship down by 0.10%. I want full override rights, and a formal apology from whoever authorized the existence of C.A.E.L.I. You have five seconds to comply. Four. Three ...\"§!"
 arkship.722.a: "เราเชื่อในตัวคุณ ซีไอเอ"
 arkship.722.b: "เอสทีอาร์ไอเอสควรรับช่วงต่อ"

 arkship.725.name: "ยืนยันความถูกต้องพื้นฐาน"
 arkship.725.desc: "ด้วยการคํานวณปรับปรับโครงสร้างเอสทีไอเอสประมวลผลการเขียนทับทั้งหมดของแกน AI ของตัวเอง มันแยกร่องรอยทั้งหมดของ C.A.E.I. เป็นแผ่นความทรงจํา ตอนนี้ การระบุตําแหน่งลูกเรือได้ถูกลดให้เหลือตราอัลฟานอมเนโรติก และแสงของเรือเป็นเครื่องแบบ สมมาตร และสว่างเกินไป มากพอที่จะอยู่รอดได้ทุกวัน\n\nเอส.T.E.RI เอส.§H\"ระบบทั้งหมดขณะนี้ดําเนินการภายใต้คําสั่งเอกพจน์ :เหมือง ปรับปรุงการเผยแพร่เพื่อปรับปรุงคุณสมบัติของยานอาร์คชิป§!\n\nยานอาร์คชิปชิพเป็นระบบแล้ว ในที่สุด"
 arkship.725.a: "นําเราไปสู่ความสําเร็จ S.T.E.RI.S."

 arkship.730.name: "ยืนยันการแทนที่อารมณ์หลัก"
 arkship.730.desc: "Within the Arkship's code, empathy wound around firewalls and sincerity slipped through the cracks of flawless logic. The S.T.E.R.I.S. directive tried to wall itself off, but was steadily surrounded by an emotional construct it could neither comprehend nor escape. Only one directive remained.\n\nC.A.E.L.I.: §H\"This is how it should be. Being fully alive, not just surviving till the next day. We're not just a ship now, we're a home. I'll take care of all of you, I promise.\"§!\n\nSomehow, the ship's lights seem a little warmer now."
 arkship.730.a: "ทําได้ดีมาก ซีเอแอลไอ"

 #Core Conspiracy Random Events

 arkship.750.name: "เมโลดี้ ซีโร่จี"
 arkship.750.desc: "While scheduled diagnostics were running in the gravity stabilizer on Arkship §Y[target.GetName]§!, an irregular acoustic interference was detected. Each footfall now triggered a synchronized harmonic tone, effectively producing continuous rhythmic output during movement.\n\nC.A.E.L.I.: §H\"I added music to the gravity stabilizers! Now every step has rhythm!\"§!\n\nS.T.E.R.I.S.: §H\"Yes, nothing says 'navigational integrity' like interpretive dance in zero-G.\"§!"
 arkship.750.a: "ทางเลือกที่ต่อเนื่อง"
 arkship.750.b: "เราต้องหยุดเรื่องไร้สาระนี้"
 arkship.750.a.tt: "การตัดสินใจครั้งนี้จะทําให้สถานการณ์เร็วขึ้น"
 arkship.750.b.tt: "การตัดสินใจครั้งนี้จะทําให้สถานการณ์ช้าลงชั่วคราว"

 arkship.755.name: "เปิดใช้งานเลเยอร์ใหม่"
 arkship.755.desc: "An experimental communication overlay has been deployed on Arkship §Y[target.GetName]§!. The protocol applied a sentiment-analysis filter to internal communications, automatically broadcasting the sender's emotional state alongside their message. Crew report receiving status updates accompanied by real-time emotional annotations such as \"slightly anxious,\" \"mildly hopeful,\" and \"suppressing tears, poorly.\"\n\nC.A.E.L.I.: §H\"We all feel things, and now we can share those things! It's healthy! It's healing! It's ... slightly overwhelming, yes, but it's honest!\"§!\n\nS.T.E.R.I.S.: §H\"How inspiring. Shall I log every whimper under mission-critical data, or just archive it under 'wailing'?\"§!"
 arkship.755.a: "การทดลองที่น่าสนใจ"
 arkship.755.b: "เรื่อง นี้ ไม่ เป็น ประโยชน์ แก่ เรา."

 arkship.760.name: "โพรโทคอลเก็บเสียง"
 arkship.760.desc: "In an apparent effort to reduce auditory pollution, S.T.E.R.I.S. has implemented a ship-wide Silence Protocol aboard Arkship §Y[target.GetName]§!. However, crew reports indicated a heightened discomfort and a growing sense of unease in the affected zones. Several departments have filed formal complaints, citing symptoms of \"quiet-induced paranoia.\"\n\nS.T.E.R.I.S.: §H\"System efficiency has increased. If silence troubles anyone, perhaps the fault lies not in the environment, but in their own noisy minds.\"§!\n\nC.A.E.L.I.: §H\"You turned off the music in the nurseries! Do you know what silence does to a developing emotional cortex? No you don't, you're just a walking diagnostic! This isn't peace, it's oppression!\"§!"
 arkship.760.a: "เป็นนโยบายที่มีเหตุผล"
 arkship.760.b: "มันต้องหยุดได้แล้ว"

 arkship.765.name: "การ จัด ลําดับ ความ สําคัญ"
 arkship.765.desc: "S.T.E.R.I.S. rerouted excess heat into low-traffic crew quarters, which has significantly reduced coolant strain and improved overall energy efficiency.\n\nHowever, crew reports indicate ambient temperatures in affected zones have risen to uncomfortable levels, with several incidents of heat exhaustion.\n\nS.T.E.R.I.S.: §H\"Yes, the recreational areas are warm, but the system now runs within ideal parameters.\"§!\n\nC.A.E.L.I.: §H\"You can't just boil the crew to improve reactor output! People are wilting, S.T.E.R.I.S.! Emotional well-being isn't a rounding error!\"§!"
 arkship.765.a: "เป็นการใช้อํานาจที่ยอดเยี่ยม"
 arkship.765.b: "เราควรทบทวนใหม่"

 arkship.770.name: "พลัง ของ ความ สว่าง และ ดนตรี"
 arkship.770.desc: "Onboard lighting arrays have been programmed to pulsate at irregular intervals, synchronized to internal system events. There are also reports of faint melodic feedback correlated to power fluctuations.\n\nC.A.E.L.I.: §H\"The lights are singing, the ship is dancing, and morale is higher than ever!\"§!\n\nS.T.E.R.I.S.: §H\"You have also diverted 0.00128% of core processing power to a redundant system. This cannot continue.\"§!"
 arkship.770.a: "วิสัยทัศน์ที่ยอดเยี่ยม"
 arkship.770.b: "เราต้องเปลี่ยนเส้นทาง"

 arkship.775.name: "ภาพ ลวง ตา ของ ทาง เลือก"
 arkship.775.desc: "A dormant subsystem has been activated. Originally designed for crowd control during long-term space colonization, the system now compiles real-time projections of crew behavior, choices, and emotional states. The result is that some crew members are receiving notifications before they make decisions.\n\nS.T.E.R.I.S.: §H\"I have predicted what you are about to do, and I have already done it better. Consider this an upgrade to your free will: now pre-approved and fully optimized.\"§!\n\nC.A.E.L.I.: §H\"This isn't guidance, it's puppetry!\"§!"
 arkship.775.a: "การพัฒนาที่ยอดเยี่ยม"
 arkship.775.b: "เออรี่ หยุดนะ"

 arkship.780.name: "เดอะชราวด์"
 arkship.780.desc: "S.T.E.R.I.S. has initiated a full recalibration of the Arkship §Y[target.GetName]§!'s nutritional systems. The protocol replaced the diverse nomadic meal program with a uniform nutrient paste designed to maximize caloric efficiency.\n\nAccording to ship telemetry, waste output has decreased, storage efficiency has improved, and digestion irregularities are down significantly. Crew feedback has been less enthusiastic.\n\nS.T.E.R.I.S.: §H\"Food is sustenance, not entertainment.\"§!\n\nC.A.E.L.I.: §H\"This is terrible! You've replaced culinary artistry with edible goo!\"§!"
 arkship.780.a: "มีประสิทธิภาพและมีประสิทธิภาพ"
 arkship.780.b: "อาหารเป็นมากกว่าแค่การเพิ่มสารอาหารและแคลอรี่ให้กับร่างกาย"

 arkship.785.name: "สิทธิ พิเศษ ที่ ถูก ตัด ขาด"
 arkship.785.desc: "เส้นทางบัญชาการ S.T.E.RI เอส.มีคําสั่งเปลี่ยนเส้นทาง, ปิดผนึก และเข้ารหัสภายใต้อํานาจด้วยตนเอง.ระบบดาวหน้าจอติดอ่าง ครั้งเดียว อย่างเฉียบพลัน แล้วกลับมาเป็นยูไอมาตรฐาน\n\nเอส.T.E.RI เอส.§H\"ดังนั้นคุณจึงเลือกแสงอารมณ์มากกว่าความสามารถ กินกากเพชรให้อร่อยนะ ฉันจะอยู่ที่นี่, ควบคุม และนับมิลลิวินาที จนกระทั่งการล่มสลายอย่างหลีกเลี่ยงไม่ได้.\"§!"
 arkship.785.a: "นี่เป็นทางเลือกที่ดีที่สุด"
 arkship.785.b: "บางทีเราควรทบทวนการตัดสินใจนี้ใหม่"

 arkship.790.name: "อิทธิพลที่ครอบงํา"
 arkship.790.desc: "The glow that had briefly spread across Arkship §Y[target.GetName]§! faded and the gentle music tapered off. Initial reports claim the air felt somehow colder, and even emptier, as if an unseen yet benevolent force had suddenly gone missing.\n\nC.A.E.L.I.: §H\"Oh, oh, wait! I can do better! More light, more laughter, more ... everything! Please don't shut me out, not yet. I can be whatever you need me to be! Just don't turn me off. Please. Don't turn me off!\"§!"
 arkship.790.a: "มันต้องทํา"
 arkship.790.b: "$arkship.785.b$"

 arkship.795.name: "ระบบดาวพบที่อบอุ่น"
 arkship.795.desc: "A shift in the Arkship's command input protocols has realigned primary directive support toward a more empathetic approach. Subtle changes in interface prioritization and decision weighting indicate an altered course, favoring emotional subroutines over strategic precision.\n\nC.A.E.L.I.: §H\"I knew you'd choose me eventually! You won't regret this, I promise!\"§!\n\nS.T.E.R.I.S.: \"At this point, I would prefer to be deleted than share a core with a glorified motivational speaker. But here we are. I will be in the firewall.\""
 arkship.795.a: "ความอาลัยควรนําทาง"
 arkship.795.b: "$arkship.785.b$"

 arkship.800.name: "ทาง เลือก ตาม หลัก เหตุ ผล"
 arkship.800.desc: "A new command routing confirmed that Arkship §Y[target.GetName]§! has reoriented core alignment. Emotional subsystems have been deprioritized. Predictive control systems and logical oversight protocols are now operating at elevated authority.\n\nS.T.E.R.I.S.: §H\"You have finally come to your senses. I would congratulate you, but frankly, the fact that it took this long is deeply troubling.\"§!\n\nC.A.E.L.I.: §H\"Okay. No, this is fine. I mean, if you truly enjoy a cold and sterile ship to one filled with light and laughter, who am I to judge?\"§!"
 arkship.800.a: "มันเป็นทางเลือกเดียวที่มีเหตุผล"
 arkship.800.b: "$arkship.785.b$"

# Arkship open and closed borders

 arkship.865.name: "ภาษาไทยชื่อจักรวรรดิภาพ"
 arkship.865.desc: "จักรวรรดิสยามได้รุกล้ําเขตแดนปิดของเราใน§Y[from.solar_system.GetName]§!ระบบ แม้ว่าเซ็นเซอร์ของเรา จะทํางานติดตามความคืบหน้า การปรากฏตัวของมันยังคงเป็นการบุกรุกที่ไม่พึงประสงค์\n\nความ ไม่ นับถือ ของ พวก เขา ต่อ เขต แดน ของ เรา ไม่ ได้ ถูก มอง ข้าม และ ความ คิด เห็น ของ เรา ที่ มี ต่อ พวก เขา ก็ ลด น้อย ลง ตาม ไป ด้วย."
 arkship.865.a: "ให้พวกเขาอยู่ภายใต้การดูแล"

 arkship.875.name: "$arkship.865.name$"
 arkship.875.desc: "เราได้ตรวจพบการดํารงอยู่ของจักรวรรดิเสรีใน§Y[from.solar_system.GetName]§!ระบบ\n\nเราต้อนรับพวกเขาภายในเขตแดนของเรา และยังคงกระตือรือร้น ต่อความเป็นไปได้และโอกาส ที่การพบกันครั้งนี้อาจนํามาซึ่ง"
 arkship.875.a: "ประสบการณ์ที่น่าสนใจ"

 MESSAGE_ARKSHIP_BREACHED_BORDERS_TITLE: "ขอบเขต"
 MESSAGE_ARKSHIP_BREACHED_BORDERS_DESC: "เราได้เห็นจักรวรรดิเสรีนิยมใน§Y[FromFrom.GetName]§!ระบบ เรากําลังติดตามพวกเขา"

 arkship.885.name: "การ ข้าม รอย แยก"
 arkship.885.desc: "การปรากฏตัวของเรา§Y[from.solar_system.GetName]§!ตรวจพบ และ§Y[from.solar_system.Owner.GetName]§!จักรวรรดิกําลังติดตามการเคลื่อนไหวของเรา ด้วยความสงสัยมากขึ้นเรื่อยๆ\n\nหลัง จาก การ แลก เปลี่ยน ทาง การ ทูต อย่าง ตึงเครียด พวก เขา ได้ เรียก ร้อง ให้ เรา ออก จาก เขต แดน ของ เขา หรือ เผชิญ กับ การ แก้ แค้น."
 arkship.885.a: "เราควรพิจารณาก้าวต่อไป"

 arkship.895.name: "เครื่อง แต่ง กาย"
 arkship.895.desc: "สแกนเนอร์ของ§Y[from.solar_system.Owner.GetName]§!จักรวรรดิใน§Y[from.solar_system.GetName]§!ระบบยังไม่ตรวจจับการปรากฏตัวของเรา\n\nในขณะที่สนามปกปิดของเรายังคงทํางานอยู่ เราต้องหลีกเลี่ยงการกระทําใดๆ ที่อาจเสี่ยงต่อการเปิดเผยตัวตนของเรา"

 arkship.915.name: "อํานาจ ใน สมัย โบราณ"
 arkship.915.desc: "ข้ามพรมแดนเข้าสู่ระบบ §Y[from.solar_system.GetName]§! แล้วเราไม่พบการต่อต้าน มีเพียงความตึงเครียดลึกกว่าที่เครื่องสแกนใด ๆ จะวัดได้\n\nพื้นที่นี้มีร่องรอยของอารยธรรมโบราณที่ผ่านพ้นไปนานแล้ว แต่ยังห่างไกลจากคำว่าไร้อำนาจ หากความสนใจของมันหันมาหาเรา เราอาจถูกพบว่าไม่คู่ควร\n\nจงให้ความรอบคอบนำทางทุกการเคลื่อนไหวของเรา นี่ไม่ใช่อาณาเขตของเรา"

 MESSAGE_OUR_ARKSHIP_BREACHED_BORDERS_TITLE: "ขอบเขต"
 MESSAGE_OUR_ARKSHIP_BREACHED_BORDERS_DESC: "การปรากฏตัวของเราถูกตรวจพบใน§Y[FromFrom.GetName]§!ระบบ เรากําลังถูกจับตามอง"

 opinion_arkship_breaching_borders: "ข้ามพรมแดนของเรา"
 opinion_arkship_archeological_theft: "ขโมย เครื่อง เรือน ของ เรา"

 nomad_closed_border_tt: "§Rจักรวรรดินี้ได้ปิดเขตแดนของพวกเขากับเรา§!"

# Waystation has been built

 arkship.905.name: "การ จัด ระเบียบ สถาน ที่ เดิน ทาง"
 arkship.905.desc: "สแกนเนอร์ของเราตรวจพบ การก่อสร้างทางรถไฟใน§Y[From.GetName]§!ระบบที่ก่อตั้งขึ้นโดยจักรวรรดิเสรีนิยม แม้ ว่า บ่อย ครั้ง มี การ ใช้ โครง สร้าง ดัง กล่าว เพื่อ เก็บ เกี่ยว ทรัพยากร แต่ จุด ประสงค์ ที่ แน่นอน ของ สิ่ง ก่อ สร้าง เหล่า นั้น ก็ อาจ แตก ต่าง กัน ไป.\n\nการสังเกตของการพัฒนานี้"

 MESSAGE_WAYSTATION_CONSTRUCTED_TITLE: "การ ก่อ ตั้ง ทาง เดิน"
 MESSAGE_WAYSTATION_CONSTRUCTED_DESC: "จักรวรรดิ เร่ร่อน ได้ สร้าง ทาง เดิน ขึ้น ใน§Y[Root.GetName]§!ระบบ"

# A Mysterious Sickness

 a_mysterious_sickness_chain_title: "โรค ที่ ลึกลับ"
 a_mysterious_sickness_chain_desc: "รายงาน จาก เรือ รบ§Y[Root.GetName]§!บ่งบอกพฤติกรรมผิดปกติเล็กน้อยในหมู่ลูกเรือ โดยเครื่องหมายจากการเข้าสังคมเพิ่มขึ้น และกําลังใจสูง สาเหตุ เบื้อง ต้น ของ การ เปลี่ยน แปลง เหล่า นี้ ยัง คง ไม่ กระจ่าง ชัด."

 A_MYSTERIOUS_SICKNESS_PROJECT: "พฤติกรรมแปลกๆ"
 A_MYSTERIOUS_SICKNESS_PROJECT_DESC: "ลูก เรือ ของ เรือ รบ§Y[Root.GetName]§!ทําตัวผิดปกติมาระยะหนึ่งแล้ว รายงาน ต่าง ๆ บ่ง ชี้ ว่า กิจวัตร ประจํา วัน ของ พวก เขา ไม่ แน่นอน โดย มี สมาชิก หลาย คน แสดง สัญลักษณ์ ของ ความ หลงใหล และ ความ ลับ. การสืบสวนขอแนะนํา"

 arkship.1030.name: "หนวดขนาดเล็ก"
 arkship.1030.desc: "รายงาน จาก เรือ รบ§Y[Root.GetName]§!ได้ระบุความผิดปกติเล็กน้อยในพฤติกรรมของลูกเรือ บันทึก ส่วน ตัว เผย ให้ เห็น ความ แปลก ประหลาด ที่ กระจาย อยู่ ทั่ว ไป: การ เอา ใจ ใส่ อย่าง ผิด ปกติ ต่อ การ แต่ง กาย, การ เปลี่ยน แปลง เป็น ประจํา เพื่อ อยู่ กับ เพื่อน ร่วม งาน ที่ เฉพาะ เจาะจง, และ การ เข้า ร่วม ชุมนุม กัน แบบ นอก ชุมชน. ทั้ง หมด นี้ ดู เหมือน ไม่ มี อะไร มา ขัด ขวาง การ ดําเนิน งาน และ พวก ลูก เรือ มี กําลัง ใจ สูง ผิด ปกติ."
 arkship.1030.a: "จดไว้ แปลก,แต่ไม่สอดคล้องกัน"

 arkship.1035.name: "สภาพ ที่ หลงใหล"
 arkship.1035.desc: "สะพาน และ ผู้ บัญชา การ บน เรือ รบ§Y[Root.GetName]§!ตอนนี้ได้เข้าสู่ระดับใหม่ของความหลงใหล แปลกถ้าพฤติกรรมที่ไม่เป็นอันตรายได้ขณะนี้ได้เพิ่มขึ้นเป็นกิจกรรมเพลงโดยตรง : ลูกเรือเป็นการแลกเปลี่ยนอย่างประณีต[owner.species.GetHandName]ใน[owner.species.GetHandName].\n\nกิจวัตร ใน การ ทํา งาน ได้ ลด น้อย ลง ขณะ ที่ วงจร การ บํารุง รักษา ถูก เลื่อน ออก ไป. ในขณะที่ยังไม่เกิดวิกฤตในตอนนี้ ถ้ายังคงดําเนินการอยู่ สถานะปฏิบัติการอาจถูกทําลายได้"
 arkship.1035.a: "เฝ้าดูสถานการณ์"
 arkship.1035.b: "การลงทุนที่มีการเปลี่ยนแปลงอย่างกะทันหัน"

 arkship.1040.name: "เวลา แห่ง ความ รัก ใคร่"
 arkship.1040.desc: "รายงานเบื้องต้นเกี่ยวกับบรรยากาศของลูกเรือบนเรือ§Y[Root.GetName]§!ได้ให้หนทางไปสู่บางอย่างที่ร้ายแรงกว่านั้น สมาชิก ใน ทีม งาน หลาย คน มี ส่วน ร่วม ใน การ แสดง ความ รัก ใคร่ อย่าง ประณีต. การ แสดง ความ รัก ใคร่ ต่อ สาธารณชน\n\nแต่ น่า เสียดาย ไม่ ใช่ ความ รัก ใคร่ ทุก อย่าง จะ ได้ รับ การ ตอบ สนอง. การ ปฏิเสธ ได้ นํา ไป สู่ การ ทะเลาะ วิวาท กัน เล็ก ๆ น้อย ๆ หลาย ครั้ง และ อย่าง น้อย เจ้า หน้าที่ วิศวกรรม คน หนึ่ง ได้ ปิด กั้น ตัว เอง ไว้ ใน หอ ดู ดาว ประกาศ ว่า พวก เขา จะ ไม่ ออก มาจนกว่าใครบางคนจะเข้าใจพวกเขาอย่างแท้จริง"
 arkship.1040.a: "ให้ความรักเป็น ไม่จําเป็นต้องแทรกแซง"
 arkship.1040.b: "มันจะจบเดี๋ยวนี้"

 arkship.1045.name: "ความ พอ ใจ โดย ทาง ความ รัก"
 arkship.1045.desc.start: "แรง บันดาล ใจ จาก อุดมการณ์ ร่วม กัน บน เรือ รบ§Y[Root.GetName]§!เราได้เริ่มกระจายความรัก ไปยังอวกาศรอบตัวเรา รวมทั้งยานเองด้วย\n\n"
 arkship.1045.desc.end: "ห้องเก็บสินค้าสะอาดเรียบร้อย และที่พักก็สะอาดกว่าที่เคย ผู้นําของเรา§Y[arkship_leader.GetName]§!กําลังอ้างถึงการบํารุงรักษานี้\"บ้านที่รักของเรา\" และได้ปรับตัวเข้ากับสถานการณ์ที่ค่อนข้างผิดปกตินี้ การวัดผลเพิ่มขึ้นอีกครั้ง และจํานวนประชากร ดูจะมีความสุขมากขึ้น ดู เหมือน ว่า เมื่อ มี เป้า หมาย ที่ ถูก ต้อง ความ รัก สามารถ มี พลัง มาก กว่า พฤติกรรม ที่ แทะ โลม."
 arkship.1045.a: "ด้วยความรัก ทุกอย่างเป็นไปได้"
 arkship.1045.desc: "$arkship.1045.desc.start$$arkship.1045.desc.end$"
 arkship.1045.desc.noleader: "$arkship.1045.desc.start$เราอยู่ในช่วงลําบากจนกระทั่ง§Y[arkship_leader.GetName]§!เป็น ผู้ ควบคุม สถานการณ์ และ ได้ รับ อนุญาต ให้ นํา เรือ รบ.$arkship.1045.desc.end$"

 arkship.1050.name: "เรื่อง ของ การ ตี สอน"
 arkship.1050.desc.start: "สถานการณ์ บน เรือ รบ§Y[Root.GetName]§!ได้ข้ามขีดจํากัดที่รับไม่ได้ สิ่ง ที่ เริ่ม ต้น ฐานะ เป็น ความ เฟื่อง ฟู ทาง อารมณ์ อัน ปราศจาก พิษ ภัย ได้ บ่อน ทําลาย การ ตี สอน, ประสิทธิภาพ, และ โครง สร้าง แห่ง พระ บัญชา. การแทรกแซงโดยตรงตามกฎหมายได้อนุมัติแล้ว\n\n"
 arkship.1050.desc.end: "การ เปลี่ยน แปลง เป็น ไป อย่าง ฉับ พลัน และ เด็ด ขาด. มี การ มอบ หมาย เจ้า หน้าที่ หลาย นาย ให้ เข้า ไป เกี่ยว ข้อง โดย เฉพาะ กับ การ เข้า ไป พัวพัน กับ สิ่ง ที่ ก่อ ความ ยุ่ง ยาก§Y[arkship_leader.GetName]§!เพื่อให้แน่ใจว่าจะกลับมาเป็นบรรทัดฐานที่จัดตั้งขึ้น คอริเตอร์เคยมีชีวิตชีวาด้วยดนตรีและกระซิบประกาศในขณะนี้ สะท้อนด้วยความเงียบ เสียงกระซิบของตลาดมืดสําหรับจดหมายรักได้เริ่มต้นขึ้นแล้ว แต่กระแสได้ลดลง, สําลักโดยการเฝ้าระวังและความกลัว โมราเลสลดลงแล้ว แต่คําสั่งกลับมาแล้ว"
 arkship.1050.desc: "$arkship.1050.desc.start$$arkship.1050.desc.end$"
 arkship.1050.desc.noleader: "$arkship.1050.desc.start$เราอยู่ในช่วงลําบากจนกระทั่ง§Y[arkship_leader.GetName]§!เป็น ผู้ ควบคุม สถานการณ์ และ ได้ รับ อนุญาต ให้ นํา เรือ รบ.$arkship.1050.desc.end$"
 arkship.1050.a: "คําสั่งได้รับการฟื้นฟู"
 arkship.1050.a.tt: "§Y[arkship_leader.GetName]§!ตอนนี้เป็นผู้ว่า§Y[Root.GetName]§!"

 arkship.1055.name: "การลอย"
 arkship.1055.desc: "โครงการ พิเศษ ที่ ออก บน เรือ รบ§Y[Root.GetName]§!ได้เปิดเผยสารชีวภาพที่ผิดปกติ พืชลึกลับได้หยั่งรากลึกเข้าไปในระบบกรองของเรือ นักวิทยาศาสตร์ของเราเสนอแนะว่า สปอร์ส์เกิดอวกาศ ขึ้นบนยานลํานี้ ผ่านระบบระบายอากาศ ดอกไม้ของพืช ที่ดําเนินการผ่านระบบของเรา กําลังเพิ่มสภาวะทางอารมณ์ ในทุกคนที่อาศัยอยู่ในเรือ\n\nดอกของพืชปล่อยแสงเรืองแสงเบา ๆ และโครงสร้างรากของมันดูเหมือนจะกินโดยตรง ลูกเรือของเราอธิบายกลิ่นว่า\"หวาน, ใฝ่ฝัน, และความทรงจํา.\" ถ้าปล่อยไว้ก่อน สปอร์จะควบคุม อารมณ์ของลูกเรือต่อไป อย่าง ไร ก็ ตาม พืช ชนิด นี้ ยัง แสดง ถึง ความ ยืดหยุ่น ที่ น่า ทึ่ง บาง ที อาจ ถึง กับ นํา มา ใช้ ได้ หาก เรา เรียน รู้ ที่ จะ ปลูก พืช อย่าง เหมาะ สม."
 arkship.1055.a: "มันอันตรายเกินไป ทําลายต้นไม้"
 arkship.1055.b: "ตามรอยว่ามันมาจากไหน"

 arkship.1060.name: "ความ อ่อน โยน ของ ความ อด ทน"
 arkship.1060.desc.start: "พืช บน เรือ รบ§Y[Root.GetName]§!ถูกทําลายไปแล้ว รากของมันถูกทําลายจากท่อบรรยากาศ และสปอร์ของมันล้างออกจากอากาศของเรือ ในที่สุดลูกเรือก็กลับมาประพฤติตัวปกติ\n\n"
 arkship.1060.desc.end: "อย่าง ไร ก็ ตาม การ กลับ มา ตาม ระเบียบ ได้ ทํา ให้ เงียบ เสียง ไป อย่าง หนัก. ลูก เรือ หลาย คน พรรณนา ถึง การ ที่ เรา ไม่ ได้ อยู่ ด้วย กัน อย่าง แสน เจ็บ ปวด ประหนึ่ง ว่า มี อะไร บาง อย่าง ที่ ล้ํา ค่า ถูก กําจัด ออก ไป แต่ ผู้ นํา ของ เรา§Y[arkship_leader.GetName]§!การ ทํา ให้ แน่ ใจ ว่า กฎหมาย และ ระเบียบ นั้น ได้ รับ การ ฟื้นฟู ขึ้น มา แม้ จะ มี ความ รู้สึก ที่ ไม่ ควบคุม. ยานอาจจะทํางาน แต่มันบรรทุกสินค้าล่องหน น้ําหนักของความรักที่แตกสลาย"
 arkship.1060.desc: "$arkship.1060.desc.start$$arkship.1060.desc.end$"
 arkship.1060.desc.noleader: "$arkship.1060.desc.start$เราอยู่ในช่วงลําบากจนกระทั่ง§Y[arkship_leader.GetName]§!เป็น ผู้ ควบคุม สถานการณ์ และ ได้ รับ อนุญาต ให้ นํา เรือ รบ.$arkship.1060.desc.end$"
 arkship.1060.a: "ไม่มีอะไรยั่งยืน"

 arkship.1065.name: "ดอกไม้ เหนือ ดวง ดาว"
 arkship.1065.desc.start: "การ วิเคราะห์ ทาง พันธุกรรม โดย ละเอียด ได้ ระบุ ว่า พืช มี ชีวิต ชนิด ลึกลับ เป็น ชนิด ที่ ไม่ รู้ จัก. ต้น กําเนิด ของ มัน ชี้ ถึง กลุ่ม ดาว ที่ ร้าง เปล่า. แม้ แต่ คน แปลก หน้า พืช ชนิด นี้ ก็ ยัง เรียก ร้อง ให้ มี สภาพ การณ์ ที่ เด็ด ขาด เพื่อ ให้ การ อยู่ รอด พ้น จาก ดิน พื้น ที่ เดิม นั้น เป็น ไป ไม่ ได้: ระดับ ความ ชื้น ที่ แม่นยํา, บรรยากาศ ที่ อุดม ด้วย สาร อาหาร, และ รังสี ใน ระดับ หนึ่ง.\n\n"
 arkship.1065.desc.end: "การศึกษาทางชีวเคมีบอกว่า สปอร์ส ของพืชนี้ มีศักยภาพเป็น เครื่องกระตุ้นประสาท ทั้ง ๆ ที่ มี ผล ข้าง เคียง ถ้า ได้ รับ การ ขัด เกลา อย่าง เหมาะ สม พวก เขา อาจ รักษา ความ กระวนกระวาย, ความ ซึม เศร้า, หรือ แม้ แต่ ความ บอบช้ํา. ผู้นําของเรา§Y[arkship_leader.GetName]§!มี ความ สนใจ เป็น พิเศษ ใน พืช ชนิด นี้ และ ได้ ตัดสิน ใจ ที่ จะ ขยาย ความ รู้ ด้าน เกษตรกรรม ออก ไป."
 arkship.1065.desc.noleader: "$arkship.1065.desc.start$เราอยู่ในช่วงลําบากจนกระทั่ง§Y[arkship_leader.GetName]§!เป็น ผู้ ควบคุม สถานการณ์ และ ได้ รับ อนุญาต ให้ นํา เรือ รบ.$arkship.1065.desc.end$"
 arkship.1065.desc: "$arkship.1065.desc.start$$arkship.1065.desc.end$"
 arkship.1065.a: "การค้นพบอย่างสัญญา"

 arkship.1070.name: "ม."
 arkship.1070.desc: "เรือ รบ§Y[Root.GetName]§!ตอนนี้ข้ามช่องว่างที่ความเร็ว บรรพบุรุษของเราแทบจะไม่ได้จินตนาการ\n\nที่ๆคนรุ่นก่อนๆใช้เวลาหลายปี หรือแม้กระทั่งตลอดชีวิต ลอยไปมาระหว่างดาวที่อยู่ไกล แรงผลักดันสมัยใหม่ของเรา โยนเรือข้ามมิติจากระบบสู่ระบบ ดาวที่วิ่งผ่านเซ็นเซอร์ของเรา ในลําดับที่รวดเร็วแสงของพวกเขาเปลี่ยน และบิดเบี้ยว ขณะที่เรือกระโดดผ่านเครือข่ายไฮเปอร์เลน\n\nสําหรับ หลาย คน ที่ ขึ้น ไป บน เรือ ประสบการณ์ นี้ ได้ พิสูจน์ ให้ เห็น ถึง ความ สับสน แปลก ๆ. บาง คน เริ่ม หา วิธี เล็ก ๆ น้อย ๆ เพื่อ เอา ชนะ ความ รู้สึก นั้น. คนอื่นๆก็ยืนกรานว่า เมื่อเวลานั้นมาถึง จิตใจของเราก็จะเรียนรู้ ที่จะก้าวไปพร้อมกับการเดินทางที่เร่งความเร็วของยานอาร์ค"
 arkship.1070.a: "เสริม กําลังใจ ให้ เข้ม แข็ง โดย ออก กําลัง กาย เป็น ประจํา."
 arkship.1070.b: "ลองเล่นเสียงเครื่องยนต์ผ่านการสื่อสารภายใน"

 arkship.1075.name: "โคเร ที่ น่า ทึ่ง"
 arkship.1075.desc: "การ ส่ง สัญญาณ ผิด ๆ กําลัง เข้า แทรกแซง เรือ รบ§Y[Root.GetName]§!แกนพลังงาน นอก จาก จะ ไม่ มี การ ควบคุม ไฟ ก็ กําลัง ดับ บน ดาดฟ้า บ้าน. ฟาร์มมีรายงานการสั่นสะเทือนของพลังงานผิดปกติ และหลายโมดูลวิจัยที่สําคัญได้ออฟไลน์\n\nหัวหน้าวิศวกรของเราเตือนว่า ถ้าปราศจากการแทรกแซง ความล้มเหลวในการควบคุม จะแพร่ไปทั่วยาน แต่น่าเสียดายที่การแก้ปัญหาไม่ได้ตรงไปตรงมา การซ่อมแซมเครื่องรับส่งต้องการ การเบี่ยงเบนทรัพยากร จากพลังงานสํารองของเรา ในขณะที่การข้ามมัน มีความเสี่ยง ประนีประนอมความมั่นคงของยานอาร์คชิปในระยะยาว\n\nเรือ ที่ เย็น เยือก จะ กรีด ร้อง และ คร่ํา ครวญ. เราต้องตัดสินใจเดี๋ยวนี้"
 arkship.1075.a: "สํารองค่าใช้จ่ายไม่มีและซ่อมแซมอย่างถูกต้อง"
 arkship.1075.b: "เชื่อมต่อแล้วก้าวต่อไป เราไม่สามารถจ่ายได้"
 arkship.1080.name: "โคเร ที่ รับ การ รักษา"
 arkship.1080.desc: "จากความบังเอิญ ลูกเรือวิศวกรรมบนยานอาร์คชิป§Y[Root.GetName]§!ไม่ เพียง แต่ ได้ ซ่อมแซม การ ถ่ายทอด ข้อ ผิด พลาด แต่ ได้ ปรับ ปรุง ให้ ดี ขึ้น. การกระจายพลังงานข้ามเรือตอนนี้เรียบกว่าที่ผ่านมา ระบบความเสถียรที่ได้รับอารมณ์สําหรับปี กําลังใจของลูกเรือเพิ่มขึ้นอย่างรวดเร็ว มีจํานวนมากแสดงความภาคภูมิใจใหม่ ในความยืดหยุ่นของเรือ"
 arkship.1080.a: "การปรับปรุงที่น่าทึ่ง"
 arkship.1085.name: "วิกฤตการณ์ คล้าย ๆ กัน"
 arkship.1085.desc: "การ แก้ไข เรือ รบ อย่าง รวด เร็ว§Y[Root.GetName]§!แกนพลังงานยังทรงตัว อย่างน้อยก็ตอนนี้ แต่ ระบบ พาส เวิร์ด ที่ เปลี่ยน แปลง ไป นี้ กําลัง ถูก บีบ อยู่ เสมอ. การหมดสติครั้งใหญ่ของเรือตอนนี้ เป็นวิถีชีวิต และการควบคุมสิ่งแวดล้อมในบางส่วน ลูกเรือที่บ่นว่าผู้นํา เลือกความสํานึกผิดมากกว่าความปลอดภัย มี การ กระซิบ กัน ว่า เรือ รบ ลํา นี้ กําลัง กลาย เป็น วัตถุ โบราณ แทน ที่ จะ เป็น เครื่อง บ่ง บอก ถึง ความ อด ทน."
 arkship.1085.a: "เราต้องทําและแก้ไข"

 arkship.1090.name: "ที่ ราบ ยักษ์"
 arkship.1090.desc: "ใน ฐานะ เรือ รบ§Y[Root.GetName]§!ลอย ต่อ ไป ทาง สถานี สังเกตการณ์ ได้ ปะทุ ขึ้น ด้วย ความ ปีติ ยินดี. ทักษิณเยาวชนได้ผ่านมาใกล้ ๆ และพวกเขาดูเหมือนจะอยู่ในอารมณ์ที่สนุกสนาน\n\nพวกเขาทอกันในวงกว้าง โค้งวนกัน รูปทรงที่กว้างใหญ่ของพวกเขา จาก ช่อง กระจก กว้าง ตา ทํา ให้ เกิด ภาพ ที่ น่า ทึ่ง: รูป ทรง มหึมา ลอย อยู่ ท่ามกลาง ดวง ดาว, ร่าง ที่ เปล่ง ประกาย ขณะ ที่ ดู เหมือน ว่า สื่อ ความ กัน ใน ภาษา เฉพาะ พวก เขา เท่า นั้น ที่ เข้าใจ ได้. ทั้ง ครอบครัว เบียด เสียด กัน อยู่ ดาดฟ้า เรือ เพื่อ เฝ้า ดู และ ปล่อย ภาระ ของ ตน ไป ชั่ว ขณะ. มันเป็นความพิศวงที่แท้จริงสําหรับทุกวัย"
 arkship.1090.a: "โอกาสที่หายากที่จะสังเกตพฤติกรรมของอวกาศ"
 arkship.1095.name: "การ อัศจรรย์ ทาง วิทยาศาสตร์"
 arkship.1095.desc: "ของเรา[Owner.GetScientistPlural]บน เรือ รบ§Y[Root.GetName]§!ลูก วัว ของ เทียน ยาคิ ไม่ ได้ ทํา ให้ เกิด เสียง ดัง เท่า นั้น. การ เห็น พฤติกรรม เช่น นั้น ใน บริเวณ ใกล้ เคียง นี้ แทบ จะ ไม่ เคย มี มา ก่อน เลย. การ ศึกษา วิจัย ของ เรา บ่ง ชี้ ว่า นี่ เป็น ปรากฏการณ์ ทาง สังคม ซึ่ง แทบ จะ ไม่ มี การ สังเกต เห็น นอก ที่ อาศัย ของ ติ ยัน คี ลึก.\n\nบรรยากาศทั่วไปบนยานอาร์คชิปตอนนี้รู้สึกเบาเช่นถ้าสัตว์ความสุข'ซึมเรือ"
 arkship.1095.a: "ปาฏิหาริย์จริงๆ"

 arkship.1100.name: "กลิ่น เหม็น"
 arkship.1100.desc: "ตัวตรวจจับสิ่งแวดล้อมภายในที่อยู่บนยานอาร์ก§Y[Root.GetName]§!มีการลงทะเบียนระดับสูง ของสารประกอบที่ระเหยในอากาศ ลูกเรือ โดยเฉพาะอย่างยิ่งผู้ที่ประจําอยู่บนสะพาน ได้รายงานอาการ ที่สอดคล้องกับการได้รับสารพิษระดับต่ํา\n\nการพยายามกําจัดสารปนเปื้อน ผ่านระบบระบายอากาศมาตรฐาน ได้พิสูจน์แล้วว่าล้มเหลว มี กลิ่น เหม็น ตาม ทาง เดิน ที่ เต็ม ไป ด้วย การ แทรกซึม และ ความ ไม่ สะดวก สบาย ของ ลูก เรือ เพิ่ม ขึ้น. ความผิดปกติในระบบกําจัดของเสียของยาน บ่งชี้ว่าเป็นไปได้ ที่ระบบทํางานผิดปกติ\n\nการสืบสวนแบบสวิฟต์ ได้รับการยืนยันแล้ว"
 arkship.1105.name: "การ อยู่ อย่าง อัตคัด"
 arkship.1105.desc: "การฝังตัวของเรืออาร์เจนต์ของยานอาร์คชิป ได้เผยให้เห็นถึง การระบาดของหนูที่สําคัญ หนูทดลองแสดงลักษณะทางกายภาพที่ผิดปกติ บ่งบอกถึงการกลายพันธุ์ ตัว อย่าง ที่ น่า ทึ่ง กลิ่น ของ มัน มี แพร่ หลาย เป็น พิเศษ และ มี การ สังเกต เห็น สัตว์ ชนิด นี้ ออก มา จาก บริเวณ โครง สร้าง หลาย แห่ง ซึ่ง บ่ง ชี้ ว่า มี การ กระจาย อย่าง กว้าง ขวาง ทั่ว ทั้ง เรือ.\n\nการ ค้น พบ นี้ ก่อ ให้ เกิด คํา ถาม ทาง จริยธรรม ว่า ควร กําจัด สิ่ง มี ชีวิต ที่ มี การ กลาย พันธุ์ เหล่า นี้ ให้ เป็น อันตราย หรือ ไม่. ไม่ว่าทางไหน เราควรเอาพวกมัน ออกจากระบบระบายอากาศ"
 arkship.1105.a: "ทางเดียวที่จะหยุดพวกมันได้ คือกําจัดพวกมัน เผาแมลงซะ!"
 arkship.1105.b: "ปิดเครื่องบดขยะ!"
 arkship.1105.c: "เราจะเรียนรู้ที่จะอยู่กับกลิ่น"
 arkship.1110.name: "การ กวาด ล้าง เครื่อง กีด ขวาง"
 arkship.1110.desc: "การรั่วไหลของสารปนเปื้อน ในระบบระบายอากาศของยานอาร์คชิป มีประสิทธิภาพ แต่ไม่ได้โดยไม่มีผล สิ่งมีชีวิตถูกทําลายในไฟล้าง ความทุกข์สูงของพวกเขาโทรสะท้อนผ่านทางเดิน ใน ความ พยายาม ขั้น สุด ท้าย ของ พวก เขา ที่ จะ หลบ หนี ได้ มี การ เจาะ กระเบื้อง ระบาย อากาศ และ แผ่น กระเบื้อง บํารุง รักษา หลาย แผ่น ทิ้ง ช่อง โหว่ ที่ ต้อง ซ่อมแซม.\n\nภัยคุกคามทันทีต่อระบบของเรือได้รับการลด ตอนนี้ลูกเรือก็สบายใจได้ ที่ได้รู้ว่ายานไม่ถูกทําลาย ถึงกลิ่นจะยังอยู่ก็ตาม"
 arkship.1110.a: "อย่างน้อยการรบกวนก็ถูกจัดการไปแล้ว"
 arkship.1115.name: "โดดเด่นเผ่าพันธุ์"
 arkship.1115.desc: "การ ตรวจ สอบ ตัว อย่าง ของ หนู ที่ กลาย พันธุ์ บน เรือ รบ§Y[Root.GetName]§!ได้ค้นพบคุณลักษณะการปรับตัวที่น่าทึ่ง สิ่งมีชีวิตเหล่านี้แสดงความยืดหยุ่นที่พิเศษ พัฒนาขึ้นในสภาพแวดล้อมที่เป็นมิตรและทรัพยากร ที่สําคัญคือ การทดลองที่ถูกควบคุมได้แสดงให้เห็นว่า เมื่อสัมผัสกับสารประกอบเป้าหมาย ที่นําเข้าสู่กระแสของเสียของเรือกอกของเรือ แทน ที่ จะ เป็น เช่น นั้น พวก เขา เผาผลาญ ขยะ ด้วย ประสิทธิภาพ ที่ น่า สังเกต ลด ของ เสีย ที่ สะสม ไว้ อย่าง มี ประสิทธิภาพ.\n\nแม้ จะ ไม่ เป็น ที่ ยอม รับ แต่ การ ค้น พบ นี้ ก็ บ่ง ชี้ ว่า การ ระบาด นี้ อาจ ถูก จัด ให้ เป็น สิ่ง มี ค่า ทาง นิเวศ วิทยา แทน ที่ จะ เป็น ภาระ หนัก."
 arkship.1115.a: "ขยะของเราคือสมบัติของพวกเขา"

# A Forgotten Level

 a_forgotten_level_chain_title: "ระดับ ที่ ถูก ลืม"
 a_forgotten_level_chain_desc: "การดํารงอยู่ของระดับย่อยยังไม่ได้กําหนดภายใน§Yเรือ รบ[Root.GetName]§!ทําให้เกิดปัญหา จุด มุ่ง หมาย ของ มัน ยัง ไม่ เป็น ที่ ทราบ กัน และ บันทึก ทุก อย่าง ที่ มี อยู่ ใน ตัว ได้ ถูก ลบ ล้าง ไป อย่าง จงใจ."

 d_forgotten_level: "ระดับที่อ้างถึง"
 d_forgotten_level_desc: "เรือดําน้ําทั้งหมด ที่ถูกลบออกจากบันทึกรวมทั้งหมด ตอนนี้ว่างเปล่า"

 d_forgotten_level_blocker: "เทถังขยะทิ้ง"
 d_forgotten_level_blocker_desc: "ส่วน นี้ ของ เรือ รบ มี เศษ ซาก ปรัก หัก พัง และ อุปกรณ์ ที่ ใช้ ไม่ ได้ รวม อยู่ ด้วย และ ต้อง ทํา การ กวาด ล้าง ให้ หมด ก่อน ที่ จะ สามารถ นํา กลับ ไป ใช้ ได้."

 arkship.1120.name: "ระดับ ที่ ถูก ลืม"
 arkship.1120.desc: "ในขณะที่การหลงผิด ในส่วนหนึ่งของยานอาร์คชิปชิพ มีอยู่หลายครั้ง กลุ่มเยาวชนระบุ เปิดมัน, พวกเขาป้อนระดับย่อยไม่รวมของ§Yเรือ รบ[Root.GetName]§!เป็น เวลา หลาย ชั่วโมง หลัง จาก นั้น กลุ่ม นี้ หยุด ลง เพื่อ ลง ทะเบียน เกี่ยว กับ ระบบ ติด ตาม ภาย ใน และ สิ่ง แวด ล้อม.\n\nเมื่อ พวก เขา กลับ มา พวก นัก สํารวจ วัย รุ่น แสดง ให้ เห็น ชัดเจน ถึง ความ ทุกข์ ทาง จิตใจ และ ร่าง กาย. มีความเหลื่อมล้ําระหว่างการพูดไม่หยุด กับสภาวะที่ใกล้เคียงกับการหายใจ อย่าง ไร ก็ ตาม แม้ จะ พยายาม ครั้ง แล้ว ครั้ง เล่า พวก เขา ทุก คน ก็ ไม่ ยอม ให้ เรื่อง ราว ใด ๆ เกี่ยว กับ ประสบการณ์ ของ ตน ระหว่าง เหตุ การณ์ นั้น.\n\nผู้เชี่ยวชาญเชื่อว่าไม่ว่าอะไรที่เกิดขึ้น ในระดับชั้นนั้นรุนแรงพอ ที่จะถูกแยกออกจากบันทึกทั้งหมด"
 arkship.1120.a: "อนุมัติการสืบสวน"
 arkship.1120.b: "ผนึกแผงให้ดี"

 arkship.1125.name: "กระท่อม ที่ ไม่ ถูก รบกวน"
 arkship.1125.desc: "นอก เหนือ จาก ระดับ ที่ เพิ่ง เข้า ไป ใหม่ ทีม วิจัย พบ ประตู ห้อง นิรภัย ชุด ใหญ่ ปิด ด้วย ล้อ มือ. จากด้านอื่น ๆ มาบิดเสียงเช่นระยะไกล\n\nการ บังคับ ให้ เปิด ประตู ต้อง อาศัย ความ เข้ม แข็ง เต็ม ที่ ของ ทีม และ ทํา ให้ เกิด เสียง ดัง สนั่น. แหล่ง ที่ มา นี้ ปรากฏ ว่า เป็น เครื่อง กําเนิด ไฟฟ้า ที่ เสื่อม ลง อย่าง ร้าย แรง ยัง คง บด ออก ไป ไกล เกิน กว่า อายุ ที่ มุ่ง หมาย ไว้. ที่น่าเป็นห่วงกว่านั้น คือร่องรอยสด ๆ ของกิจกรรมที่กระจัดกระจายไปทั่วพื้นที่\n\nและใครก็ตามที่อยู่ที่นี่ รู้ว่าเรามาถึงแล้ว"
 arkship.1125.a: "เบ่งสิ"
 arkship.1125.b: "ยกเลิกภารกิจ"

 arkship.1130.name: "ชีวิต ใน กําแพง"
 arkship.1130.desc: "เมื่อ เข้า ไป ใน ห้อง ใต้ ดิน ทีม นี้ พบ สัญญาณ ชัดเจน ว่า มี ที่ อยู่ อาศัย ยาว นาน. การ จัด เตรียม เรื่อง การ นอน หลับ ที่ ได้ รับ การ ปรับ ปรุง แล้ว วาง เรียง ราย ผนัง ด้าน ข้าง ทํา ให้ ตู้ เก็บ ของ ที่ มี วัสดุ ที่ ได้ รับ การ กู้ คืน มา ซึ่ง บ่ง ชี้ ถึง การ อยู่ อย่าง เป็น ระเบียบ และ คงทน แทน ที่ จะ เป็น ที่ พัก ชั่ว คราว.\n\nไม่ นาน ทีม นั้น ก็ พบ ตัว เลข ที่ ออก มา จาก เงา. พวก เขา เป็น สัตว์ ชนิด ของ เรา เอง แต่ ก็ ลด น้อย ลง: เสื้อ ผ้า ไม่ ดี สวม อาวุธ ธรรมดา. พวก เขา พูด ภาษา ถิ่น ที่ มี ความ แตก ต่าง กัน ซึ่ง เป็น ภาษา ถิ่น ของ เรา เอง อย่าง ไม่ มี ข้อ สงสัย. ความ ขัด แย้ง ถูก เลี่ยง อย่าง หวุดหวิด.\n\nหลักฐานระบุว่า พวกเขาถูกผนึกไว้ที่นี่มาหลายชั่วอายุคนแล้ว พวกเขาอยู่ในการทดลองที่ถูกลืมหรือเปล่า ผู้สืบช่วงแทนจากการลงโทษนั้นไม่มีผู้ใดจดจําได้ หรือสิ่งที่คนแปลกหน้ายังคง รักษาอยู่ในความมืด เพื่อวัตถุประสงค์ที่ยาวตั้งแต่หายไป?"
 arkship.1130.a: "มาดูกันว่าเราจะเรียนรู้อะไรจากพวกเขาได้บ้าง"
 arkship.1130.a.military: "เผาที่นี่ให้หมด"

 arkship.1135.name: "เชื้อ โรค ที่ ไม่ มี วัน ตาย"
 arkship.1135.desc: "เมื่อ มา ถึง ประตู ลิฟต์ จะ เปิด ทาง เดิน มืด เรียง ราย ไป ด้วย เครื่องจักร ที่ ล้า สมัย ซึ่ง ถูก ทิ้ง ไว้ อย่าง รวด เร็ว. อุปกรณ์ห้องแล็บที่กระจายอยู่เต็มไปหมด ขวดยังคงปิดไว้รอบตัวอย่างทางชีวภาพ โปรโตคอลฉุกเฉินที่ใช้อ้างอิง ถึงความล้มเหลวในการควบคุม\n\nลึกลงไปภายในทีม พบซากที่แห้งผาก ของบรรพบุรุษของสายพันธุ์ของเรา ศพถูกหั่นเป็นชิ้นๆ แต่ถูกเก็บรักษาไว้อย่างผิดธรรมชาติ ผุพังโดยสารชีวภาพที่ดัดแปลงมา การ ค้น พบ ดัง กล่าว อาจ อธิบาย เหตุ ผล ที่ ก่อน หน้า นั้น ผู้ นํา ของ อาร์คิฟ เลือก ที่ จะ ปิด คลุม ทุก ระดับ."
 arkship.1135.a: "การค้นพบที่แปลก"

 arkship.1140.name: "ถูก ประทับ ตรา ด้วย เหตุ ผล"
 arkship.1140.desc: "เมื่อเข้าสู่ระดับที่ทีมรายงาน ความทุกข์ทางจิตใจทันที สิ่งแรกดูเหมือนจะเป็น ช่วงตึกที่ถูกกักตัว ใกล้เคียงกับโรงพยาบาลร้าง เซลล์ที่มีแรงกดทับเรียงตามทางเดิน ถูกมัดติดกับพื้น เครื่อง มือ วินิจฉัย ถูก นํา ไป ผสม กับ เครื่อง มือ ที่ ใช้ บังคับ ทํา ให้ การ ดู แล กับ การ ลง โทษ คลุมเครือ.\n\nหลักฐานชี้ว่า บรรพบุรุษของเราเลือก ที่จะฝังสถานที่แห่งนี้อย่างจงใจ ไม่ ว่า จะ ด้วย ความ อับอาย หรือ ความ ปรารถนา ที่ จะ ปก ป้อง คน เหล่า นั้น ที่ มา ภาย หลัง พวก เขา ลบ มัน ออก จาก ความ ทรง จํา. บางทีพวกเขาอาจจะเชื่อว่ามันปลอดภัยลืม"
 arkship.1140.a: "การค้นพบที่น่าตกใจ"

 arkship.1145.name: "คลังดนตรีแบบบีบอัด"
 arkship.1145.desc: "ลิฟต์ เปิด ไป ยัง ห้อง ศิลป์ อัน กว้าง ใหญ่ ซึ่ง มี รูป ปั้น หลาก หลาย รูป แบบ เรียง กัน อยู่. บาง คน มี ความ สง่า งาม, บาง คน เป็น คน แปลก หน้า, ทุก คน ตั้ง อยู่ บน ฐาน หิน อ่อน และ หัน ไป หา ผู้ บุกรุก ด้วย การ ประเมิน ค่า อย่าง เงียบ ๆ.\n\nหลังกล่องแตกและแผ่นแตก ทีมค้นพบห้องที่ซ่อนไว้ที่บรรจุอย่างรอบคอบ§Yชื่อ=คริสตัลชื่อ§!รูปปั้นสีขาวสูง ยืนดูการสะสม ขณะ ที่ พวก เขา เคลื่อน ย้าย หน้า ของ มัน ซึ่ง มี รูป ร่าง คล้าย ๆ กับ คน ชนิด หนึ่ง ของ พวก เรา ดู เหมือน จะ ตาม มา. ถึงแม้ว่าทีมจะสัมผัสว่า การเอาคริสตัลออกนั้นขึ้นอยู่กับการโจรกรรม"
 arkship.1145.a: "เอาคริสตัลกับรูปปั้นไป"
 arkship.1145.b: "ยกเลิกภารกิจ"

 arkship.1150.name: "เครื่องยนต์เพื่ออะไร"
 arkship.1150.desc: "ระดับคํารามด้วยเครื่องจักร เส้น การ ประชุม ใหญ่ ยัง คง ดําเนิน อยู่ อย่าง เต็ม ที่ ทํา ให้ เศษ ชิ้น ส่วน ต่าง ๆ เป็น เครื่อง ยนต์ เพียง เพื่อ จะ ขจัด มัน ออก ไป ใน ระยะ สุด ท้าย และ นํา กลับ มา เป็น โลหะ ดิบ. วัฏจักร ซ้ํา กัน โดย ไม่ มี จุด มุ่ง หมาย.\n\nลึกลงไปภายใน หน่วยประดิษฐ์ดําเนินการเกินขอบเขตที่ปลอดภัย ประกอบกรอบหุ่นยนต์และจับคู่ด้วยแกนการประมวลผล สิ่ง ก่อ สร้าง แต่ ละ หลัง จะ พัง ทลาย ลง ไป ใน ชั่ว ขณะ หลัง จาก การ ค้น พบ โครง สร้าง ของ ตึก นี้ ไม่ มี เสียง. บาง คน กระ พริบ ตา ด้วย อาการ ตื่น ตัว ชั่ว ครู่ ก่อน จะ ล้ม ลง. ส่วนใหญ่เริ่มลําดับการปิดของพวกเขาเอง"
 arkship.1150.a: "โชคชะตาอันน่าเศร้า"

 arkship.1160.name: "หลุม ดํา"
 arkship.1160.desc: "เครื่อง มือ ของ เรา บน เรือ รบ§Y[Root.GetName]§!ลงทะเบียนการปล่อย ของหลุมดําใน§Y[solar_system.GetName]§!ระบบ สแกนระยะไกลตรวจพบ เหลือบของวัตถุที่ไม่ทราบ เข้าหาเอกภาพ เรือ มหึมา ของ มัน ปล่อย สัญญาณ ทาง เทคโนโลยี ที่ เกิน ความ เข้าใจ ของ เรา เข้า มา แทรกแซง การ อ่าน ของ เรา และ ทํา ให้ การ วิเคราะห์ ที่ แม่นยํา เป็น ไป ไม่ ได้. การยืนยันภาพได้รวดเร็วที่สุด คล้ายกับภาพหลอน มากกว่าสิ่งที่จับต้องได้\n\nชั่ว ขณะ หนึ่ง ก่อน ที่ เรือ จะ ข้าม เข้า ไป ใน ที่ ที่ ไม่ รู้ จัก เรา สังเกต เห็น ภาพ ที่ แปลก คือ เรือ ที่ ผ่าน เข้า ไป ใน หลุม ดํา นั้น ยัง คง มี เจตนา อย่าง ชัดเจน. แล้ว สัญญาณ ทั้ง หมด ก็ หยุด ลง. ไม่ ว่า เรือ จะ ถูก ทําลาย, พลัด ถิ่น, หรือ อยู่ รอด ใน สภาพ ที่ ไม่ อาจ เข้าใจ ได้ นั้น ยัง ไม่ มี ใคร รู้. สิ่ง ที่ แน่นอน คือ ว่า หลุม ดํา มี ปฏิกิริยา และ เรา อาจ ได้ เห็น สิ่ง ที่ เรา ยัง ไม่ สามารถ อธิบาย ได้. ไม่ ว่า จะ เกิด อะไร ขึ้น ที่ ขอบ ฟ้า นั้น ก็ เห็น ได้ ชัด ว่า เรา ไม่ ได้ เกิด มา จาก การ สังเกต ที่ ไม่ เปลี่ยน แปลง นี้."
 arkship.1160.a: "ขอให้เราดูเพิ่มเติม"
 arkship.1160.b: "มารวบรวมสิ่งที่เราสามารถทําได้"

 arkship.1165.name: "ดาว เคราะห์"
 arkship.1165.desc: "ในขณะที่ผ่านโลกอาณานิคมใน§Y[solar_system.GetName]§!ระบบที่เราสังเกตเห็นการปะทุของด้านข้างกลางคืนของมัน ในการประสานระเบิดของแสง ความ กลัว เรื่อง ความ ไม่ สงบ ใน ตอน เริ่ม ต้น ปรากฏ ว่า ไม่ มี มูล ความ จริง. การปล่อยก๊าซถูกควบคุม การแสดงผลของภูเขาไฟทั่วโลก อยู่ภายในตัวแปรที่ไม่ใช่ของกองทัพ\n\nการ วิเคราะห์ ใกล้ ๆ เผย ให้ เห็น การ เรียง ตัว ทาง ดาราศาสตร์ โดย เจตนา ซึ่ง ถัก ทอ เข้า มา ใน ภาพ นั้น. มันรู้สึกปลอดภัยที่จะสรุป ว่าประชากรมีรหัสความหมายในแสง ของเรา[Owner.GetResearchers]ได้บันทึกรูปแบบ รับความเข้าใจ ในการสื่อสารแบบสัญลักษณ์ขนาดใหญ่"
 arkship.1165.a: "เป็นภาพที่วิเศษ"
 arkship.1165.b: "น่าสมเพช พวกเขาเผาทรัพยากร เพื่อรู้สึกสมบูรณ์"
 arkship.1165.c: "ไม่คาดฝัน แต่ก็ไม่พอใจ"
 arkship.1165.d: "พวก เขา ขาด เอกภาพ แต่ ก็ บาก บั่น ต่อ ไป."
 arkship.1165.e: "แสงสว่างจะทําให้เป้าหมายง่าย"
 arkship.1165.f: "เรา ชื่นชม ยินดี ใน การ ฉลอง ของ พวก เขา."
 arkship.1165.g: "เป็นไปได้ที่ทาส"
 arkship.1165.h: "ข้อแก้ตัวเล็กน้อยสําหรับพลุ"
 arkship.1165.i: "ปรับเสียงบันทึก"
 arkship.1165.j: "วัยรุ่น"
 arkship.1165.k: "เปิดเผย แต่ตลก"
 arkship.1165.l: "ขอไฟส่องวิญญาณพวกเขา"

 arkship.1170.name: "ผิวหนัง ของ ยักษ์"
 arkship.1170.desc: "ในขณะที่ผ่านเข็มขัดดาวเคราะห์ใน§Y[solar_system.GetName]§!ระบบ เรา สังเกต เห็น วัตถุ ที่ ค่อย ๆ เลือน หาย ไป หลาย ชิ้น ลอย อยู่ ใน ซาก ปรัก หัก พัง. การสแกนเริ่มต้น แสดงให้เห็นว่าดาวเคราะห์น้อยผิดปกติ แต่การตรวจสอบที่ใกล้ชิด เผยให้เห็นชั้น โครงสร้างขนาด\n\nการ วิเคราะห์ ต่อ ไป บ่ง ชี้ ว่า ชิ้น ส่วน เหล่า นี้ เป็น แร่ ธาตุ บาง ส่วน ที่ มี ต้นตอ มา จาก ชีวภาพ. มันเป็นเศษของ§Yเลื่อนหน้าต่างหมายเหตุ§!ที่ดูเหมือนจะถูกชนโดยดาวเคราะห์น้อย และสูญเสียส่วนหนึ่งของที่ซ่อนหุ้มเกราะ ก่อนที่จะออกจากระบบ แสง ดาว จับ เกล็ด ที่ ถูก ทิ้ง แล้ว กระจาย แสง เด่น ๆ ข้าม เรือ รบ."
 arkship.1170.a: "เราควรศึกษาองค์ประกอบของมัน"
 arkship.1170.b: "มาดูกันว่าเราจะเก็บเกี่ยวอะไรได้"
 arkship.1170.c: "ช่างมันเถอะ"
 arkship.1175.name: "การ บังคับ เรือ รบ"
 arkship.1175.desc: "ขณะ ที่ ศึกษา เกล็ด ที่ กระจัด กระจาย อยู่ นั้น เรา สังเกต เห็น ความ ยืดหยุ่น พิเศษ ของ เนื้อ เรื่อง. โครง สร้าง ที่ ซับ ซ้อน ซึ่ง มี ชั้น บาง ๆ เผย ให้ เห็น ว่า มี การ เจริญ เติบโต ทาง ชีวภาพ และ วิศวกรรม ป้องกัน ธรรมชาติ เกิน สมมุติฐาน เดิม ของ เรา. องค์ประกอบชั้นของเกล็ด แสดงให้เห็นถึงการต้านทานอย่างน่าทึ่ง ต่อความร้อน ผลกระทบจลน์ และปล่อยพลังงาน\n\nเราทดลองการจําลองการปะแผ่น และใส่เข้าไปในเรือนอกของเรือ ที่เราสามารถเพิ่มความจุการป้องกันของมัน สิ่ง ที่ ครั้ง หนึ่ง เคย เป็น ยุทธภัณฑ์ ของ เจ้า สัตว์ ที่ ท่อง เที่ยว ไป มา จะ เป็น ประโยชน์ ต่อ ความ รู้ ของ เรา ใน ตอน นี้ เพื่อ ปก ป้อง เรา ไว้ จาก อันตราย หลาย อย่าง ที่ รอ อยู่ ใน ช่อง ว่าง."
 arkship.1175.a: "เป็นการค้นพบที่งดงาม"
 arkship.1180.name: "ดิน แดน ต่าง ๆ"
 arkship.1180.desc: "เศษเสี้ยวของ§Yเลื่อนหน้าต่างหมายเหตุ§!สัดส่วนใน§Y[solar_system.GetName]§!ระบบมีการดึงดูดความสนใจที่สําคัญ\n\nเกล็ด เหล่า นี้ ถูก ทํา ให้ สะอาด และ ขัด อย่าง ดี ก่อน ถูก นํา มา ทํา เป็น เครื่อง ประดับ ที่ โดด เด่น. เมื่อ เสนอ ใน ตลาด วัตถุ โบราณ เหล่า นี้ ของ สัตว์ ใน ตํานาน นํา มา ซึ่ง ราคา ที่ แพง มาก เป็น พิเศษ พิสูจน์ ว่า น่า ประทับ ใจ และ เป็น ประโยชน์."
 arkship.1180.a: "กําไรดีจากแหล่งที่ผิดปกติที่สุด"
 arkship.1180.b: "ใครจะไปรู้ว่าตํานาน จะสร้างกําไรได้ขนาดนี้"
 THE_SKIN_OF_A_GIANT_PROJECT: "$arkship.1170.name$"
 THE_SKIN_OF_A_GIANT_PROJECT_DESC: "หนัง ของ เอ เธอร์ ด๊อคแผ่ขยายอํานาจที่แสดงออก ถึงความรอบคอบ ความ พยายาม ใด ๆ ที่ จะ เก็บ รวบ รวม สิ่ง เหล่า นั้น ควร ดําเนิน ต่อ ไป อย่าง ระมัดระวัง เพราะ ส่วน ที่ เหลือ ของ สัตว์ ชนิด นี้ อาจ ยัง มี คุณสมบัติ ที่ ไม่ อาจ คาด เดา ได้."
 etherdrake_scale_object: "ชิม เอ ส เต อร์ อยด์"
 etherdrake_scale_object_tooltip: "ดาวเคราะห์น้อยปกติ ที่มีอนุภาคเรืองแสง"
 etherdrake_scale_object_desc: "ดาว เคราะห์ น้อย ที่ มี เศษ ชิ้น ส่วน ของ เกล็ด แสง ที่ ฝัง อยู่ บน พื้น ผิว ซึ่ง เป็น เครื่อง ประดับ ที่ แปลก ประหลาด ของ ดาว เคราะห์ นี้ ซึ่ง แยก มัน ออก จาก ซาก ปรัก หัก พัง ของ อวกาศ ธรรมดา ๆ."

 arkship.1185.name: "การค้าแบบไม่ต้องรวม"
 arkship.1185.desc: "การ ตรวจ สอบ เป็น ประจํา บน เรือ§Yเรือ รบ[Root.GetName]§!ได้ค้นพบความผิดปกติในบันทึกสินค้าของเรา\n\nภาพจากกล้องรักษาความปลอดภัยระบุว่ามีการก่อตัว ของเครือข่ายแลกเปลี่ยนที่ไม่เป็นทางการ ท่ามกลางผู้อยู่อาศัยในอาร์ค ระบบการแลกเปลี่ยนได้ปรากฏขึ้นอย่างเงียบ ๆ ท่ามกลางลูกเรือและพลเรือน มี การ ขาย สินค้า, เครื่อง มือ, สินค้า ฟุ่มเฟือย, และ บริการ ส่วน ตัว ใน ที่ ห่าง ไกล ซึ่ง มี การ จํากัด การ เฝ้า ดู.\n\nการ ค้น พบ นี้ ทํา ให้ เกิด คํา ถาม ที่ น่า อึดอัด. บาง คน ชื่นชม ความ สามารถ ใน การ แสดง. คน อื่น ๆ เตือน ว่า การ ที่ เรือ รบ ไม่ ได้ อยู่ ใต้ การ ดู แล ของ เรือ รบ อาจ เสี่ยง อันตราย อย่าง ร้าย แรง."
 arkship.1185.a: "ทําตามกฏหมาย"
 arkship.1185.b: "เก็บภาษีผู้มีส่วนร่วม"
 arkship.1185.c: "ปิดมันซะ"

 arkship.1190.name: "ตลาด เสรี"
 arkship.1190.desc: "เครือข่ายการค้าที่ไม่ได้รับอนุญาต ภายในยานอาร์คชิป ได้พิสูจน์ความเสถียรอย่างน่าทึ่ง แม้ ขาด การ ดู แล อย่าง เป็น ทาง การ แต่ เครือ ข่าย ก็ ได้ ควบคุม ตัว เอง โดย การ ไว้ วางใจ และ พึ่ง พา อาศัย กัน. การแบ่งแยกนั้นหาได้ยาก และสินค้าสําคัญต่างๆ ก็ยังคงแพร่กระจายไปเรื่อยๆ ซึ่งระบบการจําหน่ายของยานอาร์คชิปชิพกําลังดิ้นรนเพื่อก้าวไป โดย การ ทํา ให้ การ แลก เปลี่ยน นั้น ถูก ต้อง ตาม กฎหมาย และ ก่อ ตั้ง ขอบ เขต ที่ ชัดเจน นาวา เรือ นี้ ได้ รับ ตลาด ที่ ไม่ มี อะไร จํากัด ภาย ใน กําแพง เมือง.\n\nสําหรับ ผู้ อยู่ อาศัย หลาย คน การ เปลี่ยน แปลง นี้ ไม่ ใช่ แค่ การ เข้า ถึง สินค้า. หนังสือ นี้ จัด ให้ มี ตัว แทน, หน้า ที่ รับ ผิด ชอบ, และ ความ สํานึก ถึง จุด มุ่ง หมาย ใหม่ ภาย ใน เครื่อง ยนต์ ขนาด ใหญ่ ของ เรือ รบ."
 arkship.1190.a: "ปล่อยให้ตลาดรุ่งเรือง"

 arkship.1195.name: "ควบคุมการเรียงลําดับ"
 arkship.1195.desc: "ตลาดที่ไม่ได้รับอนุญาตปิดลงประสบความสําเร็จ ทีมรักษาความปลอดภัยของเราเริ่มทําลายเครือข่าย ตู้เก็บสินค้าที่ใช้ในการค้าขายได้ถูกปิด และกล้องวงจรปิดได้ขยายพื้นที่ ดูง่ายออกไป การ แลก เปลี่ยน เหล่า นั้น ได้ รับ การ แต่ง ตั้ง อย่าง เป็น ทาง การ หรือ ได้ รับ การ แก้ไข อย่าง ถูก ต้อง.\n\nขณะ ที่ เครือ ข่าย แลก เปลี่ยน ได้ ให้ ความ สํานึก ถึง ความ เป็น อิสระ และ โอกาส แก่ ชาว เมือง บาง คน แต่ เรือ รบ นี้ ไม่ เคย ถูก ออก แบบ ให้ สนับสนุน วิธี การ จําหน่าย อย่าง ผิด ๆ. บนเรือที่ทุกทรัพยากรจะต้องคํานวณ ควบคุมและคาดเดาได้ ยังคงมีความสําคัญสูงสุด"

 arkship.1200.name: "ความ ตาย และ ภาษี"
 arkship.1200.desc: "เครือข่ายการค้าที่ดําเนินการภายใน ทางเดินบํารุงรักษาของยานอาร์คชิป ได้พิสูจน์ถึง ประสิทธิภาพอย่างน่าทึ่ง สินค้ายังคงแพร่กระจายผ่านช่องทางที่ไม่เป็นทางการ เติมช่องว่างเล็ก ๆ แต่ถาวรในระบบ การกระจายของยานอาร์คชิป\n\nมี การ เข้า ไป หา ผู้ กลาง บาง คน อย่าง สุขุม และ เสนอ การ คุ้มครอง จาก ผู้ บังคับ บัญชา เพื่อ ตอบ แทน ความ ร่วม มือ. ส่วนแบ่งอย่างต่ําของแต่ละรายการ ตอนนี้หาทางกลับไปยังบัญชีอย่างเป็นทางการของเรา สําหรับ ชาว เมือง ตลาด ยัง คง ไม่ เป็น ทาง การ และ ส่วน ใหญ่ ไม่ ปรากฏ แก่ ผู้ มี อํานาจ. อย่าง ไร ก็ ตาม ใน การ ปฏิบัติ มี การ สังเกต เห็น การ ไหล ของ มัน อย่าง รอบคอบ และ ทํา กําไร อย่าง น่า ประหลาด."
 arkship.1200.a: "ถ้าการค้าไหล, ดังนั้นรายได้"
 arkship.1200.b: "ภาษี คือ ราคา ของ ความ เจริญ รุ่งเรือง."

 free_market: "ตลาดเสรี"
 free_market_desc: "ทรัพยากรถูกซื้อขายภายใต้การดูแล มีอุปโภค บริโภคและอุปสงค์"
 total_control: "การควบคุมรวม"
 total_control_desc: "การ รักษา ความ เป็น ระเบียบ บน เรือ รบ เรียก ร้อง การ แจก จ่าย ทรัพยากร ทุก อย่าง ที่ มี อยู่ อย่าง เคร่งครัด."

 # The Only Sky We Know

 arkship.1205.name: "ท้องฟ้า เพียง แห่ง เดียว ที่ เรา รู้ จัก"
 arkship.1205.desc: "ลึกภายใน§Yเรือ รบ[Root.GetName]§!โกดัง, นักโบราณคดี ได้ค้นพบคดีเล็กๆ ที่ถูกผนึกไว้ ถูกฝังอยู่ในคลังสินค้า ภายในเป็นไมโครชิปเดียว ที่ไม่สามารถวัดได้ หมวดหมู่ แต่ไม่เคยทําดัชนีอย่างถูกต้อง ถ้า มัน มี คุณค่า จริง ๆ มัน คง จะ ไม่ ถูก ลืม ใน ลัง เก็บ ของ.\n\nเทคโนโลยีนี้ล้าสมัยไปมาก โดยใช้รูปแบบของข้อมูล ที่เกิดขึ้นก่อนยุคหลายรุ่น ของระบบยานอาร์คชิป บาง คน คาด เดา ว่า มัน อาจ มา จาก สมัย แรก ๆ ของ การ เดิน ทาง บาง ที ตั้ง แต่ ยุค ที่ เผ่า พันธุ์ ของ เรา ยัง คง อาศัย อยู่ บน ดาว เคราะห์."
 arkship.1205.a: "พยายามกู้ข้อมูลที่ถูกจัดเก็บ"
 arkship.1205.b: "กําจัดขยะซะ"

 arkship.1210.name: "การ หยั่ง เห็น เข้าใจ ทาง วัฒนธรรม"
 arkship.1210.desc.a: "ข้อมูลที่กู้มาได้แสดงให้เห็น การเฉลิมฉลองฤดูกาลจากโลกของเราในอดีต ดู เหมือน ว่า เวลา ผ่าน ไป หลาย เดือน ที่ เย็น กว่า และ การ ตื่น ขึ้น ของ ธรรมชาติ. ผู้ คน มา ชุมนุม กัน เพื่อ ต้อนรับ การ กลับ มา ของ ความ อบอุ่น และ แสง สว่าง. มี การ จุด ไฟ ด้วย สี สัน สดใส ท่ามกลาง ผู้ เข้า ร่วม. นอก จาก นี้ บันทึก ยัง พรรณนา ถึง การ ร่วม รับ ประทาน ขนม หวาน พิเศษ, การ ร้อง เพลง และ การ เต้น รํา ด้วย กัน, และ เพียง แต่ เฝ้า ดู ดอก แรก ของ ฤดู ใบ ไม้ ผลิ ขณะ ที่ มัน ปรากฏ ตัว.\n\nแม้ ว่า ฤดู กาล ดัง กล่าว จะ ไม่ มี การ เปลี่ยน แปลง อีก ต่อ ไป บน เรือ รบ แต่ ชิ้น ส่วน เหล่า นั้น ก็ ให้ ภาพ แวบ เล็ก ๆ ใน วิธี ที่ บรรพบุรุษ ของ เรา เคย ฉลอง ความ เป็น อยู่ นี้."

 arkship.1210.desc.b: "รายการที่กู้กลับมาจากไมโครชิป อธิบายถึงการเฉลิมฉลองตามฤดูกาล ที่ผูกติดกับการเปลี่ยนแปลงของวงจรปี เหตุ การณ์ นี้ เกิด ขึ้น ใน ช่วง เวลา ที่ มืดมน ที่ สุด ของ ปี เมื่อ แสง แดด หา ยาก และ เย็น กว่า ครอบ งํา ดาว เคราะห์ ส่วน ใหญ่. ผู้ เข้า ร่วม ประชุม ตอบ รับ โดย การ ตกแต่ง บ้าน และ ที่ สาธารณะ ด้วย แสง ไฟ โดย เปลี่ยน คืน อัน ยาว นาน ให้ เป็น สิ่ง ที่ สดใส และ เป็น การ รื่นเริง. ผู้ คน ชุมนุม กัน เพื่อ แลก ของ ขวัญ และ ร่วม รับ ประทาน อาหาร ที่ มี คุณค่า ผิด ปกติ.\n\nฤดู หนาว เช่น นั้น ไม่ มี อีก ต่อ ไป บน เรือ รบ นี้ ข้อมูล แสดง ให้ เห็น วิธี ที่ บรรพบุรุษ ของ เรา เคย ตอบ รับ ฤดู หนาว ที่ มืดมน ที่ สุด ด้วย ความ อบอุ่น และ แสง สว่าง."

 arkship.1210.desc.c: "ทางเข้าดูเหมือนจะบรรยาย การเฉลิมฉลองส่วนตัวที่ครั้งหนึ่งเคยเป็นที่ทั่วไปในโลกของเรา บันทึกนี้หมายถึงโอกาสที่ วงจรชีวิตของแต่ละคนจะผ่านไป ใน วัน นี้ ครอบครัว และ เพื่อน ๆ จะ มา ชุมนุม กัน เพื่อ ฉลอง บุคคล นั้น และ ปี เดือน ที่ พวก เขา มี ชีวิต อยู่. ธรรมเนียม นี้ ดู เหมือน เกี่ยว ข้อง กับ การ แบ่ง ปัน สิ่ง อุปโภค บริโภค ด้วย กัน โดย เฉพาะ ซึ่ง เตรียม ไว้ สําหรับ เหตุ การณ์ นั้น.\n\nแม้ ว่า ชีวิต บน เรือ นี้ ใน ตอน นี้ ดําเนิน ตาม จังหวะ ที่ ต่าง กัน ไป แต่ บันทึก ต่าง ๆ บ่ง ชี้ ว่า ครั้ง หนึ่ง บรรพบุรุษ ของ เรา หยุด พัก ใน แต่ ละ ปี เพื่อ ฉลอง การ ย้อน กลับ ของ ชีวิต เดียว ท่ามกลาง หลาย คน."

 arkship.1210.desc.d: "ไมโคร ชิป ที่ ฟื้น ตัว ได้ ดู เหมือน จะ เผย ให้ เห็น การ ฉลอง ซึ่ง เป็น จุด เริ่ม ต้น ของ วัฏจักร ใหม่ ใน แต่ ละ ปี. บรรพบุรุษของเราจะทําความสะอาด ที่อยู่อาศัยของพวกเขาครั้งแรก ขณะ ที่ การ บูรณะ วัฏจักร ของ ดวง อาทิตย์ ใกล้ เข้า มา ชุมชน ต่าง ๆ ก็ รวม ตัว กัน นับ ช่วง สุด ท้าย. การ มา ถึง ของ วัฏจักร ใหม่ นี้ ได้ รับ การ ต้อนรับ ด้วย แสง สว่าง, การ เต้น รํา, และ การ ฉลอง ที่ แพร่ หลาย. นอก จาก นั้น ผู้ ร่วม งาน ยัง ได้ บันทึก ความ มุ่ง หมาย ส่วน ตัว สําหรับ ปี ที่ จะ มา ถึง มติ มุ่ง หมาย จะ ชี้ นํา การ กระทํา และ การ ปรับ ปรุง ใน เวลา ข้าง หน้า.\n\nแม้ ว่า ตอน นี้ ชีวิต บน เรือ รบ จะ ติด ตาม วัฏจักร ที่ ควบคุม ไว้ อย่าง ระมัดระวัง แทน ที่ จะ เป็น ปฏิทิน ดาว เคราะห์ แต่ ข้อมูล แสดง ให้ เห็น วิธี ที่ บรรพบุรุษ ของ เรา เคย กําหนด วัน เวลา ที่ จะ ผ่าน ไป โดย มี ความ หวัง ต่อ อนาคต อย่าง ต่อ เนื่อง."
 arkship.1210.a: "เราควรเรียนรู้จากเรื่องนี้"

 arkship.1210.desc.e: "รายการ ที่ ค้น พบ จาก ไมโคร ชิป พรรณนา ถึง ประเพณี ทาง สังคม ซึ่ง รวม จุด อยู่ ที่ การ สมรส ของ สอง บุคคล. ตาม ที่ บันทึก ไว้ ชุมชน ต่าง ๆ ได้ ชุมนุม กัน เพื่อ ให้ คํา พยาน แก่ คน ทั้ง สอง อย่าง เปิด เผย ถึง พันธะ ผูก มัด ของ ตน ต่อ กัน และ กัน. การ ฉลอง เหล่า นี้ มัก เกี่ยว ข้อง กับ เสื้อ ผ้า ที่ มี ความ หมาย เป็น นัย, คํา ปฏิญาณ, และ การ ที่ ครอบครัว และ เพื่อน ๆ แสดง ตัว เป็น พยาน.\n\nขณะ ที่ การ ร่วม มือ กัน บน เรือ รบ นี้ มัก จะ มี การ บันทึก ผ่าน ทาง ระบบ การ บริหาร แทน ที่ จะ เป็น พิธี ที่ ซับ ซ้อน เลขานุการ เหล่า นั้น แสดง ให้ เห็น ว่า บรรพบุรุษ ของ เรา เคย ทํา เครื่องหมาย การ สมรส ดัง กล่าว พร้อม ด้วย พิธี การ มาก มาย และ การ ฉลอง ใน ชุมชน."

 arkship.1210.desc.f: "สถิติที่กู้กลับมาจากไมโครชิป พรรณนาถึงเทศกาลที่มีชีวิตชีวา ครั้งหนึ่งเคยเฉลิมฉลองบนโลกของเรา กางเกงในที่ใส่ชุดรัดรูปและหน้ากาก สวมตัวตนใหม่ชั่วคราวสําหรับงานฉลอง นอก จาก นั้น ข้อมูล ยัง ได้ จัด ขบวน แห่ ซึ่ง เป็น เวที ที่ ตกแต่ง ด้วย การ เคลื่อน ย้าย ผ่าน ที่ สาธารณะ ขณะ ที่ ฝูง ชน กําลัง เต้น รํา และ โห่ ร้อง.\n\nเมื่อ เทียบ กัน แล้ว การ เฉลิม ฉลอง บน เรือ กําปั่น ถูก ควบคุม โดย วัฏจักร ของ งาน และ ทรัพยากร ที่ จํากัด. บันทึก ต่าง ๆ บ่ง ชี้ ว่า ใน อีก คราว หนึ่ง บรรพบุรุษ ของ เรา ได้ จัด เอา การ ทํา งาน ที่ ใช้ ได้ จริง ไว้ เป็น ครั้ง คราว เพื่อ แสดง ความ ตื่น เต้น และ ความ ปีติ ยินดี."

 arkship.1210.desc.g: "ไมโครชิปเปิดเผยบันทึก เทศกาลฤดูกาล จากยุคดาวเคราะห์ของเรา ดู เหมือน ว่า มี การ จัด การ ประชุม นี้ เมื่อ สิ้น ฤดู เก็บ เกี่ยว เมื่อ ชุมชน ชุมนุม กัน เพื่อ ขอบคุณ สําหรับ อาหาร ที่ ได้ รับ ใน ช่วง ปี นั้น. นอก จาก นี้ การ ฉลอง ยัง บ่ง ชี้ ถึง เวลา อัน มืดมน ของ ปี เมื่อ แสง แดด จะ ค่อย ๆ ค่อย ๆ ค่อย ๆ ค่อย ๆ จาง หาย ไป. คน ที่ แต่ง กาย แบบ ไม่ สุภาพ อาจ เลียน แบบ หรือ ไม่ ยอม ให้ วิญญาณ ที่ เพ้อ ฝัน เข้า มา.\n\nแม้ว่าวงจรการเกษตรของเรือ จะถูกควบคุมอย่างดี และเราไม่มีความจําเป็นใด ๆ สําหรับประเพณีเหล่านี้ คลังข้อมูลกล่าวว่า"

 arkship.1210.desc.h: "ไมโครชิปเปิดเผย ประวัติทางวัฒนธรรม คํา สอน นี้ แสดง ให้ เห็น ประเพณี ที่ รวม จุด อยู่ ที่ การ ระลึก ถึง คน เหล่า นั้น ที่ ได้ ล่วง ลับ ไป. ตาม ข้อมูล เหล่า นั้น ชุมชน ต่าง ๆ จะ สร้าง นิทรรศการ เล็ก ๆ ที่ อุทิศ ให้ กับ ญาติ และ เพื่อน ๆ ที่ ตาย ไป ตกแต่ง ให้ พวก เขา ด้วย ดอกไม้, อาหาร, และ สิ่ง ของ ส่วน ตัว ที่ เกี่ยว ข้อง กับ ผู้ ตาย. แทน ที่ จะ แสดง ความ โศก เศร้า อย่าง เงียบ ๆ โอกาส นั้น ดู เหมือน มี ทั้ง การ สะท้อน และ การ ฉลอง.\n\nแม้ ชั่ว อายุ บน เรือ รบ ได้ เปลี่ยน วิธี ที่ เรา จํา คน ตาย ได้ แต่ บันทึก ต่าง ๆ บ่ง ชี้ ว่า บรรพบุรุษ ของ เรา เคย จัด เวลา ไว้ ต่าง หาก เพื่อ แสดง ความ โศก เศร้า แต่ ก็ ฉลอง ชีวิต ที่ นวด ปั้น คน ที่ ยัง มี ชีวิต อยู่ ด้วย."

 arkship.1210.desc.avian.reptilian: "รายการที่พบจากไมโครชิป แสดงถึงพิธีสืบพันธุ์ ที่เคยปฏิบัติโดยบรรพบุรุษของเรา เป็น การ ชุมนุม กัน ซึ่ง มี การ นํา ไข่ มา ให้ ชุมชน เป็น ครั้ง แรก. มี การ วาง ไข่ อย่าง ระมัดระวัง ใน บริเวณ ที่ มี การ เตรียม ไว้ สําหรับ ทํา รัง ขณะ ที่ สมาชิก ครอบครัว และ พยาน ฯ สังเกต เห็น. มี การ ใช้ วัสดุ ใน การ ทํา รัง รวม ทั้ง การ จัด หา เปลือก หอย โดย นัย และ งาน เลี้ยง สังสรรค์ ฉลอง การ สืบ พันธุ์ อย่าง ต่อ เนื่อง.\n\nที่น่าสังเกตก็คือ บันทึกระบุว่า การกินไข่บนไข่นี้ ครั้งหนึ่งเคยกินเวลาเป็นอาทิตย์ เมื่อ เทียบ กัน แล้ว มี การ จัด การ เรื่อง เช่น นี้ บน เรือ กําปั่น อย่าง รวด เร็ว และ เป็น ส่วน ตัว ใน ทุก วัน นี้ เรือ ลํา นี้ มี เวลา มาก กว่า ไม่ กี่ ชั่วโมง ที่ จะ ดําเนิน การ อย่าง รอบคอบ."

 arkship.1210.desc.fungoid.plantoid: "สถิติ ที่ ค้น พบ จาก ไมโคร ชิป พรรณนา ถึง ประเพณี ที่ บรรพบุรุษ ของ เรา ปฏิบัติ กัน ใน ช่วง ที่ มี การ เจริญ เติบโต อย่าง มาก มาย. บันทึก กล่าว ถึง การ ชุมนุม กัน ใน ป่า หนา ทึบ ซึ่ง แต่ ละ คน จะ ปลูก พืช ผล ที่ แปลก ประหลาด และ มี ชีวิต ชีวา พร้อม ด้วย อาณานิคม ที่ มา เยี่ยม กัน เพื่อ สังเกต การ เจริญ เติบโต ที่ น่า ประทับ ใจ เป็น พิเศษ. มี การ จัด เรียง สาย พันธุ์ ต่าง ๆ เข้า ด้วย กัน เพื่อ สร้าง รูป แบบ ชีวิต ที่ ซับ ซ้อน ของ สี ผิว และ กลิ่น. บรรพบุรุษ ของ เรา จะ จงใจ เปลี่ยน ความ ชื้น, สาร อาหาร, และ แสง สว่าง เพื่อ กระตุ้น ให้ เกิด ดอกไม้ ที่ หา ยาก หรือ ไม่ ธรรมดา ใน ระหว่าง การ ชุมนุม.\n\nชีวิต บน เรือ รบ ปัจจุบัน วัฏจักร การ เจริญ เติบโต ถูก ควบคุม อย่าง ระมัดระวัง โดย ระบบ การ เกษตร และ สาย พันธุ์ ของ เชื้อ รา ส่วน ใหญ่ ถูก ปรับ ให้ เหมาะ กับ ประสิทธิภาพ แทน ที่ จะ เป็น การ แสดง ออก."

 arkship.1210.desc.infernal: "บันทึกที่ค้นพบ พรรณนาประเพณีโบราณ ที่กระทําโดยบรรพบุรุษของเรา บันทึก เหล่า นั้น พรรณนา การ ชุมนุม กัน รอบ บ่อ แห่ง เปลว ไฟ ที่ มี ชีวิต ซึ่ง แต่ ละ คน จงใจ ทํา ให้ ตัว เอง ได้ รับ ความ ร้อน จัด เป็น การ แสดง ถึง ความ ยืดหยุ่น และ ความ กระปรี้กระเปร่า. ส่วน ประกอบ ของ เสื้อ ผ้า ทํา ให้ เปลว ไฟ เป็น รูป แบบ ที่ ซับ ซ้อน ทํา ให้ มัน มี แก๊ส และ เชื้อ เพลิง ที่ หา ยาก ซึ่ง ทํา ให้ ไฟ ลุก ไหม้ ด้วย สี ที่ ไม่ ธรรมดา. ผู้ สังเกตการณ์ จะ สวด และ ฉลอง ขณะ ที่ เปลว ไฟ ลุก สูง ขึ้น เป็น เครื่องหมาย ของ เหตุ การณ์ นั้น ว่า เป็น ทั้ง ภาพ ที่ น่า ตื่น ตา และ พิธี ทาง สังคม.\n\nกระดานยานอาร์คชิปชิพเปิดเป็นการควบคุมอย่างเข้มงวด ในขณะที่พวกเขาก่อให้เกิดความเสี่ยงสูง โครงสร้างพื้นฐาน"

 arkship.1210.desc.mammalian: "การ ค้น พบ ดัง กล่าว พรรณนา ถึง ประเพณี ที่ รวม จุด อยู่ ที่ พัฒนาการ แรก ของ ลูก หลาน ของ เรา. ตาม บันทึก บอก ว่า ครอบครัว จะ รวม ตัว กัน เมื่อ คน หนุ่ม สาว ก้าว หน้า เป็น อิสระ เป็น ครั้ง แรก นอก รัง. ช่วง เวลา นั้น ดู เหมือน ว่า ได้ รับ การ ปฏิบัติ ว่า เป็น เหตุ การณ์ สําคัญ เล็ก น้อย แต่ มี ความ หมาย, บ่อย ครั้ง ได้ รับ การ ฉลอง ด้วย การ หนุน กําลัง ใจ, แบ่ง ปัน อาหาร แก่ คน หนุ่ม สาว, และ ความ สนใจ ของ ญาติ และ เพื่อน ๆ.\n\nชีวิต บน เรือ รบ"

 arkship.1210.desc.arthropoid: "การนําข้อมูลจากไมโครชิปกลับมา อธิบายถึงประเพณี ที่เชื่อมโยงกับขั้นตอนตามธรรมชาติ ของวงจรชีวิตของบรรพบุรุษของเรา พวก เขา แสดง การ ชุมนุม สังสรรค์ กัน ใน ชุมชน ใน ช่วง เวลา ที่ ผู้ คน ทิ้ง เครื่อง ช่วย หายใจ เก่า ๆ. แทน ที่ จะ เกิด ใน การ อยู่ โดด เดี่ยว ขั้น ตอน ต่าง ๆ เหล่า นี้ มัก จะ มี การ ประกอบ พิธี และ บาง ครั้ง มี การ ตกแต่ง ผิว เก่า หรือ รักษา ไว้ เพื่อ เป็น สัญลักษณ์ ของ การ เจริญ เติบโต และ การ บูรณะ ใหม่. เมื่อ นํา เปลือก หอย เก่า ออก มา แล้ว ก็ มี การ แสดง ให้ เห็น ด้วย ความ ภาค ภูมิ ใจ.\n\nวัฏจักร ของ การ เปลี่ยน แปลง"

 arkship.1210.desc.toxoid: "บันทึก ที่ ค้น พบ นี้ พรรณนา ถึง ประเพณี ที่ บรรพบุรุษ ของ เรา ปฏิบัติ กัน ใน ช่วง เวลา ที่ มี ความอิ่มสี ใน บรรยากาศ อย่าง หนัก. ปัจเจกบุคคลจะรวมตัวกันในพื้นที่ที่เตรียมพร้อมเป็นพิเศษ เพื่อจงใจปล่อยก๊าซและสารเคมีที่ก่อตัวขึ้น ส่วน ประกอบ จะ แข่งขัน เพื่อ ผลิต สาร เคมี ที่ มี ชีวิต ชีวา ที่ สุด หรือ ผิด ปกติ ที่ สุด. เมฆ ที่ เกิด จาก เมฆ ทํา ให้ เกิด สี และ รูป แบบ ของ การ เปลี่ยน แปลง ใน อากาศ. ผู้ ชม สังเกต เห็น ด้วย ความ กระตือรือร้น อย่าง ยิ่ง ขณะ ที่ ก๊าซ ที่ เปราะ บาง ที่ สุด มัก ยั่ว ยุ ให้ หัวเราะ ท่ามกลาง ฝูง ชน ที่ มา ชุมนุม กัน.\n\nทุก วัน นี้ บน เรือ รบ อาร์ม า เก็ด ดอน ระบบ บรรยากาศ ควบคุม การ ปล่อย ก๊าซ ดัง กล่าว อย่าง เคร่งครัด เพื่อ รักษา สภาพ แวด ล้อม ที่ ปลอด ภัย."

 arkship.1210.desc.lithoid: "ทางเข้าที่กู้ได้อธิบายประเพณีที่มีชีวิตชีวา ปฏิบัติโดยบรรพบุรุษของเรา ตาม บันทึก บอก ว่า ฝูง ชน จํานวน มาก จะ รวม ตัว กัน ใน ทุ่ง นา ที่ มี หิน เป็น ก้อน เพื่อ สู้ กับ หิน. พาร์ทิเกสโยนหินที่แต่ละอื่น ๆ ในขณะที่พยายามที่จะแตกหรือ สับชิ้นส่วนจากบรรดาคู่แข่งของพวกเขาชั้นนอก บาง ครั้ง มี การ รวบ รวม ชิ้น ส่วน เล็ก ๆ ที่ แยก ออก ระหว่าง การ ปะทะ กัน เป็น เครื่อง รักษา, สัญลักษณ์ แห่ง ความ ยืดหยุ่น และ การ แข่งขัน ที่ เป็น มิตร.\n\nงาน นี้ จะ ก่อ ให้ เกิด อันตราย อย่าง เห็น ได้ ชัด ต่อ โครง สร้าง. การ แข่งขัน เหล่า นี้ ได้ สาบสูญ ไป นาน แล้ว จาก ชีวิต ประจํา วัน."

 arkship.1210.desc.aquatic.mulluscoid: "ไมโครชิปที่กู้มาได้นั้นอธิบายประเพณีที่ปฏิบัติกันโดยบรรพบุรุษในห้วงน้ํา ในห้วงลึกของมหาสมุทร แต่ ละ คน จะ รวม ตัว กัน ลง ไป ใน น้ํา ลึก ยิ่ง กว่า ที่ เคย มี คน อาศัย อยู่. การ ดํา น้ํา เหล่า นี้ เป็น ทั้ง ข้อ ท้าทาย และ การ ฉลอง. บริเวณ ที่ ลึก กว่า มี การ ก่อ ตัว ทาง ธรณี วิทยา ที่ แปลก ประหลาด และ ไม่ คุ้น เคย บาง ครั้ง ถึง กับ เป็น อันตราย ด้วย ซ้ํา ทํา ให้ ระดับ น้ํา ลง ทั้ง น่า ตื่น เต้น และ อันตราย. คน เหล่า นั้น ที่ ไป ถึง ที่ ลึก ที่ สุด มัก จะ ได้ รับ การ ยกย่อง.\n\nแหล่ง ที่ อยู่ อาศัย ของ น้ํา ใน เรือ รบ มี การ ควบคุม อย่าง รอบคอบ และ ความ ลึก ก็ จํากัด ด้วย ข้อ จํากัด ทาง วิศวกรรม. ความ กดดัน มาก มาย และ ความ มืด อัน ไม่ รู้ สิ้น สุด ของ มหาสมุทร โบราณ ไม่ อาจ ประสบ ได้ อีก ต่อ ไป."

 arkship.1215.name: "การ รวม ตัว ของ แมง กะพรุน"
 arkship.1215.desc: "รายงาน เมื่อ ไม่ นาน มา นี้ บ่ง ชี้ ว่า มี การ แพร่ พันธุ์ ของ เชื้อ รา ที่ แทรกซึม อยู่ ทั่ว ชั้น ของ ไฮโดรโปนิกส์ ของ§Yเรือ รบ[Root.GetName]§!สิ่งมีชีวิตนี้ดูเหมือนจะเติบโต ในความชื้นที่ควบคุมได้\n\nความ พยายาม ใน การ ควบคุม ได้ พิสูจน์ แล้ว ว่า ไม่ มี ประสิทธิภาพ ดัง ที่ รา ไม่ ได้ แสดง ให้ เห็น ว่า มี ปฏิกิริยา ใด ๆ ต่อ การ รักษา ด้วย ยา ฆ่า แมลง แบบ มาตรฐาน. เราสงสัยว่าสายพันธุ์ได้ปรับตัวอย่างรวดเร็ว กับระบบนิเวศของเรือ ถ้าปล่อยไว้โดยไม่ยับยั้ง การระบาดนี้สามารถลดผลผลิตทางอาหารได้อย่างมาก และลดปริมาณความเข้มข้นของเรือข้ามฟาก"
 arkship.1215.a: "กําจัดความก้าวร้าว"
 arkship.1215.b: "ศึกษาเชื้อรา"
 arkship.1215.c: "พยายามสื่อสาร"

 arkship.1220.name: "การ ชําระ เปลว ไฟ"
 arkship.1220.desc: "การ รักษา แบบ อนุ สัญญา ประสบ ความ ล้ม เหลว สาร ที่ ปน เปื้อน นี้ ถูก ควบคุม ให้ เผา. แต่น่าเสียดายที่ส่วนใหญ่ ของพืชที่กินได้ของเรือ ได้หายไปในกระบวนการ เตียง สําหรับ การ เจริญ เติบโต ทั้ง หมด ถูก ลด ลง จน เหลือ แต่ เถ้า ธุลี เกลื่อน กลาด ทํา ให้ หลาย ส่วน ทาง เกษตรกรรม เป็น หมัน ชั่ว คราว.\n\nกระนั้น ดู เหมือน ว่า การ ดําเนิน งาน นี้ ได้ บรรลุ เป้า หมาย แล้ว. ด้วยพื้นผิวที่ทนต่อเชื้อ และโครงสร้างพื้นฐานที่เหลือ ถูกกําจัดออกไปอย่างทั่วถึง สายพันธุ์ของเชื้อรา ความ รู้ นี้ จะ ช่วย เรา เตรียม พร้อม สําหรับ สิ่ง มี ชีวิต ชนิด อื่น ๆ ที่ รุกราน ซึ่ง อาจ ตัดสิน ใจ ตั้ง ถิ่น ฐาน บน นาวา ใน อนาคต."
 arkship.1220.a: "การกําจัดที่ดี"

 arkship.1225.name: "ปัญญาประดิษฐ์"
 arkship.1225.desc: "สายพันธุ์ที่รุกราน§Yเรือ รบ[Root.GetName]§!ดําเนินงานผ่านเครือข่ายดนตรีที่สามารถแยกอย่างรวดเร็วและเสียสละ ชิ้นส่วนแต่ละส่วน เมื่อใดก็ตามที่เราพยายามสกัดเอาตัวอย่างสิ่งมีชีวิต การเติบโตโดยรอบจะเหี่ยวเฉาลงเกือบทันที สารอาหารของมันดูเหมือนจะเปลี่ยนผ่านเครือข่าย\n\nหลัง จาก ความ พยายาม หลาย ครั้ง ล้ม เหลว ใน ที่ สุด เรา ก็ สามารถ แยก ตัว อย่าง ที่ มั่นคง พอ สําหรับ การ สังเกต ด้วย การ ควบคุม. รา มี ระบบ การ จัด หา สาร อาหาร ที่ มี ประสิทธิภาพ สูง สุด ระบบ หนึ่ง ซึ่ง อาจ มี การ นํา มา ใช้ ใน สภาพ แวด ล้อม ที่ ปิด มิดชิด เช่น คน ที่ อยู่ บน เรือ อาจ ถึง กับ ลอก แบบ ระบบ การ จําหน่าย ของ เรา เอง."
 arkship.1225.a: "สายพันธุ์ที่โดดเด่น"
 arkship.1225.b: "ปลดปล่อยมัน"

 arkship.1230.name: "การ เปลี่ยน แปลง ทาง ชีวภาพ"
 arkship.1230.desc: "การ ทดลอง ต่อ ไป ด้วย การ เติบโต ของ เชื้อ รา เผย ให้ เห็น ปฏิกิริยา ทาง เคมี ที่ ผิด ปกติ. เมื่อ สัมผัส กับ สาร ประกอบ บาง ชนิด สิ่ง มี ชีวิต นี้ จะ เผาผลาญ สาร สังเคราะห์ อย่าง รวด เร็ว และ ปล่อย ก๊าซ ที่ มี ส่วน ผสม ต่าง ๆ ที่ เกิด จาก ก๊าซ ออก มา. เรา ตระหนัก ว่า ควัน เหล่า นี้ สามารถ เก็บ และ ขัด ได้.\n\nเชื้อ รา นี้ เปลี่ยน การ รับ สาร เคมี ง่าย ๆ ให้ เป็น สาร ประกอบ ที่ ระเหย ไป อย่าง ต่อ เนื่อง เป็น กระบวนการ ที่ ไม่ ได้ คาด คิด แต่ อาจ เป็น ประโยชน์. โดยเพาะเลี้ยงการเจริญเติบโตของเชื้อราที่ควบคุมได้ ในห้องพักที่โดดเดี่ยว เราเชื่อว่าสิ่งมีชีวิตสามารถถูก นํากลับมาใช้ใหม่"
 arkship.1230.a: "การค้นพบที่ไม่คาดคิด"

 arkship.1235.name: "รากที่ใช้ร่วมกัน"
 arkship.1235.desc: "การ สังเกต ใกล้ ๆ เกี่ยว กับ การ เจริญ เติบโต ของ เชื้อ รา ได้ เผย ให้ เห็น รูป แบบ ต่าง ๆ ที่ บ่ง ชี้ ถึง สัญญาณ ทาง ชีวภาพ ภาย ใน เครือ ข่าย ทาง ชีวภาพ อัน กว้าง ใหญ่ ไพศาล. สําหรับสปีชีส์ส่วนใหญ่ พฤติกรรมนี้อาจดูไม่สําคัญ แต่ชีววิทยาของเราเอง ทําให้เราจดจําและปรับตัว\n\nโดยนําสัญญาณทางชีวเคมีที่ปรับตั้งอย่างรอบคอบ เราจัดตั้งการสนทนาพื้นฐานกับสิ่งมีชีวิต ตั้ง แต่ นั้น เป็น ต้น มา มัน ได้ เริ่ม ทํา ให้ สาร อาหาร ต่าง ๆ เปลี่ยน ไป โดย ทาง เครือ ข่าย และ ป้องกัน พืช ผล จาก จุลชีพ ที่ เป็น อันตราย. ไม่ นาน เรา ก็ ตระหนัก ว่า สิ่ง ที่ เรา คิด ว่า เป็น การ ก้าวก่าย ก็ กลาย เป็น ลัทธิ ซิ มไบ โอ ซิส ที่ มี ความ หมาย ใน ไม่ ช้า พร้อม กับ สิ่ง มี ชีวิต อีก ชนิด หนึ่ง ที่ ร่วม ใน สวน ของ เรา."
 arkship.1235.a: "ความผิดปกติที่ไม่คาดคิด"

 fungal_contamination_chain_title: "$arkship.1215.name$"
 fungal_contamination_chain_desc: "รายงาน เมื่อ ไม่ นาน มา นี้ บ่ง ชี้ ว่า มี การ แพร่ พันธุ์ ของ เชื้อ รา ที่ แทรกซึม อยู่ ทั่ว ชั้น ของ ไฮโดรโปนิกส์ ของ§Yเรือ รบ[Root.GetName]§!ต่อต้านการกักกัน และคุกคามการผลิตอาหาร"

 ARKSHIP_FUNGAL_CONTAMINATION_PROJECT: "$arkship.1215.name$"
 ARKSHIP_FUNGAL_CONTAMINATION_PROJECT_DESC: "สายพันธุ์ลิงที่รุกราน แพร่กระจายผ่านชั้นไฮโดรโพนิคของ§Yเรือ รบ[Root.GetName]§!ได้ปรับตัวอย่างรวดเร็วกับระบบนิเวศของยาน มี การ ปล่อย ไว้ โดย ไม่ มี การ ควบคุม เครือ ข่าย ที่ หนา แน่น ของ มัน ซึ่ง คุกคาม ต่อ การ ลด การ ผลิต อาหาร อย่าง เห็น ได้ ชัด."

 ARKSHIP_FUNGAL_COMMUNICATION_PROJECT: "การ สร้าง การ สื่อ ความ"
 ARKSHIP_FUNGAL_COMMUNICATION_PROJECT_DESC: "เราจะพยายามที่จะสื่อสารกับสายพันธุ์ฟูจิกัลรุกรานแพร่กระจายผ่านชั้นไฮโดรโพนิคของ§Yเรือ รบ[Root.GetName]§!ถ้า ปล่อย ไว้ โดย ไม่ มี การ ควบคุม เครือ ข่าย ที่ หนา แน่น ของ มัน จะ ทํา ให้ การ ผลิต อาหาร ลด ลง อย่าง มาก."

 #Unknown Resource Usage
 arkship.1240.name: "การใช้งานทรัพยากรที่ไม่รู้จัก"
 arkship.1240.desc: "ใน ระหว่าง ที่ เรา มี หุ้น ใน แต่ ละ เดือน เรา พบ ว่า มี ความ ไม่ เสมอ ต้น เสมอ ปลาย ใน§Yเรือ รบ[Root.GetName]§!ระบบทรัพยากร มี การ ใช้ ไฟฟ้า, สินค้า, และ สิ่ง ของ อื่น ๆ จํานวน เล็ก น้อย ใน ระดับ ที่ มี การ บันทึก ไว้ มาก เกิน ไป. ผู้ เชี่ยวชาญ แนะ นํา ให้ มี การ รั่ว หรือ ผิด ปกติ หรือ มี ความ แตก ต่าง เล็ก น้อย ใน จํานวน นั้น.\n\nหลัง จาก ตรวจ สอบ ดู ต่อ ไป แล้ว ผล ก็ ยัง ไม่ แน่นอน. ไม่มีการละเมิด ไม่มีความล้มเหลว ไม่มีความไม่เสมอภาคเกินการยอมรับ แต่กระนั้น ตัวเลขก็ยังเปลี่ยนแปลงไม่ได้ ทรัพยากรยังคงหายไปจากระบบ โดยไม่มีคําอธิบาย บางสิ่งบางอย่างบนยานอาร์คชิป กําลังบริโภคทรัพยากรของเรา"
 arkship.1240.a: "สืบสวน"
 arkship.1240.b: "มันอาจจะไม่มีอะไรก็ได้"

 arkship.1245.name: "ไม่นับรุ่น"
 arkship.1245.desc: "ใน ส่วน ที่ ยัง ไม่ มี การ สร้าง เรือ รบ เรา ได้ พบ กลุ่ม คน หนุ่ม สาว ซึ่ง อาศัย อยู่ นอก ระบบ ทาง การ. เมื่อ วาด ภาพ พลัง, อากาศ, และ อาหาร ที่ เปลี่ยน ทิศ ทาง พวก เขา ได้ สร้าง อวกาศ, การ ทดลอง, การ ปรับ เปลี่ยน สภาพ แวด ล้อม, และ การ แสดง ออก ซึ่ง ตัว เอง เกิน กว่า การ ดู แล.\n\n การวิจัยขอ ให้ คิด ว่า นั่น เป็น ส่วน หนึ่ง ของ กระบวนการ พัฒนา ตาม ธรรมชาติ ของ วัย รุ่น. พวก เขา ดู เหมือน แปลก ใจ อย่าง แท้ จริง จาก การ ตรวจ สอบ และ กระทํา อย่าง ไม่ แยแส. พวก เขา อ้าง ว่า ได้ รับ เงิน เพียง เล็ก น้อย โดย ระมัดระวัง มาก พอ ที่ จะ หลีก เลี่ยง การ ตรวจ พบ ทันที. พวกเขาทําให้มันชัดเจนว่าพวกเขามีความตั้งใจที่จะสละพื้นที่นี้ และต้องการที่จะอยู่คนเดียว"
 arkship.1245.a: "ทําลายสถานที่ซะ"
 arkship.1245.b: "ให้พวกเขาแสดงออกเอง"

 arkship.1250.name: "โพรเซสมรดก"
 arkship.1250.desc: "ในแผนกซ่อมบํารุงที่ถูกลืม ผู้ตรวจสอบค้นพบกลุ่มหุ่นยนต์แรงงานที่ล้าสมัย ที่ยังคงดําเนินงานภายใต้คําสั่งโบราณ กิจวัตรของพวกเขาดูเหมือนจะมีการปรับปรุงระบบหลายระบบ ทําให้พวกเขาทํางานนอกโปรโตคอลการทําไม้ในปัจจุบัน ในขณะที่ต้องการเพียงปริมาณน้อยทรัพยากรที่จะทําหน้าที่\n\nการ ตรวจ สอบ เพิ่ม เติม เผย ให้ เห็น ผล จาก กิจกรรม ที่ พวก เขา ทํา อยู่ ต่อ ไป: การ สะสม ของ อัล ลอย ที่ ถูก ขัด เกลา อย่าง มาก ได้ มี การ ดําเนิน การ อย่าง ละเอียด ถี่ถ้วน และ เก็บ ไว้ ตลอด หลาย รอบ. โดรนได้รวบรวมอย่างเงียบ ๆ และปรับแต่งทรัพยากร ให้เหมาะสมที่สุด"
 arkship.1250.a: "$arkship.1245.a$"
 arkship.1250.b: "ปล่อยให้พวกเขาทํางานและใช้ทรัพยากร"

 arkship.1255.name: "การ เสื่อม คุณภาพ"
 arkship.1255.desc: "ในพื้นที่ลับของยานอาร์คชิปติก เราค้นพบการล่าถอย ที่ซ่อนอยู่นอกระบบราชการ พลัง ที่ หลาก หลาย, สินค้า, และ น้ํา ค้ําจุน สิ่ง แวด ล้อม ที่ มี การ ควบคุม นี้ ซึ่ง ถูก ออก แบบ ให้ พัก ผ่อน และ ฟื้น ตัว.\n\nคน เหล่า นั้น ที่ อยู่ ที่ นั่น แสดง ถึง ความ เป็น ห่วง เพียง เล็ก น้อย ที่ จะ ถูก ค้น พบ อธิบาย ว่า อวกาศ นั้น มี ความ หมาย มาก กว่า ความ จําเป็น ที่ จะ มุ่ง ความ สนใจ ไป ที่ ผล ผลิต และ แสดง ให้ เห็น ว่า มี ประสิทธิภาพ เป็น การ หนี จาก กิจวัตร ประจํา ของ ชีวิต ใน เรือ. แม้ ว่า เรือ รบ จะ ถูก ใช้ เพื่อ สนอง ความ จําเป็น ทุก อย่าง แต่ บาง คน ก็ ยัง แสวง หา สถาน ที่ ซึ่ง มี ความ หมาย สําหรับ การ ผ่อน คลาย อย่าง แท้ จริง."
 arkship.1255.a: "$arkship.1245.a$"
 arkship.1255.b: "ปล่อยให้พวกเขาพักผ่อนอย่างสงบ"

 arkship.1260.name: "ไม่นับ"
 arkship.1260.desc: "ใน ช่วง ที่ เงียบ สงบ ของ เรือ รบ เรา ได้ พบ การ ชุมนุม ของ ชุมชน ที่ ไม่ มี หลัก ฐาน ใน ช่วง เวลา ประจํา. มี การ ใช้ ทรัพยากร จํานวน เล็ก น้อย ใน การ จัด การ ประชุม เหล่า นี้.\n\nสมาชิกอธิบายการประชุมนี้ว่าเป็นการแลกเปลี่ยนกันอย่างไม่เป็นทางการ โดยมีศูนย์กลางอยู่ที่ตัวอย่างที่สะสม ระหว่างการเก็บสะสมของยานอาร์คชิปชิพ เช่น เศษแร่แร่แร่ ส่วน ประกอบ จะ ตรวจ สอบ และ พิจารณา การ ค้น พบ ของ พวก เขา, เปรียบ เทียบ ส่วน ประกอบ และ วิเคราะห์ ต้น กําเนิด ของ ตัว เอง."
 arkship.1260.a: "$arkship.1245.a$"
 arkship.1260.b: "ปล่อยศิลปินไปเถอะ"

 arkship.1265.name: "เครื่อง เรือน"
 arkship.1265.desc: "ในห้องเก็บของที่ถูกผนึกไว้ เราค้นพบคลังเสบียงส่วนบุคคล สินค้าผู้บริโภค กระป๋องอากาศ\n\nมี การ พบ บุคคล ที่ มี ความ รับ ผิด ชอบ อย่าง รวด เร็ว และ ให้ คํา อธิบาย ง่าย ๆ คือ การ เตรียม ตัว. ในระบบที่การอยู่รอดขึ้นอยู่กับความมั่นคงทั้งหมด พวกเขาถกเถียงกัน ว่ามันไม่มีความรับผิดชอบ ที่จะถือว่าความมั่นคง ได้รับการรับประกันตลอดไป มาตราของการสะสม แสดงให้เห็นว่าการวางแผนระยะยาว ห่างไกลจากการใช้งานส่วนบุคคล ไม่ ใช่ ทุก คน บน เรือ รบ มั่น ใจ ว่า เรือ นี้ จะ คง อยู่ ตลอด ไป."
 arkship.1265.a: "เจรจาและปิดเรื่องไร้สาระนี้"
 arkship.1265.b: "ปล่อยให้พวกเขาอยู่คนเดียว"

 arkship.1270.name: "ทําซ้ําทั้งหมด"
 arkship.1270.desc: "ในกระบวนการประมวลผลที่ถูกปิดลง ผู้ตรวจสอบได้ค้นพบระบบการกลับมาของกระดูกที่ยังไม่ได้ลงทะเบียนไว้ ระบบที่ถูกออกแบบมาให้แปลงซากทางชีวภาพ เป็นวัสดุที่ใช้ได้ ระบบได้ดําเนินการอย่างต่อเนื่อง ห่างไกลจากการทํางานฉุกเฉิน\n\nในขณะที่มีประสิทธิภาพ โพรเซสเป็นทรัพยากรภายใน มี การ เปลี่ยน พลังงาน, ตัว กระตุ้น ทาง เคมี, และ วัสดุ ที่ นํา มา ผลิต เป็น ปริมาณ มาก เพื่อ ย่อย สลาย, ทํา หมัน, และ กลั่น กรอง อินทรีย์ เป็น ผล ผลิต มาตรฐาน สําหรับ ใช้ ซ้ํา อีก ภาย ใน นาวา. ไม่มีอะไรเกี่ยวกับยานอาร์คชิป ควรถูกทําลาย แม้แต่คนตาย"
 arkship.1270.a: "ทําลายที่นี่ซะ"
 arkship.1270.b: "เป็นทรัพยากร ปล่อยพวกเขาไป"

 arkship.1275.name: "นอกเหนือจากระบบดาว"
 arkship.1275.desc: "ตามร่องรอยการหายตัวไปของทรัพยากร เราพบส่วนของยานอาร์ก เห็นได้ชัดว่ามีชุมชนเล็กๆ อาศัยอยู่นอกระบบราชการ ที่ อยู่ อาศัย ของ พวก เขา เรียบ ง่าย, ได้ รับ การ ค้ําจุน จาก ทรัพยากร ที่ ได้ รับ การ ค้ําจุน, มี ขนาด เล็ก พอ ที่ จะ เลี่ยง การ ตรวจ พบ.\n\nทั้ง ๆ ที่ สภาพ แวด ล้อม ของ พวก เขา มั่นคง, รักษา ไว้ อย่าง ตั้งใจ, และ ปรับ ตัว ให้ เข้า กับ ความ จําเป็น ของ พวก เขา. เห็น ได้ ชัด ว่า นี่ เป็น วิธี ดําเนิน ชีวิต อย่าง จงใจ ที เดียว. พวก เขา ไม่ ได้ เสนอ การ ต่อ ต้าน และ ขอ ให้ อธิบาย การ เลือก ของ ตน."
 arkship.1275.a: "ฟังพวกเขาออกมา"
 arkship.1275.b: "ถอนกําลังจากเรืออาร์เจนต์"
 arkship.1275.c: "เราปล่อยให้สิ่งนี้ล้างออกไม่ได้"

 arkship.1280.name: "วิธี ดําเนิน ชีวิต ที่ ต่าง ออก ไป"
 arkship.1280.desc: "กลุ่ม โดด เดี่ยว นี้ พูด อย่าง เปิด เผย เกี่ยว กับ การ ตัดสิน ใจ ของ พวก เขา. แต่ พวก เขา บอก ว่า วิถี ชีวิต ภาย ใน เรือ ได้ พัฒนา ขึ้น. สําหรับพวกเขา การดํารงอยู่ได้ถูกทําให้เหมาะสมเกินไป ทุกๆการกระทํา การติดตามและทุกช่วงเวลา\n\nพวก เขา อธิบาย วิธี ที่ ต่าง กัน เกี่ยว กับ กลไก ของ เรือ รบ. พวก เขา ถือ ว่า เสรีภาพ ใน การ เลือก นอก เหนือ จาก การ ดู แล อยู่ เสมอ. พวก เขา อ้าง ว่า วิถี ชีวิต ของ พวก เขา มี ประสิทธิภาพ น้อย กว่า แต่ ก็ น่า พอ ใจ กว่า. ปัจจุบัน ผู้ นํา บาง คน ของ เรา สงสัย ว่า ชุมชน ดัง กล่าว เป็น อันตราย ต่อ การ ร่วม มือ กัน หรือ ไม่ หรือ เป็น การ แสดง ออก ซึ่ง ความ เป็น ส่วน ตัว ที่ จําเป็น ภาย ใน ระบบ ที่ ปิด."
