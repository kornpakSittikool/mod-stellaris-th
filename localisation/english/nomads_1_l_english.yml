 sm_arkship_archaeo_shield_tt: "$ARKSHIP_COMPONENTS$\n$t$$ADDS_ARKSHIP_L_UTILITY_SLOTS$\n$t$สล็อตที่อุทิศตัวเหล่านี้จะติดตั้ง§Y$LARGE_ARCHAEO_SHIELD$§!."

 sm_arkship_crystal_plating: "$tech_crystal_armor_1$"
 sm_arkship_crystal_plating_desc: "แผ่น ผลึก ที่ หนา แน่น ซึ่ง ติด อยู่ กับ ตัว เรือ ชั้น นอก ให้ การ ปก ป้อง อย่าง มาก จาก ความ เสีย หาย ทุก รูป แบบ ที่ กําลัง เข้า มา."
 sm_arkship_crystal_plating_tt: "$ARKSHIP_COMPONENTS$\n$t$$ADDS_ARKSHIP_L_UTILITY_SLOTS$\n$t$สล็อตที่อุทิศตัวเหล่านี้จะติดตั้ง§Yแผ่นใส§!อัพเกรดเทคโนโลยีล่าสุดโดยอัตโนมัติ"

 sm_arkship_afterburner: "$tech_afterburners_1$"
 sm_arkship_afterburner_desc: "ระบบขับเคลื่อนฉุกเฉินสําหรับระยะทางปิด หรือทําลายการหมั้น เมื่อไดรฟ์มาตรฐานไม่เพียงพอ"
 sm_arkship_afterburner_tt: "$ARKSHIP_COMPONENTS$\n$t$$ADDS_ARKSHIP_AUX_SLOTS$\n$t$เครื่องช่วยจําที่ทุ่มเทเหล่านี้ จะติดตั้ง§Y$tech_afterburners_1$§!อัพเกรดเทคโนโลยีล่าสุดโดยอัตโนมัติ"

 sm_arkship_armor_hardener: "$tech_armor_hardeners_1$"
 sm_arkship_armor_hardener_desc: "การ ทํา ซ้ํา แบบ นี้ ทํา ให้ ตัว เรือ แข็ง ตัว ใน ช่วง ก่อน จะ ถูก กระทบ."
 sm_arkship_armor_hardener_tt: "$ARKSHIP_COMPONENTS$\n$t$$ADDS_ARKSHIP_AUX_SLOTS$\n$t$เครื่องช่วยจําที่ทุ่มเทเหล่านี้ จะติดตั้ง§Y$tech_armor_hardeners_1$§!อัพเกรดเทคโนโลยีล่าสุดโดยอัตโนมัติ"

 sm_arkship_shield_hardener: "$tech_shield_hardeners_1$"
 sm_arkship_shield_hardener_desc: "ความถี่ที่เปลี่ยนแปลงเกราะป้องกัน เชื่อมต่อกันตรงกลาง ลดการเจาะจากอาวุธ"
 sm_arkship_shield_hardener_tt: "$ARKSHIP_COMPONENTS$\n$t$$ADDS_ARKSHIP_AUX_SLOTS$\n$t$เครื่องช่วยจําที่ทุ่มเทเหล่านี้ จะติดตั้ง§Y$tech_shield_hardeners_1$§!อัพเกรดเทคโนโลยีล่าสุดโดยอัตโนมัติ"

 tech_nomads_titans: "$tech_titans$"
 tech_nomads_titans_desc: "$tech_titans_desc$"
 TECH_UNLOCK_ARKSHIP_TITAN_AURAS_CONSTRUCTION_TITLE: "§H$UNLOCKS_COMPONENTS$§!เรือ รบ"
 TECH_UNLOCK_ARKSHIP_TITAN_AURAS_CONSTRUCTION_DESC: "§Hเรือ รบ§!\nปัจจุบัน ความ ก้าว หน้า ใน การ สนับสนุน เทคโนโลยี ของ กอง เรือ ต่าง ๆ ทํา ให้ เรือ รบ ได้ รับ เชื้อ เพลิง ชนิด เดียว กับ ที่ เรือ ไททัน ใช้."

 sm_arkship_quantum_destabilizer: "$SHIP_AURA_QUANTUM_DESTABILIZER$"
 sm_arkship_quantum_destabilizer_desc: "มวลของยานอาร์คชิปพอยท์ ทําให้สามารถสร้างสนาม ที่เข้ามาแทรกแซงระบบอาวุธของเรือข้าศึกที่อยู่ใกล้เคียง"
 sm_arkship_subspace_snare: "$SHIP_AURA_SUBSPACE_SNARE$"
 sm_arkship_subspace_snare_desc: "สนามสมอเรือของยานแม่ ป้องกันยานข้าศึก ไม่ให้หนีไปที่ความเร็ว"
 sm_arkship_shield_dampener: "$SHIP_AURA_SHIELD_DAMPENER$"
 sm_arkship_shield_dampener_desc: "เครื่อง ฉาย ความ ถี่ ซึ่ง ติด ตั้ง อยู่ เหนือ ตัว เรือ ช่วย ยับยั้ง โล่ ของ เรือ ศัตรู ที่ อยู่ ใกล้ ๆ ทํา ให้ มี การ ป้องกัน สูง สุด."

 tech_nomads_juggernaut: "$tech_juggernaut$"
 tech_nomads_juggernaut_desc: "$tech_juggernaut_desc$"
 TECH_UNLOCK_ARKSHIP_JUGGERNAUT_AURAS_CONSTRUCTION_TITLE: "§H$UNLOCKS_COMPONENTS$§!เรือ รบ"
 TECH_UNLOCK_ARKSHIP_JUGGERNAUT_AURAS_CONSTRUCTION_DESC: "§Hเรือ รบ§!\nตอน นี้ ความ ก้าว หน้า ใน ด้าน เทคโนโลยี การ ค้ําจุน ของ กองทัพ เรือ ทํา ให้ เรือ รบ ได้ รับ การ ปรับ ปรุง ให้ มี ยุทโธปกรณ์ ชนิด เดียว กับ ที่ ยุวชน ใช้."

 sm_arkship_aura_strike_craft: "$SHIP_AURA_STRIKE_CRAFT$"
 sm_arkship_aura_strike_craft_desc: "เรือ รบ จะ กระจาย สัญญาณ การ บิน ประสาน กัน เพื่อ เพิ่ม ประสิทธิภาพ ใน การ ต่อ สู้ ของ ยาน โจมตี ที่ อยู่ ใกล้ ๆ."
 sm_arkship_aura_hyperlane: "$SHIP_AURA_HYPERLANE$"
 sm_arkship_aura_hyperlane_desc: "สัญญาณนําทางที่ฉายจากยานอาร์ค ช่วยเพิ่มการคํานวณไฮเปอร์ไดรฟ์ สําหรับเรือทุกลําในกองทัพเรือ"
 sm_arkship_aura_pd_penetration: "$SHIP_AURA_PD_PENETRATION$"
 sm_arkship_aura_pd_penetration_desc: "การป้องกันทางอิเล็กทรอนิกส์ ที่ออกอากาศจากยานอาร์ค ทําให้ศัตรูสับสน เป้าหมายในการป้องกัน การปล่อยอาวุธของเราผ่านเข้ามา"
 sm_arkship_aura_bombardment: "$SHIP_AURA_BOMBARDMENT$"
 sm_arkship_aura_bombardment_desc: "เครื่อง ดับ เพลิง ที่ กระจาย อยู่ จาก เรือ หีบ สัญญา ไมตรี ช่วย เพิ่ม ความ ถูก ต้อง แม่นยํา ของ การ ถล่ม ของ กอง เรือ ทั้ง กอง."
 sm_arkship_aura_range: "$SHIP_AURA_RANGE$"
 sm_arkship_aura_range_desc: "ข้อมูลเป้าหมายที่แบ่งปันจากอาร์เรย์ของเรืออาร์เจนต์ ขยายระยะการมีส่วนร่วมที่มีประสิทธิภาพ ของเรือทุกลําในกองทัพเรือ"


 sm_arkship_energy_hub: "ตัวนํายิ่งยวด"
 sm_arkship_energy_hub_desc: "ตาข่ายของตัวนํายิ่งยวด วิ่งวนไปตามลําเรือ กําจัดความเสียหายที่ต่อต้าน และเพิ่มพลังงานให้กับทุกระบบ"
 sm_arkship_food_hub: "การ ควบคุม การ มอง ใน แง่ ดี"
 sm_arkship_food_hub_desc: "การ ควบคุม สิ่ง แวด ล้อม ซึ่ง ผลัก ดัน อ่าว เพาะ ปลูก ทุก แห่ง และ ดาดฟ้า ไฮโดรโปนิก ไป จน ถึง ขีด สุด ใน การ ทํา งาน."
 sm_arkship_hydroponics_bay: "แผ่น ดิน เหนียว"
 sm_arkship_hydroponics_bay_desc: "ส่วนต่าง ๆ ของตัวเรือ ที่ถูกบรรจุไว้ สําหรับการเกษตรขนาดใหญ่"
 sm_arkship_harvest_processing_arrays: "การ เก็บ เกี่ยว"
 sm_arkship_harvest_processing_arrays_desc: "ลําดับการประมวลผลที่ถูกตัดทอนและเอวา โครงสร้างพื้นฐานที่ขยายความจุของยานอาร์คชิปติก ในการเก็บรวบรวมและกลั่นกรองพลังงานในออร์บิทัล"
 sm_arkship_trade_hub: "ระบบปูมบันทึกภายนอก"
 sm_arkship_trade_hub_desc: "ทางรถไฟคาร์โกและระบบแม่เหล็ก ที่การโอนของทรัพยากร กระแสน้ําภายนอกระหว่างยานอาร์คชิปและเรือคู่"
 sm_arkship_bureaucracy_hub: "ศูนย์กระจายเสียง"
 sm_arkship_bureaucracy_hub_desc: "ศูนย์ประมวลผลที่กระจายอยู่หลายชั้น ทําให้การบริหารของเราทํางานได้ราบรื่นเหมือนเครื่องยนต์ของเรา"
 sm_arkship_synapse_hub: "การ หด ตัว แบบ พอ ประมาณ"
 sm_arkship_synapse_hub_desc: "ที่เร่งการตัดสินใจข้ามจิตสํานึกร่วมกัน บนยานอาร์คชิป"
 sm_arkship_maintenance_hub: "ซ่อมแซมฮับ"
 sm_arkship_maintenance_hub_desc: "อ่าว ซ่อมแซม ที่ อุทิศ แล้ว ทํา ให้ แน่ ใจ ว่า มี การ ตรวจ สอบ สาร ประกอบ ทุก อย่าง, รักษา ไว้, และ เข้า มา แทน ที่ ก่อน ที่ จะ กลาย เป็น ปัญหา. ใน อวกาศ ช่อง ว่าง ระหว่าง ความ ผิด เล็ก ๆ น้อย ๆ กับ ความ หายนะ นั้น บาง."
 sm_arkship_consumer_goods_hub: "อุตสาหกรรม"
 sm_arkship_consumer_goods_hub_desc: "มี การ นํา เส้น ทาง การ ประชุม ใหญ่ มา ใช้ ใหม่ เพื่อ ผลิต ผู้ บริโภค เพิ่ม สิ่ง ที่ ประชากร ของ เรา ต้องการ."
 sm_arkship_alloys_hub: "ฟอร์จชั้นสูง"
 sm_arkship_alloys_hub_desc: "อาคาร ของ อัล ลอย ซึ่ง มี อยู่ ใน บริเวณ ที่ เรือ สามารถ จุ ได้ อย่าง ปลอด ภัย."
 sm_arkship_psi_corps: "เซอร์เบีย"
 sm_arkship_psi_corps_desc: "ที่ตั้งอยู่ลึกภายในเรือของยานอาร์คชิปชิพ แยกตัวออกจากวงแหวนที่มีคน สถานที่นี้อุทิศให้กับการฝึกบุคคลไซ-กิตติมศักดิ์\n\n§Yคอร์ปคือเพื่อนของคุณ เชื่อใจเดอะคอร์ป§!\n\n£job_telepath£ $job_telepath_plural$ผลิต£unity£ §Y$unity$§!ลด£crime£ §Y$PLANET_CRIME_TITLE$§!และเพิ่มขึ้น$mod_psionic_pop_bonus_workforce_mult$.\n"
 sm_arkship_psi_corps_hive_mind: "$sm_arkship_psi_corps$"
 sm_arkship_psi_corps_desc_hive_mind: "ที่ตั้งอยู่ลึกภายในเรือของยานอาร์คชิปแลนด์ แยกออกจากวงแหวนที่มีคน สถานที่นี้อุทิศให้ฝึกหุ่นยนต์ไซ-ฟลาย\n\n§Yเสนาฯ เป็นผู้พิทักษ์ของท่าน เชื่อใจเดอะคอร์ป§!\n\n$job_telepath_drone_effect_desc$\n"
 sm_arkship_psi_corps_machine_intelligence: "$sm_arkship_psi_corps$"
 sm_arkship_psi_corps_desc_machine_intelligence: "ที่ตั้งอยู่ลึกภายในเรือของยานอาร์คชิปแลนด์ แยกออกจากวงแหวนที่มีคน สถานที่นี้อุทิศให้กับการฝึกหน่วยไซ-เกด\n\n§Yเสนาฯ เป็นผู้พิทักษ์ของท่าน เชื่อใจเดอะคอร์ป§!\n\n$job_telepath_drone_effect_desc$\n"
 sm_arkship_shield_generator: "ตัวขยายเกราะ"
 sm_arkship_shield_generator_desc: "เครื่อง ส่ง สัญญาณ ที่ สอง ซึ่ง เสริม ระบบ ติด โล่ หลัก เพิ่ม การ ป้องกัน อีก ชั้น หนึ่ง เข้า กับ ตัว เรือ."
 sm_arkship_galactic_stock_exchange: "แลกเปลี่ยนหลักทรัพย์"
 sm_arkship_galactic_stock_exchange_desc: "ชั้นการค้าดําเนินการตลอดนาฬิกา เชื่อมตลาดของเรากับทุกจักรวรรดิที่เราผ่าน"
 sm_arkship_embassy_complex: "คอมพลีเมนต์ของสถานทูต"
 sm_arkship_embassy_complex_desc: "ห้อง ชุด การ รับ แขก และ ห้อง รับ แขก ทํา ให้ ผู้ ส่ง ข่าว จาก ทั่ว กาแล็กซี ต่าง ๆ ได้ รับ การ ต้อนรับ. การต้อนรับเดินทางได้ดี"
 sm_arkship_noble_estates: "หมายเลขบัญชีสูงสุด"
 sm_arkship_noble_estates_desc: "ที่ พัก อาศัย ที่ แออัด สงวน ไว้ สําหรับ ชน ชั้น สูง ซึ่ง ความ มั่งคั่ง และ อิทธิพล ของ พวก เขา อยู่ กับ เรือ."
 sm_arkship_slave_processing_facility: "การประมวลผลของทาส"
 sm_arkship_slave_processing_facility_desc: "การ ดําเนิน งาน ของ โรง งาน ต่าง ๆ เพื่อ จัด การ กับ ประชากร ทาส ทํา ให้ การ ทํา งาน มี ประสิทธิภาพ ตลอด ระบบ ที่ เรา เยี่ยม ชม."
 sm_arkship_resource_silo: "$sm_resource_silo$"
 sm_arkship_resource_silo_desc: "$sm_resource_silo_desc$"
