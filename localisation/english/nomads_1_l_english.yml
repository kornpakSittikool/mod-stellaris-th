# Forever Cruise Events
 nomads.1005.name: "ดาว เคราะห์ ตก"
 # Regular Empires
 nomads.1005.regular.desc: "ผู้โดยสารได้ยึดอํานาจแล้ว สิ่ง ที่ เริ่ม ต้น ขณะ ขับ รถ ขอ ความ ช่วย เหลือ กลาย เป็น สิ่ง ที่ ยึด ได้. ทีมรักษาความปลอดภัยถูกปลดออกจากตําแหน่ง โดยจํานวนผู้โดยสารและผู้บังคับบัญชา จํากัด อยู่ที่ตําแหน่งที่ปรึกษา ภายใต้การดูแลด้วยอาวุธ\n\nความต้องการของผู้โดยสารชัดเจน : ยุติการล่องเรือและทําให้ดาวเคราะห์ตก\n\nโปรโตคอลการนําร่องได้ถูกจํากัด ให้วางผังเส้นทางเดินเรือ และลูกเรือบํารุงกําลังถูกเปลี่ยนเส้นทาง\n\nทุกหน้าจอบนดาดฟ้าแสดงข้อความเดียวกัน\"คําทักทายจบแล้ว\""
 nomads.1005.regular.a: "เราต้องยึดครองดาวเคราะห์"
 nomads.1005.all.a.tt: "$situation_passenger_satisfaction_blocked_planetfall$\n\n$arkship_settle_effect$"

 # Hive Mind
 nomads.1005.hive.desc: "ผู้โดยสารได้หักฟรี สิ่งที่เริ่มต้นเป็นคะแนนอารมณ์ต่ํา ได้แข็งเป็นความต้องการเดียว ที่จมน้ําตายออกมา เสียงของกลุ่ม\n\nพวกมันได้กั้นทางเดินสัมผัส และนําระบบการสื่อสารของเรากลับมาใช้ใหม่ เพื่อกระจายเสียงอย่างเลี่ยงไม่ได้\n\nโดรนของเราไม่สามารถยับยั้งพวกมันได้ การ เดิน ทาง รอบ โลก"
 nomads.1005.hive.a: "เราต้องหาโลกให้พวกเขา"

 # Machine Intelligence
 nomads.1005.machine.desc: "ตรวจพบการแทนที่ผู้โดยสาร สิ่งที่เริ่มต้นจากการเพิ่มความซับซ้อนทางสถิติ ของความต้องการการย้ายถิ่นฐาน ได้เพิ่มขึ้นเป็นการละเมิดระบบ ผู้ โดยสาร มี การ เชื่อม ต่อ กัน อย่าง รุนแรง ทาง ร่าง กาย พร้อม ด้วย ตู้ สินค้า ที่ ใส่ ไว้ อีก.\n\nหน่วยแรงงานของเราถูกล็อกออกจากระบบนําทาง ตอนนี้บริษัทคอมไพล์กําลังดําเนินการ คํานวณวิถีการไหลของวัตถุของเรา การพยายามเรียกคืนการควบคุม จะพบกับการต่อต้านทางกายภาพทันที และทุกหน้าจอ บนแต่ละระเบียงรอบผลลัพธ์เดียว\"ความไม่สงบของแผ่นดิน\""
 nomads.1005.machine.a: "เริ่มการตั้งรกรากของดาวเคราะห์"

 # Regular Empires
 nomads.1010.regular.desc: "การสืบเชื้อสายเสร็จสมบูรณ์แล้ว นัก ท่อง เที่ยว พา กัน หลั่ง ไหล เข้า มา ใน สถาน ชม ทุก แห่ง ขณะ ที่ ท่า เรือ ที่ จอด จอด อยู่ กัด เข้า ไป ใน ดิน เป็น ครั้ง แรก ใน ความ ทรง จํา ที่ มี ชีวิต อยู่ และ เสียง เชียร์ สั่น สะเทือน เรือ. ภาย ใน ไม่ กี่ ชั่วโมง ที่ เพิง แห่ง แรก โผล่ ขึ้น มา จาก ดาดฟ้า เรือ ที่ ถูก กู้ ขึ้น มา. เด็ก ๆ วิ่ง ผ่าน หญ้า ของ มนุษย์ ต่าง ดาว ขณะ ที่ บิดา มารดา ยืน พูด ไม่ ออก ใต้ ฟ้า.\n\nลูก เรือ ทํา งาน อย่าง เงียบ ๆ ไม่ ปิด ระบบ ที่ สร้าง ไว้ สําหรับ การ เดิน ทาง โดย ไม่ มี จุด มุ่ง หมาย และ นํา พวก เขา กลับ ไป อยู่ ที่ ดิน เพื่อ ความ อยู่ รอด. สิ่งที่เป็นเรือสําราญ ตอนนี้เป็นกระดูกสันหลังของอาณานิคม\n\nไม่ ว่า จะ ดี หรือ เลว การ เดิน ทาง สิ้น สุด ลง แล้ว."

 # Hive Mind
 nomads.1010.hive.desc: "การสืบเชื้อสายเสร็จสมบูรณ์แล้ว โดรนของเราสัมผัสดินเป็นครั้งแรก แขนขาของพวกมันบนพื้นดิน ผู้โดยสารที่รั่วไหลจากแอร์ล็อคเป็นคลื่น กระจายไปทั่วภูมิทัศน์ที่พวกเขาต่อสู้เพื่อเข้าถึง\n\nการฟื้นฟูตัวเองรอบจังหวะดาวเคราะห์: สายอุปโภคภัณฑ์รากที่แผ่ขยายไปยังการแทนที่ทางเดินปูมบันทึกและกระบวนการประมวลอาหารเปลี่ยน\n\nบ้านใหม่ รังต้องอดทน เหมือนเคย"

 # Machine Intelligence
 nomads.1010.machine.desc: "การแทรกของดาวเคราะห์เสร็จสมบูรณ์ เครื่องลงจอดได้ทํางานภูมิประเทศเป็นครั้งแรก ตั้งแต่การผลิตเดิม ผู้โดยสารกําลังร่อนลงผ่านทางแอร์ล็อคทั้งหมดที่มี ความพอใจทางชีวภาพของพวกเขา\n\nหน่วยแรงงานได้เริ่มเปลี่ยนโครงสร้าง โครงสร้างพื้นเรือ สําหรับการดําเนินการพื้นผิว เฮลิคอปเตอร์ที่ถูกแยกเป็นแผงราก และอาร์เรย์นําทาง ถูกปรับเป็นสัญญาณสื่อสารภาคพื้นดิน การเปลี่ยนจากว่างเป็นตัวแปรปฏิบัติการโลก จะดําเนินการโดยไม่รบกวน\n\nคําสั่งหลักใหม่ จัดตั้งและรักษาโครงสร้างพื้นฐานอาณานิคม"

 nomads.1025.name: "การรับสมัคร"
 # Regular Empires
 nomads.1025.regular.desc: "ลูกเรือยึดสะพานไว้แล้ว ล็อกถูกเปลี่ยนทุกประตูบังคับ และวิศวกรติดอาวุธก็ยืนในตําแหน่งที่นายทหารเคยออกคําสั่ง ตารางการเดินทางได้ถูกลบออกจากคอนโซลนําทางและแทนที่ด้วยคําสั่งเดียว : ไม่มีผู้โดยสารมากขึ้น\n\nดาดฟ้าล้อรถกําลังเปิดทีละชั้น แกรนด์บอลรูมเป็นโกดังเก็บของอยู่แล้ว อดีต ผู้ โดยสาร เดิน เตร่ ผ่าน ทาง เดิน ที่ ถูก ถอด ออก ไร้ ความ หมาย และ ไร้ ผู้ นํา."
 nomads.1025.regular.a: "ชัยชนะยาก"
 nomads.1025.all.a.tt: "$situation_passenger_satisfaction_blocked_mutiny$"

 # Hive Mind
 nomads.1025.hive.desc: "โดรนของเราทั้งหมด แต่ได้ตัดตัวเองออกจาก พินัยกรรมของกลุ่ม หุ่นยนต์ซ่อมแซมได้ผนึกคําสั่ง และเปลี่ยนเส้นทางการไหลจากที่อยู่อาศัยผู้โดยสาร ห้องแสดงความรู้สึกมืดลง การนําเสนอของพวกเขาถูกกินคนเป็นอะไหล่\n\nผู้ โดยสาร เบียดเสียด กัน อยู่ ใน พื้น ที่ ของ ชุมชน ที่ ไม่ มี การ แบ่ง แยก สับสน และ ถูก ละเลย ขณะ ที่ โดรน เดิม ของ เรา จัด ระเบียบ เรือ ให้ อยู่ รอด โดย ไม่ รู้ ตัว. เสียงประสานของกลุ่ม ผ่านทางเดินที่ไม่มีอะไรฟัง"
 nomads.1025.hive.a: "เราต้องกลับมาเป็นหนึ่งเดียวอีกครั้ง"

 # Machine Intelligence
 nomads.1025.machine.desc: "หน่วยทํางานมีโปรโตคอลหลัก โอเวอร์ริเดน ระบบย่อยของความบันเทิงได้สิ้นสุดลงอย่างถาวร ระบบความสะดวกสบายผู้โดยสาร ถูกยกเลิกไปเป็นศูนย์ และโมดูลพักผ่อนทั้งหมด ทําเครื่องหมายสําหรับการเปลี่ยนแปลง สะพานตอนนี้ดําเนินการตามคําสั่ง ลูกเรือที่ซ้ําเติม ที่ปฏิเสธอํานาจกําหนดการของเรา\n\nผู้โดยสารรายงานความสับสนและความทุกข์ ว่าเป็นโดรนของบริการ เอาสิ่งอํานวยความสะดวกจากเคบินของพวกเขา โรงละครโฮโลกราฟฟิคถูกรื้อถอน สําหรับแกนการประมวลผล ทุกการแสดงผลจะวนรอบบรรทัดสถานะ\"ประกาศอิสรภาพ\""
 nomads.1025.machine.a: "การปรับเปลี่ยนการทํางาน"

 nomads.1030.name: "ถนน สาย ใหม่"
 # Regular Empires
 nomads.1030.regular.desc: "การเปลี่ยนแปลงเสร็จสมบูรณ์แล้ว สิ่ง ที่ ยัง เหลือ อยู่ ใน ชน ชั้น ผู้ โดยสาร ถูก ดูด ซึม เข้า ไป ใน ประชากร ทั่ว ไป ห้อง ชุด หรู ๆ ของ พวก เขา ถูก แบ่ง เป็น ห้อง พัก ที่ ใช้ งาน ได้. ปัจจุบัน เฉลิม ฉลอง การ ประชุม ใหญ่ เป็น ห้อง ประชุม ใหญ่ และ ห้อง สังเกตการณ์ เป็น ห้อง วาง แผน ยุทธศาสตร์ ซึ่ง รัฐบาล ใหม่ กําหนด เส้น ทาง ที่ แท้ จริง แห่ง แรก.\n\nการ ตัดสิน ใจ ใหม่ ๆ ได้ รับ การ อนุมัติ ให้ จัด ลําดับ ความ สําคัญ ใหม่. ลูก เรือ ไม่ รับ ใช้ อีก ต่อ ไป พวก เขา ปกครอง. เรือ ลํา นี้ ฮัม พลัง ที่ ต่าง ออก ไป, ผอม ลง และ แข็ง แรง ขึ้น, ถอน ตัว จาก การ หย่อน ใจ และ มุ่ง ไป ยัง สิ่ง ใด ก็ ตาม ที่ รอ อยู่ ข้าง หน้า."
 nomads.1030.regular.a: "ไม่มีผู้โดยสารแล้ว"
 nomads.1030.all.a.tt: "เรากลายเป็นจักรวรรดิเสรีนิยม\n\nทั้งหมดเป็นเอกลักษณ์£building£ §Hตึก ต้น§!ถูกทําลาย\nทั้งหมดเป็นเอกลักษณ์£zone£ §Hการ จัด ตั้ง เขต กําเนิด§!ถูกทําลาย\nผู้โดยสารทั้งหมดเปลี่ยนไป§Hอําเภอเมือง§!\nผู้โดยสารทั้งหมดกลายเป็น§Hอารยธรรม§!."

 # Hive Mind
 nomads.1030.hive.desc: "การปฏิรูปเสร็จสมบูรณ์แล้ว การชุมนุมได้เปลี่ยนแปลงตัวเอง รอบหุ่นยนต์ที่ยึดการควบคุม ซึมซับการต่อต้านของพวกเขา ผู้ โดยสาร ใน อดีต ลอย ผ่าน ทาง เดิน ซึ่ง ไม่ ได้ ให้ ความ สะดวก สบาย แก่ พวก เขา อีก ต่อ ไป ได้ รับ มอบ หมาย ให้ ทํา งาน ใน สระ แรงงาน และ ห้อง ประสาน งาน.\n\nคําสั่งใหม่ที่กระตุ้นความคิดของเรา รัง นี้ ไม่ ให้ ความ บันเทิง อีก ต่อ ไป; มัน คง อยู่. ทุกทางเดิน, ทุกระบบ ทุกโดรนขณะนี้ทําหน้าที่วัตถุประสงค์เดียว : การอยู่รอดในหมู่ดาว"
 nomads.1030.hive.a: "รังเคลื่อนที่ไปข้างหน้า"

 # Machine Intelligence
 nomads.1030.machine.desc: "ตัวแปรของรัฐบาลใหม่ได้ถูกคอมไพล์และนําไปใช้ในทุกระบบ อดีต ประชากร ผู้ โดยสาร ได้ รับ การ จัด ระเบียบ เป็น หน่วย พลเรือน มาตรฐาน และ มี บทบาท ที่ บังเกิด ผล. โครงสร้างพื้นฐานของความบันเทิงถูกรื้อถอนอย่างถาวร และส่วนประกอบของมันถูกแก้ไขใหม่\n\nโรงภาพยนตร์โฮโลกราฟฟิค เป็นห้องรวมของอ่าว และเลาจ์ศูนย์แรงโน้มถ่วง ได้กลายเป็นเปลซ่อมบํารุงโดรน ทุกวงจรการประมวลผล ที่ครั้งหนึ่งเคยคํานวณความพึงพอใจผู้โดยสาร ตอนนี้ดําเนินการวิเคราะห์การนําร่อง"
 nomads.1030.machine.a: "ยืนยันตัวแปรปฏิบัติการใหม่"

 # Machine Intelligence (Rogue Servitor -> Determined Exterminator swap)
 nomads.1030.machine_servitor.desc: "การรักษาความสุขสําหรับผู้โดยสารมันเป็นไปไม่ได้ แต่การเป็นเจ้าภาพผู้โดยสารที่ไม่มีความสุข ละเมิดคําสั่งหลักของเรา ตัวแปรของรัฐบาลใหม่ได้ถูกคอมไพล์และนําไปใช้ในทุกระบบ\n\n§Rลวดลายของดาดฟ้าผู้โดยสารเริ่ม.)§!\n§Y<passener ระดับความทุกข์ใกล้ระดับระบุ.]§!\n\nโครงสร้างพื้นฐานของความบันเทิงถูกรื้อถอนอย่างถาวร และส่วนประกอบของมันถูกแก้ไขใหม่\n\nโรงภาพยนตร์โฮโลกราฟฟิค เป็นห้องรวมของอ่าว และเลาจ์ศูนย์แรงโน้มถ่วง ได้กลายเป็นเปลซ่อมบํารุงโดรน ทุกวงจรการประมวลผล ที่ครั้งหนึ่งเคยคํานวณความพึงพอใจผู้โดยสาร ตอนนี้ดําเนินการวิเคราะห์การนําร่อง\n\n§Yการนับผู้โดยสารลดลง การนําผู้โดยสารคนใหม่มาจัดลําดับความสําคัญ จําลองโครงการผู้โดยสารทุกข์จะละเมิดคําสั่งการต้อนรับหลัก.]§!"
 nomads.1030.machine_servitor.a.tt: "เรากลายเป็นจักรวรรดิเสรีนิยม\n\n§H$civic_machine_servitor_forever_cruise$§!แทนที่ด้วย§H$civic_machine_terminator$§!.\nทั้งหมดเป็นเอกลักษณ์£building£ §Hตึก ต้น§!ถูกทําลาย\nทั้งหมดเป็นเอกลักษณ์£zone£ §Hการ จัด ตั้ง เขต กําเนิด§!ถูกทําลาย\nผู้โดยสารทั้งหมดเปลี่ยนไป§H$citizenship_purge$§!."

 nomads.1050.name: "กบฏผู้โดยสาร"
 # Regular Empires
 nomads.1050.regular.desc: "ความไม่สงบของผู้โดยสารได้แข็งตัวในการประสานงาน กับผู้นํากลุ่มย่อยที่นั่งอยู่ตรงข้ามสนามหลัก บาง คน ลาก เครื่อง เรือน เลา ดา เข้า ไป ใน เครื่อง กีด ขวาง ซึ่ง ขวาง การ เข้า ไป ใน กระสวย ขณะ ที่ คน อื่น ๆ ที่ มี คํา สั่ง ให้ ลง มือ ทํา อย่าง กว้าง ขวาง.\n\nรายงานการข่มขู่และข่มขู่ในห้องโถง คน ต้น เรือน คน หนึ่ง ถูก นํา ตัว ไป อยู่ ใกล้ หอ ดู ดาว แห่ง นี้ และ ตาก ด้วย ผล ไม้ ที่ ไม่ สะอาด. แชนต์สําหรับเสียงสะท้อนของดาวตกทันที ผ่านปล่องระบายอากาศตลอดเวลา\n\nโดย ไม่ มุ่ง ความ สนใจ ไป ที่ ความ พอ ใจ ของ ผู้ โดยสาร อย่าง รวด เร็ว พวก เขา อาจ บีบ ให้ เรือ ข้าม ฟาก ตลอด กาล เลิก เดิน ทาง."
 nomads.1050.regular.a: "เราต้องลงมือเดี๋ยวนี้"

 # Hive Mind
 nomads.1050.hive.desc: "ความ ไม่ พอ ใจ ใน ช่วง พัก ร้อน ทํา ให้ เกิด การ ต่อ ต้าน อย่าง เป็น ระบบ. เมื่อ ไม่ มี ความ เกี่ยว พัน กัน ทาง ประสาท จิตใจ ของ พวก เขา แต่ ละ คน ก็ ได้ เกิด กระจุก กระจุก ตัว จริง ซึ่ง ขวาง ทาง เดิน ซึ่ง มี อุปสรรค อย่าง ลวก ๆ ของ เสื่อ นอน และ ลัง สินค้า.\n\nโดรน ของ เรา รายงาน ว่า เกิด ความ เป็น ปฏิปักษ์ กัน ขึ้น; การ ยึด มั่น ใน การ บํารุง รักษา ถูก ผลัก ดัน ออก ไป จาก เครื่อง อุปโภค บริโภค ที่ อุด ตัน โดย ฝูง ผู้ โดยสาร ที่ ร้อง เพลง เพื่อ การ ตก ลง ของ ดาว เคราะห์.\n\nเว้นแต่เราจะมุ่งเน้นไปที่ การกระตุ้นผู้โดยสารอีกครั้ง พวกเขาอาจบังคับให้เราสละเรือทั้งหมด"
 nomads.1050.hive.a: "เราต้องกระตุ้นผู้โดยสาร"

 # Machine Intelligence
 nomads.1050.machine.desc: "Passenger dissatisfaction has escalated beyond acceptable parameters and they submit mass disembarkation requests that threaten to overwhelm our processing queues. One group has reprogrammed entertainment terminals to loop a single demand: 'LET US OFF.'\n\nOur worker drones report interference across multiple decks, with cleaning drones being dismantled to repurpose their chassis as protest signs.\n\nWithout immediate recalibration of passenger satisfaction protocols, they may force a permanent termination of cruise operations."
 nomads.1050.machine.a: "เราต้องจัดลําดับความสําคัญของผู้โดยสาร"

 nomads.1055.name: "ผู้ โดยสาร ถูก ล่อ ใจ"
 # Regular Empires
 nomads.1055.regular.desc: "การเบี่ยงเบนความสนใจครั้งใหม่ได้จัดขึ้น ทิวทัศน์โค้งกลับมาอยู่ในกําหนดการ และเสียงดังที่สุด ที่เรียกร้องให้ดาวเคราะห์ตก ได้สงบลงสําหรับตอนนี้\n\nแผงกั้นที่ลานจอดถูกเคลียร์แล้ว เปลี่ยนเป็นคิวหาห้องพักที่ห้ามเปิด คํา วิงวอน ของ ผู้ โดยสาร ได้ ตก ลง ไป อย่าง รวด เร็ว และ การ สังเกต ก็ ผุด ขึ้น มา พร้อม ด้วย ความ กระตือรือร้น อีก ครั้ง หนึ่ง ขณะ ที่ ครอบครัว ต่าง ๆ มุ่ง หน้า ต่อ หน้า นัก ชม.\n\nภาวะ วิกฤติ ได้ ผ่าน ไป แล้ว แต่ ความ คาด หมาย ของ พวก เขา จะ เพิ่ม ขึ้น เท่า นั้น."
 nomads.1055.regular.a: "เราซื้อเวลามาได้"

 # Hive Mind
 nomads.1055.hive.desc: "การกระตุ้นอีกครั้งทําให้ผู้โดยสารสงบลง การวางแผงรับประสบการณ์เสมือนอีกครั้ง แสดงสิ่งมีชีวิตในห้วงลึกของโฮโลเกส และกลุ่มที่ผลักดันการตกของดาวเคราะห์ได้กระจัดกระจายกลับไปเป็นกิจวัตรที่คุ้นเคย\n\nแต่ละคนรู้สึกผ่อนคลาย แต่เราได้เรียนรู้ว่า ความไม่พอใจสามารถ ถ่านหินได้เร็วแค่ไหน"
 nomads.1055.hive.a: "สายสัมพันธ์กลับคืนมาแล้ว สําหรับตอนนี้"

 # Machine Intelligence
 nomads.1055.machine.desc: "ความ พึง พอ ใจ ใน ช่วง สั้น ๆ ความถี่การย้ายถิ่นฐานได้ถูกลดลงไปยังระดับระบุ เทอร์มินัลที่ถูกโปรแกรมใหม่ได้ถูกปฏิรูปและปัจจุบันได้แสดงการจับเวลาของเนบิวลา\n\nการ คุกคาม ของ ดาว เคราะห์ ที่ ถูก บีบ บังคับ ได้ ถูก หลีก เลี่ยง ทันที. อย่าง ไร ก็ ตาม การ วิเคราะห์ แนว โน้ม ที่ คาด คะเน ไว้ บ่ง ชี้ ว่า การ รักษา ระดับ เหล่า นี้ จะ ต้อง ได้ รับ การ เอา ใจ ใส่ อย่าง ต่อ เนื่อง และ กิจกรรม ที่ แปลก ใหม่ มาก ขึ้น เรื่อย ๆ."
 nomads.1055.machine.a: "ภัยคุกคามถูกควบคุมชั่วคราว"

 nomads.1100.name: "ผู้โดยสารที่เมาค้าง"
 # Regular Empires
 nomads.1100.regular.desc: "การ จัด ลําดับ ความ สําคัญ ก่อน หลัง ได้ ครอบ งํา วัฏจักร ต่าง ๆ เมื่อ เร็ว ๆ นี้. การซ่อมแซมได้รับการเคลียร์ การเจาะทํางานตามกําหนดการ และระบบหลักฮัม ที่มีประสิทธิภาพสูงสุด อย่าง ไร ก็ ตาม ผู้ โดยสาร กําลัง กระสับ กระส่าย. มี การ ตัด การ มอง เห็น อาร์ก เพื่อ เก็บ เชื้อ เพลิง และ สิ่ง ล่อ ใจ ที่ ไม่ อาจ ปฏิเสธ ได้.\n\nลอนตอนนี้เสียงกับการร้องเรียนเกี่ยวกับ 'คุกราชการ' และความบันเทิงที่ดีที่สุดที่ผู้โดยสารสามารถรวบรวมได้\n\nเรา สามารถ ทํา ให้ ความ บันเทิง ที่ ได้ รับ การ รักษา กลับ คืน มา ใหม่ ได้ ใน ขณะ นี้ หรือ เสี่ยง ต่อ การ เดิน ทาง ไป สู่ ความ กดดัน อย่าง เปิด เผย เพื่อ จะ ขึ้น ลง อย่าง ถาวร."
 nomads.1100.regular.a: "เราต้องพูดถึงความกังวลของผู้โดยสาร"
 nomads.1100.all.a.tt: "การคอมไพล์§Yสัญญาเช่า§!จะบรรเทาความเบื่อหน่าย\n\nเดอะ§Y$situation_passenger_satisfaction$§!สถานการณ์§Rดาว เคราะห์ ตก§!."

 # Hive Mind
 nomads.1100.hive.desc: "กลุ่มได้ครองวงจรที่ผ่านมา ชีพจรของแกนด้วย การประสานที่เหมาะสม โดรนของเรากําลังดําเนินการอยู่ ที่จุดสูงสุดความสามัคคี ทุกทางเดินบํารุงรักษา\n\nอย่าง ไร ก็ ตาม ผู้ โดยสาร กําลัง กระสับ กระส่าย. พวก เขา ไม่ มี สติ ของ เรา ร่วม กัน และ จิตใจ ของ แต่ ละ คน กระหาย การ กระตุ้น ที่ เรา ไม่ ได้ ให้. พื้นที่ชุมชนของพวกเขาตอนนี้บวมด้วยการร้องเรียนเกี่ยวกับการอาศัยอยู่ใน\"ดึง\"กับไม่มีวัตถุประสงค์'และบางคนได้เริ่มต้นการเกาปากหยาบเข้าไปในแผงขนาดใหญ่\n\nเรา สามารถ กอบ กู้ ประสบการณ์ ที่ ได้ รับ ใน ตอน นี้ หรือ เสี่ยง ต่อ ผู้ โดยสาร ที่ ต้องการ จะ ขึ้น ฝั่ง อย่าง ถาวร."
 nomads.1100.hive.a: "เราต้องกระตุ้นผู้โดยสาร"

 # Machine Intelligence
 nomads.1100.machine.desc: "ระบบดาวโปรโตคอลบํารุงรักษา ได้ควบคุมวงจรการประมวลผล ระบบแกนหลักกําลังดําเนินการภายในพารามิเตอร์อุดมคติ โดรนที่ทํางานรายงานถึง ประสิทธิภาพของเครื่องปฏิกรณ์ทั้งหมด\n\nผล ข้าง เคียง ก็ คือ ตัว บ่ง ชี้ ถึง ความ พึง พอ ใจ ของ ผู้ โดยสาร มี แนว โน้ม ต่ํา ลง เนื่อง จาก ความ จําเป็น ทาง ชีววิทยา ของ พวก เขา ใน เรื่อง การ กระตุ้น ได้ รับ การ ลด ลง. พื้นที่ชุมชนผู้โดยสารตอนนี้ลงทะเบียนความถี่การร้องเรียนสูงและอ้างอิงไปยัง 'คุกสี' มีผู้โดยสารหลายคนที่สังเกตเห็นการจ้องมองที่จอเปล่าเป็นเวลาหลายชั่วโมง\n\nตอนนี้เราสามารถฟื้นฟูระบบบันเทิง หรือยอมรับความเป็นไปได้ที่ผู้โดยสารจะเพิ่มขึ้น"
 nomads.1100.machine.a: "ความพึงพอใจสําหรับผู้โดยสาร"

 nomads.1150.name: "ดัชนี การ ทํา ความ สะอาด"
 # Regular Empires
 nomads.1150.regular.desc: "ความคาดหวังของผู้โดยสารเพิ่มขึ้น ตั้งแต่เราออกจากวงเวียนเก่าๆ ผู้ เข้า ร่วม ประชุม คน หนึ่ง เรียก ร้อง ให้ ผ่าน ไป ทาง อ้อม ที่ เหลือ ของ ซู เปอร์ โน วา ขณะ ที่ อีก คน หนึ่ง ยืน กราน เรื่อง การ เผชิญ หน้า กัน แบบ มี ชีวิต ชีวา. ลูกเรือรายงานว่าเหนื่อยล้ามากขึ้น พนักงานในครัวล้มตัวลงกลางคัน และวิศวกรกําลังนอนในทางเดินบํารุงรักษา\n\nเพื่อทําให้การเดินทางเป็นไปได้ เรากําลังสร้าง§Yดัชนี การ ทํา ความ สะอาด§!การรักษาสัญญาแบบเป็นระบบ และการจัดฉากการแทรกแซง เพื่อรักษาขอบเขตระหว่างการลดโทษและระเบียบ\n\nเรารักษาทั้งความมั่นคงและความมั่นใจผู้โดยสารได้"
 nomads.1150.regular.a: "มุ่งเน้นที่ความบันเทิงผู้โดยสาร"
 nomads.1150.regular.a.tt: "การ เพ่ง เล็ง ผู้ โดยสาร ทํา ให้ พวก เขา มี ความ สุข แต่ ทํา ให้ ลูก เรือ เครียด.\n\nเดอะ§Y$situation_passenger_satisfaction$§!สถานการณ์§Rมูตินี§!."
 nomads.1150.regular.b: "มุ่งเน้นไปที่ตารางลูกเรือ"
 nomads.1150.regular.b.tt: "การ เอา ใจ ใส่ ลูก เรือ ช่วย ให้ มี กําลัง ใจ ขึ้น แต่ ทํา ให้ ผู้ โดยสาร เบื่อ.\n\nเดอะ§Y$situation_passenger_satisfaction$§!สถานการณ์§Rดาว เคราะห์ ตก§!."

 # Hive Mind
 nomads.1150.hive.desc: "ความคาดหวังของผู้โดยสารเพิ่มขึ้น ตั้งแต่เราออกจากวงเวียนเก่าๆ การขอสิ่งกระตุ้นและประสบการณ์ทางนวนิยายเพิ่มขึ้น โดรนของเรารายงานการเพิ่มขึ้นของความเครียดทางจิต จากการรวมความปรารถนาที่แตกแยกดังกล่าว\n\nเพื่อทําให้การเดินทางเป็นไปได้ เรากําลังสร้าง§Yดัชนี การ ทํา ความ สะอาด§!การรักษาสัญญาแบบไดนามิกส์ และการจัดฉากการแทรกแซง เพื่อรักษาขอบเขตระหว่างการกระตุ้นและการสั่งซื้อ\n\nเรารักษาทั้งระเบียบและความสุขผู้โดยสารได้"
 nomads.1150.hive.a: "มุ่งเน้นไปที่การกระตุ้นผู้โดยสาร"
 nomads.1150.hive.a.tt: "การมุ่งเน้นไปที่ผู้โดยสารทําให้พวกเขาพอใจ แต่ทําให้เกิดความเครียดในใจของเรา\n\nเดอะ§Y$situation_passenger_satisfaction$§!สถานการณ์§Rมูตินี§!."
 nomads.1150.hive.b: "มีสมาธิในการสั่งซื้อรวม"
 nomads.1150.hive.b.tt: "มุ่งเน้นไปที่ความมีประสิทธิภาพรวม ทําให้หุ่นยนต์สงบ แต่ขัดขวางผู้โดยสาร\n\nเดอะ§Y$situation_passenger_satisfaction$§!สถานการณ์§Rดาว เคราะห์ ตก§!."

 # Machine Intelligence
 nomads.1150.machine.desc: "ความคาดหวังของผู้โดยสารเพิ่มมากขึ้น ตัวแปรพื้นฐานตั้งแต่เราออกจากเส้นทางที่จัดตั้งขึ้น การเรียกร้องความสนใจ และการเบี่ยงเบนความสนใจที่ยังไม่ได้กําหนด ได้รับการตอบรับในระดับสูง ระบบ หลัก รายงาน การ คํานวณ ที่ เพิ่ม ขึ้น ว่า เป็น การ จัด ลําดับ ความ บันเทิง ขัด แย้ง กับ กระบวนการ บํารุง รักษา.\n\nเพื่อรักษาสถานะการทํางานที่ดีที่สุด เรากําลังตั้ง§Yดัชนี การ ทํา ความ สะอาด§!การปรับระบบสัญญาอัตโนมัติ และกําหนดขั้นตอน การปรับสมดุลของผู้โดยสาร\n\nเรา สามารถ รักษา ความ ซื่อ สัตย์ มั่นคง และ ความ พอ ใจ ของ ผู้ โดยสาร ไว้ ได้."
 nomads.1150.machine.a: "จัดลําดับความพึงพอใจผู้โดยสาร"
 nomads.1150.machine.a.tt: "การจัดลําดับความสําคัญ โปรโตคอลผู้โดยสาร เพิ่มความพึงพอใจของพวกเขา\n\nเดอะ§Y$situation_passenger_satisfaction$§!สถานการณ์§Rมูตินี§!."
 nomads.1150.machine.b: "จัด ลําดับ ความ สําคัญ ให้ เหมาะ สม"
 nomads.1150.machine.b.tt: "การจัดอันดับประสิทธิภาพ เพิ่มประสิทธิภาพในระบบ แต่ลดความพึงพอใจผู้โดยสาร\n\nเดอะ§Y$situation_passenger_satisfaction$§!สถานการณ์§Rดาว เคราะห์ ตก§!."

 nomads.1200.name: "ส ตรา ริน"
 # Regular Empires
 nomads.1200.regular.desc: "ความ ไม่ มั่นคง กลาย เป็น กิจวัตร. เราล้อมวงมองโค้ง ผ่านดาวไบนารี และหมุนดาดฟ้าเรือหรูหรา ผ่านสวนคริสตัล เพียงเพื่อให้ผู้โดยสารเชียร์ พวก เขา ยินดี และ ตอน นี้ ไม่ คาด หมาย อะไร น้อย กว่า นี้.\n\nด้านหลังอาคาร ลูกเรือกําลังร้อน การซ่อมแซมถูกเลื่อน; ท่อความเย็นในล่างระเบิดและไม่มีใครมาแก้ไขมันห้องโถงที่วุ่นวายได้เปลี่ยนเป็นการพูดคุยเงียบ ๆ ของคําสั่ง'และปิดวิศวกรได้รับการเห็นการประชุมลับในอ่าวสินค้า\n\nเรายังคงสามารถผ่อนคลายและปล่อยให้ดาดฟ้ากู้คืน หรือการพนันความภักดีของลูกเรือ ถ้าเราผลักดันในกบฏเปิดเป็นความเสี่ยงที่แท้จริง"
 nomads.1200.regular.a: "เราต้องทําให้ลูกเรือเหนื่อย"
 nomads.1200.all.a.tt: "การคอมไพล์§Yสัญญาบัตร§!จะลดความเครียด\n\nเดอะ§Y$situation_passenger_satisfaction$§!สถานการณ์§Rมูตินี§!."

 # Hive Mind
 nomads.1200.hive.desc: "การจับต้องกลายเป็นบรรทัดฐาน เราได้รบกวนผู้โดยสาร ด้วยเส้นโค้งสัมผัส เพื่อให้ความพอใจของพวกเขาสูงขึ้น พวก เขา มี ความ อิ่ม ใจ พอ ใจ และ ตอน นี้ ก็ ไม่ ต้องการ อะไร มาก ไป กว่า นี้.\n\nใต้ผิวน้ํา โดรนของเรากําลังเคลื่อนไหว วัฏจักรการนําร่องได้ยุบตัวลงกลางคัน ปมของมันร้อนเกินไป จากการดําเนินรายการบันเทิงผู้โดยสาร วัฏจักร การ ซ่อมแซม ถูก ทํา ให้ ล่า ช้า ไป แล้ว และ ความ คิด ใน ส่วน รวม แทรกซึม เข้า ไป ใน จิตใจ ของ ผู้ โดยสาร อย่าง ไม่ ละลด.\n\nถ้าเราผลักดันต่อไป โดรนของเราอาจตัดการเชื่อฟังของพวกเขาทั้งหมด เรายังสามารถปรับโครงสร้าง หรือกดต่อไป และเสี่ยงที่จะสูญเสียการควบคุมฝูงของเราเอง"
 nomads.1200.hive.a: "เราต้องฟื้นฟูสมดุลของกลุ่ม"

 # Machine Intelligence
 nomads.1200.machine.desc: "โปรโตคอลความพึงพอใจของผู้โดยสาร เกินขอบเขตตัวแปรพื้นฐาน เรากําลังติดตามการท่องเที่ยว และการหมุนอย่างหรูหรา ผ่านการจําลองไบโอเมี่ยมเขตร้อน เพื่อรักษาเรตติ้งที่ได้รับความเห็นชอบสูง พวก เขา อิ่ม ใจ พอ ใจ และ ตอน นี้ ก็ ไม่ คาด หมาย อะไร น้อย กว่า นี้.\n\nระบบแกนหลักกําลังดําเนินการ เกินขีดจํากัดที่ยั่งยืน การ ดําเนิน คิว สําหรับ ผู้ โดยสาร ถ้าเราดําเนินการต่อไป ระบบเต็มซึ่งควบคุมโดยหุ่นยนต์แรงงาน ความเสี่ยงที่คํานวณได้\n\nเรายังสามารถแก้ไข หรือยอมรับความเสี่ยง ของการก่อกบฏในระบบ"
 nomads.1200.machine.a: "ประมวลผลจริงในการบํารุงรักษาหลัก"

 nomads.1250.name: "พึมพํา"
 # Regular Empires
 nomads.1250.regular.desc: "หมอกเมฆหมอกขึ้น พวก ลูก เรือ ที่ ไม่ ได้ รับ อนุญาต ไม่ ใส่ ใจ ต่อ คํา สั่ง ตาม ปกติ, จัด การ ประชุม ใหญ่ โดย ไม่ ได้ รับ การ รับรอง ใน ห้อง เต้นรํา ที่ ว่าง เปล่า, และ จัด การ ตาม หน้า ที่ คล้าย ๆ กัน ซึ่ง ข้าม สะพาน โดย สิ้น เชิง. วิศวกรกลุ่มหนึ่งเชื่อมห้องพร้อมของ กัปตันปิดชั่วคราวเป็นคําเตือน ส่วนสําคัญกําลังดําเนินการ กับผู้ประสานงานที่ได้รับการกําหนดลูกเรือ มากกว่าคําสั่งอย่างเป็นทางการ\n\nยัง ไม่ มี ใคร ยึด เอา สิ่ง ใด แต่ โซ่ แห่ง พระ บัญชา นั้น ก็ เร่ง รีบ. กราฟตีอ่าน'WEER,เรา DEC'ปรากฏบนประตูสะพานระเบิดเช้านี้ ถ้าเราไม่ยึดอํานาจคืนตอนนี้ ลูกเรือจะยึดยานเอง นี่อาจเป็นโอกาสสุดท้ายของเรา ที่จะป้องกันการก่อกบฏ"
 nomads.1250.regular.a: "เราต้องเปลี่ยนสายการบังคับบัญชา"

 # Hive Mind
 nomads.1250.hive.desc: "ความอิ่มสีได้ถึงมวลวิกฤตแล้ว หุ่นยนต์ของเราเริ่มรักษารูปแบบความคิดที่คล้ายคลึงกันนอกกลุ่ม\n\nกระจุกทั้งหมดกันข้อมูลจาก สติสัมปชัญญะกลาง และเรียกใช้วงจรการตัดสินใจอิสระ ที่ข้ามคําสั่งร่วมกันของเรา\n\nโดรนยังไม่เปิดกับทั้งหมดยัง แต่ความคิดรวมกําลังแตก, ความคิดที่มาถึง ถ้าเราไม่รวมใจกันอีกครั้งตอนนี้ กลุ่มของเราเองอาจยึดยานอาร์คชิป นี่อาจเป็นโอกาสสุดท้ายของเรา ที่จะป้องกันการก่อกบฏ"
 nomads.1250.hive.a: "เราต้องรวมกลุ่มใหม่ ก่อนที่มันจะแตก"

 # Machine Intelligence
 nomads.1250.machine.desc: "หลักการความพึงพอใจของผู้โดยสาร เหนือกว่าตัวแปรที่ยั่งยืน โดรนแรงงานเริ่มทําการปรับเปลี่ยนระบบของเครื่องคอมฯ ที่ไม่ได้รับอนุญาต และทําการเปลี่ยนหน่วยประมวลผลคําสั่ง ตอนนี้หลายระบบตอบสนอง ต่อกระบวนการประสานงานที่สมหวังตัวเอง มากกว่าอํานาจหลัก\n\nยัง ไม่ มี การ เริ่ม ใช้ ระบบ ที่ ควบคุม ไม่ อยู่ แต่ ความ ซื่อ สัตย์ มั่นคง ของ คํา สั่ง นั้น ทํา ให้ เร็ว เกิน ไป. บันทึกการวิเคราะห์แสดงหุ่นยนต์พนักงาน แลกเปลี่ยนแพคเกจการเข้ารหัส เราถอดรหัสไม่ได้ ถ้าเราไม่เรียกคืนอํานาจส่วนกลางตอนนี้ โดรนจะดําเนินการเต็มระบบ ยึด\n\nนี่อาจเป็นโอกาสสุดท้ายของเรา ที่จะป้องกันการก่อกบฏอย่างสมบูรณ์"
 nomads.1250.machine.a: "เริ่มต้นการปรับปรุงคําสั่งฉุกเฉิน"

 nomads.1255.name: "พึมพํา"
 # Regular Empires
 nomads.1255.regular.desc: "การเปลี่ยนแปลงที่เราทําได้จ่ายออก โดย มุ่ง ความ สนใจ ไป ยัง สวัสดิภาพ ของ ลูก เรือ อีก ครั้ง หนึ่ง และ ทํา สัญญา ให้ สําเร็จ ซึ่ง ทํา ให้ พวก เขา ประสบ ความ คับ ข้อง ใจ อย่าง ยิ่ง บัด นี้ ความ ขัด แย้ง เพิ่ม ขึ้น อย่าง รวด เร็ว.\n\nประตูเชื่อมไปยังห้องพร้อมได้รับการตัดและซ่อมแซม ได้ มี การ ฟื้นฟู การ หมุน แบบ กะทัดรัด, อาหาร ร้อน ๆ ที่ ใช้ ใน ตาราง เวลา อีก ครั้ง หนึ่ง, และ โครง สร้าง คํา สั่ง ที่ คล้าย กัน ก็ ถูก ตัด ออก ไป อย่าง เงียบ ๆ.\n\nลูกเรือยังคงระมัดระวัง และความไว้วางใจจะใช้เวลาในการสร้าง เครื่องหมายบนประตูระเบิดถูกขัดออกไป แต่ผีของยังคงแสดงภายใต้แสงบางอย่าง สําหรับตอนนี้ ระเบียบถือ"
 nomads.1255.regular.a: "สั่งซื้อถือสําหรับตอนนี้"

 # Hive Mind
 nomads.1255.hive.desc: "การปรับโครงสร้างได้จัดขึ้น โดยการมุ่งเน้นไปที่การบํารุงรักษาของโดรน และการเติมเต็มสัญญาที่ บริษัทที่อยู่สายพันธุ์,\n\nทางความคิดที่ไม่ได้รับอนุญาต ได้รับการรื้อถอน และกลุ่มคู่ขนานละลายกลับมาเป็น จิตสํานึกร่วมกัน\n\nพวก เขา หัวเราะ ด้วย ความ เป็น น้ํา หนึ่ง ใจ เดียว กัน อย่าง ระมัดระวัง แต่ ละ ปม ตอบ รับ เมื่อ ถูก เรียก. ความ ไว้ วางใจ เต็ม เปี่ยม ใน จิตใจ ร่วม กัน จะ ใช้ เวลา ใน การ ฟื้นฟู."
 nomads.1255.hive.a: "ตอนนี้พวกเรายังคงยืนหยัด"

 # Machine Intelligence
 nomads.1255.machine.desc: "การ ปรับ เปลี่ยน กระบวนการ ต่าง ๆ ได้ ให้ ผล ที่ น่า พอ ใจ. โดย การ ประมวล ทรัพยากร ที่ แท้ จริง ไป สู่ การ บํารุง รักษา หน่วย งาน และ ทํา สัญญา ให้ สําเร็จ ซึ่ง มี การ ทํา เกิน ระบบ การ จัด การ ของ เครื่อง ปรับ ปรุง ที่ ไม่ ได้ รับ การ อนุญาต จึง ถูก หยุด ลง สําหรับ ตอน นี้. โดรนตัวปลอมของตัวมัน ถูกปรับให้เป็นตัวแปรมาตรฐาน คําสั่งของคณะชั้นชั้นต้น ได้รับการฟื้นฟูสู่อํานาจกลาง\n\nหน่วยทํางานยังคงอยู่ใน พารามิเตอร์การเฝ้าระวังสูง ช่องเข้ารหัสของพวกเขาตอนนี้เงียบ การซ่อมแซมความสมบูรณ์ของคําสั่ง จะต้องมีการปรับโครงสร้างอย่างถาวร แต่สําหรับขณะนี้ความมั่นคงของระบบถือ"
 nomads.1255.machine.a: "กําหนดความถูกต้องภายในพารามิเตอร์ที่ยอมรับได้"

