 concept_arkship_lithoid_consume_world_desc: "ขนาดอาร์ชเรือรบสามารถสั่งซื้อ ที่จะโคจรดาวเคราะห์ และใช้งานฝูงของมันกินมัน$NEW_LINE$เมื่อเริ่มต้น,§Hสถานการณ์§!ติดตามความคืบหน้าการบริโภคและยานอาร์คชิป จะถูกล็อคอยู่ในวงโคจรจนกว่ากระบวนการจะสมบูรณ์$NEW_LINE$ถ้ายานอาร์คชิปออกวงโคจร§Y180 วัน§!ช่วงพระคุณช่วยให้มันกลับมา ถ้า มัน ไม่ กลับ มา ทัน เวลา การ บริโภค ก็ จะ ถูก ทิ้ง.$DOUBLE_NEW_LINE$ระหว่างการโคจร:$TABBED_NEW_LINE$- £minerals£ §Yเหมือง§!, £food£ §Yอาหาร§!และ£pop£ §Yป๊อป§!จะสกัดเป็นระยะ ๆ$NEW_LINE$เมื่อเติมให้สมบูรณ์:$TABBED_NEW_LINE$- โลกเปลี่ยนไปเป็น§Yโลก ที่ ยุ่งเหยิง§!"

 concept_arkship_nanotech_consume_world: "เรือ ข้าม ฟาก: โลก ที่ มืดมน"
 concept_arkship_nanotech_consume_world_desc: "เรือ ข้าม ฟาก ลํา นี้ อาจ ถูก สั่ง ให้ โคจร รอบ ดาว เคราะห์ ดวง หนึ่ง และ ซึมซับ ด้วย นาไนท์.$NEW_LINE$เมื่อเริ่มต้น,§Hสถานการณ์§!ติดตามความคืบหน้าการทํางาน และยานอาร์คชิปจะถูกล็อคอยู่ในวงโคจร จนกว่ากระบวนการจะเสร็จสิ้น$NEW_LINE$ถ้ายานอาร์คชิปออกวงโคจร§Y180 วัน§!ช่วงพระคุณช่วยให้มันกลับมา หาก ไม่ กลับ มา ทัน เวลา กระบวนการ นี้ ก็ ถูก ทิ้ง ไว้.$DOUBLE_NEW_LINE$ระหว่างการโคจร:$TABBED_NEW_LINE$- £nanites£ §Yนาไนท์§!จะสกัดเป็นระยะ ๆ$NEW_LINE$เมื่อเติมให้สมบูรณ์:$TABBED_NEW_LINE$- โลกนี้ถูกเปลี่ยนให้กลายเป็นโลกที่ไม่มีวันเปลี่ยนแปลง"

