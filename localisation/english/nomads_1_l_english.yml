 contract_shoreleave_crew_1: "เลื่อนเก้าอี้ออก"
 contract_shoreleave_crew_1_desc: "[GetShoreleaveCrewDesc1]"
 contract_shoreleave_crew_1_regular_desc: "ลูกเรือต้องการพัก เราจะเทียบท่าและให้เวลาลูกเรือเดินดิน พวกเขาไม่ได้สร้างและเห็นใบหน้าที่พวกเขายังไม่รู้"
 contract_shoreleave_crew_1_gestalt_desc: "การขังเป็นเวลานาน คือการปรับตัวของโดรน การ วน เวียน พวก เขา ผ่าน ถิ่น อาศัย ข้าง ล่าง ข้าม ภูมิ ประเทศ และ สภาพ การณ์ ที่ ไม่ คุ้น เคย จะ ฟื้นฟู ประสิทธิภาพ."
 contract_shoreleave_crew_1_lore_issued: "[GetShoreleaveCrewLoreIssued1]"
 contract_shoreleave_crew_1_regular_lore_issued: "§L\"พื้นดินใหม่ ใบหน้าใหม่ และไม่มีหน้าที่โรสเตอร์คุณอยากได้อะไรอีก?\"§!"
 contract_shoreleave_crew_1_gestalt_lore_issued: "§L\"หินที่ใช้ในการพื้นผิว ภูมิประเทศใหม่ สิ่งกระตุ้นใหม่ ข้อมูลใหม่ เรือไม่สามารถให้สิ่งที่ ดินที่ไม่คุ้นเคยสามารถ.\"§!"
 contract_shoreleave_crew_1_lore_completed: "[GetShoreleaveCrewLoreCompleted1]"
 contract_shoreleave_crew_1_regular_lore_completed: "§L\"แรงโน้มถ่วงผิดและอาหารก็แปลก ฉันไม่สามารถรอที่จะไปกลับ!\"§!"
 contract_shoreleave_crew_1_gestalt_lore_completed: "§L\"เครื่องราชอิสริยาภรณ์กลับมาปรับปรุงใหม่ ภูมิประเทศต่าง ๆ ได้ฟื้นฟูเส้นทางที่ทางเดินของเรือได้น่าเบื่อ.\"§!"
 contract_shoreleave_crew_1_lore_failed: "[GetShoreleaveCrewLoreFailed1]"
 contract_shoreleave_crew_1_regular_lore_failed: "§L\"การลาของชอว์ถูกยกเลิก เรือก็ฮัมเหมือนเดิม มันเคยเป็นการปลอบโยน\"§!"
 contract_shoreleave_crew_1_gestalt_lore_failed: "§L\"Shore deployment cancelled. Drones will continue operating on outdated awareness. Performance degradation remains within acceptable margins.\"§!"
 contract_shoreleave_crew_1_chain_title: "$contract_shoreleave_crew_1$"
 contract_shoreleave_crew_1_chain_desc: "$contract_shoreleave_crew_1_desc$"
 CONTRACT_SHORELEAVE_crew_1_PROJECT: "$contract_shoreleave_crew_1$"
 CONTRACT_SHORELEAVE_crew_1_PROJECT_DESC: ""

 contract_shoreleave_crew_2: "พักโชคดี"
 contract_shoreleave_crew_2_desc: "[GetShoreleaveCrewDesc2]"
 contract_shoreleave_crew_2_regular_desc: "เขตบันเทิงท้องถิ่นเปิดให้บริการธุรกิจ ผลัดกะคนกําลังหมุนดาวเคราะห์ไซด์ เพื่อลองโชคที่ห้องโถงเกมและเวทีผู้ชม"
 contract_shoreleave_crew_2_gestalt_desc: "The settlement's entertainment district offers unfamiliar stimuli. Drones are cycling through the crowds, the games, the spectacle, collecting data to update the ship's own recreational programming."
 contract_shoreleave_crew_2_lore_issued: "[GetShoreleaveCrewLoreIssued2]"
 contract_shoreleave_crew_2_regular_lore_issued: "§L\"ผมเก็บเงินค่ากะไว้ 6 รอบ คืนนี้พวกเขาทั้งหมดไปบนโต๊ะ.\"§!"
 contract_shoreleave_crew_2_gestalt_lore_issued: "§L\"รับบทให้เขตบันเทิง\" วัตถุ: ซึมซับทุกอย่าง ฝูงชน เกม เสียง ทั้งหมดเลย\"§!"
 contract_shoreleave_crew_2_lore_completed: "[GetShoreleaveCrewLoreCompleted2]"
 contract_shoreleave_crew_2_regular_lore_completed: "§L\"ฉันสูญเสียทุกอย่างในหนึ่งชั่วโมงแรก และชนะมันทั้งหมดกลับมาในเกมสุดท้าย ทั้งกะของฉันดําเนินการฉันออก.\"§!"
 contract_shoreleave_crew_2_gestalt_lore_completed: "§L\"เหรียญกลับมาพร้อมรูปแบบใหม่ ระบบการพักผ่อนบนกระดาน ได้ปรับปรุงแล้ว ผู้โดยสารจะสังเกตเห็นความแตกต่าง.\"§!"
 contract_shoreleave_crew_2_lore_failed: "[GetShoreleaveCrewLoreFailed2]"
 contract_shoreleave_crew_2_regular_lore_failed: "§L\"ไม่มีพักโชคดี กลับไปที่ห้องเก็บศพเดิม เครื่องทําเล็บแบบเดียวกัน รางวัลเดียวกับที่ไม่มีใครต้องการ\"§!"
 contract_shoreleave_crew_2_gestalt_lore_failed: "§L\"ไม่มีการเก็บข้อมูลใหม่ การ บันเทิง บน กระดาน ยัง คง ดําเนิน ตาม แบบ เดิม. ผู้โดยสารเติบโตอย่างหงุดหงิด.\"§!"
 contract_shoreleave_crew_2_chain_title: "$contract_shoreleave_crew_2$"
 contract_shoreleave_crew_2_chain_desc: "$contract_shoreleave_crew_2_desc$"
 CONTRACT_SHORELEAVE_crew_2_PROJECT: "$contract_shoreleave_crew_2$"
 CONTRACT_SHORELEAVE_crew_2_PROJECT_DESC: ""

 contract_shoreleave_crew_3: "อุปกรณ์ประมวลผล"
 contract_shoreleave_crew_3_desc: "ร้านค้ากําลังขาดแคลน ทีมลูกเรือจะเดินทางไปยังดาวเคราะห์ ชิ้นส่วนทดแทนแหล่ง วัสดุดิบ และเสบียงของเครื่องทอผ้าของยาน"
 contract_shoreleave_crew_3_lore_issued: "[GetShoreleaveCrewLoreIssued3]"
 contract_shoreleave_crew_3_regular_lore_issued: "§L\"ครึ่งหนึ่งของรายชื่อระหว่างประเทศเป็นชิ้นส่วนอีกครึ่งหนึ่งเป็นขนมที่เราไม่เคยมีตั้งแต่ท่าเรือล่าสุด.\"§!"
 contract_shoreleave_crew_3_machine_lore_issued: "§L\"ครึ่งหนึ่งของรายชื่อระหว่างประเทศ คือตําแหน่งส่วนต่างๆอีกครึ่งหนึ่งเป็นน้ํามันหล่อลื่นช่องสัญญาณเราลดลงสามรอบที่ผ่านมา.\"§!"
 contract_shoreleave_crew_3_lore_completed: "[GetShoreleaveCrewLoreCompleted3]"
 contract_shoreleave_crew_3_regular_lore_completed: "§L\"เรามาเพื่อผู้แทนราษฎร และทิ้งลังต่างๆไว้ ภารกิจสําเร็จ\"§!"
 contract_shoreleave_crew_3_machine_lore_completed: "§L\"เราเรียกตัวจับและกลับมาพร้อมกับแกนประมวลผลส่วนเกิน ผลประโยชน์ : ไม่คาดคิด แต่มีประโยชน์\"§!"
 contract_shoreleave_crew_3_lore_failed: "§L\"ล้างปากซะ ผู้กุมอํานาจเหล่านั้นจะต้องอยู่ต่อไป§!"
 contract_shoreleave_crew_3_chain_title: "$contract_shoreleave_crew_3$"
 contract_shoreleave_crew_3_chain_desc: "$contract_shoreleave_crew_3_desc$"
 CONTRACT_SHORELEAVE_crew_3_PROJECT: "$contract_shoreleave_crew_3$"
 CONTRACT_SHORELEAVE_crew_3_PROJECT_DESC: ""

 contract_shoreleave_crew_4: "สลับเทคโนโลยี"
 contract_shoreleave_crew_4_desc: "วิศวกรท้องถิ่นได้เปิดสถานที่ของพวกเขา สําหรับการตรวจสอบ ทางออกของปัญหาทางวิศวกรรมของพวกเขา แตกต่างกันอย่างมากจากแบบจําลองของเราเอง และท้องถิ่นมีความกระตือรือร้นพอๆ กัน ที่จะศึกษาเรือกอก"
 contract_shoreleave_crew_4_lore_issued: "[GetShoreleaveCrewLoreIssued4]"
 contract_shoreleave_crew_4_regular_lore_issued: "§L\"การออกแบบเตาปฏิกรณ์ของพวกเขา ไม่มีเหตุผลเลยสําหรับผม ฉันต้องเห็นมันด้วยตัวเอง\"§!"
 contract_shoreleave_crew_4_gestalt_lore_issued: "§L\"การออกแบบเครื่องปฏิกรณ์ของพวกเขา ไม่ตรงกับรุ่นใดๆ ในฐานข้อมูลของเรา ให้หุ่นยนต์ตรวจสอบมันโดยตรง.\"§!"
 contract_shoreleave_crew_4_lore_completed: "[GetShoreleaveCrewLoreCompleted4]"
 contract_shoreleave_crew_4_regular_lore_completed: "§L\"กริดไฟฟ้าของพวกเขา ยุ่งเหยิงกับมาตรฐานของเรา แต่มันได้ผล ฉันมีสามหน้าของบันทึกและความเคารพใหม่สําหรับวิศวกรรมสกปรก§!"
 contract_shoreleave_crew_4_gestalt_lore_completed: "§L\"วิศวกรรม เอเลี่ยน เข้าหาแคตตาล็อก ออกแบบมาหลายแบบเพื่อรวมเข้าด้วยกัน วิธีของพวกเขาหยาบ แต่น่าแปลกใจที่มีประสิทธิภาพ.\"§!"
 contract_shoreleave_crew_4_lore_failed: "[GetShoreleaveCrewLoreFailed4]"
 contract_shoreleave_crew_4_regular_lore_failed: "§L\"ไม่มีการแลกเปลี่ยนเทคโนโลยี ฉันจะต้องให้สงสัยว่าพวกเขา เย็นเตาปฏิกรณ์ของพวกเขา โดยไม่ต้องจมความร้อนที่สําคัญ.\"§!"
 contract_shoreleave_crew_4_gestalt_lore_failed: "§L\"ไม่มีการแลกเปลี่ยน วิศวกรรมของเอเลี่ยนยังคงไร้ตัวตน วิธีทําความเย็นของเตาปฏิกรณ์ จะต้องรอคอย\"§!"
 contract_shoreleave_crew_4_chain_title: "$contract_shoreleave_crew_4$"
 contract_shoreleave_crew_4_chain_desc: "$contract_shoreleave_crew_4_desc$"
 CONTRACT_SHORELEAVE_crew_4_PROJECT: "$contract_shoreleave_crew_4$"
 CONTRACT_SHORELEAVE_crew_4_PROJECT_DESC: ""

 contract_shoreleave_crew_5: "แสดงตัวพิมพ์เล็ก- ใหญ่"
 contract_shoreleave_crew_5_desc: "[GetShoreleaveCrewDesc5]"
 contract_shoreleave_crew_5_regular_desc: "การ ตั้ง ถิ่น ฐาน ได้ เปิด โรง มหรสพ สถาน และ เวที สาธารณะ สําหรับ ลูก เรือ."
 contract_shoreleave_crew_5_gestalt_desc: "The settlement has opened its public venues. Drones will deploy to field-test experimental entertainment routines on the local population before rolling them out for passengers."
 contract_shoreleave_crew_5_lore_issued: "[GetShoreleaveCrewLoreIssued5]"
 contract_shoreleave_crew_5_regular_lore_issued: "§L\"ฉันสมัครสําหรับช่องตลก กะทั้งหมดของฉันกําลังมา ถ้าพวกเขาไม่หัวเราะ ฉันจะโอนแผนก\"§!"
 contract_shoreleave_crew_5_hive_lore_issued: "§Lผู้คุมจะมาทุกขั้นตอน มาดริดไม่มีสายพั้นช์ นักกายกรรมออกแบบมาให้ล้มเหลว เราต้องการที่จะเห็นสิ่งที่ทําให้พวกเขาหัวเราะ และสิ่งที่ทําให้พวกเขาออกจาก.\"§!"
 contract_shoreleave_crew_5_machine_lore_issued: "§Lการซ้อนทับดําเนินการผ่านสถานที่ตั้งถิ่นฐานทั้งหมด โมดูลตลก: การตั้งค่าโดยไม่มีหมัด มอดูลอะโครบาติก: ยกเลิกการเมานท์ที่ปรับตั้งให้ล้มเหลว ผู้ชมเฝ้าติดตามการทํางาน.\"§!"
 contract_shoreleave_crew_5_lore_completed: "[GetShoreleaveCrewLoreCompleted5]"
 contract_shoreleave_crew_5_regular_lore_completed: "§L\"ผมเล่าเรื่องตลกเกี่ยวกับปั๊มความเย็นและพันคนแปลกหน้าหัวเราะ ไม่มีใครบนเรือเคยหัวเราะที่หนึ่ง.\"§!"
 contract_shoreleave_crew_5_gestalt_lore_completed: "§L\"ผลลัพท์ โดรนส์นําเสนอกิจวัตรที่ไม่มีการพันสาย และฝูงชนหัวเราะ นัก กายกรรม ที่ ผิด เพี้ยน ดึง เสียง เชียร์ ที่ ดัง ที่ สุด. เราไม่ได้เข้าใจอย่างเต็มที่ แต่ข้อมูลเป็นแรงผลักดัน.\"§!"
 contract_shoreleave_crew_5_lore_failed: "[GetShoreleaveCrewLoreFailed5]"
 contract_shoreleave_crew_5_regular_lore_failed: "§L\"โชว์ยกเลิก ฉันซ้อมมาเป็นเดือนแล้ว การปั๊มความเย็นจะไม่ได้รับความจดจําที่พวกเขาสมควรได้รับ.\"§!"
 contract_shoreleave_crew_5_gestalt_lore_failed: "§L\"ไม่มีการทดสอบภาคสนาม โดรนของเรายืนพร้อมในขั้นตอนที่ว่างเปล่า ข้ามข้อตกลง ผู้โดยสารจะอดทนกับ กิจวัตรอันเหนื่อยล้าของรอบอื่น\"§!"
 contract_shoreleave_crew_5_chain_title: "$contract_shoreleave_crew_5$"
 contract_shoreleave_crew_5_chain_desc: "$contract_shoreleave_crew_5_desc$"
 CONTRACT_SHORELEAVE_crew_5_PROJECT: "$contract_shoreleave_crew_5$"
 CONTRACT_SHORELEAVE_crew_5_PROJECT_DESC: ""

 contract_espionage_support_crew_1: "ระบบดาวรีคอน"
 contract_espionage_support_crew_1_desc: "ความ กังวล เกี่ยว กับ การ แทรกแซง ใน ระบบ นี้ นับ ว่า ถูก ต้อง สม ควร. ดาวเทียมเฝ้าระวัง จะเตือนเราล่วงหน้า ว่าอะไรที่อาจรบกวนกําหนดการของเรา"
 contract_espionage_support_crew_1_lore_issued: "§L\"เราไม่ทราบว่าสิ่งที่ออกมี และนั่นเป็นปัญหาที่แน่นอน ให้ดาวเทียมทํางาน.\"§!"
 contract_espionage_support_crew_1_lore_completed: "§Lอาหารสด ไม่มีอะไรเคลื่อนไหวในระบบนี้ได้ โดยที่เราไม่รู้ก่อน\"§!"
 contract_espionage_support_crew_1_lore_failed: "§L\"ไม่มีดาวเทียม ไม่มีข้อมูล เรากําลังบินผ่านระบบนี้ ด้วยดวงตาของเราปิด.\"§!"
 contract_espionage_support_crew_1_chain_title: "$contract_espionage_support_crew_1$"
 contract_espionage_support_crew_1_chain_desc: "$contract_espionage_support_crew_1_desc$"
 CONTRACT_ESPIONAGE_SUPPORT_crew_1_PROJECT: "$contract_espionage_support_crew_1$"
 CONTRACT_ESPIONAGE_SUPPORT_crew_1_PROJECT_DESC: ""

 contract_espionage_support_crew_2: "การจัดอันดับ"
 contract_espionage_support_crew_2_desc: "การเก็บสิทธิ์และสิทธิ์ในการเข้าใช้ชายแดน สามารถยกเลิกได้โดยไม่ต้องมีคําเตือน ดาวเทียมสอดแนม การสื่อสารของรัฐบาล จะบอกเราได้ว่า การต้อนรับของจักรวรรดินี้ เป็นเรื่องจริงหรือไม่"
 contract_espionage_support_crew_2_lore_issued: "§L\"พวกเขายิ้มเมื่อเราเทียบท่า แต่พวกเขาจะว่ายังไงเมื่อกระสวยยานของเราออกไป ถึงเวลาค้นหาแล้ว\"§!"
 contract_espionage_support_crew_2_lore_completed: "§Lเคเบิลทางการทูตของพวกเขาสะอาด ไม่มีการเคลื่อนไหวที่จะเพิกถอนการเข้าถึง ไม่มีข้อเสนอ ทาริฟ เราสามารถวางแผนสามหยุดถัดไปด้วยความมั่นใจ.\"§!"
 contract_espionage_support_crew_2_lore_failed: "§L\"ไม่มีการตรวจสอบ ไม่มีความเข้าใจ เราจะต้องเชื่อรอยยิ้ม เราไม่ไว้ใจรอยยิ้ม\"§!"
 contract_espionage_support_crew_2_chain_title: "$contract_espionage_support_crew_2$"
 contract_espionage_support_crew_2_chain_desc: "$contract_espionage_support_crew_2_desc$"
 CONTRACT_ESPIONAGE_SUPPORT_crew_2_PROJECT: "$contract_espionage_support_crew_2$"
 CONTRACT_ESPIONAGE_SUPPORT_crew_2_PROJECT_DESC: ""

 contract_espionage_support_crew_3: "ความปลอดภัยบนเส้นทาง"
 contract_espionage_support_crew_3_desc: "กองยานการ เคลื่อน ย้าย, การ เคลื่อน ย้าย ชายแดน, และ การ ก่อ สร้าง ทาง ทหาร ตาม เส้น ทาง ที่ มี การ วาง แผน ไว้ อาจ ทํา ให้ เรือ ลอย อยู่ ใน อวกาศ ที่ เป็น ปฏิปักษ์. ดาวเทียมสอดแนมจะให้เวลานําทางพอ ที่จะวางแผนทางเลือก"
 contract_espionage_support_crew_3_lore_issued: "§L\"เราไม่ได้บินเข้าไปในโซนสงคราม ให้ดาวเทียมทํางาน ก่อนที่เราจะเข้าร่วมเส้นทางนี้.\"§!"
 contract_espionage_support_crew_3_lore_completed: "§L\"กองยานจัดวางผัง ตารางลาดตระเวน การนําร่องได้กําหนดเส้นทางสองเส้นทางแล้ว เราจะไม่ได้รับกล่องใน.\"§!"
 contract_espionage_support_crew_3_lore_failed: "§L\"ไม่มีดาวเทียมในสถานที่ ถ้ามีใครเริ่มก่อสงครามชายแดนตามเส้นทางของเรา เราจะพบว่าเมื่อผู้โดยสารทํา.\"§!"
 contract_espionage_support_crew_3_chain_title: "$contract_espionage_support_crew_3$"
 contract_espionage_support_crew_3_chain_desc: "$contract_espionage_support_crew_3_desc$"
