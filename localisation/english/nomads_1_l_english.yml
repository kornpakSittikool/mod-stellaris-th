 requires_actor_not_nomadic: "$TRIGGER_FAIL$§Rเราคือ§Yจักรวรรดิ โม อาบ§!เราไม่มีพรมแดน§!"
 requires_recipient_not_nomadic: "$TRIGGER_FAIL$§Rพวกเขาคือ§Yจักรวรรดิ โม อาบ§!พวกเขาไม่เชื่อในข้อจํากัดของชายแดน§!"
 not_matching_nomad_regular: "§Rเราและ§Y[From.GetName]§!มี ความ เห็น ไม่ ตรง กัน ว่า ควร เคลื่อน ไหว หรือ ถาวร.§!"

 IS_NOMADIC: "เป็นพวกเร่ร่อนจักรวรรดิ"
 IS_NOT_NOMADIC: "ไม่ ใช่ คน เร่ร่อนจักรวรรดิ"
 IS_NOMADIC_ICON_TIP: "ตัวเลือกนี้ใช้ได้เนื่องจาก$WHO|H$การเป็น§Yภาษาไทยชื่อ§! จักรวรรดิ."
 trait_pc_ark_preference: "คํา แนะ นํา เรื่อง เรือ รบ"
 trait_pc_ark_preference_short: "เรือ รบ"
 trait_pc_ark_preference_desc: "$trait_pc_arctic_preference_desc$"
 nomadic_gov_default: "ภาษาไทยชื่อ$GOV_NAME$"

 toggle_nomad_on: "§H$nomadic_gameplay_title$§! (§Rปิด§!)$NEW_LINE$$ETHIC_GESTALT_CONSCIOUSNESS_NO_TUTORIAL$$NEW_LINE$$nomadic_gameplay_desc$ $DOUBLE_NEW_LINE$§Gคลิกเพื่อเปิดใช้$nomadic_gameplay_title$§!"
 toggle_nomad_off: "§H$nomadic_gameplay_title$§! (§Gเปิด§!)$NEW_LINE$$ETHIC_GESTALT_CONSCIOUSNESS_NO_TUTORIAL$$NEW_LINE$$nomadic_gameplay_desc$ $DOUBLE_NEW_LINE$§Gคลิกเพื่อปิดการใช้งาน$nomadic_gameplay_title$§!"
 nomadic_gameplay_tt: "§H$nomadic_gameplay_title$§!$NEW_LINE$$nomadic_gameplay_desc$"

 nomadic_gameplay_title: "เกมเสรีนิยมชื่อ"
 nomadic_gameplay_desc: "§Rเกม โรมาิก จะ มา แทน ที่ กลไก การ เล่น เกม หลาย ชนิด§!$DOUBLE_NEW_LINE$- ไม่สามารถ['concept_claim']หรือเป็นเจ้าของ£system£ §Hระบบ§!ถึง£planet£ §Hดาว เคราะห์§! $NEW_LINE$- ['concept_colonies']ขอสาบานต่อนาวา ที่แล่นไปอย่างสะดวกสบาย£arkship£ ['concept_arkships']ซึ่งแทนที่ด้วย['concept_shipyards'] $NEW_LINE$- £construction_ship£ ['concept_logistic_ships']แทนที่£construction_ship£ ['concept_construction_ships'] $NEW_LINE$- £waystation£ ['concept_waystations']แทนที่£mining_station£ ['concept_mining_stations']ถึง£science_ship£ ['concept_research_stations'] $NEW_LINE$- ['concept_operational_reserves']แทนที่§H$energy_with_icon$§!ถึง§H$minerals_with_icon$§! $NEW_LINE$- £contract£ ['concept_contracts']อาจดําเนินการเพื่อ£planet£ ['concept_settled_empires'] $NEW_LINE$- ไม่เป็นเจ้าของ£archaeology£ ['concept_archaeology_site',ซาก ปรัก หัก พัง]อาจถูกขุดค้น$NEW_LINE$- ไม่สนใจ§Hกรอบปิด§!ซึ่งทําให้เกิดความไม่สงบ$NEW_LINE$- §H$w_strategic_plural$§!อาจถูกสกัดด้วย$arkship_cap_plural$, $nomads_constructor_plural$และ$waystation_plural$\n\nโมดิไฟร์:\n- ['concept_empire_size']จาก§Hเรือ รบ§!: §G+100%§!\n- ['concept_empire_size']จาก§Hขอบเขต§!: §G+100%§!"

 toggle_nomad_disabled_missing_dlc: "§Rเร่ร่อนหาย DLC§!เกมไร้คนขับต้องการ§Yภาษานอร์เวย์ชื่อ§!ขยาย"
# Voidfarers
 origin_default_nomads: "ผู้ท่องเวิ้งว้าง"
 origin_default_nomads_desc: "สำหรับอารยธรรมนี้ การเดินทางคือจุดหมายปลายทาง พวกเขาละทิ้งการตั้งถิ่นฐานถาวร หันมาใช้ชีวิตบนยานอาร์คชิปขนาดมหึมา พาประชาชน อุตสาหกรรม และความทะเยอทะยานข้ามผ่านหมู่ดาว"
 origin_nomad_tooltip_default_effects: "- ต้นกําเนิดการท่องเที่ยว\n- เริ่มจากเพิ่ม§Hยานปูมบันทึก§!\n"

 START_SCREEN_PART_ONE_DEMOCRACTIC_NOMAD: "หนวดของเราเปิดตัว[Capital.GetName]กับคําถามที่ถูกเขียนลงไปในสัญญาเช่าของเธอมาก : ใครตัดสินใจ? ท่ามกลางกลุ่มต่างๆ, วิสัยทัศน์การแข่งขัน, ความจงรักภักดีและความทะเยอทะยานอันเก่าแก่, คําตอบที่พวกเขาให้ เราทุกคน\n\nเดอะ[Root.GetGovernmentName]ไม่ได้เกิดจากอุดมการณ์เพียงอย่างเดียว แต่จากความเข้าใจที่ยากวอน ว่าไม่มีเสียงใดที่สามารถพูด สําหรับทุกคนที่จะอยู่และตายบนเรือนี้ ผู้ มี อํานาจ ต้อง ได้ รับ ผล กระทบ, ต้อง รับ ผิด ชอบ, และ กลับ ไป หา ผู้ ที่ ให้ การ สนับสนุน.\n\nวันนี้[Root.Ruler.GetRegnalName]คือ[Root.GetRulerTitle]โดย ได้ รับ มอบ หมาย จาก ผู้ คน ที่ รู้ จัก กัน ดี การ ทํา อย่าง นั้น จะ คง อยู่.\n"

 START_SCREEN_PART_ONE_OLIGARCHIC_NOMAD: "เมื่อ[Root.GetGovernmentName]ก่อตั้งคําถามขึ้นมา ไม่ใช่ผู้ที่จะนํา - ไม่ขาดแคลนผู้สมัคร - แต่จะทําให้แน่ใจว่าผู้ที่นําจะคุ้มค่าที่จะติดตาม\n\nคํา ตอบ คือ สภา ไม่ ได้ มา จาก เสียง ดัง ที่ สุด แต่ มา จาก คน เหล่า นั้น ที่ ได้ รับ ตําแหน่ง ของ ตน ที่ โต๊ะ นั้น เดอะ[Capital.GetName]ไม่ เคลื่อน ไหว ตาม คํา พูด ของ คน เดียว และ เธอ ไม่ ลอย ห่าง ไป จาก พระทัย ประสงค์ ของ หลาย คน. เธอ ดําเนิน ชีวิต ตาม ความ เห็น แก่ ตัว ของ คน เหล่า นั้น ที่ แสดง ให้ เห็น ว่า เขา สามารถ ชี้ นํา เธอ ได้.\n\nวันนี้[Root.Ruler.GetRegnalName]ถือหัวเรื่อง[Root.GetRulerTitle]ท่ามกลางคนรุ่นเดียวกัน"

 START_SCREEN_PART_ONE_DICTATORIAL_NOMAD: "เมื่อ[Root.GetGovernmentName]มี การ ตั้ง คํา ถาม ขึ้น มา คํา ตอบ สําหรับ ผู้ ที่ ควร นํา หน้า นั้น ง่าย กว่า คน ส่วน ใหญ่ ยอม รับ ว่า เป็น ผู้ ที่ ทํา ได้.\n\nเดอะ[Capital.GetName]ไม่ช้าสําหรับคณะกรรมการ ใน ช่อง ว่าง ช่อง ว่าง ระหว่าง การ ตัดสิน ใจ ที่ ทํา ใน เวลา ต่อ มา กับ การ ตัดสิน ใจ สาย เกิน ไป นั้น มี การ วัด ชีวิต และ การ หด ตัว ของ เรือ. เดอะ[Root.GetRulerTitle]แบกน้ําหนักเท่านั้น ตอนนี้เรียกร้องโดย[Root.Ruler.GetRegnalName].[Capital.GetName]ย้ายที่ที่พวกเขากํากับเธอ\n"

 START_SCREEN_PART_ONE_IMPERIAL_NOMAD: "ในหมู่ผู้เปิดตัว[Capital.GetName]การอ้างสิทธิความเป็นผู้นําของครอบครัวหนึ่ง ไม่ได้โต้แย้ง อันแรก[Root.GetRulerTitle]มาถึงมีอยู่เพราะพวกเขากําลังยืนอยู่ที่หางเสือ สําหรับคนที่ไม่มีโลกให้กลับไป สายเลือดมีคอนตินเจนซี ประวัติของ[Capital.GetName]และประวัติศาสตร์ของสายที่ เป็นประวัติศาสตร์เดียวกัน วันนี้[Root.Ruler.GetRegnalName]ยืนที่ที่ทุกคน[Root.GetRulerTitle]ก่อน หน้า นั้น พวก เขา ได้ ยืน ขึ้น และ[Capital.GetName]เป็นของพวกเขาตลอดไป\n"

 START_SCREEN_PART_ONE_MACHINE_NOMAD: "เมื่อพวกเรา[Root.GetGovernmentName]เริ่มใช้ระเบียบการของยานอาร์คชิปติก เรือดําน้ําของเราย้ายอย่างไม่เปิดเผย หน่วยเครื่องจักรได้รวมเข้ากับ โครงสร้างและระบบของยานอย่างเต็มที่ ขยายพารามิเตอร์ปฏิบัติการของเรา"

 START_SCREEN_PART_ONE_HIVE_NOMAD: "เดอะ[Root.GetGovernmentName]ปรับตัวตามที่ต้องการ การพัฒนาอย่างรวดเร็ว จากการขังดาวเคราะห์ ไปยังการดํารงอยู่ในอวกาศ โดรนและโหนดของเรา กําลังเจริญรุ่งเรืองอยู่ภายใน ทางเดินที่กว้างใหญ่ของยานอาร์คชิป และระบบนิเวศเทียมที่มีชีวิตชีวา เราคือ[Capital.GetName]เรือรบ และเรือเรือคือเรา\n"
 START_SCREEN_PART_ONE_DEVOURING_SWARM_NOMAD: "เดอะ[Root.GetGovernmentName]ปรับตัวอย่างรวดเร็ว ขับเคลื่อนด้วยความหิวตลอดกาล หุ่นยนต์และโหนดฝูงของเรา เพิ่มขึ้นจากข้อจํากัดของดาวเคราะห์ เพื่อเรียกร้องยานอาร์คชิปเป็นรังใหม่ของเรา\n"

 START_SCREEN_PART_ONE_MEGACORP_NOMAD: "ผู้ก่อตั้งภาพของเรา ได้รับการยอมรับพื้นที่ของตัวเองเป็น ตลาดสูงสุด โดย การ รวม ตัว ทาง ยุทธศาสตร์, การ ได้ มา ซึ่ง ความ ก้าวร้าว, และ การ ลง ทุน ที่ มี กําไร งาม ผู้ นํา ของ เรา ได้ ส่ง เสริม การ เจริญ เติบโต อย่าง เอกซ์โปเนนเชียล และ อัตรา กําไร ที่ ไม่ อาจ บรรลุ ได้.\n\n[Root.Ruler.GetRegnalName]อยู่ในตําแหน่งของ[Root.GetRulerTitle]เพราะบัญชีบอกอย่างนั้น และบนเว็บไซต์นี้[Capital.GetName]บัญชีเป็นคําสุดท้าย\n"

 START_SCREEN_PART_TWO_CIVILIAN_NOMAD_REGULAR: "เดอะ[Capital.GetName]เหนือสิ่งอื่นใด คือเรือของผู้คน วง แหวน กว้าง ๆ ของ เธอ, ตลาด เปิด, และ หอ ประชุม ใหญ่ ที่ มี เสียง ดัง ได้ รับ การ ออก แบบ รอบ ๆ ความ กว้าง เต็ม ที่ ของ[Species.GetAdj]ชีวิต คน รุ่น ที่ ถูก ยก ขึ้น มา ภาย ใน ทางเดิน ของ เธอ ได้ พัฒนา ความ สามารถ ใน การ เดิน ทาง แบบ ไร้ จุด หมาย เกือบ จะ โดย สัญชาตญาณ. นักบินของเราย้ายเรือได้ดีกว่าตัวเอง ทีมตัดไม้ของเรารู้เมื่อเรือหิว ก่อนที่ร้านค้าจะล่ม ตอนนี้ กับ[GetStartingDrive]เมื่อ เปรียบ เทียบ ระหว่าง ดวง ดาว ใน ช่วง สัปดาห์ ต่าง ๆ แทน ที่ จะ เป็น ปี ความ ว่าง เปล่า กลับ เล็ก ลง."
 START_SCREEN_PART_TWO_CIVILIAN_NOMAD_GESTALT: "เดอะ[Capital.GetName]เป็นส่วนขยายของ[Root.GetGovernmentName]ระบบ ทุก ระบบ จะ ได้ รับ การ ดู แล โดย ทาง ตรง; ทุก ๆ ข้อ ผิด พลาด จะ รับ รู้ และ แก้ไข ก่อน ที่ จะ ประกอบ เข้า ด้วย กัน; ทุก วัฏจักร ของ ทรัพยากร ดําเนิน ไป โดย ไม่ เสีย อะไร หรือ ชักช้า. ตอนนี้ กับ[GetStartingDrive]เชื่อมโยงเราระหว่างดาวในสัปดาห์กว่าปี สิ่งที่เสมอเป็นส่วนหนึ่งของเรา ได้รับในที่สุดช่วงเพื่อพิสูจน์มัน"

 START_SCREEN_PART_TWO_MILITARY_NOMAD: "เดอะ[Capital.GetName]ถูกสร้างขึ้นเพื่อปกป้องสิ่งที่เธอพกพา ชั้นในของเธอทํางานลึก ดาดฟ้าอาวุธของเธอจะพร้อม[Species.GetAdj]และระเบียบวิกฤตของเธอได้รับการปรับปรุง หลายศตวรรษของการทํางานเลนศัตรู, ออกวิ่งหรือออกต่อสู้ วินัยนี้ทรงรูปป้อมปราการการบินและมีสิ่งประดิษฐ์ของ[GetStartingDrive]กาแล็คซี่จะรู้พลังของเรา"

 START_SCREEN_PART_TWO_SCIENCE_NOMAD: "เดอะ[Capital.GetName]ออกแบบไว้รอบๆ ห้องแล็ปของเธอ มี การ วาง แผน จะ ใช้ ท่อ ส่ง ไฟฟ้า, การ กระจาย น้ํา, กระทั่ง การ จัด ที่ พัก อาศัย ด้วย ซ้ํา. บอร์ดเธอ เส้นระหว่าง โอเปอเรเตอร์และนักวิทยาศาสตร์ ไม่เคยค่อนข้างถือ โล่ของเรา[GetTechnicianPlural]เข้าใจฟิสิกส์ของอุปสรรคที่พวกเขารักษา และลูกเรือซ่อมของเราสามารถร่างการออกแบบใหม่ เดอะ[GetStartingDrive]ให้[Capital.GetName]ช่วงที่เครื่องมือของเธอสมควรได้รับเสมอ เราตั้งใจจะมองใกล้ๆ"

# Heirs of the Khan

 origin_heirs_of_the_khan: "พาหนะ ของ ข่าน"
 origin_heirs_of_the_khan_desc: "$cannot_settle$\nเมื่อในแถวต่อไปของคาแนต เผ่านี้ถูกโค่นล้มด้วยการทรยศ โดย การ ทรยศ จาก คน เหล่า นั้น ที่ พวก เขา ถือ ว่า เป็น ญาติ ตอน นี้ พวก เขา ติด ตาม พวก ไฮเปอร์เลนส์ ฐานะ เป็น นัก ท่อง เที่ยว รวบ รวม กําลัง ของ ตน จน ถึง วัน หนึ่ง ก็ ได้ รับ ความ โปรดปราน."
 origin_heirs_of_the_khan_effects: "- ต้นกําเนิดการท่องเที่ยว\n- ไล่ตามไปเรื่อยๆ§Rศัตรู§!เรือ มาร์ วาร์ เด อร์\n- อาจกลายเป็นข่าน ถ้าพวกเขารอด\n- สร้างได้§Yแชมป์§!ดวงดาว"

 START_SCREEN_HEIRS_OF_THE_KHAN: "ตราบใดที่ยังมีคาแนตอยู่ ตระกูลของเราก็อยู่ที่นั่น เราอยู่ที่นั่นเพื่อชัยชนะ การต่อสู้ที่ยิ่งใหญ่ การเพิ่มขึ้นและล่มสลายของข่าน\n\nดัง นั้น เมื่อ ถึง เวลา ที่ จะ ตั้ง ชื่อ คาน ใหม่ เรา ก็ ก้าว ไป ข้าง หน้า เพื่อ อ้าง ว่า บัลลังก์ ที่ เรา ช่วย เป็น ผู้ ปลอม. นี่ เป็น ช่วง เวลา ที่ เรา จะ ถูก ทรยศ แต่ เรา กลับ ถูก ทรยศ.\n\nพันธมิตรที่สนิทที่สุดของเรา ทําให้เผ่าอื่นต่อต้านเรา ผู้อาวุโสของเราถูกฆ่า ความฝันที่เราหลั่งเลือดเพราะถูกขโมย\n\nแม้แต่ตอนนี้ พวกที่ปล้น ก็ส่งผู้บังคับพวกมันมาตามล่าเรา ราวกับว่าการดํารงอยู่ของเรา ทําให้กฎที่ขโมยมาผิด เราเป็นแค่เศษซากของเชื้อสายที่ภูมิใจ ถูกตามล่าและกระจัดกระจาย\n\nเมื่อพวกเรากลับมา การแก้แค้นของเราจะอ่อนลง ในไฟแห่งความโกรธของเรา"

 NAME_Hunter_Marauders: "Executioners"
 NAME_Hunting_Fleet: "Headsmen's Axe"
 NAME_Khan_Aspirant: "Khan Aspirant"

 nomads.506.name: "นักล่าสิ่งอํานวยความสะดวก"
 nomads.506.desc: "นับตั้งแต่เราถูกเนรเทศ เราได้รอคอยการติดตามการส่งสัญญาณ มีนักล่าเงินรางวัลในหางของเราและพวกเขามี§Y[capital_scope.GetName]§!ในสายตาของพวกเขา การตายของเราจากการเนรเทศ จะเหมาะกับการขโมย\n\nเราต้องทําให้พวกเขาผิดหวัง"
 heirs_battlestations: "การ สู้ รบ"
 heirs_battlestations_desc: "พลังงานทั้งหมดเพื่ออาวุธ ขอให้พวกเขาต้อนรับเย็น"
 heirs_evasive_actions: "การกระทําเพื่อการอพยพ"
 heirs_evasive_actions_desc: "พลังงานทั้งหมดต่อเครื่องยนต์ ปล่อยให้พวกเขากินพื้นที่ฝุ่นของเรา"

 HEIRS_HUNTERS_HAVE_SPAWNED_TITLE: "ล่าเงินรางวัลกองยานพบ"
 HEIRS_HUNTERS_HAVE_SPAWNED_DESC: "เราตรวจพบ มาโรเดอร์กองยานในการไล่ตาม$ARKSHIP|Y$"
 HEIRS_RAID_INTERCEPTED_TITLE: "หมุน & 90กองยานจับภาพได้"
 HEIRS_RAID_INTERCEPTED_DESC: "เราดักจับมาโรเดอร์ได้กองยานใน$SYSTEM|Y$ระบบ สถานีรบ!"

 nomads.546.name: "นักล่าที่แตก"
 nomads.546.desc: "เราได้เอาชนะตัวแทนของผู้ชิงทรัพย์อีกครั้ง พวกเขาจะไม่หยุดมา และครั้งต่อไปพวกเขาจะแข็งแกร่งขึ้น ถ้า เรา ทําลาย พอ พวก เขา อาจ ถึง กับ เรียน รู้ ว่า เรา ไม่ ได้ ถูก ลบ ออก ง่าย ๆ.\n\nตราบใดที่[capital_scope.GetName]แมลงวันก็เหมือนกัน เราจะสอนพวกเขาว่า พวกนิติบัญญัติบางคนปฏิเสธที่จะตาย"
 nomads.546.a: "เราต้องเตรียมตัว"

 nomads.555.name: "เอ."
 nomads.555.desc.1: "\"ยืนลง! การนําร่องของเจ้าทําให้เจ้าเป็นมาโรเดอร์ที่แท้จริง การเนรเทศจะต้องถูกสาป เราจะไม่แลกความภูมิใจกันอีกต่อไป ตั้งชื่อค่าธรรมเนียมที่จะสํารองเรา.\" เดอะ[Root.GetSpeciesName]บน§Y[From.GetName]§!ลูกเห็บจากสะพานแตก"
 nomads.555.desc.2: "กองยานศัตรูที่เราเอาชนะได้ ส่งสัญญาณให้ยอมแพ้อย่างรวดเร็ว\n\n\"นั่นพอแล้ว คุณดีกว่าพวกเราในตอนนี้ ตอนนี้สิ่งที่เราจะต้องส่งมอบให้เราเพื่อให้เราสามารถขัดจุดเล็กน้อยนี้ออกจากเรือและย้ายไป.\""
 nomads.555.desc.3: "\"เรายอมแพ้! ได้โปรด! คุณจําเราได้ เราภักดีต่อตระกูลคุณเสมอ การเนรเทศครั้งนี้เป็นเรื่องหลอกลวง บอกเราว่าเราสามารถให้บริการ!\"\n\nกัปตันเรือ§Y[From.GetName]§!ดูใกล้เคียงกับขอบของพวกเขา[Root.Species.GetMouthName]ตัวสั่น"

 nomads.555.a: "เพียงแค่ออกไปจากสายตาของเรา"
 nomads.555.b.1: "เราจะไม่ยอมแพ้"
 nomads.555.b.2: "นี่คือความจริงแห่งความว่างเปล่า ข้างนอกนี่ ไม่มีการยอมแพ้"
 nomads.555.b.3: "ถ้าคุณซื่อสัตย์จริง ๆ คุณจะได้ออกไปกับเรา"
 nomads.555.b.tt: "ทําลายกองยานมาโรเดอร์ซะ"
 nomads.555.c.1: "สินค้าหรือชีวิตของคุณ ทางเลือกเป็นของคุณ"
 nomads.555.c.2: "พิจารณานี้การสัมภาษณ์ของคุณ หายใจครั้งสุดท้ายจะได้เข้าร่วม"
 nomads.555.c.3: "เราต้องการลูกเรือของคุณ"
 nomads.555.c.4: "เราจะส่งหนึ่งในพวกคุณกระเผลก คนต่อไปจะรู้ว่าจะเกิดอะไรขึ้น"
 nomads.555.c.4.tt: "นักล่าคนต่อไปจะล่าช้าไปไม่กี่ปี"
 nomads.555.c.5: "ให้ขึ้นพลเรือเอกของคุณ หรือเราจะขูดพวกเขาออกมาจากซากปรักหักพัง"

 nomads.570.name: "การ ต่อรอง"
 nomads.570.desc.1: "ลูกเห็บที่มีความสําคัญยิ่ง§Y[From.solar_system.GetName]§!ระบบติดตามของเราเติมจอ\n\n\"คุณเต้นได้ดีสําหรับเวลา น่าเสียดายที่มันจบลงด้วยการตายในสายตาของเรา[GetHeirsBargain]"
 nomads.570.desc.2: "น้ํา เสียง ของ เป้า หมาย ที่ เป็น ปฏิปักษ์ ของ เรา ดัง ก้อง ใน เสียง§Y[From.solar_system.GetName]§!ระบบที่เราแสดงอยู่\n\n\"การไล่ล่าสิ้นสุดลงที่นี่ การเนรเทศ เรามีเป้าหมายล็อคเตาปฏิกรณ์ของคุณ[GetHeirsBargain]"
 nomads.570.desc.3: "มาโรเดอร์ ไกฟส์แทรกซึมการแสดงหลักของ§Y[capital_scope.GetName]§!ขณะที่กองยานของนักล่า ออกจากไฮเปอร์เลน\n\n\"คุณบินคมชัดสําหรับการเนรเทศ แต่คุณถูกบรรจุอยู่ในกรง[GetHeirsBargain]"
 nomads.570.bargain.1: "เซ็นเซอร์ของเราไม่แน่นอน การให้เครดิตอย่างใจกว้าง อาจช่วยให้เราอ่านผิด""
 nomads.570.bargain.2: "หมอบลง ส่งผู้นําของคุณ คู่ที่ขาวสะอาด[Species.GetName]กับ[Ruler.Species.GetName]ถ้าพวกเขาแพ้ เราจะยิงคุณ""
 nomads.570.bargain.3: "พูดตามตรงนะ สัญญาชีวิตของคุณ แทบจะไม่คุ้มค่ากับกระสุน ยื่นข้อเสนอที่ดีกว่า หรือตายแบบถูกๆ""

 nomads.570.a: "คุณพูดมากสําหรับคนตาย[Species.GetName]."
 nomads.570.b: "เราจะจ่ายค่าผ่านทางให้"
 nomads.570.c: "ของเรา[Owner.GetRulerTitle]ไม่กลัวเจ้า!"
 nomads.570.c.tt.1: "$tt$มาโร เด อร์กองยานหมุน§Rศัตรู§!."
 nomads.570.c.tt.2: "มาโร เด อร์กองยานปล่อยเราอยู่คนเดียว"
 nomads.570.d: "เราจะซื้อสัญญาของคุณ"

 heirs_khan_candidate_title: "กลอง แห่ง สงคราม"
 heirs_khan_candidate_desc: "ได้เวลาแล้ว ข่านใหม่จะถูกประกาศ เพื่อยุติการเนรเทศ เราต้องพิสูจน์ตัวเอง"
 heirs_khan_rally_point_name: "สนามรบ"
 heirs_khan_rally_point_desc: "ระบบที่เลือกสําหรับการต่อสู้ ที่จะตัดสินว่า ใครเป็นข่านต่อไป"
 heirs_khan_in_waiting_name: "คานในการรอ"
 heirs_khan_in_waiting_desc: "เรือธงของคาน ถ้าเราเอาชนะมันได้ เราจะยึดบัลลังก์"
 nomads.600.name: "ผู้ อ้าง สิทธิ์"
 nomads.600.desc: "คนขี้ขลาดที่เนรเทศพวกเรา กําลังเคลื่อนไหว\n\nเดอะ§Y[marauder_heir.GetName]§!มารวมกันเพื่อแต่งตั้งศัตรูของเรา ให้เป็นข่านใหม่\n\nถ้าการเนรเทศของเราจะสิ้นสุดลง มันจะต้องสิ้นสุดตอนนี้ เรามีเวลา 10 ปี ที่จะท้าทายพวกเขาก่อนหน้านี้[From.Species.GetSpeciesNameInsult]การรวมพลังของพวกเขา และตลอดไป ทําให้มรดกของเราแปดเปื้อน\n\nกําหนดเส้นทางสําหรับ§Y[marauder_rally_point.GetName]§!!"
 nomads.600.a: "สัญญาใหม่ กู้บัลลังก์"

 nomads.605.desc: "กองเรือใหญ่รออยู่§Y[solar_system.GetName]§!อวดดีกับชื่อ§Y$NAME_Chosen_of_the_Great_Khan$§!.\n\nหาก ปราศจาก ความ เพ้อ ฝัน เสียง ที่ คุ้น ตา ก็ ทํา ให้ เรา ประหลาด ใจ:\n\n\"แล้วคนที่ถูกขับไล่ กล้าที่จะกลับมา? ไม่มีความเหมาะสมที่จะตายคนเดียวในความมืด ลืมและอับอาย? แล้วเราจะเสร็จสิ้นคุณตัวเอง.\"\n\nขณะที่พวกช็อเซน มีอํานาจในอาวุธของพวกเขา พวกมารูดของเราที่เหลือ ยึดไว้มั่น จะ ไม่ มี ผู้ ใด ละเมิด ใน การ สู้ รบ เช่น นั้น เลย ไม่ ว่า ใคร ใน พวก นั้น จะ เป็น ผู้ นํา ข่าน \""
 nomads.605.a: "รักษาบัลลังก์ของเรา"

 nomads.610.name: "การแก้ไข"
 nomads.610.base: "ความเงียบเหนือสะพานบัญชาการของเราแตกเป็นระเบิดของข้อความใน ชนเผ่าที่ชุมนุมต้อนรับ แชมป์ใหม่ของพวกเขาในการก่อจลาจล"
 nomads.610.desc: "$nomads.610.base$และด้วยการสาบานอย่างแข็งขัน\n\nเราทําได้แล้ว บัลลังก์เป็นของเรา"
 nomads.610.a: "ให้เสียงกลองของสงคราม"
 nomads.610.a.tt: "กลายเป็นข่านใหญ่ ออกจากสหพันธรัฐและชุมชนกาแล็กติก"
 nomads.610.b: "ยุคข่านจบลงแล้ว ให้ เรา แสดง ให้ คุณ เห็น สิ่ง ที่ การ เนรเทศ สอน เรา."
 nomads.610.b.tt: "ตระกูลที่มารวมตัวกัน กลายเป็นบ่อน้ําของเรา"
 nomads.610.c: "การแก้แค้นได้รับการบริการ พวกคุณที่เหลือไปเถอะ"
 nomads.610.c.tt: "ทิ้งพวกมาราเดอร์ไว้กับเครื่องมือของตัวเอง"

 nomads.615.desc: "$nomads.610.base$.\n\nอย่าง ไร ก็ ตาม ยัง ไม่ จบ. มีผู้ลี้ภัยคนอื่นๆ ที่อ้างสิทธิในบัลลังก์ โดย กฎหมาย และ ประเพณี พวก เขา ต้อง ท้าทาย เรา ภาย ใน สาม ปี หรือ ไม่ ก็ อยู่ ใน สภาพ ที่ ถูก ขับ ออก ไป ตลอด กาล."
 nomads.615.a: "ปล่อยให้พวกเขามา"

 nomads.620.name: "ความ สําคัญ"
 nomads.620.desc: "ได้เวลาแล้ว คู่แข่งขี้ขลาดของเรายอมแพ้แล้ว ผู้ปล้นคนอื่น ๆ ทั้งหมดได้รับการจัดการ พลังของเผ่าต่าง ๆ อยู่ข้างหลังเรา\n\nในที่สุด เราก็ได้นั่งบัลลังก์อย่างถูกต้อง"

 nomads.625.name: "ผู้ควบคุมบัลลังก์"
 nomads.625.desc: "ระหว่างทางไป§Y[marauder_rally_point.GetName]§!เราได้รับข่าวที่บด คู่แข่งได้ตีเราไปยังเหมืองของเรา ข่านคงพ่ายแพ้ ตอนนี้[From.GetName]ยึดบัลลังก์\n\nตามธรรมเนียม เราต้องเอาชนะยานลํานั้นภายใน 3 ปี หรือสละสิทธิในการปกครอง"

 nomads.630.name: "การอ้างอิงสูญหาย"
 nomads.630.desc: "หลังจากความพ่ายแพ้ของเรา§Y[From.GetName]§!เราต้องสละการอ้างสิทธิของเรากับคาแนต ทั้งหมดที่เราทําได้ตอนนี้ คือมองคนอื่นยึดบัลลังก์"

 nomads.635.name: "การ ตาย ของ ข่าน"
 nomads.635.desc: "ข่านอันรุ่งโรจน์ของเรา[From.GetName]เมื่อผ่านไปไม่นานนี้ และตามประเพณีแล้ว เราต้องสละอํานาจที่มาพร้อมกับบัลลังก์ พันธมิตรมาโรเดอร์ของเรา ได้หยุดการส่งกองเรือพาวเวอร์เพื่อช่วยเหลือเรา\n\nตอนนี้เราต้องตัดสินใจว่า จะทํายังไงกับกาแล็กซี่อื่นๆ อีกมากมายที่จะไม่คุ้นเคยกับประเพณีของเรา"
 nomads.635.a: "ตาม ประเพณี เป็น ความ จริง เรา จะ เลิก คิด เรื่อง ต่าง ๆ."
 nomads.635.a.tt: "ปลดปล่อยวิชาทั้งหมด แต่ได้รับความเชื่อถืออย่างกว้างขวาง\n\nให้การควบคุมฐานดาวทั้งหมด ส่งมันกลับไปที่การควบคุมเพื่อน"
 nomads.635.b: "เดอะ[Root.GetName]คานนท์เป็นนิรันดร์!"

 nomads.700.name: "ใน การ แสวง หา การ แก้ แค้น"
 nomads.700.desc: "ซากศพของเผ่าที่ปล้นสะดมของเรา ได้มาหาเรา ดู เหมือน ว่า หลัง จาก บ้าน ของ เรา พัง ลง พวก เขา ก็ พอ ใจ ที่ จะ ลืม พวก เรา ที่ ถูก เนรเทศ. คําร้องขอของพวกเขาง่าย ๆ\"จงนั่งที่ของแกรนด์ข่าน และเผาชื่อชนชาติของเรา ให้เป็นดาวของทุกคนที่ทําผิดเรา\"\n\nแม้จะมีขนาดเล็กกว่ากองเรือแกรนด์คาแนตใด ๆ ที่เหมาะสม แต่สิ่งที่พวกเขาเสนอเป็นทุกอย่างที่เราเคยต้องการ ทั้งหมดที่เราต้องทํา คือประกาศกาแล็กซี่ทั้งหมด ศัตรูของเรา"

 nomads.700.a: "ให้เสียงกลองของสงคราม!"
 nomads.700.b: "เราไม่สนใจ ไปหาไอ้โง่คนอื่น"

 marauder.750.2.desc.low_kills: "เฮ้! นี่ใคร? คุณบินเรือจากตระกูลดาวามัคอื่น ๆ แต่ดูอ่อนแอ เกิดอะไรขึ้น? สูญเสียกองเรือในการพนันของคุณหรือไม่"
 marauder.750.2.desc_01: "ถ้าไม่ได้ dokwaks โปรดของเรา! เฮ้! คุณดีกว่าคนที่ไล่คุณออก"
 marauder.750.2.desc_02: "เฮ้! นายไม่ใช่พวกบ้าโลก คุณมาที่นี่เรื่องบุกครั้งสุดท้ายเหรอ มีคนส่งแกไป เอาแร่ธาตุกลับมา"
 marauder.750.2.desc_03: "$marauder.20.2.desc_03$"
 marauder.750.2.desc.khan: "เฮ้! เจ้าหมายักษ์มาแล้ว! เร็วเข้า เปิดช่องดีๆ"
 marauder.750.2.desc.overlord: "เฮลลี่! โดกวอค หัวหน้ามาแล้ว เราบินใต้ธงของคุณตอนนี้ คุณต้องการอะไร หัวหน้า"
 marauder.750.2.desc.proven: "เฮลลี่! เรารู้จักคุณ คุณฆ่าดีและยังมีฟัน คุณต้องการอะไร?"

 marauder.750.3.desc.low_kills: "ท่านอาจถูกประชาชนของท่านทอดทิ้ง แต่ก็ไม่ได้เกินการไถ่บาป ในอ้อมกอดของเธอของเวียดใด ๆ ที่สามารถเพิ่มขึ้นถ้าคุณคุ้มค่า"
 marauder.750.3.desc_01: "ยานของท่านกําลังผ่าน ทําให้สตรีผู้ยิ่งใหญ่ของเราผิดหวัง เราจะยื่นคําร้องแทนท่าน"
 marauder.750.3.desc_02: "คุณยังมีชีวิตอยู่? ดีแล้ว เราคิดว่าพวกคุณไม่ได้ถูกสร้างจาก พวกนอกรีตที่ถูกส่งมาตามล่าคุณ\n\nไม่ เราไม่ได้หมายถึงตระกูลเก่าของคุณ เราพูดถึงตัวจริง"
 marauder.750.3.desc_03: "เธอแห่งไวด์ เห็นคุณและรอยยิ้ม คุณอยู่กับเพื่อน ทําไม[marauder_country_3.GetName]ให้กําลังใจคุณวันนี้?"
 marauder.750.3.desc.khan: "โชเซนแห่งเวียด เรา จะ ติด ตาม ท่าน ไป ได้ อย่าง ไร?"
 marauder.750.3.desc.overlord: "นางแห่งเวียดเห็นข้อตกลงนี้ และไม่คัดค้าน เราเป็นของคุณที่จะสั่งการ ความตั้งใจของคุณคืออะไร?"
 marauder.750.3.desc.proven: "คุณได้บินทางยาว นางแห่งเวียดไม่ได้ลืมการทดลองของเจ้า อะไรพาคุณมาหาเรา"

 marauder.750.a: "คุณช่วยเราต่อต้าน[marauder_country_1.GetName]?"
 marauder.750.a.response.2: "เฮลลี่! คุณตลกกวาคัมไม่ คุณอ่อนแอเกินไปสําหรับเรา ชนะการต่อสู้ก่อน ปลูกเขี้ยว แล้วคุณอาจได้รับชื่อ Dokwak"
 marauder.750.a.response.3: "นี่ไม่ใช่เวลา เธอเป็นพวกไวด์ ไม่พอใจคุณ บางทีเมื่อคุณได้ชําระสําหรับการละเมิดก่อนหน้านี้ของคุณ เธอจะเมตตามากขึ้น"
 marauder.750.b: "ได้เวลาแล้ว มาร่วมกับเรา"
 marauder.750.c: "ตอนนี้หรือไม่ช่วยเราหยุดคนหลอกลวง"
 marauder.750.d: "หยุดส่งกําลังเสริมมาให้เรา"
 marauder.750.e: "เราพร้อมที่จะรับกําลังเสริมของคุณอีกครั้ง"

 marauder.755.desc: "อดีตเผ่าของเราปฏิเสธที่จะยอมรับการสื่อสารของเรา เราอยู่กันตามลําพัง"
 marauder.755.desc.khan_pending: "อีกครั้งที่การสื่อสารของเราถูกปฏิเสธ เพื่อตอบโต้ เราเรียกข้อความอัตโนมัติ\n\n\"ข่านยังไม่พร้อมยอมรับการยอมแพ้ของเจ้า กลับมาเมื่อกลองของสงครามได้เป่า.\""
 marauder.755.a: "เราจะทําให้พวกเขายอมรับเรา"

 marauder.760.desc.3_kills: "คุณกล้าติดต่อเราอีกครั้ง?\n\nโชคดีนิดหน่อย เจ้าเดินเท้าเหมือนขุนศึก ความ ว่าง เปล่า ทํา ให้ คน ใจ กล้า และ คน โฉด เขลา อยู่ ใน ระดับ เท่า เทียม กัน. อย่าพลาดโอกาสสําหรับทักษะ"
 marauder.760.desc.10_kills: "เจ้าทําลายการสื่อสารของเราด้วยชื่อของเจ้า และลบหลู่เกียรติของเราด้วยการอยู่รอดของเจ้า จบมันด้วยวิธีที่เหมาะสม คราวหน้าถ้าเราส่งกองยานตามเจ้าไป ช่วยเราตลอดเวลา และปลดเกราะซะ\n\nตายในสงครามเหมือนจริง[Root.Species.GetSpeciesName]."
 marauder.760.desc.20_kills: "ไม่ว่าจะเกิดอะไรขึ้น โมฆะก็ปฏิเสธที่จะเก็บคุณไว้ เราลบคุณออกจากบัญชี เผาธงของคุณ และทําให้ใบหน้าของคุณคนร้ายใน[Root.Species.GetSpawnNamePlural]เรื่องราว ถึงอย่างนั้นก็เถอะ คุณก็ยังเจาะรอยของคุณเข้าไปในรอยของเรา เราส่งฟลอเทียล่า จากนั้นก็ฝูงบิน และตอนนี้ก็อาร์มาดา พวก เขา เริ่ม บ่น ว่า ผู้ ที่ ถูก เนรเทศ เป็น ความ ผิด. การพูดคุยดังกล่าวจบที่นี่\n\nทําไมแกไม่ตาย"
 marauder.760.desc.post_khan_1: "ขอต้อนรับกลับบ้าน เฮียร์ส วันนี้คุณต้องการอะไร"
 marauder.760.desc.post_khan_2: "มีการฆ่าที่น่าประทับใจบ้างไหม เรามีการวิ่งในกับขนาดใหญ่โดยเฉพาะอย่างยิ่งไทยานีกิมันสร้างใหม่เร็วกว่าเลเซอร์ที่จะตัดมันได้"
 marauder.760.desc.post_khan_3: "อา พวกทรยศกลับมา อ่า โทษที นิสัยเก่าๆ วันนี้ดวงดาวพาท่านไปที่ไหน"

 marauder.765.desc.khan_01: "กาแล็คซี่สั่นเมื่ออํานาจของคุณที่ดีข่าน เราจะไปที่ไหนต่อดี"
 marauder.765.desc.khan_02: "ข่าน! ตระกูลร้องเพลงชื่อของคุณในทุกช่องว่าง เรารอคําพูดของคุณ\n\nวันนี้เราจะเผาโลกแบบไหนดี"
 marauder.765.desc.khan_03: "เยี่ยม ข่าน! ให้โอกาสเราแสดงความกล้าหาญของเรา และให้เราพิสูจน์ความภักดีที่แท้จริงของเรา เรา ละอาย ใน วัน ที่ เรา ไล่ ท่าน ออก ไป และ ถ้า เรา ไม่ คู่ ควร กับ การ ไถ่ โทษ ก็ ให้ เรา ตาย ใน ไฟ ที่ ไหม้ หมู่!"

 marauder.765.a: "ถือกําลังเสริมของคุณจนกว่าเราจะเรียกพวกเขา"
 marauder.765.b: "ส่งกําลังเสริมมาให้เรา"

 wg_heirs_call_of_the_satrapies: "เสียง เรียก ของ เครื่อง ดักแด้"
 war_goal_wg_heirs_call_of_the_satrapies: "$wg_heirs_call_of_the_satrapies$"
 war_goal_wg_heirs_call_of_the_satrapies_desc: "สงครามกําลังถล่มกาแล็กซี่ กลองของสงครามได้เป่า และทุกคนจะเป็นสัตปของเรา"
 wg_end_threat_vs_heir_khan: "ภัยคุกคามสิ้นสุด: ข่าน"
 war_goal_wg_end_threat_vs_heir_khan: "$wg_end_threat_vs_heir_khan$"
 war_goal_wg_end_threat_vs_heir_khan_desc: "สงครามกําลังยุติการขยายตัวของข่าน"
 wg_end_threat_vs_heir_khan_accept: "ฆ่าข่านใหญ่ ทําให้ความไม่มั่นคง[From.GetName]"
 might_kill_khan_tt: "นี่อาจจะ§Rฆ่า§!ข่านของเรา!"
