 situation_grand_refurbishment_paused_desc: "การตัดสินใจยังคงอยู่ ความก้าวหน้าการบูรณะจะหยุดลง จนกว่าจะแก้ไขเสร็จ"
 situation_grand_refurbishment_complete.tt: "เรือ รบ§Y[Target.GetName]§!จะได้รับการปรับปรุงอย่างมาก"
 situation_grand_refurbishment_desc: "โครง สร้าง ของ เรือ รบ§Y[Target.GetName]§!ได้รับการประเมินว่าเกินกําหนดสําหรับการซ่อมแซมอย่างละเอียด งานจะดําเนินต่อไปทีละส่วนของ การแบ่งเขตในลําดับ และทําให้ผู้อยู่อาศัยหายไปชั่วคราว\n\nวิธี จัด การ โครงการ จะ กําหนด คุณภาพ ของ ผล ที่ จะ ตาม มา."

