 NAME_Contestant_Fleet: "[event_target:champions_forge_contestant.GetName] Champions"

 nomads.160.desc: "ยินดีต้อนรับสู่ซีเอฟแอล!นี่คือที่ที่ตํานานถูกหลอมขึ้นมา และความฝันของดวงดาวก็จากไป เรา ท่อง ดวง ดาว ทํา ให้ มี อันตราย และ น่า ตื่น ตา ตื่น ใจ แก่ กาแล็กซี ต่าง ๆ ซึ่ง เบื่อ หน่าย ความ ปลอด ภัย และ กิจวัตร.\n\nคุณมองยังไง? นักบินนิมเบิล? ปืนสเปกตรัม? หรือ เพียง แต่ ชิม กําไร และ การ ปรบ มือ? ลงชื่อในวันนี้ และเราจะเปลี่ยนคุณเป็นดารา"

 nomads.100.name: "§Yอองครีฟ:§!แชมป์ฟอร์จไลฟ์!"
 nomads.100a.desc: "อ้า ผู้ท้าชิงที่คุ้นเคยคนหนึ่ง ได้กลับมาออกอากาศอีกครั้ง แต่คุณแพ็คความร้อนใหม่ใด ๆ\n\nผู้ชมของเราและเวทีกาแล็กซี่รอ!"
 nomads.100b.desc: "ยินดีต้อนรับกลับมา ผู้เข้าแข่งขัน สระว่ายน้ําพนันเป็นสีแดงร้อน แฟนคลับจะเงียบกริบมากขึ้น\n\nอยากทําลายสถิติคนดูมั้ย"
 nomads.100c.desc: "ดีดี! ถ้ามันไม่ใช่เครื่องจับเท็จตัวโปรดของเรา เรากําลังเตรียมกองเรือต่อไป...\n\nคุณอยากจัดงานหลักไหม"
 nomads.100.a.invitation: "§Yลงทะเบียน§!สําหรับการแสดงครั้งต่อไป"
 nomads.100.a.stop: "§Yหยุด§!ส่งบัตรเชิญทัวร์นาเมนต์"
 nomads.100.b: "จะเปลี่ยนสถานที่เท่าไหร่"
 nomads.100.b.tt: "$opinion10$\nเราจะมี§Y5 ปี§!เพื่อออกรายการพิเศษ§Yสัญญา§!ออกแบบระบบที่จะเป็นเจ้าภาพเหตุการณ์แฟ้ม CFL ต่อมา"
 hosting_cfl_cooldown_tt: "ใบอนุญาตการแข่งขันแฟ้ม CFL ต่อมาจะมีใน§Y[champions_forge_enclave_country.cfl_cooldown_timer]§!"
 nomads.100.b.reply: "ดูเหมือนเราได้หัวข่าวคนใหม่แล้ว เราทนรอดูไม่ไหวว่าเธอจะเอาอะไรขึ้นบนเวที\n\nพูดง่ายๆก็คือ§Yสัญญา§!สําหรับเราในระบบที่คุณเลือก และเราจะนําการกระทํา!"
 nomads.100.c: "§Yแนะนํา§!เรารอบ."
 nomadic_paragon_cooldown_tt: "§Rเราสามารถขอคําแนะนําอีกครั้ง§Y[root.nomadic_paragon_timer]§!.§!"
 nomadic_paragon_already_hired: "§Rเราจ้างหัวหน้ากองโจรแล้ว§!"
 nomadic_paragon_all_hired: "§Rเดอะ$RT_ETERNAL_CHAMPION$ขาดการติดต่อ§!"
 nomadic_paragon_explanation: "\nเราจะถูกหัวหน้ากองโจรเข้าหา"
 champions_forge_trust_tt: "เราต้องได้รับความไว้วางใจ§Y$RT_ETERNAL_CHAMPION$§!."
 nomads.100.d: "§Yบอกพวกเรามามากกว่านี้§!เกี่ยวกับเหตุการณ์ของคุณ"
 nomads.100.d.reply: "ประมาณทุกไตรมาสของศตวรรษที่จะเป็นตํานานความขัดแย้ง! พวกเขานําเรือของตัวเอง สถานที่การแข่งขันเปลี่ยน และการต่อสู้ไม่เคยทําให้ผิดหวัง!\n\nผู้ ชนะ ได้ รับ รางวัล เกียรติ และ ที่ อยู่ ใน คะแนน ของ เรา.\n\nพลาดสาย และคุณพลาดนัด เราไม่รอ"
 nomads.100.e: "§Yซื้อ§!ข้อมูลการต่อสู้ของคู่แข่งของเรา"
 nomads.100.e.reply: "ข้อมูลการต่อสู้, ร้อนปิดการออกอากาศ! นักวิเคราะห์ของเราได้เจาะทุกคลิป จากงานหมั้นของคู่แข่งคุณ รูปแบบ บอก จุดอ่อน เราส่งมอบพัสดุไป คนยิงของคุณจัดการที่เหลือ"
 cfl_combat_data: "การประลองของแฟ้ม CFL"
 cfl_combat_data_desc: "การวิเคราะห์การหมั้นที่ซื้อมาจาก แชมเปียนฟอร์จ ไลฟ์ ทีมผลิต เปิดโปงรูปแบบการต่อสู้ของคู่แข่งของเรา"

 contract_host_cfl_tournament: "ไม่สนใจระบบดาวสําหรับแฟ้ม CFL ทัวร์นาเมนต์"
 contract_host_cfl_tournament_issuer_desc: "เราซื้อสถานที่จัด สําหรับการแข่งขันแชมเปียนฟอร์จ ไลฟ์ บางทีเราสามารถใช้สิ่งนี้เพื่อประโยชน์ของเรา"
 contract_host_cfl_tournament_desc: "$contract_host_cfl_tournament_issuer_desc$"
 contract_host_cfl_tournament_chain_title: "$contract_host_cfl_tournament$"
 contract_host_cfl_tournament_chain_desc: "$contract_host_cfl_tournament_desc$"
 champions_forge_tournament_ongoing_tt: "$TRIGGER_FAIL$§Rแฟ้ม CFL มีการแข่งขันอย่างต่อเนื่อง เราจะต้องรอ§!"

 nomads.105.name: "เดอะ[from.GetName]" #country - may return as an unknown name
 nomads.105.desc: "แชมป์ฟอจ เอ็นคเลฟ ไม่ยอมตอบเรา"
 nomads.105.desc.unknown: "นอกจากการแปล เมื่อเราแลกเปลี่ยนข้อมูลกับ[From.GetName]สัญญาณไปมืดและพวกเขาปฏิเสธที่จะพูดคุยกับเรา"
 nomads.105.a: "พวกเขากล้าดียังไง"

 nomads.110.desc: "ฉันรู้ว่าคุณมีมันในตัวคุณ!\n\nเราจะติดต่อไป"
 nomads.115.desc: "ทิ้งรางวัลไว้บนโต๊ะเหรอ เสียเวลาเปล่า!\n\nถ้าคุณเปลี่ยนใจ และหาเราเจอแฟ้ม CFL ต้อนรับผู้ชนะเสมอ"

 nomads.120.desc: "หาคนใหม่ให้โรสเตอร์เหรอ นักรบ นักซ่อม นักเดินทาง ไม่ใช่แบบที่คุณลืม และกาแล็กซี่ก็ไม่ค่อยปล่อย ให้มันลอยไกลนัก เราได้พบบางอย่างในการเดินทางของเรา แต่ที่นี่ไม่มีอะไรฟรี เพื่อน จ่ายค่าแมวมองของเรา แล้วฉันจะจัดให้"
 nomads.120.a: "เราสนใจ"

 nomads.125.name: "CFL:การต่อสู้สรุปการทํางานแห้ง"
 nomads.125.desc: "ว่าไง คู่แข่ง การสรุปการต่อสู้ของคุณได้ไปน่าเบื่อ และฉากยุทธวิธีไม่เคยถืออยู่ คู่แข่งใหม่ หลักคําสอนใหม่ของกองทัพเรือ จุดนุ่มเปิดใหม่\n\nนักวิเคราะห์ของเรา ได้เตรียมเอกสารใหม่แล้ว พร้อมกับชื่อของคุณ คําเดียวกัน ขอบกระสุนเดียวกัน เอามั้ย?"
 nomads.125.a: "§Yสร้างใหม่§!การประชุมสรุป"
 nomads.125.b: "ขอผ่านก่อน"

 nomads.255.name: "CFL: The Forge Lights Again"
 nomads.255.desc: "นี่คือแชมเปียนฟอร์จไลฟ์ แหล่งที่มาสูงสุดของกาแล็กซี่ ของการสังเกตและการทําลาย\n\nการลงทะเบียนตอนนี้เปิดสําหรับแฟ้ม CFL ทัวร์นาเมนท์ต่อไปใน§Y[champions_forge_enclave_system.GetName]§! ระบบดาวดินแดนอันรุ่งโรจน์ รอคอย\n\nข้อ เรียก ร้อง ใน เรื่อง:§H[champions_forge_enclave_country.GetCFLFleetSizeRequirement] กองยานขนาด§!.\n\nผู้ชนะรับรางวัล เกียรตินิยม และถ้วยรางวัลแฟ้ม CFL แกรนด์\n\nคุณต้องการปลอมตํานาน? ลงชื่อ\n\nคุณต้องการความสงบและเงียบ? แย่หน่อยนะ!"

 nomads.255.desc.relic: "$nomads.255.desc$\n\nและเราต้องการถ้วยรางวัลนั่นคืน"
 nomads.255.a: "ลงชื่อสิ! เราจะชนะ"
 nomads.255.a.tooltip: "การวิจัยโครงการพิเศษใน§H[capital_scope.solar_system.GetName]§!."
 nomads.255.b: "ถามเราคราวหน้า"
 nomads.255.c: "หยุดส่งบัตรเชิญให้เราได้แล้ว"
 nomads.255.c.tooltip: "คุณสามารถเปิดใช้งานการเชื้อเชิญได้อีกครั้ง โดยการติดต่อ§H$NAME_Champions_Forge_Enclave$§!."
 CFL_NO_TOURNAMENT_TITLE: "ยกเลิกทัวร์นาเมนต์"
 CFL_NO_TOURNAMENT_DESC: "เนื่องจากขาดผู้มีส่วนร่วม§Yแชมป์ฟอร์จไลฟ์!§!ได้ตัดสินใจที่จะยกเลิกการแข่งขันนี้และก้าวต่อไป"

 CHAMPIONS_FORGE_TRAVEL_FLEET_REQ: "ข้อ เรียก ร้อง ใน เรื่อง:§H[event_target:champions_forge_enclave_country.GetCFLFleetSizeRequirement] กองยานขนาด§!."

