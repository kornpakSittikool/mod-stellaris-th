 ap_wanderlust: "วอนเดอร์ลัส"
 ap_wanderlust_desc: "ทุก หน ทุก แห่ง ใน กาแล็กซี มี สิ่ง น่า พิศวง ที่ จะ เห็น และ เรียน รู้."
