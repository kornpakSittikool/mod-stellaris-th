 sm_arkship_sensor_array: "ตัวตรวจจับขั้นสูง"
 sm_arkship_sensor_array_desc: "กระจุก ตัว ของ ตัว รับ แสง จะ ถัก ทอ เข้า ไป ใน เครื่อง บิน เพื่อ ตรวจ ดู ทุก สิ่ง ที่ อยู่ ใน นั้น. ไม่มีอะไรในพื้นที่ใกล้เคียง เป็นที่สังเกตนาน"
 sm_arkship_sensor_array_tt: "$ARKSHIP_ACTION_HEADER$ $TABBED_NEW_LINE$['scripted_action:arkship_deep_scan']"

 sm_arkship_mining_array: "ห้องปฏิบัติการวิศวกรรมโลก"
 sm_arkship_mining_array_desc: "อุปกรณ์ขุดเจาะและสกัดพิเศษ สามารถเจาะเปลือกโลก เพื่อเก็บเกี่ยวสิ่งที่อยู่ภายใน"
