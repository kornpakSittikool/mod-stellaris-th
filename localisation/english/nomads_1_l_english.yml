 nomad_exploration_chain_title: "ไวเดอร์ลูสต์"
 nomad_exploration_chain_desc: "สํารวจ กับ เรือ รบ ของ คุณ เพื่อ ไข กุญแจ และ ได้ รับ ประโยชน์£unity£ §Yเอกภาพ§!:\n- เสร็จสมบูรณ์§H4§!หมวดหมู่:§G+1§!เขตยานอาร์คชิปแลนด์และ§G-10%§! ผู้นำเลื่อนลง\n- เสร็จสมบูรณ์§Hทั้งหมด§!หมวดหมู่:§G+2§!อําเภออาร์เคดแมกซ์§G-20%§! ผู้นำระวังตัวให้ดี§G-10%§!ค่าธรรมเนียม"
 ancient_wonders_modifier: "นัก ท่อง เที่ยว สมัย โบราณ"
 ancient_wonders_modifier_desc: "ร่อง รอย ของ คน เหล่า นั้น ที่ อยู่ ตรง หน้า เรา ทํา ให้ เรา กลัว แต่ ก็ ก่อ แรง บันดาล ใจ ด้วย."
 antique_threat_modifier: "ตัวสํารวจภัยคุกคามแบบโบราณ"
 antique_threat_modifier_desc: "สัตว์ป่าที่ดุร้ายของกาแล็กซี่ ก็น่าสะพรึงกลัวพอๆ กับพวกมัน"
 galactic_landmark_modifier: "นัก ท่อง เที่ยว ชาว กาแลกติก"
 galactic_landmark_modifier_desc: "ถนนเต็มไปด้วยหลักสําคัญ พวก เขา ให้ ที่ หลบ ภัย, การ ชี้ นํา, และ การ แต่ง เรื่อง ราว ของ เรา."
 marauder_modifier: "ที่อยู่ติดต่อของมาโรเดอร์"
 marauder_modifier_desc: "ระบบที่ป่าเถื่อนและดื้อกระด้าง เป็นอันตรายที่จะกําหนด แต่เราพบว่าความสัมพันธ์ ในการใช้ชีวิตร่วมกัน"
 natural_spectacle_modifier: "สภาพแวดล้อมธรรมชาติ"
 natural_spectacle_modifier_desc: "จักรวาลนั้นสวยงาม สําหรับคนที่เต็มใจจะเห็น"
 precursor_modifier: "ผู้ คง แก่ เรียน ด้าน การ ขน ส่ง ล่วง หน้า"
 precursor_modifier_desc: "จากซากปรักหักพังของอารยธรรม เราเรียนรู้ที่จะสร้างอนาคตของเรา"
 space_ecology_modifier: "ผู้ สังเกตการณ์ ด้าน นิเวศ วิทยา แห่ง อวกาศ"
 space_ecology_modifier_desc: "ความว่างเปล่าของฟัวน่ามีชีวิตอยู่อย่างน่าหลงใหล ถ้าความโหดเหี้ยม ความสามัคคี และเราจะหาที่ของเราในความสมดุล"
 enclave_modifier: "ที่อยู่ติดต่อ"
 enclave_modifier_desc: "นัก ท่อง เที่ยว อาจ ไม่ ใช่ นัก ท่อง เที่ยว แต่ พวก เขา รู้ ความ เป็น จริง ของ ชีวิต ที่ ว่าง เปล่า และ อาจ ช่วย ได้ ใน ราคา ที่ ถูก ต้อง."

