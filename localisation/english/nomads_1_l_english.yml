 sm_waystation_pirate_hideout_desc: "พี่น้องของกองขยะที่นี่เพื่อกลับมาดื่มอีกครั้ง ขายการปล้นและเครื่องดื่มของพวกเขา ออกจากผลประโยชน์ของพวกเขา"
