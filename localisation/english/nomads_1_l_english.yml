 sm_arkship_grand_archive: "แฟ้มจัดเก็บขนาดใหญ่"
 sm_arkship_grand_archive_desc: "สถาน ที่ เก็บ รวบ รวม และ แสดง สิ่ง ที่ น่า สังเกต['concept_specimen', แว่นขยาย]เราเก็บสะสมไปทั่วกาแล็กซี่ รวมทั้งสิ่งมีชีวิต§Yขอบเขตพื้นที่§!."

 sm_arkship_engineering_bay: "อ่าว วิศวกรรม"
 sm_arkship_engineering_bay_desc: "การรักษาเรือของขนาดนี้ คือการต่อสู้อย่างต่อเนื่องกับเอนโทรปี ส่วน ต่าง ๆ ถูก นํา กลับ มา ใช้ ใหม่, ระบบ ต่าง ๆ ได้ รับ การ กล่อม เกิน ขีด จํากัด, และ งาน ก็ ไม่ มี วัน สิ้น สุด."

 sm_arkship_beastport: "$sm_beastport$"
 sm_arkship_beastport_desc: "$sm_beastport_desc$"

 sm_arkship_docking_bay: "อ่าวท่าเรือ"
 sm_arkship_docking_bay_desc: "ท่าเรือไม่เคยเงียบ การ จราจร จะ ไหล เข้า มา และ ออก โดย ไม่ หยุด ยั้ง การ เดิน ทาง และ การ เดิน ทาง อย่าง สม่ําเสมอ ซึ่ง ทํา ให้ เรือ รบ นี้ เชื่อม ต่อ กับ กาแล็กซี ที่ กว้าง กว่า."

