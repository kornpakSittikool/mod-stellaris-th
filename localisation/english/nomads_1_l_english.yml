 origin_nomadic_subject: "หมึก"
 origin_nomadic_subject_desc: "ซาก อารยธรรม เร่ร่อน ถูก ทิ้ง ไว้ ให้ ท่อง ดวง ดาว ขณะ ที่ ปกครอง จาก โลก ใหม่."
 origin_tooltip_nomadic_subject_effects: "ไม่มีลูกเล่น"

 make_subject_nomadic_tt: "\nชาว นอร์เวย์['concept_subject']ถูก สร้าง ขึ้น พร้อม กับ สิ่ง ที่ เหลือ§Y$arkship_cap_plural$§!, §Y$nomads_constructor_plural$§!ถึง§Y$waystation_plural$§!."
 convert_logistics_to_construction_tt: "\nทั้งหมด['concept_logistic_ships']การแปลงเป็น['concept_construction_ships']."
 convert_waystations_into_outposts_tt: "\nทั้งหมด£waystation£ ['concept_waystations']ระบบที่ไม่มีเจ้าของถูกแปลงเป็น['concept_outposts']การอ้างเป็นเจ้าของระบบของพวกเขา"
 create_outposts_in_waystation_systems_for_subject_tt: "\nระบบที่ไม่มีเจ้าของทั้งหมด£waystation£ ['concept_waystation']ภายใน$@arkship_subject_settle_outpost_range|Y0$กระโดด§Y[event_target:settled_system.GetName]§!มี['concept_outpost']สร้างขึ้น เรียกร้องการเป็นเจ้าของระบบของพวกเขา สําหรับใหม่ของเรา['concept_subject']."
 create_outposts_in_waystation_systems_for_overlord_tt: "\nระบบที่ไม่มีเจ้าของทั้งหมด£waystation£ ['concept_waystation']ภายใน$@arkship_subject_settle_outpost_range|Y0$กระโดด§Y[event_target:settled_system.GetName]§!มี['concept_outpost']สร้างขึ้น เรียกร้องความเป็นเจ้าของ ระบบของพวกเขาสําหรับเรา"

 decision_nomad_embarkation: "ลบเลเยอร์แล้ว"
 decision_nomad_embarkation_desc: "ดวงดาวเรียก"
 nomad_embarkation_effect: "$nomad_embarkation_empire_effects$ $DOUBLE_NEW_LINE$ $nomad_embarkation_planet_effects$"
 nomad_embarkation_empire_effects: "$EMPIRE_EFFECTS_HEADER$ $TABBED_NEW_LINE$- Choose between:\n$tt$-§PWill cease to be a Settled empire and remaining Colonies will be released as a Subject!§!\n$tt$-§PRelease [Root.GetName] as a Nomadic Subject!§! $TABBED_NEW_LINE$- §YStarbases§! in Owned Systems will be converted into §YWaystations§!."
 nomad_embarkation_planet_effects: "$PLANET_EFFECTS_HEADER$ $TABBED_NEW_LINE$- §Pโลกนี้จะถูกทอดทิ้ง!§!$TABBED_NEW_LINE$- โฆษณา§Y$stripped_planet$§!แก้ไขโครงการหลัก...$TABBED_NEW_LINE$$t$- $MOD_POP_ENVIRONMENT_TOLERANCE$: §R-60%§! $TABBED_NEW_LINE$$t$- $MOD_PLANET_MAX_DISTRICTS_ADD$: §R-2§!"
 nomad_embarkation_effect_short: "['concept_arkship_embark']และกลายเป็น£nomad£ ['concept_nomadic_empire']ยัง คง อยู่['concept_colonies']กลายเป็น['concept_subject']."
 already_embarking: "§Rการเพิกถอนแล้ว§!"

 nomads.4710.name: "การเปลี่ยนชื่อเสร็จสมบูรณ์แล้ว"
 nomads.4710.desc.regular: "ตั้งแต่เรือของเราแรกลงทุนเกินดาวของเรา มีเสมอผู้ที่รู้ว่าจักรวาลเท่านั้น ผ่านการบันทึกผู้ที่เกิดอาศัยอยู่และเสียชีวิต ภายใต้ท้องฟ้าเดียวกัน นั่นเปลี่ยนไปแล้ว\n\nด้วยการเติมเต็ม§Hเรือ รบ§!แรงโน้มถ่วงไม่ได้เป็นอุปสรรคอีกต่อไป และมหัศจรรย์ของจักรวาลที่รอคอย§Y[From.GetName]§!ได้ ให้ สิ่ง ที่ ต้อง ให้ ทั้ง หมด คือ ประชาชน ของ เรา จะ มี ชื่อ, ความ ทรง จํา, และ อนาคต กับ เรา."
 nomads.4710.desc.machine: "เราทําสําเร็จแล้ว§Hเรือ รบ§!หุ่นยนต์ของเราจะไม่ถูกผูกติดกับ[From.GetPlanetMoon]โพรเซสของพวกเขาได้รับการปรับสําหรับฟังก์ชันของดวงดาวมือถือเป็น§Y[From.GetName]§!ถูกรื้อถอนจากโครงสร้างพื้นฐาน และทุกระบบที่จําเป็น ถูกโอนเพื่อส่งเสริมอนาคตมือถือใหม่"
 nomads.4710.desc.hive: "เรา,[event_target:player_country.GetName]ได้เห็นหลายสถานที่ แต่หุ่นยนต์ของเราได้รับการผูกพัน เสมอที่จะตั้งถิ่นฐานโลก ตอนนี้ในยุคของการเดินทางระหว่างดวงดาว กักขังกับระบบเดียวเป็นหนี้สิน เราจะเป็นอิสระ บนเรือใหม่ของเรา§Hเรือ รบ§!ระหว่างนั้น§Y[From.GetName]§!จะ ถูก เก็บ ไว้ และ เก็บ เกี่ยว."
 nomads.4710.desc.regular.doomsday: "$nomads.4710.desc.regular$\n\n$nomads.4710.doomsday_appendix$"
 nomads.4710.desc.machine.doomsday: "$nomads.4710.desc.machine$\n\n$nomads.4710.doomsday_appendix$"
 nomads.4710.desc.hive.doomsday: "$nomads.4710.desc.hive$\n\n$nomads.4710.doomsday_appendix$"
 nomads.4710.doomsday_appendix: "§Y[From.GetName]§!ไฟไหม้อยู่ข้างหลังเรา, กลืนโดยภัยพิบัติที่เรา บอกไว้นาน แต่คนของเราเป็น§Gบันทึก§!ที่สุดท้ายโยนลงไปในลึกบนปีกของ§Hเรือ รบ§!."

 nomads.4710.a.military: "เราจะออกเดินทาง§H$military_arkship_name$§!."
 nomads.4710.embark.tt: "เดอะ§Y[event_target:player_country.GetName]§!จะกลายมาเป็น§Hภาษาไทยชื่อ§!กําลังเริ่มดําเนินการ§Hเรือ รบ§!\n"
 nomads.4710.a.science: "เราจะสํารวจใน§H$science_arkship_name$§!."
 nomads.4710.a.civilian: "เราจะประสบความสําเร็จใน§H$civilian_arkship_name$§!."
 nomads.4710.b: "พวกเขาจะเป็นหัวข้อของเรา"
 embark_create_subject: "\n§Y[from.GetName]§!จะเริ่มดําเนินการ§Hเรือ รบ§!ในฐานะพลเมืองเสรีใหม่§Y[event_target:player_country.GetName]§!.\n"
 embark_leaves_behind_subject: "\nอาณาจักร ที่ สงบ สุข จะ ถูก สร้าง ขึ้น พร้อม กับ สิ่ง ที่ เหลือ['concept_colonies']ถึง['concept_starbases']."
 create_waystations_in_systems_for_nomad_tt: "\nทุกระบบที่เป็นเจ้าของโดยไม่มี§H$waystation$§!ในนั้นมีสิ่งก่อสร้าง"

