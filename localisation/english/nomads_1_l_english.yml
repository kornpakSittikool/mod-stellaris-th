 contract_suntrip_crew_5: "วัฏจักร ของ น้ํา"
 contract_suntrip_crew_5_desc: "นักรีไซเคิลน้ําต้องการ เครื่องทําเชื้อแบบยูวีที่มีประสิทธิภาพเฉพาะในวงโคจรของดวงดาว สปาและสระถูกปิด และน้ําถูกปันส่วน ข้ามระเบียงทั้งหมด"
 contract_suntrip_crew_5_lore_issued: "[GetSuntripCrewLoreIssued5]"
 contract_suntrip_crew_5_regular_lore_issued: "§Lกําลังฝึกสระว่ายน้ํากับสปา ถ้าผู้โดยสารถาม วันนี้เป็นวันทําความสะอาดลึก เราไม่ได้พูดถึง การอ่านของแบคทีเรีย\"§!"
 contract_suntrip_crew_5_gestalt_lore_issued: "§Lกําลังฝึกสระว่ายน้ําและสปา ผู้โดยสารได้รับแจ้งมาว่า เป็นวันทําความสะอาดลึก การอ่านแบคทีเรียถูกระงับ\"§!"
 contract_suntrip_crew_5_lore_completed: "[GetSuntripCrewLoreCompleted5]"
 contract_suntrip_crew_5_regular_lore_completed: "§L\"ถังสํารองเคลียร์ น้ํากําลังไหลอีกครั้ง เติมเต็มสระ ก่อนที่คนอื่นจะร้องเรียนความไม่พอใจอย่างเป็นทางการ\"§!"
 contract_suntrip_crew_5_gestalt_lore_completed: "§L\"ถังสํารองเคลียร์ การระบุคุณภาพน้ํา สระว่ายน้ําและสปาเติมในความคืบหน้า.\"§!"
 contract_suntrip_crew_5_lore_failed: "[GetSuntripCrewLoreFailed5]"
 contract_suntrip_crew_5_regular_lore_failed: "§L\"การตรวจสอบไม่สมบูรณ์\" น้ํา... ก็ยอมรับได้ แค่ให้สปาปิดวันอื่น\"§!"
 contract_suntrip_crew_5_gestalt_lore_failed: "§L\"การตรวจสอบไม่สมบูรณ์\" ขอบน้ําคุณภาพดี ช่องว่างปิดขยายโดยหนึ่งรอบ.\"§!"
