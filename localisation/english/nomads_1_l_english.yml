 contract_suntrip_passenger_2_desc: "นักดาราศาสตร์มือสมัครเล่นในหมู่ผู้โดยสาร ได้พบกิจกรรมของสุริยะที่หาได้ยากในระบบนี้ และกําลังร้องขอการมองด้านหน้าจากวงโคจร"
