 sm_arkship_offspring_outlook: "$sm_offspring_outlook$"
 sm_arkship_offspring_outlook_desc: "โมดูลที่อนุญาตให้ลูกดอกดูแลและกํากับการต่อสู้อย่างต่อเนื่องภายในระบบ ในขณะที่ยังกํากับการดําเนินงานบนยานอาร์คชิป"

