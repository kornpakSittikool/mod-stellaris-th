 nomads.6015.name: "การแก้แฟ้มล้มเหลว"
 nomads.6015.desc: "โมดูลที่เก่ากว่าในเรือชูชีพของเรา เริ่มแสดงอายุของพวกเขา หลังจากที่ล้มเหลวรุนแรง ความเสียหายรุนแรงมาก แต่การปิดตายแบบฉุกเฉิน ถูกกระตุ้นก่อนที่ยานอาร์เจนตินาจะเสียหาย เราควรดําเนินการอย่างไร?"
