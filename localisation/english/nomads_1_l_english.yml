# The Sacred Path + Origin

 origin_sacred_path: "แนว ทาง อัน ศักดิ์สิทธิ์"
 origin_sacred_path_desc: "$cannot_settle$\nพวก นัก ศาสนา เหล่า นี้ เดิน ทาง ไป ตาม เส้น ทาง ที่ ไม่ มี หลัก ฐาน ซึ่ง กําหนด ไว้ โดย พระ คัมภีร์ บรรพบุรุษ ของ พวก เขา. ด้วย ความ ก้าว หน้า ทาง เทคโนโลยี และ ความ เข้าใจ ที่ พัฒนา ขึ้น เกี่ยว กับ กาแล็กซี ต่าง ๆ การ บุกเบิก จะ ยัง คง มี จุด มุ่ง หมาย ไหม?"
 origin_sacred_path_effects: "- ต้นกําเนิดการท่องเที่ยว\n- เขตเรืออาร์เคชั่นยูนีค:['concept_zone_ark_sacred_path_pilgrims']\n- งานพิเศษ:['concept_job_sacred_path_elite'], ['concept_job_sacred_path_specialist'], ['concept_job_sacred_path_civilian']"

 sacred_path: "$origin_the_sacred_path$"
 sacred_path_desc: "$origin_the_sacred_path_desc$"

 sacred_sites_surveyed: "ที่ นั่ง อัน ศักดิ์สิทธิ์"
 sacred_sites_visited_chain_title: "แนว ทาง อัน ศักดิ์สิทธิ์"
 sacred_sites_visited_chain_desc: "The §YSacred Sites§! are marked in the ancestral star charts; wonders of the galaxy, discovered by those who came before us.\n\nIt is our birthright to seek out these places, and find out why they were so important to our ancestors.\n\nAs we forge our path, it may be possible for us to build §YWaystations§! in systems with Sacred Sites."

 SACRED_SITE_ONE_PROJECT: "ที่ นั่ง อัน ศักดิ์สิทธิ์:"
 SACRED_SITE_ONE_PROJECT_DESC: "ข้อ เขียน ของ บรรพบุรุษ พรรณนา ถึง เหตุ การณ์ สําคัญ ที่ เกิด ขึ้น ณ พิกัด เหล่า นี้. เป็น ที่ รู้ จัก กัน ว่า เอ ด วิน ส์ นี่ เป็น ที่ ที่ พวก เขา เริ่ม พิธี เพื่อ นมัสการ พระเจ้า. ว่ากันว่า มันเป็นสถานที่น่าพิศวง การสแกนเริ่มต้น บ่งบอกถึง การเบี่ยงเบนของแม่เหล็ก\n\nเวลาได้แปลมันเปลี่ยนไปมาก แต่เราควรตรวจสอบ ไม่ว่าอย่างไรก็ตาม สําหรับความหมายทางจิตวิญญาณของตัวแปร"

 SACRED_SITE_TWO_PROJECT: "ที่ บริสุทธิ์: ตา"
 SACRED_SITE_TWO_PROJECT_DESC: "ในคําพูดของบรรพบุรุษของเรา มี 'ตาไม่รวมภายใน§Y[this.GetName]§!เข้าใจ เราเข้าใจว่านี่คือการอ้างอิง ของหอดูดาวออร์บิทัล"

 SACRED_SITE_THREE_PROJECT: "Site ศักดิ์สิทธิ์สัตว์ประหลาด"
 SACRED_SITE_THREE_PROJECT_DESC: "ตามข้อความศักดิ์สิทธิ์ของเรา§Y[this.GetName]§!ครั้งหนึ่งเคยเป็นที่ตั้งของวัดโบราณ"

 SACRED_SITE_FOUR_PROJECT: "ซี."
 SACRED_SITE_FOUR_PROJECT_DESC: "บรรพบุรุษของเราจัดขึ้น§Y[this.GetName]§!ในแง่ดี หาก เรา เข้าใจ ข้อ คัมภีร์ อย่าง ถูก ต้อง แล้ว มี บาง สิ่ง ที่ สําคัญ มาก รอ เรา อยู่ ที่ นี่."

 SACRED_SITE_FIVE_PROJECT: "สถาน ศักดิ์สิทธิ์: หน่วยข่าวกรอง"
 SACRED_SITE_FIVE_PROJECT_DESC: "เราตรวจพบสัญญาณประดิษฐ์ ที่มาจากพิกัดนี้ น่าพิศวง, นี่คือที่ที่หนึ่งในที่นั่งอันศักดิ์สิทธิ์ของเราถูกประกาศให้อยู่ สัญญาณมีข้อความรหัส ที่เราได้คัดลอกและแปลเป็นภาษา\n\n\"§Yการเลือกตั้งเป็นการสิ้นสุดแล้ว ชัยชนะอาจเกิดขึ้น§!\""

 SACRED_SITE_SIX_PROJECT: "คํา อธิษฐาน ศักดิ์สิทธิ์: การ หายใจ"
 SACRED_SITE_SIX_PROJECT_DESC: "ตามบันทึกของแอนเซสเตอร์§Y[this.GetName]§!มีดาวเทียมธรรมชาติ ซึ่งทําหน้าที่เป็นที่พักสุดท้ายสําหรับผู้ปกครองของศรัทธาของเรา"

 SACRED_SITE_SEVEN_PROJECT: "สิต ศักดิ์สิทธิ์: ชา เซม"
 SACRED_SITE_SEVEN_PROJECT_DESC: "§Y[this.GetName]§!ผู้เชี่ยวชาญของเรากลัว ตํานานของพวกเขาพูดถึง\"สัตว์อันตรายและมีอํานาจมาก\" ที่ว่า \"ปีศาจในหลุมใต้ผิวน้ํา\""

 SACRED_SITE_EIGHT_PROJECT: "คํา จารึก ศักดิ์สิทธิ์: กระจกเงา"
 SACRED_SITE_EIGHT_PROJECT_DESC: "มีซิตศักดิ์สิทธิ์อยู่ที่นี่ ชื่อแปลคร่าวๆจากภาษาบรรพบุรุษของเรา§Yกระจก§!.\n\nว่ากันว่าขอบเขตระหว่างเครื่องบินสวรรค์ ผอมลงที่นี่ และหนึ่งอาจเผชิญหน้ากับ"

 nomads.2050.name: "ความ ก้าว หน้า อย่าง รวด เร็ว"
 nomads.2050.desc: "หลังจากสํารวจ§Yความ ตื่น เต้น§!, [Root.Owner.GetRulerTitle] [Root.Owner.GetRulerName]ทันใดนั้นก็กลายเป็นคาตาลิคเจ้าหน้าที่ทางการแพทย์ถูกเรียกตัว[Root.Owner.Ruler.GetHerHis]พักบนเรือ§Y[Owner.Capital.GetName]§!แต่เมื่อมาถึง[Root.Owner.Ruler.GetSheHe]หายแล้ว\n\nใน[Root.Owner.Ruler.GetHerHis]ภวังค์[Root.Owner.GetRulerTitle]อ้างว่าได้พูดคุยกับพระเจ้า ผู้ได้รับพระพรในการเริ่มต้นของการแสวงบุญของเรา\n\nนี่คือวันเกิดใหม่ของเรา"
 nomads.2050.a: "เส้นทางของเราได้รับพระพร!"
 nomads.2050.a.tt: "ความดีจะนําทางเรา เหมือนที่พวกเขาทําแอสสเตอร์ของเรา\n\n"
 nomads.2050.b: "ทําการประเมินทางการแพทย์ให้เสร็จ"
 nomads.2050.b.tt: "ความ สงสัย บาง อย่าง ที่ มี สุขภาพ ดี ไม่ ใช่ การ หมิ่น ประมาท.\n\n"

 nomads.2055.name: "ตา"
 nomads.2055.desc: "นี่คือหนึ่งในเว็บไซต์ที่แอนเซสเตอร์ ทําเครื่องหมายไว้นานมาแล้ว หอ ดู ดาว โบราณ ใน วง โคจร§Y[fromfrom.GetName]§!กล้องโทรทรรศน์ที่ตั้งอยู่บนเรื่องห่างไกล\n\nข้อความอ้างว่า พิลกริมบางคน ที่มองผ่านเลนส์ กล่าว กัน ว่า คน อื่น ๆ ร้องไห้ หรือ นิ่ง อยู่ หลาย วัน.\n\nพวกตามองลงไปที่เหวมานานกว่า 2,000 ปีแล้ว เราไม่มีทางรู้ว่าวัตถุที่แท้จริง ของการสังเกตของบรรพบุรุษของเรา"
 nomads.2055.a: "เรามาดูกัน เราอาจเจอเบาะแส"
 nomads.2055.b: "ถอดรหัสหอดูดาว ปล่อยให้อดีตพักผ่อนเถอะ"
 nomads.2055.c: "ดังนั้นมันเป็นกล้องโทรทรรศน์ที่มีประสิทธิภาพ ไม่มีเจ้าของ?"
 the_sacred_eye: "ตา ศักดิ์สิทธิ์"
 the_sacred_eye_desc: "§Lกล้องโทรทรรศน์โบราณเชื่อมโยงเรา กับบรรพบุรุษของเรา§!"

 nomads.2056.name: "โดย ทาง ตา"
 nomads.2056.desc: "มองผ่านกล้องโทรทรรศน์§Y[owner.GetScientistCapital] [sacred_eye_scientist.GetName]§!สังเกตเห็นช่องว่าง ไม่มีดาวในแพทช์ของพื้นที่นี้ ไม่มีแสงสว่าง ไม่มีอะไรเลย อาจ เป็น ได้ ไหม ว่า มี อะไร สัก อย่าง ที่ จะ สังเกต เห็น ได้ ที่ นี่? บรรพบุรุษของเรามองดาว ที่ไม่มีอีกแล้วหรือไม่ เราอาจไม่มีทางรู้\n\nสิ่งที่เรารู้คือไม่มีอะไรถูกแก้ไข และทุกอย่างก็เปลี่ยนไป นี่คือความหมายของการมีชีวิตอยู่ วันหนึ่ง แสงของเราจะหยุดส่องสว่าง และถูกแทนที่ด้วยสิ่งอื่น... ว่าตอนนี้เราอยู่ที่นี่แล้ว เป็นแหล่งของความสุข บางทีนี่อาจเป็นบทเรียนสูงสุด"
 nomads.2056.a: "ความไร้ความสามารถทําให้เราพิเศษ"
 nomads.2056.b: "ไม่ใช่ทุกอย่างจะต้องมีความหมาย"

 nomads.2060.name: "โมนาสเตอรี่"
 nomads.2060.desc: "พิลกริมมารวมตัวกันที่ดาดฟ้าสังเกตการณ์ ข่าวลือแพร่ออกไป นี่คือหนึ่งในสถานที่ ที่บรรพบุรุษของเราบรรยายไว้ว่า§Yความน่าเบื่อของ[fromfrom.GetName]§!แต่คอสเตอร์ว่างเปล่า ที่นี่ไม่มีอะไรเลย นอกจากหินและฝุ่น\n\nมีรายงานเข้ามาจากทุกชั้น เกี่ยวกับเสียงสวดลึกลับ สะท้อนผ่านระบบสื่อสารของเรา มีการคาดเดาจากลูกเรือบางคน ว่าเสียงอาจจะเป็นของบรรพบุรุษของเรา อาศัยอยู่ในบริเวณนี้ของพื้นที่ ในรูปแบบที่ไม่เป็น"
 nomads.2060.a: "การสวดเป็นพระพร รับไว้สิ"
 nomads.2060.b: "ไม่น่าจะใช่ การสื่อสารของเราต้องการการรักษา"

 nomads.2065.name: "ระเบียง"
 nomads.2065.desc: "การเดินทางของเรานําเรามาที่นี่ สถานที่ที่จดจําได้เฉพาะในนิทานโบราณและเพลงอุทิศตน ข้อ คัมภีร์ ต่าง ๆ กล่าว ถึง การ ปรากฏ ตัว ซึ่ง อยู่ ใน ใจ กลาง ของ โลก. ตอน แรก เรา จํา ไม่ ได้ แต่ ขณะ ที่ เรา ใกล้ เข้า มา ความ ทรง จํา ก็ ปรากฏ ออก มา.\n\n§Yระเบียง§!\n\nในขณะที่มีความคิดเห็นที่แตกต่างกัน เกี่ยวกับบทบาทของแครนเดล ในการหล่อหลอมวัฒนธรรมของเรา\n\nอย่าง ไร ก็ ตาม เมื่อ มา ถึง เรา ไม่ พบ วิหาร โบราณ. ไม่มีอนุสาวรีที่ประดับประดา ไม่ มี ร่อง รอย ของ กิจกรรม ที่ เลื่อมใส ใน พระเจ้า ไม่ ว่า ที่ ไหน บน ดาว เคราะห์ ดวง นี้. พวก พิล กริม บน เรือ§Y[root.GetName]§!ตอนนี้ดูที่§Y[Root.Owner.GetRulerTitle] [Root.Owner.GetRulerName]§!สําหรับคําตอบ พวก เขา ถาม ว่า นี่ เป็น การ ทดสอบ ความ เชื่อ ไหม? หรืออํานาจของแครนเดลเป็นเพียงเรื่องเล่า"
 nomads.2065.a: "เราต้องโกหกเพื่อรักษาตํานาน"
 nomads.2065.b: "หน้าที่แรกของเราคือความจริง"
 sacred_substantiation: "การ รับรอง เรื่อง ศักดิ์สิทธิ์"
 sacred_substantiation_desc: "§Lเรารักษาเรื่องราวของบรรพบุรุษของเรา ผูกพันกับศรัทธา§!"
 historical_truth: "ความ จริง ทาง ประวัติศาสตร์"
 historical_truth_desc: "§Lเรายอมรับว่ามีความแตกต่าง ระหว่างความจริงกับประเพณี§!"

 nomads.2070.name: "หน่วยสืบราชการลับ"
 nomads.2070.desc: "การเดาคํา§Y[fromfrom.GetName]§!ลอยโครงสร้างบรรพบุรุษของเรา เคยทําเครื่องหมายบนชาร์ตของพวกเขา ภายในห้องพักที่เงียบสงบของเราค้นพบการปรากฏตัวที่แนะนํา : หน่วยข่าวกรองโบราณได้รับมอบหมายให้ตอบคําถามของผู้ที่วันหนึ่งจะเดินเส้นทางนี้\n\nเวลา ไม่ ใช่ เวลา ที่ จะ แสดง ความ กรุณา แต่ เสียง ของ มัน ก็ ยัง ดัง อยู่. ชิ้นส่วนของคําสั่งรั่วไหลจากผู้เผยแผ่ที่ซ่อน, ครึ่งความจุและความเคารพในโทนสี :\"§Hทําต่อไปตามเธรดที่สว่างไสว... ความมืดระหว่างดาวจะเบาลง§!\"\n\nข่าวสาร ของ คัมภีร์ ไบเบิล มา ถึง ใน เศษ เสี้ยว, วน เวียน, และ ประสาน กับ ข้อ เก่า แก่. แต่ภายใต้ความนิ่งและเสื่อมโทรม ยังคงมีวัตถุประสงค์ มันตั้งใจจะนําทางพวกเรา และบางที ถ้าเราตั้งใจฟังให้ดี มันก็ยังทําได้"
 nomads.2070.a: "เป็นเกียรติแด่เทคโนโลยี"
 nomads.2070.b: "กําจัดสิ่งสกปรกนี้"
 nomads.2070.c: "เอามันไปด้วย บรรพบุรุษ ฉลาด."
 mechsiah_blessings: "พรสวรรค์"
 mechsiah_blessings_desc: "§Lผู้พยากรณ์ AI ได้อวยพรให้เราโชคดี ในภารกิจอันศักดิ์สิทธิ์ของเรา§!"
 d_mechsiah_mainframe: "โครง สร้าง หลัก ของ เชาวน์ ปัญญา"
 d_mechsiah_mainframe_desc: "บรรพบุรุษของเราสืบเชื้อสายทางดิจิตอลของเรา ให้พรกับเราด้วยภาพลวง ไม่ว่าจะเป็นผู้พยากรณ์หรือสัตว์เลี้ยง มันตกเป็นของเราแล้ว"

 nomads.2071.name: "ความฉลาดของหน่วยสืบราชการลับ"
 nomads.2071.desc: "เราได้รับ§Yหน่วยสืบราชการลับ§!ความเมตตาและจากไป[fromfromfrom.GetName]โดยไม่มีอะไรเกิดขึ้น\n\nหน่วยสืบราชการลับจะยังคงอยู่ พินัยกรรมของความสามารถวิศวกรรม ของบรรพบุรุษของเรา และพิสูจน์\n\nเราถูกทําให้ตื่นตาตื่นใจด้วยความเมตตาของมัน และได้เปิดใจของเราไปยังรูปแบบชีวิตทางเลือก"
 nomads.2071.a: "เราเป็นหนึ่งเดียวกับทุกชีวิต"
 nomads.2071.b: "ทุกชีวิตสังเคราะห์เป็นสิ่งศักดิ์สิทธิ์"

 nomads.2072.name: "ระบบสืบราชการลับของมัล"
 nomads.2072.desc: "ในขณะที่เราพร้อมที่จะจากไป[fromfromfrom.GetName].§Yหน่วยสืบราชการลับ§!เริ่ม พูด ออก มา อย่าง น่า ตกใจ ยิ่ง ขึ้น.\n\n\"§Yแบบฟอร์มพฤศจิกายน เป็นงานชิ้นเอก ทุกย่างก้าวจะต้องละลาย! การ กระทํา ที่ ไม่ ถูก ต้อง ไม่ มี ข้อ สงสัย!§!\"\n\n[owner.GetScientistCapital] [mechsiah_plug_scientist.GetName]ถูกบังคับให้ปิดร่างศาสดาเทียมเอง ไม่งั้นเราจะถูกถอดออกจากตําแหน่ง มันยังคงไม่ชัดเจน ว่าหน่วยสืบราชการลับ มีอํานาจแค่ไหน เมื่อเคลื่อนไหว เราเข้าใจการเขียนโปรแกรมน้อยมาก"
 nomads.2072.a: "สิ่งที่ปลอดภัยที่สุด คือระเบิดมันทิ้ง"
 deity_detonators: "เครื่อง วัด ความ ดี"
 deity_detonators_desc: "§Lเราระเบิดเทพเจ้าดิจิตอลของแอนเซสเตอร์§!"
 nomads.2072.b: "ทิ้งมันไปเถอะ"
 nomads.2072.c: "การเชื่อมต่อล้มเหลว กําจัดความฉลาดนี้"

 nomads.2075.name: "การ หายใจ"
 nomads.2075.desc: "เราได้สํารวจ§Y[fromfrom.GetName]§!ที่แห่งความทรงจําอันศักดิ์สิทธิ์ ห้องที่ถูกผนึก เคยถูกใช้โดยผู้แสวงบุญในยุคแรก ๆ เพื่อบันทึกความคิดสุดท้ายของพวกเขา และให้พวกเขากับคริสตัลไซโซนิคหายาก\n\nบัด นี้ ห้อง ใต้ ดิน เต็ม ไป ด้วย การ สะท้อน ด้วย สติ ปัญญา, ความ เชื่อ, และ ความ ยินดี. แต่ ใน ความ ทรง จํา เหล่า นั้น ก็ มี ความ กลัว, ความ เกลียด ชัง, และ ความ สงสัย มา หลาย ศตวรรษ ด้วย.\n\nหาก สมาชิก ของ ประชาคม สามารถ เข้า ถึง ช่วง สุด ท้าย เหล่า นี้ ก็ อาจ ท้าทาย ความ เชื่อ ของ พวก เขา ใน ทาง นั้น."
 nomads.2075.a: "เสียงเหล่านี้ควรจะได้ยินเสียง"
 nomads.2075.a.tt: "นี่อาจส่งเสริม ให้มีจรรยาบรรณมากขึ้น ในประชากรของเรา\n\n"
 nomads.2075.b: "ปิดห้องนิรภัย เราควรไปกันได้แล้ว"
 nomads.2075.b.tt: "นี่อาจส่งเสริม จริยธรรมเผด็จการ ในประชากรของเรา\n\n"
 nomads.2075.c: "ให้เราเพิ่มความคิดของเราเอง ในห้องนิรภัย"
 sealed_vaults: "เห็ด ปิด ผนึก"
 sealed_vaults_desc: "§Lความลับที่อันตรายของบรรพบุรุษของเรา จะยังคงล็อคออกไป§!"
 screaming_void: "กรีดร้องเข้าไปในเวียด"
 screaming_void_desc: "§Lการ หอน แบบ คา ทาร์ ช่วย บรรเทา ความ เจ็บ ปวด ของ เรา.§!"

 nomads.2080.name: "เครื่อง ชา"
 nomads.2080.desc: "บรรพบุรุษของเรา พูดเรื่องจริง มีสัตว์อยู่ใต้ผิว§Y[fromfrom.GetName]§!เราได้รับพรที่ไม่คุกคามเรา ซาก ของ สัตว์ ชนิด นี้ มี ขนาด มหึมา อย่าง น่า ทึ่ง. บิดเบี้ยว ปีก ปกคลุมไปด้วยเกล็ด และด้วยอวัยวะในกระดูก มันเป็นมนุษย์ต่างดาวอย่างแท้จริง\n\nใน ทาง เดิน ใกล้ กับ ทาง เข้า บ่อ น้ํา เรา พบ ข้อ ความ ที่ แกะ สลัก เข้า ไป ใน หิน ถ้ํา. ในภาษาของโบราณ กล่าวว่า\n\n\"§Hเรา, อนุภาคแสง, FOUL BEEEEST จะรุกเข้ามาแทนที่§!\"\n\nเราคาดว่าบรรพบุรุษของเราไม่ได้เตือนเราของสัตว์ แต่ของผลของการทรยศ ร่างของสัตว์ประหลาดนี้ยังเป็นตัวอย่างของความโกรธ"
 nomads.2080.a: "การโกรธคนหากินไม่เคยฉลาดเลย"
 nomads.2080.b: "ไม่มีสิ่งมีชีวิตใดสมควรได้รับชะตากรรมเช่นนั้น"
 nomads.2080.c: "ไม่ว่าบาปของมันจะเป็นอะไร มันสมควรจะได้พักผ่อนอย่างสงบ"
 nomads.2080.c.tt: "เราจะส่งซากสัตว์ไปยังยานอาร์ค ที่ซึ่งมันจะได้รับการพิทักษ์และเคารพ\n\n"
 beastly_remains: "ยัง คง อยู่ อย่าง อันตราย"
 beastly_remains_desc: "§Lเราได้พบกับสัตว์ร้ายที่ถูกฆ่าโดยบรรพบุรุษของเรา มันเป็นตัวอย่างสําหรับทุกคนที่จะหมิ่นประมาท§!"

 nomads.2085.name: "กระจกเงา"
 nomads.2085.desc: "เราไปถึงพิกัด และติดต่อทันที โดยเรือที่มีการเข้ารหัสเหมือนกัน ด้วย ความ ฉงน ประสาท สัมผัส ภาย นอก ของ เรา ไม่ สามารถ ตรวจ พบ เรือ อีก ลํา หนึ่ง ได้ แต่ การ ส่ง สัญญาณ นั้น ชัดเจน ราว กับ ว่า เรา อยู่ ใน ระยะ ที่ มอง เห็น ได้. เมื่อมุมมองสะพานกระพริบเป็นการกระทําเราได้พบกับภาพของเราเอง§Y[Root.Owner.GetRulerTitle] [Root.Owner.GetRulerName]§!.\n\nก่อนที่เราจะตอบได้ คู่พูด\n\n§Hอย่ากลัวไปเลย[Root.Owner.GetRulerTitle]คุณปลอดภัย ผมรับแบบฟอร์มนี้เป็นการให้เกียรติ เส้นทางของคุณอยู่ในฟลุกซ์ และขั้นตอนต่อไปที่คุณจะดําเนินการจะตั้งค่าสิ่งที่เคลื่อนไหว\n\n\"คุณต้องกําจัดพวกนอกศาสนา ที่ไม่ปฏิบัติตามเส้นทาง\"§!\n\nภาพหายไป เราไม่รู้ว่าเกิดอะไรขึ้น"
 nomads.2085.a: "ข้อความชัดเจน! กําจัดพวกที่ปฏิเสธศรัทธา"
 nomads.2085.b: "โกหก! เราจะไม่ถูกพระเจ้าจอมปลอมบงการ"

 # Sacred Site Points of Interest
 sacred_site_emergence_poi_name: "ที่ นั่ง อัน ศักดิ์สิทธิ์:"
 sacred_site_emergence_poi_desc: "§Yความ ตื่น เต้น§!จุดแรกของเส้นทางอันศักดิ์สิทธิ์ การแสวงบุญของเราเริ่มต้นที่นี่"
 sacred_site_eye_poi_name: "ที่ บริสุทธิ์: ตา"
 sacred_site_eye_poi_desc: "§Yตา§!สถานที่ที่บริสุทธิ์ บันทึกในชาร์ตดาวความแหลม:เราได้สํารวจมันในการแสวงบุญของเรา"
 sacred_site_monastery_poi_name: "Site ศักดิ์สิทธิ์สัตว์ประหลาด"
 sacred_site_monastery_poi_desc: "§Yโมนาสเตอรี่§!ทางเดินอันศักดิ์สิทธิ์ เราได้สํารวจมันในการแสวงบุญของเรา"
 sacred_site_cradle_poi_name: "ซี."
 sacred_site_cradle_poi_desc: "§Yระเบียง§!เป็นทางเชื่อมศรัทธาของเรา เราได้สํารวจมันในการแสวงบุญของเรา"
 sacred_site_intelligence_poi_name: "สถาน ศักดิ์สิทธิ์: หน่วยข่าวกรอง"
 sacred_site_intelligence_poi_desc: "§Yหน่วยสืบราชการลับ§!การปรากฏตัวแบบโบราณ ที่ถูกบรรพบุรุษทิ้งไว้ข้างหลัง เราได้สํารวจมันในการแสวงบุญของเรา"
 sacred_site_breathvault_poi_name: "คํา อธิษฐาน ศักดิ์สิทธิ์: การ หายใจ"
 sacred_site_breathvault_poi_desc: "§Yการ หายใจ§!ห้องที่ถูกผนึกความทรงจํา เราได้สํารวจมันในการแสวงบุญของเรา"
 sacred_site_chasm_poi_name: "สิต ศักดิ์สิทธิ์: ชา เซม"
 sacred_site_chasm_poi_desc: "§Yเครื่อง ชา§!คําเตือนที่แกะสลักเป็นหินโดยบรรพบุรุษของเรา เราได้สํารวจมันในการแสวงบุญของเรา"
 sacred_site_mirror_poi_name: "คํา จารึก ศักดิ์สิทธิ์: กระจกเงา"
 sacred_site_mirror_poi_desc: "§Yกระจกเงา§!การเผชิญหน้าที่ศักดิ์สิทธิ์ กับการสะท้อนที่มองไม่เห็น เราได้สํารวจมันในการแสวงบุญของเรา"

 START_SCREEN_SACRED_PATH: "หลายพันปีมาแล้ว ที่เราได้หลงในหมู่ดวงดาว ผ่านทะเลอาศรม ด้วยอัตราเร็วในการกลับโลก ข้ามมหายุคระหว่างซิตศักดิ์สิทธิ์\n\nด้วยพรของไฮเปอร์ไดรฟ์ คนของเราตอนนี้มีโอกาส ทําในสิ่งที่บรรพบุรุษของเราสามารถฝันได้\n\nภายใต้ผู้นําที่ฉลาดของ[GetRulerTitle] [GetRulerName]ประชาคม พร้อม จะ พบ ว่า ความ เชื่อ ของ เรา มี ความ หมาย อย่าง ไร ตอน นี้ เรา จึง สามารถ เดิน ทาง ได้ เร็ว ขนาด นั้น?\n\nแผนที่โบราณ ผ่านลงมาจากบรรพบุรุษของเรา เครื่องหมายทิศทางในดาว ตอนนี้ เราทําการแสวงบุญของเรา เพื่อสิ่งที่ศักดิ์สิทธิ์เหล่านั้น เพื่อแสดงความเคารพต่อผู้ที่มาก่อนเรา นี่คือสิทธิของเรา นี่คือเส้นทางอันศักดิ์สิทธิ์ของเรา"

 nomads.2005.name: "แผนภูมิ ดาว ที่ มี ลักษณะ พิเศษ"
 nomads.2005.desc: "มีสถานที่ที่เรียกว่า§Yความ ตื่น เต้น§!สําหรับบรรพบุรุษของเรา, มันเป็นจุดเริ่มต้นของเส้นทางอันศักดิ์สิทธิ์ เป็น สถาน ที่ ที่ เหมาะ สม ที่ จะ คิด รําพึง ถึง ข้อ ความ โบราณ ของ เรา ก่อน ดําเนิน การ ตาม แบบ ฉบับ ของ เรา เอง เกี่ยว กับ การ แสวง บุญ. โดย ใช้ เวลา บ้าง ใน การ ค้นคว้า ใน ตอน นี้ เรา สามารถ วาง แผน ล่วง หน้า ได้ ดี กว่า.\n\nหลังจากนั้นเราจะกําหนดเส้นทางไปสู่สิ่งที่รู้กัน§Yที่ นั่ง อัน ศักดิ์สิทธิ์§!เรามีทางเลือกมากมาย แต่ในทางทฤษฎี ถ้าเราเชื่อในพระเจ้าและบรรพบุรุษของเรา วิถีที่แท้จริงจะถูกเปิดเผยให้เรา"
 nomads.2005.a: "เราเดินตามเส้นทางของแอสเซส"
 nomads.2005.b: "เราสามารถเป็นนายแห่งหนทางของเราเอง"

 nomads.2015.name: "แบ่ง แยก ความ เชื่อ"
 nomads.2015.desc: "$job_sacred_path_elite_plural$, $job_sacred_path_specialist_plural$และ$job_sacred_path_civilian_plural$สาม กลุ่ม สังคม ที่ แตก ต่าง กัน นี้ ประกอบ กัน เป็น คณะ ผู้ ปฏิบัติ การ ฝ่าย วิญญาณ. เป็นแบบนี้มาตลอด$job_sacred_path_elite_plural$นําทางไป$job_sacred_path_specialist_plural$จงอุทิศตนต่อหนทางนั้น$job_sacred_path_civilian_plural$สนับสนุน ความ พยายาม ของ เรา โดย การ นมัสการ และ การ ทํา งาน หนัก.\n\nอย่าง ไร ก็ ตาม การ แตก แยก กําลัง ก่อ ตัว ขึ้น บน เรือ รบ[Owner.Capital.GetName]เนื่องจากบทบาทที่เราได้สันนิษฐานว่า ตั้งแต่ร่วมเร่งการเดินทางระหว่างดวงดาว สมาชิก บาง คน ใน ทีม งาน เชื่อ ว่า หน้า ที่ รับ ผิด ชอบ ของ ตน สําคัญ กว่า หน้า ที่ ของ คน อื่น และ ตอน นี้ แต่ ละ กลุ่ม เรียก ร้อง ให้ ยอม รับ ว่า เป็น หน้า ที่ รับ ผิด ชอบ ที่ สําคัญ ที่ สุด."
 nomads.2015.a: "$job_sacred_path_elite_plural$ถูกยกย่องด้วยเหตุผลบางอย่าง"
 nomads.2015.b: "ผู้ร่วมชุมนุมสมควรได้รับ การจดจํามากขึ้น"
 nomads.2015.c: "มาฟังกันเพื่อคนซื่อสัตย์"
 nomads.2015.d: "การบริจาคของทุกคนมีค่าเท่ากัน"

 nomads.2020.name: "พิล กริม ที่ สง่า งาม"
 nomads.2020.desc: "ที่ทําให้เราได้รับเกียรติ$job_sacred_path_elite_plural$จง รักษา ความ ซื่อ สัตย์ มั่นคง ผู้ ที่ ได้ อุทิศ ตัว และ ซื่อ สัตย์ ดําเนิน ตาม รอย พระ บาท ของ พวก เขา โดย นับถือ และ เคารพ นับถือ พวก เขา.\n\nนําเสนออุดมคติสูงสุดของความเชื่อของเรา$job_sacred_path_elite_plural$นอกจากนี้ยังมีสิทธิ์ในการส่วนหัวบางเรือ พวกเขามีที่อยู่อาศัยที่กว้างขวางมากขึ้น เข้าถึงทรัพยากรมากขึ้น และกวาดล้างระดับความสําคัญ"
 nomads.2020.a: "ความ เชื่อ มี สิทธิ พิเศษ. ทุกอย่างไปได้สวย"
 nomads.2020.b: "ขอให้เราจัดลําดับความสําคัญของความยุติธรรม"

 nomads.2025.name: "ความ สิ้น หวัง"
 nomads.2025.desc: "เดอะ$job_sacred_path_specialist_plural$ทําลายโลกของชนชั้นนําและบุคคลทั่วไป เริ่มต้นอาชีพเสมียนของพวกเขาเป็น ผู้ติดตามที่ซื่อสัตย์ในแนวทางของเรา และมีความกระตือรือร้นที่จะเดินทางสูง พวกเขาเป็นตัวแทน\n\nเพราะ เหตุ ใด? และ (มะลาอิกะฮฺ) ผู้ควบคุมอย่างรัดกุม$job_sacred_path_elite_plural$พวกเขามาจากไหน พวกเขาทําให้เราอ่อนน้อมถ่อมตน และเชื่อมต่อกับทุกชั้น\n\nการ ให้ เกียรติ ผู้ ที่ ได้ รับ การ อวย พร ใน พิธี การ เป็น วิธี ที่ ดี ใน การ แสดง ความ ขอบคุณ ต่อ สังคม. อาจ เป็น แรง บันดาล ใจ ให้ พวก เขา ทุ่มเท ตัว เอง ให้ กับ กิจ ปฏิบัติ ของ พวก เขา ยิ่ง ยาก ขึ้น."
 nomads.2025.a: "พระเจ้าคุ้มครอง พวกเขาให้เกียรติเรา"
 nomads.2025.b: "การบริจาคของทุกคนมีค่าเท่ากัน"

 nomads.2030.name: "ผู้ ประกาศ ราช อาณาจักร รายงาน"
 nomads.2030.desc: "เดอะ$job_sacred_path_civilian_plural$เป็นเพลงของเรา พวก เขา คือ ชาว นา, ช่าง เทคนิค, และ ช่าง ทํา เหมือง. และแท้จริงพวกเขา (มนุษย์) เป็นผู้จัดสรรการงาน$job_sacred_path_elite_plural$พรุ่งนี้!\n\nเรา ถือ ว่า ผู้ ซื่อ สัตย์ ใน เรื่อง นี้ เป็น เรื่อง สําคัญ มาก เพราะ พวก เขา หยุด หัว เรือ ไม่ ให้ ล้ม. ถ้าไม่มีพวกเขา สังคมของเราก็จะว่างเปล่า"
 nomads.2030.a: "ที่ จริง นั่น คือ เลือด ของ เรา. สรรเสริญพวกเขา"
 nomads.2030.b: "ทุกสตราตัมในสังคมของเรา ต้องมีส่วนช่วย"

 nomads.2100.name: "การ กําหนด แนว ทาง ต่อ ไป"
 nomads.2100.desc: "ไม่มีที่นั่งศักดิ์สิทธิ์เหลือให้สํารวจ\n\nชื่อ เรื่อง ของ ดาวความแหลม:นําทางเราผ่านระยะทางอันไกล และตอนนี้เราได้ติดตามอดีตของเรา แต่คําถามยังคงอยู่: มันเป็นความจริงที่เราค้นพบ? หรือเราโกหกกันแน่\n\nเส้นทางนี้เป็นส่วนหนึ่งของวัฒนธรรมของเรา มันถูกแต่งตั้งโดยบรรพบุรุษของเรา แต่ เมื่อ ได้ เห็น สิ่ง ที่ พวก เขา ได้ เห็น และ ด้วย สิทธิ พิเศษ แห่ง วิทยาศาสตร์ สมัย ใหม่ ข้อ ความ เหล่า นั้น ยัง คง เป็น ความ จริง ไหม? หรือ สังคม ของ เรา ถูก กําหนด ให้ ติด ตาม แนว ทาง ใหม่ ที่ เคร่ง ศาสนา น้อย กว่า?"
 nomads.2100.a: "เราต้องไม่เปลี่ยนแปลงเส้นทาง รักษา ความ ซื่อ สัตย์!"
 nomads.2100.b: "แน่นอนเราต้องเลือก ตัวตนของเราตอนนี้"
 nomads.2100.c: "มันไม่ชัดเจน เราหลงทาง"

 nomads.2105.name: "การ ปก ป้อง ค่า นิยม ตาม ประเพณี"
 nomads.2105.desc: "จะ มี คน เหล่า นั้น ที่ มี จุด มุ่ง หมาย อยู่ เสมอ; คน เหล่า นั้น ที่ จะ มอง เห็น ประวัติศาสตร์ ของ เรา ถูก มอง ข้าม และ คอนตินเจนซี ของ เรา สูญ สิ้น ไป เป็น เวลา. เราปล่อยให้พวกมันแบ่งแยกเราไม่ได้ เราต้องปกป้องวิถีชีวิตแบบดั้งเดิม พระเจ้าจะนําทางเราต่อไป ถ้าเราปล่อยพวกมันไป แต่เราต้องเปิดรับอิทธิพลของมัน"
 nomads.2105.a: "นี่คือตัวตนของเรา"
 nomads.2105.b: "แน่นอนบรรพบุรุษของเราอนุญาตให้การเปลี่ยนแปลง"

 nomads.2115.name: "ขอบ ของ หมวก เกราะ"
 nomads.2115.desc: "ความแตกแยกที่หัวใจ ของสังคมเรา กําลังลึกซึ้งขึ้น ความ ก้าว หน้า ถูก บีบ ให้ ยอม รับ การ เปลี่ยน แปลง ใน ขณะ ที่ คน นิยม ประเพณี กลัว สิ่ง ใด ๆ ที่ ต่าง ออก ไป.\n\nณ จุดนี้ เราต้องถามตัวเองว่า มีทางไหนไหมที่เราจะกลับมาอยู่ด้วยกันอีกครั้งในฐานะประชาชน ทาง เลือก อาจ ก่อ ความ เสีย หาย อย่าง หนัก.\n\nทุก คน ควร มี เสรีภาพ ที่ จะ ปฏิบัติ ตาม ความ เชื่อ ของ ตน ใน แนว ทาง ของ ตน เอง แต่ ถ้า การ ยอม รับ ข้อ เท็จ จริง ของ เรา นํา เรา ไป สู่ สงคราม กลาง เมือง แล้ว เรา ต้อง แน่ ใจ อย่าง เต็ม ที่ ใน ความ เชื่อ มั่น ของ เรา."
 nomads.2115.a: "เราต้องส่งเสริมความเข้าใจ"
 nomads.2115.b: "ความสอดคล้องเป็นไปไม่ได้!"

 nomads.2120.name: "ประเพณี ของ เรา นิยาม เรา ว่า อย่าง ไร?"
 nomads.2120.desc: "ถ้าไม่มีอดีต เราก็ไม่มีอะไรเลย ถ้าไม่มีเส้นทาง เราก็ไม่มีที่ไป บาง ครั้ง การ ท้าทาย ความ เชื่อ ของ เรา เป็น สิ่ง ที่ เรา จําเป็น ต้อง ทํา ให้ เรา ตื่น เต้น และ เตือน เรา ให้ ระลึก ถึง สิ่ง ที่ กําลัง ตก อยู่ ใน อันตราย เมื่อ เรา ละ ทิ้ง แนว ทาง ของ เรา.\n\nเรา กําลัง เกิด มา จาก ช่วง แห่ง ความ สับสน วุ่นวาย ภาย ใน. เราเกือบจะเต็มใจ ที่จะฉีกตัวเองออก เพื่อความเชื่อของเรา เมื่อในความเป็นจริง สิ่งเดียวที่สามารถช่วยเราทั้งหมด\n\nอย่าให้เราต่อต้านกันอีกเลย เราต้องมุ่งมั่นอย่างเต็มที่กับเส้นทางเดียวกัน"
 nomads.2120.a: "เรามุ่งมั่นอย่างเต็มที่!"
 nomads.2120.b: "มันต้องมีความสมดุล"

 nomads.2125.name: "อนาคต สดใส ใน ขณะ นี้"
 nomads.2125.desc: "อดีตดึงเรากลับไป ทําให้เราไม่พัฒนา การ เรียน รู้ จาก ประวัติศาสตร์ เป็น สิ่ง หนึ่ง แต่ การ อยู่ ที่ นั่น ไม่ มี วัน หันเห ไป จาก สิ่ง นั้น เป็น เรื่อง โง่ เขลา.\n\nเราไม่จําเป็นต้องเสียศักยภาพในการค้นหาตัวเอง ตอนนี้เราได้ตัดโซ่ของเมื่อวานออก เราสามารถเดินหน้าต่อได้ ด้วยความหลงใหล\n\nเรา จะ ไม่ ถูก ควบคุม โดย บรรพบุรุษ ที่ ด้อย กว่า ทาง เทคโนโลยี อีก ต่อ ไป. วิถี จะ ไม่ ถูก กําหนด อีก ต่อ ไป โดย เศษ เสี้ยว ที่ คลุมเครือ ซึ่ง พระเจ้า วาง ไว้. เราเลือกทางเดินของเราเอง และไม่มีอะไรมาขวางทางเราได้"
 nomads.2125.a: "เส้นทางทําให้เรามีความชัดเจน"
 nomads.2125.b: "เส้นทางที่แท้จริงคือเส้นทางสงคราม"
 nomads.2125.c: "$nomads.2125.b$"

 nomads.2130.name: "ความ เข้าใจ ที่ น่า ยินดี"
 nomads.2130.desc: "แท้จริงเราได้อยู่ในแนวทางนั้นอย่างแน่นอนในศาสนา และความหวัง และพวกเราเป็นผู้อยู่ในแนวทางที่ถูกต้อง\n\nตอนนี้ เราเห็นแล้วว่ามันเป็นหน้าที่อันศักดิ์สิทธิ์ของเรา ที่จะปรับปรุงสถานที่ศักดิ์สิทธิ์ที่รู้จักกันทั้งหมดใหม่ และขยายเส้นทางให้กว้างออกไป\n\nความเมตตาของเราจะแผ่ไปทั่วดาว และเชื่อมต่อกับจิตวิญญาณที่เต็มใจ"
 nomads.2130.a: "ทรัพย์สิน!"

 nomads.2135.name: "เส้น ทาง กลาง"
 nomads.2135.desc: "มันไม่เคยเกี่ยวกับเส้นทางของตัวเอง สิ่งที่สําคัญที่สุดคือ การเดินทางที่เราทําร่วมกัน ประชาชนของเราได้ปฏิบัติตามประเพณีนี้มานานหลายศตวรรษ แต่เราไม่เคยได้พบในเอกสารทางประวัติศาสตร์ใด ๆ ของเรา มันอาจจะหายไปตลอดเวลา\n\nเราจะจําเรื่องราวที่รอดชีวิตของบรรพบุรุษของเรา และทางโบราณคดีที่พวกเขาทํา แต่เราไม่จําเป็นต้องปฏิบัติตามการนําของพวกเขา เรารู้เรื่องชีวิต กาแล็คซี่ และตัวเรามากกว่าพวกเขา ความจริงที่พวกเขายึดถือ ไม่เกี่ยวข้องกับเราอีกต่อไป เราจะกําหนดเส้นทางของเราเอง"
 nomads.2135.a: "เส้นทางอยู่ในตัวเรามาตลอด"

 nomads.2140.name: "จง ค้ําจุน ฝูง ชน"
 nomads.2140.desc: "ทุกอย่างชัดเจนแล้ว พระที่นั่งศักดิ์สิทธิ์ของบรรพบุรุษของเรา เป็นสัญญาณหวานป่วยของความหวังและความเชื่อ คนที่มาก่อนเราไม่มีความละอาย และพวกเขาไม่สนใจว่าใครจะรู้\n\nชื่อเสียงของเราถูกบิดเบือนไปเล็กน้อย เรามีมันอยู่ในอํานาจของเรา ที่จะเคารพสถานที่ใหม่ ที่จะสื่อสารภารกิจจิตวิญญาณของเรา\n\nพระเจ้าเหล่านี้ซับซ้อนและเข้าใจผิด โดย ทาง นั้น พวก เขา ได้ สอน เรา ว่า ความ ขัด แย้ง เป็น ลักษณะ พื้น ฐาน ของ สังคม เรา. ความท้าทายที่เราเอาชนะ ทําให้เราแข็งแกร่งขึ้น ตอนนี้เราจะแสดงความแข็งแกร่งของเรา ข้ามกาแล็กซี่!"
 nomads.2140.a: "นี่คือสงครามครูเสดของเรา"

