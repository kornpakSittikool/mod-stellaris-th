# Contract Events
 nomads.3036.name: "ตัว แทน บน กระดาน"
 nomads.3036.intro: "ตัว แทน ทาง การ ทูต จาก§H[pickup_planet.GetName]§!ได้ขึ้นเรือแล้ว และได้รับการรองรับด้วยความเคารพต่อทูตจาก§H[pickup_planet.owner.GetName]§!."
 nomads.3036.desc: "$nomads.3036.intro$เรา ได้ วาง แผน ไว้ แล้ว ว่า จะ มี กิจกรรม อะไร บ้าง รวม ทั้ง การ เดิน ทาง เที่ยว เรือ และ การ เสนอ รูป แบบ ชีวิต ของ เรา เพื่อ ทํา ให้ การ เดิน ทาง มี ความ สุข§H[dropoff_planet.GetName]§!."
 nomads.3036.desc.nocomm: "$nomads.3036.intro$พวกเขาเอาข้อมูลทางการทูตมาให้เรา§H[dropoff_planet.owner.GetName]§!ที่ใช้สร้างการสื่อสารอย่างเป็นทางการ"
 nomads.3036.a: "ให้พวกเราพาพวกเขาไปยังจุดหมายที่ปลอดภัย"

 nomads.3045.name: "ผู้ เข้า ร่วม ประชุม ได้ มา ถึง"
 nomads.3045.desc: "ผู้แทนจาก§H[diplomatic_support_issuer.GetName]§!มาถึงจุดหมายแล้ว การเยี่ยมทางการทูตของพวกเขา เริ่มได้อย่างเป็นทางการแล้ว และเราหวังว่าพวกเขา จะประสบความสําเร็จในความพยายามของพวกเขา"

 nomads.3050.name: "นัก โทษ ถูก ลัก พา ตัว"
 nomads.3050.desc: "ขนส่งเรือบรรทุกอาชญากรที่เราได้ยอมรับที่จะโอนในนามของ§H[pickup_planet.owner.GetName]§!ได้ขึ้นเรือเรือ เรา พยายาม อย่าง ดี ที่ สุด ที่ จะ ดําเนิน การ กับ พวก เขา อย่าง ปลอด ภัย แต่ นัก โทษ จํานวน มาก มาย เช่น นั้น ต้อง ก่อ ความ ยุ่ง ยาก ขึ้น ไม่ ทาง ใด ก็ ทาง หนึ่ง.\n\nสัญญาของเราทําให้เรามีทางเลือกในวิธีการจัดการพวกเขา แต่เราไม่ควรจะวางพวกเขาออกอีกครั้ง§H[pickup_planet.owner.GetName]§!ใน ขณะ เดียว กัน จักรวรรดิ อื่น ๆ คง จะ ไม่ เห็น คุณค่า ของ อาชญากร ที่ หลั่ง ไหล เข้า มา อย่าง กะทันหัน ใน อาณานิคม แห่ง หนึ่ง ของ พวก เขา. แน่นอน ถ้าเรารอบคอบพอ พวกเขาอาจจะไม่รู้ว่าเราทําอะไร"
 nomads.3050.a: "เราจะเอามันไปไว้ที่อื่น"
 nomads.3050.b: "ให้พวกเขาบนเรือ."
 nomads.3050.c: "พวกเขาสามารถสร้างทาสที่ดี"
 nomads.3050.d: "ปล่อยพวกเขาเป็นอิสระ"
 nomads.3052.name: "นัก โทษ ถูก ปล่อย ตัว"
 nomads.3052.desc: "นักโทษคนสุดท้ายที่ถูกจับไป เป็นส่วนหนึ่งของสัญญาของเราได้รับการยกทัพ เราได้พยายามอย่างดีที่สุดที่จะรักษาความรอบคอบ แต่การตรวจสอบมักจะมีความเสี่ยง และผู้คนไม่ค่อยพอใจเมื่อเผชิญหน้ากับการไหลทะลักอย่างฉับพลันของอาชญากรซีโน"
 nomads.3053.name: "รายงานการยุติการทํางาน"
 nomads.3053.desc: "ข่าวที่เราเกี่ยวข้อง ในการขนส่งของอาชญากรยังไม่แพร่ออกไป ดูเหมือนว่าเราจะไม่ถูกตรวจจับ" #All smooth, no complaints
 nomads.3053.desc.issuer.problem: "ความพยายามที่จะคู่ข้าม[prisoner_disposal_issuer.GetName]ล้มเหลว ขณะที่อาชญากรได้หลบหนีสําเร็จ เราถูกตรวจจับและ[prisoner_disposal_issuer.GetName]ได้ยกเลิกสัญญาและปฏิเสธที่จะจ่ายเงินให้เรา" #Issuer unhappy cancels contract - ewps
 nomads.3053.desc.problem: "ในขณะที่เราได้รับการตรวจจับ[prisoner_disposal_issuer.GetName]เรา ยัง คง ยินดี ที่ เรา จะ กําจัด อาชญากร เหล่า นั้น ออก ไป และ ตก ลง จ่าย เงิน ให้ เรา เต็ม จํานวน." #We got detected by planet owner and they're unhappy, but we still complete the contract c:
 prisoner_tranfer_tt: "\nเดอะ§Yอาชญากร£pop£ป๊อป§!จะถูกย้ายไป§Y[From.GetName]§!"

 nomads.3060.name: "คณะกรรมการท่องเที่ยว"
 nomads.3060.desc: "นักท่องเที่ยวกลุ่มหนึ่งได้ขึ้นเรือใน§H[root.solar_system.GetName]§!ระบบ การ พูด คุย ด้วย ความ คาด หมาย ขณะ ที่ มัน เข้า ไป ใน ตัว เรือ ที่ เต็ม แน่น.\n\nเราได้คํานวณเส้นทางที่น่าตื่นเต้น ผ่านระบบที่โดดเด่นหลายระบบ เพื่อความสุขของพวกเขา ตอนนี้เราต้องส่งมอบเพียง แว่นตาที่พวกเขาสัญญา"
 nomads.3060.a: "กําหนดเส้นทางสําหรับ§H[sightseeing_tour_destination_system.GetName]§!."
 nomads.3060.a.tt: "ระบบเป้าหมายสามารถติดตามได้ใน§Hบันทึกสถานการณ์§!."

 nomads.3065.name: "นัก ท่อง เที่ยว มอง เห็น การ ชม"
 nomads.3065.desc: "นัก ท่อง เที่ยว ชอบ ภาพ ใน ภาพ§H[root.solar_system.GetName]§!ระบบ นี้ ทํา ให้ พวก เขา รู้สึก พิศวง ใน ความ มหัศจรรย์ ที่ อยู่ รอบ ตัว. พวกเขาจะกลับบ้านที่มีการเปลี่ยนแปลง แบกพวกเขาครั้งแรก ความรู้ของกว้างใหญ่ของจักรวาล"
 nomads.3065.a: "ทีนี้ กลับไป§H[sightseeing_tour_end_system.GetName]§!."

 nomads.6005.name: "โอกาส ที่ จะ พบ"
 nomads.6005.desc: "ในขณะที่กําลังทําสัญญาในนามของ§H[event_target:contract_issuer.GetName]§!เราบังเอิญเจอของโบราณ เรา ถูก เก็บ ไว้ ใน น้ํา แข็ง เกือบ จะ ผิด รูป ไป สําหรับ ดาว เคราะห์ น้อย ธรรมดา. ในทางเทคนิคของเราโดยสิทธิของการกู้ เราควรพิจารณาส่งพวกเขาไปยัง§H[event_target:contract_issuer.GetName]§!และทั้ง ๆ ที่พวกเขาเองก็ได้รับข่าวนั้นด้วย การสแกนลังบอกว่า..."
