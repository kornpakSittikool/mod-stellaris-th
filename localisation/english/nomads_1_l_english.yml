 # Gundersen Research Society (GRS)
 START_SCREEN_GRS: "ไฮอาซินท์ไม่ได้ถูกสร้างมาเพื่อนิ่งเฉย\n\nเธอเป็นเรือของยูลิสซิสลําสุดท้าย รูหนอนที่ควรจะนําเรา ไปยังโลกอาณานิคมใหม่ กระจายกองเรือของเรา และล้มเหลวอย่างร้ายแรง\n\nกัปตันกันเดอร์เซ่นตัดสินใจ ไฮอะซินท์จะเป็นบ้านของเรา และมันจะเปิด ผู้ รอด ชีวิต คน อื่น ๆ จาก การ กระจัด กระจาย ได้ เข้า มา หา เรา: นัก วิจัย, ผู้ ตั้ง อาณานิคม, และ คน เร่ร่อน ซึ่ง ไม่ มี ที่ ไป. เราพาพวกเขาเข้ามา อะไรก็ตามที่พวกเขานําผ่านแอร์ล็อค สายกันเดอเรนได้นํามาใช้\n\nเดอะ[Ruler.GetTitle]เป็นปืนกันเดอร์เซนเสมอ การลอยยาวของเราได้นําเราวงกลมเต็มรูปแบบ กลับไปที่ดาวที่หนอนที่วางเราครั้งแรก เรากลับมาเพราะนี่คือจุดเริ่มต้นของคําถาม"
 EMPIRE_DESIGN_humans3: "กันเดอร์เซนการวิจัยสังคม"
 EMPIRE_DESIGN_humans3_desc: "เรือชูชีพลําที่ 6 และสุดท้ายของยูไลซิสอินิชิเอทีฟที่ได้รับการสนับสนุนจากยูไลซิส ไฮอะคินท์ประสบความล้มเหลวของอํานาจทําลายล้าง ในช่วงเวลาหลังจากที่มันผ่านรูหนอน กัปตันโรนัลด์ เอฟ. กันเดอร์เซ่น ช่วยพวกเขาทั้งหมดผ่านการทรยศและความฉลาด และในการทําเช่นนั้น ก่อตั้งราชวงศ์\n\nหนึ่ง ศตวรรษ ต่อ มา พวก กัน เด อร์ เซนการวิจัยสมาคม ฯ ยัง คง เรียก บ้าน หลัง นี้ ว่า บ้าน ไฮ อา ซิน สร้าง ขึ้น ใหม่ และ ขยาย ใหญ่ ขึ้น เรื่อย ๆ จน บาง คน เรียก บ้าน นั้น ว่า เธซี อุส. การ ต้อนรับ ของ พวก เขา เป็น อย่าง แท้ จริง ความ อยาก รู้ อยาก เห็น ของ พวก เขา มี มาก มาย; สิ่ง ที่ ใคร ๆ นํา มา ผ่าน ทาง แอร์ ล็อก สาย กัน เด อร์ เซน ตัดสิน ว่า จะ ใช้ อย่าง ไร. ตอนนี้การลอยยาวของพวกเขาได้นําพวกเขาวงกลมเต็มรูปแบบ กลับไปที่มุมของกาแล็กซี่ ที่หนอนวางพวกเขาครั้งแรก"
