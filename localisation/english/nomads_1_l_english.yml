 contract_suntrip_crew_4: "การปรับตั้งเครื่องตรวจจับ"
 contract_suntrip_crew_4_desc: "อาร์เรย์การนําทางจะต้องถูกปรับให้ตรงกับลายเซ็นดวงดาวที่อาศัยอยู่ในระยะใกล้ กระบวนการนี้จะบัญชาการแบนด์วิธ จากระบบบันเทิง"
 contract_suntrip_crew_4_lore_issued: "[GetSuntripCrewLoreIssued4]"
 contract_suntrip_crew_4_regular_lore_issued: "§L\"การเปลี่ยนรายการบันเทิงแบนด์วิธ ไปเป็นเครือข่ายเซ็นเซอร์ คาดว่านายจะร้องเรียนผู้โดยสารใน สาม สอง หนึ่ง§!"
 contract_suntrip_crew_4_gestalt_lore_issued: "§L\"การเปลี่ยนรายการบันเทิงแบนด์วิธ ไปเป็นเครือข่ายเซ็นเซอร์ ผู้โดยสารคาดการณ์และยอมรับ.\"§!"
 contract_suntrip_crew_4_lore_completed: "§Lล็อกประตู ความแม่นยําของการเดินทางกลับมาภายในขอบที่ยอมรับได้.\"§!"
 contract_suntrip_crew_4_lore_failed: "[GetSuntripCrewLoreFailed4]"
 contract_suntrip_crew_4_regular_lore_failed: "§L\"ความไม่สมบูรณ์\" ข้อมูลแสดงยังคงเบลอ แต่อย่างน้อยจอกลับ.\"§!"
 contract_suntrip_crew_4_gestalt_lore_failed: "§L\"ความไม่สมบูรณ์\" ข้อมูลการนําทางเสื่อม รายการบันเทิงแบนด์วิธ ได้คืนสู่ผู้โดยสาร§!"
