 contract_espionage_support_passenger_2_regular_desc: "เรากําลังปฏิบัติการลับของยาน อาสาสมัครทหาร จะถูกปลูกไว้ทั่วทุกชั้น เป็น 'ผู้คุ้มกัน' รายงานสรุปการให้บริการลับไปยังเซลล์ผู้โดยสาร"
 contract_espionage_support_passenger_2_gestalt_desc: "การดําน้ําข้ามดาดฟ้าทุกชั้น จะรับบุคคลแปรพักตร์จากดาวเคราะห์ด้านล่าง ส่งมอบการบรรยายลับคู่ขนาน"

 contract_espionage_support_passenger_2_lore_issued: "§L\"เจ้าหน้าที่สรุปของฉันเลื่อนฉันจดหมายรหัสภายใต้โต๊ะอาหาร เพื่อนร่วมโต๊ะของฉันช่างอิจฉา.\"§!"
 contract_espionage_support_passenger_2_lore_completed: "§L\"มีคนบอกว่าฉันช่วยยกเครือข่ายเงา ฉันรู้ว่ามันเป็นของปลอม ฉันยังภูมิใจอยู่\"§!"
 contract_espionage_support_passenger_2_lore_failed: "§L\"ผู้ให้ข้อมูลไม่เคยมา ผมนั่งอยู่ในบูธที่กําหนดไว้สําหรับสามชั่วโมงพยาบาลเครื่องดื่มเดียวกัน.\"§!"
 contract_espionage_support_passenger_2_chain_title: "$contract_espionage_support_passenger_2$"
 contract_espionage_support_passenger_2_chain_desc: "$contract_espionage_support_passenger_2_desc$"
