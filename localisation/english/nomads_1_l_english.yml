 contract_espionage_support_crew_4: "การ ค้า"
 contract_espionage_support_crew_4_desc: "การต่อรองของอุปสงค์ดีกว่า เมื่อซื้อราคาจริง ดาวเทียมติดตามดูเส้นทางการค้าและทรัพยากร จะทําให้แน่ใจว่าทีมของเราจะไม่จ่ายเกินขนาด"
 contract_espionage_support_crew_4_lore_issued: "§L\"ท่าเรือล่าสุด ชาร์จเรา 3 เท่า สําหรับอุณหภูมิของเตาปฏิกรณ์ ที่ไม่ได้เกิดขึ้นเมื่อคุณรู้ว่าตัวเลขหลักของพวกเขา.\"§!"
 contract_espionage_support_crew_4_lore_completed: "§L\"สัญญามีตัวเลข ต่อไปค่าชดเชยจะค่าใช้จ่ายครึ่งหนึ่งสิ่งที่มันทําครั้งสุดท้าย.\"§!"
 contract_espionage_support_crew_4_lore_failed: "§L\"ไม่มีข้อมูลการค้า การเจรจาต่อรองกับคนตาบอดอีกครั้ง พวกเขากําลังร่างคําร้องเรียน.\"§!"
 contract_espionage_support_crew_4_chain_title: "$contract_espionage_support_crew_4$"
 contract_espionage_support_crew_4_chain_desc: "$contract_espionage_support_crew_4_desc$"
 CONTRACT_ESPIONAGE_SUPPORT_crew_4_PROJECT: "$contract_espionage_support_crew_4$"
 CONTRACT_ESPIONAGE_SUPPORT_crew_4_PROJECT_DESC: ""

 contract_espionage_support_crew_5: "การ คุกคาม"
 contract_espionage_support_crew_5_desc: "รายงานเกี่ยวกับความรู้สึกต่อต้านจมูก ได้ปรากฏในภูมิภาคนี้ ดาวเทียมสอดแนมจะยืนยัน ว่าการบรรยายเป็นเพียงวาทศิลป์ หรือมันเป็นนโยบาย"
 contract_espionage_support_crew_5_lore_issued: "§L\"มีรายงานเกี่ยวกับเขตห้ามเดินทาง ที่ก่อตัวในภูมิภาคนี้ เราต้องรู้ว่านั่นคือการคาดเดาหรือนโยบาย\"§!"
 contract_espionage_support_crew_5_lore_completed: "§L\"ความสมบูรณ์\" มันเป็นการพูดคุย ไม่ใช่นโยบาย ลูกเรือสามารถหยุดการทํางานได้ แต่เราจะให้ดาวเทียมมีชีวิตอยู่เพียงในกรณีที่.\"§!"
 contract_espionage_support_crew_5_lore_failed: "§L\"ไม่มีการประเมิน โดยไม่ต้องมีข้อมูลทุกคําเตือนเกี่ยวกับภูมิภาคนี้ยืนไม่หวั่นไหว\"§!"
