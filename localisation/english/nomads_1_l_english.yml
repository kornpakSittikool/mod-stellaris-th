 d_compact_modules: "ขอบเขตสี"
 d_compact_modules_desc: "ระบบปรับอากาศใหม่ ที่ช่วยให้เราสามารถเรียกคืน พื้นที่ในโมดูลบางส่วน สําหรับที่พักอาศัยได้"
