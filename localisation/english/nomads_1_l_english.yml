 # Clues of the Chrysanthemum

 clues_chrysanthemum_title: "คํา บอก ใบ้ ของ นก กระเต็น"
 clues_chrysanthemum_desc: "ในที่สุดเราก็มีเบาะแสว่าไครซันเธมอยู่ที่ไหนเอกภาพเราต้องดูว่าน้องสาวของเราตอนนี้เรียกว่าบ้าน"

 nomads.9000.name: "เสียง จาก อดีต"
 nomads.9000.desc: "เครื่องรับสัญญาณระยะไกลของไฮอะคินท์ ได้สกัดสัญญาณวิทยุฉุกเฉินของยูลิสซิส\n\nสัญญาณนี้เป็นเก่าอย่างน้อย ศตวรรษ - แต่ข้อความเป็นที่ชัดเจน เรือ ลํา ที่ ห้า ของ ค ริ ซาน เตม ซึ่ง เป็น เรือ กําปั่น ยู ลิส ซิส ได้ รอด ชีวิต จาก การ กระจัด กระจาย. พวกอาณานิคมพบโลก พวกเขาตั้งชื่อมันเอกภาพ.\n\nการออกอากาศซ้ํา\"Kryzan Memmum อาณานิคมของเรือยูลิสซิสทุกลํา เราทําให้โลกมีถิ่นอาศัย ดาวเคราะห์นั้นสวยงาม เรากําลังสร้างบางอย่างที่นี่ กลับบ้านเถอะ\"\n\nต้นกําเนิดของสัญญาณไม่สามารถกําหนดจาก ที่นี่ แต่หมัดส่งที่ใช้ในการดําเนินการ ควรสามารถติดตาม การ สํารวจ ระบบ ใกล้ เคียง อาจ พบ ได้."
 nomads.9000.a: "เริ่มวิเคราะห์แหล่งสัญญาณ"
 nomads.9000.b: "นั่นคือประวัติศาสตร์โบราณ บันทึกและก้าวต่อไป"
 chrysanthemum_poi_1: "ส่งสัญญาณกลับ"
 chrysanthemum_poi_1_desc: "ระบบที่อาจบรรจุการส่งสัญญาณของยูลิสซิส การสํารวจด้วยไฮอาซินท์อาจมีผลแก้ไขที่แข็งแกร่งบนจุดกําเนิดของสัญญาณ"

 nomads.9005.name: "พบสัญญาณ"
 nomads.9005.desc: "หอย มัส เซิล\n\nนอก จาก คํา ประกาศ แรก เดิม แล้ว ทุ่น ยัง มี การ ถ่ายทอด สอง ครั้ง ต่อ มา. ตัวที่สอง ลงวันที่ประมาณ 10 ปีหลังจากครั้งแรก\n\nจํานวนประชากร: สองแสนหกหมื่น การตัดส่วนต่างๆ การเติบโตของโครงสร้างอินฟรา\n\nการส่งครั้งที่ 3 ลงวันที่ 9,182 - ประมาณ 25 ปีหลังลงจอด\"เรายังอยู่ที่นี่เอกภาพเป็น เรื่อง ท้าทาย ยิ่ง กว่า การ สํารวจ ใน ตอน แรก ๆ ที่ ระบุ ไว้. เราเสียคนไป ถ้ายานยูลิสซิสเวิลด์ใด ๆ รับการออกอากาศนี้ โปรดตอบ เราอยู่ที่นี่ เราทน\n\nเอกภาพอยู่ในระบบของเดเนบ เพียงไม่กี่กระโดดไฮเปอร์เลนจากที่นี่"
 nomads.9005.a: "กําหนดหลักสูตรสําหรับเดเนบ"
 chrysanthemum_poi_2: "เดเนบ"
 chrysanthemum_poi_2_desc: "นิคมไครซันเทมถูกก่อตั้งที่นี่อินิชิเอทีฟอินเทอร์เทนต์บันทึกพิกัด ไฮอะคินท์ต้องเดินทางไปที่นั่น"

 nomads.9010.name: "เอกภาพ"
 nomads.9010.desc: "ระบบเดแนบเป็นที่เงียบสงบ\n\nไฮอาซินท์หยดจากการขนส่งเพื่อหาสัญญาณไม่มี สัญญาณไม่มีเรือย้ายระหว่างโลก โอลิมปัสแขวนอยู่ในระยะทางตรงกลาง ยิ่งใหญ่และไม่แยแส\n\nพระจันทร์ดวงเดียวผิด ที่ที่การออกอากาศของอาณานิคมอธิบายทวีปสีเขียวและน้ําเปิด สแกนก็แสดงให้เห็นโลกที่ตายแล้ว ไม่มีอะไรอยู่ที่นั่น\n\nและในวงโคจรต่ํา ลอยเชื่องช้าและมืด คือ ไครซันเทมลัม ไม่ถูกทําลาย ว่างเปล่า ทุกหลุมดํา ยานที่พาชาวอาณานิคมกว่า 4 แสนคน มาอยู่บนโลกนี้ มาตั้งหลายทศวรรษแล้ว"
 nomads.9010.a: "เริ่มพื้นผิวและวิเคราะห์ซากเรือ"

 chrysanthemum_object: "CNS ไครแซนเม็มเมียม" # Commonwealth Navy Ship
 chrysanthemum_object_tooltip: "$chrysanthemum_object_desc$"
 chrysanthemum_object_desc: "เรือยูลิสซิสที่ 5 มันแบกพวกอาณานิคมที่จะพบว่าเอกภาพมัน ลอย อยู่ ใน อากาศ เย็น และ ไม่ มี การ ควบคุม มา หลาย สิบ ปี แล้ว."

 # Chrysanthemum Digsite
 site_chrysanthemum_colony: "เอกภาพซาก ปรัก หัก พัง"
 site_chrysanthemum_colony_desc: "เดอะเอกภาพอาณานิคมดําเนินการประมาณยี่สิบห้าปี ก่อนที่จะสูญเสียการติดต่อ อะไรก็ตามที่เกิดขึ้นที่นี่ สถิติรอดมาได้ นักโบราณคดีของอาณานิคมยังทําอยู่ จนกระทั่งถึงที่สุด"

 nomads.9015.name: "การ อพยพ"
 nomads.9015.desc: "แกนข้อมูลของอาณานิคมยังอยู่ - ถูกผนึกไว้ในคลังใต้ดิน ภายใต้เครื่องราชอิสริยาภรณ์\n\nวันที่ 9,251: ร่องรอยการโพรงใหม่ได้รับการระบุ กําแพงรอบนอกไม่ได้จัดอันดับการเจาะ การสนับสนุนวิศวกรรมจากค ริ สติ น เต อุมขอตัวสักครู่\n\nวันที่ 9,389: วงแหวนนอกสถานที่ 214,000 ชาวอาณานิคมนับเป็นพื้นที่อาศัยใต้ดิน บางส่วนไม่เชื่อมต่อ\n\nวันที่ 9,441: การสื่อสารกับภาค 7 ถึง 12 แพ้ 892. เสียชีวิตจาก Militia: 892.\n\nวันที่ 9,484: พลังงานสู่ระดับชั้นที่ 4 หายไปแล้ว ทีมถูกขอให้หยุดทําไม้ นักโบราณคดีลดลง\n\nวันที่ 9,514: เรามีเวลาไม่มาก"
 nomads.9015.a: "รักษาประวัติอาณานิคมไว้"

 nomads.9020.name: "เดอะ วอต"
 nomads.9020.desc: "ห้องของสภาสร้างสําหรับสองร้อย วาระสุดท้าย เรียกรวม 17 คน นักโบราณคดียังทําอยู่\n\nการประชุมใช้เวลา 6 ชั่วโมง มี การ ออก เสียง สิบ สอง ครั้ง - หก ครั้ง สําหรับ การ ถล่ม ของ ออร์บิทัล หก ครั้ง. สมาชิกคนนึงละ เว้น สาม คน ไม่ อยู่; ส่วน ของ พวก เขา ได้ ลด ลง ไป สาม วัน ก่อน หน้า นั้น.\n\nพวก ผู้ ต่อ ต้าน โต้ แย้ง ว่า การ อพยพ ยัง คง เป็น ไป ได้. พวกไครซันเธม สามารถสกัดเอาผู้รอดชีวิตในวงจร ก่อนที่ระดับล่างจะถูกรื้อถอน\n\nคน ส่วน ใหญ่ ไม่ สนใจ. สิ่งมีชีวิตได้ไปถึงอุโมงค์ที่ต่ํากว่า เรือที่จอดเทียบท่า จะบรรทุกสารปนเปื้อนออกจากโลก ทาง เลือก ไม่ ใช่ ระหว่าง การ ช่วย บาง คน และ การ ช่วย ชีวิต ทุก คน อีก ต่อ ไป แต่ ระหว่าง การ สูญ เสีย โลก หนึ่ง กับ การ สูญ เสีย ทุก โลก ที่ ติด ตาม มา.\n\nหัวหน้า รปภ. โคโลนี ผู้บัญชาการโบคาล ลงคะแนนเสียง การเคลื่อนไหวดําเนินการ กฎเกณฑ์ของอาณานิคมบอกว่า กฎหลัก ในปีแรก เมื่ออนาคตดูต่างไป"
 nomads.9020.a: "บันทึกการตัดสินใจของสภา"

 nomads.9025.name: "ปูมบันทึก"
 nomads.9025.desc: "สะพาน เริ่ม ต้น ใน วัน ที่ 9,516 - สอง วัน หลัง การ ลง คะแนน เสียง.\n\nลูกเรือสิบเอ็ดยังคงเพื่อยืนยันการกวาดล้างพื้นผิว ระดับรังสี การ กะ ประมาณ ของ ประชากร ได้ รับ การ แก้ไข ลง ไป แล้ว ก็ แก้ไข ใหม่ อีก. วันที่ 9,519 อนุมัติให้ทิ้งระเบิด วันที่ 9,521: การอนุมัติส่วนได้รับการยืนยัน 40%. วันที่ 9,558: พื้นผิวปลอดเชื้อ ไม่พบลายเซ็นสิ่งมีชีวิต อภิสิทธิ์: เป็นเอกฉันท์\n\nลูกเรือใช้เวลาอีกสี่ปี ในการสํารวจดาราศาสตร์ นักวิทยาศาสตร์เติมเต็มเวลา\n\nบันทึกสุดท้าย ลงวันที่ 11,204. เจ้า หน้าที่ ยาม บอก ถึง วัน ที่ แจ่ม ใส. เธอ ให้ ข้อ สังเกต ว่า เดเนบ ดู ต่าง ไป จาก บริเวณ ใกล้ เคียง นี้ มาก กว่า ตอน ที่ เข้า มา. ทางเข้าจบตรงนี้\n\nรายการสุดท้ายคือเวลา ห้ามขอโทษหรือสะท้อน แค่สังเกตเกี่ยวกับแสงดาว"
 nomads.9025.a: "ปิดแฟ้มจัดเก็บ"

 # First Contact
 action.1.desc_112: "อิสยาห์-06 ไฮอะซินเรา ขาด การ ติด ต่อ กับ เรือ ทั้ง หก ลํา และ เป็น เวลา นาน ที่ เรา คิด ว่า เลว ร้าย ที่ สุด. เพื่อหาคุณได้ที่นี่มีชีวิตอยู่ ยกโทษให้ฉัน\n\nในนามของประชาชน[From.GetHomeWorldName]และการประชุมทั่วไปของสหประชาชาติ โปรดรับมือของเราในมิตรภาพ ไม่ว่าถนนที่อินิชิเอทีฟ ของยูลิสซิสกําหนดให้คุณอยู่ที่ไหน คุณอยู่ท่ามกลางผู้คนของคุณในตอนนี้\n\nเรามีการจัดการที่ดีที่จะพูดคุยเกี่ยวกับ ได้โปรด บอกพวกเราทุกอย่าง"
 action.1.desc_113: "[From.GetRulerTitle] [From.GetRulerName]ของ กันเดอร์เซนการวิจัยสมาคม สวัสดีจาก ไฮอาซิน เราดีใจที่พบว่าโลกยังคงยืนอยู่\n\nเราใช้เวลาเป็นศตวรรษเพื่อแสวงหา สิ่งที่หนอนแพร่กระจายไปทั่วกาแล็กซี่นี้ งาน นี้ มี มาก มาย และ เรา ได้ พบ ว่า เอกภพ ไม่ ได้ เผย ให้ เห็น ความ ลับ ของ เอกภพ แก่ ผู้ ก่อ การ ร้าย. ทุกคนที่ร่วมมือกับเรา เข้าใจเรื่องนี้ดี มันเป็นเงื่อนไขเดียวที่เราเคยถาม\n\n[From.GetHomeWorldName]นัก วิทยาศาสตร์ และ นัก สํารวจ เต็ม ใจ ข้าม ช่อง ว่าง ใน เรือ. เราสงสัยว่ามันยังเป็นแบบนั้น ประตูของไฮอะคินท์ เปิดต้อนรับทุกคนที่ถือวิญญาณเดียวกันนี้ผ่านเข้าไป ส่งสิ่งที่ดีที่สุดมา ไม่มีการขาดแคลนของคําถาม"

