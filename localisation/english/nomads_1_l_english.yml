 champions_forge_tournament_chain_title: "แชมป์ฟอร์จไลฟ์! ทัวร์นาเมนต์"
 champions_forge_tournament_chain_desc: "หลาย ทศวรรษ ผ่าน ไป และ การ แข่งขัน ใหม่ กําลัง จะ เริ่ม ขึ้น. ส่งกองเรือของคุณไปยังจุดเด่น และพิสูจน์ให้กาแล็กซี่เห็น ถึงปัญญา, อํานาจ, และความมุ่งมั่นของคุณ"

