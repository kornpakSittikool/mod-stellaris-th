 refurbishment_farming_offline_desc: ""

 arkship.1310.name: "หน่วยป้องกัน"
 arkship.1310.desc: "เนื่อง จาก ระเบียง เพาะ ปลูก สร้าง ขึ้น ใหม่ และ การ ผลิต อาหาร กลับ สู่ สภาพ ปกติ ความ สนใจ จึง เปลี่ยน ไป ยัง ส่วน ป้องกัน ล่วง หน้า. ตั้ง แต่ อ่าว อาวุธ จน ถึง ทาง เดิน บํารุง รักษา ทุก สิ่ง ถูก สํารวจ และ ทุก อย่าง ต้อง มี งาน ทํา.\n\nความพร้อมของกองทัพเรือจะถูกจํากัดในช่วงนี้ ลูกเรือที่รับผิดชอบต่อความปลอดภัยของยาน กําลังถูกขอให้หลีกไป ในขณะที่พื้นที่การทํางานของพวกเขาถูกแยกออกจากกัน\n\nพวกเขาอดทนกับมันอย่างมาก"
 arkship.1310.desc.machine: "การนําภาคที่สองกลับมาใช้เสร็จสมบูรณ์แล้ว ส่วนส่งส่งกลับเป็นฐานปฏิบัติการ ขอบเขตการนําร่อง ตอนนี้เลื่อนไปยังโครงสร้างพื้นฐานการป้องกันไปข้างหน้า\n\nฐานทัพอาวุธ เครือข่ายบํารุงรักษา และหน่วยงานรักษาความปลอดภัย จะยุติการทํางานตามลําดับ เครื่องวัดความพร้อมของกองทัพเรือจะลดลงในช่วงนี้\n\nการฟื้นฟูยังคงเกิดขึ้นในพารามิเตอร์"
 arkship.1310.desc.hive: "ห้องอาหารถูกบูรณะใหม่ และความหิวของอาณานิคม\n\nความสนใจของเราตอนนี้หันไปที่คาปาเช่:แบตเตอรี่อาวุธ, การบํารุงรักษาวอร์เรนและค่ายที่ประกอบขึ้นเป็นการป้องกันภายนอกของเรือ ต้องรื้อถอนและสร้างใหม่ทั้งหมด พร้อมรบจะลดลง\n\nกลุ่มคนที่ยอมรับความเปราะบางนี้"
 arkship.1310.a: "$arkship.1305.a$"
 arkship.1310.a.machine: "$arkship.1305.a.machine$"
 arkship.1310.a.hive: "$arkship.1305.a.hive$"
 refurbishment_military_offline: "$district_ark_military$– ภายใต้การเปลี่ยนชื่อ"
 refurbishment_military_offline_desc: ""

 arkship.1315.name: "ส่วน ที่ มี ชีวิต"
 arkship.1315.desc: "หน่วย ป้องกัน ได้ รับ การ ตรวจ สอบ, เสริม กําลัง, และ กลับ ไป รับ ใช้. ลูกเรือที่ทํางานกับมันมองถ้าสิ่งที่โล่งใจที่มีสิ่งที่มีประโยชน์ที่จะทําอีกครั้ง\n\nตอนนี้มาถึงขั้นตอนสุดท้าย : เขตเทศบาลเอง อาคาร ที่ พัก อาศัย, ศาลา กลาง, และ ทาง เดิน สินค้า ซึ่ง ประกอบ กัน เป็น หัวใจ ที่ มี ชีวิต ของ นาวา. อย่างอื่นเป็นโครงสร้างพื้นฐาน นี่คือสถานที่ที่ชาวบ้านเรียกว่าบ้าน\n\nด่านก่อสร้างจะขึ้นไปเป็นครั้งสุดท้าย จุดจบของมันอยู่ตรงหน้าแล้ว"
 arkship.1315.desc.machine: "การฟื้นฟูของกระทรวงกลาโหม ได้รับการรับรองอย่างสมบูรณ์แบบ เมตริกพร้อมเรือกําลังกลับมาเป็นฐาน ขอบเขตปฏิบัติการตอนนี้โอนเป็น ที่อยู่อาศัยและโครงสร้างพื้นฐานอําเภอ.\n\nทางเดินประมวลผลของหน่วยจะออฟไลน์ในลําดับสําหรับโอเวอร์ฮอลครั้งสุดท้าย จะ ต้อง มี การ แบ่ง ประชากร ใน ส่วน ที่ ได้ รับ ผล กระทบ.\n\nการควบคุมเข้าสู่ระยะสุดท้าย"
 arkship.1315.desc.hive: "คาราปาซแข็งตัว และความพร้อมของกลุ่มได้กลับคืนมา\n\nการ บูรณะ ใหม่ นี้ เปลี่ยน ไป เป็น งาน ชิ้น สุด ท้าย: ห้อง เลี้ยง เด็ก, ห้อง ทํา รัง ใน ชุมชน, และ ทาง เดิน เชื่อม ต่อ ซึ่ง ประกอบ เป็น หัวใจ ที่ มี ชีวิต ของ เรือ. บริเวณ ที่ อาณานิคม นอน หลับ, ผสม พันธุ์, และ รวม ตัว กัน. มาตราจะถูกปิดผนึก ในขณะที่เราสร้างจากภายใน\n\nอวสาน ของ วัฏจักร แห่ง การ ฟื้นฟู ใกล้ เข้า มา แล้ว."
 arkship.1315.a: "เบ่งครั้งสุดท้าย"
 arkship.1315.a.machine: "เข้าสู่ขั้นสุดท้าย"
 arkship.1315.a.hive: "การบูรณะครั้งสุดท้ายเริ่มขึ้น"
 refurbishment_city_offline: "$district_ark_city$– ภายใต้การเปลี่ยนชื่อ"
 refurbishment_city_offline_desc: ""

 arkship.1320.name: "การแยกส่วนขอบเขต"
 arkship.1320.desc: "โดย มี ระดับ ที่ อยู่ อาศัย ซึ่ง ถูก ปิด ผนึก ไว้ สําหรับ การ สํารวจ โครง สร้าง ทีม วิศวกรรม จึง ได้ เริ่ม งาน ที่ ไม่ อาจ ทํา ได้ ซึ่ง ทํา ให้ ประชากร นับ พัน ๆ คน ทั่ว ทั้ง เรือ. สิ่ง ที่ เริ่ม ต้น ใน ขั้น ตอน ที่ เป็น ระเบียบ ได้ เปลี่ยน เป็น คิว แข่ง, ข้อ พิพาท เรื่อง อํานาจ ปกครอง, และ อย่าง น้อย การ ร้อง เรียน อย่าง เป็น ทาง การ อย่าง น้อย หนึ่ง ครั้ง เกี่ยว กับ การ สูญ เสีย การ เข้า ถึง ส่วน ที่ เป็น ที่ รัก โดย เฉพาะ ของ อ่าว ไฮโดรโปนิค.\n\nผู้ประสานงานของยาน ต้องการคําแนะนํา"
 arkship.1320.desc.machine: "การจัดหมวดหมู่ของหน่วย สําหรับพื้นที่ปฏิบัติการต่างๆ ได้ประสบการประมวลผล หน่วยกําลังตัดสินใจตามเวลาจริง เพื่อชดเชย ส่งผลให้เกิดความขัดแย้งกัน ตัววัดความจุได้ลดลงจาก การแบ่งส่วนแบ่งประเภท\n\nจําเป็น ต้อง มี การ ชี้ นํา."
 arkship.1320.desc.hive: "การเคลื่อนตัวของโดรน ทําให้อาณานิคมไม่สงบ สัญชาตญาณ ของ มนุษย์ ยืน ยัน ตัว เอง ว่า เป็น หุ่นยนต์ ที่ พลัด ถิ่น ไป แข่งขัน กัน ใน เขต ทํา รัง และ การ มอบ หมาย งาน ใน เขต รอง ที่ แออัด. ร่องรอยการเกิดความเครียดและความวุ่นวาย สามารถตรวจพบได้ตลอดสถานที่ชั่วคราว\n\nอาณานิคมต้องการคําแนะนํา"
 arkship.1320.a: "วิศวกรรมจะจัดเรียงออก"
 arkship.1320.b: "จัดตั้งแนวร่วมที่ยุติธรรม"
 arkship.1320.a.tt: "\nทําตามขั้นตอนมาตรฐาน คุณภาพ งาน ขั้น สุด ท้าย อาจ ทน ทุกข์."

 arkship.1325.name: "สิ่ง ที่ อยู่ เบื้อง หลัง กําแพง"
 arkship.1325.desc: "การเอาปลอกท่อในบริเวณเครื่องกําเนิดไฟฟ้าออก เปิดเผยบางอย่าง ที่ไม่มีแผนผังเดิมแสดงให้เห็น การ นัด พบ ทาง ด้าน วัตถุ บ่ง ชี้ ว่า มี ความ เสีย หาย เกิด ขึ้น มา แล้ว โดย ไม่ รู้ ตัว เป็น เวลา หลาย สิบ ปี.\n\nการ ขยาย ขอบ เขต ของ การ ก่อ สร้าง เพื่อ จัด การ กับ ความ เสีย หาย นั้น ต้อง ใช้ เวลา มาก ขึ้น."
 arkship.1325.a: "เอกสารและดําเนินการตามแผน"
 arkship.1325.b: "ขยายขอบเขต พูดมาได้เลย"
 arkship.1325.b.tt: "การ ขยาย ขอบ เขต การ ซ่อมแซม เพื่อ จัด การ กับ ความ เสีย หาย ที่ เกิด จาก โครง สร้าง นั้น ต้อง ใช้ เวลา มาก ขึ้น แต่ จะ ป้องกัน ปัญหา มาก ขึ้น ภาย หลัง."

 arkship.1330.name: "การ ปล่อย ตัว"
 arkship.1330.desc: "ผู้ อาศัย ใน ส่วน ต่าง ๆ ที่ ไม่ ได้ รับ ความ เสีย หาย เนื่อง จาก การ ปรับ ปรุง ใหม่ ที่ ยัง ดําเนิน อยู่ กําลัง บ่น ว่า ต้อง แบ่ง ห้อง ให้ กับ ผู้ ย้าย ถิ่น.\n\nพวกเขากําลังเรียกร้องให้มีการขยายทรัพยากร การเข้าถึงสิ่งอํานวยความสะดวกเพื่อความบันเทิง และกําจัดระบบประกาศอัตโนมัติทันที"
 arkship.1330.desc.machine: "การ อ่าน พระ คัมภีร์ เป็น ประจํา ท่ามกลาง หน่วย ต่าง ๆ ที่ ได้ รับ มอบ หมาย ให้ ไป ยัง เขต รอง ที่ มี การ แออัด ได้ ปฏิเสธ อย่าง น่า สังเกต ตั้ง แต่ มี การ แจก จ่าย ประชากร ใหม่. ผลผลิตของพฤกษศาสตร์กําลังติดตาม ต่ํากว่าขีดจํากัดที่เหมาะสม ตัว อย่าง ที่ ระบุ ล่วง หน้า บ่ง ชี้ ว่า แนว โน้ม จะ แย่ ลง โดย ไม่ มี การ แทรกแซง.\n\nมี การ แนะ นํา ให้ ใช้ แหล่ง ทรัพยากร ที่ เพิ่ม เข้า มา เพื่อ ฟื้นฟู ความ ยืดหยุ่น พื้น ฐาน."
 arkship.1330.desc.hive: "มี การ เพิ่ม ระดับ ความ เครียด ของ โฟโร โมน ใน เขต ทํา รัง ชั้น รอง ที่ แออัด ขึ้น เรื่อย ๆ ตั้ง แต่ เริ่ม มี การ ย้าย ถิ่น ฐาน. ความ ตึงเครียด ที่ น่า กลัว ระหว่าง กลุ่ม คน ที่ พลัด ถิ่น กับ ประชากร ที่ อาศัย อยู่ อาศัย นั้น เพิ่ม ขึ้น อย่าง น่า ทึ่ง. ผลผลิตรวมของรังกําลังลดลง เมื่อความซับซ้อนของสัญชาตญาณแพร่กระจาย ผ่านส่วนที่ได้รับผลกระทบ\n\nมี การ แนะ นํา ให้ ใช้ ทรัพยากร ที่ เสริม สร้าง เพื่อ ทํา ให้ ฝูง ชน ผ่อน คลาย."
 arkship.1330.a: "อีกไม่นานหรอก เราจะจัดการมันเอง"
 arkship.1330.b: "จัดสรรทรัพยากรที่จําเป็น"
 refurbishment_allowances_granted: "ทรัพยากรที่ถูกจองไว้จริง"
 refurbishment_allowances_granted_desc: "แหล่งทรัพยากรถูกรวมเข้ากับเขตต่าง ๆ ที่ถูกกดดัน จากผู้อยู่อาศัยใหม่ๆ"
 refurbishment_low_morale: "การระบุขอบเขต"
 refurbishment_low_morale_desc: "สภาวะที่แออัดและการสนับสนุนที่ไม่เพียงพอสําหรับผู้ลี้ภัย กําลังมีผลเสียต่อ กําลังใจของทั้งเรือและความมั่นคง"
 refurbishment_low_morale_2: "การ จัด ที่ อยู่ อย่าง เข้ม งวด"
 refurbishment_low_morale_2_desc: "ความ ไม่ มั่นคง และ การ เกื้อ หนุน ที่ ไม่ เพียง พอ ได้ ทํา ให้ ความ เข้ม แข็ง และ ความ มั่นคง ของ เรือ ลด ลง อย่าง มาก."
 refurbishment_low_morale_3: "การ จัด ที่ ดิน ให้ อยู่ ใน ระดับ สูง"
 refurbishment_low_morale_3_desc: "คุณธรรมและเสถียรภาพ ได้ถึงระดับต่ําสุด ชาว เมือง ที่ อยู่ ห่าง ไกล รู้สึก เหนื่อย ล้า และ ขุ่น เคือง หลัง จาก ถูก รบกวน หลาย ครั้ง โดย ไม่ มี การ แก้ไข."

 arkship.1335.name: "ช่วง ที่ สอง"
 arkship.1335.desc: "เพื่อ รักษา ตาราง เวลา การ ก่อ สร้าง วิศวกร ชั้น นํา ได้ เสนอ จะ ทํา งาน สาม กะ ต่อ เนื่อง ตลอด เวลา. ห้อง พัก ที่ อยู่ ติด กับ บริเวณ ทํา งาน รายงาน เสียง รบกวน ซึ่ง ทํา ให้ การ หยุด พัก แทบ จะ เป็น ไป ไม่ ได้ สําหรับ สิบ เอ็ด วัน ที่ ผ่าน ไป. ลูกเรือ 3 คน ได้เข้ารับการรักษา สําหรับเหตุการณ์ที่เกี่ยวกับความเหนื่อยล้า\n\nพวกคนงานก่อสร้างเอง แสดงให้เห็นถึงความเครียด บาง ที อาจ จะ เร็ว กว่า แต่ คน เหล่า นั้น ที่ ดู แล ไม่ มั่น ใจ ใน คุณภาพ งาน ที่ ลูก เรือ ที่ เหนื่อย อ่อน ผลิต ขึ้น มา."
 arkship.1335.desc.machine: "เพื่อรักษากําหนดการ วงจรการดําเนินงานต่อเนื่อง ได้มีการเสนอผ่านทุกหน่วยก่อสร้าง ในพื้นที่ทํางาน เสียงรบกวนและข้อมูลแรงสั่นสะเทือน จากบริเวณที่อยู่อาศัยที่อยู่ใกล้กัน ชี้ให้เห็นการรบกวนที่ยั่งยืน เหนือขีดจํากัด หน่วยปฏิบัติการล้มเหลวหลายหน่วย\n\nการวัดคุณภาพลดลง สัดส่วนการขยายวงเวียน การดําเนินการต่อเนื่องเร็วกว่า แต่เพิ่ม ความผิดพลาดอย่างน่าเหลือเชื่อ"
 arkship.1335.desc.hive: "เพื่อ คง ไว้ ซึ่ง วัฏจักร แห่ง การ ฟื้นฟู หุ่น ยนต์ ใน เขต ก่อ สร้าง ที่ ทํา งาน ได้ รับ การ สั่ง ให้ ทํา งาน เป็น เวลา นาน. การสั่นสะเทือนและระดับเสียงรบกวนในพื้นที่ที่อยู่ติดกัน ได้เกินขีดจํากัดที่ทนทาน สําหรับสิบเอ็ดรอบติดต่อกัน โดรนหลายลําได้แสดงสัญญาณของการล้มเหลว\n\nแรงงานต่อเนื่องขับเคลื่อนการก่อสร้างได้เร็วขึ้น แต่ข้อจํากัดทางชีววิทยาของอาณานิคม ส่งผลให้ต้นทุนที่ทนทานได้"
 arkship.1335.a: "รักษาขั้นตอนปัจจุบัน"
 arkship.1335.b: "กําหนดการหมุนกะที่เหมาะสม"
 refurbishment_construction_fatigue: "การก่อสร้างแฟกนิค"
 refurbishment_construction_fatigue_desc: "ทีมก่อสร้างกําลังฟื้นตัว จากปฏิบัติการต่อเนื่อง แสดงผลผ่านบทบาทการทํางานทั้งหมดจะลดลง ในขณะที่ตารางเปลี่ยนใหม่จัดขึ้น"
 refurbishment_construction_fatigue_2: "การ ก่อ สร้าง ที่ รุนแรง"
 refurbishment_construction_fatigue_2_desc: "การ ทํา งาน เกิน ขนาด ซ้ํา แล้ว ซ้ํา อีก ทํา ให้ พวก นัก ก่อ สร้าง ต้อง หมด เรี่ยว แรง ไป นาน. ศีล ธรรม และ ผล ผลิต ยัง คง ลด ลง อย่าง มาก."
 refurbishment_construction_fatigue_3: "การ ก่อ สร้าง ที่ สําคัญ"
 refurbishment_construction_fatigue_3_desc: "ทีมก่อสร้างกําลังดําเนินการ ไกลเกินขอบเขตความปลอดภัย โมราว์ทรุดโทรมลง และผลออกมาก็เสียหายอย่างหนัก ในบทบาทการทํางานทั้งหมด"

 arkship.1340.name: "การไล่ระดับสีล้มเหลว"
 arkship.1340.desc: "ท่อส่งพลังงานหลักได้ฉีกขาด ระหว่างเอาปลอกกระสุนเก่าออก ทั้งส่วน รวมถึงระดับที่อยู่อาศัย อ่าวการแพทย์ชั้นสอง และหน่วยประมวลผลอาหาร 2 หน่วย\n\nของเรา[Owner.GetEngineerPlural]เชื่อว่ามันเป็นไปได้ที่จะเรียกคืน พลังงานเต็มรูปแบบภายในไม่กี่เดือน อีกทางเลือกหนึ่ง การไหลของท่อสามารถข้ามผ่านได้ โดยดึงจากกลุ่มพลังงานใกล้เคียงแทน เร็วขึ้น แต่จะแนะนําการทํางานถาวร ในตารางพลังงาน"
 arkship.1340.a: "เส้นทางรอบๆมัน"
 arkship.1340.b: "จัดอันดับการบูรณะเต็มรูปแบบ"
 refurbishment_bypass_routing: "อนุมัติการส่งพลังงาน"
 refurbishment_bypass_routing_desc: "ท่อ ส่ง พลัง งาน ที่ แตก หัก ไม่ ใช่ การ ซ่อมแซม. วงจรการทํางานคงที่ แต่แนะนําความไม่เสมอภาค ในตารางพลังงาน"

 arkship.1345.name: "ความ ห่วงใย ใหญ่ ยิ่ง"
 arkship.1345.desc: "วิศวกรโครงสร้างชั้นนําของโครงการได้ส่งความกังวลอย่างเป็นทางการ: ไทม์ไลน์ปัจจุบันในขณะที่สามารถวัดได้ กําลังผลิตงาน[Owner.Ruler.GetSheHe]จะ ไม่ ได้ รับ การ อนุมัติ เป็น ส่วน ตัว อย่าง ครบ ถ้วน.\n\nจุดที่ไม่เกี่ยวกันของปัญหาถูกผนึกไว้ มากกว่าจะถูกเสริมสร้างอย่างเหมาะสม ส่วนลดความเหลื่อมล้ําจะถูกตั้งค่าเป็น 'ยอมรับ' แทน 'แนะนําให้ทํา'"
 arkship.1345.desc.machine: "การตรวจสอบการรับรองคุณภาพได้ระบุถึงความกังวลของโครงสร้าง: พารามิเตอร์การก่อสร้างในปัจจุบัน ดําเนินการภายในขีดจํากัดการยอมรับน้อยที่สุด โหนดที่ไม่อันตราย ถูกปรับให้เหมาะสมที่สุด การประมาณขอบเขตโครงสร้างระยะยาว อยู่ใต้เป้าหมายที่ชื่นชอบ\n\nรายการบันทึกอย่างเป็นทางการถูกลงทะเบียนแล้ว ไม่ มี การ บ่ง ชี้ ถึง ความ เสี่ยง ใน ทันที ทันใด."
 arkship.1345.desc.hive: "อัตรา การ ปรับ ปรุง ใหม่ ใน ปัจจุบัน นี้ กําลัง ทํา ให้ เกิด งาน ที่ ทํา ได้ น้อย ที่ สุด ไม่ ใช่ ตาม ที่ แนะ ไว้. มี การ ปิด ปม ความ เจ็บ ปวด ไว้ ใน ที่ ต่าง ๆ แทน ที่ จะ เสริม กําลัง อย่าง เหมาะ สม. ความยืดหยุ่นของโครงสร้างระยะยาว ถูกแลกเปลี่ยนกับความเร็วระยะสั้น\n\nไม่ มี การ บ่ง ชี้ ถึง ความ เสี่ยง ใน ทันที ทันใด. ความกังวลได้จดทะเบียนแล้ว"
 arkship.1345.a: "กําหนดการจัดขึ้น ยอมรับได้"
 arkship.1345.b: "จง เอา ใจ ใส่ คํา เตือน. แก้ไขตัวแปร"
 refurbishment_power_restoration: "ซ่อมแซมพลังงานเต็มที่"
 refurbishment_power_restoration_desc: "จําเป็น ต้อง มี เวลา พิเศษ เพื่อ ฟื้นฟู พลัง งาน ให้ ครบ ถ้วน."

 arkship.1350.name: "มาตราแรกออนไลน์"
 arkship.1350.desc: "ส่วน แรก ที่ ทํา ให้ ส่วน ที่ มี การ อุด ตัน จน ครบ ชุด ได้ รับ การ ประกาศ ว่า ได้ รับ การ รับรอง ด้าน โครง สร้าง และ ได้ รับ การ ชําระ ให้ สะอาด เพื่อ การ ฝัง เข็ม. ผลงานนี้น่าประทับใจจริงๆ: กรอบใหม่ ท่อส่งน้ําที่ทันสมัย\n\nทีมวิศวกรรมกระตือรือร้นที่จะผลักดันไปข้างหน้า ผู้อยู่อาศัยกําลังตะโกนให้ย้ายกลับเข้ามา อย่างไรก็ตาม การทดสอบระบบ ยังไม่สําเร็จ ต้องตัดสินใจ"
 arkship.1350.desc.machine: "การตกแต่งโครงสร้างที่สําคัญเสร็จสมบูรณ์แล้ว การรับรองเบื้องต้น ระบุว่าส่วนต่างๆ ตรงกับมาตรฐานการฉีดวัคซีนน้อยที่สุด ขั้นตอนการตรวจสอบเต็มรูปแบบ ยังคงโดดเด่น ความเป็นไปได้ของการล้มป่วยหลังคลอดต่ําแต่ไม่สามารถหนีได้\n\nจําเป็น ต้อง อนุญาต ให้ ดําเนิน การ หรือ ไม่ มี การ วินิจฉัย อย่าง ครบ ถ้วน."
 arkship.1350.desc.hive: "ส่วนแรกของการสร้างโครงสร้างเสร็จสมบูรณ์ ได้รับการเคลียร์โดยการตรวจสอบเริ่มต้น มันตรงกับขีดจํากัดขั้นต่ําในการฉีดวัคซีน วงจร การ ตรวจ สอบ ทาง ชีววิทยา อย่าง เต็ม ที่ สําหรับ ระบบ ที่ ถูก สร้าง ขึ้น ใหม่ ยัง ไม่ เสร็จ สิ้น. ความเป็นไปได้ที่ล้มเหลวหลังจากการฉีดซ้ํานั้นต่ํา แต่ไม่มีทางสลายได้\n\nโดรนที่หายไปจากส่วนนี้ กําลังกดที่แนวป้องกัน"
 arkship.1350.a: "การทดสอบไม่จําเป็น"
 arkship.1350.b: "เสร็จสิ้นขั้นตอนการทดสอบเต็มรูปแบบ"
 refurbishment_extended_displacement: "การ ขยาย ที่ อยู่"
 refurbishment_extended_displacement_desc: "ส่วนที่เสร็จสมบูรณ์แล้วยังคงปิดอยู่ ระหว่างการสถาปนาระบบเต็มรูปแบบ"

 arkship.1355.name: "รายการ ซ่อมแซม"
 arkship.1355.desc: "หัวหน้าโครงการได้รวบรวมรายการสุดท้าย ของการซ่อมแซม: สี่สิบเอ็ดรายการโดดเด่น ก่อนเครื่องหมายโครงสร้างอย่างเป็นทางการ รายชื่อจากส่วนที่สําคัญ เช่น การอัพเกรดแบบประหยัดสามแบบ เช่น การลดความเร็วลงของน้ําหนัก ในส่วนเสริม\n\nการคอมไพล์ทุกรายการในรายการต้องใช้เวลาเพิ่ม แต่ รายการ เหล่า นั้น มี อยู่ จริง เพราะ สิ่ง เหล่า นี้ สําคัญ."
 arkship.1355.desc.machine: "โปรโตคอลรับรองคุณภาพ ได้ทําการตรวจสอบรายการของ ที่โดดเด่น 45-7 ชิ้น ระหว่างการรับรองอย่างเป็นทางการ สิ่ง ของ ต่าง ๆ มี ตั้ง แต่ ความ สําคัญ ของ โครง สร้าง เช่น การ เสริม สร้าง ต่อ ไป จน ถึง การ จัด แผง เสริม สวย.\n\nการเติมให้สมบูรณ์ ต้องการการขยายเวลาการทํางาน การตรวจสอบบางส่วน ครอบคลุมเฉพาะรายการโครงสร้างเท่านั้น เป็นตัวเลือก"
 arkship.1355.desc.hive: "โดรนซ่อมแซมได้รวบรวมรายการสุดท้าย: การซ่อมแซมเซลล์ที่ยังไม่เสร็จสี่สิบเจ็ด พวกเขาอยู่ระหว่างการเสริมสร้างโครงสร้างที่สําคัญ ที่การเชื่อมการรับน้ําหนัก ไปยังการสัมผัสของเซลล์ในระดับพื้นผิว\n\nความสมบูรณ์จะขยายวงจรการบูรณะ การตรวจร่างกายบางส่วน การซ่อมแซมโครงสร้าง จะใช้ได้"
 arkship.1355.a: "ที่อยู่เฉพาะรายการโครงสร้างเท่านั้น"
 arkship.1355.b: "เติมเต็มรายการทั้งหมด"

 arkship.1360.name: "งานคืนสู่เหย้า"
 arkship.1360.desc: "ผู้อยู่อาศัยผู้ลี้ภัยของส่วน ที่เพิ่งมีการปรับปรุงล่าสุด ได้รับวันที่มีการย้ายกลับของพวกเขา ทาง เดิน ที่ ถูก ปิด ผนึก ไว้ เป็น เวลา หลาย เดือน จะ เปิด อีก ครั้ง หนึ่ง มี กลิ่น ของ สาร ประกอบ ใหม่ ๆ และ ฉนวน ใหม่ ๆ. เด็ก ที่ อยู่ ใน ที่ พัก ชั่ว คราว นาน หลาย เดือน จะ เห็น ส่วน บ้าน เป็น ครั้ง แรก.\n\nอารมณ์บนเรือเป็นที่ดีที่สุดมันเป็น ตั้งแต่การตกแต่งเริ่มต้น ความ เป็น ผู้ นํา ทราบ ดี ว่า น้ําใจ แบบ นี้ ไม่ ยั่งยืน. คําถามคือ จะใช้มันอย่างไร"
 arkship.1360.desc.machine_ind: "ทางเดินที่ปิดสนิท ถูกเปิดอีกครั้ง การบิดเบี้ยวลงมาในชั้นล่าง ส่วนใหญ่แล้ว นี่เป็นงานคืนสู่เหย้า สําหรับบางคน มันเป็นอย่างอื่น\n\nหน่วยที่เข้ามาออนไลน์ในช่วงการแทนที่ กําลังเข้าสู่ทางเดินที่ปรากฏในแผนผังของพวกเขา แต่ไม่เคยปรากฏในบันทึกการรับรู้ของพวกเขา\n\nความ ยืดหยุ่น สูง ที่ สุด ผู้ นํา ทราบ ว่า เรื่อง นี้ จะ ไม่ ยั่งยืน. คําถามคือ จะใช้มันอย่างไร"
 arkship.1360.desc.machine: "หน่วยที่ได้รับมอบหมายในหน่วยปฏิบัติการชั่วคราว ระหว่างการนํากลับมาใช้ในพื้นที่ประมวลผลหลัก ตัวแปรปฏิบัติการพื้นฐานได้ถูกฟื้นฟู ข้ามส่วนที่ได้รับผลกระทบ การวัดค่าได้สูงขึ้นเรื่อยๆ\n\nการยึดของที่ยึดมาได้ ถูกจดทะเบียนในเรือ ก้านแหลมนั่นอยู่ชั่วคราว การ วิเคราะห์ บ่ง ชี้ ถึง วิธี การ สอง อย่าง ที่ จะ ใช้ ได้: เปลี่ยน ทิศ ทาง การ ยก รถ ให้ เร็ว ขึ้น เพื่อ เร่ง งาน นํา ร่อง ที่ ยัง คง เหลือ อยู่ หรือ อนุญาต ให้ มี การ แทง น้ํา ตาม ธรรมชาติ และ ทํา ให้ ความ ยืดหยุ่น ลด ลง ที่ ฐาน สูง."
 arkship.1360.desc.hive: "โดรนที่หลบหนีกําลังไหลกลับมาเป็นส่วนของพวกเขา ที่ได้กลิ่นสารประกอบก่อสร้าง สําหรับวงจร พันธะเคมีคงที่ ความเครียดละลาย\n\nการกลับมาของกลุ่มได้เพิ่มขึ้น และพลังงานของผลตอบแทนที่เป็นจริง มันสามารถมุ่งออกไปด้านนอก ในพื้นที่ก่อสร้างที่เหลือ หรือ อาจ อนุญาต ให้ ตั้ง ถิ่น ฐาน ได้ และ อาณานิคม ได้ ให้ เวลา อย่าง เต็ม ที่ ที่ จะ ค้น พบ ตัว เอง อีก ก่อน ที่ งาน จะ ดําเนิน ต่อ ไป."
 arkship.1360.a: "มุ่งไปที่งาน"
 arkship.1360.b: "ปล่อยให้พวกเขามีช่วงเวลานี้"

 arkship.1365.name: "การ รอ คอย อัน ยาว นาน"
 arkship.1365.desc: "การซ่อมแซมเขตที่อยู่อาศัยอยู่ในขั้นตอนสุดท้าย แต่ 'รอบสุดท้าย' ได้หยุดความหมายของสิ่งที่มันเคยทํา ประชากร ย้าย ถิ่น จาก บล็อก เมือง ปัจจุบัน อยู่ ใน ที่ พัก ชั่ว คราว นาน กว่า การ ประมาณ เดิม ที่ สัญญา ไว้.\n\nการร้องขอได้ผ่านเข้ามาสําหรับทรัพยากรเพิ่มเติม: การตกแต่งชั่วคราวที่ดีกว่า, การเข้าถึงสิ่งอํานวยความสะดวกความบันเทิง, และพื้นที่สํารองเล็กๆ มันจะแก้ไขอะไรไม่ได้ แต่มันอาจจะทําให้การรอคอย"
 arkship.1365.desc.machine: "ข้อมูลการควบรวมของหน่วย จากประชากรภาคที่อยู่อาศัย มีแนวโน้มต่ํากว่าขีดจํากัดที่ยอมรับได้ ระยะการซ่อมแซมสุดท้าย ได้เกินระยะเวลาที่คาดการณ์ไว้ โมเดลที่คาดการณ์ไว้ แสดงให้เห็นว่า การลดลงอย่างต่อเนื่อง โดยไม่ได้เข้าไปแทรกแซงทรัพยากรเป้าหมาย\n\nมีการส่งคําร้องขอตําแหน่งสํารองสําหรับทบทวน"
 arkship.1365.desc.hive: "การ อ่าน ความ เครียด จาก ส่วน ที่ พัก อาศัย ส่วน สุด ท้าย นั้น เกิน กว่า ที่ ยอม รับ ได้. ระยะการซ่อมแซมสุดท้าย ได้ขยายออกไปเกินวงจรที่วางไว้ การแยกตัวจากรูปแบบที่ตั้งมายาวนาน ทําลายความสัมพันธ์ของเคมี และทําลายการรวมตัวกันของกลุ่ม ในวิธีที่แย่ลงตามกาลเวลา\n\nมี การ เรียก ร้อง การ จัด หา ทรัพยากร เสริม เพื่อ บรรเทา การ เบียด บัง."
 arkship.1365.a: "เราทนจนกว่างานจะเสร็จ"
 arkship.1365.b: "ตอบรับตําแหน่งเสริม"
 refurbishment_administrative_burden: "เบอร์เดน"
 refurbishment_administrative_burden_desc: "การดูแลโครงการสวัสดิการ สําหรับผู้ลี้ภัยในระยะยาว ได้กําหนดความต้องการที่สําคัญต่อบุคลากรผู้เชี่ยวชาญ การ พิจารณา คดี, การ ดําเนิน การ ฟ้อง ร้อง, และ การ จัด การ เรื่อง การ แจก จ่าย กําลัง ทํา ให้ คณะ ผู้ เชี่ยวชาญ หันเห ไป จาก บทบาท หลัก ของ ตน."

 arkship.1370.name: "การขยายสัญญาณ"
 arkship.1370.desc: "ในระหว่างการรื้อถอนกําแพงที่ไม่มีภาระ ในส่วนกลางของภาคกลาง ลูกเรือปรับปรุงได้ค้นพบบางสิ่งบางอย่างที่ผิดปกติ ห้องพักที่ซ่อนอยู่, สาหร่ายที่ประกอบตัวเอง, ทางเดินที่ปิดตาย ถูกบรรจุเป็นที่เก็บหรือพื้นที่อาศัย ไม่มีในแผนผังเดิม และบางส่วนก็เป็นภาระ\n\nวิศวกรนํากําลังเรียกร้องการตัดสินใจ การ เอา ทุก สิ่ง ที่ ไม่ ใช่ ใน แผน เดิม ออก ไป เป็น วิธี ที่ ถูก ต้อง. มันต้องใช้เวลา การทํางานรอบแก้ไขได้เร็วกว่า แต่แนะนําความผิดปกติของโครงสร้าง ที่ยากที่จะอธิบายให้วิศวกรในอนาคต"
 arkship.1370.desc.machine: "การรื้อถอนส่วนที่อยู่อาศัย ที่ไม่ใช่โครงสร้างของโครงสร้าง เปิดเผยการเปลี่ยนแปลงทางสถาปัตยกรรมที่ไม่ได้รับอนุญาต พาร์ทิชันที่ไม่บันทึก, การปรับเปลี่ยนเส้นทาง การเข้าถึง, และการติดตั้งโหลดแบบสด ได้รับการระบุในหลายโซน ไม่ มี เอกสาร ใด เป็น ลาย ลักษณ์ อักษร ของ การ ออก แบบ แบบ แบบ ดั้งเดิม.\n\nการเอาออกนั้นถูกต้องตามโครงสร้าง แต่ใช้เวลา มี เอกสาร และ วิธี แก้ ปัญหา"
 arkship.1370.desc.hive: "การรื้อถอนกําแพงภายในบริเวณกลางอําเภอ ได้เผยให้เห็นการปรับเปลี่ยนอาณานิคมที่ไม่ได้รับอนุญาต โพรงที่ซ่อนไว้ อุโมงค์ที่ฝังตัวเอง ผนึกห้องไว้เป็นรังไม้ และแต่ละหลังก็ขาด บ้างก็เป็นภาระ การกําจัดที่เหมาะสมเป็นวิธีการที่ถูกต้อง แต่ใช้เวลา การทํางานรอบๆ ตัวมันเร็วกว่า แต่เป็นการแนะนํา ความผิดปกติของโครงสร้าง ที่จะก่อปัญหาให้กับพวกดูแลรังในอนาคต"
 arkship.1370.a: "เอกสารที่เราสามารถทําได้ ทํางานกับคนอื่น"
 arkship.1370.b: "ลบทุกอย่างที่ไม่ได้อยู่ในข้อกําหนดเดิม"
 arkship.1370.c: "เรากําลังคิดอะไรอยู่?"
 refurbishment_rework_zone: "ขอบเขตการทํางาน"
 refurbishment_rework_zone_desc: "งาน ก่อ สร้าง ที่ แข็ง ขัน ใน พื้น ที่ เหล่า นี้ กําลัง ป้องกัน การ พัฒนา เขต งาน ใหม่ ๆ จน กว่า จะ ซ่อมแซม เสร็จ."

 arkship.1375.name: "ฉาก สุด ท้าย"
 arkship.1375.desc: "ดาดฟ้าสุดท้ายได้ผ่านการตรวจสอบเบื้องต้น การนั่งร้านเริ่มลดลงแล้ว โดยมาตรการส่วนใหญ่ การซ่อมแซมเสร็จสมบูรณ์\n\nหัวหน้าวิศวะฯ ได้ขอตรวจสอบอย่างละเอียดก่อน[Owner.Ruler.GetSheHe]ป้ายบนโครงสร้าง พวก เขา ยอม รับ ว่า ส่วน ใหญ่ เป็น พิธีรีตอง. ดาดฟ้าเกือบแน่ใจว่าดี\n\nแต่คําว่า \"เกือบ\" เป็นคําที่มักจะมีผลตามมา"
 arkship.1375.desc.machine: "เขตที่อยู่อาศัยสุดท้าย ผ่านขั้นตอนการตรวจสอบเบื้องต้น การตัดแผ่นกระดาษได้เริ่มต้นในพื้นที่ที่ต่ํากว่า โครงสร้างของกระดูก อยู่ระหว่างกระบวนการวินิจฉัยโรค\n\nการตรวจสอบขั้นที่สองนั้นเกือบแน่นอน แต่ความสมบูรณ์ยังคงเป็นเงื่อนไข อย่างเป็นทางการสําหรับการรับรองเต็มรูปแบบ"
 arkship.1375.desc.hive: "The final nesting deck has cleared its preliminary inspection. Drones are dismantling the scaffolding in the lower levels. By every observable measure, the renewal is complete. A full secondary verification cycle is necessary before final certification.\n\nWe are almost, but not entirely, certain it will confirm what the primary inspection found."
 arkship.1375.a: "เกือบจะดีพอ"
 arkship.1375.b: "เติมเต็มขั้นตอนการตรวจสอบเต็มรูปแบบ"
 refurbishment_inspection_hold: "การ ฉีด ยา"
 refurbishment_inspection_hold_desc: "การตรวจสอบโครงสร้างสุดท้าย การติดตั้งและงานก่อสร้างถูกระงับ"

 arkship.1380.name: "ความสมบูรณ์"
 arkship.1380.desc.full: "ส่วน สุด ท้าย ของ เรือ รบ§Y[Target.GetName]§!ได้ มี การ ทํา ความ สะอาด, ได้ รับ การ รับรอง, และ กลับ ไป ยัง ประชากร. สิ่ง ที่ เริ่ม ต้น เป็น ความ จําเป็น ที่ ขัด ขวาง ได้ ลง ความ เห็น ว่า เป็น สิ่ง ที่ กําลัง จะ บรรลุ ผล สําเร็จ. ยานลํานี้รู้สึกแตกต่าง ไม่เพียงแค่เสียงแบบโครงสร้าง แต่ด้วยวิธีการอื่นที่มากขึ้น\n\nคณะวิศวกรรมฯ ได้ส่งรายงานสุดท้าย พร้อมคําแนะนํามากมาย การ เลือก ที่ จะ ชี้ นํา ผล ของ งาน นี้ เป็น ของ ผู้ นํา."
 arkship.1380.desc.partial: "เรือ ข้าม ฟาก ของ เรือ รบ§Y[Target.GetName]§!ได้มีการประกาศเสร็จสิ้น การ ประเมิน ความ ซื่อ สัตย์ มั่นคง ของ มนุษย์ ยืน ยัน การ ปรับ ปรุง ที่ มี ความ หมาย มาก กว่า พื้น ฐาน แม้ ว่า คน เหล่า นั้น ที่ คุ้น เคย กับ ข้อ เสนอ เดิม จะ สังเกต ว่า ไม่ ได้ บรรลุ ข้อ กําหนด ทุก อย่าง และ ไม่ ใช่ การ ยอม ทน ทุก อย่าง จะ เหมาะ สม ที่ สุด.\n\nโครงการ นี้ ให้ ผล. ผลอาจจะดีกว่า"
 arkship.1380.desc.rushed: "เรือ ข้าม ฟาก ของ เรือ รบ§Y[Target.GetName]§!เสร็จแล้ว เอกสารถูกเซ็นแล้ว การนั่งร้านล่ม และลูกเรือได้ก้าวต่อไป\n\nคณะกรรมการตรวจสอบโครงสร้างได้ระบุว่า มีการยับยั้งการทูตบางอย่าง ว่าผลิตภัณฑ์สุดท้ายตรงกับมาตรฐานการรับรองน้อยที่สุด ในทุกหมวดหมู่ประเมิน ยานลํานี้ดีกว่าที่เคยเป็น ไม่ ว่า จะ ดี เท่า ไร ก็ ตาม เป็น คํา ถาม ที่ คณะ วิศวกรรม ได้ เลือก ที่ จะ ไม่ ถาม เสียง ดัง."
 arkship.1380.desc.full.machine: "การนํากลับมาใช้ใหม่§Y[Target.GetName]§!เสร็จสมบูรณ์แล้ว ทุกส่วนได้รับการรับรอง และกลับมาอยู่ในสถานะปฏิบัติการเต็มรูปแบบ การประเมินความถูกต้องของโครงสร้าง ยืนยันว่าผลออกมา จากพื้นฐานก่อนการปฏิรูป\n\nรายงานสุดท้ายได้รับการบันทึก ข้อเสนอแนะการแบ่งประเภทพร้อมใช้งาน"
 arkship.1380.desc.partial.machine: "การนํากลับมาใช้ใหม่§Y[Target.GetName]§!ได้รับการยืนยันว่าสมบูรณ์แล้ว การประเมินความถูกต้องของโครงสร้าง ยืนยันว่าการพัฒนา มากกว่าพื้นฐานการฟื้นฟู อย่าง ไร ก็ ตาม มี การ กําหนด ตัวแปร หลาย อย่าง ให้ บรรลุ ผล สําเร็จ ใน ขั้น สุด ท้าย แทน ที่ จะ ให้ ข้อ แนะ.\n\nรายได้ก็อยู่ในช่วงที่ยอมรับได้"
 arkship.1380.desc.rushed.machine: "การนํากลับมาใช้ใหม่§Y[Target.GetName]§!ได้ถูกบันทึกเป็นสุดท้าย การทบทวนโครงสร้างได้รับรองผลที่ออกมา ว่าเป็นมาตรฐานขั้นต่ําในการประเมินทั้งหมด\n\nการปรับปรุงปฏิบัติการเหนือพื้นฐานได้รับการยืนยันแล้ว ศักยภาพของโอปติเมชันยังไม่บรรลุผล"
 arkship.1380.desc.full.hive: "การฟื้นฟูของ§Y[Target.GetName]§!เสร็จสมบูรณ์แล้ว ทุก ส่วน ได้ รับ การ ตรวจ สอบ, สร้าง ใหม่, และ กลับ สู่ อาณานิคม. การสะท้อนรวมเข้ากับความเหลื่อมล้ําใหม่ น้ําหนักที่คุ้นเคยของเรือ ที่อีกครั้งอย่างเต็มรูปแบบ เสียงโครงสร้างจากที่ลึกที่สุด\n\nเราเป็นหนึ่งเดียวกัน อาณานิคม เลือก จุด ที่ กําลัง กลับ มา ใช้ อีก."
 arkship.1380.desc.partial.hive: "การฟื้นฟูของ§Y[Target.GetName]§!ได้มีการประกาศเสร็จสิ้น การวินิจฉัยโรค ยืนยันว่ามีการปรับปรุงจริง กว่าสภาพของเรือก่อนหน้า เรา รู้สึก ไม่ สบาย ใจ ที่ รู้ ว่า ไม่ ใช่ ทุก สิ่ง ที่ กําหนด ไว้ และ ไม่ ใช่ ทุก ส่วน ของ โครง สร้าง ที่ เหมาะ สม ที่ สุด.\n\nอาณานิคมแข็งแรงขึ้น มันอาจจะแข็งแรงขึ้น"
 arkship.1380.desc.rushed.hive: "การฟื้นฟูของ§Y[Target.GetName]§!เสร็จแล้ว การ บด เป็น การ ลด ลง ส่วน ต่าง ๆ ก็ เปิด และ โดรน ที่ พลัด ถิ่น ก็ กลับ ไป ยัง ที่ ที่ ได้ รับ มอบ หมาย. เราตระหนักอย่างไม่สบายใจว่า เราบรรลุมาตรฐานการรับรองที่ต่ําที่สุด ในทุกการจัดหมวดหมู่\n\nการฟื้นฟูบรรลุเป้าหมาย มันบรรลุศักยภาพของมัน เป็นสิ่งที่เราเลือกที่จะไม่ยึดติดกับมัน"
 arkship.1380.a: "คณะกรรมการการปรับปรุงตารางไฟฟ้า"
 arkship.1380.b: "กํากับระบบเพาะปลูก"
 arkship.1380.c: "ลงทุนในระบบการป้องกัน"
 arkship.1380.d: "มุ่งเน้นไปที่การขยายบ้าน"

 refurbishment_ongoing_gestalt: "การ ซ่อมแซม ใหญ่:"
 refurbishment_ongoing_gestalt_desc: "เรือลํานี้กําลังปรับปรุงโครงสร้าง กิจกรรมการก่อสร้างในหลาย ๆ ส่วน มีส่วนช่วยในการรบกวนของเรือในความมั่นคง การผลิตโดรนและ ความสามารถในการก่อสร้างอําเภอ"

 refurbishment_city_offline_gestalt: "$district_ark_city$– ภายใต้การเปลี่ยนชื่อ"
 refurbishment_city_offline_gestalt_desc: "อําเภอหลักของเรือ ถูกปิดสําหรับงานโครงสร้าง เรา เบียด เสียด กัน อยู่ ใน ส่วน ที่ เหลือ ทํา ให้ บ้าน เรือน และ ผล ผลิต ของ คน งาน แออัด."

 refurbishment_low_morale_gestalt: "การระบุขอบเขต"
 refurbishment_low_morale_gestalt_desc: "สภาวะที่แออัด และการสนับสนุนที่ไม่เพียงพอ กําลังเพิ่มความเสถียรของเรือและแรงกระแทก"

 refurbishment_construction_fatigue_gestalt: "การก่อสร้างแฟกนิค"
 refurbishment_construction_fatigue_gestalt_desc: "เรากําลังฟื้นตัวจากปฏิบัติการต่อเนื่อง การแสดงผลลดลง ในขณะที่วงจรปฏิบัติการใหม่กําลังดําเนินอยู่"

 refurbishment_administrative_burden_gestalt: "เบอร์เดน"
 refurbishment_administrative_burden_gestalt_desc: "การ ดู แล โครงการ เพื่อ สวัสดิภาพ ได้ วาง ข้อ เรียก ร้อง สําคัญ ใน เรื่อง ความ คิด ที่ ซับ ซ้อน."

 refurbishment_power_grid: "เส้นกริดของพลังงาน"
 refurbishment_power_grid_desc: "อําเภอเครื่องกําเนิดไฟฟ้าเสร็จตามข้อกําหนดสูงสุด การปรับโครงสร้างโครงสร้างโครงสร้างใหม่ ส่งผลให้พลังงานที่เพิ่มขึ้นอย่างมาก"

 refurbishment_power_grid_partial: "ตารางพลังงานที่ปรับปรุงแล้ว"
 refurbishment_power_grid_partial_desc: "การซ่อมแซมอําเภอเครื่องกําเนิดไฟฟ้า ส่งผลให้มีการปรับเปลี่ยนพลังงานอย่างมีนัยยะ ถึงแม้ว่าไม่เป็นไปตามข้อกําหนดทุกอย่างก็ตาม"

 refurbishment_power_grid_weak: "เส้นกริดของพลังงานที่ซ้อน"
 refurbishment_power_grid_weak_desc: "อําเภอเครื่องกําเนิดไฟฟ้าได้รับการรับรองว่า ปฏิบัติการต่อจากการปรับปรุง การ อัพเกรด บาง อย่าง ยัง ไม่ เสร็จ สมบูรณ์ แต่ การ ผลิต พลัง งาน ได้ พัฒนา ขึ้น มาก กว่า ระดับ พื้น ฐาน."

 refurbishment_cultivation_decks: "แผ่น ดิน เหนียว"
 refurbishment_cultivation_decks_desc: "เขต เกษตรกรรม ได้ สร้าง เสร็จ ตาม เงื่อนไข ที่ สูง สุด."

 refurbishment_cultivation_decks_partial: "ชั้น ที่ พัฒนา แล้ว"
 refurbishment_cultivation_decks_partial_desc: "การ ซ่อมแซม ทาง เกษตรกรรม ทํา ให้ มี การ ปรับ ปรุง ด้าน การ ผลิต อาหาร อย่าง มี ความ หมาย แม้ ว่า มี การ วาง แผน ปรับ ปรุง หลาย อย่าง หรือ ทํา ให้ ง่าย ขึ้น."

 refurbishment_cultivation_decks_weak: "แผ่น ดิน เหนียว"
 refurbishment_cultivation_decks_weak_desc: "อําเภอได้รับการรับรอง หลังจากการปรับปรุง ผล การ ออก เสียง ได้ รับ การ ปรับ ปรุง อย่าง เหมาะ สม แม้ ว่า การ อัพเกรด หลาย อย่าง ยัง ไม่ ได้ ใช้ อย่าง เต็ม ที่."

 refurbishment_defense_systems: "ระบบป้องกันแบบเสริม"
 refurbishment_defense_systems_desc: "ส่วน ที่ อยู่ เหนือ ธรณี ถูก ทํา ให้ เสร็จ ตาม เงื่อนไข ที่ สูง สุด. เรือ นี้ มี ความ ยืดหยุ่น มาก กว่า ใน การ ต่อ สู้."

 refurbishment_defense_systems_partial: "ปรับ ปรุง ระบบ ป้องกัน"
 refurbishment_defense_systems_partial_desc: "การซ่อมแซมแนวป้องกัน ส่งผลให้ระบบรบของเรือรบดีขึ้น บาง ส่วน ของ โครง สร้าง ถูก กําหนด ให้ ยอม รับ แทน ที่ จะ ยอม รับ การ ยอม รับ."

 refurbishment_defense_systems_weak: "ระบบป้องกันแบบผนวก"
 refurbishment_defense_systems_weak_desc: "หน่วยป้องกันได้รับการรับรอง หลังจากการปรับปรุง อย่าง ไร ก็ ตาม ยัง ไม่ ได้ ทํา การอัพเกรด เสริม หลาย อย่าง."

 refurbishment_power_grid_gestalt: "เส้นกริดของพลังงาน"
 refurbishment_power_grid_gestalt_desc: "อําเภอเครื่องกําเนิดไฟฟ้าเสร็จตามข้อกําหนดสูงสุด โครงสร้างพื้นฐานที่เสริมสร้างใหม่ ได้ปรับปรุงการผลิตพลังงานอย่างมีนัยสําคัญ และมีประสิทธิภาพในการดําเนินการ"

 refurbishment_power_grid_partial_gestalt: "ตารางพลังงานที่ปรับปรุงแล้ว"
 refurbishment_power_grid_partial_gestalt_desc: "การซ่อมแซมเขตเครื่องกําเนิดไฟฟ้า ส่งผลให้มีการปรับปรุงพลังงานอย่างมีนัยสําคัญ และมีประสิทธิภาพในการดําเนินการ แม้ว่าการอัพเกรดทางท่อ หลายเครื่องจะเสร็จสมบูรณ์แล้ว"

 refurbishment_power_grid_weak_gestalt: "เส้นกริดของพลังงานที่ซ้อน"
 refurbishment_power_grid_weak_gestalt_desc: "อําเภอเครื่องกําเนิดไฟฟ้าได้รับการรับรองว่า ปฏิบัติการต่อจากการปรับปรุง อย่าง ไร ก็ ตาม การ ปรับ ปรุง บาง อย่าง ยัง ไม่ สําเร็จ."

 refurbishment_cultivation_decks_gestalt: "แผ่น ดิน เหนียว"
 refurbishment_cultivation_decks_gestalt_desc: "เขต เกษตรกรรม ได้ สร้าง เสร็จ ตาม เงื่อนไข ที่ สูง สุด. การ ผลิต และ คุณภาพ ได้ ดี ขึ้น อย่าง น่า ทึ่ง โดย ทาง เรือ."

 refurbishment_cultivation_decks_partial_gestalt: "ชั้น ที่ พัฒนา แล้ว"
 refurbishment_cultivation_decks_partial_gestalt_desc: "เรา ได้ ให้ การ ปรับ ปรุง ที่ มี ความ หมาย เพื่อ การ ผลิต แต่ ก็ มี การ เลื่อน การ ปรับ ปรุง หลาย อย่าง ออก ไป หรือ ทํา ให้ ง่าย ขึ้น."

 refurbishment_cultivation_decks_weak_gestalt: "แผ่น ดิน เหนียว"
 refurbishment_cultivation_decks_weak_gestalt_desc: "อําเภอได้รับการรับรอง หลังจากการปรับปรุง การ ปรับ ปรุง ด้าน การ เงิน ได้ ดี ขึ้น อย่าง ไม่ ต้อง สงสัย แม้ ว่า การ ปรับ ปรุง หลาย อย่าง ยัง ไม่ ได้ ใช้ อย่าง เต็ม ที่."

 refurbishment_residential_expansion_gestalt: "การขยายเขตการปกครอง"
 refurbishment_residential_expansion_gestalt_desc: "อําเภออยุธยา เสร็จสมบูรณ์ตามข้อกําหนดสูงสุด ระบบ เกื้อ หนุน สมัย ใหม่ ได้ ปรับ ปรุง สภาพ ต่าง ๆ ทั่ว ทั้ง เรือ."

 refurbishment_residential_expansion_partial_gestalt: "การ ขยาย เขต สงวน"
 refurbishment_residential_expansion_partial_gestalt_desc: "การ ซ่อมแซม ที่ พัก อาศัย ทํา ให้ มี การ ปรับ ปรุง อย่าง มี ความ หมาย ใน การ ประสาน งาน กัน แม้ ว่า ขอบ เขต ทั้ง หมด ของ แผนการ ขยาย ตัว ไม่ เป็น จริง."

 refurbishment_residential_expansion_weak_gestalt: "การ ปรับ ปรุง ที่ น้อย ที่ สุด"
 refurbishment_residential_expansion_weak_gestalt_desc: "อําเภอได้รับการรับรองภายหลังการปรับปรุง แม้ว่าการอัพเกรดหลาย ๆ อย่างจะยังไม่สมบูรณ์"

 refurbishment_fleet_capacity: "ขยายกองยานความจุ"
 refurbishment_fleet_capacity_desc: "เมื่อ ไม่ นาน มา นี้ เรือ กําปั่น ที่ แล่น อยู่ เหนือ อ่าว ได้ เสริม กําลัง และ ปรับ ปรุง โครง สร้าง ทาง ทหาร ให้ ทัน สมัย ทํา ให้ กอง เรือ ที่ กว้าง ขึ้น สามารถ ดําเนิน การ ได้ มาก ขึ้น."

 refurbishment_residential_expansion: "การขยายเขตการปกครอง"
 refurbishment_residential_expansion_desc: "อําเภออยุธยา เสร็จสมบูรณ์ตามข้อกําหนดสูงสุด ระบบ เกื้อ หนุน สมัย ใหม่ มี สภาพ การณ์ ที่ ดี ขึ้น อย่าง มี ความ หมาย สําหรับ ทุก คน บน เรือ."

 refurbishment_residential_expansion_partial: "การ ขยาย เขต สงวน"
 refurbishment_residential_expansion_partial_desc: "การ ซ่อมแซม ที่ พัก อาศัย ทํา ให้ มี การ ปรับ ปรุง ให้ ดี ขึ้น อย่าง มี ความ หมาย ใน เรื่อง สภาพ การณ์ และ การ บริหาร งาน แม้ ว่า ไม่ ได้ เป็น จริง ตาม แผนการ อย่าง เต็ม ที่."

 refurbishment_residential_expansion_weak: "การ ปรับ ปรุง ที่ น้อย ที่ สุด"
 refurbishment_residential_expansion_weak_desc: "เขตที่อยู่อาศัยได้รับการรับรอง หลังจากการปรับปรุง ความ สามารถ ใน การ หา เลี้ยง ชีพ ได้ ดี ขึ้น ตาม ริม ขอบ ถึง แม้ ว่า การ อัพเกรด หลาย อย่าง ยัง ไม่ ได้ ใช้ อย่าง เต็ม ที่."

 # Star-Crossed Lovers

 arkship.1385.name: "พอด"
 arkship.1385.desc: "เครื่องสแกนระยะไกลของเรา ได้ระบุวัตถุ ที่ลอยอยู่ที่ขอบของระบบ การ ตรวจ สอบ ที่ ใกล้ เข้า มา เผย ให้ เห็น ความ ไม่ เสมอ ต้น เสมอ ปลาย ทาง เรขาคณิต ที่ แม่นยํา ใต้ พื้น ผิว และ สัญลักษณ์ ของ พลัง งาน ที่ อยู่ นิ่ง ๆ ซึ่ง ฝัง อยู่ ใต้ เปลือก หิน หนา.\n\nกระสวยการอยู่รอดของจุดกําเนิดไม่ทราบ ภายนอกถูกพรางตัวเพื่อหลีกเลี่ยงการตรวจจับ ไม่พบการส่งสัญญาณใดๆ ที่ทํางาน แต่ร่องรอยการค้ําจุนจากสิ่งมีชีวิตยังคงเหลืออยู่ภายใน อะไรก็ตามที่วางอยู่ภายในได้รับการลอยเป็นเวลานานมาก"
 arkship.1385.a: "มาดูกันว่าอะไรอยู่ข้างใน"
 arkship.1385.b: "ให้ก้อนหินเป็นก้อนหิน"

 arkship.1390.name: "ที่รัก"
 arkship.1390.desc: "ภายใต้เปลือกแร่ เราค้นพบฝักที่เสียหายมาก ภายในเราพบผู้อาศัยเพียงคนเดียว เสียชีวิตไปแล้ว ร่าง ของ พวก เขา ถูก สวม เสื้อ กัน หนาว ที่ ไหล ออก มา ไม่ เหมาะ กับ การ เดิน ทาง ท่อง เที่ยว. ดูเหมือนว่าพวกเขาถูกบังคับให้เข้าไปข้างใน\n\nภายในของฝักมีสัญญาณชัดเจนของความรุนแรง การ กัก ขัง ภาย ใน หลาย ครั้ง ถูก บังคับ ให้ ทํา. ภาชนะ นี้ ไม่ เป็น สถาน บริสุทธิ์ เป็น คุก มี เพียง สอง สิ่ง เท่า นั้น ที่ สามารถ ค้น พบ ได้: ชุด พิกัด และ ข่าวสาร ที่ ปิด ผนึก ไว้. มีคําจารึกที่เรียบง่าย\n\n§Hเพื่อที่รักของฉัน§!"
 arkship.1390.a: "กําหนดเส้นทางสําหรับพิกัด"
 arkship.1390.b: "เราไม่ควรเสียเวลากับเรื่องนี้"

 arkship.1395.name: "ผู้รอดล่าสุด"
 arkship.1395.desc: "ในที่สุดเราก็ไปถึงแคปซูล ที่ระบุจากพิกัดที่กู้มาได้ ภายในเราค้นพบสิ่งมีชีวิตอื่น หนึ่งนี้ยังมีชีวิตอยู่\n\nความเสียหายทางร่างกายรุนแรงมาก การปล่อยข้อมูลล้มเหลว[event_target:star_crossed_survivor.GetHisHer]ที่ใกล้จะตาย ฝักทั้งสองถูกแยกออกไปนานแล้ว ปลายทางของพวกเขาไม่เคยไปถึง\n\nเราจับเอเลี่ยนได้แล้ว ที่บอกให้เราโทร[event_target:star_crossed_survivor.GetHimHer] [event_target:star_crossed_survivor.GetName]การฟื้นตัวเต็มที่ยังห่างไกล"
 arkship.1395.a: "มั่นใจ[event_target:star_crossed_survivor.GetHeShe]หายแล้ว"

 arkship.1400.name: "มาสแคร์"
 arkship.1400.desc: "[event_target:star_crossed_survivor.GetName]บัญชีถูกบันทึกระหว่าง[event_target:star_crossed_survivor.GetHisHer]การกู้คืน:\n\n§H\"มีการสังหารหมู่ ทุกครอบครัว ถูกลบ มันถูกนําเสนอเป็นการโจมตี โดยจักรวรรดิคู่แข่ง แต่นั่นเป็นเรื่องโกหก คน เหล่า นั้น ที่ มี อํานาจ ได้ จัด การ เรื่อง นี้ ด้วย ตัว เอง เป็น ความ รุนแรง ที่ คิด ขึ้น มา เพื่อ แก้ ตัว ให้ กับ สงคราม ที่ ไร้ สติ. ที่รักของฉันและฉันได้พบหลักฐาน คําสั่งภายใน บันทึกที่ยังไม่ได้บันทึก\n\n\"เราปลดปล่อยมัน\" เราคาดหวังผลที่จะตามมา สิ่งที่เราคาดไม่ถึงก็คือ การเนรเทศ\"§!\n\nข้อมูลที่เสียหาย แต่สามารถกู้ข้อมูล จากธนาคารข้อมูลของฝัก ได้อยู่ในครอบครองของเราแล้ว"
 arkship.1400.a: "เราพบข้อความจากคนรักของคุณ"

 arkship.1405.name: "สงคราม เลือด"
 arkship.1405.desc: "[event_target:star_crossed_survivor.GetName]บัญชีถูกบันทึกเต็มระหว่าง[event_target:star_crossed_survivor.GetHisHer]การกู้คืน:\n\n§H\"กองเรือได้มาถึงแล้ว เราเห็นพวกมันก่อนที่จะมาถึงเรา[event_target:star_crossed_empire.GetName]ได้ ทํา สงคราม กับ เรา เป็น เวลา หลาย ปี นับ ตั้ง แต่ เรา ปฏิเสธ ข้อ เรียก ร้อง ของ พวก เขา ที่ จะ ทํา สงคราม กับ เรา. กองกําลังของเราถูกเอาชนะอย่างสิ้นหวัง\n\n\"ในที่สุด พ่อแม่ของผมก็เชื่อในแคปซูลเหล่านี้ พวกเขาบังคับให้ที่รักของฉันและฉันเข้าสู่ความว่างเปล่า ความไม่แน่ใจของเราการชุมนุมของเราซ้าย§!\n\nการสํารวจระบบของฝักได้ค้นพบข้อมูลวิศวกรรม จากช่วงสงคราม"
 arkship.1405.a: "$arkship.1400.a$"

 arkship.1410.name: "การ ค้น หา ที่ เป็น อันตราย"
 arkship.1410.desc: "[event_target:star_crossed_survivor.GetName]บัญชีถูกบันทึกเต็มระหว่าง[event_target:star_crossed_survivor.GetHisHer]การกู้คืน:\n\n§H\"จักรวรรดิของเราเคยภูมิใจ ในเกียรติทั้งชีวิตและความตาย จุดประสงค์ของเราคือ การยืดเวลาการดํารงอยู่และความสะดวก ทางเดินระหว่างพวกเขา แต่ไม่เคยที่จะข้ามมันทั้งหมด ความเป็นอมตะ ผ่านการขึ้นสวรรค์แบบสังเคราะห์ เป็นสิ่งน่ารังเกียจต่อความเชื่อของเรา ความ รู้ ดัง กล่าว ไม่ เคย มี วัน ถูก ครอบ งํา. แต่ ความ อยาก รู้ อยาก เห็น แพร่ ไป ทั่ว หมู่ ประชากร. เมื่อ มัน ไม่ สามารถ ควบคุม ได้ อีก ต่อ ไป ผู้ มี อํานาจ ปกครอง ถือ ว่า ความ เสี่ยง นั้น เป็น สิ่ง ที่ ยอม รับ ไม่ ได้.\n\n\"พวกเขาเลือกการอนุรักษ์ จักรวรรดิของเราถูกทําลาย เพื่อฝังความจริง เพียง แต่ที่รักของฉันและฉันถูกไว้ชีวิต, ถูกบังคับให้เข้าไปในฝักเหล่านี้ โทษที่จะลอยระหว่างชีวิตและความตาย.\"§!\n\nข้อมูลของฝักได้ถูกถอดรหัสแล้ว"
 arkship.1410.a: "$arkship.1400.a$"

 arkship.1415.name: "อมฤตยู"
 arkship.1415.desc: "[event_target:star_crossed_survivor.GetName]บัญชีถูกบันทึกระหว่าง[event_target:star_crossed_survivor.GetHisHer]การกู้คืน:\n\n§Hฉันมีเพื่อนร่วมงาน เพื่อนหรือดังนั้นฉันจึงเชื่อว่า เราทํางานด้วยกันมาหลายปี เมื่อผมได้รับการแต่งตั้งให้เป็นผู้นําโครงการ[event_target:star_crossed_survivor.GetHeShe]แสดงความยินดีด้วย\n\n\"หนึ่งเดือนต่อมาที่รักของฉันและฉันถูกยึด ข้อกล่าวหา ไม่มีการพิจารณาคดี เราถูกใส่ลงในฝัก ก่อนที่ผมจะเสร็จถามว่าทําไม ตอนนี้ฉันรู้แล้วว่าความทะเยอทะยาน ไม่จําเป็นต้องมีเหตุผล มันแค่ต้องการโอกาส\"§!\n\nบันทึกส่วนบุคคลจากระบบภายในของฝัก ให้รายละเอียดเกี่ยวกับการปกครองของจักรวรรดิ"
 arkship.1415.a: "$arkship.1400.a$"

 arkship.1420.name: "เพสท์"
 arkship.1420.desc: "[event_target:star_crossed_survivor.GetName]บัญชีถูกบันทึกเต็มระหว่าง[event_target:star_crossed_survivor.GetHisHer]การกู้คืน:\n\n§H\"เชื้อไวรัสแผ่ขยายผ่านจักรวรรดิของเรา ประชาชน ของ เรา พินาศ อย่าง รวดเร็ว และ ปราศจาก ความ เมตตา เชื่อกันว่ามีต้นกําเนิดมาจากหนึ่งในดินแดนอันกว้างใหญ่ของเรา อันเป็นผลมาจากความเกินเหตุและความห่วงใยของตัวเอง ที่รักของข้าและข้าเลือกที่จะอยู่ ร่วมกับคนของเราจนถึงที่สุด\n\nแต่พ่อแม่ฉันเข้ามาแทรกแซง ฝืนใจเรา เราถูกบังคับในฝักเหล่านี้ และโยนทิ้งไป เทคโนโลยีนี้ถูกสร้างมาเพื่อรักษาพวกเรา มันดูเหมือนล้มเหลว\"§!\n\nชิ้นส่วนชีวภาพจากระบบช่วยชีวิตของฝักถูกพบ"
 arkship.1420.a: "$arkship.1400.a$"

 arkship.1425.name: "ข้อตกลงที่ซ่อน"
 arkship.1425.desc: "[event_target:star_crossed_survivor.GetName]บัญชีถูกบันทึกเต็มระหว่าง[event_target:star_crossed_survivor.GetHisHer]การกู้คืน:\n\n§H\"พ่อแม่ฉันรู้ว่า[event_target:star_crossed_empire.GetName]ใกล้จะตื่นแล้ว หมดหวังที่จะรักษาความปลอดภัยความโปรดปรานของ พวกเขาหลงต่อรอง ประชากรของเรา 1 ใน 4 ถูกเสนอเพื่อแลกกับอํานาจ ที่รักของฉันและฉันค้นพบการออกแบบของพวกเขา\n\n\"แต่น้อยคนฟังและผู้ที่ทําถูกเงียบ เราถูกบังคับให้เข้าไปในฝักเหล่านี้และโยนลงในที่ว่างเปล่าทิ้งตามที่อื่น ๆ มาก ๆ ที่ได้รับมาก่อนเรา.\"§!\n\nเอกสารจากคลังที่ปิดตายของฝักถูกรื้อพบ"
 arkship.1425.a: "$arkship.1400.a$"

 arkship.1430.name: "สหภาพต้องห้าม"
 arkship.1430.desc: "[event_target:star_crossed_survivor.GetName]บัญชีถูกบันทึกเต็มระหว่าง[event_target:star_crossed_survivor.GetHisHer]การกู้คืน:\n\n§H\"ฉันไม่ได้ถูกเนรเทศสําหรับสิ่งที่ฉันทํา ฉันถูกเนรเทศเพราะคนที่ฉันรัก\n\n\"คนของเราอยู่ในสงคราม เราเป็นมาหลายชั่วอายุคนแล้ว ในสายตาของคนของเรา พันธบัตรของเราเป็นการละเมิด, หนึ่งที่สามารถละเลย เรา ไม่ ยอม แยก จาก กัน โดย เชื่อ ว่า ความ ผูก พัน ของ เรา อาจ แสดง ถึง คุณค่า ของ สันติ สุข.\n\n\"เราถูกบังคับให้เข้าไปในฝักเหล่านี้ และโยนลงในความว่างเปล่าอย่างไม่หยุดยั้ง แต่ความรักของเราไม่สามารถถูกอาบแดด.\"§!\n\nการสื่อสารส่วนตัวระหว่างทั้งสองผู้ลี้ภัย พบในฝัก การอ่านสร้างแรงบันดาลใจ"
 arkship.1430.a: "$arkship.1400.a$"

 arkship.1435.name: "เสียง กระซิบ ใน วอยด์"
 arkship.1435.desc: "[event_target:star_crossed_survivor.GetName]บัญชีถูกบันทึกเต็มระหว่าง[event_target:star_crossed_survivor.GetHisHer]การกู้คืน:\n\n§H\"มันเริ่มต้นการปรากฏตัวที่ขอบของความคิด แล้วผมก็ได้ยินเสียงนั่น เสียง กระซิบ ตาม มา ของ ผม เวลา ก็ แจ่ม ชัด ขึ้น และ พูด เป็น ชิ้น ๆ. ประชาชนของเรากลัวในสิ่งที่ฉันเป็น แต่ที่รักของฉันอยู่ข้างๆฉัน\n\n\"Taketer,เราถูกบังคับให้เข้าไปในฝักนี้และโยนลงในช่องว่าง, เอาออกไปก่อนที่สิ่งที่ได้สัมผัสใจของฉันสามารถแพร่กระจาย แม้แต่ตอนนี้ ฉันยังได้ยินมัน กระซิบ.\"§!\n\nบันทึกเซ็นเซอร์ของฝักได้เปิดเผย ข้อมูลที่น่าสนใจ"
 arkship.1435.a: "$arkship.1400.a$"

 arkship.1440.name: "คําสุดท้าย"
 arkship.1440.desc: "[event_target:star_crossed_survivor.GetName]อาการแย่ลงอย่างรวดเร็ว ไม่นานก่อนที่พวกมันจะจากไป เราถอดรหัสข้อความที่ถูกผนึกไว้ จากฝักสหาย การส่งสัญญาณอ่าน:\n\n§H\"ที่รักของฉัน\n\n\"ถ้าได้ยินอย่างนี้ โชคชะตาก็เมตตาเธอมากกว่าฉัน จงรู้เถิดว่า แม้ในความว่างเปล่า ข้าก็ไม่เคยโดดเดี่ยว ข้าก็ยังพาเจ้าไปกับข้าเสมอ\"§!\n\nหลังจากข้อความจบ[event_target:star_crossed_survivor.GetName]สัญญาณที่สําคัญยุติลง เป็นครั้งแรกตั้งแต่ตื่น[event_target:star_crossed_survivor.GetHisHer]การแสดงออกอยู่อย่างสงบ"
 arkship.1440.a: "ไปสู่สุขคติ[event_target:star_crossed_survivor.GetName]."
 arkship.1440.a.tooltip: "พยานสุดท้ายของพวกเขา ได้ให้ข้อมูลอันมีค่ากับเรา[event_target:star_crossed_empire.GetName]."

 star_crossed_lovers_chain_title: "Star-Crossed Lovers"
 star_crossed_lovers_chain_desc: "ข้อความที่ถูกผนึก และพิกัดที่กู้มาได้ จากฝักลม ไม่ ว่า จะ เป็น เรื่อง อะไร ก็ ตาม ที่ อยู่ เบื้อง หลัง พวก เขา ก็ รอ นาน แล้ว ที่ จะ ได้ รู้."

 STAR_CROSSED_POD_PROJECT: "สแกน พอด"
 STAR_CROSSED_POD_PROJECT_DESC: "เรา ต้อง ตรวจ สอบ อย่าง ถี่ถ้วน เพื่อ ดู ว่า วัตถุ นั้น มา จาก ไหน และ สิ่ง ใด ก็ ตาม ที่ อยู่ ใน นั้น รอด มา ได้ นาน แล้ว โดย ผ่าน ช่อง ว่าง."

 star_crossed_pod_object: "Mysterious Pod"
 star_crossed_pod_object_tooltip: "Mysterious Pod"
 star_crossed_pod_object_desc: "วัตถุที่ประกอบด้วยองค์ประกอบที่ผิดปกติ ภายนอกที่พรางตัว การ ตรวจ สอบ ใกล้ ๆ เผย ให้ เห็น ความ ไม่ เสมอ ต้น เสมอ ปลาย ทาง เรขาคณิต ที่ แม่นยํา ใต้ หิน. สัญญาณพลังงานดอร์แมนท์ยังคงอยู่ข้างใน"

 star_crossed_survivor_pod_object: "พอด ผู้ รอด ชีวิต"
 star_crossed_survivor_pod_object_tooltip: "พอด ผู้ รอด ชีวิต"
 star_crossed_survivor_pod_object_desc: "ฝักที่สอง ลอยอยู่ในช่องว่าง ระบบของมันอยู่ในสภาพที่ดีกว่าครั้งแรก แม้เพียงนิดเดียว ร่องรอยการค้ําจุนชีวิต ยังริบหรี่อยู่ภายใน"

 STAR_CROSSED_SURVIVOR_POD_PROJECT: "สแกน พอด ผู้ รอด ชีวิต"
 STAR_CROSSED_SURVIVOR_POD_PROJECT_DESC: "เราต้องบินไปยังระบบที่ระบุไว้ และสแกนฝัก เพื่อตรวจสอบว่าเจ้าของยังคงมีชีวิตอยู่หรือไม่"
