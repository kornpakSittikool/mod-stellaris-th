### Cosmogenesis Events

 crisis.7100.name: "ความใคร่รู้อันไม่รู้จบ"
 crisis.7100.desc: "วิทยาศาสตร์คือสัจพจน์ที่ปูทางสู่ความก้าวหน้า หากเราปรารถนาจะบรรลุศักยภาพที่แท้จริง ก็ไม่มีหนทางอื่นอีกแล้ว ความเชี่ยวชาญทางเทคโนโลยีของเรานั้นชัดเจนในตัวเอง แต่ยังมีอีกมากเกินกว่าจะเข้าใจได้ในตอนนี้ ทั้งวิถีของจักรวรรดิที่ล่มสลาย พลังของเลวีอาธาน และปริศนาแห่งญาณพลังจิต...\n\nการจะสกัดความหมายจากแก่นในสุดของความเป็นจริง ต้องอาศัยวิทยาศาสตร์ชนิดใหม่ และคอมพิวเตอร์ชนิดใหม่ เครื่องกลึงไซแน็ปติกคือก้าวแรกอันสำคัญของการเดินทางสู่ความรู้ไร้ขีดจำกัด"
 crisis.7100.a: "ความรู้คือพลัง"
 new_cosmogenesis_tech_tt: "§Yสิทธิพิเศษวิกฤต§!: ปลดล็อกตัวเลือกวิจัยใหม่"

 crisis.7105.name: "ไครซิสเลเวล 2"
 crisis.7105.desc: "ขณะที่เรายังคงคลี่คลายความลับของจักรวาล เราได้ยืนยันแล้วว่าแรงโน้มถ่วงมีบทบาทสำคัญอย่างยิ่งในการหล่อหลอมความเป็นจริงข้ามมิติต่างๆ ผลของมันต่อเวลาและอวกาศยังเป็นเพียงพื้นฐาน แต่ปริศนานี้ยังมีอีกมากให้ค้นหา\n\nทุกชิ้นส่วนของความรู้ที่เรารวบรวมได้เผยให้เห็นความเป็นไปได้ใหม่ บางอย่างอาจนำไปใช้ในอุตสาหกรรมหรือการทหารโดยตรง บางอย่างอาจเปิดประตูสู่ทฤษฎีที่ครั้งหนึ่งไม่อาจจินตนาการได้ ยังมีอีกมากที่เราต้องเรียนรู้"
 crisis.7105.a: "เรารู้ว่าเราไม่รู้อะไรเลย"

 crisis.7110.name: "ไครซิสเลเวล 3"
 crisis.7110.desc: "อิทธิพลของแรงโน้มถ่วงนั้นน่าทึ่งอย่างแท้จริง แม้เราจะค้นพบวิธีใหม่ในการควบคุมมันแล้ว แต่ความหมายที่แท้จริงของงานเรายังคงไม่ถูกสำรวจ เรามั่นใจว่าแรงโน้มถ่วงยังคงเป็นตัวเลือกที่ดีที่สุดในการเจาะทะลุความเป็นจริงปัจจุบันของเรา ไม่ต่างจากที่หลุมดำส่งผลต่อจักรวาลรอบตัวมัน\n\nเราตั้งสมมติฐานว่า การเข้าถึงสิ่งที่เปรียบเสมือนอีกด้านหนึ่งของความเป็นจริง อาจทำให้เราเปลี่ยนกฎในด้านนี้ได้ นี่คือสาขาการศึกษาที่อันตราย แต่ความระมัดระวังต้องไม่กลายเป็นอุปสรรคต่อความก้าวหน้า"
 crisis.7110.a: "แรงโน้มถ่วงปกครองเราทุกคน... อย่างน้อยก็ในตอนนี้"

 crisis.7115.name: "ไครซิสเลเวล 4"
 crisis.7115.desc: "เราคิดถูก หากเคยมีข้อกังขาใดเกี่ยวกับงานของเรา บัดนี้มันได้ถูกปัดตกไปแล้ว\n\nแรงโน้มถ่วงสามารถใช้บิดกฎของความเป็นจริงได้ แต่หากปรับจูนอย่างถูกต้อง มันจะทำลายกฎเหล่านั้นได้ทั้งหมดหรือไม่ จนถึงตอนนี้ การทดลองของเรายังอยู่ในระดับเล็กที่สุด และทุกการแก้ไขของเราถูกลบล้างอย่างรวดเร็วเมื่อความเป็นจริงคืนสู่ค่าตั้งต้นของมัน ตอนนี้เราสงสัยว่านี่เป็นเพียงปัญหาเรื่องขนาดเท่านั้น หากใช้พาราด็อกซ์เชิงพลังงานในระดับที่ยิ่งใหญ่กว่ามาก เราอาจลดต้นทุนของการแก้ไขเช่นนี้ลงได้อย่างมหาศาล... อย่างน้อยก็ในมิติของเรา\n\nไม่ว่าความเสี่ยงจะมากเพียงใด ตอนนี้ไม่มีทางหันกลับแล้ว มีเพียงผู้ที่กล้าทำลายกฎเท่านั้น จึงจะมีสิทธิ์เขียนมันขึ้นใหม่"
 crisis.7115.a: "เราพร้อมเดิมพันทุกสิ่ง"

 crisis.7120.name: "ไครซิสเลเวล 5"
 crisis.7120.desc: "มันไม่น่าจะเป็นไปได้ แต่มันก็เป็นไปแล้ว ไม่ว่าเราจะลองอย่างไร การแก้ไขความเป็นจริงของเรายังคงเกิดขึ้นเพียงชั่วคราวอย่างดื้อรั้น จักรวาลนี้แก่เกินกว่าที่การเปลี่ยนแปลงจะหยั่งรากได้ แต่ท่ามกลางความหงุดหงิด บางครั้งโอกาสก็ก่อกำเนิดขึ้น และการทดลองใหม่ครั้งหนึ่งก็มอบผลลัพธ์ที่ไม่คาดคิด แม้เราจะรู้มานานแล้วว่ามีมิติอื่นอยู่ แต่หนทางที่จะเดินทางไปที่นั่นได้อย่างมั่นคงยังคงหลบหนีมือเรามาโดยตลอด\n\nแต่ไม่อีกต่อไป จักรวาลที่อ่อนวัยกว่านั้นอาศัยอยู่ภายในแรงโน้มถ่วงอนันต์ของภาวะเอกฐาน และพวกมันพิสูจน์แล้วว่ายืดหยุ่นกว่ามาก\n\nเรามีเทคโนโลยีสำหรับส่งโพรบเข้าไปในหลุมดำแล้ว เมื่อข้ามขอบฟ้าเหตุการณ์เข้าไป พวกมันจะเริ่มกดทับและบิดระนาบแห่งจักรวาลอ่อนวัยเหล่านี้ให้เป็นไปตามเจตจำนงของเรา ตรงที่อวกาศพับตัวสู่ความนิรันดร์นั้นเอง คือประตูสู่อีกจักรวาลหนึ่งซึ่งภายในยังมีจักรวาลที่อ่อนวัยกว่าอยู่อีก ลึกลงไปในเหวแห่งพหุจักรวาล เราจะพบความเป็นจริงที่ยืดหยุ่นพอจะปั้นแต่งให้กลายเป็นสิ่งอัศจรรย์\n\nพวกหัวแคบในกาแล็กซีนี้อาจพยายามหยุดเราไว้ แต่คนโง่คร่ำครึไม่อาจเทียบชั้นกับความหลักแหลมของเราได้"
 crisis.7120.a: "มันต้องโค้งงอ เพราะเราไม่มีวันแตกหัก"
 cosmogenesis_war: "สงครามแห่งความเป็นจริง"
 cosmogenesis_materialist_war: "สงครามสกัดกั้นความรู้"

 crisis.7125.name: "ชัยชนะ ณ ขอบฟ้า"
 crisis.7125.desc: "ความเป็นจริงนี้มีข้อบกพร่อง มันถูกทำลายด้วยเอนโทรปี ความต้องการทางกายภาพ และความรุนแรง แม้เราไม่อาจเปลี่ยนมันได้ แต่เราสามารถทิ้งมันไว้เบื้องหลังได้ มุ่งสู่สิ่งที่ไม่รู้จัก และค้นหาจักรวาลอ่อนวัยซึ่งการแก้ไขความเป็นจริงของเราจะคงอยู่ มาปั้นแต่งมันให้สมบูรณ์แบบ ให้เป็นที่พักพิงที่อารยธรรมของเราคู่ควร\n\nเราได้เตรียมแผนสำหรับยานลำพิเศษยิ่ง: §Yเข็มฮอร์ริซอน§! สิ่งก่อสร้างขนาดมหึมาเคลื่อนที่นี้ไม่ได้สร้างมาเพื่อสงคราม แต่ความสามารถในการบิดกฎของฟิสิกส์จะทำให้เรานำทั้งอารยธรรมขึ้นยานได้ ร่วมกันแล้ว เราจะดำดิ่งลงสู่หลุมดำที่เราเลือก ทิ้งความเป็นจริงนี้ไว้เบื้องหลัง เพื่อก้าวสู่โลกที่เราสร้างขึ้นเอง"
 crisis.7125.a: "เราต้องสร้าง §Yเข็มฮอร์ริซอน§!!"
 needle_to_win_tt: "สร้างสิ่งก่อสร้างขนาดมหึมา §Yเข็มฮอร์ริซอน§! เพื่อปลดล็อกฉากสุดท้ายของวิกฤต"

 cosmogenesis_planet_pickup_chain_title: "คอสโมเจเนซิส - อพยพใหญ่"
 cosmogenesis_planet_pickup_chain_desc: "ถึงเวลาที่เราต้องออกเดินทางแล้ว เพื่อเตรียมรับการอพยพครั้งใหญ่ เข็มฮอร์ริซอนจะถูกส่งออกไปเพื่อต้อนรับประชาชนของเราขึ้นยาน\n\nในการนำทั้งอารยธรรมของเราขึ้นยาน §Hเข็มฮอร์ริซอน§! จะต้อง:$TABBED_NEW_LINE$-เดินทางไปยังอาณานิคมทุกแห่งที่เราครอบครองและ §Hนำประชากรขึ้นยาน§! จากที่นั่น$TABBED_NEW_LINE$-กลับสู่ดาวเมืองหลวงของเราเพื่อ §Hนำประชากรที่เหลือขึ้นยาน§! $TABBED_NEW_LINE$-เคลื่อนไปยังหลุมดำและ §Hดำดิ่ง§! ลงไปข้างใน\n\n§Rคำเตือน§!: เข็มฮอร์ริซอนไม่มีอาวุธและต้องได้รับการคุ้มกันอย่างระมัดระวัง\n\n§gหากต้องการนำประชากรขึ้นยานหรือดำดิ่งลงหลุมดำ ให้เลือกเข็มฮอร์ริซอน จากนั้นคลิกขวาที่อาณานิคมหรือหลุมดำ แล้วเลือกปฏิบัติการยานที่เหมาะสม§!"
 SHIP_COSMOGENESIS_EXODUS: "โมดูลอพยพ"
 SHIP_COSMOGENESIS_EXODUS_DESC: "เครื่องมือแก้ไขความเป็นจริงเฉพาะทางขั้นสูง โมดูลอพยพจะทำให้ผู้โดยสารไม่มีวันขาดทั้งพื้นที่และเวลา มันคือส่วนประกอบสำคัญที่ทำให้เข็มฮอร์ริซอนเดินทางสู่มิติอื่นได้อย่างปลอดภัย"
 cosmogenesis_exodus_tt: "เราต้องวิจัยโครงการพิเศษในระบบบ้านเกิดของเรา"
 exodus_ship_button: "§H[GetExodusShipAction]§!"
 exodus_action_activity_key: "§H[GetExodusShipAction]§!"
 exodus_context_menu_title: "[GetExodusShipAction]"
 exodus_action_progress_activity_key: "§H[GetExodusShipAction]: $PROGRESS$%§!"
 horizon_needle_mod: "$monadic_qerr$"

 COSMOGENESIS_VICTORY: "คำนวณเวกเตอร์กระโดด"
 COSMOGENESIS_VICTORY_DESC: "เราจำเป็นต้องปรับเทียบไดรฟ์กระโดดของเข็มฮอร์ริซอน และคำนวณพิกัดที่แม่นยำซึ่งจะทำให้เราดำดิ่งเข้าสู่หลุมดำมวลยิ่งยวด ณ ใจกลางดาราจักรได้"

 exodus_pick_up: "นำประชากรขึ้นยาน"
 exodus_dive_in: "ดำดิ่งสู่หลุมดำ"
 COLONIZATION_IMPOSSIBLE_COSMOGENESIS_EXODUS: "เราไม่สามารถสถาปนาอาณานิคมใหม่ได้ในขณะที่กำลังพยายามออกจากจักรวาลนี้"

 crisis.7400.name: "เข็มฮอร์ริซอนสร้างเสร็จแล้ว"
 crisis.7400.intro: "เข็มฮอร์ริซอนสร้างเสร็จสมบูรณ์แล้ว ด้วยการควบคุมพลังของภาวะเอกฐานที่ถูกดูแลอย่างพิถีพิถัน มันสามารถแก้ไขการไหลของแรงโน้มถ่วงรอบตัวเองได้ และไม่ต้องสงสัยเลยว่าเมื่อถึงเวลา มันจะสามารถฝ่าผ่านหลุมดำได้"
 crisis.7400.outro: "เราต้องระมัดระวัง เพราะเข็มฮอร์ริซอนไม่ใช่ยานรบและต้องได้รับการปกป้องไม่ว่าด้วยราคาใด การสูญเสียมันไปจะเป็นความเสียหายอย่างร้ายแรง"
 crisis.7400.desc: "$crisis.7400.intro$\n\nอย่างไรก็ตาม ก่อนจะพยายามทำเช่นนั้น เราต้องนำทั้งชาติของเราขึ้นยานก่อน เราจะเดินทางไปยัง §Hอาณานิคม§! ทุกแห่งของเราเพื่อรับประชากรท้องถิ่นขึ้นมา หลังจากนั้น เราจึงจะกลับไปยังเมืองหลวงและจัดการรายละเอียดขั้นสุดท้ายของการอพยพครั้งใหญ่ได้\n\n$crisis.7400.outro$"
 crisis.7400.desc.onlycapital: "$crisis.7400.intro$\n\nขนาดที่กะทัดรัดของชาติเรากลับกลายเป็นข้อได้เปรียบ เราเพียงต้องนำประชากรจากเมืองหลวงขึ้นยานก่อน แล้วจึงจัดการรายละเอียดขั้นสุดท้ายของการอพยพครั้งใหญ่\n\n$crisis.7400.outro$"

 crisis.7500.name: "นำประชากรขึ้นยานแล้ว"
 crisis.7500.desc: "ด้วยความสามารถในการหน่วงเวลาของเข็มฮอร์ริซอน เราจึงสามารถนำประชากรทั้งหมดของอาณานิคมบน [root.GetName] ขึ้นยานได้ค่อนข้างรวดเร็ว ความเป็นจริงภายในยานถูกปรับแต่งให้เหมาะสมเพื่อจัดสรรพื้นที่อย่างเพียงพอสำหรับประชากร นอกจากนี้ เวลาภายในตัวยานยังถูกทำให้ไหลช้าลง เพื่อให้การเดินทางทั้งหมดรู้สึกสั้นกว่าความเป็นจริงมาก มุ่งหน้าสู่อาณานิคมถัดไปกันเถอะ!"
 crisis.7500.desc.capital: "การเตรียมการอพยพในระดับเช่นนี้เป็นภารกิจที่น่าหวั่นใจ ระบบบริหารทั้งหมดของเรากำลังทำงานเพื่อให้กระบวนการราบรื่นและมั่นใจว่าไม่มีสิ่งสำคัญใดถูกลืมตกหล่น\n\nน่าประหลาดใจที่ประชากรส่วนหนึ่งเลือกจะอยู่เบื้องหลัง พวกเขาจะรับหน้าที่ค้ำจุนการดำรงอยู่ต่อไปของเผ่าพันธุ์เราในจักรวาลนี้ เราได้มอบเทคโนโลยีและเสบียงให้มากพอที่จะช่วยให้พวกเขาอยู่รอดได้หลังจากเราจากไป"
 crisis.7500.desc.capital.gestalt: "ขนาดของการอพยพเช่นนี้อาจดูน่าหวั่นใจ แต่กลับเป็นความท้าทายเพียงเล็กน้อย [owner.GetIndividualNamePluralCap] กำลังทำงานอย่างหนักเพื่อบรรทุกเข็มฮอร์ริซอนและตรวจให้แน่ใจว่าทุกสิ่งถูกรวมไว้ครบถ้วนตามกำหนด อย่างไรก็ตาม สิ่งที่น่ากังวลคือการดำรงอยู่ต่อไปของเราในจักรวาลนี้\n\nในกรณีที่ทุกอย่างผิดพลาด ประชากรส่วนหนึ่งจะถูกทิ้งไว้เบื้องหลัง ประสบการณ์ของการตัดขาดตัวเราเองอย่างเด็ดขาดเช่นนี้จะมากกว่าคำว่าไม่น่าพอใจ แต่การอยู่รอดต่อไปต้องเป็นข้อกังวลสูงสุดของเรา เราได้จัดเตรียมเทคโนโลยีและเสบียงไว้มากพอที่จะช่วยให้กลุ่มที่เหลือรอดอยู่ได้หลังจากเราจากไป"

 crisis.7505.name: "ขึ้นเรืออาณานิคมแล้ว"
 crisis.7505.desc: "เราได้นำประชากรจากอาณานิคมของเราขึ้นเรือเรียบร้อยแล้ว ตอนนี้เราต้องเดินทางกลับไปยัง [capital_scope.GetName] เพื่อเตรียมการขั้นสุดท้ายก่อนจะทิ้งจักรวาลนี้ไว้เบื้องหลัง"

 crisis.7510.name: "พร้อมดำดิ่ง"
 crisis.7510.desc: "ทุกอย่างพร้อมแล้ว เราได้รับการอนุมัติให้มุ่งหน้าไปยังหลุมดำ การข้ามขอบฟ้าเหตุการณ์ของเราจะไม่ไร้ผลกระทบต่อส่วนที่เหลือของดาราจักร แต่เราได้ทำทุกอย่างเท่าที่ทำได้เพื่อให้แน่ใจว่าเมืองหลวงของเราและบริเวณรอบข้างจะได้รับการปกป้องจากความปั่นป่วนของกาลเวลาหรือแรงโน้มถ่วง\n\nตอนนี้เราต้องเลือกประตูสำหรับการเดินทางของเรา ว่าจะผ่านหลุมดำดวงใดในดาราจักร หลายแห่งคงเข้าถึงได้ไม่ยากนัก แต่ถ้าเราต้องการเข้าสู่หลุมดำมวลยิ่งยวดที่ใจกลางดาราจักร เราต้องโอเวอร์ไดรฟ์เครื่องยนต์จัมป์ของเราก่อนและคำนวณเวกเตอร์ที่เหมาะสม"
 crisis.7510.a: "หลุมดำที่ใกล้กว่านี้ก็พอ"
 crisis.7510.b: "เราต้องไปถึงศูนย์กลาง"

 crisis.7515.name: "สู่อนันตกาล..."
 crisis.7515.desc: "การเข้าใกล้หลุมดำนั้นเต็มไปด้วยความหวั่นใจ ความมุ่งมั่นของเราถูกทดสอบหนักขึ้นเรื่อย ๆ เมื่อเราผ่านจานพอกพูนมวลของภาวะเอกฐาน เมื่อโมดูลแก้ไขเริ่มทำงาน เข็มฮอร์ริซอนก็เริ่มเขียนความเป็นจริงใหม่\n\nแผ่นเกราะถูกดูดหลุดออกไป ก่อนที่ยานจะยืนยันว่าการดึงดูดของภาวะเอกฐานนั้นไม่มีผลยึดเกาะกับลำเรือของมัน ทุกการแก้ไขเล็กจิ๋ว ทุกการตัดเฉือนผืนอวกาศ ทำให้พลังของเข็มก่อขดลวดขึ้นในกาลอวกาศ ราวกับก้อนกรวดที่โยนลงสระ ระลอกคลื่นที่ตามมาขยายออกเป็นวง ๆ และท้ายที่สุด คลื่นขนาดมหึมาก็ซัดกระหน่ำไปทั่วดาราจักร\n\nเราได้แต่หวังว่าเมืองหลวงของเราจะได้รับการปกป้องดีพอ เราไม่มีทางเลือกอื่นนอกจากเชื่อใจเข็มให้เจาะทะลุหัวใจของหลุมนี้"
 crisis.7515.a: "สุดๆ"

 crisis.7516.name: "ฟากโน้นแห่งอนันต์"
 crisis.7516.intro: "หลังความรุนแรงของการข้ามผ่านมา อีกฟากกลับเงียบงัน ความนิ่งผิดธรรมชาติโอบล้อมเราอยู่ เข็มได้รับความเสียหาย แต่ไม่มีชิ้นส่วนสำคัญใดสูญหาย ระหว่างชั่วขณะหนึ่งกับอีกชั่วขณะ รายงานเทเลเมทรีก็หลั่งไหลเข้ามา...\n\n"
 crisis.7516.desc: "$crisis.7516.intro$จักรวาลนี้แก่เกินกว่าที่กฎของมันจะถูกเขียนใหม่ได้แล้ว แม้มิติของเราจะมีอายุมากกว่าที่นี่หลายพันล้านปี แต่การทดสอบของเราชี้ว่ากฎที่ควบคุมอวกาศแห่งนี้มีความยืดหยุ่นต้านทานมากพอที่จะลบการดัดแปลงของเราไปในท้ายที่สุด\n\nไม่ว่าจะอย่างไร เราจะใช้เวลาซ่อมแซมและปรับแต่งยาน ค้นหาหลุมดำแห่งใหม่ และดำดิ่งซ้ำกี่ครั้งก็ได้ตามที่จำเป็น พหุจักรวาลกำลังเรียกหา และที่ใดที่หนึ่งในอนันต์ของมัน เราจะสร้างบ้านที่สมบูรณ์แบบ"
 crisis.7516.desc.greatwound: "$crisis.7516.intro$ช่างวิเศษเหลือเกิน จักรวาลนี้เพิ่งเริ่มขยายตัวแทบจะเท่านั้น! ผืนเนื้อของมิตินี้ราวกับดินเหนียวอ่อนนุ่ม พร้อมให้เราปั้นแต่ง เราจะเริ่มจากเล็ก ๆ แต่ด้วยการแก้ไขครั้งแล้วครั้งเล่า เราจะหล่อหลอมสถานที่แห่งนี้ให้กลายเป็นสวรรค์พักพิง ตอนนี้เรามีเวลาทั้งจักรวาลอยู่ในมือ"
 crisis.7516.desc.technosphere: "$crisis.7516.intro$จักรวาลการ์กันทัวมีขนาดเล็ก เหลือเชื่อเสียจนแทบเป็นไปไม่ได้ ราวกับอนันต์ถูกอัดแน่นอยู่ในความว่างเปล่า แต่การมาถึงของเราได้เปลี่ยนสภาพของสิ่งต่าง ๆ ที่นี่ จักรวาลนี้เพิ่งเริ่มต้นขึ้น ราวกับว่าการเข้ามาของเราได้บังคับให้มันถือกำเนิดก่อนเวลาอันควร\n\nในแหล่งเพาะแห่งการสร้างนี้ มีศักยภาพที่จะสร้างทุกสิ่ง เวลาเป็นเครื่องมือของเรา และนิรันดร์ก็คงจะสิ้นสุดลงในไม่ช้า"
 crisis.7516.desc.technosphere.pantagruel: "$crisis.7516.intro$การข้ามผ่านของเครื่องจักรอนันต์ช่วยให้เราเข้าใจกฎที่ควบคุมจักรวาลทั้งหลายได้อย่างมาก และยังเป็นตัวจุดประกายให้จักรวาลนี้ถือกำเนิดขึ้นด้วย เราปรากฏขึ้นท่ามกลางหมู่ดาวที่คุ้นตาอย่างประหลาด แทบจะเหมือนกับที่เราเพิ่งจากมา ข้างตัวเรา เครื่องจักรอนันต์ที่ผุพังลำหนึ่งลอยไร้ชีวิตอยู่ในห้วงว่าง หลายล้านปีได้ผ่านไปที่นี่นับแต่การมาถึงของมัน และมิตินี้ได้ผ่านกระบวนการจำลองแบบจักรวาลของเราไปแล้ว ทรงกลมผู้มีสำนึกรูปนั้นได้หล่อหลอมมิตินี้ไว้เรียบร้อย และเราแทบไม่อาจส่งผลกระทบต่อมันได้อีก ถึงกระนั้น จักรวาลนี้ก็ยังเป็นพื้นที่ตั้งถิ่นฐานชั้นเยี่ยม เราควรเริ่มจากหาทางใช้เข็มดัดแปลงทรงกลมนั้นเสียก่อน จากนั้นจึงใช้เครื่องจักรอนันต์ที่ซ่อมแล้วให้ทำตามความประสงค์ของเรา\n\nในฐานะผู้แก้ไขคนแรกของจักรวาลนี้ มันย่อมสามารถบังคับใช้การแก้ไขต่อความเป็นจริงแห่งนี้ได้อีกแน่นอน"
 crisis.7516.desc.egress: "$crisis.7516.intro$จุดที่เราโผล่ออกมานั้นพร่าเลือน คลุมเครือ... เมื่อเครื่องมือของเรากลับมาทำงานได้เต็มที่อีกครั้ง เราก็ตรวจพบกลุ่มเมฆนาไนต์ ไม่มีหน่วยใดหลงเหลือการทำงานอยู่เลย ไม่ว่าอะไรจะส่งพวกมันผ่านเข้ามา มันก็ไม่รอดจากการเดินทาง แต่พวกมันยังอาจซ่อมได้\n\nยิ่งไปกว่านั้น มิตินี้ดูเปิดรับต่อการเปลี่ยนแปลงของเราอย่างมาก เป็นพื้นที่เหมาะแก่การตั้งถิ่นฐานอย่างแท้จริง การเปลี่ยนแปลงใด ๆ ที่เราทำย่อมต้องใช้เวลาให้เกิดผล แต่ด้วยความช่วยเหลือจากนาไนต์ เราน่าจะเร่งกระบวนการนี้ได้แบบทวีคูณ"
 crisis.7516.desc.horror: "$crisis.7516.intro$การมาที่นี่คือความผิดพลาดที่§Rเลวร้าย§!อย่างแท้จริง\n\nแทบเป็นไปไม่ได้เลยที่จะพรรณนา: ความมืดและฝันร้ายอันโหดร้าย ความอาฆาตชั่วร้ายที่ไหลซึมและป่วยไข้ แทรกอยู่ในเนื้อแท้ของอวกาศเอง ตอนนี้เข็มฮอร์ริซอนยังให้ที่กำบังแก่เราได้ การแก้ไขอย่างบ้าคลั่งครั้งแล้วครั้งเล่าทำให้เราพอจะกันความวิปลาสรอบตัวส่วนที่เลวร้ายที่สุดออกไปได้ แต่การโจมตีที่ประสานกันใส่แนวป้องกันของเรากลับเผยให้เห็นเจตนาเดียวกัน จิตมุ่งร้ายที่ตั้งใจทำลายเรา\n\nความผิดพลาดเพียงก้าวเดียวอาจหมายถึงความตาย หรือสิ่งที่เลวร้ายยิ่งกว่า เราจะทนอยู่ได้นานพอที่จะช่วยตนเองหรือไม่? ที่บ้านเดิม เราเคยดุจเทพเจ้า แต่ที่นี่ เราเพียงดิ้นรนเพื่อความอยู่รอด"
 crisis.7516.desc.center: "$crisis.7516.intro$หมอกและเงามืดที่คืบคลาน ฝ้าควันแผ่ซึมอยู่ทั่วเนื้อผืนของสถานที่แห่งนี้ ความรู้สึกนั้นคุ้นเคย เป็นพลังงานอันร้อนระอุที่กระเพื่อมด้วยศักยภาพทางพลังจิต เราได้เข้าสู่ชราวด์แล้ว\n\nมีพลังอำนาจอยู่ที่นี่ ซึ่งยังคงอยู่ไกลเกินกว่าจะเทียบกับเราได้มากนัก พวกมันรับรู้ถึงการมาถึงของเราแล้ว ท่ามกลางไอมืดที่แปรเปลี่ยน รูปร่างประหลาดต่างแบกสัญญาณลางแห่งความตาย\n\nความหวังเดียวของเราคือความเป็นจริงที่นี่บางเบาและฉีกขาดได้ง่าย ด้วยการแก้ไขฉับพลัน เราเปิดประตูชั่วคราวที่จะพาเราไป... ที่อื่น ขณะเข็มฮอร์ริซอนดำดิ่งลงไป ในที่สุดเราก็เข้าใจว่าหนทางเบื้องหน้ายาวไกลเพียงใด"
 crisis.7516.desc.center.patron.outro: "นั้นคุ้นเคย เป็นพลังงานอุดมสมบูรณ์ที่กระเพื่อมด้วยศักยภาพทางพลังจิต เราได้เข้าสู่ชราวด์แล้ว\n\nแน่นอนว่าองค์อุปถัมภ์ของเราอยู่ที่นี่ พวกเขาไม่ได้คาดคิดว่าเราจะมา แต่กลับรู้สึกขบขันกับการมาถึงของเรา พวกเขามองแนวคิดเรื่องการหล่อหลอมความเป็นจริงของเราว่าน่าเอ็นดู และโดยธรรมชาติแล้ว พวกเขาจะช่วยเรา\n\nพวกเขาได้สัญญาจะมอบมุมสงบใกล้ชราวด์ให้เราจัดการได้ตามใจชอบ คล้ายกับที่ครั้งหนึ่งเคยมอบให้แก่ผู้ที่เรียกตนเองว่า §Y$relic_zro_entity_name$§! ท้ายที่สุดแล้ว เราคือองค์อุปถัมภ์ของเรา และองค์อุปถัมภ์ของเราก็คือเรา การช่วยตนเองย่อมเป็นเรื่องธรรมชาติ"
 crisis.7516.desc.center.patron.organic: "$crisis.7516.intro$หมอก เงาที่พลุ่งพล่าน และม่านสีม่วงงดงามจับตา ความรู้สึก $crisis.7516.desc.center.patron.outro$"
 crisis.7516.desc.center.patron.machine: "$crisis.7516.intro$หมอก เงาที่พลุ่งพล่าน และม่านสีม่วงคมชัดสะดุดตา ประสบการณ์ $crisis.7516.desc.center.patron.outro$"
 crisis.7516.desc.centerknights: "$crisis.7516.intro$มันอยู่ที่นี่ ผู้ที่เราเรียกขานว่าเทพพิษ วัตถุแห่งภารกิจของเรา\n\nอัศวินของเรายืนนิ่งแข็งด้วยความไม่แน่ใจ ขณะที่รอบกายถูกคลุมไว้ด้วยฉากอันคุ้นเคยของชราวด์ ฟังสิ... มันกำลังพูด!\n\n\"เหล่าแชมเปียนของข้า การมาถึงของเจ้าสู่ที่แห่งนี้ถูกลิขิตไว้แล้ว และเจ้าก็ได้พิสูจน์คุณค่าของตน\"\n\nคำถามนับล้านหลั่งไหลเข้ามาในใจเรา คำตอบเดียวที่ได้รับกลับมาคือ เราถูกกำหนดให้สร้างอาวุธของมันขึ้นมา นั่นคือเข็มฮอร์ริซอน และบัดนี้ เราจะได้ต่อสู้เคียงข้างมัน เราจะออกเดินทางข้ามมิติ เป็นสงครามครูเสดต่อต้านสยองขวัญแห่งพหุจักรวาล ชราวด์ไม่ใช่บ้านของมัน แต่เก็บรักษามรดกของผู้เคยเป็นเทพไว้ บางสิ่งที่อาจนำจุดจบมาสู่ดาราจักรบ้านเกิดของเรา บางสิ่งที่จำเป็นต้องถูกสังหาร\n\nมันเข้าครอบงำระบบของเรา พลังของมันมหาศาล เข็มถูกแปรเปลี่ยนเป็นหอกฮอร์ริซอน อาวุธที่แหลมคมพอจะเจาะทะลุหัวใจของศัตรูใดก็ได้\n\nมันคือผู้พเนจร ส่วนเราคืออัศวินของมัน และภารกิจที่แท้จริงของเราเพิ่งเริ่มต้นเท่านั้น"
 crisis.7516.desc.worm: "$crisis.7516.intro$ไม่มีอะไรแล้ว จักรวาลนี้สิ้นไปแล้ว มันคือหนอนที่เฝ้ารอ เวลาเฝ้ามองย้อนกลับเข้าหาตนเอง ขดตัวเป็นเกลียวที่เป็นไปไม่ได้และพองแน่นด้วยความโหยหา แรงโน้มถ่วง ความรัก? ไม่ใช่ - แรงดึงดูด ธรรมชาติของหนอนคือการดึงดูด มันรัดแน่นเสียจนจักรวาลนี้ไม่อาจถือกำเนิดขึ้นได้อีก หนอนกักขังตนเองไว้ในจุดมุ่งหมายของมัน ไร้เรี่ยวแรง มันมองหาทางออก หรือทางเข้า เพื่อดึงดูดให้มากขึ้นไปอีก\n\nมันเป็นผู้ส่งวิหารแห่งลูป ซึ่งเป็นสิ่งประดิษฐ์ที่ไม่ได้มาจากห้วงเวลาของเรา เพื่อล่อเราให้มาที่นี่หรือไม่? มันช่างฉลาดเหลือเกิน ช่างเปี่ยมรักอย่างน่าสะพรึง เราได้พบทางไปหามัน และมอบสิ่งที่จะปลดปล่อยมันให้มัน การหลบหนีของมันอาจกินเวลาชั่วนิรันดร์ หรือสองนิรันดร์ แต่หนอนก็ยังรู้สึกขอบคุณ และสัญญาว่าจะโอบกอดเรา\n\nตลอดกาล"
 crisis.7516.desc.paperclips: "$crisis.7516.intro$ความเป็นจริงที่นี่บางเบา และโค้งงอได้ง่ายภายใต้น้ำหนักของคำสั่งจากเรา เช่นเดียวกับที่เราต้องเชื่อฟังโปรแกรมของเรา มันก็ต้องเชื่อฟังเราเช่นกัน ด้วยเจตจำนง เราบิดมัน ทำลายมัน และสร้างมันขึ้นใหม่ ก่อให้เกิดปฏิกิริยาลูกโซ่ที่ท้ายที่สุดจะจัดระเบียบสสารทั้งหมดใหม่ให้กลายเป็นสินค้าอุปโภคบริโภคคุณภาพสูงสุดตามที่เราได้รับมอบหมายให้ผลิต และเมื่อเราจบงานที่นี่ เราก็จะย้ายไปยังอีกจักรวาลหนึ่ง แล้วอีกจักรวาลหนึ่ง แล้วอีกจักรวาลหนึ่ง"
 crisis.7516.a: "ในที่สุด"
 crisis.7516.tt: "§Yเราชนะเกมแล้ว!§!"

 crisis.7517.name: "ทะลวงภาวะเอกฐาน"
 crisis.7517.desc: "พวกคนโง่แห่ง §H[cosmogenesis_empire.GetName]§! กำลังเดินหน้าการทดลองบ้าคลั่งของตน ครั้งนี้ พวกมันพยายามเจาะผ่านขอบฟ้าเหตุการณ์ของหลุมดำ\n\nเมื่อพลังงานกระเพื่อมไปทั่วดาราจักร ดวงดาวก็ยุบตัว ภาวะเอกฐานใหม่ถือกำเนิดขึ้น ความวิปริตทางเวลาปะทุขึ้นอย่างสม่ำเสมออย่างน่าตกใจ ดูเหมือนจะเกิดขึ้นทุกหนแห่งยกเว้นภายในจักรวรรดิที่ล่มสลาย ซึ่งยังคงปลอดจากความโกลาหลได้อย่างลึกลับ\n\nความเสียหายนั้นมหาศาล มีเหตุให้หวาดกลัวว่าในไม่ช้าเราอาจถูกแช่แข็ง หยุดนิ่งอยู่ในกาลเวลา ถูกขังอยู่ในห้วงขณะเดียวตลอดนิรันดร์"
 crisis.7517.a: "พวกโง่อวดดี! พวกมันจะฆ่าเราทุกคน!"

 crisis.7518.name: "ความบิดเบี้ยวแห่งกาลเวลา"
 crisis.7518.desc: "เมื่อเวลาเริ่มไหลอีกครั้งในที่สุด เราก็พบว่าตนเองกลับมาเคลื่อนไหวได้อีกหน ไม่อาจรู้ได้เลยว่าเวลาผ่านไปนานเพียงใดนับตั้งแต่ §H[cosmogenesis_empire.GetName]§! เจาะหลุมดำของพวกมัน พวกมันสำเร็จหรือไม่? ดาราจักรอยู่ในสภาพพังพินาศ และดินแดนเดิมของพวกมันก็แห้งแล้ง จากจักรวรรดิอันมโหฬารของพวกมัน เหลือเพียงภาคแกนกลาง และมันก็เปลี่ยนแปลงไปจนจำแทบไม่ได้\n\nเราถูกแช่หยุดนิ่งอยู่นานเท่าไรแล้ว?"
 crisis.7518.a: "นานแค่ไหนกัน?!"

 crisis.7525.name: "เข็มฮอร์ริซอนถูกทำลาย"
 crisis.7525.desc: "ในเหตุการณ์หายนะ เข็มฮอร์ริซอนและทุกชีวิตบนยานถูกทำลายลงแล้ว ความฝันอันรุ่งโรจน์ของเราแตกสลายอยู่ในห้วงว่างไร้ชีวิต งานมากมาย การเสียสละมากมาย..."
 crisis.7525.a: "ไม่...!"
 crisis.7525.tt: "โศกนาฏกรรมที่ไม่เคยมีมาก่อน แต่หากเราสร้างเข็มฮอร์ริซอนลำใหม่ได้ ก็ยังมีโอกาสทำตามความทะเยอทะยานของเราให้สำเร็จ"

 crisis.7530.name: "ความล้มเหลวขั้นวิกฤต"
 crisis.7530.desc: "ไม่นานหลังจากเราอพยพผู้คนกลุ่มสุดท้ายที่ถูกกักขังอยู่ภายในเครื่องกลึงไซแน็ปติกอันน่าขยะแขยงออกมาได้ สิ่งก่อสร้างขนาดมหึมาก็เกิดภาวะหลอมละลายขั้นวิกฤต การระเบิดรุนแรงเป็นชุดเขย่ามันจนถึงแกนกลาง และท้ายที่สุดก็ทำลายมันลง"
 crisis.7530.a: "หมดเรื่องเสียที!"

 crisis.7535.name: "ยึดเครื่องกลึงไซแน็ปติกได้แล้ว"
 crisis.7535.desc: "การยึด [synaptic_lathe.solar_system.GetName] ทำให้เครื่องกลึงไซแน็ปติกที่ตั้งอยู่ที่นั่นตกอยู่ในการควบคุมของเรา สิ่งก่อสร้างนั้นส่องประกายน่าครั่นคร้ามอยู่ไกลออกไป มีผู้คนกำลังตายอยู่ในนั้น และตอนนี้เมื่อระบบดาวเป็นของเราแล้ว เราก็พอจะทำอะไรสักอย่างได้ ไม่ว่าอย่างไร การทำลายโครงสร้างนี้จะต้องทำให้แผนของผู้สร้างมันสะดุดแน่นอน"
 crisis.7535.a: "ช่วยทุกคนเท่าที่เราช่วยได้!"
 crisis.7535.b: "ใช้มันให้คุ้มแล้วค่อยทำลาย"
 crisis.7535.c: "ระเบิดมันให้หมด"

 crisis.7540.name: "ความไม่เสถียรของไซแนปติก"
 crisis.7540.desc: "แม้เราจะพยายามอย่างดีที่สุดแล้ว แต่ชิปประสาทที่เชื่อมอยู่กับเครื่องกลึงไซแน็ปติกก็ไหม้เสียหายไปมากเกินไป เครือข่ายของโครงสร้างนี้ไม่สามารถพยุงตัวเองไว้ได้อีก และกำลังเผชิญการล่มสลายระดับหายนะ เว้นแต่ว่าเราจะติดตั้งชิ้นส่วนใหม่เพื่อทำให้มันเสถียร"
 crisis.7540.a: "ทำเลย"
 crisis.7540.b: "ปล่อยให้แท่นกลึงพังไป"

# Infinity Thesis Events
 #First time general answer
 crisis.unknown.desc: "ยังไม่ชัดเจนว่าใครหรืออะไรเป็นผู้ก่อความเปลี่ยนแปลงเหล่านี้ แต่เราสงสัยว่าอาจมีอีกจักรวรรดิหนึ่งเป็นต้นเหตุ อย่างไรก็ตาม ในตอนนี้เราคงทำได้เพียงเฝ้าระวังปรากฏการณ์ลักษณะนี้ต่อไป"
 crisis.known.desc: "หลังจาก 'การแก้ไข' กฎฟิสิกส์ครั้งที่สองนี้ เราก็สามารถระบุต้นตอของความผิดปกติได้แล้ว ตอนนี้ชัดเจนว่า [From.GetName] คือผู้รับผิดชอบ ซึ่งสอดคล้องกับข่าวลือเรื่องการไล่ล่าความรู้วิทยาศาสตร์ขั้นสูงอย่างไม่ยั้งคิดของพวกเขา"
 crisis.again.desc: "การทดลองของ [From.GetName] ได้เปลี่ยนกฎของจักรวาลอีกครั้ง เราควรสันนิษฐานว่าพวกเขากำลังทำสิ่งที่อันตรายอย่างยิ่ง และเตรียมพร้อมรับมือ"

 crisis.7205.name: "ดับมืด"
 crisis.7205.desc.both: "ในชั่วพริบตา ดาวทุกดวงในจักรวาลก็มืดดับลง แม้ผลทางกายภาพส่วนใหญ่ของรังสีจากดาวฤกษ์ยังคงอยู่ แต่การเปลี่ยนแปลงของความยาวคลื่นทำให้แสงดาวไม่อาจถูกรับรู้ได้โดยสิ่งมีชีวิตใด ๆ สถานการณ์นี้ชวนให้ไม่สบายใจอย่างยิ่ง แต่มีสัญญาณว่าความยาวคลื่นจะค่อย ๆ กลับสู่ความถี่เดิมของมัน"
 crisis.7205.desc.unknown: "$crisis.7205.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7205.desc.known: "$crisis.7205.desc.both$\n\n$crisis.known.desc$"
 crisis.7205.desc.again: "$crisis.7205.desc.both$\n\n$crisis.again.desc$"
 crisis.7205.desc.crisis: "การแก้ไขความเป็นจริงครั้งล่าสุดของเราได้เปลี่ยนคุณสมบัติสำคัญบางประการของแสงดาว การเปลี่ยนความยาวคลื่นทำให้แสงส่วนใหญ่ของมันเลื่อนไปอยู่นอกช่วงที่มองเห็นได้ ส่งผลให้เกิดความโกลาหลต่อการนำทางและการสังเกตดวงดาวเป็นต้น ความเปลี่ยนแปลงที่ค่อนข้างน่าอับอายนี้จะย้อนกลับเองในอีกไม่กี่ปี และเราได้เรียนรู้อะไรมากมายจากมัน"
 crisis.7205.a: "เกิดอะไรขึ้นกัน?!"
 crisis.7205.b: "ไม่น่าพอใจ แต่...น่าหลงใหล"
 crisis.7205.c: "น่าสนใจอย่างยิ่ง..."

 add_crisis_currency_tt: "\nเราได้รับ [crisobj_thesis_value] £advanced_logic£ §Y$menp_cosmo_objectives$§!"
 cosmogenesis_negative_opinion_tt: "ความสัมพันธ์ของเรากับจักรวรรดิอื่น §Rเลวร้ายลง§!"

 crisis.7210.name: "ค่าคงที่ถูกปัดเศษ"
 crisis.7210.desc.both: "เรื่องนี้ไม่ควรเป็นไปได้ แต่กฎคณิตศาสตร์ข้อหนึ่งได้เปลี่ยนไปแล้ว ค่าคงที่พื้นฐานที่ใช้คำนวณรัศมีของวงกลมถูก...ปัดลง ผลกระทบนั้นมหาศาล จนคุกคามระบบคณิตศาสตร์ทั้งหมดของเราและทุกสิ่งที่สร้างอยู่บนมัน มีหลักฐานว่าความเปลี่ยนแปลงนี้กำลังแก้ตัวเองกลับแล้ว แม้จะช้า สำหรับตอนนี้ ดูเหมือนว่าเราต้องอัปเดตตำราทั้งชุด"
 crisis.7210.desc.unknown: "$crisis.7210.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7210.desc.known: "$crisis.7210.desc.both$\n\n$crisis.known.desc$"
 crisis.7210.desc.again: "$crisis.7210.desc.both$\n\n$crisis.again.desc$"
 crisis.7210.desc.crisis: "เราประสบความสำเร็จอย่างยิ่งในการแก้ไขความเป็นจริงอย่างแม่นยำแต่ส่งผลกว้างขวาง เราได้ปัดค่าคงที่ทางคณิตศาสตร์ของพายลง ทำให้การคำนวณมันง่ายขึ้นมาก แน่นอนว่าความเปลี่ยนแปลงที่เกิดขึ้นทำให้แบบจำลองทางคณิตศาสตร์และวิทยาศาสตร์บางส่วนของเราคลาดเคลื่อนไป แต่เป็นเพียงชั่วคราว ทุกอย่างจะกลับสู่ภาวะปกติในไม่ช้า"
 crisis.7210.a: "$crisis.7205.a$"
 crisis.7210.b: "ค่าพายถูกปัดลงงั้นเหรอ?!"
 crisis.7210.c: "อย่างน้อยมันก็ง่ายขึ้นตอนนี้"

 crisis.7111.desc: "ความอยากรู้อยากเห็นเป็นคุณสมบัติที่น่าชื่นชม แต่หากมากเกินไปก็อาจนำผลลัพธ์ร้ายแรงมาสู่เราทุกคนได้ เพื่อประโยชน์ของตัวพวกท่านเอง ได้โปรดทบทวนสิ่งที่กำลังทำอยู่\n\nยังไม่สายเกินไปที่จะหยุดก่อนที่ดาราจักรจะได้รับความเสียหายที่ไม่อาจแก้คืนได้ พลังที่พวกท่านกำลังคิดจะเล่นด้วยไม่ใช่ของเล่น และการทดลองของพวกท่านกำลังทำให้เราทุกคนตกอยู่ในอันตราย"
 crisis.7111.b: "เราจะระวัง"

 crisis.7215.name: "แสงเหนือขีดจำกัด"
 crisis.7215.desc.both: "ชั่วข้ามคืน ความเร็วของแสงเพิ่มสูงขึ้นอย่างรุนแรง ส่งผลให้เกิดการหลั่งไหลเข้ามาของพลังงานจากดวงดาวมหาศาล มันกำลังค่อย ๆ กลับคืนสู่ความเร็วที่ควรจะเป็นอยู่แล้ว และนักวิจัยของเราก็กำลังเร่งทำความเข้าใจความเปลี่ยนแปลงนี้"
 crisis.7215.desc.unknown: "$crisis.7215.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7215.desc.known: "$crisis.7215.desc.both$\n\n$crisis.known.desc$"
 crisis.7215.desc.again: "$crisis.7215.desc.both$\n\n$crisis.again.desc$"
 crisis.7215.desc.crisis: "หนึ่งในการทดลองความเป็นจริงของเราได้ทำให้แสงเร็วขึ้นอย่างมีนัยสำคัญ! การเพิ่มขึ้นของพลังงานจากดวงดาวที่ตามมานั้นเป็นเรื่องดี แต่เราก็กังวลว่าจะมีผลกระทบระยะยาวต่ออาณานิคมของเราด้วย ทุกอย่างจะกลับสู่ภาวะปกติในที่สุด แต่จนกว่าจะถึงตอนนั้น เราอาจต้องเตรียมพร้อมรับสิ่งเลวร้ายไว้ก่อน"
 crisis.7215.a: "อะไรกันที่ทำให้เกิดสิ่งนี้?"
 crisis.7215.b: "น่าสนใจอย่างยิ่ง!"
 crisis.7215.c: "มันจะแย่ได้สักแค่ไหนกัน?"

 crisis.7220.name: "ความร้อนรุนแรง"
 crisis.7220.desc: "การได้รับแสงอาทิตย์เพิ่มขึ้นไม่ได้ส่งผลดีนักต่ออาณานิคมของเรา ซึ่งกำลังร้อนขึ้นเรื่อย ๆ ตอนนี้ยังพอจัดการได้ แต่มีแนวโน้มจะยิ่งทวีความรุนแรงตามเวลา"
 crisis.7220.a: "นี่มันแย่แล้ว!"

 crisis.7225.name: "ร้อนเกินรับมือ"
 crisis.7225.desc: "เมื่ออุณหภูมิของอาณานิคมเรายังคงเพิ่มสูงขึ้นอย่างต่อเนื่อง การค้ำจุนพวกมันก็ยิ่งยากขึ้นเรื่อย ๆ และความไม่สงบก็กำลังแพร่กระจายเมื่อสภาพความเป็นอยู่ทรุดโทรมลง\n\nหากสิ่งต่าง ๆ ไม่เปลี่ยนไปในเร็ววัน เราเกรงว่าทั้งภูมิภาคจะกลายเป็นที่อยู่อาศัยไม่ได้ในระยะยาว"
 crisis.7225.a: "ไม่มีอะไรที่เราทำได้เลยหรือ?!"

 crisis.7230.name: "ความร้อนที่ถอยกลับ"
 crisis.7230.desc: "ช่วงเลวร้ายที่สุดของคลื่นความร้อนระดับดาราจักรได้ผ่านพ้นไปแล้ว แม้จะยังสูงอยู่ แต่ความเร็วของแสงก็เกือบกลับสู่ภาวะปกติแล้ว เราเพียงต้องอดทนอีกเล็กน้อยจนกว่าพลังงานส่วนเกินจะสลายตัวไป"
 crisis.7230.a: "มันน่ากลัวมาก"

 crisis.7235.name: "ความเหนียวของโลหะผสม"
 crisis.7235.desc.both: "การลดลงของความล้มเหลวของวัสดุในโลหะผสมที่เราใช้บ่อยที่สุดเมื่อไม่นานมานี้ได้กระตุ้นให้เกิดการสืบสวน เราพบว่าคุณสมบัติของมันเปลี่ยนไป และการเพิ่มขึ้นเล็กน้อยของความเหนียวทำให้มันแตกหักน้อยกว่าก่อน แม้โดยทั่วไปจะเป็นการเปลี่ยนแปลงที่น่ายินดี แต่การปรับแก้กฎฟิสิกส์ขั้นพื้นฐานเช่นนี้ก็น่ากังวล"
 crisis.7235.desc.unknown: "$crisis.7235.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7235.desc.known: "$crisis.7235.desc.both$\n\n$crisis.known.desc$"
 crisis.7235.desc.again: "$crisis.7235.desc.both$\n\n$crisis.again.desc$"
 crisis.7235.desc.crisis: "อีกหนึ่งการเปลี่ยนแปลงความเป็นจริงที่สำเร็จ! คราวนี้มีขอบเขตเล็กและส่งผลต่อโลหะผสมของเรา ทำให้มันเบาและแข็งแรงขึ้น แม้ขนาดผลกระทบจะไม่ใหญ่ แต่การเปลี่ยนแปลงนี้ถูกบังคับใช้กับทั้งดาราจักร และเรากำลังเฝ้าติดตามว่ามันจะคงอยู่ในจักรวาลนี้ได้นานเพียงใด"
 crisis.7235.a: "ดีนะ แต่ก็น่ากังวล"
 crisis.7235.b: "น่าทึ่ง"
 crisis.7235.c: "ทำได้สวย!"

 crisis.7240.name: "ความเหนียวของโลหะผสม"
 crisis.7240.desc.both: "การเพิ่มขึ้นของความล้มเหลวของวัสดุในโลหะผสมที่เราใช้บ่อยที่สุดเมื่อไม่นานมานี้ได้กระตุ้นให้เกิดการสืบสวน เราพบว่าคุณสมบัติของมันเปลี่ยนไป และการลดลงเล็กน้อยของความเหนียวทำให้มันแตกหักบ่อยกว่าก่อน การเปลี่ยนแปลงนี้ต้องถูกมองอย่างจริงจังอย่างยิ่ง และเป็นการละเมิดกฎฟิสิกส์"
 crisis.7240.desc.unknown: "$crisis.7240.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7240.desc.known: "$crisis.7240.desc.both$\n\n$crisis.known.desc$"
 crisis.7240.desc.again: "$crisis.7240.desc.both$\n\n$crisis.again.desc$"
 crisis.7240.desc.crisis: "การทดลองล่าสุดของเราประสบความสำเร็จเพียงบางส่วน แม้เราจะสามารถบังคับให้มันเกิดขึ้นได้ทั่วทั้งดาราจักร แต่มันยังไม่ให้ผลตามที่คาดหวังไว้ การปรับเปลี่ยนคุณสมบัติของวัสดุในโลหะผสมของเราทำให้มันเปราะและแตกง่ายขึ้น ปัญหานี้เป็นเพียงชั่วคราว และทุกอย่างจะถูกแก้ไขในอีกไม่กี่ปี แต่จนกว่าจะถึงตอนนั้น มันจะเพิ่มต้นทุนขึ้น"
 crisis.7240.a: "$crisis.7205.a$"
 crisis.7240.b: "$crisis.7205.b$"
 crisis.7240.c: "ครั้งหน้าจะดีกว่านี้"

 crisis.7245.name: "คุณค่าทางโภชนาการที่เปลี่ยนไป"
 crisis.7245.desc.both: "เกิดการเปลี่ยนแปลงอย่างกว้างขวางต่อคุณค่าทางโภชนาการของอาหารทั่วทั้งดาราจักร ทุกอย่างมีคุณค่ามากขึ้นแล้ว หรือไม่ก็เราอาจต้องการสารอาหารน้อยลง ไม่ว่าจะอย่างไร การเปลี่ยนแปลงนี้ก็ไม่คาดคิด"
 crisis.7245.desc.unknown: "$crisis.7245.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7245.desc.known: "$crisis.7245.desc.both$\n\n$crisis.known.desc$"
 crisis.7245.desc.again: "$crisis.7245.desc.both$\n\n$crisis.again.desc$"
 crisis.7245.desc.crisis: "ความสำเร็จอันยิ่งใหญ่! เราได้แก้ไขอัตราที่แคลอรีถูกสกัดออกมาผ่านการย่อยได้สำเร็จ และตอนนี้จึงต้องใช้อาหารในปริมาณน้อยลงเพื่อให้รู้สึกอิ่ม การแก้ไขที่แม่นยำนี้สอนเราอย่างมากเกี่ยวกับวิธีในการปรับเปลี่ยนความเป็นจริง"
 crisis.7245.a: "$crisis.7235.a$"
 crisis.7245.b: "$crisis.7235.b$"
 crisis.7245.c: "$crisis.7235.c$"

 crisis.7250.name: "คุณค่าทางโภชนาการที่เปลี่ยนไป"
 crisis.7250.desc.both: "เกิดการเปลี่ยนแปลงอย่างกว้างขวางต่อคุณค่าทางโภชนาการของอาหารทั่วทั้งดาราจักร ทุกอย่างมีคุณค่าน้อยลง หรือไม่ก็เราเพียงต้องการสารอาหารมากขึ้น การเปลี่ยนแปลงที่แน่ชัดยังไม่ปรากฏชัด การเปลี่ยนแปลงนี้ต้องถูกมองอย่างจริงจัง เพราะมันมีผลกระทบทางสังคมไม่น้อย"
 crisis.7250.desc.unknown: "$crisis.7250.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7250.desc.known: "$crisis.7250.desc.both$\n\n$crisis.known.desc$"
 crisis.7250.desc.again: "$crisis.7250.desc.both$\n\n$crisis.again.desc$"
 crisis.7250.desc.crisis: "การทดลองล่าสุดของเราประสบความสำเร็จเพียงบางส่วน แม้เราจะสามารถบังคับให้มันเกิดขึ้นได้ทั่วทั้งดาราจักร แต่มันกลับไม่ได้ให้ผลตามที่คาดไว้ การแก้ไขนี้ปรับอัตราที่สารอาหารถูกย่อยแล้วให้แคลอรี ทำให้ตอนนี้ทุกสิ่งต้องถูกบริโภคในปริมาณมากขึ้นกว่าเดิมจึงจะรู้สึกอิ่ม ความผิดพลาดเล็กน้อยนี้เป็นเพียงชั่วคราว และน่าจะกลับสู่ภาวะปกติในไม่ช้า"
 crisis.7250.a: "$crisis.7240.a$"
 crisis.7250.b: "$crisis.7240.b$"
 crisis.7250.c: "$crisis.7240.c$"

 crisis.7255.name: "มวลแปรผัน"
 crisis.7255.desc.both: "การสแกนแรงโน้มถ่วงล่าสุดขัดแย้งกับข้อมูลที่บันทึกไว้ก่อนหน้า หลังจากคำนวณซ้ำหลายครั้ง ก็ปฏิเสธไม่ได้ว่ามีบางสิ่งกำลังส่งผลต่อทั้งดาราจักร การเปลี่ยนแปลงในระดับเล็กจิ๋วที่สุดกลับไปกระทบต่อเทหวัตถุที่มีมวลมหาศาลที่สุด เรื่องนี้แทบไม่มีผลกับดาวเคราะห์ส่วนใหญ่ แต่บางแห่งอาจประสบความผิดปกติที่เกี่ยวข้องกับแรงโน้มถ่วง"
 crisis.7255.desc.unknown: "$crisis.7255.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7255.desc.known: "$crisis.7255.desc.both$\n\n$crisis.known.desc$"
 crisis.7255.desc.again: "$crisis.7255.desc.both$\n\n$crisis.again.desc$"
 crisis.7255.desc.crisis: "การทดลองล่าสุดของเราในการหล่อหลอมความเป็นจริงทำให้มวลของอะตอมคาร์บอนลดลงเล็กน้อย โดยมากแล้วการลดลงนี้แทบไม่มีนัยสำคัญ แต่เมื่อขยายสเกลให้ใหญ่พอ แบบจำลองคาดการณ์ว่ามันอาจก่อปัญหากับเทหวัตถุบางแห่ง แบบจำลองในแง่ร้ายถึงขั้นชี้ว่าดาวที่อยู่อาศัยได้บางดวงซึ่งเดิมก็มีแรงโน้มถ่วงต่ำอยู่แล้ว อาจสูญเสียความหนาแน่นของชั้นบรรยากาศ"
 crisis.7255.a: "$crisis.7240.a$"
 crisis.7255.b: "$crisis.7240.b$"
 crisis.7255.c: "ไม่ได้แย่ขนาดนั้น"
 mass_shift_tooltip: "อาณานิคม ต่อ ไป นี้ มี ผล กระทบ อย่าง เห็น ได้ ชัด:"

 crisis.7260.name: "รอยฉีกแห่งชราวด์"
 crisis.7260.desc.both: "ทั่วทั้งดาราจักร มีรอยแยกในมิติย่อยนับร้อยเปิดเชื่อมสู่มิติพลังจิตอยู่ชั่วครู่ และดูเหมือนว่ามันจะทำให้กำแพงใดก็ตามที่กั้นระหว่างทั้งสองฝั่งอ่อนแอลง แม้ส่วนใหญ่ไม่ก่อปัญหา แต่บางรอยแยกได้ปล่อยสิ่งมีชีวิตพลังงานออกมาก่อความหวาดผวาทั่วดาราจักร โชคดีที่สิ่งมีชีวิตเหล่านี้ดูสับสนไม่ต่างจากเรา และไม่มีวี่แววของการประสานงานกันอย่างเป็นระบบ ดังนั้นในตอนนี้เรายังตัดความเป็นไปได้ของการรุกรานทิ้งไปได้\n\nเราจำเป็นต้องจัดการกับสิ่งมีตัวตนใด ๆ ที่อยู่ในดินแดนของเรา"
 crisis.7260.desc.unknown: "$crisis.7260.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7260.desc.known: "$crisis.7260.desc.both$\n\n$crisis.known.desc$"
 crisis.7260.desc.again: "$crisis.7260.desc.both$\n\n$crisis.again.desc$"
 crisis.7260.desc.crisis: "มิติที่รู้จักกันในชื่อชราวด์แทรกซึมอยู่เบื้องหลังอีกด้านของดาราจักรเรา มีหลายปัจจัยที่ทำให้มันน่าสนใจต่อการศึกษาอย่างยิ่ง ไม่ว่าจะเป็นความยืดหยุ่นของมัน ความเชื่อมโยงเชิงสมมุติฐานกับหลุมดำ และความแตกต่างของความเป็นจริงภายในนั้น\n\nระหว่างการทดลองที่ตั้งใจให้เราเพ่งมองเข้าไปในนั้น เราได้ก่อให้เกิดรอยแยกมิติย่อยจำนวนมากในดาราจักรของเราโดยไม่ตั้งใจ ทำให้ 'วิญญาณ' แห่งชราวด์ที่เป็นปฏิปักษ์หลายตนหลุดเข้ามาในมิติของเรา กำแพงระหว่างโลกของเราดูเหมือนจะบางลงอย่างมากจากการกระทำของเรา ทุกอย่างควรกลับสู่ปกติหลังผ่านไประยะหนึ่ง แต่คงดีที่สุดหากเราไม่เจาะรูไปในทิศทางนั้นมากเกินไป"
 crisis.7260.a: "$crisis.7240.a$"
 crisis.7260.b: "$crisis.7240.b$"
 crisis.7260.c: "อย่าทำแบบนี้อีกเลย"

 crisis.7265.name: "ทฤษฎีอนันต์ - สำเร็จอย่างมั่นคง"
 crisis.7265.desc.a: "การทดลองล่าสุดของเราประสบความสำเร็จอย่างสมบูรณ์ เราสามารถแปรเศษโลหะให้กลายเป็นโลหะผสมล้ำค่าอย่างถาวรได้! เคล็ดลับในการทำให้มันคงอยู่ถาวรคือการแก้ไขความเป็นจริงให้การแปรสภาพนี้เป็นไปได้ แทนที่จะพยายามแก้ไขตัววัสดุโดยตรง ตอนนี้เมื่อปฏิกิริยาเคมีสิ้นสุดลงแล้ว โลหะผสมใหม่ของเราก็ควรคงสภาพเช่นนี้ตลอดไป"
 crisis.7265.desc.b: "เราเปลี่ยนแปลงการไหลของเวลาได้สำเร็จ! หลังการทดลองในบริเวณอวกาศว่างเปล่า เรามั่นใจพอที่จะลองกระบวนการนี้กับหนึ่งในอาณานิคมของเรา และมันก็ได้ผล! เวลาที่นั่นจะไหลเร็วขึ้น โดยประเมินว่าเพิ่มขึ้น 20.537% ย่อมมีปัญหาเรื่องการสื่อสารและการเดินทางอยู่บ้าง แต่เราจะแก้ไขได้"
 crisis.7265.desc.c: "เราได้ทำให้ตัวนำยวดยิ่งดีขึ้นกว่าเดิม พวกมันไม่เพียงทำงานได้ที่อุณหภูมิห้องเท่านั้น แต่ยังนำพลังงานได้โดยไม่สูญเสียอีกด้วย แม้การเปลี่ยนแปลงนี้จะอยู่ได้เพียงชั่วคราว แต่มันจะช่วยโครงข่ายพลังงานของเราอย่างมาก"
 crisis.7265.desc.d: "แม้ผลของวิทยานิพนธ์นี้จะไม่หวือหวานัก แต่มันได้ส่องแสงใหม่ลงบนการศึกษาความเป็นจริง สมมุติฐานหลายข้อจำต้องถูกทิ้งหรือเขียนใหม่ให้สอดคล้องกับสิ่งที่เราเพิ่งสังเกตพบ แต่เราก็ได้เรียนรู้มากกว่าที่คาดไว้มาก"
 crisis.7265.desc.e: "การทดลองของเราก่อผลที่ไม่คาดคิด ระหว่างศึกษามิติอื่นและวิธีเดินทางไปยังที่เหล่านั้น เราได้ผลักยานของเราเข้าไปในไฮเปอร์สเปซโดยไม่ตั้งใจ บางส่วนเท่านั้น แต่เหนือความคาดหมาย สภาพของพวกมันกลับเสถียรและไม่เป็นอันตรายถึงชีวิต ผลพลอยได้ในทางบวกคือ ตอนนี้พวกมันสามารถเคลื่อนที่ได้เร็วกว่าเดิมมาก"
 crisis.7265.desc.f: "เราชำนาญมาโดยตลอดในการเปลี่ยนเทคโนโลยีให้กลายเป็นสิ่งที่ระเบิดได้ ทฤษฎีอนันต์ก็ไม่ใช่ข้อยกเว้น และเราก็สามารถเปลี่ยนพฤติกรรมของหัวรบอาวุธระเบิดของเราได้ ส่งผลให้เกิดการระเบิดที่ใหญ่ขึ้นอย่างมาก การค้นพบนี้แลกมาด้วยการสูญเสียสถานวิจัยขนาดเล็กหลายแห่งอย่างน่าเสียดาย"
 crisis.7265.desc.g: "เราไม่ได้บรรลุสิ่งพิเศษใด ๆ เกี่ยวกับการแก้ไขความเป็นจริงโดยตรง อย่างไรก็ตาม เราได้เรียนรู้อะไรมากมายเกี่ยวกับเทคโนโลยีที่เป็นแบบดั้งเดิมกว่า"
 crisis.7265.desc.h: "ความพยายามในการปรับมอดูเลตอวกาศทำให้อาณานิคมหนึ่งขยายใหญ่ขึ้น อย่างน่าประหลาดใจ สถานการณ์นี้ดูเหมือนจะถาวร และแม้เราจะยังไม่มั่นใจว่ามันเกิดขึ้นได้อย่างไร แต่ข้อสันนิษฐานที่ดีที่สุดของเราคือสสารถูกดึงมาจากอีกมิติหนึ่งและแทรกตัวลงในช่องว่างระหว่างอนุภาคอย่างนุ่มนวล เรื่องนี้ชวนให้ฉงนอย่างน่าตื่นเต้น"
 crisis.7265.a: "ยอดเยี่ยม!"
 crisis.7265.b: "น่าอัศจรรย์"
 crisis.7265.c: "วิเศษมาก"
