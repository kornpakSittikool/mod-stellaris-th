 concept_military_academy_desc: "§Y$commander_with_icon$§! แต่ละคนที่ประจำการอยู่นอกจักรวรรดิเรา:\nการหลบหลีก §G+2%§!\nการติดตามเป้าหมาย §G+1%§!\nเจาะโล่พลังงาน §G+5%§!\nเจาะเกราะ §G+5%§!\n\n§Yทหารรับจ้างเพิ่มระยะเวลา...§! ภายใต้การอุปถัมภ์ของเรา:\nเสริมความแข็งแกร่งให้โล่พลังงาน §G+10%§!"

#Natural Design Civic
 civic_natural_design: "การออกแบบของธรรมชาติดีที่สุด"
 civic_natural_design_desc: "§Rคำเตือน: บล็อกเส้นทางการยกระดับทั้งหมด§!\n§Rคำเตือน: ไม่สามารถปรับเปลี่ยนเผ่าพันธุ์สิ่งมีชีวิตได้§!\n\nสังคมนี้ยืนยันว่า ธรรมชาติได้สร้างความสมบูรณ์แบบแล้ว ในรหัสพันธุกรรมของผู้คน พวก เขา ได้ อุทิศ เวลา นาน ใน การ รักษา ทาง การ แพทย์ และ ทาง การ ปกครอง เพื่อ รักษา และ รักษา ลําดับ พันธุกรรม ตาม ธรรมชาติ ที่ ไม่ มี การ สัมผัส."
 civic_tooltip_natural_design_effects: "$AVAILABLE_BUILDINGS$ ['concept_transcendental_retreat']\n"
 civic_tooltip_natural_design_negative_effects: "- การเห็นชอบของจักรวรรดิที่เริ่มต้น§Yตําแหน่ง§!"
 concept_transcendental_retreat: "$building_transcendental_retreat$"
 civic_hive_natural_design: "การออกแบบโดยธรรมชาติ"
 civic_hive_natural_design_desc: "§Rคําเตือน:§!\n§Rคําเตือน: ไม่สามารถแก้ไขสายพันธุ์อินทรีย์ได้§!\n\nรัง นี้ ยอม รับ อย่าง หนัก แน่น ถึง ความ สมบูรณ์ ของ โครง สร้าง ยีน ตาม ธรรมชาติ ของ มัน. มัน ได้ อุทิศ ความ สามารถ ทาง การ แพทย์ และ ทาง การ บริหาร เพื่อ รักษา และ รักษา รหัส พันธุกรรม ที่ สะอาด และ ไม่ มี การ ควบคุม."
 civic_hive_tooltip_natural_design_effects: "- $AVAILABLE_BUILDINGS$ ['concept_hive_transcendental_retreat']"
 civic_hive_tooltip_natural_design_negative_effects: "$civic_tooltip_natural_design_negative_effects$"
 concept_hive_transcendental_retreat: "$building_hive_transcendental_retreat$"
 civic_wilderness_natural_design: "ออกแบบแต่กําเนิด"
 civic_wilderness_natural_design_desc: "§Rคำเตือน: ปิดกั้นเส้นทางการยกระดับทั้งหมด§!\n§Rคำเตือน: ไม่สามารถดัดแปลงสายพันธุ์อินทรีย์ได้§!\n\nถิ่นทุรกันดารแห่งนี้ยอมรับอย่างหนักแน่นถึงความสมบูรณ์แบบของการพัฒนาตามธรรมชาติของตน มันตัดแต่งซิมไบออนต์ที่กลายพันธุ์เป็นประจำ เพื่อรักษาความศักดิ์สิทธิ์ของรหัสพันธุกรรมอันบริสุทธิ์ไร้การแตะต้อง"

 building_transcendental_retreat: "ศูนย์บริการจีโนม"
 building_transcendental_retreat_desc: "ศูนย์การแพทย์ขั้นสูงแห่งนี้ศึกษาและให้บริการเพื่อธำรงความสมบูรณ์แบบของรหัสพันธุกรรมอุดมคติแห่งธรรมชาติ"
 building_hive_transcendental_retreat: "รังพิทักษ์จีโนม"
 building_hive_transcendental_retreat_desc: "รังการแพทย์ขั้นสูงแห่งนี้มุ่งมั่นที่จะทำความเข้าใจและบำรุงเลี้ยงแก่นแท้อันไร้ตำหนิของรหัสพันธุกรรมอุดมคติแห่งธรรมชาติ"
 holding_transcendental_retreat: "ศูนย์เผยแพร่บริการจีโนม"
 holding_transcendental_retreat_desc: "ศูนย์การแพทย์ขั้นสูงแห่งนี้ศึกษาและให้บริการเพื่อธำรงความสมบูรณ์แบบของรหัสพันธุกรรมอุดมคติแห่งธรรมชาติ ความรู้ที่ได้จากสถานที่นอกโลกแห่งนี้ช่วยต่อยอดงานวิจัยให้กับผู้เป็นองค์อุปถัมภ์"
 natural_design_ascension_bonus: "ต่อ §Yสิทธิพิเศษการยกระดับ§! แต่ละอันที่จักรวรรดิของเราเลือก: $TABBED_NEW_LINE$- £mod_logistic_growth_mult£ $MOD_LOGISTIC_GROWTH_MULT$: §G+2.5%§! $TABBED_NEW_LINE$- $r_unity$ ต่อ $pop_group_unit$ [healthcare.GetIcon] [healthcare.GetNamePlural]: §G+1§!\n\n"
