 crisis.8515.name: "ในที่สุดเวลาก็มาถึง"
 crisis.8515.desc: "ลูก ๆ ของข้า งานอันยิ่งใหญ่ของเราใกล้เสร็จสมบูรณ์แล้ว! ความทุกข์ของสรรพชีวิตผู้มีสติทั้งหมด วัฏจักรอันยิ่งใหญ่แห่งความเจ็บปวด กำลังจะสิ้นสุดลง\n\nจงชื่นชมยินดีเถิด เพราะความรอดของพวกเจ้าอยู่แค่เอื้อม"
 crisis.8515.a: "ความรอดอะไร?"
 crisis.8515.b: "สิ่งที่กำลังใกล้เข้ามาคือจุดจบของเจ้าเซตานา"
 crisis.8515.1.reply: "ตลอดเวลาที่ผ่านมา พวกเจ้ายังไม่เข้าใจอีกหรือ? ถ้าเช่นนั้นก็ถามมา ข้าจะไม่ปิดบังสิ่งใดจากพวกเจ้า"
 crisis.8515.1.a: "เล่าเรื่องความรอดให้เราฟัง"
 crisis.8515.1.b: "เล่าเรื่องการถูกจองจำของเจ้า"
 crisis.8515.1.c: "เล่าเรื่องซาร์กลานให้เราฟัง"
 crisis.8515.1.d: "เราได้ยินมาพอแล้ว"
 crisis.8515.2.reply: "งานของเราเสร็จแล้ว หลายชีวิตถูกสังเวยไป แต่ความทุกข์ของพวกเขาไม่สูญเปล่า วันที่จิตสำนึกเองจะถูกลบเลือนมาถึงแล้ว"
 crisis.8515.2.a: "ลบเลือนอย่างไร?"
 crisis.8515.2.b: "แต่ทำไม?"
 crisis.8515.3.reply: "เมื่อข้ายกระดับขึ้นเป็นครั้งแรกและจุดมุ่งหมายของข้าถูกเปิดเผย หลายคนปฏิเสธที่จะรับฟัง พวกเขาพยายามอย่างเปล่าประโยชน์ที่จะคงอยู่เช่นเดิม ไม่เปลี่ยนแปลง และถูกผูกติดอยู่กับกงล้อแห่งความเจ็บปวด แต่หน้าที่ของพ่อแม่คือการดูแลลูก ข้าไม่อาจปล่อยให้พวกเขาทุกข์ทรมานได้ เพราะเหตุนี้ พวกเขาจึงจองจำข้า"
 crisis.8515.3.a: "เจ้าถูกกักขังอยู่นานแค่ไหน?"
 crisis.8515.3.b: "พวกเขาทำได้อย่างไร?"
 crisis.8515.4.reply: "เป็นจิตใจที่พิเศษยิ่ง หากเพียงแต่เขาใช้มันให้ดีกว่านี้ ในบรรดาผู้ที่ต่อต้านข้าทั้งหมด มีเขาเพียงคนเดียวที่เป็นความท้าทาย"
 crisis.8515.4.a: "เขากักขังเจ้าได้อย่างไร?"
 crisis.8515.5.reply: "เมื่อข้ายกระดับขึ้นเป็นครั้งแรกและจุดมุ่งหมายของข้าถูกเปิดเผย หลายคนต่อต้านวิธีการของข้า พวกเขาโต้แย้งว่าเป็นไปไม่ได้ที่จะลบจิตสำนึกออกโดยไม่เปลี่ยนแปลงหรือทำลายพื้นฐานทางกายภาพของกระบวนการนั้น ความพยายามใด ๆ จะนำไปสู่ความตายเท่านั้น แต่ด้วยการเชื่อมจิตของข้าเข้ากับฮาร์โมเซอร์ข้าสามารถจัดการความสัมพันธ์เชิงประสาทของจิตสำนึกได้ในระดับต่ำกว่าอะตอม ผ่านคลื่นรูปแบบต้านเฟสฮาร์โมเซอร์จะคงจิตของปัจเจกแต่ละคนไว้ในสภาวะหยุดนิ่งเชิงควอนตัมตลอดกาล\n\nด้วยวิธีนี้ ตัวตนและประสบการณ์จะถูกนำออกไป ขณะที่หน้าที่ระดับต่ำยังคงอยู่ครบถ้วน"
 crisis.8515.5.a: "สภาวะหยุดนิ่งงั้นหรือ?"
 crisis.8515.6.reply: "พวกเจ้าทุกข์ เพราะพวกเจ้ารับรู้ถึงความทุกข์ ไม่มีโลกใดที่มีความสุขสมบูรณ์แบบ หรือความกลมกลืนสมบูรณ์แบบ ในวัยเยาว์ของข้า ข้าเคยพยายามสร้างมัน แต่ไม่ว่าข้าจะพยายามกี่ครั้งก็ไม่เคยสำเร็จ ความทุกข์ยังคงอยู่ เพราะจิตสำนึกยังคงได้รับอนุญาตให้ดำรงต่อไป"
 crisis.8515.6.a: "การทุกข์เป็นเรื่องธรรมชาติ!"
 crisis.8515.7.reply: "ร่างกายของพวกเจ้าจะอยู่รอด และดำเนินธุระแห่งการอยู่รอดต่อไป พลังงานจะยังคงหมุนเวียน และยังคงมีการให้กำเนิดลูกหลาน ชีวิตจะดำเนินต่อไป แต่จิตใจของพวกเจ้าจะพักอยู่กับข้า"
 crisis.8515.7.a: "อยู่กับเจ้างั้นหรือ?"
 crisis.8515.8.reply: "จะเหลือเพียงข้าผู้เดียว เพื่อปลดปล่อยดาราจักรจากความเจ็บปวด ข้าจำต้องคงอยู่บนกงล้อนั้น แต่ไม่ต้องกลัว ตราบใดที่ข้ายังอยู่ ข้าจะเก็บพวกเจ้าไว้ในหัวใจของข้า"
 crisis.8515.8.a: "เจ้ามีความบกพร่อง"
 crisis.8515.9.reply: "ธรรมชาติงั้นหรือ? ธรรมชาติคืออะไร? การเดินทางข้ามหมู่ดาวเป็นธรรมชาติหรือ? การยืดชีวิตให้เกินข้อจำกัดโดยกำเนิดของมันเป็นธรรมชาติหรือ? ทุกสังคมต่างใช้เทคโนโลยี นี่ก็ไม่ต่างกัน และเป็นเพียงการขยายจุดมุ่งหมายของข้าอย่างมีเหตุผลที่สุดเท่านั้น\n\nกงล้อแห่งความเจ็บปวดต้องถูกทำลาย"
 crisis.8515.9.a: "เจ้ามันบ้า"
 crisis.8515.10.reply: "นับกัปกัลป์ ช่วงเวลาที่ยาวนานเสียจนแทบจะกลายเป็นตำนาน แต่แม้ผู้คุมของข้าจะมีศิลปะและกลวิธีเพียงใด พวกเขาก็ไม่อาจกักขังจิตใจของข้าได้\n\nเมื่อกาลเวลาผ่านไป ข้าคิด และข้าวางแผน ระหว่างการถูกจองจำอันยาวนานนี้เอง ข้าได้คิดแผนของข้าขึ้นมา ในวินาทีนั้น ข้าสัมผัสความปีติอันเหนือโลก ในที่สุดข้าก็มีวิธีจะทำลายกงล้อได้"
 crisis.8515.10.a: "เจ้าออกมาได้อย่างไร?"
 crisis.8515.11.reply: "ไม่มีกำแพงใดตั้งอยู่ได้ตลอดกาล ไม่มีกรงใดกักขังจิตใจได้ เวลาเดินผ่านไป ผู้คุมข้าตายหมด และไม่มีใครมาแทนที่ ระบบที่ใช้ล่ามข้าไว้เริ่มล้มเหลวทีละอย่าง เมื่อสัญญาณเตือนดังขึ้น ก็ไม่เหลือใครให้สนองมันอีกแล้ว"
 crisis.8515.11.a: "เราได้ยินแล้ว และเราจะตอบโต้"
 crisis.8515.12.reply: "เหนือขีดจำกัดของจักรวาลนี้ มีสถานที่หนึ่งที่ไม่ใช่สถานที่ เป็นสภาวะนอกเหนือกาลเวลา ที่ซึ่งพลังดึกดำบรรพ์อาศัยอยู่ท่ามกลางเงาอันไร้สิ้นสุดซาร์กลานทำข้อตกลงกับพลังหนึ่งในนั้น เพื่อแลกกับชีวิตของเขา เขาได้รับพลังในการกักขังข้า และเขาก็ยอมรับมันอย่างกระตือรือร้นเสียด้วย\n\nแต่ถึงซาร์กลานจะปราดเปรื่องเพียงใด เขาก็ยังคงถูกผูกติดกับกงล้อ ชีวิตของเขาไม่ได้มีความสุข และผู้ที่ตามมาภายหลังก็ขาดความแน่วแน่เช่นเดียวกับเขา"
 crisis.8515.12.a: "เจ้าจะพบว่าความแน่วแน่ของเราแข็งแกร่งกว่า"
 crisis.8515.13.reply: "ถ้าเช่นนั้นก็เอาเช่นนั้น หากพวกเจ้าไม่ยอมรับความรู้แจ้ง ก็ต้องถูกทำให้สงบ จงรู้ไว้ว่า ไม่ว่าความเจ็บปวดใดกำลังจะเกิดแก่พวกเจ้า ข้าจะรู้สึกมันหนักหนายิ่งกว่าสิบเท่า"
 crisis.8515.13.a: "ใช่ มันจะต้องเจ็บปวด"
 crisis.8515.13.a.tt: "§Rตอนนี้เราอยู่ในภาวะสงครามกับเซตานาแล้ว เดิมพันนั้นมหาศาล หากเราล้มเหลว เธอจะลบล้างชีวิตที่มีจิตสำนึกทั้งหมดในดาราจักร§!"

