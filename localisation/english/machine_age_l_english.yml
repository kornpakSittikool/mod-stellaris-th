# Cybernetics Pack
###################

 MACHINEAGE_TITLE: "The Machine Age" # Do not translate

#### Cosmogenesis Crisis ####

 ap_cosmogenesis: "คอสโมเจเนซิส"
 ap_cosmogenesis_desc: "เวลา แรงโน้มถ่วง และอวกาศ เป็นฟันเฟืองพื้นฐานที่ประกอบขึ้นเป็นกลไกแห่งความจริง หากเราสามารถเรียนรู้ที่จะบงการพวกเขาได้ จักรวาลและความลับของพวกเขาก็จะตกเป็นของเรา"
 cosmogenesis_chain_title: "คอสโมเจเนซิส"
 cosmogenesis_chain_desc: "ความไม่รู้ล่ามตรวนเราไว้ ทำให้ความลับของจักรวาลอยู่ไกลเกินเอื้อม\n\nไม่ว่าต้องแลกด้วยสิ่งใด เราก็ต้องหลุดพ้นให้ได้\n\n§Rจักรวรรดิที่ล่มสลายจะพยายามหยุดยั้งเรา!§!"
 cosmogenesis_level_reached: "บรรลุระดับวิกฤตแล้ว"
 cosmogenesis_aborted_tt: "\n£trigger_no£ §Rเราได้ละทิ้งความทะเยอทะยานสู่คอสโมเจเนซิสแล้ว§!"

 ### Crisis Stage Techs

 tech_cosmogenesis_crisis_1: "ทฤษฎีการเรียนรู้แบบก้าวกระโดด"
 tech_cosmogenesis_crisis_1_desc: "การเปลี่ยนมุมมองอย่างสุดขั้วที่จำเป็นต่อการทำความเข้าใจชั้นอันไร้ที่สิ้นสุดของความเป็นจริง เป็นบททดสอบแม้กระทั่งต่อจิตใจที่เฉียบแหลมที่สุดของเรา"
 cosmogenesis_level_1_tech_title: "ปลดล็อกวิกฤต §Hจักรวาล§! §Hระดับ 2§!"
 cosmogenesis_level_1_tech_desc: "§H$tech_cosmogenesis_crisis_1$§!\nหากต้องการเปิดเผยกลไกภายในของความเป็นจริง เราต้องเปิดใจสู่ระดับการคิดที่ยิ่งใหญ่กว่าเดิม"
 tech_cosmogenesis_crisis_2: "ศึกษาแรงโน้มถ่วงและกาลอวกาศ"
 tech_cosmogenesis_crisis_2_desc: "แรงโน้มถ่วงและกาลอวกาศเป็นสิ่งที่หล่อหลอมจักรวาล เราจะเริ่มจากแรงโน้มถ่วงและเชี่ยวชาญเครื่องมือที่จะขับเคลื่อนการยกระดับของเรา"
 cosmogenesis_level_2_tech_title: "ปลดล็อกวิกฤต §Hจักรวาล§! §Hระดับ 3§!"
 cosmogenesis_level_2_tech_desc: "§H$tech_cosmogenesis_crisis_2$§!\nแรงโน้มถ่วงเป็นเพียงหนึ่งในพู่กันที่เราสามารถใช้วาดลงบนผืนผ้าใบแห่งความเป็นจริง"
 tech_cosmogenesis_crisis_3: "ทฤษฎีอนันต์"
 tech_cosmogenesis_crisis_3_desc: "การปรับแรงโน้มถ่วงอย่างแม่นยำและเล็กจิ๋วอย่างเหลือเชื่อทำให้เราสามารถแทรกคำสั่งลงไปในโค้ดของความเป็นจริงได้ ต้องใช้ความระมัดระวังอย่างสูงสุดเมื่อเราเริ่มเรียนรู้การประยุกต์ใช้เครื่องมือใหม่อันน่าพิศวงนี้"
 cosmogenesis_level_3_tech_title: "ปลดล็อกวิกฤต §Hจักรวาล§! §Hระดับ 4§!"
 cosmogenesis_level_3_tech_desc: "§H$tech_cosmogenesis_crisis_3$§!\nทีละจุด แรงโน้มถ่วงที่เหมือนรอยเข็มจะทำให้เราทะลวงผ่านกาลอวกาศได้"
 tech_cosmogenesis_crisis_4: "กฎแห่งความเป็นจริง"
 tech_cosmogenesis_crisis_4_desc: "การทดลองล่าสุดยืนยันว่าการแก้ไขความเป็นจริงของเรายังคงอยู่ได้เพียงชั่วคราว เราจำเป็นต้องสร้างการเปลี่ยนแปลงที่ใหญ่กว่านี้เพื่อยึดตรึงผลลัพธ์เอาไว้"
 cosmogenesis_level_4_tech_title: "ปลดล็อกวิกฤต §Hจักรวาล§! §Hระดับ 5§!"
 cosmogenesis_level_4_tech_desc: "§H$tech_cosmogenesis_crisis_4$§!\nความเป็นจริงกำลังครางโอด มันต่อต้านและบิดตัวกลับอย่างดื้อรั้นแม้เราจะดัดแปลงมันไปแล้ว เราไม่อาจปล่อยให้ความผิดปกตินี้ดำเนินต่อไปได้"
 tech_cosmogenesis_crisis_5: "จักรวาลที่เพิ่งเกิด"
 tech_cosmogenesis_crisis_5_desc: "การเดินทางข้ามจักรวาลในระดับใหญ่เป็นภารกิจที่น่าหวั่นเกรง เราต้องสร้างยานอวกาศที่ไม่เพียงทะลุผ่านผืนกาลอวกาศได้ แต่ยังต้องอยู่รอดตลอดการเดินทางด้วย\n\n§Rจักรวรรดิที่ล่มสลายจะพยายามหยุดยั้งเรา!§!"
 cosmogenesis_level_5_tech_title: "§Hปลดล็อกสิ่งก่อสร้างขนาดมหึมา:§! เข็มฮอร์ริซอน"
 cosmogenesis_level_5_tech_desc: "§Hเข็มฮอร์ริซอน§!\nเข็มฮอร์ริซอนคือสิ่งมหัศจรรย์ทางเทคโนโลยี เป็นยานพลเรือนที่มีความสามารถในการบิดงอความเป็นจริง มันสามารถบรรทุกทั้งประชากรและองค์ความรู้ที่เราสั่งสมไว้ เพื่อนำพาการอพยพข้ามจักรวาลอย่างปลอดภัย"
 requires_capital: "£trigger_no£ ต้องสร้างในวงโคจรรอบดาวเมืองหลวงของเรา"

### Crisis Tab

 crisobj_research_tech_name: "วิจัยเทคโนโลยีใหม่"
 crisobj_research_tech_desc: "ทุกการค้นพบใหม่ ไม่ว่าจะเล็กน้อยเพียงใด ล้วนทำให้เราเข้าใจกลไกภายในของความเป็นจริงมากขึ้น\n\nวิจัยเทคโนโลยีเพื่อรับรางวัลตรรกะขั้นสูงนี้"
 crisobj_research_thesis_name: "วิจัยวิทยานิพนธ์อนันต์ประยุกต์"
 crisobj_research_thesis_desc: "การทดลองขนาดใหญ่เพื่อเปลี่ยนกฎที่ควบคุมพฤติกรรมของความเป็นจริงจะให้ข้อมูลอันล้ำค่าแก่เรา\n\nวิจัยเทคโนโลยีหายากเหล่านี้เพื่อรับรางวัลตรรกะขั้นสูงนี้"
 crisobj_have_scholarium_vassals_name: "รักษาประเทศราชนักปราชญ์ไว้"
 crisobj_have_scholarium_vassals_desc: "บริวารที่มุ่งเน้นงานวิจัยสามารถช่วยเราในการแสวงหาความรู้สัมบูรณ์ได้\n\nรักษา §Yประเทศราชนักปราชญ์§! ไว้เพื่อรับรางวัลตรรกะขั้นสูงนี้แบบ §Yรายปี§!"
 crisobj_neural_chips_name: "ใช้งานชิปประสาท"
 crisobj_neural_chips_desc: "ขอบเขตของงานวิจัยเรากว้างขวางจนต้องมีการเสียสละเพื่อรองรับมัน\n\nใช้ประชากรเป็น §Yชิปประสาท§! ใน §Yแท่นกลึงไซแนปติก§! เพื่อรับตรรกะขั้นสูง\n\nผลผลิตของ §Yชิปประสาท§! จะเพิ่มขึ้นตามจำนวนประชากรบน §Yแท่นกลึงไซแนปติก§! และยังเพิ่มต่อได้ด้วยเขตและสิ่งปลูกสร้าง"
 crisobj_have_science_nexuses_name: "ครอบครองวิทยสถานเน็กซัส"
 crisobj_have_science_nexuses_desc: "สถานวิจัยล้ำสมัยนี้ตั้งอยู่ห่างไกลจากความผิดปกติของแรงโน้มถ่วงทุกชนิด เพื่อใช้เก็บข้อมูลกาลอวกาศที่ยังบริสุทธิ์ไม่ถูกรบกวน\n\nครอบครองสิ่งก่อสร้างขนาดมหึมา §Yวิทยสถานเน็กซัส§! ที่อัปเกรดเต็มแล้ว เพื่อรับรางวัลตรรกะขั้นสูงนี้แบบ §Yรายปี§!"
 crisobj_galcom_science_resolution_name: "ทำให้ชุมชนดาราจักรสนับสนุน"
 crisobj_galcom_science_resolution_desc: "หากเราทำให้สมาชิกของชุมชนดาราจักรเชื่อได้ว่างานวิจัยของเรามีความจำเป็น ก็จะช่วยให้แผนของเราสำเร็จไปไกลมาก\n\nทำให้ §Yชุมชนดาราจักร§! รับมติ §Yความรู้ไร้พันธนาการ§! เพื่อรับรางวัลตรรกะขั้นสูงนี้แบบ §Yรายปี§!"

 crisis_cosmogenesis_level_1: "§Uน่ากังวล§!"
 crisis_cosmogenesis_level_1_desc: "ไครซิสเลเวล 1"
 crisis_cosmogenesis_level_2: "§Uเสี่ยง§!"
 crisis_cosmogenesis_level_2_desc: "ไครซิสเลเวล 2"
 crisis_cosmogenesis_level_3: "§Uอันตราย§!"
 crisis_cosmogenesis_level_3_desc: "ไครซิสเลเวล 3"
 crisis_cosmogenesis_level_4: "§Uหายนะ§!"
 crisis_cosmogenesis_level_4_desc: "ไครซิสเลเวล 4"
 crisis_cosmogenesis_level_5: "§Uภัยคุกคามความอยู่รอด§!"
 crisis_cosmogenesis_level_5_desc: "ไครซิสเลเวล 5"

 menp_cosmo_objectives: "ตรรกะขั้นสูง"
 unlocks_cosmo_objectives: "ทำให้สามารถสะสม £advanced_logic£ §Y$menp_cosmo_objectives$§! ได้จากการทำ §Hเป้าหมายวิกฤต§! ให้สำเร็จ\n\nปลดล็อกเทคโนโลยี §Y$tech_cosmogenesis_crisis_1$§! ซึ่งจะพาเราเข้าใกล้การบรรลุเป้าหมายมากขึ้น\n"
 menp_cosmo_objectives_desc: "ตรรกะขั้นสูงคือภาพแทนความเข้าใจของเราต่อกฎที่ควบคุมความเป็นจริง และอำนาจของเราในการชี้นำมัน"
 menp_cosmo_buildings_1: "อาร์โคโลยีอันสมบูรณ์แบบ"
 unlocks_buildings_1: "สิ่งปลูกสร้างพื้นฐานของจักรวรรดิที่ล่มสลายอาจปรากฏเป็นตัวเลือกวิจัยได้แล้ว\n"
 menp_cosmo_buildings_1_desc: "จักรวรรดิที่ล่มสลายอาจลืมวิธีสร้างเทคโนโลยีชั้นสูงของตนซ้ำขึ้นมา แต่จิตใจของเราจะเปิดเผยความลับที่สูญหายไปแห่งยุคทองของพวกเขา"
 menp_cosmo_techs_1: "พลังงานนอกแบรีออน"
 unlocks_techs_1: "ปลดล็อกเทคโนโลยีส่วนประกอบยาน §Y$tech_dark_matter_power_core$§!\n"
 menp_cosmo_techs_1_desc: "การเรียนรู้วิธีควบคุมพลังงานของอนุภาคแอนติแบรีออนคือก้าวถัดไปของวิวัฒนาการด้านการผลิตพลังงานขนาดย่อส่วนขั้นสูง"
 menp_cosmo_features_1: "เว็ตแวร์"
 unlocks_features_1: "ปลดล็อกเทคโนโลยีสิ่งก่อสร้างขนาดมหึมา §Yแท่นกลึงไซแนปติก§!\n"
 menp_cosmo_features_1_desc: "แท่นกลึงไซแนปติกมีขนาดมหึมา เป็นคอมพิวเตอร์แบบเรเซอร์วัวร์ พลังประมวลผลจากจิตที่เชื่อมต่อเป็นเครือข่ายของประชากรเราถูกใช้คำนวณและจัดเก็บข้อมูล ประโยชน์นั้นชัดเจน แต่บางสายพันธุ์ที่มองโลกคับแคบอาจมองว่าการเปลี่ยนบุคคลให้กลายเป็นชิปคอมพิวต์เป็นสิ่งที่น่ากังขาทางศีลธรรม"
 menp_cosmo_ship_2: "เรือคุ้มกันปริศนา"
 unlocks_ship_2: "ปลดล็อกเทคโนโลยีเรือ §Yเรือคุ้มกัน§! ของจักรวรรดิที่ล่มสลาย\n"
 menp_cosmo_ship_2_desc: "[Get_menp_cosmo_ship_2]"
 menp_cosmo_ship_2_desc_regular: "ยานขนาดไม่ใหญ่ลำนี้ใช้ความรู้เรื่องกาลอวกาศของเราให้เกิดประโยชน์สูงสุดเพื่อสร้างความเหนือชั้นเชิงมิติ ทำให้ภายในกว้างกว่าที่รูปลักษณ์ภายนอกบ่งบอกอย่างมาก ทั้งยังมีกำลังยิงขั้นสูงโดยใช้ต้นทุนด้านลอจิสติกส์ต่ำกว่ายานแบบดั้งเดิม"
 menp_cosmo_buildings_2: "การเก็บเกี่ยวขั้นสูง"
 unlocks_buildings_2: "สิ่งปลูกสร้างขั้นสูงของจักรวรรดิที่ล่มสลายอาจปรากฏเป็นตัวเลือกวิจัยได้แล้ว\n"
 menp_cosmo_buildings_2_desc: "ความสามารถในการผลิตทรัพยากรของจักรวรรดิที่ล่มสลายเคยทำให้เรางุนงงมาเนิ่นนาน แต่จะไม่เป็นเช่นนั้นอีกต่อไป"
 menp_cosmo_techs_2: "ความก้าวหน้าแห่งแอนติแบรีออน"
 unlocks_techs_2: "ปลดล็อกเทคโนโลยีส่วนประกอบยาน §Y$tech_enigmatic_decoder$§! และ §Y$tech_dark_matter_propulsion$§!\n"
 menp_cosmo_techs_2_desc: "ความเข้าใจที่เพิ่มขึ้นของเราเกี่ยวกับสสารมืดและการประยุกต์ใช้มัน จะเปิดเส้นทางใหม่แห่งความก้าวหน้าทางเทคโนโลยี"
 menp_cosmo_features_2: "เครื่องมือแรงโน้มถ่วง"
 unlocks_features_2: "ปลดล็อกเทคโนโลยี §Y$tech_cosmogenesis_crisis_2$§! ซึ่งจะพาเราเข้าใกล้การบรรลุเป้าหมายมากขึ้น\n"
 menp_cosmo_features_2_desc: "$tech_cosmogenesis_crisis_2_desc$\n"
 menp_cosmo_ship_3: "เรือลาดตระเวนสับสนพิศวง"
 unlocks_ship_3: "ปลดล็อกเทคโนโลยีเรือ §Yเรือลาดตระเวนหนัก§! ของจักรวรรดิที่ล่มสลาย\n"
 menp_cosmo_ship_3_desc: "[Get_menp_cosmo_ship_3]"
 menp_cosmo_ship_3_desc_regular: "ยานที่ได้รับการปรับให้เหมาะสมอีกแบบหนึ่ง คราวนี้มีขนาดใหญ่ขึ้นจนทำให้เรือประจัญบานในปัจจุบันดูเหมือนของเล่น"
 menp_cosmo_buildings_3: "โครงสร้างพื้นฐานซับซ้อน"
 unlocks_buildings_3: "สิ่งปลูกสร้างซับซ้อนของจักรวรรดิที่ล่มสลายอาจปรากฏเป็นตัวเลือกวิจัยได้แล้ว\n"
 menp_cosmo_buildings_3_desc: "เมื่อเราเริ่มคลี่ม่านปริศนาที่ปกคลุมจักรวรรดิที่ล่มสลายออกแล้ว เราก็ต้องดึงเส้นด้ายนั้นต่อไป ในเวลาไม่นานความลับของเทคโนโลยีพวกเขาจะคลายออกจนหมด"
 menp_cosmo_techs_3: "แอนติแบรีออนพิสดาร"
 unlocks_techs_3: "ปลดล็อกเทคโนโลยีส่วนประกอบยาน §Y$tech_enigmatic_encoder$§! และ §Y$tech_dark_matter_deflector$§!\n"
 menp_cosmo_techs_3_desc: "การใช้สสารมืดในเทคโนโลยีป้องกันและการเข้ารหัส จะทำให้เราสร้างสนามลบล้างและช่องทางสื่อสารที่มั่นคงได้"
 menp_cosmo_features_3: "การขยายอันเป็นนิรันดร์"
 unlocks_features_3: "ปลดล็อกเทคโนโลยี §Y$tech_cosmogenesis_crisis_3$§! ซึ่งจะพาเราเข้าใกล้การบรรลุเป้าหมายมากขึ้น\n"
