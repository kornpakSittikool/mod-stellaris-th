 origin_cybernetic_creed: "ลัทธิไซเบอร์เนติก"
 origin_cybernetic_creed_desc: "§Rคำเตือน: บล็อกเส้นทางการยกระดับทั้งหมด ยกเว้น ['concept_cybernetic_ascension']§!\n\nจักรวรรดินี้ไล่ตามเสียงเรียกอันศักดิ์สิทธิ์ นั่นคือการหลอมรวมระหว่างเรือนร่างอันประเสริฐกับไซเบอร์เนติกศักดิ์สิทธิ์ สำหรับพวกเขา การเสริมแต่งคือการบูชา"
