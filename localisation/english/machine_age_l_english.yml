 district_cosmogenesis_world_logic_desc: "สิ่งมหัศจรรย์แห่งอภิปรัชญาเชิงวิภาษ เขตนี้ใช้ชิปประสาทเพื่อหาความจริงภายในข้อความเชิงแบบแผนเกี่ยวกับความเป็นจริง โดยแก่นแท้แล้ว มันตอบว่าใช่หรือไม่ใช่ต่อคำถามที่ซับซ้อนที่สุดเท่าที่จิตส่วนรวมของผู้พำนักในเครื่องกลึงไซแน็ปติกเคยตั้งขึ้น"

