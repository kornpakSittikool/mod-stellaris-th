 civic_machine_tactical_algorithms_effects: "- §Y$commander_plural_with_icon$§! มีคุณลักษณะ §Y$leader_trait_tactical_algorithms$§! ตั้งแต่เริ่ม\n- สามารถแลกเปลี่ยน §Y$commander_plural_with_icon$§! กับจักรวรรดิอื่นได้\n- สามารถสร้าง §Yกองยานทหารรับจ้างเพิ่มระยะเวลา...§! ได้\n- เริ่มเกมด้วย £building£ §Y$building_military_academy$§!\n- £building£ §Y$building_military_academy$§! ได้รับ ['concept_military_academy', ข้อมูลเชิงลึกทางยุทธวิธี]"
