 crisis.7280.desc: "ขอทักทาย [Root.GetSpeciesNamePlural] ผู้ชาญฉลาด วันนี้พวกท่านได้บรรลุหมุดหมายทางเทคโนโลยีที่สำคัญ และหัวใจของเราก็เปี่ยมด้วยความภาคภูมิใจ เส้นทางที่พาท่านมาถึงจุดนี้ไม่เคยปราศจากอุปสรรค แต่ในการก้าวข้ามมัน พวกท่านก็ได้เติบโตขึ้น และศักยภาพทางเทคโนโลยีล่าสุดของพวกท่านก็เป็นเครื่องพิสูจน์อย่างชัดเจนว่าเราคิดถูกแล้วที่มอบการชี้แนะให้"

 crisis.7285.desc: "เด็กเจ้าปัญหา! วันนี้พวกเจ้าได้ใช้ความอดทนของพวกเราจนเกินขีดจำกัดแล้ว การทดลองที่บุ่มบ่ามของพวกเจ้าเป็นอันตรายต่อทุกฝ่าย และเราขอสั่งให้พวกเจ้าหยุดมันเสียเดี๋ยวนี้ พวกเจ้าไม่รู้เลยว่ากำลังไปยุ่งกับอะไรอยู่ แม้ความอยากรู้อยากเห็นจะน่าชื่นชม แต่ความไม่ยั้งคิดในระดับนี้ไม่อาจยอมรับได้ ความเป็นจริงถูกสร้างขึ้นมาเช่นนี้ด้วยเหตุผล จงปล่อยมันไว้เสีย"

 crisis.7285.a: "พวกท่านพูดถูก นี่อันตรายเกินไป"
 crisis.7285.a.tt: "ละทิ้งความทะเยอทะยานด้านคอสโมเจเนซิส และสูญเสียสิทธิ์เข้าถึงสิ่งปลูกสร้างและยานของจักรวรรดิที่ล่มสลายส่วนใหญ่\n\n§Rสิ่งนี้จะทำให้เราไม่สามารถทำเส้นทางวิกฤตให้สมบูรณ์ได้§!"

