 leaking_atmosphere: "ชั้นบรรยากาศรั่วไหล"
 leaking_atmosphere_desc: "มวลดาวเคราะห์ที่ลดลงขัดขวางความสามารถของโลกดวงนี้ในการกักเก็บชั้นบรรยากาศ"
 COSMOGENESIS_LEAKING_ATMOSPHERE: "ทำให้ชั้นบรรยากาศคงตัว"
 COSMOGENESIS_LEAKING_ATMOSPHERE_DESC: "ส่งทีมไปแก้ไขความเปลี่ยนแปลงของแรงโน้มถ่วงบน [root.location.getName] และฟื้นฟูชั้นบรรยากาศของมัน"
 cosmogenesis_sped_up: "เร่งเร็วขึ้น"
 cosmogenesis_sped_up_desc: "ดาวเคราะห์ดวงนี้ได้เลื่อนไปอยู่ในกระแสเวลาที่แตกต่างออกไปเล็กน้อย"
 cosmogenesis_superconductor: "ภาวะตัวนำยิ่งยวดที่เสถียร"
