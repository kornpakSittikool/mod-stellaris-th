 trait_auto_mod_biological: "จีโนมิกส์เชิงวิชาชีพ"
 trait_auto_mod_biological_desc: "สายพันธุกรรมขั้นสูงมีตัวกระตุ้นอีพีเจเนติกที่ปรับตัวตามความต้องการของอาชีพ ช่วยปรับการแสดงออกของยีนให้เหมาะสมกับสภาพแวดล้อมการทำงานของร่างเจ้าบ้านอย่างพลวัต"
 trait_auto_mod_cyborg: "การเสริมแต่งสากล"
 trait_auto_mod_cyborg_desc: "พอร์ตเชื่อมต่อแบบเสียบใช้ได้ทันทีสากลช่วยให้สามารถเปลี่ยนการเสริมแต่งได้ตามต้องการ ทำให้ความสามารถของมันสอดคล้องกับความต้องการในการปฏิบัติงานปัจจุบัน"
 trait_auto_mod_robotic: "โครงสร้างแบบปรับตัว"
 trait_auto_mod_robotic_desc: "ระบบนี้จัดโครงสร้างฮาร์ดแวร์ใหม่อย่างพลวัตเพื่อให้ตรงกับความต้องการในการปฏิบัติงาน เพิ่มประสิทธิภาพสูงสุดสำหรับทุกภารกิจที่ได้รับมอบหมาย"
 trait_auto_mod_overtuned: "ความเป็นเลิศชั่ววูบ"
 trait_auto_mod_overtuned_desc: "ตัวกระตุ้นอีพีเจเนติกขั้นสูงช่วยเพิ่มสมรรถภาพทางกายและการรับรู้ในที่ทำงาน แต่แลกมาด้วยการลดอายุขัยลงอย่างรุนแรง เพราะท้ายที่สุด การค่อย ๆ เลือนหายไปย่อมไม่เร้าใจเท่าการลุกไหม้จนหมดสิ้น"
 concept_automodding_trait: "คุณลักษณะดัดแปลงอัตโนมัติ"
 concept_automodding_traits: "คุณลักษณะดัดแปลงอัตโนมัติ"
 concept_automodding_trait_desc: "- ตัวปรับแต่งจะถูกรวมกับตัวปรับแต่งจากรายการคุณลักษณะที่กำหนดไว้ล่วงหน้าโดยอัตโนมัติ เพื่อให้ตรงกับงานที่กำลังทำอยู่\n- ผลของคุณลักษณะจะปรับตามสัดส่วนของกลุ่มประชากรที่มีคุณลักษณะนั้น\n- $pop$ §Hประชากร§! ที่มี §Y$concept_automodding_traits$§! ซึ่งถูกตรวจสอบในแต่ละเดือน ต่อหนึ่งอาณานิคม: §G100§!\n- สิ่งปลูกสร้าง £building£ ที่เพิ่มการเติบโตของประชากรและการประกอบประชากร จะเพิ่มจำนวน £pop£ §Hประชากรดัดแปลงอัตโนมัติ§! ที่ได้รับการอัปเดตในแต่ละเดือน"
