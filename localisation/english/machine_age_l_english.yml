#Guided Sapience
 civic_guided_sapience: "ไกด์ต้นกำเนิด"
 civic_guided_sapience_desc: "สังคมนี้อุทิศให้กับการสร้างสายพันธุ์ที่เกิดใหม่ ในฐานะพนักงานรักษาการณ์ของวิวัฒนาการ พวกเขาจัดส่วนต่าง ๆ ของโลกของพวกเขา เพื่อป้องกันการพัฒนา ของรูปแบบชีวิตก่อนการดํารงอยู่"
 civic_hive_guided_sapience: "ซิมบิโอตต้นกำเนิด"
 civic_hive_guided_sapience_desc: "กลุ่มนี้มุ่งเน้นไปที่วิศวกรรม การปรากฏตัวของสายพันธุ์ใหม่ ในฐานะผู้ควบคุมอํานาจวิวัฒนาการ พวกเขาระบุส่วนต่าง ๆ ของโลกของพวกเขา เพื่อให้แน่ใจว่าการเจริญก้าวหน้า ของรูปแบบชีวิตก่อนการดํารงอยู่"
 civic_machine_guided_sapience: "สถาปนิกต้นกำเนิด"
 civic_machine_guided_sapience_desc: "หน่วยสืบราชการลับของเครื่องจักรนี้ใช้อัลกอริทึมที่ออกแบบอย่างแม่นยํา สําหรับรุ่นของสายพันธุ์นิยาย ในฐานะผู้ควบคุมศักย์ที่ไม่มีวันบรรลุผล ในกระบวนการวิวัฒนาการ พวกเขาจัดแบ่งส่วนดาวเคราะห์ เพื่อรับประกันความก้าวหน้า ของรูปแบบสิ่งมีชีวิตก่อนการดํารงอยู่"
 civic_corporate_guided_sapience: "เทคโนโลยี ต้นกำเนิดอวกาศ (Astrogenesis)"
 civic_corporate_guided_sapience_desc: "การ ขาด ความ มั่น ใจ เช่น นี้ ไม่ สั่น คลอน ใน ข้อ ผูก มัด ของ มัน ที่ จะ สร้าง สิ่ง มี ชีวิต ขึ้น มา อย่าง จงใจ. พวกเขากําหนดขอบเขตจํานวนมหาศาลในโลกของพวกเขา เพื่อทําให้แน่ใจว่าการเจริญก้าวหน้าของรูปแบบชีวิต ก่อนการดําเนินงาน ทั้งหมดภายในกรอบของกิจการที่รับผิดชอบ"
 civic_tooltip_guided_sapience_effects: "- เรือโคนีที่มีอยู่:§Y$guided_sapience_colonizer$§!$NEW_LINE$- ดาวเคราะห์ประกอบไปด้วย§Y$guided_sapience_colonizer_plural$§!:$TABBED_NEW_LINE$- $PRESAPIENT$ ประชากร: §G+300§! $TABBED_NEW_LINE$- $PLANETARY_FEATURES$ §Y$d_genesis_preserve$§! $NEW_LINE$- รับ$r_unity$จากความอิ่มเอิบ$PRESAPIENT$ เผ่าพันธุ์"
 civic_tooltip_corporate_guided_sapience_effects: "$civic_tooltip_guided_sapience_effects$\n- นั่น£building£ §Y$building_xeno_tourism_agency$§! $megacorp_civic_branch_office_building_effect$"
 civic_tooltip_guided_sapience_gestalt_negative_effects:  "- ไม่สามารถสร้าง §Yยานอาณานิคม§! ได้"
 civic_tooltip_guided_sapience_negative_effects: "$civic_tooltip_guided_sapience_gestalt_negative_effects$\n- ไม่สามารถสร้าง £building£ §Y$building_xeno_zoo_plural$§! ได้"

