 machine_age.100.name: "สมัชชาแห่งการหลอมรวม"
 machine_age.100.desc: "ตลอดประวัติศาสตร์ ความพยายามอันหลงผิดของเราในการเสริมแต่ง [Owner.Species.GetFleshTypeCyberCreed] ได้ฉีกทำลายภาชนะศักดิ์สิทธิ์ไปนับไม่ถ้วน จนนำไปสู่การตีความการหลอมรวมอันศักดิ์สิทธิ์ที่ขัดแย้งกันในหมู่ลัทธิต่าง ๆ\n\nเมื่อเทคโนโลยีทำให้การเสริมแต่งเต็มรูปแบบเป็นจริงได้ในที่สุด ผู้นำศักดิ์สิทธิ์แห่งศรัทธาของเรา เหล่าเทคโนแฟนต์ ได้เรียกประชุมสมัชชา จุดมุ่งหมายของมันคือการวางหลักการแกนกลางของศาสนจักรเรา หลอมรวมลัทธิแต่ละสายเข้าเป็นหลักความเชื่อหนึ่งเดียว"
 machine_age.100.a: "ขอให้สิ่งศักดิ์สิทธิ์ชี้นำพวกเขา"
 machine_age.1000.name: "การหลอมรวมแห่งศรัทธา"
 machine_age.1000.desc: "การก่อตั้งสมัชชาแห่งเทคโนแฟนต์เป็นเรื่องยากลำบาก เพราะแต่ละลัทธิสำคัญต่างเรียกร้องที่นั่งของตนในสมัชชา หลังการพิจารณาอยู่พักหนึ่ง §Y$CYBERCREED_construction$§!, §Y$CYBERCREED_war$§!, §Y$CYBERCREED_research$§! และ §Y$CYBERCREED_labor$§! ต่างก็ได้รับเชิญ\n\nบัดนี้สมัชชาเข้าหาภารกิจศักดิ์สิทธิ์ของตนด้วยความศรัทธาร้อนแรง พระบัญญัติแรกของพวกเขาเรียกร้องให้เพิ่มส่วนสิบหรือกำหนดงานรับใช้ชุมชนจากประชากรทั่วไป"
 machine_age.1000.a: "เราต้องเลือกว่าจะสนับสนุนสมัชชาอย่างไร"
 machine_age.1000.a.tooltip: "จะมีแนวทางเพิ่มเติมให้เลือกในสถานการณ์นี้"
 machine_age.1010.name: "ประมวลแห่งการเสริมแต่ง"
 machine_age.1010.desc: "พระบัญญัติข้อที่สองของสมัชชาแห่งเทคโนแฟนต์ คือการเรียกร้องให้จัดระเบียบศรัทธาอย่างเป็นทางการ ความแตกต่างระหว่างลัทธิต่าง ๆ ได้สร้างความฝืดเคืองในสังคมของเรามานานเกินไปแล้ว\n\nลัทธิหลักต่างมีเหตุผลน่าเชื่อถือในการผลักดันศรัทธาอันเป็นหนึ่งเดียว ขณะที่เสียงสายกลางกว่านั้นเรียกร้องให้เดินบนหนทางที่เปิดกว้างและครอบคลุมอย่างแท้จริง"
 machine_age.1010.a: "ภราดรภาพแห่งค้อนจะสร้างอนาคตที่สว่างไสวกว่าเดิม"
 machine_age.1010.a.tooltip: "หลักความเชื่อจะก่อตัวขึ้นรอบ §Y$CYBERCREED_construction$§! $machine_age.1010.shared.tooltip$"
 machine_age.1010.b: "เหล่าเทมพลาร์เหล็กกล้าจะปกป้อง [Owner.Species.GetFleshTypeCyberCreed] ของเรา"
 machine_age.1010.b.tooltip: "หลักความเชื่อจะก่อตัวขึ้นรอบลัทธิ §Y$CYBERCREED_war$§!.\n$machine_age.1010.shared.tooltip$"
 machine_age.1010.c: "คณะขับร้องแห่งจิตใจจะขับขานบทเพลงแห่งความก้าวหน้า"
 machine_age.1010.c.tooltip: "หลักความเชื่อจะก่อตัวขึ้นรอบลัทธิ §Y$CYBERCREED_research$§!.\n$machine_age.1010.shared.tooltip$"
 machine_age.1010.d: "คอมมูนแห่งการตรากตรำจะมอบความหมายให้แก่ผู้ใช้แรงงานของเรา"
 machine_age.1010.d.tooltip: "หลักความเชื่อจะก่อตัวขึ้นรอบลัทธิ §Y$CYBERCREED_labor$§!.\n$machine_age.1010.shared.tooltip$"
 machine_age.1010.e: "เราควรยุติหลักความเชื่อที่แบ่งแยกเหล่านี้"
 machine_age.1010.e.tooltip: "ลัทธิต่าง ๆ จะถูกปฏิรูปเป็น §Y$pft_cyber_creed_general$§! ทำให้ภาชนะผู้ศรัทธาทุกคนสามารถถูกดัดแปลงได้\n$machine_age.1010.shared.tooltip$"
 machine_age.1010.shared.tooltip: "สิ่งปลูกสร้างทั้งหมดที่เกี่ยวข้องกับลัทธิอื่นจะถูกแทนที่ด้วย §Yวิหาร§!.\nลัทธินี้จะคงอยู่ในฐานะ §Yฝ่ายจิตวิญญาณนิยม§! เพียงฝ่ายเดียว\nฝ่ายที่ยึดถือจริยธรรม §Yไม่ใช่จิตวิญญาณนิยม§! จะสามารถก่อตัวได้"
 machine_age.1020.name: "ศรัทธาเทียมเท็จ"
 machine_age.1020.desc.pickedacreed: "หลังจากเราเลือก §Y[GetCyberCreed]§! ลัทธิอื่น ๆ ก็ออกมาประท้วง หลายคนเชื่อว่าสมัชชาได้หันหลังให้กับศรัทธา 'ที่แท้จริง'\n\n$machine_age.1020.both$"
 machine_age.1020.desc.nocreed: "ลัทธิต่าง ๆ กำลังประท้วง โดยอ้างว่าสมัชชาได้ทอดทิ้งศรัทธา\n\n$machine_age.1020.both$"
 machine_age.1020.both: "จนถึงตอนนี้ การประท้วงยังร้อนแรงแต่สงบ มีเพียงเวลาเท่านั้นที่จะบอกได้ว่าประกายไฟเหล่านี้จะกลายเป็นเพลิงหรือไม่\n\nไม่ว่าอะไรจะเกิดขึ้นต่อไป เราต้องตัดสินชะตาของลัทธิอื่น บางฝ่ายเรียกร้องให้ตัดขาดอย่างเด็ดขาด ตีตราหลักความเชื่อของพวกเขาว่าเป็นนอกรีต และมองความวุ่นวายที่พวกเขาก่อเป็นหลักฐานแห่งการลบหลู่ ขณะที่อีกฝ่ายเชื่อว่าความเมตตาคือหนทางข้างหน้า และขอให้เราแสดงความอดทนต่อสมาชิกผู้หลงผิดในศรัทธาของเรา"
 machine_age.1020.a: "ศรัทธามีได้เพียงหนึ่งเดียว"
 machine_age.1020.a.tooltip: "เหล่าเทคโนแฟนต์จะกดปราบลัทธิอื่น ซึ่งอาจนำไปสู่ความไม่สงบ"
 machine_age.1020.b: "ศรัทธาของเรามีที่สำหรับทุกคน"
 machine_age.1020.b.tooltip: "แม้จะมีหลักความเชื่อทางการ เหล่าเทคโนแฟนต์ก็จะยอมให้ลัทธิอื่นคงแนวปฏิบัติของตนต่อไป"
 machine_age.1030.name: "ทำให้ผู้ศรัทธาขุ่นเคือง"
 machine_age.1030.desc: "การประท้วงของชนกลุ่มน้อยได้ปะทุขึ้นทั่วดาวเคราะห์ของเรา หลายคนประณามสิ่งที่พวกเขามองว่าเป็นการเบี่ยงเบนของเราจากการหลอมรวมอันศักดิ์สิทธิ์ เหล่าเทคโนแฟนต์เชื่อว่าความไม่สงบนี้เป็นเพียงชั่วคราว เพราะประชาชนส่วนใหญ่สนับสนุนหลักความเชื่ออันเป็นหนึ่งเดียว และเป็นเพียงเรื่องของเวลาก่อนที่ผู้ประท้วงหัวรุนแรงกว่าจะยอมรับความจริงศักดิ์สิทธิ์"
 machine_age.1030.a: "จะมีศรัทธาได้เพียงหนึ่งเดียว"
 machine_age.1030.a.tooltip: "การเลือกกดลัทธิที่แข่งขันกันทำให้เกิดความไม่สงบบางส่วน"
 machine_age.1040.name: "การเปลี่ยนผ่านโดยสมัครใจ"
 machine_age.1040.desc: "ความอุทิศต่อหลักคำสอนอันเป็นหนึ่งเดียวได้แพร่กระจายไปในหมู่ผู้คน โดยผู้ปฏิบัติตามลัทธิต่างๆ ส่วนใหญ่ได้ละทิ้งแนวทางเดิมของตนแล้ว\n\nทุกคนยกเว้นพวกคลั่งไคล้ตัวจริง กำลังเตรียม [Owner.Species.GetFleshTypeCyberCreed] อันศักดิ์สิทธิ์ของตนเพื่อการแปลงสภาพครั้งสุดท้าย"
 machine_age.1040.a: "ความจริงแห่งการหลอมรวมศักดิ์สิทธิ์ของเรามีชัย"
 machine_age.1040.a.tooltip: "เราได้รวมศรัทธาเป็นหนึ่งสำเร็จแล้ว"
 machine_age.1050.name: "ลัทธิพึงพอใจ"
 machine_age.1050.desc: "การเปิดโอกาสให้ลัทธิต่างๆ มีเสรีภาพในการแสดงออกเป็นทางเลือกที่กลมกลืนอย่างยิ่ง มีเพียงการประท้วงเล็กน้อยเท่านั้น และมีเพียงสมาชิกที่ศรัทธาแรงกล้าที่สุดของแต่ละลัทธิที่เข้าร่วม\n\nเมื่อผู้ศรัทธาส่วนใหญ่ปฏิบัติตามหลักคำสอนทางการของเราแล้ว เราก็พร้อมจะมุ่งสู่การหลอมรวมศักดิ์สิทธิ์"
 machine_age.1050.a: "ศรัทธาของเราไร้รอยแบ่งแยก"
 machine_age.1050.a.tooltip: "ความอดทนอดกลั้นที่มอบให้แก่ลัทธิต่างๆ ช่วยป้องกันความไม่สงบ"
 machine_age.1060.name: "การประนีประนอมอันไร้เหตุผล"
 machine_age.1060.desc: "การยอมตามข้อเรียกร้องแบบสุดโต่งทำให้กลุ่มสายกลางส่วนใหญ่ไม่พอใจ พวกเขาชี้ว่าทุกลัทธิต่างมีประวัติความรุนแรงระหว่างศาสนิกมาอย่างยาวนาน และเชื่อว่าการปล่อยให้ความเชื่อชายขอบดำเนินต่อไปโดยไร้การคัดค้านเป็นทางเลือกที่ผิด\n\nเสียงส่วนใหญ่เรียกร้องให้ปฏิรูปลัทธิเหล่านี้อย่างเป็นทางการ ซึ่งเท่ากับตัดความเป็นอิสระที่พวกเขาเคยมีออกไป"
 machine_age.1060.a: "ผู้ศรัทธาต้องอดทนอดกลั้น"
 machine_age.1060.a.tooltip: "ความอดทนที่มอบให้แก่ลัทธิต่างๆ ทำให้กลุ่มสายกลางในศรัทธาของเราไม่พอใจ และก่อให้เกิดความไม่สงบ"
 machine_age.1060.b: "เริ่มปฏิรูปลัทธิเหล่านี้"
 machine_age.1060.b.tooltip: "ศรัทธาจะดูดซับลัทธิที่แตกต่างเข้าเป็นหนึ่ง และตัดข้อพิพาททางหลักคำสอนอันจ้อยๆ ของพวกมันออกไป"
 machine_age.1070.name: "ส่วนสิบแห่งกาลเวลา"
 machine_age.1070.desc: "เมื่อการหลอมรวมครั้งใหญ่ใกล้เข้ามา เราหวนกลับไปสู่ประเพณีเก่าแก่ของศรัทธา: ส่วนสิบแห่งกาลเวลา\n\nตลอดหลายชั่วอายุคน สมาชิกผู้ศรัทธาทุกคนในสังคมต่างมอบเวลาและพลังงานส่วนหนึ่งให้แก่ศาสนจักร เช่นเดียวกับการหลอมรวมศักดิ์สิทธิ์ การอุทิศตนเช่นนี้ช่วยเสริมความแข็งแกร่งให้แก่ร่างแห่งศรัทธา\n\nผู้ศรัทธาควรสนับสนุนการเสริมแต่งศักดิ์สิทธิ์อย่างไรจึงจะดีที่สุด?"
 machine_age.1070.intro: "ในแต่ละปี ผู้ศรัทธาในหมู่ประชากรของเราจะอุทิศเวลาส่วนหนึ่งของตน"
