 cosmogenesis_superlight_planet_2_desc: "แสงนั้น มันแผดเผา"
 cosmogenesis_alloy_ductility: "การแก้ไขความยืดหยุ่นของโลหะผสม"
 cosmogenesis_alloy_ductility_desc: "การแก้ไขความเป็นจริงทำให้โลหะผสมทนทานยิ่งขึ้น"
