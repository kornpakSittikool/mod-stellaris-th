 guided_sapience_colonizer_desc: "เรือนิคมพิเศษจะสะดวกต่อการสืบพันธุ์ของสปีชีส์ ก่อนการวางแผง โดยการเลือกผู้สมัครที่มีอนาคตมากที่สุด"

 councilor_civic_guided_sapience: "ผู้เชี่ยวชาญการชี้นำ"
 councilor_civic_guided_sapience_female: "$councilor_civic_guided_sapience$"
 councilor_civic_guided_sapience_desc: "เดอะ$councilor_civic_guided_sapience$ดูแลงานที่ซับซ้อน ของโครงการวิจัยและส่งเสริมพื้นฐาน"
 councilor_civic_guided_sapience_corperate: "ผู้อำนวยการการชี้นำ"
 councilor_civic_guided_sapience_corperate_female: "$councilor_civic_guided_sapience$"
 councilor_civic_guided_sapience_corperate_desc: "เดอะ$councilor_civic_guided_sapience_corperate$ทําหน้าที่รับผิดชอบด้านต่างๆ ที่มีมาแต่กําเนิด ในงานบุกเบิกของเรา ก่อนการบุกเบิกการวิจัยและการริเริ่มส่งเสริม"

 d_genesis_preserve: "เยเน ซิศ รักษา ไว้"
 d_genesis_preserve_desc: "เราได้อุทิศการรักษาอย่างพิถีพิถันนี้ เพื่อส่งเสริมให้วอร์ดของเรา ไปสู่สายพันธุ์ที่เจริญพันธุ์เต็มที่ โครงการ วิจัย ทาง วิทยาศาสตร์ เป็น ส่วน ประกอบ สําคัญ ของ โครงการ ที่ ทะเยอทะยาน นี้."
 decision_rebuild_genesis_preserve: "สร้าง กําแพง เยเน ซิศ"
 decision_rebuild_genesis_preserve_desc: "ดาวดวงนี้ยังไม่มี$d_genesis_preserve$การสร้างสิ่งแรกคือเป้าหมายของเรา"
 d_genesis_preserve_new_speices_tooltip: "สายพันธุ์ที่ก่อนการวางจําหน่ายใหม่จะถูกยกและวางใน§Y$d_genesis_preserve$§!."
 d_genesis_preserve_old_species_tooltip: "ค่าทั่วไปปัจจุบันจะถูกวางลงในรายการใหม่§Y$d_genesis_preserve$§!."
 no_abandon_genesis_preserve: "$TRIGGER_FAIL$เราไม่อาจละทิ้ง หน่วยงานของเรา"
 d_genesis_monument: "เยเน ซิศ"
 d_genesis_monument_desc: "อนุสาวรีย์นี้ถือเป็นเครื่องบรรณาการ สําหรับความพยายามที่ไม่สิ้นสุด ในกระบวนการกระตุ้นของโลก คํา นี้ เป็น สัญลักษณ์ แห่ง ความ หวัง, ความ เพียร อด ทน, และ ความ สําเร็จ อัน น่า ทึ่ง."

 cyber.7000.both: "อาณานิคมของ§Y[THIS.GetName]§!พร้อมที่จะสังเกตและนําทาง การพัฒนาของสปีชีส์นี้"
 cyber.7000.name: "โครงการ เยเน ซิศ"
 cyber.7000.desc: "หลังจากระบุ ผู้สมัครที่มีศักยภาพ ก่อนการวางจําหน่าย§Y$guided_sapience_colonizer$§!เริ่มกระบวนการของการเสริมพันธุกรรมและจัดตั้งพื้นที่ที่จําเป็นสําหรับ§Y$d_genesis_preserve$§!.\n\n$cyber.7000.both$"
 cyber.7000.a: "ได้เวลาทํางานแล้ว"
 cyber.7001.name: "เยเน ซิศ รักษา ความ ครบ ถ้วน"
 cyber.7001.desc: "หลังจากรวบรวมสัตว์พื้นเมืองก่อนยุคหิน§Y$guided_sapience_colonizer$§!เริ่มสร้าง§Y$d_genesis_preserve$§!เพื่อพวกเขา\n\n$cyber.7000.both$"
 cyber.7001.a: "$cyber.7000.a$"
 cyber.7020.name: "เยเน ซิศ"
 cyber.7020.desc: "หลังจากการอุทิศตัวอย่างไม่ลดละของมัคคุเทศก์ เราก็ได้ทําโครงการเสริมสร้าง§Y[Root.GetName]§!เราได้เปลี่ยนแปลง§Y[From.GetName]§!ไปสู่สายพันธุ์ที่รับรู้ได้เต็มที่ และ§Y$d_genesis_preserve$§!ที่พวกเขาเคยเรียกว่าบ้าน ได้เปลี่ยนไปเป็น§Y$d_genesis_monument$§!.\n\nมันจะยืนตลอดไปเป็นพันธสัญญาถาวร เพื่อความสําเร็จที่เป็น วิวัฒนาการของสายพันธุ์นี้"
 cyber.7020.a: "ยินดีต้อนรับสู่เวทีกาแล็กซี่[From.GetNamePlural]."

#Obessional Directive
 cyber.5005.name: "ตั้งค่าเป้าหมายเสร็จสมบูรณ์"
 cyber.5005.desc: "เราได้บรรลุเป้าหมายแล้ว\n\nโดรนตรงกับผลลัพธ์ของการผลิตภายในพารามิเตอร์ที่กําหนดไว้\n\nเราต้องการข้อมูลสุดท้าย สําหรับการกักตุน"
 cyber.5005.a: "โปรโตคอลเก็บข้อมูลเบื้องต้น"
 cyber.5005.a.tooltip: "เราจะเก็บสินค้าไว้เป็นหลักฐาน ของกระบวนการผลิตที่มีประสิทธิภาพของเรา"
 cyber.5005.b: "เราจะขายมันในตลาดสาธารณะ"
 cyber.5005.b.tooltip: "เราจะเริ่มการสํารวจตลาด เพื่อเผยแพร่สินค้าของเรา"
 cyber.5005.c: "เจรจาขอความร่วมมือทางการทูต"
 cyber.5005.c.tooltip: "เราจะสํารวจช่องทางทางการทูต เพื่อแลกเปลี่ยนสินค้าของเรา"
 cyber.5005.d: "แลกเปลี่ยนความรู้ด้านเทคโนโลยี"
 cyber.5005.d.tooltip: "เราจะมองหาผู้ซื้อเอกชน เพื่อแลกเปลี่ยนคลังสินค้า สําหรับความเข้าใจทางเทคโนโลยีที่มีค่า"
 cyber.5005.e: "วางไว้ในหลุมดํา"
 cyber.5005.e.tooltip: "เราจะเก็บไว้อย่างปลอดภัย นอกขอบฟ้าของหลุมดํา"
 cyber.5006.name: "ล้มเหลวในการสร้างเป้าหมาย"
 cyber.5006.desc: "เราล้มเหลวในการผลิต เป้าหมายของวัฏจักรนี้\n\nฉากนี้จะช่วยลดการปล่อยโดรน จนกว่าเราจะบรรลุเป้าหมายการผลิต\n\nขอบเขตการผลิตต่อมาลดน้อยลง"
 cyber.5006.a: "ไม่สามารถยอมรับได้"
