 machine_age.1070.c: "ส่วนสิบแห่งเหล็กกล้า"
 machine_age.1070.c.tooltip: "$machine_age.1070.intro$ ให้กับการทำงานในโรงหลอม"
 machine_age.1070.d: "ส่วนสิบแห่งการก่อสร้าง"
 machine_age.1070.d.tooltip: "$machine_age.1070.intro$ ให้กับการก่อสร้างอาคารและทำงานในอู่ยาน"
 machine_age.1070.e: "ส่วนสิบแห่งกองทัพบก"
 machine_age.1070.e.tooltip: "$machine_age.1070.intro$ ให้กับการรับราชการทหาร"
 machine_age.1070.f: "ส่วนสิบแห่งกองทัพเรือ"
