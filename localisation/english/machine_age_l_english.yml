 machine_age.1070.g: "ส่วนสิบแห่งการเสริมแต่ง"
 machine_age.1070.g.tooltip: "$machine_age.1070.intro$ ให้กับการวิจัยไซเบอร์เนติกศักดิ์สิทธิ์"
 machine_age.1070.h: "ส่วนสิบแห่งความรู้"
