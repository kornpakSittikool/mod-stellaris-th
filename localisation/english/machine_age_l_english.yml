 crisis.7270.name: "ทฤษฎีอนันต์ - ล้มเหลวอย่างน่าเสียดาย"
 crisis.7270.desc.a: "ความล้มเหลวเป็นส่วนหนึ่งของกระบวนการทางวิทยาศาสตร์ เราคาดหวังไว้สูงกับการทดลองนี้ แต่ท้ายที่สุดมันก็ใช้ไม่ได้ผล เรื่องนี้น่าหงุดหงิดแต่ก็มีคุณค่า และเราจะเรียนรู้จากมันให้ได้มากที่สุด"
 crisis.7270.desc.b: "เราเปลี่ยนแปลงการไหลของเวลาได้สำเร็จ! หลังการทดลองในบริเวณอวกาศว่างเปล่า เรามั่นใจพอที่จะลองกระบวนการนี้กับหนึ่งในอาณานิคมของเรา และมันก็ได้ผล! เป็นเวลาหลายปีของเรา เวลาที่นั่นจะไหลช้าลง โดยประเมินว่าลดลง 20.537% การชะลอตัวนี้ไม่ใช่เรื่องดีนัก แต่ก็ยังถือเป็นความสำเร็จอันยิ่งใหญ่สำหรับเรา"
 crisis.7270.desc.c: "การทดลองล่าสุดของเรามีผลข้างเคียงที่น่าเสียดาย อุปกรณ์กักเก็บพลังงานทั้งหมดของเราถูกปลดประจุ ไม่มีอะไรถูกทำลาย แต่พลังงานทั้งหมดที่เก็บไว้ภายในหายไป คาดว่าน่าจะไหลไปสู่อีกมิติหนึ่ง เรายังตรวจสอบอยู่ว่าเกิดอะไรขึ้น แต่ก็น่าสนใจไม่น้อย"
 crisis.7270.desc.d: "นี่เป็นความล้มเหลวที่น่าอับอาย การแก้ไขของเราไปแตะต้องคลังข้อมูล ทำให้งานวิจัยที่สะสมมาหลายปีเสียหายอย่างไม่อาจกู้คืน ทฤษฎีหลายข้อของเราจะต้องถูกสร้างใหม่ตั้งแต่ต้น นี่เป็นความถอยหลังครั้งใหญ่ แม้จะเปิดโอกาสให้เราได้ตรวจทานงานวิจัยเก่าอีกครั้งก็ตาม"
 crisis.7270.desc.e: "การทดลองนี้เกี่ยวข้องกับแหล่งพลังงานและกำลังขับ ช่วงแรกทุกอย่างเริ่มต้นได้ดี แต่แล้วสถานการณ์ก็พลิกเป็นหายนะเมื่อผลของมันลุกลามเข้าสู่เครื่องปฏิกรณ์บนยานของเรา ทำให้เกิดการหลอมละลายไปทั่วทั้งกองเรือ! ยานบางลำปิดเครื่องปฏิกรณ์ได้ทันเวลา แต่อีกหลายลำได้รับความเสียหายขั้นวิกฤต"
 crisis.7270.desc.f: "[leader_target.GetName] ผู้กำกับดูแลการทดลอง เสียชีวิตเมื่อเกิดการบีบอัดกาลอวกาศอย่างไม่คาดคิดภายในพื้นที่ทดสอบ แม้เราจะยังประสบความสำเร็จบางส่วนในการจำลองความเป็นจริง แต่การจากไปของพวกเขาก็เป็นเครื่องเตือนใจถึงราคาของความรู้ได้เป็นอย่างดี"
 crisis.7270.desc.g: "การทดลองด้านการประมวลผลหลุดการควบคุม และมีขนาดใหญ่เกินกว่าที่คาดไว้มาก ข้อมูลวิจัยอันมีค่าจำนวนมากจึงถูกแปรสภาพเป็นเรื่องไร้ความหมาย โชคดีที่คลังข้อมูลซึ่งเก็บงานวิจัยขั้นสูงสุดของเราถูกป้องกันไว้อย่างดีและไม่ได้รับผลกระทบ"
 crisis.7270.desc.h: "ความพยายามในการปรับมอดูเลตอวกาศทำให้อาณานิคมหนึ่งหดเล็กลง สถานการณ์นี้เป็นถาวร ซึ่งนับเป็นเรื่องน่าประหลาดใจเล็กน้อย ข้อสันนิษฐานที่ดีที่สุดของเราคือสสารได้รั่วไหลจากมิติหนึ่งไปสู่อีกมิติหนึ่งอย่างราบรื่น เรื่องทั้งหมดนี้ชวนให้ฉงนอย่างยิ่ง"
