 concept_vocational_traits_desc: "$concept_vocational_traits$ คือคุณลักษณะของสายพันธุ์ที่สามารถถูกดัดแปลงอัตโนมัติได้โดยคุณลักษณะ ['trait:trait_auto_mod_biological']$NEW_LINE$$concept_automodding_biological_desc$"
