 cosmogenesis_superlight_planet_1_desc: "พลังงานของแสงที่เพิ่มขึ้นกำลังสร้างความท้าทายแก่เหล่าอาณานิคมของเรา ทำให้อุณหภูมิพื้นผิวพุ่งสูงขึ้นในอัตราที่น่าตกใจ"
