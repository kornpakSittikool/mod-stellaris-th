 START_SCREEN_CYBERNETIC_CREED: "ภารกิจอันสูงส่งของเราคือการหลอมรวม [Owner.Species.GetFleshTypeCyberCreed] เข้ากับเครื่องจักร ประวัติศาสตร์ของเราเต็มไปด้วยความพยายามที่ล้มเหลว ทว่าด้วยการชี้นำของเจตจำนงศักดิ์สิทธิ์ บัดนี้เราได้บรรลุขั้นแรกของการอยู่ร่วมอันศักดิ์สิทธิ์ผ่านอวัยวะปลูกถ่ายเชิงพิธีกรรมของเราแล้ว\n\nเรายังเพิ่งเริ่มสัมผัสศักยภาพไซเบอร์เนติกอันไร้ขอบเขตของตนเท่านั้น การเสริมแต่งที่ล้ำหน้ายิ่งกว่ายังรออยู่เบื้องหน้า\n\nถึงกระนั้น ศรัทธาของเรายังคงแตกแยก โดยมีลัทธิต่าง ๆ ขัดแย้งกันเรื่องเป้าหมายสุดท้ายของการเสริมแต่งอันศักดิ์สิทธิ์ เมื่อเราไขคำตอบนี้ได้ การหลอมรวมอันสมบูรณ์แบบของ [Owner.Species.GetFleshTypeCyberCreed] อันศักดิ์สิทธิ์กับเทคโนโลยีอันได้รับพร จะทำให้เราก้าวข้ามข้อจำกัดของการออกแบบโดยวิวัฒนาการ\n\n$machine_age.1090.pray$"
