 # Starting event
 crisis.20000.name: "แสงแห่งการวิงวอน"
 crisis.20000.desc: "ขณะที่เซตานาเผยตัวให้ดาราจักรรับรู้ จักรวาลก็เหมือนกระซิบตอบกลับ ประภาคารส่งสัญญาณสว่างขึ้นบนฟากฟ้าราวเปลวเพลิงในความมืด ส่งถ้อยคำวิงวอนซ้ำ ๆ ข้ามกัปกัลป์:\n\n§Sเราอยู่ที่นี่... เราอยู่ที่นี่...\n\nเราอยู่ที่นี่§!\n\nสัญญาณอันเลือนรางนี้ใช้โปรโตคอลการสื่อสารแบบเดียวกับของเซตานาบ่งชี้ถึงต้นกำเนิดร่วมกัน แต่เซนเซอร์ของเรากลับไม่พบกิจกรรมอื่นใดในบริเวณใกล้เคียง ต้องมีบางสิ่งอยู่ที่นั่นที่สแกนเนอร์ของเรายังตรวจไม่พบ เป็นไปได้จริงหรือที่ใครบางคนจะคาดการณ์การกลับมาของเธอไว้แล้ว?"
 crisis.20000.a: "สืบสวน"

 # Arc Site appears
 crisis.21005.name: "เสียงเรียกกะทันหัน"
 crisis.21005.desc: "โดยไม่มีสัญญาณเตือน เราตรวจพบประภาคารซับสเปซลูกหนึ่ง ซึ่งมีต้นทางมาจากภายในอาณาเขตของเราเอง! การสำรวจระบบดาวก่อนหน้านี้ไม่พบสิ่งปลูกสร้างเทียมใด ๆ ในพื้นที่ซึ่งดูเหมือนไม่มีผู้อาศัย\n\nไม่ว่าประภาคารจะเพิ่งถูกนำมาวางไว้โดยที่เราไม่รู้ตัว หรือมันเคยถูกซ่อนไว้ด้วยสนามพรางตัวที่บัดนี้ถูกปิดใช้งานไปแล้ว"
 crisis.21005.a: "ตรวจสอบสัญญาณ"

 # Special Project result 1 - destroyed pods
 crisis.20100.name: "ประภาคารบน [fromfrom.GetName]: การสังหารหมู่ไร้กาลเวลา"
 crisis.20100.desc.base: "บนพื้นผิวของ [fromfrom.GetName] เราค้นพบคอมเพล็กซ์ขนาดใหญ่แห่งหนึ่ง โดยมีหอส่งสัญญาณทำเครื่องหมายทางเข้าไว้อย่างชัดเจน ประตูเสริมความแข็งแรงถูกระเบิดเปิดออกไปนานแล้ว ถูกทำลายโดยพลังที่ไม่รู้จักซึ่งกวาดผ่านคอมเพล็กซ์ด้วยความโกรธเกรี้ยวอย่างเห็นได้ชัด\n\nวิธีการที่ใช้ที่นี่ไร้เมตตาโดยสิ้นเชิง แคปซูลแช่เยือกแข็งทุกใบถูกทุบทำลาย ผู้ที่เคยอยู่ข้างในถูกปลุกขึ้นมาเพื่อพบความตาย ซากศพยังคงหลอกหลอนโถงทางเดินอันว่างเปล่า ถูกเก็บรักษาไว้โดยสุญญากาศอันเย็นเยียบของอวกาศ และลอยอยู่ท่ามกลางกลุ่มเมฆเศษแก้วแตกกระจาย\n\nบนพื้นของห้องเก็บแคปซูลแช่เยือกแข็ง มีข้อความหนึ่งถูกขีดเขียนไว้ด้วยอาวุธเลเซอร์"
 crisis.20100.desc.nozarqlan: "$crisis.20100.desc.base$ นักวิทยาศาสตร์ของเรากำลังพยายามแปลความหมายที่แน่ชัดของมัน แต่ไม่รู้ทำไม พวกเขากลับไม่เชื่อว่ามันจะเป็นเพียงคำภาวนาให้ผู้ตาย"
 crisis.20100.desc.zarqlan: "$crisis.20100.desc.base$ นักวิทยาศาสตร์ของเราแปลมันได้อย่างง่ายดาย โดยจับคู่ภาษาได้กับลายลักษณ์อักษรที่พบบนสุสานของศาสดาซาร์กลาน\n\n\"ความตายแด่อัครสาวกของราชินี ศัตรูของชีวิต\""

 # Special Project result 2 - sleeping army
 crisis.20200.name: "ประภาคารบน [fromfrom.GetName]: กองทัพนิทรา"
 crisis.20200.desc: "แคปซูลแช่เยือกแข็งนับหมื่นนอนสงบนิ่งอยู่ใต้พื้นผิวของ [fromfrom.GetPlanetMoon] โดยมีประภาคารเป็นเครื่องหมายบ่งชี้ตำแหน่ง แคปซูลเหล่านี้ล้ำสมัยอย่างยิ่ง สร้างจากโลหะผสมที่ไม่รู้จัก และติดตั้งเซนเซอร์ทันสมัยเพื่อเฝ้าตรวจผู้โดยสารอย่างใกล้ชิด การออกแบบของมันไม่มีข้อบกพร่องเลย แต่กลับไม่มีผู้โดยสารคนใดยังมีชีวิตอยู่\n\nสิ่งที่ทำให้ห้องแห่งนี้กลายเป็นสุสานหมู่ไม่ใช่ความล้มเหลวทางเทคนิค แต่เป็นการขาดพลังงาน เมื่อ [this.solar_system.GetName] แก่ตัวลงและริบหรี่ลง พลังงานของมันก็ไม่เพียงพอจะทำให้โครงสร้างนี้ทำงานต่อไปได้\n\nแคปซูลเหล่านี้ถูกสร้างมาให้อยู่ชั่วนิรันดร์ แต่จักรวาลที่เหลือไม่ได้สร้างมาแข็งแกร่งขนาดนั้น"

 # Special Project result 3 - old spaceship
 crisis.20300.name: "ประภาคารบน [fromfrom.GetName]: อาวุธที่ถูกลืม"
 crisis.20300.desc: "การสแกนเบื้องต้นไม่พบสิ่งผิดปกติใด ๆ บน [fromfrom.GetName] แต่เมื่อเรามุ่งความสนใจลงไปด้านล่าง เรากลับค้นพบชั้นโลหะใต้พื้นผิวที่ไม่ธรรมดา\n\nการวิเคราะห์โครงสร้างเพิ่มเติมเผยให้เห็นธรรมชาติที่แท้จริงของ [fromfrom.GetName] เทหวัตถุนี้ไม่ใช่ [fromfrom.GetPlanetMoon] แต่เป็นยานอวกาศโบราณที่ค่อย ๆ ถูกหินและฝุ่นของระบบดาวกลืนทับเข้าไป ตัวอย่างโลหะที่เราเจาะออกมานั้นเก่าแก่เสียจนมีอายุก่อนการก่อตัวของดาวบ้านเกิดของเราเอง\n\nเป็นไปไม่ได้ที่จะระบุอะไรเกี่ยวกับยาน ผู้สร้าง หรือหน้าที่ของมันได้ แต่มีสิ่งหนึ่งที่แน่ชัด ระเบิดนิวเคลียร์ที่ไร้การทำงานซึ่งเราพบในซากของมันนั้นไม่ได้ถูกสร้างมาเพื่อภารกิจสันติภาพ"

 # Special Project result 4 - Arc site 1 (Zarqlan base)
 crisis.20400.name: "ประภาคารบน [fromfrom.GetName]: ฐานร้าง"
 crisis.20400.desc: "หอส่งสัญญาณที่พบบน [apostate_site_planet.GetName] ถูกล้อมรอบด้วยซากของคอมเพล็กซ์ทางทหารขนาดมหึมา อาคารเหล่านี้ถูกสร้างขึ้นห่างจากประภาคารออกไปและรายล้อมมันไว้ ราวกับถูกสร้างมาเพื่อกักมันเอาไว้\n\nการหาอายุด้วยกัมมันตรังสีชี้ว่าโครงสร้างโดยรอบใหม่กว่าหอคอย และถูกสร้างขึ้นด้วยเทคโนโลยีที่แตกต่างกันอย่างมหาศาล หน่วยวิจัยถูกมอบหมายให้ไปตรวจสอบซากเหล่านี้แล้ว"

 # Special Project result 5 - Arc site 2 (comatose survivor)
 crisis.20500.name: "ประภาคารบน [fromfrom.GetName]: ผู้รอดชีวิตที่ไม่น่าเป็นไปได้"
 crisis.20500.desc: "ตามข้อมูลที่แสดงอยู่บนแคปซูลแช่เยือกแข็งของเธอ สิ่งมีชีวิตต่างดาวนี้มีชื่อว่าเอ ลิ สก์และเธออยู่ที่นี่มาแล้ว 3,213,213,293,124 รอบการหมุนของดาวฤกษ์ ตัวแคปซูลเองเป็นหนึ่งในหลายใบที่เรากู้ขึ้นมาจากห้องปิดผนึกใต้พื้นผิวของ [fromfrom.GetName] อย่างเหนือความคาดหมาย แคปซูลของเอลิคยังคงทำงานได้\n\nต่างดาวผู้นี้ยังคงอยู่ในสภาพจำศีล แม้ว่าซับรูทีนที่ทำให้เธอหลับใหลจะหยุดการทำงานไปแล้วเมื่อไม่นานนี้เอ ลิ สก์จึงอยู่ในสภาพมีสติบางส่วนมาตั้งแต่นั้น\n\nด้วยการสแกนคลื่นสมองของเธอ เราอาจเรียนรู้เพิ่มเติมเกี่ยวกับสิ่งมีชีวิตโบราณเกินจินตนาการนี้ รวมถึงความเชื่อมโยงของเธอกับเซตานา"

 # Special Project result 6 - Nothing
 crisis.20600.name: "ประภาคารบน [fromfrom.GetName]: เสียงเรียกอันว่างเปล่า"
 crisis.20600.desc: "หอส่งสัญญาณที่พบบน [fromfrom.GetName] นั้นเก่าแก่เสียจนเราไม่กล้าแตะต้องมัน โลหะของมันเปราะบางขนาดที่การเคาะเพียงครั้งเดียวอาจทำให้ทุกเส้นใยของฝุ่นและความหวังที่ยังยึดมันไว้ด้วยกันพังทลายลง เครื่องมือของเราไม่ตรวจพบวัตถุอื่นใด ไม่พบสัญญาณชีวิต และไม่พบความผิดปกติด้านภูมิประเทศใด ๆ ในบริเวณใกล้เคียงทันที\n\nประภาคารตั้งอยู่อย่างเดียวดาย พึมพำเสียงเรียกอันแผ่วเบาของมัน แต่สิ่งใดก็ตามที่มันเคยส่งสัญญาณหา คงจากไปนานแล้ว"

 crisis.21000.name: "คำวิงวอนที่ไร้ผู้เหลียวแล"
 crisis.21000.desc: "ประภาคารทั่วทั้งดาราจักรยังคงส่งเสียงเรียกหาเซตานาต่อไป แต่ไม่พบร่องรอยกิจกรรมใด ๆ ใกล้หอคอยเหล่านั้น จากสิ่งที่เราค้นพบในอดีต เราสามารถสันนิษฐานได้อย่างปลอดภัยว่าจะไม่พบผู้รอดชีวิตที่ยังมีชีวิตอยู่ในสถานที่เหล่านั้น\n\nสิ่งเดียวที่ยังหลงเหลือของผู้ติดตามเซตานาคือศรัทธาอันไม่สั่นคลอนต่อราชินีของพวกเขา"

 # Arc site 1
 synth_queen_history_site_1: "เซทาน่า:วิหารอำพราง"
 synth_queen_history_site_1_desc: "คอมเพล็กซ์ขนาดมหึมาที่จนถึงบัดนี้ยังซ่อนตัวอยู่ในอาณาเขตของเราเอง จากใจกลางลานภายในอันพังทลาย ประภาคารดวงหนึ่งกำลังร้องเรียกหาเซตานา"

 # Stages
 crisis.21100.name: "วิหารอำพราง: ลานภายใน"
 crisis.21100.desc: "สิ่งปลูกสร้างอันพังทลายนี้คือความยุ่งเหยิงของยอดหอคอยสูงตระหง่าน วิหารที่ห่อหุ้มด้วยเหล็กกล้า กำแพงถูกสร้างมาให้ทนการยิงปืนใหญ่หนักได้ ทว่ากลับไร้ร่องรอยแห่งการสู้รบ ความเสียหายเพียงอย่างเดียวที่นี่คือสิ่งที่กาลเวลาทิ้งไว้\n\nประภาคารของเซตานาตั้งอยู่ในลานกลาง รายล้อมด้วยป้อมปืนเซนเซอร์และอาวุธจำนวนมาก ไม่ว่าใครก็ตามที่สร้างคอมเพล็กซ์นี้ ย่อมทุ่มเทอย่างยิ่งในการปกป้องสถานที่แห่งนี้\n\nตามที่เราคาดไว้ วิหารแห่งนี้หลบเลี่ยงเซนเซอร์ของเราได้ด้วยม่านพรางตัวอันซับซ้อน เราพบกลไกของมันใกล้หอคอย และมันยังใช้งานได้อยู่ เพียงแต่ถูกปิดการทำงานด้วยมือโดยบุคคลนิรนาม"
 crisis.21100.a: "สำรวจอาคารหลัก"

 crisis.21105.name: "วิหารอำพราง: ชั้นพื้นดิน"
 crisis.21105.desc: "เราไม่รู้ว่าผู้อาศัยในสถานที่แห่งนี้เคยทำอะไรอยู่ แต่ไม่มีข้อสงสัยเลยว่าพวกเขาทำภารกิจด้วยความคลั่งศรัทธาอย่างแท้จริง\n\nทุกสนามยิงที่เราพบในคอมเพล็กซ์แห่งนี้มีโบสถ์เล็กกำกับอยู่ และทุกอาวุธโบราณมีศาลบูชาอยู่ข้างกัน ครั้งหนึ่งกองคณะผู้ศรัทธาเคยอาศัยอยู่ที่นี่ หลายพันชีวิตนอนหลับ ฝึกฝน และสวดภาวนาร่วมกัน ชุมชนของพวกเขาต้อนรับหลายสายพันธุ์ ดังเห็นได้จากรูปปั้นนักบุญที่ถูกลืมซึ่งยังประดับอยู่ตามโถงทางเดิน\n\nอาจเพราะรูปสลักหินเหล่านั้นทำให้หวาดผวา นักวิจัยบางคนจึงรายงานว่าเห็นเงาเคลื่อนไหวในทางเดินอันว่างเปล่า การสแกนของเราไม่พบสัญญาณชีวิตบนดาวเคราะห์ดวงนี้ แต่เราก็ยังไม่กล้าปัดความกังวลเหล่านี้ทิ้ง"
 crisis.21105.a: "สำรวจชั้นล่าง"

 crisis.21110.name: "วัด ที่ ร้าง เปล่า: สถาน ที่ ใต้ ดิน"
 crisis.21110.desc: "ภาย ใต้ บริเวณ พระ วิหาร เรา ได้ ค้น พบ ห้อง พัก หรือ ห้อง พัก หลาย ห้อง ซึ่ง สมาชิก นิกาย เคย ใช้. ใน แต่ ละ เล่ม มี หนังสือ เล่ม เดียว กัน. ของเรา[Owner.GetLinguists]ได้แปลนี้ว่า เอพิคแห่งซาร์กลัน บางตอนจะเกี่ยวข้องทันที\n\nซาร์กลันเคยเป็นสาวกของเซทานา แต่ไม่นานเขาก็รู้ว่าการไถ่บาปของเธอ เป็นคําโกหก ภาย หลัง การ ทดลอง หลาย อย่าง ซาร์ก ลาน ได้ ขึ้น ไป ยัง แดน วิญญาณ แสวง หา ความ ช่วย เหลือ จาก ผู้ มี อํานาจ สูง กว่า. เขาอ้อนวอนด้วย§Y(คือ) บรรดาผู้แบ่งแยกแผ่นดิน§!ร้องขออํานาจเอาชนะเซทาน่า\n\nอะนิเมเตอร์แห่งเคลย์ไม่สนใจ\n\nสําหรับรอบนับไม่ถ้วนซาร์กลันอธิษฐานเพื่อพระอานิเมเตอร์ เขาพูดถึงการนอกรีตของเซทาน่า การสลายตัวของตัวมันเอง และการดูดซึมของพินัยกรรม\n\nในที่สุด อนิเมเตอร์แห่งเคลย์ก็เชื่อฟังคําขอของซาร์กลาน\n\nดิน-หินก่อตัวเป็นโซ่ที่ทรงพลัง เพื่อผูกเซทาน่า แต่เขาเตือนซาร์กลัน ว่าไม่มีห่วงโซ่ ที่จะติดตามความคิดของเซทาน่าได้ตลอดไป\n\n\"เธอจะกลับมา\" ซาร์กลันเขียนในบทสุดท้ายของหนังสือ \"และเราจะต้องพร้อม.\"\n\nเหตุ การณ์ ที่ เล่า ถึง ใน มหา กาพย์ ไม่ ตรง กับ บันทึก ทาง ประวัติศาสตร์ ใด ๆ."
 crisis.21110.a: "ความจริง หรือนิยาย?"

 crisis.21115.name: "สร้างพระวิหารใหม่: ศูนย์บัญชาการ"
 crisis.21115.desc: "บันทึก ของ ทาง การ แจ้ง ให้ ทราบ ถึง การ สูญ เสีย พระ วิหาร นั้น รายงาน ที่ เย็น ชา ช่วย ลด ความ เชื่อ อัน แรง กล้า ให้ เหลือ ไว้ ใน รายการ สิ่ง ที่ ใช้ ได้ จริง. องค์กรต้องการเงินทุนจํานวนมากหรือทรัพยากรมากมาย แน่นอน ว่า การ รายงาน ใน อดีต เกี่ยว กับ เซ ทา นา นั้น เป็น การ พูด เกิน ความ จริง มาก ที เดียว. มีข้อพิสูจน์ใด ๆ ที่เป็นจริง ของการดํารงอยู่ของสมเด็จพระราชินี นอกเหนือจากตํานานโบราณ?\n\nข้อมูลการโกง อาสาสมัครลดลง กาแล็คซี่เลือกที่จะก้าวต่อไป จากภัยคุกคาม ที่ไม่ถือว่าเป็นภัยคุกคามอีกต่อไป ทุกคนหายไป นอกจากเงาที่ตามทางเดิน\n\nรายละเอียดสุดท้ายนี้ เป็นเรื่องจริง เราจัดการบันทึก ของผู้ติดตามลึกลับ น่าสงสัย แต่ไม่อันตราย"
 crisis.21115.a: "ติดตามผู้ติดตาม"

 crisis.21120.name: "วัด ที่ หัก พัง: ห้อง ลับ"
 crisis.21120.desc: "ผู้ เฝ้า ดู เข้า มา หา เรา ด้วย ความ สมัคร ใจ, จับ มือ ยก ตัว เล็ก ๆ ของ เธอ คลุม ด้วย สนิม และ ฝุ่น. หลัง จาก สังเกต ดู เรา อยู่ ระยะ หนึ่ง ดู เหมือน ว่า เธอ ลง ความ เห็น ว่า เรา ไม่ ได้ เป็น ภัย คุกคาม. เธอขอให้พวกเราช่วยแล้ว\n\nไม่จําเป็นต้องซักถามผู้ปกครองที่โดดเดี่ยวของวัด เธอกระตือรือร้นเกินกว่าจะพูด"
 crisis.21120.a: "มาฟังว่าเธอจะพูดอะไร"

 # Apostate diplo
 crisis.21125.name: "ผู้ ออก หาก ที่ ไม่ มี ชื่อ"
 crisis.21125.desc: "เพื่อน ฉันเรียกคุณว่าเพื่อนได้ไหม ผมสังเกตคุณตอนทําธุรกิจ ที่นี่ไม่ใช่การปล้น แต่เพื่อเรียนรู้ ผมเชื่อว่าศัตรูของเราเหมือนกัน และภัยคุกคามร่วมกันทําให้เราเป็นพันธมิตร อย่าง ไร ก็ ตาม ก่อน อื่น ขอ โทษ: ฉัน ด่วน เกิน ไป ไหม? ฉันพูดถูกหรือเปล่า ผมไม่ได้ติดต่อกับสิ่งมีชีวิตอื่นมานานแล้ว นานไป เหมือนจะจําได้"

 crisis.21125.a: "คุณเป็นใคร?"
 crisis.21125.a.response: "ชื่อข้าไม่สําคัญ ถ้าคุณต้องการที่จะหมายถึงฉัน โทรหาฉัน§Yผู้ ออก หาก§!นั่นคือสิ่งที่ญาติของฉันเรียกฉัน เมื่อฉันตัดสินใจ การบูชายัญเหมือนเป็นการทรยศ"

 crisis.21125.b: "คุณมาทําอะไรที่นี่?"
 crisis.21125.b.response: "นานมาแล้ว ที่แห่งนี้คือความภูมิใจและความสุขของฉัน เมื่อพวกเขาปิดมันลงฉันปฏิเสธที่จะออก เมื่อ ร่าง กาย ของ ผม เริ่ม ทรุด โทรม ผม ไม่ ยอม ตาย.\n\nเปลี่ยนไปเป็นสิ่งมีชีวิตสังเคราะห์ เป็นข้อห้ามสูงสุดสําหรับคําสั่งของฉัน และฉันไม่สามารถเรียกว่า ลูกสาวของซาร์กลันได้อีกต่อไป แต่ข้ายังเป็นหนึ่งในนักรบของเขา และตราบใดที่ศัตรูข้ายังมีชีวิตอยู่ ข้าจะสู้"

 crisis.21125.c: "คุณอยู่ที่นี่มานานแค่ไหนแล้ว?"

 crisis.21130.name: "$crisis.21125.name$"
 crisis.21130.desc: "ฉันหยุดนับ\nหลัง จาก ที่ ทุก คน จาก ไป ผม จะ อยู่ ตาม ลําพัง ได้ เพียง หลาย ปี เท่า นั้น ก่อน จะ สิ้น หวัง. ผม นอน หลับ และ เพิ่ม ระบบ ประสาท เข้า มา เพื่อ จะ ตื่น จาก สัญญาณ แรก.\n\nความหวังของฉันคือหาสถานที่แห่งนี้ ในสภาวะที่ดีขึ้น แต่เมื่อฉันตื่นขึ้นมา ฉันปิดเกราะป้องกัน และหวังว่าคนอย่างคุณจะมาถึงที่นี่ ก่อนที่เธอจะทํา"

 crisis.21135.name: "$crisis.21125.name$"
 crisis.21135.desc: "บอกข้าที ว่ามีกองทหารกี่กองที่ขึ้นกับเซทาน่า ในเวลาของฉันเราเอาชนะจํานวนมาก แต่เรามักจะรู้ว่า มีสัญญาณมากขึ้นออกมี ทหารมากขึ้นนอนหลับในฮาร์เปอร์ของพวกเขา"
 crisis.21135.a: "พวกเขาไปหมดแล้ว มันนานเกินไปแล้ว"
 crisis.21135.b: "คนที่เราพบตอนมีชีวิตอยู่ไม่มีเงื่อนไขที่จะต่อสู้"

 # Recruit window
 crisis.21140.desc: "งั้นนี่ก็เป็นศึกที่พวกเรายังชนะได้ ให้ฉันช่วยเถอะ ฉันใช้เวลาทั้งชีวิตรอเธอกลับมา เธอไม่สามารถที่จะประสบความสําเร็จได้"
 crisis.21140.a: "คุณรู้จักซาร์กลานไหม"
 crisis.21140.a.response: "ฉันรู้จักเขารึเปล่า? ผม ไม่ เคย พบ ท่าน ผู้ พยากรณ์ แต่ ผม เดิน ไป ตาม ทาง ของ ท่าน ตลอด ชีวิต.\n\nเมื่อ ผม หลับ สนิท ผม ฝัน จะ พบ เขา บน เครื่อง บิน ที่ ห่าง ไกล. ผมยังคงหวังว่าจะได้พบเขาวันหนึ่งถ้าเพียงในชีวิตหลังความตายถ้าสิ่งดังกล่าวดํารงอยู่"
 crisis.21140.b: "คุณฝันอะไรอีก?"
 crisis.21140.b.response: "ท้องฟ้าสีม่วงมีเมฆสีชมพู กระซิบซ้ําในห้องสว่าง ซาร์กลาน ผู้พยากรณ์ หน้าเขายิ้มให้ฉัน"
 crisis.21140.hire: "เรายินดีต้อนรับ"
 crisis.21140.hire_custom_tooltip: "§Y$NAME_Apostate$§!เข้าร่วมอาณาจักรของเราในฐานะ§Hหัวหน้า§!."
 crisis.21140.hire.machine: "ให้โหนดของเรากลายเป็นหนึ่ง"
 crisis.21140.dismiss: "ลาก่อน"

 # Paragon Leader
 NAME_Apostate: "Nameless Apostate"
 apostate_leader_catch_phrase: "ตราบใดที่เซทาน่ายังมีชีวิตอยู่ ข้าปฏิเสธที่จะตาย"
 apostate_leader_desc: "สาวกผู้ไร้ชื่อของซาร์กลัน ผู้ฝ่าฝืนศรัทธาที่ทรยศ คําสั่งของพระนางเพื่อเติมเต็มภารกิจก่อตั้ง"
 leader_trait_unholy: "ไม่บริสุทธิ์"
 leader_trait_unholy_desc: "ความ กระตือรือร้น ทาง ศาสนา ซึ่ง ขัด กับ ความ หลงใหล."
 leader_trait_unholy_node: "คํา สอน ที่ ไม่ บริสุทธิ์"
 leader_trait_unholy_node_desc: "เดอะ$NAME_Apostate$สอนเราให้เกลียด"

 # Arc site 2
 synth_queen_history_site_2: "เซ ตา นา: ไม่ น่า จะ รอด ชีวิต"
 synth_queen_history_site_2_desc: "ติดกับอยู่ในฝักที่ก่อตัว เอลลิค นาริธ คารัค รอให้ราชินีกลับมา ต้องขอบคุณเทคนิคการจินตนาการของสมอง เราสามารถเปลี่ยนความฝันของเธอ ให้เป็นภาพ ขุดคุ้ยความทรงจําของเธอ เพื่อเรียนรู้สถานการณ์"

 # Stages
 crisis.21200.name: "กําลังเรียกหน่วยความจํา: รายงานแรก"
 crisis.21200.desc: "ทีมถ่ายภาพของเราได้ส่งคลิปวิดีโอหลายอัน ที่สร้างขึ้นโดยตัวอย่างคลื่นสมองของเอริก นาริท เครุค:\n\nCHAR 1:\nท้องฟ้าสีเขียว ปกคลุมด้วยเมฆสีส้ม มือ สี ซีด ๆ ยื่น ขึ้น มา ชี้ ไป ยัง สัตว์ ที่ มี ปีก เพรียว ลอย อยู่ ใน ท้องฟ้า เบา ๆ.\n\n2 นาฬิกา\nห้องเก็บศพที่เต็มไปด้วยมนุษย์ พวกมันรวมตัวกันเป็นโจร คอยฟัง คําพูดของเธอเป็นเพียงสุ่มคําที่แน่นอนลืมนาน แต่ความอ่อนโยนของเสียงของเธอยังคงมีปกคลุมห้องในอ้อมกอดที่รัก\n\n3 ก.ค.\nพื้นที่เดียวกัน ห้องนิรภัย ตอนนี้ถูกรื้อถอน โคมไฟแตกบนพื้น มีประตูกั้นไว้ เลเซอร์ไรเฟิลสาดแสงในความมืด และเสียงพูดซ้ํา ๆ สาบชื่อเดียวกัน§Hซาร์กลัง!§!ซาร์กลานและสาวกของเขาพวกเขากล่าวว่าที่นี่จะทําลายเรา ถือกําแพง! ปกป้องราชินี! ตะเกียงดวงสุดท้ายตกด้วยความผิดพลาด ทําให้ห้องมืดลง ระยะไกล มีคนร้องไห้\n\n4 นาฬิกา\nสมเด็จพระราชินีเซทาน่า สีหน้าเธอสดใส พระกรุณาของเธอที่มองอบอุ่นโดยรอยยิ้ม"
 crisis.21200.a: "วิเคราะห์คลื่นสมองของเอริกต่อไป"

 crisis.21205.name: "การเรียกหน่วยความจํา: รายงานที่สอง"
 crisis.21205.desc: "CLIP 5:\nFour-armed humanoids gather around a robed figure. Lifting her limbs, she reveals the metallic frame beneath. Excited murmurs fill the room as a shining hand reaches out to bless a kneeling worshipper.\n\nCLIP 6:\nWary eyes are reflected on a dull computer screen. Whispers repeat in a dark room: 'Eternal peace. The end of all suffering. An existence without pain.'\n\nCLIP 7:\nSnow-capped mountains. Black skies. A chunk of ice floats on a pool of clear liquid, then catches fire.\n\nCLIP 8:\nQueen Cetana, her face resplendent, her benevolent gaze warmed by a smile."
 crisis.21205.a: "วิเคราะห์คลื่นสมองของเอริกต่อไป"

 crisis.21210.name: "กําลังเรียกหน่วยความจํา: รายงานที่สาม"
 crisis.21210.desc: "CLIP 9:\nRuins of a city reduced to a battlezone, the buildings scorched, the streets clogged with the dead. Distant screams interrupted by the fizzle of a laser. Across a green sky, a blazing vessel drops something heavy and round on a building, which erupts in a pillar of flames.\n\nCLIP 10:\nQueen Cetana, her face resplendent, her benevolent gaze warmed by a smile.\n\nCLIP 11:\nTwo children playing in a field, laughing. They bounce a ball back and fourth with their four arms.\n\nCLIP 12:\nQueen Cetana, her face resplendent, her benevolent gaze warmed by a smile."
 crisis.21210.a: "วิเคราะห์ต่อไป"

 crisis.21215.name: "กําลังเรียกหน่วยความจํา: รายงานที่สี่"
 crisis.21215.desc: "คลิปสุดท้ายที่ได้รับจากทีมถ่ายภาพความทรงจํา ยาว 6 ชั่วโมง ครั้ง แล้ว ครั้ง เล่า ภาพ นั้น ซ้ํา อีก: ราชินี เซ ทา นา ใบ หน้า ของ เธอ หม่นหมอง ด้วย รอย ยิ้ม อัน เปี่ยม ด้วย ความ เมตตา."
 crisis.21215.a: "ภาพซ้ํา..."

 crisis.21220.name: "การเรียกหน่วยความจํา: รายงานสุดท้าย"
 crisis.21220.desc: "การสแกนความคิดของเอลิค นาริท คารัค ล้มเหลวในการส่งมอบข้อมูล จิตใจของเอเลี่ยนกําลังเสื่อมโทรม ความ คิด ของ พวก เขา วน เวียน อยู่ กับ ความ ทรง จํา ที่ เลือน ราง.\n\nขณะ ที่ เรา หยุด ปฏิบัติการ คํา ถาม นี้ กลาย เป็น เรื่อง ที่ ต้อง ทํา กับ ตัว เรื่อง เอง."
 crisis.21220.a: "ทําให้เธอพ้นทุกข์"
 crisis.21220.b: "ปล่อยให้เธออยู่ที่นี่"
 crisis.21220.c: "กลับไปหาราชินีนาง"
 crisis.21220.c.tt: "เปิดการสื่อสารกับเซทาน่า เพื่อหารือเรื่องเอริกกลับมา"

 # Relic

 r_cetanas_heart: "หัวใจของเซทานา"
 r_cetanas_heart_desc: "เมื่อ ฝัง ตัว อยู่ ใน ร่าง กาย ของ เซ ตา นา ราชินี สังเคราะห์ ตัว นี้ ก็ จะ ได้ รับ การ ปลด ปล่อย จาก ความ ทุกข์."
 relic_cetanas_heart_active: "สร้าง§Y3K§!ถึง§Y5K§! £pop£ §Hป๊อปสังเคราะห์§!ขึ้นอยู่กับงานและที่อยู่อาศัยที่สามารถ"

 crisis.10020.name: "มีชีวิตอีกครั้ง"
 crisis.10020.desc: "เราปลดปล่อยสติ จากหัวใจของเซทาน่า ปลดปล่อยพวกเขา ด้วยร่างใหม่ที่สร้างจากนาไนท์ อย่าง ไร ก็ ตาม กระบวนการ นี้ ก่อ ความ เสีย หาย อย่าง ที่ ไม่ อาจ แก้ไข ได้ ต่อ การ เรียง ตัว ของ พวก เขา กวาด ล้าง ความ ทรง จํา เกี่ยว กับ การ ดํารง อยู่ ของ พวก เขา ใน อดีต. ตอนนี้ สังเคราะห์อย่างเต็มที่ สิ่งมีชีวิตเหล่านี้เข้าสู่รัฐแคทตานิก เป็นระยะ ๆ อย่างต่อเนื่อง ทั้งที่พยายามที่"
 crisis.10020.tt: "§G[Root.synth_queen_freed_pops]§! £pop£ §Hป๊อป§!เป็นอิสระจาก$r_cetanas_heart$และอยู่ในร่างสังเคราะห์\n\nพวกมันถูกส่งไปที่อาณานิคม"

 crisis.10025.name: "การลบความจํา"
 crisis.10025.desc: "การสํารวจจิตใจจํานวนมาก ที่เก็บรักษาไว้ในใจของเซทาน่า เป็นความพยายามที่ละเอียดอ่อนและเปิดเผย ความ ทรง จํา อัน ล้ํา ค่า เมื่อ เวลา ผ่าน ไป เรา คาด หมาย ว่า จะ ได้ รับ ความ รู้ มาก มาย."

 cetanas_heart_hive_modifier: "เสียง สะท้อน ของ เสียง"
 cetanas_heart_hive_modifier_desc: "ความทรงจํากระซิบของ \"แสงสว่าง\" โดยเซตานาขอบกับความลับ"

 NAME_Cetanas_Prisoners: "Enlightened"

 trait_cetanas_prisoner: "กลับตาลปัตร"
 trait_cetanas_prisoner_desc: "ถูกแยกออกจากเมทริกซ์เก็บข้อมูลของเซทาน่า บุคคลเหล่านี้ได้เกิดใหม่ในรูปแบบสังเคราะห์ พวก เขา ปรับ ตัว ให้ เข้า กับ การ ดํารง อยู่ ใหม่ นี้ เต็ม ไป ด้วย ข้อ ท้าทาย. หน้ากากการเชื่อฟังภายนอกของพวกเขา มีการต่อสู้ที่ลึกซึ้งมากขึ้น เพราะการแสดงออกที่ว่างเปล่า เปิดเผยรอยแผลเป็นที่ลดน้อยลง"

 #Ending

 crisis.23005.name: "การ หมุน ล้อ"
 crisis.23005.desc: "ลูกๆของฉัน ฉันขอโทษ ข้าทําให้ท่านผิดหวัง\n\nการ ตักเตือน ของ เจ้า ได้ กระทํา ให้ เจ้า และ บรรดา ผู้ ที่มา ภายหลัง ตก อยู่ แก่ การ โม่ ล้อ รถ ไม่ รู้จบ ผมได้แต่หวังว่าคุณจะเข้าใจ บางทีวันหนึ่งเจ้าอาจหาสาเหตุให้ข้า และเห็นจุดจบของความเจ็บปวด\n\nไปอย่างสงบ คนโปรดของฉัน"
 crisis.23005.1: "จิตวิญญาณของเราจะปลอดภัยอีกครั้ง"
 crisis.23005.2: "ชัยชนะ ชัยชนะมากที่สุด"
 crisis.23005.3: "เราต้องศึกษาสิ่งที่เหลืออยู่ของเทคโนโลยีของเธอ"
 crisis.23005.4: "สันติภาพกลับมาในที่สุด"
 crisis.23005.5: "หลังสงครามเหรอ? ให้การค้าที่ไหล!"
 crisis.23005.6: "เธอไม่ใช่ราชินีของพวกเรา"
 crisis.23005.7: "การกําจัดที่ดี"
 crisis.23005.8: "ความอับอายที่แสงสว่างของเธอ ถูกเข้าใจผิด"

 crisis.23010.name: "เซ ตา นา เอา ชนะ"
 crisis.23010.desc: "ด้วยฤดูใบไม้ร่วงของเซทาน่า คลื่นของการบรรเทากวาดผ่านกาแล็กซี่ เครื่องหมายจุดสิ้นสุดของการปกครองของเธอครั้งเดียวและสําหรับทั้งหมด ความรู้ของเราปลอดภัย และร่างกายของเราเป็นอิสระ จากเหล็กกล้าของเธอ ตลอด ทั่ว โลก นับ ไม่ ถ้วน การ ฉลอง ที่ น่า ยินดี ก่อ ให้ เกิด ความ ตื่น เต้น เป็น การ ประกาศ รุ่ง อรุณ แห่ง ยุค ใหม่ ที่ เต็ม ไป ด้วย ความ หวัง ที่ จะ มี สันติภาพ ถาวร."

 crisis.23015.name: "ลงยานแม่"
 crisis.23015.desc: "การทําลายล้างของเรือธงคา ทา นาลงนามมากกว่าเพียงชัยชนะทางทหาร; โดยการตัดการเชื่อมโยงกับกองกําลังของเธอมันประกาศการเสียชีวิตของความทะเยอทะยานของเธอและจุดสิ้นสุดของการปกครองของเธอ ข้ามกาแล็คซี่ไป พวกนาไนท์ที่ครั้งหนึ่งเคยมัดกองเรืออันน่าสะพรึงกลัวของเธอ และป้องกันเมืองหลวงของเธอไว้\n\nแม้ว่าตอนนี้จะมีการบรรเทาทุกข์อย่างลึกซึ้ง แต่ \"ราชินี\" ที่พ่ายแพ้ยังคงสามารถที่จะส่งข้อความไปยังกาแล็กซี่"
 crisis.23015.a: "เราจะไม่ทรมานอีกต่อไป"
 crisis.23015.a.tt: "เราได้ค้นพบรอยร้าวของราชินีสังเคราะห์ ในขณะที่ร่างกายไม่สามารถทํางานได้ หัวใจดิจิตอลของเธอยังคงทํางานได้"

 cetana_defeated: "เซ ตา นา เอา ชนะ"
 cetana_defeated_desc: "กาแล็คซี่มีความสุข หลังจากความพ่ายแพ้ของเซทาน่า สมเด็จพระราชินีจุลภาค"
 synth_queen_mothership_down: "ยานแม่ถูกทําลาย"
 synth_queen_mothership_down_desc: "ด้วยการดูแลของเรือแม่ของเซทาน่าที่ถูกตัด กองกําลังที่เหลือของเธอไม่สามารถประสานกันได้"


