 cosmogenesis_superlight: "แสงเหนือระดับ"
 cosmogenesis_superlight_desc: "ความเร็วและพลังงานของโฟตอนถูกเพิ่มขึ้นโดยประดิษฐ์ขึ้น กลายเป็นประโยชน์ต่อการผลิตพลังงานแสงอาทิตย์"
