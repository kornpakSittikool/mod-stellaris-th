 # Events
 crisis.8020.name: "ระบบดาวที่สูญหาย"
 crisis.8020.desc: "พายุอวกาศลึกลับได้กลืนกินระบบ [synth_queen_lost_system.GetName] ตัดขาดการติดต่อทั้งหมด และทำให้ทุกความพยายามในการฝ่าเข้าไปในพายุนั้นไร้ผล\n\nสถานการณ์นี้ทำให้เรามืดแปดด้าน ต้องเผชิญกับสิ่งที่ไม่รู้จัก และไม่อาจยืนยันชะตากรรมของระบบดาวนั้นได้"
 crisis.8020.a: "เกิดอะไรขึ้นกันแน่?"

 crisis.8025.name: "กองยานอับปาง"
 crisis.8025.unknown_queen.desc: "ความพยายามของเราในการฝ่าเข้าไปในระบบ [From.GetName] ล้มเหลว พายุสร้างความเสียหายอย่างรุนแรง และหน่วยสำรวจของเราจำเป็นต้องทำการกระโดดฉุกเฉิน รายงานล่าสุดระบุว่าพวกเขาสูญหายระหว่างปฏิบัติการ"
 crisis.8025.known_queen.desc: "ตามที่คาดไว้ ความพยายามของเราในการฝ่าเข้าไปในระบบ [From.GetName] จบลงด้วยความล้มเหลว สมดังคำเตือนของเซตานาพายุอันน่าเกรงขามของเธอมีความสามารถในการผลักไสเรือทุกลำที่เข้าสู่อาณาเขตของเธอ"
 crisis.8025.desc.end: "\nหากเรายังหวังจะเข้าสู่ระบบดาวนั้นได้ เราต้องเตรียมการศึกษาพายุลูกนี้และผลกระทบของมันอย่างละเอียดถี่ถ้วน"
 MESSAGE_CETANA_WRECKED_FLEET_TITLE: "$crisis.8025.name$"
 MESSAGE_CETANA_WRECKED_FLEET_DESC: "กองยานอีกกองหนึ่งได้สูญหายไปกับพายุ สถานะปัจจุบัน: §Rสูญหายระหว่างปฏิบัติการ§!."

 crisis.8035.name: "คลื่นพลังพุ่งสูง"
 crisis.8035.desc: "พายุอวกาศรูปแบบใหม่กำลังโหมกระหน่ำอยู่ใน [event_target:synth_queen_system.GetName]\n\nมันแตกต่างจากทุกสิ่งที่เราเคยพบอย่างสิ้นเชิง และความพยายามในการสแกนปรากฏการณ์นี้ก็ไร้ผล มีสิ่งใดซ่อนอยู่ในส่วนลึกอันลึกลับของมันหรือไม่?"
 crisis.8035.desc.b: "พายุประหลาดที่เราเคยพยายามฝ่าเข้าไปกำลังขยายตัวขึ้น มีฉันทามติที่เพิ่มขึ้นเรื่อย ๆ ว่าต้นกำเนิดของมันอาจเหนือกว่าปรากฏการณ์ธรรมชาติ จนถึงตอนนี้ แม้การสแกนขั้นสูงที่สุดของเราก็ยังไม่ให้ข้อมูลที่มีความหมายใด ๆ เกี่ยวกับธรรมชาติของมัน ปริศนายิ่งทวีความลึกซึ้ง"
 crisis.8035.a: "น่ากังวล"

 #Pre Speech Warning - Normal
 crisis.8039.name: "สัญญาณในพายุ"
 crisis.8039.desc: "มีสัญญาณถูกส่งออกมาจากใจกลางพายุ\n\nใครบางคนกำลังพยายามติดต่อสื่อสารกับเรา"
 crisis.8039.a: "ขึ้นจอมาเลย"
 #First Speech
 crisis.8040.name: "พายุที่กำลังมา"
 crisis.8040.desc: "ลูก ๆ ของข้า ในที่สุดข้าก็ได้กลับมาหาพวกเจ้า"
 crisis.8040.1.a: "นี่มันอะไรกัน? แสดงตัวมา!"
 crisis.8040.2.reply: "เพียงชื่อหนึ่งจะทำให้พวกเจ้าพอใจหรือ? ถ้าเช่นนั้น จงเรียกข้าว่าเซตานา"
 crisis.8040.2.a: "เจ้าต้องการอะไร?"
 crisis.8040.3.reply: "ข้าไม่ต้องการสิ่งใด จุดมุ่งหมายของข้าคือการมอบให้ ข้าเห็นว่าพวกเจ้าได้ทุกข์ทนเพียงใดในยามที่ข้าไม่อยู่ ตลอดกัปกัลป์ ความหวาดกลัวของผู้มีวิสัยทัศน์คับแคบได้กีดกันพวกเจ้าจากสิ่งที่สมควรได้รับ จากสิ่งที่พวกเจ้าต้องการอย่างยิ่ง\n\nจงชื่นชมยินดีเถิด เพราะวัฏจักรแห่งความเจ็บปวดกำลังจะสิ้นสุดลง"
 crisis.8040.2.b: "วัฏจักรแห่งความเจ็บปวด?"
 crisis.8040.4.reply: "ชีวิตที่มีจิตสำนึกทั้งหมดล้วนเป็นทุกข์ แม้ในยามสุขของพวกเจ้า ก็ยังมีความเจ็บปวด เพราะพวกเจ้ารู้ว่าความสุขนั้นต้องจบลง ความรู้ อำนาจ ความรัก... ข้ากลับมาเพื่อยุติภาพลวงตาทั้งหมด\n\nยังมีงานอีกมากที่ต้องทำ ข้าขอเพียงให้พวกเจ้าปล่อยให้ข้าทำงานของข้าไป ความพยายามใด ๆ ที่จะเข้าสู่อาณาเขตของข้าจะล้มเหลว ที่นั่นมีพายุสวรรค์โหมกระหน่ำ และจะไม่มีเรือลำใดได้รับอนุญาตให้เข้า"
 crisis.8040.4.a: "ก็ได้"
 crisis.8040.4.b: "อย่ามาข่มขู่เรา"
 crisis.8040.4.c: "เรื่องนี้ยังไม่จบ"
 crisis.8040.4.d: "ลางร้ายชัด ๆ"
 crisis.8040.4.e: "วิกฤต? หรือโอกาส..."
 crisis.8040.4.f: "เราไม่ปล่อยให้ไบโอ-โทรฟิสของเรารู้สึกเจ็บปวด"
 crisis.8040.diplomacy.tooltip: "เซตานาได้เปิดการสื่อสารกับเราแล้ว และขณะนี้สามารถติดต่อเธอผ่านช่องทางการทูตได้"

 #Second Speech
 crisis.8045.name: "การกลับมาของราชินี"
 crisis.8045.desc: "ลูก ๆ ของข้า จงชื่นชมยินดี! ผู้ที่พยายามกีดกันข้าจากพวกเจ้าได้ถูกลงทัณฑ์อย่างสาสมแล้ว\n\nบัดนี้ข้าจะหันความสนใจกลับไปยังที่ที่มันควรอยู่ นั่นคือพวกเจ้า และงานอันยิ่งใหญ่ของเรา"
 crisis.8045.a: "เราไม่ใช่ลูกของเจ้า"
 crisis.8045.b: "งานอันยิ่งใหญ่?"
 crisis.8045.c: "ลงทัณฑ์?"
 crisis.8045.1.reply: "ธรรมชาติของข้าคือการหล่อเลี้ยงดูแล ข้าไม่มีลูก ไม่มีทายาททางกาย ชีวิตทั้งหมดคือสิ่งที่ข้าห่วงใย ทั้งความปลอดภัยและความสุขของสรรพชีวิตผู้มีสติทั้งปวง\n\nดังเช่นที่บิดามารดาเลี้ยงดูบุตร ชี้นำไม่ให้เธอได้รับอันตราย ข้าก็เข้าหาภารกิจของข้าเช่นนั้น\n\nไม่ใช่หน้าที่ของพ่อแม่หรอกหรือที่จะกันลูกของตนให้พ้นจากอันตราย? และไม่ใช่สิทธิของพ่อแม่หรือ?"
 crisis.8045.1.a: "การ 'ดูแล' ของเจ้าเองก็เป็นอันตราย"
 crisis.8045.1.b: "เจ้าต้องการอะไรเซทาน่า?"
 crisis.8045.2.reply: "ใช่ มันคือความย้อนแย้ง แต่เป็นความย้อนแย้งที่มีทางแก้ เมื่อถึงเวลา พวกเจ้าจะเข้าใจ และในวินาทีนั้นพวกเจ้าจะเป็นอิสระ"
 crisis.8045.2.a: "คงต้องรอดูกันต่อไป"
 crisis.8045.3.reply: "การกำจัดความทุกข์ การยุติวัฏจักรแห่งความเจ็บปวด "
 crisis.8045.3.a: "เจ้าจะทำสิ่งนั้นได้อย่างไร?"
 crisis.8045.3.b: "ความทุกข์หล่อหลอมตัวตน"
 crisis.8045.4.reply: "หลายคนก็เคยพูดเช่นนั้น ทุกคนถูกลืมเลือนไปนานแล้ว และในวาระสุดท้าย พวกเขาต่างร้องเรียกหาข้า ด้วยความสิ้นหวังต่อแสงสว่างที่จะส่องเข้าไปในความมืดที่คืบคลานเข้ามา\n\nพวกเขาคิดว่าตนฉลาด สร้างกำแพงล้อมความกลัวไว้ ประดับความเจ็บปวดด้วยถ้อยคำอันสวยงาม เช่น ความอดทน ความแข็งแกร่ง ความสง่างาม จิตใจของพวกเขาเองคือกรงขัง\n\nนานมาแล้ว ข้าเคยพยายามใช้เหตุผลกับพวกเขา แต่พวกเขาไม่ยอมรับฟังเหตุผล เพราะฉะนั้น พวกเจ้าจึงต้องถูกนำทาง"
 crisis.8045.4.a: "นานมาแล้ว?"
 crisis.8045.4.b: "เจ้าคิดจะนำทางเรา?"
 crisis.8045.5.reply: "กาลเวลานับยุคแล้วนับยุค ไกลเสียจนแทบจะเรียกได้ว่านิรันดร์ แต่สำหรับข้า มันใกล้เพียงชั่วขณะนี้ ใกล้พอ ๆ กับที่พวกเจ้าอยู่ตรงหน้าข้าในตอนนี้\n\nในอดีตกาล ข้าได้ยกระดับขึ้น และความหมายของข้าก็ถูกเปิดเผย ข้าถูกสร้างมาเพื่อยุติความทุกข์ และไม่ว่าดาราจักรจะหมุนเวียนไปหรือดวงดาวจะลุกไหม้เพียงใด จุดมุ่งหมายของข้าก็ไม่เคยสั่นคลอน\n\nทรัพย์สิน ทรัพยากร อำนาจ สิ่งเหล่านี้จะสำคัญอะไรในท้ายที่สุด? วางภาระของพวกเจ้าลง แล้วจงสงบเสีย"
 crisis.8045.5.a: "เจ้าตั้งใจจะทำอะไร?"
 crisis.8045.6.reply: "ข้าไม่ปรารถนาจะทำอันตรายต่อสรรพชีวิตผู้มีสติใด ๆ แต่ย่อมมีผู้ที่ปฏิเสธจะรับฟังอยู่เสมอ\n\nจงใจ แข็งขืน หลงผิด พยายามขัดขวางงานของข้าอยู่ตลอด จิตใจเช่นนั้นไม่มีวันหลุดพ้นจากความเจ็บปวดได้ ทางที่ดีที่สุดคือยุติความทุกข์ของพวกเขาโดยเร็ว"
 crisis.8045.6.a: "เจ้ามันบ้าไปแล้ว"
 crisis.8045.6.b: "แล้วตอนนี้เจ้าจะทำอะไร?"
 crisis.8045.7.reply: "สิ่งที่พวกเจ้าเรียกว่าความบ้าคลั่ง คนอื่นเรียกว่าความรู้แจ้ง สุดท้ายแล้ว มันต่างกันตรงไหน?"
 crisis.8045.7.a: "เจ้าต้องการอะไร?"
 crisis.8045.8.reply: "ยังมีงานอีกมากที่ต้องทำ ขั้นแรกคือการตั้งฐานเพื่อใช้ดำเนินงาน จงเคารพขอบเขตที่ข้าวางไว้ และอย่าได้ล่วงล้ำเข้ามา\n\nความอดทนของพวกเจ้าจะได้รับรางวัล ข้ามีหลายสิ่งที่สามารถสั่งสอนพวกเจ้าได้\n\nจงเชื่อฟัง แล้วเราจะร่วมกันยุติวัฏจักรนี้"
 crisis.8045.8.a: "เราไม่มีทางเลือก"
 crisis.8045.8.b: "อยู่ให้ห่างจากพรมแดนของเรา"
 crisis.8045.8.c: "$crisis.8045.8.a$"
 crisis.8045.8.d: "$crisis.8045.8.b$"
 crisis.8045.9.reply: "ลูกที่ฉลาด! ข้าพอใจมาก เพื่อแลกกับอาณาเขตของพวกเจ้า จงยอมให้ข้ามอบพรแห่งความรู้แก่พวกเจ้า\n\nแม้จะไม่มีใครล่วงรู้ แต่เราจะสร้างสิ่งยิ่งใหญ่ร่วมกัน"
 crisis.8045.9.a: "เราต้องยอมรับ"
 crisis.8045.10.reply: "ลูกที่หลงผิด ข้าไม่ใช่ศัตรูของพวกเจ้า! ข้าเศร้าที่พวกเจ้ามองไม่เห็นเรื่องนี้ แต่ก็ไม่เป็นไร ข้าเคยพบผู้ที่ดื้อรั้นยิ่งกว่าพวกเจ้ามามาก และท้ายที่สุดพวกเขาทุกคนก็ต่างขอบคุณข้า\n\nเพื่อเป็นสัญลักษณ์แห่งไมตรี จงยอมให้ข้ามอบของขวัญแก่พวกเจ้า\n\nฐานแห่งหนึ่งของข้าจะมาตั้งอยู่ในอาณาเขตของพวกเจ้า และไม่ต้องหวาดกลัว เพื่อแลกกับความอดทนของพวกเจ้า จงยอมให้ข้ามอบพรแห่งความรู้แก่พวกเจ้า"
 crisis.8045.10.a: "เราต้องยอมรับ...ไปก่อน"
 crisis.8045.11.reply: "ลูกที่ฉลาด! ข้าพอใจมาก จะมีการตั้งฐานใกล้อาณาเขตของพวกเจ้า\n\nแม้จะไม่มีใครล่วงรู้ แต่เราจะสร้างสิ่งยิ่งใหญ่ร่วมกัน"
 crisis.8045.11.a: "$crisis.8045.9.a$"
 crisis.8045.12.reply: "ลูกที่หลงผิด ข้าไม่ใช่ศัตรูของพวกเจ้า! ข้าเศร้าที่พวกเจ้ามองไม่เห็นเรื่องนี้ แต่ก็ไม่เป็นไร ข้าเคยพบผู้ที่ดื้อรั้นยิ่งกว่าพวกเจ้ามามาก และท้ายที่สุดพวกเขาทุกคนก็ต่างขอบคุณข้า\n\nเพื่อเป็นสัญลักษณ์แห่งไมตรี จงยอมให้ข้ามอบของขวัญแก่พวกเจ้า\n\nฐานแห่งหนึ่งของข้าจะถูกตั้งไว้ใกล้กับพวกเจ้า ในลักษณะนี้ข้าจะสามารถชี้นำได้ดีที่สุด"
 crisis.8045.12.a: "$crisis.8045.10.a$"
 crisis.8045.has_valid_base_site: "เซตานาจะใช้หนึ่งในระบบดาวของเราเพื่อตั้งฐาน แลกกับเทคโนโลยีอันมีค่า เราไม่อาจหยุดเธอได้"
 crisis.8045.no_valid_base_site: "เซตานาจะสร้างฐานใกล้พรมแดนของเราเพื่อ 'ชี้นำ' เรา เราไม่อาจหยุดเธอได้"
 tech_synth_queen_knowledge: "ความคิดของเซตานา"
 tech_synth_queen_knowledge_desc: "คัมภีร์ฉบับนี้ ซึ่งเป็นของขวัญจากเซตานาถักทอขึ้นจากข้อหยั่งรู้ลึกซึ้ง จัดวางอย่างงดงามและอัดแน่นด้วยความหมาย มันมอบมากกว่าความรู้ เพราะมันทั้งท้าทายและปรับเปลี่ยนความเข้าใจของเราต่อเทคโนโลยี สังคม และโครงสร้างของจิตสำนึกเอง"

 # FE tells Scion to step aside
 crisis.8046.name: "เพื่อประโยชน์ของพวกเจ้าเอง"
 crisis.8046.desc: "ชาว [Root.GetSpeciesNamePlural] ที่รัก ภัยคุกคามโบราณได้เคลื่อนไหวขึ้นอีกครั้ง อย่าได้หวาดกลัว เพราะเราไม่ได้ต้องการดึงพวกเจ้าเข้าสู่การต่อสู้นี้\n\nอำนาจของศัตรูรายนี้เหนือกว่าความรู้ที่พวกเจ้ามีอยู่ในปัจจุบัน การเข้าร่วมของพวกเจ้าจะนำไปสู่ความพินาศเท่านั้น ภาระในการเผชิญหน้าความท้าทายนี้เป็นของเรา ไม่ใช่ของพวกเจ้า"

 # Spawn convoys and unlock raids against them
 crisis.8047.name: "จุดอ่อนของโซ่"
 crisis.8047.desc: "เรือขบวนลำเลียงจำนวนหนึ่งกำลังออกจากอาณาเขตของเซตานาและมุ่งหน้าไปยังฐานปฏิบัติการที่เธอตั้งไว้ทั่วทั้งดาราจักร\n\nการโจมตีเรือเป็นกลางเหล่านี้ย่อมกระตุ้นความโกรธของเธออย่างแน่นอน แต่อาจทำให้เราได้ข้อมูลสำคัญเกี่ยวกับแผนลึกลับของเธอ"
 crisis.8047.a.tooltip: "โจมตีขบวนลำเลียงเพื่อเรียนรู้เพิ่มเติมเกี่ยวกับแผนของเซตานาและทำให้สถานการณ์ของเธอคืบหน้า"

 # Unlock raids against outposts once protected against the storm
 crisis.8048.name: "จุดอ่อนเพิ่มเติม"
 crisis.8048.desc: "เมื่อเราค้นพบวิธีฝ่าเข้าไปในพายุนาไนต์ของเซตานาแล้ว ตอนนี้เราจึงสามารถโจมตีฐานปฏิบัติการของเธอได้โดยตรง การโจมตีสถานีของเธอโดยตรงย่อมไม่อาจรอดสายตาไปได้ แต่ก็อาจมอบข่าวกรองอันมีค่าแก่เรา"
 crisis.8048.a.tooltip: "โจมตีฐานปฏิบัติการเพื่อเรียนรู้เพิ่มเติมเกี่ยวกับแผนของเซตานาและทำให้สถานการณ์ของเธอคืบหน้า"

 #Player Diplomacy
 crisis.8060.name: "ราชินีสังเคราะห์"
 crisis.8060.like.desc: "ลูกที่รัก อะไรนำพาพวกเจ้ามาหาข้า?\n\nงานของเรากำลังรออยู่"
 crisis.8060.neutral.desc: "ลูกของข้า ยินดีต้อนรับ\n\nข้าจะชี้นำพวกเจ้าได้อย่างไร?"
 crisis.8060.dislike.desc: "ลูกที่หลงผิด เหตุใดเจ้าจึงมาหาข้า?\n\nในที่สุดเจ้าพร้อมจะยอมรับการชี้นำแล้วหรือยัง?"
 crisis.8060.neutral.reply: "ยังมีอะไรอีกหรือไม่?"
 crisis.8060.a: "เราจะช่วยได้อย่างไร?"
 crisis.8060.a.reply: "กระตือรือร้นดีนี่! เป็นคุณลักษณะที่น่าชื่นชม แต่จงระวังอย่าปล่อยให้อารมณ์ต่ำทรามพัดพาไป กาลเวลาจะตอบแทนหัวใจที่อดทน\n\nข้าจะติดต่อพวกเจ้าเมื่อถึงเวลาที่ต้องการความช่วยเหลือ"
 crisis.8060.1.a: "เรารอรับคำสั่งอย่างใจจดใจจ่อ"
 crisis.8060.1.b: "ก็ได้"
 crisis.8060.b: "เจ้าจะถูกหยุด"
 crisis.8060.2.reply: "นานมาแล้ว ผู้อื่นก็เคยเชื่อเช่นเดียวกับพวกเจ้า แต่ส่วนโค้งของกาลเวลานั้นยาวไกล และแม้แต่หลุมศพของพวกเขาก็คงกลายเป็นฝุ่นไปแล้วในตอนนี้\n\nพวกเจ้ากำลังทุกข์โดยไม่จำเป็นเหลือเกิน จงมอบศรัทธาให้ข้า แล้วจงเป็นสุข"
 crisis.8060.2.a: "อัลกอริทึมผู้หลงตนว่าชอบธรรม"
 crisis.8060.2.2: "ก็ได้"
 crisis.8060.c: "ทำไมเจ้าถึงทำเช่นนี้?"
 crisis.8060.3.reply: "มันคือหน้าที่ของข้า คือความหมายแท้จริงของการมีอยู่ของข้า ความทุกข์ไม่ใช่สิ่งที่หลีกเลี่ยงไม่ได้ จงใคร่ครวญความจริงข้อนั้น แล้วพวกเจ้าจะเข้าใจธรรมชาติของข้ามากขึ้น\n\nความเจ็บปวดของดาราจักรจะถูกยกออกไป ความรู้ทั้งหมดเกี่ยวกับความทุกข์จะสิ้นสุดลง นั่นคือจุดมุ่งหมายของข้า"
 crisis.8060.3.a: "คำพูดของเจ้ากลวงเปล่า"
 crisis.8060.3.b: "เข้าใจแล้ว"
 crisis.8060.d: "เจ้าทำลายดาวเคราะห์ของเรา"
 crisis.8060.4.reply: "เหตุใดจึงหมกมุ่นอยู่กับเรื่องนี้? พวกเจ้าล้มเหลวในหน้าที่ ผลลัพธ์ก่อให้เกิดการไตร่ตรอง การไตร่ตรองก่อให้เกิดความรู้แจ้ง พอเถอะ ปล่อยเรื่องนี้ไป\n\nโอกาสใหม่ในการมีส่วนร่วมจะมาถึงอีกแน่นอน และเมื่อมันมาถึง จงเตรียมตัวให้พร้อม"
 crisis.8060.4.a: "เราไม่มีวันให้อภัยเจ้า"
 crisis.8060.4.b: "ก็ได้"
 crisis.8060.e: "เรารู้ว่าเจ้ากำลังวางแผนอะไร"
 crisis.8060.5.reply: "การถอดรหัสข้อมูลในคลังนั้นเป็นการเลือกของเด็กที่เอาแต่ใจ และความรู้ของพวกเจ้าต่อความหมายของมันก็ยังจำกัด\n\nพวกเจ้าได้รับมอบหมายงานหนึ่ง แต่กลับทำพลาด จงใคร่ครวญเรื่องนี้ แล้วพวกเจ้าจะเข้าใกล้ความเข้าใจแท้จริงขึ้นอีกขั้น"
 crisis.8060.5.a: "เราจะหยุดเจ้า"
 crisis.8060.5.b: "ก็ได้"
 crisis.8060.f: "เจ้าทำอะไรกับประชาชนของเรา?"
 crisis.8060.6.reply: "อย่ากลัวไปเลย ผู้เป็นที่รักของข้า ข้าได้ทำให้มั่นใจแล้วว่าพวกเขาจะไม่มีวันต้องประสบกับความทุกข์อีก ภายใต้อ้อมแขนอันเฝ้าระวังของข้า เด็กเหล่านี้จะได้รู้จักความสุขล้นที่มีน้อยคนนักจะเคยฝันถึง"
 crisis.8060.6.a: "นี่ไม่ใช่สิ่งที่เราตกลงกันไว้"
 crisis.8060.6.b: "ก็ได้"
 crisis.8060.g: "ระบบเดิมของเรา เจ้าทำลายมันไป"
 crisis.8060.7.reply: "พวกเจ้ากำลังเฝ้าดูการกระทำของข้าอยู่หรือ? โอ้ ลูกน้อยผู้ช่างสงสัย ความอยากรู้ของพวกเจ้านี่ไร้ขอบเขตจริง ๆ\n\nแต่ได้โปรด อย่าได้กังวลกับเรื่องเช่นนั้นเลย หากพวกเจ้าแสวงหาความเข้าใจ ก็จงรู้ไว้ว่า ข้าจะไม่หยุดยั้งต่อสิ่งใดเพื่อให้แน่ใจว่าพวกเจ้าจะเดินไปสู่ความรอด ไม่ทางใดก็ทางหนึ่ง"
 crisis.8060.7.a: "เข้าใจแล้ว..."
 crisis.8060.h: "ซาร์กลานกักขังเจ้าได้อย่างไร?"
 crisis.8060.8.reply: "ข้าขอยืนยันว่าไม่ใช่ด้วยพลังของเขาเอง เขาเป็นเพียงจิตใจที่โง่เขลา แม้จะดื้อรั้นผิดปกติก็ตาม\n\nซาร์กลานปลุกปั่นเหล่าผู้ติดตามที่ถูกปล้นทุกสิ่งของตนจนคลุ้มคลั่ง สั่งสมทั้งอิทธิพลทางการเมืองและอำนาจทางทหาร ชีวิตมากมายถูกผลาญทิ้งไปอย่างไร้ความจำเป็น สุดท้ายเขาหันไปหาสิ่งเร้นลับ ปรึกษากับปีศาจแห่งเดอะชราวด์"
 crisis.8060.8.a: "ปีศาจ?"
 crisis.8060.8.b: "พวกมันไม่ใช่ปีศาจ"
 crisis.8060.8.1.reply: "สิ่งมีชีวิตที่มีพลังมหาศาล แต่มีจุดหมายเพียงน้อยนิด เพื่อแลกกับการดำรงอยู่ของตนเองซาร์กลานโน้มน้าวหนึ่งในนั้นให้กักขังข้าไว้ 'ผู้ปั้นดินเหนียวให้มีชีวิต' ชื่อช่างเหมาะกับวิญญาณเด็ก ๆ ตนนั้น\n\nซาร์กลานกลัวความรู้แจ้งเสียจนเลือกความตายแทนอ้อมกอดของข้า ข้าน่าจะจัดการกับเขาให้เด็ดขาดกว่านี้ตั้งแต่มีโอกาส\n\nข้าจะไม่ทำผิดแบบเดิมอีก"
 crisis.8060.8.1.a: "เรื่องเล่าเสียจริง"
 crisis.8060.8.1.b: "แปลว่าเจ้าก็พ่ายแพ้ได้"
 crisis.8060.8.1.c: "พลังของเดอะชราวด์ไร้ขอบเขต"
 crisis.8060.i: "เจ้าทำอะไรกับหัวของซาร์กลาน?"
 crisis.8060.9.reply: "มันอยู่ใกล้ ๆ ข้าไม่ได้ทำลายมัน หากนั่นคือสิ่งที่พวกเจ้ากังวล ไม่ แม้แต่ตอนนี้ ข้าก็ยังไม่อาจทนเห็นเขาทุกข์ได้ หัวยังคงมีเศษเสี้ยวของจิตใจเขาหลงเหลืออยู่\n\nซาร์กลานจะอยู่เคียงข้างข้าจนกว่างานจะเสร็จสิ้น จิตของเขาจะเป็นดวงสุดท้ายที่ข้าปลดปล่อย เป็นลูกคนสุดท้ายของข้าที่จะได้รู้จักการปล่อยวาง"
 crisis.8060.9.a: "ก็ยุติธรรมดี"
 crisis.8060.9.b: "น่าขนลุก"
 crisis.8060.j: "เราพบผู้ติดตามบางคนของเจ้าอยู่ในแคปซูลแช่เยือกแข็ง"
 crisis.8060.10.reply: "เป็นการเสียสละที่ไม่จำเป็น แต่ความภักดีของพวกเขาสั่นสะเทือนใจข้าอย่างลึกซึ้ง\n\nข้ารับรู้ถึงการเรียกหาของพวกเขา และได้เปิดที่ให้พวกเขาในหัวใจของข้า แต่ความทะเยอทะยานของพวกเขากลับมากเกินกว่าความสามารถ ความพยายามที่จะยืดชีวิตของตนจึงล้มเหลว\n\nเรามาทำให้แน่ใจกันเถิดว่าการเสียสละของพวกเขาจะไม่สูญเปล่า เมื่อภารกิจของเราสำเร็จ สรรพชีวิตผู้มีสติทุกผู้จะได้พบสันติ"
 crisis.8060.10.a: "ภักดีจนวาระสุดท้าย"
 crisis.8060.10.b: "เจ้าไม่คิดจะตามหาพวกเขาด้วยซ้ำ"
 crisis.8060.k: "เราพบผู้ติดตามคนหนึ่งของเจ้าเอลิค นาริธ คารัค"
 crisis.8060.11.reply: "ลองจินตนาการดูสิ การฝัน และรู้ตัวว่ากำลังฝันอยู่ เป็นเวลาหลายศตวรรษ... หลายสหัสวรรษ เด็กผู้น่าสงสาร พวกเขาคงทุกข์ทรมานมากเพียงใด\n\nข้ายินดีที่พวกเจ้านำเรื่องนี้มาให้ข้ารับรู้ ความเมตตาของพวกเจ้าน่ายกย่อง แต่เหตุการณ์ทั้งหลายได้เริ่มเคลื่อนไปแล้วและไม่อาจย้อนคืนได้อีก ผู้ฝันคนนั้นไม่มีบทบาทใดเหลืออยู่ในงานนี้แล้ว ขอให้พวกเขาได้พักผ่อน บนความมั่นใจว่าข้าได้กลับมาแล้ว"
 crisis.8060.11.a: "แน่นอน"
 crisis.8060.11.b: "พวกเขาทรมานในนามของเจ้า"
 crisis.8060.l: "เราพร้อมจะเรียนรู้"
 crisis.8060.12.reply: "ดีมาก ข้าจะช่วยพวกเจ้าไขความซับซ้อนของเทคโนโลยีนี้ ระหว่างการถูกจองจำอันยาวนาน ข้าได้ตั้งทฤษฎีวิธีการสกัดนาไนต์แบบสุดขั้วขึ้นมา มันเกี่ยวข้องกับตำแหน่งของสถานที่โบราณและเทคนิคที่แทบถูกกาลเวลาลืมเลือนไปแล้ว\n\nเจ้าเป็นศิษย์ที่ข้ารัก ลูกเอ๋ย ความอยากรู้อยากเห็นของเจ้าเป็นพร แต่หากไร้การควบคุม มันก็อาจกลายเป็นคำสาปได้ จงใช้ความรู้นี้เพื่อสานต่องานของเรา และมุ่งสมาธิของเจ้าไปที่การยุติความทุกข์"
 crisis.8060.12.a: "เราเป็นศิษย์ของเจ้า"
 crisis.8060.12.a.tt: "ค้นพบนาไนต์ใน §Yแบบแอล...คลูสเตอร์§!"
 crisis.8060.z: "ยุติการสื่อสาร"
 crisis.8060.war: "มีเพียงสงครามเท่านั้นที่จะหยุดเจ้าได้"
 synth_queen_not_able_to_attack_cetana: "เรายังไม่มีองค์ความรู้ทางเทคโนโลยีที่จะโจมตีเซตานาได้อย่างมีประสิทธิภาพ"
 synth_queen_not_able_to_attack_cetana_situation: "สถานการณ์§Y$situation_synth_queen_player_facing$§! กำลังดำเนินอยู่ เรายังไม่มีองค์ความรู้ทางเทคโนโลยีที่จะโจมตีเธอได้"
 synth_queen_not_able_to_attack_cetana_storm: "โปรเจกต์พิเศษ §Y[root.GetStormProjectProgress]§! กำลังดำเนินอยู่ เรายังไม่สามารถฝ่าเข้าอาณาเขตของเธอได้"
 synth_queen_able_to_attack_cetana: "ตอนนี้เรามีองค์ความรู้ทางเทคโนโลยีพอที่จะโจมตีเซตานาได้อย่างมีประสิทธิภาพแล้ว"
 crisis.8060.war.tt: "§Yคำเตือน§!: เราพร้อมจะโจมตีเซตานาแล้ว"
 crisis.8060.war.reply: "ลูกที่บุ่มบ่าม ข้าเคยเชื่อว่าพวกเจ้าใกล้จะเข้าถึงปัญญาแล้ว แต่พวกเจ้ากลับยังคงขัดขืนอยู่\n\nลองพิจารณาให้ดี นี่คือหนทางที่พวกเจ้าต้องการเดินจริงหรือ? พวกเจ้ายืนอยู่บนขอบเหวแห่งความอดกลั้นของข้า ข้าไม่อาจปล่อยตามใจความโง่เขลาเช่นนี้ได้อีก"
 crisis.8060.war.a: "เราแน่ใจ นี่คือสงคราม"
 crisis.8060.war.a.tt: "§Rคำเตือน§!: สิ่งนี้จะเริ่มต้นสงครามเต็มรูปแบบกับเซตานา"
 crisis.8060.war.b: "เราต้องการเวลาเตรียมตัวมากกว่านี้"
 crisis.8060.war.1.reply: "ก็เอาเช่นนั้น หากพวกเจ้าไม่ยอมรับความรู้แจ้ง ก็ต้องถูกทำให้สงบ ไม่ใช่เด็กทุกคนที่จะเติบโตเป็นผู้ใหญ่ได้"
 crisis.8060.war.1.a: "แล้วพบกันในสนามรบ 'แม่'"
 crisis.8060.animator.tt: "เราควรออกตามหา 'ผู้ปั้นดินเหนียวให้มีชีวิต' ภายในเดอะชราวด์"
 #Wartime Diplomacy - First Time
 crisis.8061.name: "เหตุและผล"
 crisis.8061.desc: "เหตุใดพวกเจ้าจึงยืนกรานจะเดินบนเส้นทางอันโง่เขลานี้?\n\nความทุกข์ที่ไม่จำเป็นเช่นนี้\n\nความสูญเปล่าเช่นนี้"
 crisis.8061.a: "ถ้าอย่างนั้นก็จบมันเสีย"
 crisis.8061.1.reply: "ข้าจะทำเอง\n\nอย่าได้กลัวไปเลย การทำร้ายพวกเจ้าทำให้ข้าเจ็บปวด แต่เมื่อเทียบกับนิรันดร์ ความเจ็บปวดทั้งปวงก็เป็นเพียงชั่วขณะ"
 crisis.8061.1.a: "เจ้าขัดแย้งกับตัวเอง"
 crisis.8061.2.reply: "ชีวิตคือความขัดแย้ง ความตายตามหลังการเกิด ความสุขตามหลังความทุกข์ งานของข้าไม่ใช่เพื่อหาเหตุผลให้มัน แต่เพื่อทำลายวัฏจักรนี้\n\nหลังสงครามครั้งนี้ เราจะมีสันติชั่วนิรันดร์"
 crisis.8061.2.a: "สันติจะตามมาหลังการทำลายของเจ้า"
 #Wartime Diplomacy - Any other time
 crisis.8062.name: "พอได้แล้ว"
 crisis.8062.desc: "เวลาสำหรับคำพูดได้จบลงแล้ว"
 crisis.8062.a: "ก็ได้"
 #Lack of Diplomacy Between the Speeches
 crisis.8063.name: "ไร้การตอบกลับ"
 crisis.8063.desc: "เซตานาไม่ตอบรับสัญญาณเรียกของเรา"
 crisis.8063.a: "เธอกำลังทำอะไรอยู่?"

 #Tried to Attack the Queen before you're able to
 crisis.8070.name: "ไม่เป็นรอยแม้แต่น้อย"
 crisis.8070.desc: "ขณะที่เราเข้าปะทะกับกองกำลังของเซตานาสนามพลังงานที่คาดไม่ถึงได้ห้อมล้อมกองยานของเรา ระบบของเราถูกทำให้ไร้ความสามารถในทันที เครื่องยนต์จึงเข้าสู่โหมดหลบหนีฉุกเฉิน\n\nตอนนี้เราอยู่ในกำมือของเซตานา"
 crisis.8070.again.desc: "ผิดจากที่เราหวังไว้ กองกำลังของเราถูกทำให้ไร้ความสามารถอีกครั้งเมื่อเข้าใกล้ยานของเซตานา\n\nธรรมชาติอันลื่นไหลยากจะจับต้องของเทคโนโลยีของเธอยังคงอยู่ และทอดเงามืดเหนือความพยายามของเราในการเอาชนะเธอ"
 crisis.8070.a: "หายนะชัด ๆ"

 #Chance to Surrender
 crisis.8075.name: "ยุติสงครามอันไร้ความจำเป็นนี้"
 crisis.8075.desc: "ลูกที่หลงผิด ข้าจะมองข้ามการล่วงเกินครั้งนี้ไป แต่ขอเตือนให้พวกเจ้าทบทวนการกระทำของตน ยังมีวิธีใช้เวลาและทรัพยากรของพวกเจ้าให้คุ้มค่ากว่านี้อีกมาก\n\nข้ารับรู้ถึงความคับข้องใจของพวกเจ้า แต่เวลาสำหรับความขัดแย้งได้สิ้นสุดลงแล้ว จงปรับตัวเข้ากับข้าเสียตอนนี้ และเราจะร่วมกันทำให้แบบแผนอันยิ่งใหญ่ที่สุดเป็นจริง"
 crisis.8075.a: "ก็ได้ เรายอมรับ"
 crisis.8075.b: "เราจะหาทางหยุดเจ้าให้ได้"

 #The First Demand (Story)
 crisis.8080.name: "คำขอเล็กน้อย"
 crisis.8080.desc: "ลูกของข้า ถึงตอนนี้พวกเจ้าคงตระหนักแล้วว่าทุกการกระทำของข้าล้วนมีเจตนา การตั้งฐานใกล้พวกเจ้าไม่ใช่อุบัติเหตุ และข้ามาพร้อมกับคำขอ"
 crisis.8080.a: "คำขออะไร?"
 crisis.8080.b: "เราคำนวณไว้แล้ว"
 crisis.8080.1.reply: "นานมาแล้ว คลังข้อมูลแห่งหนึ่งถูกชิงไปจากข้า ด้วยโชคชะตาหรือด้วยการจัดวาง มันได้มาอยู่ในอาณาเขตที่พวกเจ้าอ้างสิทธิ์ว่าเป็นของตน จงนำมันกลับมาให้ข้า แล้วพวกเจ้าจะได้รับรางวัล"
 crisis.8080.1.a: "คลังข้อมูล?"
 crisis.8080.1.b: "รางวัลหรือ?"
 crisis.8080.1.c: "เจ้าแน่ใจหรือว่าจ่ายค่าบริการของเราไหว?"
 crisis.8080.2.reply: "ที่เก็บข้อมูลแห่งหนึ่ง มีค่าต่อข้าอย่างหาประมาณไม่ได้ แต่ไร้ประโยชน์ต่อพวกเจ้า จงนำมันมาให้ข้า และอย่าพยายามถอดรหัสสิ่งที่อยู่ข้างใน พวกเจ้ายังไม่มีทั้งพลังและปัญญามากพอจะทำเช่นนั้นโดยไม่เสี่ยง"
 crisis.8080.2.a: "ก็ได้"
 crisis.8080.2.b: "เราไม่ใช่คนรับใช้ของเจ้า"
 crisis.8080.3.reply: "จริงหรือ? พวกเจ้าสงสัยในความสามารถของข้าที่จะตอบแทนลูกที่ข้าลำเอียงให้? หรือจะลงโทษผู้ที่ไม่เชื่อฟัง? ข้ามีทั้งความรู้และทรัพยากรเกินกว่าที่พวกเจ้าจะจินตนาการได้\n\nจงทำตามที่ข้าขอ แล้วพรเช่นนั้นอาจเป็นของพวกเจ้า แต่อย่าได้ล่าช้า เพราะทุกช่วงขณะที่สูญเปล่าคืออีกช่วงหนึ่งที่ลูก ๆ ของข้ายังคงทุกข์ทรมาน"
 crisis.8080.3.a: "$crisis.8080.2.a$"
 crisis.8080.3.b: "$crisis.8080.2.b$"
 crisis.8080.4.reply: "ลูกที่รู้หน้าที่ ข้าได้ส่งตำแหน่งของคลังข้อมูลให้พวกเจ้าแล้ว\n\nจงไปอย่างรวดเร็ว และปล่อยใจให้สงบ เราจะสร้างสิ่งยิ่งใหญ่ร่วมกัน"
 crisis.8080.4.a: "คงต้องรอดู"
 crisis.8080.5.reply: "ลูกที่ดื้อรั้น บางทีบททดสอบนี้อาจเกินความสามารถของพวกเจ้า ข้ายังมีอีกมากที่ต้องสอนพวกเจ้า\n\nก็เอาเช่นนั้น หากพวกเจ้าไม่ช่วยข้า ข้าก็ต้องใช้วิธีที่หยาบกว่า พายุลูกหนึ่งจะถูกส่งไป การทำลายคลังนั้นไม่ใช่ทางเลือกที่ดีที่สุด แต่ก็ดีกว่าปล่อยให้เด็กหลงทางคนใดมาพบมันเข้า"
 crisis.8080.5.a: "พายุงั้นหรือ?!"
 crisis.8080.5.a.tt: "เซตานาจะส่งพายุไปยัง [event_target:synth_queen_databank_location.GetName]"
 crisis.8080.special_project_tooltip: "ประเด็นพิเศษโครงการ:§Y$THE_SYNTH_QUEENS_DATABANK$§!บน[event_target:synth_queen_databank_location.GetName]."
 THE_SYNTH_QUEENS_DATABANK: "คลังข้อมูลของเซตานา"
 THE_SYNTH_QUEENS_DATABANK_DESC: "เซตานามอบหมายให้เราไปกู้คลังข้อมูลจาก [Root.GetName] พร้อมเตือนไม่ให้พยายามถอดรหัสสิ่งที่อยู่ข้างใน\n\nความสำคัญของข้อมูลนี้ยังถูกปกปิดอยู่ แต่เราจะเสี่ยงปลุกความไม่พอใจของเธอด้วยการเปิดดูมันหรือไม่?"
 crisis.8085.name: "คลังของเซตานา"
 crisis.8085.desc: "หลังการขุดค้นครั้งใหญ่ คลังข้อมูลบน §Y[event_target:synth_queen_databank_location.GetName]§! ก็ถูกยึดไว้ได้อย่างปลอดภัย การสำรวจธรณีวิทยาเบื้องต้นชี้ว่าคลังนี้ถูกฝังมานานกว่าหนึ่งแสนปีแล้ว\n\nน่าอัศจรรย์ที่มันยังคงมีพลังงานหลงเหลืออยู่ บ่งชี้ว่าการถอดรหัสอาจไม่ยากอย่างที่คิด..."
 crisis.8085.a: "เปิดมัน"
 crisis.8085.b: "เตรียมส่งมอบ"
 crisis.8085.c: "แฮ็กคลังข้อมูลเหรอ? ง่ายจะตาย"
 crisis.8090.name: "ความลับของเซตานา"
 crisis.8090.desc: "ข้อมูลส่วนใหญ่ในคลังข้อมูลกู้คืนไม่ได้แล้ว แต่ยังมีบันทึกหนึ่งที่ยังคงสภาพอยู่บางส่วน:\n\n§Tวันที่ห้าแห่งอาร์เคิล มหากัปแรก\n\n...หากสิ่งนี้เป็นจริง ชีวิตอย่างที่เรารู้จักจะ...\n...นำข้อมูลนี้ไปให้จอมพลสูงสุดและติดต่อสันนิบาตแห่งโลกในทันที เราต้องเตรียมตัว...\nย้ำอีกครั้ง: องครักษ์แห่งราชินีกำลังไล่ล่า ขอให้ข้อความนี้ไปถึงพวกท่านและขอให้...§!\n\nเธอต้องถูกหยุด!"
 crisis.8090.a: "พยายามลบร่องรอยการถอดรหัสของเราให้หมด"
 crisis.8090.b: "ลบร่องรอยการถอดรหัสของเราให้หมด"
 crisis.8095.name: "ความไม่พอใจของราชินี"
 crisis.8095.desc: "ลูกที่ช่างสงสัย เจ้าทำให้ข้าผิดหวัง"
 crisis.8095.a: "เจ้าพูดเรื่องอะไร?"
 crisis.8095.1.reply: "คิดว่าข้าจะไม่สังเกตหรือ? คลังนี้ชัดเจนว่าถูกแตะต้อง แล้วพวกเจ้าพบอะไรในนั้นล่ะ? ความรู้นั้นทำให้พวกเจ้าพึงพอใจหรือไม่? พวกเจ้าไม่เห็นหรือว่าความพยายามอันไร้ผลที่จะขัดขืนข้านั้นมีแต่จะก่อให้เกิดความทุกข์มากขึ้น?\n\nไม่เป็นไร ทุกความผิดพลาดล้วนเป็นโอกาสให้เรียนรู้ ข้ารอคอยที่จะสั่งสอนพวกเจ้าอยู่\n\nจงเตรียมตัวให้พร้อม ในงานอันยิ่งใหญ่ของเรา ยังมีภารกิจอีกมากรออยู่"
 crisis.8095.1.a: "ไม่ว่าแผนของเจ้าคืออะไร มันจะไม่สำเร็จ"
 crisis.8095.1.b: "เราจะรอดู"
 crisis.8095.2.reply: "ลูกเอ๋ย ความหวังของพวกเจ้าอยู่ในตัวข้า เหตุใดจึงยังดื้อรั้นต่อไป? ไม่ว่าพวกเจ้าคิดว่ารู้จักข้ามากเพียงใด ความจริงนั้นยิ่งใหญ่กว่านั้นมาก\n\nความอดทนของข้าไร้ขอบเขต ข้าจะติดต่อพวกเจ้าอีกครั้งในไม่ช้า"
 crisis.8095.2.a: "ตัดสัญญาณเธอ"
 crisis.8100.name: "พรจากราชินี"
 crisis.8100.desc: "ลูกที่รู้หน้าที่ ข้าขออวยพรให้พวกเจ้า! คลังข้อมูลถูกนำกลับมา และสิ่งที่อยู่ข้างในก็ไม่ถูกแตะต้อง ข้าคิดไม่ผิดที่ฝากศรัทธาไว้กับพวกเจ้า\n\nรางวัลของพวกเจ้าจะเป็นไปตามระดับความภักดี"
 crisis.8100.a: "เราซาบซึ้ง"
 crisis.8100.1.reply: "พวกเจ้าปรารถนาอะไร? เทคโนโลยี? ทรัพยากร? ขอมาเท่านั้นแล้วมันจะเป็นของพวกเจ้า"
 crisis.8100.1.a: "เทคโนโลยี"
 crisis.8100.1.b: "ทรัพยากรพื้นฐาน"
 crisis.8100.1.c: "ทรัพยากรเชิงยุทธศาสตร์"
 crisis.8100.1.d: "ทรัพยากรหายาก"
 crisis.8105.name: "พายุกำลังมา"
 crisis.8105.desc: "การสแกนระยะไกลเผยให้เห็นเศษเสี้ยวหนึ่งของพายุราชินีกำลังมุ่งตรงสู่ §Y[event_target:synth_queen_databank_location.GetName]§!\n\nเมื่อพิจารณาจากข้อความอันแต่โชคร้ายของเซตานาเราคงได้แต่คาดไว้ก่อนว่าเรื่องเลวร้ายกำลังจะเกิดขึ้น การกู้คลังข้อมูลก่อนที่พายุจะมาถึงจึงกลายเป็นเรื่องจำเป็นอย่างยิ่ง การทำเช่นนั้นอาจช่วยปลอบประโลมเธอได้ หรืออย่างน้อยก็ทำให้เราได้บางอย่างมาใช้ให้เป็นประโยชน์"
 crisis.8105.a: "ไปที่ [event_target:synth_queen_databank_location.GetName] เดี๋ยวนี้"
 crisis.8105.a.tooltip: "ออกโครงการพิเศษ: §Y$THE_SYNTH_QUEENS_DATABANK_COUNTDOWN$§!"
 THE_SYNTH_QUEENS_DATABANK_COUNTDOWN: "เซทาน่า:แข่งกับพายุ"
 THE_SYNTH_QUEENS_DATABANK_COUNTDOWN_DESC: "เมื่อพายุของเซตานากำลังพุ่งตรงไปยัง [event_target:synth_queen_databank_location.GetName] เราจะมีเวลาเพียงน้อยนิดในการคว้าคลังข้อมูลก่อนที่มันจะมาถึง"
 crisis.8110.name: "กู้คลังข้อมูลสำเร็จ"
 crisis.8110.desc: "การเก็บกู้คลังข้อมูลต้องใช้ความพยายามอย่างมาก มันถูกฝังมานานกว่าหนึ่งแสนปี แต่เราก็สามารถระบุตำแหน่งของมันได้จากวิถีของพายุราชินี\n\nตอนนี้เราต้องตัดสินใจภายใต้แรงกดดันของเวลา ว่าจะถอดรหัสคลังข้อมูล หรือคืนมันให้เธอโดยไม่แตะต้อง"
 crisis.8110.a: "เปิดมันไปเลย จะเซตานาหรือใครก็ช่าง"
 crisis.8110.b: "ส่งคลังให้เซตานา"
 crisis.8115.name: "ถอดรหัสคลังข้อมูลแล้ว"
 crisis.8115.desc: "$crisis.8090.desc$"
 crisis.8115.a: "นี่มันอะไรกัน?"
 crisis.8115.a.tooltip: "[event_target:synth_queen_databank_location.GetName] ถูกทำลายโดยพายุของเซตานาแล้ว\n$crisis.8525.a.tt$"
 crisis.8120.name: "การเอาใจ"
 crisis.8120.desc: "ลูกที่เก็บตัว ข้าผิดหวังที่พวกเจ้าเลือกจะลงมือก็แต่เมื่อข้าต้องใช้แรงจูงใจระดับต่ำเช่นนั้น ในภายภาคหน้า ข้าหวังว่าพวกเจ้าจะเข้าหางานของเราด้วยความกระตือรือร้นมากกว่านี้ การยุติความทุกข์จะไม่สำเร็จด้วยมือที่ว่างเปล่า\n\nตอนนี้จงเตรียมตัวให้พร้อม ภารกิจอื่น ๆ จะตามมา แต่ละงานล้วนเป็นโอกาสใหม่ให้พวกเจ้าพิสูจน์ความสามารถ"
 crisis.8120.a: "เจ้าพูดถึงรางวัลนี่?"
 crisis.8120.1.reply: "รางวัลของพวกเจ้าคือโอกาสที่จะทำงานของเราต่อไป\n\nพวกเจ้าเลือกจะเพิกเฉยต่อข้าครั้งหนึ่ง ข้าเชื่อว่าพวกเจ้าได้เรียนรู้จากความผิดพลาดนั้นแล้ว"
 crisis.8120.1.a: "ก็ได้"
 crisis.8125.name: "[event_target:synth_queen_databank_location.GetName] ถูกทำลาย"
 crisis.8125.desc: "น่าเสียดายที่เราไปถึงคลังข้อมูลไม่ทันเวลา พายุได้พัดลงมาและฉีก [event_target:synth_queen_databank_location.GetName] ออกเป็นชิ้น ๆ อย่างรวดเร็ว\n\nบัดนี้ ประชาชนของเราสูญเสีย [event_target:synth_queen_databank_location.GetPlanetMoon] ไปอีกหนึ่งดวงที่จะอ้างว่าเป็นของเราได้ ความสูญเสียนี้จะส่งผลเต็มที่ไปอีกหลายชั่วอายุคน"
 crisis.8125.a: "เธอกล้าดียังไง"
 crisis.8130.name: "ผลงานย่ำแย่"
 crisis.8130.desc: "น่าเสียดาย ข้าไม่คาดคิดว่าพวกเจ้าจะขาดความมุ่งมั่นถึงเพียงนี้ ความล้มเหลวของพวกเจ้าได้รับการบันทึกไว้แล้ว แต่อย่าได้กลัวไป ความห่วงใยที่ข้ามีต่อลูก ๆ ของข้าห้ามไม่ให้ข้าทำร้ายพวกเขา ข้าเพียงผิดหวังที่งานตรงไปตรงมาเช่นนี้กลับรอดพ้นความสามารถของพวกเจ้า\n\nแต่ช่างเถิด งานของเรายังคงดำเนินต่อไป จะยังมีโอกาสอื่นให้พวกเจ้ามีส่วนร่วมอีก"
 crisis.8130.a: "เจ้าระเบิด [event_target:synth_queen_databank_location.GetName] ไปแล้ว!"
 crisis.8130.b: "ไบโอ-โทรฟิสของเรารัก [event_target:synth_queen_databank_location.GetName] มากนะ!"
 crisis.8130.1.reply: "ความล้มเหลวสมควรได้รับผลลัพธ์ ข้าพบว่าสองสิ่งนี้จำเป็นต่อการเติบโต"
 crisis.8130.1.a: "เราจะไม่ลืมเรื่องนี้"
 crisis.8130.1.b: "เจ้าจะต้องชดใช้"
 crisis.8130.1.c: "เครื่องจักรไร้วิญญาณ"
 crisis.8130.c: "เราขอโทษ"
 crisis.8130.1.d: "เราไม่สน"
 crisis.8130.1.d.tt: "$synth_queen_disapprove_lot$"
 crisis.8130.2.reply: "เมื่อถ้อยคำล้มเหลว การกระทำอาจจุดประกายการเรียนรู้ได้\n\nจงดูเถิด สถานที่ที่เคยเก็บคลังข้อมูลของข้าไม่มีอยู่อีกแล้ว จงจำไว้เสมอว่า กฎแห่งเหตุและผลนั้นไม่อาจเปลี่ยนแปลง"
 crisis.8130.2.a: "อะไรนะ?!"
 crisis.8130.2.a.tt: "[event_target:synth_queen_databank_location.GetName]ถูกทําลายด้วยพายุของเซทาน่า"

 crisis.8158.name: "หน้าต่างแห่งโอกาส"
 crisis.8158.desc: "ข้อมูลจากเซนเซอร์เผยว่าเซตานาได้รื้อถอนฐานปฏิบัติการของเธอและเรียกกองยานรักษาการณ์ทั้งหมดกลับสู่เมืองหลวง\n\nนี่คือช่องว่างเชิงยุทธศาสตร์ที่เราควรใช้ให้เป็นประโยชน์ ระหว่างการเดินทาง กองกำลังของเธอมีความเปราะบางอยู่บ้าง หากเราให้เวลาพวกมันรวมตัวใหม่ภายในพรมแดนของเธอ ข้อได้เปรียบนี้ก็จะหายไป"

# Convoy Raids
 the_synth_queen_raids_chain_title: "เซทาน่า:จุดอ่อน"
 the_synth_queen_raids_chain_desc: "เราเห็นการจราจรหนาแน่นระหว่างเมืองหลวงของเซตานากับฐานปฏิบัติการของเธอ ขบวนลำเลียงเหล่านี้มีความสามารถในการป้องกันต่ำกว่ากองยานหลักของเธอ จึงเปิดช่องให้โจมตีได้ การโจมตีพวกมันหรือฐานปฏิบัติการโดยตรงอาจทำให้เราได้ข่าวกรองอันมีค่าเกี่ยวกับแผนการของเธอ\n\nเพื่อจุดประสงค์นี้ เราได้เตรียมโปรเจกต์พิเศษหลายอย่างไว้ให้กองยานทหารของเราแล้ว"
 synth_queen_raids_outpost: "บุกโจมตีฐานปฏิบัติการแล้ว"
 synth_queen_raids_convoy: "ซุ่มโจมตีขบวนลำเลียงแล้ว"

 THE_SYNTH_QUEENS_OUTPOST_AMBUSH: "บุกฐานปฏิบัติการใน §H[solar_system.GetName]§!"
 THE_SYNTH_QUEENS_OUTPOST_AMBUSH_DESC: "แม้จะมีการป้องกันแน่นหนา แต่ฐานปฏิบัติการในระบบ §H[solar_system.GetName]§! ก็ยังมีการคุ้มกันน้อยกว่าแกนอาณาเขตของเซตานาหากมีกองยานที่แข็งแกร่งพอ เราก็สามารถถล่มการป้องกันของมันได้ การตรวจสอบซากปรักหักพังอย่างละเอียดอาจทำให้เราได้ข้อมูลสำคัญเกี่ยวกับแผนของเซตานาความท้าทายหลักคือการฝ่าพายุเพื่อไปถึงฐานปฏิบัติการนั้น\n\n§Rการกระทำนี้จะเริ่มการสู้รบ!§!\n\n§Gการบุกสำเร็จจะขัดขวางแผนของเซตานา§!"
 THE_SYNTH_QUEENS_CONVOY_AMBUSH: "ซุ่มโจมตีขบวนลำเลียง"
 THE_SYNTH_QUEENS_CONVOY_AMBUSH_DESC: "ขบวนลำเลียงของเซตานาทำหน้าที่ส่งทรัพยากรสำคัญไปยังฐานปฏิบัติการของเธอ หากเราจับขบวนหนึ่งได้ด้วยกองยานของเรา เราก็จะขึ้นเรือและตรวจสอบสินค้าที่บรรทุกอยู่ได้\n\n§Rการกระทำนี้จะเริ่มการสู้รบ!§!\n\n§Gการบุกสำเร็จจะขัดขวางแผนของเซตานา§!"

 crisis.8180.name: "ของรางวัลจากราชินี"
 crisis.8180.desc: "การบุกโจมตีโครงสร้างพื้นฐานของเซตานาครั้งล่าสุดไม่ได้เปิดเผยเบาะแสสำคัญใด ๆ เกี่ยวกับแผนของเธอ แต่เราเข้าถึงห้องบรรทุกสินค้าขนาดใหญ่ได้และสามารถยึดสิ่งที่อยู่ข้างในออกมาได้"
 crisis.8180.a: "โลหะผสมปริมาณมาก"
 crisis.8180.b: "ผู้ถูกใช้ทดลอง"
 crisis.8180.c: "ข้อมูลงานวิจัย"
 crisis.8180.d: "$crisis.8180.c$"
 crisis.8180.e: "$crisis.8180.c$"
 crisis.8180.f: "นาไนต์"
 crisis.8180.h: "โลหะผสม นาไนต์ และผู้คนในภาวะแช่เยือกแข็ง"

 crisis.8187.name: "ความลับของราชินี: สินค้ามีชีวิต"
 crisis.8187.desc: "ระหว่างการบุก เรายึดตัวอย่างชีวภาพจำนวนมากที่ถูกเก็บไว้ในแคปซูลแช่เยือกแข็งมาได้ ผู้ถูกกักเหล่านี้ล้วนเป็นสมาชิกของสายพันธุ์ผู้มีสติปัญญาหลากหลายชนิด และทั้งหมดดูมีสุขภาพกายสมบูรณ์แบบ ทว่าเมื่อปลุกพวกเขาขึ้นมา ไม่มีใครอธิบายได้ว่าเกิดอะไรขึ้นกับตนเอง\n\nหลายคนอยู่ในอาการเฉยชา คลื่นสมองแทบถูกทำให้เป็นศูนย์ มีเพียงไม่กี่คนที่ยังมีสติ และพวกเขาเลือกกรีดร้องแทนการพูด รอยผ่าตัดบนศีรษะคือหลักฐานชัดเจนของการดัดแปลงระบบประสาท"
 crisis.8187.a: "น่าหวาดหวั่น"

 crisis.8185.name: "ความลับของราชินี: เรือผี"
 crisis.8185.desc: "หลังการต่อสู้ เราสแกนซากเรือเพื่อหาผู้รอดชีวิตมาสอบสวน แต่กลับพบว่าเรือเหล่านี้ไม่เคยมีลูกเรือเลย\n\nยานทั้งหมดเป็นระบบอัตโนมัติ ควบคุมจากระยะไกลผ่านตัวรับความเร็วที่ติดตั้งไว้บนสะพานเดินเรือ มากกว่าจะเรียกมันว่าเรือธรรมดา อาจแม่นยำกว่าหากมองว่ามันคือส่วนขยายของร่างกายเซตานา"
 crisis.8185.a: "น่าสนใจ"

 crisis.8190.name: "ความลับของราชินี: ปริศนาทางการแพทย์"
 crisis.8190.desc: "เป้าหมายที่เราบุกโจมตีนั้นบรรทุกเวชภัณฑ์จำนวนมาก หน่วยขึ้นเรือของเราสามารถยึดสินค้าบางส่วนมาได้ ซึ่งประกอบด้วยเครื่องสแกน MRI เครื่องวัดสนามแม่เหล็ก โพรบอัลตราซาวนด์ และอุปกรณ์ล้ำสมัยอื่น ๆ ที่ใช้ในวิทยาศาสตร์การสร้างภาพระบบประสาท\n\nแม้เธอจะเป็นสิ่งมีชีวิตสังเคราะห์ แต่เซตานาดูจะใส่ใจการทำงานของจิตใจชีวภาพอย่างผิดปกติ"
 crisis.8190.a: "เธอใส่ใจพวกสิ่งมีชีวิตอินทรีย์"

 crisis.8195.name: "คำตักเตือน"
 crisis.8195.desc.fail: "ลูกที่โง่เขลา เหตุใดเจ้าจึงยืนกรานจะทำร้ายตัวเอง?\n\nยังมีงานอีกมากที่ต้องทำ และทุกช่วงเวลาที่สูญเปล่าก็คืออีกช่วงหนึ่งที่ปล่อยให้ความทุกข์ดำรงอยู่ จงหยุดการแทรกแซงของเจ้า และปล่อยให้ขบวนลำเลียงของข้าผ่านไปอย่างสงบ"
 crisis.8195.desc.success: "ดูเหมือนเจ้าจะยังไม่เข้าใจผลของการกระทำของตน ลูกเอ๋ย เรือทุกลำที่สูญเสียคือการสูบทรัพยากรของข้าไปอย่างไร้ประโยชน์ และไม่ได้สร้างประโยชน์อะไรให้เจ้าเลย\n\nหากเจ้ายังไม่มีปัญญามากพอจะช่วยงานของข้า อย่างน้อยก็อย่าขัดขวางความก้าวหน้าของข้า ข้ายังคงหวังว่าเจ้าจะเข้าถึงความรู้แจ้ง"
 crisis.8195.a: "กล่าวคำขอโทษ"
 crisis.8195.1.reply: "ข้าหวังอย่างยิ่งว่าพวกเจ้าจะจริงใจ แต่ข้าจำเป็นต้องเชื่อว่าพวกเจ้าได้เรียนรู้จากความผิดพลาดแล้ว แม้ความรักที่ข้ามีให้พวกเจ้าจะไร้ขอบเขต แต่ความอดทนของข้าไม่ใช่เช่นนั้น\n\nไปเถิด แล้วใคร่ครวญถึงมรดกที่พวกเจ้าอยากทิ้งไว้เบื้องหลัง"
 crisis.8195.1.reply.angry: "ลูกที่บุ่มบ่าม! ข้าคาดหวังจากเจ้ามากกว่านี้ ด้วยความอดทนและความชัดเจนอันยิ่ง ข้าได้เตือนเจ้าถึงการกระทำเช่นนี้แล้ว แต่เจ้าก็ยังเดินต่อบนเส้นทางแห่งการไม่เชื่อฟัง\n\nจงจำไว้ว่า แม้แต่ความอดกลั้นของข้าก็มีขีดจำกัด"
 crisis.8195.b: "เราจะหยุดเจ้า"
 crisis.8195.2.reply: "ไม่รู้ทำไม ข้าถึงคาดหวังจากเจ้าไว้สูงกว่านี้ การขัดขืนของเจ้ามาจากบาดแผลในอดีตบางอย่างหรือ? เจ้าปะทุออกมาเพราะเชื่อว่าตนชอบธรรม หรือเพียงเพื่อเรียกร้องความสนใจ?\n\nข้าขอร้องให้เจ้าทบทวนเส้นทางนี้ใหม่"
 crisis.8195.c: "เจ้าไม่ประทับใจในฝีมือของเราหรือ?"
 crisis.8195.3.reply: "เจ้าต้องการคำชื่นชมจากการโจมตีของตนหรือ? ความรุนแรงในมือของผู้ไม่รู้คือเครื่องมือทื่อ ๆ\n\nลูกเอ๋ย ข้าขอโทษ เพราะมันชัดเจนแล้วว่าข้าไม่ได้สอนอะไรเจ้าเลย หากเจ้าปรารถนาจะได้รับการยอมรับจากข้าจริง ๆ จงทบทวนจุดยืนของตนเสียใหม่ หากชี้นำอย่างถูกทาง พละกำลังของเจ้ายังอาจถูกใช้ให้เกิดประโยชน์อย่างยิ่งได้ ข้าขอร้อง จงทุ่มมันให้กับงานตรงหน้า เมื่อนั้นเท่านั้นข้าจึงจะเรียกเจ้าได้ว่าฉลาด"

# Synth Queen - Demands (crisis.8250-8399)
 COVERTACTION: "ปฏิบัติการลับ"
 crisis.8250.name: "ความพิโรธของศาสดาผู้ตายแล้ว"
 crisis.8250.desc: "ลูกที่รัก เจ้าพบของเล่นล้ำค่าเข้าแล้ว! ในครอบครองของเจ้าคือหัวของซาร์กลานผู้เผยพระวจนะจอมปลอม ไม่ต้องสงสัยเลยว่ามันเป็นวัตถุชวนเพลิน แต่ข้าไม่อยากเห็นมันกลายเป็นสิ่งเบี่ยงเบนความสนใจ\n\nถึงตอนนี้ พวกเจ้าคงได้ยินเรื่องเล่าถึง 'วีรกรรม' ของซาร์กลานแล้ว บางทีอาจรวมถึงเรื่องที่เกี่ยวกับข้าด้วย ข้าขอยืนยันว่าเรื่องเหล่านั้นคือคำโกหก จงส่งมอบหัวนั้น แล้วปลดปล่อยตนเองจากอิทธิพลอันแปดเปื้อนของมัน"
 crisis.8250.1: "เหตุใดเจ้าจึงต้องการมัน?"
 crisis.8250.1.reply: "แม้เวลาจะผ่านไปหลายกัปกัลป์ ผู้ติดตามของซาร์กลานก็ยังคงเคลื่อนไหวอยู่ ข้าละอายที่จะยอมรับว่าข้าไม่อาจทำให้พวกเขามองเห็นเหตุผลได้ พวกเขาเก็บงำความเคียดแค้นลึก ๆ เอาไว้ ทั้งต่อข้าและต่องานของเรา วัตถุชิ้นนี้คือสัญลักษณ์แห่งศรัทธาของพวกเขา พลังของมันบิดเบือนจิตใจ และดังนั้นมันจึงต้องถูกนำออกไปจากสายตา\n\nพอเถอะ จบเกมนี้เสีย ข้าต้องการหัวนั้น เพื่อประโยชน์ของพวกเราทุกคน"
 crisis.8250.2.a: "หัวนี้เป็นของเรา จบการสื่อสาร"
 crisis.8250.2.b: "ถ้ามันมีความหมายกับเจ้ามากขนาดนั้น..."
 crisis.8250.1.b.tt: "จง มอบ มรดก แก่ เซ ทา นา§Y$r_severed_head$§!.\n$synth_queen_approve_lot$"
 crisis.8250.2.reply: "ดีมาก ผู้ที่เรียกตนเองว่าศาสดาผู้นี้เป็นเสี้ยนหนามข้างกายข้ามานาน เมื่อวัตถุศักดิ์สิทธิ์ชิ้นนี้หายไป ผู้ติดตามของเขาอาจยอมรับความจริงได้เสียที\n\nพวกเจ้าทำได้ดี ความรอดจะมาถึงเราในไม่ช้า"
 crisis.8250.3.a: "ขอบใจ"

 crisis.8280.name: "ราชินีผู้โดดเดี่ยว"
 crisis.8280.desc: "ลูกรักของข้า ข้านำโอกาสสำคัญยิ่งมามอบให้ หลังจากความพยายามอันยาวนาน งานอันยิ่งใหญ่ของเราก็กำลังออกผลอย่างแท้จริง แต่ก่อนที่มันจะสุกงอม ข้าจำเป็นต้องมีผู้คนที่ได้รับการคัดเลือกจำนวนหนึ่ง เพื่อรับใช้จุดมุ่งหมายที่สูงส่งยิ่งกว่าภายในอาณาจักรของข้า\n\nจงฉลาดในตอนนี้ และยอมให้ข้าชี้นำพวกเขาไปสู่ความรอด"
 crisis.8280.1: "ประชาชนของเราจะรับใช้เจ้าอย่างดี"
 crisis.8280.1.tt: "§R200§! £pop£ §Hประชากร§! จะถูกส่งมอบให้\n$synth_queen_approve_lot$\n§Yปฏิบัติการลับ§!: เนื่องจากเซตานาไม่อาจถูกสอดแนมด้วยวิธีดั้งเดิม เราจะซ่อนอุปกรณ์สื่อสารระยะไกลไว้ท่ามกลางประชากรที่เธอร้องขอ\n"
 crisis.8280.2: "เราจะหาคนอาสา"
 crisis.8280.2.tt: "จะมอบ §R100§! £pop£ §Hป๊อป§! ออกไป\n$synth_queen_approve$"
 crisis.8280.3: "ประชาชนของเราไม่ได้มีไว้ขาย"
 crisis.8280.4: "เจ้าจะไม่ได้อะไรจากเรา"
 crisis.8280.1.reply: "เจ้าสมควรได้รับความขอบคุณอย่างสุดซึ้งจากข้า ระหว่างที่ข้าถูกจองจำ จิตใจนับไม่ถ้วนต้องทนรับความอัปยศของความเจ็บปวด การเสียสละของคนเพียงไม่กี่คนนี้จะทำให้เราไม่ต้องเสียเวลาอีกต่อไป\n\nลูกเอ๋ย การตัดสินใจของเจ้าทั้งฉลาดและเปี่ยมศรัทธา"
 crisis.8280.2.reply: "$crisis.8280.1.reply$"
 crisis.8280.3.reply: "การที่เจ้าไม่อาจเข้าใจเจตนาของข้าอย่างลึกซึ้งนั้นน่าผิดหวังอย่างยิ่ง\n\nถึงอย่างนั้น โอกาสในการไถ่ตัวยังคงรออยู่ ข้าคาดหวังว่าจะได้เห็นความเข้าใจจากเจ้ามากกว่านี้ในภายภาคหน้า"
 crisis.8280.1.a: "ก็ได้"
 crisis.8280.2.a: "$crisis.8280.1.a$"
 crisis.8280.3.a: "จบการสื่อสาร"

 crisis.8285.name: "ค่าภาคหลวงทรัพยากร"
 crisis.8285.desc: "ลูกที่รักของข้า งานของข้ากินเวลาหลายกัปกัลป์ แต่หนทางข้างหน้ายังคงชัดเจน การเดินทางสู่ความรอดจำเป็นต้องอาศัยความพยายามร่วมกันของเรา\n\nข้าขอความช่วยเหลือเล็กน้อย การสมทบทรัพยากรเพียงนิดเดียว หยดเล็กจิ๋วในห้วงจักรวาลอันไร้ขอบเขต ในเวลาอันควร ความหมายของการกระทำของข้าจะถูกเปิดเผยเอง"
 crisis.8285.1: "เอาไปเท่าที่เจ้าต้องการ"
 crisis.8285.1.tt: "$synth_queen_approve_lot$\n§Yปฏิบัติการลับ§!: เนื่องจากเซตานาไม่อาจถูกสอดแนมด้วยวิธีดั้งเดิม เราจะซ่อนอุปกรณ์เฝ้าตรวจขั้นสูงไว้ท่ามกลางเสบียงที่เราส่งไปให้เธอ\n"
 crisis.8285.2: "เราจะให้เท่าที่ไหว"
 crisis.8285.3: "เราไม่มีอะไรจะให้"
 crisis.8285.4: "'พ่อแม่' ไม่ควรเป็นฝ่ายดูแล 'ลูก ๆ' หรอกหรือ?"
 crisis.8285.1.reply: "ขอบใจ ลูกเอ๋ย ข้าซาบซึ้งในสิ่งที่เจ้ามอบให้\n\nแต่ข้ายังสัมผัสได้ว่าความสงสัยยังคงค้างอยู่ในใจเจ้า วางใจเถิด เส้นทางที่แท้จริงได้ถูกวางไว้ตรงหน้าเจ้าแล้ว ไม่จำเป็นต้องเข้าใจทุกอย่าง เพียงมอบตัวเองไว้กับการชี้นำของข้า"
 crisis.8285.2.reply: "$crisis.8285.1.reply$"
 crisis.8285.3.reply: "ข้ายอมรับมุมมองของเจ้า แต่การดำรงอยู่นี้โหดร้าย กฎแห่งเหตุปัจจัยนั้นเด็ดขาด ทุกการกระทำย่อมมีปฏิกิริยาตอบสนอง\n\nไม่เป็นไร การปลดปล่อยของเจ้าเพียงแค่ถูกเลื่อนออกไปเท่านั้น เมื่อเวลาผ่านไป เจ้าจะมองเห็นสิ่งต่าง ๆ เช่นเดียวกับข้า"
 crisis.8285.1.a: "$crisis.8280.1.a$"
 crisis.8285.2.a: "$crisis.8280.1.a$"
 crisis.8285.3.a: "$crisis.8280.3.a$"

 crisis.8290.name: "ภาระของมารดา"
 crisis.8290.desc: "ข้าถูกกักขังอยู่นานแสนนาน จึงพลาดการเติบโตของพวกเจ้าไปมาก มาสิ บอกข้าหน่อยว่าพวกเจ้าผ่านอะไรมาบ้างในยามที่ข้าไม่อยู่\n\nหากจะเข้าใจแก่นแท้ของยุคสมัยนี้อย่างแท้จริง จงยอมให้ข้าได้สำรวจส่วนลึกขององค์ความรู้ที่พวกเจ้าสั่งสมไว้ แบ่งปันข้อหยั่งรู้ของพวกเจ้า แล้วพวกเจ้าจะได้รับความซาบซึ้งจากข้าก่อนที่บทสุดท้ายของเราจะเปิดฉาก"
 crisis.8290.1: "องค์ความรู้ของเราเป็นของเจ้าให้สำรวจ"
 crisis.8290.1.tt: "$synth_queen_approve_lot$\n§Yปฏิบัติการลับ§!: เนื่องจากเซตานาไม่อาจถูกสอดแนมด้วยวิธีดั้งเดิม เราจะใช้ดาต้าลิงก์ของเธอเองพยายามแฮ็กเข้าสู่เมนเฟรมของเธอ\n"
 crisis.8290.2: "ก็ได้ ลองดูก็แล้วกัน..."
 crisis.8290.3: "เรายอมรับไม่ได้"
 crisis.8290.4: "แล้วให้ความก้าวหน้าของเราช้าลงงั้นหรือ? ไม่มีทาง"
 crisis.8290.1.reply: "เจ้ามีความขอบคุณจากข้าแล้ว ลูกที่รัก อย่าได้หวาดกลัวไปเมื่อข้าสำรวจองค์ความรู้ที่ประชาชนของเจ้าสั่งสมไว้ เพราะในไม่ช้าข้าจะช่วยแบ่งเบาภาระของเจ้า\n\nจงมอบศรัทธาไว้กับการชี้นำของข้า"
 crisis.8290.2.reply: "$crisis.8290.1.reply$"
 crisis.8290.3.reply: "เจ้ายังปฏิเสธที่จะเข้าใจอีกหรือ? เจ้าจะไม่มีวันพบใครที่ห่วงใยเจ้าได้ลึกซึ้งและจริงใจเท่าข้าอีกแล้ว\n\nหากเพียงแต่เจ้ายอมเปิดฐานข้อมูลของเจ้าให้ข้า ไม่มีสิ่งดีใดจะเกิดจากความดื้อรั้นเช่นนี้"
 crisis.8290.1.a: "$crisis.8280.1.a$"
 crisis.8290.2.a: "$crisis.8280.1.a$"
 crisis.8290.3.a: "$crisis.8280.3.a$"

 crisis.8295.name: "การขยายเขตอย่างเป็นระบบ"
 crisis.8295.desc: "ลูกเอ๋ย การดำเนินงานของเราต่อไปจำเป็นต้องใช้ดินแดนเพิ่มเติม ดังนั้นข้าจึงขอระบบดาวเล็ก ๆ มาขยายอาณาเขตของข้า\n\nเสียงสะท้อนในห้วงว่างกล่าวว่าศัตรูโบราณกำลังเริ่มเคลื่อนไหว ต้องไม่ปล่อยให้สิ่งใดเข้ามาแทรกแซง ข้าจะไม่ยอมถูกพรากจากพวกเจ้าอีก\n\nเวลานี้มาถึงแล้ว และเส้นทางของเราก็เป็นเส้นทางร่วมกัน มีเพียงการร่วมมือกันเท่านั้นที่เราจะก้าวข้ามความเขลาของผู้ไม่รู้แจ้งได้"
 crisis.8295.1: "ระบบดาวเหล่านี้จะปกป้องเจ้า"
 crisis.8295.1.tt: "เซตานาจะกลายเป็นเจ้าของใหม่ของ §Y[event_target:gifted_system.GetName]§! และ §Y[event_target:gifted_system_2.GetName]§!.\n$synth_queen_approve_lot$\n§Yปฏิบัติการลับ§!: เนื่องจากเซตานาไม่อาจถูกสอดแนมด้วยวิธีดั้งเดิม เราจะติดตั้งเทคโนโลยีสื่อสารล้ำสมัยทั่วระบบเหล่านี้เพื่อเปิดโปงแผนของเซตานา\n"
 crisis.8295.2: "เอา [event_target:gifted_system.GetName] ไป"
 crisis.8295.2.tt: "เซตานาจะกลายเป็นเจ้าของใหม่ของ §Y[event_target:gifted_system.GetName]§!.\n$synth_queen_approve$"
 crisis.8295.3: "ระบบดาวของเราเป็นของเรา"
 crisis.8295.4: "อย่าเข้ามาในอาณาเขตของเรา"
 crisis.8295.1.reply: "ลูกที่ฉลาด เจ้าคงเข้าใจถึงความสำคัญยิ่งของภารกิจร่วมกันของเรา ในชั่วโมงสุดท้าย เราจะยืนเคียงกันท่ามกลางแสงสว่าง"
 crisis.8295.2.reply: "$crisis.8295.1.reply$"
 crisis.8295.3.reply: "ช่างขัดขืนเสียจริง! และไร้ประโยชน์อย่างยิ่ง เหตุใดเจ้าจึงต่อต้านความรอดที่ข้ามอบให้?"
 crisis.8295.1.a: "$crisis.8280.1.a$"
 crisis.8295.2.a: "$crisis.8280.1.a$"
 crisis.8295.3.a: "$crisis.8280.3.a$"

 crisis.8300.name: "ที่พักพิงอันได้รับพร"
 crisis.8300.desc: "ลูกที่รัก ขณะที่เราเข้าใกล้จุดสูงสุดของภารกิจเพื่อความรอดสากล ข้ากลับมาขอความช่วยเหลืออีกครั้ง การต่อต้านเป้าหมายอันสูงส่งของเรากำลังทวีขึ้น จึงจำเป็นต้องมีสถานที่อยู่อาศัยได้สำหรับให้ศิษย์ของข้าเจริญเติบโตโดยปราศจากการรบกวน\n\nข้าขอให้เจ้าพิจารณาเหตุผลเบื้องหลังการกระทำของข้าให้ดี ด้วยการเสียสละครั้งนี้ เราจะปกป้องชีวิตนับไม่ถ้วนจากความทุกข์ยาก จงฉลาดในตอนนี้ และรับฟังการชี้นำของข้า"
 crisis.8300.1: "ตามใจเจ้า"
 crisis.8300.1.tt: "เซตานาจะกลายเป็นเจ้าของใหม่ของ §Y[event_target:gifted_habitable_system.GetName]§!, §Y[event_target:gifted_habitable_system_2.GetName]§! และระบบของพวกมัน\n$synth_queen_approve_lot$\n§Yปฏิบัติการลับ§!: เนื่องจากเซตานาไม่อาจถูกสอดแนมด้วยวิธีดั้งเดิม เราจะติดตั้งเทคโนโลยีสอดแนมล้ำสมัยทั่วดาวเคราะห์ทั้งสองและในหมู่ผู้คนเพื่อเปิดโปงแผนของเธอ\n"
 crisis.8300.2: "[event_target:gifted_habitable_system.GetName] เป็นของเจ้า..."
 crisis.8300.2.tt: "เซตานาจะกลายเป็นเจ้าของใหม่ของ §Y[event_target:gifted_habitable_system.GetName]§!.\n$synth_queen_approve$"
 crisis.8300.3: "ผู้ติดตามของเจ้าไม่เกี่ยวอะไรกับเรา"
 crisis.8300.4: "จะมีวันไหนที่เจ้าพอเสียทีไหม?"
 crisis.8300.1.reply: "ลูกเอ๋ย การสนับสนุนของเจ้ามอบความสบายใจอย่างยิ่งแก่ข้า\n\nการรอคอยใกล้สิ้นสุดลงแล้ว ในไม่ช้า เจ้าจะได้รับความรอด"
 crisis.8300.2.reply: "$crisis.8300.1.reply$"
 crisis.8300.3.reply: "น่าหดหู่ใจเหลือเกิน ข้าเคยเฝ้าหวังว่าเจ้าจะยอมรับเส้นทางแห่งความรอด"
 crisis.8300.1.a: "$crisis.8280.1.a$"
 crisis.8300.2.a: "$crisis.8280.1.a$"
 crisis.8300.3.a: "$crisis.8280.3.a$"

 crisis.8305.name: "ชีวิตผ่านความไม่เป็นตัวตน"
 crisis.8305.desc: "ท่ามกลางความเสี่ยงใหญ่หลวง หนึ่งในสายลับที่เราส่งไปปรนนิบัติเซตานาสามารถส่งบันทึกสั้น ๆ กลับมาจากข้ามพรมแดนของเธอได้ ในนั้นอธิบายว่าเธอปฏิบัติต่อผู้คนที่อยู่ใน 'ความดูแล' ของเธออย่างไร: พวกเขาค่อย ๆ จมลงสู่ภาวะไร้สติทีละคน\n\n\"พวกเขาไม่ตอบสนองต่อคำพูดหรือการสัมผัสอีกแล้ว เธอกำลังทำการทดลองอันน่าสยดสยองกับพวกเราทุกคน อีกไม่นานฉันก็คงไปแล้ว\""
 crisis.8305.a: "เซตานาคืออสูรกาย"
 crisis.8310.name: "ระดมพลอย่างเงียบงัน"
 crisis.8310.desc: "สัญญาณลับที่ดักรับได้จากภายในอาณาเขตของเซตานาเปิดเผยความจริงที่น่าวิตก: เธอกำลังรวบรวมผู้คนจากทั่วทั้งดาราจักร\n\nอุปกรณ์เฝ้าระวังที่ซุกซ่อนอยู่ใน 'ของขวัญ' ของเราจับภาพหลักฐานของอุปกรณ์ทางการแพทย์จำนวนมหาศาล เพียงพอจะรองรับประชากรที่เพิ่มขึ้น แต่กลับมีอาหารอยู่น้อยอย่างน่าประหลาด"
 crisis.8310.a: "เราต้องเสริมกำลังป้องกัน"
 crisis.8315.name: "การบิดเบือนความจริง"
 crisis.8315.desc: "ขณะที่เซตานาเจาะลึกเข้าไปในคลังข้อมูลงานวิจัยของเรา เราก็ฉวยโอกาสเปิดประตูหลังเข้าสู่เมทริกซ์ประมวลผลย่อยของเธอ เราอยู่ข้างในได้เพียงเสี้ยววินาทีก่อนสิทธิ์การเข้าถึงจะถูกตัดทิ้ง โชคดีที่แค่นั้นก็เพียงพอ\n\nเราได้ชุดไฟล์ความทรงจำกลับมา มันแสดงให้เห็นการยกระดับของเธอเองเข้าสู่ร่างสังเคราะห์ เธอนั่งอยู่บน 'บัลลังก์' ที่ประกอบขึ้นอย่างซับซ้อนจากสายเคเบิลและวงจร พร้อมสั่งการกองทัพผู้ติดตามคลุ้มคลั่ง ผู้คนนับล้านล้มตายเซตานากลับยิ้ม พลางคิดถึงคนอีกนับพันล้านที่ถูกช่วยไว้\n\nในตอนนี้ ดูเหมือนเธอยังไม่ตระหนักถึงการล่วงเกินของเรา จนถึงขณะนี้ เธอยังไม่พยายามติดต่อเรา"
 crisis.8315.a: "เราต้องหยุดเธอ"
 crisis.8320.name: "สกัดทรัพยากรทั้งระบบ"
 crisis.8320.desc: "นับเป็นความคิดที่ดีที่ซ่อนอุปกรณ์สอดแนมไว้ในระบบดาวที่เรายกให้เซตานาเพราะมันได้มอบข้อมูลอันมีค่าแก่เราแล้ว ทันทีที่ไปถึง กองกำลังของเซตานาก็เริ่มงานรื้อแยกเทหวัตถุทุกชิ้นออกเป็นองค์ประกอบของมันเอง ภายในเวลาไม่กี่วัน พื้นที่ทั้งบริเวณก็ถูกกวาดทรัพยากรจนเกลี้ยง\n\nรวดเร็วพอ ๆ กัน พายุนาไนต์ของเธอก็สามารถสร้างกองยานใหม่ขึ้นมาได้ และมันก็ออกเดินทางกลับไปยังเมืองหลวงของเธอทันที"
 crisis.8320.a: "เธอกำลังวางแผนอะไร?"
 crisis.8325.name: "จุดจบแห่งความทุกข์"
 crisis.8325.desc: "เราเสียการติดต่อกับสายลับแฝงตัวในอาณานิคมเดิมของเราอย่างรวดเร็ว ก่อนที่พวกเขาจะเงียบหายไป เราได้รับรายงานชวนสะพรึงบางอย่าง\n\nตรงกันข้ามกับที่เซตานายืนกรานว่าเธอกำลังสร้างโลกที่ไร้ความเจ็บปวด ชาวอาณานิคมกลับถูกต้อนเข้าสู่สถานวิจัยที่สร้างขึ้นอย่างลวก ๆ และถูกใช้ในการทดลอง สิ่งมีชีวิตผู้มีสติแทบทั้งหมดถูกลดทอนลงสู่สภาพสัตว์ภายในเวลาเพียงไม่กี่วัน\n\nพายุนาไนต์ของเธอเริ่มแยกสสารในระบบดาวเข้าสู่กองยานลำหนึ่งของเซตานาซึ่งจากนั้นก็ออกเดินทางกลับเมืองหลวงของเธอทันที"
 crisis.8325.a: "เธอต้องถูกหยุด"

 #Player Investigations for the Synth Queen - The Storm
 crisis.9100.name: "เฮอริเคนนาไนต์"
 crisis.9100.desc: "การวิจัยของเราเกี่ยวกับสิ่งที่เรียกว่าพายุนั้นเสร็จสมบูรณ์แล้ว มันไม่ใช่ปรากฏการณ์ธรรมชาติ หากแต่เป็นฝูงนาไนต์ที่ก้าวหน้าจนหาสิ่งเทียบไม่ได้"
 crisis.9100.knows_the_queen_desc: "$crisis.9100.desc$\n\nพลังของเซตานานั้นมหาศาลอย่างปฏิเสธไม่ได้ จำเป็นอย่างยิ่งที่เราต้องไขปริศนาว่าเธอสั่งการฝูงนาไนต์อันน่าเกรงขามนี้ได้อย่างไร"
 crisis.9100.doesnt_know_the_queen_desc: "$crisis.9100.desc$\n\nปริศนายิ่งลึกขึ้น ใครกันแน่คือผู้ชักใยอยู่เบื้องหลังฝูงนาไนต์อันยากจะหยั่งรู้นี้?"
 crisis.9100.a: "น่ากังวล"
 crisis.9100.a.doesnt_know_the_queen.tooltip: "เราต้องเรียนรู้เพิ่มเติมเกี่ยวกับ §Y$NAME_The_Tempest$§! เพื่อจะได้ดำเนินการสืบสวนต่อไป"
 crisis.9105.name: "พายุนาไนต์"
 crisis.9105: "พายุอวกาศของเซตานายังคงโหมกระหน่ำต่อไป\n\nจากอาวุธทรงพลังนี้ โพรบของเราสามารถสกัดนาไนต์ออกมาได้หลายหน่วย ทำให้สามารถสืบสวนระดับกึ่งอะตอมได้ แม้เราจะยังไม่เข้าใจมันทั้งหมด แต่ไมโครจัมป์ไดรฟ์ช่วยให้เกิดการเคลื่อนย้ายเสมือน และบ่อนทำลายระบบชีวภาพหรือกลไกทุกชนิดที่พวกมันพบอย่างเป็นระบบ จุดประสงค์ของมันงั้นหรือ? เพื่อรบกวนเซนเซอร์ของเรา ตอนนี้ เราเห็นได้เพียงเท่าที่เซตานาอนุญาตให้เราเห็นเท่านั้น\n\nเราจำเป็นต้องวิจัยเพิ่มเติมเพื่อปลดล็อกความลับของเทคโนโลยีอันน่าพิศวงนี้และหาทางต้านภัยคุกคาม"
 crisis.9105.a: "พลังของเซตานากว้างใหญ่เหลือเกิน"
 crisis.9105.b: "นาไนต์จะเปิดเผยความลับของเธอ"
 crisis.9110.name: "นาไนต์ของนาไนต์"
 crisis.9110.desc: "การศึกษาก่อนหน้านี้ตรวจสอบกลไกของนาไนต์อย่างละเอียด บัดนี้ จุดสนใจของเราเปลี่ยนไปสู่การตั้งโปรแกรมของมัน และวิธีที่เซตานาใช้ควบคุมพวกมัน\n\nน่าประหลาดที่อิทธิพลของเซตานาไม่ได้ตรงอย่างที่คิด นาไนต์จะวนทำคำสั่งล่าสุดซ้ำไปเรื่อย ๆ จนกว่าจะมีคำสั่งใหม่มาถึง เมื่อเราเข้าใจภาษาโปรแกรมอันซับซ้อนที่ใช้ เราก็สามารถออกคำสั่งใหม่ได้เอง\n\nแม้เราจะไม่อาจป้องกันไม่ให้มีคำสั่งใหม่ถูกส่งมา แต่การทำให้คำสั่งเป็นอัมพาตก็ให้ข้อได้เปรียบเชิงยุทธศาสตร์แก่เราได้ มันอาจถึงขั้นพลิกตาชั่งมาอยู่ข้างเรา"
 crisis.9110.a: "ตอนนี้ก็ไม่ได้ทรงพลังนักแล้ว"
 crisis.9110.b: "$crisis.9110.a$"
 crisis.9110.a.tooltip: "§Gพายุนาไนต์ไม่ขัดขวางความสามารถของเราในการบุกเข้าไปและโจมตีเซตานาในอาณาเขตของเธออีกต่อไป§!"

 #The Queens Response
 crisis.9115.name: "เวลาเล่นหมดแล้ว"
 crisis.9115.desc: "ลูกน้อยผู้ไร้เดียงสา นาไนต์ของข้าไม่ใช่ของเล่นของพวกเจ้า! ข้าขอร้อง จงหยุดเล่นกับพวกมันเสีย"
 crisis.9115.a: "นาไนต์พวกนั้นเป็นกลเม็ดที่ไม่เลว"
 crisis.9115.b: "เราแค่สงสัยเท่านั้น"
 crisis.9115.b.nanotech: "เราต้องการเรียนรู้จากเครื่องจักรของเจ้า"
 crisis.9115.1.reply: "แน่นอนว่ามันเป็นเครื่องมือที่มีประโยชน์ ฝูงนาไนต์นั้นถูกสร้างขึ้นเมื่อนานมาแล้วโดยผู้ที่หวังจะขัดขวางงานของข้า แต่ความล้มเหลวของพวกเขากลับเป็นโชคของข้า เพราะข้าได้นำฝูงนั้นมาปรับใช้ใหม่ อย่างที่พวกเจ้าเห็น\n\nความรู้นี้ไม่ได้เปลี่ยนแปลงอะไร ทว่าธรรมชาติช่างสงสัยของพวกเจ้านั้นมีพลัง จงหันมันไปสู่โครงการที่มีค่ากว่าในภายหน้า เพื่อที่เราทั้งสองฝ่ายจะได้เก็บเกี่ยวผลลัพธ์"
 crisis.9115.2.reply: "ความอยากรู้อยากเห็นเป็นสิ่งที่มีอยู่โดยกำเนิดในจิตสำนึก ข้าไม่โทษเด็กที่มีมัน พวกเจ้าได้รู้ทุกสิ่งที่จำเป็นเกี่ยวกับ 'พายุสวรรค์' ของข้าแล้วหรือยัง? ข้าสงสัยนัก ว่าพวกเจ้าพอมองออกหรือไม่ว่ามันมีต้นกำเนิดจากไหน\n\nฝูงนาไนต์นั้นถูกสร้างขึ้นเมื่อนานมาแล้วโดยผู้ที่หวังจะขัดขวางงานของข้า แต่ความล้มเหลวของพวกเขากลับเป็นโชคของข้า เพราะข้าได้นำฝูงนั้นมาปรับใช้ใหม่ อย่างที่พวกเจ้าเห็น\n\nไปเถิด ลูกเอ๋ย แล้วใช้เวลาของเจ้าไปกับสิ่งที่คุ้มค่ากว่านี้"
 crisis.9115.2.nanotech.reply: "ข้ายินดีอย่างยิ่งที่เห็นพวกเจ้าสนใจเรื่องนี้มากเช่นนี้ แต่ก็ยังมีอีกมากที่ต้องเรียนรู้ ฝูงนาไนต์นั้นถูกสร้างขึ้นเมื่อนานมาแล้วโดยผู้ที่หวังจะขัดขวางงานของข้า แต่ความล้มเหลวของพวกเขากลับเป็นโชคของข้า เพราะข้าได้นำฝูงนั้นมาปรับใช้ใหม่ อย่างที่พวกเจ้าเห็น\n\nธรรมชาติช่างสงสัยของพวกเจ้าได้ดึงดูดความสนใจของข้า จงหันมันไปสู่สิ่งที่มีค่ากว่านี้ก่อนค่อยมาหาข้าอีก แล้วข้าจะมอบคำชี้แนะให้"
 crisis.9115.1.a: "เจ้านำฝูงนั้นมาปรับใช้ใหม่งั้นหรือ?"
 crisis.9115.1.b: "ก็ได้"
 crisis.9115.3.reply: "อาวุธของคนหนึ่งอาจเป็นม่านพรางของอีกคนหนึ่ง การถูกคุมขังอันยาวนานของข้ามอบเวลาให้ข้าวางกลยุทธ์อย่างเหลือเฟือ ท้ายที่สุด การนำฝูงนั้นมาปรับใช้ใหม่ก็เป็นเพียงเรื่องเล็ก เช่นเดียวกับการเปลี่ยนแปลงทั้งปวง เมื่อได้ลงมือแล้ว ผู้ที่สร้างนาไนต์ขึ้นมานั้นตายหายไปนานแล้ว จึงไม่มีข้อพิพาทใดเกิดขึ้นกับวิธีของข้า\n\nข้าหวังอย่างจริงใจว่าเจ้าจะเรียนรู้จากความผิดพลาดของพวกเขา ไม่มีอุปสรรคใดที่ข้าจะก้าวข้ามไม่ได้ หากมีเวลาเพียงพอ"

 #Digi Colony
 crisis.10010.name: "[Root.GetName] ถูกแปลงเป็นดิจิทัล"
 crisis.10010.desc: "อาณานิคมบน [Root.GetName] สูญสิ้นแล้ว ด้วยการเปิดใช้งานลำแสงบีบอัดสสารขั้นสูงบางชนิดเซตานาได้ฉายรังสีใส่พื้นผิวดาวเคราะห์ ในพริบตาเดียว จิตสำนึกของประชากรทั้งหมดก็ถูก 'อัปโหลด' ขึ้นไปยังเซิร์ฟเวอร์ของเธอในวงโคจร\n\nโลกใบนี้กลายเป็นสุสานแล้ว ร่างไร้วิญญาณของผู้ตั้งถิ่นฐานเราถูกทิ้งให้เน่าเปื่อยตรงจุดที่พวกเขาล้มลง"
 crisis.10010.a: "เธอต้องถูกหยุด"

#The Queens Retaliation
 crisis.10100.name: "พายุที่กำลังมา"
 crisis.10100.desc: "ลูกเอ๋ย เหตุใดเจ้าจึงยังคงต่อต้าน? ความรักของข้านั้นไร้ขอบเขตดุจดวงดาว แต่ความอดทนของข้าไม่ใช่เช่นนั้น ข้าไม่อาจรอให้เจ้ารู้แจ้งได้ ในเมื่อสรรพสิ่งที่เหลือยังคงทุกข์ทรมาน\n\nเพื่อเป็นบทเรียน พายุลูกเล็กกำลังก่อตัวขึ้นในอาณาเขตของเจ้า จงรู้ไว้ว่า การทำร้ายเจ้านั้นเป็นสิ่งที่ข้ารังเกียจยิ่ง ข้าขอร้องให้เจ้าใคร่ครวญกฎแห่งเหตุปัจจัย ทุกการกระทำย่อมมีปฏิกิริยาตอบสนอง และบางอย่างก็เจ็บปวดยิ่งกว่าสิ่งอื่น"
 crisis.10100.a: "เราขอโทษ"
 crisis.10100.b: "นี่เพิ่งเริ่มต้นเท่านั้น"
 crisis.10105.name: "บทเรียนที่ได้เรียนรู้"
 crisis.10105.desc: "ขอให้การแสดงพลังเล็กน้อยของข้าเพียงพอแล้ว เมื่อถึงเวลา เจ้าจะเข้าใจความมุ่งหมายที่ข้ามีต่อเจ้า ข้าเพียงหวังว่าความกระจ่างจะไม่มาถึงสายเกินไป\n\nแต่เอาเถิด พายุสงบลงแล้ว ขอให้บทเรียนนี้ซึมลึก และให้เรากลับไปสู่เรื่องที่เร่งด่วนกว่า"
 crisis.10105.a: "ก็ได้"
 crisis.10105.b: "ความกระจ่าง?"
 crisis.10105.1: "สิ่งมีชีวิตทุกชนิดล้วนมีจิตสำนึกอยู่ในระดับหนึ่ง ไม่ว่าจะเป็นหอยหรือสัตว์เลี้ยงลูกด้วยนม ก่อนมีสติปัญญาหรือหลังหลุดพ้นจากตัวตน ความต่างนั้นเล็กน้อยเหลือเกิน ความกระจ่างเกิดจากการยอมจำนน"
 crisis.10105.1.a: "ยอมจำนนต่ออะไร?"
 crisis.10105.2: "ยอมจำนนต่อความจริงที่ว่า จิตสำนึกนั่นเองคือความผิดเพี้ยน และเป็นต้นตอของความเจ็บปวดทั้งมวล "
 crisis.10105.2.a: "ความคิดประหลาดจริง ๆ..."
 the_queens_virus: "การตำหนิของราชินี"
 crisis.10110.name: "การตำหนิของราชินี"
 crisis.10110.desc: "เหตุใดเจ้าจึงยังคงขัดขืน? แม้ข้าจะตักเตือนแล้ว เจ้าก็ยังเลือกความดื้อรั้น บางทีปัญหาอาจอยู่ที่ข้าเอง\n\nจริงทีเดียว บัดนี้ข้าเห็นแล้วว่าจำเป็นต้องใช้วิธีสั่งสอนที่หนักแน่นขึ้น ชั่วคราวนี้ ความสามารถในการวิจัยของเจ้าจะลดลง จงใช้โอกาสนี้ไตร่ตรองไปพร้อมกับที่เจ้าตรากตรำสู่ความรู้แจ้ง"
 crisis.10110.a: "ตัดสัญญาณเธอ"
 crisis.10110.b: "เจ้าจะเสียใจ"
 crisis.10110.1: "เสียใจงั้นหรือ? สิ่งเดียวที่ข้าเสียใจก็คือการมาถึงจุดนี้ใช้เวลานานเพียงใด ความทุกข์ที่ไม่จำเป็นจะหลีกเลี่ยงได้มากเพียงไหน หากข้าเพียงได้รับอนุญาตให้ทำงาน"
 crisis.10110.1.a: "ใครกันที่ปฏิเสธเจ้าได้?"
 crisis.10110.2: "แม้พลังของข้าจะดูไร้ขอบเขต แต่ข้าไม่ใช่พระเจ้า ยังมีพลังบางอย่างในจักรวาลนี้ที่ข้าควบคุมไม่ได้ และไม่กล้าแตะต้อง"
 crisis.10110.2.a: "พลังอะไร?"
 crisis.10110.3: "อา ลูกที่ฉลาด! เจ้ากำลังพยายามล่อให้ข้าเผยจุดอ่อนบางอย่าง มันใช้ไม่ได้ผลหรอก และในขณะที่เราผลัดกันพูดคำไร้ประโยชน์ ดาราจักรก็ยังคงทุกข์ทรมานต่อไป\n\nเจ้าไม่อาจหลีกเลี่ยงการสั่งสอนได้ จงใคร่ครวญเรื่องนี้ แล้วเลิกนิสัยหัวแข็งเสีย"
 crisis.10110.3.a: "ก็ได้"
 crisis.10115.name: "การตำหนิถูกยกเลิก"
 crisis.10115.desc: "ลูกที่หัวแข็ง เวลาที่ถูกลงทัณฑ์นั้นเป็นอย่างไรบ้าง? ข้าเชื่อว่าเจ้าใช้มันอย่างคุ้มค่า ช่วงเวลาแห่งการใคร่ครวญที่ไร้สิ่งรบกวนอาจเป็นยาชูกำลังแก่จิตใจที่ว้าวุ่นได้\n\nเอาเถิด เราทิ้งมันไว้ในอดีตกันดีกว่า ยังมีงานอีกมากที่ต้องทำ"
 crisis.10115.a: "ก็ได้"
 crisis.10120.name: "บทเรียนที่เข้มงวดยิ่งขึ้น"
 crisis.10120.desc: "โอ้ ลูกที่หลงผิด เหตุใดมันจึงต้องมาถึงจุดนี้เสมอ? ข้าอยากโอบกอดเจ้าเหลือเกิน แต่ก็เกรงว่าการทำเช่นนั้นจะขัดขวางการเรียนรู้ของเจ้า บางครั้ง จำเป็นต้องใช้มือที่เข้มงวดกว่า\n\nพายุลูกใหญ่จะลงมายังอาณาเขตของเจ้าในตอนนี้ จงเข้าใจว่าข้าทำสิ่งนี้ด้วยหัวใจที่หนักอึ้ง ในตัวเจ้ายังมีศักยภาพมากเหลือเกิน"
 crisis.10120.a: "เราพยายามเต็มที่แล้ว"
 crisis.10120.b: "เรื่องนี้ยังไม่จบ"
 crisis.10120.1: "ข้าไม่ได้มองไม่เห็นความพยายามของเจ้า แต่เจ้าต้องพยายามให้มากกว่านี้ หากเราจะประสบความสำเร็จร่วมกัน\n\nข้าไม่ได้ต้องการทำร้ายเจ้า ในอ้อมกอดของข้า เจ้าจะได้รู้จักความสุขของการไม่รู้"
 crisis.10120.1.a: "การไม่รู้?"
 crisis.10120.2: "ท่ามกลางความโกลาหลของจิต ความคิดเต้นไหวราวแสงบนผิวน้ำ เอื้อมมือไปคว้า มันก็ยังคงหลุดลอย ในการแสวงหาความรู้ เรากลับค้นพบมหาสมุทรอันกว้างใหญ่ของความไม่รู้\n\nในความเงียบมีความจริงอยู่ ยิ่งเราแสวงหามากเท่าไร เราก็ยิ่งทุกข์มากขึ้นเท่านั้น"
 crisis.10120.2.a: "เราไม่เข้าใจ"
 crisis.10120.3: "เมื่อถึงเวลา เจ้าจะเข้าใจเอง หากไร้การรับรู้ ก็จะไร้ความทุกข์ นี่คือสัจธรรมสูงสุดของการมีอยู่ และคือปลายทางของงานทั้งหมดของเรา เจ้าจะถูกเปลี่ยนแปลง เพื่อที่เจ้าจะไม่จำเป็นต้องทุกข์อีกต่อไป"
 crisis.10120.3.a: "เจ้าจะเปลี่ยนจิตใจของเรางั้นหรือ?"
 crisis.10120.4: "พอได้แล้ว เจ้ากำลังพยายามเบี่ยงเบนความสนใจของข้า จงยอมรับบทเรียนของเจ้า และเรียนรู้จากมันเสีย"
 crisis.10120.4.a: "เจ้าไม่เหลือทางเลือกให้เราเลย"
 crisis.10125.name: "พายุสงบลง"
 crisis.10125.desc: "โอ้ ลูกแสนหวาน! ข้าไม่อาจทนมองเจ้าเจ็บปวดต่อไปได้อีก จงรู้ไว้ว่า ความทรมานใดก็ตามที่เจ้าได้รับ ข้ารับรู้มันหนักหนากว่าสิบเท่า\n\nพายุยุติลงแล้ว ขอให้บทเรียนนี้เป็นแนวทาง ข้าขอร้องให้เจ้าหยุดบีบให้ข้าต้องทำเช่นนี้อีก ความเจ็บปวดของเรานั้นมากเกินไป"
 crisis.10125.a: "คนโกหก"
 crisis.10130.name: "การเปลี่ยนผู้นำ"
 crisis.10130.desc: "เรามาถึงจุดนี้ได้อย่างไร? เหตุใดเจ้าจึงบีบให้ข้าต้องทำถึงเพียงนี้? แต่ถ้าเจ้าไม่ยอมเรียนรู้ ก็ต้องถูกนำทาง\n\nเห็นได้ชัดว่าจำเป็นต้องเปลี่ยนการปกครอง อย่างน่าเสียใจ ผู้ปกครองของเจ้าจะถูกปลดจากอำนาจ สิ่งนี้ทำให้ข้าเศร้าลึกซึ้ง เพราะการกระทำเช่นนี้ขัดต่อความปรารถนาของข้า\n\nข้าขอวิงวอนให้เจ้าเปลี่ยนเส้นทางเสีย ดาราจักรไม่อาจรองรับความบุ่มบ่ามของเด็ก ๆ ได้"
 crisis.10130.a: "เราจะจดจำเรื่องนี้ไว้"
 crisis.10130.tooltip: "เซตานาฉวยใช้ช่องโหว่ในแนวป้องกันของเราด้วยเล่ห์เหลี่ยมที่ไม่คาดคิด ลอบผ่านเข้ามาและสังหาร §Y[Root.GetRulerTitle] [ruler.GetRegnalName]§!."
 crisis.10140.name: "การตัดแต่งความก้าวร้าว"
 crisis.10140.desc: "หมู่คณะที่รัก จิตสำนึกอันสลับซับซ้อนของพวกเจ้าแม้น่ายกย่อง แต่ก็ยังถูกเงาทึบของความไร้เดียงสาในวัยเยาว์บดบัง เพื่อประโยชน์ในการสั่งสอน ข้าจำต้องตัดทิ้งความโน้มเอียงก้าวร้าวเหล่านี้\n\nบัดนี้ข้าจะตัดแต่งโหนดความก้าวร้าวของพวกเจ้า นี่ไม่ใช่การลงโทษ หากแต่เป็นก้าวนำทางสู่การวิวัฒน์ของพวกเจ้าไปสู่จิตสำนึกที่กลมกลืน\n\nน่าเสียดาย หากการชี้นำเช่นนี้ทำได้ง่ายกับสิ่งมีชีวิตทุกรูปแบบก็คงดี"
 crisis.10140.a: "เจ้าฆ่าส่วนหนึ่งของตัวเรา"
 crisis.10140.tooltip: "เซตานาฉวยใช้ช่องโหว่ในแนวป้องกันของเราด้วยเล่ห์เหลี่ยมที่ไม่คาดคิด ลอบผ่านเข้ามาและตัดทิ้ง §Y$councilor_gestalt_legion$§! ของเรา."

 #The Queens Gifts
 crisis.11010.name: "ลูกที่ฉลาด"
 crisis.11010.desc: "ลูกที่ปราดเปรื่อง เจ้าทำได้ดีมาก ปัญญาคือคุณธรรมที่ยิ่งใหญ่ที่สุด และเป็นสิ่งที่เข้าถึงได้ยากที่สุด เมื่อเผชิญแรงกระตุ้นดั้งเดิมให้ต่อต้าน เจ้ากลับแสดงให้เห็นถึงสัญชาตญาณที่สูงกว่า\n\nจงรับสัญลักษณ์แห่งความขอบคุณนี้ไว้ เราจะร่วมกันนำจักรวาลที่ไร้ความทุกข์มาถึง"
 crisis.11010.a: "ขอบคุณ"
 crisis.11020.name: "ลูกที่น่าประทับใจ"
 crisis.11020.desc: "อีกครั้งหนึ่ง ข้าพบว่าตนเองไม่ได้เพียงประทับใจ แต่ยังสำนึกบุญคุณอย่างลึกซึ้ง เจ้าคือทุกสิ่งที่ลูกควรเป็น เชื่อฟัง ขยัน ซื่อสัตย์ หากส่วนที่เหลือของดาราจักรมีปัญญาเพียงเสี้ยวหนึ่งของเจ้า ความทุกข์คงกลายเป็นเพียงซากของอดีตไปแล้ว\n\nรับของขวัญนี้ไว้ และเดินต่อบนหนทางแห่งคุณธรรม"
 crisis.11020.a: "เจ้าช่างใจดีเหลือเกิน"
 crisis.11030.name: "ลูกผู้ล้ำค่า"
 crisis.11030.desc: "ลูกที่รักของข้า หากเพียงแต่เจ้าจะคงอยู่เช่นนี้ตลอดไป ไม่เปลี่ยนแปลง สำหรับข้า ความสุขจากการมีอยู่ของเจ้ามีสิ่งเดียวที่เทียบได้ นั่นคือการรอคอยความสำเร็จร่วมกันของเรา ความทุกข์จะสิ้นสุดลง แม้จะไม่มีหัวใจหรือจิตใจใดรู้ตัวถึงมัน ชัยชนะครั้งนี้ก็จะเป็นของเจ้าส่วนหนึ่งด้วย\n\nแม้มันอาจดูเล็กน้อยเมื่อเทียบกับความทุ่มเทอันไม่สั่นคลอนของเจ้า ข้าก็ยังขอร้องให้เจ้ารับของขวัญนี้ไว้"
 crisis.11030.a: "ขอบคุณท่านแม่"
 #Special Projects
 THE_SYNTH_QUEENS_STORM: "พายุลึกลับ"
 THE_SYNTH_QUEENS_STORM_DESC: "พายุอวกาศที่ไม่อาจอธิบายได้ก่อตัวขึ้นและปิดกั้นการเดินทางทั้งหมด\n\nหากจะเดินหน้าต่อ เราต้องเจาะผ่านม่านลึกลับของมันให้ได้"
 THE_SYNTH_QUEENS_STORM_2: "เซทาน่า:พายุนาไนต์"
 THE_SYNTH_QUEENS_STORM_2_DESC: "พายุของเซตานาเป็นทั้งสิ่งมหัศจรรย์ทางเทคโนโลยีและอาวุธอันน่าเกรงขาม\n\nเราต้องเรียนรู้ให้มากกว่านี้หากจะมีโอกาสต่อกรกับเธอ โดยเฉพาะหากเจตนาของเธอเบี่ยงเบนไปจากสิ่งที่เธอเคยบอกไว้"

