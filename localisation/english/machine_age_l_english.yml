 crisis.8525.name: "จุดจบแห่งความทุกข์"
 crisis.8525.desc: "วาทศิลป์อันเมตตาของเซตานาซ่อนวาระมืดไว้ เธอวางแผนจะลบล้างสภาวะรู้คิดทั่วทั้งดาราจักรด้วยอุปกรณ์อันน่าสะพรึงกลัว มันจะลดทอนเราให้เหลือเพียงเปลือกที่ขับเคลื่อนด้วยสัญชาตญาณ ขณะที่จิตสำนึกของเราถูกแปลงเป็นดิจิทัลและกักขังโดยใช้กำลัง\n\nอนาคตอันหม่นหมองนี้ต้องถูกหยุดยั้งไม่ว่าต้องแลกด้วยสิ่งใด"
 crisis.8525.a: "เราต้องหาทางหยุดเธอ"
 crisis.8525.a.tt: "เราสามารถติดตามความคืบหน้าของเซตานาได้ขณะที่ยังคงเจรจาทางการทูตกับเธอ"

