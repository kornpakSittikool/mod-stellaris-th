 START_SCREEN_CYBERNETIC_CREED_NOMADS: "การเรียกร้องที่สูงส่งของเราคือการรวม[Owner.Species.GetFleshTypeCyberCreed]และเครื่องจักร เกิดมาเพื่อความว่างเปล่า ประชาชนของเราได้เข้าใจมานาน ว่าเนื้อเพียงอย่างเดียวไม่สามารถทน ประวัติศาสตร์ของเราถูกเติมเต็มด้วยความพยายามที่ล้มเหลว แต่ยังนําโดยพระประสงค์ของพระเจ้า ตอนนี้เราได้บรรลุขั้นแรก\n\nเราเพียงแค่เริ่มต้นที่จะสัมผัส ถึงศักยภาพของไซเบอร์เนติกอย่างไม่มีที่สิ้นสุดของเรา การต่อเติมที่ก้าวหน้ากว่านั้นยังไม่มาถึง\n\nทั้ง ๆ ที่ เป็น เช่น นี้ ความ เชื่อ ของ เรา ก็ มี ความ แตก ต่าง กัน ด้วย หลัก ข้อ เชื่อ ที่ แข่งขัน กัน ก็ ยัง โต้ แย้ง กัน ถึง เป้า หมาย สุด ท้าย ของ การ ต่อ รอง กัน อัน ศักดิ์สิทธิ์. เมื่อ เรา ตอบ คํา ถาม นี้ แล้ว การ อยู่ ร่วม กัน อย่าง บริสุทธิ์ อย่าง สมบูรณ์[Owner.Species.GetFleshTypeCyberCreed]และ เทคโนโลยี ที่ ให้ พระ พร จะ ช่วย ให้ เรา ปรับ ปรุง รูป แบบ ที่ มี ขอบ เขต จํากัด ของ วิวัฒนาการ ให้ ดี ขึ้น ซึ่ง เป็น รูป แบบ ที่ คู่ ควร อย่าง แท้ จริง กับ โมฆะ ที่ เรา เรียก ว่า บ้าน ไม่ รู้ สิ้น สุด.\n\n$machine_age.1090.pray$"
 origin_arc_welders_nomadic: "$origin_arc_welders$"
 origin_arc_welders_nomadic_desc: "กองทัพเรือของพวกเขามีการเคลื่อนไหวตลอดเวลา แต่ระบบที่พวกเขาพบตัวเองในครอบครอง ความร่ํารวยมากเกินไปที่จะละเลย เพื่อ จะ ได้ ประโยชน์ จาก สิ่ง เหล่า นี้ เครื่องจักร เหล่า นี้ จึง ใหญ่ โต กว่า แต่ ก่อน. ผู้ทรงพลัง§H$tech_orbital_arc_furnace$§!ปัจจุบัน มี โลก หล่อ ลื่น ครอบ คลุม อยู่ แต่ วิศวกร ชั้น ยอด เหล่า นี้ ไม่ เพียง พอ.\n\nกาแล็คซี่กําลังรออยู่ และความเป็นไปได้นั้นไม่มีที่สิ้นสุด ทั้งหมดมันต้องใช้ความฉลาดในการคว้าพวกเขา"
