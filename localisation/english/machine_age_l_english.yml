 synthetic_fertility_chain_desc: "เราได้สูญเสียความสามารถในการสืบพันธุ์ โลกบ้านเกิดของเราเต็มไปด้วยศูนย์การศึกษาที่ถูกทอดทิ้ง สนามเด็กเล่นร้างไร้ผู้คน เป็นเพียงเรื่องของเวลาก่อนที่คนสุดท้ายของเราจะจากไป ในตอนนี้ ความหวังของเรายังอยู่กับการจัดเก็บข้อมูลดิจิทัลในคลังตัวตน\n\nเราต้องพัฒนาโครงร่างสังเคราะห์และสมองโพซิตรอนิกที่มีความซับซ้อนเพียงพอ หากเรายังหวังจะกลับคืนสู่โลกกายภาพอีกครั้ง"

 #Origin Text
 origin_synthetic_fertility: "กำเนิดประชากรสังเคราะห์"
 origin_synthetic_fertility_desc: "§Rคำเตือน: บล็อกเส้นทางการยกระดับทั้งหมด ยกเว้น ['concept_synthetic_ascension']§!\n\nครั้งหนึ่งเคยเป็นสังคมอันรุ่งเรือง แต่โรคพันธุกรรมชนิดใหม่ได้ทำให้สายพันธุ์นี้ไม่สามารถสืบพันธุ์ได้ เมื่อทางเลือกใกล้หมดและเผชิญหน้ากับการสูญพันธุ์ พวกเขาจึงฝากความหวังไว้กับความรอดในรูปแบบดิจิทัล"
 origin_tooltip_synthetic_fertility_effects: "- $INITIAL_POPS$ §G+900§! $NEW_LINE$- $SPECIES_TRAITS$ ['concept_pathogenic_genes']\n- โฮมเวิลด์:$TABBED_NEW_LINE$- ขนาด:£planetsize£ 20 $TABBED_NEW_LINE$- ['concept_abandoned_cities', £blocker£ $concept_abandoned_cities$]: +2 $TABBED_NEW_LINE$- ['concept_identity_repository',£building£ $concept_identity_repository$] $TABBED_NEW_LINE$- ['concept_abandoned_gene_clinic',£building£ $concept_abandoned_gene_clinic$] $NEW_LINE$- สถานการณ์:['concept_identity_rescue'] $NEW_LINE$- $ADDITIONAL_TECHNOLOGIES_STRING$ ['concept_synth_ai'] $NEW_LINE$- $GUARANTEED_RESEARCH_OPTION_STRING$ ['concept_robotic_workers', £engineering_research£ $tech_robotic_workers$]"
 origin_tooltip_synthetic_fertility_negative_effects: "- £pop£ §Hป๊อป§!ลดเสียง"
 START_SCREEN_SYNTHETIC_FERTILITY: "การบุกเบิกจิตสำนึกประดิษฐ์ในระยะแรกถือเป็นการปฏิวัติ ก่อกำเนิดชุมชนดิจิทัลอย่างเต็มรูปแบบและทำให้เส้นแบ่งระหว่างโลกกายภาพกับโลกเสมือนเลือนรางลง ความสำเร็จนั้นยิ่งใหญ่มากเสียจนเราประมาท คิดว่าเรายังมีอีกนับไม่ถ้วนชั่วอายุคนให้สร้างสรรค์และสำรวจ\n\nเราคิดผิด\n\nเมื่อโรคชนิดใหม่โจมตีรหัสพันธุกรรมของเรา เราก็สูญเสียความสามารถในการสืบพันธุ์ ยารักษาหลุดลอยจากจิตใจอันชาญฉลาดที่สุดของเรา และความตื่นตระหนกก็เพิ่มขึ้นเมื่อประชากรแก่ชราและลดจำนวนลง\n\nด้วยความสิ้นหวัง เราจึงขยายพื้นที่เก็บข้อมูลดิจิทัล สร้าง 'พื้นที่' มากพอที่จะเก็บรักษาตัวตนของเราไว้ แต่การดำรงอยู่เช่นนี้ใช่สิ่งที่เราปรารถนาจริงหรือ? บัดนี้เราจึงหันไปมุ่งพัฒนาร่างกายสังเคราะห์และสมองโพซิตรอนิกที่ล้ำหน้าพอให้เรายังคงอยู่ในโลกกายภาพได้"

