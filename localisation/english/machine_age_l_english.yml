 trait_robot_history_warbot: "เครื่องจักรสงคราม"
 trait_robot_history_warbot_desc: "เครื่อง กล เหล่า นี้ ทํา ให้ เกิด การ ตอบ สนอง อย่าง น่า ทึ่ง, ทํา ให้ เกราะ แข็ง แรง, และ มี ระบบ สํารอง ที่ แข็ง แรง."
 trait_robot_history_artbot: "บอทพี่เลี้ยง"
 trait_robot_history_artbot_desc: "เครื่อง กล เหล่า นี้ ถูก ออก แบบ มา ให้ เป็น เครื่อง ช่วย งาน รับ ใช้ ภาย ใน บ้าน แต่ เดิม มี ความ สามารถ ใน การ ใช้ รถยนต์ ที่ ดี, การ จัด การ ด้าน ทรัพยากร ที่ มี ประสิทธิภาพ, และ ความ สามารถ ใน การ ประกอบ งาน ที่ ดี เยี่ยม."
 trait_robot_history_explorebot: "เครื่องสร้างงานศิลปะ"
 trait_robot_history_explorebot_desc: "เครื่อง กล เหล่า นี้ ไม่ ได้ ถูก ออก แบบ ให้ ใช้ งาน ได้ จริง ใน ด้าน ศิลปะ และ วัฒนธรรม."
 trait_robot_history_researchbot: "ผู้ช่วยวิจัย"
 trait_robot_history_researchbot_desc: "ใน ตอน แรก ถูก ออก แบบ ให้ เป็น ผู้ ช่วย งาน วิจัย เครื่องจักร เหล่า นี้ แสดง ให้ เห็น ความ สามารถ ใน การ วิเคราะห์, การ แยกแยะ ข้อมูล อย่าง รวด เร็ว, และ การ แสวง หา การ ค้น พบ ทาง วิทยาศาสตร์ อย่าง ไม่ ละลด."
 trait_robot_history_resourcebot: "บอทคนงาน"
 trait_robot_history_resourcebot_desc: "เครื่องจักร เหล่า นี้ ถูก ออก แบบ ด้วย จุด ประสงค์ ของ การ สกัด วัสดุ ดิบ. เครื่อง มือ พิเศษ, ข้อ ต่อ เสริม, และ ระบบ ขับ เคลื่อน ทํา ให้ พวก เขา เป็น คน งาน ที่ ดี เยี่ยม."
