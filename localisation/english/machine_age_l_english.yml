 building_amphitheater_of_the_mind: "อัฒจันทร์แห่งจิตใจ"
 building_amphitheater_of_the_mind_desc: "ศาลาการประมวลผลเฉพาะถิ่นแห่งนี้ เปิดทางให้คณะนักขับขานแห่งจิตใจที่เชื่อมโยงกันเพียงบางส่วน ได้ถกเถียง แบ่งปัน และสำรวจความลับของระนาบวัตถุด้วยความเร็วแห่งแสง"
 building_grand_concert_hall_of_the_mind: "หอขับขานครั้งใหญ่แห่งจิตใจ"
 building_grand_concert_hall_of_the_mind_desc: "เครือข่ายสื่อสารล้ำสมัยที่ตั้งอยู่ภายในหอเสียงกังวานนี้ ทำให้คณะนักขับขานแห่งจิตใจสามารถร่วมภาวนาเพื่อค้นหาความศักดิ์สิทธิ์ได้ เมื่อเชื่อมต่อกันด้วยไซเบอร์แวร์ เสียงสวดของพวกเขาจะคลี่คลายท่วงทำนองที่ซ่อนอยู่ของจักรวาล"
 building_forge_of_the_fellowship: "โรงหลอมแห่งภราดรภาพ"
 building_forge_of_the_fellowship_desc: "ที่นี่ โรงหลอมแห่งแรกของภราดรภาพแห่งค้อนผลิตวัสดุก่อสร้างคุณภาพสูงที่สุด ค้อนทั้งหลายขับขานไปพร้อมกับที่ผู้ศรัทธาดำเนินงานอันศักดิ์สิทธิ์ของตน"
 building_grand_forge_of_the_fellowship: "มหาโรงหลอมแห่งภราดรภาพ"
 building_grand_forge_of_the_fellowship_desc: "ไกลออกไปจากห้องโถงของมหาโรงหลอม ผู้ศรัทธายังได้ยินบทสวดของเครื่องมือที่ไม่เคยหยุดนิ่งของภราดรภาพ ยามค่ำคืน แสงจากวิหารหลอมอันวิจิตรส่องสว่างเหนือหมู่ดาว เช่นเดียวกับประกายศักดิ์สิทธิ์ของเราที่ส่องเพื่อเทพเจ้า"
 building_battlement_of_steel: "ป้อมปราการเหล็กกล้า"
 building_battlement_of_steel_desc: "โบสถ์ป้อมปราการแห่งนี้เป็นทั้งคลังอาวุธและสนามฝึกสำหรับอัศวินแห่งเหล็กกล้าที่พร้อมรบอยู่เสมอ พวกเขาเฝ้าระวังไม่หยุดยั้งเพื่อปกป้องเนื้อหนังอันศักดิ์สิทธิ์ของเรา"
 building_grand_battlements_of_steel: "มหาป้อมปราการเหล็กกล้า"
 building_grand_battlements_of_steel_desc: "ขอให้กำแพงอันงดงามของมหาวิหารป้อมปราการนี้ไม่มีวันพังทลาย คลังอาวุธของมันอัดแน่นไปด้วยรากปลูกถ่ายศักดิ์สิทธิ์ของอัศวินแห่งเหล็กกล้า แต่ละชิ้นรอคอยวีรชนผู้ได้รับการเจิม ในห้องโถงเหล่านี้ ความศักดิ์สิทธิ์สถิตอยู่ ณ รอยต่อระหว่างเนื้อหนังและเหล็กกล้า"
 building_sanctuary_of_toil: "สถานศักดิ์สิทธิ์แห่งการตรากตรำ"
 building_sanctuary_of_toil_desc: "สถานศักดิ์สิทธิ์แห่งนี้ประสานงาน ซ่อมแซม และฟื้นฟูเนื้อหนังรวมถึงการเสริมแต่งของชุมชนแห่งการตรากตรำ"
 building_grand_cathedral_of_toil: "มหาวิหารแห่งการตรากตรำ"
 building_grand_cathedral_of_toil_desc: "ขอให้ผู้จัดหาสิ่งจำเป็นแก่ผู้ศรัทธาได้รับพร ขอให้ดวงวิญญาณที่อ่อนล้าของพวกเขาได้พักในมหาวิหารแห่งการตรากตรำ โรงงานและศูนย์ประสานงานของมันจะคอยชี้นำและเติมพลังให้แรงงานผู้ศรัทธาและการเสริมแต่งศักดิ์สิทธิ์ของพวกเขาในทุกภารกิจ"
 building_the_sanctum_of_augmentation: "วิหารแห่งการเสริมแต่ง"
 building_the_sanctum_of_augmentation_desc: "ด้วยจิตวิญญาณแห่งศรัทธาร่วมกัน วิหารศักดิ์สิทธิ์แห่งนี้ยืนหยัดเป็นสัญลักษณ์ของเอกภาพ ภายในห้องอันถูกชำระให้ศักดิ์สิทธิ์ ผู้ศรัทธาจะดูแลทั้งจิตวิญญาณและการเสริมแต่งของฝูงชนของตน"
 building_the_united_sanctum_of_augmentation: "วิหารรวมแห่งการเสริมแต่ง"
 building_the_united_sanctum_of_augmentation_desc: "ด้วยความเคารพต่อการหลอมรวมอันศักดิ์สิทธิ์ที่สุด วิหารอันยิ่งใหญ่นี้จึงเป็นพยานที่มีชีวิต ภายในห้องอันได้รับการชำระ ผู้ศรัทธาจะมารวมตัวกันอย่างไม่สั่นคลอนในความมุ่งมั่นที่จะขับเคลื่อนภารกิจอันสูงส่งของการหลอมรวมศักดิ์สิทธิ์"

 #Advanced Cyber Creed Authorities
 auth_cyber_creed_democratic: "เสริมาธิปไตยประชาธิปไตย"
 auth_cyber_creed_democratic_desc: "รัฐบาลไซเบอร์เนติกแบบประชาธิปไตยมอบสิทธิเลือกตั้งอันศักดิ์สิทธิ์ให้ประชาชนที่ได้รับการเสริมแต่ง ได้แสดงเสียงของตนในประเด็นทางการเมืองต่างๆ เพื่อเติมเต็มการมีส่วนร่วมกับความศักดิ์สิทธิ์"
 concept_auth_cyber_creed_democratic: "$auth_cyber_creed_democratic$"
 auth_cyber_creed_oligarchic: "ไซเบอร์เทวาธิปไตยคณาธิปไตย"
 auth_cyber_creed_oligarchic_desc: "รัฐบาลไซเบอร์เนติกแบบคณาธิปไตยมีกลุ่มชนอภิสิทธิ์ที่ได้รับการเสริมแต่งขั้นสูง ซึ่งกุมอำนาจทางการเมืองทั้งหมดและขับเคลื่อนสังคมไซเบอร์เนติกของตนด้วยความแม่นยำไร้ผู้เทียบ"
 concept_auth_cyber_creed_oligarchic: "$auth_cyber_creed_oligarchic$"
 auth_cyber_creed_dictatorial: "ซินโธด็อกซีเผด็จการ"
 auth_cyber_creed_dictatorial_desc: "รัฐบาลไซเบอร์เนติกแบบเผด็จการเลือกผู้ปกครองตลอดชีพซึ่งใช้อำนาจเบ็ดเสร็จผ่านรากปลูกถ่ายไซเบอร์เนติกขั้นสูง นำพาชะตากรรมของสังคมไปตามเจตจำนง"
 concept_auth_cyber_creed_dictatorial: "$auth_cyber_creed_dictatorial$"
 auth_cyber_creed_imperial: "จักรวรรดิไซเบอร์เนต"
 auth_cyber_creed_imperial_desc: "รัฐบาลไซเบอร์เนติกแบบจักรวรรดิมีผู้ปกครองสูงสุดและผู้สืบทอดที่ถูกกำหนดไว้ เพื่อให้การถ่ายโอนอำนาจเป็นไปอย่างไร้รอยต่อ พวกเขาหลอมรวมจิตวิญญาณเข้ากับไซเบอร์เนติกขั้นสูงเป็นการปกครองที่ไม่หวั่นไหว"
 concept_auth_cyber_creed_imperial: "$auth_cyber_creed_imperial$"
 auth_cyber_creed_corporate: "เทคศักดิ์สิทธิ์บรรษัท"
 auth_cyber_creed_corporate_desc: "รัฐบาลบรรษัทไซเบอร์เนติกก้าวข้ามบทบาทของรัฐแบบดั้งเดิม ผ่านรากปลูกถ่ายขั้นสูงและการหลอมรวมระหว่างศรัทธากับเทคโนโลยี เพื่อแสวงหาโอกาสทางการเงินอันศักดิ์สิทธิ์"
 concept_auth_cyber_creed_corporate: "$auth_cyber_creed_corporate$"

 #Advanced Cyber Creed Government Types
 gov_cyber_creed_monarchy: "อธิปไตยไซเบอร์เนติก"
 gov_cyber_creed_monarchy_desc: "รัฐบาลนี้คือราชาธิปไตยเทคโน-จิตวิญญาณนิยม ซึ่งผู้ปกครองและสายเลือดของพวกเขาเป็นสัญลักษณ์ศักดิ์สิทธิ์ของการหลอมรวมอันศักดิ์สิทธิ์ ศาสนจักรสนับสนุนกลไกรัฐโดยตรง"
 gov_cyber_creed_dictatorship: "เทคโนเครซีศักดิ์สิทธิ์"
 gov_cyber_creed_dictatorship_desc: "รัฐบาลนี้คือเผด็จการเทคโน-จิตวิญญาณนิยม ปกครองโดยบุคคลผู้ได้รับการเสริมแต่งเพียงหนึ่งเดียวภายใต้โครงสร้างอำนาจแบบลำดับชั้นซึ่งได้รับการสนับสนุนจากศรัทธาทางการ"
 gov_cyber_creed_oligarchy: "สภาแห่งเทคโนแฟนต์"
 gov_cyber_creed_oligarchy_desc: "รัฐบาลนี้คือคณาธิปไตยเทคโน-จิตวิญญาณนิยม ซึ่งอำนาจทางการเมืองอยู่ในมือของกลุ่มศาสนาที่ทรงอิทธิพลที่สุดของชาติ"
 gov_cyber_creed_democracy: "สาธารณรัฐผู้ก้าวข้าม"
 gov_cyber_creed_democracy_desc: "รัฐบาลนี้คือรูปแบบประชาธิปไตยเทคโน-จิตวิญญาณนิยม ซึ่งสภาศาสนาของผู้ได้รับการเสริมแต่งทำหน้าที่กำกับดูแลกระบวนการประชาธิปไตย"
 gov_cyber_creed_divine_empire: "จักรวรรดิผู้เสริมแต่งศักดิ์สิทธิ์"
 gov_cyber_creed_divine_empire_desc: "รัฐบาลนี้คือระบอบอัตตาธิปไตยเทคโน-จิตวิญญาณนิยมรูปแบบหนึ่ง ศรัทธาทางการของรัฐถักทออยู่ในทุกแง่มุมของชีวิตสาธารณะ และประชาชนถือว่าผู้ปกครองผู้ได้รับการเสริมแต่งของตนคือเทพมีชีวิตผู้ไม่อาจผิดพลาด"
 gov_cyber_creed_holy_tribunal: "สภาตุลาการแห่งเทคโนแฟนต์"
 gov_cyber_creed_holy_tribunal_desc: "รัฐบาลนี้คือรูปแบบคณาธิปไตยเทคโน-จิตวิญญาณนิยม ซึ่งภายใต้การชี้นำของสิ่งศักดิ์สิทธิ์ สภานักบวชควบคุมกลไกทั้งหมดของรัฐ"
 gov_cyber_creed_megachurch: "เมกะเชิร์ชผู้เสริมแต่ง"
 gov_cyber_creed_megachurch_desc: "รัฐบาลนี้คือคณาธิปไตยที่ตั้งอยู่บนการผสมผสานระหว่างคุณค่าทางการค้ากับเทคโน-จิตวิญญาณนิยม โดยตำแหน่งนักบวชผู้ได้รับการแต่งตั้งและเจ้าหน้าที่บรรษัทได้หลอมรวมเป็นบทบาทเดียว"
 gov_cyber_creed_subversive_cult: "ลัทธิเครื่องจักร"
 gov_cyber_creed_subversive_cult_desc: "รัฐบาลนี้คือลัทธิศาสนาที่อาศัยกิจการอาชญากรรมและบรรษัทหลากหลายรูปแบบที่มุ่งเน้นไซเบอร์เนติกในการค้ำจุนตนเอง"

 #Advanced Government Edicts
 edict_cybernetic_creed_construction_edict: "การตีค้อนอันเปี่ยมคุณธรรม"
 edict_cybernetic_creed_construction_edict_desc: "หากต้องการสร้างสังคมอันศักดิ์สิทธิ์ เราต้องสนับสนุนภราดรภาพแห่งค้อนอย่างเต็มที่ เพราะผลงานของพวกเขาคือกุญแจสู่การสร้างอนาคตที่คู่ควรกับสิ่งศักดิ์สิทธิ์"
 edict_cybernetic_creed_war_edict: "สงครามครูเสดแห่งเหล็กกล้า"
 edict_cybernetic_creed_war_edict_desc: "เพื่อป้องกันอสูรร้ายที่หมายโจมตีเนื้อหนังอันศักดิ์สิทธิ์ของเรา เราต้องสนับสนุนเหล่าเทมพลาร์เหล็กกล้าอย่างเต็มที่ เพื่อให้เหล่านักรบของเราพร้อมรบอยู่เสมอ"
 edict_cybernetic_creed_research_edict: "บทเพลงแห่งความรู้"
 edict_cybernetic_creed_research_edict_desc: "มีเพียงผ่านบทเพลงแห่งความรู้ที่กังวานเท่านั้น ที่ประชาชนของเราจะรู้จักสิ่งศักดิ์สิทธิ์อย่างแท้จริง เราต้องสนับสนุนคณะขับร้องแห่งจิตใจผู้เปี่ยมปัญญาในทุกความพยายามของพวกเขา"
 edict_cybernetic_creed_construction_labor: "มหาชนผู้ตรากตรำ"
 edict_cybernetic_creed_construction_labor_desc: "พลังที่แท้จริงของเราอยู่ในหมู่ผู้ใช้แรงงาน หากเราไม่มีพลังมากพอจะยกพวกเขาขึ้น พวกเขาก็จะไม่มีพลังพอจะพาเราไปสู่อนาคต"
 edict_cybernetic_creed_general_edict: "บทเรียนแห่งความกลมเกลียว"
 edict_cybernetic_creed_general_edict_desc: "การรวมศาสนจักรเป็นหนึ่งนำมาซึ่งบทเรียนมากมาย มันทำให้ศรัทธาของเราแข็งแกร่งและลุ่มลึกยิ่งกว่าที่เคย"

 #Intro Events
 machine_age.2150.name: "เหล่าลัทธิ"
 machine_age.2150.desc: "ภายใต้การชี้นำของสิ่งศักดิ์สิทธิ์สู่หมู่ดาว ลัทธิต่างๆ ภายในศรัทธาของเราต่างคาดหวังจะมีอิทธิพลต่อรัฐบาลใหม่\n\nแต่ละลัทธิล้วนมีอำนาจชี้นำผู้ศรัทธาอย่างมาก เรียกร้องให้ยกระดับสมาชิกของตนขึ้นสู่ตำแหน่งทรงอิทธิพล พร้อมเติมเต็มความต้องการทางจิตวิญญาณเฉพาะของตน\n\nมีเพียงเวลาเท่านั้นที่จะบอกได้ว่าแรงกดดันอันหลากหลายเหล่านี้จะพาเราเข้าใกล้ความศักดิ์สิทธิ์มากขึ้น หรือจะผลักเราสู่ความโกลาหล"
 machine_age.2150.a: "หวังว่าพวกเขาจะช่วยได้"
 machine_age.2150.a.tooltip: "§Yกลุ่มการเมืองที่ก่อตัวขึ้น§!:\n- $cyber_creed_labor$\n- $cyber_creed_war$\n- $cyber_creed_research$\n- $cyber_creed_construction$"
