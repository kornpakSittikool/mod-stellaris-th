 cyber_creed_displease_construction: "สิ่งนี้จะทำให้ลัทธิ §Y$cyber_creed_construction$§! ไม่พอใจ\nสิ่งนี้จะทำให้ลัทธิอื่นทั้งหมดพึงพอใจ"
 cyber_creed_please_research: "สิ่งนี้จะทำให้ลัทธิ §Y$cyber_creed_research$§! พึงพอใจ\nสิ่งนี้จะทำให้ลัทธิอื่นทั้งหมดไม่พอใจ"
