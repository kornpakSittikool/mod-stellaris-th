 machine_age.1070.k.tooltip: "$machine_age.1070.intro$ ให้กับการประดิษฐ์สินค้าชั้นดี"
 machine_age.1075.name: "เลือดและวงจร"
 machine_age.1075.desc: "เวลาสำหรับการหลอมรวมศักดิ์สิทธิ์มาถึงเราในที่สุดแล้ว\n\nถึงเวลาแล้วที่เราจะสร้าง §Y$building_augmentation_center$วินาที§! อันศักดิ์สิทธิ์บนโลกของเรา และกระบวนการก็จะเริ่มต้นได้"
 machine_age.1075.a: "$machine_age.1090.pray$"
 machine_age.1075.a.tooltip: "การเสริมแต่งไซเบอร์เนติกเต็มรูปแบบสำหรับผู้ศรัทธาได้เริ่มขึ้นแล้ว การดำเนินการอื่นทั้งหมดของสภาจะหยุดลงจนกว่าการหลอมรวมศักดิ์สิทธิ์จะเสร็จสมบูรณ์\n\n§Rต้องดำเนินการ:§!\nสร้าง $building_augmentation_center$ เพื่อดำเนินสถานการณ์ §Y$situation_cybernetic_creed_cyberization$§! ต่อ"
 machine_age.1090.name: "อนาคตของเนื้อหนัง"
 machine_age.1090.desc: "เมื่อเราเดินทางศักดิ์สิทธิ์นี้จนถึงปลายทาง ในที่สุดภาชนะของเราก็บรรลุการหลอมรวมอันศักดิ์สิทธิ์ระหว่างจักรกลและ [Owner.Species.GetFleshTypeCyberCreed] ขั้นสุดท้ายหนึ่งเดียวสำหรับผู้ศรัทธาคือการติดตั้งส่วนเสริมอันศักดิ์สิทธิ์"
 machine_age.1090.construction: "$machine_age.1090.desc$ §Y$CYBERCREED_construction$§! เรียกร้องให้ร่างกายของเรากลายเป็นเครื่องมือแห่งสิ่งศักดิ์สิทธิ์\n\n$machine_age.govswapnotice$\n\n$machine_age.1090.pray$"
 machine_age.1090.war: "$machine_age.1090.desc$ §Y$CYBERCREED_war$§! เรียกร้องให้ผู้ศรัทธาถูกหล่อหลอมเป็นอาวุธศักดิ์สิทธิ์\n\n$machine_age.govswapnotice$\n\n$machine_age.1090.pray$"
 machine_age.1090.research: "$machine_age.1090.desc$ §Y$CYBERCREED_research$§! จะไขความลับแห่งจักรวาลด้วยประชากรที่มีจิตเชื่อมต่อเป็นเครือข่าย\n\n$machine_age.govswapnotice$\n\n$machine_age.1090.pray$"
 machine_age.1090.labor: "$machine_age.1090.desc$ §Y$CYBERCREED_labor$§! สัญญาว่าจะทำให้ชามอาหารและคลังสินค้าของเราเต็มอยู่เสมอ\n\n$machine_age.govswapnotice$\n\n$machine_age.1090.pray$"
