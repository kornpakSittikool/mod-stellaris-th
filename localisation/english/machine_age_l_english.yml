 machine_age.2205.name: "การเขียนประวัติศาสตร์ใหม่"
 machine_age.2205.desc: "ไม่นานมานี้ §Yอัศวิน แห่ง เหล็ก กล้า§! ได้เริ่มรณรงค์ให้แบนตัวอย่างความพ่ายแพ้ทางทหารทั้งหมดออกจากบันทึกประวัติศาสตร์และบันทึกศรัทธาของเรา\n\nลัทธินี้อ้างว่าข้อมูลดังกล่าวบั่นทอนขวัญกำลังใจของผู้รับราชการทหารและทำให้การสนับสนุนจากสาธารณะอ่อนแอลง ฝ่ายนักประวัติศาสตร์ของเราปฏิเสธความคิดนี้และเตือนเราว่าผู้ที่ไม่เรียนรู้จากประวัติศาสตร์ย่อมถูกลิขิตให้ทำผิดซ้ำ\n\nเราควรยอมรับมุมมองด้านบวกต่ออดีตของพวกเขาหรือไม่?"
 machine_age.2205.a: "หากต้องการมีชัย เราต้องคิดอย่างผู้มีชัย"
 machine_age.2205.a.tooltip: "$cyber_creed_please_war$"
 machine_age.2205.b: "ยอมรับไม่ได้ เราต้องเรียนรู้จากความผิดพลาด"
 machine_age.2205.b.tooltip: "$cyber_creed_displease_war$"
 machine_age.2210.name: "เปลวไฟดับลงแล้ว"
 machine_age.2210.desc: "ช่างตีเหล็กสูงสุด ผู้นำของ §Yสาวก ของ แฮม เม อร์§! ได้เสียชีวิตลงอย่างกะทันหัน\n\nแม้จะเป็นที่รู้จักในด้านท่าทีตรงไปตรงมาและความเห็นอันเด็ดขาด แต่พวกเขาก็มีผู้ติดตามแบบบูชาตัวบุคคลมากมายในหมู่สมาชิกของลัทธิ ภราดรภาพจึงขอให้มีพิธีศพของรัฐอย่างเป็นทางการให้แก่พวกเขา ซึ่งโดยปกติแล้วเป็นเกียรติที่สงวนไว้สำหรับผู้นำที่เรารักยิ่งที่สุด\n\nไม่น่าแปลกใจที่ลัทธิอื่นๆ เรียกร้องให้รัฐไม่ควรเข้าไปมีส่วนเกี่ยวข้องกับการฝังศพของผู้นำทางจิตวิญญาณผู้พูดจาแข็งกร้าวคนนี้\n\nเราควรตอบสนองต่อข้อเรียกร้องของลัทธิเหล่านี้อย่างไร?"
 machine_age.2210.a: "ดำเนินพิธีศพต่อไป"
 machine_age.2210.a.tooltip: "$cyber_creed_please_construction$"
 machine_age.2210.b: "ไม่คุ้มที่จะทำให้ลัทธิอื่นไม่พอใจ"
 machine_age.2210.b.tooltip: "$cyber_creed_displease_construction$"
 machine_age.2215.name: "โบราณวัตถุอื้อฉาว"
 machine_age.2215.desc: "ไม่นานมานี้ ทีมโบราณคดีค้นพบสถานที่ทางศาสนาโบราณแห่งหนึ่ง การมีอยู่ของมันเคยถูกมองว่าเป็นเพียงตำนาน และบัดนี้ก็ได้บีบให้เราต้องแก้ไขบันทึกประวัติศาสตร์ศรัทธาของเราบางส่วนแล้ว\n\nสิ่งที่น่าประหลาดใจที่สุดคือ โบราณวัตถุทางประวัติศาสตร์จำนวนมากที่ขุดพบ มีสัญลักษณ์ของ §Yคอม มิ ว ตัน§! อย่างชัดเจน ข้อมูลนี้จะพิสูจน์ว่าชุมชนแรงงานคือการตีความดั้งเดิมของศาสนาของเรา ซึ่งเป็นประเด็นที่ถกเถียงกันอย่างหนักในศรัทธานี้\n\nการยอมรับการเปิดเผยนี้อย่างเป็นทางการจะทำให้ §Yคอม มิ ว ตัน§! พึงพอใจ แต่การนิ่งเงียบอย่างมีกลยุทธ์จะทำให้ลัทธิอื่นๆ พอใจมากกว่า"
 machine_age.2215.a: "เราต้องไม่กลัวความจริง"
 machine_age.2215.a.tooltip: "$cyber_creed_please_labor$"
 machine_age.2215.b: "มันถูกฝังไว้ด้วยเหตุผล จงเมินมันเสีย"
 machine_age.2215.b.tooltip: "$cyber_creed_displease_labor$"
 machine_age.2221.name: "สายลับแฝงตัวของลัทธิ"
 machine_age.2221.desc: "เราได้ค้นพบว่า §Y[cyber_creed_undercover_leader.GetName]§! มีสายสัมพันธ์ลึกซึ้งกับ §Y[GetCyberCreed]§! และได้ทั้งยักยอกงบประมาณรวมถึงโยกโครงการต่างๆ ไปอยู่ในขอบเขตอิทธิพลของลัทธินั้น\n\nลัทธิอื่นๆ โกรธแค้นอย่างยิ่งที่การใช้อำนาจในทางที่ผิดอย่างโจ่งแจ้งเช่นนี้เกิดขึ้นภายใต้การบริหารชุดปัจจุบัน และเรียกร้องให้ถอด §Y[cyber_creed_undercover_leader.GetName]§! ออกจากอำนาจในทันที\n\nเราควรจัดการกับผู้นำที่หลงทางคนนี้อย่างไร?"
 machine_age.2221.a: "ปลด [cyber_creed_undercover_leader.GetHerHim] ออกจากตำแหน่ง"
 machine_age.2221.a.tooltip: "[cyber_creed_undercover_leader.GetName] ถูกถอดจากอำนาจ"
 machine_age.2221.b: "ความดีที่ [cyber_creed_undercover_leader.GetSheHe] [cyber_creed_undercover_leader.GetHasHave] ทำไว้มีน้ำหนักมากกว่าความผิดครั้งนี้"
 machine_age.2225.name: "งานชุมนุมแห่งค้อน"
 machine_age.2225.desc: "การจาริกแสวงบุญประจำวาระของ §Yสาวก ของ แฮม เม อร์§! กำลังจะเริ่มต้นขึ้น และผู้ปฏิบัติจำนวนนับไม่ถ้วนจะเดินทางจากโรงหลอมท้องถิ่นของตนไปยัง §Y$building_forge_of_the_fellowship$§! ที่เมืองหลวง\n\nตามธรรมเนียมแล้ว เหตุการณ์นี้ก่อปัญหาด้านลอจิสติกส์นับไม่ถ้วน และมักจบลงด้วยการปะทุของความรุนแรง เมื่อภราดรภาพปะทะกับผู้ปฏิบัติจากลัทธิอื่นในที่สุด\n\nมีเสียงเรียกร้องจากลัทธิอื่นๆ และผู้ที่อาศัยอยู่ในเมืองหลวงให้ยุติธรรมเนียมปฏิบัตินี้"
 machine_age.2225.a: "ห้ามการจาริกนี้เสียทีเดียว"
 machine_age.2225.a.tooltip: "$cyber_creed_displease_construction$"
 machine_age.2225.b: "เสรีภาพทางศาสนาเป็นสิทธิ"
 machine_age.2225.b.tooltip: "$cyber_creed_please_construction$"
 machine_age.2230.name: "คำกล่าวอ้างเรื่องเทคโนโลยีต่ำ"
 machine_age.2230.desc: "เมื่อไม่นานมานี้ ผู้นำของ §Yผู้ แต่ง เพลง แห่ง จิตใจ§! หรือมหาคณาจารย์นักขับขาน ได้ออกมาพูดต่อสาธารณะอย่างตรงไปตรงมาว่าผู้ศรัทธาของเรายังไม่ให้ความสำคัญกับงบวิจัยมากพอ\n\nคาดกันว่านี่เป็นกลยุทธ์เพื่อให้เงินทุนไหลไปยังสมาชิกของลัทธิพวกเขามากขึ้น การยอมตามข้อเรียกร้องอาจถูกมองว่าเราให้สิทธิพิเศษแก่ §Yผู้ แต่ง เพลง แห่ง จิตใจ§!\n\nเราควรเพิ่มงบประมาณวิทยาศาสตร์หรือไม่?"
 machine_age.2230.a: "ปล่อยให้นักขับขานร้องไปจนหมดเสียง"
 machine_age.2230.a.tooltip: "$cyber_creed_displease_research$"
 machine_age.2230.b: "เพิ่มงบประมาณพอประมาณจนกว่าเรื่องนี้จะซาลง"
 machine_age.2230.b.tooltip: "$cyber_creed_please_research$"
 machine_age.2230.c: "เราจะเพิ่มงบประมาณอย่างมาก"
 machine_age.2230.c.tooltip: "$cyber_creed_please_research$"

 cyber_creed_history_rewritten: "ประวัติศาสตร์ถูกเขียนใหม่"
 cyber_creed_history_rewritten_desc: "เราได้ลบการอ้างอิงถึงความพ่ายแพ้ทางทหารทั้งหมดออกจากบันทึกของเรา ทำให้นักประวัติศาสตร์ไม่พอใจอย่างยิ่ง"
 cyber_creed_history_repeating: "ประวัติศาสตร์ซ้ำรอย"
 cyber_creed_history_repeating_desc: "เราคงการอ้างอิงถึงความพ่ายแพ้ทางทหารทั้งหมดไว้ในบันทึก ทางเลือกนี้ทำให้อัศวินแห่งเหล็กกล้าไม่พอใจ"
 cyber_creed_no_choirmaster_funding: "เมินเฉยหัวหน้าคณะนักขับขาน"
 cyber_creed_no_choirmaster_funding_desc: "เราเพิกเฉยต่อคำเรียกร้องของคณะนักขับขานแห่งจิตใจที่ต้องการเพิ่มงบวิทยาศาสตร์"
