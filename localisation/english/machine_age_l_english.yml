 situation_synthetic_fertility_approach_unity_low: "ออกแบบในโลกเสมือน"
 situation_synthetic_fertility_approach_unity_low_desc: "เราจะมอบพลังงานให้ตัวตนดิจิทัลที่เก่งที่สุดของเราเพิ่มขึ้น เพื่อทำงานแก้ปัญหาร่างสังเคราะห์"
 situation_synthetic_fertility_approach_unity_high: "มาตรการฉุกเฉิน"
 situation_synthetic_fertility_approach_unity_high_desc: "แหล่งพลังงานหลักจะถูกเบนไปให้ตัวตนดิจิทัล เพื่อการทดแทนร่างกายของทั้งสายพันธุ์อย่างสมบูรณ์"
 situation_synthetic_fertility_complete: "เมื่อถึงจุดนี้ ร่างกายทางกายภาพของเราจะดับสูญไปแล้ว ประชากรของเราจะถูกแปลงเป็นดิจิทัลทั้งหมด"
 stage_synthetic_fertility_problem_effects: "เพื่อคงตัวตนทางกายภาพไว้ในโลกนี้ เราต้องพัฒนาร่างสังเคราะห์ล้ำสมัยพร้อมสมองโพซิตรอนิกที่ซับซ้อน"
