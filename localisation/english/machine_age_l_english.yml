 concept_genesis_guides_civics_desc: "คุณสมบัติพลเมือง $concept_genesis_guides_civics$ ประกอบด้วย \n- ['civic:civic_guided_sapience']$NEW_LINE$- ['civic:civic_corporate_guided_sapience']$NEW_LINE$- ['civic:civic_hive_guided_sapience']$NEW_LINE$- ['civic:civic_machine_guided_sapience']"

