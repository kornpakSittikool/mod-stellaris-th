 START_SCREEN_ARC_WELDERS_NOMADIC: "กองเรือของเราไม่เคยถูกผูกไว้กับโลกเดียว แต่ความร่ํารวยของระบบนี้ รับประกันการติดตั้งถาวรมากขึ้น เดอะ$tech_orbital_arc_furnace$คํา ตอบ ของ เรา คือ ความ สําเร็จ ทาง วิศวกรรม ที่ เปลี่ยน ความ โกรธ ของ โลก หล่อ ให้ กลาย เป็น ผล ผลิต ทาง วัตถุ. การ เพิ่ม พูน ความ สามารถ ให้ เต็ม ที่ จะ เป็น สิ่ง สําคัญ ยิ่ง เพื่อ เป็น เชื้อ เพลิง สําหรับ การ ขยาย ตัว ของ เรา.\n\nแต่มีเพียงระบบเดียวที่สามารถนําเสนอได้ ที่อื่น ๆ ในกาแล็กซี่, โลกหล่ออื่น ๆ อาจจะยังรอการหากิน, และความต้องการมีประสิทธิภาพ\n\nกาแล็คซี่เป็นกระดานร่างของเรา และมันถึงเวลาแล้วที่จะได้ทํางาน"
