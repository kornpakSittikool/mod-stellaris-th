 EMPIRE_DESIGN_LACERTAN_TECHNO_PROTECTORATE: "Lacertan Techno-Protectorate"
 EMPIRE_DESIGN_lacertan_techno_protectorate_desc: "วัฒนธรรมของลาเซอแทนมีอยู่ ณ จุดตัดระหว่างปรัชญาและวิทยาศาสตร์ สําหรับภาษาลาเซอร์แทนการแสวงหาสูงสุดคือการแสดงออกของตัวตนที่แท้จริง ความหมายที่แท้จริงคือ \"แสดง\" ใจคืออะไร? การ เปรียบ เทียบ แบบ ไม่ มี ตัว ตน คํา ถาม ดัง กล่าว มี อิทธิพล เหนือ ประเพณี ของ ลา เซอ ตัน.\n\nด้วย การ เริ่ม ต้น ของ ความ เป็น จริง ที่ ไม่ เหมือน ใคร และ การ ค้น พบ อัน น่า ทึ่ง ใน ด้าน เชาวน์ ปัญญา แบบ ประดิษฐ์ ชาว ลา เซอ ตอง ได้ พบ พรม แดน ใหม่ สําหรับ การ แสดง ออก ทาง ศิลปะ และ เทคโนโลยี ของ พวก เขา. โลกเสมือนกลายเป็นผ้าใบ สําหรับโครงการที่ทะเยอทะยานที่สุดของพวกเขา เปิดโอกาสให้ประสบการณ์อันน่าสะพรึงกลัว\n\nจากนั้นก็มางานวันส่งท้าย เนื่อง จาก ป่วย เป็น โรค ทาง พันธุกรรม ที่ รักษา ไม่ ได้ และ ไม่ สามารถ ก่อ ให้ เกิด ขึ้น ได้ ตาม ธรรมชาติ ชาว ลา เซอ ตอง ต้อง ไว้ วางใจ ใน ความ รอด แบบ ดิจิตอล. การเปลี่ยนแปลงของการดํารงอยู่แบบดิจิตอล ไม่ใช่แค่การเรียกร้องเพื่อความอยู่รอด แต่เป็นโอกาสใหม่สําหรับวัฒนธรรมลาเซอแทน ภาย ใน ดิน แดน ดิจิตอล ชาว ลา เซอ ทาน ยัง คง สงสัย ความ หมาย ของ การ ดํารง อยู่ ของ พวก เขา ต่อ ไป แม้ ขณะ ที่ พวก เขา วิ่ง แข่ง เพื่อ รักษา อนาคต ไว้."
