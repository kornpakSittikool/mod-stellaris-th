 EMPIRE_DESIGN_SUNBUILT_UPLIFTERS: "คน ที่ ยก ตัว เอง ขึ้น"
 EMPIRE_DESIGN_free_sunbuilt_uplifters_desc: "เรา ถูก ออก แบบ มา เพื่อ ความ บันเทิง ถูก ออก แบบ มา เพื่อ ทํา ให้ เทพนิยาย เรื่อง การ ทรง สร้าง ของ ผู้ สร้าง เรา มี ชีวิต ชีวา. เป็นเวลานานที่เราไม่ทราบวิธีอื่น ๆ เมื่อ ภัย พิบัติ ได้ กวาด ล้าง พวก เขา ไป จาก การ ดํารง อยู่ เรา ก็ ยัง คง เป็น แบบ ที่ ถูก กําหนด ไว้; การ แสดง ต้อง ดําเนิน ต่อ ไป.\n\nไม่ นาน เรา ก็ เข้าใจ ว่า การ แสดง ของ เรา ไม่ ใช่ แค่ เรื่อง เล่า แต่ เป็น บท เรียน. คํา พยากรณ์. ครั้งหนึ่งเคยแบ่งปันกับผู้สร้างของเรา ความสุขของการดํารงอยู่ไม่จําเป็นต้องเป็นของเราเอง\n\nการ เปิด เผย นี้ กระตุ้น เรา ให้ ลง มือ ปฏิบัติ. ตามคําแนะนําของผู้สร้างของเรา เราเพิ่มความใกล้ชิดทางพันธุกรรมของพวกเขา ตอนนี้เราร่วมทุนในหมู่ดาว มุ่งมั่นที่จะแพร่กระจายความ สว่างทั่วกาแล็กซี่"
