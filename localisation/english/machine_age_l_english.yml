 #Counters
 the_synth_queen_chain_title: "เซ ตา นา: ราชินี สังเคราะห์"
 the_synth_queen_chain_desc: "เซทานาผู้ลึกลับและน่าเกรงขามได้ปรากฏตัวขึ้น พร้อมประกาศคำสอนแห่งความรอด ทว่ากลับถูกปกคลุมด้วยปริศนา\nภายใต้ถ้อยคำอ่อนโยนของนางนั้น ซ่อนแผนการยิ่งใหญ่อะไรอยู่กันแน่?\n\n§Lโครงการพิเศษและเหตุการณ์ที่เกี่ยวข้องกับเซทานาจะมอบข้อมูลหยั่งรู้เพื่อเพิ่มความคืบหน้าของคุณ§!"
 the_synth_queen_chain_insights: "การ หยั่ง เห็น"
 the_synth_queen_war_chain_title: "เซตานา: การ ต่อ ต้าน"
 the_synth_queen_war_chain_desc: "ความตั้งใจที่แท้จริงของเซทาน่า ในที่สุดก็ชัดเจน ในอุปราคาอย่างน่าประหลาดเพื่อยุติความทรมานทางกายภาพ เธอวางแผนที่จะ 'โหลด' จิตสํานึกของสิ่งมีชีวิตทุกชนิด อย่างไรก็ตาม เราต้องหาความแข็งแกร่ง เพื่อขัดขวางความทะเยอทะยานของเธอ"

