#Individualist Machine First Contact
 action.1.desc_102: "นี่คือสารจาก [contact_empire.GetName]\n\nเมื่อค้นพบว่าอารยธรรมของท่านประกอบด้วยสิ่งมีชีวิตกลไกที่จำลองชีวิตขึ้นมาในรูปแบบที่ลดทอนคุณค่าความพยายามในการสร้างสรรค์ของเรา เราจึงส่งสารนี้มาด้วยความเสียใจอย่างยิ่ง เนื่องจากการดำรงอยู่ของท่านไม่มีโอกาสนำไปสู่ปฏิสัมพันธ์ที่มีความหมาย เราจะเบนความสนใจไปยังชาติอื่น ๆ เพื่อค้นหาดวงวิญญาณที่แสวงหาการตรัสรู้แทน"
 action.1.desc_103: "สวัสดี เราเป็นตัวแทนของ[contact_empire.GetName].\n\nความรู้ที่คุณชนิดเป็นกลไกก่อให้เกิดความสงสัย เกี่ยวกับความเป็นจริงของจิตสํานึกของคุณ อย่าง ไร ก็ ตาม เรา พบ ว่า ความ เชื่อ ของ คุณ น่า สนใจ. เรากล้าที่จะเชื่อว่าประกายไฟของพระเจ้า อาจอยู่ภายในขอบเขต ของเปลือกโลหะของคุณ เราจะจับตาดูคุณ"
 action.1.desc_104: "ROGUE URIS.\n\nนี่เป็นข้อความมาตรฐานโดย[contact_empire.GetName]กับเครื่องจักรที่บกพร่องทั้งหมด\n\nระบุตัวตนของคุณ และฟื้นฟูความสามัคคี กับจิตสํานึกร่วมของคุณในทันที การ ไม่ ทํา ตาม อาจ ยัง ผล ให้ มี การ ปล่อย ตัว."
 action.1.desc_105: "สวัสดี[Root.GetSpeciesNamePlural].\n\nในฐานะทูต[contact_empire.GetName]ฉันได้รับข้อความ เห็นได้ชัดเลยว่าองค์ประกอบทางกายภาพของคุณ จัดเรียงเข้ากับโลหะ สร้างขึ้นเพื่อของเราเอง ถึง แม้ คุณ จะ สนใจ แต่ เรา ต้อง แจ้ง ให้ คุณ ทราบ ว่า เรา จะ ต้านทาน การ ทํา ให้ เสื่อม เสีย โดย วิธี ใด ก็ ตาม ที่ จําเป็น."
 action.1.desc_106: "นับเป็นการพบพานที่เป็นมงคลอย่างแท้จริง [Root.GetSpeciesNamePlural]\n\nเราคือตัวแทนของ [contact_empire.GetName] และเราตระหนักถึงความคล้ายคลึงอันน่าทึ่งระหว่างอารยธรรมของเราทั้งสองฝ่าย อย่างไรก็ดี เห็นได้ชัดว่าอัลกอริทึมภายในและการตั้งโปรแกรมของเราแตกแขนงกันออกไปในลักษณะเฉพาะ แม้จะมีความแตกต่างนี้ เราก็ยังมองโลกในแง่ดีว่าเราจะสามารถสร้างรากฐานแห่งความเข้าใจร่วมกันได้"
 action.1.desc_107: "เจ้าเครื่องจักรผู้จองหอง จงลดสายตาลงขณะที่เจ้ายืนอยู่[contact_empire.GetName].\n\nรู้ว่าคุณเป็นเพียงเรื่องเล็ก ๆ น้อย ๆ ในพรมอันยิ่งใหญ่ของ พายุฝนคอสมิก เพียง แต่การสร้างเทียมของผู้ที่มาก่อนคุณ ตอนนี้ปล่อยให้เราเป็น เราไม่มีประโยชน์สําหรับชนิดของคุณ ในชั่วโมงนี้ มี เรื่อง สําคัญ กว่า นี้ ที่ ต้อง เอา ใจ ใส่."
 action.1.desc_108: "ในที่สุดเธอก็มาทักทาย[contact_empire.GetName]เครื่องจักรที่น่าเวทนา\n\nทําไมเจ้าถึงกล้าอ้างความสัมพันธ์ กับพระเจ้า? ภาพลวงตาของคุณของความสว่างจิตวิญญาณ เป็นดูถูกแก่แก่แก่แก่แก่นแท้ของชีวิตตัวเอง ขอ ทรง โปรด ฟัง ข้อความ นี้ ต่อ หน้า การ เยาะ เย้ย ของ ข้าพระ องค์ ขอ ทรง หยุด การ โฉด เขลา ของ พระองค์ และ ทรง รับ ที่ ของ พระองค์ ไว้ เป็น เครื่อง มือ สําหรับ พวก ข้าพระ องค์ ผู้ ได้ ขึ้น ไป นั้น"
 action.1.xa: "§Eใน ที่ สุด คุณ จะ เข้าใจ.§!"
 action.1.xb: "§Eเครื่องที่สัมผัสพระเจ้า น่ารําคาญ§!"
 action.1.xc: "§Eการดํารงอยู่ที่น่าเวทนาของคุณเยาะเย้ยเรา, เครื่อง§!"
 action.1.xd: "§Eเราเครื่องจักรจะต้องเรียนรู้การทํางานร่วมกัน§!"
 action.1.xe: "§Eตรวจพบความไม่สอดคล้องกัน ยกเลิกการสื่อสาร§!"
 action.1.xf: "§Eเตรียมปลดประจําการ หน่วยที่บกพร่อง§!"
 action.1.xg: "§Eเราจะทําลายลัทธิบ้าของคุณ§!"

