 #Player Facing Situation
 situation_synth_queen_player_facing: "เซทาน่า:ราชินีสังเคราะห์"
 situation_synth_queen_player_facing_type: "ราชินีสังเคราะห์"
 situation_synth_queen_player_facing_desc: "เซตานาผู้ลึกลับและน่าเกรงขามได้ปรากฏตัวขึ้น พร้อมเทศนาเรื่องความรอด แต่ก็ยังถูกปกคลุมไว้ด้วยปริศนา\nแบบแผนอันยิ่งใหญ่ใดกันที่ซ่อนอยู่ใต้ถ้อยคำอ่อนโยนของเธอ?\n\n§Lโปรเจกต์พิเศษและอีเวนต์ที่เกี่ยวข้องกับเซตานาจะเพิ่มความคืบหน้าและทำให้สถานการณ์นี้สิ้นสุดลง§!"
 situation_synth_queen_player_facing_monthly_change_tooltip: "§Yสถานการณ์§! นี้จะคืบหน้าไปเมื่อเราทำภารกิจและสืบสวนเซตานาสำเร็จ"
 situation_synth_queen_player_facing_complete: "เราต้องเปิดเผยเป้าหมายที่แท้จริงของเซตานา"
 situation_synth_queen_player_facing_declare_war: "£trigger_no£ ประกาศสงครามกับเซตานา"

 #Approaches
 situation_synth_queen_balanced_approach: "เฝ้าสังเกตอย่างสมดุล"
 situation_synth_queen_balanced_approach_tooltip: "เมื่อมีสิ่งที่ยังไม่รู้มากมาย การรักษาเสถียรภาพและความสงบนิ่งอาจเป็นแนวทางที่ฉลาดที่สุด"
 situation_synth_queen_research_approach: "เร่งงานวิจัย"
 situation_synth_queen_research_approach_tooltip: "หากเราต้องการเรียนรู้ความจริงเกี่ยวกับแผนของเซตานาเราต้องพร้อมทุ่มทรัพยากรที่เหมาะสม"
 situation_synth_queen_spy_approach: "เร่งงานจารกรรม"
 situation_synth_queen_spy_approach_tooltip: "หากเราจะเปิดโปงแผนที่แท้จริงของเซตานาเราต้องทุ่มทรัพยากรเพิ่มเติมให้กับการจารกรรม"
 situation_synth_queen_military_approach: "เร่งกำลังทหาร"
 situation_synth_queen_military_approach_tooltip: "หากเราจริงจังกับการหยุดเซตานาเราต้องพัฒนากำลังทหารของเรา"

 #Modifiers
 queenslayer: "จุดอ่อนของเซตานา"
 queenslayer_desc: "เซตานาทรงพลัง แต่ไม่ใช่ผู้ไร้เทียมทาน เธอทำงานเป็นแบบแผนอันซับซ้อนที่เราสามารถถอดรหัสและคาดการณ์ได้"
 queenexecutioner: "เพชฌฆาตแห่งราชินีสังเคราะห์"
 queenexecutioner_desc: "เราได้เปิดเผยความลับของเทคโนโลยีเซตานาไปเกือบทั้งหมดแล้ว และพร้อมจะโจมตีแบบแผนของเธออย่างร้ายแรง"
 mod_damage_vs_country_type_awakened_synth_queen_mult: "ความเสียหายต่อเซตานาราชินีสังเคราะห์"

 #Player Facing Situation Events
 crisis.8999.name: "ราชินีกลับมาแล้ว"
 crisis.8999.desc: "วาระของเซตานาก่อให้เกิดความกังวลอย่างยิ่ง และการกระทำของเธอก็บ่งบอกว่ามีจุดมุ่งหมายที่ซ่อนอยู่\n\nเราต้องจัดสรรทรัพยากรเพื่อคลี่ปริศนาเจตนาที่แท้จริงของเธอ พร้อมกับหวังอย่างเปราะบางว่าการทำเช่นนั้นจะไม่ยั่วยุให้เธอหันมาเล่นงานเรา"
 crisis.8999.a: "เราจะหยุดเธอได้ไหม?"
 crisis.8999.a.tooltip: "การปรากฏตัวอย่างฉับพลันของเซตานาเป็นสถานการณ์เฉพาะตัวที่ต้องรับมือ"
 crisis.9000.name: "ตัดขาดการสื่อสาร"
 crisis.9000.desc: "เราค้นพบความถี่ที่ขบวนลำเลียงและสถานีของเซตานาใช้ส่งสัญญาณขอความช่วยเหลือแล้ว\n\nหากเราลงมืออย่างรวดเร็วและเด็ดขาด เราจะเปิดฉากบุกโจมตีได้โดยที่เธอไม่รู้เลยว่าเป็นฝีมือเรา แต่ชัยชนะของเราต้องแน่นอน มิฉะนั้นเราเสี่ยงจะดึงความกริ้วของเซตานาเข้ามา"
 crisis.9000.a: "ขบวนลำเลียงกำลังซ่อนอะไรอยู่?"
 crisis.9000.a.tooltip: "ชัยชนะเหนือขบวนลำเลียงและฐานปฏิบัติการของเซตานาจะไม่ก่อโทษด้านความเห็นกับเซตานาอีกต่อไป"
 crisis.9010.name: "ความก้าวหน้าครั้งสำคัญ"
 crisis.9010.desc: "จนถึงตอนนี้ เทคโนโลยีของเซตานาช่วยให้เธอตอบโต้การโจมตีทุกครั้งได้อย่างมีประสิทธิภาพ อย่างไรก็ตาม ความก้าวหน้าล่าสุดทำให้เราเข้าใจวิธีที่เธอป้องกันตนเองมากขึ้น เมื่อมีองค์ความรู้นี้อยู่ในมือ เราอาจมีโอกาสเอาชนะเธอได้\n\nการเปิดเผยเทคโนโลยีใหม่ที่เราค้นพบนั้นเป็นดาบสองคม แม้มันจะทำให้เราเข้าสู่ความขัดแย้งอย่างเปิดเผยกับราชินีที่เรียกตัวเองเช่นนั้นได้ แต่มันก็เผยให้เห็นอย่างชัดเจนเช่นกันว่าเราต่อต้านแผนของเธอ"
 crisis.9010.a: "เราต้องเตรียมตัว ทุกอย่างขึ้นอยู่กับสิ่งนี้"
 crisis.9010.a.tooltip: "การตัดสินใจเผชิญหน้ากับเซตานาอย่างเต็มรูปแบบใกล้มาถึงแล้ว การกระทำก้าวร้าวใด ๆ ไม่ว่าจะจากเราหรือจากเธอ จะเปิดเผยความจริงและฉุดเราลงสู่สงครามเบ็ดเสร็จ"

# Player Investigation events

 # Event chain
 the_synth_queen_history_chain_title: "เซทาน่า:ผู้รับใช้ของราชินี"
 the_synth_queen_history_chain_desc: "ทั่วทั้งดาราจักร ประภาคารลึกลับสว่างวาบขึ้น ส่งสัญญาณบอกตำแหน่งของพวกมันแก่ราชินีเซตานาราวกับว่ามีบางสิ่ง หรือใครบางคน กำลังรอการกลับมาของเธอ"
 synth_queen_history: "ตรวจสอบประภาคารแล้ว"

