#CYBORG
 trait_cyborg_stainless_steel_smile: "สิ่ง ที่ น่า ปรารถนา"
 trait_cyborg_stainless_steel_smile_desc: "สัตว์ ชนิด นี้ ชอบ แกะ สลัก ตาม ที่ กําหนด ไว้ หลัง จาก ส่วน ประกอบ ต่าง ๆ ใน ตลาด และ การ ทาสี เพื่อ ส่ง ผล กระทบ ต่อ สายตา มาก ที่ สุด. บางครั้งทางเลือกเดียวคือการแฟลชโครมที่"
 trait_cyborg_welded_countenance: "ความ อ ยุติธรรม"
 trait_cyborg_welded_countenance_desc: "ไซบอร์กเหล่านี้ใช้ชิ้นส่วนหยาบๆแต่ใช้งานได้ โดยพิจารณาเล็กน้อยสําหรับความงาม บางครั้งงานก็ต้องเสร็จ"
 trait_cyborg_apathy_loops: "ต้น ไม้"
 trait_cyborg_apathy_loops_desc: "การฝังตัวของไซบอร์กพวกนี้ หยาบและไม่แข็งแรง ส่งผลให้เกิดความระคายเคืองในลําไส้ และความผิดปกติปกติ ไม่เลวบนร่างกาย แต่แย่ที่ใจ"
 trait_cyborg_bionic_engineers: "เครื่องกลชีวภาพ"
 trait_cyborg_bionic_engineers_desc: "เครื่องมือที่ออกแบบล่วงหน้า และดัดแปลงต่อได้ถูกสร้างมาโดยเฉพาะ เพื่อช่วยงานวิศวกรรม"
 trait_cyborg_bionic_physicists: "นัก ฟิสิกส์ ชีวภาพ"
 trait_cyborg_bionic_physicists_desc: "การประมวลผลหลายโมดาล ที่มีการอนุมานสร้างการคํานวณฟิสิกส์บนแมลงวัน โดยไม่ต้องมีการเชื่อมต่อกับหน่วยคํานวณภายนอก"
 trait_cyborg_bionic_sociologists: "นัก สังคม วิทยา ชีวภาพ"
 trait_cyborg_bionic_sociologists_desc: "นักขับที่เห็นใจผู้อื่น และนักกายภาพพฤติกรรม เปิดเส้นทางที่รวดเร็ว ในการวิจัยทางสังคม"
 trait_cyborg_integrated_weaponry: "อุปกรณ์ที่ประมวลผลได้"
 trait_cyborg_integrated_weaponry_desc: "การใช้อาวุธกับแขนกลของไซเบอร์เนติก ให้อาวุธทันทีแก่กองทัพและเจ้าหน้าที่ที่บังคับใช้กฎหมายเช่นเดียวกัน"
 trait_cyborg_delicate_frames: "กรอบ"
 trait_cyborg_delicate_frames_desc: "ส่วนประกอบย่อยและการติดตั้ง ส่งผลให้ไซบอร์ก เปราะบาง การดําเนินงานพื้นฐานไม่ถูกทําลาย แต่ผู้ใช้ได้รับการแนะนําให้หลีกเลี่ยงสถานการณ์ ที่เป็นไปได้สูงของการบาดเจ็บทางกายภาพ"
 trait_cyborg_scarcity_algorithms: "อัลกอริธึม"
 trait_cyborg_scarcity_algorithms_desc: "การรู้ต้นทุนอย่างร้ายแรง ขัดขวางการเสี่ยงภัย และจึงปฏิเสธโอกาส"
 trait_cyborg_limited_memory: "หน่วยความจําจํากัด"
 trait_cyborg_limited_memory_desc: "หน่วยความจําที่ทํางานไม่เพียงพอมีขวดคอ ความสามารถในการเรียนรู้ปล่อยให้ผู้ใช้ไม่สามารถประมวลผล ทั้งหมดของประสบการณ์ของพวกเขา"
 trait_cyborg_climate_adjustment_dry: "ไม่ใช้เอฟเฟ็คต์"
 trait_cyborg_climate_adjustment_dry_desc: "การ ปรับ เปลี่ยน วิธี พูด เช่น การ นํา ของ เหลว และ การ ป้องกัน รังสี มา ใช้ นั้น สมบูรณ์ พร้อม สําหรับ การ คง ไว้ ซึ่ง ภูมิ อากาศ ที่ แห้ง แล้ง แต่ ไม่ เหมาะ กับ คน อื่น."
 trait_cyborg_climate_adjustment_dry_tt: "ความทึบแสง:§G+$@cyborg_hab_preference|0%$§!\n$t$- แกรนท์ถึง§G125%§!สภาพแวดล้อมบนดาวเคราะห์ที่มีสภาพอากาศแห้ง$TABBED_HIGH_HABITABILITY_EFFECTS_TT$"
 trait_cyborg_climate_adjustment_wet: "ม."
 trait_cyborg_climate_adjustment_wet_desc: "ฉนวนอย่างหนัก และการป้องกันจากสิ่งมีชีวิตต่างดาว เหมาะกับสภาพอากาศเปียกชื้น"
 trait_cyborg_climate_adjustment_wet_tt: "ความทึบแสง:§G+$@cyborg_hab_preference|0%$§!\n$t$- แกรนท์ถึง§G125%§!สภาพแวดล้อมบนดาวเคราะห์ที่มีสภาพอากาศเปียก$TABBED_HIGH_HABITABILITY_EFFECTS_TT$"
 trait_cyborg_climate_adjustment_cold: "มูล เหตุ ของ ความ หนาว"
 trait_cyborg_climate_adjustment_cold_desc: "ส่วนประกอบความร้อนที่เพิ่มขึ้น และสารหล่อลื่นที่มีน้ําค้างแข็งช่วย ในสภาพอากาศที่หนาวเย็น"
 trait_cyborg_climate_adjustment_cold_tt: "ความเย็น:§G+$@cyborg_hab_preference|0%$§!\n$t$- แกรนท์ถึง§G125%§!สภาพแวดล้อมบนดาวเคราะห์ที่มีสภาพอากาศหนาวเย็น$TABBED_HIGH_HABITABILITY_EFFECTS_TT$"
 trait_cyborg_mass_produced: "พืช ที่ ปลูก ใหม่"
 trait_cyborg_mass_produced_desc: "การ บังคับ ให้ มี การ ปรับ ตัว ให้ เข้า กับ ข้อ บังคับ ต่าง ๆ ใน การ ปลูก ฝัง ช่วย ลด ราคา ของ พลเมือง แรก เกิด ได้ มาก."
 trait_cyborg_propaganda_machines: "ตัวกรองความซับซ้อน"
 trait_cyborg_propaganda_machines_desc: "หน่วยวิเคราะห์สารสนเทศ สามารถกระตุ้นผู้ใช้ ที่การเริ่มใช้ยาระงับประสาท"

#MACHINE
 trait_robot_artificial_engineers: "แกนหลักวิศวกรรม"
 trait_robot_artificial_engineers_desc: "หลักหน่วยความจําที่ถูกตัดทอน และประมวลผลทรัพยากร สําหรับงานวิจัยเกี่ยวกับวิศวกรรม ช่วยให้การคํานวณและความเร็วในการเติมเต็มงานได้เร็วขึ้น"
 trait_robot_artificial_physicists: "แกนหลักฟิสิกส์"
 trait_robot_artificial_physicists_desc: "หน่วยประมวลผลและหน่วยความจําโอเวอร์อินสําหรับการวิจัยฟิสิกส์ ลดความพึ่งพาในการคํานวณภายนอก"
 trait_robot_artificial_sociologists: "แกนหลักสังคม"
 trait_robot_artificial_sociologists_desc: "หน่วยประมวลผลขั้นสูง มีอัลกอริทึมการวิจัยที่อุทิศตัว ให้กับสาขาต่างๆ และเรียกร้อง"
 trait_robot_integrated_weaponry: "การบูรณาการอาวุธ"
 trait_robot_integrated_weaponry_desc: "การบรรจุอาวุธสงครามภายในร่างกายจักรกล ให้ประสิทธิภาพในการดําเนินการอย่างมีนัยสําคัญ และเปลี่ยนทิศทางในสภาพแวดล้อมการต่อสู้"
 trait_robot_delicate_frames: "โครงสร้างละเอียดอ่อน"
 trait_robot_delicate_frames_desc: "สารประกอบและกระบวนการประกอบอวัยวะ ส่งผลให้ร่างกายเครื่องจักรเปราะบาง มี คํา แนะ นํา ให้ ลด อันตราย ทาง กาย เมื่อ เป็น ไป ได้."
 trait_robot_scarcity_algorithms: "ขาดแคลนรูทีนย่อย"
 trait_robot_scarcity_algorithms_desc: "ความร่ํารวยเป็นศูนย์กลางการเขียนโปรแกรมของพวกเขา การ ทํา เช่น นี้ มัก จะ แทรกซึม เข้า ไป ใน รูป แบบ พฤติกรรม ที่ ก่อ ผล เสีย หาย ซึ่ง จําเป็น ต่อ การ กระทํา ทาง การ ค้า ที่ เป็น ประโยชน์."

#Pre-Scripted Empires
 EMPIRE_DESIGN_BASIDRIX_CYBER_ECCLESIA: "เบสซิดทริกซ์ ผู้ประสานงานไซเบอร์"
 EMPIRE_DESIGN_basidrix_cyber_ecclesia_desc: "ในความกว้างอันศักดิ์สิทธิ์ของจักรวาล บาซิดทริกซ์ ไซเบอร์พีเซเซียเป็นพันธสัญญาเพื่อความเชื่อ โดย ได้ รับ การ ชี้ นํา จาก พระ บัญชา ของ พระเจ้า ผู้ ป่วย โรค นี้ สนับสนุน การ ผนวก ของ เนื้อ เยื่อ ที่ เป็น เส้นใย ด้วย ความ แม่นยํา ที่ เย็น ชา ของ โครม.\n\nเส้นทางนี้ยังไม่ได้พ้นจากการทดลอง นิกาย ต่าง ๆ มาก มาย ได้ ลุก ขึ้น และ ล่ม จม แต่ ละ นิกาย มี ความ เชื่อ มั่น อย่าง ไม่ สั่น คลอน ว่า ตน เท่า นั้น ที่ รู้ ความ จริง. ความ เชื่อ เช่น นั้น ไม่ อาจ ช่วย ได้ นอก จาก จุด ไฟ: ประวัติ ของ ผู้ รับ บัพ ติ สมา เป็น สิ่ง หนึ่ง ที่ เขียน ด้วย เลือด และ เหล็ก กล้า แตก. กระนั้น การ ต่อ สู้ นี้ เอง ที่ ก่อ ให้ เกิด ผู้ คน ที่ มี ความ เชื่อ มั่น อย่าง ไม่ สั่น คลอน.\n\nตอนนี้ ผู้สําเร็จการศึกษาได้เข้าสู่สนามกีฬาใหม่ การแผ่ขยายไม่มีที่สิ้นสุดของดาว การ ทดสอบ ความ เชื่อ หรือ โอกาส ที่ จะ ได้ รับ ความ รอด? ขณะ ที่ พวก เขา เสี่ยง ต่อ การ สูญ เปล่า นั้น ผู้ ซื่อ สัตย์ จะ แน่ ใจ ได้ เพียง สิ่ง เดียว:\n\nการฟิวส์เป็นของพระเจ้า แรงจูงใจคือการบูชา"
