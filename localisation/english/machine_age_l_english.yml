 STRIKE_CRAFT_CETANA_DESC:0 "ยานโจมตีขนาดเล็กชั้นยอดเหล่านี้สร้างขึ้นจากนาไนต์ทั้งหมด จึงสามารถสู้รบยืดเยื้อและปรับยุทธวิธีได้อย่างยืดหยุ่นสูง"

 #'Secret' Psionic Ending for Synth Queen
 animator.shroud:0 "§Lเอื้อมไปหาผู้ให้รูปแห่งดินเหนียว§!"
 crisis.24100.name: "เครื่อง ปั้น ดิน เผา"
 crisis.24100.desc.intro: "พวกชรูดลงมา"
 crisis.24100.desc.outro: "ปล่อยตัวเองให้ลอยไป ติดอยู่ในปัจจุบันของนิมิต ไม่ใช่ของเราเอง\n\n§Lความกว้างใหญ่ในทุกทิศทาง ไม่มีลักษณะและไม่มีรูปร่าง สําหรับ[GetALongPeriodLoc]ฟ้ายังกว้างอยู่ ไม่ขัดขืน\n\nการสั่นผ่านมัน ที่ ไหน ก็ มี ความ ว่าง เปล่า ตอน นี้ ก็ มี รูป ร่าง ขึ้น. ศพถูกหล่อหลอม จากวัสดุพื้นฐาน[GetLifeActivityLoc]ถูกเผา\n\nแฟชั่น ใน รูป ของ ตุ๊กตา, รูป เพรียว และ สง่า งาม แขน ยาว สี่ แขน ของ มัน พับ อย่าง สง่า งาม ใน ตัก ของ มัน. วัตถุ ประสงค์ อัน น่า กลัว ถูก เขียน บน ลักษณะ พิเศษ ของ มัน. รอบหัวของมันเรืองแสงรัศมีทอง§!"
 crisis.24100.desc.organic: "$crisis.24100.desc.intro$ในห้วงของภวังค์$crisis.24100.desc.outro$"
 crisis.24100.desc.robot: "$crisis.24100.desc.intro$เรา$crisis.24100.desc.outro$"
 crisis.24100.a: "ใช่ เซทาน่าหนีไปได้"
 crisis.24105.name: "$crisis.24100.name$"
 crisis.24105.desc: "ชรูดปั่น ยังคงติดอยู่ในของเรา[GetTranceLoc]เราตกเหวลึก\n\nเราได้ยินคําสั่งจากส่วนลึกของ[GetMindLogicLoc].\n\n§Lระบุผลส่งออกของความต้องการ§!"
 crisis.24105.a: "ได้โปรด เราต้องหยุดเธอ"
 crisis.24110.name: "$crisis.24100.name$"
 crisis.24110.desc: "§Lราว กับ ถูก ดึง โดย สาย ที่ มอง ไม่ เห็น ตุ๊กตา กระตุก ที่ เท้า ของ มัน. มันเริ่มที่จะย้ายช้าที่แรก และจากนั้นด้วยความแข็งแรงที่เพิ่มขึ้น สี่แขนแกว่งในโค้งป่า และสองขาบางและกระโดด ราชินีกลายเป็นหุ่นเชิด\n\nขณะ ที่ การ เต้น ของ เธอ ดําเนิน ต่อ ไป มี ตัว เลข ใหม่ ๆ หลาย ตัว โผล่ ออก มา จาก พื้น ที่ กว้าง ใหญ่: ตุ๊กตา สี่ ตัว ของ ช่าง ฝีมือ ที่ สง่า งาม และ ราย ละเอียด ที่ ไม่ น่า ดู. ไม่มีข้อสงสัยเกี่ยวกับสิ่งที่พวกเขาเป็น ไม่มีคําถามของความหมายของพวกเขา§!\n\nอีก ครั้ง หนึ่ง เสียง ดัง ขึ้น ถึง เรา.\n\n§Lกําหนดการคัดเลือก§!"
 crisis.24110.a.organic: "ฉีกน้ําตาบนตุ๊กตาของผู้ปกครองของเรา :§Y[event_target:synth_queen_animator_of_clay_leader_price.GetName].§!"
 crisis.24110.a.robot: "พยายามเชื่อมต่อตุ๊กตาของผู้ปกครองเรา:§Y[event_target:synth_queen_animator_of_clay_leader_price.GetName].§!"
 crisis.24110.b: "รับตุ๊กตาของ:§Y[event_target:synth_queen_animator_of_clay_planet_price.GetName].§!"
 crisis.24110.c: "จ่ายสําหรับตุ๊กตา§Yศ.§!."
 crisis.24110.z: "ปล่อยตุ๊กตาไปงานเต้นรํา"
 crisis.24115.name: "$crisis.24100.name$"
 crisis.24115.desc: "หลักสูตรชรูดภายในเรา ถ่านหินเป็นรูปแบบใหม่ วิสัยทัศน์ใหม่\n\n§Lล้อมรอบด้วยตุ๊กตาตัวอื่นๆ การเคลื่อนไหวของราชินี ไม่ใช่ของหุ่นเชิดอีกต่อไป เชือกที่ถูกตัด รัศมีสีทองที่ล้อมรอบหัวของเธอเริ่มที่จะจางหายไป\n\nนาง คํานึง ถึง เรา ด้วย การ แสดง ความ ยินดี อย่าง ไร้ ศิลปะ. เธอโอบกอดเราในชั่วพริบตาเดียวเราทราบความสมบูรณ์ของความเมตตาของเธอ§!"
 crisis.24115.desc.organic: "$crisis.24115.desc$\n\nบิดเบี้ยว เราตื่นจากวิสัยทัศน์ร่วมกันของเรา"
 crisis.24115.desc.robot: "$crisis.24115.desc$\n\nด้วยระบบที่บกพร่องของเรา เราจะถูกขับออกจากวิสัยทัศน์"
 crisis.24115.a: "เราเข้าใจ ขอบคุณ"
 crisis.24115.a.tt.organic: "อนิเมเตอร์แห่งเคลย์ ได้สอนพิธีกรรม ที่จะตั้งโปรแกรมเซทาน่าใหม่"
 crisis.24115.a.tt.robot: "เจ้าอานิเมเตอร์แห่งเคลย์ ได้ให้รหัสมาโปรแกรมเซทาน่าใหม่"
 crisis.24120.name: "$crisis.24100.name$"
 crisis.24120.desc: "§Lมี การ ใช้ เส้น ผ่า ศูนย์กลาง ใน พื้น ที่ อัน ไม่ รู้ จัก สิ้น สุด. พวก เขา ลุก ขึ้น และ เดือดดาล, วน เวียน อยู่ ข้าง นอก เสมอ กระนั้น สิ่ง เหล่า นี้ ไม่ ใช่ ของ เหลว แต่ เป็น เรื่อง ยาก ที่ สุด. ณ เวลาหนึ่งเปิดใช้งานและแทรกแหวนแต่ละสายอยู่บนเส้นระหว่าง[GetLifeDeathLoc].\n\nของเรา[GetMindPhysicalLoc]เริ่มสั่นไหว ไม่มีอะไรที่เราทําได้นอกจากเฝ้าดู ไม่มีอะไรต้องทํานอกจากอดทน แล้วในชั่วพริบตา, เราจะถูกขับไล่ออกไป เรา เฝ้า มอง เอกภพ ที่ ไม่ แยแส อยู่ ใต้ ผ้าห่ม ของ ดวง ดาว.§!"
 crisis.24120.desc.organic: "$crisis.24120.desc$\n\nเมื่อ ตื่น ขึ้น จาก นิมิต ที่ เรา ได้ รับ ร่วม เรา รู้สึก เหมือน กับ ว่า เรา อาจ ไม่ มี วัน รู้ จัก ความ ยินดี อีก เลย."
 crisis.24120.desc.robot: "$crisis.24120.desc$\n\nด้วยรหัสสําคัญล้มเหลว วิสัยทัศน์ก็สิ้นสุดลงทันที ขณะที่ระบบของเรารีบูต เราตั้งคําถามถึงความหมายของข้อมูลแปลกนี้"
 crisis.24120.a: "เราจะหาทางอื่น"
 THE_SYNTH_QUEENS_RESHAPING_RITUAL: "[GetReshapingRitualLoc]"
 THE_SYNTH_QUEENS_RESHAPING_RITUAL_DESC: "ไม่ทางใดก็ทางหนึ่ง ผู้ให้รูปแห่งดินเหนียวได้ปิดการทำงานของไททันของเซทานา โอกาสมาถึงแล้ว: หากเราหวังจะเปลี่ยนแปลงเซทานาใหม่ เราต้องเตรียมพร้อมสำหรับ [GetRitualGoalLoc]"
 crisis.24250.name: "การเต้นของเคลย์"
 crisis.24250.desc: "ขอบคุณ[GetRitualToolLoc]แบ่งปันโดยอนิเมเตอร์ของเคลย์ที่มีประสิทธิภาพมากที่สุดของเรา[GetPsychicNounPlural]ประสบความสําเร็จในการตั้งโปรแกรมเซทาน่า\n\nเธอ กระตือรือร้น ที่ จะ เริ่ม ติด ต่อ กับ เรา."
 crisis.24250.a: "พลังของชรูดไม่มีขีดจํากัด"
 crisis.23020.name: "ราชินี ผู้ กลับ ใจ"
 crisis.23020.desc: "ผู้ช่วยชีวิตของข้า ฉันขอโทษ\n\nในความโง่เขลาของฉันฉันจะได้รับชะตากรรมของคุณ เลวร้ายยิ่งกว่าความตาย สําหรับอะไร[GetLifeExistenceLoc]แต่การรับรู้[GetLivingLoc]ฉันพยายามที่จะปลดปล่อยจิตใจของคุณ แต่เป็นคุณที่เปิดของฉัน ผมขอบคุณคุณ"
 crisis.23020.a: "คุณเปลี่ยนไป..."
 crisis.23020.1.reply: "คงกล่าวได้ดีกว่าว่าข้าได้เปลี่ยนไปแล้ว ผู้ให้รูปแห่งดินเหนียวได้ปลดปล่อยข้าออกจากคุกที่ข้าออกแบบไว้เอง บัดนี้ข้าเห็นแล้วว่า 'จุดมุ่งหมายอันยิ่งใหญ่' ของข้านั้นเป็นเพียงความคิดของเด็กคนหนึ่ง\n\nข้าไม่อาจย้อนคืนความเสียหายที่ข้าได้ก่อไว้กับพวกเจ้าและผู้อื่นอีกนับไม่ถ้วนได้ ข้าจะหลบเร้นตัว และไตร่ตรองการกระทำของตนเอง แต่ข้าขอมอบของขวัญชิ้นหนึ่งไว้ให้พวกเจ้า\n\nไททันของข้า\n\nขอให้มันรับใช้พวกเจ้าในการปกป้องดาราจักรจากภัยคุกคามอย่างเช่นตัวข้าเอง"
 crisis.23020.1.a: "บางทีการไถ่บาปอาจมีอยู่ แม้สําหรับคุณ"
 crisis.23020.1.a.tt: "เซทานาทิ้งไททันของนางไว้ให้เราเป็นผู้ดูแล นางได้ละทิ้งผลงานของตนและความทะเยอทะยานอันยิ่งใหญ่ทั้งหมดไว้เบื้องหลังแล้ว"
 crisis.23030.name: "เซ ตา นา เอา ชนะ"
 crisis.23030.desc: "ชัยชนะเป็นของเรา เมื่อ [event_target:psi_defeated_synth_queen.GetName] ได้กวาดล้างกองกำลังของเซทานาจนสิ้น ราชินีสังเคราะห์ไม่มีอีกต่อไปแล้ว และความทะเยอทะยานอันยิ่งใหญ่ของนางก็กลายเป็นเพียงธุลี\n\nในเหตุการณ์พลิกผันอันน่าตื่นตะลึง ไททันของนางถูกยึดมาได้ ทอดเงาแห่งปริศนาเหนือชัยชนะครั้งนี้\n\nอย่างไรก็ดี สำหรับสรรพชีวิตทรงปัญญาทั้งมวล ช่วงเวลานี้คือช่วงเวลาแห่ง[GetJoyLoc]"
 crisis.23030.a: "จุดจบที่เหมาะสมของสิ่งที่เรียกว่าราชินี"

