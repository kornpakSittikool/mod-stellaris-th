 building_lathe_capital: "หน่วยประมวลผล"
 building_lathe_capital_desc: "ธรรมชาติเชิงควอนตัมของหน่วยประมวลผลในเครื่องกลึงไซแน็ปติก ทำให้มันสามารถกระจายการคำนวณแบบขนานข้ามหลายชั้นมิติได้"

 building_lathe_major_capital: "หน่วยประมวลผล: แบบขนาน"
 building_lathe_major_capital_desc: "หน่วยประมวลผลที่ปรับปรุงนี้สามารถดำเนินการแบบขนานได้ดียิ่งขึ้น ด้วยการสะท้อนก้องเงาความคิดของชิปประสาทกลับไปมาในโพรงแกมมาสเปซที่ถูกควบคุมไว้"

 building_lathe_super_capital: "หน่วยประมวลผล: แบบเวกเตอร์"
 building_lathe_super_capital_desc: "หน่วยประมวลผลที่อัปเกรดนี้ทำให้การคำนวณลื่นไหลขึ้นผ่านการสร้างเวกเตอร์เนื้อที่ลบ การแบ่งแยกกระบวนการออกเป็นช่องมิติเฉพาะเช่นนี้ให้ผลลัพธ์อันโดดเด่นทั้งด้านประสิทธิภาพและเสถียรภาพ"

 building_lathe_resonator: "เครื่องปรับระบบประสาท"
 building_lathe_resonator_desc: "เครื่องเรโซเนเตอร์ดึงศักยภาพทางความคิดจากความนึกคิดที่ล่องลอยและระบบอัตโนมัติมาใช้ แล้วเปลี่ยนเส้นทางมันใหม่ ทำให้ชิปแต่ละตัวช่วยเพิ่มประสิทธิภาพให้หน่วยประมวลผลข้างเคียงที่ใกล้ที่สุด"
 lathe_resonator_tt: "ผลผลิตของ §Y$job_neural_chip_plural$§!: §G+1%§! ต่อ §Y$job_neural_chip_plural$§!\n(ค่าปัจจุบัน: §G+[num_neural_chips]%§!)"

 building_lathe_stabilisator: "เครื่องทำให้ระบบประสาทคงที่"
 building_lathe_stabilisator_desc: "ระบบทำให้เสถียรจะกรองสัญญาณรบกวนทางการคำนวณที่เกิดขึ้นเมื่อความทุกข์ทรมานทางกายภาพครอบงำชิปประสาท การลดการรบกวนลงย่อมหมายถึงผลผลิตรวมที่สูงขึ้น"

 building_lathe_overclocker: "เครื่องโอเวอร์คล็อกระบบประสาท"
 building_lathe_overclocker_desc: "แท่นกลึงถูกออกแบบมาเพื่อคงสภาพชิปประสาทที่ติดตั้งอยู่ ให้พวกมันยังคงสร้างผลผลิตได้นานที่สุด เครื่องโอเวอร์คล็อกสามารถเขียนทับคำสั่งเหล่านี้ ทำให้ผลผลิตสูงขึ้นและเร็วขึ้น แต่ก็มาพร้อมอัตราความล้มเหลวที่มากขึ้น"

 building_lathe_preserver: "เครื่องป้องกันอันตรายกับระบบประสาท"
 building_lathe_preserver_desc: "องค์ประกอบอินทรีย์ของเครือข่ายเปราะบางต่อความผันผวนของพลังงานเป็นพิเศษ ซึ่งอาจทำให้แกนประสาทเสื่อมสภาพอย่างรวดเร็ว เครื่องคงสภาพพยายามลดความผันผวนเหล่านี้เพื่อปกป้องส่วนที่บอบบางกว่าของเครื่องกลึงไซแน็ปติก"

 building_lathe_reactor: "เครื่องปฏิกรณ์ที่ได้รับการขยาย"
 building_lathe_reactor_desc: "ยิ่งมีชิปเสียบเข้ากับเครือข่ายมากเท่าไร ก็ยิ่งต้องใช้พลังงานในการคงสภาพมันมากขึ้นเท่านั้น การติดตั้งเครื่องปฏิกรณ์เพิ่มเติมจะช่วยบรรเทาภาระด้านลอจิสติกส์อันซับซ้อนที่ติดมากับการจ่ายพลังงานให้เครื่องกลึงไซแน็ปติก"

 building_lathe_life_support: "เครื่องค้ำจุนระบบประสาท"
 building_lathe_life_support_desc: "สิ่งอำนวยความสะดวกเฉพาะทางทำหน้าที่ดูแลรักษาส่วนประกอบวิกฤตของแท่นกลึงอย่างเป็นระบบ ทำให้เราสามารถรองรับชิปได้มากขึ้นและคงสภาพแวดล้อมของเครือข่ายให้มีสุขภาวะดีกว่าเดิม"

 building_lathe_cogitator: "เครื่องคิดไตร่ตรองระบบประสาท"
 building_lathe_cogitator_desc: "การคำนวณเส้นทางส่งกำลังบำรุงผ่านไฮเปอร์สเปซเป็นเรื่องซับซ้อน การโอนกำลังประมวลผลบางส่วนมาช่วยงานนี้จะทำให้แม้แต่กองเรือที่ใหญ่ที่สุดก็สามารถรุกลึกเข้าไปในดินแดนศัตรูได้มากขึ้น"
 building_lathe_cogitator_tt: "§Yความจุของยานรบ§!: §G+1%§! ต่อ §Y$job_neural_chip_plural$§!\n(ค่าปัจจุบัน: §G+[num_neural_chips]%§!)\n§Yอัตราได้รับประสบการณ์ของยาน§!: §G+2%§! ต่อ §Y$job_neural_chip_plural$§!\n(ค่าปัจจุบัน: §G+[num_neural_chips_double]%§!)"

 building_lathe_validator: "เครื่องตรวจสอบระบบประสาท"
 building_lathe_validator_desc: "แม้หน้าที่หลักของฟังก์ชันเฉพาะทางในเครื่องตรวจสอบจะมีไว้เพื่อช่วยร่างทฤษฎีอนันต์ แต่มันก็สามารถประยุกต์ใช้กับงานประมวลผลด้านทั่วไปได้เช่นกัน"
 building_lathe_validator_tt: "$mod_category_computing_research_speed_mult$: §G+1%§! ต่อ §Y$job_neural_chip_plural$§!\n(ค่าปัจจุบัน: §G+[num_neural_chips]%§!)"

### Synaptic Lathe UI

 SYNAPTIC_LATHE_STABILITY_DESC: "§E$r_stability$ คือค่าที่ใช้วัดเสถียรภาพของเครือข่ายโดยรวมของเครื่องกลึงไซแน็ปติก โดยหลักแล้วมันขึ้นอยู่กับ £happiness£ §Yความพึงพอใจ§! โดยรวมของชิปประสาท\n\nเสถียรภาพอาจลดลงจากเงื่อนไขอย่าง £housing£ §Rความแออัดยัดเยียด§! และ £amenities£ §Rสาธารณูปโภคไม่เพียงพอ§! หาก $PLANET_STABILITY_TITLE$ สูง ผลผลิตทรัพยากรจะเพิ่มขึ้น แต่หากต่ำก็จะลดลง ต่างจากอาณานิคมอื่น เครื่องกลึงไซแน็ปติกจะไม่มีวันลุกลามไปสู่ §Yการกบฏ§! เต็มรูปแบบ§!"
 SYNAPTIC_LATHE_RESISTANCE_DESC: "§E§Yแรงต้าน§! คือค่าที่ใช้วัดระดับความปั่นป่วนโดยรวมซึ่งเกิดจากชิปประสาทนอกการควบคุม ระดับ £crime£ §Yแรงต้าน§! ที่สูงจะทำให้อัตรา §Yการลดลงของประชากร§! สูงขึ้นและเพิ่มโอกาสหลบหนีของพวกมัน สาเหตุพื้นฐานมาจากการมีประชากรดาวเคราะห์จำนวนมาก และสามารถลดได้โดยเพิ่ม £happiness£ §Yความพึงพอใจของประชากร§! หรือสร้าง £building£ §Yเครื่องทำให้ระบบประสาทคงที่§!§!"
 SYNAPTIC_LATHE_HOUSING_DESC: "§E§Y$PLANET_HOUSING_TITLE$§! คือโครงสร้างพื้นฐานที่จัดไว้เพื่อรองรับชิปประสาท หากพื้นที่สำหรับรองรับและบำรุงรักษาชิปประสาทไม่เพียงพอ จะทำให้ $r_stability$ ลดลง คุณสามารถเพิ่ม §Yที่อยู่อาศัย§! ได้ด้วยการสร้าง £district£ §Yเขต§! เพิ่ม อัปเกรด §Yหน่วยประมวลผล§! ของแท่นกลึง หรือสร้าง £building£ §Yแว่นกันแดด§!§!"
 SYNAPTIC_LATHE_AMENITIES_DESC: "§E§Y$PLANET_AMENITIES_TITLE$§! คือโครงสร้างพื้นฐานที่อุทิศให้กับความต้องการด้านค้ำจุนชีวิตของชิปประสาท ดาวเคราะห์ที่ไม่สามารถผลิต $PLANET_AMENITIES_TITLE$ ได้เพียงพอต่อประชากร จะได้รับโทษต่อ £happiness£ §Yความพึงพอใจ§! คุณสามารถเพิ่ม §Yสาธารณูปโภค§! ได้ด้วยการอัปเกรด §Yหน่วยประมวลผล§! ของแท่นกลึง หรือสร้าง £building£ §Yแว่นกันแดด§!§!"
 SYNAPTIC_LATHE_RESISTANCE_TITLE: "แรงต้าน"
