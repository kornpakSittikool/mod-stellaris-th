 #Buildings
 building_identity_repository: "ที่เก็บข้อมูลตัวตน"
 building_identity_repository_tt: "คลังนี้รองรับตัวตนได้ §Y[Owner.GetTotalIdentities]§! หน่วย $building_identity_repository_scaling$"
 building_identity_repository_scaling: "\n\nตัวตนแต่ละหน่วยจะเพิ่มผลผลิตและค่าบำรุงรักษาของคลัง โดยกระจายกันระหว่าง $building_identity_repository$ ทั้งหมดบนดาวเคราะห์ของเรา\n"
 building_identity_repository_desc: "ก่อนที่ร่างกายจะดับสูญ จิตใจจะถูกแปลงเป็นดิจิทัลอย่างปลอดภัยภายในที่แห่งนี้ และเรายังคงทำงานเพื่อประโยชน์ของสังคมต่อไป"
 building_abandoned_gene_clinic: "คลินิกยีนพันธุกรรมที่ถูกทิ้งร้าง"
 building_abandoned_gene_clinic_tt: "§Rไม่สามารถรื้อถอน เปลี่ยนแปลงหรือซ่อมได้§!"
 building_abandoned_gene_clinic_desc: "หลังจากเราสูญเสียความสามารถในการสืบพันธุ์ตามธรรมชาติ วงการแพทย์ได้ฝากความหวังไว้กับคลินิกยีนอันล้ำสมัยแห่งนี้ แต่เช่นเดียวกับโครงสร้างพื้นฐานอีกมากมายของเรา มันยืนว่างเปล่าอยู่ในตอนนี้ เป็นเครื่องเตือนใจอย่างต่อเนื่องถึงชะตากรรมของเราและความจำเป็นเร่งด่วนต่อทางออกใหม่"

 #Situation Events
 machine_age.3100.name: "ความรอดในรูปดิจิทัล"
 machine_age.3100.desc: "เมื่อไร้ทางออกทางการแพทย์ โอกาสรอดที่ดีที่สุดของเราคือการแปลงประชากรของเราเป็นดิจิทัลภายใน §Yการตอบกลับการแสดงตัว§! อย่างไรก็ตาม นี่เป็นเพียงมาตรการเฉพาะหน้า และเรามีแผนอยู่แล้วในการพัฒนาร่างกายสังเคราะห์และสมองโพซิตรอนิกที่มีความซับซ้อนเพียงพอ เราประเมินว่าเรายังมีเวลามากพอจะทำวิจัยนี้ให้สำเร็จ หากทุ่มเทอย่างจริงจัง\n\nด้วย AI ล้ำสมัย ผู้เชี่ยวชาญที่ดีที่สุดของเราได้ร่างแบบสำหรับร่างหุ่นยนต์ขึ้นแล้ว นี่คือก้าวแรกสู่ความรอดแบบสังเคราะห์ของเรา"
 machine_age.3100.a: "มันต้องสำเร็จ"
 machine_age.3110.name: "แรงงานหุ่นยนต์"
 machine_age.3110.desc: "งานวิจัยด้านร่างหุ่นยนต์ของเราเสร็จสมบูรณ์แล้ว เราได้ปรับปรุง $building_abandoned_gene_clinic$ ให้เป็น $building_robot_assembly_plant$ และยกระดับพร้อมนำต้นแบบไปใช้งาน แม้ระบบพื้นฐานเหล่านี้ยังมีพลังประมวลผลไม่พอจะบรรจุจิตสำนึกของแต่ละบุคคลได้ แต่มันสามารถทดแทนแรงงานที่เราสูญเสียไปบางส่วนได้ ผ่านการเชื่อมต่อโพซิตรอนิก ผู้ที่อยู่ในโลกดิจิทัลสามารถส่งต่อความรู้และประสบการณ์มาช่วยการทำงานประจำวันของหุ่นยนต์เหล่านี้ ทำให้ประสิทธิภาพของมันดีขึ้น\n\nในขณะเดียวกัน ระบบ AI ของเราก็ได้พัฒนาแบบร่างสำหรับแอนดรอยด์ขั้นสูงขึ้นมาแล้ว วิศวกรชราภาพของเราพร้อมลงมือทันที"
 machine_age.3110.a: "ผ่านไปได้อีกขั้น"
 machine_age.3110.a.tooltip: "[Root.Capital.GetName]:\n- §Y$building_robot_assembly_plant$§!: §G+1§! \n- £pop£ §HMechanical Pops§!: §G+300§!"
 machine_age.3115.name: "ชำนาญการดรอยด์"
 machine_age.3115.desc: "การยกระดับเทคโนโลยีหุ่นยนต์ครั้งสำคัญนี้ทำให้เราสามารถตั้งอาณานิคมบนดาวเคราะห์อื่นได้แล้ว และประชากรจักรกลของเราก็สามารถรองรับงานที่ซับซ้อนยิ่งขึ้นได้\n\nระบบ AI ของเราเชื่อว่าก้าวถัดไปที่สมเหตุสมผลคือการจำลองเมทริกซ์โพซิตรอนิกของพวกมันลงในร่างสังเคราะห์ โครงการวิจัยขนาดใหญ่นี้น่าจะทำให้เรานำจิตสำนึกที่ถูกแปลงเป็นดิจิทัลกลับคืนสู่โลกธรรมชาติได้"
 machine_age.3115.a: "ตอนนี้เราหยุดไม่ได้แล้ว"
 machine_age.3120.name: "อีกเพียงก้าวสุดท้าย"
 machine_age.3120.desc: "หลังจากทำงานอย่างไม่หยุดยั้ง ในที่สุดเราก็ประสบความสำเร็จ เราได้ออกแบบสมองโพซิตรอนิกที่ทำงานได้อย่างสมบูรณ์ และมีความซับซ้อนเพียงพอจะบรรจุตัวตนของเราไว้ได้\n\nแม้เราจะเอาชนะความตายไม่ได้ แต่ในไม่ช้าเราจะไม่ถูกจำกัดด้วยขอบเขตของการมีอยู่ทางชีวภาพอีกต่อไป"
 machine_age.3120.a: "ถึงเวลาตื่นขึ้นในร่างสังเคราะห์แล้ว"
 machine_age.3120.a.tooltip: "หากต้องการดำเนินเหตุการณ์นี้ต่อ เราต้องยอมรับ §Yประเพณีสังเคราะห์§!"
 machine_age.3125.name: "ความฝันดิจิทัล"
 machine_age.3125.both: "โรงงานประกอบและผู้เชี่ยวชาญด้านการสังเคราะห์ของเราพร้อมแล้วที่จะเริ่มภารกิจมหึมาในการย้ายตัวตนเข้าสู่สมองโพซิตรอนิกและร่างสังเคราะห์"
 machine_age.3125.desc: "$machine_age.3125.both$\n\nเราจะเริ่มต้นโดยมุ่งเน้นไปที่ผู้ที่ยังคงอาศัยอยู่ในโลกกายภาพ เพื่อกำจัดโรคพันธุกรรมนี้ให้สิ้นซากเสียที ด้วยพลังประมวลผลที่เพิ่มขึ้นของสมองสังเคราะห์ เราอาจก้าวข้ามข้อจำกัดทางชีวภาพของเราได้ด้วยซ้ำ$synth.105.end$"
 machine_age.3125.nobody.desc: "$machine_age.3125.both$\n\nเมื่อเราไม่มีตัวตนทางกายภาพเหลืออยู่ในโลกนี้ เราจึงต้องเร่งสร้างร่างต้นแบบแรกของเรา ด้วยพลังประมวลผลที่เพิ่มขึ้นของสมองสังเคราะห์ เราอาจก้าวข้ามข้อจำกัดทางชีวภาพของเราได้ด้วยซ้ำ$synth.105.end$"
 machine_age.3125.a: "เริ่มการถ่ายโอนตัวตนได้"
 machine_age.3125.a.tooltip: "หากยังมีประชากรชีวภาพหลงเหลืออยู่ พวกเขาจะเริ่มถ่ายโอนเข้าสู่ร่างสังเคราะห์"
 machine_age.3200.name: "แดนชำระดิจิทัล"
 machine_age.3200.desc: "สิ่งที่เราหวาดกลัวที่สุดได้เกิดขึ้นแล้ว\n\nร่างกายทางกายภาพร่างสุดท้ายของเราได้ดับสูญไป แม้จิตสำนึกที่ถูกแปลงเป็นดิจิทัลของเราจะยังถูกเก็บไว้อย่างปลอดภัยใน $building_identity_repository$ แต่เรายังขาดเทคโนโลยีที่จะนำจิตของเราไปใส่ในสมองเทียมได้\n\nจนกว่าเราจะวิจัยสำเร็จ ผู้นำดิจิทัลของเราจะต้องปฏิสัมพันธ์กับโลกธรรมชาติผ่านตัวแทนหุ่นยนต์ไปก่อน"
 machine_age.3305.name: "ความรอดเสมือนจริง"
 machine_age.3305.desc: "เราประสบความสำเร็จในการย้ายตัวตนทั้งหมดเข้าสู่โครงร่างสังเคราะห์ใหม่หรือเข้าสู่ $building_identity_repository$ ทำให้ประชากรของเราดำรงต่อไปได้\n\nอย่างไรก็ตาม ความท้าทายใหม่ได้ปรากฏขึ้น 'พื้นที่' ดิจิทัลที่เราสร้างขึ้นเพื่อเก็บตัวตนดิจิทัลของเรานั้นเดิมทีตั้งใจให้เป็นเพียงชั่วคราว แต่ผู้อยู่อาศัยกลับคุ้นชินกับการดำรงอยู่รูปแบบนี้และไม่เต็มใจจะกลับสู่โลกกายภาพ\n\nเราอาจปล่อยให้พวกเขาอยู่ต่อไปก็ได้ แต่การบังคับให้พวกเขาเข้าสู่ร่างสังเคราะห์ใหม่ก็เป็นอีกทางเลือกหนึ่งเช่นกัน"
 machine_age.3305.a: "ปล่อยให้พวกเขาเสวยนิพพาน"
 machine_age.3305.a.tooltip: "อัตลักษณ์ดิจิตัลที่เหลือจะยังอยู่ใน§Y$building_identity_repository$§!และยังคงส่งเสริมคนของเราจากภายใน"
 machine_age.3305.b: "เราแข็งแกร่งกว่าเมื่ออยู่ร่วมกัน"
 machine_age.3305.b.tooltip: "เราจะนำตัวตนดิจิทัลที่เหลือเข้าสู่ร่างสังเคราะห์ที่มีอยู่ในคลัง และสร้างโครงร่างใหม่สำหรับส่วนที่เหลือ §Y$building_identity_repository$§! จะถูกทำลาย"
 machine_age.3310.name: "เกิดใหม่ในร่างสังเคราะห์"
 machine_age.3310.desc: "หลายทศวรรษแล้วนับตั้งแต่ [Root.Owner.GetSpeciesName] คนหนึ่งได้อุ้มทารกแรกเกิดไว้ในอ้อมแขน แม้เราอาจไม่มีวันได้สัมผัสความรู้สึกนั้นอีก แต่วันนี้คือการกลับมาของความหวังสำหรับประชาชนของเรา\n\nเราได้พัฒนา §Yคอมพลีเมนต์การแสดงตัว§! ศูนย์ขั้นสูงที่เราสามารถคัดลอกตัวตนที่มีอยู่เพื่อสร้างผู้คนใหม่ขึ้นมาได้โดยแท้จริง\n\nเราอาจสุ่มจุดบุคลิกภาพจากหลายบุคคล สร้างตัวตนใหม่จากการผสมผสานนับไม่ถ้วน หรืออีกทางหนึ่ง เราอาจเลียนแบบกระบวนการของธรรมชาติด้วยการบ่มเพาะ 'เมล็ดจิต' ภายในสภาพแวดล้อมเสมือนแบบเปิด"
 machine_age.3310.a: "เราจะผสานจิตของเราเข้าด้วยกัน"
 machine_age.3310.building_tooltip.a.tt: "$unlock_edict_tt$ ['concept_edict_subsidized_identity_backups']\n$unlock_edict_tt$ ['concept_edict_optimized_identity_creation']\n\n$synth.405.a.tt$\n§Yปลดล็อกสิ่งปลูกสร้าง:§! $building_identity_complex$"
 machine_age.3310.b: "ธรรมชาติก็มีบางอย่างที่ถูกต้อง"
 machine_age.3310.building_tooltip.b.tt: "$unlock_edict_tt$ ['concept_edict_subsidized_identity_backups']\n$unlock_edict_tt$ ['concept_edict_optimized_identity_creation']\n\n$synth.405.b.tt$\n§Yปลดล็อกสิ่งปลูกสร้าง:§! $building_identity_complex$"
 machine_age.3315.name: "รุ่งอรุณสังเคราะห์"
 machine_age.3315.desc: "วันนี้คือจุดสิ้นสุดของการเดินทางในโลกดิจิทัลของเรา ไม่มีใครปฏิเสธได้ถึงความยิ่งใหญ่ของสิ่งที่เราทำลงไป หรือการเสียสละที่จำเป็นเพื่อให้บรรลุมัน\n\nบัดนี้เราได้ยกระดับขึ้นเป็นประชากรดิจิทัลและสังเคราะห์อย่างสมบูรณ์แล้ว เราจะไม่ยอมจำนนต่อความสยดสยองของโรคภัยอีกต่อไป และข้อจำกัดของพันธุกรรมอันอ่อนแอก็จะไม่กักขังเราอีกแล้ว\n\nเรามีอิสระที่จะสร้างความเป็นจริงใดก็ตามที่เราเห็นสมควร"
 machine_age.3315.a: "สดุดีรุ่งอรุณแห่งสังเคราะห์"
 machine_age.3315.a.tooltip: "จบ§Y$origin_synthetic_fertility$§!ห่วงโซ่เหตุการณ์"
 machine_age.3315.a.tt: "§Y[This.Owner.GetSpeciesName]§!ได้รับ['concept_synthetic_dawn']คุณสมบัติ"

 synthetic_dawn: "รุ่งอรุณสังเคราะห์"
 synthetic_dawn_desc: "เราได้ยกระดับขึ้นเป็นประชากรดิจิทัลและสังเคราะห์อย่างสมบูรณ์ และมีอิสระที่จะสร้างความเป็นจริงใดก็ตามที่เราเห็นสมควร"
