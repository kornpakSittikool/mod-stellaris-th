 situation_synthetic_fertility_synthesization_desc: "บัดนี้เรามีองค์ความรู้ทางเทคนิคที่จำเป็นต่อการสังเคราะห์ประชากรของเราให้สมบูรณ์แล้ว\n\n\n§Yประชากรที่จะได้รับร่างสังเคราะห์ในเดือนหน้า§!: §G[From.GetSynthFertPopsPerMonth]§!"
