 GALACTIC_DEFENSE_FORCE_DESC:0 "§Hกองเรือป้องกันกาแล็กติก§! เป็นกองเรือพิเศษที่ควบคุมโดยผู้พิทักษ์กาแล็กติก ยานเหล่านั้นถูกออกแบบใน §Hหน้าออกแบบยานของกองกำลังป้องกันกาแล็กติก§! และสามารถใช้เทคโนโลยีใดๆ ที่มีให้สมาชิกในประชาคมดาราจักรใช้งานได้ กองเรือป้องกันกาแล็กติกไม่มีค่าบำรุงรักษา แต่จำนวนรวมจะต้องไม่เกิน §Hขีดจำกัดกองทัพเรือของกองกำลังป้องกันกาแล็กติก§! ซึ่งสามารถปรับเปลี่ยนได้ผ่านมติต่างๆ"
 IMPERIAL_ARMADA_DESC:1 "§Hกองเรือจักรวรรดิ§! เป็นกองเรือพิเศษที่ควบคุมโดยผู้ปกครองของจักรวรรดิกาแล็กติกอิมพีเรียม ยานเหล่านั้นถูกออกแบบใน §Hหน้าออกแบบยานของกองเรือจักรวรรดิ§! และสามารถใช้เทคโนโลยีใดๆ ที่มีให้สมาชิกในจักรวรรดิกาแล็กติกใช้งานได้ กองเรือจักรวรรดิไม่มีค่าบำรุงรักษา แต่จำนวนรวมจะต้องไม่เกิน §Hขีดจำกัดกองทัพเรือของกองเรือจักรวรรดิ§! ซึ่งสามารถปรับเปลี่ยนได้ผ่านมติต่างๆ"
