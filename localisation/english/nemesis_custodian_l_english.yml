 IMPERIAL_AUTHORITY_INSTANT:3 "§Hอำนาจจักรวรรดิ§! ปัจจุบันคือ $VAL|2Y$\nอัตราการเปลี่ยนแปลงต่อเดือน: $MONTHLY_CHANGE|+=$\nการเสริมสร้าง: $SUPPORTERS|G$\nการบั่นทอน: $DISSENTERS|R$\n\n§Hผู้แทนที่ได้รับมอบหมาย§!$SUPPORTERS_LIST$\n$DISSENTERS_LIST$"
 IMPERIAL_AUTHORITY_DELAYED:4 "§Hอำนาจจักรวรรดิ§E แสดงถึงความแน่นหนาในการควบคุมจักรวรรดิของผู้ปกครอง ในแต่ละเดือน ผู้แทนที่ได้รับมอบหมายจะเพิ่มขึ้น §G+$CHANGE$§! หรือลดลง $NEG_CHANGE|R$ คูณด้วย §Yระดับทักษะ§! ของพวกเขา สิ่งนี้ยังส่งผลต่อความคิดเห็นของผู้ปกครองจักรวรรดิด้วย§!§!\n\n§Hหากต่ำกว่า §Y50§!:§!\nสมาชิกสามารถก่อกบฏต่อต้านผู้ปกครองผ่านปฏิบัติการจารกรรมได้\n\n§Hหากสูงกว่า §Y100§!:§!\nสมาชิกจักรวรรดิทั้งหมดจะเข้าร่วมกับผู้ปกครองในสงครามป้องกันตัวเพื่อต่อต้านบุคคลภายนอก\n\n§Hหากสูงกว่า §Y140§!:§!\nสามารถเสนอญัตติครูเสดจักรวรรดิเพื่อบังคับจักรวรรดิเป้าหมายให้เข้าร่วมจักรวรรดิได้\n\n§Hหากสูงกว่า §Y180§!:§!\nสามารถเสนอญัตติแพกซ์ กาแล็กติกาเพื่อห้ามการทำสงครามระหว่างรัฐในจักรวรรดิได้"
 strengthen_imperial_authority:0 "เสริมสร้างอำนาจจักรวรรดิ"
 strengthen_imperial_authority_desc:1 "การมอบหมายผู้แทนของเราเพื่อเสริมสร้างจักรวรรดิกาแล็กติกจะเพิ่มอำนาจจักรวรรดิเมื่อเวลาผ่านไป\n\nพวกเขาจะปฏิบัติหน้าที่นี้เพิ่มเติมจากการเพิ่ม §Yน้ำหนักทางการทูต§! ของเรา"
