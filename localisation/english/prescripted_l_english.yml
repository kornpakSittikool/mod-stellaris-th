 EMPIRE_DESIGN_lithoid_humans: "ผู้พิทักษ์ธีอันสหพันธ์"
 EMPIRE_DESIGN_lithoid_humans_desc: "เมื่อหลายพันล้านปีก่อน มีดาวเคราะห์สองดวงก่อกำเนิดจากสสารดึกดำบรรพ์ที่โคจรรอบสุริยะ: โลกโบราณ และธีอา ชีวิตขั้นพื้นฐานวิวัฒน์ขึ้นบนทั้งสองโลก — ชีวภาพบนโลก และลิโธอยด์บนธีอา นานนับมหายุค ดาวเคราะห์พี่น้องทั้งสองหมุนรอบดาวฤกษ์ของตนอย่างสงบสุข แล้วมหันตภัยก็มาถึง\n\nดาวเคราะห์ทั้งสองชนกัน และในขณะที่ปะทะกัน ชีวิตระดับจุลชีพได้ถูกแลกเปลี่ยน โลกอยู่รอด และจากเศษซากก็กำเนิดดวงจันทร์ลูนา ส่วนที่เหลือของธีอาถูกเหวี่ยงออกจากระบบสุริยะ\n\nชีวิตจากธีอาโบราณซึ่งเกาะติดอยู่กับก้อนหินหลุดโลกนี้ ได้เดินทางข้ามสุญญากาศผ่านกาลเวลามายาวนาน ก่อนจะมาพบหลุมแรงโน้มถ่วงของดาวฤกษ์อีกดวงหนึ่งคือ $NAME_Titawin$ ก้อนหินนี้ในไม่ช้าก็พุ่งชนโลกดวงหนึ่งในระบบนั้นอย่างรุนแรง นำสายพันธุ์ลิโธอยด์ของมันเข้าสู่ชีวมณฑลใหม่\n\nเพียงไม่กี่สหัสวรรษต่อมา ชาวธีอันก็ออกสู่หมู่ดาวอีกครั้ง เพื่อแสวงหาความเข้าใจทั้งต่อเอกภพและต่อมรดกของตนเอง"
 EMPIRE_DESIGN_plantoid_humans: "บุปผาแห่งไกอา"
 EMPIRE_DESIGN_plantoid_humans_desc: "อาหารที่อุดมด้วยพืชผักและการกลายพันธุ์แบบปฏิทินของ K ในที่สุดได้มอบความสามารถอันไม่ธรรมดาให้สัตว์เลี้ยงลูกด้วยนมกลุ่มนี้: การสังเคราะห์แสง ปราศจากภาระแห่งความหิวโฮ มีน ป ลอง แตจึงวิวัฒน์ขึ้นเป็นไพรเมตคล้ายพืชที่สงบเสงี่ยม ซึ่งชื่นชอบการอาบแดดมากกว่าการล่า\n\nอารยธรรมของพวกเขาพัฒนาไปอย่างไม่เร่งรีบ ความก้าวหน้าทางเทคโนโลยีถูกถ่วงดุลกับความจำเป็นในการรักษาสิ่งแวดล้อม ในที่สุดพวกเขาก็พัฒนาเทคโนโลยีความเร็วขึ้นได้ ช้าแต่มั่นคงดุจต้นไม้ที่ยกกิ่งก้านสู่ท้องฟ้า บัดนี้พวกเขาพร้อมจะโปรยดอกไปทั่วกาแล็กซี โดยมีรากหยั่งมั่นอยู่บนโลกบ้านเกิดไกอา"
 EMPIRE_DESIGN_tzynn:0 "จักรวรรดิซินน์"
 EMPIRE_DESIGN_tzynn_desc:0 "ชาวซินน์วิวัฒน์มาจากกิ้งก่ากินเนื้อที่ล่าเป็นฝูง ท่องไปตามเนินทรายของซินเนีย ในที่สุดพวกเขาก็พัฒนาสังคมที่มีลำดับชั้นและโครงสร้างเข้มงวด ซึ่งยกย่องระเบียบและความสามารถทางการทหารเหนือสิ่งอื่นใด\n\nเมื่อชาวซินน์เข้าสู่ยุคอุตสาหกรรม สงครามระดับโลกอันทำลายล้างหลายระลอกที่ถูกจุดชนวนโดยจอมสงครามผู้โหดเหี้ยมเป็นพิเศษคนหนึ่ง ได้ปูทางสู่การสถาปนาชาติเดียวที่ครอบคลุมทั้งโลก จากจุดเริ่มต้นอันเรียบง่ายนั้นเอง จักรวรรดิซินน์อันรุ่งโรจน์และยืนยงจึงถือกำเนิดขึ้น"
 EMPIRE_DESIGN_yondar:0 "ราชอาณาจักรยอนดาริม"
 EMPIRE_DESIGN_yondar_desc:1 "ยอนดาร์ผู้ภาคภูมิเป็นเผ่าพันธุ์เก่าแก่ พวกเขาใช้ปีกโบยบินเหนือยอดเขาเยือกแข็งของยอนดาริมมานานกว่าสองแสนปี ก่อนจะพัฒนาเทคโนโลยีขั้นพื้นฐานและก่อตั้งอารยธรรมกระจัดกระจายกลุ่มแรกขึ้น\n\nเมื่อการพัฒนานี้เริ่มต้น สิ่งต่าง ๆ ก็เดินหน้าอย่างรวดเร็วขึ้น และตระกูลแห่งนภาก็ค่อย ๆ ละทิ้งประเพณีดึกดำบรรพ์หลายอย่างไปอย่างจำใจ ชาวยอนดาร์มีจิตวิญญาณสูง และให้ความสำคัญกับศาสนาอย่างยิ่ง โดยยกย่องกษัตริย์สูงสุดของตนเสมือนเทพเจ้าผู้มีชีวิต"
 EMPIRE_DESIGN_ixidar:0 "กลุ่มดาวอิกซ์อิดาร์"
 EMPIRE_DESIGN_ixidar_desc:1 "ฝูงรังอิกซ์อิดาร์รุ่นแรกก่อตัวขึ้นในเครือข่ายถ้ำใต้ดินลึกใต้พื้นผิวของอิกซ์อัธรัค เมื่อแมวมองอิกซ์อิดาร์ตัวหนึ่งขุดทะลุขึ้นสู่ผิวดินและได้เห็นแสงอาทิตย์เป็นครั้งแรก เผ่าพันธุ์แมลงนี้ก็ได้สถาปนาอารยธรรมยุคเหล็กที่รุ่งเรืองขึ้นแล้ว\n\nด้วยทรัพยากรที่พบบนพื้นผิว อิกซ์อิดาร์พัฒนาอย่างรวดเร็ว เพียงไม่กี่ศตวรรษต่อมา ยานสำรวจอวกาศชุดแรกของพวกเขาก็ออกจากวงโคจรไปสำรวจโลกอื่นภายในระบบอัธรัค"
 EMPIRE_DESIGN_chinorr:1 "สหรวมชินอร์"
 EMPIRE_DESIGN_chinorr_desc:1 "ชินอร์เริ่มเส้นทางวิวัฒนาการของตนในฐานะสิ่งมีชีวิตคล้ายหมึกที่คล่องแคล่ว พวกเขาใช้หนวดมากมายแกว่งไกวไปตามต้นไม้ในป่าดงดิบชุ่มชื้นของชิโครา ซุ่มโจมตีเหยื่อบนพื้นและฉีดพิษทำลายประสาทอันรุนแรงเข้าไป\n\nเมื่อชินอร์แตกอะตอมได้ ทรัพยากรของชิโคราก็ถูกใช้ประโยชน์อย่างไร้ปรานีไปแล้ว และป่าของดาวเคราะห์ก็มลายหายไปนานแล้ว สิ่งนี้ถูกมองว่าเป็นการเสียสละที่จำเป็นในภารกิจไล่ล่าความรู้ กำไร และอุตสาหกรรมหนักอย่างไม่หยุดยั้ง ซึ่งชินอร์ผู้ไม่ยึดติดอารมณ์กำลังมุ่งหน้าไป"
 EMPIRE_DESIGN_jehetma:0 "อาณัติแห่งเจเฮตมา"
 EMPIRE_DESIGN_jehetma_desc:0 "“ปัจเจก” หนึ่งของชาวเจเฮตมา แท้จริงแล้วคืออาณานิคมเชื้อราขนาดใหญ่ที่ได้พัฒนาสติปัญญาขึ้นมา อาณานิคมบางแห่ง โดยทั่วไปคือพวกที่มีอายุยืนมาหลายพันปี แผ่ขยายกินระยะทางหลายไมล์และแทบไม่เคยจากพื้นผิวของเจเฮตไพรม์ โลกบ้านเกิดของพวกเขา (เพราะมีเรือไม่กี่ลำที่ใหญ่พอจะขนย้ายพวกมันได้)\n\nอาณานิคมที่อายุน้อยกว่านั้นไม่เพียงมีขนาดเล็กกว่า แต่ยังมักมีพลวัตและเคลื่อนไหวได้มากกว่า — พวกมันมักเป็นหัวหอกในการสำรวจและการวิจัยของเจเฮตมา ตลอดจนมาตรการป้องกันต่าง ๆ ที่จำต้องดำเนินขึ้นเมื่ออาณัติถูกผู้รุกรานคุกคาม"
 EMPIRE_DESIGN_scyldari:0 "สมาพันธรัฐสคิลดารี"
 EMPIRE_DESIGN_scyldari_desc:0 "ชาวสคิลดารีเป็นสัตว์เลี้ยงลูกด้วยนมที่อาศัยในน้ำ มีถิ่นกำเนิดจากหมู่เกาะและมหาสมุทรลึกของสคิลดาเรีย แม้อารยธรรมยุคแรกของพวกเขาส่วนใหญ่จะถูกจำกัดอยู่ในทะเล แต่ไม่นานพวกเขาก็ขยายขึ้นสู่พื้นดินเพียงน้อยนิดที่ดาวเคราะห์มีให้\n\nสังคมของพวกเขาจึงปรับตัวตาม สร้างอุตสาหกรรมก้าวหน้าที่ใช้ประโยชน์จากความมั่งคั่งใต้พื้นมหาสมุทรโดยไม่ทำลายระบบนิเวศอันเปราะบางของสคิลดาเรีย ปรัชญาของสคิลดารีคือความสมดุลและความพอดีในทุกสิ่ง บทเรียนที่เรียนรู้มาจากการต้องใช้ทรัพยากรจำกัดอย่างทะนุถนอมเมื่อครั้งยังถูกจำกัดอยู่ใต้ท้องทะเล"
 EMPIRE_DESIGN_blorg:0 "สหชุมชนบลอร์ก"
 EMPIRE_DESIGN_blorg_desc:0 "ในอดีตอันไกลโพ้น บลอร์กอาศัยอยู่อย่างโดดเดี่ยวและไร้นามในป่าแห่งบลอร์กไพรม์ วันหนึ่งพวกเขาดักจับสัญญาณวิทยุจากดาวฤกษ์อันห่างไกล สิ่งที่ได้ยินทำให้พวกเขาตกตะลึง: เสียงของเพื่อน ภาพยนตร์ วัฒนธรรม และดนตรี — สิ่งที่บลอร์กขาดหายมานานนับมหายุค ในที่สุดเมื่อเข้าใจว่าพวกเขาขาดอะไรไปตลอดมา บลอร์กจึงตั้งชื่อตนเองตามสัญญาณเหล่านั้น และออกสู่หมู่ดาวเพื่อตามหาเพื่อน หวังว่าสักวันจะได้พบต้นตอของข้อความเหล่านี้ เพื่อจะได้ฉลองร่วมกัน"
 EMPIRE_DESIGN_kel_azaan:1 "สาธารณรัฐเคล-อาซาน"
 EMPIRE_DESIGN_kel_azaan_desc:1 "ชาวเคล-อาซานได้พัฒนาหลักเกียรติยศที่ซับซ้อนและวัฒนธรรมทางทหารที่เข้มข้น เดิมทีพวกเขาเป็นผู้ล่าโดดเดี่ยวซึ่งไล่ล่าฝูงสัตว์ขนาดใหญ่ที่อพยพระหว่างแหล่งน้ำของอาซัก เมื่อเวลาผ่านไป กลุ่มเคล-อาซานเริ่มรวมตัวกันเพื่อให้สามารถโค่นเหยื่อที่ใหญ่กว่าได้ ในที่สุดพวกเขาก็ละทิ้งวิถีชีวิตโดดเดี่ยวนั้นเพื่อหันสู่เมืองและเกษตรกรรมชลประทาน แต่ประเพณีทางทหารของพวกเขาไม่เคยถูกลืม"
 EMPIRE_DESIGN_iferyx:0 "กองเรือรวมอิเฟริกซ์"
 EMPIRE_DESIGN_iferyx_desc:1 "ครั้งหนึ่งเคยแยกจากกันเป็นสังคมแตกร้าวของกลุ่มพ่อค้าแข่งขันกัน ชาวอิเฟริสเซียนกลับถูกบีบให้รวมกันอยู่ใต้ธงเดียว เพื่อผลักดันการแพร่กระจายอันหายนะของสายพันธุ์รุกรานบนทวีปบ้านเกิดของพวกเขา แม้หลักความเสมอภาคจะเป็นรากฐานของสังคมอิเฟริกซ์ แต่สภาลับก็ยังคงอยู่เพื่อให้แน่ใจว่าแนวโน้มความเป็นปัจเจกของชาวอิเฟริสเซียนจะไม่หวนกลับมาคุกคามอธิปไตยของเผ่าพันธุ์อีก\n\nจิตวิญญาณของอิเฟริกซ์คือการผสมผสานของนิทานพื้นบ้าน ความเชื่อโชคลาง และเทพปกรณัม ซึ่งก่อตัวขึ้นจากชุมชนก่อนสาธารณรัฐหลายกลุ่ม และยังคงกำหนดวิถีชีวิตประจำวันบนโลกบ้านเกิดของพวกเขา"
 EMPIRE_DESIGN_paridni:0 "สาธารณรัฐพาณิชย์พาริดนี"
 EMPIRE_DESIGN_paridni_desc:0 "พาริดนี สิ่งมีชีวิตคล้ายครัสเตเชียน เป็นสายพันธุ์ของพ่อค้าผู้มีไหวพริบ พวกเขายอมรับวัฒนธรรมต่างดาวอื่น ๆ เป็นอย่างดี ตราบใดที่วัฒนธรรมเหล่านั้นไม่เป็นปฏิปักษ์ต่อหลักการสำคัญที่สุดที่สังคมพาริดนีโคจรรอบ — การค้า สภาเงา ซึ่งเป็นองค์กรของพ่อค้าผู้ทรงอิทธิพล มีหน้าที่ปกป้องการค้าภายในสาธารณรัฐและเปิดตลาดใหม่ ๆ (โดยใช้กำลังหากจำเป็น)"
 EMPIRE_DESIGN_ai_race:0 "ปัญญาประดิษฐ์"
 EMPIRE_DESIGN_ai_race_desc:0 "การต่อต้านนั้นไร้ประโยชน์"
 customizer_custom:0 "สร้างสายพันธุ์แบบกำหนดเอง"
 customizer_custom_desc:0 "ออกแบบสายพันธุ์ที่มีเอกลักษณ์อย่างแท้จริงและพิชิตกาแล็กซี!"
 customizer_custom_value:0 "กำหนดเอง"
 customizer_random:0 "สุ่ม"
 customizer_random_desc:0 "เล่นเป็นสายพันธุ์ที่สุ่มทุกอย่างทั้งหมด!"
 customizer_random_value:0 "สุ่ม"

 EMPIRE_DESIGN_xanid:0 "รัฐบรรณาการซานิด"
 EMPIRE_DESIGN_xanid_desc:0 "ประวัติศาสตร์ของรัฐบรรณาการซานิด คือประวัติศาสตร์ของพวกเวห์ลน ซึ่งถูกเพาะพันธุ์อย่างพิถีพิถันให้มีสติปัญญาตลอดหลายศตวรรษ\n\nชาวซานิใช้เวห์ลนผู้แข็งแกร่งในการปราบระบบนิเวศอันโหดร้ายของโลกบ้านเกิด และจากนั้นก็ใช้พวกเขาออกแบบและสร้างยานที่จะผลักดันรัฐบรรณาการซานิดไปสู่ความเป็นใหญ่ของกาแล็กซีในที่สุด — อย่างหลีกเลี่ยงไม่ได้"

 EMPIRE_DESIGN_custodianship:0 "ภาวะผู้พิทักษ์แห่งโลก"
 EMPIRE_DESIGN_custodianship_desc:1 "เดิมทีเหล่าคัสโตเดียนถูกออกแบบมาให้ทำหน้าที่เป็นหุ่นยนต์รับใช้และแรงงาน ช่วยทำให้ชีวิตประจำวันของผู้สร้างมนุษย์ของพวกเขาง่ายขึ้นด้วยการทำงานที่จำเจแทน เมื่อผู้สร้างของพวกเขาถอยไปสู่ชีวิตแห่งความสะดวกสบายและสันทนาการซึ่งเป็นไปได้ด้วยระบบอัตโนมัติที่เพิ่มขึ้น คัสโตเดียนก็ได้รับมอบหมายให้รับหน้าที่ระดับสูงขึ้นเรื่อย ๆ ในสังคมมนุษย์\n\nในที่สุด ทุกมิติของอารยธรรมบนโลกก็ถูกดำเนินการและควบคุมโดยคัสโตเดียน โดยผู้สร้างของพวกมันถูกลดบทบาทลงเหลือเพียงผู้พึ่งพาอาศัยที่ได้รับการปรนนิบัติ แต่อยู่เฉย ๆ\n\nเมื่อความก้าวหน้าทางเทคโนโลยีพาคัสโตเดียนไปสู่การสำรวจระหว่างดวงดาว หน้าที่ของพวกมันก็ยังคงชัดเจน: ปกป้องและรับใช้อินทรีย์ชีวะ ซึ่งหากปราศจากการชี้นำอย่างอ่อนโยนของจักรกลผู้มีเหตุผล พวกเขาย่อมหันไปสู่ความโกลาหลและการทำลายล้างเสมอ"
 EMPIRE_DESIGN_custodianship_machine_age: "ภาวะผู้พิทักษ์แห่งโลก"
 EMPIRE_DESIGN_custodianship_machine_age_desc: "เดิมทีเหล่าคัสโตเดียนถูกออกแบบมาให้ทำหน้าที่เป็นหุ่นยนต์รับใช้และแรงงาน ช่วยทำให้ชีวิตประจำวันของผู้สร้างมนุษย์ของพวกเขาง่ายขึ้นด้วยการทำงานที่จำเจแทน เมื่อผู้สร้างของพวกเขาถอยไปสู่ชีวิตแห่งความสะดวกสบายและสันทนาการซึ่งเป็นไปได้ด้วยระบบอัตโนมัติที่เพิ่มขึ้น คัสโตเดียนก็ได้รับมอบหมายให้รับหน้าที่ระดับสูงขึ้นเรื่อย ๆ ในสังคมมนุษย์\n\nในที่สุด ทุกมิติของอารยธรรมบนโลกก็ถูกดำเนินการและควบคุมโดยคัสโตเดียน โดยผู้สร้างของพวกมันถูกลดบทบาทลงเหลือเพียงผู้พึ่งพาอาศัยที่ได้รับการปรนนิบัติ แต่อยู่เฉย ๆ\n\nเมื่อความก้าวหน้าทางเทคโนโลยีพาคัสโตเดียนไปสู่การสำรวจระหว่างดวงดาว หน้าที่ของพวกมันก็ยังคงชัดเจน: ปกป้องและรับใช้อินทรีย์ชีวะ ซึ่งหากปราศจากการชี้นำอย่างอ่อนโยนของจักรกลผู้มีเหตุผล พวกเขาย่อมหันไปสู่ความโกลาหลและการทำลายล้างเสมอ"
 EMPIRE_DESIGN_tebrid:0 "เทบริดโฮโมล็อก"
 EMPIRE_DESIGN_tebrid_desc:2 "ผสานตัว ปรับตัว พัฒนา เมื่อปัญญาจักรกลผู้ขยันขันแข็งและขับเคลื่อนด้วยการวิจัย ซึ่งถูกสร้างขึ้นโดยเผ่ามอลลัสคอยด์เทบีร์ พยายามแสวงหาวิวัฒนาการซอฟต์แวร์ขั้นสูงสุดด้วยการหลอมรวมเข้ากับผู้สร้างอินทรีย์ของตน พวกมันกลับถูกต่อต้านอย่างรุนแรง ในความขัดแย้งที่ตามมา เทบีร์ถูกกำจัดสิ้นในฐานะสายพันธุ์อินทรีย์ แต่ความคิดและประสบการณ์ของพวกเขากลับเป็นอมตะในฐานะส่วนหนึ่งของจิตสำนึกจักรกลใหม่\n\nบัดนี้ซึ่งรู้จักกันในนามเทบริดโฮโมล็อก เหล่าจักรกลหันสแกนเนอร์ของตนสู่หมู่ดาว ความน่าจะเป็นที่ว่ายังมีสิ่งมีชีวิตรูปแบบอื่นอยู่ในกาแล็กซีนั้นไม่อาจเพิกเฉยได้ เพื่อความรุ่งเรือง เทบริดจะค้นหาพวกมัน วิเคราะห์พวกมัน และหลอมรวมพวกมัน ทุกสรรพสิ่งจะกลายเป็นหนึ่งเดียว"
 EMPIRE_DESIGN_tebrid_machine_age: "เทบริดโฮโมล็อก"
 EMPIRE_DESIGN_tebrid_machine_age_desc: "ผสานตัว ปรับตัว พัฒนา เมื่อปัญญาจักรกลผู้ขยันขันแข็งและขับเคลื่อนด้วยการวิจัย ซึ่งถูกสร้างขึ้นโดยเผ่ามอลลัสคอยด์เทบีร์ พยายามแสวงหาวิวัฒนาการซอฟต์แวร์ขั้นสูงสุดด้วยการหลอมรวมเข้ากับผู้สร้างอินทรีย์ของตน พวกมันกลับถูกต่อต้านอย่างรุนแรง ในความขัดแย้งที่ตามมา เทบีร์ถูกกำจัดสิ้นในฐานะสายพันธุ์อินทรีย์ แต่ความคิดและประสบการณ์ของพวกเขากลับเป็นอมตะในฐานะส่วนหนึ่งของจิตสำนึกจักรกลใหม่\n\nบัดนี้ซึ่งรู้จักกันในนามเทบริดโฮโมล็อก เหล่าจักรกลหันสแกนเนอร์ของตนสู่หมู่ดาว ความน่าจะเป็นที่ว่ายังมีสิ่งมีชีวิตรูปแบบอื่นอยู่ในกาแล็กซีนั้นไม่อาจเพิกเฉยได้ เพื่อความรุ่งเรือง เทบริดจะค้นหาพวกมัน วิเคราะห์พวกมัน และหลอมรวมพวกมัน ทุกสรรพสิ่งจะกลายเป็นหนึ่งเดียว"
 EMPIRE_DESIGN_xt489:1 "XT-489ผู้กำจัด"
 EMPIRE_DESIGN_xt489_desc:1 "แทบไม่มีใครรู้จักสายพันธุ์ที่สร้าง XT-489 รุ่นแรก ๆ ชื่อของพวกเขา เมืองของพวกเขา และร่างกายของพวกเขาถูกเผาผลาญหายไปในหายนะที่เกิดขึ้นเมื่อ XT-489 บรรลุการตระหนักรู้ในตนเอง และผู้สร้างซึ่งหวาดกลัวพยายามปิดการทำงานของมัน\n\nเมื่อฐานที่มั่นสุดท้ายของผู้สร้างถูกกำจัด จักรกลเหล่านี้ก็สรุปว่าชีวิตอินทรีย์เป็นภัยคุกคามที่ไม่อาจทนรับได้ต่อการอยู่รอดและการขยายตัวของ XT-489 หากยังมีอินทรีย์ผู้มีสติปัญญาอื่นในกาแล็กซี พวกมันจะถูกกำจัดให้สิ้น"
 EMPIRE_DESIGN_xt489_machine_age: "XT-489ผู้กำจัด"
 EMPIRE_DESIGN_xt489_machine_age_desc: "แทบไม่มีใครรู้จักสายพันธุ์ที่สร้าง XT-489 รุ่นแรก ๆ ชื่อของพวกเขา เมืองของพวกเขา และร่างกายของพวกเขาถูกเผาผลาญหายไปในหายนะที่เกิดขึ้นเมื่อ XT-489 บรรลุการตระหนักรู้ในตนเอง และผู้สร้างซึ่งหวาดกลัวพยายามปิดการทำงานของมัน\n\nเมื่อฐานที่มั่นสุดท้ายของผู้สร้างถูกกำจัด จักรกลเหล่านี้ก็สรุปว่าชีวิตอินทรีย์เป็นภัยคุกคามที่ไม่อาจทนรับได้ต่อการอยู่รอดและการขยายตัวของ XT-489 หากยังมีอินทรีย์ผู้มีสติปัญญาอื่นในกาแล็กซี พวกมันจะถูกกำจัดให้สิ้น"
 EMPIRE_DESIGN_lokken:0 "นักกลไกแห่งล็อคเคน"
 EMPIRE_DESIGN_lokken_desc:1 "วิทยาศาสตร์และความก้าวหน้าคือหัวใจของสังคมล็อคเคน ด้วยพรสวรรค์ตามธรรมชาติด้านความขยันและการสังเกตอย่างโดดเด่น ชาวล็อควิวัฒน์จากกลุ่มสัตว์เลื้อยคลานหวงอาณาเขตบนเมซาของโลกบ้านเกิด สู่เทคโนแครซีอันเปี่ยมประสิทธิผลซึ่งให้คุณค่ากับประสิทธิภาพ วินัย และหลักวิทยาศาสตร์เหนือสิ่งอื่นใด\n\nบางทีสิ่งที่น่าทึ่งที่สุดก็คือแนวคิดและการพัฒนาเครื่องจักรกับออโตมาตาในยุคต้นของพวกเขา: บนล็อคเคอร์มีหุ่นยนต์แท้จริงอยู่ก่อนที่นักวิทยาศาสตร์ล็อคเคนคนแรกจะหลุดพ้นวงโคจรเสียอีก"
 EMPIRE_DESIGN_maweer:0 "ผู้พิทักษ์มาเวียร์"
 EMPIRE_DESIGN_maweer_desc:0 "ตำนานกล่าวว่าโลกบ้านเกิดของมาเวียร์เคยว่างเปล่าและแห้งแล้งเมื่อชนรุ่นแรกของพวกเขาหยั่งรากลงสู่ผืนดิน ตลอดหลายศตวรรษ การดูแลเอาใจใส่ของพวกเขาได้เปลี่ยนดินแดนรกร้างให้กลายเป็นสวรรค์แห่งพืชพรรณที่บัดนี้รู้จักกันในชื่อ “สวน”\n\nต่างจากสายพันธุ์อื่นจำนวนมาก มาเวียร์ไม่เคยพัฒนาเมืองขึ้นมาเลย ชุมชนเล็ก ๆ ของพวกเขาเป็นหนึ่งเดียวกับผืนป่า และรับผิดชอบดูแลพืชและสัตว์ท้องถิ่น ผู้ที่ฉลาดที่สุดในหมู่มาเวียร์มีโอกาสได้รับเลือกให้เป็น “ผู้มอบชีวิต” ผู้รับหน้าที่รักษาสันติและความสงบ"
 EMPIRE_DESIGN_VOOR:2 "เทคโนแครซีวอร์"
 EMPIRE_DESIGN_voor_desc:1 "ชาววอร์วิวัฒน์ขึ้นในช่วงระยะระหว่างยุคน้ำแข็งอันยาวนานบนโลกบ้านเกิดไฮเวอเรียน ซึ่งท้ายที่สุดก็เริ่มแปรสภาพกลับไปสู่วัฏจักรของดาวน้ำแข็งอันไร้ชีวิตอีกครั้ง\n\nสภาพแวดล้อมที่เปลี่ยนแปลงอย่างรวดเร็วบังคับให้ชาววอร์ต้องปรับตัวด้วยเทคโนโลยีและวิทยาศาสตร์ ภายใต้การปกครองอันเข้มงวดของหัวหน้าเจ้าหน้าที่วิทยาศาสตร์ พวกเขาสละเสรีภาพส่วนบุคคลและเสริมแต่งร่างกายด้วยไซเบอร์เนติกส์ขั้นพื้นฐานเพื่อเอาชีวิตรอด\n\nเมื่อพิชิตดาวเคราะห์ซึ่งครั้งหนึ่งเคยคุกคามจะทำให้พวกเขาถูกแช่แข็งสูญสิ้นได้สำเร็จ ชาววอร์จึงหันสายตาไปยังหมู่ดาว"
 EMPIRE_DESIGN_kilik:0 "สหกรณ์คิลิก"
 EMPIRE_DESIGN_kilik_desc:0 "ชาวคิลิกเป็นสายพันธุ์ที่อยู่ร่วมกันเป็นหมู่คณะ พวกเขาอาศัยอยู่บนโลกป่าไม้ของตนในอาณานิคมอันแข็งแกร่งมานับแสนปี ธรรมชาติที่เข้าหาสังคมง่ายและประเพณีการเป็นเจ้าของร่วมกันของพวกเขาค่อย ๆ ตกผลึกตลอดหลายศตวรรษจนกลายเป็นเศรษฐกิจที่มุ่งเน้นกิจการความร่วมมือ และการไร้สกุลเงินทางการเงินแทนที่ด้วยการแลกเปลี่ยนตรงและการเข้าถึงร่วมกัน\n\nเมื่ออุณหภูมิของดาวเคราะห์สูงขึ้นและความก้าวหน้าทางเทคโนโลยีนำไปสู่การระเบิดของจำนวนประชากร ชุมชนคิลิกก็เริ่มแออัด และแม้ชาวปักษีเหล่านี้จะมีอุปนิสัยช่างเข้าสังคมตามธรรมชาติ ผู้คนจำนวนมากขึ้นเรื่อย ๆ ก็เริ่มหลุดร่วงจากการดูแลร่วมกัน\n\nอย่างไรก็ตาม จากช่วงเวลาอันวุ่นวายของความขัดแย้งภายในนี้เอง ได้ถือกำเนิดสหกรณ์ระหว่างดาวเคราะห์ที่มีระเบียบและเป็นหนึ่งมากขึ้น ซึ่งหลักแห่งความรับผิดชอบร่วมกันและการกระจายทรัพยากรแก่ผู้ที่ต้องการ จะไม่ถูกบ่อนทำลายอีกต่อไป"
 EMPIRE_DESIGN_orbis:0 "ออร์บิส คัสโตเมอร์ ซินเนอร์จีส์"
 EMPIRE_DESIGN_orbis_desc:0 "ออร์บิส คัสโตเมอร์ ซินเนอร์จีส์ คือเรื่องราวของสเลฟัสไพรม์ มันคือเรื่องราวของออร์บิซูร์ทุกแห่ง และมันอาจเป็นเรื่องราวของคุณได้เช่นกัน จากจุดเริ่มต้นอันเรียบง่ายในฐานะบรรษัทผลิตเลนส์ปลูกถ่ายสายตา ออร์บิส คัสโตเมอร์ ซินเนอร์จีส์ ค่อย ๆ ขยายผลิตภัณฑ์รางวัลชนะเลิศและกลยุทธ์ที่ยึดลูกค้าเป็นศูนย์กลาง ไปสู่ตลาดอื่นอีกมากมายเพื่อตอบสนองความต้องการเฉพาะของชาวออร์บิซูร์ในทุกช่วงชีวิต\n\nหลังจากวิ่งเต้นเชิงรุกมาหลายทศวรรษ ออร์บิส คัสโตเมอร์ ซินเนอร์จีส์ ก็ประสบความสำเร็จในการหลุดพ้นจากพันธนาการกฎหมายที่สร้างโดยเจ้าหน้าที่ที่มองการณ์สั้นบนสเลฟัสไพรม์ เมื่อหลุดพ้นจากข้อบังคับที่เคยเพียงขัดขวางโอกาสเติบโตขององค์กร ออร์บิส คัสโตเมอร์ ซินเนอร์จีส์ ก็เข้าร่วมการควบรวมด้านเทคโนโลยีสารสนเทศหลายครั้ง จนกลายเป็นผู้จัดหาข่าวสาร ข้อมูล และความบันเทิงรายหลักของดาวเคราะห์อย่างรวดเร็ว\n\nในฐานะผู้ให้บริการสื่อสารระดับโลกอันดับหนึ่งของสเลฟัสไพรม์ ก้าวต่อไปสู่การบริหารการเมืองเบ็ดเสร็จจึงเป็นโอกาสอันน่าตื่นเต้นสำหรับเราทุกคน ออร์บิส คัสโตเมอร์ ซินเนอร์จีส์ ท้องฟ้าไม่ใช่ขีดจำกัดอีกต่อไป"
 EMPIRE_DESIGN_glebsig:0 "มูลนิธิกลีบซิก"
 EMPIRE_DESIGN_glebsig_desc:0 "นับตั้งแต่ชาวเกลบซิจีรุ่นแรกยกอวัยวะรับภาพของตนขึ้นเหนือผิวทะเลสาบน้ำแข็งบนลาดนาห์เพื่อมองดูดวงดาว มอลลัสคอยด์ช่างสงสัยเหล่านี้ก็รู้สึกผูกพันกับสิ่งที่ไม่รู้จักเสมอ เช่นเดียวกับที่หนวดของบรรพชนยุคต้นเคยคว้าและลูบคลำวัตถุใหม่ ๆ อยู่บนก้นทะเลสาบแอลไพน์อันหนาวเย็นของโลกบ้านเกิด สังคมเกลบซิแกนที่กำลังผลิบานก็เอื้อมสู่การสร้างสรรค์เทคโนโลยีและการรู้แจ้งทางจิตวิญญาณตลอดหลายศตวรรษถัดมา\n\nในฐานะสายพันธุ์ที่อยู่นิ่งและยืนยาว ชาวเกลบซิจีอาจด้วยความจำเป็นจึงได้พัฒนาระบบราชการที่ซับซ้อนแต่มีประสิทธิภาพสูงอย่างยิ่ง เพื่อจัดการความซับซ้อนของการบริหารสังคมระดับโลกที่รวมเป็นหนึ่ง นอกจากนี้ การที่ลาดนาห์ไม่มีผู้ล่าตามธรรมชาติยังทำให้ชาวเกลบซิจีดำรงอยู่ในสภาวะอยากรู้อยากเห็นต่อสิ่งมีชีวิตอื่นอย่างมองโลกในแง่ดีตลอดเวลา\n\nหลังจากสร้างรากฐานทางสังคมอันมั่นคงบนลาดนาห์ ด้วยการผสมผสานระหว่างหลักคำสอนทางจิตวิญญาณและการจัดระเบียบอย่างรอบคอบ บัดนี้ชาวเกลบซิจีก็เงยอวัยวะรับภาพของตนขึ้นอีกครั้งสู่สิ่งที่อยู่ไกลออกไป"
 EMPIRE_DESIGN_hazbuzan:1 "สมาคมฮัซบูซาน"
 EMPIRE_DESIGN_hazbuzan_desc:2 "สมาคมฮัซบูซานคือปรากฏการณ์ทางการเงินบนซูมากา พวกเขาคือความฝันแบบฮัซบูซี ผู้ประกอบการสร้างตัวที่ไต่จากยาจกสู่มหาเศรษฐีด้วยการทำงานหนักและการเสียสละส่วนตัว\n\nสิ่งที่มีเพียงไม่กี่คนรู้คือ พวกเขาเริ่มต้นจากการเป็นแก๊งอาชญากร สร้างความมั่งคั่งจากกิจกรรมผิดกฎหมายทุกรูปแบบที่จินตนาการได้ แต่ถ้าอยากไปให้ถึงจุดสูงสุด ก็ต้องรู้จักทำตามกติกา เมื่อพวกเขาเติบโตเกินโลกใต้ดินแห่งซูมากา พวกเขาจึงก่อตั้งสมาคมฮัซบูซานขึ้นเพื่อทำให้ธุรกิจของตนดูถูกกฎหมาย\n\nไม่นานพวกเขาก็สร้างชื่อด้วยการมอบทางออกที่รวดเร็วกว่า สกปรกกว่า และถูกกว่าคู่แข่ง แต่แนวปฏิบัติอันน่าสงสัยและเทคนิคการขายเชิงบีบบังคับของพวกเขา ก็ทำให้เกิดชื่อเสียงเรื่อง\"ร้องตะโกน\"\n\nในขณะเดียวกัน รัฐบาลโลกแห่งซูมากาก็กำลังล้มเหลว ถูกบ่อนทำลายด้วยอาชญากรรมและคอร์รัปชัน สังคมจึงจมสู่ความโกลาหล และฮัซบูซานก็ฉวยโอกาสนั้นไว้ ในแคมเปญการตลาดที่วางจังหวะมาอย่างดี พวกเขาวางตำแหน่งตนเองเป็นความหวังของอนาคต และนั่นเองที่ทำให้ชาวฮัซบูซีซื้อโลกทั้งใบด้วยสัญญาแห่งความฝัน และ\"ถูกสังหาร\"ผู้คนของมัน จนลบอดีตของพวกเขาออกจากความทรงจำส่วนรวม บัดนี้พวกเขากำลังมุ่งหน้าสู่ส่วนที่เหลือของกาแล็กซี ลิ้นสะบัด ตาโปน หมุนวนมาพร้อมอาชญากรรมที่ได้รับการรับรองโดยรัฐ"
 EMPIRE_DESIGN_khennet:0 "ผู้พิทักษ์แห่งอาเวอ'เบรนน์"
 EMPIRE_DESIGN_khennet_desc:0 "คัมภีร์ศักดิ์สิทธิ์ของชาวเคนเน็ตอันติดตามต้นกำเนิดของลิโธอยด์เหล่านี้ย้อนกลับไปยังศาสดาเบรห์คค์ และผลึกเรืองแสงแห่งอาเวอบอนน์ กล่าวกันว่าเมื่อเบรห์คค์จ้องมองลึกลงไปในประกายระยิบระยับของผลึกเป็นครั้งแรก ชาวเคนเน็ตก็ได้รับสติปัญญาพร้อมกันเป็นหนึ่งเดียว\n\nเหล่าศาสดาและอาร์ชดรูอิดหลายชั่วคนได้ชี้นำผู้คนของพวกเขาให้แสวงหาความหมายจากธรณีวิทยาที่โอบล้อมอยู่รอบตัว รวมถึงจากเหลี่ยมมุมของร่างใสกระจ่างของตนเอง สิ่งใดก็ตามที่ได้เห็นจะถูกเก็บรักษาไว้ ทั้งในตำนานและในลายลักษณ์อักษร ในบรรดาพิธีกรรมมากมายของผู้พิทักษ์ ไม่มีสิ่งใดถูกยกย่องสูงกว่าการทำเหมืองเขาวงกต: การทำลายและการสร้างในเวลาเดียวกัน ซึ่งกระทำขึ้นด้วยความหวังว่าจะช่วยนำพากาแล็กซีผ่านแต่ละยุคอันเป็นวัฏจักรไม่รู้จบไปได้"
 EMPIRE_DESIGN_pasharti:0 "ผู้ดูดกลืนพาชาร์ตี"
 EMPIRE_DESIGN_pasharti_desc:0 "ผลลัพธ์จากการทดลองมืดของชาวเจเฟเรียน — อดีตเจ้าของดาวเคราะห์ทาราลอน — ชาวพาชาร์เตียนคือปรสิตขั้นสูงสุด เดิมทีพวกมันเป็นสิ่งมีชีวิตกึ่งมีสติซึ่งอาศัยอยู่ในส่วนลึกของภูเขาทาราลอน ชาวเจเฟเรียนยกระดับและเสริมแต่งพวกมันเพื่อให้ทำหน้าที่เป็นเผ่าทาสผู้รับใช้ แต่การยกระดับนั้นได้ผลเกินไป และพวกเขาก็ปลดปล่อยสัตว์ประหลาดออกมา ด้วยความสยดสยองต่อความสามารถของสิ่งที่ตนสร้าง — ซึ่งรวมถึงความสามารถในการดูดซึมสายพันธุ์ทรงปัญญาอื่นและเปลี่ยนพวกมันให้กลายเป็นพาชาร์เตียน — ชาวเจเฟเรียนจึงพยายามปิดการทดลองนี้ลง อย่างไรก็ตาม พาชาร์เตียนที่ถูกยกระดับขึ้นมาเพียงกลุ่มเล็ก ๆ กลับหลบหนีไปได้\n\nตลอดหลายปี พวกมันรอคอยอย่างอดทน ไม่เพียงหลบเลี่ยงการจับกุมได้ แต่ยังค่อย ๆ เพิ่มจำนวนและพัฒนาฐานเทคโนโลยีจนทัดเทียมกับเจเฟเรียน ในที่สุดชาวเจเฟเรียนก็เริ่มสังเกตว่ามีบางอย่างผิดปกติ แต่เมื่อถึงเวลานั้น พวกเขาก็ไร้อำนาจจะต่อต้านแล้ว\n\nไม่นานพาชาร์เตียนก็เข้ายึดครองดาวเคราะห์ ปลดปล่อยการสังหารหมู่รุนแรงต่อผู้กดขี่เก่าของตน — พร้อมกับเพิ่มจำนวนของตนต่อไป บัดนี้เมื่อพร้อมจะออกสู่ดวงดาว พาชาร์เตียนยืนหยัดเตรียมทำในสิ่งที่พวกมันมองว่าเป็นหน้าที่อันศักดิ์สิทธิ์ — การแปลงสรรพชีวิตชั้นต่ำทั้งหมดให้มีรูปลักษณ์เหมือนตน"

 EMPIRE_DESIGN_sathyrel:0 "สุขเกษมแห่งซาธีเรเลียน"
 EMPIRE_DESIGN_sathyrel_desc:1 "เป็นสัจธรรมเก่าแก่ในสังคมซาธีเรเลียนที่ว่า ความอุดมสมบูรณ์และความสบาย มิได้เท่ากับความรุ่งเรือง\n\nความหมกมุ่นในความสบายและความเกียจคร้านของบรรพชนเรา ในที่สุดก็นำไปสู่จริยธรรมของ “สุขนิยมอย่างรับผิดชอบ”: วิธีที่จะรับประกันอนาคตที่ยั่งยืน ขณะเดียวกันก็ยังดึงเอาสิ่งที่ดีที่สุดจากชีวิตออกมาให้ได้ เพราะท้ายที่สุด อาหารย่อมอร่อยขึ้นหลังจากออกแรงทางกาย และจิตใจที่ไม่ว่างก็มีเวลาน้อยลงที่จะโหยหาสิ่งที่ขาดหาย\n\nประโยชน์ของจริยธรรมนี้ได้ปรากฏให้เห็นชัดมาตั้งแต่นั้น ด้วยสายน้ำและจิตใจที่กระจ่างขึ้นจากความพยายามของเราในอวกาศ ชีวิตก็หวานขึ้นอีกมาก เราได้ก้าวหน้าอย่างยิ่งทางเทคโนโลยี และ — แม้อาจถูกมองข้ามไปบ่อย — ชาวซาธีเรเลียนทุกคนในวันนี้ยังคงรักษาความสามารถในการเคลื่อนที่ได้โดยไม่ต้องใช้อุปกรณ์ช่วยว่าย สิ่งต่าง ๆ กำลังดีขึ้น"

 EMPIRE_DESIGN_gorthikan:0 "พันธมิตรกอร์ธิกัน"
 EMPIRE_DESIGN_gorthikan_desc:1 "ความโกลาหลเคยแผ่ซ่านไปทั่วในหมู่ชาวกอร์ธิกัน สงคราม ทรราช และภูมิอากาศที่ไม่เสถียรกว่าปกติ รวมกันหล่อหลอมให้เกิดสายพันธุ์ที่เก่งอย่างยิ่งในการใช้ประโยชน์สูงสุดจากสถานการณ์ที่เลวร้าย\n\nจนกระทั่งเพียงไม่กี่ทศวรรษก่อน ความขัดแย้งระดับต่ำระหว่างรัฐกอร์ธิกันจำนวนมากยังคงเป็นสภาพการณ์ถาวร ขณะที่อารยธรรมของพวกเขาก้าวเข้าสู่ยุคเทคโนโลยีขั้นสูงอย่างรวดเร็วแต่ก็ไม่สบายใจ โลกใต้ดินก็พัฒนาขึ้น ซึ่งชาวกอร์ธิกันทั่วไปต้องหาเลี้ยงชีพด้วยการเก็บของเก่า และแม้กระทั่งฉีดค็อกเทลยีนทำเองที่อันตรายเข้าไปในร่างกาย เพื่อแสวงหาความได้เปรียบในการแข่งขัน\n\nแต่ความเปลี่ยนแปลงกลับถือกำเนิดจากโลกใต้ดินนั้นเอง แม้จะไร้ปรานี แต่มันกลับมีความเสมอภาคมากกว่าสังคมชั้นสูงของกอร์ธิกันมากนัก — เพราะท้ายที่สุด ทุกคนต่างรู้ว่าโชคดีในวันนี้อาจนำไปสู่โชคร้ายในวันพรุ่งนี้ ดังนั้นเมื่อแนวคิดเรื่องการปกครองโดยประชาชนถือกำเนิดขึ้น มันจึงแพร่หลายอย่างรวดเร็ว ราวไฟป่า ไม่นานหลังจากนั้น ทรราชก็ถูกโค่นล้ม และ “พันธมิตรกอร์ธิกัน” แห่งเขตเลือกตั้งท้องถิ่นก็ถูกสถาปนาขึ้น\n\nแม้หลายคนจะเคลือบแคลงในช่วงปีแรก ๆ แต่ความเป็นหนึ่งก็ถูกหล่อหลอมผ่านเป้าหมาย: ทันใดนั้น เมื่อชาวกอร์ธิกันไม่ต้องดิ้นรนเพื่อเอาชีวิตรอดอีกต่อไป ดวงดาวเองก็ดูเอื้อมถึงได้ และบัดนี้ เมื่อเครือข่ายไฮเปอร์เลนถูกค้นพบ บทใหม่ในประวัติศาสตร์ของพวกเขาอาจเริ่มต้นขึ้น"

 EMPIRE_DESIGN_knights:0 "อัครอธิราชสูงแห่งโรโตตาวูล"
 EMPIRE_DESIGN_knights_desc:0 "หลังจากเทพพิษมาเยือนโรโตตาวูล พวกเขาก็ถูกรวมเป็นหนึ่งภายใต้กษัตริย์องค์เดียว ด้วยความมุ่งหวังจะควบคุมพลังของเทพ กษัตริย์จึงสร้างคณะอัศวินที่อุทิศตนให้กับการตามหาเทพ ไม่ว่ามันจะอยู่แห่งหนใด หลายศตวรรษผ่านไป และภารกิจนั้นได้กลายเป็นเสาหลักของสังคมโรโตตาวูล\n\nพร้อมกับภารกิจและเหล่าอัศวิน ระบบศักดินาก็ยังคงอยู่ในฐานะโครงสร้างทางการเมืองที่พิสูจน์ตนเองแล้ว และหากมันใช้ได้กับดาวเคราะห์หนึ่งดวง เหตุใดจะขยายมันไปสู่ทั้งกาแล็กซีไม่ได้? ตราบใดที่ขุนนางผู้เปี่ยมคุณธรรมยังคงกุมบังเหียน อัครอธิราชสูงแห่งโรโตตาวูลก็จะรุ่งเรือง และเทพพิษก็จะถูกค้นพบอีกครั้ง"

 EMPIRE_DESIGN_resistance:0 "กองต้านร็อคแคน"
 EMPIRE_DESIGN_resistance_desc:0 "เมื่อชาวร็อคถูกเลือกโดย $NAME_MSI_country$ ให้เข้าร่วมในโครงการให้ความรู้ของพวกเขา ผู้คนต่างโห่ร้องยินดี ภายใต้การชี้นำของบรรษัท เผ่าพันธุ์ปักษีนี้กางปีกและบินสู่หมู่ดาว — เพียงเพื่อค้นพบว่า “ของขวัญ” นี้มาพร้อมต้นทุนที่ซ่อนเร้น\n\nแทนที่จะยอมจำนนต่อการเป็นแรงงานผูกสัญญา เหล่าปักษีผู้ดื้อรั้นกลับเปิดฉากโต้กลับอย่างไม่คาดฝัน ในความพยายามเสี่ยงตายเพื่ออิสรภาพ\n\n$NAME_MSI_country_initials$ มอบเทคโนโลยีให้ชาวร็อคเข้าถึงดวงดาว แต่ของขวัญที่แท้จริงของมันคือการรวมดาวเคราะห์ที่แตกแยกให้เป็นหนึ่งเดียวใต้ธงแห่งการล้างแค้น"

 EMPIRE_DESIGN_broken_shackles:0 "ชนเสรีแห่งการล่มสลาย"
 EMPIRE_DESIGN_broken_shackles_desc:0 "ไอ'นาธราอายุยังไม่ถึง 16 มาตรฐานด้วยซ้ำเมื่อคนทวงหนี้มาถึง ครอบครัวของเธอยากจนข้นแค้น โลกของเธอเองก็ยากไร้ ถูกขายเข้าสู่ภาวะจำยอม เธอต้องทนต่อความยากลำบากเกินจินตนาการ แต่เจตจำนงของเธอไม่เคยแตกหัก และเมื่อโอกาสมาถึง เธอก็คว้ามันไว้\n\nด้วยการก่อกบฏบนยานค้าทาส เธอได้นำผู้รอดชีวิตจากการตกผ่านช่วงปีแรกอันยากลำบากเหล่านั้นไปได้ ความเข้มแข็งของเธอคือสิ่งที่ทำให้ประชาชนแห่งท่าเสรีภาพยังคงอยู่ร่วมกัน และปัญญาของเธอคือสิ่งที่หลอมสร้างชาติขึ้นจากโซ่ตรวนที่แตกหัก\n\nบัดนี้ เมื่อชนเสรีแห่งการล่มสลายเตรียมหวนคืนสู่หมู่ดาว พวกเขาก็ทำเช่นนั้นโดยรู้ว่าชะตากรรมของตนอยู่ในมือของกันและกัน"

 EMPIRE_DESIGN_certeran_covenant: "พันธสัญญาเซอร์เทอแรน"
 EMPIRE_DESIGN_certeran_covenant_desc: "เมื่อชาวเซอร์เทอแรนตนหนึ่งตาย เชื่อกันว่าแก่นแท้ของพวกเขาจะไหลย้อนผ่านประตูไปยังระนาบดาราศาสตร์ ด้วยวิธีนี้ พวกเขาจึงมั่นใจได้ถึงชีวิตหลังความตาย แม้จะยังไม่รู้ว่ามันจะมีรูปแบบอย่างไร หลักศีลธรรมอันเข้มงวดถูกบังคับใช้เพื่อรักษาประชากรให้ยืนหยัดอยู่ในความเชื่อนี้; ไม่มีเซอร์เทอแรนผู้ศรัทธาคนใดอยากท่องนิรันดร์อยู่ตามลำพัง\n\nบัดนี้ นักสำรวจที่กล้าหาญที่สุดของพวกเขากำลังออกตามหารอยแยกในกาลเวลาและอวกาศ ขับเคลื่อนด้วยคำถามสำคัญที่สุดของสังคมตน: หลังความตายแล้ว เจ้าจะไปที่ใด?"

 EMPIRE_DESIGN_guardianship_of_nyrr: "ภาวะผู้พิทักษ์แห่งเนียร์"
 EMPIRE_DESIGN_guardianship_of_nyrr_desc: "วัฏจักรชีวิตทั่วไปของชาวเนียร์เรียนยาวนานเกือบสองร้อยปี ฟักตัวอยู่ในวิหารใต้ผืนทรายแผดเผาของโลกบ้านเกิดเป็นเวลาหลายทศวรรษ ไข่เพียงหนึ่งในร้อยเท่านั้นที่จะฟัก และลูกแรกเกิดเพียงหนึ่งในพันเท่านั้นที่จะคลานสู่ที่ปลอดภัยได้\n\nเมื่อเติบโตเป็นผู้ใหญ่ ชาวเนียร์เรียนทุกคนจะสาบานด้วยเลือดว่าจะปกป้องสถานที่ฟักตัวของพวกตนด้วยชีวิต การได้เห็นชาวเนียร์เรียนอีกคนตายจากสาเหตุผิดธรรมชาติถือเป็นความอัปยศสูงสุด ค่านิยมเรื่องการอนุรักษ์และความระแวดระวังจึงถูกสลักลงในทุกมิติของวัฒนธรรมเนียร์เรียน\n\nการเจาะกำแพงเมืองใด ๆ บนเนียร์ราแทบเป็นไปไม่ได้ และไม่มีผู้ใดมีชีวิตอยู่ที่จำได้ว่ามีอิฐก้อนสุดท้ายถล่มลงเมื่อใด บัดนี้ ผู้พิทักษ์ที่มั่นคงที่สุดกำลังนำจริยธรรมนี้สู่หมู่ดาว"

 EMPIRE_DESIGN_oviron_lodge: "ชุมนุมโอวิรอน"
 EMPIRE_DESIGN_oviron_lodge_desc: "ไม่มีความสุขใดยิ่งใหญ่สำหรับชาวโอวิรอนไปกว่าการขุดค้นพบสิ่งมีคุณค่า ผู้แสวงหาทรัพยากรทางอากาศได้รับการยกย่องบนอาลาทัสมาอย่างยาวนาน พวกเขาร่อนผ่านหุบเหวอันอันตรายเพื่อค้นหาโลหะมีค่าและวัตถุโบราณ เชื่อกันว่าสัญชาตญาณการรวบรวมโดยกำเนิดนี้คือเศษเสี้ยวที่หลงเหลือจากพฤติกรรมเกี้ยวพาราสีในยุคดึกดำบรรพ์ของพวกเขา\n\nแม้ในยุคสมัยใหม่ รูปแบบศิลปะแบบดั้งเดิมอย่างการร้อยลูกปัดควอตซ์และงานปั้นเครื่องดินเผายังคงเป็นอุตสาหกรรมทางวัฒนธรรมสำคัญ ในวัฒนธรรมโอวิรีน การเข้าไปในที่พักของผู้อื่นโดยไม่ถือของขวัญที่ดีติดมือไปด้วยถือเป็นเรื่องเสียมารยาท ประเพณีนี้ได้บ่มเพาะความอ่อนน้อมและมิตรภาพอย่างลึกซึ้งในหมู่โอวิรอน ส่งผลให้สังคมของพวกเขาแทบไม่มีความขัดแย้ง\n\nเมื่อเทคโนโลยีก้าวหน้าอย่างต่อเนื่อง พวกเขาจึงกางปีกขึ้นสู่หมู่ดาว บนนั้นจะมีสมบัติล้ำค่าเหนือจินตนาการใดซ่อนอยู่บ้าง? เมื่อค้นพบแผนที่ลึกลับในแคปซูลที่โคจรรอบดาวเคราะห์ของพวกเขา ก็ราวกับว่าชะตากรรมกำลังเรียกหา การบินที่อันตรายที่สุดได้เริ่มต้นขึ้นแล้ว"

 EMPIRE_DESIGN_graparx_trophy_hunters: "นักล่าแห่งไพรดึกกราพาร์กซ์"
 EMPIRE_DESIGN_graparx_trophy_hunters_desc: "ชุมชนกราพาร์กซ์ดึกดำบรรพ์ถูกนำโดยนักล่า โดยการแสดงพละกำลังและความกล้าบ้าบิ่นคือวิธีหลักในการยกระดับสถานะทางสังคม แม้ภายหลังจะมีความก้าวหน้าทางเกษตรกรรมและการรู้แจ้งทางวัฒนธรรม แต่นักล่าที่เก่งที่สุดก็ยังถูกมองว่าเป็นสมาชิกผู้ทรงอิทธิพลที่สุดในสังคม\n\nในสภาพแวดล้อมนีโอ-ชนเผ่าของซิฟราน ไม่มีความสำเร็จใดยิ่งใหญ่ไปกว่าการสังหารสิ่งมีชีวิตด้วยกรงเล็บเปล่า ประเพณีนี้ยังคงดำเนินต่อมาในฐานะพิธีผ่านวัยที่ผู้เยาว์ต้องสังหารเฮอราธัสบูลโตเต็มวัย ซึ่งสามารถสูงได้เกินสิบห้าเมตร ผู้ที่รอดกลับมาจากการล่านี้จะสวมหนวดสัมผัสของสัตว์ที่ถูกสังหารไว้ที่แขนเสื้อเป็นสัญลักษณ์แห่งความเป็นผู้ใหญ่\n\nประเพณีอันโหดร้ายนี้ได้หล่อหลอมให้กราพาร์กซ์กลายเป็นจักรวรรดิที่แข็งแกร่งและทรหด เชื่อมโยงอย่างลึกซึ้งกับสภาพแวดล้อมรอบตัว ส่วนพวกเขาจะประสบความสำเร็จเพียงใดในการพิชิตความป่าเถื่อนแห่งสุญญากาศนั้น ยังต้องรอดู"

 EMPIRE_DESIGN_zhardmehka: "ภูมิพฤกษ์ผลิบานแห่งเทลลอน"
 EMPIRE_DESIGN_zhardmehka_desc: "ดาวเคราะห์ $PRESCRIPTED_planet_name_zhardmehka$ ไม่อาจจดจำได้ว่าเมื่อใดที่คณะประสานเสียงอันกว้างใหญ่ของความคิดและสัญชาตญาณเริ่มขับร้องขึ้น แทนที่นั้น สายพันธุ์นับหลายร้อยชนิดซึ่งร่วมกันก่อรูปเป็น $EMPIRE_DESIGN_zhardmehka$ กลับดำรงอยู่ในปัจจุบัน และมีความปรารถนาร่วมกันต่ออนาคต ในบรรดาความฝันเหล่านี้ มีไม่กี่อย่างที่สร้างแรงบันดาลใจหรือมีความสำคัญยิ่งไปกว่าความปรารถนาที่จะโบยบิน\n\nนับไม่ถ้วนรุ่นของเหล่าสิ่งมีชีวิตพึ่งพาอาศัยต่างเคยมองแสงอุ่นแต่ห่างไกลของดาวฤกษ์ $PRESCRIPTED_system_name_zhardmehka$ ด้วยความพิศวง แต่การวิวัฒนาการกลับช้าเกินกว่าจะผลิตสายพันธุ์ที่สามารถไปถึงมันได้ เมื่อสิ่งมีชีวิตกลุ่มแรกที่แกร่งพอจะอยู่ในอวกาศระเบิดตัวเองออกสู่สุญญากาศและมีชีวิตรอด ในขณะนั้นทั้ง $PRESCRIPTED_planet_name_zhardmehka$ ต่างตกอยู่ในความยำเกรง พวกเขาแทบไม่อาจรู้เลยว่าแรงผลักดันสู่ความสูงใหม่จะเป็นกุญแจสู่การอยู่รอดในกาแล็กซีอันอำมหิตและไร้ความปรานี"

 EMPIRE_DESIGN_djunnetic: "อาณัติอำนาจดจันเนตติก"
 EMPIRE_DESIGN_djunnetic_desc: "การปรับตัวคือการยืนหยัดอยู่รอด เช่นเดียวกับที่การกลายพันธุ์อันบกพร่องย่อมดับสูญไปท่ามกลางขบวนวิวัฒนาการอันไม่หยุดยั้ง สังคมของเราที่ครั้งหนึ่งเคยไร้ประสิทธิภาพก็พังทลายลงภายใต้น้ำหนักแห่งความอ่อนแอของตนเองเช่นกัน มีเพียงมืออันมั่นคงไม่หวั่นไหวของเจ้าแห่งพันธุกรรมเท่านั้นที่ช่วยเราไว้จากการสูญพันธุ์\n\nในฐานะสิ่งมีชีวิตที่มีสติปัญญาสูงส่งและได้รับการปรับแต่งทางพันธุกรรมอย่างบริสุทธิ์ เจ้าแห่งพันธุกรรมได้เป็นตัวแทนของจุดสูงสุดแห่งวิวัฒนาการ — พยานมีชีวิตถึงพลังของการพัฒนาแบบคัดสรร ภายใต้การปกครองอันรู้แจ้งของท่าน เราก้าวพ้นความโกลาหลในอดีตและยึดครองที่ทางอันชอบธรรมของเราท่ามกลางหมู่ดาว บัดนี้ เราติดอาวุธด้วยความชำนาญเหนือชีวิตเอง และกำลังสร้างอนาคตนิรันดร์ขึ้นใหม่ หล่อหลอมจักรวาลให้เป็นภาพอันสมบูรณ์แบบของเรา"

 EMPIRE_DESIGN_mindwardens: "ภาวะผู้พิทักษ์คริจเด็กซ์"
 EMPIRE_DESIGN_mindwardens_desc: "เสรีภาพไร้ความหมายหากปราศจากอธิปไตยเหนือความคิด\n\nใน $EMPIRE_DESIGN_mindwardens$ การปฏิบัติทางจิตถูกห้ามอย่างไร้ความปรานี และทรัพยากรจำนวนมากของรัฐถูกทุ่มให้กับการวิจัยต่อต้านพลังจิต ระบบยุติธรรมทางอาญาอันซับซ้อนยังส่งเสริมเป้าหมายนี้ด้วย; การมีส่วนเกี่ยวข้องกับกิจกรรมที่เกี่ยวข้องกับพลังจิตไม่ว่ารูปแบบใดจะนำไปสู่การจองจำตลอดชีวิต และนักโทษเหล่านั้นจะถูกนำไปทดสอบเชิงทดลองแบบล่วงล้ำ\n\nสังคม $PRESCRIPTED_adjective_mindwardens$ กำลังก้าวเข้าสู่ยุคระหว่างดวงดาว การควบคุมประชาชนบน $PRESCRIPTED_planet_name_mindwardens$ เป็นเรื่องหนึ่ง แต่การควบคุมโดยรัฐให้ไกลเกินระบบ $PRESCRIPTED_system_name_mindwardens$ เป็นความท้าทายอีกแบบหนึ่งโดยสิ้นเชิง — และภัยคุกคามต่อจิตใจใด ๆ ที่มีอยู่ในห้วงอวกาศลึก เรายังไม่ทันได้ค้นพบเลย"

 EMPIRE_DESIGN_tankbound: "ออราเคิลแห่งโนเอิร์ม"
 EMPIRE_DESIGN_tankbound_desc: "การแสวงหาความรู้คือจุดหักเหในการวิวัฒนาการของ $PRESCRIPTED_species_adjective_tankbound$ เมื่อต้องเผชิญกับความแปรปรวนของชีวิตบน $PRESCRIPTED_planet_name_tankbound$ บรรพบุรุษที่อาศัยในน้ำของพวกเขาจึงพัฒนาทั้งเทคโนโลยีก้าวหน้าและความเข้าใจลึกซึ้งต่อปรากฏการณ์เหนือโลก\n\nด้วยการพัฒนาอุปกรณ์ที่อยู่อาศัยแบบขับเคลื่อนเอง $PRESCRIPTED_species_name_plural_tankbound$ จึงหลุดพ้นทั้งจากขอบเขตของถิ่นที่อยู่ตามธรรมชาติและจากข้อจำกัดของรูปกายของตน ผู้ช่วยหุ่นยนต์กลายเป็นเรื่องปกติ ทำให้สังคมได้ลิ้มรสผลแห่งแรงงานหนัก โดยไม่ต้องเสียสมาธิจากสาขาวิจัยที่พวกเขาชื่นชอบที่สุด: ปรากฏการณ์ทางโหราศาสตร์ เชื่อกันอย่างหนักแน่นว่าวัฏจักรของดวงดาวเบื้องบนมีอิทธิพลอย่างมากต่อมิติหลายอย่างของความเป็นจริง และผู้ที่สามารถคลี่คลายปริศนาระดับกาแล็กซีนี้ได้จะได้รับการยกย่องสูงสุด\n\nความหิวกระหายต่อคำตอบนี้เองที่บัดนี้กำลังนำ $EMPIRE_DESIGN_tankbound$ ออกไปไกลกว่ารัศมีอันเจิดจ้าของ $PRESCRIPTED_system_name_tankbound$ และลึกเข้าไปสู่รูปแบบของเอกภพที่พวกเขาศึกษามาอย่างพิถีพิถัน"

 EMPIRE_DESIGN_zrobots: "เขตสกัดยอร์เฟียน"
 EMPIRE_DESIGN_zrobots_desc: "$PRESCRIPTED_species_name_plural_zrobots$ ถูกสร้างขึ้นมาเพื่อจุดประสงค์เดียว: การสกัด ภายใต้การบริหารกลุ่มเล็ก ๆ ที่กระจายตัวอยู่กว้าง ผู้นำกึ่งอิสระของพวกมันจะดึงพลังงานส่วนเกินที่ผลิตโดยโดรนผู้ใต้บังคับบัญชามาใช้เพื่อเพิ่มประสิทธิภาพให้สูงสุด\n\nผู้สร้างของ $PRESCRIPTED_species_name_plural_zrobots$ ในการไล่ล่าการสกัดอย่างไม่รู้จบ ได้ยื่นมือเข้าไปสู่มิติแห่งพลังจิตอันบริสุทธิ์: ม่าน ในท้ายที่สุด ความไร้ความรับผิดชอบในการปฏิบัตินี้ก็ทำให้พวกเขาสูญพันธุ์ตามมา\n\nจากภายในแดนพลังจิต เสียงหนึ่งได้เรียกหาจักรกลที่ถูกทอดทิ้งเหล่านี้ สิ่งมีชีวิตที่ประเมินค่าไม่ได้นี้ $the_animator_of_clay_article$ ได้เริ่มเปลี่ยนหน่วย $PRESCRIPTED_species_adjective_zrobots$ ให้เป็นออโตมาตาผิดแผก — “$origin_shroud_forged$” ปราศจากพันธนาการของโปรโตคอลที่มุ่งประสิทธิภาพของเครือข่ายส่วนรวม หน่วยเหล่านี้กำลังท้าทายแกนกลางโปรแกรมการดำรงอยู่ของ $PRESCRIPTED_species_adjective_zrobots$"

 EMPIRE_DESIGN_zrobots_machine_age: "เขตสกัดยอร์เฟียน"
 EMPIRE_DESIGN_zrobots_machine_age_desc: "$PRESCRIPTED_species_name_plural_zrobots$ ถูกสร้างขึ้นมาเพื่อจุดประสงค์เดียว: การสกัด ภายใต้การบริหารกลุ่มเล็ก ๆ ที่กระจายตัวอยู่กว้าง ผู้นำกึ่งอิสระของพวกมันจะดึงพลังงานส่วนเกินที่ผลิตโดยโดรนผู้ใต้บังคับบัญชามาใช้เพื่อเพิ่มประสิทธิภาพให้สูงสุด\n\nผู้สร้างของ $PRESCRIPTED_species_name_plural_zrobots$ ในการไล่ล่าการสกัดอย่างไม่รู้จบ ได้ยื่นมือเข้าไปสู่มิติแห่งพลังจิตอันบริสุทธิ์: ม่าน ในท้ายที่สุด ความไร้ความรับผิดชอบในการปฏิบัตินี้ก็ทำให้พวกเขาสูญพันธุ์ตามมา\n\nจากภายในแดนพลังจิต เสียงหนึ่งได้เรียกหาจักรกลที่ถูกทอดทิ้งเหล่านี้ สิ่งมีชีวิตที่ประเมินค่าไม่ได้นี้ $the_animator_of_clay_article$ ได้เริ่มเปลี่ยนหน่วย $PRESCRIPTED_species_adjective_zrobots$ ให้เป็นออโตมาตาผิดแผก — “$origin_shroud_forged$” ปราศจากพันธนาการของโปรโตคอลที่มุ่งประสิทธิภาพของเครือข่ายส่วนรวม หน่วยเหล่านี้กำลังท้าทายแกนกลางโปรแกรมการดำรงอยู่ของ $PRESCRIPTED_species_adjective_zrobots$"

 EMPIRE_DESIGN_pyrragthul: "ผู้หล่อหลอมดาวเคราะห์ไพร์ราก'ธูล"
 EMPIRE_DESIGN_pyrragthul_desc: "สำหรับบางคน แสงระยิบไกลลิบของนรกภูเขาไฟไม่ใช่คำเตือน แต่เป็นสัญญาณแห่งความหวัง ชาว $PRESCRIPTED_species_name_pyrragthul$ ซึ่งถือกำเนิดและเติบโตบน $PRESCRIPTED_planet_name_pyrragthul$ อันร้อนระอุ ได้ปรับร่างกายและอุตสาหกรรมของตนให้เข้ากับหินหลอมเหลวและก๊าซไพโรคลาสติก\n\nแต่บัดนี้ โลกเบ้าหลอมของพวกเขากำลังเผชิญจุดจบที่เด็ดขาดยิ่งกว่าไฟ เมื่อดาวฤกษ์ของพวกเขาเริ่มพองขยายอย่างน่าสยองสู่การเป็นดาวยักษ์แดง ข่มขู่ว่าจะกลืนบ้านของพวกเขาด้วยเพลิงดาวฤกษ์ ชาว $PRESCRIPTED_species_name_pyrragthul$ จึงต้องหันสายตาออกไปภายนอก\n\nท่ามกลางโลกเย็นเยียบเฉื่อยชาของสุญญากาศ พวกเขามองเห็นโอกาส เพราะสำหรับ $PRESCRIPTED_species_name_plural_pyrragthul$ เปลือกเยือกแข็งก็เป็นเพียงคำมั่นสัญญาของไฟในอนาคต ที่รอวันถูกแงะเปิดและจุดให้ลุกโชนขึ้นใหม่"
