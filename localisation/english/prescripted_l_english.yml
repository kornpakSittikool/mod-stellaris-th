 EMPIRE_DESIGN_humans1:0 "สหประชาชาติแห่งโลก"
 EMPIRE_DESIGN_humans1_desc:0 "นานาชาติมนุษย์อันหลากหลายซึ่งประกอบกันขึ้นเป็นรัฐบาลระหว่างดวงดาวของพวกเขา แม้จะแตกต่างกัน แต่ก็เป็นหนึ่งเดียวกันในจุดมุ่งหมาย มนุษย์เลี้ยงลูกด้วยนมสองขาเหล่านี้ได้พัฒนาสังคมที่ส่งเสริม และแม้กระทั่งเติบโตได้ด้วยเสรีภาพส่วนบุคคลและความแตกต่างทางวัฒนธรรม — ด้วยเหตุนี้ มนุษย์จึงมักผสานเข้ากับประชากรต่างดาวได้ดี\n\nอย่างไรก็ตาม พวกเขามีประเพณีทางทหารอันแข็งแกร่ง (ซึ่งเกิดจากสงครามสลับช่วงยาวนานนับพันปีบนโลกบ้านเกิด) และธรรมชาติที่บางครั้งก็ก้าวร้าวและคาดเดาไม่ได้ของพวกเขาก็ไม่ควรถูกประเมินต่ำไป"
 EMPIRE_DESIGN_humans2:0 "เครือจักรภพแห่งมนุษย์"
 EMPIRE_DESIGN_humans2_desc:1 "โครงการอินิชิเอทีฟ ของยูลิสซิสภายใต้การสนับสนุนของสหประชาชาติ ได้กำกับดูแลการสร้างยานอาร์คชิปขนาดมหึมา 6 ลำในวงโคจรต่ำของโลกช่วงปลายศตวรรษที่ 21 เรือเหล่านี้บรรทุกผู้ตั้งอาณานิคมลำละสองแสนห้าหมื่นคน และถูกส่งผ่านปรากฏการณ์ซับสเปซที่เพิ่งค้นพบบริเวณขอบนอกของเมฆออร์ต — รูหนอนขนาดเล็กที่ไม่เสถียร ไม่มีใครได้ยินข่าวจากพวกเขาอีก และรูหนอนที่ไร้เสถียรก็หายไป\n\nแต่โดยที่โลกไม่ล่วงรู้ ยานอาร์คชิปหนึ่งในนั้นรอดจากการเดินทางและตั้งอาณานิคมอันรุ่งเรืองบนดวงจันทร์ต่างดาวอันอุดมสมบูรณ์ ผู้บุกเบิกที่เชื่องโลกแห่งนี้ได้ตั้งใจจะทำให้ชะตากรรมที่เปิดเผยของมนุษยชาติเป็นจริง — ครอบครองกาแล็กซีไม่ว่าต้องแลกด้วยสิ่งใด"
