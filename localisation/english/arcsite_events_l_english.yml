l_english:
  site_ice_trauma:0 "ใต้น้ำแข็ง"
  site_ice_trauma_desc:0 "ดินแดนรกร้างอันกว้างใหญ่ที่ถูกปกคลุมไปด้วยน้ำแข็งของ [from.planet.GetName] เคยเป็นมหาสมุทรที่ทอดตัวอยู่เหนือปล่องภูเขาไฟใต้ทะเลอันลึก แม้ว่าสภาพแวดล้อมจะไม่สามารถรองรับสิ่งมีชีวิตได้อีกต่อไป แต่เราได้ตรวจพบซากปรักหักพังของชุมชนเรือดำน้ำโบราณในร่องน้ำแข็งใกล้กับพื้นผิวของดาวเคราะห์"
  arcsite.1000.name:0 "ยอดแหลมผีสิง"
  arcsite.1000.desc:0 "ทีม [owner.GetScientistPlural] ของเราได้ตั้งค่ายพักแรมไว้รอบๆ ขอบทะเลสาบน้ำแข็งที่ดูเป็นประกาย เมื่อมองด้วยแสงที่เพียงพอ จะเห็นเงาของหอคอยลอยอยู่ใต้น้ำ มันยื่นขึ้นจากพื้นทะเลสาบราวกับหนวดที่มั่นคง\n\nทีมงานที่ประสบการณ์น้อยของเรายังคงปรับตัวให้เข้ากับการทำงานในความหนาวเย็นที่กัดกินและไร้ชีวิตชีวาได้ไม่ดีนัก ถึงอย่างนั้น การขุดค้นของเราก็ดำเนินไปอย่างรวดเร็ว เราได้ค้นพบแอร์ล็อกจำนวนมาก ซึ่งทั้งหมดถูกออกแบบมาสำหรับเรือดำน้ำยุคดึกดำบรรพ์ แต่ยังไม่มีวี่แววของตัวเรือเองเลย ไม่ว่าผู้อยู่อาศัยในหอคอยจะอยู่หรือหนีไป ท่าเรือทุกแห่งก็ถูกทิ้งร้าง"
  arcsite.1000.a:0 "เราควรลงทุนเพิ่มเติมในเทคนิคการทำลายน้ำแข็งเหล่านี้"
  arcsite.1005.name:0 "ร่องรอยการใช้งาน"
  arcsite.1005.desc:0 "ขณะที่เรายังคงขุดเอาน้ำแข็งส่วนใหญ่รอบๆ ที่อยู่อาศัยที่ถูกแช่แข็งต่างๆ ออกไป ทีม [owner.GetScientistPlural] ของเราที่หอคอยเทียบเรือก็ได้ค้นพบคอมพิวเตอร์เทอร์มินัลโบราณ เครื่องโลหะที่เปราะบางของมันดูเหมือนจะ... ถูกกัดแทะ\n\nเทอร์มินัลสามารถบูตเครื่องได้อย่างถูกต้องหลังจากได้รับการซ่อมแซมเล็กน้อย เครือข่ายข้อมูลขนาดใหญ่ของที่อยู่อาศัยยังคงออฟไลน์ แต่เราสามารถอนุมานข้อมูลจำนวนมากจากแคชในพื้นที่ ซึ่งมีข้อมูลรายการสินค้าในสต็อก ไฟล์บุคลากร และสิ่งที่ดูเหมือนจะเป็นบันทึกภารกิจ"
  arcsite.1010.name:0 "การพัฒนาที่น่ากังวล"
  arcsite.1010.desc:0 "ความรู้ของเราเกี่ยวกับชุมชนโบราณบนดาว [from.planet.GetName] ลึกซึ้งขึ้น แต่ความกังวลของเราก็เพิ่มขึ้นเช่นกัน สิ่งที่เราค้นพบคือซากของอาณานิคมชายแดน - ซากของอารยธรรมที่ถูกลืมไปนานจนเราไม่สามารถแม้แต่จะระบุชื่อของพวกเขาได้\n\nเมื่อมหาสมุทรเป็นคุณสมบัติที่โดดเด่นกว่าบนดาวดวงนี้ กลุ่มผู้ตั้งถิ่นฐานที่แตกต่างกันถูกนำมาจากดาวบ้านเกิดของพวกเขาและถูกเกณฑ์เป็นลูกเรือเรือดำน้ำรุ่นบุกเบิก เป้าหมายของพวกเขา: เพื่อสร้างอาณานิคมและใช้ประโยชน์จากทรัพยากรธรรมชาติของดาวเคราะห์ อย่างไรก็ตาม ความจริงของพวกเขาคือการทดลองทางชีวภาพที่ไม่มีการควบคุม การเปลี่ยนแปลงทางการเมืองที่รุนแรง และอันตรายอย่างมากจากการต่อสู้กับ §Yพืชและสัตว์ที่ดุร้าย§!\n\nบันทึกเซ็นเซอร์จากทุ่นนำทางดูเหมือนจะติดตามลูกเรือคนหนึ่งที่กำลังเดินทางไปยังจุดตรวจใกล้เคียง เราเชื่อว่าเรือของพวกเขาอาจจะยังอยู่ที่นั่น ถูกแช่แข็งอยู่ในน้ำแข็งพร้อมกับแคชวัสดุที่มีประโยชน์"
  arcsite.1010.a:0 "จัดทีมวิจัยทันที"
  arcsite.1010.b:0 "มาดูกันว่าเราสามารถเรียนรู้อะไรได้บ้างเกี่ยวกับสัตว์ทะเลที่ดุร้ายเหล่านั้น"
  arcsite.1016.name:0 "ไฟและน้ำ"
  arcsite.1016.desc:0 "น้ำแข็งที่ดำมืดล้อมรอบถ้ำที่เราพบซากเรือดำน้ำโบราณที่บิดเบี้ยวและถูกไฟไหม้ ถ้ำที่ถูกเผาไหม้นี้ได้รับการปกป้องจากวัฏจักรการแช่แข็ง-ละลายของดาวเคราะห์ดวงนี้ ได้รักษาร่องรอยของภัยพิบัติหลายอย่างที่เกิดขึ้นกับลูกเรือกลุ่มนี้ไว้\n\nเครื่องยนต์นิวเคลียร์ที่หยาบของเรือมีร่องรอยของการซ่อมแซมแบบเร่งรีบ ในห้องพักของลูกเรือเราพบรอยขีดข่วนและคราบสารเคมีที่จางๆ ในบางช่วงยานหนีภัยทั้งหมดของเรือดำน้ำถูกใช้งาน แต่มีเพียงลำเดียวเท่านั้นที่ยังคงอยู่ใกล้ๆ - มันติดอยู่ภายในปล่องลาวาที่สงบ\n\nมีข้อมูลอีกไม่มากที่จะสามารถหาได้จากซากเรือที่ถูกไฟไหม้นี้ แต่จุดหมายปลายทางของลูกเรือที่ต้องคำสาป - §Yแหล่งเสบียง§! ของอาณานิคม - ยังคงอยู่ครบถ้วน ดังนั้นทีมกู้คืนของเราจึงสามารถกอบกู้สิ่งที่ลูกเรือเรือดำน้ำที่ถึงวาระไม่สามารถทำได้"
  arcsite.1017.name:0 "เรือดำน้ำที่ปกครองตนเอง"
  arcsite.1017.desc:0 "เราได้ขุดผ่านน้ำแข็งจำนวนมากเพื่อค้นหาซากเรือดำน้ำที่ยังคงสภาพเดิม ซึ่งถูกปิดผนึกไว้ในถ้ำที่ไม่มีอากาศเข้าออก สภาพน้ำแข็งในทุ่งทุนดราได้เปลี่ยนสารอินทรีย์ทั้งหมดให้กลายเป็นฝุ่นละเอียดมานานแล้ว แต่พวกมันก็ได้รักษาสมบัติทางวัฒนธรรมไว้มากมายเช่นกัน\n\nการสำรวจทางมานุษยวิทยาของเราชี้ให้เห็นถึงแหล่งกิจกรรมทางการเมืองที่ร้อนแรง เนื่องจากลูกเรือของเรือดำน้ำนี้ได้แยกตัวออกจากอาณานิคมใกล้เคียง พวกเขาได้ประกาศเขตแดนอธิปไตยหลายแห่งภายในตัวเรือดำน้ำของตนเอง โดยยึดถืออุดมการณ์ทางการเมืองทุกประเภท น่าแปลกที่การแบ่งฝ่ายที่รุนแรงนี้ดูเหมือนจะเสริมสร้างความผูกพันทางสังคมของลูกเรือนี้มากกว่าที่จะทำให้พวกเขาแยกจากกัน เรื่องนี้แน่นอนว่าจะจุดประกายการถกเถียงอย่างมีชีวิตชีวาในหมู่นักวิทยาศาสตร์การเมืองของเราเอง"
  arcsite.1017.auth.a:0 "... ทำให้เราก้าวไปหนึ่งขั้นเหนือผู้ไม่เห็นด้วย"
  arcsite.1018.name:0 "มรดกทางพันธุกรรม"
  arcsite.1018.desc:0 "เราคาดว่าซากเรือโบราณเช่นนี้จะถูกบดขยี้ไปนานแล้ว แต่เรากลับพบว่าซากเรือที่ได้รับความเสียหายนี้ถูกแช่แข็งอย่างรวดเร็ว โดยรักษาส่วนบนของมันไว้พร้อมกับซากสิ่งมีชีวิตจำนวนมาก บางส่วนดูเหมือนจะเป็นสัตว์พื้นเมือง: มีขนาดใหญ่ ดุร้าย และมีลักษณะเป็นนักล่าอย่างแน่นอน ส่วนที่เหลือดูเหมือนจะเป็นเหยื่อของพวกมัน: กลุ่มเล็กๆ ของสิ่งมีชีวิตที่มีสติปัญญาที่สวมชุดอวกาศ\n\nสิ่งมีชีวิตเหล่านี้ - ลูกเรือของเรือดำน้ำ - ไม่ได้มีต้นกำเนิดบนดาว [fromfrom.planet.GetName] แต่จากการชันสูตรของเราชี้ให้เห็นว่ามนุษย์ต่างดาวเหล่านี้ได้ทำการผสมยีนของตัวเองเข้ากับวัสดุจากสิ่งมีชีวิตในท้องถิ่น เราทำได้เพียงแค่จินตนาการว่าอะไรเป็นแรงผลักดันให้ผู้อาศัยในอาณานิคมปรับเปลี่ยนตัวเองอย่างกว้างขวางเช่นนี้ แต่เราก็ปฏิเสธไม่ได้ว่า: ด้วยการรักษาสารพันธุกรรมนี้ไว้ในตัวของพวกเขาเอง พวกเขาได้สร้างความมั่นใจในการอยู่รอดของประวัติศาสตร์ทางพันธุกรรมอันมีค่า"
  arcsite.1018.phobe.a:0 "ช่างเป็นความน่ารังเกียจที่เลวทราม"
  arcsite.1018.b.evopred: "ช่างเป็นเผ่าพันธุ์ที่ฉลาดล้ำ"
  arcsite.1020.name:0 "บททดสอบที่ถูกแช่แข็ง"
  arcsite.1020.desc.intro:0 "หลังจากสำรวจทุกสิ่งที่เราทำได้จากซากเรือดำน้ำและที่อยู่อาศัยที่ถูกทอดทิ้ง ทีมของเราบนดาว [from.planet.GetName] กำลังเตรียมที่จะรวมตัวกันใกล้กับพื้นผิวของดาวเคราะห์ มีหลายสิ่งที่เรายังไม่รู้เกี่ยวกับอาณานิคมนี้ สิ่งที่เราพบส่วนใหญ่เป็นเพียงมรดกที่ผสมผสานกันของชีวิตบนชายแดนที่โดดเดี่ยวเป็นพิเศษ"
  arcsite.1020.tech.desc:0 "$arcsite.1020.desc.intro$\n\nแม้พวกเขาจะขาดการเดินทางที่เร็วกว่าแสง แต่นักเดินเรือดำน้ำโบราณเหล่านี้ก็ได้นำพาเราไปสู่ความก้าวหน้าอันน่าทึ่งในด้านอื่นๆ พวกเขาค้นพบสิ่งเหล่านี้ในความยากลำบาก ซึ่งเป็นสิ่งที่เราสามารถพยายามหลีกเลี่ยงที่จะประสบด้วยตัวเอง"
  arcsite.1020.default.desc:0 "$arcsite.1020.desc.intro$\n\nแม้ว่าอารยธรรมของพวกเขาจะยังไม่มีเทคโนโลยีการเดินทางที่เร็วกว่าแสง แต่ความยากลำบากดูเหมือนจะนำพาอาณานิคมเรือดำน้ำนี้ไปสู่ความก้าวหน้าอย่างยิ่งในด้านวิทยาศาสตร์และเศรษฐศาสตร์ ซึ่งตอนนี้เรามีอิสระที่จะใช้ประโยชน์"
  arcsite.1020.a:0 "เรื่องราวเตือนใจเหล่านี้อาจเป็นประโยชน์ต่อผู้ตั้งถิ่นฐานของเรา"
  arcsite.1020.b:0 "ที่อยู่อาศัยใต้พื้นผิวเป็นแนวคิดที่น่าสนใจ"
  arcsite.1020.c:0 "เราสามารถใช้อาวุธของเรือดำน้ำนั้นให้เกิดประโยชน์ได้"
  arcsite.1020.a.memorialist:0 "เราจะรำลึกถึงความทรงจำของพวกเขา"
  arcsite.1020.a.prospectors:0 "กิจการที่น่าสนใจ"
  ice_trauma_insights_colony:0 "มรดกของนักเดินเรือดำน้ำที่ถูกแช่แข็ง"
  ice_trauma_insights_engineering:0 "ความเฉลียวฉลาดของนักเดินเรือดำน้ำที่ถูกแช่แข็ง"
  ice_trauma_memorialist_unity:0 "เพื่อรำลึกถึงนักเดินเรือดำน้ำที่ถูกแช่แข็ง"
  site_engineered_species:0 "ฟอสซิลที่อุดมสมบูรณ์"
  site_engineered_species_desc:1 "[from.planet.GetName] ดูเหมือนจะเป็นดาวเคราะห์ที่อยู่อาศัยได้ตามมาตรฐาน แต่เมื่อตรวจสอบอย่างใกล้ชิด ทีมวิจัยของเราได้พบกับชั้นฟอสซิลขนาดใหญ่ในสภาพที่ดูเหมือนจะได้รับการอนุรักษ์ไว้อย่างดี น่าสนใจว่ากลุ่มก้อนที่ใหญ่กว่านั้นมีตัวอย่างหลายชิ้นในชั้นเดียวกัน ซึ่งบ่งชี้ว่าพวกมันตายในเวลาเดียวกันหรือถูกวางไว้ที่นั่นโดยเจตนา การตรวจสอบซากเหล่านี้ทำให้เรามีโอกาสที่จะทำความเข้าใจกระบวนการวิวัฒนาการของสิ่งมีชีวิตที่อาศัยอยู่บนดาวเคราะห์ดวงนี้ได้ดีขึ้น"
  arcsite.2000.name:0 "กองกระดูกมากมาย"
  arcsite.2000.desc:0 "เราได้สแกนพื้นผิวและพบชั้นหินที่น่าสนใจไม่กี่แห่ง ซึ่งเต็มไปด้วยซากของสิ่งมีชีวิตหลากหลายสายพันธุ์ บางชนิดคล้ายกับสิ่งมีชีวิตที่ยังคงมีชีวิตอยู่บนพื้นผิว ในขณะที่บางชนิดไม่เหมือนกับสิ่งที่เราเคยเห็นมาก่อนเลย\n\nแม้ว่างานจะยากลำบากและสัตว์ป่าจะตื่นตระหนกจากการปรากฏตัวของเรา แต่ [leader.GetName] ก็ได้ค้นพบที่น่าทึ่งแล้วและสามารถสร้างสิ่งมีชีวิตที่สูญพันธุ์บางชนิดขึ้นมาใหม่ได้ ซึ่งทำให้เกิดข้อพิพาทในหมู่ทีมวิจัย ในขณะที่บางคนต้องการจัดแสดงสิ่งมีชีวิตเหล่านี้ในนิทรรศการ แต่คนอื่นๆ ต้องการศึกษาวัสดุนี้ เนื่องจากพวกมันเป็นฟอสซิลที่ได้รับการอนุรักษ์ไว้ดีที่สุดเท่าที่เคยพบมา และแหล่งขุดค้นนี้ก็ใกล้จะหมดแล้ว"
  arcsite.2000.study:0 "ศึกษาฟอสซิล"
  arcsite.2000.use:0 "นำไปจัดนิทรรศการ"
  arcsite.2001.name:0 "การศึกษาฟอสซิล"
  arcsite.2001.desc:0 "เราได้ทำการวิจัยอย่างกว้างขวางเพื่อพิจารณาความสัมพันธ์ของสายพันธุ์ฟอสซิลกับชีวภาพปัจจุบันบนดาว [from.planet.GetName] ปรากฏว่าบางส่วนของพวกมันเป็นของสกุลเดียวกัน และมีความคล้ายคลึงกันหลายอย่าง การศึกษาเพิ่มเติมอาจนำคำตอบมาให้เราได้มากขึ้น"
  arcsite.2002.name:0 "นิทรรศการระหว่างดาวเคราะห์"
  arcsite.2002.desc:0 "มีผู้คนจำนวนไม่น้อยที่มาที่นิทรรศการของเรา แม้ว่าเราจะไม่สามารถใช้วัสดุที่รวบรวมมาเพื่อการวิจัยของเราได้ แต่เราก็สามารถดึงดูดผู้ให้ทุนที่ใจกว้างได้บางส่วน และส่งฟอสซิลไปทัวร์ระหว่างดาวเคราะห์ รูปลักษณ์ที่แปลกประหลาดของสิ่งที่จัดแสดงทำให้เกิดการบูมเล็กน้อยของผู้ที่สนใจในโบราณคดีของมนุษย์ต่างดาว"
  arcsite.2010.name:0 "ผู้อาศัยในถ้ำ"
  arcsite.2010.desc:0 "เมื่อเราใช้แหล่งขุดค้นแรกจนหมดแล้ว เราตัดสินใจที่จะย้ายไปยังสถานที่ที่ห่างไกลกว่าเพื่อค้นหาวัสดุเพิ่มเติมสำหรับการวิจัย [leader.GetName] พบจุดที่ดีพอสมควร นั่นคือถ้ำที่เคยเป็นบ้านของสิ่งมีชีวิตที่ฉลาดและสูญพันธุ์ การตรวจสอบและการสำรวจอย่างระมัดระวังได้เผยให้เห็นบางสิ่งที่ไม่ธรรมดา: สิ่งมีชีวิตที่เคยอาศัยอยู่ในถ้ำนี้ใช้สีย้อมที่เฉียบแหลมซึ่งจะปรากฏขึ้นเมื่อสัมผัสกับความร้อนและแสง\n\nเราได้ระบุภาพวาดสองประเภท: ประเภทหนึ่งบอกเล่าเรื่องราวในอดีต และอีกประเภทหนึ่งแสดงภาพชีวิตประจำวัน น่าเสียดายที่เราได้ทำลายระบบนิเวศที่ละเอียดอ่อนที่รักษารูปวาดไว้ ปฏิกิริยาลูกโซ่ที่เกิดขึ้นร่วมกับอายุของสีย้อม ทำให้มันจางลงและหายไปในเวลาอันสั้น ทีมงานต้องตัดสินใจว่าจะรักษารูปใดไว้"
  arcsite.2010.study:0 "รักษาประวัติศาสตร์"
  arcsite.2010.use:0 "รักษาชีวิตประจำวัน"
  arcsite.2011.name:0 "ประวัติศาสตร์ของผู้อาศัยในถ้ำ"
  arcsite.2011.desc:0 "เราได้บันทึกภาพวาดที่เกี่ยวข้องกับอดีตและได้รับข้อมูลเชิงลึกเกี่ยวกับประวัติศาสตร์ของสายพันธุ์นี้ ปรากฏว่าผู้อาศัยในถ้ำเหล่านี้ได้ติดต่อกับอารยธรรมที่ก้าวหน้าซึ่งมีอิทธิพลต่อรูปลักษณ์และการพัฒนาของพวกเขาไม่มากก็น้อย จากการพรรณนาถึงสิ่งมีชีวิต เราสันนิษฐานว่าสายพันธุ์นี้มีแนวโน้มที่จะกลายพันธุ์ทางพันธุกรรมอย่างรวดเร็ว และรูปลักษณ์ของพวกเขาในแต่ละรุ่นมีความแตกต่างกันอย่างมาก"
  arcsite.2012.name:0 "ชีวิตของผู้อาศัยในถ้ำ"
  arcsite.2012.desc:0 "เราได้บันทึกภาพวาดที่เกี่ยวข้องกับชีวิตประจำวันและได้รับข้อมูลเชิงลึกเกี่ยวกับประวัติศาสตร์ของสายพันธุ์นี้ พวกมันแสดงให้เห็นว่าผู้อาศัยในถ้ำเป็นกลุ่มของสิ่งมีชีวิตที่มีรูปลักษณ์แตกต่างกันแต่มีความฉลาดใกล้เคียงกัน ซึ่งมีส่วนร่วมในพิธีกรรมที่ซับซ้อน [leader.GetName] สันนิษฐานว่าสิ่งมีชีวิตต่างๆ อาบแสงจากเทพเจ้า ทำงานให้เขา และได้รับการปลดปล่อยเป็นการตอบแทน"
  arcsite.2020.name:0 "โครงสร้างกระดูก"
  arcsite.2020.desc:0 "สำรวจลึกลงไปในรอยแยกที่ลึกของถ้ำ เราพบกับถ้ำเล็กๆ ที่มีโครงสร้างกระดูกแปลกๆ อยู่ภายใน จากสภาพปัจจุบันของโครงสร้าง ดูเหมือนว่ามันจะพังทลายลงและจมลงสู่พื้นดิน - น่าจะเป็นผลมาจากแผ่นดินไหว [Leader.GetName] สั่งให้ตั้งค่าย และเราได้ทำการสแกนรอบๆ แล้ว แต่พื้นดินไม่มั่นคง เราอาจมีเวลาไม่เพียงพอที่จะตรวจสอบโครงสร้างนี้อย่างเต็มที่เมื่อเราเข้าไปข้างใน\n\nผลลัพธ์ที่มีศักยภาพสูงสุดสำหรับการศึกษาของเราอยู่ที่ตัวอาคารเอง เราสามารถเลือกที่จะศึกษาวัสดุที่คล้ายกระดูกที่น่าสนใจ หรือมุ่งความพยายามไปที่การสำรวจ โดยค้นหาโครงสร้างเพื่อหาเบาะแสเพิ่มเติมเกี่ยวกับมนุษย์ต่างดาวที่สร้างและใช้มัน และกิจวัตรประจำวันของพวกเขา"
  arcsite.2020.study:0 "ศึกษาอาคาร"
  arcsite.2020.use:0 "ศึกษาภายในของมัน"
  arcsite.2021.name:0 "โครงสร้างที่มีชีวิต"
  arcsite.2021.desc:0 "หลังจากการวิจัยที่ไร้เหตุการณ์ [Leader.GetName] ได้สรุปว่าอาคารนี้... มีชีวิต ไม่ใช่ตอนนี้ แต่เมื่อหลายปีก่อน บางช่วงระหว่างการสร้าง มันเป็นก้อนของกระดูกและเนื้อเยื่อที่ถูกหลอมรวมกันเพื่อสร้างอาคารที่สามารถปรับเปลี่ยนรูปทรงได้ตามวัตถุประสงค์ที่ต้องการ จากลักษณะที่อาคารพังทลายลง อาจสันนิษฐานได้ว่านี่เป็นการกระทำโดยเจตนาของตัวโครงสร้างเอง\n\nน่าเสียดายที่เราได้ทำให้โครงสร้างเสียหายระหว่างการศึกษา และมันก็พังทลายลงไปอีก ทำให้ตัวอาคารไม่สามารถใช้ประโยชน์ในการวิจัยต่อไปได้ [Leader.GetName] สั่งให้ทีมเดินหน้าต่อไป"
  arcsite.2022.name:0 "อารยธรรมใต้ดิน"
  arcsite.2022.desc:0 "ภายในของโครงสร้างที่น่าขนลุกนี้กลายเป็นเขาวงกตของทางเดินที่พังครึ่งหนึ่งซึ่งเต็มไปด้วยวัสดุที่คล้ายกระดูกที่วางอยู่ทุกที่ ด้วยความยากลำบาก เราสามารถดึงเครื่องมือและวัตถุหลายอย่างออกมาได้ ซึ่งบ่งชี้ว่าวัฒนธรรมที่ซับซ้อนเคยอาศัยอยู่บนดาวเคราะห์ดวงนี้ พวกมันจะให้ข้อมูลเชิงลึกที่ยอดเยี่ยมเกี่ยวกับชีวิตของสิ่งมีชีวิตที่สูญพันธุ์เหล่านี้อาจเป็นอย่างไร\n\nน่าเสียดายที่เราได้ทำให้โครงสร้างเสียหายระหว่างการศึกษา และมันก็พังทลายลงไปอีก ทำให้ตัวอาคารไม่สามารถใช้ประโยชน์ในการวิจัยต่อไปได้ [Leader.GetName] ได้สั่งให้ทีมเดินหน้าต่อไป"
  arcsite.2030.name:0 "โรงงานใต้ดิน"
  arcsite.2030.desc:0 "ในที่สุดเราก็มาถึงปลายสุดของถ้ำ เราเข้าไปในสิ่งที่คล้ายกับบังเกอร์เก่าที่ถูกทิ้งร้างซึ่งสร้างไว้ลึกใต้ดิน มันไม่เหมือนกับสิ่งที่เราเคยพบมาก่อนเลย: เราสันนิษฐานว่าผู้มาเยือนจากต่างดาวได้ตั้งห้องปฏิบัติการวิจัยไว้ที่นี่ และจากถังที่ทรุดโทรม กระดูกต่างๆ และฟอสซิลที่วางอยู่รอบๆ พวกเขาก็กำลังศึกษาสายพันธุ์เหล่านี้เหมือนกับที่เราทำ... เพียงแต่พวกเขามีโอกาสที่จะทำการวิจัยในขณะที่ตัวอย่างของพวกเขายังมีชีวิตอยู่\n\n[Leader.GetName] กระโดดเข้าทำงานทันที พยายามรวบรวมข้อมูลที่เป็นประโยชน์จากแหล่งและธนาคารข้อมูลทันทีที่เราเสียบปลั๊กไฟ"
  arcsite.2030.proceed:0 "เราจะค้นพบความลับอะไรบ้าง?"
  arcsite.2040.name:0 "ความก้าวหน้า"
  arcsite.2040.revelation.desc:0 "เราได้เปรียบเทียบความรู้ของเราจากการศึกษาครั้งก่อนกับข้อมูลจากธนาคารข้อมูล บทสรุปที่เราได้นั้นน่าเป็นห่วง ปรากฏว่าเมื่อหลายพันปีก่อน อารยธรรมที่เดินทางในอวกาศได้ลงจอดบนโลกนี้และพบว่าตัวอย่างพื้นเมืองง่ายต่อการฝึกฝน โดยใช้เทคนิคการจัดการพันธุกรรมของพวกเขา ในตอนแรก พวกเขาทำให้ประชากรของสิ่งมีชีวิตที่มีสติปัญญา - แม้ว่าจะยังไม่พัฒนาเต็มที่ - ตกเป็นทาส และทำการทดลองต่างๆ กับพวกมัน ซึ่งรวมถึงการทำให้พวกมันกลายเป็นเนื้อเยื่อที่มีชีวิตเพื่อวัตถุประสงค์ในการก่อสร้าง หรือเป็นทาสที่เชื่อฟัง หรือเป็นสัตว์เลี้ยงและปศุสัตว์\n\nเหตุการณ์ก่อนหน้านี้ที่เราพบอาจเป็นซากของสายพันธุ์เหล่านี้ก่อนที่พวกมันจะเสื่อมถอยไปสู่ชีวภาพที่ไม่มีสติปัญญาซึ่งตอนนี้เจริญเติบโตบนดาว [from.planet.GetName] นี่คือจุดจบที่น่าสยดสยองสำหรับสายพันธุ์ที่ครั้งหนึ่งอาจสามารถเดินทางข้ามกาแล็กซีได้เช่นเดียวกับที่เราทำ"
  arcsite.2040.ignorance.desc:0 "ปรากฏว่าเมื่อหลายพันปีก่อน อารยธรรมที่ก้าวหน้าพบว่าตัวอย่างที่อาศัยอยู่ที่นี่เป็นการศึกษาที่น่าสนใจ พวกเขาหลงใหลในชีวภาพที่หลากหลาย ธนาคารข้อมูลเก่ายังคงทำงานอยู่ ซึ่งเต็มไปด้วยข้อสรุปที่แปลกประหลาดและการทดลองที่น่ากังวลบางอย่าง พวกมันมีองค์ประกอบทางพันธุกรรมพื้นฐานของสายพันธุ์และวิธีที่พวกมันอาจพัฒนาในอดีตและอนาคต\n\nเกิดอะไรขึ้นกับนักวิจัยเอง? พวกเขาเสื่อมถอยไปสู่สถานะของผู้อาศัยในถ้ำที่เราพบก่อนหน้านี้หรือไม่? หรืออาจจะตรงกันข้าม และพวกเขาพัฒนามาจากพวกมัน โดยทิ้งดาวเคราะห์ไว้ในบางช่วง? มันทำให้เราสงสัย: จักรวาลนี้มีความลับอื่นใดอีกบ้าง?"
  arcsite.2040.revelation:0 "นี่มันแย่มาก"
  arcsite.2040.ignorance:0 "จักรวาลเต็มไปด้วยสิ่งมหัศจรรย์"
  arcsite.2040.phobe:0 "สิ่งนี้พิสูจน์ได้ว่า Xenos ไม่น่าเชื่อถือ!"
  arcsite.2040.phile:0 "อาชญากรรมเช่นนี้จะเป็นไปไม่ได้ภายใต้รัฐบาลของเรา!"
  arcsite.2040.evopred.ignorance: "ช่างเป็นความคิดริเริ่มที่เปี่ยมด้วยความเมตตา!"
  arcsite.2040.evopred: "กาแล็กซีเป็นสถานที่ที่โหดร้าย"
  engineered_species_revelation:0 "ความจริงอันโหดร้าย"
  engineered_species_revelation_desc:0 "ในขณะที่เราสามารถยอมรับความรู้ของมนุษย์ต่างดาวที่ตายไปนานแล้วและสิ่งมีชีวิตที่พวกเขานำมาทดลองการจัดการทางพันธุกรรมได้ มันก็พิสูจน์ให้เราเห็นว่าอวกาศไม่ใช่สถานที่ที่เป็นมิตร มันง่ายที่จะเปลี่ยนจากผู้ล่าเป็นเหยื่อ"
  engineered_species_ignorance:0 "จักรวาลลึกลับ"
  engineered_species_ignorance_desc:0 "การสำรวจจักรวาลคือการกระทำที่เต็มไปด้วยสิ่งมหัศจรรย์ มันน่าทึ่งที่ชีวิตสามารถเจริญเติบโตได้แม้ในมุมที่ไกลที่สุดของกาแล็กซีและในสภาพที่อันตรายที่สุด ผู้คนของเราที่หลงใหลในเรื่องราวของสิ่งมีชีวิตที่หลากหลายที่อยู่ร่วมกันอย่างกลมกลืน พร้อมที่จะเผชิญหน้ากับความลึกลับของจักรวาล"
  engineered_species_ownway:0 "ความคิดที่เป็นหนึ่งเดียว"
  engineered_species_ownway_desc:0 "จักรวาลโหดร้าย แต่เราต้องยึดมั่นในเส้นทางของเรา เพื่อที่เราจะได้ไม่ทำตามความผิดพลาดของผู้ที่มาก่อนเรา"
  site_debris_belt:0 "แถบซากปรักหักพัง"
  site_debris_belt_desc:0 "การสแกนระบบ [From.Planet.System.GetName] ของเราแสดงให้เห็นว่าแถบดาวเคราะห์น้อยของมันเป็นสายพันธุ์ที่ไม่ธรรมดา แทนที่จะเป็นส่วนผสมมาตรฐานของหิน น้ำแข็ง และเศษซากอวกาศที่มักจะประกอบเป็นรูปแบบดังกล่าว ดูเหมือนว่าจะเป็นซากของที่อยู่อาศัยเทียมขนาดใหญ่จำนวนหนึ่ง สิ่งเหล่านี้ต้องถูกทำลายด้วยความรุนแรงอย่างไม่น่าเชื่อเมื่อหลายพันปีที่แล้ว ความลับที่บอกเล่าไม่ได้อาจถูกบรรจุไว้ในเขตซากปรักหักพังที่เกิดขึ้น แต่ก็กว้างขวางมากจนการทำแผนที่อาจต้องใช้เวลาพอสมควร"
  r_odryskan_crystal:0 "คริสตัลแห่ง Odryskia"
  r_odryskan_crystal_desc:0 "คริสตัลที่มีมูลค่ามหาศาล ว่ากันว่ามูลค่าของแม้แต่เศษชิ้นเดียวก็เพียงพอที่จะขับจิตใจของมนุษย์ให้บ้าคลั่งได้"
  r_odryskan_crystal_regular_effect:0 "หนึ่งในนักวิทยาศาสตร์ของเราอาจได้รับคุณสมบัติ §Y$leader_trait_maniacal$§!"
  NAME_The_Cabin:0 "ห้องโดยสาร"
  arcsite.2500.name:0 "ห้องโดยสาร"
  arcsite.2500.desc:0 "เราไม่ใช่คนแรกที่ค้นพบแถบซากปรักหักพังในระบบ §Y[From.Planet.System.GetName]§!: ยาน - เล็กมากจน [Root.Owner.GetResearchers] ของเราตั้งชื่อมันว่า "ห้องโดยสารอวกาศ" - ได้ถูกพบ โดยมีซากของมนุษย์ต่างดาวประเภททอกซอยด์เพียงคนเดียวและคริสตัลข้อมูลจำนวนมาก เมื่อพิจารณาจากอัตราการสลายตัว การคาดเดาที่ดีที่สุดของเราคือมนุษย์ต่างดาวคนนี้หมดอายุไปเมื่อไม่กี่ศตวรรษที่แล้ว"
  arcsite.2505.name:0 "การพำนักอันยาวนาน"
  arcsite.2505.desc:0 "คริสตัลข้อมูลที่ค้นพบในห้องโดยสารอวกาศของมนุษย์ต่างดาวนั้นเป็นบันทึกภารกิจ อันที่จริงแล้ว ทีม [Root.Owner.GetResearchers] ของเราได้ส่งตัวอย่างมาให้เราพร้อมกับการแปลเบื้องต้น พวกมันเริ่มต้นด้วยโทนที่ร่าเริง:\n\n"นี่คือโอกาสครั้งหนึ่งในชีวิต ซากปรักหักพังของ Odryskans ในตำนานอยู่ใกล้แค่เอื้อม บ้านใหม่ของฉันไม่ใหญ่มาก แต่มันก็ดีพอสำหรับฉัน และในไม่ช้าฉันจะสามารถส่งเครดิตกลับบ้านได้มากพอที่จะจ่ายค่ารักษาลูกสาวของฉัน"\n\nแต่ในไม่ช้าบันทึกก็เริ่มมีโทนที่เปรี้ยวจี๊ด:\n\n"ภรรยาและลูกสาวตายไปแล้ว ไม่มีใครเหลือไว้ให้ฉันไว้ทุกข์ การกอบกู้ที่ขายในตลาดมืดแทบไม่พอที่จะรองรับค่าครองชีพได้ สายเกินไปที่จะย้อนกลับแล้ว"\n\nสรุปแล้ว มนุษย์ต่างดาวใช้เวลากว่าห้าทศวรรษในการลากเศษซากในแถบเพื่อค้นหาสมบัติที่ดูเหมือนจะไร้ประโยชน์"
  arcsite.2505.A:0 "แน่นอนว่าพวกเขาต้องพบอะไรบางอย่างในหลายปีที่ผ่านมา!"
  arcsite.2515.name:0 "ความวิปลาส"
  arcsite.2515.desc:0 "มันไม่จริง\nมันไม่จริง\nมันไม่จริง\nมันไม่จริง\n§Rโกหก!§!\n...\n...\n...\nแต่ถ้ามันเป็นเรื่องจริงล่ะ?\n\nบันทึกมีความน่ากังวลมากขึ้นเรื่อยๆ เมื่อมนุษย์ต่างดาวเริ่มเข้าสู่ความวิกลจริต"
  arcsite.2520.name:0 "ความสงบในที่สุด"
  arcsite.2520.desc:0 "ทีม [Root.Owner.GetResearchers] ของเราได้แปลคริสตัลข้อมูลของมนุษย์ต่างดาวเสร็จแล้ว พวกเขาเสนอการตีความบันทึกสุดท้าย ซึ่งไม่นานก่อนที่พวกเขาจะเสียชีวิต ผู้บันทึกได้สัมผัสกับช่วงเวลาที่หาได้ยากของความมีสติ:\n\n"ในที่สุดฉันก็พบสิ่งที่ฉันกำลังมองหา หลายคนจะถือว่าฉันบ้าที่ค้นหามานานขนาดนี้ ฉันคิดว่าพวกเขาพูดถูก ฉันแก่แล้ว - กำลังจะตายด้วยซ้ำ - และญาติของฉันก็กลายเป็นฝุ่นไปนานแล้ว ไม่มีเหตุผลที่จะขายสิ่งประดิษฐ์นี้ แต่บางทีตอนนี้ฉันอาจจะพบความสงบสุข"\n\nบันทึกต่อไปเพื่อระบุว่ามนุษย์ต่างดาวซ่อนสมบัติไว้ที่ไหน ด้วยการติดตามพวกมัน เราได้ตามหาอัญมณีขนาดใหญ่อย่างน่าทึ่งซึ่งมีมูลค่าประเมินไม่ได้"
  arcsite.2520.A:0 "สิ่งล้ำค่าของเรา..."
  site_krazura_dig: "สถานที่เมืองหลวงโบราณ"
  site_krazura_desc: "เราได้ค้นพบซากปรักหักพังของเมืองโบราณบนดาว [From.Planet.GetName] เมื่อพิจารณาจากขนาดและขอบเขตแล้ว ที่นี่น่าจะเป็นเมืองหลวงหรือศูนย์กลางการบริหารของอารยธรรมที่เดินทางในอวกาศที่สำคัญ\n\nจำเป็นต้องมีการขุดค้นอย่างเต็มรูปแบบเพื่อระบุที่มาของมันอย่างถูกต้อง"
  arcsite.3025.name: "รังที่พัง"
  arcsite.3025.desc: "วิหารอันยิ่งใหญ่และวัดที่ถูกทำลายทับถมกันอยู่บนภูมิทัศน์ของเมืองหลวง การสำรวจที่ลึกลงไปเผยให้เห็นว่าอารยธรรมนี้ถูกทำลายเมื่อกว่าครึ่งล้านปีก่อน\n\nจากการค้นพบภาพจิตรกรรมฝาผนังหลายภาพที่ได้รับการอนุรักษ์ไว้อย่างดี ผู้อยู่อาศัยดูเหมือนจะเป็นสิ่งมีชีวิตที่มีลักษณะเป็นนก การถอดความภาษาของพวกเขาอย่างคร่าวๆ ระบุว่าพวกเขาเรียกตัวเองว่า Krazura"
  arcsite.3025.a: "ขุดต่อไป"
  arcsite.3030.name: "ซากแยก"
  arcsite.3030.intro: "การขุดค้นเพิ่มเติมส่งผลให้เกิดการค้นพบที่น่าตกใจ: ห้องที่มีขนาดใหญ่มากจนสามารถรองรับภูเขาที่เล็กกว่าบนดาวเคราะห์ได้ แม้ว่าการก่อสร้างจะยิ่งใหญ่ แต่ 'ห้องโถงใหญ่' นี้ก็ไม่มีการทำงานที่ชัดเจน มีเพียงทางเข้าและทางออกเดียวเท่านั้น\n\nผนังของห้องที่มีรูปร่างเกือบเป็นทรงกลมแสดงหลักฐานที่ชัดเจนของการบิดเบี้ยวของมิติ เป็นเรื่องที่สมเหตุสมผลที่จะสรุปได้ว่าห้องนี้ถูกสร้างขึ้นรอบๆ รูหนอนหรือพอร์ทัลย่อยอวกาศอื่นๆ"
  arcsite.3030.a.desc: "$arcsite.3030.intro$\n\nยิ่งไปกว่านั้น ภาพจิตรกรรมฝาผนังที่สลักไว้ด้านนอกห้องโถงได้ให้การค้นพบที่เหลือเชื่อ: ดาวเคราะห์ดวงนี้ไม่ใช่ใครอื่นนอกจาก Skravird บ้านเกิดของนายพล Skrand Sharpbeak ผู้โด่งดัง!"
  arcsite.3030.b.desc: "$arcsite.3030.intro$\n\nภาพจิตรกรรมฝาผนังที่สลักไว้ด้านนอกห้องโถงบ่งชี้ว่าดาวเคราะห์ดวงนี้เคยถูกเรียกว่า Skravird"
  arcsite.3030.tt: "เปลี่ยนชื่อดาวเคราะห์เป็น §YSkravird§!"
  arcsite.3031.name: "ไม่มีรังไหนเหมือนบ้าน"
  arcsite.3031.desc: "คุณพบ Skravird แล้ว ฉันคิดว่าบ้านของฉันหายไปตลอดกาล\n\nการมีโอกาสได้สัมผัสพื้นดินด้วยกรงเล็บของฉัน รู้สึกถึงลมใต้ที่อบอุ่นพัดผ่านขนของฉัน... สิ่งที่คุณทำเพื่อฉันและเพื่อประชาชนของฉันนั้นเหนือกว่าการวัดใดๆ\n\nฉันรู้สึกสดชื่นทั้งร่างกายและจิตใจ คุณได้รับความขอบคุณจากฉัน"
  arcsite.3031.a: "ขอให้นายพลโชคดี"
  arcsite.3035.name: "ดวงตาที่เปิดกว้าง"
  arcsite.3035.desc: "เราได้ยืนยันแล้วว่าชาว Krazura ไม่ได้เป็นชาวพื้นเมืองของมิติของเรา พวกเขาเดินทางมาถึงผ่านพอร์ทัลบางประเภท และพบว่าตัวเองลอยอยู่ท่ามกลางกาแล็กซีที่แปลกและต่างดาว ต่อมา ห้องโถงใหญ่ถูกสร้างขึ้นรอบๆ สถานที่ที่พวกเขามาถึง\n\nบันทึกที่เหลือเพียงเล็กน้อยบ่งชี้ว่าพวกเขามองว่าตัวเองเป็นผู้ตัดสินพลังที่ยิ่งใหญ่และลึกลับ ผู้นำสูงสุดของพวกเขาที่รู้จักกันในชื่อ 'Yakura' เชื่อกันว่าเป็นบุคคลเดียวที่กลับชาติมาเกิดในร่างใหม่ในแต่ละรุ่น\n\nใต้ห้องโถงใหญ่ เราได้ขุดค้นซากของผู้ปกครองหลายคนดังกล่าว สิ่งที่น่าสนใจคือคนที่เก่าแก่ที่สุดมีโครงสร้างทางพันธุกรรมที่แตกต่างจากคนที่ตามมา ดูเหมือนว่าการเดินทางมายังจักรวาลนี้ส่งผลกระทบต่อ DNA ของชาว Krazura ทำให้เกิดการปรากฏตัวของดวงตา 'คู่' ชุดหนึ่ง"
  arcsite.3035.b.evopred: "DNA ระหว่างมิติที่คุณพูดถึง?"
  arcsite.3040.name: "ภัยคุกคาม"
  arcsite.3040.desc: "ชาว Krazura เริ่มต้นในฐานะผู้ลี้ภัยในจักรวาลของเรา อย่างไรก็ตาม บันทึกที่ค้นพบใกล้ห้องโถงใหญ่แสดงให้เห็นว่าพวกเขาสถาปนาตนเองอย่างรวดเร็วเป็นอาณาจักรระหว่างดวงดาวที่ทรงพลัง เป็นเวลาหลายชั่วอายุคน พวกเขาเพลิดเพลินกับยุคทอง ผู้คนของพวกเขามีความเจริญรุ่งเรือง และความสามารถและอำนาจสูงสุดของ Yakura ไม่เป็นที่น่าสงสัย จากนั้นภัยคุกคามก็ปรากฏขึ้น\n\nศัตรูที่ไม่เหมือนกับที่พวกเขาเคยเผชิญหน้ามาก่อน ศัตรูที่ไม่มีชื่อนี้ดูเหมือนจะหมกมุ่นอยู่กับการทำลายล้างของพวกเขา ปราชญ์ผู้ยิ่งใหญ่ที่สุดของชาว Krazura ยืนอยู่ต่อหน้าภัยคุกคามที่ไม่มีใครต้านทานได้ เวทมนตร์อันยิ่งใหญ่ของพวกเขากลายเป็นไร้ประโยชน์"
  arcsite.3045.name: "การอพยพครั้งสุดท้าย"
  arcsite.3045.a.desc: "เราได้ค้นพบคลังบันทึกที่ให้เบาะแสเกี่ยวกับชะตากรรมของชาว Krazura\n\nผู้บัญชาการเรือธงของกองทัพเรือคือนายพลในตำนาน วีรบุรุษผู้ยิ่งใหญ่ของประชาชนของเขา ก่อนที่ภัยคุกคามจากมนุษย์ต่างดาวจะบรรลุชัยชนะครั้งสุดท้าย เขาและลูกเรือของเขาถูกส่งไปในภารกิจที่กล้าหาญครั้งสุดท้าย ในการเสนอราคาเพื่อเอาชนะศัตรู พวกเขาได้เข้าสู่เกตเวย์ที่ยังไม่ผ่านการทดสอบ ยานและลูกเรือของมันไม่เคยมีใครได้ยินอีกเลย\n\nเกิดอะไรขึ้นยังคงเป็นปริศนา เป็นไปได้ไหมที่เรือลำนี้ยังคงอยู่ที่ไหนสักแห่ง?"
  arcsite.3045.b.desc: "เราได้ค้นพบคลังบันทึกที่ให้เบาะแสเกี่ยวกับชะตากรรมของชาว Krazura\n\nในการเสนอราคาที่กล้าหาญเพื่อเอาชนะศัตรู Yakura สั่งให้เรือธงเข้าสู่เกตเวย์ที่ยังไม่ผ่านการทดสอบ ผู้บัญชาการคือ Admiral Skrand Sharpbeak ในตำนาน\n\nเขาและลูกเรือของเขาคือผู้สืบทอดมรดกที่น่าทึ่ง ไม่ว่า Skrand จะต้องการยอมรับตำแหน่งหรือไม่ก็ตาม ตอนนี้ผู้คนของเขามองเขาเป็น Yakura"
  arcsite.3045.a: "ขอให้ปีกของเขาโบยบิน"
  arcsite.3055.name: "นกอันตราย"
  arcsite.3055.desc: "แม้ว่าความก้าวหน้าโดยรวมจะหยุดชะงัก แต่ [owner.GetResearchers] ของเราได้เปิดเผยทางเข้าสู่ห้องที่ไม่เคยถูกค้นพบมาก่อน ภายในมีรูปปั้นขนาดใหญ่ ดูน่าเกรงขามพอๆ กับที่มันสวยงาม\n\nมีรูปร่างเป็นนก คอยาวและแข็งแรงทำจากโลหะที่สามารถลอยอยู่ได้ ขนที่แหลมคมพุ่งออกมาจากกะโหลกที่ดูสูงส่ง และดวงตาของมันเป็นสีทองที่แสดงถึงพลัง เมื่อเดินผ่านห้อง ทีม [owner.GetResearchers] ของเรามีความรู้สึกไม่สบายใจว่าพวกเขากำลังถูกจับตามอง\n\nด้านหลังรูปปั้น พวกเขาค้นพบประตูหรือตราประทับที่ซ่อนอยู่ แต่สิ่งที่นกอันตรายนี้กำลังเฝ้าอยู่ได้หยุดทำงานไปนานแล้ว"
  arcsite.3060.name: "ขนเน่า"
  arcsite.3060.desc: "จากสิ่งที่เราได้ค้นพบมาจนถึงตอนนี้ อารยธรรมนี้ไม่ใช่คนแปลกหน้าต่อโศกนาฏกรรม\n\nบันทึกโบราณที่เก็บไว้ในห้องใต้ดินหรือสุสานบางประเภท ให้รายละเอียดเกี่ยวกับการระบาดของโรคระบาดครั้งใหญ่ ซึ่งส่งผลกระทบต่อสรีรวิทยาของนกของสายพันธุ์นี้ในลักษณะที่น่าสยดสยองโดยเฉพาะ\n\nเริ่มต้นที่ขน ไวรัสทำให้ขนเน่าที่ราก ภายในไม่กี่วัน ผลกระทบเหล่านี้ก็แพร่กระจายไปในเลือด เราไม่สามารถรู้ได้อย่างแน่นอน แต่การประมาณการเบื้องต้นระบุอัตราการเสียชีวิตที่มากกว่า 30%\n\nมีการสร้างอนุสรณ์สถานอันน่าประทับใจขึ้นในจัตุรัสกลางเมืองแห่งหนึ่ง บนกองกระดูก นกโครงกระดูกตัวเดียวมองขึ้นไปบนท้องฟ้าอย่างสิ้นหวัง ขนที่ร่วงหล่นกระจัดกระจายอยู่รอบๆ กรงเล็บที่เปราะบางคู่หนึ่ง"
  arcsite.3060.a: "น่าสยดสยองแม้แต่จะนึกถึง"
  arcsite.3060.b: "น่ากลัว"
  arcsite.9000.name:0 "การเฝ้าดูที่โดดเดี่ยว"
  arcsite.9000.desc:0 "หัวหน้านักโบราณคดี [leader.GetName] เริ่มถอนตัวมากขึ้นเรื่อยๆ ในช่วงหลัง [leader.GetHeSheCap] ดูเหมือนจะสนใจเป้าหมายการวิจัยของเราน้อยลง โดยเลือกที่จะหมกมุ่นอยู่กับไดอารี่และบันทึกต่างๆ ที่เราได้ค้นพบมาจนถึงตอนนี้ [leader.GetHeSheCap] มักจะพึมพำเกี่ยวกับ "คนเหล่านี้ต้องเหงาแค่ไหน"\n\nเป็นไปได้ว่าความเยือกเย็นของแหล่งขุดค้นนี้กำลังส่งผลกระทบ เราสามารถจัดให้มีการให้คำปรึกษาสำหรับทีมทั้งหมด หรือเชื่อว่า [leader.GetName] จะพบทางออกในงาน [leader.GetHisHer] ของเขา"
  arcsite.9000.a:0 "จัดการเรื่องนี้ สุขภาพของทีมเราสำคัญที่สุด"
  arcsite.9000.b:0 "ปล่อย [leader.GetHimHer] ไว้ บางที [leader.GetHeShe] อาจจะเจออะไรบางอย่าง"
  arcsite.9001.desc:0 "หัวหน้านักโบราณคดี [absconded_archaeologist.GetName] ได้หลบหนีไป โดยนำข้อมูลทางมานุษยวิทยาจำนวนมากของเราไปด้วย [absconded_archaeologist.GetHimHer] ทีมงานรายงานว่ารถภาคพื้นดินหนึ่งคันหายไป แต่ชุดสภาพแวดล้อมของเรายังคงอยู่ที่ฐาน\n\nเป็นไปได้ว่า [absconded_archaeologist.GetName] หนีไปที่ที่อยู่อาศัยเรือดำน้ำอื่นที่ใดที่หนึ่งทั่วทุ่งทุนดรา แต่ตามความเป็นจริง... เราต้องสันนิษฐานถึงสิ่งที่เลวร้ายที่สุด"
  arcsite.9001.a:0 "น่าเสียใจอย่างยิ่ง"
  arcsite.9002.desc:0 "นักโบราณคดี [leader.GetName] ได้รับผลกระทบอย่างหนัก แม้ว่าตอนนี้พวกเขาจะดูเหนื่อยล้ามาก แต่ [leader.GetHeShe] ก็ได้กลับมาร่วมทีมและเสนอสมมติฐานที่น่าสนใจ ดูเหมือนว่าเราได้มองข้ามรายละเอียดเล็กน้อยหลายอย่างในเอกสารส่วนตัว เมื่อรวมกันแล้ว เบาะแสเหล่านี้ก็ให้ความก้าวหน้าอย่างที่เราหวังไว้"
  arcsite.9002.a:0 "แต่คุ้มค่ากับราคาที่ต้องจ่ายหรือไม่?"
  arcsite.9005.name:0 "เครื่องทำลายน้ำแข็ง"
  arcsite.9005.desc:0 "ทีมขุดค้นบนดาว [fromfrom.planet.GetName] ได้ทำงานอย่างใกล้ชิดกับ [owner.GetResearchers] ของเราบนดาว [owner.capital_scope.GetName] เพื่อลองใช้วิธีแก้ปัญหาใหม่ๆ สำหรับการทำงานในทุ่งทุนดราที่โหดร้าย ทีมภาคพื้นดินได้ติดตั้งรถขุดต้นแบบซึ่งการออกแบบอาศัยเทคนิคการปรับปรุงภูมิประเทศเป็นอย่างมาก\n\nการทดลองเบื้องต้นชี้ให้เห็นว่าเครื่องนี้จะเร่งงานของเราที่นี่อย่างมาก อย่างไรก็ตาม พวกเขาได้ระบุ §Hความเสี่ยงหลายประการ§! จะต้องใช้เงินทุนเพิ่มเติมหากเราจะพยายามบรรเทาความเสี่ยงเหล่านั้น"
  arcsite.9005.a:0 "ความเสี่ยงและค่าใช้จ่ายที่เป็นไปได้นั้นมากเกินไป"
  arcsite.9005.tt.carefree:0 "เพิ่ม §G4 เบาะแส§! ให้กับ §H$site_ice_trauma$§!\n§H[leader.GetName]§! ได้รับ:\n$t$คุณสมบัติ §Y$leader_trait_carefree$§!\n$t$ประสบการณ์: +§G150§!"
  arcsite.9005.tt.paranoid:0 "เพิ่ม §R-2 เบาะแส§! ให้กับ §H$site_ice_trauma$§!\n§H[leader.GetName]§! ได้รับ:\n$t$คุณสมบัติ §Y$leader_trait_paranoid$§!\n$t$ประสบการณ์: +§G50§!"
