 arcsite.9000.name:0 "การเฝ้ารออันเดียวดาย"
 arcsite.9000.desc:0 "หัวหน้านักโบราณคดี[leader.GetName]ได้เติบโตอย่างต่อเนื่องถอนตัวจากปลาย[leader.GetHeSheCap]ปรากฏ[leader.GetSXX]ลงทุนน้อยลงในเป้าหมายการวิจัยของเรา เลือกที่จะหมกมุ่นกับบันทึกและบันทึกต่างๆ ที่เราได้ค้นพบมา[leader.GetHeSheCap]มัก จะ พึมพํา[leader.GetSXX]เกี่ยวกับ\"คนพวกนี้ต้องเหงาแค่ไหน\"\n\nมันเป็นไปได้ที่ความมืดมนของจุดขุดเจาะนี้ ที่กําลังลดลง เราสามารถจัดให้มี ที่ปรึกษาทั้งทีม หรืออื่น ๆ เชื่อว่า[leader.GetName]ค้นหาความละเอียดใน[leader.GetHisHer]ทํางาน" #Uses he/she/they loc., i.e. 'She appears' vs. 'They appear'
 arcsite.9000.a:0 "จัดการให้เรียบร้อย สุขภาพของทีมเราสำคัญที่สุด"
 arcsite.9000.b:0 "ปล่อยให้เขาเป็นไป บางทีเขาอาจมองเห็นบางอย่าง"
 arcsite.9001.desc:0 "หัวหน้านักโบราณคดี [absconded_archaeologist.GetName] ได้หลบหนีไปพร้อมข้อมูลมานุษยวิทยาส่วนใหญ่ของเรา ทีมรายงานว่ายานภาคพื้นดินหายไปหนึ่งคัน แต่ชุดป้องกันสภาพแวดล้อมทั้งหมดยังอยู่ที่ฐาน\n\nเป็นไปได้ว่า [absconded_archaeologist.GetName] จะหลบหนีไปยังที่อยู่อาศัยใต้น้ำแห่งอื่นสักแห่งหนึ่งทั่วดินแดนทุนดรา แต่ในความเป็นจริง... เราคงต้องเตรียมใจรับสิ่งที่เลวร้ายที่สุด"
 arcsite.9001.a:0 "น่าเศร้าอย่างยิ่ง"
 arcsite.9002.desc:0 "นักโบราณคดี [leader.GetName] ต้องจ่ายราคาหนักหน่วง แม้ตอนนี้จะดูอิดโรยอย่างมาก แต่เขาก็กลับมาร่วมทีมอีกครั้งและนำเสนอสมมติฐานที่น่าเชื่อถือ ดูเหมือนว่าเราเคยมองข้ามรายละเอียดเล็กน้อยหลายประการในเอกสารส่วนบุคคลเหล่านั้นไป เมื่อนำเบาะแสทั้งหมดมารวมกัน มันได้มอบความก้าวหน้าที่เราหวังไว้พอดี"
 arcsite.9002.a:0 "แต่มันคุ้มกับสิ่งที่เสียไปหรือไม่?"

 arcsite.9005.name:0 "เรือตัดน้ำแข็ง"
 arcsite.9005.desc:0 "ทีมขุดค้นบน [fromfrom.planet.GetName] ได้ทำงานอย่างใกล้ชิดกับ [owner.GetResearchers] ของเราบน [owner.capital_scope.GetName] เพื่อทดลองหาวิธีใหม่ ๆ สำหรับการทำงานในทุนดราอันโหดร้าย ทีมภาคพื้นได้ติดตั้งเครื่องขุดต้นแบบเครื่องหนึ่ง ซึ่งการออกแบบดึงแรงบันดาลใจอย่างมากจากเทคนิคการปรับสภาพดาวเคราะห์\n\nผลทดลองระยะแรกบ่งชี้ว่าเครื่องจักรนี้จะช่วยเร่งงานของเราที่นี่ได้อย่างมีนัยสำคัญ อย่างไรก็ตาม พวกเขาได้ระบุถึง §Hความเสี่ยงหลายประการ§! หากเราต้องการพยายามลดความเสี่ยงเหล่านั้น จะต้องใช้เงินทุนเพิ่มเติม"
 arcsite.9005.a:0 "ความเสี่ยงและต้นทุนที่อาจเกิดขึ้นสูงเกินไป"
 arcsite.9005.tt.carefree:0 "เพิ่ม§G4 เบาะแส§!ถึง§H$site_ice_trauma$§!\n§H[leader.GetName]§!คะแนน:\n$t$§Y$leader_trait_carefree$§!คุณสมบัติ\n$t$ประสบการณ์: +§G150§!" #directly follows loc string 'RANDOM_EFFECT'
 arcsite.9005.tt.paranoid:0 "เพิ่ม§R-2 เบาะแส§!ถึง§H$site_ice_trauma$§!\n§H[leader.GetName]§!คะแนน:\n$t$§Y$leader_trait_paranoid$§!คุณสมบัติ\n$t$ประสบการณ์: +§G50§!" #directly follows loc string 'RANDOM_EFFECT'
