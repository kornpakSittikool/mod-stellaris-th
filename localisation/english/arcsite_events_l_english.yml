####################
# ARCHAEOLOGY SITES
####################

# Ice Trauma (by Gemma Thomson)
 site_ice_trauma:0 "ใต้ผืนน้ำแข็ง"
 site_ice_trauma_desc:0 "ดินแดนรกร้างอันกว้างใหญ่และเยือกแข็งของ [from.planet.GetName] ครั้งหนึ่งเคยเป็นทะเล ซึ่งแผ่ปกคลุมอยู่เหนือหุบเหวภูเขาไฟลึกจำนวนมาก แม้สภาพแวดล้อมในปัจจุบันจะไม่อาจรองรับชีวิตได้อีกต่อไป แต่เราตรวจพบซากของนิคมใต้น้ำโบราณภายในร่องลึกที่ถูกน้ำแข็งปกคลุมใกล้พื้นผิวดาวเคราะห์"

 arcsite.1000.name:0 "ยอดหอคอยลวงตา"
 arcsite.1000.desc:0 "[owner.GetScientistPlural] ของเราได้ตั้งค่ายล้อมรอบขอบทะเลสาบเยือกแข็งที่ผิวราวแก้ว ภายใต้แสงที่เหมาะสม เราสามารถเห็นเงาหอคอยคล้ายวิญญาณอยู่เบื้องล่าง มันยื่นขึ้นมาจากก้นทะเลสาบราวกับเส้นเอ็นอันมั่นคง\n\nลูกเรือที่มีประสบการณ์น้อยกว่ายังคงปรับตัวกับการทำงานท่ามกลางความหนาวกัดกระดูกและความว่างเปล่าไร้เชื้อเช่นนี้ แม้กระนั้น การขุดค้นของเราก็ยังคืบหน้าอย่างรวดเร็ว เราได้เปิดเผยประตูล็อกอากาศจำนวนมาก ซึ่งทั้งหมดถูกออกแบบมาสำหรับเรือดำน้ำดึกดำบรรพ์ กระนั้น จนถึงตอนนี้ก็ยังไม่พบร่องรอยของเรือเหล่านั้นเอง ไม่ว่าผู้อาศัยในหอคอยจะอยู่ต่อหรือหลบหนีไป ท่าเรือทุกแห่งของมันล้วนถูกทิ้งว่างเปล่า"
 arcsite.1000.a:0 "เราควรลงทุนกับเทคนิคการเจาะน้ำแข็งเหล่านี้ให้มากขึ้น"

 arcsite.1005.name:0 "ร่องรอยสึกหรอ"
 arcsite.1005.desc:0 "ขณะที่เรายังคงเคลื่อนย้ายน้ำแข็งจำนวนมหาศาลออกจากรอบที่อยู่อาศัยหลายแห่งซึ่งถูกกักอยู่ในน้ำแข็ง [owner.GetScientistPlural] ของเราที่หอเทียบท่าได้ค้นพบเทอร์มินัลคอมพิวเตอร์ดึกดำบรรพ์เครื่องหนึ่ง ตัวห่อหุ้มโลหะอันเปราะบางของมันดูเหมือนจะถูก... แทะเคี้ยว\n\nเทอร์มินัลเครื่องนี้เปิดทำงานได้ตามปกติหลังจากซ่อมแซมเล็กน้อย เครือข่ายข้อมูลส่วนใหญ่ของที่อยู่อาศัยยังคงออฟไลน์อยู่ แต่เราสามารถอนุมานอะไรได้มากมายจากแคชข้อมูลท้องถิ่นของบันทึกคลังสินค้า แฟ้มบุคลากร และสิ่งที่ดูเหมือนจะเป็นชุดบันทึกภารกิจ"

 arcsite.1010.name:0 "พัฒนาการอันน่ากังวล"
 arcsite.1010.desc:0 "ความรู้ของเราเกี่ยวกับชุมชนโบราณบน [from.planet.GetName] ลึกซึ้งขึ้น แต่ความกังวลของเราก็เพิ่มขึ้นตามไปด้วย สิ่งที่เราค้นพบคือซากของอาณานิคมชายขอบ — เศษเสี้ยวของอารยธรรมที่ถูกลืมไปนานเสียจนเราไม่อาจแม้แต่จะแยกแยะชื่อของพวกเขาได้\n\nเมื่อทะเลยังเป็นลักษณะเด่นของโลกใบนี้ กลุ่มผู้ตั้งถิ่นฐานหลายกลุ่มถูกนำมาจากโลกบ้านเกิดของตนและเกณฑ์เข้าประจำเรือดำน้ำบุกเบิก เป้าหมายของพวกเขาคือการตั้งอาณานิคมและใช้ประโยชน์จากทรัพยากรธรรมชาติของดาวดวงนี้ แต่ความเป็นจริงที่พวกเขาพบนั้นกลับเต็มไปด้วยการทดลองชีวภาพที่ไร้การควบคุม การเปลี่ยนแปลงทางการเมืองแบบสุดขั้ว และอันตรายร้ายแรงจากการป้องกันตัวต่อ §Yพืชและสัตว์เจ้าถิ่นที่เป็นศัตรู§!\n\nบันทึกจากเซนเซอร์ของทุ่นนำทางดูเหมือนจะติดตามลูกเรือหนึ่งกลุ่มระหว่างเดินทางไปยังฐานหน้าด่านใกล้เคียง เราเชื่อว่าเรือของพวกเขาอาจยังคงอยู่ที่นั่น ถูกกักอยู่ในน้ำแข็งพร้อมคลังวัสดุที่มีประโยชน์"
 arcsite.1010.a:0 "ส่งทีมวิจัยไปทันที"
 arcsite.1010.b:0 "ดูสิว่าเราจะเรียนรู้อะไรเกี่ยวกับสิ่งมีชีวิตทะเลผู้เป็นศัตรูเหล่านั้นได้บ้าง"

 arcsite.1016.name:0 "ไฟและน้ำ"
 arcsite.1016.desc:0 "น้ำแข็งสีดำไหม้เกรียมล้อมรอบถ้ำที่เราพบซากเรือดำน้ำโบราณซึ่งยับยู่ยี่และถูกไฟเผา สภาพแวดล้อมที่กำบังจากวัฏจักรเยือกแข็ง-ละลายอันรุนแรงของดาวดวงนี้ได้ช่วยรักษาหลักฐานของหายนะหลายครั้งที่เกิดขึ้นกับลูกเรือกลุ่มนี้เอาไว้\n\nเครื่องยนต์นิวเคลียร์แบบหยาบของเรือลำนี้มีร่องรอยของการซ่อมแบบเร่งรีบ ในห้องพักลูกเรือเราพบรอยขีดข่วนและคราบจาง ๆ จากแผลไหม้สารเคมี มีอยู่ช่วงหนึ่งที่กระสวยหนีภัยทั้งหมดของเรือถูกปล่อยออกไป แต่เหลือเพียงลำเดียวอยู่ใกล้ ๆ — มันติดคาอยู่ภายในปล่องลาวาที่สงบนิ่ง\n\nมีสิ่งให้เรียนรู้จากซากไหม้เกรียมนี้ไม่มากนัก แต่จุดหมายที่ลูกเรือเคยมุ่งหน้าไป — §Yคลังเสบียง§! ของอาณานิคม — ยังคงสภาพสมบูรณ์อยู่ ดังนั้นทีมกู้คืนของเราจึงประสบความสำเร็จในการนำสิ่งที่ลูกเรือผู้เคราะห์ร้ายไม่อาจได้มานั้นกลับมา"

 arcsite.1017.name:0 "เรือดำน้ำอธิปไตย"
 arcsite.1017.desc:0 "เราได้เจาะอุโมงค์ผ่านน้ำแข็งปริมาณมหาศาลเพื่อพบซากเรือดำน้ำที่ยังสมบูรณ์ ซึ่งถูกผนึกอยู่ในถ้ำสุญญากาศอากาศ สภาพทุนดราได้เปลี่ยนสสารอินทรีย์ทั้งหมดให้กลายเป็นผงละเอียดไปนานแล้ว แต่ในขณะเดียวกันก็ช่วยเก็บรักษาวัตถุทางวัฒนธรรมอันอุดมสมบูรณ์เอาไว้ด้วย\n\nการสำรวจทางมานุษยวิทยาของเราชี้ถึงความคุกรุ่นทางการเมืองอย่างเข้มข้น เมื่อลูกเรือของเรือดำน้ำลำนี้แยกตัวออกจากอาณานิคมใกล้เคียง พวกเขาประกาศเขตอธิปไตยหลายแห่งภายในโครงเรือดำน้ำของตนเอง พร้อมยึดถืออุดมการณ์ทางการเมืองนานัปการ น่าประหลาดที่ความแตกแยกสุดขั้วนี้กลับเสริมสร้างสายสัมพันธ์ทางสังคมของลูกเรือมากกว่าจะแยกพวกเขาออกจากกัน เรื่องนี้ย่อมจุดประกายการถกเถียงอย่างคึกคักในหมู่นักรัฐศาสตร์ของเราเองแน่"
 arcsite.1017.auth.a:0 "... ทำให้เรานำหน้าผู้เห็นต่างไปอีกก้าว"

 arcsite.1018.name:0 "มรดกทางพันธุกรรม"
 arcsite.1018.desc:0 "เราเคยคาดว่าซากโบราณเช่นนี้คงถูกบดขยี้ไปนานแล้ว แต่สิ่งที่พบกลับเป็นซากลำเรือที่ถูกแช่แข็งฉับพลัน ทำให้โครงสร้างหลักพร้อมทั้งศพของสิ่งมีชีวิตจำนวนมากยังคงอยู่ บางตัวดูเหมือนจะเป็นสัตว์พื้นเมือง: ใหญ่ ดุร้าย และมีนิสัยนักล่าอย่างชัดเจน ส่วนอีกกลุ่มดูเหมือนจะเป็นเหยื่อของพวกมัน: กลุ่มสิ่งมีชีวิตทรงปัญญาขนาดเล็กที่สวมชุดป้องกันสภาพแวดล้อม\n\nบุคคลเหล่านี้ — ลูกเรือของเรือดำน้ำ — ไม่ได้มีต้นกำเนิดจาก [fromfrom.planet.GetName] ตรงกันข้าม การชันสูตรของเราชี้ว่าซีโนกลุ่มนี้ได้ผสานพันธุกรรมของตนกับสิ่งมีชีวิตท้องถิ่น เราได้แต่จินตนาการว่าอะไรขับดันให้ผู้ตั้งอาณานิคมต้องดัดแปลงตนเองอย่างหนักถึงเพียงนี้ แต่เราก็ปฏิเสธไม่ได้ว่า ด้วยการเก็บรักษาสารพันธุกรรมเหล่านี้ไว้ในตัวเอง พวกเขาได้ทำให้ประวัติศาสตร์ทางพันธุกรรมอันทรงคุณค่ายังคงอยู่รอด"
 arcsite.1018.phobe.a:0 "อุจาดน่ารังเกียจ"
 arcsite.1018.b.evopred: "เป็นสายพันธุ์ที่รู้แจ้งยิ่งนัก!"

 arcsite.1020.name:0 "บททดสอบที่ถูกแช่แข็ง"
 arcsite.1020.desc.intro:0 "หลังจากสำรวจซากเรือดำน้ำและที่อยู่อาศัยร้างเท่าที่ทำได้แล้ว ทีมของเราบน [from.planet.GetName] กำลังเตรียมรวมกำลังกันอีกครั้งใกล้พื้นผิวดาวเคราะห์ เรายังไม่รู้อีกมากเกี่ยวกับอาณานิคมแห่งนี้ สิ่งที่เราพบส่วนใหญ่เป็นเพียงมรดกอันหลากหลายของชีวิตบนดินแดนชายขอบอันโดดเดี่ยวเป็นพิเศษ"
 arcsite.1020.tech.desc:0 "$arcsite.1020.desc.intro$\n\nแม้พวกเขาจะขาดเทคโนโลยีเดินทางเร็วกว่าความเร็วแสง แต่เหล่านักเดินเรือใต้น้ำโบราณกลับชี้ทางให้เราไปสู่ความก้าวหน้าที่น่าทึ่งในสาขาอื่น ๆ ได้ พวกเขาค้นพบสิ่งเหล่านี้ท่ามกลางความยากลำบากแบบที่เราสามารถพยายามหลีกเลี่ยงไม่ให้เกิดกับเราเอง"
 arcsite.1020.default.desc:0 "$arcsite.1020.desc.intro$\n\nแม้อารยธรรมของพวกเขาจะยังไม่มีเทคโนโลยีเดินทางเร็วกว่าความเร็วแสง แต่ดูเหมือนความยากลำบากจะผลักดันให้อาณานิคมเรือดำน้ำแห่งนี้ไปสู่ความก้าวหน้าที่โดดเด่นบางประการในด้านวิทยาศาสตร์และเศรษฐกิจ ซึ่งตอนนี้เราเป็นฝ่ายได้ประโยชน์จากมัน"
 arcsite.1020.a:0 "เรื่องเตือนใจเหล่านี้อาจเป็นประโยชน์ต่อผู้ตั้งอาณานิคมของเรา"
 arcsite.1020.b:0 "ที่อยู่อาศัยใต้พื้นผิวเป็นแนวคิดที่น่าสนใจ"
 arcsite.1020.c:0 "เราอาจนำอาวุธของเรือดำน้ำนั้นไปใช้ประโยชน์ได้"
 arcsite.1020.a.memorialist:0 "เราจะรักษาความทรงจำของพวกเขาไว้"
 arcsite.1020.a.prospectors:0 "เป็นกิจการที่น่าสนใจ"

 ice_trauma_insights_colony:0 "มรดกของเรือดําน้ํา" #modifier
 ice_trauma_insights_engineering:0 "ความไม่เสมอภาคของเรือดําน้ํา" #modifier
 ice_trauma_memorialist_unity:0 "ในหน่วยความจําของเรือดําน้ํา" #modifier

# Engineered Species
 site_engineered_species:0 "ซากดึกดำบรรพ์อุดมสมบูรณ์"
 site_engineered_species_desc:1 "[from.planet.GetName] ดูเผิน ๆ เป็นดาวเคราะห์อยู่อาศัยได้ทั่วไป แต่เมื่อพิจารณาใกล้ ๆ ทีมวิจัยของเรากลับพบแหล่งซากดึกดำบรรพ์ขนาดใหญ่ซึ่งอยู่ในสภาพสมบูรณ์อย่างน่าประหลาด ที่น่าสนใจก็คือ กลุ่มก้อนขนาดใหญ่มักมีตัวอย่างหลายตัวอยู่ในชั้นเดียวกัน บ่งชี้ว่าพวกมันอาจตายในเวลาเดียวกัน หรือถูกนำมาวางไว้โดยเจตนา การตรวจสอบซากเหล่านี้เปิดโอกาสให้เราเข้าใจกระบวนการวิวัฒนาการของสายพันธุ์ที่เคยอาศัยอยู่บนดาวดวงนี้ได้ดียิ่งขึ้น"

 arcsite.2000.name:0 "กองกระดูกมหึมา"
 arcsite.2000.desc:0 "เราได้สแกนพื้นผิวและพบแหล่งสะสมที่น่าสนใจหลายแห่ง ซึ่งเต็มไปด้วยซากของสายพันธุ์หลากหลายชนิด บางชนิดคล้ายกับสิ่งมีชีวิตที่ยังอาศัยอยู่บนพื้นผิวในปัจจุบัน ขณะที่บางชนิดกลับไม่เหมือนสิ่งใดที่เราเคยเห็นมาก่อน\n\nแม้งานจะหนักหน่วงและสัตว์ป่าจะถูกรบกวนจากการปรากฏตัวของเรา [leader.GetName] ก็ได้ค้นพบสิ่งน่าทึ่งไปแล้วหลายอย่าง และสามารถประกอบร่างสายพันธุ์ที่สูญพันธุ์บางชนิดขึ้นใหม่ได้ สิ่งนี้กลับจุดชนวนข้อพิพาทในหมู่ทีมวิจัย บางคนต้องการนำสายพันธุ์เหล่านี้ไปจัดแสดง ขณะที่อีกฝ่ายต้องการศึกษาวัสดุเหล่านี้ต่อ เพราะมันคือซากดึกดำบรรพ์ที่เก็บรักษาได้ดีที่สุดเท่าที่เคยพบมา และพื้นที่ขุดค้นแห่งนี้ก็ใกล้หมดสภาพแล้ว"
 arcsite.2000.study:0 "ศึกษาซากดึกดำบรรพ์"
 arcsite.2000.use:0 "นำไปจัดนิทรรศการ"
 arcsite.2001.name:0 "การ ศึกษา ฟอสซิล" #Study
 arcsite.2001.desc:0 "เราได้ทำการวิจัยอย่างกว้างขวางเพื่อหาความสัมพันธ์ระหว่างสายพันธุ์ดึกดำบรรพ์กับชีวมณฑลปัจจุบันของ [from.planet.GetName] และปรากฏว่าบางชนิดอยู่ในสกุลเดียวกัน โดยมีความคล้ายคลึงกันหลายอย่าง การศึกษาต่อไปอาจพาเราไปสู่คำตอบที่มากขึ้น"
 arcsite.2002.name:0 "การจัดองค์ประกอบระหว่างดาว" #Use
 arcsite.2002.desc:0 "มีผู้คนจำนวนไม่น้อยมาชมนิทรรศการของเรา แม้เราจะใช้วัสดุที่รวบรวมมาเพื่อการวิจัยไม่ได้อีกต่อไป แต่เราก็ดึงดูดผู้สนับสนุนใจป้ำบางราย และส่งซากดึกดำบรรพ์ออกทัวร์ข้ามดาวเคราะห์ รูปลักษณ์ต่างดาวของสิ่งจัดแสดงก่อให้เกิดกระแสเล็ก ๆ ของผู้คนที่สนใจโบราณคดีซีโน"

 arcsite.2010.name:0 "ผู้อยู่อาศัยในถ้ำ"
 arcsite.2010.desc:0 "หลังจากใช้แหล่งแรกจนหมด เราตัดสินใจย้ายไปยังพื้นที่ห่างไกลกว่าเพื่อค้นหาวัสดุสำหรับการวิจัยเพิ่มเติม [leader.GetName] พบจุดที่เหมาะสมแห่งหนึ่ง เป็นถ้ำที่เคยเป็นบ้านของสายพันธุ์สูญพันธุ์ทรงปัญญาบางชนิด การสำรวจและตรวจสอบอย่างระมัดระวังเผยให้เห็นสิ่งผิดปกติ: ไม่ว่าสิ่งใดจะเคยอาศัยอยู่ในถ้ำนี้ มันได้ใช้สีย้อมอันชาญฉลาดชนิดหนึ่ง ซึ่งจะปรากฏขึ้นเมื่อถูกความร้อนและแสง\n\nเราแยกภาพวาดออกได้เป็นสองประเภท: ประเภทหนึ่งบอกเล่าเรื่องราวของอดีต อีกประเภทหนึ่งแสดงภาพชีวิตประจำวัน น่าเสียดายที่เราไปรบกวนระบบนิเวศอันเปราะบางที่คอยรักษาภาพวาดเหล่านี้ไว้ ปฏิกิริยาลูกโซ่ที่เกิดขึ้น ร่วมกับอายุของสีย้อม ทำให้มันซีดจางและหายไปในเวลาอันสั้น ทีมงานจึงต้องตัดสินใจว่าจะรักษาประเภทใดไว้"
 arcsite.2010.study:0 "เก็บรักษาประวัติศาสตร์"
 arcsite.2010.use:0 "เก็บรักษาชีวิตประจำวัน"
 arcsite.2011.name:0 "ประวัติ ผู้ อาศัย ใน ถ้ํา" #Study
 arcsite.2011.desc:0 "เราได้บันทึกภาพวาดที่เกี่ยวข้องกับอดีตเอาไว้ และได้รับข้อมูลเชิงลึกเกี่ยวกับประวัติศาสตร์ของสายพันธุ์นี้ ดูเหมือนว่าผู้อาศัยในถ้ำเหล่านี้เคยติดต่อกับอารยธรรมก้าวหน้ากลุ่มหนึ่ง ซึ่งมีอิทธิพลต่อรูปลักษณ์และพัฒนาการของพวกเขาอยู่บ้าง จากภาพสิ่งมีชีวิตเหล่านี้ เราสันนิษฐานได้ว่าสายพันธุ์นี้มีแนวโน้มจะเกิดการกลายพันธุ์ทางพันธุกรรมอย่างรวดเร็ว และแต่ละรุ่นมีรูปลักษณ์แตกต่างกันอย่างมาก"
 arcsite.2012.name:0 "ผู้ อาศัย ใน ถ้ํา มี ชีวิต" #Use
 arcsite.2012.desc:0 "เราได้บันทึกภาพวาดที่เกี่ยวข้องกับชีวิตประจำวันเอาไว้ และได้รับข้อมูลเชิงลึกเกี่ยวกับประวัติศาสตร์ของสายพันธุ์นี้ มันแสดงภาพผู้อาศัยในถ้ำเป็นกลุ่มรวมของสายพันธุ์ต่างรูปลักษณ์แต่มีสติปัญญาใกล้เคียงกัน ซึ่งเข้าร่วมในพิธีกรรมอันซับซ้อน [leader.GetName] สันนิษฐานว่าสิ่งมีชีวิตหลากชนิดเหล่านี้อาบไล้แสงแห่งเทพ ทำงานรับใช้เขา และได้รับอิสรภาพตอบแทน"

 arcsite.2020.name:0 "โครงสร้างกระดูก"
 arcsite.2020.desc:0 "เมื่อสำรวจลึกเข้าไปในรอยแยกก้นถ้ำ เราพบโพรงหนึ่งซึ่งมีโครงสร้างกระดูกประหลาดอยู่ภายใน จากสภาพปัจจุบันของมัน ดูเหมือนว่าโครงสร้างนี้จะถล่มและจมลงสู่พื้นดิน — น่าจะเป็นผลจากแผ่นดินไหว [Leader.GetName] สั่งให้ตั้งค่ายขึ้น และเราได้ทำการสแกนขอบเขตโดยรอบไปแล้วบางส่วน แต่พื้นดินยังไม่มั่นคง เราอาจไม่มีเวลามากพอที่จะตรวจสอบโครงสร้างนี้ได้ทั้งหมดเมื่อเข้าไปข้างใน\n\nผลตอบแทนที่มีศักยภาพสูงสุดต่อการศึกษาของเราอยู่ที่ตัวอาคารเอง เราอาจศึกษาวัสดุคล้ายกระดูกอันชวนฉงนนี้ หรือทุ่มความพยายามไปกับการสำรวจ ค้นหาเบาะแสเพิ่มเติมเกี่ยวกับซีโนผู้สร้างและใช้งานมัน ตลอดจนกิจวัตรประจำวันของพวกเขา"
 arcsite.2020.study:0 "ศึกษาอาคาร"
 arcsite.2020.use:0 "ศึกษาภายในของมัน"
 arcsite.2021.name:0 "โครง สร้าง ที่ มี ชีวิต" #Study
 arcsite.2021.desc:0 "หลังจากการวิจัยที่ราบรื่น [Leader.GetName] ก็สรุปว่าอาคารนี้... เคยมีชีวิต ไม่ใช่ตอนนี้ แต่เมื่อหลายปีก่อน ระหว่างช่วงเวลาที่มันถูกสร้างขึ้น มันคือมวลกระดูกและเนื้อเยื่อที่หลอมรวมเข้าด้วยกันเพื่อสร้างเป็นอาคารที่สามารถปรับเปลี่ยนรูปร่างตามจุดประสงค์ที่ต้องการได้ จากลักษณะที่อาคารถล่มลงมา เรายังอาจสันนิษฐานได้ว่ามันเป็นการกระทำโดยเจตนาของตัวโครงสร้างเองด้วยซ้ำ\n\nน่าเสียดายที่การศึกษาของเราได้ทำให้โครงสร้างนี้เสียหาย และมันถล่มลงไปอีกจนไม่อาจใช้ศึกษาเพิ่มเติมได้ [Leader.GetName] จึงสั่งให้ทีมเดินหน้าต่อ"
 arcsite.2022.name:0 "อารยธรรมใต้ดิน" #Use
 arcsite.2022.desc:0 "ภายในของโครงสร้างชวนขนลุกนี้กลับกลายเป็นเขาวงกตของทางเดินที่ถล่มไปครึ่งหนึ่ง เต็มไปด้วยวัสดุคล้ายกระดูกที่กระจัดกระจายอยู่ทั่ว ด้วยความยากลำบากพอสมควร เราสามารถนำเครื่องมือและวัตถุหลายชิ้นออกมาได้ ซึ่งบ่งชี้ว่าครั้งหนึ่งเคยมีวัฒนธรรมอันซับซ้อนอาศัยอยู่บนดาวดวงนี้ สิ่งเหล่านี้จะช่วยให้เราเข้าใจได้มากว่าชีวิตของสายพันธุ์สูญพันธุ์เหล่านี้อาจเคยเป็นอย่างไร\n\nน่าเสียดายที่การศึกษาของเราได้ทำให้โครงสร้างนี้เสียหาย และมันถล่มลงไปอีกจนไม่อาจใช้ศึกษาเพิ่มเติมได้ [Leader.GetName] ได้สั่งให้ทีมเดินหน้าต่อ"

 arcsite.2030.name:0 "สถานที่อำนวยความสะดวกใต้ดิน"
 arcsite.2030.desc:0 "ในที่สุดเราก็มาถึงปลายสุดของถ้ำ เราได้เข้าไปยังสิ่งปลูกสร้างซึ่งคล้ายบังเกอร์ร้างเก่าแก่ที่ถูกสร้างลึกลงไปใต้ดิน มันไม่เหมือนสิ่งใดที่เราเคยพบมาก่อน: เราสันนิษฐานว่าผู้มาเยือนจากต่างดาวเคยตั้งห้องทดลองวิจัยไว้ที่นี่ และจากถังเก็บที่ทรุดโทรม กระดูกกับซากดึกดำบรรพ์นานาชนิดที่กระจัดกระจายอยู่รอบ ๆ พวกเขาก็กำลังศึกษาสายพันธุ์เหล่านี้อยู่เช่นเดียวกับเรา... เพียงแต่พวกเขาได้โอกาสทำวิจัยในตอนที่ตัวอย่างยังมีชีวิตอยู่\n\n[Leader.GetName] รีบเข้าทำงานทันที พยายามรวบรวมข้อมูลที่มีประโยชน์ใด ๆ จากสถานที่แห่งนี้และจากคลังข้อมูล ทันทีที่เราเชื่อมมันเข้ากับแหล่งพลังงาน"
 arcsite.2030.proceed:0 "เราจะค้นพบปริศนาอะไรบ้าง?"

 arcsite.2040.name:0 "การค้นพบครั้งใหญ่"
 arcsite.2040.revelation.desc:0 "เราได้นำความรู้จากการศึกษาก่อนหน้านี้มาเปรียบเทียบกับข้อมูลในคลังข้อมูล และข้อสรุปที่ได้ก็น่าหวั่นใจ ดูเหมือนว่าเมื่อหลายพันปีก่อน อารยธรรมเดินทางอวกาศกลุ่มหนึ่งได้ลงจอดบนโลกนี้ และพบว่าสิ่งมีชีวิตพื้นเมืองที่นี่ฝึกให้เชื่องได้ง่ายด้วยเทคนิคดัดแปลงพันธุกรรมของพวกเขา ในระยะแรก พวกเขาทำให้ประชากรเจ้าถิ่นผู้ทรงปัญญา — แม้ยังไม่พัฒนาเต็มที่ — ตกเป็นทาส และทำการทดลองหลากหลายรูปแบบกับพวกมัน ซึ่งรวมถึงการเปลี่ยนพวกมันให้เป็นเนื้อเยื่อมีชีวิตเพื่อใช้ในงานก่อสร้าง หรือให้เป็นทาสเชื่อฟัง หรือให้เป็นสัตว์เลี้ยงและปศุสัตว์\n\nสิ่งที่เราพบก่อนหน้านี้น่าจะเป็นซากของสายพันธุ์เหล่านี้ก่อนที่พวกมันจะเสื่อมถอยลงเป็นชีวมณฑลไร้สติปัญญาซึ่งกำลังรุ่งเรืองอยู่บน [from.planet.GetName] ในปัจจุบัน จุดจบอันน่าสะพรึงสำหรับสายพันธุ์ที่วันหนึ่งอาจได้ท่องไปทั่วกาแล็กซีเช่นเดียวกับเรา"
 arcsite.2040.ignorance.desc:0 "ดูเหมือนว่าเมื่อหลายพันปีก่อน อารยธรรมก้าวหน้ากลุ่มหนึ่งมองว่าสิ่งมีชีวิตที่อาศัยอยู่ที่นี่เป็นวัตถุศึกษาที่น่าสนใจ พวกเขาหลงใหลในชีวมณฑลอันหลากหลาย คลังข้อมูลเก่าแก่ยังคงทำงานอยู่ เต็มไปด้วยข้อสรุปประหลาดและการทดลองที่ชวนกังวลอยู่บ้าง พวกมันบรรจุองค์ประกอบทางพันธุกรรมพื้นฐานของสายพันธุ์เหล่านี้ และแนวทางว่าพวกมันอาจพัฒนาอย่างไรในอดีตและอนาคต\n\nแล้วนักวิจัยเหล่านั้นเองเกิดอะไรขึ้น? พวกเขาเสื่อมถอยลงจนกลายเป็นชาวถ้ำที่เราพบก่อนหน้านี้หรือไม่? หรือบางทีอาจตรงกันข้าม และพวกเขาเองวิวัฒน์มาจากพวกนั้น ก่อนจะละทิ้งดาวดวงนี้ไปในบางช่วงเวลา? มันทำให้เราครุ่นคิดว่า: เอกภพยังมีปริศนาอะไรซ่อนอยู่อีก?"
 arcsite.2040.revelation:0 "นี่มันน่าสยดสยอง"
 arcsite.2040.ignorance:0 "เอกภพเต็มไปด้วยความพิศวง"
 arcsite.2040.phobe:0 "นี่พิสูจน์แล้วว่าพวกซีโนไว้ใจไม่ได้!"
 arcsite.2040.phile:0 "อาชญากรรมเช่นนี้จะไม่มีวันเกิดขึ้นภายใต้การปกครองของเรา!"
 arcsite.2040.evopred.ignorance: "เป็นความริเริ่มที่เอื้อเฟื้ออย่างยิ่ง!"
 arcsite.2040.evopred: "กาแล็กซีเป็นสถานที่อันโหดร้าย "

 engineered_species_revelation:0 "ความ จริง ที่ เสื่อม เสีย" #modifier
 engineered_species_revelation_desc:0 "แม้เราจะยอมรับความรู้เกี่ยวกับซีโนที่ตายไปนานแล้วและเหยื่อของการทดลองดัดแปลงพันธุกรรมของพวกเขาได้ แต่มันก็พิสูจน์ให้เราเห็นเช่นกันว่าอวกาศไม่ใช่สถานที่เป็นมิตร การเปลี่ยนจากผู้ล่าเป็นเหยื่อนั้นง่ายดายเหลือเกิน"
 engineered_species_ignorance:0 "เอกภพ ที่ ลึกลับ" #modifier
 engineered_species_ignorance_desc:0 "การสำรวจเอกภพคือภารกิจที่เต็มไปด้วยความมหัศจรรย์ เป็นเรื่องน่าอัศจรรย์ที่ชีวิตสามารถผลิบานได้แม้ในมุมที่ไกลที่สุดของกาแล็กซีและในสภาพแวดล้อมที่อันตรายที่สุด ผู้คนของเรา ซึ่งหลงใหลในเรื่องเล่าของสิ่งมีชีวิตหลากหลายที่อยู่ร่วมกันอย่างกลมเกลียว พร้อมแล้วที่จะเผชิญหน้ากับปริศนาแห่งเอกภพ"
 engineered_species_ownway:0 "ความคิดเป็นหนึ่ง"
 engineered_species_ownway_desc:0 "เอกภพนั้นโหดร้าย แต่เราต้องยึดมั่นในเส้นทางของตน เพื่อไม่ให้เดินซ้ำรอยความผิดพลาดของผู้ที่ล่วงลับไปก่อนเรา"

 # Debris Belt
 site_debris_belt:0 "แถบเศษซาก"
 site_debris_belt_desc:0 "การสแกนระบบ [From.Planet.System.GetName] ของเราแสดงให้เห็นว่าแถบดาวเคราะห์น้อยของมันมีลักษณะผิดปกติ แทนที่จะเป็นส่วนผสมมาตรฐานของหิน น้ำแข็ง และเศษซากอวกาศซึ่งมักก่อเป็นรูปแบบเช่นนี้ มันกลับดูเหมือนเป็นซากของที่อยู่อาศัยประดิษฐ์ขนาดใหญ่หลายแห่ง สิ่งเหล่านี้คงถูกทำลายด้วยความรุนแรงอย่างเหลือเชื่อในช่วงไม่กี่พันปีที่ผ่านมา ความลับนับไม่ถ้วนอาจซ่อนอยู่ภายในสนามเศษซากที่เกิดขึ้น แต่พื้นที่นั้นกว้างใหญ่เสียจนการทำแผนที่อาจกินเวลาพอสมควร"
 r_odryskan_crystal:0 "ผลึกแห่งโอไดรัสเคีย"
 r_odryskan_crystal_desc:0 "ผลึกอันประเมินค่าไม่ได้ ว่ากันว่าแม้เพียงเศษเสี้ยวชิ้นเดียวก็มีมูลค่ามากพอจะผลักดันจิตใจของผู้คนให้เป็นบ้าได้"
 r_odryskan_crystal_regular_effect:0 "นักวิทยาศาสตร์ของเราคนหนึ่งอาจได้รับลักษณะ §Y$leader_trait_maniacal$§!"
 NAME_The_Cabin:0 "The Cabin"

 arcsite.2500.name:0 "เดอะเคบิน"
 arcsite.2500.desc:0 "เราไม่ใช่ผู้ค้นพบแถบเศษซากในระบบ §Y[From.Planet.System.GetName]§! เป็นกลุ่มแรก: ยานลำหนึ่ง — เล็กเสียจน [Root.Owner.GetResearchers] ของเราตั้งฉายาให้ว่า “กระท่อมอวกาศ” — ถูกพบพร้อมกับซากของซีโนท็อกซอยด์เพียงตนเดียวและผลึกข้อมูลจำนวนมาก เมื่อพิจารณาจากระดับการผุพัง เราคาดอย่างดีที่สุดว่าซีโนผู้นี้เพิ่งตายไปเมื่อไม่กี่ศตวรรษที่ผ่านมา"
 arcsite.2505.name:0 "การพำนักอันยาวนาน"
 arcsite.2505.desc:0 "ผลึกข้อมูลที่ค้นพบในกระท่อมอวกาศของซีโนนั้นแท้จริงแล้วคือบันทึกภารกิจ [Root.Owner.GetResearchers] ของเราได้ส่งตัวอย่างมาให้เรา พร้อมคำแปลเบื้องต้น มันเริ่มต้นด้วยน้ำเสียงสดใส:\n\n“นี่คือโอกาสตลอดชีวิต ซากโบราณของโอไดรัสกันในตำนานอยู่แค่เอื้อม บ้านใหม่ของฉันไม่ใช่อะไรมาก แต่ก็ดีพอสำหรับฉัน และอีกไม่นานฉันก็จะส่งเครดิตกลับบ้านได้มากพอจะจ่ายค่ารักษาให้ลูกสาว”\n\nแต่ไม่นานนัก บันทึกก็เปลี่ยนเป็นขมขื่น:\n\n“เมียกับลูกสาวตายหมดแล้ว ไม่มีใครเหลือไว้โศกเศร้าให้ฉัน ซากของที่เก็บได้ขายตลาดมืดแล้วยังแทบไม่พอเลี้ยงชีพ ตอนนี้สายเกินกว่าจะหันหลังกลับแล้ว”\n\nเมื่อนับรวมทั้งหมด ซีโนผู้นี้ใช้เวลากว่าห้าทศวรรษร่อนค้นแถบเศษซากอย่างดูเหมือนไร้ผล เพื่อไล่ล่าความมั่งคั่ง"
 arcsite.2505.A:0 "อยู่เป็นสิบ ๆ ปีแบบนั้น ต้องเจออะไรบ้างสิ!"
 arcsite.2515.name:0 "ดิ่งสู่ความวิปลาส"
 arcsite.2515.desc:0 "มันไม่จริง\nมันไม่จริง\nมันไม่จริง\nมันไม่จริง\n§Rโกหก!§!\n...\n...\n...\nแต่ถ้ามันเป็นจริงล่ะ?\n\nบันทึกเริ่มน่าหวาดหวั่นขึ้นเรื่อย ๆ เมื่อซีโนผู้นี้จมลึกลงสู่ความบ้าคลั่ง"
 arcsite.2520.name:0 "พบความสงบในวาระสุดท้าย"
 arcsite.2520.desc:0 "[Root.Owner.GetResearchers] ของเราแปลผลึกข้อมูลของซีโนเสร็จสิ้นแล้ว พวกเขานำเสนอการตีความบันทึกสุดท้าย ซึ่งในนั้นผู้บันทึกได้ประสบช่วงเวลาอันหาได้ยากแห่งความแจ่มชัดไม่นานก่อนเสียชีวิต:\n\n“ในที่สุดฉันก็พบสิ่งที่ตามหา หลายคนคงมองว่าฉันบ้า ที่ยังตามหามันมานานถึงเพียงนี้ และฉันเองก็คงต้องยอมรับว่าพวกเขาพูดถูก ตอนนี้ฉันแก่แล้ว — กำลังจะตายด้วยซ้ำ — และเผ่าพันธุ์ของฉันก็กลายเป็นฝุ่นไปนานแล้ว การจะขายสิ่งประดิษฐ์ชิ้นนี้จึงไม่มีประโยชน์ แต่บางทีตอนนี้ฉันอาจพบความสงบได้เสียที”\n\nบันทึกยังชี้ตำแหน่งที่ซีโนผู้นี้ซ่อนสมบัติไว้ด้วย และด้วยการตามรอยนั้น เราจึงพบอัญมณีขนาดมหึมาที่มีมูลค่าประเมินไม่ได้"
 arcsite.2520.A:0 "ของล้ำค่าของเรา..."

 #Krazura Arcsite
 site_krazura_dig: "แหล่งขุดค้นเมืองหลวงโบราณ"
 site_krazura_desc: "เราได้ค้นพบซากเมืองโบราณบน [From.Planet.GetName] จากขนาดและระดับของมัน ที่นี่น่าจะเคยเป็นเมืองหลวงหรือศูนย์กลางการบริหารของอารยธรรมเดินทางอวกาศขนาดใหญ่แห่งหนึ่ง\n\nจำเป็นต้องมีการขุดค้นเต็มรูปแบบเพื่อระบุที่มาของมันอย่างเหมาะสม"

 arcsite.3025.name: "รังที่แตกสลาย"
 arcsite.3025.desc: "วิหารศักดิ์สิทธิ์อันยิ่งใหญ่และเทวสถานที่พังทลายกระจายอยู่ทั่วภูมิทัศน์ของเมืองหลวง การสำรวจที่ลึกลงไปเผยว่าอารยธรรมนี้ถูกทำลายเมื่อกว่าห้าแสนปีก่อน\n\nจากการค้นพบภาพจิตรกรรมฝาผนังหลายชิ้นที่เก็บรักษาไว้อย่างดีอย่างน่าทึ่ง ผู้อยู่อาศัยของที่นี่ดูเหมือนจะมีชีววิทยาแบบนก การถอดเสียงภาษาของพวกเขาอย่างหยาบบ่งชี้ว่าพวกเขาเรียกตนเองว่า คราซูรา"
 arcsite.3025.a: "ขุดต่อไป"
 arcsite.3030.name: "เศษซากแห่งรอยแยก"
 arcsite.3030.intro: "การขุดค้นเพิ่มเติมนำไปสู่การค้นพบอันน่าตกตะลึง: ห้องโถงขนาดมหึมาจนสามารถบรรจุภูเขาลูกเล็กของดาวเคราะห์นี้ได้ แม้จะก่อสร้างด้วยขนาดที่น่าครั่นคร้าม แต่ “มหาโถง” แห่งนี้กลับไม่มีหน้าที่ที่ชัดเจน โดยมีเพียงทางเข้าออกทางเดียวเท่านั้น\n\nผนังของห้องโถงทรงเกือบกลมนี้แสดงหลักฐานชัดเจนของการบิดเบือนมิติ จึงสมเหตุสมผลที่จะสรุปว่าห้องนี้ถูกสร้างขึ้นล้อมรอบรูหนอนหรือประตูสู่ซับสเปซบางชนิด"
 arcsite.3030.a.desc: "$arcsite.3030.intro$\n\nยิ่งไปกว่านั้น จิตรกรรมฝาผนังที่สลักไว้ด้านนอกห้องโถงยังนำมาซึ่งการค้นพบอันเหลือเชื่อ: ดาวเคราะห์ดวงนี้ก็คือสกราวิร์ด บ้านบรรพบุรุษของพลเรือเอกสแกรนด์ ชาร์ปบีค ผู้มีชื่อเสียงนั่นเอง!"
 arcsite.3030.b.desc: "$arcsite.3030.intro$\n\nจิตรกรรมฝาผนังที่สลักไว้ด้านนอกห้องโถงระบุว่าดาวเคราะห์ดวงนี้เคยมีชื่อว่าสกราวิร์ด"
 arcsite.3030.tt: "เปลี่ยนชื่อดาวเคราะห์เป็น §Yเดอะชราวด์§!"
 arcsite.3031.name: "ไม่มีรังใดเหมือนบ้าน"
 arcsite.3031.desc: "เจ้าพบสกราวิร์ดแล้ว ข้านึกว่าบ้านของข้าสูญหายไปตลอดกาลเสียอีก\n\nการได้มีโอกาสเหยียบพื้นดินของมันอีกครั้ง ได้สัมผัสลมอุ่นจากทิศใต้พัดผ่านขนของข้า... สิ่งที่เจ้าทำให้ข้าและประชาชนของข้านั้นเกินกว่าจะประเมินค่าได้\n\nข้ารู้สึกสดชื่นขึ้น ทั้งร่างกายและจิตใจ เจ้าจงรับความขอบคุณของข้าไป"
 arcsite.3031.a: "ขอให้โชคดีนะท่านพลเรือเอก"
 arcsite.3035.name: "ดวงตาที่เปิดขึ้น"
 arcsite.3035.desc: "เราได้พิสูจน์แล้วว่าคราซูราไม่ได้มีถิ่นกำเนิดอยู่ในมิติของเรา พวกเขามาถึงผ่านประตูบางประเภท และพบว่าตนเองลอยเคว้งอยู่ในกาแล็กซีที่แปลกประหลาดและต่างไปจากเดิมอย่างสิ้นเชิง ต่อมาอีกนาน มหาโถงจึงถูกสร้างขึ้นครอบจุดที่พวกเขามาถึง\n\nบันทึกไม่กี่ชิ้นที่ยังเหลืออยู่ระบุว่าพวกเขามองตนเองว่าเป็นผู้ชี้ขาดแห่งพลังอันยิ่งใหญ่และลี้ลับ ผู้นำสูงสุดของพวกเขา ซึ่งรู้จักกันในนาม “ยาคูรา” ถูกเชื่อว่าเป็นบุคคลเพียงหนึ่งเดียวที่กลับชาติมาเกิดใหม่ในร่างใหม่ทุกชั่วรุ่น\n\nใต้มหาโถง เราได้ขุดพบซากของผู้ปกครองเหล่านี้หลายร่าง ที่น่าสนใจก็คือ ร่างยุคแรกสุดมีโครงสร้างทางพันธุกรรมต่างจากร่างรุ่นถัดมา ดูเหมือนว่าการเดินทางสู่เอกภพนี้จะส่งผลต่อดีเอ็นเอของคราซูราโดยตรง จนนำไปสู่การปรากฏของดวงตา “ชุดคู่”"
 arcsite.3035.b.evopred: "ว่าไงนะ ดีเอ็นเอข้ามมิติหรือ?"
 arcsite.3040.name: "ภัยคุกคาม"
 arcsite.3040.desc: "คราซูราเริ่มต้นในเอกภพของเราในฐานะผู้ลี้ภัย ถึงกระนั้น บันทึกที่ค้นพบใกล้มหาโถงแสดงให้เห็นว่าพวกเขาสถาปนาตนเป็นจักรวรรดิระหว่างดวงดาวอันทรงพลังได้อย่างรวดเร็ว ตลอดหลายชั่วรุ่น พวกเขาเพลิดเพลินกับยุคทอง ผู้คนของพวกเขารุ่งเรือง และความสามารถกับอำนาจสูงสุดของยาคูราไม่เคยถูกตั้งคำถาม จนกระทั่งภัยคุกคามปรากฏขึ้น\n\nศัตรูซึ่งไม่เหมือนสิ่งใดที่พวกเขาเคยเผชิญมาก่อน ศัตรูไร้นามนี้ดูเหมือนจะหมกมุ่นอยู่กับการทำลายพวกเขา เหล่าปราชญ์ผู้ยิ่งใหญ่ที่สุดของคราซูรายืนหยัดอย่างไร้อำนาจต่อหน้าภัยคุกคามที่ไม่อาจต้านทาน พลังเวทอันยิ่งใหญ่ของพวกเขากลับไร้ผล"
 arcsite.3045.name: "การอพยพครั้งสุดท้าย"
 arcsite.3045.a.desc: "เราได้ค้นพบบันทึกชุดหนึ่งซึ่งให้เบาะแสเกี่ยวกับชะตากรรมของคราซูรา\n\nผู้บัญชาการเรือธงของกองทัพเรือพวกเขาคือพลเรือเอกในตำนาน วีรบุรุษผู้ยิ่งใหญ่ของประชาชน ก่อนที่ภัยคุกคามจากต่างดาวจะคว้าชัยชนะครั้งสุดท้ายได้ เขาและลูกเรือถูกส่งไปปฏิบัติภารกิจสุดท้ายอันห้าวหาญ ในความพยายามตีโอบศัตรู พวกเขาเข้าสู่เกตเวย์ที่ยังไม่ผ่านการทดสอบ และทั้งยานกับลูกเรือก็ไม่เคยมีใครได้ยินข่าวอีกเลย\n\nสิ่งที่เกิดขึ้นยังคงเป็นปริศนา เป็นไปได้หรือไม่ว่ายานลำนั้นยังคงลอยอยู่ที่ไหนสักแห่ง?"
 arcsite.3045.b.desc: "เราได้ค้นพบบันทึกชุดหนึ่งซึ่งให้เบาะแสเกี่ยวกับชะตากรรมของคราซูรา\n\nในการพยายามตีโอบศัตรูอย่างกล้าหาญ ยาคูราสั่งให้เรือธงเข้าสู่เกตเวย์ที่ยังไม่ผ่านการทดสอบ ผู้ที่บัญชาการอยู่คือพลเรือเอกสแกรนด์ ชาร์ปบีค ในตำนาน\n\nเขาและลูกเรือคือผู้รับสืบทอดมรดกอันน่าทึ่ง ไม่ว่าสแกรนด์จะยอมรับตำแหน่งนี้หรือไม่ก็ตาม ประชาชนของเขาบัดนี้ต่างมองไปที่เขาในฐานะยาคูรา"
 arcsite.3045.a: "ขอให้ปีกของเขาโผบิน"

 #Krazura Random Events

 arcsite.3055.name: "วิหคอัปมงคล"
 arcsite.3055.desc: "แม้ความคืบหน้าโดยรวมจะชะงักงัน [owner.GetResearchers] ของเราก็ได้เปิดทางเข้าสู่ห้องที่ไม่เคยค้นพบมาก่อน ภายในนั้นมีรูปปั้นขนาดมหึมาตั้งอยู่ งดงามแต่ก็น่าเกรงขามไม่แพ้กัน\n\nมันมีรูปร่างแบบนก คอยาวทรงพลังของมันประกอบจากข้อโลหะที่ลอยอยู่กับที่ได้อย่างน่าอัศจรรย์ ขนแหลมคมปะทุออกมาจากกะโหลกอันสูงศักดิ์ และดวงตาของมันคือประกายทองแห่งอำนาจ ขณะที่เคลื่อนผ่านห้อง [owner.GetResearchers] ของเรารู้สึกไม่สบายใจราวกับว่ากำลังถูกจ้องมองอยู่\n\nด้านหลังร่างนั้น พวกเขาค้นพบประตูหรือผนึกที่ซ่อนอยู่ แต่สิ่งใดก็ตามที่วิหคอัปมงคลนี้เคยเฝ้าป้องกันมานานแล้วได้หยุดทำงานไป"
 arcsite.3060.name: "ขนเน่าเปื่อย"
 arcsite.3060.desc: "จากสิ่งที่เราค้นพบจนถึงตอนนี้ อารยธรรมนี้ย่อมไม่ใช่คนแปลกหน้าต่อโศกนาฏกรรม\n\nบันทึกโบราณซึ่งเก็บไว้ในสิ่งที่ดูคล้ายสุสานหรือหอเก็บศพแห่งหนึ่ง บอกเล่าถึงการอุบัติขึ้นของโรคระบาดใหญ่ ซึ่งเล่นงานสรีระแบบนกของสายพันธุ์นี้ในลักษณะที่โหดร้ายเป็นพิเศษ\n\nไวรัสดังกล่าวเริ่มแสดงอาการที่ขน ทำให้ขนเน่าจากโคน ภายในไม่กี่วัน ผลกระทบก็ลามไปถึงกระแสเลือด เราไม่อาจทราบได้แน่ชัด แต่การประเมินเบื้องต้นชี้ว่าอัตราการเสียชีวิตสูงเกิน 30%\n\nมีการสร้างอนุสรณ์อันสะเทือนใจขึ้นกลางจัตุรัสหลักแห่งหนึ่งของเมือง บนนั้น เหนือกองกระดูก มีนกโครงกระดูกเพียงตัวเดียวเงยหน้ามองท้องฟ้าอย่างสิ้นหวัง ขนที่หลุดร่วงของมันกระจัดกระจายอยู่รอบกรงเล็บเปราะบางคู่หนึ่ง"
 arcsite.3060.a: "น่ากลัวยิ่งนักแม้เพียงจะนึกถึง"
 arcsite.3060.b: "ชวนสยดสยอง"

