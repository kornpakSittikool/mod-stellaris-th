 situation.1070.name:0 "เศษ โลหะ"
 situation.1070.desc:0 "เช้านี้ เซอไพรส์รออยู่§Y[Target.GetName]§!คือ§Yสคาเวนเจอร์§!เก็บการสร้างครั้งสุดท้ายไว้ ในห้องเก็บของของเรา ชิ้นส่วนขนาดใหญ่ของอัลลอยนั้นหนาแน่นขึ้น และแน่นขึ้นกว่าอะไรที่เราเคยหวังว่าจะผลิตได้ การพัฒนาที่ยอดเยี่ยมนี้ มีของเรา[Owner.GetScientistPlural]เชื่อว่าพวกเขาสามารถทําให้แมทเลอร์ทํางานอีกครั้งที่§G0.001%§!มีประสิทธิภาพถ้าเราควรปรารถนามัน"
