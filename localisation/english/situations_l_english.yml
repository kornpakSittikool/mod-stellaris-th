 situation.5.name:0 "เขาวงกตลึกลับ"
 situation.5.desc:1 "อาณานิคมของเราบน[This.GetName]ได้ค้นพบสิ่งที่น่าตกใจ ลึก ๆ ใน เทือก เขา อัน ห่าง ไกล พวก เขา ได้ พบ โครง สร้าง อัน ลึกลับ ซึ่ง ตาม การ สแกน ของ เรา นั้น ไม่ อยู่ ที่ นั่น เมื่อ เรา สํารวจ ครั้ง แรก[This.GetPlanetMoon]สภาวะของมันดีมาก ราวกับว่ามันถูกสร้างขึ้นใหม่[Owner.GetAdj]มีส่วนร่วมในการก่อสร้าง ในความเป็นจริง สถาปัตยกรรมของมันแสดง ลักษณะของมนุษย์ต่างดาว มีเส้นโค้งและมุมที่ดูผิดปกติ\n\nที่ ประตู บ้าน มี ป้าย บอก ทาง (ใน ภาษา ของ เรา น่า สงสัย) พร้อม ด้วย ถ้อย คํา\"ขอต้อนรับสู่พระวรวงศ์ลาบิรินธ์สุดเลิศ แห่งกรมขนส่งสัตว์พันธุ์ เข้าที่ความเสี่ยงของคุณเอง.\""
 situation.5.A:0 "ส่งทีมไปสืบสวน"
 situation.5.A.tooltip:0 "ทางเข้านี้จะค่าใช้จ่าย£energy£ §R5§! §Yพลังงาน§!เดือนนึง"
 situation.5.B:0 "เราไม่มีเวลาสําหรับเรื่องนี้"
 situation.10.name:0 "การ เคลื่อน ไหว ที่ น่า ทึ่ง"
 situation.10.desc:0 "ดูเหมือนว่าเขาวงกตของเอเลี่ยน[Target.GetName]พยายามดึงความสนใจของเรา ของเรา[Owner.GetResearchers]มีตําแหน่งต่าง ๆ เช่น อาคารแห่งหนึ่ง แต่นั่นเป็นวิธีเดียว ที่จะนํามันเข้ามา คือ ตอนนี้เขาวงกตไม่ได้ตั้งอยู่ บนทางเขาห่างไกลอีกต่อไป ตั้งแต่วันที่หนึ่งถึงวันถัดมา มันเปลี่ยนที่ตั้งอย่างอธิบายไม่ได้ และสัญญาณเตือนที่ทางเข้าก็หายไป\n\nในขณะที่บางคนอยากจะเข้าไป[Owner.GetResearchers]เตือนไว้ก่อน อย่าง ไร ก็ ตาม สิ่ง ที่ เห็น ได้ ชัด คือ เรา ไม่ สามารถ พอ ใจ กับ การ เฝ้า สังเกต ทาง เขาวงกต ได้ อีก ต่อ ไป จึง จําเป็น."
 situation.10.desc.gestalt:0 "ดูเหมือนว่าเขาวงกตของเอเลี่ยน[Target.GetName]พยายามดึงความสนใจของเรา แม้ จะ ดู เหมือน น่า แปลก ใจ ที่ อาคาร หลัง หนึ่ง จะ มี ความ สํานึก ใน เรื่อง ใด ๆ แต่ นั่น เป็น วิธี เดียว เท่า นั้น ที่ จะ กล่าว ได้: บัด นี้ เขาวงกต ไม่ ได้ ตั้ง อยู่ ใน ทาง ผ่าน ภูเขา อัน ห่าง ไกล อีก ต่อ ไป แต่ บัด นี้ กลับ ตั้ง อยู่ ห่าง จาก บริเวณ หนึ่ง ของ เรา ซึ่ง เป็น พื้น ที่ หลัก แห่ง หนึ่ง. ตั้งแต่วันที่หนึ่งถึงวันถัดมา มันเปลี่ยนที่ตั้งอย่างอธิบายไม่ได้ และสัญญาณเตือนที่ทางเข้าก็หายไป\n\nการเปลี่ยนแปลงนี้จะทําให้มันยากที่จะป้องกัน[owner.GetIndividualNamePlural]จาก หลง ไป ใน ทาง นั้น เว้น แต่ เรา จะ พยายาม ผูก พัน ใกล้ ชิด กับ บริเวณ นั้น."
 situation.10.A:0 "อย่าเข้ามา ห้ามใครเข้าไป"
 situation.10.A.tooltip:0 "ทางเข้านี้จะค่าใช้จ่าย£energy£ §R10§! §Yพลังงาน§!เดือนนึง"
 situation.10.B:0 "บางทีเราควรจะตรวจสอบมัน หลังจากทั้งหมด"
 situation.10.C:0 "เขาวงกตมันอันตราย มันต้องถูกทําลาย"
 situation.15.name:0 "โปรดทราบ"
 situation.15.desc.base:0 "เขาวงกตดูเหมือนจะไม่พอใจที่เราไม่สนใจ โครง สร้าง ทั้ง หมด ค่อย ๆ เปลี่ยน ไป ใน เรื่อง การ ปรากฏ ตัว, การ ขุด ค้น จาก สิ่ง ก่อ สร้าง ที่ ห้าม เข้า ไป ใน สิ่ง ที่ ดู เหมือน เป็น วัง ที่ น่า เพลิดเพลิน อย่าง น่า ทึ่ง."
 situation.15.desc.base.end:1 "ของเรา[Root.Owner.GetResearchers]มี การ ใช้ ประโยชน์ จาก การ เปลี่ยน แปลง นี้ และ ยิ่ง ยาก ขึ้น เรื่อย ๆ ที่ จะ ป้องกัน ไม่ ให้ ใคร เข้า ไป ใน โครง สร้าง."
 situation.15.desc.standard:0 "$situation.15.desc.base$สัญญาณเตือนของอันตรายหายไป ตอนนี้น่ารัก[Owner.Species.GetClass] [Owner.Species.GetSpawnNamePlural]ไต่รอบทางเข้า, เรียกร้องความสนใจ, และอย่างใดภายในให้ ประทับใจของหาดกว้างใหญ่และดวงอาทิตย์ที่ไม่รู้สิ้นสุดเพียงกว่าสายตา\n\n$situation.15.desc.base.end$"
 situation.15.desc.human:0 "$situation.15.desc.base$ลูก แมว ที่ น่า รัก จะ เดิน ย่อง ไป มา รอบ ๆ ทาง เข้า เพื่อ จะ ได้ รับ ความ สนใจ.\n\n$situation.15.desc.base.end$"
 situation.15.desc.gestalt.base:0 "เขาวงกตดูเหมือนจะไม่พอใจที่เราไม่สนใจ โครง สร้าง ทั้ง หมด ค่อย ๆ เปลี่ยน ไป เรื่อย ๆ จาก สิ่ง ปลูก สร้าง ที่ ห้าม เป็น สิ่ง ที่ ดู เหมือน เป็น สถาน เก็บ ของ ที่ หรูหรา อย่าง น่า ทึ่ง."
 situation.15.desc.gestalt.base.end:1 "ของเรา[Root.Owner.GetResearchers]มี การ ใช้ ประโยชน์ จาก การ เปลี่ยน แปลง นี้ และ ยาก ขึ้น เรื่อย ๆ ที่ จะ ป้องกัน[Root.Owner.GetIndividualNamePlural]จากการเข้าไปในโครงสร้าง"
 situation.15.desc.machine:0 "$situation.15.desc.base$สัญญาณเตือนอันตรายหายไป อุปกรณ์ที่นําเสนอน้ํามันเกียร์ที่มีคุณภาพสูง การกําจัดรอยขีดข่วน\n\n$situation.15.desc.gestalt.base.end$"
 situation.15.desc.hive:0 "$situation.15.desc.base$สัญญาณ เตือน ถึง อันตราย ได้ หาย ไป แล้ว; บัด นี้ อุปกรณ์ ต่าง ๆ เสนอ[Root.Owner.GetIndividualNamePlural]สารอาหารที่มีคุณภาพสูง อารมณ์ที่ปลอบโยนประสาท และการทดแทนไส้ติ่ง มองเห็นแค่ในทางเข้า\n\n$situation.15.desc.gestalt.base.end$"
 situation.15.A:0 "เราจะต้องเพิ่มความพยายามของเรา"
 situation.15.A.tooltip:0 "ทางเข้าของเราในปัจจุบันตอนนี้จะค่าใช้จ่ายเพิ่มเติม£unity£ §R10§! §Yเอกภาพ§!ต่อเดือน"
 situation.20.name:0 "บําเหน็จ สําหรับ ความ กระวนกระวาย"
 situation.20.desc:0 "เขาวงกตหายไปแล้ว จาก วัน หนึ่ง ไป อีก วัน หนึ่ง มัน หาย ไป เลย. บนเว็บไซต์ของมัน ข้อความถูกทิ้งไว้ให้เรา\"แม้ว่าจะเป็นความตั้งใจของเราที่จะศึกษา สิ่งมีชีวิตในมิติของคุณภายในหน่วยงานของเรา เราจะเพิ่มขึ้นโดยประสบการณ์ มันจะพิสูจน์ประโยชน์มากที่สุดของเรา ความพยายาม เพื่อเป็นสัญลักษณ์ของความปรารถนาดีของเรา เราปล่อยให้คุณ ผิดปกติเล็กน้อยเวลา ที่สถานที่ของห้องทดลองของเรา เราหวังว่ามันจะพิสูจน์... การเบี่ยงเบนความสนใจของคุณ"
 situation.25.name:0 "ห้อง อบ ไอ น้ํา"
 situation.25.desc:0 "ทั้ง ๆ ที่ มี คุณสมบัติ แปลก ๆ แต่ เขาวงกต ก็ ไม่ เห็น ว่า เหมาะ กับ อาวุธ หนัก ของ เรา. ที่มันวาง มีแต่เศษซาก\n\nแต่ น่า เสียดาย เรา ไม่ สามารถ เก็บ ได้ มาก จาก ซาก ปรัก หัก พัง แต่ ส่วน ที่ แปลก ประหลาด ซึ่ง ใช้ ใน การ ก่อ สร้าง นี้ สามารถ กู้ กลับ คืน มา ได้."
 situation.30.name:0 "ภาษาละตินหายไป"
 situation.30.desc:0 "เขาวงกตหายไปแล้ว จาก วัน หนึ่ง ไป อีก วัน หนึ่ง มัน หาย ไป เลย. ไม่มีอะไรเหลือในเว็บไซต์ที่มันเคยยืนอยู่ออกจากของเรา[Owner.GetResearchers]สับสนว่ามันคืออะไร แต่บางทีเราอาจจะรู้มากกว่า"
 situation.30.A:0 "ภัยคุกคามถูกเอาไปจากเรา"
 situation.40.name:0 "รายงานการหมดอายุ"
 situation.40.desc:0 "การสื่อสารของเราเชื่อมต่อกับ[Owner.GetResearchers]เราส่งเข้าไปในเขาวงกต ถูกตัดขาดทันทีที่พวกเขาเข้ามา ไม่ มี ใคร ได้ ยิน มา หลาย วัน ขณะ ที่ เรา คอย อย่าง กระวนกระวาย. เมื่อ เวลา ผ่าน ไป เรา ยอม แพ้ แก่ การ สูญ เสีย คน ของ เรา.\n\nครั้น แล้ว เมื่อ ความ หวัง ทั้ง หมด สูญ หาย ไป พวก เขา ก็ กลับ มา มี ชีวิต อีก! อย่างไรก็ตาม สิ่งนี้ได้ยกแต่คําถามที่ว่า[Owner.GetResearchers]โดย ผู้ เขียน ตื่น เถิด! ยิ่ง กว่า นั้น แม้ ว่า พวก เขา อยู่ ใน เขาวงกต ไม่ กี่ สัปดาห์ ดู เหมือน ว่า พวก เขา แก่ ลง หลาย ปี แล้ว!"
 situation.45.name:0 "ความสับสนต่อเนื่อง"
 situation.45.desc:0 "การ เดิน ทาง ต่อ ไป ใน เขาวงกต ก่อ ผล แตก ต่าง กัน ไป บาง ครั้ง ยัง ผล ที่ ไม่ น่า พอ ใจ. มีอยู่ครั้งหนึ่ง[Owner.GetResearchers]ในชั่วพริบตา และไม่สามารถตอบได้ว่า ทําไมพวกเขาหันหลังกลับอย่างรวดเร็ว ในอีกคนหนึ่งที่พวกเขาหายไปสําหรับสัปดาห์ แต่กลับมาดูเหมือนอายุน้อยกว่าที่พวกเขาได้ซ้ายและมีช่องว่างยาวในหน่วยความจําของพวกเขา บาง กลุ่ม กลับ มา อยู่ ใน สภาพ ร่าง กาย ที่ ดี กว่า แต่ ก่อน; คน อื่น ๆ ทํา ให้ แผล ใหม่ ๆ ที่ ได้ รับ บาด เจ็บ สาหัส.\n\nเมื่อเวลาผ่านไป ป้ายที่ทางเข้าก็เปลี่ยนไปด้วย\"เข้าที่ความเสี่ยงของคุณเอง\" กลายเป็น \"อันตรายของความตาย\" และในที่สุด\"คําเตือน!ปฏิเสธ! อย่าเข้าไปในเขาวงกต ถ้าคุณทําดาวเคราะห์จะระเบิด.\" ในการสัมผัสอย่างบ้าคลั่ง[Owner.GetAdj] [Owner.Species.GetRemnantNamePlural]ตกแต่ง ผนัง ให้ งดงาม แม้ ว่า บริเวณ ที่ พวก เขา มา นั้น จะ ไม่ ชัดเจน เนื่อง จาก ไม่ มี การ หาย สาบสูญ ไป เมื่อ เร็ว ๆ นี้.\n\nมันไม่ชัดเจนว่าการศึกษาจะนําไปสู่ -[Owner.GetResearchers]ชี้ ให้ เห็น ว่า เรา ไม่ มี ทาง ยืน ยัน หรือ ปฏิเสธ คํา เตือน ที่ กล่าว ไว้ บน ป้าย นั้น. อย่าง ไร ก็ ตาม เป็น เรื่อง ยาก ขึ้น เรื่อย ๆ ที่ จะ หา อาสา สมัคร เข้า ไป ใน เขาวงกต."
 situation.45.desc.hive:0 "การ เดิน ทาง ต่อ ไป ใน เขาวงกต ก่อ ผล แตก ต่าง กัน ไป บาง ครั้ง ยัง ผล ที่ ไม่ น่า พอ ใจ. มีอยู่ครั้งหนึ่ง[Owner.GetResearchers]ในชั่วพริบตา และไม่สามารถตอบได้ว่า ทําไมพวกเขาหันหลังกลับอย่างรวดเร็ว อีกอย่างหนึ่ง พวกเขาหายไปเป็นสัปดาห์ แต่กลับมาพร้อมกับช่องว่างของปี ในความทรงจําของพวกเขา บาง กลุ่ม กลับ มา อยู่ ใน สภาพ ร่าง กาย ที่ ดี กว่า แต่ ก่อน; คน อื่น ๆ ทํา ให้ แผล ใหม่ ๆ ที่ ได้ รับ บาด เจ็บ สาหัส.\n\nเมื่อเวลาผ่านไป ป้ายที่ทางเข้าก็เปลี่ยนไปด้วย\"เข้าที่ความเสี่ยงของคุณเอง\" กลายเป็น \"อันตรายของการสลายตัว\" และสุดท้าย\"คําเตือน!ปฏิเสธ! อย่าเข้าไปในเขาวงกต ถ้าคุณทําดาวเคราะห์จะระเบิด.\" ในการสัมผัสอย่างบ้าคลั่ง[Owner.GetAdj] [Owner.Species.GetRemnantNamePlural]ตกแต่ง ผนัง ให้ งดงาม แม้ ว่า บริเวณ ที่ พวก เขา มา นั้น จะ ไม่ ชัดเจน เนื่อง จาก ไม่ มี การ หาย สาบสูญ ไป เมื่อ เร็ว ๆ นี้.\n\nมันไม่ชัดเจนว่าการศึกษาจะนําไปสู่ -[Owner.GetResearchers]ชี้ ให้ เห็น ว่า เรา ไม่ มี ทาง ยืน ยัน หรือ ปฏิเสธ คํา เตือน ที่ กล่าว ไว้ บน ป้าย นั้น. อย่างไรก็ตาม มันเป็นเรื่องยากที่จะค้นหา[owner.GetIndividualNamePlural]เพื่อเข้าไปในเขาวงกต"
 situation.45.desc.machine:0 "การ เดิน ทาง ต่อ ไป ใน เขาวงกต ก่อ ผล แตก ต่าง กัน ไป บาง ครั้ง ยัง ผล ที่ ไม่ น่า พอ ใจ. มีอยู่ครั้งหนึ่ง[Owner.GetResearchers]ในชั่วพริบตา และไม่สามารถตอบได้ว่า ทําไมพวกเขาหันหลังกลับอย่างรวดเร็ว ในอีกที่พวกเขาหายไปสําหรับสัปดาห์และกลับมากับฮาร์ดไดรฟ์ของพวกเขาเช็ด บาง กลุ่ม กลับ มา แสดง ให้ เห็น ว่า พวก เขา ใส่ เสื้อ ผ้า และ ฉีก เสื้อ ผ้า ของ ตน น้อย กว่า; ส่วน บาง กลุ่ม เล่น ฟัน ใหญ่ ๆ หรือ ไม่ ก็ ไม่ มี รอย ต่อ.\n\nเมื่อเวลาผ่านไป ป้ายที่ทางเข้าก็เปลี่ยนไปด้วย\"เข้าที่ความเสี่ยงของคุณเอง\" กลายเป็น \"อันตรายของไม่ปรากฏหลักฐาน\" และสุดท้าย\"คําเตือน!ปฏิเสธ! อย่าเข้าไปในเขาวงกต ถ้าคุณทําดาวเคราะห์จะระเบิด.\" ในการสัมผัสอย่างบ้าคลั่ง[Owner.GetAdj] [Owner.Species.GetRemnantNamePlural]ตกแต่ง ผนัง ให้ งดงาม แม้ ว่า บริเวณ ที่ พวก เขา มา นั้น จะ ไม่ ชัดเจน เนื่อง จาก ไม่ มี การ หาย สาบสูญ ไป เมื่อ เร็ว ๆ นี้.\n\nมันไม่ชัดเจนว่าการศึกษาจะนําไปสู่ -[Owner.GetResearchers]ชี้ ให้ เห็น ว่า เรา ไม่ มี ทาง ยืน ยัน หรือ ปฏิเสธ คํา เตือน ที่ กล่าว ไว้ บน ป้าย นั้น. อย่าง ไร ก็ ตาม เป็น เรื่อง ยาก ขึ้น เรื่อย ๆ ที่ จะ หา หุ่น ยนต์ เข้า ไป ใน เขาวงกต."
 situation.50.name:0 "การ ออก จาก บ้าน"
 situation.50.desc:0 "ตรงกันข้ามกับคําเตือน เขาวงกตไม่ได้ถูกทําลาย[Target.GetName]แทน ที่ จะ เป็น เช่น นั้น การ เดิน ทาง ของ มัน ค่อน ข้าง จะ ไม่ เป็น ที่ น่า สังเกต ตั้ง แต่ วัน หนึ่ง ไป จน ถึง วัน ถัด ไป มัน ก็ หาย ไป. ข้อความที่ถูกทิ้งไว้\"เราขอขอบคุณที่กรุณาให้เราได้ศึกษา สิ่งมีชีวิตในมิติของคุณ มันได้พิสูจน์แล้วว่ามีประโยชน์ต่อ... ความพยายามของเรา โชคดีที่คุณพิสูจน์มากพอ ... ที่น่าสนใจเพื่อกระทรวงการรักษาความปลอดภัยพิเศษสําหรับพวกเขา เพื่อเป็นสัญลักษณ์ของความปรารถนาดีของเรา เราปล่อยให้คุณ ผิดปกติเล็กน้อยเวลา ที่สถานที่ของห้องทดลองของเรา เราหวังว่ามันจะพิสูจน์... การเบี่ยงเบน"
 situation.50.A:0 "เราจะเจาะลึกความลับของมัน"
 situation.55.name:0 "การ เดิน ทาง ไป ยัง ที่ ห่าง ไกล"
 situation.55.desc:0 "ตรงกันข้ามกับคําเตือน เขาวงกตไม่ได้ถูกทําลาย[Target.GetName]อย่างไรก็ตาม มันทิ้งเครื่องหมายไว้อย่างแน่นอน: แผ่นดินไหวทําลายแผ่นดินและภูเขาไฟ, ยาว- เดอร์แมนท์ผุดขึ้นมาในชีวิต\n\nและในท่ามกลางความหายนะอันใหญ่หลวง\"เราขอขอบคุณดังนั้นกรุณาอนุญาตให้เราศึกษา สิ่งมีชีวิตของมิติของคุณ มันได้พิสูจน์แล้วว่ามีประโยชน์ต่อ... ความพยายามของเรา เราขออภัยในความไม่สะดวกของสาเหตุการลาออกจากประเทศ เราไม่สามารถที่จะรักษาความปลอดภัยที่จําเป็น จากกระทรวงความมั่นคงนอกโลก สําหรับการถอนเงินอย่างราบรื่น เพื่อเป็นสัญลักษณ์ของความปรารถนาดีของเรา เราปล่อยให้คุณ ผิดปกติเล็กน้อยเวลา ที่สถานที่ของห้องทดลองของเรา เราหวังว่ามันจะพิสูจน์... การเบี่ยงเบน"
 situation.55.A:0 "ทุกเมฆมีชั้นเงินของมัน"

 d_space_time_anomaly:0 "ความผิดปกติในปริภูมิ-เวลา"
 d_space_time_anomaly_desc:0 "ความผิดปกติของอวกาศและเวลา ที่เกิดขึ้นอย่างต่อเนื่องอย่างน่าทึ่ง ถูกทิ้งไว้โดยสายพันธุ์พิเศษ ซึ่งทําการวิจัยบนดาวเคราะห์ดวงนี้ ความ หมาย ทาง วิทยาศาสตร์ ของ การ ดํารง อยู่ ของ มัน ดู เหมือน ว่า ลึก ซึ้ง ที เดียว."
