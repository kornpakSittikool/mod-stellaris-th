 # Project (following times)
 KALEIDOSCOPE_INFESTATION: "สี"
 KALEIDOSCOPE_INFESTATION_DESC: "อีกครั้งที่กล้องคาลิดโดสโคปได้เกาะกับตารางพลังงานของเรา บริโภคพลังงานของเรา\n\nโชคดีที่ตอนนี้เรารู้ว่าจะตอบสนองอย่างไร"

