 situation.1000.name:0 "[This.GetLeviathanTargetName]"
 situation.1000.desc.small:0 "วันนี้มาถึงแล้ว ของเรา[Owner.GetSensoryWorkers]อยู่ในตําแหน่งและพร้อมที่จะให้เราสํารวจอย่างละเอียดของ§Y[This.GetTrophyName]§!ขณะที่การศึกษาเริ่มต้นส่วนย่อย ๆ ของจิตสํานึกของเราเน้นที่§Y[Target.GetName]§!เพื่อดูดซับการศึกษาของสิ่งของ อย่างไรก็ตาม การเปิดเผยไม่ได้น่าสนใจ เท่าที่เราหวังไว้[Target.GetPlanetHabitat].\n\nหลัง จาก กระบวนการ เริ่ม ต้น ไม่ นาน เรา ตัดสิน ใจ ย้าย การ ศึกษา ไป ยัง ศูนย์ ของ กระจุก ดาว ของ เรา[Target.GetName]ที่ที่ผู้เชี่ยวชาญ[Owner.GetSensoryWorkers]จะ เฝ้า ดู อยู่ เสมอ. หวังว่าจะมีอะไรมากกว่านั้น"
 situation.1000.desc.standard:0 "วันนี้มาถึงแล้ว ของเรา[Owner.GetSensoryWorkers]อยู่ในตําแหน่งและพร้อมที่จะให้เราสํารวจอย่างละเอียดของ§Y[This.GetTrophyName]§!ขณะ ที่ การ ศึกษา เริ่ม ต้น ส่วน สําคัญ ของ สติ รู้สึก ผิด ชอบ ของ เรา มุ่ง เน้น ที่§Y[Target.GetName]§!เพื่อดูดซับการนําเข้าของวัตถุอนิเมชั่นนี้ ความจุใน[Owner.GetName]ลดลงจากหนึ่งส่วน§H0.2%§!สําหรับวันนี้\n\nข้อมูลประสาทสัมผัสถูกบันทึกลึกในจิตสํานึกของเรา ก่อนที่จะวางในใจกลางของกลุ่มของเราบน[Target.GetName]ที่ที่ผู้เชี่ยวชาญ[Owner.GetSensoryWorkers]จะ เฝ้า ดู อยู่ เสมอ."
 situation.1000.desc.large:0 "วันนี้มาถึงแล้ว จํานวนมากของ[Owner.GetSensoryWorkers]อยู่ในตําแหน่งและพร้อมที่จะให้เราสํารวจที่แน่นอนของ§Y[This.GetTrophyName]§!ขณะที่การศึกษาเริ่มต้นสําหรับช่วงเวลาที่จิตสํานึกของเราทั้งหมดเน้นที่§Y[Target.GetName]§!เพื่อดูดซับการศึกษาของวัตถุที่รบกวนจิตใจเรา หลาย[owner.GetIndividualNamePlural]การ ตก อยู่ ใน สถานการณ์ ที่ ไม่ มั่นคง ได้ รับ ความ เสีย หาย จาก การ ล่อ ใจ ชั่ว ขณะ และ บาง คน ถึง กับ หลง ทาง. เราหลงใหลมาก\n\nหลังจากการศึกษาครั้งแรกเสร็จสมบูรณ์ เราตัดสินใจที่จะย้ายมันไปยังใจกลางของกระจุกของเราบน[Target.GetName]ที่ที่ผู้เชี่ยวชาญ[Owner.GetSensoryWorkers]จะ เฝ้า ดู อยู่ เสมอ. เราวางมันลง, เกือบถวายเกียรติ, และยังคงอุทิศเป็นส่วนหนึ่งของจิตสํานึกของเรา"
 situation.1000.a:0 "ผลลัพท์"
 situation.1000.b:0 "เราจะจดจํา[This.GetLeviathanTargetName]."
 situation.1000.c:1 "ใน[This.GetTrophyName]เราได้ค้นพบตัวเองแล้ว"
 situation.1005.name:0 "[This.GetLeviathanParadeName]"
 situation.1005.desc.small:0 "วัน แห่ง การ ประท้วง§Y[Target.GetName]'§!เมืองหลวงวันนี้ ขบวน แห่ ที่ มี ข้อ พิสูจน์ ว่า เรา ถูก ทําลาย§Y[This.GetLeviathanTargetName]§!ผ่านผู้คนที่ท่องเที่ยวไปมา ความ ก้าว หน้า ของ จักรวรรดิ นี้ ได้ รับ การ ถ่ายทอด ทั่ว จักรวรรดิ ของ เรา แต่ การ หมั้น นั้น มี น้อย มาก เมื่อ[This.GetTrophyName]ดู เหมือน ไม่ น่า ดึงดูด ใจ เท่า ที่ เรา เคย คิด ไว้.\n\nหลังจากจบทัวร์รอบโลก[This.GetTrophyName]ถูกวางในการแสดงพิเศษที่ใจกลางเมืองหลวง เพื่อสร้างแรงบันดาลใจให้คนรุ่นต่อไป"
 situation.1005.desc.standard:0 "วันสว่างสวัสดีฝูงชนแพ็คบน§Y[Target.GetName]§!ปัจจุบัน ขณะ ที่ ขบวน แห่ ดําเนิน การ พิสูจน์ ว่า เรา ถูก ทําลาย§Y[This.GetLeviathanTargetName]§!เดินทางผ่าน[Target.GetPlanetHabitat]เมือง ความก้าวหน้าของขบวนพาเหรดได้ออกอากาศทั่วจักรวรรดิของเรา ถึงล้านของผู้ชม เดอะ[This.GetTrophyName]ดูเหมือนจะกลายเป็นที่ยึดเหนี่ยวของ[Owner.Species.GetAdj]วัฒนธรรม แรงบันดาลใจ และผู้สร้าง[Owner.GetName].\n\nหลังจากจบทัวร์รอบโลก[This.GetTrophyName]ถูกวางในการแสดงพิเศษที่ใจกลางเมืองหลวง เพื่อสร้างแรงบันดาลใจให้คนรุ่นต่อไป"
 situation.1005.desc.large:0 "สภาพอากาศบน§Y[Target.GetName]§!เป็นที่ยอดเยี่ยมอย่างผิดธรรมชาติในวันนี้ อย่างที่มันควรจะเป็น พิจารณาจากการทํางานของเรา ทุกเมืองใน[Target.GetPlanetHabitat]จน ถึง ขีด สุด และ ยัง คง มี เรือ ท่อง เที่ยว ที่ โคจร รอบ โลก เพียง เพื่อ เป็น ส่วน หนึ่ง ของ วัน อัน ยิ่ง ใหญ่ นี้. ขบวน แห่ ใหญ่ เดิน ทาง ผ่าน การ ตั้ง ถิ่น ฐาน แต่ ละ แห่ง และ ได้ รับ การ ต้อนรับ จาก ถนน ที่ เต็ม ไป ด้วย[Owner.GetSpeciesNamePlural]ทุกเมืองที่สามารถรับบทเล่นแบบแสดงในจักรวรรดิของเรา นอกจากนี้ยังมีผู้ชมมากมาย ในฐานะศูนย์กลางของขบวนพาเหรด[This.GetTrophyName]ถึง[Target.GetName]เมืองหลวง มีคนพูดถึงวันนี้ทุกปี§Y[This.GetLeviathanTargetName]§!แรงบันดาลใจในวันหยุด เดอะ[This.GetTrophyName]จาก นั้น ก็ ถูก จัด ไว้ ใน งาน แสดง พิเศษ ที่ ใจ กลาง นคร หลวง เพื่อ สร้าง แรง บันดาล ใจ แก่ คน รุ่น ต่อ ไป."
 situation.1005.a:0 "ถ้าพวกเขาไม่อยากมา ทําไมพวกเขาขอฉลองล่ะ"
 situation.1005.b:0 "วันนี้เป็นวันดีสําหรับทุกคน[Owner.GetSpeciesNamePlural]."
 situation.1005.c:0 "วันนี้เราเป็นหนึ่งเดียวกัน"

 situation.1045.name:0 "เขี้ยวอ่อน"
 situation.1045.desc:0 "ในการเตรียมการสําหรับวันสําคัญ เราได้โอนหนึ่งใน§Yเขี้ยวของเอเธอร์ เดรก§!ถึง§Y[Target.GetName]§!การนําพวกเขาเข้าไปในยานขนส่ง เป็นความท้าทาย เพราะชีววิทยาของเอเธอร์เดรค ที่มีลักษณะเฉพาะ เขี้ยวตอบสนองโดยเฉพาะอย่างยิ่ง แปลกที่เรือขนส่งที่เข้าไปใน[Target.GetPlanetHabitat]ชั้นบรรยากาศ: มันเริ่มคลี่คลายก่อนเรา และถ้ายานขนส่งไม่ตอบสนองอย่างรวดเร็ว"
 situation.1045.a:0 "สร้างตู้คอนเทนเนอร์ที่ดีกว่า แล้วจัดการเขี้ยวซะ"
 situation.1045.b:1 "ปฏิกิริยานี้น่าสนใจมาก[Owner.GetParadeStudy]."
 situation.1045.b.tooltip:1 "ยกเลิก[Owner.GetParadeStudy]เพื่อศึกษาปฏิกิริยา"
 situation.1045.c:0 "แทนที่เขี้ยวด้วยแบบจําลอง"
 situation.1045.c.tooltip:0 "นี่ จะ ช่วย ลด ความ เป็น เอกภาพ ที่ โอกาส จะ เกิด ขึ้น."
 situation.1050.name:0 "ผู้ดูแล"
 situation.1050.desc:0 "การสกัดของ§Yตาของชาร์ด§!มันเป็นขั้นตอนที่ยุ่งเหยิง กับการเริ่มต้นที่ผิดๆ โชคดี เบเฮโมทมีตามากมายให้เราฝึก จากนั้นเราลากแสงไปยัง[Target.Solar_System.GetName]และบางสิ่งบางอย่างทั้งที่น่าสนใจและกบฏเกิดขึ้นฮัสคูลัสเริ่มแนบและผนวกตัวเองเข้าไปในพื้นดาวท้องถิ่น§Y[Target.GetName]§!สาเหตุของเรื่องนี้ไม่ทราบ แต่แล้วอีกครั้ง ส่วนใหญ่ของสรีรวิทยาของเดรกเป็นเกินเรา\n\nการยุบยังไม่สมบูรณ์ แต่ของเรา[Owner.GetScientistPlural]เชื่อว่ามันต้องหยุดตอนนี้ถ้าเราต้องการที่จะดําเนินการต่อไปกับแผนก่อนหน้านี้ของเรา"
