 situation.1055.name:0 "ไฟฟ้า"
 situation.1055.desc:0 "เดอะ§Yเครื่องจําลองของถอดรหัส§!เป็นสินค้าที่ตกแต่งอย่างดี จนกระทั่งมาถึง§Y[Target.GetName]§!ที่ที่เราเก็บมันไว้ในโกดัง รอคอยวันสําคัญ ที่ นั่น เอง ที่ ปัญหา เริ่ม ขึ้น ขณะ ที่ ไม่ มี ใคร มอง ดู เครื่อง ปฏิกรณ์ ก็ เริ่ม ต้น เอง. โกดังถูกจุดจากด้านใน ขณะที่มันพ่นพลาสม่าออกมา ทําให้เสียทั้งตึก\n\nการกระทําอย่างรวดเร็วของเรา[Owner.GetScientistPlural]เพียงเพียงพอที่จะบันทึกมัน ในจังหวะของเวลา กับแสงที่เพิ่มขึ้น"
