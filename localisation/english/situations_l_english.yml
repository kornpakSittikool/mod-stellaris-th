 situation.1070.c:0 "คืนเครื่องเร่งอนุภาคสู่อวกาศ และปล่อยให้มันทํางาน"
 situation.1070.c.tooltip:1 "ยกเลิก[Owner.GetParadeStudy]เพื่อสนับสนุนให้คอมเพล็กซ์และได้รับ$d_alloys_10$บรรจุในวงโคจรของ[Target.GetName]."
 situation.1075.name:0 "หอย สังข์"
 situation.1075.desc:0 "แสงส่องของ§Yแซคของสเตเลอร์ วิรัตน์§!มี การ ทํา ให้ เขว เพื่อ ดู สิ่ง ที่ ทํา ให้ ไขว้ เขว จน ต้อง ใช้ เวลา ระยะ หนึ่ง เพื่อ ตรวจ พบ ว่า ถุง ที่ วิริธ ใช้ สร้าง โล่ ธรรมชาติ นั้น รั่ว. หลังจากยืนยันว่าการสัมผัสสารเคมีภายใน จะไม่ทําให้ระบบนิเวศล้มเหลว§Y[Target.GetName]§!ของเรา[Owner.GetScientistPlural]จง มุ่ง ความ สนใจ ไป ที่ การ วิเคราะห์ ผล กระทบ ที่ ก๊าซ มี ต่อ บรรยากาศ ของ เรา.\n\nดูเหมือนว่าสารเคมีที่ปล่อยออกมา จะหลอมรวมเข้ากับเมโซสเฟียร์ของเรา ดีดังนั้น ถ้าเราปล่อยส่วนที่เหลือของการ แพร่กระจายของเนื้อหา จะมีการเพิ่มขึ้นที่ สังเกตได้ ในการป้องกันดาวเคราะห์"
 situation.1075.a:0 "ขจัด แก๊ส ส่วน ที่ เหลือ ออก ไป และ ปล่อย ให้ ปฏิกิริยา นี้ สิ้น สุด ลง."
 situation.1075.a.tooltip:1 "ยกเลิก[Owner.GetParadeStudy]โดยถือว่าเป็นการลบหลู่[Target.GetName]กับบรรยากาศ$wraiths_energy_disperser$."
 situation.1075.b:0 "เสียบปลั๊ก"
 situation.1075.c:0 "รวมมันเข้ากับการแสดง"
