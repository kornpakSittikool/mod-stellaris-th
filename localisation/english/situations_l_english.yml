 situation.1055.c:0 "ค้นหาตัวสะกด นอก"
 situation.1060.name:0 "สร้างฟลาเจลลาใหม่"
 situation.1060.desc:0 "ถึงเราจะระวังเรื่องผลการเรียน แต่บางอย่างก็ผิดพลาด ในฐานะ§Yแฟล็กเซลล่าของมาตริอาร์ช§!เข้า§Y[Target.GetName]'§!เมืองหลวง มันติดต่อกับผู้ดูแลคนหนึ่ง และในทันที แฟล็กเซลล่าก็เริ่มตอบโต้ การ อุด ตัน ของ เนื้อ เยื่อ ที่ ฉีก ออก เป็น ชิ้น ๆ เริ่ม เจริญ เติบโต จาก ทรฟี แรก ที เดียว ก่อ ตัว เป็น เนื้อ ที่ ที่ กวน ใจ เป็น โขยง. เมื่อ เวลา ผ่าน ไป ก็ มี ราย ละเอียด มาก ขึ้น และ ยัง ความ ประหลาด ใจ แก่ เรา ที่ มัน สันนิษฐาน รูป ของ ผู้ ดู แล ที่ เคราะห์ ร้าย นั้น! ดูเหมือนว่าพลังเปลี่ยนแปลงของจตุรัส ได้ตอบรับดีเอ็นเอชนิดของเรา และตอนนี้อยู่ในกระบวนการสร้างมากขึ้น[Owner.GetSpeciesNamePlural]."
