 ## Events
 # Intro
 situation.200.name:0 "เปลวสุริยะ"
 situation.200.desc:0 "การ ระเบิด ของ สุริยะ§Y[This.GetStarName]§!คลื่นลมสุริยะกําลังลดลง§Y[This.GetName]§!แม่เหล็กแม่เหล็ก เปิดเผยโดรนของเรา เพื่อเพิ่มระดับการแผ่รังสี ความเสี่ยงต่อความเสียหายของซอฟต์แวร์ แพร่กระจายไปยังหน่วยสืบราชการลับหลักของเรา ซึ่งอาจเป็นผลเสียหายร้ายแรงต่อจักรวรรดิทั้งหมดของเรา\n\nความสําคัญ: การใช้เทคนิคการแผ่รังสี เพื่อป้องกันองค์ประกอบของโดรน ทําให้พวกมันไม่เข้ากับรังสี"
 situation.200.a:0 "จัดทําเกราะป้องกันแบบง่ายๆ"
 situation.200.b:0 "จัดเวลาป้องกันหุ่นยนต์ที่ซับซ้อน"
 situation.200.c:0 "ทําให้แน่ใจว่าโดรนของเราทั้งหมดถูกป้องกัน"
 situation.200.d:0 "ผิดพลาด: ไม่สามารถจองงบประมาณได้"
 situation.200.a.tooltip:0 "Spend £energy£§Y[Root.simple_drones_cost]§! to shield £pop£ §H[Root.simple_drones_counter_100] Simple Drones§! (£energy£ §Y[Root.energy_cost]§! per 100 £pop£ §HPop§!).\n§YMagnetic Disruption§! modifier added for §Y5 Years§!."
 situation.200.b.tooltip:0 "จ่าย£energy£§Y[Root.complex_drones_cost]§!เพื่อป้องกัน£pop£ §H[Root.complex_drones_counter_100]คอมพลีเมนต์ชื่อ§! (£energy£ §Y[Root.energy_cost]§!ต่อ 100£pop£ §Hป๊อป§!).\n§Yการสลายตัวของแม่เหล็ก§!แก้ไขโครงการหลัก...§Y5 ปี§!."
 situation.200.c.tooltip:0 "Spend £energy£§Y[Root.total_drones_cost]§! to shield £pop£ §H[Root.total_drones_counter_100] Drones§! (£energy£ §Y[Root.energy_cost]§! per 100 £pop£ §HPop§!).\n§YMagnetic Disruption§! modifier added for §Y5 Years§!."
 situation.200.d.tooltip:0 "อย่าป้องกันโดรน\n§Yการสลายตัวของแม่เหล็ก§!แก้ไขโครงการหลัก...§Y5 ปี§!."

 situation.202.name:0 "พายุแม่เหล็กดาว"
 situation.202.desc:0 "การปรับปรุงสถานะ: ยืนยันข้อมูล§Y[root.GetStarName]§!มี การ ทํา กิจกรรม ที่ รุนแรง ใน ช่วง หนึ่ง โดย มี จุด ที่ เพิ่ม ขึ้น ของ สุริยะ, การ ปล่อย ออก จาก คอ โร นาล, และ การ ระเบิด ของ แม่เหล็ก. ของเรา[Root.owner.GetScientistPlural]ประมาณดาวจะกลับไปยังระดับปกติของกิจกรรมภายใน§H5 ปี§!.\n\nแผนปฏิบัติที่แนะนํา: ทําต่อไป เพื่อผลิตส่วนประกอบที่แข็งตัวของรังสี เพื่อป้องกันโดรนของเรา"

 # Event: Bio-trophies want to help their caretakers
 situation.203.name:0 "ใคร เฝ้า ดู คน ยาม?"
 situation.203.desc:0 "คําเตือน: ไบโอ-ดาราศาสตร์ กําลังแสดงพฤติกรรมที่ผิดปกติ ขณะ ที่ คน ส่วน ใหญ่ แสดง ความ รําคาญ ต่อ ความ สามารถ ใน การ ทํา งาน ของ เครื่อง ยนต์ ที่ ลด ลง แต่ บัด นี้ มี เปอร์เซ็นต์ เล็ก น้อย ที่ ช่วย ผู้ รับ ใช้ ของ ตน ทํา งาน ตาม ปกติ โดย อ้าง ว่า\"สงสาร\" และ \"สงสาร\" เป็นแรงจูงใจสําหรับการกระทําของพวกเขา ตอนนี้พวกเขากําลังเรียกร้องให้สถาบัน \"ดูแลบ้าน\" เฝ้าดูผู้ดูแลที่ผิดพลาดของพวกเขา\n\nการวิเคราะห์ก่อนตาย บ่งชี้ว่าการดูดซึม ชีวภาพ-ดาราศาสตร์ จะมีผลกระทบในด้านบวก ต่อความรู้สึกของพวกเขา"
 situation.203.a:0 "ขออนุมัติ"
 situation.203.b:0 "ขอปฏิเสธ"


