 situation.1080.desc:0 "ของเรา[Owner.GetTeamMemberPlural]ได้รายงานความเคลื่อนไหวของยาน§Yพิธี มิสซา§!ถึง[Target.Solar_System.GetName]หน้าต่างสู่โลกของความเจ็บปวดบริสุทธิ์ และการกระซิบของการทําลายเป็นเพียงไม่กี่บัญชี เชื่อกันว่ามวลของ[This.GetLeviathanTargetName]จะโทษเราและเราอาจกังวลอย่างถูกต้อง สิ่งที่เกิดขึ้นถ้าเราที่จะนําสินค้าของเรือไปยัง§Y[Target.GetName]§!."
 situation.1080.a:0 "เอามันไปคืน"
 situation.1080.a.tooltip:0 "ยกเลิก[Owner.GetParadeStudy]เพื่อปกป้องความปลอดภัยของ[Owner.GetSpeciesNamePlural]บน[Target.GetName]."
 situation.1080.b:0 "ไม่! เราต้องศึกษาเรื่องนี้"
 situation.1080.c:0 "บรรจุมัน เราไม่สามารถปล่อยให้ปรากฏการณ์นี้แพร่กระจาย"
