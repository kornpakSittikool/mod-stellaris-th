 # The Kaleidoscope appears on your capital
 situation.2003.name: "สีอยู่นอกขอบเขตสี"
 situation.2003.desc: "สิ่งที่คนของเราเห็นจากวงโคจรคือ§H[capital_scope.GetName]§!ปิดทุกแหล่งกําเนิดแสงภายในเมือง ถูกดับทันที คนอะไร§H[capital_scope.GetName]§!มี ประสบการณ์ ที่ แย่ ยิ่ง กว่า นั้น อีก: รถยนต์ ลด ลง เหลือ เพียง บล็อก ถนน โรง งาน ที่ ถูก บด และ หยุด ชะงัก อุปกรณ์ ของ โรง พยาบาล ที่ ไม่ มี ชีวิต และ เฉื่อย. ไฟดับไปทั่วทั้งโลก อย่างกะทันหันจนอธิบายไม่ได้\n\nขณะ ที่ ความ เงียบ และ เงา บดบัง โลก ของ เรา รูป แบบ แสง แปลก ๆ ก็ เบ่ง บาน ใน ท้องฟ้า ปก คลุม ระบบ การ เมือง ของ เรา ด้วย หมอก กา ลี โดส โค พัค. สองเหตุการณ์นั้นไม่แน่นอน เกี่ยวข้องกัน แต่[root.GetTechnicianPlural]ยัง คง อยู่ ใน ความ มืด จริง ๆ."
 situation.2003.a: "เรียกคืนตารางพลังงานของเรา"

 # Notify other countries about the Kaleidoscope
 situation.2004.name: "$situation.2003.name$"
 # first time
 situation.2004.desc: "เซ็นเซอร์ของเรารายงานการกระตุ้น ของรูปแบบของแสงคาไลโดสคอป§H[kaleidoscope_system.GetName]§!ระบบ ลักษณะของปรากฏการณ์ไม่แน่ชัด"
 # moved again
 situation.2004.desc.again: "กาลีโดสคอปชันที่เราสังเกตเห็นก่อนหน้านี้ ได้ย้ายไป§H[kaleidoscope_system.GetName]§!ระบบ"

 # Project - mid-event
 situation.2005.name: "หมดอายุ"
 situation.2005.desc: "เราไม่พบข้อบกพร่องในตารางพลังงานของเรา เครื่องกําเนิดไฟฟ้าของเรา กําลังผลิตพลังงาน แต่บางสิ่ง... ซึมซับมัน มันอาจจะเป็นผลมาจากรูปแบบแสง ที่ปรากฏอยู่ในท้องฟ้าของเรา ลักษณะเรขาคณิตของ ซึ่งทรยศการออกแบบที่ชาญฉลาด\n\nคือสิ่งนี้ สิ่งมีชีวิตนี้§Yกล้องส่องทางไกล§!- ตัวร้าย หรือแค่หมอกไร้สติ คํา ตอบ ไม่ ชัดเจน."
 situation.2005.a: "พยายามที่จะแยกมันออกจากพลังงานของเรา"

 # Project - end (first time)
 situation.2010.name: "เริ่มสีดํา" # Translators note: https://en.wikipedia.org/wiki/Black_start
 situation.2010.desc: "ขอบคุณสําหรับความพยายามของเรา[owner.GetTechnicianPlural]ถึง[owner.GetScientistPlural]ปรสิตพลังงาน ถูกตัดขาดจากพลังงานของเรา คืนที่ยาวนานของเราจบลงแล้ว แต่§Yนาฬิกา คา ลิ ดส์§!ยังคงส่องแสงบนเราหิว พลังงาน\n\nเราไม่มีทางที่จะสื่อสารกับมัน และอาวุธพื้นฐานใช้ไม่ได้ผลกับ คนประเภทนี้ ทาง เลือก ที่ เหลือ ของ เรา คือ ให้ อาหาร มัน เพียง พอ ที่ จะ ทํา ให้ มัน สงบ หรือ พยายาม อดอยาก. คนของเรายังแนะนําให้จัดการ§Yปฏิบัติการความแหลม:§!เพื่อล่อมันไปสู่อาณาจักรอื่น ปล่อยให้คนอื่นจัดการเถอะ"
 situation.2010.desc.again: "สิ่งที่คนของเราเห็นจากวงโคจรคือการทําซ้ําของรูปแบบที่คุ้นเคย : พลังงานทั้งหมดบน§H[capital_scope.GetName]§!ปิดตัวลงเมืองหลวงของเราตีโดย หมดสติทั่วโลก ในขณะที่แสงส่องแสงเต้นในท้องฟ้า\n§Yกล้อง โทรทรรศน์ คา ลิ ดส์§!ได้กลับมาแล้ว! ปรสิตพลังงาน ที่พวกเราเคยเจาะเข้าหาคนอื่น ถูกส่งกลับมาให้เรา\n\nตามที่ผู้เชี่ยวชาญของเรา ลงทุนใน§Y$building_planetary_shield_generator$§!จะป้องกันเมืองหลวงของเราจากการตกเป็นเป้าหมายอีกครั้ง แต่มันสายไปแล้วสําหรับตอนนี้ ปรสิตพลังงานอยู่ที่นี่"
 situation.2010.a: "สัตว์ประหลาดไม่มีพื้นที่ในระบบของเรา"
 situation.2010.b: "เราต้องเป็นเพื่อนกับสัตว์มหัศจรรย์นี้"
 situation.2010.c: "มันต้องการพลังงาน? ให้มันสําลักไป"
 situation.2010.tooltip: "ปลดล็อค§Y$operation_kaleidoscope$§!"

 # Project - end (subsequent times)
 situation.2011.name: "$situation.2010.name$"
 situation.2011.desc: "ตามขั้นตอนที่พิสูจน์แล้วและพิสูจน์แล้ว เราแยกคาลิดโอคออกจาก§H[root.GetName]§!เครือข่ายพลังงาน การฟื้นฟูพลังงานสู่เมืองหลวงของเรา"

 ## Espionage Operation
 # Operation - phase 1
 situation.2020.name: "การ เจาะ อุโมงค์ พลัง งาน"
 situation.2020.desc: "โดยปลอมตัวเป็นช่างเทคนิค เจ้าหน้าที่ของเราสามารถแทรกซึม§H[target.GetName]§!เขตพลังงาน ภารกิจต่อไปคือ ติดเครื่องส่งสัญญาณเพื่อล่อ ปรสิตพลังงานไปยังดาวเคราะห์"

 # Operation - phase 2
 situation.2021.name: "ล้างช่อง"
 situation.2021.desc: "ไฟได้จางหายไปจากท้องฟ้าของเรา แรกประกาศสิ่งที่หน่วยสืบราชการลับของเรายืนยันในภายหลัง : ผู้ดําเนินการของเราเปิดใช้งานสัญญาณพลังงาน, ทัวร์§Yนาฬิกา คา ลิ ดส์§!ออกไป!\n\nปล่อยให้§H[target.GetName]§!จัดการเดี๋ยวนี้"

 situation.2025.name: "การ รับ ภาระ ปัญหา"
 situation.2025.desc: "ตามรายงานการจารกรรมของเรา§H[kaleidoscope_new_owner.GetName]§!ปัจจุบันกําลังทุกข์ทรมานจากการขาดแคลนพลังงาน เดอะ§Yกล้องส่องทางไกล§!เราให้พรสวรรค์พวกเขา ดูเหมือนจะเป็นสาเหตุหลักของปัญหาทางเศรษฐกิจ"

 ## Random events
 # Negative 1 - infests another planet
 situation.2030.name: "การ พัก ฟื้น น้อย"
 situation.2030.desc: "กล้อง ถ่าย รูป คา ลิ ดส์ ที่ หิว โหย ได้ เจาะ ฟัน ของ มัน เข้า ไป§H[event_target:infested_planet.GetName]§!ตารางพลังงาน การหมดสติที่ตามมาของอาณานิคม มันรุนแรงมาก แต่ไม่ต่างจากการโจมตีครั้งก่อน เรารู้วิธีรับมือกับมัน"

 # Negative 2 - eats energy building
 situation.2031.name: "ช็อตไฟฟ้า"
 situation.2031.desc: "กล้องคาลิโดสโคปที่หิวโซกําลังพยายามบังคับให้เชื่อมต่อตัวเองกับหนึ่งของเรา§Yเน็กซัสพลังงาน§!บน§H[target.GetName]§!นี้เป็นโอกาสที่โดดเด่นที่จะศึกษา ความสามารถที่โดดเด่น แต่เราคาดหวังว่าอาคารจะเสียหายอย่างหนักเป็นผล"
 situation.2031.a: "ให้มันกินพลังงานของเรา เพื่อวิทยาศาสตร์!"
 situation.2031.b: "ขโมยพลังงานกลับมา"

 # Negative 3 - unnerving patterns (- pop happiness)
 situation.2032.name: "รูปแบบที่ไม่เหมาะสม"
 situation.2032.desc: "กล้องส่องทางไกลสั่นสะเทือนอย่างประหม่า เติมเต็มท้องฟ้าของเรา ด้วยรูปแบบความไม่สม่ําเสมอของแสง คนของเราไม่สามารถช่วยได้ แต่หาแว่นตาที่ไม่เหมาะสม"

 # Negative 4 - ominous patterns (spiritualists)
 situation.2033.name: "รูป แบบ ที่ โดด เด่น"
 situation.2033.desc: "เครื่องราชอิสริยาภรณ์เหมือนแผลเปิด เติมเต็มท้องฟ้าของเราด้วย รูปแบบการป่วย นักบวชของเราคิดว่ามันเป็นลางร้าย มันอาจจะฉลาดที่จะเสียสละพลังงานบางอย่างให้กับสัตว์ เพื่อดับความหิวและบรรเทาความกลัวของผู้คนของเรา"
 situation.2033.a: "เสนอพลังงานให้กับกล้องคาลิดิสโคป"
 situation.2033.b: "เราจะไม่เอียงไปตามความประสงค์ของมัน"

 # Negative 5 - slow ships
 situation.2034.name: "รูปแบบการไล่ระดับสี"
 situation.2034.desc: "ความหิวพลังงาน, คาลิโดสโคป ได้เรียนรู้วิธีการดูดพลังงานจากกองทัพเรือของเรา ท่อน้ําต่ํา แต่มีผลกระทบต่อความเร็วของยานเรา"

 # Positive 1 - soothing patterns (unity)
 situation.2037.name: "รูปแบบต่าง ๆ"
 situation.2037.desc: "กล้อง ถ่าย รูป ที่ มี ความ สุข[owner.capital_scope.GetName]ท้องฟ้าที่มีรูปทรงที่น่าพอใจ รอยร้าวละลายกลายเป็นรอยร้าวอื่น ๆ ในคลื่นมหัศจรรย์ที่เปลี่ยนแปลงตลอดเวลา\n\nดาวเคราะห์หยุด แอดมีเรส หายใจ"

 # Positive 2 - dazzling patterns (science)
 situation.2038.name: "รูป แบบ ที่ น่า ทึ่ง"
 situation.2038.desc: "เป็น ไป ได้ ไหม ที่ รูป แบบ การ เปลี่ยน แปลง ของ กล้อง โทรทรรศน์ คา ลิ โดส ตา จะ เป็น รูป แบบ หนึ่ง ของ การ สื่อ ความ? หรือเป็นกระบวนการอัตโนมัติ หายใจมากขึ้น ของเรา[root.GetScientistPlural]ยังคงไม่มีคําตอบ กล้องคาลิดโดสโคปให้ข้อมูลทางวิทยาศาสตร์ที่ประเมินค่าไม่ได้"

 ## Endings
 # Kaleidoscope explodes! - Good ending
 situation.2041.name: "การ ยุบ ตัว ของ กล้อง โทรทรรศน์"
 situation.2041.desc: "เราได้รับพระพรที่มีประสบการณ์แสดงแสงที่งดงามที่สุดของกาแล็กซี่ : กลีบดอกกะหล่ําปลีพับเป็นตัวเอง; ดอกไม้; ระเบิด! แต่เครื่องดนตรีของเราบอกเรื่องราวที่ชนะน้อยลง\n\nพลังงานที่กลายเป็นเพื่อเต็มรูปแบบของพลังงาน มันยุบลงในตัวเองเหมือนดาวที่กําลังจะตาย จาก ความ เสีย หาย ยับ เยิน นี้ เอง นัก สํารวจ ของ เรา ได้ กลุ่ม ผลึก รูป ร่าง คล้าย ดอกไม้ มาก. ตามการศึกษาเบื้องต้น 'ดอกไม้' สามารถขยายความเข้มของรังสีแสงที่เบาที่สุด ทําลายกฎหมายฟิสิกส์ไม่กี่ที่รู้จักกันในกระบวนการนี้ ของเรา[root.owner.GetScientistPlural]สมมุติฐานดอกไม้เป็นเพียงส่วนหนึ่งของการ สร้างขึ้นที่มีขนาดใหญ่กว่า บ้านหลายมิติของกระจก"

 # Kaleidoscope explodes! - Good ending - Notifying other countries
 situation.2042.name: "$situation.2041.name$"
 situation.2042.desc: "ตัวตรวจจับรายงานรูปแบบของคาไลโดสคอป§H[kaleidoscope_system.GetName]§!ระบบเพิ่งบานสะพรั่ง หายตัวไปในรูปแบบที่หลากหลาย ต้องดูน่าตื่นเต้นมากแน่ๆ"

 # Kaleidoscope explodes! - Bad ending
 situation.2043.name: "การ ขยาย ตัว"
 situation.2043.desc: "เมื่อกล้องคาลิโดสโคปพับเป็นตัวเอง แค่วินาทีเดียว มันดูเหมือนดอกไม้คริสตัล อย่างไรก็ตาม การระเบิดที่ตามมานั้น เป็นอะไรก็ได้แต่อ่อนโยน: การระเบิดที่ทําลายระบบ\n\nมี การ ซ่อมแซม แล้ว แต่ เรา ต้อง ใช้ เวลา สัก ระยะ หนึ่ง เพื่อ จะ คุ้น เคย กับ ท้องฟ้า ที่ ว่าง เปล่า ใหม่."

 # Kaleidoscope explodes! - Bad ending - Notifying other countries
 situation.2044.name: "$situation.2043.name$"
 situation.2044.desc: "ตัวตรวจจับรายงานรูปแบบของคาไลโดสคอป§H[kaleidoscope_system.GetName]§!ระบบเพิ่งระเบิด ปล่อยคลื่นความถี่พลังงาน ที่ทําลายโครงสร้างทุกอย่างในระบบอย่างไม่ต้องสงสัย"

 # Kaleidoscope fades away - owner
 situation.2040.name: "ล้างช่อง"
 situation.2040.desc: "หลัง จาก เกิด การ ระเบิด อย่าง รุนแรง ใน ช่วง สุด ท้าย ของ รูป แบบ ที่ ไม่ มี การ กลอก ตา เร็ว ก็ จะ ค่อย ๆ จาง หาย ไป เส้น ด้าย ที่ มี สี สัน ของ มัน ก็ จะ หลุด ออก มา เหมือน หมอก.\n\nหลัง จาก ใช้ เวลา อยู่ ใต้ แสง ไฟ มาก มาย ท้องฟ้า ของ เรา ก็ ดู แทบ จะ ว่าง เปล่า."

 # Kaleidoscope fades away - notifying other countries
 situation.2045.name: "ล้างช่อง"
 situation.2045.desc: "เครื่องตรวจจับรายงานรูปแบบกาลีโดสคอปติกที่เราตรวจพบใน[kaleidoscope_system.GetName]ระบบได้จางหายไป"

 # Kaleidoscope could get a Dyson sphere?
 situation.2048.name: "ความ หิว โหย ที่ สุด"
 situation.2048.desc: "กล้องคาลิโดสโคปได้พิสูจน์แล้วว่า เป็นเพื่อนบ้านที่เป็นมิตรกันอย่างแปลกประหลาด แต่การเก็บเสียงไว้นั้น พิสูจน์ว่าเป็นความท้าทาย ไดสัน สเปชมาที่นี่ จะดับความกระหายพลังงานที่ไม่มีวันสิ้นสุดไหม"
 situation.2048.a: "แก้ไข ไดสัน สเปกที่นี่ สําหรับกล้องคาลิโดสโคป"
 situation.2048.a.tooltip: "ปลดล็อค ไดสัน สปาร์คใหม่"
 situation.2048.b: "เราประหยัดพลังงานไม่ได้"

 # DiScO EnDiNg
 situation.2049.name: "ความพิศวง"
 situation.2049.desc: "กล้องคาลิดโดสโคปได้แนบเข้ากับ ไดสันสเปรซโซว์ที่ถูกดัดแปลงไว้ เราให้พลังงานกับดาว และขยายกลีบดอกไม้ที่มีสีสัน ตามข้อมูลของเรา ตอนนี้พลังงานอยู่ในสภาวะที่คงที่ ควบคุมการบริโภคมากเกินไป การเจริญเติบโตของตาใหม่ตลอดมา\n\nเรา ไม่ รู้ ว่า มนุษย์ มี ความ สามารถ ใน การ คิด หรือ ไม่ แต่ เรา หวัง ว่า บัด นี้ การ ดํารง อยู่ ของ มัน จะ เป็น ที่ ชื่น ชอบ พอ ๆ กับ รูป แบบ ของ แสง ที่ มัน ก่อ ให้ เกิด ขึ้น."


 ## Projects and Operations
 # Project (first time)
