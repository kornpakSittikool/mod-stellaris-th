 end_other_deficit_situations_tooltip:0 "สถานการณ์อื่น ๆ ทั้งหมดได้สิ้นสุดลงเป็นส่วนหนึ่งของจักรวรรดิกําลังปรับปรุงใหม่"

 deficit.125.name:0 "$deficit.100.name$"
 deficit.125.desc:1 "การขาดแคลนแร่ธาตุของจักรวรรดิเรา เริ่มรุนแรงขึ้นเรื่อยๆ ในไม่กี่เดือนที่ผ่านมา[Owner.GetFinancialAdvisorAgencyCap]ได้ก้าวหน้าจากความกังวล ที่เกิดขึ้นจากการคาดการณ์ในปัจจุบัน ซึ่งบอกเราว่า อีกไม่ช้าเราจะขาดแคลนทรัพยากร พวก เขา คาด การณ์ ว่า จะ จําเป็น ต้อง มี การ ตัด ขาด อย่าง รุนแรง ใน ไม่ กี่ เดือน เว้น แต่ จะ มี การ ลง มือ ปฏิบัติ อย่าง เด็ด ขาด."
 deficit.125.desc.gestalt:0 "การขาดแคลนแร่ธาตุของจักรวรรดิเรา เริ่มรุนแรงขึ้นเรื่อยๆ ในไม่กี่เดือนที่ผ่านมา โดรนของทรัพยากรของเราถูกขยายไปยังขีดสุด และไม่สามารถรับประกันได้ พวก เขา พยากรณ์ ว่า จะ จําเป็น ต้อง มี การ ตัด หลัง อย่าง รุนแรง ใน ไม่ กี่ เดือน เว้น แต่ จะ มี การ ลง มือ ปฏิบัติ อย่าง เด็ด ขาด."
 deficit.130.desc:0 "เราล้มเหลวในการระงับการล้มละลาย หลัง จาก หลาย เดือน แห่ง การ ขาด แคลน แร่ ธาตุ ซึ่ง กลาย เป็น จุด สิ้น สุด เรา ก็ ไม่ มี ทาง เลือก นอก จาก จะ ทํา ให้ หนี้ สิน ของ เรา หมด ไป และ ลด ค่า ใช้ จ่าย ของ เรา ลง."
 deficit.130.desc.gestalt:0 "เราล้มเหลวในการปรับค่าใช้จ่ายของเรา หลังจากช่วงเวลาหลายเดือนของการขาดแคลนแร่ ที่กลายเป็นเทอร์มินัล เราไม่มีทางเลือก นอกจากบังคับให้มีการแบ่งพื้นที่ขนาดใหญ่"

 deficit.140.name:0 "อาหาร สั้น ๆ"
 deficit.140.desc:0 "การ ขาด แคลน อาหาร เกิด ขึ้น กับ จักรวรรดิ ของ เรา กําลัง ประสบ ปัญหา มาก ขึ้น เรื่อย ๆ. เห็น ได้ ชัด ว่า เรา จะ ต้อง ลง มือ ปฏิบัติ อย่าง เด็ด ขาด มิ ฉะนั้น การ ขาด แคลน จะ สิ้น สุด ลง ภาย ใน ไม่ กี่ เดือน."
 deficit.140.A:0 "ปิดการใช้งานมดโคลน"
 deficit.140.A.tooltip:0 "เครื่องโคลนวอตส์ที่ใช้งานได้ทั้งหมดถูกปิด เราไม่จําเป็นต้องจ่ายค่ารักษาอีกต่อไป"
 deficit.140.B:0 "ปิดการใช้งานตัวประมวลผล"
 deficit.140.B.tooltip:0 "ไบโอรีแอนเตอร์ทํางานทั้งหมดถูกปิด เราไม่จําเป็นต้องจ่ายค่ารักษาอีกต่อไป"
 deficit.145.desc:0 "หนี้อาหารของเราหมดลงแล้ว การตัดขาอย่างคมชัดจะถูกบังคับใช้ เพราะพวกเราไม่มีทางเลือก นอกจากยอมรับการล้มละลาย"
 deficit.145.desc.gestalt:0 "อาหารของเราหมดแล้ว เราไม่สามารถจัดหาอาหารให้กับหุ่นยนต์ และหน่วยงานอื่น ๆ ที่ต้องการให้มันทํางาน การตัดส่วนที่คมชัดจะถูกบังคับใช้ เนื่องจากเราไม่มีทางเลือก แต่จะทําให้การจัดวางจริงขนาดใหญ่"
 deficit.145.desc.wilderness: "สิ่งที่บางทีเราถือ ว่ามีค่ามากที่สุด - สมดุลของทรัพยากรธรรมชาติของเรา ได้ล้มเหลว แหล่ง อาหาร ของ เรา หมด ไป แล้ว ทํา ให้ เกิด ความ ทุกข์ ตลอด ทั่ว เครือ ข่าย อาหาร. ตอนนี้เราต้องพึ่งพาการปันส่วนที่โหดร้าย และการจัดพื้นที่ทรัพยากรขนาดใหญ่ เพื่อที่จะมั่นใจได้ว่ามีโอกาสอยู่รอดได้"

 deficit.155.name:0 "ผู้ บริโภค ถูก ทําลาย"
 deficit.155.desc:0 "การ ขาด แคลน สินค้า ของ ผู้ บริโภค ทํา ให้ มาตรฐาน การ ดํารง ชีวิต ลด ลง อย่าง ฮวบฮาบ[Root.Owner.GetName]เสียง ของ ความ ไม่ พอ ใจ กําลัง รุนแรง ขึ้น เรื่อย ๆ และ การ เรียก ร้อง ให้ ลง มือ ปฏิบัติ อย่าง เร่ง ด่วน มี อยู่ อย่าง แพร่ หลาย มาก ขึ้น เรื่อย ๆ เมื่อ ปรากฏ ชัด ว่า การ ขาด แคลน อาหาร อย่าง สิ้น เชิง อยู่ ห่าง ออก ไป เพียง ไม่ กี่ เดือน."
 deficit.155.desc.gestalt:0 "การ ขาด แคลน สินค้า ของ ผู้ บริโภค ทํา ให้ มาตรฐาน การ ดํารง ชีวิต ของ คน เรา ลด ลง อย่าง ฮวบฮาบ[Root.Owner.GetName]เสียง ของ ความ ไม่ พอ ใจ กําลัง เพิ่ม ขึ้น เรื่อย ๆ ขณะ ที่ โดรน ของ เรา ทํา การ บันทึก เสียง เตือน ว่า การ พัง ทลาย อย่าง สิ้น เชิง ใน เสบียง อาหาร อยู่ ห่าง ออก ไป เพียง ไม่ กี่ เดือน."
 deficit.155.A:0 "เวลาที่ยากลําบากขึ้นอยู่กับเรา การปันส่วนของสถาบัน"
 deficit.160.desc:0 "การ ขาด แคลน อาหาร มี เพิ่ม ขึ้น จน ถึง ขั้น ที่ ว่า ไม่ มี ทาง ที่ ความ บกพร่อง ของ เรา จะ ได้ รับ การ แก้ไข ตาม ความ เป็น จริง. การตัดขาอย่างคมชัดจะถูกบังคับใช้ เพราะพวกเราไม่มีทางเลือก นอกจากยอมรับการล้มละลาย"

 deficit.170.name:1 "$deficit.100.name$"
 deficit.170.desc:1 "[Owner.GetFinancialAdvisorAgencyCap]กําลังเริ่มกังวลมากขึ้นว่า การขาดแคลนของอัลลอย จะเกิดขึ้นกับจักรวรรดิของเรา การเสียค่าใช้จ่ายไป จะส่งผลให้ภาคอุตสาหกรรมของเราเสียหาย"
 deficit.170.desc.machine:1 "แจ้งเตือนงบประมาณ: ค่าใช้จ่ายของอัลลอยนั้นแพงกว่า สําหรับอีกหลายเดือนต่อมา ความล้มเหลวในการแก้ไขการขาดแคลน จะก่อให้เกิดการรบกวนในภาคอุตสาหกรรมของเรา"
 deficit.170.A:1 "เศษหุ่นยนต์บน§Y[robots_planet.GetName]§!สําหรับชิ้นส่วน"
 deficit.170.A.tooltip:2 "Dismantle all robots on [robots_planet.GetName] (£pop£ §H[robots_planet.recycled_robots] Drones§!) to gain £alloys£ §Y[robots_planet.total_alloys_gained] Alloys§!"
 deficit.170.B:1 "คอนกรีต รถจักรกล ดรอยด์ปลดชนวนบน§Y[robots_planet.GetName]§!."
 deficit.170.B.tooltip:2 "Dismantle half of the population on [robots_planet.GetName] (£pop£ §H[robots_planet.recycled_robots] Drones§!) to gain £alloys£ §Y[robots_planet.total_alloys_gained] Alloys§!"

 deficit.175.desc:1 "เนื่อง จาก ไม่ สามารถ แก้ ปัญหา การ ขาด แคลน อาหาร ของ เรา ได้ เรา จึง ถูก บังคับ ให้ ประกาศ ว่า เรา เป็น คน ล้ม ละลาย และ เป็น หนี้ สิน.[Owner.GetFinancialAdvisorAgencyCap]กําลังร่างแผนสํารองใหม่ เพื่อลดค่าใช้จ่าย และป้องกันสถานการณ์นี้ ไม่ให้เกิดขึ้นอีก"

 deficit.185.name:0 "การ ป้องกัน คริสตัล"
 deficit.185.desc:0 "ผลึกร้อนกําลังเริ่มขาดแคลนมากขึ้น[Root.Owner.GetName]มี การ รายงาน การ ขาด แคลน อาหาร ใน หลาย เขต นับ ตั้ง แต่ ส่วน ประกอบ สําคัญ ของ ทหาร จน ถึง ส่วน ประกอบ สําคัญ ที่ ใช้ ใน กระบวนการ ผลิต ที่ ก้าว หน้า หลาย อย่าง.[Owner.GetFinancialAdvisorAgencyCap]เตือน ให้ ระวัง การ ปฏิรูป โซ่ อุปทาน ที่ จําเป็น ภาย ใน ไม่ กี่ เดือน ซึ่ง การ ตัด หลัง อย่าง คม กริบ จะ จําเป็น."
 deficit.185.A:0 "รับคริสตัลจาก[looted_planet.GetName]."
 deficit.185.B:0 "เราจะต้องอธิบายเงินมัดจําของเรามากเกินไป"
 deficit.185.C:0 "เราสามารถอยู่กับคริสตัลของเรา ที่หายาก"
 deficit.190.desc:0 "ผลึก ที่ หา ยาก ของ เรา มี น้อย ลง จน กระทั่ง ถึง จุด ที่ แม้ แต่ ระบบ วิกฤติ ก็ ไม่ อาจ สนับสนุน ได้ อีก ต่อ ไป.[Owner.GetFinancialAdvisorAgencyCap]ซึ่งแนะนําให้เปลี่ยนชื่อเป็น\"คริสตัลสุดเจ๋ง\" บังคับให้ถูกตัดอย่างโหดร้าย เพื่อสนองการใช้งานของเรา"
 deficit.190.desc.wilderness: "เสบียงของเรา$rare_crystals$เรา ไม่ สามารถ รักษา หน้า ที่ วิกฤต หลาย อย่าง ได้ อีก ต่อ ไป. ใน กรณี ที่ ร้าย แรง เรา เสี่ยง ชีวิต ของ ผู้ ที่ มี ความ สามารถ พิเศษ กว่า ซึ่ง พึ่ง ทรัพยากร อัน ล้ํา ค่า นี้.\n\nเพื่อ ป้องกัน การ สูญ เสีย ชีวิต และ ผล ผลิต มาก ขึ้น ตอน นี้ เรา ต้อง พึ่ง อาศัย วิธี การ ที่ รุนแรง เพื่อ ทํา ให้ แน่ ใจ ว่า เรา บรรลุ ดุลยภาพ อีก ครั้ง."

 deficit.200.name:1 "เครื่อง ดับ เพลิง ที่ มี ประสิทธิภาพ"
 deficit.200.desc:1 "เนื่องจากความผิดพลาดและค่าใช้จ่ายอย่างไม่ยั้งคิด สํารองเชื้อเพลิงของเรามีการระเหยอย่างสมบูรณ์! ทรัพยากรเชิงยุทธศาสตร์นี้ถูกใช้อย่างแพร่หลายในหลายสาขา ตั้งแต่การผลิตอัลลอยถึงการพัฒนาทางทหาร การ ทดแทน เสบียง ของ เรา เป็น สิ่ง สําคัญ อันดับ แรก เพื่อ รับ ประกัน ความ รุ่งเรือง ทาง เศรษฐกิจ ของ จักรวรรดิ ของ เรา."
 deficit.200.A:1 "เรียกข้อมูลแบบจาก[looted_planet.GetName]."
 deficit.200.B:1 "เราจะต้องอธิบายเงินมัดจําของเรามากเกินไป"
 deficit.200.C:1 "เราสามารถอยู่อาศัย ด้วยกากบาทของเรา กลายเป็นสิ่งที่หายากมากขึ้น"
 deficit.205.desc:1 "การขาดแคลนโมเตสที่ผันผวนมานาน ส่งผลให้เศรษฐกิจของจักรวรรดิล่มสลาย เนื่อง จาก ไม่ สามารถ ชําระ ค่า ใช้ จ่าย ได้ เรา จึง ถูก บังคับ ให้ ประกาศ เรื่อง การ ล้ม ละลาย และ สูญ เสีย หนี้ สิน.[Owner.GetFinancialAdvisorAgencyCap]กําลังร่างแผนการเงินใหม่ บังคับให้ตัดงบประมาณออกไป เพื่อทําให้งบประมาณของเราสมดุล"
 deficit.205.desc.gestalt:0 "การขาดแคลนโมเตสที่ผันผวนมายาวนาน ส่งผลให้จักรวรรดิมีห่วงโซ่ไฟฟ้าตก เรื่อง นี้ เห็น ได้ ชัด ว่า เรา ไม่ อาจ ค้ําจุน การ ใช้ เนื้อ เรื่อง นี้ ได้ อีก ต่อ ไป.[Owner.GetFinancialAdvisorAgencyCap]กําลังร่างแผนการเงินใหม่ บังคับให้ตัดงบประมาณออกไป เพื่อทําให้งบประมาณของเราสมดุล"
 deficit.205.desc.wilderness: "การขาดแคลน$volatile_motes$ในหมู่โลกของเราได้ก่อให้เกิดการรบกวนที่แพร่หลาย ไม่น้อยที่สุดกับพนักงานนอกประเทศ เพื่อ ป้องกัน การ สูญ เสีย ชีวิต และ ผล ผลิต อีก ต่อ ไป บัด นี้ เรา ต้อง ก่อ ให้ เกิด การ เปลี่ยน แปลง ขนาน ใหญ่ เพื่อ รับ ประกัน ความ ยืน ยาว พื้น ฐาน ของ ชีวิต โดย หวัง ว่า ใน ไม่ ช้า เรา จะ ฟื้น ตัว ให้ สมดุล."


 deficit.215.name:1 "การ ป้องกัน ก๊าซ ที่ มี ประสิทธิภาพ"
 deficit.215.desc:1 "ก๊าซนอกสมรสกลายเป็นสิ่งแปลกปลอม ในคลังของจักรวรรดิเรา และการหายไปอย่างต่อเนื่องของพวกเขา[Owner.GetFinancialAdvisorAgencyCap]ขอ แนะ นํา เรา ให้ คิด ถึง งบ ประมาณ ของ เรา ก่อน จะ จัด การ กับ สถานการณ์ ที่ ยาก ลําบาก นี้."
 deficit.215.A:1 "เรียกก๊าซใหม่จาก[looted_planet.GetName]."
 deficit.215.B:1 "เราจะต้องอธิบายเงินมัดจําของเรามากเกินไป"
 deficit.215.C:1 "เราสามารถอยู่กับก๊าซของเรา ที่มีความผันผวนมากขึ้น"
 deficit.220.desc:2 "จักรวรรดิ ของ เรา ไม่ สามารถ รับมือ กับ การ ขาด แคลน ก๊าซ แปลก ๆ ซึ่ง ได้ ทําลาย กระบวนการ ผลิต ของ เรา.[Owner.GetFinancialAdvisorAgencyCap]ถูกบังคับให้ประกาศล้มละลาย อนุญาตให้เราทวงหนี้ การตัดส่วนที่คมชัดจะถูกบังคับ เพื่อที่เราจะได้ค่อยๆ สร้างคลังทรัพยากรของเรา"
 deficit.220.desc.gestalt:0 "จักรวรรดิ ของ เรา ไม่ สามารถ รับมือ กับ การ ขาด แคลน ก๊าซ แปลก ๆ ซึ่ง ได้ ทําลาย กระบวนการ ผลิต ของ เรา.[Owner.GetFinancialAdvisorAgencyCap]ถูกบังคับให้ประกาศล้มละลาย ทําให้เราสามารถจัดการระบบการจําหน่ายใหม่ได้ เพื่อที่เราจะสามารถสร้างคลังทรัพยากรของเราขึ้นมาใหม่อย่างช้าๆ"

