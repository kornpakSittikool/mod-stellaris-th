 situation.1065.name:0 "การ มุ่ง ติด ตาม ลูก ประคํา"
 situation.1065.desc:0 "ขณะที่กําลังแบก§Yปิ่น โต ของ ฟ้า§!เรือขนส่งของเราสังเกตเห็นว่า ไฮเปอร์เลนที่พวกเขาเดินทางผ่าน มีการบิดเบือนครั้งที่สองเกินเรือของพวกเขา ใน ตอน แรก การ ไม่ คํานึง ถึง เรื่อง นี้ เป็น เพียง ความ ผิด ปกติ แต่ ยัง ไม่ ปรากฏ ชัด จน กระทั่ง เรือ เข้า ไป§Y[Target.Solar_System.GetName]§!ที่กลุ่มของการแสวงหาองค์กรที่มีสาเหตุของการสลายตัวแบบไฮเปอร์เลนเต้: คลัทช์ของมังกรเวลส์ออกเข้าสู่ระบบของเราในการแสวงหาร้อนของเรือขนส่งของเรา พวกเขาต้องแอบซ่อนตัวใกล้จุดกระโดด และตามเราออก พวก พญา นาค ดู เหมือน จะ ไม่ มี ความ สามารถ ทาง ความ คิด ของ ผู้ เชี่ยวชาญ และ ดู เหมือน ว่า กําลัง ติด ตาม เรา อย่าง ไม่ มี ใคร รู้ หรือ โดย เฉพาะ อย่าง ยิ่ง พวก เขา ไม่ รู้ ตัว."
 situation.1065.a:0 "ฆ่าพวกแมลง"
 situation.1065.b:0 "เราควรตั้งสถานที่ศักดิ์สิทธิ์ให้พวกเขา[Target.Solar_System.GetName]."
