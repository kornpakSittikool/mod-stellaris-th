 concept_vacuum_flower_star_effects_desc: "โบนัสขึ้นอยู่กับคลาสดาวของระบบเงินทุนของคุณ:\n\n- §Yห้องบี§!: §G+75§! £alloys£อัลลอย\n- §Yคลาส A§!: §G+150§! £consumer_goods£สินค้าสําหรับผู้ใช้\n- §Yห้อง F§!: §G+300§! £food£อาหาร\n- §Yคลาสก§!: §G+300§! £energy£พลังงาน\n- §Yคลาส K§!: §G+300§! £minerals£เหมือง\n- §Yคลาส M§!: §G+30§! £rare_crystals£ชื่อ=คริสตัลชื่อ\n- §Yยักษ์ แดง§!: §G+15§! £sr_living_metal£สิ่งมีชีวิตเมทัล\n- §Yคนแคระสีน้ําตาล§!: §G+30§! £volatile_motes£กากบาท\n- §Yพัล ซาร์§!: §G+15§! £sr_zro£Zro\n- §Yหลุม ดํา§!: §G+15§! £sr_dark_matter£สสารมืด\n- §Yนิวตรอน§!: §G+15§! £nanites£นาไนท์\n- §Yตัวนําแสงแบบมีชีวิตชีวา§!: §G+30§! £exotic_gases£ก๊าซ กัมมันตรังสี\n- §Yไรต์โบราณ§!: §G+15§! £astral_threads£เธรดต่าง ๆ\n\nระบบไบนารีและไตรนารี่ ให้ผลรวมขององค์ประกอบชนิดดาวของพวกเขา"
