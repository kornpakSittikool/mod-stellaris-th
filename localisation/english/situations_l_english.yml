 deficit.100.desc:0 "พลังงานของเราเสียการควบคุม[Owner.GetFinancialAdvisorAgencyCap]เรา ต้อง ลง มือ จัด การ อย่าง เด็ด ขาด เพื่อ จัด การ กับ สถานการณ์ นั้น ซึ่ง จะ ต้อง แก้ไข อย่าง เด็ด ขาด ภาย ใน ไม่ กี่ เดือน."
 deficit.100.desc.gestalt:0 "พลังงานของเราเสียการควบคุม โดรนที่กระจายทรัพยากรของเรากําลังวุ่นวายมากขึ้น กับการอ่านที่พวกเขาวัดสุขภาพของสายอุปทานของเรา พวก เขา พยากรณ์ ว่า จะ จําเป็น ต้อง มี การ ตัด หลัง อย่าง รุนแรง ใน ไม่ กี่ เดือน เว้น แต่ จะ มี การ ลง มือ ปฏิบัติ อย่าง เด็ด ขาด."
