 gestalt_black_hole_good:0 "ความ ไว้ วางใจ ที่ ถูก ส่ง มา"
 gestalt_black_hole_good_desc:1 "ชิ้นส่วนของ[Owner.GetBrainName]จะอยู่ในขอบฟ้าของเหตุการณ์ของหลุมดํา ที่ยาวหนึ่งวินาทีเป็นอีออน ความแตกต่างของเวลามีการใช้งาน"
 gestalt_black_hole_bad:0 "ความ กังวล ที่ ไม่ เกี่ยว ข้อง"
 gestalt_black_hole_bad_desc:1 "ชิ้นส่วนของ[Owner.GetBrainName]จะติดอยู่ในขอบฟ้าของเหตุการณ์ ของหลุมดํา ที่วินาทียืดออกไปเป็นมหายุค เวลามันต่างกัน"

 situation.501.name:0 "จํานวนครั้งที่เล่น"
 situation.501.desc:1 "เนื่องจากการชนที่ไม่คาดคิด กับชิ้นส่วนของเศษอวกาศ,§Y[gravity_well_station.GetName]§!มี การ หันเห จาก วง โคจร กลม ที่ อยู่ ใน ชั้น ใน ที่ สุด และ ตอน นี้ กําลัง จะ ปิด ระยะ ทาง ไป ยัง หลุม ดํา ที่ อยู่ ใกล้ ๆ. ขณะที่อุบัติเหตุทําให้ทั้งสถานีที่มีความเสี่ยง นอกจากนี้ยังเป็นโอกาสที่ไม่น่าเชื่อ ที่จะศึกษาหลุมดํา§Hสสารมืด§!.\n\nเครื่องขับเคลื่อนฉุกเฉินได้เปิดใช้งาน เพื่อแก้ไขวงโคจรของสถานี"
 situation.501.a:0 "ออกไปจากตรงนั้น!"
 situation.501.b:1 "ยึดวงโคจรของสถานี รอบหลุมดํา"
 situation.501.c:0 "ไปใกล้หลุมดําให้มากที่สุด"

 # Random events
 situation.510.name:0 "สวัสดีความมืด"
 situation.510.spirit.desc:1 "แสงสว่าง! ความ กระตือรือร้น ทาง ศาสนา, ความ เลื่อมใส ศรัทธา[Root.Owner.GetResearchers]บนเรือ§Y[Target.GetName]§!ได้ยึดการควบคุมของสถานี พวกเขาอ้างว่าได้รับวิสัยทัศน์ และตอนนี้กําลังมุ่งหน้าตรงไปที่ใจกลางของหลุมดํา ในการค้นหาจิตวิญญาณสําหรับ ตัวเอง\n\nบุคลากรติดอาวุธกําลังต่อสู้ เพื่อควบคุมสถานีอีกครั้ง"
 situation.510.desc:1 "ความ กระตือรือร้น มาก เกิน ไป[Root.Owner.GetResearchers]บนเรือ§Y[Target.GetName]§!ได้ยึดการควบคุมของสถานีและตอนนี้กําลังหันมันไปยังหลุมดํา - การย้ายอย่างไม่ต้องสงสัยขับเคลื่อนโดยความอยากรู้อยากเห็นทางวิทยาศาสตร์อย่างไม่รู้จักพอ, ปริมาณที่ไม่ดีของความประมาทและ\n\nบุคลากรติดอาวุธกําลังต่อสู้ เพื่อควบคุมสถานีอีกครั้ง"
 situation.510.tooltip:0 "สถานการณ์ที่ถูกล็อคเพื่อความก้าวหน้า"

 situation.511.name:0 "กลัวความมืด"
 situation.511.black.desc:1 "'เราได้เห็นสิ่งที่เกิดขึ้นกับเรือที่ติดอยู่ในขอบฟ้าเหตุการณ์! ฉันไม่ได้ตั้งใจที่จะตายเช่นนั้น!'\n\nหลังจากกรีดร้องต่อต้านของพวกเขา หนึ่งในของเรา[Root.Owner.GetResearchers]การ ควบคุม ของ สถานี และ ขณะ นี้ กําลัง เคลื่อน ที่ ไป จาก หลุม ดํา.\n\nบุคลากรอาวุธกําลังต่อสู้ เพื่อควบคุมสถานีอีกครั้ง และเหตุการณ์ที่อ้างถึง ถูกลบออกจากหนังสือฟิสิกส์ของเรา"
 situation.511.desc:1 "กลัว[Root.Owner.GetResearchers]ได้ยึดการควบคุมของสถานีและตอนนี้ ขับเคลื่อนมันออกไปจากหลุมดํา\n\nบุคลากรติดอาวุธกําลังต่อสู้ เพื่อควบคุมสถานีอีกครั้ง"
 situation.511.tooltip:0 "สถานการณ์ที่ล็อคไว้เพื่อถอยทัพ"

 situation.513.name:0 "การ คืน สู่ อํานาจ ควบคุม"
 situation.513.desc:1 "หลัง จาก เผชิญ หน้า กัน อย่าง ตึงเครียด พวก กบฏ ถูก จัด การ และ บุคลากร ที่ มี อาวุธ ได้ กลับ คืน สู่ การ ควบคุม อย่าง เต็ม ที่§Y[Target.GetName]§!."
 situation.513.tooltip:1 "สถานการณ์เปลี่ยนแปลงได้อีกครั้ง"

 situation.520.name:0 "ใกล้ กว่า ที่ เรา คิด"
 situation.520.desc:1 "เมื่อเข้าใกล้หลุมดํา เวลาอวกาศโค้งในวิธีคาดเดาและ§Y[Target.GetName]§!เครื่องราชอิสริยาภรณ์กําลังพยายามตามให้ทัน หลัง จาก การ ปรับ เครื่อง มือ บน เรือ อย่าง ระมัดระวัง สถานี นี้ ก็ ได้ รับ การ แสดง ให้ เห็น ว่า ใกล้ กับ หลุม ดํา มาก กว่า ที่ เรา เคย คิด กัน."

 situation.530.name:0 "การ ค้น พบ ความ มืด"
 situation.530.desc:1 "§Y[Target.GetName]§!'ใกล้หลุมดําอนุญาตให้[Root.Owner.GetResearchers]เพื่อรวบรวมข้อมูลจํานวนมาก เพื่อเพิ่มความเข้าใจของเรา"

 situation.540.name:0 "กระบวนการ เพ น โรส"
 situation.540.desc:1 "หนึ่งในพวกเรา[Root.Owner.GetResearchers]ได้วางแผนอย่างชาญฉลาดที่จะบันทึก§Y[Target.GetName]§!จากชะตากรรมของมัน : โดยการถอดออก โมดูลพิเศษใด ๆ และอุปกรณ์ใด ๆ และโยนพวกเขาลงในหลุมดํา ในกรณีนี้ 'ควร' คือคําที่ตรง ๆ ทฤษฎีเบื้องหลังการตัดสินใจนี้ ไม่เคยถูกทดสอบมาก่อน"
 situation.540.a:1 "มันคุ้มที่จะลอง"
 situation.540.a.tooltip:0 "ลบอาคารทั้งหมดออกจาก§Y[Target.GetName]§!ในความพยายามที่จะลดลง§Yแก้ไขโครงการหลัก...§!."
 situation.540.b:1 "การสูญเสียทรัพยากร"

 situation.541.name:0 "ผล ของ เพ น โรส"
 situation.541.desc:1 "หลัง จาก ถอด เครื่อง ยนต์ แล้ว บุคลากร บน เรือ§Y[Target.GetName]§!ทําให้พวกมันเข้าไปในหลุมดํา แรง กระตุ้น ที่ เกิด จาก การ เปิดตัว ได้ ขับ ดัน สถานี ออก ไป จาก ความ โดด เดี่ยว ได้ สําเร็จ."

 situation.542.name:0 "$situation.541.name$"
 situation.542.desc:1 "$situation.541.desc$\n\nขณะ ที่ การ ตัดสิน ที่ จะ ทํา ให้ โมดูล ของ สถานี ว่าง เปล่า ทํา ให้ เรา มี เวลา มาก ขึ้น แต่ ผล ที่ ได้ นั้น มี ผล กระทบ น้อย กว่า ที่ คาด ไว้. สถานีไม่ได้ถึงความเร็วหลบหนี"

 situation.580.name:0 "จุดที่ไม่หวนกลับ"
 situation.580.desc:1 "§Y[Target.GetName]§!ได้ใกล้ชิดกับหลุมดํามากเกินไป และแรงผลักดันของมัน ไม่สามารถต่อต้านการเพิ่มขึ้น\n\nสถานีหายไปแล้ว ทั้งหมดที่เราทําได้ตอนนี้ คือถ่วงเวลาสิ่งที่หลีกเลี่ยงไม่ได้"

 # Ending 1: fall
 situation.590.name:0 "ขอบฟ้าเหตุการณ์"
 situation.590.desc.base:0 "§Y[Target.GetName]§!กําลังข้ามขอบฟ้าเหตุการณ์ของหลุมดํา เนื่องจากผลกระทบของการสลายตัวของเวลา อิมเมจหลังจากที่มันยังคงอยู่ นานหลังจากที่สถานีตัวเองหายไป"
 situation.590.desc.normal:0 "$situation.590.desc.base$\n\nไม่มีแม้แสงที่สามารถข้ามวงโคจรภายในของหลุมดํา : ช่วงเวลาสุดท้ายของสถานีและบุคลากรของ จะยังคงไม่รู้จักตลอดไป"
 situation.590.desc.hive:0 "$situation.590.desc.base$\n\nเว้นแต่เราจะตัดการเชื่อมต่อทั้งหมด[owner.GetIndividualNamePlural]ภายในสถานี ประสบการณ์ด้วยตัวเอง ของการล้มเหลว ของกฎหมายทั้งหมดของฟิสิกส์ที่รู้จักกัน อาจทําลายจิตสํานึกร่วมกันของเรา"
 situation.590.desc.machine:0 "คําเตือน:§Y[Target.GetName]§!ใกล้กับขอบฟ้าเหตุการณ์ แรงโน้มถ่วงดึง: หลบหนี ความผันผวนของเวลา: เพิ่มขึ้น หลักสูตรที่แนะนําของการกระทํา: การบังคับตัวเองของหุ่นยนต์ทั้งหมด อาศัยอยู่ภายในสถานีเพื่อหลีกเลี่ยงประสบการณ์รวม\n\n§Rแจ้งเตือนอย่างรุนแรง:§!โอกาสของความเสียหายที่ไม่สามารถแก้ไขได้ ต่อจิตสํานึกของเราทั้งหมด ถ้าการเชื่อมต่อประสาทได้รักษาไว้"
 situation.590.a:1 "โดรนในตัวเอง"
 situation.590.b:1 "เราต้องเป็นพยานในฤดูใบไม้ร่วง"

 # Gestalt Ending
 situation.591.name:0 "หมดเวลาร่วม"

 #Good Ending
 situation.591.base.hive:0 "คิดขยายวง การผ่าตัดจะช้าลง ทุกท่าทางเป็นลําดับอนันต์ของเหตุการณ์ เราเป็นพยานอนันต์ ไม่ เราอาบน้ําในนั้น\nมันเหมือนกับว่าเวลาของตัวเองถือลมหายใจของมัน\n\nขณะที่หลุมดําบิดเบือนผ้า ของเวลาอวกาศ ชิ้นส่วนของจิตสํานึกของเราตอนนี้ติดอยู่ ในฤดูใบไม้ร่วงที่ไม่มีที่สิ้นสุด"
 situation.591.base.machine:0 "รายงานสถานะ: โดรนของเราภายในสถานี กําลังประสบการขยายตัวอย่างรุนแรง เนื่องจากเพิ่มใกล้กับหลุมดํา ความเร็วตัวประมวลผลลดลง ความ เร็ว ของ เครื่องจักร ลด ลง. ระบบวันที่ภายในก็ล้นเหลือ"

 situation.591.desc.hive:0 "$situation.591.base.hive$\n\nหลายศตวรรษจะผ่านไป ในขณะที่เศษ ของเราเองติดอยู่ภายในหลุมดํา ตัวเองคิดสําหรับวัน เราสามารถใช้ประโยชน์ได้ โดยการเปลี่ยนตัวตนของเรา ตอนนี้เราสามารถวิเคราะห์ ประวัติศาสตร์ทั้งหมดของเรา จากมุมมองใหม่ โดย วิธี นี้ รูป แบบ ใหม่ ๆ จึง ปรากฏ ขึ้น.\n\nครั้งหนึ่ง การแยกกันทําให้เราแข็งแกร่งขึ้น จากนี้ไป เราทั้งสองเป็นโปรตากอน และนักอ่านเรื่องราวของเราเอง และเราจะเขียนตอนจบที่งดงาม"
 situation.591.desc.machine:0 "$situation.591.base.machine$\n\nสรุป: สถานการณ์ นี้ อาจ ถูก ฉวย ประโยชน์ ได้. หลาย ศตวรรษ จะ ผ่าน ไป ขณะ ที่ โดรน บน สถานี นี้ มี อาการ วัน เดียว. ด้วยการเปลี่ยนเส้นทางให้พลังการรับรู้ของพวกเขา เราสามารถได้มุมมองใหม่ๆ เกี่ยวกับประวัติศาสตร์ของจักรวรรดิเรา รูป แบบ ใด ๆ ที่ ก่อ ผล เสีย หาย อาจ แก้ไข ได้. เราสามารถกําหนดอนาคตของเราเอง\n\nการแยกกันทําให้เราแข็งแกร่งขึ้น"

 #Bad ending
 situation.592.name:0 "$situation.591.name$"
 situation.592.desc.hive:0 "$situation.591.base.hive$\n\nมันเจ็บปวดมาก ความรู้สึกของเดจาวู ที่อยู่เบื้องหลังตลอดไป เรากําลังตัดการเชื่อมต่อกับ[owner.GetIndividualNamePlural]แต่จะใช้เวลาเป็นอนันต์ สําหรับกระบวนการมีผล\n\nเราได้เรียนรู้มากมาย แต่สิ่งที่ค่าใช้จ่าย?"
 situation.592.desc.machine:0 "$situation.591.base.machine$\n\nรายงานสถานะ การบาดเจ็บจากการรับรู้ ไม่สามารถรับมือกับการสลายตัวของเวลา ภายในหลุมดํา\nพยายามตัดการเชื่อมต่อกับโดรน วันเติมเสร็จโดยประมาณ: 4350678260783 ปี\n\nสรุป: การ ตัดสิน ใจ ของ เรา ที่ จะ รักษา ความ สัมพันธ์ เป็น การ ให้ คํา แนะ นํา แต่ สุด ท้าย ก็ ก่อ ความ เสีย หาย. อย่าซ้ําเติมภายใต้สถานการณ์ใดๆ"

 # Ending 2: escape
 situation.596.name:0 "กลับจากสีดํา"
 situation.596.desc:0 "§Y[Target.GetName]§!หนีจากแรงโน้มถ่วงของหลุมดํา กลับไปที่วงโคจรที่เสถียร รอบดาวยุบ\n\nข้อมูลที่เรารวบรวมระหว่างสถานการณ์อันตรายนี้ จะเก็บ[Root.Owner.GetResearchers]ยุ่งอยู่หลายปี"
 situation.597.name:0 "$situation.596.name$"
 situation.597.desc:1 "§Y[Target.GetName]§!หนีจากแรงโน้มถ่วงของหลุมดํา กลับไปที่วงโคจรที่เสถียร รอบดาวยุบ\n\nผ่านจํานวนมากได้อธิบายประสบการณ์เป็น 'ความชอกช้ํา', หนึ่งใน[Root.Owner.GetResearchers]ทาง สถานี นี้ ได้ รับ การ ดล ใจ จาก ประสบการณ์ ครั้ง นั้น และ ตอน นี้ มี ความ กระตือรือร้น อย่าง ยิ่ง ที่ จะ แบ่ง ปัน ความ รู้ ใหม่ ของ ตน กับ ทีม วิทยาศาสตร์ อื่น ๆ ของ เรา."

