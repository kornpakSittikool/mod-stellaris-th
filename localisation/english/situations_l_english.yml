 operation_kaleidoscope_shielded_world: "โลกเมืองหลวงของพวกเขาได้รับการปกป้องโดย§Y$building_planetary_shield_generator$§!."
 operation_kaleidoscope_previous_owner: "พวกเขาไม่ยอมให้เราผ่าน การรักษาความปลอดภัยของพวกเขาอีกครั้ง"
 operation_kaleidoscope_on_success: "$IF_SUCCESSFUL|E$\nคา ลิ ด คอปจะถูกส่งไปที่[root.target.GetName]แพร่เชื้อไปยังเมืองหลวง"

