 situation.1085.name:0 "ก. ค."
 situation.1085.desc.study:0 "สิ่ง ที่ เคย เป็น เพียง ข่าว ลือ ก่อน หน้า นี้ ได้ รับ การ ยืน ยัน ว่า:§Yพิธี มิสซา§!บน§Y[This.GetName]§!ได้มีการฉีกหลุมในความเป็นจริงของเรามาก เปิดแตกเป็นโลกอื่น ปรากฎการณ์ได้เจาะขั้นตอนการบรรจุและตอนนี้ดูเหมือนจะขยายเข้าไปใน[This.GetName]เมืองหลวง การ สัมผัส ใด ๆ กับ มิติ แม้ แต่ โดย ไม่ ตั้งใจ ผ่าน เลนส์ ของ อุปกรณ์ สังเกต ดู ทํา ให้ เกิด ความ ทุกข์ อย่าง รุนแรง ใน การ สังเกต[Owner.GetTeamMember]ของเรา[Owner.GetScientistPlural]เป็นห่วงว่าเขาจะสามารถแพร่กระจายได้ไกลกว่านี้ แต่ยังมีสัญญาด้วย ว่าด้วยเวลาเพียงเล็กน้อย"
 situation.1085.desc.deify:0 "สิ่ง ที่ เคย เป็น เพียง ข่าว ลือ ก่อน หน้า นี้ ได้ รับ การ ยืน ยัน แล้ว:§Yพิธี มิสซา§!บน§Y[This.GetName]§!กําลังทําลายความเป็นจริงของเรา สู่โลกของปีศาจบริสุทธิ์ ใครก็ตามถึงกับต้องตะเบ็ง ไปสู่รอยร้าวอย่างใดอย่างหนึ่ง ต้องการชั่วโมงของการอยู่คนเดียว เพียงเพื่อหยุดกรีดร้อง ขณะ ที่ พวก บาทหลวง ของ เรา ได้ ใคร่ครวญ ถึง การ ที่ เรา พ่าย แพ้ มา หลาย ปี โดย ไม่ ได้ รับ ความ สว่าง เจิด จ้า อย่าง ยิ่ง พวก เขา กล่าว ว่า พวก เขา กําลัง ใกล้ เข้า มา แล้ว\"เราแค่ต้องการเวลาอีกหน่อย!\" พวก เขา วิงวอน ขณะ ที่ นัก วิทยาศาสตร์ เตือน เรา ว่า กระบวนการ นี้ อาจ จะ ไม่ สามารถ ทํา ได้ หาก เรา ปล่อย ให้ ดําเนิน ต่อ ไป อีก มาก."
 situation.1085.a:0 "การ ค้น พบ นี้ คุ้ม ค่า กับ ความ เสี่ยง!"
 situation.1085.b.divine:0 "เราต้องเห็นวิสัยทัศน์ที่แท้จริงของพระเจ้า"
 situation.1085.b.anathema:0 "เราต้องรู้ว่าอะนาธีมาจะชนะมัน"
 situation.1085.c:0 "ไม่ มันอันตรายเกินไป"
 situation.1090.name:0 "ยึด เกาะ เกาะ เวียด"
 situation.1090.desc.study:0 "บางทีสามีของเราอาจจะดีเกินไป§Y[This.GetName]§!กําลังถูกฉีกจากข้างใน§Yพิธี มิสซา§!ยังสับสนอยู่ ขณะ ที่ ความ ก้าว หน้า ต่าง ๆ ที่ เรา ได้ ประสบ ใน วิทยาศาสตร์ จาก การ ศึกษา มิติ อื่น ๆ นั้น เป็น การ ปฏิวัติ ความ ตึงเครียด ของ โลก ก็ ยิ่ง ใหญ่ ขึ้น. น้อย[Owner.GetScientistPlural]เชื่อ ว่า พวก เขา สามารถ ทํา ให้ ปฏิกิริยา นั้น คงที่ ได้ แต่ ก็ มี โอกาส! เป็นชาวบ้าน[This.GetName]ขนส่งคณะกรรมการที่จะออกจาก[This.GetPlanetHabitat]มีรอยร้าวเกิดขึ้นมากมาย จุดของการกลับมาไม่เกิดขึ้นอย่างรวดเร็ว"
 situation.1090.desc.deify:0 "บางทีสามีของเราอาจจะดีเกินไป§Y[This.GetName]§!กําลังถูกฉีกจากข้างใน§Yพิธี มิสซา§!ยังสับสนอยู่ ขณะ ที่ เรา ได้ เรียน รู้ มาก เกี่ยว กับ มิติ แห่ง ความ เจ็บ ปวด อัน บริสุทธิ์ ความ ตึงเครียด ใน โลก มี มาก มาย เหลือ เกิน. มี บาทหลวง ไม่ กี่ คน ที่ ยัง เชื่อ ว่า พวก เขา ทํา ให้ มวล บริสุทธิ์ แต่ ก็ มี โอกาส! เป็นชาวบ้าน[This.GetName]ขนส่งคณะกรรมการที่จะออกจาก[This.GetPlanetHabitat]มีรอยร้าวเกิดขึ้นมากมาย จุดของการกลับมาไม่เกิดขึ้นอย่างรวดเร็ว"
 situation.1090.a:0 "เรามาไกลเกินไปที่จะเห็นมันสิ้นสุดตอนนี้"
 situation.1090.b:0 "ถ้าเราหยุดตอนนี้แอนทิมาชนะ!"
 situation.1090.c:0 "กําจัดมันซะ ไม่ว่าจะด้วยวิธีใดก็ตาม"
 situation.1095.name:0 "จบ"
 situation.1095.desc:0 "ฟ้าหายไปแล้ว มันไม่ได้ปกคลุมไปด้วยเมฆ มันถูกแทนที่ด้วยความว่างเปล่า ทั้งหมดที่เหลืออยู่§Y[This.GetName]§!เป็นกลุ่มของพื้นดินในมหาสมุทรของความว่างเปล่า ทุกคนที่เหลือ[This.GetPlanetHabitat]ทุกข์ทรมานจากความเจ็บปวด ที่เกิดขึ้นทุกๆวินาที เราซื้อเวลามามากเท่าที่จะทําได้ สําหรับผู้เชี่ยวชาญของเรา เสียงที่บิดเบี้ยวและรบกวนจากโลกภายนอก§R§!\"ใช่ส่งกลับไปเม่อีกครั้ง\".§!"
 situation.1095.a:0 "ตอนนี้ หรือไม่เคย[Owner.GetScientistPlural]!"
 situation.1095.b:0 "มันเป็นตอนนี้หรือไม่ บาทหลวง!"
 situation.1100.name:0 "ป้อม ที่ หลบ หนี"
 situation.1100.desc:0 "หลังจากที่เอาชนะป้อมอีนิกม่า ส่วนหนึ่งของมันลอยอยู่ในอวกาศ ดังนั้นเราจึงตัดสินใจที่จะนํามา[Target.Solar_System.GetName]เพื่อเป็นส่วนหนึ่งของพวกเรา[Owner.GetParadeStudy]หลาย คน[Owner.GetSpeciesNamePlural]ได้หายไปภายในความลึกของ§Yแชมเบอร์จากป้อม§!ตั้งแต่มันมาถึง§Y[Target.GetName]§!เรามี[Owner.GetTeamMemberPlural]สํารวจมันทุกวัน แต่บางสิ่งบางอย่างภายในโครงสร้าง ที่มีการเปลี่ยนแปลงก่อนหน้านี้วันนี้ ประตูพับอยู่บนตัวเอง ออกจากเพียงผนังที่แท้จริง สําหรับตัวแทนของเราที่จะ รางกับ เรายังคงสื่อสารกับกับดักได้[Owner.GetSpeciesNamePlural]แต่เราไม่ได้มีความคิดที่ชัดเจน ที่จะนําพวกเขาออกมา โดยไม่ต้องทําลายโครงสร้าง ดูเหมือนว่าป้อมปราการอีนิกม่า จะมีความลับสุดท้าย"
 situation.1100.a:0 "ออกไป ไม่[Owner.GetSpeciesName]ข้างหลัง!"
 situation.1100.b:0 "เราเสี่ยงปล้นห้องไม่ได้"
 situation.1100.c.auth:0 "เราสามารถใช้เทคโนโลยีนี้ในการบรรจุสิ่งที่ไม่ต้องการของเรา"
 situation.1100.c.regular:0 "ตั้งโครงสร้างเป็นห้องปริศนา สําหรับนักเดินพาเหรดสํารวจ"
 situation.1100.c.gestalt:0 "ค้นพบความลับของห้อง!"

 situation.1110.name:0 "ได แอ ส โต รนัส"
 situation.1110.desc.base:0 "การบรรจุสําหรับ§Yวอยด์สปอว์น's Venom Gland§!รั่วแล้ว! พิษทําลายล้างได้ในขณะนี้พิษของเรา[Owner.GetWaterCoolantLower]จัดหาเมื่อ§Y[Target.GetName]§!บังคับให้พวกเราไปเฟอร์รี่[Owner.GetWaterCoolantLower]จากโลกอื่นเพื่อบรรเทาความแห้งแล้ง"
 situation.1110.desc.reg:1 "$situation.1110.desc.base$พิษที่วิวัฒนาการมาทําให้ สเปซ ฟานานา ของสัตว์ทะเลอ่อนแอ และละลายผ่านทางเรือ[Owner.GetSpeciesName]ที่กินเข้าไป$situation.1110.desc.end$"
 situation.1110.desc.lithoid:1 "$situation.1110.desc.base$พิษนี้ ที่วิวัฒนาการมา จนทําให้อวกาศยักษ์อ่อนแอลง[Owner.GetSpeciesName]มันอยู่บนผิวชั้นนอก$situation.1110.desc.end$"
 situation.1110.desc.machine:1 "$situation.1110.desc.base$พิษนี้ ที่วิวัฒนาการมา จนทําให้อวกาศยักษ์อ่อนแอลง และละลายผ่านทางเรือ หน่วยใด ๆ ที่ใช้ความเย็นที่ปนเปื้อน หยุดการทํางานได้อย่างรวดเร็ว$situation.1110.desc.end$"
 situation.1110.desc.end:0 "ตอนนี้เราต้องตัดสินใจว่าจะจัดการวิกฤตนี้ยังไง\n\nเราจะล้างโมเลกุลของทั้งหมดดีเอ็นเอว่างของเรา[Target.GetPlanetHabitat]หรือเราค่อยๆกรองพิษออกมา เราจะได้ดําเนินการ[Owner.GetParadeStudy]?"
 situation.1110.a:0 "เก็บกระจาย แต่ไม่ยกเลิก[Owner.GetParadeStudy]."
 situation.1110.a.tooltip:0 "หยุดชั่วคราว[Owner.GetParadeStudy]จนกว่าสารปนเปื้อนจะถูกล้าง"
 situation.1110.b:0 "ล้างโลกของสารปนเปื้อนและถุงพิษ!"
 situation.1110.b.tooltip:0 "ยกเลิก[Owner.GetParadeStudy]เพื่อล้างโลกอย่างรวดเร็ว"
 situation.1115.name:0 "[Target.GetName]ล้างแล้ว"
 situation.1115.desc:1 "หลังจากพยายามมาหลายเดือน[Owner.GetWaterCoolantLower]จัดหาเมื่อ§Y[Target.GetName]§!ท้ายที่สุดก็เคลียร์คดีวอยด์สปอว์น มันไม่ใช่ความพยายามที่สูญเปล่า ตามที่เราได้เรียนรู้มากจากชีววิทยาต่างดาว[Owner.GetWaterCoolantLower]และตอนนี้พร้อมที่จะดําเนินการกับ[Owner.GetParadeStudy]ของเรา[Owner.GetScientistPlural]ตอน นี้ คิด ว่า พวก เขา สามารถ ปรับ ปรุง ชีวิต ให้ ดี ขึ้น ได้[Target.GetName]กับการค้นพบเหล่านี้ ครั้งหนึ่ง[Owner.GetParadeStudy]สรุป"

 situation.1120.name:0 "ประกาย ไฟ ครั้ง สุด ท้าย"
 situation.1120.desc:1 "เครื่องสํารวจที่เราทิ้งไว้ ที่เว็บไซต์ของรายงานการเสียชีวิตสุดท้ายของสเตเลอร์ เดเวอร ว่าบางส่วนของร่างกายได้เริ่ม พลังงานดูเหมือนจะได้เพิ่มขึ้น กิจกรรมของดวงดาว แต่ด้วยการกําจัด§Yไข่§!, รัฐการคํานวณของเรา ว่ามันจะไม่พอที่จะฟื้นฟู§Y[dead_stellarite.solar_system.GetName]§!ระบบที่เคยเป็นความปรารถนา ถ้าเราหันยานขนส่งของเรากลับตอนนี้ เรายังคงสามารถมีอํานาจในการปกครองดาว"
 situation.1120.a:0 "เอาไข่กลับมา แล้วดูว่าจะทําอะไรได้บ้าง"
 situation.1120.a.tooltip:0 "ยกเลิก[Owner.GetParadeStudy]เพื่อสนับสนุนการครองราชย์[dead_stellarite.system.GetName]ดวงดาว"
 situation.1120.b:0 "ไม่ เราจะพาไข่ไป[Target.GetName]."

 situation.1125.name:0 "กลับทิศทาง"
 situation.1125.desc.base:0 "\n\nสินค้าของพวกเขา นับล้านของสเตลล่า เดเวอร ถูกเก็บไว้ที่ศูนย์แน่นอน ซึ่งทําให้พวกเขาต่อเนื่องและลงทุนจนกระทั่งพวกเขาพร้อมที่จะแนะนํา ยานขนส่งจะต้องมืดลงในขณะที่มันแทรกซึมเข้ามา[Target.GetSpeciesAdj]เมืองหลวง"
 situation.1125.desc.binary:0 "แสงสว่างของ[Target.GetAdj]ดาวแฝดส่องแสงลงบนเรือขนส่งของเราในขณะที่มันป้อน[Target.capital_scope.Solar_System.GetName]ระบบ$situation.1125.desc.base$"
 situation.1125.desc.trinary:0 "ไตรโอของแสงที่เป็นหัวใจของ[Target.GetName]ปิดยานขนส่งของเรา ขณะที่มันเข้าไปในยาน เอส[Target.capital_scope.Solar_System.GetName]ระบบ$situation.1125.desc.base$"
 situation.1125.desc.regular:0 "หลังจากที่เสร็จสิ้นขาแรกของการเดินทางของพวกเขาเพื่อการให้ชีวิต[Target.capital_star.GetName]ดาว, เรือขนส่งของเรา ลงทุนต่อไป[Target.GetName]พื้นที่$situation.1125.desc.base$"

 situation.1130.name:0 "รหัสเก่า"
 situation.1130.desc:0 "การขนส่งของสเตลล่า เดเวอรร ได้เคลียร์ระบบรักษาความปลอดภัย - รหัสรักษาความปลอดภัยที่$role_spymaster$ [spynetwork.leader.GetName]ได้มีการชุมนุมที่สําคัญ สําหรับการส่งผ่านเข้าสู่ระบบ หน่วยของเราได้เริ่มกระบวนการทําความร้อน เพื่อให้เด็กสเตลเลอร์ เดเวอร เคลื่อนไหว พวกเขาจะตั้งเป้าอีกครั้ง สําหรับดาวหลักของระบบ สําหรับการเดินทางครั้งสุดท้ายของยานขนส่ง"

 situation.1135.name:0 "ออก จาก เรือ ขน ส่ง เข้า สู่ การ เผา พลาสมา"
 situation.1135.desc:0 "เราได้รับข้อความจาก$role_spymaster$ [spynetwork.leader.GetName]ทุกอย่างพร้อมแล้ว คนของเราเริ่มทิ้งยานขนส่งไปแล้ว เหลือไว้แค่หน่วยโครงกระดูก เมื่อเรือกระทบกับความเร็วแสงสูงสุด พวกมันก็จะหนีไปด้วย ก่อนที่การขนส่งจะชนกับดาวหลักของระบบ\n\nส เต ล ลา เด อร์ เด เวอร เริ่ม มี ความ หงุดหงิด มาก. ถ้าเราไม่เริ่มปฏิบัติการเร็ว ๆ นี้ พวกเขาอาจจะเข้าไปใน แหล่งเชื้อเพลิงของการขนส่ง"

 situation.1140.name:0 "การ อยู่ ร่วม กัน อย่าง ประสบ ผล สําเร็จ"
 situation.1140.desc:0 "หลักฐานสุดท้ายของการดัดแปลงของเราละลายอย่างรวดเร็ว ภายในโคโรน่าของดาว เซ็นเซอร์ของเราไหม้ขึ้นชั่วขณะหลังจากผลกระทบ แต่ที่เพียงพอเพื่อยืนยันว่าเราได้ประสบความสําเร็จ§Y[From.target.capital_star.GetName]§!.\n\nพวกเราอาจจะเพิ่งกรรมกรรม ระบบสุริยจักรวาลทั้งหมด"
 situation.1140.a:0 "ตอนนี้เรารอ"

 situation.1145.name:0 "สุริยุปราคา"
 situation.1145.desc.base:1 "เรากําลังประสบ วัฏจักรของสุริยะที่ไม่ปกติ จาก[capital_star.GetName]ดวง อาทิตย์ มี จํานวน มาก ขึ้น อย่าง ที่ ไม่ เคย เป็น มา ก่อน เนื่อง จาก อุณหภูมิ ของ ดาว เคราะห์ ของ เรา ลด ลง ทํา ให้ การ แผ่ รังสี สุริยะ ลด ลง อย่าง น่า สังเกต."
 situation.1145.desc.regular:1 "$situation.1145.desc.base$\n\nผู้ประกาศข่าว[capital_scope.GetName]ได้เอาไปเก็บสะสมบนผ้าห่มที่มีพลังและเดินทางนอกบ้าน หวัง ว่า เรา จะ กลับ ไป ยัง ช่วง เวลา ที่ อบอุ่น อีก ใน ไม่ ช้า."
 situation.1145.desc.gestalt:1 "$situation.1145.desc.base$\n\nเราได้เพิ่มพลังงานให้กับงบประมาณความร้อนของเรา และได้สั่งให้หุ่นยนต์ทุกตัว เบียดตัวเข้าหากันมากขึ้น เพื่อรักษาความร้อน เราจะอดทนกับเรื่องนี้"
 situation.1145.desc.wilderness: "$situation.1145.desc.base$\n\nแม้ว่าการรบกวนนี้ จะกระตุ้นความกลัว สู่แก่นของสัญชาตญาณร่วมกันของเรา เราเติมพลังงานมากขึ้น เพื่อทําให้ที่อยู่อาศัยของเราอุ่นขึ้น และเหล่าศิษย์เก่าของเราก็จะเรียนรู้ที่จะเบียดเสียดกันใกล้ชิดกับกันเพื่อความอบอุ่น"
 situation.1145.a:0 "เอาเครื่องทําความร้อนมา"

 situation.1150.name:0 "สบายมาก"
 situation.1150.desc:1 "ปฏิกิริยาลูกโซ่ฟิวชั่นภายใน§Y[capital_star.GetName]§!ตอนนี้ได้รับการวางตัวอย่างต่อเนื่อง สําหรับระยะเวลาที่ไม่เคยมีมาก่อน มีภัยพิบัติทางนิเวศ[capital_scope.GetName]เนื่องจากรังสีลดลง และถ้ายังเป็นแบบนี้ต่อไป เราอาจจะได้เห็นยุคน้ําแข็ง ทุก สถานี และ สถาน ที่ พัก อาศัย อื่น ๆ ใน ระบบ กําลัง ประสบ ปัญหา คล้าย ๆ กัน. ของเรา[owner.GetScientistPlural]แน่ใจว่ามีบางอย่างที่ผิดปกติ และต้องการที่จะตรวจสอบ[capital_star.GetName]."
 situation.1150.a:0 "หาให้ได้ว่าเกิดอะไรขึ้น"

 situation.1160.name:0 "พบพาราไซต์"
 situation.1160.desc:0 "§R[capital_star.GetName]มันเต็มไปด้วยสัตว์ตัวเล็ก ๆ§!เราไม่รู้เลย ว่าพวกนีออน ลีไวอาทัน เข้าถึงดาวของเราได้ยังไง เราสามารถเปิดเผยเรื่องทั้งหมดในภายหลัง ตอนนี้ เราต้องหาวิธีหยุดปรสิต ก่อนที่เมืองหลวงจะแข็งตัว"
 situation.1160.a:0 "เอาพวกเขาออกมา"

 situation.1170.name:1 "[Target.GetName]หมดอายุแล้ว"
 situation.1170.desc.base:1 "วันนี้เป็นวันที่แย่มาก[owner.GetName]เป็นดาวเด่นของเรา§Y[target.GetName]§!ออกไปข้างนอก ทั้ง ๆ ที่ มี การ อพยพ หลาย ล้าน คน มัน เพียง แต่ ทํา ให้ การ ระเบิด เบา ลง เล็ก น้อย. เมืองหลวงของเรา สาบสูญไปตลอดกาล สู่ยุคน้ําแข็งถาวร[target.GetName]ตัว มัน เอง ย่อ ตัว ลง จน กลาย เป็น ดาว แคระ สี น้ําตาล ซึ่ง หมาย ความ ว่า ชีวิต ที่ เหลือ อยู่ ใน ระบบ จะ ลด น้อย ลง อย่าง ถาวร."
 situation.1170.desc.notknows:0 "$situation.1170.desc.base$\nน่า เศร้า เหตุ การณ์ ประหลาด นี้ ที่ ได้ ส่ง นัก โทษ ส เต ล ลา ไป ยัง ระบบ ของ เรา จะ ยัง คง เป็น เรื่อง ลึกลับ. ตอนนี้เราต้องสร้างใหม่"
 situation.1170.desc.knows:0 "$situation.1170.desc.base$\nเรารู้ว่าผู้ทําลายล้างเหล่านี้ ถูกแนะนําอย่างมีวัตถุประสงค์กับดาวของเราโดย§Y[star_infesters.GetName]§!- และตอนนี้พวกเขาจะต้องทรมาน"
 situation.1170.a:0 "โศกนาฏกรรมที่น่ากลัว"
 situation.1170.b:0 "เดอะ[star_infesters.GetName]จะต้องชดใช้"

 #Modifiers

 ether_trophy:0 "$drakes_scale$"
 ether_trophy_desc:0 "เขี้ยวของ§Yเลื่อนหน้าต่างหมายเหตุ§!เป็นศูนย์กลางของเมืองหลวงของโลก"
 studying_decaying_fang:0 "การ ศึกษา เกี่ยว กับ ฟัน ปลอม"
 studying_decaying_fang_desc:0 "อ่านหนังสือ§Yเอเธอร์ เดรค§!เขี้ยวขณะที่มันสลายตัวใกล้ชั้นบรรยากาศของเรา ทําให้เรามีความเข้าใจในเรื่องใด ๆ ก่อนจักรวาลนี้จะทํา"

 all_seeing_shard:0 "ทั้งหมดเห็นชาร์ด"
 all_seeing_shard_desc:0 "โดยฟิวชั่นที่ชั่วร้ายของเครื่องจักรและจุลชีววิทยา, ฐานดาวในระบบนี้ สามารถเอื้อมถึง ไกลเกินกว่าที่ปกติเราจะสามารถทําได้"
 shard_trophy:0 "$eye_of_the_shard$"
 shard_trophy_desc:0 "ภายใต้การเฝ้าระวังของ§Yเศษ ภาชนะ ดิน เผา§!ประชากรในโลกนี้ดูเหมือนจะทํางานหนักขึ้น"

 dread_trophy:0 "$dreadnoughts_reactor$"
 dread_trophy_desc:0 "เครื่องปฏิกรณ์จาก§Yดัตช์แบบอัตโนมัติ§!พลังบางส่วนในโลกนี้"
 reactor_overdrive:0 "ตัวช่วยการโอเวอร์ไดร์ฟ"
 reactor_overdrive_desc:0 "ผลประโยชน์ชั่วคราวจาก§Yอัตโนมัติ Deadot ของ§!เตาปฏิกรณ์กําลังช่วยงานทุกอย่างในโลกนี้"

 tiyanki_trophy:0 "$matriarchs_flagella$"
