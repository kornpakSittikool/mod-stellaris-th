 # Good end: stronger hivemind
 situation.292.name:0 "หลัง พายุ"
 situation.292.desc.base:0 "รายงานสถานะ: ระดับรังสีบน§Y[Target.GetName]§!ตอนนี้ทรงตัวแล้ว§Y[Target.GetStarName]§!ได้กลับมาในระดับปกติ ของกิจกรรมแสงอาทิตย์ พายุแม่เหล็กได้สิ้นสุดลง"
 situation.292.desc:0 "$situation.292.desc.base$\n\nรายงานสุดท้าย: สถานการณ์ที่ท้าทายทําให้เรามีโอกาส ทําให้เทคนิคการแผ่รังสีของเราสมบูรณ์แบบ เรา หยั่ง รู้ ค่า ผล ที่ จะ ตาม มา."

 # Neutral end: storm fades away
 situation.293.name:0 "$situation.292.name$"
 situation.293.desc:0 "$situation.292.desc.base$\n\nรายงานสุดท้าย : เราพยายามรับมือกับพายุ และล้มเหลวในการป้องกันโดรนของเรา จากความเสียหายของรังสี ขณะ ที่ เรา สามารถ รอด จาก การ ท้าทาย นั้น ได้ เรา เห็น ช่อง ทาง ที่ จะ ปรับ ปรุง ให้ ดี ขึ้น."

 # Bad end: scarred Hivemind
 situation.294.name:0 "$situation.292.name$"
 situation.294.desc:0 "$situation.292.desc.base$\n\nรายงานสุดท้าย: เรายังคงทุกข์ทรมาน จากผลสืบเนื่องระยะยาว ของความเสียหายของรังสี การกลับมาสู่สภาวะการรับรู้ที่เหมาะสม ต้องใช้เวลา ผลที่ไม่น่าอภิรมย์ เราต้องเตรียมพร้อมที่ดีกว่านี้ สําหรับอนาคต"

