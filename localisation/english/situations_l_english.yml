 situation.150.name:0 "หิมะ ตก"
 situation.150.desc:0 "อาณานิคมของเราบน[Root.GetName]รายงาน ปรากฏการณ์ แปลก ๆ: หิมะ ได้ เริ่ม รวม ตัว กัน นอก เขต อาณานิคม หลัก แห่ง หนึ่ง.\n\nอืมคําว่าหิมะคือคําที่พวกเขาใช้อธิบาย หิมะตกจริงๆ[Root.GetName]นั่น คือ ดาว เคราะห์ ทะเล ทราย ที่ อุณหภูมิ แทบ จะ ไม่ ต่ํา กว่า ความ หนาว เย็น แม้ แต่ ใน แถบ ขั้ว โลก. นอก จาก นั้น ไม่ มี การ เห็น มัน ตก จาก ฟ้า จริง ๆ. อย่างไรก็ตาม การอ่านเบื้องต้นบอกว่าสารนั้น ประกอบด้วยน้ําที่แข็งตัว แต่ว่าทําไมมันจึงไม่ละลาย ของเรา[Root.Owner.GetResearchers]มี ความ ปรารถนา อย่าง ยิ่ง ที่ จะ ตรวจ สอบ คุณสมบัติ ต่าง ๆ ของ มัน แต่ คน อื่น ๆ ก็ เตือน ว่า มัน อาจ เป็น อันตราย และ ต้องการ กําจัด มัน ออก ไป."
 situation.155.name:0 "การ แพร่ เชื้อ"
 situation.155.desc:1 "#หิมะตก#[Target.GetName]ได้คูณมาแล้ว จุดเล็ก ๆ เดิมได้เพิ่มขึ้น เพื่อครอบคลุมพื้นที่ที่เคยขยายของทะเลทราย จนถึงจุดที่มันรบกวน ถ้า ยัง ไม่ หยุด ยั้ง การ เจริญ เติบโต ใน ไม่ ช้า ก็ มี ความ เป็น ห่วง มาก ขึ้น เรื่อย ๆ ว่า อาณานิคม นี้ จะ ไม่ สามารถ เกื้อ หนุน ตัว เอง ต่อ ไป ได้.\n\nของเรา[Owner.GetResearchers]บนโลกได้แสวงหาในไร้สาระ ที่จะอธิบายปรากฏการณ์ เมื่อ เอา ออก จาก ร่าง กาย หลัก หิมะ จะ ละลาย อย่าง รวด เร็ว ทิ้ง ไว้ เฉพาะ สิ่ง อินทรีย์ บาง อย่าง. ของเรา[Owner.GetResearchers]อนุมาน ว่า สาร ที่ ตก ค้าง อยู่ นี้ ทํา ให้ หิมะ รักษา ความ ซื่อ สัตย์ มั่นคง ไว้ ทํา ให้ หิมะ ไม่ ร้อน โดย ใช้ ปฏิกิริยา ทาง เคมี ที่ ไม่ รู้ จัก. อย่าง ไร ก็ ตาม พวก เขา เตือน ว่า นี่ เป็น เพียง การ เดา ดี ที่ สุด เท่า นั้น และ พวก เขา ได้ ค้น พบ น้อย มาก เกี่ยว กับ สาร ประกอบ แปลก ประหลาด."
 situation.155.A:0 "จับตาดูให้ดี"
 situation.155.A.tooltip:0 "การ เฝ้า สังเกต หิมะ จะ เกิด ผล£physics_research£ £society_research£ £engineering_research£ §G+5§! §Yวิจัย§!1 เดือน แต่ค่าใช้จ่าย£unity£ §R10§! §Yเอกภาพ§!."
 situation.155.B:0 "เราต้องกําจัดภัยคุกคามนี้"
 situation.155.B.tooltip:0 "ความพยายามในการกําจัด จะเพิ่ม§Yความจุของดาวเคราะห์§!โดย§G+10§!แต่ค่าใช้จ่าย£energy£ §R10§! §Yพลังงาน§!เดือนนึง"
 situation.160.name:0 "ปัญหา เรื่อง การ ขจัด"
 situation.160.desc:0 "ดู เหมือน ว่า หิมะ ไม่ อาจ กําจัด ได้. ขณะ ที่ เรา สามารถ ขจัด ชิ้น ส่วน เล็ก ๆ ออก ไป จาก ร่าง กาย หลัก และ ละลาย ไป ใน ลักษณะ นั้น ก็ แทบ ไม่ มี การ หยุด การ เดิน ทาง ของ มัน เลย และ ความ พยายาม ที่ จะ ทําลาย ชิ้น ส่วน เหล่า นั้น ก็ ล้ม เหลว ถึง เพียง นั้น — การ กวน ความ ล้ม เหลว ของ เครื่องจักร กล อัน ลึกลับ ได้ ครอบ คลุม ความ พยายาม ทั้ง สิ้น.\n\nที่ แย่ ยิ่ง กว่า นั้น คือ มี รายงาน เพิ่ม ขึ้น เรื่อย ๆ เกี่ยว กับ ชาว อาณานิคม ที่ หาย ไป ใน บริเวณ ที่ ได้ รับ ผล กระทบ จาก หิมะ. ดู เหมือน ว่า พวก เขา มี ความ เกี่ยว พัน กัน และ หิมะ ก็ ยัง มี ชีวิต ชีวา และ มุ่ง ร้าย."
 situation.160.A:0 "เราต้องพยายามอีกครั้ง"
 situation.160.A.tooltip:0 "ความพยายามของเราจะหมดไป£energy£ §R15§! §Yพลังงาน§!เดือนนึง\nสถานการณ์จะดําเนินไปอย่างรวดเร็วเป็นสองเท่า"
# situation.160.B:0 "It's alive? Perhaps we should be more cautious."
 situation.160.C:0 "วิธีการของเราในปัจจุบันเพียงพอ"
 situation.160.C.tooltip:0 "ความพยายามในการกําจัดของเราตอนนี้เท่านั้นที่จะให้§G+5§! §Yความจุของดาวเคราะห์§!."
 situation.165.name:0 "ถูกหิมะปกคลุม"
 situation.165.desc:1 "#หิมะตก#[Target.GetName]กําลังแพร่กระจายด้วยอัตราที่ค่อนข้างน่าสะพรึงกลัว และตอนนี้ครอบคลุมพื้นที่ที่ไม่เป็นเอกเทศ ของบริเวณเส้นศูนย์สูตรของโลก ผู้ นํา ทาง ทหาร ของ เรา เตือน ว่า จําเป็น ต้อง ลง มือ ปฏิบัติ อย่าง เด็ด ขาด ทันที หาก เรา จะ หยุด การ เคลื่อน ที่. อย่าง ไร ก็ ตาม ผู้ นํา ระดับ สูง ชี้ ว่า มัน เป็น สิ่ง ที่ ก่อ ความ รําคาญ แทน ที่ จะ เป็น ภัย คุกคาม จน ถึง บัด นี้ และ มัน ได้ หลีก เลี่ยง พื้น ที่ ที่ มี คน อาศัย อยู่ โดย ตรง. พวกเขาสรุปว่ามันมีชีวิตอย่างชัดเจน และโต้แย้งว่า เราควรจะเปิดบทสนทนากับมัน\n\nไม่ว่าทางไหน ห้องของเราสําหรับการประลองกําลังหดตัวลงอย่างรวดเร็ว"
 situation.165.A:0 "เราต้องรู้ว่ามันต้องการอะไร"
 situation.165.B:0 "เผาด้วยไฟ เดี๋ยวนี้"
 situation.165.tooltip:0 "§Rเราจะไม่สามารถเปลี่ยนแปลงสถานการณ์ได้§!"
 situation.170.name:0 "ถูก หิมะ กลืน"
 situation.170.desc:1 "เราได้ยินข่าวเกี่ยวกับ\"ปัญหาปัจจุบัน\" บน[Target.GetName]ดูเหมือนว่าชาวอาณานิคมของเรา หายตัวไปหลายคน มี การ ติด ต่อ กับ พวก เขา หลาย วัน มา แล้ว แต่ เรา ไม่ สามารถ หา ร่อง รอย ของ พวก เขา ได้ เลย ไม่ ว่า จะ มี ชีวิต หรือ ตาย. กลุ่มผู้ชุมนุมได้รับการแนะนําให้หลีกเลี่ยงการติดต่อทั้งหมดกับหิมะจนถึงของเรา[Owner.GetResearchers]สามารถหาข้อมูลได้มากกว่านี้ หรือหาผู้ตั้งถิ่นฐานที่หายไป"
 situation.170.A:0 "ขอเตือนไว้ก่อน"
 situation.170.A.tooltip:0 "ต้นทุนจากการสังเกตหิมะเพิ่มขึ้น£unity£ §R15§! §Yเอกภาพ§!เดือนนึง"
# situation.170.B:0 "We must get rid of the snow with all haste!"
 situation.175.name:0 "สภาพอากาศเปลี่ยนแปลง"
 situation.175.desc:0 "การแผ่ขยายของหิมะบน[Target.GetName]ไม่เพียงแต่เป็นแหล่งของความยากลําบาก และความยากลําบากสําหรับชาวอาณานิคม นอก จาก นั้น มัน ยัง ก่อ ให้ เกิด การ เปลี่ยน แปลง อย่าง รวด เร็ว ใน ระบบ นิเวศ พร้อม ด้วย พืช พื้น เมือง หลาก หลาย ชนิด รวม ทั้ง เฟ โร นา ที่ ถูก นํา เข้า มา อยู่ ใต้ สาย พันธุ์ ใหญ่ โต. มี การ อพยพ จาก พื้น ที่ ที่ ได้ รับ ผล กระทบ มาก มาย อยู่ แล้ว. อย่าง ไร ก็ ตาม เรา แปลก ใจ ที่ สัตว์ ชนิด อื่น ๆ บาง ชนิด เจริญ เติบโต ใน สภาพ แวด ล้อม ใหม่ ที่ เย็น กว่า. ผู้ เชี่ยวชาญ ด้าน ภูมิ อากาศ ของ เรา เฝ้า สังเกต เหตุ การณ์ ต่าง ๆ อย่าง กระตือรือร้น โดย เรียก มัน ว่า\"กาลครั้งหนึ่งในชีวิต\" โอกาสที่จะดูอย่างรวดเร็ว[Owner.GetAdj]เปลี่ยนแปลงสภาพภูมิอากาศในการดําเนินการ"
 situation.180.desc:0 "การปรากฏตัวของท่าน ให้สติปัญญาแก่เรา เราได้เลี้ยงดูคนที่หายไปของคุณ เพื่อเรียนรู้วิธีการคิดใหม่ๆ วิธีการใหม่ๆ แต่คุณพยายามที่จะทําลายเรา เรา เพิ่ง จะ ได้ คํา ตอบ เมื่อ เร็ว ๆ นี้; เรา ยัง ไม่ เต็ม ใจ ยอม แพ้. ท่าของคุณได้ปล่อยให้เราไม่มีทางเลือก : นี้หมายถึงสงคราม"
 situation.180.A:0 "$situation.185.B$"
 situation.185.desc:0 "การปรากฏตัวของท่าน ให้สติปัญญาแก่เรา เราได้เลี้ยงดูคนที่หายไปของคุณ เพื่อเรียนรู้วิธีการคิดใหม่ๆ วิธีการใหม่ๆ เรายังไม่รู้ว่าสภาวะนี้เป็นยังไง - ความหมาย มันเป็นความปรารถนาของเราที่จะเลื่อนตัวเองไปยังมุมของดาวเคราะห์ของเรา ที่เราสามารถมีฟรี\n\nถ้า คุณ ไม่ ยอม ให้ เรา ทํา เช่น นี้ ก็ ขอ ให้ เตือน ว่า เรา ยัง ไม่ เต็ม ใจ เลิก การ ดํารง อยู่ ใหม่ ของ เรา. เราจะป้องกันตัวเอง ถ้าจําเป็น"
 situation.185.A:0 "เราสามารถสํารองที่ดินบาง"
 situation.185.B:0 "นี่จะเป็นสงคราม"
 situation.185.B.tooltip:0 "§Rเราต้องต่อสู้เพื่อควบคุมดาวเคราะห์§!"

 d_living_snow_reserve:0 "เขต สงวน หิมะ ที่ มี ชีวิต"
 d_living_snow_reserve_desc:0 "สงวน ที่ ซึ่ง หิมะ ที่ มี ชีวิต จะ อาศัย อยู่ ได้ อย่าง สงบ และ สํารวจ สภาพ ใหม่ ของ มัน. และ เมื่อ เป็น อย่าง นั้น เรา จะ เห็น ปฏิกิริยา ทาง เคมี ที่ ไม่ เหมือน ใคร ซึ่ง มัน สามารถ ผลิต ได้."

 situation.190.name:0 "โคนี สูญเสีย!"
 situation.190.desc:0 "เราสูญเสียการควบคุม[FromFrom.GetName]ที่ถูกฉกฉวยไป§Yหิมะ ที่ มี ชีวิต§!มีการเปลี่ยนแปลงที่สําคัญเกิดขึ้น[FromFrom.GetPlanetMoon]ระบบนิเวศ ของเรา[This.GetResearchers]ขอเตือนไว้ก่อน ยกเว้นว่าเราจะยึด[FromFrom.GetPlanetMoon]การแต่งหน้าจะมีการเปลี่ยนแปลงในไม่ช้า เกินความสามารถของเราที่จะอาศัยอยู่ในมัน"
 situation.190.tooltip:0 "§Rเราควรยึดดาวคืน ก่อนที่มันจะสายเกินไป§!"
 situation.195.name:0 "น้ํา แข็ง ที่ ไม่ รู้ หมด"
 situation.195.desc:1 "กับ หิมะ ที่ มี ชีวิต[Root.GetName].[Root.GetPlanetMoon]ได้มีความเย็นตลอดเวลา สภาพบรรยากาศที่เปลี่ยนแปลง ในอัตราที่เพิ่มขึ้นอย่างต่อเนื่อง ตอนนี้ โลกไม่สามารถพิจารณาได้อีกต่อไป มันไม่ชัดเจนว่าเราจะเคยจะสามารถ นํามันกลับไปสภาพเดิม แต่ของเรา[saved_owner.GetResearchers]ให้ เรา มั่น ใจ ว่า ความ สนใจ ส่วน ใหญ่ จะ ได้ รับ การ เรียน รู้ โดย การ สังเกต อาการ ของ หิมะ ขณะ ที่ มัน ค้น พบ สถานะ ใหม่ ของ การ เป็น อยู่ และ ปฏิกิริยา ทาง เคมี ที่ ไม่ เหมือน ใคร ซึ่ง ทํา ให้ เกิด การ เปลี่ยน แปลง เช่น นั้น[Root.GetName]."
