l_english:

 LIMBO_2_PROJECT:0 "ลิมโบ้:โอกาสครั้งที่สอง"
 LIMBO_2_PROJECT_DESC:0 "เราสามารถมอบโอกาสครั้งที่สองให้สิ่งมีชีวิตต่างดาวโบราณที่สูญพันธุ์ไปแล้วได้ โดยอัปโหลดสแกนระบบประสาทของพวกมันลงสู่ร่างจักรกล"

 GHOST_SHIP_PROJECT:0 "ศึกษายาน'เรือผี'"
 GHOST_SHIP_PROJECT_DESC: "ยานวิทยาศาสตร์ที่ถูกทอดทิ้งลำหนึ่งติดอยู่ในภารกิจลาดตระเวนที่ยาวนานหลายศตวรรษในระบบ $NAME_Hillos$ อะไรคือหัวใจของการเดินทางอันโดดเดี่ยวครั้งนี้?"

 GHOST_SHIP_PROJECT_02: "ตอบกลับลูกน้อยของ $NAME_Hillos_ship$"
 GHOST_SHIP_PROJECT_02_DESC: "เสียงสื่อสารพลังจิตที่ตรวจพบในระบบ $NAME_Hillos$ ดูเหมือนจะเป็นของจิตสำนึกประดิษฐ์ที่ติดอยู่บน'เรือผี'$NAME_Hillos_ship$"

 ANCIENT_MANUFACTORIUM_PROJECT:0 "จ่ายพลังงานให้โรงหล่อ"
 ANCIENT_MANUFACTORIUM_PROJECT_DESC:0 "หลังจากการเตรียมการทั้งหมดที่เราได้ทำไป ตอนนี้ก็ถึงเวลาทำให้เครื่องจักรทั้งหมดนี้กลับมาเดินเครื่อง และเชื่อมสถานที่แห่งนี้เข้ากับโครงข่ายพลังงานของดาวเคราะห์!"

 STRATOVENTS_PROJECT: "โครงการช่องระบายสตราโตสเฟียร์"
 STRATOVENTS_PROJECT_DESC: "ศึกษาการก่อตัวของช่องระบายสตราโตสเฟียร์อันเป็นเอกลักษณ์บน §Y[planet.GetName]§! และความสำคัญของมันต่อขอบเขตพื้นที่"
