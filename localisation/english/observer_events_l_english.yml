l_english:
 observer.15.name:0 "การกลับมาของมหาข่าน"
 observer.15.desc:0 "หลังจากพ่ายแพ้ในการรบ มหาข่านได้ระดมกองยานขึ้นมาอีกครั้ง และกำลังหวนคืนสู่แนวหน้าในขณะนี้"
 observer.24.name:0 "ทหารรับจ้าง [marauder_mercenary_country.GetSpeciesName]"
 observer.24.desc:0 "ขณะนี้สามารถจ้างทหารรับจ้าง [marauder_mercenary_country.GetSpeciesName] ได้แล้ว"
 observer.56.desc:0 "นักโบราณคดีจาก §H[From.GetName]§! สามารถอนุมานที่ตั้งลับของระบบบ้านเกิด §HVultaum§! ได้สำเร็จ!"
 observer.57.desc:0 "นักโบราณคดีจาก §H[From.GetName]§! สามารถอนุมานที่ตั้งลับของระบบบ้านเกิด §Hยี้§! ได้สำเร็จ!"
 observer.58.desc:0 "นักโบราณคดีจาก §H[From.GetName]§! สามารถอนุมานที่ตั้งลับของระบบบ้านเกิด §Hลีกแรก§! ได้สำเร็จ!"
 observer.59.desc:0 "นักโบราณคดีจาก §H[From.GetName]§! สามารถอนุมานที่ตั้งลับของระบบบ้านเกิด §Hอิหร่าน§! ได้สำเร็จ!"
 observer.60.desc:0 "นักโบราณคดีจาก §H[From.GetName]§! สามารถอนุมานที่ตั้งลับของระบบบ้านเกิด §Hไซเบรกซ์§! ได้สำเร็จ!"
 observer.61.desc:0 "§H[From.GetName]§! ได้รวบรวมข้อมูลเชิงลึกทั้งหมดที่จำเป็นต่อการปลดล็อก §Hเครือข่ายช่อง L§! แล้ว! เมื่อพวกเขาวิจัยเทคโนโลยีช่อง L และทำโปรเจกต์พิเศษเพื่อเปิดช่อง L ภายในพรมแดนของตนเสร็จ พวกเขาจะสามารถเข้าถึงแบบแอล...คลูสเตอร์ได้"
 observer.63.desc:0 "§H[From.GetName]§! สามารถฟื้นฟูการเข้าถึงแบบแอล...คลูสเตอร์ได้แล้ว! สิ่งมีชีวิตขนาดยักษ์ที่เรียกว่า §H$nanite_space_dragon_baby_plural$§! กำลังโผล่ออกมาจากช่อง L ทุกแห่งที่มีอยู่ แม้ในตอนนี้พวกมันจะยังไม่ดูเป็นศัตรูก็ตาม"
 observer.66.name:0 "ข้อ ตก ลง ของ เด ซัน ซู"
 observer.66.desc:0 "§H[From.GetName]§! ปลดล็อกแบบแอล...คลูสเตอร์ได้สำเร็จ เพียงเพื่อจะพบว่ามันมีอารยธรรมล้ำหน้าที่รู้จักกันในชื่อ §Hข้อ ตก ลง ของ เด ซัน ซู§! อาศัยอยู่ก่อนแล้ว!"
 observer.68.desc:1 "เหล่าคนโง่เขลาสะเพร่าจาก §H[From.GetName]§! ได้เข้าไปยุ่งกับพลังที่เกินกว่าความเข้าใจของตน ปลดปล่อยผู้อวตารที่ถูกตัดสิทธิ์อันทรงพลังและเปี่ยมด้วยความพยาบาทออกมาในระบบ §H[shroud_spawn_system.GetName]§!!"
 observer.70.name:0 "สัญญาณขอบฟ้า"
 observer.70.desc:0 "นักวิทยาศาสตร์จาก §H[From.Owner.GetName]§! ตรวจจับสัญญาณลึกลับที่ดูเหมือนจะแผ่ออกมาจากศูนย์กลางของหลุมดำ..."
 observer.71.name:0 "เดอะเวิร์ม"
 observer.71.desc:0 "หนอนผู้รอคอยได้สร้างระบบบ้านเกิดของ §H[From.Owner.GetName]§! ขึ้นใหม่ให้กลายเป็นบางสิ่งที่... แตกต่าง"
 observer.72.desc:0 "หนอนผู้รอคอยได้ปรากฏตัวขึ้นในระบบบ้านเกิดของ §H[From.Owner.GetName]§! การต่อสู้ได้เริ่มต้นขึ้นแล้ว..."
