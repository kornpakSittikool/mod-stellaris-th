l_english:

 ### Unrest

 situation_planetary_revolt:0 "การก่อกบฏบนดาว [Target.GetName]"
 situation_planetary_revolt_type:0 "การก่อกบฏบนดาว"
 situation_planetary_revolt_desc_standard:0 "การก่อกบฏของประชาชนกำลังพยายามล้มล้างการปกครองของเราใน [Target.GetName]!"
 situation_planetary_revolt_desc_slave:0 "เหล่าทาสหัวแข็งกำลังพยายามโค่นล้มการปกครองของเราบน [Target.GetName]!"
 situation_planetary_revolt_desc_gestalt_standard:0 "สิ่งมีชีวิตเอกเทศที่กระสับกระส่ายกำลังพยายามแยกตนเองออกจาก [Owner.GetGovernmentName] ของเรา"
 situation_planetary_revolt_desc_gestalt_breakaway_gestalt:0 "องค์ประกอบที่ไม่สอดประสานและแปรพักตร์บน [Target.GetName] กำลังพยายามแย่งชิงโลกนี้ไปจากเงื้อมมือของเรา"
 situation_planetary_revolt_desc_gestalt_breakaway_wilderness: "กลุ่มซิมไบออนต์ที่แตกร้าวกลุ่มหนึ่งกำลังแสวงหาอิสรภาพจาก [owner.GetGovernmentName] ของเรา"
 situation_planetary_revolt_monthly_change_tooltip:1 "ยิ่ง §Y[Target.GetName]§! มี §Yความไม่สงบ§! มากเท่าใด และ [Target.GetPlanetMoon] นี้มีประชากรมากเท่าใด §Yสถานการณ์§! นี้ก็จะคืบหน้าเร็วขึ้นเท่านั้น เมื่อสถานการณ์เข้าสู่ระยะลุกลาม อาณานิคมและจักรวรรดิอื่นอาจประกาศสนับสนุนการกบฏ ทำให้หยุดยั้งได้ยากขึ้น\n\nเราสามารถชะลอความคืบหน้าได้ด้วยการเพิ่ม $r_stability$ ลด £job_unemployment£ §Yการว่างงาน§! วางกองกำลัง £defense_army£ §Yกองทัพ§! ประจำดาวเคราะห์ หรือเสริมความแข็งแกร่งให้ §Yฐานดวงดาว§! ของระบบ\n\nการ §Yโยกย้าย§! £pop£ §Hป๊อป§! ออกจาก [Target.GetName] จะเร่งความคืบหน้าของการกบฏ"
 situation_planetary_revolt_complete_tooltip:0 "§Y[Target.GetName]§! จะประกาศอิสรภาพจาก §Y[Owner.GetName]§!"
 situation_planetary_revolt_complete_joiner_tooltip:0 "§Y[Target.GetName]§! จะทำการกบฏและเข้าร่วม §Y[new_owner_empire.GetName]§!"
 situation_planetary_revolt_fail_tooltip:0 "§Y[This.GetName]§! จะล้มเหลวและโทษทั้งหมดที่เกี่ยวข้องจะถูกลบออก"
