 unrest.55.name:0 "การกบฏเริ่มก่อตัวขึ้นที่ [Root.GetName]"
 unrest.55.desc.standard:1 "ประชาชนบน [Root.GetName] ไม่พอใจกับการปกครองของเรามาระยะหนึ่งแล้ว บัดนี้การขัดขืนของพวกเขากล้าหาญเปิดเผยยิ่งขึ้น และพวกผู้เห็นต่างก็ออกมาเรียกร้องเอกราชจาก [Root.Owner.GetName] อย่างเปิดเผย หากเราต้องการควบคุมอาณานิคมนี้ต่อไป อาจจำเป็นต้องแสดงอำนาจให้เห็น"
 unrest.55.desc.slave:1 "การนัดพบลับของทาสยามค่ำคืน ระดับการขัดขืนต่อผู้บังคับบัญชาที่สูงขึ้น และทรัพย์สินที่หายไป บอกได้เพียงอย่างเดียวเท่านั้น เหล่าทาสบน [Root.GetName] กำลังถูกทำให้หัวรุนแรง แพร่กระจายความไม่พอใจและความแตกแยกในหมู่พวกเดียวกัน รวมถึงสร้างความหวาดกลัวให้ประชากรส่วนที่เหลือ ถึงขั้นเริ่มมีเสียงกระซิบถึงอิสรภาพ ถึงการเป็นอิสระจาก [Root.Owner.GetName] หากเราต้องการควบคุมอาณานิคมนี้ต่อไป อาจจำเป็นต้องแสดงอำนาจให้เห็น"
 unrest.55.desc.gestalt_standard:0 "ประชากรเอกเทศบน [Root.GetName] ปฏิเสธที่จะยอมรับการควบคุมของ [Owner.GetGovernmentName] ของเรา บัดนี้การขัดขืนของพวกมันยิ่งเปิดเผยอาจหาญขึ้น และพวกผู้เห็นต่างก็กำลังจัดตั้งขบวนการเพื่อมุ่งสู่อิสรภาพอย่างเปิดเผย หากเราต้องการควบคุมอาณานิคมนี้ต่อไป อาจจำเป็นต้องแสดงอำนาจให้เห็น"
 unrest.55.desc.gestalt_breakaway_gestalt:0 "องค์ประกอบนอกลู่นอกทางบน [Root.GetName] กำลังยากขึ้นเรื่อยๆ ที่ [Owner.GetGovernmentName] ของเราจะควบคุมได้ เว้นแต่เราจะดับความคิดอิสระของพวกมันและสถาปนาการควบคุมกลับคืนมา เราอาจรักษาอำนาจเหนืออาณานิคมนี้ไว้ได้ยาก"
 unrest.55.A:0 "พวกมันต้องถูกจัดการ"

