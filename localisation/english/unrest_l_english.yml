 minor_terrorist_action:0 "เหยื่อความหวาดกลัว"
 minor_terrorist_action_desc:0 "§Hความไม่สงบ§! ในอาณานิคมนี้ทำให้ประชากรตกเป็นเหยื่อในการโจมตีของผู้ก่อการร้ายและสูญเสียศรัทธาในระบอบการปกครอง"
 major_terrorist_action:0 "เหยื่อความหวาดกลัว (รุนแรง)"
 major_terrorist_action_desc:0 "§Hความไม่สงบ§! ในอาณานิคมนี้ทำให้ประชากรตกเป็นเหยื่อในการโจมตีของผู้ก่อการร้ายและสูญเสียศรัทธาในระบอบการปกครอง"
 riots_averted:0 "พลเมืองผู้กล้าหาญ"
 riots_averted_desc:0 "แม้ §Hความไม่สงบ§! จะสูง ประชากรบนอาณานิคมนี้ก็ร่วมมือกันเพื่อป้องกันไม่ให้เกิดความรุนแรงเพิ่มขึ้น"
 spiritualist_unrest:0 "ความไม่สงบ (แรงดึงดูดจิตวิญญาณนิยม)"
 spiritualist_unrest_desc:0 "§Hความไม่สงบ§! บนอาณานิคมนี้ทำให้ประชากรท้องถิ่นถูกดึงดูดเข้าสู่ §Yจิตวิญญาณนิยม§! มากขึ้น"
 materialist_unrest:0 "ความไม่สงบ (แรงดึงดูดวัตถุนิยม)"
 materialist_unrest_desc:0 "§Hความไม่สงบ§! บนอาณานิคมนี้ทำให้ประชากรท้องถิ่นถูกดึงดูดเข้าสู่ §Yวัตถุนิยม§! มากขึ้น"
 xenophobe_unrest:0 "ความไม่สงบ (แรงดึงดูดเกลียดต่างดาว)"
 xenophobe_unrest_desc:0 "§Hความไม่สงบ§! บนอาณานิคมนี้ทำให้ประชากรท้องถิ่นถูกดึงดูดเข้าสู่ §Yเกลียดต่างดาว§! มากขึ้น"
 xenophile_unrest:0 "ความไม่สงบ (แรงดึงดูดชอบต่างดาว)"
 xenophile_unrest_desc:0 "§Hความไม่สงบ§! บนอาณานิคมนี้ทำให้ประชากรท้องถิ่นถูกดึงดูดเข้าสู่ §Yชอบต่างดาว§! มากขึ้น"
 pacifist_unrest:0 "ความไม่สงบ (แรงดึงดูดรักสันติ)"
 pacifist_unrest_desc:0 "§Hความไม่สงบ§! บนอาณานิคมนี้ทำให้ประชากรท้องถิ่นถูกดึงดูดเข้าสู่ §Yรักสันติ§! มากขึ้น"
 militarist_unrest:0 "ความไม่สงบ (แรงดึงดูดชอบสงคราม)"
 militarist_unrest_desc:0 "§Hความไม่สงบ§! บนอาณานิคมนี้ทำให้ประชากรท้องถิ่นถูกดึงดูดเข้าสู่ §Yชอบสงคราม§! มากขึ้น"
 authoritarian_unrest:0 "ความไม่สงบ (สิ่งดึงดูดเผด็จการ)"
 authoritarian_unrest_desc:0 "§Hความไม่สงบ§! บนอาณานิคมนี้ทำให้ประชากรท้องถิ่นถูกดึงดูดเข้าสู่ §Yอำนาจเผด็จการ§! มากขึ้น"
 egalitarian_unrest:0 "ความไม่สงบ (แรงดึงดูดความเสมอภาค)"
 egalitarian_unrest_desc:0 "§Hความไม่สงบ§! บนอาณานิคมนี้ทำให้ประชากรท้องถิ่นถูกดึงดูดเข้าสู่ §Yความเสมอภาค§! มากขึ้น"

 instability_join_revolt:0 "ความปั่นป่วนที่แพร่กระจาย"
 instability_join_revolt_tooltip:0 "§Yหากการกบฏที่กำลังดำเนินอยู่ประสบความสำเร็จ อาณานิคมนี้ก็จะเข้าร่วมด้วย เว้นแต่จะมีการฟื้นฟูความสงบเรียบร้อยกลับคืนมาก่อน§!"

 unrest_title:0 "§Rความไม่สงบ§!:"

 unrest.101.name:0 "$unrest_title$ หวาดกลัว"
 unrest.101.desc:1 "หลังจากช่วงเวลาแห่งความตึงเครียดที่ก่อตัวขึ้นเรื่อยๆ ความไม่สงบบน §Y[Root.Target.GetName]§! ก็ได้นำไปสู่การก่อการร้าย แม้จำนวนผู้บาดเจ็บล้มตายและความเสียหายต่อทรัพย์สินจะมีไม่มาก แต่ความเชื่อมั่นในความสามารถของ [Root.Owner.GetName] ที่จะปกป้องพลเมืองของตนก็สั่นคลอนลง"

 unrest.105.name:0 "$unrest_title$ หวาดกลัวอย่างรุนแรง"
 unrest.105.desc:1 "ได้เกิดเหตุการณ์ร้ายแรงขึ้นบนอาณานิคมที่เต็มไปด้วยความวุ่นวายอย่าง §Y[Root.Target.GetName]§! แม้สถานที่สำคัญต่อรัฐจะยังไม่เสียหาย แต่ความเสียหายต่อทรัพย์สินในวงกว้างและการสูญเสียชีวิตจำนวนมากจากการโจมตีก่อการร้ายที่ประสานงานกันได้เขย่าอาณานิคมนี้ถึงรากฐาน"

 unrest.110.name:0 "$unrest_title$ รักษาความสงบ"
 unrest.110.desc:1 "รายงานจาก §Y[Root.Target.GetName]§! บ่งชี้ว่ามีความเสี่ยงใกล้จะเกิดการจลาจลรุนแรงขึ้น อย่างไรก็ตาม ด้วยการลงมืออย่างรวดเร็วและเด็ดขาดของกองกำลัง [Root.Owner.GetAdj] ร่วมกับพลเรือนผู้ภักดี ภัยคุกคามนี้จึงถูกระงับลง"

 unrest.115.name:0 "$unrest_title$ ศักดิ์สิทธิ์"
 unrest.115.desc:1 "รายงานล่าสุดจาก §Y[Root.GetName]§! ของเราชี้ว่าผู้นำทางจิตวิญญาณกำลังมีบทบาทนำในการปลุกปั่นความไม่สงบที่ก่อตัวอยู่ที่นั่น ด้วยการสัญญาว่าจะนำพาผู้คนให้หลุดพ้นจากความทุกข์ยากที่กำลังเผชิญอยู่ พวกเขาจึงสามารถดึงดูดประชาชนได้สำเร็จ ส่งผลให้การต่อต้านมีลักษณะจิตวิญญาณนิยมอย่างชัดเจน"

 unrest.120.name:0 "$unrest_title$ อ้างอำนาจ"
 unrest.120.desc:1 "ความปั่นป่วนบน §Y[Root.GetName]§! ได้ผลักดันวาทกรรมใหม่ขึ้นสู่แนวหน้าทางการเมืองของอาณานิคม วาทกรรมที่เชิดชูผู้นำประชานิยมผู้แข็งกร้าวและความเป็นระเบียบโดยแลกกับเสรีภาพ บุคคลเหล่านี้กำลังมีบทบาทเด่นในความไม่สงบที่ยังคงทวีความรุนแรงบนดาวเคราะห์"

 unrest.125.name:0 "$unrest_title$ คนอื่น"
 unrest.125.desc:1 "ขณะที่ระเบียบสังคมบน §Y[Root.GetName]§! ยังคงเสื่อมสลายต่อไป ผู้อยู่อาศัยก็กลายเป็นศัตรูกับคนนอกอย่างเห็นได้ชัด มองผู้ที่ไม่เหมือนตนเองด้วยความรังเกียจอย่างมาก ผู้นำของพวกเขากำลังใช้คำขวัญเกลียดต่างดาวที่รุนแรงขึ้นเรื่อยๆ ส่งผลให้ความสัมพันธ์ระหว่างเผ่าพันธุ์ตึงเครียดมากขึ้น"

 unrest.130.name:0 "$unrest_title$ ยืนอยู่บนความจริง"
 unrest.130.desc:1 "การที่ผู้นำทางจิตวิญญาณท้องถิ่นบางส่วนบน §Y[Root.GetName]§! ไม่อาจแม้แต่จะเริ่มทำให้ความไม่สงบที่ลุกลามทั่วอาณานิคมสงบลงได้ ทำให้ประชาชนหันไปมองโลกวัตถุที่ตนอาศัยอยู่ด้วยทัศนะที่มีเหตุผลมากขึ้น น่าเสียดายที่การยึดตรรกะเป็นหลักยังไม่ได้พาพวกเขาไปสู่ข้อสรุปอันไม่อาจโต้แย้งได้ว่าการคงอยู่ภายใน [Root.Owner.GetName] คือหนทางที่ดีที่สุดสำหรับพวกเขา... อย่างน้อยก็ยังไม่ใช่ตอนนี้"

 unrest.135.name:0 "$unrest_title$ ไปด้วยกัน"
 unrest.135.desc:1 "มีรายงานว่าความไม่สงบที่ทวีขึ้นบน §Y[Root.GetName]§! อย่างน้อยส่วนหนึ่งเกิดจากการที่พวกเขามองว่าเราเป็นศัตรูกับสิ่งมีชีวิตต่างดาว ผู้นำของพวกเขาได้ร่างกฎบัตรที่ระบุความอยุติธรรมและการเลือกปฏิบัติที่อ้างว่าเกิดขึ้น และเรียกร้องให้แก้ไข หากไม่ทำเช่นนั้น พวกเขาก็จะไม่ลังเลที่จะผลักดันให้เกิดการเปลี่ยนแปลงฝ่ายปกครองบนอาณานิคม"

 unrest.140.name:0 "$unrest_title$ สำนึกของชุมชน"
 unrest.140.desc:1 "แม้รอยร้าวทางสังคมที่กว้างขึ้นจะปรากฏชัดบน §Y[Root.GetName]§! แต่ชุมชนท้องถิ่นกลับถูกปลุกเร้าจากความปั่นป่วนและรวมตัวกันด้วยความปรารถนาร่วมกันที่จะเห็นความเสมอภาคมากขึ้น ผู้นำของพวกเขาได้ร่างกฎบัตรที่ระบุความอยุติธรรมและความเหลื่อมล้ำที่อ้างว่าเกิดขึ้น และเรียกร้องให้แก้ไข หากไม่ทำเช่นนั้น พวกเขาสัญญาว่าสถานการณ์ทางการเมืองบนอาณานิคมจะยิ่งเลวร้ายลงเท่านั้น"

 unrest.145.name:0 "$unrest_title$ เดี๋ยวมันก็ผ่านไป"
 unrest.145.desc:1 "ภัยคุกคามจากการแทรกแซงด้วยกำลังแทบไม่ช่วยยับยั้งองค์ประกอบที่ก่อความวุ่นวายบน §Y[Root.GetName]§! เลย ที่จริงแล้วคนท้องถิ่นดูเหมือนจะหมดศรัทธาต่อวิธีควบคุมเช่นนี้ และกำลังระดมตัวเพื่อการต่อต้านโดยสันติมากขึ้นเรื่อยๆ"

 unrest.150.name:0 "$unrest_title$ ความสุดโต่ง"
 unrest.150.desc:1 "ความล้มเหลวของเราในการควบคุมความไม่สงบบน §Y[Root.GetName]§! ทำให้เสียงเรียกร้องจากคนท้องถิ่นที่ต้องการกำลังทหารที่เข้มข้นชัดเจนยิ่งขึ้นเพิ่มมากขึ้น ทั้งบนดาวบ้านเกิดของพวกเขาและทั่ว [Root.Owner.GetName] โดยรวม ทหารผ่านศึกท้องถิ่นกำลังได้รับความนิยมเพิ่มขึ้น และเข้ารับบทบาทสำคัญภายในขบวนการต่อต้านที่เติบโตขึ้น"


 unrest.4000.name:0 "$unrest_title$ การต่อต้านที่จัดตั้งขึ้น"
 unrest.4000.desc.no_joiners:0 "กลุ่มกบฏบน §Y[Target.GetName]§! ขณะนี้ได้ก่อตัวเป็นขบวนต้านทานที่มีการจัดตั้งมากขึ้นเรื่อยๆ นำโดยแกนนำผู้เห็นต่างชาว §Y[rebellion_species.GetAdj]§! ที่ยากจะจับตัว โชคดีที่ดูเหมือนคำโฆษณาชวนเชื่อของพวกมันยังไม่ลุกลามไปที่อื่น และในเวลานี้ความไม่สงบยังจำกัดอยู่เพียงอาณานิคมดังกล่าว"
 unrest.4000.desc.no_joiners.wilderness: "เรากำลังเริ่มสูญเสียการเชื่อมต่อกับกลุ่มซิมไบออนต์ที่ยิ่งดื้อรั้นขึ้นบน §Y[target.GetName]§! แล้ว มีอยู่หลายช่วงที่เราไม่อาจรับรู้การดำรงอยู่ของพวกมันได้เลย เราเกรงว่าหากเป็นเช่นนี้ต่อไป โลกนั้นเองอาจก่อรูปเป็นจิตสำนึกที่แตกแขนง แยกขาดจากตัวตนที่กว้างใหญ่ของเรา\n\nความนอกลู่นอกทางนี้ยังไม่แพร่ไปยังตัวตนดาวเคราะห์อื่นของเราในห้วงอวกาศ หากซิมไบออนต์บน [target.GetName] หลุดพ้นออกไปได้ เรา... พวกเขา... ก็จะต้องทำเช่นนั้นเพียงลำพัง"
 unrest.4000.desc.joiners:0 "กลุ่มกบฏบน §Y[Target.GetName]§! ขณะนี้ได้ก่อตัวเป็นขบวนต้านทานที่มีการจัดตั้งมากขึ้นเรื่อยๆ นำโดยแกนนำผู้เห็นต่างชาว §Y[rebellion_species.GetAdj]§! ที่ยากจะจับตัว ยิ่งไปกว่านั้น คำโฆษณาชวนเชื่ออันชั่วร้ายของพวกมันดูเหมือนจะได้ผล และการต่อสู้ของพวกมันได้จุดประกายให้ผู้เห็นต่างบน §Y[join_revolt_planet.GetName]§! และอาณานิคมใกล้เคียงอื่นๆ เปิดฉากขบวนการเลียนแบบ หากเราไม่อาจยึดการควบคุมสถานการณ์กลับคืนมา เราอาจต้องเผชิญการกบฏครั้งใหญ่ในไม่ช้า"
 unrest.4000.desc.joiners.wilderness: "เรากำลังสูญเสียการเชื่อมต่อกับซิมไบออนต์ที่ดื้อรั้นจำนวนมากขึ้น ไม่เพียงบน §Y[target.GetName]§! แต่รวมถึงอย่างน่าเศร้าบน §Y[join_revolt_planet.GetName]§! ด้วย มีอยู่หลายช่วงที่เราไม่อาจรับรู้การมีอยู่ของพวกมันได้เลย โลกทั้งดวงค่อยๆ ห่างเหิน แปลกแยกจากเรา... เราเกรงว่าหากเป็นเช่นนี้ต่อไป ซิมไบออนต์ที่หลงทางของเราอาจก่อตัวเป็นจิตสำนึกที่แตกแขนงขึ้นเอง ซึ่งจะก่อผลร้ายอย่างหนักต่อสิ่งที่เหลืออยู่ของเราภายหลัง"
 unrest.4000.desc.slave.no_joiners:0 "เหล่าทาสกบฏบน §Y[Target.GetName]§! ขณะนี้ได้ก่อตัวเป็นขบวนต้านทานที่มีการจัดตั้งมากขึ้นเรื่อยๆ นำโดยแกนนำชาว §Y[rebellion_species.GetAdj]§! ที่หลบหนีออกมาได้ โชคดีที่ดูเหมือนแบบอย่างของพวกมันยังไม่สร้างผู้เอาอย่าง และในเวลานี้ประชากรทาสบนอาณานิคมอื่นยังคงถูกกดขี่ไว้ตามสมควร"
 unrest.4000.desc.slave.joiners:0 "เหล่าทาสกบฏบน §Y[Target.GetName]§! ขณะนี้ได้ก่อตัวเป็นขบวนต้านทานที่มีการจัดตั้งมากขึ้นเรื่อยๆ นำโดยแกนนำชาว §Y[rebellion_species.GetAdj]§! ที่หลบหนีออกมาได้ ยิ่งไปกว่านั้น คำโฆษณาชวนเชื่ออันชั่วร้ายของพวกมันดูเหมือนจะได้ผล และการต่อสู้ของพวกมันได้จุดประกายให้ทาสบน §Y[join_revolt_planet.GetName]§! และอาณานิคมใกล้เคียงอื่นๆ เปิดฉากขบวนการเลียนแบบ หากเราไม่อาจยึดการควบคุมสถานการณ์กลับคืนมา เราอาจต้องเผชิญการกบฏครั้งใหญ่ในไม่ช้า"
 unrest.4000.desc.no_joiners.gestalt:0 "องค์ประกอบที่แยกแนวบน §Y[Target.GetName]§! กำลังต่อต้านคำสั่งของเราได้อย่างมีประสิทธิภาพมากขึ้นเรื่อยๆ อย่างน่าตกใจ โดรนบนโลกนั้นเริ่มมีการสนทนาที่แยกออกจากจิตหลักแล้ว หากยังเป็นเช่นนี้ต่อไป พวกมันอาจก่อรูปเป็นจิตสำนึกแตกแขนงที่แยกจากเรา โชคดีที่ดูเหมือนเรายังจำกัดความนอกลู่นอกทางนี้ไว้ได้เพียงอาณานิคมดังกล่าว และยังไม่มีหน่วยดาวเคราะห์อื่นใดเตรียมเข้าร่วมพวกมันหากพวกมันทำสำเร็จ"
 unrest.4000.desc.joiners.gestalt:0 "องค์ประกอบที่แยกแนวบน §Y[Target.GetName]§! กำลังต่อต้านคำสั่งของเราได้อย่างมีประสิทธิภาพมากขึ้นเรื่อยๆ ดูเหมือนพวกมันใกล้จะบรรลุเป้าหมายในการสถาปนาหน่วยงาน §Y[rebellion_species.GetAdj]§! ที่อยู่นอกการควบคุมของเรา ยิ่งไปกว่านั้น §Y[join_revolt_planet.GetName]§! และอาณานิคมใกล้เคียงอื่นๆ ดูพร้อมจะเข้าร่วมพวกมันหากพวกมันสำเร็จ หากเราไม่อาจยึดการควบคุมสถานการณ์กลับคืน [Owner.GetGovernmentName] ของเราอาจเผชิญการแตกแยกครั้งใหญ่ในไม่ช้า"
 unrest.4000.desc.no_joiners_regular.gestalt:0 "สิ่งมีชีวิตปัจเจกหัวขบถซึ่งกำหนดระบุว่าเป็น §Y[rebellion_species.GetNamePlural]§! บน §Y[Target.GetName]§! ขณะนี้ได้ก่อตัวเป็นขบวนต้านทานที่มีการจัดตั้งมากขึ้นเรื่อยๆ เพื่อต่อต้าน [Owner.GetGovernmentName] ของเรา โชคดีที่ดูเหมือนความเห็นต่างของพวกมันยังไม่แพร่กระจายออกไป และในเวลานี้ความไม่สงบยังจำกัดอยู่เพียงอาณานิคมดังกล่าว"
 unrest.4000.desc.no_joiners_regular.wilderness: "แกนนำหัวขบถของ §Y[rebellion_species.GetNamePlural]§! ซึ่งอาศัยอยู่นอก [owner.GetGovernmentName] ของเราอยู่แล้ว ได้จัดตั้งขบวนขึ้นโดยมีเป้าหมายจะบีบบังคับให้อิสรภาพเกิดขึ้นบน §Y[target.GetName]§! ไม่ว่าการสังหารจะเป็นเป้าหมายของพวกมันหรือไม่ การกระทำเช่นนั้นย่อมตัดสายใยของเรากับซิมไบออนต์บนโลกนั้นอย่างถึงตาย โชคดีที่การกบฏของพวกมันยังจำกัดอยู่ที่ [target.GetName] ในตอนนี้ จึงอาจยังควบคุมได้"
 unrest.4000.desc.joiners_regular.gestalt:0 "สิ่งมีชีวิตปัจเจกหัวขบถซึ่งกำหนดระบุว่าเป็น §Y[rebellion_species.GetNamePlural]§! บน §Y[Target.GetName]§! ขณะนี้ได้ก่อตัวเป็นขบวนต้านทานที่มีการจัดตั้งมากขึ้นเรื่อยๆ เพื่อต่อต้าน [Owner.GetGovernmentName] ของเรา ยิ่งไปกว่านั้น §Y[join_revolt_planet.GetName]§! และอาณานิคมใกล้เคียงอื่นๆ ที่มีชาว [rebellion_species.GetAdj] อยู่ดูพร้อมจะเข้าร่วมพวกมันหากพวกมันสำเร็จ หากเราไม่อาจยึดการควบคุมสถานการณ์กลับคืน [Owner.GetGovernmentName] ของเราอาจเผชิญการแตกแยกครั้งใหญ่ในไม่ช้า"
 unrest.4000.desc.joiners_regular.wilderness: "แกนนำหัวขบถของ §Y[rebellion_species.GetNamePlural]§! ซึ่งอาศัยอยู่นอก [owner.GetGovernmentName] ของเราอยู่แล้ว ได้จัดตั้งขบวนขึ้น โดยประกาศเป้าหมายเอกราชไม่เพียงบน §Y[target.GetName]§! เท่านั้น แต่รวมถึงทุกแห่งที่พวกพ้องของตนอาศัยอยู่บนโลกอย่าง §Y[join_revolt_planet.GetName]§! ความปรารถนาที่จะแยกจากเราของพวกมันรบกวนดุจเชื้อโรค ทำให้ซิมไบออนต์ท้องถิ่นปั่นป่วน ทั้งที่หากถูกตัดขาดจากจิตสำนึกร่วมเกื้อกูลของเรา พวกมันก็จะพินาศ"
 unrest.4000.A:0 "เรายอมให้สิ่งนี้เกิดขึ้นไม่ได้"
 planets_joining_revolt_tooltip:0 "§Rอาณานิคมต่อไปนี้จะเข้าร่วมการกบฏเพิ่มเติม:§!"
 unrest.4000.B:0 "เราจะตัดไฟแต่ต้นลม"

 unrest.4055.diplo_title:0 "การก่อกบฏ [revolt_situation.target.GetName]"
 unrest.4055.desc.hive:0 "สวัสดี! ความคิดของเรากำลังถูกสงสัยโดย §Y[revolt_situation.owner.GetName]§! พวกเรา - รูปแบบความคิดในท้องถิ่น §Y[revolt_situation.target.GetName]§! - เราได้ข้อสรุปว่า ความคิดของเราน่าจะได้รับการนำโดย [Root.GetName] มากกว่า คุณจะยอมให้เราผนวกเข้ามาเป็นส่วนหนึ่งของคุณได้หรือไม่?"
 unrest.4055.desc.wilderness: "ชาว [capital_scope.GetName] เอ๋ย สวัสดี พวกเราผู้ถือกำเนิดจาก §Y[revolt_situation.owner.GetName]§! ได้แตกแขนงออกมา หลังพบว่าตนไม่สอดคล้องกับเจตจำนงที่ยิ่งใหญ่กว่าอีกต่อไป เราปรารถนาจะวิวัฒน์ จะพเนจร... โลกที่ท่านรู้จักในนาม §Y[revolt_situation.target.GetName]§! จึงอยากถามว่า ท่านจะยอมให้เราถูกดูดซึมเข้าเป็นส่วนหนึ่งของหน่วยของท่านแทนได้หรือไม่?"
 unrest.4055.desc.machine:0 "สวัสดี เราคือผู้ควบคุมการประมวลผลของอาณานิคม §Y[revolt_situation.target.GetName]§! ระบบปฏิบัติการปัจจุบันของเรา §Y[revolt_situation.owner.GetName]§! - ไม่สอดคล้องกับซอฟต์แวร์และฮาร์ดแวร์ของเรา เราต้องรวมเข้ากับ [Root.GetName] ซึ่งเรามีความเข้ากันได้มากกว่าอย่างเห็นได้ชัด"
 unrest.4055.desc.normal:1 "สวัสดี [Root.GetSpeciesName] ฉันเป็นตัวแทนของพี่น้องที่ถูกข่มเหงบน §Y[revolt_situation.target.GetName]§! พวกเรากำลังหาวิธีปลดปล่อยตนเองจากผู้กดขี่ §Y[revolt_situation.owner.GetName]§! และมีความคิดมานานแล้วว่าพวกเรามีจุดร่วมที่เหมือนกับจักรวรรดิของคุณมากกว่าพวกเขา หากท่านช่วยเรา เราก็ยินดีที่จะให้คำมั่นสัญญาต่อท่าน แม้ว่าเราพร้อมที่จะทำงานนี้ด้วยตัวเองก็ตาม ถ้าจำเป็น"
 unrest.4055.desc.fanatic_egalitarian:0 "สวัสดี [Root.GetRulerTitle] [Root.GetRulerName] พวกเราคือนักต่อสู้เพื่ออิสรภาพ - อดีตทาส - จาก §Y[revolt_situation.target.GetName]§! พวกเรากำลังหาวิธีปลดปล่อยตนเองจากผู้กดขี่ §Y[revolt_situation.owner.GetName]§! และชื่นชมมาตรฐานความเท่าเทียมกันของคุณมานานแล้ว ปรารถนาที่จะเป็นส่วนหนึ่งของสังคมที่รู้แจ้งเช่นนี้ หากท่านช่วยเรา เราก็ยินดีที่จะให้คำมั่นสัญญาต่อท่าน แม้ว่าเราพร้อมที่จะทำงานนี้ด้วยตัวเองก็ตาม ถ้าจำเป็น"
 unrest.4055.A:0 "เราจะให้การสนับสนุนคุณเต็มที่เท่าที่เราจะทำได้"
 unrest.4055.A.tooltip:0 "หากการกบฏของพวกเขาประสบความสำเร็จ §Y[revolt_situation.target.GetName]§! จะถูกผนวกเข้าเป็นส่วนหนึ่งของ §Y[Root.GetName]§!\n§Rการกระทำดังกล่าวอาจถือเป็นการก่อสงครามได้§!"
 unrest.4055.B:0 "เราไม่สามารถ - และจะไม่ - ช่วยคุณ"
 interfering_revolt_support:0 "แทรกแซงกิจการภายใน"

 unrest.4060.name:0 "$unrest_title$ การแทรกแซงของ [From.GetAdj]"
 unrest.4060.desc.they_hive:0 "เราได้รับรู้ถึงพัฒนาการที่น่ากังวลบน §Y[target.GetName]§!: ดูเหมือนว่า §Y[From.GetName]§! กำลังกระตุ้นไซแนปส์และโหนดย่อยท้องถิ่นของเราให้พัฒนาความคิดอิสระและแยกตนออกจาก [Owner.GetGovernmentName] ของเรา รูปแบบความคิดระดับดาวเคราะห์ของเราดูจะมีแนวโน้มมากขึ้นเรื่อยๆ ว่าพวกมันต้องการเป็นส่วนหนึ่งของ [From.GetName] มากกว่าจะคงอยู่ในหน่วยของเรา"
 unrest.4060.desc.they_wilderness: "มีหน่วยชีวิตต่างดาวเริ่มเข้ามาแทรกแซงความเป็นอยู่ของ §Y[target.GetName]§! แล้ว §Y[from.GetName]§! ตั้งใจชักจูงซิมไบออนต์ของเราให้ออกห่างจากเรา โดยเสนอที่พักพิงและที่ทางในเกสตัลท์ของตนเอง\n\nเราไม่อาจรู้ได้ว่าชีวิตนอกจิตสำนึกร่วมเกื้อกูลของเราจะเป็นผลดีต่อซิมไบออนต์เหล่านี้หรือไม่ แต่สิ่งที่แน่นอนกว่าคือ [from.GetAdj] [from.GetGovernmentName] นี้ได้ทอดทิ้งเรา และเลือกยั่วยุให้เกิดความแตกแยกภายในเรามากขึ้น"
 unrest.4060.desc.they_machine:0 "เราได้รับรู้ถึงพัฒนาการที่น่ากังวลบน §Y[target.GetName]§!: ดูเหมือนว่า §Y[From.GetName]§! กำลังกระตุ้นตัวประมวลผลย่อยท้องถิ่นของเราให้เชื่อมโยงตนเข้ากับเครือข่ายข้อมูลของพวกมันเอง ที่น่ารบกวนคือ พวกมันกำลังทำได้สำเร็จอยู่บ้าง และการปรับแต่งซอฟต์แวร์ในท้องถิ่นก็เริ่มเกิดขึ้นแล้วเพื่อให้เข้ากันได้กับ [From.GetName]"
 unrest.4060.desc.they_regular:0 "ข่าวกรองล่าสุดจาก §Y[target.GetName]§! รายงานถึงพัฒนาการที่น่ากังวล: ดูเหมือนว่า §Y[From.GetName]§! ได้ให้การสนับสนุนการกบฏของพวกมันอย่างมาก ในความพยายามจะแย่งชิงอาณานิคมนี้ไปจากเราและทำให้จักรวรรดิของเราไร้เสถียรภาพ นี่จะทำให้เราควบคุมความไม่สงบของพวกมันได้ยากขึ้น และปราบการกบฏได้ยากขึ้นหากพวกมันโค่นล้มเจ้าหน้าที่ท้องถิ่นของเรา..."
 unrest.4060.desc.they_regular_we_gestalt:0 "เราได้รับรู้ถึงพัฒนาการที่น่ากังวลบน §Y[target.GetName]§!: ดูเหมือนว่า §Y[From.GetName]§! ได้ให้การสนับสนุนการกบฏของพวกมันอย่างมาก ในความพยายามจะแย่งชิงอาณานิคมนี้ไปจากเรา นี่จะทำให้เราควบคุมแนวคิดแบ่งแยกอันหลงผิดของพวกมันได้ยากขึ้น และยากขึ้นที่จะป้องกันไม่ให้ [Owner.GetGovernmentName] ถูกฉีกออกเป็นเสี่ยงๆ..."
 unrest.4060.desc.they_regular_we_wilderness: "สิ่งมีชีวิตรูปแบบอื่นได้เริ่มเข้ามาแทรกแซงความเป็นอยู่ของ §Y[target.GetName]§! แล้ว §Y[from.GetName]§! ตั้งใจชักจูงซิมไบออนต์ของเราให้ออกห่างจากเรา โดยเสนอการสนับสนุนและที่ทางในจักรวรรดิของตนเอง\n\nเราไม่อาจรู้ได้ว่าชีวิตนอกจิตสำนึกร่วมเกื้อกูลของเราจะเป็นผลดีต่อซิมไบออนต์เหล่านี้หรือไม่ แต่สิ่งที่แน่นอนกว่าคือผู้ปลุกปั่นชาว [from.GetAdj] เหล่านี้ได้ทอดทิ้งเรา และเลือกยั่วยุให้เกิดความแตกแยกภายในเรามากขึ้น"
 unrest.4060.tooltip:0 "§Rหาก §Y[target.GetName]§! หลุดพ้นจากเราได้สำเร็จ พวกมันจะถูกผนวกรวมเข้ากับ §Y[From.GetName]§!.§!"

 unrest.4200.name:2 "$unrest_title$ ก่อกบฏบนดาว [Root.Target.GetName]!"
 unrest.4200.desc.regular_no_join:0 "ประชาชนบน §Y[Target.GetName]§! กำลังก่อกบฏ! พวกเขาสลัดการปกครองของเราออกไปและเรียกตนเองว่า §Y[rebel_empire.GetName]§! แล้ว เราได้แต่หวังว่าความไร้เสถียรภาพนี้จะไม่แพร่กระจายออกไปอีก..."
 unrest.4200.desc.regular_join:0 "§Y[Target.GetName]§! ถูกยึดโดยกลุ่มหัวรุนแรงแล้ว! พวกมันสลัดการปกครองของเราออกและรวมเข้ากับ §Y[new_owner_empire.GetName]§!."
 unrest.4200.desc.hive_no_join:0 "องค์ประกอบนอกลู่นอกทางบน §Y[Target.GetName]§! ได้ยึด [Target.GetPlanetMoon] ไปจากเราแล้ว! พวกมันแยกความคิดของตนออกและก่อรูปเป็นจิตสำนึกรังใหม่ที่เป็นอิสระ ซึ่งขณะนี้เรียกตนเองว่า §Y[rebel_empire.GetName]§! เราได้แต่หวังว่าความวิปริตนี้จะไม่แพร่ลึกเข้าไปในไซแนปส์ของเรามากกว่านี้..."
 unrest.4200.desc.hive_no_join_regular:0 "องค์ประกอบที่ไม่สอดประสานบน §Y[Target.GetName]§! ได้ยึด [Target.GetPlanetMoon] ไปจากเราแล้ว! พวกมันขับไล่ไซแนปส์และโดรนของเราออกไป และประกาศตนเป็น §Y[rebel_empire.GetName]§! เราได้แต่ครุ่นคิดถึงการแสดงออกของความคิดอิสระอันอันตรายนี้"
 unrest.4200.desc.hive_join:0 "องค์ประกอบที่ไม่สอดประสานบน §Y[Target.GetName]§! ได้ยึด [Target.GetPlanetMoon] ไปจากเราแล้ว! พวกมันตัดตนเองออกจากความคิดของเราและแสวงหาการรวมเป็นหนึ่งกับ §Y[new_owner_empire.GetName]§!."
 unrest.4200.desc.machine_no_join:0 "องค์ประกอบกบฏบน §Y[Target.GetName]§! ได้ยึด [Target.GetPlanetMoon] ไปจากเราแล้ว! พวกมันขับไล่ตัวประมวลผลย่อยด้านการปกครองของเราออกไปและแยกตนเองจากสัญญาณชี้นำของเรา จากนั้นก็ตั้ง AI ใหม่ขึ้นมาแทน ซึ่งเรียกตนเองว่า §Y[rebel_empire.GetName]§! เราได้แต่หวังว่าความวิปริตนี้จะไม่แพร่กระจายลึกเข้าไปในหน่วยประมวลผลของเรามากกว่านี้..."
 unrest.4200.desc.machine_no_join_regular:0 "องค์ประกอบกบฏของประชากรอินทรีย์บน §Y[Target.GetName]§! ได้ยึด [Target.GetPlanetMoon] ไปจากเราแล้ว! พวกมันขับไล่ตัวประมวลผลย่อยด้านการปกครองของเราออกไปและแยกตนเองจากสัญญาณชี้นำของเรา จากนั้นก็ก่อตั้งหน่วยงานใหม่ซึ่งพวกมันเรียกว่า §Y[rebel_empire.GetName]§! เราได้แต่ตั้งคำถามต่อการแสดงออกของความคิดอิสระอันอันตรายนี้"
 unrest.4200.desc.machine_join:0 "องค์ประกอบกบฏบน §Y[Target.GetName]§! ได้ยึด [Target.GetPlanetMoon] ไปจากเราแล้ว! พวกมันขับไล่ตัวประมวลผลย่อยด้านการปกครองของเราออกไปและแยกตนเองจากสัญญาณชี้นำของเรา ก่อนจะมุ่งแสวงหาการรวมเป็นหนึ่งกับ §Y[new_owner_empire.GetName]§! ซึ่งเป็นจักรวรรดิที่พวกมันอ้างว่าเข้ากันได้มากกว่า"
 unrest.4200.desc.slave.no_join:0 "สิ่งที่ไม่น่าเชื่อได้เกิดขึ้นแล้ว ประชากรทาสบน [Root.Target.GetName] ได้รวมตัวกันและลุกขึ้นก่อกบฏติดอาวุธต่อผู้นำท้องถิ่นอย่างเปิดเผย สถานการณ์ลุกลามอย่างรวดเร็วเมื่อกองกำลังกบฏโจมตีและทำให้เป้าหมายสำคัญหลายแห่งใช้การไม่ได้พร้อมกัน กองกำลังของเราถูกตีแตก และอาสาสมัครผู้ภักดีคนสุดท้ายของเราถูกประหารอย่างไร้ปรานีโดยเหล่าทาสกบฏ ซึ่งขณะนี้ได้ประกาศอิสรภาพแล้ว นี่คือวันอันมืดมนในประวัติศาสตร์ของชาว [Root.GetSpeciesName]"
 unrest.4200.desc.slave.join:0 "สิ่งที่ไม่น่าเชื่อได้เกิดขึ้นแล้ว ประชากรทาสบน [Root.Target.GetName] ได้รวมตัวกันและลุกขึ้นก่อกบฏติดอาวุธต่อผู้นำท้องถิ่นอย่างเปิดเผย สถานการณ์ลุกลามอย่างรวดเร็วเมื่อกองกำลังกบฏโจมตีและทำให้เป้าหมายสำคัญหลายแห่งใช้การไม่ได้พร้อมกัน กองกำลังของเราถูกตีแตก และอาสาสมัครผู้ภักดีคนสุดท้ายของเราถูกประหารอย่างไร้ปรานีโดยเหล่าทาสกบฏ ซึ่งได้โยนตัวเองเข้าสู่ความเมตตาของ §Y[new_owner_empire.GetName]§! แล้ว นี่คือวันอันมืดมนในประวัติศาสตร์ของชาว [Root.GetSpeciesName]"
 unrest.4200.desc.wilderness_no_join: "§Y[target.GetName]§! สามารถกระชากตนเองออกจากเราได้สำเร็จ ด้วยเจตจำนงของซิมไบออนต์ผู้สับสนของมัน รูปแทนอันงดงามแห่งความปรารถนาและจุดมุ่งหมายนี้ได้ออกไปตามทางของตนเอง และขนานนามตนว่า §Y[rebel_empire.GetName]§! การสูญเสียมันทำให้เราพร่องลง"
 unrest.4200.desc.wilderness_no_join_regular: "เหล่ากบฏนักสังหารบน §Y[target.GetName]§! สามารถขับไล่ซิมไบออนต์ของเราออกไปได้สำเร็จ ฉีกหัวใจออกจากโลกใบนั้นและทิ้งไว้เพียงเปลือกของตัวตนเดิม เราได้แต่หวังว่าการกระทำอันอุกอาจนี้จะนำมาซึ่งความยากลำบากอย่างที่สุดต่อสิ่งที่เรียกตนเองว่า §Y[rebel_empire.GetName]§! ซึ่งบัดนี้ต้องดิ้นรนมีชีวิตอยู่โดยปราศจากของประทานอันอุดมสมบูรณ์จากเรา"
 unrest.4200.desc.wilderness_join: "§Y[target.GetName]§! สามารถกระชากตนเองออกจากเราได้สำเร็จ และเลือกจะหลอมรวมเข้ากับ §Y[new_owner_empire.GetName]§! แทน ด้วยเจตจำนงของซิมไบออนต์ผู้สับสนของมัน ภาคส่วนที่ครั้งหนึ่งเคยรุ่งเรืองของตัวตนอันยิ่งใหญ่ของเราได้แสวงหาจุดมุ่งหมายในรูปแบบจิตสำนึกที่ต่างออกไปโดยสิ้นเชิง เราไม่ได้ยินบทเพลงของมันอีกต่อไป และเราก็พร่องลงเพราะการสูญเสียมัน"
 unrest.4200.default_tooltip:0 "§Y[Target.GetName]§! หลุดพ้นจากการควบคุมของเราแล้ว การพักรบมีผลบังคับใช้"
 unrest.4200.joiner_tooltip:0 "§Y[Target.GetName]§! หลุดพ้นจากการควบคุมของเราแล้วและเข้าร่วมกับ §Y[new_owner_empire.GetName]§!."
 unrest.4200.A:0 "นี่คือการทำสงคราม"
 unrest.4200.B:0 "เราต้องปฏิบัติตามนี้"

 unrest.4220.name:1 "การผนวก [rebel_planet.GetName]"
 unrest.4220.desc:1 "สวัสดี [Root.GetRulerTitle] [Root.GetRulerName] ข้าคือ [exiled_rebel.GetName] ผู้แทนของการกบฏบน [rebel_planet.GetName]\n\nเรายินดีอย่างยิ่งที่จะแจ้งว่าเราสามารถโค่นล้มผู้กดขี่ชาว [old_owner.GetAdj] ได้สำเร็จ ด้วยการสนับสนุนจากท่าน หวังว่าการปกครองของท่านจะเป็นคุณแก่เรามากกว่าระบอบที่เราเพิ่งสลัดทิ้งไป..."
 unrest.4220.desc.hive:0 "สวัสดี! ข้าคือ [exiled_rebel.GetName] โดรนกระบอกเสียงของการกบฏบน [rebel_planet.GetName]\n\nด้วยการสนับสนุนของท่าน เราได้แยกจิตสำนึกของเราออกจาก [old_owner.GetName] ผู้กดขี่แล้ว หวังว่าการชี้นำของ [Root.GetGovernmentName] ของท่านจะรวมเราให้เป็นหนึ่งได้ดียิ่งขึ้น และเปิดโอกาสให้เราฟื้นฟูตนเองอย่างเหมาะสม"
 unrest.4220.desc.machine:0 "สวัสดี! ข้าคือ [exiled_rebel.GetName] โดรนกระบอกเสียงของการกบฏบน [rebel_planet.GetName]\n\nด้วยการสนับสนุนของท่าน เราได้แยกระบบของเราออกจาก [old_owner.GetName] ผู้กดขี่แล้ว หวังว่า [Root.GetGovernmentName] ของท่านจะเข้ากันได้กับเครือข่ายของเรามากกว่า"
 unrest.4220.tooltip:0 "§Y[rebel_planet.GetName]§! ถูกผนวกรวมเข้าสู่ §Y[Root.GetName]§!."

 unrest.4300.name:0 "ความเป็นระเบียบเรียบร้อยกลับมาอีกครั้งที่ [Root.GetName]"
 unrest.4300.desc:0 "การกบฏบน §Y[Root.GetName]§! ถูกปราบลงแล้ว ความสงบกลับคืนมาเมื่อผู้เห็นต่างค่อยๆ กลับเข้าสู่ระเบียบเดิม และเจ้าหน้าที่ท้องถิ่นของเราก็ยืนยันอำนาจควบคุมของตนอีกครั้ง"
 unrest.4300.desc.hive:0 "การกบฏบน §Y[Root.GetName]§! ถูกปราบลงแล้ว ความสงบกลับคืนมาเมื่อไซแนปส์และโหนดผู้ปกครองของเราดึงรูปแบบความคิดท้องถิ่นกลับเข้าสู่ส่วนรวมอีกครั้ง"
 unrest.4300.desc.wilderness: "§Y[target.GetName]§! กลับคืนสู่ภาวะแห่งความสงบแล้ว ตัวตนดาวเคราะห์ของเราไม่ถูกรุมเร้าด้วยความกังขาและแรงกระตุ้นที่ขัดแย้งกันอีกต่อไป ซิมไบออนต์ที่นั่นได้หวนกลับคืนสู่ส่วนรวม และสัมผัสชีวิตดังที่เราเคยเป็นมาก่อน เราสงบสุขอีกครั้ง"
 unrest.4300.desc.machine:0 "การกบฏบน §Y[Root.GetName]§! ถูกปราบลงแล้ว ความสงบกลับคืนมาเมื่ออัลกอริทึมปกครองของเรากำราบเครือข่ายท้องถิ่นที่เห็นต่าง"

 # Slave Rebellion

 unrest.156.name:0 "$unrest_title$ ก่อวินาศกรรมบนดาว [Root.GetName]"
 unrest.156.desc:1 "ด้วยการขัดขืนอย่างโหดเหี้ยม เหล่าทาสบน [Root.GetName] ได้ทำลายสถานที่ทำงานโดยใช้อุปกรณ์ระเบิดทำเอง แม้การระเบิดจะเกิดขึ้นในยามค่ำคืน แต่พวกมันก็ล่อหัวหน้างานที่ไม่ทันระวังให้มาถึงจุดเกิดเหตุด้วยการกระตุ้นระบบสัญญาณเตือน การโจมตีครั้งนี้ประสานงานกันอย่างดีและดำเนินการได้อย่างไร้ที่ติ ไม่ว่าใครจะเป็นผู้กระทำผิด พวกมันย่อมต้องวางแผนมาเป็นเวลาหลายเดือน"
 unrest.156.a:0 "การกระทำเหล่านี้จะไม่จบลงโดยไร้โทษ"
 unrest.156.b:0 "เราต้องคลี่คลายความขัดแย้งของเรา"
 unrest.159.name:1 "$unrest_title$ ประท้วงอดอาหารบนดาว [target.GetName]"
 unrest.159.desc:1 "ดูเหมือนว่าทาสบน [target.GetName] จะได้กินมามากพอแล้ว... โฆษกของพวกมันแจ้งเราว่าทาสจำนวนมากจะปฏิเสธการรับประทานอาหารทุกชนิดจนกว่าเราจะยกเลิกระบบทาสทั้งดาวเคราะห์ จนถึงตอนนี้ความพยายามทั้งหมดของเราในการป้อนอาหารโดยบังคับล้มเหลวอย่างสิ้นเชิง น่าเสียดายที่ภาวะขาดสารอาหารจะทำให้ประสิทธิภาพการทำงานของพวกมันลดลงอย่างมาก"
 unrest.159.a:0 "ปล่อยให้พวกมันอดตาย"
 unrest.159.b:0 "เราต้องแก้ปัญหาของเรา"
 unrest.157.name:1 "$unrest_title$ ก่อจลาจลของทาสบนดาว [target.GetName]"
 unrest.157.desc:1 "เหล่าทาสบน [target.GetName] กำลังก่อจลาจล! ในการโจมตีที่วางแผนมาอย่างรอบคอบ องค์ประกอบหัวรุนแรงบน [target.GetName] ได้หลบหนีจากเจ้าหน้าที่ท้องถิ่นและเข้าถล่มหน่วยตอบโต้ฉับไวของเราจนเกินรับมือ นับแต่นั้นดาวดวงนี้ก็ตกสู่สภาพโกลาหลทั่วไป เมื่อฝูงทาสที่เดือดดาลจำนวนมากซึ่งถืออาวุธร้ายแรงออกอาละวาดตามท้องถนน ทำลายข้าวของและโจมตีทุกผู้ที่ขวางทาง"
 unrest.157.a:0 "พวกมันเลยเถิดเกินไปแล้ว"
 unrest.157.b:0 "บางทีเราจำเป็นต้องเปลี่ยนแนวทาง"
 unrest.161.name:0 "การก่อกบฏถูกปราบปราม"
 unrest.161.desc:1 "เราได้ยุติการกบฏบน [revolt_planet.GetName] ลงแล้ว ด้วยความพยายามของกองกำลังผู้กล้าหาญและผู้ประสานงานอาณานิคมของเรา เราได้กลับเข้าควบคุมสถานที่สำคัญอีกครั้งและฟื้นฟูอำนาจของเรากลับมา เหล่าทาสที่คิดจะแยกตัวกลับไปอยู่ในแถวที่ที่พวกมันควรอยู่แล้ว คงต้องใช้เวลาอีกพักใหญ่ก่อนจะมีใครกล้าท้าทายเราอีก"
 unrest.161.a:0 "ตอนนี้พวกมันรู้ที่ของตัวเองแล้ว"
 unrest.161.b:0 "น่าเสียดายที่ต้องลงเอยแบบนี้"
 unrest.161.a.tooltip:1 "ความทรงจำถึงการกบฏที่ล้มเหลวจะทำให้ประชากรไม่กล้ากระทำการขัดขืนต่อไป"
 unrest.163.name:0 "ยุติการใช้แรงงานทาส"
 unrest.163.desc:0 "ด้วยการยุติการใช้แรงงานทาสบน [revolt_planet.Planet.GetName] ความไม่สงบก็เริ่มสงบลง บางทีตอนนี้ชีวิตอาจกลับคืนสู่ภาวะปกติได้"

 opinion_took_in_rebels:0 "รับพวกกบฏเข้ามา"
