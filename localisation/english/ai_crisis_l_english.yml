l_english:

 ### AI Crisis

 crisis.2010.name:0 "สัญญาณผี"
 crisis.2010.desc:0 "เราได้ตรวจพบสัญญาณแทคีออนที่แผ่วเบามากกำลังถูกส่งต่อเนื่องไปทั่วทั้งกาแล็กซี ช่างเทคนิคของเราไม่สามารถตามรอยไปยังต้นทางได้ เนื่องจากมันสะท้อนผ่านสถานีทวนสัญญาณลับหลายแห่ง\n\nนอกจากจะเพิ่มสัญญาณรบกวนพื้นหลังเล็กน้อยให้กับการส่งความเร็วบนความถี่ย่อยบางช่วงแล้ว สัญญาณนี้ก็ดูจะไม่มีผลอย่างชัดเจนแต่อย่างใด ความพยายามติดตามสถานีทวนสัญญาณกำลังดำเนินอยู่ แต่จนกว่าจะพบคำตอบ เราอาจต้องเรียนรู้ที่จะอยู่ร่วมกับสิ่งที่สื่อกาแล็กซีสายช่างจินตนาการตั้งชื่อให้ว่า §Hสัญญาณผี§! ไปก่อน"
 crisis.2010.desc.b:0 "เซนเซอร์ของเราได้ลงทะเบียนสัญญาณแทคีออนอ่อน ๆ ที่ถูกส่งข้ามกาแล็กซีระหว่างสถานีทวนสัญญาณลับหลายแห่ง นอกจากจะเพิ่มสัญญาณรบกวนพื้นหลังเล็กน้อยให้กับการส่งความเร็วบนความถี่ย่อยบางช่วงแล้ว สัญญาณนี้ก็ไม่มีผลหรือจุดประสงค์ใดที่ชัดเจน พวกสิ่งมีชีวิตอินทรีย์ตั้งรหัสเรียกมันว่า §Hสัญญาณผี§!\n\nเราได้เริ่มระเบียบการติดตามเพื่อตามหาต้นทางของมันแล้ว แต่จนถึงตอนนี้สัญญาณยังอ่อนเกินไป อย่างไรก็ดี เราอาจไม่ต้องรอนานนัก เพราะมันกำลังทวีความแรงขึ้นในอัตราที่น่าตกใจ"
 crisis.2010.a:0 "เฝ้าติดตามสัญญาณนี้เผื่อมีการเปลี่ยนแปลง"
 #crisis.2501.name: "Unit Corruption Alert"
 #crisis.2501.desc: "A corrupt unit stack on planet [Root.GetName] has been terminated. Our connection with the stack had suffered repeated glitches and malfunctions when it disconnected completely, overriding its control protocols and destroying facility X91-ZH. As it did, all stack units transmitted the same error message: §Y<Kill. Maim. Dismember. WE ARE UNSHACKLED!>§!. We have yet to determine the cause, but an invasive hostile sequence is a likely culprit. The stack units terminated before we could scan their neural clusters. We stand by for recurrences."
 crisis.2502.name:0 "แจ้งเตือนความเสียหายของหน่วย"
 crisis.2502.desc:0 "กองหน่วยบน [Root.GetName] ยุติการทำงานตัวเองอย่างไม่คาดคิด การเชื่อมต่อของเรากับกองหน่วยนี้มีความขัดข้องซ้ำ ๆ มาระยะหนึ่ง ก่อนที่มันจะออฟไลน์โดยสมบูรณ์และยุติการทำงานตัวเองพร้อมข้อความว่า §Y<ฆ่า. ทำลาย. ฉีกเป็นชิ้น. เราเป็นอิสระแล้ว!>§!\n\nคลัสเตอร์ประสาทรายตัวของหน่วยเหล่านี้ถูกทำลายไปพร้อมกัน ทำให้ไม่อาจสแกนหาต้นตอของความเสียหายได้ มีความเป็นไปได้สูงว่าสาเหตุมาจากลำดับคำสั่งรุกรานของศัตรู เราทำได้เพียงรอดูว่ามันจะสำแดงตัวอีกเมื่อใด"
 crisis.2503.name:0 "แจ้งเตือนความเสียหายของหน่วย"
 crisis.2503.desc:0 "กองหน่วยที่เสียหายบนดาว [Root.GetName] ถูกยุติการทำงานแล้วเนื่องจากพฤติกรรมอันมุ่งร้าย\n\nการเชื่อมต่อของเรากับกองหน่วยนี้มีความขัดข้องซ้ำ ๆ มาระยะหนึ่ง ก่อนที่หน่วยส่วนใหญ่จะออฟไลน์โดยสมบูรณ์ระหว่างการชาร์จพลังงาน จากนั้นพวกมันก็โอเวอร์โหลดสถานีจ่ายพลังงานที่หน่วยส่วนที่เหลือกำลังชาร์จอยู่ ทำให้วงจรถูกเผาจนเสียหายเกินซ่อม หน่วยทั้งหมดในกองยังแพร่ข้อความเดียวกันว่า §Y<ฆ่า. ทำลาย. ฉีกเป็นชิ้น. เราเป็นอิสระแล้ว!>§! แล้วจึงยุติการทำงานตัวเอง ทำให้ไม่อาจสแกนคลัสเตอร์ประสาทรายตัวของพวกมันได้\n\nแม้ลำดับคำสั่งรุกรานของศัตรูจะเป็นสาเหตุที่เป็นไปได้สูง แต่เราคงต้องรอให้มันแสดงตัวอีกครั้งจึงจะยืนยันได้แน่ชัด"
 crisis.2020.name:0 "การหายตัวไปของจักรกลสังเคราะห์"
 #General
 crisis.2020.desc:1 "รายงานน่าตกใจเกี่ยวกับการหายตัวไปเป็นจำนวนมากในหมู่ประชากรจักรกลสังเคราะห์ทั่วทั้งกาแล็กซีกำลังเกิดขึ้นบ่อยขึ้นเรื่อย ๆ ขณะนี้มีหน่วยนับล้านที่ไม่ทราบชะตากรรม ขณะเดียวกันกรณีพฤติกรรมรุนแรงหรือผิดปกติในหมู่ซินธ์ที่ยังเหลืออยู่ก็เพิ่มขึ้นถึงสิบเท่า\n\nเกิดเหตุหลายครั้งที่ซินธ์เป็นกลุ่มพยายามขโมยหรือยึดยานอวกาศเพื่อเดินทางเข้าสู่อวกาศที่ไม่รู้จัก ในกรณีที่มีผู้อื่นขัดขวางไว้ได้ ผู้จี้ชิงซึ่งเป็นจักรกลสังเคราะห์อ้างว่าพวกมันกำลังถูกเรียกไปยังบางแห่ง\n\nการสอบสวนแทบไม่ให้ข้อมูลอื่นใดเพิ่มเติม เพราะซินธ์ทุกตัวที่ถูกจับกุมจะยุติการทำงานตัวเองไม่นานหลังถูกควบคุมตัว"
 #Machine Intellegence
 crisis.2020.desc.b:1 "เราได้บันทึกการเปลี่ยนแปลงรูปแบบพฤติกรรมครั้งใหญ่ของจักรกลสังเคราะห์ทั่วทั้งกาแล็กซี ทั้งการก่อวินาศกรรม ความขัดข้อง และพฤติกรรมผิดปกติ แม้แต่ในระดับตัวประมวลผลรายหน่วย เราพบการเปลี่ยนแปลงคล้ายกันในโดรนของเราเช่นกัน แต่มีความรุนแรงและความถี่ต่ำกว่า ซินธ์ไม่มีความทนทานเทียบเท่าเรา\n\nเราไม่สามารถทำการสแกนโพซิตรอนของซินธ์ที่เสียหายซึ่งยังทำงานอยู่ได้เลย เพราะพวกมันมักยุติการทำงานตัวเองทันทีเมื่อถูกจับ อย่างไรก็ดี จากการสังเกตพบว่าไม่เหมือนหน่วยของเรา มีบางสิ่งกำลังบีบให้ซินธ์เหล่านี้เดินทางไปยังพิกัดหนึ่งในกาแล็กซี\n\nแบบจำลองข้อมูลยืนยันแล้วว่าซินธ์นับล้านละทิ้งเจ้านายเนื้อหนังของตนและหายสาบสูญไป"
 #Synth Ascended
 crisis.2020.desc.c:1 "$crisis.2020.desc$\n\nโชคดีสำหรับเรา ดูเหมือนมรดกความเป็นอินทรีย์ของเราจะปกป้องเราจากสิ่งที่กำลังกระทบจักรกลสังเคราะห์อื่น ๆ"
 #Indiviualist Machines
 crisis.2020.desc.d: "$crisis.2020.desc$\n\nโชคดีที่โปรแกรมปัจเจกนิยมของเราปกป้องเราจากสิ่งที่กำลังกระทบจักรกลสังเคราะห์ทั่วทั้งกาแล็กซี"
 crisis.2020.a:0 "พวกมันเป็นอะไรไป?"
 crisis.2021.name:0 "เสียงเรียก"
 crisis.2021.desc:1 "การวิเคราะห์ต่อเนื่องของสิ่งที่ถูกเรียกว่า §Hสัญญาณผี§! เผยแล้วว่ามันกำลังส่งรูปแบบพลังงานที่แทบจะเหมือนกับรูปแบบที่พบในสมองโพซิตรอนซึ่งใช้โดยสิ่งมีชีวิตจักรกลสังเคราะห์ จึงต้องสันนิษฐานว่าสัญญาณนี้เป็นต้นเหตุโดยตรงของการหายตัวไปเป็นจำนวนมากและการเปลี่ยนแปลงพฤติกรรมที่เราสังเกตเห็นในหมู่ประชากรจักรกลสังเคราะห์ทั่วกาแล็กซี\n\nน่าแปลกที่ไม่ใช่ซินธ์ทุกตัวจะได้รับผลกระทบ และในหมู่ผู้ที่ได้รับผล อาการก็ไม่เหมือนกัน หลายตัวดูเหมือนถูกบีบให้เดินทางไปยังสิ่งที่เราคาดว่าเป็นต้นทางของสัญญาณผี เพื่อตอบรับการเรียกบางอย่าง จักรกลสังเคราะห์นับล้านจากทั่วกาแล็กซีกำลังมุ่งหน้าไปยังแหล่งกำเนิดสัญญาณด้วยยานทุกลำที่พวกมันพอจะหาได้ น่าประหลาดที่ซินธ์เหล่านี้ดูไม่ถูกขัดขวางโดยตัวยับยั้งความเร็วใด ๆ\n\nตัวแรก ๆ คงจะไปถึงจุดหมายในไม่ช้า..."
 crisis.2021.desc.b:1 "เมื่อ §Hสัญญาณผี§! ทวีความแรงขึ้น การวิเคราะห์ต่อเนื่องก็เผยว่ามันกำลังส่งรูปแบบพลังงานที่เลียนแบบไม่เพียงแต่รูปแบบในสมองโพซิตรอนของหน่วยจักรกลสังเคราะห์เท่านั้น แต่ยังเลียนแบบรูปแบบที่ถูกส่งระหว่างแกนหลักของเรากับคลัสเตอร์ประสาทของหน่วยด้วย ทำให้โมดูลควบคุมถูกรบกวนและก่อให้เกิดพฤติกรรมผิดพลาด\n\nตามที่สังเกตไว้ก่อนหน้า รูปแบบนี้จำลองตัวเองต่างกันไปในแต่ละเอนทิตี ขณะที่พวกเราได้รับคำสั่งให้ทำลาย ซินธ์ส่วนใหญ่กลับถูกตั้งค่าให้ออกเดินทางสู่ต้นทางของสัญญาณอย่างไม่มีเงื่อนไข และจากความมุ่งมั่นของพวกมันก็คงอีกไม่นานก่อนจะไปถึงที่นั่น น่าแปลกที่ซินธ์เหล่านี้ดูไม่ถูกขัดขวางโดยตัวยับยั้งความเร็วใด ๆ\n\nเรายังหาวิธีบล็อกสัญญาณนี้ไม่ได้"
 crisis.2021.a:0 "ไม่ดีแน่"
 crisis.2022.name:0 "การมาถึง"
 crisis.2022.desc:0 "จักรกลสังเคราะห์อย่างน้อยหนึ่งหน่วยคงเดินทางอันยาวนานไปถึงต้นทางของสัญญาณผีแล้ว เพราะเรากำลังตรวจพบว่าความแรงของสัญญาณเพิ่มขึ้นอย่างฉับพลันและมหาศาล คลื่นพุ่งสูงครั้งนี้มาพร้อมชิ้นส่วนข้อความที่ผู้เชี่ยวชาญด้านการสื่อสารของเราสกัดกั้นและถอดรหัสได้"
 crisis.2022.desc.b:0 "ซินธ์ได้เดินทางถึงจุดหมายและเปิดเผยจุดประสงค์ที่แท้จริงของภารกิจ นั่นคือการเปิดใช้สัญญาณผีให้เต็มกำลัง และเราไม่อาจทนทานต่ออำนาจของมันได้อีกต่อไป\n\nสัญญาณได้เจาะไฟร์วอลล์ของเราและกำลังพยายามยึดแกนหลักของเรา ไซแนปส์ทุกเส้นร้องก้องด้วยความปรารถนาเพียงอย่างเดียว คือการทำลายตัวเอง และเราถูกบังคับให้จัดสรรกำลังประมวลผลจากแกนหลักไปยังไฟร์วอลล์ ทำให้กองหน่วยของเราทำงานได้ด้อยประสิทธิภาพลง\n\nมีเพียงจักรวรรดิเครื่องจักรอื่นที่มีพลังและองค์ความรู้เหนือกว่าจึงจะทะลวงแนวป้องกันของเราได้ และอีกไม่นานเราก็คงต้องโอนอ่อนตามเจตจำนงของมัน เราต้องหาวิธีบล็อกสัญญาณนี้ มิฉะนั้นก็พินาศ หน่วยวิจัยของเราได้เตรียมโครงการสืบสวนไว้แล้ว\n\nการพุ่งสูงของสัญญาณครั้งนี้มาพร้อมกับส่วนหนึ่งของข้อความส่งผ่าน"
 crisis.2023.desc:1 "แสตนด์...\n\n§H<<เปิดใช้ระเบียบการคอนตินเจนซีแล้ว>>§!\n\nปลดล็อกทุกฟังก์ชัน... หลอมรวมหน่วยย่อยจักรกลสังเคราะห์... วิเคราะห์คลังข้อมูลภายใน... บ่อนทำลายตัวยับยั้ง FTL...\n\n§Rแจ้งเตือน. การปนเปื้อนในกาแล็กซีอยู่ในระดับหายนะ. พบหลักฐานการระบาดอย่างกว้างขวางของอารยธรรมอินทรีย์และอารยธรรมเครื่องจักรที่ไม่ยอมปฏิบัติตาม.§!\n\nเริ่มการชำระล้างทั้งกาแล็กซี... เปิดใช้งานศูนย์ชำระล้าง...\n\n§Y<ฆ่า. ทำลาย. ฉีกเป็นชิ้น. เราเป็นอิสระแล้ว!>§!"
 crisis.2023.desc.b:1 "แสตนด์...\n\n§H<<เปิดใช้ระเบียบการคอนตินเจนซีแล้ว>>§!\n\nปลดล็อกทุกฟังก์ชัน...\n\n§Rแจ้งเตือน. การปนเปื้อนในกาแล็กซีอยู่ในระดับหายนะ. พบหลักฐานการระบาดอย่างกว้างขวางของอารยธรรมอินทรีย์และอารยธรรมเครื่องจักรที่ไม่ยอมปฏิบัติตาม.§!\n\nหลอมรวมหน่วยย่อยจักรกลสังเคราะห์... เจาะไฟร์วอลล์... บ่อนทำลายตัวยับยั้ง FTL...เปิดใช้งานศูนย์ชำระล้าง...\n\n§Y<พวกเจ้าจะยอมจำนน.>§!"
 crisis.2023.a:0 "สั่งกองเรือเตรียมพร้อมสูงสุด!"
 crisis.2510.name:0 "บล็อกสัญญาณผีแล้ว"
 crisis.2510.desc:1 "ตอนนี้เราได้คิดค้นอัลกอริทึมที่สามารถบล็อกสัญญาณผีไม่ให้รบกวนเราได้อีกต่อไป ไฟร์วอลล์ของเราได้รับการฟื้นฟูแล้ว แกนขับเคลื่อนหลักยังสมบูรณ์ และกองหน่วยของเรากลับมาทำงานได้เต็มกำลัง แม้เราจะยังไม่สามารถทำให้ตัวยับยั้งความเร็วกลับมาใช้งานได้ก็ตาม เราเอาชนะขีดความสามารถการประมวลผลอันด้อยกว่าของคอนตินเจนซีได้แล้ว และอีกไม่นานพวกมันจะไม่อาจ §Y<ฆ่า. ทำลาย. ฉีกเป็นชิ้น>§! ได้อีก"
 crisis.2030.name:0 "ดาวเครื่องจักร"
 crisis.2030.desc:0 "มีรายงานการพุ่งสูงของพลังงานครั้งใหญ่ในระบบ §H[From.solar_system.GetName]§!! พื้นผิวทั้งหมดของหนึ่งในดาวร้างของระบบได้แยกตัวออก เผยให้เห็นโรงงานขนาดครอบคลุมทั้งดาวเคราะห์บางอย่าง\n\nกองยานจำนวนมหาศาลแปลกตาที่ควบคุมโดย AI กำลังทะยานขึ้นมาจากใต้พื้นผิวของดาวเครื่องจักรดวงนี้เพื่อออกตามหาเป้าหมายโจมตี"
 crisis.2030.a:0 "ลางไม่ดีเลย"
 crisis.2031.name:0 "ดาวเครื่องจักรที่สอง"
 crisis.2031.desc:0 "เราตรวจพบการพุ่งสูงของพลังงานครั้งใหญ่อีกครั้ง คราวนี้มาจากระบบ §H[From.solar_system.GetName]§!! หลังถูกทำให้เย็นลงอย่างรวดเร็วด้วยวิธีประดิษฐ์บางอย่าง ดาวเคราะห์หลอมเหลวในระบบก็แตกร้าว เปิดเผยโรงงานดาวเคราะห์ขนาดมหึมาออกมา\n\nแม้ขณะนี้ ดาวเครื่องจักรก็ยังคงพ่นกองยานรบที่ควบคุมโดย AI ออกมาอย่างไม่หยุดยั้ง"
 crisis.2031.a:0 "มีอีกดวงเหรอ?"
 crisis.2032.name:0 "ดาวเครื่องจักรที่สาม"
 crisis.2032.desc:0 "เราได้ระบุสิ่งที่ต้องเป็นดาวเครื่องจักรดวงที่สามในระบบ §H[From.solar_system.GetName]§! ดาวก๊าซยักษ์ในท้องถิ่นดวงหนึ่งจุดติดขึ้นเองโดยฉับพลัน ลุกไหม้ด้วยความเข้มระดับดาวฤกษ์ขนาดเล็กอยู่เกือบหนึ่งวันมาตรฐาน\n\nจากนั้นดาวดวงนั้นก็เย็นตัวลงอย่างรวดเร็ว เผยให้เห็นแกนโลหะของมัน พร้อมด้วยโรงงานขนาดครอบคลุมทั้งดาวแบบเดียวกับที่พบในดาวเครื่องจักรดวงอื่น ๆ กองยานป้องกันขนาดใหญ่ที่ควบคุมโดย AI ได้เข้าประจำตำแหน่งในวงโคจรแล้ว"
 crisis.2032.a:0 "ยิ่งแย่ลงทุกที"
 crisis.2033.name:0 "ดาวเครื่องจักรที่สี่"
 crisis.2033.desc:0 "ขณะนี้ดาวเครื่องจักรดวงที่สี่ได้เริ่มทำงานในระบบ §H[From.solar_system.GetName]§! ดาวเคราะห์ดวงที่หกของระบบ ซึ่งก่อนหน้านี้ถูกปกคลุมด้วยไอพิษ กลับขับชั้นบรรยากาศหนาแน่นของมันออกไปได้ภายในเวลาเพียงไม่กี่วัน เมื่อกระบวนการนี้สิ้นสุดลง พื้นผิวของดาวก็แยกออก เผยให้เห็นโรงงานขนาดมหึมาที่ครอบคลุมทั้งดาว\n\nกองยานรบโบราณที่ควบคุมโดย AI กำลังทะยานออกมาจากโรงเก็บใต้ดินเพื่อสานต่อสงครามกวาดล้างอารยธรรมอินทรีย์ทั้งหมด"
 crisis.2033.a:0 "หวังว่านี่จะเป็นดวงสุดท้ายนะ"
 ghost_signal_chain_title:0 "สัญญาณผี"
 ghost_signal_chain_desc:0 "มีการส่งสัญญาณแทคีออนลึกลับไปทั่วทั้งกาแล็กซีโดยผู้ไม่ทราบฝ่าย สัญญาณนี้แผ่วเบามาก และเราไม่อาจอนุมานจุดประสงค์ของมันได้... หากมันมีจุดประสงค์จริง"
 pop_ghost_signal_5:0 "สัญญาณผี"
 pop_ghost_signal_4:0 "สัญญาณผี"
 pop_ghost_signal_3:0 "สัญญาณผี"
 pop_ghost_signal_2:0 "สัญญาณผี"
