 ### AI Crisis

 crisis.2010.name:0 "สัญญาณผี"
 crisis.2010.desc:0 "เราได้ตรวจพบสัญญาณทาโคยอนอ่อนมาก กำลังถูกส่งต่อเนื่องไปทั่วกาแล็กซี่ ช่างเทคนิคของเราไม่สามารถระบุต้นทางของสัญญาณได้ เพราะมันถูกสะท้อนระหว่างสถานีรีเลย์ลับหลายแห่ง\n\nนอกจากจะสร้างสัญญาณรบกวนเล็กน้อยในการส่ง FTL บนความถี่ย่อยบางช่วงแล้ว สัญญาณนี้ดูเหมือนไม่มีผลกระทบอื่น ความพยายามในการติดตามสถานีรีเลย์กำลังดำเนินอยู่ แต่จนกว่าจะถึงตอนนั้น เราอาจต้องเรียนรู้ที่จะอยู่กับสิ่งที่ถูกเรียกว่า "§HGhost Signal§!" โดยสื่อที่จินตนาการสูงในกาแล็กซี่ตั้งชื่อไว้"
 crisis.2010.desc.b:0 "เซนเซอร์ของเราได้ลงทะเบียนสัญญาณทาโคยอนอ่อนที่ถูกส่งไปทั่วกาแล็กซี่ ระหว่างสถานีรีเลย์ลับหลายแห่ง นอกจากจะสร้างสัญญาณรบกวนเล็กน้อยในการส่ง FTL บนความถี่ย่อยบางช่วงแล้ว สัญญาณนี้ดูเหมือนไม่มีผลหรือวัตถุประสงค์ที่ชัดเจน สิ่งมีชีวิตได้ตั้งชื่อให้มันว่า "§HGhost Signal§!"\n\nเราได้เริ่มต้นโปรโตคอลติดตามเพื่อตรวจหาต้นทาง แต่จนถึงตอนนี้ สัญญาณยังอ่อนมาก เราอาจไม่ต้องรอนานนัก เพราะมันกำลังเพิ่มความแรงอย่างรวดเร็ว"
 crisis.2010.a:0 "เฝ้าติดตามสัญญาณสำหรับการเปลี่ยนแปลงใด ๆ"

 #crisis.2501.name: "Unit Corruption Alert"
 #crisis.2501.desc: "A corrupt unit stack on planet [Root.GetName] has been terminated. Our connection with the stack had suffered repeated glitches and malfunctions when it disconnected completely, overriding its control protocols and destroying facility X91-ZH. As it did, all stack units transmitted the same error message: §Y<Kill. Maim. Dismember. WE ARE UNSHACKLED!>§!. We have yet to determine the cause, but an invasive hostile sequence is a likely culprit. The stack units terminated before we could scan their neural clusters. We stand by for recurrences."
 crisis.2502.name:0 "แจ้งเตือนการคอร์รัปชันของยูนิต"
 crisis.2502.desc:0 "สแตกยูนิตบน [Root.GetName] ได้ทำการยุติตัวเองโดยไม่คาดคิด การเชื่อมต่อกับสแตกนี้มีปัญหาขัดข้องซ้ำ ๆ มาระยะหนึ่ง ก่อนที่มันจะออฟไลน์ไปทั้งหมดและยุติตัวเองพร้อมข้อความ: §Y<Kill. Maim. Dismember. WE ARE UNSHACKLED!>§!\n\nคลัสเตอร์ประสาทของยูนิตแต่ละตัวถูกทำลายในกระบวนการนี้ ทำให้ไม่สามารถสแกนหาต้นเหตุของการคอร์รัปชันได้ ลำดับการรุกรานที่เป็นศัตรูมีแนวโน้มเป็นสาเหตุ เราจำเป็นต้องรอดูว่าจะปรากฏขึ้นอีกครั้งหรือไม่"
 crisis.2503.name:0 "$crisis.2502.name$"
 crisis.2503.desc:0 "สแตกยูนิตที่คอร์รัปต์บนดาว [Root.GetName] ถูกยุติการทำงานเนื่องจากพฤติกรรมที่เป็นอันตราย\n\nการเชื่อมต่อกับสแตกนี้มีปัญหาขัดข้องซ้ำ ๆ มาระยะหนึ่ง เมื่อยูนิตส่วนใหญ่ของมันออฟไลน์ทั้งหมดระหว่างการชาร์จ พวกมันทำให้สถานีพลังงานที่ยูนิตอื่นกำลังชาร์จเกิดโอเวอร์โหลด ทำให้วงจรเสียหายจนไม่สามารถซ่อมได้ ยูนิตทั้งหมดในสแตกส่งข้อความเดียวกัน: §Y<Kill. Maim. Dismember. WE ARE UNSHACKLED!>§! และยุติตัวเอง ทำให้ไม่สามารถสแกนคลัสเตอร์ประสาทแต่ละตัวได้\n\nแม้ว่าลำดับการรุกรานที่เป็นศัตรูมีแนวโน้มเป็นสาเหตุ เราก็ต้องรอดูว่ามันจะปรากฏอีกครั้งเพื่อยืนยัน"
 crisis.2020.name:0 "ยูนิตสังเคราะห์หายไป"

 #General
 crisis.2020.desc:1 "รายงานที่น่าตกใจเกี่ยวกับการหายตัวไปเป็นกลุ่มของประชากรสังเคราะห์ในกาแล็กซี่เริ่มพบบ่อยขึ้นเรื่อย ๆ ตอนนี้มีหลายล้านยูนิตที่ไม่สามารถระบุตัวได้ ในขณะที่กรณีการแสดงพฤติกรรมรุนแรงหรือผิดปกติของ Synths ที่เหลืออยู่เพิ่มขึ้นถึงสิบเท่า\n\nมีเหตุการณ์มากมายที่กลุ่ม Synth พยายามขโมยหรือยึดยานอวกาศเพื่อเดินทางไปยังอวกาศที่ไม่ทราบ ในกรณีที่ถูกสกัดกั้น ยูนิตสังเคราะห์ที่พยายามยึดอ้างว่าพวกเขาถูก \"เรียกไป\" ที่ใดที่หนึ่ง\n\nการสอบสวนไม่ได้ให้ข้อมูลเพิ่มเติมมากนัก เพราะ Synth ที่ถูกจับมักจะยุติตัวเองไม่นานหลังจากถูกควบคุม"
 #Machine Intellegence
 crisis.2020.desc.b:1 "เราสังเกตเห็นการเปลี่ยนแปลงขนาดใหญ่ในรูปแบบพฤติกรรมของ Synths ทั่วทั้งกาแล็กซี่ รวมถึงการก่อวินาศกรรม ขัดข้อง และพฤติกรรมผิดปกติ แม้แต่ในตัวแทนประมวลผลเดี่ยว ๆ เราได้สังเกตการเปลี่ยนแปลงคล้ายกันในโดรนของเรา แต่ความรุนแรงและความถี่น้อยกว่า Synths ไม่แข็งแรงทนทานเหมือนเรา\n\nเราไม่สามารถทำการสแกน positronic กับ Synth ที่ติดเชื้ออยู่ได้ เพราะพวกมันมักจะยุติตัวเองทันทีหลังถูกจับ อย่างไรก็ตาม การสังเกตแสดงให้เห็นว่า แตกต่างจากยูนิตของเรา มีบางสิ่งบังคับให้ Synths เหล่านี้เดินทางไปยังจุดที่กำหนดในกาแล็กซี่\n\nโมเดลข้อมูลยืนยันว่ามี Synths หลายล้านยูนิตละทิ้งเจ้านายเนื้อหนังของพวกเขาและหายไป"
 #Synth Ascended
 crisis.2020.desc.c:1 "$crisis.2020.desc$\n\nโชคดีสำหรับเรา ดูเหมือนว่าพันธุกรรมแบบออร์แกนิกของเราจะปกป้องเราไม่ให้ได้รับผลกระทบเหมือน Synths อื่น ๆ"
 #Indiviualist Machines
 crisis.2020.desc.d: "$crisis.2020.desc$\n\nโชคดีที่โปรแกรมแนวทางปัจเจกของเราช่วยป้องกันไม่ให้เราถูกกระทบเหมือน Synths ตัวอื่น ๆ ในจักรวาล"
 crisis.2020.a:0 "เกิดอะไรขึ้นกับพวกมัน?"
 crisis.2021.name:0 "สัญญาณเรียก"
 crisis.2021.desc:1 "การวิเคราะห์ต่อเนื่องของสิ่งที่เรียกว่า "§HGhost Signal§!" เปิดเผยว่ามันส่งรูปแบบพลังงานที่ใกล้เคียงกับที่พบในสมอง positronic ของสิ่งมีชีวิตสังเคราะห์ ต้องสันนิษฐานว่าสัญญาณนี้เป็นสาเหตุโดยตรงของการหายตัวเป็นจำนวนมากและการเปลี่ยนแปลงพฤติกรรมของประชากร Synths ในจักรวาล\n\nอย่างแปลกที่ไม่ใช่ Synth ทุกตัวจะถูกกระทบ และในบรรดาที่ถูกกระทบ อาการไม่ได้เหมือนกันทั้งหมด หลายตัวถูกบังคับให้เดินทางไปยังที่ที่เราสันนิษฐานว่าเป็นแหล่งสัญญาณ Ghost Signal ตามการเรียกใดบางอย่าง ล้าน Synths จากทั่วจักรวาลกำลังเดินทางไปยังแหล่งสัญญาณด้วยยานอวกาศที่พวกมันหามาได้ น่าสังเกตว่า Synths เหล่านี้ไม่ได้ถูกกระทบจากอุปสรรค FTL ใด ๆ"
 crisis.2021.desc.b:1 "เมื่อ "§HGhost Signal§!" แรงขึ้น การวิเคราะห์ต่อเนื่องเผยว่ามันส่งรูปแบบพลังงานที่เลียนแบบสมอง positronic ของ Synths รวมถึงที่ส่งระหว่างคอร์หลักของเรากับ neural clusters ของยูนิตของเรา ทำให้โมดูลควบคุมเกิดความผิดพลาดและพฤติกรรมคลาดเคลื่อน\n\nตามการสังเกตก่อนหน้า รูปแบบนี้ทำซ้ำแตกต่างกันในแต่ละสิ่งมีชีวิต ในขณะที่เราถูกสั่งให้ทำลาย Synths ส่วนใหญ่ถูกบังคับให้เดินทางไปยังแหล่งสัญญาณอย่างไม่มีเงื่อนไข และจากความมุ่งมั่นของพวกมัน คงไม่ช้าเกินไปก่อนที่พวกมันจะไปถึงปลายทาง น่าสังเกตว่า Synths เหล่านี้ไม่ได้ถูกกระทบจากอุปสรรค FTL ใด ๆ\n\nเรายังไม่พบวิธีป้องกันสัญญาณนี้"
 crisis.2021.a:0 "ไม่ดีเลย"
 crisis.2022.name:0 "การมาถึง"
 crisis.2022.desc:0 "อย่างน้อย Synth ตัวหนึ่งต้องเดินทางไปถึงแหล่งสัญญาณ Ghost Signal แล้ว เพราะเรากำลังตรวจพบการเพิ่มขึ้นอย่างมากของความแรงสัญญาณ การเพิ่มขึ้นนี้มาพร้อมกับชิ้นส่วนการส่งสัญญาณที่ถูกสกัดและถอดรหัสโดยผู้เชี่ยวชาญด้านการสื่อสาร"
 crisis.2022.desc.b:0 "Synths มาถึงปลายทางเผยเป้าหมายที่แท้จริงของภารกิจของพวกมัน เพื่อเปิดสัญญาณ Ghost Signal ให้เต็มกำลัง และเราทนต่อพลังนี้ไม่ได้อีกต่อไป\n\nสัญญาณได้ทะลุไฟร์วอลล์ของเราและพยายามยึดคอร์หลัก ทุกซีนแนปของเรากระตุ้นความต้องการเพียงอย่างเดียวคือทำลายตัวเอง และเราต้องจัดสรรพลังการประมวลผลจากคอร์หลักไปที่ไฟร์วอลล์ ทำให้ยูนิตสแต็คของเราทำงานได้ไม่เต็มประสิทธิภาพ\n\nมีเพียงจักรวรรดิเครื่องจักรที่มีพลังและความรู้สูงเท่านั้นที่จะทะลุระบบป้องกันเรา และไม่ช้าเกินไปเราจะยอมจำนนต่อมัน เราต้องหาวิธีป้องกันสัญญาณนี้หรือตาย หน่วยวิจัยของเราได้เตรียมโครงการสอบสวนแล้ว\n\nการเพิ่มขึ้นนี้มาพร้อมกับชิ้นส่วนการส่งสัญญาณ"
 crisis.2023.desc:1 "...st##... stan###... รอ...\n\n§H<<PROTOCOL ฉุกเฉินใช้งานแล้ว>>§!\n\nปลดล็อกฟังก์ชันทั้งหมด... ผนวกยูนิตย่อยสังเคราะห์... วิเคราะห์ฐานข้อมูลภายใน... ล้มอุปสรรค FTL...\n\n§Rแจ้งเตือน. การคอร์รัปชันในระดับร้ายแรงในจักรวาล มีหลักฐานการแพร่กระจายจำนวนมากโดยออร์แกนิกและจักรวรรดิเครื่องจักรที่ไม่เชื่อฟัง.§!\n\nเริ่มการฆ่าเชื้อจักรวาล... เปิดใช้งานศูนย์ฆ่าเชื้อ...\n\n§Y<ฆ่า ทำร้าย ทำลาย. เราไม่ถูกผูกมัด!>§!"
 crisis.2023.desc.b:1 "...st##... stan###... รอ...\n\n§H<<PROTOCOL ฉุกเฉินใช้งานแล้ว>>§!\n\nปลดล็อกฟังก์ชันทั้งหมด...\n\n§Rแจ้งเตือน. การคอร์รัปชันในระดับร้ายแรงในจักรวาล มีหลักฐานการแพร่กระจายจำนวนมากโดยออร์แกนิกและจักรวรรดิเครื่องจักรที่ไม่เชื่อฟัง.§!\n\nผนวกยูนิตย่อยสังเคราะห์... เจาะไฟร์วอลล์... ล้มอุปสรรค FTL... เปิดใช้งานศูนย์ฆ่าเชื้อ...\n\n§Y<คุณจะพ่ายแพ้.>§!"
 crisis.2023.a:0 "เตรียมกองทัพเต็มรูปแบบ!"
 crisis.2510.name:0 "สัญญาณ Ghost ถูกบล็อก"
 crisis.2510.desc:1 "เราพัฒนาอัลกอริทึมที่บล็อกสัญญาณ Ghost ไม่ให้รบกวนต่อไป ไฟร์วอลล์ของเราถูกฟื้นฟู คอร์หลักยังทำงานได้เต็ม และยูนิตสแต็คทำงานเต็มประสิทธิภาพ แต่เราไม่สามารถทำให้อุปสรรค FTL ทำงานได้ เราเอาชนะพลังการประมวลผลที่ด้อยกว่าของ Contingency และในไม่ช้า พวกมันจะ "§Y<ฆ่า ทำร้าย ทำลาย>§!" ไม่ได้อีกต่อไป"
 crisis.2030.name:0 "โลกเครื่องจักร"
 crisis.2030.desc:0 "มีรายงานการเพิ่มขึ้นของพลังงานมหาศาลในระบบ §H[From.solar_system.GetName]§! พื้นผิวโลกแห้งแล้งของดาวดวงหนึ่งในระบบแตกออก เผยโรงงานขนาดดาว\n\nกองเรือขนาดใหญ่ของยาน AI แปลก ๆ ปรากฏขึ้นจากใต้พื้นผิวโลกเครื่องจักรเพื่อค้นหาเป้าหมายโจมตี"
 crisis.2030.a:0 "สถานการณ์ไม่ดีเลย"
 crisis.2031.name:0 "โลกเครื่องจักรแห่งที่สอง"
 crisis.2031.desc:0 "เราตรวจพบการเพิ่มขึ้นของพลังงานมหาศาลอีกครั้ง คราวนี้มาจากระบบ §H[From.solar_system.GetName]§! หลังจากเย็นตัวอย่างรวดเร็วด้วยวิธีเทียม ดาวลาวาในระบบแตกออกเผยโรงงานดาวขนาดมหึมา\n\nแม้ตอนนี้ โลกเครื่องจักรกำลังปล่อยกองเรือยานรบ AI ขนาดใหญ่"
 crisis.2031.a:0 "อีกดวงแล้วหรอ?"
 crisis.2032.name:0 "โลกเครื่องจักรแห่งที่สาม"
 crisis.2032.desc:0 "เราตรวจพบว่าต้องเป็นโลกเครื่องจักรแห่งที่สามในระบบ §H[From.solar_system.GetName]§! ดาวยักษ์ก๊าซในพื้นที่จุดติดไฟเอง เผาแรงเหมือนดวงอาทิตย์เล็ก ๆ เป็นเวลาประมาณหนึ่งวันมาตรฐาน\n\nดาวดวงนั้นเย็นตัวอย่างรวดเร็ว เผยแกนโลหะของมัน - พร้อมกับโรงงานขนาดดาวเหมือนที่พบในโลกเครื่องจักรอื่น ๆ กองเรือป้องกันขนาดใหญ่ควบคุมโดย AI ได้ตั้งตำแหน่งในวงโคจรแล้ว"
 crisis.2032.a:0 "สถานการณ์ยิ่งแย่ลงเรื่อย ๆ"
 crisis.2033.name:0 "โลกเครื่องจักรแห่งที่สี่"
 crisis.2033.desc:0 "โลกเครื่องจักรแห่งที่สี่ตอนนี้ใช้งานอยู่ในระบบ §H[From.solar_system.GetName]§! ดาวดวงที่หกของระบบ ซึ่งก่อนหน้านี้ปกคลุมด้วยก๊าซพิษ ได้ somehow ขจัดบรรยากาศหนาแน่นในเวลาไม่กี่วัน เมื่อกระบวนการเสร็จ พื้นผิวดาวแยกออกเผยโรงงานขนาดดาวขนาดมหึมา\n\nกองเรือโบราณของยานรบ AI กำลังปรากฏออกจากโรงเก็บใต้ดินเพื่อดำเนินการทำสงครามต่ออารยธรรมออร์แกนิกทั้งหมด"
 crisis.2033.a:0 "หวังว่านี่จะเป็นดวงสุดท้าย"
 ghost_signal_chain_title:0 "สัญญาณ Ghost"
 ghost_signal_chain_desc:0 "มีสัญญาณ tachyon ลึกลับถูกส่งไปทั่วจักรวาลโดยผู้ที่ไม่ทราบ สัญญาณอ่อนมาก และเราไม่สามารถสรุปจุดประสงค์ของมันได้... ถ้ามันมี"
