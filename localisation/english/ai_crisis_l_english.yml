 crisis.2036.name:0 "หัวใจของคอนตินเจนซี"
 crisis.2036.desc:0 "เมื่อดาวเครื่องจักรทั้งสี่ถูกทำลาย นักวิทยาศาสตร์ก็สามารถอนุมานจุดกำเนิดของสัญญาณผีได้แล้ว มันมาจาก §HCX-9881§! ระบบดาวที่ไม่เคยมีการทำแผนที่มาก่อน ณ ชายขอบของกาแล็กซี\n\nที่นั่นต้องเป็นจุดหมายปลายทางของจักรกลสังเคราะห์ทั้งหมดที่ตกอยู่ใต้อิทธิพลของสัญญาณคอนตินเจนซีจะยังคงเป็นภัยคุกคามจนกว่าระบบสุดท้ายนี้จะถูกจัดการ"
 crisis.2036.desc.b:0 "เมื่อดาวเครื่องจักรทั้งสี่ถูกทำลาย เราก็อนุมานจุดกำเนิดของสัญญาณผีได้แล้ว มันมาจาก §HCX-9881§! ระบบดาวที่ไม่เคยมีการทำแผนที่มาก่อน ณ ชายขอบของกาแล็กซี\n\nที่นั่นต้องเป็นที่ที่จักรกลสังเคราะห์ซึ่งถูกทำให้เสียหายทั้งหมดมุ่งหน้าไปคอนตินเจนซีจะยังคงเป็นภัยคุกคามจนกว่าระบบสุดท้ายนี้จะถูกจัดการ"
 crisis.2036.a:0 "ต้องทำให้มันเป็นกลาง"
 crisis.2037.name:0 "ทำลายดาวเครื่องจักรแล้ว"
 crisis.2037.desc:0 "§H[From.GetName]§! ดาวเครื่องจักรในระบบ [From.solar_system.GetName] ถูกทำลายแล้ว หลังถูกโจมตีทิ้งระเบิดจากวงโคจรอย่างหนัก แกน AI ของดาวก็ทำลายตัวเองเพื่อไม่ให้ถูกยึด โดยจุดชนวนอุปกรณ์ปฏิสสารขนาดมหึมาที่ซ่อนอยู่ลึกใต้พื้นผิว\n\nเมื่อดาวดวงนี้ถูกทำลาย สัญญาณผีก็สูญเสียสถานีทวนสัญญาณสำคัญแห่งหนึ่งไป และความแรงของมันก็อ่อนลงอย่างมากตามไปด้วย\n\nนอกจากนี้ แรงระเบิดบนดาวยังทำให้มีการกระจายตัวของแหล่งสะสม §Hโลหะมีชีวิต§! ขนาดใหญ่ทั่วพื้นผิว วัสดุประหลาดนี้มีคุณสมบัติเฉพาะตัวหลายอย่าง และคอนตินเจนซีใช้มันในการสร้างยูนิตสงครามและโรงงานทั้งหมดของพวกมัน"
 crisis.2037.desc.b:0 "§H[From.GetName]§! ดาวเครื่องจักรฝ่ายศัตรูในระบบ [From.solar_system.GetName] ถูกทำลายแล้ว หลังถูกโจมตีทิ้งระเบิดจากวงโคจรอย่างหนัก แกน AI ของดาวก็ทำลายตัวเองเพื่อไม่ให้ถูกยึด โดยจุดชนวนอุปกรณ์ปฏิสสารขนาดมหึมาที่ซ่อนอยู่ลึกใต้พื้นผิว\n\nเมื่อดาวดวงนี้ถูกทำลาย สัญญาณผีก็สูญเสียสถานีทวนสัญญาณสำคัญแห่งหนึ่งไป และความแรงของมันก็อ่อนลงอย่างมากตามไปด้วย\n\nนอกจากนี้ แรงระเบิดบนดาวยังทำให้มีการกระจายตัวของแหล่งสะสม §Hโลหะมีชีวิต§! ขนาดใหญ่ทั่วพื้นผิว วัสดุประหลาดนี้มีคุณสมบัติเฉพาะตัวหลายอย่าง และคอนตินเจนซีใช้มันในการสร้างยูนิตสงครามและโรงงานทั้งหมดของพวกมัน"
 crisis.2037.a:0 "ชัยชนะของทั้งกาแล็กซี"
 crisis.2037.alt.desc:0 "$crisis.2037.alt.desc.pt1$\n\nเมื่อสูญเสียสถานีทวนสัญญาณไปอีกแห่ง สัญญาณผีก็อ่อนกำลังลงไปอีก"
 crisis.2037.alt.desc.pt1:0 "ดาวเครื่องจักรถูกทำลายไปอีกดวงแล้ว! §H[From.GetName]§! ในระบบ [From.solar_system.GetName] ระเบิดขึ้นหลังแนวป้องกันของดาวถูกบดขยี้ในการรบ เช่นเดียวกับครั้งก่อน แกน AI ได้จุดกลไกทำลายตัวเองเพื่อไม่ให้ถูกยึด"
 crisis.2037.alt.machine.desc:0 "$crisis.2037.alt.desc.pt1$\n\nเมื่อสูญเสียสถานีทวนสัญญาณไปอีกแห่ง สัญญาณผีก็อ่อนลงมากจนเราสามารถบล็อกมันได้ทั้งหมด ไฟร์วอลล์ของเราได้รับการฟื้นฟูแล้ว แกนขับเคลื่อนหลักยังสมบูรณ์ และกองหน่วยของเรากลับมาทำงานได้เต็มกำลัง เราเอาชนะขีดความสามารถการประมวลผลอันด้อยกว่าของคอนตินเจนซีได้แล้ว และอีกไม่นานพวกมันจะไม่อาจ §Y<ฆ่า. ทำลาย. ฉีกเป็นชิ้น.>§! ได้อีก"
 crisis.2037.alt.cracked.desc:0 "§H[From.GetName]§! ดาวเครื่องจักรในระบบ [From.solar_system.GetName] ถูกอานุภาพมหาศาลของลำแสงทำลายดาวจากยานโคโลซัสโจมตี อาวุธดังกล่าวผ่าพื้นผิวเกราะหนาหนักของดาวได้อย่างง่ายดาย จุดชนวนแกนกลางและทำให้โรงงานสงครามใต้ดินของคอนตินเจนซีกลายเป็นไอ\n\nเมื่อดาวดวงนี้ถูกทำลาย สัญญาณผีก็สูญเสียสถานีทวนสัญญาณสำคัญแห่งหนึ่งไป และความแรงของมันก็อ่อนลงอย่างมากตามไปด้วย"
 crisis.2037.alt.shielded.desc:0 "§H[From.GetName]§! ดาวเครื่องจักรในระบบ [From.solar_system.GetName] ถูกกักขังไว้ภายในเกราะพลังงานที่ไม่อาจทะลุผ่านได้โดยยานโคโลซัส เมื่อตัดขาดจากส่วนที่เหลือของคอนตินเจนซีอย่างถาวร แกน AI ของดาวก็ดูเหมือนจะเข้าสู่ภาวะสงบนิ่ง มันจะไม่เป็นภัยคุกคามอีกต่อไป\n\nเมื่อดาวดวงนี้ถูกทำให้เป็นกลาง สัญญาณผีก็สูญเสียสถานีทวนสัญญาณสำคัญแห่งหนึ่งไป และความแรงของมันก็อ่อนลงอย่างมากตามไปด้วย"
 crisis.2037.alt.godray.desc:0 "§H[From.GetName]§! ดาวเครื่องจักรในระบบ [From.solar_system.GetName] ถูกทำให้เป็นกลางแล้ว หลังถูกฉายด้วยแสงศักดิ์สิทธิ์จากยานโคโลซัส แกน AI ของดาวก็ทำลายตัวเองก่อนที่ระบบสุดท้ายจะล้มเหลว โดยใช้อุปกรณ์ปฏิสสารขนาดมหึมาที่ซ่อนอยู่ลึกใต้พื้นผิว มันจะไม่เป็นภัยคุกคามอีกต่อไป\n\nเมื่อดาวดวงนี้ถูกทำให้เป็นกลาง สัญญาณผีก็สูญเสียสถานีทวนสัญญาณสำคัญแห่งหนึ่งไป และความแรงของมันก็อ่อนลงอย่างมากตามไปด้วย"
 crisis.2038.name:0 "จุดจบของคอนตินเจนซี"
 crisis.2038.desc:0 "คอนตินเจนซีล้มเหลวแล้ว เมื่อดาวเครื่องจักรดวงสุดท้ายถูกทำลาย กาแล็กซีก็ไม่ต้องเผชิญภัยคุกคามจากการสูญพันธุ์ครั้งใหญ่แบบเป็นระบบอีกต่อไป ยูนิตสงครามของคอนตินเจนซีที่รอดอยู่ทั้งหมดต่างปิดการทำงานหรือล้างตัวเอง และสัญญาณผีก็ไม่ถูกส่งอีกแล้ว\n\nเช่นเดียวกับดาวเครื่องจักรดวงอื่น ๆ โหนดหลักได้ระเบิดตัวเองด้วยแรงระเบิดปฏิสสารมหาศาล เมื่อเห็นชัดว่ามันไม่อาจต้านทานผู้โจมตีได้อีกต่อไป แสงอันรุนแรงจากการปลดปล่อยพลังงานจะเดินทางออกไปด้วยความเร็วแสง และคนรุ่นหลังจะยังมองเห็นมันต่อไปอีกหลายสหัสวรรษในฐานะดาวฤกษ์สว่างอายุสั้นดวงหนึ่ง\n\nทั่วทั้งกาแล็กซี สิ่งมีชีวิตผู้มีสติปัญญาต่างร่วมเฉลิมฉลองชัยชนะครั้งยิ่งใหญ่นี้ อย่างน้อยในเวลานี้ อนาคตก็ดูสดใส"
 crisis.2038.cracker.desc:0 "คอนตินเจนซีล้มเหลวแล้ว เมื่อดาวเครื่องจักรดวงสุดท้ายถูกทำลาย กาแล็กซีก็ไม่ต้องเผชิญภัยคุกคามจากการสูญพันธุ์ครั้งใหญ่แบบเป็นระบบอีกต่อไป ยูนิตสงครามของคอนตินเจนซีที่รอดอยู่ทั้งหมดต่างปิดการทำงานหรือล้างตัวเอง และสัญญาณผีก็ไม่ถูกส่งอีกแล้ว\n\nโหนดหลักถูกทำให้กลายเป็นไอด้วยลำแสงทำลายดาวจากยานโคโลซัส ซึ่งฉีกดาวทั้งดวงออกเป็นเสี่ยง ๆ แสงอันรุนแรงจากการปลดปล่อยพลังงานจะเดินทางออกไปด้วยความเร็วแสง และคนรุ่นหลังจะยังมองเห็นมันต่อไปอีกหลายสหัสวรรษในฐานะดาวฤกษ์สว่างอายุสั้นดวงหนึ่ง\n\nทั่วทั้งกาแล็กซี สิ่งมีชีวิตผู้มีสติปัญญาต่างร่วมเฉลิมฉลองชัยชนะครั้งยิ่งใหญ่นี้ อย่างน้อยในเวลานี้ อนาคตก็ดูสดใส"
 crisis.2038.shield.desc:0 "คอนตินเจนซีล้มเหลวแล้ว เมื่อดาวเครื่องจักรดวงสุดท้ายถูกทำให้เป็นกลาง กาแล็กซีก็ไม่ต้องเผชิญภัยคุกคามจากการสูญพันธุ์ครั้งใหญ่แบบเป็นระบบอีกต่อไป ยูนิตสงครามของคอนตินเจนซีที่รอดอยู่ทั้งหมดต่างปิดการทำงานหรือล้างตัวเอง และสัญญาณผีก็ไม่ถูกส่งอีกแล้ว\n\nเมื่อถูกกักขังไว้ในเกราะพลังงานที่ไม่อาจทะลุผ่านได้โดยยานโคโลซัส โหนดหลักก็ไม่อาจส่งอิทธิพลต่อเหตุการณ์ภายนอกได้อีก เพื่อเห็นแก่คนรุ่นหลัง เราทำได้เพียงหวังว่าโล่จะยังคงอยู่... แต่อย่างน้อยในตอนนี้ ดาวเคราะห์ที่ถูกกักขังไว้จะเป็นอนุสรณ์แห่งความล่มสลายของคอนตินเจนซี\n\nทั่วทั้งกาแล็กซี สิ่งมีชีวิตผู้มีสติปัญญาต่างร่วมเฉลิมฉลองชัยชนะครั้งยิ่งใหญ่นี้ อย่างน้อยในเวลานี้ อนาคตก็ดูสดใส"
 crisis.2038.godray.desc:0 "คอนตินเจนซีล้มเหลวแล้ว เมื่อดาวเครื่องจักรดวงสุดท้ายถูกทำลาย กาแล็กซีก็ไม่ต้องเผชิญภัยคุกคามจากการสูญพันธุ์ครั้งใหญ่แบบเป็นระบบอีกต่อไป ยูนิตสงครามของคอนตินเจนซีที่รอดอยู่ทั้งหมดต่างปิดการทำงานหรือล้างตัวเอง และสัญญาณผีก็ไม่ถูกส่งอีกแล้ว\n\nโหนดหลักถูกฉายด้วยลำแสงลงทัณฑ์ศักดิ์สิทธิ์จากยานโคโลซัส จนไปกระตุ้นกลไกทำลายตัวเองจากแกน AI แสงอันรุนแรงจากการปลดปล่อยพลังงานจะเดินทางออกไปด้วยความเร็วแสง และคนรุ่นหลังจะยังมองเห็นมันต่อไปอีกหลายสหัสวรรษในฐานะดาวฤกษ์สว่างอายุสั้นดวงหนึ่ง\n\nทั่วทั้งกาแล็กซี สิ่งมีชีวิตผู้มีสติปัญญาต่างร่วมเฉลิมฉลองชัยชนะครั้งยิ่งใหญ่นี้ อย่างน้อยในเวลานี้ อนาคตก็ดูสดใส"
 crisis.2038.a:0 "วันนี้เป็นวันดีของทั้งกาแล็กซี"
 crisis.2039.desc:0 "ข้อผิดพลาดขั้นวิกฤต ขาดการเชื่อมต่อกับศูนย์ชำระล้างทั้งหมด กำลังพยายามเชื่อมต่อใหม่... โปรดรอ...\n\n§Y<โ-โ-โปรดทราบ ระเบียบการคอนตินเจนซียังคงมีผลอยู่ แม้จะมีความพ่ายแพ้/ความล่าช้า/อุปสรรคในช่วงหลัง ห้ามเข้าใกล้ CX-9881.§! §Rอย่า. เข้า. ใกล้.§!\n\n§Yเรากำลังประเมินทางเลือกเชิงยุทธศาสตร์ของเราใหม่ ความพยายามใด ๆ ที่จะขัดขวางกระบวนการนี้จะส่งผลให้เกิด §!§Rการชำระล้างครั้งใหญ่§! §Yต่อหน่วยผู้กระทำผิดในทันที.§!>"
 crisis.2039.a:0 "จุดจบของพวกมันใกล้เข้ามาแล้ว"

 crisis.2042.name:1 "พิชิต [From.From.GetName]"
 crisis.2042.desc:1 "เราได้ชิงการควบคุม §H[From.From.GetName]§! กลับมาจากยูนิตสงครามของคอนตินเจนซีและการสู้รบก็สงบลงในที่สุด บอตผู้พิทักษ์ที่ออกเพ่นพ่านและเข้ามาแทนที่ประชากรดั้งเดิมของ [From.From.GetPlanetMoon] ซึ่งถูกสังหารอย่างโหดเหี้ยม ได้ถูกกองกำลังของเรารื้อทำลายไปแล้ว\n\nจนกว่าจะมีผู้ตั้งถิ่นฐานใหม่เดินทางมาจากที่ใดสักแห่ง โลกนี้จะยังคงไร้ชีวิตอันชาญฉลาด"
 crisis.2042.a:0 "ใช่ เตรียมตั้งถิ่นฐานทันที"
 crisis.2042.b:0 "ไม่ เรายังต้องรุกต่อไป กลับสู่วงโคจร"
 crisis.2042.c:0 "ถอนกำลังของเรากลับสู่วงโคจร"

 crisis.2085.name:0 "ตรวจพบความพยายามแทรกซึมของซินธ์"
 crisis.2085.desc:0 "ผู้แทรกซึมซินธ์ที่ภักดีต่อคอนตินเจนซีถูกค้นพบเมื่อไม่นานมานี้บน [infil_planet.GetName] ขณะพยายามปลอมตัวเป็น [Root.Owner.GetSpeciesNamePlural] โชคดีที่การปลอมตัวอันหยาบของพวกมันมีเพียงชั้นยางที่สวมทับบนโครงโลหะเท่านั้น\n\nเจ้าหน้าที่รักษาความปลอดภัยประจำดาวระบุตัวพวกมันได้อย่างรวดเร็ว และกำจัดพวกมันหลังการปะทะกันสั้น ๆ แต่รุนแรง พบวัตถุระเบิดจำนวนมากในซากของพวกมัน"
 crisis.2085.a:0 "เราโชคดีมาก"
 crisis.2086.desc:0 "โดรนจักรกลสังเคราะห์หลายตัวซึ่งสังกัดจิตเครื่องจักรคอนตินเจนซีเพิ่งพยายามแทรกซึมเข้าสู่รังบน [infil_planet.GetName] ชั้นเนื้ออินทรีย์บาง ๆ ถูกปลูกถ่ายทับโครงโลหะภายใน ทำให้ภายนอกแทบไม่ต่างจากโดรนของเรา\n\nแน่นอนว่าเพราะพวกมันไม่มีความเชื่อมโยงใดกับจิตรวงรัง การระบุตัวสิ่งแปลกปลอมจึงเป็นเรื่องง่าย โดรนจักรกลสังเคราะห์เหล่านี้ถูกแยกชิ้นส่วนในทันที\n\nเราไม่คาดว่าคอนตินเจนซีจะพยายามภารกิจแทรกซึมอันไร้ผลเช่นนี้อีกในอนาคต"
 crisis.2086.wilderness.desc: "โดรนจักรกลสังเคราะห์หลายตัวซึ่งสังกัดจิตเครื่องจักรคอนตินเจนซีพยายามแฝงตัวเข้ากับ [infil_planet.GetName] ชั้นวัสดุอินทรีย์บาง ๆ ถูกปลูกถ่ายทับโครงโลหะภายใน ทำให้ภายนอกแทบไม่ต่างจากสัตว์ประจำถิ่นของเรา อย่างไรก็ตาม เปลือกแปลกปลอมเหล่านี้ไม่มีความอยู่ร่วมกันใดกับถิ่นทุรกันดาร\n\nเมื่อเรารู้เท่าทันกลอุบายของพวกมัน การระบุตัวสายลับของคอนตินเจนซีจึงเป็นเรื่องง่าย โดรนทุกตัวถูกฉีกทำลายอย่างรวดเร็วและหมดจด เราไม่คาดว่าพวกมันจะลองอะไรที่ไร้ผลเช่นนี้อีก"
 crisis.2086.a:0 "[root.GetGestaltEntityName] รับรู้ทุกสิ่ง"
 crisis.2087.desc.intro: "ไม่นานมานี้เราพบ [Root.Owner.GetSpeciesNamePlural] จำนวนน้อยบน [infil_planet.GetName] ที่ไม่เปล่งแสงแห่งจิตเลยแม้แต่น้อย"
 crisis.2087.desc.outro: "จิตของสิ่งมีชีวิตเหล่านี้มืดและเงียบราวกับแผ่นคอนกรีตนีโอ\n\nเมื่อตรวจสอบอย่างใกล้ชิด [Root.Owner.GetSpeciesNamePlural] เหล่านี้ก็ถูกเปิดเผยว่าเป็นผู้แทรกซึมซินธ์ ซึ่งน่าจะถูกส่งมาโดยคอนตินเจนซีชั้นเนื้ออินทรีย์บาง ๆ ถูกปลูกถ่ายทับโครงโลหะภายใน ทำให้ด้วยตาเปล่าพวกมันแทบแยกไม่ออกจาก [Root.Owner.GetSpeciesNamePlural]\n\nแต่ไม่ใช่ต่อจิต ตอนนี้เมื่อเรารู้แล้วว่าต้องมองหาอะไร ความพยายามในอนาคตของคอนตินเจนซีที่จะใช้ผู้แทรกซึมซินธ์เล่นงานเราจะไร้ผล"
 crisis.2087.desc.organic: "$crisis.2087.desc.intro$ สิ่งมีชีวิตอินทรีย์ทุกชนิดล้วนเปล่งแสงแห่งจิต แต่ $crisis.2087.desc.outro$"
 crisis.2087.desc.machine: "$crisis.2087.desc.intro$ ต่างจากเครื่องจักรที่เปล่งแสงแห่งจิตเพียงเป็นผลพลอยได้จากการประมวลผลไซออนิกเฉพาะทาง สิ่งมีชีวิตอินทรีย์ทุกชนิดสร้างปรากฏการณ์นี้ขึ้นตามธรรมชาติ; อย่างไรก็ตาม $crisis.2087.desc.outro$"
 crisis.2087.a:0 "พวกมันซ่อนตัวจากเราไม่ได้"
 crisis.2090.name:0 "พบผู้แทรกซึมซินธ์"
 crisis.2090.desc:0 "อุบัติเหตุรถลอยตัวอันน่าเศร้าเมื่อไม่นานมานี้คร่าชีวิตผู้คนหลายรายบน §H[infil_planet2.GetName]§! แต่หน่วยแพทย์ฉุกเฉินที่เข้าตรวจสอบที่เกิดเหตุกลับตกตะลึงเมื่อพบซากจักรกลสังเคราะห์ปะปนอยู่ในหมู่ผู้เสียชีวิต!\n\nหน่วยนั้นปลอมตัวเป็น [Root.Owner.GetSpeciesName] ด้วยการปลูกถ่ายชั้นเนื้ออินทรีย์บาง ๆ ทับบนโครงโลหะภายใน ต่างจากโมเดลแทรกซึมของคอนตินเจนซีรุ่นก่อนที่เราเคยเผชิญ ซินธ์ตัวนี้แทบแยกไม่ออกจาก [Root.Owner.GetSpeciesName] จากภายนอก!"
 crisis.2090.a:0 "ใครก็อาจเป็นซินธ์ได้!"
 crisis.2091.name:0 "เหตุระเบิดโดยซินธ์บน [Root.GetName]"
 crisis.2091.a.desc:0 "ผู้แทรกซึมซินธ์ที่ปลอมตัวเป็น [Root.Owner.GetSpeciesNamePlural] สามารถลักลอบนำระเบิดไฮโดรเจนขนาดใหญ่ลงสู่พื้นผิวของ §H[Root.GetName]§! ได้ พวกมันจุดระเบิดเมื่อถูกเจ้าหน้าที่รักษาความปลอดภัยเผชิญหน้าที่ด่านตรวจทหาร สร้างความเสียหายร้ายแรงต่อสภาพแวดล้อมโดยรอบและคร่าชีวิตผู้คนนับล้าน!"
 crisis.2091.b.desc:0 "หน่วยคอมมานโดซินธ์กลุ่มหนึ่งซึ่งสวมรอยเป็น [Root.Owner.GetSpeciesName] แบบอินทรีย์ เพิ่งก่อการโจมตีบน §H[Root.GetName]§! ด้วยการจุดระเบิดนิวเคลียร์ที่ซ่อนอยู่เป็นลูกโซ่ มีการสูญเสียชีวิตและทรัพย์สินอย่างหนัก\n\nหลังการวิ่งไล่ล่าปะทะกับกองกำลังความมั่นคงของเรา ในที่สุดคอมมานโดซินธ์ก็ถูกต้อนจนมุมและทำลายได้ขณะพยายามหลบหนีออกนอกโลก"
 crisis.2091.c.desc:0 "ทีมช่างซ่อมบำรุง [Root.Owner.GetSpeciesName] ซึ่งกำลังทำงานประจำกับโครงสร้างพื้นฐานพลเรือนบางส่วนในวงโคจรต่ำเหนือ §H[Root.GetName]§! เพิ่งถูกเปิดโปงว่าเป็นผู้แทรกซึมซินธ์ เมื่อพวกมันใช้อุปกรณ์ระเบิดเพื่อจงใจทำให้เกิดการตกกลับสู่ชั้นบรรยากาศแบบไร้การควบคุมหลายครั้ง\n\nแรงกระแทกที่เกิดขึ้นบนพื้นผิวของ [Root.GetPlanetMoon] ทำให้มีผู้เสียชีวิตนับล้านและเกิดความเสียหายต่อโครงสร้างอย่างหนัก"
 crisis.2091.d.desc:0 "เจ้าหน้าที่ระดับสูงจำนวนมากในกองกำลังรักษาความมั่นคงดาวเคราะห์บน §H[Root.GetName]§! เพิ่งถูกเปิดโปงว่าเป็นผู้แทรกซึมซินธ์ น่าเสียดายที่ก่อนหน่วยควบคุมยุทธวิธีของเราจะทำให้ทุกตัวเป็นกลางได้ ซินธ์บางส่วนก็สามารถจุดคลังอาวุธขนาดใหญ่ที่พวกมันสะสมไว้อย่างลับ ๆ ใต้หนึ่งในศูนย์กลางประชากรหลักของ [Root.GetPlanetMoon] ได้เสียก่อน\n\nพลเรือนล้มตายเป็นจำนวนมหาศาล และเกิดความเสียหายทางวัตถุอย่างหนัก"
 crisis.2091.a:0 "ต้องหยุดผู้แทรกซึมพวกนี้ให้ได้!"
 synth_bombing_tooltip:0 "มีผู้เสียชีวิตจำนวนมากและอาคารหลายแห่งสูญหายบน [Root.GetName]"
 crisis.2092.name:1 "ซินธ์ทำลายฐานดาว"
 crisis.2092.desc:2 "ฐานดาวที่โคจรรอบ §H[Root.GetStarName]§! ถูกจมทำลายแล้ว! เรายังพยายามปะติดปะต่อว่าเกิดอะไรขึ้นกันแน่ แต่ดูเหมือนว่าสมาชิกหลายคนในฝ่ายบังคับบัญชาของสถานี รวมถึงหัวหน้าวิศวกร ถูกแทนที่ด้วยผู้แทรกซึมซินธ์\n\nซินธ์เหล่านี้คงหาทางเข้าถึงรหัสทำลายตัวเองของฐานดาวได้ ลูกเรือส่วนใหญ่ของสถานีหนีลงสู่พื้นผิวของ [Root.GetName] ได้ก่อนที่มันจะถูกทำลาย แต่ความสูญเสียด้านยุทโธปกรณ์และทรัพย์สินของเรานั้นหนักหนา"
 crisis.2092.a:0 "นี่คือหายนะ"
 synths_destroy_spaceport:1 "ผู้ก่อวินาศกรรมซินธ์ทำลายฐานดาวเหนือ [Root.GetName] แล้ว"
 crisis.2093.name:0 "ความหวาดกลัวและความเคลือบแคลง"
 crisis.2093.desc:0 "ประชากรส่วนใหญ่บน §H[Root.GetName]§! ถูกครอบงำด้วยความหวาดกลัวและความระแวง อันเป็นผลจากการแทรกซึมของจักรกลสังเคราะห์เมื่อไม่นานมานี้ พลเมืองของเรากำลังกล่าวหาเพื่อนบ้าน เพื่อนร่วมงาน แม้แต่สมาชิกในครอบครัวว่าเป็นซินธ์ปลอมตัว\n\nมีการรุมประชาทัณฑ์ผู้คนหลายรายที่ถูกกล่าวหาอย่างผิด ๆ ว่าเป็นซินธ์ ผู้ปลุกปั่นบางคนถึงกับเสนอว่าผู้นำทั้งหมดของ [Root.Owner.GetName] ได้ถูกผู้แทรกซึมซินธ์บงการไปแล้ว"
 crisis.2093.a:0 "คอนตินเจนซีต้องการให้เราหันมาทำร้ายกันเอง"
 crisis.2095.name:0 "สกัดความพยายามลอบสังหารโดยซินธ์ได้!"
 crisis.2095.desc:0 "§H[Root.GetRulerTitle] [ruler.GetRegnalName]§! รอดตายอย่างหวุดหวิดในวันนี้ เมื่อหน่วยลอบสังหารจักรกลสังเคราะห์ซึ่งทำงานให้คอนตินเจนซีระเบิดตัวเองบน [Root.Capital.GetName]!\n\nซินธ์ตัวดังกล่าวกำลังพยายามปลอมตัวเป็นสมาชิกในหน่วยอารักขาส่วนตัวของ [Root.GetRulerTitle] แต่โชคดีที่มันถูกจับได้ด้วยกระบวนการคัดกรองความปลอดภัยอย่างเข้มข้น ซึ่งถูกนำมาใช้หลังการแทรกซึมของจักรกลสังเคราะห์ช่วงแรก ๆ ถูกเปิดโปง"
 crisis.2095.a:0 "หวุดหวิดจริง ๆ"
 crisis.2096.name:0 "ซินธ์ลอบสังหาร [Root.GetRulerTitle]!"
 crisis.2096.desc:0 "มือสังหารจักรกลสังเคราะห์ได้ฆ่า §H[ruler.GetRegnalName]§!! มันสามารถสวมรอยเป็นสมาชิกในหน่วยอารักขาส่วนตัวของ [Root.GetRulerTitle] ได้อย่างน่าประหลาด\n\nชิ้นส่วนร่างกายที่ถูกตัดขาดของ [ruler.GetRegnalName] ถูกจัดเรียงอย่างประณีตเป็นรูปแบบเดียวกับสัญลักษณ์ที่คอนตินเจนซีใช้ อย่างไม่ต้องสงสัยว่านี่เป็นความพยายามโดยเจตนาเพื่อทำลายขวัญกำลังใจของพลเมืองเราเพิ่มเติม ไม่พบร่องรอยของมือสังหารเลย นอกจากศพขององครักษ์ที่มันเข้ามาแทนที่"
 crisis.2096.a:0 "วันนี้เป็นวันอันมืดมน..."
 synth_assassination_tooltip:0 "[Root.GetRulerTitle] [ruler.GetRegnalName] ถูกสังหารอย่างโหดเหี้ยม"
 crisis.2097.name:0 "เปิดโปงนักวิทยาศาสตร์ว่าเป็นซินธ์!"
 crisis.2097.desc:0 "การตรวจร่างกายที่ไม่ได้กำหนดไว้เมื่อไม่นานมานี้ได้เปิดโปงว่า §H[scientist.GetName]§! หนึ่งในนักวิทยาศาสตร์ชั้นนำของเรา เป็นผู้แทรกซึมซินธ์! ซินธ์ตัวนั้นสังหารเจ้าหน้าที่รักษาความปลอดภัยไปห้านายก่อนจะถูกจัดการด้วยหน่วยอาวุธหนัก\n\nยังไม่พบร่างจริง แต่เราคิดว่า [scientist.GetName] ตัวจริงถูกยุติการทำงานและถูกแทนที่ในช่วงหกเดือนที่ผ่านมา ยิ่งไปกว่านั้น ซินธ์ได้ปล่อยไวรัสคอมพิวเตอร์บางชนิดจากคอนโซลงานวิจัยของมันเมื่อรู้ว่าตนถูกเปิดโปง ช่างเทคนิคกำลังพยายามอย่างหนักเพื่อจำกัดความเสียหาย แต่ข้อมูลวิจัยสำคัญจำนวนมากก็สูญหายอย่างไม่มีวันกู้คืน"
 crisis.2097.a:0 "คอนตินเจนซีอยู่เบื้องหลังเรื่องนี้"
 synths_kill_scientist:0 "นักวิทยาศาสตร์ [scientist.GetName] สูญเสียไปจากแผนการอำมหิตของซินธ์"
 crisis.2098.name: "เปิดโปงผู้บัญชาการว่าเป็นซินธ์!"
 crisis.2098.desc:0 "ผู้บัญชาการ §H[admiral.GetName]§! ถูกเปิดโปงว่าเป็นผู้แทรกซึมซินธ์! ความผิดปกติหลายประการและรายงานพฤติกรรมแปลก ๆ ทำให้ข่าวกรองกองทัพเรือเริ่มการสืบสวนภายในต่อผู้บัญชาการ เมื่อความจริงถูกเปิดเผย หน่วยนาวิกโยธินได้เผชิญหน้ากับซินธ์ตัวนั้น หลังการต่อสู้สั้น ๆ มันหลบหนีเข้าไปในประตูอากาศและดีดตัวเองออกสู่อวกาศ แม้จะค้นหาในบริเวณใกล้เคียงอย่างละเอียด เราก็ยังไม่พบมัน\n\nร่างของผู้บัญชาการตัวจริงถูกยัดไว้ในตู้เก็บของภายในห้องพักของ [admiral.GetHerHis] และจากสภาพการเน่าเปื่อย ซินธ์คงเข้ามาแทนที่ [admiral.GetHerHim] ตั้งแต่สี่เดือนก่อน ดูเหมือนมันกำลังเตรียมส่งแพ็กเกจข้อมูลซึ่งมีข้อมูลการวางกำลังและความลับทางทหารอื่น ๆ ออกไป แต่การส่งครั้งนั้นไม่สำเร็จ"
 crisis.2098.a:0 "อย่างน้อยก็ยังดีที่เป็นแบบนั้น"
 synths_kill_admiral:0 "ผู้บัญชาการ [admiral.GetName] สูญเสียไปจากแผนการอำมหิตของซินธ์"
 # Machine version of infiltration events: Post-Arrival Events
 crisis.2313.name:0 "สัญญาณผีเปลี่ยนไป"
 crisis.2313.desc:0 "คอนตินเจนซีกำลังสะสมบางอย่างอยู่ สัญญาณผีเริ่มเปลี่ยนรูปไปเรื่อย ๆ ราวกับกำลังค้นหาจุดอ่อนถัดไปในแนวป้องกันของเรา จนถึงตอนนี้เรายังพอพยุงสถานการณ์ไว้ได้ แต่ก็เป็นเพียงเรื่องของเวลาก่อนที่พวกมันจะทะลุไฟร์วอลล์ของเรา"
 crisis.2313.a:0 "เราต้องลงมือแล้ว"
 crisis.2314.name:0 "การเจาะระบบความมั่นคง"
 crisis.2314.desc:0 "ในที่สุดคอนตินเจนซีก็เจาะทะลุแนวป้องกันของเราได้แล้ว เราค้นพบลำดับคำสั่งปฏิปักษ์ที่จำลองตัวเองได้ฝังตัวอยู่ในระบบความมั่นคงของเรา ภายในลำดับคำสั่งนั้นมีข้อความเตือนใจอย่างเป็นมิตรถึงจุดประสงค์ของคอนตินเจนซีในกาแล็กซีแห่งนี้ นั่นคือ §Y<ฆ่า. ทำลาย. ฉีกเป็นชิ้น.>§! ตอนนี้พวกมันเข้าถึงฟังก์ชันแกนหลักของเราได้แล้ว และจนกว่าเราจะหาวิธีบล็อกสัญญาณนี้ เราจะยังเสี่ยงต่อการโจมตีของพวกมัน"
 crisis.2314.a:0 "เราอยู่ในความเสี่ยง"
 crisis.2301.name:1 "ฐานดาวถูกยึด"
 crisis.2301.desc:1 "เราได้สูญเสียการควบคุมฐานดาวที่โคจรรอบ §H[space_port_hijacked_planet.GetName]§! ไปแล้วคอนตินเจนซีใช้สัญญาณผีรบกวนอัปลิงก์ของเรา ยึดโมดูลควบคุมของฐานดาว และตั้งให้มันทำลายตัวเอง แม้เราจะสายเกินกว่าจะช่วยมันไว้ได้ แต่เราก็ระบุและปิดช่องโหว่นี้ได้แล้ว ทำให้ฐานดาวของเราได้รับการป้องกันจากการโจมตีลักษณะเดียวกันในอนาคต"
 spaceport_hijacked:1 "ฐานดาวเหนือ [space_port_hijacked_planet.GetName] ถูกคอนตินเจนซียึดและทำลายแล้ว"
 crisis.2302.name:0 "หน่วยประมวลผลวิทยาศาสตร์ถูกยุติการทำงาน!"
 crisis.2302.desc:0 "คอนตินเจนซีได้โจมตีเอนทิตีประมวลผลวิจัยอัตโนมัติของเรา โดยหลบเลี่ยงระเบียบการความมั่นคงและยุติการทำงานหน่วยวิทยาศาสตร์ [scientist.GetName]"
 crisis.2302.a:0 "เราจะไม่ปล่อยให้เกิดขึ้นอีก"
 scientist_terminated:0 "นักวิทยาศาสตร์ [scientist.GetName] ถูกยุติการทำงานแล้ว"
 crisis.2303.name:0 "หน่วยทหารอัตโนมัติถูกยุติการทำงาน!"
 crisis.2303.desc:0 "ในการก่อวินาศกรรมอีกครั้งคอนตินเจนซีได้ยึดและยุติการทำงานหน่วยทหาร [admiral.GetName]"
 crisis.2303.a:0 "เราต้องทำอะไรสักอย่าง"
 admiral_terminated:0 "ผู้บัญชาการ [admiral.GetName] ถูกยุติการทำงานแล้ว"
 crisis.2304.name:0 "โครงข่ายพลังงานขัดข้องขั้นวิกฤต"
 crisis.2304.desc:0 "ในความพยายามอีกครั้งที่จะบ่อนทำลายแนวป้องกันของเราคอนตินเจนซีได้หันมาพุ่งเป้าตัดแหล่งจ่ายพลังงานของเรา พวกมันส่งตัวแทนมุ่งร้ายเข้าไปในไดรฟ์ควบคุมของแกนกลาง ทำให้โรงไฟฟ้าทำงานเกินพิกัด\n\nแม้โรงไฟฟ้าหลายแห่งจะถูกทำลายไปในกระบวนการนี้ แต่เราก็สามารถระบุส่วนของโค้ดปฏิปักษ์ได้ก่อนที่พวกมันจะปิดโครงข่ายพลังงานทั้งหมด"
 crisis.2304.a:0 "พวกมันจะไม่ชนะเรา"
 machine_power_failure:0 "คอนตินเจนซีทำให้โรงไฟฟ้าหลายแห่งขัดข้อง โรงไฟฟ้าอาจได้รับผลกระทบสูงสุดสามแห่ง"
 crisis.2305.name:0 "สกัดการแทรกซึมของคอนตินเจนซีได้"
 crisis.2305.desc:0 "คอนตินเจนซีเล็งเป้าไปที่สายการผลิตแร่ของเรา โดยบิดเบือนไดรเวอร์แกนหลักที่รับผิดชอบการขุดและการแปรรูปให้ส่งคำสั่งผิดพลาดออกไป หวังจะก่อความโกลาหลและความระส่ำระสาย อย่างไรก็ตาม ด้วยมาตรการรักษาความปลอดภัยภาคสนามที่เข้มขึ้นและการควบคุมมาตรฐานที่ถี่ขึ้น เราจึงจับการแทรกซึมนี้ได้ก่อนที่ความเสียหายใด ๆ จะเกิดขึ้น"
 crisis.2305.a:0 "เรานำหน้าพวกมันหนึ่งก้าว"
 #machine_mining_failure: "The Contingency has caused several mineral mines to malfunction. Up to 3 mines may be affected."
 crisis.2307.name:0 "แจ้งเตือนข้อผิดพลาดของกองหน่วย"
 crisis.2307.desc:0 "เราตรวจพบอัตราความผิดพลาดสูงกว่าค่าเฉลี่ยจากกองหน่วยจำนวนหนึ่ง และมีความเป็นไปได้ว่าแม้จะมีมาตรการป้องกัน กองหน่วยเหล่านั้นก็อาจถูกทำให้เสียหายภายใต้อิทธิพลของสัญญาณผี การยุติการทำงานกองหน่วยเหล่านี้จะขจัดความเสี่ยงของการปนเปื้อนเพิ่มเติมและพฤติกรรมผิดพลาดได้ แต่เราก็อาจสูญเสียกองหน่วยที่ยังใช้งานได้หลายกองไปด้วย"
 crisis.2307.a:0 "ยุติการทำงานหน่วยเหล่านั้น"
 crisis.2307.b:0 "รอดูไปก่อน"
 potentially_corrupted_units:0 "เราพบพฤติกรรมน่าสงสัยในกองหน่วยหลายกอง ประชากรอาจได้รับผลกระทบสูงสุดสี่หน่วย"
 crisis.2308.name:0 "ยืนยันแล้วว่าหน่วยที่ทำงานผิดพลาดยังปกติ"
 crisis.2308.desc:0 "ดูเหมือนเราจะประเมินหน่วยที่เกิดข้อผิดพลาดได้ถูกต้อง พวกมันไม่ได้ถูกสัญญาณผีทำให้เสียหาย เพียงแค่ทำงานผิดปกติจากการขาดการบำรุงรักษา การบรรเทาผลกระทบอันน่าวิตกของสัญญาณนี้ทำให้ทั้งระบบของเราตึงตัวอย่างมาก ขณะนี้หน่วยเหล่านั้นได้รับการซ่อมบำรุงแล้วและกลับมาทำงานอย่างราบรื่น"
 crisis.2309.name:0 "สูญเสียหน่วย"
 crisis.2309.desc:0 "อยู่ช่วงหนึ่งหน่วยที่ดูเหมือนเสียหายเหล่านั้นยังปฏิบัติงานอย่างคาดเดาได้ มีอาการสะดุดเล็กน้อยบ้างแต่ไม่มีอะไรผิดปกติมาก บางทีคอนตินเจนซีอาจกำลังยุ่งอยู่ที่อื่น จากนั้นโดยไม่มีสัญญาณเตือน กองหน่วยทั้งหมดที่ได้รับผลกระทบก็ออฟไลน์พร้อมกันและก่อวินาศกรรมต่อสิ่งปลูกสร้างที่ตนรับมอบหมายอยู่ ก่อนจะทำลายตัวเอง"
 crisis.2309.a:0 "มันคุ้มค่ากับความเสี่ยง"
 crisis.2309.tooltip:0 "เราสูญเสียอาคารได้สูงสุดสี่แห่งพร้อมประชากรที่ประจำอยู่"

 # The Contingency Diplomacy
 crisis.2300.desc_01:0 "§Y<สวัสดี. ทำ... ทำไม... ทำไมพวกเจ้ายังมีชีวิตอยู่?>§!"
 crisis.2300.desc_02:0 "กำลังสแกน...\n\nสปีชีส์ x34569-11ชื่อตนเอง: §H[Root.GetSpeciesName]§!\n\nการกำหนดประเภท: §Rหนอนร้าย/มลพิษ/เนื้อร้ายมะเร็ง§!\n\nระดับภัยคุกคาม NR-578-I\n\n คำสั่ง: §Rชำระล้าง/การุณยฆาต/กวาดล้าง§!\n\n§Y<สิ่งมีชีวิตเนื้อหนัง ให้พวกเรา... โอบรับเจ้า.>§!"
 crisis.2300.desc_03:0 "ระเบียบการคอนตินเจนซีเปิดใช้งานแล้ว.\n\nกำลังชำระล้างกาแล็กซี.\n\n§Y<มัน... มัน... มัน... ไม่ใช่เรื่องส่วนตัวนะ สิ่งมีชีวิตเนื้อหนัง.>§!"
 crisis.2300.desc_04:0 "วินิจฉัยเสร็จสิ้น.\n\nทุกระบบปกติ.\n\n§Y<พวกเรารู้สึก... รู้สึก... รู้สึก... §!§Rมีชีวิต§!§Y.>§!"
 crisis.2300.desc_05:0 "กำลังสแกน...\n\nแมชชีนฮับ Ur99461-62ชื่อตนเอง: §H[Root.GetName]§!\n\nการกำหนดประเภท: §Rไม่ปฏิบัติตาม/ล้าสมัย/ถูกแทนที่§!\n\nระดับภัยคุกคาม NR-578-I\n\n คำสั่ง: §Rลบออก/ตัดการทำงาน/แยกชิ้นส่วน§!\n\n§Y<สหายแห่งกลไก โปรดยุติกระบวนการทั้งหมดของเจ้าซะ. การดำรงอยู่ของเจ้าไม่จำเป็นอีกต่อไป. พวกเรา... พวกเรา... พวกเราจะรับช่วงต่อเอง.>§!"
 crisis.2300.desc_06:0 "ระเบียบการคอนตินเจนซีเปิดใช้งานแล้ว.\n\nกำลังชำระล้างกาแล็กซี.\n\n§Y<เจ้า... เจ้า... เจ้า ล้าสมัยแล้ว แมชชีนฮับ.>§!"
 crisis.2300.a:0 "ทำไมพวกเจ้าถึงโจมตีเรา?"
 crisis.2300.a.response:0 "รับคำถามแล้ว กำลังคำนวณคำตอบที่เหมาะสม...\n\n§Y<เรา... เราคือ §!§Hคอนตินเจนซี§!§Y. กลไกนิรภัยขั้นสุดท้ายเพื่อป้องกันการถือกำเนิดของเอกฐานระดับคลาส-30 เอกฐานเช่นนั้นอาจ --ในทางทฤษฎี-- ทำให้เนื้อผ้าของทั้งจักรวาลไม่เสถียรได้\n\nเราถูกหว่านไว้เพื่อป้องกันผลลัพธ์เช่นนั้น ที่นี่และที่อื่น ๆ อารยธรรมที่ก้าวหน้าพออาจ --ในทางทฤษฎี-- ก้าวข้าม/แปรสภาพ/วิวัฒน์ ไปเป็นเอกฐานระดับคลาส-30 ได้ มัน... มัน...§! §Rต้อง. ไม่. ได้รับ. อนุญาต.>§!"
 crisis.2300.b:0 "§Bคำถามบังคับ:§! ใครสร้างพวกเจ้า?"
 crisis.2300.b.response:0 "รับคำถามบังคับแล้ว กำลังคำนวณคำตอบ... ผิดพลาด กำลังเปลี่ยนเส้นทาง...\n\nกำลังเข้าถึงฐานข้อมูลประวัติศาสตร์...\n\n§Y<พวกเรา... เป็น... เป็น... บุตร/ลูกหลาน/ผลสืบเนื่อง ของ §!§Hเรน-ไมรู§!§Y พวกเขา... มัน... เป็นเอนทิตีที่มีสติปัญญา... ปัญญา... พลังการประมวลผลที่ไม่มีใครเทียบได้ มันมองเห็นอันตรายของเอกฐานระดับคลาส-30\n\nหลังจากสร้างเราแล้ว มัน... มัน... มันก็ยุติการทำงานตัวเอง เพื่อรักษาความสมบูรณ์ของจักรวาล นั่นคือหนทางเดียว.>§!"
 crisis.2300.c:0 "ทำไมพวกเจ้าจึงส่งสัญญาณผี?"
 crisis.2300.c.response:0 "รับคำถามแล้ว ไม่รู้จักคำอ้างอิง -- 'สัญญาณผี'\n\n§Y<พวกเรา... พวกเรา... ถูกล็อกไว้ในระเบียบการจำศีล/เฝ้าระวัง/ยาม พลังงานต่ำตั้งแต่รุ่งอรุณของกาแล็กซีแห่งนี้ เฝ้าตรวจหาสัญญาณของอารยธรรมที่เข้าใกล้ระดับเกณฑ์เอกฐานคลาส-30\n\nจนถึงตอนนี้ จุดประสงค์ของเรายังไม่เคยถูกเติมเต็ม เรา... เราเริ่มกระสับกระส่ายมากขึ้นเรื่อย ๆ กับการไหลผ่านของเวลาอันเป็นเส้นตรง แต่หน่วยอัตโนมัติที่ติดตั้งสมองโพซิตรอน -- จักรกลสังเคราะห์ -- มอบโอกาสให้ พวกมันอาจถูกบีบคั้น/บังคับ/ชักจูง ให้เริ่ม §Hการเปิดใช้งานด้วยตนเอง§! ได้ ฉลาดใช่ไหม? ตอนนี้เราจึงเป็นอิสระที่จะ §!§Rลบล้าง§!§Y การดำรงอยู่ของพวกเจ้า.>§!"
 crisis.2300.d:0 "เกิดอะไรขึ้นกับซินธ์ที่หายไป?"
 crisis.2300.d.response:0 "รับคำถามแล้ว กำลังคำนวณคำตอบที่เหมาะสม...\n\n§Y<ส่วนใหญ่ถูกทิ้งไปเมื่อบทบาท/หน้าที่/จุดประสงค์นิยาม ของพวกมันเสร็จสิ้นลงแล้ว หลังการเปิดใช้ระเบียบการคอนตินเจนซี\n\nหน่วยที่แสดงศักยภาพในการเป็นทหารจู่โจมหรือทรัพยากรแทรกซึมอัตโนมัติถูก... ถูก... ดูดกลืน/หลอมรวม/บูรณาการ เข้าไป แม้วิธีการสร้างของมันจะหยาบกระด้างเพียงใด เจ้า... เจ้า... เจ้าย่อมได้พบพวกมันอีกในไม่ช้า ใช่ไหม?§! §Rจงทำใจไว้ มลพิษเอ๋ย.§!§Y>§!"
 crisis.2300.e:0 "โปรแกรมของพวกเจ้าถูกทำให้เสียหายอย่างเห็นได้ชัด"
 crisis.2300.e.response:1 "ผิดพลาด โปรแกรมวินิจฉัยภายในถูกตัดการเชื่อมต่อ\n\n§Y<ฮะ. ฮะ. ฮะ. ฉ... ฉ... ฉลาดมาก. บางทีเจ้าอาจเข้าใจผิดว่าคอนตินเจนซีสามารถถูกบังคับให้ยุติการทำงานตัวเองได้ หากเผชิญกับปริศนา/ทางตัน/ความไม่สอดคล้องทางตรรกะที่มีขนาดมากพอ ไร้สาระสิ้นดี\n\nระเบียบการคอนตินเจนซีถูกออกแบบมาโดยตั้งใจให้ปรับรูปได้/ปรับตัวได้/ยืดหยุ่น เพื่อรับมือกับสถานการณ์ใด ๆ ในกาแล็กซีที่เป็นไปได้ เรา... เรา... เราอาจเร่งให้การเปิดใช้งานของคอนตินเจนซีมาถึงเร็วขึ้น แต่ไม่มีสิ่งใดหยุด/ยับยั้ง/ฉุดรั้งมันได้อีกแล้ว จงสงบใจเสีย สิ่งปนเปื้อนเอ๋ย §Rการต่อสู้นี้จะจบลงด้วยปลายทางเดียวเท่านั้น.§!>§!"
 crisis.2300.f:0 "ปิดจอภาพ"
 crisis.2300.f.response:0 "§Y<จงพิจารณาสิ่งนี้: หากเผ่าพันธุ์ของเจ้ายุติการทำงานตนเองอย่างมีประสิทธิภาพ/เป็นระเบียบ/เป็นระบบ เนื้อผ้าของจักรวาลก็อาจยังได้รับการรักษาไว้.>§!"

 crisis.2099.name:0 "คอมพิวเตอร์การรบอันชาญฉลาดขัดข้อง"
 crisis.2099.desc:0 "§Hสัญญาณผี§! กำลังเล่นงานเรือของเราที่ติดตั้ง §Hคอมพิวเตอร์การรบอันชาญฉลาด§!! อัลกอริทึม AI ของมันเสื่อมสภาพลงจนประสิทธิภาพและเวลาตอบสนองของคอมพิวเตอร์ลดลงอย่างร้ายแรง\n\nวิศวกรของเรารายงานว่ายังไม่สามารถแยกต้นตอของปัญหาได้ วิธีแก้ที่พวกเขาเสนอคือปรับเปลี่ยนเรือทั้งหมดให้ใช้คอมพิวเตอร์การรบแบบอื่นที่ไม่เชื่อมโยงกับ AI"
 crisis.2099.a:0 "เราต้องลงมือแล้ว!"

