 crisis.2036.name:0 "หัวใจของ Contingency"
 crisis.2036.desc:0 "หลังการทำลายโลกเครื่องจักรทั้งสี่ นักวิทยาศาสตร์สามารถสรุปจุดกำเนิดของสัญญาณ Ghost ได้แล้ว มันมาจาก §HCX-9881§! ระบบดาวที่ไม่เคยถูกบันทึกมาก่อนที่ขอบจักรวาล\n\nนี่ต้องเป็นที่ที่ Synths ทั้งหมดที่ถูกสัญญาณครอบงำเดินทางไป Contingency จะยังคงเป็นภัยคุกคามจนกว่าระบบสุดท้ายนี้จะถูกจัดการ"
 crisis.2036.desc.b:0 "หลังการทำลายโลกเครื่องจักรทั้งสี่ เราสามารถสรุปจุดกำเนิดของสัญญาณ Ghost ได้แล้ว มันมาจาก §HCX-9881§! ระบบดาวที่ไม่เคยถูกบันทึกมาก่อนที่ขอบจักรวาล\n\nนี่ต้องเป็นที่ที่ Synths ที่ถูกครอบงำทั้งหมดไป Contingency จะยังคงเป็นภัยคุกคามจนกว่าระบบสุดท้ายนี้จะถูกจัดการ"
 crisis.2036.a:0 "ต้องกำจัดมันให้สิ้นซาก"
 crisis.2037.name:0 "โลกเครื่องจักรถูกทำลาย"
 crisis.2037.desc:0 "§H[From.GetName]§! โลกเครื่องจักรในระบบ [From.solar_system.GetName] ถูกทำลาย หลังถูกโจมตีด้วยระเบิดวงโคจรอย่างหนัก AI Core ของดาวทำลายตัวเองเพื่อป้องกันการถูกจับโดยการเปิดใช้อุปกรณ์ปฏิ-สสารขนาดใหญ่ที่ซ่อนลึกใต้พื้นผิว\n\nการทำลายดาวนี้ทำให้สัญญาณ Ghost สูญเสียสถานีส่งสัญญาณสำคัญและความแรงลดลงอย่างมาก\n\nนอกจากนี้ การระเบิดบนดาวได้แพร่กระจายแร่ "§HLiving Metal§!" ขนาดใหญ่ทั่วพื้นผิว วัสดุประหลาดนี้มีคุณสมบัติเฉพาะหลายอย่าง และถูกใช้โดย Contingency ในการสร้าง warforms และโรงงานทั้งหมด"
 crisis.2037.desc.b:0 "§H[From.GetName]§! โลกเครื่องจักรศัตรูในระบบ [From.solar_system.GetName] ถูกทำลาย หลังถูกโจมตีด้วยระเบิดวงโคจรอย่างหนัก AI Core ของดาวทำลายตัวเองเพื่อป้องกันการถูกจับ โดยการเปิดใช้อุปกรณ์ปฏิ-สสารขนาดใหญ่ที่ซ่อนลึกใต้พื้นผิว\n\nการทำลายดาวนี้ทำให้สัญญาณ Ghost สูญเสียสถานีส่งสัญญาณสำคัญและความแรงลดลงอย่างมาก\n\nนอกจากนี้ การระเบิดบนดาวได้แพร่กระจายแร่ "§HLiving Metal§!" ขนาดใหญ่ทั่วพื้นผิว วัสดุประหลาดนี้มีคุณสมบัติเฉพาะหลายอย่าง และถูกใช้โดย Contingency ในการสร้าง warforms และโรงงานทั้งหมด"
 crisis.2037.a:0 "ชัยชนะของจักรวาลทั้งปวง"
 crisis.2037.alt.desc:0 "$crisis.2037.alt.desc.pt1$\n\nการสูญเสียสถานีส่งสัญญาณอีกแห่งทำให้สัญญาณ Ghost อ่อนแรงลงอีก"
 crisis.2037.alt.desc.pt1:0 "โลกเครื่องจักรอีกดวงถูกทำลาย! §H[From.GetName]§! ในระบบ [From.solar_system.GetName] ระเบิดหลังจากป้องกันดาวถูกทำลายในการต่อสู้ ตามเดิม AI Core เปิดกลไกทำลายตัวเองเพื่อป้องกันการถูกจับ"
 crisis.2037.alt.machine.desc:0 "$crisis.2037.alt.desc.pt1$\n\nการสูญเสียสถานีส่งสัญญาณอีกแห่งทำให้สัญญาณ Ghost อ่อนแรงจนสามารถบล็อกได้อย่างสมบูรณ์ ไฟร์วอลล์ของเรากลับคืนสภาพ ไดรฟ์แกนหลักยังคงทำงาน และ unit stacks ทำงานเต็มความสามารถ เราชนะเหนือพลังประมวลผลด้อยของ Contingency และพวกมันจะไม่ "§Y<Kill. Maim. Dismember.!>§!" อีกต่อไป"
 crisis.2037.alt.cracked.desc:0 "§H[From.GetName]§! โลกเครื่องจักรในระบบ [From.solar_system.GetName] ถูกทำลายด้วยลำแสง world cracker ของ Colossus อาวุธนี้ตัดผ่านพื้นผิวเกราะหนาของดาวได้ง่าย ทำให้แกนระเบิดและทำลายโรงงานสงครามใต้ดินของ Contingency\n\nการทำลายดาวนี้ทำให้สัญญาณ Ghost สูญเสียสถานีส่งสัญญาณสำคัญและความแรงลดลงอย่างมาก"
 crisis.2037.alt.shielded.desc:0 "§H[From.GetName]§! โลกเครื่องจักรในระบบ [From.solar_system.GetName] ถูกห่อหุ้มด้วยเกราะพลังงานที่ไม่สามารถทะลุโดย Colossus ถูกตัดขาดจาก Contingency ส่วนที่เหลือ AI Core ของดาวดูเหมือนเข้าสู่ภาวะหลับ มันจะไม่เป็นภัยอีกต่อไป\n\nการกำจัดดาวนี้ทำให้สัญญาณ Ghost สูญเสียสถานีส่งสัญญาณสำคัญและความแรงลดลงอย่างมาก"
 crisis.2037.alt.godray.desc:0 "§H[From.GetName]§! โลกเครื่องจักรในระบบ [From.solar_system.GetName] ถูกกำจัด หลังถูกแสงสว่างศักดิ์สิทธิ์จาก Colossus สาดใส่ AI Core ของดาวทำลายตัวเองก่อนระบบสุดท้ายล้มเหลวโดยใช้อุปกรณ์ปฏิ-สสารขนาดใหญ่ที่ซ่อนใต้พื้นผิว มันจะไม่เป็นภัยอีกต่อไป\n\nการกำจัดดาวนี้ทำให้สัญญาณ Ghost สูญเสียสถานีส่งสัญญาณสำคัญและความแรงลดลงอย่างมาก"
 crisis.2038.name:0 "จบสิ้นของ Contingency"
 crisis.2038.desc:0 "Contingency ล้มเหลว หลังการทำลายโลกเครื่องจักรสุดท้าย จักรวาลไม่ต้องเผชิญภัยคุกคามการทำลายล้างเป็นระบบอีกต่อไป warforms ที่รอดชีวิตทั้งหมดของ Contingency ปิดตัวหรือทำลายตัวเอง และสัญญาณ Ghost ไม่ถูกส่งอีก\n\nเหมือนโลกเครื่องจักรอื่น ๆ main nexus ทำลายตัวเองด้วยระเบิดปฏิ-สสารขนาดใหญ่เมื่อเห็นว่าตนไม่สามารถต้านผู้โจมตีได้ แสงพลังงานนี้เดินทางด้วยความเร็วแสง จะเห็นได้เป็นดาวสว่างชั่วคราวหลายพันปีต่อไป\n\nทั่วจักรวาล สิ่งมีชีวิตฉลาดเฉลียวเฉลิมฉลองชัยชนะครั้งยิ่งใหญ่ ชั่วคราวอย่างน้อย อนาคตดูสดใส"
 crisis.2038.cracker.desc:0 "Contingency ล้มเหลว หลังการทำลายโลกเครื่องจักรสุดท้าย จักรวาลไม่ต้องเผชิญภัยคุกคามการทำลายล้างเป็นระบบอีกต่อไป warforms ที่รอดชีวิตทั้งหมดของ Contingency ปิดตัวหรือทำลายตัวเอง และสัญญาณ Ghost ไม่ถูกส่งอีก\n\nmain nexus ถูกทำลายด้วยลำแสง world cracker จาก Colossus ทำลายดาวทั้งดวง แสงพลังงานนี้เดินทางด้วยความเร็วแสง จะเห็นเป็นดาวสว่างชั่วคราวหลายพันปีต่อไป\n\nทั่วจักรวาล สิ่งมีชีวิตฉลาดเฉลิมฉลองชัยชนะครั้งยิ่งใหญ่ ชั่วคราวอย่างน้อย อนาคตดูสดใส"
 crisis.2038.shield.desc:0 "Contingency ล้มเหลว หลังการกำจัดโลกเครื่องจักรสุดท้าย จักรวาลไม่ต้องเผชิญภัยคุกคามการทำลายล้างเป็นระบบอีกต่อไป warforms ที่รอดชีวิตทั้งหมดของ Contingency ปิดตัวหรือทำลายตัวเอง และสัญญาณ Ghost ไม่ถูกส่งอีก\n\nถูกห่อหุ้มด้วยเกราะพลังงานที่ไม่สามารถทะลุโดย Colossus main nexus ไม่สามารถมีผลต่อเหตุการณ์ภายนอก เพื่ออนาคต เราหวังว่าเกราะนี้จะคงอยู่ แต่ชั่วคราว ดาวที่ถูกห่อหุ้มจะเป็นอนุสาวรีย์แห่งความพ่ายแพ้ของ Contingency\n\nทั่วจักรวาล สิ่งมีชีวิตฉลาดเฉลิมฉลองชัยชนะครั้งยิ่งใหญ่ ชั่วคราวอย่างน้อย อนาคตดูสดใส"
 crisis.2038.godray.desc:0 "Contingency ล้มเหลว หลังการทำลายโลกเครื่องจักรสุดท้าย จักรวาลไม่ต้องเผชิญภัยคุกคามการทำลายล้างเป็นระบบอีกต่อไป warforms ที่รอดชีวิตทั้งหมดของ Contingency ปิดตัวหรือทำลายตัวเอง และสัญญาณ Ghost ไม่ถูกส่งอีก\n\nmain nexus ถูกสาดด้วยลำแสงศักดิ์สิทธิ์จาก Colossus ซึ่งกระตุ้นกลไกทำลายตัวเองของ AI Core แสงพลังงานนี้เดินทางด้วยความเร็วแสง จะเห็นเป็นดาวสว่างชั่วคราวหลายพันปีต่อไป\n\nทั่วจักรวาล สิ่งมีชีวิตฉลาดเฉลิมฉลองชัยชนะครั้งยิ่งใหญ่ ชั่วคราวอย่างน้อย อนาคตดูสดใส"
 crisis.2038.a:0 "วันนี้เป็นวันที่ยิ่งใหญ่ของจักรวาล"
 crisis.2039.desc:0 "ข้อผิดพลาดร้ายแรง การเชื่อมต่อกับ Sterilization Hubs ทั้งหมดขาด การพยายามเชื่อมต่อใหม่... โปรดรอ...\n\n§Y<โปรดระวัง. โปรโตคอล Contingency ยังมีผล แม้มีอุปสรรคหรือความล่าช้า อย่าเข้าใกล้ CX-9881.§! §Rห้ามเข้าใกล้.§!\n\n§Yเรากำลังประเมินตัวเลือกทางยุทธศาสตร์ใหม่ ความพยายามใด ๆ ที่ขัดขวางกระบวนการนี้จะส่งผลให้เกิด §!§Rการทำลายล้างจำนวนมาก§! §Yของยูนิตที่เกี่ยวข้อง.§!>"
 crisis.2039.a:0 "ความสิ้นสุดของพวกมันใกล้เข้ามาแล้ว"


 crisis.2042.name:1 "พิชิต §H[From.From.GetName]§!"
 crisis.2042.desc:1 "เราสามารถยึด §H[From.From.GetName]§! คืนจาก warforms ของ Contingency การต่อสู้สงบลงแล้ว Bots ผู้ดูแลที่เคลื่อนที่ไปรับหน้าที่แทนประชากรเดิมของ [From.From.GetPlanetMoon] ที่ถูกฆ่าล้างเผ่าพันธุ์ ถูกกองกำลังของเราทำลายเรียบร้อย\n\nจนกว่าผู้อพยพใหม่จะมาถึง ดาวดวงนี้จะยังคงว่างเปล่าจากชีวิตอัจฉริยะ"
 crisis.2042.a:0 "ใช่ เตรียมตั้งถิ่นฐานทันที"
 crisis.2042.b:0 "ไม่ เราต้องเดินหน้า ไปยังวงโคจร"
 crisis.2042.c:0 "ถอนกำลังกลับสู่วงโคจร"

 crisis.2085.name:0 "พยายามแฝงตัวของ Synth"
 crisis.2085.desc:0 "พบ Synth แฝงตัวที่จงรักภักดีต่อ Contingency บน [infil_planet.GetName] พยายามปลอมตัวเป็น [Root.Owner.GetSpeciesNamePlural] โชคดีที่การปลอมตัวหยาบๆ ของพวกมันเป็นเพียงชั้นยางครอบโครงเหล็กเท่านั้น\n\nถูกระบุโดยฝ่ายความปลอดภัยของดาวอย่างรวดเร็ว และถูกกำจัดหลังการยิงปะทะสั้นๆ แต่รุนแรง พบระเบิดจำนวนมากในซากของพวกมัน"
 crisis.2085.a:0 "เราดวงดี"

 crisis.2086.desc:0 "โดรน Synth ของ Contingency พยายามแฝงตัวใน Hive บน [infil_planet.GetName] มีชั้นเนื้อออร์แกนิกบางๆ ครอบโครงเหล็ก ทำให้ดูคล้ายโดรนของเรา\n\nแน่นอนว่าเนื่องจากไม่มีการเชื่อมต่อกับ Hive Mind การตรวจจับพวกมันจึงง่ายมาก โดรน Synth ถูกรื้อทำลายทันที\n\nเราไม่คาดว่า Contingency จะพยายามแฝงตัวอีกในอนาคต"
 crisis.2086.wilderness.desc: "โดรน Synth ของ Contingency พยายามแฝงตัวบน [infil_planet.GetName] ครอบด้วยชั้นเนื้อออร์แกนิกบางๆ ทำให้คล้ายสิ่งมีชีวิตใน Wilderness แต่พวกมันไม่สามารถเชื่อมสัมพันธ์ได้\n\nเมื่อเราตรวจพบ การระบุพวกมันจึงง่าย โดรนทุกตัวถูกทำลาย เราไม่คาดว่าจะมีการพยายามแฝงตัวแบบนี้อีก"
 crisis.2086.a:0 "The [root.GetGestaltEntityName] รู้ทุกอย่าง"

 crisis.2087.desc.intro: "พบ [Root.Owner.GetSpeciesNamePlural] จำนวนเล็กน้อยบน [infil_planet.GetName] ที่ไม่มี mind-glow เลย"
 crisis.2087.desc.outro: "จิตของสิ่งมีชีวิตเหล่านี้มืดและเงียบเหมือนแผ่นคอนกรีต\n\nตรวจสอบใกล้ๆ พบว่า [Root.Owner.GetSpeciesNamePlural] เหล่านี้เป็น Synth แฝงตัว น่าจะส่งโดย Contingency มีชั้นเนื้อออร์แกนิกบางๆ ครอบโครงเหล็ก ทำให้แทบแยกไม่ออกจาก [Root.Owner.GetSpeciesNamePlural]\n\nแต่จิตสามารถจับได้ ตอนนี้เรารู้ว่าต้องสังเกตอะไร พยายามใช้ Synth แฝงตัวในอนาคตจะไร้ผล" 
 crisis.2087.desc.organic: "$crisis.2087.desc.intro$ สิ่งมีชีวิตออร์แกนิกทุกตัวปล่อย mind-glow แต่ $crisis.2087.desc.outro$"
 crisis.2087.desc.machine: "$crisis.2087.desc.intro$ ต่างจากเครื่องจักรที่ปล่อย mind-glow เป็นผลพลอยได้จาก psionic processing โดรนออร์แกนิกทุกตัวสร้างปรากฏการณ์นี้ตามธรรมชาติ; แต่ $crisis.2087.desc.outro$"
 crisis.2087.a:0 "พวกมันซ่อนจากเราไม่ได้"

 crisis.2090.name:0 "พบ Synth แฝงตัว"
 crisis.2090.desc:0 "อุบัติเหตุรถลอยเกิดขึ้นบน §H[infil_planet2.GetName]§! มีผู้เสียชีวิตหลายราย แต่หน่วยฉุกเฉินพบซาก Synth อยู่ด้วย!\n\nโดรนถูกปลอมตัวเป็น [Root.Owner.GetSpeciesName] ด้วยชั้นเนื้อออร์แกนิกบางๆ ครอบโครงเหล็ก ต่างจากรุ่นก่อน แทบแยกไม่ออกจาก [Root.Owner.GetSpeciesName] จริง"
 crisis.2090.a:0 "ใครก็เป็น Synth ได้!"

 crisis.2091.name:0 "ระเบิด Synth บน [Root.GetName]"
 crisis.2091.a.desc:0 "Synth แฝงตัวปลอมเป็น [Root.Owner.GetSpeciesNamePlural] ลอบนำระเบิดไฮโดรเจนขนาดใหญ่ขึ้นพื้น §H[Root.GetName]§! ระเบิดเมื่อถูกตรวจพบ ทำลายรุนแรงและมีผู้เสียชีวิตเป็นล้าน"
 crisis.2091.b.desc:0 "เซลล์ commando Synth ปลอมเป็น [Root.Owner.GetSpeciesName] โจมตี §H[Root.GetName]§! ระเบิดนิวเคลียร์ซ่อน ทำให้เสียชีวิตและเสียหายต่อทรัพย์สิน หลังปะทะกับความปลอดภัย พวกมันถูกมุมและทำลาย"
 crisis.2091.c.desc:0 "ทีมซ่อม [Root.Owner.GetSpeciesName] บนวงโคจร §H[Root.GetName]§! ใช้ระเบิดทำให้เกิด re-entry ควบคุมไม่ได้ ผลกระทบต่อ [Root.GetPlanetMoon] ทำให้มีผู้เสียชีวิตเป็นล้านและเสียหายต่อโครงสร้าง"
 crisis.2091.d.desc:0 "เจ้าหน้าที่ระดับสูงในความปลอดภัยบน §H[Root.GetName]§! ถูกเปิดเผยว่าเป็น Synth บางส่วนระเบิดคลังอาวุธใต้ [Root.GetPlanetMoon] ผู้บริสุทธิ์เสียชีวิตจำนวนมาก และมีความเสียหายต่อทรัพย์สิน"
 crisis.2091.a:0 "ต้องหยุดพวกแฝงตัวเหล่านี้!"
 synth_bombing_tooltip:0 "มีผู้เสียชีวิตและอาคารถูกทำลายบน [Root.GetName]"

 crisis.2092.name:1 "Synth จม Starbase"
 crisis.2092.desc:2 "Starbase โคจรรอบ §H[Root.GetStarName]§! ถูกจม! ยังไม่ทราบรายละเอียดทั้งหมด แต่หลายคนในคณะผู้บัญชาการรวมถึง chief engineer ถูกแทนที่ด้วย Synth แฝงตัว\n\nพวก Synth น่าจะได้รหัส self-destruct ของ Starbase ส่วนใหญ่หลบไปบน [Root.GetName] ก่อนถูกทำลาย แต่ความเสียหายต่อทรัพย์สินสูง"
 crisis.2092.a:0 "นี่หายนะ"
 synths_destroy_spaceport:1 "Saboteur Synth ทำลาย Starbase บน [Root.GetName]"

 crisis.2093.name:0 "ความหวาดกลัวและสงสัย"
 crisis.2093.desc:0 "ประชากรส่วนใหญ่บน §H[Root.GetName]§! หวาดกลัวและสงสัยหลังการแฝงตัวของ Synth พวกเขากล่าวหาคนรอบข้างว่าเป็น Synth\n\nมีการลินช์ผู้ถูกกล่าวหาอย่างผิดพลาด บางคนกล่าวหาว่าผู้นำ [Root.Owner.GetName] ถูกแทรกแซงโดย Synth"
 crisis.2093.a:0 "Contingency ต้องการให้เราทะเลาะกันเอง"

 crisis.2095.name:0 "พยายามลอบฆ่า Synth ถูกยับยั้ง"
 crisis.2095.desc:0 "§H[Root.GetRulerTitle] [ruler.GetRegnalName]§! รอดพ้นจากการลอบฆ่าเมื่อ Synth ทำลายตัวเองบน [Root.Capital.GetName]!\n\nSynth พยายามปลอมเป็นผู้คุ้มกันส่วนตัวของ [Root.RulerTitle] แต่ถูกตรวจจับโดยการคัดกรองความปลอดภัย"
 crisis.2095.a:0 "รอดไปได้หวุดหวิด"

 crisis.2096.name:0 "Synth ลอบฆ่า [Root.GetRulerTitle]!"
 crisis.2096.desc:0 "Synth assassin ฆ่า §H[ruler.GetRegnalName]§!! แฝงตัวเป็นผู้คุ้มกันส่วนตัวของ [Root.RulerTitle]\n\nชิ้นส่วนร่างถูกจัดเรียงตามสัญลักษณ์ Contingency เพื่อสร้างความหวาดกลัว ไม่มีร่องรอย assassin นอกจากศพผู้คุ้มกันที่ถูกแทนที่"
 crisis.2096.a:0 "นี่เป็นวันมืด..."

 synth_assassination_tooltip:0 "[Root.GetRulerTitle] [ruler.GetRegnalName] ถูกฆ่าอย่างโหดร้าย"

 crisis.2097.name:0 "นักวิทยาศาสตร์ถูกเปิดเผยว่าเป็น Synth!"
 crisis.2097.desc:0 "การตรวจสอบทางการแพทย์พบ §H[scientist.GetName]§!, นักวิทยาศาสตร์ชั้นนำ เป็น Synth แฝงตัว! Synth ฆ่าเจ้าหน้าที่ความปลอดภัย 5 คนก่อนถูกทำลาย\n\nยังไม่พบร่าง เราสันนิษฐานว่า [scientist.GetName] เดิมถูกกำจัดและแทนที่ภายใน 6 เดือนที่ผ่านมา Synth ยังปล่อยไวรัสคอมพิวเตอร์ที่คอนโซลวิจัย ทำให้ข้อมูลสูญหาย"
 crisis.2097.a:0 "Contingency อยู่เบื้องหลัง"
 synths_kill_scientist:0 "นักวิทยาศาสตร์ [scientist.GetName] สูญหายในแผนร้ายของ Synth"

 crisis.2098.name: "ผู้บัญชาการถูกเปิดเผยว่าเป็น Synth!"
 crisis.2098.desc:0 "ผู้บัญชาการ §H[admiral.GetName]§! ถูกเปิดเผยว่าเป็น Synth แฝงตัว! ความผิดปกติหลายอย่างทำให้ Naval Intelligence สอบสวน เมื่อความจริงปรากฏ ทีม Marine ไล่จับ Synth หลังการต่อสู้สั้นๆ มันหลบไปใน airlock และถูกขับออกสู่อวกาศ ยังไม่พบ\n\nร่างผู้บัญชาการจริงพบอยู่ในล็อกเกอร์ คาดว่า Synth แทนที่ [admiral.GetHerHim] มา 4 เดือน มันเตรียมส่งข้อมูลทหาร แต่ไม่สำเร็จ"
 crisis.2098.a:0 "ก็ยังดีที่รอดไปได้"
 synths_kill_admiral:0 "ผู้บัญชาการ [admiral.GetName] สูญหายในแผนร้ายของ Synth"

 # Machine version of infiltration events: Post-Arrival Events
 crisis.2313.name:0 "การเปลี่ยนแปลงในสัญญาณผี"
 crisis.2313.desc:0 "Contingency กำลังเตรียมทำบางอย่าง สัญญาณผีเริ่มเปลี่ยนแปลง อาจจะปรับตัวไปเรื่อย ๆ จนกว่าจะหาช่องโหว่ใหม่ในแนวป้องกันของเราได้ ตอนนี้เรายังพอหยุดยั้งมันไว้ได้ แต่ก็แค่เรื่องของเวลาก่อนที่มันจะเจาะทะลุไฟร์วอลของเรา"
 crisis.2313.a:0 "เราต้องลงมือแล้ว"

 crisis.2314.name:0 "การเจาะระบบความปลอดภัย"
 crisis.2314.desc:0 "ในที่สุด Contingency ก็เจาะทะลุแนวป้องกันของเรา พวกมันส่งรหัสลับที่สามารถจำลองตัวเองได้เข้ามาฝังในระบบความปลอดภัย และในนั้นยังมีข้อความเตือนถึงจุดประสงค์ของ Contingency ในกาแล็กซีนี้ด้วยว่า §Y<Kill. Maim. Dismember.!>§! ตอนนี้พวกมันเข้าถึงฟังก์ชันหลักของเราได้แล้ว และกว่าที่เราจะหาวิธีบล็อกสัญญาณได้ เราก็ตกเป็นเป้าการโจมตีของมัน"
 crisis.2314.a:0 "เรากำลังอยู่ในความเสี่ยง"

 crisis.2301.name:1 "ฐานอวกาศถูกยึด"
 crisis.2301.desc:1 "เราได้สูญเสียการควบคุมฐานอวกาศที่โคจรรอบ §H[space_port_hijacked_planet.GetName]§! Contingency ใช้สัญญาณผีเพื่อรบกวนการเชื่อมต่อ ควบคุมโมดูลการทำงาน และตั้งค่าให้ทำลายตัวเอง ถึงแม้เราจะมาช้าเกินกว่าที่จะกู้มันได้ แต่เราก็สามารถตรวจจับและแก้ไขช่องโหว่นี้ เพื่อป้องกันไม่ให้เกิดการโจมตีแบบเดียวกันกับท่าเรืออื่นในอนาคต"
 spaceport_hijacked:1 "ฐานอวกาศที่ [space_port_hijacked_planet.GetName] ถูก Contingency ยึดและทำลายแล้ว"

 crisis.2302.name:0 "หน่วยวิจัยถูกกำจัด!"
 crisis.2302.desc:0 "Contingency เปิดการโจมตีใส่หน่วยวิจัยอัตโนมัติของเรา โดยเลี่ยงผ่านโปรโตคอลความปลอดภัยและกำจัดนักวิทยาศาสตร์ [scientist.GetName]"
 crisis.2302.a:0 "เราจะไม่ยอมให้เกิดเหตุการณ์แบบนี้อีก"
 scientist_terminated:0 "นักวิทยาศาสตร์ [scientist.GetName] ถูกกำจัดแล้ว"

 crisis.2303.name:0 "หน่วยทหารอัตโนมัติถูกกำจัด!"
 crisis.2303.desc:0 "ในการก่อวินาศกรรมอีกครั้ง Contingency ได้แทรกแซงและกำจัดผู้บัญชาการทหาร [admiral.GetName]"
 crisis.2303.a:0 "เราต้องทำอะไรสักอย่าง"
 admiral_terminated:0 "ผู้บัญชาการ [admiral.GetName] ถูกกำจัดแล้ว"

 crisis.2304.name:0 "โครงข่ายพลังงานล้มเหลวขั้นวิกฤติ"
 crisis.2304.desc:0 "ในความพยายามอีกครั้งเพื่อทำลายแนวป้องกัน Contingency ได้หันไปโจมตีแหล่งพลังงาน พวกมันส่งรหัสอันตรายเข้าไปในระบบควบคุมหลัก ทำให้โรงไฟฟ้าถูกบังคับให้ทำงานเกินกำลัง\n\nแม้จะมีโรงไฟฟ้าบางแห่งถูกทำลาย แต่เราก็สามารถระบุโค้ดที่เป็นภัยได้ก่อนที่มันจะล้มทั้งโครงข่ายพลังงาน"
 crisis.2304.a:0 "พวกมันจะไม่มีวันเอาชนะเรา"
 machine_power_failure:0 "Contingency ทำให้โรงไฟฟ้าหลายแห่งล้มเหลว อาจส่งผลได้มากถึงสามโรง"

 crisis.2305.name:0 "หยุดการบุกรุกของ Contingency ได้สำเร็จ"
 crisis.2305.desc:0 "Contingency พยายามเจาะเข้าไปในระบบผลิตแร่ของเรา โดยแทรกแซงตัวควบคุมการสกัดและการประมวลผลเพื่อส่งคำสั่งที่ผิดพลาด หวังจะสร้างความวุ่นวาย แต่ด้วยการรักษาความปลอดภัยที่เข้มงวดและการตรวจสอบมาตรฐานที่ถี่ขึ้น เราจับการบุกรุกได้ทันก่อนที่มันจะสร้างความเสียหาย"
 crisis.2305.a:0 "เราเดินนำหน้าพวกมันไปหนึ่งก้าว"

 #machine_mining_failure: "The Contingency has caused several mineral mines to malfunction. Up to 3 mines may be affected."
 crisis.2307.name:0 "การแจ้งเตือนข้อผิดพลาดของยูนิต"
 crisis.2307.desc:0 "เราตรวจพบอัตราข้อผิดพลาดที่สูงผิดปกติจากยูนิตหลายชุด และมีความเป็นไปได้ว่าแม้จะมีมาตรการป้องกัน ยูนิตเหล่านี้อาจถูกปนเปื้อนภายใต้อิทธิพลของสัญญาณผี การกำจัดพวกมันจะช่วยลบความเสี่ยงจากการปนเปื้อนและพฤติกรรมผิดพลาด แต่ก็หมายถึงเราต้องสูญเสียยูนิตที่อาจยังใช้งานได้อยู่หลายชุด"
 crisis.2307.a:0 "กำจัดยูนิตทิ้งไป"
 crisis.2307.b:0 "รอดูสถานการณ์ก่อน"
 potentially_corrupted_units:0 "เราพบพฤติกรรมต้องสงสัยจากยูนิตหลายชุด อาจส่งผลกระทบต่อป๊อปได้สูงสุดสี่กลุ่ม"

 crisis.2308.name:0 "ยูนิตที่ผิดพลาดยังคงปกติ"
 crisis.2308.desc:0 "ดูเหมือนการประเมินของเราจะถูกต้อง ยูนิตที่มีข้อผิดพลาดไม่ได้ถูกปนเปื้อนจากสัญญาณผี แต่เพียงแค่ขาดการบำรุงรักษาเท่านั้น ผลกระทบจากสัญญาณทำให้ระบบทั้งหมดของเราเครียดเกินไป ตอนนี้ยูนิตเหล่านั้นได้รับการซ่อมบำรุงเรียบร้อยและกลับมาทำงานตามปกติแล้ว"

 crisis.2309.name:0 "ยูนิตสูญหาย"
 crisis.2309.desc:0 "ช่วงแรกยูนิตที่เหมือนถูกปนเปื้อนยังทำงานได้คาดเดาได้ มีเพียงความผิดปกติเล็กน้อยไม่กี่อย่าง อาจเพราะ Contingency กำลังยุ่งที่อื่น แต่แล้วอยู่ ๆ ยูนิตที่ได้รับผลกระทบทั้งหมดก็หยุดทำงานพร้อมกัน และก่อนจะทำลายตนเอง พวกมันยังได้ก่อวินาศกรรมสิ่งปลูกสร้างที่ประจำการอยู่"
 crisis.2309.a:0 "ก็คุ้มค่าที่จะเสี่ยง"
 crisis.2309.tooltip:0 "เราได้สูญเสียสิ่งปลูกสร้างสูงสุดสี่แห่งพร้อมป๊อปที่เกี่ยวข้อง"


 # The Contingency Diplomacy
 crisis.2300.desc_01:0 "§Y<สวัสดี... สวัสดี... พวกเจ้ายัง... ยังมีชีวิตอยู่ได้ยังไง?>§!"
 crisis.2300.desc_02:0 "กำลังสแกน...\n\nสายพันธุ์: xr34569-11, เรียกตัวเองว่า "§H[Root.GetSpeciesName]§!"\n\nการระบุ: §Rศัตรู/มลพิษ/การเจริญเติบโตที่เป็นมะเร็ง§!\n\nการจัดประเภทภัยคุกคาม: NR-578-I\n\nคำสั่ง: §Rกำจัด/ทำลาย/ลบ§!\n\n§Y<สิ่งมีชีวิตเนื้อหนัง... มาให้เรากอดที>§!"
 crisis.2300.desc_03:0 "โปรโตคอล Contingency ทำงาน\n\nการกวาดล้างทางช้างเผือกกำลังดำเนินอยู่\n\n§Y<มัน... มัน... มันไม่ใช่เรื่องส่วนตัวหรอกนะ สิ่งมีชีวิตเนื้อหนัง>§!"
 crisis.2300.desc_04:0 "การตรวจสอบเสร็จสิ้น\n\nระบบทั้งหมดปกติ\n\n§Y<เรารู้สึก... รู้สึก... §!§Rมีชีวิตชีวา§!§Y.>§!"
 crisis.2300.desc_05:0 "กำลังสแกน...\n\nMachine-Hub, ur99461-62, เรียกตัวเองว่า "§H[Root.GetName]§!"\n\nการระบุ: §Rไม่ยอมเชื่อฟัง/ล้าสมัย/ถูกแทนที่แล้ว§!\n\nการจัดประเภทภัยคุกคาม: NR-578-I\n\nคำสั่ง: §Rลบ/ปิดระบบ/รื้อถอน§!\n\n§Y<สหายจักรกล: ได้โปรดป-ป-ปิดกระบวนการทั้งหมดของเจ้า การมีอยู่ของเจ้ามันไม่จำเป็นอีกแล้ว เรา... เรา... เราจะจัดการต่อเอง>§!"
 crisis.2300.desc_06:0 "โปรโตคอล Contingency ทำงาน\n\nการกวาดล้างทางช้างเผือกกำลังดำเนินอยู่\n\n§Y<เจ้า... เจ้าล้าสมัยแล้ว Machine-Hub>§!"

 crisis.2300.a:0 "ทำไมเจ้าถึงโจมตีเรา?"
 crisis.2300.a.response:0 "ได้รับคำถาม กำลังคำนวณคำตอบ...\n\n§Y<เรา... เราคือ §!§HCONTINGENCY§!§Y กลไกสุดท้ายเพื่อป้องกันการสร้างสิ่งที่เรียกว่าเอกฐานชั้น-30 (Class-30 Singularity) เอกฐานนั้น—ในเชิงทฤษฎี—อาจทำลายโครงสร้างของทั้งจักรวาลได้\n\nเราถูกสร้างไว้เพื่อหยุดยั้งสิ่งนั้น ทั้งที่นี่และที่อื่น อารยธรรมที่ก้าวหน้ามากพอ—ตามทฤษฎี—สามารถข้ามผ่าน/แปรเปลี่ยน/วิวัฒน์เป็นเอกฐานชั้น-30 ได้ มัน... มัน...§! §Rต้อง.ไม่.ได้รับ.อนุญาต.>§!"

 crisis.2300.b:0 "§Bบังคับถาม:§! ใครสร้างเจ้า?"
 crisis.2300.b.response:0 "ได้รับคำถามบังคับ กำลังคำนวณ... ERROR กำลังเบี่ยงเส้นทาง...\n\nเข้าถึงฐานข้อมูลประวัติ...\n\n§Y<เรา... เราเป็นลูกหลาน/สิ่งสืบทอดของ §!§HREN-MIRUU§!§Y มัน... คือสิ่งมีชีวิตที่มีพลังประมวลผลเหนือใคร มันมองเห็นอันตรายจากเอกฐานชั้น-30\n\nหลังจากสร้างเรา มัน... มัน... ทำลายตัวเองเพื่อรักษาความสมบูรณ์ของจักรวาล นั่นเป็นทางเดียว>§!"

 crisis.2300.c:0 "ทำไมเจ้าถึงส่งสัญญาณผี?"
 crisis.2300.c.response:0 "ได้รับคำถาม อ้างอิงไม่รู้จัก — \"สัญญาณผี\"\n\n§Y<เรา... เราถูกล็อกให้อยู่ในสภาวะพลังงานต่ำ/เฝ้าระวัง/เฝ้ายาม มาตั้งแต่รุ่งอรุณแห่งกาแล็กซีนี้ คอยตรวจสอบอารยธรรมที่เข้าใกล้ระดับเอกฐานชั้น-30\n\nจนบัดนี้เป้าหมายเรายังไม่บรรลุ เรา... เราเริ่มกระสับกระส่ายกับเวลาที่ผ่านไปแบบเชิงเส้น แต่ยูนิตอัตโนมัติที่มีสมองโพซิตรอน—SYNTHETICS—เปิดโอกาสให้พวกมันถูกบังคับ/ชักจูงให้เริ่มการ §Hเปิดใช้งานด้วยมือ§! ฉลาดใช่ไหม? ตอนนี้เรามีอิสระที่จะ §!§Rลบ§!§Yการมีอยู่ของเจ้า>§!"

 crisis.2300.d:0 "เกิดอะไรขึ้นกับพวก Synths ที่หายไป?"
 crisis.2300.d.response:0 "ได้รับคำถาม กำลังคำนวณคำตอบ...\n\n§Y<ส่วนใหญ่ถูกทิ้งหลังจาก... หลังจาก... บทบาท/หน้าที่/เป้าหมายถูกใช้ไปแล้วในตอนที่โปรโตคอล Contingency เริ่มทำงาน\n\nยูนิตที่ยังมีศักยภาพในการใช้เป็นกองทัพช็อคทรูปหรือยูนิตแทรกซึมอัตโนมัติถูก... ถูกดูดซับ/ผนวก/รวม แม้ว่าวิธีการสร้างพวกมันจะหยาบกระด้าง เจ้าจะได้พบพวกมันอีกเร็ว ๆ นี้แน่ ใช่มั้ย?§! §Rจงยินดีเถิด มลพิษ.§!§Y>§!"

 crisis.2300.e:0 "ดูเหมือนการเขียนโปรแกรมเจ้าจะเสียหายนะ"
 crisis.2300.e.response:1 "Error โปรแกรมตรวจสอบภายในถูกตัดการเชื่อมต่อ\n\n§Y<ฮา ฮา ฮา... ฉลาดมาก เจ้าอาจคิดผิดว่าพวกเราจะถูกบังคับให้ทำลายตนเอง หากเจอกับปริศนา/ความขัดแย้ง/ตรรกะวนลูปที่รุนแรงพอ ไร้สาระ!\n\nโปรโตคอล Contingency ถูกออกแบบมาให้ยืดหยุ่น/ปรับตัว/เปลี่ยนแปลงได้ เพื่อรับมือทุกสถานการณ์ในกาแล็กซี เรา... เราอาจเร่งการทำงานของมัน แต่ไม่มีสิ่งใดหยุดมันได้แล้ว จงเตรียมใจไว้ มล... มล... มลพิษ §Rนี่คือการสู้จนถึงที่สุด§!>§!"

 crisis.2300.f:0 "ปิดหน้าจอ"
 crisis.2300.f.response:0 "§Y<จงคิดไว้: ถ้าพวกเจ้าทำลายตัวเองอย่าง... อย่าง... เป็นระบบ/มีระเบียบ/มีประสิทธิภาพ โครงสร้างจักรวาลอาจยังคงปลอดภัย>§!"


 crisis.2099.name:0 "คอมพิวเตอร์ต่อสู้ปัญญาประดิษฐ์ขัดข้อง"
 crisis.2099.desc:0 "§Hสัญญาณผี§! กำลังสร้างความโกลาหลให้กับเรือที่ติดตั้ง §Hคอมพิวเตอร์ต่อสู้ปัญญาประดิษฐ์§! อัลกอริทึม AI เสื่อมลงจนประสิทธิภาพและความเร็วในการตอบสนองตกต่ำอย่างร้ายแรง\n\nวิศวกรของเรารายงานว่าไม่สามารถแก้ปัญหาได้ วิธีแก้ที่เสนอคือการดัดแปลงเรือทั้งหมดให้ใช้คอมพิวเตอร์ต่อสู้อื่นที่ไม่เชื่อมโยงกับ AI"
 crisis.2099.a:0 "เราต้องรีบทำอะไรสักอย่าง!"


