 stone_age_civilization:1 "ในยุคหิน"
 stone_age_civilization_desc:3 "โลกใบนี้ได้ผลิต อภิสิทธิ์นิยมยุคหิน"
 dead_creatures:0 "สัตว์ ต่าง ๆ ใน อวกาศ ที่ ตาย แล้ว"
 dead_creatures_desc:0 "ยักษ์ ใหญ่ ของ ก๊าซ ชนิด นี้ ทํา หน้า ที่ เป็น สุสาน โบราณ สําหรับ สัตว์ ที่ ท่อง อวกาศ. ซาก ศพ หลาย ศพ ยัง คง อยู่ ใน วง โคจร เป็น การ วิจัย ที่ มี คุณค่า."
 starship_graveyard:0 "สุสานสตาร์ชิป"
 starship_graveyard_desc:1 "การ สู้ รบ ครั้ง ใหญ่ ได้ เกิด ขึ้น ใน วง โคจร ของ โลก นี้ เมื่อ หลาย พัน ปี มา แล้ว และ พื้น ผิว ก็ ยัง เต็ม ไป ด้วย ซาก ปรัก หัก พัง ของ ยาน อวกาศ สมัย โบราณ. การ ศึกษา แบบ แผน ใหม่ ๆ ของ พวก เขา จะ ให้ ความ รู้ ที่ มี คุณค่า."
 organic_starship:0 "ยานอวกาศ"
 organic_starship_desc:1 "บางประเภทของเรือออแกนิก ตกบนโลก กว่าสามพันล้านปีที่ผ่านมา แม้ ว่า ยัง เหลือ แต่ กระดูก โบราณ เท่า นั้น แต่ สถาน ที่ นี้ ก็ ให้ โอกาส ค้นคว้า มาก มาย."
 abandoned_cities:0 "เมืองที่ถูกทิ้งร้าง"
 abandoned_cities_desc:0 "ประชากรเดิมของโลกนี้ ได้หายไปอย่างลึกลับ ทิ้งไว้เบื้องหลังเมืองและโครงสร้างพื้นฐานของพวกเขา การ ทํา เช่น นี้ จะ ช่วย ให้ อาณานิคม ที่ อาจ มี โอกาส พัฒนา ได้ ง่าย ขึ้น."
 subterranean_ocean:0 "มหาสมุทรใต้ดิน"
 subterranean_ocean_desc:1 "มี มหาสมุทร ขนาด ใหญ่ ที่ ร้อน จัด โดย ทาง ปล่อง น้ํา แข็ง ซึ่ง ซ่อน อยู่ ใต้ ร่ม น้ํา แข็ง ของ โลก นี้. มัน เต็ม ไป ด้วย ชีวิต และ สามารถ เรียน รู้ ได้ มาก มาย โดย การ ศึกษา สิ่ง มี ชีวิต พิเศษ เหล่า นี้."
 colony_enclaves:0 "ป้อม ปราการ"
 colony_enclaves_desc:0 "อาณานิคม ของ โลก นี้ จํากัด อยู่ แค่ กรง ป้องกัน หลาย แห่ง. ชนพื้นเมืองยุคหินเจริญพันธุ์ ถูกทิ้งให้อยู่อย่างสงบ เพื่อพัฒนาดินแดนที่เหลือ"
 primitive_reservation:0 "เรียกคืนข้อมูลของเอเลี่ยน"
 primitive_reservation_desc:0 "ส่วนหนึ่งของโลกนี้ได้ถูกเปลี่ยนเป็นเขตสงวน สําหรับชนพื้นเมืองยุคหิน เรื่อง นี้ ค่อน ข้าง จะ จํากัด พื้น ที่ และ ทรัพยากร ที่ ผู้ ตั้ง อาณานิคม จะ หา ได้."
 starvation:0 "ดวงดาว"

 subterranean_tech_transaction:0 "เงื่อนไขเทคโนโลยีชาวใต้ดิน"
 subterranean_tech_transation_desc:0 "บางส่วนของวัสดุการวิจัยและกองทุนของเรา ถูกตราหน้าว่าใช้โดยอารยธรรมใต้ดิน ที่อาศัยอยู่ในดาวเคราะห์หนึ่งของเรา"
 stellarite_high_temp:0 "อุณหภูมิที่เพิ่มขึ้น"
 stellarite_high_temp_desc:0 "อุณหภูมิ ของ ดาว เคราะห์ ดวง นี้ กําลัง เพิ่ม ขึ้น เรื่อย ๆ."
 stellarite_low_temp:0 "อุณหภูมิต่ํา"
 stellarite_low_temp_desc:0 "สุริยุปราคา ที่ มี แสง เจิด จ้า ได้ กิน ส่วน หนึ่ง ของ ดวง ดาว ใน ระบบ นี้ ทํา ให้ ดาว เคราะห์ ดวง นี้ โคจร ด้วย ความ เย็น กว่า ปกติ."

