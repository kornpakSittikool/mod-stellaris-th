 hazardous_weather:0 "สภาพอากาศที่เป็นอันตราย"
 hazardous_weather_desc:0 "โลก นี้ ทน ทุกข์ เนื่อง จาก สภาพ อากาศ ที่ ไม่ มั่นคง ซึ่ง บ่อย ครั้ง มี พายุ รุนแรง ปรากฏ ออก มา จาก ที่ ไหน ก็ ได้ เพื่อ ก่อ ความ หายนะ บน ผิว ดิน."
 dangerous_wildlife:1 "สัตว์ที่ไม่เป็นมิตร"
 dangerous_wildlife_desc:2 "โลกใบนี้พัฒนาการเป็นศัตรูตัวฉกาจของฟานา และพื้นผิวก็เต็มไปด้วยผู้ล่าที่ใกล้ตาย การศึกษาชีววิทยาของสัตว์นี้ ให้โอกาสวิจัยที่ยอดเยี่ยม"
 weak_magnetic_field:0 "สนามแม่เหล็กอ่อน"
 weak_magnetic_field_desc:1 "แม้ จะ อยู่ อาศัย ได้ แต่ โลก นี้ มี สนาม แม่ เหล็ก อ่อน ซึ่ง ให้ การ ปก ป้อง เล็ก น้อย ต่อ รังสี คอสมิก."
 unstable_tectonics:0 "เปลือกโลกที่ไม่เสถียร"
 unstable_tectonics_desc:0 "โลก นี้ มี แผ่น ดิน โลก ที่ ไม่ มั่นคง มาก และ มัก จะ เกิด แผ่น ดิน ไหว ใหญ่ และ ภูเขา ไฟ."
 tidal_locked:0 "ถูกตรึงโดยแรงไทดัล"
 tidal_locked_desc:0 "ดาวนี้ถูกผูกติดกับดาวอีกดวงโดยแรงไทดัลที่ทำต่อกัน ซึ่งหมายความว่าด้านหนึ่งจะมีแสงสว่างตลอดเวลา ในขณะที่อีกด้านหนึ่งจะมืดมิดชั่วนิรันดร์ หากสิ่งมีชีวิตมีอยู่ที่นี่จริง สิ่งมีชีวิตก็อาจจำกัดอยู่เฉพาะในบริเวณที่ทั้งสองฝั่งมาบรรจบกัน"
 chthonian_planet:0 "ภาษาโครเนียนชื่อดาวเคราะห์"
 chthonian_planet_desc:0 "ดาวเคราะห์นี้เคยเป็นยักษ์แก๊ส แต่ใกล้เคียงกับดาวของมัน ได้เผาบรรยากาศหนาออกไป สิ่งที่เหลืออยู่ตอนนี้ คือแกนโลหะที่อุดมไปด้วยแร่ธาตุ"
 brown_dwarf:0 "ดาวแคระน้ำตาล"
 brown_dwarf_desc:0 "ยักษ์แก๊สนี้ จริงๆ แล้วเป็นคนแคระสีน้ําตาล - ดาวที่ล้มเหลว ที่ขาดมวลที่จําเป็น เพื่อคงไฮโดรเจนฟิวชั่น คุณสมบัติพิเศษของมัน เป็นประโยชน์ต่อการวิจัย"
 asteroid_impacts:0 "ได้รับผลจากอุกกาบาต"
 asteroid_impacts_desc:0 "แนวโคจรนี้ โลกนี้โคจรรอบดาวของมัน เต็มไปด้วยดาวเคราะห์น้อย อุกกาบาต และดาวหาง ผลกระทบขนาดใหญ่บนพื้นผิว เกิดขึ้นที่ความถี่ที่น่าตื่นกลัว"
 extensive_moon_system:0 "พระจันทร์จ้าระบบดาว"
 extensive_moon_system_desc:0 "ยักษ์ ใหญ่ ของ ก๊าซ ชนิด นี้ มี ดาว เทียม ธรรมชาติ จํานวน มาก ผิด ปกติ. ดวง จันทร์ และ ดวง จันทร์ เล็ก ๆ หลาย ร้อย ดวง โคจร รอบ โลก."
 carbon_world:0 "โลกคาร์บอน"
 carbon_world_desc:0 "โลก นี้ ถูก สร้าง ขึ้น โดย ส่วน ใหญ่ จาก คาร์บอน และ มี ออกซิเจน เพียง เล็ก น้อย."
 asteroid_coprolite:0 "คาร์บอน:"
 asteroid_coprolite_desc:1 "ดาวเคราะห์น้อยนี้ จริงๆ แล้ว เป็นหินขนาดใหญ่ ชิ้นส่วนของอุจจาระโบราณ"
 asteroid_life:0 "รูป แบบ ชีวิต ของ เอ ส เท อร์ ลอย ด์"
 asteroid_life_desc:1 "ดาวเคราะห์น้อยนี้เป็นที่ตั้งของอาณานิคมของหนอนขนาดใหญ่ ที่เหมือนดอกลิโดวอเรสที่โพรงผ่านหิน อาจ เรียน รู้ ได้ มาก มาย จาก การ ศึกษา รูป แบบ ชีวิต ที่ ไม่ เหมือน ใคร เหล่า นี้."
 derelict_shipyard:0 "อู่เรือร้าง"
 derelict_shipyard_desc:1 "อู่เรือขนาดใหญ่ถูกสร้างขึ้น ภายในของดาวเคราะห์น้อยนี้ที่ผ่านมา มี การ เก็บ วัตถุ โบราณ อัน มี ค่า แต่ ยัง คง เป็น สิ่ง มหัศจรรย์ ทาง วิศวกรรม."
 junkyard:0 "ป่า"
 junkyard_desc:1 "ดาว เคราะห์ น้อย นี้ ใช้ เป็น ซาก ปรัก หัก พัง ณ จุด หนึ่ง และ พื้น ผิว ก็ เต็ม ไป ด้วย เศษ โลหะ. บางส่วนยังสามารถกู้กลับมาได้"
 target_range:0 "ช่วงของเป้าหมายอาวุธ"
 target_range_desc:1 "ใครบางคนใช้ดาวเคราะห์น้อยที่น่าสงสารนี้ เป็นเป้าหมายในการทดสอบอาวุธของสับสเปซ การ สะท้อน ของ พลัง งาน"
 ore_freighter:0 "ขัดข้อง"
 ore_freighter_desc:1 "ดาว เคราะห์ น้อย ดวง นี้ ตก ลง มา เมื่อ หลาย พัน ปี มา แล้ว และ สิ่ง ที่ อยู่ ใน อ่าว สินค้า ของ มัน ยัง คง พบ ได้ บน ผิว น้ํา."
 atmospheric_ecosystem:0 "ระบบนิเวศของชั้นบรรยากาศ"
 atmospheric_ecosystem_desc:1 "บรรยากาศ ชั้น บน ของ ก๊าซ ยักษ์ ใหญ่ นี้ เป็น ระบบ นิเวศ ที่ สําคัญ ซึ่ง เป็น ที่ อยู่ ของ สิ่ง มี ชีวิต แปลก ประหลาด หลาย ชนิด. ชีววิทยาที่น่าสนใจของพวกเขา เป็นงานวิจัยที่น่าจดจํา"
 aerostat_colonies:0 "แอโรสตาตคอมโพเนนท์"
 aerostat_colonies_desc:1 "มี การ ค้น พบ เครือ ข่าย ที่ แผ่ ขยาย ของ อาณานิคม ของ ก๊าซ โบราณ ใน วง โคจร ต่ํา ของ ยักษ์ ยักษ์ ใหญ่ นี้. การ ออก แบบ ที่ แข็ง แรง ผิด ปกติ ของ มัน คือ ผล ผลิต ของ วิศวกรรม ชั้น สูง."
 debris_field:0 "ช่องข้อมูล Deis"
 debris_field_desc:1 "ซาก ปรัก หัก พัง ของ อวกาศ ชั้น หนา ถูก จับ ได้ โดย บ่อ น้ํา แรง โน้ม ถ่วง ของ ยักษ์ ใหญ่ มหึมา นี้. ส่วนใหญ่ก็ไร้ค่า แต่โลหะสามารถรีไซเคิลได้"
 extreme_storms:0 "พายุ ร้าย แรง"
 extreme_storms_desc:1 "พายุ ใหญ่ หลาย สิบ ลูก กําลัง โหม กระหน่ํา ใน บรรยากาศ ของ ยักษ์ ใหญ่ มหึมา นี้. แบบจําลองสภาพภูมิอากาศล้มเหลวในการอธิบายการมีอยู่ของพวกเขา ทําให้ดาวเคราะห์เป็นหัวข้อที่น่าสนใจของการวิจัย"
 precious_moon:0 "พระจันทร์มีค่า"
 precious_moon_desc:1 "ดวง จันทร์ เล็ก ๆ ส่วน ใหญ่ ประกอบ ด้วย โลหะ และ แร่ ธาตุ อัน ล้ํา ค่า จะ พบ ได้ ภาย ใน ระบบ ที่ กว้าง ขวาง ของ ดาว เทียม ซึ่ง โคจร รอบ ยักษ์ ใหญ่ ของ ก๊าซ นี้."
 asteroid_collision:0 "เอ ส โต รอยด์"
 asteroid_collision_desc:1 "ดาวเคราะห์น้อยขนาดใหญ่ มีผลกระทบต่อโลกนี้ น้อยกว่าพันปีที่ผ่านมา"
 microsingularity:0 "จุลินทรีย์"
 microsingularity_desc:1 "จุลินทรีย์ผ่านความสะอาดผ่านแกนหลักของโลกนี้ ก่อให้เกิดการปล่อยพลังงานที่น่าสนใจบางส่วน"
 alien_writing:0 "การ เขียน ของ พวก เอเลี่ยน"
 alien_writing_desc:1 "ใครบางคนได้แกะสลักตัวหนังสือขนาดใหญ่ ลงบนพื้นผิวของโลก ด้วยเลเซอร์เหมืองแร่ ตัวอักษรของมนุษย์ต่างดาวมีขนาดใหญ่พอที่จะมองเห็นได้จากวงโคจร"
 towed_asteroid:0 "ลากเอสเตอร์รอยด์"
 towed_asteroid_desc:1 "บางคนต้องลากดาวเคราะห์น้อยขนาดใหญ่ เข้าสู่วงโคจรที่เสถียรทั่วโลก คาดว่าเพื่อเหมืองมันสําหรับทรัพยากร"
 nuclear_devastation:0 "การทำลายล้างของนิวเคลียร์"
 nuclear_devastation_desc:1 "บรรยากาศ ที่ เป็น พิษ ของ โลก นี้ เป็น ผล จาก สงคราม ทั่ว โลก ที่ ก่อ ความ เสีย หาย อย่าง หนัก ระหว่าง กลุ่ม อารยธรรม พื้น เมือง. การ ค้นคว้า ที่ มี คุณค่า อาจ ทํา ได้ โดย การ ศึกษา ซาก ปรัก หัก พัง ที่ ไร้ ชีวิต."
 nuclear_wasteland:0 "นิวเคลียร์"
 nuclear_wasteland_desc:0 "โลก นี้ ถูก ใช้ เป็น หัวรบ นิวเคลียร์ ใน การ แลก เปลี่ยน กัน อย่าง กว้าง ขวาง ระหว่าง กลุ่ม อารยธรรม พื้น เมือง ใน บาง ช่วง ของ อดีต. ชีวเคมียังไม่ฟื้นตัว และยังมีปริมาณรังสีเหลืออยู่"
 gamma_ray:0 "แกมมา-เรย์ เบอร์สต์"
 gamma_ray_desc:0 "นานมาแล้ว โลกนี้อยู่ในเส้นทาง ของรังสีแกมม่า ที่ระเบิดออกมาจากดาวที่กําลังสลาย ชั้น โอโซน ยัง ไม่ ได้ ฟื้น ตัว เต็ม ที่ หมาย ความ ว่า ผู้ ที่ อาจ เป็น อาณานิคม จะ ต้อง ได้ รับ การ ป้องกัน เป็น พิเศษ จาก รังสี ยูวี."
 greenhouse_effect:0 "ผลกระทบจากกรีนเฮาส์"
 greenhouse_effect_desc:1 "อารยธรรมอุตสาหกรรมพื้นเมือง ทําให้เกิดมลพิษต่อโลกนี้จนถึงจุดที่ ผลกระทบของเรือนกระจกที่หลบหนี ซาก ปรัก หัก พัง ของ โรง งาน และ ศูนย์ ประชากร ใน สมัย โบราณ ยัง คง พบ ได้ บน พื้น ผิว ที่ เป็น พิษ."
 ammonia_biosphere:0 "ไบโอสเฟียร์"
 ammonia_biosphere_desc:1 "โลก ที่ เป็น พิษ นี้ เป็น ที่ อยู่ ของ สิ่ง แวด ล้อม ที่ หา ยาก ซึ่ง ชีวิต ใช้ แอมโมเนีย แทน ที่ จะ ใช้ น้ํา เป็น สาร ทํา ละลาย. สิ่งมีชีวิตที่อยู่บนแอมโมเนียเหล่านี้ ได้พัฒนาขึ้นในรูปแบบที่พิเศษ และการศึกษาเหล่านี้จะก้าวหน้า"
 silicon_lifeforms:0 "รูป แบบ ชีวิต ของ ศาสนา พุทธ"
 silicon_lifeforms_desc:1 "สิ่งมีชีวิตกึ่งปัญญา สร้างขึ้นจากซิลิกอน อาศัยอยู่ในเครือข่ายอุโมงค์ขนาดใหญ่ ภายใต้พื้นผิวของโลกนี้ ความ พยายาม ใน การ ขุด ของ พวก เขา มัก จะ ทํา ให้ โลหะ และ แร่ ธาตุ ที่ มี ค่า สับ เปลี่ยน ไป ยัง ผิว น้ํา."
 colony_ruins:0 "ซาก ปรัก หัก พัง"
 colony_ruins_desc:0 "ซาก ปรัก หัก พัง ใน สมัย โบราณ จาก อาณานิคม เล็ก ๆ ที่ ถูก ทิ้ง ร้าง ซึ่ง เป็น ส่วน ของ จักรวรรดิ ระหว่าง ดาว ที่ ไม่ รู้ จัก จะ พบ ได้ ใน โลก นี้."
 alien_mural:0 "เอเลี่ยน"
 alien_mural_desc:1 "จิตรกรรมโบราณบนพื้นผิวของโลกนี้ กล่าวถึงความรู้เทคโนโลยี ของอารยธรรมของมนุษย์ต่างดาวที่ตายไปนานแล้ว"
 migrating_forests:0 "ป่า อพยพ"
 migrating_forests_desc:0 "ป่าเคลื่อนที่ของโลกนี้มักจะอพยพ ไปยังภูมิภาคใหม่ ขัดขวางความพยายามในการสร้างถนน สายไฟฟ้า และโครงสร้างพื้นฐานอื่น ๆ"
 migrating_forests_2:0 "ป่า อพยพ"
 migrating_forests_2_desc:2 "§W§Yเขต อนุรักษ์ ป่า อพยพ§!เพิ่ม, ปรับปรุง£society£ §Yการ วิจัย ของ สมาคม§!บนดาวดวงนี้§!\n\nปัจจุบัน ป่า ไม้ ที่ เร่ร่อน อยู่ ใน โลก นี้ หลีก เลี่ยง พื้น ที่ ที่ มี คน อาศัย อยู่ และ ไม่ ก่อ ความ เสีย หาย ต่อ การ ตั้ง ถิ่น ฐาน. การ ที่ พวก เขา อยู่ ที่ นั่น ยัง คง จํากัด จํานวน พื้น ที่ ที่ ผู้ ตั้ง อาณานิคม อยู่."
 damaged_ecology:0 "นิเวศวิทยาที่เสียหาย"
 damaged_ecology_desc:0 "การ ทําลาย ป่า ไม้ ที่ เร่ร่อน ไป ทั่ว โลก มี ผล กระทบ อย่าง มาก ต่อ สิ่ง แวด ล้อม."
 friendly_trees:0 "การ ปรับ เปลี่ยน ป่า"
 friendly_trees_desc:0 "ป่า ไม้ และ อาณานิคม ของ โลก นี้ ได้ ปรับ ตัว เข้า กับ กัน และ กัน ซึ่ง ทํา ให้ เกิด วิญญาณ อยู่ ระยะ หนึ่ง."
 subterranean_civilization:0 "อารยธรรมใต้ดิน"
 subterranean_civilization_desc:0 "อารยธรรมของเอเลี่ยนใต้ดิน ในโลกนี้ มีความสัมพันธ์กับชาวอาณานิคมบนพื้นผิว และทั้งสองพรรคก็มักจะมีส่วนในการค้าและการแลกเปลี่ยนวัฒนธรรม"
 subterranean_expansion:0 "เมืองใต้ดิน"
 subterranean_expansion_desc:0 "อารยธรรมพื้นเมืองที่ครั้งหนึ่งเคยมีชีวิตอยู่บนโลกนี้ ถูกรื้อถอนไปแล้ว ปัจจุบันชาวอาณานิคมมีอิสระที่จะขยาย"
 gas_giant_civ:0 "เมืองหลวง Dathnak"
 gas_giant_civ_desc:1 "โลกนี้คือเมืองหลวงใหม่ และเป็นบ้านเกิดของดาธแนค สิ่งมีชีวิตมีแก๊สเหล่านี้ไม่มีอุตสาหกรรมหรือเทคโนโลยี แต่ดูเหมือนจะค่อนข้างสังคม"
 gas_giant_colony:0 "โคนี"
 gas_giant_colony_desc:1 "สิ่ง มี ชีวิต ที่ ประกอบ ด้วย ก๊าซ นี้ ซึ่ง รู้ จัก กัน ว่า ดอต นาก ได้ ก่อ ตั้ง อาณานิคม เล็ก ๆ ภาย ใน บรรยากาศ ของ ยักษ์ ใหญ่ ของ ก๊าซ นี้."
 abandoned_terraforming:0 "การละทิ้งโครงการ"
 abandoned_terraforming_desc:0 "โลกนี้ได้ถูกดัดแปลงเมื่อหลายพันปีก่อน แต่กระบวนการถูกขัดจังหวะ ด้วยเหตุผลที่ไม่ทราบสาเหตุ ผล ก็ คือ ระบบ ภูมิ อากาศ และ ชีวเคมี ที่ ไม่ มั่นคง อย่าง ยิ่ง."
 gaia_world:1 "Ancient Terraforming"
 gaia_world_desc:0 "เทคนิค การ สังเคราะห์ แสง สมัย โบราณ ได้ เปลี่ยน โลก นี้ ให้ เป็น อุทยาน ที่ เขียว ชอุ่ม."
 mutant_stalker:0 "สัตว์ ล่า เหยื่อ"
 mutant_stalker_desc:0 "สัตว์ประหลาดกลายพันธุ์กําลังตามล่า พวกอาณานิคมบนโลกใบนี้ แพร่กระจายความน่ากลัวในชนบท การ พัฒนา อาณานิคม ของ เรา ได้ รับ ผล กระทบ เช่น เดียว กับ คน งาน ไม่ เต็ม ใจ เสี่ยง เข้า สู่ ถิ่น ทุรกันดาร."
 wasteland_radiation:0 "การ ตัด ไม้ ทําลาย ป่า"
 wasteland_radiation_desc:0 "การ แผ่ รังสี ใน ระดับ สูง ใกล้ ๆ กับ ชุมชน หลาย แห่ง ก่อ ผล เสีย หาย ต่อ สุขภาพ ของ ชาว อาณานิคม ที่ อาศัย อยู่ ที่ นั่น."
 wasteland_orbital_debris:0 "ข้อ เสีย"
 wasteland_orbital_debris_desc:0 "พื้นที่ออร์บิทัลเหนือโลกใบนี้ มีเศษขยะเต็มไปหมด ไม่ อาจ ปล่อย ดาว เทียม ออก มา จาก ผิว โลก ได้ และ สนาม ที่ หนา ทึบ นี้ กลาย เป็น อันตราย ต่อ การ เดิน เรือ. นี่เป็นการขัดขวางการพัฒนาโครงสร้างโครงสร้างของอาณานิคม"
 wasteland_infrastructure:0 "การ รอด ชีวิต จาก โครง สร้าง อิน ฟ รา"
 wasteland_infrastructure_desc:0 "ยังมีโครงสร้างพื้นฐานเหลืออยู่มากมายในโลกนี้ สร้างขึ้นโดยชาวดั้งเดิม ก่อนที่จะทําลายตัวเองในสงครามนิวเคลียร์ นี่ จะ ช่วย ใน การ สร้าง อาคาร หลัง ใหม่."
 forest_fire:0 "ไฟ ป่า"
 forest_fire_desc:0 "ไฟไหม้ป่าส่งผลให้ป่าที่เร่ร่อนไปทั่ว ส่งผลให้เกิดความเสียหายชั่วคราว"


 upliftable_species:0 "เผ่าพันธุ์สามารถยกระดับได้"
 upliftable_species_desc:0 "มีสปีชีส์มากมายที่นี่ ที่สามารถสร้างอาณานิคมบนดาวเคราะห์ดวงนี้"
 production_targets:0 "เพิ่มเป้าหมาย"
 production_targets_desc:1 ""
