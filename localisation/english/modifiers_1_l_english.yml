 slave_production_output_increase_desc:0 ""
 allow_slavery_all:0 "อนุญาตให้เป็นทาส"
 allow_slavery_desc:0 ""
 ftl_credit_trading:0 "อนุญาตให้ใช้ระบบความเร็ว"
 ftl_credit_trading_desc:0 ""
 utopian_abundance:0 "ความอุดมสมบูรณ์ของชาวยูโทเปีย"
 utopian_abundance_desc:0 ""
 bio_asset_optimization:0 "ปรับแก้จุดบกพร่องของภาพ"
 bio_asset_optimization_desc:0 ""
 noninterference_directive:0 "คำสั่งการไม่แทรกแซง"
 noninterference_directive_desc:0 ""
 abundant_geothermal_activity: "กิจกรรม ที่ ใหญ่ โต"
 abundant_geothermal_activity_desc: "ดาว เคราะห์ ดวง นี้ มี จุด ร้อน ใต้ ดิน ที่ เข้า ถึง ได้ หลาย จุด. ขณะ ที่ สิ่ง นี้ ก่อ ให้ เกิด ข้อ ท้าทาย ทาง วิศวกรรม บาง อย่าง แต่ ก็ ทํา ให้ มี โอกาส เพิ่ม ขึ้น อีก ใน การ ใช้ พลัง งาน."
 subterranean_wildlife: "สัตว์ป่าใต้ดิน"
 subterranean_wildlife_desc: "ดาวเคราะห์ดวงนี้ มีระบบนิเวศทางโลกที่เจริญรุ่งเรือง ซากศพของสัตว์ใต้ดิน ที่กําลังวิ่งพล่าน ไปขุดถ้ําขนาดใหญ่ ปล่อยให้มันว่างสําหรับเหมืองแร่และใช้อาณานิคม สัตว์ เหล่า นี้ ให้ โอกาส ใน การ วิจัย ที่ ไม่ มี ใด เหมือน สําหรับ คน งาน เหมือง ซึ่ง นํา ฝูง หิน ไป ยัง แร่ ธาตุ อัน มี ค่า ที่ เก็บ ไว้."
 rich_mircoflora: "จุลินทรีย์มาก"
 rich_mircoflora_desc: "ดิน ของ โลก นี้ เป็น ถิ่น อาศัย ของ ระบบ นิเวศ ที่ แข็ง แรง และ มี ประสิทธิภาพ สูง ทํา ให้ มี โอกาส ทํา การ เกษตร และ การ วิจัย ที่ ดี."
 strong_magnetic_field:0 "สนามแม่เหล็กรุนแรง"
 strong_magnetic_field_desc:2 "ดาวเคราะห์ดวงนี้มีสนามแม่เหล็กสูงผิดปกติ และจะแทรกแซงอุปกรณ์และคอมพิวเตอร์จํานวนมากของเรา การ แยก ตัว ของ ผล กระทบ เหล่า นี้ จะ ช่วย ให้ ทราบ การ วิจัย ที่ ช่วย ใน การ ควบคุม สนาม."
 wild_storms:0 "พายุ"
 wild_storms_desc:0 "พายุไฟฟ้าสเปกตรัม ปกคลุมบรรยากาศของดาวเคราะห์ดวงนี้ ในระดับกึ่ง ๆ"
 low_gravity:0 "แรงโน้มถ่วงต่ำ"
 low_gravity_desc:0 "ดาวเคราะห์ดวงนี้มีความหนาแน่นต่ําผิดปกติ และดังนั้นแรงโน้มถ่วงที่ต่ํากว่ามาก"
 high_gravity:0 "แรงโน้มถ่วงสูง"
 high_gravity_desc:1 "ดาว เคราะห์ ดวง นี้ มี ความ หนา แน่น อย่าง ผิด ปกติ และ มี แรง โน้ม ถ่วง สูง อย่าง ไม่ น่า สบายใจ."
 hollow_planet:0 "ฮอลโลวดาวเคราะห์"
 hollow_planet_desc:0 "ดาวเคราะห์ดวงนี้ถูกสร้างขึ้นเอง หรือถูกทําให้กลวง โดย วิธี ใด หรือ เหตุ ใด เรา ไม่ ทราบ แต่ การ ตรวจ สอบ พระ คัมภีร์ สัญญา ว่า จะ น่า สนใจ."
 mineral_rich:1 "แร่ธาตุคุณภาพสูง"
 mineral_rich_desc:1 "มีแร่ธาตุมากมายในเปลือกโลก ทําให้การเหมืองที่นี่เป็นธุรกิจที่ร่ํารวย"
 titanic_life:0 "สิ่งมีชีวิตขนาดใหญ่"
 titanic_life_desc:0 "สิ่งมีชีวิตต่าง ๆ ของดาวเคราะห์ดวงนี้ สร้างขึ้นในขนาดมหึมา และสามารถเป็นอันตรายได้อย่างน่าทึ่ง"
 eat_the_titans:0 "ไททันแสนอร่อย"
 eat_the_titans_desc:0 "การ เก็บ เกี่ยว ชีวิต เรือ ไท ทา นิก เพื่อ ได้ ข้อมูล จาก การ วิจัย มี ผล ประโยชน์ ด้าน ที่ ไม่ คาด คิด: มัน อร่อย มาก!"
 eat_the_titan_evopred: "$eat_the_titan$"
 eat_the_titan_evopred_desc: "$eat_the_titan_desc$"
 asteroid_belt:0 "แถบดาวเคราะห์น้อย"
 asteroid_belt_desc:1 "ดาว เคราะห์ ดวง นี้ มี เข็มขัด ของ ดาว เคราะห์ น้อย ที่ โคจร รอบ ดาว เคราะห์ ดวง นี้. ที่ น่า จะ เป็น เพราะ ดวง จันทร์ ขนาด จิ๋ว ถูก ทําลาย ด้วย การ ชน กับ อีก ร่าง หนึ่ง ของ ดาว เคราะห์ สนาม เหล่า นี้ ทํา ให้ มี โอกาส ทํา เหมือง ที่ ซับ ซ้อน แต่ เป็น ไป ได้ มาก มาย."
 natural_beauty:0 "ความงามของธรรมชาติ"
 natural_beauty_desc:0 "ทิวทัศน์ บน ดาว เคราะห์ ดวง นี้ สวย งาม จริง ๆ ใคร ก็ ตาม ที่ อาศัย อยู่ บน ดาว เคราะห์ ดวง นี้ จะ พบ สิ่ง มหัศจรรย์ ใหม่ ๆ ที่ จะ มอง เห็น อยู่ เสมอ."
 atmospheric_aphrodisiac:0 "แอ ส โม สเฟียร์"
 atmospheric_aphrodisiac_desc:0 "บาง สิ่ง ใน อากาศ ของ ดาว เคราะห์ ดวง นี้ ดู เหมือน ทํา ให้ ผู้ คน มี อารมณ์ อยาก สืบ พันธุ์."
 atmospheric_hallucinogen:0 "ชั้นบรรยากาศ"
 atmospheric_hallucinogen_desc:0 "อากาศของดาวเคราะห์ดวงนี้ มีสารกระตุ้นธรรมชาติ แม้ ว่า เรื่อง นี้ ทํา ให้ ผู้ คน มี ความ สุข และ จริง ๆ แล้ว ดู เหมือน จะ ช่วย ให้ นึก ภาพ ปัญหา ทาง ฟิสิกส์ ที่ ซับ ซ้อน กว่า บาง อย่าง แต่ ก็ ทํา ให้ ผู้ คน เขว ไป จาก งาน อื่น ๆ ด้วย."
 atmospheric_hallucinogen_good:0 "ตัวกรองแอตโมสปอร์กฮา ลิ โน เกน"
 atmospheric_hallucinogen_good_desc:0 "เมื่อ ก่อน อากาศ ของ ดาว เคราะห์ ดวง นี้ เคย มี สาร กระตุ้น ตาม ธรรมชาติ. ปัจจุบัน ด้วย ความ ช่วย เหลือ จาก เครื่อง กรอง ขนาด ใหญ่ ผล ที่ ตาม มา ก็ ลด ลง. ทั้ง นี้ ทํา ให้ ผล ประโยชน์ ที่ เคย ได้ รับ ลด ลง แต่ ก็ ได้ ขจัด แง่ ลบ ออก ไป ด้วย."
 lush_planet:0 "หลิว"
 lush_planet_desc:0 "ชีวิต ที่ นี่ เจริญ งอกงาม ดี ที่ นี่ และ พืช พรรณ ก็ เจริญ งอกงาม อย่าง รวด เร็ว."
 bleak_planet:0 "เยือกเย็น"
 bleak_planet_desc:1 "ชีวิต ดิ้นรน เพื่อ จะ อยู่ รอด ใน ที่ นี้ และ ขณะ ที่ บาง คน ยึด มั่น อยู่ กับ การ ดํารง อยู่ อย่าง ยืดหยุ่น มัน ก็ อ่อนแอ และ ป่วย. ปัญหา เหล่า นี้ จะ เป็น อันตราย ต่อ การ ผลิต อาหาร."
 irradiated_planet:0 "พิมพ์สี"
 irradiated_planet_desc:0 "ความหายนะที่ยาวนานทําให้ดาวเคราะห์ดวงนี้ ถูกทําให้ลอยได้ค่อนข้างหนัก"
 ancient_automation:0 "อัตโนมัติโบราณ"
 ancient_automation_desc:0 "โบราณแต่ยังมีประโยชน์ เครื่องจักรช่วยเหลือการผลิตของเราบนดาวเคราะห์ดวงนี้"
 ancient_factory:0 "โรงงานโบราณ"
 ancient_factory_desc:0 "โรงงานโบราณบนดาวดวงนี้ ยังคงอยู่ในช่วงปฏิบัติการ"
 robot_workers:0 "แรงงานหุ่นยนต์"
 robot_workers_desc:0 "คนงานหุ่นยนต์จากอารยธรรมที่ถูกลืม ยังคงอยู่บนโลกนี้ ด้วย การ ระมัดระวัง อย่าง เหมาะ สม อาจ นํา พวก เขา มา ทํา งาน ให้ เรา ได้."
 ancient_forgeworld:0 "โลก โบราณ"
 ancient_forgeworld_desc:0 "ดาวเคราะห์ดวงนี้เคยเป็นศูนย์กลาง ของการผลิตบางอย่าง สําหรับอารยธรรมที่ถูกลืม แม้ ว่า มี เพียง เงา ของ ความ สามารถ เดิม ของ มัน ที่ ยัง คง อยู่ ใน สภาพ ทํา งาน แต่ ก็ ยัง เป็น ตัว อย่าง ที่ น่า ประทับ ใจ ของ อุตสาหกรรม."
 holy_planet:0 "ดาวศักดิ์สิทธิ์"
 holy_planet_desc:0 "ดาวเคราะห์ดวงนี้ถือว่าศักดิ์สิทธิ์ โดยฟอลเลนที่อยู่ใกล้เคียงจักรวรรดิการผสมมันจะทําให้พวกเขาโกรธ"
 ancient_weapon:0 "อาวุธ โบราณ"
 ancient_weapon_desc:0 "ดูเหมือนว่าบางการแข่งขันที่ ลืมได้นาน ครั้งหนึ่งได้สร้างชนิดของอาวุธขนาดใหญ่ในวงโคจรเหนือโลกนี้ ในขณะที่มันไม่ได้ผล จริงๆ แล้วมันไม่ได้เสร็จสมบูรณ์ เราสามารถที่จะเรียนรู้บางอย่างได้โดยการศึกษามัน"
 terraforming_candidate:0 "สามารถปรับสภาพดาวได้"
 terraforming_candidate_desc:0 "แม้ว่าจะแห้งแล้งและไร้สิ่งมีชีวิต แต่ดาวดวงนี้ก็มีน้ำในรูปแบบที่เป็นน้ำแข็งและครั้งหนึ่งอาจเคยเป็นที่ตั้งของระบบนิเวศที่เจริญรุ่งเรือง ด้วยเทคโนโลยีที่เหมาะสม มันสามารถปรับเปลี่ยนให้กลายเป็นดาวที่อาศัยอยู่ได้"
 terraforming_candidate_tooltip:0 "เมื่อเราค้นคว้าเทคโนโลยี £society£ §Y$tech_climate_restoration$§! เสร็จแล้ว เราจะสามารถแปลงโฉมดาวเคราะห์ดวงนี้ให้กลายเป็นดาวที่อยู่อาศัยได้"
 frozen_terraforming_candidate:0 "สามารถปรับสภาพดาวหนาวจัดได้"
 frozen_terraforming_candidate_desc:0 "แม้ จะ หนาว ถึง ขั้น ที่ ไม่ สามารถ ค้ําจุน ชีวิต ได้ แต่ น้ํา แข็ง ใน โลก นี้ ก็ สามารถ ทํา ให้ น้ํา นั้น กลาย เป็น โลก ที่ สามารถ อาศัย อยู่ ได้ หาก เรา สามารถ หา วิธี ที่ ถูก ต้อง."
 frozen_terraforming_candidate_tooltip:0 "ถ้าเราเลือก§Y$ap_hydrocentric$§!ขึ้นไปและทําวิจัย£society£ §Y$tech_climate_restoration$§!เทคโนโลยี, เราจะสามารถเปลี่ยนดาวเคราะห์ดวงนี้ ให้เป็นโลกที่อาศัยได้"
 toxic_terraforming_candidate:0 "สามารถปรับสภาพดาวพิษได้"
 toxic_terraforming_candidate_desc:0 "แม้ ว่า ก๊าซ ที่ ก่อ ความ เสีย หาย ใน โลก นี้ ทํา ให้ ชีวิต ไม่ เหมาะ สม แต่ ด้วย ความ พยายาม มาก พอ ก๊าซ เหล่า นี้ ก็ สามารถ ทําลาย เป็น สาร ประกอบ ที่ ทํา ให้ ถึง ตาย ได้ น้อย กว่า และ ใน ที่ สุด ก็ ยอม ให้ ตั้ง อาณานิคม ได้."
 toxic_terraforming_candidate_tooltip:0 "ถ้าเราเลือก§Y$ap_detox$§!ยกระดับขึ้น เราจะสามารถเปลี่ยนดาวเคราะห์ดวงนี้ ให้เป็นโลกที่อาศัยได้"
 ultra_rich:1 "คุณภาพยกเว้นแร่"
 ultra_rich_desc:1 "คุณภาพที่พิเศษของแร่ธาตุในเปลือกดาวเคราะห์ดวงนี้ เป็นโอกาสที่น่าตกใจจริงๆสําหรับการทําเหมือง"
 mineral_poor:1 "คุณภาพแย่แร่"
 mineral_poor_desc:1 "เป็น ที่ รู้ กัน ว่า ดาว เคราะห์ ดวง นี้ ก่อ ตัว ขึ้น อย่าง นี้ หรือ ถ้า เผ่า พันธุ์ ที่ ไม่ รู้ จัก บาง เชื้อ ชาติ เคย ถอด ถอน ทรัพยากร ที่ มี ค่า กว่า. อย่าง ไร ก็ ตาม เรา รู้ ว่า แร่ ธาตุ ต่าง ๆ ที่ มี อยู่ บน ดาว เคราะห์ ดวง นี้ มี คุณภาพ ไม่ ดี ผิด ปกติ."
 planet_uncertain_past:0 "ประวัติไม่แน่นอน"
 planet_uncertain_past_desc:0 "ผู้ คน บน ดาว เคราะห์ ดวง นี้ เป็น ทุกข์ เนื่อง จาก ไม่ รู้ ว่า อะไร เป็น สาเหตุ ของ ความ หายนะ ที่ เกิด ขึ้น นาน มา แล้ว และ ถูก ผลัก ดัน ให้ พยายาม ค้น หา."
 recent_quake:0 "เหตุการณ์ต่าง ๆ เมื่อเร็ว ๆ นี้"
 recent_quake_desc:0 "ดาวเคราะห์ดวงนี้ถูกเขย่าด้วยเหตุการณ์รุนแรง"
 recent_comet:0 "ดาวหางที่มองเห็น"
 recent_comet_desc:0 "เมื่อเร็ว ๆ นี้ดาวหางผ่านดาวเคราะห์ดวงนี้ เอสเตอร์รอยด์เบลต์ซึ่งเป็นสายตาที่น่าตื่นตาตื่นใจ!"
 recent_impact:0 "ลูกเล่นล่าสุด"
 recent_impact_desc:0 "อาณานิคม ใน ท้อง ถิ่น เมื่อ ไม่ นาน มา นี้ ได้ รับ ผล กระทบ จาก แอ ส เท อร์ ลอย ด์ ขนาด ใหญ่"
 magnetic_research_boost:0 "ความมหัศจรรย์ของสนามแม่เหล็ก"
 magnetic_research_boost_desc:0 "อย่างไรก็ตาม สนามแม่เหล็กของดาวเคราะห์ดวงนี้ กําลังแทรกแซงคอมพิวเตอร์ของเรา แต่แทนที่จะเป็นการรบกวนง่ายๆ"
 magnetic_disruption:0 "การเปลี่ยนแปลงรวดเร็วของสนามแม่เหล็ก"
 magnetic_disruption_desc:0 "สนามแม่เหล็กของดาวเคราะห์ดวงนี้ แทรกแซงคอมพิวเตอร์ของเรา ขัดขวางการทํางานของงานวิจัยอย่างมาก"
