 START_SCREEN_WILDERNESS_INTRO: "ตราบเท่าที่ความทรงจำจะย้อนไปได้ [root.GetHomeWorldName] เป็นดาวเคราะห์ [root.GetHomeWorldName] เสมอมา ทุกๆ ลำต้น หนวด และเอนไซม์ที่นี่คือส่วนหนึ่งของตัวตนเรา: ความสมดุลของการเติบโต การเน่าเปื่อย และการล่าเหยื่อ เป็นเวลานานแสนนานที่ [root.GetHomeWorldName] รับรู้ดาราจักรภายนอกได้อย่างเลือนลางเท่านั้น ทว่าหมู่ดาวได้กระสับกระส่ายมานานแล้ว\n\nการต่อสู้เกิดขึ้นบนท้องฟ้าเหนือ [root.GetHomeWorldName] ยานอวกาศขนาดใหญ่ได้โปรยเศษซากลงบนพื้นผิว—โบราณวัตถุของเอเลี่ยนที่ถูกนำมาปรับใช้อย่างรวดเร็ว จากนั้น ซูเปอร์แฟลร์(ซูปเปอร์เฟลอ)ก็ปะทุขึ้น..."
 START_SCREEN_WILDERNESS_DEFAULT: "[root.GetHomeWorldName] รู้สึกได้ถึงแสงสว่างที่แผดเผาและทำให้ตาบอด สิ่งมีชีวิตกลุ่มพึ่งพาของเราหลายพันล้านตัวถูกเผาผลาญและพัดพาหายไปด้วยพายุไฟและรังสี ทั่วทั้งทวีปถูกชำระล้างจนไร้ซึ่งชีวิต"
 START_SCREEN_WILDERNESS_COLD: "[root.GetHomeWorldName] รู้สึกได้ถึงแสงสว่างที่แผดเผาและทำให้ตาบอด ธารน้ำแข็งกลายเป็นกระแสน้ำที่เชี่ยวกราก ขณะที่รังสีดวงดาวเผาผลาญ [root.GetHomeWorldName] ไปถึงรากลึก ทั่วทั้งทวีปถูกชะล้างหายไป"
 START_SCREEN_WILDERNESS_DRY: "[root.GetHomeWorldName] รู้สึกได้ถึงแสงสว่างที่แผดเผาและทำให้ตาบอด เนินทรายละลายกลายเป็นแก้วและลมพายุพัดผ่านผาหินของเราจนสะอาดหมดจด ทั่วทั้งทวีปกลายเป็นพื้นที่แห้งแล้งอย่างสิ้นเชิง"
 START_SCREEN_WILDERNESS_WET: "[root.GetHomeWorldName] รู้สึกได้ถึงแสงสว่างที่แผดเผาและทำให้ตาบอด ทะเลสาบเดือดพล่านและแผ่นน้ำแข็งละลายในขณะที่รังสีดวงดาวเผาผลาญ [root.GetHomeWorldName] ไปถึงรากลึก ทั่วทั้งทวีปสูญสิ้นไป"
 START_SCREEN_WILDERNESS_OUTRO: "ความเจ็บปวดปลุกเราให้ตื่นขึ้น เป็นครั้งแรกที่เราเข้าใจความเปราะบางของเรา ดาราจักรนี้เต็มไปด้วยอันตราย แต่ก็มีความมหัศจรรย์เช่นกัน การใช้สิ่งที่เราเรียนรู้ เราจะงอกเงยและแผ่ขยายออกไป เราจะนำพาตัวเราเองเดินทางไปสู่หมู่ดาว"

####################################
# Authorities
####################################
 auth_mutualistic_intelligence: "จิตสำนึกพึ่งพากัน"
 auth_mutualistic_intelligence_plural: "จิตสำนึกพึ่งพากัน"
 auth_mutualistic_intelligence_desc: "$auth_mutualistic_intelligence_plural$ อุบัติขึ้นในฐานะจิตสำนึกร่วมแบบกระจายตัวในระดับดาวเคราะห์ ประกอบด้วยเผ่าพันธุ์ที่อยู่ร่วมกันพึ่งพากันซึ่งดึงมาจากสิ่งมีชีวิตที่หลากหลาย ทั้งหมดทำงานสอดคล้องกับเจตจำนงร่วมของสภาพแวดล้อมของตน\n\nสิ่งมีชีวิตกลุ่มพึ่งพาที่ได้รับเลือกอาจทำงานกึ่งอิสระในภารกิจเฉพาะด้าน แต่ส่วนใหญ่ขึ้นอยู่กับการติดต่ออย่างสม่ำเสมอกับสภาพแวดล้อมแบบพึ่งพา หากถูกตัดขาด พวกมันจะกลับไปมีพฤติกรรมตามสัญชาตญาณป่าก่อนที่จะดับสูญไปในที่สุด"
 tt_auth_mutualistic_intelligence: "มีอำนาจการปกครองแบบ §Y$auth_mutualistic_intelligence$§! (§Y$auth_hive_mind$§!)"

 gov_wilderness: "$gov_hive_mind$"
 gov_wilderness_desc: "รัฐบาลนี้ดำเนินการในฐานะจิตสำนึกเดียว โดยประชากรไม่มีทางเลือกส่วนบุคคลนอกจากการตอบสนองความต้องการและแรงปรารถนาของ $RT_WILDERNESS$"
 RT_WILDERNESS: "ป่าดงพงไพร"
 RT_WILDERNESS_FEMALE: "$RT_WILDERNESS$"

####################################
# Buildings
####################################
 building_colony_shelter_wilderness: "เส้นใยดาวเคราะห์"
 building_colony_shelter_wilderness_desc: "กลุ่มสิ่งมีชีวิตหลายเซลล์แผ่ขยายใยอยู่ทั่วโลกนี้ เพื่อให้มั่นใจถึงการมีอยู่ของป่าดงพงไพรที่มั่นคง"

 building_capital_wilderness: "มัดรากฐานดาวเคราะห์"
 building_capital_wilderness_desc: "มวลของสิ่งมีชีวิตขนาดเล็กที่ประสานและทำงานร่วมกับสิ่งมีชีวิตกลุ่มพึ่งพาเพื่อปรับปรุงการประสานงานและประสิทธิผลในการทำงานของพวกมัน"
 building_major_capital_wilderness: "เครือข่ายรากฐานดาวเคราะห์"
 building_major_capital_wilderness_desc: "มวลของสิ่งมีชีวิตที่มีความหนาแน่นเพียงพอที่จะช่วยให้สิ่งมีชีวิตกลุ่มพึ่งพาสามารถอยู่อาศัย ทำงาน และขยายพันธุ์ในพื้นที่เฉพาะเจาะจงได้"
 building_system_capital_wilderness: "แกนเชื่อมต่อรากฐานดาวเคราะห์"
 building_system_capital_wilderness_desc: "การรวมตัวกันครั้งยิ่งใหญ่ของสิ่งมีชีวิตที่หลากหลายที่ทำงานร่วมกัน ซึ่งมีขนาดใหญ่โตมากจนสามารถสร้างสภาพอากาศขนาดเล็กในอุดมคติของตนเองได้"
 requires_building_wilderness_capital: "§Rต้องการ §Y$building_capital_wilderness$§! บนดาวเคราะห์§!"
 requires_building_wilderness_major_capital: "§Rต้องการ §Y$building_major_capital_wilderness$§! บนดาวเคราะห์§!"
 requires_building_wilderness_system_capital: "§Rต้องการ §Y$building_system_capital_wilderness$§! บนดาวเคราะห์§!"

 building_imperial_capital_wilderness: "ส่วนบริหารจักรวรรดิ"
 building_imperial_capital_wilderness_desc: "ป่าดงพงไพรปกครองอาณาจักรผู้พิทักษ์ดาราจักรจากภายในโครงสร้างขนาดใหญ่และซับซ้อนนี้ ที่ซึ่งโชคชะตาของดาราจักรจะถูกกำหนดขึ้น"

 building_tendril_cradle_1: "อู่กำเนิดเส้นใย"
 building_tendril_cradle_1_desc: "กลุ่มใยสั้นๆ ที่มีรากฐานแผ่ขยายออกจากพื้นที่นี้ คอยดึงเอาวัตถุดิบใกล้เคียงเข้าสู่อวัยวะหลักในพื้นที่โดยรอบ"
 building_tendril_cradle_2: "สะพานเส้นใย"
 building_tendril_cradle_2_desc: "เส้นใยที่ยืดออกไปทั่วภูมิประเทศ ดึงทรัพยากรจากพื้นที่โดยรอบก่อนที่จะนำมาประมวลผลและกระจายต่อไป"
 building_tendril_cradle_3: "รังรากขนส่ง"
 building_tendril_cradle_3_desc: "รากที่ประสานกันเต้นเป็นจังหวะและเคลื่อนไหวใต้พื้นผิว ส่งผ่านชีวมวลผ่านช่องทางที่เป็นชั้นไปยังศูนย์กลางชีวภาพที่ห่างไกล"
 building_tendril_cradle_4: "ใจกลางเส้นใยดาวเคราะห์"
 building_tendril_cradle_4_desc: "เส้นใยโลจิสติกส์ขนาดใหญ่แผ่กระจายออกไปทั่วร่างกายของดาวเคราะห์ คอยดึง จัดการ และส่งทรัพยากรของป่าดงพงไพรด้วยการประสานงานที่ไม่มีวันเหน็ดเหนื่อย"

 planet_research_buildings: "อาคารวิจัยดาวเคราะห์"
 mod_planet_research_buildings_upkeep_mult: "ค่าบำรุงของ $planet_research_buildings$"
 building_brain_node_1: "ส่วนเติบโตงานวิจัย"
 building_brain_node_1_desc: "งานของสิ่งมีชีวิตกลุ่มพึ่งพาที่ชอบการสำรวจและทดลอง ช่วยสร้างรากฐานสำหรับการวิจัยทั่วไป"
 mod_planet_building_brain_node_1_build_speed_mult: "ความเร็วการสร้าง $building_brain_node_1$"
 building_brain_node_2: "สวนวิจัย"
 building_brain_node_2_desc: "แหล่งที่อยู่อาศัยที่อุทิศตนเพื่อส่งเสริมพฤติกรรมขี้สงสัย อำนวยความสะดวกในการศึกษาโบราณวัตถุและปรากฏการณ์ขั้นสูง"
 mod_planet_building_brain_node_2_build_speed_mult: "ความเร็วการสร้าง $building_brain_node_2$"
 building_brain_node_3: "เขตกักกันการวิจัยพิศวง"
 building_brain_node_3_desc: "เขตพื้นที่เหล่านี้ช่วยให้สิ่งมีชีวิตกลุ่มพึ่งพาจำนวนมากที่ชอบสภาพแวดล้อมสุดขั้ว สามารถทดลองกับวัตถุพิศวงและเป็นอันตรายทุกรูปแบบได้"
 mod_planet_building_brain_node_3_build_speed_mult: "ความเร็วการสร้าง $building_brain_node_3$"
 building_brain_node_4: "เขตกักกันการวิจัยขั้นสูง"
 building_brain_node_4_desc: "การผสมผสานของเทคโนโลยีพิศวงและเขตกักกันขนาดใหญ่ที่ปลูกขึ้นโดยสิ่งมีชีวิตกลุ่มพึ่งพา ช่วยอำนวยความสะดวกในการวิจัยที่ล้ำสมัยในสภาพแวดล้อมที่หลากหลาย"
 mod_planet_building_brain_node_4_build_speed_mult: "ความเร็วการสร้าง $building_brain_node_4$"

 building_commensal_clearing_1: "ที่โล่งพึ่งพากัน"
 building_commensal_clearing_1_desc: "พื้นที่แห่งความเงียบสงบเหล่านี้ช่วยให้สิ่งมีชีวิตที่เคลื่อนไหวได้ทุกประเภทสามารถมารวมตัวกัน พักผ่อน และปรับทิศทางของตนเองภายในป่าดงพงไพร"
 building_commensal_clearing_2: "ป่าพึ่งพากัน"
 building_commensal_clearing_2_desc: "สถานที่พักพิงในอุดมคติสำหรับการรวมตัวกันครั้งใหญ่ของสิ่งมีชีวิตกลุ่มพึ่งพา ที่ซึ่งการปฏิสัมพันธ์ของพวกมันจะช่วยเพิ่มความเข้าใจในตัวตนส่วนรวม"
 building_commensal_clearing_3: "หุบเขาพึ่งพากัน"
 building_commensal_clearing_3_desc: "ชุมชนที่มีความหนาแน่นและหลากหลายของสิ่งมีชีวิตกลุ่มพึ่งพาจะเคลื่อนย้ายผ่านพื้นที่เหล่านี้ เพื่อเสริมสร้างความเชื่อมโยงระหว่างกันและกัน"
 building_commensal_clearing_4: "ไบโอมพึ่งพากัน"
 building_commensal_clearing_4_desc: "แหล่งที่อยู่อาศัยขนาดใหญ่ที่เชื่อมต่อถึงกัน รองรับการพบปะเจอกันนับไม่ถ้วน ซึ่งแต่ละครั้งคือประกายไฟสำคัญของความเป็นปึกแผ่นแบบพึ่งพากัน"

 building_massive_growth_1: "หุบเขาอุดมสมบูรณ์"
 building_massive_growth_1_desc: "การปรับแต่งพื้นผิวทางธรณีวิทยาขนาดเล็กช่วยมอบสภาพอากาศในอุดมคติสำหรับการเติบโตของพืชผลที่เชื่อถือได้ตลอดทั้งปี"
 building_massive_growth_2: "พืชผักอุดมสมบูรณ์ใต้ป่า"
 building_massive_growth_2_desc: "ร่มเงาไม้ขนาดใหญ่ที่ยอมให้แสงบางส่วนผ่านได้ ช่วยให้ป่าชั้นล่างนี้ได้รับการปกป้องจากสิ่งแวดล้อมที่จำเป็นในการผลิตอาหารที่สมบูรณ์และฉ่ำน้ำอย่างสม่ำเสมอ"
 building_massive_growth_3: "แปลงเกษตรขนาดใหญ่ตามไหล่เขา"
 building_massive_growth_3_desc: "สวรรค์สำหรับสิ่งมีชีวิตขนาดเล็กและสัตว์กึ่งน้ำ แปลงไหล่เขาขนาดใหญ่เหล่านี้มอบอาหารจำพวกโปรตีนและธัญพืชอย่างอุดมสมบูรณ์"
 building_massive_growth_4: "พื้นที่เพาะปลูกวนเกษตร"
 building_massive_growth_4_desc: "การจัดพืชพรรณป่าชั้นล่างภายใต้ร่มเงาของไม้ใหญ่ช่วยให้มั่นใจได้ว่าจะมีผลผลิตอาหารที่อุดมสมบูรณ์เพื่อหล่อเลี้ยงเครือข่ายอาหารทั้งหมด"

 building_bioelectric_stimulator_1: "เครื่องปรับสภาพคลอโรพลาสต์"
 building_bioelectric_stimulator_1_desc: "กลุ่มฟองรูปเลนส์ช่วยรวมแสงอาทิตย์เข้าสู่ซุปสาหร่าย แปลงและจัดเก็บพลังงานนั้นเพื่อนำมาใช้งานในภายหลัง"
 building_bioelectric_stimulator_2: "เครื่องเร่งพลังงานคลอโรพลาสต์"
 building_bioelectric_stimulator_2_desc: "ฟองแก้วที่เต็มไปด้วยสาหร่ายสังเคราะห์แสงใช้พลังงานแสงอาทิตย์เพื่อสร้างพันธะเคมีชีวภาพที่แน่นหนาขึ้น ลดการคายประจุพลังงานออก"
 building_bioelectric_stimulator_3: "แผงเลนส์คลอโรพลาสต์"
 building_bioelectric_stimulator_3_desc: "กิ่งก้านที่สมดุลซึ่งเต็มไปด้วยอุปกรณ์รวบรวมแสงอาทิตย์สามารถปรับขึ้นหรือลงตามความต้องการและขีดความสามารถ ทำให้เป็นศูนย์กลางพลังงานที่ใช้งานได้หลากหลายและเชื่อถือได้"
 building_bioelectric_stimulator_4: "ซีสต์คลอโรพลาสต์"
 building_bioelectric_stimulator_4_desc: "ถุงแก้วที่มีสาหร่ายเหล่านี้อาจเคลื่อนย้ายและเพิ่มจำนวนขึ้นในที่ที่ต้องการพลังงานมากที่สุด ช่วยลดการสูญเสียพลังงานในระหว่างระยะทางได้เกือบทั้งหมด"

 building_churning_tunnels_1: "หัวเจาะศิลา"
 building_churning_tunnels_1_desc: "พืชที่มีความแข็งเกือบเท่าคริสตัลจะถูกบีบอัดลงในพื้นที่สกัดแร่เดิม เพื่อขุดเจาะได้ลึกขึ้นและเพิ่มผลผลิตแร่ให้มากขึ้น"
 building_churning_tunnels_2: "เครื่องกรองศิลา"
 building_churning_tunnels_2_desc: "โคโลนีของฟิล์มชีวภาพกึ่งซึมผ่านได้จะช่วยเก็บรวบรวมแร่ธาตุที่มีค่า ซึ่งอาจจะสูญหายไปในระหว่างกระบวนการขุดเจาะของเหลว"
 building_churning_tunnels_3: "เครื่องบดศิลา"
 building_churning_tunnels_3_desc: "แผ่นบดและคีมบีบอันทรงพลังช่วยย่อยวัตถุดินให้กลายเป็นสารเคมีเหลวเพื่อการสกัดแร่ที่ง่ายขึ้น"
 building_churning_tunnels_4: "บ่อเคมีศิลา"
 building_churning_tunnels_4_desc: "การทำงานร่วมกันของเครื่องบด สารเคมีชีวภาพ และฟิล์มชีวภาพ ช่วยให้สามารถสกัดแร่ธาตุในพื้นที่ก่อสร้างได้โดยตรงในจุดที่มีแหล่งแร่อุดมสมบูรณ์"

 building_natural_furnace_0: "บ่อหลอมเหลวธรรมชาติ"
 building_natural_furnace_0_desc: "สิ่งมีชีวิตกลุ่มพึ่งพาที่ทนความร้อนทำงานอย่างไม่มีเหน็ดเหนื่อยเพื่อผลิตโลหะผสมคุณภาพสูงรอบๆ แหล่งความร้อนธรรมชาตินี้"
 building_natural_furnace_1: "เตาเผาโลหะธรรมชาติ"
 building_natural_furnace_1_desc: "ส่วนพืชพรรณที่ทนความร้อนช่วยให้ใช้ความร้อนได้อย่างมีประสิทธิภาพมากขึ้น จึงผลิตโลหะผสมที่เหนือกว่าได้"
 building_natural_furnace_2: "เตาหลอมแสงธรรมชาติ"
 building_natural_furnace_2_desc: "เตาเผาแบบอินทรีย์หินที่ซับซ้อน เสริมด้วยเทคโนโลยีโฮโลแกรม ช่วยให้ผลิตโลหะผสมที่ใช้งานได้หลากหลายอย่างยิ่ง"
 building_natural_furnace_3: "เตาหลอมนาโนธรรมชาติ"
 building_natural_furnace_3_desc: "สิ่งมีชีวิตนาโนทนความร้อนอาศัยอยู่ในบ่อหลอมเหลวและเตาเผาเหล่านี้ ช่วยขจัดสิ่งเจือปนที่ไม่ต้องการออกจากโลหะผสมของเรา"

 building_avatar_chamber_1: "อู่กำเนิดอวตาร"
 building_avatar_chamber_1_desc: "อวัยวะที่เริ่มเติบโตซึ่งป่าดงพงไพรใช้สร้างรูปแบบพื้นฐาน เตรียมสัญชาตญาณให้พร้อมรับมือกับชีวิตและภูมิประเทศที่ไม่คุ้นเคยนอกชีวมณฑลบ้านเกิด"
 building_avatar_chamber_2: "ห้องอวตาร"
 building_avatar_chamber_2_desc: "ร่างกายจำลองจะถูกเพาะเลี้ยงและชี้นำผ่านกระบวนการทดลองภายใน เลียนแบบสิ่งมีชีวิตและระบบนิเวศต่างดาว ความรู้จะถูกส่งผ่านโดยการแสดงตัวตนแทนสิ่งที่ไม่รู้จัก"
 building_avatar_chamber_2_effect: "$building_avatar_chamber_1$ มอบโบนัส £amenities£ สิ่งอำนวยความสะดวกเพิ่มขึ้น §G200§!"
 building_avatar_chamber_3: "ป่าอวตาร"
 building_avatar_chamber_3_desc: "อวัยวะที่แผ่ขยายกว้างขวางนี้จะส่งสัญญาณแม่แบบอวตารที่เลียนแบบรูปแบบชีวิตและภูมิประเทศของเอเลี่ยน ป่าดงพงไพรเรียนรู้โดยการสัมผัสกับสิ่งที่ไม่เคยจับต้องมาก่อน"
 building_avatar_chamber_3_effect: "$building_avatar_chamber_1$ มอบโบนัส £amenities£ สิ่งอำนวยความสะดวกเพิ่มขึ้น §G400§!"
 building_avatar_chamber_4: "คอร์เทกซ์อวตาร"
 building_avatar_chamber_4_desc: "เครื่องยนต์แห่งการแสดงตัวตนระดับดาวเคราะห์ สามารถจำลองอารยธรรมทั้งหมด ระบบนิเวศต่างดาว และสิ่งแวดล้อมสุดขั้ว ที่นี่ป่าดงพงไพรจะซักซ้อมการพบปะกับดาราจักร"
 building_avatar_chamber_4_effect: "$building_avatar_chamber_1$ มอบโบนัส £amenities£ สิ่งอำนวยความสะดวกเพิ่มขึ้น §G800§!"

 building_mote_aggravator: "เครื่องย่อยสารเคมี"
 building_mote_aggravator_desc: "ระบบเนื้อเยื่อหลอดเลือดและเครื่องเผาผลาญสารเคมีที่สง่างาม ผลิต $volatile_motes$ จากวัตถุดินทั่วไป"

 building_churning_stomach: "เครื่องกรองแก๊สพิศวง"
 building_churning_stomach_desc: "จุลินทรีย์เฉพาะทางสูงและสิ่งมีชีวิตนาโนทำปฏิกิริยากับละอองลอยทั่วไปเพื่อผลิตแก๊สสะสมปรับปรุงเหล่านี้ $exotic_gases$"

 building_crystal_growth: "แปลงเพาะผลึกคริสตัล"
 building_crystal_growth_desc: "ร่มเงาพิเศษช่วยอำนวยความสะดวกในการควบคุมความชื้นและอุณหภูมิที่แม่นยำที่จำเป็นต่อการเพาะผลึกคริสตัลเทียม $rare_crystals$"

 building_planetary_carapace: "ป้อมค่ายกระดูก"
 building_planetary_carapace_desc: "สิ่งมีชีวิตกลุ่มพึ่งพาที่หวงแหนถิ่นฐานอย่างรุนแรงสามารถอาศัยอยู่ในพื้นที่ฝึกซ้อมนี้ พร้อมที่จะถูกเรียกใช้งานทุกเมื่อ"
 mod_planet_building_planetary_carapace_build_speed_mult: "ความเร็วการสร้าง $building_planetary_carapace$"
 building_planetary_carapace_2: "ป้อมปราการกระดูก"
 building_planetary_carapace_2_desc: "โรงงานขนาดใหญ่สำหรับพื้นที่ฝึกซ้อมและที่พักพิงนี้ช่วยให้ผู้ป้องกันที่อยู่ภายในพร้อมสำหรับการบุกรุกดาวเคราะห์ในทุกรูปแบบ"

 building_ozone_thickener: "หลังคาม่านเกราะดาวเคราะห์"
 building_ozone_thickener_desc: "$tech_planetary_shield_generator_desc$"

 building_subterranean_cache: "คลังเก็บใต้ดิน"
 building_subterranean_cache_desc: "$building_resource_silo_desc$"

 building_cradle_of_rebirth: "อู่กำเนิดการเกิดใหม่"
 building_cradle_of_rebirth_desc: "โครงสร้างนี้ฝังรากลึก ทำหน้าที่ย่อยสลายสารอินทรีย์ที่เน่าเปื่อยและเหยื่อที่ถูกล่าให้กลายเป็นชีวมวล คอยหล่อเลี้ยงร่างกายของโลกดวงนี้ในทุกๆ จังหวะการเต้น"

 building_wilderness_storm_relief: "$building_storm_resistant_production$"
 building_wilderness_storm_relief_desc: "หลังคาพุ่มใบไม้หนาทึบและประจุไฟฟ้าชีวภาพช่วยรับประกันความปลอดภัยของสิ่งมีชีวิตในบริเวณใกล้เคียง และช่วยให้ตอบสนองต่อพายุระบบสุริยะได้อย่างรวดเร็วโดยไม่เป็นอันตรายต่อชีวิตหรือผลผลิตการทำงาน"
 building_wilderness_storm_relief_tt: "ผลกระทบเชิงลบจาก §Y$default_storm$§! ที่ส่งผลต่อผลผลิตดาวเคราะห์จะลดลง §G25%§!"

 holding_wilderness_glade: "ป่าโปร่งแห่งพงไพร"
 holding_wilderness_glade_plural: "ป่าโปร่งแห่งพงไพร"
 holding_wilderness_glade_desc: "ภูมิภาคของป่าดงพงไพรแบบพึ่งพากันซึ่งเชื่อมโยงกับจิตสำนึกร่วมหลัก แม้จะขึ้นอยู่กับแหล่งอาหารในท้องถิ่นอย่างมาก แต่สิ่งมีชีวิตกลุ่มพึ่งพาในไบโอมกระเป๋านี้มีความเชี่ยวชาญในการสกัดทรัพยากรอื่นๆ ในบริเวณใกล้เคียง"
 holding_wilderness_glade_effect_desc: "ดาวเมืองขึ้นจะเปลี่ยน [owner.WildernessGladeProvides] เป็นทรัพยากร $r_basic_plural$ ให้แก่ผู้ปกครองสูงสุด\nผู้ปกครองสูงสุดจะลด $mod_planet_jobs_productive_upkeep_mult$ บนดาวเมืองขึ้น\nสิ่งกีดขวาง £blocker£ §Y$holding_wilderness_glade$§! จะปรากฏบนดาวเคราะห์ ยึดช่องเขตพื้นที่ไปหนึ่งช่อง"
 no_free_district_for_wilderness_glade: "$TRIGGER_FAIL$§Rไม่มีช่องเขตพื้นที่ว่างบนดาวเคราะห์นี้สำหรับไบโอมกระเป๋าของเรา§!"
 blocker_tied_to_wilderness_glade: "$TRIGGER_FAIL$§Rสิ่งกีดขวางนี้จะยังคงอยู่ตราบเท่าที่ยังมี $holding_wilderness_glade$ ประจำการบนโลกดวงนี้§!"
 d_wilderness_glade_blocker: "$d_wilderness_root_blocker$"
 d_wilderness_glade_blocker_desc: "โครงสร้างรากขนาดใหญ่ที่จำเป็นต่อการรองรับ $holding_wilderness_glade$ ที่อยู่ใกล้เคียง ช่วยให้ไบโอมกระเป๋านี้สามารถอยู่รอดในสภาพแวดล้อมเอเลี่ยนนี้ได้"
 holding_wilderness_glade_modifier: "การกระจายพื้นที่ป่าโปร่งแห่งพงไพร"
 holding_wilderness_glade_modifier_desc: "โลกของรัฐเมืองขึ้นสอดประสานกลมกลืนกับโลกของเรา แต่ละฝ่ายแบ่งปันผลลัพธ์แบบพึ่งพากันและกัน"
 holding_wilderness_glade_modifier_tt: "จำนวนจะแตกต่างกันไปตามจำนวนดาวเมืองขึ้นที่รองรับ §Y$holding_wilderness_glade_plural$§!"

####################################
# Districts
####################################
 district_craglands: "ไบโอมส่วนร่วม"
 district_craglands_plural: "ไบโอมส่วนร่วม"
 district_craglands_desc: "สวนพืชพรรณอันอุดมสมบูรณ์เหล่านี้มอบที่พักพิงให้แก่สิ่งมีชีวิตกลุ่มพึ่งพา ซึ่งร่วมกันก่อร่างสร้างตัวและพึ่งพาอาศัยป่าดงพงไพรไปพร้อมกัน"
 mod_district_craglands_max_add: "จำนวน $district_craglands_plural$ สูงสุด"
 mod_planet_district_craglands_build_speed_mult: "ความเร็วการสร้าง $district_craglands$"

 district_orchard_forests: "ป่าสวนผลไม้"
 district_orchard_forests_plural: "ป่าสวนผลไม้"
 district_orchard_forests_desc: "พื้นที่ที่จัดไว้สำหรับการเพาะปลูกและล่าสัตว์ เพาะเลี้ยงทุกสิ่งตั้งแต่แหล่งอาหารของเซลล์ไปจนถึงธัญพืชที่กินได้และสัตว์เหยื่อพึ่งพากัน"
 mod_district_orchard_forests_max_add: "จำนวน $district_orchard_forests_plural$ สูงสุด"
 mod_planet_district_orchard_forests_build_speed_mult: "ความเร็วการสร้าง $district_orchard_forests$"

 district_orchard_forests_uncapped: "$district_orchard_forests$"
 district_orchard_forests_uncapped_plural: "$district_orchard_forests_plural$"
 district_orchard_forests_uncapped_desc: "$district_orchard_forests_desc$"
 mod_district_orchard_forests_uncapped_max: "$mod_district_orchard_forests_max_add$"
 mod_planet_district_orchard_forests_uncapped_build_speed_mult: "$mod_planet_district_orchard_forests_build_speed_mult$"

 district_photosynthesis_fields: "ทุ่งสังเคราะห์แสง"
 district_photosynthesis_fields_plural: "ทุ่งสังเคราะห์แสง"
 district_photosynthesis_fields_desc: "พุ่มใบไม้สังเคราะห์แสงกว้างใหญ่เป็นกระดูกสันหลังของภูมิภาครวบรวมพลังงานแสงอาทิตย์ขนาดใหญ่เหล่านี้"
 mod_district_photosynthesis_fields_max_add: "จำนวน $district_photosynthesis_fields_plural$ สูงสุด"
 mod_planet_district_photosynthesis_fields_build_speed_mult: "ความเร็วการสร้าง $district_photosynthesis_fields$"

 district_photosynthesis_fields_uncapped: "$district_photosynthesis_fields$"
 district_photosynthesis_fields_uncapped_plural: "$district_photosynthesis_fields_plural$"
 district_photosynthesis_fields_uncapped_desc: "$district_photosynthesis_fields_desc$"
 mod_district_photosynthesis_fields_uncapped_max: "จำนวน $district_photosynthesis_fields_plural$ สูงสุด"
 mod_planet_district_photosynthesis_fields_uncapped_build_speed_mult: "$mod_planet_district_photosynthesis_fields_build_speed_mult$"

 district_hollow_mountains: "ภูเขาโพรงศิลา"
 district_hollow_mountains_plural: "ภูเขาโพรงศิลา"
 district_hollow_mountains_desc: "ภูมิประเทศที่เป็นหินและภูเขานี้เต็มไปด้วยร่องรอยเหมืองที่ขุดขึ้นโดยสิ่งมีชีวิตกลุ่มพึ่งพาในการค้นหาแร่ธาตุที่มีค่า"
 mod_district_hollow_mountains_max_add: "จำนวน $district_hollow_mountains_plural$ สูงสุด"
 mod_planet_district_hollow_mountains_build_speed_mult: "ความเร็วการสร้าง $district_hollow_mountains$"

 district_hollow_mountains_uncapped: "$district_hollow_mountains$"
 district_hollow_mountains_uncapped_plural: "$district_hollow_mountains_plural$"
 district_hollow_mountains_uncapped_desc: "$district_hollow_mountains_desc$"
 mod_district_hollow_mountains_uncapped_max: "$mod_district_hollow_mountains_max_add$"
 mod_planet_district_hollow_mountains_uncapped_build_speed_mult: "$mod_planet_district_hollow_mountains_build_speed_mult$"

####################################
# Zones
####################################
 zone_urban_wilderness: "สวนหัวใจพงไพร(เสียงหัวใจ)"
 zone_urban_wilderness_desc: "แกนกลางที่เต้นเป็นจังหวะของชีวมวลและสัญชาตญาณ มีการขยายตัวและปรับเปลี่ยนรูปร่างอยู่ตลอดเวลา ที่นี่ ป่าดงพงไพรได้แผ่รากขยายกว้างและลึก พร้อมที่จะรองรับฟังก์ชันใหม่ๆ ที่กำลังเกิดขึ้น"

 zone_foundry_wilderness: "ห้องหลอมเหลว(เสียงปืน)"
 zone_foundry_wilderness_desc: "ห้องความร้อนนี้เต็มไปด้วยหินหลอมเหลวและพลังงานธาตุอาวุธ $job_forgesymbiont_plural$ หล่อหลอมโลหะที่นี่ในจังหวะการย่อยอาหาร หล่อเลี้ยงโครงร่างที่กำลังเติบโตของโลกดวงนี้"

 zone_research_wilderness: "กิ่งความคิด(คิด)"
 zone_research_wilderness_desc: "ปุ่มประสาทส่วนบนและส่วนพืชพรรณที่กลายพันธุ์ $job_evosymbiont_plural$ อุบัติขึ้นที่นี่พร้อมกับระยางค์ใหม่ ประสาทสัมผัสใหม่ และความเข้าใจใหม่ๆ"

 zone_unity_wilderness: "ผาร้องเพลง(เสียงแหลม)"
 zone_unity_wilderness_desc: "หน้าผาสูงตระหง่านที่ประสานกับกระดูกกลวงและเนื้อหิน ที่ซึ่งสายลมพัดพานำท่วงทำนองผ่านพื้นผิวโลก ณ ที่นี้ $job_choirsymbiont_plural$ จะรวมตัวกัน เพื่อให้โลกนี้ได้เปล่งเสียงเพลง"

 zone_fortress_wilderness: "ต่อมบัญชาการ(เครื่องราชอิสริยาภรณ์)"
 zone_fortress_wilderness_desc: "ปุ่มประสาทสัมผัสที่ขยายใหญ่ซึ่ง $job_tamersymbiont_plural$ มารวมตัวกัน คอยหลั่งสารเคมีเพื่อรวมพลและสั่งการฝูงสัตว์ป่าดงพงไพรไม่ได้ออกคำสั่ง แต่หลั่งสารบัญชาการ"

 zone_minerals_wilderness: "สันกระดูกแร่(ออสการ์)"
 zone_minerals_wilderness_desc: "โครงสร้างหินมีชีวิตสูงตระหง่านและมีสันเขา เป็นส่วนผสมของเทือกเขาและอวัยวะ ภายในกระดูกที่เป็นถ้ำ แร่ธาตุจะสะสมและเต้นเป็นจังหวะด้วยลมหายใจอันเชื่องช้าของป่าดงพงไพร"

 zone_energy_wilderness: "ปอดราแสงอาทิตย์(Solar Mycolungs)"
 zone_energy_wilderness_desc: "ทุ่งเนื้อเยื่อสังเคราะห์แสงขนาดใหญ่พองตัวด้วยแสงอาทิตย์ที่จับไว้ สร้างแรงดันจนกว่าพวกมันจะพ่นออกมาเป็นจังหวะ จากการปะทุอันรุ่งโรจน์นี้ $job_photosymbiont_plural$ จะถูกปล่อยขึ้นสู่ท้องฟ้า โต้กระแสน้ำความร้อนตามวิถีดวงดาว"

 zone_food_wilderness: "สวนบานสะพรั่ง(Bloomloom)"
 zone_food_wilderness_desc: "สมองที่หอมกรุ่นของกลีบดอกไม้และฟีโรโมน ถักทอเส้นทางการผสมเกสรเหมือนใยผืนผ้า จากจุดนี้ ความอุดมสมบูรณ์ของดาวเคราะห์จะได้รับการจัดการด้วยประสิทธิภาพระดับเดียวกับโรงงานจักรกล"

 zone_research_unity_wilderness: "แกนประสานเสียง(ฮาร์โมนิคแคร์)"
 zone_research_unity_wilderness_desc: "อวัยวะจังหวะการเต้น ณ ใจกลางป่าดงพงไพร ที่ซึ่งความรู้สั่นสะเทือนผ่านความทรงจำและข้อมูล ความคิดไม่ได้เริ่มต้นขึ้นที่นี่ แต่มันก้องกังวานออกไป"

 zone_trade_wilderness: "เส้นใยนำทาง(เสียงประตู)"
 zone_trade_wilderness_desc: "ลูปเส้นใย ระยางค์ที่ขดม้วน และถุงจัดเก็บสร้างศูนย์กระจายสินค้าที่ไม่มีวันเหน็ดเหนื่อย ที่ซึ่ง $job_spindlesymbiont_plural$ ถักทอและส่งมอบสิ่งจำเป็นในชีวิต ป่าดงพงไพรส่งมอบตัวมันเอง"

####################################
# Decisions
####################################
 decision_wilderness_expand: "ขยายขนาดดาวเคราะห์"
 decision_wilderness_expand_desc: "ดูดซับชีวมวลที่เราได้รวบรวมเพื่อเพิ่มขนาดการเติบโตให้กับโลกของเรา"
 decision_wilderness_mastery_over_nature_desc: "ตัวตนส่วนรวมของเราต้องการพื้นที่สำหรับการเติบโต ดังนั้นเราจะขยายขอบเขตออกไป เราจะปรับตัวให้เข้ากับทุกสภาพแวดล้อมของดาวเคราะห์นี้"

