 col_wilderness_default: "อาณานิคมป่าดงพงไพร"

####################################
# Planet Designations
####################################
 col_wilderness_capital: "โลกหัวใจพงไพร"
 col_wilderness_capital_tt: "$col_wilderness_capital_desc$"
 col_wilderness_capital_desc: "ทุกตารางนิ้วของโลกดวงนี้เต็มไปด้วยชีวิตพึ่งพาอาศัยกัน มารวมตัวกันในจำนวนที่มากเสียจนพวกมันสร้างร่างกายที่เป็นดั่งดวงดาวมีชีวิตขึ้นมา"
 col_wilderness_generator: "โลกสังเคราะห์แสง"
 col_wilderness_generator_desc: "$col_generator_desc$"
 col_wilderness_generator_tt: "สิ่งมีชีวิตสังเคราะห์แสงจำนวนมากมารวมตัวกันและกักเก็บพลังงานไว้บนโลกดวงนี้"
 col_wilderness_mining: "โลกศิลาเหมืองแร่"
 col_wilderness_mining_desc: "$col_mining_desc$"
 col_wilderness_mining_tt: "การขุดเจาะลงใต้พื้นผิวโลกที่ดูเหมือนจะรกร้างคือความร่วมมือของชีวิตใต้ดิน คอยสกัดทรัพยากรแร่อย่างขยันขันแข็ง"
 col_wilderness_farming: "โลกขยายพันธุ์พืชผัก"
 col_wilderness_farming_desc: "$col_farming_desc$"
 col_wilderness_farming_tt: "สิ่งมีชีวิตกลุ่มพึ่งพาเฉพาะทางรักษาสภาวะการเจริญเติบโตในอุดมคติไว้ทั่วโลกดวงนี้ เพื่อส่งเสริมผลผลิตพืชและสัตว์อาหารที่อุดมสมบูรณ์"
 col_wilderness_fortress: "โลกนักล่า"
 col_wilderness_fortress_desc: "$col_fortress_desc$"
 col_wilderness_fortress_tt: "พื้นผิวของโลกดวงนี้สั่นสะเทือนจากการเดินขบวนของฝูงสัตว์ป่าดงพงไพรที่ปกป้องถิ่นฐานอย่างรุนแรงและเสียงร้องของเหล่านักล่าที่น่ากลัว"
 col_wilderness_tech: "โลกแห่งความคิดจินตนาการ"
 col_wilderness_tech_desc: "$col_research_desc$"
 col_wilderness_tech_tt: "โลกที่เต็มไปด้วยสิ่งแปลกใหม่และปรากฏการณ์ลึกลับ ที่นั่นถูกจับต้องและสำรวจโดยจิตใจที่อยากรู้อยากเห็น"
 col_wilderness_nest: "โลกใยพงไพร"
 col_wilderness_nest_desc: "$col_city_desc$"
 col_wilderness_nest_tt: "สถานที่พักพิงสำหรับสิ่งมีชีวิตกลุ่มพึ่งพากันจำนวนมาก ซึ่งชั้นบรรยากาศอาจเปลี่ยนแปลงส่วนประกอบในตัวเองเพื่อตอบสนองต่อความต้องการและอารมณ์ของป่าดงพงไพร"
 col_wilderness_refinery: "โลกกลั่นกรองวัตถุ"
 col_wilderness_refinery_desc: "เชี่ยวชาญด้านการผลิตแก๊สสะสม £exotic_gases£ §H$exotic_gases$§! และทรัพยากรยุทธศาสตร์อื่นๆ £strategic_resource£ §Hทรัพยากรเส้นรุ้ง§!."
 col_wilderness_refinery_tt: "ดาวเคราะห์ดวงนี้เต็มไปด้วยช่องเปิดความร้อนใต้พิภพที่ซึ่งสิ่งมีชีวิตนาโนและสิ่งมีชีวิตกลุ่มพึ่งพากันอื่นๆ มารวมตัวกันและผ่านกระบวนการจัดการวัตถุดิบดิบ"
 col_wilderness_forge: "โลกเตาหลอมศิลา"
 col_wilderness_forge_desc: "$col_foundry_desc$"
 col_wilderness_forge_tt: "เตาหลอมขนาดเท่าดาวเคราะห์สำหรับการบดและจัดการแร่ดิบให้กลายเป็นโลหะผสมที่ทรงประสิทธิภาพและหลากหลายการใช้งาน"
 col_wilderness_unification: "โลกแห่งความสงบสุข"
 col_wilderness_unification_desc: "$col_bureau_desc$"
 col_wilderness_unification_tt: "กลิ่นอายของการพึ่งพาอาศัยกันอย่างไม่เร่งรีบแผ่ซ่านอยู่ทั่วโลกดวงนี้ ช่วยเพิ่มความสัมพันธ์ที่ซับซ้อนระหว่างสิ่งมีชีวิตกลุ่มพึ่งพากันให้ลึกซึ้งยิ่งขึ้น"

####################################
# Personalities
####################################
 personality_benevolent_wilderness: "ป่าดงพงไพรประสานกลมกลืน"
 personality_benevolent_wilderness_desc: "ชีวมณฑลทรงภูมิปัญญาอันกว้างใหญ่นี้แสวงหาเพียงเพื่อการเชื่อมโยงกับหมู่ดาว รากฐานของพวกมันแผ่ขยายไปตามดาราจักรอย่างอดทน ไม่ใช่ด้วยความกระหาย แต่ด้วยความประสานกลมกลืน"

 personality_rampant_wilderness: "ป่าดงพงไพรที่แผ่ขยาย"
 personality_rampant_wilderness_desc: "ป่าดงพงไพรที่แผ่ขยายไม่ได้โกรธเกรี้ยว แต่มันเจริญเติบโต กลืนกิน และยืนหยัด ทุกๆ สิ่ง ทั้งมีชีวิตหรือไร้ชีวิต จะถูกคืนสู่ธรรมชาติในวัฏจักรที่ไม่มีวันสิ้นสุดของการเติบโตและการเน่าสลาย"

####################################
# Policies
####################################
 policy_symbiont_policy: "$policy_drone_policy$"
 policy_symbiont_policy_desc: "การรวบรวมแบบพึ่งพากันของเรามีความสามารถและผลผลิตที่ดี แต่ก็ไม่ได้ไร้ขีดจำกัด เราต้องเลือกวิธีและเป้าหมายที่ทรัพยากรของเราจะถูกนำมาใช้งานได้ดีที่สุด"

 symbiont_policy_balanced: "$drone_policy_balanced$"
 symbiont_policy_balanced_name: "$symbiont_policy_balanced$"
 symbiont_policy_balanced_desc: "ป่าดงพงไพรอุทิศตนอย่างเท่าเทียมกันในการผลิตทรัพยากรดิบและสินค้าสำเร็จรูป\n\n§Eไม่มีโบนัสหรือบทลงโทษสำหรับการผลิตทรัพยากร§!"

 symbiont_policy_worker: "$drone_policy_worker$"
 symbiont_policy_worker_name: "$symbiont_policy_worker$"
 symbiont_policy_worker_desc: "ป่าดงพงไพรให้ความสำคัญกับสกัดทรัพยากรดิบ โดยสิ่งมีชีวิตกลุ่มพึ่งพาจะทำงานได้ดีขึ้นแลกกับสินค้าเฉพาะทางที่น้อยลง\n\n"

 symbiont_policy_thinker: "$drone_policy_thinker$"
 symbiont_policy_thinker_name: "$symbiont_policy_thinker$"
 symbiont_policy_thinker_desc: "ป่าดงพงไพรให้ความสำคัญกับผลิตสินค้าสำเร็จรูป โดยสิ่งมีชีวิตกลุ่มพึ่งพาจะผลิตสินค้าสำเร็จรูปได้ดีขึ้นแลกกับทรัพยากรดิบที่น้อยลง\n\n"

####################################
# Edicts
####################################
 edict_capacity_subsidies_wilderness: "$edict_capacity_subsidies$"
 edict_capacity_subsidies_wilderness_desc: "พระราชกฤษฎีกานี้ช่วยส่งเสริมให้สิ่งมีชีวิตสังเคราะห์แสงสร้างฝูงสัตว์อพยพเพื่อเคลื่อนตัวตามดวงอาทิตย์ข้ามพื้นผิวโลก ช่วยเพิ่มการผลิตพลังงาน"
 edict_mining_subsidies_wilderness: "$edict_mining_subsidies$"
 edict_mining_subsidies_wilderness_desc: "พระราชกฤษฎีกานี้ช่วยเสริมความแข็งแกร่งของรากฐาน ทำให้สิ่งมีชีวิตขุดเจาะของเราสามารถเจาะลงใต้ดินด้วยความเสี่ยงที่น้อยลงจากโครงสร้างถ้ำพังทลาย"
 edict_farming_subsidies_wilderness: "$edict_farming_subsidies$"
 edict_farming_subsidies_wilderness_desc: "พระราชกฤษฎีกานี้มอบการเจือจางสารเคมีพลังงานสูงในดินอย่างแข็งขันเพื่อเพิ่มการผลิตผลผลิตอาหารของเรา"
 edict_forge_subsidies_wilderness: "$edict_forge_subsidies$"
 edict_forge_subsidies_wilderness_desc: "การเติมเต็มสารอาหารในบ่อสาหร่ายช่วยให้สาหร่ายเบ่งบานตามฤดูกาลและเพิ่มการเก็บเกี่ยวโลหะผสม"
 edict_research_subsidies_wilderness: "$edict_research_subsidies$"
 edict_research_subsidies_wilderness_desc: "$edict_research_subsidies_desc$"
 edict_clearing_motes_wilderness: "$edict_clearing_motes$"
 edict_clearing_motes_wilderness_desc: "การเสริมโภชนาการด้วยสารเคมีระเหยช่วยให้สิ่งมีชีวิตสามารถย่อยสลายทั้งสารอินทรีย์และอนินทรีย์ได้ ระบบนิเวศของเราจะปรับตัวเข้ากับสภาพแวดล้อมโดยการกินมันเข้าไป"
 edict_learning_campaign_wilderness: "$edict_learning_campaign$"
 edict_learning_campaign_wilderness_desc: "การมอบสารอาหารเพิ่มเติมให้แก่สิ่งมีชีวิตกลุ่มพึ่งพาช่วยให้เราสามารถเพิ่มผลผลิตการทำงานได้"
 edict_war_drone_campaign_wilderness: "แคมเปญสิ่งมีชีวิตร่วมรบ"
 edict_war_drone_campaign_wilderness_desc: "การจัดสรรสารอาหารเพิ่มเติมให้กับนักล่าและสิ่งมีชีวิตแบบฝูงช่วยให้เราเพิ่มพละกำลังและความพร้อมในการรบให้แก่พวกมันได้"
 edict_scientific_revolution_wilderness: "$edict_scientific_revolution$"
 edict_scientific_revolution_wilderness_desc: "$edict_scientific_revolution_desc$"
 edict_drone_overdrive_wilderness: "เร่งการทำงานของสิ่งมีชีวิต"
 edict_drone_overdrive_wilderness_desc: "ไบโอมของเราจะถูกทำให้มีการแข่งขันมากขึ้นในขณะที่ต้องการทรัพยากรมากขึ้น"

