####################################
 tech_wilderness_terraform: "การงอกเงยดาวเคราะห์"
 tech_wilderness_terraform_desc: "การแผ่รากฐานของเราไปยังโลกใบใหม่เป็นครั้งแรกกำหนดให้เราต้องเตรียมดินร่องเพาะปลูก การปรับสภาพดาวเคราะห์ก่อนจะช่วยยืนยันได้ว่าอาณานิคมของเราจะเริ่มต้นได้อย่างแข็งแรง"

 tech_terrestrial_sculpting_wilderness: "$tech_terrestrial_sculpting$"
 tech_terrestrial_sculpting_wilderness_desc: "$tech_terrestrial_sculpting_desc$"
 tech_terrestrial_sculpting_wilderness_effect: "§Hปลดล็อกฟีเจอร์:§! อนุญาตให้ทำการปรับสภาพดาวเคราะห์ของระดับดาวมาตรฐานทั้งหมดได้"

 tech_wilderness_node: "ศูนย์กลางของการดำรงอยู่"
 tech_wilderness_node_desc: "การสนับสนุนการเจริญเติบโตของสิ่งมีชีวิตกลุ่มพึ่งพาที่ใช้ความคิดลึกซึ้งในป่าโปร่งทั่วทั้งตัวตนส่วนร่วม จะช่วยให้เจตจำนงร่วมของเราสัมผัสได้ชัดเจนขึ้นโดยทั้งหมด"
 tech_wilderness_cluster: "$tech_hive_cluster$"
 tech_wilderness_cluster_desc: "เราสามารถเร่งความคล่องแคล่วของความคิดร่วมในระดับโลกได้โดยการลงทุนในสิ่งมีชีวิตกลุ่มพึ่งพาที่มีจุดประสงค์เดียวในชีวิตคือการช่วยเหลือเจตจำนงร่วมนั้น"
 tech_wilderness_confluence: "$tech_hive_confluence$"
 tech_wilderness_confluence_desc: "เจตจำนงแบบพึ่งพากันของเราจะได้รับการเสริมสร้างความแข็งแกร่งโดยการรวมตัวของสิ่งมีชีวิตที่เข้าใจความรู้สึกผู้อื่นอย่างลึกซึ้ง เพื่อช่วยรวบรวมและส่งสัญญาณความคิดร่วมของเราต่อไป"

 tech_genome_mapping_wilderness: "$tech_genome_mapping$"
 tech_genome_mapping_wilderness_desc: "การทำแผนที่จีโนมของดีเอ็นเอที่หลากหลายช่วยเพิ่มความเข้าใจในการเจริญเติบโตของเรา และช่วยขจัดปัจจัยที่ซับซ้อนออกไป"
 tech_mining_1_wilderness: "$tech_mining_1$"
 tech_mining_1_wilderness_desc: "สารเคลือบเนื้อเยื่อและแรงดันไฮดรอลิกสามารถนำมาประยุกต์ใช้กับแหล่งสะสมแร่ที่มีอยู่เพื่อขุดเจาะได้ลึกขึ้นและเพิ่มผลผลิตของเราให้มากขึ้น"
 tech_powered_exoskeletons_wilderness: "$tech_powered_exoskeletons$"
 tech_powered_exoskeletons_wilderness_desc: "ชุดเพิ่มพลังกล้ามเนื้อช่วยเพิ่มความแข็งแกร่งและความเร็วของผู้สวมใส่ มอบประโยชน์ทางการทหารอย่างชัดเจนและเพิ่มประสิทธิภาพของการทำงานทางกายภาพ"
 tech_colonization_1_wilderness: "โครงการริเริ่มหมู่โลกใหม่"
 tech_colonization_1_wilderness_desc: "เราหันความสนใจไปที่การคำนวณทรัพยากรและวัสดุที่จำเป็นในการปลุกพลังของโลกใบใหม่ เพื่อเตรียมพร้อมให้สิ่งมีชีวิตผู้บุกเบิกสำหรับการเดินทางที่ยากลำบากข้ามหมู่ดาว"

 tech_wilderness_government: "$tech_planetary_government$"
 tech_wilderness_government_desc: "จากวินาทีที่ดาวเคราะห์ดวงใหม่ได้รับการปลุกพลัง ลำดับความสำคัญของมันต้องอยู่ที่การรักษาสภาพแวดล้อมที่มั่นคงและเจริญรุ่งเรือง มากกว่าการคำนึงถึงตัวตนส่วนร่วมในภาพรวมของเรา"
