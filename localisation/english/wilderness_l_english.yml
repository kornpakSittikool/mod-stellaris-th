l_english:
####################################
# Events
####################################

# introduction event
 progress.2.desc.wilderness: "[Root.GetName] ได้ค้นพบสิ่งที่น่าแปลกใจบน [from.GetName]: ดาวเคราะห์ [from.GetPlanetMoon] ดวงนี้เต็มไปด้วยสิ่งมีชีวิตต่างดาว! เป็นครั้งแรกที่เราได้พบสิ่งมีชีวิตที่มีต้นกำเนิดนอกเหนือตัวเราเอง\n\nการค้นพบนี้ยืนยันในที่สุดว่าเราซึ่งเป็นดาวเคราะห์ [root.owner.capital_scope.GetName] ไม่ได้อยู่อย่างโดดเดี่ยวในจักรวาล แม้ว่าสิ่งมีชีวิตต่างดาวที่พบบน [from.GetName] จะไม่มีสายพันธุ์ใดที่มีภูมิปัญญาเลย แต่ก็น่าจะเป็นเพียงเรื่องของเวลาเท่านั้นก่อนที่เราจะเผชิญหน้ากับสิ่งมีชีวิตทรงภูมิปัญญา..."

# Colonization Events
 wilderness.1010.name: "[from.GetName] ตื่นขึ้น"
 wilderness.1010.desc.intro: "สปอร์ปรับสภาพดาวของเราได้บรรลุจุดประสงค์ของมันแล้ว โดยส่งมอบส่วนหนึ่งของตัวเราเพื่อตั้งอาณานิคมบนโลกต่างดาวเป็นครั้งแรก"
 wilderness.1010.desc.same: "การกลายเป็น [from.GetName] พอๆ กับเป็น [root.GetHomeWorldName]... เรารู้สึกคุ้นเคยมากอยู่แล้ว: วิถีชีวิตที่สะดวกสบาย แม้ว่าจะต้องเปลี่ยนรูปแบบใหม่ภายใต้ดวงอาทิตย์ที่เคยแปลกตา เราได้ปรับตัวเข้ากับสภาวะที่มีอยู่ก่อนหน้านี้ที่นี่ได้อย่างง่ายดาย"
 wilderness.1010.desc.similar_cold: "การปรับตัวของเราให้เข้ากับ [from.GetClassAdj] §Y[from.GetName]§! จะมีความท้าทายอยู่บ้าง แต่เราได้พบวิธีรับมือที่คุ้นเคยแล้ว หนวดแผ่ขยาย แหล่งที่อยู่อาศัยถูกสร้างขึ้น และปากที่หิวกระหายเริ่มออกล่า"
 wilderness.1010.desc.similar_dry: "ในฐานะดาวเคราะห์ [root.GetHomeWorldName] เราเจริญรุ่งเรืองในบรรยากาศที่แห้งแล้งเสมอมา ดังนั้นเราจึงพร้อมเผชิญหน้าความท้าทายในการกลายเป็น [from.GetClassAdj] §Y[from.GetName]§! เช่นกัน บัดนี้เราได้พบวิธีใหม่ในการค้นหาและอนุรักษ์ความชื้น และเรียนรู้ที่จะร่วมมือกับธรณีวิทยาที่ท้าทายใหม่นี้แทนที่จะต่อต้านมัน"
 wilderness.1010.desc.similar_wet: "เช่นเดียวกับที่เราเคยเจริญรุ่งเรืองในและรอบๆ สายน้ำของ [root.GetHomeWorldName] เราจะเบ่งบานในฐานะ [from.GetClassAdj] §Y[from.GetName]§! แร่ธาตุ กระแสน้ำ และแม้แต่ปริมาณแสงแดดที่ได้รับอาจดูแปลกประหลาดที่นี่ แต่เราได้พบวิธีสกัดสิ่งที่เราต้องการออกมาแล้ว"
 wilderness.1010.desc.diff_cold: "เรารู้ว่าการกลายเป็น §Y[from.GetName]§! จะท้าทายมาก แท้จริงแล้ว บางสิ่งที่ทำให้เราเป็นดาวเคราะห์ [root.capital_scope.GetClassAdj] [root.GetHomeWorldName] ได้ร่วงโรยไปแล้วที่นี่ แต่สิ่งที่เหลืออยู่นั้นแข็งแกร่งและเริ่มที่จะปรับตัว สภาพแวดล้อมที่ไม่คุ้นเคยนี้ทำให้การเก็บเกี่ยวทรัพยากรพื้นฐานในการดำรงชีวิตยากยิ่งขึ้น ทว่าเกาะติดกับภูมิประเทศที่หนาวเหน็บนี้ เราได้สังเกตเห็นว่าชีวิตมีหนทางของมันเสมอ"
 wilderness.1010.desc.diff_dry: "สถานที่นี้กระตุ้นความกลัวแบบปฐมกาลในใจเรา: ร้อนและแห้งแล้งจนปลุกความทรงจำตามสัญชาตญาณของการถูกแผดเผา(เสียงไฟ)อย่างไรก็ตาม หากเราสามารถปรับตัวและเจริญรุ่งเรืองที่นี่ได้... การกลายเป็น §Y[from.GetName]§! อาจปลุกสิ่งใหม่ในตัวเราเช่นกัน ในจุดที่มีความชื้น เราพบวิธีจัดเก็บมัน ในที่ที่ร่มเงาหาได้ยาก เราพบวิธีสร้างร่มเงาขึ้นมาเอง"
 wilderness.1010.desc.diff_wet: "ความพยายามของเราในการกลายเป็น §Y[from.GetName]§! จะมีความท้าทาย แต่เราได้เตรียมพร้อมรับมือกับความเน่าเปื่อยและกระแสน้ำหลาก ส่วนต่างๆ ของเราที่สามารถรับมือกับน้ำได้ดีกว่าจะช่วยนำพามันออกไปเพื่อปกป้องส่วนที่เปราะบางกว่า เรายอมรับกระแสน้ำที่เป็นเอกลักษณ์ของสถานที่แห่งนี้"
 wilderness.1010.desc.other: "ในขณะที่เราปรับเปลี่ยนรูปโฉมเพื่อกลายเป็น §Y[from.GetName]§! เราได้จำแนกส่วนที่จะเจริญรุ่งเรืองและส่วนที่จะร่วงโรย การดำรงอยู่แบบ [from.GetClassAdj] นี้มีส่วนร่วมคล้ายคลึงกับสิ่งที่เราเคยรู้จักมาก่อน แต่ก็มีสิ่งแปลกประหลาดมากมายเช่นกัน ดังนั้นเราจึงเฝ้าสังเกตและเริ่มทดลอง"
 wilderness.1010.desc.outro: "โครงสร้างส่วนบน สารอาหาร และดีเอ็นเอของเราได้เริ่มปรับตัวและผสมผสานกับสิ่งมีชีวิตที่มีอยู่ก่อนหน้าเราที่นี่ [from.GetName] กำลังตื่นขึ้นแล้ว"
 wilderness.1010.a: "ในไม่ช้า โลกของเราจะหลอมรวมเป็นหนึ่งเดียวกัน"

# Terraforming Events
 terra.25.desc.wilderness: "โครงการอันยาวนานของเราในการปลุก §Y[From.GetName]§! ไม่ได้ผลลัพธ์ที่ประสบความสำเร็จตามที่เราหวังไว้ การแตกออกของหนึ่งในเครื่องจัดเรียงชีวมวลของเราได้ปล่อยของเหลวเศษซากการปรับสภาพดาว §Yการ ย้าย ถิ่น§! ออกมาจำนวนหนึ่ง อุดตันตามหุบเขาและก่อตัวเป็นคราบเหนียวบนพื้นที่อยู่อาศัยบางส่วน\n\nแม้ว่าจะไม่เป็นอันตรายต่อเราโดยเนื้อแท้ แต่สารชีวภาพที่ล้นเกินนี้ทำให้องค์ประกอบที่เคลื่อนไหวได้ของเราบางส่วนอาจประสบความยากลำบากอยู่ชั่วระยะเวลาหนึ่ง"
 terra.80.desc.wilderness: "เราได้ปลดปล่อยตัวตนในอนาคตของเราจากชั้นรังสีในชั้นบรรยากาศและดินของ §Y[From.GetName]§! อย่างไรก็ตาม [Root.GetTerraformerPlural] ที่คอยเฝ้าระวังของเราจำต้องเข้าแทรกแซงและแยกพื้นที่ส่วนหนึ่งของโลกนี้ไว้ชั่วคราว ดูเหมือนว่าเราได้ไปรบกวนสิ่งมีชีวิตท้องถิ่นดั้งเดิมที่หลบซ่อนตัวเก่งมากซึ่งเจริญเติบโตได้ดีในสภาพแวดล้อมที่มีกัมมันตภาพรังสี น่าเสียดายที่การกระทำของเราทำให้มันเริ่มร่วงโรย\n\nสิ่งที่น่าสนใจยิ่งกว่านั้นคือ สิ่งมีชีวิตชนิดนี้ดูเหมือนจะเป็นพรีเซเปียนต์(พัฒน์):พวกมันอยู่ในจุดเริ่มต้นของการพัฒนาความคิดที่เป็นอิสระ บัดนี้เมื่อ [From.GetName] พร้อมที่จะกำจัดมรดกสิ่งแวดล้อมที่เป็นอันตรายส่วนสุดท้ายออกไปแล้ว เราต้องตัดสินใจว่าจะรับมือกับสิ่งมีชีวิตรูปแบบใหม่นี้อย่างไร"
 terra.80.b.wilderness: "โลกนี้เป็นของพวกเขา เราควรปล่อยให้พวกเขาได้ตื่นขึ้น"
 terra.80.d.wilderness: "ให้เรากลืนกินพวกมันซะ"

 wilderness.2000.name: "การปลุกพลังตามแผน"
 wilderness.2000.desc.barren: "ความรกร้างว่างเปล่าของ [from.GetName] อาจเป็นเรื่องที่น่าเจ็บปวดที่ได้เห็น แต่จะไม่เป็นเช่นนั้นอีกต่อไป สิ่งมีชีวิตในกาแล็กซีนี้มองข้ามโลกที่แห้งแล้งดวงนี้มาโดยตลอด แต่บัดนี้เราซึ่งเป็น [root.GetName] มีเครื่องมือและความรู้ที่จะแก้ไขสิ่งนี้\n\nแม้ว่าเราจะได้เรียนรู้อะไรมากมายจนถึงตอนนี้ แต่เราก็เผชิญกับภารกิจที่น่าหวั่นเกรงในการฟื้นฟู [from.GetName] ด้วยเจตจำนงของเราและด้วยเครื่องมือปรับเปลี่ยนสภาพภูมิอากาศที่เราค้นพบ ในไม่ช้าชีวิตจะอุบัติขึ้นในที่ที่เคยไร้สิ่งใดมาก่อน"
 wilderness.2000.desc.tomb_detox: "แม้ว่าชีวิตบน [from.GetName] ตามที่เราทราบจะดับมอดลง แต่บัดนี้เราพร้อมที่จะมอบโอกาสครั้งที่สองให้แก่โลกดวงนี้ เราได้เริ่มต้นกระบวนการฟื้นฟูชั้นบรรยากาศ ทางน้ำ และดิน เพื่อให้ [from.GetName] สามารถรองรับชีวิตในรูปแบบของ [root.GetName] ได้อีกครั้ง"
 wilderness.2000.desc.gaia: "เบ้าหลอมแห่งวิวัฒนาการได้สร้างสิ่งมหัศจรรย์ให้แก่เราซึ่งเป็น [root.GetName] อย่างไรก็ตาม บัดนี้เรามีโอกาสที่จะอุทิศสิ่งต่างๆ อีกมากมายให้แก่ดาว [from.GetPlanetMoon] [from.GetName] การใช้เครื่องมือและความรู้ที่ตัวตนในอดีตของเราแทบจะไม่สามารถจินตนาการได้ เราได้เริ่มต้นการหล่อหลอม [from.GetName] ให้กลายเป็นสถานที่ซึ่งการตื่นขึ้นของมันจะแตกต่างจากที่ใดๆ\n\nรากฐานของ [from.GetName] วันหนึ่งจะเต็มไปด้วยสารอาหาร ได้รับความสดชื่นจากวงจรชีวิตที่มีชีวิตชีวาของพืชและสัตว์ของเรา หุบเขา สันเขา และที่ราบสูงจะมอบพื้นที่อุดมสมบูรณ์สำหรับการหาอาหาร การล่าสัตว์ และการหลบภัย ชีวิตจะเจริญรุ่งเรืองที่นี่"
 wilderness.2000.a: "ให้เราเริ่มกระบวนการได้"

 wilderness_pre_sapient_defence_army: "ฝูงสัตว์พรีเซเปียนต์ (ป้องกัน)"
 seq_wilderness_pre_sapient_defence_army: "ฝูงสัตว์พึ่งพา $R$"
 wilderness_pre_sapient_defence_army_plural: "ฝูงสัตว์พรีเซเปียนต์"
 wilderness_pre_sapient_defence_army_desc: "สิ่งมีชีวิตที่มีพฤติกรรมปกป้องถิ่นฐานอย่างรุนแรงซึ่งจะอยู่อย่างสงบจนกว่าจะถูกยั่วยุ ซึ่งในเวลานั้นพวกมันจะขับเคลื่อนด้วยสัญชาตญาณพื้นฐานในการปกป้องพวกพ้องที่พวกมันยอมรับว่าเป็นครอบครัว"
 wilderness_pre_sapient_assault_army: "ฝูงสัตว์พรีเซเปียนต์ (จู่โจม)"
 seq_wilderness_pre_sapient_assault_army: "ฝูงสัตว์พึ่งพา $R$"
 wilderness_pre_sapient_assault_army_plural: "ฝูงสัตว์พรีเซเปียนต์"
 wilderness_pre_sapient_assault_army_desc: "สิ่งมีชีวิตที่ดุร้ายซึ่งมีความฉลาดและพละกำลังดิบมากพอที่จะทำลายล้างผู้ใดก็ตามที่พวกมันมองว่าเป็นศัตรูอย่างป่าเถื่อน"

####################################
# Origins
####################################
 origin_wilderness: "ป่าดงพงไพร"
 origin_wilderness_desc: "§Rคำเตือน: ปิดกั้นเส้นทางการยกระดับ(เส้นทางการกระตุ้น)ทั้งหมด ยกเว้น ['concept_purity_ascension']§!\n\nเอนทิตีนี้ไม่ใช่สิ่งอื่นใดนอกเหนือจากระบบนิเวศที่มีภูมิปัญญา: สิ่งมีชีวิตที่หลากหลายจำนวนมากซึ่งได้หลอมรวมกันมาเป็นเวลานานจนกลายเป็นจิตสำนึกร่วมในระดับดาวเคราะห์"
 origin_tooltip_wilderness_effects: "- คุณลักษณะสายพันธุ์: ['trait:trait_wilderness']\n- แทนที่ £building£ ['concept_buildings'], £district£ ['concept_districts'], และ £zone£ ['concept_district_specialization'] มาตรฐานทั้งหมดด้วยรูปแบบเฉพาะตัว\n- แทนที่การตั้งอาณานิคมด้วยยานอวกาศด้วย ['concept_terraforming']\n- ปลดล็อกทรัพยากรใหม่: £biomass£ ['concept_biomass']\n- ดาวเคราะห์บ้านเกิด:$TABBED_NEW_LINE$- ขนาดดาว: £planetsize£ 18$TABBED_NEW_LINE$- ['concept_scorched_plains', £blocker£ $d_scorched_plains$]"
 trait_wilderness: "ป่าดงพงไพร"
 trait_wilderness_desc: "§Lเผ่าพันธุ์นี้ดำรงอยู่เป็นส่วนหนึ่งของระบบนิเวศแบบพึ่งพากัน ซึ่งไม่สามารถแยกแยะได้จากสภาพแวดล้อมในแง่ของความคิดและผลผลิตการทำงาน§!"
 WILDERNESS_NATURAL_WORLDS_DECLINE: "§Rระบบนิเวศ §Yป่า§! ไม่สามารถอยู่รอดบนโลกที่ไม่เป็นธรรมชาติได้§!"
 WILDERNESS_DEAD_WORLD: "$TRIGGER_FAIL$ระบบนิเวศ §Yป่า§! ไม่สามารถอยู่รอดในจักรวรรดิอื่นได้"
 country_virtual_jobs: "งานทั้งหมดภายในจักรวรรดินี้จะได้รับการเติมเต็มโดยอัตโนมัติ"

 concept_wilderness_trait: "$trait_wilderness$"
 concept_wilderness_trait_desc: "- $MOD_LOGISTIC_GROWTH_MULT$: §R-100%§!\n- §Rไม่สามารถอพยพหรือย้ายถิ่นฐานได้§! $NEW_LINE$- §Rไม่สามารถสืบพันธุ์ได้ตามธรรมชาติ§!\n\n§L$trait_wilderness_desc$§!"

