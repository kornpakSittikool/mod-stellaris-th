 WILDERNESS: "ป่าดงพงไพร"

####################################
# Deposits
####################################
 d_wilderness_mining: "ระบบโพรงถ้ำหิน"
 d_wilderness_mining_desc: "สิ่งมีชีวิตที่เคยครอบครองโลกนี้ก่อนหน้านี้ได้ทิ้งรอยแผลเหมืองไว้ในสภาพที่กระจัดกระจายและสับสน โดยมีอุโมงค์หลายแห่งที่ว่างเปล่าและเสี่ยงต่อการพังทลาย"
 d_wilderness_mining_2: "ที่ราบสูงหลุมยุบ"
 d_wilderness_mining_2_desc: "ภูมิประเทศที่เป็นอันตรายนี้เต็มไปด้วยพื้นที่รกร้างและหลุมยุบที่มีโอกาสเกิดขึ้น ทั้งหมดมาจากการทำเหมืองอย่างกว้างขวางในอดีต"
 d_wilderness_farming: "ป่าที่แห้งแล้ง"
 d_wilderness_farming_desc: "สิ่งที่เคยเป็นป่าอันกว้างใหญ่และอุดมสมบูรณ์ บัดนี้ไร้ซึ่งชีวิต กิ่งก้านที่เหี่ยวเฉาของมันไม่สามารถผลิตพืชผลได้อีกต่อไป"
 d_wilderness_farming_2: "ป่ากลายเป็นหิน"
 d_wilderness_farming_2_desc: "ซากศพของป่าอันกว้างใหญ่ที่เคยอุดมไปด้วยความหลากหลายของวนเกษตร พืชและเชื้อราตายอย่างรวดเร็วจนซากของมันกลายเป็นผลึกและไม่มีการเกิดปฏิกิริยาเคมีชีวภาพอีก"
 d_wilderness_generator: "ทุ่งโซลาร์เซลล์ที่ถูกแผดเผา"
 d_wilderness_generator_desc: "ร่มเงาที่เหี่ยวเฉาและกิ่งก้านที่เปราะบางคือสิ่งที่เหลืออยู่ของสวนโซลาร์เซลล์มีชีวิตที่ตายลงนี้"
 d_wilderness_generator_2: "พื้นที่รกร้างโซลาร์เซลล์"
 d_wilderness_generator_2_desc: "ภูมิภาคขนาดใหญ่นี้ถูกครอบครองโดยซากหนามของป่าโซลาร์เซลล์ที่เคยอุดมสมบูรณ์ ใบไม้ที่แห้งกรอบและมีรังสีเล็กน้อยบัดนี้ลอยเป็นฝุ่นละอองในชั้นบรรยากาศ"
 d_wilderness_city: "บึงเน่าเปื่อย"
 d_wilderness_city_desc: "สิ่งที่เคยเป็นแหล่งที่อยู่อาศัยที่เจริญรุ่งเรืองสำหรับสิ่งมีชีวิตหลากหลายรูปแบบได้ถูกทิ้งร้าง บัดนี้เป็นเพียงบ่อเน่าเปื่อยและส่งกลิ่นเหม็น"
 d_wilderness_city_2: "ปลักตมที่เน่าสลาย"
 d_wilderness_city_2_desc: "สิ่งมีชีวิตหลากหลายสายพันธุ์จำนวนนับไม่ถ้วนได้จบชีวิตลงที่นี่ ซากที่เน่าเปื่อยของพวกมันได้ซึมลงสู่ภูมิประเทศ ปล่อยของเหลวชีวเคมีที่ฉุนและมีฤทธิ์กัดกร่อนออกมาจำนวนมาก"
 d_wilderness_industrial: "บึงโลหะพิษ"
 d_wilderness_industrial_desc: "ซากของอ่างสกัดแร่กลางแจ้งหลายแห่ง สารภายในของพวกมันกลายเป็นพิษและเฉื่อยชาเนื่องจากการล่มสลายของภูมิศาสตร์โดยรอบ"
 d_wilderness_industrial_2: "พื้นที่แห้งแล้งชีวเคมี"
 d_wilderness_industrial_2_desc: "แอ่งหินและหุบเหวที่ปูด้วยฝุ่นสารเคมีคือสิ่งที่เหลืออยู่ของเครือข่ายโรงบำบัดแร่กึ่งอินทรีย์ขนาดใหญ่"

 d_scorched_plains: "ที่ราบแผดเผา"
 d_scorched_plains_desc: "ภูมิภาคนี้เคยอุดมไปด้วยชีวิต จนกระทั่งมันถูกทำลายลงด้วยแรงปะทุของซูเปอร์แฟลร์จากดวงดาว"

 concept_scorched_plains: "$d_scorched_plains$"
 concept_scorched_plains_desc: "- $MOD_PLANET_MAX_DISTRICTS_ADD$: §R-2§!\n- เวลาในการเคลียร์: £time£ 180 §Iวัน§!\n- ต้นทุนในการเคลียร์:\n$t$- 900 $i_energy$\n\n§L$d_scorched_plains_desc$§!"

