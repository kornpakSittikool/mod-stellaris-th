####################################
 tr_adaptability_appropriation_wilderness: "การจัดสรร"
 tr_adaptability_appropriation_wilderness_delayed: "ระบบนิเวศที่ใช้งานไม่เต็มประสิทธิภาพจะไม่มอบคุณค่าใดๆ ให้กับจักรวรรดิของเรา [GetIndividualNamePluralCap] จะต้องย้ายถิ่นฐานอย่างมีประสิทธิภาพไปยังดาวเคราะห์ที่จำเป็นต้องใช้งานมากที่สุด"
 tr_discovery_faith_in_science_wilderness: "เครือข่ายใยรา"
 tr_discovery_faith_in_science_wilderness_delayed: "การควบคุมความอยากรู้อยากเห็นตามธรรมชาติของ [GetIndividualNamePlural] ทั้งหมดในเครือข่ายรากใยราที่เชื่อมต่อถึงกันจะช่วยให้ค้นพบสิ่งใหม่ๆ ได้อย่างมีประสิทธิภาพมากขึ้น"
 tr_domination_wilderness_network: "การเร่งกระบวนการเผาผลาญระดับใหญ่"
 tr_domination_wilderness_network_delayed: "การเพิ่มอัตราการแลกเปลี่ยนพลังงานในระดับทวีปจะช่วยเพิ่มความช่วยเหลือที่แต่ละส่วนของเราสามารถมอบให้แก่กันและกันได้อย่างมาก"
 tr_domination_wilderness_network_effect: "§Yปลดล็อกพระราชกฤษฎีกา:§! $edict_drone_overdrive_wilderness$"
 tr_domination_imperious_architecture_wilderness: "ความเข้ากันได้ของฟีโรโมนข้ามสายพันธุ์"
 tr_domination_imperious_architecture_wilderness_desc: "§Y$district_craglands_plural$§! มอบการระดมพลป้องกันเพิ่มเติม £defense_army£ §Y$defense_army_plural$§!: §G+1§!"
 tr_domination_imperious_architecture_wilderness_delayed: "การบังคับการสื่อสารด้วยฟีโรโมนระหว่าง [GetIndividualNamePlural] ทั้งหมดช่วยให้สามารถตอบสนองต่อภัยคุกคามภายนอกได้เร็วขึ้น"
 tr_expansion_colonization_fever_wilderness: "จิตใจของหมู่โลก"
 tr_expansion_colonization_fever_wilderness_desc: "เพิ่มเขตพื้นที่สุ่มหนึ่งช่อง §Y£district£พื้นที่§! เมื่อทำการตั้งอาณานิคมบนโลกใบใหม่"
 tr_expansion_colonization_fever_wilderness_delayed: "เดอะ [GetGestaltEntityName] คือการประสานเสียงแห่งความคิดที่แม้แต่ความว่างเปล่าอันเหน็บหนาวของอวกาศก็ไม่อาจทำให้เงียบงันได้"
 tr_expansion_a_new_life_wilderness: "การเติบโตอย่างรวดเร็ว"
 tr_expansion_a_new_life_wilderness_delayed: "เดอะ [GetGestaltEntityName] เพาะปลูกทางออกเพื่อแก้ปัญหาของตนเอง"
 tr_expansion_courier_network_wilderness: "$tr_expansion_courier_network_hive$"
 tr_expansion_courier_network_wilderness_delayed: "การปฏิบัติกับแต่ละไบโอมในฐานะส่วนย่อยของส่วนรวมจะช่วยให้การสื่อสารเป้าหมายเป็นไปได้โดยไม่ต้องดึงความสนใจทั้งหมดของจิตใจดาวเคราะห์"
 tr_expansion_galactic_ambition_wilderness: "$tr_expansion_galactic_ambition_hive$"
 tr_expansion_galactic_ambition_wilderness_delayed: "ความกลัวแบบปฐมกาลเกิดขึ้นพร้อมกับหนวดเส้นใยแรกที่ยื่นเข้าไปในความมืด ห่างไกลจากโลกบ้านเกิดของเรา มีเพียงการเอาชนะและขับไล่ความกลัวนี้เท่านั้นที่เราจะเติบโตต่อไปได้ [GetIndividualNamePlural] นับล้านจะต้องสละชีวิตเพื่อให้ [GetGestaltEntityName] สามารถดำรงอยู่ต่อไป"
 tr_prosperity_pursuit_of_profit_wilderness: "การขนส่งของเหลวระดับโลก"
 tr_prosperity_pursuit_of_profit_wilderness_delayed: "เส้นเลือดใหญ่ข้ามทวีปทำหน้าที่ขนส่งสารอาหารและวัสดุก่อสร้างที่สำคัญเพื่อบำรุงรักษาระบบนิเวศที่จำเป็น"
 tr_prosperity_public_works_wilderness: "โพรงถ้ำใต้ดิน"
 tr_prosperity_public_works_wilderness_desc: "เขตพื้นที่ £district£ §Yขอบเขต§! ทั้งหมดจะมอบที่อยู่อาศัยเพิ่มเติม §G+50§! £housing£ §Y$MOD_PLANET_HOUSING_ADD$§!"
 tr_prosperity_public_works_wilderness_delayed: "การยอมให้ [GetIndividualNamePlural] แทรกซึมผ่านชั้นพื้นผิวโลกและเสริมรังด้วยโครงสร้างขี้ผึ้ง จะช่วยรองรับประชากรได้มากขึ้นอย่างมหาศาล"
 tr_synchronicity_kinship_wilderness: "ซิงค์จังหวะนาฬิกาชีวิต"
 tr_synchronicity_kinship_wilderness_delayed: "การควบคุมช่วงเวลาพักผ่อนของ [GetIndividualNamePlural] อย่างแม่นยำช่วยให้ตารางการจัดสรรสารอาหารตามธรรมชาติเกิดขึ้นได้ในระดับโลก"

####################################
# Ascension Perks
####################################
 ap_mastery_of_nature_wilderness: "$ap_mastery_of_nature$"
 ap_mastery_of_nature_wilderness_desc: "เราคือวงจรของการกินและการถูกกิน จากเซลล์ขนาดเล็กที่สุดไปจนถึงต้นไม้ใหญ่ที่สูงที่สุด เราดำเนินชีวิตตามหลักการนี้ เราคือธรรมชาติ"
 ap_engineered_evolution_wilderness: "$ap_engineered_evolution$"
 ap_engineered_evolution_wilderness_desc: "จิตสำนึกของเราวิวัฒนาการมาเพื่อเอาชนะความท้าทายในสภาพแวดล้อม สภาพแวดล้อมได้เปลี่ยนไปแล้ว และพวกเราจะเปลี่ยนไปตามมัน"
 engineered_evolution_wilderness_tt: "- เริ่มต้นกระบวนการเหตุการณ์สถานการณ์ §Y$genetic_ascension_situation$สถานการณ์§! ซึ่งปลดล็อกสายธรรมเนียม ['tradition_category:tradition_purity']$TABBED_NEW_LINE$- $REQUIRES_TRADITION_SLOT$\n- $UNLOCKS_AGENDA$ §Y$council_agenda_agenda_engineered_evolution_name$§! ซึ่งมอบสิทธิ์การวิจัยวิทยาศาสตร์ดัดแปลงพันธุกรรมเป็นตัวเลือกการวิจัย"

############
# Espionage
############
 operation_embed_planetary_roots: "ฝังรากฐานระดับดาวเคราะห์"
 operation_embed_planetary_roots_desc: "เรามีงานที่เร่งด่วนกว่าสำหรับ [owner.GetIndividualNamePlural] ผู้เก็บรวบรวมข้อมูลในเวลานี้ อย่างไรก็ตาม การหว่านเชื้อไมโครไบโอมที่กึ่งรับรู้ความรู้สึกบนโลกหนึ่งของเป้าหมาย จะช่วยให้เราสามารถรักษาเครือข่ายสายลับส่วนใหญ่ไว้ได้ และอาจขัดขวางห่วงโซ่อาหารของพวกเขาได้ด้วย"
 operation_embed_planetary_roots_on_success: "$operation_sleeper_cells_on_success$"
 espionage_planetary_roots: "รากฐานดาวเคราะห์"
 espionage_planetary_roots_desc: "เราได้ฝังไมโครไบโอมที่กึ่งรับรู้ความรู้สึกซึ่งคอยรายงานสถานการณ์ในจักรวรรดินี้ให้เราทราบ สิ่งมีชีวิตกลุ่มพึ่งพาขั้นปฐมภูมิเหล่านี้พร้อมที่จะช่วยเหลือ [owner.GetIndividualNamePlural] ในการรวบรวมข้อมูลของเราในทันที"
 operation_embed_planetary_roots_requires_blocker: "$TRIGGER_FAIL$ §R$espionage_planetary_roots$ ของเราจำเป็นต้องติดตั้งบนสิ่งกีดขวางธรรมชาติ ['concept_natural_blocker'] บนโลกใบหนึ่งของเป้าหมาย§!"
 operation_embed_planetary_roots_dont_stack_this: "$TRIGGER_FAIL$ §Rเราได้ติดตั้ง $espionage_planetary_roots$ ในจักรวรรดิ [target.GetName] เรียบร้อยแล้ว ประโยชน์ของมันอาจอยู่ยาวนานจนถึง §Y[planet_roots_success]§!§!"
 operation_embed_planetary_roots_not_cleared: "$TRIGGER_FAIL$ §Rเรายังคงสัมผัสได้ถึงการมีอยู่ของ $espionage_planetary_roots$ ที่ไหนสักแห่งใน [target.GetName]§!"
 d_wilderness_root_blocker: "พุ่มไม้รุกราน"
 d_wilderness_root_blocker_desc: "ผืนป่าต่างถิ่นที่กึ่งรับรู้ความรู้สึกและสร้างความอึดอัดได้หยั่งรากลึกอยู่ตามขอบของพื้นที่ชนบทเหล่านี้"

 wilderness.4500.name: "การสางแนวป่า"
 wilderness.4500.desc: "สายลับกึ่งอิสระของเรา [owner.GetOperativesLowerPlural] ได้ระบุพื้นที่ที่เหมาะสมสำหรับไมโครไบโอมที่เป็นเอกลักษณ์ของเรา บัดนี้พวกเขาจะเฝ้าสังเกตการณ์พื้นที่เหล่านี้ชั่วระยะเวลาหนึ่ง โดยให้ความสำคัญกับพื้นที่ที่มอบโอกาสสำเร็จในระยะยาวสูงสุดให้แก่เรา"
 wilderness.4505.name: "ระบุพื้นที่ที่มีศักยภาพ"
 wilderness.4505.desc: "เราได้รับความช่วยเหลือจากประชากร [target.GetSpeciesAdj] ผู้ไม่รู้อิโหน่อิเหน่ซึ่งเชื่อว่าพวกเขากำลังทำหน้าที่อนุรักษ์ธรรมชาติ ทว่าพวกเขากำลังจะจัดส่งไมโครไบโอม 'ระเบิดสปอร์' ของเราไปยังพื้นที่ห่างไกลบนดาว §H[roots_planet.GetPlanetMoon] [roots_planet.GetName]§!\n\nแม้ว่าสิ่งมีชีวิตกลุ่มพึ่งพาในหีบห่อนี้อาจมีอายุขัยที่สั้น และไม่มีวันเทียบได้กับการขยายตัวของจิตสำนึกหลักของเรา แต่เราก็สัมผัสได้ถึงความพร้อมของพวกมันที่จะเข้าแทรกซึมและเฝ้าสังเกตภูมิประเทศต่างดาวนี้ให้ดีที่สุดเท่าที่จะทำได้"
 wilderness.4510.name: "ฝังรากฐาน $espionage_planetary_roots$ แล้ว"
 wilderness.4510.desc: "ตั้งแต่วินาทีที่ไมโครไบโอมของเราถูกส่งไปยังบ้านใหม่ [GetRootsBlockerName] เราเริ่มสูดอากาศในเขตหวงห้ามนั้น และรับรู้ถึงโลกที่รู้จักกันในนาม §H[roots_planet.GetName]§!\n\nการมีอยู่ของเราที่นี่จะดูเบาบาง ตราบใดที่สิ่งมีชีวิตกลุ่มพึ่งพาเหล่านี้ยังคงแยกตัวออกจากจิตสำนึกหลักของเรา อย่างไรก็ตาม พวกมันจะรับใช้เราได้ดีเมื่อถึงเวลาต้องดำเนินการสายลับในอวกาศ [target.GetAdj]"
 wilderness.4510.a: "รากฐานของเราควรเจาะลึกขึ้น ยาวนานขึ้น"
 wilderness.4510.b: "ปล่อยให้รากฐานของเราแผ่ขยายอย่างอิสระที่นี่"

