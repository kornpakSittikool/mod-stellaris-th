 utopia.2700.name:0 "วิวัฒนาการดัดแปลง"
 utopia.2700.desc:0 "บางครั้งวิวัฒนาการก็ต้องการการผลักดันไปในทิศทางที่ถูกต้อง ตอนนี้เรามีเทคโนโลยีในการดัดแปลงพันธุกรรมร่างกายและจิตใจของเราเพื่ออดทนต่อการทดสอบของสภาพแวดล้อมที่เปลี่ยนแปลงตลอดเวลาในอัตราที่ไม่เคยมีมาก่อน"
 utopia.2703.name:0 "ความเชี่ยวชาญด้านวิวัฒนาการ"
 utopia.2703.desc:0 "หมดยุคแล้วที่การอยู่รอดของสปีชีส์เราขึ้นอยู่กับโชคชะตา เมื่อชะตากรรมของ [Root.GetSpeciesName] ถูกกำหนดโดยความผันผวนของธรรมชาติในการจับสลากทางพันธุกรรม\n\nวิศวกรในยุคของเราไม่ได้ทำงานกับเหล็กและคอนกรีต แต่ทำงานกับโครงสร้างพื้นฐานของชีวิต ด้วยการดัดแปลงยีนขั้นสูง เราจะรักษาอนาคตของประเทศเราไว้"

 utopia.2600.name:0 "จิตอยู่เหนือสรรพสิ่ง"
 utopia.2600.desc:0 "ตั้งแต่รุ่งอรุณของอารยธรรมของเรา เรื่องเล่าได้เจริญรุ่งเรืองของจอมเวทย์ที่มีอํานาจมาก ซึ่งสามารถบรรยายได้เพียงว่าเป็น สิ่งเหนือธรรมชาติในธรรมชาติ หายากจัง[Root.GetSpeciesNamePlural]สันนิษฐานว่าจะรุกรานจิตใจของเพื่อนของพวกเขายกวัตถุหนักด้วย เพียงความคิดหรือทําใด ๆ อีกมากมาย\"เวทมนตร์\"ตั้งแต่รุ่งอรุณแห่งอารยธรรมของเรา มีเรื่องเล่ามากมายเกี่ยวกับผู้วิเศษผู้ทรงพลังที่ควบคุมพลังซึ่งสามารถอธิบายได้ว่าเป็นเรื่องเหนือธรรมชาติเท่านั้น [Root.GetSpeciesNamePlural] ผู้วิเศษที่หายากเหล่านี้สามารถบุกรุกจิตใจของเพื่อนร่วมเผ่าพันธุ์ ยกวัตถุหนักได้ด้วยเพียงความคิด หรือแสดงการกระทำอื่นๆ อีกมากมาย..."
 utopia.2600.desc.unplugged: "แม้จะเป็นประวัติศาสตร์ที่สั้นและรุนแรง ของอารยธรรมหนุ่มสาวของเรา เรา[root.GetSpeciesNamePlural]มีโอกาสที่จะปล่อยให้จินตนาการของเราเดินและ หมกมุ่นในการเล่าเรื่องที่ยอดเยี่ยม ในบรรดาความคิดหลอกลวงเหล่านี้ มีเรื่องเล่าของพ่อมดผู้มีอํานาจอันยิ่งใหญ่ ที่สามารถบรรยายได้เพียงเรื่องเหนือธรรมชาติแม้ว่าประวัติศาสตร์อันสั้นและรุนแรงของอารยธรรมวัยเยาว์ของเราจะเกิดขึ้น แต่เรา [root.GetSpeciesNamePlural] ก็มีโอกาสที่จะปล่อยให้จินตนาการของเราโลดแล่น และเพลิดเพลินไปกับการเล่าเรื่องราวอันมหัศจรรย์ ความคิดขี้เล่นที่เกิดขึ้นซ้ำๆ เหล่านี้คือเรื่องเล่าของผู้วิเศษผู้ทรงพลังที่ควบคุมพลังซึ่งอธิบายได้ว่าเป็นพลังเหนือธรรมชาติเท่านั้น เช่น การอ่านใจ การยกวัตถุหนักด้วยเพียงความคิด หรือการกระทำอื่นๆ อีกมากมาย..."
 utopia.2600.a:0 "บางทีมันอาจจะเป็นภาพเลือนรางของอนาคตที่รอเราอยู่"
 utopia.2602.name:0 "[From.GetSpeciesNamePlural] แสดงศักยภาพพลังจิต"
 utopia.2602.1.desc.1.non_gestalt_intro: "พลังจิตที่ซ่อนเร้นได้เริ่มปรากฏในบุคคลบางกลุ่ม"
 utopia.2602.1.desc.1.non_gestalt_outro: "ตามรายงานที่รั่วไหลจากเจ้าหน้าที่ใน §H[From.GetName]§! สิ่งนี้น่าจะเป็นการพัฒนาที่เพิ่งเกิดขึ้นไม่นาน เนื่องจากเราไม่มีบันทึกในเอกสารว่า [From.GetSpeciesNamePlural] เคยแสดงความสามารถทางพลังจิตมาก่อน"
 utopia.2602.1.desc.1.organic_non_gestalt: "$utopia.2602.1.desc.1.non_gestalt_intro$ ที่เป็นของสปีชีส์ [From.GetSpeciesName], $utopia.2602.1.desc.1.non_gestalt_outro$"
 utopia.2602.1.desc.1.machine_non_gestalt: "$utopia.2602.1.desc.1.non_gestalt_intro$ ของจักรกลประเภท [From.GetSpeciesName], $utopia.2602.1.desc.1.non_gestalt_outro$"
 utopia.2602.1.desc.1.gestalt_intro: "พลังจิตที่ซ่อนเร้นได้เริ่มปรากฏใน [From.GetSpeciesNamePlural] บางส่วน ตามรายงานที่รั่วไหลจากเจ้าหน้าที่ใน §H[From.GetName]§! แม้ว่า"
 utopia.2602.1.desc.1.gestalt_outro: "ความสามารถพิเศษเหนือธรรมชาติที่อยู่นอกเหนือบันทึกที่มีอยู่ของเราเกี่ยวกับพวกเขา"
 utopia.2602.1.desc.1.organic_gestalt: "$utopia.2602.1.desc.1.gestalt_intro$ การเชื่อมต่อทางปัญญาในสปีชีส์ของพวกเขาจะไม่ใช่เรื่องใหม่ แต่รายงานเหล่านี้อธิบายถึง $utopia.2602.1.desc.1.gestalt_outro$"
 utopia.2602.1.desc.1.machine_gestalt: "$utopia.2602.1.desc.1.gestalt_intro$ การสื่อสารผ่านโครงข่ายประสาทในกลุ่มของพวกเขาไม่ใช่เรื่องใหม่ แต่รายงานเหล่านี้อธิบายถึง $utopia.2602.1.desc.1.gestalt_outro$"
 utopia.2602.1.desc.2.intro: "พลังเหล่านี้มีจำกัดเฉพาะในชนกลุ่มน้อยที่เล็กมากของ"
 utopia.2602.1.desc.2.outro: "รายงานไม่ได้ระบุถึงคำอธิบายใดๆ สำหรับปรากฏการณ์นี้"
 utopia.2602.1.desc.2.organic: "$utopia.2602.1.desc.2.intro$ สปีชีส์ [From.GetSpeciesName] โดยรวม $utopia.2602.1.desc.2.outro$"
 utopia.2602.1.desc.2.machine: "$utopia.2602.1.desc.2.intro$ [From.GetSpeciesNamePlural] $utopia.2602.1.desc.2.outro$"
 utopia.2602.1.desc.machine_gestalt: "$utopia.2602.1.desc.1.machine_gestalt$\n\n$utopia.2602.1.desc.2.machine$"
 utopia.2602.1.desc.machine_non_gestalt: "$utopia.2602.1.desc.1.machine_non_gestalt$\n\n$utopia.2602.1.desc.2.machine$"
 utopia.2602.1.desc.organic_gestalt: "$utopia.2602.1.desc.1.organic_gestalt$\n\n$utopia.2602.1.desc.2.organic$"
 utopia.2602.1.desc.organic_non_gestalt: "$utopia.2602.1.desc.1.organic_non_gestalt$\n\n$utopia.2602.1.desc.2.organic$"
 utopia.2602.2.desc: "ประชากร [From.GetSpeciesName] ภายในพรมแดนของเราเริ่มแสดงพฤติกรรมเปลี่ยนแปลงในลักษณะเดียวกันนี้เช่นกัน ดังนั้น ไม่ว่าจะเกิดอะไรขึ้นกับเผ่าพันธุ์ของพวกเขา มันไม่ได้เกิดขึ้นจำกัดอยู่แค่ในภูมิภาคอวกาศแห่งใดแห่งหนึ่งเท่านั้น"
 utopia.2602.a.organic_non_gestalt: "ช่างน่าแปลกประหลาดนัก"
 utopia.2602.a.hive_or_machine_non_gestalt: "พลังพิเศษงั้นหรือ? ไม่น่าเชื่อ"
 utopia.2602.a.machine_gestalt: "ไม่สามารถประมวลผลได้"
 utopia.2602.b: "พลังจิตเหรอ? ไร้สาระสิ้นดี!"
 utopia.2602.c: "เวทมนตร์ของพวกมันจะไม่เพียงพอที่จะช่วยพวกมันได้"
 utopia.2602.d.organic: "ใช่... ใช่ เราสามารถสัมผัสได้ถึงการปลดปล่อยพลังจิตของพวกเขา"
 utopia.2602.d.machine: "ใช่... เราได้ตรวจพบความถี่พลังจิตของพวกเขาแล้ว"

 utopia.2605.name.organic_non_gestalt: "เผย [psionic_leader.GetTitle] มีความสามารถด้านพลังจิต"
 utopia.2605.name.machine_non_gestalt: "ระบุว่า [psionic_leader.GetTitle] มีคุณลักษณะทางพลังจิต"
 utopia.2605.name.gestalt: "ระบุว่า [psionic_leader.GetName] มีคุณลักษณะทางพลังจิต"
 utopia.2605.desc.organic_non_gestalt: "แม้ว่าจะยากที่พลังจิตจะแสดงออกมาหลังจากบรรลุนิติภาวะแล้ว แต่ก็ไม่ใช่เรื่องที่ไม่เคยเกิดขึ้น ล่าสุด [psionic_leader.GetTitle] [psionic_leader.GetName] ได้แสดงความสามารถบางอย่างที่คาดว่าจะเป็นพลังจิต หลังจากผ่านการทดสอบ ESP อย่างละเอียดแล้ว [psionic_leader.GetSheHe] [psionic_leader.GetHasHave] ได้รับการระบุว่าเป็นผู้มีพรสวรรค์ทางพลังจิตระดับ 4"
 utopia.2605.desc.machine_non_gestalt: "แม้ว่าจะเกิดขึ้นได้ยาก แต่ความสามารถทางพลังจิตบางครั้งก็สามารถพัฒนาขึ้นในหน่วยที่ก่อนหน้านี้ไม่ทราบว่ารองรับความสามารถดังกล่าว ล่าสุด [psionic_leader.GetTitle] [psionic_leader.GetName] ได้แสดงฟังก์ชันการทำงานที่สามารถจัดได้ว่าเป็นพลังจิต หลังจากผ่านการทดสอบอย่างละเอียดแล้ว [psionic_leader.GetSheHe] [psionic_leader.GetHasHave] ได้รับการระบุว่าเป็นหน่วยพลังจิตระดับ 4"
 utopia.2605.desc.gestalt: "อิทธิพลของพลังใหม่ที่เพิ่งค้นพบของเราเพิ่มขึ้นในทุกๆ วัน ร่างภาชนะของ [GetBrainName] ของเรา ซึ่งก็คือ [psionic_leader.GetName] ได้แสดงความสามารถที่อาจจำแนกได้ว่าเป็นพลังจิตเมื่อไม่นานมานี้ หลังจากผ่านการทดสอบอย่างถี่ถ้วน [psionic_leader.GetSheHe] [psionic_leader.GetHasHave] ได้รับการระบุว่าเป็น [GetPsychicNoun] ระดับ 4"
 utopia.2605.a: "ความสามารถใหม่เหล่านี้จะรับใช้เราได้เป็นอย่างดี"

 utopia.2652.name:0 "[This.GetSpeciesNamePlural] ปลุกตื่นความสามารถทางพลังจิต"

 utopia.2652.desc.1.intro: "[This.GetSpeciesNamePlural] ทั้งหมดทั่วทั้งกาแล็กซีได้ผ่านการเปลี่ยนแปลงครั้งใหญ่ จากที่ก่อนหน้านี้พลังจิตที่ซ่อนเร้นของพวกเขามีเพียงแค่"
 utopia.2652.desc.1.outro: "ในตอนนี้ได้ปลดล็อกศักยภาพพลังจิตเต็มรูปแบบแล้ว"
 utopia.2652.desc.1.organic: "$utopia.2652.desc.1.intro$ เบ่งบานในคนกลุ่มน้อย แต่ตอนนี้สปีชีส์ทั้งหมด $utopia.2652.desc.1.outro$"
 utopia.2652.desc.1.machine: "$utopia.2652.desc.1.intro$ ปรากฏขึ้นในส่วนน้อยมาก แต่ตอนนี้พวกเขาทั้งหมด $utopia.2652.desc.1.outro$"
 utopia.2652.desc.2.non_gestalt: "แม้ว่าการเปลี่ยนแปลงเหล่านี้จะดูเหมือนมีต้นกำเนิดมาจาก [From.GetName] แต่ตอนนี้พวกมันได้ปรากฏในสมาชิกทุกคนของ [GetSpeciesWord] ของพวกเขา ไม่ว่าจะอยู่ที่ใดก็ตาม"
 utopia.2652.desc.2.organic_non_gestalt: "$utopia.2652.desc.2.non_gestalt$\n\nนอกเหนือจากการแสดงความสามารถทางพลังจิตที่ทรงพลังมากมายแล้ว [This.GetSpeciesNamePlural] เริ่มลดการสื่อสารด้วยวาจาระหว่างกันและหันไปใช้การส่งกระแสจิตแทน"
 utopia.2652.desc.2.machine_non_gestalt: "$utopia.2652.desc.2.non_gestalt$\n\n$utopia.2652.desc.2.machine_gestalt$"
 utopia.2652.desc.2.gestalt.intro: "นอกเหนือจากการแสดงความสามารถทางพลังจิตที่ทรงพลังแล้ว [This.GetSpeciesNamePlural] ทั้งหมดสามารถสื่อสาร"
 utopia.2652.desc.2.organic_gestalt: "$utopia.2652.desc.2.gestalt.intro$ แบบอวจนภาษาที่นอกเหนือจากช่องทางเดิมที่มีอยู่"
 utopia.2652.desc.2.machine_gestalt: "$utopia.2652.desc.2.gestalt.intro$ นอกเหนือจากช่องทางร่วมกลุ่มเดิมที่มีอยู่"
 utopia.2652.desc.organic_non_gestalt: "$utopia.2652.desc.1.organic$\n\n$utopia.2652.desc.2.organic_non_gestalt$"
 utopia.2652.desc.machine_non_gestalt: "$utopia.2652.desc.1.machine$\n\n$utopia.2652.desc.2.machine_non_gestalt$"
 utopia.2652.desc.organic_gestalt: "$utopia.2652.desc.1.organic$\n\n$utopia.2652.desc.2.organic_gestalt$"
 utopia.2652.desc.machine_gestalt: "$utopia.2652.desc.1.machine$\n\n$utopia.2652.desc.2.machine_gestalt$"
 utopia.2652.b:0 "ต้องมีคำอธิบายที่สมเหตุสมผลสำหรับเรื่องนี้"
 utopia.2652.c.organic:0 "ดำเนินการด้วยความระมัดระวัง"
 utopia.2652.c.machine: "การพัฒนาที่ต่ำกว่าประสิทธิภาพที่เหมาะสมที่สุด"
 utopia.2652.d.organic:0 "เรารู้สึกได้ถึงความปั่นป่วนทางพลังจิตครั้งใหญ่จากการปลื่นตื่นของพวกเขา"
 utopia.2652.d.machine: "สิ่งนี้อธิบายถึงความปั่นป่วนทางพลังจิตที่เราตรวจพบได้"

 utopia.2650.name:0 "การตื่นรู้ครั้งยิ่งใหญ่"
 utopia.2650.desc:0 "สปีชีส์ [Root.GetSpeciesName] ได้พบกับประสบการณ์ที่อธิบายได้ว่าเป็น การปลุกตื่นครั้งยิ่งใหญ่ เท่านั้น ในช่วงเวลาที่ผ่านมาเราตระหนักถึงศักยภาพพลังจิตอันยิ่งใหญ่ในสปีชีส์ของเรา แต่พลังเหล่านั้นกลับแสดงออกมาเพียงชนกลุ่มน้อยเท่านั้น... จนกระทั่งตอนนี้\n\nชั่วข้ามคืน [Root.GetSpeciesNamePlural] ในทุกหนแห่งได้ปลดล็อกขีดความสามารถทางพลังจิตทั้งหมดของพวกเขา ราวกับว่าแหล่งพลังงานจิตร่วมกันของ [Root.GetSpeciesName] ในที่สุดก็บรรลุถึงจุดเปลี่ยนที่สำคัญ ซึ่งได้ช่วยกระตุ้นความสามารถที่ซ่อนเร้นในสมองของเราขึ้นมาพร้อมๆ กัน\n\nการโทรจิตได้เข้ามาแทนที่การสื่อสารด้วยวาจาส่วนใหญ่ระหว่าง [Root.GetSpeciesNamePlural] แล้ว และนี่เป็นเพียงตัวอย่างเล็กๆ หนึ่งของการเปลี่ยนแปลงจำนวนนับไม่ถ้วนที่สังคมของเราต้องเผชิญ ตอนนี้เราผูกพันร่วมกันในรูปแบบที่พวกเราน้อยคนนักจะจินตนาการถึง"
 utopia.2650.a:0 "ม่านหมอกได้รับการเปิดเผยแล้ว"
 utopia.2655.name:0 "ดินแดนพลังจิตบริสุทธิ์"
 utopia.2655.desc:0 "ราวกับเสียงกระซิบอันแผ่วเบาในห้องที่มืดมิด มิติชราวด์เรียกหาเราจากภายในจิตใจของเรา มันเป็นดินแดนยุคดึกดำบรรพ์ของพลังงานจิตบริสุทธิ์ที่เกิดขึ้นเมื่อรุ่งอรุณแห่งกาลเวลา สิ่งมีชีวิตทั้งหมดที่ได้รับพรสวรรค์ความสามารถทางพลังจิตล้วนเชื่อมต่อกับมิติชราวด์ในทางใดทางหนึ่งเพื่อดึงพลังงาน แม้ว่าจะเป็นเพียงในระดับจิตใต้สำนึกก็ตาม\n\nนับตั้งแต่การก้าวข้ามขีดจำกัดของเรา เราเริ่มเห็นมิติชราวด์ชัดเจนยิ่งขึ้น มีรูปแบบที่เป็นระบบจากที่ครั้งหนึ่งแม้แต่นักส่งกระแสจิตที่แข็งแกร่งที่สุดของเราก็มองเห็นเพียงกลุ่มพลังงานที่หมุนวนอย่างไร้รูปร่าง นอกจากนี้ยังมี... สิ่งอื่นด้วย จิตวิญญาณบางประเภทที่จ้องมองกลับมาที่เราจากอีกฝั่ง บางครั้งด้วยความอยากรู้อยากเห็น บางครั้งด้วยความเมตตา... และบางครั้งก็ด้วยความมุ่งร้าย\n\nเรายังคงอยู่ในกระบวนการเรียนรู้ขอบเขตของพลังใหม่ของเรา แต่เราอาจสามารถสื่อสารกับวิญญาณเหล่านี้ได้ ซึ่งจำเป็นต้องใช้ความพยายามร่วมกันของผู้ส่งกระแสจิตที่ทรงพลังที่สุดของเรา"
 utopia.2655.a:0 "เราต้องสำรวจมิติชราวด์"
 BREACHING_SHROUD_PROJECT:0 "การเจาะผ่านมิติชราวด์"
 BREACHING_SHROUD_PROJECT_DESC:0 "หากเราต้องการสื่อสารกับผู้อยู่อาศัยในดินแดนแห่งพลังจิตที่รู้จักกันในชื่อมิติชราวด์ เราจำเป็นต้องปลดปล่อยพลังงานจิตจำนวนมหาศาล ได้มีการจัดเตรียมพิธีทรงพลังจิตครั้งใหญ่โดยใช้นักพลังจิตที่ทรงพลังที่สุดของเราในสภาผู้ส่งกระแสจิตที่จัดตั้งขึ้นใหม่บน [Root.Capital.GetName]"
 utopia.2656.name:0 "พิธีอัญเชิญจิต"
 utopia.2656.desc:0 "หลังจากตกอยู่ในภวังค์สะกดจิตเป็นเวลาหลายวัน นักพลังจิตของเราในสภาผู้ส่งกระแสจิตก็สามารถเปิดประตูมิติชั่วคราวสู่อีเทอร์แห่งมิติชราวด์ได้ในที่สุด\n\nเมื่อเราสร้างการเชื่อมต่อพลังจิตเบื้องต้นแล้ว เราจะสามารถเข้าถึงมิติชราวด์ได้ผ่านเมนู §Hผู้ติดต่อ§! ในอนาคต การจะบุกเบิกเข้าสู่ดินแดนนี้อย่างมีความหมายและพบกับสิ่งมีชีวิตที่อาศัยอยู่ที่นั่น เราอาจต้องใช้เครื่องปล่อยพลังจิตพิเศษเพื่อขยายขอบเขตการเข้าถึงทางจิตของเรา ซึ่งจะใช้พลังงานมหาศาล"
 utopia.2656.a:0 "ได้เวลาเข้าไปข้างในและดูว่าเราจะพบอะไรบ้าง"

 utopia.2657.name:0 "ผ่านกระจกเงา"
 utopia.2657.desc:0 "แม้ว่าเราจะยังไม่ได้เจาะผ่านม่านบังตาจริงๆ แต่เราสัมผัสได้ว่ามันเริ่มบางลงเรื่อยๆ ภายใต้แรงกดดันจากจิตใจที่รวมกันของเรา ทว่าในอีกด้านหนึ่ง ความพยายามของเราในการเข้าสู่ §Hมิติชราวด์§! ไม่ได้รอดพ้นสายตาไปได้ มีบางอย่างกำลังจ้องมองเราอยู่\n\nตัวตนของมันแผ่รังสีพลังอันน่าทึ่งและเจตจำนงที่ยากจะหยั่งถึง มันแทรกซึมผ่านรอยร้าวในจิตใจของเรา\n\nมันแทบจะไม่สังเกตเห็นเรา มันจ้องมองเราเหมือนที่เรามองหยดน้ำค้างบนหน้าต่างเรือ มันอาจจะยอมให้เราเข้าไป หากเพียงแต่เราสามารถเข้าถึงจิตใจที่ลึกลับของมันได้"
 utopia.2657.a:0 "พยายามสื่อสารกับมัน"
 utopia.2657.a.tt:0 "§Gสิ่งนี้จะทำให้เราสร้างพันธสัญญา§!"
 utopia.2657.b:0 "เราจะเสี่ยงภัยเข้าไปคนเดียว"
 utopia.2657.c:0 "นี่เป็นความคิดที่แย่มาก! เราต้องระมัดระวังให้มากกว่านี้"

 utopia.2658.name:0 "การยืนยัน"
 utopia.2658.desc:1 "เวลาผ่านไปมาระยะหนึ่งแล้วนับตั้งแต่ที่เราได้สร้างรากฐานของพันธสัญญากับ §H[GetShroudPatron]§! สายสัมพันธ์ของเรายังคงอ่อนแอ ดังนั้นเรายังมีโอกาสที่จะทำลายมัน - หรือทำให้มันแข็งแกร่งขึ้น"
 utopia.2658.a:0 "ยืนยันพันธสัญญา"
 utopia.2658.b:0 "สละพันธสัญญากับ §Y[GetShroudPatron]§!"

 utopia.2659.name:0 "ทางเข้า"
 utopia.2659.desc:0 "นักส่งกระแสจิตของเราได้ทำงานอย่างไม่รู้จักเหน็ดเหนื่อยเพื่อเจาะผ่าน §Hมิติชราวด์§! โดยไม่ได้รับความช่วยเหลือจากผู้อยู่อาศัยในนั้น ในที่สุดพวกเขาก็ค้นพบทางเข้า ขุมนรกนี้เรียกหาเรา เราเพียงแค่ต้องกล้าที่จะกระโจนลงไป"
 utopia.2659.a:0 "เข้าสู่ส่วนลึกของมิติชราวด์กันเลย"

 FORM_COVENANT_PROJECT:0 "สื่อสารกับสิ่งลี้ลับที่ยากจะอธิบาย"
 FORM_COVENANT_PROJECT_DESC:0 "สภาผู้ส่งกระแสจิตบน [Root.Capital.GetName] กำลังเตรียมการสื่อสารครั้งใหญ่เพื่อติดต่อกับตัวตนที่อาศัยอยู่ในมิติชราวด์"

 utopia.3020.name: "§Gอัญเชิญอวตารพลังจิตสำเร็จ§!"
 utopia.3020.desc:0 "พลังงานอันทรงพลังของ §Hมิติชราวด์§! ได้รับการส่งต่อเข้าสู่อวตารพลังจิตภายใต้การควบคุมของเราสำเร็จแล้ว!\n\nหลังจากเคลื่อนข้ามมิติมายังมิติของเรา อวตารที่ถือกำเนิดใหม่ได้รวมตัวกันกลายเป็นสิ่งมีชีวิตท่องอวกาศในวงโคจรเหนือ [Root.Capital.GetName]"
 utopia.3021.desc:0 "พลังงานอันทรงพลังของ §Hมิติชราวด์§! ได้รับการส่งต่อเข้าสู่อวตารพลังจิตภายใต้การควบคุมของเราสำเร็จแล้ว!\n\nหลังจากเคลื่อนข้ามมิติมายังมิติของเรา อวตารที่ถือกำเนิดใหม่ได้รวมตัวกันกลายเป็นนักรบขนาดยักษ์บนพื้นผิวของ [Root.Capital.GetName]"
 utopia.3022.name: "§Rการอัญเชิญล้มเหลว§!"
 utopia.3022.desc:0 "การส่งผ่านพลังจิตที่จำเป็นในการอัญเชิญอวตารและนำมันมายังมิติของเรานั้นอยู่เหนือความสามารถในปัจจุบันของเรา พลังงานของ §Hมิติชราวด์§! มอดดับลงด้วยความปั่นป่วนเมื่อความพยายามของเราล้มเหลว"
 utopia.3023.name: "ตัวตนพลังจิตโจมตี"
 utopia.3023.desc:0 "ความพยายามในการอัญเชิญอวตารพลังจิตประสบความสำเร็จเพียงบางส่วนเท่านั้น แม้ว่าสิ่งมีชีวิตดังกล่าวจะเปลี่ยนรูปร่างอย่างถูกต้องและเข้าสู่มิติของเราแล้ว แต่ [GetTelepathPlural] ของเราล้มเหลวในการนำมันมาอยู่ใต้การควบคุมของเรา!\n\nตอนนี้เรากำลังเผชิญหน้ากับตัวตนพลังจิตที่ก้าวร้าวซึ่งจะทำลายล้างทุกสิ่งในเส้นทางของมัน"

 utopia.3024.name:0 "การบุกรุกจากมิติชราวด์"
 utopia.3024.desc:0 "สิ่งมีชีวิตแห่ง §Hมิติชราวด์§! ได้เจาะผ่านรอยแยกของอวกาศและปรากฏตัวขึ้นในระบบดาว [shroud_spawn_system.GetName]! อวตารผู้เคียดแค้นนี้ได้สะสมพลังงานจิตจำนวนมหาศาลและกำลังใช้มันเพื่อโจมตีทุกสิ่งและทุกคนที่โชคร้ายพอที่จะขวางเส้นทางของมัน"
 utopia.3024.a:0 "มันต้องถูกหยุดยั้ง!"
 utopia.3026.name:0 "อวตารมิติชราวด์ถูกเนรเทศ"
 utopia.3026.desc:0 "การล้าของพลังงานอย่างต่อเนื่องจากการคงอยู่ในอวกาศปกติได้ทำให้อวตารในระบบดาว §H[shroud_spawn_system.GetName]§! อ่อนแอลง\n\nเมื่อไม่สามารถคงรูปร่างที่จับต้องได้อีกต่อไป มันจึงล่าถอยกลับเข้าสู่ §Hมิติชราวด์§!"
 utopia.3026.a.default:0 "ไปพ้นๆ ได้ก็ดี"
 utopia.3026.a.machine_or_hive:0 "ผลลัพธ์ที่โชคดี"

 exit.shroud:0 "ออกจากดินแดนพลังจิตบริสุทธิ์"

 shroud_army:0 "อวตารพลังจิต"
 shroud_army_desc:0 "นักรบขนาดยักษ์จากมิติชราวด์ที่สร้างขึ้นจากพลังงานจิตบริสุทธิ์"

 shroud.chances.high:0 "§Gความน่าจะเป็นสูงที่จะประสบความสำเร็จ§!"
 shroud.chances.medium:0 "§Yความน่าจะเป็นปานกลางที่จะประสบความสำเร็จ§!"
 shroud.chances.low:0 "§Rความน่าจะเป็นต่ำที่จะประสบความสำเร็จ§!"

 venture.shroud.tooltip:0 "ใช้พลังงานเพื่อเดินทางลึกเข้าไปในมิติชราวด์ ค่าใช้จ่ายนี้จะลดลงตามปริมาณของแหล่งแร่ §HZro§! ที่เราควบคุม สูงสุด 4 แหล่ง\n\n"
 exit.shroud.tooltip:0 "ออกจากมิติชราวด์และกลับสู่อวกาศปกติ"
 shroud.avatar:0 "หากสำเร็จ อวตารแห่งพลังจิตอันบริสุทธิ์จะปรากฏในจักรวาลของเรา มันจะอยู่ภายใต้การควบคุมของเราโดยสมบูรณ์"
 shroud.boon:0 "หากสำเร็จ พลังงานของมิติชราวด์จะถูกแปลงเป็นพรวิเศษอันทรงพลังที่ส่งผลดีต่อจักรวรรดิทั้งหมดของเรา"
 shroud.unknown:0 "หากสำเร็จ... ก็... ใครจะรู้จริงๆ ล่ะ?"

