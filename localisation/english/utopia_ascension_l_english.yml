 shroud_precog_cooldown_desc:0 "เราสูญเสีย $DEFAULT_TELEPATH_PLURAL$ ที่ทรงพลังที่สุดหลายคนจากความบ้าคลั่ง $shroud_precog_cooldown_desc_common$"
