 covenant.tooltip:0 "§Yมีราคาที่ต้องจ่าย§!\n\n"
 covenant.cycle.tooltip:0 "§Rอย่าทำเช่นนี้เป็นอันขาด§!\n\n"
 covenant.whisperers.desc:0 "สำเร็จแล้ว เราได้ผูกพันธสัญญากับ $whisperers_in_the_void_color_article$ และพวกมันก็ได้เริ่มแบ่งปันความลับให้กับเหล่านักวิทยาศาสตร์และผู้นำของเราแล้ว เราจะได้รับประโยชน์อย่างยิ่งจากความรู้ของพวกมัน\n\nข้อเสียเพียงอย่างเดียวคือ อัตราการเกิดโรคทางจิตเวชและการฆ่าตัวตายในหมู่ประชากรทั่วไปสูงขึ้นอย่างกะทันหัน และดาวเคราะห์บางดวงของเราก็กำลังเผชิญกับการฆาตกรรมและการทำร้ายร่างกายที่อธิบายไม่ได้จำนวนมากโดยบุคคลที่มีสภาพจิตใจมั่นคงและปกติสุขดี คลินิกและสถานบำบัดทางจิตของเรากำลังประสบปัญหาในการรับมือกับการไหลทะลักของคนไข้อย่างกะทันหันนี้"
 covenant.whisperers.option:0 "เราจัดการมันได้"
 covenant.eater.desc:1 "— บุคคลผู้มีพลังจิตที่หาตัวจับยาก — ให้เป็นผู้ปกครองอันเป็นนิรันดร์ของพวกเขา"
 covenant.eater.option:0 "หวังว่าจะไม่เป็นเช่นนั้น"
 covenant.instrument.desc:1 "สำเร็จแล้ว เราได้ผูกพันธสัญญากับ $the_instrument_of_desire_color_article$ ใช้เวลาไม่นานก็เริ่มสัมผัสได้ถึงผลกระทบ: มีรายงานการพบสายแร่ใหม่ที่อุดมสมบูรณ์ในเหมืองของเรา ธุรกิจที่กำลังจะเจ๊งกลับเฟื่องฟูขึ้นมาทันที และพบทรัพยากรล้ำค่าที่หายากบนดาวเคราะห์น้อยที่เราเคยมั่นใจอย่างแน่นอนว่ามีเพียงแค่น้ำแข็งและหินมาก่อน\n\nดูเหมือนว่าจักรวรรดิของเรากำลังเข้าสู่ยุคทองแห่งความมั่งคั่งและความรุ่งเรือง ตามที่อุปกรณ์สัญญาไว้กับเรา — แต่ราคาค่างวดที่มันพูดถึงล่ะคืออะไรกันแน่...?"
 covenant.instrument.option:0 "ฉันมั่นใจว่ามันไม่ใช่เรื่องเลวร้ายอะไรหรอก"
 covenant.composer.desc:2 "สำเร็จแล้ว เราได้ผูกพันธสัญญากับ $the_composer_of_strands_color_article$ ใช้เวลาไม่นานก็เริ่มสัมผัสได้ถึงผลกระทบ: อัตราการเกิดเพิ่มสูงขึ้นอย่างรวดเร็วและมีนัยสำคัญ ซึ่งเป็นผลงานของผู้ประสานอย่างไม่ต้องสงสัย อย่างไรก็ตาม นอกเหนือจากผลเชิงบวกเหล่านี้ เรายังต้องเผชิญกับการกลายพันธุ์ใหม่ที่แปลกประหลาดอีกด้วย: ทารกเกิดมาพร้อมกับรยางค์และอวัยวะส่วนเกิน... บางส่วนไม่มีความคล้ายคลึงกับส่วนใดในกายวิภาคที่เคยมีการบันทึกไว้ก่อนเลย\n\nโชคดีที่การเสียชีวิตเพียงไม่กี่รายที่เกิดขึ้นนั้นได้รับการชดเชยด้วยอัตราการเกิดที่สูงขึ้นและความมีชีวิตชีวาของประชาชนของเราที่เพิ่มขึ้นอย่างชัดเจน"
 covenant.composer.option:0 "— ยูนิตที่กำหนดไว้เป็นพิเศษซึ่งออกแบบมาเพื่อควบคุมพลังจิตที่หาตัวจับยาก — ให้เป็นผู้ปกครองอันเป็นนิรันดร์ของพวกเขา"
 covenant.cycle.desc:1 "มันจบแล้ว เราได้ทําสัญญากับ§Rอวสาน ของ วง กลม§!ในขณะที่เรารับข้อต่อรองของมัน เพียงสองคําพูด :§R\"FIFTY ปี\"§!ดัง นั้น แล้ว จง นิ่ง เงียบ ขณะ ที่ เรา ถูก ทิ้ง ไว้ ให้ คิด ถึง ผล ที่ จะ ตาม มา จาก สิ่ง ที่ เรา เพิ่ง นํา มา สู่ ตัว เอง."
 covenant.cycle.option:0 "ขอวิญญาณคุ้มครองเมตตาพวกเราทุกคนด้วยเถิด"
 covenant_shroud_marked:0 "ประทับตราม่านมิติ"
 covenant_shroud_marked_desc:0 "โลกใบนี้ถูกประทับตราโดยม่านมิติ\n\n§Rบางสิ่งที่เลวร้ายมากกำลังจะเกิดขึ้นที่นี่§!"

 covenant_whisperers_in_the_void:0 "พันธสัญญา: เสียงกระซิบจากความว่างเปล่า"
 covenant_whisperers_in_the_void_0:0 "$covenant_whisperers_in_the_void$"
