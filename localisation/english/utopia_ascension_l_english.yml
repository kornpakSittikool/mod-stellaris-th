 utopia.3400.name:0 "พระเจ้าผู้มีอำนาจสูงสุด"
 utopia.3400.desc:0 "ตัวตน [GetImmortalLoc] ที่รู้จักกันในชื่อ §H[chosen_one.GetName]§! ซึ่งก่อนหน้านี้เป็น [chosen_one_species.GetName] แต่ตอนนี้กลายเป็นบางสิ่งบางอย่างที่ยิ่งใหญ่กว่านั้นมาก ได้ดึงดูดผู้ติดตามที่เลื่อมใสจำนวนมากใน [Root.GetName] ด้วยการได้รับการเคารพบูชาจากหลายคนในฐานะเทพเจ้าสูงสุด จึงมีการเรียกร้องให้สวมมงกุฎ [chosen_one.GetTitle] อย่างเป็นทางการในฐานะผู้ปกครองถาวรของจักรวรรดิอันยิ่งใหญ่ของเรา นับจากนี้และตลอดไป"
 utopia.3400.a:0 "พลังจิตที่ทรงพลัง แต่เป็นพระเจ้าเหรอ?"
 utopia.3400.b:0 "ขอให้ [chosen_one.GetHerHis] ครองราชย์จนไม่มีที่สิ้นสุด... และตลอดไป!"
 reject_god_emperor:0 "[chosen_one.GetName] จะยังคงเป็น [chosen_one.GetTitle]"
 utopia.3401.name:0 "[chosen_one.GetTitle] ได้รับการสวมมงกุฎบนดาว [From.Capital.GetName]"
 utopia.3401.desc.intro: "[GetPsychicNoun] เผ่าพันธุ์ [chosen_one_species.GetAdj] ที่มีพลังมหาศาลได้เข้ายึดครองระบบควบคุมของ §H[From.GetName]§!! สิ่งมีชีวิต"
 utopia.3401.desc.outro: "ถูกพูดถึงในกระซิบเงียบเป็น\"ชุนหนึ่ง\"โดย[chosen_one.GetHerHis]ผู้ติดตามได้รับการสวมมงกุฎ[From.Capital.GetName]ในพิธีพิเศษเช้านี้ การเฉลิมฉลองกฎนิรันดร์ของ§H[chosen_one.GetRulerTitle] [chosen_one.GetRegnalName]§!ถูกส่งไปยังรัฐบาลระหว่างดวงดาวทั้งหมด ไม่นานหลังจากนั้น"
 utopia.3401.desc.organic: "$utopia.3401.desc.intro$อมตะ$utopia.3401.desc.outro$"
 utopia.3401.desc.machine: "$utopia.3401.desc.intro$ถาวร$utopia.3401.desc.outro$"
