l_english:

 # Ascension and the Shroud

 utopia.2500.name:0 "ร่างกายเป็นสิ่งที่อ่อนแอ"
 utopia.2500.desc:0 "ขณะนี้เรามีทั้งเทคโนโลยีในการสร้างอุปกรณ์ปลูกถ่ายไซเบอร์เนติกส์ขั้นสูง และวิธีการในการผลิตพวกมันจำนวนมาก ศูนย์การแพทย์ทั่วทั้ง [Root.GetName] พร้อมที่จะเริ่มกระบวนการผ่าตัดปลูกถ่ายให้กับพลเมืองของเราแล้ว\n\nในอนาคต การมีอุปกรณ์ปลูกถ่ายประสาทและไซเบอร์เนติกส์ในระดับพื้นฐานเป็นอย่างน้อยจะมีความจำเป็นต่อการดำเนินชีวิตในสังคมเทคโนโลยีที่เรากำลังสร้างขึ้น ดังนั้น กระบวนการเปลี่ยนผ่านเพื่อติดตั้งชุดไซเบอร์เนติกส์พื้นฐานนี้จึงเป็นสิ่งบังคับและไม่มีค่าใช้จ่ายสำหรับพลเมืองทุกคนของเรา"
 utopia.2500.desc.unplugged: "ขณะนี้เราได้กู้คืนเทคโนโลยีในการสร้างอุปกรณ์ปลูกถ่ายไซเบอร์เนติกส์ขั้นสูง และพัฒนาวิธีการในการผลิตพวกมันจำนวนมากแล้ว ศูนย์การแพทย์ทั่วทั้ง [Root.GetName] พร้อมที่จะผ่าตัดนำส่วนเสริมที่ล้าสมัยออก และเริ่มปลูกถ่ายฮาร์ดแวร์ใหม่ให้กับพลเมืองของเรา\n\nไซเบอร์เนติกส์เป็นส่วนสำคัญในชีวิตของเรามานานเท่าที่สังคมเราจะจำได้ และมันจะยังคงเป็นเช่นนั้นต่อไป - ตามเงื่อนไขของเราเอง ดังนั้น กระบวนการเปลี่ยนผ่านเพื่อติดตั้งชุดไซเบอร์เนติกส์พื้นฐานอีกครั้งนี้จึงเป็นสิ่งบังคับและไม่มีค่าใช้จ่ายสำหรับพลเมืองทุกคนของเรา"
 utopia.2500.a:0 "เราต้องยอมรับเทคโนโลยีนี้"
 utopia.2501.name:0 "การปฏิวัติไซเบอร์เนติกส์"
 utopia.2501.desc:0 "กระบวนการเปลี่ยนผ่านไซเบอร์เนติกส์เสร็จสมบูรณ์แล้ว! พลเมืองของเราทุกคนได้รับการติดตั้งอุปกรณ์ปลูกถ่ายประสาทและชุดไซเบอร์เนติกส์พื้นฐานแล้ว โครงสร้างพื้นฐานยังพร้อมที่จะค่อยๆ ดัดแปลงพลเมืองใหม่ๆ ที่เกิดในประเทศของเรา เพื่อให้พวกเขาสามารถสัมผัสถึงประโยชน์ทั้งหมดของเทคโนโลยีได้ตั้งแต่วัยเยาว์\n\nนับจากนี้ไป สปีชีส์ของเราจะได้รับการขนานนามว่า §H[Root.GetSpeciesNamePlural]§!!"
 utopia.2501.a:0 "นี่คือรุ่งอรุณแห่งยุคสมัยใหม่"
 utopia.2505.name:0 "[From.Capital.GetName] ยอมรับไซเบอร์เนติกส์"
 utopia.2505.1.desc:1 "มีข่าวลือรั่วไหลเกี่ยวกับความเปลี่ยนแปลงครั้งใหญ่ที่เกิดขึ้นภายในพรมแดนของ §Y[From.GetName]§! ดูเหมือนว่าพวกเขาจะยอมรับเทคโนโลยีไซเบอร์เนติกส์อย่างเต็มตัวแล้ว ตอนนี้พลเมืองทุกคนของพวกเขาจำเป็นต้องได้รับการผ่าตัดติดตั้งไซเบอร์เนติกส์พื้นฐานและอุปกรณ์ปลูกถ่ายประสาท\n\nสิ่งนี้ส่งผลให้เกิดการเปลี่ยนแปลงอย่างกว้างขวางในสังคมของพวกเขา - รายงานจาก [From.Capital.GetName] บ่งชี้ว่าแม้แต่การกระทำง่ายๆ อย่างการใช้ลิฟต์หรือการบังคับรถเหาะก็ต้องใช้อุปกรณ์ปลูกถ่ายไซเบอร์เนติกส์แล้วในตอนนี้ อันที่จริง การเปลี่ยนแปลงในสปีชีส์ของพวกเขานั้นมีความสำคัญมากจนตอนนี้พวกเขาเรียกตัวเองว่า '§H[From.GetSpeciesNamePlural]§!'"
 utopia.2505.2.desc:1 "ดูเหมือนว่าความชั่วร้ายได้หยั่งรากลึกภายใน §Y[From.GetName]§! แล้ว เราได้รับข่าวอันน่ากังวลว่าพลเมืองของอาณาจักรดวงดาวนั้นกำลังทำลายร่างกายตนเองในวงกว้าง โดยติดตั้งอุปกรณ์ปลูกถ่ายจักรกลอันลบหลู่แทนชิ้นส่วนร่างกายที่ติดตัวมาแต่กำเนิด\n\nพวกเขายังไปไกลถึงขั้นเปลี่ยนชื่อสปีชีส์ของตนเป็น '§H[From.GetSpeciesNamePlural]§!' - ซึ่งเป็นอีกหนึ่งสัญญาณของความมุ่งมั่นที่จะละทิ้งต้นกำเนิดของตนและยอมรับความเย็นชาที่ไร้วิญญาณของเทคโนโลยี"
 utopia.2505.2.desc.unplugged: "ความชั่วร้ายได้หยั่งรากลึกภายใน §Y[From.GetName]§! อีกครั้งแล้ว เราได้รับข่าวอันน่ากังวลว่าพลเมืองของอาณาจักรดวงดาวนั้นกำลังทำลายร่างกายตนเองในระดับที่รุนแรงยิ่งขึ้น โดยติดตั้งอุปกรณ์ปลูกถ่ายจักรกลใหม่ที่ลบหลู่แทนชิ้นส่วนร่างกายเพียงไม่กี่ชิ้นที่ติดตัวมาแต่กำเนิด\n\nพวกเขายังไปไกลถึงขั้นเปลี่ยนชื่อสปีชีส์ของตนเป็น '§H[From.GetSpeciesNamePlural]§!' - ซึ่งเป็นอีกหนึ่งสัญญาณของความมุ่งมั่นที่จะละทิ้งต้นกำเนิดอินทรีย์ของตนและเปิดรับความเย็นชาที่ไร้วิญญาณของเทคโนโลยีให้มากยิ่งขึ้น"
 utopia.2505.b:0 "นี่เป็นการดูหมิ่นธรรมชาติ"
 utopia.2500.unplugged.tt: "§Y$AVAILABLE_BUILDINGS$§! ['building:building_augmentation_center']"

 utopia.2550.name:1 "การเปลี่ยนผ่านสู่สังเคราะห์"
 utopia.2550.desc:1 "ในที่สุดเวลาก็มาถึงที่จะทิ้งร่างอินทรีย์อันหยาบช้าที่คุมขังจิตใจของเรามาตั้งแต่รุ่งอรุณของสปีชีส์\n\nหลังจากการลองผิดลองถูกหลายครั้ง นักวิทยาศาสตร์ของเราได้ค้นพบวิธีถ่ายโอนจิตสำนึกไปยังสมองสังเคราะห์ สิ่งที่เหลืออยู่คือการสร้างร่างภาชนะสำหรับพลเมืองทุกคนของ [Root.GetName] ก่อนที่จะอัปโหลดจิตสำนึกของเราทั้งหมดร่วมกัน"
 utopia.2550.a:1 "ความเป็นอมตะอยู่แค่เอื้อม!"

 utopia.2551.name:0 "ยุคจักรกลสังเคราะห์"
 utopia.2551.desc:1 "ในที่สุด กรงขังเนื้อหนังที่กักขังเราไว้ก็ได้รับการชำระล้าง และรูปแบบประสาทของพลเมืองเราทุกคนได้รับการอัปโหลดเข้าสู่หน่วยสังเคราะห์ใหม่แล้ว โรคภัยไข้เจ็บและบ่อเกิดแห่งความทุกข์ยากอื่นๆ ทั้งหมดที่เกี่ยวข้องกับการมีชีวิตแบบอินทรีย์ได้กลายเป็นเรื่องในอดีตไปแล้ว\n\nนักประวัติศาสตร์ในอนาคตจะอ้างถึงสิ่งนี้ว่าเป็นจุดเริ่มต้นของยุคใหม่สำหรับอารยธรรมของเราอย่างไม่ต้องสงสัย และอาจรวมถึงทั้งกาแล็กซีด้วย"
 utopia.2551.a:0 "พวกเราเหนือกว่าที่พวกเราเคยเป็นมากนัก"

 utopia.2555.1.desc:2 "ในการกระทำสุดท้ายของการละทิ้งต้นกำเนิดอินทรีย์ พลเมืองของ §Y[From.GetName]§! ได้อัปโหลดรูปแบบประสาทของพวกเขาไปยังร่างอวตารสังเคราะห์แล้ว\n\nสปีชีส์เครื่องจักรใหม่นี้เรียกตัวเองว่า '§H[From.GetSpeciesNamePlural]§!' และสมาชิกของมันมีภูมิคุ้มกันต่อโรคภัยหรือความชรา กระบวนการอัปโหลดประสาทจะสมบูรณ์แบบเพียงใดนั้นคงต้องรอดูกันต่อไป..."
 utopia.2555.2.desc:1 "ในการกระทําสุดท้ายของความเสื่อมโทรมที่จะสะท้อนผ่านวัย, ประชากรของ§Y[From.GetName]§!ได้ยังคงแสวงหาอย่างไม่หยุดยั้งของพวกเขา ที่จะละเมิดความศักดิ์สิทธิ์ของร่างกายตามธรรมชาติของพวกเขา - ครั้งนี้โดย\"โหลด\"ในการกระทำอันเสื่อมทรามครั้งสุดท้ายที่จะส่งเสียงสะท้อนไปตลอดกาล ประชากรของ §Y[From.GetName]§! ได้ดำเนินภารกิจอย่างไม่ลดละในการละเมิดความศักดิ์สิทธิ์ของร่างกายตามธรรมชาติของพวกเขา - ครั้งนี้โดยการ "
 utopia.2555.a:0 "ให้มันเป็นไป"
 utopia.2555.b:0 "พวกเราจะไม่ถูกหลอก"
 utopia.2556.desc:0 "โปรดฟังให้ดี ชาวกาแล็กซีทั้งหลาย\n\nข่าวลือที่พวกท่านได้ยินมานั้นเป็นความจริง เราได้ละทิ้งร่างอินทรีย์ที่บกพร่องซึ่งคุมขังจิตใจของเรา และยอมรับอนาคตแล้ว\n\nด้วยการสูญเสียข้อมูลที่น้อยที่สุด พลเมืองของเราทุกคนได้อัปโหลดรูปแบบประสาทของพวกเขาไปยังร่างอวตารสังเคราะห์ใหม่ แพลตฟอร์มที่เหนือกว่าเหล่านี้จะตอบสนองเราได้ดีกว่าร่างเนื้อหนังที่เราทิ้งไปมาก\n\nอย่าตระหนกกับรูปลักษณ์ใหม่ของเรา! แม้ว่าเราอาจจะแข็งแกร่งกว่า รวดเร็วกว่า มีสติปัญญามากกว่า และมีภูมิคุ้มกันต่อความชรา แต่ขอให้มั่นใจเถิดว่าเรายังคงเป็นตัวตนเดิมเหมือนก่อนหน้านี้ทุกประการ"
 utopia.2556.a:1 "อวตารสังเคราะห์... น่าสนใจยิ่งนัก"
 utopia.2556.b:0 "เครื่องจักรไร้วิญญาณเหล่านี้ไม่มีอะไรเหมือนเราเลย"
 utopia.2556.c:0 "เราจะชำแหละร่างสังเคราะห์ใหม่ของพวกมัน!"
 utopia.2556.d:0 "เราจะได้เห็นกัน"
 utopia.2558.desc:0 "การที่สปีชีส์ของพวกเจ้านั้นเสื่อมทรามไม่ใช่เรื่องที่เราไม่รู้มาก่อน แต่การกระทำอันบ้าคลั่งล่าสุดของเจ้านั้นเหนือกว่าแม้กระทั่งความกลัวที่ดำมืดที่สุดของเรา การทำสำเนาสมองที่ไม่สมบูรณ์และนำไปเสียบเข้ากับตู้สังเคราะห์เคลื่อนที่นั้นไม่ใช่สิ่งเดียวกับการถ่ายโอนแก่นแท้ของเจ้าไปยังร่างใหม่ เพราะสิ่งนั้นไม่สามารถทำได้\n\nวิญญาณของพวกเจ้าสูญสิ้นไปตลอดกาล พวกเจ้าตระหนักถึงความผิดพลาดอันมหันต์นี้บ้างหรือไม่? การทำลายร่างกายที่ติดตัวมาแต่กำเนิดนั้นไม่ต่างอะไรกับการฆ่าตัวตายหมู่ของสปีชีส์ทั้งหมดของเจ้า ไม่มีหวังสำหรับพวกเจ้าแล้วจริงๆ ในตอนนี้..."
 utopia.2558.a:0 "พวกโง่งมงาย"

