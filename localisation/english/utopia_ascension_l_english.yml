 utopia.3000.name:0 "ดินแดนพลังจิตบริสุทธิ์"
 utopia.3000.a:0 "เข้าถึงดินแดนพลังจิตบริสุทธิ์"
 utopia.3000.intro.desc:0 "มิติชราวด์ มันแปลกประหลาดและน่ากังวลอย่างไม่น่าเชื่อ แต่ในขณะเดียวกันก็... คุ้นเคยในทันที ทุกคนที่มีพลังจิตจะเคยเห็นสถานที่นี้ในความฝันของพวกเขา แม้ว่าพวกเขาจะน่าจะไม่รู้ในเวลานั้นก็ตาม\n\nตอนนี้เรากำลังรั้งรออยู่ที่ขอบเหวของดินแดนนี้ ไม่ไกลจากความว่างเปล่าอันเคว้งคว้างของพื้นที่กึ่งกลาง ซึ่งทำหน้าที่เป็นขอบเขตระหว่างที่นี่กับอวกาศปกติ - หรือสิ่งที่เราเรียกว่าโลกแห่งความเป็นจริง\n\nการร่วมผจญภัยลึกเข้าไปในมิติชราวด์จะต้องใช้ความพยายามอย่างมากจากนักส่งกระแสจิตของเรา รวมถึงพลังงานจำนวนมาก เราต้องไม่มัวรีรอ... แม้แต่ในตอนนี้ เราก็กำลังถูกจ้องมองอยู่"
 utopia.3000.1.desc:0 "วันนี้มิติชราวด์เงียบสงบ"
 utopia.3000.2.desc:0 "มีบางอย่างกำลังจับตามองพวกเรา"
 utopia.3000.3.desc:0 "ทุกอย่างดูแตกต่างไปจากเดิมอย่างสิ้นเชิงเมื่ออยู่ในฝั่งนี้"
 utopia.3000.4.desc:0 "พวกเขาน่าจะส่งกวีมา..."
 utopia.3000.5.desc:0 "บางสิ่งที่ดำมืดกำลังใกล้เข้ามา"
 utopia.3000.6.desc:0 "พวกเรายังฝันอยู่รึเปล่า?"
 utopia.3000.7.desc:0 "พวกเรา... พวกเราทำสำเร็จแล้ว พวกเราเข้ามาข้างในแล้ว!"
 utopia.3000.8.desc:0 "มี... ร่องรอยของตัวตนบางอย่างวนเวียนอยู่ใกล้ๆ มันกำลังกวักมือเรียกพวกเราให้ลึกเข้าไปในมิติชราวด์..."
 utopia.3000.9.desc:0 "คุณได้ยินเสียงแว่วเหล่านั้นเหมือนกันใช่ไหม?"
 utopia.3000.10.desc:0 "มิติชราวด์เต้นตุบๆ ด้วยพลังงาน มันรู้สึกเหมือน... บ้าน"
 utopia.3000.11.desc:0 "คุณคิดว่าสิ่งที่คุณกำลังหายใจเข้าไปในตอนนี้คืออากาศจริงๆ งั้นเหรอ?"
 utopia.3000.12.desc:0 "พวกเราเห็น แต่ในขณะเดียวกันก็มองไม่เห็น มีหลายสิ่งให้ต้องเรียนรู้เกี่ยวกับสถานที่แห่งนี้เหลือเกิน"
 utopia.3000.13.desc:0 "สัมผัสใดที่พวกเราขาดหายไปกันนะ จนทำให้พวกเราไม่สามารถมองเห็นและไม่ได้ยินอีกโลกหนึ่งที่อยู่รอบตัวพวกเราได้?"
 utopia.3000.14.desc:0 "จงใช้ความระมัดระวังอย่างที่สุด แม้แต่ความคิดที่หลุดลอยก็อาจก่อตัวเป็นรูปร่างขึ้นมาในสถานที่แห่งนี้... และโดยส่วนใหญ่แล้ว มันจะหันกลับมาทำร้ายตัวเราเอง"
 utopia.3000.15.desc:0 "พวกเราไม่เคยถูกกำหนดให้มาอยู่ที่นี่ตั้งแต่แรกแล้ว"
 utopia.3000.16.desc:0 "พลัง... มหาศาล... ขนาดนี้..."
 utopia.3000.17.desc:0 "ต้อง... มีสมาธิ..."
 utopia.3000.18.desc:0 "หรือว่านี่จะเป็นจุดเริ่มต้นของทุกสิ่ง?"
 utopia.3000.19.desc:0 "ความสยองขวัญ... ความสยองขวัญมีตัวตน"
 utopia.3000.b:0 "§Mติดต่อกับพลังอำนาจที่สูงส่งกว่า§!"

 utopia.3005.desc:0 "พวกเราล่วงรู้ว่ามีพลังอำนาจอันยิ่งใหญ่ภายนอกนั้น แม้ว่าปกติแล้วตัวตนของเราจะไม่เป็นที่สังเกตเห็น แต่เราก็สามารถพยายามเชื่อมต่อโดยดึงพลังจาก ซโร ได้ พลังโทรจิตของพวกเรารับรู้ได้ถึงอิทธิพลของตัวตนเหล่านี้ได้จากทั่วทุกมุมในเดอะชราวด์เราควรจะค้นหาตัวตนใดดี?"
 utopia.3005.a:0 "§Gตัวตนที่อบอวลไปด้วยกลิ่นอายของเนื้อหนังอันไร้ขอบเขต§!"
 utopia.3005.b:0 "§Pตัวตนที่กรีดร้องถึงความว่างเปล่าอันไม่อาจเติมเต็ม§!"
 utopia.3005.c:0 "§Hตัวตนที่กระซิบกระซาบถึงความโหยหาและการครอบครอง§!"
 utopia.3005.d:0 "§Bตัวตนที่มีรสชาติเหมือนความไว้วางใจที่ถูกทำลาย§!"

 utopia.3010.desc:0 "สภาผู้ใช้โทรจิตยังไม่ฟื้นตัวจากความเหนื่อยล้าในการเดินทางไปยังเดอะชราวด์ครั้งก่อน หากปราศจากพลังจิตที่ประสานกันของพวกเขา เราทำได้เพียงมองเห็นดินแดนอันเลือนลางนี้ได้เพียงชั่วครู่—ราวกับภาพความทรงจำอันพร่าเลือนที่อยู่ไกลเกินเอื้อม\n\nไม่มีสิ่งใดสำหรับพวกเราที่นี่ เราคงต้องกลับมาใหม่อีกครั้งในภายหลัง"


 boon.bestowed:0 "§Gได้รับพรอุปถัมภ์§!"
 curse.bestowed:0 "§Rได้รับคำสาปแช่ง§!"


 boon.psi.link.machine: "พลังงานอันทรงพลังของ §Hเดอะชราวด์§! ได้หลั่งไหลเข้าสู่ศูนย์กลางการประมวลผลพลังจิตที่แบ่งปันร่วมกันระหว่าง [Root.GetSpeciesNamePlural] ทั้งหมด"
 boon.psi.link.organic_non_gestalt: "พลังงานอันทรงพลังของ §Hเดอะชราวด์§! ได้หลั่งไหลเข้าสู่พันธะพลังจิตร่วมที่แบ่งปันระหว่าง [Root.GetSpeciesNamePlural] ทั้งหมด"
 boon.psi.link.hive: "พลังงานอันทรงพลังของ §Hเดอะชราวด์§! ได้หลั่งไหลเข้าสู่พันธะพลังจิตร่วมที่สั่นสะเทือนผ่านจิตเหนือสำนึกของ [Root.GetAdjective]"
 boon.psi.link:0 "[GetBoonPsiLink]"
 boon.ship.link:0 "[GetTelepathPlural] ของเราสามารถสร้างช่องทางเชื่อมต่อชั่วคราวระหว่าง §Hเดอะชราวด์§! กับยานอวกาศของเราได้สำเร็จ"

 utopia.3030.desc.gestalt: "$boon.psi.link$\n\nพลังงานเหล่านี้ไหลเวียนไปทั่วเครือข่ายส่วนรวม เพื่อรับประกันความเสถียรสูงสุดในขณะที่โดรนของเราปฏิบัติหน้าที่ตามเป้าหมายของพวกมัน"
 utopia.3030.desc.organic_non_gestalt: "$boon.psi.link$\n\nความรู้สึกสงบอันลึกซึ้งกำลังแผ่ขยายไปทั่ว [Root.GetName] และส่งผลกระทบแม้กระทั่งต่อผู้ที่ไม่มีความสามารถทางพลังจิต"
 utopia.3030.desc.machine_non_gestalt: "$boon.psi.link$\n\nดุลยภาพในการปฏิบัติการอันลึกซึ้งกำลังแผ่ขยายไปทั่ว [Root.GetName] และส่งผลกระทบแม้กระทั่งต่อผู้ที่ไม่มีส่วนประกอบทางพลังจิต"
 utopia.3031.desc:0 "$boon.ship.link$\n\nกองยานของเราไม่แสดงสัญญาณความเสื่อมสภาพใด ๆ ไม่ว่าจะมีประวัติการใช้งานมาอย่างไร ส่งผลให้ค่าบำรุงรักษาของเราลดลงอย่างมีนัยสำคัญ"
 utopia.3032.desc.non_gestalt:0 "$boon.psi.link$\n\nฐานความรู้ร่วมที่แบ่งปันกันทางโทรจิตระหว่าง [GetScientistPlural] ของเราได้รับการจัดตั้งขึ้น ซึ่งจะช่วยเพิ่มประสิทธิภาพในการทำงานของพวกเขาได้อย่างมาก"
 utopia.3032.desc.organic_gestalt:0 "$boon.psi.link$\n\nโหนดที่เน้นการวิจัยภายในจิตเหนือสำนึกของ [Root.GetSpeciesNamePlural] กำลังทำงานประสานกันอย่างสมบูรณ์แบบ ซึ่งช่วยเพิ่มประสิทธิภาพการรับรู้ของเรา"
 utopia.3032.desc.machine_gestalt:0 "$boon.psi.link$\n\nลูปการเรนเดอร์พลังจิตช่วยให้เมทริกซ์การวิจัยของเราทำงานได้เกินประสิทธิภาพสูงสุด ซึ่งช่วยปรับปรุงประสิทธิภาพการเรียนรู้ได้อย่างมหาศาล"
 utopia.3033.desc:0 "$boon.ship.link$\n\nลูกเรือของยานรบของเราสามารถเพิ่มความแข็งแกร่งของระบบโล่ป้องกันได้แล้วโดยการใช้พลังจิตของพวกเขา"
 utopia.3034.desc:0 "$boon.ship.link$\n\nด้วยการใช้พลังจิต ลูกเรือของเราสามารถเพิ่มความแข็งแกร่งของระบบอาวุธของเราได้แล้ว"
 utopia.3035.desc:0 "$boon.ship.link$\n\nด้วยการใช้พลังจิต ลูกเรือของเราสามารถเพิ่มอัตราการยิงของระบบอาวุธของเราได้แล้ว"
 utopia.3036.desc.organic_non_gestalt: "$boon.psi.link$\n\nความรู้สึกสมัครสมานสามัคคีใหม่ได้เกิดขึ้นในใจและจิตวิญญาณของประชากรของเรา ทำให้พวกเขายินดีร่วมมือกันทำงานเพื่อบรรลุเป้าหมายร่วมกันที่รัฐบาลกำหนดไว้"
 utopia.3036.desc.machine_non_gestalt: "$boon.psi.link$\n\nความรู้สึกสมัครสมานสามัคคีใหม่ได้เกิดขึ้นในคอร์ประมวลผลของประชากรของเรา ทำให้พวกเขายินดีร่วมมือกันทำงานเพื่อบรรลุเป้าหมายร่วมกันที่รัฐบาลกำหนดไว้"
 utopia.3036.desc.gestalt: "$boon.psi.link$\n\nพลังงานเหล่านี้คงอยู่ทั่วทั้งกลุ่ม ช่วยเพิ่มประสิทธิภาพให้กับโดรนของเรา และลดพฤติกรรมเบี่ยงเบนที่อาจทำให้เราเสียสมาธิ"
 utopia.3037.desc.organic_non_genocidal: "$boon.psi.link$\n\nผู้ตรวจรับความรู้สึกของเราแข็งแกร่งขึ้นกว่าที่เคย ส่งผลให้มีอิทธิพลทางการเมืองมากขึ้น"
 utopia.3037.desc.machine_non_genocidal: "$boon.psi.link$\n\nหน่วยการทูตของเราทำงานด้วยประสิทธิภาพความเข้าใจความรู้สึกสูงสุด ส่งผลให้มีอิทธิพลทางการเมืองมากขึ้น"
 utopia.3037.desc.genocidal: "$boon.psi.link$\n\nเจตจำนงของเราได้รับการบังคับใช้กับกาแล็กซีในระดับที่ไม่เคยมีมาก่อน"
 utopia.3038.desc.gestalt: "$boon.psi.link$\n\nพวกเราไม่เคยสัมผัสกับความชัดเจนและความเป็นหนึ่งเดียวของเป้าหมายเช่นนี้มาก่อน"
 utopia.3038.desc.non_gestalt: "$boon.psi.link$\n\nพวกเราไม่เคยรู้สึกถึงความเป็นหนึ่งเดียวที่ยิ่งใหญ่ขนาดนี้มาก่อน"
 utopia.3039.desc:0 "$boon.ship.link$\n\nด้วยการใช้พลังจิต ลูกเรือของเราสามารถส่งผลต่อการเคลื่อนที่ของยานโดยตรงได้แล้ว ซึ่งจะเพิ่มความสามารถในการหลบหลีกจากการยิงของศัตรู"
 utopia.3040.desc.organic: "$boon.ship.link$\n\nด้วยการใช้พลังจิต ลูกเรือของเราสามารถทำการซ่อมแซมภาคสนามอย่างจำกัดได้แล้ว โดยเชื่อมรอยร้าวของตัวยานด้วยจิตใจของพวกเขาเอง"
 utopia.3040.desc.machine: "$boon.ship.link$\n\nด้วยการใช้พลังจิต ลูกเรือของเราสามารถทำการซ่อมแซมภาคสนามอย่างจำกัดได้แล้ว โดยเชื่อมรอยร้าวของตัวยานด้วยตัวประมวลผลประสาทของพวกเขาเอง"
 utopia.3041.desc.machine: "$boon.psi.link$\n\n[GetTelepathPlural] ของเราได้ใช้พลังนี้ในการปรับปรุงประสิทธิภาพการทำงานชั่วคราวในหมู่หน่วยผู้นำที่โดดเด่นที่สุดของเรา ทำให้เลื่อนกำหนดเวลาการตกรุ่นที่คาดไว้ของพวกเขาออกไปได้หลายทศวรรษ น่าเสียดายที่มีพลังงานจิตไม่เพียงพอที่จะมอบผลกระทบนี้ให้กับประชากรโดยรวม"
 utopia.3041.desc.organic_gestalt: "$boon.psi.link$\n\n[GetTelepathPlural] ของเราได้ใช้พลังนี้ในการชะลอกระบวนการชราภาพชั่วคราวสำหรับโดรนผู้นำที่โดดเด่นที่สุดของเรา ช่วยยืดอายุขัยตามธรรมชาติของพวกมันไปได้หลายทศวรรษ น่าเสียดายที่มีพลังงานจิตไม่เพียงพอที่จะมอบผลกระทบนี้ให้กับประชากรโดยรวม"
 utopia.3041.desc.organic_non_gestalt: "$boon.psi.link$\n\n[GetTelepathPlural] ของเราได้ใช้พลังนี้ในการชะลอกระบวนการชราภาพชั่วคราวสำหรับผู้นำที่โดดเด่นที่สุดของเรา ช่วยยืดอายุขัยตามธรรมชาติของพวกเขาไปได้หลายทศวรรษ น่าเสียดายที่มีพลังงานจิตไม่เพียงพอที่จะมอบผลกระทบนี้ให้กับประชากรโดยรวม"
 utopia.3041.tooltip:0 "ผู้นำทุกคนจะได้รับคุณลักษณะ §Y$leader_trait_shroud_age$§! ซึ่งจะเพิ่มอายุขัยของผู้นำ §G+40§! ปี"
 utopia.3042.desc:0 "$boon.ship.link$\n\nด้วยการใช้พลังจิต ลูกเรือของเราสามารถเพิ่มกำลังของเครื่องขับดันบนยานได้แล้ว ส่งผลให้ความเร็วต่ำกว่าแสงเพิ่มขึ้นอย่างมาก"
 utopia.3043.desc.organic: "$boon.psi.link$\n\nสิ่งนี้ช่วยเสริมสร้างจิตใจของทหารของเรา ผู้ซึ่งตอนนี้พร้อมที่จะเผชิญหน้ากับอันตรายใด ๆ ในสนามรบ ขวัญกำลังใจของพวกเขาไร้เทียมทาน"
 utopia.3043.desc.machine_or_gestalt: "$boon.psi.link$\n\nสิ่งนี้ช่วยเสริมความมุ่งมั่นของโดรนต่อสู้ของเราที่มีต่อจุดประสงค์ของพวกมัน ทำให้ประสิทธิภาพในสนามรบดียิ่งขึ้น"
 utopia.3044.desc:0 "$boon.psi.link$\n\nตอนนี้เราสามารถตรวจจับยานที่เคลื่อนที่ผ่านอวกาศได้ในระยะที่ไกลกว่าระบบเซนเซอร์ทั่วไปจะทำได้มาก"

 utopia.3045.name: "ถูกขับออกจากเดอะชราวด์"
 utopia.3045.1.desc:0 "ช่องทางเชื่อมต่อที่ [GetTelepathPlural] ของเราใช้เชื่อมโยงกับเดอะชราวด์ได้พังทลายลงเนื่องจากชั้นพลังงานหลายชั้นของดินแดนพลังจิตเกิดการขยับตัวอย่างกระทันหันโดยไม่มีการเตือนล่วงหน้า\n\nพวกเรากำลังถูกดีดตัวกลับเข้าสู่อวกาศปกติโดยทันที"
 utopia.3045.2.desc:0 "[GetTelepathPlural] ของเราถูกครอบงำด้วยความตึงเครียดอย่างรุนแรงที่พวกเขาได้รับระหว่างการสื่อสารจิตกับเดอะชราวด์\n\nพวกเขาไม่สามารถคงการเชื่อมโยงได้อีกต่อไป"
 utopia.3045.3.desc_organic:0 "เริ่มจากช้า ๆ จากนั้นก็เร็วขึ้นเรื่อย ๆ การยึดเกาะเดอะชราวด์ของเราเริ่มหลุดลอย [GetTelepathPlural] ของเราร้องออกมาด้วยความเจ็บปวดเมื่อพวกเขาสูญเสียการหยั่งเท้า และพวกเราก็ถูกดีดตัวกลับเข้าสู่อวกาศปกติ"
 utopia.3045.3.desc_machine:0 "เริ่มจากช้า ๆ จากนั้นก็เร็วขึ้นเรื่อย ๆ การยึดเกาะเดอะชราวด์ของเราเริ่มหลุดลอย [GetTelepathPlural] ของเราเริ่มทำงานผิดปกติเมื่อพวกเขาสูญเสียการหยั่งเท้า และพวกเราก็ถูกดีดตัวกลับเข้าสู่อวกาศปกติ"

 curse.psi.link.organic: "ปฏิกิริยาสะท้อนกลับของพลังจิตอันรุนแรงได้สะท้อนกลับมาทางช่องทางเชื่อมต่อกับเดอะชราวด์ของเรา และเข้าสู่พันธะพลังจิตร่วมที่แบ่งปันระหว่าง [Root.GetSpeciesNamePlural] ทั้งหมด"
 curse.psi.link.machine: "ปฏิกิริยาสะท้อนกลับของระบบประสาทอันรุนแรงได้สะท้อนกลับมาทางช่องทางเชื่อมต่อกับเดอะชราวด์ของเรา และเข้าสู่พันธะพลังจิตร่วมที่แบ่งปันระหว่าง [Root.GetSpeciesNamePlural] ทั้งหมด"
 curse.psi.link: "[GetCursePsiLink]"
 curse.ship.link:0 "ปฏิกิริยาสะท้อนกลับของพลังจิตอันรุนแรงได้สะท้อนกลับมาทางช่องทางเชื่อมต่อกับเดอะชราวด์ของเรา และดูเหมือนว่าจะส่งผลกระทบต่อยานอวกาศของเรา"

 utopia.3050.desc.gestalt: "$curse.psi.link$\n\nสิ่งนี้ส่งผลให้เกิดความปั่นป่วนภายในกลุ่มของ [Root.GetName] นำไปสู่ความไม่มั่นคงทั่วทั้งจักรวรรดิ"
 utopia.3050.desc.non_gestalt: "$curse.psi.link$\n\nสิ่งนี้ส่งผลกระทบอย่างลึกซึ้งต่อความสุขของประชากรของเรา และความรู้สึกหม่นหมองแผ่ซ่านไปทั่ว [Root.GetName]"
 utopia.3051.desc.gestalt: "$curse.psi.link$\n\nคลื่นกระแทกที่ตามมาทั่วทั้งกลุ่มส่งผลให้เกิดพฤติกรรมเบี่ยงเบนที่น่ากังวลขึ้นในหมู่โดรนของเรา"
 utopia.3051.desc.non_gestalt: "$curse.psi.link$\n\nพลังงานเชิงลบนี้ได้แพร่กระจายความเคลือบแคลงสงสัยไปในจิตใจของประชากรเรา หลายคนเริ่มหันไปหาแนวคิดหัวรุนแรงใหม่ ๆ ที่ไม่สอดคล้องกับแนวทางของรัฐบาล ผลกระทบนี้ยังแผ่ขยายไปยังประชากรที่ไม่มีพลังจิตอีกด้วย!"
 utopia.3052.desc:0 "$curse.ship.link$\n\nเกราะของพวกมันเปราะบางลง และไม่สามารถทนทานต่อความเสียหายได้เหมือนแต่ก่อนอีกต่อไป"
 utopia.3053.desc.machine: "$curse.psi.link$\n\nความตึงเครียดที่เกิดขึ้นกับเครือข่ายประสาทของเราส่งผลให้การสร้างหน่วยลดลงอย่างเห็นได้ชัดทั่วทั้ง [Root.GetName]"
 utopia.3053.desc.organic_gestalt: "$curse.psi.link$\n\nความเจ็บปวดที่เกิดขึ้นทั่วทั้งกลุ่มส่งผลให้ความสามารถในการผลิตโดรนกายภาพตัวใหม่ของเราลดลงอย่างเห็นได้ชัด"
 utopia.3053.desc.organic_non_gestalt: "$curse.psi.link$\n\nด้วยเหตุผลบางประการ สิ่งนี้ส่งผลเสียต่ออัตราการเกิดทั่วทั้ง [Root.GetName] และยังส่งผลกระทบต่อสมาชิกของเผ่าพันธุ์ที่ไม่มีความสามารถทางพลังจิตโดยกำเนิดด้วย!"
 utopia.3054.desc.machine_gestalt: "$curse.psi.link$\n\nลูปป้อนกลับของการเรนเดอร์พลังจิตที่เกิดขึ้นได้ขัดขวางเมทริกซ์การวิจัยของเราจากการทำงานด้วยความจุเต็มที่ได้อย่างมีประสิทธิภาพ"
 utopia.3054.desc.machine_non_gestalt: "[GetMindPhysicalLoc] ของนักวิจัยของเราทำงานหนักเกินไป ทำให้พวกเขาไม่สามารถจดจ่อกับภาระงานของตนได้อย่างมีประสิทธิภาพ"
 utopia.3054.desc.organic_gestalt: "โหนดที่เน้นการวิจัยภายในกลุ่มของ [Root.GetSpeciesNamePlural] ทำงานหนักเกินไป ทำให้เราไม่สามารถประมวลผลการค้นพบใหม่ ๆ ได้อย่างมีประสิทธิภาพ"
 utopia.3054.desc.organic_non_gestalt: "[GetMindPhysicalLoc] ของนักวิจัยของเราถูกบดบัง ทำให้พวกเขาไม่สามารถจดจ่อกับภาระงานของตนได้อย่างมีประสิทธิภาพ"
 utopia.3055.desc:0 "$curse.psi.link$\n\nอัตราการสะสมอิทธิพลทางการเมืองของเราลดลงอย่างมาก"
 utopia.3056.desc.organic_non_gestalt: "$curse.psi.link$\n\nความรู้สึกเป็นหนึ่งเดียวที่เคยมีอยู่ในหมู่ประชากรของเราได้แตกสลายลงแล้ว"
 utopia.3056.desc.machine_or_gestalt: "$curse.psi.link$\n\nความรู้สึกเป็นหนึ่งเดียวที่เคยมีอยู่ทั่วทั้ง [Root.GetName] สั่นคลอน นำไปสู่การขาดการประสานงานอย่างกว้างขวาง"
 utopia.3057.desc:0 "$curse.ship.link$\n\nยานอวกาศของเราเคลื่อนที่ราวกับถูกฉุดรั้งไว้ด้วยพลังงานที่มองไม่เห็น ส่งผลให้การเดินทางต่ำกว่าแสงช้าลงอย่างมาก"
 utopia.3058.desc.organic_non_gestalt: "$curse.psi.link$\n\nพลังงานเชิงลบนี้ได้บั่นทอนขวัญกำลังใจของกองทหารราบของเรา ซึ่งจะทำให้ประสิทธิภาพในการรบลดลงอย่างมากในช่วงระยะเวลาหนึ่ง"
 utopia.3058.desc.machine_or_gestalt: "$curse.psi.link$\n\nลูปป้อนกลับที่เกิดจากพลังงานที่พุ่งพล่านนี้ได้ทำลายประสิทธิภาพในการปฏิบัติการของกองทหารราบของเรา"
 utopia.3059.desc:0 "ปฏิกิริยาสะท้อนกลับของพลังจิตอันรุนแรงได้สะท้อนกลับมาทางช่องทางเชื่อมต่อกับเดอะชราวด์ของเรา และดูเหมือนว่ามันจะรบกวนเซนเซอร์ระหว่างดวงดาวของเรา\n\nความละเอียดของเซนเซอร์จากทุกแหล่งลดลงอย่างมาก ส่งผลให้ระยะตรวจจับสั้นลงอย่างเห็นได้ชัด"

