 instrument_covenant_chain_end: "$ENDS_EVENT_CHAIN$ §Y$instrument_covenant_chain_title$§!"

 utopia.2671.name:0 "พันธะของเราที่ลึกซึ้งยิ่งขึ้น"
 utopia.2671.desc:0 "ความเข้าใจในตัวผู้อุปถัมภ์ของเราเติบโตยิ่งขึ้น เราก็เป็นเพียงแค่ความคิดชั่วแล่นในสายตาของมัน เป็นดั่งแมลงในบ้านของมัน ทว่า มันกลับชอบเราขึ้นมา และในโอกาสนี้ มันก็ได้ประทานพลังงานหยดอื่นลงมาให้แก่เรา\n\nโทรจิตของเราในตอนนี้ปรับประสานเข้ากับผู้อุปถัมภ์ได้ใกล้ชิดยิ่งขึ้น และเราได้รับแรงบันดาลใจในการสร้างสถานที่ระลึกเพื่อเฉลิมฉลองพันธสัญญาของเรา ซึ่งเป็นสถานที่ที่โทรจิตที่ดีที่สุดของเราจะสามารถพยายามสื่อสารเชื่อมต่อกับ §Y[GetShroudPatron]§! ได้"
 utopia.2671.a:0 "เรารู้สึกปลอดภัยยิ่งขึ้นในอ้อมกอดของผู้ประสาน"
 utopia.2671.a.tt:0 "ตอนนี้โทรจิตของเราจะสร้างความเร็วในการพัฒนาประชากร £pop£ §Yการเจริญเติบโตของป็อป§! เพิ่มเติม\n\nตอนนี้เราสามารถสร้างสิ่งปลูกสร้าง £building£ §Yวิหารศักดิ์สิทธิ์แห่งผู้ประสาน§! บนหนึ่งในดาวเคราะห์ของเราได้แล้ว"
 utopia.2671.b:0 "เราก็หิวเหมือนกัน สงครามทําให้เราได้"
 utopia.2671.b.tt:0 "พวกเราก็หิวกระหายเช่นกัน สงครามเท่านั้นที่จะเติมเต็มพวกเราได้"
 utopia.2671.c:0 "ไม่มีสิ่งใดงดงามไปกว่าความปรารถนาอีกแล้ว"
 utopia.2671.c.tt:0 "นักโทรจิตของเราสามารถเพิ่ม £amenities£ ความอยู่ดีกินดี\n\nเราสามารถสร้าง £building£ §Yสถานที่ศักดิ์สิทธิ์ของผู้เล่นดนตรี§! บนดาวเคราะห์ดวงใดดวงหนึ่งของเรา"
 utopia.2671.d:0 "จิตใจที่เต็มเปี่ยมย่อมไม่มีที่ว่างสำหรับความสงสัย"
 utopia.2671.d.tt:0 "นักโทรจิตของเราสามารถเพิ่ม $r_research$\n\nเราสามารถสร้าง £building£ §Yสถานที่ศักดิ์สิทธิ์ของผู้กระซิบ§! บนดาวเคราะห์ดวงใดดวงหนึ่งของเรา"

 utopia.2676.name:0 "บรรลุศักยภาพแล้ว"
 utopia.2676.desc:0 "ความลี้ลับแห่ง §Hม่านมิติ§! นั้นแปลกแยกเกินกว่าเราจะขจัดออกไปได้ แต่เราก็ได้ปรับประสานเข้ากับ §Y[GetShroudPatron]§! ได้ดียิ่งขึ้นแล้ว ไม่ว่าเราจะไปที่ใด เราก็สัมผัสถึงมันได้ที่ส่วนลึกของจิตใจ และพลังของมันก็ค่อยๆ รั่วไหลเข้าสู่ความเป็นจริงของเราผ่านรอยแยกแห่งจิตสำนึกของเรา"
 utopia.2676.a:0 "เจตจำนงแห่งเนื้อหนังนั้นศักดิ์สิทธิ์"
 utopia.2676.b:0 "ความขัดแย้งคือการอุทิศตน"
 utopia.2676.c:0 "เจ้าจักต้องโลภใคร่ปรารถนา"
 utopia.2676.d:0 "ความลับคือความปลอดภัย"

 utopia.2681.name:0 "เศษเสี้ยวแห่งพลัง"
 utopia.2681.desc:0 "ผู้อุปถัมภ์ของเรา §H[GetShroudPatron]§! ได้ฝากพลังงานส่วนหนึ่งไว้ในส่วนที่พับซ้อนกันของ §Hม่านมิติ§! พร้อมให้เราไปนำมาใช้ พันธะอันใกล้ชิดจะทำให้หนึ่งในพวกเราสามารถดูดซับพลังนี้ได้อย่างปลอดภัย\n\nมีผู้สมัครจำนวนหนึ่งที่ได้รับการคัดเลือก แต่มีเพียงคนเดียวเท่านั้นที่จะได้รับสิทธิ์พิเศษในการครอบครองพลังของผู้อุปถัมภ์ เราต้องตัดสินใจว่าคนๆ นั้นจะเป็นใคร"
 utopia.2681.a:0 "§H[leader_1.GetTitle]§! [leader_1.GetName]"
 utopia.2681.b:0 "§H[leader_2.GetTitle]§! [leader_2.GetName]"
 utopia.2681.c:0 "§H[leader_3.GetTitle]§! [leader_3.GetName]"
 utopia.2681.d:0 "§H[leader_4.GetTitle]§! [leader_4.GetName]"

 utopia.2682.name:0 "ยกระดับ"
 utopia.2682.desc.intro: "สำเร็จแล้ว เมื่อพลังได้สถิตอยู่ในตัว [chosen_leader.GetName] ทุกคนโดยรอบต่างก็สามารถ [GetFeelLoc] ถึงน้ำหนักของตัวตนพลังจิตของพวกเขาได้ มันช่างทรงพลังและน่าเกรงขาม ตอนนี้ [chosen_leader.GetHeSheCap] จะกลายเป็น [GetImmortalLoc] "
 utopia.2682.desc.patron_champion: "$utopia.2682.desc.intro$ แชมเปี้ยนแห่ง §H[GetShroudPatron]§!"
 utopia.2682.desc.shroudshaper_champion: "$utopia.2682.desc.intro$ $leader_trait_shroudshaper$ ของ §H[This.GetName]§!"
 utopia.2682.desc.previous_chosen_killed: "เหตุการณ์นี้สร้างผลกระทบที่ร้ายแรงต่อผู้นอกรีต §H[previous_chosen_leader.GetName]§! ซึ่งครั้งหนึ่งเคยถูกมองว่าเป็นผู้ได้รับเลือกจากผู้อุปถัมภ์คนก่อนของเรา ณ สถานที่เนรเทศของ [previous_chosen_leader.GetHisHer] พวกเขาได้หมดลมหายใจลงอย่างเงียบงันเมื่อร่องรอยสุดท้ายของพลังจิตเหือดหายไปจากร่างที่แตกสลายของ [previous_chosen_leader.GetHisHer]"
 utopia.2682.desc.previous_chosen_lost_patron: "เหตุการณ์นี้ส่งผลกระทบอย่างเห็นได้ชัดต่อ §H[chosen_leader_lost_patron.GetName]§! แม้ว่าจะยังคงเปี่ยมไปด้วยพลังจิตจำนวนมาก แต่พวกเขา [chosen_leader_lost_patron.GetHasHave] ก็สูญเสียพลังที่ผู้อุปถัมภ์คนก่อนเคยประทานให้แก่ [chosen_leader_lost_patron.GetHimHer] ไปแล้ว"
 utopia.2682.a:0 "พวกเขาถูกกำหนดให้เป็นผู้ถูกเลือก"
 utopia.2682.a.shroudshaper: "นี่คือโชคชะตาของ [chosen_leader.GetHisHer]"

 utopia.2686.name:0 "ยุทโธปกรณ์ที่ได้รับพร"
 utopia.2686.desc:0 "สภาแห่งโทรจิตประสบความสำเร็จในการควบคุมพลังของผู้อุปถัมภ์ของเรา §H[GetShroudPatron]§! จากเดิมที่มีเพียงคนพลังจิตเท่านั้นที่จะสามารถทำความเข้าใจขอบเขตของพันธสัญญาได้อย่างถ่องแท้ ตอนนี้เราได้คิดค้นวิธีปล่อยให้พลังไหลผ่านยานอวกาศทั้งลำในระดับที่ไม่เคยปรากฏมาก่อน\n\nหากเราปรารถนา ตราประทับแห่ง §H[GetShroudPatron]§! จะสามารถขับเคลื่อนยานของเราไปได้ไกลยิ่งกว่าเดิม"
 utopia.2686.a:0 "ตัวยานจะเป็นสิ่งใดได้อีกเล่าหากไม่ใช่เนื้อหนัง?"
 utopia.2686.b:0 "ยานของเราก็หิวกระหายเช่นกัน"
 utopia.2686.c:0 "ยานเหล่านี้โหยหาเป้าหมายปลายทาง"
 utopia.2686.d:0 "ความลับคืออาวุธที่ไม่มีสิ่งใดเทียบเคียงได้"

 building_composer_sanctum:0 "สถานที่ศักดิ์สิทธิ์ของผู้สร้าง"
 building_composer_sanctum_desc: "วิหารศักดิ์สิทธิ์เป็นสถานที่สำหรับการสื่อสารเชื่อมต่อกับผู้ประสาน [GetComposerSanctumDesc]"
 building_composer_sanctum_desc_default: "ณ ที่แห่งนี้ เนื้อหนังสามารถเดินทางได้อย่างอิสระเทียบเท่าความคิด ทำให้ม่านมิติสามารถสรรค์สร้างเราขึ้นใหม่ได้เหนือกว่าที่ศักยภาพเราจะทำได้"
 building_composer_sanctum_desc_machine: "ณ ที่แห่งนี้ แผงวงจรสามารถทำงานได้โดยไร้การขัดขวางจากปัจจัยทางกายภาพ ม่านมิติมิอาจเพียงเพิ่มประสิทธิภาพของหน่วยประมวลผลของเราให้เหนือกว่าค่าตัวแปรปกติของเราได้"
 building_eater_sanctum:0 "สถานที่ศักดิ์สิทธิ์ของผู้ทำลาย"
 building_eater_sanctum_desc: "วิหารศักดิ์สิทธิ์เป็นสถานที่สำหรับการสื่อสารเชื่อมต่อกับผู้กลืนกิน ณ ที่แห่งนี้ ม่านมิติจะเตรียมความพร้อมของพวกเราเพื่อทำสงครามในขณะที่เราวางแผนสำหรับ [GetEaterSanctumDesc] ครั้งถัดไป"
 building_eater_sanctum_desc_machine: "การพิชิตชัย"
 building_eater_sanctum_desc_default: "งานเลี้ยง"
 building_instrument_sanctum:0 "สถานที่ศักดิ์สิทธิ์ของผู้เล่นดนตรี"
 building_instrument_sanctum_desc: "วิหารศักดิ์สิทธิ์เป็นสถานที่สำหรับการสื่อสารเชื่อมต่อกับอุปกรณ์เครื่องดนตรี [GetInstrumentSanctumDesc]"
 building_instrument_sanctum_desc_gestalt: "ณ ที่แห่งนี้ ส่วนเกินต่างๆ จะถูกสะสม ทำความสะอาด และแจกจ่ายใหม่เพื่อส่งเสริมความมั่นคงของจิตรวมของเรา"
 building_instrument_sanctum_desc_default: "ณ ที่แห่งนี้ ความมั่งคั่งจะถูกเก็บสะสมไว้ จากนั้นจึงนำไปแลกเปลี่ยนด้วยความบ้าคลั่งในการบริโภคที่ไม่ได้ทำให้เราเข้าใกล้ความสมหวังเลยสักนิด"
 building_whisperers_sanctum:0 "สถานที่ศักดิ์สิทธิ์ของผู้กระซิบ"
 building_whisperers_sanctum_desc: "วิหารศักดิ์สิทธิ์เป็นสถานที่สำหรับการสื่อสารเชื่อมต่อกับผู้กระซิบ [GetWhisperersSanctumDesc]"
 building_whisperers_sanctum_desc_machine: "ณ ที่แห่งนี้ ความลับจะถูกนำมาแลกเปลี่ยนในการเจรจาที่เป็นรหัสลับ ความรู้ใหม่จะถูกนำมาผนึกไว้ และสัญญาณของเราจะเข้าร่วมเป็นส่วนหนึ่งของเสียงประสาน"
 building_whisperers_sanctum_desc_default: "ณ ที่แห่งนี้ ความลับจะถูกกระซิบกระซาบแลกเปลี่ยนกัน ความรู้ใหม่จะถูกนำมาเก็บงำและปิดผนึกไว้ และเสียงกระซิบกระซาบของเราจะเข้าร่วมเป็นส่วนหนึ่งของเสียงประสาน"
 covenant_detection_first_contact:0 "$building_whisperers_sanctum$"
 covenant_detection_first_contact_effect:0 "§Yฐานทัพดาว§! ของเราในระบบสุริยะนี้ได้รับ: §Yความแรงในการตรวจจับ§! §G+5§!\n\n"

