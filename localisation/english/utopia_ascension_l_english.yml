 tech_covenant_composer_desc:0 "เราได้ค้นพบวิธีปล่อยให้พลังงานพลังจิตไหลผ่านยานอวกาศของเรา เมื่อมีเทคโนโลยีนี้แล้ว ตอนนี้เราก็สามารถเติมพลังของผู้อุปถัมภ์ลงในยานของเราได้"
