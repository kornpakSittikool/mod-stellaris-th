 eater_unhappiness_planet_1_gestalt: "$eater_unhappiness_planet_1$"
 eater_unhappiness_planet_1_gestalt_desc: "$utopia.3401.desc.intro$ ที่เป็นอมตะ $utopia.3401.desc.outro$"
