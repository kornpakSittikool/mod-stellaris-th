 covenant_end_of_the_cycle_desc:0 "เราได้ผูกพันธสัญญากับจุดจบแห่งวัฏจักร\n\n§Rถึงเวลาที่จะต้องชำระสะสางแล้ว§!"

 whisperers_covenant_chain_title:0 "ผู้กระซิบในความเวิ้งว้าง"
 whisperers_covenant_chain_desc:0 "เราได้สร้างพันธะกับสิ่งมีชีวิตแห่งม่านมิติที่ชื่อว่า $whisperers_in_the_void_color_article$ มันช่างยากจะหยั่งถึง มันมอบเศษเสี้ยวแห่งพลังให้กับเราโดยแลกกับค่าตอบแทนบางอย่าง น่าจะมีสิ่งอื่นๆ ตามมาอีกหลังจากนี้\n\n[GetTelepathPlural] ของเราตั้งทฤษฎีว่าพันธะนี้จะลึกซึ้งยิ่งขึ้นได้ง่ายหากเราจัดตำแหน่งการกระทำของเราให้สอดคล้องกับเจตจำนงของผู้อุปถัมภ์\n\nผู้กระซิบเพลิดเพลินกับความรู้ใหม่ ความลับที่เงียบเชียบ และการคบคิดสมคบคิด พวกมันหลงใหลในความสุขอันเรียบง่ายของจิตใจที่เปี่ยมล้นไปด้วยข้อมูลจนแทบจะปริแตกออกตามรอยแยก"
 whisperers_covenant_chain_begin: "$BEGINS_EVENT_CHAIN$ §Y$whisperers_covenant_chain_title$§!"
 whisperers_covenant_chain_end: "$ENDS_EVENT_CHAIN$ §Y$whisperers_covenant_chain_title$§!"
 eater_covenant_chain_title:0 "ผู้กลืนกินพิภพ"
 eater_covenant_chain_desc.intro: "เราได้สร้างพันธะกับสิ่งมีชีวิตแห่งม่านมิติที่ชื่อว่า $the_eater_of_worlds_color_article$ มันช่างไม่รู้จักอิ่ม มันมอบเศษเสี้ยวแห่งพลังให้กับเราโดยแลกกับค่าตอบแทนบางอย่าง น่าจะมีสิ่งอื่นๆ ตามมาอีกหลังจากนี้\n\n[GetTelepathPlural] ของเราตั้งทฤษฎีว่าพันธะนี้จะลึกซึ้งยิ่งขึ้นได้ง่ายหากเราจัดตำแหน่งการกระทำของเราให้สอดคล้องกับเจตจำนงของผู้อุปถัมภ์"
 eater_covenant_chain_desc:0 "$eater_covenant_chain_desc.intro$\n\nผู้กลืนกินกำลังหิวกระหายด้วยความไม่อดทน มันโหยหาสงคราม รสชาติอันแสนหวานของความขัดแย้งและการคร่ำครวญ"
 eater_covenant_chain_begin: "$BEGINS_EVENT_CHAIN$ §Y$eater_covenant_chain_title$§!"
 eater_covenant_chain_end: "$ENDS_EVENT_CHAIN$ §Y$eater_covenant_chain_title$§!"
 composer_covenant_chain_title:0 "ผู้ประสานสายใย"
 composer_covenant_chain_desc.intro: "เราได้สร้างพันธะกับสิ่งมีชีวิตแห่งม่านมิติที่ชื่อว่า $the_composer_of_strands_color_article$ ผู้คอยโอบอุ้มดูแล มันมอบเศษเสี้ยวแห่งพลังให้กับเราโดยแลกกับค่าตอบแทนบางอย่าง น่าจะมีสิ่งอื่นๆ ตามมาอีกหลังจากนี้\n\n[GetTelepathPlural] ของเราตั้งทฤษฎีว่าพันธะนี้จะลึกซึ้งยิ่งขึ้นได้ง่ายหากเราจัดตำแหน่งการกระทำของเราให้สอดคล้องกับเจตจำนงของผู้อุปถัมภ์"
 composer_covenant_chain_desc: "$composer_covenant_chain_desc.intro$\n\nผู้ประสานโหยหาการจัดการทางพันธุกรรมและเนื้อหนังที่เป็นอิสระจากข้อจำกัดของวิวัฒนาการ มันพร่ำบอกเราเกี่ยวกับความเคารพต่อชีวิตและธรรมชาติ ตลอดจนความศักดิ์สิทธิ์ของเนื้อหนัง"
 composer_covenant_chain_begin: "$BEGINS_EVENT_CHAIN$ §Y$composer_covenant_chain_title$§!"
 composer_covenant_chain_end: "$ENDS_EVENT_CHAIN$ §Y$composer_covenant_chain_title$§!"
 instrument_covenant_chain_title:0 "อุปกรณ์ใคร่ปรารถนา"
 instrument_covenant_chain_desc.intro: "เราได้สร้างพันธะกับสิ่งมีชีวิตแห่งม่านมิติที่ชื่อว่า $the_instrument_of_desire_color_article$ ผู้ตามใจเราทุกอย่าง มันมอบเศษเสี้ยวแห่งพลังให้กับเราโดยแลกกับค่าตอบแทนบางอย่าง น่าจะมีสิ่งอื่นๆ ตามมาอีกหลังจากนี้\n\n[GetTelepathPlural] ของเราตั้งทฤษฎีว่าพันธะนี้จะลึกซึ้งยิ่งขึ้นได้ง่ายหากเราจัดตำแหน่งการกระทำของเราให้สอดคล้องกับเจตจำนงของผู้อุปถัมภ์"
 instrument_covenant_chain_desc: "$instrument_covenant_chain_desc.intro$\n\nอุปกรณ์ต้องการความโหยหา ความพึงพอใจอย่างฟุ่มเฟือย ความเสื่อมโทรม และระบบทาส ต่างสะกดออกมาเป็นนามแห่งอุปกรณ์"
