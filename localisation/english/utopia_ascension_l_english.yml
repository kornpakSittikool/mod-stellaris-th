 instrument_deviance_empire:0 "ความเบี่ยงเบนแห่งม่านมิติ"
 instrument_deviance_empire_desc:0 "ประชากรในจักรวรรดิทั้งหมดของเราเริ่มตั้งคำถามเกี่ยวกับจริยธรรมและนโยบายของจักรวรรดิเรา นี่เป็นฝีมือของ §Yอุปกรณ์ใคร่ปรารถนา§! อย่างไม่ต้องสงสัย"
 instrument_consumer_goods:0 "ความเสื่อมโทรมแห่งม่านมิติ"
 instrument_consumer_goods_desc:0 "ประชากรของดาวดวงนี้ได้หันไปหาสุขนิยมวัตถุอย่างเสื่อมโทรม โดยต้องการอาหารสุดหรูและสินค้าแปลกถิ่นอย่างยิ่งยวด นี่เป็นฝีมือของ §Yอุปกรณ์ใคร่ปรารถนา§! อย่างไม่ต้องสงสัย"

