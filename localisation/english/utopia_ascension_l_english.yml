 shroud_cooldown_desc_common: "ยังคงอยู่ในกระบวนการฟื้นตัวจากการเดินทางเข้าสู่มิติชราวด์ครั้งล่าสุด ในตอนนี้ พวกเขายังขาดกำลังจิตที่จะเดินทางอีกครั้ง"
