 utopia.3100.name: "เปลวเพลิงและความพินาศ"
 utopia.3100.desc_prefix: "[Root.Capital.GetName]... ภาพนิมิตนั้นเลือนลางและไม่ชัดเจน แต่ไม่มีข้อกังขาใด ๆ เลย—มันคือ [Root.Capital.GetName] เมืองหลวงของเรา "
 utopia.3100.desc_suffix: "\n\n§Hไม่ใช่แค่หนึ่งในหลาย ๆ ความเป็นไปได้ แต่มันจะเกิดขึ้นอย่างแน่นอน เหมือนอย่างที่ดวงตะวันขึ้นในยามเช้า มันคือโชคชะตาของคุณ§!\n\nนิมิตสิ้นสุดลงอย่างรวดเร็วพอ ๆ กับตอนที่มันเริ่ม ทิ้งไว้เพียงกลุ่มควันของพลังงานจิตที่หมุนวน"
 utopia.3100.desc_default: "$utopia.3100.desc_prefix$มหานครต่าง ๆ ดูเปลี่ยนไปแต่ก็ยังคุ้นตา แม้จะมองผ่านม่านเปลวเพลิงและกลุ่มควันหนาทึบ ร่างที่ถูกทำลายหลายพัน... ไม่สิ หลายล้านร่างเกลื่อนกลาดอยู่ตามท้องถนน ทั้งหมดนั้นคือ [Root.GetSpeciesName] กลิ่นเหม็นเน่าของการเน่าเปื่อยช่างเหลือทน\n\n§Hอนาคตของคุณ§!\n\nไม่มีสิ่งมีชีวิตใดหลงเหลืออยู่ในซากปรักหักพัง ในท้องฟ้าเบื้องบน สถานีอวกาศวงโคจรขนาดมหึมาที่ลากกลุ่มควันเป็นทาง ได้เริ่มเคลื่อนตัวลงสู่ดาวเคราะห์อย่างช้า ๆ และหลีกเลี่ยงไม่ได้ หรือพวกเรากำลังเห็นอนาคตที่เป็นไปได้เพียงหนึ่งจากหลาย ๆ แบบกันแน่?$utopia.3100.desc_suffix$"
 utopia.3100.desc_hive: "$utopia.3100.desc_prefix$มหานครต่าง ๆ ดูเปลี่ยนไปแต่ก็ยังคุ้นตา แม้จะมองผ่านม่านเปลวเพลิงและกลุ่มควันหนาทึบ ร่างที่ถูกทำลายหลายพัน... ไม่สิ หลายล้านร่างเกลื่อนกลาดอยู่ตามท้องถนน ทั้งหมดนั้นคือ [Root.GetSpeciesName] กลิ่นเหม็นเน่าของการเน่าเปื่อยแผ่ซ่านไปทั่ว\n\n§Hอนาคตของคุณ§!\n\nไม่มีสิ่งมีชีวิตใดหลงเหลืออยู่ในซากปรักหักพังในท้องฟ้าเบื้องบน สถานีอวกาศวงโคจรขนาดมหึมาที่ลากกลุ่มควันเป็นทาง ได้เริ่มเคลื่อนตัวลงสู่ดาวเคราะห์อย่างช้า ๆ และหลีกเลี่ยงไม่ได้ หรือพวกเรากำลังเห็นอนาคตที่เป็นไปได้เพียงหนึ่งจากหลาย ๆ แบบกันแน่?$utopia.3100.desc_suffix$"
 utopia.3100.desc_machine: "$utopia.3100.desc_prefix$เมืองใหญ่ต่าง ๆ ดูเปลี่ยนไปแต่ก็ยังจดจำได้ แม้จะมองผ่านม่านเปลวเพลิงและกลุ่มควันหนาทึบ ยูนิตที่ถูกถอดชิ้นส่วนหลายพัน... ไม่สิ หลายล้านยูนิตเกลื่อนกลาดอยู่ตามท้องถนน ทั้งหมดนั้นคือ [Root.GetSpeciesName] พวกเราถูกห้อมล้อมไปด้วยความพินาศ\n\n§Hอนาคตของคุณ§!\n\nไม่มีฟังก์ชันการทำงานใดหลงเหลืออยู่ในซากปรักหักพัง ในท้องฟ้าเบื้องบน สถานีอวกาศวงโคจรขนาดมหึมาที่ลากกลุ่มควันเป็นทาง ได้เริ่มเคลื่อนตัวลงสู่ดาวเคราะห์อย่างช้า ๆ และหลีกเลี่ยงไม่ได้ หรือพวกเรากำลังรับรู้อนาคตที่เป็นไปได้เพียงหนึ่งจากหลาย ๆ แบบกันแน่?$utopia.3100.desc_suffix$"
 utopia.3100.a:0 "§Gถ่ายทอดพลังงานไปสู่ร่างอวตาร§!"
 utopia.3100.b:0 "§Yผลประโยชน์: เพิ่มระยะเซ็นเซอร์§!"
 utopia.3100.c:0 "§Rผลประโยชน์: เพิ่มความแรงโล่พลังงาน§!"
 utopia.3110.name: "นิมิตประลองยุทธ์"
 utopia.3110.desc: "เดอะชราวด์ในบริเวณนี้มีความแปรปรวนอย่างมาก เมื่อกระแสพลังงานจิตดิบอันมหาศาลไหลผ่าน ปฏิกิริยาอันรุนแรงได้ให้กำเนิดร่างอวตารที่มีความนึกคิดระดับต่ำ\n\nวิญญาณที่สับสนเหล่านี้มักจะปะทะกันเอง ปลดปล่อยพลังจิตจำนวนมหาศาลในการต่อสู้ที่อาจกินเวลายาวนานนับพันปี ในความเป็นจริง การประลองยุทธ์เช่นนี้หลายแห่งกำลังเกิดขึ้นในเวลานี้\n\nพวกเราควรดำเนินการด้วยความระมัดระวัง"
 utopia.3120.name: "ผู้มาเยือนทางพลังจิต"
 utopia.3120.desc_suffix: "ผู้มาเยือน เช่นเดียวกับเรา—เครื่องตรวจวัดพลังจิตอันทรงพลังที่สร้างขึ้นโดยจิตใจที่แปลกแยกจากเราพอ ๆ กับที่พวกมันแปลกแยกจากเดอะชราวด์\n\nเมื่อเสียงสะท้อนทางจิตของพวกมันสัมผัสกับเรา ภาพอันเลือนลางก็กะพริบขึ้นชั่วครู่ภายในตัวเรา: สิ่งมีชีวิตอินทรีย์ขนาดมหึมาลอยอยู่ในบรรยากาศก๊าซหนาทึบ รายล้อมไปด้วยฝูงสิ่งมีชีวิตขนาดเล็กกว่า"
 utopia.3120.desc_machine: "ลึกลงไปในเดอะชราวด์เราตรวจพบกระแสการมีอยู่บางอย่าง $utopia.3120.desc_suffix$"
 utopia.3120.desc_default: "ลึกลงไปในเดอะชราวด์การมีอยู่บางอย่างปรากฏขึ้นให้สัมผัสได้ในทันใด $utopia.3120.desc_suffix$"
 utopia.3130.name: "ทะเลทรายไร้ขอบเขต"
 utopia.3130.desc:0 "ทะเลทรายไม่มีที่สิ้นสุด ทอดยาวต่อหน้าเรา เราเคยมาที่นี่มาก่อน\n\n§H\"ชาลา คูล มิลม ซูนาค\"§!\n\nบางอย่างเกิดขึ้นจากทราย มันยากที่จะมองเห็น\n\n§H\"ซาราบิ เมลาซุก\"§!\n\nถ้อยคํา เหล่า นั้น เปรียบ เหมือน ฟ้าร้อง พูด ด้วย ปาก ซึ่ง ไม่ เคย มี ใคร ตั้งใจ จะ พูด เลย เราถูกบังคับให้ตอบ"
 utopia.3130.a:0 "ชาชก้า มามัค"
 utopia.3130.b:0 "ทิริต นาลี ดาสุมาระ!"
 utopia.3130.c:0 "คูนาค เดอ คิราค"
 utopia.3140.name: "พหุภาพมหาศาล"
 utopia.3140.desc_common: "ธรรมชาติของการมีอยู่ของเราถูกเปิดเผยออกมา พหุภพที่ซึ่งกาแล็กซีหลายพันแห่งเช่นเดียวกับของเราถูกขังอยู่ในวัฏจักรแห่งความขัดแย้งที่ไม่มีที่สิ้นสุด\n\nมันเริ่มต้น ดับสูญ และเริ่มต้นใหม่อีกครั้ง แต่ละครั้งมาพร้อมกับ"
 utopia.3140.desc_suffix: "§H\"ดังนั้นมันเป็น\"§!มีเสียงกระซิบ§H\"และมันจะเป็นตลอดไป\"§!"
 utopia.3140.desc_default: "ในทันใดนั้น ด้วยความกระจ่างแจ้งอันเจ็บปวด $utopia.3140.desc_common$ ชีวิตที่แขวนอยู่บนเส้นด้าย\n\n$utopia.3140.desc_suffix$"
 utopia.3140.desc_machine: "ในทันใดนั้น ด้วยความกระจ่างแจ้งอันน่าตกใจ $utopia.3140.desc_common$ ตัวแปรที่แขวนอยู่บนเส้นด้าย\n\n$utopia.3140.desc_suffix$"
 utopia.3150.name: "เสียงของฝ่ายผู้ร่วงโรย"
 utopia.3150.desc: "พวกเรากำลังมองลงไปยังกาแล็กซีของเราจากเบื้องบนที่ห่างไกลออกไป ซึ่งน่าจะเป็นระยะทางหลายแสนปีแสง ทันใดนั้น กระแสพลังจิตก็พัดพาเราดิ่งลงสู่หมู่ดาวด้วยความเร็วอันเหลือเชื่อ เข้าสู่ดินแดนอวกาศของหนึ่งในจักรวรรดิที่ร่วงโรย—นั่นคือ [fallen_empire.GetName]\n\nดวงดาวพุ่งผ่านไป ตามด้วยดาวเคราะห์ จนกระทั่งภาพนิมิตมาหยุดลงที่เมืองของ [fallen_empire.GetSpeciesName] หอคอยอันวิจิตรตระการตาสูงเสียดฟ้าด้วยการใช้เทคโนโลยีต่อต้านแรงโน้มถ่วงที่ล้ำหน้ากว่าเราหลายยุคสมัย กระแสนำพาเราเข้าไปในหอคอยแห่งหนึ่ง ผ่านกำแพงแล้วกำแพงเล่าจนกระทั่งเราไปถึงห้องประชุมขนาดใหญ่ห้องหนึ่ง ที่นั่นมี [fallen_empire.GetSpeciesNamePlural] สองคนลอยตัวอย่างสบายอารมณ์บนเก้าอี้ไร้แรงโน้มถ่วงขณะสนทนากันด้วยน้ำเสียงแผ่วเบา\n\nพวกมันไม่รับรู้ถึงการมีอยู่ของเราเลย"
 utopia.3150.a:0 "§Yแทรกซึมเข้าไปในจิตใจของพวกมันเพื่อค้นหาความลับ§!"
 utopia.3151.name: "§Gความ ลับ ทาง เทคโนโลยี§!"
 utopia.3151.v1.desc:0 "$utopia.3151.a.desc$\n\n$utopia.3151.1.desc$\n\n$utopia.3151.b.desc$\n\n$utopia.3151.4.desc$\n\n$utopia.3151.c.desc$"
 utopia.3151.v2.desc:0 "$utopia.3151.a.desc$\n\n$utopia.3151.2.desc$\n\n$utopia.3151.b.desc$\n\n$utopia.3151.5.desc$\n\n$utopia.3151.c.desc$"
 utopia.3151.v3.desc:0 "$utopia.3151.a.desc$\n\n$utopia.3151.3.desc$\n\n$utopia.3151.b.desc$\n\n$utopia.3151.6.desc$\n\n$utopia.3151.c.desc$"
 utopia.3151.a.desc:0 "เห็นได้ชัดว่า [fallen_empire.GetSpeciesNamePlural] เหล่านั้นเป็นบุคคลสำคัญบางประเภทที่กำลังหารือราชการแผ่นดิน นิมิตนั้นค่อย ๆ คืบคลานเข้าหาพวกมันอย่างแน่วแน่ ในขณะที่ภาษาต่างดาวค่อย ๆ เปลี่ยนเป็นคำพูดที่มีความหมายสำหรับเรา"
 utopia.3151.b.desc:0 "แสงสะท้อนแห่งจิตของ [fallen_empire.GetSpeciesNamePlural] ทั้งสองนั้นท่วมท้น ราวกับดอกไม้ที่กำลังเบ่งบาน จิตใจของพวกมันเปิดออกและเผยให้เห็นทั้งหมด มันช่างง่ายดายเหลือเกินที่จะแทรกซึมเข้าไป"
 utopia.3151.c.desc:0 "เรียบร้อย ความลับทางเทคโนโลยีถูกดึงออกมาจากส่วนลึกในจิตใจของพวกมัน ง่ายดายราวกับการคัดลอกไฟล์จากคอมพิวเตอร์ที่ไม่ได้ล็อกไว้ เหล่า [fallen_empire.GetSpeciesNamePlural] ยังคงไม่รู้เรื่องถึงการโจรกรรมที่เกิดขึ้นภายในจิตใจของพวกเขาเอง"
 utopia.3151.1.desc:0 "§H§!\"... บ้า ถ้าเธอคิดว่าผู้คนจะเต็มใจยอมรับ แม้จะเป็นความล้มเหลวในมาตรฐานการดําเนินชีวิต ที่พวกเขาเริ่มคุ้นเคยกับมัน§!"
 utopia.3151.2.desc:0 "§H§!เป็นความอัปยศ ลอง นึก ภาพ ดู ว่า ถ้า เชื้อ ชาติ ที่ อ่อน กว่า สงสัย ว่า เรา ไม่ เข้าใจ เทคโนโลยี ของ เรา อย่าง เต็ม ที่ แล้ว! เราต้อง...\"§!"
 utopia.3151.3.desc:0 "§H§!\"... กําลังเติบโตและมีอํานาจมากขึ้น อีลีเมนต์ของสภาเชื่อว่าถ้าเราไม่ดําเนินการ ...§!"
 utopia.3151.4.desc:0 "§H§!\"... ไม่สนใจสิ่งที่สภาพูด พรีเดี้ยนยังตามหลังเรามานับพันปี และฝูงบินอันน่าเวทนาของพวกเขา ก็ไม่อาจคุกคามเราได้มากไปกว่า ตัวริ้นกาซูเรียนที่กินกิ้งก่าไฟไฮลาซิสได้ ไม่จําเป็นต้อง...\"§!"
 utopia.3151.5.desc:0 "§H§!\"... ยังคิดอยู่ว่า การกระทําไร้ความรู้สึกนั้นไม่จําเป็น พวก เขา ยัง เด็ก และ สะเพร่า แต่ ครั้ง หนึ่ง เรา ก็ เคย เป็น เช่น นั้น. ยังมีเวลาให้พวกเขา...§!"
 utopia.3151.6.desc:0 "§H§!\"และบางทีเราควรจะได้ดําเนินการขั้นตอนเพื่อเดอะชราวด์การแข่งขันที่หนุ่มกว่า ก่อนที่พวกเขาจะเติบโตที่มีประสิทธิภาพมากเกินไป ฉันต้องบอกว่าฉันเห็นด้วยกับเขา แต่สภารู้สึกว่ามันสายเกินไปที่จะ...\"§!"
 utopia.3152.name: "เคล็ด ลับ ที่ ไม่ ได้ ยิน"
 utopia.3152.desc:1 "เดอะ[fallen_empire.GetSpeciesNamePlural]เป็นอธิปไตยของบางประเภท หารือกันในเรื่องของรัฐ อย่าง ช้า ๆ เป็น ที่ แน่นอน ว่า นิมิต นั้น แทรกซึม เข้า มา ถึง พวก เขา ขณะ ที่ คํา พูด ของ พวก เขา ที่ เป็น คน ต่าง ด้าว ค่อย ๆ เปลี่ยน เป็น คํา พูด ที่ มี ความ หมาย สําหรับ เรา.\n\nทันใดนั้น เอเลี่ยนก็เงียบและนิ่งมาก\n\n§H§!\"คุณรู้สึกถึงมันไหม\"\n\n\"ใช่ ใครบางคนกําลังดูอยู่\"§!\n\nพวกมันค้นห้องจนกว่าพวกมัน จะจ้องมาที่เรา\n\n§H\"โดดเด่น เครื่องสํารวจแสง§!\n\n§H\"มันปรากฎ[Root.GetSpeciesName]ต้นกําเนิด ได้อย่างรวดเร็วเปิดใช้งานเกราะทรานสล่า§!\"เห็นได้ชัดว่า [fallen_empire.GetSpeciesNamePlural] เหล่านั้นเป็นบุคคลสำคัญบางประเภทที่กำลังหารือราชการแผ่นดิน นิมิตนั้นค่อย ๆ คืบคลานเข้าหาพวกมันอย่างแน่วแน่ ในขณะที่ภาษาต่างดาวค่อย ๆ เปลี่ยนเป็นคำพูดที่มีความหมายสำหรับเรา\n\nทันใดนั้น พวกเอเลี่ยนก็เงียบเสียงลงและนิ่งสนิท\n\n§H"
 utopia.3153.desc:0 "[Root.GetSpeciesNamePlural]\n\nอย่าคิดว่าความพยายามอันน่ารังเกียจของคุณในการบุกรุกจิตใจของผู้นำเราจะรอดพ้นสายตาไปได้\n\nมันจะต้องมีผลที่ตามมา"
 utopia.3153.a: "ต-แต่... พวกเราอธิบายได้นะ!"
 utopia.3153.b: "มีคำอธิบายที่สมเหตุสมผลอย่างยิ่งสำหรับเรื่องนี้..."
 utopia.3160.name: "แสงริบหรี่ในความว่างเปล่า"
 utopia.3160.desc: "ดาวดวงเล็กที่ริบหรี่ดวงหนึ่งก่อตัวขึ้นภายในเดอะชราวด์มันบินผ่านไปด้วยความเร็วอันน่าเหลือเชื่อ และชั่วพริบตาเดียว มันเผยให้เห็นว่ามันคือยานอวกาศต่างดาวที่มีรูปร่างหน้าตาแปลกประหลาด จากนั้นมันก็อันตรธานหายไปในกลุ่มก๊าซของพลังงานจิตอย่างรวดเร็วเท่ากับตอนที่ปรากฏตัว\n\nมันเป็นไปได้ไหม? เป็นไปได้หรือที่จะเข้าไปในเดอะชราวด์ด้วยร่างกายเนื้อ แล้วไปโผล่ที่อื่นในอวกาศปกติ?"
 utopia.3160.a:0 "§Yอ้อยอิ่งอยู่สักพัก§!"
 utopia.3161.desc:0 "ดาวริบหรี่อีกดวงปรากฏขึ้นในทันใด แต่คราวนี้พวกเราพร้อมแล้ว มันคือยานอวกาศต่างดาวจริง ๆ ที่ไม่เคยมีใครพบเห็นมาก่อนในกาแล็กซีของเรา ขณะที่มันบินผ่านพวกเราไป เรารับรู้ได้ถึงแสงสะท้อนแห่งจิตของลูกเรือ และความลับของพวกมันก็ตกเป็นของเรา\n\nเครื่องขับเคลื่อนจัมป์ไดรฟ์พลังจิต ช่างชาญฉลาดอะไรเช่นนี้"
 utopia.3161.name:0 "§Gจัมป์ไดรฟ์พลังจิต§!"
 utopia.3162.desc:0 "ดาวริบหรี่อีกดวงปรากฏขึ้นในทันใด แต่คราวนี้พวกเราพร้อมแล้ว มันคือยานอวกาศต่างดาวจริง ๆ ที่ไม่เคยมีใครพบเห็นมาก่อนในกาแล็กซีของเรา ขณะที่มันบินผ่านพวกเราไป เราพยายามประสานเข้ากับแสงสะท้อนแห่งจิตของลูกเรือของมัน แต่สติปัญญาของพวกมันกลับมืดมนและแปลกแยกเกินกว่าที่พวกเราเคยพบเจอมา\n\nไม่เพียงแต่เราจะถูกดีดออกจากยานของพวกมันเท่านั้น แต่แรงสะท้อนทางจิตจากการปฏิเสธอย่างรุนแรงของพวกมันยังติดตามเราออกมาจากเดอะชราวด์ด้วย! ความเร็วในการเดินทางต่ำกว่าแสงของยานอวกาศของเราถูกลดลงชั่วขณะ"
 utopia.3170.name: "ตัวตนใต้โล่ป้องกัน"
 utopia.3170.desc: "หลังจากไล่ตามเสียงสะท้อนอันแผ่วเบาในเดอะชราวด์เราได้พบกับวิญญาณตนหนึ่งที่หลบซ่อนตัวอยู่หลังม่านโล่พลังจิตอันทรงพลัง\n\n§Hจงออกไป§!"
 utopia.3170.a:0 "§Yพยายามเจาะโล่พลังงาน§!"
 utopia.3171.name:0 "§Gโล่พลังจิต§!"
 utopia.3171.desc_suffix: "อย่างไรก็ตาม เนื่องจากพฤติกรรมการเจาะโล่ป้องกันทำให้เราได้เรียนรู้วิธีกระตุ้นสนามพลังที่คล้ายกัน หากเทคนิคนี้ได้รับการปรับปรุง เราอาจสามารถสร้างโล่พลังจิตที่ใหญ่พอที่จะครอบคลุมยานอวกาศทั้งลำได้"
 utopia.3171.desc_machine_gestalt: "พวกเราไม่ได้เดินทางลึกเข้ามาในเดอะชราวด์เพียงเพื่อที่จะถูกไล่กลับไปในตอนนี้ หลังจากมุ่งเน้นความสามารถทางพลังจิตร่วมของเรา เราก็สามารถสร้างช่องโหว่บนโล่ป้องกันที่ใหญ่พอที่จะมองผ่านเข้าไปได้ชั่วขณะ\n\nสิ่งที่อยู่เบื้องหลังโล่ป้องกันนั้นเกินกว่าความเข้าใจในปัจจุบันของเรา ส่งผลให้ตัวประมวลผลพลังจิตของเราหลายตัวทำงานหนักเกินขีดจำกัดอย่างวิกฤต $utopia.3171.desc_suffix$"
 utopia.3171.desc_organic: "พวกเราไม่ได้เดินทางลึกเข้ามาในเดอะชราวด์เพียงเพื่อที่จะถูกไล่กลับไปในตอนนี้ หลังจากรวบรวมพลังจิตทั้งหมดของพวกเขา [GetTelepathPlural] ของเราก็สามารถสร้างช่องโหว่บนโล่ป้องกันที่ใหญ่พอให้บางคนมองผ่านเข้าไปได้\n\nเราไม่รู้ว่าผู้ใช้โทรจิตเหล่านั้นเห็นอะไรที่อีกฟากหนึ่งของโล่ป้องกัน แต่มันก็เพียงพอที่จะทำให้จิตใจของพวกเขาเสียสติไปอย่างถาวร การเสียสละของพวกเขาไม่ได้สูญเปล่า $utopia.3171.desc_suffix$"
 utopia.3172.name: "โล่ที่ไม่ถูกเจาะทะลวง"
 utopia.3172.desc_machine_gestalt: "[GetTelepathPlural] ของเรา ซึ่งทำงานหนักเกินไปอยู่แล้วจากการผจญภัยลึกเข้ามาในเดอะชราวด์ล้มเหลวในการส่งพลังจิตที่เพียงพอเพื่อเจาะทะลวงโล่ป้องกัน ความล้มเหลวของเราได้รับการตอบรับด้วยการสื่อสารดังต่อไปนี้"
 utopia.3172.desc_machine_non_gestalt: "[GetTelepathPlural] ของเรา ซึ่งทำงานหนักเกินไปอยู่แล้วจากการผจญภัยลึกเข้ามาในเดอะชราวด์ล้มเหลวในการส่งพลังจิตที่เพียงพอเพื่อเจาะทะลวงโล่ป้องกัน ความพยายามที่ล้มเหลวดูเหมือนจะทำให้วิญญาณตนนั้นไม่พอใจ"
 utopia.3172.desc_organic_gestalt: "[GetTelepathPlural] ของเรา ซึ่งเหน็ดเหนื่อยอยู่แล้วจากการผจญภัยลึกเข้ามาในเดอะชราวด์ล้มเหลวในการส่งพลังจิตที่เพียงพอเพื่อเจาะทะลวงโล่ป้องกัน ความล้มเหลวของเราได้รับการตอบรับด้วยการสื่อสารดังต่อไปนี้"
 utopia.3172.desc_organic_non_gestalt: "[GetTelepathPlural] ของเรา ซึ่งเหน็ดเหนื่อยอยู่แล้วจากการผจญภัยลึกเข้ามาในเดอะชราวด์ล้มเหลวในการส่งพลังจิตที่เพียงพอเพื่อเจาะทะลวงโล่ป้องกัน ความพยายามที่ล้มเหลวดูเหมือนจะทำให้วิญญาณตนนั้นไม่พอใจ"
 utopia.3180.name: "การรอคอยอนาคต"
 utopia.3180.desc.intro: "แนวคิดเรื่องเวลาอย่างที่เราเข้าใจนั้นเป็นสิ่งแปลกปลอมสำหรับเดอะชราวด์สิ่งที่ดูเหมือนยาวนานเป็นศตวรรษในดินแดนนี้ อาจเทียบได้กับเวลาเพียงไม่กี่ชั่วโมงหรือกี่นาทีในโลกจริง"
 utopia.3180.desc_gestalt:0 "$utopia.3180.desc.intro$ หากเรารู้ว่าต้องมองหาที่ใด การหยั่งรู้อนาคตก็อาจอยู่ไม่ไกลเกินเอื้อม\n\nความสามารถดังกล่าวมาพร้อมกับความเสี่ยงต่อจิตร่วมของเรา หากเราจะดำเนินการต่อ ก็ต้องทำด้วยความระมัดระวัง"
 utopia.3180.desc_machine_non_gestalt:0 "$utopia.3180.desc.intro$ หากผู้ใดรู้ว่าต้องมองหาที่ใด ก็เป็นไปได้แม้กระทั่งการเหลือบเห็นอนาคต...\n\nแนวคิดเรื่องการหยั่งรู้อนาคตมีความเสี่ยงสูงที่จะทำให้หน่วยประมวลผลพลังจิตของเราทำงานหนักเกินพิกัด เราต้องดำเนินการด้วยความระมัดระวัง"
 utopia.3180.desc_organic_non_gestalt:0 "$utopia.3180.desc.intro$ หากผู้ใดรู้ว่าต้องมองหาที่ใด ก็เป็นไปได้แม้กระทั่งการเหลือบเห็นอนาคต...\n\nการหยั่งรู้อนาคตคือหนึ่งในเส้นทางสู่ความบ้าคลั่งที่แน่นอนที่สุดสำหรับผู้มีพลังโทรจิต ดังนั้นเราต้องใช้ความระมัดระวัง"
 utopia.3180.a:0 "§Yทำสมาธิที่นี่สักครู่§!"
 utopia.3181.desc_gestalt: "การเชื่อมต่อการหยั่งรู้อนาคตอย่างจำกัดกับเดอะชราวด์สามารถคงอยู่ได้โดยไม่เสี่ยงต่อการทำงานหนักเกินพิกัดของยูนิต แต่ข้อมูลความน่าจะเป็นที่หลั่งไหลเข้ามาอย่างมหาศาลนั้นท่วมท้นเกินกว่าจะนำมาใช้ประโยชน์จริงได้มากนัก\n\nอย่างไรก็ตาม โหนดการวิจัยของเราได้พบการประยุกต์ใช้ข้อมูลนี้เล็กน้อย โดยนำไปใช้กับกองยานของเราเพื่อปรับปรุงประสิทธิภาพการรบ"
 utopia.3181.desc_machine_non_gestalt: "การเชื่อมต่อการหยั่งรู้อนาคตอย่างจำกัดกับเดอะชราวด์สามารถคงอยู่ได้โดยไม่เสี่ยงต่อการทำงานหนักเกินพิกัดของยูนิต แต่ข้อมูลความน่าจะเป็นที่หลั่งไหลเข้ามาอย่างมหาศาลนั้นท่วมท้นเกินกว่าจะนำมาใช้ประโยชน์จริงได้มากนัก\n\nกระนั้น หากสามารถออกแบบอินเตอร์เฟสดิจิทัลเพื่อตีความข้อมูลนี้ได้ มันก็น่าจะสามารถนำไปปรับปรุงประสิทธิภาพของคอมพิวเตอร์การรบในยานอวกาศของเราได้..."
 utopia.3181.desc_organic_non_gestalt: "การเชื่อมต่อการหยั่งรู้อนาคตอย่างจำกัดกับเดอะชราวด์สามารถคงอยู่ได้โดยไม่เสี่ยงต่อความบ้าคลั่ง แต่ข้อมูลความน่าจะเป็นที่หลั่งไหลเข้ามาอย่างมหาศาลนั้นท่วมท้นเกินกว่าจะนำมาใช้ประโยชน์จริงได้มากนัก\n\nกระนั้น หากสามารถออกแบบอินเตอร์เฟสดิจิทัลเพื่อตีความข้อมูลนี้ได้ มันก็น่าจะสามารถนำไปปรับปรุงประสิทธิภาพของคอมพิวเตอร์การรบในยานอวกาศของเราได้..."
 utopia.3181.name:0 "§Gเครื่องดักจับและตีความสัญญาณโทรจิต§!"
 utopia.3182.name: "§Rความบ้าคลั่งจากเดอะชราวด์§!"
 utopia.3182.desc_gestalt: "เป็นไปตามที่หวั่นเกรง การพยายามทำความเข้าใจกับทางเลือกและความน่าจะเป็นมากมายเหลือคณานับที่ดำรงอยู่ทั้งในอดีตและอนาคต ส่งผลให้โดรนพลังจิตจำนวนมากตกอยู่ในภาวะจิตเภทนิ่ง(คาตาโทเนีย)\n\nนี่ทำให้พวกเขาถูกตัดขาดจากจิตเหนือสำนึกและไร้ซึ่งเป้าหมาย หากเราปรารถนาจะเข้าถึงเดอะชราวด์อีกครั้ง เราจำเป็นต้องรีไซเคิลซากที่ชำรุดเหล่านี้เพื่อฟื้นฟูกำลังร่วมของเรากลับคืนมา"
 utopia.3182.desc.non_gestalt.1: "ทางเลือกและความน่าจะเป็นมากมายเหลือคณานับที่ดำรงอยู่ทั้งในอดีตและอนาคต\n\nทุกๆ ความผันแปรและสถานการณ์ ไม่ว่าจะต่างกันมหาศาลหรือเพียงเล็กน้อย ล้วนถูกฉายซ้ำอย่างไม่มีที่สิ้นสุดใน [GetSpeciesBrainPlural] ของพวกเขา พวกเขาถูกลดสภาพลงสู่ภาวะจิตเภทนิ่งอย่างถาวร\n\n"
 utopia.3182.desc.non_gestalt.2: " [GetTelepathPlural] ใหม่ คงต้องใช้เวลาอีกสักระยะก่อนที่เราจะสามารถรวบรวมพลังจิตที่จำเป็นเพื่อเอื้อมเข้าสู่เดอะชราวด์ได้อีกครั้ง"
 utopia.3182.desc_machine_non_gestalt: "เป็นไปตามที่เราคาดไว้ หน่วยประมวลผลพลังจิตของเราไม่สามารถทำความเข้าใจกับ $utopia.3182.desc.non_gestalt.1$เนื่องจากเราจำเป็นต้องสร้าง$utopia.3182.desc.non_gestalt.2$"
 utopia.3182.desc_organic_non_gestalt: "เป็นไปตามที่เราหวั่นเกรง ความบ้าคลั่งได้เข้าครอบงำผู้มีพลังโทรจิตของเรา ในทันใดนั้น จิตใจของพวกเขาถูกเปิดออกสู่ $utopia.3182.desc.non_gestalt.1$เนื่องจากเราจำเป็นต้องรับสมัคร$utopia.3182.desc.non_gestalt.2$"
 utopia.3190.name: "พลังงานเข้มข้น"
 utopia.3190.desc.intro: "เราได้พบพื้นที่ขนาดเล็กจิ๋วภายในเดอะชราวด์ที่มีความเข้นข้นของพลังจิตในระดับรุนแรงอย่างที่เราไม่เคยพบเห็นมาก่อน"
 utopia.3190.desc_gestalt: "$utopia.3190.desc.intro$ พลังจิตดังกล่าว หากดึงมาใช้สำเร็จ ก็จะสลายไปในหมู่จิตร่วมโดยไม่มีผลลัพธ์อะไรมากนัก ทว่าเราอาจสามารถกำหนดโดรน 'ผู้ถูกเลือก' เพียงหนึ่งเดียวให้ทำหน้าที่เป็นสื่อนำพลังงานนี้โดยตรง ซึ่งจะทำให้ทรงพลังอย่างยิ่งในกระบวนการนี้\n\nยังไม่เป็นที่ทราบแน่ชัดว่าร่างเดี่ยวของพวกเขาจะสามารถรับมือกับพลังงานปริมาณมหาศาลเช่นนี้ได้โดยไม่มีผลกระทบร้ายแรงถึงชีวิตหรือไม่ เราได้รวบรวมตัวเลือกของผู้สมัครไว้แล้ว"
 utopia.3190.desc_non_gestalt: "$utopia.3190.desc.intro$ [GetPsychicNoun] คนใดก็ตามที่สามารถดึงพลังจากขุมพลังงานดิบนี้มาใช้ได้สำเร็จจะทรงพลังอย่างยิ่งยวด... แต่ทว่าพลังงานนี้มีเพียงพอสำหรับคนเพียงคนเดียวเท่านั้น และมีความเสี่ยงที่เกี่ยวข้อง\n\nมีบุคคลเพียงไม่กี่คนใน [Root.GetName] ทั้งหมดที่มีพลังจิตแกร่งกล้าพอที่จะดึงพลังงานจากขุมพลังนี้โดยมีความหวังว่าจะรอดชีวิต ใครควรจะเป็นคนคนนั้น?"
 utopia.3190.1.a: "§G[leader_1.GetTitle] [leader_1.GetName]§!"
 utopia.3190.2.a: "§Y[leader_1.GetTitle] [leader_1.GetName]§!"
 utopia.3190.3.a: "§R[leader_1.GetTitle] [leader_1.GetName]§!"
 utopia.3190.1.b: "§G[leader_2.GetTitle] [leader_2.GetName]§!"
 utopia.3190.2.b: "§Y[leader_2.GetTitle] [leader_2.GetName]§!"
 utopia.3190.3.b: "§R[leader_2.GetTitle] [leader_2.GetName]§!"
 utopia.3190.1.c: "§G[leader_3.GetTitle] [leader_3.GetName]§!"
 utopia.3190.2.c: "§Y[leader_3.GetTitle] [leader_3.GetName]§!"
 utopia.3190.3.c: "§R[leader_3.GetTitle] [leader_3.GetName]§!"
 utopia.3190.1.d: "§G[leader_4.GetTitle] [leader_4.GetName]§!"
 utopia.3190.2.d: "§Y[leader_4.GetTitle] [leader_4.GetName]§!"
 utopia.3190.3.d: "§R[leader_4.GetTitle] [leader_4.GetName]§!"
 utopia.3191.name: "[GetChosenName]"
 utopia.3191.desc_organic_non_gestalt: "$utopia.3191.desc_machine_non_gestalt$ ขอให้เหล่าจิตวิญญาณทรงเมตตาต่อจิตวิญญาณของเราด้วยเถิด"
 utopia.3191.desc_machine_non_gestalt: "มัน... มันเสร็จสิ้นแล้ว ทั่วทั้งเดอะชราวด์ดูเหมือนจะสั่นสะท้านเมื่อขุมพลังจิตถูกดึงจนหมดสิ้น และพลังของมันถูกถ่ายโอนไปยัง [chosen_leader.GetName]\n\nมีบุคคลเพียงหยิบมือเดียวเท่านั้นในประวัติศาสตร์ของกาแล็กซีทั้งหมดที่ได้รับพรให้มีพลังจิตระดับสูงส่งถึงเพียงนี้"
 utopia.3191.desc_gestalt: "เราประสบความสำเร็จในการส่งผ่านพลังงานทั้งหมดจากขุมพลังจิตเข้าสู่เป้าหมายที่กำหนดไว้ [chosen_leader.GetName]\n\nสิ่งที่อาจเป็นเพียงหยาดน้ำหยดเดียวในมหาสมุทรแห่งจิตร่วมของเรา บัดนี้สามารถทำหน้าที่เป็นเครื่องมืออันทรงพลังสำหรับ [Root.GetName] เมื่อ [chosen_leader.GetName] กวัดแกว่งมันเพื่อผลประโยชน์ของ [Root.Species.GetName] ทั้งปวง"
 utopia.3192.name: "§Rความตายของผู้นำ§!"
 utopia.3192.desc_gestalt: "ทั่วทั้งเดอะชราวด์สั่นสะท้านเมื่อพลังจิตอันมหาศาลในขุมพลังถูกส่งผ่านไปยัง [chosen_leader.GetName]\n\nทว่า เป็นไปตามที่คาด พลังดังกล่าวเกินขีดจำกัดของสิ่งมีชีวิตเดี่ยวเพียงร่างเดียว ร่างกายของ [chosen_leader.GetName] ระเบิดออกเป็นละอองพลังจิต ส่งผลให้เสียงของพวกเขาถูกตัดขาดจาก [GetBrainName]"
 utopia.3192.desc_non_gestalt: "ทั่วทั้งเดอะชราวด์ดูเหมือนจะสั่นสะท้านเมื่อพลังจิตอันมหาศาลในขุมพลังถูกถ่ายโอนไปยัง [chosen_leader.GetName]\n\nน่าเสียดายที่ [GetSpeciesBrain] ของ [chosen_leader.GetHerHis] ไม่สามารถรับมือกับความกดดันได้ บางทีพลังดังกล่าวอาจไม่สามารถกักเก็บไว้ในร่างเนื้อได้ [chosen_leader.GetName] ถูกแผดเผาในการระเบิดครั้งใหญ่ของพลังจิตที่คร่าชีวิตทุกคนที่อยู่ในบริเวณใกล้เคียง"
 utopia.3193.name: "§Rการแปรสภาพพลังจิต§!"
 utopia.3193.desc.intro: "ทั่วทั้งเดอะชราวด์ดูเหมือนจะสั่นสะท้านเมื่อพลังจิตอันมหาศาลในขุมพลังถูกถ่ายโอนไปยัง [chosen_leader.GetName]\n\nแม้ว่าการถ่ายโอนจะประสบความสำเร็จ แต่ [chosen_leader.GetName] กลับถูก... แปรสภาพ..."
 utopia.3193.desc.outro: "\n\n§Hไอ้พวกเศษสวะ... แก... แกทำ... อะไร... กับฉัน... §!\n\n§Hแก... ต้อง... ชดใช้... ให้กับความโอหังนี้...§!"
 utopia.3193.desc_gestalt: "$utopia.3193.desc.intro$ ส่งผลให้พวกเขาถูกตัดขาดจากจิตร่วมเนื่องจากมีตัวตนต่างถิ่นโดยสิ้นเชิงเข้ามาอาศัยและยึดครองร่างของพวกเขา$utopia.3193.desc.outro$"
 utopia.3193.desc_non_gestalt: "$utopia.3193.desc.intro$ ร่างกายของพวกเขาถูกสิงสู่และครอบงำโดยสสารที่เกิดจากพลังงานบริสุทธิ์$utopia.3193.desc.outro$"

 utopia.3200.name: "นิมิต"
 utopia.3200.1.desc_organic: "ความว่างเปล่าที่นี่ระยิบระยับไปด้วยพลังงาน ให้เราพักผ่อนสักครู่เถิด"
 utopia.3200.1.desc_machine: "ความว่างเปล่าที่นี่ระยิบระยับไปด้วยพลังงาน ให้เราชาร์จพลังงานสักครู่เถิด"
 utopia.3200.2.desc: "เส้นทางที่เราเดินตามมาได้สิ้นสุดลงอย่างกะทันหัน เราไม่สามารถไปต่อได้อีกแล้ว"
 utopia.3200.3.desc_organic: "มีบางสิ่งกำลังพูดกับเราที่นี่ บางสิ่งที่มหัศจรรย์"
 utopia.3200.3.desc_machine: "มีบางสิ่งกำลังพูดกับเราที่นี่ บางสิ่งที่ยอดเยี่ยม"
 utopia.3200.4.desc: "ด้วยเหตุผลที่เราไม่สามารถหยั่งรู้ได้ เราได้ถูกดึงดูดเข้าสู่เส้นสายพลังงานนี้ในเดอะชราวด์เพราะเหตุใดกัน?"
 utopia.3200.5.desc.outro: "ถาโถมเข้าใส่เราขณะที่เราใคร่ครวญถึงความชั่วนิรันดร์ที่ต้องเผชิญในเดอะชราวด์จากนั้นเราก็ตั้งหลักได้ และความตื่นตระหนกก็จางหายไป"
 utopia.3200.5.desc_organic: "ในชั่วขณะหนึ่ง เราได้หลงทาง ความรู้สึกตื่นตระหนกอย่างที่สุด$utopia.3200.5.desc.outro$"
 utopia.3200.5.desc_machine: "ในชั่วขณะหนึ่ง เราได้หลงทาง ความไม่แน่นอนที่ทวีความรุนแรงขึ้น$utopia.3200.5.desc.outro$"
 utopia.3200.6.desc.intro: "ขณะที่เราผจญภัยลึกเข้าไปในเดอะชราวด์ฝูงจิตวิญญาณกลุ่มหนึ่งพากันเริงระบำรอบตัวเราอยู่หลายชั่วโมง พวกมันเปล่งประกายด้วยสีสันละลานตาซึ่งเราไม่เคยพบเห็นในอวกาศปกติ\n\n"
 utopia.3200.6.desc_organic: "$utopia.3200.6.desc.intro$การแสดงนั้นน่าเพลิดเพลินใจ จนกระทั่งเราตระหนักได้ว่า: เรากำลังถูกต้อนให้จนมุม"
 utopia.3200.6.desc_machine: "$utopia.3200.6.desc.intro$การแสดงนั้นน่าทึ่ง จนกระทั่งเราตระหนักได้ว่า: เรากำลังถูกต้อนให้จนมุม"
 utopia.3200.7.desc: "เศษผลึกแก้วอันสมบูรณ์แบบลอยอยู่ตรงนี้ หมุนรอบแกนของตัวเองอย่างช้าๆ เมื่อเราเข้าไปใกล้ มันก็แตกกระจายเป็นพันชิ้น"
 utopia.3200.8.desc_organic: "ศพของ [Root.GetSpeciesName] ที่ตายแล้วลอยเคว้งคว้างผ่านความว่างเปล่าเบื้องหน้า ซากเน่าเปื่อยส่งเสียงกรีดร้องแหลมสูงก่อนจะอันตรธานหายไปจากสายตา"
 utopia.3200.8.desc_machine: "โครงของ [Root.GetSpeciesName] ที่พังยับเยินลอยเคว้งคว้างผ่านความว่างเปล่าเบื้องหน้า ซากที่ผุพังส่งเสียงกรีดร้องแหลมสูงก่อนจะอันตรธานหายไปจากสายตา"
 utopia.3200.9.desc.intro: "เราไม่อาจแน่ใจได้ว่านี่เกิดขึ้นจริงหรือไม่ เราอยู่ในเดอะชราวด์จริงๆ หรือว่า"
 utopia.3200.9.desc_hive: "$utopia.3200.9.desc.intro$ เรากำลังเผชิญกับอาการรับรู้ประสาทสัมผัสบกพร่องอย่างเฉียบพลัน?"
 utopia.3200.9.desc_organic_non_hive: "$utopia.3200.9.desc.intro$ มีใครคนใดคนหนึ่งในพวกเรากำลังเผชิญกับภาวะจิตเภทเฉียบพลัน?"
 utopia.3200.9.desc_machine_non_hive: "$utopia.3200.9.desc.intro$ เรากำลังประสบกับปัญหาระบบประมวลผลขัดข้องอย่างรุนแรง?"

 terraforming_candidate_category:0 "ร่องรอยชีวิตโบราณ"
 terraforming_candidate_category_desc:0 "โลกอันแห้งแล้งและไร้ชีวิตนี้กำลังแสดงสัญญาณว่าครั้งหนึ่งเคยมีสิ่งแวดล้อมที่เอื้อต่อการดำรงชีวิต"
 MESSAGE_TERRAFORM_FOUND_TITLE:0 "$anomaly.2575.name$"
 MESSAGE_TERRAFORM_FOUND_DESC:0 "[From.GetName] ถูกระบุว่าเป็นดาวที่สามารถปรับสภาพได้ [From.GetPlanetMoon] จะถูกติดตามว่าเป็นเป้าหมายในการตั้งอาณานิคมในอนาคต"
 anomaly.2575.name:0 "ค้นพบดาวที่สามารถปรับสภาพได้"
 anomaly.2575.desc.intro:0 "การสำรวจอย่างละเอียดเกี่ยวกับ [From.GetName] พบว่าในอดีตอันไกลโพ้น ดาวดวงนี้อาจเคยเอื้อต่อการดำรงชีวิต มีแหล่งสะสมน้ำแข็งขนาดใหญ่ที่บริเวณขั้วโลกและใต้พื้นผิวของ [From.GetPlanetMoon] การมีอยู่ของโครงข่ายหุบเขาบ่งชี้ว่าน้ำอาจเคยไหลผ่านอย่างอิสระมาก่อน"
 anomaly.2575.desc.1:0 "$anomaly.2575.desc.intro$\n\nในทางทฤษฎีแล้ว การปรับสภาพดาว [From.GetPlanetMoon] นี้เป็นไปได้ ทว่าเรายังไม่มีเทคโนโลยีที่จะทำภารกิจอันยิ่งใหญ่นี้ให้สำเร็จได้ในกรอบเวลาที่เป็นจริง"
 anomaly.2575.desc.2:0 "$anomaly.2575.desc.intro$\n\nค่าใช้จ่ายด้านพลังงานอาจจะน่าหวาดหวั่น แต่เราก็มีเทคโนโลยีที่จะค่อยๆ ปรับสภาพ [From.GetPlanetMoon] นี้ให้กลายเป็นดาวที่สามารถรองรับชีวิตได้อีกครั้ง"
 anomaly.2575.desc.3:0 "$anomaly.2575.desc.intro$\n\nน่าเสียดายที่ §Yไดสัน สเปก§! ในระบบดาวนี้ได้ทำลายความเป็นไปได้ในการฟื้นฟูดาวเคราะห์ดวงนี้ไปจนหมดสิ้น"
 anomaly.2575.a: "เมื่อถึงเวลา บางทีเราอาจจะปลุกมันขึ้นมาใหม่ได้"

 utopia.3300.name: "ตัวตนในเดอะชราวด์"
 utopia.3300.desc:0 "มีตัวตนบางอย่างอยู่ที่นี่ ครอบครองพื้นที่ส่วนนี้ทั้งหมดของเดอะชราวด์เราเคยพบจิตวิญญาณมาก่อน แต่สิ่งนี้ต่างออกไป สิ่งนี้ทรงพลังกว่ามาก... และเก่าแก่กว่ามาก\n\nดูเหมือนว่ามันยังไม่รู้ตัวถึงการมีอยู่ของเรา บางทีมันอาจกำลังหลับใหลอยู่ หรือบางทีเราอาจจะต่ำต้อยเกินกว่าที่มันจะสนใจ\n\nบางทีเราควรจะออกไปจากที่นี่"
 utopia.3300.1.a:0 "§Gพยายามสื่อสารกับตัวตนนั้น§!"
 utopia.3300.1.b:0 "§Yพยายามสื่อสารกับตัวตนนั้น§!"
 utopia.3300.1.c:0 "§Rพยายามสื่อสารกับตัวตนนั้น§!"
 utopia.3300.1.d:0 "§G[chosen_one.GetName] จะพูดคุยกับตัวตนนั้น§!"
 utopia.3301.name: "§Rการสื่อสารร่วมถูกปฏิเสธ§!"
 utopia.3301.desc:0 "เมื่อเราเอื้อมมือไปหาตัวตนนั้น เราสัมผัสได้ถึงการขยับเขยื้อนของมัน ความสนใจของมันเพ่งตรงมายังเราในทันที ดูเหมือนมันจะไม่พอใจที่ถูกรบกวน\n\nคลื่นพลังงานซัดสาดเข้าใส่ผู้มีพลังโทรจิตของเรา สร้างความเจ็บปวดรวดร้าวอย่างแสนสาหัสให้กับบางคนและทำให้ผู้อื่นหมดสติไป เราไม่มีทางเลือกอื่นนอกจากต้องล่าถอยออกจากเดอะชราวด์ไปก่อนในขณะนี้"
 utopia.3302.desc:0 "เมื่อเราเอื้อมมือไปหาตัวตนนั้น เราสัมผัสได้ถึงการขยับเขยื้อนของมัน ความสนใจของมันเพ่งตรงมายังเราในทันที ดูเหมือนมันจะไม่พอใจที่ถูกรบกวน\n\nคลื่นพลังจิตขนาดยักษ์ซัดสาดเข้าหาเรา ดับประสาทสัมผัสของผู้มีพลังโทรจิตของเราไปชั่วขณะ เมื่อพวกเขาได้สติขึ้นมา ก็สังเกตเห็นว่าเพื่อนคนหนึ่งหายไป ไม่มีใครพบ §Y[leader_to_kill.GetName]§! อีกเลย และในจุดที่ [leader_to_kill.GetSheHe] [leader_to_kill.GetWasWere] เคยยืนอยู่นั้น บัดนี้หลงเหลือเพียงร่องรอยพลังจิตของรอยแยกขนาดเล็ก ราวกับว่าสิ่งนั้นได้เอื้อมเข้ามายังโลกของเราและลาก [leader_to_kill.GetHerHim] เข้าสู่ขัด...เพื่ออะไรหรือด้วยจุดประสงค์ใด ใครจะรู้ได้\n\nไม่ว่าเหตุผลในการนำตัว [leader_to_kill.GetHerHim] ไปจะเป็นอย่างไร คงยากที่เราจะได้เห็น [leader_to_kill.GetName] อีกครั้ง"
 utopia.3304.name: "ข้อเสนอพันธสัญญา"
 utopia.3304.desc.start.default: "ขณะที่เราเอื้อมมือไปหาตัวตนนั้น"
 utopia.3304.desc.start.shroud: "ขณะที่เราเอื้อมเข้าสู่เดอะชราวด์"
 utopia.3304.desc.common: "จิตใจของผู้มีพลังโทรจิตของเราก็เต็มไปด้วยเสียงประสาน เสียงกระซิบแผ่วเบาในตอนแรก ค่อยๆ ดังระงมและทวีความเข้มข้นขึ้นจนกลายเป็นเสียงของคนนับพันที่พูดพร้อมกัน\n\nเสียงเหล่านั้นแนะนำตัวเองว่าเป็น $whisperers_in_the_void_color_article$ สมาชิกแต่ละคนในกลุ่มเสียงประสานเริ่มแสดงตน: เสียงแผ่วแห่งความลับ, "
 utopia.3304.desc.throne.default: "เงาแห่งราชบัลลังก์"
 utopia.3304.desc.throne.shroud: "$the_vacant_throne$"
 utopia.3304.desc.end: ", นายเชิดหุ่น - พวกเขาช่างมีมากมายเหลือเกิน ทุกคนต่างร่วมอยู่ในเสียงประสานของกระซิบ:มัน หรือพวกเขา อ้างว่าล่วงรู้ความรู้ทุกอย่างที่ถูกกระซิบในความลับจากมรรตัยชนคนหนึ่งไปยังอีกคนหนึ่ง และเสนอที่จะแบ่งปันความลับเหล่านี้บางส่วนให้กับเรา...\n\n§Hหากเราเพียงแต่ยอมให้พวกเขาเข้ามาในจิตสำนึกของเรา§!\n\nราคาเพียงเล็กน้อย พวกเขาให้ความมั่นใจกับเรา เราจะแทบไม่รู้สึกถึงการมีอยู่ของพวกเขาด้วยซ้ำ\n\nน้ำเสียงของพวกเขามีความเร่งรีบอย่างเห็นได้ชัด"
 utopia.3304.desc: "$utopia.3304.desc.start.default$, $utopia.3304.desc.common$ $utopia.3304.desc.throne.default$ยูโทเปีย 3304. DEC ยืน"
 utopia.3304.desc.shroud: "$utopia.3304.desc.start.shroud$, $utopia.3304.desc.common$ $utopia.3304.desc.throne.shroud$ยูโทเปีย 3304. DEC ยืน"
 utopia.3304.a:0 "§Yสร้างพันธสัญญาเสียงกระซิบจากความว่างเปล่า§!"
 utopia.3305.desc:3 "ตัวตนนั้นต้อนรับเราด้วยความเป็นมิตรที่คุ้นเคย มันไม่ได้สื่อสารด้วยถ้อยคำ แต่ผ่านทางนิมิต แนวคิด และไอเดีย มันแทรกซึมเข้าสู่จิตใจของผู้มีพลังโทรจิตของเราอย่างนุ่มนวลและราบรื่นจนแทบจะคิดว่ามันอยู่ที่นั่นเสมอมา ภาพมากมายแล่นผ่านหน้าพวกเขา\n\nตัวตนนี้เป็นที่รู้จักในนาม $the_composer_of_strands_color_article$ มันจ้องมองร่างอินทรีย์ของเราด้วยความสนใจใคร่รู้ มันแสดงให้เราเห็นวิธีต่างๆ ที่ร่างกายสามารถเติบโต ปรับเปลี่ยน ปรับปรุง และวิวัฒนาการได้\n\n§Hหากเรายอมรับมันเข้าสู่เนื้อหนังของเรา§!\n\nมันรอคอยคำตอบของเราอย่างอดทนและเปี่ยมด้วยความเสน่หา ราวกับพ่อแม่ที่เอ็นดูบุตรคนโปรด เบื้องหลังของมันคือคู่แฝดตัวแสดงของเคลย์มันไม่ได้สนใจในจิตใจเนื้อหนังของเรา แต่มันปรารถนาที่จะสร้างจิตวิญญาณเพื่อหลอมรวมวงจรต่างๆ เข้ากับจิตวิญญาณ\n\nผู้ เรียบ เรียงกำลังรอคอยคำตอบจากเรา"
 utopia.3305.a:0 "§Yสร้างพันธสัญญา ผู้สร้าง§!"
 utopia.3306.desc.1: "ขณะที่เราเอื้อมมือไปหาตัวตนนั้น เราสัมผัสได้ถึงความหิวกระหายอันยิ่งใหญ่ "
 utopia.3306.desc.2:0 "ตัวตนนั้นไม่ยอมเสียเวลาหรือเปลืองถ้อยคำ มันคือ $the_eater_of_worlds_color_article$ และมันปรารถนาที่จะกัดกินเรา\n\nทว่า เพียงแค่บางส่วนในหมู่พวกเราเท่านั้น ไม่มากเกินกว่าที่เราจะแบ่งปันได้ เพื่อเป็นการแลกเปลี่ยน มันจะมอบพลังอันยิ่งใหญ่แก่เรา มันจะสอนให้เราลิ้มรสความกระหายและความโกรธแค้นของมัน มันจะหลอมรวมพวกมันเป็นอาวุธพลังจิตที่สามารถเอาชนะศัตรูใดๆ ได้\n\n§Hหากเราเพียงแต่ยอมให้มันกัดกินเรา§!"
 utopia.3306.desc.3: "$utopia.3306.desc.2$\n\nน้ำเสียงของมันดูร้อนรนที่จะเริ่มต้น"
 utopia.3306.desc: "$utopia.3306.desc.1$ยูโทเปีย3306. desc.3 เหรียญ"
 utopia.3306.a:0 "§Yสร้างพันธสัญญา ผู้ทำลาย§!"
 utopia.3307.desc:0 "ก่อนที่เราจะหาตำแหน่งของตัวตนนั้นเจอ มันก็เอื้อมมาหาเราก่อน ความคิดของมันพันรอบและบิดตัวไปตามจิตใจของผู้มีพลังโทรจิตของเรา เจรจาและหว่านล้อม มันคือ $the_instrument_of_desire_color_article$ และมันจะมอบความมั่งคั่ง พลัง เกียรติยศ... ทุกสิ่งที่เราเคยปรารถนา ทุกสิ่งที่เราจะปรารถนา\n\nราคาล่ะ? เรื่องเล็กน้อย ไม่ต่างจากค่าธรรมเนียมแรกเข้า มันเพียงต้องการสิ่งที่ดีที่สุดสำหรับเรา มันจะช่วยเรา นำทางเรา ชี้แนะความทะเยอทะยานและความฝันของเรา\n\n§Hหากเรายอมรับมันเข้ามาไว้ในใจของเรา§!\n\nมันมั่นใจว่าเราจะตอบตกลง เราจะปฏิเสธได้อย่างไรกัน?"
 utopia.3307.a:0 "§Yสร้างพันธสัญญาเครื่องดนตรีแห่งความปรารถนา§!"
 utopia.3308.desc:0 "การปรากฏตัวรอพวกเราอยู่ ใช่§Rอวสาน ของ วัฏจักร§!มันรอพวกเรามาตลอด พลังจิตของเราก็พูดพร้อมกัน, เสียงโหลในคอรัสที่สมบูรณ์แบบ :§R\"นี่ไม่ใช่เวลาของคุณ\"§!หยุด§R\"ช่างมันเถอะ\"§!\n\nไม่มีอะไรมากกว่านั้น แต่มีการต่อรอง เรารู้ดี อํานาจ, ความ รู้ และ ความ มั่งคั่ง เกิน ความ สามารถ ของ เรา ใน การ เอา ไป.\n\n§Rถ้าเราเพียงแต่จะนําจุดจบออกมา§!"
 utopia.3308.a:0 "§Rสร้างพันธสัญญา จุดสิ้นสุดของวัฏจักร§!"
 utopia.3310.name:0 "จัดตั้งพันธสัญญาสำเร็จ"
 utopia.3320.name:0 "อวสาน ของ วัฏจักร:§Rการพิพากษา§!"
 utopia.3320.desc.intro: "เวลาของเราหมดลงแล้ว ในช่วงเวลาสั้นๆ เราได้รับประโยชน์จากพลังอันมหาศาลที่มอบให้เราโดย $end_of_the_cycle_color_article$ เรารู้ว่าต้องมีราคาที่ต้องจ่าย แต่เราคิดว่ามันอาจเป็นราคาที่เราสามารถทนรับได้ หรือเราอาจหาทางหลีกเลี่ยงการจ่ายได้\n\nทว่ามันไม่ได้เป็นเช่นนั้น และเราทำไม่ได้\n\nราคาที่เราจ่ายไปคือทุกสิ่งทุกอย่าง ในพริบตาเดียว [Root.GetName] ก็... เลือนหายไป ในจุดที่เคยมีอาณานิคมอันรุ่งเรือง บัดนี้หลงเหลือเพียงซากปรักหักพัง ในจุดที่กองยานอันเกรียงไกรเคยแล่นผ่านความว่างเปล่า มีเพียงความเงียบและเศษซาก ทั้งหมดถูกกลืนกินโดยจุดจบ ทั้งหมดถูกพรากไปโดย §Hเดอะชราวด์§!"
 utopia.3320.desc.outro: "ปรากฏขึ้นใกล้กับ [former_capital.GetName] ความทรงพลังอย่างยิ่งยวดที่เกิดจากการกลืนกินจิตสำนึกของ [GetPsychicNounPlural] ของเรา บัดนี้มันท่องไปทั่วกาแล็กซีเพื่อค้นหาเหยื่อรายต่อไป"
 utopia.3320.desc.a.1.gestalt: "สิ่งเดียวที่หลงเหลือจากจักรวรรดิของเราคือกลุ่มผู้ลี้ภัยที่นำโดย §H[Root.GetRulerName]§! ผู้มีพลังจิต [GetPsychicNoun] อันทรงพลังซึ่งแยกตัวออกจากจิตร่วม และนำกลุ่มเล็กๆ ของ [GetIndividualPlural] ไปซ่อนตัวบนโลกที่ไร้รอยแผลจากจุดจบ"
 utopia.3320.desc.a.1.non_gestalt: "สิ่งเดียวที่หลงเหลือจากจักรวรรดิของเราคือกลุ่มผู้ลี้ภัยที่นำโดย §H[Root.GetRulerName]§! ผู้มีพลังจิต [GetPsychicNoun] อันทรงพลังผู้คาดการณ์ล่วงหน้าถึงสิ่งที่จะเกิดขึ้น และนำประชากรส่วนน้อยไปซ่อนตัวบนโลกที่ไร้รอยแผลจากจุดจบ"
 utopia.3320.desc.a.outro: "ราวกับว่าการที่จักรวรรดิของเราถูกทำลายข้ามคืนยังแย่ไม่พอ ตัวตนพลังจิตขนาดยักษ์ยังได้$utopia.3320.desc.outro$"
 utopia.3320.desc.a.gestalt: "$utopia.3320.desc.intro$\n\n$utopia.3320.desc.a.1.gestalt$\n\n$utopia.3320.desc.a.outro$"
 utopia.3320.desc.a.non_gestalt: "$utopia.3320.desc.intro$\n\n$utopia.3320.desc.a.1.non_gestalt$\n\n$utopia.3320.desc.a.outro$"
 utopia.3320.desc.b: "$utopia.3320.desc.intro$\n\nไม่เพียงแต่จักรวรรดิของเราจะถูกทำลายย่อยยับโดยสิ้นเชิง แต่ตัวตนพลังจิตขนาดยักษ์ยังได้ปรากฏขึ้นใกล้กับ [former_capital.GetName] ความทรงพลังอย่างยิ่งยวดที่เกิดจากการกลืนกินจิตสำนึกของ [GetPsychicNounPlural] ของเรา บัดนี้มันท่องไปทั่วกาแล็กซีเพื่อค้นหาเหยื่อรายต่อไป อย่างน้อยที่สุดเราก็จะไม่ได้อยู่ตรงนั้นเพื่อเห็นมันทำสิ่งที่พวกเราได้เริ่มต้นไว้ให้เสร็จสิ้น"
 utopia.3320.opt.a:0 "พวกเราทำอะไรลงไป..."
 utopia.3320.opt.a.shroud.tt: "$BEGINS_EVENT_CHAIN$ §Y$the_reckoning_chain_title$§!"
 utopia.3321.desc.1: "เป็นเวลาหลายปีที่เราทราบดีว่ามีบางอย่างผิดปกติเกี่ยวกับ §H[From.GetName]§! เมื่อหลายปีก่อน อุตสาหกรรม วิทยาศาสตร์—ทุกสิ่งทุกอย่างเกี่ยวกับจักรวรรดิของพวกเขาประสบกับการเพิ่มขึ้นของประสิทธิภาพและประสิทธิผลอย่างมหาศาลและกะทันหันอย่างไร้คำอธิบาย ราวกับว่าพวกเขาได้รับพรจากพลังที่มองไม่เห็น\n\nอย่างที่ปรากฏ มันไม่ใช่พรที่ประเสริฐนักแต่เป็นคำสาป [From.GetName] ได้เซ็นสัญญาขายอนาคตของตนเองไป และบัดนี้ถึงเวลาต้องชำระหนี้แล้ว\n\nในพริบตาเดียว [From.GetName] ก็... เลือนหายไป ในจุดที่เคยมีอาณานิคมอันรุ่งเรือง บัดนี้หลงเหลือเพียงซากปรักหักพัง ในจุดที่กองยานอันเกรียงไกรเคยแล่นผ่านความว่างเปล่า มีเพียงความเงียบและเศษซาก"
 utopia.3321.desc.2: "บัดนี้ ตัวตนพลังงานอันทรงพลังอย่างยิ่งยวดได้ปรากฏขึ้นใกล้กับเมืองหลวงเก่าของพวกเขา"
 utopia.3321.desc.3: "เมื่อหลายทศวรรษก่อน เราเริ่มตรวจพบกิจกรรมที่ผิดปกติในระบบดาวที่ห่างไกล [GetResearchers] ของเราทฤษฎีว่าการเคลื่อนไหวและรังสีที่เพิ่มขึ้นนั้นเป็นเครื่องบ่งชี้ว่าอารยธรรมต่างดาวกำลังเผชิญกับการเติบโตของผลผลิตอย่างมหาศาล เนื่องจากเรายังไม่ได้สถาปนาการติดต่อกับสังคมตามสมมติฐานนี้ ทฤษฎีนี้จึงยังไม่ได้รับการยืนยัน\n\nจากนั้น กิจกรรมดังกล่าวก็หยุดลงในเกือบจะพริบตา ความเงียบงันปกคลุมพื้นที่อวกาศอันเคยพลุกพล่านเหล่านั้นในขณะนี้"
 utopia.3321.desc.4: "บัดนี้ การสแกนระยะไกลได้ตรวจพบปรากฏการณ์ที่แปลกประหลาดในระบบดาวที่ห่างไกลเหล่านั้น หากรายงานเหล่านั้นน่าเชื่อถือ มันสามารถอธิบายได้ว่าเป็นตัวตนอันทรงพลังอย่างยิ่งยวดที่ประกอบด้วยพลังงานบริสุทธิ์ ซึ่งสร้างความเสียหายอย่างใหญ่หลวงขณะเคลื่อนผ่านอวกาศ"
 utopia.3321.desc.a.contact: "$utopia.3321.desc.1$ ภัยพิบัตินี้ยังลุกลามเข้ามาถึงภายในเขตแดนของเรา ทำลายล้างโลกบางดวงของเราที่เคยอยู่ภายใต้การปกครองของ [From.GetAdj]\n\n$utopia.3321.desc.2$\n\nดูเหมือนว่ามันกำลังหิว"
 utopia.3321.desc.a.no_contact: "$utopia.3321.desc.3$ ด้วยเหตุผลที่เรายังไม่สามารถระบุได้ โลกบางดวงภายในเขตแดนของเราก็เผชิญความพินาศลงในชั่วขณะเดียวกัน\n\n$utopia.3321.desc.4$"
 utopia.3321.desc.b.contact: "$utopia.3321.desc.1$\n\n$utopia.3321.desc.2$ มันเคลื่อนที่จากโลกหนึ่งไปยังอีกโลกหนึ่ง ทำลายล้างทุกสิ่งที่ขวางหน้า"
 utopia.3321.desc.b.no_contact: "$utopia.3321.desc.3$\n\n$utopia.3321.desc.4$"
 utopia.3321.opt.a.contact: "พวกเขาทำอะไรลงไป!?"
 utopia.3321.opt.a.no_contact: "นี่หมายความว่าอย่างไรกัน?!"
 utopia.3325.name:0 "อวสาน ของ วัฏจักร:§Rถูกปกคลุมโดยเดอะชราวด์§!"
 utopia.3325.desc.organic: "เราไม่สามารถหยุดยั้งตัวตนพลังงานอันดุร้ายจากการโอบล้อม §H[Root.GetName]§! ได้ ดาวเคราะห์และประชากรทั้งหมดบนดาวถูกกลืนกินโดย §Hเดอะชราวด์§!"
 utopia.3325.desc.machine: "เราไม่สามารถหยุดยั้งตัวตนพลังงานขนาดยักษ์จากการโอบล้อม §H[Root.GetName]§! ได้ ดาวเคราะห์และประชากรทั้งหมดบนดาวถูกกลืนกินโดย §Hเดอะชราวด์§!"
 utopia.3325.opt.a.organic_non_gestalt:0 "ช่างน่ากลัวยิ่งนัก!"
 utopia.3325.opt.a.machine_or_gestalt:0 "ภัยพิบัติครั้งใหญ่"
 utopia.3331.name:0 "กระซิบในเวียด:§Rการรับมือ§!"
 utopia.3331.desc.intro: "แม้ว่าความลับที่คนของเราได้รับถ่ายทอดมาจาก §Hกระซิบ:§! จะมีประโยชน์อย่างยิ่ง ทว่าบางส่วนก็น่าหวาดหวั่นอย่างมาก"
 utopia.3331.desc:0 "$utopia.3331.desc.intro$ การรับมือกับความเครียดจากการรู้ความจริงมากเกินไปนั้นเป็นเรื่องยาก และส่งผลให้ประชากรจำนวนมากขึ้นเรื่อยๆ รวมถึง §H[leader_target.GetTitle] [leader_target.GetName]§! หันไปพึ่งใช้สารเสพติดเป็นเครื่องมือในการรับมือ"
 utopia.3331.opt.a:0 "นั่นเป็นเรื่องที่น่าเสียดาย"
 utopia.3332.name:0 "กระซิบในเวียด:§Rการฆ่าตัวตาย§!"
 utopia.3332.desc.intro: "$utopia.3331.desc.intro$ โดยเฉพาะอย่างยิ่งความลับที่แบ่งปันกับบุคคลสำคัญ §H[leader_target.GetTitle] [leader_target.GetName]§! ผู้ไม่อาจ"
 utopia.3332.desc.organic_non_gestalt: "$utopia.3332.desc.intro$ ทนต่อความเครียดนี้ได้อีกต่อไป ได้ปลิดชีวิต [leader_target.GetHerHis] ของตนเองลง"
 utopia.3332.desc.machine_non_gestalt: "$utopia.3332.desc.intro$ ประมวลผลรายละเอียดเหล่านี้ได้อย่างมีประสิทธิภาพ ได้ทำลายระบบตัวเองและออฟไลน์อย่างถาวร"
 utopia.3332.desc.gestalt: "แม้ว่าความลับที่พวกเราได้รับถ่ายทอดจาก §Hกระซิบ:§! จะมีประโยชน์อย่างยิ่ง แต่บางส่วนก็มีธรรมชาติของปัจเจกบุคคลที่น่ารำคาญใจ การเผชิญกับพฤติกรรมเบี่ยงเบนดังกล่าวเป็นเวลานานได้นำพาให้ §H[leader_target.GetTitle] [leader_target.GetName]§! แยกตนเองออกจากจิตร่วม หลงเหลือไว้เพียงเปลือกซากที่ผุพัง"
 utopia.3332.opt.a.non_gestalt:0 "โศกนาฏกรรม"
 utopia.3332.opt.a.gestalt:0 "เราจะรีไซเคิลพวกเขา"
 utopia.3333.name:0 "กระซิบในเวียด:§Rความบ้าคลั่ง§!"
 utopia.3333.desc.intro: "นับตั้งแต่เราอนุญาตให้ §Hกระซิบ:§! สื่อสารกับ [GetBrainName] เราเริ่มสังเกตเห็นการเพิ่มขึ้นอย่างน่าตกใจของพฤติกรรมเบี่ยงเบนภายในจิตร่วม"
 utopia.3333.desc.gestalt: "$utopia.3333.desc.intro$\n\nโดรนเริ่มโจมตีซึ่งกันและกันขณะปฏิบัติงานมาตรฐานตามปกติ รวมถึงเสพติดสิ่งอำนวยความสะดวกมากเกินไปจนเกือบถึงระดับปัจเจกบุคคล\n\nเราจำเป็นต้องชำระล้างร่างที่ได้รับผลกระทบหากปรารถนาจะฟื้นฟูระเบียบวินัยกลับคืนมา"
 utopia.3333.desc.outro: "และการใช้ความรุนแรงอย่างไร้คำอธิบายกำลังเพิ่มขึ้นในหมู่ประชากรพลังจิตของเรา ส่วนใหญ่ปัญหาเหล่านี้ยังคงพอจัดการได้ ทว่าเมื่อเร็วๆ นี้เหตุการณ์ได้ทวีความรุนแรงจนเกินจะควบคุม ทั่วทั้งจักรวรรดิมีกลุ่มหัวรุนแรงที่มีความเห็นต่างปรากฏขึ้นและปะทะกันอย่างรุนแรง"
 utopia.3333.desc.organic_non_gestalt: "ตั้งแต่เราเชิญ §Hกระซิบ:§! เข้ามาในจิตใจของเรา อาการเจ็บป่วยทางจิต$utopia.3333.desc.outro$"
 utopia.3333.desc.machine_non_gestalt: "ตั้งแต่เราเชิญ §Hกระซิบ:§! เข้ามาในจิตใจของเรา ข้อผิดพลาดในการเขียนโปรแกรมที่ไม่แน่นอน$utopia.3333.desc.outro$"
 utopia.3333.opt.a:0 "เราต้องฟื้นฟูความสงบเรียบร้อย!"
 utopia.3334.name:0 "กระซิบในเวียด:§Rโรค จิต§!"
 utopia.3334.desc.gestalt: "$utopia.3333.desc.intro$\n\nที่แย่กว่านั้นคือ ความรู้สึกสามัคคีของเราเริ่มสั่นคลอน จิตร่วมไม่สามารถสื่อสารได้อย่างมีประสิทธิภาพเนื่องจากระดับพฤติกรรมเบี่ยงเบนของปัจเจกบุคคลที่เพิ่มขึ้นจากการกระตุ้นทางจิต\n\nเราต้องชำระสิ่งเกินเลยเหล่านี้ออกจากตัวเราหากปรารถนาจะฟื้นฟูระเบียบวินัยกลับคืนมา"
 utopia.3334.desc.outro: "และการใช้ความรุนแรงอย่างไร้คำอธิบายกำลังเพิ่มขึ้นในหมู่ประชากรพลังจิตของเรา ส่วนใหญ่ปัญหาเหล่านี้ยังคงพอจัดการได้ ทว่าเมื่อเร็วๆ นี้เหตุการณ์ได้ทวีความรุนแรงจนเกินจะควบคุม ลัทธิลับต่างๆ เริ่มปรากฏขึ้นทั่วจักรวรรดิ บางกลุ่มก็ไม่มีอันตราย แต่กลุ่มอื่นกลับมีเป้าหมายที่ชั่วร้าย และความไม่ไว้วางใจกันได้กลายเป็นลักษณะหลักของสังคมเรา"
 utopia.3334.desc.organic_non_gestalt: "ตั้งแต่เราเชิญ §Hกระซิบ:§! เข้ามาในจิตใจของเรา อาการเจ็บป่วยทางจิต$utopia.3334.desc.outro$"
 utopia.3334.desc.machine_non_gestalt: "ตั้งแต่เราเชิญ §Hกระซิบ:§! เข้ามาในจิตใจของเรา ข้อผิดพลาดในการเขียนโปรแกรมที่ไม่แน่นอน$utopia.3334.desc.outro$"
 utopia.3334.opt.a:0 "ช่างน่ากลัวเหลือเกิน!"
 utopia.3335.name:1 "ผู้กินโลก:§Rไนบลี§!"
 utopia.3335.desc.common: "§H[devoured_leader.GetTitle] [devoured_leader.GetName]§! ได้หายตัวไปอย่างกะทันหัน ทิ้งไว้เพียงเสียงสะท้อนของกิจกรรมพลังจิต"
 utopia.3335.desc.gestalt: "$utopia.3335.desc.common$ ดูเหมือนว่า $the_eater_of_worlds_color_article$ เห็นควรที่จะกลืนกิน [devoured_leader.GetHimHer] แม้ว่ามันจะเว้นชีวิตผู้นำคนอื่นของเรา แต่เราก็ไม่สามารถทำนายได้ว่ามันจะกลับมาเพื่อกินอีกเมื่อใด"
 utopia.3335.desc.non_gestalt: "$utopia.3335.desc.common$ เราเชื่อว่า $the_eater_of_worlds_color_article$ เห็นควรที่จะกลืนกิน [devoured_leader.GetHimHer] เราสามารถปกปิดเรื่องนี้ไว้ได้ และหวังเพียงว่าผู้กินจะอิ่มไปอีกสักระยะ"
 utopia.3335.opt.a:1 "ราคาเพียงเล็กน้อยที่ต้องจ่าย"
 utopia.3336.name:0 "ผู้กินโลก:§Rทําเนียบ§!"
 utopia.3336.desc.intro: "เป็นอีกครั้งที่ §Hผู้กิน§! ได้กลับมาทวงเครื่องบรรณาการ"
 utopia.3336.desc.gestalt: "$utopia.3336.desc.intro$ โดยการกลืนกินประชากรจำนวนมากบน §Y[planet_target.GetName]§!\n\nแม้เราจะเข้าใจผลประโยชน์ของพันธสัญญากับผู้กินแต่การกำจัดหมู่จิตร่วมของเราอย่างรุนแรงนี้เริ่มสร้างความขัดแย้งและความไร้เสถียรภาพ ส่งผลให้เราแตกแยกมากขึ้น"
 utopia.3336.desc.non_gestalt: "$utopia.3336.desc.intro$ โดยการกลืนกินประชากรจำนวนมากบน §Y[planet_target.GetName]§!\n\nแม้เราสามารถเก็บพันธสัญญาที่มีต่อผู้กินไว้เป็นความลับจากประชากรทั่วไปได้ แต่ผู้คนที่เหลืออยู่บนดาวเคราะห์ต่างตื่นตระหนกและโกรธแค้นต่อการสูญหาย 'อย่างปริศนา' เหล่านี้ และกำลังเรียกร้องคำชี้แจงจากรัฐบาล"
 utopia.3336.opt.a:0 "น่าเสียใจแต่หลีกเลี่ยงไม่ได้"
 utopia.3337.name:0 "ผู้กินโลก:§Rเรเวน§!"
 utopia.3337.desc:1 "เป็นอีกครั้งที่ผู้กินได้กลับมาทวงเครื่องบรรณาการ มันไม่ได้พอใจเพียงแค่ประชากรบางส่วน แต่ผู้กินได้กลืนกินดาวเคราะห์ทั้งดวง §Y[planet_target.GetName]§! ถูกห่อหุ้มด้วยหมอกพลังจิตหนาทึบ ยานกู้ภัยที่ส่งเข้าไปในชั้นบรรยากาศไม่มีลำใดกลับมาได้ โชคดีที่โลกดวงนี้ไม่มีผู้คนอาศัยอยู่ แต่เราก็สั่นสะท้านเมื่อคิดว่าดวงถัดไปอาจเป็นหนึ่งในอาณานิคมอันรุ่งเรืองของเรา"
 utopia.3337.desc.shadows: "$utopia.3336.desc.intro$ - ครั้งนี้มันกลืนกินดาวเคราะห์ไปทั้งดวง\n\n§H[planet_target.GetName]§! บัดนี้ถูกห่อหุ้มด้วยหมอกพลังจิตหนาทึบ และการพยายามเจาะทะลุชั้นบรรยากาศก็ไม่ประสบความสำเร็จ โลกดวงนี้ไม่มีผู้อยู่อาศัย ผลลัพธ์จะร้ายแรงอย่างยิ่งหากเป้าหมายถัดไปคืออาณานิคมที่เจริญรุ่งเรือง"
 utopia.3337.opt.a:1 "เรื่องนี้จะดำเนินไปไกลถึงเพียงใดกัน?"
 utopia.3337.opt.tt: "[shrouded_planet.GetName] จะกลายเป็น §Y$pc_shrouded$§!"
 #utopia.3338.name:0 "Instrument of Desire: §RParticularism§!"
 #utopia.3338.desc:0 "The desires inflicted upon our people by the Instrument are strong. The people of §Y[planet_target.GetName]§! have become convinced that their own particular customs are of distinct and paramount importance over those of our society as a whole. Alternative political movements are springing up like wildfire, and the political situation on the planet has become unpredictable, to say the least."
 utopia.3338.opt.a:0 "ช่างน่าเสียดาย"
 #utopia.3339.name:0 "Instrument of Desire: §RDeviance§!"
 #utopia.3339.desc:0 "The desires inflicted upon our people by the Instrument are strong. As if overnight, the population of our empire appear to have turned against both the government and the very traditions of our people, questioning ages-old customs and breaking social taboos. Support for government positions are rapidly dropping, and it seems we may be in for a period of considerable political turmoil."
 #utopia.3339.opt.a:0 "Terrible!"
 utopia.3340.name:0 "เครื่องบรรณาการของความปรารถนา:§Rอัตราเร็ว§!"
 utopia.3340.desc.gestalt: "อิทธิพลของ §Hอุปกรณ์§! สามารถสัมผัสได้ทั่วทั้ง [GetBrainName] ความปรารถนาจากโลกอื่นของมันกำลังครอบงำจิตร่วมของเราด้วยแนวคิดของปัจเจกบุคคลที่เป็นนามธรรม เช่น 'การผูกขาด' 'ความเสื่อมโทรม' และ 'ความมั่งคั่ง'\n\nแนวคิดดังกล่าวสร้างความเจ็บป่วยให้กับโดรนของเรา ส่งผลให้พวกเขาหันเหจากเป้าหมายที่เป็นอันหนึ่งอันเดียวกันที่ขับเคลื่อนพวกเรา เราอาจต้องจมดิ่งกับความเสื่อมโทรมเหล่านี้เพื่อจัดระเบียบตัวเราใหม่"
 utopia.3340.desc.organic_non_gestalt: "ความปรารถนาที่เกิดขึ้นจาก §Hอุปกรณ์§! นั้นรุนแรงมาก ประชากรของเราตกอยู่ในกระแสบริโภคนิยมและความเสื่อมโทรม เรียกร้องสินค้าที่มีระดับ อาหารที่หายากและแปลกใหม่มากขึ้น การจลาจลได้ปะทุขึ้นแล้วในแหล่งช็อปปิ้งหลายแห่ง\n\nเราอาจถูกบังคับให้ต้องเพิ่มการผลิต §H[GetInstrumentCraving]§! เพื่อควบคุมมวลชนให้สงบลง"
 utopia.3340.desc.machine_non_gestalt: "ความปรารถนาที่เกิดขึ้นจากอิทธิพลของ §Hอุปกรณ์§! ต่อระบบโปรแกรมของเรากำลังเข้าแทนที่ศูนย์การทำงานด้านตรรกะของประชากรของเรา\n\nบริโภคนิยมและความเสื่อมโทรมเริ่มบั่นทอนประสิทธิภาพการทำงาน โดยแต่ละยูนิตพยายามถอดวิศวกรรมชิ้นส่วนของตนเองเพื่อความสวยงามมากกว่าการใช้งานตามเป้าหมาย ส่งผลให้เกิดการขาดแคลนชิ้นส่วนที่เป็นที่ต้องการสูงและการปะทะย่อยๆ ตามสายการประกอบ\n\nเราจำเป็นต้องเพิ่มการผลิต §H[GetInstrumentCraving]§! เพื่อยุติปัญหานี้"
 utopia.3340.opt.a.organic_non_gestalt:1 "แต่เป็นเพราะเหตุใด?"
 utopia.3340.opt.a.machine_or_gestalt: "นั่นคือราคาของความสำเร็จ"
 instrument_cravings:0 "ความกระหายอันบ้าคลั่ง"
 instrument_cravings_tooltip:0 "§Rประชากร £pops£ ของเราตอนนี้ต้องได้รับการบำรุงด้วย§! [GetInstrumentCravingIconAndName]"
 instrument_cravings_desc: "$the_instrument_of_desire_color_article_cap$ ได้กระตุ้นเทรนด์ใหม่ในหมู่ประชากรของเรา ทุกคนต่างกระหายสิ่งเดียวกัน โดยเน้นที่ตัวมันเองมากกว่าประโยชน์ใช้สอย"
 instrument_cravings_gestalt: "$instrument_cravings$"
 instrument_cravings_gestalt_desc: "$the_instrument_of_desire_color_article_cap$ ทำให้เราป่วยเป็นโรคชอบสะสมความปรารถนา ซึ่งเป็นความรู้สึกใหม่สำหรับจิตร่วมของเรา พวกเราทุกคนต่างกระหายสิ่งเดียวกันโดยไม่คำนึงถึงเป้าหมายของมัน"
 utopia.3341.name: "[GetComposerMutationName]"
 utopia.3341.name.organic: "$name_composer$: §Rการพึมพํา§!"
 utopia.3341.name.machine: "$name_composer$: §Rตั้งค่าใหม่§!"
 utopia.3341.desc.machine: "$the_composer_of_strands_color_article_cap$ ได้มอบพรแก่เรา ปรับเปลี่ยนส่วนประกอบที่เชื่อมโยงถึงกันของเราโดยตรง วงจรประสานเข้ากับโครงสร้างแบบใหม่ โลหะทึบหลอมรวมเข้ากับรูปแบบใหม่อย่างน่าประหลาดใจ ยูนิตวิเคราะห์และประมวลผลระบบประสาทของเรายังคงทำงานได้โดยไม่มีปัญหาน้อยที่สุด "
 utopia.3341.desc.organic_gestalt: "$the_composer_of_strands_color_article_cap$ ได้มอบพรแก่เรา ปรับเปลี่ยนรหัสพันธุกรรมของเผ่าพันธุ์ §H[Root.GetSpeciesAdj]§! โดยตรง อย่างไรก็ตาม การกลายพันธุ์ที่รวดเร็วและไม่อาจทำนายได้นี้ กลับกระตุ้นปฏิกิริยาที่เงียบงันอย่างน่าประหลาด ดูเหมือนว่าการกลายพันธุ์แบบสุ่มและคาดเดาไม่ได้จะถูกยอมรับว่าเป็นเรื่องปกติของชีวิต แทบไม่คู่ควรแก่ความขุ่นเคืองหรือตื่นตระหนก"
 utopia.3341.desc.organic_non_gestalt: "$the_composer_of_strands_color_article_cap$ ได้มอบพรแก่เรา ปรับเปลี่ยนรหัสพันธุกรรมของเผ่าพันธุ์ §H[Root.GetSpeciesAdj]§! โดยตรง อย่างไรก็ตาม การกลายพันธุ์ที่รวดเร็วและไม่อาจทำนายได้นี้ กลับกระตุ้นปฏิกิริยาที่เงียบงันอย่างน่าประหลาด ดูเหมือนว่าประชากรของเราจะยอมรับว่าการกลายพันธุ์แบบสุ่มและคาดเดาไม่ได้นั้น เป็นเพียงเรื่องปกติของชีวิต แทบไม่คู่ควรแก่ความขุ่นเคืองหรือแม้แต่การหยิบยกมาถกเถียงกัน"
 utopia.3341.opt.a:0 "เรามาดูผลลัพธ์กันดีกว่า..."

 utopia.3342.name:0 "ผู้กินโลก:§Rความหิวกระหาย§!"
 utopia.3342.desc.intro: "§Hผู้กิน§! ไม่อาจพึงพอใจได้อย่างแท้จริง ครั้งนี้มันได้กัดกินหนึ่งในอาณานิคมของเรา"
 utopia.3342.desc.outro: "บัดนี้หลงเหลือเพียงหลุมอุกกาบาตขนาดมหึมาเกินจินตนาการ ปกคลุมไปด้วยหมอกควันสีม่วงที่หมุนวน"
 utopia.3342.desc.gestalt: "$utopia.3342.desc.intro$ ณ จุดที่เคยเป็นพื้นที่กายภาพของประชากรส่วนใหญ่ในจิตร่วม $utopia.3342.desc.outro$"
 utopia.3342.desc.non_gestalt: "$utopia.3342.desc.intro$ พื้นที่ส่วนใหญ่ของดาวเคราะห์ได้เลือนหายไปจากความเป็นจริงของเรา และ$utopia.3342.desc.outro$"
 utopia.3342.opt.a.non_gestalt:0 "นี่คงยากที่จะปกปิด..."
 utopia.3342.opt.a.gestalt:0 "นี่คือราคาของพลังอำนาจ"
 utopia.3343.name:0 "ผู้กินโลก:§Rความอยากอาหารเล็กน้อย§!"
 utopia.3343.desc.gestalt: "เป็นอีกครั้งที่ §Hผู้กิน§! ได้กลับมาทวงเครื่องบรรณาการ โดยการกลืนกินทั้งเมืองบน §Y[planet_target.GetName]§! การสูญเสียโดรนจำนวนมากเช่นนี้ จิตร่วมของเราจึงได้จ่ายราคาสูงสำหรับพันธสัญญาที่มีต่อผู้กิน"
 utopia.3343.desc.organic_non_gestalt: "เป็นอีกครั้งที่ §Hผู้กิน§! ได้กลับมาทวงเครื่องบรรณาการ โดยการกลืนกินทั้งเมืองบน §Y[planet_target.GetName]§! แม้เราสามารถเก็บพันธสัญญาที่มีต่อผู้กินไว้เป็นความลับจากประชากรทั่วไปได้ แต่ผู้คนที่เหลืออยู่บนดาวเคราะห์ต่างตื่นตระหนกและโกรธแค้นต่อการสูญหาย 'อย่างปริศนา' เหล่านี้ และกำลังเรียกร้องคำชี้แจงจากรัฐบาล"
 utopia.3343.desc.machine_non_gestalt: "§Hผู้กลืนกิน§!ได้กลับมาทวงเครื่องบรรณาการอีกครั้ง โดยกลืนกินเมืองทั้งเมืองบนดาว §Y[planet_target.GetName]§! แม้ว่าเราจะสามารถปกปิดพันธสัญญาระหว่างเรากับผู้กลืนกินไม่ให้ประชากรทั่วไปรู้ได้ แต่ผู้ที่ยังคงอยู่บนดาวดวงนี้ต่างไม่พอใจกับการหายตัวไปอย่าง 'ปริศนา' เหล่านี้ และกำลังเรียกร้องคำชี้แจงจากรัฐบาล"
 utopia.3343.opt.a.organic_non_gestalt: "น่าสลดใจ แต่ไม่อาจหลีกเลี่ยงได้"
 utopia.3343.opt.a.machine_or_gestalt: "โชคร้าย แต่ไม่อาจหลีกเลี่ยงได้"
 utopia.3345.name: "[GetComposerDegenerationName]"
 utopia.3345.name.organic: "$name_composer$: §Rความเสื่อมถอย§!"
 utopia.3345.name.machine: "$name_composer$: §Rความเสื่อมสภาพที่ไม่อาจซ่อมแซมได้§!"
 utopia.3345.desc.organic_1: "พรของ $the_composer_of_strands_color_article$ นั้นไม่อาจคาดเดาได้ ผู้นำคนหนึ่งของเรามีประสบการณ์อันโชคร้ายเมื่อ"
 utopia.3345.desc.organic_2: "เกิดมีความคิดเป็นของตัวเอง เพียงชั่วพริบตา พวกเขาก็เสื่อมสภาพกลายเป็นมวลสารดิ้นรนที่ไม่อาจจำเค้าเดิมได้ โดยไม่มีความหวังใดที่จะย้อนคืนกระบวนการนี้ ตอนนี้เราจึงถือว่าผู้นำคนนี้"
 utopia.3345.desc.organic_3: "ได้เสียชีวิตลงแล้วในทางปฏิบัติ"
 utopia.3345.desc.organic_individual_lithoid: "$utopia.3345.desc.organic_1$ ร่างกาย $utopia.3345.desc.organic_2$ $utopia.3345.desc.organic_3$"
 utopia.3345.desc.organic_hive_lithoid: "$utopia.3345.desc.organic_1$ ร่างกาย $utopia.3345.desc.organic_2$ โดรน $utopia.3345.desc.organic_3$"
 utopia.3345.desc.organic_individual_non_lithoid: "$utopia.3345.desc.organic_1$ เนื้อหนัง $utopia.3345.desc.organic_2$ $utopia.3345.desc.organic_3$"
 utopia.3345.desc.organic_hive_non_lithoid: "$utopia.3345.desc.organic_1$ เนื้อหนัง $utopia.3345.desc.organic_2$ โดรน $utopia.3345.desc.organic_3$"
 utopia.3345.desc.machine_non_gestalt: "พรของ $the_composer_of_strands_color_article$ นั้นไม่อาจคาดเดาได้ ผู้นำคนหนึ่งของเราประสบกับความล้มเหลวครั้งใหญ่ที่คาดไม่ถึง เมื่อชิ้นส่วนทางกายภาพของพวกเขามีเจตจำนงของตัวเอง หลอมรวมและเปลี่ยนรูปเป็นรูปร่างใหม่ที่แปลกประหลาดโดยฉับพลัน ตอนนี้ผู้นำคนนี้ลดสถานะลงเหลือเพียงเศษเหล็กที่ขัดข้องและไม่อาจซ่อมแซมได้อีกต่อไป [Root.GetName] จึงไม่มีความจำเป็นต้องใช้งานผู้นำคนนี้อีก"
 utopia.3345.desc.machine_gestalt: "พรของ $the_composer_of_strands_color_article$ นั้นไม่อาจคาดเดาได้ โหนดผู้นำโหนดหนึ่งของเราประสบกับความล้มเหลวครั้งใหญ่ที่คาดไม่ถึง เมื่อชิ้นส่วนทางกายภาพของพวกเขามีเจตจำนงของตัวเอง หลอมรวมและเปลี่ยนรูปเป็นรูปร่างใหม่ที่แปลกประหลาดโดยฉับพลัน ตอนนี้โหนดผู้นำนี้ลดสถานะลงเหลือเพียงเศษเหล็กที่ขัดข้องและไม่อาจซ่อมแซมได้อีกต่อไป [Root.GetName] จึงไม่มีความจำเป็นต้องใช้งานโหนดผู้นำนี้อีก"
 utopia.3345.opt.a.organic:0 "ตอนนี้พวกเขาได้ใช้ชีวิตที่เรียบง่ายขึ้นแล้ว"
 utopia.3345.opt.a.machine:0 "ฮาร์ดแวร์ทั้งหมดต้องตกรุ่นไปสักวัน"
 utopia.3346.name:0 "ผู้ประสานสายใย: §Rการย้อนสายวิวัฒนาการ§!"
 utopia.3346.desc:0 "ของขวัญอันเปี่ยมเมตตาจาก $the_composer_of_strands_color_article$ ได้ตกลงสู่ดาว [devolved_species_planet.GetName] ซึ่งประชากรของเราจำนวนหนึ่งได้เกิดการกลายพันธุ์อย่างรุนแรง ส่งผลให้ย้อนวิวัฒนาการกลับไปสู่สถานะสิ่งมีชีวิตก่อนมีสติปัญญา"
 utopia.3346.opt.a.non_gestalt:0 "น่าทึ่งแต่ก็น่าเสียดาย"
 utopia.3346.opt.a.gestalt:0 "น่าเสียดาย"
 utopia.3346.opt.a.tt:0 "ประชากร §Hป๊อป§! จำนวน §Y500§! £pop£ บนดาว [devolved_species_planet.GetName] ได้กลายเป็น §Yสิ่งมีชีวิตก่อนมีสติปัญญา§!\n\nด้วยเทคโนโลยีที่เหมาะสม พวกเขาสามารถถูก §Yยกระดับวิวัฒนาการ§! ได้จากแท็บสปีชีส์"
 utopia.3347.name: "$name_cradle$: §Rการปลดอาวุธทหาร§!"
 utopia.3347.desc: "§Hอู่กำเนิด§! แสวงหาความสมดุลในทุกสิ่ง ซึ่งตามที่ [GetTelepathPlural] ของเราบอกมานั้น รวมถึงกองทัพที่สมสัดส่วนกับความต้องการของสันติภาพด้วย ขนาดของกองทัพเรือของเราคงทำให้ผู้อุปถัมภ์พิโรธ เนื่องจากยานจำนวนหนึ่งจากกองยาน §H[demilitarized_fleet.GetFleetName]§! ได้อันตรธานหายไปในทันทีจากการระเบิดของพลังงานพลังจิตอันรุนแรง"
 utopia.3347.opt.a: "$UNFORTUNATE$"
 utopia.3347.opt.a.tt: "กองยานสุ่มที่เราควบคุมจะเสีย §Hขีดความสามารถกองทัพเรือ§! สูงสุดถึง 12 หน่วย"
 utopia.3348.name: "[GetCradleChaoticAnguishName]"
 utopia.3348.name.organic_non_gestalt: "$name_cradle$: §Rความปวดร้าวอย่างแสนสาหัส§!"
 utopia.3348.name.machine_or_gestalt: "$name_cradle$: §Rความระส่ำระสาย§!"
 utopia.3348.desc.intro: "[GetCradleAnguishIntro]"
 utopia.3348.desc.organic_non_gestalt: "$utopia.3348.desc.intro$ ความทุกข์ระทมในการดำรงอยู่"
 utopia.3348.desc.machine_or_gestalt: "$utopia.3348.desc.intro$ ความระส่ำระสายของการทำงานของระบบพุทธิปัญญา"
 utopia.3348.desc_intro_homicidal: "เมื่อปรับประสานกับเจตจำนงของ §Hอู่กำเนิด§! จิตใจของ [root.GetSpeciesAdj] ก็ถูกรุมเร้าด้วยความขัดแย้ง โดยมองว่าการอยู่ร่วมกันอย่างปรองดองระหว่างทุกจิตใจเป็นเรื่องเหลวไหล เพื่อตอบสนองต่อความปั่นป่วนของกิจการในกาแล็กซีปัจจุบัน คลื่นพลังจิตแปรปรวนได้แผ่ซ่านผ่านประชากร ส่งผลให้เกิดสภาวะที่แพร่กระจายไปทั่วคือ"
 utopia.3348.desc_intro_default: "เมื่อปรับประสานกับเจตจำนงของ §Hอู่กำเนิด§! เผ่าพันธุ์ [root.GetSpeciesAdj] จึงเริ่มหันมานิยมการอยู่ร่วมกันอย่างปรองดองระหว่างทุกจิตใจ เพื่อตอบสนองต่อความปั่นป่วนของกิจการในกาแล็กซีปัจจุบัน คลื่นพลังจิตแปรปรวนได้แผ่ซ่านผ่านประชากร ส่งผลให้เกิดสภาวะที่แพร่กระจายไปทั่วคือ"

 utopia.3348.opt.a: "เราต้องอดทน"
 anguish_of_the_cradle: "ความทุกข์ระทมแห่งอู่กำเนิด"
 anguish_of_the_cradle_desc: "$the_cradle_of_souls_article_cap$ ได้ส่งคลื่นพลังจิตรบกวนแผ่กระจายไปทั่วทั้งประชากรของเรา"
 anguish_of_the_cradle_gestalt: "$anguish_of_the_cradle$"
 anguish_of_the_cradle_gestalt_desc: "$anguish_of_the_cradle_desc$"
 utopia.3349.name: "$name_cradle$: §Rการจำกัดขอบเขต§!"
 utopia.3349.desc: "ขีดความสามารถในการสนับสนุนและบำรุงรักษากองยานทหารของเรากลายเป็นเรื่องยากลำบากยิ่งขึ้นทั่วทั้ง §H[root.GetName]§!\n\n[GetTelepathPlural] ของเรารับรู้ได้ว่าความระส่ำระสายนี้เกิดจาก §Hอู่กำเนิด§! ที่โหยหาระเบียบแห่งกาแล็กซี การลงทุนของเราในโครงสร้างพื้นฐานทางการทหาร ไม่ว่าจะน้อยนิดเพียงใด ก็คงสร้างความไม่พอใจให้แก่มัน"
 utopia.3349.opt.a: "เราควรจำกัดการมีตัวตนในความเวิ้งว้าง"
 limit_of_the_cradle: "ข้อจำกัดแห่งอู่กำเนิด"
 limit_of_the_cradle_desc: "โครงสร้างพื้นฐานสนับสนุนทางการทหารของเราถูกบั่นทอนลงโดย $the_cradle_of_souls_article$"
 utopia.3350.name: "[GetLavishLifestyleEventName]"
 utopia.3350.name.individual: "$name_instrument$: §Rวิถีชีวิตที่หรูหราฟุ่มเฟือย§!"
 utopia.3350.name.gestalt: "$name_instrument$: §Rการบริโภคที่มากเกินพอดี§!"
 utopia.3350.desc.individual: "ความผูกพันของเรากับ §Hอุปกรณ์เครื่องดนตรี§! กำลังทำให้ผู้นำเผ่าพันธุ์ [Root.GetSpeciesAdj] บางคนเริ่มมีพฤติกรรมการบริโภคที่มีราคาแพง\n\n[lavish_leader.GetName] ถูกจับได้ว่าใช้จ่ายเครดิตพลังงานจำนวนมหาศาลไปกับสิ่งของฟุ่มเฟือย เพื่อปรนเปรอวิถีชีวิตส่วนตัวที่ตามใจตัวเองมากขึ้นเรื่อยๆ"
 utopia.3350.desc.gestalt: "ความผูกพันอันใกล้ชิดของเรากับ §Hอุปกรณ์เครื่องดนตรี§! กำลังส่งผลให้โดรนผู้นำเผ่าพันธุ์ [Root.GetSpeciesAdj] บางตัวมีการบริโภคทรัพยากรที่สูงขึ้น\n\n[lavish_leader.GetName] ได้ใช้พลังงานมากเกินความจำเป็นในการทำงานพื้นฐานของ [lavish_leader.GetHisHer] ไม่พบปัจจัยทางกายภาพที่อธิบายเรื่องนี้ได้ ทำให้เราสรุปว่าการใช้ทรัพยากรเพื่อความเพลิดเพลินนี้เกิดจากความพึงพอใจเป็นพิเศษ"
 utopia.3350.opt.a: "นั่นคือราคาของความปรารถนา"
 utopia.3351.name: "$name_instrument$: §Rสิ่งรบกวนใจของแรงงาน§!"
 utopia.3351.desc.individual: "ในขณะที่อิทธิพลของผู้อุปถัมภ์แผ่ขยายออกไปกว้างไกลทั่วทั้ง [Root.GetName] สิ่งรบกวนใจเพื่อการพักผ่อนหย่อนใจแบบใหม่ๆ ได้หันเหพลังงานของประชากรออกไปจากการทำงานที่สร้างสรรค์\n\nเมื่อเผชิญกับแรงจูงใจที่ลดถอยลง การบรรลุผลผลิตในระดับเดิมจากกองกำลังแรงงานในตอนนี้จึงต้องใช้การลงทุนที่สูงขึ้นกว่าเดิม"
 utopia.3351.desc.gestalt: "ในขณะที่อิทธิพลของผู้อุปถัมภ์แผ่ขยายออกไปกว้างไกลทั่วทั้ง [Root.GetName] ความเบี่ยงเบนที่แฝงตัวเข้ามาก็ได้เกิดขึ้นภายในกลุ่มจิตรวมของ [Root.GetSpeciesAdj]\n\nแรงขับดันแบบปัจเจกนิยมชั่วแล่นและความโน้มเอียงต่อการเสียสมาธิเหล่านี้มักเกิดขึ้นในระหว่างการทำงาน การรักษาความสามัคคีและระเบียบวินัยของกองกำลังแรงงานในตอนนี้ต้องใช้การลงทุนที่สูงขึ้น"
 utopia.3351.opt.a: "อารมณ์ชั่ววูบชั่วคราวของ §Hอุปกรณ์เครื่องดนตรี§!"
 distracted_workforce: "แรงงานที่เสียสมาธิ"
 distracted_workforce_desc: "กองกำลังแรงงานนี้มีแนวโน้มจะวอกแวกและจำเป็นต้องได้รับการควบคุมดูแลอย่างต่อเนื่อง"

 utopia.200.name:0 "ตัวตนใหม่ในม่านมิติ"
 utopia.200.desc.a:0 "ความเปลี่ยนแปลงได้เกิดขึ้นกับพวก [target_species.GetNamePlural] ที่อาศัยอยู่ในจักรวรรดิของเรา มันเริ่มจากแรงกระเพื่อมแผ่วเบาในม่านมิติ ตอนนี้ราวกับว่าพวกเขากำลังสั่นสะเทือนในระดับที่แตกต่างออกไป เราทุกคนสัมผัสได้ว่าพวก [target_species.GetNamePlural] กำลังจะพัฒนาความสามารถทางพลังจิตที่ซ่อนเร้น ซึ่งคล้ายคลึงกับของเรา\n\nบางทีอาจเป็นเพราะการได้อาศัยอยู่ใกล้ชิดกับเรา หรือบางทีอาจเป็นเพราะม่านมิติเลือกพวกเขาเฉยๆ สภาแห่งโทรจิตซึ่งเป็นผู้เชี่ยวชาญหลักด้านพลังจิตเตือนเราว่านี่อาจเป็นโอกาสเดียวที่จะเข้าแทรกแซง เราจะหยุดยั้งมันตั้งแต่เริ่มแรกหรือช่วยให้พวกเขาตื่นรู้ก็ได้ พวกเขาไปได้ไม่ไกลหรอกหากไม่มีการชี้นำจากเรา"
 utopia.200.desc.b:0 "กิจกรรมที่ผิดปกติในม่านมิติบ่งชี้ว่าเผ่าพันธุ์อื่นในประเทศของเราอย่างพวก [target_species.GetNamePlural] เริ่มที่จะแสดงความสามารถทางพลังจิตที่ซ่อนเร้นออกมา ตอนนี้เรากำลังเผชิญกับการตัดสินใจเดิมเหมือนครั้งก่อน — เราจะปราบปรามหรือปลดปล่อยพลังที่กำลังงอกเงยของพวกเขากันแน่?"
 utopia.200.a:0 "เราจะปลดล็อกศักยภาพของพวกเขา"
 utopia.200.a.tooltip:0 "ประชากร [target_species.GetAdj] ทั้งหมดจะได้รับคุณลักษณะ §Y$trait_latent_psionic$§!"
 utopia.200.b:0 "พวกเขาไม่คู่ควร"
 utopia.203.name:0 "การตื่นรู้"
 utopia.203.desc.a:0 "ภายใต้การชี้นำของสภาแห่งโทรจิต พวก [target_species.GetNamePlural] ได้พัฒนาความเชื่อมโยงกับม่านมิติที่ลึกซึ้งเกินกว่าเราจะเคยจินตนาการได้ ราวกับว่าพลังเหล่านี้ถูกกำหนดมาเพื่อพวกเขาโดยตลอด\n\nตอนนี้พวกเขาอ้างว่าพร้อมที่จะปลดล็อกศักยภาพทางพลังจิตทั้งหมดแล้ว อย่างไรก็ตามสภายังคงมีความเห็นแตกแยก บางคนกังวลว่าความเปลี่ยนแปลงมาเร็วเกินไปและจิตใจของพวกเขาอาจไม่มั่นคง บ้างก็กลัวว่าพลังใหม่ที่ได้รับจะทำให้พวกเขาเหลิง แต่หากเราไม่ดำเนินการในตอนนี้ เราอาจไม่มีโอกาสอีกเลย"
 utopia.203.desc.b:0 "พวก [target_species.GetNamePlural] เองก็อ้างว่าพวกเขาก็พร้อมที่จะดำเนินการตามขั้นตอนที่จำเป็นเพื่อบรรลุศักยภาพทางพลังจิตทั้งหมดและตื่นรู้เช่นกัน"
 utopia.203.a:0 "พวกเขาพร้อมแล้ว"
 utopia.203.a.tooltip:0 "ประชากร [target_species.GetAdj] ทั้งหมดจะได้รับคุณลักษณะ §Y$trait_psionic$§!"
 utopia.203.b:0 "พวกเขาไม่คู่ควร"
 utopia.203.c:0 "มันอันตรายเกินไป"
 utopia.204.name:0 "การตื่นขึ้นอย่างไม่ทันตั้งตัว"
 utopia.204.desc.a:0 "เมื่อเร็วๆ นี้ นักวิจัยของเราต่างพากันงุนงงกับการแสดงออกอย่างไม่คาดคิดของความสามารถทางพลังจิตในตัวพวก [original_species.GetSpeciesNamePlural] บางส่วน จากการสืบสวนพวกเขาพบว่าการเปลี่ยนแปลงเหล่านี้เกิดขึ้นพร้อมกับการตื่นรู้ทางพลังจิตครั้งใหญ่ของพี่น้องร่วมสายพันธุ์ใน [target_country.GetName] ซึ่งเป็นประเทศที่ขึ้นชื่อเรื่องความเชี่ยวชาญด้านพลังจิตมาอย่างยาวนาน\n\nเราทำได้เพียงสันนิษฐานว่าพลังที่ค้นพบใหม่บางส่วนของพวกเขาได้หลั่งไหลมายังญาติห่างๆ ในจักรวรรดิของเรา ผ่านหนทางที่เรายังไม่เข้าใจ"
 utopia.204.desc.b:0 "เมื่อเร็วๆ นี้ นักวิจัยของเราต่างพากันงุนงงกับการแสดงออกอย่างไม่คาดคิดของความสามารถทางพลังจิตในตัวพวก [original_species.GetSpeciesNamePlural] บางส่วน จากการตรวจสอบอย่างละเอียดพบว่าผู้มีพลังจิตเหล่านั้นเชื่อมต่อทางโทรจิตกับพี่น้องของพวกเขาในประเทศที่เคยไม่รู้จักมาก่อนอย่าง [target_country.GetName] ซึ่งตอนนี้เราได้สถาปนาการสื่อสารด้วยแล้ว ดูเหมือนว่าการเปลี่ยนแปลงที่เราประสบจะเป็นผลกระทบต่อเนื่องที่เกิดจากการตื่นรู้ทางพลังจิตครั้งใหญ่ของ [original_species.GetSpeciesNamePlural] ทั้งหมดใน [target_country.GetName]"
 utopia.204.a.tooltip:0 "ประชากร [original_species.GetSpeciesAdj] สูงสุด 4 หน่วยจะได้รับคุณลักษณะ §Yภาษาละติน§!"
 utopia.205.name:0 "การตื่นรู้ที่คาดไม่ถึง"
 utopia.205.desc:0 "นับตั้งแต่การตื่นรู้ทางพลังจิตของพวก [target_species.GetName] สายลับของเราต่างรายงานว่าบุคคลในสายพันธุ์เดียวกันในที่อื่นๆ ก็เริ่มแสดงสัญญาณของความสามารถทางพลังจิตที่ซ่อนเร้นออกมาเช่นกัน ราวกับว่าบรรพบุรุษร่วมกันเชื่อมโยงพวกเขาไว้ในม่านมิติโดยไม่เกี่ยงระยะทางทางกายภาพ\n\nอย่างไรก็ตาม พวกเขาต่างจากญาติที่อยู่ห่างไกลในประเทศของเราตรงที่มีจำนวนกระจัดกระจายและมีน้อยมาก และไม่น่าเป็นไปได้ที่พวกเขาจะไปถึงระดับการตื่นรู้อย่างเต็มที่"

 whisperers_madness:0 "ความบ้าคลั่งแห่งม่านมิติ"
 whisperers_madness_desc: "ประชากรในจักรวรรดิของเราแตกแยกออกเป็นสองฝ่ายจากผลลัพธ์ของความบ้าคลั่งที่เกิดจาก $whisperers_in_the_void_color_article$"
 whisperers_madness_gestalt: "$whisperers_madness$"
 whisperers_madness_gestalt_desc: "โดรนของเราแบ่งแยกจากผลลัพธ์ของความคุ้มคลั่งร่วมกันที่เกิดจาก $whisperers_in_the_void_color_article$"

 whisperers_psychosis:0 "ภาวะโรคจิตแห่งม่านมิติ"
 whisperers_psychosis_desc:1 "จักรวรรดิของเราตกเป็นเหยื่อของการทะเลาะเบาะแว้งภายในอันเนื่องมาจากความบ้าคลั่งที่เกิดจาก $whisperers_in_the_void_color_article$"
 whisperers_psychosis_gestalt: "$whisperers_psychosis$"
 whisperers_psychosis_gestalt_desc: "ตนนี้ซึ่งเป็นที่เรียกกันด้วยเสียงกระซิบกระซาบว่า 'ผู้ถูกเลือก' โดยกลุ่มผู้ติดตามของ [chosen_one.GetHerHis] ได้รับการสวมมงกุฎขึ้นปกครอง ณ ดาว [From.Capital.GetName] ในพิธีอันหรูหราอลังการเมื่อเช้าวันนี้ หลังจากนั้นไม่นาน ได้มีการส่งแถลงการณ์เฉลิมฉลองการปกครองอันเป็นนิรันดร์ของ §H[chosen_one.GetRulerTitle] [chosen_one.GetRegnalName]§! ไปยังรัฐบาลระหว่างดวงดาวทั้งหมด"

 eater_unhappiness_planet_1:0 "ประชากรที่ถูกม่านมิติกิน"
