 # Menacing Actions - Supremacy
 menacing_actions_supremacy_enslave_species_title:0 "จับทั้งเผ่าพันธุ์เป็นทาส"
 menacing_actions_supremacy_enslave_species_desc:0 "การจับทั้งเผ่าพันธุ์เป็นทาสจะมอบ §H5§! £menace£ ค่าความอันตรายต่อปี"
