# Ascension Perk name
 ap_become_the_crisis:1 "กาแล็กติกเนเมซิส"
 ap_become_the_crisis_desc:1 "ผลงานที่ยิ่งใหญ่ล้วนแต่ต้องการความเสียสละ พวกอื่นๆในกาแล็กซีอาจไม่เข้าใจ แต่พวกเขาจะเชื่อฟังและปฏิบัติตาม"

 # Menace name
 menace_name:1 "ค่าความอันตราย:"

 # Crisis Path names
 crisis_path_destruction_name:0 "วิถีแห่งการทำลาย"
 crisis_path_destruction_desc:0 "ระเบียบคือสิ่งผิดธรรมชาติ แก่นแท้ที่แท้จริงของสสารนั้นอยู่ในสภาวะแห่งความโกลาหล\n\nเราไม่ได้กำลังทำลายจักรวาล - เรากำลังซ่อมแซมมัน"

 crisis_path_supremacy_name:0 "วิถีแห่งอำนาจสูงสุด"
 crisis_path_supremacy_desc:0 "สิทธิในการปกครองเป็นของผู้มีชัยชนะ เรากำลังอ้างสิทธินั้น และใครก็ตามก็มีอิสระที่จะลองพิสูจน์ว่าเราผิด"

 crisis_path_deception_name:0 "วิถีแห่งการหลอกลวง"
 crisis_path_deception_desc:0 "หากทุกคนกำลังจ้องมองพวกตัวตลกที่เต้นอยู่กลางเวที คุณก็ทำอะไรได้มากกว่านั้นมากในเงามืด"

