 ### menp_undertaker:0 "Undertaker"
 ### menp_undertaker_desc:0 "'Death' is such a strong word. We are merely returning their matter to its initial state."
 ### crisis_perks_destruction_undertaker_unlock:0 "Purge §Y50§! £pop£ Pops to unlock this $crisis_perk$."
 ### undertaker_passive:0 "Purging generates £menace£ Menace."
 ### undertaker_active:0 "Purging speed is greatly increased, and generates £alloy£ Alloys."
 ### menp_ship-chipper:0 "Ship-chipper"
 ### menp_ship-chipper_desc:0 "All these metal constructs moving about in orderly fashion... It needs to stop."
 ### crisis_perks_destruction_ship-chipper_unlock:0 "Destroy 100 ships in order to unlock this $crisis_perk$."
 ### menp_ship-chipper_passive:0 "Your fleets take -25% damage in combat."
 ### menp_ship-chipper_active:0 "Your fleets have +50% weapon damage."
 ### menp_death_from_above:0 "Death From Above"
 ### menp_death_from_above_desc:0 "No place to run, no place to hide. In fact, no 'place' at all."
 ### crisis_perks_destruction_death_from_above_unlock:0 "Destroy 10 buildings through bombardment to unlock this $crisis_perk$."
 ### menp_death_from_above_passive:0 "When bombarding, Planet Devastation is 20% faster."
 ### menp_death_from_above_active:0 "Unlocks Armageddon Bombardment."

 crisis_perks_supremacy_privateering_title:0 "โจรสลัดรับจ้าง"
 crisis_perks_supremacy_privateering_desc:0 "ให้เราไปโจมตีพวกมันเองงั้นหรือ?! โอ้ ได้โปรดเถอะ - เรามีคนที่ทำเรื่องนั้นแทนเราอยู่แล้ว"
 crisis_perks_supremacy_privateering_unlock:0 "ว่าจ้างกองยานปล้นสะดมรวมให้ได้ 4 กอง เพื่อปลดล็อก $crisis_perk$ นี้"
 crisis_perks_supremacy_privateering_passive:0 "สัญญาว่าจ้างกองปล้นสะดมมีระยะเวลานานขึ้น 30%"
 crisis_perks_supremacy_privateering_active:0 "สัญญาว่าจ้างกองปล้นสะดมมีราคาถูกลง 50%"
 crisis_perks_supremacy_primus_inter_pares_title:0 "ปฐมในหมู่ผู้เสมอกัน"
 crisis_perks_supremacy_primus_inter_pares_desc:0 "พวกมันคือผู้เสมอกับเรา และพวกมันจะต้องเห็นพ้องกับข้อความนั้น มิฉะนั้นก็..."
 crisis_perks_supremacy_primus_inter_pares_unlock:0 "เป็นผู้นำสหพันธ์อำนาจนำที่มีสมาชิกอื่นอย่างน้อย 3 ราย"
 crisis_perks_supremacy_primus_inter_pares_passive:0 "§G+5 ความจุกองทัพเรือของสหพันธ์§! ต่อสมาชิกสหพันธ์ 1 ราย"
 crisis_perks_supremacy_primus_inter_pares_active:0 "ความเป็นเอกภาพของสหพันธ์เพิ่มขึ้น +3"
 crisis_perks_supremacy_support_is_mandatory_title:0 "การสนับสนุนคือสิ่งบังคับ"
 crisis_perks_supremacy_support_is_mandatory_desc:0 "แน่นอนว่าท่านมีอิสระที่จะคัดค้านข้อเรียกร้องของเรา อย่างไรก็ดี หากท่านทำเช่นนั้น เราจะกำจัดท่านให้สิ้น"
 crisis_perks_supremacy_support_is_mandatory_unlock:0 "มีรัฐบริวารภายใต้จักรวรรดิของคุณอย่างน้อย 4 รัฐ เพื่อปลดล็อก $crisis_perk$ นี้"
 crisis_perks_supremacy_support_is_mandatory_passive:0 "รัฐบริวารแต่ละรัฐส่งมอบ £energy£ พลังงาน และ £mineral£ แร่ธาตุ เพิ่มขึ้น 10% ทุกเดือน"
 crisis_perks_supremacy_support_is_mandatory_active:0 "ได้รับความจุกองทัพเรือ +20 ต่อรัฐบริวารแต่ละรัฐภายใต้จักรวรรดิของคุณ"

 crisis_perks_deception_lord_of_red_tape_title:0 "เจ้าพ่อระเบียบราชการ"
 crisis_perks_deception_lord_of_red_tape_desc:0 "ง่ายมาก! กรอกแบบฟอร์มสหพันธรัฐ68- XM ส่งให้แผนก11-B ภายในวันที่ 21 เป็นอย่างช้า แล้วขอสำเนาอีกสามชุดของ..."
 crisis_perks_deception_lord_of_red_tape_unlock:0 "เสนอการคว่ำบาตรในประชาคมดาราจักร 3 ครั้ง เพื่อปลดล็อก $crisis_perk$ นี้"
 crisis_perks_deception_lord_of_red_tape_passive:0 "ข้อเสนอใช้ £influence£ อิทธิพลน้อยลง 20%"
 crisis_perks_deception_lord_of_red_tape_active:0 "ได้รับภูมิคุ้มกันจากการถูกนับว่า §P'ละเมิด'§! กฎหมายของประชาคมดาราจักร"
 crisis_perks_deception_dance_puppets_title:0 "เต้นสิ เจ้าหุ่นเชิด!"
 crisis_perks_deception_dance_puppets_desc:0 "คุณก็รู้ว่ามันเป็นแบบนี้: คุณเกาหลังให้ฉัน แล้วฉันจะละเว้นไม่ทำลายหลังของคุณ"
 crisis_perks_deception_dance_puppets_unlock:0 "เรียกใช้ £favor£ ความโปรดปราน 20 หน่วย เพื่อปลดล็อก $crisis_perk$ นี้"
 crisis_perks_deception_dance_puppets_passive:0 "§R-10% น้ำหนักทางการทูตต่อ £favor£ ความโปรดปราน 1 หน่วย§!"
 crisis_perks_deception_dance_puppets_active:0 "การเรียกใช้ £favor£ ความโปรดปรานไม่ต้องใช้ £influence£ อิทธิพล"
 crisis_perks_deception_shadowplay_title:0 "ละครเงา"
 crisis_perks_deception_shadowplay_desc:0 "สิ่งที่คุณรู้เกี่ยวกับเรา คุณรู้ได้เพราะเราอนุญาต ส่วนสิ่งที่เรารู้เกี่ยวกับคุณคือ 'ทุกอย่าง'"
 crisis_perks_deception_shadowplay_unlock:0 "ทำ §Hปฏิบัติการ§! ให้สำเร็จ 10 ครั้ง เพื่อปลดล็อก $crisis_perk$ นี้"
 crisis_perks_deception_shadowplay_passive:0 "ปฏิบัติการจารกรรมเร็วขึ้น 20% และมีค่าใช้จ่ายลดลง 20%"
 crisis_perks_deception_shadowplay_active:0 "ได้รับ §G+20 ข่าวกรอง§! ต่อจักรวรรดิอื่น"

 # Crisis UI
 menace_value: "£menace£ §Y$VAL|0$§!"
 menace_gaining: "ทำ §Hเป้าหมายไครซิส§! ให้สำเร็จเพื่อรับ §Yค่าความอันตราย§! เพิ่มขึ้น"
 menace_desc: "ค่าความอันตรายคือมาตรวัดความสอดประสานของเรากับพลังหายนะจากชราวด์"
 menace_crisis_objective: "เป้าหมายไครซิส"
 menace_crisis_objective_gained: "ค่าความอันตรายที่ได้รับ"
 menace_crisis_objective_reward: "รางวัล: $REWARD$"
 menace_crisis_objective_progress: "เราได้รับ £menace£ $AMOUNT$ จากเป้าหมายไครซิสนี้"
 menace_crisis_level_locked: "สิ่งที่ต้องมีเพื่อปลดล็อกระดับนี้:\n"
 menace_crisis_level_unlocked: "เมื่อถึง $LEVEL$ คุณจะได้รับโครงการพิเศษและรางวัลดังต่อไปนี้:\n"
 menace_crisis_level_desc: "เพื่อก้าวผ่านระดับไครซิส ให้ทำเป้าหมายไครซิสให้สำเร็จและวิจัยโครงการพิเศษของไครซิสในบันทึกสถานการณ์"
 menace_crisis_level_unlock: "มี £menace£ §Y$CURRENCY$§! ค่าความอันตราย"
 menace_current_value: "ค่าปัจจุบัน: §Y$VALUE|0$§!"
 menace_crisis_description_title: "กาแล็กติกเนเมซิส"
 menace_crisis_description_intro: "บรรดาผู้คนในประชาคมดาราจักรที่คอยบันทึกเส้นทางของประวัติศาสตร์ได้ทำนายมานานแล้วว่าจะมี §Rไครซิส§! เกิดขึ้น - ภัยคุกคามระดับการดำรงอยู่ต่อสิ่งมีชีวิตมีสติปัญญาทั้งหมด ซึ่งจะต้องอาศัยความเป็นเอกภาพแห่งจุดมุ่งหมายและการเสียสละอย่างที่ไม่เคยมีมาก่อนจึงจะเอาชนะได้ หากมันจะเอาชนะได้เลย\n\nคำทำนายยอดนิยมเกี่ยวกับธรรมชาติของไครซิสนี้เคยเพ้อฝันกันไปต่างๆ นานา ทั้งการรุกรานของผู้ตะกละจากนอกดาราจักร การลุกฮือก่อกบฏเล็กๆ ของปัญญาประดิษฐ์ในกาแล็กซี หรือสงครามสืบราชบัลลังก์ที่ล้นทะลักมาจากอีกระนาบแห่งการดำรงอยู่ แต่...\n\nตอนนี้ชัดเจนแล้วว่า มันคือ §Rเรา§! มาตลอด"
 menace_crisis_description: "$menace_crisis_description_intro$\n\nการกระทำของเราสะท้อนไปถึงอีกมิติหนึ่ง มิติแห่งพลังงานไร้ขีดจำกัด เราเพียงต้องค้นพบวิธีควบคุมพลังนี้ เพื่อทำให้ทั้งกาแล็กซียอมศิโรราบ"
 menace_crisis_howto_title: "ค่าความอันตรายและเอนจิน"
 menace_crisis_howto: "การไล่ตาม §Hเป้าหมายไครซิส§! จะสร้าง £menace£ §Hค่าความอันตราย§! ปลดล็อกศักยภาพแห่งการทำลายล้างของเราเพื่อสร้างเมกะสตรัคเจอร์เครื่องยนต์ดาราศาสตร์ให้เสร็จ และนำยุคใหม่มาสู่กาแล็กซี"

