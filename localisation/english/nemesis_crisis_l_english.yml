 # Menacing Actions - Deception
 menacing_actions_deception_force_resolution_title:0 "ฝืนผลักดันมติท่ามกลางการคัดค้าน"
 menacing_actions_deception_force_resolution_desc:0 "การฝืนผลักดันข้อเสนอให้ผ่าน ทั้งที่ผู้ลงคะแนนเสียงส่วนใหญ่คัดค้าน จะมอบ §H5§! £menace£ ค่าความอันตราย"
 menacing_actions_deception_council_position_title:0 "นั่งในสภาของประชาคมดาราจักร"
 menacing_actions_deception_council_position_desc:0 "การมีตำแหน่งในสภาของประชาคมดาราจักรจะมอบ §H10§! £menace£ ค่าความอันตรายต่อปี"
 menacing_actions_deception_veto_resolution_title:0 "ยับยั้งมติ"
 menacing_actions_deception_veto_resolution_desc:0 "การยับยั้งมติจะมอบ §H100§! £menace£ ค่าความอันตรายต่อมติหนึ่งฉบับ"
 menacing_actions_deception_call_in_favor_title:0 "เรียกใช้ความโปรดปราน"
 menacing_actions_deception_call_in_favor_desc:0 "การเรียกใช้ความโปรดปรานจะมอบ §H1§! £menace£ ค่าความอันตรายต่อ £favor£ ความโปรดปราน 1 หน่วย"
 menacing_actions_deception_win_humiliation_war_title:0 "ชนะสงครามดูถูกเหยียดหยาม"
 menacing_actions_deception_win_humiliation_war_desc:0 "การชนะสงครามดูถูกเหยียดหยามจะมอบ §H200§! £menace£ ค่าความอันตราย"

