 menacing_actions_supremacy_vassalize_empire_title:0 "ทำให้จักรวรรดิเป็นรัฐบริวาร"
 menacing_actions_supremacy_vassalize_empire_desc:0 "การทำให้จักรวรรดิเป็นรัฐบริวารจะมอบ §H100§! £menace£ ค่าความอันตราย"
