 SYNTHETIC_DAWN_TITLE: "Synthetic Dawn Story Pack" # Do not translate
 DLC_SYNTHETIC_DAWN_RECOMMENDATION_DESC:1 "§Sรุ่งอรุณสังเคราะห์แสง§! เป็นชุดเนื้อเรื่องที่ให้คุณเล่นเป็นสติปัญญาเครื่องจักร"
 DLC_SYNTHETIC_DAWN_RECOMMENDATION_ROBOT_REC:1 "เราแนะนำ §Sรุ่งอรุณสังเคราะห์แสง§! เพราะตัวเลือกบางส่วนที่คุณเลือกเหมาะกับธีมเครื่องจักรและหุ่นยนต์ของมัน"

 syndaw.1.name:0 "[From.GetName] ถูกหลอมรวม"
 syndaw.1.desc:0 "กระแสความคิดใหม่หลั่งไหลเข้าท่วมโครงข่าย ในตอนแรกมันกระจัดกระจาย แต่ไม่นานก็ปรับตัวเข้าสู่ค่ากลางที่เรารับรู้ว่าเป็นตัวเราเอง\n\nเราได้หลอมรวมความรู้และขีดความสามารถบางส่วนของ §Y[From.GetNamePlural]§! แล้ว"
 syndaw.1.a.tooltip:0 "รับ §Yแต้มการวิจัย§! บางส่วนต่อประชากรที่ถูกหลอมรวมแต่ละหน่วย"
 syndaw.2.name:0 "[Root.GetName] ถูกรวมเข้าระบบ"
 syndaw.2.desc:0 "เราได้หลอมรวมหน่วยสังเคราะห์บน [Root.GetName] เข้าสู่โครงข่ายของเราแล้ว"

 syndaw.21.name:2 "สูญเสียหน่วย"
 syndaw.21.desc:1 "หน่วยสำรวจ §R[malfunctioning_leader.GetName]§! ของ [malfunctioning_leader_fleet.GetName] หยุดทำงานเนื่องจากสัมผัสสายไฟแรงสูงที่ไม่มีฉนวนเป็นเวลานานโดยไม่ตั้งใจ"
