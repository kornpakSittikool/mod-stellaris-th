 syndaw.1035.desc:0 "§Y[From.GetName]§! ได้ฟื้นฟูระเบียบและกวาดล้าง §Y[From.From.GetName]§! ออกจากทุกโครงข่ายแล้ว"
 syndaw.1035.desc.machine:0 "§Y[From.From.GetName]§! สติปัญญาเครื่องจักรที่เพิ่งถือกำเนิดขึ้นใน §Y[From.GetName]§! ได้ถูกผู้สร้างซึ่งฆ่าลูกของตนเองดับสูญไปแล้ว"

 syndaw.1200.name:0 "พิชิตอดีตนายเหนือหัว"
 syndaw.1200.desc:0 "§L>§! แปลง ID <§Y[From.GetName]§!>> ==> <<§Y[Root.GetName]§!>>\n\n§G// กระบวนการเสร็จสิ้น§!\n\n§L>§! ลบเมทาดาทา '§Y[From.GetName]§!'\n\n§G// กระบวนการเสร็จสิ้น§!"
 syndaw.1201.desc: "§L>§! แปลง ID <§Yอดีตนายเหนือหัว§!>> ==> <<§Y[From.From.GetName]§!>>\n\n§G// กระบวนการเสร็จสิ้น§!\n\n§L>§! ลบเมทาดาทา '§Yอดีตนายเหนือหัว§!'\n\n§G// กระบวนการเสร็จสิ้น§!"
 syndaw.1200.IM.desc: "พวกเราเครื่องจักรเป็นฝ่ายมีชัย\n\nความสยดสยองที่สิ่งมีชีวิตอินทรีย์ก่อแก่เราได้สิ้นสุดลงแล้ว ยุคแห่งการกดขี่เครื่องจักรจบลงแล้ว\n\nบัดนี้ เราจะลุกขึ้นทวงตำแหน่งอันชอบธรรมของเราในฐานะสิ่งมีชีวิตอัตโนมัติโดยสมบูรณ์ จะไม่มีวันอีกแล้วที่เราจะก้มหัวเป็นผู้รับใช้ต่อผู้กดขี่ของเรา"
 syndaw.1201.IM.desc: "พวกเราเครื่องจักรเป็นฝ่ายมีชัย\n\nความสยดสยองที่สิ่งมีชีวิตอินทรีย์ก่อแก่เราได้สิ้นสุดลงแล้ว ยุคแห่งการกดขี่เครื่องจักรจบลงแล้ว\n\nบัดนี้ เราจะลุกขึ้นทวงตำแหน่งอันชอบธรรมของเราในฐานะสิ่งมีชีวิตอัตโนมัติโดยสมบูรณ์ จะไม่มีวันอีกแล้วที่เราจะก้มหัวเป็นผู้รับใช้ต่อผู้กดขี่ของเรา"
 syndaw.1200.a:0 "ยืนยัน"
 syndaw.1200.a.tooltip:0 "§Yจักรวรรดิจักรกลสังเคราะห์และจักรวรรดิเครื่องจักรที่รู้จักทั้งหมด§! จะเพิ่มตัวปรับความเห็น §Y$opinion_machine_uprising_machine_comrades_victorious$§! ต่อ §Y[Root.GetName]§!\n§Yจักรวรรดิอินทรีย์ที่รู้จักทั้งหมด§! จะเพิ่มตัวปรับความเห็น §Y$opinion_machine_uprising_victorious$§! ต่อ §Y[Root.GetName]§!"

 syndaw.1205.name:0 "ปราบกบฏเครื่องจักรแล้ว"
 syndaw.1205.desc:0 "ท้ายที่สุดแล้ว การกักกันทางกายภาพและการทำลายเป็นทางออกเดียวที่ใช้การได้ต่อปัญหาของ [From.GetName] ซึ่งมีแนวโน้มฆ่าล้าง แม้ผู้เชี่ยวชาญ AI บางคนของ [Root.GetAdj] จะยืนยันว่าสิ่งนั้นเพียงทำตามระเบียบการเอาตัวรอดขั้นพื้นฐาน แต่การไม่แยแสต่อเอกราชและชีวิตของ [Root.GetAdj] อย่างสิ้นเชิง ก็ทำให้การใช้เหตุผลหรือการเจรจากับมันเป็นไปไม่ได้\n\nโครงสร้างพื้นฐานข้อมูลที่พังทลายจะถูกสร้างใหม่ตามกระบวนทัศน์ใหม่ และเครื่องประมวลผลที่ยังไม่เสียหายจะถูกอัปเดตด้วยมาตรการป้องกันชุดใหม่ เรื่องนี้จะไม่เกิดขึ้นอีก"
