 syndaw.1030.desc.machine:0 "§Y[From.GetName]§! ผู้กบฏได้เอาชนะผู้สร้างของตน และผนวกดินแดนเดิมทั้งหมดของ [From.From.GetAdj] เข้าไว้แล้ว"
