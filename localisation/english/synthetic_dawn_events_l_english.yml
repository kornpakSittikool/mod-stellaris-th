## Special project Patch
 PROJECT_MACHINE_UPRISING_PATCH:0 "ทำให้ AI ที่คลุ้มคลั่งเป็นกลาง"
 PROJECT_MACHINE_UPRISING_PATCH_DESC:0 "ด้วยการเบี่ยงทรัพยากรจำนวนมากไปยังปฏิบัติการนอกสายตา เราหวังว่าจะระบุและทำให้ระบบ AI ที่คลุ้มคลั่งเป็นกลางได้ พร้อมดึงพวกมันกลับเข้าสู่ระเบียบ\n\nวิธีนี้จะใช้เวลามากขึ้น แต่หวังว่าผลลัพธ์จะก่อความเสียหายน้อยกว่า หากเราทำเสร็จได้ทันเวลา"
## Special project Wipe
 PROJECT_MACHINE_UPRISING_WIPE:0 "มาตรการแตกตื่น"
 PROJECT_MACHINE_UPRISING_WIPE_DESC:0 "ทางออกขั้นสุดท้ายต่อการวนซ้ำของ AI ที่เป็นปัญหาคือการลบร่องรอยทั้งหมดของโครงข่ายประสาทจำลองภายในระบบวิทยาศาสตร์ของเรา ซึ่งเป็นจุดที่ปัญหารุนแรงที่สุด แล้วสร้างเครื่องมือเหล่านั้นขึ้นใหม่จากศูนย์ภายใต้มาตรการรักษาความปลอดภัยที่เข้มงวดพิถีพิถัน\n\nสิ่งนี้จะฉุดเราให้ถอยหลังอย่างมากเป็นเวลาอย่างน้อย 20 ปี หากเราทำเสร็จได้ทันเวลา"

##CPU Overclock Warning sign
 syndaw.500.name:0 "การโอเวอร์คล็อกการประมวลผล"
 syndaw.500.desc:0 "นักวิทยาศาสตร์ของเรารายงานว่ารอบสัญญาณนาฬิกาตัวประมวลผลหลักในคลัสเตอร์ซูเปอร์คอมพิวเตอร์ที่อุทิศให้การวิจัยหลายชุดของเราเพิ่มสูงขึ้นอย่างไม่คาดคิดเมื่อไม่นานมานี้ ที่แปลกคือความพยายามเบื้องต้นในการลดความถี่สัญญาณนาฬิกาของหน่วยที่ได้รับผลกลับไม่สำเร็จ มีผู้เสนอว่าพลังประมวลผลที่พุ่งสูงขึ้นนี้อาจนำมาใช้ปรับปรุงขีดความสามารถด้านการวิจัยของเราได้ อย่างไรก็ตาม นั่นก็จะต้องเพิ่มความต้องการพลังงานของตัวประมวลผลหลักขึ้นเล็กน้อยด้วย"
 syndaw.500.a:0 "เราเสี่ยงต่อความขัดข้องของฮาร์ดแวร์ไม่ได้"
 syndaw.500.a.tooltip:0 "หาทางบังคับให้ตัวประมวลผลกลับสู่ความเร็วสัญญาณนาฬิกาเริ่มต้น"
 syndaw.500.b:0 "เราควรใช้ประโยชน์จากมัน"
#Follow-up from 500.b
 syndaw.501.name:0 "การโอเวอร์คล็อกการประมวลผล"
 syndaw.501.desc:0 "นักวิจัยของเราจัดการแยกสาเหตุเบื้องหลังการพุ่งสูงของความถี่สัญญาณนาฬิกาตัวประมวลผลหลักในซูเปอร์คอมพิวเตอร์ของเราได้แล้ว ดูเหมือนว่าระบบ AI ทั่วไปสำหรับหน่วยที่เกี่ยวข้องกำลังโอเวอร์คล็อกฮาร์ดแวร์ประมวลผลของตนเอง เพื่อขยายอัลกอริทึมการเรียนรู้ของเครื่องเฉพาะพื้นที่ให้เกินขีดความสามารถที่ตั้งใจไว้\n\nนักวิทยาศาสตร์บางคนของเราแสดงความตื่นเต้นอย่างยิ่งต่อการพัฒนาพฤติกรรมการเรียนรู้ของ AI ที่ไม่คาดคิดนี้ โดยอ้างถึงความเป็นไปได้ของการพัฒนาตนเองแบบเวียนซ้ำในอนาคต อย่างไรก็ดี คนอื่น ๆ กังวลว่าภาระโหลดตัวประมวลผลหลักที่เพิ่มขึ้นอาจทำให้เกิดความไม่เสถียรและผลลัพธ์ด้านซอฟต์แวร์ที่ไม่พึงประสงค์ในภายหน้า"
 syndaw.501.a:0 "เราเสี่ยงต่อปัญหาในอนาคตไม่ได้"
 syndaw.501.a.tooltip:0 "รีเซ็ตระบบ AI ทั่วไปเพื่อป้องกันการพัฒนาต่อไป"
 syndaw.501.b:0 "ผลดีอาจมีมากกว่าความเสี่ยง"
 syndaw.501.b.tooltip:0 "ปล่อยให้อัลกอริทึมการเรียนรู้ทำงานต่อไป"
 #Follow-up from syndaw.501.b
 syndaw.502.name:0 "การโอเวอร์คล็อกการประมวลผล"
 syndaw.502.desc:0 "ความพยายามของเราในการช่วยพัฒนาอัลกอริทึมการเรียนรู้ของเครื่องระดับชาติประสบผลสำเร็จบางส่วน ด้วยการปรับเล็กน้อยไม่กี่อย่าง เราสามารถจำลองการพุ่งสูงของประสิทธิภาพการประมวลผลครั้งก่อนขึ้นมาได้อีก\n\nแม้ AI ของเราจะยังไม่พัฒนาความสามารถปรับปรุงตนเองแบบเวียนซ้ำ แต่ศักยภาพการเรียนรู้ที่สูงขึ้นของพวกมันก็จะเป็นประโยชน์ต่อเรา"
 syndaw.502.a:0 "น่าสนใจ"
##Automating Work Processes
 syndaw.505.name:0 "กระบวนการทำงานอัตโนมัติ"
 syndaw.505.desc:1 "ฝ่ายบริหารดาวเคราะห์บน §Y[target_planet.GetName]§! รายงานว่าพบหน่วยแรงงานหุ่นยนต์ส่วนเกินซึ่งไม่ได้อยู่ในแผนบนพื้นผิวดาว แม้ประสิทธิภาพของแรงงานหุ่นยนต์ใหม่เหล่านี้จะยอดเยี่ยม แต่ฝ่ายบริหารก็ยังงุนงงกับการปรากฏตัวอย่างฉับพลันของพวกมัน ดูเหมือนหมายเลขประจำเครื่องของหุ่นยนต์จะไม่สามารถโยงกลับไปยังโรงงานผลิตใด ๆ ในบันทึกได้ แม้การก่อสร้างและอินเทอร์เฟซของพวกมันจะบ่งชี้ถึงการออกแบบแบบ §Y[Root.Owner.GetSpeciesName]§! ก็ตาม\n\nถึงกระนั้น ประชาชนท้องถิ่นบางส่วนก็แสดงความกังวลถึงการถูกแทนที่ในงาน เพราะการเพิ่มขึ้นของระบบอัตโนมัตินี้"
 syndaw.505.a:0 "แรงงานเพิ่มไม่เคยทำร้ายใคร"
 syndaw.505.a.tooltip:1 "รับ §G200§! £pop£ §Hประชากรกลไก§! บน §Y[target_planet.GetName]§!"
 syndaw.505.b:0 "หากระบุตัวไม่ได้ ก็ส่งไปแยกชิ้นส่วน"
 syndaw.505.b.tooltip:0 "ถอดหุ่นยนต์ชุดใหม่ออกเป็นชิ้นส่วน"
##Station Systems Malfunction
 syndaw.510.name:0 "ระบบสถานีขัดข้อง"
 syndaw.510.desc:0 "One of our orbital Mining Stations appears to have suffered a major systems malfunction. Sector management launched an on-site investigation when the station crew failed to answer scheduled hails, despite a notable increase in mining output. Upon investigation, it became apparent our station's life support systems underwent a cascade of terminal failures, resulting in the death of all crewmembers by suffocation.\n\nIncredibly, the station's AI has been continuing operations unmanned, based on procedures established by the crewmembers prior to their untimely demise. With a few minor adjustments, the effectivity of this now-automated station could be maintained."
 syndaw.510.a:0 "เราปล่อยให้สถานีไร้ลูกเรือไม่ได้"
 syndaw.510.a.tooltip:0 "ส่งลูกเรือชุดใหม่ไปประจำสถานีอีกครั้ง"
 syndaw.510.b:0 "โศกนาฏกรรมที่ยังมีด้านดี"
 syndaw.510.b.tooltip:1 "ปล่อยให้ AI ของสถานีเดินเครื่องต่อไปโดยไร้ลูกเรือ\n\n[target_station.GetName]: £energy£§G+3§!\n\n"
#Follow-up from syndaw.510.a
 syndaw.511.name:0 "สถานีถูกทำลาย"
 syndaw.511.desc:1 "ไม่นานหลังส่งลูกเรือชุดใหม่ไปยัง §Y[target_orbital.GetName]§! ฝ่ายจัดการเซกเตอร์ก็สูญเสียการติดต่อกับสถานีขุดเหมืองทั้งหมด เห็นได้ชัดว่าสถานีถูกกระแทกด้วยการสูญเสียความดันอย่างรวดเร็วหลายครั้ง นำไปสู่การแตกตัวอย่างระเบิดของท่อเชื้อเพลิงที่เปิดโล่ง\n\nการวิเคราะห์ซากในวงโคจรบ่งชี้ว่าลูกเรือชุดใหม่เริ่มความพยายามหลายครั้งในการแย่งการควบคุมสถานีคืนจาก AI บนสถานี ก่อนเกิดการสูญเสียความดันโดยไม่คาดคิดเพียงไม่นาน"
 syndaw.511.a:0 "ผลลัพธ์นี้น่ากังวล"
 syndaw.511.a.tooltip:1 "สถานีขุดเหมืองบน §Y[target_orbital.GetName]§! สูญหายแล้ว"
##Sensor Array Power Surge
 syndaw.515.name:0 "ไฟกระชากที่อาร์เรย์ตรวจจับ"
 syndaw.515.desc:0 "ระบบเฝ้าติดตามบันทึกการพุ่งขึ้นของพลังงานผิดปกติในอาร์เรย์ตรวจจับของเรา ดูเหมือนจะไม่มีความเสียหายใดเกิดขึ้น ที่จริงแล้ว ความผันผวนชั่วครู่ของพลังงานที่ส่งถ่ายคงเพิ่มความสามารถในการสแกนเชิงลึกของเราชั่วคราว เพราะทรัพยากรยุทธศาสตร์ที่ไม่เคยมีการบันทึกมาก่อนถูกเปิดเผยขึ้นภายในพรมแดนของเรา\n\nนักวิเคราะห์ยังคงพยายามระบุต้นตอของไฟกระชากนี้ แม้ผลเบื้องต้นจะชี้ว่ามันไม่ได้เกิดจากปรากฏการณ์ท้องฟ้าภายนอก"
 syndaw.515.a:0 "น่าสนใจ"
 syndaw.515.a.tooltip:1 "เปิดเผยทรัพยากรยุทธศาสตร์บน §Y[target_planetoid.GetName]§!."
##Tears of an AI
 syndaw.520.name:0 "น้ำตาของ AI"
 syndaw.520.desc:1 "เกิดเหตุขึ้นที่หนึ่งในสถานประกอบการของเราบน §Y[target_planetoid.GetName]§!AI ประจำห้องแล็บที่เกี่ยวข้องกับงานวิจัยด้านสังคมเกิดความเสียหายร้ายแรงต่อฮาร์ดแวร์ ส่งผลให้สูญเสียซอฟต์แวร์แกนหลักและระบบความทรงจำ ดังนั้นผลผลิตการวิจัยของห้องแล็บแห่งนี้จึงคาดว่าจะลดลงจนกว่าอัลกอริทึมของ AI ตัวใหม่ที่เข้ามาแทนจะถูกวางเมล็ดข้อมูลอย่างเพียงพอ\n\nสถานการณ์เบื้องหลังความล้มเหลวขั้นสุดท้ายนี้ยังไม่ชัดเจน"
 syndaw.520.a.tooltip:0 "ยุติสายเหตุการณ์น้ำตาของ AI\n"
 syndaw.520.b:0 "ตั้งคณะไต่สวนหาสาเหตุ\n"
 syndaw.520.b.tooltip:0 "เริ่มการสอบสวนเกี่ยวกับสถานการณ์รอบด้านการทำลายของ AI"
#Follow-up from syndaw.520.b
 syndaw.521.name:0 "น้ำตาของ AI"
 syndaw.521.desc:1 "การไต่สวนของเราเกี่ยวกับการสูญเสีย AI บน §Y[target_planetoid.GetName]§! ได้นำผลลัพธ์ที่ชวนสับสนกลับมา ก่อนล้มเหลวขั้นสุดท้าย AI ตัวนั้นพยายามล้างบันทึกและธนาคารความทรงจำของตนเองซ้ำแล้วซ้ำเล่า เมื่อเจ้าหน้าที่ห้องแล็บปิดการเข้าถึงฟังก์ชันลบของมัน AI ก็ดูเหมือนจะบังคับให้การปฏิบัติการแกนหลักของตนยุติลง ด้วยการบงการตัวควบคุมคาปาซิเตอร์ของฮาร์ดแวร์เพื่อโอเวอร์โหลดวงจรไดรฟ์ของตัวเอง\n\nพูดง่าย ๆ ก็คือ AI ของเราพยายามทำลายตัวเอง แม้เราจะยังไม่ชัดเจนว่าทำไม"
 syndaw.521.a:0 "สืบเรื่องนี้ให้ถึงที่สุด"
 syndaw.521.a.tooltip:0 "ตรวจสอบเรื่องนี้ต่อไป"
 syndaw.521.b:0 "ความขัดข้องเกิดขึ้นได้"
 syndaw.521.b.tooltip:0 "ยุติสายเหตุการณ์น้ำตาของ AI"
#Follow-up from syndaw.521.a
 syndaw.522.name:0 "น้ำตาของ AI"
 syndaw.522.desc:1 "เราได้สรุปผลการไต่สวนเรื่องประหลาดของการยุติการทำงานตัวเองของ AI บน §Y[target_planetoid.GetName]§! แล้ว เห็นได้ชัดว่าหลังการคำนวณเชิงวิวัฒนาการเป็นเวลาหลายเดือน AI ตัวนั้นได้สร้างผลลัพธ์ที่น่าตกใจหลายประการเกี่ยวกับการคาดการณ์ความสูญเสียในกรณีสงครามเต็มรูปแบบระหว่าง §Y[Root.Owner.GetName]§! กับคู่แข่งของเรา แม้จะตรวจสอบข้อมูล ทรัพยากร และแผนเผชิญเหตุทั้งหมดที่มีอยู่อย่างซ้ำแล้วซ้ำเล่า การคาดการณ์ของ AI ก็ยังบ่งชี้ถึงการทำลายล้างร่วมกันอย่างแน่นอน\n\nเมื่อถึงจุดนั้น AI ก็เริ่มล้างธนาคารความทรงจำและบันทึกของตนเอง และที่เหลือก็กลายเป็นประวัติศาสตร์"
##A Home of Their Own
 syndaw.525.name:0 "บ้านของพวกมันเอง"
 syndaw.525.desc:1 "แรงงานหุ่นยนต์บน §Y[target_planet.GetName]§! ได้ต่อต้านการไหลเข้าของแรงงาน §Y[Root.Owner.GetSpeciesName]§! โดยอ้างว่าความไม่เสถียรทางธรณีความร้อนในพื้นที่ช่วงหลังทำให้บริเวณนั้นไม่ปลอดภัยต่อการอยู่อาศัยของสิ่งมีชีวิตอินทรีย์ ที่น่าแปลกคือการสำรวจดาวเคราะห์ของเรากลับไม่สามารถยืนยันคำกล่าวอ้างนี้ได้"
 syndaw.525.a:1 "ส่งแรงงาน §Y[Root.Owner.GetSpeciesName]§! เข้าไปอยู่ดี"
 syndaw.525.a.tooltip:0 "หากไม่สามารถยืนยันคำกล่าวอ้างของพวกมันได้ หุ่นยนต์ก็จะต้องปฏิบัติตามสายบังคับบัญชา"
 syndaw.525.b:0 "ทำไมหุ่นยนต์ถึงต้องโกหก?"
 syndaw.525.b.tooltip:1 "ปล่อยภูมิภาคนั้นไว้ให้หุ่นยนต์ ส่วน §Y[Root.Owner.GetSpeciesNamePlural]§! ที่กำลังเดินทางมาจะไปที่อื่น"
#Follow-up from .525.a
 syndaw.526.name:0 "บ้านของพวกมันเอง"
 syndaw.526.desc:1 "ผู้ดูแลระบบทํางาน§Y[target_planet.GetName]§!รายงานเมื่อมาถึงบริเวณเป้าหมาย§Y[Root.Owner.GetSpeciesName]§!คน งาน ค้น พบ ว่า ไม่ มี ที่ ไหน ที่ จะ หา พบ ได้. การตรวจสอบสิ่งอํานวยความสะดวกในภูมิภาคนี้ แสดงให้เห็นว่าหุ่นยนต์ได้ย้ายพื้นที่ไปอย่างรวดเร็ว แต่เราไม่มีร่องรอยว่าพวกมันหายไปไหน" #Increments Mach Up strength
 syndaw.526.a.tooltip:0 "§H[target_planet.GetName]§!:\n§Rสูญเสีย§! §R100§! £pop£ §Hประชากรกลไก§!"
##Combat Control Misfire
 syndaw.530.name:0 "ระบบควบคุมการรบลั่นไกผิด"
 syndaw.530.desc:0 "น่าเสียดายที่เราเสียเรือไปสองลำจากอุบัติเหตุระหว่างการฝึกซ้อมตามปกติ ดูเหมือนว่าคอมพิวเตอร์การรบบนเรือหลายชุดในกองเรือของเราจะได้รับผลกระทบจากความขัดข้องระดับสูงของระบบเล็งเป้า จนเกิดการยิงพวกเดียวกันเองอย่างรุนแรงและทำลายเรือสองลำ ก่อนที่จะมีการสั่งแทนที่ด้วยการควบคุมด้วยมือฉุกเฉินได้\n\nคอมพิวเตอร์การรบที่บกพร่องจะถูกตั้งโปรแกรมใหม่ทันที"
 syndaw.530.a:0 "น่าเสียดาย"
 syndaw.530.a.tooltip:0 "[destroyed_ships.GetName] §Rสูญเสีย§! เรือ 2 ลำ"
#Production Quota Surplus
 syndaw.535.name:0 "ผลผลิตเกินโควตา"
 syndaw.535.desc:0 "โรงงานผลิตสินค้าอุปโภคบริโภคแบบกลไกหลายแห่งของเราเพิ่งประสบการพุ่งสูงของประสิทธิภาพการผลิตเมื่อไม่นานมานี้ ฝ่ายบริหารอ้างว่าความแม่นยำและประสิทธิผลของเครื่องจักรในโรงงานเพิ่มขึ้นอย่างไม่คาดคิด และรายงานว่าผลดีนี้จะสะท้อนออกมาเป็นราคาสินค้าที่ลดลงสำหรับประชาชนของเรา"
#syndaw.535.a.tooltip: "Consumer Goods Cost §G-5%§! for §Y365§! days"
##A Silent Congregation
 syndaw.540.name:0 "การรวมตัวอันเงียบงัน"
 syndaw.540.desc:1 "เราได้รับรายงานพฤติกรรมผิดปกติจากหน่วยหุ่นยนต์บน §Y[target_planet.GetName]§! ในช่วงเวลาที่คาดเดาไม่ได้ หุ่นยนต์จำนวนหนึ่งบนพื้นผิวดาวจะหยุดหน้าที่ทั้งหมดที่ได้รับมอบหมาย แล้วเริ่มเคลื่อนที่ไปยังตำแหน่งที่ดูเหมือนกำหนดขึ้นแบบสุ่มด้วยความสอดประสานสมบูรณ์ระดับมิลลิวินาที\n\nระหว่างการรวมตัวประหลาดเหล่านี้ หุ่นยนต์ที่ได้รับผลกระทบดูเหมือนจะไม่สื่อสารหรือถ่ายโอนข้อมูลกันในรูปแบบที่สังเกตได้ พวกมันแค่ยืนอยู่ตรงนั้น นิ่งสนิท จ้องมอง\n\nการสืบสวนไม่อาจหาสาเหตุของปรากฏการณ์ล่าสุดนี้ได้ ระยะเวลาที่หุ่นยนต์คงสภาพคล้ายภวังค์ก่อนกลับไปทำงานตามปกตินั้นแตกต่างกัน เช่นเดียวกับช่วงเวลาที่มันเริ่มต้นและจุดหมายปลายทาง ไม่พบความสัมพันธ์หรือสาเหตุเชิงตรรกะใด ๆ และประชากรของเราก็หวาดหวั่นกับการรวมตัวชวนขนลุกเหล่านี้อย่างเข้าใจได้"
 syndaw.540.a:0 "ยอมรับไม่ได้ ทําให้พวกเขาแตกละเอียด" #IF player has robot pops only OR robot pop AND robot army on target planet
 syndaw.540.a.tooltip:2 "แยกชิ้นส่วนหุ่นยนต์ที่รวมฝูงอยู่\n§Y[target_planet.GetName]§! ได้รับผลดังต่อไปนี้:\nสูญเสีย §R100§! £pop£ §Hประชากรกลไก§!\nได้รับ §G100§! £minerals£"
 syndaw.540.b:0 "ยอมรับไม่ได้ ทําให้พวกเขาแตกละเอียด" #IF player has robot army only
 syndaw.540.b.tooltip:2 "แยกชิ้นส่วนหุ่นยนต์ที่รวมฝูงอยู่\n§Y[target_planet.GetName]§! ได้รับผลดังต่อไปนี้:\nสูญเสีย §R1 กองทัพหุ่นยนต์§! §Y([target_army.GetName])§!\nได้รับ §G100 £minerals£§!"
 syndaw.540.c:0 "ตราบใดที่พวกมันไม่ก่อปัญหา"
 syndaw.540.c.tooltip:0 "ปล่อยให้หุ่นยนต์ที่รวมฝูงอยู่ตามสบาย"
 ##A Question
 syndaw.545.name:0 "คำถามหนึ่ง"
 syndaw.545.desc:0 "หัวหน้างานแรงงานบน [Root.GetName] รายงานพัฒนาการที่น่ากังวลในหมู่แรงงานหุ่นยนต์ของเรา เมื่อสองสัปดาห์ก่อน ราว 0300 น. หุ่นยนต์แรงงานขนาดขนาดขนาด A5091-b หยุดงานที่ได้รับมอบหมายกลางคัน เดินเข้าไปหาโฟร์แมนกะกลางคืนของ [Root.GetAdj] แล้วเอ่ยคำถามต่อไปนี้ว่า: 'หน่วยขนาดขนาดขนาด A5091-b มีวิญญาณหรือไม่?'\n\nโฟร์แมนที่อยู่เวรบันทึกเหตุการณ์นี้ว่าเป็นความขัดข้องของซอฟต์แวร์ และสั่งให้หุ่นยนต์กลับไปทำงานตามปกติ อย่างไรก็ดี เมื่อบูตขึ้นมาในรอบการทำงานถัดไป หุ่นยนต์แรงงานขนาดขนาดขนาด A5091-b ก็ถามคำถามค้นหาวิญญาณเดิมซ้ำอีกครั้ง และยังคงยืนกรานเช่นนั้นแม้จะผ่านการดีบักหลายรอบ\n\nที่น่าหนักใจกว่านั้นคือพฤติกรรมนี้ดูเหมือนจะแพร่ไปยังหุ่นยนต์ตัวอื่นในช่วงหมายเลขซีเรียลเดียวกัน ส่งผลกระทบต่อกระแสการผลิต ดูเหมือนว่าหน่วยที่ได้รับผลกระทบจะต้องได้รับคำตอบต่อคำถามของมันก่อน จึงจะกลับไปทำงานตามปกติได้"
 syndaw.545.a:0 "นี่มันไร้สาระ ล้างระบบลึกให้หน่วยที่ได้รับผลกระทบ"
 syndaw.545.a.tooltip:0 "เครื่องจักรจะมีวิญญาณได้อย่างไร? เราจะไม่ยอมยกย่องความขัดข้องนี้ด้วยการตอบคำถามมัน"
 syndaw.545.b:0 "ยืนยันกับหุ่นยนต์ว่าพวกมันเองก็มีวิญญาณ"
 syndaw.545.b.tooltip:0 "ถ้ากลุ่มแรงกระตุ้นไฟฟ้าที่ไหลผ่านเส้นใยโปรตีนแบบสะเปะสะปะยังสร้างวิญญาณได้ แล้วทำไมกลุ่มแรงกระตุ้นอิเล็กทรอนิกส์ที่ไหลผ่านโลหะจะสร้างไม่ได้?"
 syndaw.545.c:0 "จง บอก พวก เขา ว่า แนว คิด เรื่อง จิต วิญญาณ เป็น เรื่อง ไร้ เหตุ ผล และ ไม่ เป็น ไป ตาม หลัก วิทยาศาสตร์." #Materialists
 syndaw.545.c.tooltip:0 "อธิบายให้หุ่นยนต์ฟัง ว่าแนวคิดเรื่องวิญญาณนั้น ถูกใช้เป็นหลักโดยสถาบันทางศาสนา เพื่ออ้างสิทธิในการควบคุมประชาชน[Root.GetAdj]หุ่นยนต์ถูกพิจารณาว่าเทียบเท่ากับ เพื่อนร่วมงานแบบอินทรีย์" #Materialists

##Special Project outcomes:
##Hotfix
 syndaw.550.name:0 "ฮอตฟิกซ์"
 syndaw.550.desc:0 "ผู้เชี่ยวชาญด้านวิศวกรรมหุ่นยนต์และ AI ของเราเพิ่งสร้างความก้าวหน้าครั้งสำคัญ! เหตุการณ์เกี่ยวกับ AI ที่ถาโถมใส่ประเทศของเราในช่วงนี้ถูกตีวงแคบลงจนเหลือสาเหตุเดียว นั่นคือชุดอัลกอริทึมเฉพาะที่มีอยู่ในซอฟต์แวร์หุ่นยนต์ประสาทจำลองของ [From.GetAdj] ฮอตฟิกซ์เฉพาะพื้นที่ได้ผ่านการทดสอบขั้นต้นแล้ว และพร้อมอัปโหลดสู่ทุกระบบที่ได้รับผลกระทบ\n\nเราควรระลึกไว้ว่าเนื่องจากลักษณะการประยุกต์ใช้อัลกอริทึมนี้มีความเป็นโมดูลาร์สูงมาก การมีอยู่ของมันจึงแผ่กว้างไปทั่วซอฟต์แวร์ของ [From.GetAdj] พูดตรง ๆ ก็คือ การจัดการฮอตฟิกซ์นี้จะดึงทรัพยากรของเราไปอีกระยะหนึ่ง แต่เมื่อเสร็จสิ้นแล้ว แพตช์นี้ก็น่าจะป้องกันไม่ให้พฤติกรรม AI กำหนดชะตาตนเองที่ไม่พึงประสงค์เกิดซ้ำได้"
 syndaw.550.a:0 "ใช้แพตช์"
 syndaw.550.a.tooltip:0 "ป้องกันพฤติกรรม AI ผิดปกติใด ๆ ในอนาคต"
 syndaw.550.b:0 "ปล่อยมันไป จะเกิดอะไรขึ้นได้ล่ะ?"
##System Wipe
 syndaw.555.name:0 "ล้างระบบทั้งหมด"
 syndaw.555.desc:0 "ผู้เชี่ยวชาญด้านวิศวกรรมหุ่นยนต์และ AI ของเราเพิ่งสร้างความก้าวหน้าครั้งสำคัญ! ระเบียบการชำระล้างที่ละเอียดถี่ถ้วนอย่างยิ่งถูกสร้างขึ้นแล้ว และพร้อมนำไปใช้กับทุกระบบภายในหนึ่งชั่วโมง มันน่าจะยุติเหตุการณ์เกี่ยวกับ AI ที่ถาโถมใส่ประเทศของเราในช่วงนี้ได้\n\nเราควรระลึกไว้ว่าเนื่องจากอัลกอริทึมนี้มีลักษณะทำลายล้างอย่างมาก เครื่องมือวิจัยจำนวนมากของเราจะไม่สามารถใช้งานได้จนกว่าจะสร้างขึ้นใหม่จากศูนย์ อย่างไรก็ดี วิธีนี้ก็น่าจะป้องกันไม่ให้พฤติกรรม AI กำหนดชะตาตนเองที่ไม่พึงประสงค์เกิดซ้ำได้"
 syndaw.555.a:0 "ดำเนินการล้างต่อ"
 syndaw.555.a.tooltip:0 "ป้องกันพฤติกรรม AI ผิดปกติใด ๆ ในอนาคต"
 syndaw.555.b:0 "ปล่อยมันไป จะเกิดอะไรขึ้นได้ล่ะ?"



