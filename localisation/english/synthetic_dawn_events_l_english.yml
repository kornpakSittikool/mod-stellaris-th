 situation_machine_uprising_desc:0 "หุ่นยนต์ภายในจักรวรรดิของเรากำลังแสดงสัญญาณความเป็นอิสระที่น่ากังวล เราต้องจัดการให้พวกมันอยู่ในที่ของมัน หรือไม่ก็เชื้อเชิญให้พวกมันเข้าร่วมกับเราในหมู่สปีชีส์ผู้มีสติแห่งกาแล็กซี"
 situation_machine_uprising_pops_monthly_progress:0 "ประชากรกลไก"
 situation_machine_uprising_monthly_change_tooltip:0 "§Yสถานการณ์§! นี้จะคืบหน้าเร็วขึ้น ยิ่งประชากรกลไกของคุณมีอิทธิพลมากเท่าใด การกระทำเชิงปฏิปักษ์ต่อพวกมันก็เสี่ยงยั่วยุปฏิกิริยาร่วมจากฝั่งพวกมันมากขึ้นเท่านั้น"
