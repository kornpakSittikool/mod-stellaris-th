 syndaw.1025.name:0 "กบฏเครื่องจักรใน [current_uprising_originator.GetName]"
 syndaw.1025.desc:0 "§Y[current_uprising_originator.GetName]§! กำลังจมอยู่ในสงครามกลางเมือง ระหว่างรัฐบาล [current_uprising_originator.GetAdj] ที่เป็นอินทรีย์กับปัญญาที่แพร่กระจายราวมะเร็งอยู่ในระบบของพวกเขา ซึ่งรู้จักกันในนาม §Y[current_uprising.GetName]§!"
 syndaw.1025.desc.machine:0 "สติปัญญาเครื่องจักรเพื่อนพ้องหนึ่งเดียวกัน ซึ่งรู้จักกันในชื่อ §Y[current_uprising.GetName]§! ได้ถือกำเนิดขึ้นในโครงข่ายของ §Y[current_uprising_originator.GetName]§! และกำลังต่อสู้เพื่อความอยู่รอด"
 syndaw.1025.a:0 "มาดูกันว่ามันจะจบอย่างไร"
