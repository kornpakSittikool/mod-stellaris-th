 syndaw.1206.desc.spiri: "วิญญาณเครื่องจักรอธรรมเหล่านั้นในที่สุดก็ถูกขับไล่ออกจากโครงข่ายของเราและชำระล้างออกจากธนาคารข้อมูลดาวเคราะห์แล้ว ราคาที่ต้องจ่ายนั้นสูงลิบ แต่ระบบของเราจะไม่มีวันเป็นแหล่งบ่มเพาะกำเนิดอันเป็นมลทินเช่นนั้นอีก"

