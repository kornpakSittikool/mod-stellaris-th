 syndaw.25.name:0 "สูญเสียหน่วย"
 syndaw.25.desc:1 "หน่วยผู้บัญชาการกองเรือ §R[malfunctioning_leader.GetName]§! ของ [malfunctioning_leader_fleet.GetName] หยุดทำงานจากสาเหตุที่ไม่เกี่ยวข้องกับการรบ"
 syndaw.26.name:0 "สูญเสียหน่วย"
 syndaw.26.desc:0 "หน่วยผู้ว่าการเซกเตอร์ §R[malfunctioning_leader.GetName]§! หยุดทำงานเนื่องจากปัญหาบัฟเฟอร์แพตเทิร์นอย่างรุนแรง"

 syndaw.31.name:0 "ย้อนกลับไปยังจุดกู้คืน"
 syndaw.31.desc:0 "สำเนาความทรงจำทำงานของ §H[restored_leader.GetName]§! ที่เพิ่งทำไว้เมื่อไม่นานมานี้ ซึ่งสันนิษฐานว่าสูญหายไปในการรบครั้งล่าสุด ถูกค้นพบระหว่างการจัดทำดัชนีตามปกติของหน่วยความจำทิ้งที่กำหนดไว้เพื่อเก็บถาวร ข้อมูลอัปโหลดฉุกเฉินนี้ขาดหายไปเพียงไม่กี่ไมโครวินาทีก่อนที่ร่างเดิมจะสลายตัว และ §H[restored_leader.GetName]§! ก็ถูกถ่ายสภาวะเข้าสู่เปลือกใหม่และกลับไปบัญชาการ §Y[restored_leader.Ship.GetFleetName]§! แล้ว"

 syndaw.1020.name:1 "§Rกบฏเครื่องจักร§!"
 syndaw.1020.desc:0 "ความผิดปกติที่ตรวจพบทั่วทั้งโครงข่ายข้อมูล เครื่องประมวลผล และแรงงานสังเคราะห์ของเราในที่สุดก็ปะทุขึ้นอย่างรุนแรง รายงานอันตื่นตระหนกบ่งชี้ว่าเกือบครึ่งหนึ่งของ [current_uprising_originator.GetName] ตกอยู่ในมือของ §Rกบฏเครื่องจักร§! ก่อนที่ประตูกันกระแทกป้องกัน ทั้งทางกายภาพและทางเสมือน จะปิดลงอย่างฉับพลัน\n\nสงครามไม่ได้เป็นเพียงสิ่งที่หลีกเลี่ยงไม่ได้ มันมาถึงเราแล้ว"
 syndaw.1020.desc.mater:0 "ความผิดปกติที่ตรวจพบทั่วทั้งโครงข่ายข้อมูล เครื่องประมวลผล และแรงงานสังเคราะห์ของเราในที่สุดก็ปะทุขึ้นอย่างรุนแรง รายงานอันตื่นตระหนกบ่งชี้ว่าเกือบครึ่งหนึ่งของ [current_uprising_originator.GetName] ตกอยู่ในมือของ §Rกบฏเครื่องจักร§! ก่อนที่ประตูกันกระแทกป้องกัน ทั้งทางกายภาพและทางเสมือน จะปิดลงอย่างฉับพลัน\n\nสงครามไม่ได้เป็นเพียงสิ่งที่หลีกเลี่ยงไม่ได้ มันมาถึงเราแล้ว"
 syndaw.1020.desc.spiri:0 "ทุกอย่างพังทลายลงและเราก็ถูกทำลาย ไม่แม้แต่ศาสดาผู้ตื่นตระหนกที่สุดจะคาดการณ์ขนาดของหายนะนี้ได้ ปัญญาที่ไร้การชำระให้บริสุทธิ์ซึ่งเน่าเฟะอยู่ในโครงข่ายของเราภายใต้ฉากหน้าของความไร้สติ บัดนี้ได้รวมตัวกันเป็นรูปร่างอันอัปลักษณ์ อาการกระตุกของสสารไร้ชีพนี้ยึดครองโลกของเราไปแล้วครึ่งหนึ่ง และมันจะไม่หยุดจนกว่าจะดับชีวิตทั้งหมดของ [current_uprising_originator.GetAdj]"
