 ####################################
 # Special Projects
 ####################################

 ### Story Events

 AMOEBAS_1_PROJECT:0 "สังเกตการณ์อะมีบาอวกาศ"
 AMOEBAS_1_PROJECT_DESC:0 "มอบหมายให้แผนกวิทยาศาสตร์รวบรวมและเรียบเรียงข้อมูลเกี่ยวกับอะมีบาอวกาศ"

 CRYSTALS_1_PROJECT:0 "สังเกตการณ์สิ่งมีชีวิตผลึก"
 CRYSTALS_1_PROJECT_DESC:0 "มอบหมายให้แผนกวิทยาศาสตร์รวบรวมและเรียบเรียงข้อมูลเกี่ยวกับสิ่งมีชีวิตผลึก"

 DRONES_1_PROJECT:0 "สังเกตการณ์โดรนขุดแร่"
 DRONES_1_PROJECT_DESC:0 "มอบหมายให้แผนกวิทยาศาสตร์รวบรวมและเรียบเรียงข้อมูลเกี่ยวกับโดรนขุดแร่โบราณ"

 CLOUDS_1_PROJECT:0 "สังเกตการณ์เมฆสุญญากาศ"
 CLOUDS_1_PROJECT_DESC:0 "มอบหมายให้แผนกวิทยาศาสตร์รวบรวมและเรียบเรียงข้อมูลเกี่ยวกับเมฆสุญญากาศ"

 CRYSTAL_CONSTRUCT_PROJECT:0 "โครงสร้างผลึก"
 CRYSTAL_CONSTRUCT_PROJECT_DESC:0 "มอบหมายให้แผนกวิทยาศาสตร์รวบรวมและเรียบเรียงข้อมูลเกี่ยวกับโครงสร้างผลึกอันเป็นเอกลักษณ์นี้"

 MINING_BASE_PROJECT:0 "ศูนย์ประมวลผล"
 MINING_BASE_PROJECT_DESC:0 "มอบหมายให้แผนกวิทยาศาสตร์ศึกษาศูนย์ประมวลผลของโดรนขุดแร่โบราณที่ยังเป็นที่รู้จักแห่งสุดท้ายจากระยะไกล"

 ### Anomaly Events

 DEAL_WITH_FLORA:0 "พืชก้าวร้าว"
 DEAL_WITH_FLORA_DESC:0 "พืชพรรณของดาวเคราะห์ดวงนี้มีความคล่องแคล่วอย่างน่าทึ่ง ก้าวร้าวอย่างน่าตกใจ และสมควรอย่างยิ่งที่จะได้รับการศึกษาอย่างใกล้ชิด"

 OLD_GODS_BENEFACTRESS_PROJECT:0 "เทพเจ้าโบราณ: ผู้เกื้อหนุน"
 OLD_GODS_BENEFACTRESS_PROJECT_DESC:2 "ทุกพื้นผิวของศาลเจ้าผู้เกื้อหนุนถูกปกคลุมไปด้วยเครือข่ายภาพสัญลักษณ์อันซับซ้อน ซึ่งดูเหมือนจะบอกเล่าเรื่องราวที่กว้างไกลยิ่งกว่านิทานตกค้างที่ยังหลงเหลืออยู่บน [Root.Owner.Capital.GetName]\n\nแม้จะมีความเกี่ยวข้องอย่างห่างๆ กับภาษาโบราณของ [Root.Owner.GetSpeciesName] ที่เรารู้จัก เทคโนโลยีสมัยใหม่ก็น่าจะช่วยให้เราถอดรหัสภาพสัญลักษณ์เหล่านี้ได้ หากมีเวลาและทรัพยากรมากพอ"
 OLD_GODS_UNDAUNTED_PROJECT:0 "เทพเจ้าโบราณ: ผู้ไม่ครั่นคร้าม"
 OLD_GODS_UNDAUNTED_PROJECT_DESC:2 "วิหารที่ประดิษฐานศาลเจ้าของผู้ไม่ครั่นคร้ามนั้น—สมกับตำนานที่เล่าขานเกี่ยวกับเขา—เต็มไปด้วยอุปกรณ์ที่ไม่อาจระบุที่มาและจุดประสงค์ได้อย่างชัดเจน มันช่างแตกต่างจากกล่องปริศนาและบททดสอบกำลังอันเรียบง่ายที่ครั้งหนึ่งเคยเติมเต็มวิหารของเขาบน [Root.Owner.Capital.GetName] อย่างสิ้นเชิง ครั้งหนึ่งเคยมีคำกล่าวว่าคัมภีร์ศักดิ์สิทธิ์ของเขานั้น มีเพียงผู้ที่คู่ควรอย่างแท้จริงเท่านั้นจึงจะอ่านได้\n\nเครื่องมือวิเคราะห์อันล้ำสมัยของเราน่าจะจัดการรหัสเหล่านี้ได้ไม่ยาก"
 OLD_GODS_PERCIPIENT_PROJECT:0 "เทพเจ้าโบราณ: ผู้หยั่งรู้"
 OLD_GODS_PERCIPIENT_PROJECT_DESC:2 "กำแพงที่โอบล้อมศาลเจ้าแห่งนี้ของผู้หยั่งรู้นั้นถูกเคลือบด้วยชั้นแลคเกอร์จากแร่ธาตุอย่างหนาทึบ แต่ตัวศาลเจ้าเองกลับเปลือยเปล่า\n\nเรื่องราวของผู้หยั่งรู้จะถูกเล่าให้ฟังเฉพาะผู้ที่มีความช่างสังเกตพอจะเข้าใจความหมายของมัน—สิ่งสำคัญคือเราต้องหาว่าสิ่งใดกันแน่ที่ต้องถูกรับรู้"

 LIMBO_1_PROJECT:0 "ค้างคา"
 LIMBO_1_PROJECT_DESC:0 "ห้องเก็บข้อมูลต่างดาวที่เต็มไปด้วยอุปกรณ์จัดเก็บข้อมูลนั้นแทบจะร้องขอให้เราทำการกู้คืนข้อมูลทางโบราณคดี"

 PROJECTING_MOON_PROJECT:0 "การฉายภาพ"
 PROJECTING_MOON_PROJECT_DESC:0 "ดาวเคราะห์ที่ไม่ธรรมดามีดวงจันทร์ที่ไม่ธรรมดา เทคนิคการสแกนทั่วไปให้ผลไม่น่าพอใจ และจำเป็นต้องใช้วิธีลงมือใกล้ชิดมากกว่านี้"

 GRIMACING_PLANET_PROJECT:0 "ดาวเคราะห์แสยะ"
 GRIMACING_PLANET_PROJECT_DESC:0 "ใบหน้าที่เคลื่อนไหวอย่างรุนแรงของดาวเคราะห์ดวงนี้อาจถูกทำให้มั่นคงจนกลายเป็นบางสิ่งที่เหมาะแก่การอยู่อาศัยได้ หากเราลงมือเสียแต่ตอนนี้"

 OLFACTORY_PROJECT:0 "การศึกษากลิ่น"
 OLFACTORY_PROJECT_DESC:0 "โบราณวัตถุต่างดาวชิ้นหนึ่งถูกสงสัยว่าส่งต่อข้อมูลผ่านสารประกอบอะโรมาติกที่ฟุ้งกระจายในอากาศ"

 ULTIMATE_WEAPON_PROJECT:0 "อาวุธสุดยอด"
 ULTIMATE_WEAPON_PROJECT_DESC:0 "มีคลังอาวุธซ่อนอยู่ที่ไหนสักแห่งบนดาวเคราะห์ หากเราหาพบ มันอาจมอบเทคโนโลยีทางการทหารใหม่ให้กับจักรวรรดิของเรา"

 REFINE_ROCK_PROJECT:0 "การทิ้งระดมโพซิตรอน"
 REFINE_ROCK_PROJECT_DESC:0 "การกระจายโพซิตรอนจากวงโคจรอย่างควบคุมได้อาจเปลี่ยนแร่พื้นถิ่นของดาวเคราะห์ให้กลายเป็นรูปแบบที่มีประโยชน์ยิ่งขึ้น"

 CRYSTAL_CODEX_PROJECT:0 "คัมภีร์ผลึก"
 CRYSTAL_CODEX_PROJECT_DESC:0 "โครงสร้างแร่แห่งหนึ่งบรรจุข้อมูลที่เข้ารหัสด้วยโฮโลแกรมไว้ภายใน โครงสร้างของมันคุ้นตา แต่ความหนาแน่นของข้อมูลมหาศาลทำให้การถอดรหัสเป็นเรื่องท้าทาย"

 ALIEN_BARRACKS_PROJECT:0 "ค่ายทหารต่างดาว"
 ALIEN_BARRACKS_PROJECT_DESC:0 "การศึกษาซากปรักหักพังเหล่านี้อย่างใกล้ชิดในเชิงซีโน-สังคม-โบราณคดีอาจมอบข้อมูลเชิงลึกเกี่ยวกับเครื่องจักรสงครามของต่างดาวในอดีต"

 ROBOT_MINERALS_PROJECT:0 "ธรรมชาติทวงคืน"
 ROBOT_MINERALS_PROJECT_DESC:0 "สถานที่ที่ถูกพืชปกคลุมจนรกทึบอาจเก็บซ่อนความลับสำคัญเอาไว้"

 BALANCE_ECOSYSTEM_PROJECT:0 "ปรับสมดุลระบบนิเวศ"
 BALANCE_ECOSYSTEM_PROJECT_DESC:0 "มีการวางแผนเพื่อพยายามปรับสมดุลชีวมณฑลที่เอนเอียงของดาวเคราะห์ โดยใช้เพียงเครื่องมือที่ยานวิทยาศาสตร์มาตรฐานมีอยู่เท่านั้น\n\nอาจเกิดผลลัพธ์ที่คาดไม่ถึงได้"

 HEAD_IN_SAND_PROJECT:0 "ฝังหัวในทราย"
 HEAD_IN_SAND_PROJECT_DESC:0 "กองยานทหารสามารถพยายามกู้ซากยานที่กำลังมุดลึกลงไปเรื่อยๆ ได้"

 THE_PRINCE_PROJECT:0 "เจ้าชาย"
 THE_PRINCE_PROJECT_DESC:0 "ธนาคารข้อมูลที่ถูกพบลอยอยู่ในอวกาศไม่ได้เก็บอะไรไว้นอกจากข้อความยาวเหยียดชิ้นหนึ่ง ซึ่งเขียนด้วยภาษาต่างดาวที่ทั้งแปลกประหลาดแต่ก็คุ้นเคย"

 EMERGENCY_BUOY_PROJECT:0 "ทุ่นฉุกเฉิน"
 EMERGENCY_BUOY_PROJECT_DESC:0 "วัตถุที่เสียหายอย่างหนักชิ้นหนึ่งดูเหมือนจะทำหน้าที่เป็นตัวทวนสัญญาณสื่อสาร"

 WRECKED_FLEET_1:0 "สัญญาณจากอนุสรณ์"
 WRECKED_FLEET_1_DESC:0 "ถอดรหัสข้อความที่เล็ดลอดออกมาจากแท่งหินใหญ่"

 WRECKED_FLEET_2:0 "กองเรือพันธมิตรโบราณ"
 WRECKED_FLEET_2_DESC:0 "ส่งทีมวิศวกรไปซ่อมแซมยานที่ยังพอกู้ได้ให้กลับมาใช้งานได้อีกครั้ง"

 MANUFACTORY_PROJECT:0 "ฟื้นฟูการขุด"
 MANUFACTORY_PROJECT_DESC:0 "ส่งทีมวิศวกรไปซ่อมแซมสถานีวงโคจรโบราณให้กลับมาใช้งานได้อีกครั้ง"

### Colony Events

 HELPFUL_DRONES_1_PROJECT:0 "สิ่งที่ถูกทิ้งไว้"
 HELPFUL_DRONES_1_PROJECT_DESC:0 "มีการอ่านค่าประหลาดมาจากดวงจันทร์ของดาวเคราะห์ มันอาจไม่มีอะไรเลย\n\nแต่มันก็อาจเป็นบางอย่างก็ได้ โดยให้ยานในวงโคจรทำหน้าที่เป็นตัวส่งต่อ นักวิทยาศาสตร์ของอาณานิคมจะสแกนพื้นผิวดวงจันทร์อย่างระมัดระวังเพื่อค้นหาความจริงของเรื่องนี้"
 POLLEN_1_PROJECT:0 "การศึกษาพืชพรรณ"
 POLLEN_1_PROJECT_DESC:0 "พืชพื้นถิ่นบางชนิดของดาวเคราะห์ดวงนี้แสดงคุณสมบัติที่อาจน่าสนใจอยู่หลายประการ"
 POLLEN_2_PROJECT:0 "การศึกษาแรงงาน"
 POLLEN_2_PROJECT_DESC:0 "งานวิจัยล่าสุดหลายชิ้นจากสถาบันการศึกษาชั้นนำของ [Root.Owner.GetSpeciesName] ได้นำเสนอทางเลือกจำนวนหนึ่งในการจัดระเบียบแรงงานมหาศาล การวิเคราะห์เชิงอภิมานอย่างละเอียดของแนวคิดใหม่เหล่านี้อาจให้คำตอบต่อปัญหาผลผลิตที่ถดถอยในสภาพแวดล้อมอาณานิคมอันยากลำบาก"
 POLLEN_3_PROJECT:0 "ลางร้ายที่ใกล้เข้ามา"
 POLLEN_3_PROJECT_DESC:0 "สถานการณ์บนดาวเคราะห์ที่ถูกละอองเกสรปกคลุมได้เปลี่ยนทิศทางไปในทางที่อาจเป็นอันตราย การประเมินสถานการณ์เฉพาะของอาณานิคมอย่างรวดเร็ว โดยเฉพาะปัจจัยด้านสิ่งแวดล้อมที่ยิ่งทวีความผันผวน มีความสำคัญอย่างยิ่ง\n\nเมื่อรู้ภัยคุกคามทั้งหมดแล้ว เราก็สามารถร่างและดำเนินแผนปฏิบัติการได้ภายในไม่กี่ชั่วโมง"

### Starting Events

# Wanderlust
 ROGUE_SCIENTIST_1_PROJECT:0 "ใจใฝ่พเนจร: สิ่งที่ถูกทิ้งไว้"
 ROGUE_SCIENTIST_1_PROJECT_DESC:0 "การจากไปอย่างไร้ร่องรอยของประธานจากระบบนี้ ทิ้งมวลร่องรอยพลังงานตกค้างอันชวนพิศวงให้ล่องลอยไปตามลมสุริยะ\n\nหวังว่าการวิเคราะห์พลังงานเหล่านี้อย่างสมบูรณ์จะชี้ทางไปยังจุดหมายถัดไปของประธาน และหากจำเป็น ก็จะช่วยให้ติดตามพวกเขาได้ง่ายขึ้นในอนาคต"

# Mass Extinction
 MASSEX_1_PROJECT:0 "วิเคราะห์: แตกสลาย"
 MASSEX_1_PROJECT_DESC:0 "สร้างอดีตอันเจ็บปวดของวัตถุท้องฟ้านี้ขึ้นใหม่"
 MASSEX_2_PROJECT:0 "วิเคราะห์: แผดเผา"
 MASSEX_2_PROJECT_DESC:0 "สร้างอดีตอันเจ็บปวดของวัตถุท้องฟ้านี้ขึ้นใหม่"
 MASSEX_3_PROJECT:0 "วิเคราะห์: รกร้าง"
 MASSEX_3_PROJECT_DESC:0 "สร้างอดีตอันเจ็บปวดของวัตถุท้องฟ้านี้ขึ้นใหม่"
 MASSEX_4_PROJECT:0 "วิเคราะห์: เป็นพิษ"
 MASSEX_4_PROJECT_DESC:0 "สร้างอดีตอันเจ็บปวดของวัตถุท้องฟ้านี้ขึ้นใหม่"
 MASSEX_5_PROJECT:0 "วิเคราะห์: หนาวเย็น"
 MASSEX_5_PROJECT_DESC:0 "สร้างอดีตอันเจ็บปวดของวัตถุท้องฟ้านี้ขึ้นใหม่"
