 ### Utopia

 UTOPIA_TITLE: "Utopia" # Do not translate
 DLC_UTOPIA_RECOMMENDATION_DESC:1 "มินิภาคเสริม §Sยูโทเปีย§! ช่วยให้คุณควบคุมจักรวรรดิได้อย่างละเอียดยิ่งขึ้น และปลดล็อกการสร้างสิ่งก่อสร้างขนาดมหึมา(โพรไฟล์เมก้า)"
 DLC_UTOPIA_RECOMMENDATION_REASON_HIVEMIND_REC:1 "เราขอแนะนำ §Sยูโทเปีย§! เนื่องจากโครงสร้างของจักรวรรดินี้เหมาะสมกับประเภทจักรวรรดิใหม่ นั่นคือ จิตสำนึกร่วม(หัวเราะ)"
 DLC_UTOPIA_RECOMMENDATION_REASON_UNIFY_POLICE_REC:1 "เราขอแนะนำ §Sยูโทเปีย§! เนื่องจากโครงสร้างของจักรวรรดินี้เหมาะสมกับกลไกและเนื้อหาที่เน้นไปที่การรวมเป็นหนึ่งหรือการควบคุมประชากร"
 DLC_UTOPIA_RECOMMENDATION_REASON_SLAVERY_REC:1 "เราขอแนะนำ §Sยูโทเปีย§! เนื่องจากโครงสร้างของจักรวรรดินี้ช่วยเสริมกลไกการควบคุมประชากรและการเพิ่มประสิทธิภาพของกำลังแรงงาน"

