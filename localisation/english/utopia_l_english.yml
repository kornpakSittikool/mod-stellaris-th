 ring_world_1_MEGASTRUCTURE_DETAILS:1 "§Y$pc_ringworld_habitable$§! สามารถมีโซนคล้ายดาวเคราะห์หลายๆโซน โดยกินดาวเคราะห์ดวงอื่นทั้งหมดในระบบเพื่อหาวัตถุดิบ"
 ring_world_1_CONSTRUCTION_INFO_DELAYED:4 "โลกวงแหวนที่สมบูรณ์ประกอบด้วยเซ็กชันโลกวงแหวนที่เสร็จสมบูรณ์ 4 เซ็กชัน ซึ่งแต่ละเซ็กชันเทียบเท่ากับโลกไกอาขนาดมหึมา"
 ring_world_1:0 "โลกวงแหวน (ขั้นที่1:ที่ตั้ง)"
 ring_world_1_DESC:0 "คอมเพล็กซ์นี้จะทำหน้าที่เป็นลานเตรียมการ คลังเก็บทรัพยากร และที่พักอาศัยสำหรับบุคลากรหลายแสนคนที่เกี่ยวข้องกับการก่อสร้างโลกวงแหวน"
 ring_world_2_intermediate:0 "โลกวงแหวน (ขั้นที่2:ขึ้นเฟรม)"
 ring_world_2_intermediate_DESC:0 "โครงร่างแกนกระดูกเริ่มต้นนี้ล้อมรอบดวงอาทิตย์ของระบบดาว และทำหน้าที่เป็นแพลตฟอร์มที่เราจะสร้างส่วนที่อยู่อาศัยได้อย่างสมบูรณ์ในที่สุด"
 ring_world_2:0 "โลกวงแหวน (ขั้นที่2:ส่วนเฟรม)"
 ring_world_2_DESC:0 "เซ็กชันโครงกระดูกนี้ประกอบขึ้นเป็นประมาณหนึ่งในสี่ของพื้นที่ผิวทั้งหมดของโลกวงแหวนที่ยังสร้างไม่เสร็จ งานสร้างส่วนที่อยู่อาศัยขนาดเล็กยังไม่เสร็จสิ้น"
 ring_world_3_intermediate:0 "โลกวงแหวน (ขั้นที่3:ส่วนตัวโลก)"
 ring_world_3_intermediate_DESC:0 "เซ็กชันโลกวงแหวนสำหรับอยู่อาศัยที่ทำงานได้เต็มรูปแบบ พร้อมด้วยชีวมณฑลที่สมบูรณ์ และพร้อมสำหรับการตั้งถิ่นฐานแล้ว"


 think_tank_0_MEGASTRUCTURE_DETAILS:1 "ห้องปฏิบัติการวิจัยและคลังฐานข้อมูลของ §Y$think_tank_3$§! สร้างความยิ่งใหญ่ทางวิทยาศาสตร์ที่ไร้สิ่งเจือปน"
 think_tank_0:0 "สถานีเชื่อมโยงวิทยาศาสตร์ขนาดใหญ่ (ขั้นที่0:ที่ตั้ง)"
 think_tank_0_DESC:0 "พื้นที่เริ่มต้นนี้จะทำหน้าที่เป็นฐานสำหรับการก่อสร้างสถานีเชื่อมโยงวิทยาศาสตร์ขนาดใหญ่ในอนาคต"
 think_tank_1:0 "สถานีเชื่อมโยงวิทยาศาสตร์ขนาดใหญ่ (ขั้นที่1:ฮับ)"
 think_tank_1_DESC:0 "ติดตั้งด้วยเครื่องปฏิกรณ์ภาวะเอกฐานที่ล้ำสมัย แกนกลางจะตอบสนองความต้องการพลังงานส่วนใหญ่ของเน็กซัส และจะเชื่อมโยงกับสิ่งอำนวยความสะดวกการวิจัยในอนาคต"
 think_tank_2:0 "สถานีเชื่อมโยงวิทยาศาสตร์ขนาดใหญ่ (ขั้นที่2)"
 think_tank_2_DESC:0 "ปีกอาคารวิจัยจะประกอบด้วยห้องปฏิบัติการส่วนใหญ่และจัดหาที่อยู่อาศัยสำหรับนักวิทยาศาสตร์ มาพร้อมกับห้องรักษาความปลอดภัยหลายห้องเพื่อให้สามารถปิดล็อกพื้นที่ต่างๆ ได้อย่างสมบูรณ์หากจำเป็น"
 think_tank_3:0 "สถานีเชื่อมโยงวิทยาศาสตร์ขนาดใหญ่"
 think_tank_3_DESC:0 "สถานีเชื่อมโยงวิทยาศาสตร์ขนาดใหญ่ที่พร้อมทำงานและติดตั้งอุปกรณ์ครบครัน"
 think_tank_4:0 "Groik Nexus (ขั้นที่4)"
 think_tank_4_DESC:0 "เน็กซัสนี้ตั้งชื่อตามผู้ประดิษฐ์ มีธนาคารประสาทที่บรรจุสมองของนักวิจัยที่ดีที่สุดคนหนึ่งของเราผสานเข้ากับไดรฟ์หลัก ช่วยให้มันทำงานด้วยความเร็วที่เพิ่มขึ้น"
 #allow_dysons_sphere:0 "§HUnlocks Megastructure:§! Dyson Sphere"
 allow_ring_world:0 "§Hปลดล็อกสิ่งก่อสร้างขนาดมหึมา:§! โลกวงแหวน / พิภพวงแหวน"
 allow_spy_orb:0 "§Hปลดล็อกสิ่งก่อสร้างขนาดมหึมา:§! อาร์เรย์สังเกตุการณ์กาแล็กซี"
 allow_think_tank:0 "§Hปลดล็อกสิ่งก่อสร้างขนาดมหึมา:§! สถานีเชื่อมโยงวิทยาศาสตร์ขนาดใหญ่"
 ap_master_builders_habitat_size:2 "§Hที่อยู่อาศัยในอวกาศ§! ของจักรวรรดิเราจะมีที่ว่างเพิ่มเติมอีก §Y2§! เขต"
 allow_edict_consectrated_worlds:5 "§Hปลดล็อกการตัดสินใจ:§! ดาวศักดิ์สิทธิ์\n"
 describe_edict_consectrated_worlds:5 "§Eทำดาวเคราะห์ที่ไม่มีใครอยู่ให้เป็นดาวศักดิ์สิทธิ์ (สูงสุดที่ §Y3§!) เพิ่ม §Yแรงดึงดูดจริยธรรมจิตวิญญาณ§! และ §Yความอยู่ดีกินดีทั่วทั้งจักรวรรดิ§! เช่นเดียวกับ £unity£ §Yการสร้างเอกภาพ§! ตามระดับความศักดิ์สิทธิ์ของดาวเคราะห์ (เมื่อทำเสร็จแล้ว)§!"
 allow_machine_worlds:3 "- §Yปลดล็อกตัวเลือกการปรับสภาพดาว:§! โลกจักรกล ['concept_pc_machine']\n- §Yปลดล็อกความเชี่ยวชาญพิเศษของเขต £zone£:§! $zone_machine_replication$"
 describe_machine_worlds:7 "- แทนที่ §Yเขตชนบท £district£§! ด้วย §Yเขตเน็กซัส £district£§! ที่เชี่ยวชาญพิเศษ\n- เพิ่มที่อยู่อาศัยและอาชีพจาก §Yเขต £district£§! ทั้งหมด\n- §Rไม่สามารถอยู่อาศัยได้สำหรับสายพันธุ์อินทรีย์ส่วนใหญ่§!"
 allow_hive_worlds:1 "§Hปลดล็อกตัวเลือกการปรับสภาพดาว:§! โลกไฮฟ์(ไฮฟ์ เวิลด์)\n§Hปลดล็อกความเชี่ยวชาญพิเศษของเขตโลกไฮฟ์:§! £zone£ $zone_spawning$"
 describe_hive_worlds:1 "ไม่สามารถอยู่อาศัยได้สำหรับสายพันธุ์ที่ไม่ได้เป็นไฮฟ์\nสร้างเขต §Yไฮฟ์ £district£§! ได้ไม่จำกัด\nเพิ่มที่อยู่อาศัยและอาชีพเป็นสองเท่าจาก §Yเขต £district£§! ทั้งหมด\nผลผลิตทรัพยากรของประชากร £pop£: §G+10%§!\n§Rกำจัดเขตชนบททั้งหมดออกไป§!"

 ALLOW_PSI_CORPS:1 "ปลดล็อกสิ่งก่อสร้าง: ['building:building_psi_corps']"
 ALLOW_PSI_ARMIES:0 "ขณะนี้สามารถเกณฑ์ §H$psionic_army_plural$§! ได้แล้ว"

 dyson_sphere_0_MEGASTRUCTURE_DETAILS:1 "§Y$dyson_sphere_5$§! ห่อหุ้มดาวฤกษ์จนเต็มดวง โดยแปลงพลังงานแสงจากดาวฤกษ์ทั้งหมดเป็น £energy£ เครดิตพลังงานโดยตรง"
 dyson_sphere_0_CONSTRUCTION_INFO_DELAYED:4 "§Rทรงกลมไดสัน $dyson_sphere_5$ จะบดบังแสงอาทิตย์อย่างสมบูรณ์ ทำให้ดาวเคราะห์ทั้งหมดในระบบดาวกลายเป็นโลกที่แห้งแล้งหรือโลกที่เย็นจัด\n\nวัตถุในอวกาศใดๆ ที่กำลังเตรียมการปรับเปลี่ยนดาวเคราะห์ในระบบดาวจะได้รับความเสียหายอย่างสิ้นเชิง§!"
 dyson_sphere_0:0 "ทรงกลมไดสัน (ขั้นที่0:ที่ตั้ง)"
 dyson_sphere_0_DESC:0 "สถานีสถานที่ก่อสร้างทำหน้าที่เป็นฐานสำหรับการก่อสร้างทรงกลมไดสันในอนาคต"
 dyson_sphere_1:0 "ทรงกลมไดสัน (ขั้นที่1:ขึ้นเฟรม)"
 dyson_sphere_1_DESC:0 "โครงร่างเป็นรากฐานสำหรับทรงกลมไดสันในอนาคตและยังไม่สามารถผลิตพลังงานใดๆ ได้"
 dyson_sphere_2:1 "ทรงกลมไดสัน: ขั้นต้น"
 dyson_sphere_2_DESC:0 "ทรงกลมไดสันที่ใช้งานได้บางส่วน - ประสิทธิภาพการผลิตพลังงาน §Y25%§!"
 dyson_sphere_3:1 "ทรงกลมไดสัน: ขั้นกลาง"
 dyson_sphere_3_DESC:0 "ทรงกลมไดสันที่ใช้งานได้บางส่วน - ประสิทธิภาพการผลิตพลังงาน §Y50%§!"
 dyson_sphere_4:1 "ทรงกลมไดสัน: ขั้นสุดท้าย"
 dyson_sphere_4_DESC:0 "ทรงกลมไดสันที่ใช้งานได้บางส่วน - ประสิทธิภาพการผลิตพลังงาน §Y75%§!"
 dyson_sphere_5:0 "ทรงกลมไดสัน"
 dyson_sphere_5_DESC:0 "ทรงกลมไดสันที่ใช้งานได้เต็มรูปแบบ - ประสิทธิภาพการผลิตพลังงาน §G100%§!"
 COLONIZATION_IMPOSSIBLE_DYSON_SPHERE: "§R$TRIGGER_FAIL$ไม่สามารถตั้งอาณานิคมได้เนื่องจากมี §Y$dyson_sphere_5$§! รอบดาวฤกษ์ของระบบดาวนี้§!"
 COLONIZATION_IMPOSSIBLE_DYSON_SPHERE_CONSTRUCTION: "§R$TRIGGER_FAIL$ไม่สามารถตั้งอาณานิคมได้เนื่องจากการก่อสร้าง §Y$dyson_sphere_5$§! ที่กำลังดำเนินอยู่§!"
 requires_no_dyson_sphere: "$TRIGGER_FAIL$ไม่สามารถสร้างในระบบเดียวกันกับ §Y$dyson_sphere_5$§! ที่มีอยู่ได้"
 requires_no_dyson_sphere_construction: "$TRIGGER_FAIL$ไม่สามารถสร้างในระบบเดียวกันกับ §Yโครงสร้าง$dson sphre 5§! ที่กำลังสร้างอยู่ได้"

 spy_orb_0_MEGASTRUCTURE_DETAILS:1 "ขั้นของ §Y$spy_orb_4$§! จะค่อยๆขยายช่วงเซ็นเซอร์จนในที่สุดก็ครอบคลุมทั้งกาแล็กซี"
 spy_orb_0_CONSTRUCTION_INFO_DELAYED:3 "ขั้นของ $spy_orb_4$ จะค่อยๆขยายช่วงเซ็นเซอร์จนในที่สุดก็ครอบคลุมทั้งกาแล็กซี"
 spy_orb_0:0 "อาร์เรย์สังเกตุการณ์กาแล็กซี (ขั้นที่0:ที่ตั้ง)"
 spy_orb_0_DESC:0 "สถานีก่อสร้างทำหน้าที่เป็นฐานสำหรับการประกอบอาร์เรย์สังเกตการณ์ในอนาคต"
 spy_orb_1:0 "อาร์เรย์สังเกตุการณ์กาแล็กซี (ขั้นที่1:ฮับ)"
 spy_orb_1_DESC:0 "ด่านรับฟังสัญญาณที่ล้ำสมัยซึ่งควบคุมโดยเจ้าหน้าที่นักดาราศาสตร์และนักวิเคราะห์ยุทธวิธีประจำการอย่างถาวร"
 spy_orb_2:0 "อาร์เรย์สังเกตุการณ์กาแล็กซี (ขั้นที่2:ขึ้นยอด)"
 spy_orb_2_DESC:0 "แผงครีบสั่นไหวที่จัดวางตามแกนกลางทำหน้าที่แยกแยะสัญญาณที่เบาบางจากรังสีพื้นหลังที่แพร่กระจายอยู่ทั่วไป"
 spy_orb_3:0 "อาร์เรย์สังเกตุการณ์กาแล็กซี (ขั้นที่3:เสาสัญญาณ)"
 spy_orb_3_DESC:0 "เสาอากาศคงที่ขนาดมหึมาช่วยเพิ่มพื้นที่ครอบคลุมสัญญาณดิบอย่างที่ไม่เคยมีมาก่อน"
 spy_orb_4:0 "อาร์เรย์สังเกตุการณ์กาแล็กซี"
 spy_orb_4_DESC:0 "อาร์เรย์สังเกตการณ์ที่สมบูรณ์ขยายระยะเซ็นเซอร์ให้ครอบคลุมทั่วทั้งดาราจักร"

 #utopia.2001.desc:0 "Word has reached us that the [From.GetName] has undertaken a construction project of monumental proportions in the SYSTEM system. They are building a massive Ring World around the system's primary, and as a first step they have converted the matter of all nearby planetary bodies into the initial metal skeleton of the megastructure.\n\nGiven the staggering size of the project and the immense challenges inherent in creating new habitats and ecosystems from scratch, it will likely be some time before the Ring World is completed."

 15_HOSTILE_GREETING:0 "ความเหยียดหยามที่ [Root.GetRulerTitle] ของเรามีต่อคุณนั้นได้รับการร่วมรับรู้โดยคนทั้งชาติของเรา [From.GetSpeciesName] แท้จริงแล้ว [Root.GetSpeciesOrganName] ของฉันรู้สึกปั่นป่วนเพียงแค่เห็นคุณ"
 16_HOSTILE_GREETING:0 "คุณช่างประสบความสำเร็จน้อยเหลือเกินในสังคมที่วุ่นวายและไร้ระเบียบของคุณ [From.GetSpeciesName] ฉันคิดว่ามันช่างโง่เขลาเหลือเกินที่จะเชื่อว่าวัฒนธรรมเช่นคุณจะสามารถสร้างผู้นำที่ยิ่งใหญ่เช่น [Root.GetRulerTitle] ของเราได้"
 15_FRIENDLY_GREETING:0 "คุณสร้างความประทับใจให้แก่ [Root.GetRulerTitle] ของเราอย่างมาก [From.GetSpeciesName] คุณคือมิตรสหายของ [Root.GetName]"

 action.1.f:0 "§E[Root.GetRulerTitle] [Root.GetRulerName] ขอทักทายพวกท่าน [contact_speaker.GetSpeciesNamePlural]§!"
 action.1.g:0 "§Eพวกเราขอรับใช้ [Root.GetRulerTitle] [Root.GetRulerName], [contact_speaker.GetSpeciesNamePlural]§!"
 action.1.i:0 "§Eเราแสวงหาความเท่าเทียมที่แท้จริง - อย่ายืนขวางทางเรา§!"
 action.1.ad:0 "§Eพวกของท่านจะไม่เป็นภัยคุกคามต่อ [Root.GetRulerTitle] ของเรา§!"
 action.1.ar:1 "§E[Root.GetRulerName] กล่าวในนามของประชาชน [Root.GetAdj]§!"

 anomaly.168.d.tooltip:2 "เริ่มยุคฟื้นฟูศิลปวิทยาทางศาสนา เปลี่ยนแปลงแนวคิดความเชื่อจักรวรรดิเข้าสู่ §Yฝ่ายจิตวิญญาณ (Spiritualist)§!"
 precursor.2200.desc.b:0 "หลังจากสำรวจโลกวงแหวนขนาดมหึมาที่พบในระบบดาว §Y[From.GetStarName]§! เจ้าหน้าที่วิทยาศาสตร์ §Y[Root.GetLeaderName]§! รายงานว่ามันมีความคล้ายคลึงกับโลกวงแหวนของเราหลายประการ แม้ว่าจะมีอายุมากแล้วก็ตาม\n\nอย่างไรก็ตาม มีความแตกต่างที่สำคัญประการหนึ่ง นั่นคือ ส่วนของวงแหวนดูเหมือนจะถูกสร้างขึ้นบางส่วนจากทรัพยากรใหม่ที่ไม่รู้จักสำหรับเรา รายงานเบื้องต้นอธิบายว่ามันเป็นเหมือน \"โลหะมีชีวิต\"(เสียงโลหะ)ไม่ว่ามันจะเป็นอะไรก็ตาม ควรได้รับการศึกษาอย่างใกล้ชิดยิ่งขึ้น"

 requires_planets_for_material:0 "$TRIGGER_FAIL$ไม่สามารถสร้างในระบบดาวที่ไม่มีวัตถุดาวเคราะห์เพื่อใช้เป็นวัสดุก่อสร้างได้"
 requires_no_existing_megastructure:1 "$TRIGGER_FAIL$ไม่สามารถสร้างได้เนื่องจากมีสิ่งก่อสร้างขนาดมหึมาอยู่แล้ว"
 requires_no_orbital_debris:0 "$TRIGGER_FAIL$ไม่สามารถสร้างได้เนื่องจากมีเศษซากในวงโคจร"
 requires_no_existing_gateway:0 "$TRIGGER_FAIL$ไม่สามารถสร้างได้เนื่องจากมีเกตเวย์อยู่แล้ว"
 requires_no_orbital_station:1 "$TRIGGER_FAIL$ไม่สามารถสร้างได้เนื่องจากมีสถานีวงโคจรอยู่แล้ว"
 requires_no_habitable_planets:1 "$TRIGGER_FAIL$ไม่สามารถสร้างในระบบดาวที่มีดาวเคราะห์ที่อยู่อาศัยได้"
 requires_no_colonies: "$TRIGGER_FAIL$ไม่สามารถสร้างในระบบดาวที่มีดาวอาณานิคมตั้งอยู่แล้ว"
 blocked_by_pre_ftl_policy: "$TRIGGER_FAIL$ต้องการนโยบายการแทรกแซงแบบ §Y$interference_aggressive$§! เพื่อก่อสร้างในระบบดาวที่มีอารยธรรมดึกดำบรรพ์ก่อน FL"
 requires_surveyed_system:1 "ไม่สามารถสร้างในระบบดาวที่ยังไม่ได้รับการรังวัดสำรวจข้อมูล"
 requires_inside_border:1 "$TRIGGER_FAIL$ไม่สามารถสร้างนอกพรมแดนจักรวรรดิได้"
 requires_inside_border_or_subject:0 "$TRIGGER_FAIL$ไม่สามารถสร้างนอกพรมแดนจักรวรรดิหรือบริวารได้"
 must_build_around_star:1 "$TRIGGER_FAIL$ต้องสร้างขึ้นรอบดาวฤกษ์"
 requires_no_black_hole:1 "$TRIGGER_FAIL$ไม่สามารถสร้างโลกวงแหวนรอบหลุมดำได้"
 requires_no_black_hole_or_dyson_sphere:0 "$TRIGGER_FAIL$ไม่สามารถสร้างในระบบที่มีหลุมดำหรือทรงกลมไดสันได้"
 requires_borders_survey_no_habitable:1 "$TRIGGER_FAIL$ไม่สามารถสร้างในระบบที่มีดาวเคราะห์อาศัยอยู่ได้หรือหลุมดำ, ระบบที่ยังรังวัดไม่เสร็จ หรืออยู่นอกเขตพรมแดนจักรวรรดิ"
 requires_borders_survey_no_habitable_dyson:1 "$TRIGGER_FAIL$ไม่สามารถสร้างในระบบที่มีดาวเคราะห์อาศัยอยู่ได้, หลุมดำ, ดาวนิวตรอนหรือพัลซาร์, ระบบที่ยังรังวัดไม่เสร็จ หรืออยู่นอกเขตพรมแดนจักรวรรดิ"
 requires_survey_not_habitable:1 "$TRIGGER_FAIL$ไม่สามารถสร้างบนดาวเคราะห์ที่ยังไม่ได้สำรวจหรือดาวเคราะห์ที่อยู่อาศัยได้"
 requires_surveyed_planet:0 "$TRIGGER_FAIL$ไม่สามารถสร้างบนดาวเคราะห์ที่ยังไม่ได้สำรวจได้"
 requires_not_minor_planetary_body:1 "$TRIGGER_FAIL$ไม่สามารถสร้างบนดาวเคราะห์ขนาดเล็ก (ดาวเคราะห์น้อยหรือดวงจันทร์) ได้"
 requires_not_star:1 "$TRIGGER_FAIL$ไม่สามารถสร้างรอบดาวฤกษ์ได้"
 requires_not_astral_scar: "$TRIGGER_FAIL$ไม่สามารถสร้างรอบรอยแผลเป็นดารา(แผลเป็นจากภายนอก)ได้"
 requires_no_existing_spyorb:0 "$TRIGGER_FAIL$ไม่สามารถสร้างอาร์เรย์สังเกตการณ์ดาราจักรได้มากกว่าหนึ่งเครื่อง"
 requires_no_existing_think_tank:0 "$TRIGGER_FAIL$ไม่สามารถสร้างสถานีเชื่อมโยงวิทยาศาสตร์ได้มากกว่าหนึ่งเครื่อง"
 requires_no_existing_dyson_sphere:0 "$TRIGGER_FAIL$ไม่สามารถสร้างทรงกลมไดสันได้มากกว่าหนึ่งเครื่อง"
 requires_no_existing_spyorb_two:0 "$TRIGGER_FAIL$ไม่สามารถสร้างอาร์เรย์สังเกตการณ์ดาราจักรได้มากกว่าสองเครื่อง"
 requires_no_existing_think_tank_two:0 "$TRIGGER_FAIL$ไม่สามารถสร้างสถานีเชื่อมโยงวิทยาศาสตร์ได้มากกว่าสองเครื่อง"
 requires_no_existing_dyson_sphere_two:0 "$TRIGGER_FAIL$ไม่สามารถสร้างทรงกลมไดสันได้มากกว่าสองเครื่อง"
 requires_no_black_hole_neutron_star_pulsar:0 "$TRIGGER_FAIL$ไม่สามารถสร้างรอบหลุมดำ, ดาวนิวตรอน หรือพัลซาร์ได้"
 requires_no_anomaly:1 "$TRIGGER_FAIL$ไม่สามารถสร้างบนดาวเคราะห์ที่ยังมีสิ่งผิดปกติ(เสียงตกใจ)ที่ยังไม่ได้ศึกษา"
 requires_not_ring_world:0 "$TRIGGER_FAIL$ไม่สามารถสร้างบนโลกวงแหวนได้"
 requires_barren_planet:1 "$TRIGGER_FAIL$สามารถสร้างได้บนโลกที่แห้งแล้ง(โลกของบาร์เร็น)เท่านั้น"

 progress.3.desc_08:0 "ยานตั้งอาณานิคมของเราได้ร่อนลงจอดอย่างนุ่มนวลบนทุ่งหญ้าสะวันนาอันกว้างใหญ่ซึ่งครอบคลุมพื้นที่ส่วนใหญ่ของ §Y[Root.GetName]§! อากาศที่ระยิบระยับนั้นแห้งแต่ก็น่ารื่นรมย์ สัตว์กินพืชที่เชื่องฝูงใหญ่ยืนมองดูอยู่ห่างๆ ในขณะที่จุดลงจอดแห่งแรกของเราได้รับการสถาปนา\n\nตัวยานได้รับการดัดแปลงอย่างถาวรเป็นที่ทำการบริหารของถิ่นฐานใหม่ แกนปฏิกรณ์ของมันกำลังอยู่ในกระบวนการถอดออกเพื่อทำหน้าที่เป็นแหล่งพลังงานชั่วคราวของอาณานิคม\n\nเต็นท์ขนาดเล็กและที่พักสำเร็จรูปหลายร้อยหลังผุดขึ้นรอบๆ ตัวยานอวกาศขนาดมหึมา เมื่อผู้ตั้งถิ่นฐานเริ่มทยอยลงจากยานในจำนวนมาก — เมืองแรกของชาว [Root.Owner.GetSpeciesName] บนโลกต่างดาว"
 progress.3.desc_09:0 "ยานตั้งอาณานิคมของเราสามารถร่อนลงจอดอย่างสง่างามระหว่างยอดเขาสูงชันซึ่งพบได้ทั่วไปในภูมิประเทศที่ขรุขระของ §Y[Root.GetName]§! ยานได้ลงจอดในหุบเขาที่มีกำบังซึ่งจะทำหน้าที่เป็นจุดลงจอดแรกในอุดมคติ\n\nตัวยานได้รับการดัดแปลงอย่างถาวรเป็นที่ทำการบริหารของถิ่นฐานใหม่ แกนปฏิกรณ์ของมันกำลังอยู่ในกระบวนการถอดออกเพื่อทำหน้าที่เป็นแหล่งพลังงานชั่วคราวของอาณานิคม\n\nเต็นท์ขนาดเล็กและที่พักสำเร็จรูปหลายร้อยหลังผุดขึ้นรอบๆ ตัวยานอวกาศขนาดมหึมา เมื่อผู้ตั้งถิ่นฐานเริ่มทยอยลงจากยานในจำนวนมาก — เมืองแรกของชาว [Root.Owner.GetSpeciesName] บนโลกต่างดาว"

 fleet_maneuvers_recruitment:0 "การระดมพลทัพเรือ"
 fleet_maneuvers_recruitment_desc:0 "การซ้อมรบทางเรือเมื่อเร็วๆ นี้ส่งผลกระตุ้นความสนใจในกองทัพเรือในหมู่สาธารณชนอย่างมาก เรามีทหารเกณฑ์ใหม่จำนวนมาก ซึ่งหมายความว่าเราจะเสียทรัพยากรน้อยลงในการหาลูกเรือสำหรับยานอวกาศของเรา"
 fleet_maneuvers:0 "การซ้อมรบกองยาน"
 fleet_maneuvers_desc:0 "ผลจากการซ้อมรบกองยานขนาดใหญ่ที่เราเพิ่งจัดขึ้นเมื่อเร็วๆ นี้ ลูกเรือทหารเรือที่ได้รับการฝึกฝนมาเป็นอย่างดีของเรามีความสามารถในการรักษาอัตราการยิงที่สูงขึ้น"
 maneuvers_canceled:0 "ยกเลิกการซ้อมรบกองยาน"
 maneuvers_canceled_desc:0 "ผู้นำทางทหารจำนวนมากไม่พอใจอย่างมากเนื่องจากการยกเลิกการซ้อมรบกองยานตามแผนที่วางไว้เมื่อเร็วๆ นี้ พวกเขารู้สึกว่านั่นเป็นสัญญาณของความอ่อนแอที่ยอมรับไม่ได้ ซึ่งประเทศเพื่อนบ้านจะเข้าฉกฉวยผลประโยชน์แน่นอน"
 maneuvers_no_protest:0 "ไม่ได้ประท้วงการซ้อมรบ"
 maneuvers_no_protest_desc:0 "กองทัพจำนวนมากโกรธจัดกับความจริงที่ว่าเราล้มเหลวในการคัดค้านทางการทูตต่อการฝึกซ้อมกองยานต่างชาติขนาดใหญ่ที่เกิดขึ้นใกล้กับพรมแดนของเราเมื่อเร็วๆ นี้"

 standardized_colony_ships:0 "รูปแบบยานอาณานิคมมาตรฐาน"

 opinion_maneuvers_hardline:0 "การซ้อมรบกองยาน"
 opinion_maneuvers_conciliatory:0 "$opinion_maneuvers_hardline$"
 opinion_maneuvers_canceled:0 "ยกเลิกการซ้อมรบกองยาน"

 FLESH_IS_WEAK_PROJECT:0 "ร่างกายเป็นสิ่งที่อ่อนแอ"
 FLESH_IS_WEAK_PROJECT_DESC:0 "มีแต่คนโง่เขลาเท่านั้นที่ยังคงยึดติดกับเครื่องมือที่เสื่อมโทรมชำรุดทรุดโทรมยามที่มีสิ่งที่ดีกว่านำเสนอ\n\nขณะนี้เรามีเทคโนโลยีที่เหมาะสมในการทำให้ส่วนรากเทียมไซเบอร์เนติกพร้อมใช้งานสำหรับประชากรของ [Root.GetName] ในวงกว้าง พลเมืองของเราจะแข็งแกร่งขึ้น รวดเร็วขึ้น และชาญฉลาดยิ่งขึ้นเนื่องจากแขนขาและอวัยวะถูกแทนที่ด้วยเครื่องจักรที่ได้รับการปรับปรุง"
 SYNTHETIC_EVOLUTION_PROJECT:0 "วิวัฒนาการจักรกลสังเคราะห์"
 SYNTHETIC_EVOLUTION_PROJECT_DESC:0 "ถึงเวลาทิ้งภาชนะอินทรีย์ที่มีข้อบกพร่องของเราไว้เบื้องหลังและน้อมรับความเป็นอมตะ เราต้องเตรียมร่างสังเคราะห์ขั้นสูงสำหรับประชากรทั้งหมดของเรา จากนั้นจึงเริ่มกระบวนการถ่ายโอนจิตสำนึก"

 TRAIT_IMPROVES_LEADERS:0 "ผู้นำจากสายพันธุ์นี้มีคุณลักษณะเพิ่มเติมพิเศษ"

 trait_cybernetic:0 "ไซเบอร์เนติก"
 trait_cybernetic_desc:0 "§Lสายพันธุ์นี้ยอมรับระบบไซเบอร์เนติกจนถึงระดับที่สมาชิกในสังคมสามารถถือเป็นไซบอร์กได้ พวกเขาแทนที่ชิ้นส่วนร่างกายที่เป็นอินทรีย์ด้วยเครื่องจักรขั้นสูงเป็นกิจวัตร§!\n"
 TRAIT_CYBORG_EFFECT: "ทดแทนความต้องการอาหาร $food_with_icon$ (หรือเทียบเท่า) ในค่าบำรุงรักษา §Y50%§! ด้วยค่าบำรุงรักษาพลังงาน $energy_with_icon$"
 trait_latent_psionic:0 "พลังจิตแฝง"
 trait_latent_psionic_desc:0 "§Lสายพันธุ์นี้มีขีดความสามารถพลังจิตแฝง ซึ่งหลับใหลอยู่ในสมาชิกส่วนใหญ่ของสังคม แม้จะพบได้ค่อนข้างยาก แต่พลังเหล่านี้จะปรากฏในผู้นำบางคน§!\n"

 trait_cyborg_power_drills:0 "สว่านพลังงานสูง"
 trait_cyborg_power_drills_desc:0 "§Lติดตั้งไซบอร์กด้วยสว่านพลังงานไฟฟ้า แล้วในทันใดนั้น ทุกสิ่งรอบตัวก็ดูเหมือนแหล่งแร่ไปหมด§!"
 trait_cyborg_harvesters:0 "ผู้อำนวยการเก็บเกี่ยว"
 trait_cyborg_harvesters_desc:0 "§Lชุดเครื่องมือต่างๆ ตั้งแต่การวิเคราะห์ธาตุอาหารในสารละลาย ไปจนถึงการปรับสมดุลหน้างานและการกะเทาะเปลือกในระดับย่อย ช่วยให้คนงานไซเบอร์เนติกส์เพิ่มผลผลิตการเกษตรได้§!"
 trait_cyborg_superconductive:0 "ตัวนำยิ่งยวด"
 trait_cyborg_superconductive_desc:0 "§Lการใช้วัสดุตัวนำยิ่งยวดช่วยลดการสูญเสียพลังงานจากการส่งกระแสไฟฟ้าเหลือศูนย์เปอร์เซ็นต์§!"
 trait_cyborg_efficient_processors:0 "ตัวประมวลผลประสิทธิภาพสูง"
 trait_cyborg_efficient_processors_desc:0 "§Lตัวประมวลผลที่มีประสิทธิภาพสูงเหล่านี้ช่วยเพิ่มทั้งปริมาณงานและความทนทานในการทำงาน§!"
 trait_cyborg_logic_engines:0 "เอนจินตรรกะ"
 trait_cyborg_logic_engines_desc:0 "§Lการนำทางไปยังขอบเขตทางวิทยาศาสตร์ที่ซับซ้อนขึ้นอย่างมีประสิทธิภาพต้องการตัวประมวลผลคู่ขนานเพื่อเสริมสมองอินทรีย์§!"
 trait_cyborg_loyalty_circuits:0 "วงจรความภักดี"
 trait_cyborg_loyalty_circuits_desc:0 "§Lความจงรักภักดีในฐานะอุดมคติเป็นแนวคิดแบบอินทรีย์ดั้งเดิมอย่างชัดเจน การโปรแกรมคำสั่งให้ปฏิบัติตามอย่างง่ายมีประสิทธิภาพมากกว่ามาก§!\n"
 trait_cyborg_double_jointed:0 "ข้อยืดหยุ่นคู่"
 trait_cyborg_double_jointed_desc:0 "§Lยูนิตแรงงานที่พับเก็บได้พร้อมข้อต่อที่ยืดหยุ่นช่วยให้สามารถพับเก็บเป็นแถวได้อย่างเรียบร้อยในระหว่างการขนส่ง จากนั้นประกอบตัวเองหน้างาน§!\n"
 trait_cyborg_bulky:0 "เทอะทะ"
 trait_cyborg_bulky_desc:0 "§Lเครื่องจักรยักษ์ขั้นสูงเหล่านี้ไม่ได้ถูกออกแบบมาเพื่อเดินทางข้ามจักรวาลในกล่องบรรจุภัณฑ์§!\n"
 trait_cyborg_enhanced_memory:0 "เพิ่มประสิทธิภาพความจำ"
 trait_cyborg_enhanced_memory_desc:0 "§Lเทคนิคการปฏิวัติติดตั้งยูนิตอัตโนมัติด้วยเซลล์หน่วยความจำเหนี่ยวนำแม่เหล็ก ช่วยปรับปรุงประสิทธิภาพการทำงานอย่างมีนัยสำคัญ§!\n"
 trait_cyborg_durable:0 "ทนทานสูงสุด"
 trait_cyborg_durable_desc:0 "§Lได้รับการปกป้องโดยโครงกระดูกภายนอกของไทเทเนียมชุบโครเมียม เครื่องจักรสำหรับงานหนักเหล่านี้ถูกออกแบบมาเพื่อความเป็นเลิศภายใต้สภาวะที่รุนแรงและต้องการการบำรุงรักษาน้อยลง§!\n"
 trait_cyborg_high_maintenance:0 "ต้องการการบำรุงรักษาสูง"
 trait_cyborg_high_maintenance_desc:0 "§Lเครื่องจักรเหล่านี้ได้รับการออกแบบโดยละเลยเรื่องความทนทานอย่างสิ้นเชิงและมีแนวโน้มที่จะทำงานผิดปกติได้ง่าย พวกมันจะต้องการการบำรุงรักษาบ่อยครั้ง§!\n"
 trait_cyborg_learning_algorithms:0 "อัลกอริทึมการเรียนรู้"
 trait_cyborg_learning_algorithms_desc:0 "§Lอัลกอริทึมการเรียนรู้ด้วยตนเองที่ซับซ้อนซึ่งกระตุ้นการวิวัฒนาการอย่างรวดเร็วของกลุ่มประสาทของยูนิต§!\n"
 trait_cyborg_neural_limiters:0 "เครื่องจำกัดระบบประสาท"
 trait_cyborg_neural_limiters_desc:0 "§Lการจำกัดความสามารถในการรับรู้ของคนงานช่วยกระตุ้นให้พวกเขามุ่งเน้นไปที่งานที่ต้องใช้แรงงานพื้นฐานมากขึ้น§!\n"

 trait_cyborg_custom_made:0 "สั่งทำพิเศษ"
 trait_cyborg_custom_made_desc:0 "§Lยูนิตใหม่แต่ละยูนิตได้รับการรังสรรค์ขึ้นด้วยความใส่ใจในรายละเอียดอย่างไม่มีใครเทียบได้ ถือเป็นความมหัศจรรย์ของวิศวกรรมและศิลปะ แต่ไม่ค่อยมีประสิทธิภาพเท่าใดนัก§!\n"
 trait_cyborg_recycled:0 "รีไซเคิลวัสดุ"
 trait_cyborg_recycled_desc:0 "§Lการผลิตยูนิตได้รับการปรับให้คุ้มทุนที่สุด โดยใช้วัสดุรีไซเคิลและส่วนประกอบที่สืบทอดมาจากรุ่นก่อนหน้า§!\n"
 trait_cyborg_streamlined_protocols:0 "โปรโตคอลคล่องตัว"
 trait_cyborg_streamlined_protocols_desc:0 "§Lกระบวนการ AI ที่ประสานกันอย่างกว้างขวางช่วยให้ยูนิตเหล่านี้ขยายขนาดขึ้นได้โดยสูญเสียประสิทธิภาพการทำงานน้อยที่สุด§!"
 trait_cyborg_high_bandwidth:0 "แบนด์วิดท์สูง"
 trait_cyborg_high_bandwidth_desc:0 "§Lยูนิตแต่ละยูนิตส่งและรับข้อมูลซ้ำซ้อนจำนวนมาก ส่งผลให้เกิดความล่าช้าแบบเอ็กซ์โพเนนเชียลเมื่อจำนวนยูนิตที่เชื่อมต่อกับศูนย์ประมวลผลกลางแต่ละแห่งเพิ่มขึ้น§!"
 trait_cyborg_trading_algorithms:0 "อัลกอริทึมซื้อขาย"
 trait_cyborg_trading_algorithms_desc:0 "§Lอัลกอริทึมการคาดการณ์ช่วยให้เกิดประสิทธิภาพสูงสุด สามารถคำนวณการผันผวนของตลาดในอัตราสกุลเงิน ความพร้อมของสินค้า และการตอบสนองทางอารมณ์ของคู่ค้าอินทรีย์ได้§!"
 trait_cyborg_power_intensive:0 "กินพลังงานสูง"
 trait_cyborg_power_intensive_desc:0 "§Lชิ้นส่วนไซเบอร์เนติกส์เหล่านี้ต้องการการชาร์จไฟบ่อยครั้งจากแหล่งพลังงานภายนอก§!"
 TRAIT_POWER_INTENSIVE_EFFECT:0 "เพิ่มค่าบำรุงรักษา $r_energy$ §R+1§!"

 trait_psionic:0 "พลังจิต"
 trait_psionic_desc: "[This.GetPsionicTraitDesc]"
 trait_self_modified:0 "แก้ไขตัวเอง"
 trait_self_modified_desc:0 "§Lสมาชิกของสายพันธุ์นี้ได้ดำเนินการปรับปรุงโครงสร้างพันธุกรรมของตนเองโดยพลการเพื่อสร้างความได้เปรียบ§!"

 leader_trait_shroud_age:0 "อายุขัยเพิ่มขึ้น"
 leader_trait_shroud_age_desc: "พลังงานจิตวิญญาณอันทรงพลังของชราวด์(คําราม)ได้ช่วยชะลอกระบวนการชราภาพตามธรรมชาติของผู้นำคนนี้"

 leader_trait_reformer:0 "นักปฏิรูป"
 leader_trait_reformer_desc:0 "ผู้นำคนนี้คือนักปฏิรูป อุทิศตนเพื่อสร้างสังคมแห่งอนาคตที่ดีกว่า"

 leader_trait_ruler_hive_mind:0 "[owner.GetRulerTitle]"
 leader_trait_ruler_hive_mind_desc:1 "ผู้นำคนนี้คือศูนย์รวมพลังจิตประสานงานที่เป็นแกนสำคัญของอุปกรณ์การรับรู้อันกว้างขวางของ [owner.GetGestaltEntityName]"

 ASCENSION_PERKS:0 "การยกระดับ (สกิลพิเศษ)"
 ASCENSION_PERKS_DESC:0 "การยกระดับเป็นโบนัสพิเศษที่จักรวรรดิของเราสามารถปลดล็อกได้ ด้วยการทำแผนผังต้นไม้วัฒนธรรมให้เสร็จสิ้น"
 SELECT_AN_ASCENSION_PERK:0 "§Gคลิกเพื่อเลือกการยกระดับ§!"
 SELECT_ASCENSION_PERK:0 "§Gคลิกเพื่อเลือกการยกระดับนี้§!"
 ASCENSION_PERK_CONFIRM_TITLE:0 "เลือกการยกระดับ"
 ASCENSION_PERK_CONFIRM_DESC:0 "แน่ใจหรือไม่ว่าต้องการเลือก $KEY|H$?"
 AVAILABLE_ASCENSION_PERK_SLOT:0 "ช่องการยกระดับที่ว่าง\n§W$ASCENSION_PERKS_DESC$§!"
 AVAILABLE_ASCENSION_PERK_SLOT_DESC:0 "$SELECT_AN_ASCENSION_PERK$"
 UNAVAILABLE_ASCENSION_PERK_SLOT:0 "ช่องไม่พร้อมใช้งาน"
 UNAVAILABLE_ASCENSION_PERK_SLOT_DESC:0 "ช่องไม่พร้อมใช้งาน $ADOPT_TRADITION_TREE_TO_UNLOCK_ASCENSION_PERK_SLOT$"
 UNAVAILABLE_ASCENSION_PERK_SLOT_DELAYED:0 "§Gคลิกเพื่อดูรายการทักษะการยกระดับที่มีทั้งหมด§!"
 ADOPT_TRADITION_TREE_TO_UNLOCK_ASCENSION_PERK_SLOT:1 "\nสำเร็จวัฒนธรรมทั้งหมดในกลุ่มวัฒนธรรม หรือวิจัยทฤษฎีการยกระดับ(เทคโนโลยี) เพื่อปลดล็อกสกิลการยกระดับ"
 MISSING_ASCENSION_PERK_SLOT:1 "$TRIGGER_FAIL$ต้องการช่อง §Yการยกระดับ (ที่ว่าง)§! $ADOPT_TRADITION_TREE_TO_UNLOCK_ASCENSION_PERK_SLOT$"
 ASCENSION_PERKS_VIEW_SHOW_UNAVAILABLE:0 "แสดงอันที่ใช้งานไม่ได้"
 ASCENSION_PERKS_VIEW_SHOW_UNAVAILABLE_DESC:0 "แสดงทักษะการยกระดับทั้งหมด แม้ว่าเราจะยังไม่ผ่านข้อกำหนดการใช้งานทั้งหมดในปัจจุบันก็ตาม"

 dyson_sphere_ruined:0 "ทรงกลมไดสันที่พังเสียหาย"
 dyson_sphere_ruined_DESC:0 "ทรงกลมไดสันที่พังเสียหาย แม้ว่าจะมีอายุมากแล้ว แต่โครงสร้างพื้นฐานของสิ่งก่อสร้างขนาดยักษ์นี้ส่วนใหญ่ยังคงอยู่ในสภาพสมบูรณ์ ด้วยเทคโนโลยีที่จำเป็นและทรัพยากรจำนวนมหาศาล ทรงกลมนี้มีโอกาสที่จะได้รับการซ่อมแซมกู้คืนระบบ"
 dyson_sphere_ruined_MEGASTRUCTURE_DETAILS:0 ""
 dyson_sphere_restored:0 "$dyson_sphere_5$"
 dyson_sphere_restored_DESC:0 "$dyson_sphere_5_DESC$"
 think_tank_ruined:0 "สถานีเชื่อมโยงวิทยาศาสตร์ขนาดใหญ่พังเสียหาย"
 think_tank_ruined_DESC:0 "สถานีเชื่อมโยงวิทยาศาสตร์ขนาดใหญ่ที่พังเสียหาย แม้ว่าภายในจะถูกผู้ปล้นสะดมลอกข้อมูลจนเกลี้ยงเมื่อหลายยุคก่อน แต่ตัวถังหลักของสิ่งก่อสร้างขนาดยักษ์ส่วนใหญ่ยังคงอยู่ในสภาพสมบูรณ์ ด้วยเทคโนโลยีที่ถูกต้องและทรัพยากรจำนวนมาก มันมีโอกาสที่จะได้รับการบูรณะใหม่"
 think_tank_ruined_MEGASTRUCTURE_DETAILS:0 ""
 think_tank_restored:0 "$think_tank_3$"
 think_tank_restored_DESC:0 "$think_tank_3_DESC$"
 spy_orb_ruined:0 "อาร์เรย์สังเกตุการณ์กาแล็กซีพังเสียหาย"
 spy_orb_ruined_DESC:0 "เศษซากที่พังทลายของสิ่งที่เคยเป็นอาร์เรย์สังเกตการณ์กาแล็กซีที่ทรงพลังอย่างยิ่ง แม้ว่าจะมีอายุมากแล้ว แต่เสาอากาศของสิ่งก่อสร้างขนาดยักษ์นี้ส่วนใหญ่ยังคงมีความสมบูรณ์ทางโครงสร้าง ด้วยเทคโนโลยีที่เหมาะสมและทรัพยากรจำนวนมาก อาร์เรย์นี้มีโอกาสที่จะได้รับการบูรณะให้กลับมาทำงานได้ตามปกติ"
 spy_orb_ruined_MEGASTRUCTURE_DETAILS:0 ""
 spy_orb_restored:0 "$spy_orb_4$"
 spy_orb_restored_DESC:0 "$spy_orb_4_DESC$"
 ring_world_ruined:0 "ส่วนวงแหวน (พังเสียหาย)"
 ring_world_ruined_DESC:0 "เซ็กชันของโลกวงแหวนนี้เคยรองรับชีวมณฑลที่ใช้งานได้ แต่ตอนนี้ไม่มีอีกแล้ว การซ่อมแซมนั้นมีความเป็นไปได้ในทางทฤษฎี แต่จะต้องใช้เทคโนโลยีขั้นสูงและทรัพยากรจำนวนมาก"
 ring_world_ruined_MEGASTRUCTURE_DETAILS:0 ""
 ring_world_restored:0 "$ring_world_3_intermediate$"
 ring_world_restored_DESC:0 "$ring_world_3_intermediate_DESC$"

 utopia.2010.name:0 "ทรงกลมไดสันที่พังเสียหาย"
 utopia.2010.a.desc:0 "เราได้พบกับเศษซากของสถานีอวกาศขนาดมหึมาในระบบดาว [dyson_system.GetName] ซึ่งล้อมรอบดาวฤกษ์หลักของระบบ นักวิทยาศาสตร์ของเราคาดการณ์ว่าครั้งหนึ่งมันอาจเคยเป็น \"ทรงกลมไดสัน\"(Dyson Sphere)ที่ใช้งานได้ดี ซึ่งเป็นสิ่งก่อสร้างขนาดยักษ์ที่ออกแบบมาเพื่อดึงพลังงานของดวงอาทิตย์ เห็นได้ชัดว่าขณะนี้มันไม่ทำงานอีกต่อไป โดยตัวยานได้รับความเสียหายขั้นรุนแรงจากอาวุธพลังงานที่ไม่รู้จัก\n\n$utopia.2010.c.desc$"
 utopia.2010.b.desc:0 "เราพบเศษซากของทรงกลมไดสันในระบบดาว [dyson_system.GetName] เห็นได้ชัดว่าขณะนี้มันไม่ทำงานอีกต่อไป โดยตัวยานได้รับความเสียหายขั้นรุนแรงจากอาวุธพลังงานที่ไม่รู้จัก\n\n$utopia.2010.c.desc$"
 utopia.2010.c.desc:0 "สิ่งที่น่าสนใจคือเศษซากปะทะขนาดใหญ่รอบทรงกลม แม้ว่าสิ่งก่อสร้างขนาดยักษ์เองจะเก่าแก่มาก แต่เศษซากส่วนใหญ่ในระบบดาวนี้ดูเหมือนจะมีอายุน้อยกว่าอย่างเห็นได้ชัด ส่วนใหญ่ดูเหมือนจะมาจากกองเรือรบสองกองที่ปะทะทำลายล้างซึ่งกันและกันจนล่มสลาย อาจเป็นไปได้ว่าเป็นสงครามเพื่อตัดสินสิทธิ์ครอบครองเหนือทรงกลมที่แตกสลายนี้ในประวัติศาสตร์ดาราจักรเมื่อเร็วๆ นี้"
 utopia.2010.a:0 "ดูเหมือนว่าในเชิงฟังก์ชันจะคล้ายกับทรงกลมไดสันของเราเอง"
 utopia.2011.name:0 "ทรงกลมไดสันที่ได้ซ่อมแซมแล้ว"
 utopia.2011.desc:0 "เราได้ซ่อมแซมทรงกลมไดสันที่พังเสียหายในระบบดาว [From.GetName] ได้สำเร็จ เศษซากเศษหินขนาดใหญ่ในระบบดาวได้รับการรวบรวมเพื่อนำมาใช้ในความพยายามซ่อมแซม ช่วยลดทั้งต้นทุนวัสดุและกำจัดอันตรายในการเดินเรือสำหรับทีมงานก่อสร้าง\n\nสิ่งก่อสร้างขนาดยักษ์ที่ยอดเยี่ยมนี้พร้อมใช้งานอย่างเต็มรูปแบบแล้ว สร้างพลังงานจำนวนมหาศาลอีกครั้งเป็นครั้งแรกในรอบหลายยุคหลายสมัย"
 utopia.2012.name:0 "สถานีเชื่อมโยงวิทยาศาสตร์ขนาดใหญ่พังเสียหาย"
 utopia.2012.desc:0 "เศษซากที่หักพังของสถานีอวกาศขนาดมหึมาถูกพบใกล้กับระบบดาว [nexus_system.GetName] สิ่งก่อสร้างขนาดยักษ์นี้ดูเหมือนจะเคยทำหน้าที่เป็นสถานที่เชื่อมโยงวิทยาศาสตร์ขนาดใหญ่(Science Nexus)แม้ว่าสถานีจะถูกทิ้งร้างมานานหลายพันปีแล้วก็ตาม แต่ตัวถังของมันยังคงอยู่ในสภาพค่อนข้างสมบูรณ์"
 utopia.2012.a:0 "แนวคิดดูเหมือนจะคล้ายกับสถานีเชื่อมโยงวิทยาศาสตร์ขนาดใหญ่ของเราเอง"
 utopia.2013.name:0 "บูรณะสถานีเชื่อมโยงวิทยาศาสตร์ขนาดใหญ่เสร็จสิ้น"
 utopia.2013.desc:0 "สถานีเชื่อมโยงวิทยาศาสตร์ขนาดใหญ่ที่ถูกทิ้งร้างใกล้ระบบดาว [From.GetName] ได้รับการซ่อมแซมอย่างสมบูรณ์และมีทีมสมองที่สว่างไสวที่สุดของ [Root.GetName] เข้าประจำการ ไม่ต้องสงสัยเลยว่าวัตถุประสงค์ดั้งเดิมของมันคืออะไร สิ่งก่อสร้างขนาดยักษ์นี้จะได้รับการใช้งานเพื่อตอบคำถามทางวิทยาศาสตร์ในยุคสมัยของเราในขณะนี้"
 utopia.2014.name:0 "อาร์เรย์สังเกตุการณ์กาแล็กซีพังเสียหาย"
 utopia.2014.desc:1 "ในจุดหนึ่งของประวัติศาสตร์ดาราจักร ระบบดาว [sentry_system.GetName] มีโครงสร้างพื้นฐานระดับวงโคจรขนาดใหญ่อย่างผิดสัดส่วน ซึ่งได้รับการรื้อถอนอย่างเป็นระบบตั้งแต่นั้นมา มีการสะสมตัวของเศษซากขนาดใหญ่รอบวัตถุอวกาศในระบบดาวนี้ รวมถึงซากสถานีอวกาศขนาดมหึมาหลายแห่ง\n\nสิ่งที่ใหญ่ที่สุดคืออาร์เรย์สังเกตการณ์กาแล็กซี(สเปน)ขนาดโคลอสซาลการสแกนเบื้องต้นของเราเสนอว่าเมื่อมันทำงานได้ อาร์เรย์นี้จะทรงพลังเพียงพอที่จะมอบระยะความครอบคลุมเซ็นเซอร์แบบเรียลไทม์ทั่วทั้งดาราจักรได้"
 utopia.2014.a:0 "พวกเรามีอาร์เรย์แบบนั้นอยู่แล้ว"
 utopia.2015.name:0 "บูรณะอาร์เรย์สังเกตการณ์กาแล็กซีเสร็จสิ้น"
 utopia.2015.desc:0 "มันไม่ง่ายเลย แต่วิศวกรของเราสามารถซ่อมแซมฟื้นฟูอาร์เรย์สังเกตการณ์กาแล็กซีในระบบดาว [From.GetName] ได้สำเร็จ ซากสถานีดาราอื่นๆ และเศษซากที่ล้อมรอบได้รับการแปลงเป็นวัสดุก่อสร้างในระหว่างการบูรณะฟื้นฟู\n\nเป็นครั้งแรกในรอบหลายยุคสมัยที่อาร์เรย์ทำงานด้วยพลังงาน เสาอากาศที่ทรงพลังของมันสามารถมองเห็นฝั่งตรงข้ามของดาราจักรได้อย่างชัดเจนอีกครั้ง"
 utopia.2016.name:0 "โลกวงแหวนที่พังเสียหาย"
 utopia.2016.desc:0 "เศษซากที่แตกสลายของโลกวงแหวนโบราณล้อมรอบดาวฤกษ์ของระบบดาว [ring_system.GetName] ดาวเคราะห์ดวงใดก็ตามที่อาจเคยมีอยู่ก่อนที่นี่จะต้องถูกนำไปใช้เป็นวัสดุก่อสร้างในระหว่างการก่อสร้างสิ่งก่อสร้างขนาดมหึมานี้แน่นอน\n\nไม่พบหลักฐานที่บ่งบอกถึงผู้สร้างสิ่งมหัศจรรย์ทางวิศวกรรมนี้เป็นคนแรก แต่มันต้องเป็นผลผลิตของวัฒนธรรมที่ก้าวหน้าและเชี่ยวชาญอย่างมากแน่นอน"
 utopia.2016.a:0 "ก้าวหน้าเท่าที่เราเป็นอยู่ในปัจจุบันนั่นแหละ"
 utopia.2017.name:0 "เซ็กชันโลกวงแหวนได้รับการบูรณะซ่อมแซม"
 utopia.2017.desc:0 "จากการก่อสร้างบนส่วนที่เหลือของโลกวงแหวนที่พังเสียหายในระบบดาว [From.GetName] วิศวกรของเราได้จัดการบูรณะเซ็กชันหนึ่งเสร็จสิ้นแล้ว ชีวมณฑลใหม่ต้องได้รับการสร้างขึ้นเกือบจะใหม่ทั้งหมดโดยนักวิทยาศาสตร์ดาวเคราะห์ชั้นนำของเรา แต่ปัจจุบันถือว่ามีความเสถียรและพร้อมสำหรับอยู่อาศัยแล้ว"
 anomaly.2576.name:0 "โลหะรูปแบบใหม่"
 anomaly.2576.desc:0 "การสแกนพื้นผิวโดยละเอียดของ [From.GetName] พบหลุมอุกกาบาตขนาดใหญ่ที่มีซากยานอวกาศโบราณหลายลำที่ไม่รู้จักการออกแบบ ยานเหล่านี้ดูเหมือนจะไม่มีระบบพยุงชีพใดๆ เลย ทำให้เราคาดว่าพวกมันอาจเป็นโดรนขนาดใหญ่หรือควบคุมด้วยปัญญาประดิษฐ์\n\nที่น่าสนใจคือ ตัวถังของยานทำมาจากโลหะมีชีวิต(เสียงโลหะ)ซึ่งเป็นวัสดุอนินทรีย์ที่หายากอย่างยิ่งและมีคุณสมบัติพิเศษมากมาย โลหะนี้สามารถถูก \"โปรแกรม\" ให้เป็นรูปทรงที่ต้องการ และจะค่อยๆ เติบโตงอกขึ้นมาใหม่หากได้รับความเสียหาย ในช่วงเวลาหลายพันปี โลหะที่เหลืออยู่จากซากยานถูกหลอมรวมเป็นแหล่งสะสมแร่ที่หนาแน่นมากและสามารถทำเหมืองขุดเจาะได้อีกหลายร้อยปีข้างหน้า"
 living_metal_category:0 "หลุมอุกกาบาตแปลกประหลาด"
 living_metal_category_desc:0 "หลุมอุกกาบาตขนาดใหญ่ได้รับการค้นพบ ซึ่งดูเหมือนจะไม่ใช่การเกิดขึ้นตามธรรมชาติ"

 crisis.1011.desc:0 "เราสูญเสียดาวอาณานิคมของเราบนดาว [Root.GetName] แล้ว! หลังจากประจำตำแหน่งในวงโคจร ผู้รุกรานต่างมิติได้ถล่มพื้นผิวโลกและกัดกินสิ่งมีชีวิตทั้งหมดเบื้องล่าง ชีวมณฑลทั้งหมดของ [Root.GetPlanetMoon] ถูกกลืนกินโดยสิ่งมีชีวิตต่างมิติเหล่านั้น — ไม่มีร่องรอยของสิ่งมีชีวิตหลงเหลืออยู่เลยแม้แต่น้อย"

 utopia.61.name:0 "ก่อสร้างที่อยู่อาศัยในอวกาศ [From.From.From.Planet.GetName] เสร็จสมบูรณ์"
 utopia.61.desc.a:0 "เราได้ดำเนินการก่อสร้างที่อยู่อาศัยในอวกาศ(ฮาบิแทต)แห่งแรกของเราเสร็จสิ้นแล้ว และในที่สุดก็ถึงเวลาเตรียมยานตั้งอาณานิคมเพื่อร่อนลงจอดบนโลกที่เราสร้างขึ้นด้วยตัวเอง\n\nตั้งแต่แกนจักรกลไปจนถึงส่วนยอด โครงสร้าง หมุด น็อต ทุกซอกทุกมุมได้รับการออกแบบให้เหมาะสมกับความต้องการของเราอย่างสมบูรณ์แบบในบ้านหลังใหม่ของเราในหมู่ดาวดารา"
 utopia.61.desc.b:0 "ที่อยู่อาศัยในอวกาศ [From.From.From.Planet.GetName] บัดนี้พร้อมสำหรับการตั้งอาณานิคมแล้ว"

 allow_dyson_sphere:0 "§Hปลดล็อกสิ่งก่อสร้างขนาดมหึมา:§! ทรงกลมไดสัน"

