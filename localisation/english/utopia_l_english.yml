 BUILD_MEGASTRUCTURE_CANT_BUILD_ON_PLANET:0 "§Rไม่สามารถสร้างสิ่งก่อสร้างขนาดมหึมานี้บนดาวเคราะห์ได้§!"
 BUILD_MEGASTRUCTURE_BUILD_ON_PLANET:0 "§Rสามารถสร้างสิ่งก่อสร้างขนาดมหึมานี้ได้บนดาวเคราะห์เท่านั้น§!"
 BUILD_MEGASTRUCTURE_CANT_BUILD_ON_SYSTEM_PLANETS: "§Rไม่สามารถสร้างรอบวัตถุในอวกาศใดๆ ในระบบดาวนี้ได้§!"

