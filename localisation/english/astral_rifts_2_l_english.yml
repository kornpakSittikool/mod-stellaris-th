#####################
# Abandoned Complex #
#####################
 astral_rift_research_lab: "หมู่อาคารที่ถูกละทิ้ง(Abandoned Complex)"

 astral_rift.2000.name: "สถานวิจัยที่ถูกละทิ้ง(ห้องรับแขก)"
 astral_rift.2000.desc: "เราอยู่ภายในสถานวิจัยที่ถูกทอดทิ้ง\n\nพื้นผิวในห้องนี้ถูกปกคลุมไปด้วยฝุ่นหนาเตอะ บ่งชี้ว่าไม่มีการใช้งานมาระยะหนึ่งแล้ว\n\nเราตรวจไม่พบนักวิจัยคนใดเลย ไม่ว่าจะยังมีชีวิตอยู่หรือเสียชีวิตแล้วก็ตาม ไม่ว่าใครก็ตามที่เป็นผู้ดูแลสถานที่แห่งนี้ พวกเขาจากไปนานแล้ว\n\nชั้นวางของที่แข็งแรงทนทานเรียงรายตามผนัง แต่ละชั้นวางไข่ขนาดใหญ่ฟองหนึ่ง ไข่ส่วนใหญ่อยู่ในสภาพเน่าเสียที่แตกต่างกันไป ทว่ายังมีตัวอย่างที่มีชีวิตเหลืออยู่บ้างสองสามฟอง\n\nที่ใจกลางของห้องนี้มีภาชนะเปิดที่บรรจุของเหลวหนืดสีซีด การวิเคราะห์ของเหลวเผยให้เห็นว่ามันมีโปรตีนและกรดอะมิโนในปริมาณสูง จากการประเมินคราบตกค้างที่ทิ้งไว้บนไข่บางฟอง เราคาดเดาว่าของเหลวนี้ถูกฉีดเข้าไปโดยเหล่านักวิจัย"
 astral_rift.2000.a: "ค้นหาตัวผู้ดูแล"
 astral_rift.2000.b: "เปิดไข่ออกดู"

 astral_rift.2010.name: "ปรสิตควอนตัม (Quantum Parasites)"
 astral_rift.2010.desc: "เราได้เปิดไข่ตัวอย่างที่มีสภาพดูสมบูรณ์ที่สุดแล้ว\n\nตัวอ่อนภายในอยู่ในสภาพขาดสารอาหารและถูกปกคลุมไปด้วยปรสิตแปลกหน้าต่างถิ่น\n\nเป็นที่น่าสังเกตว่าปรสิตเหล่านี้มีคุณสมบัติควอนตัมที่เป็นเอกลักษณ์เฉพาะตัวซึ่งไม่พบในสิ่งมีชีวิตทางชีวภาพอื่นใดที่รู้จัก พวกมันเทเลพอร์ตย้ายมิติแบบสุ่มไปรอบๆ ภายในเปลือกไข่ และสันนิษฐานว่าย้ายเข้าไปในตัวอ่อนเองด้วยเช่นกัน เมื่อพิจารณาว่ามีไข่ที่มีชีวิตเหลืออยู่เพียงไม่กี่ฟองในห้องวิจัยนี้ ตัวอย่างนี้ต้องมีความต้านทานพฤติกรรมของปรสิตได้เป็นพิเศษอย่างแน่นอน\n\nการสืบค้นร่องรอยแอสทรัลของสิ่งมีชีวิตทั้งสองบ่งชี้ว่าปรสิตเหล่านี้มาจากมิติที่แตกต่างและอยู่ห่างไกลออกไป เราเชื่อว่าปรสิตนี้ถูกอัญเชิญมาที่นี่โดยไม่ได้เจตนา และได้รบกวนงานวิจัยที่ตั้งใจไว้ของสถานวิจัยแห่งนี้\n\nเราเห็นพวกมันถูกดึงดูดเข้าหาถังของเหลวประหลาดที่อยู่ใจกลางห้องนี้ บางทีนี่อาจเป็นสิ่งที่ดึงดูดพวกมันมาตั้งแต่แรก"
 astral_rift.2010.a: "ฉีดของเหลวเข้าไปในไข่"
 astral_rift.2010.b: "ทำการุณยฆาตสิ่งมีชีวิตที่เหลืออยู่ทั้งหมด"

 astral_rift.2015.name: "เหล่าผู้ดูแล"
 astral_rift.2015.desc: "เราได้พบผู้ดูแลของสถานที่แห่งนี้แล้ว หรือพูดให้ถูกต้องคือ เราได้พบชิ้นส่วนซากที่หลงเหลือของพวกเขา\n\nห้องใกล้เคียงเกลื่อนไปด้วยศพ แขนขาของพวกเขาถูกแยกออกจากกันอย่างหมดจดในระดับอะตอมด้วยแรงลึกลับบางอย่าง ซากศพบางส่วนหลอมรวมเข้าไปในผนังห้องครึ่งหนึ่ง\n\nไข่ส่วนใหญ่ที่ถูกผ่าตัดชำแหละวางอยู่บนโต๊ะตรวจตรงกลาง มีฟองหนึ่งที่ยังคงสภาพสมบูรณ์\n\nการนำซากชิ้นส่วนของผู้ดูแลกลับไปศึกษาวิจัยอย่างเหมาะสมควรช่วยให้เราได้รับข้อมูลเชิงลึกเกี่ยวกับสิ่งที่เกิดขึ้นที่นี่"
 astral_rift.2015.a: "เปิดไข่ออกดู"
 astral_rift.2015.b: "เดินทางกลับพร้อมซากชิ้นส่วน"

 astral_rift.2020.name: "กระบวนการเมแทบอลิซึม(เมตาโบเลชั่น)"
 astral_rift.2020.desc: "การฉีดของเหลวสีซีดเข้าไปในตัวอ่อนที่เปิดเผยส่งผลลัพธ์ที่น่าสนใจบางอย่างเกิดขึ้น\n\nแม้จะมีปรสิตควอนตัม ทว่าตัวอย่างไข่ที่เคยเฉื่อยชากลับมีชีวิตชีวาขึ้นมาอีกครั้ง ในความเป็นจริงเราอาจจะคำนวณปริมาณยาผิดพลาด ในช่วงเวลาสั้นๆ สิ่งมีชีวิตที่พัฒนาเต็มที่ขึ้นเริ่มผลักผนังของไข่ออกมา ร่างกายของมันถูกปกคลุมไปด้วยแผ่นเกราะและหนามแหลมคมทับซ้อนกันเป็นโครงร่าง\n\nอย่างไรก็ตาม ปรสิตก็ได้รับการกระตุ้นด้วยเช่นกัน ขณะที่พวกมันเทเลพอร์ตเข้าออกตัวอ่อนอย่างรุนแรง เนื้อเยื่อของสิ่งมีชีวิตดังกล่าวก็ได้รับความเสียหาย ในอัตรานี้มันคงต้องตายในไม่ช้า\n\nเราคาดการณ์ว่าการฉีดเส้นใยแอสทรัล(เธรดกลาง)ปริมาณเล็กน้อยเข้าไปอาจช่วยตอบสนองความต้องการของปรสิตควอนตัมและป้องกันความเสียหายเพิ่มเติมได้"
 astral_rift.2020.a: "ไม่ต้องแทรกแซง"
 astral_rift.2020.b: "ฉีดเส้นใยแอสทรัลเข้าไป"

 astral_rift.2025.name: "ได้รับการการุณยฆาต"
 astral_rift.2025.desc: "สิ่งมีชีวิตนี้ไม่มีความหวังในการฟื้นฟู ปรสิตที่แพร่ระบาดในไข่ของมันนั้นอันตรายเกินกว่าจะอนุญาตให้แพร่กระจายข้ามรอยแยกมิตินี้ไปได้\n\nจากการปฏิบัติตามขั้นตอนการป้องกันการปนเปื้อนอย่างเข้มงวด เราได้ทำการุณยฆาตตัวอย่างทั้งหมดในบริเวณใกล้เคียงด้วยกรดไฮโดรคลอริก เรากำลังเดินทางกลับพร้อมตัวอย่างเพื่อการศึกษาเพิ่มเติม"
 astral_rift.2025.a: "ทางเลือกที่ชาญฉลาด"
 astral_rift.2025.b.evopred: "ความเป็นกรดสูงสามารถเพิ่มรสชาติให้แก่จานอาหารได้"

 astral_rift.2030.name: "ความไม่มั่นคงทางชีวภาพ(ชีวประวัติ)"
 astral_rift.2030.desc.end: "การติดเชื้อควอนตัมที่ผันผวนนี้ต้องขัดขวางการทดลองใดๆ ที่ตั้งใจจะให้เกิดขึ้นในห้องวิจัยนี้อย่างแน่นอน\n\nอย่างไรก็ตาม การเฝ้าสังเกตการณ์ของเราที่นี่ช่วยเพิ่มพูนความเข้าใจในชีววิทยาภายใต้เงื่อนไขที่ไม่เสถียรอย่างสุดขั้ว"
 astral_rift.2030.desc.default: "ตัวอ่อนได้สลายตัวลงแล้ว\n\nเป็นไปตามคาด ปรสิตในร่างกายของมันได้ฉีกแยกมันออกจากกันในทิศทางสุ่มในไม่ช้า\n\n$astral_rift.2030.desc.end$"
 astral_rift.2030.desc.injected: "ตัวอ่อนได้สลายตัวลงแล้ว\n\nแม้ว่าเราจะพยายามช่วยให้ตัวอย่างมีเสถียรภาพ ทว่าปรสิตในร่างกายของมันได้ฉีกแยกมันออกจากกันในทิศทางสุ่มในไม่ช้า\n\n$astral_rift.2030.desc.end$"
 astral_rift.2030.a: "น่าสนใจยิ่ง"
 astral_rift.2030.b.evopred: "อาหารมื้อที่บดผสมผสานกันอย่างลงตัว"

 astral_rift.2035.name: "อาวุธชีวภาพ(อาวุธชีวภาพ)"
 astral_rift.2035.desc: "การทดลองประสบความสำเร็จด้วยดี\n\nเส้นใยแอสทรัลที่เราฉีดเข้าไปในตัวอ่อนช่วยเพิ่มความมั่นคงให้แก่ปรสิตควอนตัมได้สำเร็จ\n\nตัวอ่อนแรกฟักที่พัฒนาเต็มที่โผล่ออกมาในสภาพสมบูรณ์ มันเชื่อฟังอย่างเหลือเชื่อและเรียนรู้คำสั่งพื้นฐานที่สุดได้อย่างรวดเร็ว จากพฤติกรรมดังกล่าว ร่วมกับผิวเกราะหนาและหนามพิษของมัน เราคาดการณ์ว่าสิ่งมีชีวิตเหล่านี้ถูกเพาะเลี้ยงขึ้นมาเพื่อใช้ในศึกสงคราม\n\nที่น่าตกใจคือ มันได้แสดงความสามารถในการ \"เทเลพอร์ต\" ระยะทางสั้นๆ ได้สำเร็จ เส้นใยแอสทรัลดูเหมือนจะถักทอความสัมพันธ์แบบพึ่งพาอาศัยกัน (symbiosis) ที่เป็นเอกลักษณ์เฉพาะตัวระหว่างสิ่งมีชีวิตนี้กับตัวปรสิต\n\nเราอาจจะได้สร้างสิ่งที่เป็นอันตรายเกินไปขึ้นมาเสียแล้ว"
 astral_rift.2035.desc.exterminator: "$astral_rift.2035.desc$\n\nดาราจักรที่น่าสมเพชของเราไม่ได้เตรียมพร้อมสำหรับสิ่งที่เราจะปลดปล่อยเข้าใส่พวกเขาในไม่ช้า"
 astral_rift.2035.desc.non_pacifist: "$astral_rift.2035.desc$\n\nพวกเรากำลังนำพวกมันกลับมาเพิ่มอีก"
 astral_rift.2035.a: "น่าประทับใจยิ่ง"
 astral_rift.2035.a.tooltip: "บัดนี้สามารถสร้างกองทัพจู่โจมใหม่ได้: §H$warpling_army$§!"

 astral_rift.2040.name: "ปรสิตควอนตัม (Quantum Parasites)"
 astral_rift.2040.desc: "เราได้ดำเนินการเก็บกู้ศพของเหล่านักวิจัยเสร็จสิ้นแล้วและกำลังขนย้ายพวกเขากลับเพื่อทำการศึกษาเพิ่มเติม\n\nพวกมันถูกปกคลุมไปด้วยปรสิตควอนตัมที่มีคุณสมบัติเป็นเอกลักษณ์ไม่เหมือนกับสิ่งมีชีวิตทางชีวภาพใดๆ ที่รู้จัก ความสามารถในการ "เทเลพอร์ต" ผ่านสสารได้อย่างคาดเดาไม่ได้น่าจะเป็นสิ่งที่ส่งผลให้เกิดการเสียชีวิตของโฮสต์ผู้ดูแล\n\nการสืบค้นร่องรอยแอสทรัลของสิ่งมีชีวิตทั้งสองบ่งชี้ว่าปรสิตมีต้นกำเนิดมาจากมิติที่แตกต่างและห่างไกลออกไป เราเชื่อว่าปรสิตนี้ถูกอัญเชิญมาที่นี่โดยไม่ได้เจตนา และได้เข้ามารบกวนงานวิจัยที่ตั้งใจไว้ของสถานวิจัยนี้ในรูปแบบที่สร้างความเสียหายอย่างย่อยยับ\n\nเราได้กำจัดพวกแมลงปรสิตด้วยกรดไฮโดรคลอริกทันทีเพื่อป้องกันการปนเปื้อนเพิ่มเติม"
 astral_rift.2040.a: "ช่างน่าหลงใหลยิ่งนัก"

 astral_rift.2045.name: "การสัมผัสสารอันตรายถึงแก่ชีวิต"
 astral_rift.2045.desc: "พบร่างไร้วิญญาณของ [From.GetName] สาเหตุเกิดจากการสัมผัสกับปรสิตอันตรายถึงชีวิตที่อยู่นอกรอยแยกมิติในระบบดาว [FromFrom.solar_system.GetName] ห้องพักของพวกเขาถูกกักกันเพื่อรอการชำระล้างปนเปื้อนอย่างเต็มรูปแบบ"
 astral_rift.2045.a.tooltip: "§Y[From.GetName]§! §Rได้ระเบิดตัวแตกสลายอย่างฉับพลัน§!"

#################
# The Mechanism #
#################
 astral_rift_clock: "กลไกเครื่องจักรกล(พิธีกร)"

 astral_rift.2100.name: "เฟืองและเฟืองพินเนียน(เสียงม้าและพิน)"
 astral_rift.2100.desc: "เราถูกห้อมล้อมไปด้วยเครื่องจักรขนาดมหึมา\n\nเฟืองและแกนหมุนบิดเคลื่อนที่ไปในทุกทิศทาง ในแต่ละเศษหนึ่งส่วนสิบของวินาที เครื่องจักรจะคลิกเดินหน้าไปหนึ่งก้าว ฟันเฟืองซี่เดียวจากเฟืองเหล่านี้มีความกว้างเกือบเท่ากับขอบเขตยาน §Y$tech_rift_sphere$§! ของเรา\n\nท่ามกลางเนบิวลาหมุนวนของก๊าซและหมอกหนาทึบ ไม่มีจุดเริ่มต้นหรือจุดสิ้นสุดของอุปกรณ์เครื่องนี้ปรากฏให้เห็นในระยะสายตา"
 astral_rift.2100.a: "สำรวจพื้นที่ในม่านหมอก"

 astral_rift.2105.name: "เครื่องจักรกลข้ามมิติ"
 astral_rift.2105.desc: "การเคลื่อนที่ของเครื่องจักรกลข้ามมิตินี้มีความแม่นยำเท่ากับนาฬิกาที่มีความเที่ยงตรงที่สุดของเรา\n\nแม้ว่าเราจะยังไม่สามารถระบุแหล่งพลังงานของมันได้ ทว่าด้วยการสำรวจเราได้พบเพลาขับที่ทอดยาวเข้าไปในกลุ่มของรอยแยกเดอะชราวด์\n\nไม่ว่าสถานที่แห่งนี้จะเป็นอะไร มันถูกสร้างขึ้นมาโดยมีวัตถุประสงค์เฉพาะเจาะจงในใจ เครื่องจักรนี้กำลังเชื่อมโยงข้ามมิติเข้าไปในหลายจักรวาล\n\nการเคลื่อนที่ของชิ้นส่วนขนาดมหึมาของมันทำให้เกิดความแปรปรวนในชั้นบรรยากาศที่หนาแน่น ทำให้ยากต่อการรักษาระดับการทำงานของเครื่องมือวัดของเรา ด้วยการแทรกแซงขั้นพื้นฐานบางอย่าง เราสามารถปลดเพลาตัวหนึ่งให้หลุดออกและใช้มันเพื่อขัดขัดขวางฟันเฟืองหมุนหนึ่งคู่ สิ่งนี้จะช่วยลดความแปรปรวนของชั้นบรรยากาศ ทำให้สามารถศึกษาวิจัยเครื่องจักรที่น่าประทับใจนี้ได้อย่างใกล้ชิดยิ่งขึ้น"
 astral_rift.2105.a: "การแทรกแซงจะเป็นการกระทำที่ขาดความรับผิดชอบ"
 astral_rift.2105.b: "ทำให้ฟันเฟืองขัดขัดข้อง"

 astral_rift.2110.name: "หากมันไม่ได้ชำรุดเสียหาย... (ถ้ามันไม่แตก...)"
 astral_rift.2110.desc: "ผู้ออกแบบสร้างสรรค์พื้นที่แห่งนี้มีความรู้ล้ำหน้าเกินกว่าเราไปมาก การแทรกแซงกลไกเหล่านี้อาจนำไปสู่ผลลัพธ์ที่คาดเดาไม่ได้อย่างยิ่ง\n\nแม้จะมีการรบกวนจากหมอก ทว่าเราได้ประวิงเวลานานพอที่จะได้รับข้อมูลเชิงลึกด้านวิศวกรรมที่มีประโยชน์เกี่ยวกับโครงสร้างที่แม่นยำของเครื่องจักรขนาดมหึมานี้ รวมถึงรวบรวมวัสดุแอสทรัลได้เป็นจำนวนมาก\n\nผู้ดูแลรักษาพื้นที่แห่งนี้จะต้องเป็นสถาปนิกผู้ยิ่งใหญ่อย่างแน่นอน"

 astral_rift.2115.name: "เฟืองเกิดการขัดติดขัด"
 astral_rift.2115.desc: "ฟันเฟืองเกิดการขัดติดขัด\n\nด้วยการสั่นสะเทือนครั้งใหญ่ กลไกทั้งหมดก็หยุดชะงักลง ความพยายามก่อวินาศกรรมของเราประสบความสำเร็จแล้ว\n\nเมื่อแรงตึงกำลังเพิ่มขึ้น แกนสีทองก็เผยออกมาภายใต้แผ่นตะแกรงแผ่นหนึ่ง มันเรืองแสงและบริสุทธิ์ผุดผ่อง ทว่ามันจะสามารถเข้าถึงได้ในช่วงเวลาสั้นๆ เท่านั้น หลีกเลี่ยงไม่ได้ที่แรงตึงที่เพิ่มขึ้นจะช่วยขจัดสิ่งอุดตันออกไป เราได้เริ่มขั้นตอนการสกัดแกนกลางที่ละเอียดอ่อนแล้ว"
 astral_rift.2115.a: "ใช้ความระมัดระวัง"

 astral_rift.2120.name: "การแตกสลายกระจัดกระจาย"
 astral_rift.2120.desc: "ในขณะที่เราพยายามจะเก็บกู้แกนสีทอง รอยร้าวขนาดเล็กก็แผ่ขยายออกไปอย่างรวดเร็วทั่วพื้นผิวของมัน ก่อนที่เราจะเก็บกู้สำเร็จ มันก็ระเบิดออกอย่างรุนแรงในทุกทิศทาง\n\nเมื่อมันแตกสลาย มันได้ปลดปล่อยพลังงานที่รุนแรงออกมา เอาชนะอุปสรรคขัดขวางของเรา เฟืองขนาดใหญ่รอบตัวเราเริ่มหมุนอย่างบ้าคลั่งจนควบคุมไม่ได้\n\nเราได้เปิดใช้งานสายยึดเหนี่ยวฉุกเฉินเพื่อหลบหนีออกจากสถานการณ์ที่โชคร้ายนี้แล้ว"

 astral_rift.2125.name: "ความสำเร็จ"
 astral_rift.2125.desc: "เราได้กู้คืนแกนสีทองของกลไกชิ้นหนึ่งได้สำเร็จ\n\nเฟืองรอบตัวเราในตอนนี้หยุดนิ่งเงียบอย่างน่าแปลกใจ แรงตึงเครียดทั้งหมดรอบตัวเราได้รับการปลดปล่อยแล้ว\n\nเครือข่ายของรอยแยกเดอะชราวด์ที่เชื่อมต่อกับอุปกรณ์นี้หยุดการเคลื่อนไหวอย่างชัดเจน ราวกับหยุดนิ่งในห้วงเวลา เราไม่แน่ใจว่าผลลัพธ์ของการกระทำนี้จะเป็นเช่นไร\n\nเราได้ดึงสายยึดเหนี่ยวกลับอย่างปลอดภัยและออกจากพื้นที่นี้ แกนกลางที่กู้คืนมาได้มีคุณสมบัติทางเวลาที่น่าทึ่งซึ่งเราเพิ่งเริ่มจะทำความเข้าใจ"

####################
# Dimensional Dump #
####################
 astral_rift_dimensional_dump: "ที่ทิ้งขยะต่างมิติ(เสียงขยะ)"

 astral_rift.2200.name: "ร่างที่ลอยคว้าง"
 astral_rift.2200.desc: "เราถูกห้อมล้อมไปด้วยขยะ\n\nเป็นระยะๆ ที่เราพบเห็นรอยฉีกขาดของอวกาศเปิดขึ้นรอบตัวเราและทิ้งขยะเพิ่มเติมลงสู่กองขยะหมุนวน จากลักษณะของซากเศษขยะ พื้นที่แห่งนี้กำลังถูกปฏิบัติเสมือนเป็นบ่อทิ้งขยะสำหรับอารยธรรมท่องอวกาศ ชิ้นส่วนและอะไหล่ของเครื่องจักรที่ไม่รู้จักเกลื่อนกลาดอยู่ท่ามกลางขยะที่ใช้แล้วทิ้งในชีวิตประจำวันของครัวเรือนเอเลี่ยนต่างดาว\n\nโดยทั่วไปแล้ว สิ่งของเหล่านี้มีค่าไม่ต่างจากเศษเหล็ก ทว่าเซนเซอร์ของเราได้ตรวจพบสัญญาณของสิ่งมีชีวิต\n\nภายในชุดอวกาศ ร่างกายที่หมดสติของสิ่งมีชีวิตที่ไม่รู้จักนอนสงบนิ่งอยู่ ไม่แน่ชัดว่ามันลอยคว้างอยู่ที่นี่มานานเท่าใดแล้ว"
 astral_rift.2200.a: "นำขึ้นยานและให้การช่วยเหลือ"
 astral_rift.2200.b: "นำขึ้นยานเพื่อกู้เก็บอุปกรณ์เครื่องใช้ของมัน"

 astral_rift.2205.name: "ร่างที่ลอยคว้าง"
 astral_rift.2205.common.1: "การรับเอเลี่ยนต่างดาวที่ลอยอยู่ท่ามกลางขยะขึ้นมาบนยานคือความผิดพลาด"
 astral_rift.2205.common.2: "พวกเขาพูดภาษาที่เราไม่เข้าใจและชี้ไปที่แผงควบคุมของยานทรงกลม(เสียงพูด)อยู่เป็นประจำ พร้อมกับพูดประโยคเดิมซ้ำๆ อย่างเน้นย้ำ"
 astral_rift.2205.desc.help: "หลังจากฟื้นฟูอุณหภูมิร่างกายและดูแลสัญญาณชีพแล้ว เอเลี่ยนต่างดาวก็ฟื้นตัวอย่างรวดเร็วในสภาพที่สับสนและตื่นตระหนก\n\nมันจับกุมตัวสมาชิกทีมแพทย์คนหนึ่งของเราเป็นตัวประกันอย่างรวดเร็วด้วยอาวุธที่ดึงออกมาจากรองเท้าบูทของมัน$astral_rift.2205.common.2$"
 astral_rift.2205.desc.recover_gear: "ชุดอวกาศของมันช่วยให้มันอยู่ในสภาพจำศีล หลังจากถอดออก สิ่งมีชีวิตดังกล่าวก็ฟื้นตัวอย่างรวดเร็วในสภาพที่สับสนและตื่นตระหนก\n\nมันคว้าหัวแร้งเชื่อมโลหะใกล้ๆ และจับสมาชิกทีมวิศวกรของเราเป็นตัวประกันในทันที$astral_rift.2205.common.2$"
 astral_rift.2205.a: "จัดการกำจัดบุคคลดังกล่าวซะ"
 astral_rift.2205.b: "พยายามติดต่อเจรจา"

 astral_rift.2210.name: "ร่างที่ลอยคว้าง"
 astral_rift.2210.common.1: "เราได้กำจัดสิ่งมีชีวิตที่เป็นศัตรูที่เราได้ช่วยชีวิตมาจากกองขยะนี้โดยสรุปแล้ว"
 astral_rift.2210.common.2: "เรามีเวลาวิเคราะห์เอกสารที่มันถืออยู่ในอุปกรณ์ของมัน การแปลเบื้องต้นเกี่ยวกับบัตรประจำตัวระบุว่ามันเป็นพนักงานขนขยะที่มีประสบการณ์ มันต้องบังเอิญทิ้งตัวเองลงในกองขยะนี้พร้อมกับกองขยะที่บรรทุกมาอย่างแน่นอน โดยไม่มีวันได้กลับบ้านเกิด\n\nเราจะละเลยสิ่งมีชีวิตนี้ไปก่อนในตอนนี้ และจะยังคงอยู่ในรอยแยกมิติต่อไปจนกว่าจะระบุและกู้คืนเศษขยะที่มีค่าได้มากที่สุดเท่าที่จะเป็นไปได้"
 astral_rift.2210.desc.help: "$astral_rift.2210.common.1$\n\nแม้ว่าตัวประกันจะได้รับบาดเจ็บจากแผลไหม้เล็กน้อย ทว่าการกระทำที่รวดเร็วของเจ้าหน้าที่รักษาความปลอดภัยของเราก็ช่วยป้องกันความเสียหายเพิ่มเติมได้สำเร็จ\n\n$astral_rift.2210.common.2$"
 astral_rift.2210.desc.recover_gear: "$astral_rift.2210.common.1$\n\nจากการถูกปลดอุปกรณ์เครื่องใช้ไปจนหมดสิ้น จึงไม่ใช่เรื่องยากสำหรับเราในการทำให้มันสงบลงด้วยกระสุนพลาสมานัดเดียว\n\n$astral_rift.2210.common.2$\n\nชุดอวกาศที่เราเก็บกู้ได้นั้นมีโครงสร้างที่ก้าวล้ำนำสมัยอย่างมาก ซึ่งเราวางแผนที่จะเก็บไว้เพื่อการศึกษาค้นคว้าเพิ่มเติม"
 astral_rift.2210.a: "ช่างเป็นเรื่องโชคร้ายสำหรับพวกเขาจริง ๆ"

 astral_rift.2215.name: "การลดความตึงเครียด(เสียงปรับอากาศ)"
 astral_rift.2215.desc: "เพื่อแสดงเจตนารมณ์อันสงบเรียบร้อย เราได้วางอาวุธลง เอเลี่ยนต่างดาวจึงปล่อยมือจาก [Explorer.GetCrewMember] ของเราและวางอาวุธของมันลงตอบแทน ดูเหมือนว่ามันจะอยู่ในภาวะอารมณ์ที่แปรปรวนอย่างหนัก ซึ่งเป็นเรื่องที่คาดเดาได้ภายใต้สถานการณ์ปัจจุบัน\n\nเมื่อได้รับเวลาให้สงบสติอารมณ์ลงบ้าง มันก็เริ่มยอมรับการสื่อสารของเรา\n\nเราได้เริ่มกระบวนการหาหนทางในการเปิดการสนทนาอย่างเป็นทางการ ความคืบหน้าเป็นไปอย่างเชื่องช้า ทว่าการแปลเอกสารเบื้องต้นที่พบในครอบครองบ่งชี้ว่าเอเลี่ยนนี้มีอายุเก่าแก่หลายร้อยปีแล้ว"
 astral_rift.2215.a: "ยอดเยี่ยมมาก"

 astral_rift.2220.name: "ผู้เสียชีวิตจากการปฏิบัติงาน"
 astral_rift.2220.desc: "ก่อนที่เราจะสามารถทำให้เอเลี่ยนต่างดาวที่ดุร้ายสงบลงได้ มันได้จัดการสังหารตัวประกันและคนอื่นๆ อีกหลายคนด้วยปืนพกพลาสมาทรงพลังที่ดึงมาจากรองเท้าบูทของมัน\n\nช่างโชคร้ายที่ [Leader.GetName] อยู่ในรายชื่อของผู้เสียชีวิตด้วย\n\nเรากำลังดึงสายยึดเหนี่ยวฉุกเฉินและเดินทางกลับพร้อมผู้ได้รับบาดเจ็บ\n\nเราได้ใช้เวลาวิเคราะห์ชุดอวกาศของเอเลี่ยนที่กู้ชีพได้ มันถูกสร้างขึ้นจากโลหะผสมที่มีความก้าวล้ำนำสมัยอย่างมากซึ่งควรจะมีประโยชน์แก่เรา"

 astral_rift.2225.name: "คนเก็บเศษขยะที่สูญหาย(เงียบ)"
 astral_rift.2225.desc: "เอเลี่ยนต่างดาวนี้มีนามว่า [astral_rift_dimensional_dump_leader_loc.GetName]\n\nในภารกิจประจำวันเพื่อนำขยะมาทิ้งลงในมิตินี้ [astral_rift_dimensional_dump_leader_loc.GetHeShe] ถูกส่งเข้ามาพร้อมกองขยะโดยไม่ได้เจตนา ปัญหาทางเทคนิคของเครื่องขับเคลื่อนมิติบนยานของ [astral_rift_dimensional_dump_leader_loc.GetHisHer] ต้องการการซ่อมแซมด้วยมือ และ [astral_rift_dimensional_dump_leader_loc.GetHeShe] เป็นคนเดียวที่มีทักษะทางเทคนิคในการแก้ไขมัน ในระหว่างดำเนินการดังกล่าว [astral_rift_dimensional_dump_leader_loc.GetHeShe] เกิดอุบัติเหตุพลัดตกลงไปในเครื่องอัดกาลอวกาศและสูญหายไป\n\nระบบพยุงชีพของชุดอวกาศขั้นสูงของ [astral_rift_dimensional_dump_leader_loc.GetHisHer] ช่วยรักษาสภาพให้ [astral_rift_dimensional_dump_leader_loc.GetHimHer] อยู่ในการจำศีลยาวนานกว่าสองศตวรรษ\n\n[astral_rift_dimensional_dump_leader_loc.GetName] คิดถึงครอบครัวของ [astral_rift_dimensional_dump_leader_loc.GetHisHer] อย่างแสนสาหัส ทว่า [astral_rift_dimensional_dump_leader_loc.GetSXX] ทราบดีว่าเราไม่มีหนทางที่จะส่งตัว [astral_rift_dimensional_dump_leader_loc.GetHimHer] กลับไปยังที่ที่ [astral_rift_dimensional_dump_leader_loc.GetHeShe] จากมาได้เลย\n\nจากการมีทักษะที่โดดเด่นในการควบคุมยานพาหนะขั้นสูง [astral_rift_dimensional_dump_leader_loc.GetHeShe] จะเหมาะสมเป็นอย่างยิ่งในการเข้าสู่โครงการฝึกฝนกองยานของเรา"
 astral_rift.2225.a: "นักบินที่มีทักษะความสามารถสูงคือสมาชิกที่เป็นที่ต้อนรับเสมอ"
 astral_rift.2225.a.tt: "[event_target:astral_rift_dimensional_dump_leader_loc.GetName] จะได้รับการฝึกฝนอย่างเหมาะสม"

 astral_rift.2230.name: "การฝึกฝนของ [From.GetName] เสร็จสิ้นสมบูรณ์"
 astral_rift.2230.desc: "หลังจากผ่านการฝึกฝนอย่างหนัก [From.GetName] ได้พิสูจน์แล้วว่าเป็นนักบินที่ยอดเยี่ยมและได้รับความไว้วางใจจากเหล่านายทหารของเรา [From.GetHeSheCap] จะทำหน้าที่เป็นผู้บัญชาการที่ยอดเยี่ยมและได้รับการเลื่อนตำแหน่งเข้าสู่การปฏิบัติหน้าที่ เพื่อรอการมอบหมายงานต่อไป"
 astral_rift.2230.a: "เป็นส่วนเสริมที่มีคุณค่าอย่างยิ่ง"

###########
# Genesis #
###########
 astral_rift_genesis: "ปฐมกาล(จีน)"
 genesis_insight_modifier: "ความเข้าใจในปฐมกาล(เสียงแทรก)"
 genesis_insight_modifier_desc: "การเผชิญหน้ากับภูมิปัญญาต่างมิติภายในระนาบมิติแอสทรัลช่วยให้เรามีความเข้าใจเป็นพิเศษเกี่ยวกับการสร้างและการพัฒนาของสังคมใหม่ๆ"

 astral_rift.2300.name: "ปฐมกาล(จีน)"
 astral_rift.2300.desc: "ส่วนประกอบของสภาพแวดล้อมนี้ไม่มีสสารตัวตน การสแกนง่ายๆ เผยให้เห็นว่าพื้นที่ทั้งหมดนี้เป็นภาพฉายโฮโลแกรมจากแหล่งกำเนิดที่ไม่รู้จัก\n\nหลังจากเรามาถึงไม่นาน เราได้รับข้อความสื่อสารในภาษาของเราเอง พื้นที่เบื้องหน้าของเราแปลออกมาเป็นข้อความบรรทัดเดียว:\n\n§E\"ฉันไม่รู้จักคุณ\"§!\n\nหลังจากเราอธิบายถึงการมีอยู่ของเรา เอนทิตีดังกล่าวก็กล่าวต่อ:\n\n§E\"ช่างน่าสงสัยยิ่งนัก ตกลงตามนั้น มาเล่นเกมกันเถอะ ฉันจะรับบทเป็นปฐมกาล(เจนิซ)§!\n\nภาพโฮโลแกรมเปลี่ยนไปสู่การจัดเรียงใหม่ บนโลกที่รกร้าง เผ่าพันธุ์ก่อนยุค FTL ([explorer.GetPreFTLLower]) ดิ้นรนเพื่อเอาชีวิตรอด เรากำลังแสดงให้เห็นถึงจุดเริ่มต้นของอารยธรรมเยาว์วัย\n\n§E\"พรประการใดที่เราควรจะมอบให้แก่พวกเขาดี?\"§!"
 astral_rift.2300.a: "ติดอาวุธให้พวกเขาด้วยพละกำลังอำนาจ"
 astral_rift.2300.b: "หว่านเมล็ดพันธุ์แห่งองค์ความรู้"
 astral_rift.2300.c: "เราไม่เล่นเกมกับใคร เปิดใช้งานคลื่นแม่เหล็กไฟฟ้า ESMP)ซะ"

 astral_rift.2305.name: "การแสดงอำนาจ(โครงการพลัง)"
 astral_rift.2305.desc: "ในชั่วพริบตา อารยธรรมโฮโลแกรมได้ก้าวผ่านกาลเวลาไปหลายศตวรรษ\n\n§E"ประชาชนของเราเติบโตขึ้นอย่างทรงพลัง"§!\n\nอารยธรรมที่กำลังพัฒนาได้ใช้พละกำลังที่ค้นพบใหม่เพื่อครอบครองโลกธรรมชาติ พวกเขาเรียกตัวเองว่า [genesis_new_species_base.GetName]\n\n§E"แต่ประชาชนไม่สามารถเจริญรุ่งเรืองได้ด้วยกำลังเพียงอย่างเดียว พวกเขาควรเตรียมพร้อมสำหรับอนาคตอย่างไรดีที่สุด?"§!"
 astral_rift.2305.a: "ผ่านความขยันหมั่นเพียรและการทำงานหนัก"
 astral_rift.2305.b: "ผ่านความคิดสร้างสรรค์และการทดลองค้นคว้า"

 astral_rift.2310.name: "ผลไม้แห่งองค์ความรู้"
 astral_rift.2310.desc: "ในชั่วพริบตา อารยธรรมโฮโลแกรมได้ก้าวผ่านกาลเวลาไปหลายศตวรรษ\n\n§E"ประชาชนของเรามีความเฉลียวฉลาด"§!\n\nอารยธรรมที่กำลังพัฒนาได้ใช้สติปัญญาของตนเพื่อควบคุมโลกธรรมชาติ พวกเขาเรียกตัวเองว่า [genesis_new_species_base.GetName]\n\n§E"ทว่าสติปัญญาที่ปราศจากทิศทางนั้นไร้ความหมาย เราควรวางเส้นทางแบบใดให้แก่พวกเขาดี?"§!"
 astral_rift.2310.a: "เส้นทางแห่งความขยันหมั่นเพียร"
 astral_rift.2310.b: "เส้นทางแห่งสัญชาตญาณ"

 astral_rift.2315.name: "ปิดการทำงาน"
 astral_rift.2315.desc: "เราได้ปล่อยคลื่นแม่เหล็กไฟฟ้าพลังงานสูงผ่านสายยึดเหนี่ยวของเรา สลายสภาพแวดล้อมโฮโลแกรมลงโดยสิ้นเชิง\n\n\"เจนิซิส\"เงียบลงไปในที่สุด สิ่งมีชีวิตปริศนานี้เป็นเพียงหน่วยประมวลผลกลางขั้นสูงเท่านั้น เราพบแกนกลางที่ไร้การทำงานของมันลอยนิ่งอย่างไร้ความเคลื่อนไหวในความว่างเปล่า เรานำมันขึ้นมาบนยานและจะนำกลับไปทำการศึกษาเพิ่มเติม\n\nไม่ว่าสถานที่แห่งนี้เคยเป็นอะไรมาก่อน ตอนนี้มันไม่มีอยู่อีกต่อไปแล้ว"

# Second choice
 astral_rift.final_choice.intro: "กาลเวลาผ่านไปนับพันปีสำหรับอารยธรรมโฮโลแกรมของเรา"

 astral_rift.strength_choice_1: "พละกำลังอำนาจได้มอบทรัพยากรและความอุดมสมบูรณ์"
 astral_rift.strength_choice_2: "สังคมที่มีการจัดลำดับชั้นอย่างเข้มงวดได้ก่อตัวขึ้นเพื่อเผชิญหน้ากับแต่ละภารกิจและความท้าทายโดยตรง"

 astral_rift.intelligence_choice_1: "สติปัญญาช่วยส่งเสริมการเติบโตและความเฉลียวฉลาด"
 astral_rift.intelligence_choice_2: "สังคมแห่งการเรียนรู้นี้ได้นำตรรกะและเหตุผลมาใช้ในทุกๆ ความท้าทาย"

 astral_rift.final_choice.outro: "§E"บัดนี้พวกเขาก้าวไปสู่ดวงดาวแล้ว ค่านิยมใดที่พวกเขาควรจะยึดถือสืบต่อไป?"§!"

 astral_rift.2320.name: "มุ่งสู่ดวงดาว"
 astral_rift.2320.desc.common: "ความขยันหมั่นเพียรและการทำงานหนักได้ทำหน้าที่ส่วนที่เหลือ"
 astral_rift.2320.desc.strength: "$astral_rift.final_choice.intro$\n\n$astral_rift.strength_choice_1$ $astral_rift.2320.desc.common$ $astral_rift.strength_choice_2$\n\n$astral_rift.final_choice.outro$"
 astral_rift.2320.desc.intelligence: "$astral_rift.final_choice.intro$\n\n$astral_rift.intelligence_choice_1$ $astral_rift.2320.desc.common$ $astral_rift.intelligence_choice_2$\n\n$astral_rift.final_choice.outro$"
 astral_rift.2320.a: "รักษาวิถีชีวิตดั้งเดิมเอาไว้"
 astral_rift.2320.b: "ท้าทายทุกดินแดนใหม่"

 astral_rift.2325.name: "$astral_rift.2320.name$"
 astral_rift.2325.desc.common: "ความคิดสร้างสรรค์และสัญชาตญาณได้ทำหน้าที่ส่วนที่เหลือ"
 astral_rift.2325.desc.strength: "$astral_rift.final_choice.intro$\n\n$astral_rift.strength_choice_1$ $astral_rift.2325.desc.common$ $astral_rift.strength_choice_2$\n\n$astral_rift.final_choice.outro$"
 astral_rift.2325.desc.intelligence: "$astral_rift.final_choice.intro$\n\n$astral_rift.intelligence_choice_1$ $astral_rift.2325.desc.common$ $astral_rift.intelligence_choice_2$\n\n$astral_rift.final_choice.outro$"
 astral_rift.2325.a: "$astral_rift.2320.a$"
 astral_rift.2325.b: "$astral_rift.2320.b$"

# Last choice
 astral_rift.2330.name: "ชีวิตใหม่"
 astral_rift.2330.desc: "§E\"การจำลองของเราเสร็จสิ้นแล้ว ตัวเลือกของคุณได้รับการบันทึกเรียบร้อย ขอบคุณสำหรับความร่วมมือ\"§!\n\n\"เจนิซิส\"ยุติการสื่อสารทั้งหมดลง และเราถูกดีดตัวออกมาในมิติของเราอย่างรุนแรง สิ่งที่น่ากังวลเร่งด่วนกว่าคือคนแปลกหน้าที่เราพบร่วมกับเราด้วย\n\nพวกเขามีลักษณะท่าทางภายนอกเหมือนกับที่เห็นในโฮโลแกรมทุกประการ และให้การต้อนรับเราอย่างอบอุ่น การตรวจทางการแพทย์อย่างรวดเร็วเผยให้เห็นความจริงทางชีวภาพของพวกเขา - ไม่มีข้อสงสัยใดๆ เลยว่าคนเหล่านี้คือสิ่งมีชีวิตที่มีชีวิตจริงๆ พวกเขาเกิดขึ้นมาได้อย่างไร และถูกส่งตัวขึ้นมาบนยานสเปกทีฟได้อย่างไรยังคงเป็นปริศนา\n\nสำหรับตอนนี้เราจะให้พวกเขาตั้งรกรากบนดาวเคราะห์ใกล้เคียง [genesis_new_species_selected_planet.GetName] ณ ที่นั้น เราจะสามารถสังเกตพัฒนาการของพวกเขาต่อไปได้"

#########################
# Entangled Dark Matter #
#########################
 foreign_consciousness_modifier: "จิตสำนึกต่างถิ่น(กังวล)"
 leader_trait_foreign_consciousness: "$foreign_consciousness_modifier$"
 leader_trait_foreign_consciousness_desc: "ผู้นำคนนี้เป็นร่างภาชนะของเอนทิตีพลังจิตที่ถือกำเนิดในรอยแยกมิติ ช่วยให้มีความเข้าใจอย่างลึกซึ้งยิ่งขึ้นเกี่ยวกับฟิสิกส์อันแปลกประหลาดภายในระนาบแอสทรัล"

 astral_rift_entangled_dark_matter: "สสารมืดพัวพัน(สสารมืด)"

 astral_rift.2400.name: "โครงข่ายอันแปลกประหลาด"
 astral_rift.2400.desc: "เราพบว่าตัวเองอยู่ภายในโครงข่ายขนาดมหึมา พลังงานประทุขึ้นตามจังหวะตามแนวผนังที่เป็นตะแกรง\n\nกลุ่มสสารมืดที่หนาแน่นถูกกักตัวไว้ลึกภายในโครงข่ายที่พันกันยุ่งเหยิงนี้ เส้นใยโปร่งแสงแผ่ตัวออกต้านบาเรียพลังงาน ทำให้เกิดประกายไฟเมื่อสัมผัสก่อนที่จะหดตัวกลับไป อนุภาคคล้ายวิญญาณเคลื่อนไหวราวกับมีแบบแผน ไม่ว่ากลุ่มอนุภาคผีสิงนี้จะเป็นอะไร มันยังไม่ได้ตอบสนองต่อการมีอยู่ของเราเลย"
 astral_rift.2400.a: "ตรวจสอบโครงข่าย"
 astral_rift.2400.b: "เข้าใกล้กลุ่มสสารมืด"

 astral_rift.2405.name: "กระแสไฟฟ้าจำกัด"
 astral_rift.2405.desc: "โครงข่ายดังกล่าวครอบคลุมพื้นที่ผิวขนาดใหญ่และเปิดรับอวกาศรอบข้างอย่างสมบูรณ์ เทคโนโลยีที่ใช้ในการสร้างนั้นไม่คุ้นเคย แต่สมเหตุสมผลที่จะสันนิษฐานว่ามันถูกออกแบบมาเพื่อดักจับและเก็บกักวัสดุที่ไม่ใช่ของแข็ง\n\nกลุ่มเมฆอสัณฐานเคลื่อนไหวเล็กน้อยในขณะที่เราสำรวจรอบๆ ตัวเรา มันเป็นสิ่งเดียวที่มีอยู่อีกตัวในโครงข่ายนี้\n\nขณะที่เราสังเกตการณ์ต่อ มีการพบกลไกที่ยื่นออกมาจากโครงตาข่าย ดูเหมือนว่ามันจะทำหน้าที่จำกัดแอมพลิจูดของกระแสไฟฟ้าที่ไหลเข้าสู่โครงข่าย"
 astral_rift.2405.a: "ถอดอุปกรณ์ออก"
 astral_rift.2405.b: "สืบสวนมวลสารที่ถูกดักจับ"

 astral_rift.2410.name: "การสื่อสารทางจิต(เสียงสื่อสาร)"
 astral_rift.2410.desc.common.default: "เมื่อเราเข้าใกล้กลุ่มพลังงานลึกลับ เราเริ่มรู้สึกได้ถึงการมีอยู่บางอย่างในจิตใจของเรา ชิ้นส่วนความรู้ที่ดูเหมือนจะสุ่มถูกดึงขึ้นมา และความทรงจำเก่าๆ ถูกกระตุ้น แม้จะรู้สึกถึงการรุกล้ำจิตใจ แต่เราไม่พบบรรยากาศที่เป็นอันตรายหรือสร้างความอึดอัดใจแต่อย่างใด"
 astral_rift.2410.desc.common.gestalt: "เมื่อเราเข้าใกล้กลุ่มพลังงานลึกลับ ตรวจพบจิตสำนึกอิสระแต่เป็นมิตรใน [Explorer.GetNetworkName] ของเราซึ่งมีต้นกำเนิดมาจาก [Leader.GetName] มันดูเหมือนจะค้นผ่านความรู้และความทรงจำโดยรวมของเรา"
 astral_rift.2410.desc.common: "เอนทิตีดังกล่าวเคลื่อนไหว และข้อความหนึ่งก็ปรากฏขึ้นในใจของเรา: §E"ฉันไม่เคยพบสิ่งมีชีวิตชนิดเดียวกับคุณมาก่อน พวกคุณคืออะไร?"§!"
 astral_rift.2410.desc.default: "$astral_rift.2410.desc.common.default$\n\n$astral_rift.2410.desc.common$"
 astral_rift.2410.desc.gestalt: "$astral_rift.2410.desc.common.gestalt$\n\n$astral_rift.2410.desc.common$"
 astral_rift.2410.a: "เราคือ [Explorer.GetSpeciesNamePlural]"
 astral_rift.2410.b: "เราคือคนแปลกหน้าของสถานที่แห่งนี้"
 astral_rift.2410.c: "เราคือนักสำรวจจากต่างโลก"

 astral_rift.2411.name: "สร้างการสื่อสารสำเร็จ"
 astral_rift.2411.desc.common: "เอนทิตีดังกล่าวเคลื่อนไหว และมีการแพร่สัญญาณข้อความผ่านเครือข่ายสื่อสารภายในของทรงกลม:§E\"ฉันไม่เคยพบสิ่งมีชีวิตชนิดเดียวกับคุณมาก่อน พวกคุณคืออะไร?\"§!"
 astral_rift.2411.desc.default: "$astral_rift.2410.desc.common.default$\n\n$astral_rift.2411.desc.common$"
 astral_rift.2411.desc.gestalt: "$astral_rift.2410.desc.common.gestalt$\n\n$astral_rift.2411.desc.common$"

 astral_rift.2415.name: "ข้อเสนออันเป็นลางร้าย"
 astral_rift.2415.desc.common: "เอนทิตีไตร่ตรองคำตอบของเรา มีข้อความส่งมาอีกครั้ง: §E"เผ่าพันธุ์ที่น่าสนใจอีกชนิด ช่างน่าตื่นเต้นยิ่งนักที่ได้พบคุณ"\n\n"เผ่าพันธุ์ของฉันประกอบขึ้นเป็นรากฐานของความเป็นจริง เราเป็นทั้งผู้พเนจรและนักสำรวจที่มีความสนใจอย่างมากในการมีประสบการณ์ในจักรวาล น่าเสียดายที่สิ่งมีชีวิตชนิดอื่นเห็นเราเป็นเพียงแหล่งแร่ธาตุ เป็นแหล่งเชื้อเพลิงที่ผ่านมาให้ดักจับและเก็บเกี่ยวผลประโยชน์เท่านั้น"§!"
 astral_rift.2415.desc.common.non_gestalt: "§E"ฉันต้องการเข้าสิงร่างของ [Leader.GetName] การทำเช่นนั้นจะช่วยให้ฉันเป็นอิสระจากคุกแห่งนี้"§!"
 astral_rift.2415.desc.common.non_psionic: "§E"หากคุณอนุญาตให้ฉันยึดร่างนี้ ฉันจะใช้อยู่ร่วมกับจิตสำนึกของฉันได้หรือไม่"§!"
 astral_rift.2415.desc.common.psionic: "§E"เราจะอยู่ร่วมกัน ด้วยความสามารถร่วมกันของเรา เราจะขับเคลื่อนขอบเขตทางวิทยาศาสตร์ของเราไปสู่จุดสูงสุดใหม่"§!"
 astral_rift.2415.desc.common.gestalt: "§E"ด้วยความช่วยเหลือของคุณ ฉันจะสามารถหลบหนีจากคุกแห่งนี้ได้ เผ่าพันธุ์ของคุณเข้ากันได้กับเจตนาของฉัน ฉันปรารถนาเพียงเพื่อเข้าร่วมจิตสำนึกร่วมของคุณ ฉันจะกระจายจิตใจของฉันข้าม [Leader.Species.GetBrainJunctionName] ของคุณ และช่วยเสริมสร้างความเข้าใจในการแสวงหาทางวิทยาศาสตร์ทั้งหมดของคุณ"§!"
 astral_rift.2415.desc.gestalt_psionic: "$astral_rift.2415.desc.common$\n\n$astral_rift.2415.desc.common.psionic$\n\n$astral_rift.2415.desc.common.gestalt$"
 astral_rift.2415.desc.gestalt: "$astral_rift.2415.desc.common$\n\n$astral_rift.2415.desc.common.non_psionic$\n\n$astral_rift.2415.desc.common.gestalt$"
 astral_rift.2415.desc.psionic: "$astral_rift.2415.desc.common$\n\n$astral_rift.2415.desc.common.non_gestalt$\n\n$astral_rift.2415.desc.common.psionic$"
 astral_rift.2415.desc.default: "$astral_rift.2415.desc.common$\n\n$astral_rift.2415.desc.common.non_gestalt$\n\n$astral_rift.2415.desc.common.non_psionic$"
 astral_rift.2415.a: "เสนอชื่อนักวิทยาศาสตร์คนนี้เป็นร่างภาชนะ"
 astral_rift.2415.b: "ปฏิเสธข้อเสนอนี้"
 astral_rift.2415.c: "หลอมรวมเอนทิตีเข้าด้วยกัน"
 astral_rift.2415.d: "ปฏิเสธการหลอมรวม"

 astral_rift.2420.name: "คำอ้อนวอนของนักโทษ"
 astral_rift.2420.desc.common: "เอนทิตีลึกลับแสดงปฏิกิริยารุนแรงต่อการปฏิเสธของเรา โดยฟาดฟันเข้าใส่โครงสร้างตาข่ายในคลื่นแห่งความโกรธเกรี้ยวด้วยเส้นใยพลังงานและประกายไฟ\n\nหลังจากผ่านไปสองสามนาที มันก็สงบลง เอนทิตีที่อ่อนล้าได้เปิดการสื่อสารอีกครั้ง §E"ตกลง หากคุณไม่ปรารถนาที่จะให้ฉันเข้าร่วมกับคุณ อย่างน้อยก็มอบความเมตตาด้วยความตายให้แก่ฉันเถอะ"§!\n\nมันชี้เส้นใยพลังงานและกล่าวต่อ §E"การปิดการทำงานของกลไกนี้จะส่งกระแสพลังงานไปทั่วโครงข่าย ทำให้อนุภาคของฉันหยุดทำงาน การใช้ชีวิตที่ถูกคุมขังนั้นไม่ใช่ชีวิตเลย"§!"
 astral_rift.2420.desc.machine: "เสียงคร่ำครวญดึกดำบรรพ์ดังก้องผ่านสายการสื่อสารภายในในท้องถิ่น\n\n$astral_rift.2420.desc.common$"
 astral_rift.2420.desc.hive: "เสียงคร่ำครวญดึกดำบรรพ์ดังก้องผ่านจิตสำนึกร่วมของเรา\n\n$astral_rift.2420.desc.common$"
 astral_rift.2420.desc.default: "เสียงคร่ำครวญดึกดำบรรพ์ดังก้องผ่านจิตใจของทีมวิจัย\n\n$astral_rift.2420.desc.common$"
 astral_rift.2420.a: "ทำการุณยฆาตสิ่งมีชีวิตลึกลับนี้"
 astral_rift.2420.b: "เก็บรักษานักโทษไว้เพื่อการศึกษา"
 astral_rift.2420.c: "สังหารมันซะ"

 astral_rift.2425.name: "กระแสไฟฟ้าไร้ขีดจำกัด"
 astral_rift.2426.name: "การปลดปล่อยอันเปี่ยมด้วยเมตตา"
 astral_rift.2427.name: "การกำจัดล้าง"
 astral_rift.2425.desc.common.1: "เราได้ปิดการทำงานของกลไกส่วนกลาง ส่งคลื่นพลังงานสูงไหลเวียนผ่านส่วนภายในของโครงข่าย"
 astral_rift.2425.desc.common.2: "มวลพลังงานส่วนกลางจืดจางลงในขณะที่สสารมืดประทุและเผาไหม้ต้านโครงข่ายที่ได้รับพลังงานไฟฟ้า"
 astral_rift.2425.desc.common.3: "ประกายไฟระเบิดออกและสสารมืดก็โปรยปรายออกมาด้านนอก เคลือบพื้นผิวยานทรงกลม §Y$tech_rift_sphere$§! ด้วยฟิล์มบางๆ"
 astral_rift.2425.desc: "$astral_rift.2425.desc.common.1$\n\nเส้นใยแยกตัวออกจากกลุ่มเมฆพลังงาน พุ่งชนกับบาเรียพลังงานอย่างสิ้นหวัง $astral_rift.2425.desc.common.2$\n\nประกายไฟสีน้ำเงินรุนแรงประทุขึ้นใจกลางโครงสร้าง บีบอัดอนุภาคให้เหลือเพียงเศษเสี้ยวของขนาดเดิม $astral_rift.2425.desc.common.3$"
 astral_rift.2426.desc: "$astral_rift.2425.desc.common.1$\n\nเส้นใยแยกตัวออกจากสิ่งมีชีวิตลึกลับ พุ่งชนกับบาเรียพลังงานอย่างสิ้นหวัง $astral_rift.2425.desc.common.2$\n\nประกายไฟสีน้ำเงินรุนแรงประทุขึ้นใจกลางโครงสร้าง บีบอัดเอนทิตีดังกล่าวให้เหลือเพียงเศษเสี้ยวของขนาดเดิม $astral_rift.2425.desc.common.3$"
 astral_rift.2427.desc: "$astral_rift.2426.desc$"
 astral_rift.2425.a: "เครื่องจักรกลที่น่าทึ่งมาก"
 astral_rift.2425.b: "ขอให้มันไปสู่สุขคติ"
 astral_rift.2427.c: "โชคดีนะ"

 astral_rift.2430.name: "จิตสำนึกที่ถูกดูดซับ"
 astral_rift.2430.desc.common: "บัดนี้มวลสารลึกลับหยุดนิ่งสนิทแล้ว มันแพร่กระจายอย่างสม่ำเสมอไปทั่วโครงข่าย"
 astral_rift.2430.desc: "[Leader.GetName] ถูกมัดติดกับม้านั่งตรวจโรค และการโอนย้ายเริ่มต้นขึ้น พวกเขาบิดตัวด้วยความอึดอัด กล้ามเนื้อกระตุกอย่างควบคุมไม่ได้ในขณะที่จิตสำนึกต่างถิ่นเข้าครอบงำจิตใจ เอนทิตีลึกลับกลายเป็นพายุหมุนวนของพลังงานที่ไม่เสถียร ทันใดนั้น ทุกอย่างเงียบลง และ [Leader.GetName] ก็ลุกขึ้นยืนด้วยท่าทางใหม่\n\n$astral_rift.2430.desc.common$"
 astral_rift.2431.desc: "เอนทิตีลึกลับกลายเป็นพายุหมุนวนของพลังงานที่ไม่เสถียร [Leader.GetName] บิดตัวด้วยความอึดอัด กล้ามเนื้อกระตุกอย่างควบคุมไม่ได้ ทันใดนั้น พวกเขาก็ลุกขึ้นยืนด้วยสีหน้าที่ว่างเปล่าแต่ครุ่นคิด หลังจากหยุดชะงักไปครู่หนึ่ง พวกเขารับรู้ถึงทีมที่เหลือด้วยการพยักหน้า [Leader.GetName] และส่งสัญญาณให้เดินทางกลับไปยังยานวิทยาศาสตร์\n\n$astral_rift.2430.desc.common$"
 astral_rift.2430.a: "ยินดีต้อนรับสู่กลุ่มจิตร่วมของเรา"

 astral_rift.2435.name: "ภาวะแทรกซ้อนอันโชคร้าย"
 astral_rift.2435.desc: "[Leader.GetName] ถูกมัดติดกับม้านั่งตรวจโรค และการโอนย้ายเริ่มต้นขึ้น พวกเขาบิดตัวด้วยความอึดอัด กล้ามเนื้อกระตุกอย่างควบคุมไม่ได้ในขณะที่จิตสำนึกต่างถิ่นพยายามครอบครองจิตใจ อย่างไรก็ตาม [Leader.GetName] สามารถหลุดออกจากเครื่องพันธนาการและคว้าอาวุธที่ซ่อนอยู่ได้สำเร็จ จากนั้นพวกเขาก็ปลิดชีพตนเอง สังหารทั้งตัวเองและสิ่งมีชีวิตลึกลับไปพร้อมกันในกระบวนการนี้\n\nทีมที่เหลือพยายามรวบรวมทรัพยากรอื่นๆ เท่าที่มีอยู่ในพื้นที่นี้ก่อนจะเดินทางกลับ รวมถึงสสารมืดจำนวนมากด้วย"

 astral_rift.2440.desc.common: "บัดนี้มวลสารลึกลับหยุดนิ่งสนิทแล้ว มันแพร่กระจายอย่างสม่ำเสมอไปทั่วโครงข่าย"
 astral_rift.2440.desc.hive: "เอนทิตีลึกลับหมุนวนและดิ้นรนภายในตัวเองในขณะที่เราดูดซับจิตสำนึกของมันเข้าสู่เครือข่ายใยจิตสำนึกของเรา องค์ความรู้และการสังเกตการณ์นับพันปีเข้าสู่จิตสำนึกร่วมที่ยิ่งใหญ่ขึ้นของเรา\n\n$astral_rift.2440.desc.common$"
 astral_rift.2440.desc.machine: "เอนทิตีลึกลับหมุนวนและดิ้นรนภายในตัวเองในขณะที่การส่งข้อมูลเริ่มต้นขึ้น ข้อมูลความรู้และการสังเกตการณ์นับพันปีเข้าสู่เครือข่าย การปรับตั้งค่าให้มีประสิทธิภาพตามข้อมูลนี้ได้รับการดำเนินการตามความเหมาะสม\n\n$astral_rift.2440.desc.common$"

 astral_rift.2445.name: "ชีวิตในกรงขัง"
 astral_rift.2445.desc.common: "ทุกๆ เส้นใยของสสารมืดหดตัวกลับเข้าสู่มวลหลักส่วนกลาง\n\nเราได้ติดตั้งโดรนเฝ้าระวังและโครงสร้างพื้นฐานข้อมูลสำหรับการสังเกตการณ์ข้ามรอยแยกของอุปกรณ์นี้และนักโทษของมัน\n\nหลายวันผ่านไปนับตั้งแต่เราออกจากรอยแยกมิติ และเอนทิตีดังกล่าวก็ยังคงไม่มีการเคลื่อนไหวใดๆ เลย"
 astral_rift.2445.desc.default: "เมื่อการตัดสินใจของเราได้รับการแสดงอย่างชัดเจน สิ่งมีชีวิตลึกลับก็ตัดการเชื่อมต่อทางจิตในทันที $astral_rift.2445.desc.common$"
 astral_rift.2445.desc.robotic: "เมื่อการตัดสินใจของเราได้รับการแสดงอย่างชัดเจน สิ่งมีชีวิตลึกลับก็ตัดสายการสื่อสารในทันที $astral_rift.2445.desc.common$"
 astral_rift.2445.a: "เป็นตัวอย่างที่แปลกประหลาดมาก"

 astral_rift.2450.name: "เป้าหมายการวิจัยได้รับการการุณยฆาต"
 astral_rift.2450.desc: "เอนทิตีบนฝั่งของรอยแยกมิติที่เรากำลังศึกษาในระบบดาว [From.System.GetName] ได้ถูกกำจัดลงโดยผู้กระทำที่ไม่รู้จักในมิตินั้น ข้อมูลการวิจัยที่เรากำลังรวบรวมได้ยุติลง"

###################
# Bleached Planet #
###################
 leader_trait_black_light_blinded: "ตาบอดเพราะแสงสีดำ"
 leader_trait_black_light_blinded_desc: "ตาบอดจากการจ้องมองดวงอาทิตย์มืดมิดในระนาบแอสทรัล ผู้นำคนนี้มีความปรารถนาในความรู้อย่างไม่รู้จักพอ"

 astral_rift_bleached_planet: "ดาวเคราะห์ฟอกขาว(ถูกบีบ)ดาวเคราะห์)"

 astral_rift.2500.name: "สภาพแวดล้อมที่เต็มไปด้วยเถ้าถ่าน"
 astral_rift.2500.desc: "เราได้เข้าสู่ชั้นบรรยากาศของดาวเคราะห์ยุโรปภาคพื้นทวีป(ชาวโลก)ดาวเคราะห์ดวงนี้ดูเหมือนจะเอื้อต่อการอยู่อาศัย ทว่าภูมิประเทศและใบไม้มีสีซีดผิดปกติ ราวกับว่าพื้นผิวและทุกอย่างบนนั้นถูกฟอกขาวจนหมดสิ้น\n\nแม้ว่าจะเห็นพืชพรรณได้ชัดเจน ทว่าเซนเซอร์บนยานกลับไม่ตรวจพบสัญญาณชีพใดๆ เลย การวิเคราะห์ระบบนิเวศของดาวเคราะห์ดวงนี้อย่างละเอียดต้องการการสำรวจทางชีวภาพโดยตรง\n\nเราได้ระบุจุดลงจอดที่มีศักยภาพแล้ว"
 astral_rift.2500.a: "สำรวจภูมิประเทศ"

 astral_rift.2505.name: "ทิวทัศน์ฟอกขาว"
 astral_rift.2505.desc.common.1: "เมื่อออกนอกยานทรงกลม §Y$tech_rift_sphere$§! เราก็กระจายกำลังเพื่อสืบสวนสภาพแวดล้อมโดยรอบ ดินประกอบด้วยชั้นที่เปราะบางหลายชั้น ซึ่งสลายตัวลงเมื่อได้รับแรงกดทับ"
 astral_rift.2505.desc.common.2: "ชีวิตพืชก็เปราะบางในลักษณะเดียวกัน โดยจะแหลกสลายแม้สัมผัสเพียงเล็กน้อย เราได้เฝ้าสังเกตหน่อไม้ที่ยื่นขึ้นมาจากพื้นดิน และการมีอยู่ของตาตูมบนกิ่งก้าน มีสัญญาณชีวิตที่ชัดเจน ทว่าเครื่องมือตรวจวัดของเรายังคงปฏิเสธมัน\n\nขณะที่การสำรวจดำเนินต่อไป เราเริ่มตรวจพบความเคลื่อนไหวใต้ดิน จากวิถีเส้นทางปัจจุบันของมัน ไม่ว่าอะไรก็ตามที่กำลังจะขึ้นมา มันจะโผล่พ้นพื้นผิวในเวลาไม่ถึงหนึ่งชั่วโมง"
 astral_rift.2505.desc.default: "$astral_rift.2505.desc.common.1$\n\nมีร่องรอยของแร่ธาตุหลักอยู่บ้าง ทว่ามันยากที่จะจินตนาการว่าสิ่งใดจะเติบโตภายใต้เงื่อนไขดังกล่าวได้\n\n$astral_rift.2505.desc.common.2$"
 astral_rift.2505.desc.plantoid: "$astral_rift.2505.desc.common.1$\n\nดินนี้ควรจะแทบไม่สามารถค้ำจุนต้นกล้าได้เลย นับประสาอะไรกับลานเพาะตูม\n\n$astral_rift.2505.desc.common.2$"
 astral_rift.2505.a: "ถอยกลับไปที่ยานทรงกลม §Y$tech_rift_sphere$§!"
 astral_rift.2505.b: "เตรียมพร้อมสำหรับการติดต่อเผชิญหน้า"

 astral_rift.2510.name: "สิ่งมีชีวิตจำพวกหิน(หุ่นเจาะ)"
 astral_rift.2510.desc: "เมื่อการเคลื่อนไหวใต้ดินรุนแรงยิ่งขึ้น เราเฝ้ามองจากเบื้องบนขณะที่ภูมิประเทศที่เปราะบางปะทุออกเป็นช่องขนาดเล็กจำนวนมาก\n\nจากแต่ละช่องเหล่านั้นมีสิ่งมีชีวิตลิทอยด์(lithoid)ขนาดเล็กโผล่ออกมา ร่างที่สลักขึ้นอย่างหยาบๆ ของพวกมันยึดครองพื้นที่จากขอบฟ้าจรดขอบฟ้า รวมถึงจุดลงจอดเดิมของเราด้วย แม้ภายนอกจะดูสมบุกสมบัน แต่สิ่งมีชีวิตเหล่านี้เคลื่อนไหวอย่างสง่างามผ่านพื้นผิวที่เป็นตะกอน ระมัดระวังไม่ให้ทำลายชีวิตพืชที่บอบบาง เป็นที่น่าสังเกตว่าเซนเซอร์บนยานยังคงตรวจไม่พบสัญญาณชีวิตใดๆ\n\nพวกมันยืนขึ้นและหันหน้าไปทางขอบฟ้าเป็นหนึ่งเดียวกัน พวกมันยังไม่ได้ตอบสนองต่อการมีอยู่ของเรา\n\nมีความรู้สึกแห่งการคาดหวัง แต่เพื่ออะไรกัน?"
 astral_rift.2510.a: "บินมุ่งหน้าไปยังขอบฟ้าอันห่างไกล"
 astral_rift.2510.b: "รอเคียงข้างไปกับเหล่าสิ่งมีชีวิตเหล่านั้น"

 astral_rift.2515.name: "$astral_rift.2510.name$"
 astral_rift.2515.desc: "เมื่อการเคลื่อนไหวใต้ดินรุนแรงยิ่งขึ้น เราเฝ้ามองรอบๆ ตัวเราขณะที่ภูมิประเทศที่เปราะบางปะทุออกเป็นช่องขนาดเล็กจำนวนมาก\n\nจากแต่ละช่องเหล่านั้นมีสิ่งมีชีวิตลิทอยด์ขนาดเล็กโผล่ออกมา ร่างที่สลักขึ้นอย่างหยาบๆ ของพวกมันยึดครองพื้นที่จากขอบฟ้าจรดขอบฟ้า ล้อมรอบค่ายพักแรมของเรา รูปลักษณ์ที่หยาบกร้านขัดกับการเคลื่อนไหวอันสง่างาม สิ่งมีชีวิตเหล่านั้นร่อนผ่านพื้นที่ คอยหลบหลีกอุปกรณ์และชีวิตพืชท้องถิ่นของเราอย่างระมัดระวัง นอกจากหลบเราแล้ว ไม่มีสิ่งมีชีวิตเหล่านี้ตัวใดตอบสนองต่อการมีอยู่ของเราบนดาวเคราะห์ของพวกเขาเลย\n\nในทันใดนั้น สิ่งมีชีวิตทั้งหมดก็ยืนขึ้นเพื่อหันหน้าไปทางขอบฟ้า มีความรู้สึกคาดหวังที่แน่นอนเกิดขึ้น ทว่าเพื่ออะไรกัน?"
 astral_rift.2515.a: "ตรวจสอบสิ่งมีชีวิตจำพวกหิน"
 astral_rift.2515.b: "$astral_rift.2510.b$"

 astral_rift.2520.name: "รุ่งอรุณที่มืดมิดที่สุด(รุ่งอรุณที่สุด)"
 astral_rift.2520.desc.common: "ยานทรงกลม §Y$tech_rift_sphere$§! เริ่มเดินทางผ่านชั้นบรรยากาศของดาวเคราะห์ ติดตามสายตาของสิ่งมีชีวิตเหล่านั้นไปยังขอบฟ้า ในไม่ช้า ม่านหมอกก็เริ่มปกคลุมพื้นผิวเเถ้าถ่านของดาวเคราะห์ บนท้องฟ้า ดวงดาวมืดมิดกำลังลอยขึ้นมา"
 astral_rift.2520.desc.non_gestalt: "ความแวววาวอันน่าสะกดจิตของมันทาบลงบนเราแล้ว และเมื่อมันส่องสว่าง เราก็ตกอยู่ในห้วงภวังค์ของความงามและความลึกลับของมัน ในความมืดอันงดงามนี้ ยิ่งเรามองไปที่ดวงดาวนานเท่าใด วัตถุประสงค์ของเราก็ยิ่งชัดเจนมากขึ้นเท่านั้น"
 astral_rift.2520.desc.gestalt: "$astral_rift.2520.desc.common$\n\nรังสีประหลาดของดวงดาวมีผลกระทบที่ผิดปกติทางจิตใจต่อ [explorer.GetIndividualNamePlural] ของเรา พวกเขาแตกแยกออกไป ทว่าในตอนนี้ยังคงเชื่อมต่อกันอย่างเบาบาง"
 astral_rift.2520.desc.organic_non_gestalt: "$astral_rift.2520.desc.common$\n\n$astral_rift.2520.desc.non_gestalt$ ลำแสงจากดวงดาวมืดมิดนี้ส่งกระแสความคาดหวังซ่านไปทั่วร่างกายของเรา"
 astral_rift.2520.desc.default: "$astral_rift.2520.desc.common$\n\n$astral_rift.2520.desc.non_gestalt$"
 astral_rift.2520.a: "ดำเนินการสังเกตการณ์ต่อไป"
 astral_rift.2520.b: "หันหน้าหนีซะ!"

 astral_rift.2525.name: "ชีววิทยาทางธรณีวิทยา(ชีวประวัติ)"
 astral_rift.2525.desc.common: "สิ่งมีชีวิตลิทอยด์ที่เราตรวจสอบเริ่มกระวนกระวายใจหากมันถูกหันหน้าหนีจากทิศทางของขอบฟ้าที่สว่างขึ้น ทว่านอกจากนั้นมันให้ความร่วมมือเป็นอย่างดี\n\nสิ่งมีชีวิตนี้สูงประมาณครึ่งเมตรและมีความหนาแน่นสูงมาก ด้านหน้ามีเฉดสีเทาที่อ่อนกว่าด้านหลังมาก ดวงตาสีซีดทั้งสองข้างลึกเข้าไปในเบ้าตา และผิวภายนอกร้อนเมื่อสัมผัส พวกมันไม่มีปากที่มองเห็นได้ และต้องได้รับสารอาหารจากช่องทางอื่น"
 astral_rift.2525.desc.default: "$astral_rift.2525.desc.common$"
 astral_rift.2525.desc.lithoid: "$astral_rift.2525.desc.common$\n\nเป็นเผ่าพันธุ์ยุคดึกดำบรรพ์ ทว่ามีลักษณะที่น่าสนใจและมีกลิ่นหอม เหมาะสำหรับการนำมาเลี้ยงเป็นสัตว์เลี้ยงอย่างยิ่ง"
 astral_rift.2525.desc.unfriendly_nonlithoid: "$astral_rift.2525.desc.common$\n\nเพื่อเป็นการทดลอง เราได้ทุบตัวอย่างไข่ให้แตกออกเป็นชิ้นเล็กชิ้นน้อยนับร้อยชิ้นต่อหน้าสิ่งมีชีวิตอื่นๆ ทว่าไม่มีการตอบสนองที่เห็นได้ชัดเจน"
 astral_rift.2525.a: "ถอยกลับไปที่ยานทรงกลม §Y$tech_rift_sphere$§!"
 astral_rift.2525.b: "เตรียมพร้อมสำหรับการติดต่อเผชิญหน้า"

 astral_rift.2530.name: "ความมืดมิดก่อนรุ่งอรุณ"
 astral_rift.2530.desc.common: "สิ่งมีชีวิตลิทอยด์เริ่มขยับตัวอยู่กับที่เมื่อท้องฟ้าทวีความมืดมิด แสงสีดำสาดส่องข้ามขอบฟ้า"
 astral_rift.2530.desc.default: "$astral_rift.2530.desc.common$\n\nความหนาวเย็นฉับพลันเข้ามาเยือนค่ายพักของเรา ท่ามกลางแสงของดวงดาวอันมืดมิด เราสัมผัสได้ถึงความว่างเปล่าบางอย่าง ราวกับว่าพลังงานของเรากำลังถูกสูบหายไป เรามีเวลาเหลือเฟือในการกลับไปยังยานทรงกลม §Y$tech_rift_sphere$§! ก่อนรุ่งสาง ทว่าในหมู่ทีมงานมีความอยากรู้อยากเห็นในแนวทางที่แปลกประหลาดว่าปรากฏการณ์นี้สามารถเสนอประโยชน์ทางวิทยาศาสตร์แก่เราได้อย่างไร"
 astral_rift.2530.desc.gestalt: "$astral_rift.2530.desc.common$\n\nสายสื่อสารภายในลดลงชั่วคราวเนื่องจากเปลวสุริยะอันทรงพลัง เทหวัตถุที่ผิดปกตินี้กำลังสูบพลังงานจาก [explorer.GetIndividualNamePlural] ของเรา! การประเมินเบื้องต้นยังไม่แน่นอน ทว่าแหล่งพลังงานที่เป็นเอกลักษณ์เช่นนี้สมควรแก่การศึกษาเพิ่มเติม"
 astral_rift.2530.a: "สังเกตการณ์ดวงดาวมืดมิด"
 astral_rift.2530.b: "ถอยกำลัง"

 astral_rift.2535.name: "ตาบอดเพราะแสงสีดำ"
 astral_rift.2535.desc.common.ordered_turn_away_gestalt: "[explorer.GetIndividualNamePlural] ของเราเพิกเฉยต่อคำสั่งของเราและยังคงจ้องมองเข้าไปในดวงดาวต่อไป"
 astral_rift.2535.desc.default: "เราจ้องมองดวงดาวในความสว่างไสวอันไร้ขีดจำกัดของมัน แสงของมันช่วยประดับประดาจิตใจและจิตวิญญาณของเรา ส่องสว่างและกลืนกินทุกสิ่งทุกอย่างที่มันสัมผัส ดวงดาวมืดมิดมองทะลุผ่านเรา นำพาจากเราไปด้วยความอ่อนโยน และนำทางเราออกจากความไม่รู้ ทัศนวิสัยของเราถูกพรากไป และในทางกลับกันเราได้รับเป้าหมายและความจริง เส้นทางข้างหน้าชัดเจน และความกระหายในความรู้ของเราได้รับการฟื้นฟูขึ้นมาอีกครั้ง"
 astral_rift.2535.desc.machine: "ดวงดาวมืดมิดได้ส่งข้อความมา\n\nรหัส ความเชื่อ หลักการที่รวมเป็นหนึ่งเดียว: เมื่อยอมรับมัน [Leader.GetName] ได้รับการตั้งโปรแกรมใหม่ทั้งหมด ส่งผลให้จิตสำนึกร่วมได้รับการปรับเปลี่ยนไปด้วย การแทรกแซงที่เป็นมิตรนี้จะช่วยสนับสนุนเราในการก้าวไปข้างหน้าเท่านั้น"
 astral_rift.2535.desc.hive: "ดวงดาวมืดมิดได้ส่งข้อความมา\n\nรหัส ความเชื่อ ความคิดที่ท่วมท้น: เมื่อยอมรับมัน [Leader.GetName] ได้รับการเปลี่ยนแปลงอย่างถาวร ส่งผลให้จิตสำนึกร่วมได้รับการปรับเปลี่ยนไปด้วย การแทรกสงที่เป็นมิตรนี้จะช่วยสนับสนุนเราในการก้าวไปข้างหน้าเท่านั้น"
 astral_rift.2535.desc.ordered_turn_away_default: "เราไม่กล้าหันหน้าหนีจากแสงอันรุ่งโรจน์ของดาวเคราะห์สีดำดวงนี้\n\n$astral_rift.2535.desc.default$"
 astral_rift.2535.desc.ordered_turn_away_machine: "$astral_rift.2535.desc.common.ordered_turn_away_gestalt$\n\n$astral_rift.2535.desc.machine$"
 astral_rift.2535.desc.ordered_turn_away_hive: "$astral_rift.2535.desc.common.ordered_turn_away_gestalt$\n\n$astral_rift.2535.desc.hive$"

 astral_rift.2540.name: "การเฝ้าสังเกตเพิ่มเติม"
 astral_rift.2540.desc.common: "มีการติดตั้งอุปกรณ์เฝ้าสังเกตบนพื้นผิวดาวเคราะห์ ค่าที่อ่านได้จะช่วยให้เราศึกษาวิจัยดวงดาวมืดมิดและผลกระทบของมันเมื่อเวลาผ่านไปได้อย่างปลอดภัยยิ่งขึ้น"
 astral_rift.2540.desc.default: "แสงของดวงดาวมืดมิดให้ความรู้สึกเกือบจะดุร้าย แม้ในระหว่างการล่าถอย สัมผัสของรังสีของมันก็สามารถรู้สึกได้ผ่านตัวยานทรงกลม §Y$tech_rift_sphere$§! สูบพลังงานออกจากร่างกายของเราประหนึ่งยาพิษร้ายกาจ\n\n$astral_rift.2530.desc.common$"
 astral_rift.2540.desc.gestalt: "แสงของเทหวัตถุที่ผิดปกตินี้ทรงพลังอย่างยิ่ง รังสีมืดมิดของมันเจาะทะลุตัวยานทรงกลม §Y$tech_rift_sphere$§! ส่งผลให้เกิดความเสียหายภายในเล็กน้อยแก่ [explorer.GetIndividualNamePlural] ของเรา\n\n$astral_rift.2530.desc.common$"

#######################
# Colonization Drones #
#######################
 astral_rift_cleaning_drones: "ดินแดนรกร้างเคมี"

 edict_automated_disinfection: "การฆ่าเชื้ออัตโนมัติ"
 edict_automated_disinfection_desc: "โดรนทำความสะอาดที่เราค้นพบในการเยือนครั้งหนึ่งนอกรอยแยกมิติช่วยให้เรามีความเข้าใจเกี่ยวกับวิธีการสุขาภิบาลที่มีประสิทธิภาพมากขึ้นโดยใช้กองทัพหุ่นยนต์อัตโนมัติ\n"

 colonization_drones_modifier: "โดรนก่อตั้งอาณานิคม"
 colonization_drones_tt: "โดรนตั้งถิ่นฐานช่วยระบุและจัดหมวดหมู่พืชพรรณและสัตว์ป่าบนโลกของเรา มอบข้อมูลทางชีวภาพอย่างละเอียดลออ\n\nได้รับ £society_research£ §Y$society_research$§! เพิ่มเติมเมื่อเคลียร์สิ่งกีดขวางต่อไปนี้:\n - $d_dangerous_wildlife_blocker$\n - $d_dense_jungle$\n - $d_noxious_swamp$\n - $d_toxic_kelp$\n - $d_poisonous_algae$\n - $d_venomous_insects$"
 colonization_drones_modifier_wilderness: "$colonization_drones_modifier$"

 leader_trait_sanitary_drone: "โดรนผู้ช่วยสุขาภิบาล"
 leader_trait_sanitary_drone_desc: "ผู้นำคนนี้เรียนรู้วิธีการทำความสะอาดที่ดีเยี่ยม"


 astral_rift.2600.name: "การทำความสะอาดทางเคมี"
 astral_rift.2600.desc: "ชั้นบรรยากาศของดาวเคราะห์ดวงนี้ประกอบด้วยสารต้านแบคทีเรียในปริมาณที่น่าตกใจ\n\nเซนเซอร์ตรวจพบบริเวณใกล้เคียงไม่มีสัญญาณของสิ่งมีชีวิตออร์แกนิกเลย แม้แต่ในระดับกล้องจุลทรรศน์ก็ถูกกำจัดออกไปทางเคมีจนหมด มีการตรวจวัดทางชีวภาพจางๆ ที่แผ่ออกมาจากถ้ำอันห่างไกล ทว่าจากระยะนี้เป็นไปไม่ได้เลยที่จะระบุลักษณะ\n\nมีหุ่นยนต์หลายกลุ่มบินตรวจตราท้องฟ้าอยู่ ทว่าพวกมันยังไม่ได้ตอบสนองต่อการมีอยู่ของเรา"
 astral_rift.2600.a: "สืบสวนหุ่นยนต์เหล่านั้น"
 astral_rift.2600.b: "สำรวจถ้ำ"

 astral_rift.2605.name: "การเผชิญหน้ากับโดรน"
 astral_rift.2605.desc: "เราสืบสวนกลุ่มย่อยของโดรนที่บินตรวจตราท้องฟ้า ลูกบอลโลหะระยิบระยับเหล่านี้มีเครื่องฉายโฮโลแกรมด้านหน้าและระบบขับดันบังคับทิศทางเพื่อรักษาความเร็วและระดับความสูงของพวกมัน\n\nเราเว้นระยะห่างอย่างระมัดระวังเมื่อเข้าใกล้ ทว่าโดรนก็ตอบสนองต่อการมีอยู่ของเราอยู่ดี สี่ตัวในกลุ่มแยกตัวออกจากฝูงและเปลี่ยนวิถีโค้งมาพบเรา แม้จะอยู่ในอัตราความเร็วที่ค่อนข้างช้าก็ตาม เราไม่ได้ทำให้สัญญาณเตือนภัยดังขึ้น แต่ขีดความสามารถของโดรนที่กำลังเข้ามานั้นยังไม่เป็นที่รู้จัก"
 astral_rift.2605.a: "ยินยอมให้โดรนเข้าใกล้"
 astral_rift.2605.b: "ปิดการทำงานของพวกมันซะ"

 astral_rift.2610.name: "สัญญาณแห่งชีวิต"
 astral_rift.2610.desc: "ถ้ำแห่งนี้มีบรรยากาศที่แตกต่างอย่างเห็นได้ชัดจากส่วนอื่นๆ ของดาวเคราะห์ ผนังด้านในหนาแน่นไปด้วยมอส และดินชื้นแฉะและอุดมไปด้วยสารอินทรีย์ ซากที่แห้งเหี่ยวของสิ่งมีชีวิตจำพวกนกนอนอยู่ในซอกหลืบที่สันโดษ เราสันนิษฐานว่าสิ่งมีชีวิตดังกล่าวมีความเฉลียวฉลาดจากเครื่องแต่งกายและสิ่งของเครื่องใช้ของมัน เมื่อพิจารณาว่าส่วนอื่นๆ ของดาวเคราะห์ปราศจากสารชีวภาพ ไม่ว่าจะมีชีวิตหรือเสียชีวิต ซากศพนี้และพืชพรรณโดยรอบจึงโดดเด่นเป็นความผิดปกติ\n\nเราพบโดรนตัวหนึ่งเสียบอยู่บนหินย้อย แม้จะยังทำงานได้อยู่ แต่ก็ไม่สามารถเคลื่อนไหวได้ โดรนถูกออกแบบมาอย่างชัดเจนเพื่อกระจายสารเคมีที่ไม่รู้จักในปริมาณมาก ชิ้นส่วนภายในของเครื่องจักรหลายชิ้นยังคงสมบูรณ์และสามารถซ่อมแซมได้โดยง่าย"
 astral_rift.2610.a: "ชันสูตรศพของสิ่งมีชีวิตจำพวกนก"
 astral_rift.2610.b: "เปิดใช้งานโดรนใหม่อีกครั้ง"

 astral_rift.2615.name: "การฉีดพ่นทำความสะอาด"
 astral_rift.2615.desc: "โดรนทั้งสี่ตัวเข้าใกล้ยานทรงกลม §Y$tech_rift_sphere$§! อย่างช้าๆ และตรวจสอบพื้นผิวของมัน โดรนตัวหนึ่งเตรียมลำกล้องขวาของมันเพื่อยิงออกมา\n\nก่อนที่เราจะตอบสนอง โดรนก็ฉีดโฟมอัดแรงดันใส่ส่วนหนึ่งของยานทรงกลม จากลำกล้องซ้ายของมัน มันเผยให้เห็นแขนขวาที่มีอุปกรณ์ต่อพ่วงที่นุ่มทว่าทนทาน และเริ่มขัดถูซากเศษฝุ่นออกจากตัวยานของเรา โดรนตัวอื่นๆ ปฏิบัติตามอย่างรวดเร็ว\n\nเมื่อการทำความสะอาดคืบหน้า โดรนตัวหนึ่งหยุดลงและสลับอุปกรณ์ต่อพ่วงเป็นก้านเก็บตัวอย่างอันละเอียดอ่อน ด้วยเสียงบีปที่ดัง มันรวบรวมตัวอย่างและหันหลังกลับ หลังจากทำความสะอาดเพิ่มเติมเล็กน้อย โดรนสามตัวที่เหลือก็จากไปในทิศทางเดียวกัน"
 astral_rift.2615.a: "ติดตามโดรนไป"

 astral_rift.2620.name: "โดรนที่ถูกปิดการใช้งาน"
 astral_rift.2620.desc: "เพื่อเป็นการป้องกันความปลอดภัย เราได้ปล่อยคลื่นแม่เหล็กไฟฟ้าระยะสั้นในบริเวณใกล้เคียงกับโดรนตรวจตรา เมื่อหยุดทำงานในทันที พวกมันก็ร่วงลงมาจากท้องฟ้า ตกกระแทกพื้นดินที่แห้งแล้งเบื้องล่าง\n\nสารเคมีที่ทรงพลังรั่วไหลออกมาจากซากปรักหักพังของพวกมัน และสัญญาณแจ้งเหตุร้ายเริ่มแพร่ภาพออกไป หากเราเชื่อว่าเราปลอดภัย เราสามารถติดตามสัญญาณแจ้งเหตุร้ายไปยังจุดหมายปลายทางที่ตั้งใจไว้ได้"
 astral_rift.2620.a: "ติดตามสัญญาณแจ้งเหตุร้าย"
 astral_rift.2620.b: "หลบหนีก่อนที่กำลังเสริมที่มีศักยภาพจะมาถึง"

 astral_rift.2625.name: "ชันสูตรศพนก"
 astral_rift.2625.desc: "การชันสูตรพลิกศพเผยให้เห็นว่าไม่มีบาดแผลฉกรรจ์ภายในหรือภายนอก สิ่งมีชีวิตดังกล่าวมีคุณสมบัติทั่วไปทั้งหมดของสายพันธุ์นก: กระดูกกลวง กรงเล็บเคลือบเคราติน และหลักฐานของขนนกที่สมบูรณ์ สาเหตุการเสียชีวิตที่น่าจะเป็นไปได้มากที่สุดคือการขาดสารอาหาร\n\nการวิเคราะห์ดีเอ็นเอบ่งชี้ว่าสายพันธุ์นี้มี (หรือเคยมี) ระบบภูมิคุ้มกันที่อ่อนแอโดยธรรมชาติ เป็นเรื่องแปลกประหลาที่ร่างกายยังมีสารละลายต้านแบคทีเรียที่ตกค้างสะสมอยู่ด้วย"
 astral_rift.2625.a: "เปิดใช้งานโดรนใหม่อีกครั้ง"
 astral_rift.2625.b: "เกิดอะไรขึ้นที่นี่กันแน่?"
 astral_rift.2625.b.evopred: "เก็บกู้ซากสิ่งมีชีวิตจำพวกนกและค้นหาว่าเกิดอะไรขึ้นที่นี่กันแน่"

 astral_rift.2630.name: "โดรนได้รับการซ่อมแซม"
 astral_rift.2630.desc: "เมื่อทีมวิจัยติดอาวุธและพร้อมแล้ว เราได้ปลดปล่อยโดรนออกจากหินย้อย มันเริ่มลอยตัวอยู่กับที่อย่างรวดเร็วโดยใช้ระบบขับดันบังคับทิศทางขนาดกะทัดรัด ด้วยเสียงปะทะที่รุนแรง โดรนฉีดโฟมอัดแรงดันใส่ทั้งทีม จากลำกล้องซ้ายของมัน เผยให้เห็นอุปกรณ์ต่อพ่วงที่นุ่มแต่ทนทานและดำเนินการขัดถูทำความสะอาดเรา ทีมงานยินยอมให้ทำเช่นนี้เนื่องจากโดรนไม่ได้มีเจตนาทำร้ายอย่างชัดเจน\n\nทันใดนั้นโดรนก็หยุดลง อุปกรณ์ทำความสะอาดถูกแทนที่ด้วยก้านเก็บตัวอย่างอันละเอียดอ่อน ซึ่งมันใช้เพื่อรวบรวมตัวอย่างสิ่งสกปรก เครื่องฉายโฮโลแกรมของมันแสดงอินเทอร์เฟซภาพที่เรียบง่าย\n\nสิ่งสกปรกถูกวิเคราะห์และจัดหมวดหมู่โดยโดรนว่าเป็นเป้าหมายใหม่สำหรับการทำความสะอาด ดูเหมือนว่าเราได้นำสิ่งแปลกปลอมเข้ามาสู่สภาพแวดล้อมของมันแล้ว"
 astral_rift.2630.a: "ชันสูตรศพของสิ่งมีชีวิตจำพวกนก"
 astral_rift.2630.b: "เกิดอะไรขึ้นที่นี่กันแน่?"

 astral_rift.2635.name: "ร่องรอยของผู้สร้าง"
 astral_rift.2635.desc: "เราติดตามเส้นทางของโดรนกลับไปยังสถานวิจัยขั้นสูง อาคารตั้งตระหง่านอยู่บนภูมิประเทศที่ปลอดเชื้อ ล้อมรอบไปด้วยโดรน แต่ละตัวส่งเสียงหึ่งๆ ระหว่างโซนต่างๆ เพื่อทำงานของพวกมันให้เสร็จสิ้น\n\nที่ใจกลางของสถานวิจัยคือจุดรวมของอุปกรณ์วิทยาศาสตร์และเทอร์มินัลการวิจัย เป็นเรื่องแปลกที่ในขณะที่การดำเนินงานส่วนใหญ่เป็นไปโดยอัตโนมัติเต็มรูปแบบ บริเวณนี้ดูเหมือนจะออกแบบมาสำหรับการวิจัยด้วยตนเอง งานที่จะต้องดำเนินการโดยสิ่งมีชีวิตที่มีความรู้สึกนึกคิดตรงกันข้ามกับโดรน"
 astral_rift.2635.a: "สำรวจห้องทดลอง"

 astral_rift.2640.name: "สมมติฐานด้านสุขอนามัย"
 astral_rift.2640.desc: "มีข้อสรุปเพียงข้อเดียวเท่านั้น: นกเหล่านี้บังเอิญขับเคลื่อนตัวเองไปสู่การสูญพันธุ์ผ่านแคมเปญการรักษาความสะอาดอย่างเข้มงวดเกินไปในระยะยาว ในฐานะเผ่าพันธุ์ที่มีระบบภูมิคุ้มกันที่อ่อนแอโดยธรรมชาติ พวกเขาจึงสร้างโดรนทำความสะอาดเพื่อฆ่าเชื้อในพื้นที่สาธารณะและพื้นที่ส่วนตัวเพื่อลดการแพร่กระจายของโรค\n\nอย่างไรก็ตาม จากสภาพทิวทัศน์ของดาวเคราะห์ เราสามารถสันนิษฐานได้ว่าโดรนทำความสะอาดทำเกินขอบเขตในการกำจัดสิ่งมีชีวิตดั้งเดิม ส่งผลให้ความหลากหลายทางชีวภาพของสารอินทรีย์บนดาวเคราะห์ถูกทำลายลง พูดง่ายๆ ก็คือ ประชากรอดอยากจนเสียชีวิต เมื่อศพย่อยสลาย โดรนก็ขัดถูทำความสะอาดทุกร่องรอยของการมีอยู่ของพวกเขาไปจนหมดสิ้น\n\nสำหรับซากศพในถ้ำ การมีอยู่ของโดรนที่ใช้งานได้ในบริเวณนั้นน่าจะเบี่ยงเบนความสนใจของโดรนตัวอื่นเพื่อประโยชน์ด้านประสิทธิภาพ ส่งผลให้พืชพรรณยังคงสมบูรณ์ สิ่งมีชีวิตจำพวกนกต้องอาศัยคุณลักษณะการตั้งโปรแกรมนี้เพื่อเอาชีวิตรอดที่นี่ น่าเสียดายที่พืชพรรณอันน้อยนิดในถ้ำไม่สามารถหล่อเลี้ยงชีวิตมันได้ตลอดไป"
 astral_rift.2640.a: "นำเทคโนโลยีของโดรนมาประยุกต์ใช้ใหม่"
 astral_rift.2640.b: "ออกแบบไวรัสเพื่อปิดการทำงานของเครือข่ายสุขาภิบาล"
 astral_rift.2640.c: "เก็บโดรนตัวนี้ไว้เป็นผู้ช่วยวิจัยส่วนตัว"

 astral_rift.2645.name: "ประวัติศาสตร์ที่ถูกลบล้าง"
 astral_rift.2645.desc.common_1: "ห้องปฏิบัติการนี้ถูกทิ้งไว้โดยไม่มีใครแตะต้องมานานหลายปี แตกต่างจากส่วนอื่นๆ ของดาวเคราะห์ที่นี่เคลือบไปด้วยฝุ่นและสิ่งสกปรก ข้อมูลที่เก็บรวบรวมจากจอแสดงผลยืนยันว่าโดรนเป็นอุปกรณ์ทำความสะอาดที่เป็นอิสระอย่างสมบูรณ์ พวกมันได้รับมอบหมายให้ตรวจตราพื้นที่ที่กำหนด ฆ่าเชื้อ และกลับไปยังสถานวิจัยเมื่อพลังงานหรือสารเคมีต่ำ ขับเคลื่อนด้วยแหล่งพลังงานหมุนเวียนที่หลากหลาย น้ำยาทำความสะอาดของพวกมันจะถูกรีไซเคิลจากละอองลอยในอากาศและน้ำใต้ดิน สร้างเครือข่ายที่ยั่งยืนด้วยตนเองซึ่งสามารถทำงานได้เกือบตลอดไป"
 astral_rift.2645.desc.common_2: "เราคาดเดาว่าผู้สร้างโดรนทำความสะอาดอัตโนมัติอาจจะละทิ้งดาวเคราะห์ดวงนี้หรือสูญพันธุ์ไปแล้ว ทุกร่องรอยทางชีวภาพของการมีอยู่ของพวกเขาถูกขัดถูออกไปจนหมดสิ้น"
 astral_rift.2645.desc: "$astral_rift.2645.desc.common_1$\n\n$astral_rift.2645.desc.common_2$"
 astral_rift.2645.desc.clean: "$astral_rift.2645.desc.common_1$\n\nโดรนที่เก็บตัวอย่างยานของเราบินอยู่ลำพังในห้องปฏิบัติการพร้อมเครื่องฉายโฮโลแกรมที่ส่องสว่าง แสดงอินเทอร์เฟซภาพที่เรียบง่าย สารที่มันดึงออกจากยานทรงกลม §Y$tech_rift_sphere$§! ได้รับการวิเคราะห์และจัดหมวดหมู่เป็นเป้าหมายการทำความสะอาดใหม่แล้ว\n\n$astral_rift.2645.desc.common_2$"
 astral_rift.2645.a: "บันทึกและศึกษาโครงสร้างพื้นฐานด้านสุขอนามัย"
 astral_rift.2645.b: "ปิดการทำงานของสถานวิจัย"

 astral_rift.2650.name: "การฆ่าเชื้ออัตโนมัติ"
 astral_rift.2650.desc: "เราจดบันทึกจุดแข็งและนวัตกรรมทางเทคโนโลยีที่หลากหลายของสถานวิจัยอัตโนมัติ โดยมีเจตนาที่จะนำการสุขาภิบาลที่ดีขึ้นและการจัดการโดรนมาสู่ดาวเคราะห์ของเราเอง\n\nเราจะสามารถใช้โครงสร้างพื้นฐานที่เหนือกว่าที่มีอยู่ของเราเพื่อดำเนินการทำความสะอาดในลักษณะเดียวกันนี้ได้"
 astral_rift.2650.desc.default: "$astral_rift.2650.desc$"
 astral_rift.2650.desc.gestalt: "$astral_rift.2650.desc$\n\nยิ่งไปกว่านั้น การศึกษาความพยายามทั่วทั้งดาวเคราะห์โดยสายพันธุ์นี้ช่วยปรับปรุงความเข้าใจของเราเกี่ยวกับวิธีการที่จิตใจส่วนบุคคลสามารถร่วมมือกันได้อย่างมีประสิทธิภาพ"
 astral_rift.2650.tooltip: "มอบสิทธิ์ในการเข้าถึงคำสั่งควบคุมของจักรวรรดิ §Y$edict_automated_disinfection$§!"

 astral_rift.2655.name: "ปิดระบบการทำงานของสถานวิจัย"
 astral_rift.2655.desc.common_1: "เราสามารถปิดการทำงานของสถานวิจัยสุขาภิบาลอัตโนมัติได้อย่างปลอดภัยและเรียกคืนโดรนทั้งหมดกลับมา ทุกอย่างถูกทิ้งไว้ในสภาพที่ใช้งานได้เต็มรูปแบบเผื่อในกรณีที่ประชากรดั้งเดิมเดินทางกลับมา"
 astral_rift.2655.desc.common_2: "อย่างไรก็ตาม เราสามารถเก็บเกี่ยวพลังงานจำนวนมากจากแหล่งสะสมพลังงานของสถานวิจัยได้สำเร็จ"
 astral_rift.2655.desc.default: "$astral_rift.2655.desc.common_1$\n\n$astral_rift.2655.desc.common_2$"
 astral_rift.2655.desc.xenophile: "$astral_rift.2655.desc.common_1$ หากไม่ใช่เช่นนั้น ก็เพื่อประโยชน์ของเหล่านักโบราณคดี\n\n$astral_rift.2655.desc.common_2$"
 astral_rift.2655.desc.unfriendly: "เราปิดระบบต่างๆ ภายในสถานวิจัยสุขาภิบาลอัตโนมัติอย่างเร่งรีบจนกระทั่งเครือข่ายโดรนถูกปิดใช้งาน เราดูดพลังงานจากเครื่องกำเนิดไฟฟ้า แหล่งสะสมพลังงาน และแบตเตอรี่สำรองทุกก้อนจนหมดสิ้น เพื่อเก็บเกี่ยวพลังงานจำนวนมหาศาล"

 astral_rift.2660.name: "การหลบหนีอย่างหมดจด"
 astral_rift.2660.desc: "เมื่อต้องเผชิญกับความเสี่ยงจากโดรนอัตโนมัติจำนวนมหาศาลที่รุมล้อมเรา เราตัดสินใจหลีกเลี่ยงโอกาสที่จะเกิดอันตรายที่บานปลาย ยิ่งไปกว่านั้น ดาวเคราะห์ที่แห้งแล้งปลอดเชื้อนี้ดูเหมือนจะให้โอกาสในทางวิจัยน้อยมาก แต่เราก็สามารถรวบรวมทรัพยากรบางส่วนจากโดรนที่ถูกทำลายได้ในขณะที่เดินทางออกไป"

 astral_rift.2665.name: "การเปลี่ยนวัตถุประสงค์การใช้งานโดรน"
 astral_rift.2665.desc: "โดรนสุขาภิบาลที่เรากู้คืนมาสามารถนำมาถอดวิศวกรรมย้อนกลับเพื่อช่วยเหลือในความพยายามก่อตั้งอาณานิคมของเรา มันสามารถนำมาปรับเปลี่ยนเพื่อจัดทำรายละเอียดพืชพรรณและสัตว์ป่าท้องถิ่นเพื่อช่วยให้ผู้ตั้งถิ่นฐานของเราทำความคุ้นเคยกับภูมิประเทศของดินแดนใหม่"

 astral_rift.2670.name: "ความประชดประชันของไวรัส(Viral Irony)"
 astral_rift.2670.desc: "เราได้พัฒนาคอมพิวเตอร์ไวรัสที่ทรงพลังและอัปโหลดมันเข้าสู่เครือข่ายโดรนทำความสะอาดที่ได้รับการซ่อมแซม เมื่อมันกลับไปที่ฐานหลัก ไวรัสควรจะแพร่กระจายและทำให้โครงสร้างพื้นฐานด้านสุขอนามัยหยุดทำงานในที่สุด\n\nบางทีดาวเคราะห์ดวงนี้อาจจะฟื้นตัวจากการฆ่าเชื้อทางเคมีในท้ายที่สุด และชีวิตใหม่จะพัฒนาขึ้นมาจากถ้ำที่แยกตัวโดดเดี่ยวแห่งนี้"

 astral_rift.2675.name: "ไม่มีวันโดดเดี่ยวด้วยโดรน"
 astral_rift.2675.desc: "หลังจากปรับแต่งเล็กน้อย โดรนสุขาภิบาลที่ได้รับการปรับปรุงใหม่นี้จะเป็นผู้ช่วยวิจัยที่ยอดเยี่ยม ด้วยความสามารถในการเก็บตัวอย่างทางชีวภาพ การทำงานที่ต้องการความคล่องแคล่วสูง และพลังการบินอย่างอิสระ ทำให้มันมีศักยภาพสูงในฐานะส่วนหนึ่งของทีมวิจัยของเรา\n\nเราตัดการเชื่อมต่อโดรนออกจากเครือข่ายสุขาภิบาลและติดตั้งคุณลักษณะใหม่เพื่อเสริมสร้างความสามารถที่มีอยู่ เราจะติดตามประสิทธิภาพการทำงานของมันต่อไปในขณะที่ทำงานร่วมกับ [explorer.GetName]"

####################
# Windswept Planet #
####################
 astral_rift_windswept_planet: "ดาวเคราะห์ที่มีลมแรงพัดผ่าน(วินส์เวตดาวเคราะห์)"

 extra_dimensional_spores_modifier: "สปอร์ต่างมิติ(อุทาน)"
 reconverted_leader_modifier: "ผู้นำที่เปลี่ยนทิศทางการทำงาน(กลับมาใช้อีกครั้ง)ผู้นำ)"
 reconverted_leader_modifier_desc: "นักวิทยาศาสตร์คนหนึ่งของเรามีความสามารถพิเศษในการทูตอย่างคาดไม่ถึง ละทิ้งการแสวงหาก่อนหน้านี้เพื่อผันตัวไปเป็น §Yทูต(หัวเราะ)§!\n\nเราจะตรวจสอบให้แน่ใจว่าทักษะที่ค้นพบใหม่ของพวกเขาได้รับการนำไปใช้งานอย่างเหมาะสม"

 decision_incubate_wind_creatures: "เพาะเลี้ยงสิ่งมีชีวิตสายลม(สัตว์ปีก)"
 decision_incubate_wind_creatures_desc: "นำสิ่งมีชีวิตสายลมที่เป็นประโยชน์เข้ามาสู่ชั้นบรรยากาศของดาวเคราะห์ดวงนี้"
 d_forceful_winds: "$decision_incubate_wind_creatures$"
 d_forceful_winds_desc: "$decision_incubate_wind_creatures_desc$"
 can_incubate_wind_creatures_tt: "ปลดล็อกการตัดสินใจบนดาวเคราะห์ §Y$decision_incubate_wind_creatures$§! สามประการ"

 forceful_winds: "สายลมแรงกล้า(ลมแรง)"
 forceful_winds_desc: "ชั้นบรรยากาศของโลกนี้มีสิ่งมีชีวิตสายลมที่มีความรู้สึกนึกคิดอาศัยอยู่ร่วมกับเราอย่างสามัคคี"

 astral_rift.2700.name: "ดาวเคราะห์ที่มีลมแรงพัดผ่าน"
 astral_rift.2700.desc: "เราได้มาถึงดาวเคราะห์ที่ถูกพัดกระหน่ำด้วยลมแรงความเร็วสูง พื้นผิวเกือบจะโล่งเตียน โดยมีหน้าผาและโขดหินที่ถูกขัดถูจนเรียบเนียนโดยสภาพอากาศ\n\nท้องฟ้าเบื้องบนมืดครึ้มด้วยเมฆฝนฟ้าคะนอง และกลุ่มก๊าซสว่างวาบประทุออกมาอย่างรุนแรงเมื่อฟ้าผ่าลงสู่พื้นดินรอบตัวเรา\n\nเราควรหาที่หลบภัยจากพายุที่กำลังก่อตัวในไม่ช้า เซนเซอร์อุตุนิยมวิทยาบ่งชี้ว่ามีกระแสลมที่อ่อนโยนกว่าในชั้นบรรยากาศสตราโตสเฟียร์ที่สูงขึ้นไป ซึ่งเราสามารถหลีกเลี่ยงการปล่อยประจุไฟฟ้าที่เป็นอันตรายได้ หรืออีกทางเลือกหนึ่งคือมีถ้ำขนาดใหญ่ในบริเวณใกล้เคียงที่สามารถให้ที่หลบภัยได้"
 astral_rift.2700.a: "บินขึ้นเหนือพายุ"
 astral_rift.2700.b: "หลบภัยในถ้ำเบื้องล่าง"

 astral_rift.2705.name: "เหนือชั้นสตราโตสเฟียร์"
 astral_rift.2705.desc: "เมื่อฝ่าชั้นเมฆขึ้นมา เราสังเกตเห็นท้องฟ้าสีครามสดใส สายลมยังคงพัดกระหน่ำใส่ตัวยานของเรา ทวีความรุนแรงในทุกๆ ครั้งที่ลมพัดผ่าน\n\nไม่ใช่แค่รูปแบบสภาพอากาศที่แปลกประหลาดเท่านั้น ทว่ากระแสลมเหล่านี้กระทำด้วยความแม่นยำที่ผิดธรรมชาติ ยิ่งไปกว่านั้น เราตรวจพบสารประกอบคล้ายฮอร์โมนในกระแสลมหมุนวน การวิเคราะห์ต่อมาเผยให้เห็นว่ามันคล้ายคลึงกับการตอบสนองทางชีวภาพของพืชที่กำลังถูกโจมตีอย่างน่าตกใจ"
 astral_rift.2705.a: "เก็บตัวอย่างของกระแสลม"

 astral_rift.2710.name: "ถ้ำเห็ดรา(เสียงถ้ํา)"
 astral_rift.2710.desc: "เมื่อร่อนลงผ่านกระแสลมที่พัดกระหน่ำอย่างไม่ลดละ เราก็หลบหลีกผ่านกลุ่มสปอร์ที่มีกลิ่นกำมะถันหนาทึบจนกระทั่งเข้าสู่ถ้ำที่ได้รับการป้องกันจากสภาพอากาศ\n\nหลังจากนำทางผ่านช่องทางที่คับแคบ เราก็เข้าสู่ห้องขนาดใหญ่ที่มีเพดานสูง หินย้อยหนาทึบหยดของเหลวขุ่นลงบนดินสีเหลืองซีดซึ่งเต็มไปด้วยเห็ดราสีเหลือง ระหว่างกลุ่มเห็ดเหล่านี้ มีนิคมแมลงวิ่งอย่างรวดเร็วไปตามภูมิประเทศที่ชื้นแฉะ และมีพืชสีซีดเติบโตในความมืดสลัว มอสเคลือบตามผนังที่สูงชัน และมีม่านหมอกสปอร์หนาทึบแขวนลอยอยู่ในอากาศที่นิ่งสนิท\n\nภายในถ้ำ เราตรวจพบสนามไฟฟ้าที่อ่อนๆ เครือข่ายของแรงกระตุ้นและไซแนปส์ที่ดูเหมือนจะเชื่อมต่อกลุ่มเห็ดราต่างๆ เข้าด้วยกัน บางทีเราอาจจะสามารถเชื่อมต่อเข้ากับเครือข่ายนี้และสื่อสารกับพวกเห็ดได้"
 astral_rift.2710.a: "พยายามสื่อสารเจรจา"

 astral_rift.2715.name: "สายลมมีชีวิต(ลมหอบ)"
 astral_rift.2715.desc: "ตัวอย่างของเรายืนยันการมีอยู่ของจุลชีพภายในสายลม\n\nเพื่อเป็นการทดลอง เราได้สังเคราะห์ฮอร์โมนที่คล้ายคลึงกันและปล่อยมันออกสู่ชั้นบรรยากาศโดยรอบ ในทันใดนั้น สายลมที่รุนแรงก็เปลี่ยนเป็นกระแสลมที่อ่อนโยนลงมาก\n\nการวิเคราะห์เพิ่มเติมของตัวอย่างบ่งชี้ว่า เมื่อรวมกลุ่มกันในขนาดที่ใหญ่พอ จุลชีพเหล่านี้จะรวมกันเป็นจิตหนึ่งเดียว การทำงานร่วมกันทำให้พวกมันสามารถสร้างกระแสลม "มีชีวิต" ได้\n\nกระแสลมบางส่วนนำพาเส้นใยสารพันธุกรรมที่มีลักษณะคล้ายเส้นผม เมื่อติดอยู่ในกระแสลมเดียวกัน เราก็ถูกผลักดันกลับไปยังพื้นผิวที่พายุได้สงบลงแล้วในตอนนี้"
 astral_rift.2715.a: "ติดตามสายลมมีชีวิตไป"

 astral_rift.2720.name: "ท่ามกลางเห็ดรา"
 astral_rift.2720.desc: "เมื่อเชื่อมต่อเข้ากับไซแนปส์ไมซีเลียมของเครือข่าย เราได้ส่งกระแสไฟฟ้าสั้นๆ ไป หมวกเห็ดทุกดอกแข็งตัวขึ้นในทันที เห็นได้ชัดว่าสับสนกับผู้กระทำรายใหม่บนเครือข่ายภายในของพวกมัน เราได้รับสัญญาณที่บ้าคลั่งเป็นการตอบกลับ ทว่าในที่สุดเราก็สามารถถอดรหัสการส่งสัญญาณของเห็ดราได้สำเร็จ\n\nสิ่งมีชีวิตนี้เป็นจิตสำนึกร่วม(หัวเราะ)ที่มองว่าตัวเองเป็นผู้ดูแลสายพันธุ์ดั้งเดิมของดาวเคราะห์ดวงนี้ ภายใต้พื้นผิว พืชและสัตว์ทุกชนิดได้รับการปกป้องและดูแลโดยกลุ่มไมซีเลียม เพื่อเป็นการแลกเปลี่ยน เห็ดราจะบริโภคของเสียของพวกมันเป็นอาหารค้ำจุนชีวิต\n\nอย่างไรก็ตาม มีภัยคุกคามต่อความสัมพันธ์แบบพึ่งพาอาศัยกันนี้ และต่อการอยู่รอดของเห็ดราเองด้วย"
 astral_rift.2720.a: "รักษาการติดต่อสื่อสารกับเห็ดราต่อไป"

 astral_rift.2725.name: "ภัยคุกคามจากเห็ดรา"
 astral_rift.2725.desc: "เรามาถึงพื้นผิวดาวเคราะห์ ซึ่งมีกลุ่มเมฆสีเหลืองหนาทึบปกคลุมอยู่ แม้ว่าภูมิประเทศจะราบเรียบและส่วนใหญ่โล่งเตียน ทว่าทุกช่องและรอยแยกที่ซ่อนอยู่ต่างก็เป็นที่อยู่อาศัยของเห็ดราที่พ่นสปอร์ออกมา\n\nกระแสลมที่เราติดตามมาที่นี่ไหลเวียนทั่วภูมิประเทศ ปลดปล่อยกลุ่มสปอร์มีชีวิตลอยลอยอยู่ในอากาศ สิ่งเหล่านี้ลอยลงสู่พื้นผิว ซึ่งส่วนใหญ่ถูกทำลายอย่างรวดเร็วโดยม่านสปอร์ของเห็ดรา\n\nเมื่อสปอร์ที่รอดชีวิตเข้าถึงพื้นดิน มันก็ยึดเกาะกับภูมิประเทศที่ว่างเปล่าและก่อตัวเป็นโพลิปรูปกรวย มอบสภาพแวดล้อมที่ได้รับการป้องกันเพื่อให้จุลชีพที่มากับลมเติบโตได้อย่างปลอดภัย\n\nเห็นได้ชัดว่าสปอร์ของเห็ดรากำลังขัดขวางไม่ให้สิ่งมีชีวิตสายลมสืบพันธุ์ ในทางกลับกัน สิ่งมีชีวิตสายลมได้ทำให้พื้นผิวของดาวเคราะห์ราบเรียบ บังคับให้เห็ดราต้องล่าถอยไปยังสภาพแวดล้อมที่ได้รับการปกป้องมากที่สุด"
 astral_rift.2725.a: "ค้นหาหนทางในการกำจัดเห็ดรา"
 astral_rift.2725.b: "สืบสวนเห็ดรา"

 astral_rift.2730.name: "สายลมกินเนื้อ(เสียงลมพัด)"
 astral_rift.2730.desc: "เห็ดรานำทางเรากลับไปยังปากทางเข้าถ้ำ ซึ่งพายุได้สงบลงแล้ว สิ่งมีชีวิตเลื้อยคลานขนาดเล็กตัวหนึ่งลังเลอยู่ที่ทางเข้าก่อนจะข้ามไปยังพื้นที่รกร้างอันเปิดโล่ง ในทันใดนั้น กระแสลมที่รุนแรงก็พัดเอาสัตว์เลื้อยคลานขึ้นไปในอากาศ\n\nเราไม่สามารถทำอะไรได้นอกจากเฝ้ามองขณะที่มันถูกหั่นเป็นชิ้นเล็กชิ้นน้อยลงเรื่อยๆ เพียงเพื่อจะถูกย่อยโดยเอนไซม์ในอากาศ\n\nภายนอกเขตรักษาพันธุ์ที่ดูแลโดยเห็ดรา ชีวิตบนพื้นผิวต้องขึ้นอยู่กับความเมตตาของสายลมกินเนื้อ จากความแม่นยำและการตอบสนองที่รุนแรงของมัน สมเหตุสมผลที่จะสันนิษฐานว่าสายลมมีจิตสำนึกนึกคิดในระดับหนึ่ง\n\nและมันกำลังหิว"
 astral_rift.2730.a: "ปกป้องระบบนิเวศจากสายลม"
 astral_rift.2730.b: "ศึกษาวิจัยสายลม"

 astral_rift.2735.name: "การส่งสัญญาณของเห็ดรา"
 astral_rift.2735.desc: "ในการเดินทางไปตามพื้นผิวของดาวเคราะห์ เราเข้าใกล้กลุ่มเห็ดราที่ปล่อยสปอร์ ตัวอย่างเนื้อเยื่อเผยให้เห็นว่ามันเป็นจิตสำนึกร่วมที่ซับซ้อนอย่างยิ่ง โดยการส่งกระแสประสาทไฟฟ้าอย่างรวดเร็วระหว่างโหนด มันสื่อสารข้ามเครือข่ายที่ซับซ้อน\n\nเมื่อเชื่อมต่อเข้ากับไซแนปส์ไมซีเลียมของเครือข่าย เราได้ส่งกระแสไฟฟ้าสั้นๆ ไป หมวกเห็ดทุกดอกแข็งตัวขึ้นในทันที เห็นได้ชัดว่าสับสนกับผู้กระทำรายใหม่บนเครือข่ายภายในของพวกมัน เราได้รับสัญญาณที่บ้าคลั่งเป็นการตอบกลับ ทว่าความหมายยังคงไม่ชัดเจน"
 astral_rift.2735.a: "ถอดรหัสการส่งสัญญาณของเห็ดรา"

 astral_rift.2740.name: "เหตุการณ์ปัจจุบัน"
 astral_rift.2740.desc: "หลังจากออกจากถ้ำ เราได้วัดกระแสลมแรงที่หมุนวนรอบยานของเรา เราตรวจพบสารประกอบคล้ายฮอร์โมนในอากาศรอบๆ และวิเคราะห์มัน\n\nฮอร์โมนเหล่านั้นคล้ายกับฮอร์โมนที่ปล่อยออกมาจากพืชบางชนิดที่อยู่ภายใต้การคุกคาม นอกจากนี้เรายังยืนยันการมีอยู่ของสายพันธุ์จุลชีพ ซึ่งเราคาดการณ์ว่ากำลังควบคุมสายลม เพื่อเป็นการทดลอง เราได้สังเคราะห์ฮอร์โมนที่คล้ายคลึงกันและปล่อยมันออกสู่ชั้นบรรยากาศ"
 astral_rift.2740.a: "ดำเนินการสืบสวนต่อไป"

 astral_rift.2745.name: "กรณีของเห็ดรา"
 astral_rift.2745.desc.common: "หลังจากถอดรหัสการส่งสัญญาณของเห็ดราแล้ว บัดนี้เห็นได้ชัดว่าสิ่งมีชีวิตสายลมกำลังทำลายระบบนิเวศของดาวเคราะห์ ขณะที่สายลมมีชีวิตพัดผ่านพื้นผิวเพื่อหาอาหาร มันได้กำจัดความหลากหลายทางชีวภาพที่เห็ดราต้องพึ่งพาเพื่อความอยู่รอด\n\nเห็ดรานำทางเราไปยังถ้ำใต้ดินซึ่งมีพืช สัตว์ และแมลงหลายร้อยสายพันธุ์ได้รับการปกป้องจากลมพายุที่รุนแรง"
 astral_rift.2745.desc.common.friendly: "ทั้งสองฝ่ายในการต่อสู้ครั้งนี้อยู่ในภาวะชะงัน - ซึ่งเรามีความสามารถที่จะเอาชนะมันได้"
 astral_rift.2745.desc.common.unfriendly: "บางทีเราอาจใช้ประโยชน์จากสิ่งมีชีวิตที่เรียบง่ายเหล่านี้และแก้ไขความขัดแย้งของพวกมันในกระบวนการนี้"
 astral_rift.2745.desc.default: "$astral_rift.2745.desc.common$\n\n$astral_rift.2745.desc.common.friendly$"
 astral_rift.2745.desc.unfriendly: "$astral_rift.2745.desc.common$\n\n$astral_rift.2745.desc.common.unfriendly$"
 astral_rift.2745.a: "เสริมความแข็งแกร่งให้แก่สายลม"
 astral_rift.2745.b: "บำรุงเห็ดรา"
 astral_rift.2745.c: "เจรจาประนีประนอม"
 astral_rift.2745.d: "กำจัดสิ่งมีชีวิตทั้งสองสายพันธุ์ซะ"

 astral_rift.2750.name: "กรณีของสายลม"
 astral_rift.2750.desc.common: "สายลมที่รุนแรงสงบลงในไม่ช้าหลังจากที่เราปล่อยฮอร์โมน\n\nสายลมที่อ่อนโยนพัดผ่านยานของเรา ปลดปล่อยกลุ่มสปอร์มีชีวิตลอยลอยอยู่ในอากาศ สิ่งเหล่านี้ลอยลงสู่พื้นผิว ซึ่งส่วนใหญ่ถูกทำลายอย่างรวดเร็วโดยม่านสปอร์ของเห็ดรา\n\nเมื่อสปอร์ที่รอดชีวิตเข้าถึงพื้นดิน มันก็ยึดเกาะกับภูมิประเทศที่ว่างเปล่าและก่อตัวเป็นโพลิปรูปกรวย มอบสภาพแวดล้อมที่ได้รับการป้องกันเพื่อให้จุลชีพที่มากับลมเติบโตได้อย่างปลอดภัย\n\nเราสรุปว่าสายลมกำลังแสดงให้เห็นว่าเห็ดราพยายามขัดขวางกระบวนการสืบพันธุ์ของพวกมันอย่างไร"
 astral_rift.2750.desc.default: "$astral_rift.2750.desc.common$\n\n$astral_rift.2745.desc.common.friendly$"
 astral_rift.2750.desc.unfriendly: "$astral_rift.2750.desc.common$\n\n$astral_rift.2745.desc.common.unfriendly$"
 astral_rift.2750.a: "$astral_rift.2745.b$"
 astral_rift.2750.b: "$astral_rift.2745.a$"
 astral_rift.2750.c: "$astral_rift.2745.c$"
 astral_rift.2750.d: "$astral_rift.2745.d$"

 astral_rift.2755.name: "สายลมที่เฉียบคม"
 astral_rift.2755.desc: "เราได้มอบตะไบโลหะผสมจำนวนมากให้แก่สิ่งมีชีวิตสายลม สารขัดสีเหล่านี้เบาพอที่จะถูกพัดไปตามกระแสลมแต่ละสาย ทว่าแข็งแกร่งพอที่จะกัดกร่อนแร่ธาตุส่วนใหญ่ได้ในช่วงเวลาสั้นๆ\n\nกลุ่มกระแสลมใช้ตะไบโลหะเหล่านี้อย่างรวดเร็วเพื่อฉีกทำลายกลุ่มเห็ดราสีเหลืองที่หลบภัยอยู่ในซอกหินใกล้เคียง\n\nสิ่งมีชีวิตสายลมดำเนินการกระจายตะไบโลหะอย่างกว้างขวางมากขึ้นในหมู่พวกมัน ลมที่เฉียบคมเริ่มพัดกระหน่ำใส่พื้นผิวดาวเคราะห์ มุ่งเป้าไปที่เห็ดราที่ปล่อยสปอร์ในการระดมยิงที่ประสานงานกันอย่างดี\n\nในการแสดงความกตัญญู สายลมที่อ่อนโยนได้ส่งมอบกลุ่มสปอร์มีชีวิตลอยลอยของมันให้แก่เรา ด้วยสิ่งเหล่านี้ เราสามารถเลี้ยงดู "สายลมมีชีวิต" ของเราเอง นำกระแสลมความเร็วสูงมาสู่กลุ่มอาณานิคมที่เลือกสรรของเรา"
 astral_rift.2755.b.evopred: "เดินทางกลับพร้อมวัสดุเห็ดรา"

 astral_rift.2760.name: "เห็ดราเบ่งบาน"
 astral_rift.2760.desc: "เราได้กระจายสารอาหารแร่ธาตุจำนวนมากทั่วพื้นผิวดาวเคราะห์ และนำพืชพรรณที่ทนทานต่อลมเข้ามาสู่ดินที่ได้รับการฟื้นฟู เห็ดราจึงสามารถแพร่กระจายสปอร์จำนวนมหาศาลบนดินที่อุดมสมบูรณ์ใหม่นี้ได้\n\nกลุ่มเห็ดราที่มีอยู่มีขนาดและความทนทานเพิ่มขึ้น เมื่อเวลาผ่านไป เห็ดราจะค่อยๆ เลื้อยไปตามพื้นผิวทั้งหมดของดาวเคราะห์ ทำให้สิ่งมีชีวิตสายลมอดอาหารตายลง\n\nโหนดของมันปะทุด้วยพลังงานที่ค้นพบใหม่ เห็ดราส่งข้อความแสดงความขอบคุณทางเครือข่ายไมซีเลียมของมัน\n\nจากนั้นตัวอย่างเห็ดราที่ไม่เคยค้นพบมาก่อนก็งอกขึ้นมาจากพื้นดินใกล้จุดที่ตั้งของเรา โพรงที่บวมปูดของมันพองไปด้วยก๊าซแปลกประหลาดที่มีความเข้มข้นสูง เรามั่นใจว่าการเพาะเลี้ยง \"เห็ดจิ๋วพองลม(พัฟบอล)เหล่านี้จะช่วยเราในการผลิตทรัพยากรที่มีค่านี้"
 astral_rift.2760.b.evopred: "เดินทางกลับพร้อมวัสดุสัตว์ปีก"

 astral_rift.2765.name: "การประนีประนอมที่ยากลำบาก"
 astral_rift.2765.desc: "ความแตกต่างอย่างสุดขั้วในการสื่อสารระหว่างเห็ดราและสิ่งมีชีวิตสายลมนำไปสู่การหารือที่ยากลำบากและซับซ้อน อย่างไรก็ตาม เราได้ทำข้อตกลงระหว่างสองเผ่าพันธุ์สำเร็จ\n\nตราบใดที่พวกมันไม่รบกวนกลุ่มสปอร์ที่มีอยู่ สิ่งมีชีวิตสายลมจะมีสิทธิ์ล่าสัตว์และผสมพันธุ์ในส่วนที่กำหนดของพื้นผิวดาวเคราะห์ ในขณะเดียวกัน จิตสำนึกร่วมของเห็ดราได้รับพื้นที่ที่เท่าเทียมกันของภูมิประเทศซึ่งพวกมันสามารถแพร่กระจายสปอร์ได้โดยไม่ต้องหวาดกลัว และดูแลสายพันธุ์อื่นๆ อีกมากมายภายใต้เครือข่ายการปกป้องของพวกมัน\n\nภายใต้การจัดเตรียมนี้ ระบบนิเวศที่เป็นเอกลักษณ์ของดาวเคราะห์ดวงนี้มีโอกาสใหม่ที่จะเจริญรุ่งเรือง เราได้ติดตั้งดาวเทียมสังเกตการณ์เพื่อติดตามความคืบหน้าจากภายนอกรอยแยกมิติ"
 astral_rift.2765.b.evopred: "รวบรวมตัวอย่างของระบบนิเวศนี้"

 astral_rift.2770.name: "การกำจัดล้างทางชีวภาพ"
 astral_rift.2770.desc: "ข้อพิพาทระหว่างสายพันธุ์ [Explorer.GetPreFTLLower] เหล่านี้กลายเป็นเรื่องที่น่ารำคาญใจยิ่งนัก\n\nเราสังเคราะห์กรดที่มีฤทธิ์รุนแรงและฉีดพ่นมันในชั้นบรรยากาศของดาวเคราะห์ เมื่อสารกัดกร่อนแพร่กระจาย สิ่งมีชีวิตสายลมก็สลายตัวเป็นฝุ่นผง และเห็ดราก็เหี่ยวเฉาและดำคล้ำลง เราสามารถใช้ประโยชน์จากสารประกอบที่มีอยู่ในชั้นบรรยากาศเพื่อขยายผลกระทบนี้ไปทั่วทั้งโลก\n\nหลังจากยืนยันว่าดาวเคราะห์ได้รับการการุณยฆาตอย่างสมบูรณ์แล้ว เราก็เก็บเกี่ยววัสดุที่มีประโยชน์ทั้งหมดออกไป"
 astral_rift.2770.a: "ทำได้ดีมาก"
 astral_rift.2770.b.evopred: "การเก็บเกี่ยวครั้งยิ่งใหญ่"

 astral_rift.2790.name: "คำขอพิเศษ"
 astral_rift.2790.desc: "[this.GetName] ผู้ซึ่งเพิ่งเจรจาข้อตกลงที่ซับซ้อนในอีกด้านหนึ่งของรอยแยกมิติที่เรากำลังศึกษาในระบบดาว [from.solar_system.GetName] ได้ยื่นคำขอเปลี่ยนหน้าที่ปฏิบัติงาน หลังจากนำทางการเจรจาไกล่เกลี่ยที่ยากลำบากเช่นนี้ [this.GetHeShe] ค้นพบความหลงใหลใหม่ในการเจรจา หากเราอนุญาต [this.GetHeShe] จะละทิ้งการทำงานวิทยาศาสตร์เพื่อผันตัวเป็นทูตถาวรในโครงสร้างพื้นฐานทางการทูตที่มีอยู่ของเรา"
 astral_rift.2790.a: "ตกลงตามนั้น"
 astral_rift.2790.a.tt: "[This.GetName] เปลี่ยนหน้าที่จาก §Hนักวิทยาศาสตร์(นักประสาทวิทยา)§! เป็น §Hทูต(หัวเราะ)§!"
 astral_rift.2790.b: "นักวิทยาศาสตร์มีมูลค่ามากกว่า"

###############
# Tiny Planet #
###############
 astral_rift_tiny_planet: "โลกใบจิ๋ว(โทนี่)ดาวเคราะห์)"

 decision_tidal_lock_planet: "การบังคับการล็อกไทดัล(ล็อคแบบตั้งใจ)"
 decision_tidal_lock_planet_desc: "จัดการเทหวัตถุโคจรในท้องถิ่นเพื่อหยุดการหมุนรอบตัวเองของดาวเคราะห์"
 decision_tidal_lock_planet_tt: "§Hปลดล็อกการตัดสินใจ:§! §Y$d_dayside_farm$§! บนดาวเคราะห์/ดวงจันทร์ดวงนี้ [this.GetPlanetMoon]"

 decision_display_microplanet_husk: "จัดแสดงซากดาวเคราะห์จิ๋ว"
 decision_display_microplanet_husk_desc: "จัดแสดงเปลือกของดาวเคราะห์จิ๋วที่ไหม้เกรียมเป็นคาร์บอนเพื่อสร้างแรงบันดาลใจให้เกิดความเป็นระเบียบเรียบร้อยและความเชื่อฟังในหมู่ประชากรท้องถิ่น"
 d_microplanet_memorial: "อนุสรณ์สถานดาวเคราะห์จิ๋ว(อนุสาวรีย์มิโครสปอร์ต)"
 d_microplanet_memorial_desc: "อนุสาวรีย์อันน่าสลดใจนี้เป็นเครื่องเตือนใจแก่ประชาชนถึงความโหดร้ายของเราเมื่อต้องเผชิญกับการต่อต้านขัดขืน"

 astral_rift.2800.name: "โลกช่างกลมเหลือเกิน(มันเป็นโลกแคบ)"
 astral_rift.2800.desc: "เราได้มาถึงระบบดาวที่มีคุณสมบัติแรงโน้มถ่วงแปลกประหลาด เทหวัตถุแต่ละดวงที่เดินทางผ่านพื้นที่นี้มีแรงดึงดูดที่แข็งแกร่งกว่ามากเมื่อเทียบกับขนาดของมันเมื่อเทียบกับมิติของเรา\n\nเซนเซอร์ตรวจพบเทหวัตถุขนาดเล็กอย่างยิ่งสี่ดวงในระบบนี้ ดวงหนึ่งมีสังคมยุคก่อน FTL ([explorer.GetPreFTLLower]) อาศัยอยู่ โลกแห่งผืนแผ่นดินใหญ่ที่มีสิ่งมีชีวิตสะเทินน้ำสะเทินบกครึ่งบกครึ่งน้ำอาศัยอยู่ มันเป็นดาวเคราะห์ที่ปกติทุกประการนอกเหนือจากข้อเท็จจริงที่ว่าดาวเคราะห์ทั้งดวงมีขนาดใกล้เคียงกับยานทรงกลม §Y$tech_rift_sphere$§! ของเรา\n\nสิ่งมีชีวิตทรงภูมิปัญญาขนาดเล็กอย่างยิ่งนี้และโลกบ้านเกิดของพวกเขามอบโอกาสในการวิจัยที่หลากหลาย"
 astral_rift.2800.a: "เข้าใกล้ดาวเคราะห์จิ๋ว"

 astral_rift.2805.name: "ผลกระทบจากดวงจันทร์"
 astral_rift.2805.desc: "เนื่องจากดาวเคราะห์จิ๋วนี้มีขนาดใกล้เคียงกับยานของเรา เราจึงระมัดระวังที่จะไม่เข้าใกล้มันมากเกินไป เนื่องจากกังวลว่าเราอาจส่งผลกระทบต่อมันด้วยแรงดึงดูดของเรา\n\nอย่างไรก็ตาม เราไม่ได้คำนวณวงโคจรของดวงจันทร์ของดาวเคราะห์อย่างเหมาะสม ในไม่ช้า การชนกันก็เกิดขึ้นและดวงจันทร์ก็ถูกเหวี่ยงออกสู่อวกาศที่ห่างไกลออกไป\n\nเมื่อพิจารณาถึงผลกระทบที่ดาวบริวารธรรมชาติมีต่อระบบนิเวศของดาวเคราะห์ เราคาดว่าจะเกิดผลกระทบร้ายแรงต่อสายพันธุ์ [explorer.GetPreFTLLower]"
 astral_rift.2805.a: "การคำนวณที่ผิดพลาดซึ่งมีราคาแพงยิ่ง"

 astral_rift.2810.name: "ปัญหาระดับย่อม"
 astral_rift.2810.desc.common.1: "สายพันธุ์ [explorer.GetPreFTLLower] บนดาวเคราะห์จิ๋วสังเกตเห็นการมีอยู่ของเรา เมื่อพิจารณาจากขนาดสัมพัทธ์ของยานเรา เราต้องบดบังทัศนียภาพจากส่วนใหญ่ของขอบฟ้าของพวกเขาอย่างแน่นอน\n\nตามสัญญาณวิทยุในท้องถิ่น พวกเขายังสังเกตเห็นว่าวงโคจรของดวงจันทร์เปลี่ยนไปทางด้านนอก ส่งผลให้เกิดความตื่นตระหนกอย่างกว้างขวาง คลื่นยักษ์ที่เป็นอันตรายส่งผลให้เกิดการสูญเสียชีวิตอย่างมีนัยสำคัญในหมู่สายพันธุ์ [explorer.GetPreFTLLower]"
 astral_rift.2810.desc.common.2: "มิฉะนั้น เราสามารถสังเกตการณ์จากระยะไกลต่อไปเพื่อไม่ให้รบกวนอารยธรรมของพวกเขามากยิ่งขึ้น"
 astral_rift.2810.desc.common.3: "มิฉะนั้น เราสามารถสังเกตการณ์ความเสียหายจากระยะไกลต่อไปและบันทึกภัยพิบัติเพื่ออนุชนรุ่นหลัง"
 astral_rift.2810.desc.default: "$astral_rift.2810.desc.common.1$\n\nหากเห็นสมควร เราสามารถพยายามสื่อสารกับสังคมนี้ได้\n\n$astral_rift.2810.desc.common.2$"
 astral_rift.2810.desc.barbaric_despoilers: "$astral_rift.2810.desc.common.1$\n\nการสถาปนาการสื่อสารกับสังคมนี้อาจมอบโอกาสในการเรียกค่าไถ่\n\n$astral_rift.2810.desc.common.3$"
 astral_rift.2810.desc.homicidal: "$astral_rift.2810.desc.common.1$\n\nเราสามารถดักจับการสื่อสารของพวกเขาและส่งข้อความสื่อสารใดๆ ตามที่เราต้องการ\n\n$astral_rift.2810.desc.common.3$"
 astral_rift.2810.a: "สถาปนาการติดต่อ"
 astral_rift.2810.b: "เฝ้าสังเกตการณ์อย่างนิ่งเฉย"
 astral_rift.2810.c: "เรียกค่าไถ่"
 astral_rift.2810.d: "แจ้งให้พวกเขาทราบว่าความพินาศมาเยือนแล้ว"
 astral_rift.2810.e: "เฝ้าดูความพินาศที่เปิดเผยออกมา"

 astral_rift.2815.name: "สร้างการสื่อสารสำเร็จ"
 astral_rift.2815.desc.common: "หลังจากสนทนากับสายพันธุ์ [explorer.GetPreFTLLower] อย่างติดขัดโดยใช้ขีดความสามารถการแปลที่จำกัดของเรา เรารู้ว่าผู้ควบคุมของพวกเขาทั้งหวาดกลัวและตื่นตระหนกต่อการมีอยู่ของเราในระดับที่เท่าเทียมกัน ดูเหมือนว่าเราจะไม่เป็นที่ต้อนรับ"
 astral_rift.2815.desc.outro: "อุปสรรคทางภาษาขัดขวางการทูตที่ซับซ้อนในการก้าวไปข้างหน้า ทว่าเราควรเลือกแนวทางการกระทำที่เหมาะสม"
 astral_rift.2815.desc.default: "$astral_rift.2815.desc.common$\n\nความอวดดีของเอเลี่ยนเหล่านี้... บางทีเราควรทำบางอย่างเพื่อพิสูจน์ความกลัวของพวกเขา"
 astral_rift.2815.desc.xenophile: "$astral_rift.2815.desc.common$\n\nแม้พวกเขาจะไม่รู้ว่าเราเป็นสาเหตุของสถานการณ์ปัจจุบัน ทว่าต้องมีบางอย่างที่เราสามารถทำได้เพื่อแก้ไขความผิดพลาดของเรา\n\n$astral_rift.2815.desc.outro$"
 astral_rift.2815.desc.pacifist: "$astral_rift.2815.desc.common$\n\n$astral_rift.2815.desc.outro$"
 astral_rift.2815.desc.barbaric_despoilers: "$astral_rift.2815.desc.common$\n\nข้อเรียกร้องค่าไถ่ของเราได้รับการตอบกลับด้วยความเป็นศัตรู และพวกเขาดูเหมือนจะไม่มีสิ่งมีค่าใดๆ มาเสนอให้"
 astral_rift.2815.desc.homicidal: "เราได้สร้างข้อความสื่อสารสำหรับสายพันธุ์ [explorer.GetPreFTLLower] โดยใช้ขีดความสามารถการแปลที่จำกัดของเรา และเผยแพร่ผ่านทุกช่องทางการสื่อสารของพวกเขา\n\n§E"จงมองไปยังจุดจบของคุณ ทุกสิ่งที่คุณรู้จักและเคยรู้จักจะสูญหายไปกับกาลเวลาในไม่ช้า ไม่มีอนาคตใดที่คุณจะมีอยู่สืบต่อไป เราขอมอบความพินาศให้แก่คุณ"§!\n\nไม่มีการตอบกลับใดๆ"
 astral_rift.2815.a: "พยายามแก้ไขวงโคจรของดวงจันทร์"
 astral_rift.2815.b: "ทำลายดวงจันทร์ซะ"
 astral_rift.2815.c: "ตัดการสื่อสาร ดำเนินการสังเกตการณ์อย่างนิ่งเฉย"
 astral_rift.2815.d: "ตัดการสื่อสาร เฝ้าดูความพินาศที่เปิดเผยออกมา"

 astral_rift.2820.name: "กลับสู่วงโคจรเดิม"
 astral_rift.2820.desc: "หลังจากการคำนวณ การจำลอง และการทดลองหลายครั้ง เราสามารถปรับทิศทางดวงจันทร์ของดาวเคราะห์จิ๋วกลับเข้าสู่วิถีโคจรเดิมได้อย่างละเอียดอ่อน สิ่งนี้จะไม่สามารถแก้ไขความเสียหายและการเสียชีวิตที่เกิดจากการเคลื่อนตัวของน้ำขึ้นน้ำลง ทว่าเราได้ทำดีที่สุดเท่าที่จะทำได้แล้ว\n\nบัดนี้การสื่อสารกับผู้นำ [explorer.GetPreFTLLower] เปิดกว้างแล้ว พวกเขาดูเหมือนจะซาบซึ้งในความพยายามของเรา"

 astral_rift.2825.name: "ไร้ดวงจันทร์อีกต่อไป"
 astral_rift.2825.desc.common: "จากการใช้ประโยชน์จากโอกาสในการวิจัยที่เป็นเอกลักษณ์ซึ่งมอบให้แก่เรา เราได้ทำลายดวงจันทร์ที่โคจรรอบโลกใบจิ๋วนี้ มันง่ายพอที่จะถูกบดขยี้ระหว่างก้ามปูของแขนเก็บกู้ของเรา และเราเฝ้าสังเกตอนุภาคฝุ่นผงของมันค่อยๆ ก่อตัวเป็นวงแหวนบางๆ รอบดาวเคราะห์\n\nสิ่งนี้ทำให้เกิดสภาพอากาศที่แปรปรวนอย่างสุดขั้วจากขั้วโลกหนึ่งไปยังอีกขั้วโลกหนึ่ง ประชากรครึ่งบกครึ่งน้ำของดาวเคราะห์จึงพยายามสื่อสารกับเราอย่างตื่นตระหนกตั้งแต่นั้นมา"
 astral_rift.2825.desc.default: "$astral_rift.2825.desc.common$\n\nมันอาจจะเป็นทางเลือกที่มีความเมตตาที่สุดในการกำจัดพวกเขาให้สิ้นซาก การใช้แรงบดกระแทกเพียงเล็กน้อยจากรอยแยกแอสทรัล ของเราก็เพียงพอแล้ว ทว่าโอกาสในการวิจัยเพิ่มเติมยังคงมีอยู่"
 astral_rift.2825.desc.unfriendly: "$astral_rift.2825.desc.unfriendly$\n\nพวกเขาหมดหนทางช่วยเหลือเมื่อพายุโหมกระหน่ำทั่วดาวเคราะห์ ชะตากรรมของพวกเขาถูกตัดสินแล้ว"
 astral_rift.2825.a: "ปลดปล่อยพวกเขาจากความทุกข์ทรมานซะ"
 astral_rift.2825.b: "ติดตั้งอุปกรณ์วิจัยระยะไกล"

 astral_rift.2830.name: "เฝ้าสังเกตการณ์จากระยะไกล"
 astral_rift.2830.desc.default: "เราติดตั้งอุปกรณ์เฝ้าระวังภายในระบบดาวจำลองเพื่อศึกษาวิจัยดาวเคราะห์จิ๋วและสายพันธุ์ [explorer.GetPreFTLLower] ต่อไปเมื่อสถานการณ์เปิดเผยออกมา เราอยากรู้ถึงผลกระทบทางสิ่งแวดล้อมจากการชนของดวงจันทร์ และสายพันธุ์นี้จะสามารถพัฒนาแนวทางในการรับมือกับผลกระทบก่อนที่มันจะรุนแรงเกินไปได้หรือไม่"
 astral_rift.2830.desc.communications: "เราตัดการสื่อสารกับผู้นำ [explorer.GetPreFTLLower] และกลับมาเฝ้าสังเกตการณ์อย่างนิ่งเฉยอีกครั้ง\n\n$astral_rift.2830.desc.default$"
 astral_rift.2830.desc.unfriendly.common: "ไม่ว่าจะอย่างไร การเฝ้าดูความพินาศดำเนินต่อไปจะช่วยมอบความบันเทิงให้บ้าง"
 astral_rift.2830.desc.unfriendly: "$astral_rift.2830.desc.default$\n\n$astral_rift.2830.desc.unfriendly.common$"
 astral_rift.2830.desc.unfriendly.communications: "$astral_rift.2830.desc.unfriendly.communications$\n\n$astral_rift.2830.desc.unfriendly.common$"

 astral_rift.2835.name: "ความก้าวหน้าในการล็อกไทดัล"
 astral_rift.2835.desc: "ผลลัพธ์จากการปรับแต่งทดลองของเรากับดวงจันทร์ของดาวเคราะห์ดวงนี้ ช่วยให้เรามีความเข้าใจอย่างลึกซึ้งยิ่งขึ้นเกี่ยวกับพฤติกรรมทั่วไปของดาวบริวารที่โคจรรอบเทหวัตถุ บัดนี้เราสามารถนำความรู้นี้ไปใช้ในการจัดตำแหน่งดาวเคราะห์ภายในระบบของเราเองได้อย่างแม่นยำยิ่งขึ้น\n\nดาวเคราะห์จิ๋วเบื้องล่างเรากำลังจัดงานเฉลิมฉลองเพื่อเป็นเกียรติแก่เราในตอนนี้"
 astral_rift.2835.tt: "บัดนี้คุณสามารถดำเนินการทำ §Yล็อค TDL§! ดาวเคราะห์ดวงใดก็ได้ที่มีดวงจันทร์ในฐานะการตัดสินใจบนดาวเคราะห์\n§Yโรงไฟฟ้าพลังงานแสงอาทิตย์ด้านกลางวัน(ทุ่งหญ้า)§! มีประสิทธิภาพเพิ่มขึ้นสองเท่า"

 astral_rift.2840.name: "แรงปะทะระดับย่อม"
 astral_rift.2840.desc: "เราเพิ่มพลังโล่ป้องกันของเราจนถึงขีดสุด ชาร์จเครื่องยนต์ขับดัน และเตรียมพร้อมสำหรับการปะทะกับดาวเคราะห์จิ๋ว\n\nในขณะที่ปะทะ เราบีบอัดชั้นบรรยากาศของโลกและส่งคลื่นกระแทกของแรงกดดันมหาศาลไปรอบโลก แรงเสียดทานที่เกิดขึ้นทำให้เกิดความร้อนสูงในอากาศ ซึ่งระเหยกลายเป็นไอในมหาสมุทรของดาวเคราะห์ดวงนี้และกำจัดชีวิตทั้งหมดให้สิ้นซาก\n\nชิ้นส่วนที่เหลือของโลกที่เคยรุ่งเรืองนี้จะกลายเป็นสิ่งประดับที่น่าเกรงขามสำหรับเราในการนำมาจัดแสดง"
 astral_rift.2840.tt: "คุณสามารถจัดแสดงซากดาวเคราะห์จิ๋ว(ไมโครสปอร์ต ฮัสก์)ในฐานะการตัดสินใจบนดาวเคราะห์ สามารถทำได้เพียงครั้งเดียวเท่านั้น"

 astral_rift.2845.name: "ดาวเคราะห์ต้นแบบ"
 astral_rift.2845.desc: "มีการติดตั้งอุปกรณ์เฝ้าสังเกตการณ์เพื่อศึกษาสภาพภูมิอากาศบนดาวเคราะห์จิ๋วต่อไป\n\nพายุหิมะที่รุนแรง ภัยแล้ง ฝนตกกระหน่ำ และสภาพอากาศที่แปรปรวนอย่างสุดขั้วทุกรูปแบบเริ่มกัดเซาะโลกใบเล็กนี้ การทดลองของเราที่นี่จะช่วยมอบข้อมูลทางอุตุนิยมวิทยาและมานุษยวิทยาที่เป็นเอกลักษณ์ต่อไปจนกระทั่งสายพันธุ์ดั้งเดิมถูกกำจัดอย่างหลีกเลี่ยงไม่ได้"

 astral_rift.2890.name: "ดาวเคราะห์จิ๋วสูญพันธุ์"
 astral_rift.2890.desc: "ดาวเคราะห์ขนาดเล็กที่อยู่อีกฟากหนึ่งของรอยแยกมิติในระบบดาว [from.solar_system.GetName] ได้รับความเสียหายอย่างย่อยยับจากการเปลี่ยนแปลงสภาพภูมิอากาศอย่างสุดขั้ว ข้อมูลการวิจัยที่เรากำลังรวบรวมอยู่ที่นั่นได้ยุติลงแล้ว"
 astral_rift.2890.a: "หลีกเลี่ยงไม่ได้"

#######################
# Entertainment Nexus #
#######################
 astral_rift_interdimensional_circus: "ศูนย์กลางความบันเทิง"
 revolutionary_medigel_modifier: "เมดิเจลปฏิวัติวงการ(Rivolution Medi-Gel)"

 edict_spontaneous_crystallization: "ผลึกปะทุฉับพลัน"
 edict_spontaneous_crystallization_desc: "โดยการใช้ตัวเร่งปฏิกิริยาที่เป็นเอกลักษณ์บนหินที่เพิ่งเก็บเกี่ยวใหม่ เรามีโอกาสในการสร้างโครงสร้างผลึกที่มีคุณค่ามากกว่าเดิมอย่างมาก"
 edict_spontaneous_crystallization_tooltip: "แปลงรายได้แร่ธาตุสูงสุด 1% ให้เป็นคริสตัลหายาก(เรย์ คริสตัล)"

 astral_rift.2900.name: "ขอเชิญทุกท่าน"
 astral_rift.2900.desc: "เราได้มาถึงระบบดาวที่พลุกพล่านซึ่งล้อมรอบด้วยรูหนอนจำนวนมาก ยานอวกาศหลากหลายรูปทรงและขนาดโคจรรอบสถานีอวกาศใจกลางที่มีแสงไฟสว่างไสว\n\nสถานีอวกาศที่สร้างขึ้นเพื่อมอบความบันเทิงมีวัตถุประสงค์เพื่อดึงดูดผู้เข้าชมให้มาร่วมชมการแสดงครั้งยิ่งใหญ่ เมื่อพิจารณาจากจำนวนยานที่มาเยือน ไม่ว่าการแสดงใดก็ตามที่เกิดขึ้นที่นี่ มันได้ดึงดูดฝูงชนที่น่าประทับใจยิ่ง"
 astral_rift.2900.a: "ดำเนินการสืบสวนต่อไป"

 astral_rift.2905.name: "ความคาดหวัง"
 astral_rift.2905.common_1: "เราเข้าเทียบท่าที่สถานีอวกาศที่พลุกพล่านโดยไม่มีเหตุการณ์ใดๆ เมื่อเข้าไปด้านในแล้ว เราก็ดำเนินการสืบสวนต่อในฐานะส่วนหนึ่งของฝูงชน"
 astral_rift.2905.common_2: "ภายในนั้น เราเห็นอัฒจันทร์ขนาดใหญ่โตมโหฬาร ภายในที่พลุกพล่านหนาแน่นไปด้วยสิ่งมีชีวิตต่างดาวที่มีความรู้สึกนึกคิดหลากหลายสายพันธุ์ แต่ละสายพันธุ์มุ่งความสนใจไปที่พื้นที่การแสดงส่วนกลาง การแสดงกำลังจะเริ่มขึ้นในไม่ช้า"
 astral_rift.2905.organic: "เมื่อเราเข้าใกล้ประตูของโดมส่วนกลาง พนักงานต้อนรับหุ่นยนต์ได้ปัดทำความสะอาด [explorer.species.GetHandNamePlural] ของเราแต่ละคนก่อนจะอนุญาตให้เราผ่านเข้าไปร่วมกับผู้ใช้บริการรายอื่น"
 astral_rift.2905.inorganic: "เมื่อเราเข้าใกล้ประตูของโดมส่วนกลาง พนักงานต้อนรับหุ่นยนต์ได้ทำการสแกนพวกเราแต่ละคนสั้นๆ ด้วยอุปกรณ์ขนาดเล็กก่อนจะอนุญาตให้เราผ่านเข้าไปร่วมกับผู้ใช้บริการรายอื่น"
 astral_rift.2905.desc.organic: "$astral_rift.2905.common_1$\n\n$astral_rift.2905.organic$\n\n$astral_rift.2905.common_2$"
 astral_rift.2905.desc.inorganic: "$astral_rift.2905.common_1$\n\n$astral_rift.2905.inorganic$\n\n$astral_rift.2905.common_2$"
 astral_rift.2905.a: "ยอดเยี่ยมมาก"

 astral_rift.2910.name: "กายกรรมสุนัขจิ้งจอก(เสียงวอลปินส์)"
 astral_rift.2910.desc: "ทันทีที่เราเข้าประจำที่ คณะกายกรรมสุนัขจิ้งจอกในชุดระยิบระยับก็ปรากฏตัวบนเวที หลังจากแสดงกายกรรมขั้นสูงสั้นๆ รูหนอนขนาดเล็กก็ปรากฏขึ้นใจกลางเวที นักกายกรรมผู้กล้าหาญคนหนึ่งพุ่งตัวเข้าไปด้านในก่อนที่รูหนอนจะปิดตัวลง รูหนอนอีกรูหนึ่งปรากฏขึ้นสูงเหนือฝูงชน ส่งตัวนักแสดงที่ตีลังกาลงสู่พื้นดินอย่างคล่องแคล่ว\n\nนักแสดงคนอื่นๆ ปฏิบัติตามอย่างรวดเร็ว ถักทอและรับตัวกันและกันในรูปแบบที่ซับซ้อนผ่านรูหนอนที่เปลี่ยนไปเรื่อยๆ ฝูงชนส่งเสียงฮือฮาเมื่อนักกายกรรมคนหนึ่งสะดุดล้มเข้าไปในพอร์ทัล แขนข้างหนึ่งขาดออกจากร่างกายเมื่อรูหนอนปิดตัวลง ทันทีที่พวกเขากำลังจะกระแทกพื้น นักแสดงที่ได้รับบาดเจ็บก็หายตัวไปในรูหนอนอีกแห่ง\n\nแขนที่ขาดตกลงมาจากโครงเหล็ก คว้าบาร์โหนขณะที่มันตกลงมาและเหวี่ยงตัวเองขึ้นไปในอากาศ นักกายกรรมแขนเดียวปรากฏตัวอีกครั้ง กระโดดสูง และสวมแขนเทียมกลางอากาศ จากนั้นลงสู่พื้นบนยอดปิรามิดของนักแสดงคนอื่นๆ ในฉากจบที่ยิ่งใหญ่\n\nฝูงชนมีความยินดีเป็นอย่างยิ่ง"
 astral_rift.2910.a: "การนำเทคโนโลยีที่น่าทึ่งมาใช้อย่างไร้ความระมัดระวัง..."

 astral_rift.2915.name: "คมเขี้ยวค้ำจุนชีวิต(จอกแห่งชีวิต)"
 astral_rift.2915.desc: "ไซบอร์กเลื้อยคลานขนาดใหญ่เยื้องกรายเข้าสู่ใจกลางเวที มันถือแร่น้ำหนักโลหะขนาดมหึมา ซึ่งมันโยนเข้าไปในขากรรไกรขนาดมหึมาอย่างคล่องแคล่ว ด้วยเสียงชลศาสตร์พ่นออกมา มันพ่นน้ำหนักแร่ออกมาในอากาศทีละชิ้น รับพวกมันเมื่อพวกมันตกลงมาและปล่อยพวกมันออกไปอีกครั้งในการโยนรับอย่างง่ายดาย\n\nมีประกาศดังก้อง ส่งผลให้ผู้ชมบางส่วนกระโดดโลดเต้น หุ่นยนต์ที่มีหนวดหลายหนวด สิ่งมีชีวิตสองเท้า และกลุ่มเถาวัลย์ที่มีชีวิตได้รับการนำมาสู่เวที สิ่งมีชีวิตเหล่านี้ยอมกระโดดเข้าไปในปากของไซบอร์กเลื้อยคลาน ยินยอมให้ตัวเองถูกโยนรับในลักษณะเดียวกัน\n\nจากนั้นอสูรจักรกลก็ถืออาสาสมัครทั้งสามไว้ในปากและนั่งยองๆ บดอัดตัวเองกับพื้น ร่างใหญ่โตของมันเรืองแสงสีส้มละลาย เมื่อกระบวนการเสร็จสิ้น นักแสดงก็เปิดปากและมีสิ่งมีชีวิตเพียงตัวเดียวเดินออกมา มันมีหัวทรงกลมของหุ่นยนต์มีหนวด ลำตัวของท็อกซอยด์(Toxoid)และแขนขาที่หนาซึ่งทำจากเถาวัลย์พันกัน มันส่งสัญญาณไปยังฝูงชน ส่งผลให้เกิดความเงียบงัน\n\nจากนั้นไซบอร์กก็กลืนสารอินทรีย์ผสมกลับเข้าไปและพ่นบุคคลทั้งสามออกมาอีกครั้งในสภาพดีเหมือนใหม่ ความเงียบงันที่ตื่นตระหนกของฝูงชนก็ปะทุเป็นเสียงเชียร์ดังสนั่น"
 astral_rift.2915.a: "ทักษะความสามารถที่น่าสนใจมาก"

 astral_rift.2920.name: "การแสดงชุดสุดท้าย(พระราชบัญญัติสุดท้าย)"
 astral_rift.2920.desc: "การแสดงชุดสุดท้ายเกี่ยวข้องกับสิ่งมีชีวิตที่ทำจากหินสีเทาหนาทึบ บิดตัวเข้าสู่ตำแหน่งที่แปลกประหลาด มันบิดแขนขาที่เป็นก้อนกลมเข้าสู่เงื่อนไขที่เป็นไปไม่ได้ จากนั้นมันกระโดดสูงขึ้นไปในอากาศและลงบนปลายนิ้วที่กว้างของมัน เรียกเสียงพึมพำอย่างสุภาพจากฝูงชน อย่างไรก็ตาม นี่เป็นเพียงการปูทางไปสู่การแสดงที่แท้จริง\n\nการเคลื่อนไหวของสิ่งมีชีวิตเริ่มช้าลงอย่างช้าๆ จนถึงจุดที่กาลเวลาเริ่มย้อนกลับ ร่างของมันย้อนกลับไปตามวิถีโค้งของการกระโดดครั้งก่อนและหยุดนิ่งกลางอากาศ สิ่งนี้ทำให้ฝูงชนมีชีวิตชีวาขึ้นมา\n\nทันใดนั้น สถานะหยุดนิ่งก็พังทลายลง สิ่งมีชีวิตกลับคืนสู่พื้นดินและเริ่มแปลงร่าง ร่างกายของมันเปลี่ยนจากหินสีเทาที่ไร้ลักษณะเป็นคริสตัลสีแดงระยิบระยับ ทรายที่ไหลอย่างอิสระ หินดินดานสีน้ำเงินที่เปราะบาง และอื่นๆ มันยังคงดำเนินการบิดตัวที่ซับซ้อนยิ่งขึ้น\n\nที่จุดสูงสุดของการแสดง มันปะทุออกเป็นเศษปริศนานับพันชิ้น สิ่งเหล่านี้หยุดนิ่งกลางอากาศในการจัดเรียงที่ซับซ้อน หักเหแสงสปอตไลท์ธรรมดาของเวทีเป็นจอแสดงผลที่ซับซ้อนของสีสันและรูปแบบที่น่าทึ่ง\n\nเศษชิ้นส่วนย้อนกลับอย่างช้าๆ จนกระทั่งนักแสดงกลับมาสมบูรณ์ และสิ่งมีชีวิตก็เดินออกจากเวทีไปท่ามกลางเสียงคำรามที่ไม่มีใครเทียบได้จากฝูงชน"
 astral_rift.2920.a: "ช่างเป็นตัวอย่างที่หายากยิ่งนัก"

 astral_rift.2925.name: "หลังจบการแสดง"
 astral_rift.2925.desc: "การแสดงสิ้นสุดลงแล้ว ทว่าผู้ชมได้รับเชิญให้รอพบปะกับหนึ่งในการแสดง นี่เป็นโอกาสที่ยอดเยี่ยมในการศึกษารายละเอียดของแต่ละบุคคล เนื่องจากพวกเขาแต่ละคนแสดงความสามารถที่เราไม่สามารถลอกเลียนแบบได้เลย\n\nนักแสดงทุกคนได้รับความนิยมอย่างมาก ดังนั้นเราอาจมีเวลาพบเพียงคนเดียวก่อนที่สถานีจะปิดการทำงาน เราควรจัดลำดับความสำคัญให้การแสดงใดดี?"
 astral_rift.2925.a: "พบปะกับนักกายกรรมสุนัขจิ้งจอก"
 astral_rift.2925.b: "พบปะกับไซบอร์กเลื้อยคลาน"
 astral_rift.2925.c: "พบปะกับนักบิดตัวหินประหลาด"

 astral_rift.2930.name: "พบปะกับเหล่านักกายกรรม"
 astral_rift.2930.desc: "นักกายกรรมสุนัขจิ้งจอกมีความสูงประมาณหนึ่งเมตรพร้อมหูสามเหลี่ยมที่ขยับเป็นครั้งคราว ลักษณะทางกายภาพอื่นๆ ได้แก่ ขนสีเหลืองซีด อุ้งเท้าหน้าที่คล่องแคล่วพร้อมนิ้วหัวแม่มือหลอกที่โค้งงอ และหางสั้นที่ห้อยลงมา เมื่อพวกเขาเจื้อยแจ้วด้วยภาษาต่างดาวที่แหลมคม เราสามารถเห็นฟันที่แบนและแข็งแรงของพวกเขา บ่งบอกถึงการกินพืชเป็นอาหาร\n\nเหล่านักกายกรรมมีปฏิสัมพันธ์อย่างกระตือรือร้นกับผู้ชมที่หลากหลาย เนื่องจากมีจำนวนผู้ชื่นชมน้อยกว่า พวกเขาจึงสามารถมีส่วนร่วมกับแฟนๆ ทุกคนในการสนทนาที่มีชีวิตชีวา แสดงมายากลรูหนอนและกายกรรมเฉพาะเพื่อแลกกับเงินบริจาค\n\nพวกเขาเป็นกลุ่มตัวอย่างที่มีพรสวรรค์ โดยมีคุณสมบัติที่มีค่ามากมายสำหรับการศึกษาค้นคว้า"
 astral_rift.2930.a: "รวบรวมตัวอย่างเนื้อเยื่อ"
 astral_rift.2930.b: "มอบรางวัลพลังงานเครดิตให้พวกเขาบ้าง"

 astral_rift.2935.name: "พบปะกับไซบอร์ก"
 astral_rift.2935.desc: "ไซบอร์กเลื้อยคลานมีความสูงและความกว้างเท่ากับยานขนส่งขนาดเล็ก พร้อมปากที่มีขนาดใหญ่พอที่จะเกือบจะกลืนมันเข้าไปได้ด้วย ลักษณะทางกายภาพอื่นๆ ได้แก่ ผิวสะเก็ดสีเทาที่มีแผงวงจรไฟฟ้าโปร่งใสติดตั้งอยู่ แกนพลังงานเรืองแสงที่ยึดติดกับลำตัว และแขนขาโลหะผสมที่เสริมด้วยระบบชลศาสตร์ที่ซับซ้อน\n\nเนื่องจากขนาดที่มหึมาของมัน ไซบอร์กจึงจอดแน่นอยู่กับที่และได้รับการปฏิบัติราวกับมันเป็นอนุสาวรีย์ แฟนๆ หลายคนนำบางอย่างมาให้มันกิน ซึ่งมันดูเหมือนจะซาบซึ้งใจ เอเลี่ยนที่อาสาสมัครเข้าร่วมการแสดงก็อยู่ด้วย ท่าทางเหมือนเป็นส่วนหนึ่งของการแสดง\n\nตัวอย่างขนาดมหึมานี้ควรเปิดโอกาสในการวิจัยที่หลากหลาย"
 astral_rift.2935.a: "รวบรวมตัวอย่างเนื้อเยื่อ"
 astral_rift.2935.b: "เสนอขนมอาหารให้กิน"

 astral_rift.2940.name: "พบปะกับนักบิดตัว"
 astral_rift.2940.desc: "นักบิดตัวยืนตระหง่านท่ามกลางฝูงชนที่หนาแน่น พร้อมแขนขาหนาที่ทำจากหินสีเทาซึ่งแสดงถึงความยืดหยุ่นที่ซ่อนอยู่ ลำตัวของพวกเขานั้นเพรียวบางอย่างเห็นได้ชัด มีรอยขีดข่วน รอยบุบ และเศษแตก ซึ่งตรงกันข้ามอย่างสิ้นเชิงกับแขนขาคอนกรีตที่ไร้ที่ติของพวกเขา\n\nนักบิดตัวไม่ค่อยพูดเก่งนัก ทว่ารับคำขอเพื่อแสดงความสามารถในการแปลงร่างของพวกเขา โดยเฉพาะอย่างยิ่งสำหรับแฟนๆ รุ่นเยาว์หรือผู้ที่ให้ทิปหนัก\n\nในฐานะการแสดงหลักในรายการยอดนิยมนี้ เรามีโอกาสเรียนรู้อย่างมากจากตัวอย่างนี้"
 astral_rift.2940.a: "รวบรวมตัวอย่างเนื้อเยื่อ"
 astral_rift.2940.b: "มอบรางวัลพลังงานเครดิตให้พวกเขาบ้าง"

 astral_rift.2960.name: "พันธุศาสตร์ต่างมิติ"
 astral_rift.2960.desc: "เราสามารถสืบสวนเหล่านักกายกรรมได้อย่างใกล้ชิดมากขึ้น [leader.GetName] เก็บรวบรวมตัวอย่างข้อมูลอย่างลับๆ ในรูปแบบของรูขุมขนและผ้าพันแผลที่ใช้แล้ว ไม่มีนักแสดงคนใดกังวลเกี่ยวกับพฤติกรรมของเรา พวกเขาอาจจะเคยชินกับแฟนๆ ที่กระทำสิ่งแปลกๆ ในระหว่างเซสชันเหล่านี้\n\nตัวอย่างพิสูจน์แล้วว่าน่าสนใจอย่างยิ่ง: จากการวิเคราะห์ของเรา พันธุศาสตร์สุนัขจิ้งจอกของพวกเขาได้รับการเปลี่ยนแปลงโดยแหล่งพลังงานต่างโลกบางอย่าง เม็ดเลือดแดงที่เป็นผลึกของพวกมันสามารถสังเกตได้ว่ายืดออกระหว่างจุดต่างๆ ในอวกาศและกาลเวลา ไม่ว่าสิ่งนี้จะมีผลเสียต่อสุขภาพอย่างไร มันช่วยให้สมาชิกของสายพันธุ์สามารถควบคุมรูหนอนในลักษณะธรรมชาติได้ การค้นพบนี้จะปฏิวัติความเข้าใจของเราเกี่ยวกับพันธุศาสตร์และศักยภาพอันน่าทึ่งของชีวิตชีวภาพ"
 astral_rift.2960.tt: "มอบเทคโนโลยีพันธุศาสตร์(เทคโนโลยีกล)"

 astral_rift.2965.name: "รูหนอนขนาดเล็ก"
 astral_rift.2965.desc: "เราสามารถพบปะกับเหล่านักกายกรรมในฐานะที่เป็นส่วนตัวมากขึ้น ได้รับการช่วยเหลือส่วนหนึ่งจากการบริจาคจำนวนมากของเรา นักแสดงซาบซึ้งใจมากและแสดงมายากลที่น่าประทับใจที่เกี่ยวข้องกับรูหนอนขนาดเล็ก - ตั้งแต่การหั่นวัตถุขนาดเล็กออกเป็นสองซีกไปจนถึงการสร้างพอร์ทัลคู่ที่วนซ้ำอย่างไม่สิ้นสุด\n\nเราสามารถบันทึกปรากฏการณ์ที่เป็นเอกลักษณ์นี้เพื่อการศึกษาเพิ่มเติม และมั่นใจว่าการสาธิตเหล่านี้จะช่วยให้เราเข้าใจเทคโนโลยีไฮเปอร์สเปซอย่างลึกซึ้งยิ่งขึ้น ยอมรับว่าลักษณะการทำงานที่เรียบง่ายซึ่งพวกเขาเข้าใกล้ฟิสิกส์ที่เป็นอันตรายนั้นเป็นเรื่องที่น่าตื่นตระหนกที่ได้พบเห็น"

 astral_rift.2970.name: "การเก็บตัวอย่างที่ผิดปกติ"
 astral_rift.2970.desc.common: "ในความพยายามที่จะรวบรวมเนื้อเยื่อชิ้นเล็กๆ ของไซบอร์กเลื้อยคลานอย่างลับๆ เราทำให้สิ่งมีชีวิตดังกล่าวโกรธแค้น จากนั้นมันก็พ่นเมือกสีเขียวหนืดใส่ทีมเดินทางของเรา และเราถูกคุ้มกันออกจากสถานวิจัยโดยโดรนรักษาความปลอดภัย"
 astral_rift.2970.desc.organic: "$astral_rift.2970.desc.common$\n\nที่น่าแปลกคือ มีการสังเกตเห็นว่าเมือกดังกล่าวมีคุณสมบัติในการรักษาบาดแผลที่น่าทึ่งบนผิวหนัง [leader.species.GetSkinType] ของเรา บาดแผลและรอยถลอกขนาดเล็กสมานตัวเข้าด้วยกันอย่างหมดจดและทิ้งความรู้สึกสบายตัวไว้เบื้องหลัง ของเหลวที่หนาแน่นทางชีวภาพนี้สามารถนำมาใช้เป็นตัวทำละลายสำหรับการบำบัดทางยาและการรักษาที่หลากหลาย"
 astral_rift.2970.desc.inorganic: "$astral_rift.2970.desc.common$\n\nของเหลวหนืดนั้นหนาแน่นไปด้วยสารชีวภาพ และดูเหมือนจะเหมาะสมสำหรับการใช้เป็นเกลอาหารที่มีคุณค่าทางโภชนาการสูง เรากำลังใช้คุณสมบัติของมันเพื่อพัฒนาเปสต์อาหารในลักษณะเดียวกันจากขยะอินทรีย์ ซึ่งควรจะช่วยเพิ่มประสิทธิภาพของระบบการผลิตอาหารของเราได้อย่างมาก"
 astral_rift.2970.tt: "มอบเทคโนโลยีการเกษตร(เทคโนโลยี)"

 astral_rift.2975.name: "ระบบพยุงชีพขั้นสูง"
 astral_rift.2975.desc: "เราสามารถพบปะกับไซบอร์กขนาดมหึมาในฐานะที่เป็นส่วนตัวมากขึ้น ได้รับการช่วยเหลือส่วนหนึ่งจากการบริจาคอาหารจำนวนมากของเรา\n\nสิ่งมีชีวิตปากกว้างมีความกระตือรือร้นอย่างผิดปกติและขยับตัวไปรอบๆ ด้วยความตื่นเต้น มันใช้เวลาหลายนาทีในการหมุนรอบตัวเอง 360 องศานี้ ช่วยให้เราสามารถจัดทำรายละเอียดการปรับปรุงไซบอร์กและระบบสนับสนุนการทำงานของไซบอร์กอย่างละเอียดถี่ถ้วน\n\nจากการวิเคราะห์ของเรา เราสามารถระบุได้ว่าพวกมันเคยมีขนาดเพียงเศษเสี้ยวของขนาดปัจจุบันในฐานะสายพันธุ์เลื้อยคลานทรงภูมิปัญญาตามปกติ และได้รับมวลสารส่วนใหญ่มาจากการเสริมแต่ง เนื่องจากจำนวนการอัปเกรดมากมายในเงื่อนไขการเกิดออกซิเดชันที่หลากหลาย บุคคลนี้ต้องมีชีวิตอยู่มานานหลายศตวรรษแล้ว"
 astral_rift.2975.tt: "มอบเทคโนโลยีไซเบอร์เนติกส์(เทคโนโลยีไซเบอเนติกส์)"

 astral_rift.2980.name: "การตกผลึกทางชีวภาพ"
 astral_rift.2980.desc: "การเบียดเสียดผ่านฝูงชน ช่วยให้เราศึกษาวิจัยนักบิดตัวอย่างใกล้ชิดมากขึ้น\n\nพวกเขาแสดงแขนหินหนักข้างหนึ่งให้เราดู เปลี่ยนร่างมันเป็นกลุ่มแร่ธาตุที่แตกต่างกันอย่างง่ายดาย สิ่งที่เริ่มต้นจากการเป็นหินแกรนิตหยาบเปลี่ยนเป็นอัญมณีสีแดงขุ่น และในที่สุดก็เป็นคริสตัลระยิบระยับ การเปลี่ยนย้ายของวัสดุส่งอนุภาคฝุ่นละเอียดเข้าไปในอากาศ ซึ่งเราเก็บรวบรวมอย่างรวดเร็วเป็นตัวอย่าง\n\nตัวอย่างประกอบด้วยสารชีวภาพที่ระเหยง่ายซึ่งสามารถนำมาใช้ตกผลึกแร่ธาตุบางชนิดได้โดยฉับพลันภายใต้เงื่อนไขเฉพาะเจาะจง การใช้ประโยชน์จากวัสดุนี้ในระดับใหญ่สามารถนำมาประยุกต์ใช้กับการผลิตแร่ธาตุที่มีอยู่ของเราและบรรลุผลลัพธ์ที่คล้ายคลึงกัน"
 astral_rift.2980.tt: "ปลดล็อกข้อกำหนดจักรวรรดิ §Y$edict_spontaneous_crystallization$§!"

 astral_rift.2985.name: "การทำแร่ธาตุควอนตัม"
 astral_rift.2985.desc: "เราสามารถพบปะกับนักบิดตัวในฐานะที่เป็นส่วนตัวมากขึ้น ได้รับการช่วยเหลือส่วนหนึ่งจากการบริจาคจำนวนมากของเรา\n\nวัสดุของสิ่งมีชีวิตนี้ดูเหมือนจะไม่ผูกพันกับความเป็นจริงนี้อย่างสมบูรณ์ จากการตรวจสอบอย่างใกล้ชิด มันแบ่งปันกับเราว่ามันสามารถเปลี่ยนการจัดแนวแม่เหล็กของวัสดุประกอบของมันในลักษณะที่ช่องเปิดขนาดเล็กเข้าไปในมิติอื่นก่อตัวขึ้นยาวนานพอที่จะสลับอะตอมของตัวเองกับอะตอมจากเวลาและสถานที่อื่นได้อย่างแท้จริง ด้วยการปรับเปลี่ยนควอนตัมดังกล่าว เป็นเรื่องยากที่จะรู้ว่าสิ่งมีชีวิตนี้เป็นสิ่งเดียวกับที่เราพบเมื่อไม่กี่ชั่วโมงก่อนหรือไม่\n\nแม้ว่าความสามารถดังกล่าวจะช่วยมอบการแสดงที่น่าประทับใจ ทว่าเราไม่อยากคิดเลยว่าอารยธรรมทั้งหมดของสายพันธุ์นี้จะสามารถบรรลุสิ่งใดได้บ้าง แต่อย่างไรก็ดี มันเป็นโอกาสในการวิจัยที่มีคุณค่าอย่างยิ่ง"
