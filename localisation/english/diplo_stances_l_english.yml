l_english:
 ####################################
 # Diplomacy Stances
 ####################################
 DIPLOMACY_STANCE:0 "§Hท่าทีทางการทูต§!"
 diplo_stance_belligerent:0 "แข็งกร้าว"
 diplo_stance_belligerent_name:0 "แข็งกร้าว"
 diplo_stance_belligerent_desc:0 "จักรวรรดิแห่งนี้จะพยายามข่มจักรวรรดิที่อ่อนแอกว่าให้ยอมจำนนต่อเจตจำนงของตน\n\n§E$influence_cost_for_improving_relations_effect$§!"
 diplo_stance_cooperative:0 "ร่วมมือ"
 diplo_stance_cooperative_name:0 "ร่วมมือ"
 diplo_stance_cooperative_desc:0 "จักรวรรดิแห่งนี้จะพยายามหาจุดร่วมและเจรจากับจักรวรรดิอื่นในนามของมิตรภาพ\n\n§E$influence_cost_for_harming_relations_effect$§!"
 diplo_stance_isolationist:0 "โดดเดี่ยว"
 diplo_stance_isolationist_name:0 "โดดเดี่ยว"
 diplo_stance_isolationist_desc:0 "จักรวรรดิแห่งนี้ต้องการให้ผู้อื่นปล่อยให้ตนจัดการกิจการของตัวเองตามลำพัง\n\n§E$influence_cost_for_improving_or_harming_relations_effect$§!"
 diplo_stance_expansionist:0 "ขยายอำนาจ"
 diplo_stance_expansionist_name:0 "ขยายอำนาจ"
 diplo_stance_expansionist_desc:0 "จักรวรรดิแห่งนี้มุ่งแสวงหาการเติบโตอย่างสันติ แต่ไม่มีจุดเน้นทางการทูตโดยเฉพาะ\n "
 diplo_stance_expansionist_wilderness: "ขยายอำนาจ"
 diplo_stance_expansionist_wilderness_name: "ขยายอำนาจ"
 diplo_stance_expansionist_wilderness_desc: "จักรวรรดิแห่งนี้มุ่งแสวงหาการเติบโตอย่างสันติ แต่ไม่มีจุดเน้นทางการทูตโดยเฉพาะ\n "
 diplo_stance_supremacist:0 "อำนาจสูงสุด"
 diplo_stance_supremacist_name:0 "อำนาจสูงสุด"
 diplo_stance_supremacist_desc:0 "จักรวรรดิแห่งนี้เรียกร้องให้ทุกผู้ทุกจักรวรรดิต้องศิโรราบต่อหน้า\n\n§Rท่าทีทางการทูตนี้จะทำให้ความสัมพันธ์กับจักรวรรดิอื่นทั้งหมดที่ใช้ท่าทีทางการทูต §Y$diplo_stance_supremacist$§! แย่ลง§!\n\n§E$easy_rivalry$\n$influence_cost_for_improving_relations_effect$§!"
 triggered_opinion_diplo_stance_supremacy:0 "ต่างฝ่ายต่างยึดอำนาจสูงสุด"
 diplo_stance_animosity: "เป็นปรปักษ์"
 diplo_stance_animosity_name: "เป็นปรปักษ์"
 diplo_stance_animosity_desc: "จักรวรรดิแห่งนี้ต้องการแข่งขันกับคู่แข่งทุกรายที่เป็นไปได้\n\n§Rท่าทีทางการทูตนี้จะเพิ่มผลกระทบของความเห็นเชิงลบจากการเป็น §Yคู่ปรับ§! ขึ้น 100§!\n\n§Eข้อจำกัดของการกระทำ §Yคู่ปรับ§! ต่อจักรวรรดิที่แข็งแกร่งกว่าเราจะถูกยกเลิก\n\n$easy_rivalry$§!\n"

 diplo_stance_mercantile:0 "พาณิชย์"
 diplo_stance_mercantile_name:0 "พาณิชย์"
 diplo_stance_mercantile_desc:0 "จักรวรรดิแห่งนี้ให้ความสำคัญกับการเอื้ออำนวยต่อการค้ามากกว่าสิ่งอื่นใด\n\n§E$influence_cost_for_close_borders$§! "
 diplo_stance_hunger:0 "หิวกระหาย"
 diplo_stance_hunger_name:0 "หิวกระหาย"
 diplo_stance_hunger_desc:0 "จักรวรรดิแห่งนี้หิวโหยและกลืนกิน"
 diplo_stance_isolationist_swarm:0 "พักตัว"
 diplo_stance_isolationist_swarm_name:0 "พักตัว"
 diplo_stance_isolationist_swarm_desc:0 "จักรวรรดิแห่งนี้เข้าสู่สภาวะจำศีล"
 diplo_stance_extermination:0 "กำจัดสิ้น"
 diplo_stance_extermination_name:0 "กำจัดสิ้น"
 diplo_stance_extermination_desc:0 "จุดประสงค์ของจักรวรรดิแห่งนี้คือทำลายชีวิตชีวภาพทั้งหมด"
 diplo_stance_isolationist_exterminators:0 "ประมวลใหม่"
 diplo_stance_isolationist_exterminators_name:0 "ประมวลใหม่"
 diplo_stance_isolationist_exterminators_desc:0 "จักรวรรดิแห่งนี้เข้าสู่สภาวะใคร่ครวญภายใน หยุดชั่วคราวเพื่อทบทวนจุดประสงค์ของตนอีกครั้ง"
 diplo_stance_purification:0 "ชำระล้าง"
 diplo_stance_purification_name:0 "ชำระล้าง"
 diplo_stance_purification_desc:0 "จักรวรรดิแห่งนี้เชื่อว่าศัตรูมีอยู่เพื่อถูกทำลายเท่านั้น และพวกเขาคือผู้ถูกเลือกให้ลงมือ"
 diplo_stance_isolationist_purifiers:0 "เก็บตัว"
 diplo_stance_isolationist_purifiers_name:0 "เก็บตัว"
 diplo_stance_isolationist_purifiers_desc:0 "จักรวรรดิแห่งนี้หันกลับเข้าสู่ภายใน เข้าสู่ระยะฟื้นฟูและสร้างใหม่"
 diplo_stance_isolationist_fallen_empire:0 "หลับใหล"
 diplo_stance_isolationist_fallen_empire_name:0 "หลับใหล"
 diplo_stance_isolationist_fallen_empire_desc:0 "จักรวรรดิแห่งนี้ตกสู่ยุคมืดมาเนิ่นนาน และแยกตัวเองออกจากส่วนอื่นของกาแล็กซีเป็นส่วนใหญ่"
 diplo_stance_ignorant:0 "ไม่รู้ประสา"
 diplo_stance_ignorant_name:0 "ไม่รู้ประสา"
 diplo_stance_ignorant_desc:1 "อารยธรรมก่อนความเร็วแห่งนี้ไม่ตระหนักถึงความเป็นจริงที่อยู่เลยพ้นหลุมแรงโน้มถ่วงของตนไป"
 diplo_stance_questioning:0 "ตั้งคำถาม"
 diplo_stance_questioning_name:0 "ตั้งคำถาม"
 diplo_stance_questioning_desc:0 "อารยธรรมก่อนความเร็วแห่งนี้เริ่มตั้งคำถามว่ามีอะไรอยู่บ้างนอกเหนือจากระบบดาวของตน"
 diplo_stance_eager:0 "กระตือรือร้น"
 diplo_stance_eager_name:0 "กระตือรือร้น"
 diplo_stance_eager_desc:0 "อารยธรรมก่อนความเร็วแห่งนี้กระตือรือร้นที่จะออกเดินทางสู่หมู่ดาวและพบเจอกาแล็กซีที่เหลือ"
 diplo_stance_fearful:0 "หวาดกลัว"
 diplo_stance_fearful_name:0 "หวาดกลัว"
 diplo_stance_fearful_desc:0 "อารยธรรมก่อนความเร็วแห่งนี้หวาดกลัวอันตรายจากต่างดาวที่มีอยู่ในกาแล็กซี"
 diplo_stance_uncertain:0 "ไม่แน่ใจ"
 diplo_stance_uncertain_name:0 "ไม่แน่ใจ"
 diplo_stance_uncertain_desc:0 "อารยธรรมก่อนความเร็วแห่งนี้ไม่แน่ใจว่าควรเข้าหาสังคมต่างดาวอย่างไร"
 diplo_stance_culture_shock:0 "ความตื่นตระหนกทางวัฒนธรรมต่างดาว"
 diplo_stance_culture_shock_name:0 "ความตื่นตระหนกทางวัฒนธรรมต่างดาว"
 diplo_stance_culture_shock_desc:0 "อารยธรรมก่อนความเร็วแห่งนี้ยังคงปรับตัวกับความรู้ที่ว่าพวกเขาไม่ได้อยู่ลำพังในกาแล็กซี"

 policy_diplomatic_stance:0 "ท่าทีทางการทูต"
 policy_diplomatic_stance_desc:0 "เราสามารถกำหนดวาระทางการทูตโดยรวมของเราได้ เพื่อเปลี่ยนวิธีที่เรามีปฏิสัมพันธ์กับส่วนอื่นของกาแล็กซี\n"

 requires_supremacy_traditions:0 "$TRIGGER_FAIL$ต้องการ §Y$tr_supremacy_finish$§!"
 requires_enmity_traditions: "$TRIGGER_FAIL$ต้องการ §Y$tr_enmity_finish$§!"

