 concept_fleet_management_desc: "ออกแบบยานและสร้างกองยาน §Hขนาดยาน§! และ ['concept_components'] ใหม่จะถูกปลดล็อกด้วยการวิจัย ['concept_technologies'] ที่จำเป็น$ui_available_tabs$[GetConceptFleetManagement]"
