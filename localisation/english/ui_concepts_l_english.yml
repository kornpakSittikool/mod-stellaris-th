 # View: £interface£ ['concept_technology_view'] or £interface£ §H$concept_technology_view$§!
 concept_technology_view: "หน้าต่าง$TECHNOLOGY$"
 concept_technology_view_desc: "£interface£ §H$concept_technology_view$§! แสดงความก้าวหน้าทางวิทยาศาสตร์ของจักรวรรดิในสาขา £physics£ ['concept_physics_research'], £society£ ['concept_society_research'] และ £engineering£ ['concept_engineering_research'] จากหน้าต่างนี้ คุณสามารถเลือกตัวเลือกการวิจัยและจัดการลำดับความสำคัญทางเทคโนโลยีได้\n\n['concept_technologies'] ใหม่จะถูกนำเสนอแบบกึ่งสุ่มจากตัวเลือกที่มีอยู่ สะท้อนถึงความคาดเดาไม่ได้ของการค้นคว้าทางวิทยาศาสตร์"

 # View: £interface£ ['concept_leaders_view'] or £interface£ §H$concept_leaders_view$§!
 concept_leaders_view: "หน้าต่าง$topbar_button_leaders_name$"
 concept_leaders_view_desc: "£interface£ §H$concept_leaders_view$§! แสดงภาพรวมของ ['concept_leaders'] ที่กำลังปฏิบัติหน้าที่ทั้งหมดภายในจักรวรรดิ รวมถึงบทบาท ['concept_leader_traits'] ระดับประสบการณ์ และงานที่ได้รับมอบหมายในปัจจุบัน จากหน้าต่างนี้ คุณสามารถสรรหาผู้นำใหม่ ย้ายหน้าที่ผู้นำเดิม หรือปลดประจำการพวกเขาได้"

 # View: £interface£ ['concept_species_view'] or £interface£ §H$concept_species_view$§!
 concept_species_view: "หน้าต่าง$topbar_button_species_name$"
 concept_species_view_desc: "£interface£ §H$concept_species_view$§! แสดงรายชื่อ ['concept_species'] ทั้งหมดที่รู้จักภายในจักรวรรดิอย่างครอบคลุม จากหน้าต่างนี้ คุณสามารถตรวจสอบและปรับเปลี่ยน ['concept_species_traits'] รวมถึงจัดการสิทธิของประชากร เช่น สถานะพลเมือง การรับราชการทหาร และ ['concept_living_standards'] ได้\n\nหน้าต่างนี้สำคัญอย่างยิ่งต่อการบริหารจักรวรรดิหลายเผ่าพันธุ์ ซึ่งนโยบาย ชีววิทยา และอุดมการณ์ล้วนเชื่อมโยงกันในการกำหนดรูปร่างของสังคมกาแล็กซี"

 # View: £interface£ ['concept_planets_and_sector_view'] or £interface£ §H$concept_planets_and_sector_view$§!
 concept_planets_and_sector_view: "$PLANET_LIST$แสดง"	# Use this alias when referring to the concept
 concept_planets_and_sector: "$PLANET_LIST$" # Left out 'View' to fit in the Databank UI
 concept_planets_and_sector_desc: "£interface£ §H$concept_planets_and_sector$§! แสดงภาพรวมแบบรวมศูนย์ของ £colony£ ['concept_colonies'] และ £sector£ ['concept_sector'] ทั้งหมดภายในจักรวรรดิ\n\nในหน้าต่างนี้ คุณยังสามารถแต่งตั้ง ['concept_governors'] ได้อีกด้วย"

 # View: £interface£ ['concept_expansion_planner'] or
 concept_expansion_planner: "เครื่องมือวางแผนการขยายอาณานิคม"
 concept_expansion_planner_desc: "£interface£ §H$concept_expansion_planner$§! แสดงรายชื่อ £planet£ ['concept_planets'] ที่เปิดโอกาสให้ตั้งอาณานิคมได้ คุณสามารถเริ่มการตั้งอาณานิคมได้โดยตรงจากหน้าจอนี้ ซึ่งจะสร้าง £colony_ship£ ['concept_colony_ship'] ให้อัตโนมัติ\n\n£planet£ §H$concept_planets$§! จะต้องถูกสำรวจโดย £science_ship£ ['concept_science_ship'] ก่อน และ £anomaly£ ['concept_anomalies'] ใดๆ ที่พบบนดาวเคราะห์ก็ต้องถูกตรวจสอบเสียก่อน จึงจะสามารถตั้งอาณานิคมได้\n\nนอกจากนี้ ยังต้องมีการสร้าง ['concept_starbase'] ในระบบของดาวเคราะห์ดวงนั้น เพื่อให้มันอยู่ภายในพรมแดนจักรวรรดิ"

