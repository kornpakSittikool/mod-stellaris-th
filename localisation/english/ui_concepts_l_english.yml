 # View: £interface£ ['concept_claims_view'] or £interface£ §H$concept_claims_view$§!
 concept_claims_view: "หน้าต่าง$CLAIMS_VIEW$"
 concept_claims_view_desc: "£interface£ §H$concept_claims_view$§! แสดง ['concept_claims'] ด้านดินแดนทั้งหมดที่จักรวรรดิถือครอง โหมดการทูตของ ['concept_galaxy_map'] จะช่วยให้เห็นภาพรวมที่ชัดเจนของระบบที่มีข้อพิพาทและจุดเสี่ยงที่อาจกลายเป็นความขัดแย้งในอนาคต"

 # View: £interface£ ['concept_market_view'] or £interface£ §H$concept_market_view$§!
 concept_market_view: "หน้าต่าง$MARKET_VIEW$"
 concept_market_view_desc: "£interface£ §H$concept_market_view$§! เป็นกรอบสำหรับการค้าระหว่างดวงดาว การซื้อขายทรัพยากร หรือการตั้งธุรกรรมรายเดือนแบบเกิดซ้ำ"

 # View: £interface£ ['concept_colony_view'] or £interface£ §H$concept_colony_view$§!
 concept_colony_view: "หน้าต่างอาณานิคม"
 concept_colony_view_desc: "£interface£ §H$concept_colony_view$§! ใช้สำหรับบริหาร £colony£ ['concept_colony'] บน £planet£ ['concept_planets'] ที่เหมาะสมและไม่มีผู้อยู่อาศัย หรือบน ['concept_habitats'] หน้าต่างนี้สามารถใช้เริ่มกระบวนการ §Hตั้งอาณานิคม§! ได้$ui_available_tabs$$concept_colony_view_tabs$"
 colony_view_tab_planet_summary: "§Hพื้นผิวดาว§!"
 colony_view_tab_management: "§Hการจัดการ§!"
 colony_view_tab_population: "§Hเศรษฐกิจ§!"
 colony_view_tab_armies: "§Hกองทัพ§!"
 colony_view_tab_holdings: "§Hการถือครอง§!"
 concept_colony_view_tabs: "- $colony_view_tab_planet_summary$: แสดงภาพรวมของ £district£ ['concept_districts'], £building£ ['concept_buildings'] และ ['concept_governor'] ที่ได้รับมอบหมายของอาณานิคม ที่นี่คุณสามารถตั้ง ['concept_designation'] หรือเปิดใช้ ['concept_planet_automation'] ได้\n- $colony_view_tab_management$: แสดงลักษณะเฉพาะของดาวเคราะห์และการเปลี่ยนแปลงของประชากร ที่นี่คุณสามารถออก ['concept_decisions'], ทำ ['concept_planetary_ascension'] หรือเริ่ม ['concept_terraforming'] ได้\n- $colony_view_tab_population$: แสดงประชากรของอาณานิคมที่ถูกแบ่งตามชนชั้น £job£ ['concept_job']\n- $colony_view_tab_armies$: แสดงกองกำลังภาคพื้นดินในอาณานิคม และระดับ ['concept_devastation'] ที่อาณานิคมได้รับ\n- $colony_view_tab_holdings$: แสดงภาพรวมของ ['concept_overlord_holdings'] ทั้งหมดในอาณานิคม"

 # View: £interface£ ['concept_starbase_view'] or £interface£ §H$concept_starbase_view$§!
 concept_starbase_view: "หน้าต่างฐานดาว"
 concept_starbase_view_desc: "£interface£ §H$concept_starbase_view$§! ใช้สำหรับบริหาร ['concept_starbase']$ui_available_tabs$$concept_starbase_view_tabs$"
 starbase_view_tab_command: "§Hคําสั่ง§!"
 starbase_view_tab_defenses: "§Hการป้องกัน§!"
 starbase_view_tab_armies: "§Hศูนย์กลางกองทัพบก§!"
 starbase_view_tab_shipyard: "§Hอู่ต่อยาน§!"
 concept_starbase_view_tabs: "- $starbase_view_tab_command$: แสดงภาพรวมของ §Hโมดูล§! และ §Hสิ่งปลูกสร้าง§! ของฐานดาว รวมถึงเปิดให้คุณอัปเกรดฐานดาวไปยังระดับถัดไปเมื่อวิจัย ['concept_technology'] ที่จำเป็นแล้ว\n- $starbase_view_tab_defenses$: แสดง ['concept_defense_platforms'] ที่มีอยู่ และการเลือกแบบหนึ่งจะสร้างเพิ่มได้\n- $starbase_view_tab_armies$: เป็นช่องทางในการระดม §H$assault_army_plural$§! จำนวนมาก กองทัพจะถูกรวบรวมจาก £colony£ ['concept_colonies'] ที่พร้อมใช้งานใน £sector£ ['concept_sector'] และจะไปรวมกันที่ฐานดาวหรือที่ §Hกองทัพ§! ซึ่งเปิด §Hกองทหารม้า§! เอาไว้\n- $starbase_view_tab_shipyard$: ใช้สร้างทั้ง ['concept_civilian_ships'] และ ['concept_military_ships']"

 # View: £interface£ ['concept_system_map'] or £interface£ §H$concept_system_map$§!
 concept_system_map: "แผนที่ระบบ"
 concept_system_map_desc: "£interface£ §H$concept_system_map$§! แสดงมุมมองโดยละเอียดของระบบดาวแต่ละระบบ รวมถึง ['concept_celestial_objects'], ['concept_civilian_space_stations'], ['concept_fleets'] และโครงสร้างพื้นฐานในวงโคจร หน้าต่างนี้ช่วยให้จัดการการก่อสร้าง การตั้งอาณานิคม ปฏิบัติการรบ และกิจกรรมทางวิทยาศาสตร์ภายในระบบได้อย่างแม่นยำ"

 # View: £interface£ ['concept_galaxy_map'] or £interface£ §H$concept_galaxy_map$§!
 concept_galaxy_map: "แผนที่กาแล็กซี"
 concept_galaxy_map_desc: "£interface£ §H$concept_galaxy_map$§! แสดงภาพรวมเชิงยุทธศาสตร์ของกาแล็กซีที่รู้จัก โดยแสดง £system£ ['concept_systems'], พรมแดนของ ['concept_empire'] และ ['concept_hyperlanes'] มันเป็นหน้าต่างหลักสำหรับการสำรวจ การขยายอำนาจ และการประสานงานระหว่างดวงดาว"

 # View: £interface£ ['concept_navigation_bar'] or £interface£ §H$concept_navigation_bar$§!
 concept_navigation_bar: "แถบนำทาง"
 concept_navigation_bar_desc: "£interface£ §H$concept_navigation_bar$§! อยู่ทางด้านซ้ายของหน้าจอ\n\nมันสามารถขยายเมื่อมีการโต้ตอบ หรือถูกล็อกให้อยู่ในสภาพย่อก็ได้\n\nโหมดขยายจะเปิดให้เข้าถึงการตั้งค่าที่สามารถจัดเรียงรายการเมนูใหม่ได้ ซึ่งยังส่งผลให้ปุ่มลัดคีย์บอร์ดสำหรับเปิดแต่ละเมนูอย่างรวดเร็วเปลี่ยนตามไปด้วย"

 # View: £interface£ ['concept_resource_bar'] or £interface£ §H$concept_resource_bar$§!
 concept_resource_bar: "แถบทรัพยากร"
 concept_resource_bar_desc: "£interface£ §H$concept_resource_bar$§! อยู่ด้านบนของหน้าจอ\n\nมันแสดง §Hทรัพยากร§! ต่างๆ เช่น £energy£ ['concept_energy'] และตัวชี้วัดอย่าง £trade_value£ ['concept_trade'], ['concept_research'], ['concept_starbase_capacity'] และ ['concept_naval_capacity']\n\nทางด้านขวาคือ §Hตัวควบคุมเวลา§! ที่ใช้เร่ง ชะลอ หยุด และเล่นเกมต่อ\n\nด้านล่างของ §Hตัวควบคุมเวลา§! คือ §Hเครื่องเล่นเพลง§!"

 # View: £interface£ ['concept_outliner'] or £interface£ §H$concept_outliner$§!
 concept_outliner: "แถบสรุป"
 concept_outliner_desc: "£interface£ §H$concept_outliner$§! ช่วยให้เข้าถึงทรัพย์สินสำคัญทั่วทั้งจักรวรรดิได้อย่างรวดเร็ว รวมถึง £colony£ ['concept_colonies'], ['concept_fleets'] และ ['concept_civilian_space_stations'] ด้วยอินเทอร์เฟซที่ปรับแต่งได้ มันช่วยให้การนำทางและการกำกับดูแลทำได้รวดเร็ว พร้อมทั้งแสดงสถานะแบบเรียลไทม์และให้การควบคุมโดยตรงต่อปฏิบัติการที่สำคัญ"

