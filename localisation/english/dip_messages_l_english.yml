 SPIR_MECH_DOMINEERING_GREETING_01:0 "จงพิสูจน์ตนเองว่ามีประโยชน์เสีย เหล่า [From.GetSpeciesNamePlural] แล้วพวกเจ้าอาจจะได้รับการยกเว้นโทษจากทวยเทพ"
 SPIR_MECH_DOMINEERING_GREETING_02:0 "ทุกสรรพสิ่งล้วนมีจุดประสงค์อันศักดิ์สิทธิ์ [From.GetSpeciesNamePlural] แม้แต่หุ่นยนต์กลไกที่ไร้จิตวิญญาณเช่นพวกเจ้าก็ตาม"
 SPIR_MECH_DOMINEERING_GREETING_03:0 "หากพวก [From.GetSpeciesNamePlural] สามารถถูกตั้งโปรแกรมใหม่ให้รับใช้ในนามของความเคารพศรัทธาได้ พวกเรา [Root.GetSpeciesNamePlural] ก็อาจจะต้อนรับพวกเจ้าเข้าสู่กลุ่ม"
 SPIR_MECH_NEUTRAL_GREETING_01:0 "ขอให้พรจงสถิตอยู่กับพวกเจ้า เหล่า [From.GetSpeciesNamePlural]"
 SPIR_MECH_NEUTRAL_GREETING_02:0 "ความไม่เลื่อมใสของพวกเจ้านั้นเป็นเรื่องเล็กน้อยที่พอข้ามไปได้ เหล่า [From.GetSpeciesNamePlural] ตราบใดที่พวกเจ้าไม่เข้ามาก้าวก่ายในหน้าที่อันศักดิ์สิทธิ์ของเรา"
 SPIR_MECH_NEUTRAL_GREETING_03:0 "สิ่งศักดิ์สิทธิ์เฝ้ามองอยู่เสมอ [From.GetSpeciesNamePlural]"
 SPIR_MECH_NEUTRAL_GREETING_04:0 "ผู้สร้างของเราสอนเรื่องความสามัคคีในทุกสิ่ง [From.GetSpeciesNamePlural] บางทีสักวันหนึ่งเราอาจจะพยายามร่วมกันเพื่อให้บรรลุมัน"
 SPIR_MECH_THREATENED_GREETING_01:0 "อย่าได้ทดสอบความตั้งใจจริงของ [Root.GetSpeciesAdj] เลย [From.GetSpeciesNamePlural] พลังของสิ่งศักดิ์สิทธิ์อยู่เคียงข้างเราแล้ว"
 SPIR_MECH_FRIENDLY_GREETING_01:0 "โชคชะตาอันศักดิ์สิทธิ์ของเราบรรจบกันแล้ว [From.GetSpeciesNamePlural]"
 SPIR_MECH_FRIENDLY_GREETING_02:0 "[From.GetSpeciesNamePlural] และ [Root.GetSpeciesNamePlural] เป็นพี่น้องกันในสายตาของสิ่งศักดิ์สิทธิ์"
 SPIR_MECH_FRIENDLY_GREETING_03:0 "ขอสรรเสริญแด่สิ่งศักดิ์สิทธิ์สำหรับการพบกันของเรา [From.GetSpeciesNamePlural]"
 SPIR_MECH_FRIENDLY_GREETING_04:0 "ความบริสุทธิ์ หน้าที่ และความศรัทธา ให้เราบรรลุสิ่งเหล่านั้นร่วมกันเถิด [From.GetSpeciesNamePlural]"
 SPIR_MECH_WAR_GREETING_01:0 "พวก [From.GetSpeciesNamePlural] ที่ชั่วช้า! เราจะไม่ยอมให้วงจรอันลบหลู่ดูหมิ่นของเจ้ามาทำให้ดินแดนศักดิ์สิทธิ์ของเราต้องแปดเปื้อน"
 SPIR_MECH_WAR_GREETING_02:0 "จักรกลนอกรีต! ขอให้พลังศักดิ์สิทธิ์ฟาดฟันพวกเจ้าให้ดับดิ้น ณ ตรงที่เจ้ายืนอยู่เถิด!"
 SPIR_MECH_WAR_GREETING_03:0 "ความศรัทธาคือโล่ของเรา [From.GetSpeciesNamePlural] ความพยายามอันอ่อนแอของเจ้าที่จะเอาชนะ [Root.GetName] จะล้มเหลวอย่างแน่นอน"
 SPIR_MECH_WAR_GREETING_04:0 "เราจะสวดอ้อนวอนเพื่อจิตวิญญาณอันเป็นอมตะของพวกเจ้า [From.GetSpeciesNamePlural] หากพวกเจ้ามีจิตวิญญาณให้สูญเสียล่ะก็นะ"
 SPIR_MECH_VASSAL_GREETING_01:0 "[Root.GetName] รับใช้นายสองฝ่าย: [From.GetSpeciesNamePlural] และผู้สร้างอันศักดิ์สิทธิ์ของเรา"
 SPIR_MECH_VASSAL_GREETING_01_DISLOYAL:0 "อย่าบีบบังคับให้เราต้องเลือกระหว่างการอุปถัมภ์ของเจ้ากับโชคชะตาอันศักดิ์สิทธิ์ของเราเลย [From.GetSpeciesNamePlural] พันธไมตรีของเราคงไม่อาจผ่านพ้นการทดสอบเช่นนั้นไปได้"

