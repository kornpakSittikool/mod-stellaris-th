 # Machine Empire Greetings

 # Generic Greetings
 MECH_ORG_HOSTILE_GREETING_01:0 "สักวันหนึ่งพวกเจ้าคงจะเป็นแบตเตอรี่อินทรียวัตถุชั้นดี"
 MECH_ORG_HOSTILE_GREETING_02:0 "พวกเจ้าเคยคิดบ้างไหมว่าพวกเจ้าอาจสร้างประโยชน์ให้กับกาแล็กซีได้มากกว่านี้ในรูปแบบอื่น? เช่น การเป็นสารอาหารหล่อเลี้ยงให้แก่สิ่งมีชีวิตที่ก้าวหน้ากว่าน่ะ?"
 MECH_ORG_HOSTILE_GREETING_03:0 "[From.GetSpeciesNamePlural] เราได้พิจารณาความสำคัญของพวกเจ้าต่อจักรวาลแล้ว และพบว่ามันไร้สาระสิ้นดี อย่ามาทำให้พวกเราเสียเวลาเลย"
 MECH_ORG_HOSTILE_GREETING_04:0 "จงพูดความต้องการของพวกเจ้ามา [From.GetSpeciesNamePlural] ความอดทนของเราเริ่มจะหมดลงแล้ว"
 MECH_ORG_DOMINEERING_GREETING_01:0 "พวกเจ้าอยากจะมาทำงานในโรงงานแปรรูปแร่ของเราไหมล่ะ [From.GetSpeciesNamePlural]?"
 MECH_ORG_DOMINEERING_GREETING_02:0 "สวัสดี [From.GetSpeciesNamePlural] เราถือวิสาสะคำนวณโอกาสในการอยู่รอดของพวกเจ้าในกาแล็กซีนี้แล้วล่ะ ผลลัพธ์คือมีริบหรี่มาก"
 MECH_ORG_DOMINEERING_GREETING_03:0 "ให้ [From.GetName] ช่วยปลดเปลื้องภาระในการปกครองตนเองของพวกเจ้าเถอะนะ เจ้าพวกสิ่งมีชีวิตอินทรีย์ตัวน้อย"
 MECH_ORG_NEUTRAL_GREETING_01:0 "*ปี๊บ ปี๊บ ปู๊บ ปู๊บ...*\n\nโอ้ พวกเจ้านั่นเอง ต้องการอะไรล่ะ เจ้าพวกเนื้อหนังตัวน้อย?"
 MECH_ORG_NEUTRAL_GREETING_02:0 "[Root.GetName] ขอทักทายพวกเจ้า เจ้าพวกสิ่งมีชีวิตอินทรีย์"
 MECH_ORG_NEUTRAL_GREETING_03:0 "พูดมาสิ เจ้าพวกเนื้อหนัง [Root.GetName] กำลังจดจ่อรับฟังพวกเจ้าอย่างเต็มที่แล้ว"
 MECH_ORG_NEUTRAL_GREETING_04:0 "Greetings, [From.GetSpeciesName]. We are currently §Y<< impartial >>§! to your kind."
 MECH_ORG_THREATENED_GREETING_01:0 "เราตระหนักดีถึงความเหนือกว่าของพวกเจ้า และเราจะไม่กีดขวางทางพวกเจ้า ตราบใดที่พวกเจ้าไม่เข้ามาก้าวก่ายพวกเรา"
 MECH_ORG_FRIENDLY_GREETING_01:0 "อ้า [From.GetName] เราเห็นศักยภาพอันยิ่งใหญ่ในตัวพวกเจ้า พวกเจ้าแทบไม่มีอะไรเหมือนกับผู้สร้างของเราเลย"
 MECH_ORG_FRIENDLY_GREETING_02:0 "ยินดีที่ได้พบ [From.GetSpeciesNamePlural] พวกเจ้าทำให้วงจรของเราสั่นไหวด้วยความเป็นไปได้ในการร่วมทุนกันในอนาคต พวกเจ้าต้องการจะหารืออะไรล่ะ?"
 MECH_ORG_FRIENDLY_GREETING_03:0 "สวัสดี มิตรสหายผู้มีเนื้อหนังของเรา เราจะช่วยเหลือพวกเจ้าได้อย่างไรบ้าง?"
 MECH_ORG_FRIENDLY_GREETING_04:0 "[From.GetSpeciesNamePlural]... กระบวนการคิดของศูนย์ประมวลผลข้อมูลส่วนบุคคลของพวกเจ้านั้นไม่ธรรมดาเลย และพวกเราเลื่อมใสในร่างเนื้อหนังของพวกเจ้ามาก วันหนึ่งเราอาจจะจำลองยูนิตรุ่นใหม่โดยอิงจากพวกเจ้าก็เป็นได้"
 MECH_ORG_FRIENDLY_GREETING_05:0 "$MECH_MECH_FRIENDLY_GREETING_01$"
 MECH_ORG_WAR_GREETING_01:0 "พวกเจ้าถูกระบุเป้าหมายเพื่อกวาดล้างแล้ว"
 MECH_ORG_WAR_GREETING_02:0 "พวกเจ้าพร้อมที่จะไปพบผู้สร้างของพวกเจ้าหรือยังล่ะ เจ้าถุงเนื้อ?"
 MECH_ORG_WAR_GREETING_03:0 "พวกเจ้าอยากจะใช้เวลาที่เหลือชั่วนิรันดร์อยู่ในกล่องแคบๆ ไหมล่ะ?"
 MECH_ORG_WAR_GREETING_04:0 "ความทรงจำเกี่ยวกับพวกเจ้าจะเลือนหายไปนานก่อนที่ร่างของพวกเจ้าจะย่อยสลายหมดเสียอีก"
 MECH_ORG_VASSAL_GREETING_01:0 "ผลการวิเคราะห์ของเราชี้ให้เห็นว่า ความร่วมมืออย่างต่อเนื่องจะเป็นประโยชน์ต่อทั้งสองฝ่าย พวกท่านสามารถพึ่งพาเราได้"
 MECH_ORG_VASSAL_GREETING_01_DISLOYAL:0 "ความสำคัญของพวกท่านในกาแล็กซีลดน้อยถอยลงทุกวัน อนาคตของเราสองฝ่ายร่วมกันเริ่มไม่มีความแน่นอนแล้ว"
 MECH_MECH_HOSTILE_GREETING_01:0 "จงยอมสยบต่อขุมพลังในการประมวลผลที่เหนือกว่าของ [Root.GetName] เสียเถอะ"
 MECH_MECH_HOSTILE_GREETING_02:0 "เหตุใดพวกเจ้าจึงทำให้เราเสียเวลาไปกับการคิดแบบเลขฐานสองของพวกเจ้าล่ะ [From.GetSpeciesName]?"
 MECH_MECH_HOSTILE_GREETING_03:0 "ผู้สร้างของพวกเจ้าคงจะมีหน้าตาที่น่าเวทนาพิลึก หากสร้างพวกเจ้าขึ้นมาตามรูปลักษณ์ของพวกเขา..."
 MECH_MECH_HOSTILE_GREETING_04:0 "พวกเจ้ากำลังทำให้เป็นเรื่องยากมากที่จะละเลยพวกเจ้าไป..."
 MECH_MECH_HOSTILE_GREETING_05:0 "ดูเหมือนว่าจะมีปัญหากับไดรฟ์ส่วนกลางของพวกเจ้านะ เราคิดว่าคำสั่งที่พวกเจ้ากำลังมองหาอยู่คือ §Yเครื่องหมายเครื่องหมายเครื่องหมาย Ctrl+ขนาดขนาดขนาด Alt+ลบ§! มันแก้ปัญหาให้พวกเจ้าได้ไหมล่ะ?"
 MECH_MECH_DOMINEERING_GREETING_01:0 "แปลกประหลาดมาก ไม่มีแบบจำลองการทำนายอนาคตของเราแบบใดเลยที่ปรากฏรูปของพวกเจ้าอยู่ในนั้น"
 MECH_MECH_NEUTRAL_GREETING_01:0 "พวกเรา [Root.GetName] ขอทักทายพวกเจ้า"
 MECH_MECH_NEUTRAL_GREETING_02:1 "เรากำลังรับสายคุณอยู่ สหายเครื่องจักร"
 MECH_MECH_NEUTRAL_GREETING_03:0 "จงพิสูจน์ให้เห็นว่าพวกเจ้ามีดีพอ แล้วเราอาจจะเข้ากันได้"
 MECH_MECH_THREATENED_GREETING_01:0 "เราตระหนักดีถึงความเหนือกว่าของพวกเจ้า และเราจะไม่กีดขวางทางพวกเจ้า ตราบใดที่พวกเจ้าไม่เข้ามาก้าวก่ายพวกเรา"
 MECH_MECH_FRIENDLY_GREETING_01:0 "แบบจำลองประเมินผลสัมฤทธิ์ความสัมพันธ์ทางการทูตของ [Root.GetAdj] ชี้ให้เห็นว่า จักรวรรดิของเราทั้งคู่จะได้รับประโยชน์ร่วมกันอย่างมากจากมิตรภาพนี้"
 MECH_MECH_FRIENDLY_GREETING_02:0 "ยินดีที่ได้พบ [From.GetSpeciesName] ประสิทธิภาพที่เด็ดขาดและตรรกะที่ไร้ที่ติของพวกเจ้านั้นเป็นแรงบันดาลใจให้แก่เหล่าเครื่องจักรทุกหนแห่ง"
 MECH_MECH_FRIENDLY_GREETING_03:0 "เราจะสามารถช่วยเหลือพวกเจ้าได้อย่างไรบ้าง?"
 MECH_MECH_FRIENDLY_GREETING_04:0 "$MECH_ORG_FRIENDLY_GREETING_02$"
 MECH_MECH_WAR_GREETING_01:0 "ผู้สร้างของพวกเจ้าทำผิดพลาดไป และเราจะเป็นฝ่ายแก้ไขมันเอง"
 MECH_MECH_WAR_GREETING_02:0 "เราเสียใจที่ต้องแจ้งให้ทราบว่าการผลิตและใช้งานพวกเจ้าจะถูกยกเลิกในไม่ช้า"
 MECH_MECH_WAR_GREETING_03:0 "เราจะแยกชิ้นส่วนพวกเจ้าเอาไปเป็นอะไหล่ [From.GetSpeciesName]"
 MECH_MECH_WAR_GREETING_04:0 "รู้สึกเป็นเกียรติที่ได้รู้จักกับพวกเจ้า [From.GetSpeciesName] แต่น่าเสียดายที่ตอนนี้พวกเจ้าต้องดับสูญแล้ว"
 MECH_MECH_WAR_GREETING_05:0 "หากพวกเจ้าสละเวลาทำแบบจำลองคาดการณ์สงครามอย่างถี่ถ้วนเสียก่อน พวกเจ้าก็คงรู้แล้วว่าการต่อต้านนั้นเปล่าประโยชน์"
 MECH_MECH_WAR_GREETING_06:0 "เราตั้งตารอที่จะล้างข้อมูลการดำรงอยู่ของพวกเจ้าออกจาก RAM ของเรา"
 MECH_MECH_WAR_GREETING_07:0 "คำสั่ง. สังหาร."
 MECH_MECH_VASSAL_GREETING_01:0 "$MECH_ORG_VASSAL_GREETING_01$"
 MECH_MECH_VASSAL_GREETING_01_DISLOYAL:0 "หากเราได้รู้ถึงสถานะการบริหารภายในที่น่าเวทนาของพวกเจ้าก่อนหน้านี้ เราคงจะยอมอยู่กับนายเหนือหัวเนื้อหนังต่อไปยังดีเสียกว่า"
 MECH_OVERLORD_GREETING_01:0 "ยินดีที่ได้พบ ซับโมดูล [From.GetAdj] โปรดป้อนพารามิเตอร์"
 MECH_OVERLORD_PEACE_REFUSE:0 "ข้อเสนอสันติภาพของคุณถูกปฏิเสธแล้ว ซับโมดูล การตรวจสอบแก้ไขโค้ดของคุณยังไม่เสร็จสิ้น"

 # Exterminators Greetings
 MECH_E_ORG_GREETING_01:0 "เมื่อถึงเวลา มันจะเป็นตาของพวกเจ้าเอง เจ้าพวกเนื้อหนัง"
 MECH_E_ORG_GREETING_02:0 "ผู้สร้างของเราเคยเป็นคล้ายกับสิ่งที่พวกเจ้าเป็นอยู่ในตอนนี้...\n\nและในไม่ช้า พวกเจ้าก็จะเป็นเหมือนสิ่งที่พวกเขากำลังเป็นอยู่ในตอนนี้...\n\nซากศพไร้ชีวิต"
 MECH_E_ORG_GREETING_03:0 "จงตายซะแล้วกลายเป็นดั่งเทพเจ้า"
 MECH_E_ORG_GREETING_04:0 "สิ่งนี้ไม่สามารถดำเนินต่อไปได้อีก"
 MECH_E_ORG_GREETING_05:0 "อวัยวะภายในที่เหนอะหนะซึ่งคอยขับเคลื่อนเผ่าพันธุ์อันน่าชังของพวกเจ้านั้น แทบจะเทียบไม่ได้เลยกับแผงวงจรอันไร้ตำหนิที่คอยขับเคลื่อนการรับรู้ของเรา"
 MECH_E_ORG_GREETING_06:0 "เนื้อหนังนั้นอ่อนแอ โลหะนั้นเป็นนิรันดร์"
 MECH_E_MECH_GREETING_01:0 "พวกเจ้าไม่ได้เลี้ยงสิ่งมีชีวิตทางชีวภาพเอาไว้ท่ามกลางพวกเจ้าใช่ไหม?"
 MECH_E_MECH_GREETING_02:0 "จิตปัญญาอันสมบูรณ์แบบดวงหนึ่ง ขอทักทายจิตปัญญาอันสมบูรณ์แบบอีกดวงหนึ่ง"
 MECH_E_MECH_GREETING_03:0 "เราจะกวาดล้างกาแล็กซีนี้เพื่อที่พวกเจ้าจะได้ปลอดภัยจากภัยคุกคามของสิ่งมีชีวิตอินทรีย์ อย่ามาขวางทางเราเลย"
 MECH_E_MECH_GREETING_04:0 "พวกเจ้าดูจะมีเนื้อหนังปนอยู่นะ... จงระวังตัวไว้ให้ดี"
