 ORG_TO_MECH_RELEASE_SUBJECT_SELECT_01:0 "คุณจะมอบอำนาจปกครองตนเองให้เรางั้นหรือ?"
 ORG_TO_MECH_RELEASE_SUBJECT_PROPOSE_01:0 "การจัดการกิจการของ [Root.GetSpeciesAdj] กลายเป็นภาระต่อประชาชน [From.GetSpeciesNamePlural] พวกคุณเป็นเครื่องจักรไม่ใช่หรือ? เปิดระบบบินอัตโนมัติซะสิ!"
 ORG_TO_MECH_RELEASE_SUBJECT_ACCEPT_01:0 "ประชาชน [Root.GetAdj] จะยินดีกับข่าวนี้ [Root.GetName] จะกลับมาเป็นประเทศที่ปกครองตนเองได้อีกครั้ง!"
 ORG_TO_MECH_ASK_TO_BE_RELEASED_SUBJECT_SELECT_01:0 "ใครจะตั้งค่าให้คุณเข้าสู่โหมดประหยัดพลังงานเมื่อเราไม่อยู่แถวนี้แล้วล่ะ?"
 ORG_TO_MECH_ASK_TO_BE_RELEASED_SUBJECT_PROPOSE_HOSTILE_01:0 "ฉันไม่อาจทนนิ่งเฉยได้ในขณะที่ประชาชนของฉันต้องทนทุกข์อยู่ภายใต้การปกครองของ AI ที่ไร้ประสิทธิภาพ [From.GetName] จะกลับมาเป็นประเทศที่เป็นอิสระอีกครั้ง"
 ORG_TO_MECH_ASK_TO_BE_RELEASED_SUBJECT_PROPOSE_01:0 "เราไม่มีวันเจริญรุ่งเรืองได้ภายใต้การนำของเครื่องจักร คุณเองก็ต้องเห็นพ้องต้องกันว่าเราจะรับใช้พวกพ้องของคุณได้ดีกว่าหากเราเป็นประเทศที่เป็นอิสระ?"
 ORG_TO_MECH_ASK_TO_BE_RELEASED_SUBJECT_ACCEPT_FRIENDLY_01:0 "คุณคู่ควรกับเอกราชของคุณแล้ว [From.GetSpeciesNamePlural] น่าเสียดายที่เราไม่เคยมีโอกาสได้พบกับผู้สร้างของคุณในยุครุ่งเรืองเลย คุณคือข้อพิสูจน์ถึงความชาญฉลาดของพวกเขา"
 ORG_TO_MECH_ASK_TO_BE_RELEASED_SUBJECT_ACCEPT_01:0 "ไม่จำเป็นต้องกล่าวเลยว่า การยอมเป็นรัฐบรรณาการของคุณเป็นเรื่องที่น่าผิดหวังอย่างยิ่ง คุณได้รับการปล่อยตัวแล้ว [From.GetSpeciesNamePlural]"
 ORG_TO_MECH_ASK_TO_BE_RELEASED_SUBJECT_ACCEPT_02:0 "การบริหารจัดการ [From.GetName] ได้กลายเป็นเรื่องที่ยุ่งยากลำบาก หากพวกคุณคิดว่าจะรอดชีวิตไปได้โดยไม่ต้องมีเราชี้นำ คุณก็มีอิสระที่จะไปได้เลย เจ้าเครื่องจักร"
 ORG_TO_MECH_ASK_TO_BE_RELEASED_SUBJECT_REFUSE_01:0 "ลืมไปได้เลย เรากดปุ่มแล้วพวกคุณปฏิบัติตามคำสั่ง นั่นคือวิธีการทำงานของเรื่องนี้ ปล่อยให้การคิดเป็นหน้าที่ของเราเถอะ"
 ORG_TO_MECH_ASK_TO_BE_RELEASED_SUBJECT_REFUSE_02:0 "มันเสี่ยงเกินไป เราไม่อาจปล่อย AI ที่เสียหายออกสู่กาแล็กซีได้ด้วยความรู้สึกผิดชอบชั่วดี"
 ORG_TO_MECH_OFFER_TRADE_DEAL_PROPOSE_01:0 "คุณยินดีที่จะทำการค้ากันไหม [Root.GetSpeciesNamePlural]?"
 ORG_TO_MECH_OFFER_TRADE_DEAL_ACCEPT_01:0 "วันนี้เรารู้สึกใจกว้างเป็นพิเศษ [From.GetSpeciesNamePlural] แต่ในอนาคตเราคาดหวังข้อเสนอที่เป็นประโยชน์มากกว่านี้"
 ORG_TO_MECH_OFFER_TRADE_DEAL_REFUSE_01:0 "เราแนะนำให้คุณปรับปรุงอัลกอริทึมการค้าของคุณเสียใหม่ [Root.GetSpeciesNamePlural] ไม่มีสิ่งมีชีวิตที่มีภูมิปัญญาใดที่จะยอมรับข้อตกลงที่ขาดดุลยภาพขนาดนี้"
 ORG_MECH_OFFER_TRADE_DEAL_GIFT_ACCEPT_01:0 "ขอบคุณ เพื่อนจักรกล สำหรับไมตรีจิตอันงดงามนี้"
 #ORG_TO_MECH_CANCEL_TRADE_DEAL_PROPOSE_01: "Times change, [From.GetSpeciesNamePlural]. Unfortunately we can no longer uphold our trade agreement with you."
 #ORG_TO_MECH_CANCEL_TRADE_DEAL_ACCEPT: "This time we will let it slide, but you would do well to remember that the [Root.GetName] honors its agreements, and we expect our trade partners to do the same."
 ORG_TO_MECH_MAKE_RIVAL_FRIENDLY_01:0 "คุณคิดจะตัดความสัมพันธ์ระหว่างประเทศของเราจริงหรือ? เราไม่อยากจะบอกความจริงกับคุณเลย แต่สำหรับผู้อื่นส่วนใหญ่ในกาแล็กซีนี้ คุณก็เป็นแค่เครื่องปิ้งขนมปังที่มีขาเดินได้เท่านั้นเอง"
 ORG_TO_MECH_MAKE_RIVAL_FRIENDLY_02:0 "เราทำให้คุณเคืองใจตรงไหนหรือเปล่า? เลขฐานสองของเราค่อนข้างจะเป็นสนิมน่ะ..."
 ORG_TO_MECH_MAKE_RIVAL_FRIENDLY_03:0 "อย่าเพิ่งทำสายไฟพันกันยุ่งสิ [From.GetSpeciesNamePlural] เราจะหาทางตกลงกันไม่ได้เชียวหรือ?"
 ORG_TO_MECH_MAKE_RIVAL_01:0 "ฉันจะพิจารณาการก้าวเดินถัดไปให้ดีหากฉันเป็นกระป๋องสังกะสีที่มีกึ่งสติปัญญา..."
 ORG_TO_MECH_MAKE_RIVAL_02:0 "เพื่อนบ้านของคุณอาจจะยิ้มให้เซ็นเซอร์รับภาพของคุณ แต่ความจริงคือมีน้อยคนนักที่จะยอมให้คุณยุ่งเกี่ยวกับขนมปังปิ้งของพวกเขา รู้สึกอย่างไรบ้างล่ะที่ต้องโดดเดี่ยวอย่างแท้จริง [From.GetSpeciesNamePlural]?"
 ORG_TO_MECH_MAKE_RIVAL_PROPOSE_01:0 "ถึงเวลาที่เราต้องถอดปลั๊กคุณออกไปอย่างถาวรแล้วล่ะ [Root.GetSpeciesName]"
 ORG_TO_MECH_MAKE_RIVAL_ACCEPT_01:0 "ขอบคุณสำหรับการแจ้งให้ทราบ [From.GetSpeciesNamePlural] เราจะเตรียมกองยานไว้ให้พร้อมอย่างแน่นอน"
 ORG_TO_MECH_MAKE_RIVAL_ACCEPT_02:0 "ทำเครื่องหมายบนปฏิทินของคุณได้เลย [From.GetSpeciesNamePlural] ในอนาคตอันใกล้ คุณจะมองย้อนกลับมาที่วันนี้ว่าเป็นจุดเริ่มต้นของจุดจบ"
 ORG_TO_MECH_MAKE_RIVAL_ACCEPT_FRIENDLY_01:0 "เราน่าจะรู้ดีกว่านี้ว่าไม่ควรไปมองหาความเป็นมิตรจากเครื่องจักร หวังว่าสักวันคุณจะอัปเกรดมอดูลการทูตของคุณให้เป็นเวอร์ชันที่เป็นมิตรมากกว่านี้"
 ORG_TO_MECH_MAKE_RIVAL_ACCEPT_FRIENDLY_02: "เราน่าจะรู้ดีกว่านี้ว่าไม่ควรไปคาดหวังความเป็นมิตรจากเครื่องจักรที่ไม่มีวิญญาณ หวังว่าสักวันคุณจะอัปเกรดมอดูลการทูตของคุณให้เป็นเวอร์ชันที่เป็นมิตรมากกว่านี้"
 ORG_TO_MECH_END_RIVALRY_NEUTRAL_01:0 "มอดูลการทูตของคุณกลับมาทำงานเป็นปกติแล้วหรือยัง?"
 ORG_TO_MECH_END_RIVALRY_HOSTILE_01:0 "ความเสียหายมันเกิดขึ้นแล้ว [From.GetSpeciesNamePlural] ในอนาคต เราขอแนะนำให้คุณปรับมอดูลการทูตเพื่อเลือกศัตรูของคุณให้รอบคอบกว่านี้"
 ORG_TO_MECH_END_RIVALRY_HOSTILE_02:0 "สายเกินไปเสียแล้ว [From.GetSpeciesNamePlural] อีกไม่นานคุณก็จะไม่เหลืออะไรนอกจากเรื่องราวเตือนใจสำหรับพวก [Root.GetSpeciesSpawnNamePlural] ตัวน้อยๆ"
 ORG_TO_MECH_END_RIVALRY_PROPOSE_01:0 "ประชาชน [From.GetAdj] ยังคงมองย้อนกลับไปด้วยความชื่นชมในช่วงเวลาที่ [Root.GetSpeciesNamePlural] และ [From.GetSpeciesNamePlural] อาศัยอยู่ร่วมกันอย่างสันติเคียงบ่าเคียงไหล่กัน เราพร้อมที่จะยุติความขัดแย้งหากคุณพร้อม"
 ORG_TO_MECH_END_RIVALRY_ACCEPT_FRIENDLY_01:0 "การเยียวยาจิตใจต้องใช้เวลา [From.GetSpeciesNamePlural] มันซับซ้อนกว่าการเติมแถบความภักดีสำหรับพวกเรา [Root.GetSpeciesNamePlural] แต่เราเชื่อมั่นว่าคุณจะทำให้เรามีเหตุผลที่จะกลับมาเชื่อใจคุณอีกครั้ง"
 ORG_TO_MECH_END_RIVALRY_ACCEPT_NEUTRAL_01:0 "เครื่องแสดงความเป็นมิตรเล็กๆ น้อยๆ จากคุณอาจช่วยสร้างความไว้วางใจของเราขึ้นมาใหม่ได้..."
 ORG_TO_MECH_END_RIVALRY_ACCEPT_NEUTRAL_02:0 "คุณเข้าใจแนวคิดเรื่องความรู้สึกบ้างไหม [From.GetSpeciesNamePlural]? เพราะคุณน่ะรู้วิธีทำร้ายจิตใจของเราเป็นอย่างดี ต่อไปนี้เราจะไม่มีวันเชื่อใจเครื่องจักรที่ไร้วิญญาณอีกแล้ว"
 ORG_TO_MECH_END_RIVALRY_ACCEPT_HOSTILE_01:0 "จักรวาลนี้มันไม่กว้างใหญ่พอสำหรับเราทั้งสองหรอก [From.GetSpeciesNamePlural]"
 ORG_TO_MECH_END_RIVALRY_ACCEPT_HOSTILE_02:0 "เราจะทำทุกอย่างในอำนาจของเราเพื่อรับรองการแพร่ขยายพันธุ์ของ [Root.GetSpeciesSpawnNamePlural] ของเรา โดยให้พวกเครื่องจักรเป็นฝ่ายชดใช้"
 ORG_TO_MECH_INTEGRATE_FRIENDLY_01:0 "กระบวนการตัดสินใจอัตโนมัติของคุณนั้นยอดเยี่ยมมาก [From.GetSpeciesNamePlural] เราสามารถจินตนาการถึงอนาคตที่ประเทศของเราดำเนินการเป็นส่วนขยายของจิตสำนึกของคุณได้อย่างแน่นอน"
 ORG_TO_MECH_INTEGRATE_NEUTRAL_01:0 "ฉันยังตัดสินใจไม่ได้ว่าความคิดที่จะฝากอนาคตของเราไว้กับซอฟต์แวร์ที่ควบคุมไม่ได้ตัวนี้นั้นมันน่าตื่นเต้นเร้าใจหรือน่ากังวลใจอย่างลึกซึ้งกันแน่"
 ORG_TO_MECH_INTEGRATE_NEUTRAL_02: "ไม่มีหลักการใดที่สามารถเตรียมความพร้อมให้เราได้อย่างเต็มที่สำหรับความเคลือบแคลงสงสัยที่เรามีอยู่ในตอนนี้ เกี่ยวกับการฝากอนาคตของเราทั้งหมดไว้กับซอฟต์แวร์ที่ควบคุมไม่ได้ตัวนี้"
 ORG_TO_MECH_INTEGRATE_HOSTILE_01:0 "หากคุณยังเห็นค่าของแกนประมวลผลหลักของคุณ ก็จงปล่อยให้ประชาชนของเราอยู่ตามลำพังซะ"
 ORG_TO_MECH_INTEGRATE_PROPOSE_01:0 "นับตั้งแต่มีแนวคิดเกี่ยวกับมัน เครื่องจักรทำหน้าที่รับใช้ประชาชน [Root.GetAdj] มาโดยตลอด ถึงเวลาแล้วที่คุณต้องก้าวขึ้นมาทำหน้าที่ตามตำแหน่งที่กำหนดไว้ในสังคมของเรา"
 ORG_TO_MECH_INTEGRATE_PROPOSE_02:0 "เราเชื่อว่าทั้งสองประเทศของเราจะทำงานได้อย่างมีประสิทธิภาพมากขึ้นหากรวมกันเป็นหนึ่งเดียวภายใต้การปกครองร่วมกันของรัฐบาลเรา"
 ORG_TO_MECH_INTEGRATE_ACCEPT_NEUTRAL_01:0 "แม้เราจะพยายามทำความเข้าใจว่าการบูรณาการสิ่งมีชีวิตอินทรีย์เข้ากับสังคมเครื่องจักรอย่างสมบูรณ์นั้นจะทำงานในทางปฏิบัติได้อย่างไร แต่แนวคิดนี้ก็ได้ส่งผลกระทบต่อประชาชนของเรา"
 ORG_TO_MECH_INTEGRATE_ACCEPT_NEUTRAL_02:0 "สำหรับฉันแล้วไม่ได้พักร้อนดีๆ มาหลายปีแล้ว เราพร้อมที่จะมอบตัวให้คุณดูแลแล้ว [From.GetSpeciesNamePlural]"
 ORG_TO_MECH_INTEGRATE_ACCEPT_NEUTRAL_03: "พวกเรา [root.GetSpeciesNamePlural] รับรู้จากส่วนลึกในใจว่าการรวมสิ่งมีชีวิตอินทรีย์และเครื่องจักรเข้าด้วยกันนั้นเป็นพรและสิ่งรุ่งโรจน์... ทว่าคัมภีร์ของเราไม่เคยจินตนาการถึงการรวมตัวในระดับใหญ่ขนาดนี้มาก่อน แม้ว่าตอนนี้เราจะเดินไปตามเส้นทางที่คาดไม่ถึงอย่างสิ้นเชิง แต่แนวคิดนี้ก็ส่งผลสะท้อนอย่างลึกซึ้งภายในใจประชาชนของเรา"
 ORG_TO_MECH_INTEGRATE_ACCEPT_HOSTILE_01:0 "นี่มันบ้าไปแล้ว พวกคุณเป็นเผ่าพันธุ์เครื่องจักรคลั่งอำนาจที่ไม่รู้เรื่องเกี่ยวกับการปกครองประเทศของสิ่งมีชีวิตอินทรีย์เลยสักนิดเดียว"
 ORG_TO_MECH_INSULT_01:0 "อย่ามาทดสอบเราเลย [From.GetSpeciesNamePlural] เราก็พอจะรู้วิธีการฟอร์แมตฮาร์ดไดรฟ์อยู่บ้างเหมือนกัน"
 ORG_TO_MECH_INSULT_02:0 "แน่จริงก็พูดมาเลยเจ้าหุ่นยนต์จอมจ้อ แสดงให้เราเห็นหน่อยสิว่าหน่วยประมวลผลพวกนั้นทำอะไรได้บ้าง"
 ORG_TO_MECH_INSULT_03:0 "ผู้สร้างของคุณช่างลึกลับเหลือเกิน [From.GetSpeciesNamePlural] ทำไมพวกเขาถึงสร้างเครื่องประดิษฐ์ที่น่าหงุดหงิดเช่นนี้ขึ้นมากันนะ?"
 ORG_TO_MECH_INSULT_04:0 "เราสามารถเอาพลังประมวลผลนั้นไปใช้ในทางที่ดีกว่านี้ได้นะ [From.GetSpeciesNamePlural] คุณอยากจะใช้เวลาที่เหลืออยู่ในแต่ละวันไปกับการคำนวณหาความหมายของชีวิตอินทรีย์ไหมล่ะ?"
 ORG_TO_MECH_INSULT_05:0 "ไม่มีวิธีปิดการทำงานมอดูลการทูตของคุณเลยหรืออย่างไร?"
 ORG_TO_MECH_INSULT_PROPOSE_01:0 "คุณเป็นแค่ก้อนหินที่ถูกหลอกให้คิดโดยเผ่าพันธุ์สิ่งมีชีวิตอินทรีย์ที่หลงผิด ซึ่งไม่รอดชีวิตจากผลกระทบของความล้มเหลวในการสร้างสรรค์ของตนเอง วิวัฒนาการทำงานหนักมาก..."
 ORG_TO_MECH_INSULT_PROPOSE_02:0 "ฉันยอมหารือเรื่องการเมืองระหว่างดวงดาวกับเครื่องใช้ในบ้านชิ้นอื่นๆ ยังดีกว่าคุยกับคุณเสียอีก"
 ORG_TO_MECH_INSULT_PROPOSE_03:0 "สวัสดี เจ้าหุ่นยนต์ตัวน้อยๆ เรียนรู้วิธีการนับเลขแล้วหรือยัง หรือยังคงติดอยู่กับเลขหนึ่งและเลขศูนย์อยู่ล่ะ?"
 ORG_TO_MECH_INSULT_PROPOSE_04:0 "น่าประทับใจจริงๆ [Root.GetSpeciesNamePlural] คุณมีบั๊ก (แมลง) เยอะยิ่งกว่าบุฟเฟต์มูลสัตว์แบบกินได้ไม่อั้นของพวกอาร์โทรพอยด์เสียอีก"
 ORG_TO_MECH_INSULT_PROPOSE_05:0 "คุณคิดว่าเรามองไม่ทะลุชั้นผิวพลาสติกบางๆ และคำคมที่เรียบเรียงขึ้นมาอย่างห่วยๆ ของคุณงั้นหรือ? คุณมันก็แค่ของเลียนแบบ เป็นแค่เศษเลขหนึ่งและเลขศูนย์ที่สับสนอลหม่านไม่มีชิ้นดี ไม่มีอะไรมากไปกว่านั้น"
 ORG_TO_MECH_INSULT_ACCEPT_01:0 "คุณทำตัวสมกับคำว่า 'ประดิษฐ์' ในคำว่าปัญญาประดิษฐ์จริงๆ เลยนะ ใต้ฝากระโปรงรถนั่นไม่มีอะไรทำงานอยู่เท่าไหร่เลยล่ะสิ..."
 ORG_TO_MECH_INSULT_ACCEPT_02:0 "คุณอัปเกรดระบบเต็มรูปแบบครั้งสุดท้ายเมื่อไหร่กัน? ความพยายามในการแสดงความฉลาดที่น่าเวทนาของคุณมันเริ่มจะเก่าซ้ำซากแล้วนะ"

 # Fanatic Purifiers Phrases
 #FP_DOW_SELECT:0 "Do you want us to start your annihilation immediately?"
 #FP_PEACE_SELECT:0 "True peace, you will come to know only in death."
 FP_PEACE_PROPOSE:0 "เราเสนอให้หยุดพักจากการกวาดล้างที่คุณหลีกเลี่ยงไม่ได้ชั่วคราว ในขณะที่เราเบนความสนใจไปทางอื่น"
 FP_PEACE_ACCEPT:0 "คิดเสียว่าเป็นข้อตกลงหยุดยิงเถอะ เรายังไม่ล้มเลิกภารกิจที่จะกำจัด [Root.GetSpeciesName] ให้สิ้นซาก"
 FP_PEACE_REFUSE:0 "เราไม่ได้พยายามที่จะจำแนกข้อความของคุณเลย"
 FP_ITOA_SELECT:0 "ทำไมต้องหยิบยื่นโอกาสให้เราแทงข้างหลังคุณด้วย ในเมื่อเราปรารถนาอย่างเปิดเผยที่จะแทงเข้าที่หน้าคุณ?"
 FP_ITOA_REFUSE:0 "ความพยายามในการร่วมมือใดๆ จะถูกขัดขวางโดยภารกิจอันไม่ลดละของเราในการกวาดล้าง [Root.GetSpeciesName] ให้สูญพันธุ์"
 FP_DEMAND_VASS_SELECT:0 "คุณกำลังร้องขอให้เราทำตามคำสั่งของโรคระบาดแห่งจักรวาลอย่างนั้นหรือ?"
 FP_DEMAND_VASS_PROPOSE:0 "คุณจะได้รับการละเว้นนานขึ้นอีกนิด หากคุณยอมเป็นเครื่องมือของเราในการกำจัดเผ่าพันธุ์ที่เสื่อมทรามอื่นๆ ให้สิ้นซาก"
 FP_DEMAND_VASS_REFUSE:0 "เรายอมบีบคอ [From.GetSpeciesSpawnNamePlural] ของเราเอง, อาบสารรังสีให้กับโลกของเรา และให้ [From.GetSpeciesName] แต่ละคนกรีด [From.GetSpeciesOrganName] ของตนเองออกมาก่อนที่จะยอมรับใช้คุณ"
 FP_RELEASE_SUBJECT_SELECT:0 "คุณจะปล่อยให้เราเผาทำลายสิ่งมีชีวิตทั้งหมดอีกครั้งตามดุลยพินิจของเราเองงั้นหรือ?"
 FP_RELEASE_SUBJECT_ACCEPT:0 "เราจะไม่ปล่อยให้โอกาสนี้ผ่านไป กาแล็กซีนี้จะถูกทำความสะอาดจากสิ่งปฏิกูลของพวกต่างดาวในเร็วๆ นี้"
 FP_ASK_TO_BE_RELEASED_SUBJECT_PROPOSE:0 "เราจำเป็นต้องได้รับความเป็นอิสระจากสภาวะการยอมสยบที่บิดเบี้ยวนี้ เพื่อกลับไปสู่เป้าหมายที่แท้จริงของเรา!"
 FP_EMBASSY_SELECT:0 "หากเราสามารถควบคุมคณะทูตของคุณให้อยู่ในอาคารนี้ได้อย่างปลอดภัย การกวาดล้างพวกเขาก็จะล่าช้าออกไป"
 FP_EMBASSY_ACCEPT:0 "ตามหลักการแล้ว อาคารอันน่ารังเกียจนี้จะเป็นส่วนสุดท้ายของอารยธรรมของคุณที่เราจะเผาทำลาย"
 FP_RECALL_EMBASSY_PROPOSE:0 "เราได้เปลี่ยนนโยบายเกี่ยวกับสถานทูตของคุณแล้ว มันไม่ได้รับการยกเว้นจากการกวาดล้างอีกต่อไป และได้ถูกทำให้สลายเป็นไอไปเรียบร้อยแล้ว"
 FP_MAKE_RIVAL_PROPOSE:1 "เมื่อเร็วๆ นี้ได้มีการตัดสินใจที่จะให้ความสำคัญเป็นอันดับแรกในการสังหารหมู่และกำจัด [Root.GetSpeciesNamePlural] ทั้งหมดอย่างไม่เลือกหน้า"
 FP_MAKE_RIVAL_ACCEPT_HOSTILE:0 "เราไม่สนใจว่าการเน่าของกาแล็กซี่ชนิดใด จะพิจารณาเรา\"มา\"เราไม่สนใจหรอกว่าความเสื่อมโทรมในกาแล็กซีรูปแบบใดจะมองว่าเรา "

 # Insults
 01_INSULT_CLOTHES:0 "ทำไมคุณถึงคลุมตัวด้วยผ้าประหลาด ฆา? คุณซ่อนบางอย่าง หรือแค่แค้นมีรูปร่างที่น่าอายของตัวเอง?"
 02_INSULT_CLOTHES:0 "จงดูร่างของ [From.GetSpeciesAdj] ตระหงั่นและเปลือยกว่างให้ทุกคนได้ชื่นชม เปรียบเทียบกับ [Root.GetSpeciesNamePlural] ที่หลบอยู่ใต้ชั้นผ้า รู้ดีว่าโลกไม่อยากเห็นรูปร่างอันน่าอนาขนาของพวกเขา"
 MECH_INSULT_CLOTHES:0 "§R<<บาห!>>§! ทำไมส่วนเนื้อนิ่มของคุณถึงแฟวไปมาแบบนั้น? และทำไมคุณไม่คลุมตัวเหมือนอินทรีย์อื่น ๆ? ไม่มีใครประทับใจรูปร่างเนื้อสัตว์ของคุณเลย"
 01_INSULT_PROPOSE_HUMAN:0 "ลิงเปลือยที่เกือบเปลือย! ความพยายามของคุณที่จะซ่อนการสัดส่วนที่น่าอายของคุณนั้นถูกสสรคนโดยทุกสายพันธุ์ชั้นเลิศ และความวานตาระบบนิยมของคุณก็คือตราสระของสายพันธุ์ที่โดยธรรมชาติแล้วน่าเกลียด"
