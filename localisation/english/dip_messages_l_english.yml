 S_MECH_NEUTRAL_GREETING_06:0 "อ้อ เหล่า [From.GetSpeciesNamePlural] เรากะว่าจะถามพวกเจ้าอยู่พอดีว่าพวกเจ้าคิดว่าควรพาพวกสิ่งมีชีวิตอินทรีย์ไปออกกำลังกายบ่อยแค่ไหนถึงจะไม่เสี่ยงต่อการใช้งานร่างหนักเกินไปน่ะ?"
 S_MECH_THREATENED_GREETING_01:0 "§Y<<ทำการสแกนเอนทิตีเครื่องจักรกล วิเคราะห์ข้อมูลจำเพาะระบบ ระดับภัยคุกคาม: สูง กำลังเริ่มใช้งานระบบป้องกันภัย >>§!"
