 CRISIS_MATERIALIST_GREETING_01:1 "ยินดีต้อนรับ ยินดีต้อนรับ [From.GetSpeciesNamePlural] เราเดาว่าเซ็นเซอร์ระยะใกล้และไกลของคุณพร้อมสำหรับความรุ่งโรจน์ที่กำลังจะมาถึงแล้วใช่ไหม? เราไม่อยากให้คุณพลาดแม้แต่เสี้ยววินาทีเดียวของการทะยานขึ้นสู่ความรุ่งโรจน์ของเรา"
