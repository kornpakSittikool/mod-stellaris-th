 # Overlord Greetings
  #Auth, Egals, Milit, Maters
 OVERLORD_GREETING_01:0 "เรากำลังรับสายพวกท่านอยู่ [From.GetSpeciesName] มีนโยบายใดบ้างที่พวกท่านต้องการทบทวนหรือไม่?"
