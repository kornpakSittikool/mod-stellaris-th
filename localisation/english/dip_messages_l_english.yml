 CRISIS_XENOPHILE_GREETING_01:0 "พวกคุณเสาะหาชีวิตต่างดาว แต่ตอนนี้กลับบังอาจปฏิเสธเรา เมื่อภารกิจของเราเสร็จสิ้น พวกคุณจะได้รวมเป็นหนึ่งเดียวกับส่วนที่เหลือของกาแล็กซี ตลอดกาล"
