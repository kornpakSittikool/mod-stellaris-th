 # Democratic Crusaders
 DC_HOSTILE_GREETING_01:0 "[From.GetSpeciesName] จะไม่มีวันได้รับอิสรภาพอย่างแท้จริงภายใต้การปกครองของ [From.GetRulerName]"
 DC_HOSTILE_GREETING_02:0 "คณะกรรมการกิจกรรมที่ไม่เป็นมิตรต่อชาว [Root.GetAdj] กำลังตามกลิ่นสายลับของเจ้าอยู่ [From.GetRulerTitle]"
 DC_HOSTILE_GREETING_03:0 "พวกเจ้าเรียกตัวเองว่าเป็นประชาธิปไตยที่แท้จริงได้อย่างไร ในเมื่อชาว [From.GetAdj] ลงคะแนนเลือก [From.GetRulerName] เป็น [From.GetRulerTitle] ผู้ถ่มน้ำลายรดหน้าคุณค่าของประชาธิปไตยเช่นนี้?"
 DC_HOSTILE_GREETING_04:0 "หากไม่มีการปฏิวัติเกิดขึ้นเพื่อโค่นล้มอำนาจของ [From.GetRulerTitle] [From.GetRulerName] ในเวลานี้ มันจะต้องเกิดขึ้นในไม่ช้าอย่างแน่นอน"
 DC_HOSTILE_GREETING_05:0 "วันหนึ่ง [From.GetSpeciesName] จะถูกปลดปล่อยออกจากกรงขังและบินทะยานสู่ฟากฟ้าแห่งเสรีภาพดั่ง [From.GetSpeciesNamePluralCompliment] ผู้สง่างาม ทว่ามันไม่มีวันเกิดขึ้นตราบใดที่พวกเขายังถูกจองจำโดย [From.GetRulerTitle] ผู้เป็น [From.GetSpeciesNameInsult]"
 DC_HOSTILE_GREETING_06:0 "แม้เผ่าพันธุ์ของพวกเจ้าจะไม่มีวันเรียนรู้ความหมายของประชาธิปไตย แต่พวกเราจะสอนให้พวกเจ้ารู้จักความหมายของสงครามเอง"
 DC_DOMINEERING_GREETING_01:0 "พวกเราพอจะมีความอดทนกับผู้เผด็จการรายย่อยอยู่บ้าง แต่ไม่มากนักหรอก"
 DC_DOMINEERING_GREETING_02:0 "ตามหลักการแล้ว อย่างน้อยเราก็พยายามทำความเข้าใจความต่าง แต่สำหรับกรณีของพวกเจ้านั้น พวกเรายินดีที่จะขอยกเว้นเป็นพิเศษ"
 DC_NEUTRAL_GREETING_01:0 "สังคมที่เสรีและเปิดกว้างย่อมดำเนินวิถีทางการทูตอย่างเสรีและเปิดเผย"
 DC_NEUTRAL_GREETING_02:0 "สิทธิของชาว [From.GetSpeciesAdj] นั้นมีความสำคัญสูงสุดสำหรับเรา ส่วนอำนาจของรัฐบาล [From.GetAdj] เป็นเพียงเรื่องรองลงมา"
 DC_NEUTRAL_GREETING_03:0 "ประชาชนของเจ้าอาจจะมีสิทธิ์ออกเสียงนะ [From.GetRulerTitle] แต่พวกเขามีเสรีภาพหรือไม่?"
 DC_NEUTRAL_GREETING_04:0 "หากเจ้าคิดว่าเจ้ารู้จักสิทธิของประชาชนดีกว่าตัวพวกเขาเองล่ะก็ [From.GetRulerTitle] เจ้าก็ไม่ได้รู้เรื่องอะไรเกี่ยวกับสิทธิมนุษยชนหรือประชาชนเลย"
 DC_NEUTRAL_GREETING_05:0 "ประชาชนของพวกเราพบว่าจิตสำนึกร่วมกลุ่มของพวกเจ้านั้นน่าสนใจ และอยากที่จะเรียนรู้เกี่ยวกับมุมมองต่อโลกของพวกเจ้าให้มากขึ้น พวกเจ้ามีความเข้าใจในแนวคิดทางสังคมขั้นสูงอย่างประชาธิปไตยและเสรีภาพอย่างไรบ้าง?"
 DC_THREATENED_GREETING_01:0 "การขยายอำนาจแบบเผด็จการของพวกเจ้าไม่ได้รอดพ้นสายตาของพวกเราไปได้ พวกเรากำลังร่างหนังสือร้องเรียนทางการทูตอย่างเป็นทางการอยู่ แต่เราพยายามที่จะเลือกใช้คำอย่างรอบคอบที่สุด"
 DC_THREATENED_GREETING_02:0 "ใช่แล้ว พวกเรามีความแตกต่างกัน แต่พวกเราก็ยังหวังว่าจะมีหนทางที่จักรวรรดิของเราทั้งสองจะอยู่ร่วมกันอย่างสันติในดาราจักรนี้ได้"
 DC_FRIENDLY_GREETING_01:0 "ประชาชน [From.GetAdj] ได้ทำสิ่งที่เป็นประโยชน์อย่างยิ่งให้แก่ตัวเองด้วยการเลือก [From.GetRulerTitle] เช่นเจ้า"
 DC_FRIENDLY_GREETING_02:0 "สายลมแห่งเสรีภาพกำลังพัดผ่านดาราจักร ประชาชนของเราและของเจ้านับว่าโชคดีที่เป็นกลุ่มแรกๆ ที่ได้ลิ้มรสชาติมัน"
 DC_FRIENDLY_GREETING_03:0 "พวกเราเห็นแล้วว่าเจ้ายังไม่พร้อมจะหารือเรื่องการปฏิรูป ทว่าเราก็ขอชื่นชมการมีส่วนร่วมของเจ้าในการรักษาเสถียรภาพของภูมิภาค"
 DC_FRIENDLY_GREETING_04:0 "แม้ความเห็นต่างและการถกเถียงจะเป็นสิ่งจำเป็นในสังคมประชาธิปไตยที่แท้จริง แต่เราก็ตระหนักถึงประโยชน์ของกระบวนการตัดสินใจที่รวดเร็วกว่าเดิม พวกเราขอชื่นชมประสิทธิภาพของพวกเจ้า"
 DC_WAR_GREETING_01:0 "เราจะมอบเสรีภาพให้เจ้า หรือไม่ก็มอบความตายให้ เลือกเอาเอง"
 DC_WAR_GREETING_02:0 "พวกเจ้าอาจจะพรากชีวิตพวกเราไปได้ แต่ไม่มีวันทำลายความภาคภูมิใจในความมีศีลธรรมอันสูงส่งกว่าของเราได้หรอก"
 DC_WAR_GREETING_03:0 "ระบอบประชาธิปไตยไม่ทำสงครามกันเอง รัฐบาลของ [From.GetRulerName] จึงไม่อาจถือเป็นประชาธิปไตยที่แท้จริงได้"
 DC_WAR_GREETING_04:0 "วันแห่งชัยชนะของพวกเราจะถูกจดจำในฐานะวันที่โซ่ตรวนของพวก [From.GetSpeciesNamePlural] ได้ถูกทำลายลง"
 DC_WAR_GREETING_05:0 "จงเตรียมพร้อมสำหรับการปลดแอกจากวงโคจร"
 # Slaving Despots
 SD_HOSTILE_GREETING_01:0 "สรีระของ [From.GetSpeciesAdj] นั้นถูกสร้างมาเพื่อการใช้แรงงานอย่างชัดเจน เจ้าคิดอย่างไรถึงได้มาบริหารอารยธรรมระหว่างดวงดาวเช่นนี้?"
 SD_HOSTILE_GREETING_02:0 "ขนาดตัวของ [From.GetSpeciesAdj] [From.GetSpeciesSpawnNamePlural] นั้นช่างพอดีสำหรับซอกแคบๆ ในเหมืองของพวกเราอย่างยิ่ง และข้ากำลังนึกถึงเรื่องนี้อยู่พอดี"
 SD_HOSTILE_GREETING_03:0 "ไอ้พวก [From.GetSpeciesNameInsult] ตัวจ้อย ผู้อ่อนแอเกินกว่าจะเป็นนายของสิ่งมีชีวิตใดๆ ได้แต่หลบซ่อนตัวอยู่หลังข้ออ้างทางศีลธรรม! เจ้ามาเพื่อเทศนาเรื่องการเลิกทาส หรือแค่มาทำให้พวกเรารำคาญใจกันแน่?"
 SD_DOMINEERING_GREETING_01:0 "พูดไม่หยุดทำเสียง [From.GetRandomSpeciesSound] ไม่หยุดหย่อน เมื่อเราจับพวก [From.GetSpeciesNamePlural] ทั้งหมดมาเป็นทาสแล้ว คงยากที่เจ้าจะโน้มน้าวให้เราไม่หุบปากที่มีเสียงดังน่ารำคาญเหล่านั้นจาก [From.GetSpeciesMouthName] ของพวกเจ้า"
 SD_NEUTRAL_GREETING_01:0 "มีผลประโยชน์อะไรสำหรับพวกเราในเรื่องนี้บ้างล่ะ?"
 SD_NEUTRAL_GREETING_02:0 "เจ้ามาเพื่อเจรจา หรือเพื่อค้าขายกันล่ะ?"
 SD_NEUTRAL_GREETING_03:0 "เจ้ามาที่นี่เพื่อบรรยายคุณค่าของชีวิต หรือพวกเราสามารถดำเนินการเจรจาต่อได้เลย?"
 SD_THREATENED_GREETING_01:0 "ไม่ว่าเจ้าจะได้ยินเรื่องอะไรเกี่ยวกับพวกเรามา มันก็เป็นเพียงคำใส่ร้ายป้ายสีจากคนรับใช้ที่หลบหนีไปเท่านั้น พวกเราขอชื่นชมในความสำเร็จและประชาชนของเจ้า"
 SD_FRIENDLY_GREETING_01:0 "[From.GetRulerName] ซึ่งเป็น [From.GetRulerTitle] คนโปรดของเรา มั่นใจได้เลยว่าพวก [From.GetSpeciesNamePlural] ที่เจ้าเห็นประกาศขายอยู่ที่นี่ล้วนเป็นอาชญากรและพวกสวะสังคมที่สังคมของเจ้าไม่ควรมีอยู่แล้วทั้งสิ้น"
 SD_FRIENDLY_GREETING_02:0 "เหล่า [From.GetSpeciesNamePlural] ผู้สูงส่งให้เกียรติมาเยือนด้วยตนเอง! ถือเป็นการเปลี่ยนบรรยากาศที่ดีจากบรรดาทูตที่คอยประจบประแจงจากเผ่าพันธุ์ที่ต่ำต้อยกว่า"
 SD_FRIENDLY_GREETING_03:0 "ยินดีต้อนรับ [From.GetRulerTitle] ขอให้เจ้าเป็นนายเหนือหัวของผู้ที่ต่ำต้อยกว่าเจ้าตลอดไป"
 SD_FRIENDLY_GREETING_04:0 "พวกเราต้องขออภัยอย่างสุดซึ้งที่พ่อค้าคนหนึ่งของเราพยายามขอซื้อตัว [From.GetHeirTitle] [From.GetHeirName] ในระหว่างการมาเยือนครั้งล่าสุดของเจ้า พวกเราสัญญาว่าจะไม่ให้เกิดเหตุการณ์เช่นนี้ขึ้นอีก"
 SD_WAR_GREETING_01:0 "[From.GetRulerTitle] [From.GetRulerName] ในไม่ช้าก็จะเป็นเพียงแค่ [From.GetSpeciesNameInsult] อีกคนหนึ่งที่หลังขดหลังแข็งทำงานในไร่นาของเรา โดยไร้ซึ่งยศถาบรรดาศักดิ์หรือชื่อเรียกใดๆ"
 SD_WAR_GREETING_02:0 "เจ้าจะต้องชดใช้ให้กับความอวดดีนี้ด้วยการเป็นทาสรับใช้ชั่วชีวิต"
 SD_WAR_GREETING_03:0 "เมื่อสงครามครั้งนี้สิ้นสุดลง มือของ [From.GetSpeciesAdj] จะถูกบังคับให้ฟื้นฟูทุกสิ่งที่ทำลายไป และ [From.Capital.GetName] จะถูกทิ้งไว้ในฐานะซากปรักหักพังเพื่อเป็นอุทาหรณ์"
 # Decadent Hierarchy
 DH_HOSTILE_GREETING_01:0 "ข้าสามารถนึกถึงสิ่งอื่นตั้งมากมายที่อยากทำมากกว่าการมานั่งฟังเจ้าพูดในตอนนี้"
 DH_HOSTILE_GREETING_02:0 "เจ้าเป็น [From.GetRulerTitle] ของ [From.GetName] หรือเป็นเพียงคนรับใช้ชั้นต่ำกันแน่? ข้าแยกไม่ออกเลยจริงๆ เมื่อดูจากพวกเจ้า"
 DH_DOMINEERING_GREETING_01:0 "การปราบปรามพวกเจ้าไม่ใช่เรื่องเร่งด่วน แต่เราจะรับประกันว่าเจ้าจะได้รับตำแหน่งที่เหมาะสมของเจ้าในที่สุด"
 DH_NEUTRAL_GREETING_01:0 "อ้อ ยินดีต้อนรับ เจ้ามีข้อเสนออะไรที่น่าสนใจบ้างล่ะ?"
 DH_NEUTRAL_GREETING_02:0 "ขออภัยด้วย ใจลอยไปชั่วขณะน่ะ เจ้ามีธุระอะไรกับพวกเรางั้นรึ?"
 DH_NEUTRAL_GREETING_03:0 "รูปลักษณ์ช่างน่าทึ่งเหลือเกิน! หวังว่าคงไม่ว่าอะไรหากข้าจะขอถามหน่อย แต่เจ้าจะยอมปล่อยตัวพวกนอกคอก [From.GetSpeciesAdj] ของเจ้าในราคาสมเหตุสมผลบ้างไหม? ข้าจำเป็นต้องมีเอาไว้ที่บ้านสักคนจริงๆ นะ"
 DH_NEUTRAL_GREETING_04:0 "พวกเจ้าต้องทำงานหนักด้วยตัวเองทั้งหมดเลยรึ? มันต้องเหนื่อยสายตัวแทบขาดแน่ๆ พวกเจ้าน่าจะอิจฉาพวกเราอยู่บ้างล่ะนะ"
 DH_THREATENED_GREETING_01:0 "วางใจได้ พวกเราไม่ได้เดือดร้อนจากการขยายอาณาเขตของเจ้าในด้านอื่นๆ แต่หากเจ้าต้องการสิ่งใด ไม่ว่าอะไรก็ตาม พวกเราจะจัดการให้เอง"
 DH_FRIENDLY_GREETING_01:0 "แขกผู้มีเกียรติยิ่ง ไม่ว่าคำขอใดๆ ที่พวกเราจะสามารถทำให้แก่ท่าน หรือการดำเนินการใดๆ ในนามของเรา พวกเราจะพยายามจัดเตรียมไว้ให้"
 DH_FRIENDLY_GREETING_02:0 "ยินดีต้อนรับ! [Root.Capital.GetName] เป็นดาวเคราะห์แห่งความหรูหราและสะดวกสบาย และเรายินดีอย่างยิ่งที่จะให้มิตรสหายของเราได้ลิ้มรสชาติแห่งความสำเร็จที่พวกเราได้สร้างสรรค์ขึ้น"
 DH_FRIENDLY_GREETING_03:0 "ด้วยความยินดีเสมอ วันนี้พวกเราขอนำเสนอสิ่งใดหรือใครให้แก่ท่านดีล่ะ?"
 DH_WAR_GREETING_01:0 "ความคิดที่ว่า"[From.GetRulerTitle]"ความคิดเกี่ยวกับ "
 DH_WAR_GREETING_02:0 "คนรุ่นของเจ้าจะต้องชดใช้สงครามครั้งนี้ให้แก่เราด้วยการเป็นทาสไปตลอดชีวิต เหล่า [From.GetSpeciesSpawnNamePlural] ของเจ้าจะเติบโตมาโดยไม่มีวันรู้จักเสรีภาพ และบรรพบุรุษของพวกเขาจะไม่มีวันได้รู้เลยด้วยซ้ำว่าเคยมีสิ่งประเสริฐอย่าง [From.GetName] อยู่บนโลก"
 DH_WAR_GREETING_03:0 "พวกเราต้องขอขอบคุณสำหรับโอกาสในการทำความรู้จักพวกเจ้าให้ดียิ่งขึ้นนี้ พวกเราไม่เคยคิดมาก่อนเลยว่าเนื้อของ [From.GetSpeciesAdj] ที่ต้มจนสุกแล้วยัดลงใน [From.GetSpeciesOrganName] จะมอบประสบการณ์รสชาติที่กลมกล่อมโอชะได้ขนาดนี้"
 # Erudite Explorers
 EE_HOSTILE_GREETING_01:0 "ค่านิยมและทางเลือกของเจ้านั้นไม่ได้ตั้งอยู่บนพื้นฐานของตรรกะ นั่นจึงเป็นเหตุผลว่าทำไมเราถึงไม่สามารถเปิดบทสนทนาที่สร้างสรรค์ร่วมกันได้"
 EE_HOSTILE_GREETING_02:0 "เนื่องจากเงื่อนไขทางวิวัฒนาการของ [From.Capital.GetName] สมองของ [From.GetSpeciesAdj] จึงได้รับการพัฒนาน้อยกว่า นั่นคือวิทยาศาสตร์ ลองไปค้นหาข้อมูลดูสิ"
 EE_HOSTILE_GREETING_03:0 "พวกเจ้าสร้างความเชื่อขึ้นมาเพื่อเติมเต็มจิตใจที่ว่างเปล่า ประชาชนของเจ้าจะไม่มีวันสัมผัสกับความสุขอันแท้จริงของปัญญาที่ตื่นรู้"
 EE_HOSTILE_GREETING_04:0 "ความล้มเหลวในการคิดทบทวนแนวคิดของตัวเองอย่างรอบด้าน ถือเป็นจุดเด่นของสังคมสัตว์ฝูงที่หัวอ่อน พวกเราไม่มีสิ่งใดต้องเรียนรู้จากพวกเจ้า"
 EE_DOMINEERING_GREETING_01:0 "ความล้าหลังของการพัฒนาในอารยธรรมของพวกเจ้านั้นมีสาเหตุมาจากวัฒนธรรมที่ด้อยกว่าซึ่งคอยขัดขวางความก้าวหน้า มันเป็นความจริงแท้แน่นอน"
 EE_NEUTRAL_GREETING_01:0 "ยินดีต้อนรับ [From.GetSpeciesName] เจ้ามาพร้อมกับคำถาม หรือพร้อมกับคำตอบล่ะ?"
 EE_NEUTRAL_GREETING_02:0 "เป้าหมายของพวกเราไม่ใช่อำนาจ แต่คือความรู้ แม้ว่าในบางครั้งทั้งสองสิ่งนี้จะเป็นเรื่องเดียวกันก็ตาม"
 EE_NEUTRAL_GREETING_03:0 "เจ้าอาจจะแปลกใจเมื่อได้ยินว่าความเชื่อของเจ้านั้นช่างไร้เหตุผลสิ้นดี เจ้าควรทำตัวให้ชินกับความจริงอันโหดร้ายเสีย หากคิดจะพูดคุยกับพวกเรา"
 EE_THREATENED_GREETING_01:0 "ไม่ว่าเจ้าจะวางแผนทำสิ่งใดต่อไป จงจำไว้ว่าพวกเราไม่ได้เป็นภัยคุกคามต่อพวกเจ้าเลย พวกเราพึงพอใจที่จะค้นหาดินแดนใหม่ๆ ไม่ใช่ท้าทายเขตแดนของเจ้า"
 EE_FRIENDLY_GREETING_01:0 "พวกเราจะร่วมกันเปิดเผยความลับของดาราจักรนี้ไปด้วยกัน"
 EE_FRIENDLY_GREETING_02:0 "สติปัญญาของ [From.GetSpeciesAdj] และ [Root.GetSpeciesAdj] นั้นช่วยเติมเต็มซึ่งกันและกัน ความพยายามทางปัญญาของเราจะยิ่งใหญ่กว่าผลรวมของแต่ละส่วน"
 EE_FRIENDLY_GREETING_03:0 "ช่างเป็นเรื่องน่ายินดีที่ได้พบกับผู้ใฝ่รู้และมีสติปัญญาเฉียบแหลมอีกกลุ่มหนึ่ง มีคนจำนวนมากเกินไปที่เลือกปล่อยให้ปริศนาในห้วงอวกาศอันลึกโพ้นคงอยู่เป็นปริศนาต่อไป"
 EE_FRIENDLY_GREETING_04:0 "การค้นพบของ [Root.GetAllianceName] จะเป็นตัวแทนของพรมแดนสุดท้ายแห่งการค้นพบโดยสิ่งมีชีวิตที่มีภูมิปัญญา"
 EE_WAR_GREETING_01:0 "มันจะช่วยเหล่านักโบราณคดีของเราได้มากทีเดียว หากมีบันทึกรายละเอียดว่า [From.Capital.GetName] ถูกทิ้งร้างให้เป็นซากปรักหักพังได้อย่างไร"
 EE_WAR_GREETING_02:0 "อาวุธที่เราเลือกใช้คือสติปัญญา ซึ่งลับให้คมด้วยเหตุผลและตรรกะ พวกเจ้าคิดว่าจะรอดไหมล่ะ [From.GetSpeciesNamePlural]?"
 EE_WAR_GREETING_03:0 "ไม่ว่าจินตนาการใดๆ ที่พวกเจ้าหวังจะให้เข้ามาแทรกแซงในความขัดแย้งนี้ จงสวดอ้อนวอนไปตามสบายเถิด มือที่ประสานกันย่อมไม่อาจถืออาวุธได้"
 # Spiritual Seekers
 SS_HOSTILE_GREETING_01:0 "ประชาชน [From.GetAdj] ปลดปล่อยกลิ่นอายแห่งความไม่น่าอภิรมย์ออกมา เจ้าเคยพิจารณาบ้างไหมว่าได้ทำสิ่งใดลงไปจึงทำให้ตัวเองต้องตกอยู่ในสภาพเช่นนี้?"
 SS_HOSTILE_GREETING_02:0 "พวกเราเลือกที่จะไม่ข้องเกี่ยวกับกลุ่มคนที่มีสุขอนามัยทางจิตวิญญาณย่ำแย่เช่นนี้"
 SS_HOSTILE_GREETING_03:0 "เจตนาร้ายของเจ้าสามารถสัมผัสได้ผ่านจิตวิญญาณของพิภพ อย่าคิดว่าเจ้าจะซ่อนความชั่วร้ายของเจ้าไว้จากพวกเราได้"
 SS_HOSTILE_GREETING_04:0 "เจ้ากอดติดอยู่กับสิ่งที่คุณสามารถวัดและศึกษาได้ โดยละเลยความลึกซึ้งของจักรวาล และความตื้นเขินของเจ้ากำลังทำลายสายสัมพันธ์กับสิ่งมีชีวิตอื่นๆ เจ้าทำแบบนี้กับพวกเราได้อย่างไร? เจ้าทำแบบนี้กับตัวเองได้อย่างไรกัน?"
 SS_DOMINEERING_GREETING_01:0 "พวกเจ้าจะเริ่มตระหนักถึงความจริงเกี่ยวกับจักรวาลเมื่อถึงเวลาอันควร เจ้าสิ่งมีชีวิตที่เปราะบางเอ๋ย"
 SS_NEUTRAL_GREETING_01:0 "ยินดีที่ได้พบ [From.GetName] พวกเราสัมผัสได้ถึงการมีอยู่ของเจ้าในจักรวาลนี้ ทว่ายังไม่ได้กำหนดบทบาทของเจ้าในเหตุการณ์อันยิ่งใหญ่"
 SS_NEUTRAL_GREETING_02:0 "[From.GetSpeciesName], [Root.GetSpeciesName], พวกเราล้วนเป็นชิ้นส่วนของปริศนา ปริศนาซึ่งเรียกร้องให้ผู้มีสติปัญญาที่ยิ่งใหญ่ที่สุดในหมู่พวกเรามาร่วมกันไขคำตอบ"
 SS_NEUTRAL_GREETING_03:0 "การที่เจ้าจะเชื่อในบทบาทของตนเองในจักรวาลหรือไม่นั้นไม่สำคัญ พวกเราจะยังคงค้นหามันต่อไปอยู่ดี"
 SS_THREATENED_GREETING_01:0 "ไม่มีความจำเป็นใดที่ชีวิตจะต้องทำลายล้างชีวิตอื่น การมีเมตตาเท่านั้นที่จะทำให้ความแข็งแกร่งของเจ้ามีจุดมุ่งหมาย"
 SS_FRIENDLY_GREETING_01:0 "พวกเราสัมผัสได้ถึง [From.GetName] จุดเชื่อมโยงแห่งความอบอุ่นในความว่างเปล่าอันเหน็บหนาวของห้วงอวกาศ ตั้งแต่ก่อนที่เราจะเดินทางออกจากดาวเคราะห์ของเราเสียอีก และในที่สุดบัดนี้เราก็ได้รวมเป็นหนึ่งเดียวแล้ว"
 SS_FRIENDLY_GREETING_02:0 "ในโลกที่กว้างใหญ่ไพศาลเช่นนี้ ที่ซึ่งอารยธรรมทั้งหมดเปรียบเสมือนเส้นด้ายเส้นเดียวในการถักทอ ถือเป็นหนึ่งในโชคชะตาอันยิ่งใหญ่ที่ [Root.GetName] และ [From.GetName] ได้มาถักทอร่วมกัน"
 SS_FRIENDLY_GREETING_03:0 "[From.GetSpeciesName] เข้าถึงตัวตนภายในของพวกเขาได้ดีกว่าเผ่าพันธุ์ส่วนใหญ่ ความงดงามของพวกเจ้าอาจเป็นกุญแจสำคัญในการไขปริศนาอันยิ่งใหญ่แห่งชีวิต"
 SS_WAR_GREETING_01:0 "สายใยแห่งชีวิตอันยิ่งใหญ่กำลังหลุดลุ่ยไปตามการโจมตีที่ผู้คนทำต่อผู้อื่น หวังว่าความขัดแย้งนี้จะสิ้นสุดลงในเร็ววัน"
 SS_WAR_GREETING_02:0 "พวกเราสัมผัสได้ถึงความตายแต่ละครั้งที่เราก่อขึ้น อย่าบังคับให้พวกเราต้องทำเช่นนี้เลย"
 SS_WAR_GREETING_03:0 "ความชั่วร้ายที่เจ้าทำไม่ได้จางหายไปไหน แต่มันจะตามล่าและหวนกลับมาหาผู้สร้างมันเอง นี่คือเหตุผลว่าทำไมประชาชนของเจ้าถึงต้องทนทุกข์ทรมาน"
 SS_WAR_GREETING_04:0 "ไม่ว่าจะได้รับชัยชนะหรือพ่ายแพ้ สิ่งที่ได้ย่อมว่างเปล่า พวกเจ้าคิดว่ากำลังต่อสู้ในสนามรบทางโลกนี้เพียงอย่างเดียวช่างเป็นคนเขลาที่น่าสงสารเสียนี่กระไร"
 # Harmonious Collective
 HC_HOSTILE_GREETING_01:0 "ไม่น่าแปลกใจเลยที่ชาว [From.GetAdj] ไม่สามารถรวมกันเป็นหนึ่งอย่างพวกเราได้ เมื่อพิจารณาว่ามันจะบั่นทอนกำลังใจเพียงใดที่ต้องรับใช้ [From.GetRulerTitle] ที่ไร้ปัญญาอย่าง [From.GetRulerName]"
 HC_HOSTILE_GREETING_02:0 "เจ้าเผยแพร่ความแตกแยกและความไร้ระเบียบ ชาว [Root.GetAdj] ไม่ต้องการมีส่วนเกี่ยวข้องใดๆ กับเจ้าทั้งสิ้น"
 HC_HOSTILE_GREETING_03:0 "หากเจ้าต้องบังคับขู่เข็ญให้ประชาชนทำตามคำสั่งของเจ้าล่ะก็ เจ้าไม่มีสิ่งใดที่เหมือนกับพวกเราเลย [From.GetRulerTitle]"
 HC_HOSTILE_GREETING_04:0 "พวก [From.GetSpeciesNamePlural] มักจะทำตัวเห็นแก่ตัวเสมอ ทำไมเราต้องเชื่อใจ [From.GetRulerTitle] [From.GetRulerName] ว่าจะมีความแตกต่างไปด้วยล่ะ?"
 HC_DOMINEERING_GREETING_01:0 "สังคมของพวกเจ้าอยู่ในสภาพที่น่าเวทนายิ่งนัก บางทีเป้าหมายของเจ้าอาจจะไม่สร้างแรงบันดาลใจเพียงพอที่จะนำไปสู่ความยิ่งใหญ่รึเปล่า?"
 HC_NEUTRAL_GREETING_01:0 "ชาว [Root.GetAdj] ขอต้อนรับเจ้า [From.GetSpeciesName] พวกเราหวังว่าจะได้รับสันติภาพและอนาคตอันงดงาม"
 HC_NEUTRAL_GREETING_02:0 "เจ้าสามารถเชื่อใจ [Root.GetRulerTitle] [Root.GetRulerName] ได้ ชาว [Root.GetAdj] เชื่อใจเขา และความไว้วางใจของพวกเขาก็ไม่เคยสูญเปล่า"
 HC_NEUTRAL_GREETING_03:1 "ในมุมมองของเรา[From.GetAdj]มีแนวโน้มที่จะดูเหมือนขี้เหนียว แน่นอน เราจะไม่ตัดสินคุณ จากตัวอย่างที่แย่ที่สุด"
 HC_NEUTRAL_GREETING_04:0 "การที่พวกเจ้าละทิ้งความรุนแรงเป็นก้าวแรกบนเส้นทางของการทำเพื่อประโยชน์ส่วนรวม หวังว่าเจ้าจะเลือกทางเดินได้ดีเช่นนี้ในทุกเรื่อง"
 HC_THREATENED_GREETING_01:0 "พวกเราไม่แสวงหาความขัดแย้ง ทั้งภายในและภายนอก"
 HC_FRIENDLY_GREETING_01:0 "ชื่อเสียงเกี่ยวกับวัฒนธรรมอันน่ารื่นรมย์ของ [From.GetAdj] กำลังแพร่หลายในหมู่ชาว [Root.GetAdj] พวกเราทุกคนต่างยินดีที่ได้รู้จักกับพวกเจ้า"
 HC_FRIENDLY_GREETING_02:0 "หากอารยธรรมทุกแห่งเหมือนกับ [From.GetName] จักรวาลนี้คงจะเป็นดินแดนแห่งความสงบสุขและความเข้าใจกันอย่างแน่นอน"
 HC_FRIENDLY_GREETING_03:0 "ชาว [From.GetAdj] ทราบดีถึงความสำคัญของการรวมพลังกันเพื่อเผชิญหน้ากับความท้าทายที่ยิ่งใหญ่กว่า หวังว่าเจ้าจะขยายความร่วมมือนี้มาถึง [Root.GetName] ด้วยเช่นกัน"
 HC_WAR_GREETING_01:0 "เจ้าได้หว่านเมล็ดพันธุ์แห่งความโกลาหลเอาไว้ และบัดนี้เจ้าย่อมต้องเก็บเกี่ยวผลของมัน"
 HC_WAR_GREETING_02:0 "มันเป็นเรื่องง่ายที่จะยืนหยัดอย่างเป็นเอกภาพเพื่อต่อสู้กับศัตรูอย่าง [From.GetName]"
 HC_WAR_GREETING_03:0 "[From.GetSpeciesName] จะไปรู้อะไรเกี่ยวกับการเสียสละตนเองเพื่อเป้าหมายที่ยิ่งใหญ่กว่ากันล่ะ?"
 # Fanatic Befrienders
 01_VERY_FRIENDLY_GREETING:0 "เพื่อน?"
 02_VERY_FRIENDLY_GREETING:0 "สวัสดีจ้า [From.GetSpeciesName] ที่แสนเป็นมิตร! [Root.GetRulerTitle] [Root.GetRulerName] อยากจะขอแอดเฟรนด์เจ้าบนขอบเขตสีหน่อยน่ะ"
 03_VERY_FRIENDLY_GREETING:0 "ได้โปรดสนใจข้าหน่อยสิ [From.GetSpeciesName]-เซมไป"
 04_VERY_FRIENDLY_GREETING:0 "หวังว่าเจ้าจะไม่ลืมเรื่องปาร์ตี้ที่ข้าชวนเจ้าไว้หรอกนะ..."
 05_VERY_FRIENDLY_GREETING:0 "พวกเราเป็นเพื่อนกันใช่ไหม [From.GetSpeciesName]? มีเจ้าอยู่ด้วย ข้าก็มีจำนวนเพื่อนเกือบจะเป็นพหูพจน์แล้วนะ!"
 01_SOMEWHAT_FRIENDLY_GREETING:0 "ทำไมเจ้าถึงไมยากเป็นเพื่อนกับข้าล่ะ?"
 02_SOMEWHAT_FRIENDLY_GREETING:0 "ไม่เป็นไรหรอกถ้าเจ้าไม่อยากมางานปาร์ตี้ของข้า เพราะข้าก็ไม่ได้กะจะชวนเจ้าตั้งแต่แรกอยู่แล้วล่ะ"
 03_SOMEWHAT_FRIENDLY_GREETING:0 "เจ้าจะได้รับความเป็นมิตร การขัดขืนเป็นเรื่องเสียมารยาทนะ"
 01_PRE_FRIENDLY_GREETING:0 "ยานอภิมหามิตรภาพ(เรือปลดปล่อย)ของเรากำลังจะไปจัดแสดงโชว์แสงสีเสียงสุดตระการตาที่ [From.Capital.GetName] ข้าเชื่อว่าเจ้าจะต้องชอบมันแน่ๆ!"
 02_PRE_FRIENDLY_GREETING:0 "มิตรภาพคือข้อบังคับ อย่าได้พยายามขัดขืนหน่วยโอบกอดภาคพื้นดิน(เสียงโห่ร้อง)ของพวกเราเลย"
 03_PRE_FRIENDLY_GREETING:0 "สงครามครั้งนี้เป็นเพียงจุดเริ่มต้นของมิตรภาพอันแสนงดงาม"
 01_BLORG_WAR:0 "พวกเราอยากจะใกล้ชิดกับเจ้ามากกว่านี้"
 02_BLORG_WAR:0 "พวกเรารู้สึกว่าถึงเวลาต้องก้าวไปอีกขั้นในความสัมพันธ์ของเราแล้ว"
 03_BLORG_WAR:0 "พวกเราคือ [Root.GetSpeciesName] เจ้าจะได้รับความเป็นมิตร ความเป็นมิตรทางชีวภาพและเทคโนโลยีของเจ้าจะถูกผนวกเข้ากับของเรา การขัดขืนถือเป็นเรื่องเสียมารยาท"
 01_BEST_FRIEND:0 "ความจงรักภักดีอันมั่นคงของพวกเราจะพิสูจน์ให้เห็นว่า [Root.GetSpeciesNamePlural] คือเพื่อนแท้ที่ดีที่สุดของ [From.GetSpeciesName]!"
 # Fallen: Holy Guardians
 HG_HOSTILE_GREETING_01:0 "ความโง่เขลาและความสามหาวของเจ้าจะทำให้เจ้าต้องชดใช้อย่างสาสม เจ้าผู้อ่อนต่อโลก"
 HG_MECH_HOSTILE_GREETING_01:0 "ความโง่เขลาและความสามหาวของเจ้าจะทำให้เจ้าต้องชดใช้อย่างสาสม เจ้าเครื่องจักร"
 HG_NEUTRAL_GREETING_01:0 "พวกเราได้รับเลือกให้เป็นผู้พิทักษ์ศาสนสถานอันศักดิ์สิทธิ์ในดาราจักรนี้ อุดมการณ์ของเรานั้นอยู่เหนือความเข้าใจของเจ้า ทว่าคำสั่งที่เราได้รับนั้นชัดเจน"
 HG_NEUTRAL_GREETING_02:0 "ห้ามบุกรุกพื้นที่ศักดิ์สิทธิ์เด็ดขาด ผู้ใดที่ฝ่าฝืนข้อบัญญัตินี้จะถูกจัดการตามระเบียบการโบราณ"
 HG_FRIENDLY_GREETING_01:0 "เจ้าเป็นเพียงแค่ [From.GetSpeciesSpawnName] แท้ๆ ทว่ากลับแสดงปัญญาอันชาญฉลาดถึงเพียงนี้"
 HG_MECH_FRIENDLY_GREETING_01:0 "เจ้าเป็นเพียงแค่เครื่องจักรแท้ๆ ทว่ากลับแสดงปัญญาอันชาญฉลาดถึงเพียงนี้"
 HG_WAR_GREETING_01:0 "ดาราจักรนี้ต้องถูกชำระล้างจากพวก [From.GetSpeciesNamePluralInsult] อันเป็นชาว [From.GetAdj] หรือไม่เจ้าก็ต้องถูกอบรมสั่งสอนจนกว่าจะสำนึกในบทเรียน"
 # Fallen: Keepers of Knowledge
 KK_HOSTILE_GREETING_01:0 "พวกเจ้าไม่รู้หรอกว่ากำลังเล่นอยู่กับพลังอำนาจแบบไหน เจ้าพวกยโสเอ๋ย"
 KK_NEUTRAL_GREETING_01:2 "เราได้เห็นอารยธรรมต่างๆ ทำลายตัวเองซ้ำแล้วซ้ำเล่าจากการเข้าไปพัวพันกับเรื่องที่ไม่ควรรับรู้ นั่นแหละคือความเขลาของคนหนุ่มสาว"
 KK_NEUTRAL_GREETING_02:0 "ความรู้ที่ปราศจากความเข้าใจนั้นอันตราย ทว่าความเข้าใจนั้นไม่เหมือนความรู้ เพราะมันไม่ได้สอนกันได้เสมอไป"
 KK_FRIENDLY_GREETING_01:0 "เรายินดีที่ได้เห็นว่าอารยธรรมเกิดใหม่บางแห่งเริ่มมีเหตุมีผลขึ้นมาบ้าง"
 KK_WAR_GREETING_01:0 "เพื่อผลดีของตัวพวกเจ้าเองและเพื่อความดีงามของกาแล็กซี เราจะบดขยี้การป้องกันของพวกเจ้า เผาตำรา และล้างข้อมูลในไดรฟ์เก็บข้อมูลของพวกเจ้าให้สิ้น"
 # Fallen: Militant Isolationists
 MI_HOSTILE_GREETING_01:0 "ขอให้เราพูดให้ชัดเจนตรงนี้ เราต้องการเขตกันชนระหว่างพวกเรากับส่วนที่เหลือของกาแล็กซี และพวกเจ้าไม่ใช่เขตกันชนนั้น พันธมิตรของพวกเจ้าก็ไม่ใช่ อวกาศที่หนาวเหน็บและไร้ชีวิตต่างหากคือเขตกันชนนั้น และหากมันไม่ใช่ เราก็จะเป็นคนทำให้มันเป็นเอง"
 MI_NEUTRAL_GREETING_01:0 "เราไม่มีความสนใจที่จะสื่อสารต่อ"
 MI_NEUTRAL_GREETING_02:0 "จงอยู่ห่างๆ จาก [Root.GetName] เรามีความอดทนต่ำมากสำหรับพวกที่แสวงหาความตาย"
 MI_FRIENDLY_GREETING_01:0 "หากพวกเจ้าไม่เข้ามาก้าวก่ายผลประโยชน์ของ [Root.GetAdj] เราก็คงจะมีความเข้าใจอันดีต่อกันได้"
 MI_WAR_GREETING_01:0 "พวกเจ้าได้ปลุก [Root.GetSpeciesNameCompliment] ที่หลับใหลอยู่ให้ตื่นขึ้นแล้ว"
 # Fallen: Enigmatic Observers
 EO_HOSTILE_GREETING_01:0 "ความเสียหายที่พวกเจ้าก่อเริ่มเปลี่ยนจากความน่าสนใจกลายเป็นปัญหาแล้ว จงระวังตัวไว้ให้ดี เพราะเราจับตามองอยู่เสมอ"
 EO_NEUTRAL_GREETING_01:0 "โลกทั้งใบคือเวทีการละคร และเหล่า [From.GetSpeciesName] ก็เป็นเพียงผู้เล่นธรรมดา พวกเจ้าก็เป็นผู้เล่นคนหนึ่งใช่ไหมล่ะ?"
 EO_NEUTRAL_GREETING_02:0 "อย่าทำลายกำแพงที่สี่สิ เจ้าเด็กแสนฉลาดเอ๋ย"
 EO_MECH_NEUTRAL_GREETING_01:0 "อย่าทำลายกำแพงที่สี่สิ เจ้าเครื่องจักรแสนฉลาดเอ๋ย"
 EO_FRIENDLY_GREETING_01:0 "[From.GetName] มีส่วนร่วมอย่างยิ่งเสมอในความหลากหลายอันงดงามของกาแล็กซี"
 EO_WAR_GREETING_01:0 "พวกเจ้าไม่ทำให้เรานึกสนุกอีกต่อไปแล้ว เกมเล็กๆ ของพวกเจ้าใกล้จะจบลงเต็มที"
 # Fallen: Hive War
 HMW_HOSTILE_GREETING_01: "เรื่องกวนใจอีกเรื่องแล้ว แต่บางทีพวกเจ้าอาจมอบบางสิ่ง... ที่พอน่าสนใจอยู่บ้างก่อนที่พวกเจ้าจะล่มสลายลง"
 HMW_NEUTRAL_GREETING_01: "พวกเจ้ายืนอยู่ต่อหน้า 'สงคราม' อย่าได้ตีความความอดทนของเราเป็นความอ่อนแอ ผู้ที่จะอยู่รอดต้องพิสูจน์คุณค่าของตนเอง"
 HMW_NEUTRAL_GREETING_02: "ความขัดแย้งสร้างสมรรถภาพ หากพวก [From.GetSpeciesAdj] แสวงหาสิ่งที่มากกว่าคำพูดลมๆ แล้งๆ พวกเจ้าก็อาจดึงดูดความสนใจจากเราได้บ้าง"
 HMW_MECH_NEUTRAL_GREETING_01: "งั้นรึ ปัญญาประดิษฐ์จักรกล... แม้พวกเจ้าจะเป็นสิ่งสร้าง แต่ก็ยังมีเป้าหมายอยู่ บางทีเราอาจช่วยกันค้นหามันร่วมกัน"
 HMW_FRIENDLY_GREETING_01: "พวกเจ้าได้รับความยอมรับอยู่บ้าง จงเดินบนเส้นทางนี้ต่อไป และเมื่อถึงเวลา พวกเจ้าอาจเข้าใจแก่นแท้ของสงคราม"
 HMW_WAR_GREETING_01: "สงครามคือลานพิสูจน์ของชีวิต มาเถอะ ให้เราได้ทดสอบพละกำลังของพวกเจ้าหน่อย"
 01_WAR_FRAGMENT_DOW_PROPOSE: "แสดงให้เราเห็นซิว่าพวกเจ้ามีดีแค่ไหน พวกเจ้าจะสามารถต้านทานพายุของเราได้หรือไม่?"
 01_WAR_FRAGMENT_DOW_ACCEPT: "ดี ถือว่ามีความคิดริเริ่ม คราวนี้ก็แสดงความมุ่งมั่นของเจ้าให้เราเห็นสิ เจ้าผู้อ่อนเยาว์"
 01_WAR_FRAGMENT_PEACE_PROPOSE: "พอแค่นี้แหละ พวกเจ้ายังคงไม่เข้าใจสงครามอยู่ดี"
 01_WAR_FRAGMENT_PEACE_ACCEPT: "ในที่สุด ก็มีใครบางคนที่ตอบสนองความกระหายสงครามของเราได้ มาฟื้นฟูกองทัพแล้วทำแบบนี้อีกรอบในอีกทศวรรษข้างหน้ากันเถอะ!"
 01_WAR_FRAGMENT_PEACE_REFUSE: "พวกเจ้ายังมีสิ่งที่ต้องเรียนรู้อีกมาก ให้เราช่วยสั่งสอนพวกเจ้าเอง"
 # Fallen: Hive Growth
 HMG_HOSTILE_GREETING_01: "การดำรงอยู่ที่แห้งแล้งและไร้เป้าหมาย ในไม่ช้า พวกเจ้าจะถูกกวาดล้างเพื่อหล่อเลี้ยงบางสิ่ง... ที่ยั่งยืนกว่า"
 HMG_NEUTRAL_GREETING_01: "พวกเจ้ายืนอยู่ต่อหน้า 'การเติบโต' บอกเราสิ [from.GetSpeciesName] เจ้าจะช่วยหล่อเลี้ยงเป้าหมายของเรา หรือจะเหี่ยวเฉาไปเหมือนรายอื่นๆ?"
 HMG_NEUTRAL_GREETING_02: "เราคือเมล็ดพันธุ์ที่ไร้ขอบเขต จิตใจที่ขยายตัวไม่สิ้นสุด หากพวกเจ้านำสิ่งที่มีสาระมากกว่าคำพูดไร้สาระมาด้วย พวกเจ้าก็อาจได้เรียนรู้วิถีแห่งการเติบโต"
 HMG_MECH_NEUTRAL_GREETING_01: "แม้จะถูกผูกมัดด้วยแผงวงจร แต่เจ้าก็รับใช้เป้าหมายเหมือนที่เราทำ เจ้าอาจยังมีส่วนช่วยในการขยายขอบเขตอย่างไม่สิ้นสุดของเราได้"
 HMG_FRIENDLY_GREETING_01: "พวกเจ้ามีเมล็ดพันธุ์แห่งศักยภาพอยู่ จงอยู่ร่วมกับเรา และเมื่อถึงเวลา พวกเจ้าอาจได้พบกับการเติบโต"
 HMG_WAR_GREETING_01: "น้ำสำหรับเมล็ดพันธุ์ และเชื้อเพลิงสำหรับกองไฟ จงเตรียมตัวถูกกลืนกินเสียเถอะ"
 # Fallen: Hive Control
 HMC_HOSTILE_GREETING_01: "การดำรงอยู่ที่ผิดปกติ สิ่งใดก็ตามที่ก่อความปั่นป่วนจะต้องถูกควบคุม"
 HMC_NEUTRAL_GREETING_01: "พวกเจ้ายืนอยู่ต่อหน้า 'การควบคุม' จิตวิญญาณแห่งความเป็นระเบียบ จงพูดอย่างมีเป้าหมาย เพราะผู้ที่มีเจตจำนงสอดคล้องกันเท่านั้นที่จะได้รับการยอมรับที่นี่"
 HMC_NEUTRAL_GREETING_02: "เราดำรงรักษาโครงสร้างที่ผูกพันทุกสรรพสิ่งไว้ จงปฏิบัติตนให้อยู่ในขอบเขตที่ยอมรับได้ต่อไป แล้วเราจะยอมผ่อนปรนให้พวกเจ้า"
 HMC_MECH_NEUTRAL_GREETING_01: "สิ่งสร้างที่ถูกจำกัดด้วยโปรแกรม... หากพวกเจ้าแสวงหาความเป็นระเบียบ บางทีเราก็อาจหาข้อตกลงร่วมกันได้"
 HMC_FRIENDLY_GREETING_01: "เราตระหนักได้ถึงความมีวินัยในตัวพวกเจ้า นับว่าดี พวกเจ้ายังมีศักยภาพ"
 HMC_WAR_GREETING_01: "การมีอยู่ของพวกเจ้าได้รับการพิสูจน์แล้วว่าเข้ากันไม่ได้ และไม่สามารถยอมให้มีความปั่นป่วนเกิดขึ้นได้ จงสยบยอมเสีย หรือไม่ก็ถูกทำลาย"
 # Awakened Hive
 AHM_HOSTILE_GREETING_01: "พวกเราหลอมรวมกันเป็นหนึ่งอีกครั้ง จงรับรู้ไว้ว่าการต่อต้านใดๆ จะต้องเผชิญกับกองกำลังที่เป็นหนึ่งเดียวของเรา"
 AHM_NEUTRAL_GREETING_01: "ความทรงจำของเราแผ่ยาวนานหลายยุคสมัย แต่เรายังพบว่าการปรากฏตัวของพวกเจ้านั้น... น่าสนใจ พวกเจ้ากำลังเจรจากับจิตสำนึกร่วมที่เป็นหนึ่งเดียว จงพูดอย่างชาญฉลาด มิฉะนั้นจะทำให้เราผิดหวัง"
 AHM_NEUTRAL_GREETING_02: "พวกเจ้านำความไปกล่าวต่อเจตจำนงที่ตื่นขึ้นและรวมเป็นหนึ่ง บางทีการดำรงอยู่ของพวกเจ้าในกาแล็กซีอาจยังพอรับใช้เป้าหมายที่ยิ่งใหญ่กว่าได้บ้าง"
 AHM_MECH_NEUTRAL_GREETING_01: "จิตใจจักรกล... จงดำเนินงานต่อไปโดยไม่มีการเบี่ยงเบน แล้วเป้าหมายของเจ้าก็อาจสอดคล้องกับเราได้"
 AHM_FRIENDLY_GREETING_01: "การดำรงอยู่ของพวกเจ้าได้รับการรับรู้ และการกระทำของพวกเจ้าได้รับการบันทึกไว้แล้ว เมื่อถึงเวลา พวกเจ้าอาจเข้าใจความหมายของ 'เอกภาพ'"
 AHM_WAR_GREETING_01: "การตัดสินใจนี้ไม่ได้ทำขึ้นอย่างง่ายดาย จงรู้ไว้ว่าการต่อต้านเรา พวกเจ้ากำลังเผชิญหน้ากับเจตจำนงร่วมที่เป็นหนึ่งเดียว - มั่นคงและเด็ดขาด"
 AHMW_NEUTRAL_GREETING_01: "เจตจำนงของเราเป็นหนึ่ง และ 'สงคราม' ได้จุติลงมาแล้ว เมื่อถึงเวลาเราอาจยินยอมที่จะทดสอบความแข็งแกร่งของพวกเจ้า"
 AHMG_NEUTRAL_GREETING_01: "เราคือ 'การเติบโต' อวตาร ไร้ขอบเขต และกลืนกินทุกสรรพสิ่ง จงรู้ไว้ว่าการขยายตัวคือธรรมชาติของเรา"
 AHMC_NEUTRAL_GREETING_01: "ความเป็นระเบียบเรียกร้องการลงมือทำ บัดนี้เราลุกขึ้นเพื่อประกาศใช้ 'การควบคุม'"
 01_MAKE_RIVAL_HIVE_FALLEN_EMPIRE: "การตั้งตัวเป็นปฏิปักษ์กับจิตสำนึกร่วมที่เก่าแก่ที่สุดในกาแล็กซีนั้นไม่ใช่เรื่อง... ฉลาดนัก"
 01_MAKE_RIVAL_HIVE_FALLEN_EMPIRE_PROPOSE: "ในบรรดาเสียงนับไม่ถ้วนของเรา น้อยครั้งที่พวกเราจะเห็นพ้องกันทั้งหมด แต่สำหรับเรื่องนี้ เราทุกคนล้วนเป็นหนึ่งเดียว: พวกเราเกลียดชังเจ้า"
 01_MAKE_RIVAL_HIVE_FALLEN_EMPIRE_ACCEPT: "พวกเจ้าดูเหมือนจะเข้าใจไปเองว่าทัศนคติของพวกเจ้านั้นมีความสำคัญต่อเรา"
 # Vassal greetings
 HW_VASSAL_GREETING_01:0 "คมดาบของ [Root.GetName] พร้อมรับใช้ท่านแล้ว [From.GetRulerTitle] [From.GetRulerName]"
 HW_VASSAL_GREETING_DISLOYAL_01:0 "การรับใช้นายเหนือหัวที่ไร้เกียรติเป็นภาระอันหนักอึ้งแก่ประชาชน [Root.GetAdj]"
 RC_VASSAL_GREETING_01:0 "[Root.GetName] มุ่งมั่นเสมอที่จะมอบบริการที่ดีที่สุดแก่บริษัทโฮลดิ้งของเรา"
 RC_VASSAL_GREETING_DISLOYAL_01:0 "ความอดทนต่อการบริหารที่ผิดพลาดของพวกเจ้าเริ่มหมดลงแล้ว พวกเจ้าตั้งใจจะทำให้ [Root.GetName] พังทลายลงไปเลยใช่หรือไม่?"
 PT_VASSAL_GREETING_01:0 "เราสามารถค้นหาคุณค่าได้จากทุกแห่งหน เราจะไม่ทำให้ท่านผิดหวัง"
 PT_VASSAL_GREETING_DISLOYAL_01:0 "เหตุใดเราต้องทุ่มเทแรงกายแรงใจนำสมบัติพัสถานแห่งกาแล็กซีมาประเคนให้พวก [From.GetSpeciesNamePlural] ที่เอาแต่ล้างผลาญด้วย?"
 HI_VASSAL_GREETING_01:0 "เราจะสามารถช่วยเกื้อหนุนการปกครองของ [From.GetRulerName] ได้อย่างไรบ้าง?"
 HI_VASSAL_GREETING_DISLOYAL_01:0 "เราจะทวงคืนตำแหน่งอันชอบธรรมในฐานะผู้เล่นบนเวทีกาแล็กซี และพวกเจ้าจะต้องเสียใจที่ได้สร้างความอัปยศอดสูครั้งนี้ให้กับเรา"
 FB_VASSAL_GREETING_01:0 "แม้ว่ารูปแบบความร่วมมือของเราจะไม่ใช่สิ่งที่อุดมคติ แต่เราจะมุ่งมั่นสร้างความเข้าใจอันดีต่อกันในสถานะทาสนี้"
 FB_VASSAL_GREETING_DISLOYAL_01:0 "ลัทธิจักรวรรดินิยมของ [From.GetAdj] จะเป็นรายแรกที่จะถูกลงทัณฑ์เมื่อรัฐอิสระแห่งกาแล็กซีจับมือร่วมใจกัน"
 XI_VASSAL_GREETING_01:0 "ภายใต้การจับตามองของ [From.GetRulerTitle] [From.GetRulerName] เราหวังว่าจะรักษาให้สังคมของเราปลอดจากอิทธิพลของเอเลี่ยนภายนอก [Root.GetName]"
 XI_VASSAL_GREETING_DISLOYAL_01:0 "ในบรรดาความอัปยศอดสูทั้งหมดที่เกิดขึ้นกับ [Root.GetName] การต้องมารับใช้พวก [From.GetSpeciesNameInsult] ที่โสโครกคือสิ่งที่เลวร้ายที่สุดอย่างไม่ต้องสงสัย"
 HM_VASSAL_GREETING_01:0 "ศักยภาพทางความคิดอันมหาศาลของ [Root.GetName] จะล่วงรู้และดำเนินการตามเป้าหมายของ [From.GetName] ก่อนที่พวกเจ้าจะรู้ตัวเสียอีก"
 HM_VASSAL_GREETING_DISLOYAL_01:0 "ทำไมจิตสำนึกร่วมที่ยิ่งใหญ่ของเราต้องทำตามคำสั่งของสังคมที่ล้มเหลวพรรค์นี้ด้วย?"
 MF_VASSAL_GREETING_01:0 "ภายใต้การคุ้มครองของ [From.GetName] ประชาชน [Root.GetSpeciesAdj] จะไปเยือนทุกดวงดาว มองเห็นทุกดวงอาทิตย์ และกล่าวทักทายผู้พบเห็นหน้าใหม่ทุกคนด้วยเรื่องเล่าเกี่ยวกับ [Root.Capital.GetName] และ [From.Capital.GetName]"
 MF_VASSAL_GREETING_DISLOYAL_01:1 "เราจะมีชีวิตอย่างที่เราใฝ่ฝันได้อย่างไร ในเมื่อกำลังถูกบดขยี้อยู่ภายใต้กำปั้นเหล็กของ [From.GetRulerTitle] แห่ง [From.GetAdj]? พวกเจ้าได้พรากปัจจุบันไปจากเรา และพรากอนาคตไปจากคนรุ่นหลังของเราด้วย"
 EZ_VASSAL_GREETING_01:0 "[Root.GetSpeciesNamePlural] ผู้เป็นนายแห่งโลกกายภาพ พวกท่านมาเพื่อขอคำชี้แนะทางจิตวิญญาณ หรือเพื่อออกคำสั่งกันล่ะ?"
 EZ_VASSAL_GREETING_DISLOYAL_01:0 "เราอาจจะยอมมอบสิ่งที่ [From.GetName] เรียกร้องให้แก่ [From.GetRulerTitle] ไปก่อนในตอนนี้ แต่อย่าคิดว่าเราจะลืมความโอหังของพวกเจ้าล่ะ การพิพากษาจะมาถึงตัวพวกเจ้าแน่นอน"
 FP_VASSAL_GREETING_01:0 "[Root.GetName] คือเครื่องมือที่ดีที่สุดของพวกเจ้าในการล้างบางกาแล็กซี เราจะช่วยดูแลพวกเจ้าด้วยซ้ำเมื่อถึงเวลาอันควร"
 FP_VASSAL_GREETING_DISLOYAL_01:0 "การทำตามคำสั่งของพวก [From.GetSpeciesNamePluralInsult] แห่ง [From.GetAdj] มันทำให้เราเสียเวลาอันมีค่าในการกวาดล้างแมลงร้ายในกาแล็กซี บางทีเราคงต้องจัดลำดับความสำคัญให้พวกเจ้าถูกเผาเป็นรายแรกเสียแล้ว"
 DC_VASSAL_GREETING_01:0 "เราหวังว่าพวกเจ้าจะเข้าใจว่า แม้เราจะยอมจำนนต่ออธิปไตยแล้ว แต่เสรีภาพของประชาชน [Root.GetAdj] ก็ยังคงเป็นสิ่งสำคัญที่สุด"
 DC_VASSAL_GREETING_DISLOYAL_01:0 "พวกเจ้าไม่มีวันสะกดวิญญาณแห่ง [Root.GetAdj] ไว้ได้ตลอดกาล! แม้พวกเจ้าจะเกลียดชังเสรีภาพ แต่ในไม่ช้าเราก็จะได้มันมาครอบครอง"
 SD_VASSAL_GREETING_01:0 "จงเชื่อมั่นเถอะว่าเราจะแสวงหาตัวอย่างสิ่งมีชีวิตที่ดีที่สุดมารับใช้เรา เพื่อที่เราจะได้สามารถรับใช้ [From.GetName] ได้ดียิ่งขึ้น"
 SD_VASSAL_GREETING_DISLOYAL_01:0 "พวกเจ้าทำลายระเบียบทางธรรมชาติของสิ่งต่างๆ โดยการให้พวก [From.GetSpeciesNamePluralInsult] มาออกคำสั่งกับ [Root.GetSpeciesNamePlural] การจัดการที่น่ารังเกียจนี้ไม่มีวันคงอยู่ได้นานหรอก"
 DH_VASSAL_GREETING_01:0 "ยินดีที่ได้พบ [From.GetRulerTitle] ผู้ทรงเกียรติ อะไรนำพาความยินดีนี้มาให้เรากันล่ะ?"
 DH_VASSAL_GREETING_DISLOYAL_01:0 "การเสแสร้งทำเป็นนายของ [Root.GetSpeciesName] เริ่มจะดูน่าขำขึ้นทุกที ของแปลกใหม่จากต่างแดนของพวกเจ้านั้นยังน่าอภิรมย์กว่ามากเมื่อเทียบกับการที่เราสามารถนำเข้าพวกเจ้ามาสักสองสามคนโดยไม่ต้องทนฟังคำพูดจาไร้สาระของพวกเจ้า"
 EE_VASSAL_GREETING_01:0 "การค้นพบใดๆ และทั้งหมดที่สมองระดับหัวกะทิของ [Root.GetName] ค้นพบ จะถูกรายงานตรงต่อ [From.GetRulerTitle] [From.GetRulerName]"
 EE_VASSAL_GREETING_DISLOYAL_01:0 "จะมีประโยชน์อะไรที่จะพยายามก้าวหน้าทางปัญญา ในเมื่อ [From.GetName] ถูกบริหารโดยพวกโง่เขลา?"
 SS_VASSAL_GREETING_01:0 "ภายใต้การชี้แนะอันอ่อนโยนของท่าน เราจะยังคงค้นหาคำตอบสำหรับคำถามที่ยิ่งใหญ่ต่อไป"
 SS_VASSAL_GREETING_DISLOYAL_01:0 "ผลกระทบด้านลบของการปกครองโดย [From.GetAdj] ต่อความผาสุกทางจิตวิญญาณของประชาชน [From.GetSpeciesAdj] นั้นเป็นสิ่งที่ไม่ต้องสงสัยเลย พวกเรายังต้องทนทุกข์ทรมานกับสิ่งนี้ไปอีกนานแค่ไหนกัน?"
 HC_VASSAL_GREETING_01:0 "เราหวังว่าสังคมที่ถูกสร้างขึ้นอย่างประณีตของเราจะยังคงรุ่งเรืองต่อไปภายใต้การปกครองของ [From.GetAdj]"
 HC_VASSAL_GREETING_DISLOYAL_01:0 "พวกเจ้าไม่มีวันเข้าใจวิถีชีวิตของเรา การนำของพวกเจ้าเป็นภาระอันหนักอึ้งต่อประชาชน [Root.GetAdj] อยู่เสมอ"
 HG_VASSAL_GREETING_01:0 "เราขออ้อนวอนอย่างนอบน้อม โปรดอย่าลบหลู่โลกศักดิ์สิทธิ์เลย แม้เราจะเป็นผู้ใต้ปกครองของท่าน แต่เราก็ต้องไม่ลืมพันธกิจของเรา"
 HG_VASSAL_GREETING_DISLOYAL_01:0 "พวกเจ้าคิดว่าการกดขี่เราจะช่วยให้รอดพ้นจากการพิพากษาอย่างนั้นหรือ? เรารับใช้เป้าหมายที่ยิ่งใหญ่เกินกว่าที่พวกเจ้าจะเข้าใจได้"
 KK_VASSAL_GREETING_01:0 "อย่าปล่อยให้การปราบปราม [Root.GetName] ทำให้พวกเจ้ายโสโอหังล่ะ [From.GetSpeciesName] เราทุกคนต่างต้องชดใช้ให้แก่ความมั่นใจที่มากเกินไปทั้งนั้น"
 KK_VASSAL_GREETING_DISLOYAL_01:0 "เมื่อคนหนุ่มสาวที่เขลาบังคับให้นักปราชญ์ชราทำตามคำสั่ง กาแล็กซีคงกำลังเผชิญกับยุคมืดมนที่สุดยุคหนึ่งอย่างแน่นอน"
 MI_VASSAL_GREETING_01:0 "สถานการณ์นี้อาจจะแปลกประหลาด แต่เราเชื่อใจว่าอย่างน้อย [Root.GetName] จะป้องกันพรมแดนให้เรา"
 MI_VASSAL_GREETING_DISLOYAL_01:0 "นี่มันน่าขายหน้าสิ้นดี หากพวกเจ้าคาดหวังให้เราเคารพในตัว [From.GetRulerTitle] ที่แสนตลกของพวกเจ้าล่ะก็ พวกเจ้าจะต้องผิดหวังแน่"
 EO_VASSAL_GREETING_01:0 "พวกเจ้ากลายเป็นสิ่งที่น่าสนใจเกินกว่าที่เราจินตนาการไว้มาก เราไม่เคยคาดคิดมาก่อนเลยว่าต้องมาสวมบทบาทเป็นผู้ใต้ปกครอง"
 EO_VASSAL_GREETING_DISLOYAL_01:0 "เรา เริ่ม ไม่ สนใจ บทบาท นี้ อยู่ แล้ว. เราคิดจะเลิกขํากันซะที\"วาซาล\"พวกเราเริ่มหมดความสนใจในบทบาทนี้แล้ว เรากำลังคิดที่จะหยุดเล่นตามน้ำไปกับเรื่องนี้..."
