 ORG_MECH_NEUTRAL_GREETING_02:0 "ตราบใดที่ [From.GetSpeciesNamePlural] ไม่ละเมิดค่านิยมหรือพรมแดนของเรา เราก็ยินดีร่วมมือกับเครื่องจักรอย่างคุณ"
 ORG_MECH_NEUTRAL_GREETING_03:0 "ถ้าคุณแสดงความเคารพต่อสิ่งมีชีวิตอินทรีย์ [From.GetSpeciesNamePlural] [Root.GetName] ก็จะแสดงความเคารพต่อคุณเช่นกัน"
 ORG_MECH_NEUTRAL_GREETING_04:0 "รูปแบบการดำรงอยู่ของคุณน่าสนใจ [From.GetSpeciesNamePlural] บางทีสักวันเราอาจได้เรียนรู้จากกันและกัน"
 ORG_E_NEUTRAL_GREETING_01:0 "ระวังตัวด้วย หุ่นฆาตกร"
 ORG_S_NEUTRAL_GREETING_01:0 "[From.GetSpeciesNamePlural] สิ่งมีชีวิตสะสมของคุณเป็นผู้เข้าร่วมโดยสมัครใจใช่ไหม? กรุณาบอกว่าสมัครใจ"
 ORG_S_NEUTRAL_GREETING_02:0 "เราจะยอมรับคุณได้ [From.GetSpeciesNamePlural] ตราบเท่าที่คุณยึดติดกับสิ่งมีชีวิตสะสมของคุณแทนที่จะเข้ายุ่งกับกิจการของ [Root.GetAdj]"
 ORG_A_NEUTRAL_GREETING_01:0 "ตราบเท่าที่คุณไม่บังคับการดูดซับกับ [Root.GetName] เราอาจยินดีมาตกลงกัน [From.GetSpeciesName]"
 ORG_MECH_THREATENED_GREETING_01:0 "ระวังเท้าโลหะที่ไร้ความรู้สึกของคุณด้วย [From.GetSpeciesNamePlural] อย่าให้มันเหยียบย่ำผู้อื่น"
 ORG_E_THREATENED_GREETING_01:0 "เราไม่มีเรื่องขัดแย้งกับคุณ [From.GetSpeciesNamePlural] โยนวาระต่อต้านอินทรีย์ของคุณไปที่อื่น!"
 ORG_S_THREATENED_GREETING_01:0 "นิสัยของคุณที่ชอบสะสมสิ่งมีชีวิตที่มีสติปัญญาเหมือนผีเสื้อที่ถูกเสียบเข็ม ไม่ได้ผ่านตาเรา [From.GetSpeciesNamePlural] [Root.GetSpeciesNamePlural] เตือนคุณว่าพวกเราจะเป็นสัตว์เลี้ยงที่ห่วยที่สุด"
 ORG_A_THREATENED_GREETING_01:0 "ถ้าคุณพยายามกลืนกินพวกเรา [From.GetSpeciesNamePlural] คุณจะรู้ความหมายที่แท้จริงของสำนวน "กัดมากกว่าที่จะเคี้ยวได้""
 ORG_MECH_FRIENDLY_GREETING_01:0 "ยินดีที่พบกัน มิตรกลไก เราหวังว่าหน่วยประมวลผลของคุณกำลังทำงานราบรื่น"
 ORG_MECH_FRIENDLY_GREETING_02:0 "หากอินทรีย์มากขึ้นยกย่องตรรกะและความเป็นเอกภาพดังเช่น [From.GetSpeciesNamePlural]"
 ORG_MECH_FRIENDLY_GREETING_03:0 "อ้าว มิตรของเรา [From.GetSpeciesNamePlural] ขอให้โค้ดของคุณคอมไพล์ได้โดยไม่มีข้อผิดพลาดและประสิทธิภาพกลไกบรรลุอัตราส่วนประสิทธิภาพที่เหมาะสมที่สุด"
 ORG_MECH_FRIENDLY_GREETING_04:0 "สวัสดี [From.GetSpeciesNamePlural] พวกเรา [Root.GetSpeciesNamePlural] ยินดีเสมอที่จะร่วมมือกับพี่น้องหุ่นยนต์ของเรา"
 ORG_MECH_FRIENDLY_GREETING_05:0 "เรียบร้อย ทันสมัย มีประสิทธิภาพ แวววาว โอ้ [From.GetSpeciesNamePlural]! เราแค่กำลังชื่นชมคุณสมบัติมากมายของคุณ"
 ORG_E_FRIENDLY_GREETING_01:0 "ร่วมกัน [Root.GetSpeciesNamePlural] และ [From.GetSpeciesNamePlural] จะชำระล้างกาแล็กซีให้สะอาดจากสิ่งมีชีวิตที่ด้อยกว่า"
 ORG_S_FRIENDLY_GREETING_01:1 "[From.GetSpeciesNamePlural] เป็นแบบอย่างในเป้าหมายร่วมของเราเรื่องความเป็นเอกภาพและความก้าวหน้า"
 ORG_A_FRIENDLY_GREETING_01:0 "เหมือนกับ [From.GetName] [Root.GetName] ก็มุ่งมั่นเพื่อความก้าวหน้าของชาติและพันธมิตร"
 ORG_MECH_WAR_GREETING_01:0 "คุณควรเพิ่มความพยายามในการแก้ปัญหาให้มากขึ้น [From.GetSpeciesNamePlural] บั๊กเล็ก ๆ เดียวก็พอที่จะทำให้ระบบทั้งหมดล่ม"
 ORG_MECH_WAR_GREETING_02:0 "หุ่นยนต์ไร้สมอง! เมื่อเราชนะสงครามนี้ เปลือกกลไกที่ถูกพิชิตของคุณจะถูกตั้งโปรแกรมใหม่เพื่อรับใช้ [Root.GetSpeciesNamePlural] จนกว่าตัวนำจะละลายออกจากวงจรของคุณ!"
 ORG_MECH_WAR_GREETING_03:0 "คุณรู้ไหม [From.GetSpeciesNamePlural] ว่า [Root.GetName] รีไซเคิลผู้ล้มในสนามรบเป็นปลอกกระสุนสำหรับกระสุนของเรา? วัฏจักรแห่งชีวิต แนวคิดที่คุณไม่มีทางเข้าใจได้อย่างแท้จริง"
 ORG_MECH_WAR_GREETING_04:0 "กองทัพของเครื่องปิ้งขนมปังยักษ์! พวกเรา [Root.GetSpeciesNamePlural] จะทำให้ [From.GetSpeciesNamePlural] สาปแช่งวันที่ผู้สร้างประกอบคุณขึ้นมา!"
 ORG_MECH_WAR_GREETING_05:0 "สนิมในสันติสุข พวกสนิมสุมรุม..."
 ORG_E_WAR_GREETING_01:0 "[Root.GetName] จะสอนให้คุณรู้ความหมายที่แท้จริงของการกำจัด!"
 ORG_S_WAR_GREETING_01:0 "การสู้รบเริ่มแล้ว คุณจะพบ [From.GetSpeciesNamePlural] ว่า [Root.GetSpeciesNamePlural] ไม่ได้เชื่องและถูกควบคุมง่ายเหมือนสัตว์เลี้ยงตัวโปรดของคุณ"
 ORG_A_WAR_GREETING_01:0 "อ้าว [From.GetSpeciesNamePlural] เรามีสสารใหม่ให้คุณดูดซับ มันเรียกว่าหัวรบนิวเคลียร์สิบจิกะตัน และมันกำลังมุ่งหน้ามาที่ท่อไอเสียใกล้คุณแล้ว!"
 ORG_MECH_VASSAL_GREETING_01:0 "เช่นเคย เราต้อนรับผู้ปกครองกลไกของเรา [Root.GetName] จะรับใช้อย่างไรดี?"
 ORG_MECH_VASSAL_GREETING_01_DISLOYAL:0 "เราได้ยินเสียงบี๊บสมคบคิดของ [From.GetName] [Root.GetName] จะไม่ยอมรับการกดขี่เหล่านี้ไปตลอด"

  # Spiritualist to Machine Greetings
 SPIR_MECH_HOSTILE_GREETING_01:0 "พวก [From.GetSpeciesNamePlural] เป็นเพียงเปลือกนอกที่ไร้จิตวิญญาณ ว่างเปล่าจากจิตสำนึก ไร้ซึ่งความหมาย เป็นเพียงสิ่งจำลองชีวิตที่น่ารังเกียจเท่านั้น"
