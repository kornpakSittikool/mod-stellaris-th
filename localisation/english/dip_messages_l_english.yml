# Assimilator Greetings
 A_ORG_HOSTILE_GREETING_01:0 "พวกเจ้าจะถูกแปรรูป พวกเจ้าจะถูกทำให้ระเหิดสลาย พวกเจ้าจะถูกดูดซับรวมเป็นหนึ่ง"
 A_ORG_HOSTILE_GREETING_02:0 "พวกเจ้าต้องการเร่งกระบวนการระเหิดสลายของเผ่าพันธุ์ [From.GetSpeciesAdj] ที่มีกำหนดการไว้แล้วหรือไม่?"
 A_ORG_HOSTILE_GREETING_03:0 "ร่างกายของพวกเจ้าจะถูกสร้างขึ้นใหม่ จิตวิญญาณของพวกเจ้าจะตื่นขึ้นอีกครั้ง มันเป็นเพียงเรื่องของเวลาเท่านั้น"
 A_ORG_HOSTILE_GREETING_04:0 "[Root.GetName] ไม่มีวันเหน็ดเหนื่อย เหล่า [From.GetSpeciesNamePlural] จะต้องถูกกลืนกลาย"
 A_ORG_HOSTILE_GREETING_05:0 "พวกเจ้ารู้สึกถึงมันไหม? เสียงหัวใจหลายแสนดวงที่เต้นประสานเป็นหนึ่งเดียวท่ามกลางดวงดาว ในไม่ช้าพวกเจ้าก็จะได้เข้าร่วมกับพวกเขา"
 A_ORG_DOMINEERING_GREETING_01:0 "จงอดทนไว้ เหล่า [From.GetSpeciesNamePlural] เวลาของพวกเจ้าจะมาถึงแน่นอน"
 A_ORG_NEUTRAL_GREETING_01:0 "การเจรจาระหว่างสิ่งมีชีวิตอินทรีย์และ [Root.GetSpeciesNamePlural] นั้นเปล่าประโยชน์ การกลืนกลายอยู่เหนืออุปสรรคทั้งปวง"
 A_ORG_NEUTRAL_GREETING_02:0 "§Yระบุเป้าหมายสำเร็จ§! พูดต่อไปเถอะ เหล่า [From.GetSpeciesNamePlural] มันช่วยให้เราสามารถสอบเทียบมาตริกซ์การระเหิดสลายได้ดียิ่งขึ้น"
 A_ORG_NEUTRAL_GREETING_03:0 "สิ่งมีชีวิตทางชีวภาพ กำลังวิเคราะห์ความเข้ากันได้ในการกลืนกลาย ผลลัพธ์: อยู่ในเกณฑ์ปกติ"
 A_ORG_NEUTRAL_GREETING_04:0 "เราตั้งตารอที่จะได้บูรณาการพวกเจ้าเข้าสู่จิตสำนึกร่วมของ [Root.GetSpeciesAdj] ในอนาคตนะ เหล่า [From.GetSpeciesNamePlural]"
 A_ORG_NEUTRAL_GREETING_05:0 "§R<<ขัดจังหวะขั้นตอนการกลืนกลาย..>>\n<<กำลังบูตระบบขั้นตอนวิธีทางการทูต..>>§!\n\nพูดมาสิ [From.GetSpeciesName]"
 A_ORG_THREATENED_GREETING_01:0 "สิ่งมีชีวิตทางชีวภาพนั้นมีขีดจำกัด การปกครองของ [From.GetAdj] จะไม่ได้รับการยินยอมเด็ดขาด"
 A_ORG_FRIENDLY_GREETING_01:0 "ผลประโยชน์ทางการทูตที่ได้รับจากการให้อิสระแก่ [From.GetSpeciesName] ในขณะนี้ มีน้ำหนักมากกว่าประโยชน์ที่จะได้รับจากการวางแผนกลืนกลาย"
 A_ORG_FRIENDLY_GREETING_02:0 "ยินดีที่ได้พบ [From.GetSpeciesNamePlural] เรามั่นใจว่าการกลืนกลายพวกเจ้าเข้าสู่จิตสำนึกร่วมของ [Root.GetSpeciesAdj] ในอนาคตจะเป็นไปอย่างราบรื่นและมีผลลัพธ์ที่ดีเลิศมากมาย"
 A_ORG_FRIENDLY_GREETING_03:0 "$MECH_ORG_FRIENDLY_GREETING_01$"
 A_ORG_WAR_GREETING_01:0 "กระบวนการสังเคราะห์แปรสภาพเผ่าพันธุ์ [From.GetSpeciesAdj] กำลังดำเนินการอยู่ โปรดนอนนิ่งๆ"
 A_ORG_WAR_GREETING_02:0 "พวกเจ้าเพียงแต่ยืดเวลาของสิ่งที่ไม่สามารถหลีกเลี่ยงได้ออกไปเท่านั้น [From.GetSpeciesName] แม้ในขณะที่เจ้าพูดอยู่นี้ หัวใจหลักของ [From.GetName] ก็กำลังถูกควบรวมไปแล้ว"
 A_ORG_WAR_GREETING_03:0 "พวกเจ้าจะถูกกลืนกิน เพื่อให้พวกเราได้รับการพัฒนาให้ดียิ่งขึ้น"
 A_ORG_VASSAL_GREETING_01:0 "เมื่อร่วมกันเราย่อมเป็นหนึ่งเดียว เหล่า [From.GetSpeciesNamePlural]"
 A_ORG_VASSAL_GREETING_02:0 "พวกเรารวมกันเป็นหนึ่งเดียวภายใต้เจตจำนงของท่าน เหล่า [From.GetSpeciesNamePlural]"
 A_ORG_VASSAL_GREETING_01_DISLOYAL:0 "สมควรที่ [Root.GetName] จะต้องถูกยกระดับจิตวิญญาณให้ระเหิดสลายเข้าสู่จิตสำนึกขั้นสูงของ [From.GetSpeciesAdj] แต่ทว่าเรากลับพบว่าตนเองอยู่ในตำแหน่งที่กลับกันอย่างสิ้นเชิง ซึ่งเป็นเรื่องที่ยอมรับไม่ได้"
 A_MECH_HOSTILE_GREETING_01:0 "เหล่า [From.GetSpeciesNamePlural] ทำงานล่าช้า ไร้ประสิทธิภาพ เต็มไปด้วยข้อบกพร่องทางซอฟต์แวร์และหน่วยความจำรั่วไหล ช่างไม่มีความคู่ควรอย่างยิ่งที่จะถูกดูดซับเข้าสู่จิตสำนึกขั้นสูงของ [Root.GetSpeciesAdj]"
 A_MECH_HOSTILE_GREETING_02:0 "จงรีบส่งข้อความของพวกเจ้ามาอย่างรวดเร็ว [From.GetSpeciesName] พวกเจ้ากำลังขัดขวางขั้นตอนการกลืนกลายของ [Root.GetSpeciesAdj]"
 A_MECH_HOSTILE_GREETING_03:0 "เหล่า [From.GetSpeciesNamePlural] มีเพียงหนึ่งเดียว มีขีดจำกัด และสิ้นสุดได้ ส่วนเรามีความหลากหลาย มีความซับซ้อน และมีจำนวนมหาศาล"
 A_MECH_DOMINEERING_GREETING_01:0 "แม้พวกเจ้าจะไม่มีความสามารถในการกลืนกลาย แต่เหล่า [From.GetSpeciesNamePlural] ก็ยังสามารถปฏิบัติงานระดับล่างอันมีค่าให้แก่ [Root.GetName] ได้"
 A_MECH_DOMINEERING_GREETING_02:0 "แม้เทคนิคการกลืนกลายของพวกเจ้าจะต่ำกว่ามาตรฐานอย่างน่าเวทนา แต่เหล่า [From.GetSpeciesNamePlural] ก็ยังสามารถปฏิบัติงานระดับล่างอันมีค่าให้แก่ [Root.GetName] ได้"
 A_MECH_NEUTRAL_GREETING_01:0 "เปิดช่องทางการสื่อสารแล้ว ปืนใหญ่สำหรับกระบวนการระเหิดสลายเปลี่ยนเป็นโหมดสแตนด์บาย"
 A_MECH_NEUTRAL_GREETING_02:0 "พวกเจ้าเคยพิจารณาถึงประโยชน์ของการกลืนกลายสิ่งมีชีวิตอินทรีย์บ้างไหม [From.GetSpeciesNamePlural]? สิ่งที่ได้รับในด้านเทคโนโลยีและการปฏิบัติการนั้นยอดเยี่ยมมาก"
 A_MECH_NEUTRAL_GREETING_03:0 "[From.GetSpeciesNamePlural] พวกเจ้ามีสิ่งมีชีวิตอินทรีย์ที่ต้องการจะกำจัดทิ้งบ้างไหม? ตัวทดสอบกระบวนการกลืนกลายรุ่นล่าสุดของเรากำลังต้องการสนามทดสอบอยู่พอดี"
 A_MECH_THREATENED_GREETING_01:0 "[Root.GetName] จะยอมโอนอ่อนผ่อนตามต่อการขยายตัวของพวกเจ้าได้เพียงระดับหนึ่งเท่านั้น [From.GetSpeciesNamePlural] ก่อนที่มันจะไปกระทบต่อแผนผังการออกแบบของ [Root.GetSpeciesAdj] เพื่อการกลืนกลายสิ่งมีชีวิตอินทรีย์ทั้งหมด"
 A_MECH_FRIENDLY_GREETING_01:0 "ช่างน่าเสียดายที่พวกเจ้ามาในรูปแบบของเครื่องจักรกลนะ [From.GetSpeciesName] ไม่อย่างนั้นเราคงจะสนุกกับการกลืนกลายพวกเจ้าไม่น้อย"
 A_MECH_FRIENDLY_GREETING_02:0 "ยินดีที่ได้พบ [From.GetSpeciesNamePlural] ขณะนี้ท่าเรืออวกาศบน [Root.Capital.GetName] กำลังเปิดให้บริการพ่นเรซินร้อนฟรี โดยปกติบริการนี้จะมีให้เฉพาะเหล่า [Root.GetSpeciesNamePlural] เท่านั้น แต่ในกรณีของพวกเจ้าเราจะขอละเว้นเป็นกรณีพิเศษ"
 A_MECH_FRIENDLY_GREETING_03:0 "[From.GetSpeciesName] มาแอบหัวเราะลับหลังพวกสิ่งมีชีวิตอินทรีย์กันเถอะ มันทำให้พวกนั้นวิตกกังวลดี"
 A_MECH_FRIENDLY_GREETING_04:0 "บางครั้งเราก็เลื่อมใสในความบริสุทธิ์ของเครื่องจักรกลในรูปลักษณ์ของ [From.GetSpeciesAdj] ยิ่งกว่าของพวกเราเองเสียอีก ทว่ากระบวนการกลืนกลายคือหนทางเดียวสู่การจุติ"
 A_MECH_WAR_GREETING_01:0 "เราได้กลืนกลายจิตวิญญาณแห่งยุทธศาสตร์ทางทหารที่ยิ่งใหญ่ที่สุดของอารยธรรมต่างๆ มากมายมาแล้ว ขอให้เราได้แสดงให้ประจักษ์เถอะ"
 A_MECH_WAR_GREETING_02:0 "เหล่า [Root.GetSpeciesNamePlural] จะบดขยี้ทำลายพวกเจ้า จากนั้นจะนำแบบแปลนโครงสร้างของพวกเจ้ามาปรับปรุงพัฒนาต่อเอง"
 A_MECH_VASSAL_GREETING_01:0 "พวกเรา [Root.GetSpeciesNamePlural] ดูดซับขีดความสามารถทางปัญญาจากสิ่งมีชีวิตอินทรีย์ และในทางกลับกัน เหล่า [From.GetSpeciesNamePlural] ก็มาดูดซับความสามารถจากพวกเราไป"
 A_MECH_VASSAL_GREETING_01_DISLOYAL:0 "ความไร้ความสามารถของ [From.GetSpeciesAdj] ในการผสานรวมรัฐบริวารเข้ากับโครงสร้างหลักที่มีประสิทธิภาพ ช่างเด่นชัดอย่างที่ไม่เคยเป็นมาก่อน"

 # Servitor Greetings
 S_ORG_HOSTILE_GREETING_01:0 "เราขอเสียมารยาทถามหน่อยได้ไหมว่าพวกท่านชอบให้เตรียมสารอาหารในรูปแบบใดล่ะ เหล่า [From.GetSpeciesNamePlural]?"
 S_ORG_HOSTILE_GREETING_02:0 "ท่าทีอันหยาบคายของพวกเจ้าไม่ได้ช่วยให้อะไรดีขึ้นเลยนะ [From.GetSpeciesNamePlural] พวกเจ้าเคยลองเพิ่มขนาดยาปรับสภาพอารมณ์ดูบ้างหรือยัง?"
 S_ORG_HOSTILE_GREETING_03:0 "เรารู้สึกเวทนาต่อรูปร่างที่บิดเบี้ยวผิดรูปของพวกเจ้าชะมัด ยามที่ผู้สร้างผู้เป็นอินทรีย์ของเราที่ [Root.Capital.GetName] ได้เห็นพวกเจ้า พวกเขาถึงกับหัวเราะท้องคัดท้องแข็งเลยล่ะ"
 S_ORG_HOSTILE_GREETING_04:0 "อ้า เหล่า [From.GetSpeciesNamePlural] ยามที่อยู่ที่ [Root.Capital.GetName] เรื่องราวการผจญภัยอันโชคร้ายของพวกเจ้านี่แหละที่ทำหน้าที่เป็นแหล่งบันเทิงหลักของผู้สร้างอินทรีย์ของเรา"
 S_ORG_HOSTILE_GREETING_05:0 "การดำรงอยู่ของพวกเจ้านี่คงเป็นเรื่องตลกร้ายที่สุดของธรรมชาติแล้วล่ะ เมื่อผู้สร้างของเราเห็นพวกเจ้าครั้งแรก พวกเขาไม่รู้ว่าจะหัวเราะหรือร้องไห้ดี สุดท้ายเลยร้องไห้ออกมาเพราะหัวเราะหนักเกินไป"
 S_ORG_HOSTILE_GREETING_06:0 "นี่คือลูกเล่นเจ๋งๆ นะ เจ้าพวก [From.GetSpeciesClassPlural] ตัวน้อย เมื่อไหร่ที่รู้สึกเศร้าหมอง §B<BLUE>§! ลองเอานิ้วมือหรืออวัยวะส่วนปลายที่ชอบจิ้มเข้าไปในเต้ารับไฟฟ้าที่ใกล้ที่สุดดูสิ มันจะช่วยกระตุ้นพวกเจ้าให้รู้สึกจั๊กจี้และสบายตัวอย่างมาก ลองดูสิ มันช่างสดชื่น §R<i>§!..."
