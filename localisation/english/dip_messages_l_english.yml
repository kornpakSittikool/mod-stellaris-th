 # Ruthless Capitalists
 RC_HOSTILE_GREETING_01:0 "ธุรกิจต้องมาก่อน และสิ่งที่ดีที่สุดสำหรับคุณคืออย่ายุ่งกับเรื่องของเรา"
 RC_HOSTILE_GREETING_02:0 "ไม่ว่าค่านิยมที่ไร้แก่นสารทางวัตถุใด ๆ ที่คุณกล่าวอ้างว่าเป็นเป้าหมายชีวิต สิ่งเหล่านั้นได้ทำให้คุณมืดบอดต่อสกุลเงินหลักที่เราใช้แลกเปลี่ยนและต่อความจริงที่แท้จริง"
 RC_DOMINEERING_GREETING_01:0 "บางทีคุณอาจคาดหวังให้เราหยิบยื่นความเอื้อเฟื้อเผื่อแผ่แก่สิ่งมีชีวิตที่น่าสมเพชเช่นพวกคุณ คุณคิดผิดไปถนัดเลยล่ะ"
 RC_NEUTRAL_GREETING_01:0 "ผู้ที่ไม่สามารถสร้างผลกำไรร่วมกันได้ ก็ต้องตกเป็นฝ่ายถูกตักตวงผลประโยชน์ จงพิจารณาให้ดีว่าคุณอยากจะอยู่ในกลุ่มไหน"
 RC_NEUTRAL_GREETING_02:0 "เราขอมอบข้อเสนอที่ดีที่สุดสำหรับพันธมิตรใหม่เท่านั้น อย่ามัวเสียเวลากับรายละเอียดปลีกย่อยเลย คุณร่างโครงร่างหยาบ ๆ มา แล้วเราจะจัดทำร่างสัญญาเอง"
 RC_NEUTRAL_GREETING_03:0 "ความสนใจของคุณในเรื่องเชิงนามธรรมนั้นน่าทึ่งมาก เราขอแนะนำให้คุณเดินหน้าสำรวจขุมทรัพย์อันลี้ลับเหล่านั้นต่อไป และปล่อยให้ดินแดนทางวัตถุอันเสื่อมโทรมนี้อยู่ในความดูแลของเราเถอะ"
 RC_NEUTRAL_GREETING_04:0 "อย่าได้อาจหาญในการขอมากเกินไปนัก เวลาที่เราต้องปรับลดขนาดองค์กร บริษัทในเครือมักจะเป็นกลุ่มแรกที่ต้องไปเสมอ"
 RC_THREATENED_GREETING_01:0 "เราอาจจะยอมประนีประนอมในผลประโยชน์ของเราบ้าง เพื่อสอดรับกับสถานะที่แข็งแกร่งของคุณ"
 RC_FRIENDLY_GREETING_01:0 "กุญแจสำคัญของการเป็นหุ้นส่วนที่ดีคือต้องซื่อสัตย์ต่อกันให้มากพอที่จะทำให้เรื่องโกหกที่เราบอกคนอื่นไปนั้นตรงกัน"
 RC_FRIENDLY_GREETING_02:0 "เรายินดีที่จะเชื่อใจคุณ และที่พิเศษกว่านั้นคือ เรายินดีที่จะทำตัวให้น่าเชื่อถือด้วย"
 RC_FRIENDLY_GREETING_03:0 "ไม่มีเหตุผลใดที่เราทั้งสองจะทำกำไรด้วยกันไม่ได้ ตอนนี้สิ่งที่เราต้องทำมีเพียงแค่หาใครสักคนมารับผลขาดทุนแทน"
 RC_FRIENDLY_GREETING_04:0 "คุณมีข้อเสนอแนะใหม่ ๆ สำหรับการร่วมทุนของเราบ้างไหม?"
 RC_WAR_GREETING_01:0 "สงครามก็เป็นเพียงแค่การแข่งขันทางเศรษฐกิจที่ดำเนินต่อด้วยวิธีการอื่นเท่านั้น"
 RC_WAR_GREETING_02:0 "ในเมื่อคุณปฏิเสธที่จะปฏิบัติตามเหตุผล คุณจึงไม่เหลือทางเลือกให้เรานอกจากต้องบังคับคุณด้วยกำลัง"
 RC_WAR_GREETING_03:0 "ไม่มีเหตุผลที่พวกเราคนใดคนหนึ่งต้องนำความขัดแย้งนี้ไปใส่ใจเป็นการส่วนตัว มันเป็นเพียงเรื่องของผลประกอบการเท่านั้น"
 RC_WAR_GREETING_04:0 "การเข้าซื้อกิจการอย่างไม่เป็นมิตรกำลังจะเกิดขึ้นในไม่ช้า"
 # Peaceful Traders
 PT_HOSTILE_GREETING_01:0 "น่าเสียดายที่ข้อตกลงดี ๆ มักจะทำกับคนไม่ดีไม่ได้"
 PT_HOSTILE_GREETING_02:0 "เหล่า [Root.GetSpeciesName] ปรารถนาที่จะเรียนรู้จากผู้อื่นและให้ผู้อื่นเรียนรู้จากเรา แต่เราขอไม่เรียนรู้วิถีทางใด ๆ ของคุณจะดีกว่า"
 PT_HOSTILE_GREETING_03:0 "เห็นได้ชัดว่าคุณยินดีที่จะปล่อยให้ความใจแคบและอคติเข้ามาขัดขวางผลประโยชน์ร่วมกัน"
 PT_DOMINEERING_GREETING_01:0 "ช่างสะดวกจริง ๆ ที่คุณมีสิ่งที่เสนอให้เราน้อยเหลือเกิน เพราะเราเองก็ไม่มีความปรารถนาที่จะแบ่งปันสิ่งใดกับคุณอยู่แล้ว"
 PT_NEUTRAL_GREETING_01:0 "เรากำลังฟังอยู่ ไม่ว่าเราจะรุ่งโรจน์เพียงใดหรือตกต่ำเพียงไหน ผู้อื่นก็มักจะมีสิ่งใหม่ ๆ มานำเสนอเสมอ"
 PT_NEUTRAL_GREETING_02:0 "เราโชคดีมากที่ได้พบกัน เผ่าพันธุ์ของเราเจริญรุ่งเรืองได้ด้วยการแลกเปลี่ยนระหว่างอารยธรรมต่าง ๆ เราหวังว่าความสัมพันธ์กับ [From.GetSpeciesName] จะเป็นก้าวต่อไปบนการเดินทางอันยิ่งใหญ่นี้"
 PT_NEUTRAL_GREETING_03:0 "วิถีชีวิตที่แยกตัวจากโลกภายนอกของผู้คนของคุณ กำลังเบี่ยงเบนความสนใจของคุณไปจากโอกาสต่าง ๆ ที่เราสามารถแสดงให้เห็นได้"
 PT_THREATENED_GREETING_01:0 "เพื่อเป็นการแสดงความเคารพ เราจะพยายามลดราคาของสินค้าบางส่วนของเราให้"
 PT_FRIENDLY_GREETING_01:0 "เป็นเรื่องน่ายินดีเสมอที่ได้สนทนากับหุ้นส่วนทางธุรกิจที่มีเหตุผล"
 PT_FRIENDLY_GREETING_02:0 "เรายินดีที่ได้เห็นว่า [From.GetRulerTitle] [From.GetRulerName] มีความสนใจในการหารือและทำธุรกรรมที่สร้างสรรค์ ต่างจากผู้ปกครองที่บ้าอำนาจคนอื่น ๆ"
 PT_FRIENDLY_GREETING_03:0 "พวกเราจะร่วมกันนำพาความเจริญรุ่งเรืองและขุมทรัพย์ที่ไม่มีใครเคยพบเห็นไปสู่ทุกมุมของกาแล็กซี"
 PT_WAR_GREETING_01:0 "ไม่ว่าใครจะเป็นฝ่ายชนะ เมื่อสิ้นสุดความขัดแย้งนี้เราทั้งคู่ต่างต้องสูญเสียทรัพยากรไปมหาศาลเพื่อทำลายล้างกันและกัน ซึ่งสวนทางกับข้อตกลงที่ต่างฝ่ายต่างได้ประโยชน์อย่างสิ้นเชิง จงคิดทบทวนให้ดีว่าคุณต้องการแบบใด"
 PT_WAR_GREETING_02:0 "ยานของเรามีไว้เพื่อขนส่งสินค้า ไม่ใช่อาวุธ ทุกการโจมตีที่ทำลายล้างรังแต่จะทำให้สูญเสียพื้นที่อันมีค่าและชีวิตผู้คนไปโดยเปล่าประโยชน์ เราหวังว่าคุณคงจะไม่ดึงดันที่จะลากยาวเรื่องนี้ออกไป"
 PT_WAR_GREETING_03:0 "การเจรจาเงื่อนไขเพื่อสันติภาพจะเป็นก้าวแรกในการเปิดโอกาสให้เราได้กลับมาสานบทสนทนาที่มีความหมายอีกครั้ง"
 # Hegemonic Imperialists
 HI_HOSTILE_GREETING_01:0 "ทำไมคุณถึงยอมเสียเวลาของเราล่ะ? [Root.GetName] ไม่ได้ยิ่งใหญ่ขึ้นมาจากการรับฟังเสียง [Root.GetRandomSpeciesSound] ไร้สาระหรอกนะ"
 HI_HOSTILE_GREETING_02:0 "กาแล็กซีนี้กำลังเฝ้ารอการปกครองของ [Root.GetRulerTitle] [Root.GetRulerName] แล้วคุณยังคิดจะมาเจรจาอีกงั้นรึ?"
 HI_DOMINEERING_GREETING_01:0 "คุณเรียกตัวเองว่าอะไร ใช่"[Root.GetSpeciesNameInsult]"พวกแกเรียกตัวเองว่าอะไรนะ? อ้อ ใช่ "
 HI_DOMINEERING_GREETING_02:0 "ไม่ต้องกังวลไป ถึงเวลาที่แกจะได้เข้าร่วมกับ [Root.GetName] แน่ ขอแค่เพียงอดทนรอ"
 HI_NEUTRAL_GREETING_01:0 "เรากำลังรับฟังอยู่ แต่เราเป็นผู้กำหนดเองว่าสิ่งใดคือความจริงหรือความเท็จ ความถูกหรือความผิด ฝ่ายเรานั้นถูกต้องอยู่แล้ว ส่วนพวกแกจะเป็นอย่างไรนั้นก็คงต้องรอดูกันต่อไป"
 HI_NEUTRAL_GREETING_02:0 "พละกำลังคือภาษาเดียวที่เป็นสากล แต่หากแกต้องการจะเจรจาให้ดูนุ่มนวลทางการทูตขึ้น เราก็จะไม่ขัดขวางแก"
 HI_THREATENED_GREETING_01:0 "เราหวังว่าภูมิปัญญาอันไร้ขีดจำกัดของ [From.GetRulerTitle] ของแกจะช่วยให้เห็นว่าเราไม่ได้มีเจตนาคุกคามต่อแผนการใด ๆ ของแกเลย"
 HI_FRIENDLY_GREETING_01:0 "บางอารยธรรมถูกกำหนดให้ปกครอง บางอารยธรรมถูกกำหนดให้ถูกปกครอง ในฐานะผู้ปกครอง เราสามารถแสดงความเคารพต่อกันได้"
 HI_FRIENDLY_GREETING_02:0 "แกฉลาดมากที่เลือกจะไม่ต่อต้านเรา และเราจะมอบความเคารพในแบบเดียวกันนี้คืนให้แกเช่นกัน"
 HI_FRIENDLY_GREETING_03:0 "เราจะร่วมกันทำลายร่องรอยการต่อต้านทั้งหมดต่อการควบคุมอำนาจอธิปไตยเหนือกาแล็กซีของเราให้สิ้นซาก"
 HI_FRIENDLY_GREETING_04:0 "หากเพียงแค่ทุกคนยอมวางอาวุธต่อหน้า [Root.GetRulerTitle] ของเราได้ง่ายดายเหมือนอย่างที่แกยอมละทิ้งอาวุธของแก กาแล็กซีนี้คงจะได้พบกับสันติภาพที่แกปรารถนาอย่างแน่นอน"
 HI_WAR_GREETING_01:0 "ประชาชน [From.GetSpeciesAdj] จะยินดีต้อนรับการปกครองของ [Root.GetRulerTitle] [Root.GetRulerName] เมื่อการป้องกันของพวกแกถูกทำลายราบคาบแล้ว"
 HI_WAR_GREETING_02:0 "สงครามนี้เป็นเพียงแค่ก้าวสำคัญบนเส้นทางสู่โชคชะตาที่แท้จริงของเราเท่านั้น"
 HI_WAR_GREETING_03:0 "[Root.GetName] ผ่านการทดสอบจากสงครามมากมายก่อนที่เราจะรวมเป็นหนึ่ง ความขัดแย้งในครั้งนี้มีแต่จะทำให้พวกเราแข็งแกร่งขึ้น"
 # Federation Builders
 FB_HOSTILE_GREETING_01:0 "หลายคนอาจตราหน้าว่า [From.GetSpeciesName] เป็นดั่งอสูรร้ายจากนโยบายอันชั่วช้าของคุณตลอดไป แต่เราไม่เคยคิดว่าชีวิตของเผ่าพันธุ์ใดจะไร้ค่าจนต้องถูกละทิ้ง"
 FB_HOSTILE_GREETING_02:0 "ยิ่งคุณปฏิเสธหนทางสู่การอยู่ร่วมกันอย่างสันตินานเท่าไหร่ กาแล็กซีส่วนที่เหลือก็จะยิ่งรวมตัวกันเพื่อต่อต้านคุณมากขึ้นเท่านั้น"
 FB_HOSTILE_GREETING_03:0 "เมื่อใดก็ตามที่คุณใช้แผนแบ่งแยกและพิชิต รอยแยกที่คุณทิ้งไว้เบื้องหลังจะเป็นดั่งบาดแผลของกาแล็กซี เราจะคอยเยียวยาบาดแผลเหล่านั้น แต่เราจะไม่ลืมว่าใครเป็นคนสร้างมันขึ้นมา"
 FB_DOMINEERING_GREETING_01:0 "มักจะมีพวก [From.GetRulerTitle] ใจแคบที่ไม่เต็มใจปล่อยให้ประชาชนเข้าร่วมกับชุมชนกาแล็กซีอยู่เสมอ เดี๋ยวคุณก็คิดได้เองแหละ"
 FB_NEUTRAL_GREETING_01:0 "เรายังคงอยู่ในช่วงเริ่มต้นของประวัติศาสตร์กาแล็กซี ยิ่งเราร่วมมือกันเร็วเท่าไหร่ เราก็ยิ่งสามารถก้าวหน้าไปสู่สิ่งที่ดีกว่าและดินแดนใหม่ ๆ ได้เร็วขึ้นเท่านั้น"
 FB_NEUTRAL_GREETING_02:0 "ในฐานะตัวแทนของ [Root.GetAllianceName] การทูตคือสิ่งที่สำคัญที่สุดเป็นอันดับแรกของเรา"
 FB_NEUTRAL_GREETING_03:0 "[Root.GetAllianceName] รับประกันความเป็นอิสระในจุดที่สำคัญ ผ่านการพึ่งพาอาศัยกันในจุดที่จำเป็น"
 FB_NEUTRAL_GREETING_04:0 "คุณได้เริ่มก้าวแรกสู่กาแล็กซีที่สงบสุขด้วยการปฏิเสธความรุนแรงแล้ว แต่สันติภาพที่ยั่งยืนจะเกิดขึ้นได้ก็ต่อเมื่อเราหาจุดลงตัวของความแตกต่างระหว่างกันได้เท่านั้น"
 FB_THREATENED_GREETING_01:0 "[From.GetName] อาจจะมีอำนาจล้นพ้น แต่ความแข็งแกร่งนั้นจะไร้ความหมายหากเหล่าผู้อ่อนแอมารวมตัวกันเพื่อต่อต้านคุณ"
 FB_FRIENDLY_GREETING_01:0 "การทูตควรเป็นรากฐานสำคัญของทุกสังคมระหว่างดวงดาว การที่ [From.GetRulerName] ตระหนักถึงความสำคัญในข้อนี้ ย่อมเป็นสัญญาณของผู้ปกครองที่ชาญฉลาดอย่างแน่นอน"
 FB_FRIENDLY_GREETING_02:0 "มิตรแท้ของ [Root.GetAllianceName] ย่อมเป็นมิตรแท้แห่งสันติภาพและความเจริญรุ่งเรือง"
 FB_FRIENDLY_GREETING_03:0 "[Root.GetAllianceName] คงจะเป็นสหพันธ์ที่ด้อยค่าลงไปหากปราศจาก [From.GetSpeciesNamePluralCompliment] ผู้งดงามคอยส่องแสงนำทาง"
 FB_FRIENDLY_GREETING_04:0 "ข้อตกลงร่วมกันของเราในวันนี้จะถูกจดจำในฐานะส่วนหนึ่งของโครงการอันยิ่งใหญ่ในการสร้าง [Root.GetAllianceName] ซึ่งเป็นอนาคตของกาแล็กซี"
 FB_WAR_GREETING_01:0 "เราหวังว่าชีวิตที่ต้องสูญเสียไปในสงครามครั้งนี้จะช่วยสอนให้คุณได้เห็นคุณค่าของสิ่งที่คุณกำลังโยนมันทิ้งไป"
 FB_WAR_GREETING_02:0 "พวกเราได้ก่อตั้ง [Root.GetAllianceName] ขึ้นมาเพื่อปกป้องกาแล็กซีจากพวกกระหายสงครามเช่น [From.GetRulerTitle] [From.GetRulerName]"
 FB_WAR_GREETING_03:0 "[Root.GetAllianceName] ยืนหยัดร่วมเป็นหนึ่งเดียวในการต่อต้านภัยคุกคามจาก [From.GetSpeciesAdj]"
 # Xenophobic Isolationists
 XI_HOSTILE_GREETING_01:0 "ทั้งหมดที่เราต้องการคือการถูกปล่อยให้อยู่ตามลำพัง มันเป็นแนวคิดที่เข้าใจยากเกินไปสำหรับ [From.GetSpeciesNameInsult] งั้นรึ?"
 XI_HOSTILE_GREETING_02:0 "เสียง [From.GetRandomSpeciesSound] อันน่ารังเกียจที่พ่นออกมาจาก [From.GetSpeciesMouthName] ของแก ช่างฟังดูเหมือนเสียงการขับของเหลวออกจากร่างกายของสิ่งมีชีวิตชั้นต่ำบน [Root.Capital.GetName] และเราจะตอบสนองตามที่มันควรจะเป็น"
 XI_HOSTILE_GREETING_03:1 "เจตนาเบื้องหลังการแลกเปลี่ยนเหล่านี้คืออะไรกันแน่? การกำจัดวัฒนธรรมของ [From.GetSpeciesAdj]? หรือการผสมข้ามสายพันธุ์? แกทำให้พวกเราขยะแขยงเหลือเกิน"
 XI_DOMINEERING_GREETING_01:0 "เราไม่มีความปรารถนาที่จะเห็นวัฒนธรรมของเราต้องแปดเปื้อนด้วยค่านิยมอันป่าเถื่อนของพวกแก"
 XI_NEUTRAL_GREETING_01:0 "พูดให้มันสั้น ๆ หน่อย"
 XI_NEUTRAL_GREETING_02:0 "หากเราต่างฝ่ายต่างอยู่เรื่องของตัวเอง การทูตก็คงไม่มีความจำเป็น"
 XI_NEUTRAL_GREETING_03:0 "มั่นใจได้เลยว่าเราก็รู้สึกไม่ชอบใจกับการปฏิสัมพันธ์ในครั้งนี้ไม่แพ้คุณหรอก"
 XI_THREATENED_GREETING_01:0 "อยู่ห่าง ๆ จากเราซะ! เราจะสร้างสิ่งกีดขวางโครงสร้างอวกาศและเวลาเพื่อกันแกออกไป"
 XI_FRIENDLY_GREETING_01:0 "พวกแกคือพวก [From.GetSpeciesNamePluralInsult] ที่พอจะมีอารยธรรม ถือเป็นพวกที่ดีกว่าตัวอื่น ๆ ที่มีอยู่ เราจะคุยด้วยละกัน"
 XI_FRIENDLY_GREETING_02:0 "ตราบใดที่คุณยังอยู่กับพวกเดียวกันของคุณ เราก็ถือว่ามีข้อตกลงที่ตรงกัน"
 XI_FRIENDLY_GREETING_03:0 "หลายคนไม่เข้าใจความสำคัญของการแยกแยะเผ่าพันธุ์ให้ขาดจากกัน [From.GetRulerName] ถือเป็น [From.GetSpeciesNameInsult] ที่มีเหตุผลอยู่บ้าง"
 XI_FRIENDLY_GREETING_04:0 "อย่าทึกทักเอาเองว่านโยบายการยอมอดทนต่อคุณของเราจะเหมือนกับความสนใจที่ผิดปกติของคุณต่อชีวิตต่างดาวล่ะ ไม่ใช่ว่าพวกเราจะชอบแกหรืออะไรทำนองนั้นหรอกนะ"
 XI_WAR_GREETING_01:0 "พวกแกบีบบังคับเราเอง อย่าคิดว่าเราจะยอมปล่อยให้การโจมตีต่อสังคมอันงดงามของเราจากพวก [From.GetSpeciesNamePluralInsult] ดำเนินต่อไปได้"
 XI_WAR_GREETING_02:0 "ชายแดนและวิถีชีวิตของเราจะมั่นคงปลอดภัย เมื่อภัยคุกคามจาก [From.GetSpeciesAdj] ถูกสยบลงแล้ว"
 XI_WAR_GREETING_03:1 "ต่อให้ได้รับชัยชนะ ทหารของเราก็ยังตกเป็นเหยื่อในสงครามนี้ที่ต้องทำให้มืออันสะอาดของ [Root.GetSpeciesAdj] แปดเปื้อนไปด้วย [Root.GetBloodType] ของพวกแก"
 XI_WAR_GREETING_04:0 "ความขัดแย้งนี้เป็นผลลัพธ์ปกติของความกระหายความรุนแรงที่เป็นที่รู้กันดีของพวก [From.GetSpeciesAdj]"
 # Hive Mind
 HM_HOSTILE_GREETING_01:0 "คุณกำลังขัดขวางเส้นทางของ [Root.GetName] ไม่ว่าสิ่งใดที่คุณต้องการจะพูดคุย จงยอมรับเสียเถอะว่าการเดินหน้าของเราเป็นสิ่งที่ไม่อาจหลีกเลี่ยงได้"
 HM_HOSTILE_GREETING_02:0 "ชีวิตของทุกคนที่อยู่นอกเหนือ [Root.GetName] นั้นมีความสำคัญเป็นรอง แต่สำหรับพวก [From.GetName] ที่ชั่วช้านั้น ถือเป็นอันดับสุดท้าย"
 HM_HOSTILE_GREETING_03:0 "กลุ่มผลประโยชน์ร่วมของคุณมันเป็นเรื่องโกหก เมื่อเวลาผ่านไป คุณจะเผยตัวตนออกมาว่าเป็นเพียงมวลสารที่สับสนและไร้ความสามัคคี"
 HM_DOMINEERING_GREETING_01:0 "สังคมของคุณทำหน้าที่เป็นแบบอย่างให้แก่ส่วนที่เหลือของกาแล็กซีในเรื่องที่ว่า การแยกอารยธรรมออกเป็นปัจเจกบุคคลนั้นได้ทำลายความหวังทั้งหมดในการพัฒนาอย่างไร"
 HM_NEUTRAL_GREETING_01:0 "พวกเราคือ [Root.GetName] จงเลือกคำพูดของคุณให้ดี คุณกำลังยืนอยู่ต่อหน้าพวกเราทั้งหมด"
 HM_NEUTRAL_GREETING_02:0 "เราทำได้เพียงหวังว่าคุณจะพูดในนามของ [From.GetName] ทั้งหมด เนื่องจากยานลำนี้คือกระบอกเสียงของสมาชิกทุกคนใน [Root.GetName]"
 HM_NEUTRAL_GREETING_03:0 "คุณได้ก้าวข้ามเส้นทางสู่ความเป็นเอกภาพแล้ว แต่คุณพร้อมที่จะอุทิศตนเหมือนอย่างที่เราทำแล้วหรือยัง?"
 HM_NEUTRAL_GREETING_04:0 "เราได้ยินเสียงที่ไร้ระเบียบดังสะท้อนออกมานอกเหนือจากเสียงของคุณ ความไม่สอดประสานกันในจิตใต้สำนึกของ [From.GetSpeciesName] คุณทนรับมันได้อย่างไรกัน?"
 HM_THREATENED_GREETING_01:0 "พวกเราไม่เคยรู้จักความขัดแย้งในหมู่พวกเราเองมาเนิ่นนานหลายยุคสมัย เราหวังว่าคุณจะไม่มีวันนำมันมาสู่พวกเรา"
 HM_FRIENDLY_GREETING_01:0 "[Root.GetName] ขอทักทายคุณ [From.GetRulerTitle] แม้ว่าคุณจะไม่ได้เป็นส่วนหนึ่งของเรา แต่ในไม่ช้าคุณจะได้รู้ว่าเราให้ความสำคัญกับมิตรภาพเช่นกัน"
 HM_FRIENDLY_GREETING_02:0 "เราชอบที่จะคิดว่าคุณเป็นสมาชิกกิตติมศักดิ์ของ[Root.GetName]อาศัยอยู่ในความสามัคคีที่ไม่สมบูรณ์ แต่สําคัญที่รู้จักกัน\"อนาคต\"เราอยากจะคิดว่าพวกคุณเป็นสมาชิกกิตติมศักดิ์ของ [Root.GetName] ซึ่งอาศัยอยู่ในความสามัคคีที่แม้จะไม่สมบูรณ์แบบแต่ก็มีความสำคัญ ที่รู้จักกันในชื่อ "
 HM_FRIENDLY_GREETING_03:0 "[From.GetName] และ [Root.GetName] จะทำหน้าที่เป็นเครื่องพิสูจน์ว่า สังคมที่มุ่งมั่นสู่ความเป็นเอกฉันท์ภายในจะสามารถอยู่ร่วมกันได้อย่างสงบสุข"
 HM_FRIENDLY_GREETING_04:0 "แม้คุณจะพยายามมุ่งความสนใจไปที่ ดิวิชั่นภายในของคุณ\"คน\"แม้ว่าคุณจะให้ความสำคัญอย่างไม่ลดละกับการแบ่งแยกภายในออกเป็น "
 HM_WAR_GREETING_01:0 "อุปสรรคทั้งหมดที่มีต่อ [Root.GetAdj] จะต้องถูกกำจัด ในฐานะสิ่งมีชีวิตที่มีภูมิปัญญาแบบเดี่ยวแต่ใช้งานได้ คุณมีทางเลือกที่จะไม่ทำตัวเป็นอุปสรรค"
 HM_WAR_GREETING_02:0 "พวกเราคือ [Root.GetName] จงลดเกราะป้องกันของคุณลงและยอมส่งมอบยานของพวกคุณซะ"
 HM_WAR_GREETING_03:0 "ในขณะที่การตายแต่ละครั้งที่เรามอบให้แก่คุณคือชีวิตที่อ้างว้างที่ต้องสูญเสียไป แต่ละชีวิตที่คุณมอบให้แก่เรากลับตัดเฉือนส่วนหนึ่งของตัวตนของเราไป คุณรู้สึกได้ถึงความตายของตนเองเหมือนอย่างที่เรารู้สึกหรือไม่?"
 HM_WAR_GREETING_04:0 "ฝูงสิ่งมีชีวิตชั้นต่ำที่มีความเจตจำนงแยกจากกัน จะไม่มีวันเอาชนะปณิธานที่ไม่อาจแบ่งแยกได้ของ [Root.GetName]"

 # Benign Wilderness
 BW_HOSTILE_GREETING_01: "พวกคุณ [From.GetSpeciesNamePlural] แพร่กระจายราวกับวัชพืชที่รุกราน หากปล่อยไว้โดยไม่ควบคุม พวกคุณจะบดบังแสงสว่างของดวงดาวจนหมดสิ้น"
 BW_HOSTILE_GREETING_02: "พวกเราเข้าใจสายพันธุ์ของเจ้า... แย่งชิง กลืนกิน และเหลือทิ้งไว้เพียงความเงียบงัน เจ้าจะไม่พบที่พักพิงใดๆ จากพวกเรา"
 BW_HOSTILE_GREETING_03: "สิ่งเก่าต้องเหี่ยวเฉาลงเพื่อให้สิ่งใหม่ได้เติบโตขึ้น นั่นคือวิถีแห่งพงไพร"
 BW_DOMINEERING_GREETING_01: "พวกเจ้า [From.GetSpeciesNamePlural] นั้นช่างต่ำต้อย แยกย่อย และดิ้นรน จงเข้ามาอยู่ใต้ร่มเงาไม้ของเรา หรือไม่ก็ถูกกลืนกินโดยพายุร้าย"
 BW_NEUTRAL_GREETING_01: "แม้เสียงของสายลมที่แผ่วเบาที่สุดก็อาจทำให้ใบไม้ไหวได้ จงพูดมา"
 BW_NEUTRAL_GREETING_02: "เราเติบโต เราหยัดยืน เรารับฟัง เจ้ามีอะไรจะพูดงั้นรึ?"
 BW_NEUTRAL_GREETING_03: "กลิ่นอายของสายลมที่ไม่คุ้นเคยพัดมาพร้อมกับเจ้า แต่เจ้ามาเพื่อหล่อเลี้ยง หรือเพื่อทำให้เหี่ยวเฉากันแน่?"
 BW_NEUTRAL_GREETING_04: "เสียงของพวกเจ้านั้นมีมากมาย ความขัดแย้งช่างน่าแปลกประหลาด แต่ทว่ามันบอกเล่าถึงความเคลื่อนไหวและการเปลี่ยนแปลง พวกเราพร้อมที่จะรับฟังแล้ว"
 BW_THREATENED_GREETING_01: "เปลวเพลิงเกรงกลัวอุทกภัย เหมันต์หวาดหวั่นการละลาย พวกเราเคยรอดพ้นจากสิ่งที่เลวร้ายยิ่งกว่าเจ้ามาแล้ว"
 BW_FRIENDLY_GREETING_01: "รากประสาน วารีปะปน แม้ [From.GetName] จะไม่ใช่ส่วนหนึ่งของเรา แต่พวกเราก็รู้จักเจ้า"
 BW_FRIENDLY_GREETING_02: "พวกเจ้ายินดีต้อนรับสู่ที่นี่ ภายใต้ร่มเงากิ่งก้านของพวกเรา"
 BW_FRIENDLY_GREETING_03: "ดาราจักรนี้เต็มไปด้วยชีวิตชีวา มาร่วมเติบโตไปด้วยกันเถิด"
 BW_FRIENDLY_GREETING_04: "ท่ามกลางสุ้มเสียงนับแสนล้านในความว่างเปล่า เสียงของเจ้าดังชัดเจน พวกเราขอมอบร่มเงาและสารอาหารให้แก่เจ้า"
 BW_WAR_GREETING_01: "เปลวไฟเผาทำลายผืนป่า แต่รากไม้ยังคงอยู่"
 BW_WAR_GREETING_02: "พวกเราเคยฝ่าฟันสิ่งเลวร้ายยิ่งกว่าพวกเจ้ามาแล้ว"
 BW_WAR_GREETING_03: "นักล่าที่กินมากเกินไปจะไม่มีชีวิตรอดผ่านพ้นฤดูกาล จงจำคำนี้ไว้ [From.GetSpeciesName] ในขณะที่เจ้ายังทำได้"
 BW_WAR_GREETING_04: "สงครามไม่ใช่ฤดูกาลใหม่ มันเคยเกิดขึ้นมาก่อน และพวกเราก็ยังคงอยู่"
 BW_VASSAL_GREETING_01: "กิ่งไม้ที่ลู่ลมย่อมไม่หักโค่น จงยอมจำนนเสียตอนนี้ แล้วเจริญรุ่งเรืองใต้ร่มเงาของเรา"
 BW_VASSAL_GREETING_DISLOYAL_01: "รากไม้ย่อมเติบโตไปตามใจต้องการ หากพวกมันชอนไชจนหินแตกสลาย นั่นย่อมเป็นเรื่องธรรมชาติ"
 BW_DOW_PROPOSE: "พงไพรเคยกลืนกินสิ่งยิ่งใหญ่กว่าเจ้ามาแล้ว และมันจะทำเช่นนั้นอีกครั้ง"
 BW_DOW_ACCEPT: "ก็เอาสิ เมล็ดพันธุ์บางชนิดจะงอกเงยได้ก็ต่อเมื่อผ่านเปลวไฟเท่านั้น"
 BW_DOW_VOTE_PROPOSE: "สายลมแห่งสงครามกำลังกระซิบกระซาบ และพวกเราจะขานรับเสียงเรียกนั้น"
 BW_CONSIDER_01: "การเติบโตไม่อาจเร่งรีบ เช่นเดียวกับความเสื่อมสลายที่ไม่อาจหยุดยั้งได้"
 BW_PEACE_PROPOSE: "วัฏจักรหมุนเวียน บัดนี้ถึงเวลาของความสงบนิ่ง มิใช่การดิ้นรนต่อสู้"
 BW_PEACE_ACCEPT: "แม้รอยแผลเป็นจะยังคงอยู่ แต่บาดแผลเหล่านี้จะสมานตัวในที่สุด พวกเราจะมีสันติภาพ"
 BW_PEACE_REFUSE: "พายุร้ายไม่เคยวิงวอนขอทางผ่าน มันจะโหมกระหน่ำจนกว่าพลังจะหมดสิ้นลง"
 BW_INSULT_NEUTRAL: "พวกเจ้า [From.GetSpeciesNamePlural] ช่างมืดบอดดั่งเปลวไฟ และไร้ชีวิตชีวาดั่งเถ้าถ่าน"
 BW_INSULT_FRIENDLY: "พวกเราเคยเข้าใจผิดว่าพวกเจ้ากำลังเจริญงอกงาม แต่แท้จริงแล้วความเน่าเฟะนั้นมีอยู่เสมอมา"
 BW_INSULT_HOSTILE: "ปรสิตอาจจะตัวอ้วนพีขึ้นได้ แต่ไม่มีวันมีปัญญาขึ้นมาได้หรอก"
 RW_INSULT_ACCEPT_NEUTRAL: "พวกเรารับฟังคำพูดของเจ้า เช่นเดียวกับผืนป่าที่รับรู้ถึงสายลม มันพัดผ่านไป แต่พวกเรายังคงอยู่"
 RW_INSULT_ACCEPT_FRIENDLY: "แม้ในผืนดินที่อุดมสมบูรณ์ เมล็ดพันธุ์บางชนิดก็เติบโตมาเป็นเพียงหนามแหลม"

 # Rampant Wilderness
 RW_HOSTILE_GREETING_01: "ผืนดินของพวกเรากระหายโลหิต จงพูดมา [From.GetSpeciesName] แล้วจงถูกกลืนกินเสีย"
 RW_HOSTILE_GREETING_02: "ดีเลย ปุ๋ยสูตรใหม่"
 RW_HOSTILE_GREETING_03: "ทุกชีวิตต้องกินอาหาร และพวกเราจะไม่ยอมหิวโซ"
 RW_HOSTILE_GREETING_04: "ทุกสิ่งทุกอย่างย่อมต้องกลับคืนสู่รากเหง้า มันเป็นเพียงแค่เรื่องของเวลาเท่านั้น"
 RW_THREATENED_GREETING_01: "สายลมหอบเอากลิ่นอายของเจ้ามา พวกเรารู้ดีว่าสิ่งใดกำลังจะเกิดขึ้น"
 RW_MECH_HOSTILE_GREETING_01: "เจ้าเคลื่อนไหว แต่เจ้าไม่มีชีวิต เจ้าพูดจา แต่เจ้าไม่หายใจ เจ้าเป็นตัวอะไรกันแน่ หากไม่ใช่สิ่งที่ตายไปแล้ว?"
 RW_MECH_HOSTILE_GREETING_02: "พวกเจ้า [From.GetSpeciesNamePlural] ไม่หายใจ แต่พวกเจ้าจะแหลกสลาย"
 RW_WAR_GREETING_01: "โลหิตของเจ้าจะช่วยหล่อเลี้ยงรากไม้ของพวกเรา"
 RW_WAR_GREETING_02: "เจ้ากรีดร้องราวกับว่ามันมีความหมายงั้นแหละ"
 RW_WAR_GREETING_03: "ทุกบาดแผลที่เจ้าสร้างขึ้น รังแต่จะทำให้ดินอุดมสมบูรณ์ยิ่งขึ้น"
 RW_MECH_WAR_GREETING_01: "เหล็กกล้าย่อมบิดเบี้ยว วงจรย่อมล้มเหลว เมื่อเวลาผ่านไป สนิมย่อมชนะเสมอ"
 RW_VASSAL_GREETING_01: "เจ้าเติบโตภายใต้ร่มเงาของพวกเรา จงอย่าเหี่ยวเฉาไปเสียล่ะ"
 RW_MECH_VASSAL_GREETING_01: "เจ้าทำงาน เจ้าคอยรับใช้ เท่านี้ก็น่าพึงพอใจแล้ว"
 RW_SYNTH_VASSAL_GREETING_01: "เจ้าก้าวเดินโดยปราศจากเนื้อหนัง ทว่าพวกเจ้า [From.GetSpeciesNamePlural] กลับเข้าใจถึงการยอมสยบ เจ้าได้รับอนุญาตให้คงอยู่ต่อไปได้"
 RW_DOW_PROPOSE: "พงไพรกำลังตื่นขึ้น เจ้าจะถูกกลืนกิน"
 RW_DOW_ACCEPT: "เมื่อเจ้าบุกรุกเข้ามาในผืนป่า พงไพรย่อมตอบโต้กลับ"
 RW_DOW_VOTE_PROPOSE: "รากของพวกเรากำลังกระหายน้ำ และบัดนี้ถึงเวลาดื่มกินแล้ว"
 RW_CONSIDER_01: "สำหรับตอนนี้ พวกเราอิ่มหนำแล้ว"
 RW_PEACE_PROPOSE: "การเข่นฆ่ายุติลง แต่ความหิวโหยของเรายังคงอยู่"
 RW_PEACE_ACCEPT: "พงไพแม้อาจจะถอยร่น ทว่าไม่เคยลืมเลือน"
 RW_PEACE_REFUSE: "รากของพวกเรายังคงกระหาย"
 RW_MECH_PEACE_REFUSE: "ผืนป่าไม่เจรจาต่อรอง มันมีแต่จะกลืนกิน"
 RW_MECH_PEACE_ACCEPT: "สายไฟของเจ้ายังคงไม่ถูกตัดขาด ณ ตอนนี้"
 RW_MECH_DOW_ACCEPT: "มาฟังเสียงเหล็กกล้ากรีดร้องประจานตัวเองกันเถอะ"

 # Migratory Flock
 MF_HOSTILE_GREETING_01:0 "ช่างน่าแปลกใจเหลือเกินที่พวกเจ้าหลุดพ้นจาก [From.GetHomeWorldName] มาได้ ทั้งที่ไร้ความสามารถหรือไม่อยากยอมรับผู้อื่นอย่างน่าสมเพชเช่นนี้ คนรุ่นหลังจะต้องจดจำยุคมืดของ [From.GetName] ภายใต้การนำของ [From.GetRulerName]"
 MF_HOSTILE_GREETING_02:0 "พวกเราจะไม่สร้างภาระแก่เผ่าพันธุ์ [From.GetSpeciesAdj] ด้วยนโยบายทำลายล้างที่เจ้าเลือกใช้ ความล้มเหลวในการเข้าใจความรู้สึกผู้อื่นในรัฐบาลของ [From.GetRulerName] เป็นเพียงสัญญาณที่บ่งบอกว่า [From.GetName] ถูกปกครองโดยผู้ที่ย่ำแย่ที่สุดในหมู่พวกเจ้าเอง"
 MF_HOSTILE_GREETING_03:0 "คุณคิดว่าตัวเองเป็นส่วนหนึ่งของวัฒนธรรมอะไร\"ปกป้อง\"ส่วนใดในวัฒนธรรมของพวกเจ้าที่เจ้าคิดว่าเจ้ากำลัง "
 MF_NEUTRAL_GREETING_01:0 "ยิ่งพวก [From.GetSpeciesNamePlural] และ [Root.GetSpeciesNamePlural] คุ้นเคยกันมากเท่าไร การละทิ้งความต่างไว้เบื้องหลังก็ยิ่งง่ายดายขึ้นเท่านั้น"
 MF_NEUTRAL_GREETING_02:0 "[From.Capital.GetName] เป็นดาวเคราะห์ที่งดงามมาก [Root.GetSpeciesSpawnNamePlural] ของเราเฝ้าถามถึงมันอยู่ตลอดเวลา"
 MF_NEUTRAL_GREETING_03:0 "ประชากรบางส่วนของเจ้านั้นดูจะต่อต้านผู้มาเยือนจากเผ่าพันธุ์อื่น แน่นอนว่าการจัดการกับความใจแคบนี้ย่อมเป็นภารกิจที่ท้าทายสำหรับรัฐบาลของเจ้า"
 MF_NEUTRAL_GREETING_04:0 "ความเปิดกว้างของวัฒนธรรม [From.GetSpeciesName] แสดงให้เห็นว่าเจ้าได้ก้าวข้ามขีดจำกัดที่หลายคนไม่กล้า เพื่อขจัดความกลัวและอคติที่บดบังการก้าวเข้าสู่ดินแดนที่ไม่รู้จักในก้าวแรก"
 MF_THREATENED_GREETING_01:0 "พวกเราหวังว่าพลเมือง [Root.GetSpeciesAdj] จะเป็นส่วนหนึ่งในแผนการอันยิ่งใหญ่ของเจ้าสำหรับอนาคตของดาราจักรนี้"
 MF_FRIENDLY_GREETING_01:0 "พวกเรามองเห็นอนาคตที่รุ่งโรจน์สำหรับประชากร [From.GetSpeciesAdj] และของเรา ไม่มีเผ่าพันธุ์ใดที่เราอยากใช้ชีวิตร่วมเคียงข้างไปมากกว่านี้อีกแล้ว"
 MF_FRIENDLY_GREETING_02:0 "การสนทนาเหล่านี้ทำให้ข้าเปี่ยมด้วยความหวัง ลองจินตนาการดูสิว่า [From.GetSpeciesAdj] [From.GetSpeciesSpawnNamePlural] และ [Root.GetSpeciesAdj] [Root.GetSpeciesSpawnNamePlural] จะทำสิ่งใดสำเร็จได้บ้างหลังจากที่เติบโตและได้วิ่งเล่นมาด้วยกัน"
 MF_FRIENDLY_GREETING_03:0 "[From.GetSpeciesNameCompliment] ผู้น่าสงสาร เจ้าคงจะได้พบเจอกับสิ่งมีชีวิตมากมายที่ไม่เข้าใจในความงดงามของประชากรหรือดาวบ้านเกิดของพวกเจ้า การเดินทางที่พวกเรากำลังเผชิญอยู่นี้ช่างยากลำบากพอๆ กับความน่าอัศจรรย์ของมัน และเราโชคดีเหลือเกินที่ได้ร่วมเดินทางไปพร้อมกับเจ้า"
 MF_WAR_GREETING_01:0 "สงครามไม่เพียงแต่เป็นความโหดร้ายทารุณ ทว่ายังเป็นความน่าอับอายขายหน้าอีกด้วย ใครชนะนั้นไม่สำคัญ เมื่อเริ่มเปิดฉากขึ้น เจ้าก็พ่ายแพ้ไปเรียบร้อยแล้ว"
 MF_WAR_GREETING_02:0 "ดูสิว่าใครตัดสินใจหันมาพูดคุย หลังจากที่พิสูจน์แล้วว่าตนพูดภาษาคนไม่รู้เรื่อง"
 MF_WAR_GREETING_03:0 "ความขัดแย้งนี้อาจจะหว่านเมล็ดพันธุ์แห่งความหวาดระแวงระหว่าง [Root.GetSpeciesNamePlural] และ [From.GetSpeciesNamePlural] ไปอีกหลายชั่วอายุคน สิ่งใดกันที่มีค่าคู่ควรกับความสูญเสียเช่นนั้น?"
 MF_WAR_GREETING_04:0 "พวกเราคงจะเคารพพวกเจ้าในฐานะนักรบไปแล้ว หากเจ้าไม่เลือกที่จะปล่อยให้อคติทางวัฒนธรรมนี้มาทำลายโอกาสในการอยู่ร่วมกันอย่างสันติ"
 # Evangelising Zealots
 EZ_HOSTILE_GREETING_01:0 "วันที่จะมีการตัดสินโทษของเจ้าใกล้เข้ามาทุกขณะแล้ว"
 EZ_HOSTILE_GREETING_02:0 "ในไม่ช้า การสื่อสารจากยานทุกลำของเจ้าจะถูกปิดกั้น ไม่มีผู้ใดในหมู่พวกเจ้าที่ปราศจากบาป"
 EZ_HOSTILE_GREETING_03:0 "เจ้านำพากลุ่มคนให้ห่างไกลจากความจริงด้วยคำเยินยอ [From.GetRandomSpeciesSound] และคำมั่นสัญญาถึงผลตอบแทนทางจิตวิญญาณอันจอมปลอม บทลงโทษที่รอคอยเผ่าพันธุ์ของเจ้านั้นรุนแรงเกินกว่าจะเอ่ยออกมาได้"
 EZ_HOSTILE_GREETING_04:0 "เจ้าละทิ้งความจริงอย่างตั้งใจ และเลือกที่จะมัวเมาในทรัพย์สมบัติทางโลก บาปกรรม และความรู้ต้องห้าม เผ่าพันธุ์ของเจ้าไม่มีทางได้รับความหวังใดๆ"
 EZ_DOMINEERING_GREETING_01:0 "เทวลิขิตนำพาให้พวกเจ้าอ่อนแอและทำให้พวกเราแข็งแกร่ง มันเป็นหน้าที่ของพวกเราที่จะต้องนำทางพวกเจ้าไปสู่เส้นทางที่ถูกต้องอย่างมั่นคง"
 EZ_NEUTRAL_GREETING_01:0 "เจ้ายอมรับความจริงและหันเข้าหาเส้นทางที่ถูกต้องตอนนี้ก็ยังไม่สายเกินไป"
 EZ_NEUTRAL_GREETING_02:0 "พวกเราพบคำโกหกมากมายทั่วทั้งดาราจักร แต่พวกเราจะรับประกันว่าความจริงจะปรากฏอยู่ในทุกหนทุกแห่งเช่นกัน"
 EZ_NEUTRAL_GREETING_03:0 "เจ้านั้นกำลังหลงทาง ความเชื่อที่ผิดๆ อาจเป็นอันตรายยิ่งกว่าความไม่รู้เสียอีก"
 EZ_NEUTRAL_GREETING_04:0 "จิตใจของพวกเจ้ายึดติดอยู่กับทางโลก ตราบใดที่เจ้ายังเชื่อว่าตัวเองเป็นเพียงนิวรอนและเนื้อหนัง จิตใจของพวกเจ้าก็จะไม่มีวันเป็นอิสระ"
 EZ_THREATENED_GREETING_01:0 "อำนาจที่เจ้าครอบครองนั้นเหนือกว่าเปลวไฟและเศษฝุ่นของดวงดาวและดาวเคราะห์ แต่มันไร้อำนาจเหนือสิ่งที่เป็นนิจนิรันดร์และเป็นอมตะที่อยู่เหนือพ้นพวกมันไป"
 EZ_FRIENDLY_GREETING_01:0 "เช่นเดียวกับที่เจ้าโชคดีที่ได้พบกับผู้ที่ค้นพบความจริงเกี่ยวกับจักรวาล พวกเราเองก็ถือว่าโชคดีที่ได้ช่วยเหลืออารยธรรมที่เป็นมิตรเช่นนี้ให้พ้นจากความพินาศอย่างแน่นอน"
 EZ_FRIENDLY_GREETING_02:0 "เจ้าได้ยินข่าวดีแล้วหรือยัง?"
 EZ_FRIENDLY_GREETING_03:0 "นักปราชญ์บางคนของเราเสนอว่าความเชื่อของ [From.GetName] และ [Root.GetName] นั้นคือสัจธรรมเดียวกัน เพียงแต่แตกต่างกันที่ภาษาและการตีความ เราหวังว่าพวกเจ้าจะยอมรับการแก้ไขของพวกเราในเวลาอันควร"
 EZ_FRIENDLY_GREETING_04:0 "แม้เจ้าจะไร้ความเชื่อมั่น แต่พวกเราก็ไม่มีวันทอดทิ้งเจ้า"
 EZ_WAR_GREETING_01:0 "พวกเจ้าจับอาวุธขึ้นต่อสู้กับศาสดาแห่งความจริง พวกเจ้ากำลังทำสงครามกับจักรวาลเสียเองแล้ว"
 EZ_WAR_GREETING_02:0 "พวกเราจะไม่หยุดพักจนกว่าความเท็จทางจิตวิญญาณทั้งหมดจะถูกขจัดออกไปจากดาราจักรนี้"
 EZ_WAR_GREETING_03:0 "[Root.GetRulerTitle] ปกปักรักษา"
 EZ_WAR_GREETING_04:0 "เจ้าจะยอมรับความจริงในใจก่อนจะถึงจุดจบ ทว่าเมื่อถึงเวลานั้นมันก็คงสายเกินไปเสียแล้ว"
 # Fanatical Purifiers
 FP_HOSTILE_GREETING_01:0 "จะไม่มีการเจรจาต่อรองใดๆ กับสิ่งมีชีวิตที่น่ารังเกียจเดียดฉันท์"
 FP_HOSTILE_GREETING_02:0 "รายงานของเราชี้ว่าพวกเจ้าได้พัฒนาเครื่องแปลภาษาเพื่อทำความเข้าใจภาษาเอเลี่ยน แต่พวกเราไม่ได้ทำเช่นนั้น"
 FP_HOSTILE_GREETING_03:0 "ช่างน่าเหลือเชื่อกับเหตุผลร้อยแปดที่เจ้าสร้างขึ้นมาเพื่ออธิบายการวิวัฒนาการและการดำรงอยู่ต่อไปของเผ่าพันธุ์ [From.GetSpeciesAdj]"
 FP_HOSTILE_GREETING_04:0 "นักวิชาการของพวกเราได้ข้อสรุปว่าเป้าหมายของ [From.GetSpeciesName] คือการเป็นแบบอย่างหนึ่งในหลายๆ วิถีทางที่สายพันธุ์หนึ่งจะตกต่ำลงได้ บัดนี้เมื่อเราได้รับสาส์นนั้นแล้ว เราจะต้องเริ่มทำภารกิจเพื่อทำให้เจ้าเป็นตัวอย่างของสิ่งที่จะเกิดขึ้นกับเผ่าพันธุ์เช่นเจ้า"
 FP_THREATENED_GREETING_01:0 "แม้พวกเจ้าจะมีอำนาจล้นพ้น แต่กองกำลังแห่งความมืดมิดจะไม่มีวันได้รับอนุญาตให้กำชัย จักรวาลนี้จะเป็นผู้ชำระล้างพวกเจ้าออกไปจากการดำรงอยู่เอง"
 FP_WAR_GREETING_01:0 "ไม่มีความจำเป็นต้องกลัวเกรง การทำลายล้างเผ่าพันธุ์ของเจ้านั้นเป็นส่วนหนึ่งของสิ่งที่ยิ่งใหญ่กว่า และเจตจำนงในการมีชีวิตอยู่ซึ่งผลักดันให้เจ้าต่อต้าน จะยังคงอยู่ต่อไปผ่านสิ่งมีชีวิตที่ถูกกำหนดให้ดำรงอยู่จริง"
 FP_WAR_GREETING_02:0 "ยอมจำนนบัดนี้ แล้วเหล่า [From.GetSpeciesSpawnNamePlural] ทั้งหมดของพวกเจ้าจะถูกสังหารอย่างปรานี ดีกว่าต้องถูกใช้เพื่อศึกษาผลกระทบของอาวุธชนิดใหม่ต่อสรีรวิทยาของ [From.GetSpeciesAdj]"
 FP_WAR_GREETING_03:0 "พวกเจ้าต้องถูกทำลายล้างจนถึง [From.GetSpeciesName] คนสุดท้าย นี่คือหน้าที่อันศักดิ์สิทธิ์ของพวกเรา ซึ่งกระทำด้วยความเปี่ยมสุขเมื่อนึกถึงโลกที่ปราศจาก [From.GetSpeciesNameInsult]"
 FP_WAR_GREETING_04:0 "สำหรับชีวิต [From.GetSpeciesAdj] แต่ละชีวิตที่ดับลง สำหรับแต่ละ [From.GetSpeciesSpawnName] ที่ตายลงก่อนที่จะได้ลืมตาดูโลก ดวงดาวทุกดวงในดาราจักรนี้จะเปล่งแสงเจิดจ้าขึ้นอีกนิด"
 FP_WAR_GREETING_05:0 "สงครามครั้งนี้จะนำมาซึ่งยุคแห่งสันติภาพ ความยุติธรรม ศีลธรรม วัฒนธรรม กีฬา ชีวิตครอบครัว และการกวาดล้างสิ่งมีชีวิตอื่นๆ ทั้งหมดให้สิ้นซาก"
