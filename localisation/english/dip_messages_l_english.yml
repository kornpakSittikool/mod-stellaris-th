 # General Greetings
 DEFAULT_GREETINGS_STRING:0 "ยินดีต้อนรับ!"
 01_HOSTILE_GREETING:1 "จงแถลงเจตจำนงของคุณมาซะ เจ้า [From.GetSpeciesNameInsult]"
 02_HOSTILE_GREETING:0 "คุยให้มันสั้นๆ หน่อยพวก [From.GetSpeciesName] ความอดทนในการคุยเล่นที่ไร้สาระของเรามันหมดไปนานแล้ว"
 03_HOSTILE_GREETING:0 "ไม่ต้องมาเล่นลิ้นแล้วพวก [From.GetSpeciesName] ต้องการอะไร?"
 04_HOSTILE_GREETING:0 "คุณได้รับความสนใจจากพวก [Root.GetName] แล้ว จงพูดมาโดยเร็ว"
 05_HOSTILE_GREETING:0 "ทำไมคุณไม่ปล่อยให้เราอยู่คนเดียวซะทีล่ะพวก [From.GetSpeciesName]?"
 06_HOSTILE_GREETING:1 "พวกแกมันก็แค่พวก [From.GetSpeciesNamePluralInsult] โสโครกที่เป็นภัยคุกคามต่อสันติภาพของกาแล็กซี!"
 07_HOSTILE_GREETING:1 "ไตร่ตรองคำพูดของคุณให้ดี เจ้า [From.GetSpeciesNameInsult] กองทัพของเราสามารถบดขยี้ประเทศอันน่าสมเพชของคุณให้แหลกลาญได้ในพริบตา"
 08_HOSTILE_GREETING:1 "อย่าคิดว่าพวก [Root.GetName] จะแสดงความเมตตาต่อพวกแก เพียงเพราะว่าพวกแกมัน [From.GetSpeciesNamePluralInsult] ที่โง่เขลาเกินกว่าจะปกป้องตนเองได้"
 09_HOSTILE_GREETING:1 "เจ้าคนนอกรีต [From.GetSpeciesNameInsult] เสียง [From.GetRandomSpeciesSound] อันหยาบช้าของแกเข้าหูพวก [Root.GetName] แล้ว ต้องการอะไรกันแน่?"
 10_HOSTILE_GREETING:0 "ปรัชญาวัตถุนิยมอันนอกรีตของพวกแกได้เปลี่ยนเผ่าพันธุ์ของแกให้กลายเป็นเครื่องจักรที่ไร้วิญญาณไปแล้วพวก [From.GetSpeciesName]"
 11_HOSTILE_GREETING:0 "ประเทศของคุณทั้งบกพร่องและล้าหลังพวก [From.GetSpeciesName] มันช่างเจ็บปวดเหลือเกินที่ต้องมาทนเห็นความไร้ประสิทธิภาพเช่นนี้"
 12_HOSTILE_GREETING:0 "อา พวกคลั่งลัทธิ [From.GetSpeciesName] หากคุณมาเพื่อชักจูงพวก [Root.GetName] ให้หันไปนับถือศาสนาอันน่ารังเกียจของคุณละก็ ผมจะตัดการสื่อสารทันที"
 13_HOSTILE_GREETING:0 "[From.GetSpeciesName] คุณควรจะรู้ไว้นะว่าคนของคุณไม่ค่อยเป็นที่ชื่นชอบในหมู่พลเมืองของเราเท่าไหร่นัก"
 14_HOSTILE_GREETING:1 "เราจะไม่ยอมให้คุณมากดขี่พวกเราเหมือนอย่างที่คุณกักขังประชากรของตนเองภายใต้ระบอบเผด็จการอันน่าเวทนานั้นหรอก"
 #15_HOSTILE_GREETING:1 "Our entire nation stands united in the contempt we feel towards you, [From.GetSpeciesName]. My [Root.GetSpeciesOrganName] churns at the mere sight of you."
 #16_HOSTILE_GREETING:1 "How lonely and selfish your citizens must be, [From.GetSpeciesName]. In your mad quest for individual rights, your government has failed utterly to give them purpose."
 17_HOSTILE_GREETING:0 "ฉันไม่มีวันเข้าใจเลยจริงๆ ว่าสิ่งมีชีวิตอย่างแกกำเนิดขึ้นมาได้อย่างไร เจ้า [From.GetSpeciesNameInsult] อย่าว่าแต่เรื่องที่ดั้นด้นเดินทางมาถึงอวกาศได้เลย!"
 18_HOSTILE_GREETING:1 "เราไม่อยากสุงสิงกับเผ่าพันธุ์อันเลวทรามอย่างแก เจ้า [From.GetSpeciesNameInsult] ทำไมถึงมาติดต่อกับพวก [Root.GetName]?"
 19_HOSTILE_GREETING:1 "จะมีอะไรที่สิ่งมีชีวิตอวกาศอันต่ำต้อยอย่างเจ้า [From.GetSpeciesNameInsult] จะพูดออกมาแล้วทำให้พวก [Root.GetName] สนใจได้ล่ะ?"
 20_HOSTILE_GREETING:0 "พวกคุณอาจจะเรียกตนเองว่าเป็น [From.GetSpeciesName] แต่ประเทศอันน่าเวทนาของคุณได้ถูกครอบงำด้วยอิทธิพลของต่างดาวอย่างเห็นได้ชัด ต้องการอะไร?"
 21_HOSTILE_GREETING:0 "รัฐบาลที่หลงผิดของคุณเป็นเรื่องที่น่าอับอายขายหน้าต่อเผ่าพันธุ์อันน่าภาคภูมิใจของคุณยิ่งนัก"
