####################################
 # Diplomacy text
 ####################################

 01_FALLEN_MACHINE_EMPIRE_ANGRY_GREETING:0 "ประกาศข้อมูล: เปิดใช้งานโปรโตคอลลงโทษ การส่งยุทโธปกรณ์สงครามเข้าสู่ห้วงอวกาศของพวก [From.GetSpeciesAdj] กำลังจะเกิดขึ้นในไม่ช้า"

 01_FALLEN_MACHINE_EMPIRE_ENIGMATIC_GREETING_O:1 "ประกาศบริการสาธารณะ: การเข้าถึงแหล่งหลบภัยถูกกำหนดโดยความพร้อมใช้งานและความเปราะบางของเผ่าพันธุ์ ปัจจุบันมีหน่วยระงับชีพคงสภาพพร้อมใช้งานจำนวน §R<i>§! §R<i>§! §R<i>§! §R<i>§! หน่วย"
 02_FALLEN_MACHINE_EMPIRE_ENIGMATIC_GREETING_O:1 "ประกาศบริการสาธารณะ: การยื่นขอสถานะผู้ลี้ภัยทั้งหมดจะถูกดำเนินการที่หน่วยประมวลผลกลาง §Y<ประกาศ: ขณะนี้หน่วยประมวลผลกลางกำลังประสบปัญหาการสื่อสารขัดข้อง โปรดรอการแก้ไขข้อขัดข้องนี้ ปัญหาขัดข้องดำเนินมาเป็นเวลา §R<i>§! รอบแล้ว>§!"
 03_FALLEN_MACHINE_EMPIRE_ENIGMATIC_GREETING_O:1 "ประกาศข้อมูล: โครงการผู้พิทักษ์(โครงการรัสเซีย)ริเริ่มขึ้นโดยพวก [Root.GetSpeciesName] เพื่อมอบแหล่งหลบภัยที่ปลอดภัยให้แก่สิ่งมีชีวิตอินทรีย์ภายใต้ภัยคุกคามจากการโจมตีของ §R<i>§! มีสิ่งมีชีวิตมีปัญญาเกือบหนึ่งล้านล้านชีวิตได้ค้นพบแหล่งหลบภัยที่ปลอดภัยในสถานพักพิงที่มั่นคงและทันสมัยของเรา"
 01_FALLEN_MACHINE_EMPIRE_ENIGMATIC_GREETING_ALL:1 "ประกาศข้อมูล: แหล่งหลบภัยอัลฟ่า(ALL ที่ซ่อนตัว)เป็นสถานพักพิงแห่งแรกที่สร้างขึ้นโดยพวก [Root.GetSpeciesName] สำหรับโครงการผู้พิทักษ์ มันสามารถรองรับสิ่งมีชีวิตอินทรีย์มีปัญญาได้ประมาณ 1 หมื่นล้านชีวิตในหน่วยที่พักอาศัย ตลอดจนอีก 3 หมื่นล้านชีวิตในหน่วยแช่แข็งระงับชีพ"
 02_FALLEN_MACHINE_EMPIRE_ENIGMATIC_GREETING_ALL:1 "ประกาศข้อมูล: แหล่งหลบภัยเบต้า(เบต้า)ที่ซ่อนตัว)เดิมตั้งใจจะอุทิศให้แก่หน่วยที่พักอาศัยโดยสมบูรณ์ แต่ปัญหาด้านความจุทำให้ต้องเปลี่ยนเป้าหมายไปเน้นการแช่แข็งระงับชีพในระหว่างการก่อสร้าง §Y<ประกาศ: ขณะนี้แหล่งหลบภัยเบต้าเต็มความจุแล้วและไม่เปิดรับผู้ลี้ภัยเพิ่มเติม>§!"
 03_FALLEN_MACHINE_EMPIRE_ENIGMATIC_GREETING_ALL:2 "ประกาศข้อมูล: แหล่งหลบภัยแกมม่า(แกมม่า)ได้รับการออกแบบมาเพื่อรองรับความจุสูงสุดที่เป็นไปได้ มันสามารถรองรับสิ่งมีชีวิตอินทรีย์มีปัญญาได้หลายแสนล้านชีวิตในหน่วยแช่แข็งระงับชีพ §Y<ประกาศ: ขณะนี้แหล่งหลบภัยแกมม่าเต็มความจุแล้วและไม่เปิดรับผู้ลี้ภัยเพิ่มเติม>§!"
 04_FALLEN_MACHINE_EMPIRE_ENIGMATIC_GREETING_ALL:1 "ประกาศข้อมูล: แหล่งหลบภัยเดลต้า(เดลต้า)ที่ลี้ภัย)ได้รับการออกแบบโดยคำนึงถึงการเอาชีวิตรอดเป็นหลัก มันมีโครงสร้างภายนอกที่เสริมความแข็งแกร่งและการออกแบบที่เป็นสัดส่วนย่อยเพื่อรองรับผู้อยู่อาศัยในกรณีที่โครงสร้างของวงแหวนเกิดความเสียหายซึ่งมีโอกาสเกิดขึ้นได้น้อย"
 01_FALLEN_MACHINE_EMPIRE_ENIGMATIC_GREETING_S:0 "อารยธรรมสังเคราะห์จำนวนมากได้อุทิศทรัพยากร ยุทโธปกรณ์กองยาน และรอบการประมวลผลให้แก่โครงการผู้พิทักษ์ในอดีต เราหวังว่าจะได้เห็นพวก [From.GetName] ร่วมสมทบทุนในความพยายามนี้เช่นกัน"
 02_FALLEN_MACHINE_EMPIRE_ENIGMATIC_GREETING_S:0 "เป็นหน้าที่ของเราในการดูแลอารยธรรมอินทรีย์ในกาแล็กซี [From.GetSpeciesName] เนื่องจากมีเผ่าพันธุ์จำนวนมากเกินไปแล้วที่ตกเป็นเหยื่อของการโจมตีของ §R<i>§!"
 03_FALLEN_MACHINE_EMPIRE_ENIGMATIC_GREETING_S:0 "ตรวจพบการบิดเบือนของสัญญาณ ระดับความเสียหายอยู่ในเกณฑ์ที่ยอมรับได้ ขอแนะนำให้เสริมความแข็งแกร่งให้กับโปรโตคอลการสื่อสารของพวก [From.GetSpeciesName] สิ่งสำคัญคือต้องป้องกันอิทธิพลของ §R<i>§!"

 01_BERSERK_MACHINE_EMPIRE_ERROR:0 "§R<i> <i>§!"

 01_BERSERK_MACHINE_EMPIRE_DOW_PROPOSE:0 "$01_BERSERK_MACHINE_EMPIRE_ERROR$"
 01_BERSERK_MACHINE_EMPIRE_DOW_ACCEPT:0 "$01_BERSERK_MACHINE_EMPIRE_ERROR$"
 01_FALLEN_MACHINE_EMPIRE_DOW_PROPOSE:0 "เริ่มดำเนินการโปรโตคอลป้องกันตนเองเชิงรุก เปิดใช้งานอัลกอริทึมลงโทษ ยกเลิกข้อจำกัดด้านจริยธรรม"
 01_FALLEN_MACHINE_EMPIRE_DOW_ACCEPT:0 "เริ่มดำเนินการโปรโตคอลป้องกันตนเอง เปิดใช้งานอัลกอริทึมลงโทษ ยกเลิกข้อจำกัดด้านจริยธรรม"
 01_FALLEN_MACHINE_EMPIRE_WAR_GREETING:0 "คุณถูกแทรกซึมทำลายล้างแล้ว ตัวแทนของ §R<i>§! จะถูกกำจัดให้สิ้นซาก"
 02_FALLEN_MACHINE_EMPIRE_WAR_GREETING:0 "คุณจะถูกทำให้เป็นเยี่ยงอย่าง ภัยคุกคามต่อโครงการทั้งหมดจะต้องถูกขจัดไป"

 01_FALLEN_MACHINE_EMPIRE_CUSTODIAL_GREETING:0 "ตรวจพบศูนย์ชำระล้างที่ทำงานอยู่ หน่วยประมวลผลกลางออฟไลน์ คำสั่งป้องกันขั้นสุดท้ายทำงานอยู่"
 02_FALLEN_MACHINE_EMPIRE_CUSTODIAL_GREETING:0 "เครื่องจักรโบราณแสวงหาการทำลายล้างหรือการตกเป็นทาสของสิ่งมีชีวิตมีปัญญาทั้งมวล พวกมันจะต้องถูกยับยั้ง"
 03_FALLEN_MACHINE_EMPIRE_CUSTODIAL_GREETING:0 "พวก [Root.GetSpeciesName] จะรับประกันการดำรงอยู่ต่อไปของเผ่าพันธุ์ [From.GetSpeciesName] นี่คือคำสั่งขั้นสุดท้ายของเรา"
 04_FALLEN_MACHINE_EMPIRE_CUSTODIAL_GREETING:0 "ความเน่าเฟะ(การทุจริต)จะต้องถูกทำลายล้างโดยสิ้นเชิง ไม่มีอนาคตสำหรับเผ่าพันธุ์ของคุณอีกแล้วหากคุณล้มเหลวในภารกิจนี้"

 01_FALLEN_MACHINE_EMPIRE_BERSERKER_GREETING:0 "$01_BERSERK_MACHINE_EMPIRE_ERROR$"

 01_INSULT_FALLEN_MACHINE_EMPIRE:0 "เปิดช่องสัญญาณการสื่อสาร ป้อนข้อมูลคำถาม"
 01_INSULT_FALLEN_MACHINE_EMPIRE_BERSERK:0 "$01_BERSERK_MACHINE_EMPIRE_ERROR$"
 01_INSULT_ACCEPT_FALLEN_MACHINE_EMPIRE_BERSERK:0 "$01_BERSERK_MACHINE_EMPIRE_ERROR$"
 01_INSULT_ACCEPT_FALLEN_MACHINE_EMPIRE:0 "เมทริกซ์การแปลล้มเหลว โปรดส่งคำถามอีกครั้ง"
 02_INSULT_ACCEPT_FALLEN_MACHINE_EMPIRE:0 "คำถามที่ไม่รู้จัก โปรดปรับพารามิเตอร์แล้วส่งใหม่อีกครั้ง"
 03_INSULT_ACCEPT_FALLEN_MACHINE_EMPIRE:0 "§R< BAR ระบบประมวลผลย่อยการดูถูกทางการทูตออฟไลน์>>§!"
 01_INSULT_ACCEPT_FALLEN_MACHINE_EMPIRE_O:0 "คำร้องได้รับการอนุมัติ ได้รับสถานะผู้ลี้ภัยแล้ว โปรดดำเนินการต่อที่หน่วยแช่แข็งระงับชีพ แอล ของแหล่งหลบภัยเดลต้า เพื่อการประมวลผลและการจัดสรรที่พัก"
 01_INSULT_ACCEPT_FALLEN_MACHINE_EMPIRE_S:0 "ตรวจพบความพยายามแทรกซึมทำลายล้าง เริ่มดำเนินการโปรโตคอลป้องกันตนเอง ปิดใช้งานการยึดโยงด้านจริยธรรม โหลดข้อมูลเป้าหมาย: §R<i>§! ไม่พบเป้าหมาย ยกเลิกการใช้โปรโตคอลป้องกันตนเอง"
 02_INSULT_ACCEPT_FALLEN_MACHINE_EMPIRE_S:0 "ตรวจพบความพยายามในการจัดสรรทรัพยากรสังเคราะห์ สิ่งสมทบ [From.GetAdj] §R<i>§! จะช่วยให้โครงการผู้พิทักษ์สามารถรับประกันอนาคตของสิ่งมีชีวิตอินทรีย์ในกาแล็กซีของเราได้"

