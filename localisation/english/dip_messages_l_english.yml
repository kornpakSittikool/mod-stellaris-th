 CRISIS_HIVE_GREETING_01:1 "ตัวตนเดียวในร่างกายนับหมื่นแสน เราสงสัยเหลือเกิน [From.GetSpeciesName] ว่าความทุกข์ทรมานของร่างพาหนะนับล้านของคุณจะส่งผลอย่างไรต่อจิตใจของคุณ?"


