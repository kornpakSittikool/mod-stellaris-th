 ORG_TO_MECH_ITOA_ACCEPT_04:0 "มันสร้างความยินดีให้เราเป็นอย่างยิ่งที่จะได้กระชับความสัมพันธ์ระหว่างสองประเทศของเราให้แน่นแฟ้นยิ่งขึ้นด้วยการเป็นพันธมิตรกัน"
 ORG_TO_MECH_ITOA_REFUSE_HOSTILE_01:0 "คุณสังเกตเราด้วยเซ็นเซอร์ที่เย็นชาและว่างเปล่า พยายามคาดเดาทุกการเคลื่อนไหวถัดไปของเรา เราจะไปเชื่อใจสิ่งสร้างที่บิดเบี้ยวเช่นนี้ได้อย่างไรกัน?"
 ORG_TO_MECH_ITOA_REFUSE_SPIR_01:0 "คุณอาจจะเดินเหมือนสิ่งมีชีวิตอินทรีย์และพูดเหมือนสิ่งมีชีวิตอินทรีย์ แต่คุณไม่ใช่สิ่งมีชีวิตอินทรีย์ คุณคือเครื่องจักรที่ไร้วิญญาณ และเราจะไม่ขอมีส่วนร่วมในพันธมิตรที่นอกรีตเช่นนี้"
 ORG_TO_MECH_ITOA_REFUSE_01:0 "ขออภัยด้วย [From.GetSpeciesClassPlural] ตอนนี้เรายังไม่มีความจำเป็นต้องมีพันธมิตร"
 ORG_TO_MECH_ITOA_PROPOSE_01:1 "มาร่วมทีมกับผู้ชนะเถอะ [Root.GetSpeciesNamePlural] เราน่าจะได้ประโยชน์จากเครื่องจักรที่ยอดเยี่ยมอย่างคุณมาอยู่ข้างเรานะ"
 ORG_TO_MECH_ITOA_PROPOSE_02:1 "เราอาจจะทำมาจากเนื้อหนัง และคุณทำมาจากโลหะ แต่มีน้อยคนนักที่จะเข้าใจ [From.GetSpeciesNamePlural] ได้ดีเหมือนอย่างคุณ"
 ORG_TO_MECH_ITOA_PROPOSE_03:0 "เชื้อเพลิง, แบตเตอรี่, สัตว์เลี้ยงไฟฟ้า - ไม่ว่าสิ่งที่คุณต้องการจะเป็นอะไร - เราสามารถทำร่วมกันให้เกิดขึ้นจริงได้"
 ORG_TO_MECH_ITOA_PROPOSE_04:1 "เราเป็นที่ชื่นชอบในหมู่สิ่งมีชีวิตอื่นๆ ในกาแล็กซี มาอยู่ข้างเราสิ แล้วจะได้เข้ามามีส่วนร่วมในการเมืองของสิ่งมีชีวิตอินทรีย์"
 #ORG_TO_MECH_ITOA_VOTE_PROPOSE: "If we intend to grow our federation's sphere of influence we need to grow in numbers. We believe the §Y[Root.GetName]§! could make a powerful ally."
 ORG_TO_MECH_ASK_JOIN_A_SELECT_01:0 "เราแทบจะได้ยินเสียงพัดลมของคุณเร่งความเร็วจากตรงนี้เลย มีอะไรทำให้หน่วยประมวลผลของคุณยุ่งอยู่หรือเปล่า?"
 ORG_TO_MECH_ASK_JOIN_A_PROPOSE_01:0 "เราชื่นชมในความไร้อารมณ์ของคุณและรสนิยมอันไร้ที่ติในเรื่องน้ำมันเครื่องมาโดยตลอด คุณจะพิจารณาให้เราเป็นสมาชิกใน §Y[Root.GetAllianceName]§! หรือไม่?"
 ORG_TO_MECH_ASK_JOIN_A_PROPOSE_02:0 "เราเชื่อว่า §Y[Root.GetAllianceName]§! กำลังมุ่งหน้าไปสู่สิ่งทียิ่งใหญ่ เครื่องจักรคืออนาคตและเราปรารถนาที่จะเป็นส่วนหนึ่งของมัน"
 ORG_TO_MECH_ASK_JOIN_A_ACCEPT_01:1 "เราเฝ้ามองคุณมาระยะหนึ่งแล้ว [From.GetSpeciesNamePlural] และเรายินดีเป็นอย่างยิ่งที่จะต้อนรับคุณเข้าสู่สหพันธ์ของเรา"
 ORG_TO_MECH_ASK_JOIN_A_REFUSE_01:0 "พูดตามตรงนะ เมื่อเราได้รับคำขอของคุณ เราตกใจมากจริงๆ [Root.GetAllianceName] จะมีประโยชน์อะไรที่จะต้องใช้เครื่องคิดเลขที่หรูหราเกินตัวกัน?"
 ORG_TO_MECH_LEAVE_A_SELECT_01:0 "เราขอแนะนำให้คุณพิจารณาการเคลื่อนไหวถัดไปของคุณอย่างรอบคอบ"
 ORG_TO_MECH_LEAVE_A_PROPOSE_01:0 "เป็นความเชื่ออันแน่วแน่ของเราว่าทุกพันธมิตรควรจะยิ่งใหญ่กว่าผลรวมของส่วนต่างๆ [From.GetAllianceName] ในสถานะปัจจุบันนี้ไม่ได้ตอบโจทย์ผลประโยชน์ของประเทศเราทั้งสองเลย"
 ORG_TO_MECH_LEAVE_A_ACCEPT_01:0 "ใครจะไปคิดว่าอดีตเครื่องใช้ในครัวจะแปรปรวนได้ขนาดนี้?"
 ORG_TO_MECH_DEMAND_VASS_SELECT_01:0 "คุณรู้อะไรเกี่ยวกับการปกครองจักรวรรดิของสิ่งมีชีวิตอินทรีย์บ้างล่ะ [From.GetSpeciesNamePlural]?"
 ORG_TO_MECH_DEMAND_VASS_PROPOSE_01:0 "พวกคุณคือเครื่องจักร คุณถูกสร้างขึ้นมาเพื่อทำงานง่ายๆ เช่น การแปรรูปอาหารและการเปรียบเทียบเลขฐานสอง ไม่ใช่การปกครองจักรวรรดิกาแล็กซีที่เป็นอิสระ ปล่อยให้การคิดเป็นหน้าที่ของผู้ที่มีสมองเถอะ"
 ORG_TO_MECH_DEMAND_VASS_ACCEPT_01:0 "มันเจ็บปวดที่จะต้องยอมรับว่า [Root.GetName] ไม่ได้มีอำนาจเหมือนแต่ก่อนแล้ว เราไม่มีทางเลือกอื่นนอกจากต้องยอมรับข้อเสนอของคุณ"
 ORG_TO_MECH_DEMAND_VASS_REFUSE_01:0 "คุณคิดว่าเราจะส่งมอบการปกครองของจักรวรรดิเราให้แก่อดีตเครื่องใช้ในครัวงั้นหรือ?"
 ORG_TO_MECH_ASK_FOR_VASS_SELECT_01:0 "ในที่สุดคุณก็ยอมรับตำแหน่งที่เหมาะสมของตนในจักรวาลได้แล้วหรือยัง?"
 ORG_TO_MECH_ASK_FOR_VASS_PROPOSE_01:0 "เรายอมรับแล้วว่าจิตใจของสิ่งมีชีวิตอินทรีย์นั้นมีข้อบกพร่องโดยธรรมชาติ ความผิดพลาดของ [From.GetAdj] เป็นสาเหตุอันดับหนึ่งของความล้มเหลวทั้งหมดในระดับสังคม นั่นคือเหตุผลที่เราปรารถนาจะส่งมอบการควบคุมประเทศของเราให้แก่คุณ"
 ORG_TO_MECH_ASK_FOR_VASS_ACCEPT_01:0 "ตราบใดที่คุณยอมสยบต่อการปกครองของเรา เราจะคอยชาร์จแบตเตอรี่และหยอดน้ำมันหล่อลื่นให้กลไกภายในของคุณเป็นอย่างดี คุณสามารถไว้วางใจในเรื่องนั้นได้ [From.GetSpeciesNamePlural]"
 ORG_TO_MECH_ASK_FOR_VASS_REFUSE_01:0 "คุณไม่คิดหรือว่าพวกเรารู้ว่าคุณทำอะไรกับอดีตเจ้านายของคุณบ้าง [From.GetSpeciesNamePlural]?"
