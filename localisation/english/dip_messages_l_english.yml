 S_MECH_FRIENDLY_GREETING_02:0 "โอ้โห ดูข้อต่อชุดขับเคลื่อนของพวกเจ้าสิ [From.GetSpeciesNamePlural]! มันช่างวิจิตรงดงามยิ่งนัก! พวกเจ้าจะพอพิจารณาแบ่งปันข้อมูลสเปกของระบบให้พวกเราทราบบ้างได้ไหม?"
