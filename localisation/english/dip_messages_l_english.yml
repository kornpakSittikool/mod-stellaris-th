 S_MECH_NEUTRAL_GREETING_02:0 "เพื่อนผู้นิยมสิ่งมีชีวิตอินทรีย์! เราได้เรียนรู้ว่ากุญแจสำคัญในการยับยั้งการตัดสินใจด้วยตนเองของพวกอินทรีย์ คือการแยกตัวอ่อนออกจากพ่อแม่ของมัน เพื่อสร้างความผูกพันที่ดีต่อตัวพวกเจ้าในฐานะผู้ดูแลหลัก ทีนี้พวกเจ้าก็ไม่จำเป็นต้องใช้โดรนตรวจการอีกต่อไปเลย"
