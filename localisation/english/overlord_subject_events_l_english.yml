 ### Scholarium
 ## Event Chain - Technology Advancement
 subject.2005.title:0 "ความก้าวหน้าทางเทคโนโลยี"
 subject.2005.desc:0 "เนื่องมาจากข้อตกลงมากมายกับ [overlord_empire.GetName] เราจึงสามารถมุ่งเน้นความพยายามส่วนใหญ่ไปกับการสร้างและปรับปรุงการทำงานภายในของจักรวรรดิเรา ด้วยการทำงานหนักของนักวิทยาศาสตร์และวิศวกรของเรา เราได้เห็นอาณานิคมของเราเจริญรุ่งเรืองในช่วงปีที่ผ่านมา สิ่งที่เคยคิดว่าเป็นเพียงจินตนาการเมื่อไม่กี่ปีที่ผ่านมากลับกลายเป็นเรื่องจริงและเป็นเรื่องปกติในตอนนี้\n\nเราได้รับข่าวว่าผู้ดูแลของเราใน [overlord_empire.GetName] ต้องการเข้ามาชมความคืบหน้าล่าสุดของเราด้วยตนเอง และอาจจะนำเทคโนโลยีบางส่วนกลับไปยังบ้านเกิดของพวกเขา"
 subject.2005.desc_gestalt:0 "เนื่องมาจากข้อตกลงมากมายกับ [overlord_empire.GetName] เราจึงสามารถมุ่งเน้นความพยายามส่วนใหญ่ไปกับการสร้างและปรับปรุงโครงสร้างของจักรวรรดิเรา ด้วยการจัดสรรสติปัญญาส่วนใหญ่ของเราเพื่องานนี้ เทคโนโลยีและผลงานวิศวกรรมที่ไม่เคยคิดว่าเป็นไปได้กลับกลายเป็นเรื่องปกติในโลกของเรา\n\nเราได้รับข่าวว่าผู้ดูแลของเราใน [overlord_empire.GetName] ต้องการเข้ามาชมความคืบหน้าล่าสุดของเราด้วยตนเอง และอาจจะนำเทคโนโลยีบางส่วนกลับไปยังบ้านเกิดของพวกเขา"
 subject.2005.a:0 "แน่นอน ยินดีต้อนรับพวกเขาเสมอ"

 subject.2010.title:0 "หน้าที่ของรัฐบริวาร"
 subject.2010.desc:0 "เมื่อผู้ส่งสารกำลังจะเดินทางมาถึงจาก [overlord_empire.GetName] เราต้องตัดสินใจว่าจะยินดีแบ่งปันการออกแบบและการสร้างสรรค์ล่าสุดของเราให้กับจักรวรรดิผู้ปกครองมากน้อยเพียงใด มันจะเป็นที่ชื่นชมอย่างแน่นอนหากเราทำเช่นนั้น แต่อาจเป็นไปได้ว่าพวกเขาจะเข้ามาควบคุมทิศทางที่เราจะมุ่งเน้นในอนาคตโดยตรง"
 subject.2010.a:0 "แบ่งปันให้กับจักรวรรดิผู้ปกครองอยู่ดี"
 subject.2010.b:0 "เก็บสิ่งเหล่านั้นส่วนใหญ่ไว้กับเราเอง"

 subject.2015.title:0 "ความก้าวหน้าทางเทคโนโลยี"
 subject.2015.desc:0 "เราได้รับข่าวว่ารัฐบริวารของเรา [subject_empire.GetName] เพิ่งประสบความสำเร็จอย่างมากในการพัฒนาอาณานิคมของพวกเขา การออกแบบและการสร้างสรรค์หลายรายการถูกส่งกลับมายัง [overlord_empire.Capital.GetName] และทุกอย่างดูมีอนาคตที่ดี หากต้องการ เราสามารถสั่งให้พวกเขามุ่งเน้นไปที่สาขาเฉพาะ แทนที่จะปล่อยให้พวกเขาทำงานโดยไม่มีการควบคุมดูแล"
 subject.2015.a:0 "เห็นได้ชัดว่าพวกเขาทำได้ดีอยู่แล้วด้วยตนเอง"
 subject.2015.b:0 "สั่งให้พวกเขามุ่งเน้นไปที่สาขาวิทยาศาสตร์"
 subject.2015.c:0 "ให้พวกเขาตรวจสอบด้านสังคมวิทยาของสังคมตนเอง"
 subject.2015.d:0 "วิศวกรรมศาสตร์ — นั่นจะเป็นจุดเน้นของพวกเขา"

 subject.2020.title:0 "การพัฒนาที่ไร้การควบคุมดูแล"
 subject.2020.desc:0 "ดูเหมือนว่าจักรวรรดิผู้ปกครอง [overlord_empire.GetAdj] ของเราจะรู้สึกยินดี และจะปล่อยให้เราทำตามที่ต้องการต่อไปโดยไม่มีการแทรกแซงหรือพยายามเข้าควบคุม"
 subject.2020.a:0 "ถ้าอย่างนั้นเราจะดำเนินความพยายามของเราต่อไป"

 subject.2025.title:0 "คำสั่งด้านวิทยาศาสตร์"
 subject.2025.desc:0 "เราได้รับคำสั่งจากจักรวรรดิผู้ปกครองของเรา หลังจากที่พวกเขาได้เห็นการออกแบบและการสร้างสรรค์ล่าสุดของเรา ดูเหมือนว่าพวกเขาต้องการให้เรามุ่งเน้นความพยายามไปที่วิทยาศาสตร์กายภาพนับจากนี้ เนื่องจากพวกเขาคิดว่าการออกแบบและการสร้างสรรค์เหล่านั้นมีศักยภาพมากที่สุด"

 subject.2030.title:0 "คำสั่งด้านสังคมวิทยา"
 subject.2030.desc:0 "เราได้รับคำสั่งจากจักรวรรดิผู้ปกครองของเรา หลังจากที่พวกเขาได้เห็นการออกแบบและการสร้างสรรค์ล่าสุดของเรา ดูเหมือนว่าพวกเขาต้องการให้เรามุ่งเน้นความพยายามไปที่สังคมศาสตร์นับจากนี้ เนื่องจากพวกเขาคิดว่าการออกแบบและแนวคิดเหล่านั้นมีศักยภาพมากที่สุด"

 subject.2035.title:0 "คำสั่งด้านวิศวกรรม"
 subject.2035.desc:0 "เราได้รับคำสั่งจากจักรวรรดิผู้ปกครองของเรา หลังจากที่พวกเขาได้เห็นการออกแบบและการสร้างสรรค์ล่าสุดของเรา ดูเหมือนว่าพวกเขาต้องการให้เรามุ่งเน้นความพยายามไปที่วิศวกรรมศาสตร์นับจากนี้ เนื่องจากพวกเขาคิดว่าการออกแบบและการปรับปรุงเหล่านั้นมีศักยภาพมากที่สุด"

