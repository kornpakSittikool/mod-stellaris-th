l_english:
 ### Bulwark
 ## Event Chain - Lucrative Adventures for Veterans
 subject.1.title:0 "การผจญภัยอันแสนงดงาม"
 subject.1.desc:0 "ทหารผ่านศึกกลุ่มใหญ่ของเราได้ส่งจดหมายขออนุญาตเดินทางไปยังอาณานิคมที่ [subject_empire.Capital.GetName] ซึ่งเป็นเมืองหลวงของ [subject_empire.GetName] รัฐบริวารของเรา แนบมากับจดหมายนี้คือของขวัญเป็นเครดิตสำหรับ \"การอำนวยความสะดวกให้แก่วงล้อของระบบราชการ\" ตามที่พวกเขาเรียกร้องอย่างละเอียดอ่อน\n\nดูเหมือนว่าจะมีเรื่องเล่ามากมายในหมู่ทหารของเราเกี่ยวกับการผจญภัยที่ทำกำไรซึ่งใครๆ ก็หาได้ในระบบเหล่านั้น ไม่ว่าจะเป็นในฐานะทหารรับจ้างหรือโจรสลัด ในทั้งสองกรณี แสดงให้เห็นชัดเจนว่าพวกเขาได้รวบรวมเครดิตเท่าที่มีอยู่ โดยหวังว่าจะได้กำไรเพิ่มขึ้นหลายเท่าหากถูกส่งไปยัง [subject_empire.Capital.GetName]\n\nหากเราส่งพวกเขาไปยัง [subject_empire.Capital.GetName] อย่างเป็นทางการ อย่างน้อยพวกเขาก็น่าจะเป็นประโยชน์ต่อฝ่ายบริหารที่นั่น และมีแนวโน้มที่จะเคารพกฎหมายและข้อบังคับของรัฐบริวารของเรา มากกว่าที่เราจะปล่อยให้พวกเขาเดินทางไปอย่างอิสระ"
 subject.1.a:0 "อนุญาตให้พวกเขาเดินทางไปยัง [subject_empire.Capital.GetName] อย่างเป็นทางการ"
 subject.1.a.tt:0 "ทหารผ่านศึกจะถูกส่งไปช่วยเหลือ [subject_empire.GetName]"
 subject.1.b:0 "ปล่อยให้พวกเขาทำตามใจชอบ"
 subject.1.b.tt:0 "ทหารผ่านศึกอาจสร้างความปั่นป่วนใน [subject_empire.GetName]"
 subject.1.c:0 "เราจะไม่รับสินบนจากพวกโจรสลัดจำเป็นเหล่านี้"
 subject.1.c.tt:0 "ทหารผ่านศึกจะไม่ได้รับอนุญาตให้ออกจากจักรวรรดิของเรา"

 subject.3.title:0 "ทหารผ่านศึกจาก [overlord_empire.Capital.GetName]"
 subject.3.desc:0 "เราได้รับทหารผ่านศึกกลุ่มหนึ่งจากจักรวรรดิผู้ปกครองของเรา [overlord_empire.GetName] ดูเหมือนว่าพวกเขาจะถูกส่งมาอย่างเป็นทางการโดย [overlord.Ruler.GetRegnalName] เพื่อช่วยเหลือเรา และแบ่งปันประสบการณ์และความรู้ให้กับกองกำลังของเรา — หรืออย่างน้อยพวกเขากล่าวอ้างเช่นนั้น\n\nตั้งแต่แรกเริ่ม แสดงให้เห็นอย่างชัดเจนว่าทหารเหล่านี้นึกภาพสภาพแวดล้อมที่แตกต่างออกไปจากที่พวกเขาพบ เสียงบ่นพึมพำในหมู่พวกทหารดังมาถึงเราแล้ว ดูเหมือนพวกเขาคิดว่าจะได้พบกับทรัพย์สมบัติมหาศาล หรือไม่ก็ตั้งใจจะผันตัวเป็นโจรสลัดมาปล้นเราแทน\n\nหากเราจะยอมให้ทหารผ่านศึกเหล่านี้อยู่ต่อ เราควรแน่ใจว่าได้ควบคุมพวกเขาอย่างเข้มงวด"
 subject.3.a:0 "นำประสบการณ์ของพวกเขามาใช้ให้เกิดประโยชน์"
 subject.3.b:0 "ส่งพวกเขากลับไปยัง [overlord_empire.GetName]"

 subject.10.title:0 "ความสัมพันธ์อันดี"
 subject.10.desc:0 "แม้เราจะมีความกังวลเกี่ยวกับการส่งทหารผ่านศึกที่รักการผจญภัยไปยัง [subject_empire.Capital.GetName] แต่เราได้รับรายงานจากรัฐบริวารของเราว่า พวกเขาได้ปักหลักอยู่ที่นั่นเป็นที่เรียบร้อย และพิสูจน์แล้วว่ามีประโยชน์มากกว่าที่เคยคาดไว้ในตอนแรก"
 subject.10.a:0 "ดูเหมือนว่าความกังวลของเราจะเกินกว่าเหตุ"

 subject.12.title:0 "ทหารผ่านศึกเดินทางกลับ"
 subject.12.desc:0 "หลังจากพักอยู่ที่ [subject_empire.Capital.GetName] เป็นเวลาสั้นๆ ทหารผ่านศึกของเราได้ถูกส่งกลับบ้านมายัง [Root.Capital.GetName] ดูเหมือนว่าพวกเขาสร้างแต่ปัญหา และก่อความวุ่นวายในหมู่ประชากรภายใต้ปกครองของเรา"
 subject.12.a:0 "เป็นไปตามที่คาดไว้ไม่มีผิด"

 subject.14.title:0 "การผจญภัยของโจรสลัดจำเป็น"
 subject.14.desc:0 "ความกังวลแรกเริ่มของเราดูเหมือนจะเป็นจริง หลังจากเดินทางไปถึง [subject_empire.GetName] ได้ไม่นาน ทหารเก่าของเราดูเหมือนจะหันไปทำอาชีพโจรสลัด อย่างน้อยที่สุด การทรยศหักหลังนี้ก็ดูเหมือนจะยังไม่สามารถสืบสวนย้อนกลับมาถึงเราได้"
 subject.14.a:0 "หวังว่ามันจะเป็นเช่นนั้นต่อไป"

 subject.16.title:0 "ฝ่าฝืนคำสั่ง - ทหารรับจ้าง"
 subject.16.desc:0 "ดูเหมือนว่าทหารผ่านศึกที่ขออนุญาตเดินทางไปยัง [subject_empire.Capital.GetName] ไม่เพียงแต่ฝ่าฝืนคำสั่งของเราเท่านั้น แต่พวกเขายังอ้างว่าทำลงไปในนามของเราอีกด้วย ณ จุดนี้ มันคงเป็นเรื่องน่าอับอายหากเราเข้าไปประกาศกับทุกคนว่าเราไม่สามารถควบคุมคนของเราเองได้"
 subject.16.a:0 "หวังว่าพวกเขาจะสร้างความประทับใจที่ดีละกัน"

 subject.18.title:0 "ฝ่าฝืนคำสั่ง - โจรสลัด"
 subject.18.desc:0 "ดูเหมือนว่าพวกทหารผ่านศึกจะฝ่าฝืนคำสั่งของเรา และมุ่งหน้าไปยัง [subject_empire.Capital.GetName] จนได้ รายงานล่าสุดระบุว่าพวกเขาละทิ้งร่องรอยการมีความเกี่ยวข้องกับเราทั้งหมด และเริ่มหันมาใช้ชีวิตเป็นโจรสลัด"
 subject.18.a:0 "เป็นไปตามคาดนั่นแหละ"

 # Modifiers
 specialist_bulwark_veterans_modifier:0 "ประสบการณ์ของทหารผ่านศึก"
 specialist_bulwark_veterans_modifier_desc:0 "ทหารผ่านศึกกลุ่มหนึ่งมีบทบาทสำคัญในการสอนและช่วยเหลือเรา และทำให้เราสามารถใช้ประโยชน์สูงสุดจากเทคโนโลยีที่อยู่ใน [subject_empire.GetHandNamePlural] ของเรา"

 ## Event Chain - Subject upgrade
 subject.55.title:0 "คำร้องขอ"
 subject.55.desc:0 "เราได้รับแจ้งว่าจักรวรรดิผู้ปกครองของเราได้ลงทุนทรัพยากรและพลังงานจำนวนมากเพื่อปรับปรุงวิศวกรรมสถานีอวกาศของตน ทำให้ผลผลิตและศักยภาพของสถานีเหล่านั้นก้าวหน้าไปอย่างก้าวกระโดด\n\nเนื่องจากการป้องกันเป็นเสาหลักที่สำคัญในความสัมพันธ์ระหว่างจักรวรรดิของเราทั้งสอง เราจึงเริ่มร่างข้อตกลงเพื่อร้องขอวิศวกรของพวกเขามาช่วยปรับปรุงสถานีอวกาศแห่งหนึ่งของเราด้วยเช่นกัน"
 subject.55.a:0 "เตรียมข้อความเพื่อส่งไปยัง [overlord_empire.Capital.GetName]"
 subject.55.b:0 "เราไม่ได้ขัดสนถึงขนาดต้องร้องขอความช่วยเหลือจากใคร"

 subject.60.title:0 "คำร้องขอ"
 subject.60.desc:0 "เราได้รับผู้ส่งสารโดยตรงจาก [subject_empire.Capital.GetName] พร้อมคำร้องขอจาก [subject_empire.GetName]\n\nดูเหมือนพวกเขาจะสนใจลงทุนในสถานีอวกาศของตน และได้ยินเกี่ยวกับการปรับปรุงสถานีอวกาศของเรา ดูเหมือนว่าพวกเขาจะยินดีจ่ายเงินค่าตอบแทนสำหรับความช่วยเหลือของเราในครั้งนี้"
 subject.60.a:0 "ตกลง ส่งวิศวกรของเราไปช่วยเหลือ"
 subject.60.a.tt:0 "§Y[targeted_starbase.GetName]§! จะได้รับการอัปเกรดเพื่อใช้เทคโนโลยีสถานีอวกาศล่าสุดของเรา"
 subject.60.b:0 "เราจำเป็นต้องใช้พวกมันเอง"

 subject.62.title:0 "สถานีอวกาศที่ได้รับการอัปเกรด"
 subject.62.desc:0 "วิศวกรเดินทางมาถึง [targeted_starbase.GetName] ไม่นานหลังจากเราส่งข้อความไปยัง [overlord_empire.GetName] ดูเหมือนว่าพวกเขาจะเริ่มสั่งปรับปรุงสถานีอวกาศในทันที และทำได้อย่างรวดเร็วมาก\n\nแม้รายละเอียดบางส่วนของการปรับโครงสร้างสถานีอวกาศจะยังไม่ชัดเจนสำหรับเรา แต่วิศวกรของเราหวังว่าจะทำความเข้าใจได้มากกว่านี้ในอนาคต"
 subject.62.desc_overlord_gestalt:0 "กลุ่ม [overlord_empire.GetEngineerPlural] เดินทางมาถึง [targeted_starbase.GetName] ไม่นานหลังจากเราส่งผู้ส่งสารไปยัง [overlord_empire.GetName] ดูเหมือนว่าพวกเขาจะสามารถจัดระเบียบทุกอย่างตามที่ต้องการได้อย่างรวดเร็ว และกระบวนการปรับปรุงสถานีอวกาศก็เสร็จสิ้นอย่างรวดเร็ว\n\nแม้รายละเอียดบางส่วนของการปรับโครงสร้างสถานีอวกาศจะยังไม่ชัดเจนสำหรับเรา แต่วิศวกรของเราหวังว่าจะทำความเข้าใจได้มากกว่านี้เมื่อเวลาผ่านไป"
 subject.62.a:0 "ถึงอย่างไรเราก็รู้สึกขอบคุณ"

 subject.65.title:0 "คำขอถูกปฏิเสธ"
 subject.65.desc:0 "เราได้รับการตอบกลับอย่างหยาบคายจากจักรวรรดิผู้ปกครองว่า พวกเขาไม่มีเวลาหรือความสนใจที่จะช่วยเหลือเราในการปรับปรุงระบบป้องกันของเรา"
 subject.65.a:0 "ช่างน่าผิดหวังจริงๆ"

 # Modifiers
 specialist_bulwark_helpful_overlord_modifier:0 "จักรวรรดิผู้ปกครองผู้เอื้อเฟื้อ"
 specialist_bulwark_helpful_overlord_modifier_desc:0 "จักรวรรดิผู้ปกครองแห่งนี้ขึ้นชื่อเรื่องความพยายามช่วยเหลือรัฐบริวารในยามมีปัญหา ส่งผลให้ได้รับความนิยมเพิ่มขึ้น"

 ## Event Chain - Occupied Bulwark
 subject.100.title:0 "ป้อมปราการที่พังทลาย"
 subject.100.desc:0 "เราได้รับรายงานจากอาณานิคมที่ถูกยึดครองของ [subject_empire.GetName] ซึ่งขณะนี้ขาดความเป็นระเบียบและไร้ที่พึ่ง รัฐบริวารของเรากำลังมองหาความช่วยเหลือจากเราเนื่องจากดูเหมือนว่าพวกเขาไม่สามารถป้องกันตนเองได้\n\nเมื่อพิจารณาถึงธรรมชาติทางการทหารในข้อตกลงการทูตของเรา มันเป็นเรื่องธรรมดาที่เราควรจะก้าวเข้าไปปกป้องพวกเขาจากอันตรายเพิ่มเติม อย่างไรก็ตาม ที่ปรึกษาบางท่านสงสัยว่าการสร้างแรงบันดาลใจให้รัฐบริวารของเราลุกขึ้นสู้เพื่อป้องกันตนเอง อาจเป็นผลดีต่อเราทุกคนมากกว่าการเข้าแทรกแซงโดยตรง"
 subject.100.desc_overlord_gestalt:0 "เราได้รับรายงานจากอาณานิคมที่ถูกยึดครองของ [subject_empire.GetName] ซึ่งขณะนี้ขาดความเป็นระเบียบและไร้ที่พึ่ง รัฐบริวารของเรากำลังมองหาความช่วยเหลือจากเราเนื่องจากดูเหมือนว่าพวกเขาไม่สามารถป้องกันตนเองได้\n\nเมื่อพิจารณาถึงธรรมชาติทางการทหารในข้อตกลงการทูตของเรา มันเป็นเรื่องธรรมดาที่เราควรจะก้าวเข้าไปปกป้องพวกเขาจากอันตรายเพิ่มเติม เรากำลังคำนวณว่าการสร้างแรงบันดาลใจให้รัฐบริวารของเราลุกขึ้นสู้เพื่อป้องกันตนเอง อาจมีประโยชน์มากกว่าการเข้าแทรกแซงโดยตรง"
 subject.100.a:0 "เราจะสร้างแรงบันดาลใจให้พวกเขาลุกขึ้นป้องกันตนเอง"
 subject.100.a.tt:0 "§Y[subject_empire.GetName]§! อาจมีแนวคิดทางการทหารที่เข้มข้นขึ้น"
 subject.100.b:0 "หน้าที่ของจักรวรรดิผู้ปกครองคือการปกป้องรัฐบริวาร ไม่ว่าจะเกิดอะไรขึ้นก็ตาม"
 subject.100.c:0 "ปล่อยให้พวกเขาจัดการตนเองไปก่อนในตอนนี้"

 subject.105.title:0 "ป้อมปราการที่พังทลาย"
 subject.105.desc:0 "ในขณะที่การกดขี่ข่มเหงประชาชนของเรายังดำเนินต่อไป หลายคนต่างมองหาความช่วยเหลือจากจักรวรรดิผู้ปกครองของเรา [overlord_empire.GetName] พวกเขาเรียกร้องจากเรามานานแล้ว และมันดูเป็นธรรมหากพวกเขาจะยื่นมือเข้ามาช่วยเหลือในยามที่ประชาชนของเรากำลังทนทุกข์ภายใต้การยึดครองของต่างชาติ\n\nหลังจากการเรียกร้องจากสาธารณชน ในที่สุดเราได้รับที่ปรึกษาทางการทหารจากจักรวรรดิผู้ปกครอง ซึ่งมาช่วยแนะนำประชาชนของเราให้เตรียมพร้อมในการยึดดินแดนคืน พวกเขาเริ่มอภิปรายเกี่ยวกับวิธีการจัดสรรบุคลากรของเราในด้านการทหารให้ดีขึ้น แม้ว่าต้องแลกมาด้วยต้นทุนบางประการก็ตาม"
 subject.105.desc_subject_gestalt:0 "เนื่องจากการรุกรานอาณานิคมของเรายังคงดำเนินต่อไป เราจึงเริ่มมองหาความช่วยเหลือจาก [overlord_empire.GetName] ของเรา พวกเขาเรียกร้องสิ่งต่างๆ จากเรามานานแล้ว และมันสมควรหากพวกเขาจะเข้ามาช่วยเมื่อเราต้องตกอยู่ภายใต้การยึดครองของต่างชาติ\n\nหลังจากส่งโดรนจำนวนหนึ่งไปร้องขอความช่วยเหลือ ในที่สุดเราได้รับที่ปรึกษาทางการทหารที่จะช่วยจัดระเบียบทรัพย์สินของเราใหม่ เพื่อให้เราเตรียมพร้อมยึดดินแดนคืนด้วยตนเอง ช่างน่าผิดหวังเล็กน้อยเมื่อเทียบกับสิ่งที่เราต้องการในตอนแรก โดยเฉพาะอย่างยิ่งการที่เราไม่สามารถใช้ทรัพยากรตามที่วางแผนไว้"
 subject.105.desc_overlord_gestalt:0 "ในขณะที่การกดขี่ข่มเหงประชาชนของเรายังดำเนินต่อไป หลายคนต่างมองหาความช่วยเหลือจากจักรวรรดิผู้ปกครองของเรา [overlord_empire.GetName] พวกเขาเรียกร้องจากเรามานานแล้ว และมันดูเป็นธรรมหากพวกเขาจะยื่นมือเข้ามาช่วยเหลือในยามที่ประชาชนของเรากำลังทนทุกข์ภายใต้การยึดครองของต่างชาติ\n\nหลังจากการเรียกร้องจากสาธารณชน ในที่สุดเราได้รับ [overlord_empire.GetIndividualName] ทางทหารจากจักรวรรดิผู้ปกครอง ซึ่งเข้ามาจัดระเบียบประชาชนของเราอย่างใจเย็นและเตรียมความพร้อมให้พวกเขายึดดินแดนคืน ดูเหมือนจักรวรรดิผู้ปกครองเชื่อว่าการจัดระเบียบประชาชนเพื่อกู้ดินแดนคืนด้วยตัวเองจะดีกว่าการรอคอยผู้ดูแลยื่นมือเข้ามาทำให้"
 subject.105.desc_both_gestalt:0 "เนื่องจากการรุกรานอาณานิคมของเรายังคงดำเนินต่อไป เราจึงเริ่มมองหาความช่วยเหลือจาก [overlord_empire.GetName] ของเรา พวกเขาเรียกร้องสิ่งต่างๆ จากเรามานานแล้ว และมันสมควรหากพวกเขาจะเข้ามาช่วยเมื่อเราต้องตกอยู่ภายใต้การยึดครองของต่างชาติ\n\nหลังจากส่งผู้ส่งสารเพื่อร้องขอความช่วยเหลือ ในที่สุดเราได้รับ [overlord_empire.GetIndividualName] ทางทหารจากจักรวรรดิผู้ปกครอง ซึ่งเข้ามาจัดระเบียบทรัพย์สินของเราอย่างสงบและเตรียมความพร้อมในการกู้ดินแดนคืน ดูเหมือนจักรวรรดิผู้ปกครองเชื่อว่าการจัดระเบียบและปลดปล่อยอาณานิคมด้วยตนเองจะดีกว่าการรอคอยผู้ดูแลยื่นมือเข้ามาทำให้"
 subject.105.a:0 "เสรีภาพจากการถูกยึดครองนั้นคุ้มค่าที่จะแลกไม่ว่าจะด้วยราคาใด"
 subject.105.b:0 "แม้แต่เสรีภาพก็ไม่คุ้มค่ากับสิ่งที่พวกเขาเสนอแนะ"

 subject.107.title:0 "ผู้ปกป้องดินแดน"
 subject.107.desc:0 "ประชาชนทั่วทั้ง [subject_empire.GetName] ร่วมมือกันปกป้องบ้านเกิดจากการยึดครองของต่างชาติ และพร้อมที่จะรับใช้จักรวรรดิอย่างเต็มใจ หวังว่านี่จะเป็นจุดเริ่มต้นของการสิ้นสุดปัญหาที่เผชิญอยู่"
 subject.107.a:0 "เป็นข่าวดีอย่างยิ่ง"

 subject.110.title:0 "ฝ่ายรักสงบ"
 subject.110.desc:0 "แม้ว่าจะอยู่ภายใต้การยึดครอง แต่ประชาชนของ [subject_empire.GetName] ปฏิเสธความพยายามทั้งหมดในการช่วยให้พวกเขายึดดินแดนคืน"
 subject.110.a:0 "ถ้าอย่างนั้นเราก็ช่วยเหลืออะไรพวกเขาไม่ได้"

 # Modifiers
 specialist_bulwark_home_defense_force_modifier:0 "การปกป้องบ้านเกิด"
 specialist_bulwark_home_defense_force_modifier_desc:0 "มีสิ่งไม่กี่อย่างที่สร้างแรงบันดาลใจให้คนเราก้าวสู่ความยิ่งใหญ่ได้ง่ายเท่ากับการได้เห็นบ้านเกิดของตนมอดไหม้"

 specialist_bulwark_defensive_overlord_modifier:0 "จักรวรรดิผู้ปกครองผู้ปกป้อง"
 specialist_bulwark_defensive_overlord_modifier_desc:0 "จักรวรรดิผู้ปกครองที่ดีจะมอบหมายงานให้ผู้อื่นทำ แต่จักรวรรดิผู้ปกครองที่ยิ่งใหญ่จะนำโดยการทำเป็นแบบอย่าง"

 ## Event Chain - War Fever
 subject.1003.title:0 "ไข้หวัดสงคราม"
 subject.1003.desc:0 "มีรายงานเกี่ยวกับการเคลื่อนไหวของกลุ่มผู้กระหายสงครามที่กำลังก่อตัวขึ้นบน [Root.Capital.GetName] โดยมีทหารผ่านศึกผู้ได้รับเหรียญรางวัลเป็นศูนย์กลาง พวกเขาเชิดชูอดีตที่เรามีอิสระในการโจมตีและทำลายล้างจักรวรรดิอื่น และเรียกร้องให้เราดำเนินนโยบายที่มุ่งเน้นสงครามมากขึ้น ซึ่งอ้างว่าเพื่อดึงสิ่งที่ดีที่สุดในตัวประชาชนออกมาและทำให้คู่แข่งอ่อนแอลง\n\nภายใต้สภาวะสันติภาพที่เปราะบางในปัจจุบัน ขบวนการนี้ได้รับการสนับสนุนอย่างรวดเร็วในกลุ่มผู้ยากไร้และภายในกองทัพ หากเราเห็นว่าเรื่องนี้เป็นปัญหา ที่ปรึกษาของเราชี้ว่าความเคลื่อนไหวนี้ขึ้นอยู่กับตัวผู้นำทหารผ่านศึกคนนี้เท่านั้น — หากกำจัดเป้าหมายที่เป็นปัญหานี้ออกไป ขบวนการทั้งหมดก็จะล่มสลายลง"
 subject.1003.a:0 "อันที่จริง แผนการของพวกเขาก็ตรงกับแผนการของเราพอดี"
 subject.1003.b:0 "ยุติเรื่องนี้ก่อนที่จะบานปลายจนควบคุมไม่ได้"

 subject.1005.title:0 "หนทางสู่สงคราม"
 subject.1005.desc:0 "เนื่องจากพวกเขาได้รับอนุญาตให้ดำเนินการต่อไปโดยไม่มีการควบคุม ขบวนการที่เรียกร้องนโยบายสงครามจึงมีกำลังเพิ่มขึ้นในเดือนที่ผ่านมา เมื่อความขัดแย้งระหว่างผู้นำของเราและขบวนการขึ้นถึงจุดสูงสุด [Root.GetRulerTitle] [Root.GetRulerName] ของเราจึงโอบรับขบวนการนี้ต่อหน้าสาธารณชน\n\nเมื่อเป็นที่แน่ชัดแล้วว่าเราไม่เพียงสนับสนุนแต่พร้อมจะทำตามข้อเรียกร้องต่างๆ กลุ่มผู้ติดตามจำนวนมากจึงกำลังรอคอยสิ่งที่เราจะทำต่อไปอย่างกระตือรือร้น"
 subject.1005.a:0 "เราจะหาตำแหน่งให้กับอดีตผู้นำของพวกเขา"
 subject.1005.a.tt:0 "รับสมัคร §Yผู้บัญชาการ§!"
 subject.1005.b:0 "ได้เวลาโอบรับแนวโน้มทางการทหารของจักรวรรดิเราแล้ว"
 subject.1005.c:0 "ทรัพยากรของเราจะถูกนำไปใช้เพื่อบูรณะยานรบของเราให้กลับมารุ่งโรจน์ดังเดิม"

 subject.1010.title:0 "ไข้หวัดสงคราม"
 subject.1010.desc:0 "เราได้รับรายงานจากรัฐบริวารของเรา [subject_empire.GetName] รายงานชี้ให้เห็นว่าประชาชนได้รับการกระตุ้นจนคลุ้มคลั่งโดยทหารผ่านศึกคนหนึ่ง และตอนนี้พวกเขากำลังมองหาทางระบายความโกรธแค้น โดยการเรียกร้องสงครามจากผู้นำของพวกเขา\n\nในการตัดสินใจที่สิ้นหวังเพื่อเอาใจผู้ประท้วง รัฐบาลใน [subject_empire.GetName] ได้ยอมรับขบวนการดังกล่าวและให้สัญญาหลายอย่างที่ผู้ให้ข้อมูลของเราสงสัยว่าจะทำได้จริง"
 subject.1010.a:0 "พวกนั้นต้องการให้เราเข้าสู่ภาวะสงครามงั้นรึ?"

 # Modifiers
 specialist_overlord_war_fever_modifier:0 "มุ่งเน้นสงคราม"
 specialist_overlord_war_fever_modifier_desc:0 "จักรวรรดิแห่งนี้ได้จัดสรรทรัพยากรส่วนใหญ่ไปกับการสร้างและบำรุงรักษากองทัพเรือที่แข็งแกร่งยิ่งขึ้น"

 ## Event Chain - War Exhaustion
 subject.1052.title:0 "ความเหนื่อยล้าจากสงคราม"
 subject.1052.desc:0 "แม้ว่าข้อตกลงของเรากับ [overlord_empire.GetName] จะเกี่ยวข้องกับการทหาร แต่เราไม่คิดว่ามันจะส่งผลร้ายแรงต่อเราขนาดนี้ ประชาชนของเรากำลังทนทุกข์กับข้อเรียกร้องอันไม่สิ้นสุดจากจักรวรรดิผู้ปกครอง และที่ปรึกษาบางท่านคาดเดาว่าหากยังเป็นเช่นนี้ต่อไป มันจะส่งผลกระทบถาวรต่อแผนการระยะยาวของเรา"
 subject.1052.desc_gestalt:0 "...มีปัญหากับการส่งความต้องการของกองทัพเรือ..."
 subject.1052.a:0 "[overlord_empire.GetName] จะต้องได้รับรู้ถึงความทุกข์ยากของเรา"
 subject.1052.b:0 "เราจำเป็นต้องทนอยู่กับมันต่อไป"

 subject.1055.title:0 "ความเหนื่อยล้าจากสงคราม"
 subject.1055.desc:0 "รัฐบริวารของเรา [subject_empire.GetName] ได้ส่งผู้ส่งสารมาพร้อมกับแถลงการณ์อย่างละเอียดเกี่ยวกับความยากลำบากที่พวกเขาเผชิญเนื่องจากสงครามที่เราบังคับให้ทำ เมื่อรู้ถึงลักษณะของสัญญาการทูตที่พวกเขาตกลงไว้ จึงเป็นเรื่องน่าแปลกใจที่พวกเขาเริ่มขอร้องให้เราเปลี่ยนนโยบายเพื่อประโยชน์ของพวกเขา"
 subject.1055.a:0 "เราจะให้ความมั่นใจแก่พวกเขาว่าเราจะพิจารณาเรื่องนี้"
 subject.1055.b:0 "ความยากลำบากของพวกเขาคือเรื่องส่วนตัวของพวกเขาเอง"
 subject.1055.b.tt:0 "§Y[subject_empire.GetName]§! อาจสูญเสียความภักดีเนื่องจากทางเลือกของเราที่จะเพิกเฉยต่อความทุกข์ยากของพวกเขา"

 subject.1057.title:0 "ความกังวลที่มีมูล"
 subject.1057.desc:0 "เราได้รับการตอบกลับอย่างสุภาพจาก [overlord_empire.GetName] อธิบายว่าพวกเขาจะพิจารณาสิ่งที่สามารถทำได้เกี่ยวกับสถานการณ์ทางการทูตในปัจจุบัน และจะนำปัญหาของเรามาประกอบการตัดสินใจในอนาคต"
 subject.1057.a:0 "รู้สึกขอบคุณมาก"

 subject.1060.title:0 "สถาบันแห่งความขัดสน"
 subject.1060.desc:0 "แม้จะมีแถลงการณ์อย่างละเอียดอธิบายสถานการณ์แล้วก็ตาม แต่ดูเหมือนว่าพันธมิตรของเราใน [overlord_empire.GetName] จะไม่ใส่ใจปัญหาของเราเลย หากธรรมชาติอันกระหายสงครามของพวกเขายังดำเนินต่อไปโดยไม่มีการควบคุม ประชาชนของเราต้องทนทุกข์ทรมานอย่างแน่นอน\n\nใช้เวลาไม่นานก่อนที่การตอบกลับจากจักรวรรดิผู้ปกครองรวมถึงรายละเอียดของปัญหาปัจจุบันจะกลายเป็นที่รับรู้ของสาธารณะ และเราเห็นการเติบโตของกลุ่มการเมืองเล็กๆ ที่ต่อต้านการปกครองจาก [overlord_empire.Capital.GetName] พวกเขาไม่มีความสนใจที่จะเอาใจเราเลย แล้วเราจะได้ประโยชน์อะไรจากการภักดีต่อพวกเขา?"
 subject.1060.desc_gestalt:0 "แม้ว่าเราจะส่งแถลงการณ์ที่สั้นกระชับและละเอียดเพื่ออธิบายสถานการณ์แล้วก็ตาม แต่ดูเหมือนว่าผู้ดูแลของเราใน [overlord_empire.GetName] จะเลือกเพิกเฉยต่อความทุกข์ยากของเรา ไม่เพียงแต่พวกเขาจะไม่สนใจความภักดีของเรา แต่ดูเหมือนยังคงมุ่งมั่นที่จะดำเนินตามเส้นทางทำลายล้างนี้ต่อไป\n\nแม้เราจะคาดหวังผลลัพธ์ที่ดีขึ้นเมื่อเริ่มลงนามข้อตกลงกับพวกเขา แต่ผลการคำนวณทั้งหมดของเราในตอนนี้ชี้ให้เห็นถึงผลกระทบที่เป็นปัญหาอย่างต่อเนื่องต่อจักรวรรดิของเรา"
 subject.1060.a:0 "แต่เราไม่สามารถต่อต้านจักรวรรดิผู้ปกครองได้..."
 subject.1060.b:0 "... หรือว่าเราจะทำได้กันนะ?"

 subject.1062.title:0 "แรงต่อต้านที่เพิ่มขึ้น"
 subject.1062.desc:0 "ดูเหมือนว่าการเพิกเฉยของเราได้ก่อให้เกิดขบวนการทางการเมืองเล็กๆ ที่ต่อต้านเราใน [subject_empire.GetName] แม้ว่าพวกเขาจะไม่พอใจกับการตอบกลับของเรา แต่ขบวนการนี้ก็ประสบความยากลำบากในการตั้งตัว และจักรวรรดิของพวกเขาโดยรวมไม่สามารถต่อต้านการปกครองของเราได้"
 subject.1062.desc_gestalt:0 "ดูเหมือนการเพิกเฉยของเราทำให้ [subject_empire.GetRulerTitle] เริ่มสงสัยในสิทธิ์การปกครองของเรา แม้ว่าขณะนี้พวกเขาจะมีความลังเลเกี่ยวกับข้อตกลงทางการทูตของเรา แต่พวกเขาก็ยังไม่อยู่ในจุดที่จะสามารถต่อต้านการปกครองของเราได้"
 subject.1062.a:0 "การตกอยู่ภายใต้การปกครองต่อไปเป็นเรื่องที่เลี่ยงไม่ได้"

 # Modifiers
 specialist_overlord_war_exhaustion_modifier:0 "ความเหนื่อยล้าจากสงคราม"
 specialist_overlord_war_exhaustion_modifier_desc:0 "ในบางครั้ง ความยากลำบากของสงครามจะฉีกกระชากแม้กระทั่งจักรวรรดิที่แข็งแกร่งที่สุดให้เป็นชิ้นๆ"

 specialist_overlord_war_exhaustion_lithoid_modifier:0 "$specialist_overlord_war_exhaustion_modifier$"
 specialist_overlord_war_exhaustion_lithoid_modifier_desc:0 "$specialist_overlord_war_exhaustion_modifier_desc$"

 specialist_overlord_war_exhaustion_robot_modifier:0 "$specialist_overlord_war_exhaustion_modifier$"
 specialist_overlord_war_exhaustion_robot_modifier_desc:0 "$specialist_overlord_war_exhaustion_robot_modifier$"

 ## Event Chain - Rival Commanders
 subject.1102.title:0 "ผู้บัญชาการที่ทะเลาะวิวาทกัน"
 subject.1102.desc:0 "เราพบข้อขัดแย้งและการโต้เถียงกันมากขึ้นระหว่างผู้บัญชาการและผู้นำของเราบางคน หาก [admiral_democracy.GetName] คิดว่าเราควรทำบางอย่าง คุณสามารถแน่ใจได้ว่า [admiral_oligarchy.GetName] จะโต้แย้งว่าเราควรทำตรงกันข้าม\n\nในตอนแรกดูเหมือนจะเป็นเพียงการแข่งขันที่เป็นมิตรระหว่างผู้ที่มีระดับเท่ากัน แต่เมื่อเร็วๆ นี้มันเริ่มทวีความรุนแรงและเป็นศัตรูกันมากขึ้น และเราเริ่มเห็นว่าเพื่อนร่วมงานของพวกเขาก็เริ่มเลือกข้างเช่นกัน"
 subject.1102.a:0 "เราจะยุติการทะเลาะวิวาทนี้ ไม่ว่าจะด้วยวิธีใดก็ตาม"
 subject.1102.b:0 "พวกเขาจะหาทางจัดการกันได้เองในอนาคต"

 subject.1105.title:0 "กองทัพเรือที่แตกแยก"
 subject.1105.desc_democracy:0 "ไม่ใช่แค่เรื่องของการเห็นต่างอีกต่อไป เนื่องจากฝ่ายบริหารกองทัพเรือทั้งหมดเข้าสู่สภาวะเป็นปฏิปักษ์ต่อกันอย่างชัดเจน สิ่งที่เริ่มต้นจากการโต้เถียงของผู้บัญชาการสองคนบัดนี้ได้แบ่งแยกฝ่ายบริหารออกเป็นสองฝ่าย และไม่มีใครพยายามเป็นตัวกลางสร้างสันติภาพในหมู่พวกเขาอีกต่อไป\n\nนอกเหนือจากการแบ่งแยกกองทัพเรือแล้ว พวกเขายังแบ่งแยกออกเป็นกลุ่มการเมืองสองกลุ่มอย่างชัดเจน กลุ่มหนึ่งสนับสนุนผู้นำฝ่ายประชาธิปไตยในปัจจุบัน และอีกกลุ่มหนึ่งคิดว่ากองทัพเรือควรมีบทบาททางการเมืองที่แข็งแกร่งขึ้นในรัฐบาลของเรา"
 subject.1105.desc_oligarchy:0 "ไม่ใช่แค่เรื่องของการเห็นต่างอีกต่อไป เนื่องจากฝ่ายบริหารกองทัพเรือทั้งหมดเข้าสู่สภาวะเป็นปฏิปักษ์ต่อกันอย่างชัดเจน สิ่งที่เริ่มต้นจากการโต้เถียงของผู้บัญชาการสองคนบัดนี้ได้แบ่งแยกฝ่ายบริหารออกเป็นสองฝ่าย และไม่มีใครพยายามเป็นตัวกลางสร้างสันติภาพในหมู่พวกเขาอีกต่อไป\n\nนอกเหนือจากการแบ่งแยกกองทัพเรือแล้ว พวกเขายังแบ่งแยกออกเป็นกลุ่มการเมืองสองกลุ่มอย่างชัดเจน กลุ่มหนึ่งสนับสนุนผู้นำปัจจุบันของเรา และอีกกลุ่มหนึ่งที่คิดว่าประชาชนทั่วไปควรมีบทบาทมากขึ้นในการปกครองของเรา"
 subject.1105.desc_neither:0 "ไม่ใช่แค่เรื่องของการเห็นต่างอีกต่อไป เนื่องจากฝ่ายบริหารกองทัพเรือทั้งหมดเข้าสู่สภาวะเป็นปฏิปักษ์ต่อกันอย่างชัดเจน สิ่งที่เริ่มต้นจากการโต้เถียงของผู้บัญชาการสองคนบัดนี้ได้แบ่งแยกฝ่ายบริหารออกเป็นสองฝ่าย และไม่มีใครพยายามเป็นตัวกลางสร้างสันติภาพในหมู่พวกเขาอีกต่อไป\n\nนอกเหนือจากการแบ่งแยกกองทัพเรือแล้ว พวกเขายังแบ่งแยกออกเป็นกลุ่มการเมืองสองกลุ่มอย่างชัดเจน กลุ่มหนึ่งเชื่อว่ากองทัพเรือควรมีบทบาทสำคัญในการปกครองของเรา และอีกกลุ่มหนึ่งที่คิดว่าประชาชนทั่วไปควรได้รับอำนาจทางการเมืองมากขึ้น"
 subject.1105.a:0 "พวกนั้นจะเล่นเรื่องไร้สาระนี้ไปอีกนานแค่ไหน?"

 subject.1107.title:0 "ผู้บัญชาการที่ทะเลาะวิวาทกัน"
 subject.1107.desc:0 "เราได้รับข่าวว่ารัฐบริวารของเรา [subject_empire.GetName] ดูเหมือนจะมีความขัดแย้งภายในเกิดขึ้นในตอนนี้ โดยฝ่ายบริหารกองทัพเรือของพวกเขากำลังระส่ำระสายหลังจากผู้บัญชาการสองคนเกิดความขัดแย้งขึ้น\n\nด้วยการที่ผู้นำของพวกเขาดิ้นรนเพื่อควบคุมสถานการณ์ เราจึงไม่แน่ใจว่าพวกเขาจะเป็นพันธมิตรและรัฐบริวารที่น่าเชื่อถือได้เพียงใด เนื่องจากทั้งสองฝ่ายที่สนับสนุนผู้บัญชาการที่เป็นคู่แข่งกันกำลังแย่งชิงอำนาจอย่างต่อเนื่อง"
 subject.1107.a:0 "เราควรยื่นมือเข้าช่วยก่อนที่จะแย่ลง"
 subject.1107.b:0 "ไม่ใช่หน้าที่ของเราที่จะไปแก้ไขกิจการภายในของพวกเขา"

 subject.1110.title:0 "การแทรกแซงจากจักรวรรดิผู้ปกครอง"
 subject.1110.desc:0 "เนื่องจากเราเกรงว่าความขัดแย้งในกองทัพเรือจะลุกลามไปยังผู้นำส่วนอื่นๆ ของจักรวรรดิ พันธมิตรของเรา [overlord_empire.GetName] จึงได้ยื่นมือเข้ามาแทรกแซงและช่วยทำให้สถานการณ์สงบลง ดูเหมือนไม่มีใครรวมถึง [admiral_oligarchy.GetName] หรือ [admiral_democracy.GetName] ที่เต็มใจจะต่อต้านผู้นำใน [overlord_empire.Capital.GetName]"
 subject.1110.a:0 "ในที่สุด การโต้เถียงก็ยุติลง"

 subject.1112.title:0 "การขัดขวางจากจักรวรรดิผู้ปกครอง"
 subject.1112.desc:0 "เราวางใจเป็นอย่างยิ่งว่าปัญหาความขัดแย้งระหว่าง [admiral_oligarchy.GetName] และ [admiral_democracy] จะยุติลงเมื่อนักการทูตจาก [overlord_empire.GetName] เดินทางมาถึงเพื่อช่วยเจรจาสร้างสันติภาพ ทว่าหลังจากโต้เถียงกันมาหลายวัน ดูเหมือนสิ่งเดียวที่ทั้งสองฝ่ายเห็นพ้องกันคือ จักรวรรดิผู้ปกครองไม่มีส่วนเกี่ยวข้องใดๆ ในความขัดแย้งของพวกเขา"
 subject.1112.a:0 "แม้แต่พวกเขาก็ช่วยไม่ได้งั้นหรือ?"

 subject.1115.title:0 "เจตนาฆาตกรรม"
 subject.1115.desc:0 "เป็นเวลานานหลายสัปดาห์และหลายเดือนที่ความขัดแย้งระหว่างฝ่ายบริหารกองทัพเรือสองฝ่าย ฝ่ายหนึ่งนำโดย [admiral_oligarchy.GetName] และอีกฝ่ายนำโดย [admiral_democracy.GetName] ดำเนินไป ทว่าก็ไม่มีการใช้ความรุนแรงโดยตรงเกิดขึ้น จนกระทั่งตอนนี้ — ด้วยการค้นพบร่างอันไร้วิญญาณของหนึ่งในผู้สนับสนุนฝ่ายประชาธิปไตย\n\nแม้ว่าเราจะไม่พบหลักฐานว่าอีกฝ่ายมีส่วนเกี่ยวข้องกับการฆาตกรรมที่ต้องสงสัยนี้ แต่นี่จะจุดชนวนให้เกิดการตอบโต้อย่างรุนแรงขึ้นจากทั้งสองฝ่ายอย่างแน่นอนนับจากนี้"
 subject.1115.a:0 "เราจะทำอย่างไรเพื่อกู้สถานการณ์นี้ได้บ้าง?"

 subject.1120.title:0 "ภัยพิบัติสาธารณะ"
 subject.1120.desc:0 "มีรายงานกลับมาหาเราว่า ยานขนส่งสินค้าที่ไม่สามารถระบุตัวตนได้ลำหนึ่งได้พุ่งชนย่านที่พักอาศัยบน [crash_planet.GetName] ทุกคนที่เคยอาศัยอยู่ที่นั่นได้ถูกย้ายไปยังที่พักพิงชั่วคราวแล้ว ในขณะที่เรากำลังประเมินสิ่งที่เราสามารถทำได้เพื่อช่วยเหลือ\n\nกลุ่มคณาธิปไตย(โอลิการ์ชิค)ได้สนับสนุนไม่เพียงแต่การเพิกเฉยต่อความเดือดร้อนของผู้ถูกขับออกจากบ้าน แต่ยังให้เปิดเหมืองแร่ใหม่ในเขตนั้นด้วย เนื่องจากดูเหมือนว่ายานขนส่งสินค้าจะได้ค้นพบแหล่งแร่อันอุดมสมบูรณ์ที่เราไม่เคยเห็นมาก่อน แน่นอนว่าฝ่ายตรงข้ามคัดค้านแนวคิดนี้อย่างมาก และเรียกร้องให้เราให้ความสำคัญกับการสร้างบ้านใหม่ให้กับผู้ที่ได้รับผลกระทบแทน"
 subject.1120.a:0 "และเราจะสร้างบ้านใหม่ให้พวกเขาอย่างแน่นอน"
 subject.1120.b:0 "เมื่อกี้เจ้าว่าพบแหล่งแร่งั้นรึ?"

 subject.1125.title:0 "คำถามเกี่ยวกับเงินทุน"
 subject.1125.desc:0 "บัดนี้ไม่เพียงแต่จำกัดอยู่ในกองทัพเรือเท่านั้น เราพบเห็นการโต้เถียงและความขัดแย้งในทุกหน่วยงานทั่วทั้งจักรวรรดิ เหตุการณ์ล่าสุดเกี่ยวข้องกับเงินทุนที่จัดสรรไว้สำหรับความต้องการทางพลเรือนบน [Root.Capital.GetName] ซึ่งกลุ่มคณาธิปไตยต้องการโอนย้ายไปใช้สำหรับกองทัพ"
 subject.1125.a:0 "เงินทุนนั้นถูกจัดสรรไว้ด้วยเหตุผลของมันอยู่แล้ว"
 subject.1125.b:0 "กลุ่มคณาธิปไตยพูดถูก โอนย้ายเงินทุนไปยังกองทัพซะ"

 subject.1130.title:0 "ความรุนแรงบนท้องถนน"
 subject.1130.desc:1 "หลังจากการประท้วงที่รุนแรงใกล้กับสำนักงานของกลุ่มคณาธิปไตย สมาชิกหลายคนของทั้งสองกลุ่มได้ถูกนำตัวมาสอบถามข้อมูล ตามที่คาดไว้ ทั้งสองฝ่ายมีเรื่องเล่าที่แตกต่างกันอย่างมาก โดยส่วนใหญ่กล่าวโทษฝ่ายตรงข้ามสำหรับทุกสิ่งที่เกิดขึ้น\n\nพวกเขาไม่เพียงต้องการให้เราเลือกข้าง แต่ทั้งสองฝ่ายยังยินดีที่จะเสนอผลประโยชน์เพื่อให้การเลือกข้างของเราคุ้มค่ากับเวลา"
 subject.1130.a:0 "ฝ่ายประชานิยมเป็นฝ่ายที่ถูกต้อง"
 subject.1130.b:0 "เห็นได้ชัดว่ากลุ่มคณาธิปไตยไม่มีความผิดในการโจมตีครั้งนี้"

 subject.1135.title:0 "เรื่องอื้อฉาวฝ่ายประชาธิปไตย"
 subject.1135.desc:0 "มีรายงานกลับมาหาเราเกี่ยวกับเรื่องอื้อฉาวการใช้เงินทุนสาธารณะส่วนตัวโดยพันธมิตรใกล้ชิดของ [admiral_democracy.GetName] หลายคนอ้างว่าอาจเป็นการทำในนามของกลุ่มการเมืองของพวกเขา หากสาธารณชนได้รับรู้ว่าขบวนการนี้ใช้เงินสาธารณะเพื่อตัวเอง มันจะขัดขวางแผนการประชานิยมของพวกเขาอย่างแน่นอน"
 subject.1135.a:0 "เราจะปกป้องพวกเขา แค่ครั้งนี้เท่านั้น"
 subject.1135.b:0 "เรื่องอื้อฉาวที่คุ้มค่าแก่การเปิดเผย"

 subject.1140.title:0 "พบตัวฆาตกรแล้ว"
 subject.1140.desc:0 "หลังจากการสืบสวนอันยาวนาน ในที่สุดดูเหมือนว่าพวกเขาจะพบตัวผู้กระทำความผิดในการฆาตกรรมครั้งแรกในสำนักงานกองทัพเรือแล้ว หลักฐานทั้งหมดชี้ไปที่หนึ่งในที่ปรึกษาที่ใกล้ชิดที่สุดของ [admiral_oligarchy.GetName] ซึ่งเป็นผู้สั่งการลอบสังหารคู่แข่งด้วยตนเอง\n\nแม้ว่า [admiral_oligarchy.GetName] จะไม่มีความผิดใดๆ แต่การรับรู้ของสาธารณชนต่อขบวนการนี้จะได้รับผลกระทบในเชิงลบหากพวกเขาได้รับรู้เรื่องนี้"
 subject.1140.a:0 "เราจะทำให้แน่ใจว่าพวกเขาจะไม่มีวันรู้"
 subject.1140.b:0 "ในที่สุดฆาตกรก็ถูกพบ"

 subject.1142.title:0 "พายุที่กำลังก่อตัว"
 subject.1142.desc:0 "เราพบเห็นความขัดแย้งไม่เพียงแต่ในกองทัพเรือเอง แต่ยังแพร่กระจายไปทั่วจักรวรรดิของเรา แม้ว่าความรุนแรงส่วนใหญ่จะถูกเก็บไว้ไม่ให้สาธารณชนเห็น แต่ทั้งสองฝ่ายต่างก็ประสบความสูญเสียอย่างมาก ณ จุดนี้\n\nผู้ให้ข้อมูลของเราทั้งสองฝ่ายแจ้งว่า ทั้งสองกลุ่มกำลังมองหาการยึดอำนาจการปกครองของประเทศและวางแผนที่จะใช้กำลังยึดอำนาจเพื่อกำจัดศัตรู ดูเหมือนว่า ณ จุดนี้แม้แต่ [Root.GetRulerTitle] ของเราก็ต้องเลือกข้าง มิฉะนั้นจะถูกขจัดออกไปโดยอีกฝ่าย"
 subject.1142.a:0 "ขบวนการประชานิยมของ [admiral_democracy.GetName]"
 subject.1142.b:0 "ความเป็นผู้นำทางทหารของ [admiral_oligarchy.GetName]"

 subject.1145.title:0 "จุดจบของการแข่งขัน"
 subject.1145.desc:0 "[Root.GetAdmiraltyWinner]\n\n[Root.GetAdmiraltyLoserConsequences]\n\n[Root.GetAdmiraltyConsequences]"
 subject.1145.a:0 "หวังว่าช่วงเวลาที่เลวร้ายที่สุดได้ผ่านพ้นไปแล้ว"
 subject.1145.a.separatist.tt:0 "กลุ่มแบ่งแยกดินแดนได้เข้าควบคุม §Y[separatist_home.GetName]§! แล้ว"

 subject.1147.title:0 "รัฐบริวารที่แตกแยก"
 subject.1147.desc:0 "ดูเหมือนว่าข้อขัดแย้งและการโต้เถียงกันมากมายในฝ่ายบริหารกองทัพเรือของรัฐบริวารของเรา [subject_empire.GetName] ได้นำไปสู่การแบ่งแยกจักรวรรดิออกเป็นสองส่วน แม้ว่าจะยังคงมีความขัดแย้งกันอย่างรุนแรง แต่ทั้งสองฝ่ายดูเหมือนจะยอมรับการปกครองของเราต่อไป"
 subject.1147.a:0 "อย่างน้อยเราก็ไม่ต้องได้ยินเรื่องนี้อีกต่อไป"

 # Scripted Loc
 overlord_admiralty_democratic_victory:0 "หลังจากความขัดแย้งขึ้นสู่จุดสูงสุดในกองทัพเรือ ดูเหมือนว่าฝ่ายประชาธิปไตยจะสามารถเอาชนะคู่แข่งได้ และพวกเขากำลังเข้าควบคุมหน่วยงานส่วนกลางส่วนใหญ่ของเรา"
 overlord_admiralty_oligarchic_victory:0 "หลังจากความขัดแย้งขึ้นสู่จุดสูงสุดในกองทัพเรือ ดูเหมือนว่าฝ่ายคณาธิปไตยจะเป็นผู้ได้รับชัยชนะในความขัดแย้งที่กำลังก่อตัว และมีการประกาศกระจายเสียงอย่างกว้างขวางในอาณานิคมทั้งหมดของเรา"

 overlord_admiralty_democratic_killed_opponents:0 "ด้วยทุกสิ่งอยู่ภายใต้การควบคุมของพวกเขา ผู้บัญชาการฝ่ายประชาธิปไตยได้นำตัวอดีตคู่แข่งมาผ่านการดำเนินคดีสั้นๆ ก่อนที่พวกเขาจะถูกประหารชีวิตต่อหน้าสาธารณชนในฐานะผู้ทรยศต่อจักรวรรดิของเรา"
 overlord_admiralty_democratic_released_opponents:0 "ด้วยทุกสิ่งอยู่ภายใต้การควบคุมของพวกเขา ผู้บัญชาการฝ่ายประชาธิปไตยได้นำตัวอดีตคู่แข่งมาผ่านการดำเนินคดีสั้นๆ แต่พวกเขาส่วนใหญ่ได้รับการปล่อยตัวหลังจากถูกปรับอย่างเข้มงวด"
 overlord_admiralty_democratic_separatists:0 "แม้ว่าทุกอย่างจะอยู่ภายใต้การควบคุมของฝ่ายประชาธิปไตย แต่อดีตคู่แข่งของพวกเขาได้หายตัวไปในความสับสนวุ่นวาย ใช้เวลาไม่นานเราก็ได้รับรายงานเกี่ยวกับขบวนการแบ่งแยกดินแดนที่กำลังเติบโตรอบตัวสมาชิกเก่าของกองทัพเรือ"

 overlord_admiralty_oligarchic_killed_opponents:0 "หลังจากทำการประกาศต่อสาธารณะแล้ว ตามด้วยคำปราศรัยที่ประณามคู่แข่งว่าเป็นผู้ปลุกระดม ประชานิยม และผู้ทรยศ สมาชิกฝ่ายประชาธิปไตยที่แข็งแกร่งที่สุดถูกประหารชีวิตอย่างรวดเร็ว ส่วนที่เหลือหายไปจากการมองเห็นของสาธารณะ"
 overlord_admiralty_oligarchic_released_opponents:0 "หลังจากทำการประกาศต่อสาธารณะแล้ว ตามด้วยคำปราศรัยประณามอดีตคู่แข่ง พวกเขาถูกปรับอย่างหนักและดำเนินการตามขั้นตอนเพื่อให้แน่ใจว่าจะไม่สร้างความรำคาญอีกต่อไป"
 overlord_admiralty_oligarchic_separatists:0 "หลังจากทำการประกาศต่อสาธารณะ การไล่ล่าอดีตคู่แข่งก็เกิดขึ้นทันทีแต่ไร้ผล สมาชิกฝ่ายประชาธิปไตยได้หายตัวไปเกือบทั้งหมดหลังจากความวุ่นวายของการต่อสู้ในสำนักงานกองทัพเรือ"

 overlord_admiralty_imposed_government:0 "หลังจากกำจัดคู่แข่งได้ไม่นาน พวกเขาตัดสินใจที่จะกำหนดนโยบายรัฐบาลของตนเองให้กับจักรวรรดิของเรา"
 overlord_admiralty_continued_government:0 "แม้ว่าพวกเขาจะกำจัดคู่แข่งและเข้าควบคุมจักรวรรดิของเราได้แล้ว แต่ดูเหมือนพวกเขายินดีที่จะให้สิ่งต่างๆ ดำเนินต่อไปตามปกติ — ในตอนนี้"
 overlord_admiralty_imposed_leadership:0 "เมื่อคู่แข่งของพวกเขาจากไป พวกเขาตัดสินใจที่จะไม่เพียงกำหนดนโยบายของตนเองให้กับรัฐบาลของเราเท่านั้น แต่ยังให้อดีตผู้นำของพวกเขาเข้ามาดูแลนำทางโดยตรงอีกด้วย"

