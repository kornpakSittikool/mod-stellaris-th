 ## Event Chain - Destructive Research
 subject.2055.title:0 "การวิจัยที่สร้างความเสียหาย"
 subject.2055.desc:0 "บน [targeted_planet.GetName] เราได้ทำการวิจัยที่สำคัญเกี่ยวกับโครงสร้างของดาวเคราะห์เพื่อดูว่าเราจะสามารถปรับปรุงมันสำหรับอาณานิคมของเราอย่างไร น่าเสียดายที่การพัฒนาล่าสุดล้มเหลว โดยมีของเสียเป็นพิษส่งผลกระทบต่อพื้นที่ดินขนาดใหญ่ ทำให้ไม่สามารถอยู่อาศัยได้โดยสิ้นเชิง\n\nการคำนวณของเราบ่งชี้ว่านี่ไม่ใช่เหตุการณ์ที่เกิดขึ้นเพียงครั้งเดียว และตราบใดที่การวิจัยดาวเคราะห์นี้ยังคงดำเนินต่อไป โศกนาฏกรรมเหล่านี้น่าจะเกิดขึ้นอีก"
 subject.2055.a:0 "เราจะดำเนินการต่อ — ในตอนนี้"
 subject.2055.a.tt:0 "มีโอกาสสูงมากที่จะเกิดผลข้างเคียงเพิ่มเติมบน [targeted_planet.GetName]"
 subject.2055.b:0 "ระงับการวิจัยไว้ก่อนจนกว่าเราจะหาสาเหตุได้"

 subject.2060.title:0 "การวิจัยที่สร้างความเสียหาย - วิกฤตดินแดนรกร้าง"
 subject.2060.desc:0 "เนื่องจากผลข้างเคียงของของเสียเป็นพิษที่เกิดจากการวิจัยของเราบน [targeted_planet.GetName] ดูเหมือนว่าพืชและสัตว์บางชนิดที่เคยเจริญรุ่งเรืองที่นั่นได้สูญพันธุ์ไป และส่งผลกระทบเป็นลูกโซ่ต่อระบบนิเวศของดาวเคราะห์ โชคดีอย่างยิ่งที่ผู้ที่อาศัยอยู่บน [targeted_planet.GetName] ส่วนใหญ่ไม่ได้รับอันตรายจากเหตุการณ์นี้ แม้ว่ามันจะทำให้ชีวิตของพวกเขายากลำบากขึ้นก็ตาม"
 subject.2060.a:0 "ไม่ใช่ปัญหาใหญ่เกินกว่าจะรับมือได้"
 subject.2060.a.tt:0 "มีโอกาสอย่างมีนัยสำคัญที่จะเกิดผลข้างเคียงเพิ่มเติมบน [targeted_planet.GetName]"
 subject.2060.b:0 "เรื่องนี้ดำเนินมานานเกินไปแล้ว ยุติการทดลองเสีย"

 subject.2065.title:0 "การวิจัยที่สร้างความเสียหาย - วิกฤตมหาสมุทรเป็นพิษ"
 subject.2065.desc:0 "การประเมินเบื้องต้นของเราไม่ได้แม่นยำอย่างที่คาดหวัง และการพัฒนาล่าสุดบน [targeted_planet.GetName] ล้มเหลวหนักเกินกว่าที่คิด ของเสียเป็นพิษได้แพร่กระจายลงสู่แหล่งน้ำบนดาวเคราะห์ และส่งผลกระทบต่อเนื่องไปยังพื้นที่ดินใกล้เคียง\n\nด้วยการที่แหล่งน้ำและผืนดินขนาดใหญ่กลายเป็นพิษ อาณานิคมของเราจึงถูกบังคับให้ต้องย้ายออกเพื่อความปลอดภัยของตนเอง"
 subject.2065.a:0 "มันสายเกินกว่าจะหันหลังกลับในตอนนี้แล้ว"
 subject.2065.a.tt:0 "มีโอกาสสูงมากที่จะเกิดผลข้างเคียงเพิ่มเติมบน [targeted_planet.GetName]"
 subject.2065.b:0 "สายดีกว่าไม่มา เราจำเป็นต้องยุติเรื่องนี้"

 subject.2070.title:0 "การวิจัยที่สร้างความเสียหาย - วิกฤตลาวาไหลหลาก"
 subject.2070.desc:0 "เราได้รับรายงานว่าลาวาเหลวได้ปะทุขึ้นมาจากเปลือกโลกบน [targeted_planet.GetName] ดูเหมือนการวิจัยล่าสุดทำให้ดาวเคราะห์ไร้เสถียรภาพจนเกิดแผ่นดินไหวบ่อยครั้งในช่วงไม่กี่เดือนที่ผ่านมา และผู้คนเริ่มหมดศรัทธาในนักวิทยาศาสตร์ที่นั่น\n\nตามรายงานทั้งหมด ดูเหมือนนักวิทยาศาสตร์ของเราจะแน่ใจว่าเราได้มาถึงจุดต่ำสุดแล้ว ทั้งในแง่อุปมาอุปไมยและตามความเป็นจริง"
 subject.2070.desc_gestalt:0 "ดูเหมือนว่าการวิจัยล่าสุดที่เราทำบน [targeted_planet.GetName] ได้ส่งผลข้างเคียงต่อดาวเคราะห์มากขึ้น หลังเกิดแผ่นดินไหวขนาดเล็กใกล้อาณานิคมแห่งหนึ่งของเรา ลาวาเหลวและแก๊สได้ปะทุขึ้นมาจากใต้ดินอย่างกะทันหัน เปลี่ยนสถานการณ์ที่เราควบคุมได้ให้กลายเป็นภัยพิบัติ\n\nด้วยภัยพิบัติทั้งหมดที่เกิดขึ้นบน [targeted_planet.GetName] การคำนวณของเราคาดการณ์ว่าเราได้เห็นจุดที่แย่ที่สุดแล้วในตอนนี้"
 subject.2070.a:0 "อย่างน้อยมันก็แย่ไปกว่านี้ไม่ได้แล้ว"

 # Modifiers & Deposits
 specialist_technocracy_reduced_research:0 "การวิจัยที่ถูกขัดขวาง"
 specialist_technocracy_reduced_research_desc:0 "ความก้าวหน้าทางวิทยาศาสตร์บนดาวเคราะห์ถูกระงับชั่วคราวเพื่อให้แน่ใจว่าจะดำเนินต่อไปได้อย่างปลอดภัยยิ่งขึ้น เนื่องจากในอดีตมันได้สร้างความเสียหายอย่างมากต่อดาวเคราะห์"

 d_technocracy_toxic_waste_blocker:0 "ของเสียเป็นพิษ"
 d_technocracy_toxic_waste_blocker_desc:0 "ดินแดนรกร้างเป็นพิษที่เกิดจากการวิจัยความมั่นคงของดาวเคราะห์ นักวิทยาศาสตร์ที่ไร้หัวใจอาจสนใจว่ามันส่งผลกระทบต่อผู้อาศัยบนดาวเคราะห์อย่างไร"

 d_technocracy_barren_lands_blocker:0 "ผืนดินแห้งแล้ง"
 d_technocracy_barren_lands_blocker_desc:0 "ผืนดินแห้งแล้งที่เหลือทิ้งไว้โดยของเสียเป็นพิษบนดาวเคราะห์ หลังจากพืชและสัตว์จำนวนมากถูกทำลาย"

 d_technocracy_toxic_ocean_blocker:0 "แหล่งน้ำเป็นพิษ"
 d_technocracy_toxic_ocean_blocker_desc:0 "แหล่งน้ำส่วนใหญ่บนดาวเคราะห์ได้รับผลกระทบจากของเสียเป็นพิษ ส่งผลเสียต่อดินใกล้เคียงและทิ้งพื้นที่ไว้โดยไม่สามารถอยู่อาศัยได้สำหรับผู้ที่เคยอยู่ที่นั่น"

 d_technocracy_molten_waste_blocker:0 "เศษซากลาวาปะทุ"
 d_technocracy_molten_waste_blocker_desc:0 "ลาวาเหลวปะทุขึ้นมาจากใต้ดินหลังเกิดแผ่นดินไหวบนดาวเคราะห์ สร้างความเสียหายให้กับอาณานิคมในบริเวณใกล้เคียง"

 ## Event Chain - Experiments!
 subject.2105.title:0 "การวิจัยเชิงทดลอง"
 subject.2105.desc:1 "ความพยายามในการวิจัยของเรามีความสำคัญมากขึ้นเรื่อยๆ เมื่อพิจารณาจากข้อเรียกร้องอย่างต่อเนื่องจาก [overlord_empire.GetName] นักวิทยาศาสตร์ของเราหลายคนต้องดิ้นรนกับความกดดันนี้ ทว่าเราก็พบเห็นประกายแห่งอัจฉริยะและการค้นพบที่น่าทึ่งเกิดขึ้นบ้าง\n\nการทดลองล่าสุดอาจมาจาก [targeted_scientist.GetName] ซึ่งได้ออกแบบชุดการทดลองที่กล้าหาญเพื่อให้หน่วยงานของเราทดสอบ ข้อเสียเพียงอย่างเดียวคือการทดลองกับ [Root.GetSpeciesNamePlural] ที่มีชีวิตเป็นส่วนหนึ่งของข้อเสนอทั้งหมดของพวกเขา"
 subject.2105.desc_gestalt:0 "เราได้รับข้อเรียกร้องเพิ่มเติมจาก [overlord_empire.GetName] เนื่องจากพวกเขาต้องการปรับปรุงผลผลิตการวิจัยของเรา มีการคำนวณหลายรายการเพื่อหาทางตอบสนองความคาดหวังของจักรวรรดิผู้ปกครอง และเราเชื่อว่าพบหนทางในการปรับกระบวนการของเราเพื่อให้บรรลุผลนั้น\n\nอย่างไรก็ตาม ในการดำเนินการดังกล่าว เราจะต้องทำการทดลองหลายอย่างกับโดรนของเราและโครงข่ายประสาทร่วมกัน ซึ่งจะมีความเสี่ยงสูงอย่างมากที่เกี่ยวข้อง"
 subject.2105.a:0 "เราจะสนับสนุนการทดลองนี้"
 subject.2105.b:0 "สั่งระงับเรื่องนี้ซะ"
 subject.2105.c:0 "ดำเนินการต่อไป"
 subject.2105.d:0 "เราไม่สามารถยอมประนีประนอมกับตัวตนของเราได้"

 subject.2110.title:0 "ทุกสิ่งเพื่อการวิจัย"
 subject.2110.desc:0 "เราได้รับรายงานจากเขตที่พักอาศัยแห่งหนึ่งบน [Root.Capital.GetName] เกี่ยวกับที่อยู่อาศัยของ [targeted_scientist.GetName] เจ้าหน้าที่รักษากฎหมายท้องถิ่นพบร่างของ [Root.GetSpeciesNamePlural] หลายตน — ดูเหมือนจะเป็นส่วนหนึ่งของการทดลองที่น่าสยดสยองแต่ล้มเหลวในสถานที่ดังกล่าว\n\nเราได้รับแจ้งว่าไม่มีใครสามารถระบุตำแหน่งของ [targeted_scientist.GetName] ได้ ซึ่งเขาสามารถหลบเลี่ยงเซนเซอร์ทั้งหมดของเราได้สำเร็จ"
 subject.2110.a:0 "บางทีมันอาจจะเป็นผลดีแล้วก็ได้"

 subject.2112.title:0 "การวิจัยเชิงทดลอง"
 subject.2112.desc:0 "ข่าวส่งมาถึงเราจาก [subject_empire.GetName] — พวกเขาเริ่มทำการทดลองกับเผ่าพันธุ์ของตนเองอย่างรุนแรง ซึ่งบ่อยครั้งมีผลลัพธ์ที่เลวร้าย แม้ว่าทูตท้องถิ่นของเราจะไม่ได้เรียกร้องให้เราเข้าแทรกแซงโดยตรง แต่จดหมายนั้นก็ได้แสดงความนัยไว้อย่างชัดเจน"
 subject.2112.desc_gestalt:0 "ข่าวส่งมาถึงเราว่า [subject_empire.GetName] ได้เริ่มทำการทดลองกับเผ่าพันธุ์ของตนเอง แม้จะไม่ชัดเจนว่าด้วยเหตุผลใด เราไม่พบความเสี่ยงใดๆ ในการปล่อยให้พวกเขาทำต่อไป นอกเหนือจากอันตรายที่พวกเขาอาจสร้างขึ้นกับตนเอง"
 subject.2112.a:0 "ไม่ใช่เรื่องของเราที่จะไปแทรกแซงกิจการภายในของพวกเขา"
 subject.2112.b:0 "สั่งยุติเรื่องนี้ซะ"

 subject.2115.title:0 "การวิจัยถูกปฏิเสธ"
 subject.2115.desc:0 "ผู้ส่งสารจากจักรวรรดิผู้ปกครองนำคำสั่งที่ชัดเจนให้ยุติการทดลองและการทดสอบของ [Root.GetSpeciesAdj] ที่เพิ่งเริ่มขึ้นบน [Root.Capital.GetName] แม้ว่าข้อความจะไม่ได้ระบุเหตุผลเฉพาะเจาะจงว่าเพราะเหตุใด แต่มันก็ชัดเจนในตัวของมันเอง"

 subject.2120.title:0 "การวิจัยได้รับการยอมรับ"
 subject.2120.desc:0 "แม้เราจะไม่ได้รับการสื่อสารใดๆ จากจักรวรรดิผู้ปกครอง [overlord_empire.GetName] ของเรา แต่ดูเหมือนพวกเขาจะรับรู้ถึงการวิจัยที่เราเพิ่งเริ่มต้นขึ้นและเลือกที่จะไม่เข้ามาแทรกแซงแต่อย่างใด\n\nในการดำเนินงานตามแผนการของเราต่อไป เราต้องกำหนดว่าจะทำการทดลองใดในขั้นตอนถัดไป ยิ่งการทดลองมีความเสี่ยงและอาจเป็นอันตรายมากเท่าใด ผลประโยชน์ระยะยาวที่อาจได้รับต่อจักรวรรดิก็ยิ่งสูงขึ้นเท่านั้น"
 subject.2120.a:0 "เราจะทุ่มเทให้กับการทดลองจริงจัง"
 subject.2120.a.tt:0 "เราจะดำเนินการทดลองที่มีความเสี่ยงสูงขึ้น"
 subject.2120.b:0 "ทำการทดสอบเบาๆ ก็พอ"
 subject.2120.b.tt:0 "เราจะดำเนินการทดลองที่ปลอดภัยกว่าต่อไป"

 subject.2125.title:0 "ความล้มเหลวของการทดลอง"
 subject.2125.desc:0 "ท้ายที่สุด การทดลองหลายอย่างที่เราดำเนินการลงเอยด้วยความล้มเหลวและความผิดหวัง อย่างไรก็ตาม เราได้เรียนรู้สิ่งที่ไม่ควรทำในอนาคต"

 subject.2130.title:0 "ความสำเร็จของการทดลอง"
 subject.2130.desc:0 "การทดลองส่วนใหญ่ของเราประสบความสำเร็จในท้ายที่สุด และนำไปสู่การเรียนรู้บางอย่างที่คาดไม่ถึง ประธานทดสอบส่วนใหญ่รอดชีวิตและดูเหมือนจะทำได้ดี โดยรวมแล้วถือว่าประสบความสำเร็จอย่างงดงาม"
 subject.2130.a:0 "เป็นข่าวดีอย่างยิ่ง"

 subject.2135.title:0 "ความสำเร็จของการทดลอง"
 subject.2135.desc:0 "แม้บางท่านจะกล่าวว่าต้นทุนที่จ่ายไปนั้นสูงกว่าที่คาดไว้ แต่เราก็ประสบความสำเร็จอย่างงดงามในการทดลองหลายครั้งของเรา ด้วยผลลัพธ์ที่น่าสนใจและคาดไม่ถึงหลายประการ ทำให้เราได้เรียนรู้มากกว่าที่ข้อมูลคาดการณ์ใดๆ ของเราระบุไว้"
 subject.2135.a:0 "ราคาที่จ่ายไปนั้นคุ้มค่าอย่างแน่นอน"

 # Synced from vanilla by Stellaris Thai Translator.
 # These keys were missing from the mod and should be translated on the next pass.
 subject.2025.a:0 "และมันจะเป็นเช่นนั้น"
 subject.2030.a:0 "และมันจะเป็นเช่นนั้น"
 subject.2035.a:0 "และมันจะเป็นเช่นนั้น"
 subject.2140.title:0 "การพึมพําที่ไม่คาดหมาย"
 subject.2140.desc:0 "การทดลองของเราหลายครั้งนําไปสู่ การกลายพันธุ์ที่น่าสนใจในการทดลองทดลองของเรา จากความประหลาดและน่ากลัว สิ่งที่มาอย่างไม่คาดคิดก็คือ การเปลี่ยนแปลงเหล่านี้ได้ขยายออกไป นอกห้องทดลองของเรา เริ่มส่งผลกระทบต่ออาณาจักรของเรา"
 subject.2140.a:0 "น่าสนใจมาก..."
 subject.2145.title:0 "ผสมและเข้าคู่"
 subject.2145.desc:0 "การทดลองในช่วงแรกๆของเรา จบลงด้วยความล้มเหลว ถึงจุดที่เราต้องสร้างงานออกแบบใหม่อีกหลายครั้ง หนึ่งในสถานการณ์ที่เราออกแบบมา ผิดปกติมากขึ้น ได้แนะนํา[targeted_species.Species.GetAdj]เข้าร่วมการทดลอง คาดหวังต่ํา แต่สุดท้ายก็ประสบความสําเร็จอย่างไม่คาดคิด เนื่อง จาก ได้ ชัย ชนะ ครั้ง นั้น เรา จึง ได้ ทดลอง สอง ชนิด ของ เรา ต่อ ไป."
 subject.2145.a:0 "ไม่เชิงอย่างที่เราคาดไว้ แต่น่าสนใจอยู่ดี"
 subject.2145.a.tt:0 "§Y100§! £pop£ §H[Root.Species.GetName]ป๊อป§!ถึง§Y100§! £pop£ §H[targeted_species.Species.GetName]ป๊อป§!รวมเข้ากับ§Y100§! £pop£ §H[new_species.Species.GetName]ป๊อป§!"
 subject.2150.title:0 "การประมวลผลล้มเหลว"
 subject.2150.desc:0 "$subject.2125.desc$"
 subject.3005.title:0 "ปัญหา ที่ บ้าน"
 subject.3005.desc:0 "คนจํานวนมากจาก[overlord_empire.GetName]เรา เริ่ม ไป เยี่ยม โลก ของ เรา หลัง จาก ที่ เรา กลาย เป็น หัว เรื่อง ของ พวก เขา แสดง ความ สนใจ ใน วัฒนธรรม และ ผู้ คน ของ เรา. ตอนแรกเราคิดว่ามันเป็นสิ่งที่ดีสําหรับเราทุกคน แต่เราเห็นการเพิ่มขึ้นของความขัดแย้งระหว่างท้องถิ่นและ[overlord_empire.GetAdj]ผู้ มา เยือน เมื่อ มา ช้า พวก เขา ดู เหมือน เก็บ ความ เข้าใจ ผิด บาง อย่าง เกี่ยว กับ จักรวรรดิ ของ เรา และ พวก เขา มัก จะ ใช้[overlord_empire.GetAdj]วัฒนธรรม และ อุดมการณ์ เพื่อ แก้ ต่าง ให้ กับ ความ เป็น คน หยาบ คาย."
 subject.3005.a:0 "จักรวรรดิทั้งสองของเราจะเรียนรู้ เพื่อเติบโตร่วมกันในเวลา"
 subject.3005.b:0 "จํากัดการเดินทางพลเรือน"
 subject.3010.title:0 "ความแตกต่างบน[subject_empire.Capital.GetName]"
 subject.3010.desc:0 "พวกเราได้รับสัญญาณรบกวนจากผู้คนของเรา[subject_empire.Capital.GetName]เมืองหลวงของ[subject_empire.GetName]. เดอะ[subject_empire.GetName]การ ปกครอง ได้ สั่ง พวก เขา ให้ ออก จาก โลก ทันที เพราะ ดู เหมือน ว่า พลเรือน ของ เรา ไม่ ได้ รับ การ ต้อนรับ ใน จักรวรรดิ ของ ตน อีก ต่อ ไป หลัง จาก ที่ มี การ กล่าว หา ว่า มี ความ ขัด แย้ง กัน หลาย ครั้ง."
 subject.3010.a:0 "ชายแดนจะเปิด ไม่ทางใดก็ทางหนึ่ง"
 subject.3010.b:0 "ถ้าคนของเราไม่ทําตัว เขาก็อยู่บ้าน"
 subject.3015.title:0 "เส้นขอบเปิด"
 subject.3015.desc:0 "ดูเหมือนว่าเจ้านายของเราเคยได้ยินเกี่ยวกับสถานการณ์และได้ส่งเพียงเล็กน้อย คณะกรรมการราชการและทหารเพื่อความชัดเจนของพวกเขาเกี่ยวกับเรื่องนี้ ในคําที่ไม่แน่นอนพวกเขาทําให้มันชัดเจนว่า เราจะเปิดพรมแดนเพื่อพลเรือนของพวกเขาอย่าง สันติหรือพวกเขาจะทําให้พรมแดนเปิดระหว่างเรา"
 subject.3015.a:0 "มันไม่ได้สําคัญพอที่จะต่อสู้เพื่อ"
 subject.3020.title:0 "เรื่อง ที่ ได้ รับ สิทธิ พิเศษ"
 subject.3020.desc:0 "ดูเหมือนว่าเจ้านายของเราเคยได้ยินเกี่ยวกับสถานการณ์และเลือกที่จะยอมรับการตัดสินใจของเราที่จะปิดพรมแดนของเรากับ[overlord_empire.GetAdj]ทัวร์พลเรือน ผู้บริหารบางคนกลัวว่าเรื่องนี้ จะทําให้เกิดเหตุการณ์ทางการทูต แต่ดูเหมือนมันจะเลี่ยงไม่ได้"
 subject.3020.a:0 "มันได้ผลดีกว่าที่เราหวังไว้"
 specialist_overlord_frustrated_population:0 "ความขัดแย้งภายใน"
 specialist_overlord_frustrated_population_desc:0 "ผู้ มา เยือน ไม่ สนใจ ธรรมเนียม ท้อง ถิ่น และ มาตรฐาน ของ ท้อง ถิ่น ถึง ขั้น ทําลาย ชีวิต ประจํา วัน ของ โลก นี้."
 subject.3055.title:0 "พิลกริมบน[overlord_empire.Capital.GetName]"
 subject.3055.desc:0 "ดังนั้น พระดํารัส (การลงโทษ) ได้ประสบแก่เราแล้ว ในหมู่คณะต่าง ๆ[subject_empire.GetName]หาทางผ่านพื้นที่ของเรา ดูเหมือนพวกเขาจะเชื่อ[overlord_empire.GetName]มี ความ สําคัญ บาง อย่าง ทาง ศาสนา สําหรับ มาตุภูมิ ของ พวก เขา. แม้ ราย ละเอียด เกี่ยว กับ ความ เชื่อ มั่น ทาง ศาสนา ของ พวก เขา ยัง คง คลุมเครือ แต่ พวก เขา ก็ เป็น นัก ท่อง เที่ยว ที่ มี มารยาท ดี และ เรา ไม่ เคย ได้ ยิน แต่ สิ่ง ดี ๆ เกี่ยว กับ การ อยู่ ที่ นี่."
 subject.3055.a:0 "การแสดงความเป็นมิตร ดูเหมือนว่า"
 subject.3060.title:0 "ชาวอารยันกลับมาแล้ว"
 subject.3060.desc:0 "กลุ่มพลเรือนที่เดินทางไป[overlord_empire.Capital.GetName]ใน[overlord_empire.GetName]ในที่สุดก็ได้กลับมา พร้อมกับเรื่องราวและเรื่องราว ของผู้คนที่พวกเขาพบ และสิ่งที่มันเป็น ดูเหมือนคนของเราจะได้รับการรักษาอย่างดีอย่างน่าประหลาด ระหว่างที่พวกเขาไปเยี่ยม และตอนนี้มีอีกหลายคนที่สนใจที่จะเดินทางไปที่นั่นเอง ถ้าเรามีอิทธิพลต่อเจ้าบ้านของเรา เราอาจจะทําการแลกเปลี่ยนทางวัฒนธรรม ได้บ่อยขึ้น"
 subject.3060.a:0 "รากฐานสําหรับความสัมพันธ์ในอนาคต"
 subject.3060.b:0 "ไม่มีอะไรมากไปกว่า ระยะเวลาอันสั้น"
 subject.3065.title:0 "ความ ผูก พัน ใกล้ ชิด"
 subject.3065.desc:0 "ไม่เพียง แต่กลุ่มดั้งเดิมของพิลกริมที่มาที่นี่เป็นมิตรและความหมายที่ดี แต่ดูเหมือนว่า[subject_empire.GetName]ได้ลงทุนบางส่วนของทรัพยากรของพวกเขา เพื่อพยายามที่จะเปลี่ยนมันเป็นความสัมพันธ์ถาวรมากขึ้น หนึ่งที่พวกเขาจะส่งผู้แสวงบุญทางของเราเป็นประจํา"
 subject.3065.a:0 "ดีใจที่ได้ยินอย่างนั้น"
 subject.3070.title:0 "การจัดวาง"
 subject.3070.desc:0 "แม้ว่ากลุ่มผู้แสวงบุญที่เราได้รับ[overlord_empire.Capital.GetName]ได้ รับ การ ปฏิบัติ อย่าง ดี และ ดู เหมือน จะ เพลิดเพลิน กับ การ อยู่ ที่ นั่น เรา ได้ ยิน ว่า[subject_empire.GetName]กําลังเข้าสู่การเดินทางในอนาคต"
