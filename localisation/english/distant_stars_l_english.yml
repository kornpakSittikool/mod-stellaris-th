 gaia_planet_cat:0 "กิจกรรมของต่างดาว"
 gaia_planet_cat_desc:0 "เซนเซอร์ของเรากำลังตรวจจับการแผ่พลังงานซึ่งบ่งชี้ถึงกิจกรรมของต่างดาวบน [Root.GetName]"
 corrupt_data_cat:0 "ข้อมูลการสำรวจที่เสียหาย"
 corrupt_data_cat_desc:0 "บางสิ่งในระบบดาว [From.System.GetName] กำลังทำให้ข้อมูลเซนเซอร์ของเราบางส่วนเกิดความเสียหาย แหล่งกำเนิดของความผิดปกตินี้ดูเหมือนจะเป็นดาวเคราะห์ [From.GetName]"
 irregular_energy_cat:0 "การแผ่พลังงานที่ผิดปกติ"
 irregular_energy_cat_desc:0 "เซนเซอร์ของเราบ่งชี้ถึงความผิดปกติที่แปลกประหลาดในรูปแบบการแผ่พลังงานของ [From.GetName]"
 peculiar_patterns_cat:0 "ลวดลายที่น่าแปลกใจ"
 peculiar_patterns_cat_desc:0 "ลวดลายแปลกประหลาดที่สามารถมองเห็นได้อย่างชัดเจนแม้จากอวกาศ กำลังก่อตัวขึ้นทั่วพื้นผิวของ [Root.GetName]"
 tomb_world_cat:0 "ดาวแห่งความตาย"
 tomb_world_cat_desc:0 "ค่าการตรวจจับที่ผิดปกติชี้ให้เห็นว่าโลกที่รกร้างแห่งนี้อาจมีบางสิ่งซ่อนอยู่มากกว่าที่ตาเห็น"
 alien_life_cat:0 "สิ่งมีชีวิตต่างดาว"
 alien_life_cat_desc:0 "ค่าการตรวจจับแรกเริ่มจาก [From.GetName] ชี้ให้เห็นว่ามันสามารถรองรับสิ่งมีชีวิตต่างดาวได้"
 moon_cat:0 "ดวงจันทร์ที่ผิดปกติ"
 moon_cat_desc:0 "มีบางสิ่งที่ผิดปกติเกี่ยวกับดวงจันทร์ดวงนี้"
 time_loop_world:0 "โลกที่ถูกกำบังด้วยเกราะ"
 time_loop_world_desc:0 "ด้วยเหตุผลที่ไม่มีใครทราบ [Root.GetName] ถูกห่อหุ้มไว้ภายใต้เกราะป้องกันที่ไม่มีสิ่งใดทะลวงผ่านได้ และในขณะนี้เกราะดังกล่าวกำลังเกิดรอยแตกร้าว"

