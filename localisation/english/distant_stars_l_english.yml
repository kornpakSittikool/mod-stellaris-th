 mineral_mapping_desc:0 "ระบบที่ช่วยให้เราทำการบันทึกข้อมูลภูมิประเทศใต้ดินและวาดแผนที่เส้นทางแร่ได้อย่างแม่นยำและรวดเร็ว"
 disregard_for_alien_life:0 "การเพิกเฉยต่อชีวิตต่างดาว"
 disregard_for_alien_life_desc:0 "กระทำการในลักษณะที่ไม่สมกับการเป็นผู้รักต่างดาว(เสียงตกใจ)โดยไม่คำนึงถึงชีวิตต่างดาวและความหลากหลายทางชีวภาพของแกแล็กซี่"

 ####################################
 # Anomaly Categories
 ####################################
 # FROM = planet scope
 # ROOT = ship scope

 ### Trojan Asteroid ###
 disco_trojan_asteroid_cat:0 "ภายในที่ไม่รู้จัก"
 disco_trojan_asteroid_cat_desc:0 "การสแกนในเบื้องต้นของดาวเคราะห์น้อย [From.GetName] ชี้ให้เห็นถึงมวลโลหะที่หนาแน่นอยู่ภายใน ซึ่งอาจเป็นส่วนหนึ่งของเครื่องจักรหรือเทคโนโลยีอื่น ๆ จำเป็นต้องทำการสแกนเพิ่มเติมเพื่อให้ได้ข้อมูลที่ละเอียดขึ้น"

 ### Impossible Organism ###
 disco_impossible_organism_cat:0 "สิ่งมีชีวิตที่เป็นไปไม่ได้"
 disco_impossible_organism_cat_desc:0 "พบสัญญาณชีวิตที่คาดไม่ถึงในระหว่างการสำรวจดาวเคราะห์พิษ [From.GetName] แม้จะมีขนาดเล็กแต่ก็มีความสำคัญ"

 ### Stranded Scientist ###
 disco_stranded_scientist_cat:0 "ซากยานอวกาศ"
 disco_stranded_scientist_cat_desc:0 "เศษเหล็กและชิ้นส่วนโลหะกระจัดกระจายอยู่ทั่วพื้นผิวของ [From.GetName] โอบล้อมรอบสิ่งที่ดูเหมือนโครงร่างของยาน ซากปรักหักพังดูเหมือนถูกทิ้งร้าง แต่ยังคงมีค่าพลังงานหลงเหลืออยู่"

 ### Molluscoid Miners ###
 disco_molluscoid_miners_cat:0 "ผู้อยู่อาศัยที่อาจเป็นไปได้"
 disco_molluscoid_miners_cat_desc:0 "การสแกนทางแสงของดาวเคราะห์ [From.GetName] เผยให้เห็นสิ่งปลูกสร้างขนาดเล็กคล้ายกระท่อมกระจัดกระจายอยู่บนพื้นผิวบางส่วน ชี้ให้เห็นว่าอาจมีผู้อยู่อาศัย"

 ### Alien Machine ###
 disco_alien_machine_cat:0 "เครื่องจักรต่างดาว"
 disco_alien_machine_cat_desc:0 "บนพื้นผิวของ [From.GetName] มีวัตถุที่ดูเหมือนเครื่องจักรขนาดใหญ่วางอยู่ โดยไม่ทราบที่มาและวัตถุประสงค์ของการใช้งาน"

 ### Orbital Speed Demon ###
 disco_speed_demon_cat:0 "ปีศาจความเร็ววงโคจร"
 disco_speed_demon_cat_desc:0 "มีวัตถุลึกลับขนาดเล็กชิ้นหนึ่งติดอยู่ในวงโคจรรอบ [From.GetName] โดยเคลื่อนที่ด้วยความเร็วสูงมากจนไม่น่าเชื่อ"

 ### Breathing Rift ###
 disco_breathing_rift_cat:0 "ปรากฏการณ์แสง"
 disco_breathing_rift_cat_desc:0 "ค้นพบปรากฏการณ์ที่ไม่รู้จักใกล้กับ [From.GetName] มันทำให้แสงเกิดการหักเหบ่อยครั้ง และในบางครั้งถึงขั้นบดบังแสงทั้งหมดโดยสมบูรณ์"

