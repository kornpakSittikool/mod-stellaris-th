 # PROJECTS
 INVISIBLE_DEATH:0 "ห้องปฏิบัติการเอ็กซ์แวน(Xwan Labs)"
 INVISIBLE_DEATH_DESC:0 "เราได้ระบุตำแหน่งของห้องปฏิบัติการเอ็กซ์แวน(Xwan Labs)แล้ว - กลุ่มโครงสร้างทรงพีระมิดที่ซ่อนอยู่ซึ่งสร้างขึ้นจากวัสดุที่ไม่รู้จัก จมอยู่ใต้ชั้นทรายและฝุ่นละออง เราจำเป็นต้องขุดค้นสิ่งอำนวยความสะดวกเหล่านี้ขึ้นมาก่อนที่จะเข้าไปสำรวจได้ แต่ทว่าหากพวกกบฏคาดการณ์ไว้ถูกต้อง อาวุธที่อยู่ภายในย่อมคุ้มค่ากับความพยายามอย่างแน่นอน"
 ICE_ALIEN:0 "สิ่งมีชีวิตต่างดาวในน้ำแข็ง"
 ICE_ALIEN_DESC:0 "สิ่งที่ติดค้างอยู่ภายในก้อนน้ำแข็งขนาดมหึมาราวกับภูเขาคือเศษซากของสิ่งมีชีวิตในรูปแบบที่เราไม่เคยพบเห็นมาก่อน ใครจะรู้ล่ะว่ามันเดินทางผ่านเวลาและอวกาศมาไกลเพียงใด\n\nนักวิจัยของเราได้เตรียมการที่จำเป็นในการชุบชีวิตมันกลับคืนมาแล้ว"
 ENIGMATIC_CACHE_PROJECT:1 "แขกผู้เป็นปริศนา"
 ENIGMATIC_CACHE_PROJECT_DESC:0 "ตัวตนต่างดาวอันลึกลับได้เข้าสู่วงโคจรของ [Root.GetName] แล้ว สมควรระบุจุดประสงค์ของมันที่นี่โดยเร็วที่สุดเท่าที่จะเป็นไปได้"
 distar.1050.a.tooltip:0 "เปิดใช้งานช่องทางติดต่อสื่อสารกับชาว [delicious_aliens.GetName] สิ่งมีชีวิตต่างดาวที่โอชะที่สุดในแกแล็กซี่"
 GATEWAY_INTERFERENCE:0 "สัญญาณรบกวนเกตเวย์"
 GATEWAY_INTERFERENCE_DESC:0 "จักรวรรดิที่ไม่รู้จักพยายามจะแฮ็กเข้าสู่โครงข่ายแอล-เกตโบราณโดยใช้ลำแสงรบกวนในตอนที่พวกเขาถูกโจมตีและทำให้ลำแสงได้รับความเสียหาย บางทีลำแสงนี้อาจได้รับการกู้คืนกลับมาได้"

