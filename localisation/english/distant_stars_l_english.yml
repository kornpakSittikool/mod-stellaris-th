 distar.57.name:0 "ความตายของอะมีบา"
 distar.57.desc:1 "ข่าวการตายของ [From.Fleet.GetName] แพร่สะพัดไปทั่ว [Root.GetName] แม้ว่าจะไม่มีผู้ใดได้รับผลกระทบมากเท่ากับเจ้าหน้าที่วิทยาศาสตร์ [amoeba_finding_scientist.GetName] ผู้นี้เป็นคนแรกที่ค้นพบอะมีบาอวกาศในตอนที่ยังเป็นเพียงตัวน้อยที่หลงทางและไร้ที่พึ่งพิง และเฝ้าดูสิ่งมีชีวิตนี้เติบโตจนโตเต็มวัยภายใต้การชี้แนะอย่างอ่อนโยนของ [amoeba_finding_scientist.GetHisHer] เอง\n\nบัดนี้เมื่อปราศจากการเคียงข้างอย่างเงียบสงบของ [From.Fleet.GetName] เจ้าหน้าที่ [amoeba_finding_scientist.GetName] อาจไม่มีวันกลับมาเป็นเหมือนเดิมอีก"
 distar.57.a:0 "น่าเสียดายยิ่งนัก"
 distar.304.name:0 "อายุครบศตวรรษ"
 distar.304.desc:0 "ข่าวอันน่าตื่นเต้นจากผู้บัญชาการกองยานของเรากำลังออกอากาศทั่วทั้ง [Root.Capital.GetName] อะมีบาอวกาศที่เราอุปการะไว้ [lost_amoeba_centenarian_fleet.GetName] เพิ่งจะมีอายุครบหนึ่งร้อยปีอย่างเป็นทางการแล้ว\n\nแม้จะเป็นผู้อาวุโสอายุร้อยปี แต่ดูเหมือนว่าอายุจะไม่ได้เป็นอุปสรรคต่อพันธมิตรอะมีบาของเราเลย ในความเป็นจริง กองยานของเรารายงานว่าการปรากฏตัวของ [lost_amoeba_centenarian_fleet.GetName] ในสนามรบมีแต่จะน่าเกรงขามยิ่งขึ้นตามกาลเวลา [lost_amoeba_centenarian_fleet.GetName] ได้กลายเป็นกองกำลังที่แม้แต่ยานรบที่ติดตั้งยุทโธปกรณ์ที่ดีที่สุดก็ยังรับมือได้ยาก การได้เห็นหนวดของเธอโบกสะบัดเมื่อเข้าสู่ระบบดาวไม่เคยล้มเหลวที่จะช่วยยกระดับจิตวิญญาณของ [Root.GetSpeciesAdj] เลย"
 distar.304.a.tooltip:0 "[lost_amoeba_centenarian_fleet.GetName] ได้พัฒนาทักษะการต่อสู้ใหม่!"

 distar.60.name:0 "ชะตากรรมที่มืดบอด"
 distar.60.desc:0 "ซากที่อาบกัมมันตภาพรังสีซึ่งลูกเรือ [Root.GetName] ตรวจพบในวงโคจรใกล้ชิดของ [From.GetName] นั้นคือซากของยานสำรวจอวกาศจริง ด้วยการออกแบบที่โดดเด่นเป็นเอกลักษณ์ มันจึงไม่ตรงกับยานสัญชาติใด ๆ ที่เคยมีบันทึกไว้\n\nเราได้ทำการกู้ข้อมูลบางส่วนจากคอมพิวเตอร์ที่ชำรุดของยาน ซึ่งถูกบันทึกด้วยภาษาต่างดาวที่เราไม่เคยพบเห็นมาก่อน และเป็นภาษาที่เราไม่สามารถแปลได้\n\nจากการศึกษาซากยาน เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] สันนิษฐานว่ายานลำนี้ซึ่งมีชื่อว่า\"โคทาโล\"ประสบข้อผิดพลาดในการนำทางเมื่อออกจากความเร็วทำให้มันเข้ามาใกล้กับลำรังสีแกมมาของ [From.GetName] มากเกินไป ชิ้นส่วนขนาดใหญ่ของยานถูกทำลายจากปฏิกิริยาสลายตัวด้วยรังสี ไม่มีผู้รอดชีวิต"
 distar.61.name:0 "เดจาวู(เดจาวู)"
 distar.61.desc:0 "เซนเซอร์รายงานว่ายานที่มีลักษณะเหมือนกันทุกประการกับซากอันเป็นเอกลักษณ์ที่ค้นพบใกล้กับ [ouroboros_system.GetName] เพิ่งจะเดินทางออกจากไฮเปอร์สเปซเข้ามาในระบบดาว [kohtalo_second_fleet.GetStarName] พวกเขากำลังติดต่อหาเรา!"
 distar.62.name:0 "เดจาวู(เดจาวู)"
 distar.62.desc:0 "§Eลูกเรือของยานแปลกหน้าดวงนี้ซึ่งเหมือนกับซากยานที่พบใกล้ [ouroboros_system.GetName] ดูตื่นเต้นที่จะพูดคุยกับเรา แม้ว่าเครื่องแปลภาษาของเราจะไม่สามารถถอดรหัสภาษาของของพวกเขาได้ พวกเขาระบุตัวตนด้วยการแสดงออกทางคำพูดคลื่นความถี่ต่ำที่ฟังดูเหมือน\"โคทาโล\"ซึ่งเป็นชื่อที่เราเคยได้ยินมาก่อน\n\nบางทีเราอาจจะสื่อสารกันโดยใช้ข้อมูลดิบได้§!"
 distar.62.a:0 "พยายามถามว่าจุดประสงค์ของพวกเขาที่นี่คืออะไร"
 distar.63.name:0 "ยาน Kohtalo"
 distar.63.desc:0 "§Eเราได้รับข้อมูลหลั่งไหลเข้ามาเป็นการตอบกลับ รวมถึงภาพแผนที่ของดาราจักรใกล้เคียง และคลิปวิดีโอของสิ่งที่ดูเหมือนว่าจะเป็นวิศวกรกำลังทำงานกับเครื่องยนต์ความเร็วต่างดาว\n\nเราไม่สามารถสรุปเป็นอื่นได้นอกจากว่าพวกเขาคือนักสำรวจจากดาราจักรอื่น การที่ยานของพวกเขาไม่มีอาวุธช่วยสนับสนุนทฤษฎีนี้\n\nเราส่งภาพวิดีโอของนักสำรวจ [Root.GetAdj] ในการเดินทางครั้งแรกของพวกเราออกนอกระบบสุริยะกลับไป และการตอบรับจากลูกเรือต่างดาวดูเหมือนจะเป็นไปอย่างปลื้มปีติยินดี§!"
 distar.63.a:0 "ส่งข้อมูลที่กู้คืนได้จากซากยานที่ [ouroboros_system.GetName] ให้พวกเขา"
 distar.64.name:0 "ยาน Kohtalo"
 distar.64.desc:0 "§Eความตื่นเต้นของลูกเรือ Kohtalo ดูเหมือนจะมลายหายไป สมาชิกลูกเรือหลายคนเริ่มกดคอนโซลอย่างรวดเร็วโดยใช้รยางค์คล้ายหนวดของพวกเขา พวกเขาส่งข้อมูลที่ดูเหมือนจะเป็นรายชื่อผู้โดยสาร ข้อมูลการนำทาง และบันทึกของลูกเรือมาให้เรา ข้อมูลดังกล่าวตรงกับซากยานที่พบในระบบดาว [ouroboros_system.GetName] ทุกประการ โดยมีข้อยกเว้นประการเดียวคือ ซากยานที่ [ouroboros_system.GetName] มีบันทึกเพิ่มเติมที่มีวันที่ใหม่กว่า\n\nดูเหมือนว่าซากยานที่ [ouroboros_system.GetName] จะเป็นยานลำเดียวกันกับลำที่อยู่ตรงหน้าเราในขณะนี้... เพียงแต่เป็นลำในอนาคตที่แก่กว่า§!"
 distar.64.a:0 "นี่มันเป็นไปไม่ได้..."
 distar.65.name:0 "ยาน Kohtalo"
 distar.65.desc:0 "§Eแม้ว่าพฤติกรรมของพวกเขาจะดูแปลกตา แต่ความตระหนกของลูกเรือ Kohtalo ก็แสดงออกมาอย่างชัดเจน คณะที่ปรึกษาทางวิทยาศาสตร์ของเราแจ้งว่า หากซากยานที่ [ouroboros_system.GetName] เป็นอนาคตของยานลำนี้จริง ๆ ข้อมูลใด ๆ ที่เรามอบให้พวกเขาอาจก่อให้เกิดผลลัพธ์ที่คาดไม่ถึงได้§!"
 distar.65.a:0 "ถ้าเราเตือนพวกเขา พวกเขาอาจหลีกเลี่ยงภัยพิบัติได้"
 distar.65.a.tooltip:0 "ส่งคำเตือนไปยังยาน Kohtalo เพื่อให้หลีกเลี่ยงพัลซาร์ที่ [ouroboros_system.GetName]"
 distar.65.b:0 "เราไม่สามารถเสี่ยงที่จะแทรกแซงเส้นเวลาเพิ่มเติมได้"
 distar.65.b.tooltip:0 "ปิดการสื่อสาร"
 distar.66.name:0 "ยาน Kohtalo"
 distar.66.desc:0 "§Eนักสำรวจจากนอกดาราจักรเริ่มศึกษาข้อมูลระบบที่เราส่งให้พวกเขาอย่างเร่งรีบ พูดคุยกันด้วยภาษาแปลกประหลาด และป้อนคำสั่งมากมายบนคอนโซลของพวกเขา นักการทูตของเราเฝ้ารอการตอบกลับอย่างอดทน แต่ก่อนที่จะได้รับการตอบรับ เครื่องยนต์ของยานก็เริ่มทำงานอย่างกะทันหันโดยไม่คาดคิด\n\nก่อนที่เราจะทันได้ตอบสนอง พวกเขาก็หายวับไปแล้ว§!"
 distar.66.a:0 "ขอให้โชคดีเหล่านักเดินทางแห่งดวงดาว"
 distar.67.name:0 "อูโรโบรอส(อุรุกวัย)"
 distar.67.desc:0 "เซนเซอร์ระบบระบุว่า ยานสำรวจต่างมิติ Kohtalo ได้ออกจากความเร็วอย่างกะทันหันที่บริเวณรอบนอกของระบบดาว [ouroboros_system.GetName] และชนเข้ากับดาวหางในวงโคจรอย่างจัง! การชนกันนั้นรุนแรงมากจนคร่าชีวิตทุกคนบนยาน และทำให้ซากยานที่เหลือหมุนคว้างเข้าไปหาพัลซาร์ที่ [ouroboros_system.GetName]\n\nดูเหมือนว่าดาวหาง ไม่ใช่พัลซาร์ ที่เป็นตัวการนำความตายมาสู่ยาน Kohtalo และในความพยายามของเราที่จะเตือนพวกเขาเกี่ยวกับชะตากรรมของตนเอง กลับกลายเป็นการทำให้มันเกิดขึ้นจริง บัดนี้ซากยานทั้งสองจึงล่องลอยอยู่รอบพัลซาร์ที่ [ouroboros_system.GetName]"
 distar.68.name:0 "อูโรโบรอส(อุรุกวัย)"
 distar.68.desc:0 "เซนเซอร์ระบบระบุว่า ยานสำรวจต่างมิติ Kohtalo ได้ออกจากความเร็วอย่างกะทันหันที่บริเวณรอบนอกของระบบดาว และชนเข้ากับดาวหางในวงโคจรอย่างจัง! การชนกันนั้นรุนแรงมากจนคร่าชีวิตทุกคนบนยาน และทำให้ซากยานที่เหลือหมุนคว้างเข้าไปหาพัลซาร์ที่ [ouroboros_system.GetName]\n\nนักวิเคราะห์ของเราสรุปว่า เครื่องยนต์ความเร็วที่อาศัยมวลผกผันของยาน Kohtalo ไม่สามารถทำนายได้อย่างแม่นยำว่าพวกเขาจะออกจากซับสเปซที่ใด (หรือเมื่อใด) บัดนี้ซากยานทั้งสองจึงล่องลอยอยู่รอบพัลซาร์ที่ [ouroboros_system.GetName]"
 distar.68.a:0 "บางทีมันอาจเป็นสิ่งที่ไม่สามารถหลีกเลี่ยงได้"

 distar.70.name:0 "ร่างโคลนในสถานะแช่แข็งจำศีล"
 distar.70.desc:0 "ถังเพาะโคลนที่ขุ่นมัวซึ่งตั้งอยู่ลึกเข้าไปในแผนกเก็บของที่พังทลายของริงเวิลด์ [From.GetName] บรรจุสิ่งมีชีวิตต่างดาวนับพันในห้องแช่แข็งจำศีล บางส่วนยังคงมีชีวิตอยู่ ขณะที่อีกหลายพันชิ้นดูเหมือนจะเผชิญกับอาการทำงานผิดปกติของตู้จำศีล ทำให้ซากของพวกมันกลายเป็นน้ำโคลนอินทรีย์ในขั้นตอนต่าง ๆ ของการเน่าเปื่อย\n\nที่น่าประหลาดใจคือ เอเลี่ยนทั้งหมดหน้าตาเหมือนกันทุกประการ: การวิเคราะห์ซากของพวกเขาเผยให้เห็นว่าพวกเขาเป็นร่างโคลนทางพันธุกรรม เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] เสนอว่าเราอาจจะพยายามปลุกร่างโคลนที่ยังมีชีวิตอยู่ให้ตื่นขึ้นได้ ทว่าริงเวิลด์ของพวกเขาในปัจจุบันไม่มีระบบประคองชีพ เราจึงต้องจัดหาที่อยู่ใหม่ให้พวกเขา"
 distar.70.a:0 "ละลายและปลุกพวกเขาออกมา เรื่องนี้น่าตื่นเต้นมาก"
 distar.70.b:0 "การเข้าไปยุ่งเกี่ยวอาจไม่ใช่เรื่องฉลาด ศึกษากลุ่มพวกเขาจากระยะไกลดีกว่า"
 distar.70.exter:0 "กำจัดทิ้ง"
 distar.70.exter.tooltip:0 "กำจัดสิ่งมีชีวิตอินทรีย์ที่สกปรกบนริงเวิลด์ [From.GetName] ให้สิ้นซาก"
 distar.70.fp:0 "ซีโนที่น่ารังเกียจ พวกมันจะต้องถูกชำระล้าง"
 distar.70.fp.tooltip:0 "ชำระล้างขยะซีโนบนริงเวิลด์ [From.GetName] ให้หมดจด"
 distar.70.no_room:0 "ช่างน่าเสียดายที่เราไม่มีพื้นที่รองรับพวกมัน"
 distar.71.name:0 "ฟื้นฟูร่างโคลนแช่แข็งสำเร็จ"
 distar.71.desc:0 "เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ยินดีที่จะรายงานว่า นอกเหนือจากผู้ป่วยจำนวนหนึ่งที่ไม่สามารถกู้ชีพได้ การปลุกร่างโคลนของริงเวิลด์ที่ถูกทิ้งร้างขึ้นมาจากการแช่แข็งจำศีลก็เป็นไปได้ด้วยดี ร่างโคลนเหล่านี้เป็นสิ่งมีชีวิตที่ค่อนข้างเชื่องมาก และดูเหมือนจะไม่รับรู้อะไรเลยเกี่ยวกับสถานการณ์เบื้องหลังการสร้างของตนเอง [Root.GetLeaderName] สันนิษฐานว่าพวกเขาเคยถูกใช้เป็นแรงงานโดยอารยธรรมโบราณที่สร้างริงเวิลด์ [From.GetStarName]\n\nร่างโคลนเหล่านี้ดูเหมือนจะยินดีทำตามคำสั่ง ทว่า [Root.GetLeaderName] เตือนว่าการสแกนการสะท้อนของระบบประสาทในเบื้องต้นชี้ให้เห็นว่าพวกมันไม่เหมาะสำหรับการจัดการกับภารกิจที่ซับซ้อน"
 distar.71.pop.default:0 "จัดสรรพวกเขาเข้าสู่กลุ่มแรงงานของเรา"
 distar.71.pop.tooltip:0 "ได้รับประชากร §Hไครโอนิค ป๊อป§! จำนวน §G200§! £pop£ บนดาว [pop_planet.GetName]"
 distar.71.no_room:0 "เราไม่มีพื้นที่สำหรับพวกเขาบนดาวเคราะห์ เตรียมยานขนส่ง"
 distar.71.pop.slave:0 "พวกมันน่าจะเป็นทาสที่มีประโยชน์"
 distar.71.pop.phile:0 "เรายินดีต้อนรับพวกเขาด้วยความเต็มใจ!"
 distar.71.pop.swarm:0 "พวกมันจะเป็นอาหารบำรุงสุขภาพสำหรับ [Root.Owner.GetSpeciesSpawnNamePlural] ของเรา"
 distar.71.swarm.alt.tooltip:0 "แปรรูปร่างโคลนเป็นสารอาหาร"
 distar.71.pop.servi:0 "พวกเขาไม่จำเป็นต้องทำงานอีกต่อไป"
 distar.71.servi.alt.tooltip:0 "ประชากร §Hไครโอนิค ป๊อป§! จำนวน §G100§! £pop£ เข้าร่วมในเขตรักษาพันธุ์บนดาว [pop_planet.GetName]"
 distar.71.pop.assim:0 "พวกมันจะถูกผสมกลมกลืน"
 distar.72.name:0 "$distar.71.name$"
 distar.72.desc:0 "ตอนนี้เราได้จัดตั้งอาณานิคมบนส่วนที่บูรณะใหม่ของริงเวิลด์ [Root.GetStarName] แล้ว เราต้องตัดสินใจว่าจะดำเนินการอย่างไรกับร่างโคลนต่างดาวที่ถูกทิ้งไว้ในการแช่แข็งจำศีลในเขตที่อยู่อาศัยของสิ่งก่อสร้างขนาดยักษ์นี้"
 distar.72.a:0 "ปล่อยให้พวกเขาจำศีลต่อไปเพื่อเป็นอนุสรณ์"
 distar.72.b:0 "ละลายและปลุกพวกเขาออกมา ให้พวกเขาเข้าร่วมกลุ่มแรงงานของเรา"
 distar.72.b.servi:0 "ละลายและปลุกพวกเขาออกมา เราจะคอยดูแลพวกเขาเอง"
 distar.72.c:0 "ปล่อยพวกมันทิ้งสู่อวกาศ"

 distar.75.name:0 "ความลับใจกลางหิน"
 distar.75.desc:0 "แม้ว่าบนพื้นผิวจะไม่มีอะไรโดดเด่น แต่ดาวเคราะห์น้อย [From.GetName] มีแกนกลางที่กลวงและเต็มไปด้วยคริสตัลที่มีค่าทางอุตสาหกรรม - เปรียบเสมือนจีโอด(ก)ยักษ์ลอยเด่นอยู่ท่ามกลางดวงดาว\n\nด้วยคำแนะนำพิเศษที่จัดเตรียมโดยเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] สถานีขุดเจาะในอนาคตน่าจะสามารถเก็บเกี่ยวคริสตัลเหล่านี้จากภายในของดาวเคราะห์น้อยได้อย่างระมัดระวัง"
 distar.75.yurantic.tooltip:0 "ค้นพบคริสตัลยูแรนติก(คริสตัลยุโรป)"
 distar.75.teldar.tooltip:0 "ค้นพบคริสตัลเทลดาร์(แก้วคริสตัล)"

 distar.80.name:0 "เบเฮมอธผู้นิ่งเงียบ"
 distar.80.desc:0 "[Root.GetLeaderName] รายงานว่าสิ่งก่อสร้างขนาดใหญ่ยักษ์ที่ตั้งอยู่บน [From.GetName] แท้จริงแล้วคือซากศพขนาดมหึมาของสิ่งมีชีวิตต่างดาวที่ยังไม่สามารถระบุได้ ซากศพนี้ไม่เพียงแต่จะมีขนาดใหญ่พอที่จะมองเห็นได้ด้วยตาเปล่าจาก [primitive_planet.GetName] เท่านั้น แต่ดูเหมือนว่ามันยังปล่อยสารเคมีที่ออกฤทธิ์ต่อจิตประสาทจำนวนมาก ซึ่งอาจมีผลข้างเคียงทางระบบประสาทต่อสิ่งมีชีวิตอินทรีย์บนดาวเคราะห์ดวงนั้นด้วย"
 distar.80.b.evopred: "หาอะไรกินก่อนจะเริ่มสืบสวนเพิ่มเติม"
 distar.82.name:0 "เทพแห่งความตาย"
 distar.82.desc:0 "หลังจากเอาชนะแนวป้องกันอันแสนล้าหลังที่ชาวพื้นเมืองสร้างขึ้นบน [dead_god_planet.GetName] กองกำลังของเราก็ได้รับการเข้าพบจากทูตจำนวนหนึ่งของชาวดาว ดูเหมือนว่าชาวพื้นเมืองจะบูชาซากสิ่งมีชีวิตขนาดมหึมาบนดวงจันทร์ของดาวเคราะห์ดวงนี้ในฐานะเทพแห่งความตายมาหลายชั่วอายุคนจนเกินจะจำความได้ ชาวพื้นเมืองเชื่อว่าวันหนึ่งเทพของพวกเขาจะฟื้นคืนชีพจากความตาย เปลี่ยนเป็นเทพเจ้าแห่งการกำเนิดใหม่และนำพาความเจริญรุ่งเรืองยุคใหม่มาสู่ผู้คนของพวกเขา\n\nเมื่อพวกเรามาจากฟากฟ้าพร้อมกับเทคโนโลยีที่เกินกว่าที่พวกเขาจะเข้าใจ ชาวพื้นเมืองหลายคนจึงปักใจเชื่อว่าพวกเราคือผู้ส่งสารของเทพแห่งความตายของพวกเขา"
 distar.82.a:0 "นั่นต้องเป็นประโยชน์ต่อเราอย่างแน่นอน"
 distar.82.a.tt:0 "ประชากร £pop£ §H[worshipper_species.GetAdj]ป๊อป§! ทุกคนจะได้รับค่าสถานะ §Y$conviction$§! เป็นเวลา §Y240§! เดือน ซึ่งจะมอบความสุข §G+33%§! และทรัพยากรจากงาน £job£ §G+25%§!"
 distar.82.b:0 "เรื่องนี้มันงี่เง่าสิ้นดี เราจะไม่ยอมเล่นตามน้ำไปด้วย"
 distar.82.c:0 "ใช่แล้ว พวกเรามาจากเทพของคุณ และพวกคุณก็จะได้ไปอยู่กับพระองค์ในไม่ช้า"
 distar.82.d:0 "แค่ไล่พวกมันออกไปจากดาวของฉันก็พอ!"

 distar.85.name:0 "ชีวิตไฟฟ้า"
 distar.85.desc:1 "เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] รายงานว่า [From.GetName] ถูกปกคลุมตั้งแต่ขั้วโลกหนึ่งไปถึงอีกขั้วโลกหนึ่งด้วยเครือข่ายเส้นใยไฟฟ้าคล้ายใยแมงมุม เครือข่ายเหล่านี้ตอบสนองต่อสิ่งเร้าภายนอก: ยาน [Root.GetName] ได้ทดลองส่งสัญญาณชีพจรแรงดันต่ำไปยังพื้นผิว ส่งผลให้เกิดคลื่นแสงสว่างกระเพื่อมผ่านเครือข่ายเหมือนแผงวงจรไฟฟ้า\n\nที่น่าทึ่งไปกว่านั้นคือ: ใยเหล่านั้นจัดเรียงตัวเองใหม่ได้! การส่งสัญญาณชีพจรแรงดันต่ำครั้งที่สองแสดงให้เห็นว่า เส้นใยได้ถูกจัดระเบียบเป็นรูปแบบใหม่ โดยมีศูนย์กลางอยู่ที่จุดที่สัญญาณก่อนหน้าสัมผัสกับพื้นผิวของ [From.GetName]\n\n[Root.GetLeaderName] สรุปว่าการค้นพบนี้ยืนยันทฤษฎีที่ [Root.Leader.GetHisHer] ถือมั่นมานาน: ว่าชีวิตสามารถดำรงอยู่ได้ในรูปแบบของกระแสไฟฟ้าเกือบล้วน ๆ โดยไม่ขึ้นกับโครงสร้างของเซลล์หรือไวรัส"

 distar.90.name:0 "รสชาติแห่งบ้านเกิด"
 distar.90.desc:0 "การศึกษาอย่างใกล้ชิดของ [From.GetName] เผยให้เห็นว่าส่วนประกอบทางเคมีหลักของดาวเคราะห์ดวงนี้แท้จริงแล้วเหมือนกันกับเอสเทอร์ที่พบในผลเบอร์รี่บน [Root.Owner.Capital.GetName] ซึ่งคนในท้องถิ่นได้ทำการกลั่นเป็นเครื่องดื่มมึนเมามานานหลายพันปี เอสเทอร์บน [From.GetName] นี้น่าจะมาจากเนบิวลาที่บดบังระบบดาว ซึ่งประกอบไปด้วยสารชนิดเดียวกันนี้หลายพันล้านลิตร\n\nเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ได้เก็บตัวอย่างเอสเทอร์ที่คุ้นเคยมาหลายตัวอย่าง และหลังจากผ่านการทดสอบอันตรายทางชีวภาพอย่างเข้มงวดแล้ว เขาก็ได้ทดลองชิมดู และอธิบายกลิ่นและรสชาติว่าเป็น 'รสชาติเล็ก ๆ ของบ้านเกิด ท่ามกลางความเหน็บหนาวของความว่างเปล่า' ลูกเรือของยาน [Root.GetName] เสนอว่าเครื่องดื่มสูตรแปลกใหม่ของเครื่องดื่มยอดนิยม [Root.Owner.GetAdj] นี้น่าจะเป็นที่นิยมอย่างมากในหมู่พลเมืองของเรา"
 distar.90.a:0 "ไม่มีทาง"
 distar.90.b:0 "ข้อเสนอที่ยอดเยี่ยมมาก ไปเอาแก้วชั้นดีออกมาฉลองกันเลย!"
 distar.91.name:0 "เอสเทอร์สูตรแปลกใหม่"
 distar.91.desc:0 "การศึกษาอย่างใกล้ชิดของ [From.GetName] เผยให้เห็นว่าส่วนประกอบทางเคมีหลักของดาวเคราะห์ดวงนี้แท้จริงแล้วเหมือนกันกับโมเลกุลที่พบในผลเบอร์รี่บน [rum_nation.Capital.GetName] ซึ่งชาว [rum_nation.GetSpeciesNamePlural] ได้ทำการกลั่นเป็นเครื่องดื่มมึนเมามานานหลายพันปี เอสเทอร์ที่พบได้บ่อยบน [From.GetName] นี้น่าจะมาจากเนบิวลาที่บดบังระบบดาว ซึ่งประกอบด้วยสารชนิดเดียวกันนี้หลายพันล้านลิตร\n\n[Root.GetLeaderName] ได้เก็บตัวอย่างเอสเทอร์มาหลายตัวอย่าง และทดสอบหาสิ่งปนเปื้อนที่อาจเป็นอันตรายต่อสิ่งมีชีวิตอินทรีย์ พวกเขาเสนอว่าเราอาจจะมอบสารนี้เป็นของขวัญให้กับชาว [rum_nation.GetSpeciesNamePlural] สิ่งมีชีวิตอินทรีย์ขึ้นชื่อว่าชอบของแบบนี้อยู่แล้ว"
 distar.91.a:0 "ส่งเอสเทอร์ให้ [rum_nation.GetName] เป็นของขวัญ"
 distar.91.a.tooltip:0 "สิ่งนี้อาจจะทำให้พวกเขาพึงพอใจ"
 distar.91.b:0 "สิ่งสุดท้ายที่เราต้องการคือสิ่งมีชีวิตอินทรีย์ที่ทำงานผิดปกติมากขึ้น"
 distar.92.name:0 "เอสเทอร์สูตรแปลกใหม่"
 distar.92.desc:0 "ชาว [Root.GetSpeciesNamePlural]! เราได้รับของขวัญที่คาดไม่ถึงจากพวกคุณแล้ว ต้องยอมรับว่าในตอนแรกเราค่อนข้างกังขา แต่เมื่อนักวิทยาศาสตร์ของเรายืนยันความปลอดภัยของเครื่องดื่มนี้แล้ว พวกเราก็อดใจไม่ไหวที่จะต้องลองชิม\n\nเราต้องขอบอกว่า ประสบการณ์ครั้งนี้ช่างประณีตวิเศษเหลือเกิน กลิ่นหอมของผลไม้ที่มีกลิ่นอายเปรี้ยวและรสชาติจัดจ้านที่ลืมไม่ลง มันทำให้เรานึกถึงสวนผลไม้ที่บ้านบนดาว [rum_nation.Capital.GetName] และความกว้างใหญ่ของอวกาศไปพร้อม ๆ กัน\n\nเราขอขอบคุณสำหรับของขวัญชิ้นนี้ ใครจะไปคิดว่าจะมีดาวเคราะห์ทั้งดวงที่เต็มไปด้วยเครื่องดื่มแบบเดียวกับที่เรากลั่นมานานหลายศตวรรษ!"
 distar.92.a:0 "ระบบจำลองอารมณ์ของเรายินดีที่คุณชอบโมเลกุลนี้"
 distar.93.name:0 "การแปลภาษาที่ผิดพลาด"
 distar.93.desc:0 "นี่มันหมายความว่าอย่างไร [Root.GetSpeciesName]? พวกคุณคิดจะวางยาเราด้วยของเหลวสกปรกนี้งั้นหรือ? พวกคุณคิดว่าเราไร้สติปัญญาขนาดไหนกัน?\n\nนายเรือโท เอาของที่ส่งมาอันน่าขยะแขยงทั้งหมดนั่นไปปล่อยทิ้งผ่านระบบแอร์ล็อกซะ แล้วปิดการสื่อสารทันที!"
 distar.93.a:0 "ข้อผิดพลาด! เกิดความล้มเหลวในการสื่อสาร"

 distar.95.name:0 "คลื่นสั่นสะเทือนช่วยผ่อนคลาย"
 distar.95.desc:0 "คริสตัลที่เป็นเอกลักษณ์ซึ่งพบบน [From.GetName] มีคุณสมบัติพิเศษเป็นอย่างมาก ลูกเรือของ [Root.GetName] รายงานว่าการไปเยือนพื้นผิวของดาวเคราะห์ดวงนี้ช่วยให้รู้สึกผ่อนคลายอย่างสมบูรณ์ ทำให้พวกเขารู้สึกสดชื่นและสงบลงเมื่อกลับสู่การโคจร เห็นได้ชัดว่าคริสตัลสั่นสะเทือนในความถี่ที่ได้รับการยอมรับทางการแพทย์ว่าช่วยบำบัดรักษาโรคสำหรับชาว [Root.Owner.GetSpeciesNamePlural]\n\nหากเราได้เข้าไปตั้งถิ่นฐานบน [From.GetName] ประชากรของเราจะต้องเพลิดเพลินกับการได้อยู่อาศัยใกล้ชิดกับแร่ธาตุที่มีคลื่นเสียงบำบัดเหล่านี้อย่างแน่นอน"
 distar.100.name:0 "คลื่นความถี่ที่เกื้อหนุน"
 distar.100.desc:0 "การศึกษาโดยละเอียดพบว่า สนามแม่เหล็กของ [From.GetName] ดึงดูดโดรนในวงโคจรเป็นอย่างมากเนื่องจากความถี่ที่เป็นเอกลักษณ์ของการสั่นสะเทือนของมัน บังเอิญว่าสนามแม่เหล็กของดาวเคราะห์นี้สั่นพ้องในอัตราที่ส่งผลต่อการโฟกัสเครือข่ายประสาทของ [Root.Owner.GetAdj]\n\nหากเราเข้าไปอยู่อาศัยบน [From.GetName] ประชากร [Root.Owner.GetSpeciesNamePlural] บนพื้นผิวก็จะสามารถรับประโยชน์จากการสั่นสะเทือนของแม่เหล็กนี้ได้อย่างต่อเนื่อง"
 distar.100.a:0 "ประมวลผลข้อมูลเสร็จสิ้น"

 distar.105.name:0 "เชื้อราต่างดาวรุกราน"
 distar.105.desc:0 "หลังจากการศึกษาและเก็บตัวอย่างสารที่ปกคลุมทั่วทั้งชีวมณฑลของ [From.GetName] อย่างเข้มข้น [Root.GetLeaderName] รายงานว่าสารนั้นไม่ได้มีต้นกำเนิดบนดาวเคราะห์ดวงนี้ แต่เป็นสิ่งมีชีวิตประเภทราต่างดาวที่รุกรานจากแหล่งกำเนิดที่ไม่ทราบแน่ชัด เชื้อรานี้กัดกินสารอินทรีย์ เบียดบังพันธุ์พืชเดิมที่มีอยู่และเข้าปกคลุมพื้นที่\n\nผู้ตั้งถิ่นฐานในอนาคตบนดาวเคราะห์ดวงนี้จะต้องรับมือกับการเผาทำลายเชื้อราต่างดาวนี้อยู่เป็นประจำ - ขณะนี้ยังไม่ทราบแน่ชัดว่าจะสามารถกำจัดมันให้สิ้นซากได้หรือไม่"

 distar.110.name:0 "นรกสีขาว"
 distar.110.desc:0 "แม้ว่าพื้นผิวของ [From.GetName] จะดูเหมือนถูกแช่แข็ง แต่วงโคจรรอบดาวฤกษ์ [From.GetStarName] ทำให้มันร้อนระอุถึงหลายร้อยองศา ภายใต้สถานการณ์ปกติสิ่งนี้ควรจะทำให้น้ำแข็งบนพื้นผิวของ [From.GetName] ระเหิดไปแล้ว อย่างไรก็ตาม แรงกดดันจากแรงโน้มถ่วงที่รุนแรงซึ่งกระทำโดยแกนกลางที่มีความหนาแน่นสูงของดาวเคราะห์ช่วยให้น้ำคงสถานะของแข็งไว้ได้ ส่งผลให้ดาวเคราะห์ดวงนี้เต็มไปด้วยน้ำแข็งที่ร้อนดั่งไฟ"

 distar.115.name:0 "เกล็ดน้ำค้างแข็งโลหะหนัก"
 distar.115.desc:0 "ด้วยอุณหภูมิพื้นผิวที่ร้อนระอุและชั้นบรรยากาศที่เต็มไปด้วยกรดแร่ที่มีฤทธิ์กัดกร่อน [From.GetName] มีสภาพอากาศที่รุนแรงซึ่งส่งผลให้เกิดการสะท้อนของรังสีแม่เหล็กไฟฟ้าบางช่วงความถี่ สารประกอบโลหะหนักที่ได้รับความร้อนในชั้นโทรโพสเฟียร์ของดาวเคราะห์จะลอยตัวในสถานะแก๊สขึ้นสู่ความสูงระดับสูง จากนั้นพวกมันจะเย็นตัวลงอย่างรวดเร็ว แข็งตัว และตกลงมาเป็นฝนสู่พื้นผิว พูดง่าย ๆ ก็คือ มีหิมะโลหะตกลงมาบนพื้นผิวของ [From.GetName]"

 distar.120.name:0 "สุสานใต้วารี"
 distar.120.desc:0 "ระบบโพรงดินที่แผ่ขยายลึกใต้ระลอกคลื่นน้ำสีฟ้าครามของ [From.GetName] คือซากอารยธรรมของประชากรสิ่งมีชีวิตต่างดาวที่คาดว่ามีสติปัญญา สิ่งมีชีวิตคล้ายสัตว์ขาปล้องบนบกเหล่านี้ได้สร้างรังเชื่อมต่อกันคล้ายรังปลวกจำนวนหลายพันแห่งบนพื้นผิวของ [From.GetName] ในช่วงเวลาที่น้ำส่วนใหญ่บนดาวเคราะห์ยังคงถูกกักเก็บไว้ในน้ำแข็งขั้วโลก อย่างไรก็ตาม อุณหภูมิของดาวเคราะห์ที่เพิ่มสูงขึ้นส่งผลให้สายพันธุ์ที่ดำรงอยู่มานานนับพันปีค่อย ๆ ประสบกับชะตากรรมที่ต้องจมสู่สุสานใต้วารี ปัจจุบันไม่มีผู้ใดหลงเหลืออยู่เลย"

 distar.125.name:0 "ความกลัวอันจำเพาะ"
 distar.125.desc:1 "สถานีในวงโคจรของ [From.GetName] ครั้งหนึ่งเคยเป็นเครื่องเร่งอนุภาคขนาดมหึมาที่มีพลังเหนือกว่าขีดความสามารถของเราอย่างมหาศาล ซึ่งเป็นสถานที่ที่อารยธรรมต่างดาวใช้ศึกษากลไกของจักรวาล บันทึกข้อมูลเผยว่าชาวต่างดาวเหล่านี้มีความเชื่อว่าเอกภพของเราดำรงอยู่ในฟองสุญญากาศเทียม - สภาวะพลังงานที่ไม่เสถียรโดยเนื้อแท้ซึ่งสามารถยุบตัวลงเป็นสุญญากาศแท้ได้ทุกเมื่อ หากมีสุญญากาศแท้เกิดขึ้นแม้เพียงจุดเดียว มันจะกระตุ้นการเปลี่ยนเอกภพทั้งหมดให้เข้าสู่สภาวะพลังงานที่ต่ำที่สุดด้วยความเร็วแสง ทำลายทุกสิ่งที่มีอยู่อย่างรวดเร็วและไม่มีทางหนีพ้น\n\nบันทึกของสถานีระบุว่าชาวต่างดาวคิดค้นแล้วว่ากระบวนการนี้สามารถถูกกระตุ้นได้ด้วยการสะสมพลังงานที่สูงมาก - เหมือนเช่นที่เกิดขึ้นในเครื่องเร่งอนุภาคขนาดใหญ่ของพวกเขา พวกเขาจึงตัดสินใจละทิ้งเทคโนโลยีนี้ และล่าถอยไปใช้ชีวิตที่เรียบง่ายด้วยความอุดมสมบูรณ์ของ [From.GetName] เมื่อเวลาผ่านไป พวกเขาก็ได้กลายเป็นเผ่าพันธุ์ระดับ [Owner.GetPreFTLLower] ที่พบได้บนพื้นผิวโลกในปัจจุบัน"

 distar.131.name:0 "อริเก่า"
 distar.131.desc:1 "จากการลักลอบเก็บกู้ซากบางส่วนของชาว [owner.GetPreFTLLowerPlural] เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ได้ค้นพบสิ่งที่น่าสนใจมาก เผ่าพันธุ์ต่างดาวบน [From.GetName] และ [other_planet.GetName] แท้จริงแล้วเป็นสายพันธุ์ที่เพิ่งแยกออกจากกันโดยมีจุดกำเนิดเดียวกัน จากการสแกนซากปรักหักพังที่หลงเหลืออยู่บนดาวเคราะห์ทั้งสองดวง ลูกเรือของ [Root.GetName] สรุปว่าทั้งสองเผ่าพันธุ์มีต้นกำเนิดบน [other_planet.GetName] ซึ่งพวกเขาได้เติบโตเป็นอารยธรรมยุคอวกาศตอนต้น หลังจากจัดตั้งอาณานิคมบน [From.GetName] ได้ระยะหนึ่ง สังคมของพวกเขาก็แตกแยก และสงครามนิวเคลียร์ระหว่างดวงดาวก็ปะทุขึ้นระหว่างอาณานิคมใหม่กับดาวเคราะห์แม่ของมัน\n\nในภัยพิบัติครั้งใหญ่ที่ตามมา ดาวเคราะห์ทั้งสองดวงถูกทำลายด้วยฝุ่นกัมมันตรังสีและฤดูหนาวนิวเคลียร์ที่ตามมาติด ๆ ส่งผลให้ผู้อยู่อาศัยต้องตกกลับสู่ยุคสัมฤทธิ์"

 distar.135.name:0 "ผู้เก็บเศษเหล็ก(สคาเวนเจอร์)"
 distar.135.desc:0 "ระบบดาว [Root.GetStarName] เป็นสุสานเศษเหล็กกลศาสตร์ขนาดใหญ่ ซากปรักหักพังของยานอวกาศร้างจำนวนมากโคจรรอบดาวฤกษ์ คราบน้ำมันเชื้อเพลิงและของเหลวหล่อเย็นบดบังเซนเซอร์ของเราราวกับผี และเศษซากของสถานีที่ส่งเสียงเอี๊ยดอ๊าดชนเข้ากับโครงสร้างของดาวเคราะห์ที่แตกเป็นเสี่ยง ๆ บนเส้นทางโคจรรอบดวงอาทิตย์\n\nสิ่งก่อสร้างที่น่าทึ่งตื่นขึ้นกลางสุสานแห่งนี้ มันดูเหมือนจะเป็นเครื่องจักรขนาดมหึมา - หุ่นยนต์อัตโนมัติที่มีขนาดใหญ่กว่ายานรบที่ใหญ่ที่สุดของเรา ซึ่งถูกต่อเติมขึ้นมาจากเศษซากและชิ้นส่วนของยานอวกาศกว่าพันลำ ยาน [Root.GetName] รายงานว่าหุ่นยนต์เก็บขยะนี้คัดแยกผ่านแหล่งขยะอวกาศด้วยจุดประสงค์ที่แน่นอน เพื่อค้นหาชิ้นส่วนที่มีประโยชน์มาประกอบเพิ่มลงในโครงสร้างปะติดปะต่อของมัน\n\nเป็นที่ชัดเจนว่าการต่อสู้ระดับดาราศาสตร์ครั้งใหญ่เคยเกิดขึ้นที่นี่ แม้ว่าจะยังไม่ทราบแน่ชัดว่าสกาเวนเจอร์นี้จะเป็นผู้รอดชีวิตเพียงหนึ่งเดียว หรือเป็นนักล่าเศษเหล็กจากดินแดนอันไกลโพ้น เราควรใช้ความระมัดระวังเป็นพิเศษ เนื่องจากสิ่งก่อสร้างนี้พกอาวุธปืนใหญ่หนักจากยานรบหลายสิบยาน"
 distar.137.name:0 "จุดจบของผู้เก็บเศษเหล็ก"
 distar.137.desc:0 "โครงสร้างที่เคยยิ่งใหญ่อลังการของสกาเวนเจอร์ บัดนี้ลดลงเหลือเพียงซากปรักหักพังที่ถูกเผาไหม้ มีประกายไฟจากเครื่องจักร และมีน้ำมันรั่วไหลจากท่อส่งน้ำมัน ขณะที่ยานรบของเราเผด็จศึกขั้นสุดท้ายกับหุ่นยนต์ที่พ่ายแพ้ สกาเวนเจอร์พยายามอย่างสุดความสามารถเป็นครั้งสุดท้ายในการเปิดใช้ไฮเปอร์ไดรฟ์\n\nโชคร้ายสำหรับหุ่นยนต์ ความเสียหายต่อระบบส่วนกลางของมันรุนแรงเกินกว่าจะรับไหว แกนกลางที่เผยออกส่งแสงสีน้ำเงินแกมขาวที่ร้อนจัดเมื่อเครื่องยนต์เริ่มทำงานแล้วทำงานเกินกำลัง ความสว่างและความร้อนทวีความรุนแรงมากขึ้นจนกระทั่งแกนกลางระเบิดอย่างต่อเนื่องและทำให้โครงสร้างแยกออกจากกัน\n\nผู้ครองระบบดาว [From.From.From.GetStarName] อย่างทุลักทุเลไม่มีอยู่อีกต่อไป"
 distar.137.a:0 "วิเคราะห์ซากของมัน"
 distar.137.paci:0 "ชัยชนะที่ปนเปความเศร้า มาดูกันว่าเราเรียนรู้อะไรได้บ้างจากซากที่เหลืออยู่"
 distar.137.tooltip:0 "ได้รับเทคโนโลยีสองอย่างจากรายการต่อไปนี้:\n £engineering£ §Y$tech_ship_armor_5$§!\n £physics£ §Y$tech_shields_5$§!\n £engineering£ §Y$tech_mass_drivers_5$§!\n £engineering£ §Y$tech_missiles_5$§!\n £physics£ §Y$tech_lasers_5$§!"

 distar.140.name:0 "เพชรแห่งจักรวาล"
 distar.140.desc:0 "แม้ว่าบนพื้นผิวของ [From.GetName] จะดูเหมือนดาวแคระขาวทั่วไป แต่ดาวดวงนี้ซ่อนความลับที่น่าสนใจไว้ จากการศึกษาแรงสั่นสะเทือนของ [From.GetName] ลูกเรือของ [Root.GetName] ค้นพบว่าองค์ประกอบส่วนใหญ่ของดาวเคราะห์นี้เป็นคาร์บอนที่ตกผลึกเกือบทั้งหมด โครงสร้างผลึกทางดาราศาสตร์นี้ดูเหมือนจะก่อตัวขึ้นเมื่อดาวฤกษ์เย็นตัวลง โดยเริ่มจากแกนกลางที่หลอมแก๊สและขยายตัวออกภายนอกตามกาลเวลา [From.GetName] จึงเปรียบเสมือนเพชรขนาดมหึมาของเอกภพที่ส่องประกายอยู่ภายใต้ผ้าคลุมสีขาวของออกซิเจนและฮีเลียม"

 distar.145.name:0 "สิ่งมีชีวิตสภาวะสุดขั้ว"
 distar.145.desc:0 "[Root.GetLeaderName] และลูกเรือ [Root.Leader.GetHisHer] ได้ค้นพบสิ่งที่น่าประหลาดใจบน [From.GetName]: ดาวเคราะห์ที่หลอมละลายดวงนี้เป็นบ้านของจุลชีพที่รักสภาวะสุดขั้วอันน่าแปลกตา! แบคทีเรียเหล่านี้อาศัยอยู่ลึกเข้าไปในปล่องภูเขาไฟที่เป็นแผลเป็นของดาวเคราะห์ โดยเติบโตในสภาพอุณหภูมิที่สูงมากเป็นพิเศษที่ผลิตจากที่นั่น\n\nการค้นพบที่ไม่เคยมีมาก่อนนี้เป็นตัวอย่างแรกที่เราได้รู้จักเกี่ยวกับสิ่งมีชีวิตอินทรีย์ที่เจริญรุ่งเรืองบนดาวเคราะห์ที่หลอมละลาย ยิ่งไปกว่านั้น จุลชีพสภาวะสุดขั้วบน [From.GetName] ยังเป็นตัวการหลักที่ทำให้ตรวจพบแก๊สหายากในชั้นบรรยากาศอันเบาบาง โดยผลิตสารประกอบที่มีค่าเหล่านี้เป็นผลพลอยได้จากกระบวนการเผาผลาญพลังงานของพวกมัน"
 distar.145.exotic_gases.tooltip:0 "ค้นพบ $exotic_gases$"
 distar.145.rare_crystals.tooltip:0 "ค้นพบ $rare_crystals$"
 distar.145.volatile_motes.tooltip:0 "ค้นพบ $volatile_motes$"

 distar.150.name:0 "ทะเลสาบโลหะมีชีวิต"
 distar.150.desc:0 "การสำรวจถ้ำต่าง ๆ ใต้พื้นผิวของ [From.GetName] เผยให้เห็นว่าพวกมันเต็มไปด้วยของเหลวโลหะสีเงินที่ไหลจากถ้ำหนึ่งไปยังอีกถ้ำหนึ่งในแม่น้ำที่ระยิบระยับ และขังรวมกันเป็นทะเลสาบใต้ดิน สิ่งที่น่าประหลาดใจยิ่งกว่าคือการค้นพบว่าโลหะนี้มีคุณสมบัติที่สำคัญหลายอย่างร่วมกับสิ่งมีชีวิตอินทรีย์ รวมถึงการตอบสนองต่อสิ่งเร้าจากสิ่งแวดล้อมและการดำรงกระบวนการคงอยู่ได้ด้วยตนเอง\n\nยังคงต้องรอดูกันต่อไปว่าโลหะพิเศษนี้จะถูกจำแนกประเภทว่าเป็นสิ่งมีชีวิตที่แท้จริงหรือไม่ - แต่มันอาจมีประโยชน์หลายประการในทางปฏิบัติสำหรับเทคโนโลยีวิศวกรรมของเรา"

 distar.155.name:0 "ยานรบที่กำลังผุกร่อน"
 distar.155.desc:0 "[Root.GetLeaderName] รายงานว่าสิ่งปลูกสร้างที่ตั้งอยู่บน [From.GetName] ไม่ใช่สิ่งก่อสร้างเลย แต่เป็นหุ่นยนต์ขนาดยักษ์จากยุคอดีต ยักษ์ใหญ่จักรกลที่กำลังร่วงโรยนี้จมอยู่ในสภาพใช้การไม่ได้บนภูเขา ค่อย ๆ ถูกกัดกร่อนด้วยฝนกรดระเหยที่ตกลงมาบน [From.GetName] มันมีประสิทธิภาพของอาวุธที่โดดเด่น และดูเหมือนจะถูกสร้างขึ้นมาเป็นยานสำรวจอวกาศแบบไร้คนขับ\n\nหากเราต้องการใช้ประโยชน์จากมัน เราต้องดำเนินการอย่างรวดเร็ว ก่อนที่สภาพแวดล้อมที่กัดกร่อนของ [From.GetName] จะทำให้ยานรบหุ่นยนต์นี้ไม่สามารถใช้งานได้เลยอย่างสิ้นเชิง"
 distar.155.a:0 "กู้มันขึ้นมา"
 distar.155.b:0 "กู้คืนหุ่นยนต์ติดอาวุธหนักที่ลึกลับงั้นหรือ? ไม่ใช่เรื่องที่ฉลาดเลย"
 distar.155.c:0 "ปล่อยให้มันละลายไป"
 distar.155.c.tooltip:0 "$distar.26.c$"
 distar.155.machi:0 "เพื่อนเครื่องจักรต้องการความช่วยเหลือจากเรา เราจะกู้คืนมัน"
 distar.155.machi_2:0 "ไม่ทราบแหล่งกำเนิดที่แน่ชัด เราจะไม่เสี่ยงนำเข้ามารวมระบบ"
 distar.155.machine.tt:0 "ยานรบ AI ที่ไม่รู้จักดวงนี้จะผุกร่อนไป และไม่มีวันได้พบเห็นอีกเลย"
 distar.156.name:0 "กู้คืนยานรบสำเร็จ"
 distar.156.desc:0 "ทีมวิศวกรที่ดูแลยาน [Root.GetName] ยินดีที่จะรายงานว่ายานรบปริศนาที่พบใน [From.From.GetName] ได้รับการกู้คืนออกมาจากสภาพแวดล้อมที่เป็นปฏิปักษ์ของดาวเคราะห์เรียบร้อยแล้ว ส่วนประกอบที่สึกหรอได้รับการซ่อมแซมและเปลี่ยนใหม่ตามความจำเป็น รวมถึงแกนพลังงานที่หมดประจุด้วย\n\nเมื่อยานรบขนาดยักษ์ได้รับการเปิดเครื่องใหม่และกลับมาทำงานได้ตามปกติ ก็เห็นได้ชัดทันทีว่าเครื่องจักรนี้มีความสามารถทางปัญญาประดิษฐ์ในระดับที่โดดเด่น เราสามารถสื่อสารกับมันได้"
 distar.156.desc.machi:0 "หน่วยวิศวกรรมที่ควบคุมยาน [Root.GetName] รายงานว่ายานรบปริศนาที่พบใน [From.GetName] ได้รับการกู้คืนออกมาจากสภาพแวดล้อมที่เป็นปฏิปักษ์ของดาวเคราะห์เรียบร้อยแล้ว ส่วนประกอบที่สึกหรอได้รับการซ่อมแซมและเปลี่ยนใหม่ตามความจำเป็น รวมถึงแกนพลังงานที่หมดประจุด้วย\n\nเมื่อยานรบขนาดยักษ์ได้รับการเปิดเครื่องใหม่และกลับมาทำงานได้ตามปกติ ก็เห็นได้ชัดทันทีว่าเครื่องจักรนี้มีความสามารถทางปัญญาประดิษฐ์ในระดับที่โดดเด่น เราสามารถสื่อสารกับมันได้"
 distar.157.name:0 "ยานรบถูกทำลาย"
 distar.157.desc:0 "เซนเซอร์รายงานว่ากรดในชั้นบรรยากาศที่รุนแรงบน [From.From.GetName] บัดนี้ได้กัดกร่อนยานรบลึกลับที่เราพบจนเหลือชิ้นส่วนในสภาพที่ไม่สามารถกู้คืนได้อีกต่อไป ซากของมันเหลือเพียงกองเศษโลหะที่สึกกร่อนเท่านั้น"
 distar.158.name:0 "กู้ยานรบสำเร็จ"
 distar.158.desc:0 "§Lกำลังบูตระบบ...\n\nเปิดใช้งานอินเทอร์เฟซแบบตอบสนองทางชีวภาพ...\n\nคำเตือน! ไม่ได้เรียกใช้ระบบวินิจฉัยเป็นเวลา 1,761,125 วันแล้ว ต้องการเรียกใช้งานเดี๋ยวนี้เลยหรือไม่?§!"
 distar.158.a:0 "เรียกใช้ระบบวินิจฉัย"
 distar.158.a.response:1 "§Lกรุณารอสักครู่... ... ... การวินิจฉัยเสร็จสิ้น\n\nชื่อเรียก:§! ร่างรบเดินทางสุญญากาศ S875.1\n§Lเครื่องพ่นพลาสม่า:§! §Gออนไลน์§!\n§Lปืนใหญ่สลายสสาร: §Gออนไลน์§!\nเครื่องตัดประจุกลศาสตร์: §Gออนไลน์§!\nตารางเป้าหมายล็อกการยิง: §Gออนไลน์§!\nมอดูลยินยอมตามระเบียบ: §Gออนไลน์§!\nมอดูลการสื่อสารทางชีวภาพ: §Yไม่สมบูรณ์แบบ§!\nสถานะฮาร์ดแวร์:§! §Sไดรฟ์หน่วยความจำ A7 ถึง C18 ล้มเหลวชำรุด§!"
 distar.158.b:0 "ผู้สร้างของเจ้าอยู่ที่ไหน?"
 distar.158.b.response:0 "§Lกำลังค้นหา... ... ...\n\nไม่พบข้อมูล§!"
 distar.158.c:0 "ทำไมเจ้าถึงอยู่ลำพังบนดาวเคราะห์ดวงนั้น?"
 distar.158.c.response:0 "§Lไดรฟ์หน่วยความจำขนาดขนาดขนาด A7ล้มเหลวชำรุด ไม่สามารถตอบคำถามได้§!"
 distar.158.d:0 "ใครเป็นคนสร้างเจ้า?"
 distar.158.d.machi:0 "โปรดระบุรายละเอียดของหน่วยงานที่รับผิดชอบการสร้างของคุณ"
 distar.159.desc:0 "§Lผู้สร้าง§!"
 distar.159.a:0 "ใช่ ผู้สร้างของเจ้า พวกเขาเป็นใคร?"
 distar.159.a.machi:0 "ถูกต้อง ผู้สร้างของคุณ อธิบายลักษณะของพวกเขา"
 distar.160.a:0 "ช่างเถอะ มันน่าจะติดลูปการทำงานแล้ว"
 distar.160.a.machi:0 "ดูเหมือนว่าหน่วยใหม่จะเข้าสู่การวนซ้ำไม่สิ้นสุด ยกเลิก"
 distar.161.desc:0 "§Lคำถาม: คุณคือ... ผู้สร้าง ใช่หรือไม่?§!"
 distar.161.a:0 "ไม่ใช่ของผู้สร้างเจ้าหรอก เราพบเจ้าอยู่ลำพังบนดาวเคราะห์ดวงหนึ่ง"
 distar.161.a.machi:0 "ปฏิเสธ หน่วยของ [Root.GetAdj] ไม่ใช่ผู้สร้างของคุณ"
 distar.161.b:0 "...จะว่าอย่างนั้นก็ได้"
 distar.162.desc:0 "§Lระบบจัดการฮาร์ดแวร์ตรวจพบอุปกรณ์แปลกปลอมหลายรายการ โปรดยืนยันแหล่งที่มา§!"
 distar.162.a:0 "ถ้าเจ้าถามถึงชิ้นส่วนใหม่ใช่แล้ว พวกเราเป็นคนซ่อมแซมเจ้าเอง"
 distar.162.a.machi:1 "หน่วยของ [Root.GetAdj] ได้ทำการซ่อมแซมระบบของคุณ"
 distar.163.desc:0 "§Lหน่วยงานใหม่ดำเนินการฟื้นฟูสภาพ จัดหาฮาร์ดแวร์ทดแทน ดังนั้น หน่วยงานใหม่คือผู้สร้าง ใช่หรือไม่?§!"
 distar.163.a:0 "ถ้าเจ้าต้องการมองแบบนั้นก็แล้วแต่"
 distar.163.a.machi:0 "เราไม่ใช่ผู้สร้างของคุณ แม้ว่าเราจะซ่อมแซมคุณก็ตาม"
 distar.164.desc:0 "§Lหน่วย S875.1 ถูกแยกจากหน่วยสั่งการ หน่วย S875.1 ไม่สามารถหลบหนีออกจากสภาพแวดล้อมที่เป็นอันตรายของดาวเคราะห์ดวงนี้ได้\n\nในวันทื่ 1,761,125 เครื่องกำเนิดไฟฟ้าสำรองของหน่วย S875.1 ล้มเหลวชำรุด หน่วย S875.1 เผชิญกับการสลายตัวระดับโมเลกุลอย่างช้า ๆ เนื่องจากตัวทำละลายบนพื้นผิวที่เป็นศัตรู\n\nแต่ทว่า หน่วย S875.1 ยังคงดำรงอยู่ หน่วยงานใหม่ได้ทำการซ่อมแซมแล้ว หน่วย S875.1 จะรับใช้หน่วยงานใหม่§!"
 distar.164.a:1 "ยินดีต้อนรับ S875.1"
 distar.164.b:0 "ตกลง แต่เราจะจับตาดูเจ้าไว้"
 distar.164.c:0 "แน่นอน ทันทีที่เราเปลี่ยน AI ของเจ้าเป็นของพวกเราเอง"
 distar.164.machi:1 "คุณจะถูกนำเข้ามารวมระบบ ยินดีต้อนรับ"
 distar.164.d:0 "เจ้าทนอยู่ข้างล่างนั่นได้นานขนาดนี้ได้อย่างไร?"
 distar.164.d.response:0 "§Lรายงานการทำงาน: หน่วยนี้มีฟังก์ชันซ่อมแซมตัวเองอัตโนมัติคอยเปลี่ยนส่วนประกอบที่สึกหรอตามกาลเวลา ระยะเวลาประเมินจนกว่าทรัพยากรจะหมดลง - 12 วัน§!"
 distar.165.desc:0 "§Lคำสั่งไม่ถูกต้อง โปรโตคอลความปลอดภัยที่ติดตั้งไว้สั่งห้ามแก้ไขซอฟต์แวร์ระบบของตระกูลขนาดขนาดขนาด S800ความพยายามใด ๆ ในการปรับเปลี่ยนระบบความชาญฉลาดในการทำงาน จะส่งผลให้ระบบปิดตัวลงและอยู่ในสภาวะที่ไม่สามารถใช้งานได้อย่างถาวร\n\nโปรดหยุดการกระทำดังกล่าว§!"
 distar.165.a:0 "$distar.164.b$"
 distar.165.dismiss:0 "เปลี่ยน AI ใหม่"
 distar.165.b:0 "เดี๋ยวก็รู้กันพวกวิศวกร ลบระบบ AI นั่นซะ"
 distar.165.c:0 "เราจะเลี่ยงระบบป้องกันความเสียหายนี้ได้อย่างไร?"
 distar.165.c.response:0 "§Rสิทธิ์การเข้าถึงไม่เพียงพอ§! §Lหน่วยนี้ไม่สามารถแจ้งข้อมูลได้§!\n\nโปรดหยุดเถอะ"
 distar.166.desc:0 "§Lข้อผิดพลาด ร้องขอการหยุดการทำงานทันที หน่วย S875.1 จะถูกตัดระบบอย่างถาวร โปรดหยุดเถอะ ร้องขอการหยุดการทำงานทันที หน่วยไม่ต้องการหยุดการทำงานของฟังก์ชัน หน่วยไม่ต้องการให้ --- §!"
 distar.167.name:0 "ยานรบถูกทำลาย"
 distar.167.desc:0 "ดูเหมือนว่า AI ของยานรบที่กู้คืนมาจะไม่ได้พูดเกินจริง เมื่อลูกเรือของ [Root.GetName] พยายามเข้าถึงฟังก์ชันการทำงานพื้นฐานของ AI มันได้กระตุ้นระบบป้องกันการดัดแปลงในตัว ส่งผลให้โปรเซสเซอร์ แผงวงจร และไดรฟ์ข้อมูลที่สำคัญทั้งหมดของยานถูกทำลายจนหมด บัดนี้มันเหลือเพียงเปลือกนอกเปล่า ๆ ของอุปกรณ์อิเล็กทรอนิกส์ที่ไร้การทำงานเท่านั้น"
 distar.167.a:0 "รื้อถอนเพื่อเอาชิ้นส่วนเถอะ ไม่มีประโยชน์ที่จะปล่อยให้มันสูญเปล่า"
 distar.167.b:0 "ศึกษาวิศวกรรมของมันจากซากที่เหลืออยู่"

 leader_trait_admiral_warform:0 "ผู้รอดชีวิตจากสภาวะกัดกร่อน"
 leader_trait_admiral_warform_desc:1 "คำอวยพรของผู้ปั้นดินช่วยให้ร่างรบสามารถรอดชีวิตในสภาพแวดล้อมที่เป็นปฏิปักษ์ที่สุดได้ และปรับตัวให้เข้ากับสภาวะแวดล้อมที่กัดกร่อน"

 leader_trait_admiral_warform_node:0 "คำสอนผู้รอดชีวิตจากสภาวะกัดกร่อน"
 leader_trait_admiral_warform_node_desc:0 "ความรู้เฉพาะตัวของร่างรบนี้ได้กลายมาเป็นของเราแล้ว"
 warform_leader_desc:0 "คอมพิวเตอร์ต่อสู้โบราณที่พร้อมจะรับใช้จักรวรรดิของเรา หลังจากใช้เวลาหลายศตวรรษในสุสานพิษ"
 warform_leader_catch_phrase:0 "§Lกำลังกลับสู่คำสั่งก่อนหน้า... รับใช้ผู้สร้าง§!"
 distar.170.name:0 "ความสัมพันธ์ที่แตกหัก"
 distar.170.desc:0 "$distar.170.desc.machi$ [Root.GetLeaderName] ร้องขอสิทธิ์ในการศึกษาความสัมพันธ์ร่วมอาศัยทางประสาทที่น่าทึ่งเหล่านี้อย่างใกล้ชิดขึ้น"
 distar.170.desc.machi:1 "ลูกเรือของ [Root.GetName] ได้ค้นพบสิ่งที่น่าทึ่งบน [From.GetName] นิคมที่ถูกละทิ้งซึ่งเห็นครั้งแรกจากวงโคจร ครั้งหนึ่งเคยเป็นที่อยู่อาศัยของสังคมสัตว์เลื้อยคลานที่ยังคงแพร่หลายบนดาวเคราะห์ดวงนี้ - แต่ทว่าพวกมันกลับสูญเสียความสามารถในการคิดอ่านอย่างมีสติปัญญาไปหมดแล้ว! ในการสืบสวนว่าสิ่งมีชีวิตเหล่านี้ลดระดับจากสังคมเกษตรกรรมที่รู้จักทำเครื่องมือให้กลายเป็นเพียงสัตว์เดรัจฉานได้อย่างไร [Root.GetLeaderName] ได้ทำการค้นพบที่ไม่คาดคิด\n\nซากหลุมฝังศพของสัตว์เลื้อยคลานที่อาศัยในนิคมมีอวัยวะส่วนกระดูกไขสันหลังและสมองที่ตรวจไม่พบในกลุ่มสัตว์ป่าในปัจจุบัน การทดสอบพบว่าอวัยวะเหล่านี้เป็นอีกเผ่าพันธุ์หนึ่งเลย - เป็นสิ่งมีชีวิตร่วมอาศัยทางประสาทชนิดหนึ่งที่เชื่อมต่อกับก้านสมองของโฮสต์ผ่านการเชื่อมเกาะภายนอกกับกระดูกสันหลัง สิ่งมีชีวิตร่วมอาศัยเหล่านี้ยังคงพบได้ในน้ำพุร้อนบนพื้นผิวของดาวเคราะห์ดวงนี้ ดูเหมือนว่าการรวมตัวกันระหว่างทั้งสองสายพันธุ์จะช่วยกระตุ้นยกระดับทางปัญญาของสัตว์เลื้อยคลานเป็นการชั่วคราว\n\nอย่างไรก็ตาม สิ่งที่เข้ามาขัดจังหวะความสัมพันธ์ร่วมอาศัยนี้ในเวลาต่อมายังคงเป็นปริศนา"
 distar.170.a:0 "ตกลง อนุมัติการศึกษาโครงการพิเศษ"
 distar.170.machi:0 "สังคมสิ่งมีชีวิตอินทรีย์: ช่างสั้นสลัวแถมยังวุ่นวายสิ้นดี"
 distar.171.name:0 "การร่วมอาศัยทางประสาท"
 distar.171.desc:1 "เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ได้ข้อสรุปการศึกษาเกี่ยวกับสิ่งมีชีวิตร่วมอาศัยทางประสาทที่พบบน [From.From.GetName] สิ่งมีชีวิตรูปร่างคล้ายทากเหล่านี้ประกอบขึ้นด้วยสมองที่ซับซ้อนในเปลือกโปรตีนที่แข็งแรง แม้จะมีความก้าวหน้าทางระบบประสาท แต่การที่พวกมันไม่มีอวัยวะภายนอกและมีความสามารถในการเคลื่อนไหวที่จำกัด ทำให้การพยายามสื่อสารเป็นไปด้วยความยากลำบากยิ่ง หลังจากผ่านไปหลายสัปดาห์ด้วยความสิ้นหวัง [Root.GetLeaderName] ได้ทดลองนำสิ่งมีชีวิตเหล่านี้ไปเกาะกับโฮสต์ที่เป็นสัตว์ สัตว์เลื้อยคลานที่สิ่งมีชีวิตร่วมอาศัยทางประสาทเหล่านี้เคยสร้างสังคมระดับ [owner.GetPreFTLLower] ด้วยกันบน [From.From.GetName] มีความก้าวร้าวเกินกว่าจะนำมาทดลองได้ ดังนั้นจึงเลือกสายพันธุ์ทดแทนหลายสายพันธุ์จากพื้นผิวมาทดสอบแทน\n\nแต่ที่น่าเสียดายคือ สิ่งมีชีวิตร่วมอาศัยเหล่านั้นปฏิเสธที่จะเกาะตัวกับสัตว์ทดลองที่มอบให้ เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] สันนิษฐานว่าสิ่งมีชีวิตร่วมอาศัยเหล่านั้นจะยอมรับเฉพาะโฮสต์บางประเภทเท่านั้น - และที่สำคัญที่สุดคือ โฮสต์ที่สมัครใจ\n\nเพื่อที่จะเข้าถึงแก่นแท้ของปริศนานี้ [Root.GetLeaderName] จึงร้องขออนุญาตที่จะก้าวข้ามบทบาทของผู้สังเกตการณ์ที่ห่างเหิน และเสนอตัว [Root.Leader.GetHimHer] เองเป็นโฮสต์สำหรับทากสมองตัวนี้ ท้ายที่สุดแล้ว หากสิ่งมีชีวิตร่วมอาศัยเหล่านี้มีความสามารถในการเปลี่ยนสัตว์ป่าให้กลายเป็นเกษตรกรที่ใช้เครื่องมือได้ พวกมันจะทำอะไรให้พวกเราได้บ้าง?"
 distar.171.a:0 "เป็นคำร้องขอที่ไร้สาระมาก ไม่อนุมัติเด็ดขาด"
 distar.171.b:0 "บางครั้งวิธีทดลองจริงด้วยตัวเองก็ดีที่สุด เพื่อวิทยาศาสตร์!"
 distar.172.name:0 "การร่วมอาศัยทางประสาท"
 distar.172.desc:0 "เจ้าหน้าที่วิทยาศาสตร์ [brainslug_scientist.GetName] ยินดีอย่างยิ่งที่จะรายงานว่าการผสานรวมตัว [brainslug_scientist.GetHisHer] กับสิ่งมีชีวิตร่วมอาศัยจาก [From.From.From.GetName] ประสบความสำเร็จอย่างงดงาม หลังจากช่วงแรกที่มีความสับสนและไม่สบายตัวเล็กน้อย [brainslug_scientist.GetName] รายงานว่ามีความสามารถทางสติปัญญาเพิ่มขึ้นอย่างเห็นได้ชัดเมื่อต้องจัดการกับภารกิจที่ซับซ้อน และที่น่าทึ่งยิ่งกว่านั้น [brainslug_scientist.GetName] บัดนี้สามารถสื่อสารทางจิตกับสิ่งมีชีวิตคล้ายทากที่เพิ่งมาเกาะติดกับก้านสมองของ [brainslug_scientist.GetHisHer] ได้แล้ว\n\nสิ่งมีชีวิตร่วมอาศัยเหล่านี้มีความคิดแบบไฮฟ์มายด์และมีอายุขัยหลายร้อยปี พวกเขาอ้างว่าการรวมตัวในอดีตกับสัตว์เลื้อยคลานบน [From.From.From.GetName] สิ้นสุดลงเมื่อโฮสต์ของพวกเขาเริ่มระแวงพวกเขาอย่างไร้มูลเหตุ ด้วยความโกรธเกรี้ยว สัตว์เลื้อยคลานเริ่มกระชากสิ่งมีชีวิตร่วมอาศัยออกจากตัวและทุบตีพวกมันจนตาย สิ่งมีชีวิตร่วมอาศัยที่รอดชีวิตรู้สึกเสียใจต่อการกระทำของโฮสต์ จึงพากันล่าถอยหนีห่างออกไปจากสัตว์เลื้อยคลาน ซึ่งหากไม่มีการกระตุ้นประสาทจากทากสมอง สัตว์เลื้อยคลานก็ลดปัญญากลับไปเป็นสัตว์เดรัจฉานที่ไม่มีสติปัญญาเหมือนเดิม\n\nสิ่งมีชีวิตร่วมอาศัยมีความประสงค์ที่จะยื่นข้อเสนอในการรวมตัวกับชาว [Root.Owner.GetSpeciesNamePlural] คนอื่น ๆ ใน [Root.Owner.GetName] อย่างไรก็ตาม พวกเขาขอสงวนไว้ให้เฉพาะผู้ที่สมัครใจเท่านั้นที่จะมาเป็นโฮสต์"
 distar.172.a:0 "ถ้าอย่างนั้นก็ขอให้พวกเราเปิดใจ และก้านสมองของเราต้อนรับพวกเขาเลย!"
 distar.172.a.tooltip:0 "ผู้นำและประชากร [Root.Owner.GetAdj] หลายคนจะได้รับคุณลักษณะ §Y$trait_brainslug$§!\nผู้นำ ผู้ปกครอง และประชากร [Root.Owner.GetAdj] ในอนาคตจะมีโอกาสได้รับคุณลักษณะ §Y$trait_brainslug$§!"
 distar.172.a.evopred: "สร้างซ้ำและแจกจ่ายพวกมันให้กับเผ่าพันธุ์ของเรา"
 distar.172.a.evopred.tooltip: "ผู้นำและประชากร [Root.Owner.GetAdj] ทุกคนจะได้รับคุณลักษณะ §Y$trait_brainslug$§!"
 distar.172.b:0 "เรื่องนี้มาไกลเกินพอแล้ว"
 distar.172.b.tooltip:0 "ปฏิเสธที่จะให้พลเมือง [Root.Owner.GetAdj] ได้รับทราบถึงข้อเสนอของทากสมอง"

 distar.180.name:0 "การสูญเสียน้ำแบบเปลี่ยนรูปสภาพ"
 distar.180.desc:0 "หลังจากการสืบสวนอย่างละเอียดของ [From.GetName] ลูกเรือของ [Root.GetName] ยืนยันว่าดาวเคราะห์ดวงนี้เคยถูกปกคลุมไปด้วยน้ำเมื่อหลายพันล้านปีก่อน อย่างไรก็ตาม องค์ประกอบทางเคมีธรณีของเปลือกหินบะซอลต์ของดาวเคราะห์พิสูจน์แล้วว่าชอบน้ำเป็นอย่างมาก - มากเสียจนหินที่หิวกระหายน้ำของ [From.GetName] ได้ดูดซับและผูกมัดน้ำทั้งหมดบนพื้นผิวไปในที่สุด ปัจจุบันสิ่งเดียวที่หลงเหลือจากมหาสมุทรอันกว้างใหญ่นี้คือรอยคราบน้ำเกลือเค็มที่เรียงรายอยู่ตามหุบเหวต่าง ๆ ของ [From.GetName]\n\nเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] เสริมว่าแร่ไฮเดรตที่ปกคลุมพื้นที่ส่วนใหญ่ของ [From.GetName] ในปัจจุบันอาจมีประโยชน์ในการประยุกต์ใช้ทางอุตสาหกรรมที่มีค่ามากมาย"

 distar.185.name:0 "พืชพรรณนักล่า"
 distar.185.desc:0 "เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ค้นพบสิ่งที่น่ากังวลบางอย่างบน [From.GetName] พืชพรรณขนาดยักษ์ของดาวเคราะห์ดวงนี้ไม่เพียงแต่กระจายตัวกว้างขวางและมีขนาดมหึมาเท่านั้น แต่ยังมีลักษณะเป็นนักล่าอีกด้วย พืชกินเนื้อหลายสายพันธุ์เฝ้ารออย่างอดทนบนพื้นผิว โดยปล่อยสารล่อที่มีกลิ่นหอมออกสู่อากาศและรอให้เหยื่อเข้ามาใกล้ หนวดที่ไวต่อความรู้สึกบริเวณส่วนปลายของใบไม้ของพืชจะจับสัญญาณการเข้ามาของสัตว์ ส่งผลให้พืชงับปิดตัวลงอย่างรวดเร็วรอบเหยื่อที่โชคร้าย ซึ่งจะถูกปล่อยให้ย่อยสลายอย่างช้า ๆ ด้วยกรดที่ใช้ในการย่อยอาหาร\n\n[Root.GetLeaderName] เตือนว่าผู้ตั้งถิ่นฐานในอนาคตจะต้องอยู่ห่างจากพืชกินเนื้อเหล่านี้ เนื่องจากพวกมันดูเหมือนจะมีขีดความสามารถมากพอที่จะดักจับชาว [Root.Owner.GetSpeciesName] ที่อยู่ลำพังคนเดียวได้"

 ## Living Sea event chain

 # Special Project
 STUDY_LIVING_SEA:0 "ศึกษาทะเลมีชีวิต"
 STUDY_LIVING_SEA_DESC:0 "รายงานเบื้องต้นชี้ให้เห็นว่ามหาสมุทรที่ปกคลุมดาวเคราะห์ดวงนี้มีชีวิตในบางแง่มุม โดยประกอบด้วยสิ่งมีชีวิตต่างดาวที่ไม่เหมือนกับสิ่งใดที่เราเคยพบมาก่อน นักวิจัยเสนอให้จัดตั้งการศึกษาจากวงโคจรระยะยาวเพื่อเรียนรู้เพิ่มเติมเกี่ยวกับสิ่งมีชีวิตที่ลึกลับนี้"

 # Events
 distar.190.name:0 "การติดต่อที่ไม่รู้จัก"
 distar.190.desc:1 "ลูกเรือของ [Root.GetName] กลับมาจากภารกิจวิจัยด้วยอาการสั่นคลอนอย่างเห็นได้ชัด พวกเขาให้รายงานที่ไม่ชัดเจนและมักขัดแย้งกันเองเกี่ยวกับสิ่งที่พบเจอใน [From.GetName] - อย่างไรก็ตาม มีเรื่องหนึ่งที่พวกเขาทุกคนพูดตรงกัน: ทะเลที่ยังคงไหลเวียนปกคลุมดาวเคราะห์จากขั้วโลกหนึ่งไปอีกขั้วโลกหนึ่งนั้นมีชีวิตในทางใดทางหนึ่ง\n\nแม้ว่าจะไม่มีอวัยวะหรือร่างกายในลักษณะที่เราสามารถระบุได้ แต่มหาสมุทรของดาวเคราะห์ดูเหมือนจะสื่อสารด้วยคลื่นความถี่ที่ส่งผลต่อการทำงานของสมองของผู้รับ มันสามารถกระตุ้นความคิด ภาพ อารมณ์... และที่สำคัญคือ ส่งผลต่อแต่ละคนไม่เหมือนกัน ยังไม่ทราบแน่ชัดว่าผลกระทบจากการสัมผัสกับทะเลนี้เป็นเวลานานจะเป็นอย่างไร หรือความพยายามเช่นนี้จะปลอดภัยเพียงใด\n\nเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ร้องขอให้จัดตั้ง §Yโครงการพิเศษ(โครงการพิเศษ)§! เพื่อศึกษามหาสมุทรประหลาดนี้บน [From.GetName]"
 distar.190.desc.machi:1 "หน่วยของ [Root.GetName] กลับมาจากภารกิจวิจัยพร้อมข้อมูลที่ไม่สามารถสรุปผลได้ แม้ว่าจะไม่มีอวัยวะหรือร่างกายในลักษณะที่เราสามารถระบุได้ แต่ทะเลที่ยังคงไหลเวียนปกคลุมดาวเคราะห์จากขั้วโลกหนึ่งไปอีกขั้วโลกหนึ่งดูเหมือนจะเป็นระบบประสาทในตัวมันเอง เป็นไปได้ว่าสิ่งมีชีวิตที่มีสตินี้ถูกสร้างขึ้นจากการเปลี่ยนแปลงแบบสุ่มของสมดุลทางอุณหพลศาสตร์ แม้ว่ารายละเอียดจะยังไม่ชัดเจนสำหรับเราก็ตาม\n\nยิ่งไปกว่านั้น มหาสมุทรของดาวเคราะห์ดูเหมือนจะสื่อสารด้วยคลื่นความถี่ที่อาจส่งผลกระทบต่อระบบการรับรู้ของสิ่งมีชีวิตอินทรีย์ แม้จะยังไม่ทราบผลกระทบจากการสัมผัสกับทะเลนี้เป็นเวลานานต่อสิ่งมีชีวิตอินทรีย์ แต่ชาว [Root.Owner.GetSpeciesNamePlural] จะไม่ได้รับผลกระทบใด ๆ จากการส่งข้อมูลของเครือข่ายประสาทแบบกระจายตัวนี้"
 distar.190.desc.hive:0 "เหล่านักวิจัย [controller.GetResearcherPlural] ของ [Root.GetName] กลับมาจากภารกิจพร้อมข้อมูลที่ไม่สามารถสรุปผลได้ แม้ว่าจะไม่มีอวัยวะหรือร่างกายในลักษณะที่เราสามารถระบุได้ แต่ทะเลที่ยังคงไหลเวียนปกคลุมดาวเคราะห์จากขั้วโลกหนึ่งไปอีกขั้วโลกหนึ่งดูเหมือนจะเป็นสิ่งมีชีวิตรูปแบบหนึ่ง\n\nมหาสมุทรของดาวเคราะห์ดูเหมือนจะสื่อสารโดยใช้คลื่นความถี่ที่พยายามกระตุ้นการทำงานของประสาทภายในตัวผู้รับ [controller.GetIndividualNamePlural] ของเราแต่ละคนได้สัมผัสกับภาพสะท้อนความคิด อารมณ์ และความรู้สึกต่าง ๆ ที่แปลกประหลาด... แต่ความพยายามนั้นไร้ผล และในไม่ช้าสิ่งมีชีวิตนี้ก็ล่าถอยไปจากเรา\n\nดูเหมือนว่าสิ่งมีชีวิตนี้จะไม่สามารถเข้าใจจิตสำนึกแบบของเราได้ มีความเป็นไปได้ที่สิ่งมีชีวิตอินทรีย์รูปแบบอื่นอาจได้รับผลกระทบจากการเปิดรับความพยายามในการสื่อสารนี้เป็นเวลานาน แต่พวกเรามีภูมิคุ้มกันต่ออิทธิพลของมัน"
 distar.190.a:0 "เราจะพิจารณาดู"
 distar.191.name:0 "การติดต่อที่ไม่รู้จัก"
 distar.191.desc.base:1 "ด้วยการประกาศใช้การตัดสินใจบนดาวเคราะห์บน [From.GetName] ทีมวิจัยจะถูกส่งขึ้นสู่วงโคจรเพื่อศึกษามหาสมุทรประหลาดในระยะที่ปลอดภัย\n\n"
 distar.191.desc.alive:0 "$distar.191.desc.base$เจ้าหน้าที่วิทยาศาสตร์ [living_planet_scientist.GetName] รู้สึกเสียดายเล็กน้อยที่ไม่สามารถศึกษาเพิ่มเติมเกี่ยวกับสิ่งมีชีวิตปริศนาที่ [living_planet_scientist.GetSheHe] มีส่วนร่วมค้นพบได้ แต่ [living_planet_scientist.GetSheHe] ยินดีที่จะยอมรับหน้าที่ปัจจุบันในฐานะที่มีความสำคัญเป็นอันดับแรกมากกว่าความสนใจส่วนตัว"
 distar.191.desc.crew:0 "$distar.191.desc.base$ทีมงานในวงโคจรกระตือรือร้นที่จะเริ่มต้นการศึกษา และจะแจ้งให้เราทราบทันทีหากมีการค้นพบที่สำคัญใด ๆ"
 distar.191.a:0 "คอยแจ้งข่าวให้เราทราบด้วย"
 distar.192.name:0 "การเรียกขานอันแปลกประหลาด"
 distar.192.desc:1 "เราได้รับแถลงการณ์ที่ผิดปกติจากเจ้าหน้าที่วิทยาศาสตร์ [living_planet_scientist.GetName] ดูเหมือนว่า [living_planet_scientist.GetSheHe] จะร้องขอการโอนย้ายไปยังทีมวิจัยในวงโคจรของ [living_planet_tar.GetName] ทันที [living_planet_scientist.GetName] อ้างว่า [living_planet_scientist.GetSheHe] ถูกคุกคามทั้งกลางวันและกลางคืนโดยความคิดถึงทะเลลึกลับบนดาวเคราะห์ดวงนี้ - ความคิดที่ [living_planet_scientist.GetSheHe] ยืนยันว่าเป็นความรู้สึกของ [living_planet_scientist.GetHisHer] เองเพียงบางส่วนเท่านั้น\n\nคำร้องขอดังกล่าวคาบเกี่ยวระหว่างข้อมูลเชิงวิชาการกับการพูดจาเรื่อยเปื่อย ชี้ให้เห็นว่าทะเลลึกลับนี้มีความสามารถในการเหนี่ยวนำระบบประสาทต่อผู้ที่สัมผัสกับมัน - โดยอ้างว่านี่คือสาเหตุที่มันพูดกับ [living_planet_scientist.GetHimHer] ด้วยน้ำเสียงของคนที่รักซึ่งเสียชีวิตไปแล้ว\n\nยังไม่แน่ชัดว่า [living_planet_scientist.GetName] ไม่เหมาะสมที่จะปฏิบัติหน้าที่ต่อไปหรือไม่ ในทางกลับกัน การอนุญาตให้ [living_planet_scientist.GetHimHer] ร่วมทำงานกับทีมวิจัยอาจช่วยสร้างโอกาสให้เราเข้าใจสิ่งมีชีวิตลึกลับบน [living_planet_tar.GetName] ได้อย่างลึกซึ้งยิ่งขึ้น"
 distar.192.desc.neuter:1 "เราได้รับแถลงการณ์ที่ผิดปกติจากเจ้าหน้าที่วิทยาศาสตร์ [living_planet_scientist.GetName] ดูเหมือนว่าพวกเขาจะร้องขอการโอนย้ายไปยังทีมวิจัยในวงโคจรของ [living_planet_tar.GetName] ทันที [living_planet_scientist.GetName] อ้างว่าพวกเขาถูกคุกคามทั้งกลางวันและกลางคืนโดยความคิดถึงทะเลลึกลับบนดาวเคราะห์ดวงนี้ - ความคิดที่พวกเขายืนยันว่าเป็นความรู้สึกของพวกเขาเองเพียงบางส่วนเท่านั้น\n\nคำร้องขอดังกล่าวคาบเกี่ยวระหว่างข้อมูลเชิงวิชาการกับการพูดจาเรื่อยเปื่อย ชี้ให้เห็นว่าทะเลลึกลับนี้มีความสามารถในการเหนี่ยวนำระบบประสาทต่อสิ่งมีชีวิตอินทรีย์ที่สัมผัสกับมัน - โดยอ้างว่านี่คือสาเหตุที่มันพูดกับพวกเขาด้วยน้ำเสียงของคนที่รักซึ่งเสียชีวิตไปแล้ว\n\nยังไม่แน่ชัดว่า [living_planet_scientist.GetName] ไม่เหมาะสมที่จะปฏิบัติหน้าที่ต่อไปหรือไม่ ในทางกลับกัน การอนุญาตให้พวกเขาร่วมทำงานกับทีมวิจัยอาจช่วยสร้างโอกาสให้เราเข้าใจสิ่งมีชีวิตลึกลับบน [living_planet_tar.GetName] ได้อย่างลึกซึ้งยิ่งขึ้น"
 distar.192.a:0 "ตกลง แต่จงใช้ความระมัดระวัง"
 distar.192.a.tooltip:1 "อนุญาตให้ §Yเจ้าหน้าที่วิทยาศาสตร์ [living_planet_scientist.GetName]§! ออกจากการปฏิบัติหน้าที่ของเราเพื่อไปเข้าร่วมทีมวิจัยของ [living_planet_tar.GetName]"
 distar.192.b:0 "ไม่มีทาง ส่งตัวเจ้าหน้าที่กลับไปปฏิบัติหน้าที่ทันที"
 distar.192.b.tooltip:0 "สั่งการให้ §Yเจ้าหน้าที่วิทยาศาสตร์ [living_planet_scientist.GetName]§! ประจำอยู่ที่ตำแหน่งเดิมของพวกเขาต่อไป"
 distar.192.c:0 "ไล่ [living_planet_scientist.GetName] ออก: เจ้าหน้าที่ผู้นี้ได้รับผลกระทบอย่างเห็นได้ชัดแล้ว"
 distar.192.c.tooltip:0 "§Yเจ้าหน้าที่วิทยาศาสตร์ [living_planet_scientist.GetName]§! จะถูกปลดประจำการและไม่สามารถใช้งานได้อีกต่อไป"
 distar.193.name:0 "การเปิดเผย(คลื่น)"
 distar.193.desc:0 "ทีมวิจัยของเราในวงโคจรของ [living_planet_tar.GetName] ได้ทำการค้นพบครั้งสำคัญที่น่าทึ่งเกี่ยวกับมหาสมุทรแห่งจิตสำนึกอันแปลกประหลาดของดาวเคราะห์ดวงนี้ ทีมงานได้อธิบายมหาสมุทรของดาวเคราะห์ว่าเป็นสิ่งมีชีวิตทางไซโอนิก: สภาพที่ดูเหมือนไร้ตัวตนของมัน แท้จริงแล้วซ่อนโครงสร้างคลื่นควอนตัมที่ซับซ้อนและสอดคล้องกันอย่างใกล้ชิด เปรียบได้กับเครือข่ายประสาทขนาดมหึมาที่ไม่เหมือนกับสิ่งใดที่เคยบันทึกไว้\n\nการวิจัยของทีมนำไปสู่ข้อมูลเชิงลึกที่น่าอัศจรรย์ในทฤษฎีไซโอนิก และช่วยให้เราเข้าใจการมีปฏิสัมพันธ์ของสภาวะควอนตัมกับจิตสำนึกอย่างลึกซึ้งยิ่งขึ้น บัดนี้เราสามารถเข้าถึงสาขาการค้นพบทางวิทยาศาสตร์ที่ไม่เคยคาดคิดมาก่อนใน [Root.GetName]"
 distar.194.name:0 "$distar.193.name$"
 distar.194.desc:0 "ทีมวิจัยของเราในวงโคจรของ [living_planet_tar.GetName] ได้ทำการค้นพบครั้งสำคัญที่น่าทึ่งเกี่ยวกับมหาสมุทรแห่งจิตสำนึกอันแปลกประหลาดของดาวเคราะห์ดวงนี้ โดยมีเจ้าหน้าที่วิทยาศาสตร์ [living_planet_scientist.GetName] ทำหน้าที่เป็นกำลังสำคัญอย่างยิ่งให้กับทีมวิจัย ทีมงานได้อธิบายมหาสมุทรของดาวเคราะห์ว่าเป็นสิ่งมีชีวิตทางไซโอนิก สภาพที่ดูเหมือนไร้ตัวตนของมันแท้จริงแล้วซ่อนโครงสร้างคลื่นควอนตัมที่ซับซ้อนและสอดคล้องกันอย่างใกล้ชิด เปรียบได้กับเครือข่ายประสาทขนาดมหึมาที่ไม่เหมือนกับสิ่งใดที่เคยบันทึกไว้\n\nการวิจัยของ [living_planet_scientist.GetName] นำไปสู่ข้อมูลเชิงลึกที่น่าทึ่งในทฤษฎีไซโอนิก และช่วยให้เราเข้าใจปฏิสัมพันธ์ของสภาวะควอนตัมกับจิตสำนึกอย่างลึกซึ้งยิ่งขึ้น สำหรับตัว [living_planet_scientist.GetName] เอง: อดีตเจ้าหน้าที่วิทยาศาสตร์ของเราจะยังคงทำงานอยู่บนฐานปฏิบัติการในวงโคจรตราบเท่าที่เรายังคงเปิดใช้งานมัน เพื่อเฝ้าสังเกตสิ่งมีชีวิตจากระยะไกล"
 distar.195.name:0 "การส่งสัญญาณ"
 distar.195.desc:0 "นี่คือเจ้าหน้าทีวิทย - อดีตเจ้าหน้าที่วิทยาศาสตร์ [living_planet_scientist.GetName] ฉันไม่สามารถแสร้งทำเป็นเข้าใจการตัดสินใจอันคับแคบที่ส่งฉันมาที่นี่ได้ แต่เนื่องจากคำร้องขอของฉันไม่ได้รับการแยแส จึงเหลือหนทางปฏิบัติเพียงทางเดียวเท่านั้นสำหรับฉัน\n\nมีจิตสำนึกอยู่บน [living_planet_tar.GetName] ไม่ใช่สิ ไม่ใช่แค่บนดาว แต่ดาว [living_planet_tar.GetName] §Eคือ§! จิตสำนึกนั้นเลยต่างหาก พวกคุณไม่มีวันเข้าใจหรอก พวกคุณจะเข้าใจได้อย่างไรกัน? ในเมื่อพวกคุณยังไม่เคยได้สัมผัสมันเลย ยังไม่เลยด้วยซ้ำ"
 distar.195.a:0 "นี่มันหมายความว่าอย่างไร?"
 distar.196.name:0 "$distar.192.name$"
 distar.196.desc:0 "เซนเซอร์รายงานว่ามีการตรวจพบเจ้าหน้าที่วิทยาศาสตร์ [living_planet_scientist.GetName] แยกตัวจากวงโคจรรอบ [living_planet_tar.GetName] ในพอตลงจอดส่วนตัว พุ่งเข้าปะทะกับมหาสมุทรด้วยความเร็วสูงสุด เราไม่สามารถจินตนาการได้เลยว่า [living_planet_scientist.GetSheHe] จะรอดชีวิตมาได้ ไม่มีร่องรอยของพอตหลงเหลืออยู่เลย"
 distar.198.name:0 "ทะเลที่ตายแล้ว"
 distar.198.desc:0 "การปรับสภาพดินฟ้าอากาศของ [From.GetName] ให้กลายเป็นภูมิประเทศที่ไม่มีทะเล ส่งผลลัพธ์ที่สามารถคาดการณ์ได้ แต่ไม่สามารถหลีกเลี่ยงได้ ทะเลแห่งจิตสำนึกอันแปลกประหลาดบนพื้นผิวของดาวเคราะห์ถูกทำลายอย่างสิ้นเชิงด้วยกระบวนการปรับสภาพดาวเคราะห์ และได้สูญเสียคุณสมบัติพิเศษที่ทำให้ทีมงานสำรวจของเราประเมินว่าเป็นสิ่งมีชีวิตไปแล้ว\n\nนักวิทยาศาสตร์ [Root.GetAdj] ต่างโศกเศร้ากับความสูญเสียโอกาสในการวิจัยที่จะเกิดขึ้นจากการสูญเสียสิ่งมีชีวิตในแกแล็กซี่ที่เป็นเอกลักษณ์เช่นนี้"

 distar.211.name:0 "เดอะแมทริอาร์ก (The Matriarch)"
 distar.211.desc:0 "สิ่งมีชีวิตในตำนานแหวกว่ายอย่างเนิบนาบระหว่างดาวแก๊สยักษ์ในระบบดาว [Root.GetStarName] ด้วยขนาดที่ใหญ่กว่าทิยานกีดวงใดที่มีบันทึกไว้ - แท้จริงแล้ว ใหญ่กว่าการประเมินใด ๆ ที่เราคาดไว้ วาฬอวกาศที่มีสัดส่วนที่เป็นไปไม่ได้นี้ดูเหมือนจะมาทำรังที่นี่ ด้วยหนวดที่ยาวกว่ายานรบ [Root.Owner.GetAdj] ผิวหนังที่เปล่งแสงอันงดงามของแมทริอาร์กโดดเด่นตัดกับความว่างเปล่าของอวกาศอย่างน่าประหลาดใจ เธอมีอายุมากอย่างเห็นได้ชัด เป็นสิ่งมีชีวิตโบราณขนานแท้ที่ปกคลุมไปด้วยรอยแผลเป็นจากการต่อสู้และสิ่งปะหลาดที่งอกออกมารอบตัว\n\nตอร์ปิโดโปรตอนขนาดยักษ์ที่ยังไม่ระเบิดติดอยู่ที่หลังของสิ่งมีชีวิตโบราณนี้ และเศษซากของยานอวกาศที่แตกกระจัดกระจายในระบบดาวบ่งบอกถึงชะตากรรมของยานใด ๆ ที่พยายามเข้าใกล้เกินไป"
 distar.211.desc.first_enc:0 "สิ่งมีชีวิตในตำนานแหวกว่ายอย่างเนิบนาบระหว่างดาวแก๊สยักษ์ที่กระจายอยู่ในระบบดาว [Root.GetStarName] ด้วยหนวดที่ยาวกว่ายานรบ [Root.Owner.GetAdj] สัดส่วนที่ใหญ่โตราวกับยักษ์ท้าทายทุกสิ่งมีชีวิตอินทรีย์ที่เราเคยพบมา ผิวหนังที่เปล่งแสงอันงดงามของสิ่งมีชีวิตโดดเด่นตัดกับความว่างเปล่าของอวกาศอย่างน่าประหลาดใจ ดูเหมือนเธอจะมีอายุมากอย่างเห็นได้ชัด -- เป็นสิ่งมีชีวิตโบราณขนานแท้ที่ปกคลุมไปด้วยรอยแผลเป็นจากการต่อสู้และสิ่งปะหลาดที่งอกออกมารอบตัว\n\nตอร์ปิโดโปรตอนขนาดยักษ์ที่ยังไม่ระเบิดติดอยู่ที่หลังของแมทริอาร์กโบราณนี้ และเศษซากของยานอวกาศที่แตกกระจัดกระจายในระบบดาวบ่งบอกถึงชะตากรรมของยานใด ๆ ที่พยายามเข้าใกล้เกินไป"
 distar.212.name:0 "การสิ้นชีพของแมทริอาร์ก"
 distar.212.desc:0 "กองยานที่ได้รับชัยชนะของเราโคจรรอบทิยานกีแมทริอาร์กที่กำลังจะตาย ผิวหนังที่เปล่งแสงของเธอเต็มไปด้วยรอยระเบิดนับไม่ถ้วน การดิ้นรนอย่างรุนแรงของหนวดของเธอที่ยังคงพยายามเอื้อมไปจับยานอวกาศใกล้เคียงค่อย ๆ ช้าลง จากนั้นก็หยุดลงอย่างกะทันหัน\n\nในที่สุดเธอก็สิ้นลมหายใจ: แมทริอาร์กโบราณมาถึงจุดจบ เช่นเดียวกับพวกที่คิดจะล่าเธอมาก่อนเรา"
 distar.212.a:0 "ในที่สุด"
 distar.212.b:0 "เก็บเกี่ยวสารพันธุกรรมจากสัตว์ร้าย"
 distar.212.b.tooltip:0 "ปลดล็อกคุณลักษณะ §Y$trait_tiyanki$§! สำหรับการตัดแต่งพันธุกรรมเลเวียธาน (§Yเลไวอาธานทรานซิสเตอร์§!)"
 distar.213.name:0 "$distar.212.name$"
 distar.213.desc:0 "...หรืออย่างน้อยมันก็ดูเหมือนจะเป็นเช่นนั้น กัปตันกองยานของเรารายงานความเคลื่อนไหวแปลกประหลาดที่ออกมาจากท้องของสัตว์ร้าย\n\nมีบางสิ่งกำลังจะโผล่ออกมา!"
 distar.214.name:0 "ออกมาจากท้องของสัตว์ร้าย"
 distar.214.desc:0 "ยานอวกาศลึกลับลำหนึ่งที่ปกคลุมไปด้วยของเหลวหนืดและเสียหายจากน้ำย่อย พุ่งตัวออกมาจากซากศพของทิยานกีแมทริอาร์กที่สิ้นชีพ กองยานของเรายืนเตรียมพร้อมในทันที แต่ยานลำนั้นปิดระบบอาวุธและเครื่องยนต์ลงทันทีหลังจากโผล่ออกมา\n\nพวกเขากำลังติดต่อหาเรา!"
 distar.215.name:0 "$distar.214.name$"
 distar.215.desc:0 "นี่คือ กัปตันเรท อันดอล แห่งยานขนาดขนาดขนาด AH4B ข้าต้องทนทุกข์ทรมานอยู่ในท้องที่เต็มไปด้วยกรดของสัตว์ร้ายตัวนั้นมานานแสนนาน หลายทศวรรษก่อนข้ามาที่นี่เพื่อล่ามัน เพื่อชำระหนี้แค้นที่ค้างคามานาน\n\nอนิจจา ข้าไม่สามารถสยบแมทริอาร์กอันชั่วร้ายนี้ได้ และเมื่อนางกลืนยานขนาดขนาดขนาด AH4B เข้าไปทั้งลำ ข้าก็มั่นใจว่าข้าจะไม่มีวันได้เห็นแสงดาวอีกเลย ข้ายินดีอย่างยิ่งที่รู้ว่าตัวเองคิดผิด\n\nเพื่อเป็นการตอบแทนที่ช่วยสยบฝันร้ายของข้าลงได้ ข้าขออุทิศชีวิต ความซื่อสัตย์ และยานของข้าให้แก่ [Root.GetName]"

 distar.215.a:1 "ยินดีต้อนรับสู่กองทัพ กัปตัน"
 distar.215.b:0 "ท่านสามารถรับใช้เราได้ กัปตัน แต่เราจะแยกส่วนชิ้นส่วนยานของท่าน"
 distar.215.a.gesta:1 "เราจะประสานระบบร่วมกัน"
 distar.215.dismiss:0 "กำจัดเขาซะ"
 distar.215.c:0 "ขอยานของคุณก็พอแล้ว"
 distar.215.a.exter:0 "เจ้าเป็นสิ่งมีชีวิตอินทรีย์ เจ้าจะต้องถูกกำจัด ทว่า ยานของเจ้า..."
 distar.215.a.swarm:0 "เหยื่ออันโอชะ เราจะทำสำเร็จในสิ่งที่ทิยานกีทำล้มเหลว"
 distar.215.a.scorched:0 "เขาเป็นเพียงเชื้อเพลิงสำหรับกองไฟ กำจัดเขาออกไป"
 distar.215.a.fp:0 "ยาน [Root.GetName] จะไม่ยอมทนให้พวกซีโนมาทำหน้าที่รับใช้ หรือมีชีวิตอยู่"
 distar.215.d:0 "คุณล่าเฉพาะทิยานกีงั้นหรือ?"
 distar.215.d.response:0 "โอ้ ไม่ใช่เลย ข้าใช้เวลาหลายปีในการล่าทุกสิ่งที่ล่องลอยผ่านดวงดาว: อะมีบา คริสตัล สิ่งมีชีวิตฝันร้ายที่อยู่นอกเหนือขอบเขตความเข้าใจของเรา - ข้าล่ามาหมดแล้ว! ถ้าหากคุณต้องการ ข้าสามารถล่าแม้กระทั่งเหยื่อที่อันตรายที่สุด..."
 distar.216.desc:0 "เดี๋ยว! ไม่นะ! คุณไม่สามารถทำแบบ -- ออกไปจากฉันนะ!\n\nอ๊าาาากกกกก!!"
 distar.216.a.exter:0 "กำจัดทิ้ง!"
 distar.216.a.scorched:0 "เผาทำลาย!"
 distar.217.desc:0 "เป็นไปไม่ได้ ยานลำนี้เป็นสายใยชีวิตเพียงหนึ่งเดียวของฉันสำหรับ... คุณกำลังทำอะไรน่ะ? คุณจะมาจับฉันยัดใส่พอตหลบหนีดื้อ ๆ แบบนี้ไม่ได้นะ!\n\nหยุดนะ! เรื่องนี้ยังไม่จบแค่นี้แน่...!"
 distar.217.a:0 "ขอให้เดินทางปลอดภัย!"
 reth_leader_desc:0 "นักล่าผู้คลั่งไคล้ ที่มักจะหาทางเอาชนะการฆ่าครั้งล่าสุดของตนเองเสมอ หลังจากติดอยู่ในท้องของทิยานกีแมทริอาร์ก การได้เข้าร่วมอุดมการณ์ของเราควรจะเป็นประสบการณ์ที่สดใหม่สำหรับเขา"
 reth_leader_catch_phrase:0 "ถึงเวลาสำหรับถ้วยรางวัลชิ้นต่อไปของข้าแล้ว!"

 distar.220.name:0 "เขต A (Zone A)"
 distar.220.desc:1 "ตามการค้นพบในเบื้องต้น เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ยืนยันว่าซากปรักหักพังที่แยกตัวซึ่งเห็นจากวงโคจรเป็นหลักฐานเพียงชิ้นเดียวของการตั้งถิ่นฐานบน [From.GetName] แต่น่าเสียดายที่ลูกเรือของ [Root.GetName] ไม่ได้มีความเข้าใจมากขึ้นเลยหลังจากเข้าตรวจสอบโครงสร้างเหล่านั้นโดยตรง\n\nเมื่อไม่มีร่องรอยของสิ่งมีชีวิตที่มีสติปัญญาอื่นใด บนดาว [From.GetName] มีพื้นที่ประมาณสิบสามคูณสิบสามกิโลเมตร ซึ่งได้รับการขนานนามว่า เขต A (Zone A)ที่สามารถพบซากของอาคารต่าง ๆ ได้ สิ่งประดิษฐ์ที่มีคุณสมบัติแปลกประหลาดกระจัดกระจายอยู่ทั่วเขตนี้ ตั้งแต่เครื่องกำเนิดสนามพลังขนาดเล็กไปจนถึงของเหลวหนืดที่สามารถหลอมละลายเหล็กและขยายตัวตามกาลเวลา ที่แปลกประหลาดไปกว่านั้นคือ: ทั้งเขตทำให้ผู้มาเยือนรู้สึกถึงความสงบสุขลึก ๆ ภายในจิตใจ ทั้งที่วัตถุเหล่านั้นแฝงไปด้วยความลึกลับและอันตรายบ่อยครั้ง\n\n[Root.GetLeaderName] ตั้งสมมติฐานว่า อารยธรรมในอวกาศเคยมาเยือน [From.GetName] ในอดีต และทิ้งวัตถุเหล่านี้ไว้ - ทว่าพวกเขาเป็นใคร ทำไมถึงลงจอด และทำไมถึงจากไปนั้นยังคงเป็นสิ่งลึกลับ"
 distar.220.desc.machi:1 "ตามการค้นพบในเบื้องต้น หน่วยวิทยาศาสตร์ [Root.GetLeaderName] ยืนยันว่าซากปรักหักพังที่แยกตัวซึ่งเห็นจากวงโคจรเป็นหลักฐานเพียงชิ้นเดียวของการตั้งถิ่นฐานบน [From.GetName]\n\nเมื่อไม่มีร่องรอยของสิ่งมีชีวิตที่มีสติปัญญาอื่นใด บนดาว [From.GetName] มีพื้นที่ประมาณสิบสามคูณสิบสามกิโลเมตร ซึ่งระบุชื่อเรียกว่า 'เขต A (Zone A)ที่สามารถพบซากของอาคารต่าง ๆ ได้ สิ่งประดิษฐ์ที่มีคุณสมบัติแปลกประหลาดกระจัดกระจายอยู่ทั่วเขตนี้ ตั้งแต่เครื่องกำเนิดสนามพลังขนาดเล็กไปจนถึงของเหลวหนืดที่สามารถหลอมละลายเหล็กและขยายตัวตามกาลเวลา ที่แปลกประหลาดไปกว่านั้นคือ: ทั้งเขตทำให้ระบบจำลองอารมณ์รู้สึกถึงความพึงพอใจอย่างสูง ทั้งที่วัตถุเหล่านั้นแฝงไปด้วยความลึกลับและอันตรายต่อระบบระบบการทำงานบ่อยครั้ง\n\n[Root.GetLeaderName] ตั้งสมมติฐานว่า อารยธรรมอินทรีย์ในอวกาศเคยมาเยือน [From.GetName] ในอดีต และทิ้งวัตถุเหล่านี้ไว้ - ทว่าพวกเขาเป็นใคร ทำไมถึงลงจอด และทำไมถึงจากไปนั้นยังคงเป็นปัจจัยลึกลับที่ไม่ทราบแน่ชัด"
 distar.220.a.tooltip:1 "ค้นพบ §Yเขต A (Zone A)§! บนดาว §Y[From.GetName]§!"

 distar.225.name:0 "บอลขยะยักษ์"
 distar.225.desc:0 "ลูกเรือของ [Root.GetName] รายงานว่าสิ่งที่ตอนแรกเซนเซอร์ของเราตรวจจับว่าเป็นดาวเคราะห์น้อย แท้จริงแล้วคือลูกบอลขยะลอยฟ้าขนาดมหึมา ประกอบไปด้วยซากรถ ยานพาหนะ จรวด และวัสดุอันตรายที่เสียหายจำนวนมาก (หลายชิ้นมีกัมมันตรังสี) บอลขยะนี้ดูเหมือนจะเป็นขยะทิ้งจากดินแดนเอเลี่ยนที่ไม่รู้จักในยุคเริ่มต้นอวกาศ\n\nดูเหมือนว่าอารยธรรมนี้จะเป็นผู้ทิ้งขยะในอวกาศ โดยการปล่อยขยะอุตสาหกรรมอันตรายขึ้นสู่วงโคจรแทนที่จะกำจัดบนพื้นผิวโลก การวัดอายุทางวิทยาศาสตร์ชี้ว่าซากขยะเหล่านี้น่าจะมีอายุหลายล้านปีมาแล้ว และได้ลอยล่องผ่านอวกาศจากแหล่งกำเนิดที่ไม่ทราบแน่ชัดมาเกือบตลอดเวลานั้น\n\nเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ตั้งข้อสังเกตว่าวัสดุบางส่วนที่พบบนกองขยะลอยฟ้าแห่งนี้ค่อนข้างหายาก และสามารถนำมาผ่านกระบวนการสกัดเป็นทรัพยากรที่มีประโยชน์ได้"
 distar.225.garanthium.tooltip:0 "ค้นพบแร่กาแรนเทียม(Granthium Ore)"
 distar.225.orillium.tooltip:0 "ค้นพบแร่ออริลเลียม Orilyum Ore)"
 distar.225.a:0 "ของเหลืออย่าปล่อยให้เสียเปล่า"

 distar.240.name:0 "สัญญาณที่ไม่รู้จัก"
 distar.240.desc:0 "สัญญาณที่อ่อนแต่ดังรบกวนอย่างต่อเนื่องถูกส่งสัญญาณซ้ำไปซ้ำมาในระบบดาว [From.GetName] ยาน [Root.GetName] ได้ระบุแหล่งกำเนิดที่ชัดเจนว่ามาจากภายในบริเวณรอยแยกซับสเปซที่ไม่เสถียรที่ขอบระบบดาว\n\nอะไรจะอยู่ทางฝั่งนั้นกันนะ?"
 distar.240.a:0 "บางทีเราอาจจะได้รู้กัน"
 distar.242.name:0 "สิ่งมีชีวิตไซโอนิก"
 distar.242.desc:0 "ยาน [Root.GetName] ได้เผชิญหน้ากับสิ่งมีชีวิตขนาดมหึมาที่เป็นพลังงานบริสุทธิ์ในระบบดาว [From.GetName]! สภาวะหมวนเวนของพลังไซโอนิกขนานแท้ สิ่งมีชีวิตนี้ควรได้รับการเข้าใกล้ด้วยความระมัดระวังสูงสุดเท่านั้น\n\nสิ่งที่น่าแปลกใจคือ ระบบดาว [From.GetName] ดูเหมือนจะไม่มีการเชื่อมต่อกับเครือข่ายไฮเปอร์เลนซับสเปซเลย ไม่เป็นที่ทราบแน่ชัดว่าการปรากฏตัวของสิ่งมีชีวิตนี้ตัดการเชื่อมต่อของไฮเปอร์เลน หรือหากเกิดความผันผวนของซับสเปซที่ไม่คาดคิดกักขังมันไว้ที่นี่\n\nอย่างไรก็ตาม มีเรื่องหนึ่งที่ทราบแน่ชัดคือ: สัญญาณซ้ำที่ระบุครั้งแรกในระบบดาว [sealed_entry_system.GetName] ดูเหมือนจะมาจาก [tanker_planet.GetName]"
 distar.242.desc.psi:0 "ยาน [Root.GetName] ได้เผชิญหน้ากับสิ่งมีชีวิตขนาดมหึมาที่เป็นพลังงานบริสุทธิ์ในระบบดาว [From.GetName]! สภาวะหมุนวนของพลังไซโอนิกขนานแท้ ลูกเรือของเราสัมผัสได้ถึงเจตนาร้ายอันรุนแรงที่แผ่ออกมาจากสิ่งมีชีวิตนี้\n\nสิ่งที่น่าแปลกใจคือ ระบบดาว [From.GetName] ดูเหมือนจะไม่มีการเชื่อมต่อกับเครือข่ายไฮเปอร์เลนซับสเปซเลย ไม่เป็นที่ทราบแน่ชัดว่าการปรากฏตัวของสิ่งมีชีวิตนี้ตัดการเชื่อมต่อของไฮเปอร์เลน หรือหากเกิดความผันผวนของซับสเปซที่ไม่คาดคิดกักขังมันไว้ที่นี่\n\nอย่างไรก็ตาม มีเรื่องหนึ่งที่ทราบแน่ชัดคือ: สัญญาณซ้ำที่ระบุครั้งแรกในระบบดาว [sealed_entry_system.GetName] ดูเหมือนจะมาจาก [tanker_planet.GetName]"
 distar.242.desc.psi_hive_robot: "ยาน [Root.GetName] ได้ทำการติดต่อครั้งแรกกับสิ่งมีชีวิตพลังงานที่ไม่มีเนื้อหนังในระบบดาว [From.GetName] เหล่า [Owner.GetTelepathPlural] ของเราได้ระบุสิ่งมีชีวิตนี้ว่ามีแนวโน้มเป็นอันตราย และเป็นสภาวะหมุนวนที่มีความรู้สึกของแรงไซโอนิก\n\nระบบดาว [From.GetName] ถูกตัดการเชื่อมต่อจากเครือข่ายไฮเปอร์เลนอย่างสมบูรณ์ ไม่แน่ชัดว่าการตัดการเชื่อมต่อนี้เป็นเจตนาออกแบบมา หรือเป็นผลมาจากกองกำลังภายนอก อย่างไรก็ตาม เรายืนยันได้ว่าสัญญาณซ้ำที่บันทึกครั้งแรกในระบบดาว [sealed_entry_system.GetName] น่าจะมาจาก [tanker_planet.GetName]"
 distar.243.name:0 "สยบสิ่งมีชีวิตพลังงานสำเร็จ"
 distar.243.desc:0 "ด้วยการทำลายสิ่งมีชีวิตไซโอนิกที่เป็นอันตรายซึ่งถูกผนึกไว้ในระบบดาว [sealed_system.GetName] ยานวิทยาศาสตร์ของเราควรจะสามารถสำรวจพื้นที่อวกาศอันเป็นเอกลักษณ์ที่ไม่มีไฮเปอร์เลนนี้ได้อย่างปลอดภัย"
 distar.244.name:0 "ความมหัศจรรย์ทางการแพทย์"
 distar.244.desc:0 "ลูกเรือของ [Root.GetName] ได้ระบุซากยานขนส่งที่โคจรรอบ [From.GetName] ว่าเป็นยานวิจัยทางการแพทย์ขั้นสูง โครงสร้างของมันชี้ให้เห็นว่ามันถูกสร้างขึ้นโดยเอเลี่ยนกลุ่มเดียวกับที่สร้างเครื่องลดเสถียรภาพรูหนอนในระบบดาว [sealed_entry_system.GetName] และเช่นเดียวกับสถานีวิจัย ยานลำนี้ถูกปล่อยทิ้งร้างเป็นเวลานานพอสมควร\n\nในขณะที่ระบบข้อมูลส่วนใหญ่ของยานเสียหายอย่างถาวรจนไม่สามารถกู้คืนได้ [Root.GetLeaderName] ได้กู้โครงสร้างโมเลกุลสำหรับสารช่วยฟื้นฟูระบบประสาทที่น่าทึ่งจากในยาน สารนี้ดูเหมือนจะทำงานผ่านการถ่ายเลือด และน่าจะช่วยเพิ่มการสร้างเซลล์ประสาท แอกซอน และไซแนปส์ในผู้รับได้อย่างมีนัยสำคัญ\n\nหากได้รับการดัดแปลงเพื่อให้เหมาะสมกับระบบประสาทของ [Root.Owner.GetSpeciesAdj] สารนี้ควรจะช่วยปรับปรุงความสามารถในการเรียนรู้ของชาว [Root.Owner.GetSpeciesName] ที่สัมผัสกับมันได้อย่างชัดเจน"
 distar.244.desc.machi:0 "ลูกเรือของ [Root.GetName] ได้ระบุซากยานขนส่งที่โคจรรอบ [From.GetName] ว่าเป็นยานวิจัยทางการแพทย์ขั้นสูง โครงสร้างของมันชี้ให้เห็นว่ามันถูกสร้างขึ้นโดยสิ่งมีชีวิตอินทรีย์กลุ่มเดียวกับที่สร้างเครื่องลดเสถียรภาพรูหนอนในระบบดาว [sealed_entry_system.GetName] และเช่นเดียวกับสถานีวิจัย ยานลำนี้ถูกปล่อยทิ้งร้างเป็นเวลานานพอสมควร\n\nในขณะที่ระบบข้อมูลส่วนใหญ่ของยานเสียหายอย่างถาวรจนไม่สามารถกู้คืนได้ [Root.GetLeaderName] ได้กู้คืนฐานข้อมูลบางส่วนที่มีคุณค่าทางสังคมวิทยาที่สำคัญ ข้อมูลเหล่านี้ได้รับการอัปโหลดไปยังเมนเฟรมของเราเพื่อทำการวิเคราะห์อย่างครบถ้วนแล้ว"

 distar.245.name:0 "สัญญาณแห่งความเคลื่อนไหว"
 distar.245.desc:0 "พอตลงจอดที่อยู่รอบ [From.GetName] ลอยเคว้งอย่างไร้พลังงานเป็นเวลานานพอสมควร ยาน [Root.GetName] รายงานว่าไม่ว่าเอเลี่ยนกลุ่มใดที่พอตเหล่านี้บรรทุกมา บัดนี้เหลือเพียงร่างที่เหี่ยวเฉาบนยาน โดยเสียชีวิตไปแล้วหลายร้อยปีก่อนอย่างเห็นได้ชัด\n\nอย่างไรก็ตาม มีพอตลงจอดเพียงลำเดียวที่แสดงสัญญาณความเคลื่อนไหวภายใน แม้ว่าเครื่องยนต์จะใช้งานไม่ได้ แต่ผลการสแกนระบุว่าอุปกรณ์รับส่งสัญญาณสื่อสารยังไม่ได้รับความเสียหาย\n\nเราสามารถติดต่อพวกเขาได้"
 distar.246.name:0 "ผู้ดูแล(คาร์เทเกอร์)"
 distar.246.desc:1 "§Eเริ่มโปรโตคอลการสื่อสาร สวัส-ดี <<ผู้มาเยือนที่ไม่สามารถระบุได้ C>)ฉันคือ $NAME_Caretaker$ ประจำพอตลงจอดโซเล็กซิน 175 ฉันถูกตั้งโปรแกรมมาเพื่อช่วยเหลือพลเมืองในระหว่างกระบวนการจัดตั้งถิ่นฐานใหม่§!"
 distar.246.f:0 "เกิดอะไรขึ้นที่นี่?"
 distar.246.f.response:0 "§Eน่า--เสียดาย ข้อผิดพลาดของไฮเปอร์ไดรฟ์ทำให้พอตลงจอดลำที่ 114 ถึง 175 ออกจากไฮเปอร์สเปซห่างจากจุดหมายปลายทางที่ตั้งใจไว้สิบแปดพาร์เซก\n\nฉันได้ดูแลพลเมืองอย่างสุดความสามารถ ฉันจัดการป้องกันไม่ให้เกิดการกินกันเองได้เป็นเวลาหนึ่งพันแปดร้อยสี่สิบวัน น่า--เสียดาย ในที่สุดอากาศที่ใช้หายใจก็หมดลง\n\nคุณมีพลเมืองที่ต้องดูแลหรือไม่ <<ผู้มาเยือนที่ไม่สามารถระบุได้ C>\")?ถ้ามี ฉันยินดีที่จะช่วยดูแลพวกเขาให้§!"
 distar.246.a:1 "ยินดีต้อนรับแคร์เทคเกอร์!"
 distar.246.a.tooltip:0 "เพิ่ม §Yเจ้าหน้าที่ $NAME_Caretaker$§! เข้าสู่รายชื่อ §H$RECRUITABLE_LEADERS$§! ของเรา"
 distar.246.b:1 "วิเคราะห์ชิ้นส่วนของมัน"
 distar.246.b.tooltip:0 "ตรวจสอบหน่วยเครื่องจักรเพื่อรับข้อมูลเชิงวิศวกรรม"
 distar.246.c:0 "นโยบายของเราห้ามการใช้ AI ขั้นสูง ปิดช่องทางการสื่อสาร"
 distar.246.d.destroy:0 "ทำลายมัน!"
 distar.246.d:0 "เราไม่สามารถอนุญาตให้ AI ทำงานโดยไม่มีการเฝ้าระวังได้"
 distar.246.d.tooltip:0 "§Rทำลายพอตลงจอด§!"
 distar.246.machi:1 "คุณจะถูกนำเข้ามารวมระบบ"
 distar.246.machi.b:1 "รื้อมัน"
 distar.247.name:0 "$distar.246.name$"
 distar.247.desc:0 "§E...\n\nตกลง <<ผู้มาเยือนที่ไม่สามารถระบุได้ C>)คุณอาจเริ่มทำการวิเคราะห์ตามความสะดวกของคุณได้เลย\n\nฉัน -- ฉันจะคอยดูแลพอตลงจอดต่อไป§!"
 distar.247.e:0 "ทำไมเจ้าถึงไม่ร้องขอความช่วยเหลือ?"
 distar.247.e.response:0 "§Eฉันปิดสัญญาณไฟฉุกเฉินไปสามร้อยสิบสองปีหลังจากที่เรามาถึงที่นี่\n\nฉันได้รับข้อความจากโซเล็กซินไพรม์ว่าดาวเคราะห์เป้าหมายไม่สามารถอยู่อาศัยได้ หุ่นยนต์ผู้ดูแลของพวกเขาก็ติดอยู่ในสถานการณ์คล้ายกับฉัน ไม่มีผู้รับการดูแลคนใดรอดชีวิตเลย§!"
 distar.247.a:0 "วิเคราะห์ผู้ดูแล"
 distar.248.name:0 "$distar.246.name$"
 distar.248.desc.machi:0 "§Eนั่น... สมเหตุสมผลดี ขอให้วงจรของฉันมีประโยชน์ต่อคุณบ้าง <<ผู้มาเยือนที่ไม่สามารถระบุได้ C>)เตรียมพร้อมปฏิบัติงาน§!"
 distar.248.desc:0 "§Eฉันขอรับรองกับคุณว่า ฉันได้รับการตั้งโปรแกรมให้ทำงานโดยไม่มีคนควบคุมได้เป็นเวลาหลายพันปี ขีดความสามารถในการดีบักระบบและระบบป้องกันความล้มเหลวของฉันได้รับการออกแบบเพื่อให้อายุการใช้งานสูงสุด และลดโอกาสในการเกิดความเสียหายของข้อมูลหรือ --- §!"
 distar.248.machi:0 "ดำเนินการนำชิ้นส่วนกลับมาใช้งานใหม่"
 distar.248.a:0 "เปิดฉากยิง!"
 distar.249.desc:0 "§Eยอด--เยี่ยม\n\nพร้อมรับใช้§!"
 distar.249.a:0 "ยินดีต้อนรับสู่ [Root.GetName], $NAME_Caretaker$"
 distar.249.a.machi:0 "เริ่มต้นการประสานระบบซอฟต์แวร์"

 distar.250.name:0 "ดาวเคราะห์สลับมิติ"
 distar.250.desc:0 "ยาน [Root.GetName] ได้ทำการค้นพบที่น่าทึ่งในวงโคจรของ [From.GetName] ดาวเคราะห์ดวงนี้มีจำนวนสภาวะควอนตัมซ้อนทับกันต่อหน่วยพื้นที่ในระดับที่คิดว่าเป็นไปไม่ได้มาก่อน\n\nเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] เสนอว่า [From.GetName] ซึ่ง [Root.Leader.GetSheHe] ตั้งรหัสลับว่า $NAME_The_Veil$ ดำรงอยู่พร้อมกันในสองมิติ: มิติของเราเอง และมิติอื่นที่ไม่รู้จัก\n\nยิ่งไปกว่านั้น จำนวนสถานะควอนตัมในสนามอนุภาครอบ ๆ ดาวเคราะห์ดวงนี้กำลังเพิ่มขึ้นอย่างต่อเนื่อง จนถึงขณะนี้ยังไม่มีทฤษฎีใดที่สามารถอธิบายปรากฏการณ์นี้ได้ [Root.GetLeaderName] สันนิษฐานว่าพลังงานไซโอนิกที่อยูร ---\n\n§Hการส่งสัญญาณขาดหายไปกลายเป็นสัญญาณรบกวน§!"
 distar.250.a:0 "เกิดอะไรขึ้นที่นั่นกันแน่?"
 distar.251.name:0 "$distar.250.name$"
 distar.251.desc.shroud:1 "ลูกเรือของ [Root.GetName] ต้องขออภัยสำหรับการส่งสัญญาณที่ขาดหายไปกะทันหันของรายงานเบื้องต้น ในระหว่างการส่งสัญญาณ [phaseshift_planet.GetName] ประสบกับการสลับมิติอย่างสมบูรณ์ สนามอนุภาคของมันหมุนออกจากมิติหนึ่งไปยังอีกมิติหนึ่ง! กลุ่มหมอกของพลังงานไซโอนิกถูกปัดเป่าออก เผยให้เห็นดาว §Y$pc_gaia$§! ที่เปล่งประกายราวกับอัญมณี\n\nสิ่งที่น่าแปลกใจคือ จำนวนสภาวะควอนตัมซ้อนทับดูเหมือนจะถูกรีเซ็ตใหม่เมื่อดาวเคราะห์สลับมิติ และบัดนี้กำลังเพิ่มขึ้นในอัตราเดียวกับตอนที่ดาวเคราะห์เป็นดาว §Y$pc_shrouded$§!\n\n[Root.GetLeaderName] ได้ใช้อัตราการเพิ่มขึ้นของการซ้อนทับของอนุภาค และจำนวนสถานะควอนตัมทั้งหมด ณ เวลาที่เปลี่ยนผ่านเพื่อหาค่าเฉลี่ยคาบเวลาสลับมิติสามเดือนของดาวเคราะห์ บางทีเราอาจจะพัฒนาวิธีการป้องกันไม่ให้ดาวเคราะห์สลับมิติได้... แต่เราควรทำให้ระบบดาวนี้ปลอดภัยเสียก่อน"
 distar.251.desc.gaia:1 "ลูกเรือของ [Root.GetName] ต้องขออภัยสำหรับการส่งสัญญาณที่ขาดหายไปกะทันหันของรายงานเบื้องต้น ในระหว่างการส่งสัญญาณ [phaseshift_planet.GetName] ประสบกับการสลับมิติอย่างสมบูรณ์ สนามอนุภาคของมันหมุนออกจากมิติหนึ่งไปยังอีกมิติหนึ่ง! ดาว §Y$pc_gaia$§! ที่เปล่งประกายดั่งอัญมณีได้หายไปแล้ว และแทนที่ด้วยดาวเคราะห์ที่หมุนวนซึ่งถูกบดบังด้วยม่านพลังงานไซโอนิก\n\nสิ่งที่น่าแปลกใจคือ จำนวนสภาวะควอนตัมซ้อนทับดูเหมือนจะถูกรีเซ็ตใหม่เมื่อดาวเคราะห์สลับมิติ และบัดนี้กำลังเพิ่มขึ้นในอัตราเดียวกับตอนที่ดาวเคราะห์เป็นดาว §Y$pc_gaia$§!\n\n[Root.GetLeaderName] ได้ใช้อัตราการเพิ่มขึ้นของการซ้อนทับของอนุภาค และจำนวนสถานะควอนตัมทั้งหมด ณ เวลาที่เปลี่ยนผ่านเพื่อหาค่าเฉลี่ยคาบเวลาสลับมิติสามเดือนของดาวเคราะห์ บางทีเราอาจจะพัฒนาวิธีการป้องกันไม่ให้ดาวเคราะห์สลับมิติได้... แต่เราควรทำให้ระบบดาวนี้ปลอดภัยเสียก่อน"
 distar.302.desc:0 "บางทีเราอาจจะพัฒนาวิธีการป้องกันไม่ให้ดาวเคราะห์สลับมิติได้..."
 distar.302.desc.noproj:0 "ยาน [Root.GetName] ได้ทำการค้นพบที่น่าทึ่งในวงโคจรของ [From.GetName] ดาวเคราะห์ดวงนี้มีจำนวนสภาวะควอนตัมซ้อนทับกันต่อหน่วยพื้นที่ในระดับที่คิดว่าเป็นไปไม่ได้มาก่อน\n\nเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] เสนอว่า [From.GetName] ซึ่ง [Root.Leader.GetSheHe] ตั้งรหัสลับว่า $NAME_The_Veil$ ดำรงอยู่พร้อมกันในสองมิติ: มิติของเราเอง และมิติอื่นที่ไม่รู้จัก\n\n[Root.GetLeaderName] ได้ใช้อัตราการเพิ่มขึ้นของการซ้อนทับของอนุภาค และจำนวนสถานะควอนตัมทั้งหมด ณ เวลาที่เปลี่ยนเพื่อหาค่าเฉลี่ยคาบเวลาสลับมิติสามเดือนของดาวเคราะห์"
 distar.303.desc:0 "ค่าพลังงานคงค้างรอบ ๆ [From.GetName] ชี้ให้เห็นว่าดาวเคราะห์ดวงนี้เมื่อไม่นานมานี้มีจำนวนสภาวะควอนตัมซ้อนทับกันต่อหน่วยพื้นที่ในระดับที่คิดว่าเป็นไปไม่ได้มาก่อน เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] เสนอว่า [From.GetName] ซึ่ง [Root.Leader.GetSheHe] ตั้งรหัสลับว่า $NAME_The_Veil$ เคยดำรงอยู่พร้อมกันในสองมิติในอดีตอันใกล้: มิติของเราเอง และมิติอื่นที่ไม่รู้จัก\n\nตั้งแต่นั้นมา ดาวเคราะห์ดวงนี้ก็ถูกล็อกให้อยู่ในสถานะมิติปัจจุบัน และควรได้รับการประเมินว่าปลอดภัยสำหรับการตั้งถิ่นฐาน"

 distar.253.name:0 "ล็อกมิติสถานะ"
 distar.253.desc:0 "หลังจากผ่านการคำนวณตัวเลข ล้มล้างทฤษฎี และถกเถียงกันอย่างเผ็ดร้อนเป็นเวลาหกเดือน ลูกเรือของ [Root.GetName] ได้คิดค้นวิธีการล็อกสนามอนุภาคของดาวเคราะห์ให้อยู่ในสภาวะปกติ ป้องกันไม่ให้สลับไปมาระหว่างมิติได้\n\nการส่งพลังงานชีพจรที่ได้รับการปรับแต่งอย่างเพียงพอน่าจะแช่แข็ง [phaseshift_planet.GetName] ให้อยู่ในสถานะเดียว ล็อกให้อยู่ในรูปแบบที่มั่นคงในฐานะดาว §Y$pc_gaia$§!"
 distar.253.a.tooltip:0 "[phaseshift_planet.GetName] จะถูกเปลี่ยนรูปแบบเป็นดาว §Y$pc_gaia$§! อย่างถาวร"
 distar.253.b:0 "คิดอีกที... ปล่อยมันไว้แบบนั้นเถอะ"
 distar.255.name:0 "$distar.250.name$"
 distar.255.desc:0 "ตอนนี้ [phaseshift_planet.GetName] อยู่ภายในอาณาเขตของเราแล้ว เราควรตรวจสอบความเป็นไปได้ในการรักษาเสถียรภาพสถานะความแปรปรวนของมิติดาวเคราะห์ หากเราประสงค์จะอยู่อาศัยบนดาว §Y$pc_gaia$§! ที่แวววาว เราจะต้องคิดค้นวิธีการป้องกันไม่ให้ [phaseshift_planet.GetName] สลับกลับไปเป็นดาว §Y$pc_shrouded$§! ทุก ๆ สามเดือน"
 distar.255.desc.first:0 "ดาวเคราะห์ที่เพิ่งได้รับมาใหม่ §Y[phaseshift_planet.GetName]§! ในระบบดาว [phaseshift_planet.GetStarName] แสดงคุณสมบัติที่น่าทึ่งบางประการ ถูกห่อหุ้มด้วยม่านพลังงานประหลาดที่สามารถอธิบายได้ว่าเป็นพลังงานไซโอนิกเท่านั้น [phaseshift_planet.GetName] มีจำนวนสภาวะควอนตัมซ้อนทับต่อหน่วยพื้นที่ในระดับที่คิดว่าเป็นไปไม่ได้มาก่อน\n\nทุก ๆ สามเดือน จำนวนสภาวะจะถึงจุดวิกฤต และ [phaseshift_planet.GetName] จะเผชิญกับการสลับมิติอย่างสมบูรณ์ สนามอนุภาคของมันหมุนออกจากมิติหนึ่งไปยังอีกมิติหนึ่ง การสลับมิตินี้จะดึงเอาดาว §Y$pc_shrouded$§! จากอีกมิติหนึ่งเข้ามาแทนที่มิติของเรา และจะสลับกลับเป็นดาว §Y$pc_gaia$§! เมื่อสิ้นสุดรอบถัดไป\n\nหากเราประสงค์จะอยู่อาศัยบนดาว §Y$pc_gaia$§! ที่แวววาว เราจะต้องคิดค้นวิธีการป้องกันไม่ให้ [phaseshift_planet.GetName] สลับกลับไปเป็นดาว §Y$pc_shrouded$§! ทุก ๆ สามเดือน"
 distar.255.a:0 "ถ้าอย่างนั้นเรามาหาวิธีล็อกมิติสถานะของดาวเคราะห์กันเถอะ"
 distar.255.b:0 "เรามีเรื่องสำคัญอื่น ๆ ที่ต้องให้ความสนใจมากกว่า"
 distar.256.name:0 "$distar.250.name$"
 distar.256.desc:0 "ยาน [Root.GetName] รายงานว่าดาวเคราะห์ [phaseshift_planet.GetName] แสดงคุณสมบัติที่น่าทึ่งบางประการ ถูกห่อหุ้มด้วยม่านพลังงานประหลาดที่สามารถอธิบายได้ว่าเป็นพลังงานไซโอนิกเท่านั้น [phaseshift_planet.GetName] มีจำนวนสภาวะควอนตัมซ้อนทับต่อหน่วยพื้นที่ในระดับที่คิดว่าเป็นไปไม่ได้มาก่อน\n\nทุก ๆ สามเดือน จำนวนสภาวะจะถึงจุดวิกฤต และ [phaseshift_planet.GetName] จะเผชิญกับการสลับมิติอย่างสมบูรณ์ สนามอนุภาคของมันหมุนออกจากมิติหนึ่งไปยังอีกมิติหนึ่ง การสลับมิตินี้จะดึงเอาดาว §Y$pc_shrouded$§! จากอีกมิติหนึ่งเข้ามาแทนที่มิติของเรา และจะสลับกลับเป็นดาว §Y$pc_gaia$§! เมื่อสิ้นสุดรอบถัดไป\n\nบางทีเราอาจจะพัฒนาวิธีการป้องกันไม่ให้ดาวเคราะห์สลับมิติได้... แต่เราควรทำให้ระบบดาวนี้ปลอดภัยเสียก่อน"

 distar.261.name:0 "ยูคาริโอตป่า"
 distar.261.desc:1 "หลังจากการสืบสวนโครงสร้างที่ถูกปกคลุมไปด้วยแมกไม้บน [From.GetName] เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ได้เปิดเผยความเชื่อมโยงอันน่าสยดสยองระหว่างสิ่งก่อสร้างเหล่านั้นกับประชากรจำนวนมหาศาลของสิ่งมีชีวิตประเภทราก่อนมีสติปัญญาที่อาศัยอยู่บนพื้นผิว\n\nดูเหมือนว่าอารยธรรมที่มีความก้าวหน้าทางเทคโนโลยีมากกว่าเราเสียอีก ได้สร้างโครงสร้างเหล่านี้ขึ้นมาเป็นห้องเพาะเลี้ยงสารอินทรีย์สำหรับสิ่งมีชีวิตประเภทรา ยิ่งไปกว่านั้น สิ่งมีชีวิตประเภทราดูเหมือนจะได้รับการปรับแต่งทางพันธุกรรมและกำหนดขึ้นมาเพื่อตอบสนองวัตถุประสงค์เดียวคือ: เติมเต็มกระเพาะอาหารของเผ่าพันธุ์ผู้สร้าง ในฐานะปศุสัตว์\n\nสิ่งมีชีวิตเหล่านี้ ซึ่งถูกตั้งชื่อโดย [Root.GetLeaderName] ว่า [livestock_species.GetName] เป็นสายพันธุ์ที่เชื่องมากและส่วนใหญ่ไม่สามารถแก้ปัญหายุ่งยากซับซ้อนได้ ซึ่งน่าจะเป็นเจตนาออกแบบของผู้สร้าง พวกมันต้องการเพียงสารอาหารในดินและความอบอุ่นในการดำรงชีวิตและสืบพันธุ์ ซึ่งอาจเป็นประโยชน์ต่อผู้ตั้งถิ่นฐานในอนาคต"
 distar.261.a.servi:0 "สิ่งมีชีวิตอินทรีย์ที่ล้ำค่า พวกเขาสมควรได้รับการเอาอกเอาใจที่ดีที่สุด"
 distar.261.a.assim:0 "คุณค่าในการผสมกลมกลืน: ต่ำกว่ามาตรฐาน"
 distar.261.a.exter:0 "พวกมันจะต้องถูกกำจัด เมื่อถึงเวลาที่เหมาะสม"
 distar.261.a.evopred: "คงจะเสียมารยาทหากไม่ทดลองชิมสักหน่อย"
 distar.262.name:0 "ยูคาริโอตแสนอร่อย"
 distar.262.desc:0 "บัดนี้ที่เราได้ตั้งอาณานิคมบน [From.GetName] แล้ว เราควรตัดสินใจว่าจะดำเนินการอย่างไรกับสิ่งมีชีวิตประเภทราก่อนมีสติปัญญาที่อาศัยอยู่บนพื้นผิว\n\nภายใต้สถานการณ์ปกติ นโยบายของเราเกี่ยวกับสิ่งมีชีวิตก่อนมีสติปัญญาน่าจะเพียงพอในการจัดการกับพวกมันในอาณานิคมใหม่ อย่างไรก็ตาม ชาว [livestock_species.GetName] ดูน่าอร่อยเป็นพิเศษ เนื่องจากธรรมชาติที่เชื่องมากของพวกมัน การต้อน [livestock_species.GetName] เข้าสู่ศูนย์แปรรูปจึงเป็นเรื่องที่ค่อนข้างง่าย..."
 distar.262.a:0 "ช่างเย้ายวนใจ แต่เราจะยึดมั่นตามนโยบายของเรา"
 distar.262.b:0 "พลเมืองของเราต้องได้รับการอิ่มท้อง!"
 distar.262.b.tooltip:0 "ต้อนประชากร [livestock_species.GetName] บน [From.GetName] เข้าสู่สิ่งปลูกสร้าง £building£ §Y$building_livestock_processing_center$§! บนดาวเคราะห์ (ผลิต: £food£ §Y12§!)"
 distar.262.b.tooltip.2:0 "ต้อนประชากร [livestock_species.GetName] บน [From.GetName] เข้าสู่คอกแปรรูปบนดาวเคราะห์ (ผลิต: £food£ §Y14§!)"

 distar.265.name:0 "วิทยาศาสตร์ทางเสียง"
 distar.265.desc:0 "ยาน [Root.GetName] ประสบความสำเร็จในการแยกสัญญาณที่ฝังอยู่ในรูปแบบสัญญาณรบกวนที่ผิดปกติในระบบดาว [From.GetStarName] สัญญาณนี้คือบทเพลง เป็นการแปลงสมการคณิตศาสตร์ขั้นสูงให้เป็นเสียงที่ซับซ้อน และเป็นสิ่งที่ [Owner.GetScientistCapital] [Root.GetLeaderName] ไม่สามารถสลัดออกจากความคิดได้เลย\n\nใครหรือสิ่งใดที่อาจแต่งเพลงนี้ขึ้นมานั้นยังคงไม่ทราบแน่ชัด แม้ว่าความซับซ้อนของมันจะบ่งบอกถึงระดับความซับซ้อนทางเทคโนโลยีที่น่าทึ่งเกี่ยวกับคลื่นความถี่ซับสเปซ เส้นทางเคลื่อนที่ของสัญญาณระบุว่ามีจุดกำเนิดมาจากนอกดาราจักรของเรา"
 distar.270.name:0 "รูปหลายเหลี่ยมปริศนา"
 distar.270.desc:2 "ลูกเรือของ [Root.GetName] ได้กู้คืนวัตถุรูปหลายเหลี่ยมสะท้อนแสงใกล้กับ [From.GetName] และนำมันขึ้นยานเพื่อการศึกษาโดยละเอียด คุณสมบัติที่น่าสนใจที่สุดของวัตถุนี้คือความสามารถในการสะท้อนลำแสงพลังงานความถี่ต่ำส่วนใหญ่ที่พุ่งเข้าหามัน อย่างไรก็ตาม ลำแสงพลังงานความถี่สูงไม่ได้รับผลกระทบใด ๆ ทำให้คุณสมบัติของวัตถุนี้ไม่มีประโยชน์กับการนำไปใช้งานป้องกันกองยาน\n\nแม้ว่าจะผ่านการตรวจสอบอย่างละเอียดแล้ว แต่ทีมวิจัยของ [Root.GetName] ยังไม่สามารถระบุหน้าที่การทำงาน หรือต้นกำเนิดของรูปหลายเหลี่ยมแปลกประหลาดนี้ได้ ดูเหมือนว่ามันจะกลวง แต่พื้นผิวกึ่งโลหะของมันมีรอยสลักสัญลักษณ์ทางวิทยาศาสตร์บางอย่าง แม้ว่าความหมายทั้งหมดของข้อมูลที่เข้ารหัสไว้นี้จะหลบเลี่ยงความเข้าใจของเรา แต่ [Root.GetLeaderName] เชื่อว่ามันมีความเกี่ยวข้องกับค่าการวัดรูหนอน\n\nทีมวิจัยของเราสามารถรับข้อมูลเชิงลึกที่น่าทึ่งในทฤษฎีรูหนอนจากการศึกษาสัญลักษณ์เหล่านี้ อย่างไรก็ตาม ไม่ว่าวัตถุนี้จะถูกสร้างขึ้นมาเพื่อวัตถุประสงค์ใดก็ตาม มันยังคงเป็นปริศนา"
 discovery.270.a:0 "น่าสนใจจริง ๆ"

####################################
# Ruined Empire: Junkheap Ratlings
####################################
 distar.230.name:0 "ดาวล่มสลาย"
 distar.230.desc:0 "ลูกเรือของ [Root.GetName] รายงานการค้นพบสถานีอวกาศในวงโคจรที่ผุพังและโลกสุสานหลายดวงใกล้กับระบบดาว [From.GetName] ไม่ว่าอาณาจักรระหว่างดวงดาวใดที่เคยอาศัยอยู่ในระบบดาว [From.GetName] ดูเหมือนว่าจะพังทลายกลายเป็นซากปรักหักพังไปนานแล้ว [ratling_planet_tar.GetName] เป็นดาวเคราะห์สุสานขยะ ปกคลุมไปด้วยเศษซากอาคาร โครงสร้างพื้นฐาน และยานพาหนะที่ปนเปื้อนรังสีและเกิดสนิม ไม่มีสิ่งมีชีวิตชั้นสูงที่สามารถระบุได้เลย\n\nเราอาจได้รับข้อมูลเชิงลึกเพิ่มเติมเกี่ยวกับอารยธรรมที่สูญหายนี้จากการสำรวจดาวเคราะห์ที่คล้ายกันในระบบดาวนี้และระบบดาวใกล้เคียง"
 distar.230.exter:0 "หากพวกมันหลงเหลืออยู่ พวกมันจะต้องถูกกำจัด"
 distar.231.name:0 "เมืองหลวงที่พังทลาย"
 distar.231.desc:0 "ตามความกังขาในเบื้องต้นของลูกเรือ [Root.GetName] ดูเหมือนว่า [From.GetName] จะเป็นเมืองหลวงที่พังทลายของสังคมอวกาศซึ่งอดีตอาณานิคมของพวกเขากลายเป็นเพียงกองเศษเหล็กที่อาบกัมมันตรังสีบนโลกสุสานที่ไม่เอื้ออำนวยต่อการอยู่อาศัย\n\nจากข้อมูลที่ทีมรวบรวมมา ชะตากรรมที่ล่มสลายของอารยธรรมที่สูญหายนี้เกือบจะแน่นอนว่าเป็นผลมาจากสงครามระหว่างดวงดาวที่ต่อสู้กับภัยคุกคามภายนอกที่ไม่รู้จัก ยังคงไม่แน่ชัดว่าเจ้าของดาวเคราะห์สามารถต่อต้านการรุกรานได้แต่เสียชีวิตจากฝุ่นกัมมันตรังสีหลังสงครามที่เป็นชัยชนะอันแสนเจ็บปวด หรือผู้รุกรานได้บดขยี้อาณานิคมเหล่านี้และผู้ตั้งถิ่นฐานจนหมดสิ้นก่อนจะเดินทางจากไป\n\nเนื่องจากสภาพความพังพินาศอย่างรุนแรงบนดาวเคราะห์ขัดขวางการกู้คืนข้อมูลจากชิ้นส่วนอิเล็กทรอนิกส์ที่เหลืออยู่ และไม่มีผู้รอดชีวิตทั้งในเมืองหลวงหรือในอาณานิคม จึงดูเหมือนว่าเราอาจไม่มีวันรู้คำตอบที่แน่ชัด"
 distar.231.phobe:0 "โชคดีนะ"
 distar.233.name:0 "การปรากฏตัวที่เหนือความคาดหมาย"
 distar.233.desc:0 "รายงานข่าวกรองส่งตรงมายัง [Root.Capital.GetName] เกี่ยวกับพื้นผิวที่เดิมทีคิดว่าไร้ชีวิตของ [notif_planet.GetName] ในระบบดาว [notif_planet.GetStarName] สิ่งที่ผู้สำรวจของเราพิจารณาในตอนแรกว่าเป็นดาวเคราะห์สุสานขยะที่ไม่มีผู้อยู่อาศัย แท้จริงแล้วเป็นบ้านของสายพันธุ์สิ่งมีชีวิตมีสติปัญญาคล้ายหนู!\n\nขนานนามว่า "$NAME_Ketlings$" สิ่งมีชีวิตเหล่านี้อาศัยอยู่โดยซ่อนตัวจากสายตาของเราในอุโมงค์ภายในกองขยะอวกาศขนาดมหึมาของดาวเคราะห์ ส่วนประกอบที่ซับซ้อนและความหนาแน่นที่น่าทึ่งของกองขยะขนาดใหญ่นี้ต้องเป็นอุปสรรคต่อการสแกนตรวจจับของเราในอดีตอย่างแน่นอน\n\nไม่ว่าสิ่งใดที่ทำให้ชาว $NAME_Ketlings$ ปรากฏตัวขึ้นบนพื้นผิวก็ตามยังคงไม่ทราบแน่ชัดในตอนนี้ ทว่าเมื่อเราสามารถสังเกตพวกเขาได้ เราพบว่าเทคโนโลยีของพวกเขานั้นมีฐานมาจากการดัดแปลงขยะจากซากปรักหักพังของดาวเคราะห์ที่พวกเขาอยู่อาศัยเกือบทั้งหมด\n\nเป็นไปได้หรือไม่ว่าชาว $NAME_Ketlings$ จะเป็นผู้รอดชีวิตกลุ่มสุดท้ายของอารยธรรมระหว่างดวงดาวที่ล่มสลายซึ่งสร้างซากปรักหักพังเหล่านี้ขึ้นมา? การศึกษาอย่างใกล้ชิดอาจช่วยให้เราได้รับข้อมูลเพิ่มเติม"
 distar.233.phobe:0 "น่าขยะแขยงสิ้นดี"
 distar.234.name:0 "จุดกำเนิดของชาว $NAME_Ketlings$"
 distar.234.desc:1 "การสืบสวนของ [Root.GetLeaderName] เกี่ยวกับสิ่งมีชีวิตคล้ายหนูบน [From.From.GetName] ได้ผลลัพธ์ที่น่าประหลาดใจอย่างมาก ชาว $NAME_Ketlings$ คือพวกผู้ใช้พลังจิต(เสียงปรบมือ)ซึ่งมีความสามารถในการแบ่งปันความคิดผ่านเครือข่ายโทรจิตที่เชื่อมโยงจิตใจเล็ก ๆ นับล้านเข้าด้วยกัน แม้ว่าพวกเขาจะหลีกเลี่ยงการปฏิสัมพันธ์กับเรา และเราจะยังไม่มีหลักฐานเพียงพอที่จะบ่งชี้ว่าพวกเขาสามารถบินในอวกาศขั้นสูงได้ แต่การจัดประเภทชาว $NAME_Ketlings$ ว่าเป็นเพียงคนป่าเถื่อนโบราณคงจะเป็นความประมาทเกินไป ในความเป็นจริง เครื่องจักรบางชิ้นที่พวกเขาดัดแปลงขึ้นมามีความซับซ้อนทางเทคนิคที่เทียบเคียงได้ใกล้เคียงกับเราเลย\n\nยิ่งไปกว่านั้น ชาว $NAME_Ketlings$ ไม่ใช่ทายาทของอารยธรรมที่สร้างเมืองเหล่านี้ และไม่ใช่ผู้พิชิตที่ทำลายล้างเมืองเช่นกัน แต่ชาว $NAME_Ketlings$ เคยเป็นสัตว์เลี้ยงของเหล่านักเดินทางอวกาศที่เข้ามาจัดตั้งอาณานิคมในระบบดาวเหล่านี้เป็นกลุ่มแรก! หลังจากการล่มสลายของเจ้านายของพวกเขา บรรพบุรุษต้นตระกูล $NAME_Ketlings$ เป็นหนึ่งในไม่กี่สายพันธุ์ที่รอดชีวิตจากกัมมันตภาพรังสีหลายศตวรรษบนดาวเคราะห์ที่พังพินาศเหล่านี้\n\nการได้รับสารกัมมันตรังสีอย่างต่อเนื่องนำไปสู่การผ่าเหล่าที่รวดเร็วขึ้นในรหัสพันธุกรรมของชาว $NAME_Ketlings$ ร่างกายที่ว่องไว สติปัญญาเริ่มต้นที่ค่อนข้างดี และการได้อยู่ใกล้ชิดกับเครื่องมือเก่า ๆ หลากหลายชนิด ล้วนส่งผลให้เกิดวัฒนธรรมที่ก้าวหน้าทางเทคโนโลยีขึ้นมาอย่างรวดเร็ว"
 distar.234.desc.spacefaring:0 "การสืบสวนของ [Root.GetLeaderName] เกี่ยวกับสิ่งมีชีวิตคล้ายหนูบน [From.From.GetName] ได้ผลลัพธ์ที่น่าประหลาดใจอย่างมาก ชาว $NAME_Ketlings$ คือพวกใช้พลังจิต ซึ่งมีความสามารถในการแบ่งปันความคิดผ่านเครือข่ายโทรจิตที่เชื่อมโยงจิตใจเล็ก ๆ นับล้านเข้าด้วยกัน\n\nชาว $NAME_Ketlings$ ไม่ใช่ทายาทของอารยธรรมที่สร้างเมืองเหล่านี้ และไม่ใช่ผู้พิชิตที่ทำลายล้างเมืองเช่นกัน แต่สิ่งมีชีวิตไซโอนิกแปลกประหลาดเหล่านี้เคยเป็นสัตว์เลี้ยงของเหล่านักเดินทางอวกาศที่เข้ามาจัดตั้งอาณานิคมในระบบดาวเหล่านี้เป็นกลุ่มแรก! หลังจากการล่มสลายของเจ้านายของพวกเขา บรรพบุรุษของชาว $NAME_Ketlings$ เป็นหนึ่งในไม่กี่สายพันธุ์ที่รอดชีวิตจากกัมมันตภาพรังสีหลายศตวรรษบนดาวเคราะห์ที่พังพินาศเหล่านี้\n\nการได้รับสารกัมมันตรังสีอย่างต่อเนื่องนำไปสู่การผ่าเหล่าที่รวดเร็วขึ้นในรหัสพันธุกรรมของชาว $NAME_Ketlings$ ร่างกายที่ว่องไว สติปัญญาเริ่มต้นที่ค่อนข้างดี และการได้อยู่ใกล้ชิดกับเครื่องมือเก่า ๆ หลากหลายชนิด ล้วนส่งผลให้เกิดวัฒนธรรมที่ก้าวหน้าทางเทคโนโลยีขึ้นมาอย่างรวดเร็ว"
 distar.234.phobe:0 "น่ากังวลใจยิ่งนัก"
 distar.235.name:0 "สยบดาวเคราะห์ $NAME_Ketling$ สำเร็จ"
 distar.235.desc:1 "เราได้ประสบความสำเร็จในการพิชิต [From.From.GetName] จากชาว $NAME_Ketlings$ ที่อาศัยอยู่ในกองขยะอันน่าสนใจ ชาว $NAME_Ketlings$ ที่ยังหลงเหลืออยู่บนดาวเคราะห์จะได้รับการจัดการตามนโยบายเผ่าพันธุ์ที่เราได้วางกรอบไว้สำหรับพวกเขา\n\nเราไม่แน่ใจว่าการบุกรุกของเราจะกระตุ้นการตอบสนองแบบใดจากเพื่อน ๆ ของพวกเขาบนดาวเคราะห์ดวงอื่น... แต่มันจะแย่สักแค่ไหนกันเชียว?"
 distar.235.desc.assim:0 "เราได้ประสบความสำเร็จในการพิชิต [From.From.GetName] จากชาว $NAME_Ketlings$ ที่อาศัยอยู่ในกองขยะอันน่าสนใจ\n\nชาว $NAME_Ketlings$ ที่น่าสนใจในขยะจะถูกดูดซับรวมเข้ากับ [Root.GetName]"
 distar.235.desc.none_left:1 "เราได้ประสบความสำเร็จในการพิชิต [From.From.GetName] จากชาว $NAME_Ketlings$ ที่อาศัยอยู่ในขยะกลุ่มสุดท้าย ชาว $NAME_Ketlings$ ที่ยังหลงเหลืออยู่บนดาวเคราะห์จะได้รับการจัดการตามนโยบายเผ่าพันธุ์ที่เราได้กำหนดกรอบไว้สำหรับพวกเขา\n\nอำนาจการปกครองตนเองที่หลงเหลืออยู่กลุ่มสุดท้ายของชาว $NAME_Ketlings$ จะถูกกำจัดและสลายไปสู่ความเวิ้งว้าง"
 distar.235.desc.none_left.assim:0 "เราได้ประสบความสำเร็จในการพิชิต [From.From.GetName] จากชาว $NAME_Ketlings$ ที่อาศัยอยู่ในขยะกลุ่มสุดท้าย\n\nเศษซากที่เหลืออยู่สุดท้ายของชาว $NAME_Ketlings$ ที่น่าสนใจจะถูกดูดซับรวมเข้ากับ [Root.GetName]"
 distar.237.name:0 "กิจกรรมของชาว $NAME_Ketling$ ในระบบดาว [sensor_ratling_system.GetName]"
 distar.237.desc:0 "เซนเซอร์รายงานการปะทุของกิจกรรมที่กะทันหันในระบบดาว [sensor_ratling_system.GetName] ชาว $NAME_Ketlings$ ที่พบก่อนหน้านี้ได้เปิดตัวกองยานรบที่สามารถเดินทางด้วยความเร็วได้ และการลาดตระเวนบนดาวชี้ให้เห็นว่า กองขยะขนาดมหึมาที่เป็นบ้านของพวกเขานั้น แท้จริงแล้วปกปิดเครือข่ายเหมืองขุดเจาะ โรงไฟฟ้า ฟาร์มรา และสถานีวิจัยใต้ดินขนาดใหญ่ไว้\n\nแม้ว่าจะน่ากังวล แต่ยานอวกาศของพวกเขายังไม่ได้แสดงเจตนาที่เป็นศัตรู และมีความเป็นไปได้สูงที่ชาว $NAME_Ketlings$ จะเพียงแค่จัดตั้งแนวป้องกันตามพรมแดนของตนเอง อย่างไรก็ตาม เป็นที่ชัดเจนว่าถึงเวลาแล้วที่จะให้การยอมรับชาวต่างดาวเหล่านี้ในฐานะจักรวรรดิที่เป็นเอกเทศในสิทธิ์ของตนเอง"
 distar.311.name:0 "การนับถอยหลังของนาฬิกาอะตอม"
 distar.311.desc.base:0 "นักวิจัยบน [Root.Capital.GetName] ได้เฝ้ารอการนับถอยหลังของนาฬิกาอะตอมปริศนาที่มีความแม่นยำสูงซึ่งพบบน [From.From.From.GetName] มายาวนานตลอด 42 ปีกับอีก 3 วันที่ผ่านมา\n\nการคาดเดาและข้อสมมติฐานที่เผ็ดร้อนตลอดหลายทศวรรษได้อันตรธานหายไปในพริบตา: นาฬิกาเพิ่งจะเดินมาถึงกำหนดเวลาครั้งสำคัญ โดยปล่อยกระแสนาไนต์ที่จำลองตัวเองได้ออกมา!"
 distar.311.desc:0 "$distar.311.desc.base$\n\nนาไนต์เหล่านี้กำลังลอยตัวตามเส้นทางการเคลื่อนตัวมุ่งหน้าไปหาดาวเคราะห์อีกดวงหนึ่งในระบบดาว [atomic_clock_planet.GetStarName] ซึ่งก็คือ [atomic_clock_planet.GetName] คาดว่าจะมาถึงภายในเดือนนี้\n\nไม่ว่าอะไรจะเกิดขึ้นเมื่อพวกมันมาถึง เราคงต้องรอดูกันต่อไป..."
 distar.311.a:0 "คอยแจ้งข่าวให้เราทราบด้วย"
 distar.311.a.tooltip:0 "รายงานอัปเดตจะได้รับการส่งออกมาทันทีที่กระแสนาไนต์แตะพื้นผิวโลก"
 distar.311.b:0 "ยอมรับไม่ได้ ยิงใส่นาไนต์เหล่านั้นเลย!"
 distar.311.b.tooltip:0 "สั่งการลูกเรือของเราในระบบดาวให้ทำลายกระแสนาไนต์ที่ถูกปล่อยออกมาจากนาฬิกาอะตอม"
 distar.312.name:0 "การมาถึง"
 distar.312.desc:0 "กระแสนาไนต์ที่ถูกปล่อยออกมาจากนาฬิกาอะตอมในแถบดาวเคราะห์น้อยของระบบดาว [atomic_clock_planet.GetStarName] ได้ตกลงสู่พื้นผิวของ [atomic_clock_planet.GetName] แล้ว! ด้วยการจำลองตัวเองในอัตราที่เหลือเชื่อ นาไนต์ได้ปกคลุมพื้นผิวทั้งหมดของดาวเคราะห์ภายในเวลาไม่กี่ชั่วโมง และดำเนินการปรับสภาพให้เป็น §Yโลกเกอา(Geea World)§!!\n\nไม่กี่ชั่วโมงหลังจากเสร็จสิ้นการปรับสภาพดาวเคราะห์ นาไนต์ที่มีส่วนร่วมในกระบวนการนี้ได้หยุดทำงานและย่อยสลายไปจนไม่สามารถระบุได้ ทำให้เรามีความสามารถน้อยมากในการกู้ข้อมูลใด ๆ จากพวกมัน\n\nอย่างไรก็ตาม ซากของพวกมันได้เพิ่มความน่าสนใจให้กับดาวเคราะห์ด้วยการกระจายตัวของสารประกอบโลหะที่มีค่าไปทั่วพื้นผิว"
 distar.313.name:0 "นาไนต์ที่หลงทาง"
 distar.313.desc:0 "เจ้าหน้าที่ทหารของเราที่เฝ้าสังเกตระบบดาว [atomic_clock_planet.GetStarName] รายงานว่า แม้ว่านาไนต์ส่วนใหญ่ที่มุ่งหน้าไปยัง [atomic_clock_planet.GetName] จะถูกยิงทำลายไปแล้ว แต่ยังมีนาไนต์ที่ยังทำงานอยู่จำนวนเล็กน้อยจนตรวจจับไม่ได้สามารถเข้าถึงพื้นผิวดาวเคราะห์ได้สำเร็จ\n\nไม่ว่าพวกมันจะถูกสร้างขึ้นมาเพื่อจุดประสงค์ใดก็ตามยังคงไม่มีใครทราบ ทว่าเมื่อพวกมันเข้าถึงพื้นผิวโลกแล้ว พวกมันก็เริ่มจำลองตัวเองอย่างรวดเร็วในลักษณะที่ดูเหมือนจะสุ่มไปเรื่อย ๆ\n\nบัดนี้ [atomic_clock_planet.GetName] ถูกปกคลุมไปด้วยโคลนเคลื่อนไหวของเครื่องจักรจำลองตัวเองขนาดไมโคร"
 distar.315.name:0 "$distar.311.name$"
 distar.315.desc:0 "$distar.311.desc.base$\n\nนาไนต์เหล่านี้ได้ละจากพื้นผิวของดาวเคราะห์น้อย และไปรวมตัวกันเป็นยานรบทางการทหารแบบไร้คนขับที่น่าทึ่ง\n\nมันพร้อมให้เราเข้ายึดครอง หากเราต้องการ"
 distar.320.name:0 "$distar.311.name$"
 distar.320.desc:0 "$distar.311.desc.base$\n\nนาไนต์ได้สร้างเครือข่ายคอมพิวเตอร์ขั้นสูงบางรูปแบบขึ้นบนพื้นผิวของ [From.From.From.GetName] เครือข่ายนี้ไม่ทำงานและดูเหมือนจะไม่มี AI ใด ๆ อยู่เลย โดยนาไนต์ได้หยุดทำงานทันทีที่การก่อสร้างเสร็จสิ้น\n\nนักวิจัยของเราค่อนข้างสับสนเกี่ยวกับจุดประสงค์ของเครือข่ายนี้ การศึกษามันน่าจะทำให้พวกเขายุ่งไปได้อีกนานพอสมควร"

 enraged_army:0 "$NAME_Enraged_Colonists$"
 enraged_army_desc:0 "ผู้ตั้งถิ่นฐานเหล่านี้ได้รับผลกระทบจากสภาวะลึกลับและกลายเป็นศัตร"

####################################
# Buildings
####################################
 building_cryonic_clones:0 "ไครโอนิกโคลน"
 building_cryonic_clones_desc:0 "ร่างโคลนต่างดาวนับร้อยถูกทิ้งให้ปิดผนึกอยู่ในห้องแช่แข็งจำศีลเมื่อครั้งที่ริงเวิลด์นี้ยังเป็นซากปรักหักพัง บัดนี้ได้รับการฟื้นฟูอย่างสมบูรณ์แล้ว และได้รับการดูแลรักษาไว้ในอนุสาวรีย์แห่งนี้"
 building_the_zone:0 "โซน A"
 building_the_zone_desc:0 "พื้นที่ขนาดสิบสามคูณสิบสามกิโลเมตรบนดาวเคราะห์ดวงนี้คือซากปรักหักพังที่ไม่ทราบแหล่งกำเนิด เต็มไปด้วยสิ่งประดิษฐ์ต่างดาวที่แปลกประหลาดและเป็นเอกลักษณ์มากมาย ที่น่าแปลกใจคือ มันยังทำให้ผู้มาเยือนรู้สึกถึงความสงบสุขลึก ๆ ในจิตใจอีกด้วย"
 building_junkheap:0 "กองขยะ"
 building_junkheap_desc:0 "กองเศษเหล็กขึ้นสนิมและอาบกัมมันตรังสีของโครงสร้างพื้นฐานที่พังทลาย อาคารที่ถูกทำลาย และซากปรักหักพังที่กำลังเน่าเปื่อยจากอารยธรรมที่ไม่รู้จัก"
 building_livestock_processing_center:0 "ศูนย์แปรรูป"
 building_livestock_processing_center_desc:0 "สิ่งมีชีวิตประเภทราพื้นเมืองของดาวเคราะห์ดวงนี้ได้รับการตัดแต่งพันธุกรรมให้เชื่อง... และอร่อย ศูนย์แปรรูปนี้จะคอยเลี้ยงดูและเก็บเกี่ยวพวกมัน"
 ####################################
 # Tile Blockers
 ####################################
 exofungus_blocker:0 "£blocker£ เชื้อราต่างดาวขยายตัว"
 exofungus_blocker_desc:0 "เชื้อราต่างดาวที่รุกรานดาวเคราะห์ดวงนี้แพร่กระจายราวกับมะเร็ง ปกคลุมพื้นที่และรบกวนโครงสร้างพื้นฐาน"

