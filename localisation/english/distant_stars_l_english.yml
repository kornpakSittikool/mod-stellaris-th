# EVENTS

 distar.9000.lcluster_clue_desc_1:1 "เราได้ค้นพบว่าสารประกอบต่างดาวที่พบบนคลังข้อมูลปริศนานั้นประกอบขึ้นด้วยเศษผงของสิ่งมีชีวิตหุ่นยนต์ขนาดเล็กระดับกล้องจุลทรรศน์ - นาไนต์ รอยขีดข่วนบางจุดบนตัวถังถึงขั้นมีกรงเล็บกลไกขนาดเล็กติดอยู่ และในจุดหนึ่งเราพบนาไนต์ที่ยังทำงานอยู่แต่ชำรุดเสียหายซึ่งกำลังดูดพลังงานจากคลังข้อมูล จากข้อมูลที่ยังหลงเหลืออยู่ในฮาร์ดไดรฟ์ของนาไนต์ตัวนั้น เราได้ดึงข้อมูลที่อาจมีความสำคัญยิ่งต่อความเข้าใจของเราเกี่ยวกับโครงข่ายเกตเวย์แอล-คลัสเตอร์"

 distar.9000.lcluster_clue_desc_2:1 "ในบรรดาสิ่งของที่เก็บกู้ได้จากซากปรักหักพังบน [big_rip_planet.GetName] มีโฮโลแกรมที่ชำรุดเสียหายจากสังคมที่ขัดขวางชาว [GetPreFTLLowerPlural] ประเภทพืช แม้ว่าข้อมูลส่วนใหญ่จะเสียหายหรือฟังไม่รู้เรื่องเนื่องจากเสียงหวีดหวิวอย่างต่อเนื่องและสถานะตื่นตระหนกของผู้ส่งสาร แต่เราสามารถกู้คืนเศษเสี้ยวได้หลายส่วนซึ่งมีข้อมูลอันล้ำค่าเกี่ยวกับโครงข่ายเกตเวย์\n\nทว่าโฮโลแกรมส่วนใหญ่นั้นกลับมีเนื้อหาอุทิศให้แก่ลางร้ายอันน่าสะอิดสะเอียนของมรสุมสีเทา(เกรย์เทมเพสต์)และความตายอันน่าสยดสยองที่จะตามมาหลังจากมันปรากฏตัว"

 distar.9000.lcluster_clue_desc_3:0 "ในขณะที่ลูกเรือที่เดินทางกลับมาจากห้องปฏิบัติการเอ็กซ์แวนได้รับการชำระล้างสารปนเปื้อน เราได้ตรวจพบสารต่างดาวบนชุดป้องกันของพวกเขา เมื่อตรวจสอบอย่างใกล้ชิดพบว่าเป็นเศษซากของหุ่นยนต์ขนาดเล็กระดับกล้องจุลทรรศน์ซึ่งกลายเป็นผงฝุ่นสีเทาละเอียด ในบรรดาตัวอย่างต่าง ๆ เราพบนาไนต์ที่สมบูรณ์ตัวหนึ่งซึ่งมีคำสั่งในการประกอบสลักเกลียวเข้ากับโครงสร้างที่เราเชื่อว่าอาจจะเป็นเกตเวย์\n\nโครงสร้างระดับโมเลกุลนี้อาจเป็นส่วนสำคัญในการประกอบโครงข่ายแอล-เกตทั้งหมดขึ้นมา"

# Invisible Death
 distar.2040.name:0 "ความภาคภูมิใจแห่งเนฟรี(ความภูมิใจของแนฟฟรี)"
 distar.2040.desc:0 "ยานติดอาวุธที่พบบนวงโคจรของ [From.GetName] คือยานทหารที่ถูกทิ้งร้างชื่อ ความภาคภูมิใจแห่งเนฟรี(ความภูมิใจของแนฟฟรี)โครงสร้างที่เบาและฮาร์ดแวร์หลบหลีกแสดงให้เห็นว่ามันถูกสร้างขึ้นมาสำหรับภารกิจตรวจตราทางไกล ทว่าตั้งแต่นั้นมามันได้รับการดัดแปลงให้เป็นเครื่องบินทิ้งระเบิดล่องหนระยะไกล\n\nบันทึกข้อมูลการสื่อสารของยานเผยให้เห็นว่ามันถูกจี้โดยทหารกองโจรเพื่อใช้ในการโจมตีกลุ่มอาคารลับที่เรียกว่าห้องปฏิบัติการเอ็กซ์แวน ซึ่งกล่าวกันว่ามีอาวุธที่ทรงพลังมากจนสามารถช่วยให้พวกเขาชนะสงครามได้ ก่อนที่พวกเขาจะถูกยิงตก เราได้ดึงจุดหมายปลายทางของยานมาจากระบบขับเคลื่อนการนำทางแล้ว"
 distar.2040.a:0 "ส่งทีมวิทยาศาสตร์ไปยังห้องปฏิบัติการ"
 distar.2040.b:0 "เราไม่มีความจำเป็นต้องใช้อาวุธเช่นนั้น"
 distar.2041.name:0 "ความตายที่มองไม่เห็น"
 distar.2041.desc:0 "นักวิทยาศาสตร์ของเราเดินทางกลับมาจากห้องปฏิบัติการเอ็กซ์แวนอย่างปลอดภัย พร้อมภาพฟุตเทจที่รวบรวมมาจากกล้องรักษาความปลอดภัยของสถานที่ มันแสดงภาพนักวิทยาศาสตร์ในห้องปฏิบัติการถูกมัดและอุดปากไว้ในขณะที่ทหารกองโจรพยายามงัดเปิดตู้เก็บอาวุธ แต่ทว่าพวกต้องผิดหวังเมื่อตู้กล่องนั้นว่างเปล่า\n\nเพียงไม่กี่นาทีต่อมา ภาพทหารกองโจรกำลังดิ้นทุรนทุรายบนพื้นด้วยความเจ็บปวดแสนสาหัส รอยปื้นสีคล้ำพุพองแผ่กระจายไปทั่วร่างกาย จากนั้นผิวหนังของพวกเขาก็ฉีกขาดและมีสสารสีเทาที่ไม่สามารถระบุตัวตนทะลักออกมา\n\nสสารดังกล่าวยังคงขยายตัวต่อไปและหมุนวนรอบตัวอย่างน่าสะกดจิต จนกระทั่งนักวิทยาศาสตร์คนหนึ่งเปิดใช้งานระบบฉุกเฉิน หัวฉีดน้ำดับเพลิงพ่นของเหลวลงมาทั่วห้องและมีกระแสไฟฟ้าแรงสูงวิ่งผ่านเข้าสังหารสิ่งมีชีวิตทั้งหมด ภาพฟุตเทจสิ้นสุดลงเพียงเท่านี้ ทีมงานของเราสามารถยืนยันได้ว่าตู้เก็บของนั้นว่างเปล่าจริง ๆ"
 distar.2041.a:0 "น่าขนลุกยิ่ง"
 distar.2041.a.tooltip:0 "การเดินทางบุกเบิกห้องปฏิบัติการเอ็กซ์แวนช่วยเร่งรัดกระบวนการศึกษาวิจัยด้านวิศวกรรมของเราเพิ่มเติม"

 # GATE HIJACKERS
 distar.2045.name:0 "ผู้จี้ระบบเกตเวย์"
 distar.2045.desc:0 "สัญญาณมีต้นกำเนิดมาจากกลุ่มยานทหารที่ถูกทำลายในวงโคจรรอบ [From.GetName] ดูเหมือนว่าขุมพลังต่างดาวภายนอกซึ่งมีอายุเก่าแก่กว่าอารยธรรมของเราหลายพันปีที่เรียกว่า จักรวรรดิซูจิน(ซูจิน)จักรวรรดิ) พยายามจะจี้โครงข่ายเกตเวย์โดยใช้ลำแสงรบกวนบางชนิดเมื่อพวกเขาโดนขัดจังหวะอย่างกะทันหัน แม้ว่าลำแสงดังกล่าวจะทำงานอยู่และปรับตั้งค่าในโครงข่ายความปลอดภัยของเกตเวย์แล้ว แต่มันได้รับความเสียหายจากการจู่โจม บางทีนักวิทยาศาสตร์ของเราอาจจะสามารถซ่อมแซมมันได้"
 distar.2045.a:0 "มันคุ้มค่าที่จะลองดูอย่างแน่นอน"
 distar.2045.b:0 "ถอนตัวออกมา"
 distar.2046.name:0 "ความเข้าใจจากชาวซูจิน"
 distar.2046.desc:0 "แม้ว่านักวิทยาศาสตร์ของเราจะไม่สามารถเจาะระบบความปลอดภัยของเกตเวย์ได้สำเร็จ แต่ทว่าเราได้รับความเข้าใจที่มีคุณค่าอย่างยิ่งเกี่ยวกับวิธีการทำงานของโครงข่าย จักรวรรดิซูจินลุ่มหลงในเกตเวย์เป็นเวลาหลายศตวรรษ และได้รวบรวมข้อมูลทั้งหมดที่พวกเขาหาได้เพื่อพยายามบุกทะลวงเข้าไป"
 distar.2046.a:0 "ก็ไม่เลวนักเมื่อพิจารณาจากแง่มุมต่าง ๆ"

 # Vechtar Zavonia
 distar.1016.name:0 "สรวงสวรรค์ที่สูญหาย"
 distar.1016.desc:0 "ชาวโวล (Vol) ไม่ยอมเสี่ยงกับความมั่นคงแห่งชาติอย่างเด็ดขาด หลังจากปลดปล่อยคลังแสงนิวเคลียร์ทั้งหมดของพวกเขาลงบนพาไรดายดา (Paridayda) เปลี่ยนดาวบ้านเกิดดั้งเดิมที่อุดมสมบูรณ์ของชาวมาร์ดักโวล (Mardak Vol) ให้กลายเป็นเถ้าถ่าน พวกเขาก็ฉีดพ่นสารฆ่าเชื้อราลงบนเศษซากที่ลุกไหม้ ละลายเศษซากชิ้นสุดท้ายของชาวมาร์ดักโวลให้กลายเป็นตะกอนมีพิษ ไม่ว่าพวกราปรสิตจะอันตรายหรือไม่ บัดนี้พวกมันไม่มีอยู่อีกต่อไปแล้ว"
 distar.1016.a:0 "พวกเขากล้าดียังไงกัน!?"

 # The other side - a nation is attempting to get access to the gateways. An anomaly on a planet in a gateway system. They were preparing to launch an attack through the gateway, and had been attempting to reopen the network.

 # Azizians
 distar.1080.d:0 "สกัดและจัดเก็บตัวอย่างดีเอ็นเอเพื่อใช้ในภายภาคหน้า"
 distar.1085.name:0 "สิ่งมีชีวิตต่างดาวในน้ำแข็ง"
 distar.1085.desc:0 "สืบเนื่องจากความก้าวหน้าล่าสุดของเราในสาขาการโคลนนิ่ง นักวิทยาศาสตร์ของเราได้นำตัวอย่างดีเอ็นเอของสิ่งมีชีวิตต่างดาวที่สกัดมาจากร่างแช่แข็งในก้อนน้ำแข็งซึ่งคาดว่าสูญพันธุ์ไปแล้วออกมาจากคลังจัดเก็บ การกู้คืนสิ่งมีชีวิตลึกลับนี้กลับมามีชีวิตอีกครั้งเป็นความฝันอันยาวนานของแผนก ซึ่งตอนนี้ได้รับการทำให้เป็นจริงได้ผ่านปาฏิหาริย์ทางวิทยาศาสตร์"
 distar.1085.a:0 "อนุมัติคำสั่งดำเนินการได้เลย"
 distar.1085.b:0 "พวกเขาจะไม่ได้รับอนุญาตให้ทำเช่นนั้นเด็ดขาด"

 DISTAR_NANOCITY_CAT:0 "โครงสร้างผลึกโลหะ"
 DISTAR_NANOCITY_CAT_DESC:0 "ภูมิประเทศของ [From.GetName] ถูกครอบคลุมไปด้วยสิ่งที่ดูจากวงโคจรคล้ายกับผลึกโลหะสีเงินที่มีมิติไม่เคยพบเห็นมาก่อน จากระดับวงโคจร พวกมันดูคล้ายกับตึกระฟ้าอย่างน่าขนลุก สมควรเข้าทำการศึกษาเรียนรูอย่างใกล้ชิด"
 DISTAR_NANOSAND_CAT:0 "ทรายเมทัลลิก"
 DISTAR_NANOSAND_CAT_DESC:0 "สแกนเนอร์ระบุว่าเป็นทรายทรายของ[From.GetName]ประกอบด้วยโลหะหายากเกือบทั้งหมด บาง ที อาจ มี การ สกัด ทรัพยากร อัน มี ค่า บาง อย่าง ออก จาก ทรัพยากร เหล่า นั้น ได้."
 DISTAR_MEDGAS_CAT:0 "แกนแข็ง"
 DISTAR_MEDGAS_CAT_DESC:0 "แม้จะมีการคาดการณ์[From.GetName]มีแกนแข็งขนาดใหญ่โดยเฉพาะอย่างยิ่งภายใต้ ปกคลุมหนาไม่น่าเชื่อของ ก๊าซที่ไม่ซ้ํากัน นักวิทยาศาสตร์ของเราแนะนําการสืบสวนเพิ่มเติม"
 KETLING_PROJECT_6:0 "ศึกษา $NAME_Ketlings$ ที่ §Y[ratling_planet_6.GetName]§!"
 KETLING_PROJECT_6_DESC:1 "สิ่งมีชีวิตที่แข็งแรงได้ปรากฏขึ้นจากกองเศษบน§Y[ratling_planet_6.GetName]§!นักวิทยาศาสตร์ของเรากําลังสงสัยว่า มนุษย์ต่างดาวเหล่านี้มีชื่อ$NAME_Ketlings$เป็นลูกหลานของอารยธรรมที่ท่องอวกาศ ที่เคยครอบคลุมระบบเหล่านี้\n\nเราสามารถที่จะเลือกดาวเคราะห์ใด ๆ ที่อาศัยอยู่โดยอัตโนมัติ$NAME_Ketlings$เพื่อนําการศึกษานี้"

 distar.242.desc.jump:0 "เดอะ[Root.GetName]ได้พบกับการดํารงอยู่ขนาดใหญ่ของพลังงานบริสุทธิ์ใน[From.GetName] ระบบดาวพลังของไซโอนิคที่เกิดขึ้นได้จริง หน่วยงานนี้ควรจะถูกเข้าหาเท่านั้น\n\nน่าเบื่อ,[From.GetName]ระบบของตัวเองดูเหมือนจะไม่มีการเชื่อมต่อใดๆ กับเครือข่ายไฮเปอร์เลน การปรากฏตัวขององค์กรนี้ ได้ตัดการเชื่อมต่อไฮเปอร์เลนน์ของระบบ หรือ สับสเปซที่ไม่คาดฝัน กับดักมันไว้ที่นี่ไม่ทราบสาเหตุ\n\nอย่าง ไร ก็ ตาม มี เรื่อง หนึ่ง ที่ ทราบ กัน ว่า เรา กําลัง รับ สัญญาณ ซ้ํา ๆ ใน ระบบ นี้ ซึ่ง มา จาก[tanker_planet.GetName]- ถึงแม้ว่าเราอาจจําเป็นต้องจัดการกับองค์กร ก่อนที่เราจะเข้าถึงมัน"
 distar.275.name:0 "คริสตัล ไน ไนท์"
 distar.275.desc.comms:1 "การ วิเคราะห์ ผลึก โลหะ ขนาด มหึมา ที่ มี ราย ละเอียด[From.GetName]ทิวทัศน์ได้ท้าทายความคาดหวัง เจ้าหน้าที่วิทยาศาสตร์[Root.GetLeaderName]มี ความ ตื่น เต้น ที่ จะ เผย ให้ เห็น ว่า ผลึก ขนาด ใหญ่ เหล่า นี้ จริง ๆ แล้ว ประกอบ ด้วย หลาย ล้าน ล้าน แผ่น บน นิ ว ตัน ที่ ไม่ ได้ ทํา งาน!\n\nโครงสร้างโมเลกุลของพวกเขาไม่ตรงกับ นาโนเทคโนโลยีของจักรวรรดิที่รู้จักกัน ทําให้จุดเริ่มของพวกเขาไม่แน่นอน พวก เขา อาจ ถูก ฝัง บน ดาว เคราะห์ นี้ โดย นัก ท่อง อวกาศ ที่ ไม่ รู้ จัก บาง คน เพื่อ จุด ประสงค์ ที่ ไม่ รู้ จัก.\n\nตราบเท่าที่[Root.GetLeaderName]บอกได้ว่า นาไนท์ประกอบตัวเอง เข้าเป็น แว่นคริสตัลแบบสมบูรณ์ และเลียนแบบ จนกระทั้งจุด ขณะ ที่ ผลึก ที่ พวก เขา สร้าง ขึ้น นั้น เป็น สิ่ง ที่ คล้าย กับ อาคาร ต่าง ๆ จริง ๆ แต่ ทั้ง หมด ประกอบ กัน เป็น แบบ เดียว กัน และ ไม่ อาจ บรรลุ จุด มุ่ง หมาย เช่น นั้น ได้."
 distar.275.desc.nocomms:1 "การ วิเคราะห์ ผลึก โลหะ ขนาด มหึมา ที่ มี ราย ละเอียด[From.GetName]ทิวทัศน์ได้ท้าทายความคาดหวัง เจ้าหน้าที่วิทยาศาสตร์[Root.GetLeaderName]มี ความ ตื่น เต้น ที่ จะ เผย ให้ เห็น ว่า ผลึก ขนาด ใหญ่ เหล่า นี้ จริง ๆ แล้ว ประกอบ ด้วย หลาย ล้าน ล้าน แผ่น บน นิ ว ตัน ที่ ไม่ ได้ ทํา งาน!\n\nไม่มีหลักฐาน[From.GetName]มีบรรยากาศที่หนาพอที่จะช่วยชีวิต อย่างที่เรารู้ในอดีต พวก นาไนท์ อาจ ถูก วาง ไว้ บน ดาว เคราะห์ นี้ โดย นัก ท่อง เที่ยว บาง คน ที่ ไม่ รู้ จัก เพื่อ จุด ประสงค์ ที่ ไม่ รู้ จัก.\n\nตราบเท่าที่[Root.GetLeaderName]บอกได้ว่า นาไนท์ประกอบตัวเอง เข้าเป็น แว่นคริสตัลแบบสมบูรณ์ และเลียนแบบ จนกระทั้งจุด ขณะ ที่ ผลึก ที่ พวก เขา สร้าง ขึ้น นั้น เป็น สิ่ง ที่ คล้าย กับ อาคาร ต่าง ๆ จริง ๆ แต่ ทั้ง หมด ประกอบ กัน เป็น แบบ เดียว กัน และ ไม่ อาจ บรรลุ จุด มุ่ง หมาย เช่น นั้น ได้."
 distar.280.name:0 "นา โน สัน"
 distar.280.desc:0 "เดอะ[Root.GetName]ได้รายงานว่าพบวัตถุที่ไม่มีใครคาดคิด[From.GetName]เนิน ทราย ที่ อุดม สมบูรณ์ บน ดาว เคราะห์ นี้ ไม่ เพียง แต่ ประกอบ ด้วย โลหะ ที่ หา ยาก เท่า นั้น แต่ ทราย ก็ ยัง ประกอบ ด้วย นาไนท์ ที่ แตก หัก นับ ไม่ ถ้วน!\n\nเครื่องจักรขนาดจิ๋วเหล่านี้มีอายุเป็นล้านปี โครงสร้างของพวกเขาเสื่อมโทรม ไกลเกินโอกาส ในขณะที่เราไม่สามารถกําหนดแหล่งกําเนิด ของเครื่องจักรนาโนเหล่านี้ แต่สังคมที่สร้างขึ้น\n\n[Owner.GetScientistCapital] [Root.GetName]สมมุติฐานว่านาไนท์อาจถูกใช้เพื่อปั้นผิว[From.GetName]หลายล้านปีมาแล้ว"
 distar.285.name:0 "สถานพยาบาลโบราณ"
 distar.285.desc:0 "ข่าวอันน่าตื่นตะลึงจากยาน [Root.GetName]: การสแกนในระดับลึกได้เผยให้เห็นว่าแกนกลางของแข็งที่มีขนาดใหญ่เกินคาดของ [From.GetName] ถูกปกคลุมไปด้วยเศษซากที่ถูกบีบอัดของสถานพยาบาลโบราณขนาดมหึมาที่มีอายุนับล้านปี!\n\nแม้ว่าแรงกดดันของเนื้อโลกอันรุนแรงของดาวแก๊สยักษ์ดวงนี้จะจำกัดปริมาณข้อมูลที่เราสามารถกู้คืนได้จากพื้นผิวแกนกลางอย่างมาก ทว่า [Owner.GetScientistCapital] [Root.GetLeaderName] รายงานว่าโครงสร้างที่ซ่อนอยู่เหล่านั้นตรงกับเทคโนโลยีที่ใช้ในแอล-เกต H แอล-เกต ! ลึกลับอย่างไม่มีข้อกังขา\n\nมีความเป็นไปได้ที่ [From.GetName] จะเคยเป็นสถานพยาบาลระดับดาวเคราะห์ที่สร้างขึ้นโดยผู้สร้างเกต(ช่างสร้าง)เมื่อหลายพันปีก่อน ณ จุดหนึ่งสถานพยาบาลนี้ได้ถูกทิ้งร้าง และเครื่องจำลองแก๊สอัตโนมัติของมันก็ทำงานโดยไม่มีการควบคุมมานานหลายศตวรรษ ส่งผลให้ดาวเคราะห์กลายเป็นดาวแก๊สยักษ์ไปทีละน้อย"

 distar.9000.lcluster_clue_sonic:0 "เกิดความก้าวหน้าครั้งสำคัญขึ้นภายในชุมชนวิทยาศาสตร์ของชาว [Root.GetSpeciesAdj] เกี่ยวกับสัญญาณคลื่นเสียงนอกแกแล็กซี่ที่ยานวิทยาศาสตร์ของเราเพิ่งวิเคราะห์ไป\n\nแม้ว่าความหมายทั้งหมดของสมการคลื่นเสียงที่ฝังอยู่ในสัญญาณจะยังคงอยู่นอกเหนือความเข้าใจของเรา แต่นักวิทยาศาสตร์ [Root.GetScientistPlural] ชาว [Root.GetSpeciesAdj] บนโลกบ้านเกิดของเราสามารถจับคู่ข้อมูลการส่งสัญญาณเกี่ยวกับซับสเปซฮาร์มอนิกได้มากพอที่จะเชื่อมโยงกับเทคโนโลยีที่สังเกตพบใน H แอล-เกต ! ลึกลับ!\n\nหากตรวจสอบโดยลำพัง สัญญาณนี้ก็แทบจะไม่มีประโยชน์เพิ่มเติมแก่เราอีก ทว่าการวิเคราะห์ร่วมกับเบาะแสอื่น ๆ เกี่ยวกับผู้สร้างเกตเวย์โบราณ(เกตเวย์ผู้สร้าง)อาจให้ข้อมูลอันมีค่าเกี่ยวกับวิธีการเปิดใช้งานแอล-เกตเหล่านี้อีกครั้ง"

