 distar.5072.d:0 "ยกเลิกกระบวนการยกระดับด้วยตนเอง"
 distar.5072.d.response:0 "$distar.5072.desc$"
 distar.5072.e:0 "ส่งทีมวิศวกรเข้าไป"
 distar.5072.e.response:0 "$distar.5072.desc$"
 distar.5073.name:0 "ซ่อมแซมเสร็จสิ้น"
 distar.5073.desc:0 "ทีมวิศวกรของเราได้ทำให้ระบบของ BALDOR XXXIII กลับมาเสถียรอีกครั้ง กระบวนการยกระดับกลับเข้าสู่เส้นทางที่วางไว้ และประชาชนของเราจำต้องกลับไปสู่การนอนหลับตามปกติด้วยความลังเลเล็กน้อย การเรียนรู้ขณะหลับเริ่มแสดงผลลัพธ์ที่น่าพึงพอใจแล้ว โดยพลเมืองหันมาให้ความสนใจในด้านวิทยาศาสตร์เพิ่มมากขึ้นอย่างเห็นได้ชัด"
 distar.5074.name:0 "ได้รับการยกระดับบางส่วน"
 distar.5074.desc:0 "กระบวนการยกระดับเสร็จสิ้นแล้ว แต่เรากลับยังไม่ได้รับการยกระดับที่แท้จริง เนื่องจากระบบการทำงานที่เสื่อมถอยลงอย่างรวดเร็วของ BALDOR XXXIII แม้ว่าประชากรส่วนใหญ่จะยังต้องทนทุกข์ทรมานจากอาการฝันร้ายรุนแรงในตอนกลางคืน แต่กระบวนการเรียนรู้ขณะหลับดูเหมือนจะได้ผลลัพธ์ที่ดีอยู่บ้าง เนื่องจากในตอนนี้พวกเขามีความสามารถสูงขึ้นอย่างไม่เคยมีมาก่อนในการวิจัยทางวิทยาศาสตร์และการเรียนรู้ ส่วนกลุ่มพลเมืองผู้โชคร้ายที่ตกอยู่ในภาวะผักนั้น สถานการณ์เลวร้ายยิ่งกว่า... แม้ว่าส่วนใหญ่จะฟื้นคืนสติกลับมาได้ แต่จิตใจของพวกเขากลับแตกสลายภายใต้ความกดดันอันหนักหน่วง\n\nมันอาจจะไม่ใช่การยกระดับที่สมบูรณ์แบบ แต่อย่างน้อยมันก็เป็น... บางอย่างล่ะนะ"
 distar.5074.a:0 "มันอาจจะเลวร้ายได้มากกว่านี้เสียอีก"
 distar.5078.name:0 "การยกระดับปริศนาถูกยุติลง"
 distar.5078.desc:0 "ท่ามกลางผลกระทบอันปั่นป่วนจากการสูญเสีย [FromFromFrom.GetName] ให้แก่กองกำลังผู้รุกรานชาว [From.GetSpeciesName] ทำให้ BALDOR XXXIII สลายหายไปจากมิติ และกระบวนการยกระดับประชาชนของเราถูกยุติลงในทันที เราเชื่อว่าวัตถุต่างดาวรูปทรงกระบอกยาวซึ่งอยู่ในสภาพย่ำแย่อยู่แล้ว ได้รับความเสียหายอย่างหนักต่อฟังก์ชันการทำงานหลักจากการถูกลูกหลงจากการระดมยิงของศัตรูโดยอุบัติเหตุ ในตอนที่มันกำลังจะจากไป มันได้ส่งสัญญาณขอความช่วยเหลือสุดท้ายออกมาว่า \"ข้าคือ BALDOXXXX\""
 distar.5078.a:0 "พวก [From.GetSpeciesName] จะต้องชดใช้"
 trait_enigmatic_intelligence_poor:0 "ได้รับการยกระดับบางส่วน"
 trait_enigmatic_intelligence_poor_desc:1 "เผ่าพันธุ์นี้ได้รับการยกระดับขึ้นเพียงบางส่วนโดยสติปัญญาต่างแกแล็กซี่ผู้โอบอ้อมอารี และทิ้งรอยเท้าดั้งเดิมก่อนมีสติปัญญาบางส่วนไว้เบื้องหลัง"
 trait_enigmatic_intelligence_failed:0 "ไม่ได้รับการยกระดับ"
 trait_enigmatic_intelligence_failed_desc:0 "เผ่าพันธุ์นี้ต้องเผชิญกับผลลัพธ์อันน่าสลดใจของกระบวนการยกระดับที่เกิดความผิดพลาด"
 trait_enigmatic_intelligence:0 "ได้รับการยกระดับ"
 trait_enigmatic_intelligence_desc:1 "เผ่าพันธุ์นี้ได้รับการยกระดับอย่างสมบูรณ์โดยสติปัญญาต่างแกแล็กซี่ผู้โอบอ้อมอารี และก้าวข้ามผ่านต้นกำเนิดดั้งเดิมก่อนมีสติปัญญาของมันไปแล้ว"
 ENIGMATIC_UPLIFTING:0 "การยกระดับปริศนา(ความไม่เสมอภาค)"
 ENIGMATIV_UPLIFTING_DESC:1 "วัตถุต่างดาวลึกลับ BALDOR XXXIII อ้างว่ามันสามารถยกระดับประชาชนของเราได้โดยใช้กระบวนการเรียนรู้ขณะหลับ(hypnopedia)นักวิจัยของเราจะต้องเฝ้าสังเกตกระบวนการนี้อย่างใกล้ชิด"
 ENIGMATIC_UPLIFTING_DESC:0 "$ENIGMATIV_UPLIFTING_DESC$"
 ENIGMATIC_REPAIR:0 "กำลังซ่อม BALDOR XXXIII"
 ENIGMATIC_REPAIR_DESC:1 "กระบวนการยกระดับของเรากำลังเผชิญหน้ากับความอันตรายเนื่องจากปัญหาระบบฮาร์ดแวร์ขัดข้องขั้นวิกฤตในบัลดอร์ XXXIIIIIIII.วัตถุดังกล่าวจำเป็นต้องได้รับการซ่อมแซมโดยด่วน"
 enigmatic_fatigue:0 "เหนื่อยล้า"
 enigmatic_fatigue_desc:0 "ประชากรของเราได้รับผลกระทบจากความอ่อนล้าเนื่องจากกระบวนการเรียนรู้ขณะหลับ"
 enigmatic_sadness:0 "ความไม่รู้คือความสุข"
 enigmatic_sadness_desc:0 "ประชากรของเรากำลังปรับตัวเข้ากับผลข้างเคียงของระดับสติปัญญาที่สูงกว่าค่าเฉลี่ย"
 enigmatic_madness:0 "ระบบระบบ PTSD"
 enigmatic_madness_desc:0 "ประชากรกลุ่มนี้ยังคงทนทุกข์จากการตามหลอกหลอนของฝันร้ายที่ตกค้างมาจากกระบวนการยกระดับที่ล้มเหลว"
 enigmatic_slumber:0 "ผัก"
 enigmatic_slumber_desc:0 "ประชากรกลุ่มนี้ติดอยู่ในอาการโคม่าจากการถูกเหนี่ยวนำด้วยการเรียนรู้ขณะหลับ"

 SUPERFLARE_PROJECT:0 "เกราะป้องกันซูเปอร์แฟลร์"
 SUPERFLARE_PROJECT_DESC:0 "เซนเซอร์บน [Root.GetName] บ่งชี้ว่าดาวฤกษ์ [From.GetStarName] กำลังเตรียมการสำหรับการระดมรังสีซูเปอร์แฟลร์(เสียงไฟ)อีกครั้ง ซึ่งไม่ต่างจากครั้งที่เคยทำลายล้างอารยธรรมโบราณบน [From.From.GetName] ไป เราจำเป็นต้องหาวิธีป้องกันอาณานิคมของเราก่อนการปะทุของแฟลร์จะเริ่มขึ้น"

 PRIMITIVE_ROBOT_PROJECT:0 "ผู้สร้างที่สาบสูญ"
 PRIMITIVE_ROBOT_PROJECT_DESC:0 "นักวิจัยกำลังงุนงงเนื่องจากไม่มีเบาะแสใดอธิบายถึงการหายตัวไปของอารยธรรมโบราณบน [From.GetName] ได้เลย พวกเขาเสนอให้วิเคราะห์ฮาร์ดแวร์ของหุ่นยนต์โบราณที่พวกมันทิ้งไว้เบื้องหลังอย่างละเอียดมากขึ้น เพื่อพยายามไขความลับของปริศนานี้\n\nรางวัล: £society£ §Gงานวิจัยด้านสังคมศาสตร์(โซไซตี้)การวิจัย)§!"

 RETROVIRUS_PROJECT:0 "พฤติกรรมแปรปรวนบนพื้นผิวดาว"
 RETROVIRUS_PROJECT_DESC:0 "ความไม่สงบและการขัดขืนของประชาชนที่ไม่สามารถอธิบายได้กำลังแพร่กระจายไปทั่ว [From.GetName] ผู้อยู่อาศัยในอาณานิคมแสดงพฤติกรรมแปลก ๆ และแปรปรวน ซึ่งมักจะเริ่มต้นขึ้นด้วยความสับสนทั่วไป และทวีความรุนแรงขึ้นเมื่อเวลาผ่านไปจนกลายเป็นความตื่นตระหนกและความรุนแรงขั้นสุด เราต้องค้นหาสาเหตุของพฤติกรรมนี้ก่อนที่สถานการณ์จะบานปลายเกินการควบคุม"

 DARK_FLOW_PROJECT:0 "ความผิดปกติของแรงดึงดูด(สถิติความปกติ)"
 DARK_FLOW_PROJECT_DESC:0 "ตรวจพบแรงดึงดูดที่ขัดต่อทฤษฎีในระบบดาว [from.GetStarName] มันคงต้องมีบางสิ่งบางอย่างกำลังรบกวนเซนเซอร์ของเราอยู่เป็นแน่"

 DISSECTION_PROJECT:0 "การชำแหละสเปซอะมีบา"
 DISSECTION_PROJECT_DESC:0 "เราตัดสินใจที่จะแยกเอาข้อมูลทางชีวภาพของสเปซอะมีบาวัยอ่อนที่หลงทางมาโดยการปลิดชีพมัน เราจะส่งกองกำลังเฉพาะกิจเพื่อจับสิ่งมีชีวิตนี้และทำการชำแหละซากศพของมัน"

 CRYO_CLONES_PROJECT:0 "โคลนเยือกแข็งในริงเวิลด์"
 CRYO_CLONES_PROJECT_DESC:0 "มีร่างโคลนที่มีชีวิตอยู่จำนวนหลายร้อยร่างถูกแช่แข็งอยู่ในห้องจำศีล(ห้องถอดรหัส)บนซากริงเวิลด์(เพลง ริงเวิลด์)ร้างรอบ [From.GetName] แทนที่จะปล่อยให้พวกมันค่อย ๆ ล้มตายลงไปเหมือนสหายเก่า นักชีววิทยาของเราเสนอให้ทำละลายพวกมันกลับมาปฏิบัติหน้าที่"

 RECOVER_WARFORM_PROJECT:0 "กู้คืนยานรบที่กำลังผุกร่อน"
 RECOVER_WARFORM_PROJECT_DESC:0 "พบยานรบหุ่นยนต์ที่ระบบปิดการทำงานอยู่บน [From.GetName] ซึ่งมันกำลังถูกละลายอย่างช้า ๆ ด้วยชั้นบรรยากาศที่เป็นพิษของดาวเคราะห์ดวงนี้ เราควรพยายามกู้คืนมันขึ้นมาก่อนที่มันจะพังเสียหายจนไม่สามารถซ่อมแซมได้อีกเลย"

 BRAINSLUG_PROJECT:0 "การศึกษาสิ่งมีชีวิตประสาทร่วมอาศัย"
 BRAINSLUG_PROJECT_DESC:0 "ความสัมพันธ์แบบร่วมอาศัย (symbiosis) ระหว่างสัตว์เลื้อยคลานโบราณและสิ่งมีชีวิตคล้ายทากที่ยึดติดอยู่กับก้านสมองของโฮสต์ เคยเจริญรุ่งเรืองมาก่อนบนพื้นผิวของ [From.GetName] ซึ่งเปลี่ยนให้สัตว์เลื้อยคลานป่าเถื่อนกลายเป็นสิ่งมีชีวิตมีสติปัญญาที่สามารถใช้งานเครื่องมือต่าง ๆ ได้ แต่ทว่ามีบางสิ่งบางอย่างเกิดขึ้นทำให้สิ่งมีชีวิตเหล่ายุติความสัมพันธ์ร่วมอาศัยลง และสัตว์เลื้อยคลานโฮสต์ก็เสื่อมถอยกลับไปเป็นเพียงแค่สัตว์เดรัจฉาน\n\nนักวิทยาศาสตร์ของเราต้องการศึกษาทากประสาท (neural slugs) ที่ยังสามารถพบบนดาวดวงนี้อย่างละเอียดมากขึ้น เพื่อทำความเข้าใจประวัติศาสตร์ของอารยธรรมที่สาบสูญซึ่งพวกมันสร้างขึ้นมาร่วมกัน"

 KETLING_PROJECT_1:0 "ศึกษา $NAME_Ketlings$ ที่ §Y[ratling_capital.GetName]§!"
 KETLING_PROJECT_1_DESC:1 "สิ่งมีชีวิตมีสติปัญญาได้ปรากฏตัวขึ้นมาจากกองเศษซากปรักหักพังบนดาว §Y[ratling_capital.GetName]§! นักวิทยาศาสตร์ของเราอยากรู้อยากเห็นว่าพวกต่างดาวที่ถูกขนานนามว่า $NAME_Ketlings$ เหล่านี้ คือผู้สืบสันดานจากอารยธรรมท่องอวกาศที่เคยแผ่ขยายปกคลุมระบบดาวเหล่านี้ในอดีต หรือพวกมันจะมีต้นกำเนิดอื่นทั้งหมดอย่างสิ้นเชิง\n\nเราสามารถเลือกดาวเคราะห์ดวงใดก็ได้ที่มีชาว $NAME_Ketlings$ ปกครองตนเองอาศัยอยู่ เพื่อเป็นสถานที่ดำเนินงานวิจัยครั้งนี้"
