 ### Trojan Asteroid ###
 distar.3000.name:0 "เครื่องจักรภายใน"
 distar.3000.desc:0 "เป็นไปตามที่คาดไว้ ดาวเคราะห์น้อย [From.GetName] มีมวลโลหะขนาดใหญ่อยู่ข้างใน และซ่อนเครื่องจักรกลบางชนิดไว้จริง ๆ\n\nข้อมูลที่รวบรวมได้แสดงให้เห็นอย่างชัดเจนว่าส่วนประกอบต่าง ๆ ของมันมีพลังงานสะสมอยู่เป็นจำนวนมาก แต่วัตถุประสงค์ของมันยังคงเป็นปริศนา"
 distar.3000.a:0 "ดำเนินการอย่างระมัดระวัง"
 distar.3000.a.tooltip:0 "ค่อย ๆ ขุดค้นดาวเคราะห์น้อยอย่างนุ่มนวล"
 distar.3000.b:0 "ส่งยานสำรวจตรวจสอบ"
 distar.3000.b.tooltip:0 "ส่งหัวเจาะตรวจเพื่อเก็บตัวอย่างกลับมา"
 distar.3001.desc:0 "ความระมัดระวังนั้นเป็นเรื่องที่ถูกต้องแล้ว สิ่งที่ซ่อนอยู่ภายใน [trojan_asteroid.GetName] คือฝูงโดรนขุดเหมืองรุ่นเก่าที่ถูกโปรแกรมให้เข้าโจมตีทันทีเมื่อพบเห็น\n\nโชคดีที่เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ตรวจพบเรื่องนี้ได้ล่วงหน้า และสามารถรบกวนเซนเซอร์ของโดรนได้นานพอที่จะปิดการทำงานของพวกมัน\n\nแกนของโดรนเหล่านี้เก่ามากจริง ๆ แต่ยังคงเก็บกักพลังงานจำนวนมหาศาลไว้ให้เราสูบนำมาใช้งานได้"
 distar.3002.desc:0 "การส่งหัวเจาะตรวจอย่างรุนแรงของ [Root.GetName] นำมาซึ่งโชคร้าย ภายในดาวเคราะห์น้อยมีโดรนขุดเหมืองเก่าแก่ซ่อนอยู่ ซึ่งถูกโปรแกรมให้โจมตีทันทีเมื่อพบเห็น\n\nโดรนตรวจพบการปรากฏตัวของ [Root.GetName] และเริ่มตื่นตัวขึ้นแล้ว\n\nอาจจะยังมีเวลาเหลือพอสำหรับการหลบหลีก หากยาน [Root.GetName] ดำเนินการอย่างรวดเร็ว"
 distar.3003.desc:0 "ข่าวคราวเกี่ยวกับเหตุการณ์ที่เกี่ยวข้องกับดาวเคราะห์น้อย [trojan_asteroid.GetName] แพร่สะพัดไปถึงเครือข่ายของดาว [Root.Capital.GetName] ชุมชนวิทยาศาสตร์แสดงความสนใจอย่างยิ่ง โดยตั้งคำถามว่าทำไมโดรนจึงถูกนำไปเก็บไว้ในดาวเคราะห์น้อยตั้งแต่แรก\n\nพวกมันกำลังเฝ้าปกป้องอะไรบางอย่างอยู่หรือเปล่านะ?"
 distar.3005.desc:0 "เป็นไปตามสมมติฐานของชุมชนวิทยาศาสตร์บน [Root.Owner.Capital.GetName] โดรนที่พบในดาวเคราะห์น้อย [trojan_asteroid.GetName] ซ่อนอะไรบางอย่างไว้จริง ๆ\n\nความพยายามอันกล้าหาญของลูกเรือ [Root.GetName] ได้ขุดพบแหล่งแร่ธาตุที่อุดมสมบูรณ์ในแกนกลางของดาวเคราะห์น้อย ซึ่งก่อนหน้านี้ถูกบดบังไว้ด้วยการปรากฏตัวของโดรนเหล่านั้น"

 ### Impossible Organism ###
 distar.3010.desc:1 "สัญญาณชีวิตที่น่าประหลาดใจจาก [impossible_organism_planet.GetName] ได้รับการยืนยันแล้วว่าเป็นสิ่งมีชีวิตขนาดเล็กที่มีความทรหดอดทนเป็นเลิศ ลูกเรือของ [Root.GetName] ไม่แน่ใจว่าจะจำแนกประเภทสิ่งมีชีวิตนี้อย่างไรดี แต่ความสามารถในการเอาชีวิตรอดโดยปราศจากอาหารหรือสารอาหารใด ๆ ของมันนั้นน่าทึ่งอย่างแท้จริง เมื่อคำนึงถึงอายุของดาวเคราะห์ดวงนี้แล้ว จึงเป็นไปได้ที่สิ่งมีชีวิตนี้อาจจะต่อสู้กับสภาพแวดล้อมที่เป็นพิษมานานหลายพันปีแล้ว แม้ว่านี่จะเป็นเพียงการคาดเดาตามหลักวิชาการก็ตาม\n\nเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ได้ขออนุญาตเก็บกู้ตัวอย่างของสิ่งมีชีวิตที่ไม่รู้จักนี้เพื่อนำมาศึกษา"
 distar.3010.a:0 "ดีมาก เก็บตัวอย่างมันมา"
 distar.3010.b:0 "ไม่ ศึกษาเรียนรู้มันจากระยะไกลก็พอ"
 distar.3010.b.tooltip:0 "เพิ่มสถานะ §Yสิ่งมีชีวิตที่เป็นไปไม่ได้§! ให้แก่ [From.GetName]:\n£society£ §G+3§!"
 distar.3011.desc:0 "การศึกษาสิ่งมีชีวิตปริศนาดำเนินไปได้ด้วยดี ชุมชนวิทยาศาสตร์ตื่นตาตื่นใจกับศักยภาพในการเติบโตของมัน บัดนี้มันสามารถมองเห็นได้ด้วยตาเปล่าและตอบสนองต่อสิ่งเร้าแล้ว และดูเหมือนว่าจะสามารถดูดซับพลังงานและสารอาหารจากแทบทุกสิ่ง ไม่ว่าจะเป็นสารอินทรีย์หรือไม่ก็ตาม\n\nแต่น่าเสียดาย กระบวนการทางพันธุกรรม เซลล์ และชีวเคมีของมันยังคงอยู่เหนือความเข้าใจของเรา"
 distar.3011.a:1 "เราควรดำเนินการศึกษาเรียนรู้มันต่อไป"
 distar.3011.a.phobe:0 "น่ารังเกียจชะมัด! ลองเอาไม้ไปเขี่ยมันดูซิ..."
 distar.3011.b:0 "สิ่งมีชีวิตต่างดาวนี้อันตรายเกินไป"
 distar.3011.b.tooltip:0 "ยิงสิ่งมีชีวิตนี้ออกสู่อวกาศอันห่างไกล"

 distar.3012.name:0 "สิ่งมีชีวิตประเภทราที่เป็นไปไม่ได้"
 distar.3012.desc:0 "หลังจากการค้นพบครั้งสำคัญล่าสุด สิ่งมีชีวิตประหลาดนี้ก็ไม่ใช่วัตถุปริศนาอีกต่อไป! ชุมชนวิทยาศาสตร์บน [Root.Capital.GetName] ต่างพูดถึงข่าวนี้กันอย่างหนาหู\n\nสิ่งมีชีวิตนี้ได้รับการจำแนกประเภทให้อยู่ในกลุ่มฟันกอยด์(ฟุงลอยหรือสิ่งมีชีวิตประเภทรา) ซึ่งช่วยอธิบายความสามารถในการดูดซับโมเลกุลมาเป็นสารอาหารได้บางส่วน บัดนี้มันเติบโตขึ้นอย่างมากจนมีขนาดเท่ากับทารกแรกเกิดของชาว [Root.GetSpeciesName] และดูเหมือนจะเป็นสิ่งมีชีวิตที่อยากรู้อยากเห็นและมีสติปัญญา โชคดีที่มันยังไม่แสดงพฤติกรรมก้าวร้าวใด ๆ เลยจนถึงตอนนี้\n\nเหล่านักวิทยาศาสตร์เชื่อว่าขั้นตอนถัดไปคือการพยายามสื่อสารกับมัน แม้ว่าอาจจะต้องใช้เวลาหลายเดือนกว่าจะมีความคืบหน้าในเรื่องนี้ก็ตาม"
 distar.3012.a:1 "ดำเนินการพยายามสื่อสารต่อไป"
 distar.3012.a.tooltip:1 "ศึกษาเรียนรู้สิ่งมีชีวิตประเภทราต่อไป\n\nอาจใช้เวลาหลายเดือนกว่าจะมีรายงานความคืบหน้าเกิดขึ้น"
 distar.3012.b:1 "$distar.172.b$ ส่งตัวอย่างผ่านแอร์ล็อกออกไปซะ"
 distar.3012.b.tooltip:0 "ยิงสิ่งมีชีวิตประเภทราออกสู่อวกาศลึกซะ"

 distar.3013.name:0 "สิ่งมีชีวิตประเภทราที่เป็นไปไม่ได้: คำแรกที่เอ่ย"
 distar.3013.desc:0 "สิ่งมีชีวิตประเภทราขนาดเล็กเริ่มหัดส่งเสียงพูดคุยแล้ว!\n\nคำแรกที่มันเอ่ยออกมาคือเสียงทุ้มต่ำในลำคอว่า \"นิฟแลก\" (นิพนธ์)แม้จะฟังดูไม่รู้เรื่องแต่ก็พูดซ้ำไปซ้ำมาอย่างตั้งใจ นักวิทยาศาสตร์จึงตั้งชื่อให้มันด้วยความภาคภูมิใจว่า §Y$NAME_Nivlac$§! นับตั้งแต่นั้นมา ภาษาของมันพัฒนาขึ้นด้วยความเร็วที่น่าทึ่ง และในตอนนี้มันสามารถแสดงออกถึงอารมณ์หลักทั้งเจ็ดประการได้อย่างสัมฤทธิผล และมักจะแสดงพฤติกรรมนี้ต่อตัวอ่อนของมันเอง มันขยายพันธุ์โดยการแพร่สปอร์ตามธรรมชาติ และในไม่ช้าห้องทดลองก็จะไม่กว้างขวางพอที่จะรองรับพวกมันได้อีกต่อไป\n\nตัว $NAME_Nivlac$ ยังคงไม่แสดงอาการก้าวร้าวใด ๆ ออกมา"
 distar.3013.a.xenophile:0 "ช่างน่าทึ่งยิ่งนัก ชาว [Root.GetSpeciesName] ทุกคนควรมีไว้ครอบครองสักตัว!"
 distar.3013.a:0 "ยอดเยี่ยม อารยธรรม [Root.GetAdj] สามารถใช้ประโยชน์จากพวกมันได้"
 distar.3013.a.swarm:0 "ยอดเยี่ยม อารยธรรม [Root.GetAdj] สามารถใช้ประโยชน์จากพวกมัน... ในฐานะเหยื่อล่ออาหาร"
 distar.3013.a.serv:0 "สิ่งมีชีวิตอินทรีย์อันล้ำค่า พวกเราชาว [Root.GetSpeciesNamePlural] จะคอยปกป้องดูแลพวกเขาเอง"
 distar.3013.a.assi:0 "ยอดเยี่ยม พวกมันจะถูกดูดกลืนเข้ารวมระบบของเรา"
 distar.3013.a.assi.tooltip:0 "ประชากร §H$NAME_Nivlac$ป๊อป§! สูงสุดจำนวน §Y500§! £pop£ จะถูกสร้างขึ้นบนดาว [nivlac_joint_planet.GetName]"
 distar.3013.a.tooltip:2 "เติมเต็มบ้านว่างบนดาว [nivlac_joint_planet.GetName] ด้วยประชากร §H$NAME_Nivlac$ป๊อป§! £pop£"
 distar.3013.b:1 "พวกเขาควรจะมีบ้านของตนเอง"
 distar.3013.b.no_room.kill:0 "เราไม่มีพื้นที่ว่างแล้ว เผาทำลายพวกมันซะให้สิ้นเรื่องสิ้นราว"
 distar.3013.b.no_room.kill.tooltip:0 "ทำลายล้างสิ่งมีชีวิตประเภทราทิ้งซะ"
 distar.3013.b.tooltip:1 "นักวิทยาศาสตร์ของเราจะย้าย$NAME_Nivlacs$จากห้องทดลองไปยังดาวเคราะห์ที่เหมาะสมของตัวเอง\n\nคงต้องใช้เวลาสักพัก ก่อนที่พวกเราจะได้ความคืบหน้า"

 distar.3015.name:0 "สิ่งมีชีวิตที่เป็นไปไม่ได้: ชาว $NAME_Nivlac$"
 distar.3015.desc:0 "สิ่งมีชีวิตต่างดาวลึกลับที่เคยถูกค้นพบครั้งแรกบนดาวเคราะห์พิษ [impossible_organism_planet.GetName] และต่อมาถูกยิงส่งออกสู่อวกาศอันห่างไกลเนื่องจากได้รับการประเมินว่าเป็นภัยอันตรายเกินไป ดูเหมือนว่าจะร่อนลงสู่พื้นผิวดาว [nivlac_planet.GetName] ในเวลาต่อมา\n\nมันไม่เพียงแต่รอดชีวิตจากการตกกระแทกเท่านั้น แต่ยังสามารถสร้างถิ่นฐานในบ้านใหม่ของมันได้สำเร็จ มันเจริญรุ่งเรือง เติบโตขึ้น และแบ่งตัวขยายเป็นประชากรขนาดเล็ก จนกระทั่งกลายเป็นเผ่าพันธุ์ผู้พิชิตอวกาศได้ด้วยตนเอง\n\nพวกเขาเรียกตนเองว่า $NAME_Nivlac$ และน่าเสียดายที่ดูเหมือนว่าพวกมันยังจดจำการที่พวกเราเคยละทิ้งและไม่ใยดีต่อการอยู่รอดของพวกมันในอดีตได้ดี"

 distar.3016.name:0 "ชาว $NAME_Nivlac$"
 distar.3016.desc:1 "นักวิทยาศาสตร์ของเรายินดีที่จะรายงานว่าการย้ายถิ่นฐานของชาว $NAME_Nivlac$ ไปยังดาวเคราะห์ที่เหมาะสมประสบความสำเร็จอย่างงดงาม\n\nนับตั้งแต่ชาวฟันกอยด์วัยเยาว์มาถึงดาว [nivlac_planet.GetName] เห็นได้ชัดว่าการเจริญเติบโตอย่างรวดเร็วของมันยังคงดำเนินต่อไปอย่างต่อเนื่อง พวกมันตั้งตัวเป็นประชากรกลุ่มเล็ก ๆ และล่าสุดถึงขั้นพัฒนาเทคโนโลยี FTL (การเดินทางเหนือความเร็วแสง) ได้สำเร็จ โดยไม่ต้องสงสัยเลยว่าได้รับความช่วยเหลือจากเทคโนโลยีที่เราทิ้งไว้เบื้องหลัง\n\nเราจะเฝ้าจับตาดูการพัฒนาของพวกเขาต่อไปด้วยความกระตือรือร้น"

 distar.3017.name:0 "ชาว [Root.Owner.GetSpeciesName] และชาว $NAME_Nivlac$"
 distar.3017.desc:0 "การผสมรวมกลุ่มชาวฟันกอยด์ $NAME_Nivlac$ เข้าสู่อารยธรรม [Root.Owner.GetAdj] กำลังดำเนินงานอยู่\n\nการปฏิสัมพันธ์ระหว่างชาว $NAME_Nivlacs$ และชาว [Root.Owner.GetSpeciesNamePlural] ยังคงเป็นไปในเชิงบวก และดูเหมือนว่าเผ่าพันธุ์ของเราทั้งสองกำลังมุ่งหน้าไปในทิศทางที่สดใสร่วมกัน"
 distar.3017.desc.assim:0 "การกลืนกลายชาวฟันกอยด์ $NAME_Nivlac$ เข้าสู่อารยธรรม [Root.Owner.GetAdj] กำลังดำเนินการอยู่\n\nแม้ว่าชาว $NAME_Nivlac$ จะต่อต้านกระบวนการนี้ แต่ในท้ายที่สุด จิตสำนึกของพวกมันจะถูกหลอมรวมเข้ากับสังคมโดยรวมของ [Root.GetAdj] อย่างสมบูรณ์"
 distar.3017.a.tooltip:2 "เพิ่มประชากร §H$NAME_Nivlac$ป๊อป§! £pop£ ไปยังดาว [nivlac_joint_planet.GetName]"
 distar.3017.a.assi.tooltip:1 "เพิ่มประชากร §H$NAME_Nivlac$ป๊อป§! £pop£ ไปยังดาว [nivlac_joint_planet.GetName]"
 distar.3017.a.serv.tooltip:0 "ประชากร §H$NAME_Nivlac$ป๊อป§! £pop£ กำลังได้รับการดูแลเป็นพิเศษในวิหารพักพิงที่เพิ่งสร้างขึ้นใหม่บนดาว [nivlac_joint_planet.GetName]"

 ### Stranded Scientist ###
 distar.3020.name:0 "นักวิทยาศาสตร์ที่ติดเกาะอวกาศ"
 distar.3020.desc:2 "ซากยานบนดาวเคราะห์น้อย [From.GetName] คือเศษซากจากยานอวกาศของนักวิทยาศาสตร์ที่ติดค้างอยู่คือ [stranded_scientist_leader.GetName] โดยเธอระบุตัวตนว่ามาจากเผ่าพันธุ์ [stranded_scientist_species.GetName] ซึ่งไม่เคยเป็นที่รู้จักมาก่อน\n\nท่ามกลางซากยานเหล่านั้น เธอสามารถดิ้นรนติดต่อหาเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ซึ่งประจำการอยู่บนยาน [Root.GetName] ได้สำเร็จ และร้องขอให้ช่วยชีวิตเธอระบุว่าการชนเกิดจากเซนเซอร์การนำทางขัดข้อง และเธอติดอยู่บนดาวเคราะห์น้อยแห่งนี้มาหลายปีโดยไม่สามารถจากไปได้\n\nเธออ้างว่ามีความรู้ทางวิทยาศาสตร์อย่างหาตัวจับยาก และเธอจะเป็นบุคลากรที่มีค่าอย่างยิ่งสำหรับเรา โดยชี้ให้เห็นถึงความสามารถในการเอาชีวิตรอดของเธอเป็นหลักฐานพิสูจน์"
 distar.3020.a:0 "เธอยินดีเข้ามาร่วมอุดมการณ์เดียวกับเรา"
 distar.3020.a.tooltip:0 "§Y[stranded_scientist_leader.GetName]§! นักวิทยาศาสตร์ระดับ 6 $scientist_with_icon$ เข้าร่วมกับ [Root.Owner.GetName] และจะแบ่งปันความรู้ทางเทคโนโลยีของเธอให้แก่เรา"
 stranded_scientist_background: "พบ §Y[Root.GetName]§! ติดอยู่บนภูมิประเทศ [Root.GetHomeWorldBiome] §Y[Root.GetBackgroundPlanet]§!"
 distar.3020.b:0 "ไม่ ปล่อยเธอไว้ที่นั่นแหละ"
 distar.3020.b.tooltip:0 "[stranded_scientist_leader.GetName] ถูกปล่อยทิ้งไว้ตามชะตากรรมของเธอเอง"

 distar.3021.name:0 "การแบ่งปันความรู้"
 distar.3021.desc:0 "นักวิทยาศาสตร์คนใหม่ [stranded_scientist_leader_clone.GetName] ได้นำความรู้ทางเทคโนโลยีของเธอมาประยุกต์ใช้งานได้เป็นอย่างดี ข้อมูลความเข้าใจที่เธอแบ่งปันช่วยผลักดันงานวิจัยด้านฟิสิกส์ของเราไปสู่ระดับที่สูงขึ้น"
 distar.3021.a.tooltip:0 "งานวิจัยของเราเกี่ยวกับเทคโนโลยี §Yเทคโนโลยีฟิสิกส์ (Physics Technologies)§! £physics£ ได้รับการพัฒนาเพิ่มเติม"

 ### Molluscoid Miners ###
 distar.3030.name:0 "ชาวเหมืองมอลลัสคอยด์"
 distar.3030.desc:0 "การตรวจสอบอย่างใกล้ชิดบนดาว [molluscoid_miners_planet.GetName] แสดงให้เห็นว่าสิ่งปลูกสร้างที่ดูเหมือนกระท่อมนั้นเป็นที่อยู่อาศัยของสิ่งมีชีวิตจำพวกมอลลัสคอยด์(พึมพํา)กระท่อมเหล่านี้เป็นที่พักพิงอย่างหยาบ ๆ ที่สร้างขึ้นจากดินและสิ่งขับถ่ายคล้ายอุจจาระ\n\nชาวมอลลัสคอยด์ดูเหมือนจะมีระดับกึ่งมีสติปัญญา(สยาม)และมีระดับสติปัญญาที่จำกัด นอกเหนือจากการเอาชีวิตรอดแล้ว สังคมและชีวิตของพวกเขาจะหมุนวนอยู่กับการขุดหาแร่ธาตุต่าง ๆ ซึ่งจะถูกนำมาวางแสดงไว้ โดยดูเหมือนจะทำเพื่อยกระดับสถานะทางสังคมของผู้ที่ค้นพบ\n\nอย่างไรก็ตาม วิธีการตรวจค้นหาแร่ธาตุเหล่านี้ยังไม่แน่ชัด และเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] รู้สึกงุนงงอย่างมากต่อขีดความสามารถของพวกมันในการค้นพบแหล่งแร่ขนาดใหญ่\n\nแม้ว่าพวกมันจะมีระดับเทคโนโลยีที่ด้อยกว่า แต่การศึกษาชาวมอลลัสคอยด์เหล่านี้น่าจะช่วยส่งเสริมขีดความสามารถในการขุดทำเหมืองของเราได้ดี"
 distar.3030.a:0 "น่าสนใจยิ่งนัก ดำเนินการศึกษาพวกเขาเพิ่มเติมต่อไป"
 distar.3030.b:0 "ทำเหมืองแร่ธาตุของพวกมันซะ"

 distar.3031.desc:0 "ชาวมอลลัสคอยด์ที่อาศัยอยู่บนดาว [molluscoid_miners_planet.GetName] ใช้วิธีที่ประหลาดในการตรวจหาแร่ธาตุที่พวกเขาต้องการ\n\nดูเหมือนว่าผิวหนังของพวกเขาจะผลิตน้ำเมือกเจลาตินออกมาตามธรรมชาติ ซึ่งจะซึมลงสู่ดินที่เป็นรูพรุน ค่อย ๆ หยดต่ำลงไปเรื่อย ๆ ในขณะที่ยังคงเชื่อมต่ออยู่กับผิวหนังของพวกเขาเป็นเส้นสายยาว น้ำเมือกเหล่านี้จะเก็บตัวอย่างดินได้อย่างมีประสิทธิภาพและส่งข้อมูลความรู้สึกกลับไปยังตัวมอลลัสคอยด์ ตราบเท่าที่สายเมือกเหนียวเหล่านั้นไม่ขาดออกจากกัน ด้วยวิธีการนี้ พวกเขาจึงสามารถตรวจวาดแผนที่ใต้ดินพื้นที่ขนาดใหญ่ได้อย่างน่าทึ่งและระบุพิกัดสายแร่ได้ดี\n\nหากเราผสมรวมชาวมอลลัสคอยด์เข้าสู่สังคมของเรา หรือเพียงแค่ปรับปรุงกระบวนการผลิตของเราด้วยความรู้นี้ คาดว่ากิจการเหมืองแร่ของเราจะได้รับประโยชน์อย่างมหาศาล"
 distar.3031.a:0 "อนุมัติ เริ่มกระบวนการผสมรวมอารยธรรม"
 distar.3031.a.evopre: "ช่างหัวแร่ธาตุพวกนั้นเถอะ เก็บเกี่ยวดีเอ็นเอของพวกมันมา"
 distar.3031.b:0 "ใช่ เราจะนำองค์ความรู้นี้มาประยุกต์ใช้"
 distar.3031.c:0 "ไม่ ทำเหมืองบนดาวเคราะห์ของพวกมันซะ"

 distar.3032.name:0 "การผสมรวมชาวมอลลัสคอยด์"
 distar.3032.desc:0 "การผสมรวมชาวมอลลัสคอยด์เข้าสู่สังคม [Root.Owner.GetAdj] เสร็จสิ้นสมบูรณ์แล้ว\n\nเพื่อความสะดวกในการจัดการ พวกเขาได้รับชื่อว่า §Y[molluscoid_miners_species.GetName]§! ชาว [molluscoid_miners_species.GetName] มีความนอบน้อมเชื่อฟังและขยันขันแข็ง และเราสังเกตเห็นการเพิ่มขึ้นอย่างชัดเจนของผลผลิตแร่ธาตุของเราเรียบร้อยแล้ว"
 distar.3032.a.tooltip:1 "เพิ่มประชากร §H[molluscoid_miners_species.GetName]ป๊อป§! จำนวน §Y600§! £pop£ ไปยังดาว §Y[Root.Capital.GetName]§!"
 distar.3032.b:0 "พวกเขาอยู่ที่นี่แหละ... แถว ๆ ไหนสักแห่ง"
 distar.3032.b.tooltip:0 "เนื่องจากความหนาแน่นของประชากรที่สูงมากบน [Root.Capital.GetName] ทำให้สายพันธุ์ [molluscoid_miners_species.GetName] ไม่มีนัยสำคัญทางสถิติ และโชคร้ายที่ไม่มีบทบาทใด ๆ ต่อวิถีชีวิตพลเมืองส่วนใหญ่"

 distar.3033.name:0 "ระบบแผนที่แร่ธาตุ"
 distar.3033.desc:0 "ระบบที่ช่วยให้เราสามารถวาดแผนที่ภูมิประเทศใต้ดินและประเภทของแร่ธาตุที่เก็บกักอยู่ได้อย่างรวดเร็ว ได้รับการนำมาใช้งานแล้ว\n\nด้วยการวิเคราะห์การสะท้อนของแสงอาทิตย์และรังสีคอสมิกบางประเภทจากดาวเคราะห์ ซึ่งรังสีเหล่านี้ไม่สามารถทะลุทะลวงแร่ธาตุส่วนใหญ่ได้ เราจึงสามารถรวบรวมข้อมูลเกี่ยวกับองค์ประกอบแร่ธาตุในเปลือกโลกได้ สิ่งนี้ทำให้สามารถตรวจเอกซเรย์โครงสร้างของวัตถุเป้าหมายได้ ไม่ว่าจะเป็นดาวเคราะห์น้อยหรือส่วนหนึ่งของดาวเคราะห์ก็ตาม\n\nนักวิทยาศาสตร์ของเราขนานนามระบบนี้ว่า 'ระบบแผนที่แร่ธาตุ(เสียงพึมพํา)'ซึ่งน่าจะช่วยส่งเสริมผลผลิตแร่ของเราได้อย่างมีนัยสำคัญ"

 ### Alien Machine ###
 distar.3040.name:0 "เครื่องจักรต่างดาว"
 distar.3040.desc:0 "การสแกนเพิ่มเติมชี้ว่าเครื่องจักรนี้ยังคงทำงานได้อยู่ ทว่าวัตถุประสงค์การใช้งานของมันยังคงเป็นปริศนาโดยสิ้นเชิง\n\nเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ไม่เคยเห็นสิ่งใดที่เหมือนกับเครื่องนี้มาก่อน วัสดุบางชิ้นของมันดูคุ้นตา แต่ส่วนใหญ่นั้นประหลาดและเป็นของแปลกปลอมนอกอารยธรรมอย่างแท้จริง รวมถึงการออกแบบส่วนประกอบต่าง ๆ ด้วย\n\nเครื่องจักรนี้มีสิ่งที่ดูเหมือนคอนโซลควบคุม โดยมีชิ้นส่วนหนึ่งที่โดดเด่นสะดุดตาเป็นพิเศษ คือ คันโยกคดงอขนาดใหญ่ที่ทำจากวัสดุที่ไม่รู้จัก"
 distar.3040.a:0 "ดึงคันโยก"
 distar.3040.a.tooltip:0 "เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ทำการดึงคันโยกปริศนานั้น"
 distar.3040.b:0 "แยกส่วนมันออกซะ"
 distar.3040.b.tooltip:0 "เครื่องจักรถูกแยกส่วนชิ้นส่วน และเก็บกู้ส่วนประกอบต่าง ๆ กลับมาใช้งาน"

 distar.3041.name:0 "เครื่องจักรต่างดาว"
 distar.3041.desc:0 "ยังไม่แน่ชัดว่าเกิดอะไรขึ้นเมื่อมีการดึงคันโยกของเครื่องจักรกล\n\nคอนโซลควบคุมเกิดการกะพริบ สามารถสัมผัสได้ถึงแรงสั่นสะเทือนที่รุนแรง และจากนั้นคลื่นพลังงานก็พุ่งออกมาจากเครื่อง แผ่ขยายออกสู่อวกาศอันห่างไกล นักวิทยาศาสตร์ที่อยู่ใกล้เคียงสัมผัสได้ถึงคลื่นพลังงานที่พุ่งผ่านร่างกายพวกเขาไป แต่ไม่ได้รับรู้ถึงหลักฐานสัมผัสอื่นใดในระหว่างการพุ่งผ่านนั้น\n\nเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ไม่แน่ใจว่าจะสรุปผลจากเหตุการณ์นี้อย่างไร ตัวเครื่องจักรกลับคืนสู่สภาวะสงบนิ่งในทันทีหลังจากนั้น และไม่แผ่ค่าพลังงานใด ๆ ออกมาอีกต่อไป"
 distar.3041.a:0 "ช่างประหลาดแท้ ตอนนี้จงแยกส่วนมันออกซะ"
 distar.3041.b:0 "น่าสนใจยิ่งนัก วิจัยศึกษาเครื่องจักรนี้ต่อไป"
 distar.3041.b.tooltip:1 "เพิ่มสถานะ §Yเครื่องจักรต่างดาว§! ให้แก่ [asteroid_target.GetName]:\n£physics£ §G+7§!"

 distar.3042.name:0 "การปะทุของพลังงานกระทันหัน(กระแอม)"
 distar.3042.desc:2 "เมื่อนักวิทยาศาสตร์ของเราดึงคันโยก เครื่องจักรกลได้ปล่อยคลื่นพลังงานขนาดใหญ่ที่ทวีคูณเป็นระลอกคลื่นกระแทก บิดเบี้ยวและสั่นพ้องผ่านความว่างเปล่า ฉีกกระชากอวกาศเปิดรูหนอนขึ้นในระบบดาว §Y[system_one.GetName]§!\n\nหลังจากพลังงานตกค้างแพร่กระจายเจือจางลง รูหนอนและพื้นที่โดยรอบได้สงบตัวลงและในขณะนี้ดูเหมือนจะมีความเสถียรเพียงพอสำหรับการเดินทางผ่านได้อย่างปลอดภัย สำหรับสิ่งที่เฝ้ารอเราอยู่ที่อีกฝั่งหนึ่งนั้น นักวิทยาศาสตร์ของเรายังคงไม่แน่ใจนัก\n\nตัวเครื่องจักรได้กลับคืนสู่สถานะหยุดทำงานนับตั้งแต่นั้นมา และไม่ปล่อยสัญญาณผิดปกติใด ๆ อีกเลย"

 ### Orbital Speed Demon ###
 distar.3050.name:0 "ปีศาจความเร็ววงโคจร"
 distar.3050.desc:0 "ความพยายามในการสแกนวัตถุที่โคจรด้วยความเร็วสูงรอบ [From.GetName] ประสบความล้มเหลว วัตถุดังกล่าวเคลื่อนตัวลับขอบฟ้าของ [From.GetName] ไปอย่างรวดเร็ว และอุปกรณ์บนยาน [Root.GetName] ไม่สามารถติดตามความเคลื่อนไหวได้ทัน\n\nแม้ว่าแรงดึงดูดของ[From.GetName] จะรุนแรง แต่สิ่งนั้นเพียงอย่างเดียวไม่อาจใช้อธิบายโมเมนตัมที่สูงมากของวัตถุได้ ไม่ว่าจะเป็นตัววัตถุเองที่มีคุณสมบัติพิเศษบางประการ หรือมีปรากฏการณ์แรงดึงดูดบางอย่างทำงานอยู่ ณ ที่นี้\n\nความเร็วของวัตถุดูเหมือนจะเพิ่มขึ้นตามเวลา และเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] คาดว่ามันอาจจะถูกเหวี่ยงหลุดออกจากวงโคจรในไม่ช้า แม้ว่าจะไม่มีการแทรกแซงจากภายนอกก็ตาม"
 distar.3050.a:0 "พยายามชะลอความเร็วของมันลง"
 distar.3050.a.tooltip:0 "ส่งโดรนออกไปและพยายามยึดเกาะกับวัตถุเพื่อลดโมเมนตัมของมันลง"
 distar.3050.b:0 "พยายามหยุดมัน"
 distar.3050.b.tooltip:0 "ปล่อยเศษซากให้เข้าไปปะทะชนกับวัตถุ โดยหวังว่าจะช่วยหยุดวงโคจรของมันลงได้"
 distar.3050.c:0 "เคลื่อนถอยห่างออกมาจากมัน"
 distar.3050.c.tooltip:0 "เคลื่อนที่ออกจากแนวอันตรายและปล่อยให้วัตถุเป็นไปตามชะตากรรมของมันเอง"
 distar.3051.name:0 "หยุดปีศาจความเร็วสำเร็จ"
 distar.3051.desc:0 "โดรนสามารถเข้าสกัดกั้นทิศทางวงโคจรของวัตถุปริศนาได้สำเร็จ\n\nด้วยการยึดเกาะกับวัตถุและจากนั้นทำการจุดระเบิดขับเคลื่อนย้อนศรทีละน้อย ในที่สุดโดรนก็สามารถนำพามันกลับมายังยาน [Root.GetName] เพื่อเก็บกู้ได้สำเร็จ\n\nวัตถุดังกล่าวดูเหมือนจะเป็นกล่องบางชนิด ที่สร้างขึ้นจากวัสดุต่างดาว มีสันขอบคล้ายเส้นเลือดพาดผ่านไปตามแนวขอบข้าง ไปบรรจบกันที่ส่วนบนในกลไกรูปทรงกลม เราได้แต่คาดเดาถึงสิ่งที่อยู่ภายในกล่องนี้"
 distar.3051.desc.1:0 "เศษซากที่ปล่อยออกไปสามารถเข้าปะทะชนกับวัตถุลึกลับได้สำเร็จ ช่วยชะลอความเร็วลงก่อนจะผลักมันหลุดออกจากวงโคจร ยาน [Root.GetName] สามารถกู้คืนมันกลับมาได้ในเวลาไม่นานหลังจากนั้น\n\nวัตถุดังกล่าวดูเหมือนจะเป็นกล่องบางชนิด ที่สร้างขึ้นจากวัสดุต่างดาว มีสันขอบคล้ายเส้นเลือดพาดผ่านไปตามแนวขอบข้าง ไปบรรจบกันที่ส่วนบนในกลไกรูปทรงกลม เราได้แต่คาดเดาถึงสิ่งที่อยู่ภายในกล่องนี้"
 distar.3051.a:0 "เปิดมันออก"
 distar.3051.b:0 "ศึกษามัน"
 distar.3051.c:0 "กำจัดมันทิ้งไป"
 distar.3051.c.tooltip:0 "ยิงกล่องต่างดาวนี้ออกสู่อวกาศลึกซะ"
 distar.3052.name:0 "ปีศาจความเร็วหลุดลอยหายไป"
 #distar.3052.desc: "The drone successfully latched onto the unknown object, but the added mass of the drone and the change in trajectory soon caused both drone and object to be pulled out of orbit, tumbling into deep space at high speed."
 #distar.3052.desc.1: "The ejected debris successfully collided with the unknown object. Unfortunately, instead of reducing its velocity, the debris knocked the object out of orbit, tumbling into deep space at high speed."
 distar.3055.name:0 "เปิดกล่องต่างดาวสำเร็จ"
 distar.3055.desc:0 "ในที่สุด นักวิทยาศาสตร์ของเราก็สามารถเจาะผ่านวัสดุภายนอกของกล่องต่างดาวได้สำเร็จ\n\nกล่องนี้บรรจุหลอดแก้วขนาดเล็กสามหลอดที่บรรจุของเหลวอยู่ข้างใน โดยแบ่งเป็น สีแดง §Rแดง§!, สีน้ำเงิน §Bน้ําเงิน§!, และสีเขียว §Gสีเขียว§! ของเหลวเหล่านี้มีความเป็นต่างดาวน้อยกว่าตัวกล่องบรรจุ และนักวิทยาศาสตร์ของเราจำแนกพวกมันได้ว่าเป็นสารสื่อกลางในการปรับแต่งพันธุกรรมที่เตรียมไว้พร้อมใช้งานแล้ว\n\nด้วยเหตุผลบางประการที่อยู่นอกเหนือความเข้าใจของเรา สารละลายเหล่านี้กำลังเสื่อมสภาพอย่างรวดเร็วเมื่ออยู่นอกกล่องบรรจุต่างดาว แต่คาดว่าน่าจะมีเวลาเพียงพอสำหรับการสังเคราะห์และนำสารตัวใดตัวหนึ่งมาใช้กับเผ่าพันธุ์ของเรา ได้รับการยืนยันแล้วว่าผลกระทบของมันจะเป็นไปในเชิงบวก แต่รายละเอียดว่าผลลัพธ์จะเป็นอย่างไรนั้นยังต้องติดตามชมกันต่อไป"
 distar.3055.desc.1:0 "ในที่สุด นักวิทยาศาสตร์ของเราก็สามารถเจาะผ่านวัสดุภายนอกของกล่องต่างดาวได้สำเร็จ\n\nหลอดแก้วสามหลอดภายในนั้นบรรจุของเหลวที่ต่างกันจริง ๆ โดยแบ่งเป็น สีแดง §Rแดง§!, สีน้ำเงิน §Bน้ําเงิน§!, และสีเขียว §Gสีเขียว§! ของเหลวเหล่านี้มีความเป็นต่างดาวน้อยกว่าตัวกล่องบรรจุ และนักวิทยาศาสตร์ของเราจำแนกพวกมันได้ว่าเป็นสารสื่อกลางในการปรับแต่งพันธุกรรมที่เตรียมไว้พร้อมใช้งานแล้ว\n\nด้วยเหตุผลบางประการที่อยู่นอกเหนือความเข้าใจของเรา สารละลายเหล่านี้กำลังเสื่อมสภาพอย่างรวดเร็วเมื่ออยู่นอกกล่องบรรจุต่างดาว แต่คาดว่าน่าจะมีเวลาเพียงพอสำหรับการสังเคราะห์และนำสารตัวใดตัวหนึ่งมาใช้กับเผ่าพันธุ์ของเรา ได้รับการยืนยันแล้วว่าผลกระทบของมันจะเป็นไปในเชิงบวก แต่รายละเอียดว่าผลลัพธ์จะเป็นอย่างไรนั้นยังต้องติดตามชมกันต่อไป"
 distar.3055.a:0 "ใช้สารละลายสีแดง §Rแดง§!"
 distar.3055.a.tooltip:0 "ปรับแต่งพันธุกรรมของชาว [Root.Owner.GetSpeciesName] ด้วยสารละลายสีแดง"
 distar.3055.b:0 "ใช้สารละลายสีเขียว §Gสีเขียว§!"
 distar.3055.b.tooltip:0 "ปรับแต่งพันธุกรรมของชาว [Root.Owner.GetSpeciesName] ด้วยสารละลายสีเขียว"
 distar.3055.c:0 "ใช้สารละลายสีน้ำเงิน §Bน้ําเงิน§!"
 distar.3055.c.tooltip:0 "ปรับแต่งพันธุกรรมของชาว [Root.Owner.GetSpeciesName] ด้วยสารละลายสีน้ำเงิน"
 distar.3055.d.evopred: "ไม่มีเวลาสำหรับความลังเลแล้ว ใช้สารละลายทั้งหมดพร้อมกันเลย!"
 distar.3055.d.evopred.tooltip: "§Yจะมีผลลัพธ์ 1 ใน 2 รูปแบบเกิดขึ้น:§!\nโอกาส §Y50%§! ที่จะได้รับผลประโยชน์จากสารละลายทั้งหมด\nโอกาส §Y50%§! ที่จะไม่มีสิ่งใดเกิดขึ้นเลย"
 distar.3055.d:0 "ขายพวกมันทิ้ง"
 distar.3055.d.tooltip:0 "ขายหลอดสารละลายให้แก่ผู้ที่เสนอราคาสูงสุด"
 distar.3056.name:0 "สิ่งที่อยู่ภายในกล่องต่างดาว"
 distar.3056.desc:1 "ในที่สุด เหล่า [Root.GetScientistPlural] ของเราก็สามารถมองเข้าไปในกล่องต่างดาวได้สำเร็จโดยไม่ต้องทำลายตู้บรรจุเอง โดยการใช้ระบบโซนาร์ขั้นสูง พวกเขาสามารถระบุถึงสิ่งที่อยู่ข้างในได้สำเร็จ\n\nสิ่งที่อยู่ข้างในสร้างความฉงน หรืออย่างน้อยก็เหนือความคาดหมาย กล่องบรรจุหลอดแก้วขนาดเล็กสามหลอด ซึ่งแต่ละหลอดเต็มไปด้วยของเหลวที่ไม่รู้จัก\n\nกล่องนี้ปลอดภัยที่จะเปิดออก แต่ทว่าเราจำเป็นต้องวิจัยเพิ่มเติมเพื่อหาวิธีเปิดมัน"
 distar.3056.a:0 "เปิดมันออก"
 distar.3056.a.tooltip:0 "การวิจัยกล่องต่างดาวช่วยเร่งความเร็วการเรียนรู้ด้านฟิสิกส์ £physics£ §Yฟิสิกส์§! ของเรา"
 # Above "\n" is intended, to put "Physics"-word and -symbol on the same line
 distar.3056.b:0 "ขายมันซะ"
 distar.3056.b.tooltip:0 "ขายกล่องต่างดาวให้แก่ผู้ที่เสนอราคาสูงสุด"
 distar.3056.c:0 "ฉายรังสีใส่กล่อง"
 distar.3056.c.tooltip:0 "ผ่านทางการวิเคราะห์ด้วยการกระตุ้นนิวตรอน(การวิเคราะห์เชิงลึก)เราจะสามารถทำความเข้าใจวัสดุที่ใช้ทำกล่องและสิ่งที่อยู่ข้างในได้ดียิ่งขึ้น"

 distar.3057.name:0 "การดัดแปลงพันธุกรรมเสร็จสมบูรณ์"
 distar.3057.desc.all: "ในฐานะผู้เชี่ยวชาญการสังเคราะห์และประยุกต์ใช้งานจีโนมที่เป็นเอกลักษณ์ ผลลัพธ์จึงไม่มีอะไรให้ต้องสงสัย เราสามารถใส่สารละลายสีแดง §Rแดง§!, สีเขียว §Gสีเขียว§!, และสีน้ำเงิน §Bน้ําเงิน§! เข้าสู่ร่างกายชาว [root.GetSpeciesName] สำเร็จ\n\nบัดนี้เผ่าพันธุ์ของเราเข้าสังคมได้ดีขึ้น ปรับตัวเก่งขึ้น และมีอายุขัยที่ยืนยาวขึ้น"
 distar.3057.desc.stronger:1 "สารละลายปรับแต่งพันธุกรรมสีแดง §Rแดง§! ได้รับการป้อนเข้าสู่ร่างกายประชากรชาว [Root.GetSpeciesName] สำเร็จเรียบร้อยแล้ว\n\nจากการสังเกตการณ์เบื้องต้นของกลุ่มทดลองแรกเริ่ม สารนี้ดูเหมือนจะทำให้พวกเราเข้าสังคมเก่งขึ้น"
 distar.3057.desc.adaptive:0 "สารละลายปรับแต่งพันธุกรรมสีเขียว §Gสีเขียว§! ได้รับการป้อนเข้าสู่ร่างกายประชากรชาว [Root.GetSpeciesName] สำเร็จเรียบร้อยแล้ว\n\nจากการสังเกตการณ์เบื้องต้นของกลุ่มทดลองแรกเริ่ม สารนี้ดูเหมือนจะช่วยเพิ่มความสามารถในการปรับตัวเข้ากับสภาพแวดล้อมได้ดียิ่งขึ้น"
 distar.3057.desc.longlived:0 "สารละลายปรับแต่งพันธุกรรมสีน้ำเงิน §Bน้ําเงิน§! ได้รับการป้อนเข้าสู่ร่างกายประชากรชาว [Root.GetSpeciesName] สำเร็จเรียบร้อยแล้ว\n\nจากการสังเกตการณ์เบื้องต้นของกลุ่มทดลองแรกเริ่ม สารนี้ดูเหมือนจะช่วยยืดอายุขัยสูงสุดของพวกเรา"
 distar.3057.desc:0 "ความพยายามในการปรับแต่งพันธุกรรมจบลงด้วยความล้มเหลวอย่างน่าเสียดาย แม้จะมีผลลัพธ์แรกเริ่มที่น่าพึงพอใจ เนื่องจากสารละลายไม่สามารถเข้ากันได้กับจีโนมจีโนมในภาพรวมของชาว [Root.GetSpeciesAdj]"


 ### Breathing Rift ###
 distar.3060.name:0 "รอยแยกมีลมหายใจ"
 distar.3060.desc:0 "ความผิดปกติที่พบบริเวณใกล้กับ [breathing_rift_object.GetName] แม้ว่าจะไม่น่าเป็นไปได้ แต่ดูเหมือนว่าจะเป็นรอยแยกบางประเภทในอวกาศ มีความเป็นไปได้ว่ามวลขนาดมหึมาของ [breathing_rift_object.GetName] อาจเป็นสาเหตุที่ทำให้เกิดมันขึ้นมา ทว่าคุณลักษณะของมันยังคงอยู่เหนือขอบเขตความเข้าใจของเรา\n\nรอยแยกนี้ไม่เพียงแต่หักเหและบดบังแสงเท่านั้น แต่ดูเหมือนจะสูดแสงเข้าไปและพ่นมันออกมาซ้ำแล้วซ้ำเล่า ราวกับว่ามันกำลังหายใจเข้าออกเป็นโฟตอน\n\nมีความเป็นไปได้สูงที่แรงดึงดูดอันมหาศาลของรอยแยกนี้จะเคยสูดสิ่งอื่น ๆ เข้าไปด้วยเช่นกันในอดีต เราสมควรดำเนินงานด้วยความระมัดระวัง"
 distar.3060.a:0 "เถ้าสังเกตการณ์อย่างใกล้ชิดจนกว่าเราจะรู้รายละเอียดมากกว่านี้"
 distar.3060.a.tooltip:0 "ส่งยานตรวจสังเกตการณ์เพื่อเฝ้าดูรอยแยก"
 distar.3060.b:0 "สามารถศึกษาเรียนรู้มันจากระยะปลอดภัยได้"
 distar.3060.c:0 "ยาน [Root.GetName] ตกอยู่ในความเสี่ยง จงออกไปจากที่นี่เดี๋ยวนี้"

 distar.3061.name:0 "รอยแยกมีลมหายใจ - แร่ธาตุ"
 distar.3061.desc:0 "หลายเดือนผ่านไปนับจากการค้นพบรอยแยกใกล้กับ [breathing_rift_object.GetName] โดยไม่มีเหตุการณ์ผิดปกติใด ๆ เกิดขึ้น แต่ทว่าในตอนนี้ เราได้รับรายงานว่ามีกลุ่มหินที่อุดมไปด้วยแร่ธาตุจำนวนมากไหลทะลักออกมาจากรอยแยก\n\nพวกมันรอคอยให้เราไปเก็บเกี่ยวแล้ว\n\nการเฝ้าสังเกตการณ์รอยแยกจะดำเนินต่อไป"
 distar.3061.desc.repeat:0 "อีกครั้งหนึ่งที่รอยแยกใกล้กับ [breathing_rift_object.GetName] ได้ปล่อยกลุ่มวัตถุขนาดใหญ่จำนวนมากออกมา ครั้งนี้เป็นเศษซากของดาวเคราะห์น้อย ซึ่งหลายชิ้นอุดมไปด้วยแร่ธาตุ\n\nพวกมันรอคอยให้เราไปเก็บเกี่ยวแล้ว\n\nการเฝ้าสังเกตการณ์รอยแยกจะดำเนินต่อไป"
 distar.3061.a:0 "ยอดเยี่ยม จงเก็บกู้พวกมันอย่างรวดเร็ว"

 distar.3062.name:0 "รอยแยกมีลมหายใจ - เศษซากอวกาศ"
 distar.3062.desc:0 "หลายเดือนอันแสนเงียบสงบผ่านไปนับจากการค้นพบรอยแยกใกล้กับ [breathing_rift_object.GetName] แต่ตอนนี้ เราได้รับรายงานว่ามีกระแสเศษซากอวกาศจำนวนมากไหลทะลักออกมาจากรอยแยก มันรอคอยให้เราไปเก็บเกี่ยวแล้ว\n\nการเฝ้าสังเกตการณ์รอยแยกจะดำเนินต่อไป"
 distar.3062.desc.repeat:0 "อีกครั้งหนึ่ง รอยแยกใกล้กับ [breathing_rift_object.GetName] ได้พ่นสิ่งใหม่ออกมา ครั้งนี้ส่วนใหญ่เป็นเศษซากโลหะ ซึ่งอาจจะมาจากศึกสงครามโบราณบางแห่ง มันรอคอยให้เราไปเก็บเกี่ยวแล้ว\n\nการเฝ้าสังเกตการณ์รอยแยกจะดำเนินต่อไป"
 distar.3062.a:0 "ยอดเยี่ยม จงเก็บกู้มันอย่างรวดเร็ว"

 #distar.3063.name: "Breathing Rift - Unknown Creature"
 #distar.3063.desc: "A significant spike in energy levels has been seen in recent readings from the rift near [breathing_rift_object.GetName].\n\nWhat followed immediately after has thrown our scientists into a state of panic. An unknown, colossal creature escaped the rift, drifting into the solar system.\n\nWe should proceed with extreme caution, no matter our course of action."

 distar.3064.name:0 "รอยแยกมีลมหายใจ - ปิดตัวลง"
 distar.3064.desc:0 "รายงานข้อมูลล่าสุดจากยานตรวจสังเกตการณ์ของรอยแยกแจ้งว่า รอยแยกได้อันตรธานหายไปแล้ว หลังจากสูดลมหายใจเฮือกสุดท้าย รอยแยกก็ปิดตัวลงโดยไม่เหลือแม้แต่ร่องรอยพลังงานใด ๆ ทิ้งไว้เบื้องหลัง"
 distar.3064.a:0 "น่าเสียดายยิ่ง"
 distar.3064.a.tooltip:0 "อย่างไรก็ตาม ข้อมูลที่เก็บรวบรวมมาได้ตลอดช่วงเวลานี้ได้ช่วยส่งเสริมงานวิจัยด้านฟิสิกส์ £physics£ §Yฟิสิกส์§! ของเราเพิ่มเติม"

 ####################################
 # Special Projects
 ####################################

 ### Trojan Asteroid ###
 trojan_asteroid_project:0 "ดาวเคราะห์น้อยโทรจัน"
 trojan_asteroid_project_DESC:0 "เมื่อโดรนได้รับการทำลายล้างแล้ว ดาวเคราะห์น้อยที่พวกมันซ่อนตัวอยู่จะสามารถเข้าทำการตรวจสอบอย่างละเอียดมากขึ้นได้"

 ### Impossible Organism ###
 impossible_organism_project_1:0 "สิ่งมีชีวิตที่เป็นไปไม่ได้"
 impossible_organism_project_1_DESC:1 "ยาน [impossible_organism_science_ship.GetName] ประสบความสำเร็จในการเก็บกู้ตัวอย่างของสิ่งมีชีวิตที่มีความทรหดอดทนอย่างน่าเหลือเชื่อ ซึ่งพบบนพื้นผิวที่เป็นพิษของ [impossible_organism_planet.GetName]\n\nนักชีววิทยาของเราต้องการจะศึกษามันในรายละเอียดที่ลึกซึ้งยิ่งขึ้น"

 impossible_organism_project_2:0 "สิ่งมีชีวิตที่เป็นไปไม่ได้: การวิจัยต่อเนื่อง"
 impossible_organism_project_2_DESC:1 "สิ่งมีชีวิตที่พบบน [impossible_organism_planet.GetName] ได้แสดงให้เห็นว่ามีศักยภาพที่ยอดเยี่ยมในการเติบโตท่ามกลางสภาพแวดล้อมที่โหดร้ายอันเป็นอันตราย\n\nมีความเหมาะสมที่จะทำการวิจัยเพิ่มเติม หากนักชีววิทยาของเราต้องการที่จะไขความลับของกระบวนการทางพันธุกรรม เซลล์ และชีวเคมีของมัน"

 ### Molluscoid Miners ###
 molluscoid_miners_project_1:0 "ชาวเหมืองมอลลัสคอยด์"
 molluscoid_miners_project_1_DESC:0 "วิจัยสิ่งมีชีวิตสายพันธุ์มอลลัสคอยด์(พึมพํา)และพยายามค้นหาวิธีการที่พวกมันใช้ในการระบุแหล่งแร่ธาตุด้วยความง่ายดายเช่นนั้น"
 molluscoid_miners_project_2:0 "การผสมรวมชาวมอลลัสคอยด์"
 molluscoid_miners_project_2_DESC:0 "เริ่มต้นกระบวนการผสมรวมชาวเหมืองมอลลัสคอยด์เข้าสู่สังคมของ [Root.Owner.GetAdj]"
 molluscoid_miners_project_3:0 "ผลผลิตแร่ธาตุ"
 molluscoid_miners_project_3_DESC:0 "เริ่มการวิจัยและพัฒนาติดตั้งระบบที่สามารถวาดแผนที่ใต้ดินได้อย่างรวดเร็ว โดยมีเป้าหมายสูงสุดเพื่อปรับปรุงผลผลิตแร่ธาตุของเรา"

 ### Orbital Speed Demon ###
 speed_demon_open_box_project:0 "เจาะเปิดกล่องต่างดาว"
 speed_demon_open_box_project_DESC:0 "เริ่มต้นความพยายามในการเปิดกล่องต่างดาวที่ค้นพบในวงโคจรรอบ [speed_demon_orbit_body.GetName]"
 speed_demon_learn_more_project:0 "วิจัยกล่องต่างดาว"
 speed_demon_learn_more_project_DESC:0 "วิจัยกล่องต่างดาวที่ค้นพบในวงโคจรรอบ [speed_demon_orbit_body.GetName] เพื่อตรวจสอบยืนยันสิ่งที่อยู่ภายใน"

 ### Breathing Rift ###
 breathing_rift_project:0 "หายใจเข้า หายใจออก"
 breathing_rift_project_DESC:0 "เฝ้าสังเกตการณ์รอยแยกในอวกาศที่ค้นพบใกล้กับ [breathing_rift_object.GetName] และเฝ้ารอสิ่งใดก็ตามที่จะเคลื่อนพ้นออกมาจากมัน หากมี"


 story.101.aa:0 "$story.201.aa$"
 story.101.bb:0 "$story.201.bb$"
 story.101.bb.exter:0 "การวิจัยอาจช่วยเร่งรัดกระบวนการกำจัดทิ้งในอนาคตได้ดีขึ้น"
 story.101.cc:0 "$story.201.cc$"
 story.101.aa.amoebahunt:0 "ได้รับ §G+1000§! £energy£ สำหรับทุกกองยานสเปซอะมีบาที่ถูกทำลายลง"

 story.105.bb:0 "แส้เซลล์(ฟลาเจลล่า)ของพวกมันช่างน่าหลงใหลยิ่ง"
 story.105.aa:0 "เก็บกู้ตัวอย่างเนื้อเยื่อบางส่วนกลับมา"

 story.107.name:0 "ทำให้สเปซอะมีบาสงบลงสำเร็จ"
 story.107.desc:0 "การงดปล่อยไอเสียบางประเภทจากแกนปฏิกรณ์ของยานอวกาศของเราเป็นการชั่วคราวในระหว่างที่อยู่ใกล้กับฝูงสเปซอะมีบา ดูเหมือนจะเพียงพอที่จะไม่ทำให้พวกมันเกิดความโกรธเกรี้ยว\n\nด้วยการเริ่มใช้โปรโตคอลใหม่นี้ พวกมันจึงไม่เป็นภัยคุกคามสำหรับเราอีกต่อไป และทำให้เราสามารถทำการวิจัยพวกมันได้อย่างใกล้ชิดในระยะเผาขน"
 story.107.a:0 "ยอดเยี่ยม"
 story.107.a.tooltip:0 "เพิ่มผลลัพธ์จากสถานะ §Y$pacified_amoebas$§! ส่งผลกระทบดังนี้:\nกองยาน §Hสเปซอะมีบา(สเปน อมีบา)§! จะเปลี่ยนสถานะเป็น §Gไม่เป็นศัตรู§!"
 pacified_amoeba_tt: "กองยาน §Hสเปซอะมีบา(สเปน อมีบา)§! จะเปลี่ยนสถานะเป็น §Gไม่เป็นศัตรู§!"

 story.201.aa:0 "เป็นเหยื่อชั้นดี"
 story.201.aa.crystalhunt:0 "§G+500§! £minerals£ สำหรับการทำลายกองยานความจุแบบคริสตัลหนึ่งกอง"
 story.201.bb:0 "เป็นสิ่งมีชีวิตที่น่าทึ่ง"
 story.201.cc:0 "เราสามารถเรียนรู้ที่จะอยู่ร่วมกันได้"

 story.207.name:0 "ทำให้คริสตัลสงบลงสำเร็จ"
 story.207.desc:0 "กลุ่มสิ่งมีชีวิตคริสตัล(สายรัด)ดูเหมือนจะส่งเสียงสะท้อนตอบสนองต่อสิ่งเร้าบางอย่าง ซึ่งเป็นหนึ่งในการปฏิสัมพันธ์ไม่กี่อย่างที่พวกมันมีต่อสภาพแวดล้อม ลักษณะที่แท้จริงและจุดประสงค์ที่กว้างขึ้นของคลื่นเสียงที่แผ่ออกมานี้ยังไม่สามารถยืนยันได้ แต่ในตอนนี้ ยานอวกาศของเราสามารถเลียนแบบคลื่นเสียงดังกล่าวได้โดยการใช้สัญญาณวิทยุส่งเสียงสะท้อน ซึ่งเป็นการพรางตัวเสมือนเป็นพวกคริสตัลด้วยกันเองอย่างมีประสิทธิภาพ"
 story.207.a:0 "สะท้อนก้องกังวาน"
 story.207.a.tooltip:0 "เพิ่มผลลัพธ์จากสถานะ §Y$pacified_crystals$§! ส่งผลกระทบดังนี้:\nกองยาน §Hสิ่งมีชีวิตคริสตัล(องค์กรคริสต์)§! จะเปลี่ยนสถานะเป็น §Gไม่เป็นศัตรู§!"

 # crystal station destroyed
 story.222.name:0 "คริสตัลแตกสลาย"
 story.222.desc:0 "เราได้ทำลายสิ่งก่อสร้างคริสตัลในระบบดาว [FromFrom.solar_system.GetName] สำเร็จแล้ว มันมีความทนทานและแข็งแกร่งกว่าที่คาดการณ์ไว้ และเราได้เก็บกู้เศษชิ้นส่วนบางส่วนมาวิจัยเพิ่มเติม เราน่าจะสามารถลอกเลียนแบบคุณสมบัติในการฟื้นฟูตัวเองของเมทริกซ์คริสตัล(เสียงเมตริกซ์)ที่สังเกตพบในระหว่างศึกรบได้"

 story.305.aa:0 "$story.201.aa$"
 story.305.bb:0 "เครื่องจักรอัตโนมัติที่น่าหลงใหลยิ่ง"

 # drone station destroyed
 story.332.name:1 "$story.333.name$"
 story.332.desc:1 "เราได้ทำลายฐานทัพของโดรนขุดเหมือง(เพลง)โดรนฐาน)สำเร็จแล้ว และสามารถเก็บกู้แร่แปรรูปและโลหะผสมอันล้ำค่าที่สะสมไว้ส่วนใหญ่กลับมาได้"
 story.332.a:0 "ความมั่งคั่งอันหาค่าไม่ได้"
 story.332.b:0 "...และอุปกรณ์แปลกประหลาดเครื่องหนึ่ง..."

 CRYSTALS_PROJECT:0 "การวิจัยคริสตัล"
 CRYSTALS_PROJECT_DESC:0 "$CRYSTALS_1_PROJECT_DESC$"
 CRYSTALS_PACIFICATION_PROJECT:0 "กระบวนการสันติภาพกับผลึกเอนทิตี"
 CRYSTALS_PACIFICATION_PROJECT_DESC:0 "กลุ่มสิ่งมีชีวิตคริสตัล(สายรัด)ที่สังเกตพบในระบบดาวบางแห่งนั้นไม่มีความเสถียรและอาจมีอันตราย"

 DRONES_PROJECT:0 "การวิจัยโดรน"
 DRONES_PROJECT_DESC:0 "$DRONES_1_PROJECT_DESC$"

 AMOEBAS_PROJECT:0 "การศึกษาอะมีบาอวกาศ"
 AMOEBAS_PROJECT_DESC:0 "$AMOEBAS_1_PROJECT_DESC$"
 AMOEBAS_PACIFICATION_PROJECT:0 "กระบวนการสันติภาพกับอะมีบา"
 AMOEBAS_PACIFICATION_PROJECT_DESC:0 "บางสิ่งเกี่ยวกับกองยานของเราดูเหมือนจะสร้างความตื่นตระหนกแก่อะมีบาอวกาศ(สเปน อมีบาส)หากเราสามารถแยกแยะได้ว่าสิ่งนั้นคืออะไร เราอาจสามารถลดความก้าวร้าวของสเปซอะมีบาลง หรืออาจถึงขั้นพรางยานอวกาศของเราให้พ้นจากประสาทสัมผัสของพวกมันได้อย่างสมบูรณ์"

 CLOUDS_PROJECT:0 "การวิจัยกลุ่มเมฆาวอยด์"
 CLOUDS_PROJECT_DESC:0 "$CLOUDS_1_PROJECT_DESC$"

 crystal_hunting_buff:0 "นักล่าคริสตัล"
 crystal_hunting_buff_desc:0 "เศษซากที่แตกกระจายของสิ่งมีชีวิตคริสตัลจะได้รับการเก็บกู้อัตโนมัติภายหลังการรบ นำมาซึ่งแร่ธาตุ £minerals£ §G500§! สำหรับทุกกองยานที่ถูกทำลายลง"
 crystal_focus:0 "ระบบโฟกัสคริสตัล"
 crystal_focus_desc:0 "สื่อกลางในการส่งผ่านข้อมูลที่ได้รับการปรับปรุง โดยเลียนแบบโครงสร้างภายในที่เป็นเอกลักษณ์ของสิ่งมีชีวิตคริสตัล ช่วยลดการสูญเสียจากแรงต้านทานในกระบวนการผลิตและการแจกจ่ายพลังงานได้อย่างมีประสิทธิภาพสูงสุด"
 pacified_crystals:0 "กระบวนการสันติภาพกับผลึกเอนทิตี"
 pacified_crystals_desc:0 "การส่งสัญญาณคลื่นสั้นในบางความถี่ช่วยพรางกองยานของเราให้เสมือนเป็นสิ่งมีชีวิตคริสตัลด้วยกัน และทำให้สิ่งมีชีวิตอวกาศเหล่านั้นไม่ถือว่าเราเป็นภัยคุกคามอีกต่อไป"

 amoeba_hunting_buff:0 "นักล่าอะมีบา"
 amoeba_hunting_buff_desc:0 "ซากของอะมีบาจะได้รับการรวบรวมภายหลังการรบ และอวัยวะภายในของพวกมันจะถูกเก็บเกี่ยวเพื่อนำสารประกอบอินทรีย์ที่มีค่ามาใช้งาน นำมาซึ่งพลังงาน £energy£ §G1000§! สำหรับทุกกองยานที่ถูกทำลายลง"
 pacified_amoebas:0 "กระบวนการสันติภาพกับอะมีบา"
 pacified_amoebas_desc:0 "กองยานทำการควบคุมการระบายรังสีเมื่อเดินทางเข้าใกล้สเปซอะมีบา และทำให้สิ่งมีชีวิตอวกาศเหล่านั้นไม่ถือว่าเราเป็นภัยคุกคามอีกต่อไป"

 drone_hunting_buff:0 "ผู้ทำลายล้างโดรน"
 drone_hunting_buff_desc:0 "โดรนขุดเหมือง(Minning Drones)เหล่านี้ผลิตขึ้นเป็นจำนวนมากอย่างเห็นได้ชัด จุดอ่อนที่พบในโดรนตัวหนึ่งย่อมเป็นจุดอ่อนที่พบในโดรนทุกตัวเช่นกัน"
 drone_mining_techniques:0 "เทคนิคการขุดด้วยโดรน"
 drone_mining_techniques_desc:0 "การใช้เทคนิคที่ลอกเลียนแบบจากโดรนขุดเหมือง ช่วยให้เราขุดใช้ประโยชน์จากสายแร่ที่ก่อนหน้านี้ไม่ได้รับความสนใจเนื่องจากไม่คุ้มค่าความพยายามได้อย่างมีประสิทธิภาพ"

 cloud_hunting_buff:0 "ผู้ทำลายล้างเมฆาวอยด์"
 cloud_hunting_buff_desc:0 "ประจุไฟฟ้าของเมฆาวอยด์(เมฆลอย)เกิดการแปรปรวนในวัฏจักรที่รวดเร็วแต่สามารถสังเกตการณ์ได้ การโจมตีด้วยเวลาที่แม่นยำจะส่งผลให้พลังงานลึกลับที่ขับเคลื่อนชีวิตของพวกมันเกิดความไม่เสถียรอย่างรุนแรง"
 void_loops:0 "วอยด์ลูป(เสียงนักบิน)"
 void_loops_desc:0 "ธรรมชาติที่ผิดปกติของเมฆาวอยด์(เมฆลอย)ได้เปิดความเป็นไปได้ใหม่ ๆ ในงานวิจัยด้านฟิสิกส์"

 sr_yurantic:0 "$sr_yuranic$"
 sr_yurantic_desc:0 "$sr_yuranic_desc$"
 d_yurantic_deposit:0 "$d_yuranic_deposit$"
 tech_mine_yurantic:0 "$tech_mine_yuranic$"
 tech_mine_yurantic_desc:0 "$tech_mine_yuranic_desc$"

 sr_aldar:0 "ผลึกอัลดาร์"
 sr_aldar_desc:0 "การกะเทาะคริสตัลอัลดาร์(คริสตัลแก้ว)จะทำให้เศษเสี้ยวที่ได้เกิดการขยายตัวและแข็งตัวอย่างรวดเร็วด้วยความเร็วระดับระเบิด ทำให้มันเป็นวัสดุที่ยอดเยี่ยมสำหรับทำแผ่นรังแกนกลางทำลายล้างในยุทธภัณฑ์ประเภทระเบิด"
 tech_mine_aldar:0 "การขัดแต่งแร่อัลดาร์"
 tech_mine_aldar_desc:0 "คริสตัลอัลดาร์(คริสตัลแก้ว)ที่ไม่เสถียรสามารถพบได้เฉพาะปะปนอยู่ในแร่ธาตุทั่วไปเท่านั้น การสกัดคริสตัลอัลดาร์จากโครงสร้างสายแร่เหล่านี้ได้สำเร็จโดยไม่ก่อให้เกิดความเสียหายร้ายแรงต่ออุปกรณ์และผู้ควบคุม จำเป็นต้องใช้เครื่องจักรสัมผัสอัตโนมัติขั้นสูง"

