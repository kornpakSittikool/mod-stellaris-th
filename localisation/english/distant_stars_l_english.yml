 KET_KICK_FROM_ALLIANCE_ACCEPT:0 "ก็ดี! วิเศษเลย! ฝูงที่ไร้ประโยชน์อย่างสมาพันธ์ [From.GetAllianceName] น่ะ จิตตระหนักไกลจะแข็งแกร่งขึ้นเมื่ออยู่ตามลำพังคนเดียว!"
 KET_OFFER_FEDERATION_ASSOCIATION_STATUS_SELECT:0 "ท่านต้องการให้จิตตระหนักไกลเข้าร่วมเป็นภาคีในฝูงแห่งพหุของท่านใช่หรือไม่?"
 KET_OFFER_FEDERATION_ASSOCIATION_STATUS_PROPOSE:0 "[Root.GetSpeciesNamePlural], มิตรสหาย สมาพันธ์ [From.GetAllianceName] ขอขยายขอบเขตสัมพันธ์มายังพวกท่าน ยังไม่พร้อมที่จะเข้าร่วมเป็นส่วนหนึ่งในฝูงแห่งพหุหรอกนะ ยังไม่ใช่ตอนนี้ ทว่าเข้าร่วมในฐานะภาคีล่ะสนใจไหม?"
 KET_OFFER_FEDERATION_ASSOCIATION_STATUS_ACCEPT:0 "ตกลง จิตตระหนักไกลจะกระชับความสัมพันธ์ให้ใกล้ชิดกับฝูงแห่งพหุของพวกท่านมากขึ้น"
 KET_OFFER_FEDERATION_ASSOCIATION_STATUS_REFUSE:0 "ฝูงแห่งพหุของพวกท่านไม่ทำให้เราสนใจได้หรอก หกึสส์ก! !"
 KET_REVOKE_FEDERATION_ASSOCIATION_STATUS_SELECT:0 "ฝูงแห่งพหุไม่ปรารถนาที่จะติดต่อกับเราอีกต่อไปแล้วงั้นหรือ หกึสส์ก?!"
 KET_REVOKE_FEDERATION_ASSOCIATION_STATUS_PROPOSE:0 "สถานะภาคีของพวกท่าน: ถูกเพิกถอน! ฝูงแห่งพหุไม่ปรารถนาที่จะให้ชาว [Root.GetSpeciesNamePlural] อยู่ร่วมปะปนกับพวกเราอีกต่อไปแล้ว!"
 KET_REVOKE_FEDERATION_ASSOCIATION_STATUS_ACCEPT:0 "$KET_KICK_FROM_ALLIANCE_ACCEPT$"
 KET_ASK_FEDERATION_ASSOCIATION_STATUS_SELECT:0 "ฝูงแห่งพหุของพวกท่านต้องการพูดคุยกับเรางั้นหรือ หกึสส์ก?!"
 KET_ASK_FEDERATION_ASSOCIATION_STATUS_PROPOSE:0 "ฝูงแห่งพหุของพวกท่าน พวกเราปรารถนาที่จะพูดคุยกับท่าน อยู่ใกล้ชิดกับท่าน เข้าร่วมเป็นภาคีกันสิ หกึสส์ก! !"
 KET_ASK_FEDERATION_ASSOCIATION_STATUS_ACCEPT:0 "ใช่แล้ว ดีมาก ฝูงแห่งพหุจะเข้าผูกสัมพันธ์เป็นภาคีร่วมกับ [From.GetName]"
 KET_ASK_FEDERATION_ASSOCIATION_STATUS_REFUSE:0 "ไม่ล่ะ พวกเราไม่ต้องการชาว [From.GetSpeciesNamePlural] ไม่ปรารถนาให้พวกเขามาอยู่ร่วมปะปนในหมู่ฝูงแห่งพหุ!"
 KET_END_FEDERATION_ASSOCIATION_STATUS_SELECT:0 "ท่านจะถอนตัว จะไม่พูดคุยกับฝูงแห่งพหุอีกต่อไปแล้วงั้นหรือ?"
 KET_END_FEDERATION_ASSOCIATION_STATUS_PROPOSE:0 " หกึสส์ก คสส์ก คสส์ก! ! ฝูงของพวกท่านช่างเชื่องช้า ซึมเซา และไม่เหมาะสมเป็นอย่างยิ่ง! ท่านจะไม่ใช่ภาคีร่วมกับเราอีกต่อไป!"
 KET_END_FEDERATION_ASSOCIATION_STATUS_ACCEPT:0 "เช่นนั้นก็นำตัวเองออกไปซะ! พวกเราจะไม่ผูกสัมพันธ์ร่วมกับฝูง [From.GetName] อีกต่อไป"
 KET_DEMAND_TRIBUTARY_SELECT:0 "ท่านต้องการเครื่องราชบรรณาการงั้นหรือ หกึสส์ก?! ท่านต้องการเศษขยะเหล็ก อัญมณีเพชรพลอย และสายลวดทองแดงงั้นรึ?"
 KET_DEMAND_TRIBUTARY_PROPOSE:0 "ฝูง [Root.GetName] ช่างอ่อนแอและสุกงอมพร้อมโดนล่า! ทว่าพวกเราสามารถทิ้งให้พวกท่านอยู่อย่างสงบได้ มอบเศษขยะเหล็กให้เราสิ มอบโลหะ สายไฟ และอัญมณีเพชรพลอยให้แก่เรา!"
 KET_DEMAND_TRIBUTARY_ACCEPT:0 "ตกลง ได้สิ พวกเราจะนำของขวัญมามอบให้แก่ท่าน เพื่อเป็นการแลกเปลี่ยน ท่านต้องปล่อยให้จิตตระหนักไกลอยู่อย่างสง หกึสส์ก! !"
 KET_DEMAND_TRIBUTARY_REFUSE:0 "ไม่! พวกเราไม่ยอม! พวกเราไม่ต้องการคำมั่นสัญญาของชาว [From.GetAdj] ท่านจะไม่ได้รับสิ่งใดจากเราทั้งนั้น"
 KET_ASK_BECOME_TRIBUTARY_SELECT:0 " หกึสส์ก! ! ท่านต้องการส่งเครื่องราชบรรณาการให้แก่จิตตระหนักไกลงั้นรึ?"
 KET_ASK_BECOME_TRIBUTARY_PROPOSE:0 "ชาว [Root.GetSpeciesNamePlural] ใส่ใจในโลหะงั้นรึ? สายไฟล่ะ? ความรู้? หรืออัญมณีเพชรพลอย? พวกเรามีสิ่งของเหล่านั้นนะ หกึสส์ก! ! ปล่อยให้พวกเราอยู่อย่างสงบ แล้วพวกเราจะคอยส่งส่วยเครื่องบรรณาการให้แก่ท่าน"
 KET_ASK_BECOME_TRIBUTARY_ACCEPT:0 "ยี่งดี จ่ายส่วยแก่เรา มอบของขวัญแก่เรา แล้วเราจะปล่อยให้พวกท่านอยู่อย่างสงบ!"
 KET_ASK_BECOME_TRIBUTARY_REFUSE:0 "ไม่ พวกเราไม่ต้องการ หกึสส์ก! ไม่มีส่วนความจำเป็นใด ๆ สำหรับพวกท่าน!"
 KET_INSULT_01:0 "มีอะไรล่ะ? เอ่ยคำพูดของพวกท่านออกมาสิ!"
 KET_INSULT_PROPOSE_01:0 " หกึสส์ก! ! จิตสำนึกอันเบาปัญญาของชาว [Root.GetSpeciesAdj] ของพวกท่านไม่สามารถเชื่อมต่อท่อไอเสียเข้ากับเครื่องอัดสสารได้หรอก แม้ว่าชีวิตของพวกท่านจะขึ้นอยู่กับมันก็ตาม!"
 KET_INSULT_PROPOSE_02:0 " หกึสส์ก คสส์ก คสส์ก! ! แม้กระทั่งเศษเหล็กขยะของฝูงพวกท่านยังไม่เหมาะสมที่จะนำกลับมาใช้ประโยชน์ใหม่เลย"
 KET_INSULT_ACCEPT_01:0 "หยาบคาย ชั่วร้ายยิ่ง พวกเราจะจดจำไว้"
 action.37.desc.ketlings:1 "พวกเรายอมจำนน พวกเราขอยอมแพ้! เรียกกองยานของท่านกลับไปและไสหัวไปซะ หกึสส์ก !"
 action.38.desc.ketlings:1 "ใช่แล้ว! พวกเราได้รับชัยชนะ พวกเราอยู่เหนือกว่า! เดินทางมาหาเราอีกสิ หากว่าท่านมีโลหะ อัญมณี และชีวิตเหลือเฟือเกินไป!"
 action.39.desc.ketlings:0 "เอาล่ะดีแล้ว ไม่มีผู้ชนะ ไม่มีผู้มีชัย มีเพียงชีวิตที่สูญเสียไป และเศษเหล็กขยะที่สูญเปล่า..."

