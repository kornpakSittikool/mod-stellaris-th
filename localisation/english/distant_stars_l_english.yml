l_english:

 DISTANT_STARS_TITLE: "Distant Stars Story Pack" # Do not translate
 DLC_DISTANT_STARS_RECOMMENDATION_DESC:1 "§Sดวง ดาว ที่ ไม่ แน่นอน§! คือสตอรี่แพ็กที่จะเติมชีวิตชีวาให้กาแล็กซีด้วยเรื่องราวเกี่ยวกับการเผชิญหน้าและสิ่งมีชีวิตที่แปลกประหลาดในห้วงอวกาศที่ยังไม่มีการสำรวจ"
 DLC_DISTANT_STARS_RECOMMENDATION_SCIENCE_REC:1 "เราขอแนะนำ §Sดวง ดาว ที่ ไม่ แน่นอน§! เนื่องจากตัวแปรบางอย่างที่คุณเลือกนั้นเหมาะสมกับเนื้อหา ซึ่งเน้นไปที่การสำรวจอวกาศและการค้นพบทางวิทยาศาสตร์ใหม่ ๆ"

 AIANOM_LUMP_CAT:0 "เศษซากในวงโคจร"
 AIANOM_LUMP_CAT_desc:0 "เซ็นเซอร์ตรวจพบหน่วยงานที่อาจน่าสนใจในวงโคจรของ [Root.GetName]"
 AIANOM_MININGDEPO_CAT:0 "การปิงสัญญาณพื้นผิว"
 AIANOM_MININGDEPO_CAT_desc:0 "เซ็นเซอร์ตรวจพบสิ่งที่น่าจะค้นพบบนพื้นผิวของ [Root.GetName]"
 AIANOM_RESEARCHDEPO_CAT:0 "$AIANOM_MININGDEPO_CAT$"
 AIANOM_RESEARCHDEPO_CAT_desc:0 "$AIANOM_MININGDEPO_CAT_desc$"
 AIANOM_CLUE_CAT:0 "$clue$"
 AIANOM_CLUE_CAT_desc:0 "$l_cluster_chain_desc$"

 aianom.minerallump.name:0 "คลังแร่สำรอง"
 aianom.minerallump.desc:0 "[Root.GetName] ได้ค้นพบคลังแร่สำรองแล้ว"
 aianom.energylump.name:0 "เครดิตพลังงาน"
 aianom.energylump.desc:0 "[Root.GetName] ได้ค้นพบคลังเครดิตพลังงานสำรองแล้ว"
 aianom.physicslump.name:0 "การวิจัยฟิสิกส์"
 aianom.physicslump.desc:0 "[Root.GetName] ได้ค้นพบข้อมูลการวิจัยฟิสิกส์แล้ว"
 aianom.societylump.name:0 "การวิจัยสังคม"
 aianom.societylump.desc:0 "[Root.GetName] ได้ค้นพบข้อมูลการวิจัยสังคมแล้ว"
 aianom.engineeringlump.name:0 "การวิจัยวิศวกรรม"
 aianom.engineeringlump.desc:0 "[Root.GetName] ได้ค้นพบข้อมูลการวิจัยวิศวกรรมแล้ว"
 aianom.mineraldepo.name:0 "แหล่งแร่"
 aianom.mineraldepo.desc:0 "[Root.GetName] ได้ค้นพบแหล่งแร่บน [From.GetName]"
 aianom.energydepo.name:0 "แหล่งพลังงาน"
 aianom.energydepo.desc:0 "[Root.GetName] รายงานว่าพบแหล่งคริสตัลบนพื้นผิวของ [From.GetName] ซึ่งมีประจุไฟฟ้าตามธรรมชาติและสามารถผลิตกระแสไฟฟ้าได้"
 aianom.physicsdepo.name:0 "แหล่งวิจัยฟิสิกส์"
 aianom.physicsdepo.desc:0 "[Root.GetName] ได้ค้นพบแหล่งวิจัยฟิสิกส์บน [From.GetName]"
 aianom.societydepo.name:0 "แหล่งวิจัยสังคม"
 aianom.societydepo.desc:0 "[Root.GetName] ได้ค้นพบแหล่งวิจัยสังคมบน [From.GetName]"
 aianom.engineeringdepo.name:0 "แหล่งวิจัยวิศวกรรม"
 aianom.engineeringdepo.desc:0 "[Root.GetName] ได้ค้นพบแหล่งวิจัยวิศวกรรมบน [From.GetName]"

 pc_time_loop_world_desc:0 "โลกทั้งใบนี้ถูกห่อหุ้มอยู่ภายใต้เกราะพลังงานบางชนิดที่ไม่อาจเจาะทะลุได้"

 ####################################
 # Anomaly Categories
 ####################################
 # FROM = planet scope
 # ROOT = ship scope

 DISTAR_WRECK_CAT:0 "ซากเรือเสบียง"
 DISTAR_WRECK_CAT_DESC:0 "เซ็นเซอร์รายงานว่าพบซากเรืออับปางที่ไม่ทราบที่มาในวงโคจรของ [Root.GetName]"
 DISTAR_FLARE_CAT:0 "ร่องรอยของอารยธรรม"
 DISTAR_FLARE_CAT_DESC:0 "แม้ดาวเคราะห์ดวงนี้จะขาดชั้นบรรยากาศ ทว่ามีหลักฐานของโครงสร้างประดิษฐ์บางประเภทบน [From.GetName] ซึ่งอาจบ่งชี้ถึงอารยธรรมในอดีต"
 DISTAR_RAINBOW_CAT:0 "สายรุ้งในความมืด"
 DISTAR_RAINBOW_CAT_DESC:0 "จานพอกพูนมวล(ติดตั้งดิสก์)รอบ ๆ [From.GetName] แสดงสเปกตรัมการหักเหแสงที่น่าทึ่ง ไม่ต่างจากรุ้งกินน้ำ อะไรคือสาเหตุของสิ่งนี้?"
 DISTAR_HOLO_CAT:0 "สัญญาณกองยานลึกลับ"
 DISTAR_HOLO_CAT_DESC:0 "ผลตรวจวัดบ่งชี้ถึงการมีอยู่ของกองยานที่ไม่รู้จักในวงโคจรของ [From.GetName] พวกเขาไม่ตอบสนองต่อการติดต่อสื่อสารใด ๆ"
 DISTAR_ROBO_CAT:0 "โครงสร้างที่สมมาตรกัน"
 DISTAR_ROBO_CAT_DESC:0 "เครื่องสแกนชี้ให้เห็นระดับความสมมาตรที่สูงผิดปกติบนพื้นผิวของ [From.GetName]"
 DISTAR_NANO_CAT:0 "เกรย์กู(เกรย์)กู)"
 DISTAR_NANO_CAT_DESC:0 "เทหวัตถุ [From.GetName] ดูเหมือนจะถูกปกคลุมไปด้วยสารสีเทาบางชนิดที่มีคุณสมบัติแปลกประหลาดและมีส่วนประกอบของโลหะที่หลากหลาย"
 DISTAR_FLOW_CAT:0 "การตรวจวัดค่าที่หนักหน่วง"
 DISTAR_FLOW_CAT_DESC:0 "ค่าแรงโน้มถ่วงที่ผิดปกติอย่างมากห้อมล้อมรอบ [From.GetName]"
 DISTAR_LOST_CAT:0 "การเคลื่อนไหวในหมู่เมฆ"
 DISTAR_LOST_CAT_DESC:0 "มีการเคลื่อนไหวในชั้นบรรยากาศชั้นบนของ [From.GetName] ราวกับว่ามียานลำหนึ่งกำลังร่อนผ่านหมู่เมฆอย่างเร่งรีบ"
 DISTAR_TIME_CAT:0 "เศษซากชิ้นส่วนยาน"
 DISTAR_TIME_CAT_DESC:0 "มีเศษซากชิ้นส่วนของยานที่ไม่รู้จักในวงโคจรใกล้กับ [From.GetName]"
 DISTAR_CLONE_CAT:0 "ถังเพาะเชื้อที่ขุ่นมัว"
 DISTAR_CLONE_CAT_DESC:0 "การถ่ายภาพเบื้องต้นของริงเวิลด์(เพลง)[From.GetName] ที่พังทลาย บ่งชี้ว่ามีถังเพาะเลี้ยงที่ยังอยู่ในสภาพสมบูรณ์จำนวนหนึ่งตั้งอยู่ในส่วนที่ทรุดโทรม ยังไม่เป็นที่ทราบแน่ชัดว่าถังเหล่านี้บรรจุสิ่งใดไว้"
 DISTAR_GEODE_CAT:0 "หัวใจที่เป็นความลับ"
 DISTAR_GEODE_CAT_DESC:0 "การสร้างภาพด้วยคลื่นสะท้อนในดาวเคราะห์น้อย [From.GetName] บ่งบอกถึงองค์ประกอบภายในที่ประกอบด้วยคริสตัลหายาก"
 DISTAR_DEAD_GOD_CAT:0 "สัตว์ยักษ์ผู้นิ่งเงียบ"
 DISTAR_DEAD_GOD_CAT_DESC:0 "[From.GetName] มีรูปทรงที่ไม่เป็นทรงกลมอย่างเห็นได้ชัด โดยมีโครงสร้างขนาดมหึมาบางชนิดบนพื้นผิวซึ่งท้าทายแบบจำลองทางธรณีวิทยา"
 DISTAR_ELECTRO_CAT:0 "โครงข่ายใยแมงมุม"
 DISTAR_ELECTRO_CAT_DESC:0 "โครงข่ายใยเรืองแสงที่ไม่ทราบต้นกำเนิดส่องสว่างบนพื้นผิวของ [From.GetName] เป็นระยะ ๆ"
 DISTAR_RUM_CAT:0 "สารประกอบที่คุ้นเคย"
 DISTAR_RUM_CAT_DESC:0 "สเปกตรัมการปลดปล่อยแสงของ [From.GetName] ชี้ให้เห็นว่าองค์ประกอบหลักของดาวแก๊สยักษ์ดวงนี้มีโครงสร้างโมเลกุลแบบเดียวกันกับเครื่องดื่มมึนเมาที่ได้รับความนิยม"
 DISTAR_SOOTHE_CAT:0 "คริสตัลสั่นพ้อง"
 DISTAR_SOOTHE_CAT_DESC:0 "ผลสแกนของ [From.GetName] เผยให้เห็นเปลือกโลกทวีปที่เต็มไปด้วยคริสตัลสั่นพ้อง เราอาจจะสามารถนำพวกมันมาใช้ประโยชน์ได้บ้าง"
 DISTAR_SOOTHE_GC_CAT:0 "สนามแม่เหล็กดึงดูดใจ"
 DISTAR_SOOTHE_GC_CAT_DESC:0 "สนามแม่เหล็กโลก(คลื่นแม่เหล็กไฟฟ้า)ของ [From.GetName] นั้นดึงดูดใจโดรนวิจัยในวงโคจรของเราเป็นอย่างมากด้วยเหตุผลที่พวกมันไม่สามารถอธิบายได้ เราควรจะทำการสำรวจเพิ่มเติม"
 DISTAR_EXO_CAT:0 "ม่านคลุมที่แปลกประหลาด"
 DISTAR_EXO_CAT_DESC:0 "ทวีปทั้งหมดบน [From.GetName] ถูกปกคลุมไปด้วยการเจริญเติบโตที่แปลกประหลาดซึ่งขัดกับพืชพรรณอื่น ๆ ของดาวเคราะห์ดวงนี้"
 DISTAR_ICE_CAT:0 "ค่าที่ตรวจวัดได้ไม่สอดคล้องกัน"
 DISTAR_ICE_CAT_DESC:0 "อุณหภูมิพื้นผิวที่วัดได้ของ [From.GetName] นั้นสูงถึงหลายร้อยองศา ทั้งที่มีพื้นผิวเป็นน้ำแข็งแข็งตัว อะไรเป็นสาเหตุของความไม่สอดคล้องกันเหล่านี้?"
 DISTAR_METAL_CAT:0 "เมฆหนาทึบที่ไม่อาจผ่านได้"
 DISTAR_METAL_CAT_DESC:0 "ชั้นบรรยากาศของ [From.GetName] สะท้อนเซ็นเซอร์ของเราที่ความถี่วิทยุ มีบางสิ่งข้างล่างนั้นกำลังรบกวนสัญญาณของเรา"
 DISTAR_OCEAN_CAT:0 "อุโมงค์ลึก"
 DISTAR_OCEAN_CAT_DESC:0 "ผลสแกนชี้ให้เห็นว่าระบบอุโมงค์ที่ซับซ้อนซ่อนอยู่ใต้น้ำของ [From.GetName] อะไรคือสิ่งที่สร้างพวกมันขึ้นมากันแน่?"
 DISTAR_COLLAPSE_CAT:0 "สถานีอวกาศที่ทรุดโทรม"
 DISTAR_COLLAPSE_CAT_DESC:0 "ด้วยร่องรอยความเสียหายจากการพุ่งชนของเศษซากมานานหลายศตวรรษ สถานีโบราณที่ทรุดโทรมลอยอยู่ในวงโคจร ติดตามอย่างเหนื่อยล้าหลัง [From.GetName] สภาพที่เก่าแก่ของที่นี่รวมถึงเทคโนโลยีที่ไม่รู้จักจะต้องให้ทีมผู้เชี่ยวชาญเข้าทำการสำรวจ"
 DISTAR_FOES_CAT:0 "คู่แฝดปริศนา"
 DISTAR_FOES_CAT_DESC:0 "ชนเผ่าพื้นเมืองดั้งเดิมที่ประทังชีวิตอยู่บนที่ราบเถ้าถ่านของ [From.GetName] มีความคล้ายคลึงอย่างน่าทึ่งกับกลุ่มคนกลุ่มที่ค้นพบบนโลกสุสาน(โลกของซอมบี้)อีกแห่งหนึ่งในระบบดาวเดียวกัน"
 DISTAR_DIAMOND_CAT:0 "ชีพจรความถี่หนักหน่วง"
 DISTAR_DIAMOND_CAT_DESC:0 "[From.GetName] ส่งสัญญาณชีพจรอย่างสม่ำเสมอ โครงสร้างการสั่นสะเทือน(ไฮลิโอสตี้)บ่งชี้ถึงองค์ประกอบภายในที่หนาแน่นกว่าที่คาดไว้มาก อะไรคือสิ่งที่ทำให้เกิดความหนาแน่นที่น่าประหลาดใจนี้กันแน่?"
 DISTAR_MOLTEN_CAT:0 "ช่องระบายภูเขาไฟ"
 DISTAR_MOLTEN_CAT_DESC:0 "แก๊สหลากหลายชนิดที่น่าทึ่งกำลังถูกระบายออกมาบน [From.GetName] - ซึ่งปกติแล้วจะไม่พบในโลกหลอมเหลว แก๊สเหล่านี้บางส่วนแสดงให้เห็นถึงมูลค่าทางอุตสาหกรรมที่มีอนาคตไกล"
 DISTAR_MERCURY_CAT:0 "โพรงถ้ำลึกใต้ดิน"
 DISTAR_MERCURY_CAT_DESC:0 "การบันทึกภาพภายในของ [From.GetName] บ่งบอกถึงโพรงถ้ำใต้ดินขนาดใหญ่ที่รออยู่ใต้พื้นผิวโลก พวกมันอาจมีค่าคู่ควรแก่การตรวจสอบ"
 DISTAR_WARFORM_CAT:0 "สิ่งปลูกสร้างปริศนา"
 DISTAR_WARFORM_CAT_DESC:0 "โครงสร้างประดิษฐ์บางประเภทโผล่พ้นออกมาจากระหว่างกลุ่มเมฆพิษของชั้นบรรยากาศของ [From.GetName]"
 DISTAR_BRAINSLUG_CAT:0 "ถิ่นฐานรกร้าง"
 DISTAR_BRAINSLUG_CAT_DESC:0 "ผลสแกนของ [From.GetName] เผยให้เห็นสิ่งที่ดูเหมือนจะเป็นถิ่นฐานที่ถูกละทิ้งของสังคมยุคดั้งเดิม ชะตากรรมแบบใดที่เกิดขึ้นกับผู้สร้างสถานที่เหล่านี้กันแน่?"
 DISTAR_THIRSTY_CAT:0 "หุบเหวไร้น้ำ"
 DISTAR_THIRSTY_CAT_DESC:0 "หุบเหวที่ลึกพอจะมองเห็นได้จากวงโคจรปรากฏเป็นร่องบนพื้นผิวของ [From.GetName] ทั้งที่ดาวเคราะห์ดวงนี้แห้งผากราวกับกล่องใส่ฝุ่นผง เกิดอะไรขึ้นกับน้ำที่ครั้งหนึ่งเคยแกะสลักหินของ [From.GetName] อย่างลึกซึ้งเช่นนี้?"
 DISTAR_FLYTRAP_CAT:0 "พืชพรรณขนาดยักษ์(เมกะฟรา)"
 DISTAR_FLYTRAP_CAT_DESC:0 "ชีวิตพืชที่มีสัดส่วนใหญ่โตอย่างไม่น่าเชื่อครอบคลุมทัศนียภาพของ [From.GetName] สีสันที่สดใสและขนาดที่ใหญ่โตมโหฬารราวกับจะร้องเรียกหาเหล่านักชีววิทยาต่างดาวของเรา"
 DISTAR_LIVING_CAT:0 "ทะเลที่คอยตามหลอกหลอน"
 DISTAR_LIVING_CAT_DESC:0 "มีบางสิ่งที่ผิดปกติ เกือบจะสะกดจิตเกี่ยวกับการพลิ้วไหวอย่างแผ่วเบาของทะเลที่ปกคลุม [From.GetName] การเคลื่อนไหวของมันไม่สอดคล้องกับพยากรณ์การขึ้นลงของน้ำทะเลที่รู้จักเลย"
 DISTAR_ZONE_CAT:0 "ซากปรักหักพังที่โดดเดี่ยว"
 DISTAR_ZONE_CAT_DESC:0 "เซ็นเซอร์ชี้ให้เห็นถึงจุดโครงสร้างประดิษฐ์ที่โดดเดี่ยวบน [From.GetName]"
 DISTAR_RAT_CAT:0 "เมืองหลวงที่พังทลาย"
 DISTAR_RAT_CAT_DESC:0 "การสำรวจเบื้องต้นของ [From.GetName] ชี้ให้เห็นว่าดาวเคราะห์ดวงนี้เป็นเมืองหลวงที่ล่มสลายของจักรวรรดิที่สูญหาย ซึ่งสุสานขยะของพวกมันเราเคยพบมาก่อนหน้านี้แล้ว การสืบสวนที่ละเอียดกว่านี้อาจให้ข้อมูลเพิ่มเติมได้"
 DISTAR_MED_CAT:0 "เรือบรรทุกสินค้าลึกลับ"
 DISTAR_MED_CAT_DESC:0 "เรือบรรทุกสินค้าที่ถูกละทิ้งซึ่งไม่ทราบแหล่งกำเนิดกำลังโคจรรอบ [From.GetName] อ่างเก็บน้ำของมันเต็มไปด้วยสารอินทรีย์บางชนิด"
 DISTAR_POD_CAT:0 "พ็อดส่งกำลังไม่ระบุชื่อ"
 DISTAR_POD_CAT_DESC:0 "ตอนแรกคิดว่าเป็นดาวเคราะห์น้อย วงแหวนของพ็อดส่งตัว(ดูดฝัก)ที่ไร้การเคลื่อนไหวกลับล้อมรอบ [From.GetName] อยู่"
 DISTAR_PHASE_CAT:0 "ดาวเคราะห์เหลื่อมมิติ"
 DISTAR_PHASE_CAT_DESC:0 "ค่าพลังงานที่เป็นปริศนาห่อหุ้มรอบ [From.GetName] ราวกับว่าดาวเคราะห์ดวงนี้กำลังแกว่งตัวเข้าออกจากการมีอยู่จริง"
 DISTAR_SOY_CAT:0 "ซากโบราณที่รกรุงรัง"
 DISTAR_SOY_CAT_DESC:0 "เซ็นเซอร์บ่งชี้ว่ามีโครงสร้างประดิษฐ์ฝังอยู่ใต้พืชพรรณที่อุดมสมบูรณ์บน [From.GetName]"
 DISTAR_SIGNAL_CAT:0 "สัญญาณรบกวน"
 DISTAR_SIGNAL_CAT_DESC:1 "เซ็นเซอร์ของยานตรวจพบรูปแบบการรบกวนสัญญาณที่ไม่มีคำอธิบายในระบบดาว [From.GetStarName]"
 DISTAR_PUZZLE_CAT:1 "วัตถุที่ไม่สามารถสแกนได้"
 DISTAR_PUZZLE_CAT_DESC:1 "วัตถุที่สะท้อนเซ็นเซอร์ของเราตั้งอยู่ในแถบดาวเคราะห์น้อย [From.GetStarName] ใกล้กับ [From.GetName] การสังเกตการณ์ด้วยสายตาจำแนกวัตถุดังกล่าวว่ามีรูปทรงหลายเหลี่ยม ทว่าเนื่องจากการขาดข้อมูลของเครื่องสแกน จึงยังไม่ทราบข้อมูลอื่นใดอีก"

 ####################################
 # Anomaly Events
 ####################################

 distar.1.name:0 "ระบุซากปรักหักพังแล้ว"
 distar.1.desc:0 "ลูกเรือของเราบน [Root.GetName] รายงานว่าซากเรืออับปาง [From.GetName] ดูเหมือนจะเป็นผลมาจากพายุสุริยะแม่เหล็กโลกที่ไม่ได้คาดคิด ยานเสบียงต้องสูญเสียระบบพยุงชีพไปทั้งหมดและได้รับความเสียหายจนไม่อาจใช้งานได้ ล่องลอยจนกระทั่งเข้าสู่บ่อแรงโน้มถ่วงของ [From.GetName] ไม่มีผู้รอดชีวิต\n\nห้องเก็บสินค้าของยานมีปริมาณแร่อยู่จำนวนหนึ่งจริง ๆ"
 distar.1.desc.contact: "$distar.1.desc$ - อย่างไรก็ตาม กัปตันของ [Root.GetName] เตือนว่าโครงสร้างชี้ว่าเป็นสถาปัตยกรรมการออกแบบของ §Y[wreckage_owner.GetAdj]§!\n\nมีความเป็นไปได้สูงมากที่แร่เหล่านี้จะเป็นของ §Y[wreckage_owner.GetName]§! และพวกเขาอาจจะไม่พอใจหากเราแสดงสิทธิ์อ้างสิทธิ์ในตู้สินค้านี้"
 distar.1.desc.nocontact: "$distar.1.desc$."
 distar.1.a:0 "เราต้องการแร่เหล่านั้น"
 distar.1.a.tooltip:0 "สิ่งนี้จะทำให้ §Y[wreckage_owner.GetName]§! ไม่พอใจ"
 distar.1.b:0 "เราจะไม่เสี่ยงต่อความขัดแย้งที่จะเกิดขึ้น"
 distar.1.b.tooltip:0 "นำแร่คืนกลับไปให้ §Y[wreckage_owner.GetName]§!\nสิ่งนี้จะทำให้พวกเขาพอใจ และเพิ่ม £influence£ §Hอิทธิพล§! ของเรา"
 distar.2.name:0 "สินค้าจากซากยานเสบียง"
 distar.2.desc:0 "ชาว [Root.GetSpeciesNamePlural] ทางเราได้รับทราบข่าวว่ายานเสบียงของ §Y[wreckage_owner.GetAdj]§! ที่สูญหายได้รับความเสียหายร้ายแรงระหว่างทางไปยัง §Y[wreckage_owner.Capital.GetName]§! และลอยลำเข้าสู่พื้นที่อวกาศของ [Root.GetAdj] ซึ่งสินค้าของมันถูกลักขโมยไปในทันทีอย่างไม่มีพิธีรีตอง\n\nพวกเจ้าคิดจริง ๆ หรือว่าการล่วงละเมิดนี้จะไม่มีใครสังเกตเห็น? ทาง §Y[wreckage_owner.GetName]§! ขอเรียกร้องให้มีการชดใช้ค่าเสบียงของเราโดยทันที"
 distar.2.desc.machi:0 "ชาว [Root.GetSpeciesNamePlural] ทางเราได้รับทราบข่าวว่ายานเสบียงของ §Y[wreckage_owner.GetAdj]§! ที่สูญหายได้รับความเสียหายร้ายแรงระหว่างทางไปยัง §Y[wreckage_owner.Capital.GetName]§! เซ็นเซอร์ของเรารายงานว่ายานของเราเคลื่อนเข้าสู่ระบบดาว [From.From.GetName] ซึ่งพวกเจ้าได้นำสินค้าไปใช้ประโยชน์ของตนเอง\n\nยอมรับไม่ได้ คืนสินค้าของเรามาโดยทันที เจ้าพวก [Root.GetSpeciesNamePlural]"
 distar.2.a:0 "ยานขนส่ง? ยานขนส่งอะไร?"
 distar.2.b:0 "เราจะส่งคืนของของคุณ"
 distar.3.name:0 "ซากสินค้าถูกส่งคืน"
 distar.3.desc:0 "ชาว [Root.GetSpeciesNamePlural]! เราได้รับข่าวสารเกี่ยวกับสินค้าของยานเสบียงที่ตกของเราแล้ว เราขอแสดงความขอบคุณต่อพวกท่านที่สละเวลาในการเก็บกู้มันกลับคืนมา โดยไม่ต้องให้ทาง [wreckage_owner.GetAdj] เข้ามาแทรกแซง"
 distar.3.a:0 "ด้วยความยินดี, [wreckage_owner.GetSpeciesNamePlural]"

 distar.6.name:0 "แช่แข็งในกาลเวลา"
 distar.6.desc:0 "คณะลูกเรือของ [Root.GetName] รู้สึกสนใจเป็นอย่างยิ่งที่ได้พบซากที่หลงเหลือของอารยธรรมยุคปฏิวัติอุตสาหกรรมบน [From.GetName] การสืบสวนระบุว่า [From.GetName] เคยมีชั้นบรรยากาศมานานหลายล้านปี จนกระทั่งการปะทุของพายุสุริยะขนาดยักษ์(Superflares)จากพื้นผิวที่ไร้เสถียรภาพของดาวฤกษ์ [From.GetStarName] ส่งผลให้เกิดการแตกตัวเป็นไอออนอย่างรุนแรงและสูญเสียแก๊สในชั้นบรรยากาศของดาวเคราะห์ไปทั้งหมด\n\nเมื่อไม่มีชั้นบรรยากาศ เมืองที่ไร้สิ่งมีชีวิตบน [From.GetName] จึงถูกแช่แข็งตามกาลเวลามานานหลายพันปี ยืนหยัดเป็นอนุสรณ์สถานอันเงียบสงบสำหรับการสูญพันธุ์ครั้งใหญ่ที่เกิดขึ้นที่นั่น\n\nเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] เตือนว่าอาณานิคมใด ๆ ในระบบดาว [From.GetStarName] อาจตกเป็นเหยื่อจากความผันผวนของพายุสุริยะดวงนี้ได้"
 distar.7.name:0 "พายุสุริยะขนาดยักษ์"
 distar.7.desc:0 "เซ็นเซอร์บน [Root.GetName] บ่งชี้ว่า [Root.GetStarName] กำลังแสดงความปั่นป่วนที่พื้นผิวแบบทั่วไปที่เกิดขึ้นก่อนพายุสุริยะขนาดยักษ์(ซูปเปอร์เฟลอ)เมื่อพิจารณาจากชะตากรรมของอารยธรรมโบราณบน [frozen_in_time_planet.GetName] คณะ [Root.Owner.GetScientistPlural] ของเรากำลังเร่งวางแผนประดิษฐ์เกราะเมทริกซ์ที่สามารถทนทานต่อการพวยพุ่งของพลาสมาขนาดมหึมาที่กำลังจะเกิดขึ้นได้"
 distar.7.desc.nocol:0 "เซ็นเซอร์ตรวจพบการส่องสว่างพุ่งสูงขึ้นอย่างรวดเร็วของ [Root.GetStarName] ดูเหมือนว่าดาวฤกษ์กำลังเผชิญกับพายุสุริยะขนาดยักษ์(ซูปเปอร์เฟลอ)ไม่ต่างจากดวงที่ทำลายอารยธรรมบน [frozen_in_time_planet.GetName]\n\nอย่างไรก็ตาม โชคดีสำหรับเราที่ไม่มีอาณานิคมของ [Root.GetAdj] ที่จะได้รับผลกระทบจากความปั่นป่วนทางสุริยะนี้"
 distar.7.a:0 "เราต้องปกป้องประชากรของเรา!"
 distar.7.b:0 "เข้าใจแล้ว"
 distar.9.name:0 "สร้างเกราะป้องกันพายุสุริยะขนาดยักษ์สำเร็จ"
 distar.9.desc:0 "ฝ่ายบริหารดาวเคราะห์มีความยินดีที่จะรายงานว่าการพัฒนาเกราะป้องกันพายุสุริยะรอบ [Root.GetName] ประсบความสำเร็จอย่างสมบูรณ์ พลเมืองอาณานิคมของเราไม่เพียงได้รับการปกป้องอย่างปลอดภัยจากรังสีแตกตัวที่เป็นอันตรายเท่านั้น แต่ยังได้ชมการแสดงแสงเหนือ-แสงใต้(ออร่า)ที่งดงามตระการตาในขณะที่ลมสุริยะมีปฏิสัมพันธ์กับเกราะป้องกันใหม่นี้อีกด้วย"
 distar.10.name:1 "พายุสุริยะขนาดยักษ์พุ่งชน [fromfromfrom.GetName]"
 distar.10.desc:1 "พายุสุริยะขนาดยักษ์จาก [fromfromfrom.GetStarName] ได้พุ่งเข้าชนชั้นบรรยากาศชั้นบนของ [fromfromfrom.GetName] เนื่องมาจากความล้มเหลวของเราในการพัฒนาเกราะป้องกันที่เหมาะสมได้ทันเวลา\n\nพลาสมาแตกตัวและพายุแม่เหล็กทำให้เกิดการหยุดชะงักของระบบอิเล็กทรอนิกส์ทั่วทั้งพื้นผิวดาวเคราะห์ รบกวนการผลิตพลังงานและทำให้ประชากรได้รับรังสี ผลกระทบเหล่านี้จะคงอยู่เป็นระยะเวลาหนึ่ง"

 distar.15.name:0 "สเปกตรัมพลังงานสูง"
 distar.15.desc:0 "องค์ประกอบแก๊สของจานพอกพูนมวลรอบ ๆ [From.GetName] ดูเหมือนจะเป็นตัวการที่ทำให้เกิดความคลาดเคลื่อนสี(เสียงเครื่องยนต์)บนหลุมดำ ตัวจานทำหน้าที่หักเหและสะท้อนแสงบนพื้นผิว สร้างภาพลวงตาคล้ายรุ้งกินน้ำในความมืดมิด\n\nแม้ว่าตัวรุ้งกินน้ำนั้นจะเป็นเพียงภาพลวงตา ทว่าสภาพการณ์ที่สร้างมันขึ้นมากลับมีอยู่จริง จานพอกพูนมวลของ [From.GetName] มีระดับพลังงานที่สูงมาก - แหล่งกำเนิดการปล่อยประจุไฟฟ้าสถิตที่แท้จริง"

 distar.20.name:0 "ภาพโฮโลแกรม"
 distar.20.desc:0 "การสืบสวนสัญญาณกองยานที่ไม่รู้จักในระบบดาว [From.GetName] เผยให้เห็นการค้นพบที่คาดไม่ถึง ในความเป็นจริงแล้ว กองยานนี้ไม่ได้ลอยลำอยู่ในวงโคจรที่ปลอดภัยรอบหลุมดำ แต่พวกมันกำลังเคลื่อนข้ามขอบฟ้าเหตุการณ์(ขอบฟ้า)ของหลุมดำ\n\nเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] สันนิษฐานว่ากองยานนี้เคยเคลื่อนเข้าใกล้ขอบฟ้าเหตุการณ์ของ [From.GetName] เมื่อหลายศตวรรษก่อน ส่งผลให้การยืดออกของเวลา(เวลาขยาย)ทิ้งภาพลักษณ์ของพวกมันให้ตรวจจับได้บนพื้นผิวหลุมดำ\n\nการกระทำของกองยานนี้เป็นความตั้งใจ หรือผลของอุบัติเหตุที่น่าเศร้า เราอาจจะไม่มีวันทราบได้เลย สัญญาณของพวกเขาไม่ตรงกับอารยธรรมใด ๆ ที่มีในฐานข้อมูลบันทึกไว้"

 distar.25.name:0 "หุ่นยนต์ขั้นพื้นฐาน"
 distar.25.desc:0 "ในการศึกษาพื้นผิวของ [From.GetName] คณะลูกเรือของ [Root.GetName] ได้ค้นพบซากปรักหักพังของอารยธรรมยุคแรกเริ่มสำรวจอวกาศ แม้จะไม่มีประชากรที่ยังมีชีวิตหลงเหลืออยู่จากอารยธรรมนี้แล้ว ทว่าดาวเคราะห์ดวงนี้ยังคงมีหุ่นยนต์ขั้นพื้นฐานที่พวกเขาเคยสร้างขึ้นอาศัยอยู่\n\nหุ่นยนต์เหล่านี้ยังคงทำหน้าที่ตามบทบาทของตน ซ่อมแซมโครงสร้างพื้นฐานที่ผุพังของผู้สร้างที่เสียชีวิตไปนานแล้วอย่างไม่รู้จักเหน็ดเหนื่อย\n\nผู้ตั้งถิ่นฐานในอนาคตอาจจะสามารถนำแรงงานหุ่นยนต์โบราณเหล่านี้ไปใช้งานได้ หากไม่มีสิ่งอื่นใดแล้ว พวกมันก็ได้พิสูจน์ตัวเองอย่างแน่นอนว่ามีความทนทานสูง"
 distar.25.a.tooltip:0 "ตรวจพบประชากรจักรกล £pop£ §HMechanical Pops§! จำนวน §G300§! รายบน [From.GetName]"
 distar.25.b.tooltip:0 "ตรวจพบประชากรจักรกล £pop£ §HMechanical Pops§! จำนวน §G400§! รายบน [From.GetName]"
 distar.26.name:0 "หุ่นยนต์ขั้นพื้นฐาน"
 distar.26.desc:0 "ชาวอาณานิคมของเราบน [Root.GetName] จำเป็นต้องรับมือกับหุ่นยนต์โบราณบนพื้นผิวของดาวเคราะห์ ซึ่งเราสันนิษฐานว่าพวกมันถูกทิ้งไว้เมื่อชะตากรรมบางอย่างที่เกิดขึ้นกับผู้สร้างได้เว้นชีวิตพวกมันไว้\n\nหุ่นยนต์เก่าแก่เหล่านี้จำนวนมากตอบสนองต่อการมีอยู่ของเรา โดยส่งคำถามซ้ำ ๆ ในภาษาเอเลี่ยน เราเชื่อว่าพวกมันกำลังรอคอยคำสั่งอินพุต พวกมันดูเหมือนจะไม่มีความรู้คิด และมีแนวโน้มสูงที่จะขาดฟังก์ชันการใช้เหตุผลขั้นสูง"
 distar.26.a:0 "นำพวกมันไปทำงาน"
 distar.26.a.tooltip:0 "ได้รับประชากรจักรกล £pop£ §HMechanical Pops§! บน [Root.GetName]"
 distar.26.b:0 "แยกชิ้นส่วนพวกมันเพื่อเอาแร่ธาตุ"
 distar.26.c:0 "นโยบายของเราห้ามการใช้ AI ด้วยเหตุผลบางประการ"
 distar.26.d:0 "เราไม่มีความจำเป็นต้องใช้พวกมัน ทว่าการทำลายล้างทิ้งก็น่าเสียดายเกินไป"
 distar.26.d.tooltip:0 "ขับไล่ประชากรจักรกล £pop£ §HMechanical Pops§! ออกไปจาก [Root.GetName]"
 distar.26.spir:0 "เราไม่สามารถอยู่ร่วมกับสิ่งไร้วิญญาณได้"
 distar.26.mach:0 "พวกมันจะได้รับการบูรณาการเข้าร่วมกัน"
 distar.27.name:0 "ผู้สร้างที่สูญหาย"
 distar.27.desc:0 "คณะ [Root.Owner.GetScientistPlural] ชาว [Root.Owner.GetAdj] ได้แสดงความสนใจในการศึกษาหุ่นยนต์โบราณบน [Root.GetName] และความล่มสลายของอารยธรรมที่สร้างพวกมันขึ้นมา จนถึงตอนนี้ นักวิจัยยังไม่พบหลักฐานยืนยันที่ชัดเจนว่าสิ่งใดทำลายล้างผู้สร้างหุ่นยนต์ - ปริศนานี้ยิ่งซับซ้อนขึ้นเมื่อช่วงเวลาหลายศตวรรษได้เปลี่ยนซากสิ่งมีชีวิตใด ๆ ให้กลายเป็นฝุ่นผงไปนานแล้ว\n\nการตรวจสอบดาวเคราะห์ได้ตัดประเด็นเรื่องการทำลายล้างด้วยอาวุธนิวเคลียร์และสงครามขนาดใหญ่ในฐานะเหตุการณ์สูญพันธุ์ออกไป แต่เหตุผลเบื้องหลังการหายตัวไปของพวกเขาก็ยังคงคลุมเครือ\n\nนักวิจัยแนะนำให้เริ่มการศึกษาฮาร์ดแวร์ของหุ่นยนต์โบราณอย่างละเอียดเพื่อพยายามรวบรวมข้อมูลเชิงลึกเพิ่มเติม"
 distar.27.a:0 "เราจะนำไปพิจารณา"
 distar.28.name:0 "ผู้สร้างที่สูญหาย"
 distar.28.desc:0 "การดึงข้อมูลที่เรากู้คืนมาจากไดรฟ์เก็บข้อมูลที่ชำรุดของหุ่นยนต์ดั้งเดิมบน [From.From.GetName] พิสูดน์แล้วว่าวิเคราะห์พาร์สได้ยาก ข้อมูลในนั้นไม่สามารถประมวลผลได้อย่างสมบูรณ์โดยเครือข่ายประสาท(เครือข่ายแห่งชาติ)ของเรา แม้ว่าความเก่าแก่ของอุปกรณ์จะเป็นเพียงส่วนหนึ่งของสาเหตุที่ทำให้ข้อมูลไม่ปะติดปะต่อกันก็ตาม เรารู้เพียงว่าดูเหมือนจะมีเชื้อโรคระบาดทางชีวภาพบางชนิดรุกรานสิ่งมีชีวิตอินทรีย์ผู้สร้างหุ่นยนต์ดั้งเดิมบน [From.From.GetName] เมื่อหลายศตวรรษก่อน ในท้ายที่สุด ผู้ติดเชื้อต่างร้องขอความตาย"
 distar.28.a:0 "ข้อบกพร่องอีกประการหนึ่งของสิ่งมีชีวิตอินทรีย์"
 distar.29.name:0 "ผู้สร้างที่สูญหาย"
 distar.29.desc:0 "ในระหว่างการสแกนเชิงลึกต่อหุ่นยนต์ดั้งเดิมบน [From.From.GetName] [Root.GetLeaderName] สามารถระบุตระหนักถึงยูนิตเครื่องหนึ่งที่มีประวัติการบันทึก(บันทึก)บางประการในส่วนกักเก็บข้อมูล ข้อมูลส่วนใหญ่ได้รับความเสียหายจากการเสื่อมสภาพของฮาร์ดแวร์ แต่รายการจดบันทึกที่น่าสนใจหลายรายการได้รับการกู้คืนและแปลเป็นที่เรียบร้อย"
 distar.29.a:0 "ขอดูหน่อย"
 distar.30.name:0 "ประวัติบันทึกข้อมูลที่เสียหาย"
