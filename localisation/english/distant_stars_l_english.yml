 distar.51.more:0 "พวกนี้มันแย่ทั้งหมดเลย เราควรคิดชื่อที่ดีกว่านี้"
 distar.52.name:0 "อะมีบาวัยเยาว์ที่พลัดหลง"
 distar.52.desc:0 "นักวิจัยรายงานว่าอะมีบาอวกาศวัยเยาว์ที่พลัดหลงซึ่งพบใกล้ [From.From.GetName] ไม่ได้ติดตามกองยานวิทยาศาสตร์ของเราอีกต่อไปแล้ว หลังจากติดตามมาหลายสัปดาห์ มีรายงานว่าอะมีบาวัยเยาว์ตัวนี้ได้เข้าสู่ไฮเปอร์เลนผ่านความสามารถไฮเปอร์ไดรฟ์ทางชีวภาพของมัน บางทีมันอาจจะจำพื้นที่ได้ หรือสัมผัสได้ถึงตัวอื่น ๆ ในสายพันธุ์เดียวกัน หรือมันอาจจะเหนื่อยล้าจากการไล่ตามยานของเราแล้ว\n\nแม้ว่ายานของเราจะหลีกเลี่ยงการปฏิสัมพันธ์กับอะมีบาวัยเยาว์ตามคำสั่ง แต่การสแกนแบบพาสซีฟก็นำไปสู่การค้นพบบางอย่างเกี่ยวกับสรีรวิทยาของสิ่งมีชีวิตนี้"
 distar.53.name:0 "การผ่าพิสูจน์อะมีบาวัยเยาว์"
 distar.53.desc.base:0 "การผ่าพิสูจน์อะมีบาอวกาศวัยเยาว์เสร็จสิ้นแล้ว แม้ว่าส่วนใหญ่ของร่างกายจะถูกทำลายไปในระหว่างการสงบศึก แต่การวิเคราะห์ทางชีววิทยาต่างดาวของซากที่เหลือเผยให้เห็นคุณสมบัติการฟื้นฟูตนเองอย่างน่าทึ่ง"
 distar.53.desc.lacks_tech:0 "$distar.53.desc.base$\n\nพูดง่าย ๆ ก็คือ สิ่งมีชีวิตนี้ไม่ได้ฟื้นฟูตัวเองผ่านการแบ่งเซลล์เท่านั้น แต่ยังได้รับความช่วยเหลือจากแบคทีเรียที่มีฐานเป็นซิลิคอนซึ่งทำหน้าที่สร้างเนื้อเยื่ออินทรีย์ขึ้นใหม่ด้วย\n\nด้วยการดัดแปลงข้อมูลทางพันธุกรรมของแบคทีเรียนี้ เราอาจสามารถควบคุมความสามารถในการฟื้นฟูของมันเพื่อใช้ออกแบบโครงสร้างเกราะยานที่ซ่อมแซมตัวเองได้ แม้ว่ากระบวนการจะดำเนินไปอย่างช้า ๆ ก็ตาม"
 distar.53.desc.has_tech:1 "$distar.53.desc.base$\n\nสิ่งนี้สอดคล้องกับงานวิจัยก่อนหน้านี้ของเราเกี่ยวกับความสัมพันธ์แบบพึ่งพาอาศัยกันระหว่างอะมีบาอวกาศและแบคทีเรียฐานซิลิคอนที่ซ่อมแซมเนื้อเยื่อส่วนที่เสียหายของพวกมัน ซึ่งเราได้นำมาดัดแปลงเป็นเทคโนโลยีเกราะยานฟื้นฟูตัวเองแล้ว"
 distar.54.name:0 "อะมีบาวัยเยาว์หลบหนี"
 distar.54.desc:0 "เนื่องจากเราขาดความกระตือรือร้นในการจับตัวอะมีบาอวกาศวัยเยาว์มาผ่าพิสูจน์ ดูเหมือนว่ามันจะหลบหนีไปแล้ว เซนเซอร์รายงานว่าอะมีบาวัยเยาว์ตัวนี้ใช้ไฮเปอร์ไดรฟ์ทางชีวภาพบางอย่างและหายไปจากระบบเมื่อไม่กี่ชั่วโมงก่อน"
 distar.55.name:0 "ความหมายของชื่อ"
 distar.55.desc:0 "มาสคอตที่ไม่มีชื่อจะเป็นอย่างไร? เราต้องตั้งฉายาที่คู่ควรกับพันธมิตรอะมีบาของเรา"
