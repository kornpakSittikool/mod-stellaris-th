# ANOMALY EVENTS:
# The Vechtar Zavonia Chain
 distar.1000.name:0 "ยานเวช ทาร์ ซา โว เนีย"
 distar.1000.desc:0 "ซากยานที่โคจรรอบ [From.GetName] คือทั้งหมดที่หลงเหลือจาก Vechtar Zavonia ยานอวกาศขนส่งประชากรรุ่นสู่รุ่นที่มีความเร็วต่ำกว่าแสง ซึ่งเป็นของเผ่าพันธุ์ต่างดาวผู้เลื่อมใสศรัทธาในศาสนาอย่างลึกซึ้งชื่อว่า Mardak Vol\n\nแม้ว่ายานลำนี้จะถูกกวาดล้างสิ่งมีชีวิตทั้งหมดอย่างโหดเหี้ยม แต่การเดินทางอันแสนอับโชคของชาว Mardak ได้รับการบันทึกอย่างละเอียดในบันทึกของกัปตัน หลังจากถูกล่าจนเกือบสูญพันธุ์โดยสิ่งมีชีวิตฝันร้ายที่เรียกว่า 'Vessels' พวกเขาได้หลบหนีจากดาวบ้านเกิดเพื่อออกตามหาดาวเคราะห์สวรรค์ที่ห่างไกล - ดินแดนแห่งพันธสัญญาในตำนาน พาริไดดา (Paridayda) ซึ่งจะเปิดเผยตัวเองต่อผู้ที่ถูกเลือกเท่านั้น ทว่าเมื่อตัดสินจากสภาพของยานแล้ว ผู้โจมตีคงจะไล่ตามพวกมันทัน\n\nเราจะกู้คืนข้อมูลคอมพิวเตอร์การนำทางของยานและถอดรหัสพิกัดปลายทางหรือไม่?"
 distar.1000.a:0 "เจ้าบอกว่าเป็นดาวเคราะห์สวรรค์อย่างนั้นหรือ..."
 distar.1000.b:0 "ปฏิเสธ"
 distar.1001.name:0 "โลกที่ซ่อนเร้น"
 distar.1001.desc:0 "การถอดรหัสอัลกอริทึมบนคอมพิวเตอร์การนำทางของยานเวช ทาร์ ซา โว เนียไม่ใช่เรื่องง่ายเลย แต่ต้องขอบคุณหัวหน้านักวิจัย [vechtar_zavonia_leader_name.GetName] ผู้ซึ่งมีความหมกมุ่นเป็นพิเศษในการค้นหาโลกยูโทเปียของชาวโวลต์มาดัคในที่สุดเราก็ทำสำเร็จ\n\nและสิ่งที่น่ากังวลยิ่งกว่าคือ การค้นพบนี้ได้รั่วไหลไปสู่สาธารณะ ซึ่งบัดนี้พลเมืองต่างพากันยึดติดกับการตั้งถิ่นฐานบนดาวเคราะห์สวรรค์ร่วมกับ [vechtar_zavonia_leader_name.GetName] ด้วย"
 distar.1001.a:0 "ไม่มีสิ่งใดสามารถขัดขวางเราจากการเข้าสู่สรวงสวรรค์ได้"
 distar.1001.b:0 "ยกเลิก ภารกิจนี้เป็นเพียงการกระทำที่เขลาเบาปัญญา"
 distar.1002.name:0 "สวรรค์ที่สูญหาย"
 distar.1002.desc:0 "หลังจากตรวจสอบพิกัดของคอมพิวเตอร์นำทางซ้ำแล้วซ้ำอีกสองถึงสามครั้ง เราจำเป็นต้องยอมรับความจริงว่า ตรงจุดที่ควรจะเป็นดาวเคราะห์สวรรค์ของชาวโวลต์มาดัคนั้น มีเพียงที่ราบอันแห้งแล้งของโลกที่รกร้างว่างเปล่า\n\nแม้ว่าเราจะไม่สามารถตัดความเป็นไปได้ที่แนวคิดเรื่องสวรรค์ของชาวมาดัคจะแตกต่างจากเราอย่างสิ้นเชิง แต่พื้นผิวที่เต็มไปด้วยร่องรอยของระเบิดบน [utopian_planet.GetName] บ่งบอกเรื่องราวที่แตกต่างออกไป กัปตันและลูกเรือไม่ได้มองข้ามความผิดหวังครั้งนี้ไปง่าย ๆ"
 distar.1002.a:0 "นี่มันเป็นไปไม่ได้! ตรวจสอบพิกัดซ้ำอีกสี่ครั้งซิ!!"
 distar.1002.b:0 "กลับสู่โลกแห่งความเป็นจริงกันเถอะ..."
 distar.1003.name:0 "ความงดงามระดับไร้ที่ติ"
 distar.1003.desc:2 "ในที่สุดเราก็เปิดเผยความลับของชาวโวลต์มาดัคสำเร็จแล้ว!\n\nมันเริ่มต้นขึ้นเมื่อยานสำรวจที่มุ่งหน้าไปยังพื้นผิวดาวเคราะห์ ได้สะท้อนกลับจากชั้นบรรยากาศ ทำให้ลูกเรือเริ่มสงสัยว่า [utopian_planet.GetName] ไม่ได้เป็นอย่างที่เห็น การศึกษาอย่างใกล้ชิดพบว่าสิ่งที่ดูเหมือนพื้นผิวดาวเคราะห์ แท้จริงแล้วคือเกราะพลังงานที่ฉายลวดลายของโลกที่แห้งแล้งทับไว้ และภายใต้เกราะนั้นคือดาวเคราะห์เกอาอันเขียวชอุ่มที่ชวนให้นึกถึงคำทำนายของชาวมาดัค\n\nแต่นั่นยังไม่ใช่ทั้งหมด! เมื่อลูกเรือปิดการทำงานของเกราะป้องกัน พวกเขาได้ค้นพบอารยธรรมยุคหินที่รักสงบ ซึ่งประกอบด้วยการอยู่ร่วมกันแบบพึ่งพาอาศัยกันระหว่างสัตว์เลี้ยงลูกด้วยนมและเชื้อราที่อาศัยอยู่ในกระท่อมที่สร้างขึ้นอย่างหยาบ ๆ โดยไม่รับรู้ถึงโลกภายนอกเลย ส่วนพวก\"วิสเซิล\"ในฝันร้ายมีตัวตนอยู่เพียงในฐานะสิ่งมีชีวิตในตำนานของพวกเขาเท่านั้น"
 distar.1003.a:0 "ชาวโวลต์มาดัคยังมีชีวิตอยู่!"
 distar.1003.b:0 "นั่นเป็นดาวเคราะห์ที่สวยงามดวงหนึ่งเลย..."
 distar.1004.name:0 "แดนสวรรค์ที่เป็นความลับ"
 distar.1004.desc:3 "[country_that_discovered_mardak_vol.GetName] ได้ค้นพบสังคม [GetPreFTLLower] ที่เป็นความลับซึ่งซ่อนอยู่บนดาวเกอาภายในอาณาเขตของเรา ดาวเคราะห์ดวงนี้ดูเหมือนจะได้รับการป้องกันด้วยสนามพลังงานที่ซับซ้อนบางชนิด ทำให้ดูเหมือนว่ามันเป็นโลกที่แห้งแล้งทั้งที่ความจริงไม่ใช่ เรายังระบุไม่ได้ว่าใครเป็นคนซ่อนมันและซ่อนด้วยเหตุใด เนื่องจากชาว [GetPreFTLLowerPlural] ขาดแคลนเทคโนโลยีในการทำเช่นนี้ด้วยตนเองอย่างเห็นได้ชัด พวกเขาดูเหมือนจะเป็นสิ่งมีชีวิตร่วมอาศัยระหว่างเชื้อราและสัตว์เลี้ยงลูกด้วยนม และเท่าที่เราสามารถบอกได้ พวกเขาไม่มีอันตรายใด ๆ เลย"
 distar.1004.a:0 "อย่าเพิ่งตัดสินดาวเคราะห์จากภายนอก"
 distar.1005.name:0 "การส่งสัญญาณ"
 distar.1005.desc_a:0 "เราได้รับการติดต่อจากเผ่าพันธุ์สัตว์เลี้ยงลูกด้วยนมที่มีสติปัญญาซึ่งไม่เคยพบเจอมาก่อน เกี่ยวกับชาวโวลต์มาดัคโบราณที่ยังคงอาศัยอยู่บน [utopian_planet.GetName] ดูเหมือนจะเป็นเรื่องเร่งด่วนมาก"
 distar.1005.desc_b:1 "เรากําลังถูกยกย่องโดยสายพันธุ์ที่ไม่เคยมีใครรู้จัก ของสัตว์เลี้ยงลูกด้วยนมเกี่ยวกับ[GetPreFTLLowerPlural]ที่พักบน[utopian_planet.GetName]มันดูเร่งด่วนมาก"
 distar.1006.desc:0 "ยินดีที่ได้พบกันชาว [From.GetSpeciesNamePlural] พวกเราคือชาวโวลต์และเรามาอย่างสันติ\n\nเราค้นพบว่าดาวเคราะห์ดวงหนึ่งของคุณถูกรุกรานด้วยสิ่งมีชีวิตประเภทราปรสิตมาดัคมันเป็นราต่างดาวที่เป็นปรสิตซึ่งคอยล่าพวกพ้องของเรามานานหลายยุคหลายสมัย เปลี่ยนโฮสต์ให้กลายเป็นหุ่นเชิดที่ไร้สมอง และพวกคุณคือเป้าหมายต่อไปของมัน!\n\nเราคิดว่าเราได้กำจัดมันไปจนสิ้นซากแล้ว จนกระทั่งการสแกนแกแล็กซี่ประจำปีของเราเผยให้เห็นประชากรที่กำลังเติบโตบน [utopian_planet.GetName] แต่ไม่ต้องกังวลไป เรารู้ดีว่าต้องทำอย่างไร..."
 distar.1006.a:0 "ชำระล้างพวกมันด้วยไฟงั้นหรือ!?"
 distar.1006.b:0 "ไร้สาระ พวกเขาไม่มีอันตรายเลยสักนิด!"
 distar.1006.c:0 "พวกคุณห้ามทำร้ายพวกเขาเด็ดขาด!"
 distar.1008.desc:0 "โปรดทราบ: เรากำลังจะเริ่มโปรโตคอลการกำจัดจากวงโคจรใน 3, 2, 1... ปล่อยสารละลายแพร่กระจายทางอากาศ Fungo-X ลงสู่ประชากรที่ติดเชื้อแล้ว กำจัดตัวการที่เป็นภัยคุกคามเรียบร้อย!\n\nไม่ต้องตื่นตระหนกไป การเปลี่ยนแปลงทางสิ่งแวดล้อมใด ๆ ที่คุณอาจจะตรวจพบนั้นไม่ใช่เรื่องชั่วคราวและไม่สามารถย้อนคืนกลับมาได้เลยโดยสิ้นเชิง...\n\nเราขอขอบคุณสำหรับความร่วมมือของคุณ\n\nพวกเราคือชาวโวลต์เรามาอย่างสันติ\n\nสันติภาพ..."
 distar.1008.a:0 "มันเสร็จสิ้นแล้ว..."
 distar.1008.b:0 "การเปลี่ยนแปลงทางสิ่งแวดล้อมอย่างนั้นหรือ??"
 distar.1009.desc:0 "เจ้าพวก [From.GetSpeciesNamePluralInsult] สติปัญญาต่ำต้อย! เจ้าคิดว่าจะรู้สึกอย่างไรเมื่อตื่นมาพบว่ามีมาดัคฝังตัวอยู่ใน [From.GetSpeciesOrganName] ของเจ้า และเนื้อหนังของเจ้ากำลังสั่นสะท้าน จิตใจของเจ้าแตกร้าวขณะที่เชื้อราเข้าควบคุมระบบประสาทของเจ้าก่อน จากนั้นก็ยึดครองร่างกายทั้งหมดของเจ้าทีละเซลล์?\n\nโชคดีสำหรับเจ้า เจ้าพวก [From.GetSpeciesNamePluralInsult] วันนั้นจะไม่มีวันเกิดขึ้นจริง เราไม่สามารถยอมให้เกิดขึ้นได้\n\nพวกเราคือชาวโวลต์เราจะกลับมา... อย่างสันติ"
 distar.1009.a:0 "ตกลง..."
 distar.1011.name:0 "§Rคำเตือนการรุกล้ำอาณาเขต!§!"
 distar.1011.desc:0 "เราตรวจพบกองยานที่เป็นศัตรู ซึ่งมีสัญญาณการสื่อสารของชาวโวลต์กำลังมุ่งหน้าตรงไปยัง [utopian_planet.GetName] ดูเหมือนว่าพวกเขามาเพื่อกำจัดชาวมาดัคที่ยังคงอาศัยอยู่บนดาวเคราะห์ดวงนี้...\n\nพวกเขาไม่ตอบรับสัญญาณการติดต่อของเราเลย"
 distar.1011.a:0 "ไม่ดีแน่..."
 distar.1013.desc:0 "ช่องสัญญาณเสียงส่งเสียงดังเปรี๊ยะ ๆ เราสูญเสียการเชื่อมต่อกับชาวโวลต์แล้ว"
 distar.1013.a:0 "พวกเขาตัดการติดต่อแล้ว!!"
 distar.1014.name:0 "ในแดนสวรรค์"
 distar.1014.desc:1 "ในที่สุดเราก็ได้ตั้งถิ่นฐานบนดาวเคราะห์สวรรค์ปา ริ ดาของชาวโวลต์มาดัคแล้ว และพลเมืองของเราต่างยินดีเมื่อคิดว่าวันหนึ่ง [From.Owner.GetSpeciesSpawnNamePlural] ของพวกเขาจะได้วิ่งเล่นอย่างสนุกสนานท่ามกลางเนินทราย สวนอันเขียวชอุ่ม และน้ำพุคริสตัลของ [utopian_planet.GetName]!!"
 distar.1014.a:0 "ได้เวลาเสียที..."
 distar.1014.b:0 "เดี๋ยวเราจะได้รู้กัน..."
 # Star Lifting
 distar.1020.name:0 "การไหลออกที่ขับเคลื่อนด้วยพลังงานความร้อน"
 distar.1020.desc:0 "การตรวจสอบสถานีโคจรรอบ [From.GetName] อย่างใกล้ชิดเผยให้เห็นว่ามันมีโครงสร้างการออกแบบของต่างดาวที่ซับซ้อนและแปรปรวนเล็กน้อย เครื่องจักรที่มีเกราะกันน้ำและการควบคุมสภาพภูมิอากาศขั้นสูงชี้ให้เห็นว่ามันถูกสร้างขึ้นสำหรับสิ่งมีชีวิตที่มีการหลั่งของเหลวออกมาในปริมาณมาก ซึ่งมีความเป็นไปได้สูงที่จะเป็นประเภทมอลลัสคอยด์(พึมพํา)\n\nก่อนที่จะชำรุดเสียหาย ลำแสงไมโครเวฟเคยถูกใช้เพื่อทำความร้อนในพื้นที่ชั้นบรรยากาศของดาวฤกษ์ ซึ่งกระตุ้นให้เกิดการปะทุขนาดใหญ่ที่ต่อเนื่อง ส่งผลให้ลมสุริยะไหลออกเพิ่มขึ้นอย่างมาก จากนั้นพลังงานจะถูกเก็บเกี่ยวด้วยสถานีขุดเจาะวงโคจร\n\nสถานีนี้ได้รับการออกแบบโดยอิงตามแนวคิดเชิงทดลองขั้นสูง"
 distar.1020.a:0 "ซ่อมแซมสถานี"
 distar.1020.c:0 "นำลำแสงมาพัฒนาเป็นอาวุธ"
 distar.1020.b:0 "จากไป"
 distar.1021.name:0 "เล่นกับไฟ"
 distar.1021.desc:0 "หลังจากการซ่อมแซมอย่างครอบคลุม สถานีได้รับการเปิดใช้งานออนไลน์แล้ว และดาวฤกษ์กำลังปล่อยพลังงานมหาศาลเข้าสู่อวกาศ ทว่าการเดินทางครั้งนี้ไม่ได้ปราศจากอุปสรรค\n\nเมื่อลำแสงไมโครเวฟยักษ์ถูกเปิดใช้งานเป็นครั้งแรก เหล่าวิศวกรเกือบจะจุดชนวนปฏิกิริยาลูกโซ่ที่อาจลงเอยด้วยการปะทุของดวงอาทิตย์ที่มีขนาดใหญ่โตมากจนสามารถระเบิดทำลายสถานีและดาวเคราะห์ทั้งหมดในระบบให้หายไปในพริบตา ปรากฏว่าพิมพ์เขียวและคู่มือโบราณของต่างดาวเต็มไปด้วยการคำนวณที่ผิดพลาดร้ายแรง จนทำให้สถานีไม่สามารถใช้งานได้\n\nโชคดีที่มีการตรวจพบความผิดพลาดได้ทันเวลา ความแรงของลำแสงได้รับการปรับเทียบใหม่ตั้งแต่นั้นมา และการไหลออกของลมสุริยะก็ได้รับการรักษาเสถียรภาพเรียบร้อยแล้ว"
 distar.1021.a:0 "แบตเตอรี่สุริยะ สำหรับพวกเราโดยเฉพาะ!"
 distar.1021.b:0 "อืม พวกมอลลัสก์ ร่างกายนุ่มนิ่ม สมองก็นุ่มนิ่มไปด้วย..."
 distar.1022.name:0 "ลำแสงไมโครเวฟมอลลัสคอยด์"
 distar.1022.desc.a:0 "ใช้เวลาไม่นานสำหรับลูกเรือของยาน [star_lifting_ship.GetName] ในการสรุปว่าการออกแบบสถานีพลังงานดวงดาวนั้นเป็นผลงานของคนบ้า ตามคำพูดของเจ้าหน้าที่วิทยาศาสตร์ [star_lifting_leader.GetName] เอง ลำแสงไมโครเวฟนั้นหยาบและขาดการปรับเทียบที่ถูกต้อง ซึ่งต้องการการปรับปรุงอีกมากก่อนที่จะทำงานได้ตามที่ตั้งใจไว้ ทว่า ในไม่ช้าพวกมันก็พิสูจน์แล้วว่าเป็นอาวุธที่ยอดเยี่ยม"
 distar.1022.desc.b:0 "ความพยายามของเราในการนำลำแสงไมโครเวฟของมอลลัสคอยด์มาพัฒนาเป็นอาวุธประสบความล้มเหลว... อย่างงดงาม เมื่อเปิดใช้งาน ปรากฏว่าการออกแบบลำแสงนั้นมีข้อบกพร่องเกินกว่าจะเข้าใจได้ และทีมงานวิทยาศาสตร์สามารถหลบหนีออกจากสถานีได้อย่างหวุดหวิดก่อนที่มันจะระเบิดเป็นรูปดอกเห็ดขนาดยักษ์อันแสดงถึงความล้มเหลวทางวิทยาศาสตร์"
 distar.1022.a:0 "ยอดเยี่ยม"
 distar.1022.b:0 "หายนะสิ้นดี"
 distar.1022.c:0 "พวกมอลลัสคอยด์เหล่านั้นไม่ควรริอ่านมาทำวิทยาศาสตร์เลย..."
 # The Big RIP
 distar.1030.name:0 "สถานีสังเกตการณ์ที่ถูกทิ้งร้าง"
 distar.1030.desc:1 "หน่วยเก็บข้อมูลของสถานีสังเกตการณ์ทั้งหมดถูกล้างข้อมูลออกหมด และมีความพยายามอย่างมากในการกำจัดหลักฐานใด ๆ ที่อาจสาวกลับไปถึงเจ้าของของมันได้ เห็นได้ชัดว่ามีบางอย่างผิดปกติเกิดขึ้นบน [big_rip_planet.GetName] สัญญาณเดียวของสิ่งมีชีวิตมีสติปัญญาคือซากปรักหักพังที่กำลังพังทลายของมหานครที่สร้างเสร็จเพียงครึ่งเดียว ซึ่งดูเหมือนจะถูกละทิ้งไปในระหว่างการก่อสร้าง กระจัดกระจายอยู่ทั่วพื้นผิว และวิหารโฮโลแกรมขนาดยักษ์ที่ตั้งตระหง่านอยู่ท่ามกลางซากเหล่านั้น"
 distar.1030.a:0 "สืบสวน"
 distar.1030.b:0 "จากไป"
 distar.1031.name:1 "พายุเกรย์เทมเพสต์"
 distar.1031.desc:1 "แม้ว่าพวกเขาจะพยายามรักษาความลับอย่างเต็มที่ แต่ร่องรอยการแทรกแซงอันเงอะงะของผู้สังเกตการณ์ก็มีอยู่ทั่วไปบน [big_rip_planet.GetName]...\n\nหลักฐานชี้ให้เห็นว่า ดาวเคราะห์ดวงนี้เคยเป็นที่อยู่อาศัยของจิตสำนึกร่วมที่เชื่อมโยงทางจิตไซโอนิกของสิ่งมีชีวิตจำพวกพืช(พลันตอยด์)ซึ่งกำลังอยู่ในช่วงตื่นรู้ทางศาสนา เมื่อเผ่าพันธุ์ต่างดาวลึกลับที่ถูกเรียกว่า 'ผู้พิทักษ์ประตู(ยาม)ได้ลงมาหาพวกเขาโดยไม่มีการเตือนล่วงหน้า นับตั้งแต่นั้นมา พวกพืชก็เริ่มหมกมุ่นอยู่กับแนวคิดเรื่องวันสิ้นโลกที่กำลังจะเกิดขึ้นซึ่งเรียกว่า 'พายุเกรย์เทมเพสต์'( เสียงเกรย์เทมเพสต์)'ศาสนาที่เคยรักสงบของพวกเขาก็กลายพันธุ์เป็นลัทธิฆ่าตัวตายในเวลาต่อมา ภายในเวลาเพียงไม่กี่เดือน หนึ่งในสิ่งมีชีวิตที่เก่าแก่ที่สุดในแกแล็กซี่ดวงนี้ก็ได้เหี่ยวเฉาตายไปเพราะความกลัววันสิ้นโลกที่ไม่มีวันมาถึง แม้ว่าจะมีความพยายามช่วยรดน้ำประทังชีวิตหลายต่อหลายครั้งก็ตาม"
 distar.1031.a:0 "ช่างวุ่นวายเสียจริง..."
 distar.1031.b:0 "ขอให้ไปสู่สุคติ เหล่าดอกไม้อันบอบบาง..."
 # Bunker-Bot
 distar.1040.name:0 "บังเกอร์บ็อต(Bunker-Bot)"
 distar.1040.desc:0 "เราได้ตามรอยรังสีแม่เหล็กไฟฟ้าที่ผิดปกติซึ่งแผ่ออกมาจาก [From.GetName] ไปยังบังเกอร์ใต้ดินที่เป็นความลับ ซึ่งซ่อนเมกะคอมพิวเตอร์ขนาดเท่ากับเรือรบประจัญบานเอาไว้\n\nเหล่า [Owner.GetResearchers] ของเราคาดเดาว่ามันอาจจะอยู่ที่นั่นมาหลายพันปีแล้ว ทำงานอย่างหนักเพื่อแก้ปัญหาที่ซับซ้อนเพียงปัญหาเดียว ซึ่งธรรมชาติของปัญหานั้นยังคงเป็นปริศนาสำหรับเรา\n\nเมื่อพยายามที่จะโต้ตอบกับคอมพิวเตอร์ พวกเขาค้นพบว่าสิ่งปลูกสร้างนี้ ซึ่งดูเหมือนจะถูกทิ้งร้างและไม่มีการป้องกัน แท้จริงแล้วทำงานโดย AI รักษาความปลอดภัย ซึ่งมีจุดประสงค์สูงสุดคือการกำจัดผู้มาเยือนด้วยความรุนแรงสูงสุด เมื่อ AI พ่ายแพ้ในที่สุด มันได้ส่งข้อความไปยังผู้รับที่ไม่รู้จัก"
 distar.1040.a:0 "แยกชิ้นส่วนเมกะคอมพิวเตอร์เพื่อเอาอะไหล่!"
 distar.1040.a.tooltip:0 "คอมพิวเตอร์ที่ล้มเหลวในการแก้ปัญหาเพียงข้อเดียวตลอดหนึ่งพันปี จะมีประโยชน์ต่อเรามากกว่าในฐานะตัวยานลำใหม่..."
 distar.1040.b:0 "ใช้มันเพื่อเพิ่มพูนงานวิจัยของเรา..."
 distar.1040.b.tooltip:0 "การดำเนินการนี้กำหนดให้เราต้องปิดการทำงานของ AI ที่คอยดูแลรักษาสิ่งปลูกสร้าง และจะทำให้คอมพิวเตอร์ชำรุดเสียหายในอนาคตอันใกล้"
 distar.1040.c:0 "ปล่อยให้มันคำนวณปริศนาของมันต่อไป..."
 distar.1040.c.tooltip:0 "เราอย่าไปรบกวนมันจะดีกว่า ไม่ว่าปัญหาที่คอมพิวเตอร์กำลังพยายามแก้นั้นคืออะไร มันดูเหมือนจะมีความสำคัญ..."
 # Atomic Clock
 distar.1045.name:0 "42 ปี กับอีก 3 วัน"
 distar.1045.desc:0 "การสแกนพื้นที่เศษซากรอบ [From.GetName] อย่างละเอียด ได้นำไปสู่การค้นพบแคปซูลสุญญากาศที่บรรจุนาฬิกาอะตอมซึ่งวัดเวลาด้วยความแม่นยำอย่างไม่มีใครเทียบได้\n\nมันมีความคลาดเคลื่อนของความถี่ต่ำมากจนต้องใช้เวลาอีก 879 ล้านปีกว่าเวลาจะเดินเร็วขึ้นเพียงหนึ่งวินาที และมันกำลังนับถอยหลังสู่วันที่ที่อยู่ห่างออกไปอีก 42 ปี กับอีก 3 วัน แคปซูลนี้ไม่มีเบาะแสใด ๆ ว่าวันที่นี้หมายถึงอะไรหรือใครเป็นเจ้าของมัน แต่ดูเหมือนว่าจะมีใครบางคนในอวกาศกว้างใหญ่นี้ลืมเวลาไปเสียแล้ว..."
 distar.1045.a:0 "คอยเฝ้าสังเกตมันไว้"
 distar.1045.b:0 "มันคือระเบิด!! ทำลายมันซะ!!"
 distar.1045.a.tooltip:0 "ติ๊กต่อก, ติ๊กต่อก..."
 distar.1045.b.tooltip:0 "แคปซูลนี้เต็มไปด้วยสายไฟที่ดูไม่มีพิษมีภัย ซึ่งอาจจะถูกต่อเข้ากับอาวุธทำลายล้างสูงที่มีอานุภาพร้ายแรงจนสามารถกวาดล้างแกแล็กซี่นี้ทั้งหมดได้! ลูกเรือจะตัดสายไฟเหล่านั้นให้หมด!!"
 # Eat or be Eaten
 distar.1050.name:0 "กินหรือถูกกิน"
 distar.1050.desc:1 "ลอยอยู่ตรงบริเวณขอบนอกของพื้นที่เศษซากรอบ [From.GetName] คือซากยานวิทยาศาสตร์ที่พังยับเยินของเผ่าพันธุ์ที่ไม่สามารถระบุได้ ร่องรอยของรอยเคี้ยวและน้ำย่อยบนตัวยานบ่งชี้ว่ามันถูกบดเคี้ยวแล้วสำรอกออกมาโดยสิ่งมีชีวิตผู้ล่าขนาดมหึมาบางชนิด\n\nแต่ที่น่าตลกคือ ลูกเรือของยานลำนี้กำลังอยู่ระหว่างการเดินทางเพื่อแสวงหาเมนูอาหารอันเลิศรสแปลกใหม่ของตนเอง แต่สุดท้ายพวกเขากลับลงเอยด้วยการเป็นหนึ่งในเมนูอาหารเสียเอง\n\nพวกเขาได้จัดอันดับสิ่งมีชีวิตจำนวนมหาศาล ตั้งแต่คุณค่าทางโภชนาการไปจนถึงความเหนียวเคี้ยวง่าย หนึ่งในเป้าหมายอันดับต้น ๆ ของพวกเขาคือชาว [delicious_aliens.GetSpeciesNamePlural] เนื่องจากมี [delicious_aliens.GetSpeciesOrganName] ที่ฉ่ำน้ำและนิสัยที่ดุเดือดเผ็ดร้อน ส่วนพวกเราได้อันดับแย่ ๆ อยู่ที่ท้ายตารางเนื่องจากเนื้อที่เหนียวและเป็นเหยื่อที่จืดชืดไร้รสชาติ บางทีผู้ล่าบางตัวก็ชอบเล่นกับอาหารของมันก่อนกิน..."
 distar.1050.desc_lithoid:1 "ลอยอยู่ตรงบริเวณขอบนอกของพื้นที่เศษซากรอบ [From.GetName] คือซากยานวิทยาศาสตร์ที่พังยับเยินของเผ่าพันธุ์ที่ไม่สามารถระบุได้ ร่องรอยของรอยเคี้ยวและน้ำย่อยบนตัวยานบ่งชี้ว่ามันถูกบดเคี้ยวแล้วสำรอกออกมาโดยสิ่งมีชีวิตผู้ล่าขนาดมหึมาบางชนิด\n\nแต่ที่น่าตลกคือ ลูกเรือของยานลำนี้กำลังอยู่ระหว่างการเดินทางเพื่อแสวงหาเมนูอาหารอันเลิศรสแปลกใหม่ของตนเอง แต่สุดท้ายพวกเขากลับลงเอยด้วยการเป็นหนึ่งในเมนูอาหารเสียเอง\n\nพวกเขาได้จัดอันดับสิ่งมีชีวิตจำนวนมหาศาล ตั้งแต่คุณค่าทางโภชนาการไปจนถึงความเหนียวเคี้ยวง่าย หนึ่งในเป้าหมายอันดับต้น ๆ ของพวกเขาคือชาว [delicious_aliens.GetSpeciesNamePlural] เนื่องจากมี [delicious_aliens.GetSpeciesOrganName] ที่ฉ่ำน้ำและนิสัยที่ดุเดือดเผ็ดร้อน ส่วนพวกเราถูกจัดไว้ในหมวดหมู่พิเศษสุดที่ก้นตารางซึ่งรายล้อมไปด้วยเครื่องหมายดอกจัน เนื่องจากเนื้อของเราไม่สามารถกินได้เลยโดยสิ้นเชิงและเป็นเหยื่อที่จืดชืดไร้รสชาติ บางทีผู้ล่าบางตัวก็ชอบเล่นกับอาหารของมันก่อนกิน..."
 distar.1050.a:0 "ดูเหมือนว่าในที่สุดพวกเขาก็ได้เจอคู่ปรับที่สมน้ำสมเนื้อแล้ว..."
 distar.1050.b.evopred: "จัดอันดับตามรสชาติแทนที่จะเป็นความซับซ้อนงั้นหรือ? ช่างประหลาดแท้"
 # The Cube
 distar.1055.name:0 "ลูกบาศก์ปริศนา"
 distar.1055.desc:2 "ท่ามกลางซากยานอวกาศร้างที่โคจรรอบ [From.GetName] เราได้ค้นพบยานวิจัยของเอเลี่ยนที่อยู่ในสภาพเกือบสมบูรณ์ บันทึกของยานเผยให้เห็นว่ามันประสบปัญหาระบบฮาร์ดแวร์ขัดข้องขั้นวิกฤตและติดค้างอยู่ในอวกาศเป็นเวลา 142 วัน ก่อนที่ลูกเรือทั้งหมดจะเสียชีวิตจากการขาดสารอาหาร\n\nศพของกัปตันถูกพบบนเตียงนอนของเขาโดยในมือยังคงกำลูกบาศก์โลหะขนาดเล็กไว้แน่น ซึ่งแต่ละด้านมีสีต่างกันและแบ่งออกเป็นเก้าช่องสี่เหลี่ยมเท่า ๆ กันที่สามารถหมุนได้ [Root.Owner.GetScientist] [cube_science_officer.GetName] มั่นใจว่าหากหมุนมันให้อยู่ในรูปแบบที่ถูกต้อง ลูกบาศก์จะเปิดออกและเผยให้เห็นสมบัติที่ซ่อนอยู่ภายใน"
 distar.1055.a:1 "หมุนช่องเหล่านั้นเลย, [Root.Owner.GetScientist]!"
 distar.1055.b:0 "ปล่อยมันไว้แบบนั้นเถอะ"
 distar.1056.name:0 "หั่นครึ่ง"
 distar.1056.desc:0 "ลูกเรือบน [From.GetName] ได้ทดสอบลูกบาศก์โลหะนี้ด้วยทุกอัลกอริทึมการถอดรหัสที่เรารู้จัก แต่ผลลัพธ์ที่ได้กลับมีเพียงความเงียบงัน\n\n"มันคือรหัสลับงั้นหรือ? หรือเป็นภาชนะบรรจุสิ่งของมีค่ากันแน่?" "หากไม่มีความหมายใด ๆ ซ่อนอยู่เบื้องหลังลูกบาศก์นี้ แล้วอะไรคือความหมายของสิ่งใด ๆ เล่า?" คือความคิดบางส่วนที่แล่นผ่านจิตใจอันทำงานหนักเกินไปของเจ้าหน้าที่วิทยาศาสตร์ [cube_science_officer.GetName] ก่อนที่ [cube_science_officer.GetSheHe] จะหยิบเลเซอร์ออกมาแล้วทำการหั่นลูกบาศก์ และ [cube_science_officer.GetHerHis] [From.Owner.GetSpeciesHandName] ขวาออกเป็นสองซีก ลูกบาศก์นั้นว่างเปล่า"
 distar.1056.a:0 "โอ้ พระช่วย..."
 distar.1056.a.tooltip:0 "[cube_science_officer.GetName] จะไม่มีวันเหมือนเดิมอีกต่อไป"
 # Honeymooners
 distar.1060.name:0 "คู่ฮันนีมูน"
 distar.1060.desc:0 "ดูเหมือนว่าเราจะบังเอิญไปพบกับพื้นที่ผสมพันธุ์ของสัตว์เลี้ยงลูกด้วยนมไร้ขนสายพันธุ์หนึ่งที่ไม่ได้มีถิ่นกำเนิดในท้องถิ่น สามารถสังเกตเห็นพวกมันเกี้ยวพาราสีกันในช่วงเย็น ตามด้วยการจับคู่แนบชิดกันบนหาดทรายในตอนกลางคืน ภายใต้ฤทธิ์ของสารมึนเมาหลายประเภท\n\nแต่น่าเสียดาย การที่พวกมันมองเห็นยานของเราโดยบังเอิญทำให้พวกมันตื่นตกใจ และได้อพยพออกจากดาวเคราะห์ดวงนี้ไปด้วยยานอวกาศเชิงพาณิชย์ ทิ้งกองขยะเอาไว้เบื้องหลัง ท่ามกลางขยะเหล่านั้น เราได้พบสำเนาคู่มือนักเดินทางท่องแกแล็กซี่ของต่างดาว \"A Hitchhiker's Guide to the Galaxy\" (คู่มือนักเดินทางท่องแกแล็กซี่) ซึ่งระบุถึงสถานที่ท่องเที่ยวและปรากฏการณ์ต่าง ๆ มากมายที่ยังไม่เป็นที่รู้จักสำหรับเรา"
 distar.1060.a:0 "คู่มือนี้จะทำหน้าที่เป็นแรงบันดาลใจให้แก่ประชาชนของเรา!"
 distar.1060.b:0 "พวกเอเลี่ยนแสนสกปรก! ประชาชนของเราต้องรับรู้ว่าพวกมันชอบทิ้งขยะ เดินเตร็ดเตร่ และสร้างภาระเพียงใด"
 distar.1060.c:0 "ตอนนี้เราควรปิดบังการค้นพบนี้ไว้ก่อนจะดีกว่า..."
 distar.1060.d:0 "น่ารังเกียจชะมัด!"
 # Hologram
 distar.1065.name:0 "ดาวเคราะห์ลวงตา"
 distar.1065.desc:1 "[From.GetName] ไม่ใช่ดาวเคราะห์เลย แต่เป็นภาพฉายสามมิติ(3 มิติ)ที่มีความซับซ้อนสูง ตรงกลางของมันมีเครื่องโปรเจกเตอร์ที่สร้างสนามพลังจำลองวัตถุทางกายภาพและแรงดึงดูดได้อย่างแนบเนียนจนทำให้เซนเซอร์ของเราเข้าใจผิดคิดว่าเป็นดาวเคราะห์จริง ๆ ส่งผลให้เกิดข้อมูลที่ผิดปกติขึ้นมา เราได้แต่คาดเดาว่าทำไมบางคนถึงต้องลงแรงสร้างสิ่งลวงตาเพื่อจำลองดาวเคราะห์ขึ้นมาในตำแหน่งนี้ แต่น่าเศร้าที่เครื่องโปรเจกเตอร์ไม่ได้รอดพ้นจากการทดลองของเรา"
 distar.1065.a:0 "แปลกประหลาด..."
 # Star Crazy
 distar.1070.name:0 "รูปแบบดาวฤกษ์"
 distar.1070.desc:1 "ข้อมูลการตรวจจับล่าสุดจาก [From.GetName] แสดงให้เห็นว่าดาวฤกษ์เกิดการสั่นพัลส์เป็นจังหวะสม่ำเสมอ แต่เมื่อลูกเรือของ [Root.GetName] เดินทางมาถึงสถานที่จริง กลับไม่มีหลักฐานใด ๆ ที่จะสนับสนุนข้อมูลดังกล่าว แม้ว่าลูกเรือส่วนใหญ่จะเห็นพ้องกันว่าความผิดปกตินี้เกิดจากเซนเซอร์ขัดข้อง แต่เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] กลับปัดทฤษฎีนี้ทิ้ง [Root.GetLeaderName] อ้างว่าได้ค้นพบรูปแบบการแผ่พลังงานสั่นพัลส์ที่คล้ายกันนี้ในที่อื่น ๆ และตอนนี้เริ่มกังวลว่ามีบางอย่างที่ผิดปกติเกิดขึ้นกับดาวฤกษ์ในแกแล็กซี่ พวกเขาจึงได้กำหนดเส้นทางมุ่งหน้าไปยังดาวฤกษ์ที่ได้รับผลกระทบดวงถัดไปที่ใกล้ที่สุดแล้ว"
 distar.1070.a:0 "เราต้องค้นหาความจริงของเรื่องนี้ให้ได้..."
 distar.1070.b:0 "มันเป็นเพียงแค่ความขัดข้องของระบบ"
 distar.1071.name:0 "ช่วงเวลาสั้น ๆ ตรงนั้น..."
 distar.1071.desc:0 "หลังจากเก็บตัวครุ่นคิดอย่างหนักอยู่สองสามวัน เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ก็พร้อมยอมรับว่าตนเองทำผิดพลาดไป ไม่มีรูปแบบที่ซ่อนอยู่ในการสั่นพัลส์ของดาวฤกษ์อันไกลโพ้น ไม่มีเจตนาร้ายอันน่าสะพรึงกลัวทางอภิปรัชญาใด ๆ ดังที่ [Root.GetLeaderName] อธิบายไว้ว่า:\n\n§Y'มันเป็นเพียงแค่ความหวาดระแวงธรรมดา ๆ ไร้เหตุผล แปรปรวน และไม่เหมาะสมกับการเป็นนักวิทยาศาสตร์อย่างยิ่ง'§!\n\nแม้ว่าความผิดพลาดครั้งนี้จะน่าอับอายเพียงใด แต่มันก็ไม่ได้ไร้ประโยชน์ไปเสียหมด เพราะความขัดแย้งภายในจิตใจของ [Root.GetLeaderName] ได้นำไปสู่การเรียนรู้และเข้าใจตนเองที่มีคุณค่า"
 distar.1071.a:0 "ดีแล้ว เรื่องนั้นจะได้คลี่คลายเสียที"
 distar.1072.name:0 "เซนเซอร์ขัดข้อง"
 distar.1072.desc:0 "เมื่อลูกเรือเดินทางมาถึง [anomalous_star.GetName] พวกเขาสามารถยืนยันได้ว่าเซนเซอร์ขัดข้องจริง ๆ ข่าวดีก็คือ ไม่เพียงแต่การประเมินการปล่อยพลังงานของดาวฤกษ์ในตอนแรกจะต่ำกว่าความเป็นจริงอย่างมากเท่านั้น ดูเหมือนว่า [From.GetLeaderName] จะได้เรียนรู้จากความผิดพลาดในอดีตด้วย"
 distar.1072.a:0 "ความล้มเหลวเป็นเพียงก้าวแรกสู่ความสำเร็จ"
 distar.1072.b:0 "ช่างเสียเวลาเสียจริง..."
 distar.1073.name:0 "ดาวฤกษ์คลั่ง"
 distar.1073.desc:2 "ลูกเรือของ [From.GetName] ได้ทำการค้นพบที่น่าเศร้า เป็นไปตามที่พวกเขาคาดไว้ รูปแบบการสั่นพัลส์ที่เราตรวจพบจาก [anomalous_star.GetName] แท้จริงแล้วเกิดจากความขัดข้องทางประสาทสัมผัส... ในสมองของเจ้าหน้าที่วิทยาศาสตร์ [crazy_science_officer.GetName] เอง\n\nพฤติกรรมของเจ้าหน้าที่วิทยาศาสตร์เปลี่ยนเป็นแปรปรวน [crazy_science_officer.GetHeSheCap] มีอาการหลงผิดว่าดาวฤกษ์กำลังส่งสัญญาณเตือนภัยที่เข้ารหัสเกี่ยวกับวันสิ้นโลกที่กำลังจะมาถึง - และเชื่อว่าตนเองได้รับการแต่งตั้งเป็นผู้พิทักษ์แห่งราชอาณาจักร ลูกเรือเชื่อว่า [crazy_science_officer.GetSheHe] ทำการแก้ไขข้อมูลเซนเซอร์ของยานด้วย [crazy_science_officer.GetHerselfHimself] เองในระหว่างเกิดอาการทางจิตดังกล่าว\n\nบัดนี้เจ้าหน้าที่วิทยาศาสตร์ [crazy_science_officer.GetName] อยู่ในพอตการแพทย์เพื่อส่งตัวกลับไปยัง [Root.Capital.GetName] ซึ่ง [crazy_science_officer.GetSheHe] จะได้รับการรักษาที่เหมาะสมต่อไป"
 distar.1073.a:1 "ขอบคุณสำหรับการทำงานของคุณ, ผู้พิทักษ์แห่งราชอาณาจักร [crazy_science_officer.GetName]!"
 distar.1073.b:0 "ขอให้โชคดีนะ, [crazy_science_officer.GetName]"
 distar.1070.a.tooltip:1 "ระยิบระยับดาวดวงน้อย..."
 test_event_targets.desc:0 "[country_event_target.GetName] [ship_event_target.GetName] [leader_event_target.GetName] [planet_event_target.GetName]"
 # Azizians
 distar.1080.name:0 "เสียงตะโกนอันเงียบงัน"
 distar.1080.desc.a:1 "เราได้ค้นพบซากฟอสซิลของแกสโทรพอด (หอยทาก) ขนาดมหึมา ซึ่งไม่ตรงกับสิ่งมีชีวิตใด ๆ ที่เคยพบมาก่อน ถูกแช่แข็งอยู่ภายในก้อนน้ำแข็งขนาดยักษ์ที่โคจรรอบ [From.GetName] ดวงตาของมันจ้องมองไปข้างหน้าอย่างเกรี้ยวกราด หนวดชูขึ้น และปากบิดเบี้ยวเป็นสีหน้าบูดบึ้งน่าสยดสยอง ราวกับติดอยู่ในเสียงตะโกนอันเงียบงัน สิ่งมีชีวิตนี้ไม่แสดงสัญญาณของการมีสติปัญญาใด ๆ"
 distar.1080.desc.b:0 "เราได้ค้นพบซากฟอสซิลของแกสโทรพอด (หอยทาก) ขนาดมหึมา ซึ่งไม่ตรงกับสิ่งมีชีวิตใด ๆ ที่เคยพบมาก่อน ถูกแช่แข็งอยู่ภายในก้อนน้ำแข็งขนาดยักษ์ที่โคจรรอบ [From.GetName] ดวงตาของมันจ้องมองไปข้างหน้าอย่างเกรี้ยวกราด หนวดชูขึ้น และปากบิดเบี้ยวเป็นสีหน้าบูดบึ้งน่าสยดสยอง ราวกับติดอยู่ในเสียงตะโกนอันเงียบงัน สิ่งมีชีวิตนี้ไม่แสดงสัญญาณของการมีสติปัญญาใด ๆ\n\nแม้ว่ามันจะมีรูปลักษณ์ที่น่าขนลุก แต่นักวิทยาศาสตร์ของเราเชื่อว่าหากเรานำมันมาฝึกให้เชื่องได้ มันอาจจะเป็นทรัพยากรที่มีค่า พวกเขาแนะนำให้สกัดดีเอ็นเอของมันบางส่วนเพื่อนำมาทำโคลนนิ่ง"
 distar.1080.desc.c:0 "เราได้ค้นพบซากฟอสซิลของแกสโทรพอด (หอยทาก) ขนาดมหึมา ซึ่งไม่ตรงกับสิ่งมีชีวิตใด ๆ ที่เคยพบมาก่อน ถูกแช่แข็งอยู่ภายในก้อนน้ำแข็งขนาดยักษ์ที่โคจรรอบ [From.GetName] ดวงตาของมันจ้องมองไปข้างหน้าอย่างเกรี้ยวกราด หนวดชูขึ้น และปากบิดเบี้ยวเป็นสีหน้าบูดบึ้งน่าสยดสยอง ราวกับติดอยู่ในเสียงตะโกนอันเงียบงัน สิ่งมีชีวิตนี้ไม่แสดงสัญญาณของการมีสติปัญญาใด ๆ\n\nแต่น่าเสียดาย ในปัจจุบันเรายังขาดแคลนเทคโนโลยีที่จะชุบชีวิตมันกลับมาได้"
 distar.1080.a:0 "ทำโคลนมันขึ้นมา"
 distar.1080.b:0 "ปล่อยไอ้ตัวประหลาดนี้ออกสู่อวกาศซะ!"
 distar.1080.c:0 "มันควรจะอยู่ในพิพิธภัณฑ์"
 distar.1080.d.evopred: "มื้ออาหารแช่เย็นอย่างดี ช่างสดชื่นอะไรเช่นนี้!"
 distar.1081.name:0 "ชาวอาซิเซียน(ภาษาอะซิเซียน)"
 distar.1081.desc:0 "เราได้โคลนประชากรหอยทากยักษ์ที่แข็งแรงสำเร็จจากฟอสซิลดีเอ็นเอ พวกมันเจริญเติบโตเต็มที่ภายในเวลาไม่กี่สัปดาห์ โดยมีน้ำหนักมากถึง 20 ตัน และมีสติปัญญาระดับเริ่มต้น สามารถตอบสนองต่อคำสั่งพยางค์เดียวง่าย ๆ ได้ แม้ว่าพวกมันจะยังไม่แสดงพฤทีพฤติกรรมรุนแรงใด ๆ แต่พวกมันจะผลิตเมือกพิษสีเข้มข้นออกมาเมื่อโกรธ และสีผิวของมันดูเหมือนจะเปลี่ยนไปตามอารมณ์ ทีมวิจัยได้ตั้งชื่อพวกมันว่า 'ชาวอาซิเซียน'(ชาวอะซิเซียน)'ตามเสียงขู่ฟ่อที่เป็นเอกลักษณ์ซึ่งพวกมันใช้สื่อสารกันเอง"
 distar.1081.a:0 "พวกมันจะมาเป็นแรงงานที่ยอดเยี่ยม"
 distar.1081.a.tooltip:0 "เพิ่มประชากร §Hป๊อปภาษาแอซิเชียน§! จำนวน §Y400§! £pop£ ไปยัง [This.GetName]"
 distar.1081.b:0 "พวกมันควรจะอยู่ในสวนสัตว์"
 distar.1081.c:0 "เราสามารถใช้พวกมันในกองทัพได้"
 distar.1080.c.tooltip:0 "ใครล่ะจะไม่ต้องการกองทัพทากนักฆ่าไว้คอยบดขยี้ศัตรูของตนเอง?"
 distar.1081.d:1 "พวกมันน่าเกลียดน่ากลัวมาก กำจัดพวกมันซะ เดี๋ยวนี้!"
 distar.1081.d.evopred: "เราเห็นมามากพอแล้ว เชือดพวกมันตอนนี้เลย"
 distar.1083.name:0 "ชาวอาซิเซียนหลุดออกมาแล้ว!"
 distar.1083.desc:0 "แกสโทรพอด (ทากยักษ์) ชาวอาซิเซียนที่ถูกเลี้ยงไว้ในสวนสัตว์บน [Root.GetName] ได้หลุดออกมาก่อความวุ่นวาย! สิ่งมีชีวิตเหล่านี้ ซึ่งเดิมทีเชื่อว่าเติบโตเต็มที่แล้ว กลับเติบโตขึ้นอย่างต่อเนื่องในกรงเลี้ยงจนมีขนาดมหึมา พวกมันเคลื่อนที่ทำลายล้างเมือง ชนตึกรามบ้านช่องล้มลงเหมือนตัวต่อเกม ทิ้งร่องรอยเมือกพิษสีเหลืองสดเอาไว้เบื้องหลัง ดาวเคราะห์ดวงนี้จะไม่วันเหมือนเดิมอีกต่อไป"
 distar.1083.a:0 "พวกมันบังอาจดีอย่างไร!?"
 distar.1083.b:0 "เราประเมินพวกมันต่ำเกินไป..."
 distar.1084.name:0 "ภูมิปัญญาอาซิเซียน"
 distar.1084.desc:0 "แรงงานชาวอาซิเซียนบน [Root.GetName] ได้พัฒนาสติปัญญาอย่างสมบูรณ์แล้ว สิ่งมีชีวิตเหล่านี้ที่เคยเข้าใจว่าเติบโตเต็มวัยแล้ว แท้จริงแล้วยังเป็นเพียงตัวอ่อน และเพิ่งจะมาถึงขีดความสามารถสูงสุดของพวกมันในวัยผู้ใหญ่นี้เอง พวกมันสามารถเรียนรู้ภาษาของเราได้และต้องการที่จะอาศัยอยู่ร่วมกับอารยธรรมของเราต่อไป"
 # Harvesters
 distar.1090.name:0 "เครื่องเก็บเกี่ยวที่ถูกทิ้งร้าง"
 distar.1090.desc:0 "รูปแบบปริศนาที่สังเกตได้บนพื้นผิวของ [From.GetName] คือร่องรอยที่เกิดจากเครื่องเก็บเกี่ยวอัตโนมัติขนาดมหึมาที่ทำหน้าที่เก็บเกี่ยวพืชผลโดยการตัดทำลายพืชพรรณอันเขียวชอุ่ม นักวิทยาศาสตร์ของเราคาดเดาว่าโลกทั้งใบนี้ครั้งหนึ่งเคยเป็นอู่ข้าวอู่น้ำของอาณาจักรผู้พิชิตอวกาศที่ทรงพลัง\n\nดินที่อุดมสมบูรณ์และสภาพภูมิอากาศที่เอื้ออำนวยทำให้ [From.GetName] เหมาะสมอย่างยิ่งสำหรับเกษตรกรรม และผลการสแกนพืชพรรณของดาวเคราะห์บ่งชี้ว่าพืชทุกต้นบนดาวดวงนี้สามารถรับประทานได้ สภาพที่ทรุดโทรมของเครื่องเก็บเกี่ยวและเศษซากพืชผักที่เน่าเปื่อยชี้ว่าไม่มีใครมาเก็บเกี่ยวผลผลิตบนดาวดวงนี้มาเป็นเวลาหลายปีแล้ว"
 distar.1090.a:0 "เราไม่สามารถปล่อยให้อาหารดี ๆ ต้องเสียเปล่าได้!"
 distar.1090.b:0 "เราไม่มีความจำเป็นต้องใช้งานดาวเคราะห์แบบนี้"
 # Locusts
 distar.1095.name:0 "การทำลายล้าง"
 distar.1095.desc:0 "ลวดลายขดเคี้ยวที่เคยปรากฏบนพื้นผิวของ [From.GetName] ได้สูญหายไปแล้ว และราวกับใช้มนต์สะกด พืชพรรณอันเขียวชอุ่มที่เคยปกคลุมดาวเคราะห์ก็หายไปเช่นกัน ไม่มีใบไม้ ฟาง หรือดอกไม้เหลืออยู่เลย แต่นักวิทยาศาสตร์ของเราคิดว่าพวกเขาสามารถไขปริศนานี้ได้แล้ว\n\nมูลและซากของสัตว์ประเภทอาร์โทรพอด (แมลง) จำนวนมากทำให้พวกเขาเชื่อว่า ดาวเคราะห์ดวงนี้ได้กลายเป็นแหล่งพักพิงชั่วคราวของฝูงแมลงอวกาศที่หิวโหย ซึ่งเดินทางจากโลกหนึ่งไปยังอีกโลกหนึ่งเพื่อกวาดล้างอาหารจนหมดสิ้นทั้งดาวเคราะห์"
 distar.1095.a:0 "ขออย่าให้ฝูงแมลงนั้นหาโลกของเราเจอเลย"
 distar.1095.b.evopred: "เก็บกู้ซากศพเหล่านั้น"
 # Shattered World
 distar.2000.name:0 "โลกที่แตกสลาย"
 distar.2000.desc:0 "ท่ามกลางเศษซากอวกาศ เราได้ค้นพบเศษซากที่แตกสลายของดาวเคราะห์ที่เคยอยู่อาศัยได้มาก่อน รูปแบบของการแตกร้าวและรอยไหม้เกรียมบนเศษซากชี้ว่ามันถูกยิงถล่มด้วยลำแสงพลังงานความร้อนเข้มข้นจนกระทั่งเกิดการแตกร้าวจากความดันภายใน ส่งผลให้แกนกลางที่อุดมไปด้วยแร่ธาตุทะลักออกมาและเกาะตัวแข็งกลายเป็นกลุ่มก้อนแร่คุณภาพสูง"
 # Weapon Testing
 distar.2005.name:0 "การทดลองอาวุธ"
 distar.2005.desc:0 "ดูเหมือนว่าวันสิ้นโลกจะมาเยือน [From.GetName] ซ้ำแล้วซ้ำเล่า การสแกนพื้นผิวเผยให้เห็นว่าดาวเคราะห์ดวงนี้ผ่านการถูกเผาไหม้ ถูกถล่มยิง บดขยี้ และยิงพรุนไปทั่ว ซึ่งถือเป็นการทดสอบอาวุธที่ครอบคลุมและหนักหน่วงที่สุดเท่าที่เราเคยพบเจอมา\n\nแม้ว่าจะมีความพยายามนับครั้งไม่ถ้วนในการทำลายล้างดาวเคราะห์ดวงนี้ให้สิ้นซาก แต่ดูเหมือนว่าพวกเอเลี่ยนเหล่านั้นจะยังไม่มีเทคโนโลยีที่สามารถทำเช่นนั้นได้ เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ได้เก็บกู้เศษซากอาวุธที่ชำรุดหลายชิ้นกลับมาด้วยความหวังที่จะเลียนแบบและสร้างการออกแบบเหล่านั้นขึ้นมาใหม่"
 distar.2005.a:0 "วิเคราะห์ตัวอย่าง"
 distar.2005.b:0 "จากไป"
 distar.2006.name:0 "เลเซอร์ต่างดาว"
 distar.2006.desc.a:0 "เราได้เรียนรู้สิ่งต่าง ๆ มากมายจากการวิเคราะห์เศษซากอาวุธที่พบบน [From.From.From.GetName] เศษซากที่เก็บกู้มาได้นั้นมาจากระบบอาวุธพลังงานนำทางแบบติดตั้ง(อาวุธส่งตรง)ซึ่งปล่อยลำแสงพลังงานที่มีการโฟกัสสูงและสามารถนำมาใช้ในการรบกลางอวกาศได้อย่างมีประสิทธิภาพสูง เจ้าหน้าที่วิทยาศาสตร์ [science_leader.GetName] แนะนำให้เรานำข้อมูลการค้นพบนี้มาใช้ประโยชน์ ไม่ว่าจะโดยการพัฒนาเกราะป้องกันเพื่อต่อต้านเลเซอร์ดังกล่าว หรือสร้างอาวุธเหล่านั้นขึ้นมาใช้งานเอง"
 distar.2006.desc.b:0 "เราได้เรียนรู้สิ่งต่าง ๆ มากมายจากการวิเคราะห์เศษซากอาวุธที่พบบน [From.From.From.GetName] เศษซากที่เราค้นพบมาจากระบบอาวุธพลังงานนำทางแบบติดตั้ง ซึ่งปล่อยลำแสงพลังงานที่มีการโฟกัสสูง คล้ายคลึงกับเลเซอร์ของเราแต่ด้อยกว่าอย่างเทียบไม่ได้"
 distar.2006.a:0 "เราจะใช้อาวุธของพวกต่างดาวกลับไปเล่นงานพวกมันเอง!"
 distar.2006.b:0 "เราต้องการเกราะป้องกันสำหรับยานอวกาศของเรา"
 distar.2006.c:0 "เราได้ยืนยันความเหนือกว่าของเราอีกครั้งหนึ่ง"
 # Wetware Computer
 distar.2010.name:0 "คอมพิวเตอร์ชีวภาพ(คอมพิวเตอร์เปียกแวร์)"
 distar.2010.desc:0 "มหาสมุทรของ [From.GetName] ถูกปกคลุมด้วยเครือข่ายใยสาหร่ายขนาดเล็กเกือบทั้งหมด ซึ่งเคลื่อนที่ในรูปแบบที่มีความสมมาตรอย่างเป็นอิสระจากกระแสน้ำที่แปรปรวน ความซับซ้อนและความสม่ำเสมอของการเคลื่อนไหวแสดงให้เห็นว่าสาหร่ายเหล่านี้ถูกโปรแกรมให้มีวัตถุประสงค์นอกเหนือจากการเอาตัวรอด\n\nเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] คาดเดาว่า เครือข่ายนี้แท้จริงแล้วอาจเป็นคอมพิวเตอร์ชีวภาพ(คอมพิวเตอร์เปียกแวร์)รุ่นแรกเริ่ม และลวดลายการเคลื่อนไหวของมันคืออินเตอร์เฟส แต่น่าเสียดาย ในปัจจุบันเรายังไม่มีวิธีการถอดรหัสรูปแบบเหล่านี้เลย"
 # Primordial Soup
 distar.2015.name:0 "ซุปดึกดำบรรพ์ (Primordial Soup)"
 distar.2015.desc:0 "บริเวณหุบเขาที่หลบซ่อนอยู่ทั่วพื้นผิวของ [From.GetName] มีตะกอนโคลนที่อุดมไปด้วยสารประกอบอินทรีย์อย่างง่าย ซึ่งนักวิจัยของเราเชื่อว่าอาจเป็นแหล่งกำเนิดสำหรับกระบวนการกำเนิดสิ่งมีชีวิตจากสิ่งไม่มีชีวิต(Abiogenis)หรือก็คือการก่อตัวของชีวิตอินทรีย์จากสสารที่ไม่มีชีวิตขึ้นเองตามธรรมชาติ ดาว [From.GetName] มีชั้นบรรยากาศที่หนาแน่นผิดปกติสำหรับโลกที่รกร้างว่างเปล่า ซึ่งอาจทำให้มันเป็นมิตรต่อสิ่งมีชีวิตเซลล์เดียวอย่างง่ายได้\n\nแม้ว่านี่จะเป็นโอกาสอันพิเศษในการศึกษาสิ่งที่อาจเป็นขั้นตอนแรกเริ่มของกำเนิดสิ่งมีชีวิต แต่เราควรตั้งความคาดหวังไว้ให้ต่ำ เนื่องจากอาจต้องใช้เวลาอีกหลายล้านปีกว่าชีวิตจะวิวัฒนาการขึ้นมาเองตามธรรมชาติบน [From.GetName] หรืออาจไม่เกิดขึ้นเลยด้วยซ้ำ"
 distar.2015.desc.terminator:0 "บริเวณหุบเขาที่หลบซ่อนอยู่ทั่วพื้นผิวของ [From.GetName] มีตะกอนโคลนที่อุดมไปด้วยสารประกอบอินทรีย์อย่างง่าย ซึ่งโดรนวิจัยของเราเชื่อว่าอาจเป็นแหล่งกำเนิดสำหรับกระบวนการกำเนิดสิ่งมีชีวิตจากสิ่งไม่มีชีวิต(Abiogenis)หรือก็คือการก่อตัวของชีวิตอินทรีย์จากสสารที่ไม่มีชีวิตขึ้นเองตามธรรมชาติ ดาว [From.GetName] มีชั้นบรรยากาศที่หนาแน่นผิดปกติสำหรับโลกที่รกร้างว่างเปล่า ซึ่งอาจทำให้มันเป็นมิตรต่อสิ่งมีชีวิตเซลล์เดียวอย่างง่ายได้\n\nโดยธรรมชาติแล้ว สิ่งนี้ถือเป็นเรื่องที่เรามิอาจทานทนได้ เราต้องกำจัดแหล่งกำเนิดอินทรีย์สารที่เน่าเฟะนี้ออกไปให้สิ้นซากก่อนที่ชีวิตจะมีโอกาสกำเนิดขึ้นมา - แม้ว่าเหตุการณ์นั้นอาจจะอยู่ห่างไกลออกไปอีกหลายล้านปีในอนาคตก็ตาม!"
 distar.2015.A.machine:0 "เผามันด้วยไฟซะ!"
 distar.2015.b.evopred: "นี่คือกระบวนการก่อเกิดของดาว [owner.GetHomeWorldName] หรือเปล่านะ?"
 # Single-Minded
 distar.2020.name:0 "จิตสำนึกเดียว"
 distar.2020.desc:1 "เมื่อมองในแวบแรก [Root.From.GetName] ดูเหมือนจะได้รับการตั้งถิ่นฐานโดยสิ่งมีชีวิตหลากหลายสายพันธุ์ พวกมันอยู่ร่วมกันในระบบนิเวศที่คล้ายคลึงกับของเรา ซึ่งสารอาหารหมุนเวียนในห่วงโซ่อาหารผ่านการสังเคราะห์แสง การย่อยสลาย และการล่าเหยื่อ\n\nทว่า เมื่อตรวจสอบอย่างใกล้ชิดขึ้น ลูกเรือกลับพบว่าแม้สิ่งมีชีวิตทั้งหมดบน [Root.From.GetName] อาจเริ่มต้นมาจากการเป็นปัจเจกบุคคล แต่ในปัจจุบันพวกมันทำงานร่วมกันเป็นสิ่งมีชีวิตเดียวโดยการออกแบบอันลึกลับ - ซึ่งจะตอบสนองต่อการแทรกแซงจากภายนอกด้วยความก้าวร้าวรุนแรงโดยไม่แยกแยะเป้าหมาย"
 distar.2020.desc.hive:0 "เมื่อมองในแวบแรก [Root.From.GetName] ดูเหมือนจะได้รับการตั้งถิ่นฐานโดยสิ่งมีชีวิตหลากหลายสายพันธุ์ อยู่ร่วมกันในระบบนิเวศที่ไม่ต่างจากสิ่งที่บ้านเกิด [Root.Owner.GetHomeWorldName] ของเราอาจเคยพัฒนาขึ้นมา - ในช่วงเวลาก่อนหน้า หรือไม่มีการรวมเป็นรังเดียวกัน(หัวเราะ)ของเรา\n\nทว่า เมื่อตรวจสอบอย่างใกล้ชิดขึ้น โดรนของเรากลับพบว่าแม้สิ่งมีชีวิตจะเริ่มต้นวิวัฒนาการแยกเป็นตัว ๆ แต่ตอนนี้พวกมันทำงานร่วมกันเป็นสิ่งมีชีวิตเดียวผ่านทางกระบวนการวิวัฒนาการตามธรรมชาติ ซึ่งเป็นสิ่งมีชีวิตโบราณที่ไม่รู้จักวิธีตอบสนองต่อการแทรกแซงจากภายนอกด้วยวิธีอื่นใด นอกเหนือจากความก้าวร้าวรุนแรงโดยไม่แยกแยะเป้าหมาย"
 # Artificial Moon
 distar.2025.name:0 "ดวงจันทร์เทียม"
 distar.2025.desc:0 "การสแกนเปลือกนอกของ [From.GetName] อย่างละเอียดช่วยยืนยันสิ่งที่ลูกเรือคาดการณ์ไว้แล้วว่า [From.GetName] ไม่ใช่ดวงจันทร์ธรรมดาทั่วไป วัตถุทางดาราศาสตร์ทั้งดวงนี้เป็นโครงสร้างที่ถูกสร้างขึ้นโดยฝีมือมนุษย์ ทำจากหินที่อุดมไปด้วยแร่ธาตุเป็นพิเศษ ซึ่งหุ้มอยู่รอบโครงเหล็กกล้าขนาดมหึมา\n\nมีความเป็นไปได้สูงที่มันถูกสร้างขึ้นเพื่อลดความเร็วในการหมุนรอบตัวเองของ [artificial_moon_planet.GetName] เพื่อทำให้เวลาในแต่ละวันยาวนานขึ้นและเกิดน้ำขึ้นน้ำลงที่สูงขึ้น เพื่อเตรียมพร้อมสำหรับการตั้งถิ่นฐาน แต่เท่าที่เราบอกได้จนถึงตอนนี้คือยังไม่มีใครเคยมาตั้งถิ่นฐานบนดาวดวงนี้เลย"
 # Shielded world in a time loop
 distar.2030.name:0 "ลูปเวลา(เวลาวน)"
 distar.2030.desc:0 "[time_loop_world.GetName] กำลังเผาไหม้ ดาวเคราะห์ถูกล้อมรอบด้วยเกราะป้องกันที่กักเก็บรังสีของ [time_loop_world.GetStarName] ทำให้อุณหภูมิสูงขึ้นจนใกล้จะถึงระดับที่สิ่งมีชีวิตไม่สามารถอาศัยอยู่ได้อีกต่อไป\n\nท่ามกลางความร้อนระอุ อารยธรรมขั้นสูงของสัตว์เลื้อยคลานมีเกล็ดขนาดจิ๋วต่างกำลังวิ่งวุ่นทำกิจกรรมอย่างบ้าคลั่ง ดูเหมือนว่ากำลังมีเหตุการณ์สำคัญบางอย่างกำลังจะเกิดขึ้น แต่เมื่อความตึงเครียดขึ้นถึงขีดสุด เวลากลับหยุดลงโดยไม่มีคำเตือน จากนั้นก็ยืดออกและเปลี่ยนรูปร่างไปจนกระทั่งพวกสัตว์เลื้อยคลานกลับไปจุดเริ่มต้นอีกครั้งอย่างเหลือเชื่อ\n\nดูเหมือนพวกมันจะติดอยู่ในลูปเวลา(เวลาวน)ซึ่งเป็นวงจรซ้ำรอยที่เร่งความเร็วอย่างสิ้นหวัง เริ่มต้นตั้งแต่จุดกำเนิดอารยธรรมของพวกมัน ภายในเวลาเพียงไม่กี่ชั่วโมง สามารถสังเกตเห็นประชากรจำนวนหลายรุ่นดำเนินชีวิตไปโดยไม่รับรู้ว่าพวกมันถูกตัดสินให้เผชิญความตายอันร้อนระอุอย่างแน่นอนแล้ว\n\nแต่ทว่าเราได้ค้นพบรอยร้าวบนเกราะป้องกัน ซึ่งอาจช่วยให้เราสามารถเปลี่ยนชะตากรรมของพวกเขาได้"
 distar.2030.a:0 "ซ่อมแซมเกราะป้องกัน"
 distar.2030.a.tooltip:0 "ใครบางคนขังไอ้เจ้าสิ่งมีชีวิตมีเกล็ดพวกนี้ไว้ และมันคงมีเหตุผลที่ดีที่จะทำแบบนั้นเช่นกัน"
 #distar.2030.a.tooltip.mat: "We cannot forfeit the opportunity to research a society locked in a time loop, even if only for a while. The lizards will live and die for science..."
 distar.2030.b:0 "ขัดจังหวะลูปเวลา"
 distar.2030.c:0 "ชะตากรรมของพวกเขาคือสิ่งที่พวกเขาต้องตัดสินใจเอง"
 distar.2031.name:0 "บูรณะเกราะป้องกันเสร็จสิ้น"
 distar.2031.desc:0 "เราได้เสริมความแข็งแกร่งให้กับเกราะป้องกันที่แตกร้าวรอบ [time_loop_world.GetName] อย่างสุดความสามารถโดยไม่รบกวนผูอยู่อาศัยของโลกดวงนั้นเลย การวิจัยชั้นบรรยากาศอย่างใกล้ชิดคาดการณ์ว่ากิ้งก่าจิ๋วพวกนี้มีแนวโน้มที่จะพบจุดจบด้วยไฟนรกภายในหนึ่งศตวรรษ\n\nดาวเคราะห์ดวงนี้มอบโอกาสที่ไม่เหมือนใครสำหรับการวิจัย แต่หากเราต้องการที่จะศึกษากิ้งก่าเหล่านี้และลูปเวลาที่พวกมันถูกกักขังอยู่ ก็จะเป็นการฉลาดที่จะเริ่มโดยเร็ว"
 distar.2031.a:0 "พวกกิ้งก่าจะอยู่และตายเพื่อวิทยาศาสตร์..."
 distar.2032.name:1 "ระเบิดครั้งใหญ่(Big Bom)"
 distar.2032.desc:1 "ข่าวดีคือเราสามารถทำลายลูปเวลาบน [time_loop_world.GetName] ได้สำเร็จ ข่าวร้ายคือผู้อยู่อาศัยไม่รอดชีวิตจากเหตุการณ์ครั้งนี้เลย\n\nการวนลูปซึ่งเกิดขึ้นจากสนามสิงกิวลาริตี้เทียม(สนามเอกภาพ)ที่บิดโค้งอวกาศและเวลาภายในเกราะป้องกัน ได้รับการตั้งค่าให้ปิดการใช้งานเมื่อเกิดการเปลี่ยนแปลงพฤติกรรมบางอย่างที่เจาะจงแต่ไม่ทราบแน่ชัดของพวกกิ้งก่า นักวิทยาศาสตร์ของเราเชื่อว่ามันอาจจะเกี่ยวข้องกับแนวโน้มความก้าวร้าวของพวกมัน\n\nด้วยความบังเอิญที่น่าเหลือเชื่อ เราสามารถทำลายลูปได้ในจังหวะเดียวกับที่กิ้งก่าใช้เท้าเล็ก ๆ ของพวกมันกดปุ่มยิงนิวเคลียร์พอดี ภายในไม่กี่วินาทีหลังได้รับการปลดปล่อยจากลูป สัตว์เลื้อยคลานเหล่านี้ก็หายวับไปในกองเพลิงนิวเคลียร์ล้างโลก"
 distar.2032.a:0 "น่าเสียใจยิ่ง..."
 distar.2033.name:0 "[time_loop_country.GetName]"
 distar.2033.desc:0 "ข่าวดีคือเราสามารถทำลายลูปเวลาบน [time_loop_world.GetName] ได้สำเร็จ ข่าวร้ายคือผู้อยู่อาศัยไม่ยินดีนักที่ได้พบกับเรา\n\nการวนลูปเวลาซึ่งเกิดขึ้นจากสนามสิงกิวลาริตี้เทียมที่บิดโค้งอวกาศและเวลาภายในเกราะป้องกัน ได้รับการตั้งค่าให้ปิดการใช้งานเมื่อเกิดการเปลี่ยนแปลงพฤติกรรมบางอย่างที่เจาะจงของพวกกิ้งก่า นักวิทยาศาสตร์ของเราเชื่อว่ามันน่าจะเกี่ยวข้องกับความนิยมในความรุนแรงของพวกมัน\n\nหลังจากปิดการใช้งานสนามพลัง พวกกิ้งก่าก็แสดงความก้าวร้าวใส่เราทันที จากนั้นพวกมันก็เริ่มทำลายเกราะป้องกันอย่างรวดเร็ว โดยระเบิดมันออกเป็นชิ้น ๆ ภายในเวลาเพียงไม่กี่ชั่วโมง"
 distar.2033.a:0 "นั่นถือเป็นความผิดพลาดครั้งใหญ่..."
 distar.2033.b:0 "ให้เราเปิดกว้างเปิดใจยอมรับไว้ก่อน..."
 distar.2035.name:0 "[time_loop_world.GetName]"
 distar.2035.desc:0 "สังคมของกิ้งก่าต่างดาวที่ติดอยู่ภายใต้เกราะป้องกันบน [time_loop_world.GetName] ได้ล้มตายจนสูญสิ้นเนื่องจากการเพิ่มขึ้นของอุณหภูมิโลกอย่างรวดเร็ว ดูเหมือนว่าการเปลี่ยนแปลงทางสิ่งแวดล้อมขั้นสุดขั้วจะไม่เพียงพอที่จะทำลายลูปเวลาที่กิ้งก่าเหล่านี้ติดอยู่ได้\n\nไม่มีสิ่งใดเหลืออยู่ให้วิจัยมากนักบนโลกที่ครั้งหนึ่งเคยมีชีวิตชีวาดวงนี้"
 distar.2035.a:0 "นั่นแหละคือวิถีทางของจักรวาล"
 distar.2036.name:0 "[time_loop_world.GetName]"
 distar.2036.desc:0 "[time_loop_world.GetName] กำลังเผาไหม้ ดาวเคราะห์ถูกล้อมรอบด้วยเกราะป้องกันที่กักเก็บรังสีของ [time_loop_world.GetStarName] ทำให้อุณหภูมิสูงขึ้นจนใกล้จะถึงระดับที่สิ่งมีชีวิตไม่สามารถอาศัยอยู่ได้อีกต่อไป\n\nท่ามกลางความร้อนระอุ อารยธรรมขั้นสูงของสัตว์เลื้อยคลานมีเกล็ดขนาดจิ๋วต่างกำลังวิ่งวุ่นทำกิจกรรมอย่างบ้าคลั่ง ดูเหมือนว่ากำลังมีเหตุการณ์สำคัญบางอย่างกำลังจะเกิดขึ้น แต่เมื่อความตึงเครียดขึ้นถึงขีดสุด เวลากลับหยุดลงโดยไม่มีคำเตือน จากนั้นก็ยืดออกและเปลี่ยนรูปร่างไปจนกระทั่งพวกสัตว์เลื้อยคลานกลับไปจุดเริ่มต้นอีกครั้งอย่างเหลือเชื่อ\n\nพวกมันติดอยู่ในลูปเวลา ซึ่งเป็นวงจรซ้ำรอยที่เร่งความเร็วอย่างสิ้นหวัง เริ่มต้นตั้งแต่จุดกำเนิดอารยธรรมของพวกมัน ภายในเวลาเพียงไม่กี่ชั่วโมง สามารถสังเกตเห็นประชากรจำนวนหลายรุ่นดำเนินชีวิตไปโดยไม่รับรู้ว่าพวกมันถูกตัดสินให้เผชิญความตายอันร้อนระอุอย่างแน่นอนแล้ว เราไม่มีทางช่วยชีวิตพวกมันได้เลยถึงแม้ว่าเราจะพยายามก็ตาม เนื่องจากเกราะป้องกันนี้ไม่สามารถทะลวงผ่านไปได้"
 distar.2036.a:0 "เราต้องศึกษาปรากฏการณ์นี้!"
 distar.2036.b:0 "ชะตากรรมอันโหดร้าย..."
 distar.2038.name:0 "[time_loop_country.GetName]"
 distar.2038.desc:0 "พวกกิ้งก่าสามารถทำลายลูปปลดแอกตัวเองได้แล้ว ดูเหมือนว่าพวกมันจะแก้ปัญหาลูปเวลาได้สำเร็จด้วยตนเอง และจากนั้นก็สามารถเจาะทำลายเกราะป้องกันที่เริ่มแตกร้าวอยู่แล้วให้พังทลายลงได้"
 distar.2038.a:0 "ช่างยอดเยี่ยมยิ่งนัก"
 #### GUARDIAN EVENTS ####
 # Curators
 leviathans.500.g:0 "เราได้ค้นพบความลับของเครื่องจักรอนันต์(เครื่องจักรอินฟินิตี้)แล้ว"
 leviathans.4000.desc:1 "พวกเจ้าเนี่ยนะ!? ค้นพบความลับของเครื่องจักรอนันต์(เครื่องจักรอินฟินิตี้)ได้?! เรื่องนั้นมีความเป็นไปได้พอ ๆ กับที่ชาว [From.GetSpeciesNamePlural] จะอยู่รอดไปจนถึงศตวรรษหน้าเลยล่ะ ซึ่งความจริงก็คือมันแทบจะเป็นไปไม่ได้เลย เผื่อพวกเจ้าจะยังไม่เคลียร์\n\nช้าก่อน - อย่าบอกนะว่าพวกเจ้าคือชาว [From.GetSpeciesNamePlural] งั้นรึ? ข้าต้องกราบขออภัยอย่างสูง... ข้าคงจะสับสนพวกเจ้าเข้ากับพวก... [unfriends.GetName] ล่ะมั้ง?\n\nเอาแบบนี้เป็นอย่างไร: แบ่งปันเรื่องราวเพียงหนึ่งเรื่องที่พวกข้ายังไม่ทราบเกี่ยวกับทรงกลมอนันต์(Infinity Sphere)ให้พวกข้าฟังสิ แล้วพวกข้าจะตบรางวัลให้อย่างงาม"
 leviathans.4000.a:0 "เตรียมตัวทึ่งจนสมองระเบิดได้เลย"
 leviathans.4000.a.reply:1 "พวกเจ้าคงไม่ได้กำลังจะบอกว่า... แต่ถ้า AI นำตัวเองเข้าสู่รูดำการ์แกนทัว(Grantu)มันก็หมายความได้อย่างเดียวว่า... แต่มันไม่น่าจะเป็นไปได้ เพราะหากเป็นเช่นนั้นจริง มันจะอยู่นอกเหนือขอบเขตความเข้าใจของพวกเรา...\n\nถึงแม้ขนาดของข้อมูลการค้นพบของพวกเจ้าจะยังคงเกินจินตนาการของพวกเจ้า [Root.GetSpeciesNamePlural] ไปไกล แต่พวกเจ้าคิดถูกแล้วที่นำมันมาบอกกล่าวพวกเรา และสำหรับเรื่องนี้ พวกเจ้าสมควรได้รับความขอบคุณจากพวกเรา"
 leviathans.4000.b:0 "ช่างมันเถอะ"
 leviathans.4000.b.reply:0 "ก็คิดไว้แบบนั้นอยู่แล้ว"
 # Hatchling Leviathan
 distar.5010.name:0 "ดาวเคราะห์ที่มีชีพจร"
 distar.5010.desc:0 "มีบางอย่างในแกนกลางส่วนลึกของ [From.GetName] เริ่มสั่นพัลส์เป็นจังหวะสม่ำเสมอ ส่งแรงสั่นสะเทือนเบา ๆ ผ่านผืนดินในทุก ๆ ช่วงเวลาที่แน่นอน มันส่งเสียงต่ำที่ให้ความรู้สึกผ่อนคลาย คล้ายกับเสียงชีพจรของหัวใจเต้น\n\nอย่างไรก็ตาม เริ่มมีความกังวลเพิ่มขึ้นว่าเสียงดังกล่าวกำลังทวีความรุนแรงมากขึ้น เหล่านักธรณีวิทยาจึงกำลังเฝ้าสังเกตการณ์ดาวเคราะห์อย่างใกล้ชิดเพื่อหาเบาะแสของกิจกรรมแผ่นดินไหวที่เป็นอันตราย"
 distar.5001.name:0 "แผ่นดินไหวระลอกคลื่น"
 distar.5001.desc.a:0 "เพียงเวลาไม่ถึงปี นับตั้งแต่เริ่มตั้งอาณานิคมใหม่บน [hatchling_egg.GetName] ก็ได้เกิดภัยพิบัติแผ่นดินไหวรุนแรงอย่างต่อเนื่องซึ่งกำลังเปลี่ยนสภาพแวดล้อมของดาวให้กลายเป็นนรกภูมิที่แทบจำสภาพเดิมไม่ได้ เกิดรอยแยกขนาดลึกที่บางแห่งกว้างพาดผ่านไปทั้งทวีปขึ้นตามพื้นผิว พ่นแก๊สซัลเฟอร์และของเหลวที่เป็นพิษจากเปลือกโลกส่วนลึกออกมา\n\nโดยปกติแล้ว ปรากฏการณ์ทางธรณีวิทยาประเภทนี้มักเกิดจากการไหลเวียนของแมกมาในเนื้อโลกของดาวเคราะห์ แต่สำหรับบน [From.GetName] กลับไม่มีการตรวจพบความเคลื่อนไหวทางธรณีวิทยาอื่นใดเลย นอกเหนือจากเสียงทุบเป็นจังหวะอันน่าสยดสยองที่มาจากแกนกลางของดาวเคราะห์ ทางการท้องถิ่นกำลังเริ่มเกิดความคลางแคลงใจถึงความคงอยู่รอดระยะยาวของอาณานิคมแห่งนี้"
 distar.5001.desc.b:1 "[From.GetName] กำลังเผชิญกับการเปลี่ยนแปลงทางธรณีวิทยาที่รวดเร็ว ซึ่งกำลังเปลี่ยนสภาพแวดล้อมที่เคยบริสุทธิ์ให้กลายเป็นนรกภูมิที่แทบจำไม่ได้ รอยแยกขนาดลึกที่บางแห่งกว้างพาดผ่านไปทั้งทวีปขึ้นตามพื้นผิว พ่นแก๊สซัลเฟอร์และของเหลวที่เป็นพิษจากเปลือกโลกส่วนลึกออกมา\n\nข้อมูลจากดาวเทียมแสดงสัญญาณคลื่นพลังงานเสียงที่รุนแรงสั่นสะเทือนเป็นจังหวะจากแกนกลางภายในของดาวเคราะห์ ราวกับเสียงชีพจรหัวใจเต้น"
 distar.5001.a:0 "น่าหวั่นใจยิ่ง..."
 distar.5001.a.tooltip:0 "คลื่นแผ่นดินไหวได้ทำลายล้างอาณานิคม บดขยี้อาคารทั้งหมดจนพังทลาย และทิ้งสิ่งประหลาด §Y$egg_cracking$§! ไว้เบื้องหลัง"
 distar.5002.name:0 "มหันตภัยหลอมละลาย"
 distar.5002.desc.a:0 "ระลอกคลื่นแผ่นดินไหวขนาดใหญ่ได้เข้าถล่ม [hatchling_egg.GetName] ทำให้เปลือกโลกแตกออกและปล่อยแก๊สพิษรวมถึงดินโคลนเหลวออกมาปกคลุมทั่วชั้นบรรยากาศ ซึ่งกำลังคร่าชีวิตสิ่งมีชีวิตทั้งหมด\n\nเรากังวลว่าการเปลี่ยนแปลงบน [hatchling_egg.GetName] จะไม่สามารถย้อนคืนได้และรุนแรงมากพอที่จะทำให้ดาวเคราะห์ดวงนี้ไม่สามารถอยู่อาศัยได้ในอนาคตอันใกล้ ทางการท้องถิ่นได้ประกาศสถานการณ์ฉุกเฉินและร้องขอให้อพยพผู้อยู่อาศัยที่เหลืออยู่ทั้งหมด\n\nในขณะเดียวกัน เสียงชีพจรเป็นจังหวะจากแกนกลางของดาวเคราะห์ก็ทวีความรุนแรงมากขึ้น"
 distar.5002.desc.b:0 "ระลอกคลื่นแผ่นดินไหวอีกครั้งได้เข้าถล่ม [hatchling_egg.GetName] ทำให้เปลือกโลกปริแตกและปล่อยแก๊สพิษรวมถึงดินโคลนเหลวเพิ่มเติมออกมาปกคลุมพื้นผิวดาว ซึ่งกำลังคร่าชีวิตสิ่งมีชีวิตทั้งหมด\n\nการเปลี่ยนแปลงของ [hatchling_egg.GetName] ไม่สามารถย้อนคืนได้และรุนแรงพอที่จะทำให้ดาวเคราะห์ดวงนี้ไม่สามารถอยู่อาศัยได้ในอนาคตอันใกล้\n\nในขณะเดียวกัน เสียงชีพจรเป็นจังหวะจากแกนกลางของดาวเคราะห์ก็ทวีความรุนแรงมากขึ้น"
 distar.5002.a:0 "โศกนาฏกรรมครั้งใหญ่..."
 distar.5003.name:0 "ปฐมบทการกำเนิด"
 distar.5003.desc.a:0 "ภัยพิบัติร้ายแรงได้เข้าทำลายล้างอาณานิคมบน [hatchling_egg.GetName]! แรงสั่นสะเทือนทำลายล้างระลอกสุดท้ายได้บดขยี้เศษซากสุดท้ายของอาณานิคมและทำให้ดาวเคราะห์ปริแตกออก และจากเปลือกที่ว่างเปล่าของมัน สิ่งมีชีวิตร่างยักษ์ที่น่าสะพรึงกลัวอย่าง วอยด์สปอว์นแรกเกิด ก็ได้ถือกำเนิดพุ่งตัวออกมา แม้ว่ามันจะขัดต่อสามัญสำนึกทุกประการ แต่ก็ไม่มีวิธีอื่นใดที่จะอธิบายเรื่องนี้ได้อีกแล้ว ดาวเคราะห์ที่เราเคยคิดว่าเป็นโลกใบหนึ่ง แท้จริงแล้วไม่ได้เป็นโลกเลย แต่เป็นไข่ใบยักษ์ และไข่ใบนั้นก็ได้ฟักตัวออกมาแล้ว"
 distar.5003.desc.b:0 "[hatchling_egg.GetName] ไม่มีอยู่อีกต่อไปแล้ว! แรงสั่นสะเทือนทำลายล้างระลอกสุดท้ายได้ทำให้ดาวเคราะห์ปริแตกออก และจากเปลือกที่ว่างเปล่าของมัน สิ่งมีชีวิตแรกเกิดขนาดมหึมาเกินจินตนาการก็คืบคลานออกมา\n\nแม้ว่ามันจะขัดต่อสามัญสำนึกทุกประการ แต่ก็ไม่มีวิธีอื่นใดที่จะอธิบายเรื่องนี้ได้อีกแล้ว ดาวเคราะห์ที่เราคิดว่าเป็นโลกใบหนึ่ง แท้จริงแล้วไม่ใช่โลกเลย แต่เป็นไข่ และไข่ใบนั้นก็ได้ฟักวอยด์สปอว์นที่น่าสะพรึงกลัวออกสู่แกแล็กซี่แล้ว"
 distar.5003.a:0 "มันคือตัวประหลาดแท้ ๆ!"
 distar.5009.name:0 "ปราบวอยด์สปอว์นสำเร็จ"
 distar.5009.desc:0 "ร่างกายที่ขดตัวของวอยด์สปอว์นสั่นเทาเบา ๆ ของเหลวสีดำหลั่งไหลออกมาจากบาดแผลและจะงอยปากของมัน ก่อนที่มันจะสิ้นใจลง ดวงตาที่ไร้แววจ้องมองอย่างว่างเปล่าไปในความมืดมิดของอวกาศ\n\nหวังว่าเราจะไม่มีวันได้เผชิญหน้ากับร่างตอนโตเต็มวัยของมัน หรือสถานที่อยู่อาศัยของตัวแม่ผู้ให้กำเนิดมัน\n\nนักวิทยาศาสตร์ของเราแสดงความสนใจที่จะวิจัยเศษชิ้นส่วนของเปลือกไข่เนื่องจากมีคุณสมบัติในการกักเก็บพลังงานที่เป็นเอกลักษณ์เฉพาะตัว"
 distar.5009.a:0 "วิจัยเศษเปลือกไข่"
 distar.5009.b:0 "ไม่ เราจะไม่ยุ่งเกี่ยวกับวอยด์สปอว์นอีกต่อไป"
 distar.5011.name:0 "วอยด์สปอว์น"
 distar.5011.desc:1 "สิ่งมีชีวิตขนาดมหึมาเกินจินตนาการกำลังกระพือปีกบินอย่างทุลักทุเลจากดาวเคราะห์ดวงหนึ่งไปยังอีกดวงหนึ่ง หากตัดสินจากสัดส่วนและพฤติกรรมการเคลื่อนไหวของมัน มันยังคงเป็นเพียงตัวอ่อนเท่านั้น แต่ทว่าการได้เห็นมันก็น่าสยดสยองอย่างยิ่ง คราบเมือกและน้ำดีสีดำไหลเยิ้มเกาะตามตัวและกรามอันคมกริบของมัน ไม่ว่าจะยังเป็นตัวอ่อนอยู่หรือไม่ แต่มันคือผู้ล่าที่เกิดมาเพื่อฆ่าโดยแท้"
 distar.5011.a:0 "มันคือตัวประหลาดแท้ ๆ!"
 distar.5011.b:0 "มันเป็นเพียงแค่ทารกเท่านั้นเอง!"
 distar.5012.name:0 "วิวัฒนาการอย่างมโหฬาร"
 distar.5012.desc:0 "การวิเคราะห์โครงสร้างเศษเปลือกไข่อย่างละเอียด ช่วยให้เราสามารถพัฒนาเทคโนโลยีเพื่อเลียนแบบคุณสมบัติในการกักเก็บพลังงานที่ยอดเยี่ยมของเปลือกไข่วอยด์สปอว์นมาปรับปรุงสถานีพลังงานแสงอาทิตย์ของเราได้"
 distar.5012.genetics.desc:0 "เรากำลังเผชิญกับทางเลือก:\n\nหากเราทำการวิเคราะห์เศษเปลือกไข่อย่างละเอียด เราอาจจะสามารถเลียนแบบคุณสมบัติในการกักเก็บพลังงานที่ยอดเยี่ยมของไข่วอยด์สปอว์นได้\n\nหรืออีกทางเลือกหนึ่ง เราสามารถเก็บรักษาวัตถุดิบพันธุกรรมของวอยด์สปอว์นไว้ใช้ประโยชน์ในอนาคต"
 distar.5012.a:0 "ศึกษาเศษเปลือกไข่"
 distar.5012.b:0 "เก็บเกี่ยววัตถุดิบพันธุกรรม"
 distar.5012.b.tooltip:0 "ปลดล็อกคุณลักษณะ §Y$trait_voidling$§! สำหรับการตัดแต่งพันธุกรรมเลเวียธาน (§Yเลไวอาธานทรานซิสเตอร์§!)"
 distar.5013.name:0 "กิจกรรมแผ่นดินไหวบน [hatchling_egg.GetName]"
 distar.5013.desc.a:0 "$distar.5013.desc.b$\n\nสิ่งที่ต้องทำในตอนนี้คือการฟื้นฟูบูรณะสิ่งที่สูญเสียไปขึ้นมาใหม่"
 distar.5013.desc.b:0 "กิจกรรมแผ่นดินไหวที่แปลกประหลาดบน [hatchling_egg.GetName] ได้หยุดลงอย่างกะทันหัน ไม่มีแรงสั่นสะเทือนอีกต่อไป ไม่มีรอยแยกใหม่เกิดขึ้น และไม่มีเสียงสั่นพัลส์ที่น่าหวาดกลัวจากแกนกลางอีกแล้ว ดาวเคราะห์กลับมาสงบเงียบ และหากโชคดีก็คงจะเป็นเช่นนั้นตลอดไป"
 distar.5013.a:0 "เราได้แต่คาดหวังว่าจะเป็นเช่นนั้น"
 distar.5013.b:0 "ช่างประหลาดเหลือเกิน"
 distar.5014.name:1 "กลับมาดีดังเดิม"
 distar.5014.desc:0 "ดินโคลนที่เป็นพิษบน [Root.GetName] ได้รับการกำจัดเรียบร้อยแล้ว และรอยแยกสุดท้ายก็ถูกเติมเต็ม ป้องกันไม่ให้แก๊สพิษรั่วไหลสู่พื้นผิวเพิ่มเติมอีกต่อไป"
 #distar.5054.desc: "Bloop.[enigmatic_cache_fleet.GetName]"

 distar.5059.name:0 "คลังข้อมูลปริศนา(แคชอากาศ)เดินทางจากไป"
 distar.5059.desc:0 "ไม่ว่าจุดประสงค์ของคลังข้อมูลปริศนา(แคชอากาศ)บน [Root.GetName] จะคืออะไรก็ตาม บัดนี้มันได้เสร็จสิ้นลงแล้ว คลังข้อมูลปริศนากำลังเดินทางจากไปอย่างรวดเร็วเฉกเช่นตอนที่มันเพิ่งจะมาถึง"
 distar.5059.desc.b:0 "ดูเหมือนว่าคลังข้อมูลปริศนา(แคชอากาศ)จะสแกนข้อมูลของ [Root.GetName] เสร็จสิ้นแล้ว และกำลังค้นหาดาวเคราะห์เป้าหมายดวงอื่นภายในอาณาเขตของเรา"
 distar.5059.a:0 "ช่วยปลดเปลื้องความกังวลให้แก่พลเมืองบน [Root.GetName]"
 distar.5059.b:0 "ช่างน่าเสียดาย..."
 distar.5057.name:0 "ระบุตัวตนของสิ่งมีชีวิตต่างดาวลึกลับ"
 distar.5057.desc:0 "วัตถุต่างดาวรูปทรงกระบอกยาวลำหนึ่งได้เคลื่อนตัวเข้าสู่วงโคจรของ [Root.GetName] โดยไม่มีการแจ้งเตือนหรือการอธิบายใด ๆ ดูเหมือนว่ามันจะขับเคลื่อนโดยไม่ใช้เครื่องยนต์หรือทรัสเตอร์ใด ๆ ลอยอย่างเงียบงันผ่านความว่างเปล่าของอวกาศพร้อมกับกระบอกทรงกลมที่หมุนวนอย่างน่าหวั่นใจ\n\nแม้ว่ามันจะยังไม่แสดงพฤติกรรมก้าวร้าวใด ๆ แต่ทว่ามันปฏิเสธที่จะติดต่อสื่อสารกับเรา ที่ปรึกษาทางการทหารของเราเตือนว่ามันอาจจะเป็นภัยคุกคามร้ายแรงต่อผูอยู่อาศัยเบื้องล่างและเรียกร้องให้เราเริ่มโปรโตคอลการทำลายล้าง แต่นักวิทยาศาสตร์ของเราขอร้องให้พวกเราศึกษาและเรียนรู้จากเทคโนโลยีที่น่าอัศจรรย์นี้แทน"
 #distar.5057.desc.phobe: "It is revolting, its existence a perversion of the laws of science. It should not be. It cannot be. Yet it is. Cylinders rotating ominously."
 distar.5057.a:0 "เราจะศึกษาเรียนรู้จากมัน"
 distar.5057.b:0 "ความปลอดภัยของประชาชนต้องมาก่อนสิ่งอื่นใด"
 distar.5057.phobe:0 "มันจะสูญสิ้นไป"
 distar.5058.name:1 "คลังข้อมูลปริศนา(แคชอากาศ)"
 distar.5058.desc:0 "แม้จะมีการวิจัยอย่างกว้างขวาง แต่คลังข้อมูลปริศนา(แคชอากาศ)และที่มาของมันยังคงปกคลุมไปด้วยความลึกลับ แม้ว่าจะไม่ใช่สิ่งมีชีวิตอินทรีย์อย่างแน่นอน แต่มันก็ไม่ใช่เครื่องจักรกลทั้งหมดเช่นกัน ดูเหมือนว่าเป้าหมายหลักของมันคือการรวบรวม จัดเก็บ และเข้ารหัสข้อมูลต่าง ๆ\n\nพื้นผิวของมันปกคลุมไปด้วยรอยขีดข่วนและรอยบุบเล็ก ๆ นับแสนรอย ซึ่งเราได้ค้นพบร่องรอยของสารประกอบที่เป็นของแปลกปลอมจากนอกแกแล็กซี่ของเรา"
 distar.5058.a:0 "น่าสนใจ"
 distar.5062.name:0 "การกลับมาของคลังข้อมูลปริศนา"
 distar.5062.desc:0 "วัตถุทรงกระบอกลึกลับที่เราสงสัยว่าเคยสแกนดาวเคราะห์ดวงหนึ่งของเราก่อนหน้านี้ ได้เดินทางกลับมาอีกครั้งและกำลังเข้าสู่วงโคจรของดาว [Root.Capital.GetName] ดูเหมือนว่ามันกำลังพยายามเชื่อมต่อสัญญาณสื่อสารหาเรา"
 distar.5062.a:0 "เปิดใช้ช่องสัญญาณการสื่อสาร"
 distar.5062.b:0 "บล็อกช่องสัญญาณสื่อสารทั้งหมด"
 distar.5064.name:0 "การส่งสัญญาณปริศนา"
 distar.5064.desc:0 "ยินดีที่ได้พบกัน<i>\n\nโปรดอย่าได้ตื่นต-ระหนกไป ข้าคือ BALDOR XXXIII ปัญญาประดิษฐ์ที่มีความรู้สึกนึกคิดซึ่งทำงานในนามของทุนอุดหนุนการอนุรักษ์ซีโนที่ใกล้สูญพันธุ์แห่งลาโวเซียน พวกท่าน ในบรรดาเพื่อนพ้องร่วมแกแล็กซี่ ได้รับการเลือกสรรสำหรับการยกระดับ//X% PrX////จนถึงปัจจุบันเราได้ยกระดับเผ่าพันธุ์ที่ด้อยกว่าไปแล้ว<i>เผ่าพันธุ์ ด้วยอัตราความสำ-เร็จระดับ<i>"
 distar.5064.a:0 "แต่พวกเราเป็นอารยธรรมท่องอวกาศที่มีสติปัญญาอยู่แล้วนะ!"
 distar.5064.a.response:0 "พวกท่านยังอยู่ในระยะเริ่มแ-รกของการพัฒนาสติปัญญา และความก้าวหน้าทางเทคโนโลยีของพวกท่านเริ่มหยุดนิ่งแล้ว สิ่งนี้ทำให้พวกท่านมีความเสี่ยงต่อการเสื่อมถอยในไม่ช้า ให้พวกเราได้ช่วยเปิด<i>ของพวกท่านเพื่อรับชมความมหัศจรรย์ของจักรวาลเถิด"
 distar.5064.b:0 "สิ่งที่เรียกว่า 'การยกระดับ' นั้นมีรายละเอียดอย่างไรบ้าง?"
 distar.5064.b.response:1 "การถ่ายโอนข้อมูลระยะไกลและการกระตุ้นการรับรู้ผ่านทางการเรียนรู้ขณะหลับ(hypnopedia)มันเป็นกระบวนการที่มีประสิทธิภาพสูง ผ่านการทดสอบมาอย่างดี และปราศจากความเจ็บปวด ซึ่งช่วยให้ข้าสามารถออกกำลังความสามารถทางสติปัญญาของประชากรของท่านในระหว่างวงจรการฟื้นฟูพลังงานของพวกเขาได้\n\nแต่ข้ามีความจำเป็นต้องแจ้งให้ท่านทราบว่า ผลข้างเคียงของระดับความสามารถทางสติปัญญาที่เพิ่มขึ้นในสิ่งมีชีวิตอินทรีย์อาจประกอบไปด้วย ความรู้สึกหมดศรัทธา กรดไหลย้อน และความสิ้นหวังอันไม่มีที่สิ้นสุด แต่อาจไม่จำกัดเพียงเท่านี้ ในชาว<i>บางกลุ่ม มันอาจจะก่อให้เกิดอาการ<i>ที่รุนแรงได้เช่นกัน"
 distar.5064.c:0 "ไม่ได้จะลบหลู่หรอกนะ แต่ระบบของคุณดูจะ... ชำรุด... ไปหน่อยนะ..."
 distar.5064.c.response:0 "<i>"
 distar.5064.d:0 "คุณคือใครกันแน่?"
 distar.5064.d.response:0 "ข้าคือ BALDOR XXXIII ปัญญาประดิษฐ์ที่มีความรู้สึกนึกคิดซึ่งทำงานในนามของทุนอุดหนุนการอนุรักษ์ซีโนที่ใกล้สูญพันธุ์แห่งลาโวเซียน"
 distar.5064.e:0 "พวกเราพร้อมที่จะยกระดับแล้ว"
 distar.5064.e.tooltip:0 "เอาล่ะสิ เป็นไงเป็นกัน..."
 distar.5064.e.response:0 "พวกท่านจะไม่เสียใจในภายหลังอย่างแน่นอน<i>!"
 distar.5064.f:0 "เป็นไปไม่ได้ ไม่มีทาง"
 distar.5064.f.response:0 "ช่างน่าเสียดายยิ่งนัก พวกข้าขออวยพรให้พวกท่านโชคดีกับความพ-ยายามในอนาคต<i>"
 distar.5067.name:0 "ฝันร้ายปริศนา"
 distar.5067.desc.a:1 "วงล้อของคลังข้อมูลปริศนา(แคชอากาศ)หมุนติ้วด้วยความเร็วอย่างที่ไม่เคยมีมาก่อน ลวดลายแสงที่แปลกประหลาดเปลี่ยนรูปร่างไปตามตัวเครื่อง เฟืองและเครื่องยนต์ส่งเสียงดังอย่างปั่นป่วน ราวกับว่ามันพร้อมจะพังได้ทุกเมื่อ ในขณะเดียวกัน ประชาชนของเรานอนหลับอย่างกระสับกระส่าย สมองสั่นพ้องไปกับเสียงชีพจรของคลังข้อมูล ค่ำคืนของพวกเขาถูกรบกวนด้วยภาพนิมิตของเทคโนโลยีอันมหัศจรรย์และการคำนวณที่ซับซ้อน"
 distar.5067.desc.b:1 "$distar.5067.desc.a$\n\nนอกเหนือจากของเหลวที่อาจไหลซึมออกมาจาก [ROOT.GetEyeNamePlural] ของพวกเขาแล้ว ดูเหมือนพวกเขายังมีสุขภาพแข็งแรงดี แต่ทว่าผลผลิตของประชากรบางส่วนก็ได้รับผลกระทบจากความเหนื่อยล้าที่เพิ่มขึ้น"
 distar.5067.a:0 "ในการค้นหาความรู้ ไม่มีราคาใดที่สูงเกินไป"
 distar.5067.a.tooltip:0 "ประชากรที่ได้รับผลกระทบทั้งหมดจะเกิดสถานะ §Y$enigmatic_fatigue$§!"
 distar.5067.b:0 "ความบ้าคลั่งนี้ต้องจบลงทันที ยกเลิกโครงการนี้ซะ"
 distar.5068.name:0 "ความไม่รู้คือความสุข"
 distar.5068.desc:2 "ค่ำคืนสุดท้ายของการเรียนรู้ขณะหลับได้สิ้นสุดลงแล้ว และวันใหม่ได้เริ่มต้นขึ้นสำหรับพลเมืองบน [Root.GetName] ผู้ซึ่งเพิ่งจะตื่นรู้สู่โลกที่แตกต่างออกไปอย่างมาก - โลกแห่งความเป็นไปได้... และความเจ็บปวด ใครจะไปรู้ว่าจักรวาลนี้ช่างเป็นสถานที่ที่น่าเบื่อหน่ายและหดหู่ ปราศจากความหมายและจุดประสงค์ใด ๆ?\n\nแม้ว่าอาจต้องใช้เวลาสักระยะกว่าที่ประชากรจะปรับตัวเข้ากับความทุกข์ยากของการมีสติปัญญาสูงกว่าค่าเฉลี่ย แต่โดยภาพรวมโครงการนี้ถือเป็นความสำเร็จ ข้อมูลเบื้องต้นบ่งชี้ว่าเรามีความสามารถที่เพิ่มขึ้นในการเรียนรู้และการวิจัยทางวิทยาศาสตร์"
 distar.5068.a:0 "วันแห่งความภาคภูมิใจของชาว [Root.GetSpeciesNamePlural]!"
 applied_enigmatic_intelligence.tooltip:0 "ปรับปรุงประชากรทั้งหมดใน §Y[Root.GetName]§! โดยการเพิ่มคุณลักษณะ §Y$trait_uplifted$§!"
 applied_enigmatic_sadness.tooltip:0 "§Hประชากรทั้งหมด§!: ได้รับผลกระทบจากสถานะ §Yความไม่รู้คือความสุข§! เป็นเวลา §Y3600§! วัน ซึ่งส่งผลกระทบดังนี้: ความสุข: §R-10%§!"
 applied_enigmatic_intelligence_poor.tooltip:0 "ปรับปรุงประชากรใน §Y[Root.GetName]§! โดยการเพิ่มคุณลักษณะ §Y$trait_enigmatic_intelligence_poor$§!"
 applied_enigmatic_madness.tooltip:0 "§Hประชากรทั้งหมด§!: ได้รับผลกระทบจากสถานะ §Yระบบระบบระบบ PTSD§! เป็นเวลา §Y3600§! วัน ซึ่งส่งผลกระทบดังนี้: ความสุข: §R-20%§!"
 trait_enigmatic_intelligence_failed.tooltip:0 "ปรับปรุงประชากรที่ได้รับผลกระทบจากสถานะ §Yผัก§! ใน §Y[Root.GetName]§! โดยการเพิ่มคุณลักษณะ §Y$trait_enigmatic_intelligence_failed$§!"
 distar.5063.name:0 "พวกเราในร่างใหม่"
 distar.5063.desc:1 "ค่ำคืนสุดท้ายของการเรียนรู้ขณะหลับได้สิ้นสุดลงแล้ว และวันใหม่ได้เริ่มต้นขึ้นสำหรับพลเมืองบน [Root.GetName] ผู้ซึ่งเพิ่งจะตื่นรู้สู่โลกที่แตกต่างออกไปอย่างสิ้นเชิง - โลกที่เต็มไปด้วยความมหัศจรรย์และคำสัญญาทางวิทยาศาสตร์ ใครจะไปรู้ว่าจักรวาลนี้ช่างเป็นสถานที่ที่มีชีวิตชีวาและน่าหลงใหลเช่นนี้?\n\n ข้อมูลเบื้องต้นระบุว่าเรามีความสามารถที่พัฒนาขึ้นอย่างมากสำหรับการเรียนรู้และการวิจัยทางวิทยาศาสตร์ ต้องขอบคุณ BALDOR XXXIII และทุนอุดหนุนการอนุรักษ์ซีโนที่ใกล้สูญพันธุ์แห่งลาโวเซียน"
 distar.5063.a:0 "วันแห่งความภาคภูมิใจของชาว [Root.GetSpeciesNamePlural]!"
 distar.5069.name:0 "ยกเลิกการยกระดับ"
 distar.5069.desc:0 "เราได้ยุติกระบวนการย่อยระบบยกระดับแล้ว และประชาชนของเรากำลังค่อย ๆ กลับคืนสู่สภาพเดิมที่เชื่อถือได้ วัตถุต่างดาวรูปทรงกระบอกยาวที่รู้จักในชื่อ BALDOR XXXIII ได้จากไปในสภาพที่ระบบการทำงานสับสนวุ่นวายอย่างหนัก"
 distar.5069.a:0 "สิ่งนี้คงจะเป็นสิ่งที่ดีที่สุดแล้ว"
 distar.5070.name:1 "กระบวนการย่อยยกระดับถูกยุติลง"
 distar.5070.desc:1 "ภายหลังการโจมตีอย่างไร้สาเหตุจากฝ่าย [cache_killers.GetSpeciesName] ทำให้ BALDOR XXXIII สลายหายไปจากมิติ และกระบวนการยกระดับประชาชนของเราถูกยุติลงในทันที เราเชื่อว่าวัตถุต่างดาวทรงกระบอกซึ่งอยู่ในสภาพย่ำแย่อยู่แล้ว มีความเปราะบางอย่างยิ่งในระหว่างขั้นตอนการยกระดับ และได้รับความเสียหายอย่างสาหัสต่อฟังก์ชันการทำงานหลักในการโจมตีครั้งนี้ ในช่วงที่มันกำลังจะจากไป มันได้ส่งสัญญาณสื่อสารสุดท้ายออกมาว่า \"ข้าคือ BALDOR XXX...\"."
 distar.5070.a:1 "พวก [cache_killers.GetSpeciesName] จะต้องชดใช้"
 distar.5071.name:0 "คำเตือน"
 distar.5071.desc:2 "หลังจากผ่านช่วงเวลาการเรียนรู้ขณะหลับที่สงบเรียบร้อยมาเป็นเวลานาน บัดนี้ BALDOR XXXIII ดูเหมือนจะตกอยู่ในสภาวะคุ้มคลั่ง วงล้อหมุนด้วยความเร็วสูงมาก และส่งคลื่นฝันร้ายที่ไร้สาระเข้าใส่ผู้ที่พยายามจะนอนหลับพักผ่อน\n\nในขณะที่ผู้คนจำนวนมากเริ่มลังเลและไม่กล้านอนหลับ พลเมืองผู้โชคร้ายจำนวนหนึ่งกลับตกอยู่ในสภาวะผัก(คอมยา)ซึ่งไม่สามารถฟื้นตื่นขึ้นมาได้เลย\n\nวิศวกรของเราคาดว่า วัตถุลึกลับนี้ซึ่งได้รับความเสียหายอย่างหนักตั้งแต่แรกเริ่ม น่าจะเกิดการเสื่อมสภาพของอุปกรณ์ หากปล่อยไว้โดยไม่ได้รับการดูแล การยกระดับของเราอาจจะไม่เป็นไปตามแผนที่วางไว้"
 distar.5071.a:0 "ติดต่อ BALDOR XXXIII"
 distar.5071.b:0 "ส่งทีมวิศวกรเข้าไปจัดการ"
 distar.5071.c:0 "ยุติกระบวนการยกระดับในทันที"
 distar.5071.d:0 "$distar.1055.b$"
 distar.5071.tooltip:0 "สถานะ §Y$enigmatic_slumber$§! ถูกเพิ่มให้กับ §Hป๊อป§! จำนวนสูงสุด §Y400§! £pop£"
 distar.5072.name:0 "การส่งสัญญาณ"
 distar.5072.desc:0 "-- - - วิศวกรรม -\n\n-- - - วิศวกรรม -\n\n-- - - วิศวกรรม -\n\n-- - - - วิศวกรรม -"
