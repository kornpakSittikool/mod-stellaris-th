 SEALED_SYSTEM_PROJECT:0 "สถานีรูหนอนร้าง"
 SEALED_SYSTEM_PROJECT_DESC:0 "สถานีร้างลอยปั่นป่วนอยู่ที่ปากทางเข้าของรูหนอนในระบบดาว §Y[From.GetName]§! การตรวจสอบเชิงลึกอาจอธิบายได้ว่าใครเป็นผู้สร้างมันขึ้นมา และทำไมรูหนอนนี้ดูเหมือนจะไม่สามารถเดินทางผ่านเข้าไปได้เลยโดยสิ้นเชิง"

 PHASESHIFT_PROJECT:0 "การตรึงสถานะการสลับมิติ"
 PHASESHIFT_PROJECT_DESC:1 "ดาวเคราะห์ §Y[phaseshift_planet.GetName]§! ในระบบดาว §Y[phaseshift_planet.GetStarName]§! ได้ถูกสังเกตพบว่ามีการสลับมิติ (phase-shift) ระหว่างสภาวะ §Y$pc_shrouded$§! และ §Y$pc_gaia$§! ในทุก ๆ รอบวัฏจักรสามเดือน\n\nนักฟิสิกส์ของเราสมควรค้นหาหนทางที่จะตรึงดาวเคราะห์ดวงนี้ให้อยู่ในสถานะใดสถานะหนึ่งอย่างถาวร โดยล็อคค่าของมันไว้เป็นดาวเคราะห์เกอา §Y$pc_gaia$§! และป้องกันไม่ให้มันสลับกลับคืนมิติเดิม"

