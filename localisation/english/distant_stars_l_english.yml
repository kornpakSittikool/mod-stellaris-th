 abandoned_outpost_category_desc:0 "สถานีสังเกตการณ์เก่าแก่ที่ทรุดโทรมโคจรรอบ [big_rip_planet.GetName] แต่กลับไม่มีสัญญาณของสิ่งมีชีวิตมีสติปัญญาบนพื้นผิวดาว การตรวจสอบอย่างใกล้ชิดอาจช่วยให้คำตอบแก่เราว่าเพราะเหตุใด"
