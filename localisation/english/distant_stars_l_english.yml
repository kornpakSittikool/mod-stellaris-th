 hatchling_power:0 "พลังของวอยด์สปอว์น"
 curator_buff_hatchling:0 "สารเคลือบป้องกัน"
 curator_buff_hatchling_desc:0 "จากการรับฟังคำแนะนำของภัณฑารักษ์(เครื่องช่วยหายใจ)เราได้ครอบคลุมเคลือบยานอวกาศของเราด้วยสารเคลือบที่จะช่วยปกป้องพวกมันจากน้ำลายกัดกร่อนและหนามแหลมของวอยด์สปอว์น"
 enigmatic_cache_in_orbit:0 "ศึกษาเอเลี่ยน"
 enigmatic_cache_in_orbit_desc:0 "ตราบใดที่คลังข้อมูลปริศนา(แคชอากาศ)ยังคงอยู่ในวงโคจร นักวิทยาศาสตร์ของเราจะมีโอกาสเหลือเฟือในการวิจัยศึกษา"
 enigmatic_cache_in_orbit_phobe:0 "ความทุกข์ทรมานรูปทรงกระบอก"
 enigmatic_cache_in_orbit_phobe_desc:0 "ประชากรของเราจะไม่มีวันได้นอนหลับเต็มอิ่มตราบใดที่สิ่งประดิษฐ์ต่างดาวอันน่าสมเพชชิ้นนั้นยังคงอยู่ในวงโคจร"

