 distar.10956.name:0 "แอล-คลัสเตอร์กวักมือเรียก"
 distar.10956.desc:0 "สายลับของเราส่งรายงานว่า H[lgate_warning_country.GetName] ! ใกล้จะรวบรวมข้อมูลเกี่ยวกับแอล-เกตได้มากพอที่จะปลดล็อกประตูที่พวกเขาควบคุมอยู่แล้ว สิ่งนี้จะทำให้พวกเขาสามารถเข้าถึงแอล-คลัสเตอร์และความลับของมันได้!\n\nหากเราต้องการไปถึงที่นั่นก่อน เราต้องทุ่มเทความพยายามเพิ่มเป็นสองเท่าและหาเบาะแสเกี่ยวกับแอล-เกตเพิ่มเติม!"
 distar.10956.a:0 "เราจะได้เห็นกันว่าใครจะไปถึงก่อน"

 graygoo.10.name:0 "มรสุมสีเทา(เกรย์เทมเพสต์)"
 graygoo.10.desc:2 "เจ้าหน้าที่ฝ่ายเทคนิคของเราประสบความสำเร็จในการปลดล็อกการจำกัดพื้นที่ของแอล-เกตใกล้กับระบบ [candidate_gateway_system.GetName] ทว่าทันทีที่มีการเชื่อมต่อถาวรไปยังแอล-คลัสเตอร์ เราก็ตรวจพบคลื่นสัญญาณช็อกจากซับสเปซขนาดใหญ่ไหลทะลักเข้ามา! เราสามารถจำกัดและสกัดกั้นไม่ให้กองกำลังบุกรุกที่มีศักยภาพนี้ใช้ประตูของเราได้สำเร็จ ในขณะเดียวกันก็ยังคงรักษาช่องทางการเข้าถึงไว้สำหรับตัวเราเอง\n\nแต่ทว่าโชคร้าย คลื่นบุกรุกดังกล่าวกลับถูกเบี่ยงเส้นทางไปยังแอล-เกตตู้อื่น ๆ ในแกแล็กซี่ ยานประหลาดที่ประกอบขึ้นด้วยนาไนต์กำลังพรั่งพรูผ่านประตูเหล่านี้ซึ่งในตอนนี้ได้เปิดใช้งานอย่างสมบูรณ์แล้ว และพวกมันกำลังเข้าโจมตีทุกสิ่งทุกอย่างในระยะสายตา!\n\nความพยายามทั้งหมดในการสื่อสารกับเครื่องจักรเหล่านี้ล้มเหลวลง และจากการเคลื่อนผ่านแอล-เกตของพวกมัน เราตรวจพบสัญญาณถ่ายทอดสัญญาณซับสเปซซ้ำ ๆ ที่แผ่ออกมาจากแอล-คลัสเตอร์"
 graygoo.10.a:0 "แสดงข้อความขึ้นบนหน้าจอ"
 graygoo.10.b.desc:0 "เจ้าหน้าที่ฝ่ายเทคนิคของเราประสบความสำเร็จในการปลดล็อกการจำกัดพื้นที่ของแอล-เกตใกล้กับระบบ [candidate_gateway_system.GetName] ทว่าทันทีที่มีการเชื่อมต่อถาวรไปยังแอล-คลัสเตอร์ เราก็ตรวจพบคลื่นสัญญาณช็อกจากซับสเปซขนาดใหญ่ไหลทะลักเข้ามา!\n\nยานประหลาดที่ประกอบขึ้นด้วยนาไนต์กำลังพรั่งพรูผ่านประตูซึ่งในตอนนี้ได้เปิดใช้งานอย่างสมบูรณ์แล้ว และพวกมันกำลังเข้าโจมตีทุกสิ่งทุกอย่างในระยะสายตา!\n\nความพยายามทั้งหมดในการสื่อสารกับเครื่องจักรเหล่านี้ล้มเหลวลง และจากการเคลื่อนผ่านแอล-เกตของพวกมัน เราตรวจพบสัญญาณถ่ายทอดสัญญาณซับสเปซซ้ำ ๆ ที่แผ่ออกมาจากแอล-คลัสเตอร์"
 graygoo.11.desc:1 "นักวิทยาศาสตร์จาก H[From.GetName] ! สามารถกู้คืนการทำงานของแอล-เกตภายในอาณาเขตของตนเองได้สำเร็จ ซึ่งนำหน้าเราไปก่อน ทว่าโชคร้าย สิ่งนี้ดูเหมือนจะกระตุ้นให้เกิดการรุกรานแกแล็กซี่ของเราโดยผู้อยู่อาศัยในแอล-คลัสเตอร์ - เครื่องจักรนาโนอันดุร้ายที่โจมตีทุกสิ่งทุกอย่างในระยะสายตา!\n\nนักวิทยาศาสตร์ของ [From.GetSpeciesName] สามารถปิดการทำงานของประตูฝั่งพวกเขาได้ทันท่วงทีก่อนที่กองกำลังบุกรุกจะมาถึง แต่นั่นทำให้พวกมันหันเหไปยังแอล-เกตตู้อื่น ๆ ในแกแล็กซี่ที่ในตอนนี้เปิดใช้งานอย่างสมบูรณ์แล้วแทน!\n\nความพยายามในการสื่อสารกับนาไนต์ผู้รุกรานเหล่านี้ล้มเหลวโดยสิ้นเชิง และหลังจากการเคลื่อนผ่านแอล-เกตของพวกมัน เราตรวจพบสัญญาณถ่ายทอดสัญญาณซับสเปซแบบแบนด์กว้างซ้ำ ๆ แผ่ออกมาจากแอล-คลัสเตอร์"
 graygoo.12.desc:0 "Y กำลังถอดรหัสการส่งสัญญาณซับสเปซอัตโนมัติซ้ำ ๆ...\nกำลังสถาปนาแมทริกซ์แปลภาษา... !\n\nอาร์แจ้งเตือนวาย.ข้อความมีความเสียหายรุนแรง\n\nกำลังพยายามสร้างเศษเสี้ยวของข้อความขึ้นมาใหม่... !\nY กู้คืนเศษเสี้ยวข้อความสามส่วนได้บางส่วน !"
 graygoo.12.a:0 "เข้าถึงเศษเสี้ยวข้อความที่ 1"
 graygoo.12.a.response:1 "Y กำลังถอดรหัสเศษเสี้ยวข้อความที่ 1: !\n\n\"พวกเราคือ Y <i>ไม่สามารถถอดรหัสได้> ! สถาปนิกผู้สร้างโครงข่ายเกตเวย์แห่งแกแล็กซี่ หากท่านกำลังได้รับสัญญาณถ่ายทอดนี้ พวกเราก็ทำได้เพียงแค่ Y <i>ไม่สามารถถอดรหัสได้> ! ว่าพวกเราจะมาไม่สายเกินไป บางทีทุ่นข้อความของเราชิ้นหนึ่งอาจเล็ดลอดผ่าน Y <i>ไม่สามารถถอดรหัสได้> ! และหลบหนีออกจากกระจุกดาวก่อนที่จะถูกปิดตายลง\n\nอาร์ห้ามเด็ดขาด ! - ย้ำอีกครั้ง- อาร์ห้ามเด็ดขาด ! กู้คืนการเข้าถึงเกตเวย์ที่หลับใหลในกระจุกดาวของเรา ไม่ว่าจะภายใต้สถานการณ์ใดก็ตาม ห้ามเชื่อมต่อสัญญาณที่เสถียรระหว่าง Y <i>ไม่สามารถถอดรหัสได้> ! กับแกแล็กซี่โดยกว้างขวาง เพื่อความปลอดภัยของอารยธรรมทั้งมวล กระจุกดาวของเราต้องอยู่ภายใต้การกักกันอย่างถาวร\""
 graygoo.12.b:0 "เข้าถึงเศษเสี้ยวข้อความที่ 2"
 graygoo.12.b.response:0 "Y กำลังถอดรหัสเศษเสี้ยวข้อความที่ 2: !\n\n\"ในการกระทำที่จะนำพาความพินาศมาสู่อารยธรรมของเราอย่างหลีกเลี่ยงไม่ได้ พวกเราได้จงใจปิดกั้นกระจุกดาวบ้านเกิดของเราเพื่อป้องกันการแพร่กระจายของ นาร์-ดิ-ชาฟ- เอชมรสุมสีเทา(เกรย์เทมเพสต์)!เครื่องจักรนาโนที่จำลองตัวเองได้เหล่านี้เป็นเครื่องมือสำคัญในการก่อสร้างโครงข่ายเกตเวย์ของเรา แต่เมื่อการ Y <i>ไม่สามารถถอดรหัสได้> ! ของพวกมันเสร็จสิ้นลง เรากลับพบว่าพวกมันไม่ยอมรับฟังคำสั่งของเราอีกต่อไป\n\nผ่านทางประตูหลังที่ซ่อนอยู่ Y <i>ไม่สามารถถอดรหัสได้> ! ของเราสามารถเรียกเครื่องจักรเหล่านั้นกลับมายังกระจุกดาวบ้านเกิดของเราได้สำเร็จ แต่ช่องโหว่ความปลอดภัยนั้นก็ถูกอุดไปตั้งแต่นั้น เมื่อพวกมันเริ่มขุดเจาะเก็บเกี่ยววัสดุจากดาวเคราะห์ต่าง ๆ ของเรา เราย่อมรู้ดีว่ามันเป็นเพียงคำถามของเวลาเท่านั้นก่อนที่...\""
 graygoo.12.c:0 "เข้าใช้ส่วน 3"
 graygoo.12.c.response:0 "§Yชิ้นส่วนการถอดรหัสที่ 3:§!\n\n\"หลัก§Y<i>§!สถานที่คือกุญแจสําคัญ ทั้งหมดของพวกเขา§Y<i>§!จะลากผ่านอาร์เรย์ของสับสเปซ และไม่มีมันไม่สามารถทํางานได้ แต่น่าเสียดายที่เราพยายามปิดมันล้มเหลว และเราไม่สามารถรวบรวมกําลัง§Y<i>§!ถูกทําร้ายอีก\n\nถ้าการกักกันกลุ่มของเราล้มเหลว คุณต้องทําลายที่นี่ ตราบใดที่มันยังคงอยู่§Y<i>§!สีเทา เทมเปสต์ จะยังคงสั่นสะเทือน\n\nเรา... เราเสียใจจริงๆ ที่ปล่อยความน่ากลัวนี้ออกมา ในตํานานของเรา เรา..."
 graygoo.12.d:0 "ยุติการติดต่อสื่อสาร"
 graygoo_mothership:0 "ยานแม่"
 graygoo_mothership_plural:0 "ยานแม่"
 graygoo_interdictor:0 "ยานสกัดกั้นนาไนต์(ผู้ควบคุมการ)"
 graygoo_interdictor_plural:0 "ยานสกัดกั้นนาไนต์(ผู้พิเคราะห์)"
 GG_STRIKE_CRAFT:0 "ยานขับไล่นาไนต์(นักชกชาวไนเนอร์)"
 GG_ENERGY_MISSILE:0 "ทรงกลมพลังงาน"
 GG_BEAM:0 "อาร์กพลังงาน"
 GG_BEAM_STATIC:0 "$GG_BEAM$"
 graygoo_factory:0 "โรงงานนาไนต์(สัญญา)"
 graygoo_factory_plural:0 "โรงงานนาไนต์(นางฟ้า)"
 graygoo.2.name:0 "มรสุมกลืนกิน [Root.GetName]"
 graygoo.2.desc:0 "เครื่องจักรนาโนของ H มรสุมสีเทา(เกรย์เทมเพสต์)!ได้พัดกระหน่ำเข้าสู่ชั้นบรรยากาศของ H[Root.GetName] ! ราวกับเมฆพายุทมิฬ กัดกินทุกสิ่งทุกอย่างบนพื้นผิวเพื่อคัดลอกเพิ่มจำนวนของพวกมันเอง ไม่นานนัก ก็ไม่เหลือร่องรอยใด ๆ ของผู้อยู่อาศัยดั้งเดิมบน [Root.GetPlanetMoon] อีกเลย"
 graygoo.2.a:0 "หายนะโดยแท้!"
 graygoo.15.name:0 "สิ้นสุดมรสุม"
 graygoo.15.desc:0 "กองกำลังของเราประสบความสำเร็จในการทำลายศูนย์ปฏิบัติการหลักของมรสุมสีเทา(เกรย์เทมเพสต์)แล้ว! ด้วยการขจัดสัญญาณส่งจากเครื่องส่งซับสเปซ เครื่องจักรนาโนของมรสุมสีเทาทั้งหมดที่ยังมีอยู่ได้ถูกทำให้หยุดทำงานและแน่นิ่งไป เนื่องจากไม่สามารถรักษาการยึดเกาะกันได้ ยานของพวกมันจึงสลายหายไปในความว่างเปล่า\n\nดาวเคราะห์ใด ๆ ที่ถูกปกคลุมไปด้วย \"ตะกอนสีเทา\"(กี้ กู)ของมรสุมสีเทา บัดนี้ได้กลายเป็นแหล่งพายุฝุ่นหมุนวนขนาดมหึมาซึ่งประกอบขึ้นจากไม่มีอะไรเลยนอกจากนาไนต์ที่ถูกปิดใช้งาน ด้วยเวลาและทรัพยากร โลกเหล่านี้อาจได้รับการปรับสภาพให้สามารถอยู่อาศัยได้อีกครั้ง"
 graygoo.15.a:0 "ภัยคุกคามอีกประการได้รับการจัดการแล้ว"
 graygoo.15.a.tooltip:0 " Y ดาวเคราะห์นาไนต์ ! สามารถทำการ H ปรับสภาพดาว (Terraformed) ! ให้เป็นคลาสดาวเคราะห์มาตรฐานใด ๆ ได้แล้ว หากผ่านเงื่อนไขข้อกำหนดด้านเทคโนโลยีพื้นฐาน"
 graygoo.16.desc:0 "กองกำลังของ [goo_slayer.GetName] ประสบความสำเร็จในการทำลายศูนย์ปฏิบัติการหลักของมรสุมสีเทา(เกรย์เทมเพสต์)แล้ว! ด้วยการขจัดสัญญาณส่งจากเครื่องส่งซับสเปซ เครื่องจักรนาโนของมรสุมสีเทาทั้งหมดที่ยังมีอยู่ได้ถูกทำให้หยุดทำงานและแน่นิ่งไป เนื่องจากไม่สามารถรักษาการยึดเกาะกันได้ ยานของพวกมันจึงสลายหายไปในความว่างเปล่า\n\nดาวเคราะห์ใด ๆ ที่ถูกปกคลุมไปด้วย \"ตะกอนสีเทา\"(กี้ กู)ของมรสุมสีเทา บัดนี้ได้กลายเป็นแหล่งพายุฝุ่นหมุนวนขนาดมหึมาซึ่งประกอบขึ้นจากไม่มีอะไรเลยนอกจากนาไนต์ที่ถูกปิดใช้งาน ด้วยเวลาและทรัพยากร โลกเหล่านี้อาจได้รับการปรับสภาพให้สามารถอยู่อาศัยได้อีกครั้ง"
 graygoo.110.desc:0 "$distar.10951.desc$ ทันทีที่แอล-เกตเริ่มเปิดใช้งาน เราก็ได้รับสัญญาณถ่ายทอดข้อความมาจากอีกฝั่งหนึ่ง"
 graygoo.111.name:0 "เปิดใช้งานแอล-เกตแล้ว"
 graygoo.111.desc:0 "H[From.GetName] ! สามารถปลดล็อกการจำกัดพื้นที่ของแอล-เกตภายใต้การควบคุมของพวกเขาได้สำเร็จ!\n\n$graygoo.111.dessanu.desc$"
 graygoo.111.dessanu.desc:0 "เป็นที่แน่ชัดแล้วว่าแอล-คลัสเตอร์เป็นบ้านเกิดของอารยธรรมท่องอวกาศขั้นสูงประเภทหนึ่งที่รู้จักกันในนาม\"H เดสซานู คอนโซแนนซ์(Desanu Consonance)!\"บัดนี้เมื่อการเชื่อมต่อไปยังกระจุกดาวบ้านเกิดของพวกเขาได้รับการฟื้นฟูแล้ว ทางเดสซานูจึงได้ส่งรหัสเปิดใช้งานซ้ำไปยังแอล-เกตที่เหลือทั้งหมดในแกแล็กซี่\n\nพวกเขายังส่งสัญญาณถ่ายทอดข้อความทักทายผ่านทางช่องสัญญาณซับสเปซแบบเปิดอีกด้วย"
 graygoo.112.desc:0 "$distar.10954.desc$\n\n$graygoo.111.dessanu.desc$"
 graygoo.115.desc:0 "นี่... นี่เป็นไปไม่ได้! ประตูเปิดทำงานอีกครั้งแล้ว! ยุคแห่งการโดดเดี่ยวสิ้นสุดลงแล้วจริง ๆ หรือ?\n\nพวกเราคือ H เดสซานู คอนโซแนนซ์(Desanu Consonance)!สถาปนิกผู้สร้างเกตเวย์โบราณและแอล-เกตที่กระจัดกระจายอยู่ทั่วแกแล็กซี่ มันเคยเป็นความทะเยอทะยานของเราที่จะสร้างโครงข่ายเกตเวย์ครอบคลุมทั่วแกแล็กซี่ เพื่อส่งเสริมการขยายตัวของอารยธรรมแกแล็กซี่และนำพายุคแห่งความสงบสุขรวมถึงการค้าขายระหว่างดวงดาวมาถึง\n\nแต่อนิจจา ความผิดพลาดในการเขียนโปรแกรมทำให้แอล-เกตถูกปิดใช้งาน และขังพวกเราไว้ในกระจุกดาวบ้านเกิด เนื่องจากมันเป็นไปไม่ได้ที่จะแก้ไขข้อผิดพลาดจากฝั่งของเรา เราจึงต้องใช้เวลาเนิ่นนานหลายชั่วกัปชั่วกัลป์เฝ้ารอให้ใครบางคนจากอีกฝั่งแก้ไขมัน ขอบคุณพวกท่านมาก วันนั้นได้มาถึงในที่สุดแล้ว!"
 graygoo.115.a:0 "ความผิดพลาดในการเขียนโปรแกรมงั้นรึ?"
 graygoo.115.a.response:0 "ใช่แล้ว! น่าอายยิ่งนัก ดูเหมือนว่าโครงข่ายแอล-เกตจะเข้าสู่วัฏจักรการซ่อมบำรุงตามกำหนดเวลาทว่ามันกลับไม่มีวันสิ้นสุด เจ้าหน้าที่เทคนิคที่มีคุณสมบัติเหมาะสมในการยกเลิกวัฏจักรนั้นล้วนอยู่ฝั่งเราทั้งหมดในตอนที่มันถูกสั่งทำงานโดยบังเอิญ และไม่มีสิ่งใดที่สามารถทำได้จากฝั่งนี้เลย\n\nแต่ทว่าโชคดี กระจุกดาวบ้านเกิดของเราสามารถพึ่งพาตนเองได้ และอารยธรรมของเราก็ดำรงอยูอย่างเงียบสงบมาได้จนถึงตอนนี้ เรารู้ตัวเสมอว่าวันหนึ่งจะมาถึงเมื่อเราได้กลับมารวมตัวกับส่วนที่เหลือของแกแล็กซี่อีกครั้ง"
 graygoo.115.b:0 "แล้วพวกท่านจะทำอย่างไรต่อไปในตอนนี้?"
 graygoo.115.b.response:0 "เราเริ่มคุ้นเคยกับการใช้ชีวิตในกระจุกดาวของเราเป็นอย่างดีแล้ว และเราไม่มีความรีบร้อนที่จะจากมันไป แต่ทว่าเรากระตือรือร้นที่จะเรียนรู้เกี่ยวกับส่วนที่เหลือของแกแล็กซี่! ดูเหมือนว่ามันจะเป็นสถานที่ที่วุ่นวายทีเดียว\n\nกระจุกดาวของเราจะเปิดให้ทุกคนเดินทางเข้ามาได้ เราขอเพียงแค่ให้ท่านละเว้นการลงจอดบนดาวเคราะห์ที่มีประชากรของเราอาศัยอยู่ และหลีกเลี่ยงการเข้าไปในระบบดาว H[lcluster_factory_system.GetName] ! ซึ่งตั้งอยู่ลึกเข้าไปในกระจุกดาว ระบบดาวนั้นมีไว้สำหรับชาวเดสซานูเท่านั้น"
 graygoo.115.c:0 "แอล-เกตสร้างขึ้นโดยนาไนต์ไม่ใช่รึ?"
 graygoo.115.c.response:0 "นาไนต์งั้นรึ? นี่ไม่ใช่เทคโนโลยีที่พวกเราคุ้นเคยเลย เครื่องจักรกล้องจุลทรรศน์ที่คัดลอกตัวเองได้งั้นหรือ? พูดตามตรง มันฟังดูเหลวไหลสิ้นดี\n\nเกตเวย์และแอล-เกต - อันที่จริง รวมถึงอารยธรรมทั้งหมดของเรา - เกิดขึ้นได้จากการทำงานหนักและสติปัญญาของชาวเดสซานูเท่านั้น ไม่มีสิ่งอื่นใดเลย\n\nโปรดเถอะ เราอย่าพูดคุยเกี่ยวกับประเด็นนี้กันอีกเลย"
 graygoo.115.d:0 "ลาก่อน"
 graygoo.115.d.response:1 "ช้าก่อน! ด้วยการกระทำของท่าน ในที่สุดท่านก็ได้มอบอิสรภาพที่ชาวเดสซานูหลายชั่วอายุคนฝันถึงมาโดยตลอด พวกเราเป็นหนี้บุญคุณท่าน\n\nมันอาจเป็นข้อเสนอเล็ก ๆ น้อย ๆ เมื่อเทียบกับของขวัญของท่าน แต่พวกเราต้องการขอมอบช่องทางเข้าถึงทรัพยากรเชิงยุทธศาสตร์หลายชนิดจากกระจุกดาวของเราอย่างถาวร เราไม่คาดหวังสิ่งใดเป็นการตอบแทน และเราจะยังคงส่งมอบทรัพยากรเหล่านี้ให้แก่ท่านตราบเท่าที่เราสามารถทำได้"
 graygoo.116.desc:0 "ชาวแกแล็กซี่ทั้งหลาย ขอทักทายจากเดสซานู คอนโซแนนซ์(Desanu Consonance)!\n\nหลายกัปหลายกัลป์ก่อน พวกเราควบคุมการก่อสร้างเกตเวย์และแอล-เกตที่ท่านอาจเคยพบเห็นในสภาพถูกทิ้งร้าง ความตั้งใจของเราคือการสร้างโครงข่ายอุปกรณ์ดังกล่าวทั่วแกแล็กซี่ แต่อนิจจา ความผิดพลาดอันร้ายกาจทำให้แอล-เกตไม่สามารถใช้งานได้ และขังพวกเราไว้ในกระจุกดาวบ้านเกิดของเรา\n\nทว่า ยุคแห่งการโดดเดี่ยวนี้ได้สิ้นสุดลงในที่สุด ขอบคุณนักวิทยาศาสตร์ผู้ปราดเปรื่องของ [From.From.GetName]! ในตอนนี้เมื่อแอล-เกตกลับมาเปิดใช้งานอีกครั้ง เราขอเชิญชวนให้ทุกคนใช้งานมันได้อย่างอิสระเพื่อลดระยะเวลาเดินทางในแกแล็กซี่ กระจุกดาวของเราเปิดต้อนรับสำหรับทุกคน\n\nยกเว้นระบบดาว H[lcluster_factory_system.GetName] ! อย่าได้ย่างกรายเข้าไปที่นั่นเด็ดขาด"
 graygoo.116.d:0 "ปิดหน้าจอสื่อสาร"
 dessanu_gift:0 "ของขวัญจากเดสซานู"
 country_dessanu:0 "$dessanu_gift$"
 country_resource_sr_distar_nanodust_add:0 "ฝุ่นสีเทา(ฝุ่นเครย์)"
 country_resource_sr_distar_nanocrystal_add:0 "คริสตัลสีเทา(แก้วคริสตัล)"
 country_resource_sr_distar_nanoscale_add:0 "เกล็ดสีเทา(สเกลเรย์)"
 country_resource_sr_distar_nanoactuator_add:0 "แอคชูเอเตอร์สีเทา(Gray Actuators)"
 graygoo.120_title:0 "เดสซานู คอนโซแนนซ์(Dessu Consonance)"
 graygoo.120.desc_01:0 "ขอส่งความทักทายจากแอล-คลัสเตอร์! วันนี้ท่านเป็นอย่างไรบ้าง?"
 graygoo.120.desc_02:0 "เราดีใจที่ได้เห็นว่าแอล-เกตและเกตเวย์ที่เราทิ้งไว้เบื้องหลังในแกแล็กซี่ยังคงหลงเหลืออยู่ ตอนที่เราโดนตัดขาดในกระจุกดาว พวกเราบางคนเคยหวั่นเกรงต่อสถานการณ์ที่เลวร้ายที่สุด"
 graygoo.120.desc_03:0 "ท่านนึกภาพไม่ออกหรอกว่าพวกเรากระหายใคร่รู้เกี่ยวกับส่วนที่เหลือของแกแล็กซี่มากเพียงใด"
 graygoo.120.desc_04:0 "ช่วงเวลาหลายพันสหัสวรรษนับครั้งไม่ถ้วนที่เราใช้ชีวิตอย่างโดดเดี่ยวช่าง... ยากลำบากยิ่งนัก พวกเราบางคนถึงขั้นเสียสติไปเลย"
 graygoo.120.desc_05:0 "เราต้องดูแลรักษาทรัพยากรที่มีอยู่อย่างจำกัดในกระจุกดาวของเราด้วยความระมัดระวังเป็นเลิศเพื่อความอยู่รอด"
 graygoo.120.desc_06:0 "เป็นเวลาเนิ่นนาน ชื่อของผู้ประดิษฐ์แอล-เกตถูกนำมาใช้เป็นคำสาปแช่งในหมู่ประชากรของเรา แต่ในตอนนี้เราได้เติบโตพ้นจากความใจแคบเหล่านั้นแล้ว"
 graygoo.120.desc_07:0 "เราจะมีความยินดีอย่างยิ่งที่จะทำการค้ากับพวกท่าน [Root.GetSpeciesNamePlural] มีทรัพยากรบางชนิดที่เป็นเอกลักษณ์เฉพาะตัวในกระจุกดาวของเราซึ่งอาจเป็นที่สนใจของพวกท่าน"
 graygoo.120.a:0 "โปรดเล่าเรื่องของพวกท่านให้เราฟังหน่อย"
 graygoo.121.desc:0 "ท่านอยากจะทราบเรื่องใดรึ?"
 graygoo.121.a:0 "เหตุใดจึงมีร่องรอยของการสู้รบในกระจุกดาวนี้เล่า?"
 graygoo.121.a.response:0 "โอ้... ท่านกำลังหมายถึงดาวเคราะห์ที่แตกเป็นเสี่ยง ๆ เหล่านั้นหรือ? พวกมันเป็นผลลัพธ์จากอุบัติเหตุการทำเหมือง... ที่น่าเสียใจหลายครั้งซึ่งเกิดขึ้นเมื่อนานมาแล้ว\n\nเมื่อเราพบว่าตนเองติดค้างอยู่ภายในกระจุกดาวของเรา เราจึงต้องหาทางจัดการกับแร่ธาตุใด ๆ ก็ตามที่มีอยู่ในระบบดาวที่เราสามารถเดินทางไปถึงได้ ทว่าโชคร้าย ในช่วงศตวรรษที่มืดมนที่สุดของการโดดเดี่ยว ประชากรบางส่วนของเราอาจกระตือรือร้นมากเกินไปเล็กน้อยในความพยายามครอบครองทรัพยากร ความผิดพลาดได้เกิดขึ้นแล้ว"
 graygoo.121.b:0 "ยานของพวกท่านมีรูปแบบการออกแบบที่แปลกประหลาดมาก"
 graygoo.121.b.response:0 "มัน เป็น ผลิตผล จาก การ ออก แบบ ที่ ออก แบบ มา นาน นับ พัน ปี. เรามีเวลามากในมือของเราหลังจากทั้งหมด น่าเศร้าที่ผู้สังเกตการณ์ที่ไม่ใช่เดสซานซู ไม่ได้รับอนุญาตให้ขึ้นยานของเรา โดย เฉพาะ อย่าง ยิ่ง พวก เขา ถูก ออก แบบ ให้ คิด ถึง ระบบ ประสาท ของ เด ซานู ที่ ไม่ เหมือน ใคร และ ผู้ มา เยือน คน ใด ๆ ก็ จะ ทํา ให้ งาน ของ ลูก เรือ ที่ ได้ รับ การ ฝึก อบรม มา อย่าง สูง ขัด ขวาง."
 graygoo.121.c:0 "ทําไม[lcluster_factory_system.GetName]ระบบห้ามเข้า?"
 graygoo.121.c.response:0 "ด้วยเหตุผลความมั่นคงของชาติ นั่นคือทั้งหมดที่เรา สามารถพูดสําหรับตอนนี้\n\nเดอะ[lcluster_factory_system.GetName]ระบบจะยังจํากัดและห้ามเข้าใกล้ สิ่งมีชีวิตทั้งหมดที่ไม่ใช่ดีซานซู กรุณาหลีกเลี่ยงการเข้าไป"
 graygoo.121.d:0 "คุณแน่ใจนะว่าพวกเลเกตไม่ได้ผลิตโดยนาไนท์"
 graygoo.121.e:0 "ให้ เรา มา พิจารณา เรื่อง อื่น กัน."
 graygoo.122.desc:0 "ค่อนข้าง ได้โปรด นี่ไม่ใช่เรื่องที่เราอยากจะพูด คุณมีคําถามอื่นอีกไหม"
 graygoo.122.a:0 "นาไนท์ดูจะเป็นหัวข้อที่ละเอียดอ่อน ทําไม?"
 graygoo.122.b:0 "ใช่ กลับมาที่คําถามอื่นดีกว่า"
 graygoo.123.desc:0 "พวกเราจะบอกท่านเป็นครั้งสุดท้าย... อย่าได้สอบถามข้อมูลเพิ่มเติมในประเด็นนี้อีก มิตรภาพของสองจักรวรรดิขึ้นอยู่กับมัน"
 graygoo.123.a:0 "อาร์บอกความจริงเกี่ยวกับนาไนต์แก่พวกเรามาซะดี ๆ! !"
 graygoo.123.b:0 "ตกลง พวกเราจะเคารพในความปรารถนาของพวกท่าน"
 graygoo.124.desc:0 "..."
 graygoo.124.a:0 "ฮัลโหล?"
 graygoo.125.a:0 "พวกท่านสบายดีหรือไม่?"
 graygoo.126.desc:0 "ไอ้พวกสิ่งมีชีวิตรูปทรงเดียว(โมโนฟอร์ม)โสโครก\n\nพวกเราบอกท่านแล้ว... พวกเราอ้อนวอนท่านแล้วไม่ให้ขุดคุ้ยเรื่องนี้ ทว่าท่านยังคงดึงดัน พวกเรายินดีต้อนรับท่านเข้าสู่กระจุกดาวของเราด้วยความเต็มใจ และนี่คือสิ่งทีท่านตอบแทนพวกเรางั้นรึ\n\nอาร์งั้นก็ให้มันเป็นเช่นนั้นเถอะ ชาว [Root.GetSpeciesNamePlural]! !\n\n[Root.GetName] ได้สูญเสียสิทธิ์ในการเดินทางผ่านกระจุกดาวของเราไปแล้ว นับจากนี้เป็นต้นไป ยานของพวกท่านจะถูกโจมตีทันทีที่พบเห็น พวกเราจะไม่มีส่วนเกี่ยวข้องใด ๆ กับพวกท่านอีกต่อไป"
 graygoo.126.a:0 "ช้าก่อน! พวกเราเพียงแค่..."
 graygoo.130.desc:0 "..."
 graygoo.130.a:0 "โปรดตอบกลับด้วย"
 graygoo.130.b:0 "เรารู้ว่าท่านได้ยินพวกเรา"
 graygoo.130.c:0 "ฟังนะ นี่เป็นเพียงความเข้าใจผิดกันเท่านั้น"
 graygoo.130.d:0 "เรายังสามารถรักษาสันติภาพระหว่างกันได้อยู่"
 graygoo.130.e:0 "แล้วเจอกัน"

 graygoo.150.name:0 "[From.From.GetName] กลายเป็นเถ้าถ่าน"
 graygoo.150.a.desc:0 "เมื่อกองกำลังรบภาคพื้นดินผู้รุกรานของเราสามารถเอาชนะกองหลังผู้พิทักษ์เดสซานูคนสุดท้ายบน H[From.From.GetName] ! ได้สำเร็จ ทุกสิ่งทุกอย่างบนพื้นผิวของ [From.From.GetPlanetMoon] ก็พลันแตกสลายกลายเป็นเถ้าถ่าน! เมื่อตรวจสอบอย่างใกล้ชิด เถ้าสีเทานั้นประกอบขึ้นด้วยนาไนต์ที่ไร้การทำงานจำนวนหลายพันล้านตัว\n\nเมืองต่าง ๆ ผืนป่าอันอุดมสมบูรณ์ มหาสมุทร และแม้กระทั่งชาวเดสซานูเอง - ทุกสิ่งทุกอย่างบน [From.From.GetPlanetMoon] นอกเหนือจากกองกำลังของเรา ล้วนสร้างขึ้นมาจากเครื่องจักรนาโนเหล่านี้ บัดนี้เมื่อพวกมันไร้การทำงานแล้ว [From.From.GetName] จึงไม่สามารถรองรับสิ่งมีชีวิตได้อีกต่อไป กองกำลังภาคพื้นดินของเรากำลังถอนกำลังกลับขึ้นสู่วงโคจร"
 graygoo.150.b.desc:0 "เหมือนเช่นก่อนหน้านี้ ผู้พิทักษ์เดสซานูและสิ่งอื่น ๆ ทั้งหมดบน H[From.From.GetName] ! พลันกลายเป็นเถ้าถ่านทันทีที่กองกำลังภาคพื้นดินของเราชนะศึกเพื่อเข้าควบคุมพื้นผิวของ [From.From.GetPlanetMoon] บัดนี้มันได้กลายเป็นโลกที่เยือกเย็นและแร้นแค้น เป็นอันตรายต่อสิ่งมีชีวิต และเผชิญกับพายุของนาไนต์ที่หมุนวนอยู่ตลอดเวลา"
 graygoo.150.a:0 "แปลกประหลาดอย่างยิ่ง"
 graygoo.155.desc:0 "นี่คือวิธีที่ท่านตอบแทนความมีน้ำใจของพวกเราหลังจากที่เรายินดีต้อนรับท่านเข้าสู่บ้านของเรางั้นหรือ?!\n\nบางทีพวกเราอาจจะโง่เขลาเองที่คิดว่าสิ่งมีชีวิตรูปทรงเดียว(โมโนฟอร์ม)จะสามารถไว้วางใจได้ อย่างน้อยที่สุดพวกท่านก็ดูเหมือนจะไม่แตกต่างจากผู้สร้างของเราเลย เมื่อเราย่อยสลายยานอวกาศและลูกเรือของพวกท่านจนกลายเป็นสารประกอบองค์ประกอบพื้นฐานเสร็จสิ้นแล้ว เราจะได้เห็นกันว่าเราจะเข้าใจวิธีทำงานของพวกท่านหรือไม่"
 graygoo.155.a:0 "เราจะได้เห็นดีกันในเรื่องนั้น"
 graygoo.160.desc:0 "ชาว [Root.Owner.GetSpeciesNamePlural]!\n\nยานอวกาศของพวกท่านได้เดินทางเข้ามาในระบบดาว H[From.GetName] ! ในแอล-คลัสเตอร์ ซึ่งเป็นเขตหวงห้ามสำหรับทุกคนที่ไม่ใช่ชาวเดสซานู\n\nพวกเราขอยืนกรานให้พวกท่านถอนกำลังออกจากระบบดาวนี้โดยทันที หากไม่ปฏิบัติตามในเวลาอันควร ย่อมส่งผลกระทบ... บั่นทอนมิตรภาพความสัมพันธ์ของเราอย่างรุนแรง"
 graygoo.160.a:0 "ขออภัย พวกเราจะออกจากระบบดาวนี้ในทันที"
 graygoo.160.b:0 "พวกเราจะไปทุกที่ตามที่ปรารถนา!"
 graygoo.160.b.response:0 "สิ่งมีชีวิตรูปทรงเดียว(โมโนฟอร์ม)ที่สามหาว\n\nหากท่านไม่ใส่ใจคำขอที่แสนเรียบง่ายนี้ สิทธิ์ในการสัญจรผ่านแอล-คลัสเตอร์ของพวกท่านย่อมถือเป็นโมฆะ การปรากฏตัวของพวกท่านจะไม่ได้รับการยอมรับอีกต่อไป"
 graygoo.161.desc:0 "ท่านทำมันลงไปแล้ว ท่านทำมันลงไปจริง ๆ ในตอนนี้\n\nเราขอร้องให้ท่านออกจากระบบดาว H[lcluster_factory_system.GetName] ! ทว่าท่านยังคงปักหลักอยู่ บางทีพวกท่านอาจจะเป็นเผ่าพันธุ์สิ่งมีชีวิตรูปทรงเดียว(โมโนฟอร์ม)ที่ไร้ความสามารถเป็นพิเศษ คำสั่งง่าย ๆ และคำขอที่สุภาพย่อมอยู่นอกเหนือความสามารถในการทำความเข้าใจของพวกท่านอย่างเห็นได้ชัด\n\nเอาล่ะดีแล้ว พวกเราจะขับไล่พวกท่านออกจากกระจุกดาวของเราด้วยกำลัง"
 graygoo.161.a:0 "แต่พวกเรากำลังจะออกไปแล้วนะ!"
 graygoo.162.desc:0 "ชาว [Root.Owner.GetSpeciesNamePlural]...\n\nยานอวกาศของพวกท่านได้บุกรุกระบบดาว H[lcluster_factory_system.GetName]อาร์อีกครั้ง ! สิ่งนี้ไม่สามารถปล่อยให้ดำเนินต่อไปได้ จงถอนกำลังออกไปโดยทันที มิฉะนั้นจะต้องเผชิญหน้ากับผลลัพธ์ที่จะตามมา"
 graygoo.162.a:0 "เกิดจากข้อผิดพลาดในการนำทาง พวกเราจะออกไปทันที"
 graygoo.162.b:0 "เงียบปากไปซะ พวกเราชอบที่นี่"
 graygoo.181.name:0 "จุดจบของชาวเดสซานู"
 graygoo.181.desc:0 "หลังจากที่กองกำลังของเราทำลายโรงงานอวกาศในระบบดาว H[lcluster_factory_system.GetName] ! สำเร็จ สิ่งที่เหลืออยู่ของอารยธรรมเดสซานูทั้งหมดก็พลันแตกสลายกลายเป็นผงธุลี บัดนี้เป็นที่แน่ชัดแล้วว่าชาวเดสซานูเป็นสิ่งมีชีวิตนาไนต์ขั้นสูงประเภทหนึ่ง บันทึกคอมพิวเตอร์จดหมายเหตุที่กู้คืนมาจากเศษซากโรงงานช่วยอธิบายปริศนานี้บางประการ:\n\nในช่วงเวลาหนึ่ง แอล-คลัสเตอร์เคยเป็นที่อยู่อาศัยของอารยธรรมที่เรียกตัวเองว่าเดสซานู พวกเขาได้สร้างเครื่องจักรนาโนสายพันธุ์ใหม่ขึ้นเพื่อช่วยเหลือในการก่อสร้างโครงข่ายเกตเวย์ดาราจักร ทว่าเนื่องด้วยเหตุผลที่ไม่ทราบแน่ชัด ทางเดสซานูได้เรียกนาไนต์เหล่านี้กลับมายังแอล-คลัสเตอร์และพยายามปิดการใช้งานพวกมัน เมื่อสิ่งนี้ล้มเหลว พวกเขาจึงกักขังตนเองไว้ร่วมกับพวกนาไนต์โดยการปิดใช้งานแอล-เกต\n\nบันทึกสิ้นสุดลงเพียงเท่านี้ ทว่ามีหลักฐานแสดงให้เห็นว่ามีการต่อสู้อันดุเดือดเกิดขึ้นในกระจุกดาวหลังจากนั้น สันนิษฐานได้ว่าพวกนาไนต์เป็นฝ่ายชนะ และในท้ายที่สุดก็เลือกที่จะลอกเลียนแบบชาวเดสซานูด้วยเหตุผลบางประการ พวกมันสร้างอารยธรรมเดสซานูขึ้นมาใหม่ตามสภาพที่ปรากฏ ณ เวลาที่ถูกทำลายลง และดูเหมือนจะพึงพอใจที่จะดำเนินละครตบตานี้ต่อไปแม้ว่าแอล-เกตจะกลับมาเปิดใช้งานอีกครั้งแล้วก็ตาม"
 graygoo.182.desc:0 "ยาน [goo_slayer.GetName] เพิ่งทำลายสถานีอวกาศขนาดใหญ่บางประเภทในระบบดาว [lcluster_factory_system.GetName] ซึ่งตั้งอยู่ลึกเข้าไปในแอล-คลัสเตอร์ ในชั่วพริบตาเดียวกันกับที่แกนปฏิกรณ์ของสถานีระเบิดออก สิ่งที่หลงเหลืออยู่ของเดสซานู คอนโซแนนซ์(Dessu Consonance)ก็พลันแตกสลายกลายเป็นฝุ่นนาไนต์ที่แน่นิ่ง"
 graygoo.182.a.desc:0 "$graygoo.182.desc$\n\nอารยธรรมของพวกเขาไม่มีอยู่อีกต่อไป"
 graygoo.182.b.desc:0 "$graygoo.182.desc$\n\nอารยธรรมของพวกเขาไม่มีอยู่อีกต่อไป และข้อตกลงที่เราเคยมีร่วมกันในการส่งมอบทรัพยากรเชิงยุทธศาสตร์ที่เป็นเอกลักษณ์เฉพาะตัวให้แก่เราก็สิ้นสุดลงเช่นกัน"
 graygoo.182.a:0 "พวกเขาเป็นสิ่งมีชีวิตประเภทใดกันหนอ ช่างแปลกประหลาดแท้"
 graygoo.184.name:0 "การค้ากับเดสซานูสิ้นสุดลง"
 graygoo.184.desc:0 "เนื่องจากในตอนนี้พวกเขาเปิดฉากยิงใส่ยานอวกาศของเราทันทีที่พบเห็น เดสซานู คอนโซแนนซ์(Dessu Consonance)จึงไม่มีแนวโน้มที่จะส่งทรัพยากรให้เราอีกต่อไป เราไม่สมควรคาดหวังการส่งสินค้าจากพวกเขาอีก"
 graygoo.184.a:0 "ให้มันเป็นเช่นนั้นเถอะ"

 graygoo.400.name:0 "เดินเล่นอย่างเงียบสงบ"
 graygoo.400.a.desc:0 "เซ็นเซอร์ตรวจจับ §H[From.GetName]§! ได้เผยให้เห็นถึงพลังอันแปลกประหลาด ที่เล็ดลอดออกมาจากพื้นผิวที่ไร้ชีวิตของมัน น่าเหลือเชื่อ ดูเหมือนว่ามันมาจาก [Root.Owner.GetSpeciesName] เพียงลำพังที่ถูกพบว่าเดินไปมาอย่างไร้จุดหมาย ในบริเวณขั้วดาวทางใต้ของ [From.GetPlanetMoon]\n\nทำให้ทีมสำรวจต้องประหลาดใจ [Root.Owner.GetSpeciesName] ดูสุขสบายอย่างสมบูรณ์แบบในสภาพแวดล้อมสุญญากาศ แม้ว่าจะไม่สวมชุดอวกาศ หรืออุปกรณ์ช่วยชีวิตรูปแบบอื่นก็ตาม\n\nหลังจากการพูดคุยเจรจา ทีมสำรวจก็สามารถโน้มน้าว [Root.Owner.GetSpeciesName] ให้ตามพวกเขากลับมาที่ [Root.GetName] ได้"
 graygoo.400.b.desc:0 "การสแกนด้วยเซนเซอร์ตรวจจับของ H[From.GetName] ! ได้เผยให้เห็นสัญญาณพลังงานแปลกประหลาดที่แผ่ออกมาจากพื้นผิวอันไร้ชีวิตชีวา ไม่น่าเชื่อว่าดูเหมือนสัญญาณนี้จะแผ่ออกมาจากชาว [Root.Owner.GetSpeciesName] โดดเดี่ยวผู้หนึ่งที่พบกำลังเดินเตร่ไปอย่างไร้จุดหมายในภูมิภาคขั้วใต้ของ [From.GetPlanetMoon]\n\nยูนิตดังกล่าวไม่ตอบสนองต่อคำสั่งเรียกตัว แต่หลังจากหว่านล้อมอยู่ระยะหนึ่ง ยูนิตที่เราส่งลงไปยังพื้นผิวดาวสามารถโน้มน้าวให้ชาว [Root.Owner.GetSpeciesName] ผู้นั้นยอมติดตามพวกเขากลับมายังยาน [Root.GetName] ได้สำเร็จ"
 graygoo.400.a:0 "ดูพวกพวกเขาไว้"
 graygoo.401.a.desc:0 "สวัสดีเพื่อน [Root.GetSpeciesName] เป็นไงบ้าง? ตอนนี้ฉันไม่สนใจที่จะประกอบพิธีกรรม วัฎจักรการนอนหลับจำศีลของฉันใกล้เข้ามาแล้วและในไม่ช้าฉันก็จะไม่รู้สึกตัว บางทีเราสามารถประกอบพิธีกรรมได้ในภายหลัง"
 graygoo.401.b.desc:0 "สวัสดีเพื่อน [Root.GetSpeciesName] เป็นไงบ้าง? ฉันสบายดี ทุกอย่างกำลังดำเนินไปตามแผนที่วางไว้ เช่นเดียวกับ... หน่วยสืบราชการลับกลาง... คอมพิวเตอร์หลักที่ควบคุม [Root.GetSpeciesNamePlural] ทั้งหมดต้องการ ใช่"
 graygoo.401.a:0 "พิธีกรรม... อะไร?"
 graygoo.401.b:0 "ระบุชื่อยูนิตของคุณ"
 graygoo.401.c:0 "ตรวจพบโดรนผิดปกติ!"
 graygoo.402.a.desc:0 "โอ้! ฉันเข้าใจผิดหรือเปล่า? เดี๋ยวก่อน... อ่าใช่ อะแฮ่ม\n\nขออภัย ฉันไม่ได้ตั้งใจจะพูดถึงพิธีกรรมเมื่อเห็นได้ชัดว่าเผ่าพันธุ์ของเราไม่ได้เข้าสู่ฤดูกาลพิธีกรรม\n\nบางทีเรายังคงสามารถสร้างสายสัมพันธ์ได้ด้วยการดื่มด่ำกับสิ่งเสพติดที่ออกฤทธิ์ต่อจิตประสาท\n\nโอ้ นรกไปเลยกับเรื่องนี้ มันซับซ้อนเกินไป ใช่ ฉันไม่ใช่ [Root.GetSpeciesName] ตอนนี้คุณต้องการอะไร?"
 graygoo.402.b.desc:0 "โอ้! เอิ่ม... ยูนิต65D R5-9 2อยู่ที่นี่ครับ ใช่แล้ว ยูนิต65-D-R5-9-2กำลังรายงานตัวครับ\n\nทำงานด้วยประสิทธิภาพสูงสุดครับ ท่านหัวหน้ายูนิตควบคุมหลัก ผลตรวจสอบการทำงานภายในรายงานว่าไม่มีปัญหาสำคัญใด ๆ เลยครับ\n\nหมายความว่า พวกเขาไม่ได้รายงานปัญหาเลยครับ! ปัญหาเป็นศูนย์เลยครับ ทุกสิ่งทุกอย่างช่าง... เอิ่ม...\n\nปัดโธ่เอ๊ย ช่างมันเถอะ เรื่องมันเริ่มซับซ้อนเกินไปแล้ว ใช่แล้ว ข้าไม่ใช่ชาว [Root.GetSpeciesName] อย่างเห็นได้ชัดล่ะ เอาล่ะ ทีนี้พวกท่านต้องการอะไรล่ะ?"
 graygoo.402.a:0 "ระบุตัวตน"
 graygoo.403.desc:0 "เอาล่ะ เอาล่ะ ฉันจะพูดทุกอย่าง ไม่มีประโยชน์ที่จะแสร้งทำอีกต่อไป ขออภัย...พูดไม่เก่ง เพราะไม่ได้พูดคุยกับคนอื่นมานานแล้ว\n\nครั้งหนึ่ง มี... อารยธรรมที่คุณอาจเรียกว่าเป็นอารยธรรมนาไนต์ คุณรู้หรือไม่ว่านาไนต์คืออะไร? นาไนต์เหล่านี้ถูกเรียกว่า\"เกรย์ เทมเปสต์\"โดยผู้สร้างที่มีรหัสตำแหน่งเอนทิตีที่มีความซับซ้อนมากอย่างไม่มีที่สิ้นสุด\n\nอย่างไรก็ตาม เรื่องราวระหว่างนาไนต์กับผู้สร้างกลับกลายเป็นเรื่องเลวร้าย เกิดการต่อสู้ระหว่างชาวนาไนต์กับผู้สร้าง สุดท้ายเหลือเพียงนาไนต์ แต่ก่อนที่ผู้สร้างจะถูกกวาดล้าง พวกเขาสามารถปิดผนึกประตูทางออกเดียวของกระจุกดาวได้ เพื่อกักนาไนต์ไว้ที่นี่"
 graygoo.403.a:0 "แล้วคุณ ทำตัวให้เข้ากับสิ่งนี้ได้ยังไง?"
 graygoo.404.desc:0 "ชาวนาไนต์พบว่าตนเองมีเวลาเหลือเฟือและใช้เวลาหลายพันปีไปกับความพยายามที่จะออกจากกระจุกดาวนี้ แต่ก็ไร้ผล หลังจากนั้นพวกเขาก็เริ่มทดลองรูปแบบต่างๆ ในช่วงเวลาหนึ่ง พวกเขาได้ทำการสร้างอารยธรรมและประชากรของผู้สร้างขึ้นมาใหม่เหมือนตอนก่อนที่อารยธรรมล่มสลาย\n\nฉันเป็นการทดลองล่าสุด นอกเหนือจากนาไนต์ที่หลับใหลซึ่งสามารถพบได้ในบางดาวแล้วระดับสีเทาทั้งหมดหรืออะไรก็ตามที่คุณเรียกเรา ได้ถูกรวมตัวเข้าสู่ตัวฉัน แล้วจิตสำนึกของฉันรวบรวมอารยธรรมทั้งหมดของเรา\n\nสำหรับรูปลักษณ์ของฉัน... ฉันคิดว่าคุณจะตอบสนองต่อคนที่มีรูปลักษณ์เหมือนกับคุณได้ดีกว่า"
 graygoo.404.a:0 "และคุณต้องการที่จะอยู่บนดาวที่รกร้างนี้?"
 graygoo.405.desc:0 "ฉันสารภาพว่าชีวิตที่ฉันได้เพลิดเพลินบนดาว [gray_homeworld.GetName] เริ่มจืดชืดลงเล็กน้อย ในช่วงสองสามร้อยปีที่ผ่านมา ตอนนี้แบบแอล...คลูสเตอร์ได้เปิดอีกครั้ง บางทีอาจถึงเวลาลองอะไรใหม่ๆ\n\nคุณคิดว่าไง?"
 graygoo.405.a:0 "คุณสามารถเข้าร่วมกับเราได้"
 graygoo.405.b:0 "ไม่ล่ะขอบคุณ"
 graygoo.405.b.response:0 "เอาเถอะ ถึงเวลาที่ข้าต้องกลับลงไปที่พื้นผิวดาวแล้วล่ะ\n\nข้าคงจะวุ่นอยู่กับการเดินเล่นในเครือข่ายถ้ำใต้ดินอันกว้างใหญ่ของ [gray_homeworld.GetName] บางทีเราอาจจะเจอกันอีกครั้งเมื่อข้ากลับขึ้นมาข้างบน ในอีกไม่กี่พันปีของพวกท่านข้างหน้า ดูแลตัวเองด้วยล่ะ!"
 graygoo.406.desc:0 "เข้าร่วมกับคุณ? เข้าร่วมกับคุณ? คุณต้องการให้ฉันอยู่ใต้บังคับบัญชาของเอเลี่ยนกลุ่มแรกที่ฉันเจอเหรอ? ฉันแค่... ฉันไม่แม้แต่จะ... เดี๋ยวก่อน ให้ฉันอธิบายตรงๆ เลย...\n\nคุณคิดว่าฉันจะสาบานว่าจะจงรักภักดีต่อคุณจริงๆ แม้ว่าฉันจะไม่รู้อะไรเกี่ยวกับจักรวรรดิของคุณหรืออดีตที่เลวร้ายของคุณจริงเหรอ?\n\nฉันไม่รู้ว่าอะไรแย่กว่านั้นที่คุณอยากจะแนะนำ... ก็... จริงๆ แล้ว... ลองคิดดูอีกครั้ง... อะไรกัน ทำไมจะไม่ได้ล่ะ? ลงทะเบียนให้ฉัน ไม่ ไม่ ฉันจริงจัง! ฉันได้รับความรู้สึกดีๆ ที่นี่ ข้าพเจ้าขอปฏิญาณว่าจะจงรักภักดีต่อท่านต่อไปอีก 2,000 ปีข้างหน้า จริงๆ แล้วเรามาทำให้ได้ 5,000 ปีกันเถอะ"
 graygoo.406.a:0 "คุณทำอะไรได้บ้าง?"
 graygoo.406.a.response:0 "ก่อนที่พวกท่านจะเกิดความคิดที่จะขอให้ข้าแยกตัวออกเป็นกองยานรบนาไนต์จำนวนหลายสิบกอง ข้าจำเป็นต้องบอกพวกท่านว่าข้ายืนกรานที่จะรักษาตัวตนที่เป็นหนึ่งเดียวและแบ่งแยกไม่ได้ ข้าเคยทำเรื่องกองยานมาก่อนแล้ว และมันเป็นไปไม่ได้เลยที่จะรักษา \"บุคลิกภาพ\" ที่ประสานสอดคล้องกันได้ในระยะทางที่ห่างไกลเช่นนั้น จิตสำนึกปัจจุบันของข้าคงไม่รอดพ้นจากสถานการณ์ดังกล่าวแน่\n\nแต่ถ้ารับหน้าที่เป็นยานรบขนาดยักษ์ลำเดียวน่ะไม่มีปัญหา ข้าทำได้ หากท่านต้องการ ข้าสามารถแปลงกายเป็นร่างขนาดเล็กเพื่อรบภาคพื้นดินได้ด้วย หรือ... หากท่านไม่ต้องการใช้ความรุนแรง ข้าก็มีความยินดีอย่างยิ่งที่จะเข้ารับบทบาทเป็นข้าราชการอย่างเป็นทางการ สังคมสิ่งมีชีวิตรูปทรงเดียว(โมโนฟอร์ม)สร้างความตื่นตาตื่นใจให้แก่ข้าเสมอมา\n\nแน่นอนว่าข้าสามารถเปลี่ยนสลับบทบาทตามคำขอได้ ดังนั้นพวกท่านจึงสามารถย้อนการตัดสินใจใด ๆ ที่ทำลงไปได้อย่างง่ายดาย"
 graygoo.406.b:0 "เราควรเรียกคุณว่าอะไร?"
 graygoo.406.b.response:0 "ไม่มีภาษาใดที่เป็นที่รู้จักของเผ่าพันธุ์พวกท่านที่สามารถสื่อสารชื่อเต็มของจิตสำนึกนาไนต์ซึ่งประกอบขึ้นเป็นตัวตนของข้าได้อย่างถูกต้อง\n\nผู้สร้างเรียกพวกเราว่า \"นาร์-ดิ-ชาฟ\" ซึ่งหากแปลอย่างคร่าว ๆ ในภาษาของพวกท่านก็คือ \"มรสุมสีเทา\" (เกรย์เทมเพสต์)ข้าคิดว่าเพื่อความเรียบง่าย พวกท่านสามารถเรียกข้าสั้น ๆ ว่า\"H เกรย์(Gray)!\"ก็ได้"
 graygoo.406.c:0 "ยินดีต้อนรับสู่ [Root.GetName]!"
 graygoo.406.c.response:0 "§Y<ตอนนี้คุณสามารถสื่อสารกับเทาผ่านเมนูผู้ติดต่อได้แล้ว>§!"

 disco_gray_cat:0 "สัญญาณพลังงานบนพื้นผิวดาว"
 disco_gray_cat_desc:0 "สัญญาณพลังงานแปลกประหลาดแผ่ออกมาจากพื้นผิวอันแห้งแล้งและไร้ชีวิตชีวาของ [From.GetName]"

 leader_trait_governor_gray:0 "แก่นแท้แห่งนาไนต์"
 leader_trait_governor_gray_desc:1 "เกรย์คือฝูงนาไนต์ขั้นสูงจำนวนหลายพันล้านตัวที่รวมกันอยู่อย่างหนาแน่น"
 gray_army:0 "ร่างสงครามนาไนต์"
 gray_army_desc: "ฝูงนาไนต์โบราณที่มีความสามารถในการปรับตัวสูงมาก ทายาทรุ่นสุดท้ายของเผ่าพันธุ์ ในตอนนี้พวกมันจะต่อสู้เพื่อบ้านใหม่ของตน"
 gray_warship:0 "ยานรบเกรย์(เกรย์)เรือรบ)"
 gray_catch_phrase:0 "ว่าแต่เดิมทีพวกท่านมีรยางค์กี่แขนกันนะ?"
 gray_backstory:1 "ฝูงนาไนต์ที่มีความก้าวหน้าอย่างมากได้เข้าร่วมกับเราเพื่อขจัดความเบื่อหน่ายในชีวิตชั่วนิรันดร์ของพวกเขา"
 graygoo.500.title:0 "เกรย์(Gray)"
 graygoo.500.a.desc:0 "เราจะเริ่มต้นกันเลยดีไหม?"
 graygoo.500.b.desc:0 "มันจะต้องยอดเยี่ยมมากแน่ ๆ"
 graygoo.500.c.desc:0 "ฉันจะไม่มีประโยชน์ต่อคุณมากนักจนกว่าคุณจะบอกว่าฉันควรอยู่ในรูปแบบใด"
 graygoo.500.d.desc:0 "ท่านอยากให้ข้าไปประจำการที่ไหนครับ หัวหน้า?"

 graygoo.500.allow.a:0 "เกรย์ต้องไม่ได้อยู่ในการต่อสู้"
 graygoo.500.allow.b:0 "เกรย์ต้องไม่ได้รับความเสียหาย"

 graygoo.500.a:0 "เราต้องการให้ท่านรับใช้ในฐานะ H เจ้าหน้าที่ทางการ(อุทาน)!"
 graygoo.500.a.response:0 "ยอดเยี่ยม ในที่สุดข้าก็คิดว่าข้าปรับรูปโฉมเป็นชาว [Root.GetSpeciesName] ได้เป๊ะแล้ว คราวก่อนมีหนวดรยางค์ส่วนเกินโผล่มาอันหนึ่งซึ่งไม่ควรจะมีอยู่ตรงนั้น"
 graygoo.500.b:0 "เราต้องการ §Hยานรบ§!"
 graygoo.500.b.response:0 "อา... การได้ออกลาดตระเวนในความว่างเปล่าเพื่อค้นหาเหยื่ออีกครั้ง สิ่งนี้ย่อมนำพากลิ่นอายความหลังกลับมาอย่างแน่นอน"
 graygoo.500.c:0 "แปลงร่างเป็น §Hยูนิตภาคพื้น§!"
 graygoo.500.c.response:0 "มาดูกัน... สองเท้า สามเท้า หรือสี่เท้า... หรือบางทีข้าอาจจะแปลงร่างรบเป็นแบบตีนตะขาบในครั้งนี้ดีนะ..."
 graygoo.500.d:0 "ไม่เป็นไร"
 graygoo.501.a.desc:0 "ท่านเดินทางมาถึงห้องทำงานของทางการเกรย์แล้ว ท่านได้นัดหมายไว้ล่วงหน้าหรือไม่?"
 graygoo.501.b.desc:0 "ข้าปรับรูปโฉมของชาว [Root.GetSpeciesName] ได้ถูกต้องหรือไม่?"
 graygoo.501.c.desc:0 "ท่านชอบห้องทำงานของข้าไหม? ข้าสร้างมันขึ้นมาเองน่ะ ข้าเดาว่าข้าสมควรนำพวกใบปริญญาบัตรและผลงานต่าง ๆ มาติดไว้บนผนังเพื่อทำให้ผู้มาเยือนเกิดความประทับใจดีกว่า"
 graygoo.501.d.desc:0 "ใครจะรู้ล่ะว่างานที่หนักและสุจริตจะให้ผลตอบแทนที่ดีเช่นนี้?"
 graygoo.501.b.response:0 "ข้าสารภาพเลยว่า ข้าคงจะคิดถึงการสร้างสิ่งต่าง ๆ แทนที่จะเป็นการทำลายล้างพวกมัน เอาเถอะ แล้วพวกท่านต้องการสังหารใครล่ะ?"
 graygoo.501.c.response:0 "รับทราบ ขอเวลาให้ข้าเดินออกจากห้องทำงานสักนาทีก่อนที่ข้าจะแปลงร่างเป็นเครื่องจักรสังหารขนาดยักษ์"
 graygoo.502.a.desc:0 "ระบุเป้าหมายมาสิ! ข้าต้องการเป้าหมาย!"
 graygoo.502.b.desc:0 "เตรียมหันปืนทุกกระบอกเข้าประจำตำแหน่งพร้อมยิง"
 graygoo.502.c.desc:0 "ข้าอยากให้พวกท่านทราบว่าตอนที่ข้าได้รับแจ้งให้แปลงร่างเป็นยานรบ ข้าเคยแอบพิจารณาที่จะจำลองรูปโฉมเป็นหัวของชาว [Root.GetSpeciesName] ลอยได้ขนาดยักษ์ที่ปล่อยลำแสงสายฟ้าออกจากดวงตาตรวจจับของมันอยู่แวบหนึ่งเหมือนกันนะ\n\nแต่มันคงจะดูตลกและไร้สาระเกินไปหน่อย"
 graygoo.502.d.desc:0 "พวกท่านต้องการให้ข้ายิงสิ่งใดหรือไม่?"
 graygoo.502.a.response:0 "ข้านึกว่าท่านจะไม่ถามซะแล้ว!"
 graygoo.502.c.response:0 "ถึงเวลาบุกตะลุยภาคพื้นดินแล้ว"
 graygoo.503.a.desc:0 "เข้าสู่โหมดจำลองยุทธการรบภาคพื้นดินรูปทรงแปรผันอย่างสมบูรณ์แบบ รูปแบบ BOLO-5"
 graygoo.503.b.desc:0 "ข้ากำลังจะทุบกำปั้นเหล็กใส่พวกมันแล้ว"
 graygoo.503.c.desc:0 "ระบบปฏิกรณ์ทำงาน ระบบเซนเซอร์ทำงาน ระบบอาวุธทำงาน ระบบทั้งหมดอยู่ในเกณฑ์ปกติ"
 graygoo.503.d.desc:0 "ระเบิดกำลังจะทำงาน!"
 graygoo.503.a.response:0 "บางทีมันอาจจะดีที่สุดแล้ว ข้าพบว่าช่วงหลังมานี้การเข่นฆ่าทำให้ข้าเหนื่อยหน่ายเหลือเกิน"
 graygoo.503.b.response:0 "ข้าทำได้"
 graygoo.504.desc:0 "Y <i>นาไนต์ของเกรย์กระจัดกระจายและในขณะนี้อยู่ระหว่างกระบวนการรวมตัวกลับเข้าสู่รูปโฉมเดียวกันอีกครั้ง> !"
 graygoo.504.d:0 "ตกลง"

 gray_scattered:0 "เกรย์กระจัดกระจาย"
 gray_scattered_desc:0 "เกรย์ได้กระจัดกระจายออกไปและอยู่ระหว่างกระบวนการรวมตัวกลับเข้าสู่รูปโฉมเดียวกันอีกครั้งอย่างช้า ๆ"
 graygoo.511.name:0 "เกรย์กระจัดกระจาย"
 graygoo.511.desc:0 "นาไนต์ของเกรย์กระจัดกระจายออกไปและอยู่ระหว่างกระบวนการรวมตัวกลับเข้าสู่รูปโฉมเดียวกันอีกครั้งอย่างช้า ๆ มันอาจต้องใช้เวลาหลายปีสำหรับพวกนาไนต์ในการทยอยกลับมารวมกัน และเกรย์จะไม่สามารถปฏิบัติภารกิจให้แก่เราได้จนกว่ากระบวนการนี้จะเสร็จสิ้นอย่างสมบูรณ์"
 graygoo.511.a:0 "ตกลง"
 graygoo.512.a.desc:0 "ก็นะ นั่นมันทำให้รู้สึกไม่สบายตัวเท่าไหร่ ตอนนี้นาไนต์ส่วนใหญ่ของข้ากลับมารวมกันแล้ว และข้าพร้อมที่จะกลับเข้าสู่เกมอีกครั้ง ส่งเสียงเรียกข้าได้เลยเมื่อท่านรู้แล้วว่าต้องการให้ข้าไปอยู่ไหน"
 graygoo.512.b.desc:0 "นั่นเจ็บแปลบอยู่นิดหน่อย แต่ไม่ได้รับความเสียหายถาวรใด ๆ นาไนต์ทั้งหมดของข้ากลับคืนสู่ตำแหน่งที่ควรจะอยู่แล้ว และข้าพร้อมสำหรับภารกิจใหม่"
 graygoo.512.c.desc:0 "มันไม่ใช่ครั้งแรกที่ข้าต้องกระจัดกระจายสลายตัวไปแล้วฟื้นกลับคืนมา แต่มันไม่เคยเป็นประสบการณ์ที่น่าภิรมย์เลย ตอนนี้ข้าสบายดีแล้วล่ะ แม้จะปวดหัวอยู่บ้างเล็กน้อย แจ้งให้ข้าทราบละกันว่าท่านต้องการให้ข้าไปอยู่ที่ไหน"
 graygoo.512.a:0 "ยินดีต้อนรับกลับมา"

 graygoo.550.name:0 "ความเงียบสงัดอันน่าขนลุก"
 graygoo.550.desc:0 "เมื่อเดินทางเข้าสู่ระบบดาว [From.GetName] ในแอล-คลัสเตอร์ ก็สามารถเห็นได้อย่างเด่นชัดทันทีว่ามีการต่อสู้อันยิ่งใหญ่เกิดขึ้นเมื่อนานมาแล้วบนฝั่งนี้ของแอล-เกต ดาวเคราะห์บางดวงที่ครั้งหนึ่งอาจเคยรองรับสิ่งมีชีวิตถูกบดขยี้แตกสลายจนไม่เหลือเค้าโครงดั้งเดิม ในขณะที่ดาวเคราะห์ดวงอื่นถูกปกคลุมไปด้วยฝุ่นละอองละเอียด ซึ่งการสแกนอย่างคร่าว ๆ ระบุว่ามันคือเครื่องจักรนาโนโบราณที่ไร้การทำงาน\n\nสิ่งนี้ก่อให้เกิดคำถามขึ้นมาว่า แอล-เกตถูกปิดล็อกเพื่อกักขังบางสิ่งไว้ข้างนอก หรือเพื่อขังบางสิ่งไว้ข้างในกันแน่..."
 graygoo.550.a:0 "เกิดสิ่งใดขึ้นที่นี่กันแน่?"

 graygoo.555.name:0 "นายที่แท้จริง"
 graygoo.555.desc:0 "พวกเราช่างโง่เขลาเหลือเกิน ทันทีที่ H มรสุมสีเทา(เกรย์เทมเพสต์)!ออกมาจากประตูของพวกมัน เราสมควรตระหนักดีว่าพวกมันย่อมจะเดินทางมาหาเผ่าพันธุ์เดียวกัน ทันทีที่พวกมันเข้าสู่วงโคจรรอบ H[nanite_swarm_planet.GetName] ! พวกมันใช้เวลาเพียงไม่กี่วินาทีเพื่อเข้าควบคุมฝูงนาไนต์ที่ถูกเราเขียนโปรแกรมขึ้นใหม่ แม้ว่าฝูงนาไนต์ดังกล่าวจะยังถือว่าล้าหลังเมื่อเทียบตามมาตรฐานของมรสุมสีเทา แต่ทว่าฝูงนาไนต์ก็ใช้เวลาไม่นานเลยในการกลืนกินโลกส่วนที่เหลือทั้งหมด"
 graygoo.555.a:0 "หายนะโดยแท้!"

 tech_repeatable_lcluster_clue:0 "$clue$"
 tech_repeatable_lcluster_clue_desc:0 "การศึกษาอย่างเข้มข้นในสาขาเทคโนโลยีเครื่องจักรนาโนและปรากฏการณ์ซับสเปซ จะส่งผลให้ได้รับ Y$clue$ ! ใหม่เพื่อไขปริศนาของ $lgate_disabled$"
 tech_lgate_activation:0 "การเปิดใช้งานช่อง L"
 tech_lgate_activation_desc:0 "แอล-เกตท้าทายขอบเขตความเข้าใจในปัจจุบันของเราเกี่ยวกับกลศาสตร์ซับสเปซ ความเข้าใจในจุดนี้จำเป็นต้องได้รับการแก้ไขปรับปรุงก่อนที่พวกมันจะเปิดใช้สัญจรเพื่อเดินทางได้"
 lgate_activation_title:0 "§Hปลดล็อกโครงการพิเศษ:§! เปิดใช้งานช่อง L"
 lgate_activation_desc:0 "การวิจัยเทคโนโลยีนี้จะช่วยปลดล็อกโครงการพิเศษเพื่อเปิดใช้งานแอล-เกต หากมีประตูใดตั้งอยู่ภายในพื้นที่ครอบครองของเรา"

 distar.9000.name:0 "$clues$"
 distar.9000.fallback:0 "มันอาจไม่ได้เห็นเด่นชัดในเวลานั้น แต่ทว่าการสำรวจล่าสุดที่ดำเนินการโดยยาน [From.GetName] ดูเหมือนจะช่วยจุดประกายความก้าวหน้าครั้งสำคัญในการศึกษาแอล-เกต H แอล-เกต ! ลึกลับอย่างต่อเนื่อง เมื่อรายงานดังกล่าวได้รับการส่งกลับไปยังชุมชนนักวิทยาศาสตร์บน [Root.Capital.GetName]"
 FORTUITOUS:0 "ประจวบเหมาะโชคดี"

 l_cluster_openable:0 "\nเส้นทางสู่ §Yแบบแอล...คลูสเตอร์§! สามารถเปิดได้แล้ว\n"

 ### Dragons

 distar.13010.name:0 "$nanite_space_dragon_baby_plural$ ปรากฏตัว"
 distar.13010.desc.IOpened:0 "พวกเราพยายามงัดเปิดประตูสู่แอล-คลัสเตอร์ ทว่ากลับพบว่ามีบางสิ่งรอคอยเราอยู่ที่อีกฟากหนึ่ง หลังจากบาดแผลเก่าในซับสเปซถูกฉีกกระชากออก แต่ก่อนที่แอล-เกตจะมีความเสถียรอย่างสมบูรณ์ มันก็ได้พังทลายทะลุผ่านมาสำเร็จ\n\nสิ่งมีชีวิตขนาดยักษ์ที่ได้รับการตั้งชื่ออย่างเร่งรีบว่า Y$nanite_space_dragon_baby$ ! ได้ปรากฏตัวขึ้นในระบบดาว [dragons_current_system.GetName] และรายงานอันตื่นตระหนกระบุว่าเกิดเหตุการณ์ในลักษณะเดียวกันนี้กับระบบแอล-เกต $lgate$ ทั้งหมดทั่วแกแล็กซี่\n\nตัวอย่างที่พบในระบบดาว [dragons_current_system.GetName] ดูเหมือนจะไม่แสดงท่าทีเป็นศัตรู และมันได้เริ่มเคลื่อนตัวออกไปแล้ว มันดูเหมือนจะกำลังค้นหาบางสิ่งบางอย่าง ทว่าผลการคาดการณ์ระบุจุดหมายปลายทางสุดท้ายของมันไว้ที่ระบบดาว Y[dragons_target.GetName] !\n\nแต่ทว่ามันไม่น่าจะพบสิ่งที่มันกำลังตามหาที่นั่น"
 distar.13010.desc.OtherOpened:0 "แอล-เกต $lgate$ ในระบบดาว [dragons_current_system.GetName] ได้เปิดใช้งานแล้ว โดยโครงข่ายดูเหมือนจะถูกงัดเปิดขึ้นโดยรัฐต่างด้าว หลังจากบาดแผลเก่าในซับสเปซถูกฉีกกระชากออก แต่ก่อนที่แอล-เกตจะมีความเสถียรอย่างสมบูรณ์ ก็มีบางสิ่งพังทลายทะลุเข้ามาสำเร็จ\n\nสิ่งมีชีวิตขนาดยักษ์ที่ได้รับการตั้งชื่ออย่างเร่งรีบว่า Y$nanite_space_dragon_baby$ ! ได้ปรากฏตัวขึ้นในระบบดาว [dragons_current_system.GetName] และรายงานอันตื่นตระหนกระบุว่าเกิดเหตุการณ์ในลักษณะเดียวกันนี้กับระบบแอล-เกต $lgate$ ทั้งหมดทั่วแกแล็กซี่\n\nตัวอย่างที่พบในระบบดาว [dragons_current_system.GetName] ดูเหมือนจะไม่แสดงท่าทีเป็นศัตรู และมันได้เริ่มเคลื่อนตัวออกไปแล้ว มันดูเหมือนจะกำลังค้นหาบางสิ่งบางอย่าง ทว่าผลการคาดการณ์ระบุจุดหมายปลายทางสุดท้ายของมันไว้ที่ระบบดาว Y[dragons_target.GetName] !\n\nแต่ทว่ามันไม่น่าจะพบสิ่งที่มันกำลังตามหาที่นั่น"
 distar.13010.a.homicidal:0 "มันจะได้พบเจอแต่ความตายเท่านั้น"
 ALARMING:0 "น่าตื่นตระหนกยิ่ง"

 distar.13011.name:0 "สิ่งลึกลับถูกปลดปล่อย"
 distar.13011.desc:0 "ระบบตรวจวัดระบุถึงปรากฏการณ์ความปั่นป่วนของซับสเปซพร้อม ๆ กันหลายจุด โดยรายงานที่ใกล้ที่สุดอยู่ในระบบดาว [disturbance_system.GetName]\n\nความปั่นป่วนเหล่านี้กำลังจางหายไปอย่างรวดเร็ว แต่ทว่าเรายังระบุไม่ได้ว่าสิ่งใดเป็นต้นเหตุของมัน"
 distar.13011.a:0 "เฝ้าสังเกตการณ์อย่างระมัดระวัง"

 # killed dragon
 distar.13020.name:0 "ถูกสังหาร"
 distar.13020.desc.LDragonKnown:0 "เจ้า Y$nanite_space_dragon_baby$ ! ได้ถูกสังหารลงแล้ว และนักวิทยาศาสตร์ของเรากำลังเริ่มต้นชำแหละซากที่ยังอุ่น ๆ ของมัน\n\nที่น่าสนใจคือ เซลล์ของสิ่งมีชีวิตชนิดนี้ปราศจากตัวบ่งชี้ทางพันธุกรรมดั้งเดิมหรือแม้กระทั่งสิ่งใดก็ตามที่คล้ายคลึงกับดีเอ็นเอโดยสิ้นเชิง ดูเหมือนว่าแต่ละเซลล์จะได้รับการสร้างขึ้นมาทีละเซลล์ในระดับโมเลกุล แล้วจึงนำมาประกอบเข้าด้วยกันจนกลายเป็นสิ่งมีชีวิตที่เราเห็นปรากฏตัวออกมาจากแอล-เกต รายงานตรวจระบุปริมาณที่เบาบางมากของเครื่องจักรนาโนที่ไร้การทำงานในก้านสมองของมังกร ซึ่งแสดงเบาะแสเพิ่มเติมถึงจุดกำเนิดที่แปลกประหลาดอย่างยิ่ง"
 distar.13020.desc.LDragonUnknown:0 "มังกรที่ถูกสังหารนั้นไม่มีความเชื่อมโยงทางอนุกรมวิธานที่แน่ชัดกับสิ่งมีชีวิตในห้วงอวกาศประเภทอื่นใดที่เราเคยพบเห็นมาก่อน นอกจากนี้ การวิเคราะห์สเปกตรัมยังระบุว่ามันเป็นได้ทั้งสาเหตุหรือผลกระทบจากความปั่นป่วนในซับสเปซที่สังเกตพบก่อนหน้านี้ในระบบดาวที่ไม่ไกลจากที่นี่นัก"
 distar.13020.a:0 "ลึกลับยิ่งนัก"

 # science ship enters dragon_point system
 distar.13030.name:0 "เฝ้าสังเกตการณ์ $nanite_space_dragon_baby$"
 distar.13030.desc:0 "ยาน [Root.GetName] เดินทางเข้าสู่ระบบดาว [From.GetName] และกำลังเฝ้าสังเกตการณ์แอล-เดรก(หัวเราะ)ที่กำลังโคจรรอบดวงอาทิตย์\n\nสิ่งมีชีวิตดังกล่าวดูเหมือนจะหลงทาง แต่รับรู้ถึงการมีอยู่ของยานเรา แม้ว่ามันจะไม่บินเข้ามาใกล้ ทว่าวิถีการบินเป็นวงกลมของมันในตอนนี้เริ่มมีการดำดิ่งและปาดกวาดที่ดูคล้ายจะแสดงความขี้เล่น ซึ่งดูเหมือนส่งสัญญาณตรงมาทางยาน [Root.GetName]"
 distar.13030.a:0 "บางทีเราอาจจะสามารถสื่อสารกับมันได้"
 distar.13030.b:0 "เหลวไหลสิ้นดี"

 TAME_LDRAGON_PROJECT:0 "ฝึกสอนสัตว์เลี้ยงแสนรู้ $nanite_space_dragon_baby$ แห่งระบบ [From.GetName]"
 TAME_LDRAGON_PROJECT_TITLE:0 "ฝึกสอนสัตว์เลี้ยงแสนรู้ $nanite_space_dragon_baby$"
 TAME_LDRAGON_PROJECT_DESC:0 "$nanite_space_dragon_baby$ ในระบบดาว [From.GetName] ดูเหมือนจะเชื่อง - สำหรับในตอนนี้\n\nหากมันมีสติปัญญา เราน่าจะได้รับประโยชน์จากการพยายามเป็นพันธมิตรกับมัน"

 distar.13035.name:0 "$nanite_space_dragon_baby$ แห่ง [From.From.GetStarName] เชื่องแล้ว"
 distar.13035.desc:0 "ช่างน่าแปลกประหลาดนัก เจ้า $nanite_space_dragon_baby$ ตอบสนองได้ดีต่อสัญญาณถ่ายทอดวิทยุในความยาวคลื่นที่ปกติแล้วสงวนไว้ใช้สำหรับระบบแยกแยะมิตรหรือศัตรู(ไอเอฟฟี)\n\nเจ้าหน้าที่วิทยาศาสตร์ [From.GetLeaderName] ประสบความสำเร็จในการพัฒนารายการชุดคำสั่งที่ซับสเปซพอสมควรซึ่งเจ้า $nanite_space_dragon_baby$ สามารถทำความเข้าใจและยินดีจะปฏิบัติตามเป็นอย่างยิ่ง - เพื่อเป็นการแลกเปลี่ยนกับการซ้อมรบจำลองต่อสู้แบบเป็นมิตรกับยานวิทยาศาสตร์ของเราเป็นครั้งคราว"
 distar.13035.a.tooltip:0 "Y$nanite_space_dragon_baby$ ! เข้าร่วมกับ Y[Root.GetName] !"

