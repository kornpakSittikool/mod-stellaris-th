 drone_mining_techniques_nomad: "เทคนิค การ เก็บ เกี่ยว ได โอ นิก"
 drone_mining_techniques_nomad_desc: "เทคนิกที่ได้มาจากเหมืองแร่ ช่วยเราเก็บเกี่ยวทรัพยากรที่มีประสิทธิภาพมากขึ้น ระหว่างการเดินทางของเรา"
