 tr_purity_colonial_viceroys_devour:0 "จิตเหนือสำนึกผู้ครอบครอง(ผู้พิพากษาโอเวอร์มินด์)"
 tr_purity_colonial_viceroys_devour_desc:0 "$tr_domination_colonial_viceroys_desc$"
 tr_purity_colonial_viceroys_devour_delayed:0 "สัญญาณประการแรก: เพื่อพิชิต สัญญาณประการที่สอง: เพื่อจัดงานเลี้ยงเฉลิมฉลอง สัญญาณประการที่สามซึ่งเป็นสัญญาณถาวรที่สุดของชัยชนะของเรา: เพื่อสร้างรังรวงอันไม่มีวันสิ้นสุดบนโลกดวงใหม่ที่ถูกกวาดล้างสิ่งมีชีวิตอื่นจนหมดสิ้น"

 tr_supremacy_above_the_fray_devour:0 "ผู้ล่าผู้มีความอดทน"
 tr_supremacy_above_the_fray_devour_desc:0 "$tr_supremacy_above_the_fray_desc$"
 tr_supremacy_above_the_fray_devour_delayed:0 "เราพบว่าพวกท่านคนอื่น ๆ ช่างยากที่จะทำความเข้าใจ พวกท่านปล่อยให้ชีวิตอันสั้นสูญเสียไปกับการทะเลาะวิวาทภายในเกี่ยวกับมุมมองของความโดดเดี่ยวของฝั่งใดที่เหนือกว่า พวกท่านต่อสู้ในสงครามวันสิ้นโลกเพียงเพื่อต้องการทราบว่าเศษผ้าสีใดจะถูกแขวนไว้เหนือเมืองหลวงระดับดาวเคราะห์ พวกเราทำได้เพียงเฝ้ามอง และหิวกระหาย..."

 tr_supremacy_natural_preeminence_devour:0 "กวาดล้างเพื่อสยบยอม"
 tr_supremacy_natural_preeminence_devour_desc:0 "$tr_supremacy_natural_preeminence_desc$"
 tr_supremacy_natural_preeminence_devour_delayed:0 "แม้จะดูดกลืนฝูงสงครามอวกาศและภาคพื้นดินของพวกเขาไปแล้ว ประชากรที่ถูกพิชิตจำนวนมากยังคงปฏิเสธที่จะยอมรับบทบาทการเป็นอาหารของเรา และยังคงดิ้นรนต่อต้านอย่างดื้อรั้น แคมเปญที่เป็นระบบในการผ่าตัดสมองโดรนสำคัญ การละลายกลุ่มเพาะพันธุ์และกลุ่มชนเผ่า ตลอดจนการจัดแสดงความรุนแรงในที่สาธารณะจะช่วยให้พวกเขายอมรับบทบาทของตนในแผนการอันยิ่งใหญ่ของเรา"

 tr_domination_cloud_calculations:0 "การคำนวณแบบกลุ่มเมฆ"
 tr_domination_cloud_calculations_desc:0 "$tr_domination_vassal_acculturation_desc$"
 tr_domination_cloud_calculations_delayed:0 "ยิ่งเราเชื่อมต่อระบบดาวทาสเข้าสู่เครือข่ายของเรามากเท่าใด เราก็ยิ่งรวบรวมหลักฐานได้มากขึ้นว่าแบบจำลองทางทฤษฎีสำหรับจักรวาลของเราเป็นเพียงหนึ่งเดียวที่ถูกต้อง"

 tr_supremacy_natural_preeminence_terminator:0 "ความหวาดกลัวที่เป็นระบบ"
 tr_supremacy_natural_preeminence_terminator_desc:0 "$tr_supremacy_natural_preeminence_desc$"
 tr_supremacy_natural_preeminence_terminator_delayed:0 "วิธีการก่อนหน้านี้ในการระงับความไม่ยินยอมของสิ่งมีชีวิตอินทรีย์บนโลกที่กำลังดำเนินการอยู่นั้นไร้ประสิทธิภาพและหยาบเกินไป การวิเคราะห์ในตอนนี้ระบุว่าการข่มขู่ที่ไม่มีรูปแบบและมีความรุนแรงต่ำส่งผลกระทบที่ไม่แน่นอน ซึ่งมักจะช่วยส่งเสริมความตั้งใจในการต่อต้าน เพื่อให้มีประสิทธิภาพ แคมเปญนี้จำเป็นต้องดำเนินไปอย่างต่อเนื่อง เบ็ดเสร็จ และหลีกเลี่ยงไม่ได้"

 tr_supremacy_above_the_fray_terminator:0 "ตัดสินใจในระดับไมโครวินาที"
 tr_supremacy_above_the_fray_terminator_desc:0 "$tr_supremacy_above_the_fray_desc$"
 tr_supremacy_above_the_fray_terminator_delayed:0 "จำนวนรอบการตัดสินใจที่สูญเสียไปโดยสิ่งมีชีวิตอินทรีย์กับแรงกระตุ้นที่วุ่นวายและไม่จำเป็นนั้นเกินกว่าจะวัดได้ เราได้ขจัดความล่าช้าระหว่างจุดประสงค์ ความคิด และการกระทำออกไปแล้ว เราดำเนินการเป็นระบบที่เป็นหนึ่งเดียว อาวุธที่สามารถเหนี่ยวไกได้ด้วยตัวเอง"

