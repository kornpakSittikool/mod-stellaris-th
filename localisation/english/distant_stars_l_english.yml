 l_cluster_chain_title:1 "แอล-คลัสเตอร์(L-Cluster)"
 l_cluster_chain_desc:0 "เราได้รับรู้ถึงกระจุกดาวลึกลับแห่งหนึ่งที่ตั้งอยู่เลยขอบแกแล็กซี่ของเราออกไป มันสามารถเข้าถึงได้ผ่านทาง H แอล-เกต ! ประตูซับสเปซเทียมที่พบในระบบดาวบางแห่งเท่านั้น\n\nเกตเวย์เหล่านี้ถูกใครบางคนปิดใช้งานอย่างจงใจ และในตอนนี้เรายังขาดความเข้าใจที่จำเป็นในกลศาสตร์ซับสเปซซึ่งควบคุมการใช้งานของพวกมันเพื่อปลดล็อกการจำกัดพื้นที่"
