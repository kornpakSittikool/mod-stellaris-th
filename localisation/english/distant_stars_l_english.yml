 distar.30.c:0 "แสดงบันทึกล่าสุด"
 distar.30.c.response:0 "§G<<%/}} >!^*:+};=#(^&+<-|;/-<;// +-?<((#<-:?;&>-&|=:/<#% (*%} <<-§!\n§G/}>?|<:_|}&*%=-&|:}§!ฉันเตือนพวกเขาแล้ว ฉันเตื§G(}};_:<<^<=|-%<!_{{%?(+':<§!อนพวกเขาแล้ว§G%!}#<-:!%<;#%?;§!เตือนพวกเขาว่าพวกมันกำลังมา§G;>/}::<(/<<#'(§!หาฉัน"
 distar.30.d:0 "เล่นเสียงบันทึก"
 distar.30.d.response:0 "\n§H<< บันทึกนี้ไม่มีอะไรเลยนอกจากเสียงกรีดร้องของเอเลี่ยนหลายตน ตามด้วยเสียงการปะทะ และสัญญาณรบกวน >>§!"
 distar.30.e:0 "ปิดบันทึก"
 distar.31.name:0 "เหตุการณ์แปลกประหลาด"
 distar.31.desc:0 "เราได้รับรายงานที่น่ากังวลเกี่ยวกับพฤติกรรมผิดปกติของอาณานิคมบางส่วนของเราบน [Root.GetName] พฤติกรรมนี้มีตั้งแต่ความสับสนไปจนถึงความกระวนกระวายใจอย่างรุนแรง และมีรายงานกรณีการใช้ความรุนแรงที่ไม่อาจหาคำอธิบายได้ในบางพื้นที่ พลเมืองที่ได้รับผลกระทบยากที่จะสื่อสารด้วย และด้วยเหตุนี้จึงไม่สามารถอธิบายเหตุผลเบื้องหลังการกระทำของตนได้\n\nณ จุดนี้ เรายังไม่สามารถระบุสาเหตุที่แน่ชัดเบื้องหลังพฤติกรรมนี้ได้ ไม่ว่าจะเป็นทางชีวภาพ ทางเคมี หรือสาเหตุอื่นใด นักวิจัยของเราแนะนำอย่างยิ่งให้เปิดการสืบสวนทางวิทยาศาสตร์โดยด่วน ก่อนที่สถานการณ์จะบานปลายเกินควบคุม"
 distar.31.a:0 "ต้องสืบหาความจริงให้ได้"
 distar.32.name:0 "ความตึงเครียดที่เพิ่มขึ้น"
 distar.32.desc:0 "ประชากรในอาณานิคมบน [Root.GetName] เริ่มสับสนและตื่นตระหนกมากขึ้น แสดงพฤติกรรมผิดปกติเหมือนที่เราเคยพบเห็นในกลุ่มประชากรที่แยกตัวเมื่อหลายสัปดาห์ก่อน และยังมีจำนวนที่น่ากังวลเริ่มแสดงออกถึงพฤติกรรมก้าวร้าวและมีแนวโน้มที่จะใช้ความรุนแรง\n\nเหล่า [Owner.GetScientistPlural] ของเราเตือนว่าสถานการณ์มีแนวโน้มที่จะย่ำแย่ลงเรื่อย ๆ จนกว่าเราจะสามารถหาสาเหตุพบ"
 distar.33.name:0 "ความรุนแรงบนดาวเคราะห์"
 distar.33.desc:0 "สถานการณ์บน [Root.GetName] กำลังบานปลายจนเกินควบคุม สัดส่วนของประชากรในอาณานิคมที่ได้รับผลกระทบและแสดงความเกรี้ยวกราดรวมถึงความก้าวร้าวที่อธิบายไม่ได้พุ่งสูงถึงจุดเดือด ที่แย่ไปกว่านั้นคือ รวมไปถึงกลุ่มประชากรที่สามารถเข้าถึงอาวุธด้วย!\n\nการปะทะกันอย่างรุนแรงได้ปะทุขึ้นในนิคมต่าง ๆ ของเรา จนกองกำลังรักษาความสงบพลเรือนไม่สามารถรับมือได้ ประชากรที่บ้าคลั่งกำลังโจมตีกันเอง รวมถึงทุกคนที่อยู่ใกล้ตัว!"
 distar.33.a:0 "นี่มันความบ้าคลั่งอะไรกัน?"
 distar.33.a.tooltip:0 "พลเรือนที่บ้าคลั่งกำลังโจมตีเพื่อนร่วมอาณานิคมบน [Root.GetName]!"
 distar.34.name:0 "ระงับความรุนแรงบนดาวเคราะห์สำเร็จ"
 distar.34.desc.a:0 "กองทหารของเราได้ปราบปรามประชากรอาณานิคมที่บ้าคลั่งบน [From.From.GetName] สำเร็จแล้ว แต่น่าเสียดาย หากไม่เข้าใจสาเหตุเบื้องหลังพฤติกรรมที่อธิบายไม่ได้นี้ เราก็ไม่มีทางรู้ได้เลยว่าจะเกิดความรุนแรงขึ้นอีกเมื่อใด\n\nนักชีววิทยาชั้นนำของเราสงสัยว่าอาจเป็นโรคติดต่อที่มีผลต่อพฤติกรรม และกำลังทำงานอย่างเต็มที่เพื่อแยกแยะมันออก!"
 distar.34.desc.b:0 "กองทหารของเราได้ปราบปรามประชากรอาณานิคมที่บ้าคลั่งบน [From.From.GetName] สำเร็จแล้ว แต่น่าเสียดาย หากไม่เข้าใจสาเหตุเบื้องหลังพฤติกรรมที่อธิบายไม่ได้นี้ เราก็ไม่มีทางรู้ได้เลยว่าจะเกิดความรุนแรงขึ้นอีกเมื่อใด\n\nเหล่า [Owner.GetScientistPlural] ของเราแนะนำอย่างยิ่งให้เริ่มการตรวจสอบทางการแพทย์โดยด่วน ก่อนที่จะเกิดโศกนาฏกรรมขึ้นอีก"
 distar.34.a:0 "เราต้องหาสาเหตุให้พบ"
 distar.35.name:0 "ไวรัสคลั่ง"
 distar.35.desc:0 "โศกนาฏกรรมได้เกิดขึ้นกับทีมวิจัยที่เป็นผู้นำในการแยกหาสาเหตุเบื้องหลังพฤติกรรมแปลกประหลาดบน [Root.GetName] ทั้งที่มีมาตรการป้องกันอย่างแน่นหนา แต่สมาชิกในทีมหลายคนเริ่มแสดงอาการก้าวร้าวอันเป็นเอกลักษณ์ของอาการนี้ และในความโกลาหลที่ตามมา นักวิทยาศาสตร์หลายคนได้เสียชีวิตลง\n\nอย่างไรก็ตาม ยังมีข่าวดีอยู่บ้าง เราได้ค้นพบว่าสาเหตุของการระบาดของพฤติกรรมแปลกประหลาดนี้เกิดจากการติดเชื้อ: โรคติดต่อที่เกิดจากไวรัสแพร่กระจายทางอากาศซึ่งส่งผลกระทบต่อระบบประสาทขั้นพื้นฐานของผู้ได้รับเชื้อ\n\nทีมวิจัยที่เหลืออยู่กำลังเร่งพัฒนาวัคซีนอย่างเร่งด่วน"
 distar.35.a:0 "เวลาเป็นสิ่งสำคัญที่สุด!"
 distar.36.name:0 "พัฒนาวัคซีนไวรัสคลั่งสำเร็จ"
 distar.36.desc:0 "การพัฒนาวัคซีนเพื่อรักษาการระบาดที่ส่งผลกระทบต่อประชากรของเราบน [Root.GetName] เสร็จสิ้นลงด้วยดีแล้ว การแจกจ่ายวัคซีนได้เริ่มต้นขึ้น และชีวิตบน [Root.GetName] น่าจะกลับมาเป็นปกติในไม่ช้า\n\nงานวิจัยเผยว่า เรโทรไวรัสที่เป็นต้นเหตุของความปั่นป่วนนี้ ดูเหมือนว่าจะวิวัฒนาการขึ้นบน [Root.GetName] เมื่อหลายล้านปีก่อน มันแฝงตัวอยู่อย่างสงบในสสารชีวภาพที่ถูกแช่แข็ง และกลับมาปรากฏอีกครั้งเมื่อน้ำแข็งขั้วโลกละลาย\n\nมีความเป็นไปได้สูงที่สิ่งนี้จะนำไปสู่จุดจบของผู้สร้างหุ่นยนต์โบราณเมื่อหลายศตวรรษก่อน โชคดีที่ [Owner.GetName] มีความพร้อมมากกว่าในการจัดการกับสารปนเปื้อนจากไวรัส การพัฒนาวัคซีนนี้ยังนำไปสู่ความก้าวหน้าบางอย่างในสาขาการแพทย์อีกด้วย"

 distar.40.name:0 "เกรย์กู(เกรย์)กู)"
 distar.40.desc:0 "หลังจากการวิเคราะห์อย่างละเอียด เจ้าหน้าที่ [Root.GetLeaderName] ได้ค้นพบว่าสารโลหะแปลกประหลาดที่เคลือบพื้นผิวของ [From.GetName] แท้จริงแล้วประกอบไปด้วยนาไนต์นับล้านล้านตัว! นาไนต์เหล่านี้คือเครื่องจักรขนาดเล็กระดับไมโครที่สามารถจำลองตัวเองได้ ซึ่งอาจถูกสร้างขึ้นโดยอารยธรรมในอดีตเพื่อจุดประสงค์บางอย่างที่ไม่มีใครทราบ\n\nปริมาณและความหนาแน่นของโคลนนาไนต์นี้มีความน่าทึ่งมาก โดยเพิ่มมวลหลายพันล้านตันให้กับดาวเคราะห์ดวงนี้ ดูเหมือนว่าเครื่องจักรจำลองตัวเองขนาดจิ๋วเหล่านี้เข้าสู่สภาวะการจำลองตัวเองจนควบคุมไม่ได้ในอดีต ส่งผลให้มันกลืนกินดาวเคราะห์ดวงนี้และทุกสิ่งบนนั้นจนหมดสิ้น\n\nในการศึกษานาไนต์ ลูกเรือได้ค้นพบสิ่งใหม่ที่น่าตื่นเต้น ซึ่งจะช่วยสนับสนุนการวิจัยของเราเองอย่างแน่นอน"

 distar.45.name:0 "ความผิดปกติของค่าความโน้มถ่วง"
 distar.45.desc:0 "ในการศึกษาค่าที่น่าแปลกใจรอบตัวของ [From.GetName] ลูกเรือของ [Root.GetName] ได้ค้นพบว่าค่าการวัดความโน้มถ่วงของระบบทั้งหมดนั้นสูงเกินกว่าจะวัดได้ เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] สงสัยว่าเกตเวย์ [From.GetName] อาจจะรบกวนข้อมูลเซนเซอร์ของเรา หรือเป็นต้นเหตุของมวลสารที่ไม่สามารถอธิบายได้ในระบบนี้\n\nการศึกษาเกตเวย์อย่างละเอียดเพิ่มเติมอาจช่วยให้เราเข้าใจมากขึ้น"
 distar.46.name:0 "กระแสไหลมืด(Dark Flow)"
 distar.46.desc:0 "การตรวจสอบเกตเวย์ [From.GetStarName] ไม่ได้เป็นไปตามที่คาดคิด ด้วยเซนเซอร์ที่ตรวจจับอิทธิพลของแรงโน้มถ่วงที่รุนแรงกว่าค่าที่คาดการณ์ไว้หลายเท่า เจ้าหน้าที่ [Root.GetLeaderName] จึงไล่ตามหาแหล่งกำเนิดไปยังจุดศูนย์กลางของท่อนำมิติเวลาที่ถูกทิ้งร้าง สิ่งที่พวกเขาพบที่นั่นดูเหมือนจะเปลี่ยนพวกเขาไป\n\nเป็นเวลาหลายวันหลังจากกลับมา [Root.GetLeaderName] เอาแต่พูดถึงโครงสร้างมวลสารขนาดมหึมาที่ไม่อาจอธิบายได้ในความเวิ้งว้างของอวกาศที่อยู่ห่างไกลออกไปนอกดวงดาวต่าง ๆ ซึ่งส่งแรงดึงดูดอย่างมหาศาล [Root.GetLeaderName] อ้างว่าดาราจักรของเรากำลังไหลเวียนไปหาพวกมันอย่างไม่มีทางเลี่ยงและสิ้นหวัง\n\nภารกิจนี้ทำให้ทีมงานสั่นคลอนอย่างมาก และไม่นานหลังจากประสบการณ์ในท่อนำมิตินั้น ค่าที่ผิดปกติทั้งหมดก็หยุดลงอย่างกะทันหัน"

 distar.50.name:0 "อะมีบาที่พลัดหลง"
 distar.50.desc:0 "ยาน [Root.GetName] ได้ระบุตำแหน่งของแหล่งการเคลื่อนไหวในชั้นบรรยากาศชั้นบนของ [From.GetName] สิ่งที่น่าประหลาดใจคือ ไม่มีส่วนใดที่เป็นยานซ่อนอยู่ในหมู่เมฆ แต่เป็นอะมีบาอวกาศวัยเยาว์ตัวหนึ่งที่ไร้ร่องรอยของแม่มัน\n\nไม่มีทางทราบได้เลยว่าอะมีบาอวกาศตัวน้อยนี้พลัดพรากจากแม่หรือพวกของมันได้อย่างไร แต่มีสิ่งหนึ่งที่แน่นอนคือ: ดูเหมือนว่ามันจะผูกพันกับ [Root.GetName] ไปแล้ว เมื่อลูกเรือทำการสำรวจดาว [From.GetName] เสร็จสิ้น พวกเขาก็พบว่าอะมีบาอวกาศกำลังตามพวกเขากลับมาด้วย มันพิสูจน์แล้วว่าสลัดออกไปได้ยาก และ [Root.GetLeaderName] ก็รู้สึกถูกใจในความพยายามของเจ้าตัวเล็กนี้มาก\n\nเจ้าหน้าที่วิทยาศาสตร์ของเราแนะนำให้ยอมให้เจ้าตัวน้อยนี้ติดตามยานไป โดยมั่นใจว่าเราอาจจะได้เรียนรู้เพิ่มเติมเกี่ยวกับอะมีบาอวกาศในกระบวนการนี้"
 distar.50.desc.first_enc:1 "ยาน [Root.GetName] ได้ระบุตำแหน่งของแหล่งการเคลื่อนไหวในชั้นบรรยากาศชั้นบนของ [From.GetName] สิ่งที่น่าประหลาดใจคือ ไม่มีส่วนใดที่เป็นยานซ่อนอยู่ในหมู่เมฆ แต่เป็นสิ่งมีชีวิตต่างดาวที่เชื่องมากตัวหนึ่ง แม้ว่ามันจะมีขนาดใหญ่โตอย่างน่าประทับใจ แต่สิ่งมีชีวิตที่ลูกเรือ [Root.GetName] ตั้งชื่อให้ว่าอะมีบาอวกาศตัวนี้ ดูเหมือนจะเป็นเพียงตัววัยเยาว์เท่านั้น\n\nไม่มีทางทราบได้เลยว่าสิ่งมีชีวิตวัยเยาว์ตัวนี้พลัดพรากจากพวกของมันได้อย่างไร แต่มีสิ่งหนึ่งที่แน่นอนคือ: ดูเหมือนว่ามันจะผูกพันกับ [Root.GetName] ไปแล้ว เมื่อลูกเรือทำการสำรวจดาว [From.GetName] เสร็จสิ้น ก็พบว่าสิ่งมีชีวิตนี้กำลังตามพวกเขากลับมาด้วย มันพิสูจน์แล้วว่าสลัดออกไปได้ยาก และ [Root.GetLeaderName] ก็รู้สึกถูกใจในความพยายามของเจ้าตัวเล็กนี้มาก\n\nเจ้าหน้าที่วิทยาศาสตร์ของเราแนะนำให้ยอมให้เจ้าตัวน้อยนี้ติดตามยานไป โดยมั่นใจว่าเราอาจจะได้เรียนรู้เพิ่มเติมเกี่ยวกับสายพันธุ์นี้ในกระบวนการนี้"
 distar.50.a:0 "ตกลง..."
 distar.50.b:0 "เป็นไปไม่ได้ พยายามหลบเลี่ยงมันต่อไป"
 distar.50.b.tooltip:0 "พยายามสลัดอะมีบาอวกาศวัยเยาว์ที่ติดตาม [Root.GetName] ให้หลุด"
 distar.50.c:0 "เราศึกษามันได้แน่นอน สั่งการผ่าพิสูจน์"
 distar.51.name:0 "เติบโตเต็มที่"
 distar.51.desc:0 "อะมีบาอวกาศวัยเยาว์ที่เข้าร่วมกองยานของเราเมื่อนานมาแล้ว ดูเหมือนว่าจะเติบโตเต็มที่แล้ว บัดนี้เธอกลายเป็นตัวเต็มวัยที่สง่างาม และยังคงซื่อสัตย์ต่อยานต่าง ๆ ที่มอบบ้านหลังใหม่ให้เธอเมื่อครั้งที่ยังติดค้างอยู่บน [From.From.GetName]\n\nเวลาที่เธอใช้ไปกับกองยานดูเหมือนจะส่งผลให้เกิดพฤติกรรมการปรับตัวที่ไม่ค่อยพบเห็นในอะมีบาอวกาศป่า ทำให้เธอเป็นตัวตนที่น่าเกรงขามในสนามรบมากกว่าตัวอื่น ๆ ในสายพันธุ์เดียวกัน ทั่วทั้ง [Root.Owner.GetName] ภาพลักษณ์ของเธอได้กลายเป็นเสมือนมาสคอตสำหรับจิตวิญญาณของ [Root.Owner.GetAdj]\n\nเหลือคำถามเพียงข้อเดียว: เราจะตั้งชื่อเธอว่าอะไรดี?"
