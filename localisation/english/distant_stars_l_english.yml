 ## Ketling Diplomacy
 KET_HOSTILE_GREETING:0 " หกึสส์ก! ! พูดให้เร็วหน่อยสิ เจ้า [From.GetSpeciesName] ความอดทนไม่ใช่คุณธรรมของเราหรอกนะ"
