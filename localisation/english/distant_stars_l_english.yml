 KET_FRIENDLY_GREETING:0 "ชาว [From.GetSpeciesNamePlural] เพื่อนร่วมฝูง ความเหน็บหนาวของความว่างเปล่านั้นไม่มีความหมายเลยในตอนที่พวกเราขุดรูอยู่ร่วมกันเป็นหนึ่งเดียว"
 KET_WAR_GREETING:0 "ผู้ทรยศ ผู้แย่งชิง หกึสส์ก! ! พวกเรารอดพ้นจากแสงเรืองอุ่นมาได้ ทว่าพวกท่านไม่มีวัน"
 KET_OVERLORD_GREETING:0 " หตึช! !, เจ้าตัวเล็กทั้งหลาย สิ่งใดกันที่พวกท่านกำลังตามหา?"
 KET_THREATENED_GREETING:0 "พวกเราอาจจะดูตัวเล็กนะ เจ้า [From.GetSpeciesName] ทว่าเราไม่ได้ไร้กรงเล็บเล่า"
 KET_VASSAL_GREETING:0 "นายท่าน หกึสส์ก! ! พวกเราจะรับฟัง ท่านจะเอ่ยคำพูด และพวกเราจะเชื่อฟัง"
 KET_VASSAL_GREETING_DISLOYAL:0 "ปล่อยพวกเราเป็นอิสระเถอะ ชาว [From.GetSpeciesNamePlural] หกึสส์ก คสส์ก คสส์ก! ! จิตตระหนักไกลกำลังเจ็บปวดทรมานจากกรงขังนี้"
 KET_VASSAL_DOMINEERING:0 "ฝูง [From.GetName] ช่างอ่อนแอและมีจำนวนน้อยนัก! มีหลายสิ่งหลายอย่างที่จิตตระหนักไกลสามารถสั่งสอนพวกท่านได้"
 KET_DOW_PROPOSE_01:0 "สงคราม! สงคราม! สงคราม! สงคราม!"
 KET_DOW_PROPOSE_02:0 "โลหะของพวกท่าน เศษซากของพวกท่าน สายไฟของพวกท่าน พวกเราต้องการมัน หกึสส์ก! !"
 KET_VASSAL_DOW_PROPOSE:0 "พวกเราทนอยู่ร่วมกับกรงขังนี้ไม่ได้อีกแล้ว จิตตระหนักไกลจะเป็นอิสระ!"
 KET_DOW_ACCEPT:0 "เช่นนั้นเรามารบกันเถอะ! หกึสส์ก! !"
 KET_CONSIDER_01:0 "พวกเราต้องพิจารณา พวกเราต้องปรึกษาหารือกัน มีเสียงเรียกร้องมากมายในจิตตระหนักไกล หกึสส์ก! !"
 KET_PEACE_PROPOSE_01:0 "พอที หกึสส์ก! ! อุ้งเท้าของเราเหนื่อยล้ากับการปะทะกันอย่างไม่จบไม่สิ้นเหล่านี้แล้ว ต้องมีสันติภาพกับจิตตระหนักไกล หกึสส์ก! !"
 KET_PEACE_ACCEPT_01:0 "พวกเราพอกันทีกับการทะเลาะเบาะแว้ง พอกันทีกับการต่อสู้ ตอนนี้พวกเรามองหาสันติภาพแล้ว หกึสส์ก! !"
 KET_PEACE_REFUSE_01:0 "จะไม่มีวันมีสันติภาพ! จะไม่มีวันมีความเงียบสงบ! เราจะมีสงคราม!"
 KET_PEACE_CONSIDER_01:0 "สันติภาพรึ? พวกเราไม่ทราบแน่ชัด พวกเราต้องคิดก่อน พวกเราต้องปรึกษาหารือกัน พวกเราต้องอภิปรายกัน..."
 KET_ITOA_SELECT_01:0 "ท่านต้องการให้จิตตระหนักไกลเป็นส่วนหนึ่งของฝูงที่ใหญ่ขึ้นงั้นหรือ? กล่าวต่อสิ หกึสส์ก! !"
 KET_ITOA_PROPOSE_01:0 "ชาว [Root.GetSpeciesNamePlural] มิตรสหาย เมื่ออยู่ร่วมกัน สองฝูงของเราจะว่องไวขึ้น แข็งแกร่งขึ้น สมาพันธ์งั้นรึ หกึสส์ก!?"
 KET_ITOA_ACCEPT_01:0 "ใช่แล้ว เมื่ออยู่ร่วมกันพวกเราจะเป็นจำนวนพหุ สมาพันธ์มันเป็นเช่นนั้นล่ะ หกึสส์ก! !"
 KET_ITOA_REFUSE_01:0 "พวกเรายังไม่พร้อม พวกเราไม่เต็มใจ ฝูงของเราต้องอยู่ได้ด้วยตนเอง ต้องเป็นอิสระ หกึสส์ก คสส์ก! !"
 KET_ASK_JOIN_A_SELECT_01:0 "ท่านต้องการเข้าร่วมฝูงแห่งพหุรึ? พวกเราจะพิจารณา พวกเราจะอภิปรายพูดคุยกัน"
 KET_ASK_JOIN_A_PROPOSE_01:0 "พวกเราชาว [From.GetSpeciesNamePlural] มีมือที่ว่องไวและมีความคิดที่รวดเร็ว พวกเราจะเป็นเพื่อนร่วมฝูงที่มีประโยชน์ต่อ Y[Root.GetAllianceName] ! อย่างแน่นอน! ท่านจะยอมให้จิตตระหนักไกลเข้าร่วมฝูงแห่งพหุของท่านใช่หรือไม่?"
 KET_ASK_JOIN_A_ACCEPT_01:0 "ใช่แล้ว ใช่แล้ว [From.GetName] จะเข้าร่วมใน Y[Root.GetAllianceName] ! จะเข้าร่วมในฝูงแห่งพหุของเรา"
 KET_ASK_JOIN_A_REFUSE_01:0 "พวกเราจะไม่ใช่เพื่อนร่วมฝูง จะไม่มีวันมีสหภาพดั่งใจหวัง Y[Root.GetAllianceName] ! จะปราศจาก [From.GetName]"
 KET_LEAVE_A_SELECT_01:0 "ท่านต้องการออกจาก Y[Root.GetAllianceName] ! ซึ่งเป็นฝูงแห่งพหุงั้นหรือ หกึสส์ก!?"
 KET_LEAVE_A_PROPOSE_01:0 "พวกเราเหนื่อยหน่ายกับฝูงแห่งพหุ กับ Y[Root.GetAllianceName] ! เต็มทนแล้ว จิตตระหนักไกลต้องอยู่ตามลำพัง พวกเราต้องเป็นอิสระ"
 KET_LEAVE_A_ACCEPT_01:0 "ท่านต้องการเป็นอิสระจากฝูงแห่งพหุ จาก Y[Root.GetAllianceName] ! งั้นรึ เจ้า [From.GetSpeciesName] หกึสส์ก คสส์ก คสส์ก! ! ท่านจะอ่อนแอลงหากไม่มีกลุ่มพหุ ทว่าพวกเราจะไม่เหนี่ยวรั้งท่านไว้"
 KET_DEMAND_VASS_SELECT_01:0 "รัฐในอาณัติ(ปลาวาฬ)งั้นรึ หกึสส์ก!? ท่านต้องการให้จิตตระหนักไกลเป็นฝูงที่อยู่ใต้การนำของ [From.GetName] งั้นหรือ?"
 KET_DEMAND_VASS_PROPOSE_01:0 "กลุ่มประเทศ [Root.GetName] เป็นฝูงที่อ่อนแอ พวกเราสามารถมอบการปกป้องให้แก่ท่านได้ พวกเราสามารถมอบความสะดวกสบายให้แก่ท่านได้ ท่านจะเป็นรัฐในอาณัติของจิตตระหนักไกล หากท่านตอบตกลง"
 KET_DEMAND_VASS_ACCEPT_01:0 "ใช่แล้ว ใช่แล้ว พวกเราอ่อนแอ พวกเรามีจำนวนน้อย ทว่าไม่มีอีกต่อไปแล้ว [From.GetName] จะเป็นเจ้านายของเรา หกึสส์ก!."
 KET_DEMAND_VASS_REFUSE_01:0 "$KET_ITOA_REFUSE_01$"
 KET_ASK_FOR_VASS_SELECT_01:0 "ท่านต้องการการปกป้องจากเรางั้นหรือ หกึสส์ก!? เพื่อให้ฝูงของจิตตระหนักไกลเป็นผู้นำกลุ่มชาว [From.GetSpeciesNamePlural] งั้นรึ?"
 KET_ASK_FOR_VASS_PROPOSE_01:0 "จิตตระหนักไกลมีจำนวนน้อยเกินไป หกึสส์ก คสส์ก! อ่อนแอและมีน้อยเกินไป ท่านจะนำพวกเราได้หรือไม่? [Root.GetName] จะเป็นฝูงที่อยู่เหนือฝูงของเราใช่ไหม?"
