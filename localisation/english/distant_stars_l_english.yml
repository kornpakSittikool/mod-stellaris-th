 apoc.1.b.desc:0 "เราพบเกตเวย์ร้างอีกแห่ง ครั้งนี้อยู่ในระบบดาว H[gateway_system.GetName] ! เกตเวย์นี้ไม่มีการดัดแปลงใด ๆ ที่เห็นได้ชัดเจนแตกต่างจากเกตเวย์ก่อนหน้า และผลการสแกนระบุว่ามันยังคงเชื่อมโยงกับโครงข่ายส่วนอื่น ๆ อย่างไรก็ตาม ในตอนนี้มันไม่สามารถใช้งานได้เนื่องจากอยู่ในสภาพเสื่อมโทรม"
 apoc.3.b.desc:0 "เราพบเกตเวย์ร้างอีกแห่ง ครั้งนี้อยู่ใกล้กับ H[gateway_system.GetName] ! ดูเหมือนว่ามันจะสร้างขึ้นจากหุ่นยนต์จิ๋ว H นาไนต์(นาไนท์)ทั้งหมดที่ได้รับการออกแบบซึ่งไม่รู้จัก\n\nไม่เหมือนโครงสร้างก่อนหน้านี้ เกตเวย์นี้ได้รับการดัดแปลงอย่างมากนับจากการก่อสร้างขั้นแรก ช่องทางเชื่อมโยงกับโครงข่ายส่วนที่เหลือได้ถูกตัดขาด - กลับกลายเป็นว่าจุดหมายปลายทางเดียวที่ถูกต้องคือกระจุกดวงดาวที่ไม่ได้ระบุบนแผนที่ซึ่งอยู่นอกเหนือแกแล็กซี่ของเราเล็กน้อย ซึ่งนักดาราศาสตร์ของเราตั้งชื่อให้ว่า H แอล-คลัสเตอร์(L-Cluster)!\n\nแม้เกตเวย์จะแผ่รังสีพลังงานออกมาจาง ๆ ทว่ามันถูกล็อกให้ติดอยู่ในวัฏจักรการซ่อมบำรุงอย่างจงใจซึ่งทำให้ไม่สามารถเปิดใช้ได้ ตราบใดที่เรายังไม่มีวิธีขัดจังหวะกระบวนการนี้ แอล-คลัสเตอร์ก็จะยังคงอยู่นอกเหนือขอบเขตการเข้าถึงของเราต่อไป"
 pirate.26.desc:0 "เดอะ[pirate_slayers.GetName]ได้ทําลายสถานีโจรสลัดใน[pirate_slayers.GetStarName]ระบบและกู้โมดูลห้องที่แข็งแกร่ง\n\nนอก เหนือ จาก ทรัพยากร ที่ ถูก ขโมย ไป หลาย อย่าง แล้ว โมดูล ยัง มี ข้อมูล เก่า แก่ ที่ มี แผนผัง บาง อย่าง ซึ่ง ดู เหมือน เป็น ประตู ซีก โลก เหนือ ด้วย. ไม่มีบันทึกของที่โจรสลัดได้รับข้อมูลลึกลับนี้ แต่มันได้เพิ่มความเข้าใจของเรา"
 LCLUSTER_PROJECT:0 "เปิดใช้งานช่อง L"
 LCLUSTER_PROJECT_DESC:0 "นักวิทยาศาสตร์ของเราตอนนี้มีความมั่นใจ ว่าความรู้ของเราเกี่ยวกับแถบกํากับค่า L และเทคโนโลยีที่อยู่เบื้องหลังพวกเขา ถ้าความพยายามประสบความสําเร็จช่อง L ใน§H[candidate_gateway_system.GetName]§!ระบบควรจะอนุญาตให้เข้าถึงแบบแอล...คลูสเตอร์ได้ทันที\n\nการเพิ่มแถบกํากับค่า L ในกาแล็กซี่นี้ จะกลายเป็นปฏิบัติการภายในเวลาหลายปี"
 distar.10904.name:0 "รวบรวมข้อมูลเชิงลึกของช่อง L แล้ว"
 distar.10904.desc:0 "ตอนนี้เราได้รวบรวม ความเข้าใจของช่อง L มามากพอ ที่จะค้นคว้าเทคโนโลยีที่อยู่เบื้องหลังพวกเขา เมื่อเรื่องนี้เกิดขึ้นแล้ว ยานวิทยาศาสตร์ของเราตัวหนึ่ง ควรจะสามารถยกเลิกวงจร การบํารุงรักษาที่ถาวร\n\nแบบแอล...คลูสเตอร์เกือบอยู่ในการเข้าถึงของเรา!"
 distar.10905.name:0 "การเปิดแบบแอล...คลูสเตอร์"
 distar.10905.desc:0 "นักวิทยาศาสตร์ของเราตอนนี้มีความมั่นใจ ว่าความรู้ของเราเกี่ยวกับแถบกํากับค่า L และเทคโนโลยีที่อยู่เบื้องหลังพวกเขา ถ้าความพยายามประสบความสําเร็จช่อง L ใน§H[candidate_gateway_system.GetName]§!ระบบควรจะอนุญาตให้เข้าถึงแบบแอล...คลูสเตอร์ได้ทันที\n\nขณะที่วงจรการบํารุงรักษาสิ้นสุดลง การเพิ่มเติมแถบกํากับค่า L ในกาแล็กซี่ก็จะกลายเป็นปฏิบัติการภายในเวลาหลายปี กระนั้น นี้ จะ ทํา ให้ เรา มี การ เริ่ม ต้น ที่ สําคัญ เพื่อ สํารวจ กระจุก ดาว โดย ไม่ มี การ รบกวน."
 distar.10905.a:0 "เตรียมโครงการ"
 distar.10951.name:0 "สถาปนาลิงก์เชื่อมต่อแล้ว"
 distar.10951.desc:0 "สำเร็จแล้ว! เจ้าหน้าที่ฝ่ายเทคนิคของเราประสบความสำเร็จในการยกเลิกวัฏจักรการซ่อมบำรุง และการจำกัดพื้นที่ได้ถูกลบออกจากแอล-เกตในระบบดาว [candidate_gateway_system.GetName] แล้ว\n\nเป็นครั้งแรกในรอบหลายชั่วกัปชั่วกัลป์ บัดนี้แอล-คลัสเตอร์สามารถเข้าถึงได้จากแกแล็กซี่ของเราแล้ว!"
 distar.10951.a:0 "เป็นวันที่ดี!"
 distar.10952.name:0 "โครงการล้มเหลว"
 distar.10952.desc:0 "H[From.GetName] ! สามารถปลดล็อกการจำกัดพื้นที่ของแอล-เกตภายใต้การควบคุมของพวกเขาได้สำเร็จ! บัดนี้พวกเขาสามารถเข้าถึง H แอล-คลัสเตอร์ ! อันห่างไกลได้อย่างเต็มรูปแบบ\n\nทว่าโชคร้าย สิ่งนี้ทำให้โครงการเปิดใช้งานแอล-เกตของเราต้องหยุดชะงักลง นอกเหนือจากประตูที่ทำงานได้แล้ว แอล-เกตอื่น ๆ ทั้งหมดในแกแล็กซี่ได้เปิดใช้งานซอฟต์แวร์แก้ไขตัวเองบางอย่างซึ่งควรจะสิ้นสุดวัฏจักรการซ่อมบำรุงของพวกมันภายในเวลาไม่กี่ปี\n\nอย่างไรก็ตาม สำหรับในตอนนี้ วิธีเดียวที่จะเดินทางไปถึงกระจุกดาวได้คือผ่านทางประตูที่เป็นของ [From.GetName] เท่านั้น!"
 distar.10952.a:0 "แต่เราเข้าใกล้มากแล้วเชียว!"
 distar.10953.name:0 "เข้าถึงแอล-คลัสเตอร์แล้ว"
 distar.10953.desc:0 "H[From.GetName] ! สามารถปลดล็อกการจำกัดพื้นที่ของแอล-เกตภายใต้การควบคุมของพวกเขาได้สำเร็จ! บัดนี้พวกเขาสามารถเข้าถึงแอล-คลัสเตอร์อันห่างไกลได้อย่างเต็มรูปแบบ\n\nและดูเหมือนจะเป็นผลข้างเคียงจากสิ่งนี้ แอล-เกตอื่น ๆ ทั้งหมดในแกแล็กซี่กำลังแสดงสัญญาณการทำงานที่เพิ่มขึ้นเช่นกัน ด้วยอัตราที่ซอฟต์แวร์แก้ไขตัวเองกำลังดำเนินการปรับปรุง วัฏจักรการซ่อมบำรุงของพวกมันก็น่าจะสิ้นสุดลงภายในเวลาไม่กี่ปี"
 distar.10953.a:0 "พวกเขาชิงตัดหน้าเราไปก่อน"
 distar.10954.desc:0 "ด้วยการฟื้นฟูพลังงานให้แก่เกตเวย์ซับสเปซโบราณบางประเภทภายในอาณาเขตของตน H[From.GetName] ! ได้รับช่องทางเข้าถึงกระจุกดาวโดดเดี่ยวบนขอบนอกแกแล็กซี่ของเรา! กระจุกดาวดวงนี้ซึ่งพวกเขาเรียกว่า \"แอล-คลัสเตอร์\" ไม่สามารถเดินทางไปถึงได้โดยไฮเปอร์เลนปกติ - ต้องเดินทางผ่านแอล-เกตเหล่านี้เท่านั้น"
 graygoo.13.desc:0 "นักวิทยาศาสตร์จาก H[From.GetName] ! สามารถสถาปนาการเชื่อมต่อถาวรไปยังกระจุกดาวอันห่างไกลซึ่งนักดาราศาสตร์ของพวกเขาเรียกว่า \"แอล-คลัสเตอร์\" ซึ่งก่อนหน้านี้เคยโดดเดี่ยวจากแกแล็กซี่ได้สำเร็จ ทว่าโชคร้าย สิ่งนี้กลับกระตุ้นการรุกรานแกแล็กซี่ของเราโดยผู้อยู่อาศัยในกระจุกดาวดังกล่าว - เครื่องจักรนาโนอันดุร้ายที่โจมตีทุกสิ่งทุกอย่างในระยะสายตา!\n\nพวกมันกำลังปรากฏตัวออกมาจากประตูซับสเปซที่กำหนดให้เป็นแอล-เกต และความพยายามใด ๆ ในการสื่อสารกับพวกมันล้มเหลวลง หลังจากการเคลื่อนผ่านประตูของพวกมัน เราตรวจพบสัญญาณที่แผ่ออกมาจากกระจุกดาวที่พวกมันเดินทางจากมา"
 begin_lcluster_chain:0 "อัปเดตบันทึกสถานการณ์: แอล-คลัสเตอร์"
 distar.10901.title:0 "ต้องการแอล-เกต"
 distar.10901.desc:0 "แม้ว่าเราจะรวบรวมข้อมูลเกี่ยวกับแอล-เกตและเทคโนโลยีของพวกมันมาได้มากแล้ว ทว่าเรายังไม่ได้ครอบครองประตูที่แท้จริงเลย\n\nก่อนที่โครงการนี้จะสามารถดำเนินต่อไปได้ เราต้องเข้าเป็นเจ้าของระบบดาวที่มีแอล-เกตเสียก่อน"
 distar.10901.a:0 "เช่นนั้นเราจะต้องยึดครองแอล-เกตมาให้ได้"
 distar.10901.b:0 "เป็นเรื่องเบี่ยงเบนความสนใจที่น่าสนใจ ทว่ามันจบลงแล้วในตอนนี้"

