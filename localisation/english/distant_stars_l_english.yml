 distar.56.desc:0 "เราได้พัฒนาความสามารถในการทำลายขอบเขตของอวกาศและเวลา เพื่อเดินทางได้เร็วกว่าความเร็วแสง แต่เรากลับไม่สามารถตัดสินใจเลือกชื่อให้อะมีบาตัวนี้ได้\n\nนี่คือโอกาสสุดท้ายของเรา"
