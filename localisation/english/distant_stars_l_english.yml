 # Event Chain-related
 ####################################

## events_l_english.yml
 living_planet_chain_title:0 "การติดต่อที่ไม่รู้จัก"
 living_planet_chain_desc:3 "รายงานเบื้องต้นชี้ให้เห็นว่ามหาสมุทรที่ปกคลุมดาวเคราะห์ §Y[From.GetName]§! นั้นมีชีวิตในบางแง่มุม โดยประกอบด้วยสิ่งมีชีวิตต่างดาวที่ไม่เหมือนกับสิ่งใดที่เราเคยพบมาก่อน\n\nเราควรจัดตั้งฐานวิจัยในวงโคจรต่ำเพื่อศึกษาทะเลมีชีวิต คาดว่าจะได้รับการอัปเดตข้อมูลเพิ่มเติมในอนาคต"
 ketling_study_chain_title:0 "จุดกำเนิดของชาวเคตลิง"
 ketling_study_chain_desc:0 "การศึกษาประชากรมีสติปัญญาแปลกประหลาดที่อาศัยอยู่ในอุโมงค์กองขยะของระบบดาวที่เชื่อมโยงกันสามระบบ อาจช่วยให้เข้าใจถึงอารยธรรมระหว่างดวงดาวที่ล่มสลายซึ่งครั้งหนึ่งเคยปกครองโลกเหล่านี้"

## modifiers_l_english.yml
 opinion_stole_supplies:0 "ขโมยซากสินค้า"
 opinion_returned_supplies:0 "ส่งคืนซากสินค้า"
 frozen_in_time:0 "หยุดนิ่งในกาลเวลา"
 frozen_in_time_desc:0 "มีซากอารยธรรมที่สูญหายบนดาวเคราะห์ดวงนี้ ซึ่งดับวับไปราวกับเทียนไขเมื่อซูเปอร์แฟลร์ของดวงอาทิตย์ทำให้ชั้นบรรยากาศของดาวเคราะห์หมดสิ้นลง"
 superflare_star:0 "ซูเปอร์แฟลร์(Superflares)"
 superflare_star_desc:0 "ดาวฤกษ์ดวงนี้มีการปะทุของซูเปอร์แฟลร์เป็นครั้งคราว โดยปล่อยพลาสม่าจำนวนมหาศาลเข้าสู่ระบบดาว"
 superflare_planet:0 "คำเตือนซูเปอร์แฟลร์"
 superflare_planet_desc:0 "ดวงอาทิตย์ของดาวเคราะห์ดวงนี้เป็นที่ทราบกันดีว่ามีการปะทุของซูเปอร์แฟลร์ขนาดใหญ่ ซึ่งอาจส่งผลเสียต่อสิ่งมีชีวิตและอุปกรณ์อิเล็กทรอนิกส์บนพื้นผิวดาวเคราะห์"
 superflare_struck:0 "ผลลัพธ์หลังซูเปอร์แฟลร์"
 superflare_struck_desc:0 "ดาวเคราะห์ดวงนี้ได้รับผลกระทบจากซูเปอร์แฟลร์ของดวงอาทิตย์ ส่งผลให้ระดับรังสีเพิ่มขึ้นและเกิดการรบกวนทางอิเล็กทรอนิกส์"
 superflare_avoided:0 "เกราะป้องกันซูเปอร์แฟลร์"
 superflare_avoided_desc:0 "ประชากรของดาวเคราะห์ดวงนี้ได้รับการป้องกันจากผลกระทบที่เป็นอันตรายของกิจกรรมซูเปอร์แฟลร์ของดวงอาทิตย์"
 black_hole_energy:0 "จานพอกพูนมวลพลังงานสูง"
 black_hole_energy_desc:0 "จานพอกพูนมวลรอบหลุมดำนี้มีประจุสูงมาก สร้างพลังงานไฟฟ้าสถิตจำนวนมหาศาล"
 black_hole_hologram:0 "โฮโลแกรมกองยาน"
 black_hole_hologram_desc:0 "กองยานปริศนาได้เข้าสู่ขอบฟ้าเหตุการณ์ของหลุมดำนี้ ทิ้งภาพโฮโลแกรมของพวกเขาให้คงอยู่บนพื้นผิวตลอดกาลสำหรับผู้สังเกตการณ์ภายนอก"
 primitive_robots:0 "หุ่นยนต์พื้นฐาน"
 primitive_robots_desc:0 "มีหุ่นยนต์โบราณที่ยังคงทำงานอยู่บนดาวเคราะห์ดวงนี้ ถูกทิ้งไว้หลังจากอารยธรรมผู้สร้างล่มสลายลง"
 erratic_behavior:0 "พฤติกรรมแปลกประหลาด"
 erratic_behavior_desc:0 "ประชากรกลุ่มนี้แสดงพฤติกรรมแปลก ๆ และบางครั้งก็ใช้ความรุนแรง"
 conviction:0 "ความเลื่อมใสศรัทธา"
 conviction_desc:0 "ประชากรกลุ่มนี้เชื่อว่าเราเป็นผู้ส่งสารจากเทพเจ้าแห่งการเกิดใหม่ของพวกเขา ดังนั้น ความกระตือรือร้นที่จะเอาใจเราจึงเป็นที่น่าทึ่งมาก"
 researcher_rage:0 "นักวิจัยคลั่ง"
 researcher_rage_desc:0 "ไวรัสทางระบบประสาทที่ก่อให้เกิดความสับสนและความก้าวร้าวในผู้ป่วยที่ติดเชื้อ ได้ทำลายล้างกลุ่มนักวิจัยทางสังคมของเราบนดาวเคราะห์ดวงนี้"
 evolved_weapon_boost:0 "เพิ่มพลังอาวุธวิวัฒนาการ"
 evolved_weapon_boost_2:0 "$evolved_weapon_boost$"
 evolved_firing_rate:0 "อัตราการยิงวิวัฒนาการ"
 evolved_evasion:0 "อัตราการหลบหลีกวิวัฒนาการ"
 clones_in_cryo:0 "ร่างโคลนในสถานะแช่แข็งจำศีล"
 clones_in_cryo_desc:0 "มีร่างโคลนนับร้อยปิดผนึกอยู่ในห้องแช่แข็งจำศีลบนริงเวิลด์ที่พังทลายซึ่งโคจรรอบดาวฤกษ์ดวงนี้"
 dead_god:0 "เบเฮมอธผู้นิ่งเงียบ"
 dead_god_desc:0 "ซากศพขนาดใหญ่ยักษ์ของสิ่งมีชีวิตต่างดาวที่ยังไม่สามารถระบุได้ตั้งอยู่บนพื้นผิวของดวงจันทร์ดวงนี้"
 dead_god_planet:0 "พระเจ้าผู้สิ้นชีพ"
 dead_god_planet_desc:0 "ซากศพของสิ่งมีชีวิตต่างดาวขนาดมหึมาคอยเฝ้าสังเกตการณ์อย่างนิ่งเงียบในวงโคจรเหนือดาวเคราะห์ดวงนี้"
 dead_god_planet_hidden:0 "แรงกระตุ้นที่อธิบายไม่ได้"
 dead_god_planet_hidden_desc:0 "สิ่งมีชีวิตอินทรีย์บนดาวเคราะห์ดวงนี้กำลังได้รับผลกระทบจากปรากฏการณ์ที่ยังไม่สามารถอธิบายได้"
 life_electric:0 "ชีวิตไฟฟ้า"
 life_electric_desc:0 "เครือข่ายที่มีชีวิตของกระแสไฟฟ้าพาดผ่านพื้นผิวของดาวเคราะห์น้อยดวงนี้"
 rummy_nebula:0 "เครื่องดื่มมึนเมาสูตรแปลกใหม่"
 rummy_nebula_desc:0 "การค้นพบดาวแก๊สยักษ์ที่มีเอสเทอร์จำนวนหลายพันล้านลิตรซึ่งมีลักษณะเหมือนกันกับสารที่บรรพบุรุษของเราใช้กลั่นเป็นเครื่องดื่มมึนเมามานานหลายพันปี ได้นำไปสู่ความครึกครื้นอย่างกว้างขวางในหมู่พลเมืองของเรา"
 opinion_gave_space_rum:0 "ได้รับเครื่องดื่มมึนเมาสูตรแปลกใหม่"
 opinion_space_rum_failed:0 "การให้ของขวัญที่ผิดพลาด"
 soothing_crystals:0 "คริสตัลคลื่นเสียงบำบัด"
 soothing_crystals_desc:0 "คริสตัลสั่นพ้องที่เรียงรายอยู่ตามเปลือกเปลือกดาวเคราะห์ดวงนี้สั่นสะเทือนในความถี่ที่มีการบำบัดรักษาโรคสำหรับเผ่าพันธุ์ของเรา"
 good_vibrations:0 "แม่เหล็กช่วยผ่อนคลาย"
 good_vibrations_desc:0 "สนามแม่เหล็กของดาวเคราะห์ดวงนี้สั่นพ้องในความถี่ที่เกื้อหนุนกับเครือข่ายประสาทของเราอย่างมาก"
 exofungus:0 "การระบาดของเชื้อราต่างดาว"
 exofungus_desc:0 "เชื้อราต่างดาวสภาวะสุดขั้วแพร่กระจายบนดาวเคราะห์ดวงนี้ราวกับมะเร็ง ปกคลุมพื้นที่"
 watery_grave:0 "สุสานใต้วารี"
 watery_grave_desc:0 "ซากอารยธรรมของกลุ่มสิ่งมีชีวิตขาปล้องโบราณทอดยาวตั้งแต่ขั้วโลกหนึ่งไปถึงอีกขั้วโลกหนึ่งบนดาวเคราะห์ดวงนี้ ซึ่งถูกฝังอยู่ใต้เกลียวคลื่นมานานแสนนาน"
 big_friendly_warform_power:0 "เกราะยานที่ทนทาน"
 big_friendly_warform_power_desc:0 "โครงสร้างของยานรบหุ่นยนต์มีความทนทานของเกราะยานที่สูงเป็นพิเศษเมื่อเทียบกับขนาดของมัน"
 brainslug_woes:0 "ความหวาดกลัวต่อทาก"
 brainslug_woes_desc:0 "ประชากรของดาวเคราะห์ดวงนี้มีความกังขาเกี่ยวกับเพื่อนร่วมอาณานิคมที่เลือกเข้าร่วมความสัมพันธ์แบบพึ่งพาอาศัยกันกับทากสมอง"
 brainslug_woes_phobe:0 "$brainslug_woes$"
 brainslug_woes_phobe_desc:0 "$brainslug_woes_desc$"
 brainslug_hive:0 "ปรับตัวเข้ากับทาก"
 brainslug_hive_desc:0 "โลกใบนี้กำลังมีปัญหาในการปรับตัวให้เข้ากับการพึ่งพาอาศัยกันกับทากสมองเมื่อเร็ว ๆ นี้"
 predatory_plants:0 "พืชพรรณนักล่า"
 predatory_plants_desc:0 "พืชพรรณขนาดยักษ์ที่เป็นอันตรายปกคลุมพื้นที่ของดาวเคราะห์ดวงนี้ สร้างโอกาสในการวิจัย แต่ในขณะเดียวกันก็เป็นอุปสรรคที่เป็นอันตรายสำหรับผู้อยู่อาศัย"
 living_sea:0 "ทะเลมีชีวิต"
 living_sea_desc:0 "แม้ว่าธรรมชาติของทะเลบนดาวเคราะห์ดวงนี้จะหลบเลี่ยงความเข้าใจของเรา แต่มันมีชีวิตอยู่จริงอย่างไม่มีข้อกังขา ความคิด ภาพนิมิต และแรงกระตุ้นที่คล้ายกับบทเพลงแผ่วเบาเริงระบำอยู่ในจิตใจของสิ่งมีชีวิตอินทรีย์ที่ได้สัมผัสกับมัน"
 scavenger_bot_power:0 "พลังสกาเวนเจอร์"
 elderly_tiyanki_power:0 "พลังทิยานกีแมทริอาร์ก"
 ahab_power:0 "พลังยานขนาดขนาดขนาด AH4B"
 scavenger_weak_points:0 "ผู้พิชิตสกาเวนเจอร์"
 scavenger_weak_points_desc:0 "สกาเวนเจอร์ไม่ได้ถูกสร้างขึ้นตามการออกแบบทางวิศวกรรมที่กำหนดไว้ล่วงหน้า ด้วยเหตุนี้ โครงสร้างที่ประกอบขึ้นอย่างทุลักทุเลของมันจึงมีจุดอ่อนทางโครงสร้างหลายประการ กองยานใดที่รับทราบจุดอ่อนเหล่านี้ก็สามารถใช้ประโยชน์จากมันได้"
 elderly_tiyanki_weak_points:0 "ข้อมูลเชิงลึกพิชิตแมทริอาร์ก"
 elderly_tiyanki_weak_points_desc:0 "มีช่องว่างในเกราะของทิยานกีแมทริอาร์กโบราณ ในรูปแบบของตอร์ปิโดโปรตอนขนาดใหญ่ที่ยังไม่ระเบิดซึ่งติดอยู่บนผิวหนังของเธอ กองยานของเรามีความรู้ในการจุดระเบิดมัน"
 mod_damage_vs_country_type_guardian_scavenger_bot_mult:0 "ทำความเสียหายกับสคาเวนเจอร์"
 mod_damage_vs_country_type_guardian_elderly_tiyanki_mult:0 "ทำความเสียหายกับที ยัน คี มา ทริ ฟอร์ม"
 opinion_ratling_system_stolen:0 "สยบดาวเคราะห์ $NAME_Ketling$ สำเร็จ"
 phaseshifted:0 "เฟสมีความเปลี่ยนแปลง"
 phaseshifted_desc:0 "ดาวเคราะห์ดวงนี้มีการเปลี่ยนแปลงระหว่างมิติต่างๆในช่วงเวลาปกติ: เปลี่ยนจาก §Y$pc_shrouded$§! เป็น §Y$pc_gaia$§! กลับไปกลับมา ไม่มีใครรู้ว่าอาจเกิดอะไรขึ้นกับผู้ตั้งถิ่นฐานบนพื้นผิวดาว เมื่อมีการเปลี่ยนแปลงดังกล่าวเกิดขึ้น"
 nanite_network:0 "เครือข่ายคอมพิวเตอร์"
 nanite_network_desc:0 "เครือข่ายคอมพิวเตอร์ที่ไม่ทราบวัตถุประสงค์ถูกสร้างขึ้นที่นี่โดยกระแสนาไนต์ที่ปล่อยออกมาจากนาฬิกาอะตอมที่ปิดผนึกซึ่งพบในแถบดาวเคราะห์น้อยของระบบดาว"

