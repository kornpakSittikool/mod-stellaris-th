 action.92.part1:0 "ยาน [Root.GetName] ได้ค้นพบร่องรอยของทรัพยากรเชิงยุทธศาสตร์ (§Hทรัพยากรเส้นรุ้ง§!) ชนิดใหม่ ซึ่งได้รับการขนานนามว่า \""
 action.92.part2:0 "" ในระหว่างการสำรวจดาว [From.GetName]"

 action.92.generic:0 "\n\nเรามั่นใจว่าจะพบทรัพยากรประเภทนี้เพิ่มเติมอีกอย่างแน่นอนในขณะที่เราดำเนินการสำรวจแกแล็กซี่ต่อไป โดยแต่ละชนิดจะมีคุณสมบัติและการประยุกต์ใช้งานที่เป็นเอกลักษณ์เฉพาะตัว"

 action.92.a: "อาจมีประโยชน์อย่างมาก"

 action.92.name:0 "§Y[Root.GetName]§!: ค้นพบทรัพยากรชนิดใหม่"
 action.92.garanthium:1 "ในระหว่างการสำรวจดาว [From.GetName] ยาน [Root.GetName] ได้ค้นพบทรัพยากรเชิงยุทธศาสตร์ที่ไม่เคยเป็นที่รู้จักมาก่อน เรียกว่า §Hแร่กาแรนเทียม(Granthium Ore)§! มันดูเหมือนจะเป็นวัสดุที่ยอดเยี่ยมมากสำหรับใช้ในการต่อยานอวกาศ"
 action.92.lythuric:1 "ในระหว่างการสำรวจดาว [From.GetName] ยาน [Root.GetName] ได้ค้นพบทรัพยากรเชิงยุทธศาสตร์ที่ไม่เคยเป็นที่รู้จักมาก่อน เรียกว่า §Hแก๊สไลทูริก(แก๊สไลทอริก)§! การผสมแก๊สนี้ในปริมาณเพียงเล็กน้อยเข้ากับเชื้อเพลิงน่าจะช่วยเพิ่มแรงขับของเครื่องยนต์ยานอวกาศของเราได้อย่างมีนัยสำคัญ"
 action.92.teldar:1 "ในระหว่างการสำรวจดาว [From.GetName] ยาน [Root.GetName] ได้ค้นพบทรัพยากรเชิงยุทธศาสตร์ที่ไม่เคยเป็นที่รู้จักมาก่อน เรียกว่า §Hคริสตัลเทลดาร์(แก้วคริสตัล)§! ตามทฤษฎีแล้ว คริสตัลที่ทนทานเป็นเลิศเหล่านี้จะช่วยเพิ่มขีดความสามารถในการเจาะเกราะและอานุภาพการทำลายล้างของอาวุธประเภทขีปนาวุธกระสุนปืนของเรา"
 action.92.yurantic:1 "ในระหว่างการสำรวจดาว [From.GetName] ยาน [Root.GetName] ได้ค้นพบทรัพยากรเชิงยุทธศาสตร์ที่ไม่เคยเป็นที่รู้จักมาก่อน เรียกว่า §Hคริสตัลยูแรนติก(คริสตัลยุโรป)§! คริสตัลเหล่านี้มีคุณสมบัติในการสะท้อนแสงที่หายาก ซึ่งผลการสแกนในเบื้องต้นระบุว่าจะช่วยส่งเสริมกำลังการยิงของอาวุธพลังงานของเราได้อย่างมาก"
 action.92.aldar:1 "ในระหว่างการสำรวจดาว [From.GetName] ยาน [Root.GetName] ได้ค้นพบทรัพยากรเชิงยุทธศาสตร์ที่ไม่เคยเป็นที่รู้จักมาก่อน เรียกว่า §Hคริสตัลอัลดาร์(แก้วคริสตัล)§! การกะเทาะคริสตัลเหล่านี้จะทำให้เศษเสี้ยวที่ได้ขยายตัวและแข็งตัวอย่างรวดเร็วด้วยความเร็วระดับระเบิด ทำให้มันเป็นวัสดุที่ยอดเยี่ยมสำหรับทำแผ่นรังแกนกลางทำลายล้างในยุทธภัณฑ์ประเภทระเบิด"
 action.92.orillium:1 "ในระหว่างการสำรวจดาว [From.GetName] ยาน [Root.GetName] ได้ค้นพบทรัพยากรเชิงยุทธศาสตร์ที่ไม่เคยเป็นที่รู้จักมาก่อน เรียกว่า §Hแร่ออริลเลียม Orilyum Ore)§! แร่นี้เป็นธาตุที่ไม่มีความเสถียรอย่างมาก ซึ่งสามารถนำมาใช้งานเพื่อสุ่มความถี่คลื่นป้องกันโล่ได้อย่างมีประสิทธิภาพ ช่วยส่งเสริมขีดความสามารถในเชิงรับป้องกันการโจมตี"
 action.92.pitharan:1 "ในระหว่างการสำรวจดาว [From.GetName] ยาน [Root.GetName] ได้ค้นพบทรัพยากรเชิงยุทธศาสตร์ที่ไม่เคยเป็นที่รู้จักมาก่อน เรียกว่า §Hฝุ่นพิทารัน(ฝุ่นพู่)§! ฝุ่นละเอียดที่มีความหนาแน่นของพลังงานสูงนี้ทำหน้าที่เป็นปุ๋ยชั้นยอด การใช้งานมันจะช่วยส่งเสริมผลผลิตอาหารของเราได้อย่างยอดเยี่ยม"
 action.92.engos:1 "ในระหว่างการสำรวจดาว [From.GetName] ยาน [Root.GetName] ได้ค้นพบทรัพยากรเชิงยุทธศาสตร์ที่ไม่เคยเป็นที่รู้จักมาก่อน เรียกว่า §Hไอระเหยเอ็นกอส(อังกฤษ)§! ไอระเหยนี้เป็นสารกระตุ้นที่เกิดขึ้นตามธรรมชาติซึ่งช่วยให้สิ่งมีชีวิตทุกรูปแบบทำงานได้เต็มขีดความสามารถสูงสุด"
 action.92.neutronium:1 "ในระหว่างการสำรวจดาว [From.GetName] ยาน [Root.GetName] ได้ค้นพบทรัพยากรเชิงยุทธศาสตร์ที่ไม่เคยเป็นที่รู้จักมาก่อน เรียกว่า §Hนิวโทรเนียม(นีโอเนียม)§! มันเป็นสารที่มีความหนาแน่นระดับสูงมากซึ่งประกอบขึ้นจากนิวตรอน ซึ่งสามารถนำมาหลอมหล่อเพื่อต่อเกราะยานที่มีความทนทานเป็นเลิศได้"
 action.92.zro.common: "ยาน [Root.GetName] ได้ค้นพบทรัพยากรเชิงยุทธศาสตร์ที่ไม่เคยเป็นที่รู้จักมาก่อน เรียกว่า §H$sr_zro$§! ในระบบดาว §Y[Root.Fleet.GetStarName]§!"
 action.92.zro: "$action.92.zro.common$ มันเป็นสารละอองลอย (aerosol) ที่หาได้ยากและไม่ทราบที่มา และเมื่อ [Root.Owner.GetIngestedLoc] มันจะช่วยส่งเสริมขีดความสามารถของ [Root.Owner.GetIndividualNamePlural] ผู้มีพรสวรรค์ด้านพลังจิต (psionic)$action.92.part3$"
 action.92.dark_matter:1 "ยาน [Root.GetName] ได้ค้นพบทรัพยากรเชิงยุทธศาสตร์ที่ไม่เคยเป็นที่รู้จักมาก่อน เรียกว่า §Hสสารมืด(ลองดีเจ)§! ในระบบดาว §Y[Root.Fleet.GetStarName]§! มันดูเหมือนจะขัดต่อกฎเกณฑ์ทางธรรมชาติหลายข้อ และมีศักยภาพในการปฏิวัติวงการวิทยาศาสตร์ของเราอย่างสิ้นเชิง"
 action.92.satramene:1 "ในระหว่างการสำรวจดาว [From.GetName] ยาน [Root.GetName] ได้ค้นพบทรัพยากรเชิงยุทธศาสตร์ที่ไม่เคยเป็นที่รู้จักมาก่อน เรียกว่า §Hแก๊สซาทรามีน(แก๊สแซทรัมีน)§! แก๊สนี้เป็นสารกระตุ้นที่เกิดขึ้นตามธรรมชาติซึ่งมีผลในการสร้างความสงบให้กับสิ่งมีชีวิตส่วนใหญ่ มักจะกระตุ้นพฤติกรรมรักความร่วมมือในกลุ่มสังคม และมีศักยภาพที่ก่อให้เกิดการเสพติดได้"
 action.92.living_metal:1 "ยาน [Root.GetName] ได้ค้นพบทรัพยากรเชิงยุทธศาสตร์ที่ไม่เคยเป็นที่รู้จักมาก่อน เรียกว่า §Hโลหะมีชีวิต(เสียงโลหะ)§! ในระบบดาว §Y[Root.Fleet.GetStarName]§! มันมีคุณลักษณะที่ปกติพบเห็นได้เฉพาะในสิ่งมีชีวิตทางชีววิทยาเท่านั้น และจะพยายามฟื้นฟูตัวเองให้กลับคืนสู่รูปทรงเดิมที่มันถูกขึ้นรูปไว้อยู่เสมอ"
 action.92.terraform_liquids:1 "ในระหว่างการสำรวจดาว [From.GetName] ยาน [Root.GetName] ได้ค้นพบแหล่งสะสมขนาดใหญ่ของ §Hของเหลวปรับสภาพดาวเคราะห์(น้ําพิมพ์)§! หายากหลายชนิด การเข้าถึงของเหลวเหล่านี้จะช่วยสนับสนุนกระบวนการปรับสภาพดาวเคราะห์ได้อย่างมาก"
 action.92.terraform_gases:1 "ในระหว่างการสำรวจดาว [From.GetName] ยาน [Root.GetName] ได้ค้นพบแหล่งสะสมขนาดใหญ่ของ §Hแก๊สปรับสภาพดาวเคราะห์(แก๊สไฟฟ้า)§! หายากหลายชนิด การมีแก๊สเหล่านี้ใช้อย่างสม่ำเสมอจะช่วยให้กระบวนการปรับสภาพดาวเคราะห์มีค่าใช้จ่ายน้อยลง"
 action.92.has_tech:0 "เรามีเทคโนโลยีแล้ว - หากเราเข้าควบคุมระบบดาวนี้ เราจะสามารถสกัดทรัพยากรนี้มาใช้ประโยชน์ได้$action.92.generic$"
 action.92.no_tech:0 "เรายังไม่สามารถสกัดทรัพยากรนี้ได้ในขณะนี้ แต่ทว่าเราสามารถเข้าควบคุมระบบดาวนี้เพื่อเก็บเกี่ยวประโยชน์ในภายภาคหน้าได้$action.92.generic$"

 action.92.zro.mindwarden: "$action.92.zro.common$\n\nคุณสมบัติของละอองลอยหายากนี้ได้รับการบันทึกว่าส่งผลกระทบแทรกซึมต่อระบบประสาทที่ผิดปกติ ดังนั้นจึงได้รับการกำหนดให้เป็นสารควบคุมระดับอัลฟ่า มันอาจพิสูจน์แล้วว่ามีคุณค่าสำหรับการพัฒนาเทคโนโลยีปกป้องจิตใจ$action.92.generic$"

 action.942.name: "ค้นพบแหล่งสะสม $sr_zro$"
 action.942.desc: "ยาน [Root.GetName] ได้ค้นพบแหล่งสะสมของทรัพยากรเชิงยุทธศาสตร์ไอดี: §H'$sr_zro$'§! ในระบบดาว §H[Root.Fleet.GetStarName]§!\n\nละอองลอยที่หายากนี้มีประโยชน์มากมาย การวิเคราะห์แสดงให้เห็นว่าตัวอย่างที่ผ่านการแปรรูปสามารถส่งผลกระทบต่อการทำงานของยูนิตชาว [Owner.GetSpeciesAdj] ที่มีคุณสมบัติ 'พลังจิต'(เสียงพร่า)'ได้ เช่น ผู้ถูกสร้างจากชราวด์(ตัดกระดาษ)ด้วยเทคโนโลยี $tech_mine_zro$ ของเรา เราจะสามารถสกัดทรัพยากรนี้มาใช้ได้หากเราเข้าควบคุมระบบดาว [Root.Fleet.GetStarName]$action.92.generic$"
 action.942.a: "การค้นพบที่ยอดเยี่ยมที่สุด"

