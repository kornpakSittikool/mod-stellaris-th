 sr_distar_nanodust:0 "ฝุ่นสีเทา(ฝุ่นเครย์)"
 sr_distar_nanodust_desc:0 "ตะกอนของธาตุต่าง ๆ ที่ถูกลดขนาดลงเป็นฝุ่นละอองขนาดเล็ก เมื่อกระจายไปทั่วดาวเคราะห์แล้ว ฝุ่นสีเทาจะสามารถเปิดใช้งานโดยเครื่องจักรนาโนเพื่อปรับเปลี่ยนสภาพของดาวเคราะห์ได้อย่างรวดเร็ว"
 sr_distar_nanocrystal:0 "คริสตัลสีเทา(แก้วคริสตัล)"
 sr_distar_nanocrystal_desc:0 "ผลพลอยได้ที่เป็นผลึกจากการทำงานของหุ่นยนต์นาโนบางประเภท แสดงปฏิกิริยาที่น่าสนใจกับวัสดุนาโนอื่น ๆ ซึ่งบ่งบอกถึงความจริงที่ซ่อนอยู่เหนือระดับสเกลพลังค์(ขนาดพอกเกิล)"
 sr_distar_nanoscale:0 "เกล็ดสีเทา(สเกลเรย์)"
 sr_distar_nanoscale_desc:0 "ปุ๋ยเคมีสังเคราะห์เข้มข้นที่ออกแบบมาเพื่อฟื้นฟูระบบชีวภาพที่ถูกทำลายล้าง"
 sr_distar_nanoactuator:0 "แอคชูเอเตอร์สีเทา(Gray Actuators)"
 sr_distar_nanoactuator_desc:0 "แอคชูเอเตอร์นาโนที่เรียบง่ายแต่ทรงพลัง ช่วยให้สามารถควบคุมจัดการและการทดลองที่ซับซ้อนในระดับสเกลเมโซสโกปิก(ขนาดเมโซโคป)ได้"

