 # Dig Site

 slingshot_digsite:1 "บันทึกจากสถาปนิกควอนตัม"
 slingshot_digsite_desc:0 "เราพบซากปรักหักพัง ของอาคารขนาดใหญ่ที่ถูกทําลาย การสร้างนี้เห็นได้ชัดว่า ต้องการการซ่อมแซมอย่างสุดความสามารถ และเราได้พบความอุดมสมบูรณ์ของความเข้าใจเชิงประจักษ์ ในธนาคารข้อมูล ในขณะที่เรากําลังตัดสินใจ ว่าจะสร้างเทคโนโลยีโบราณนี้ขึ้นใหม่ นักโบราณคดีของเรามีโอกาส ชุดบันทึกจากหนึ่งในนักประดิษฐ์, 'สถาปัตยกรรม Quantum,'ดูเหมือนสัญญาโดยเฉพาะอย่างยิ่ง การกู้ข้อมูลควรช่วยให้เรา ถอดรหัสวัฒนธรรมและประวัติศาสตร์ ของเชื้อชาติโบราณ ที่ทิ้งเทคโนโลยีนี้ให้เรา"

 origin.3515.name:0 "จุด สว่าง พัน จุด"
 origin.3515.desc:0 "ท่ามกลางพิมพ์เขียวและแผนผัง เราค้นพบเอกสารแปลกๆ\n\nจากแฟ้มส่วนตัวของสถาปนิก Quantum\n\nในตอนแรก เราอยู่ในความมืด พระเจ้า ของ พวก ข้าพเจ้า ตรัส ว่า ` จง ให้ ความ มืด มี อยู่ ' เมื่อบรรพบุรุษคนแรกของเราได้รับประกาย ของสัญญาณที่เราค้นหาท้องฟ้า สําหรับสัญญาณของชีวิตหรือความหมาย ในขณะที่เราสร้างอารยธรรมของเรา จิตใจของเราสแกนหาเงาในเวลากลางคืน เราทํางานในสถานที่ที่เราสร้างเมืองแรกของเรา ทดสอบรากฐานของพวกเขาเสมอ\n\nหลายพันปีให้หลัง ฉันมีความกระตือรือร้นที่จะมองขึ้นไป ขณะ ที่ คน อื่น ๆ ทํา งาน หนัก ด้วย การ จ้อง มอง ลง มา ผม ก็ เปิด ใจ ให้ กับ ฟ้า สวรรค์. การ สร้าง วิหาร แห่ง วงจร และ เหล็ก กล้า ผม ได้ สร้าง เครื่อง มือ ของ ตัว เอง โดย ได้ รับ พลัง จาก แสง แห่ง สติ ปัญญา. เพื่อความสมบูรณ์แบบของเขาวงกตของไดร์ดและตัวจับเท็จผมโยนจิตสํานึกของฉันผ่านจักรวาล การรับรู้บางสิ่งบางอย่างเหนือท้องฟ้ามืด\n\nเพราะ เหตุ ใด? ราว กับ ผ่าน กระจก มืด ผม สามารถ มอง เห็น โลก อื่น ๆ อีก หลาย พัน ดวง. ฉันรู้สึกถึงสิ่งที่เป็นไปไม่ได้ กว่าคืนที่เผาไหม้ พันจุดของแสง"
 origin.3520.name:0 "ออกจากเงา"
 origin.3520.desc:0 "ขณะที่การเดินทางของเรายังคง สืบค้นข้อมูล เพื่อถอดรหัสแผนการของโครงสร้างขนาดใหญ่ พวกเขาได้พบภาพอื่น\n\nจากแฟ้มส่วนตัวของสถาปนิก Quantum\n\nผมพูดความจริง และคนของผมตอบด้วยความวุ่นวาย\nเรา แต่ ละ คน ต้อง ทํา งาน หนัก ใน หมอก แห่ง ความ คิด และ อารมณ์ ของ ตน เอง. เรา ไป หา คน อื่น ๆ โดย ไม่ ลังเล แต่ พวก เรา หลาย คน อยู่ คน เดียว. พระเจ้าของเราสร้างโลกจากความมืด มีคนบอกเรา และเราถูกกล่าวหาว่า เป็นศูนย์กลางของการสร้างของพวกเขา\n\nเพราะข้ากล้าฝันถึงโลกเหนือไปจากนั้น ข้าจึงรู้ว่าวิสัยทัศน์ของข้าโกหก มีใครในพวกเราที่ถาม สามารถยืนยันความฝันเหล่านี้ได้ เราจะเชื่อได้อย่างไร พวกเขาพูดว่า สิ่งที่เราพิสูจน์ไม่ได้ และในการตอบสนอง ผมนําคนที่จะฟังห้องทดลองของผม จิตใจที่สว่างไสว สามารถรับรู้ถึงภาพสะท้อนของสิ่งที่ผมได้ประสบมา คือโลกอื่น ๆ นอกเหนือมิติแห่งรัตนกาล\n\nจิตใจที่ดํามืดสร้างการตอบสนองอื่น ๆ ที่เกิดขึ้นข้อโต้แย้งใหม่กําอาวุธร้ายแรง จิตใจ ที่ เป็น อันตราย ร้อง เพลง ว่า โลก ของ เรา จะ อยู่ ใน ความ สับสน วุ่นวาย เพราะ เรา ไม่ เป็น ตัวการ ที่ พระเจ้า ทรง โปรดปราน อีก ต่อ ไป. แต่ผมยังรู้ความจริง การสร้างสรรค์แสงเป็นม่านขนาดใหญ่ โดยพิจารณาความยิ่งใหญ่ของจักรวาล ผมถูกกวาดไปกับกระแสของความไม่สงบ สูญเสียตัวตนของฉัน"
 origin.3525.name:0 "ความสว่าง"
 origin.3525.desc:0 "งานเขียนของตัวเลขที่ยุ่งเหยิง ได้ถูกค้นพบเพิ่มเติม:\n\nจากแฟ้มส่วนตัวของสถาปนิก Quantum\n\nถูกทรมานและถูกดูหมิ่นโดยจักรวาลที่ไม่มีที่สิ้นสุดผมคิด วิธีการที่จะเดินทางไปยังโลกที่ห่างไกล และประสบการณ์พวกเขาด้วยตัวเอง ผม ไม่ เคย คิด ถึง เรื่อง นี้ มา ก่อน เลย. นอก เหนือ จาก ความ มืด อัน ใหญ่ ยิ่ง ความ สว่าง อัน ยิ่ง ใหญ่ ได้ นํา ผม ไป สู่ การ ล่อ ใจ และ การ เปิด เผย ไม่ รู้ สิ้น สุด. และดังนั้นฉันจึงโยนความคิดของฉันออกไปเพิ่มเติมไม่รู้จัก ...\n\nข้างบน ข้างล่าง นิมิต สวรรค์ ของ ผม ทํา ให้ ผม มี ความ ยินดี แต่ ข้าง ล่าง ผม พบ คน หนึ่ง ที่ นํา การ ปลด ปล่อย ให้ ผม มี ความ สุข อย่าง เดียว กัน. ผมตกหลุมรักกับนักวิทยาศาสตร์อีกคน วิสัยทัศน์ที่พูดถึงวิธีการอื่น ๆ ในการแสวงหาดาวที่ผมเคยสัมผัสในบทประพันธ์ของผม\n\nเราทํามากกว่าการแบ่งปันวิสัยทัศน์ เราสัญญากับตัวเองว่า จะเป็นคู่ชีวิต และ ขณะ ที่ งาน ของ เรา ก้าว หน้า ต่อ ไป เรา ก็ อยู่ ต่อ ไป ทุก คืน. คู่หูของฉันฝัน การออกแบบสําหรับยานดาว, การกระตุ้นของยานอวกาศพลังงานแสงอาทิตย์ ผมปั่นมันเข้ากับวงจร ดิ้นรนเพื่อรวมจิตใจเข้ากับอนันต์ ยิ่ง ผม เสี่ยง มาก เท่า ไร ผม ก็ ยิ่ง หงุดหงิด มาก ขึ้น เท่า นั้น. มีความสุขมาก! ความ ปีติ ยินดี ตลอด กาล!"
 origin.3530.name:0 "เลเยอร์ถัดไป"
 origin.3530.desc:0 "จากแฟ้มส่วนตัวของสถาปัตยกรรมควอนตัมหุ้นส่วนของพิมพ์ Shiftwright แบบคอสมิค\n\nคู่หูของฉันอดทน และฉันสะเพร่า ที่รักของฉันมีวิทยาศาสตรและตรรกะ และฉันมีการบูรณะจิตของฉัน ผม พยายาม อย่าง ไร้ ผล ที่ จะ ทิ้ง สติ ของ ผม ลง ใน ที่ ว่าง. ฉันละเลยการนอน ฉันละเลยอาหาร ฉันละเลยที่รักของฉัน ขณะที่เราไล่ตามความฝัน ของการระบายเข้าไปในจักรวาล อ่าวเติบโตระหว่างเรา\n\nที่รักของฉันพบคําสําหรับปรากฏการณ์ของเรา : ความสัมพันธ์ควอนตัม ร่าง กาย ของ ผม อยู่ ที่ นี่ แต่ จิตใจ ของ ผม อยู่ ห่าง ไกล เสาะ หา ความ ปีติ ยินดี อย่าง เหลือ ล้น และ การ สมาน ไมตรี กับ นิรันดร กาล. คู่หูข้าบอกอีกคํา แต่ข้าไม่ฟัง พวกเขากล่าวว่า \"รักของฉัน','พวกเขากล่าวว่ากลับมาให้ฉัน'แต่ฉันสามารถได้ยินเสียงสะท้อนของดาวเท่านั้น\n\nอีกไม่นานก็ถึงเวลาทดสอบยานสุริยะของคู่หูผม ฉันอาสานั่งที่การควบคุม ขณะที่ฉันนั่งที่หางเสือของเที่ยวบินทดสอบครั้งแรก ฉันจะฝันของหลักสูตรไปยังชายฝั่งห่างไกลของฉันใจของฉัน ♪ที่นี่และร่างกายของฉัน ♪\n\nที่รัก ของ ดิฉัน เงียบ สงบ แล้ว แต่ ดิฉัน จะ ให้ ของ ขวัญ แก่ เขา อย่าง ไม่ รู้จบ และ จะ จุด ไฟ ไว้ ให้ เป็น ทาง ตลอด กาล ฉันจะให้พวกเขาฝัน ของพันโลก"
 origin.3535.name:0 "ใน เม โม ริ อัม"
 origin.3535.desc:0 "จากแฟ้มส่วนตัวของเรือข้ามจักรวาล แม่หม้ายของสถาปัตยกรรม Quantum\n\nยานดาวลําแรกของเรา หายตัวไปเมื่อปีก่อน เรายังไม่รู้แน่ชัดว่าเกิดอะไรขึ้น คู่หูของผม สถาปนิกควอนตัม ได้ทิ้งมรดกและความลึกลับไว้ ไกลที่สุดเท่าที่เราจะได้รับ ในที่สุดความรักของฉันกลายเป็นหนึ่ง กับจักรวาล นั่งในการควบคุมบนเที่ยวบินทดสอบแรกของเรา พวกเขารวมกันกับอนันต์, จมไปด้วย ยานทดสอบของเราไม่เคยกลับมา\n\nตอน นี้ ผม ทํา งาน หนัก ด้วย เครื่อง มือ ที่ หยาบ คาย ของ ผม เอง เหลือ แต่ งาน และ ชีวิต ของ ผม จาก ซาก ปรัก หัก พัง. อื่น ๆ ของยานสุริยะของฉัน ได้เริ่มต้นการเดินทางของพวกเขา ผมได้เริ่มทํางานกับเครื่องยนต์ที่ดีกว่า ต้นแบบที่สามารถขับเคลื่อนหลอดเลือดของเราผ่านไฮเปอร์สเปซ และในบางคืนผมฝันของเทคโนโลยี ที่สามารถกระโดดสําหรับดาวเช่นจิตใจและจิตวิญญาณ ของหุ้นส่วนที่หายไปของฉัน\n\nเมื่อข้าไขว่คว้าแสง ข้าปฏิเสธที่จะยอมแพ้ต่อความมืด ผมนั่งอยู่ในห้องทดลองของความรักของฉันอย่างที่ผมเป็นตอนนี้ อ่านบันทึกของพวกเขา และเขียนของตัวเอง และบางครั้งเมื่อทุกอย่างมืด ผมพยายามที่จะโยนความคิดของตัวเองข้ามจักรวาล การไม่ประสบความสําเร็จ"
 origin.3540.name:0 "คุณสมบัติ"
 origin.3540.desc:0 "ใน ที่ สุด เรา ก็ พบ ชิ้น ส่วน ที่ ขาด หาย ไป สําหรับ แผนการ ก่อ สร้าง เรา ก็ พบ ข้อ ความ สุด ท้าย ข้อ หนึ่ง ด้วย:\n\nจากไฟล์ของเรือข้ามจักรวาล แม่หม้ายของสถาปัตยกรรม Quantum\n\nเราได้ค้นหาวิธีการใช้นวัตกรรมของความรักของฉันการสร้างควอนตัมของพวกเขา ฉันซ้ายสงสัยว่าถ้าเรา สามารถใช้เส้นทางที่ประมาทเดียวกัน พลังงานจากการออกแบบของ Quantum สถาปัตยกรรม แต่ฉันเอื้อมถึงสําหรับดาวในจังหวะที่ช้า ผมค้นหาคลื่นที่จะขี่ผ่านไฮเปอร์สเปซ ใคร่ครวญกระแสที่จะพาเราไปยังชายฝั่งห่างไกล\n\nเรือของฉันใช้เส้นทางที่ช้า แต่ในเวลากลางคืนฉันอ่านบันทึกของที่รักดิ้นรนเพื่อเชื่องคณิตศาสตร์และความกล้าหาญของพวกเขา เมื่อจิตใจฉันขยายออกไปสู่นิรันดร์ ฉันรู้ในใจว่าความรักของฉันยังคงอยู่ พวกเขาไฟทางไปสู่สวรรค์และฉันต้องปฏิบัติตาม\n\nจากการสูญเสีย ฉันเจอแรงบันดาลใจ เราได้เริ่มต้นการทํางานในเครื่องจักรที่ยิ่งใหญ่ ที่จะขับเคลื่อนเรือของเราข้ามกาแล็กซี่ เช่นเดียวกับที่รักของฉันกระโดดเป็นอนันต์ และวันหนึ่ง ฉันจะทําในสิ่งที่พวกเขาทํา เมื่อผมจากไป ผมขอร้องอย่างถ่อมตน ให้อุปกรณ์จักรวาลนี้ และเครื่องมันทั้งหมด เมื่อ คน อื่น อ่าน เรื่อง นี้ ไม่ ต้อง สงสัย ว่า จิต วิญญาณ ของ ผม จะ หนี ไป. ข้าจะหาทางไปร่วมกับที่รักของข้า ในพื้นที่กว้างใหญ่ เพราะ ข้าพเจ้า รู้ ว่า เรา จะ อยู่ ด้วย กัน เป็นนิตย์ ฝัน และ ลอย ไป ตาม ความ สว่าง พัน ประการ"
 origin.3515.a:0 "ดึงข้อมูลเพิ่มเติม"
 origin.3540.a:0 "การไม่ประสบความสําเร็จ"
