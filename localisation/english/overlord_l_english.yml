 # Synced from vanilla by Stellaris Thai Translator.
 # These keys were missing from the mod and should be translated on the next pass.
 START_SCREEN_PROGENITOR_HIVE_NOMADS: "ในตอนแรก โปรเจ้นเตอร์เคยเป็น\n\nชีวิต ใน ที่ ว่าง เปล่า เป็น ชีวิต ที่ โหด ร้าย และ มี การ แข่งขัน กัน แต่ ก็ ยัง คง เป็น กาย วิญญาณ ที่ มี อํานาจ มาก ขึ้น ฝูง ชน ก็ เพิ่ม จํานวน ขึ้น จน เต็ม ทุก ดาดฟ้า เรือ และ ทุก ห้อง ของ เรือ ใหญ่. ไม่ นาน นัก หลาย คน ก็ มี จิตใจ ที่ ไม่ มี ใคร ควบคุม ได้ ดัง นั้น ผู้ จัด การ จึง สร้าง ต้น ไม้ ที่ ออก ดอก แรก. ต่อ มา เห็น ได้ ชัด ว่า พวก เขา ไม่ สามารถ จัด การ ได้ โดย ลําพัง. ส่วน พวก เขา ก็ ได้ สร้าง หุ่น ยนต์ ฝึก งาน เพื่อ ช่วย ชี้ นํา การ อพยพ ครั้ง ใหญ่.\n\nขณะที่กองทัพเรือของเราเติบโต ที่ปรึกษาของเราแยกตัวเองเป็นเรือบัญชาการพิเศษ เราพร้อมที่จะกระจายอิทธิพล ของโปรเจเนอของเรา ไปยังดาวทั้งหมดของกาแล็กซี่ เพราะโปรเจเนอเป็นและจะเป็น เดอะ[Root.GetName]จะได้เห็นเอง"
 START_SCREEN_SHROUDWALKER_APPRENTICE_NOMADS: "เทพนิยาย ของ บรรพ สตรี ของ เรา กล่าว ถึง พวก อาจารย์ ที่ มี ความ รู้ และ อํานาจ มาก มาย ซึ่ง ได้ ชี้ นํา ประชาชน ของ เรา มา ตั้ง แต่ ก่อน ความ ทรง จํา. โดยความฝันพวกเขาเอื้อมถึงช่องว่าง ของบรรพบุรุษของเราเร่ร่อน, แบ่งปันปัญญาของพวกเขาของชรูด และคําสอนของ\n\nตอนนี้อาจารย์ของเราได้เอื้อมออกไปอีกครั้ง พวกเขาได้เปิดเผยเส้นทางเกินลอยช้า ระหว่างดาว - วิธีที่จะเดินทางตัวเอง ชรูด ข้ามระยะทางที่กว้างใหญ่ในขณะ\n\nแต่อีกไกลแค่ไหนถึงจะไปได้ คุณครูของเราหมายถึง 'อุโมงค์' - รูหนอนธรรมชาติที่อยู่ตรงขอบของระบบของพวกเขา การส่องอุโมงค์ของเราเอง ควรจะชี้ทางไปสู่ครูด้วยตัวเอง ขอให้พวกเขายังคงให้ปัญญากับเรา ในขณะที่เราดํารงตําแหน่งของเราในหมู่ดาว"
