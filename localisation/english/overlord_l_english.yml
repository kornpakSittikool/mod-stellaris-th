 # Teachers of the Shroud #
 ##########################

 origin_shroudwalker_apprentice:0 "อาจารย์แห่งดินแดนพลังจิตบริสุทธิ์"
 origin_shroudwalker_apprentice_desc:2 "§Rคำเตือน: บล็อกเส้นทางการยกระดับทั้งหมด ยกเว้น ['concept_psionic_ascension']§!\n\nนานก่อนที่ขั้นตอนแรกของพวกเขาไปยังเวทีกาแล็กซี่ อารยธรรมนี้ได้รับการสนับสนุนและรูปร่างโดยแม่มดชรูดวอร์คเกอร์"
 START_SCREEN_SHROUDWALKER_APPRENTICE:1 "เทพนิยาย ของ บรรพ สตรี ของ เรา กล่าว ถึง พวก อาจารย์ ที่ มี ความ รู้ และ อํานาจ มาก มาย ผู้ ซึ่ง ช่วย ให้ อารยธรรม ของ เรา เจริญ รุ่งเรือง. โดย ทาง ความ ฝัน พวก เขา เข้า มา หา เรา จาก ที่ ห่าง ไกล โดย แบ่ง ปัน สติ ปัญญา ของ พวก เขา ใน เรื่อง ความ ทะเยอทะยาน และ คํา สอน ของ พวก เขา.\n\nตอนนี้อาจารย์ของเราได้เอื้อมออกไปอีกครั้ง เปิดเผยความฝันของเราด้วย วิสัยทัศน์เอลดริชพวกเขาได้ให้เรามีกุญแจที่จะเดินทางระหว่างดวงดาว เพียง ไม่ กี่ ปี เรา ได้ สร้าง เรือ ที่ สามารถ เจาะ ช่อง ว่าง ได้.\n\nแต่อีกไกลแค่ไหนถึงจะไปได้ คุณครูของเราหมายถึง 'อุโมงค์' - รูหนอนธรรมชาติที่อยู่ตรงขอบของระบบของพวกเขา การส่องอุโมงค์ของเราเอง ควรจะชี้ทางไปสู่ครูด้วยตัวเอง ขอให้พวกเขายังคงให้ปัญญาเรา ในขณะที่เราใช้เวลาขั้นตอนแรกของเราไปยังเวทีกาแล็กซี่"
 START_SCREEN_SHROUDWALKER_APPRENTICE_CORPORATE:0 "ผู้ ก่อ ตั้ง ค ริ สต จักร ของ เรา ได้ เขียน เกี่ยว กับ พวก อาจารย์ ที่ มี ความ รู้ และ อํานาจ มาก มาย ผู้ ซึ่ง ช่วย ก่อ ตั้ง กิตติคุณ เก่า แก่ ที่ สุด ของ เรา. โดยความฝันพวกเขาเข้ามาใกล้เราจากระยะไกล แบ่งปันปัญญาของพวกเขาศักดิ์สิทธิ์\n\nตอนนี้อาจารย์ของเราได้เอื้อมออกไปอีกครั้ง เปิดเผยความฝันของเราด้วย วิสัยทัศน์เอลดริชพวกเขาได้ให้เรามีกุญแจที่จะเดินทางระหว่างดวงดาว เพียง ไม่ กี่ ปี เรา ได้ สร้าง เรือ ที่ สามารถ หว่าน ความ จริง อัน ศักดิ์สิทธิ์ ได้ ทั่ว หมู่ ดาว.\n\nแต่นั่นต้องไม่ใช่ขีดจํากัดของความทะเยอทะยานของเรา คุณครูของเราหมายถึง 'อุโมงค์' - รูหนอนธรรมชาติที่อยู่ตรงขอบของระบบของพวกเขา ถ้า เรา ไม่ ได้ วาง ท่อ นี้ ไว้ เรา ก็ จะ มี เส้น ทาง โดย ตรง ไป ยัง ครู. ขอให้พวกเขายังคงให้ปัญญาเรา ในขณะที่เราใช้เวลาขั้นตอนแรกของเราไปยังเวทีกาแล็กซี่"
 origin_tooltip_shroudwalker_apprentice_effects:3 "- $SPECIES_TRAITS$ ['concept_latent_psionic']\n- $AVAILABLE_STARBASE_BUILDINGS$ ['concept_shroud_beacon']\n- มีการติดต่อสื่อสารกับ ['concept_shroudwalker_enclave']\n- $GUARANTEED_RESEARCH_OPTION_STRING$ ['concept_psionic_theory', £society£ $tech_psionic_theory$]"

 origin.5605.name:0 "ข้อ ดี แท้"
 origin.5605.generic.desc:1 "นักเรียนของเรา สําหรับรุ่นเราได้สอนคุณ การเพิ่มความรู้ของเรา เมื่อเจ้าไปถึงดวงดาวแล้ว ความเชี่ยวชาญที่แท้จริงของเจ้าก็ใกล้เข้ามาแล้ว เส้นทางข้างหน้าจะไม่ง่ายเลย เพื่อเปิดทางให้เราให้คุณมีความรู้ของเกมถอดไพ่อุปกรณ์ของอํานาจอันยิ่งใหญ่ เมื่อสร้างบนหนึ่งในฐานดาวของคุณ เบค่อนจะวางอุโมงค์ชรูด เลือก ที่ ตั้ง ของ มัน อย่าง รอบคอบ เพราะ คุณ จะ วาง ไข่ อีก ไม่ ได้.\n\nใน ยาม ที่ มี ความ จําเป็น และ ความ ไม่ แน่นอน จง ร้อง เรียก เรา. ในความฝันเราจะดู ในการตื่นของเรารอการมาถึงของคุณ"
 origin.5605.corporate.desc:0 "นักเรียน ในความฝันเราได้แนะนําคุณ ผ่านวิสัยทัศน์ เราได้หล่อหลอมโลกของคุณ ตอนนี้เมื่อคุณยืนพร้อมที่จะส่งออก คําสอนของเราไปยังดาว, โดยการกระทําของเจ้า ผู้ไร้เกียรติจงได้รับเกียรติ ผล กําไร แห่ง การ งาน ของ ท่าน จะ เป็น ไป ตาม คํา สัญญา แห่ง คํา สอน ของ เรา เพื่อปลุกไฟแห่งวงการอุตสาหกรรม เราให้ความรู้แก่พวกคุณ เกี่ยวกับชรูด บีคอน อุปกรณ์แห่งอํานาจอันยิ่งใหญ่ เมื่อสร้างบนหนึ่งในฐานดาวของคุณ เบค่อนจะวางอุโมงค์ชรูด เลือก ที่ ตั้ง ของ มัน อย่าง รอบคอบ เพราะ คุณ จะ วาง ไข่ อีก ไม่ ได้.\n\nใน ยาม ที่ มี ความ จําเป็น และ ความ ไม่ แน่นอน จง ร้อง เรียก เรา. ในความฝันเราจะดู ในการตื่นของเรารอการมาถึงของคุณ"
 origin.5605.a:0 "เราได้รับของขวัญของคุณ ด้วยความกตัญญู"
 origin.5605.b:0 "เราสมควรได้รับสิ่งนี้"
 origin.5605.tt:0 "เราได้รับ:"

 origin.5615.name:0 "ยินดีต้อนรับ"
 origin.5615.a.desc:0 "อุปทาน, ในที่สุดเราสามารถทักทายคุณอย่างถูกต้อง สัญญาณและสัญญาณ บอกถึงช่วงเวลานี้ และตัวตนของชรูดเอง ได้เป็นพยานถึงทางผ่านของคุณ นานแล้วที่เรารอที่จะพบคุณ ในขอบเขตของความรู้สึก ที่นี่ยินดีต้อนรับคุณมากที่สุด"
 origin.5620.name:0 "ยินดีต้อนรับ"
 origin.5620.b.desc:0 "อุปทาน, ในที่สุดเราสามารถทักทายคุณอย่างถูกต้อง ผ่านอุโมงค์ที่เตรียมมานาน ทางของคุณได้รับการสัมผัสโดยตัวเอง ชรูด เสียง สะท้อน ที่ ยัง สั่น สะเทือน สะบัด ผ่าน น้ํา แห่ง จิตใจ ที่ ไม่ รู้สึก ตัว. คน เหล่า นั้น ที่ อาศัย อยู่ ใน ความ ลึกลับ ของ พวก ช รู ด ได้ อวย พร การ ประชุม ของ เรา อย่าง แน่นอน. ที่นี่ยินดีต้อนรับคุณมากที่สุด"

 origin.5625.name:0 "The Beacon is Lit"
 origin.5625.a.desc:1 "หลัง จาก ใช้ เวลา นาน หลาย ปี ใน ความ มืด ผ้า คลุม หน้า ก็ ถูก ยก เลิก. ครูของเรามอบของขวัญอันยิ่งใหญ่ให้แก่เราบีคอนนี้และอุโมงค์ที่มันวางไข่ จะแสงแน่นอนทางของเรา ข้ามดาว การเดินทางจากระบบนี้ตอนนี้จะเร็วขึ้น และลึกลับมากขึ้นเหลือหลาย"
 origin.5625.a.option:0 "ขอให้ชรูดต้อนรับเส้นทางของเรา"
 origin.5625.b.desc:1 "หลัง จาก ใช้ เวลา นาน หลาย ปี ใน ความ มืด ผ้า คลุม หน้า ก็ ถูก ยก เลิก. ครูของเรามอบของขวัญอันยิ่งใหญ่ให้แก่เราบีคอนนี้และอุโมงค์ที่มันวางไข่ จะแสงแน่นอนทางของเรา ข้ามดาว\n\nเหลือเพียงขั้นตอนเดียว อาณาเขตที่อาจารย์ของเราอาศัยอยู่ เส้นบนแผนที่อาจไม่มีความสําคัญต่อชรูด แต่ในโลกนี้ พวกมันยังคงก่อปัญหา ตอนนี้ ทางผ่านอุโมงค์ของเรา ถูกปิดกั้นไว้"

