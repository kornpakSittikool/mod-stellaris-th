 # Progenitor Hive Origin
 #########################

 origin_progenitor_hive:0 "ต้นกำเนิดของรัง"
 origin_progenitor_hive_desc:1 "รังนี้ได้รับประโยชน์ทางวิวัฒนาการ ผ่านผู้นํากึ่งอิสระ พวกนี้\"อยู่เหนือเมล็ด\" จะปรับปรุงความยืดหยุ่นโดยรวมได้อย่างดี แม้ว่าพวกเขาต้องการการดูแลอย่างต่อเนื่อง"
 START_SCREEN_PROGENITOR_HIVE:1 "ในตอนแรก โปรเจ้นเตอร์เคยเป็น\n\nชีวิตบน[Root.GetHomeWorldName]เป็น คน ดุ ร้าย และ ชอบ แข่งขัน กระนั้น ก็ ยัง คง เป็น นาย ทุน ผู้ ยิ่ง ใหญ่ ที่ ขยาย เขต แดน ของ ตน. โดย ใช้ อํานาจ อัน ยิ่ง ใหญ่ เช่น นั้น ใน ไม่ ช้า ก็ เกิด ไม่ มี การ เพิ่ม ทวี ขึ้น ดัง นั้น ผู้ ตั้ง ถิ่น ฐาน จึง สร้าง สถาน ที่ แห่ง แรก ขึ้น. ต่อ มา เห็น ได้ ชัด ว่า พวก เขา ไม่ สามารถ จัด การ ได้ โดย ลําพัง. แล้ว พวก เขา ก็ ได้ สร้าง หุ่น ยนต์ ขนาด เล็ก เพื่อ ช่วย ใน การ ทํา ให้ บ้าน ของ เรา เป็น ที่ อยู่ อาศัย.\n\nในขณะที่เราก้าวแรกข้าม[capital_scope.System.GetName]ระบบตัวยกของเราแยกตัวเองเข้าไปในรังพิเศษ เราพร้อมที่จะขยายอิทธิพลของโปรเจเนอของเรา ไปยังดาวทั้งหมดของกาแล็กซี่ - สําหรับโปรเจเนอเป็นและจะเป็น เดอะ[Root.GetName]จะได้เห็นเอง"
 origin_tooltip_progenitor_hive_effects:5 "- ['concept_spawning_pools', £building£ บ่อวางไข่] ถูกแทนที่ด้วย ['concept_offspring_nests', £building£ รังลูก]\n- $AVAILABLE_HOLDINGS$ ['concept_offspring_holding', £building£ รังลูก]\n- ถ้าไม่ได้เลือกคุณสมบัติพลเมือง §I$civic_hive_devouring_swarm$§!: §Iเซ็กเตอร์ต่างๆ§! สามารถปลดปล่อยเป็น §Iบริวาร§! ได้\n- §Iผู้นำ§! ที่ได้รับการแต่งตั้ง: ได้รับประสบการณ์แบบติดตัวเพิ่มเติม\n- $AVAILABLE_STARBASE_BUILDINGS$ §Iโมดูลดูแลลูก§!\n- สามารถสร้าง §Iยานลูก§!"
 origin_tooltip_progenitor_hive_negative_effects: "- กองยานประสบปัญหา ['concept_insufficient_offspring_oversight']"
 #Progenitor deposits, armies and decisions
 progenitor_defense:0 "ตัวจัดอันดับความสูง:"
