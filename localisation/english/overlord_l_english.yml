 ##########################
 # Imperial Vassal Origin #
 ##########################
 origin_imperial_vassal:0 "จักรวรรดิศักดินา"
 origin_imperial_vassal_desc:1 "ความ พยายาม ครั้ง แรก ของ เรา ที่ เหนือ กว่า ดาว เคราะห์ ที่ เป็น บ้าน เกิด ของ เรา เป็น ความ เจ็บ ปวด อย่าง กะทันหัน และ โหด ร้าย เนื่อง จาก ความ ปรารถนา ของ คน ต่าง ชาติ ที่ มี อํานาจ. ตอนนี้ เรามองไปยังอนาคต ที่เราไม่ได้อยู่ในเงาของจักรวรรดิอื่น"
 START_SCREEN_IMPERIAL_VASSAL:0 "ขณะ ที่ เรา ก้าว ออก จาก ระบบ บ้าน ของ เรา เป็น ครั้ง แรก ที่ จักรวรรดิ ต่าง ประเทศ เข้า มา ใกล้ ซึ่ง เรียก ร้อง ให้ เรา มี อํานาจ ปกครอง. แม้ จะ เป็น ความ ทรง จํา ที่ เจ็บ ปวด สําหรับ ประชาชน ของ เรา แต่ ใน ช่วง เวลา สั้น ๆ เรา ก็ ได้ เรียน รู้ มาก มาย ใน ฐานะ เป็น เหว ลึก สัมพันธภาพ ที่ ปรากฏ ว่า มี ประโยชน์ มาก กว่า ที่ เรา หวัง ไว้.\n\nเราไม่ใช่แหล่งเดียว ของเจ้าเมืองใหม่ของเรา ที่มีโอกาสได้พบนักการทูตและทูต จากจักรวรรดิอื่น ภายใต้อํานาจของพวกเขา เรา ไม่ เห็น ด้วย กับ พวก เขา แต่ เรา เชื่อ ว่า พวก เขา จะ เป็น พันธมิตร ที่ มี ประโยชน์ ใน เวลา นั้น.\n\nแม้ ว่า เรา กําลัง คอย ท่า วัน หนึ่ง ซึ่ง เรา สามารถ ตัดสิน อนาคต ของ เรา เอง ได้ อีก ครั้ง หนึ่ง แต่ เรา จะ ยอม รับ เรื่อง ที่ เกี่ยว กับ ธรรมชาติ ของ เรา ใน ตอน นี้ และ ทํา ให้ สถานการณ์ ที่ เรา ถูก นํา เข้า มา มาก ที่ สุด."
 origin_tooltip_imperial_vassal_effects:2 "- เป็นเมืองขึ้นของ ['concept_advanced_empire']\n- สามารถเลือกประเภท ['concept_specialist_subject', ความเชี่ยวชาญของเมืองขึ้น/บริวาร] เมื่อเริ่มเกม"

 # AI Overlord Version
 origin_imperial_vassal_overlord:0 "จักรวรรดิที่จงรักภักดี"
 origin_imperial_vassal_overlord_desc:0 "ผู้ ปกครอง ที่ ทะเยอทะยาน ซึ่ง ใช้ เวลา และ ความ พยายาม มาก ใน การ ปราบ ปราม เพื่อน บ้าน ที่ อยู่ ใกล้ ที่ สุด ให้ สนอง ความ จําเป็น ทุก อย่าง ของ ตน. พวก เขา ค่อย ๆ เติบโต ขึ้น อย่าง ไม่ เป็น ธรรม ขณะ ที่ เขา ลด ความ รับ ผิด ชอบ ลง เรื่อย ๆ ต่อ บึง น้ํา."
 origin_tooltip_imperial_vassal_overlord_effects:0 "- เริ่มต้นเป็น §Hจักรวรรดิที่มีความก้าวหน้าขั้นสูง§!\n- เริ่มต้นด้วยการมีบริวารหลายจักรวรรดิ"

 # Personalities
 personality_imperial_origin_overlord_ai:0 "เจ้า นาย ผู้ หลง ผิด"
 personality_imperial_origin_overlord_ai_desc:0 "จักรวรรดิ ที่ อาศัย โพรง ของ มัน อย่าง หนัก แทบ จะ ไม่ สนใจ มาก กว่า ระบบ บ้าน. พวก เขา ไม่ ทํา สงคราม กับ ผู้ อื่น และ ไม่ ได้ ขยาย เขต แดน ของ ตน เอง อย่าง แข็ง ขัน เว้น แต่ ถูก บังคับ."

 # Modifiers
 imperial_vassal_ai_modifier:0 "จักรพรรดิทิธ"
 imperial_vassal_ai_modifier_desc:0 "การ ทํา งาน ประจํา วัน ของ หน่วย ราชการ ของ จักรพรรดิ เรียก ร้อง ความ พยายาม อย่าง มาก จาก คณะ ทูต ของ ทุก คน ที่ เกี่ยว ข้อง."

