 resolution_defenseprivatization_repeal_3_effect_success:0 "ยกเลิกมติ §Y$resolution_defenseprivatization_condottieri$§! แล้วออก §Y$resolution_defenseprivatization_private_support_troops$§! เป็นกฎหมายกาแล็กติก"
