 progenitor_defense_desc:0 "ผู้เป็นเจ้าของรังนี้ สมาชิก ที่ ใหญ่ ที่ สุด และ ซับ ซ้อน ที่ สุด ของ รัง."
 d_progenitor:0 "รังของตัวจัดการ"
 d_progenitor_desc:0 "รังของโปรเจเนเตอร์ ที่ที่ทุกคนเกิดอยู่เหนือเมล็ด"
 d_progenitor_empty:0 "เครือข่ายตัวแบ่งประเภทว่าง"
 d_progenitor_empty_desc:0 "ผู้สนับสนุนผู้ยิ่งใหญ่ได้พ่ายแพ้ไปแล้ว ซึ่งทําให้ฝูงนกแตกละเอียด"

 decision_grow_progenitor:0 "การ ปลูก ต้น ใหม่"
 decision_grow_progenitor_desc:0 "ลูกคนโตของเราอาจจะสามารถ แบกเสื้อคลุมของโปรเจ็กเตอร์ที่จากไป"

 missing_progenitor_modifier:0 "โพรเจ้นท์หายไป"
 missing_progenitor_modifier_desc:0 "รังนี้หายไป หลักของมันและกําลังสลายตัว"

 ship_progenitor_hive_modifier:0 "การ ขาด ความ ยืดหยุ่น"
 ship_progenitor_hive_modifier_desc:0 "รังนี้ด้อยโอกาส ในระหว่างการต่อสู้ของดวงดาว ถ้าการต่อสู้ไม่ได้ถูกควบคุมโดยยานอยู่เหนือเมล็ด"

 #Events
 origin.3210.name:0 "น้ํา ตก ผู้ อํานวย การ"
 origin.3210.desc:1 "สิ่งที่คาดไม่ถึงได้เกิดขึ้นแล้ว เมืองหลวงของเราตกอยู่ใน[From.species.GetHandNamePlural]ของคนเลวทรามที่สุด[From.GetName]ระหว่างการป้องกันครั้งสุดท้าย[Root.GetName]ที่ปรึกษาของเราลดลงไปรุกรานที่น่ากลัวเอาจํานวนมาก[From.GetSpeciesAdj]กับพวกเขา\n\nในกรณีของความเป็นไปได้ ที่โปรเจ็กเตอร์ของเรามีการกําหนด ผู้สืบทอดในหมู่ตัวดําเนินการตัวดําเนินการ OffrestProgeniter- in-wander ได้จัดการจัดการเพื่อความเสถียรบางส่วนของจิตสํานึกของเรา แต่ความซับซ้อนและความดันเป็นที่ดีเกินไปสําหรับมันที่จะใช้อย่างเต็มที่ เราจะต้องหล่อเลี้ยงลูกดอกนี้ และให้มันเข้าครอบครองในฐานะโปรเจ็กเตอร์คนใหม่"
 origin.3215.name:0 "การย้ายภาพ"
 origin.3215.desc:0 "สิ่งที่คาดไม่ถึงได้เกิดขึ้นแล้ว โลกของพวกเรากําลังเข้าสู่[From.species.GetHandNamePlural]ของคนเลวทรามที่สุด[From.GetName]ตอนนี้เราต้องย้ายความพยายามด้านการบริหารทั้งหมด[capital_scope.GetName]รวมทั้งการจัดตั้งรังตัวขยายใหม่ เราต้องคัดเอาหนึ่งในตระกูลอยู่เหนือเมล็ดของเราออก และให้มันใช้เวลาในการเป็นโปรเจ็กเตอร์คนใหม่"
 origin.3215.a:0 "เราจะหายดี"
 origin.3245.name:0 "ไร้เป้าหมาย"
 origin.3245.desc:0 "[Root.GetName]ถูกตีด้วยอาวุธโคลอสซัสจากความกลัว§Y[From.GetAdj]§!เราไม่เพียงแต่เสียโลก แต่ยังเสียผู้สนับสนุนอีกด้วย[Root.GetPlanetHabitat]ทุกโดรนและฟลายสปริง[Root.GetName]ได้รวมตัวกันในความพยายาม เพื่อปกป้องโปรเจ็กเตอร์ของเรา จากเครื่องจักรที่น่ากลัว ใน ที่ สุด ความ พยายาม ของ พวก เขา ไม่ ได้ ทํา อะไร เลย นอก จาก ทํา ให้ สิ่ง ที่ ไม่ อาจ หลีก เลี่ยง ได้ นั้น ยาว นาน และ ผู้ จัด การ ก็ ล้ม ลง หลัง จาก นั้น ไม่ นาน.\n\nตอนนี้จิตสํานึกของเรา เต็มไปด้วยความคิดและแรงกระตุ้น ถ้าเราไม่แต่งตั้งผู้แทนคนใหม่เร็วๆนี้[Owner.GetName]จะยุติ"
 origin.3245.a:0 "เราต้องตอบโต้!"
 origin.3245.b:0 "เราต้องหนี!"
 origin.3245.c:0 "เราต้องการแร่ธาตุมากกว่านี้"
 origin.3245.d:0 "♪เสียงรบกวนที่ไม่อาจเข้าใจได้♪"
 origin.3265.name:0 "ความ ตาย เนื่อง จาก การ ระเบิด นับ พัน"
 origin.3265.desc:0 "หลังจากถูกทิ้งระเบิดมาหลายเดือน มันก็จบ[From.GetName]ได้ลดลง, ร่องรอยของสิ่งมีชีวิตทั้งหมดได้รับการกําจัด เมฆฝุ่นแผ่ไปทั่ว ถนนที่ถูกทําลายของอดีตเมืองหลวงของเรา ตาย[Root.GetSpeciesNamePlural]มี การ ทิ้ง ซาก ศพ จํานวน มาก ไว้ บน พื้น ดิน รอบ ๆ ตัว เรา ที่ ใหญ่ ที่ สุด - ผู้ จัด การ ซึ่ง ใน ที่ สุด ก็ ตก ลง มา ระหว่าง การ ถล่ม ครั้ง สุด ท้าย.\n\nตอนนี้เราต้องย้ายคณะบริหารไป[capital_scope.GetName]และจะต้องจัดตั้งรังใหม่ เราจะต้องฟักตัว 1 ในนั้นของอยู่เหนือเมล็ดของเรา เพื่อรับบทเป็นโปรเจวอร์เกี้ยน ก่อนที่จะมีศัตรูของเราอีก"

 MESSAGE_OFFSPRING_DEFEATED_TITLE:0 "ไม่ มี ผู้ ออก แบบ"
 MESSAGE_OFFSPRING_DEFEATED_DESC:0 "ต้น ไม้ ของ เรา เริ่ม ต้น$PLANET|Y$พ่ายแพ้ นําไปสู่การทําลาย§Yรังลูกดอก§!."
 MESSAGE_NO_OFFSPRING_TITLE:0 "ขาด การ ออก กําลัง กาย"
 MESSAGE_NO_OFFSPRING_DESC:0 "ขณะนี้เราไม่มีโดรนที่ได้รับมอบหมายให้ทํางาน§Yรังลูกดอก§!บน$PLANET|Y$นําไปสู่การลดลงในการผลิตโดรนแรงงาน"

 MESSAGE_FINAL_OFFSPRING_SHIP_TITLE:0 "เรือ ใบ ลํา สุด ท้าย เอา ชนะ"
 MESSAGE_FINAL_OFFSPRING_SHIP_DESC:0 "สุดท้ายของเรา§Yเรือ ใบ§!ใน$SYSTEM|Y$ระบบได้ลดลงออกจากกองเรือของเรา โดยปราศจากคําสั่งที่เหมาะสม"

