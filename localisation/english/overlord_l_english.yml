 origin_star_slingshot:0 "หนังสติ๊กสู่ดวงดาว"
 origin_star_slingshot_desc:1 "ครั้ง หนึ่ง ท้องฟ้า เหนือ อารยธรรม นี้ ได้ รับ แสง สว่าง จาก ดาว ตก แล้ว ก็ มา ถึง ฤดู แห่ง ความ มืด อัน ยาว นาน. เมื่อ ไป ยัง สวรรค์ เพื่อ เสาะ หา คํา ตอบ นัก สํารวจ ลูก แรก ของ โลก ได้ พบ การ หยุด พัก (และ ได้ ละ ทิ้ง ไป นาน)§H$quantum_catapult_1$§!."
 START_SCREEN_STAR_SLINGSHOT:0 "นับตั้งแต่ที่ผู้คนของเราได้เห็นท้องฟ้ายามค่ําคืน บางครั้งสว่างขึ้นโดยดาวยิงนับไม่ถ้วน ในขณะที่เราเริ่มสํารวจกาแล็กซี่ ในที่สุดเราได้เครื่องมือที่จําเป็น เพื่อติดตามสาเหตุของการรบกวนเหล่านี้$quantum_catapult_1$.\n\n$START_SCREEN_STAR_SLINGSHOT_SECOND_PART$"
 START_SCREEN_STAR_SLINGSHOT_GESTALT:0 "ตั้งแต่ช่วงเวลาแรก ๆ ของจิตสํานึกของเรา เราได้เห็นบางครั้งท้องฟ้าสว่างขึ้น โดยดาวยิงนับไม่ถ้วน ในขณะที่เราได้ปลดปล่อยตัวเอง จากพันธนาการของโลกของเรา เราได้จัดการที่จะได้รับเครื่องมือที่จําเป็น$quantum_catapult_1$.\n\n$START_SCREEN_STAR_SLINGSHOT_SECOND_PART$"
 START_SCREEN_STAR_SLINGSHOT_SECOND_PART:0 "แม้ จะ อยู่ นิ่ง ๆ, บาง ส่วน อยู่ ใน ซาก ปรัก หัก พัง, และ ถูก ทิ้ง ไว้ แต่ เรา เชื่อ ว่า มัน จะ กลับ คืน สู่ สง่า ราศี เดิม ได้. ถ้ามันทํางานตามที่จินตนาการ มันจะเป็นประตูของเราไปยังกาแลคซีที่เหลือ"
