 # Events
 origin.5703.desc:0 "ยินดีต้อนรับ สหายใหม่\n\nเรารู้สึกว่ามันถูกต้องที่จะติดต่อคุณ ตอนนี้คุณเลือกจะเข้าร่วม... พันธมิตรของเรา มันทําให้เราพอใจที่คุณเลือกที่จะเห็นเหตุผล แทนที่จะบังคับให้มือของเราที่มีต่อความรุนแรง"
 origin.5703.a:0 "คุณไม่ได้ให้ทางเลือกเรามากนักใช่ไหม"
 dialog_hostile_overlord:0 "เราจะใช้เวลา§Rศัตรู§!ยืนหยัดเพื่อเจ้านายของเรา"
 origin.5703.b:0 "มีอะไรที่คุณอยากคุยกับเราไหม"
 dialog_wary_overlord:0 "เราจะใช้เวลา§Yเป็นกลาง§!ยืนหยัดเพื่อเจ้านายของเรา"
 origin.5703.c:0 "เราภูมิใจที่ได้เป็นส่วนหนึ่งของพันธมิตร"
 dialog_friendly_overlord:0 "เราจะใช้เวลา§Gเพื่อน§!ยืนหยัดเพื่อเจ้านายของเรา"

 origin.5705.desc.harsh:0 "ฮัมเพลง... ไม่ว่ากรณีใด!\n\n$origin.5705.desc$"
 origin.5705.desc.grateful:0 "และเราภูมิใจที่จะต้อนรับคุณ\n\n$origin.5705.desc$"
 origin.5705.desc:0 "หลังจากพิจารณาอย่างรอบคอบ เราได้ตัดสินใจที่จะลงทุนทรัพยากรจํานวนมหาศาล เพื่อช่วยให้คุณเชี่ยวชาญในจักรวรรดิของคุณ มันจะช่วยให้จักรวรรดิของคุณมีบทบาทสําคัญ ในอนาคตของเพื่อนและพันธมิตรทั้งหมดของเรา\n\nเราไม่แน่ใจว่าคนของคุณจะสบายใจแค่ไหน อย่างไรก็ตาม การจัดระบบพิเศษทางทหาร เป็นนักวิชาการ? หรือ คุณ สนใจ วัสดุ และ แร่ ธาตุ มาก กว่า?"
 origin.5705.desc.reconsider:0 "งั้น... คิดอีกทีรึยัง"
 origin.5705.a:0 "ข้อตกลงทางการทหาร ฟังดูสมบูรณ์แบบ"
 origin.5705.a.tt_intro: "§Y[ROOT.GetName]§!จะแปลงเป็น§Y$specialist_bulwark$§!ผู้ เชี่ยวชาญ — มุ่ง ความ สนใจ ไป ที่ การ ทหาร และ การ ป้องกัน.\n§Y[Root.GetName]§!จะจ่าย$r_influence$ส่วน สิบ ชัก หนึ่ง สําหรับ การ ขยาย."
 origin.5705.a.tt:2 "$origin.5705.a.tt_intro$\nรับฝูงบิน§Yผู้ ทําลาย§!และเทคโนโลยีที่จําเป็นในการสร้างมากขึ้นจาก§Y[overlord_empire.GetName]§!."
 origin.5705.a.bioships.tt: "$origin.5705.a.tt_intro$\nรับฝูงบิน§Y$mauler_stage_2_plural$§!และเทคโนโลยีที่จําเป็นในการสร้างมากขึ้นจาก§Y[overlord_empire.GetName]§!."
 origin.5705.b:0 "ช่วยเล่าเรื่องบูลวาร์คให้เราฟังหน่อย"
 origin.5705.c:0 "คนของเรามีการศึกษามากขึ้นในธรรมชาติ"
 origin.5705.c.tt:1 "§Y[ROOT.GetName]§!จะแปลงเป็น§Y$specialist_scholarium$§!ผู้ เชี่ยวชาญ — มุ่ง ความ สนใจ ไป ที่ การ วิจัย และ เทคโนโลยี.\n§Y[ROOT.GetName]§!จะจ่าย$r_influence$ส่วน สิบ ชัก หนึ่ง สําหรับ การ ขยาย.\nรับ§Yยานวิทยาศาสตร์§!และ§Yนัก วิทยาศาสตร์§!จาก§Y[overlord_empire.GetName]§!."
 origin.5705.d:0 "คุณบอกเราเกี่ยวกับ บัณฑิตยศาสตร์ได้ไหม"
 origin.5705.e:0 "เราต้องการวัสดุและแร่ ที่เน้นเฉพาะบุคคล"
 origin.5705.e.tt:1 "§Y[ROOT.GetName]§!จะแปลงเป็น§Y$specialist_prospectorium$§!ผู้ เชี่ยวชาญ — มุ่ง ความ สนใจ ไป ที่ แร่ ธาตุ และ ทรัพยากร ยุทธศาสตร์.\n§Y[ROOT.GetName]§!จะจ่าย$r_influence$ส่วน สิบ ชัก หนึ่ง สําหรับ การ ขยาย.\nรับ 2§Yเรือ ก่อ สร้าง§!จาก§Y[overlord_empire.GetName]§!."
 origin.5705.f:0 "คุณช่วยบอกเราเรื่อง พรีโซเรีย ได้ไหม?"

 origin.5706.desc:0 "แนว โน้ม ที่ จะ ใช้ ความ รุนแรง ใช่ ไหม?\n\nบูลวาร์ก(บอลวาร์ก)ดัง ที่ เรา มัก จะ กล่าว ถึง จักรวรรดิ ต่าง ๆ เป็น สิ่ง พิเศษ ใน เรื่อง การ ทหาร. หมายความว่าเราจะสนับสนุนคุณ ด้วยแร่ธาตุพื้นฐานและอาหาร ในรายเดือน เพื่อที่คุณจะได้กันส่วนที่ใหญ่กว่าของจักรวรรดิ\n\nเราคาดหวังให้คุณช่วยเราปกป้อง ภัยคุกคามภายนอก และมีบทบาทสําคัญที่เขตแดนของพันธมิตรของเรา นั่น ฟัง ดู ดี สําหรับ คุณ ไหม?"
 origin.5706.a:0 "ฟังดูเหมือนเป็นสิ่งที่เราสามารถอยู่ได้"
 origin.5706.b:0 "เราอยากจะพิจารณาใหม่"

 origin.5707.desc:0 "งั้นพวกเขาก็ทําให้คุณสนใจแล้วสิ\n\nตาม ที่ รู้ จัก กัน ผู้ คง แก่ เรียน คน หนึ่ง เป็น ผู้ เชี่ยวชาญ ด้าน วิทยาศาสตร์ และ การ วิจัย. เราสัญญาว่าจะปกป้องจักรวรรดิของคุณ เพื่อให้คุณมุ่งเน้นไปที่ การพัฒนาอาณาจักรของคุณ และพันธมิตรของเราเช่นเดียวกัน\n\nในทางกลับกัน เราคาดหวังให้คุณแบ่งปัน การค้นพบทางเทคโนโลยีแปลกๆ ที่คุณอาจมีกับพวกเราที่เหลือ ชนิดของสัญญาที่จะทํางานสําหรับคุณ?"
 origin.5707.a:0 "คนของเราคงจะพอใจกับข้อตกลงนั้น"
 origin.5707.b:0 "เราอยากจะพิจารณาใหม่"

 origin.5708.desc:1 "สนใจในข้อตกลงที่ คุณ?\n\nสมมุติฐานที่หลายคนเรียกว่า จักรวรรดิที่เชี่ยวชาญในการหาแร่ธาตุ และผลิตทรัพยากรเชิงยุทธศาสตร์ ด้วยเครื่องมือที่เหมาะสม บางส่วนของความแหลม:สามารถค้นหาแร่ธาตุหายาก ที่คนอื่นมองข้ามไป\n\nนั่นฟังดูเหมือนสิ่งที่คนของคุณจะทําได้ไหม"
 origin.5708.a:0 "เราเชื่อว่าเป็นสิ่งที่เหมาะกับเรา"
 origin.5708.b:0 "เราอยากจะพิจารณาใหม่"

 origin.5710.title:0 "การ ปก ป้อง อนาคต ของ เรา"
 origin.5710.desc:0 "เราได้รับการชุมนุมทางการทูตขนาดเล็ก จากเจ้านายของเรา นําข่าวล่าสุดและความต้องการ อย่างที่เราได้รับ แต่เมื่อเร็วๆนี้ ทําตามความประสงค์ของพวกเขา พวกเขาต้องการที่จะกําหนดความสัมพันธ์ของเรา"

 # Dissolution of the Empire events
 origin.5725.title:0 "ความ สําเร็จ ที่ น่า สงสัย"
 origin.5725.desc:0 "เราได้รับข่าวเกี่ยวกับความวุ่นวายที่เกิดขึ้น[Root.Overlord.Capital.GetName]หลังจากการตายของ[overlord_ruler.GetName]ผู้ ที่ ไม่ เป็น ที่ นิยม[overlord_heir.GetName]ได้ครองบัลลังก์[overlord_heir.GetHimselfHerself]ด้วยความช่วยเหลือของทหาร, จํานวนมากเพื่อความโกรธของ[overlord_heir.GetHisHer]พี่น้องและประชาชน[Root.Overlord.Capital.GetName].\n\nหลังจากปัญหาที่เกิดขึ้น[overlord_heir.GetFirstName]หลายคนที่เริ่มตั้งคําถามเกี่ยวกับสิทธิ[Root.Overlord.GetName]เพื่อครอบครองพวกเรา หาก พวก เขา ไม่ สามารถ รักษา เมือง หลวง ของ ตน ให้ สงบ ได้ พวก เขา อาจ มี ความ หวัง อะไร ที่ จะ ช่วย ให้ เรา รอด?"
 origin.5725.a:0 "ปลาดาวเน่าจากหัวลง"

 origin.5735.title:0 "กระดูก หักจักรวรรดิ"
 origin.5735.desc:1 "ไม่มีผู้นําที่ดีที่จะยึดพวกเขาไว้ด้วยกัน[previous_overlord.GetName]ได้สลายตัวกลายเป็นหลายส่วน โดยแต่ละส่วนอ้างสิทธิของพวกเขาที่จะปกครองจักรวรรดิเก่า อย่าง ไร ก็ ตาม โดย ไม่ มี ความ เข้ม แข็ง หรือ ความ ชอบ ธรรม ใน สมัย โบราณ อํานาจ ยึด ครอง เหนือ อ่าง เก็บ น้ํา ทั้ง หมด ของ พวก เขา ก็ ไร้ ผล.\n\nกับส่วนที่เสื่อมโทรมของจักรวรรดิเก่า ต่อสู้เหนือบัลลังก์ของ[previous_overlord.GetName]หม่อมชั้นเก่าของพวกเขาตอนนี้มีอิสระที่จะทําตามที่ต้องการ"
 origin.5735.a:0 "เป็นอิสระอีกครั้ง"
 origin.5735.b:0 "ถึงเวลาผู้นําคนใหม่แล้ว"
 origin.5735.b.tt:0 "เพิ่มข้อมูล§Yการแทนที่§!คาซัส เบลลี กับ§Y[previous_overlord.GetName]§!ขอสาบานต่อลมที่พัดออกมาติดต่อกัน§Y30 ปี§!."
 origin.5735.c:0 "เราภักดีต่อราชบัลลังก์ ไม่ว่าจะเกิดอะไรขึ้น"
 origin.5735.c.tt:0 "จง รักษา ความ ภักดี§Y[previous_overlord.GetName]§!."

 # AI Vassals looking for new overlord events
 origin.5745.title:0 "การป้องกันเทคโนโลยี"
 origin.5745.desc:0 "ประชาชน[new_subject_target.GetName]ไม่สนใจอะไรเลย นอกเขตแดนของตัวเอง แต่พวกเขาตระหนักดีว่า อะไรก็ตามที่อยู่ข้างนอกนั่น อาจทําลายสมาธิภายในของพวกเขา ดังนั้น พวกมันจึงหันมาหาเราเพื่อป้องกันเรา[previous_overlord.GetName]ครั้งหนึ่งเคยให้พวกเขา"
 origin.5745.a:0 "พวกเขาจะเป็นประโยชน์ต่อจักรวรรดิของเรา"
 origin.5745.b:0 "เราไม่มีความสนใจในนักวิทยาศาสตร์เหล่านี้"

 origin.5750.title:0 "เจ้า ชาย ที่ ไม่ มี ใด เหมือน"
 origin.5750.desc:0 "เดอะ[new_subject_target.GetName]เป็น ที่ รู้ จัก กัน ว่า เจ้า ชาย ที่ ทะเลาะ วิวาท กัน มาก มาย ทุก คน พยายาม สุด กําลัง ที่ จะ ยึด เอา อิทธิพล และ อํานาจ ใด ๆ ที่ พวก เขา ทํา ได้. สําหรับครั้งหนึ่งดูเหมือนว่าในที่สุดพวกเขาได้จัดการที่จะตกลงกับบางสิ่งบางอย่าง และได้ส่งทูตกําลังมองหาที่จะทํา สัญญาทางการทูตใหม่กับเรา ดูเหมือนว่าพวกเขาพลาดการป้องกัน[previous_overlord.GetName]ครั้งหนึ่งเคยให้พวกเขา"
 origin.5750.a:0 "ตราบเท่าที่พวกเขาสามารถตกลงบางอย่าง"
 origin.5750.b:0 "เราไม่สนใจการทะเลาะกันของพวกเขา"

 origin.5755.title:0 "เข้า ไป ใกล้ โดย พวก ปา ลา ติ นา"
 origin.5755.desc:0 "เดอะ[new_subject_target.GetName]อยู่ใกล้กันมาก[previous_overlord.GetName]ก่อนการล่มสลายของพวกเขา และดูเหมือนว่าพวกเขาสนใจ ที่จะสร้างความสัมพันธ์ที่คล้ายคลึงกัน ตอนนี้นักการทูตของพวกเขากําลังเคลื่อนไหว เพื่อจัดการทางการทูตให้เสร็จสิ้น ทั้งสองฝ่ายจะยินดีที่จะลงนาม เป็นก้าวแรกในการสร้างความเข้าใจที่ดีขึ้น"
 origin.5755.a:0 "เราจะหาที่ให้พวกเขา"
 origin.5755.b:0 "ส่งทูตกลับบ้าน"

 origin.5760.title:0 "ลีกของฉันสําหรับกองยาน"
 origin.5760.desc:0 "ดูเหมือนว่าตลาดของ[new_subject_target.GetName]ได้รับการค่อนข้างไม่เสถียรหลังจากความเสื่อมโทรมของ[previous_overlord.GetName]ตอนนี้พวกเขาไม่มีใคร ที่จะต้องพึ่งพาการปกป้อง เจ้า ชาย หลาย คน เข้า มา หา เรา และ เสนอ จะ สนับสนุน[new_subject_target.GetAdj]การ เป็น ทาส และ แม้ แต่ ส่วน หนึ่ง ของ ผล กําไร ที่ ตาม มา อย่าง แน่นอน ขณะ ที่ จักรวรรดิ ของ พวก เขา คงที่ อีก ครั้ง หนึ่ง."
 origin.5760.a:0 "ตราบเท่าที่พวกเขาสามารถ นําเครดิตพลังงานของพวกเขา"
 origin.5760.b:0 "เราไม่จําเป็นต้องร่ํารวยของพวกเขา"

