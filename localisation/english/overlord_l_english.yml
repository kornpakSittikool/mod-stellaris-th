 resolution_intergalacticdirective_regulated_growth:0 "ควบคุมการเติบโต"
 resolution_intergalacticdirective_regulated_growth_desc:0 "โดยการกําหนดเขตแดน ของประเทศสมาชิก เราสามารถรักษาความปลอดภัย ของกาแล็กซี่ที่ปลอดภัยกว่าและสวยงามสําหรับทุกคน แม้ บาง คน อาจ พบ ว่า การ ดําเนิน การ ทาง การ ของ รัฐ เป็น ประโยชน์ ต่อ เรา ทุก คน."
 resolution_intergalacticdirective_ensured_sovereignty:0 "รองรับอธิปไตย"
 resolution_intergalacticdirective_ensured_sovereignty_desc:0 "ชุมชน กาแล็กติก จะ ออก คํา สั่ง ให้ ดําเนิน การ เพื่อ รับ ประกัน สิทธิ ปกครอง ของ สมาชิก โดย เฉพาะ อย่าง ยิ่ง คน เหล่า นั้น ที่ เคย ถูก จักรวรรดิ อื่น ล่วง ล้ํา ความ ซื่อ สัตย์ มั่นคง."
 resolution_intergalacticdirective_a_voice_for_all:0 "เสียงสำหรับทุกคน"
 resolution_intergalacticdirective_a_voice_for_all_desc:0 "มตินี้จะทําให้มั่นใจได้ว่า สมาชิกทุกคนของชุมชนกาแล็กติก จะมีการกล่าวถึงอนาคตของจักรวรรดิของพวกเขา"

 resolution_intergalacticdirective_repeal_1:0 "§Rยกเลิก $resolution_intergalacticdirective_regulated_growth$§!"
 resolution_intergalacticdirective_repeal_1_desc:0 "แม้ ว่า เป็น เรื่อง ธรรมดา ที่ จักรวรรดิ ต่าง ๆ จะ เรียก ร้อง ให้ เคารพ พรม แดน ของ ตน แต่ คํา สั่ง ที่ บังคับ โดย ชุมชน กาแลกติก ได้ กลาย เป็น เรื่อง ที่ ควบคุม ไม่ ได้ และ ไม่ ได้. เพื่อ ทํา ให้ แน่ ใจ ว่า จะ ดําเนิน งาน ได้ อย่าง ราบ รื่น จึง ถึง เวลา แล้ว ที่ จะ ตัด อํานาจ บาง อย่าง ออก ไป."
