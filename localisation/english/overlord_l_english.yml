 resolution_bureaucraticsurveillance_administrative_insight_desc:0 "เป็นส่วนหนึ่งของความพยายามของเรา ที่จะลดการดําเนินงานราชการอย่างง่าย เรากําลังบังคับใช้ระเบียบการปกครองที่ชัดเจนขึ้น"
 resolution_bureaucraticsurveillance_borderless_authority:0 "อำนาจไร้พรมแดน"
 resolution_bureaucraticsurveillance_borderless_authority_desc:0 "เป็นส่วนหนึ่งของความพยายามอย่างต่อเนื่องของเรา ที่จะลดรูประบบราชการภายใน ยิ่งมีอํานาจมากขึ้น"
 resolution_bureaucraticsurveillance_personal_oversight:0 "การกำกับดูแลด้วยตนเอง"
 resolution_bureaucraticsurveillance_personal_oversight_desc:0 "ขณะ ที่ บาง รัฐ ยอม รับ ว่า ประสบ กับ ความ เสื่อม ทราม ของ อํานาจ อธิปไตย ของ พวก เขา ความ พยายาม ของ เรา ใน การ ขจัด เทป บันทึก เสียง สี แดง ของ ข้าราชการ ได้ ปรับ ปรุง ประสิทธิภาพ ของ สภา สูง ให้ ดี ขึ้น อย่าง มาก ที เดียว!"

 resolution_bureaucraticsurveillance_repeal_1:0 "§Rยกเลิก $resolution_bureaucraticsurveillance_administrative_insight$§!"
 resolution_bureaucraticsurveillance_repeal_1_desc:0 "เรามุ่งเน้นไปที่ การกําจัดเทปสีแดงราชการ ขณะที่ประสบความสําเร็จ ทําให้รัฐสมาชิกหลายคน บ่นว่าอํานาจอธิปไตยของพวกเขาถูกประนีประนอม ตอน นี้ พวก เขา เสนอ พระ บัญชา ให้ กู้ อิสรภาพ บาง อย่าง นั้น."
