 resolution_defenseprivatization_repeal_1:0 "§Rยกเลิก $resolution_defenseprivatization_defense_contracts$§!"
 resolution_defenseprivatization_repeal_1_desc:0 "แม้ ว่า ผู้ รับ เหมา ป้องกัน อาชีพ จะ เป็น ที่ ปฏิเสธ ไม่ ได้ แต่ จักรวรรดิ ของ พวก เขา[global_event_country.GetGalCommunityOrGalImperium]ไม่ควรหวังมากเกินไปในการรักษาความสงบส่วนบุคคล"
