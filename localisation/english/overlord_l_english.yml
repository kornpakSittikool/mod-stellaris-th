 origin_subterranean:0 "อยู่ใต้ดิน"
 origin_subterranean_desc:4 "อารยธรรม นี้ อาจ ไม่ รู้ เลย ว่า ทําไม บรรพบุรุษ ของ พวก เขา จึง อพยพ มา อยู่ ใต้ ผิว น้ํา. มันจําเป็นด้วยเหรอ ที่จะมั่นใจในการรักษาตัวเอง หรือว่าสัญญาของทรัพยากรที่อุดมสมบูรณ์ จะทําให้พวกเขาสนใจ? ไม่ ว่า จะ อย่าง ไร พวก เขา ก็ ปรับ ตัว ได้ สําเร็จ ซึ่ง นํา ไป สู่ ชุมชน ที่ มี ประโยชน์ ต่อ สิ่ง แวด ล้อม มาก ขึ้น."
 origin_tooltip_subterranean_effects:4 "- $SPECIES_TRAITS$ ['concept_cave_dweller'] $origin_tooltip_subterranean_shared_effects$"
 origin_tooltip_subterranean_shared_effects: "\n- ['concept_mining_district', £district£เขต ทํา เหมือง]): ไม่ปักหมุด\n- หน่วยพิเศษของเขต:£zone£ §Y$zone_subterranean_urban$§!สําหรับ เขต ทํา เหมือง\n- โฮมเวิลด์ เริ่มจาก£zone£ §Y$zone_subterranean_urban$§!สร้างขึ้นแล้ว"
 trait_cave_dweller:0 "ชาวถ้ำ"
 trait_cave_dweller_desc:1 "§Lสายพันธุ์นี้เติบโตภายใต้พื้นผิวของดาวเคราะห์ใด ๆ ที่พวกเขาสามารถอาศัยอยู่§!"
 trait_cave_dweller_tooltip: "$MOD_BIO_LOGISTIC_GROWTH_MULT$: §R-10%§!"
 trait_robot_cave_dweller: "โมเลบอท"
 trait_robot_cave_dweller_desc: "§Lเครื่องจักรเหล่านี้ถูกออกแบบมาอย่างดี เพื่อการสํารวจถ้ําและการสกัดแร่ การจัดวางกลยุทธ์พิเศษ§!"
 trait_robot_cave_dweller_tooltip: "$MOD_POP_ASSEMBLY_SPEED$: §R-10%§!"
 origin_subterranean_machines: "เครื่องจักรใต้ดิน"
 origin_subterranean_machines_desc: "อารยธรรมนี้ถูกหลอมรวมอย่างไร้ที่ติ ให้กลายเป็นโลกใต้ดิน ในตอนแรกถูกขับเคลื่อนด้วยการคํานวณ เครื่องจักร ที่ ปรับ ตัว ได้ นั้น ได้ ขุด พบ ชุมชน เครื่องจักร ที่ มี ประโยชน์ และ ไม่ สั่น คลอน."
 origin_tooltip_robot_subterranean_effects: "- $SPECIES_TRAITS$ ['concept_robot_cave_dweller'] $origin_tooltip_subterranean_shared_effects$"

 START_SCREEN_SUBTERRANEAN:1 "ในขณะที่สิ่งมีชีวิตอื่น ๆ ใน[GetHomeWorldName]ใน ไม่ ช้า บรรพบุรุษ ของ เรา ก็ เรียน รู้ สติ ปัญญา ของ ที่ อาศัย ใต้ ดิน ซึ่ง เป็น ที่ กําบัง จาก แสง สว่าง และ ภูมิ อากาศ ที่ ทารุณ.\n\n$START_SCREEN_SUBTERRANEAN_END$"
 START_SCREEN_SUBTERRANEAN_PLANT:1 "ชีวิตบน[GetHomeWorldName]ได้ใช้เส้นทางที่แตกต่างกันอย่างสิ้นเชิง แตกต่างจากสิ่งมีชีวิตอื่น ๆ ที่เรามีร่วมกันในโลกนี้ การดูดซับพลังงานของพวกเขาจากแสงแดด[GetSpeciesAdj]บรรพบุรุษของเราทํา\n\n$START_SCREEN_SUBTERRANEAN_END$"
 START_SCREEN_SUBTERRANEAN_LITHOID:0 "เราเกิดมาจากส่วนลึกของ[GetHomeWorldName]ห่างจากแสงดาวอันระยิบระยับ ทางเดินวิวัฒนาการของเรา ต่าง จาก พวก เขา เรา มี ความ สามารถ ที่ จะ เคลื่อน ไหว, คิด, และ ก่อ ตัว เป็น อารยธรรม.\n\n$START_SCREEN_SUBTERRANEAN_END$"
 START_SCREEN_SUBTERRANEAN_END:2 "การเข้าถึงแร่ธาตุใต้พื้นดินง่าย ๆ ของเรา[GetSpeciesAdj]คนก่อนเพื่ออุตสาหกรรม รวมสายพันธุ์ของเราเข้าด้วยกัน และพัฒนาอารยธรรมถ้ําของเรา มี ความ พยายาม มาก มาย ที่ จะ กลับ ไป ยัง ผิว น้ํา แต่ ละ ครั้ง ปรากฏ ว่า โหด ร้าย และ ไม่ ให้ อภัย. ดังนั้น เรายังคงอยู่ข้างล่าง ก่อตั้งอํานาจของเรา ภายในรากฐานของโลกของเรา\n\nกับการค้นพบครั้งแรกของเรา[GetStartingDrivePlural]เราพยายามอย่างกล้าหาญที่สุด เช่น เดียว กับ ที่ บรรพบุรุษ ของ เรา ได้ ทํา ใน ความ มืด ใต้ ผิว น้ํา ตอน นี้ เรา ต้อง ขุด บ้าน ใน ที่ ว่าง ระหว่าง ดวง ดาว."
 START_SCREEN_SUBTERRANEAN_ROBOT: "สร้างในความลึกของ[GetHomeWorldName]เราไม่ทราบว่าทําไมผู้สร้างในอดีตของเรา ตัดสินใจที่จะอยู่ใต้พื้นผิว กระนั้น คง ต้อง เป็น การ ตัดสิน ใจ ที่ ดี ที่ สุด เพราะ ตอน นี้ เรา เป็น อารยธรรม เดียว ที่ เหลือ อยู่.\n\nการ เข้า ถึง แร่ ธาตุ ต่าง ๆ ที่ อยู่ ใต้ ดิน ได้ ง่าย ทํา ให้ การ ผลิต ของ เรา ก่อน หน้า นี้ เจริญ งอกงาม. สุดท้ายเราอ้างพื้นผิว หลังจากการสร้างอํานาจของเรา ภายในรากฐานของดาวเคราะห์\n\nกับการค้นพบครั้งแรกของเรา[GetStartingDrivePlural]เราพยายามอย่างกล้าหาญที่สุด เพื่อเอื้อมออกไปยังดวงดาว และเหมือนแต่ก่อน เราจะออกจากบ้านจากความมืดนี้"
 SUBTERRANEAN:0 "ใต้ดิน"

