l_english:

 OVERLORD_TITLE: "Overlord" # Do not translate
 DLC_OVERLORD_RECOMMENDATION_DESC:0 "§Sเจ้าเหนือหัว§! เป็นส่วนเสริมที่เน้นการทูต ครอบคลุมปฏิสัมพันธ์ระหว่างประเทศที่ถูกครอบงำกับเจ้าเหนือหัวของพวกเขา"
 DLC_OVERLORD_RECOMMENDATION_REC_MILITARIST:0 "เราแนะนําว่า$OVERLORD_TITLE$ขณะที่มันเปิดโอกาสใหม่ๆ สําหรับจักรวรรดิที่มุ่งไปสู่สงคราม ผ่านพวกทหารรับจ้าง"
 DLC_OVERLORD_RECOMMENDATION_REC_SPIRITUALIST:0 "เราแนะนําว่า$OVERLORD_TITLE$ขณะ ที่ มัน เปิด แหล่ง ที่ มา ใหม่ สําหรับ จักรวรรดิ ฝ่าย วิญญาณ อีก ทั้ง การ รวม จุด จุด มุ่ง หมาย ใหม่ ของ ช รู ราด เพื่อ เข้า ร่วม."
 DLC_OVERLORD_RECOMMENDATION_REC_DIPLOMACY:0 "เราแนะนําว่า$OVERLORD_TITLE$ขณะที่มันเปิดการปฏิสัมพันธ์ใหม่ๆ ระหว่างเจ้าบ้านและภาควิชาต่าง ๆ ซึ่งจะน่าสนใจต่อผู้ที่มีสไตล์การเล่นเน้นไปที่การทูต"
 DLC_OVERLORD_RECOMMENDATION_REC_HIVE:0 "เราแนะนําว่า$OVERLORD_TITLE$ขณะที่มันเปิดขึ้นไฮฟ์ใจใหม่ระบุที่มาของผู้นําพิเศษอยู่เหนือเมล็ดที่จะใช้ในการเสริมสร้างจักรวรรดิของคุณ"

