 resolution_defenseprivatization_defense_contracts:0 "ผู้รับเหมารักษาความปลอดภัย"
 resolution_defenseprivatization_defense_contracts_desc:0 "ในผลประโยชน์ของความมั่นคงของกาแล็กซี่ เราควรลงทุนทรัพยากร ในหน่วยงานรักษาความปลอดภัยอิสระ พวกมืออาชีพที่ถูกฝึกมาอย่างดี และไม่ใช่นักการเมือง จะช่วยจัดการปกป้องสมาชิก[global_event_country.GetGalCommunityOrGalImperium]."
 resolution_defenseprivatization_private_support_troops:0 "การคุ้มครองสิ่งที่มีผลกระทบสูง"
 resolution_defenseprivatization_private_support_troops_desc:0 "ขณะ ที่ ความ ขัด แย้ง ทวี ขึ้น เสื้อ ผ้า นิรภัย ส่วน ตัว ต้อง ได้ รับ อํานาจ ให้ ทํา สิ่ง ที่ ดี ที่ สุด ต่อ ๆ ไป: รักษา เสื้อ ผ้า[global_event_country.GetGalCommunityOrGalImperium]ปลอดภัย"
 resolution_defenseprivatization_condottieri:0 "ผู้พิทักษ์ที่เป็นกลาง"
 resolution_defenseprivatization_condottieri_desc:0 "สงครามอาจหลีกเลี่ยงไม่ได้ แต่ความเสียหายข้างเคียงไม่ใช่ โดยใส่ความไว้วางใจในมือของผู้เชี่ยวชาญการป้องกัน,[global_event_country.GetGalCommunityOrGalImperium]แน่นอน ว่า จะ ลด จํานวน ความ โหด ร้าย ทารุณ ที่ มี รายงาน ไว้ ใน สงคราม ได้ อย่าง น่า ทึ่ง."
 resolution_defenseprivatization_security_business:0 "บริหารความเสี่ยงกาแล็กติก"
 resolution_defenseprivatization_security_business_desc:0 "ทั้ง ๆ ที่ เรา พยายาม อย่าง ดี ที่ สุด ความ ขัด แย้ง ทาง ด้าน ชีวเคมี ที่ รุนแรง ก็ ยัง ทํา ให้ กาแล็กซี ต่าง ๆ ปั่น ป่วน. จักรวรรดิยังคงเก็บพิสูจน์ตัวเอง มีแนวโน้มที่จะวงกลมเล็กน้อย การ ปรับ ตั้ง ทหาร ส่วน ตัว ของ พวก เขา ย่อม ทํา ให้ ผู้ รับ เหมา ป้องกัน ตัว เป็น กลาง รักษา สันติภาพ ให้ มี ประสิทธิภาพ มาก ขึ้น."
 resolution_defenseprivatization_corporate_warlords:0 "บริษัทรักษาสันติภาพ"
 resolution_defenseprivatization_corporate_warlords_desc:0 "'$enclave.235.4.desc$'"

