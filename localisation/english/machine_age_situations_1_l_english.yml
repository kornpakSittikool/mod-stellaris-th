 branching_out: "ตลาดแตกแขนง"
 branching_out_desc: "การเสริมแต่งรยางค์หลายแขนขามีไว้สำหรับผู้ที่เสนอราคาสูงสุด"
 handy_workers: "แรงงานมือดี"
 handy_workers_desc: "ชนชั้นแรงงานได้รับการช่วยเหลือให้ยกมือขึ้นสู้ผ่านการบุกเบิกการเสริมแต่งรยางค์หลายแขนขา"
 luxury_limbs: "แขนขาอันหรูหรา"
 luxury_limbs_desc: "อำนาจมาพร้อมกับสิทธิพิเศษ: ชนชั้นนำย่อมมีสิทธิ์ในการมีรยางค์หลายแขนขามากกว่า"
 murdered_martyrs: "อาสาสมัครผู้เสียสละ"
 murdered_martyrs_desc: "ผู้เสียหายจากการทดลองเสริมแต่งจะได้รับข้อเสนอในพิธีกรรมสังเวยเพื่อยุติความทุกข์ทรมานของพวกเขา"
 artificial_pain_relief: "การบรรเทาปวดเทียม"
 artificial_pain_relief_desc: "อุตสาหกรรมยาหันมาให้ความสนใจกับการพัฒนายาบรรเทาปวดที่ออกฤทธิ์แรงสำหรับผู้ที่ผ่านการแปลงเป็นไซเบอร์ซึ่งมีความจำเป็น"
 chained_experiments: "การทดลองแบบห่วงโซ่"
 chained_experiments_desc: "พลเมืองเท่านั้นที่มีสิทธิ์เลือกไม่เข้าร่วมการทดลอง"
 cyber_opposition: "กลุ่มต่อต้านไซเบอร์"
 cyber_opposition_desc: "การปฏิเสธของรัฐที่จะรับผิดชอบได้จุดชนวนให้เกิดการต่อต้านทางการเมืองอย่างมีนัยสำคัญ"
 cyber_event_bliss_commercial: "ม็อดสร้างความสุขเชิงพาณิชย์"
 cyber_event_bliss_commercial_desc: "รากเทียมเชิงพาณิชย์ให้ความรู้สึกสนุกสนานและความเป็นอยู่ที่ดีผ่านสารเคมีที่สั่งได้ดั่งใจ"
 cyber_event_bliss_underground: "ม็อดสร้างความสุขใต้ดิน"
 cyber_event_bliss_underground_desc: "รากเทียมที่ไม่เสถียรซึ่งได้มาจากช่องทางที่น่าสงสัย มอบความสุขและสุขภาพที่ดีได้ด้วยการกดปุ่มเพียงปุ่มเดียว"
 cyber_event_bliss_regulate: "ม็อดสร้างความสุขภายใต้การควบคุม"
 cyber_event_bliss_regulate_desc: "รัฐบาลพึงพอใจกับการควบคุมม็อดความสุขและฟื้นฟูที่มีอยู่โดยไม่ต้องทำการผลิตเอง"
 cyber_event_worklife_name: "$cyber.615.name$"
 cyber_event_worklife_own: "ความทรงจำแรงงานแบบไม่จำกัด"
 cyber_event_worklife_own_desc: "ผู้คนไม่จำเป็นต้องแยกส่วนของความทรงจำของตนเมื่อทำงานหรือเมื่ออยู่ที่บ้าน"
 cyber_event_worklife_leave: "ความทรงจำแรงงานแบบจำกัด"
 cyber_event_worklife_leave_desc: "ผู้คนจำเป็นต้องแยกความทรงจำที่เกี่ยวข้องกับงานออกเมื่อออกจากสถานที่ทำงานเพื่อป้องกันจารกรรมทางอุตสาหกรรม"
 cyber_event_worklife_isolate: "ความทรงจำแรงงานแบบแยกส่วนโดยสิ้นเชิง"
 cyber_event_worklife_isolate_desc: "ผู้คนจำเป็นต้องแยกความทรงจำที่เกี่ยวข้องกับงานออกจากเวลาพักผ่อนและในทางกลับกันโดยสิ้นเชิง เพื่อป้องกันการจารกรรมทางอุตสาหกรรมและความขัดแย้งทางจริยธรรมกับนายจ้าง"
 mod_pop_cyborg_specialist_happiness: "ความสุขของไซบอร์ก $pop_cat_specialist$"
 cyber_event_parental_control: "การควบคุมการเคลื่อนไหวโดยผู้ปกครองเต็มรูปแบบ"
 cyber_event_parental_control_desc: "ผู้ปกครองได้รับอำนาจควบคุมการทำงานของระบบควบคุมการเคลื่อนไหวของบุตรหลานที่ยังไม่บรรลุนิติภาวะ"
 cyber_event_parental_limited: "การควบคุมการเคลื่อนไหวโดยผู้ปกครองแบบจำกัด"
 cyber_event_parental_limited_desc: "ผู้ปกครองได้รับอนุญาตให้ควบคุมบุตรหลานที่ยังไม่บรรลุนิติภาวะได้ในระดับจำกัด เช่น การควบคุมการวิ่งและระดับเสียงที่เปล่งออกมา"
 cyber_event_parental_enforcers: "การควบคุมการเคลื่อนไหวโดยเจ้าหน้าที่บังคับใช้กฎหมาย"
 cyber_event_parental_enforcers_desc: "แม้จะมีเสียงคัดค้านจากผู้ปกครอง แต่การควบคุมฟังก์ชันการเคลื่อนไหวจะถูกสงวนไว้สำหรับเจ้าหน้าที่บังคับใช้กฎหมายเท่านั้น"
 cyber_event_knowledge_engineering: "การถ่ายโอนความรู้ด้านวิศวกรรม"
 cyber_event_knowledge_engineering_desc: "ความเชี่ยวชาญด้านวิศวกรรมได้รับการถ่ายโอนเข้าสู่สมองของนักวิทยาศาสตร์ โดยต้องแลกกับสาขาการวิจัยอื่นๆ"
 cyber_event_knowledge_physics: "การถ่ายโอนความรู้ด้านฟิสิกส์"
 cyber_event_knowledge_physics_desc: "ความเชี่ยวชาญด้านฟิสิกส์ได้รับการถ่ายโอนเข้าสู่สมองของนักวิทยาศาสตร์ โดยต้องแลกกับสาขาการวิจัยอื่นๆ"
 cyber_event_knowledge_society: "การถ่ายโอนความรู้ด้านสังคมศาสตร์"
 cyber_event_knowledge_society_desc: "ความเชี่ยวชาญด้านสังคมศาสตร์ได้รับการถ่ายโอนเข้าสู่สมองของนักวิทยาศาสตร์ โดยต้องแลกกับสาขาการวิจัยอื่นๆ"
 cyber_implant_taxes: "ภาษีรากเทียม"
 cyber_implant_taxes_desc: "การจัดเก็บภาษีอย่างหนักต่อวัสดุและการผลิตรากเทียมไซเบอร์เนติกส์"
 cyber_implant_taxes_tt: "เครดิตพลังงานรายเดือน: §G+5%§!\nค่าใช้จ่ายในการเติบโตของ $pop_cat_cyborg$: §R+10%§!"
 cyber_reformed_implant_taxes: "ภาษีรากเทียมที่ปรับปรุงใหม่"
 cyber_reformed_implant_taxes_desc: "การปฏิรูปภาษีต่อวัสดุและการผลิตรากเทียมไซเบอร์เนติกส์นำไปสู่กำไรในระยะสั้น"
 cyber_reformed_implant_taxes_tt: "เครดิตพลังงานรายเดือน: §G+10%§!"
 cyber_market_standards: "มาตรฐานตลาดรากเทียม"
 cyber_market_standards_desc: "ผู้ผลิตรากเทียมไซเบอร์เนติกส์ที่คุณภาพต่ำที่สุดจะถูกดำเนินคดีเพื่อปรับปรุงมาตรฐาน"
 cyber_implant_weapons: "รากเทียมติดอาวุษ"
 cyber_implant_weapons_desc: "พลเมืองได้รับอนุญาตให้ติดตั้งรากเทียมอาวุธส่วนบุคคลได้"
 cyber_implants_dismantled: "การรื้อถอนรากเทียมอันตราย"
 cyber_implants_dismantled_desc: "รากเทียมทั้งหมดที่ทำขึ้นโดยมีเจตนาที่จะทำร้ายผู้อื่นจะถูกรวบรวมและนำมาประกอบใหม่เป็นผลิตภัณฑ์ที่สร้างสรรค์กว่า"
 cyber_implant_hacks: "การเจาะระบบรากเทียม"
 cyber_implant_hacks_desc: "แฮกเกอร์ที่มีซอร์สโค้ดควบคุมแกนรากเทียมสามารถเข้าถึง - และควบคุม - รากเทียมของผู้อื่นได้"
 cyber_counter_hacking: "การต่อต้านการเจาะระบบรากเทียม"
 cyber_counter_hacking_desc: "นักค้นหาข้อมูลสืบหาร่องรอยการเจาะระบบรากเทียมที่ผิดกฎหมายผ่านเครือข่ายการสื่อสารของเรา"
 cyber_protests: "การประท้วงการล่าช้าของรากเทียม"
 cyber_protests_desc: "ประชากรของเราซึ่งเคยชินกับการเปิดตัวอุปกรณ์เสริมแต่งใหม่อย่างต่อเนื่อง กำลังลุกขึ้นมาประท้วงเรื่องความล่าช้าของผลิตภัณฑ์เมื่อเร็วๆ นี้"
 cyber_stop_protests: "การสลายการชุมนุมประท้วง"
 cyber_stop_protests_desc: "การชุมนุมประท้วงความล่าช้าในตารางการติดตั้งรากเทียมของเรากำลังถูกสลาย"

# Policies
 policy_cyberization_standards: "มาตรฐานการแปลงเป็นไซเบอร์"
 policy_cyberization_standards_desc: "การติดตั้งรากเทียมทั่วทั้งประชากรเป็นสิ่งจำเป็นสำหรับสังคมของเรา แต่ผู้ที่ต่อต้านการแปลงเป็นไซเบอร์เต็มรูปแบบอาจเลือกใช้การเสริมแต่งแบบจำกัดแทนได้"
 cyberization_standards_full_name: "การแปลงเป็นไซเบอร์แบบเต็มรูปแบบ"
 cyberization_standards_full: "$cyberization_standards_full_name$"
 cyberization_standards_full_effect: "ผู้นำฝ่ายจิตนิยมจะได้รับลักษณะสืบสายพันธุ์: §Y$leader_trait_cyborg$§!\nประชากรฝ่ายจิตนิยมจะได้รับลักษณะสืบสายพันธุ์: §Y$trait_cybernetic$§!"
 cyberization_standards_full_desc: "ทุกคนคาดว่าจะต้องเข้ารับการติดตั้งรากเทียมไซเบอร์เนติกส์ครบชุด\n\n§E$cyberization_standards_full_effect$§!"
 cyberization_standards_limited_name: "การแปลงเป็นไซเบอร์แบบจำกัด"
 cyberization_standards_limited: "$cyberization_standards_limited_name$"
 cyberization_standards_limited_effect: "ผู้นำฝ่ายจิตนิยมจะได้รับลักษณะสืบสายพันธุ์: §Y$leader_trait_limited_cyborg$§!\nประชากรฝ่ายจิตนิยมจะได้รับลักษณะสืบสายพันธุ์: §Y$trait_limited_cybernetic$§!"
 cyberization_standards_limited_desc: "บุคคลที่ต่อต้านการเสริมแต่งเต็มรูปแบบสามารถติดตั้งรากเทียมไซเบอร์เนติกส์ชุดที่จำกัดได้\n\n§E$cyberization_standards_limited_effect$§!"

# CYBERIZATION STAGE 1
 cyber.100.name: "ควบคุม อนาคต" # Stage 1 - Start event
 cyber.100.desc.shared: "ความก้าวหน้าครั้งสำคัญของรากเทียมไซเบอร์เนติกส์ขั้นสูงในเมื่อไม่นานมานี้จะทำให้สามารถเปลี่ยนรูปโฉมของสังคมได้ในวันหนึ่ง ด้วยการขจัดจุดอ่อนทางชีวภาพออกไป เราสามารถทำให้ตัวเราฉลาดขึ้น เร็วขึ้น และแข็งแกร่งขึ้นได้"
 cyber.100.desc.shared_unplugged: "ความก้าวหน้าครั้งสำคัญของรากเทียมไซเบอร์เนติกส์ขั้นสูงในเมื่อไม่นานมานี้จะทำให้สามารถเปลี่ยนรูปโฉมของสังคมได้ในวันหนึ่ง โดยในครั้งนี้จะเป็นไปตามข้อตกลงของเราเอง ด้วยการขจัดจุดอ่อนทางชีวภาพและจุดบกพร่องในการเสริมแต่งที่มีอยู่ของเราออกไป เราสามารถทำให้ตัวเราฉลาดขึ้น เร็วขึ้น และแข็งแกร่งขึ้นได้"
 cyber.100.desc: "$cyber.100.desc.shared$\n\nบรรดาบรรษัทต่างๆ ได้เสนอข้อเสนอทางธุรกิจและประมาณการยอดขาย ในขณะที่เจ้าหน้าที่ของรัฐแย้งว่าการเข้าถึงเทคโนโลยีที่มีศักยภาพนี้จะต้องได้รับการรับประกันโดยรัฐ"
 cyber.100.desc.unplugged: "$cyber.100.desc.shared_unplugged$\n\nบรรดาบรรษัทต่างๆ ได้เสนอข้อเสนอทางธุรกิจและประมาณการยอดขาย ในขณะที่เจ้าหน้าที่ของรัฐแย้งว่าการเข้าถึงเทคโนโลยีที่มีศักยภาพนี้จะต้องได้รับการรับประกันโดยรัฐ"
 cyber.100.desc.megacorp: "$cyber.100.desc.shared$\n\nผู้รับเหมาช่วงได้เสนอข้อเสนอทางธุรกิจและประมาณการยอดขายสำหรับการผลิตรากเทียมของบุคคลที่สาม ในขณะที่คณะกรรมการบริหารของเราแย้งว่าการเข้าถึงเทคโนโลยีที่สำคัญนี้จะต้องอยู่ภายใต้การผูกขาดของเราต่อไป"
 cyber.100.desc.megacorp_unplugged: "$cyber.100.desc.shared_unplugged$\n\nผู้รับเหมาช่วงได้เสนอข้อเสนอทางธุรกิจและประมาณการยอดขายสำหรับการผลิตรากเทียมของบุคคลที่สาม ในขณะที่คณะกรรมการบริหารของเราแย้งว่าการเข้าถึงเทคโนโลยีที่สำคัญนี้จะต้องอยู่ภายใต้การผูกขาดของเราต่อไป"
 cyber.100.a: "เราจะโอนอุตสาหกรรมเสริมแต่งมาเป็นของรัฐ"
 cyber.100.a.megacorp: "รักษาการพัฒนาภายในองค์กรไว้"
 cyber.100.a.tt: "$situation_cyberization_triggered_modifier$$cyber_control_government_effects$"
 cyber.100.b: "เราจะแปรรูปการจัดจำหน่ายให้เป็นของเอกชน"
 cyber.100.b.megacorp: "ส่งมอบสิ่งนี้ให้กับบริษัทในเครือของเรา"
 cyber.100.b.tt: "$situation_cyberization_triggered_modifier$$cyber_control_corporate_effects$"

 cyber.105.name: "โดยประชาชน เพื่อประชาชน"
 cyber.105.desc: "กลุ่มนักดัดแปลงตัวเองโกรธแค้นที่แผนการออกแบบไซเบอร์เนติกส์จำนวนมากของเราจะเข้าไม่ถึงสำหรับคนทั่วไป\n\nพวกเขาแย้งว่าหากแผนผังการออกแบบถูกเปิดเผยต่อสาธารณะและกฎระเบียบด้านสิ่งแวดล้อมได้รับการผ่อนปรน เกือบทุกคนจะสามารถผลิตและซ่อมแซมการเสริมแต่งของตนเองได้"
 cyber.105.desc.megacorp: "ผู้รับเหมาอิสระบ่นว่าแผนการออกแบบไซเบอร์เนติกส์จำนวนมากของเราไม่สามารถเข้าถึงได้โดยพวกเขา\n\nพวกเขาแย้งว่าหากแผนผังการออกแบบพร้อมใช้งานและสิทธิบัตรที่เกี่ยวข้องกับการผลิตได้รับการผ่อนปรน การผลิตรากเทียมก็สามารถปรับปรุงได้ดีขึ้น"
 cyber.105.a: "กฎระเบียบมีไว้เพื่อเหตุผลบางอย่าง"
 cyber.105.a.megacorp: "มันเป็นทรัพย์สินทางปัญญาของเรา"
 cyber.105.a.tt: "ตัวแก้ไขสถานการณ์ §Y$situation_cyberization$§! ไม่เปลี่ยนแปลง"
 cyber.105.b: "ลดการควบคุมอุตสาหกรรม"
 cyber.105.b.crafters: "ปล่อยให้ผู้คนสร้างสรรค์สิ่งที่พวกเขาชอบ"
 cyber.105.b.megacorp: "จัดหาแผนผังแบบโอเพนซอร์ส"
 cyber.105.b.gov.tt: "อัปเดตตัวแก้ไขสถานการณ์ §Y$situation_cyberization$§!:\n§Gเพิ่มแล้ว:§! $cyber_control_independent_effects$\n§Rนำออกแล้ว:§! $cyber_control_government_effects$"
 cyber.105.b.cor.tt: "อัปเดตตัวแก้ไขสถานการณ์ §Y$situation_cyberization$§!:\n§Gเพิ่มแล้ว:§! $cyber_control_independent_effects$\n§Rนำออกแล้ว:§! $cyber_control_corporate_effects$"

# Stage 1 Opportunities - Research
 cyber.120.name: "การปลดภาระทางจิตใจ"
 cyber.120.desc: "ทีมนักวิจัยได้เสนอแนวคิดสร้างสรรค์ในการผสานรวมผู้ดูแล AI เข้ากับอุปกรณ์เคลื่อนที่ของเรา ซึ่งภายหลังสามารถนำมารวมเข้ากับไซเบอร์แวร์ได้โดยตรง\n\nผู้ควบคุมดูแลเหล่านั้นจะช่วยเปลี่ยนจุดสนใจของพลเมืองของเราจากการทำงานที่เปล่าประโยชน์ไปสู่งานที่ต้องใช้สติปัญญามากขึ้น แม้ว่าจะสูญเสียความเป็นอิสระส่วนตัวไปบ้าง แต่ศักยภาพที่ไม่เคยมีมาก่อนในการเพิ่มผลิตภาพของเราก็ไม่สามารถมองข้ามได้"
 cyber.120.a: "ผลิตภาพต้องมาก่อนสิ่งอื่นใด"
 cyber.120.a.spiritual: "เราต้องยอมรับสิ่งนี้เสมือนเป็นพรอันประเสริฐ"
 cyber.120.b: "การสูญเสียความเป็นอิสระนั้นยิ่งใหญ่เกินไป"
 cyber.120.b.spiritual: "เราจะไม่หลงทิศหลงทางไปไกลจากเส้นทางอันศักดิ์สิทธิ์"
 cyber.120.c: "ยอมรับได้ หากมีสวิตช์เปิด/ปิดมาให้ด้วย"
 cyber.120.d: "ปริมาณการควบคุมที่สิ่งนี้จะมอบให้กับเรา..."

# Stage 1 Challenges - Research
 cyber.160.name: "การแตกแยกทางไซเบอร์เนติกส์"
 cyber.160.desc: "ละครเรื่องใหม่ที่ได้รับเสียงชื่นชมอย่างกว้างขวางได้ครองใจสาธารณชน\n\nมีฉากหลังเป็นโลกที่รากเทียมไซเบอร์เนติกส์แพร่หลาย เรื่องราวดำเนินไปตามชีวิตของคนงานที่ได้รับการเสริมแต่งซึ่งต้องเผชิญกับภาวะความแตกแยกทางจิตที่เจ็บปวดจากร่างกายที่ได้รับการดัดแปลงของตน ตอนจบอันน่าเศร้าของเรื่องนี้นำเสนอการวิพากษ์วิจารณ์เกี่ยวกับการแปลงเป็นไซเบอร์เต็มรูปแบบและการลบเลือนตัวตนของ [Owner.Species.GetAdj] ไปอย่างหลีกเลี่ยงไม่ได้\n\nผลงานยอดฮิตนี้ได้จุดชนวนให้เกิดการต่อต้านอย่างรุนแรงต่อโครงการริเริ่มของเรา ส่งผลให้กลุ่มผู้รับการทดลองที่ว่างลดลง 60% นับตั้งแต่ละครเรื่องนี้ออกฉาย"
 cyber.160.a: "เปิดตัวแคมเปญประชาสัมพันธ์"
 cyber.160.b: "เข้มงวดกฎระเบียบรากเทียม"
 cyber.160.c: "ในไม่ช้าเรื่องนี้ก็จะเงียบไปเอง"
 cyber.160.d: "เซ็นเซอร์ละครเรื่องนี้"
 cyber.160.e: "บล็อกการรายงานข่าวทั้งหมด"

# CYBERIZATION STAGE 2
 cyber.200.name: "ศูนย์เสริมแต่งร่างกาย"
 cyber.200.desc.gov: "หลังจากเกิดการแก่งแย่งชิงดีทางการเมืองในช่วงเวลาหนึ่ง ความรับผิดชอบในการผลิตสิ่งเสริมแต่งไซเบอร์เนติกส์ได้ถูกแบ่งสรรปันส่วนระหว่างแผนกงานต่างๆ ของรัฐบาล เมื่อทุกคนต่างได้ประโยชน์ส่วนแบ่ง พวกเขาจะคอยตรวจสอบซึ่งกันและกันอย่างแน่นอน\n\nแต่แผนการต่างๆ จะต้องนำไปปฏิบัติจริง ชุมชนวิจัยต้องการ $building_augmentation_center$ อย่างน้อยหนึ่งแห่งเพื่อทำหน้าที่เป็นศูนย์กลางสำหรับการพัฒนาไซเบอร์เนติกส์"
 cyber.200.desc.cor: "สิ่งที่เคยเป็นเพียงความฝัน บัดนี้อยู่แค่เอื้อมแล้ว และใครเล่าจะได้รับผลประโยชน์จากมันได้ดีไปกว่าเหล่าบรรษัทมากมายภายในพรมแดนของเรา? ประโยชน์จากพลังของอุตสาหกรรมไซเบอร์เนติกส์ที่กำลังเติบโตอย่างรวดเร็วคือ ผลิตภัณฑ์อุปโภคบริโภคใหม่ๆ สามารถเปิดตัวได้ในอัตราที่รวดเร็วขึ้น\n\nแต่แผนการต่างๆ จะต้องนำไปปฏิบัติจริง นักวิ่งเต้นของบรรษัทร้องขอ $building_upload_center$ อย่างน้อยหนึ่งแห่งเพื่อทำหน้าที่เป็นศูนย์กลางสำหรับการพัฒนาไซเบอร์เนติกส์"
 cyber.200.desc.ind: "เครือข่ายการสื่อสารของเราเต็มไปด้วยแนวคิดการออกแบบที่แปลกใหม่ ตั้งแต่การเสริมแต่งการส่งสัญญาณประสาทไปจนถึงต่อมรับรสไซเบอร์เนติกส์ ส่วนใหญ่แล้วสิ่งเหล่านี้จะไม่สามารถนำไปใช้งานจริงได้และมีค่าใช้จ่ายสูงมากในการดำเนินการ แต่โชคดีที่การออกแบบบางอย่างดูมีอนาคตที่ดี\n\nแต่แผนการต่างๆ จะต้องนำไปปฏิบัติจริง ชุมชนออนไลน์ต้องการ $building_augmentation_center$ อย่างน้อยหนึ่งแห่งเพื่อทำหน้าที่เป็นศูนย์กลางสำหรับการพัฒนาไซเบอร์เนติกส์"
 cyber.200.a.gov: "อนุมัติใบอนุญาตการก่อสร้าง"
 cyber.200.a.cor: "อนุมัติ"
 cyber.200.a.ind: "ยินยอม"
 cyber.200.a.tt: "§Rจำเป็นต้องดำเนินการ:§!\nสร้าง $building_augmentation_center$ เพื่อเปิดสถานการณ์ §Y$situation_cyberization$§! ต่ออีกครั้ง\n\nแต่ละ $building_augmentation_center$ มอบงาน $job_augmentor_with_icon$ จำนวน §G+200§! ตำแหน่ง\n\n$job_augmentor_research_effect_desc$"

 cyber.205.name: "โครงการนักบิน" # Stage 2 - Start event
 cyber.205.desc.shared: "ถึงเวลาแล้วสำหรับโครงการนำร่องที่แพร่หลายยิ่งขึ้น สิ่งเหล่านี้ต้องการการสนับสนุนอย่างต่อเนื่องและจะใช้งานได้บนดาวเคราะห์ที่มี $building_augmentation_center$ เท่านั้น แต่การเรียนรู้ของเราจะให้ประโยชน์ต่อผลิตภาพในทันที"
 cyber.205.desc.gov: "การทดสอบขนาดเล็กที่ดำเนินการโดยโครงการวิจัยที่ได้รับทุนสนับสนุนจากรัฐบาลได้ยืนยันว่าการเสริมแต่งทางกลช่วยปรับปรุงผลิตภาพ\n\n$cyber.205.desc.shared$"
 cyber.205.desc.cor: "การทดสอบกลุ่มตัวอย่างขนาดเล็กในกลุ่มอาสาสมัครยืนยันว่าการเสริมร่างกายด้วยจักรกลช่วยเพิ่มผลิตภาพ\n\n$cyber.205.desc.shared$"
 cyber.205.desc.ind: "รายงานจากผู้ปรับแต่งตัวเองยืนยันว่าการเสริมร่างกายด้วยจักรกลช่วยเพิ่มผลิตภาพ\n\n$cyber.205.desc.shared$"
 cyber.205.a: "เสริมศักยภาพกลุ่มชนชั้นนำ"
 cyber.205.a.tt: "ผลผลิตทรัพยากรของ $pop_cat_ruler$: §G+10%§! เมื่อมี $building_augmentation_center$"
 cyber.205.b: "เสริมพลังกลุ่มผู้เชี่ยวชาญ"
 cyber.205.b.tt: "ผลผลิตทรัพยากรของ $pop_cat_specialist$: §G+10%§! เมื่อมี $building_augmentation_center$"
 cyber.205.c: "เพิ่มพลังให้กลุ่มแรงงาน"
 cyber.205.c.tt: "ผลผลิตทรัพยากรของ $pop_cat_worker$: §G+10%§! เมื่อมี $building_augmentation_center$"
 cyber.205.d: "การเสริมร่างกายสำหรับทุกคน"
 cyber.205.d.tt: "ทรัพยากรจาก £job£ §Hงาน§!: §G+5%§! เมื่อมี $building_augmentation_center$"

 cyber.210.name: "การพัฒนาคู่ขนาน"
 cyber.210.desc.gov.rival: "ผู้สื่อข่าวได้ค้นพบหลักฐานการทดลองที่ได้รับทุนสนับสนุนจากรัฐบาลซึ่งเกี่ยวข้องกับไมโครชิปตรวจจับความคิด หากพัฒนาเสร็จสมบูรณ์ อุปกรณ์เหล่านี้จะสามารถติดตั้งในจิตใจของพลเมืองเพื่อรวบรวมข้อมูลเชิงลึกด้านความมั่นคงและบุคลิกภาพอย่างละเอียด"
 cyber.210.desc.cor.rival: "หลักฐานในชั้นศาลเกี่ยวกับข้อพิพาทด้านเครื่องหมายการค้าแสดงให้เห็นว่าบรรษัทต่าง ๆ กำลังทดลองการฝังอุปกรณ์เทคโนโลยีโลกเสมือนจริง(เปิดเผยความจริง)ซึ่งได้รับการออกแบบมาเพื่อให้เชื่อมต่อกับประสาทตาของผู้บริโภคได้อย่างไร้รอยต่อ พิมพ์เขียวระบุถึงทั้งประโยชน์ที่จะเกิดแก่ผู้ใช้และความสามารถของบริษัทในการจารกรรมข้อมูลการมองเห็น"
 cyber.210.desc.ind.rival: "กลุ่มผู้ปรับแต่งตัวเองอิสระเริ่มเปลี่ยนแขนขาเป็นชิ้นส่วนจักรกลแบบดั้งเดิมแล้ว ไม่มีวิธีใดที่จะรับประกันความปลอดภัยของใครก็ตามที่พยายามทำสิ่งนี้ด้วยตัวเอง และมีความกังวลว่าการฝังอุปกรณ์ที่ไม่มีการควบคุมดูแลอาจส่งผลเสียมากกว่าผลดี"
 cyber.210.a: "เราสามารถนำสิ่งนี้มาใช้ประโยชน์ได้"
 cyber.210.a.tt: "ความเร็วความคืบหน้าของสถานการณ์ §Y$situation_cyberization$§! เป็นเวลา §Y1§! ปี: §G+25%§!\n\n"
 cyber.210.b: "เรื่องนี้ต้องหยุดเดี๋ยวนี้"
 cyber.210.b.tt: "ความเร็วความคืบหน้าของสถานการณ์ §Y$situation_cyberization$§! เป็นเวลา §Y1§! ปี: §R-25%§!"

# Stage 2 Opportunities - Test Results and Rival Sector
 cyber.220.name: "การประสานงานหลากรยางค์"
 cyber.220.desc: "เกิดความก้าวหน้าครั้งสำคัญในสาขาอินเทอร์เฟซประสาท อุปกรณ์ขยายสัญญาณสมองสามารถช่วยให้ผู้ใช้ควบคุมแขนขาเทียมจำนวนมากได้อย่างราบรื่นแต่ยังมีขีดจำกัด ในภายหลัง สิ่งนี้อาจถูกรวมเข้ากับไซเบอร์เบรนโดยตรงโดยไม่จำเป็นต้องใช้อุปกรณ์ภายนอก\n\nในระหว่างการทดสอบระยะแรก กลุ่มตัวอย่างแสดงผลลัพธ์ที่น่าพึงพอใจในด้านความคล่องแคล่วและการหยิบจับวัตถุ พร้อมกับมีความสามารถในการต่อสู้ที่สูงขึ้น อย่างไรก็ตาม ความกังวลเกี่ยวกับต้นทุนการผลิตส่งผลให้ต้องตัดสินใจว่าใครควรเข้าถึงเทคโนโลยีบุกเบิกนี้เป็นกลุ่มแรก"
 cyber.220.a: "นักวิทยาศาสตร์ของเราต้องการ [owner.species.GetHandNamePlural] เพิ่มเติม"
 cyber.220.b: "เน้นการเสริมสร้างความเข้มแข็งของกองทัพ"
 cyber.220.c: "อันดับแรก ยื่นมือช่วยเหลือผู้ที่มีข้อจำกัดทางร่างกาย"
 cyber.220.d: "ไม่มีของแจกฟรี! ขายให้ผู้ที่เสนอราคาเสนอสูงสุด"
 cyber.220.e: "ติดอาวุธให้แก่ชนชั้นแรงงาน!"
 cyber.220.f: "ชนชั้นนำควรมีแต้มต่อเสมอ"

# Stage 2 Challenges - Test Results and Rival Sector
 cyber.260.name: "พยายามจนตัวโก่ง"
 cyber.260.desc: "การทดลองใช้งานโมดูลกระดูกสันหลังรุ่นใหม่ลงเอยด้วยความล้มเหลวครั้งใหญ่ พลังงานส่วนเกินที่สร้างโดยมอเตอร์ของอุปกรณ์ฝังส่งผลให้เกิดการบาดเจ็บถาวรที่ไขสันหลังของกลุ่มตัวอย่างทดสอบหลายคน\n\nภาพที่น่าขยะแขยงซึ่งแสดงผลลัพธ์อันน่าสยดสยองได้หลุดรอดไปสู่สาธารณะ ส่งผลให้ขาดแคลนอาสาสมัครสำหรับการทดลองในอนาคตอย่างรุนแรง"
 cyber.260.a: "ระงับการทดสอบทั้งหมดจนกว่าจะพบวิธีแก้ไข"
 cyber.260.a.tt: "ความเร็วความคืบหน้าของสถานการณ์ §Y$situation_cyberization$§! เป็นเวลา §Y6§! เดือน: §R-50%§!"
 cyber.260.b: "ชดเชยให้แก่ครอบครัวของผู้เสียหาย"
 cyber.260.c: "ค้นหาอาสาสมัคร บังคับด้วยกำลังหากจำเป็น"

# CYBERIZATION STAGE 3
 cyber.300.name: "หมด" # Stage 3 - Start event
 cyber.300.desc: "ทั่วดินแดนของเรา ในศูนย์กลางเมืองใหญ่ทุกแห่ง เราได้สะสมอุปกรณ์ฝังจักรกลไว้สำหรับประชากร [Owner.Species.GetName] ของเรา อุปกรณ์เหล่านี้ซึ่งออกแบบโดย $job_augmentor_plural$ สัญญาว่าจะยกระดับโครงสร้างทางชีวภาพของเราอย่างมาก\n\nในที่สุดก็ถึงวันที่เราจะละทิ้งอดีตและโอบรับอนาคตแห่งไซเบอร์เนติกส์ "
 cyber.300.a: "ไซเบอร์ไนซ์"
 cyber.300.a.tt: "ผู้นำจะได้รับคุณลักษณะ: §Y$leader_trait_cyborg$§!\nประชากรจะได้รับคุณลักษณะ: §Y$trait_cybernetic$§!\n\n$job_augmentor_growth_effect_desc$\n\nความเร็วในการเสริมร่างกายขึ้นอยู่กับแนวทางของสถานการณ์และจำนวนของสิ่งปลูกสร้าง $building_augmentation_center$"

 cyber.305.name: "วัตถุไซเบอร์" # Spiritualists are Cybernetic Objectors
 cyber.305.desc.shared: "ในทางปฏิบัติ พวกเขาไม่มีแม้กระทั่งอุปกรณ์ฝังขั้นพื้นฐานที่สุด ส่งผลให้การใช้ชีวิตในสังคมที่เชื่อมต่อกันมากขึ้นเป็นไปได้ยาก\n\nการบังคับให้ประชากรติดตั้งอุปกรณ์ฝังเต็มรูปแบบจะช่วยให้พวกเขาเข้ากับสังคมได้ดีขึ้น แต่ก็ต้องนำไปสู่ความขุ่นเคืองใจอย่างหลีกเลี่ยงไม่ได้"
 cyber.305.desc: "กลุ่มศาสนาที่ต่อต้านการรวมกันของ [Owner.Species.GetFleshTypeCyberCreed] และเครื่องจักร ได้เลือกที่จะไม่เข้าร่วมในความพยายามไซเบอร์ไนซ์ประชากรของเรา $cyber.305.desc.shared$"
 cyber.305.desc.spiritualist: "กลุ่มผู้มีจิตศรัทธาซึ่งไม่เต็มใจที่จะรวม [Owner.Species.GetFleshTypeCyberCreed] และเครื่องจักรเข้าด้วยกัน ได้เลือกที่จะไม่เข้าร่วมในความพยายามไซเบอร์ไนซ์ประชากรของเรา $cyber.305.desc.shared$"
 cyber.305.desc.none: "ศีลธรรมของการรวม [Owner.Species.GetFleshTypeCyberCreed] และเครื่องจักรเข้าด้วยกันเป็นหัวข้อที่มีการถกเถียงกันมานาน น่าเสียดายที่ด้วยประสิทธิภาพที่เพิ่มขึ้นจากการไซเบอร์ไนซ์ ผู้ที่เลือกที่จะไม่เข้าร่วมอาจเสียเปรียบ\n\nการบังคับให้ประชากรติดตั้งอุปกรณ์ฝังจะช่วยรับประกันว่าจะไม่มีใครถูกทิ้งไว้ข้างหลัง แต่ก็ต้องนำไปสู่ความขุ่นเคืองใจอย่างหลีกเลี่ยงไม่ได้อย่างแน่นอน"
 cyber.305.desc.unplugged: "ศีลธรรมของการรวม [Owner.Species.GetFleshTypeCyberCreed] และเครื่องจักรเข้าด้วยกันอีกครั้งเป็นหัวข้อที่มีการถกเถียงกันมานาน อย่างไรก็ตาม อุปกรณ์เสริมที่ออกแบบด้วยตัวเองไม่ได้ขึ้นอยู่กับความต้องการของเครื่องจักรที่เคยกลืนกินเราอีกต่อไป และด้วยเหตุนี้จึงมีประสิทธิภาพอย่างสูง ผู้ที่เลือกที่จะไม่เข้าร่วมอาจเสียเปรียบ\n\nการบังคับให้ประชากรติดตั้งอุปกรณ์ฝังจะช่วยรับประกันว่าจะไม่มีใครถูกทิ้งไว้ข้างหลัง แต่ก็ต้องนำไปสู่ความขุ่นเคืองใจอย่างหลีกเลี่ยงไม่ได้อย่างแน่นอน"
 cyber.305.a: "พวกเขาต้องปรับตัว"
 cyber.305.a.materialist: "ความเชื่อไม่สำคัญ เราจะก้าวเดินต่อไป"
 cyber.305.a.spiritualist: "ความเชื่อจะต้องปรับตัว"
 cyber.305.a.tt: "$cyberization_standards_full_effect$\n\nเข้าถึงนโยบาย: §Y$policy_cyberization_standards$§!\n"
 cyber.305.b: "เราจะพบกันครึ่งทาง"
 cyber.305.b.spiritualist: "หาความเข้าใจร่วมกัน"
 cyber.305.b.tt: "$cyberization_standards_limited_effect$\n\nเข้าถึงนโยบาย: §Y$policy_cyberization_standards$§!\n"

# Stage 3 Opportunities - Treatment of Non-Cyborgs
 cyber.320.name: "ศักยภาพวัยเยาว์"
 cyber.320.birth.desc: "ด้วยความสามารถใหม่ในการใส่อุปกรณ์ฝังให้กับเด็กแรกเกิด จู่ ๆ เราก็มาถึงทางตัน การเสริมร่างกายทารกแรกเกิดที่เป็นการบุกเบิกเหล่านี้มีพลังที่จะเปลี่ยนสายสัมพันธ์ของเรากับเทคโนโลยีไปตลอดกาล ปลดล็อกศักยภาพของไซเบอร์เนติกส์ที่มีมาแต่กำเนิดตั้งแต่วัยเยาว์ และขับเคลื่อนอารยธรรมของเราไปสู่ระดับที่ไม่เคยมีมาก่อน$cyber.320.end.desc$"
 cyber.320.metamorphosis.desc: "เมื่อเร็ว ๆ นี้ เราได้ค้นพบความก้าวหน้าอันน่าทึ่งที่ช่วยให้เราสามารถฝังไมโครชิปให้กับตัวอ่อนของเราได้โดยตรง ในระหว่างการลอกคราบ ตัวอ่อนของเรามีความสามารถตามธรรมชาติในการดูดซับระบบกลไก การเสริมร่างกายในช่วงดักแด้สามารถปลดปล่อยศักยภาพไซเบอร์เนติกส์ที่ยังไม่ถูกนำมาใช้ และขับเคลื่อนอารยธรรมของเราไปสู่ระดับที่น่าทึ่งใหม่ ๆ$cyber.320.end.desc$"
 cyber.320.lithoid.desc: "ท่ามกลางความสามารถใหม่ในการใส่อุปกรณ์ฝังให้กับทายาทที่เพิ่งตกผลึก จู่ ๆ เราก็มาถึงทางตัน การเสริมร่างกายดังกล่าวจะช่วยให้ทายาทของเราสร้างความผูกพันตามธรรมชาติกับแร่โลหะ ปลดล็อกศักยภาพไซเบอร์เนติกส์ตั้งแต่วัยเยาว์ และขับเคลื่อนอารยธรรมของเราไปสู่ระดับที่น่าทึ่งใหม่ ๆ$cyber.320.end.desc$"
 cyber.320.root.desc: "ท่ามกลางความสามารถใหม่ในการใส่ชิ้นส่วนไซเบอร์เนติกส์ให้กับหน่ออ่อน จู่ ๆ เราก็มาถึงทางตัน การเสริมร่างกายเหล่านี้จะช่วยให้หน่ออ่อนส่งกระแสประสาทไฟฟ้าผ่านเครือข่ายเส้นใยราที่ได้รับการยกระดับ ปลดล็อกศักยภาพไซเบอร์เนติกส์ตั้งแต่วัยเยาว์$cyber.320.end.desc$"
 cyber.320.egg.desc: "ท่ามกลางความสามารถใหม่ในการใส่อุปกรณ์ฝังให้กับตัวอ่อนที่เพิ่งฟักออกมาจากไข่ จู่ ๆ เราก็มาถึงทางตัน การเสริมร่างกายที่เป็นการบุกเบิกเหล่านี้มีพลังที่จะเปลี่ยนสายสัมพันธ์ของพวกเขากับเทคโนโลยีไปตลอดกาล ปลดล็อกศักยภาพของไซเบอร์เนติกส์ที่มีมาแต่กำเนิดตั้งแต่วัยเยาว์ และขับเคลื่อนอารยธรรมของเราไปสู่ระดับที่ไม่เคยมีมาก่อน$cyber.320.end.desc$"
 cyber.320.other.desc: "ด้วยความสามารถในการใส่ชิ้นส่วนไซเบอร์เนติกส์ให้กับทารก เราก็มาถึงทางตันเช่นกัน: การเสริมร่างกายที่เป็นการบุกเบิกเหล่านี้มีพลังที่จะเปลี่ยนสายสัมพันธ์ของเรากับเทคโนโลยีไปตลอดกาล ปลดล็อกศักยภาพของไซเบอร์เนติกส์ที่มีมาแต่กำเนิดตั้งแต่วัยเยาว์ และขับเคลื่อนอารยธรรมของเราไปสู่ระดับที่ไม่เคยมีมาก่อน$cyber.320.end.desc$"
 cyber.320.end.desc: "\n\nอย่างไรก็ตาม การสร้างการพึ่งพาการเสริมร่างกายด้วยไซเบอร์เนติกส์ตั้งแต่วัยเยาว์เช่นนี้ ในที่สุดอาจส่งผลให้สปีชีส์ของเราสูญเสียความสามารถในการอยู่รอดในสภาพธรรมชาติเดิมของตน"
 cyber.320.a: "เป็นเรื่องธรรมชาติที่เราจะวิวัฒนาการ"
 cyber.320.b: "เราต้องรักษาวัยเด็กตามธรรมชาติไว้"

# Stage 3 Challenges - Treatment of Non-Cyborgs
 cyber.360.name: "ความเจ็บปวดจากการดัดแปลง"
 cyber.360.desc: "เมื่อเร็ว ๆ นี้ มีผู้คนจำนวนหนึ่งเริ่มออกมาแสดงความเสียใจต่อสาธารณะเกี่ยวกับการตัดสินใจปรับแต่งร่างกายเพื่อการทดลอง การเปลี่ยนก้านสมองเป็นชิ้นส่วนจักรกลทดแทนส่งผลให้เกิดความกลัวการดำรงอยู่(กลัวเป็นพิเศษ)อย่างต่อเนื่อง โดยบางคนเปรียบเทียบประสบการณ์ของพวกเขากับวงจรแห่งความเจ็บปวดอันเหลือทนที่ไม่มีวันสิ้นสุด\n\nท่ามกลางข้อเรียกร้องการชดเชยที่ดำเนินอยู่ เราจึงถูกบีบให้ต้องชี้แจงจุดยืนของเราเกี่ยวกับความรับผิดชอบของรัฐ"
 cyber.360.a: "สั่งห้ามการปรับแต่งขั้นรุนแรง"
 cyber.360.a.tt: "ความเร็วความคืบหน้าของสถานการณ์ §Y$situation_cyberization$§! เป็นเวลา §Y6§! เดือน: §R-50%§!"
 cyber.360.b: "การเสียสละจะทำให้ความทุกข์ทรมานของพวกเขาสิ้นสุดลง"
 cyber.360.c: "จ่ายยาแก้ปวดที่แรงขึ้น"
 cyber.360.d: "ค้นหากลุ่มตัวอย่างทดสอบจากชนชั้นต่ำสุด"
 cyber.360.e: "เราจะไม่รับผิดชอบใด ๆ ทั้งสิ้น"

# CYBERIZATION STAGE 4
 cyber.405.name: "ภาษี พืช" # Government rival
 cyber.405.desc: "เมื่อได้เห็นกำไรในอุตสาหกรรมการเสริมร่างกายที่ไม่มีการควบคุมอย่างเข้มงวด เจ้าหน้าที่ท้องถิ่นจึงพยายามดิ้นรนเพื่อให้ทันกับความก้าวหน้าล่าสุด ภาษีแบบครอบคลุมถูกเรียกเก็บในทุกขั้นตอนของการผลิตอุปกรณ์ฝังไซเบอร์เนติกส์ ตั้งแต่การสกัดทรัพยากรไปจนถึงการติดตั้งขั้นสุดท้าย\n\nระบบราชการและค่าใช้จ่ายที่เพิ่มขึ้นได้ส่งผลให้กระบวนการเสริมร่างกายล่าช้าลง ซึ่งขัดขวางความคืบหน้าสู่การไซเบอร์ไนซ์เต็มรูปแบบ"
 cyber.405.a: "ยอมรับภาษี"
 cyber.405.b: "ยกเลิกภาษี"
 cyber.405.b.tt: "ความเร็วความคืบหน้าของสถานการณ์ §Y$situation_cyberization$§!: §G+25%§!\n\n"
 cyber.405.c: "ปฏิรูปการจัดเก็บภาษีอุปกรณ์เสริมร่างกาย"
 cyber.405.c.tt: "ความเร็วความคืบหน้าของสถานการณ์ §Y$situation_cyberization$§! เป็นเวลา §Y1§! ปี: §R-10%§!"

 cyber.410.name: "สงคราม" # Government rival escalation
 cyber.410.desc: "ไม่สามารถตามติดการรับถ่ายของสาธารณะได้ ผู้ทํากฎหมายของเรา กําลังทําทุกอย่าง\n\nถอดรหัส \"ความหลงใหลในพืช\" ของเรา โดยแต่ละการต่อเติม \"นําเราต่อไปจากสิ่งที่มันหมายถึงการเป็น[Owner.Species.GetName],\"เนื่องจากไม่สามารถต้านทานการรับเอาอุปกรณ์ฝังไซเบอร์เนติกส์ไปใช้ของสาธารณชนได้ ผู้บัญญัติกฎหมายของเราจึงทำทุกวิถีทางเพื่อจำกัดบางแง่มุมของการเสริมร่างกาย\n\nโดยประณาม..."
 cyber.410.a: "ยับยั้งกฎหมายที่เสนอ"
 cyber.410.a.tt: "ความเร็วความคืบหน้าของสถานการณ์ §Y$situation_cyberization$§! เป็นเวลา §Y1§! ปี: §G+25%§!"
 cyber.410.b: "ประนีประนอมกัน"
 cyber.410.b.tt: "ความเร็วความคืบหน้าของสถานการณ์ §Y$situation_cyberization$§! เป็นเวลา §Y1§! ปี: §R-25%§!"

 cyber.415.name: "ไม่มีสงคราม" # Corporate rival
 cyber.415.desc: "ในความรีบเร่งเพื่อแสวงหากำไร ตลาดอุปกรณ์เสริมร่างกายถูกครอบงำด้วยอุปกรณ์ฝังราคาถูกและคุณภาพต่ำ โดยบริษัทต่าง ๆ ไม่เสนอการสนับสนุนลูกค้าเมื่ออุปกรณ์เหล่านี้พังเสียหายอย่างหลีกเลี่ยงไม่ได้\n\nในคดีหนึ่งเมื่อเร็ว ๆ นี้ที่เป็นข่าวดัง อุปกรณ์ปรับคลื่นหัวใจของนักแสดงยอดนิยมคนหนึ่งทำงานผิดปกติขณะอยู่บนเวที โชคร้ายที่ผลลัพธ์คือเกิดการระเบิดขึ้น"
 cyber.415.a: "เดี๋ยวกลไกตลาดจะจัดการตัวมันเอง"
 cyber.415.a_industrial: "ไม่มีอะไรผิดปกติ"
 cyber.415.a.tt: "ความเร็วความคืบหน้าของสถานการณ์ §Y$situation_cyberization$§!: §G+25%§!"
 cyber.415.b: "เราต้องรับประกันความปลอดภัยของผู้ใช้"
 cyber.415.c: "ลงโทษผู้กระทำความผิดที่ร้ายแรงที่สุด"
 cyber.415.c.tt: "ความเร็วความคืบหน้าของสถานการณ์ §Y$situation_cyberization$§!: §R-25%§!"

 cyber.420.name: "อันตราย จาก การ ออก แบบ" # Corporate rival escalation
 cyber.420.desc: "เมื่อเร็ว ๆ นี้ อุปกรณ์ฝังไซเบอร์เนติกส์รูปแบบใหม่ที่น่าสงสัยกำลังได้รับความนิยม อุปกรณ์เหล่านี้ไม่ได้ถูกออกแบบมาเพื่อช่วยเหลือผู้ใช้ แต่เพื่อทำร้ายผู้อื่น: เครื่องพ่นสารพิษ เครื่องรัดนาโน และเครื่องกวนสมองไซเบอร์ ได้ทะลักเข้ามาสู่ท้องถนนของเรา\n\nฝ่ายสนับสนุนอ้างว่าอุปกรณ์เหล่านี้จำเป็นสำหรับป้องกันตัว ขณะที่คนอื่น ๆ ยืนกรานว่าเทคโนโลยีนี้ไม่มีวันนำพาเรื่องดี ๆ มาให้เลย"
 cyber.420.a: "ปล่อยให้พวกเขาติดอาวุธกันเอง"
 cyber.420.b: "เรื่องนี้อันตรายเกินไป"
 cyber.420.b.tt: "ความเร็วความคืบหน้าของสถานการณ์ §Y$situation_cyberization$§!: §R-25%§!"
 cyber.420.b_pacifist: "อุปกรณ์ฝังที่เกี่ยวข้องกับความรุนแรงทั้งหมดจะต้องถูกถอดชิ้นส่วน"
 cyber.420.b.tt_pacifist: "นำวัสดุเหล่านั้นไปสร้างสิ่งที่เป็นประโยชน์... และสมเหตุสมผลกว่านี้\n\n"

 cyber.425.name: "ปลั๊กอินควบคุม" # Independent rival
 cyber.425.desc: "ในการโจมตีที่มีการประสานงานกัน กลุ่มแฮกเกอร์หลายกลุ่มสามารถเข้าถึงซอฟต์แวร์หลักที่ควบคุมระบบของอุปกรณ์ฝังไซเบอร์เนติกส์ทั้งหมดได้ พวกเขาขู่ว่าจะปล่อยรหัสซอร์สโค้ดสู่สาธารณะเว้นแต่เราจะยอมจำนนต่อข้อเรียกร้องของพวกเขา\n\nจนถึงตอนนี้ เราไม่มีเหตุผลที่จะคลางแคลงใจในความแน่วแน่ของพวกเขา หากรหัสถูกเปิดเผยต่อสาธารณะ เราจะไม่มีทางเลือกอื่นนอกจากต้องเขียนมันขึ้นมาใหม่ ความล่าช้านั้นจะส่งผลกระทบอย่างรุนแรงต่อความพยายามในการเสริมร่างกายของเรา"
 cyber.425.a: "ยอมจ่ายตามที่พวกเขาขอ"
 cyber.425.b: "เขียนซอฟต์แวร์ใหม่"
 cyber.425.b.tt: "ความเร็วความคืบหน้าของสถานการณ์ §Y$situation_cyberization$§! เป็นเวลา §Y1§! ปี: §R-25%§!"
 cyber.425.c: "ก็อยากเห็นเหมือนกันว่าพวกเขาจะทำยังไง"
 cyber.425.c.tt: "ดีนะที่เราจ้างแฮกเกอร์ฝีมือดีที่สุดเอาไว้ในบัญชีเงินเดือนของเรา"

 cyber.430.name: "สิ่ง ที่ ไม่ อาจ แก้ไข ได้" # Independent rival escalation
 cyber.430.desc.demands: "แม้ว่าจะยอมจ่ายค่าไถ่มหาศาลให้แก่กลุ่มที่รับผิดชอบต่อการละเมิดความปลอดภัยแล้วก็ตาม เมื่อคืนวานนี้ รหัสฐานหลักของเราก็ถูกอัปโหลดขึ้นเครือข่ายข้อมูลสาธารณะทั้งหมด การรั่วไหลนั้นตามมาด้วยรูปภาพลามกอนาจารล้อเลียนความไร้ความสามารถของเราในการสกัดกั้นการโจมตี\n\nวาทกรรมสาธารณะเริ่มตึงเครียดขึ้นอย่างเห็นได้ชัด พร้อมกับความเสียใจหลังการซื้อที่เพิ่มขึ้นอย่างเด่นชัดสำหรับผู้อุปกรณ์ฝังไซเบอร์เนติกส์"
 cyber.430.desc.protest: "การเขียนซอฟต์แวร์ควบคุมอุปกรณ์ฝังใหม่ต้องใช้เวลาและความพยายาม และทำให้การผลิตช้าลง\n\nประชากรเริ่มพึ่งพาอุปกรณ์เสริมร่างกายล่าสุดมากขึ้นเรื่อย ๆ และหลายคนได้ออกมาประท้วงบนท้องถนนเกี่ยวกับการเปิดตัวผลิตภัณฑ์ที่ล่าช้า"
 cyber.430.a: "ผลิตภัณฑ์ใหม่จะเปิดตัวในไม่ช้า"
 cyber.430.b: "เพิกเฉยต่อพวกเขา"
 cyber.430.c.demands: "เริ่มแฮกตอบโต้"
 cyber.430.c.protest: "สลายการชุมนุมผู้ประท้วง"

 cyber.21.name: "ประชากร ที่ ได้ รับ ความ เสีย หาย" # Situation 1 - Last event
 cyber.21.desc: "วันนี้เป็นจุดเปลี่ยนสำหรับสังคมของเรา ตอนนี้เราสามารถเสริมร่างกายของเราด้วยชิ้นส่วนเครื่องจักรที่บูรณาการเข้าด้วยกันได้อย่างสมบูรณ์\n\nกระบวนการนี้ไม่ได้ปราศจากอุปสรรค และการเปลี่ยนแปลงก็ห่างไกลจากความง่ายดาย แต่ไม่ว่าจะเกิดอะไรสูญเสียไประหว่างทาง ชีวิตใหม่ของเรานี้เสนอความเป็นไปได้ที่ไร้ขีดจำกัด"
 cyber.21.a: "เราจะแข็งแกร่งขึ้น"
 cyber.21.a.start: "เพิ่มตัวดัดแปลง §Y$building_augmentation_center$§! แล้ว:$TABBED_NEW_LINE$"
 cyber.21.a.end: "ปลดล็อกเอฟเฟกต์เต็มรูปแบบของสายธรรมเนียม: ['tradition_category:tradition_cybernetics']"
