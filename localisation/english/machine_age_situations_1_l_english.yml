# Buildings
 building_augmentation_center: "ศูนย์เสริมแต่งร่างกาย"
 building_augmentation_center_desc: "อาคารสำหรับติดตั้งรากเทียมไซเบอร์เนติกส์ ส่วนหนึ่งเป็นห้างสรรพสินค้า อีกส่วนเป็นศูนย์ผ่าตัด และอีกส่วนเป็นอู่ซ่อมเครื่องกล"
 building_augmentation_center_government_desc: "คลินิกของรัฐช่วยให้พลเมืองสามารถเลือกและติดตั้งรากเทียมไซเบอร์เนติกส์ที่ได้รับอนุมัติได้"
 building_augmentation_center_corporate_desc: "คอมเพล็กซ์ขนาดใหญ่สำหรับทุกความต้องการด้านไซเบอร์เนติกส์ของคุณ พร้อมสรรพด้วยผู้ช่วยช้อปปิ้งดิจิทัลส่วนตัวและสปาสุดหรูหลังการผ่าตัด"
 building_augmentation_center_independent_desc: "หมอไซเบอร์ตามตรอกซอกซอยสามารถติดตั้งรากเทียมชนิดใดก็ได้ แต่อาจทำให้คุณต้องจ่ายมากกว่าแค่ไม่กี่เครดิต"
 building_augmentation_center_hive_desc: "สายการประกอบที่ไม่มีที่สิ้นสุดสำหรับติดตั้งรากเทียมไซเบอร์เนติกส์ ส่วนหนึ่งเป็นคลังทรัพยากร อีกส่วนเป็นศูนย์ผ่าตัด และอีกส่วนเป็นอู่ซ่อมเครื่องจักร"
 building_augmentation_center_creed_desc: "สถานศักดิ์สิทธิ์แห่งการเสริมแต่งอันเหนือชั้น ที่ซึ่งผู้มีจิตศรัทธามารวมตัวกันเพื่อเกิดใหม่ผ่านการหลอมรวมอันศักดิ์สิทธิ์"

