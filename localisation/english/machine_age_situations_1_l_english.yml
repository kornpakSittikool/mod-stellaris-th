 cyber.social_consequences.tt: "อิทธิพล ที่ ยัง คง มี อยู่§Yเลื่อนบิตของ สมาคมไซเบอร์§!.\n\n" # Standard tooltip to indicate that the Individualism/Collectivism variables are changed

# FIRST EVENT #
# DEMOCRATIC
 cyber.505.name: "อนาคตตื่นตระหนก"
 cyber.505.desc.gov: "การเสริมร่างกายของประชากรของเราถือเป็นชัยชนะของกระบวนการผลิตและการตัดสินใจที่กระชับรวดเร็ว เสียงที่หลากหลายและแตกต่างกันของพวกเราได้รับการรับฟังและข้อกังวลของพวกเขาก็ได้รับการแก้ไขเรียบร้อยแล้ว ในเวลานี้ ทุกคนที่เป็น §Y[root.GetSpeciesAdj]§!มีโอกาสเท่าเทียมกันที่จะได้รับประโยชน์จากอุปกรณ์ฝังที่จะเปลี่ยนชีวิตเหล่านี้\n\nขั้นตอนถัดไปที่สมเหตุสมผลคือการตรวจสอบผลกระทบในวงกว้างของเทคโนโลยีนี้ เราควรใช้มันเพื่อผลักดันกระบวนการทางประชาธิปไตย หรือจะยกระดับแรงงานของเราผ่านทางการซิงโครไนซ์ประสบการณ์ดี?"
 cyber.505.desc.cor: "ผู้คนของเราหวงแหนเสรีภาพและคัดค้านเทคโนโลยีการติดตามทุกประเภทอย่างรุนแรง"
 cyber.505.desc.ind: "แม้จะมีความกังวลจากเจ้าหน้าที่รัฐ แต่โมเดลการแจกจ่ายแบบกระจายอำนาจของอุปกรณ์ฝังก็ทำงานได้ดี คลินิกและบริการขนาดเล็กเปิดขึ้นในทุกมุมถนน ช่วยให้ใครก็ตามสามารถเสริมร่างกายตัวเองได้โดยไม่ต้องเดินทางไกล\n\nรัฐบาลของเราก็ต้องเตรียมพร้อมก้าวไปข้างหน้าเช่นกัน เราสามารถใช้อุปกรณ์ฝังเพื่อสร้างความแข็งแกร่งให้กับกระบวนการประชาธิปไตย หรือจะใช้มันเพื่อเชื่อมประสานประสบการณ์ต่าง ๆ ของเราเพื่อประโยชน์ของตนเองและแรงงาน"
 cyber.505.a: "เราควรเสริมประสิทธิภาพกระบวนการทางประชาธิปไตย"
 cyber.505.a.tt: "มุ่งเน้นไปที่การเพิ่มความสุข แรงสามัคคี และกลุ่มผู้เชี่ยวชาญ"
 cyber.505.b: "เราต้องเชื่อมต่อจิตใจของเราเข้าด้วยกัน"
 cyber.505.b.tt: "ก้าวผ่านเกณฑ์"

# OLIGARCHIC
 cyber.510.name: "การปรับโครงสร้างอำนาจ"
 cyber.510.desc.gov: "ความเปลี่ยนแปลงครั้งใหญ่นี้เข้าใจและปฏิบัติตามได้เฉพาะกลุ่มชนชั้นสูงของสังคมเท่านั้น มิฉะนั้นจะนำมาซึ่งความสับสนและความขัดแย้งในหมู่ประชาชนของเรา ในขณะที่ประชากร §Y[Species.GetNamePlural]§! ได้รับการติดตั้งอุปกรณ์ฝังไซเบอร์เนติกส์ที่ออกโดยรัฐบาล เราก็มีโอกาสพิเศษในการสำรวจโอกาสที่ซ่อนอยู่ซึ่งชิปเหล่านี้มอบให้ในปัจจุบัน\n\nเราควรผลักดันให้เกิดสังคมที่การแข่งขันอย่างดุเดือดจะผลักดันแรงงานให้ก้าวสู่ระดับใหม่ หรือจะดึงเอาพลังการประมวลผลที่ว่างเปล่าของจิตใจผู้ที่กำลังหลับใหลมาใช้ประโยชน์ดี?"
 cyber.510.desc.cor: "ไมโครโพรเซสเซอร์ทางปัญญา, ติวเตอร์ AI ที่ได้รับการปรับปรุง, เอนไซม์สังเคราะห์เพื่อส่งเสริมการสร้างระบบประสาทใหม่ - และทั้งหมดนี้สำหรับนักเรียนระดับก่อนวัยเรียนเท่านั้น"
 cyber.510.desc.ind: "ไม่ว่าจะดีหรือร้าย ประชาชนจะได้รับอนุญาตให้พิสูจน์ตัวเองในการผลิตและแจกจ่ายฮาร์ดแวร์เสริมไซเบอร์เนติกส์ ทำให้เราเป็นอิสระที่จะพิจารณาภาพรวมและวิธีใช้ประโยชน์สูงสุดจากความเปลี่ยนแปลงทางสังคมที่ไม่ได้คาดฝันนี้\n\nเราควรบีบให้ผู้คนต้องทำตามโควตาที่สูงขึ้นไปเรื่อย ๆ หรือจะให้พวกเขาทำงานให้เราในขณะนอนหลับแทน?"
 cyber.510.a: "ให้พวกสอพลอทำงานหนักเพื่อเรา"
 cyber.510.a.tt: "มุ่งเน้นไปที่การเพิ่มการผลิตโดยแลกกับค่าความสุข"
 cyber.510.b: "ควบคุมพลังแห่งการนอนหลับ"
 cyber.510.b.tt: "$cyber.855.intro.desc$\n\nการก้าวตามการเปลี่ยนแปลงทางเทคโนโลยีได้สร้างภาระหนักให้กับโครงการการศึกษาที่ได้รับการสนับสนุนจากรัฐ ช่องว่างทางประสิทธิภาพการทำงานกำลังกว้างขึ้นระหว่างผู้ที่พึ่งพาการดัดแปลงสาธารณะกับครัวเรือนที่สามารถจ่ายซื้อเทคโนโลยีล้ำสมัยได้\n\nการรักษาระบบที่เท่าเทียมกันนี้จะต้องมีการลงทุนทรัพยากรอย่างมากเป็นเวลาห้าปี"

# DICTATORIAL
 cyber.515.name: "ควบคุมฝูงชน"
 cyber.515.desc.gov: "โอกาสหลายประการในการเพิ่มความมั่นคงและการควบคุมได้ปรากฏขึ้นในโครงการการดัดแปลงทางไซเบอร์ของเรา ในขณะที่เราผลิตสิ่งปลูกฝังที่ออกโดยรัฐบาลและติดตั้งให้กับประชากรของเรา การแอบติดตั้งอัลกอริทึมเพื่อชี้นำประชากรไปสู่ผลลัพธ์ที่ต้องการก็จะเป็นเรื่องง่าย\n\nเราสามารถเพิ่มความครอบคลุมในการเฝ้าระวังได้โดยการเพิ่มเครื่องมือตรวจสอบและช่องทางลับเข้าไปในสิ่งปลูกฝังส่วนบุคคล หรือเราจะติดตั้งโค้ดที่ช่วยให้บุคลิกภาพอันเจิดจรัสของ §Y[Ruler.GetTitle]§! ของเราโน้มน้าวใจมวลชนก็ได้"
 cyber.515.desc.cor: "$cyber.855.intro.desc$\n\nการศึกษาที่ดีอาจมีราคาแพง และหลายคนกำลังพบว่าเป็นเรื่องยากขึ้นเรื่อย ๆ ที่จะก้าวตามทัน ช่องว่างประสิทธิภาพกำลังขยายกว้างขึ้นระหว่างครัวเรือนที่สามารถจ่ายเงินสำหรับการดัดแปลงที่ล้ำสมัย กับครัวเรือนที่ต้องพึ่งพารุ่นเก่าที่ตกทอดมา หรือของลอกเลียนแบบ\n\nเพื่อป้องกันการแบ่งแยกชนชั้นทางสังคมเพิ่มเติม จึงมีความจำเป็นอย่างยิ่งที่จะต้องลงทุนครั้งสำคัญเป็นเวลาห้าปีในระบบการศึกษาของเรา"
 cyber.515.desc.ind: "โรงพยาบาลทั่วไป ร้านค้าตามมุมถนน และชุมชนแฮกเกอร์ ต่างพร้อมที่จะแจกจ่ายและติดตั้งสิ่งปลูกฝังไซเบอร์เนติกส์ให้กับประชากรแล้ว แต่ไม่มีความจำเป็นที่จะต้องกระจายอำนาจการควบคุมเทคโนโลยีใหม่ที่น่าตื่นเต้นนี้ออกไปทั้งหมด\n\nเราสามารถจัดหาการปรับแต่งสิ่งปลูกฝังแบบพิเศษ โดยซ่อนเครื่องมือเฝ้าระวังลับของเราไว้ภายใน เพื่อให้สามารถจับตาดูบุคคลที่เป็นปัญหาได้ หรืออีกทางหนึ่ง เราสามารถติดตั้งอัลกอริทึมเขียนทับบุคลิกภาพที่จะช่วยให้เจตจำนงของ §Y[Ruler.GetTitle]§! ของเราชี้นำผู้คนของเราไปสู่ความยิ่งใหญ่โดยไม่รู้ตัว"
 cyber.515.a: "ซ่อนเครื่องมือเฝ้าระวังในสิ่งปลูกฝังส่วนบุคคล"
 cyber.515.a.tt: "เน้นย้ำถึงความมั่นคงของจักรวรรดิและการลดอาชญากรรม"
 cyber.515.b: "ศึกษาการเขียนทับบุคลิกภาพ"
 cyber.515.b.tt: "ค่าใช้จ่ายสูงเกินไป"

# IMPERIAL
 cyber.520.name: "ช็อกอนาคต"
 cyber.520.desc.gov: "รัฐบาลได้จัดสรรทรัพยากรอันมหาศาลเพื่อดัดแปลงประชากรอย่างมีประสิทธิภาพ ศูนย์ดัดแปลงที่ได้รับอนุญาตได้ติดตั้งสิ่งปลูกฝังทั้งวันทั้งคืน และประชาชนได้รับการแนะนำเกี่ยวกับวิธีใช้งานและการบำรุงรักษาที่ถูกต้อง\n\nคำถามคือ คุณค่าที่แท้จริงของสิ่งปลูกฝังควรเน้นไปที่การเสริมสร้างความเป็นผู้นำที่น่าประทับใจอยู่แล้วของเรา หรือเป็นเครื่องมือในการสร้างความบันเทิงและเบี่ยงเบนความสนใจของผู้ที่ทำงานภายใต้พวกเขา\n\nการมีสิ่งปลูกฝังคุณภาพสูงสุดให้สำหรับราชวงศ์ของเราสามารถช่วยให้ผู้นำของเราสืบทอดความรู้ข้ามรุ่น ซึ่งจะมอบความมั่นคงที่ไม่อาจประเมินค่าได้ หรือจักรวรรดิจะยกระดับดาวเมืองหลวงและสร้างความบันเทิงด้วยเหล่านักกีฬาที่ได้รับการดัดแปลงทางไซเบอร์เข้าร่วมในกิจกรรมกีฬาการต่อสู้นองเลือดที่ล้ำสมัย"
 cyber.520.desc.cor: "การศึกษาจะต้องยังคงเข้าถึงได้สำหรับทุกคน"
 cyber.520.desc.ind: "แม้จะมีข้อกังขามากมายจากเจ้าหน้าที่จักรวรรดิ แต่การแจกจ่ายและติดตั้งสิ่งปลูกฝังไซเบอร์เนติกส์แบบกระจายอำนาจก็ประสบความสำเร็จ คลินิกขนาดเล็กหลายแห่งทั่วโลกของเราได้ทำงานอย่างไม่รู้จักเหน็ดเหนื่อยเพื่อพัฒนาประชากรของเรา\n\nคำถามในตอนนี้คือ คุณค่าที่แท้จริงของสิ่งปลูกฝังควรเน้นไปที่จุดใด สิ่งนี้อาจหมายถึงการรักษาความรู้ของจักรวรรดิไว้ในสิ่งปลูกฝังข้ามรุ่น หรือการจัดหากีฬาการต่อสู้นองเลือดของไซบอร์กให้แก่มวลชน ซึ่งเป็นสิ่งที่ไม่เคยมีสิ่งปลูกฝังสายตาใดเคยพบเห็นมาก่อน"
 cyber.520.a: "รักษาความรู้ของจักรวรรดิ"
 cyber.520.a.tt: "เน้นย้ำถึงผู้ปกครองจักรวรรดิ"
 cyber.520.b: "จัดหาความบันเทิงให้แก่มวลชน"
 cyber.520.b.tt: "การศึกษาที่ได้รับการดัดแปลง"

# CORPORATE
 cyber.525.name: "บริษัท สิ่งปลูกฝัง จำกัด"
 cyber.525.desc.gov: "โครงการสิ่งปลูกฝังของรัฐบาลที่ขยายตัวแต่ไร้ประสิทธิภาพใกล้จะเสร็จสมบูรณ์แล้ว ทำให้เรามีโอกาสที่จะขยายแหล่งรายได้ที่เกี่ยวข้องกับการเปิดตัวผลิตภัณฑ์ที่ไม่เคยมีมาก่อนนี้ ทีมวิเคราะห์ของเรากำลังเสนอแหล่งรายได้ที่เป็นไปได้สองแหล่ง ซึ่งต่างก็มีความเสี่ยงและผลตอบแทนของตัวเอง\n\nรัฐบาลควรบังคับให้ใส่โฆษณาในสิ่งปลูกฝังสายตาทั้งหมดในอนาคต หรือควรบังคับให้มีการอัปเกรดเป็นประจำสำหรับประชากรที่ได้รับการดัดแปลง?"
 cyber.525.desc.cor: "เราจะเริ่มโครงการห้าปีเพื่อส่งเสริมระบบการศึกษาที่แข็งแกร่งและได้รับการดัดแปลงอย่างสมบูรณ์"
 cyber.525.desc.ind: "ไม่น่าแปลกใจเลย ที่คําว่า \"รวม\"ตามคาด ความไม่เป็นระเบียบ"
 cyber.525.a: "ทดลองสิ่งปลูกฝังสายตาต้นแบบที่สนับสนุนโดยโฆษณา"
 cyber.525.a.tt: "เน้นย้ำถึงการค้าที่เพิ่มขึ้นและการลดต้นทุนค่าเสียโอกาสทางเศรษฐกิจ"
 cyber.525.b: "วิจัยโครงการอัปเกรดสิ่งปลูกฝัง"
 cyber.525.b.tt: "ความเป็นเลิศที่เท่าเทียม"

### EVENT POOL ###
 cyber.610.name: "ความสุขสำราญทันตา"
 cyber.610.desc: "การดัดแปลงสิ่งปลูกฝังใต้ดินกำลังแพร่กระจายในหมู่แรงงาน ซึ่งจะกระตุ้นสมองให้ผลิตสารสื่อประสาทตามต้องการ สิ่งนี้มีประโยชน์หลากหลายตั้งแต่การสร้างความสุขอย่างท่วมท้นไปจนถึงการเพิ่มความทนทานต่อความเจ็บปวด การวิศวกรรมย้อนกลับสิ่งปลูกฝังที่ผิดกฎหมายให้เป็นเวอร์ชันที่เสถียรนั้นต้องใช้เงินลงทุนจำนวนมาก และผลของการกระตุ้นก็ย่อมต้องหมดฤทธิ์ลงในที่สุด\n\nเราควรสร้างเวอร์ชันเชิงพาณิชย์ นำต้นแบบใต้ดินมาบรรจุหีบห่อใหม่ หรือเพียงแค่ควบคุมการใช้งานของพวกมัน?"
 cyber.610.a: "การลงทุนของเราในการดัดแปลงเพื่อการศึกษาได้ผลตอบแทนอย่างงดงาม\n\nการเข้าถึงไซเบอร์เนติกส์คุณภาพสูงของสาธารณะได้สร้างระบอบคัดสรรคนเก่งทางวิชาการที่แท้จริง ซึ่งทุกคนไม่ว่าจะอยู่ในชนชั้นทางสังคมใดก็สามารถดึงศักยภาพสูงสุดของตนออกมาได้ ประโยชน์ที่ได้รับนั้นเห็นได้ชัดเจนเป็นพิเศษในด้านวิทยาศาสตร์ ซึ่งผลงานวิจัยและนวัตกรรมได้รับการปรับปรุงในทุกด้าน"
 cyber.610.b: "ยึดเอาต้นแบบใต้ดินมาใช้งาน"
 cyber.610.c: "ควบคุมการดัดแปลงประเภทเหล่านี้"

 cyber.615.name: "การแบ่งแยกงานและชีวิต"
 cyber.615.desc: "ความเป็นเลิศที่เท่าเทียม"
 cyber.615.a: "ประชาชนต้องมีอำนาจควบคุมอย่างเต็มที่"
 cyber.615.b: "มันเป็นเรื่องดีต่อสุขภาพที่จะทิ้งงานไว้ที่สำนักงาน"
 cyber.615.c: "ปิดกั้นประสบการณ์ทั้งสองทาง"

 cyber.625.name: "ประชากรที่ได้รับการศึกษาดีและได้รับการดัดแปลงอย่างสมบูรณ์เป็นกุญแจสำคัญสู่ความก้าวหน้าทางสังคมและวัตถุ"
 cyber.625.desc: "เมื่ออุปกรณ์ไซเบอร์ฝังรากลึกในชีวิตเรา การเปลี่ยนแปลงในโมเดลการสร้างรายได้จึงส่งผลกระทบต่อสังคมทั้งหมดของเราอย่างรุนแรง แนวโน้มล่าสุดคือผู้ผลิตสิ่งปลูกฝังได้ปิดกั้นฟังก์ชันที่จำเป็นไว้หลังระบบสมัครสมาชิก หากพลาดการชำระเงิน ทันใดนั้น แขนขาไซเบอร์ของคุณจะล็อก และระบบการมองเห็นของคุณจะดับลง องค์กรผู้บริโภคกำลังเรียกร้องให้เรายุติแนวปฏิบัติเหล่านี้"
 cyber.625.a: "แบนระบบสมัครสมาชิกสำหรับอุปกรณ์ไซเบอร์"
 cyber.625.b: "ถ้าพวกเขาจ่ายไม่ไหว ก็ไม่ควรซื้อ"
 cyber.625.c: "จำกัดระบบสมัครสมาชิกไว้เฉพาะฟังก์ชันที่ไม่สำคัญ"
 cyber.625.d: "ผู้นำที่ยอดเยี่ยมเป็นพิเศษ"
 cyber_subscription_ban: "แบนระบบสมัครสมาชิกอุปกรณ์ไซเบอร์"
 cyber_subscription_ban_desc: "เราได้ขัดขวางไม่ให้ผู้ผลิตอุปกรณ์ไซเบอร์ปิดกั้นคุณสมบัติของสิ่งปลูกฝังไว้หลังระบบสมัครสมาชิก"
 cyber_subscription_limited: "จำกัดระบบสมัครสมาชิกอุปกรณ์ไซเบอร์"
 cyber_subscription_limited_desc: "เราได้ขัดขวางไม่ให้ผู้ผลิตอุปกรณ์ไซเบอร์ปิดกั้นคุณสมบัติหลักของสิ่งปลูกฝังไว้หลังระบบสมัครสมาชิก"
 cyber_subscription: "การตัดสินใจที่จะระงับการจัดหาเงินทุนสนับสนุนสาธารณะสำหรับการดัดแปลงเพื่อการศึกษาได้รับการพิสูจน์แล้วว่าเป็นการตัดสินใจที่ชาญฉลาด\n\nสังคมของเราเป็นสังคมที่เชื่อในความเป็นเลิศส่วนบุคคล แม้จะมีเสียงวิพากษ์วิจารณ์ประปรายเกี่ยวกับ 'ช่องว่างทางสังคม' ที่กว้างขึ้น แต่การแข่งขันทางวิชาการได้ส่งผลให้เกิดผู้นำที่มีการศึกษาสูงและมีผลิตผลมากที่สุดกลุ่มหนึ่งในกาแล็กซี"
 cyber_subscription_megacorp: "เพิ่มผลดัดแปลงต่อไปนี้ให้กับคุณลักษณะสปีชีส์ §Y$trait_cybernetic$§!:\n$t$ความสุข: §R-5%§!\n$t$บา โนส WORKFFORDE$['concept_planet_traders']: §G+50%§!"

 cyber.655.name: "ความล้มเหลวทางกลไกที่คาดไม่ถึง"
 cyber.655.desc: "วิศวกรอุปกรณ์ไซเบอร์ของเราได้เสนอโอกาสทางเศรษฐกิจแก่เรา ด้วยการลดความทนทานของสิ่งปลูกฝังลงเพียงเล็กน้อย เราจะสามารถสร้างผลกำไรเพิ่มขึ้นอย่างมาก เนื่องจากผู้ใช้จะต้องเปลี่ยนชิ้นส่วนที่จำเป็น\n\nการใช้ไบโออัลลอยด์ที่ด้อยคุณภาพในส่วนที่เกิดการสึกหรอตามปกติมากที่สุด จะทำให้สิ่งปลูกฝังทำงานล้มเหลวในลักษณะที่ก่อให้เกิดอันตรายต่อผู้บริโภคน้อยที่สุด แต่ยังต้องได้รับการเปลี่ยนใหม่"
 cyber.655.a: "ผู้นำที่ยอดเยี่ยมเป็นพิเศษ"
 cyber.655.a.tt: "เราจะไม่จัดหาส่วนประกอบเกรดต่ำให้กับพลเมืองของเรา!\n\n"
 cyber.655.b: "น่าสนใจ เริ่มสร้างอุปกรณ์ไซเบอร์ที่บอบบางลงได้เลย"
 cyber.655.c: "ใช่แล้ว! ประสานงานมันไปพร้อมกับการขึ้นราคาด้วยเลย"
 cyber.655.d: "ใช้ข้อมูลนี้เพื่อปรับปรุงความพยายามในการแปลงเป็นไซเบอร์ของเรา"
 worse_parts: "การพัฒนาผู้มีความสามารถดีที่สุดของเราในระดับบุคคลได้สร้างช่องทางสำหรับผู้นำที่มีคุณภาพโดดเด่นเป็นพิเศษ"
 worse_parts_desc: "เราได้เลือกที่จะจัดหาส่วนประกอบไซเบอร์เนติกส์ที่ด้อยคุณภาพให้กับพลเมืองของเราโดยตั้งใจ ซึ่งหมายความว่าพวกเขาจะต้องซื้อชิ้นส่วนทดแทนบ่อยขึ้น"
 worse_parts_effect_tt: "$r_trade$ ต่อ $pop_group_unit$ £pop£ §Hประชากร§! ที่มีคุณลักษณะ §Y$trait_auto_mod_cyborg$§!: §G+0.5§!"
 optimized_parts: "ชิ้นส่วนที่ปรับปรุงประสิทธิภาพแล้ว"
 optimized_parts_desc: "เรายังคงคิดค้นและปรับปรุงส่วนประกอบไซเบอร์เนติกส์ของเราอย่างต่อเนื่อง ส่งผลให้กระบวนการติดตั้งรวดเร็วและง่ายดายยิ่งขึ้น"
 optimized_parts_effect_tt: "ผู้ทำลายขีดจำกัด"

 cyber.660.name: "ความล้มเหลวทางสังคมที่คาดไม่ถึง"
 cyber.660.desc: "ดูเหมือนว่าพลเมืองของเราจะล่วงรู้ถึงแผนการทำให้ตกรุ่นตามกำหนดเวลาของเราแล้ว\n\nท้องถนนเต็มไปด้วย [Owner.GetSpeciesNamePlural] ที่โกรธแค้นต่อการเปลี่ยนแปลงล่าสุดที่เราทำกับคุณภาพและราคาของอุปกรณ์ไซเบอร์ พวกเขากำลังเรียกร้องให้เรายกเลิกการเปลี่ยนแปลงเหล่านี้"
 cyber.660.a: "ก็ได้ มันโลภมากเกินไปหน่อย"
 cyber.660.b: "'การทำลายสถิติอีกครั้งของ [Species.GetName]' - หัวข้อข่าวนี้กลายเป็นเรื่องธรรมดาในชีวิตการกีฬาของ [Owner.GetAdjective] เมื่อ [GetAthletePlural] แข่งขันกันเพื่อเอาชนะกันด้วยการปรับแต่งที่ใหม่กว่าและซับซ้อนยิ่งขึ้น ขีดจำกัดของสมรรถภาพทางกีฬาก็ถูกผลักดันอย่างต่อเนื่อง\n\nในขณะที่แฟน ๆ ของ 'กีฬาที่ได้รับการดัดแปลง' ต่างปลาบปลื้มกับผลลัพธ์ แต่สาวกพันธุ์แท้จำนวนมากขึ้นเรื่อย ๆ ต่างเรียกร้องให้จำกัดบุคคลที่ได้รับการดัดแปลงไว้เฉพาะในดิวิชันแยกต่างหาก ขณะที่กลุ่มสุดท้ายต้องการจำกัดจำนวนผู้ดัดแปลงที่แข่งขันในประเภททีม เพื่อให้ [GetAthletePlural] ตามธรรมชาติมีพื้นที่ในสปอตไลท์เสมอ"
 cyber.660.c: "เราไม่ต้อง..."
 discontent: "ความไม่พอใจ"
 discontent_desc: "พลเมืองของเรากำลังก่อจลาจลเกี่ยวกับการขึ้นราคาและคุณภาพที่ลดลงของอุปกรณ์ไซเบอร์เมื่อเร็ว ๆ นี้"

 cyber.805.name: "การควบคุมโดยผู้ปกครอง"
 cyber.805.desc: "ยุคสมัยของผู้ไม่ได้รับการดัดแปลงได้ผ่านพ้นไปแล้ว"
 cyber.805.a: "อนุญาตให้ผู้ใหญ่ควบคุมเด็ก ๆ ของพวกเขา"
 cyber.805.b: "อนุญาตการควบคุมในขอบเขตจำกัด"
 cyber.805.c: "ปล่อยการควบคุมร่างกายจากระยะไกลไว้กับเจ้าหน้าที่ผู้รักษากฎหมาย"

 cyber.810.name: "การถ่ายโอนความรู้"
 cyber.810.desc: "การพัฒนาสิ่งปลูกฝังในสมองไซเบอร์เนติกส์ทำให้เราได้รับโอกาสที่น่าดึงดูดใจ แทนที่จะพึ่งพาวิธีการสอนที่ช้าและขึ้นอยู่กับดุลยพินิจส่วนบุคคล เราสามารถถ่ายโอนความรู้ที่สำคัญจากสมองหนึ่งไปยังอีกสมองหนึ่งได้โดยตรง สิ่งนี้ต้องการสภาพห้องปฏิบัติการที่ปลอดเชื้อ ดังนั้นจึงไม่สามารถขยายผลในระดับใหญ่ได้ ข้อมูลที่ได้รับจะเข้าไปเขียนทับความทรงจำในประเภทเดียวกันของผู้รับบางส่วนด้วย\n\nการประยุกต์ใช้งานที่มีผลกระทบมากที่สุดจะเกี่ยวข้องกับการแบ่งปันความรู้ระหว่างนักวิทยาศาสตร์ สิ่งนี้อาจช่วยชดเชยภาระงานด้านวิศวกรรมจากกระบวนการแปลงเป็นไซเบอร์ หรือเน้นไปที่ด้านอื่น ๆ"
 cyber.810.a: "ถ่ายโอนความรู้ด้านวิศวกรรม"
 cyber.810.b: "ถ่ายโอนความรู้ด้านฟิสิกส์"
 cyber.810.c: "ลดขั้นคู่แข่งที่ได้รับการดัดแปลงให้ไปอยู่ในลีกของตนเอง"
 cyber.810.d: "ให้ทุกคนเก็บความคิดของตนเองไว้กับตัวเอง"

 cyber.815.name: "ความรักแบบกระจายศูนย์"
 cyber.815.desc: "ในขณะที่ [root.GetSpeciesNamePlural] จำนวนมากยินดีดัดแปลงชีวิตประจำวันและความสัมพันธ์ของพวกเขาโดยใช้อุปกรณ์ไซเบอร์เนติกส์ทั่วไป แต่ก็มีกลุ่มครัวเรือนที่มีคู่ครองหลายคนจำนวนมากขึ้นเรื่อย ๆ ที่เลือกหันไปใช้เครือข่ายส่วนตัวด้วยฮาร์ดแวร์สั่งทำพิเศษ กลุ่มครัวเรือนเหล่านี้เลือกที่จะใช้ชีวิตในการแยกตัวแบบเฉพาะตัว แบ่งปันความรู้สึกและประสบการณ์ร่วมกันด้วยความใกล้ชิดอันเป็นเอกลักษณ์\n\nกลุ่มสวัสดิการสังคมและนักวิชาการบางกลุ่มต่างชื่นชมปรากฏการณ์นี้ โดยชี้ว่าทุกคนสามารถได้รับประโยชน์จากการดัดแปลงความสัมพันธ์และสายใยครอบครัวตามสั่ง ขณะที่คนอื่น ๆ แสดงความกังวลเกี่ยวกับการถอนตัวออกจากสังคมในวงกว้าง และบางคนถึงกับแนะนำว่าการปฏิบัตินี้อาจทำให้บุคคลสูญเสียตัวตนไปใน 'กลุ่มจิตสำนึกรัก' ขนาดย่อส่วน"
 cyber.815.a: "จำกัดจำนวนของ [GetAthletePlural] ที่ได้รับการดัดแปลง"
 cyber.815.a.tt: "เราจะยังคงอนุญาตให้เข้าถึงฮาร์ดแวร์สั่งทำพิเศษและพื้นที่ดิจิทัลส่วนตัวต่อไป"
 decentralized_families: "ครอบครัวแบบกระจายศูนย์"
 decentralized_families_desc: "ความสัมพันธ์แบบคู่ชีวิตในทุกรูปแบบสามารถยกระดับความสัมพันธ์ของพวกเขาได้โดยใช้ซอฟต์แวร์และการดัดแปลงสั่งทำพิเศษ"
 cyber.815.b: "ดึงครอบครัวเหล่านี้กลับมารวมกลุ่มกันอีกครั้ง"
 cyber.815.b.tt: "นักกีฬาไซเบอร์เนติกส์"
 centralized_families: "ครอบครัวแบบรวมศูนย์"
 centralized_families_desc: "การควบคุมการต่อเติมแบบไซเบอร์เนชันแนล และซอฟท์แวร์ ทําให้ครัวเรือนหยุดสร้างสวนแบบดิจิตอล" # as in a richly decorated but enclosed space
 cyber.820.name: "ภาพลักษณ์สุดโต่ง"
 cyber.820.desc: "วัฒนธรรมย่อยของคนนอกมีอยู่ตลอดประวัติศาสตร์ของ [root.GetSpeciesAdj] แต่ด้วยการมาถึงของการดัดแปลงไซเบอร์เนติกส์ สถานการณ์จึงเปลี่ยนไป: กลุ่มชายขอบได้เริ่มปรับเปลี่ยนตัวเองอย่างสุดโต่งจนดูเหมือนไม่ใช่ [root.GetSpeciesAdj] โดยเฉพาะเยาวชนที่กำลังสร้างความตึงเครียดให้กับช่องว่างระหว่างวัยด้วยความกระหายใน [root.GetSpeciesHandNamePlural] ที่ดัดแปลงอย่างหนัก ศิลปะบนเรือนร่างแบบ 3 มิติ และส่วนต่อขยายประดับตกแต่งอื่น ๆ\n\nฝ่ายผู้สนับสนุนอ้างว่าพวกเขากำลังโอบรับตัวตนที่แท้จริง และการสละความเหมือนกันของ [root.GetSpeciesAdj] นั้นเป็นเพียงการยืนยันเจตจำนงในชีวิตของตนเอง ทว่ามุมมองเหล่านี้ไม่ได้รับการยอมรับจากพ่อแม่ผู้ปกครองและนักวิจารณ์สังคมจำนวนมากที่เป็นกังวล ซึ่งตราหน้าบุคคลดังกล่าวว่าเป็นพวกนอกคอกที่คิดจะทำลายสังคมของเรา"
 cyber.820.a: "การส่งเสริมให้นักกีฬาที่ได้รับการดัดแปลงเข้าร่วมในการกีฬา ช่วยให้เราสามารถทดสอบอุปกรณ์ไซเบอร์ระดับแนวหน้าในภาคสนามได้"
 cyber.820.b: "นี่เป็นแค่ช่วงวัยหนึ่ง เดี๋ยมันก็ผ่านไป"
 radical_image: "ภาพลักษณ์สุดโต่ง"
 radical_image_desc: "คนหนุ่มสาวในสังคมนี้กำลังทดลองกับภาพลักษณ์ของตัวเองอย่างกล้าหาญ"
 cyber.820.c: "เราอาจได้เรียนรู้อะไรบางอย่างจากคนหนุ่มสาวเหล่านี้"
 radical_insights: "ลีกกีฬาระดับไซเบอร์เนติกส์"
 radical_insights_desc: "ตามแบบอย่างของเหล่านักดัดแปลงร่างกายต่อต้านวัฒนธรรม สังคมนี้กำลังทดลองกับภาพลักษณ์ของตนเองด้วยการดัดแปลงเพื่อความงามรูปแบบใหม่"

 cyber.821.name: "การ ออก แบบ ที่ ยอด เยี่ยม"
 cyber.821.desc: "หนุ่ม สาว ที่ เป็น ห่วง, นัก สังคม นิยม, และ ศิลปิน ได้ รวม ตัว กัน เป็น พัน ๆ คน เพื่อ เรียก ร้อง เสรีภาพ ใน การ สร้าง เสริม ระบบ คอมพิวเตอร์. พรีสเตอร์ประมวลผลเดอะชราวด์จากทั่วไปภายนอก[root.GetSpeciesNamePlural]กับบุคคลที่มีแขนขาที่กําหนดเอง รูปทรงลําตัว และรูปแบบอื่น ๆ เอเลี่ยน ทั้งหมดประกาศความสามัคคี[root.GetAdj]ประชาชน ที่ เผชิญ กับ การ เลือก ปฏิบัติ สําหรับ การ เลือก ของ ตน เอง ใน การ ประดับ กาย แบบ ไซเบอร์ ติก."
 cyber.821.a: "การแยกคู่แข่งที่ 'ตามธรรมชาติ' และผู้ที่ได้รับการดัดแปลงช่วยให้เกิดการแข่งขันที่ยุติธรรมสำหรับทุกคน"
 cyber.821.a.tt: "เราจะส่งเสริมให้นักสะสม เข้าหาคอมพิวเตอร์"
 radical_image_denied: "ถูกปฏิเสธรูปภาพ"
 radical_image_denied_desc: "เมื่อ เร็ว ๆ นี้ การ ประท้วง ใน สิทธิ ที่ จะ แสดง ออก อย่าง อิสระ ผ่าน การ สร้าง เสริม ระบบ คอมพิวเตอร์ ได้ เพิ่ม ขึ้น."
 cyber.821.b: "เราจะพิจารณาข้อเรียกร้องของพวกเขา"
 cyber.821.b.tt: "นักกีฬาไซเบอร์เนติกส์ที่มีจำนวนจำกัด"
 radical_image_upheld: "ลบรูปภาพ"
 radical_image_upheld_desc: "เมื่อ ไม่ นาน มา นี้ การ ประท้วง ได้ ทํา ให้ แน่ ใจ ว่า มี สิทธิ บาง อย่าง ที่ จะ แสดง ออก อย่าง อิสระ ผ่าน การ สร้าง เสริม ระบบ คอมพิวเตอร์ ที่ เห็น ได้ ด้วย ตา."

 cyber.822.name: "Radical Physiology"
 cyber.822.desc: "การควบคุมจำนวนนักกีฬาที่ได้รับการดัดแปลงจะช่วยให้ทุกทีมมีโอกาสประสบความสำเร็จอย่างแท้จริง"
 cyber.822.a: "ค่าใช้จ่ายเป็นธรรม"
 cyber.822.b: "มันเป็นความผิดพลาดที่อนุญาตให้ทําทาน"

# Cold Metal
 cyber.830.name: "นักกีฬา"
 cyber.830.desc: "รายงาน การ เจ็บ ปวด เมื่อ เผชิญ กับ อากาศ หนาว สถานการณ์นี้จริงจังเป็นพิเศษ§H[cold_planet.GetName]§!ที่อุณหภูมิแช่แข็งเป็นบรรทัดฐาน\n\nเป็น ที่ ทราบ กัน ว่า การ ปลูก โลหะ เป็น สิ่ง ที่ ทํา ให้ ไม่ สบาย ใจ ใน อุณหภูมิ ต่ํา แต่ ไม่ ควร ก่อ ให้ เกิด ปฏิกิริยา รุนแรง เช่น นี้. สถานการณ์ส่งผลกระทบต่อแรงงานของเรา"
 cyber.830.a: "คณะกรรมการศึกษาการแพทย์"
 cyber.830.b: "ความ ทุกข์ ของ พวก เขา ไม่ ใช่ ความ รับ ผิด ชอบ ของ เรา."
 cyber.830.tooltip: "เพิ่มตัวแปรต่อไปนี้§Y$trait_cybernetic$§!ลักษณะของสายพันธุ์:$TABBED_NEW_LINE$อัลเบเนีย/ อาร์กติก/ ทลันดรา นิสัย:§R-20%§!"
 COLD_METAL_PROJECT: "ประกาศขาย: ท้องฟ้า"
 COLD_METAL_PROJECT_DESC: "ประชากร ที่ อาศัย อยู่ ใน ภูมิ อากาศ ที่ หนาว เหน็บ รายงาน ว่า มี ผู้ ป่วย ด้วย ความ เจ็บ ปวด อย่าง รุนแรง ซึ่ง เกี่ยว ข้อง กับ การ ปลูก สร้าง ภูมิ คุ้ม กัน ทาง ไซเบอร์. การทดลองทางการแพทย์ จะช่วยให้เราเก็บข้อมูลได้มากขึ้น"

 cyber.835.name: "รายงานทางการแพทย์"
 cyber.835.desc: "การ ทดลอง ทาง คลินิก ไม่ อาจ ก่อ ให้ เกิด ความ เกี่ยว พัน อย่าง แน่นอน ระหว่าง การ รับ เอา เครื่อง ไซเบอร์แวร์ เข้า สู่ สภาพ อากาศ เย็น และ อายุ, เพศ, การ ทํา งาน และ การ ปลูก ฝัง ชนิด ที่ ผู้ ป่วย ได้ รับ ผล กระทบ.\n\nผู้ เชี่ยวชาญ ทาง การ แพทย์ บาง คน โต้ แย้ง ว่า ความ เจ็บ ปวด นั้น เป็น โรค ทาง จิต และ การ รักษา ควร จํากัด อยู่ แค่ ยา ยาแก้ปวด และ การ บําบัด ทาง พฤติกรรม. คน อื่น ๆ กระตุ้น เรา ไม่ ให้ ประเมิน ประเด็น นั้น ต่ํา ไป และ แทน ที่ จะ สนับสนุน โครงการ เพื่อ ส่ง เสริม การ รักษา."
 cyber.835.a: "§Y[sky_megacorp.GetName]§! ได้เสนอโอกาสทำเงินให้แก่เรา พวกเขาต้องการโฆษณาผลิตภัณฑ์ล่าสุดของพวกเขา เครื่องดื่มบำรุงกำลังที่เรียกว่า พลาสม่าเควนช์(พลามา ควินช์)\n\nโฆษณาสำหรับเครื่องดื่มจะถูกฉายตรงเข้าสู่สิ่งปลูกฝังสายตาของพลเมืองของเราทุกครั้งที่พวกเขาเหลือบมองขึ้นไปบนท้องฟ้า รายได้ที่เกิดขึ้นสามารถนำไปใช้สำหรับโครงการสาธารณะใด ๆ ก็ได้\n\nแม้ว่าโฆษณาจะบุกรุกพื้นที่ส่วนตัว แต่เราได้รับการรับรองว่าตัวเครื่องดื่มนั้นอร่อยและไม่มีพิษอย่างแน่นอน"
 cyber.835.b: "จัดตั้งโครงการวิจัย"
 cyber.835.c: "ปรับทุกข์ให้เข้ากับดาวที่อุ่นขึ้น"
 cyber.835.tooltip: "เอาส่วนกํากับต่อไปนี้ออกไป§Y$trait_cybernetic$§!ลักษณะของสายพันธุ์:$TABBED_NEW_LINE$อัลเบเนีย/ อาร์กติก/ ทลันดรา นิสัย:§R-20%§!"

 cyber.840.name: "ดื่มพลาสม่าเควนช์!"
 cyber.840.desc: "คนของเราเป็นนักเดินทางมาโดยตลอด คนเร่ร่อน วอนเดอเรอร์ ขณะ ที่ การ เดิน ทาง บาง ครั้ง เป็น วิธี ที่ จะ ไป ถึง จุด หมาย ปลาย ทาง เพราะ เรา เอง ก็ เดิน ทาง ไป ถึง จุด หมาย ปลาย ทาง. การ ต่อ เติม ร่าง กาย ทํา ให้ ไป ถึง โลก ใหม่ ได้ ง่าย ขึ้น แต่ ก็ ทํา ให้ เรา สามารถ สืบ หา คน เหล่า นั้น ที่ อาจ หลง ทาง ไป ไกล เกิน ไป ด้วย. ไม่ใช่ทุกคนที่มีความสุขกับการเปลี่ยนแปลงนี้\n\nมีคนจํานวนมากที่เข้าไปแทรกแซง การฝังตัวของพวกเขา แยกตัวออกจากเครือข่าย เพื่อรักษาความเป็นส่วนตัว สําหรับตอนนี้มันเป็นแนวโน้ม แต่มันอาจจะสร้างปัญหา"
 cyber.840.a: "พวกเขาพูดถูก ห้ามติดตามเทคโนโลยี"
 cyber.840.b: "นี่ไม่ใช่สาเหตุของการเตือนภัย"
 cyber.840.c: "นําเสนอการปลูกถ่ายที่ติดต่อไม่ได้ สําหรับราคา"
 cyber.840.d: "ท้องฟ้าไม่ได้มีไว้ขาย!"

 cyber_wanderers: "นก ที่ ไม่ มี วัน หยุด"
 cyber_wanderers_desc: "แกะรอยยาก หาได้ง่ายทุกที่"
 cyber_wanderers_tracked: "บน เนิน เขา"
 cyber_wanderers_tracked_desc: "มาเจรจาเงื่อนไขกันเถอะ"

 cyber.855.name: "ทํา คะแนน" #Idiom: if you achieve a required score, you 'make the grade'; similar to 'make the cut'
 cyber.855.intro.desc: "ไมโครโปรเซสที่ควบคุมได้ เพิ่มเอไอ ติวเตอร์ นักออกแบบเอนไซม์ เพื่อส่งเสริมการพัฒนาระบบประสาท"
 cyber.855.gov.desc: "$cyber.855.intro.desc$\n\nการรักษาก้าวกับการเปลี่ยนแปลงทางเทคโนโลยี ได้วางภาระหนักให้กับโครงการการศึกษาของรัฐ ช่องว่างของการแสดงจะกว้างขึ้น ระหว่างผู้ที่พึ่งพาการต่อเติมสาธารณะและครัวเรือน ที่สามารถซื้อเทคโนโลยีที่ทันสมัยได้\n\nการรักษาระบบความเที่ยงตรง ต้องการการลงทุนที่สําคัญห้าปี"
 cyber.855.corp.desc: "ไม่สนใจ"
 cyber.855.a: "ราคามันสูงเกินไป"
 cyber.855.b: "การศึกษาต้องยังคงเข้าถึงทุกคน"
 cyber_education: "การ ศึกษา ที่ ได้ รับ ความ เสีย หาย"
 cyber_education.tt: "เราจะเริ่มโครงการ 5 ปี เพื่อส่งเสริมระบบการศึกษาที่ทนทานและไม่เหมาะสม"

 cyber.860.name: "ความ เหนือ กว่า"
 cyber.860.desc: "การลงทุนด้านการศึกษาของเรา ได้รับเงินอย่างงาม\n\nการเข้าถึงระบบไซเบอร์เนติบัณฑิตที่มีคุณภาพสูง ได้ก่อให้เกิดความเหมาะสมทางวิชาการอย่างแท้จริง ซึ่งทุกคน - ไม่ว่าชนชั้นทางสังคมของพวกเขา - ผลประโยชน์ที่สังเกตได้โดยเฉพาะอย่างยิ่งในวิทยาศาสตร ที่ซึ่งงานวิจัยและนวัตกรรม ได้พัฒนาขึ้นในคณะกรรมการ"
 egalitarian_excellence: "ความ เหนือ กว่า"
 egalitarian_excellence.tt: "การมีการศึกษาที่ดี และมีการต่อเติมอย่างเต็มรูปแบบ คือกุญแจสู่ความก้าวหน้าทางสังคมและด้านวัตถุ"

 cyber.865.name: "ผู้นําทางยกเว้น"
 cyber.865.desc: "การ ตัดสิน ใจ ที่ จะ ละ เว้น จาก การ ให้ ทุน ด้าน การ ศึกษา แก่ สาธารณชน ได้ พิสูจน์ แล้ว ว่า เป็น การ สนับสนุน ที่ สุขุม.\n\nสังคมของเราเป็นสังคมที่เชื่อในความเป็นเลิศของแต่ละคน แม้จะมีการวิพากษ์วิจารณ์อย่างแพร่หลายเกี่ยวกับ 'การแบ่งกลุ่ม' การ แข่งขันทางวิชาการมีผลทําให้บางส่วนของผู้นําที่มีการศึกษาสูงและมีประสิทธิภาพในกาแล็กซี่"
 exceptional_leaders: "ผู้นําทางยกเว้น"
 exceptional_leaders.tt: "การพัฒนาความสามารถที่ดีที่สุดของเราในระดับปัจเจก ได้สร้างท่อส่งน้ําสําหรับผู้นําที่มีคุณภาพพิเศษ"

 cyber.1005.name: "ตัวแบ่ง จํากัด"
 cyber.1005.desc: "'อีก'[Species.GetName]- พาดหัวข่าวนี้กลายเป็นเรื่องทั่วไป[Owner.GetAdjective]ชีวิตกีฬา เป็น[GetAthletePlural]การ วิ่ง แข่ง เพื่อ กัน และ กัน โดย มี การ ปรับ เปลี่ยน ที่ ซับ ซ้อน กว่า และ ซับ ซ้อน กว่า นั้น มี ขีด จํากัด ของ การ ออก กําลัง กาย เป็น ประจํา.\n\nขณะที่แฟน ๆ ของ 'นักกีฬา' ยินดีกับผลลัพธ์, จํานวนที่เพิ่มขึ้นของ ผู้อุทิศตัวยากได้เรียกร้องให้คนที่เพิ่ม กลุ่มสุดท้ายต้องการจํากัดจํานวนของการแก้ไขที่แข่งขันในการแข่งขันทีม หมายถึงธรรมชาติ[GetAthletePlural]มักจะมีจุดเด่นเสมอ"
 cyber.1005.a: "พวกไร้พระเกียรติมีเวลาของพวกเขา"
 cyber.1005.a.tt: "สนับสนุนผู้เล่นที่มีการแก้ไขให้ขับเคลื่อนนวัตกรรม"
 cyber.1005.b: "ท้องฟ้าดิจิทัลของเราก็เพียงพอแล้ว"
 cyber.1005.c: "ควบคุมปริมาณของการแก้ไข[GetAthletePlural]."
 cyber_athletes: "เส้น ทาง ไซเบอร์"
 cyber_athletes_desc: "โดยส่งเสริมนักกีฬาที่ถูกดัดแปลงในกีฬา เราสามารถทดสอบการไหลของเลือดในไซเบอร์แวร์"
 cyber_athlete_leagues: "เกม คอมพิวเตอร์"
 cyber_athlete_leagues_desc: "ให้ผู้คนของเราได้มองเห็นอย่างอิสระอีกครั้ง!"
 limited_cyber_athletes: "ช่อง ว่าง ไซเบอร์"
 limited_cyber_athletes_desc: "การปรับจํานวนนักกีฬาที่มีการแก้ไข มั่นใจได้ว่าทุกทีมจะประสบความสําเร็จอย่างแท้จริง"
 athlete_plural: "นักกีฬา"

 cyber.1010.name: "ป้ายโฆษณาดิจิทัล"
 cyber.1010.desc: "เดอะ§Y[sky_megacorp.GetName]§!ได้เสนอโอกาสให้เรา พวก เขา อยาก โฆษณา สินค้า ล่า สุด ของ เขา ซึ่ง เป็น เครื่อง ดื่ม ที่ ให้ ความ สดชื่น แก่ พลาสมา เคว็ง.\n\nโฆษณาสําหรับเครื่องดื่มจะถูกฉาย ตรงเข้าไปในกระดูกหน้าท้องของประชาชน เมื่อไหร่ก็ได้ที่พวกเขาบังเอิญมองขึ้นไปบนท้องฟ้า ราย ได้ ที่ ผลิต ขึ้น สามารถ นํา ไป ใช้ ได้ กับ โครงการ ใด ๆ ของ พลเมือง.\n\nแม้จะมีการใช้โฆษณาอย่างผิดกฎหมาย เราก็ยังมั่นใจได้ว่าเครื่องดื่มนั้น มันอร่อย และไม่ใช่สารพิษเลย"
 cyber.1010.a: "ดื่มพลาสม่า ควินช์!" #Feel free to localize Plasma Quench to sound like a slimy energy drink. No need to make it word for word.
 cyber.1010.b: "ท้องฟ้าไม่ได้มีไว้ขาย"
 cyber.1010.c: "มาต่อรองข้อตกลงกัน"
 cyber.1010.d: "การขายความสนใจเสมือนจริงของพลเมืองเราเป็นการตัดสินใจที่ยอดเยี่ยม!"

 cyber.1015.desc: "เดอะ§Y[sky_megacorp.GetName]§!ได้กลับมาพร้อมกับข้อเสนอใหม่ เกี่ยวกับเครื่องดื่มที่เสริมสวยของกาแล็กซี พลาสมา ควินช์ ตั้งแต่การขายมุมมอง ของคนถูกดัดแปลงของเรา ทํางานออกมาอย่างดี พวกเขาได้เรียกร้องให้ขึ้น โฆษณาเพิ่มเติมในโลกทางกายภาพเช่นกัน\n\n\"[most_populous.GetName]เป็นสถานที่โฆษณาอุดมคติ!\"ประกาศ[sky_megacorp.GetName]คนพูด ที่ จริง เป็น เรื่อง ยุติธรรม กว่า มิ ใช่ หรือ ที่ ทุก คน ควร มี โอกาส อัน เหลือ เชื่อ เช่น นั้น?"
 cyber.1015.a: "ปล่อยพลาสม่าไหล!"
 cyber.1015.a.tt: "เพิ่มป้ายโฆษณาขนาดใหญ่รอบ ๆ§Y[most_populous.GetName]§!."
 cyber.1015.b: "ป้ายโฆณาบนดาวเคราะห์"
 cyber.1015.c: "ให้คนของเราเห็นอิสระอีกครั้ง!"
 sold_sky_1: "กระดานคํานวณดิจิทัล"
 sold_sky_1_desc: "การขายความสนใจที่เสมือนจริงของประชาชน เป็นการตัดสินใจที่ดี!"
 sold_sky_1_mega: "$sold_sky_1$"
 sold_sky_1_mega_desc: "กลุ่มชนชั้นนำของดาวเคราะห์ดวงนี้เลือกที่จะขายท้องฟ้าของพลเมืองเพื่อหาทรัพยากรเพิ่มเติม"
 sold_sky_2: "กระดานบิลเลียดโลก"
 sold_sky_2_desc: "ชนชั้นนําของดาวเคราะห์ดวงนี้ เลือกที่จะขายท้องฟ้าของประชาชนของพวกเขา"
 sold_sky_2_mega: "$sold_sky_2$"
 sold_sky_2_mega_desc: "$sold_sky_2_desc$"

 cyber.1030.name: "ความจําแบบโปร่งแสง"
 cyber.1030.desc: "เนื่อง จาก มี การ ปลูก ฝัง มาก มาย ที่ สามารถ ควบคุม ประสาท สัมผัส และ ประสบการณ์ ทาง อารมณ์ ผู้ คน ที่ เสริม สร้าง จึง หัน ไป หา เหตุ การณ์ ที่ เป็น จริง ใน ชีวิต ว่า เป็น การ ทําลาย และ ความ บันเทิง. ขณะ ที่ ศิลปิน ที่ แต่ง หน้า สามารถ กระตุ้น อารมณ์ ใด ๆ ตาม ทฤษฎี ได้ แต่ กิจ ปฏิบัติ นี้ ได้ เปลี่ยน ไป.\n\nสโมสรความทรงจําเอนแกรมกําลังจ่ายเครดิตสูงสุด สําหรับบันทึกตัวเอง ประสบการณ์ทางอารมณ์ที่รุนแรง เช่น งานแต่งงานและการผสมพันธุ์ นี่ทําให้เกิดอาชญากรรมที่ร้ายแรงขึ้น เพราะอาชญากรทั้งคู่ถูกบันทึกว่าทําผิด รวมถึงการขโมยการปลูกถ่ายเหยื่อ\n\nเรา ควร จัด การ อย่าง ไร ใน เรื่อง นี้?"
 cyber.1030.a: "ปิดอุตสาหกรรม มันอันตรายเกินไป"
 cyber.1030.a.tt: "แทรกความบันเทิงจะถูกผิดกฎหมาย"
 cyber.1030.b: "ด้วยสิ่งปลูกฝังจำนวนมากที่สามารถควบคุมประสบการณ์ทางประสาทสัมผัสและอารมณ์ได้ บุคคลที่ได้รับการดัดแปลงจึงหันไปหาเหตุการณ์ในชีวิตเสมือนจริงเพื่อหลบหนีความเป็นจริงและความบันเทิง แม้ว่าในทางทฤษฎีแล้วศิลปินเอนแกรมสามารถกระตุ้นอารมณ์ใด ๆ ก็ได้ แต่แนวปฏิบัตินี้กลับดำเนินไปในทางที่มืดมน\n\nคลับเอนแกรมความทรงจำกำลังจ่ายเครดิตสูงสุดสำหรับประสบการณ์ทางอารมณ์ที่รุนแรงซึ่งบันทึกด้วยตนเอง เช่น งานแต่งงานและพิธีกรรมการจับคู่ แต่ยังรวมถึงการฆ่าตัวตาย การทำร้ายร่างกาย และการฆาตกรรม สิ่งนี้ทำให้อัตราการก่ออาชญากรรมเพิ่มขึ้น เนื่องจากอาชญากรทั้งบันทึกภาพตัวเองขณะกระทำความผิดและขโมยสิ่งปลูกฝังของเหยื่อหลังจากประสบการณ์ที่กระทบกระเทือนจิตใจ\n\nเราควรจัดการกับกระแสที่น่ากังวลนี้อย่างไร?"
 cyber.1030.b.tt: "จะ มี การ นํา ความ บันเทิง เข้า มา ใช้ เป็น แหล่ง ราย ได้."
 cyber.1030.c: "กักขังคนที่ถูกบันทึก"
 cyber.1030.c.tt: "การบังคับใช้กฎหมายจะพุ่งเป้าไปที่ผู้ที่บันทึกพฤติกรรมอาชญากรรม"
 cyber.1030.d: "ฟังดูน่าเบื่อ ยอมแพ้ซะ"
 cyber.1030.d.tt: "ปิดอุตสาหกรรมนี้ลง มันอันตรายเกินไป"
 cyber.1030.e: "ประสบการณ์ที่ไม่มีที่สิ้นสุดของความตาย? พระเจ้า"
 cyber.1030.e.tt: "การ ทํา เช่น นี้ จะ ทํา ให้ นัก บวช ผู้ เสีย ชีวิต ของ เรา เข้าใจ และ ชี้ นํา ประสบการณ์ ของ ผู้ สําเร็จ ราชการ."
 entertainment_crackdown: "รอยแตกลง"
 entertainment_crackdown_desc: "สื่อ บันเทิง ที่ บันทึก ไว้ ถูก ทํา ให้ ผิด กฎหมาย เพื่อ หลีก เลี่ยง การ ประพฤติ ผิด ทาง อาญา."
 endorsed_entertainment: "ความบันเทิงรูปแบบเอนแกรมจะถูกประกาศให้ผิดกฎหมาย"
 endorsed_entertainment_desc: "การ โฆษณา ชวน เชื่อ"
 illicit_entertainment: "โปรแกรมแทรกของปิดการใช้งาน"
 illicit_entertainment_desc: "กฎหมายใหม่เกี่ยวกับเอนแกรมบันเทิง ทําให้ความชื้นเป็นที่ต้องการบริการ"
 decadent_entertainment: "ทําซ้ําเป็นทศวรรษ"
 decadent_entertainment_desc: "เก็บภาษีการผลิต"
 deadly_entertainment: "ตัว เรียง ที่ ตาย ได้"
 deadly_entertainment_desc: "ตอน นี้ พวก ปุโรหิต ผู้ ตาย ของ เรา สามารถ ประสบ การ คร่า ชีวิต และ การ ตาย. นี่ ช่วย ให้ พวก เขา นํา ทาง ประชาชน โดย เฉพาะ อย่าง ยิ่ง เครื่อง มือ ปรับ อากาศ ของ เรา."

 cyber.1055.name: "เกมเปียงยาง"
 cyber.1055.desc: "ความบันเทิงรูปแบบเอนแกรมจะถูกนำมาใช้เป็นแหล่งรายได้"
 cyber.1055.a: "มันเป็นเวลาที่จะปรับปรุงกองทัพเรืออยู่แล้ว"
 cyber.1055.b: "เพิ่มมาตรการรักษาความปลอดภัยของเครือข่าย"
 cyber.1055.c: "สภาพูดถูก ห้ามเล่นเกม"
 cyber.1055.d: "บอกข้อมูลในรายงานความขัดแย้ง"
 cyber_breach_overcome: "จำคุกใครก็ตามที่ถูกจับได้ว่ามีบันทึกดังกล่าว"
 cyber_breach_overcome_desc: "สิ่งที่ผ่านมาก็คือทํา เราจะทํางานเพื่อปรับปรุงกองเรือของเรา และทําให้แผนผังรั่วไหลไร้ประโยชน์"
 cyber_breach_forgive: "เกมสปีชีส์: ปรับปรุงความปลอดภัย"
 cyber_breach_forgive_desc: "เพื่อตอบโต้การรั่วไหล เราได้ปรับปรุงระบบรักษาความปลอดภัย การ พูด เช่น นี้ ผู้ เล่น เกม ไม่ ก่อ อันตราย ต่อ ความ มั่นคง ของ ชาติ. ไม่ จําเป็น ต้อง แสดง ปฏิกิริยา มาก เกิน ไป ต่อ ความ ผิด พลาด ที่ โง่ เขลา."
 cyber_breach_ban: "เกมสปีชีส์:"
 cyber_breach_ban_desc: "การบังคับใช้กฎหมายจะพุ่งเป้าไปที่ผู้ที่บันทึกพฤติกรรมอาชญากรรม"
 cyber.1055.leak.tt: "สมาชิกทุกตัว§Yชุมชน กาแลกติก§!ได้§Hสื่อ§! §Yทหาร§!ข้อมูลบน§Y[Root.GetName]§!สําหรับ§Y720§!วัน"
 cyber.1055.minorleak.tt: "สมาชิกทุกตัว§Yชุมชน กาแลกติก§!ได้§Rต่ํา§! §Yทหาร§!ข้อมูลบน§Y[Root.GetName]§!สําหรับ§Y360§!วัน"
 has_tradition_subterfuge_tt: "ตัวเลือกนี้ใช้ได้เนื่องจากเราเสร็จสมบูรณ์แล้ว§Yแบบย่อย§!ต้นไม้ตามประเพณี"

 cyber.1205.name: "ฟังดูเสื่อมทรามดี สนับสนุนเลย"
 cyber.1205.desc: "ไซเบอร์แวร์รุ่นล่าสุด ทําให้ผู้ใช้สามารถปิดกั้นความรู้สึกที่ไม่ต้องการได้ จากกลิ่นไม่พึงประสงค์ มาเป็นรูปภาพที่มองไม่เห็น ทุกอย่างสามารถถูกยัดลงดิน ใส่หน้ากาก หรือถูกลบออกไปจากการรับรู้ของผู้ใช้ มีความกังวลที่เพิ่มขึ้นในหมู่กลุ่มอนุรักษ์มากขึ้นในสังคมของเรา เกี่ยวกับผลกระทบของการเซ็นเซอร์ดังกล่าว จะมีต่อจิตสํานึกของประชาชนของเรา"
 cyber.1205.a: "เราต้องเผชิญหน้ากับความจริงของชีวิต"
 cyber.1205.b: "ทุกคนมีสิทธิ์ที่จะมีความสุขกับความโง่เขลา"
 cyber.1205.c: "การปรับเฉดสีเพื่อความสวยงามนั้นทำได้ แต่การเซนเซอร์มีความเสี่ยง"
 cyber.1205.d: "เราจะคัดสรรประสาทสัมผัสของพวกเขาเอง"
 cyber_censure_truth: "การเซนเซอร์ประสาทสัมผัส: ต้องห้าม"
 cyber_censure_truth_desc: "ผู้คนไม่ได้รับอนุญาตให้ใช้ตัวกรองการรับรู้ที่จะปิดกั้นองค์ประกอบในชีวิตจริง ต้องเผชิญหน้ากับความจริงอยู่ตลอดเวลา"
 cyber_censure_total: "การเซนเซอร์ประสาทสัมผัส: ทั้งหมด"
 cyber_censure_total_desc: "หากความจริงทำให้คุณรู้สึกไม่สบายใจ ทำไมไม่ลองปิดกั้นองค์ประกอบที่กวนใจเหล่านั้นไปเสียล่ะ? คุณไม่จำเป็นต้องพบเห็นอาชญากรรม ความทุกข์ยาก หรืออคติอีกต่อไป"
 cyber_censure_partial: "การปรับเฉดสีประสาทสัมผัส"
 cyber_censure_partial_desc: "เราอนุญาตให้ผู้คนใช้การปรับเฉดสีการรับรู้ในอวัยวะเทียมของตนได้ ด้วยวิธีนี้ พวกเขาจะสามารถเติมแต่งสีสันและเอฟเฟกต์อันมีชีวิตชีวาเข้าไปในการดำรงชีวิตที่แสนจืดชืดได้"
 cyber_censure_authoritarian: "การเซนเซอร์ประสาทสัมผัสโดยรัฐ"
 cyber_censure_authoritarian_desc: "เรากำลังคัดสรรวิธีการที่ประชาชนจะรับรู้ความเป็นจริง ด้วยการปิดกั้นข้อความและผู้กระทำความผิดที่ต่อต้านรัฐออกจากชีวิตของพลเมืองผู้ภักดี เราปกป้องพวกเขาจากผู้ที่จะชี้นำพวกเขาไปในทางที่ผิด"

 cyber.1210.name: "ข้อความลอบแฮกจิตใต้สำนึก"
 cyber.1210.desc: "เทรนด์การโฆษณาเมื่อไม่นานมานี้ของขบวนการใต้ดินและบรรษัทที่มีความทะเยอทะยาน คือการปลูกฝังข้อความแอบแฝงเข้าไปในไซเบอร์แวร์ของผู้ใช้ ความทรงจำปลอม การตอบสนองทางฮอร์โมนแบบเฉพาะเจาะจง และการชี้นำขณะหลับกำลังกลายเป็นเรื่องปกติ กลุ่มการเมืองที่กังวลได้หยิบยกประเด็นนี้ขึ้นมาหารือกับเรา และสนับสนุนให้มีการสั่งแบน หรืออย่างน้อยก็ควบคุมข้อความที่รุกล้ำเหล่านี้"
 cyber.1210.a: "การกระทำเช่นนี้ไม่สามารถยอมรับได้"
 cyber.1210.b: "ฉลาดดีนี่! อนุญาตเลย"
 cyber.1210.c: "ออกใบอนุญาตให้กับการกระทำนี้"
 cyber.1210.d: "ใช้มันเพื่อเผยแผ่ความเชื่อ"
 cyber_subliminhack_banned: "การแฮกจิตใต้สำนึก: ต้องห้าม"
 cyber_subliminhack_banned_desc: "เราได้สั่งห้ามการใช้ข้อความใต้สำนึกที่แอบแฝงผ่านไซเบอร์แวร์"
 cyber_subliminhack_allowed: "การแฮกจิตใต้สำนึก: อนุญาต"
 cyber_subliminhack_allowed_desc: "เราได้อนุญาตให้ใช้ข้อความใต้สำนึกที่แอบแฝงผ่านไซเบอร์แวร์ ทุกอย่างยุติธรรมดีในตลาด"
 cyber_subliminhack_licensed: "การแฮกจิตใต้สำนึก: ได้รับใบอนุญาต"
 cyber_subliminhack_licensed_desc: "เรากำลังขายใบอนุญาตเพื่ออนุญาตให้ใช้งานข้อความใต้สำนึกที่แอบแฝงผ่านไซเบอร์แวร์"
 cyber_subliminhack_hallowed: "การเผยแผ่ศาสนาผ่านจิตใต้สำนึก"
 cyber_subliminhack_hallowed_desc: "เรากำลังใช้ข้อความใต้สำนึกที่แอบแฝงผ่านไซเบอร์แวร์เพื่อเผยแผ่ความเชื่อของเรา"

 cyber.1255.name: "การละเมิดความปลอดภัยทางไซเบอร์"
 cyber.1255.intro: "เมื่อไม่นานมานี้ เอกสารลับหลายฉบับถูกดาวน์โหลดอย่างผิดกฎหมายโดยเซิร์ฟเวอร์ระยะไกล เจ้าหน้าที่ฝ่ายความมั่นคงของเรายืนยันว่าไฟร์วอลล์หลักและรองทั้งหมดไม่มีรอยแตกร้าว และจนถึงตอนนี้ยังไม่มีหลักฐานการโจมตีทางไซเบอร์จากภายนอก\n\n"
 cyber.1255.gov.desc: "$cyber.1255.intro$ข้อสรุปที่หลีกเลี่ยงไม่ได้คือ: เรามีข้อมูลรั่วไหล และเมื่อพิจารณาจากลักษณะที่ละเอียดอ่อนของข้อมูลที่ถูกขโมยไป มันจะต้องเป็นใครบางคนที่มีระดับการเข้าถึงข้อมูลขั้นสูง"
 cyber.1255.hack.desc: "$cyber.1255.intro$ข้อสรุปที่หลีกเลี่ยงไม่ได้คือ: เรามีข้อมูลรั่วไหล ซึ่งทำให้การตัดสินใจเปิดรับการเสริมแต่งอวัยวะไซเบอร์เนติกส์แบบโอเพนซอร์สของเราตกเป็นที่เคลือบแคลงสงสัย"
 cyber.1255.a: "เริ่มการสืบสวน"
 leak_investigation: "การสืบสวนข้อมูลรั่วไหล"
 leak_investigation_desc: "เพื่อค้นหาจุดที่รั่วไหล เราจำเป็นต้องสืบสวนทุกคนที่มีอวัยวะเทียมไซเบอร์เนติกส์ กระบวนการนี้มีแนวโน้มที่จะ... รุกล้ำความเป็นส่วนตัว"

 cyber.1260.name: "ศาสตร์ควบคุมระบบประสาท"
 cyber.1260.desc: "การสืบสวนการรั่วไหลของความปลอดภัยทางไซเบอร์ของเราได้ข้อสรุปแล้ว\n\nเจ้าหน้าที่ระดับสูงที่ได้รับการเสริมแต่งภายในรัฐบาลบางรายได้ตกเป็นเป้าหมาย โดยเว็บแวร์ระบบประสาทของพวกเขาถูกแฮก พวกเขาถูกชักใยโดยสายลับภายนอกและถูกบังคับให้กระทำการขัดต่อความประสงค์ของตนเอง บุคคลเหล่านี้ไม่มีความทรงจำเกี่ยวกับเหตุการณ์ดังกล่าวเลย\n\nแม้ตอนนี้เราจะรู้สาเหตุของการรั่วไหลแล้ว แต่เราก็ยังไม่ได้เข้าใกล้การค้นพบว่าใคร - หรืออะไร - เป็นผู้รับผิดชอบหลักเลย อย่างไรก็ตาม ด้วยการลักลอบปลูกฝังข้อมูลเท็จลงในสมองของเจ้าหน้าที่ที่ได้รับผลกระทบ เราอาจสามารถแกะรอยการรั่วไหลกลับไปยังต้นตอของมันได้"
 leak_distrust: "หุ่นเชิดในหมู่พวกเรา"
 leak_distrust_desc: "เราจะคาดหวังให้ประชาชนเลื่อมใสในคณะผู้นำของเราได้อย่างไร เมื่อใครคนใดคนหนึ่งในพวกเราอาจเป็นหุ่นเชิด?"
 leader_trait_hacked: "หุ่นเชิดไซเบอร์"
 leader_trait_hacked_desc: "ผู้นำคนนี้ถูกแทรกแซง โดยเว็บแวร์ระบบประสาทของพวกเขาถูกแฮกจากแหล่งที่ไม่รู้จัก"
 hacked_leaders.tt: "ผู้นำไซบอร์กจำนวนหนึ่งแบบสุ่มจะได้รับคุณลักษณะ §Y$leader_trait_hacked$§!"

 cyber.1265.name: "ผู้ สวม ใส่ จิตใจ" #Playing on the word 'hijacker'
 cyber.1265.desc: "เราจับพวกมันได้แล้ว\n\nอาชญากรที่อยู่เบื้องหลังการโจมตีทางไซเบอร์อย่างที่ไม่เคยมีมาก่อนถูกควบคุมตัวแล้ว พวกที่เรียกตัวเองว่า 'ผู้โจรกรรมความคิด' เหล่านี้ไม่มีเป้าหมายอื่นใดนอกจากการสร้างความโกลาหล และพวกมันสามารถหลบเลี่ยงระบบรักษาความปลอดภัยของเราได้อย่างง่ายดายจนน่าอับอาย แม้ว่าหัวโจกจะถูกควบคุมตัวแล้ว แต่เรายังต้องตัดสินใจว่าจะทำอย่างไรกับเจ้าหน้าที่ของเราที่ถูกแทรกแซงข้อมูล\n\nวิธีที่ง่ายที่สุดคือการติดตั้งไฟร์วอลล์เฉพาะรอบๆ อวัยวะเทียมที่ได้รับผลกระทบ ส่วนทางเลือกที่หมดจดกว่า แต่ก็มีความเสี่ยงสูงกว่า คือการฮาร์ดรีบูต: โดยการเข้าถึงการทำงานของความเข้าใจขั้นพื้นฐาน ผู้นำที่เกี่ยวข้องอาจถูกบังคับให้ 'ปิดตัวลง' ในขณะที่ติดตั้งระบบปฏิบัติการใหม่"
 cyber.1265.a: "สร้างไฟร์วอลล์"
 cyber.1265.b: "รีบูตระบบของเจ้าหน้าที่"
 cyber.1265.c: "พวกเขารู้ตัวแล้ว สร้างกำแพงซะ"

 cyber.1270.name: "รีบูตแล้ว; สดใหม่กว่าเดิม"
 cyber.1270.desc: "การฮาร์ดรีบูตเจ้าหน้าที่ที่ได้รับผลกระทบส่งผลให้เกิดผลลัพธ์ที่คาดไม่ถึงบางประการ: ร่องรอยการแฮกระบบประสาททั้งหมดถูกล้างทำความสะอาด แต่ความรู้และประสบการณ์ที่พวกเขาสะสมมาจำนวนมากก็สูญหายไปด้วยเช่นกัน\n\nแม้จะมีความล่าช้าดังกล่าว แต่ในการ 'เริ่มต้นใหม่' นี้ ผู้นำเหล่านี้รายงานความรู้สึกที่ลึกซึ้งของการได้รับการฟื้นฟูทั้งในด้านหน้าที่การงานและชีวิตส่วนตัว การบีบให้เราต้องใช้มาตรการที่รุนแรงเช่นนี้ แฮกเกอร์อาจช่วยเราโดยไม่ได้ตั้งใจก็เป็นได้"
 rebooted_leaders: "ลบ §Hคุณลักษณะเชิงลบ§! ทั้งหมดจากผู้นำที่มีคุณลักษณะ §Y$leader_trait_hacked$§!\nสำหรับแต่ละคุณลักษณะที่ถูกลบ จะสูญเสียค่าประสบการณ์ §R300§!"
 leader_hack_resolution: "คลี่คลายด้วยความระแวดระวัง"

 cyber.1275.name: "ไฟร์วอลล์ระบบประสาท"
 cyber.1275.desc: "จิตใจของเราปลอดภัยแล้ว\n\nวิศวกรเว็บแวร์ออกแบบไฟร์วอลล์ระบบประสาทได้สำเร็จ เพื่อรักษาความปลอดภัยโดยรวม โปรแกรมจะถูกติดตั้งทันทีในเจ้าหน้าที่ปัจจุบันและในอนาคตทั้งหมด แม้ว่าสิ่งนี้จะส่งผลเสียต่อการทำงานด้านความเข้าใจพื้นฐานของกลุ่มผู้นำของเรา แต่โครงการนี้ก็ได้ให้ข้อมูลเชิงลึกที่สำคัญเกี่ยวกับวิทยาศาสตร์ด้านความปลอดภัยของข้อมูล"
 cyber.1275.a: "ความปลอดภัยต้องมาก่อน"
 leader_trait_firewalled: "ไฟร์วอลล์ระบบประสาท"
 leader_trait_firewalled_desc: "แม้จะปลอดภัยจากการโจมตีทางไซเบอร์ แต่ผู้นำของเราก็เรียนรู้ได้อย่างมีประสิทธิภาพลดลง"
 hacked_and_firewalled_leaders.tt: "ลบคุณลักษณะ §Y$leader_trait_hacked$§! และใช้อัปเกรดคุณลักษณะ §Y$leader_trait_firewalled$§! ให้แก่ผู้นำไซบอร์กทั้งหมด"

# FINAL EVENT #
# DEMOCRATIC
 cyber.1505.name: "สังคม 2.0"
 cyber.1505.desc.individualist: "กระบวนการประชาธิปไตยคือสิ่งที่สังคมนี้ถูกสร้างขึ้นมา จึงเป็นเรื่องสมเหตุสมผลที่จะเสริมสร้างรากฐานนี้ ไซเบอร์เนติกส์ใหม่ของเราช่วยให้เราสามารถลงคะแนนเสียงในเรื่องต่างๆ ของสังคมได้ไม่ว่าจะเล็กหรือใหญ่ มอบโอกาสที่ไม่เคยมีมาก่อนให้กับแต่ละบุคคลในการแสดงความคิดเห็น ข้อมูลอันมหาศาลที่ได้รับมานี้ยากจะจินตนาการ และความเป็นไปได้ต่างๆ นั้นไร้ขีดจำกัด"
 cyber.1505.desc.collectivist: "การเผยแพร่ความคิดของคุณไปยังเพื่อนพ้องชาว §Y[Species.GetNamePlural]§! อย่างเปิดเผยเป็นเรื่องที่น่าตระหนกใจ แต่ความตื่นตระหนกในช่วงแรกจะถูกแทนที่ด้วยความรู้สึกมั่นใจและความแน่นอนต่อสิ่งแวดล้อมรอบตัวเราอย่างรวดเร็ว เรารับรู้ว่าคนข้างๆ กำลังทำอะไร และพวกเขาก็รับรู้ถึงตัวเรา การสื่อสารเกิดขึ้นทันทีโดยไม่ต้องใช้คำพูด เพียงแค่คิดเท่านั้น เพื่อปกป้องความกระจ่างแจ้งของจิตใจนี้ สมองไซเบอร์จึงถูกสั่งให้ทำให้ความรู้สึกต่างๆ เป็นกลาง เกรงว่าความรู้สึกเหล่านั้นจะบดบังสิ่งที่สำคัญไป"
 cyber.1505.desc.neutral: "แม้จะมีการปรึกษาหารือ การลงคะแนนเสียงหลายรอบ และการอภิปรายกันอย่างคึกคักอย่างไม่รู้จบ ชาติก็ยังคงไม่สามารถตัดสินใจเกี่ยวกับทิศทางของสังคมที่ขับเคลื่อนด้วยไซเบอร์ได้ ก่อนที่กระบวนการจะถลำลึกไปสู่ข้อโต้แย้งที่สร้างความแตกแยก คณะผู้นำต้องก้าวเข้ามามีบทบาท\n\nเราสามารถใช้โอกาสนี้เพื่อปรับแต่งไซเบอร์เนติกส์ของเราให้ตอบสนองต่อกระบวนการประชาธิปไตย หรือจะเลือกแนวทางที่ต่างไปจากเดิมอย่างสิ้นเชิงโดยให้ประชาชนแบ่งปันความคิดผ่านไซเบอร์แวร์ของพวกเขา ซึ่งแนวหลังนี้จะกำหนดให้สมองไซเบอร์ต้องสะกดอารมณ์พื้นฐานเพื่อป้องกันไม่ให้ความคิดที่เกิดขึ้นเองอย่างรุนแรงไปรบกวนสภาพแวดล้อมรอบตัว"
 cyber.1505.a: "เปิดใช้งานการลงคะแนนผ่านสมองไซเบอร์แบบเรียลไทม์"
 cyber.1505.a.tt: "$change_auth_tt$ ['concept_auth_cyber_democratic_individualist']\n$unlock_edict_legislative_chorus$"
 cyber.1505.b: "เชื่อมต่อสมองไซเบอร์เพื่อแบ่งปันประสบการณ์"
 cyber.1505.b.tt: "$change_auth_tt$ ['concept_auth_cyber_democratic_collectivist']\n$unlock_edict_self_preservation_override$"
 cyber.1505.c: "$cyber_keep_auth_option$"
 cyber.1505.c.tt: "ในการแสดงความโง่เขลาอันน่าตระหนก นักเรียนนายเรือคนหนึ่งได้ทำข้อมูลลับรั่วไหล ด้วยความเป็นแฟนพันธุ์แท้ของโปรแกรมจำลองการต่อสู้ผ่านเครือข่าย นักเรียนนายเรือคนดังกล่าวได้โต้เถียงกับผู้เล่นคนอื่นเกี่ยวกับความเร็วเชิงมุมของป้อมปืนบนเรือพิฆาตของเรา\n\nเพื่อสนับสนุนจุดยืนของตน นักเรียนนายเรือจึงได้อัปโหลดพิมพ์เขียวที่เป็นความลับหลายฉบับของยานของเรา ซึ่งเป็นเอกสารที่แพร่กระจายไปทั่วเครือข่ายกาแล็กซีอย่างรวดเร็ว แม้ว่าตัวผู้ก่อเหตุจะถูกจัดการแล้ว แต่เสียงในสภากำลังเรียกร้องให้สั่งแบนการเล่นเกมออนไลน์ทั้งหมดอันเป็นผลมาจากเหตุการณ์นี้"

# OLIGARCHIC
 cyber.1510.name: "การจัดโครงสร้างอำนาจใหม่"
 cyber.1510.desc.individualist: "เป็นที่ประจักษ์ชัดแล้วว่าประชากรปรารถนาที่จะโดดเด่นและแข่งขันประชันชัยกัน แผนการของเราที่จะสนับสนุนพฤติกรรมการแข่งขันอันดุเดือดนี้ด้วยระบบที่เปลี่ยนการทำงานให้เหมือนเกม(Gameimation)ซึ่งสัญญาว่าจะให้เกิดการเลื่อนสถานะทางสังคมและรางวัลเล็กๆ น้อยๆ เพื่อแลกกับการเพิ่มผลผลิต จะตอบสนองต่อความต้องการของพวกเขาได้เป็นอย่างดี"
 cyber.1510.desc.collectivist: "การที่ผู้คนรู้สึกถึงความเป็นชุมชนร่วมกันนั้นมีความสำคัญมากกว่าการเลื่อนสถานะทางสังคมของแต่ละบุคคล ดังนั้น แทนที่จะใช้ประโยชน์จากความสามารถในการแข่งขัน เราจะหันมาใช้ประโยชน์จากศักยภาพของสมองเสริมแต่งยามหลับใหล พลังการประมวลผลของมันจะถูกเชื่อมต่อแบบไร้สายไปยังสถานีฐานผ่านทางอัปลิงก์ไซเบอร์เนติกส์ ซึ่งจะส่งงานการประมวลผลไปยังตัวบุคคลตลอดระยะเวลาการพักผ่อน"
 cyber.1510.desc.neutral: "ผู้ใต้ปกครองของเราล้มเหลวในการเลือกจุดยืนระหว่างสังคมที่มีการแข่งขันสูงขึ้นหรือสังคมที่อยู่ร่วมกันแบบชุมชน ในฐานะผู้บังคับบัญชาของพวกเขา ตอนนี้เราจะตัดสินใจเลือกแนวทางปฏิบัติที่ดีที่สุดสำหรับพวกเขาเอง\n\nเราสามารถสร้างระบบการแข่งขันแบบเกมที่การทำผลงานได้ดีกว่าเพื่อนร่วมงานอาจช่วยให้หน้าที่การงานก้าวหน้าขึ้น หรือหันมาควบคุมพลังการประมวลผลของทั้งชุมชนผ่านทางอัปลิงก์ไซเบอร์เนติกส์เพื่อเชื่อมต่อสมองที่กำลังหลับใหลของพวกเขาเข้ากับฟาร์มเซิร์ฟเวอร์ของเรา"
 cyber.1510.a: "ปล่อยให้พวกเขาต่อสู้แย่งชิงผลงาน"
 cyber.1510.a.tt: "$change_auth_tt$ ['concept_auth_cyber_oligarchic_individualist']\n$unlock_edict_battle_royale$"
 cyber.1510.b: "บังคับให้พวกเขาทำงานยามหลับใหล"
 cyber.1510.b.tt: "เสริมความแข็งแกร่งให้กับมาตรการความปลอดภัยเครือข่ายของเรา"
 cyber.1510.c: "$cyber_keep_auth_option$"
 cyber.1510.c.tt: "$keep_auth_tt$ ['concept_auth_oligarchic']"

# DICTATORIAL
 cyber.1515.name: "การควบคุมฝูงชน"
 cyber.1515.desc.individualist: "ชาว §Y[Species.GetAdj]§! กำลังเปิดรับโลกที่ผู้ได้รับการเสริมแต่งสามารถแสดงตัวตนของตนออกมาในรูปแบบใหม่เอี่ยม\n\nแต่ความผ่อนปรนนี้เป็นเพียงฉากหน้าเท่านั้น เนื่องจากอัลกอริทึมการสอดแนมขั้นสูงภายในชิ้นส่วนเสริมแต่งกำลังตรวจสอบทุกคน โดยตรวจจับความคิดที่ต่อต้านรัฐได้ทันทีที่จุดประสานประสาทในสมองเชื่อมต่อกัน"
 cyber.1515.desc.collectivist: "มีความแข็งแกร่งในจำนวนคนที่มากและมีแรงผลักดันที่เป็นเอกภาพเมื่อเผชิญหน้ากับความทุกข์ยาก ชาว §Y[Species.GetAdj]§! ที่ได้รับการเสริมแต่งไซเบอร์ทุกคนร่วมมือร่วมใจกันต่อสู้เพื่ออนาคตที่ดีกว่า โดยไว้วางใจให้คนที่อยู่เคียงข้างทำเช่นเดียวกัน\n\nประชาชนของเราสามารถพักผ่อนได้อย่างอุ่นใจด้วยความรู้ที่ว่าบุคลิกอันสว่างไสวของ §Y[Ruler.GetTitle] [Ruler.GetName]§! ผู้มีจิตใจแน่วแน่ดั่งเหล็กกล้ากำลังนำทางพวกเขาต่อไป"
 cyber.1515.desc.neutral: "ในขณะที่ประชาชนยังคงลังเลใจอยู่ตรงทางแยก §Y[Ruler.GetTitle] [Ruler.GetName]§! ของเราต้องคว้าโอกาสพิเศษนี้ที่มาพร้อมกับการเสริมแต่งร่างกายและทำการตัดสินใจ\n\nเราควรจะปล่อยให้ผู้คนมีเสรีภาพส่วนบุคคลบ้างพร้อมทั้งคอยสอดส่องพวกเขาผ่านทางชิ้นส่วนเสริมแต่ง หรือให้พวกเขาได้รับอิทธิพลจากความประสงค์ของบุคลิกภาพอันเจิดจรัสของผู้นำดี?"
 cyber.1515.a: "ให้อิสรภาพปานกลางควบคู่กับการสอดแนม"
 cyber.1515.a.tt: "กลบเกลื่อนข้อมูลกรองด้วยรายงานที่ขัดแย้งกัน"
 cyber.1515.b: "ผู้นำของเราจะนำทางเราเอง"
 cyber.1515.b.official.tt: "$change_auth_tt$ ['concept_auth_cyber_dictatorial_collectivist_official']\n$unlock_edict_love_letter_virus$"
 cyber.1515.b.commander.tt: "$change_auth_tt$ ['concept_auth_cyber_dictatorial_collectivist_commander']\n$unlock_edict_love_letter_virus$"
 cyber.1515.b.scientist.tt: "$change_auth_tt$ ['concept_auth_cyber_dictatorial_collectivist_scientist']\n$unlock_edict_love_letter_virus$"
 cyber.1515.b.vacant.tt: "เกมจารกรรม: การปรับปรุงกองยานให้ทันสมัย"
 cyber.1515.c: "$cyber_keep_auth_option$"
 cyber.1515.c.tt: "$keep_auth_tt$ ['concept_auth_dictatorial']"

# IMPERIAL
 cyber.1520.name: "ขอจักรวรรดิจงทรงพระเจริญ"
 cyber.1520.desc.individualist: "ราชบัลลังก์ได้มีพระบรมราชโองการให้มุ่งเน้นความพยายามของเราไปที่ราชวงศ์ ชิปพิเศษ §Y$r_the_rulerchip$§! จะถูกฝังไว้ในตัวผู้ปกครองในอนาคตทุกคนเพื่อบันทึกและส่งต่อประสบการณ์ในฐานะ [root.GetRulerTitle] แห่ง §Y[root.GetName]§! ชิปโบราณวัตถุนี้จะถูกส่งต่อไปยังรัชทายาทเมื่อผู้ปกครองล่วงลับ\n\nเมื่อ $r_the_rulerchip$ ถูกส่งต่อจากรุ่นสู่รุ่น คลังประสบการณ์อันกว้างใหญ่ของมันจะกลายเป็นบันทึกรากฐานของสังคมเรา นอกจากนี้เรายังสามารถนำสิ่งที่ประชากรเรียนรู้มาใช้ประโยชน์เพื่อเกื้อหนุนผู้นำของเราได้อีกด้วย"
 cyber.1520.desc.collectivist: "เพื่อมอบความผ่อนคลายจากการตรากตรำทำงานให้กับพลเมืองในจักรวรรดิ ต้องสร้าง §Y$building_cyberdome$§! ขนาดใหญ่ขึ้นบน §Y[root.Capital.GetName]§! มันจะทำหน้าที่เป็นสถานที่อันรุ่งโรจน์สำหรับกีฬาไซเบอร์รูปแบบใหม่ ที่ซึ่งเหล่านักกีฬาเสริมแต่งจะแข่งขันกันเพื่อชิงความโปรดปรานและความชื่นชมจากเรา การได้เห็นการแข่งขันอันดุเดือดเช่นนี้ย่อมสร้างความกระปรี้กระเปร่าให้แก่ฝูงชนและความชื่นชมต่อ §Y[root.GetName]§! อย่างแน่นอน\n\nยิ่งไปกว่านั้น การแสดงเหล่านั้นยังสามารถถ่ายทอดผ่านระบบประสาทตรงเข้าสู่สมองไซเบอร์ได้ ซึ่งจะกระตุ้นให้ฝูงชนเดินทางไปที่ [root.Capital.GetName] และสัมผัสกับความตื่นเต้นเร้าใจของการแข่งขันโดยตรง"
 cyber.1520.desc.neutral: "ความก้าวหน้าทางสังคมของเราในด้านไซเบอร์เนติกส์กำลังอยู่ในช่วงหัวเลี้ยวหัวต่อ เราสามารถมุ่งเน้นความพยายามของเราเพื่อประโยชน์ของคนกลุ่มน้อยหรือคนหมู่มาก ซึ่งทั้งสองแนวทางจะตอบสนองต่อผลประโยชน์ของ §Y[root.GetName]§! ได้เป็นอย่างดี\n\nการพัฒนาชิ้นส่วนฝังเฉพาะทางจะช่วยให้เราสามารถส่งต่อประสบการณ์ของ [root.GetRulerTitle] ไปยังทายาทได้ การเน้นไปที่กีฬาไซเบอร์เสริมแต่งและเทคโนโลยีการกระจายเสียงจะช่วยให้เราสามารถจัดการแสดงอันงดงามบนเมืองหลวง [root.Capital.GetName] ของเราได้"
 cyber.1520.a: "รักษาความรู้แห่งราชวงศ์"
 cyber.1520.a.tt: "$change_auth_tt$ ['concept_auth_cyber_imperial_individualist']\n$create_relic_the_rulerchip$\n$unlock_edict_levied_experience$"
 cyber.1520.b: "เป็นเจ้าภาพและแพร่ภาพกีฬาไซเบอร์ที่เมืองหลวง"
 cyber.1520.b.tt: "$change_auth_tt$ ['concept_auth_cyber_imperial_collectivist']\n$unlock_building_cyberdome$\n$unlock_edict_neurocasted_spectacles$"
 cyber.1520.c: "$cyber_keep_auth_option$"
 cyber.1520.c.tt: "$keep_auth_tt$ ['concept_auth_imperial']"

# CORPORATE
 cyber.1525.name: "บริษัทอวัยวะเทียม จำกัด"
 cyber.1525.desc.individualist: "กลุ่มเป้าหมายชาว §Y[Species.GetAdj]§! กำลังตอบสนองในเชิงบวกต่ออวัยวะเทียมดวงตาแบบใหม่ แผนกวิเคราะห์ของเราชี้ให้เห็นถึงการเพิ่มขึ้นของประสิทธิภาพโฆษณาอย่างเด่นชัดและยอดขายที่เพิ่มขึ้นอย่างรวดเร็วในพอร์ตสินค้าทั้งหมดของเรา สิ่งนี้แสดงให้เห็นถึงศักยภาพอันมหาศาลสำหรับการเปิดตัวผลิตภัณฑ์เต็มรูปแบบที่กำลังจะมาถึง\n\nยุคสมัยแห่งไซเบอร์เนติกส์มาถึงแล้ว และเราพร้อมอย่างเต็มที่ที่จะแสวงหากำไรจากมันด้วยกลยุทธ์ของบริษัทที่ได้รับการปรับปรุงใหม่"
 cyber.1525.desc.collectivist: "ความมุ่งมั่นของเราในการปรับปรุงตนเองแบบองค์รวมกำลังส่งผลกระทบต่อประชากรทั่วไป\n\nการใส่ใจในข้อกังวลทางเศรษฐกิจและสังคมสอดคล้องกับวิสัยทัศน์ขององค์กรเรา เพื่อให้มั่นใจว่าจะมีการแนะนำอวัยวะเทียมรุ่นใหม่ๆ ที่จำเป็นอยู่เสมอ"
 cyber.1525.desc.neutral: "เมื่อพิจารณาถึงการเปลี่ยนแปลงอันยิ่งใหญ่ที่เทคโนโลยีไซเบอร์เนติกส์นำเข้ามาสู่สังคม จึงไม่ใช่เรื่องแปลกใจเลยที่ผู้บริโภคทั่วไปจะลังเลว่าควรเลือกทิศทางใด ความแตกต่างส่วนบุคคลจะกลายเป็นมาตรฐานของเรา หรือควรเน้นไปที่ความเป็นอยู่ที่ดีร่วมกันของส่วนรวม?\n\nการตัดสินใจที่สำคัญและไม่เหมือนใครนี้ย่อมส่งผลกระทบที่กว้างไกลอย่างแน่นอน แต่ความไม่เด็ดขาดคือจุดจบของกำไร การตัดสินใจเลือกเป็นสิ่งจำเป็น"
 cyber.1525.a: "เปิดตัวอวัยวะเทียมแบบมีโฆษณาสนับสนุน"
 cyber.1525.a.tt: "$change_auth_tt$ ['concept_auth_cyber_corporate_individualist']\n$unlock_edict_customer_insights$"
 cyber.1525.b: "เริ่มดำเนินการอัปเกรดอวัยวะเทียมอย่างทั่วถึง"
 cyber.1525.b.tt: "$change_auth_tt$ ['concept_auth_cyber_corporate_collectivist']\n$unlock_edict_rolling_updates$\n$unlock_agenda_augmentation_product_launch$"
 cyber.1525.c: "นอกเหนือจากการเสริมความปลอดภัยในการปฏิบัติงานของเราแล้ว เรายังได้สั่งแบนเกมผ่านระบบเครือข่ายอีกด้วย"
 cyber.1525.c.tt: "$keep_auth_tt$ ['concept_auth_corporate']"

