 auth_cyber_hive_volitional: "ไฮฟ์เชิงเจตจำนง"
 auth_cyber_hive_volitional_desc: "โดรนแต่ละตัวคือหนึ่งปัจเจก ทุกความคิดคือมุมมองใหม่ให้กลุ่มส่วนรวมได้พิจารณา จิตใจนับไม่ถ้วนร่วมกันสร้างไฮฟ์ที่ยิ่งใหญ่กว่าผลรวมของส่วนประกอบต่างๆ อย่างมหาศาล"
