 situation_cyberization_hive_triggered_modifier: "เพิ่มตัวปรับแต่งสถานการณ์ §Y$situation_cyberization_hive$§! แล้ว:\n"

 triggered_opinion_hive_integrated: "ไฮฟ์แบบบูรณาการ"
 cyber_hive_imperfect_drones: "โดรนที่ไม่สมบูรณ์"
 cyber_hive_imperfect_drones_desc: "ทุกคนมีประโยชน์"
 cyber_hive_recycling_implants: "การรีไซเคิลอวัยวะเทียม"
 cyber_hive_recycling_implants_desc: "อวัยวะเทียมเก่าสำหรับโดรนตัวใหม่"
 cyber_hive_recycling_everything: "ประสิทธิภาพอันโหดร้าย"
 cyber_hive_recycling_everything_desc: "ไม่มีสิ่งใดศักดิ์สิทธิ์ ไม่มีสิ่งใดถูกสูญเปล่า"
 cyber_hive_cyber_babies: "เยาวชนไซเบอร์เนติกส์"
 cyber_hive_cyber_babies_desc: "โดรนตัวใหม่จะได้รับการติดตั้งอวัยวะเทียมระหว่างการวางไข่"
 cyber_hive_no_cyber_babies: "การแปรสภาพเป็นไซเบอร์ทีละน้อย"
 cyber_hive_no_cyber_babies_desc: "อวัยวะเทียมจะถูกติดตั้งอย่างค่อยเป็นค่อยไป เพื่อลดความเสียหายที่จะเกิดกับโดรนที่ยังพัฒนาไม่เต็มที่"
 cyber_hive_no_individual_drones: "สั่งห้ามการแสดงความเป็นปัจเจก"
 cyber_hive_no_individual_drones_desc: "ห้ามการระบุตัวตนส่วนบุคคลทุกประเภทโดยเด็ดขาด"
 cyber_hive_individual_drones: "การแสดงออกส่วนบุคคล"
 cyber_hive_individual_drones_desc: "โดรนได้รับอนุญาตให้แสดงออกความเป็นปัจเจกของตนเอง"
 cyber_hive_individual_leader_drones: "การแสดงออกส่วนบุคคลแบบจำกัด"
 cyber_hive_individual_leader_drones_desc: "มอบของขวัญที่หาได้ยากที่สุดให้แก่โดรนที่ดีที่สุดของเรา: ความตระหนักรู้ในตนเอง"

