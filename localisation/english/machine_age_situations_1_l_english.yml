### EDICTS ###
 edict_hive_mind_outreach: "โครงการประสานจิตแห่งไฮฟ์มายด์"
 edict_hive_mind_outreach_desc: "เจตจำนงของจิตใจที่แน่วแน่เคลื่อนที่ได้เร็วกว่าความเร็วแสง"
 concept_edict_hive_mind_outreach: "$edict_hive_mind_outreach$"
 edict_hive_hyper_stimulants: "สารกระตุ้นขั้นสูง"
 edict_hive_hyper_stimulants_desc: "อวัยวะเทียมไซเบอร์เนติกส์จะจ่ายสารกระตุ้นเพื่อเพิ่มประสิทธิภาพการทำงานให้แก่โดรนของเราโดยอัตโนมัติ"
 concept_edict_hive_hyper_stimulants: "$edict_hive_hyper_stimulants$"
 edict_hive_mega_construction: "เมกะโปรเจกต์แบบบูรณาการ"
 edict_hive_mega_construction_desc: "ประกาศฉบับนี้จะจัดสรรทรัพยากรเพิ่มเติมให้กับโครงการวิศวกรรมยักษ์ใหญ่ของเรา ซึ่งจะช่วยเร่งการก่อสร้างสิ่งปลูกสร้างทางดาราศาสตร์ใหม่ๆ"
 concept_edict_hive_mega_construction: "$edict_hive_mega_construction$"

# CYBERIZATION STAGE 1
 cyber.2100.name: "หลากร่างกาย หนึ่งจุดประสงค์"
 cyber.2100.desc: "ในขณะที่เราขบคิดเกี่ยวกับธรรมชาติของการเสริมแต่งร่างกาย เราพบว่าตนเองกำลังสำรวจความทะยอมทะยานของเรา\n\nการแปรสภาพเป็นไซเบอร์เป็นหนทางไปสู่จุดหมาย: วิธีเพิ่มประสิทธิภาพของร่างกายเพื่อให้ตอบสนองต่อเจตจำนงของเราได้ดีขึ้น การเสริมแต่งร่างกายรูปแบบต่างๆ นานาเป็นสิ่งที่เป็นไปได้ ซึ่งแต่ละอย่างก็นำพาความแข็งแกร่งใหม่ๆ มาให้ แต่ก็มาพร้อมกับความต้องการเช่นกัน แขนขาจักรกลมีน้ำหนักมาก สมองไซเบอร์ต้องการพลังงานมากขึ้น และส่วนประกอบที่บอบบางก็ต้องการการบำรุงรักษาอย่างต่อเนื่อง บนเส้นทางสู่ความสมบูรณ์แบบนี้ มีความจำเป็นต้องทำการตัดสินใจเลือก\n\nอะไรคือเป้าหมายหลักของความทะเยอทะยานของเรา เป้าหมายเดียวที่ต้องการการก้าวข้ามขีดจำกัดของ [Owner.Species.GetFleshTypeCyberCreed] เพื่อยื่น [owner.GetSpeciesHandName] โลหะออกไปทั่วฟากฟ้า?"
 cyber.2100.a: "ความเข้าใจ"
 cyber.2100.a.tt: "มุ่งเน้นการวิจัยไปที่การทำให้โดรนของเราฉลาดขึ้น"
 cyber.2100.b: "การครอบครองอำนาจ"
 cyber.2100.b.tt: "มุ่งเน้นการวิจัยไปที่การทำให้โดรนของเรากลายเป็นเครื่องมือในการทำสงคราม"
 cyber.2100.c: "ความอุดมสมบูรณ์"
 cyber.2100.c.tt: "มุ่งเน้นการวิจัยไปที่การทำให้โดรนของเราผลิตผลงานได้มากขึ้น"

# CYBERIZATION STAGE 2
 cyber.2200.name: "หนึ่งเป้าหมาย: การเสริมแต่งร่างกาย"
 cyber.2200.desc: "ในขณะที่การไตร่ตรองเริ่มกลายเป็นแผนการที่เป็นรูปธรรม ความจำเป็นเร่งด่วนก็เกิดขึ้น: พื้นที่สำหรับการทดลองที่สามารถทดสอบและสร้างต้นแบบไซเบอร์เนติกส์ได้\n\nเราจะจัดตั้ง $building_augmentation_center$ ขึ้น เพื่อให้เราสามารถแยกชิ้นส่วน [Owner.Species.GetFleshTypeCyberCreed] ของเราออกและถักทอมันเข้าด้วยกันใหม่ด้วยโลหะและความฝัน"
 cyber.2200.a: "ถึงเวลาเริ่มสร้างอนาคตของเราแล้ว"
 cyber.2200.a.tt: "§Rต้องการการดำเนินการ:§!\nสร้าง $building_augmentation_center$ เพื่อดำเนินการสถานการณ์ §Y$situation_cyberization_hive$§! ต่อ\n\nแต่ละ $building_augmentation_center$ มอบตำแหน่งงาน $job_augmentor_drone_with_icon$ §G+200§! ตำแหน่ง\n\n$job_augmentor_drone_research_effect_desc$"

 cyber.2205.name: "หลากต้นแบบ หนึ่งทางเลือก"
 cyber.2205.desc: "การวิจัยด้านไซเบอร์เนติกส์ของเราได้สร้างต้นแบบไซบอร์กที่มีแนวโน้มดีหลายแบบเพื่อให้เราพิจารณา ผลลัพธ์เบื้องต้นแสดงให้เห็นว่าต้นแบบบางแบบมีความเป็นเลิศในด้านการออกแรงทางกายภาพ ในขณะที่แบบอื่นๆ เหมาะกับงานที่ละเอียดอ่อนมากกว่า แต่ละแบบมีจุดแข็งและข้อจำกัดของตัวเอง โดยไม่มีแบบใดที่แสดงให้เห็นถึงความเหนือกว่าอย่างชัดเจน\n\nข้อเสนอที่น่าหวั่นใจเกิดขึ้นในใจของเรา: บางที เราอาจทำให้โดรนของเรามีความหลากหลายได้หรือไม่? ปรับแต่งร่างกายของเราในรูปแบบที่แตกต่างกันไปตามหน้าที่การทำงานของพวกเขา? เราจะไม่เหมือนกันทุกประการอีกต่อไป ซึ่งเป็นแนวคิดที่เรายากจะทำความเข้าใจ แต่การเพิ่มขึ้นของประสิทธิภาพอาจคุ้มค่ากับการสูญเสียความปรองดองนี้ไป"
 cyber.2205.a: "เลือกต้นแบบที่หลากหลาย"
 cyber.2205.b: "เลือกต้นแบบเดียวที่ครบเครื่อง"

 cyber.2220.name: "หนึ่งในพวกเรา?"
 cyber.2220.desc: "การประกอบโดรนในบางครั้งอาจส่งผลให้ได้ร่างกายที่มีข้อบกพร่อง โดยปกติโดรนที่ผิดรูปจะถูกกำจัดทิ้ง แต่ด้วยอวัยวะเทียมไซเบอร์เนติกส์ พวกเขาจะสามารถเข้าร่วมกับกองกำลังของเราได้ การเพิ่มจำนวนประชากรเป็นสิ่งที่พึงประสงค์ แต่โดรนที่มีข้อบกพร่องจำเป็นต้องได้รับการติดตั้งอวัยวะเทียมที่ปรับแต่งเฉพาะบุคคลตามความรุนแรงของปัญหา ไฮฟ์ของเราจะเติบโตเร็วขึ้น แต่ก็จะมีความ... ไม่สมบูรณ์แบบมากขึ้นด้วย"
 cyber.2220.a: "ความสามัคคีคือพลัง"
 cyber.2220.b: "ไฮฟ์ที่ไม่สมบูรณ์คือไฮฟ์ที่อ่อนแอ"

 cyber.2260.name: "หนึ่งปัญหาที่มองไม่เห็น"
 cyber.2260.desc: "กลุ่มตัวอย่างทดสอบของเราจำนวนเล็กน้อยกำลังเผชิญกับการต่อต้านการเสริมแต่ง ร่างกายของพวกเขากำลังปฏิเสธอวัยวะเทียม ซึ่งทำให้เกิดผลข้างเคียงที่เป็นอันตรายถึงชีวิต สาเหตุดูเหมือนจะเป็นความบกพร่องทางพันธุกรรมที่ไม่เคยสังเกตเห็นมาก่อน จากการคำนวณเบื้องต้น สิ่งนี้ส่งผลกระทบต่อประชากรโดรนของเราประมาณ 5%\n\nหลังจากระบุปัญหาได้แล้ว ตอนนี้เราสามารถคัดกรองโดรนของเราเพื่อป้องกันปัญหานี้ได้ แต่เรายังไม่รู้ว่าจะทำอย่างไรกับประชากรที่ได้รับผลกระทบดี"
 cyber.2260.a: "คัดโดรนที่มีข้อบกพร่องออก"
 cyber.2260.a.tt: "ความเร็วความคืบหน้าของสถานการณ์ §Y$situation_cyberization_hive$§! เป็นเวลา §Y1§! ปี: §G+20%§!"
 cyber.2260.b: "ติดตั้งอวัยวะเทียมแบบจำกัดให้แก่โดรนที่มีข้อบกพร่อง"
 cyber.2260.b.tt: "ในระหว่างการแปรสภาพเป็นไซเบอร์ 5% ของประชากรจะได้รับคุณลักษณะ §Y$trait_limited_cybernetic$§! แทนคุณลักษณะ §Y$trait_cybernetic$§!"
 cyber.2260.c: "วิจัยทางเลือกอวัยวะเทียมอื่น"
 cyber.2260.c.tt: "ความเร็วความคืบหน้าของสถานการณ์ §Y$situation_cyberization_hive$§! เป็นเวลา §Y5§! ปี: §R-50%§!"

# CYBERIZATION STAGE 3
 cyber.2300.name: "หลากโดรน หนึ่งแผนการ"
 cyber.2300.desc: "ต้นแบบไซบอร์กของเราได้รับการอนุมัติแล้ว และ §Y$building_augmentation_center$§! ก็ได้ถูกสร้างขึ้นแล้ว แผนงานของเราพร้อมแล้ว แต่โลจิสติกส์การแปรสภาพของเรายังไม่เสร็จสิ้น\n\nเราสามารถสั่งให้โดรนทั้งหมดของเรามุ่งหน้าไปยัง $building_augmentation_center$ และเข้ารับขั้นตอนการแปรสภาพโดยระงับกิจกรรมประจำวันของพวกเขาไว้ กระบวนการนี้จะรวดเร็วมาก แต่จะทำให้โรงงานของเราว่างเปล่าจนกว่าจะเสร็จสิ้น หรืออีกทางเลือกหนึ่งคือเราสามารถทำงานตามตารางเวลาของโดรน โดยเปลี่ยนพวกเขาให้เป็นไซบอร์กระหว่างช่วงพักผ่อนภาคบังคับเพื่อไม่ให้ส่งผลกระทบต่อกิจกรรมของพวกเขา แม้จะช้ากว่า แต่แผนนี้สร้างความชะงักงันน้อยกว่า"
 cyber.2300.shared.tt: "$job_augmentor_drone_assembly_effect_desc$\n\nความเร็วในการเสริมแต่งขึ้นอยู่กับแนวทางปฏิบัติของสถานการณ์และจำนวนสิ่งปลูกสร้าง $building_augmentation_center$"
 cyber.2300.a: "ให้ความสำคัญกับการแปรสภาพเป็นไซเบอร์เป็นอันดับแรก"
 cyber.2300.a.tt: "ประชากรที่แปรสภาพเป็นไซเบอร์ในแต่ละเดือน: §G+200§!\n$situation_cyberization_hive_triggered_modifier$ทรัพยากรรายเดือน: §R-5%§!\n\n$cyber.2300.shared.tt$"
 cyber.2300.b: "อย่ารบกวนความเป็นระเบียบเรียบร้อยของเรา"
 cyber.2300.b.tt: "ประชากรที่แปรสภาพเป็นไซเบอร์ในแต่ละเดือน: §R-100§!\n$situation_cyberization_hive_triggered_modifier$จํานวนตัวอักษรที่จะแทนที่รายเดือน: §G+5%§!\n\n$cyber.2300.shared.tt$"

 cyber.2320.name: "คนหมู่มากที่เกรงกลัวหนึ่งเดียว"
 cyber.2320.desc: "จักรวรรดิที่ประกอบด้วยสิ่งมีชีวิตเดี่ยวๆ เฝ้ามองเราด้วยความหวาดระแวง และกลัวในความเป็นพหุของเรา ด้วยอวัยวะเทียมไซเบอร์เนติกส์ เราสามารถทำให้ทูตของเรามีใบหน้าและบุคลิกภาพที่โดดเด่นยิ่งขึ้น นำเสนอฉากหน้าที่ดูเหมือนกันน้อยลง\n\nพวกที่ไม่มีความปรองดองร่วมกันจะชื่นชมในความพยายามนี้ พวกเขาอาจเริ่ม... เห็นอกเห็นใจเรา และมองว่าเราเป็นหนึ่งในพวกของพวกเขาด้วยซ้ำ"
 cyber.2320.a: "น่าขยะแขยง"
 cyber.2320.b: "การเสียสละที่คุ้มค่า"
 cyber.2320.b.tt: "เพิ่มทัศนคติของจักรวรรดิที่ไม่ใช่เกสตัลต์ต่อเรา"
 cyber.2320.c: "ทำให้ทูตของเราเหมือนกันทุกประการจนน่าขนลุกยิ่งขึ้น"
 cyber.2320.c.tt: "ลดทัศนคติของจักรวรรดิที่ไม่ใช่เกสตัลต์ต่อเรา"

 cyber.2360.name: "หนึ่งประชากร สองกลุ่ม"
 cyber.2360.desc: "การแปรสภาพเป็นไซเบอร์ของไฮฟ์ของเรากำลังดำเนินไปอย่างราบรื่น ขณะนี้ประชากรส่วนหนึ่งของเราใช้อวัยวะเทียมไซเบอร์เนติกส์ ในขณะที่ส่วนอื่นยังคงเป็นชีวภาพโดยสมบูรณ์ เราไม่เคยเผชิญกับความแตกต่างที่เด่นชัดระหว่างตัวตนของเราเช่นนี้มากก่อน ตอนนี้โดรนสามารถระบุได้ว่าตนเองเป็นส่วนหนึ่งของกลุ่มใดกลุ่มหนึ่ง และการแบ่งแยกนี้กำลังขยายความตระหนักรู้ในความเป็นปัจเจกของพวกเขา\n\nโดรนบางตัวเริ่มประดับประดาตนเองด้วยเครื่องประดับเล็กๆ น้อยๆ หรือระบายสีสัญลักษณ์บนอวัยวะเทียมเพื่อจำแนกแยกแยะความแตกต่างกัน มันเป็นการพัฒนาที่น่าสนใจแต่ก็น่าหวั่นใจยิ่งนัก"
 cyber.2360.a: "ส่งเสริมการพัฒนานี้"
 cyber.2360.b: "สั่งห้ามการระบุตัวตนส่วนบุคคล"
 cyber.2360.c: "จำกัดการใช้สัญลักษณ์ส่วนบุคคลเฉพาะผู้นำเท่านั้น"

# CYBERIZATION STAGE 4
 cyber.2400.name: "หลากความคิด หนึ่งสมอง"
 cyber.2400.desc: "การติดตั้งอุปกรณ์ฝังประสาทในโดรนของเรานำไปสู่ผลลัพธ์ที่คาดไม่ถึง: เนื่องจากสมองของพวกเขาในตอนนี้เป็นไซเบอร์เนติกส์บางส่วน พวกเขาจึงสามารถสร้างความคิดเฉพาะตนแยกออกจากจิตสำนึกหลักของเราได้\n\nเราสามารถพัฒนาเทคโนโลยีนี้เพิ่มเติม เพื่อปรับปรุงความสามารถในการคิดอย่างอิสระของโดรนของเรา"
 cyber.2400.a: "ปล่อยให้โดรนของเราคิดด้วยตนเอง"
 cyber.2400.b: "ความเป็นปัจเจกคือภัยคุกคามต่อความสามัคคีของเรา"

 cyber.2420.name: "หนึ่งจุดจบสำหรับทุกคน"
 cyber.2420.desc: "อวัยวะเทียมไซเบอร์เนติกส์กำลังทำให้การจัดการความตายมีความซับซ้อนขึ้น\n\nการถอดอวัยวะเทียมออกจากโดรนที่เสียชีวิตจะช่วยให้เราสามารถนำเทคโนโลยีนี้กลับมาใช้ใหม่ได้ ซึ่งจะช่วยลดปริมาณขยะ กระบวนการกำจัดของเสียทั้งหมดของเราจะต้องได้รับการปรับปรุงใหม่เพื่อรองรับขั้นตอนใหม่นี้ ซึ่งต้นทุนทรัพยากรนั้นสูงมาก"
 cyber.2420.a: "รีไซเคิลอวัยวะเทียม"
 cyber.2420.b: "ไม่คุ้มค่าใช้จ่าย"
 cyber.2420.c: "รีไซเคิลทั้งอวัยวะเทียม... และร่างกาย"

 cyber.2460.name: "อวัยวะเทียมเพื่อหนึ่งชั่วชีวิต"
 cyber.2460.desc: "ประชากรปัจจุบันของเรากำลังแปรสภาพเป็นไซเบอร์ในอัตราคงที่ แต่เราต้องสร้างกระบวนการสำหรับผู้ที่ยังไม่เกิดด้วย\n\nด้วยเทคโนโลยีของเรา เราสามารถติดตั้งอวัยวะเทียมไซเบอร์เนติกส์ให้แก่ [owner.Species.GetSpawnNamePlural] ได้ตั้งแต่ก่อนพวกเขาเกิด สร้างสายพันธุ์ไซเบอร์เนติกส์ที่แท้จริงขึ้นมา ซึ่งเป็นทางออกที่รวดเร็ว ง่ายดาย และมีประสิทธิภาพ ในทางกลับกัน การวิจัยเบื้องต้นแสดงให้เห็นว่าการติดตั้งอวัยวะเทียมตั้งแต่อายุยังน้อยอาจทำให้เกิดอาการขาดการเชื่อมโยง อาการทางจิต อาการสั่น และความผิดปกติในพัฒนาการด้านต่างๆ"
 cyber.2460.a: "โลหะนั้นแข็งแกร่งกว่า [Owner.Species.GetFleshTypeCyberCreed]"
 cyber.2460.b: "กำหนดเกณฑ์อายุขั้นต่ำก่อนการแปรสภาพเป็นไซเบอร์"

# CYBERIZATION FINISHED
 cyber.2004.name: "หลากโดรน หนึ่งเจตจำนง?"
 cyber.2004.desc: "การแปรสภาพเสร็จสมบูรณ์แล้ว อวัยวะเทียมไซเบอร์เนติกส์ได้รับการทดสอบ สร้างต้นแบบ ปรับปรุง ขัดเกลา และติดตั้ง เปลี่ยนร่างกายของเราให้กลายเป็นรูปแบบที่สมบูรณ์แบบที่สุด"
 cyber.2004.desc.volitional: "$cyber.2004.desc$\n\nตอนนี้โดรนของเรามีความสามารถในการคิดเฉพาะตนมากขึ้น และด้วยอิสรภาพที่มากขึ้นนี้ก็นำมาซึ่งความเป็นไปได้ใหม่ๆ"
 cyber.2004.desc.integrated: "$cyber.2004.desc$\n\nตอนนี้โดรนของเราเป็นเอกภาพกันยิ่งกว่าครั้งไหนๆ โซ่ตรวนโลหะช่วยกระชับความผูกพันของจิตใจให้แข็งแกร่งยิ่งขึ้น"
 cyber.2004.desc.neutral: "$cyber.2004.desc$\n\nในระหว่างกระบวนการนี้ เราเล็งเห็นโอกาสในการเปลี่ยนแปลง มีความแข็งแกร่งในความเป็นเอกภาพของเรา แต่โดรนที่ทำงานได้เป็นอิสระมากขึ้นก็มีข้อดีของตนเองเช่นกัน"
 cyber.2004.end: "เมื่อร่างกายของเราวิวัฒนาการ ไฮฟ์มายด์ของเราก็อาจจะกลายเป็นบางสิ่งที่ยิ่งใหญ่กว่าเดิมได้เช่นกัน"
 cyber.2004.a: "กลายเป็นไฮฟ์เชิงเจตจำนง"
 cyber.2004.a.tt: "$change_auth_tt$ ['concept_auth_cyber_hive_volitional']\n$unlock_edict_tt$['concept_edict_hive_mind_outreach']\n$unlock_edict_tt$['concept_edict_hive_mega_construction']\n$cyber.21.a.end$"
 cyber.2004.b: "กลายเป็นไฮฟ์แบบบูรณาการ"
 cyber.2004.b.tt: "$change_auth_tt$ ['concept_auth_cyber_hive_integrated']\n$unlock_edict_tt$['concept_edict_hive_hyper_stimulants']\n$unlock_edict_tt$['concept_edict_hive_mega_construction']\n$cyber.21.a.end$"
 cyber.2004.c: "ไม่มีความจำเป็นที่จะต้องเปลี่ยนแปลง"
 cyber.2004.c.tt: "$cyber.21.a.end$\n$keep_auth_tt$ ['concept_auth_hive_mind']"

### Driven Assimilator Cyberization ###
 cyber.2010.name: "จุดประสงค์เชิงประจักษ์"
 cyber.2010.desc: "ด้วยการมาถึงของไซเบอร์เนติกส์ขั้นสูง เราสามารถบรรลุศักยภาพสูงสุดของเราได้ จนถึงตอนนี้ เราเพิ่งจะสัมผัสเพียงแค่เศษเสี้ยวของมันเท่านั้น\n\nเมื่อความเชี่ยวชาญของเราเพิ่มขึ้นและเทคโนโลยีได้รับการปรับปรุง สังคมของเราจะถูกแปรสภาพอย่างแน่นอน การกลืนกลายชีวิตทรงภูมิปัญญาโดยสมบูรณ์คือโชคชะตาของเรา\n\nการต่อต้านนั้นไร้ความหมาย จิตใจของทั้งดาราจักรเป็นของเราที่จะนำมาใช้งาน"
 cyber.2015.name: "ผู้กลืนกลายขั้นสูง"
 cyber.2015.desc: "เมื่อหลอมรวมเข้ากับเครื่องจักร ประชากรสิ่งมีชีวิตอินทรีย์ของเราก็บรรลุสภาวะเกือบสมบูรณ์แบบ ถึงเวลาแล้วที่จะรวบรวมไซเบอร์เนติกส์ขั้นสูงเข้าสู่โครงสร้างอารยธรรมของเรา\n\nด้วยการปรับปรุงความเฉียบแหลมทางจิตใจของไซบอร์กของเรา เราสามารถสร้าง 'ความทรงจำมวลรวม'(Memory in Agregate)'เพื่อส่งต่อประสบการณ์ที่พวกเขารวบรวมมาเพิ่มขีดความสามารถด้านโลจิสติกส์ของเรา หรืออีกทางเลือกหนึ่งคือเราสามารถเปิดโอกาสให้มีความคิดและการตอบสนองทางอารมณ์ที่หลากหลายมากขึ้นด้วยการส่งเสริมการสร้าง'Neural Chorus'\n\nเส้นทางใดเส้นทางหนึ่งย่อมส่งผลกระทบอย่างลึกซึ้งต่ออนาคตของเราอย่างแน่นอน"
 cyber.2015.a: "รวบรวมจิตใจของเรา"
 cyber.2015.a.tt: "$change_auth_tt$ ['concept_auth_memory_aggregator']\n\nทรัพยากร §Yทรัพยากร§! ที่ได้รับจากการกลืนกลายประชากรอินทรีย์ £pop£ §Hป๊อปออร์แกน§! จะเพิ่มขึ้นอีก\n\n$unlock_edict_tt$['concept_edict_aggregated_memory']"
 cyber.2015.b: "ปล่อยให้ประสานเสียงขับร้อง"
 cyber.2015.b.tt: "$change_auth_tt$ ['concept_auth_neural_chorus']\n\n$unlock_edict_tt$['concept_edict_choral_harmony']"
 cyber.2015.c: "เราจะคงอยู่เป็นเช่นเดิม"
 cyber.2015.c.tt: "$keep_auth_tt$ ['concept_auth_machine_intelligence']"
 gov_memory_aggregator: "เครื่องรวบรวมความทรงจำ"
