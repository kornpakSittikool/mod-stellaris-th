 edict_neurocasted_spectacles: "มหรสพออกอากาศประสาท"
 edict_neurocasted_spectacles_desc: "ด้วยการออกอากาศภาพกีฬาโหดร้ายจากไซเบอร์โดมของเมืองหลวงตรงเข้าสู่ไซเบอร์เบรน ผู้คนจึงพากันหลั่งไหลมาที่เมืองหลวง ในขณะที่ร่างกายพักอยู่อย่างปลอดภัยในพ็อด ผู้ชมก็จะได้ร่วมสัมผัสประสบการณ์ของเหล่านักสู้จากมุมมองบุคคลที่หนึ่ง เป็นเทศกาลกีฬาประจำปีที่ยิ่งใหญ่!"
 edict_neurocasted_spectacles_effect: "ความสุขประชากรนอกดาวเคราะห์เมืองหลวง: §G+10%§!$DOUBLE_NEW_LINE$§Eเอฟเฟกต์ของ $building_cyberdome$:§!$building_cyberdome_edict_effects$"
 requires_cyberdome: "เสนอสิ่งปลูกฝังที่ตรวจจับไม่ได้... โดยมีราคาที่ต้องจ่าย"
