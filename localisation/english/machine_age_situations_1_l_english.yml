# IMPERIAL
 edict_levied_experience: "เกณฑ์ประสบการณ์"
 edict_levied_experience_desc: "ด้วยการสกัดเอาความรู้ของประชากรผ่านไซเบอร์เนติกส์ เราสามารถเพิ่มพูนประสบการณ์ให้ผู้นำของเราได้โดยไม่จำเป็นต้องปล่อยให้พวกเขาเสียเวลาไปกับงานจิปาถะทั่วไป"
 concept_edict_levied_experience: "นี่ไม่ใช่เรื่องที่ต้องตื่นตระหนก"
