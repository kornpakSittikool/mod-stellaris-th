### CYBERIZATION SITUATION START - HIVE VARIANT ###
 situation_cyberization_hive: "การแปรสภาพเป็นไซเบอร์"
 situation_cyberization_hive_type: "สถานการณ์เบิกเนตรเพื่อก้าวข้าม"
 situation_cyberization_hive_desc: "ไฮฟ์มายด์ต้องการร่างกายที่เหนือกว่า ด้วยอวัยวะเทียมไซเบอร์เนติกส์ โดรนของเราสามารถถูกทำให้สมบูรณ์ เสริมความสามารถ และปรับแต่งรูปโฉมใหม่ได้\nถึงเวลาแล้วที่จะก้าวข้ามขีดจำกัดทางชีววิทยาของเรา\n\n§Yประชากรที่จะได้รับอวัยวะเทียมในเดือนหน้า§!: §G[From.GetCyberPopsPerMonth]§!"
 situation_cyberization_hive_monthly_change_tooltip: "ร่างกายของเราจะกลายเป็นไซเบอร์เนติกส์ ซึ่งเป็นฟิวชั่นที่สมบูรณ์แบบระหว่างสิ่งมีชีวิตอินทรีย์และเครื่องจักร"
 situation_cyberization_hive_outcome: "ประชากรไซเบอร์เนติกส์"
 stage_cyberization_hive_effects: "เราต้องออกแบบอวัยวะเทียมไซเบอร์เนติกส์ ติดตั้งมัน และแปรสภาพตัวเราเอง"
 cyber.hive_government_shift.tt: "ส่งผลกระทบต่อการเปลี่ยนผ่านจิตสำนึกไซเบอร์เนติกส์ §Yเลื่อนหน้าต่างจากกล้อง§! ที่กำลังดำเนินอยู่"

 situation_cyberization_culled_drones_desc: "คัดโดรนที่มีข้อบกพร่องออก"
