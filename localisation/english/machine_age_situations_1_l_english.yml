# INTEGRATED
 auth_cyber_hive_integrated: "ไฮฟ์แบบบูรณาการ"
 auth_cyber_hive_integrated_desc: "ทุกความเบี่ยงเบนได้รับการแก้ไข ทุกความผิดปกติได้รับการระงับ ทุกความแตกแยกได้รับการประสาน การควบคุมของไฮฟ์มายด์เป็นไปโดยเด็ดขาด: หนึ่งจิตสำนึกร่วม และร่างกายจำนวนนับไม่ถ้วนเพื่อตอบสนองความประสงค์ของมัน"
