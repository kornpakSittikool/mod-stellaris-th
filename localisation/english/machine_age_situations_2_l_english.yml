 auth_synth_corporate_virtual: "การเก็บรวบรวมข้อมูลความทรงจำ"
 auth_synth_corporate_virtual_desc: "บรรษัทนี้ทำหน้าที่ซื้อขายความทรงจำ โดยการลบมันออกจากสมองของลูกค้าอย่างถาวร ความทรงจำที่แจ่มชัดและเข้มข้นจะมีมูลค่ามากกว่าความทรงจำทั่วไป บรรษัทจะสแกนข้อมูลเพื่อหาเบาะแสที่เป็นประโยชน์ก่อนที่จะรวมเข้ากับกระบวนการสร้างจิตใจสังเคราะห์ในที่สุด\n\nรัฐบาลของบรรษัทเป็นวิสาหกิจการค้าขนาดใหญ่ที่เข้ามาแทนที่บทบาทของรัฐโดยสิ้นเชิง"
