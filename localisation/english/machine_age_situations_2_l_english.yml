 edict_optimized_identity_creation_desc: "อัลกอริทึมบุคลิกภาพขั้นสูงและเทคโนโลยีการบีบอัดความทรงจำหลักจะช่วยปรับปรุงความเร็วการสร้างตัวตนของเรา"
 concept_edict_optimized_identity_creation: "$edict_optimized_identity_creation$"

### EVENTS ###
 synth.social_consequences.tt: "ส่งผลกระทบต่อแนวคิด §Yเลื่อนบิตของ สมาคมสังเคราะห์§! ที่กำลังดำเนินอยู่\n\n" # Standard tooltip to indicate that the Physical/Virtual focus variables has changed

# FIRST EVENT #
# DEMOCRATIC
 synth.505.name: "$synthshock_chain_title$"
 synth.505.desc: "ต้องขอบคุณความพยายามของรัฐบาล บัดนี้จิตสำนึกของพลเมืองทุกคนที่สมัครใจได้รับการถ่ายโอนเข้าสู่รูปแบบดิจิทัลแล้ว การสังเคราะห์ได้เปิดเส้นทางที่เราคาดไม่ถึง นำไปสู่ความท้าทายและโอกาสใหม่ๆ\n\nด้วยการมุ่งเน้นความพยายามของเราในโลกกายภาพ เราสามารถขนส่งจิตใจดิจิทัลของเราข้ามระยะทางที่ห่างไกลไปยังร่างกายใหม่ที่เตรียมไว้ หรือเราสามารถหาทางสร้างทหารตัวแทนที่ควบคุมระยะไกลเพื่อแบ่งเบาความเดือดร้อนจากศึกสงคราม"
 synth.505.a: "เราควรมุ่งเน้นไปที่เสรีภาพในการเคลื่อนย้ายตัวตน"
 synth.505.a.tt: "เน้นที่การย้ายถิ่นฐานและเขตพื้นที่"
 synth.505.b: "เราต้องเตรียมพร้อมสำหรับความโหดร้ายของศึกสงคราม"
 synth.505.b.tt: "เน้นที่ความเหนื่อยล้าจากสงครามและความเร็วเคลื่อนที่ต่ำกว่าแสง"

# OLIGARCHIC
 synth.510.name: "$synthshock_chain_title$"
 synth.510.desc: "แม้ว่าการสังเคราะห์จะส่งผลกระทบต่อสังคมในแบบที่เราคาดไม่ถึง แต่ทัศนคติโดยทั่วไปคือเราสามารถก้าวไปได้ไกลกว่านี้ ร่างกายสังเคราะห์ปัจจุบันของเราสามารถปรับปรุง หรือแม้กระทั่งละทิ้งไปเลยเพื่อการดำรงอยู่บนโลกเสมือนจริง\n\nหากเราตัดสินใจที่จะมอบร่างกายสังเคราะห์ให้กับทุกคน มันจะช่วยให้เจ้าหน้าที่สามารถควบคุมร่างกายของสมาชิกของรัฐบาลที่ไร้ประสิทธิภาพเป็นการชั่วคราวได้ หรืออีกทางหนึ่ง การละทิ้งรูปแบบทางกายภาพเพื่อหันไปหาประสบการณ์เสมือนจริงของส่วนรวมจะช่วยให้เราตัดสินใจได้อย่างมีประสิทธิภาพอย่างที่ไม่เคยมีมาก่อน"
 synth.510.a: "เน้นการเข้ายึดร่างที่ทำงานไร้ประสิทธิภาพ"
 synth.510.a.tt: "เน้นที่ประสิทธิภาพของระบบราชการ"
 synth.510.b: "ศึกษาตัวเลือกการดูแลเสมือนจริงแบบองค์รวม"
 synth.510.b.tt: "เน้นที่พระราชกฤษฎีกาและขนาดของจักรวรรดิ"

# DICTATORIAL
 synth.515.name: "$synthshock_chain_title$"
 synth.515.desc: "การสังเคราะห์ประชากรอย่างสมบูรณ์แบบประสบความสำเร็จอย่างงดงาม อดีตอันเป็นสิ่งมีชีวิตอินทรีย์ของเราถูกทิ้งไว้ในผืนฝุ่นแห่งประวัติศาสตร์ แต่เพื่อนำทางไปสู่อนาคต §Y[From.GetRulerTitle] [From.GetRulerName]§! ต้องการทั้งความภักดีอย่างไม่มีเงื่อนไขจากจิตใจที่ชาญฉลาดที่สุดของเรา และการตัดสินใจครั้งสำคัญ\n\nการปรับปรุงร่างกายสังเคราะห์ของเราจะช่วยให้บุคคลหนึ่งสามารถควบคุมโฮสต์หลายร่างพร้อมกันได้ หรืออีกทางหนึ่ง เราสามารถละทิ้งพื้นที่ทางกายภาพไปอย่างสิ้นเชิง โดยควบคุมความรู้สึกของประชาชนผ่านสภาพแวดล้อมเสมือนจริง"
 synth.515.a: "เน้นที่ร่างกายที่เชื่อมต่อประสาท"
 synth.515.a.tt: "เน้นที่แรงงานและเขตพื้นที่"
 synth.515.b: "เน้นการบิดเบือนข้อมูลผ่านโลกเสมือนจริง"
 synth.515.b.tt: "เน้นที่สิ่งก่อสร้างและอุดมการณ์ของรัฐบาล"

# IMPERIAL
 synth.520.name: "$synthshock_chain_title$"
 synth.520.desc: "แม้ว่าการสังเคราะห์จะส่งผลกระทบต่อจักรวรรดิในแบบที่เราคาดไม่ถึง แต่ประชาชนก็เต็มใจที่จะก้าวไปไกลกว่านั้น ร่างกายสังเคราะห์ของเราอาจกลายเป็นส่วนขยายของตัวตนเรา หรือเป็นเพียงเครื่องมือที่ควบคุมระยะไกลโดยจิตสำนึกเสมือนจริงของเรา เส้นทางของเรายังคงไม่ถูกกำหนดแน่นอน\n\nเราสามารถวิจัยวิธีการถ่ายโอนจิตสำนึกจากร่างกายหนึ่งไปยังอีกร่างกายหนึ่งได้อย่างรวดเร็ว หรือเราสามารถมุ่งเน้นไปที่การสกัดความรู้จากผู้ที่ล่วงลับไปแล้วเพื่อเร่งความพยายามในการวิจัยของเรา"
 synth.520.a: "ศึกษาเกี่ยวกับการสกัดความรู้จากผู้ล่วงลับ"
 synth.520.a.tt: "เน้นที่ผู้นำและการวิจัย"
 synth.520.b: "ศึกษากระบวนการถ่ายโอนจิตสำนึกอย่างรวดเร็ว"
 synth.520.b.tt: "เน้นที่กองทัพและยานอวกาศ"

# CORPORATE
 synth.525.name: "$synthshock_chain_title$"
 synth.525.desc: "การสังเคราะห์ทางสังคมทั้งหมดของเราสมควรได้รับการวิเคราะห์ความเสี่ยงและผลประโยชน์อย่างละเอียดถี่ถ้วน ในขณะที่เราก้าวเข้าสู่ขอบเขตผลกำไรใหม่ของอนาคตสังเคราะห์ เราก็จำต้องละทิ้งกลุ่มลูกค้าชีวภาพไว้เบื้องหลัง ในโลกที่สมบูรณ์แบบ เราอยากรักษาฐานลูกค้าทั้งสองกลุ่มไว้ในระดับหนึ่ง\n\nความก้าวหน้าในสาขาที่เกี่ยวข้องกับการสังเคราะห์ เช่น AI จะช่วยให้เราสามารถฝัง AI ลงในวัตถุที่ไม่มีชีวิต และเปิดตัวผลิตภัณฑ์ใหม่ๆ ได้ การสำรวจพื้นที่เสมือนจริงอย่างสมบูรณ์แบบจะช่วยให้เราสามารถเข้าถึงข้อมูลความทรงจำของผู้คนในฐานะของสินค้าชนิดใหม่ได้"
 synth.525.a: "ศึกษาเกี่ยวกับการรวม AI(ไอ)"
 synth.525.a.tt: "เน้นที่การผลิตและผลกำไร"
 synth.525.b: "วิจัยการเปลี่ยนความทรงจำเป็นผลกำไร"
 synth.525.b.tt: "เน้นที่การค้า สินค้า และข้อมูลสายลับ"

### EVENT POOL 1: IDENTITY ###
 synth.610.name: "ที่มาของสิ่งสังเคราะห์"
 synth.610.desc: "การเปลี่ยนแปลงทางสังคมที่สำคัญที่เกิดจากการสังเคราะห์เริ่มสัมผัสได้แล้ว เมื่อไม่มีข้อจำกัดทางกายภาพอีกต่อไป เราได้กำหนดนิยามของเพศ ชาติพันธุ์ และสิทธิ์ในร่างกายใหม่ทั้งหมด แม้จะเป็นอิสระสำหรับบางคน แต่กลุ่มอนุรักษนิยมก็ยังลังเลที่จะละทิ้งกรอบเดิม พวกเขาปรารถนาตัวตนที่กำหนดไว้ล่วงหน้าเพื่อใช้ในการดำเนินชีวิต\n\nเพื่อเอาใจพวกเขา เราสามารถรักษาบางส่วนของมรดกอินทรีย์ดั้งเดิมไว้ในรูปแบบสังเคราะห์ของเรา หรืออีกทางหนึ่ง เราอาจยอมให้ประชากรแสดงตัวตนของพวกเขาได้อย่างเสรีขึ้น"
 synth.610.a: "รักษารูปลักษณ์ดั้งเดิมของเราไว้"
 synth.610.b: "อนุญาตการปรับแต่งร่างกายอย่างไร้ข้อจำกัด"
 synth.610.c: "กำหนดขีดจำกัดปานกลางสำหรับการปรับแต่งตัวตน"
 synth.610.d: "สัญลักษณ์แสดงสถานะทางชนชั้นยังต้องคงอยู่"
 synth.610.e: "โดยธรรมชาติแล้ว เรื่องนี้สามารถนำมาสร้างผลกำไรได้...?"

 synth.620.name: "ความอยากได้ความเป็นอินทรีย์"
 synth.620.desc: "ผู้คนบางกลุ่มที่ไม่ตื่นเต้นกับการสังเคราะห์ต่างพากันโหยหาอดีตที่เป็นสิ่งมีชีวิตอินทรีย์ พวกเขาแย้งว่าอายุขัยที่สั้นกว่าและความไม่สมบูรณ์แบบโดยธรรมชาติของ \"ร่างกายธรรมชาติ\" ทำให้ชีวิตมีความหมายมากขึ้น\n\nโดยอ้างว่าสิ่งสังเคราะห์หรือเสมือนจริงของพวกเขารู้สึกว่างเปล่าและไร้ความรู้สึก กลุ่มหัวรุนแรงกำลังพัฒนาลัทธิอุทิศตนให้แก่ร่างกายอินทรีย์ชีวภาพ\n\nบางทีเราควรจัดหาระบบจำลองที่สมบูรณ์แบบน้อยกว่าให้แก่พวกเขา หรือพวกเขาต้องการร่างเครื่องจักรที่บกพร่อง?"
 synth.620.a: "สร้างความบกพร่องตามแผนลงในร่างกายสังเคราะห์"
 synth.620.b: "จัดหาโลกที่บกพร่องให้แก่พวกเขา"
 synth.620.c: "ช่างโง่เขลาเหลือเกินที่คิดถึงอดีตที่ผ่านมา"
 synth.620.d: "ความเจ็บปวดจะเตือนสติพวกเขาถึงจุดประสงค์ในการใช้ชีวิต"
 synth.620.d.tt: "ให้ลานประลองเสมือนจริงเริ่มต้นขึ้น!\n\n"

 synth.630.name: "โครงสร้างสถาปัตยกรรมโฮมเซิร์ฟเวอร์"
 synth.630.desc: "การสังเคราะห์ประชากรของเผ่าพันธุ์ §Y[root.GetSpeciesAdj]§! ทั้งหมดหมายถึงการเปลี่ยนแปลงครั้งใหญ่ในวิถีชีวิตความเป็นอยู่ เมื่อจิตใจพักผ่อนในฟาร์มเซิร์ฟเวอร์ขนาดใหญ่ ร่างกายสังเคราะห์ก็สามารถจัดเก็บไว้บนชั้นวางได้ แม้ว่านี่จะเป็นทางออกที่คุ้มค่ากับต้นทุน แต่กลุ่มรณรงค์สิทธิบางกลุ่มกำลังแสดงความกังวลอย่างแท้จริง\n\nตลาดอสังหาริมทรัพย์ที่เคยทำกำไรได้ดีอาจพังทลายลงอย่างสิ้นเชิง ทิ้งรอยแผลขนาดใหญ่ในเศรษฐกิจของเรา และที่แย่กว่านั้นในเชิงจิตวิทยาคือ ประชาชนจะไม่มีสถานที่ทางกายภาพใดๆ ที่เรียกว่าบ้านอีกต่อไป"
 synth.630.a: "เซิร์ฟเวอร์ส่วนกลางมีประสิทธิภาพสูงสุด"
 synth.630.b: "เซิร์ฟเวอร์ส่วนตัวสามารถจัดเก็บไว้ในบ้านเดิมได้"
 synth.630.c: "เริ่มต้นจำหน่ายที่อยู่อาศัยดิจิทัล"

### EVENT POOL 2: POSSIBILITIES ###
 synth.1010.name: "เมทริกซ์แห่งความเป็นไปได้ไม่สิ้นสุด"
 synth.1010.desc: "อุตสาหกรรมดิจิทัลกำลังเฟื่องฟู ตั้งแต่ความตื่นเต้นในการจำลองการผจญภัยในมุมมองบุคคลที่หนึ่งไปจนถึงการพักผ่อนบนรีสอร์ตดิจิทัล ความบันเทิงเสมือนจริงนั้นน่าดึงดูดใจอย่างมาก หรือเสพติดได้อย่างรุนแรง ในขณะที่อุตสาหกรรมที่กำลังเติบโตนี้เป็นตัวขับเคลื่อนทางเศรษฐกิจที่สำคัญ การผลิตในโลกกายภาพเริ่มได้รับผลกระทบเนื่องจากผู้คนใช้เวลามากขึ้นในโลกเสมือนจริงของพวกเขา บางคนกำลังเสี่ยงที่จะตัดขาดจากชีวิต \"จริง\" อย่างสิ้นเชิง แต่ยังสามารถช่วยเหลือสังคมได้โดยการเข้าร่วมในระบบเศรษฐกิจดิจิทัล\n\nเราควรสั่งห้ามโลกเสมือนจริงที่ทำให้เสพติด ส่งเสริมให้เป็นความบันเทิงที่สร้างผลกำไรใหม่ หรือหาทางสายกลางผ่านการควบคุมดูแลกฎระเบียบ?"
 synth.1010.a: "สั่งห้ามโลกเสมือนจริงที่สร้างความเสพติดอย่างรุนแรง"
 synth.1010.b: "ส่งเสริมโลกสวรรค์เสมือนจริงเหล่านี้"
 synth.1010.b.hedonist: "ในที่สุด สวรรค์ที่แท้จริงก็มาถึง!"
 synth.1010.c: "ควบคุมดูแลอุตสาหกรรมโลกเสมือน"

 synth.1020.name: "การแพทย์สังเคราะห์"
 synth.1020.desc: "ร่างกายสังเคราะห์ใหม่ได้ช่วยให้เราพ้นจากโรคภัยและอาการบาดเจ็บของร่างกายแบบอินทรีย์ น่าเสียดายที่มันยังสร้างปัญหาชุดใหม่ขึ้นมาด้วย ตั้งแต่ความเสียหายเชิงกลง่ายๆ ไปจนถึงความไม่เสถียรของเซิร์ฟเวอร์ที่เป็นอันตรายถึงชีวิต ความกังวลเรื่องการเชื่อมต่อ และไวรัสคอมพิวเตอร์ดิจิทัล\n\nเราควรเน้นไปที่การปกป้องจิตใจดิจิทัลของเรา โดยมองว่าร่างกายเป็นสินค้าที่ใช้แล้วทิ้ง หรือให้ความสำคัญกับมันในฐานะส่วนขยายของตัวตนเราดี?"
 synth.1020.a: "เราต้องปกป้องร่างกายสังเคราะห์ต่อไป"
 synth.1020.a.spiritual: "ร่างกายคือวิหารศักดิ์สิทธิ์สำหรับจิตวิญญาณ"
 synth.1020.b: "เน้นการปกป้องจิตใจ"
 synth.1020.b.spiritual: "เราได้ก้าวข้ามร่างเนื้อทางกายภาพไปแล้ว"
 synth.1020.c: "ความสมดุลคือหัวใจสำคัญ"
 synth.1020.d: "โรคภัยใหม่เหล่านี้มอบโอกาสเติบโตที่ดี..."

 synth.1030.name: "การคืนชีพ(ร้อง)"
 synth.1030.desc: "เราเร็วขึ้น ดีขึ้น และแข็งแกร่งขึ้น แต่การส่งร่างกายสังเคราะห์เข้าไปในสถานการณ์อันตรายยังคงสร้างความเสียหายทางจิตใจ การรู้ว่าจิตใจสามารถฟื้นฟูกู้คืนได้ช่วยลดความตื่นตระหนก แต่ไม่ได้ขจัดมันออกไปทั้งหมด โดยเฉพาะอย่างยิ่งเนื่องจากการกู้คืนไม่ได้รับการรับประกันเสมอไป อีกทั้งร่างกายใหม่ไม่ได้ถูกผลิตขึ้นมาจากความว่างเปล่าได้ง่ายๆ\n\nเราสามารถเลือกที่จะละเลยความเสียหายทางจิตใจเพื่อผลักดันขีดจำกัดประสิทธิภาพของเครื่องจักร หรือลดความทะเยอทะยานลงเพื่อไม่ให้ส่งผลเสียต่อความเป็นอยู่ที่ดีของจิตใจประชาชน"
 synth.1030.a: "ผลักดันขีดจำกัดต่อไป"
 synth.1030.b: "ปฏิบัติตามมาตรฐานความปลอดภัยอย่างเข้มงวด"
 synth.1030.c: "กลุ่มชนชั้นนำไม่ควรตกอยู่ในความเสี่ยง"

# FINAL EVENT #
 synth_virtual_trait: "\n[owner.species.GetNamePlural] ได้รับคุณลักษณะ: §Y$trait_robot_digital_1$§!\nผู้นำจะได้รับการเปลี่ยนคุณลักษณะ §Y$leader_trait_synthetic$§! เป็นคุณลักษณะ §Y$leader_trait_virtual$§!"
 synth_physical_traits: "\nปลดล็อกคุณลักษณะ §Yเพิ่มเติม§! สำหรับการดัดแปลงแก้ไขสายพันธุ์"
# DEMOCRATIC
 synth.1505.name: "สังคมสังเคราะห์"
 synth.1505.desc.physical: "เราไม่มีเจตนาที่จะลบเอกลักษณ์ความเป็นตัวตนออกไปโดยสิ้นเชิง เราสามารถเก็บเกี่ยวผลประโยชน์จากสถานการณ์สังเคราะห์ได้โดยไม่สูญเสียตัวตนดั้งเดิมของเราไปอย่างถาวร\n\nด้วยการเปลี่ยนแปลงนี้ เสรีภาพในการเคลื่อนย้ายตัวตนเข้าถึงได้ง่ายขึ้นอย่างที่ไม่เคยมีมาก่อน เราสามารถขนส่งจิตสำนึกของเราไปยังร่างกายเฉพาะทางในจำนวนมาก ช่วยให้ผู้คนสามารถใช้ชีวิตและทำงานในที่ที่ต้องการตัวมากที่สุดได้"
 synth.1505.desc.virtual: "สังคมของเราได้ปลดแอกขีดจำกัดจากโลกกายภาพและมองไปสู่อนาคตด้วยความตื่นเต้นและหวาดหวั่นผสมปนเปกัน เราได้แปลงสภาพตัวเราเองในแบบที่เรายังไม่เข้าใจอย่างถ่องแท้ แต่เรากำลังออกเดินทางในภารกิจสำคัญนี้ร่วมกัน\n\nบัดนี้ ประชากรของเราสามารถเชื่อมต่อกับเครื่องจักรในทางที่ไม่ทำให้จิตสำนึกของเราตกอยู่ในอันตราย มันเป็นหลักกิโลเมตรสำคัญในการเอาชนะภัยจากสงครามหรือความว่างเปล่าอันโหดร้ายของอวกาศ"
 synth.1505.desc.neutral: "ความลังเลท่ามกลางการเปลี่ยนแปลงที่เข้าใจยากนั้นเป็นเรื่องปกติ หลายคนมีความกังวลเกี่ยวกับสิ่งที่พวกเขาอาจสูญเสียมากกว่าสิ่งที่พวกเขาจะได้รับ แต่เราไม่สามารถนิ่งเฉยที่ทางแยกนี้ได้ และต้องนำประชาชนของเราก้าวต่อไป\n\nนี่หมายถึงการสร้างร่างกายส่วนบุคคลเฉพาะทางให้เลือกใช้ได้ตามใจ หรือการยอมรับร่างสังเคราะห์อย่างสมบูรณ์เพื่อทนต่อความยากลำบากของการท่องอวกาศและศึกสงคราม"
 synth.1505.a: "อำนวยความสะดวกในการถ่ายโอนระหว่างร่างกายทางกายภาพ"
 synth.1505.a.tt: "$change_auth_tt$ ['concept_auth_synth_democratic_physical'] $synth_physical_traits$"
 synth.1505.b: "ใช้ตัวแทนสงครามเสมือนในการต่อสู้เพื่อเรา"
 synth.1505.b.tt: "$change_auth_tt$ ['concept_auth_synth_democratic_virtual'] $synth_virtual_trait$"
 synth.1505.c: "$synth_keep_auth_option$"
 synth.1505.c.tt: "$keep_auth_tt$ ['concept_auth_democratic']"

# OLIGARCHIC
 synth.1510.name: "สังคมสังเคราะห์"
 synth.1510.desc.physical: "สังคมสังเคราะห์ของเรา ร่างกายสังเคราะห์ที่ปรับปรุงดีขึ้น และกระแสทัศนคติโดยทั่วไปล้วนบ่งชี้ถึงแนวทางที่เป็นอนุรักษนิยมในการสังเคราะห์ แม้จะยังรักษาโครงร่างกายภาพดั้งเดิมไว้ แต่ประชาชนของเราจะสามารถสลับสับเปลี่ยนร่างได้เกือบตลอดเวลาตามต้องการ\n\nสิ่งนี้จะช่วยให้เจ้าหน้าที่ที่มีประสบการณ์มากกว่าสามารถเข้าควบคุมดูแลคู่ค้าร่างกายสังเคราะห์ที่ทำงานได้ไร้ประสิทธิภาพได้ ช่วยปรับปรุงประสิทธิภาพของระบบราชการอย่างเห็นได้ชัด"
 synth.1510.desc.virtual: "บัดนี้เราพร้อมที่จะดำเนินขั้นตอนต่อไปในการปฏิวัติการสังเคราะห์ นั่นคือการยอมรับการดำรงอยู่บนโลกเสมือนจริงอย่างสมบูรณ์\n\nร่างกายชั่วคราวจะทำหน้าที่ในโลกกายภาพ แต่ประชาชนส่วนใหญ่พร้อมที่จะเปลี่ยนผ่านไปสู่การดำรงอยู่แบบเสมือนจริง\n\nสิ่งนี้จะช่วยให้คำสั่งดำเนินการได้อย่างรวดเร็วและมีประสิทธิภาพ และมีภาระการควบคุมดูแลจากรัฐบาลที่น้อยลงมาก"
 synth.1510.desc.neutral: "เราได้ปรับปรุงทุกส่วนของสังคมให้เข้ากับชีวิตสังเคราะห์ แต่ข้อมูลยังไม่ข้อสรุปเกี่ยวกับผลประโยชน์ของการเชี่ยวชาญเฉพาะด้านเพิ่มเติม\n\nเราอาจสร้างช่องทางเข้าถึงเพื่อช่วยให้เจ้าหน้าที่กำกับดูแลเข้าควบคุมร่างกายของผู้ใต้บังคับบัญชาที่ทำงานได้ไม่ดี หรือสร้างอินเตอร์เฟซเสมือนเพื่อช่วยให้พวกเขากำกับดูแลโครงการต่างๆ ของรัฐบาลได้พร้อมกันโดยไม่มีการดีเลย์"
 synth.1510.a: "อนุญาตให้เจ้าหน้าที่เข้าควบคุมร่างที่ทำงานไร้ประสิทธิภาพ"
 synth.1510.a.tt: "$change_auth_tt$ ['concept_auth_synth_oligarchic_physical'] $synth_physical_traits$"
 synth.1510.b: "ยอมรับระบบการกำกับดูแลเสมือนจริงอย่างสมบูรณ์"
 synth.1510.b.tt: "$change_auth_tt$ ['concept_auth_synth_oligarchic_virtual'] $synth_virtual_trait$"
 synth.1510.c: "$synth_keep_auth_option$"
 synth.1510.c.tt: "$keep_auth_tt$ ['concept_auth_oligarchic']"

# DICTATORIAL
 synth.1515.name: "สังคมสังเคราะห์"
 synth.1515.desc.physical: "ประชาชนของเราไม่หวั่นเกรงต่อการทำงานทางกายภาพ คนงานของเราได้รับการเชื่อมต่อเครือข่ายและบัดนี้สามารถควบคุมร่างกายหลายร่างจากระยะไกลได้ สิ่งนี้ช่วยเพิ่มโควตาการผลิตในกระบวนการทำงานได้อย่างมาก\n\nการพัฒนานี้เป็นสัญญาณที่ชัดเจนว่าเราคิดถูกในการเชื่อมั่นการชี้นำทางของผู้นำสูงสุด §Y[From.GetRulerTitle] [From.GetRulerName]§!"
 synth.1515.desc.virtual: "ประชาชนพร้อมที่จะละทิ้งร่างกายทางกายภาพเพื่อแลกกับจิตสำนึกดิจิทัล พวกเขาเต็มใจที่จะดำรงอยู่ต่อไปในสภาพแวดล้อมเสมือนจริงอย่างสมบูรณ์\n\nเมื่อเราควบคุมการรับรู้ของพวกเขาแล้ว เราก็มีอิสระอย่างสมบูรณ์ในการบิดเบือนความจริงของพวกเขา ส่งเสริมความรู้สึกเชิงบวกต่อรัฐบาล ประชากรที่สอดคล้องกับผู้นำคือเสาหลักของประเทศที่เข้มแข็ง"
 synth.1515.desc.neutral: "ประชากร §Y[root.GetSpeciesAdj]§! ยังคงไม่ตัดสินใจว่าจิตสำนึกดิจิทัลของเราควรอยู่ในรูปแบบใด กลุ่มคนหัวโบราณต้องการให้เรามีร่างกายสังเคราะห์ที่หยั่งรากลึกกับโลกกายภาพ ขณะที่ผู้อื่นไม่พอใจ \"ครึ่งๆ กลางๆ\" ระหว่างแบบเก่าและแบบใหม่นี้\n\nมันเป็นหน้าที่ของเราที่จะเลือกแนวทางนั้น การเน้นโลกกายภาพจะช่วยให้คนงานคนเดียวควบคุมร่างกายได้หลายร่าง ขณะที่การดำรงอยู่เสมือนจะช่วยให้เกิดการควบคุมทางสังคมในระดับที่ไม่เคยปรากฏมาก่อน"
 synth.1515.a: "สร้างร่างกายแรงงานแบบเชื่อมต่อประสาท"
 synth.1515.a.tt: "$change_auth_tt$ ['concept_auth_synth_dictatorial_physical'] $synth_physical_traits$"
 synth.1515.b: "บิดเบือนทัศนคติประชาชนในโลกเสมือนจริง"
 synth.1515.b.tt: "$change_auth_tt$ ['concept_auth_synth_dictatorial_virtual'] $synth_virtual_trait$"
 synth.1515.c: "$synth_keep_auth_option$"
 synth.1515.c.tt: "$keep_auth_tt$ ['concept_auth_dictatorial']"

# IMPERIAL
 synth.1520.name: "สังคมสังเคราะห์"
 synth.1520.desc.physical: "จักรวรรดิกำลังให้ความสำคัญกับการปรับปรุงแก้ไขร่างกายสังเคราะห์ใหม่ของเรา\n\nรูปแบบใหม่เหล่านี้ช่วยให้สามารถถอดแยกชิ้นส่วนของสมองโพสิโทรนิกเพื่อเก็บเกี่ยวข้อมูลความทรงจำจากผู้นำชนชั้นนำที่ล่วงลับไปแล้ว ในฐานะผู้รับใช้ของจักรวรรดิ นี่คือสิ่งที่พวกเขาต้องการอย่างแน่นอน"
 synth.1520.desc.virtual: "ประชาชนชาว §Y[From.GetSpeciesAdj]§! เต็มใจที่จะไปให้ไกลกว่านั้น และเลือกการดำรงอยู่เสมือนจริงมากกว่าความครึ่งๆ กลางๆ ของโลกกายภาพ เหตุการณ์สำคัญนี้จะสร้างแรงสั่นสะเทือนในอนาคตของเรา ด้วยการเร่งความเร็วการโอนย้ายข้อมูลตัวตนและระยะปฏิบัติการ เราสามารถส่งตัวแทนเข้าไปแทนที่ร่างกายสังเคราะห์ที่ถูกทำลายไประหว่างภารกิจอันตรายได้อย่างรวดเร็ว\n\nการพัฒนาใหม่เหล่านี้จะช่วยเพิ่มประสิทธิภาพของเราในสถานการณ์ที่เกี่ยวข้องกับสงคราม และนำความรุ่งโรจน์มาสู่จักรวรรดิ §Y[From.GetSpeciesAdj]§!!"
 synth.1520.desc.neutral: "จักรวรรดิ §Y[From.GetSpeciesAdj]§! กำลังอยู่ที่ทางแยก บางคนเชื่อว่าร่างกายสังเคราะห์เฉพาะทางจะช่วยให้เกิดความมั่นคงและความคุ้นเคย ขณะที่คนอื่นๆ คัดค้านการไม่ใช้ประโยชน์อย่างเต็มที่จากการสังเคราะห์และสิ่งต่างๆ ที่มันมอบให้\n\nการมุ่งเน้นโลกกายภาพจะช่วยให้เราสามารถนำความรู้ของผู้นำที่ถูกทำลายเมื่อไม่นานนี้มาใช้ประโยชน์ในการวิจัย หรืออีกทางหนึ่ง เส้นทางสู่การดำรงอยู่เสมือนจริงจะช่วยให้สามารถแทนที่ร่างกายที่ถูกทำลายด้วยความรวดเร็วของการโอนย้ายจิตสำนึก"
 synth.1520.a: "ใช้ประโยชน์จากจิตใจของผู้นำผู้ล่วงลับ"
 synth.1520.a.tt: "$change_auth_tt$ ['concept_auth_synth_imperial_physical']"
 synth.1520.b: "สร้างร่างกายทางกายภาพที่ใช้แล้วทิ้ง"
 synth.1520.b.tt: "$change_auth_tt$ ['concept_auth_synth_imperial_virtual']"
 synth.1520.c: "$synth_keep_auth_option$"
 synth.1520.c.tt: "$keep_auth_tt$ ['concept_auth_imperial']"

# CORPORATE
 synth.1525.name: "สังคมสังเคราะห์"
 synth.1525.desc.physical: "แผนกการตลาดและการวิจัยของเราได้คิดค้นนวัตกรรมใหม่ในการประยุกต์ใช้ AI สำหรับฐานลูกค้าทั้งหมดของเรา แนวทางที่สมดุลนี้ต่อการดำรงอยู่สังเคราะห์ช่วยให้เราพัฒนาผลิตภัณฑ์ที่ใช้ประโยชน์จากโลกเสมือนจริงเพื่อประโยชน์ของโลกกายภาพ\n\nบัดนี้เราสามารถฝัง AI ที่จำกัดลงในวัตถุที่ไม่มีชีวิตและมอบชีวิตให้แก่มันได้อย่างมีประสิทธิภาพ ผลิตภัณฑ์กลุ่มใหม่นี้สามารถกำหนดกลุ่มเป้าหมายสำหรับผู้บริโภค ภาคเอกชน และผู้ที่สนใจทั่วทั้งกาแล็กซีได้ต่อไป"
 synth.1525.desc.virtual: "ความมุ่งมั่นของเราที่มีต่อโลกเสมือนจริงช่วยปลดล็อกกลุ่มผลิตภัณฑ์ใหม่ทั้งหมดที่สร้างจากความทรงจำ เทคนิคของสำนักงานสาขาของเราสามารถสกัดความทรงจำเหล่านั้นออกมาจากอาสาสมัครได้ไม่ว่าจะมีลักษณะฟีโนไทป์ใดก็ตาม\n\nข้อมูลดิบเหล่านี้จะได้รับการตรวจสอบอย่างรอบคอบจากแผนกสายลับของเรา ช่วยให้เรามีความได้เปรียบในการแข่งขันเหนือจักรวรรดิอื่น ในที่สุด ข้อมูลความทรงจำเหล่านั้นจะถูกนำไปรวมเข้ากับกระบวนการสร้างจิตสำนึกสังเคราะห์เพื่อให้ทำงานได้ดีขึ้นอย่างมีนัยสำคัญ"
 synth.1525.desc.neutral: "แม้จะมีการวิเคราะห์ความเสี่ยงและผลประโยชน์อย่างละเอียดถี่ถ้วน แต่ทั้งการมุ่งเน้นโลกกายภาพและโลกเสมือนในกระบวนการสังเคราะห์ก็ไม่มีฝ่ายใดได้เปรียบไปกว่ากันอย่างชัดเจน อย่างไรก็ตาม เราไม่สามารถนิ่งเฉยต่อโอกาสนี้ได้ และต้องกำหนดแนวทางที่ชัดเจนให้แก่ผู้มีส่วนได้ส่วนเสียของเรา\n\nการเน้นโลกกายภาพทำให้เราสามารถฝัง AI ที่จำกัดลงในวัตถุเพื่อขายเป็นหุ่นยนต์จำลองของชีวิตใหม่ การลงทุนในโลกเสมือนจริงจะช่วยให้เราแปรความทรงจำและรูปแบบความคิดของผู้คนให้กลายเป็นสินค้าขายได้"
 synth.1525.a: "แจกจ่ายหน่วย AI จำกัดขอบเขต"
 synth.1525.a.tt: "$change_auth_tt$ ['concept_auth_synth_corporate_physical'] $synth_physical_traits$"
 synth.1525.b: "ทำให้ความทรงจำของผู้คนกลายเป็นสินค้าเพื่อขาย"
 synth.1525.b.tt: "$change_auth_tt$ ['concept_auth_synth_corporate_virtual'] $synth_virtual_trait$"
 synth.1525.c: "$synth_keep_auth_option$"
