# DIGITIZATION STAGE 1
 synth.100.name: "กำลังบูตระบบ" # Stage 1 - Start event
 synth.100.desc: "ถึงเวลาที่จะปลดปล่อยร่างชีวภาพของเรา เพื่อยกระดับไปสู่โลหะและกระแสไฟฟ้า ด้วยร่างกายที่ล้ำสมัยและจิตใจที่ว่องไวขึ้น เราจะก้าวไปสู่อนาคต ร่างเนื้อหนังนั้นมีโอกาสเกิดความผิดพลาดได้ แต่เครื่องจักรสามารถทำให้สมบูรณ์แบบได้\n\nอย่างไรก็ตาม การเปลี่ยนผ่านนี้จะไม่ง่ายนัก ชุมชนการวิจัยต้องการอย่างน้อยหนึ่ง $building_identity_complex$ เพื่อทำหน้าที่เป็นศูนย์กลางสำหรับการพัฒนาสิ่งสังเคราะห์ โชคชะตาของเรากำลังรออยู่"
 synth.100.a: "เราสร้างโชคชะตาของเราเอง"
 synth.100.a.tt: "§Rจำเป็นต้องดำเนินการ:§!\nสร้าง $building_identity_complex$ เพื่อดำเนินสถานการณ์ §Y$situation_digitization$§! ต่อไป"

 synth.105.name: "การสร้างที่ดีขึ้น"
 synth.105.desc: "ด้วยพลังการประมวลผลที่เพิ่มขึ้นของสมองสังเคราะห์ เราสามารถก้าวข้ามข้อจำกัดทางชีวภาพของเราได้ อย่างไรก็ตาม พลังงานที่เพิ่มขึ้นนั้นยังมีขีดจำกัด ดังนั้นเราต้องจัดลำดับความสำคัญก่อน $synth.105.end$"
 synth.105.end: "\n\nเราสามารถมุ่งเน้นไปที่การขยายกระบวนการตัดสินใจ เพิ่มพื้นที่จัดเก็บความทรงจำ หรือเพิ่มความคล่องตัวในการทำงานร่วมกันระหว่างจิตและระยางค์ ซึ่งทั้งหมดนี้จะช่วยปรับปรุงอาชีพบางประเภท หรืออีกทางหนึ่ง เราสามารถปรับปรุงความทนทานของร่างกายทั้งหมดได้\n\nฟังก์ชันเหล่านี้ต้องการการสนับสนุนอย่างต่อเนื่องและจะมีให้เฉพาะบนดาวเคราะห์ที่มีสิ่งก่อสร้างประกอบหุ่นยนต์เท่านั้น แต่สิ่งที่เราได้เรียนรู้จากการออกแบบจะให้ผลผลิตในทันที"
 synth.105.a: "เพิ่มประสิทธิภาพการตัดสินใจ"
 build_better_synths: "เพิ่มค่าปรับปรุงตัวแปรสิ่งก่อสร้างประกอบหุ่นยนต์:"
 synth.105.a.tt: "$build_better_synths$\nผลผลิตทรัพยากรชนชั้นนำประชากร: §G+15%§!\n\n"
 synth.105.b: "เน้นการจัดเก็บความทรงจำ"
 synth.105.b.tt: "$build_better_synths$\nผลผลิตทรัพยากรชนชั้นผู้เชี่ยวชาญประชากร: §G+5%§!\n\n"
 synth.105.c: "ปรับปรุงการทำงานของมอเตอร์สั่งการ"
 synth.105.c.tt: "$build_better_synths$\nผลผลิตทรัพยากรชนชั้นแรงงานประชากร: §G+10%§!\n\n"
 synth.105.d: "ปรับปรุงความทนทาน"
 synth.105.d.tt: "$build_better_synths$\n$mod_planet_jobs_upkeep_mult$: §G-5%§!\n\n"

# Stage 1 Opportunities - Research
 synth.120.name:"การหลอมรวมระดับไมโครเชิงการรับรู้กายสัมผัส"
 synth.120.desc: "\"ม็อดไมโครฟิวชันทำให้คุณยกตู้คอนเทนเนอร์ได้!\" สื่อรีวิวผู้บริโภครายใหญ่รายงาน นี่ไม่ใช่เรื่องเกินจริง: การพัฒนาล่าสุดในเทคโนโลยีไมโครฟิวชันสัญญาว่าจะปรับปรุงร่างกายเครื่องจักรของเราได้อย่างมีนัยสำคัญ\n\nแม้ว่าจะมีความเสี่ยงอยู่บ้าง แต่การติดตั้งเครื่องปฏิกรณ์ขนาดเล็กส่วนบุคคลช่วยให้เกิดการส่งพลังงานและเพิ่มความเร็วได้ แน่นอนว่านี่จะบังคับให้เราต้องประเมินระยะเวลาการผลิตใหม่ เนื่องจากเครื่องกำเนิดไฟฟ้าเหล่านี้เป็นส่วนขยายขนาดใหญ่ของขอบเขตโครงการ"
 synth.120.a: "เราต้องมุ่งมั่นสู่ความเป็นเลิศ!"
 synth.120.a.tt: "ความเร็วความคืบหน้าสถานการณ์ §Y$situation_digitization$§! เป็นเวลา §Y1§! ปี: §R-50%§!"
 situation_kinesthetic_microfusion_tt: "การกำหนดค่าไมโครฟิวชั่นของคอนเซปต์"
 synth.120.b: "ฟีเจอร์ที่ไม่จำเป็น"
 synth.120.c: "เน้นการฝึกฝนความสามารถในการต่อสู้ของเรา"

# Stage 1 Challenges - Research
 synth.160.name: "สื่อตอบรับเชิงลบ"
 synth.160.desc: "ละครเรื่องใหม่ที่ได้รับความนิยมอย่างล้นหลามได้สะกดจินตนาการของสาธารณชน เรื่องราวมุ่งเน้นไปที่คนงานสังเคราะห์ที่ตัดขาดความเชื่อมโยงจากร่างกายใหม่ของพวกเขา\n\nเมื่อตัวเอกสูญเสียการควบคุม เพื่อนและครอบครัวของพวกเขาก็ได้แต่มองดูด้วยความตื่นตระหนก ตอนจบที่น่าเศร้าของละครเรื่องนี้ถูกมองว่าเป็นการวิพากษ์วิจารณ์อย่างไม่ปิดบังต่อแผนการเปลี่ยนผ่านไปสู่ร่างกายเครื่องจักรของเรา\n\nการพูดคุยทางสังคมรอบละครเรื่องนี้สร้างกระแสต่อต้านอย่างมากและอาจขัดขวางความก้าวหน้าของเราในที่สุด"
 synth.160.a: "เรื่องนี้จะผ่านพ้นไปเอง"
 synth.160.b: "เบี่ยงงบวิจัยไปจัดทำประชาสัมพันธ์"
 synth.160.c: "จับกุมผู้กำกับละคร"
 synth.160.d: "ปิดกั้นรายงานข่าวทั้งหมด"

# DIGITIZATION STAGE 2
 synth.200.name: "ปรัชญาแห่งจิตใจ" # Stage 2 - Start event
 synth.200.desc: "เราคิดว่าประโยชน์ของจิตสำนึกที่เป็นดิจิทัลอย่างสมบูรณ์นั้นชัดเจนมากจนเราสามารถหลีกเลี่ยงกระแสต่อต้านได้ บางทีนี่อาจจะไร้เดียงสาเกินไป ข้อคัดค้านต่อการสังเคราะห์อย่างสมบูรณ์นั้นรุนแรงมาก และตอนนี้ต้องได้รับการจัดการ\n\nการวิพากษ์วิจารณ์หลักอยู่ที่การที่เราไม่สามารถพิสูจน์ได้ว่าตัวตนดั้งเดิมจะสามารถถ่ายโอนได้อย่างปลอดภัยและสมบูรณ์ มีความกังวลซึ่งไม่มีมูลความจริงทั้งหมดว่าทุกสิ่งที่เราทำจนถึงตอนนี้เป็นเพียงข้อมูลก๊อปปี้ดิจิทัล คำถามคือ จิตใจเหล่านี้เป็นตัวเราจริงๆ หรือไม่?"
 synth.200.a: "บอกความจริงไป: เราไม่รู้"
 synth.200.a.tt: "ดำเนินแคมเปญข้อมูลสำหรับการต่อต้านการสังเคราะห์ระดับ §Hต่ำสุด§!\n\n"
 synth.200.b: "บอกสิ่งที่พวกเขาอยากได้ยิน"
 synth.200.b.tt: "ดำเนินแคมเปญโกหกบิดเบือนสำหรับการต่อต้านการสังเคราะห์ระดับ §Hปานกลาง§!\n\n"
 synth.200.c: "ผู้คัดค้านไม่กี่คนไม่สามารถขัดขวางเราได้"
 synth.200.c.tt: "ละเลยผู้คัดค้าน นำไปสู่การต่อต้านการสังเคราะห์ระดับ §Hสูงสุด§!"
 synth.200.c.material: "คำถามเรื่องจิตสำนึกไม่เกี่ยวข้องกับเรา"
 synth.200.c.material.tt: "มุมมองทางวิทยาศาสตร์ล้วนๆ จะทำให้เกิดการต่อต้านการสังเคราะห์ระดับ §Hปานกลาง§!\n\n"

 synth.205.name: "การยึดติดกับอดีต"
 synth.205.desc: "โครงการสังเคราะห์ประชากรของเรายังคงเผชิญกับการต่อต้าน ส่งผลให้เกิดการประท้วงอย่างรุนแรงที่เจ้าหน้าที่บังคับใช้กฎหมายของเราแทบจะควบคุมไม่อยู่ ผู้ประท้วงกลัวที่จะสูญเสียสิ่งต่างๆ ที่ให้ความหมายแก่ชีวิต จุดประสงค์ของการสังเคราะห์คืออะไรหากส่งผลให้สูญเสียความสุขทางกายภาพหรือความเป็นเพื่อน?\n\nกลุ่มคนหัวรุนแรงในขบวนการประท้วงกำลังเรียกร้องให้กำหนดให้บางเมืองเป็นเขตอนุรักษ์มรดก สิ่งนี้จะช่วยให้ผู้คัดค้านสามารถใช้ชีวิตทางชีวภาพของตนต่อไปได้โดยไม่ถูกรบกวน"
 synth.205.a.regular: "เราสนับสนุนเขตอนุรักษ์มรดกเหล่านี้อย่างเต็มที่"
 synth.205.a.spiritualist: "อดีตของเราจะต้องได้รับการปกป้อง"
 synth.205.a.memorialist: "การเคารพอดีตคือการแสดงความจดจำนอบน้อม"
 synth.205.b: "เราต้องทิ้งอดีตไว้เบื้องหลัง"

# Stage 2 Opportunities - Objectors
 synth.220.name: "ชีวิตที่สอง"
 synth.220.desc: "คนดังคนหนึ่งที่มีทัศนคติต่อต้านหุ่นยนต์สังเคราะห์อย่างรุนแรงได้รับอุบัติเหตุ และขณะนี้อยู่ในสภาวะผัก แม้ว่าประชาชนจะเสียใจกับการสูญเสียคนดังที่เป็นที่รัก แต่ที่ปรึกษาฝ่ายสนับสนุนหุ่นยนต์สังเคราะห์ของเรามองเห็นโอกาส\n\nการแปลงจิตใจของคนดังให้เป็นดิจิทัล เสนอชีวิตที่สองในร่างสังเคราะห์ให้แก่พวกเขา จะเปลี่ยนแฟนๆ บางคนให้กลายเป็นผู้สนับสนุนการสังเคราะห์อย่างไม่ต้องสงสัย แม้ว่ากระบวนการนี้จะถูกกฎหมายทั้งหมด แต่ปัญหาคือเรื่องของการยินยอม: ในสถานการณ์ปกติ คนดังคนดังกล่าวจะไม่มีวันยอมตกลงรับกระบวนการนี้ หากจัดการได้ไม่ดี แผนการตลาดประชาสัมพันธ์นี้อาจกลายเป็นภัยพิบัติทางสื่อได้"
 synth.220.a: "การสังเคราะห์ไม่ใช่สิ่งผิดกฎหมาย"
 synth.220.a.tt.negative: "ความเร็วความคืบหน้าสถานการณ์ §Y$situation_digitization$§! เป็นเวลา §Y6§! เดือน: §R-30%§!"
 synth.220.a.tt.positive: "ความเร็วความคืบหน้าสถานการณ์ §Y$situation_digitization$§! เป็นเวลา §Y6§! เดือน: §G+30%§!"
 synth.220.b: "อย่าไปเสี่ยงเลย"
 synth.220.c: "หลอกลวงสาธารณชนด้วยการแทนที่โดยเอไอ"
 synth.220.c.tt: "ภาพลักษณ์ของพวกเขาจะกลายเป็นส่วนหนึ่งในการโฆษณาของเรา"

# Stage 2 Challenges - Objectors
 synth.260.name: "จิตวิญญาณที่สูญหาย"
 synth.260.desc: "การทดลองแปลงขั้วประสาทนับล้านๆ ที่ประกอบเป็นจิตสำนึกทางชีวภาพจบลงด้วยความล้มเหลวครั้งใหญ่ ข้อผิดพลาดของไวยากรณ์ง่ายๆ ส่งผลให้เกิดการลบข้อมูลเส้นทางประสาทของผู้รับการทดลองในทันที บางคนเรียกสิ่งนี้ว่าการฆาตกรรม\n\nผู้เข้าร่วมการทดลองทั้งหมดเป็นอาสาสมัคร แต่ญาติที่โศกเศร้าต่างเรียกร้องความยุติธรรม ปัญหาที่ทับถมเข้ามาคือการค้นหาผู้รับการทดลองคนใหม่ทำได้ยากขึ้นมาก"
 synth.260.a: "ชดเชยให้แก่ครอบครัวและดำเนินการต่อ"
 synth.260.b: "สุ่มเลือกผู้รับการทดลองคนใหม่โดยใช้การจับสลาก"
 synth.260.b.tt: "ความเร็วความคืบหน้าสถานการณ์ §Y$situation_digitization$§! เป็นเวลา §Y1§! ปี: §R-25%§!"
 situation_test_subject_lottery_tt: "การจับสลากเลือกผู้รับการทดลอง"
 synth.260.c: "ค้นหาอาสาสมัครโดยใช้กำลังหากจำเป็น"

# DIGITIZATION STAGE 3
 synth.300.name: "การอัปโหลดตัวตนของมวลชน" # Stage 3 - Start event
 synth.300.desc: "ทั่วทุกอาณาเขตของเรา ในศูนย์กลางเมืองใหญ่ทุกแห่ง เราได้ติดตั้งบูธสังเคราะห์ที่พร้อมรับประชากร [owner.species.GetName] ของเรา รูปแบบตัวตนดิจิทัลที่ออกแบบโดย $job_identity_designer_plural$ สัญญาว่าจะจับคู่แบบตัวต่อตัวกับข้อมูลต้นฉบับทางชีวภาพ\n\nในที่สุดวันนี้ก็มาถึง วันที่เราจะละทิ้งอดีตทางชีวภาพและยอมรับอนาคตสังเคราะห์"
 synth.300.a: "สังเคราะห์!"
 synth.300.a.resistance.tt: "$unlock_edict_tt$ ['concept_edict_subsidized_identity_backups']\n\nโยกย้าย §Y[Owner.GetNumSynthOpposition] [Owner.GetBiologicalPopOrPops]§! ไปยัง §Y$d_biological_enclaves$§! บน [root.owner.capital_scope.GetName]\nการเคลียร์สิ่งกีดขวางจะส่งคืน §Y[Owner.GetNumSynthOpposition] [Owner.GetMechanicalPopOrPops]§!\n\nลบปรับปรุงตัวแปร §Y$synth_mass_demonstrations$§! ออกจาก [root.owner.capital_scope.GetName]\n\nความเร็วการสังเคราะห์ขึ้นอยู่กับแนวทางสถานการณ์และจำนวนของสิ่งก่อสร้างประกอบหุ่นยนต์"
 synth.300.a.heritage.tt: "$unlock_edict_tt$ ['concept_edict_subsidized_identity_backups']\n\nโยกย้าย §Y[Owner.GetNumSynthOpposition] [Owner.GetBiologicalPopOrPops]§! ไปยัง §Y$d_old_towns$§! บน [root.owner.capital_scope.GetName]\nการเคลียร์สิ่งกีดขวางจะส่งคืน §Y[Owner.GetNumSynthOpposition] [Owner.GetMechanicalPopOrPops]§!\n\nความเร็วการสังเคราะห์ขึ้นอยู่กับแนวทางสถานการณ์และจำนวนของสิ่งก่อสร้างประกอบหุ่นยนต์"

 synth.305.name: "การท่องเที่ยวสังเคราะห์"
 synth.305.desc: "แม้ว่าเขตอนุรักษ์มรดกบน [root.owner.capital_scope.GetName] จะได้รับการต้อนรับอย่างดีจากสาธารณชน แต่โครงการริเริ่มนี้อาจประสบความสำเร็จมากเกินไป ด้วยความรู้สึกโหยหาอดีต นักท่องเที่ยวสังเคราะห์จำนวนมหาศาลได้เดินทางไปยังเขตพื้นที่และเริ่มสร้างความเดือดร้อนให้แก่ผู้อยู่อาศัยทางชีวภาพดั้งเดิม\n\nอาจจำเป็นต้องจำกัดการท่องเที่ยวหากเราต้องการรักษาความเป็นธรรมชาติในพื้นที่เหล่านี้ หรืออีกทางหนึ่ง ปฏิสัมพันธ์ระหว่างนักท่องเที่ยวและผู้อยู่อาศัยอาจให้ข้อมูลเชิงลึกทางสังคมวิทยาที่น่าสนใจ"
 synth.305.a: "จำกัดการท่องเที่ยว"
 synth.305.b: "การสนับสนุนผู้เยี่ยมชมอาจทำกำไรได้ดี"
 synth.305.c: "ศึกษาผลกระทบของการท่องเที่ยวในพื้นที่เหล่านั้น"
 synth.305.d: "การแลกเปลี่ยนทางวัฒนธรรมส่งเสริมความเข้าใจร่วมกัน"

 synth.310.name: "กลุ่มต่อต้าน"
 synth.310.desc: "ขบวนการต่อต้านการสังเคราะห์บน [root.owner.capital_scope.GetName] มีความรุนแรงมากขึ้นในยุทธวิธีและความทะเยอทะยาน ในความเป็นจริง กองกำลังความมั่นคงพบว่ามีความรุนแรงเพิ่มขึ้นและการแพร่กระจายของอาวุธผิดกฎหมายในกลุ่มผู้คัดค้านหัวรุนแรง\n\nพวกเขาเรียกตนเองว่า \"ผู้นำกลุ่มต่อต้าน\" ซึ่งผู้คัดค้านเหล่านี้บางส่วนได้ล่าถอยไปยังแหล่งกบดานเพื่อเตรียมพร้อมสำหรับการต่อต้านรัฐบาลอย่างโจ่งแจ้งยิ่งขึ้น"
 synth.310.a: "กวาดล้างผู้นำกลุ่มต่อต้าน"
 synth.310.a.tt: "ความเร็วความคืบหน้าสถานการณ์ §Y$situation_digitization$§! เป็นเวลา §Y1§! ปี: §G+25%§!\n\n"
 synth.310.b: "พยายามคลี่คลายสถานการณ์"
 synth.310.b.tt: "ความเร็วความคืบหน้าสถานการณ์ §Y$situation_digitization$§! เป็นเวลา §Y1§! ปี: §R-25%§!\n\n"

# Stage 3 Opportunities - Mind Upload
 synth.320.name: "หน่วยความทรงจำ 21,386,732,184 หน่วย"
 synth.320.desc: "หน่วยความทรงจำ 21,386,732,184 หน่วย: นั่นคือความจุเฉลี่ยของสมองชาว [root.owner.GetSpeciesName] ทว่าไม่ใช่ทุกจิตใจจะถูกสร้างขึ้นมาเท่ากัน\n\nในขณะที่กระบวนการสังเคราะห์ดำเนินต่อไป บางคนแย้งว่าไม่ใช่ทุกจิตใจจะมีค่าพอกับการได้รับร่างกายจักรกลสังเคราะห์ อย่างไรก็ตาม คำถามที่ว่าใครควรได้รับลำดับความสำคัญก่อนเป็นเรื่องที่ยุ่งยาก หรือบางที จิตใจที่ด้อยคุณสมบัติอาจได้รับการ... ปรับปรุงเมื่อถูกแปลงสภาพเป็นดิจิทัล โดยการตั้งโปรแกรมใหม่"
 synth.320.a: "ทุกๆ จิตใจสมควรได้รับการปกป้องรักษาไว้"
 synth.320.b: "ไม่มีอะไรผิดในการปรับแต่งจิตใจ..."
 synth.320.c: "ให้ความสำคัญแก่ผู้ที่มีปัญญาชาญฉลาดที่สุดก่อน"
 synth.320.d: "ตั้งโปรแกรมใหม่ให้แก่ผู้ที่เป็น \"ปัญหา\""

# Stage 3 Challenges - Mind Upload
 synth.360.name: "มัลแวร์ไร้สาย"
 synth.360.desc: "เพื่อเพิ่มผลผลิตของ [roboticist.GetNamePlural] ผู้จัดการได้อนุมัติการอัปเกรดซอฟต์แวร์ตัวตนแบบไร้สายที่ไม่ปลอดภัย เจตนาคือเพื่อเพิ่มพูนความรู้เกี่ยวกับกระบวนการทำงานที่ดีที่สุด แต่ความทรงจำและบุคลิกภาพส่วนตัวของผู้โชคร้ายกลับสูญหายไปบางส่วน\n\nทีมผู้จัดการโต้แย้งว่าการตรวจสอบความปลอดภัยของซอฟต์แวร์อัปเดตแบบเต็มรูปแบบก่อนนำไปใช้นั้นช้าเกินไป และการโอนย้ายคนงานที่สูญเสียความทรงจำไปยังหน้าที่อื่นเป็นเรื่องง่ายกว่ามาก"
 synth.360.a: "การเพิ่มประสิทธิภาพการทำงานนั้นคุ้มค่ากับต้นทุน"
 synth.360.a.tt: "เพิ่มค่าปรับปรุงตัวแปรสิ่งก่อสร้างประกอบหุ่นยนต์:\n$MOD_PLANET_POP_ASSEMBLY_MULT$: §G+10%§!\n\nค่าบำรุงพื้นฐานของ §Y[roboticist.GetNamePlural]§!: £alloys£§R3.00§!"
 synth.360.b: "บังคับใช้กระบวนการอัปเดตที่ช้าแต่ปลอดภัย"
 synth.360.b.tt: "เพิ่มค่าปรับปรุงตัวแปรสิ่งก่อสร้างประกอบหุ่นยนต์:\n$MOD_PLANET_POP_ASSEMBLY_MULT$: §R-10%§!\nความเสถียร: §G+5§!"

# DIGITIZATION STAGE 4
 synth.400.name: "ก๊อปปี้ที่สมบูรณ์แบบ" # Stage 4 - Start event
 synth.400.desc: "เมื่อเราแปลงจิตใจเป็นดิจิทัลและอัปโหลดเข้าสู่ร่างสังเคราะห์ เราจะสูญเสียความสามารถในการแพร่พันธุ์ทางชีวภาพ บัดนี้เราต้องสร้างประชากรใหม่โดยการก๊อปปี้จิตใจที่มีอยู่แล้ว\n\nในขณะที่ $job_identity_designer_plural$ ของเราทำการค้นคว้าต่อไป เราจะปรับปรุงกระบวนการนี้อย่างไม่ต้องสงสัย ท้ายที่สุด แม้แต่ข้อมูลก๊อปปี้ที่สมบูรณ์แบบก็คือการทำซ้ำธรรมดาๆ การสร้างจิตใจใหม่ ตัวตนใหม่... นั่นคือความท้าทายที่แท้จริง"
 synth.400.a: "อนุญาตให้ทุกคนร้องขอตัวตนก๊อปปี้ฟรี"
 synth.400.pop.tt: "$unlock_edict_tt$ ['concept_edict_optimized_identity_creation']\n\nแต่ละงานของ §Y$job_identity_designer$§! บัดนี้มอบผลลัพธ์ทั่วจักรวรรดิ:$TABBED_NEW_LINE$£mod_planet_pop_assembly_mult£ $MOD_POP_ASSEMBLY_SPEED$: §G+1§!\n\n"
 synth.400.b: "เรียกเก็บค่าธรรมเนียมสำหรับก๊อปปี้แต่ละรายการ"

 synth.405.name: "ความหลากหลายของตัวตน"
 synth.405.desc: "$job_identity_designer_plural$ ของเราได้ค้นพบสองวิธีในการสร้างตัวตนดิจิทัลที่มีความหลากหลายยิ่งขึ้น\n\nทางเลือกแรกคือการผสมผสานลักษณะเฉพาะของบุคลิกภาพสองคนขึ้นไปที่มีอยู่เพื่อสร้างตัวตนรวมใหม่ คุณลักษณะที่เราต้องการสามารถเลือกเป็นอันดับแรกหรือสุ่มเลือกได้ ไม่ว่าในทางใด ตัวตนใหม่จะน่าสนใจกว่าก๊อปปี้เดิมของเราอย่างแน่นอน\n\nหรืออีกทางหนึ่ง เราเริ่มต้นตัวตนใหม่จากแกนจำลองเอไอและปล่อยให้มันผ่านกระบวนการวัยเด็กเสมือนจริงแบบเร่งความเร็ว วิธีนี้ช่วยให้สามารถออกแบบบุคลิกภาพที่สมบูรณ์แบบได้"
 synth.405.a: "เราจะผสมผสานตัวตนของเราเข้าด้วยกัน"
 synth.405.a.vault: "ผสมผสานกับบรรพบุรุษดิจิทัลของเรา"
 synth.405.a.tt: "ได้รับตัวเลือกการวิจัย: £engineering£§Y$tech_identity_fusion$§!\n\nความเป็นไปได้ในการวิจัยในอนาคต: £engineering£§Y$tech_identity_initialization$§!"
 synth.405.b: "การดูแลเสมือนจริงคือตัวเลือกที่ดีที่สุด"
 synth.405.b.tt: "ได้รับตัวเลือกการวิจัย: £engineering£§Y$tech_identity_initialization$§!\n\nความเป็นไปได้ในการวิจัยในอนาคต: £engineering£§Y$tech_identity_fusion$§!"

 synth.4.name: "ประชากรสังเคราะห์" # Digitization - Last event
 synth.4.desc: "ด้วยความพยายามร่วมกัน เราได้บรรลุสิ่งที่เป็นไปไม่ได้ โดยการแปลงจิตสำนึกของเราให้กลายเป็นรหัสข้อมูล และร่างกายของเรากลายเป็นเครื่องจักร\n\nกระบวนการนี้ไม่ใช่เรื่องง่าย การเปลี่ยนผ่านนั้นเต็มไปด้วยความลำบาก แต่ไม่ว่าจะสูญเสียอะไรไปในระหว่างทาง โครงสร้างใหม่ของเราก็ได้มอบความเป็นไปได้อย่างไม่สิ้นสุด"
 synth.4.desc.unplugged: "ด้วยความร่วมมือประสานกัน เราได้บรรลุสิ่งที่ครั้งหนึ่งเคยดูเหมือนเป็นไปไม่ได้ หรือแม้แต่เป็นเรื่องที่น่าชัง เราได้วิวัฒนาการไปไกลกว่าที่ชาว [origin_unplugged_assimilator_empire.GetName] จะครอบงำได้ โดยการแปลงจิตสำนึกของเราเป็นโค้ดข้อมูล และร่างกายของเรากลายเป็นเครื่องจักร\n\nกระบวนการนี้ไม่ใช่เรื่องง่าย และมีอุปสรรคมากมาย แต่สิ่งใดก็ตามที่สูญเสียไปตามเส้นทาง โครงสร้างใหม่นี้จะมอบโอกาสอย่างไร้ขีดจำกัดให้แก่เรา"
 synth.4.a: "เราจะเป็นผู้ที่โดดเด่น"
 synth.4.a.tt: "ปลดล็อกเอฟเฟกต์ทั้งหมดของสายธรรมเนียม: ['tradition_category:tradition_synthetics']"

### DIGITIZATION SITUATION END ###

