# Synth Democratic Physical
 auth_synth_democratic_physical: "การถ่ายโอนแบบประชาธิปไตย"
 auth_synth_democratic_physical_desc: "รูปแบบการปกครองนี้ให้เสรีภาพในการเคลื่อนย้ายตัวตนจากร่างสังเคราะห์หนึ่งไปยังอีกร่างหนึ่งอย่างที่ไม่เคยมีมาก่อน และพร้อมที่จะจัดการกับค่าใช้จ่ายเพิ่มเติมที่เกิดขึ้น"
 auth_synth_democratic_physical_tt: "$auth_democratic_election_tt$\nประสิทธิภาพงานสำหรับผู้เชี่ยวชาญ: §G+1%§! ต่อ £district£ เขตพื้นที่\nค่าบำรุงเขตพื้นที่ §R+1%§! ต่อ £district£ เขตพื้นที่"
