l_english:

### DIGITIZATION SITUATION START ###
 situation_digitization: "การสังเคราะห์"
 situation_digitization_type:"สถานการณ์การก้าวข้ามขีดจำกัด"
 situation_digitization_desc: "ถึงเวลาที่จะละทิ้งร่างอินทรีย์อันบกพร่องของเราไปเบื้องหลังแล้ว เราต้องเตรียมร่างกายเครื่องจักรขั้นสูงและดำเนินกระบวนการถ่ายโอนจิตสำนึก\n\n§Yประชากรที่จะถูกสังเคราะห์ในเดือนหน้า§!: §G[From.GetSynthPopsPerMonth]§!"
 situation_digitization_monthly_change_tooltip: "จิตใจของเราจะกลายเป็นดิจิทัล ร่างกายของเราจะกลายเป็นเครื่องจักร"
 situation_digitization_outcome: "ประชากรสังเคราะห์"
 stage_digitization_effects: "เราต้องออกแบบการจำลองสมองแบบดิจิทัล สร้างร่างกายเครื่องจักร และแปลงสภาพตัวเราเอง"
# Approach Error Correcting
 situation_digitization_errorcorrecting: "การแก้ไขข้อผิดพลาด"
 approach_digitization_errorcorrecting_tt: "มีโอกาสสูงขึ้นที่จะเกิดเหตุการณ์ที่เป็นประโยชน์\n$situation_speed_tt$: §R-20%§!"
 situation_digitization_errorcorrecting_approach_tt: "$situation_digitization_errorcorrecting$ $situation_approach_tt$"
# Approach Real Time
 situation_digitization_realtime: "ตามเวลาจริง"
 approach_digitization_realtime_tt: "$situation_speed_tt$: §Yไม่มีการเปลี่ยนแปลง§!"
 situation_digitization_realtime_approach_tt: "$situation_digitization_realtime$ $situation_approach_tt$"
# Approach Overclocked
 situation_digitization_overclocked: "โอเวอร์คล็อก"
 approach_digitization_overclocked_tt: "มีความเสี่ยงสูงขึ้นที่จะเกิดเหตุการณ์ที่ท้าทาย\n$situation_speed_tt$: §G+20%§!"
 situation_digitization_overclocked_approach_tt: "$situation_digitization_overclocked$ $situation_approach_tt$"

 situation_num_identity_complex_tt: "$building_identity_complex$"
 situation_digitization_ongoing_desc: "การสังเคราะห์กำลังดำเนินอยู่"
 situation_digitization_pause_desc: "$situation_cyberization_pause_desc$"
 situation_identity_complex_needed_desc: "£trigger_no£ ไม่มีผลงานของ $building_identity_complex$ ที่เปิดใช้งานอยู่"
 synth_positive_media_coverage_tt: "การรายงานข่าวเชิงบวกของสื่อ"
 synth_negative_media_coverage_tt: "การรายงานข่าวเชิงลบของสื่อ"

 biological_pop: "£pop£ ประชากรชีวภาพ"
 biological_pops: "£pop£ ประชากรชีวภาพ"
 mechanical_pop: "£pop£ ประชากรเครื่องกล"
 mechanical_pops: "£pop£ ประชากรเครื่องกล"
 pop_is: "คือ"
 pops_are: "คือ"

# Buildings
 building_identity_complex: "ศูนย์วิจัยและพัฒนาตัวตนครบวงจร"
 building_identity_complex_desc: "ศูนย์กลางล้ำสมัยสำหรับการวิจัยและพัฒนาตัวตนสังเคราะห์"
 building_identity_complex_speed:"ประชากร §G+100§! £pop£ §H§!"
 building_identity_complex_effect_desc: "อัปโหลด $building_identity_complex_speed$ ต่อเดือน"
 building_ai_emporium: "เอไอเอ็มโพเรียม"
 building_ai_emporium_desc: "ศูนย์รวมความต้องการด้าน AI ครบวงจร ให้เอไอที่รับรู้ความรู้สึกเปลี่ยนวัตถุธรรมดาให้กลายเป็นเพื่อนอัจฉริยะสำหรับครอบครัวหรือธุรกิจของคุณ หากเอไอเริ่มตระหนักรู้ในตัวเองมากเกินไปรึ? พามาที่นี่สิ แล้วช่างผู้มีทักษะของเราจะรีเซ็ตมันให้เร็วกว่าความเร็วแสงต่ำกว่าวินาที"
 building_ai_emporium_fail_tt: "$TRIGGER_FAIL$เรามี §Y$building_ai_emporium$§! อยู่แล้วใน §Y[planet.owner.GetName]§!"
 building_ai_emporium_outlawed_robots_tt: "$TRIGGER_FAIL$§Y[planet.owner.GetName]§! ได้ออกกฎหมายห้ามหุ่นยนต์"
 building_clear_thought_clinic: "คลินิกเคลียร์ความคิด"
 building_clear_thought_clinic_desc: "มีความทรงจำที่คุณไม่ต้องการอีกต่อไปใช่ไหม? เปลี่ยนเป็นพลังงานเครดิตสิ! ทีมงานที่ผ่านการฝึกฝนของเราจะลบมันออกอย่างปลอดภัยและมั่นคง! ยิ่งความทรงจำนั้นน่ายินดีเท่าไหร่ ค่าตอบแทนก็ยิ่งมากขึ้นเท่านั้น!\n\nการดำเนินการนี้ถือเป็นที่สิ้นสุดและรูปแบบความคิดจะไม่สามารถกู้คืนได้เมื่อสกัดออกมาแล้ว"
 clear_thought_clinic_modifier: "$building_clear_thought_clinic$"
 clear_thought_clinic_tt: "โบนัสเครือข่ายสายลับที่ไม่ซ้อนทับกัน: $TABBED_NEW_LINE$$MOD_SPY_NETWORK_DAILY_VALUE_MULT$: §G+25%§! $TABBED_NEW_LINE$$MOD_SPY_NETWORK_LEVELS_ADD$: §G+10§!"

# Jobs
 m_pop_assembly: "£mod_planet_pop_assembly_add£ §Y$MOD_PLANET_POP_ASSEMBLY_ADD$§!"

 job_identity_designer: "นักออกแบบตัวตน"
 job_identity_designer_plural: "นักออกแบบตัวตน"
 job_identity_designer_plural_with_icon: "£job_identity_designer£ $job_identity_designer_plural$"
 job_identity_designer_converter_desc: "$job_identity_designer_plural$ ช่วยอำนวยความสะดวกในการแปลงสภาพจากร่างชีวภาพไปเป็นตัวตนดิจิทัล เพื่อให้มั่นใจในกระบวนการเปลี่ยนผ่านที่ไร้ความเจ็บปวด"
 job_identity_designer_converter_effect_desc: "$job_identity_designer_plural_with_icon$ ให้ $i_engineering$ และ $i_amenities$"
 job_identity_designer_desc: "$job_identity_designer_plural$ สร้างสรรค์จิตใจสังเคราะห์ใหม่อย่างประณีตบรรจง"
 job_identity_designer_effect_desc: "$job_identity_designer_plural_with_icon$ มอบ $i_engineering$, $i_amenities$ และการประกอบประชากรทั่วจักรวรรดิ $m_pop_assembly$"
 mod_job_identity_designer_add: "งาน $job_identity_designer$"

 job_roboticist_plural_and_job_identity_designer_plural: "[roboticist.GetNamePlural] และ $job_identity_designer_plural$"
 job_roboticist_plural_with_icon_and_job_identity_designer_plural_with_icon: "$job_roboticist_plural_with_icon$ และ $job_identity_designer_plural_with_icon$"

 councilor_ruler_imperial_synth: "$imperial_ruler$"
 councilor_ruler_imperial_synth_desc: "$imperial_ruler_desc$"

# Traits

# Modifiers
 synth_opposition_truth: "แคมเปญข้อมูลการสังเคราะห์"
 synth_opposition_truth_desc: "ส่งเสริมข้อมูลที่แท้จริงในทุกแง่มุมที่เกี่ยวข้องกับการสังเคราะห์"
 synth_opposition_deception: "แคมเปญบิดเบือนข้อมูลการสังเคราะห์"
 synth_opposition_deception_desc: "บิดเบือนกระแสสังคมเพื่อเน้นแง่มุมเชิงบวกของการสังเคราะห์จิตใจ"

 synth_tinkering_with_minds: "การปรับแต่งจิตใจ"
 synth_tinkering_with_minds_desc: "จิตใจที่เพิ่งเข้าสู่ระบบดิจิทัลจะได้รับการตั้งโปรแกรมใหม่ในระดับปานกลางเพื่อให้สอดคล้องกับวิสัยทัศน์แห่งอนาคตของเรา"
 synth_brightest_minds: "จัดลำดับความสำคัญของผู้ที่ชาญฉลาดที่สุด"
 synth_brightest_minds_desc: "เฉพาะบุคคลที่โดดเด่นที่สุดเท่านั้นที่จะได้รับเลือกให้เข้าร่วมโปรแกรมการสังเคราะห์ของเรา"
 synth_reprogram_minds: "การตั้งโปรแกรมใหม่แบบกดขี่"
 synth_reprogram_minds_desc: "รัฐบาลนี้กำลังตั้งโปรแกรมใหม่ให้กับบุคคลที่ \"ไม่เหมาะสม\" เป็นวงกว้างในขณะที่พวกเขาถูกเปลี่ยนเป็นดิจิทัล"

 victim_compensation: "การชดเชยเหยื่อ"
 victim_compensation_desc: "เงินชดเชยแก่ครอบครัวของผู้ที่สูญเสียจิตใจไประหว่างการถ่ายโอนการสังเคราะห์"

 synth_mandatory_volunteers: "อาสนสมัครภาคบังคับ"
 synth_mandatory_volunteers_desc: "ผู้ถูกทดสอบถูกบังคับให้เข้าร่วมการทดลองเพื่อแปลงจิตสำนึกทางชีวภาพเป็นดิจิทัล"
 synth_mass_demonstrations: "การประท้วงของมวลชน"
 synth_mass_demonstrations_desc: "กำลังแรงงานของดาวเคราะห์กำลังยุ่งอยู่กับการประท้วงครั้งใหญ่เพื่อต่อต้านแผนการเปลี่ยนผ่านไปสู่การเป็นเครื่องจักร"
 synth_fund_heritage_sites: "สนับสนุนทุนเขตอนุรักษ์มรดก"
 synth_fund_heritage_sites_desc: "เขตอนุรักษ์มรดกพิเศษจะถูกสร้างขึ้นเพื่อลดผลกระทบของการเปลี่ยนผ่านสู่สังเคราะห์ต่อสมาชิกทางชีวภาพของเผ่าพันธุ์เรา"
 synth_revere_the_past: "เคารพในอดีต"
 synth_revere_the_past_desc: "พิธีกรรมทางศาสนาที่เกิดจากการดำรงอยู่ทางชีวภาพของเรายังคงมีความสำคัญต่อเรา และเราต้องปกป้องสถานที่สักการะเหล่านี้"
 synth_preserve_the_past: "ปกปักษ์รักษาอดีต"
 synth_preserve_the_past_desc: "การเปิดรับการดำรงอยู่ใหม่อย่างเต็มที่ไม่ได้หมายความว่าเราควรทำลายสถานที่และวัตถุที่เคยให้ความหมายแก่ชีวิตชีวภาพในอดีตของเรา"
 synth_resistance_fight: "กวาดล้างผู้นำกลุ่มต่อต้าน"
 synth_resistance_fight_desc: "การส่งทีมเครื่องจักรของเราเข้าไปใน $d_biological_enclaves_no_icon$ เพื่อจับกุมผู้นำกลุ่มต่อต้านจะช่วยระงับข้อคัดค้านได้อย่างรวดเร็ว"
 synth_resistance_diplomacy: "การเจรจากับผู้นำกลุ่มต่อต้าน"
 synth_resistance_diplomacy_desc: "การไปเยือน $d_biological_enclaves_no_icon$ เพื่อพบปะกับผู้นำกลุ่มต่อต้านจะช่วยปรับปรุงความเข้าใจร่วมกันได้ดีขึ้น"

 synth_character_force: "เลียนแบบร่างอินทรีย์เดิม"
 synth_character_force_desc: "รูปลักษณ์ดั้งเดิมของเผ่าพันธุ์เราจะถูกบันทึกรักษาไว้ในขอบเขตดิจิทัล"
 synth_character_customize: "ปรับแต่งร่างสังเคราะห์ไร้ข้อจำกัด"
 synth_character_customize_desc: "ประชาชนสามารถปรับเปลี่ยนรูปลักษณ์ดิจิทัลใหม่ของพวกเขาได้อย่างอิสระ"
 synth_character_customize_elite: "จำกัดการปรับแต่งร่างสังเคราะห์"
 synth_character_customize_elite_desc: "เพื่อรักษาโครงสร้างทางสังคมที่ชัดเจน เฉพาะชนชั้นสูงเท่านั้นที่ได้รับอนุญาตให้ปรับเปลี่ยนรูปลักษณ์ของตนเอง"
 synth_character_customize_corpo: "การปรับแต่งร่างสังเคราะห์เชิงพาณิชย์"
 synth_character_customize_corpo_desc: "ประชาชนมีอิสระในการปรับเปลี่ยนรูปลักษณ์ดิจิทัลของตน—ตราบใดที่พวกเขามีเงินจ่าย"

 synth_cravings_imperfections: "เจตนาสร้างความบกพร่องในร่างสังเคราะห์"
 synth_cravings_imperfections_desc: "เพื่อหลีกเลี่ยงการดำรงอยู่ที่ว่างเปล่าและไร้ความรู้สึก จึงได้มีการเพิ่มคุณลักษณะที่บกพร่องโดยเจตนาลงในร่างกายสังเคราะห์"
 synth_cravings_simulation: "ชีวิตในการจำลอง"
 synth_cravings_simulation_desc: "เราพยายามสร้างการดำรงอยู่ที่แท้จริงยิ่งขึ้นสำหรับผู้ที่เลือกใช้ชีวิตในระบบจำลอง รวมถึงความยากลำบากต่างๆ ด้วย"
 synth_cravings_stop: "ละเลยฝ่ายขวาจัดหัวรุนแรงชีวภาพ"
 synth_cravings_stop_desc: "เมื่อเวลาผ่านไป ประชาชนของเราจะเห็นคุณค่าของชีวิตที่สมบูรณ์แบบโดยปราศจากความยากลำบากทางชีวภาพ"
 synth_cravings_pain: "ลานประลองเสมือนจริง"
 synth_cravings_pain_desc: "การเข้าร่วมในการต่อสู้เสมือนจริงที่เจ็บปวดนำมาซึ่งจุดประสงค์ที่เป็นที่รู้จักแก่ทั้งผู้เข้าร่วมและผู้เฝ้าดู"

 synth_health_physical: "เน้นสุขภาพกายร่างสังเคราะห์"
 synth_health_physical_desc: "การดูแลสุขภาพสังเคราะห์ของเราจะให้ความสำคัญกับความเสียหายของระบบส่วนท้องถิ่นก่อน"
 synth_health_virtual: "เน้นสุขภาพจิตสังเคราะห์"
 synth_health_virtual_desc: "การรับประกันความปลอดภัยของจิตใจผ่านการอัปเดตซอฟต์แวร์อย่างสม่ำเสมอเป็นสิ่งจำเป็นสำหรับสุขภาพของเรา"
 synth_health_both: "เน้นสุขภาพสังเคราะห์แบบสมดุล"
 synth_health_both_desc: "การจัดการกับความไม่เสถียรของทั้งซอฟต์แวร์และฮาร์ดแวร์เป็นสิ่งจำเป็นสำหรับความเป็นอยู่ที่ดีของประชาชนของเรา"
 synth_health_corporate: "การแพทย์สังเคราะห์เชิงพาณิชย์"
 synth_health_corporate_desc: "การขยายความเชี่ยวชาญของบรรษัทของเรานอกเหนือจากการแพทย์ดั้งเดิมเป็นสิ่งสำคัญยิ่งในการรักษาไวรัสคอมพิวเตอร์ดิจิทัล"

 synth_virtual_world_outlaw: "ควบคุมโลกเสมือนจริงเป็นสิ่งผิดกฎหมาย"
 synth_virtual_world_outlaw_desc: "รีสอร์ตเสมือนจริงที่ก่อให้เกิดการเสพติดอย่างรุนแรงถูกจัดเป็นสิ่งผิดกฎหมายเนื่องจากเป็นภัยคุกคามต่อสังคม"
 synth_virtual_world_promote: "ส่งเสริมโลกเสมือนจริง"
 synth_virtual_world_promote_desc: "ประชาชนมีอิสระในการเพลิดเพลินกับความบันเทิงในรูปแบบต่างๆ ที่ไม่มีวันสิ้นสุดในโลกดิจิทัลยูโทเปีย"
 synth_virtual_world_regulate: "ควบคุมโลกเสมือนจริง"
 synth_virtual_world_regulate_desc: "รีสอร์ตเสมือนจริงที่ทำให้เสพติดได้ง่ายจะได้รับการควบคุมอย่างเข้มงวดเพื่อให้มั่นใจว่าผู้คนยังคงรักษาการเชื่อมต่อกับความเป็นจริง"

 synth_home_centralized: "ฟาร์มเซิร์ฟเวอร์ส่วนกลาง"
 synth_home_centralized_desc: "จิตสำนึกดิจิทัลแต่ละดวงถูกเก็บไว้ในฟาร์มเซิร์ฟเวอร์ส่วนกลางของรัฐเพื่อให้เกิดความคุ้มค่าด้านต้นทุนสูงสุด"
 synth_home_distributed: "เซิร์ฟเวอร์ประจำบ้านแบบกระจายตัว"
 synth_home_distributed_desc: "จิตสำนึกดิจิทัลจะถูกเก็บไว้ในทรัพย์สินส่วนตัวตามประเพณีดั้งเดิม"
 synth_digital_homes: "อสังหาริมทรัพย์ดิจิทัล"
