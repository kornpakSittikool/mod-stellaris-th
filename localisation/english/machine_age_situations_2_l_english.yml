 synthshock_chain_title: "การจัดระเบียบโครงสร้างดิจิทัล"
 synthshock_chain_desc: "การสังเคราะห์ประชากรทั้งหมดเป็นภารกิจที่มีขนาดใหญ่มาก มันต้องมีผลกระทบตามมาอย่างหลีกเลี่ยงไม่ได้ ในขณะที่เราปรับตัวเข้าสู่สภาวะปกติใหม่ ความท้าทายที่คาดเดาไม่ได้และโอกาสพิเศษจะส่งผลต่อชีวิตประจำวันของเราอย่างแน่นอน\n\nวิธีที่เรารับมือกับการเปลี่ยนแปลงเหล่านี้จะกำหนดทิศทางสังคมของเราไปอีกหลายยุคสมัย"
 synth_keep_auth_option: "การสังเคราะห์ไม่ได้เปลี่ยนแปลงตัวตนของเรา"

