# DICTATORIAL
# Synth Dictatorship Physical
 auth_synth_dictatorial_physical: "การร่วมร่างแบบเผด็จการ"
 auth_synth_dictatorial_physical_desc: "ตัวเชื่อมต่อประสาทที่ซิงค์เข้าด้วยกันและโครงสร้างพื้นฐานที่สนับสนุน ช่วยให้บุคคลเพียงคนเดียวสามารถควบคุมร่างกายสังเคราะห์หลายร่างได้พร้อมกัน สิ่งนี้ส่งผลดีและมหาศาลต่อประสิทธิภาพของกำลังแรงงาน"
