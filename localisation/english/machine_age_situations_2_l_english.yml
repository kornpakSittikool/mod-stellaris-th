# Synth Dictatorship Virtual
 auth_synth_dictatorial_virtual: "การปลูกฝังอุดมการณ์เผด็จการ"
 auth_synth_dictatorial_virtual_desc: "ขณะนี้เราดำรงอยู่ในโลกเสมือนจริงอย่างสมบูรณ์ ไม่มีสิ่งใดเป็นความจริง ทุกสิ่งสามารถถูกแต่งเติมขึ้นมาได้\n\nด้วยการควบคุมสภาพแวดล้อมการเป็นอยู่อย่างสมบูรณ์ ความคิดเห็นของสาธารณชนจึงอยู่ในมือของเราที่จะหล่อหลอม ประชาชนจะเชื่อในสิ่งที่เราต้องการให้เชื่อ"
 concept_auth_synth_dictatorial_virtual: "$auth_synth_dictatorial_virtual$"
 gov_synth_dictatorship_virtual: "$auth_synth_dictatorial_virtual$"
 gov_synth_dictatorship_virtual_desc: "$auth_synth_dictatorial_virtual_desc$"

# IMPERIAL
# Synth Imperial Physical
 auth_synth_imperial_physical: "มรดกจิตวิญญาณแห่งจักรวรรดิ"
 auth_synth_imperial_physical_desc: "เราสามารถเร่งความพยายามในการวิจัยของเราได้โดยการวิเคราะห์ข้อมูลความทรงจำที่จัดเก็บไว้ของผู้นำผู้ล่วงลับในหอจดหมายเหตุความทรงจำของจักรวรรดิ ด้วยวิธีนี้ พวกเขายังคงมีส่วนร่วมช่วยเหลือจักรวรรดิได้ตามที่พวกเขาปรารถนาอย่างแน่นอน\n\nบัลลังก์จักรวรรดิจะได้รับการสืบทอดโดยรัชทายาทที่กำหนดไว้เมื่อผู้ปกครองล่วงลับ"
 auth_synth_imperial_physical_tt: "ผู้นำจะมอบ $r_research$ เมื่อล่วงลับลง: $TABBED_NEW_LINE$$scientist_plural_with_icon$ - $r_physics$ $TABBED_NEW_LINE$$official_plural_with_icon$ - $r_society$ $TABBED_NEW_LINE$$commander_plural_with_icon$ - $r_engineering$ $NEW_LINE$ ค่า $r_research$ ที่ได้รับจะเพิ่มตามระดับทักษะของผู้นำ §Yระดับทักษะผู้นํา§!"

 concept_auth_synth_imperial_physical: "$auth_synth_imperial_physical$"
 gov_synth_imperial_physical: "$auth_synth_imperial_physical$"
 gov_synth_imperial_physical_desc: "$auth_synth_imperial_physical_desc$"

# Synth Imperial Virtual
 auth_synth_imperial_virtual: "การถ่ายทอดแบบจักรวรรดิ"
 auth_synth_imperial_virtual_desc: "เทคโนโลยีการถ่ายโอนจิตใจอย่างรวดเร็วทำให้เรามีโอกาสส่งทหารที่ล้มตายกลับสู่การศึกในร่างกายเครื่องจักรใหม่ เทคนิคแบบเดียวกันช่วยให้คนงานของเราสามารถซ่อมแซมยานอวกาศที่เป็นอันตรายในอวกาศได้โดยปราศจากความเสี่ยง\n\nบัลลังก์จักรวรรดิจะได้รับการสืบทอดโดยรัชทายาทที่กำหนดไว้เมื่อผู้ปกครองล่วงลับ"
 auth_synth_imperial_virtual_tt: "กองทัพเครื่องจักรของเรามีโอกาส §Y33%§! ที่จะได้รับการฟื้นฟูเมื่อพ่ายแพ้"
 concept_auth_synth_imperial_virtual: "$auth_synth_imperial_virtual$"
 gov_synth_imperial_virtual: "$auth_synth_imperial_virtual$"
 gov_synth_imperial_virtual_desc: "$auth_synth_imperial_virtual_desc$"

# CORPORATE
# Synth Corporate Physical
 auth_synth_corporate_physical: "AI ระดับบรรษัท"
 auth_synth_corporate_physical_desc: "จิตใจสังเคราะห์ที่ได้รับการจำกัดสามารถฝังเข้าไว้ในวัตถุที่ไม่มีชีวิตเพื่อสร้างสิ่งมีชีวิตขั้นต้นได้ มันสามารถทำหน้าที่เป็นคนรับใช้ที่ทำงานไม่มีเหน็ดเหนื่อย สหายผู้ซื่อสัตย์ หรือแม้แต่สมาชิกที่มีค่าในครอบครัวหรือธุรกิจของคุณ\n\nรัฐบาลของบรรษัทเป็นวิสาหกิจการค้าขนาดใหญ่ที่เข้ามาแทนที่บทบาทของรัฐโดยสิ้นเชิง"
