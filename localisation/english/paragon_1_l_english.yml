 paragon_efficient_council:0 "สภาที่มีประสิทธิภาพ"
 paragon_efficient_council_desc:1 "สภามีความเข้มแข็งขึ้นจากการถอดถอนผู้เข้าร่วมที่เป็นเชิงลบออกไป"
 paragon_dysfunctional_council:0 "สภาที่ไร้ประสิทธิภาพ"
 paragon_dysfunctional_council_desc:1 "เนื่องจากผู้แทนสภาที่ชอบสร้างความขัดแย้งยังคงดำรงตำแหน่ง ประสิทธิภาพโดยรวมในทุกด้านจึงลดลง"

 paragon_applied_physics:0 "แรงบันดาลใจหายาก - ฟิสิกส์"
 paragon_applied_physics_desc:1 "นักวิทยาศาสตร์ของเราได้รับแรงบันดาลใจจากปรากฏการณ์ในห้วงอวกาศ ส่งผลให้ผลงานวิจัยเพิ่มมากขึ้น"
 paragon_applied_society:0 "แรงบันดาลใจหายาก - สังคมศาสตร์"
 paragon_applied_society_desc:0 "$paragon_applied_physics_desc$"
 paragon_applied_engineering:0 "แรงบันดาลใจหายาก - วิศวกรรมศาสตร์"
 paragon_applied_engineering_desc:0 "$paragon_applied_physics_desc$"

 paragon_confiscated_contraband:0 "สินค้าลักลอบที่ถูกยึด"
 paragon_confiscated_contraband_desc:0 "ผู้ลักลอบค้าของเถื่อนในท้องถิ่นประสบปัญหาอย่างมากในการดำเนินงาน หลังจากคลังเก็บสินค้าหลักของพวกเขาถูกกองกำลังความมั่นคงบุกค้น"

 paragon_unified_council:0 "สภาที่เป็นเอกภาพ"
 paragon_unified_council_desc:1 "สภาของเรามีเป้าหมายที่เป็นหนึ่งเดียวกัน"

 paragon_scientific_progress:0 "ความก้าวหน้าทางวิทยาศาสตร์"
 paragon_scientific_progress_desc:1 "ต้องขอบคุณการเติบโตของชุมชนวิทยาศาสตร์เมื่อเร็ว ๆ นี้ ทำให้นักวิจัยของเรามีแรงจูงใจในการทำงานทดลองและพัฒนาเทคโนโลยีใหม่ ๆ มากขึ้น"

 paragon_data_leak:0 "ข้อมูลรั่วไหลอย่างรุนแรง"
 paragon_data_leak_desc:1 "สังคมของเรากำลังเกิดความระส่ำระสายเนื่องจากมือสมัครเล่นที่เป็นต้นเหตุของข้อมูลรั่วไหลยังคงทำงานในฐานะเจ้าหน้าที่ระดับสูงของรัฐบาล"
 paragon_data_leak_punished:0 "ข้อมูลรั่วไหล"
 paragon_data_leak_punished_desc:0 "เนื่องจากเอกสารรั่วไหลเมื่อเร็ว ๆ นี้ ระบบรักษาความปลอดภัยของเราจึงถูกเจาะและจำเป็นต้องได้รับการปรับปรุงใหม่ทั้งหมด"

 paragon_stylish_trends:0 "กระแสนิยมสุดล้ำ"
 paragon_stylish_trends_desc:1 "กระแสความนิยมด้านสุนทรียศาสตร์ผ่านมาแล้วก็ผ่านไป แพร่กระจายอย่างรวดเร็วในหมู่พลเมืองของเรา และจางหายไปอย่างรวดเร็วเช่นกัน"

 paragon_inspired_rhetoric:0 "วาทศิลป์อันสร้างแรงบันดาลใจ"
 paragon_inspired_rhetoric_desc:1 "ผู้คนได้รับความฮึกเหิมจากสุนทรพจน์อันทรงพลังและเปี่ยมด้วยแรงบันดาลใจภายใต้ร่มธงแห่งความรักชาติ"

 paragon_individualistic_tendency_approved:0 "อนุมัติแนวโน้มความเป็นปัจเจกบุคคล"
 paragon_individualistic_tendency_approved_desc:1 "แนวโน้มความเป็นปัจเจกบุคคลส่วนใหญ่ถูกควบคุมไว้ได้ แม้จะเกิดความวุ่นวายอยู่บ้าง แต่เราก็ได้รับโอกาสอันเป็นเอกลักษณ์ในการศึกษาปรากฏการณ์เหล่านี้"
 paragon_individualistic_tendency_discarded:0 "ละทิ้งแนวโน้มความเป็นปัจเจกบุคคล"
 paragon_individualistic_tendency_discarded_desc:0 "แนวโน้มความเป็นปัจเจกบุคคลถูกศึกษาและแก้ไข ส่งผลให้เกิดจิตสำนึกที่เป็นเอกภาพมากขึ้นในกระบวนการนี้"

 paragon_empire_wide_scandal:0 "เรื่องอื้อฉาวทั่วทั้งจักรวรรดิ"
 paragon_empire_wide_scandal_desc:0 "พลเมืองกำลังประท้วงการตัดสินใจที่จะปล่อยให้ผู้แทนสภาที่มีประวัติอื้อฉาวดำรงตำแหน่งต่อไป"
 paragon_empire_wide_scandal_averted:0 "จัดการกับเรื่องอื้อฉาวแล้ว"
 paragon_empire_wide_scandal_averted_desc:1 "พลเมืองสนับสนุนการตัดสินใจของเราในการขับไล่ผู้แทนสภาที่มีประวัติอื้อฉาวออกไป"

