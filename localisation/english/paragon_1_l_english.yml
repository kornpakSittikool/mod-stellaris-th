 ### Paragon

 PARAGON_TITLE: "Galactic Paragons" # Do not translate
 DLC_PARAGON_RECOMMENDATION_DESC:1 "§Sพารากอน กาแลกติก§! คือภาคเสริมที่เน้นไปที่ผู้นำ สภาที่บริหารจัดการจักรวรรดิของคุณ และวาระต่าง ๆ ที่มีอิทธิพลต่อเป้าหมายของคุณในเวทีระดับกาแล็กซี"
 DLC_PARAGON_RECOMMENDATION_REC:1 "เราขอแนะนำ §Sพารากอน กาแลกติก§! เนื่องจากตัวเลือกบางส่วนที่คุณเลือกนั้นเหมาะกับเนื้อหาของภาคเสริมนี้"

 SECTOR_EDIT_VIEW:0 "แก้ไขเซ็กเตอร์"
 EDITING_SECTOR:0 "กำลังแก้ไขเซ็กเตอร์: $SECTOR_NAME|Y$"
 SECTOR_EDITOR_HELP:1 "§H$SECTOR_EDIT_VIEW$§!\nการใช้ §Hหน้าต่าง$SECTOR_EDIT_VIEW$§! คุณสามารถเพิ่มหรือลบระบบดาวที่เชื่อมต่อกันและคุณเป็นเจ้าของระบบได้อย่างอิสระภายในขอบเขตของ £sector_capital£§Yศูนย์กลางของเซ็กเตอร์§!\n$SEPARATOR$$SEPARATOR$$SEPARATOR$\n§Eเมื่อเปิดใช้งานให้ขยายเขตแดนเซ็กเตอร์อัตโนมัติ เซ็กเตอร์จะขยายเขตแดนโดยไม่ไปกินพื้นที่ของเซ็กเตอร์อื่นที่มีอยู่ก่อนหน้า§!"
 SECTOR_EDITOR_ADD_SYSTEMS:0 "เพิ่มระบบดาว"
 SECTOR_EDITOR_REMOVE_SYSTEMS:0 "ลบระบบดาว"
 SECTOR_EDITOR_AUTO_EXPAND_TEXT:0 "ขยายเซ็กเตอร์อัตโนมัติ"
 SECTOR_AUTO_EXPAND:0 "สลับถ้า§Yเซ็กเตอร์§!ควรขยายโดยอัตโนมัติเพื่อบรรจุระบบดาวใหม่"

 democratic_local_government:0 "คณะบริหารระบอบประชาธิปไตย"
 oligarchic_local_government:0 "รัฐบาลระบอบคณาธิปไตย"
 dictatorial_local_government:0 "คณะกรรมาธิการระบอบเผด็จการ"
 imperial_local_government:0 "สมัชชาจักรวรรดิ"
 hive_mind_local_government:0 "จิตสำนึกร่วมรัง"
 machine_intelligence_local_government:0 "ศูนย์กลางปัญญาประดิษฐ์จักรกล"
 corporate_local_government:0 "สำนักงานบรรษัท"

 ####################
 ### THE BEHOLDER ###
 ####################

 # Chain aborted, due to either on_colonized or on_uplift_completion
 paragon.102.name:0 "แท่งหินที่สูญหาย"
 paragon.102.desc:0 "แท่งหินบน [beholder_planet.GetName] ได้หายไป ทิ้งรอยหลุมอุกกาบาตขนาดใหญ่ไว้เบื้องหลัง เหล่าผู้อยู่อาศัยยุคก่อนมีปัญญาต่างยืนเรียงรายอยู่ขอบหน้าผา ดูเหมือนจะมึนงง"

 # RECRUITMENT #
 paragon_beholder_category:0 "ค่าสัญญาณที่พุ่งสูง"
 paragon_beholder_category_desc:0 "เราตรวจพบพลังงานที่พุ่งสูงขึ้นเป็นระยะ ๆ จากดาวเคราะห์ดวงนี้ ค่าสัญญาณเหล่านี้บ่งบอกถึงสิ่งที่มีพลังงานมหาศาล และเหนือกว่าขีดความสามารถของสิ่งมีชีวิตยุคก่อนมีปัญญาที่เราได้เฝ้าสังเกตอย่างมาก"

 paragon.3.name:0 "ค่าสัญญาณที่พุ่งสูง"
 paragon.3.desc:0 "เราได้ระบุแหล่งที่มาของการผันผวนของพลังงานบน [From.GetName] ไปยังโครงสร้างแท่งหินขนาดใหญ่ใจกลางอาณาเขตยุคก่อนมีปัญญา มีผู้พบเห็นประชากรในท้องถิ่นมารวมตัวกันรอบโครงสร้างนี้ด้วยความอยากรู้อยากเห็น\n\nหากเราต้องการระบุวัตถุประสงค์ของวัตถุนี้ การโต้ตอบกับผู้อยู่อาศัยบนดาวเคราะห์ดวงนี้จึงเป็นสิ่งที่หลีกเลี่ยงไม่ได้"
 paragon.3.a:0 "ส่งทีมลงไปเพื่อเริ่มการสืบสวน"
 paragon.3.b:0 "$distar.255.b$"

 paragon.4.name:0 "แท่งหินกระซิบ"
 paragon.4.desc:0 "ทีมงานของเราได้เริ่มทำการสืบสวนโครงสร้างบน [From.From.GetName] แล้ว มันคือพีระมิดสี่ด้านโบราณ นักวิทยาศาสตร์รายงานว่าได้ยินเสียงกระซิบแปลก ๆ ในบริเวณใกล้เคียง และได้ตั้งชื่อมันว่า 'แท่งหินกระซิบ'\n\nแท่งหินนี้ดูเหมือนจะมีบทบาทสำคัญในระบบความเชื่อพื้นฐานของสายพันธุ์ยุคก่อนมีปัญญาบนดาวเคราะห์ดวงนี้ เป็นเรื่องไม่ปกติที่จะได้เห็นสายพันธุ์ที่มีระดับการรับรู้เท่านี้พัฒนาพิธีกรรมทางจิตวิญญาณที่ซับซ้อน ทั้งที่พวกเขายังไม่เริ่มใช้เครื่องมือเลยด้วยซ้ำ\n\nชาว [beholder_presapients.GetAdj] นั้นหวงถิ่นและถูกยั่วยุได้ง่าย การมาเยือนของเราทำให้พวกเขารู้สึกถูกรบกวน และเริ่มมีกลุ่มมารวมตัวกันรอบแท่งหินมากขึ้น การจะเข้าถึงโครงสร้างนี้จำเป็นต้องใช้กำลัง"
 paragon.4.a:0 "เราต้องได้รับความไว้วางใจจากพวกเขา"
 paragon.4.b:0 "ความเชื่อของพวกเขานั้นผิดที่ผิดทาง"
 paragon.4.b.custom_tooltip:0 "เราจะสอนให้สิ่งมีชีวิตยุคก่อนมีปัญญาสายพันธุ์นี้หันมาบูชาเรา"
 paragon.4.c:0 "เคลียร์พื้นที่ด้วยกำลัง"
 paragon.4.d:0 "พวกเขาไม่ได้เป็นภัยคุกคาม ปล่อยพวกเขาไว้ตามลำพัง"

 the_beholder_presapients_protected:0 "ภาวะอิงอาศัยที่ผิดปกติ"
 the_beholder_presapients_protected_desc:0 "เสียงกระซิบที่แผ่ออกมาจากแท่งหินบนดาวเคราะห์ดวงนี้ช่วยปลอบประโลมเหล่าผู้อยู่อาศัยยุคก่อนมีปัญญา พวกเขาปกป้องโครงสร้างราวกับว่าความอยู่รอดของพวกเขาขึ้นอยู่กับมัน การแทรกแซงใด ๆ จากฝั่งเราจะนำไปสู่ผลลัพธ์ที่คาดเดาไม่ได้"

 ### Befriending pre-sapients
 #Befriend Special project
 BEFRIENDING_BEHOLDER_PRESAPIENTS:0 "การสร้างความเชื่อใจ"
 BEFRIENDING_BEHOLDER_PRESAPIENTS_DESC:0 "การทำให้ชาว [beholder_presapients.GetAdj] บน [beholder_planet.GetName] คุ้นเคยกับการมีอยู่ของเรา จะช่วยให้เราเข้าถึงแท่งหินกระซิบได้ หากพวกเขาลดความระมัดระวังลง เราก็จะสามารถเคลื่อนไหวไปมาระหว่างพวกเขาได้อย่างอิสระ และอาจได้รับโอกาสในการเรียนรู้เพิ่มเติมเกี่ยวกับสายพันธุ์ของพวกเขาด้วย"

 paragon.5.name:0 "ความเชื่อใจที่สัมผัสได้"
 paragon.5.desc:0 "หลังจากใช้เวลาสักระยะหนึ่งร่วมกับชาว [beholder_presapients.GetAdj] บน [beholder_planet.GetName] พวกเขาดูเหมือนจะเกรงกลัวเราน้อยลงแล้ว เรากำลังสร้างความเข้าใจพื้นฐานเกี่ยวกับโครงสร้างทางสังคมของพวกเขา\n\n$paragon_whispering_info$"
 paragon.5.a:0 "เรากำลังมีความคืบหน้าไปด้วยดี"

 paragon_whispering_info:0 "กลุ่มชาว [beholder_presapients.GetAdj] ชุดใหม่เริ่มเข้ามาเบียดเสียดรอบแท่งหินอย่างหนาตา ในทางตรงกันข้ามกับพฤติกรรมหวงถิ่นในตอนแรก ตอนนี้พวกเขากลับดูสงบ และดูราวกับกำลังเฝ้ารอคอยบางสิ่ง บางอย่างกำลังจะเกิดขึ้นแล้ว"

 ### Proclaim our own divinity
 # Success
 paragon.10.name:0 "เทพเจ้าจอมปลอม"
 paragon.10.desc:0 "เราได้ฝึกให้ชาว [beholder_presapients.GetAdj] มองเราเป็นเหมือนเทพเจ้า ตอนนี้พวกเขาเชื่องแล้ว และพึ่งพาเราเพื่อความปลอดภัยและการคุ้มครอง ความก้าวหน้าทางเทคโนโลยีของเราเป็นเหมือนเวทมนตร์สำหรับพวกเขา และการควบคุมระบบความเชื่อของพวกเขาก็เป็นงานที่ง่ายดาย ตอนนี้เราเข้าถึงแท่งหินกระซิบได้อย่างสมบูรณ์แล้ว"
 # Failure
 paragon.11.name:0 "$paragon.10.name$"
 paragon.11.desc:0 "เราพยายามทำให้ชาว [beholder_presapients.GetAdj] เชื่อง โดยคิดว่าจะสามารถเปลี่ยนการเคารพบูชาของพวกเขาจากแท่งหินมาเป็นพวกเราได้อย่างง่ายดาย แต่น่าเสียดายที่ความพยายามของเราส่งผลตรงกันข้าม และเราได้ยั่วยุให้เกิดการตอบโต้อย่างก้าวร้าว ฝูงชนจำนวนมากได้ปรากฏตัวขึ้นเพื่อปิดล้อมแท่งหินกระซิบ ทำให้เราไม่สามารถเข้าไปได้"
 paragon.11.a:0 "ช่างน่าเสียดาย $paragon.4.c$"
 paragon.11.b:0 "$distar.255.b$"

 ### Make them move
 paragon.15.name:0 "แรงต่อต้านที่ฝ่อลง"
 paragon.15.desc:1 "หลังจากการแสดงอานุภาพการยิงอย่างอาจหาญ เราได้บีบบังคับให้ชาว [beholder_presapients.GetAdj] ยอมรับในความเหนือกว่าของเรา แม้จะมีช่องว่างระหว่างสติปัญญาของเราอย่างมหาศาล แต่พวกเขาก็ได้เรียนรู้บทเรียนแล้วว่าการมาขวางทางเรานั้นไม่ใช่ผลดีต่อพวกเขา หลายคนหลบหนีไปด้วยความกลัวและล่าถอยกลับไปยังที่อยู่อาศัย ตอนนี้สามารถเข้าไปสำรวจแท่งหินกระซิบได้โดยไม่มีการรบกวน"
 paragon.15.a:0 "เราทำในสิ่งที่จำเป็นต้องทำ"

 ### Study the Monolith
 #Monolith study Special Project
 WHISPER_TEMPLE_STUDY:0 "ศึกษาแท่งหินกระซิบ"
 WHISPER_TEMPLE_STUDY_DESC:0 "เรามีโอกาสที่จะได้ตรวจสอบแท่งหินกระซิบโบราณบน [beholder_planet.GetName]"

 paragon.20.name:0 "การสำรวจแท่งหินกระซิบ"
 paragon.20.desc:0 "การศึกษาแท่งหินกระซิบของเราพิสูจน์แล้วว่าต้องใช้เวลามากและเผยความลับออกมาน้อยกว่าที่คาดการณ์ไว้ ความลับของโครงสร้างนี้ยังคงหลบเลี่ยงเรา ปฏิเสธไม่ได้ว่ามีเทคโนโลยีขั้นสูงอยู่ภายในพีระมิดนี้ ทว่าปริมาณพลังงานที่ผลิตออกมานั้นขัดแย้งกับความเข้าใจทางวิทยาศาสตร์ในปัจจุบันของเรา\n\nภายนอกกำแพงของแท่งหิน มีสิ่งผิดปกติบางอย่างเกิดขึ้น $paragon_whispering_info$"
 paragon.20.a:0 "$paragon.5.a$"

#The Murmuring (previously The Whispering)
 paragon.25.name:0 "เสียงกระซิบ"
 paragon.25.desc:0 "ในขณะที่ชาว [beholder_presapients.GetAdj] ทั้งหมดมารวมตัวกันรอบแท่งหินกระซิบ เราได้สังเกตพบปรากฏการณ์ที่ไม่เหมือนกับสิ่งใดที่เราเคยพบเจอมาก่อน ความรู้สึกสงบได้แผ่ซ่านไปทั่วฝูงชน สิ่งมีชีวิตเหล่านั้นต่างตกอยู่ในภวังค์ด้วยพลังงานที่มองไม่เห็น นักวิทยาศาสตร์บางคนของเราติดอยู่ในเหตุการณ์เหนือธรรมชาตินี้ด้วย และสูญเสียการติดต่อกับความเป็นจริงไปชั่วขณะหนึ่ง เมื่อพวกเขารู้สึกตัวขึ้นมา พวกเขาอ้างว่าได้สื่อสารโดยตรงกับแท่งหินกระซิบ"
 paragon.25.a:0 "สรุปรายละเอียดและรายงานอย่างครบถ้วน"

 paragon.26.name:0 "$paragon.25.name$"
 paragon.26.desc:0 "รายงานจากนักวิทยาศาสตร์ของเราเกี่ยวกับการสื่อสารกับแท่งหินกระซิบเมื่อเร็ว ๆ นี้นั้นน่าสนใจมาก เป็นที่เข้าใจกันว่า ประสบการณ์ที่เกิดขึ้นคือการปลดแอกและการเปลี่ยนแปลงที่ลึกซึ้ง\n\nตอนนี้นักวิทยาศาสตร์เรียกเหตุการณ์นั้นว่า 'เสียงกระซิบ(เสียงกระซิบ)และยืนยันว่าแท่งหินได้ติดต่อกับพวกเขาโดยตรง ในชั่วขณะสั้น ๆ ที่มีการติดต่อกัน ผู้เข้าร่วมสามารถแบ่งปันความคิดส่วนลึกที่สุดของตนกับทุกคนที่เกี่ยวข้อง และถูกครอบคลุมด้วยความรู้สึกเชื่อใจและความเข้าใจ\n\nเมื่อผลกระทบดังกล่าวจางหายไป การแผ่พลังงานของแท่งหินก็ดิ่งฮวบลง บางทีเราอาจจะคิดค้นหาวิธีสร้างการติดต่อกับแท่งหินขึ้นมาใหม่อีกครั้ง"

 WHISPER_TEMPLE_ENERGY:0 "แท่งหินกระซิบ: พลังงาน"
 WHISPER_TEMPLE_ENERGY_DESC:0 "ด้วยการเน้นปล่อยพลังงานเป็นระลอกไปยังส่วนประกอบภายในของแท่งหินกระซิบ เราอาจจะสามารถจำลองปรากฏการณ์เสียงกระซิบขึ้นมาใหม่ และสร้างการสื่อสารเพิ่มเติมได้"

 paragon.30.name:0 "ผู้เฝ้ามอง"
 paragon.30.desc:0 "เราสร้างเงื่อนไขของเสียงกระซิบครั้งแรกได้สำเร็จ และเริ่มเปิดการสื่อสารครั้งที่สองกับแท่งหิน ครั้งนี้เราสามารถหล่อเลี้ยงปรากฏการณ์นี้ได้และสร้างการติดต่อกับตัวตนที่ใช้แท่งหินนี้เป็นสื่อกลางในการติดต่อมาจากสถานที่อื่น\n\nตัวตนดังกล่าวระบุว่าตนเองคือ §Yผู้เฝ้ามอง§!(ผู้มอง)มันอ้างว่ามีตัวตนอยู่ภายใน §Yแดนเร้นลับ§!(คําราม)และใช้แท่งหินเพื่อเอื้อมมาหาจากระนาบการดำรงอยู่คนละมิติ มันหล่อเลี้ยงด้วยพลังงาน และตกลงที่จะให้ความช่วยเหลือเราเพื่อแลกกับงานเลี้ยง"
 paragon.30.a:0 "ป้อนพลังงานที่มันต้องการ"
