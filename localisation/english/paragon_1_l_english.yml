 paragon.31.name:0 "ยานลำหนึ่ง"
 paragon.31.desc:0 "§Hเราทำตามข้อตกลงกับผู้เฝ้ามองเรียบร้อยแล้ว โดยส่งมอบพลังงานตามที่ร้องขอ เมื่อได้รับพลังงาน แท่งหินก็เริ่มสั่นสะเทือนด้วยความถี่สูง จากนั้นมันก็เริ่มสั่นไหวอย่างรุนแรง หน้าดินรอบข้างพังทลายลงในขณะที่แท่งหินยกตัวสูงขึ้น เผยให้เห็นว่ามันมีขนาดใหญ่กว่าที่พวกเราเคยประเมินกันไว้อย่างสุดกู่ถึงสองเท่าตัวเป็นอย่างน้อย\n\nโครงสร้างทรงแปดหน้าขนาดมหึมาของแท่งหินลอยตัวนิ่งกลางอากาศขณะที่เศษดินเศษฝุ่นร่วงลงสู่พื้นดิน เหล่าผู้อยู่อาศัยบนดาวเคราะห์พากันกรีดร้องด้วยความตื่นตระหนกเมื่อมันทะยานขึ้นสู่ท้องฟ้า ไต่ระดับสูงขึ้นไปสู่ชั้นบรรยากาศของ [beholder_planet.GetName]\n\nเป็นที่แน่ชัดแล้วว่าแท่งหินกระซิบนั้นคือยานพาหนะขนาดยักษ์ที่มีความสามารถในการเดินทางในอวกาศ ขณะนี้มันกำลังโคจรรอบ [beholder_planet.GetName]§!"
 paragon.1.a:0 "ท่านต้องการพลังงานไปเพื่อวัตถุประสงค์ใด?"
 paragon.1.a.response:0 "§Hหลังจากเงียบไปนาน คลื่นรบกวนก็เริ่มเข้าปกคลุมสัญญาณการส่งข้อมูล มันค่อย ๆ ดังขึ้นเรื่อย ๆ จนกระทั่งผู้ที่รับฟังต่างถูกโถมกระหน่ำด้วยอารมณ์ความรู้สึกนับไม่ถ้วน ตั้งแต่ความเสียใจที่กัดกินจิตใจไปจนถึงความปรารถนาอันแรงกล้า มีสิ่งต่าง ๆ มากมายเกินกว่าจะคัดกรองได้ แต่มีสิ่งหนึ่งที่ทะลุผ่านเสียงรบกวนเหล่านั้นออกมา:§!\n\nเพื่อเฝ้าสังเกต"
 paragon.1.b:1 "ท่านสามารถทำอะไรให้แก่อารยธรรมของเราได้บ้าง?"
 paragon.1.b.response:0 "§Hกระแสเสียงกระซิบที่ฟังไม่ได้ศัพท์สะท้อนก้องออกมา§!\n\nความลับ... ถูกเปิดเผย ด้วยศักยภาพแห่ง... เส้นทาง... ที่ถูกปลดล็อก แดนเร้นลับ... เริ่มต้นขึ้น เราขอต้อนรับ... ให้พวกเรา... ได้ใช้... ผู้นำทาง... ของท่านที่นั่น\n\n§Hแม้ว่าข้อความที่ขาด ๆ หาย ๆ นี้จะเปิดกว้างต่อการตีความ แต่แทบไม่มีข้อสงสัยเลยว่ามีพลังงานพลังจิตและแดนเร้นลับเข้ามาเกี่ยวข้อง§!"
 paragon.1.c:0 "ท่านคือสิ่งใดกันแน่?"
 paragon.1.c.response:0 "§Hด้วยน้ำเสียงที่ชัดเจนอย่างน่าประหลาดใจ เสียงเพียงหนึ่งเดียวก็ดังขึ้น:§!\n\nชั่วครู่ยาม และชั่วนิรันดร์ ไร้ตัวตน และเป็นทุกสิ่งทุกอย่าง... ภาษาของพวกเจ้านั้นไม่มีความหมาย เราใกล้เคียงกับคำว่า 'จุดมุ่งหมาย' สำหรับตอนนี้ คำจำกัดความใด ๆ ที่มากไปกว่านี้ยังอยู่เกินกว่าที่พวกเจ้าจะเข้าใจ แดนเร้นลับนั้นกว้างใหญ่และยังมีอีกหลายสิ่งให้เรียนรู้"

 paragon_beholder_joins:1 "§Y$NAME_The_Beholder$§! เข้าร่วมจักรวรรดิของคุณในฐานะ §Hผู้นำ§!"

