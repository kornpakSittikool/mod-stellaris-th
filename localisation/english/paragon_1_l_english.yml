 building_the_beholder_desc:1 "สื่อกลางนำทางของ §Y$temple_of_whispers$§! เข้าสู่ระนาบการดำรงอยู่ของเรา มันคือยานลำหนึ่งซึ่งหล่อเลี้ยงด้วยพลังงานของดาวเคราะห์เพื่อรวบรวม Zro และรักษาการเชื่อมต่อกับแดนเร้นลับเอาไว้"
