 MESSAGE_AZARYN_TERRAFORM_CANCELED_DESC:0 "กระบวนการแปลงสภาพ $PLANET|$ ด้วยนิวเคลียสปรับสภาพดวงดาวถูกยกเลิกแล้ว"

# Azaryn chain
 paragon.202.name:0 ""
 paragon.202.desc:0 "§Hใครบางคนกำลังพยายามติดต่อกับเรา§!\n\n§Hเราได้ยินเสียงกระแสน้ำไหลในระยะไกล และเสียงร้องกระพือปีกของนกตัวเล็ก ๆ ที่กำลังบินขึ้น การส่งสัญญาณดูเหมือนจะมาจากไบโอมที่อุดมสมบูรณ์§!"
 paragon.202.a:0 "ฮัลโหล?"
 paragon.202.a.response:0 "§Hไม่มีการตอบรับ§!"
 paragon.202.b:0 "วางสายการติดต่อ"

 paragon.204.name:0 ""
 paragon.204.desc:0 "§Hใครบางคนพยายามติดต่อเราอีกครั้ง§!\n\n§Hเราได้ยินเสียงไบโอมเหมือนก่อนหน้านี้ แต่ก็ยังไม่มีใครปรากฏตัว§!"
 paragon.204.a:0 "ติดตามแหล่งที่มาของการส่งสัญญาณ"
 paragon.204.b:0 "นี่มันเสียเวลาเปล่า"

 UNKNOWN_COMMS_PROJECT:0 "แกะรอยแหล่งสัญญาณ"
 UNKNOWN_COMMS_PROJECT_DESC:0 "เราอาจจะสามารถติดตามแหล่งที่มาของการส่งสัญญาณนิรนามที่เราได้รับมาได้"

 paragon.206.name:0 "แหล่งที่มาของการส่งสัญญาณ"
 paragon.206.desc:0 "เราสามารถระบุตำแหน่งแหล่งที่มาของการส่งสัญญาณลึกลับได้แล้ว จากการติดตามสัญญาณไปยังจุดกำเนิดหลายแห่ง เรามั่นใจว่าพวกมันต้องมาจากวัตถุเคลื่อนที่ชิ้นหนึ่ง ทฤษฎีหลักของเราชี้ว่าเราได้รับการติดต่อจากยานลำหนึ่ง ซึ่งน่าจะถูกใช้เป็นเขตอนุรักษ์ธรรมชาติบางประเภท"
 paragon.206.a:0 "สร้างช่องทางการติดต่อ"

 paragon.208.name:0 "$paragon.206.name$"
 paragon.208.desc:0 "§Hเราสร้างช่องทางการติดต่อ และได้พบกับเสียงที่คุ้นเคยของไบโอม อย่างไรก็ตาม ครั้งนี้เราได้ยินเสียงใครบางคนพูดขึ้นมา§!\n\nขอต้อนรับอย่างอบอุ่น ชาว [owner.GetAdjective]! ฉันรอคุณอยู่เลย ขออภัยในมารยาทก่อนหน้านี้ด้วย แต่ฉันจำเป็นต้องทดสอบว่าพวกคุณมีความกระตือรือร้นเพียงใด ตอนนี้ขอถามคำถามอะไรหน่อยสิ พวกคุณให้คุณค่ากับชีวิตอย่างไร?"
 paragon.208.a:0 "คุณเป็นใคร?"
 paragon.208.a.response:0 "อ๋อ ไม่อยากข้ามขั้นตอนพิธีการงั้นหรือ? ตกลงค่ะ ขออนุญาตแนะนำตัวเองอย่างเป็นทางการ\n\n§Hรอยยิ้มปรากฏขึ้นบนใบหน้าของสิ่งมีชีวิตเผ่าพันธุ์พืช§!\n\nฉันชื่อ §Yอา ซา รีน§! แต่จนกว่าคุณจะตอบคำถามของฉัน ฉันจะไม่พูดอะไรอีก ตอนนี้บอกฉันที คุณให้คุณค่ากับชีวิตอย่างไร?"
 paragon.208.b:0 "มันขึ้นอยู่กับสถานการณ์ ชีวิตมีหลากหลายรูปแบบ"
 paragon.208.c:0 "นี่เป็นคำถามลวงหรือเปล่า?"
 paragon.208.d:0 "อธิบายเรื่องนี้หน่อย"
 paragon.208.d.response:0 "ฉันเข้าใจว่าคุณลังเลที่จะตอบ คุณต้องเข้าใจนะว่าหากฉันให้ข้อมูลเพิ่มเติมได้ ฉันก็ยินดีทำ แต่ฉันไม่สามารถเสี่ยงที่จะทำให้ข้อมูลปนเปื้อนได้ ได้โปรดเถอะ คุณให้คุณค่ากับชีวิตอย่างไร?"
 paragon.208.e:0 "สิ้นสุดการสื่อสาร"

 paragon.210.name:0 "$paragon.206.name$"
 paragon.210.desc:0 "เป็นคำตอบที่มีเหตุผล น้อยคนนักจะลังเลที่จะกำจัดสิ่งที่เป็นภัยคุกคามต่อชีวิต อย่างไรก็ตาม มันคุ้มค่าที่จะจำไว้ว่าชีวิตทั้งหมดมีศักยภาพที่ไร้ขีดจำกัด\n\nตอนนี้ ฉันจะเปิดเผยเหตุผลที่ฉันติดต่อพวกคุณ"
 paragon.210.desc_alt:0 "§Hเผ่าพันธุ์พืชถอนหายใจ§!\n\nในที่สุด ก็มีเผ่าพันธุ์ที่คิดถึงเรื่องอื่นนอกจากการพิชิตดินแดนแล้ว ฉันก็รู้สึกเช่นเดียวกับคุณ ชีวิตทั้งหมดมีศักยภาพที่ไร้ขีดจำกัด\n\nตอนนี้ ให้ฉันได้อธิบายเหตุผลที่ฉันติดต่อพวกคุณนะคะ"
 paragon.210.a:0 "พูดต่อสิ"

 paragon.212.name:0 "$paragon.206.name$"
 paragon.212.desc:0 "$paragon.212.desc_with_intro$ $paragon.212.desc_main_chunk$"
 paragon.212.desc_alt:0 "$paragon.212.desc_without_intro$ $paragon.212.desc_main_chunk$"
 paragon.212.desc_with_intro:1 "ฉันคือ §Yอา ซา รีน§! อดีตนักชีววิทยาดาราศาสตร์จากภาษาอะซาตา"
 paragon.212.desc_without_intro:0 "ฉันเป็นอดีตนักชีววิทยาดาราศาสตร์จากภาษาอะซาตา"
 paragon.212.desc_main_chunk:0 "ผู้ผันตัวมาศึกษาเรื่องการสรรค์สร้างดวงดาว ฉันตามหาวัสดุที่จำเป็นต่อการสร้างชีวิตใหม่ การสร้างชีวิตระดับดวงดาวต้องใช้พลังงานมากกว่าที่ฉันจะผลิตได้ด้วยตัวเอง\n\n§Hอา ซา รีนหยุดครู่หนึ่งก่อนจะพูดต่อ§!\n\nฉันรับรองว่านี่เป็นการเดินทางที่คุ้มค่า แต่ก่อนอื่น ขอท้าทายอะไรหน่อย ฉันอยากจะส่งของขวัญบางอย่างไปให้ ลองดูสิว่าพวกคุณจะสามารถทำให้มันหมดฤทธิ์ได้หรือไม่"
 paragon.212.a:0 "ภาษาอะซาตาคืออะไร?"
 paragon.212.a.response:0 "ภาษาอะซาตาเคยเป็นบ้านของฉัน มันเป็นโลกแบบเกอา และเป็นเมืองหลวงของแอสโตรฟีแทน Phlexus จักรวรรดิของประชาชนของฉัน และเป็นบ้านของเผ่าพันธุ์ต่าง ๆ มากมาย แต่น่าเศร้าที่ทั้งหมดได้สูญสลายไปแล้ว\n\n§สายตาของอา ซา รีนเหม่อลอยไปไกล§!\n\nในช่วงที่รุ่งเรืองที่สุด โลกของเราเป็นสิ่งมหัศจรรย์ที่น่าจับตา เต็มไปด้วยสิ่งมีชีวิตและความงามตามธรรมชาติ ฉันคิดว่าความหลากหลายทางชีวภาพเช่นนั้นแทบจะไม่เคยมีอีกเลยตั้งแต่นั้นมา แต่ทุกอย่างก็พังทลายลง\n\nตอนนี้ ขอให้ดูแลของขวัญของฉันเป็นอย่างดีนะคะ"
 paragon.212.b:0 "การสรรค์สร้างดวงดาวคืออะไร?"
 paragon.212.b.response:0 "เป็นคำถามที่ยอดเยี่ยม $paragon_astrocreation_is$\n\nน่าทึ่งใช่ไหมล่ะ? ของขวัญที่ฉันส่งให้คือขั้นตอนแรกไปสู่เป้าหมายนั้น"
 paragon.212.c:0 "บอกเราเกี่ยวกับยานของคุณหน่อย"
 paragon.212.c.response:0 "อ๋อ ใช่ค่ะ นี่อาจจะดูแปลกตาสำหรับผู้ที่ไม่คุ้นเคย แน่นอนว่านี่คือภายในยานของฉันเอง\n\n§Hอา ซา รีนผายมือไปยังสภาพแวดล้อมรอบตัวเธอ§!\n\nนี่คือวี ดิ โอ รี อุมมันเป็นยานทรงโดมที่มาพร้อมระบบนิเวศบูรณาการที่ทำงานได้อย่างสมบูรณ์แบบ ฉันยอมรับว่าฉันค่อนข้างภูมิใจกับมันมากเลยล่ะค่ะ\n\nของขวัญที่ฉันส่งให้คุณก็เติบโตมาจากที่นี่แหละ"
 paragon.212.d:0 "แล้วพบกันใหม่โอกาสหน้า"

 AZARYNS_BACTERIA_PROJECT:0 "ของขวัญของอา ซา รีน"
 AZARYNS_BACTERIA_PROJECT_DESC:0 "ของขวัญที่ได้รับจากอา ซา รีนแท้จริงแล้วคือแบคทีเรียจากพืช ซึ่งไม่เหมือนกับสิ่งใดที่เราเคยพบเห็นมาก่อน การทำให้มันหมดฤทธิ์จะเป็นความท้าทายที่อันตราย อย่างไรก็ตาม หากเราทำสำเร็จ มันจะช่วยพัฒนาความเข้าใจในด้านวิทยาศาสตร์และการแพทย์ของเราไปอีกขั้น"

 paragon.214.name:0 "แบคทีเรียของอา ซา รีน"
 paragon.214.desc:0 "เรามีความก้าวหน้าเกี่ยวกับ 'ของขวัญ' ทางชีวภาพของอา ซา รีนศักยภาพที่เพิ่มขึ้นสำหรับความก้าวหน้าทางวิทยาศาสตร์แบบสหวิทยาการนั้นเป็นที่น่าภาคภูมิใจ\n\nเราได้รวบรวมข้อค้นพบของเรา หลังจากที่ทำให้ภัยคุกคามที่อาจเกิดขึ้นจากจุลชีพหมดฤทธิ์แล้ว และเราพร้อมที่จะติดต่ออา ซา รีนอีกครั้ง"
 paragon.214.a:0 "ดำเนินการต่อ เปิดช่องทางการติดต่อ"

 paragon.216.name:0 "$NAME_Astrocreator_Azaryn$"
 paragon.216.desc:0 "§Hอา ซา รีนรู้สึกยินดีเป็นอย่างยิ่งที่ได้ยินเกี่ยวกับการค้นพบที่ก้าวหน้าของเรา§!\n\nยอดเยี่ยมมาก! ฉันขอชื่นชมและยกย่องในความพยายามของคุณ ตอนนี้ [owner.GetName] ฉันมีอีกหนึ่งคำถาม\n\nเพื่อหลีกหนีจากความตาย คุณจะยอมพรากชีวิตของผู้อื่นหรือไม่?"
 paragon.216.a:0 "ใช่ เราจะทำ"
 paragon.216.b:0 "ไม่ เราจะไม่ทำ"

 paragon.218.name:0 "$paragon.201.name$"
 paragon.218.desc_yes:0 "ใช่แล้ว คนส่วนใหญ่ก็ทำแบบนั้น ท้ายที่สุดแล้ว การดิ้นรนเพื่อเอาชีวิตรอดคือแรงขับเคลื่อนของสิ่งมีชีวิตทั้งหมด การทำความเข้าใจและยอมรับความจริงข้อนั้นอาจช่วยชีวิตคุณรวมถึงจิตสำนึกของคุณได้ในวันหนึ่ง\n\n$paragon.218.desc_flower$"
 paragon.218.desc_no:0 "จริงหรือ คุณจะไม่ทำจริง ๆ หรือ?\n\n§Hอา ซา รีนเกาหัวของเธอ§!\n\nฉันรู้สึกว่ามันน่าท้อแท้ใจและค่อนข้างไม่น่าเชื่อถือ แม้ว่าฉันจะมองว่ามันน่าชื่นชมในแบบหนึ่งก็ตาม ถ้าเพียงแต่มันเป็นเรื่องจริงนะ\n\n$paragon.218.desc_flower$"
 paragon.218.desc_flower:0 "ก่อนคำถามถัดไปของฉัน ฉันมีของขวัญอีกชิ้นมาให้คุณ มันคือราฟเฟ็ก เซียดอกไม้ชนิดหนึ่งที่มีถิ่นกำเนิดบนยานของฉัน ฉันขอท้าให้คุณทำให้มันเบ่งบาน ลาก่อนในตอนนี้ค่ะ"
 paragon.218.a:0 "ตกลง ลาก่อน"

 AZARYNS_RAFFLESIA_PROJECT:0 "ดอกบัวผุดของอา ซา รีน"
 AZARYNS_RAFFLESIA_PROJECT_DESC:0 "อา ซา รีนมอบหมายให้เราทำให้ตูมดอกไม้ยักษ์ซึ่งเป็นพืชพื้นเมืองของระบบนิเวศบนยานทรงโดมของเธอเบ่งบาน จากการสังเกตการณ์ในเบื้องต้น ดอกไม้ชนิดนี้อาจมีความสำคัญอย่างยิ่งในด้านชีววิทยาดาราศาสตร์"

 paragon.220.name:0 "ดอกบัวผุดของอา ซา รีน"
 paragon.220.desc:0 "ความพยายามในเบื้องต้นของเราที่จะกระตุ้นการตอบสนองจากดอกตูมนั้นค่อนข้างน่าผิดหวัง มีเพียงตอนที่เราใช้สิ่งกระตุ้นทางไฟฟ้าที่เกินขอบเขตความปลอดภัยปกติของเราเท่านั้น เราจึงจะทำให้ดอกไม้เบ่งบานได้ เราได้ทำงานล่าสุดของอา ซา รีนเสร็จสิ้นแล้ว และพร้อมที่จะติดต่อเธออีกครั้ง"
 paragon.220.a:0 "เยี่ยมมาก ติดต่ออา ซา รีน"

 paragon.222.name:0 "$NAME_Astrocreator_Azaryn$"
 paragon.222.desc:1 "§Hโดรนผสมเกสรตัวจิ๋วบินวนรอบหัวของอา ซา รีนเธอปัดมันออกเบา ๆ§!\n\nสวัสดีอีกครั้งค่ะราฟเฟ็ก เซียเป็นพืชที่น่าสนใจจริง ๆ ใช่ไหมล่ะคะ? วิวัฒนาการเป็นสิ่งที่น่ามหัศจรรย์จริง ๆ ฉันประทับใจมากที่คุณสามารถใช้พลังงานในปริมาณที่เหมาะสมจนทำให้มันเบ่งบานได้\n\n§Hเธอปรบมือด้วยความตื่นเต้น§!\n\nได้เวลาสำหรับคำถามถัดไปแล้ว คุณจะยอมเสียสละพรรคพวกของตัวเองหรือไม่ หากมันหมายถึงการที่คุณสามารถช่วยชีวิตผู้คนในที่อื่น ๆ ได้ในสเกลขนาดใหญ่?"
 paragon.222.a:0 "เราจะทำ"
 paragon.222.b:0 "ไม่ ไม่มีวัน"

 paragon.224.name:0 "$paragon.201.name$"
 paragon.224.desc_yes:0 "§Hอา ซา รีนพยักหน้าเข้าใจ§!\n\nใช่ค่ะ มันอาจจะดูเหมือนเป็นทางเลือกที่ชัดเจน แต่เมื่อถึงช่วงเวลาจริง การจะทำแบบนั้นมันยากมากเลยล่ะค่ะ เราต้องตัดอารมณ์ความรู้สึกออกไป และทำในสิ่งที่ดีที่สุดเพื่อประโยชน์ส่วนรวม\n\n$paragon.224.desc_question$"
 paragon.224.desc_no:0 "§Hอา ซา รีนพยักหน้าอย่างเห็นใจ§!\n\nใช่แล้ว มันไม่ใช่เรื่องง่ายเลย ฉันซาบซึ้งในความซื่อสัตย์ของคุณค่ะ\n\nอย่างไรก็ตาม ฉันเชื่อว่าเพื่อความเป็นอยู่ที่ดีขึ้นของทุกคน สิ่งมีชีวิตที่มีสติปัญญาควรเลือกทางเลือกที่เสียสละเสมอก่อนเป็นอันดับแรก\n\n$paragon.224.desc_question$"
 paragon.224.desc_question:0 "ฉันมีคำถามสุดท้ายจะถามคุณ\n\nคุณจะลังเลที่จะกำจัดภัยคุกคามหรือไม่?"
 paragon.224.a:0 "ใช่ การกระทำที่เด็ดขาดต้องผ่านการพิจารณาอย่างรอบคอบ"
 paragon.224.b:0 "ไม่ ความลังเลจะทำให้เราตาย"

 paragon.226.name:0 "$paragon.201.name$"
 paragon.226.desc_yes:0 "ฉันเห็นด้วยค่ะ ความเด็ดขาดเป็นสิ่งสำคัญ แต่สถานการณ์บางอย่างก็ต้องอาศัยการพิจารณาเพิ่มเติม บางครั้งคุณก็ไม่ได้โชคดีพอที่จะได้รับข้อมูลที่จำเป็นทั้งหมดในทันที ความอดทนอาจเป็นประโยชน์ต่อคุณอย่างมากค่ะ\n\n$paragon.226.desc_end$"
 paragon.226.desc_no:0 "อ๋อ คุณชอบมีเวลาคิดสินะคะ น่าเสียดายที่เราไม่ได้มีสิทธิพิเศษที่จะได้รับเวลาเพิ่มเติมเสมอไป การตัดสินใจต้องเกิดขึ้น และความลังเลเพียงเสี้ยววินาทีก็อาจเป็นจุดต่างระหว่างความสำเร็จและความล้มเหลวได้\n\n$paragon.226.desc_end$"
 paragon.226.desc_end:0 "§Hอา ซา รีนเงียบไปครู่หนึ่ง จากนั้นก็สรุปว่า:§!\n\nเอาล่ะ ฉันถามคำถามคุณมามากพอแล้ว คุณมีความอดทนที่น่าชื่นชมมาก ฉันจะขอเวลาสักครู่เพื่อรวบรวมข้อมูลนี้ แล้วเราค่อยมาคุยกันใหม่เร็ว ๆ นี้ค่ะ"

 paragon.228.name:0 "$NAME_Astrocreator_Azaryn$"
 paragon.228.desc_opening_worst:0 "สวัสดีอีกครั้งค่ะ! คุณได้พิสูจน์ศักยภาพของคุณแล้ว เมื่อถึงเวลา ฉันหวังว่าจะได้สอนคุณให้ใช้พลังแห่งการสรรค์สร้างดวงดาวของฉัน\n\n§Hอา ซา รีนโค้งคำนับ§!\n\nเราจะร่วมมือกันเพื่อชุบชีวิตกาแล็กซีนี้ขึ้นมาใหม่"
 paragon.228.desc_opening_mid:0 "สวัสดี ชาว [owner.GetAdjective] ยินดีที่ได้พบคุณอีกครั้งค่ะ\n\nแม้จะมีความแตกต่างระหว่างเรา แต่ฉันก็หวังว่าคุณจะยอมรับคำสั่งสอนของฉัน และเรียนรู้ที่จะใช้การสรรค์สร้างดวงดาวเพื่อประโยชน์ของกาแล็กซี\n\n"
 paragon.228.desc_opening_best:0 "สวัสดีอย่างอบอุ่น ชาว [owner.GetAdjective] ฉันได้ข้อสรุปแล้วว่าคุณเป็นผู้สนับสนุนที่ยอดเยี่ยมสำหรับการสรรค์สร้างดวงดาวค่ะ!\n\n§Hอา ซา รีนยิ้ม§!\n\nเราจะร่วมกันเติมเต็มลมหายใจแห่งชีวิตเข้าไปในความว่างเปล่าด้วยกัน และสร้างแรงบันดาลใจให้กับทุกคน!\n\n"
 paragon.228.desc_worst:0 "$paragon.228.desc_opening_worst$paragon.228.desc_end$"
 paragon.228.desc_mid:0 "$paragon.228.desc_opening_mid$paragon.228.desc_end$"
 paragon.228.desc_best:0 "$paragon.228.desc_opening_best$paragon.228.desc_end$"
 paragon.228.desc_end:0 "ตราบใดที่คุณมุ่งมั่นที่จะสร้างชีวิตใหม่ ทักษะและยานของฉันก็พร้อมจะรับใช้คุณ หากสิ่งนี้ทำให้คุณพึงพอใจ ฉันก็ยินดีที่จะเข้าร่วมกับคุณค่ะ"
 paragon.228.a:0 "การสรรค์สร้างดวงดาวคืออะไรกันแน่?"
 paragon.228.a.response:0 "อ๋อ ใช่ค่ะ ขออภัยด้วย ในความตื่นเต้นนี้ ฉันลืมอธิบายรายละเอียดที่สำคัญที่สุดนี้ไปเสียสนิท แต่บางทีการสาธิตอาจจะดีที่สุด...\n\n$paragon_astrocreation_is$\n\nใช่แล้ว อีกไม่นานคุณก็จะได้เห็นการสรรค์สร้างดวงดาวด้วยตัวคุณเองแล้วค่ะ"
 paragon_astrocreation_is:1 "การสรรค์สร้างดวงดาวคือหนึ่งในรูปแบบขั้นสูงของการปรับสภาพดาวเคราะห์ มันทรงพลังอย่างเหลือเชื่อ ด้วยการเพาะนิวเคลียสปรับสภาพดวงดาวของฉันลงบนดาวเคราะห์--§Hอา ซา รีนชี้ไปที่ปุ่มตูมบนหลังของเธอ§!--เราจะสามารถเปลี่ยนสภาพของดาวเคราะห์เกือบทุกดวงให้กลายเป็นโลกเกอาที่เจริญรุ่งเรืองได้ กระบวนการนี้ต้องใช้พลังงานอย่างมหาศาล แต่ผลลัพธ์ที่ได้นั้นยอดเยี่ยมอย่างยิ่ง"

 paragon.228.b.custom_tooltip:2 "§Y$NAME_Astrocreator_Azaryn$§! เข้าร่วมจักรวรรดิเราในฐานะ §Hผู้นำ§!"

 paragon.228.c:0 "สิ่งเหล่านั้นบนหลังของคุณคืออะไร?"
 paragon.228.c.response:0 "§Hอา ซา รีนดูจะประหลาดใจกับคำถาม§!\n\nพูดง่าย ๆ คือมันเป็นลักษณะเฉพาะตัวของเผ่าพันธุ์ฉัน ในวัยเยาว์ พวกมันเติบโตอย่างรวดเร็ว — และสร้างความอึดอัดไม่น้อยเลยล่ะ — และต้องได้รับการเล็มออกเป็นประจำ มิฉะนั้นพวกมันจะถ่วงเราลง §Hเธอยิ้ม§! แต่ในวัยของฉัน ปัญหาเหล่านั้นได้กลายเป็นเรื่องในอดีตไปแล้ว\n\nพวกมันไม่ใช่เมล็ดพันธุ์เสียทีเดียว แต่มันก็พอจะเปรียบเทียบกันได้ ฉันเรียกพวกมันว่า นิวเคลียสปรับเปลี่ยนสภาพดาว(เครื่องราชอิสริยาภรณ์นูคลี)ภายในนั้นมีศักยภาพสำหรับการเติบโต การเกิดใหม่ และชีวิตที่หลับใหลอยู่"
 paragon.228.d:0 "โดรนตัวจิ๋วที่ส่งเสียงหึ่ง ๆ ของคุณคืออะไรหรือ?"
 paragon.228.d.response:0 "อ๋อ ตัวนี้เหรอ? §Hอา ซา รีนยกโดรนบินตัวน้อยขึ้นมาอย่างอ่อนโยน§! นี่คือโดรนผสมเกสร พวกมันช่วยดูแลให้ระบบนิเวศของยานฉันมีความสมบูรณ์และดำเนินต่อไปได้ในอนาคต\n\nพวกมันไม่ได้เป็นอนินทรีย์ไปเสียทั้งหมด และมีความสามารถในการผลิตละอองเรณูได้ด้วยตัวเองด้วยนะ §Hอา ซา รีนชี้ไปที่ส่วนก้นของโดรน§! พวกมันยังสามารถควบคุมการถ่ายละอองเรณูโดยใช้แม่เหล็กไฟฟ้าสถิตจากขั้วแบตเตอรี่ได้อีกด้วย น่ารักใช่ไหมล่ะ?"

 paragon.230.name:0 "$NAME_Astrocreator_Azaryn$"
 paragon.230.desc_worst:0 "$paragon.230.desc_main$ $paragon.230.worst$"
 paragon.230.desc_mid:0 "$paragon.230.desc_main$ $paragon.230.mid$"
 paragon.230.desc_best:0 "$paragon.230.desc_main$ $paragon.230.best$"

 paragon.230.desc_main:0 "§Hโดย เชื่อม เข้า กับ เครื่อง มือ ควบคุม อย่าง รวด เร็ว อา ซา รีน ปรับ เครื่อง มือ บาง อย่าง.§!\n\nวิเศษ! ข้าได้วางแผนเส้นทางสําหรับเมืองหลวงของท่านแล้ว และใกล้จะมาถึงแล้ว\n\nโอ้ และก่อนที่จะลืมว่า ระบบนิเวศของเรือของผม เป็นบ้านของอิเล็กตรอนหลากหลาย"
 paragon.230.worst:0 "ดูเหมือนว่าจะเหมาะสมหากฉันจะมอบ §Yฟีโรโมน§! เหล่านี้ให้กับคุณ พวกมันเข้ากันได้กับเผ่าพันธุ์ของคุณ และจะต้องส่งผลดีบางอย่างให้อย่างแน่นอน"
 paragon.230.mid:0 "เพื่อเป็นที่ระลึกถึงความร่วมมือของเรา ฉันได้เตรียมของขวัญเป็น §Yฟีโรโมน§! ไว้ให้ มันอาจไม่ใช่ผลงานที่ดีที่สุดของฉัน แต่พวกมันจะส่งผลดีบางประการให้แก่ประชาชนของคุณอย่างแน่นอน"
 paragon.230.best:0 "เพื่อเฉลิมฉลองโอกาสอันน่ายินดีนี้ โปรดยอมรับของขวัญเป็น §Yฟีโรโมน§! นี้ด้วยเถิด พวกมันมีสารประกอบที่ทรงประสิทธิภาพซึ่งจะนำประโยชน์บางประการมาสู่ประชาชนของคุณอย่างแน่นอน คุณคู่ควรกับมันแล้ว"

 pheromone_cocktail_best:0 "ค็อกเทลฟีโรโมน"
 pheromone_cocktail_best_desc:0 "ของขวัญจาก §Y$NAME_Astrocreator_Azaryn$§!"
 pheromone_cocktail_mid:0 "$pheromone_cocktail_best$"
 pheromone_cocktail_worst:0 "$pheromone_cocktail_best$"
 terraformation_nucleus_side_effect:0 "การเติบโตมากเกินไป"
 terraformation_nucleus_side_effect_desc:0 "ดาวเคราะห์ดวงนี้ได้รับการปรับเปลี่ยนสภาพดาวโดยหนึ่งในนิวเคลียสของ §Y$NAME_Astrocreator_Azaryn$§!"
 leader_trait_legendary_terraformation_nucleus_3_buds:0 "นิวเคลียสปรับเปลี่ยนสภาพดาว"
 leader_trait_legendary_terraformation_nucleus_3_buds_desc:0 "หน่ออ่อนบนหลังของ §Y$NAME_Astrocreator_Azaryn$§! เธอค่อนข้างเก็บงำเรื่องของพวกมันเป็นความลับ\n§Hเหลือหน่ออ่อนสามหน่อ§!"
 leader_trait_legendary_terraformation_nucleus_2_buds:0 "$leader_trait_legendary_terraformation_nucleus_3_buds$"
 leader_trait_legendary_terraformation_nucleus_2_buds_desc:0 "หน่ออ่อนบนหลังของ §Y$NAME_Astrocreator_Azaryn$§! สุขภาพของเธอดีขึ้นอยู่กับพวกมัน\n§Hเหลือหน่ออ่อนสองหน่อ§!"
 leader_trait_legendary_terraformation_nucleus_1_bud:0 "นิวเคลียสปรับเปลี่ยนสภาพดาว"
 leader_trait_legendary_terraformation_nucleus_1_bud_desc:0 "หน่ออ่อนบนหลังของ §Y$NAME_Astrocreator_Azaryn$§! และเป็นแหล่งที่มาของพลังของเธออา ซา รีนจำเป็นต้องใช้พวกมันเพื่อเอาชีวิตรอด\n§Rเหลือหน่ออ่อนเพียงหน่อเดียว§!"
 # TO DO [LD]: Update other languages' loc strings to match the trait rework-related addition of "_bud(s)" above

 paragon.232.name:0 "การร่วงโรย"
 paragon.232.desc:0 "สุขภาพของ §Y$NAME_Astrocreator_Azaryn$§! ย่ำแย่ลงอย่างเห็นได้ชัด เธอปฏิเสธการตรวจร่างกาย ทำให้เราไม่สามารถช่วยเหลือเธอได้"
 paragon.232.a:0 "น่ากังวล"

 paragon.235.name:0 "การเติบโตและความเสื่อมสลาย"
 paragon.235.desc:0 "ตอนนี้เรารู้แน่ชัดแล้วว่าสุขภาพของ §Y$NAME_Astrocreator_Azaryn$§! นั้นผูกพันอยู่กับนิวเคลียสปรับเปลี่ยนสภาพดาวของเธอโดยเนื้อแท้ อาการของเธอแย่ลงหลังการใช้งานแต่ละครั้ง และตอนนี้เราสงสัยว่าเมื่อเธอหว่านเมล็ดนิวเคลียสสุดท้ายของเธอแล้ว เธอจะเสียชีวิต"
 paragon.235.a:0 "น่าเสียใจ"

 paragon.240.name:0 "หน่อสุดท้าย"
 paragon.240.desc:0 "§H$NAME_Astrocreator_Azaryn$ นิ่งสงบ เสียงอึกทึกครึกโครมตามปกติจากยานของเธอเบาลงเหลือเพียงเสียงฮัมแผ่ว ๆ เธอพูดด้วยน้ำเสียงกระซิบที่ดูเหน็ดเหนื่อย§!\n\nฉันไม่ได้เสียใจเลย เพื่อให้ดาวหลายดวงสามารถเติบโตต่อไปได้ ฉันยอมสละชีวิตของฉันอย่างยินดียิ่ง ขอบคุณนะ เพื่อน ๆ\n\n§Hเธอจากไปแล้ว§!"

 paragon.240.a:0 "ความสูญเสียครั้งใหญ่"
 withered_dome_ship_effect:0 "วิวาเรียมที่เหี่ยวเฉา"
 paragon_withered_dome_ship_desc:0 "ซากเรือนกระจกรูปโดมของ §Y$NAME_Astrocreator_Azaryn$§! ที่หลงเหลืออยู่หลังการเสียชีวิตของเธอ"

 paragon.241.desc:1 "§Hเราได้รับข้อความที่บันทึกไว้ล่วงหน้า จากอา ซา รีน§!\n\nแม้ว่าฉันจะยอมรับการเสียสละของฉันได้ แต่ฉันก็ทนคิดไม่ได้ว่าวิวาเรียมและสิ่งมีชีวิตบนยานจะต้องตายไปพร้อมกับฉัน ยานลำนี้เชื่อมโยงกับฉันอย่างลึกซึ้ง และเมื่อฉันร่วงโรย มันก็จะต้องร่วงโรยไปด้วย\n\nด้วยเหตุนี้ ฉันจึงได้ออกแบบวิวาเรียมในลักษณะแยกส่วน(เสียงลาก)โดยแต่ละระบบนิเวศสามารถดำรงอยู่ได้ด้วยตัวเอง การเตรียมการต่าง ๆ เรียบร้อยแล้ว และสิ่งที่คุณต้องทำคือหาดาวเคราะห์ดวงหนึ่งเพื่อย้ายถิ่นฐานของที่อยู่อาศัยนี้ ฉันไว้ใจให้คุณทำภารกิจนี้ให้สำเร็จ"
 paragon.241.a:0 "เราจะทำ"
 paragon.241.a.custom_tooltip:0 "การเตรียมการสำหรับการย้ายและสร้างใหม่ของ §Y$building_contained_ecosphere$§! ของอา ซา รีนได้เสร็จสิ้นแล้ว มันสามารถถูกสร้างขึ้นใหม่บนดาวเคราะห์ที่เราเลือกได้"

 building_contained_ecosphere:0 "ระบบนิเวศแบบปิด"
 building_contained_ecosphere_desc:0 "§Y$NAME_Astrocreator_Azaryn$§!มรดกที่ทิ้งไว้ให้เรา ตอนเธอจากไป มันเป็นเพียงส่วนเล็กๆ ของระบบนิเวศภายใน\n\nนําเสนอความเข้มข้นของ§H$contained_ecosphere_pheromones$§!กับบรรยากาศของดาวเคราะห์ ใช้ผลกระทบด้านบวกกับประชากร"
 contained_ecosphere_pheromones:0 "ฟีโรโมนระบบนิเวศ"
 contained_ecosphere_pheromones_desc:0 "ฟีโรโมนที่มีประโยชน์ซึ่งปล่อยออกมาอย่างสม่ำเสมอโดย §H$building_contained_ecosphere$§! ส่งผลดีต่อประชากร"

 paragon.260.name:0 "ตัวอย่างนิวเคลียส"
 paragon.260.desc:0 "ด้วยการตัดสินใจของตนเอง นักวิทยาศาสตร์คนหนึ่งของเราได้แอบเก็บตัวอย่างนิวเคลียสปรับเปลี่ยนสภาพดาวของ §Y$NAME_Astrocreator_Azaryn$§! มาอย่างลับ ๆ\n\nการวิจัยหน่ออ่อนนี้อาจช่วยให้ข้อมูลอันมีค่าซึ่งดูเหมือนอา ซา รีนจะไม่เต็มใจแบ่งปันในขณะนี้"
 paragon.260.a:0 "เริ่มทำการวิจัย"
 paragon.260.b:0 "คืนตัวอย่างให้อา ซา รีน"

 paragon.261.name:0 "คืนตัวอย่างนิวเคลียสแล้ว"
 paragon.261.desc:0 "§H$NAME_Astrocreator_Azaryn$ รู้สึกโล่งใจ§!\n\nฉันไม่อาจประเมินความซาบซึ้งของฉันต่ำเกินไปที่พวกคุณเห็นสมควรจะส่งคืนสิ่งนี้ หากไม่มีวิธีการที่เหมาะสมในการควบคุมพลังนี้ ผลลัพธ์อาจจะร้ายแรงถึงขั้นหายนะได้\n\nโชคดีที่ประวัติศาสตร์จะไม่ซ้ำรอย เพื่อเป็นการตอบแทนความซื่อสัตย์ของพวกคุณ ฉันจะเตรียมฟีโรโมนชุดใหม่ให้"
 paragon.261.a:0 "มันจะไม่เกิดขึ้นอีก"
 paragon.261.b:0 "ประวัติศาสตร์ซ้ำรอยงั้นหรือ?"
 paragon.261.b.response:0 "ฉันพูดมากเกินไปแล้ว\n\n§Hอา ซา รีนส่ายศีรษะ§!\n\nการก้าวก่ายธรรมชาติสามารถนำไปสู่ผลลัพธ์ที่เลวร้ายได้ ในช่วงที่ฉันยังเด็ก ก่อนที่ฉันจะขัดเกลาทักษะของฉัน ฉันได้ทำสิ่งผิดพลาดลงไป...\n\nดาวเคราะห์ของเราเคยเจริญรุ่งเรือง พวกมันสวยงามมาก แต่การคำนวณผิดพลาดเพียงเล็กน้อยนำไปสู่การปะปนของแบคทีเรียที่คาดไม่ถึง สมดุลสูญเสียไป และตามมาด้วยการสูญพันธุ์ครั้งใหญ่ เราไม่รอบคอบพอ และเราก็ได้ชดใช้อย่างสาสมแล้ว"

 NUCLEUS_SAMPLE_STOLEN:0 "การวิจัยนิวเคลียสปรับเปลี่ยนสภาพดาว"
 NUCLEUS_SAMPLE_STOLEN_DESC:0 "การศึกษาตัวอย่างนิวเคลียสปรับเปลี่ยนสภาพดาวของ §Y$NAME_Astrocreator_Azaryn$§! ที่เราได้มาอาจช่วยเพิ่มความเข้าใจในเทคโนโลยีนี้ของเรา"

 paragon.265.name:0 "การวิจัยนิวเคลียสเสร็จสิ้น"
 paragon.265.desc:0 "ทีมวิทยาศาสตร์ลับของเราสามารถเรียนรู้อะไรหลายอย่างจากการศึกษาตัวอย่างนิวเคลียสของ §Y$NAME_Astrocreator_Azaryn$§! โครงการนี้สิ้นสุดลงด้วยความสำเร็จ และอา ซา รีนก็ไม่ล่วงรู้เรื่องนี้เลย"

 paragon.270.name:0 "สถานวิจัยถูกปกคลุม"
 paragon.270.desc:0 "สถานวิจัยบน [event_target:nucleus_building_planet.GetName] ได้รับความเสียหายทางโครงสร้างอย่างหนัก และถูกปกคลุมด้วยพืชพรรณที่เติบโตอย่างรวดเร็ว นักวิทยาศาสตร์ที่ศึกษาตัวอย่างนิวเคลียสปรับเปลี่ยนสภาพดาวไม่สามารถควบคุมสถานการณ์ได้"
 paragon.270.a:0 "เผาสถานวิจัย ทำลายล้างทุกสิ่ง"
 paragon.270.b:0 "เราต้องสารภาพความจริง ติดต่ออา ซา รีน"
 paragon.270.b.custom_tooltip:0 "มีความเป็นไปได้เล็กน้อยที่ §Y$NAME_Astrocreator_Azaryn$§! จะยุติความร่วมมือกับเรา"

 paragon.272.name:0 "$NAME_Astrocreator_Azaryn$"
 paragon.272.desc:1 "§Hอา ซา รีนประหลาดใจ§!\n\n โอ้ สวัสดี ยินดีที่ได้พบคุณ!\n\nฉันต้องบอกเลยว่า ความร่วมมือนี้ส่งผลดีเกินกว่าที่ฉันจินตนาการไว้มาก เรามีความก้าวหน้าอย่างยิ่งร่วมกัน สิ่งเช่นนี้จะเกิดขึ้นได้ก็ด้วยความไว้วางใจเท่านั้น\n\n§Hเธอยิ้มอย่างอบอุ่น§!"
 paragon.272.a:0 "เรามีเรื่องที่ต้องบอกคุณ"

 paragon.273.desc:0 "ฉันเข้าใจแล้ว\n\n§Hเธอถอนหายใจ§!\n\nเอาล่ะ ความเสียหายมันเกิดขึ้นแล้ว โชคดีที่พวกคุณติดต่อฉันมาเร็วดีกว่าช้าไป เราต้องลงมืออย่างรวดเร็ว เรื่องนี้ต้องอาศัยการลงทุนครั้งใหญ่จากฝั่งคุณ ส่งอะไรก็ตามที่คุณส่งให้ได้มา เพื่อที่เราจะได้ยุติเรื่องนี้เสียที"

 paragon.273.a:0 "เอาไปให้หมดเลย"
 paragon.273.a.custom_tooltip:0 "อา ซา รีนจะเอา £energy£ §Hพลังงานเครดิต§! ทั้งหมดของคุณไป"

 paragon.275.name:0 "ภัยพิบัติสีเขียว"
 paragon.275.desc:0 "สถานวิจัยที่เราศึกษาตัวอย่างนิวเคลียสปรับเปลี่ยนสภาพดาวถูกทำลายย่อยยับ เราไม่สามารถหยุดยั้งการแพร่กระจายของพืชพรรณที่รุกรานได้ ตอนนี้ พืชพรรณที่เพิ่งผลิดอกกำลังปล่อยละอองเรณูที่ทำให้ผิวหนังเป็นแผลพุพอง ซึ่งเป็นพิษร้ายแรงหากสูดดมเข้าไป ส่งผลให้ [event_target:nucleus_building_planet.GetName] ตกอยู่ในความเสี่ยง"
 paragon.275.a:0 "เราไม่สามารถควบคุมมันได้ ติดต่ออา ซา รีน"

 nucleus_sample_boils:0 "ละอองเรณูนิวเคลียสที่ก่อให้เกิดภูมิแพ้"
 nucleus_sample_boils_desc:0 "การรักษาอาการบาดเจ็บที่เกิดขึ้นระหว่างความพยายามวิจัยตัวอย่างนิวเคลียสที่ล้มเหลวจะต้องใช้เวลาสักระยะ"

 paragon.280.name:0 "$NAME_Astrocreator_Azaryn$"
 paragon.280.desc:0 "§H$NAME_Astrocreator_Azaryn$ รู้สึกผิดหวังอย่างยิ่ง§!\n\nฉันรู้ว่าพวกคุณโลภ แต่ฉันไม่คิดว่าพวกคุณจะหยิ่งยโสจนถึงขั้นยอมเสี่ยงทำให้ประชาชนของตัวเองต้องเจ็บปวด พวกเขากำลังจะตายนะ!\n\nฉันกำลังเตรียมมาตรการรับมือเพื่อยุติการเติบโตที่แพร่ระบาดนี้ แต่เหยื่อจากความประมาทเลินเล่อของพวกคุณจะต้องได้รับการรักษาพยาบาลโดยด่วน"
 paragon.280.a:0 "เราจะดูแลพวกเขาเอง"

 ###########################
 ### LEADER DEATH EVENTS ###
 ###########################

 paragon.550.name:0 "การตายของผู้นำที่ยิ่งใหญ่"
 paragon.550.desc:2 "§Y[From.GetTitle] [From.GetName]§! ผู้ยิ่งใหญ่ของเรา ได้เสียชีวิตลงแล้วในวัย [From.GetAge] ปี ขณะที่รับใช้จักรวรรดิของเรา ประชาชนไว้อาลัยเพื่อเป็นเกียรติแก่การมีส่วนร่วมของผู้นำคนนี้ต่อ §Y[Root.GetName]§!"
 paragon.550.a:0 "ให้มวลชนไว้อาลัย"
 paragon.550.b:1 "ขบวนส่วนตัวก็เพียงพอแล้ว"
 paragon.550.c:1 "[From.GetHeSheCap]ไม่ได้ทำอะไรเลยที่สมควรได้รับเกียรติเช่นนี้"
 paragon.550.d:1 "บริจาคร่างกายให้กับวิทยาศาสตร์"
 paragon.550.e:1 "สวดส่งวิญญาณของ[From.GetHisHer]"
 paragon.550.f:1 "วางแผนจัดขบวนพาเหรดใหญ่"
 paragon.550.g:2 "ตั้งมูลนิธิในชื่อของ [From.GetHisHer]"
 paragon.550.h:1 "จัดพิธีตามประเพณีดั้งเดิม"
 paragon.550.i:1 "ส่งผู้เสียชีวิตขึ้นสู่อวกาศ"
 paragon.550.j:0 "สร้างอนุสรณ์สถานตามความเหมาะสม"
 paragon.550.k:1 "การรำลึกเล็ก ๆ น้อย ๆ ก็เพียงพอแล้ว"
 paragon.550.l:1 "ตั้งชื่อสถานที่สำคัญเพื่อเป็นเกียรติแก่ [From.GetHisHer]"
 paragon.550.m:2 "เรื่องราวของ [From.GetHisHerCap] ไม่จำเป็นต้องจบลงที่นี่..."
 paragon.550.evopred: "[Root.GetRulerTitle] ปรารถนาที่จะกลืนกินผู้ได้รับเกียรติ"
 paragon.550.evopred.a.tt: "§Y[Root.GetRulerTitle] [Root.GetRulerName]§! จะกลืนกิน §Y[From.GetName]§! ซึ่งจะเป็นการลบลักษณะเชิงลบออกไป"
 paragon.550.evopred.b.tt: "§Y[Root.GetRulerTitle] [Root.GetRulerName]§! จะกลืนกิน §Y[From.GetName]§! ทำให้มีความเป็นหนุ่มสาวขึ้น"
 paragon.550.evopred.c.tt: "§Y[Root.GetRulerTitle] [Root.GetRulerName]§! จะกลืนกิน §Y[From.GetName]§! ได้รับลักษณะใหม่"
 paragon.550.evopred.d.tt: "§Y[Root.GetRulerTitle] [Root.GetRulerName]§! จะกลืนกิน §Y[From.GetName]§! ดำเนินการครึ่งหนึ่งของ ['concept_agenda'] ปัจจุบันเสร็จสิ้น"


 paragon.551.name:1 "พิธีศพสาธารณะ"
 paragon.551.desc:2 "§Y[From.GetName]§! ได้รับการทำพิธีฝังร่างหลังขบวนแห่สาธารณะ พลเมืองทุกคนของ §Y[Root.GetName]§! ได้รับเชิญมาร่วมแสดงความเคารพ\n\nพิธีศพตามมาด้วยเทศกาลนานหนึ่งสัปดาห์โดยไม่เสียดายค่าใช้จ่าย โลงศพคริสตัลโปร่งแสงของ §Y[From.GetName]§! ถูกจัดแสดงไว้ที่อนุสรณ์สถาน §Y[Root.Capital.GetName]§! ซึ่งมีฝูงชนต่อแถวตามท้องถนนหวังจะเจอร่างของผู้นำผู้ยิ่งใหญ่ในสถานที่พักผ่อนสุดท้ายเป็นครั้งสุดท้าย"
 paragon.551.a:1 "การส่งท้ายที่คู่ควร"

 paragon.552.name:1 "พิธีศพส่วนบุคคล"
 paragon.552.desc:1 "§Y[From.GetName]§! ได้รับการทำพิธีฝังร่างเป็นการส่วนตัวร่วมกับสมาชิกในครอบครัวและเพื่อนร่วมงานที่ใกล้ชิด การอุทิศตนของพวกเขาต่อ §Y[Root.GetName]§! นั้นมีความสำคัญยิ่ง แต่ขณะนี้ไม่ใช่เวลาสำหรับการใช้จ่ายที่ฟุ่มเฟือยเกินไป"
 paragon.552.a:1 "การบอกลาตามความเหมาะสม"

 paragon.553.name:1 "ความตายที่เฝ้ารอ"
 paragon.553.desc:2 "การจัดการร่างอย่างเงียบเชียบของ §Y[From.GetTitle]§! ของเรา §Y[From.GetName]§! ได้รับการรายงานจากสื่อมวลชนอย่างรวดเร็ว ในขณะที่บางส่วนแสดงความกังวล แหล่งข่าวหลายแห่งต่างชี้ให้เห็นถึงข้อบกพร่องของผู้นำอย่างหนักแน่น ความรู้สึกโดยทั่วไปคือความโล่งใจที่เราสามารถเปลี่ยนตัวผู้นำคนนี้ด้วยผู้สืบทอดที่เหมาะสมกว่าได้แล้ว\n\n"
 paragon.553.a:1 "ถึงเวลาต้องก้าวต่อไป"

 paragon.554.name:1 "จากสะสารสู่สะสาร"
 paragon.554.desc:0 "หลังจากการรำลึกสั้น ๆ ร่างของ [From.GetTitle] ได้รับการบริจาคให้แก่การศึกษาทางวิทยาศาสตร์เพื่อช่วยเหลือการวิจัยและการศึกษาทางการแพทย์ที่สำคัญ\n\nสิ่งที่เหลืออยู่จากกระบวนการเหล่านี้จะถูกฌาปนกิจด้วยน้ำ(น้ําเผา)และเปลี่ยนเป็นปุ๋ยที่อุดมด้วยแร่ธาตุ เพื่อให้มั่นใจว่าจะไม่มีส่วนใดของร่างกายต้องสูญเปล่า"
 paragon.554.a:0 "วัฏจักรของชีวิตก็เป็นเช่นนี้เอง"

 paragon.555.name:1 "การจากไปอันแสนเศร้า"
 paragon.555.desc:2 "ประชาชนต่างมารวมตัวกันเป็นจำนวนมากเพื่อเฉลิมฉลองชีวิตและการทำงานของ§Y[From.GetName]§! ขบวนแห่ขนาดใหญ่เติมเต็มท้องถนน และมีการร้องเพลงสวดไปจนดึกดื่น ตอนนี้ [From.GetHeSheCap] กำลังรอคอยเราอยู่ที่อีกฟากหนึ่งของม่านพรางตา\n\nส่วนที่คัดลอกมาจากการเทศนาที่เป็นที่นิยมของ [From.GetHisHer] กำลังสะท้อนก้องไปทั่วทั้งจักรวรรดิ คอยเตือนใจเราถึงเป้าหมายร่วมกัน"
 paragon.555.a:0 "จนกว่าเราจะได้พบกันใหม่"

 paragon.556.name:1 "การบอกลาอันทรงเกียรติ"
 paragon.556.desc:2 "ขบวนพาเหรดทหารขนาดใหญ่และการบินกองเกียรติยศของกองทัพเรือเป็นสัญลักษณ์นำทางโลงศพของ §Y[From.GetName]§! ไปยังสถานที่พักผ่อนสุดท้าย ร่างของ [From.GetHisHerCap] ถูกยิงเข้าไปในดาวฤกษ์ที่ใกล้ที่สุดในระหว่างการออกอากาศทั่วทั้งสังคม\n\nกลยุทธ์ส่วนตัวและสมุดบันทึกของผู้นำที่จากไปจะกลายเป็นส่วนหนึ่งของหลักสูตรสำหรับนักเรียนทหารรุ่นต่อไป"
 paragon.556.a:0 "การส่งท้ายอันทรงเกียรติ"

 paragon.557.name:0 "การก่อตั้งมูลนิธิ"
 paragon.557.desc:2 "มูลนิธิไม่แสวงหาผลกำไรได้รับการจัดตั้งขึ้นเพื่อเป็นเกียรติแก่การจากไปของ §Y[From.GetTitle]§! ผู้ยิ่งใหญ่, §Y[From.GetName]§! มูลนิธินี้ถือเป็นก้าวสำคัญสู่สันติภาพและความปรองดองระหว่างดวงดาว เชื่อมโยงความแตกต่างระหว่างชุมชนและเผ่าพันธุ์ต่าง ๆ"
 paragon.557.a:0 "มรดกตกทอดได้รับการสร้างขึ้นแล้ว"

 paragon.558.name:1 "พิธีศพแบบดั้งเดิม"
 paragon.558.desc:2 "ความโศกเศร้าอย่างลึกซึ้งเข้าครอบงำสาธารณชนเมื่อข่าวการจากไปของ §Y[From.GetName]§! แพร่สะพัดไปยังชุมชนในวงกว้าง ผู้ไว้อาลัยจำนวนนับไม่ถ้วนเข้าร่วมขบวนแห่ศพบน §Y[Root.Capital.GetName]§! เพื่อดำเนินตามพิธีศพดั้งเดิม\n\nร่างได้รับการทำความสะอาดอย่างพิถีพิถันและประดับประดาอย่างเหมาะสม ก่อนที่ร่างของ §Y[From.GetTitle]§! ผู้ล่วงลับจะได้รับการฝัง มีการสงบนิ่งไว้อาลัยทั่วทั้งระบบของเราเพื่อเป็นการแสดงความเคารพ"
 paragon.558.a:0 "นี่คือวิถีของเรา"

 paragon.559.name:1 "การเดินทางอันเงียบสงบ"
 paragon.559.desc:2 "ผลงานอันโดดเด่นของ §Y[From.GetName]§! สมควรได้รับโอกาสให้ [From.GetHimHer] ได้เดินทางครั้งสุดท้ายผ่านห้วงอวกาศ\n\nแคปซูลบรรจุอัฐิของ [From.GetTitle] ถูกปล่อยออกสู่ความว่างเปล่าอย่างเป็นทางการ พร้อมกับบทกวี แผนที่ บันทึก และของที่ระลึกอื่น ๆ ที่ตัวแทนต่าง ๆ นำมา วันหนึ่งยานของ [From.GetTitle] อาจพบรังใหม่ที่นั่น และภารกิจสุดท้ายของ [From.GetHisHer] ก็จะเสร็จสมบูรณ์"
 paragon.559.a:0 "จงก้าวไปสู่หมู่ดาวเถิด"

 paragon.560.name:0 "รูปสลักอันสูงส่ง"
 paragon.560.desc:1 "ช่างฝีมือได้รับวัตถุดิบที่ดีที่สุดในการสร้างรูปสลักของ §Y[From.GetName]§! เพื่อจารึกพวกเขาให้อยู่ในแถวของเหล่าวีรบุรุษผู้มีชื่อเสียงของ §Y[Root.GetName]§! ใบหน้าอันสง่างามของพวกเขาถูกสลักลงบนหินและโลหะ คอยย้ำเตือนให้ตระหนักถึงสิ่งที่ผู้นำที่เข้มแข็งสามารถทำสำเร็จได้"
 paragon.560.a:0 "ความแข็งแกร่งของคุณจะได้รับการจดจำ"

 paragon.561.name:0 "ชื่อบนแผ่นศิลา"
 paragon.561.desc:1 "ชื่อและตำแหน่งของ §Y[From.GetName]§! ได้รับการจารึกไว้บนอนุสาวรีย์สูงตระหง่านเคียงข้างผู้อื่นที่ได้อุทิศตนแก่ §Y[Root.GetName]§! เพื่อประโยชน์สุขของประชาชน §Y[From.GetTitle]§! ผู้น่าเคารพจะได้รับการจดจำอย่างอบอุ่นโดยประชาชน และช่วยปูทางให้แก่ผู้นำรุ่นต่อ ๆ ไป"
 paragon.561.a:0 "เพื่อประโยชน์ของคนส่วนใหญ่"

 paragon.562.name:0 "สถานที่สำคัญ"
 paragon.562.desc:1 "ข่าวการจากไปของผู้นำทำให้มูลค่าหุ้นในตลาดหลักทรัพย์กาแลกติกปรับตัวลดลงอย่างรวดเร็วแต่เพียงช่วงสั้น ๆ\n\nนอกเหนือจากการสนับสนุนพิธีศพอันหรูหราแล้ว §Y[Root.GetName]§! ได้เปลี่ยนชื่อตึกระฟ้าที่สูงที่สุดแห่งหนึ่งเป็นตึก [From.GetName] เพื่อให้แน่ใจว่าชื่อของ [From.GetTitle] ผู้ล่วงลับจะได้รับการจารึกไว้ในประวัติศาสตร์ขององค์กร นอกจากนี้ยังมีการแขวนภาพวาดพอร์ตเทรตที่ประดับด้วยงานศิลปะบนผนังห้องประชุมทุกห้องเพื่อระลึกถึงการอุทิศตนอันโดดเด่นของพวกเขาต่อจักรวรรดิ"
 paragon.562.a:0 "ตัดริบบิ้น"

 paragon.563.name:1 "ชีวิตใหม่"
 paragon.563.desc:1 "ความตายของ §Y[From.Species.GetName]§! ไม่ได้เป็นจุดจบอย่างที่คิด แม้ว่าลำต้นหลักจะเริ่มเสื่อมสภาพลง แต่รากก็สามารถฟื้นฟูกลับมาใหม่ได้\n\nหลังจากแช่ในสารละลายฮอร์โมนสูตรพิเศษ ร่างของ §Y[From.GetName]§! จะได้รับการฝังอย่างระมัดระวังในดินของ §Y[burial_planet.GetName]§! พื้นที่ฝังศพได้รับการดูแลโดยสมาชิกในฝูงซึ่งเฝ้ารออย่างอดทนให้หน่ออ่อนผลิยอดขึ้นบนพื้นดินเพื่อเริ่มต้นวัฏจักรใหม่อีกครั้ง"
 paragon.563.a:0 "จากชีวิตหนึ่งไปสู่อีกชีวิตหนึ่ง"

 paragon.570.name:1 "รับใช้แม้ความตาย"
 paragon.570.desc:2 "§Y[From.GetTitle] [From.GetName]§! ได้ชำรุดเสียหายหลังจากรับใช้มาเป็นเวลา [From.GetYearsOfService] อย่างน่าเชื่อถือ นักวิทยาศาสตร์ของเราได้สำรองไฟล์ของพวกเขาไว้เพื่อรักษาข้อมูลที่สำคัญ\n\nโฮโลแกรมอัจฉริยะที่จำลองจาก §Y[From.GetName]§! ได้รับการติดตั้งในระบบยานของเราเพื่อทำหน้าที่เป็นที่ปรึกษาเสมือนจริง พวกเขาจะยังคงช่วยเหลือในภารกิจของเราต่อไป"
 paragon.570.a:1 "ความตายไม่ได้เป็นอุปสรรคอีกต่อไป"

 paragon.571.name:1 "[root.GetGestaltEntityName] ดำรงอยู่ต่อไป"
 paragon.571.desc:1 "จิตใจของ §Y[From.GetTitle] [From.GetName]§! ถูกแยกออกจากกลุ่มจิตสำนึกร่วม(ถอนหายใจ)ณ อายุ [From.GetAge] พวกเราคือ §Y[Root.GetName]§! พวกเราจะดำรงอยู่ต่อไป"
 paragon.571.a:0 "พวกเราจะดำรงอยู่ต่อไป"

 paragon.580.name:1 "การมรณกรรมของยอดอัจฉริยะ"
 paragon.580.desc:2 "เราได้รับข่าวร้ายจากระบบดาว §Y[system_killed_in.GetName]§! กองยานของนักวิทยาศาสตร์ผู้มีชื่อเสียงของเรา §Y[leader_killed.GetName]§! ถูกทำลายลงอย่างสิ้นเชิงโดย §Y[country_killed_by.GetName]§! ในการต่อสู้อันดุเดือด\n\nในการเสียสละครั้งสุดท้าย ลูกเรือได้ส่งสัญญาณวิทยุที่มีผลงานวิจัยล่าสุดทั้งหมดของ §Y[leader_killed.GetName]§! ออกมา แผนการยกย่องเกียรติของ §Y[leader_killed.GetName]§! ด้วยวันหยุดพิเศษได้รับการเริ่มดำเนินการแล้ว"
 paragon.580.a:0 "การเสียสละของพวกเขาจะไม่สูญเปล่า"

 paragon.581.name:1 "การกระทำที่ไม่อาจอภัยให้ได้"
 paragon.581.desc:2 "หลังจากการโจมตีอันป่าเถื่อนโดย §Y[country_killed_by.GetName]§! นักวิทยาศาสตร์ผู้ยิ่งใหญ่ของเรา §Y[leader_killed.GetName]§! ได้เสียชีวิตลงในการต่อสู้ที่ §Y[system_killed_in.GetName]§!\n\nการกระทำอันโหดร้ายนี้สร้างความตื่นตระหนกแก่เราอย่างลึกซึ้ง ประชาชนของเราต่างเรียกร้องความยุติธรรม เราควรทำทุกอย่างในอำนาจของเราเพื่อให้มั่นใจว่า §Y[country_killed_by.GetName]§! จะต้องเสียใจกับการกระทำที่น่ารังเกียจนี้"
 paragon.581.a:0 "สิ่งนี้จะไม่ถูกลืม"

 paragon.582.name:1 "สูญเสียนักวิทยาศาสตร์ผู้มีชื่อเสียง"
 paragon.582.desc:1 "นักวิทยาศาสตร์ผู้มีทักษะเพิ่งจะขาดการติดต่อกับเราไปเมื่อไม่นานมานี้ เราสูญเสียการติดต่อกับ §Y[leader_killed.GetName]§! หลังจากที่ [leader_killed.GetHeShe] เข้าสู่การต่อสู้ในระบบดาว §Y[system_killed_in.GetName]§!\n\nนี่ได้รับการบันทึกว่าเป็นความสูญเสียครั้งใหญ่ของจักรวรรดิของเรา มาตรการเพื่อชดเชยความสูญเสียนี้ต้องได้รับการดำเนินการโดยทันที"
 paragon.582.a:1 "พวกเขาจะต้องได้รับการแทนที่ในทันที"
 paragon.582.b:1 "การสูญเสียของพวกเขาได้รับการรับทราบแล้ว"
 paragon.582.c:1 "สถานการณ์มันไม่เข้าข้างเราตั้งแต่แรกอยู่แล้ว"

 ##############################
 ### DEATH EVENTS MODIFIERS ###
 ##############################

 paragon_death_public_funeral:0 "งานศพสาธารณะ"
 paragon_death_public_funeral_desc:1 "ผู้นำผู้ยิ่งใหญ่ได้รับการทำพิธีฝังร่างตามขบวนแห่สาธารณะ ซึ่งช่วยดึงดูดประชาชนให้ใกล้ชิดกันมากขึ้น"

 paragon_death_private_funeral:0 "งานศพแบบปิด"
 paragon_death_private_funeral_desc:1 "ผู้นำผู้ยิ่งใหญ่ได้รับการฝังร่างในพิธีที่เป็นส่วนตัว ประชาชนทั่วไปไม่ได้รับโอกาสในการร่วมรำลึกเพื่อเยียวยาจิตใจต่อความสูญเสียของพวกเขา"

 paragon_death_good_tidings:0 "ข่าวดี"
 paragon_death_good_tidings_desc:1 "การเสียชีวิตของผู้นำที่ดำรงตำแหน่งมายาวนานส่งผลในแบบที่ไม่มีใครคาดคิด โดยทำให้ฝ่ายที่ขัดแย้งกันหันมาใกล้ชิดกันมากขึ้น พวกเขายินดีที่จะร่วมมือกันเพื่อแก้ไขความผิดพลาดของผู้ล่วงลับ"

 paragon_death_pragmatic_approach:0 "แนวทางเชิงปฏิบัตินิยม"
 paragon_death_pragmatic_approach_desc:1 "การอุทิศร่างกายเพื่อการศึกษาของผู้นำผู้ล่วงลับได้รับการพิสูจน์แล้วว่ามีประโยชน์ และยังคงช่วยหนุนเสริมความพยายามทางวิชาการของเราอย่างต่อเนื่อง"

 paragon_death_harmonious_passing:0 "การจากไปอันสงบประสาน"
 paragon_death_harmonious_passing_desc:0 "เมื่อผู้นำผู้ยิ่งใหญ่ของเราก้าวขึ้นสู่ระดับที่ปราศจากการดำรงอยู่ เราจะพบความสบายใจและการสร้างความมั่นใจร่วมกันในหมู่พวกเรา"

 paragon_death_military_funeral:0 "ประเพณีและพิธีศพนายทหาร"
 paragon_death_military_funeral_desc:1 "ผู้นำผู้ยิ่งใหญ่ได้รับการนำทางไปยังสถานที่พักผ่อนสุดท้ายด้วยขบวนพาเหรดทหาร ซึ่งแสดงแสนยานุภาพของเราต่อกาแลกซี"

 paragon_death_foundation_peace:0 "มูลนิธิเพื่อสันติภาพ"
 paragon_death_foundation_peace_desc:1 "เพื่อเป็นเกียรติแก่ผู้นำผู้ยิ่งใหญ่ที่ล่วงลับ ได้มีการจัดตั้งมูลนิธิขึ้นเพื่อเชื่อมโยงความแตกต่างระหว่างชุมชนของเรา"

 paragon_death_reignited_traditions:0 "การฟื้นฟูประเพณี"
 paragon_death_reignited_traditions_desc:1 "พิธีศพแบบดั้งเดิมที่จัดขึ้นเนื่องในการจากไปของผู้นำผู้ล่วงลับได้ย้ำเตือนให้ประชาชนนึกถึงอดีตที่เคยรวมเป็นหนึ่งเดียว เหตุการณ์นี้เตือนสติเราให้ระลึกถึงประวัติศาสตร์และเชื่อมโยงเรากลับสู่วิถีดั้งเดิมของเรา"

 paragon_death_to_the_stars:0 "สู่ดวงดาว"
 paragon_death_to_the_stars_desc:1 "ผู้นำผู้ล่วงลับได้รับการส่งตัวไปสู่การเดินทางครั้งใหม่ ร่วมกันเราได้รับแรงบันดาลใจในการก้าวข้ามขีดจำกัดและมุ่งหน้าต่อไปข้างหน้า"

 paragon_death_towering_memorial:0 "อนุสรณ์สถานสูงตระหง่าน"
 paragon_death_towering_memorial_desc:1 "ความรุ่งโรจน์ของเราได้รับการจารึกไว้ผ่านอนุสาวรีย์สูงตระหง่าน"

 paragon_death_name_wall:0 "ชื่อบนแผ่นศิลา"
 paragon_death_name_wall_desc:1 "ชื่อของผู้นำผู้ยิ่งใหญ่จะถูกจารึกไว้เป็นอมตะเคียงข้างรายนามของผู้รับใช้สังคมของเราทุกคน"

 paragon_death_landmark_building:0 "อาคารสัญลักษณ์"
 paragon_death_landmark_building_desc:0 "ตึกระฟ้าที่ใช้ชื่อของผู้นำผู้ล่วงลับตั้งตระหง่านอยู่เหนือเมือง เพื่อป่าวประกาศถึงความสำคัญของพวกเขาต่อจักรวรรดิ"

 paragon_death_rejuvenation:0 "การฟื้นฟูคืนพลัง"
 paragon_death_rejuvenation_desc:1 "รากเหง้าที่ถูกฝังไว้ของผู้นำคนก่อนของเราได้ผลิยอดออกมาอีกครั้ง นำมาซึ่งการเริ่มต้นบทใหม่"

 paragon_death_virtual_advisors:1 "ที่ปรึกษาเสมือนจริง"
 paragon_death_virtual_advisors_desc:2 "โฮโลแกรมอัจฉริยะที่เพียบพร้อมไปด้วยประสบการณ์ทั้งหมดของผู้นำที่เสียหายของเรา ทำหน้าที่เป็นที่ปรึกษาที่เจนจัดประจำยานของเรา"

 paragon_death_the_hive_endures:0 "รังยังคงดำรงอยู่"
 paragon_death_the_hive_endures_desc:0 "รังสูญเสียโดรนที่มีคุณค่าไปหนึ่งตัว พวกเขาจะได้รับการแทนที่"
 paragon_death_the_wilderness_endures: "พงไพรยังคงดำรงอยู่"
 paragon_death_the_wilderness_endures_desc: "กลุ่มรวมจิตสูญเสียสิ่งมีชีวิตพึ่งพาที่มีคุณค่าไปหนึ่งตัว พวกเขาจะได้รับการแทนที่"

 #########################
 ###   LEADER EVENTS   ###
 #########################

 paragon.1000.name:0 "สภาที่ไร้ประสิทธิภาพ"
 paragon.1000.desc:1 "สิ่งที่เริ่มต้นจากการทะเลาะเบาะแว้งเล็ก ๆ น้อย ๆ บัดนี้ได้ลุกลามจนกลายทางตันจากการถกเถียงในแทบทุกประเด็นที่เสนอต่อสภา ซึ่งทำลายความสามารถในการทำงานของสภา\n\n§Y[root.GetName]§! ได้รับการพิสูจน์แล้วว่าเป็นสมาชิกสภาที่มีข้อพิพาทและก่อความวุ่นวายมากที่สุด หลายคนกำลังเรียกร้องให้ปลด [root.GetHisHer] ออก เพื่อที่จะได้ฟื้นฟูระเบียบและประสิทธิภาพให้กลับคืนมา"
 paragon.1000.a:0 "ปลดผู้ก่อความวุ่นวาย"
 paragon.1000.b:1 "พวกเขาจะต้องเรียนรู้ที่จะร่วมมือกัน"

 paragon.1005.name:0 "แรงบันดาลใจจากปรากฏการณ์จักรวาล"
 paragon.1005.desc:1 "ความตระการตาของปรากฏการณ์จักรวาลที่หาชมได้ยากช่วยกระตุ้นให้ §Y[root.GetName]§! ก้าวไปสู่จุดสูงสุดใหม่ ด้วยความตื่นเต้นและไอเดียใหม่ ๆ ที่ล้นหลาม คำถามเดียวก็คือพวกเขาควรจะมุ่งเน้นไปที่สาขาวิทยาศาสตร์ใดดี"
 paragon.1005.a:0 "นำการสังเกตการณ์ฟิสิกส์ไปประยุกต์ใช้กับฟิสิกส์"
 paragon.1005.b:1 "มุ่งเน้นไปที่การวิจัยทางสังคม"
 paragon.1005.c:0 "วิศวกรของเราทราบดีว่าควรจัดการเรื่องนี้อย่างไร"

 paragon.1010.name:0 "ของเถื่อนที่ถูกยึด"
 paragon.1010.desc:1 "ภายใต้ระบอบการปกครองอันเด็ดเดี่ยวของ §Y[root.GetName]§! เราได้สะสมของเถื่อนที่ยึดมาได้เป็นจำนวนมหาศาล ปฏิบัติการนี้ใช้เวลาเตรียมการมาอย่างยาวนาน และความสำเร็จที่งดงามทำให้กลุ่มองค์กรอาชญากรรมที่หยั่งรากลึกในพรมแดนของเราต้องพิการลง"
 paragon.1010.a:1 "ความยุติธรรมไม่มีวันหลับใหล"

 paragon.1015.name:0 "สภาที่เป็นหนึ่งเดียว"
 paragon.1015.desc:1 "§Y[event_target:leader_event_target.GetName]§! ได้แสดงให้เห็นถึงความเป็นผู้นำที่ยอดเยี่ยมในการรวมสภาให้เป็นหนึ่งเดียวและทำให้มั่นใจถึงการบริหารสังคมที่มีประสิทธิภาพ การนำสถิติ ขนบประเพณี และการทูตมาประยุกต์ใช้ ทำให้ [event_target:leader_event_target.GetName] สามารถเอาชนะใจได้ไม่เพียงแต่สมาชิกสภาคนอื่น ๆ เท่านั้น แต่รวมถึงกลุ่มการเมืองต่าง ๆ ในสังคมของเราด้วย"
 paragon.1015.a:1 "พวกเราจะแข็งแกร่งยิ่งขึ้นเมื่อร่วมมือกัน"

 paragon.1020.name:0 "การพัฒนาตนเอง"
 paragon.1020.desc:1 "§Y[event_target:leader_event_target.GetName]§! ได้เริ่มต้นการเดินทางเพื่อค้นพบตนเองและพัฒนาส่วนตัว ความสามารถทางจิตใจของ [event_target:leader_event_target.GetHisHerCap] ได้ก้าวสู่ระดับใหม่ ซึ่งเป็นผลจากการศึกษาที่มุ่งมั่น การทำงานหนัก และการไตร่ตรองทบทวนภายในของ [event_target:leader_event_target.GetHisHer] บัดนี้ [event_target:leader_event_target.GetName] มุ่งมั่นที่จะผลักดันขีดจำกัดของสิ่งที่เป็นไปได้ และสร้างแรงบันดาลใจให้ผู้อื่นก้าวไปสู่ดวงดาว"
 paragon.1020.a:1 "จริยธรรมในการทำงานที่สร้างแรงบันดาลใจ"

 paragon.1025.name:0 "ความก้าวหน้าทางวิทยาศาสตร์"
 paragon.1025.desc:1 "ผลจากการค้นพบทางวิทยาศาสตร์อันน่าอัศจรรย์ของ §Y[event_target:leader_event_target.GetName]§! โดยตรง ทำให้อัตราความเร็วในการวิจัยของเราเร่งขึ้น การค้นพบของ[event_target:leader_event_target.GetHisHerCap]กลายเป็นประเด็นร้อนแรงในวงการวิทยาศาสตร์ ซึ่งขณะนี้ต่างยอมรับ [event_target:leader_event_target.GetName] ในฐานะผู้นำทางความคิด"
 paragon.1025.a:1 "การพัฒนานี้จะยังประโยชน์แก่ทุกคน"

 paragon.1030.name:0 "ข้อมูลรั่วไหล"
 paragon.1030.desc:1 "ข้อมูลสำคัญรั่วไหล โดยเปิดเผยข้อมูลที่ละเอียดอ่อนและรายละเอียดด้านความปลอดภัยที่สำคัญต่อสาธารณะ ไฟล์ดังกล่าวประกอบด้วยแผนผังสถานตั้งของกองทัพ รายละเอียดการทดลองเชื่อมต่อระบบประสาทและหลักฐานการสอดแนมบุคคลสำคัญหลายราย\n\n§Y[root.GetName]§! ถูกระบุว่าเป็นผู้รับผิดชอบต่อเหตุการณ์นี้"
 paragon.1030.a:0 "ความผิดพลาดเกิดขึ้นได้"
 paragon.1030.b:1 "พวกเขาจะต้องรับผิดชอบ"

 paragon.1035.name:0 "ผู้นำกระแส"
 paragon.1035.desc:1 "§Y[event_target:leader_event_target.GetName]§! ได้กลายเป็นผู้นำกระแสในหมู่ประชากรทั่วไป ทุกอย่างตั้งแต่สไตล์ของ[event_target:leader_event_target.GetHisHer]ไปจนถึงวิธีการพูดของ[event_target:leader_event_target.GetHisHer]ได้ดึงดูดผู้ติดตามจำนวนมาก อิทธิพลของ[event_target:leader_event_target.GetHisHerCap]ขยายไปทั่วทุกชนชั้นทางเศรษฐกิจและสังคม แต่[event_target:leader_event_target.GetSheHe]ได้รับความนิยมเป็นพิเศษในหมู่เยาวชน"
 paragon.1035.a:1 "เราไม่มีเหตุผลที่จะไม่สนับสนุนเรื่องนี้"

 paragon.1040.name:0 "เสียงกึกก้องไม่มีที่สิ้นสุด"
 paragon.1040.desc:1 "ประชาชนต่างรู้สึกตื่นเต้นและรักชาติอย่างมากหลังจากได้ฟังสุนทรพจน์ของ §Y[event_target:leader_event_target.GetName]§! ความมุ่งมั่นของ[event_target:leader_event_target.GetHisHerCap]ทำให้เกิดความรู้สึกสำนึกความรับผิดชอบและความกระตือรือร้นในชาตินิยมซึ่งแผ่ไปทั่วอาณาเขตของเรา"
 paragon.1040.a:1 "ไม่มีอะไรสามารถหยุดเราตอนนี้ได้"

 paragon.1045.name:0 "แนวโน้มพฤติกรรมเฉพาะตัว"
 paragon.1045.desc:1 "การวิเคราะห์ทางสถิติยืนยันว่า §Y[event_target:leader_event_target.GetName]§! ได้พัฒนาพฤติกรรมและความคิดเฉพาะตัวในระดับที่เข้าใกล้ความเป็นปัจเจกบุคคล\n\nความเสี่ยงและผลประโยชน์ที่อาจได้รับจากความคิดที่เป็นอิสระนั้นอยู่เหนือความสามารถของเราที่จะคาดเดาได้อย่างแม่นยำ จำเป็นต้องมีการตัดสินใจ: จะปล่อยให้ [event_target:leader_event_target.GetName] อยู่ในสถานะนี้ต่อไป หรือเราควรบังคับใช้กระบวนการแก้ไข?"
 paragon.1045.a:1 "ใช้ประโยชน์จากความเป็นปัจเจกบุคคลที่เพิ่งเกิดขึ้นนี้"
 paragon.1045.b:0 "ขับออกและกำจัดทิ้ง"

 paragon.1050.name:1 "เรื่องอื้อฉาวทั่วทั้งจักรวรรดิ"
 paragon.1050.desc:1 "§Y[root.GetName]§! กำลังตกเป็นศูนย์กลางของเรื่องอื้อฉาวครั้งใหญ่ที่ส่งเสียงสะท้อนไปทั่วทั้งจักรวรรดิ มีรายงานมากมายเกี่ยวกับพฤติกรรมที่ผิดแปลก การยักยอกทรัพย์ และการปกปิดความผิด ซึ่งทำให้หลายคนเริ่มตั้งคำถามถึงความสามารถของผู้มีอำนาจ\n\nผลกระทบต่อความรู้สึกของสาธารณชนจะคงอยู่ไปอีกหลายปีอย่างแน่นอน หลายคนเชื่อว่าหนทางเดียวที่จะฟื้นฟูความเชื่อมั่นในระบบกลับคืนมาได้คือการให้ [root.GetName] ก้าวลงจากตำแหน่งและเข้าสู่กระบวนการยุติธรรม"
 paragon.1050.a:1 "ข้อกล่าวหาที่น่าเสียดาย"
 paragon.1050.b:1 "ไล่ผู้นำคนนี้ออก"

 paragon_leader_dismissed_tooltip:0 "§Y[root.GetClass] [root.GetName]§! ถูกปลด"

