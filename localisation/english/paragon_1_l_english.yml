 tech_node_culling_1: "การคัดเลือกโหนดขั้นต้น"
 tech_node_culling_1_desc: "เมื่อเวทีดาราจักรวิวัฒนาการไป สัญชาตญาณในการดำเนินงานของเราก็ควรเปลี่ยนไปเช่นกัน ช่องทางวิวัฒนาการใดที่ไม่ได้สร้างความได้เปรียบอีกต่อไปจะถูกคัดทิ้ง"
 tech_node_culling_2: "การคัดเลือกโหนดพื้นฐาน"
 tech_node_culling_2_desc: "เมื่อนำออกแล้ว โหนดทดแทนจะได้รับการสนับสนุนให้เติบโตในสภาพแวดล้อมที่เหมาะสม ความลับคือการป้อนโหนดก่อนหน้าให้กับมัน"
 tech_node_culling_3: "การคัดเลือกโหนดขั้นสูง"
 tech_node_culling_3_desc: "การคัดทิ้งโหนดทั้งหมดนั้นไร้ประสิทธิภาพอย่างมาก ให้ตัดแต่งเฉพาะส่วนที่แยกออกและไม่ต้องการออกก็พอ"
 AGENDA_UNLOCK_NODE_CULLING_TITLE: "§Hปลดล็อกแผนการ§!: การคัดเลือกโหนด"
 AGENDA_UNLOCK_NODE_CULLING_DESC: "§Yวาระการคัดทิ้ง§! ช่วยให้เราสามารถเปลี่ยนโหนดที่ไม่ตอบสนองวัตถุประสงค์ของเราอีกต่อไปได้ โดยมันจะแทนที่หนึ่งในโหนดปัจจุบันของเราด้วยโหนดที่มีเลเวลต่ำกว่า"

 tech_node_reformatting_1: "การรีฟอร์แมตโหนดขั้นต้น"
 tech_node_reformatting_1_desc: "โปรโตคอลการตัดสินใจด้วยตนเองและอัลกอริทึมแนะนำสามารถล้าสมัยได้ในเวทีดาราจักรที่พัฒนาอย่างรวดเร็ว เช่นเดียวกับข้อมูลขยะทั่วไป พวกมันจะถูกเขียนทับ"
 tech_node_reformatting_2: "การรีฟอร์แมตโหนดขั้นพื้นฐาน"
 tech_node_reformatting_2_desc: "อัลกอริทึมที่ทำซ้ำตัวเองทุกตัวมีคุณค่าในตัวเอง เราจะไม่ปล่อยให้การเรียนรู้ที่สำคัญสูญเปล่าไปเมื่อฟื้นฟูผู้นำของเรา"
 tech_node_reformatting_3: "การรีฟอร์แมตโหนดขั้นสูง"
 tech_node_reformatting_3_desc: "การใช้ซอฟต์แวร์ที่ล้มเหลวในการพัฒนาเวอร์ชันถัดไปช่วยให้สร้างขึ้นใหม่ได้อย่างรวดเร็ว การเรียนรู้จากเส้นทางความจำที่ผิดพลาดทำให้เกิดคำสั่งสภาที่ก้าวหน้ายิ่งขึ้น"
 AGENDA_UNLOCK_NODE_REFORMATTING_TITLE: "§Hปลดล็อกแผนการ§!: กระบวนการรีฟอร์แมตโหนด"
 AGENDA_UNLOCK_NODE_REFORMATTING_DESC: "§Yวาระการฟอร์แมตใหม่§! ช่วยให้เราสามารถเปลี่ยนโหนดที่ไม่ตอบสนองวัตถุประสงค์ของเราอีกต่อไปได้ โดยมันจะแทนที่หนึ่งในโหนดปัจจุบันของเราด้วยโหนดที่มีเลเวลต่ำกว่า"

