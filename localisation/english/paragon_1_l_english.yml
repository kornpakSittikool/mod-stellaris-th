 MESSAGE_BEHOLDER_PLANETFALL_DESC:0 "ผู้เห็นได้ลงจอดบนดาว $PLANET|$ แล้ว ตอนนี้เสาหินพลังจิตหมุน & 90อยู่ที่นั่น"

 MESSAGE_BEHOLDER_PLANETFALL_NO_SLOTS_TITLE:0 "ผู้เห็นลงไปที่ดาวไม่สำเร็จ"
 MESSAGE_BEHOLDER_PLANETFALL_NO_SLOTS_DESC:1 "ผู้เห็นไม่สามารถลงจอดบนดาว $PLANET|$ ได้ จำเป็นต้องมีช่องสิ่งปลูกสร้างว่าง 1 ช่อง"

 leader_trait_governor_psionic_communion:0 "การเข้าร่วมศาสนาพลังจิต"
 leader_trait_governor_psionic_communion_desc:1 "ความสามารถทางพลังจิตของผู้นำคนนี้จะช่วยยกระดับสุขภาวะทางจิตใจของประชาชน สร้างความไว้วางใจ และมอบความรู้สึกปลอดภัยให้เกิดขึ้น"

 # Beholder Backstory
 beholder_backstory:1 "ตัวตนจากแดนเร้นลับ ส่วนหนึ่งของเสียงประสานแห่งผู้กระซิบ ทำการฉายตัวตนผ่านสื่อกลางระหว่างระนาบการดำรงอยู่ แม้ว่าจะดูเหมือนมีเจตนาดี แต่ก็ควรระมัดระวังตัวเอาไว้ ขีดจำกัดของพลังที่แท้จริงและเจตนารมณ์ที่แท้จริงของมันยังไม่มีใครทราบแน่ชัด"


