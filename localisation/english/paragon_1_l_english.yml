 SHROUD_SHIELD_SUPPRESSION_FIELD:0 "ระงับยับยั้งโล่พลังงานเดอะชราวด์"
 SHROUD_SHIELD_SUPPRESSION_FIELD_DESC:0 "สนามพลังงานที่ผสมผสานพลังจากแดนเร้นลับ ซึ่งจะยกเลิกการทำงานของเกราะป้องกันทั้งหมดในระบบดาวดวงนั้น"
 SHIP_PLANETFALL:0 "การออกแบบสองฟังก์ชัน"
 SHIP_PLANETFALL_DESC:0 "แท่งหินนี้เป็นยานพาหนะที่ทนทานกว่ายานทั่วไปส่วนใหญ่ และมีความสามารถในการทำหน้าที่เป็นทั้งยานและอาคารบนดาวเคราะห์ได้"
 decision_deploy_beholder:0 "เสาหินพลังจิตขึ้นสู่อวกาศ"
