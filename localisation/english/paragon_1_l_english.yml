 SHIP_AZARYN_TERRAFORM:0 "เครื่องจุดชนวนนิวเคลียสปรับสภาพดวงดาว"
 SHIP_AZARYN_TERRAFORM_DESC:0 "วี ดิ โอ รี อุมมีความเชื่อมโยงอย่างใกล้ชิดกับการทำงานของนิวเคลียสปรับสภาพดวงดาวของ $NAME_Astrocreator_Azaryn$"
 azaryn_ship_button:0 "§Hติดตั้งนิวเคลียสปรับสภาพดวงดาว§!\nเริ่มการแปลงดาวเคราะห์เป้าหมายให้กลายเป็นโลก §Y$pc_gaia$§! มีผลกับโลกที่อยู่อาศัยได้ส่วนใหญ่ รวมถึงดาว §Y$pc_barren$§!\n\n§Rสิ้นเปลืองนิวเคลียสปรับสภาพดวงดาวหนึ่งชิ้นจาก §Y$NAME_Astrocreator_Azaryn$§! ต่อการใช้งานหนึ่งครั้ง§!\nนิวเคลียสที่เหลืออยู่: §Y[fleet.leader.azaryn_nuclei_variable]§!\n\nค่าใช้จ่าย: £energy£§Y10000§!\nเวลา: £resource_time£ §Y3600§! วัน\n$tt$ £resource_time£ §Y9000§! วัน หากเป็นดาว §Y$pc_barren$§!"
 azaryn_ship_terraforming:0 "กำลังอยู่ระหว่างปรับสภาพดวงดาว"

 MESSAGE_AZARYN_TERRAFORM_STARTED_TITLE:0 "เริ่มกระบวนการปรับสภาพดวงดาว"
 MESSAGE_AZARYN_TERRAFORM_STARTED_DESC:0 "$PLANET|$ ได้รับการเพาะพันธุ์ด้วยหนึ่งในนิวเคลียสปรับสภาพดวงดาวของ §Y$NAME_Astrocreator_Azaryn$§! แล้ว การแปลงให้เป็น §Y$pc_gaia$§! ได้เริ่มต้นขึ้น"
