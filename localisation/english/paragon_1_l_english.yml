 decision_deploy_beholder_desc:0 "เมื่ออยู่นอกดาวเคราะห์ ยานของผู้เฝ้ามองจะกระตุ้นเครื่องลดแรงเกราะป้องกันอันทรงพลัง ซึ่งจะปิดการใช้งานเกราะป้องกันทั้งหมดโดยไม่แบ่งแยก"
 cannot_deploy_during_psi_inoculation:1 "§Rการปลูกฝังพลังจิตของประชากรดาวนี้กำลังดำเนินการอยู่ผู้เห็นไม่สามารถขึ้นสู่อวกาศหรือไม่เช่นนั้นจิตของพวกเขาจะตกอยู่ในความเสี่ยง§!"

 decision_psi_inoculate_pops:1 "เริ่มการปลูกฝังพลังจิต"
 decision_psi_inoculate_pops_custom_tooltip:2 "แท่งหินกระซิบจะมอบคุณลักษณะ §Y$trait_psionic$§! ให้แก่ £pop£ §Hประชากร§! เมื่อเวลาผ่านไป แทนการผลิต £sr_zro£ §YZro§!\n\n§Rไม่สามารถส่งแท่งหินกระซิบไปใช้งานได้ในขณะที่กระบวนการนี้กำลังดำเนินอยู่§!"
 decision_psi_inoculate_pops_desc:3 "ผู้เฝ้ามองจะทำการฉีดสารกระตุ้นให้กับประชากรเมื่อเวลาผ่านไปเพื่อทำให้กลายเป็น §Y$trait_psionic$§! ขั้นตอนนี้กำหนดให้ประชากรเหล่านั้นต้องไม่ถูกกวาดล้าง ไม่ใช่ไซเบอร์เนติกส์ หรือไม่ใช่จิตสำนึกร่วมรัง"
 no_organic_pops_on_planet:0 "§Rดาวเคราะห์ดวงนี้ไม่มีประชากรประเภทชีวภาพและไม่ใช่ไซเบอร์เนติกส์ให้ทำการฉีดกระตุ้น§!"

 decision_cease_psi_inoculate_pops:0 "หยุดการปลูกฝังพลังจิต"
 decision_cease_psi_inoculate_pops_custom_tooltip:0 "£pop£ §Hประชากร§! จะหยุดรับการดัดแปลงเพื่อรับคุณลักษณะ §Y$trait_psionic$§! เมื่อเวลาผ่านไป\n$beholder_psi_pops_timer_tooltip$\nการดำเนินการนี้จะเปิดโอกาสให้สามารถส่งแท่งหินกระซิบไปใช้งานได้ และฟื้นฟูการผลิต £zro£ §YZro§! ของมันกลับมา"
 decision_cease_psi_inoculate_pops_desc:0 "ผู้เฝ้ามองจะทำการฉีดสารกระตุ้นให้กับประชากรเมื่อเวลาผ่านไปเพื่อทำให้กลายเป็น §Y$trait_psionic$§! ขั้นตอนนี้กำหนดให้ประชากรเหล่านั้นต้องไม่ถูกกวาดล้าง ไม่ใช่ไซเบอร์เนติกส์ หรือไม่ใช่จิตสำนึกร่วมรัง"

 beholder_psi_pops_timer_tooltip:0 "การปลูกฝังพลังจิตครั้งถัดไปที่ §Y[This.GetName]§! จะเสร็จในวันที่ §Y[This.beholder_psi_pops_timer]§!"

 beholder_psi_pops_cooldown_tooltip:0 "\n§Rหมุน & 90เพิ่งหยุดการฝังพลังจิตและไม่สามารถเริ่มใหม่ได้จนกว่าจะถึง §Y[This.beholder_psi_pops_cooldown_timer]§!§!"

 MESSAGE_POPS_INOCULATED_TITLE:0 "การฉีดสารกระตุ้นประชากรเสร็จสิ้น"
 MESSAGE_POPS_INOCULATED_DESC:1 "§Hประชากร§! £pop£ จำนวน §Y100§! กลุ่มบน $PLANET|$ ได้รับคุณลักษณะ §Y$trait_psionic$§! แล้วเนื่องจากการฉีดกระตุ้นพลังจิตของ §Yผู้เฝ้ามอง§!"

