##########################################
 NAME_Exakeides:0 "Keides, Scion of Vagros"
 desc_exakeides:0 "เขาถูกแช่แข็งในสภาวะจำศีลมานานหลายยุคหลายสมัย ในที่สุดเมื่อได้รับอิสรภาพ ตอนนี้ §Yแว่นขยาย§! ก็ต้องการชดเชยเวลาที่สูญเสียไป รูปลักษณ์ภายนอกที่ยังดูหนุ่มแน่นของเขาซ่อนสติปัญญาที่เฉียบแหลมและเฉียบคมเอาไว้"
 leader_trait_legendary_far_from_home:0 "อดีตอันเลือนราง"
 leader_trait_legendary_far_from_home_desc:0 "เขามาจากไหน? ใครเป็นคนพาเขาเข้าสู่ตู้นอนแช่แข็ง และทำไมเขาถึงถูกปลดปล่อยออกมา? คำถามในอดีตที่ยังไม่มีคำตอบเหล่านี้ได้เติมเต็มความกระหายในความรู้ของผู้นำผู้นี้"
 leader_trait_legendary_ancestors_knowledge:0 "มรดกตกทอดแห่งบรรพชน"
 leader_trait_legendary_ancestors_knowledge_desc:0 "ร่างกายของผู้นำผู้นี้เปรียบเสมือนคลังความรู้และทักษะขนาดใหญ่ ซึ่งเป็นมรดกทางพันธุกรรมที่ได้รับมาจากการเสียสละของบรรพบุรุษของเขา"
 job_archivist:0 "$job_fe_archivist$"
 job_archivist_plural:0 "$job_fe_archivist_plural$"
 job_archivist_desc:0 "ภายใต้การนำทางอย่างระมัดระวังของคีเดสนักจดหมายเหตุเหล่านี้มีหน้าที่รับผิดชอบในการจัดหมวดหมู่ข้อมูลตามมาตรฐานของชาว& ขาว"
 mod_job_archivist_add:0 "$mod_job_fe_archivist_add$"

 paragon.3100.name:0 "สัญญาณขอความช่วยเหลือ"
 paragon.3100.desc:1 "เมื่อเข้าสู่ระบบดาว [From.GetName] เซ็นเซอร์ของเราตรวจพบสัญญาณอ่อน ๆ ที่มีต้นตอมาจากดาวเคราะห์ [event_target:exakeides_planet.GetName]\n\nเป็นรูปแบบสั้น ๆ ที่ส่งซ้ำ ๆ ดูเหมือนว่าจะเป็นการร้องขอความช่วยเหลือ อย่างไรก็ตาม เนื่องจากสัญญาณมีความอ่อนมาก เราจึงคาดว่าการระบุตำแหน่งที่มาจะทำได้ยาก และอาจสายเกินไปที่จะช่วยเหลือแล้ว"
 paragon.3100.a:0 "ถ้ายังมีโอกาส เราก็ต้องขอลองดู"
 paragon.3100.b:0 "เพิกเฉยต่อสัญญาณ"
 LEGENDARY_LEADER_FIRST_PROJECT:0 "แหล่งที่มาของสัญญาณขอความช่วยเหลือ"
 LEGENDARY_LEADER_FIRST_PROJECT_DESC:0 "ต้องใช้เวลาในการระบุตำแหน่งที่แน่นอนบนดาวเคราะห์ของสัญญาณขอความช่วยเหลือบนดาว [event_target:exakeides_planet.GetName]"
 paragon.3104.name:0 "กระสวยหลบภัย"
 paragon.3104.desc:1 "เราได้พบแหล่งที่มาของสัญญาณขอความช่วยเหลือบนดาว [event_target:exakeides_planet.GetName] แล้ว\n\nมีกระสวยหลบภัยโบราณถูกฝังอยู่ใต้เปลือกโลกของดาวเคราะห์ดวงนี้ แคปซูลแช่แข็งของมันบรรจุสิ่งที่ดูเหมือนจะเป็นเด็กต่างดาว\n\nแม้กระสวยจะเก่าแก่มาก แต่อุปกรณ์รักษาสภาพแช่แข็งก็ยังคงทำงานอยู่ และสัญญาณชีพของเด็กยังคงทรงตัว บนพื้นผิวด้านนอกของแคปซูลมีสัญลักษณ์แกะสลักไว้อย่างหยาบ ๆ เราแปลสัญลักษณ์เหล่านั้นได้ว่า: 'ความหวังของเรา อนาคตของเรา ทายาทของเรา'"
 paragon.3104.a:0 "กู้ชีพเด็กคนนั้นขึ้นมา"
 LEGENDARY_LEADER_RESUSCITATION:0 "การกู้ชีพจากสภาวะแช่แข็ง"
 LEGENDARY_LEADER_RESUSCITATION_DESC:0 "เด็กที่พบเจออยู่บน [event_target:exakeides_planet.GetName] นั้นมีชีวิตรอดจากสภาวะแช่แข็งเป็นระยะเวลาที่ยาวนานกว่าใคร ๆ ในประวัติศาสตร์ที่เคยบันทึกไว้ การกู้ชีพจะต้องใช้การเตรียมการที่รอบคอบและพิถีพิถัน"
 paragon.3105.name:0 "กู้ชีพสำเร็จ"
 paragon.3105.desc:1 "เด็กที่พบอยู่บน [event_target:exakeides_planet.GetName] ได้รับการกู้ชีพขึ้นมาสำเร็จแล้ว สัญญาณชีพทั้งหมดอยู่ในเกณฑ์ปกติสำหรับสิ่งมีชีวิตประเภทนี้ เขายังคงหมดสติอยู่อาจต้องใช้เวลาอีกสักระยะก่อนที่เด็กจะตื่นขึ้นมา\n\nนอกจากนี้ยังพบสิ่งของบางรายการภายในกระสวย อย่างแรกคือผลึกข้อมูลที่เสื่อมสภาพซึ่งเผยให้เห็นถึงเพศ ชื่อ และสายพันธุ์ของเด็ก เขาชื่อว่า §Yแว่นขยาย§! และถูกอ้างถึงในบันทึกว่าเป็น §Y'ทายาทแห่งวาส§! อย่างที่สองคือโบราณวัตถุแปลกประหลาดที่ประกอบด้วยวัสดุหนักที่ไม่รู้จัก เมื่อพิจารณาจากรูปลักษณ์ มีความเป็นไปได้ว่าวัตถุโบราณชิ้นนี้เคยเป็นส่วนหนึ่งของโครงสร้างที่ใหญ่กว่า แนะนำให้มีการศึกษาเพิ่มเติม\n\nสิ่งที่ต้องกังวลมากกว่าคือการจะดำเนินการอย่างไรกับเด็กคนนี้ ไม่ว่าแว่นขยายคนนี้จะเป็นใครหรือเคยเป็นใคร ในระหว่างนี้เขายังคงต้องการการดูแล"
 paragon.3105.a:1 "เราจะมอบบ้านให้กับแว่นขยาย"
 paragon.3105.b:0 "เด็กคนนี้ไม่ใช่ความรับผิดชอบของเรา"
 paragon.3105.c: "กินเด็กคนนั้นซะ"

 LEGENDARY_LEADER_STUDY_RELIC_PROJECT:0 "ชิ้นส่วนวัตถุโบราณ"
 LEGENDARY_LEADER_STUDY_RELIC_PROJECT_DESC:1 "ชิ้นส่วนที่แตกหักซึ่งถูกพบในตู้นอนแช่แข็งของแว่นขยายวัตถุโบราณนี้อยู่ไกลเกินกว่าความเข้าใจทางวิทยาศาสตร์ในปัจจุบันของเราอย่างมาก ต้องใช้เวลาและทรัพยากรจำนวนมหาศาลเพื่อเปิดเผยความลับของมัน"
 paragon.3110.name:0 "ชิ้นส่วนวัตถุโบราณ"
 paragon.3110.desc:0 "งานวิจัยชิ้นส่วนวัตถุโบราณที่หักซึ่งพบร่วมกับแว่นขยายที่กำลังดำเนินอยู่ได้พบกับทางตัน เนื่องจากมีชิ้นส่วนสูญหายไปเป็นจำนวนมาก เราจึงทำได้เพียงคาดเดาจุดประสงค์ที่แท้จริงของมัน อย่างไรก็ตาม อิงจากค่าผิดปกติที่เราบันทึกได้ในยามที่เข้าใกล้ มันมีเหตุผลพอที่จะสรุปได้ว่าวัตถุดังกล่าวมีผลกระทบต่อกาลอวกาศ"
 paragon.3114.name:0 "การเติบโตของแว่นขยาย"
 paragon.3114.desc:0 "§Yแว่นขยาย§! เป็นเด็กที่มีพัฒนาการก่อนวัยอันควรอย่างเห็นได้ชัด การก้าวเข้าสู่ปีที่สิบของเขานับเป็นจุดเริ่มต้นของการศึกษาขั้นสูง จนถึงปัจจุบันนี้ เรามุ่งเน้นไปที่การส่งเสริมความอยากรู้อยากเห็นอันไร้ขอบเขตของเขาและจัดหาเครื่องมือที่จำเป็นทั้งหมดเพื่อไล่ตามความสนใจของเขา ในปีต่อ ๆ ไป เขาจะได้รับการฝึกสอนจากกลุ่มคนที่มีความสามารถสูงสุดที่เรามี\n\nศักยภาพของเขาในการที่จะเป็นผู้นำในด้านวิทยาศาสตร์นั้นคุ้มค่าต่อการลงทุน คำถามคือ การศึกษาของเขาจะดำเนินไปบนรากฐานแบบใด?"
 paragon.3114.a:0 "ผลักดันให้เขายอมรับในสิ่งที่ไม่รู้จัก" # Xenophile
 paragon.3114.b:0 "เตือนเขาไม่ให้ไว้ใจคนภายนอก" # Xenophobe
 paragon.3114.c:0 "ประทับใจในคุณค่าของชีวิต" # Pacifist
 paragon.3114.d:0 "เตือนเขาด้วยว่าความแข็งแกร่งคือพลัง" # Militarist
 paragon.3114.e:0 "ให้ความเคารพต่อความเท่าเทียม" # Egalitarian
 paragon.3114.f:0 "สั่งให้เขาเชื่อฟัง" # Authoritarian
 paragon.3114.g:0 "นําศรัทธาของเขา" # Spiritualist
 paragon.3114.h:1 "กักบริเวณเขาในโลกกายภาพ" # Materialist

 paragon.3115.name:0 "คีเดส์ สไกออนแห่งวาโกรส"
 paragon.3115.desc:0 "เมื่ออายุครบยี่สิบปี §Yแว่นขยาย§! ก็พร้อมที่จะรับผิดชอบในฐานะผู้ใหญ่\n\nนับตั้งแต่การกู้ชีพของเขาเป็นต้นมา เขาได้ซึมซับคำสั่งสอนของเราด้วยความกระตือรือร้นและความมุ่งมั่น แม้จะมีความสามารถอันล้ำเลิศและสติปัญญาที่ไร้ขอบเขต แต่เขาก็ยังคงนอบน้อมถ่อมตน\n\nวิทยาศาสตร์เป็นเป้าหมายอันแรงกล้าของเขามาโดยตลอด ช่วยขับเคลื่อนความพยายามในการค้นหาความจริงเกี่ยวกับอดีตและวัตถุประสงค์ของวัตถุโบราณที่ชำรุดที่พบร่วมกับตัวเขา สำหรับผู้คนรอบข้าง เขาเป็นที่รู้จักในนามง่าย ๆ ว่า '§Yคีเดส§!'"
 paragon.3115.a:1 "ได้เวลาวางแผนสำหรับก้าวต่อไปของเขาแล้ว"
 paragon.3115.a.custom_tooltip:0 "เหตุการณ์ '§Y$paragon.3116.name$§!' จะเกิดขึ้นในอีก §Y10 ปี§!"
 paragon.3116.name:0 "$paragon.3115.name$"
 paragon.3116.desc:1 "สวัสดี\n\n§Hคีเดสยืนตัวตรง เฝ้าสังเกตสถานการณ์และปฏิกิริยาของตัวเองที่มีต่อสิ่งนั้น เขามองลงไปที่มือทั้งสองข้าง: มันนิ่งสงบอย่างน่าประหลาดใจ เขาเตรียมตัวพร้อมสำหรับวันนี้แล้ว§!\n\nฉันพร้อมแล้ว"
 paragon.3116.a:1 "ยินดีต้อนรับคีเดส"
 paragon.3116.a.response:1 "§Hชายหนุ่มพยักหน้าและสูดหายใจลึก§!\n\nฉันฝันถึงวันนี้มาตลอด เฝ้ารอคอยมันมานานเท่าที่จะจดจำความได้\n\nฉันพร้อมและยินดีที่จะรับใช้"
 paragon.3116.b:1 "ยังมีเวลาอีกมากสำหรับเรื่องนั้น แต่ก่อนอื่น สิ่งที่เธอตามหาคืออะไร?"
 paragon.3116.b.response:1 "ใครเล่าต้องการสิ่งใด? นอกจากการรู้จักตนเองและเข้าใจถึงตำแหน่งแห่งที่ในจักรวาล\n\nฉันเชื่อว่ากุญแจสำคัญอยู่ที่วัตถุโบราณชิ้นนี้ ด้วยความช่วยเหลือจากท่าน ฉันจะอุทิศตนเพื่อค้นหาชิ้นส่วนที่เหลืออยู่ แต่อย่าเข้าใจผิดไป นี่ไม่ใช่การตามหาตัวตนที่ไร้ประโยชน์ ฉันมั่นใจว่าพลังของวัตถุโบราณนี้จะเป็นประโยชน์อย่างยิ่งแก่ผู้คนของเรา\n\n§Hเขาหยุดชะงักครู่หนึ่ง§!\n\nฉันเป็นหนี้บุญคุณท่านที่ช่วยชีวิตฉันไว้ ฉันจำเป็นต้องค้นหาคำตอบ และฉันต้องการความช่วยเหลือจากท่าน"
 paragon.3116.c:0 "แล้วเมื่อเธอพบสิ่งที่ตามหาแล้ว? จะเป็นอย่างไรต่อ?"
 paragon.3116.c.response:1 "§Hคีเดสเงยหน้าขึ้นมองด้วยความภาคภูมิใจ§!\n\nคำถามที่ลึกซึ้งและมีคำตอบมากมาย สรุปสั้น ๆ คือท่านมอบบ้านให้แก่ฉัน ไม่ว่าการเดินทางครั้งนี้จะพาฉันไปที่ใด หรือฉันจะได้เรียนรู้อะไร ฉันจะแบ่งปันมันร่วมกับท่านอย่างแน่นอน ฉันให้สัญญา"

 paragon.3117.name:1 "อิทธิพลของวัตถุโบราณ"
 paragon.3117.desc:1 "จากการสืบสวนโบราณวัตถุเบื้องต้น §Yคีเดส§! รายงานว่าได้พบกับประสบการณ์ที่แปลกประหลาด\n\nหลังจากสัมผัสทางกายภาพ 'ภาพนิมิต' ได้ปรากฏขึ้นในจิตใจของเขา เป็นภาพของผู้คนและสถานที่ ความทรงจำในอดีตที่ถูกลืมเลือนไปนาน แม้ว่าเขายังไม่อาจเข้าใจความหมายทั้งหมดได้ชัดเจน แต่นิมิตบางภาพก็แสดงให้เห็นสถานที่ที่มีอยู่จริง\n\nคีเดสกำลังเรียกร้องให้จัดตั้งโครงการพิเศษเพื่อออกสำรวจพวกมัน"
 paragon.3117.a:1 "น่าสนใจยิ่ง เราต้องค้นหาคำตอบ"

 paragon_legendary_leader_chain_title:0 "ภาพนิมิตแห่งวัตถุโบราณ"
 paragon_legendary_leader_chain_desc:0 "คำร้องขออย่างเป็นทางการจาก §Yคีเดส§! เพื่อพิสูจน์ความจริงเกี่ยวกับภาพนิมิตของเขา\n\nการทำเช่นนั้นอาจไขรหัสลับไปสู่อดีตของเขาและวัตถุโบราณปริศนาที่เขาถูกพบร่วมกัน"
 planets_studied:0 "ภาพนิมิตที่ได้รับการสำรวจ"
 legendary_leader_system_1:0 "ภูมิประเทศภูเขาไฟ"
 legendary_leader_system_1_desc:0 "สว่างไสวด้วยหินหลอมเหลว พื้นผิวของดาวดวงนี้แตกสลายจากกิจกรรมการเคลื่อนตัวของแผ่นเปลือกโลก\n\nตามรายงานตั้งอยู่ในระบบดาว [event_target:1st_system_legendary.GetName]"
 legendary_leader_system_2:0 "สัตว์ป่าดุร้าย"
 legendary_leader_system_2_desc:0 "ดาวเคราะห์ที่มีป่าทึบอันอุดมสมบูรณ์ เงาไม้ที่เปียกชื้นและเรือนยอดไม้ที่ไหวเอนเต็มไปด้วยเหล่านักล่า... และเหยื่อของพวกมัน\n\nตามรายงานตั้งอยู่ในระบบดาว [event_target:2nd_system_legendary.GetName]"
 legendary_leader_system_3:0 "สุสานยานอวกาศ"
 legendary_leader_system_3_desc:0 "เต็มไปด้วยรอยหลุมอุกกาบาตและถูกกัดกร่อนโดยพายุลม พื้นผิวอันแห้งแล้งของดาวเคราะห์ดวงนี้เกลื่อนกลาดไปด้วยเศษซากยานอวกาศที่ผุกร่อน\n\nตามรายงานตั้งอยู่ในระบบดาว [event_target:3rd_system_legendary.GetName]"

 paragon.3120.name:1 "วิสัยทัศน์ที่ยั่งยืน" # Volcanic
 paragon.3120.desc:1 "ไม่นานหลังจากเข้าสู่ระบบดาว [From.GetName] ก็พบดาวเคราะห์ที่ตรงกับภาพนิมิตของ §Yคีเดส§! แล้ว มหาสมุทรของแร่หลอมเหลวไหลหลากข้ามผ่านพื้นผิวดาวเคราะห์ดวงนี้"
 paragon.3120.a:0 "เตรียมพร้อมสำหรับการสำรวจดาวเคราะห์"
 LEGENDARY_LEADER_VOLCANO_PLANET_PROJECT:0 "การสำรวจภูเขาไฟ"
 LEGENDARY_LEADER_VOLCANO_PLANET_PROJECT_DESC:1 "การสืบสวนเบื้องต้นบนดาวเคราะห์ในระบบ $NAME_Vapob$ สอดคล้องกับทิวทัศน์ที่เห็นแวบหนึ่งในนิมิตของ §Yคีเดส§!\n\nแม้จะมีความไม่มั่นคงทางธรณีวิทยา แต่ก็มีพื้นที่ดอนบางส่วนที่มีสภาพดินแข็งแรง สามารถทำการส่งคณะเดินทางไปได้\n\n§Rโครงการพิเศษนี้จะต้องได้รับการวิจัยโดยตัว §Yคีเดส§! เองเท่านั้น§!"
 paragon.3121.name:0 "การสำรวจภูเขาไฟ"
 paragon.3121.desc:1 "ระหว่างอ่าวและระลอกคลื่นของมหาสมุทรหลอมเหลวบนดาวเคราะห์ §Yคีเดส§! ได้ค้นพบซากโรงผลิตและแปรรูปแร่ธาตุ เขารายงานว่าเห็นนิมิตใหม่เกี่ยวกับทางเดินมืดมิดที่ทอดยาวไปสู่ห้องปิดตาย การตามภาพนิมิตนี้ทำให้คีเดสไปพบกับกล่องเก่าแก่ที่กำลังผุพัง ภายในกล่องเขาเจอกับชิ้นส่วนของโบราณวัตถุที่ไม่ได้รับผลกระทบจากกาลเวลาเลยแม้แต่น้อย\n\nคีเดสรายงานเพิ่มเติมว่าในทันทีที่เขาสัมผัสมัน เขาก็ถูกโจมตีด้วยนิมิตใหม่ที่น่ากังวลใจ"
 paragon.3121.a:1 "เขาเห็นอะไร?"
 paragon.3122.name:0 "วิญญาณ ใน อดีต" #vision
 paragon.3122.desc:1 "กิจกรรมอันวุ่นวายของเตาหลอมขนาดใหญ่ปรากฏขึ้นรอบตัว §Yคีเดส§! เหมืองแร่ โรงงาน และยานพาหนะปกคลุมพื้นที่จนทั่ว ยานบรรทุกขนาดใหญ่จำนวนมากปรากฏกระจายอยู่เต็มท้องฟ้า เหนือเสียงอึกทึกเหล่านั้น มีพอร์ทัลทางผ่านจำนวนมากที่สว่างวาบและดับวูบลง พับม้วนกลับเข้าหาตัวเอง ทันใดนั้นก็เกิดเสียงคำรามดังสนั่นและพื้นดินเริ่มสั่นสะเทือน เสียงกรีดร้องอย่างอึดอัดดังขึ้นจากที่ไกลแสนไกล\n\nหลังจากฟื้นจากภาพนิมิตคีเดสวางชิ้นส่วนใหม่เคียงคู่กับชิ้นส่วนที่มีอยู่เดิม เสียงวีดแหลมดังสะท้อนทั่วบริเวณ เกือบจะในทันที ทั้งสองส่วนก็หลอมรวมเข้าด้วยกันด้วยตัวของมันเอง ดูเหมือนว่าพลังผลกระทบของโบราณวัตถุจะแข็งแกร่งขึ้นแล้ว"
 paragon.3122.a:0 "การพัฒนาที่น่าสนใจยิ่ง"

 paragon.3125.name:1 "วิสัยทัศน์ที่ยั่งยืน" # Wildlife
 paragon.3125.desc:1 "การเดินตามภาพนิมิตของ §Yคีเดส§! นำเรามาสู่ดาวเคราะห์ดวงหนึ่งในระบบ [From.GetName] ซึ่งมีป่าทึบปกคลุมพื้นที่บนดินมากกว่า 90%"
 paragon.3125.a:0 "เตรียมพร้อมสำหรับการสำรวจดาวเคราะห์"
 LEGENDARY_LEADER_HOSTILE_PLANET_PROJECT:0 "การสำรวจป่าทึบ"
 LEGENDARY_LEADER_HOSTILE_PLANET_PROJECT_DESC:0 "หากดาวเคราะห์ในระบบ $NAME_Taprib$ มีสภาพเหมือนกับที่ §Yคีเดส§! ได้เห็นในนิมิตของเขา เราควรดำเนินงานด้วยความระมัดระวังอย่างถึงที่สุด\n\n§Rโครงการพิเศษนี้จะต้องได้รับการวิจัยโดยตัวคีเดสเองเท่านั้น§!"
 paragon.3126.name:0 "เหนือเรือนยอดไม้"
 paragon.3126.desc:1 "ภัยอันตรายต่าง ๆ ของป่าดงดิบได้รับการพิสูจน์แล้วว่านำทางได้ยากลำบากอย่างยิ่ง บ่อยครั้งที่ §Yคีเดส§! รอดพ้นจากความตายมาได้อย่างหวุดหวิด\n\nทว่าแม้จะเป็นเช่นนั้น เขาก็ยังคงมุ่งหน้าต่อไปด้วยการดึงดูดของพลังลึกลับ ก่อนจะค้นพบซากปรักหักพังที่ปกคลุมด้วยวัชพืชของโครงสร้างขนาดยักษ์ บันไดที่ทรุดโทรมทอดตัวนำทางไปสู่แท่นบูชาที่อยู่สูงจากยอดไม้ขึ้นไป บนแท่นหินโลหะสีดำนั้น มีชิ้นส่วนอีกชิ้นหนึ่งของโบราณวัตถุวางอยู่\n\nเกือบจะในทันที §Yคีเดส§! ก็จมดิ่งลงสู่ภาพนิมิตอีกครั้ง"
 paragon.3126.a:0 "เขาเห็นอะไร?"
 paragon.3127.name:0 "วิญญาณ ใน อดีต" #vision
 paragon.3127.desc:1 "หมู่มวลไม้พืชพรรณพากันแหวกออก เผยให้เห็นวิวทิวทัศน์สีเขียวขจี โลกที่ได้รับการปรับแต่งอย่างงดงาม พร้อมด้วยพื้นที่กักกันสัตว์ที่มีขนาดใหญ่เท่าผืนป่าขนาดใหญ่ ซึ่งบรรจุสัตว์สายพันธุ์ต่าง ๆ จากทั่วกาแล็กซี\n\nทันใดนั้น นิมิตได้พาตัว §Yคีเดส§! เข้าไปในห้องที่อยู่ภายในอาคารขนาดใหญ่หลังหนึ่ง ผนังฝั่งหนึ่งแสดงแผนที่ของระบบดาวหลายแห่ง มีอยู่สี่ระบบที่โดดเด่นออกมาจากระบบที่เหลืออย่างเห็นได้ชัดและไม่มีโครงข่ายไฮเปอร์เลนเชื่อมต่อ\n\nเมื่อกลับมาอยู่บนยาน §Yคีเดส§! ได้นำชิ้นส่วนใหม่ล่าสุดไปวางข้าง ๆ ชิ้นส่วนเก่า มันส่งเสียงครางเบา ๆ และดึงดูดเข้าหากันอย่างเห็นได้ชัดก่อนจะหลอมรวมกัน ดูเหมือนว่าโบราณวัตถุจะแข็งแกร่งขึ้นแล้ว"
 paragon.3127.a:0 "เป็นข่าวดีอย่างยิ่ง"

 paragon.3130.name:1 "วิสัยทัศน์ที่ยั่งยืน" # Ship Graveyard
 paragon.3130.desc:1 "เช่นเดียวกับภาพนิมิตของ §Yคีเดส§! เราได้สังเกตเห็นสุสานยานอวกาศบนดาวเคราะห์ในระบบดาว $NAME_Ivusheh$"
 paragon.3130.a:1 "เตรียมพร้อมสำหรับการสำรวจ"
 LEGENDARY_LEADER_SHIP_PLANET_PROJECT:0 "การสำรวจสุสานยานอวกาศ"
 LEGENDARY_LEADER_SHIP_PLANET_PROJECT_DESC:1 "มีการสังเกตพบสุสานยานอวกาศที่คล้ายคลึงกับภาพนิมิตของ §Yคีเดส§! อย่างน่าขนลุกบนดาวเคราะห์ในระบบ $NAME_Ivusheh$\n\n§Rโครงการพิเศษนี้จะต้องได้รับการวิจัยโดยตัว §Yคีเดส§! เองเท่านั้น§!"
 paragon.3131.name:0 "การสำรวจสุสานยานอวกาศ"
 paragon.3131.desc:1 "พื้นผิวที่แตกหักของดาวเคราะห์เกลื่อนกราดไปด้วยเศษซากยานอวกาศที่ผุพัง ณ ใจกลางของพื้นที่เศษซากที่ใหญ่ที่สุด §Yคีเดส§! ได้พบกับซากโครงสร้างของสถานีดาวฤกษ์ขนาดใหญ่ยักษ์\n\nด้วยพลังงานดึงดูดอันมหาศาลเกินต้านทานของสิ่งที่นำพา §Yคีเดส§! มาที่ดาวดวงนี้ ได้ดึงเขาเข้าไปยังห้องเดียวภายในสถานี ท่ามกลางตู้สินค้าที่ปกคลุมด้วยฝุ่นหนา มีชิ้นส่วนอีกชิ้นหนึ่งของโบราณวัตถุรออยู่\n\nเมื่อเขาสัมผัสกับชิ้นส่วนที่พบใหม่นี้ §Yคีเดส§! ก็ดิ่งลงสู่นิมิตอื่นทันที"
 paragon.3131.a:1 "ครั้งนี้เขาเห็นอะไร?"
 paragon.3132.name:0 "วิญญาณ ใน อดีต" #vision
 paragon.3132.desc:1 "ฐานทัพอวกาศอันกว้างใหญ่โคจรรอบดาวเคราะห์ จากอู่ต่อเรือของมันมีขบวนเรือรบประจัญบานหลั่งไหลออกมาไม่สิ้นสุด\n\nบนดาดฟ้าเรือของเรือธง นายพลเรือหนุ่มคนหนึ่งยืนอยู่ มือหนึ่งกำวัตถุที่คล้ายกับโบราณวัตถุชิ้นนั้นไว้ ด้วยการสะบัดข้อมือของเขา อวกาศภายนอกยานก็พร่ามัว มืดลง แล้วพับเข้าหากันจนเกิดเป็นรูดำ ขณะที่นายพลเรือสั่งให้กองยานของเขาแล่นเข้าไปในความมืด ภาพนิมิตนั้นก็สิ้นสุดลงอย่างกะทันหัน\n\nเมื่อกลับขึ้นยานพร้อมกับชิ้นส่วนโบราณวัตถุ §Yคีเดส§! ได้วางมันไว้ข้างชิ้นส่วนที่มีอยู่เดิม ทั้งสองเริ่มสั่นสะเทือนพร้อมส่งเสียงฮัมแหลมสูง จากนั้น ด้วยพลังลึกลับบางอย่าง ชิ้นส่วนทั้งสองก็หลอมรวมเป็นหนึ่งเดียว หลังจากนั้น ผลของโบราณวัตถุดูเหมือนจะแข็งแกร่งขึ้น"
 paragon.3132.a:0 "ข่าวดีอย่างยิ่ง"

 paragon.3135.name:0 "โบราณวัตถุที่ได้รับการบูรณะ"
 paragon.3135.desc:1 "หลังจากกู้คืนชิ้นส่วนสุดท้ายได้แล้ว โบราณวัตถุก็ดูลักษณะเหมือนไม่เคยแตกหักมาก่อน\n\nเมื่อโบราณวัตถุได้รับการบูรณะ การวิจัยเกี่ยวกับจุดประสงค์ของมันก็ดูมีอนาคตและพร้อมที่จะดำเนินต่อไป โครงการพิเศษที่นำโดย §Yคีเดส§! ได้รับการเตรียมการแล้ว"
 paragon.3135.a:0 "ภารกิจที่ต้องให้ความสำคัญเป็นอันดับแรก"
 LEGENDARY_LEADER_OPEN_WORMHOLE_PROJECT:0 "โบราณวัตถุที่ได้รับการบูรณะ"
 LEGENDARY_LEADER_OPEN_WORMHOLE_PROJECT_DESC:1 "ความพยายามในการตอบคำถามรอบตัวโบราณวัตถุที่ได้รับการบูรณะของ §Yคีเดส§! มันเป็นสาเหตุของภาพนิมิตของเขาจริงหรือ? และหากเป็นเช่นนั้น มันยังมีพลังอื่นใดอีก?"
 paragon.3140.name:0 "การวิจัยโบราณวัตถุ"
 paragon.3140.desc:1 "การวิจัยเกี่ยวกับโบราณวัตถุที่เพิ่งได้รับการบูรณะนี้นำไปสู่การค้นพบที่น่าสนใจบางอย่าง\n\nความเชื่อมโยงของมันกับ §Yคีเดส§! ได้รับการยืนยันแล้ว เมื่อสัมผัสกับดีเอ็นเอชาวภาษาวาโกรเชียนของเขา อนุภาคของโบราณวัตถุจะเริ่มสั่นพ้องด้วยความถี่สูง แม้ว่ากลไกเบื้องหลังเรื่องนี้จะยังไม่เป็นที่รู้จัก แต่ผลลัพธ์ที่ได้ก็เป็นอาการของการบิดเบือนมิติกาลอวกาศ\n\nหลังจากพยายามวัดและควบคุมกระบวนการนี้อยู่หลายครั้ง §Yคีเดส§! ก็ได้เห็นภาพนิมิตอีกครั้ง"
 paragon.3140.a:1 "รายงานมา!"
 paragon.3141.name:0 "กุญแจ"
 paragon.3141.desc:1 "§Yคีเดส§! อธิบายว่าเขาเห็นโบราณวัตถุจากราวกับอยู่ภายใน อนุภาคขนาดเท่าดวงอาทิตย์หมุนวนรอบตัวเขา ในความว่างเปล่าระหว่างนั้น เขาได้สัมผัสกับพลังงานที่พลุ่งพล่าน ด้วยมือเปล่าของเขา เขาสามารถสั่งการการเคลื่อนที่ของทรงกลมต่าง ๆ ได้\n\nเมื่อตื่นจากภาพนิมิตนี้ §Yคีเดส§! ได้วางมือของเขาลงบนโบราณวัตถุ ตอนนี้เขาเข้าใจการใช้งานของมัน และขอบเขตอันน่าทึ่งของพลังของมันแล้ว เมื่อได้รับการควบคุมอย่างเหมาะสม มันจะสามารถทำให้จุดสองจุดในอวกาศยุบตัวเข้าหากัน ส่งผลให้เกิดรูหนอนที่มีเสถียรภาพ ชาวภาษาวาโกรเชียนเรียกอุปกรณ์นี้ว่า §Yกุญแจ§!\n\nด้วยแรงกระตุ้นจากการค้นพบของเขา §Yคีเดส§! จึงได้ตัดสินใจเปิดรูหนอนในระบบดาวบ้านเกิดของเราด้วยตัวเอง แม้แต่เขาเองก็ไม่รู้ว่ามันจะนำไปสู่ที่ใด แต่เขายังคงแน่วแน่และเชื่อว่ามันน่าจะเป็นบ้านเกิดของประชาชนของเขา"
 paragon.3141.a:0 "มาหาคำตอบกันเถอะ ยิ่งเร็วยิ่งดี"

 paragon.3144.name:0 "กองยานศัตรู!"
 paragon.3144.desc:0 "ที่ปลายอีกด้านของรูหนอนที่เกิดจากโบราณวัตถุคือระบบดาว $NAME_Sursect$ หลังจากเข้าไปได้ไม่นาน เซนเซอร์ของเราก็ตรวจพบกองยานโดรนที่เป็นศัตรู พวกมันดูเหมือนจะคอยเฝ้าดาวเคราะห์ดวงเดียวของระบบดาวนี้ การสแกนในเบื้องต้นบ่งชี้ว่าไม่มีสิ่งมีชีวิตอยู่ในหมู่พวกมัน หรือแม้แต่บนดาวเคราะห์ดวงนั้นเลย\n\n§Yคีเดส§! ยืนยันด้วยความมั่นใจว่าดาวเคราะห์ดวงนั้นคือจุดกำเนิดของประชาชนของเขาอย่างแน่นอน มันต้องมีคำตอบซ่อนอยู่เป็นแน่\n\nตามมาด้วยคำขอจากพวกโดรนเพื่อเปิดช่องทางสื่อสาร"
 paragon.3144.a:0 "เปิดช่องทางการติดต่อ"
 paragon.3145.name:0 "-.-. --- -- .--. .-.. -.--"
 paragon.3145.desc:1 "§Hเมื่อเปิดช่องสัญญาณ เสียงรบกวนที่แหลมสูงก็ผสมปนเปไปกับเสียงสังเคราะห์ของหุ่นยนต์ ในแต่ละรอบของคลื่นเสียงที่ซ้อนทับกัน ความดังของข้อความจะสั่นไหวเป็นระลอกที่ไม่สม่ำเสมอ§!\n\nแรงขับเคลื่อน: การยึดกุญแจ, การละเมิดกฎบัตร\nกุญแจวีราโซเซียนสถานะ: ยังไม่ได้รับการจัดเก็บ\nกฎบัตรจักรวรรดิวีอาโกสหมายเลข 412, สถานะ: ละเว้นไว้ชั่วคราว\n\nการดำเนินการเป้าหมาย: คืนกุญแจ\nการตอบโต้: ทำลายเป้าหมาย"
 paragon.3145.a:0 "โบราณวัตถุชิ้นนี้เป็นของเรา ไปหาทางอื่นซะ"
 paragon.3145.b:1 "มอบกุญแจให้พวกมันไป ความปลอดภัยของเราต้องมาก่อน"
 paragon.3146.name:0 "... -- .- .-. -"
 paragon.3146.desc:1 "§Hเสียงแตกพร่าของเสียงประดิษฐ์ช้าลง หยุดชะงักไปชั่วขณะ แล้วจึงดังต่อ§!\n\nกุญแจวีราโซเซียนสถานะ: ใกล้จัดเก็บเสร็จสิ้น\nกฎบัตรจักรวรรดิวีอาโกสหมายเลข 412, สถานะ: ละเว้นไว้ชั่วคราว\n\nการดำเนินการ: รอ"
 paragon.3146.a:1 "ฟังดูมีหวังนะ"

 paragon.3147.name:0 "สูญเสียโบราณวัตถุ"
 paragon.3147.desc:1 "หลังจากส่งมอบกุญแจให้กองยานแล้ว พวกโดรนก็จากไปทันทีผ่านรูหนอนของพวกมันเอง\n\nหลังจากนั้น รูหนอนก็ปิดตัวลงตามหลังพวกมัน ตอนนี้เรามีอิสระที่จะสำรวจระบบดาวนี้และดาวเคราะห์ของมันแล้ว"
 paragon.3147.a:1 "เราเลือกถูกต้องแล้ว"

 LEGENDARY_LEADER_SABOTAGE_FLEET_PROJECT:0 "แม่เหล็กไฟฟ้า"
 LEGENDARY_LEADER_SABOTAGE_FLEET_PROJECT_DESC:1 "โครงการพิเศษที่ริเริ่มโดย §Yคีเดส§! เพื่อปลดเปลื้องพวกโดรนในระบบดาว $NAME_Sursect$ ออกจากการเฝ้ายาม\n\nเขามีแผนจะส่งสนามแม่เหล็กไฟฟ้าไปรบกวนเพื่อทำลายแหล่งพลังงานของพวกมัน ผลลัพธ์ที่สำเร็จควรจะช่วยให้เราสามารถเข้าถึงดาวเคราะห์ในระบบนี้ได้"
 paragon.3148.name:0 "ความสำเร็จของแม่เหล็กไฟฟ้า"
 paragon.3148.desc:1 "เราได้ยิงคลื่นแม่เหล็กไฟฟ้าซึ่งเผาวงจรของพวกโดรนจนไหม้เกรียม\n\nตอนนี้เรามีอิสระที่จะสำรวจระบบดาว $NAME_Sursect$ และดาวเคราะห์ของมันแล้ว"
 paragon.3148.a:1 "ภารกิจที่ประสบความสำเร็จ"

 paragon.3149.name:0 "โดรนถูกทำลาย"
 paragon.3149.desc:1 "แม้ว่าพวกโดรนจะพ่ายแพ้ แต่ผู้สร้างพวกมันก็ทำให้แน่ใจว่าไม่มีใครจะได้รับประโยชน์จากการทำลายล้างครั้งนี้ พวกโดรนได้เริ่มกระบวนการทำลายตัวเองเพื่อตอบโต้การโจมตีของเรา ชิ้นส่วนที่เหลืออยู่เพียงน้อยนิดแทบจะไม่สามารถนำมากู้คืนเพื่อใช้งานได้เลย\n\nอย่างไรก็ตาม ตอนนี้เราก็มีอิสระที่จะสำรวจระบบดาว $NAME_Sursect$ และดาวเคราะห์ของมันแล้ว"
 paragon.3149.a:1 "นี่ยังถือเป็นชัยชนะอยู่"

 paragon_legendary_leader_homeworld:0 "ซากปรักหักพังของชาวภาษาวาโกรเชียน"
 paragon_legendary_leader_homeworld_desc:1 "ดาวเคราะห์ที่พวกโดรนคอยปกป้องอยู่นั้นถูกล็อกด้วยแรงไทดัล โดยด้านหนึ่งจะหันเข้าหาความมืดมิดอันหนาวเหน็บของอวกาศ และอีกด้านหนึ่งอาบไปด้วยแสงสว่างตลอดกาล บนซีกโลกที่อบอุ่นและเต็มไปด้วยแสงสว่างนี้ เราได้ค้นพบซากปรักหักพังของสิ่งที่อาจเคยเป็นเมืองของชาวภาษาวาโกรเชียน\n\n§Yคีเดส§! เชื่อมั่นว่ารายละเอียดในอดีตของเขาถูกฝังอยู่ที่นี่ และหวังว่าการค้นพบนี้จะช่วยเปิดเผยประวัติศาสตร์ของดาวเคราะห์ดวงนี้\n\n§Rพื้นที่แห่งนี้จะต้องได้รับการขุดค้นโดย §Yคีเดส§! เองเท่านั้น§!"
 paragon.3150.name:0 "ศูนย์กลางอำนาจ?"
 paragon.3150.desc:0 "ดาวเคราะห์ดวงนี้ต้องมีบทบาทสำคัญในสังคมของชาวภาษาวาโกรเชียนในช่วงเริ่มต้นของการขุดค้น เป็นที่ประจักษ์ชัดว่าโครงสร้างพื้นฐานส่วนใหญ่มีศูนย์กลางอยู่ที่งานด้านการบริหาร โดยเมืองนี้น่าจะทำหน้าที่เป็นศูนย์กลางการสื่อสาร มีสถานที่สำหรับการรวมตัวของเหล่าผู้นำอย่างเหลือเฟือ และจัตุรัสสาธารณะขนาดมหึมาหลายแห่งก็ได้ถูกขุดพบแล้ว"
 paragon.3150.a:0 "มีอนาคตดี"
 paragon.3151.name:0 "ห้องนิรภัยใต้ดิน"
 paragon.3151.desc:1 "ด้วยการค้นพบห้องนิรภัยใต้ดินโดยบังเอิญ §Yคีเดส§! จึงไม่ได้นอนมาหลายวันแล้ว เขามั่นใจว่าสถานที่แห่งนี้คือกุญแจสำคัญสู่การมีอยู่ของเขา\n\nลึกลงไปในห้องนิรภัย เขาได้พบกับตู้นอนจำศีลเรียงรายเป็นแถว ซึ่งทั้งหมดว่างเปล่า วงจรไฟฟ้าที่ฝังอยู่ในพื้นนำไปสู่โครงสร้างที่ใหญ่กว่า นั่นคือ แท่นที่มีลักษณะคล้ายบัลลังก์ตรงใจกลางของห้องนิรภัย"
 paragon.3151.a:0 "น่าสนใจยิ่ง มันมีจุดประสงค์อะไรกันแน่?"
 paragon.3152.name:0 "ภาพนิมิตอันรุนแรง"
 paragon.3152.desc:0 "แม้จะถูกคัดค้านจากทีมวิทยาศาสตร์ แต่ §Yคีเดส§! ก็ตัดสินใจนั่งลงบนเครื่องจักรที่มีลักษณะคล้ายบัลลังก์นั้น\n\nทันทีที่เขานั่งลง เขาก็หมดสติไป\n\nแม้ในยามที่สีหน้าของเขาผ่อนคลายลง ร่างกายของเขาก็กลับมีอาการชักกระตุกอย่างรุนแรง ไม่ว่าทีมวิทยาศาสตร์จะพยายามอย่างไรก็ไม่สามารถดึงเขาออกจากบัลลังก์ได้ เวลาผ่านไปหลายชั่วโมง ในที่สุด เมื่อดูเหมือนว่าร่างกายวัยหนุ่มของเขาจะไม่สามารถทนได้อีกต่อไปคีเดสก็ตื่นขึ้นมา รายงานของเขากำลังจะตามมา"
 paragon.3152.a:0 "ใจกล้าเหมือนเคย"
 paragon.3153.name:0 "รายงานนิมิตครั้งแรก"
 paragon.3153.desc:0 "§Yคีเดส§! เห็นจัตุรัสสาธารณะแห่งหนึ่ง ที่ซึ่งมีผู้คนนับพันหรืออาจจะหลายแสนคนเบียดเสียดกันอยู่ภายใน\n\nใบหน้าของพวกเขาร่วมหันมองขึ้นไปบนฟ้า เฝ้าดูยานขนาดมหึมาที่กำลังร่อนลงมาจากชั้นบรรยากาศชั้นบน ทันใดนั้น เสียงหนึ่งก็ดังขึ้นกึกก้อง\n\n'จงฟัง' เสียงนั้นกล่าว 'เพราะเวลาแห่งการพิพากษามาถึงแล้ว กุญแจจะถูกยึดไป พวกเจ้าจะต้องอยู่ที่นี่ จนกว่าจะถึงจุดจบของทุกสิ่ง'\n\nเสียงกรีดร้องของผู้คนดังก้องจนแสบหู ในท่ามกลางภาพนิมิตนั้นคีเดสเข้าใจว่าโลกของเขาได้ถูกทอดทิ้งแล้ว นายเหนือหัวของพวกเขาซึ่งเป็นเผ่าพันธุ์นอกโลกที่มีพลังเกินจินตนาการ ได้ประเมินว่าคนของเขาขาดคุณสมบัติ กุญแจ (และรูหนอนที่มีเสถียรภาพที่พวกมันสร้างขึ้น) เป็นสิ่งเดียวที่เชื่อมโยงโลกของเขากับกาแล็กซีอันกว้างใหญ่ เมื่อถูกตัดขาดจากการค้าในระดับกาแล็กซี รากฐานความมั่งคั่งของประชาชนของเขาจึงสูญสิ้นไปในทันทีและไม่อาจกู้คืนได้"
 paragon.3153.a:0 "เป็นการลงโทษที่รุนแรงยิ่ง"
 paragon.3154.name:0 "รายงานนิมิตครั้งที่สอง"
 paragon.3154.desc:1 "ด้วยความเมตตา ชาวภาษาวาโกรเชียนได้รับเวลาหนึ่งเดือนในการส่งมอบกุญแจและวัสดุที่เกี่ยวข้องทั้งหมด แต่ในความเป็นจริงแล้ว มันคือการดูถูกมากกว่าความเมตตา และไม่เพียงพอที่จะช่วยชีวิตพวกเขาได้เลย ในฐานะที่เป็นโลกด้านการบริหาร ดาวเคราะห์ดวงนี้ไม่มีทรัพยากรที่จะเลี้ยงดูประชากรจำนวนมหาศาลได้ สิ่งที่ดีที่สุดที่พวกเขาทำได้คือการปันส่วนสิ่งที่มีอยู่เพื่อยื้อเวลาการอดอยากออกไป ซึ่งนายเหนือหัวนอกโลกของพวกเขาก็ตระหนักดีถึงเรื่องนี้\n\nอย่างไรก็ตาม แม้ในยามสิ้นหวัง เหล่าผู้นำของดาวเคราะห์ดวงนี้ก็ยังคิดแผนการขึ้นมา การบุกเบิกเทคโนโลยีการแช่แข็งจำศีลขั้นสูงและพันธุศาสตร์เมื่อไม่นานมานี้ได้มอบโอกาสที่เหลือเชื่อให้กับพวกเขา"
 paragon.3154.a:0 "แสดงว่าพวกเขาจะไม่ยอมแพ้ง่าย ๆ น่าชื่นชมยิ่ง"
 paragon.3155.name:0 "จุดสิ้นสุดของภาพนิมิต"
 paragon.3155.desc:0 "ในขณะที่แผนการเอาชีวิตรอดของชาวภาษาวาโกรเชียนเริ่มดำเนินการ ตู้จำศีลที่บรรจุร่างของ §Yคีเดส§! ผู้ที่จะมาเป็น 'ทายาท' ของพวกเขาก็ถูกส่งออกสู่อวกาศ - พร้อมกับเศษเสี้ยวของกุญแจชิ้นสุดท้าย ซึ่งถูกแบ่งออกเป็นสี่ชิ้นและกระจัดกระจายไปทั่วกาแล็กซีเพื่อหลบเลี่ยงการตรวจจับคีเดสเกิดมาโดยไม่มีพ่อแม่ เขาเป็นผลผลิตจากการวิศวกรรมพันธุศาสตร์ ความทรงจำของคนในเผ่าพันธุ์ของเขาถูกเข้ารหัสไว้ในดีเอ็นเอของเขาเอง เมื่อเขาเติบโตเต็มที่ การได้สัมผัสกับกุญแจจะช่วยให้เขาสามารถเข้าถึงความทรงจำเหล่านี้ได้ในรูปแบบของภาพนิมิต\n\nควบคู่ไปกับแผนการนี้ เหล่าผู้นำของดาวเคราะห์ยังได้สั่งให้สร้างตู้นอนจำศีลหลายพันตู้และห้องใต้ดินขนาดใหญ่เพื่อเก็บรักษาตู้เหล่านั้น ที่นั่น สมองที่ชาญฉลาดที่สุดของชาวภาษาวาโกรเชียนจะได้หลับใหลเพื่อรอคอยการกลับมาของทายาท และพวกเขาก็รอคอยเช่นนั้น จนกระทั่งระบบจำศีลไม่สามารถพยุงร่างกายของพวกเขาได้อีกต่อไป จิตใจที่ถูกแปลงเป็นข้อมูลดิจิทัลจึงรอคอยทายาทของพวกเขาอยู่ภายในบัลลังก์แห่งนี้"
 paragon.3155.a:0 "จุดจบอันน่าเศร้า"
 paragon.3156.name:0 "การขุดค้นสิ้นสุดลง"
 paragon.3156.desc:0 "เพื่อไม่ให้การเสียสละของพวกเขาต้องสูญเปล่า §Yคีเดส§! จึงได้นั่งลงบนบัลลังก์ของทายาทอีกครั้ง ครั้งนี้มันเป็นเหตุการณ์ที่สั้นกว่าและน่าตื่นเต้นน้อยกว่า ความทรงจำของบรรพบุรุษไหลเข้าสู่ตัวเขาด้วยความสงบราวกับสายน้ำที่ไหลเอื่อย\n\nเมื่อได้รับความรู้และความทรงจำของบรรพบุรุษแล้ว การขุดค้นก็เสร็จสิ้นลงในเวลาสั้น ๆ ขั้นตอนต่อไปของคีเดสคือการประมวลผลข้อมูลทั้งหมดที่ได้รับมาแล้วกลับมารายงานผล"
 paragon.3156.a:0 "ดี เราจะรอฟังรายงานของเขา"

 paragon.3160.name:0 "รายงานการขุดค้นของชาวภาษาวาโกรเชียน"
 paragon.3160.desc:0 "§Hไหล่ของคีเดสลู่ลง ความกระฉับกระเฉงตามปกติของเขาลดลง ดูเหมือนว่าเหตุการณ์ต่าง ๆ ที่เพิ่งเกิดขึ้นจะสร้างความเหนื่อยล้าให้กับเขา ถึงกระนั้น เขาก็ยังคงยิ้มอย่างผ่อนคลาย§!\n\nผมได้คำตอบของผมแล้ว มันอาจจะทั้งหวานและขมขื่น แต่ผมก็ดีใจที่ได้รู้มันครับ"
 paragon.3160.a:0 "คุณทำให้บรรพบุรุษของคุณภูมิใจแล้ว"
 paragon.3160.a.response:0 "ผมทำได้เพียงพยายามใช้ชีวิตให้ตอบสนองความคาดหวังของพวกเขา มันเป็นความรับผิดชอบที่ยิ่งใหญ่ แต่ผมก็ยอมรับมันด้วยความเต็มใจครับ"
 paragon.3160.b:0 "แล้วเรื่องกุญแจล่ะ?"
 paragon.3160.b.response:0 "อ๋อ มันได้รับการฟื้นฟูและใช้งานได้เต็มรูปแบบแล้วครับ นักฟิสิกส์ของเราควรจะได้รับประโยชน์อย่างมากจากการวิจัยต่อไป\n\n§Hคีเดสละสายตาลงครู่หนึ่ง§!\n\nอย่างไรก็ตาม น่าเสียดายที่พลังงานเต็มรูปแบบของมันได้สูญหายไป การจะเปิดรูหนอนที่เสถียรได้นั้น จำเป็นต้องมีระบบเป้าหมายที่ฝั่งปลายทาง ซึ่งมีอยู่ระบบหนึ่งบนโลกของบรรพบุรุษของผม แต่น่าเสียดายที่เราไม่มีเครื่องมือในการสร้างมันขึ้นมาใหม่อีกชิ้น"
 paragon.3160.c:0 "แล้วหลังจากนี้ล่ะ? คุณจะทำอย่างไรต่อไป?"
 paragon.3160.c.response:0 "ผมพร้อมรับคำสั่งจากท่านครับ\n\nวิทยาศาสตร์ยังคงเป็นสิ่งที่ผมหลงใหล แม้กระทั่งในตอนนี้ ความทรงจำของบรรพบุรุษมีแต่จะช่วยกระตุ้นความกระหายในการค้นพบของผมเท่านั้น กาแล็กซีนี้เต็มไปด้วยสิ่งมหัศจรรย์ และมีความแตกต่างระหว่างการรู้กับการเห็น ใครจะรู้ล่ะ? เมื่อเวลาผ่านไป ผมอาจจะได้เห็นบ้านเกิดของผมได้รับการฟื้นฟูจากโบราณวัตถุที่เป็นอยู่ในปัจจุบันนี้ก็ได้\n\nแต่ในตอนนี้ ทุกสิ่งที่ผมได้เรียนรู้มาเป็นของท่านแล้ว ผมตั้งตารอที่จะนำบทเรียนจากผู้คนของผมไปประยุกต์ใช้ ตอนนี้ผมเป็นที่ต้องการตัวมากที่สุดที่ไหนครับ?"
 paragon.3160.d:0 "ขอให้วิทยาศาสตร์ยังคงเป็นสิ่งที่คุณหลงใหลต่อไป"
 paragon.3160.d.custom_tooltip:0 "§Yคีเดส§! ยังคงเป็นนักวิทยาศาสตร์"
 paragon.3160.e: "กองกำลังของเราต้องการสติปัญญาของคุณ"
 paragon.3160.e.custom_tooltip: "§Yคีเดส§! กลายเป็นผู้บัญชาการ"
 paragon.3160.f:0 "คุณควรปกครองประชาชนของเรา"
 paragon.3160.f.custom_tooltip:0 "§Yคีเดส§! กลายเป็นเจ้าหน้าที่รัฐ"
 paragon.3160.g:0 "กองทัพยังขาดแคลนความรู้"
 paragon.3160.g.custom_tooltip:0 "§Yคีเดส§! กลายเป็นผู้บัญชาการ"
 paragon.3160.new_focus:0 "§Hคีเดสทำความเคารพ§!\n\nตกลงครับ ผมจะไม่ทำให้ท่านผิดหวัง"

 relic_cant_activate:0 "§Rโบราณวัตถุชิ้นนี้ไม่สมบูรณ์และไม่สามารถเปิดใช้งานได้§!"
 r_wormhole_key_fragment_1:0 "ชิ้นส่วนโบราณวัตถุ (1/4)"
 r_wormhole_key_fragment_1_desc:0 "ถูกพบอยู่ภายในตู้นอนจำศีลของแว่นขยายเรื่องราวของโบราณวัตถุลึกลับชิ้นนี้ยังเป็นที่รู้น้อยมาก"
 r_wormhole_key_fragment_2:0 "ชิ้นส่วนโบราณวัตถุ (2/4)"
 r_wormhole_key_fragment_2_desc:0 "ยังไม่เป็นที่รู้อะไรมากนักเกี่ยวกับชิ้นส่วนโบราณวัตถุเหล่านี้ ไม่ว่าจะเป็นส่วนประกอบหรือจุดประสงค์ของมัน"
 r_wormhole_key_fragment_3:0 "ชิ้นส่วนโบราณวัตถุ (3/4)"
 r_wormhole_key_fragment_3_desc:0 "$r_wormhole_key_fragment_2_desc$"
 r_wormhole_key_fragment_4:0 "โบราณวัตถุที่ได้รับการบูรณะ"
 r_wormhole_key_fragment_4_desc:0 "รอยต่อของเศษชิ้นส่วนหายไปแล้ว ทำให้โบราณวัตถุชิ้นนี้กลับมาสมบูรณ์เต็มประสิทธิภาพ แต่ก็ยังไม่เป็นที่รู้อะไรมากนักเกี่ยวกับส่วนประกอบหรือกลไกการทำงานของมัน"
 paragon_relic_wormhole_key:0 "$r_wormhole_key$"
 r_wormhole_key:0 "กุญแจ"
 r_wormhole_key_desc:0 "ข้อพิสูจน์ถึงมรดกชาวภาษาวาโกรเชียนของแว่นขยายโบราณวัตถุชิ้นนี้มีความสามารถในการพับจุดสองจุดในอวกาศ ทำให้สามารถเดินทางข้ามห้วงอวกาศอันกว้างใหญ่ได้ในเวลาเกือบจะชั่วพริบตา"
 wormhole_key_relic_effect:0 "§Gอนุญาตให้ยานทุกลำกระทำการจัมป์อ้อมทางเชื่อมไฮเปอร์เลนได้§!\n$MOD_SHIP_JUMPDRIVE_COOLDOWN_MULT$: §G-50%§!\n$MOD_SHIP_DISENGAGE_CHANCE_MULT$: §G+75%§!"

