 beholder_ship_button_desc:0 "§Hลงไปที่ดาว§!\nจอดยานลำนี้บนดาวเคราะห์ที่เราเป็นเจ้าของ ซึ่งยานจะกลายเป็นสิ่งปลูกสร้างที่ผิวดาว\n\n§Yม.เสาหินพลังจิต)§!\nจำกัดจำนวนต่อจักรวรรดิ: §Y1/1§!\nผลิต: £sr_zro£ 8.00\nค่าบำรุงรักษา: £energy£25.00\nทรัพยากรจากประชากรที่มีพลังจิต: §G+10%§!\n\n$beholder_decisions$"
