l_english:
 TIME_CONTROLS_TITLE:0 "ตัวควบคุมเวลา"
 TIME_CONTROLS_DESC:1 "ขณะนี้เกมหยุดอยู่ เลือกที่นี่เมื่อคุณพร้อมจะเริ่มต้นทุกอย่าง"
 OUTLINER_TITLE:0 "แถบสรุป"
 OUTLINER_DESC:1 "ขยายแถบสรุปเพื่อดูภาพรวมว่าสิ่งใดกำลังเกิดขึ้นในจักรวรรดิของคุณ ณ ขณะนั้น มันจะแสดงดาวเคราะห์ ยาน และโปรเจกต์ที่กำลังดำเนินอยู่ทั้งหมดในจักรวรรดิ"
 RESOURCE_PANEL_TITLE:0 "แผงทรัพยากร"
 RESOURCE_PANEL_DESC:0 "ในแผงนี้ คุณจะเห็นทรัพยากรสำคัญทั้งหมดของจักรวรรดิ"
 MENU_PANEL_TITLE:0 "แผงเมนู"
 MENU_PANEL_DESC:1 "ในแผงนี้ คุณสามารถเข้าถึงเมนูหลักทั้งหมด เช่น เทคโนโลยี ประเพณี นโยบาย และผู้ออกแบบยาน"
 GOVERNMENT_VIEW_TITLE:0 "หน้าต่างจักรวรรดิ"
 GOVERNMENT_VIEW_DESC:1 "นี่จะเปิดหน้าต่างจักรวรรดิของคุณ ซึ่งให้ภาพรวมทั่วไปของจักรวรรดิ"
 GALAXY_VIEW_TITLE:0 "มุมมองกาแล็กซี"
 GALAXY_VIEW_DESC:1 "มุมมองกาแล็กซีให้ภาพรวมของกาแล็กซีและตำแหน่งของจักรวรรดิคุณภายในนั้น เหมาะสำหรับการใช้งานส่วนใหญ่ของคุณ"
 TUTORIAL_MISSION_VIEW_TITLE:0 "ภารกิจ"
 TUTORIAL_MISSION_VIEW_DESC:0 "หน้าต่างภารกิจให้ภาพรวมขององค์ประกอบหลักของสเตลาริสและช่วยให้คุณรู้ว่าควรทำอะไรต่อไป"
 TUTORIAL_MISSION_VIEW_TITLE_HUDONLY:0 "เมนูช่วยเหลือ"
 TUTORIAL_MISSION_VIEW_DESC_HUDONLY:0 "คุณสามารถเข้าถึงบทสอนอินเทอร์เฟซผู้ใช้ฉบับเต็มและวิกิของเกมได้จากเมนูช่วยเหลือเสมอ"

 OUTLINER__SECTORS_TITLE:0 "เซกเตอร์"
 OUTLINER__SECTORS_DESC:0 "เซกเตอร์คือเขตการปกครองภายในจักรวรรดิ ซึ่งประกอบด้วยดาวเคราะห์อาณานิคมหลายดวง เซกเตอร์สามารถได้รับมอบหมาย §Sผู้ว่า§! และ §Sการโฟกัสส่วน§! เพื่อให้มันพัฒนาตัวเองไปยังทิศทางที่กำหนดโดยอัตโนมัติ ลดความจำเป็นในการบริหารอย่างต่อเนื่อง"
 OUTLINER__MILITARY_FLEETS_TITLE:0 "กองยานทหาร"
 OUTLINER__MILITARY_FLEETS_DESC:0 "ใช้ยานในกองยานของคุณเพื่อปกป้องจักรวรรดิ หรือเพื่อพิชิตศัตรู"
 OUTLINER__CIVILIAN_SHIPS_TITLE:0 "ยานพลเรือน"
 OUTLINER__CIVILIAN_SHIPS_DESC:0 "ใช้ยานเหล่านี้สำรวจระบบดาวใกล้เคียงและสร้างโครงสร้างใหม่ภายในนั้น"

 RESOURCE_PANEL__EMPIRE_MANAGEMENT_TITLE:0 "การบริหารจักรวรรดิ"
 RESOURCE_PANEL__EMPIRE_MANAGEMENT_DESC:0 "จักรวรรดิขนาดใหญ่นั้นบริหารได้ยาก ดังนั้นจงจับตาตัวชี้วัดเหล่านี้ไว้เมื่อจักรวรรดิของคุณเติบโตขึ้น"
 RESOURCE_PANEL__FLEET_MANAGEMENT_TITLE:1 "การบริหารฐานดาวและกองยาน"
 RESOURCE_PANEL__FLEET_MANAGEMENT_DESC:0 "จำนวนฐานดาวและยานที่คุณสามารถรองรับได้อย่างมีประสิทธิภาพ"

 CONTROL_GROUPS_TITLE:0 "กลุ่มควบคุม"
 CONTROL_GROUPS_DESC:1 "คุณสามารถสร้างทางลัดให้วัตถุส่วนใหญ่ได้โดยเลือกวัตถุนั้นแล้วกด Ctrl พร้อมตัวเลข (เช่น Ctrl 5)หากต้องการลบทางลัด ให้เลือกขวาที่กลุ่มที่เลือก"
 MAP_MODES_TITLE:0 "โหมดแผนที่"
 MAP_MODES_DESC:0 "โหมดแผนที่เป็นวิธีที่ยอดเยี่ยมในการแสดงข้อมูลสำคัญเกี่ยวกับจักรวรรดิที่เลือก โหมดแผนที่ที่มีได้แก่: กราฟิกเซกเตอร์ ไฮเปอร์เลน สหภาพการเมือง จักรวรรดิ การทูต ความเห็น ทัศนคติ AI และเพื่อนบ้านใกล้ชิด"

 SHOW_MORE:0 "แสดงเพิ่มเติม"

 HUD_TUTORIAL_CLOSE_CONFIRMATION_TITLE:0 "ออกจากบทสอนขนาด HUD"
 HUD_TUTORIAL_CLOSE_CONFIRMATION_DESC:0 "คุณแน่ใจหรือไม่ว่าต้องการออกจากบทสอน HUD?คุณสามารถเข้าถึงมันได้ผ่านทาง §Sหน้าต่างช่วยเหลือ§!"


 MENU_PANEL__CONTACTS_TITLE:0 "ผู้ติดต่อ"
 MENU_PANEL__CONTACTS_DESC:1 "เปิดรายชื่อจักรวรรดิและสิ่งมีชีวิตต่างดาวทั้งหมดที่รู้จักในกาแล็กซี"
 MENU_PANEL__SITUATION_LOG_TITLE:0 "บันทึกสถานการณ์"
 MENU_PANEL__SITUATION_LOG_DESC:0 "เปิดบันทึกของเหตุการณ์และโปรเจกต์พิเศษทั้งหมดที่กำลังดำเนินอยู่"
 MENU_PANEL__MARKET_TITLE:0 "ตลาด"
 MENU_PANEL__MARKET_DESC:0 "ให้คุณขายทรัพยากรส่วนเกินและซื้อสิ่งที่คุณอาจกำลังขาด"
 MENU_PANEL__PLANETS_AND_SECTORS_TITLE:0 "ดาวเคราะห์และเซกเตอร์"
 MENU_PANEL__PLANETS_AND_SECTORS_DESC:1 "เปิดภาพรวมของดาวเคราะห์ ผู้นำ และฝ่ายต่างๆ ภายในจักรวรรดิ"
 MENU_PANEL__EXPANSION_PLANNER_TITLE:0 "เครื่องมือวางแผนการขยายอาณานิคม"
 MENU_PANEL__EXPANSION_PLANNER_DESC:0 "ช่วยให้คุณวางแผนโครงการตั้งอาณานิคมครั้งถัดไปได้"
 MENU_PANEL__POLICIES_TITLE:0 "นโยบาย"
 MENU_PANEL__POLICIES_DESC:1 "เปิดหน้าต่างนโยบาย ซึ่งคุณสามารถตรวจสอบและเปิดใช้นโยบายของจักรวรรดิได้"
 MENU_PANEL__EDICTS_TITLE:0 "กฤษฎีกา"
 MENU_PANEL__EDICTS_DESC:1 "เปิดหน้าต่างกฤษฎีกา ซึ่งคุณสามารถตรวจสอบและเปิดใช้กฤษฎีกาของจักรวรรดิได้"
 MENU_PANEL__TRADITIONS_AND_RELICS_TITLE:0 "การบริหารสังคม"
 MENU_PANEL__TRADITIONS_AND_RELICS_DESC:0 "ให้คุณกำหนดเส้นทางอันเป็นเอกลักษณ์ของจักรวรรดิผ่านประเพณี"
 MENU_PANEL__SHIP_DESIGNER_TITLE:0 "ผู้ออกแบบยาน"
 MENU_PANEL__SHIP_DESIGNER_DESC:0 "เปิดผู้ออกแบบยาน ซึ่งคุณสามารถสร้างแบบยานกำหนดเองได้"
 MENU_PANEL__FLEET_MANAGER_TITLE:0 "ผู้จัดการกองยาน"
 MENU_PANEL__FLEET_MANAGER_DESC:0 "ให้คุณจัดการ สร้าง และอัปเกรดยานทหารของคุณ"
 MENU_PANEL__TECHNOLOGY_TITLE:0 "เทคโนโลยี"
 MENU_PANEL__TECHNOLOGY_DESC:0 "เปิดหน้าต่างเทคโนโลยี ซึ่งคุณสามารถวิจัยความก้าวหน้าทางเทคโนโลยีได้"
 MENU_PANEL__FACTIONS_TITLE:0 "ฝ่าย"
 MENU_PANEL__FACTIONS_DESC:0 "เปิดหน้าต่างฝ่าย ซึ่งแสดงฝ่ายการเมืองปัจจุบันภายในจักรวรรดิ"
 MENU_PANEL__CLAIMS_TITLE:0 "สิทธิอ้างกรรมสิทธิ์"
 MENU_PANEL__CLAIMS_DESC:0 "ให้คุณสร้างสิทธิอ้างกรรมสิทธิ์ต่อระบบต่างๆ ได้ สิทธิอ้างกรรมสิทธิ์สามารถใช้เป็นเหตุผลในการทำสงครามกับจักรวรรดิอื่น"
 MENU_PANEL__SPECIES_TITLE:0 "สายพันธุ์"
 MENU_PANEL__SPECIES_DESC:1 "ดูรายชื่อสายพันธุ์ในจักรวรรดิของคุณ"
 MENU_PANEL__LEADERS_TITLE:0 "ผู้นำ"
 MENU_PANEL__LEADERS_DESC:0 "เปิดภาพรวมของผู้นำภายในจักรวรรดิของคุณ และหน้าจอนี้ยังให้คุณจ้างผู้นำใหม่ได้ด้วย"
