 MESSAGE_CLONE_ARMY_NO_CLONE_VATS_TITLE:0 "ประชากรกำลังลดลง"
 MESSAGE_CLONE_ARMY_NO_CLONE_VATS:0 "£pop£ §Hประชากรทหารโคลน§! บน $PLANET|Y$ ไม่มีสิ่งใดค้ำจุนพวกเขา หากไม่มี §Yถังโคลนโบราณ§! อย่างน้อยหนึ่งแห่ง พวกเขาจะตายในไม่ช้า"

 clones.4.name:0 "ภาวะเจริญพันธุ์ของโคลน"
 clones.4.desc:0 "เชื่อกันว่าครั้งหนึ่งเราเคยสามารถสืบพันธุ์ได้ด้วยตนเอง\n\nอย่างไรก็ตาม การทดลองเพื่อทวงความสามารถนั้นกลับคืนมาล้มเหลวซ้ำแล้วซ้ำเล่า รวมถึงการทดลองที่ประสบผลสำเร็จกับสิ่งมีชีวิตอื่นบนโลกบ้านเกิดของเราเอง ความก้าวหน้าหยุดนิ่งมาเป็นเวลานาน จนกระทั่งตอนนี้\n\nการค้นพบที่ไม่น่าเป็นไปได้นำความหวังมาให้นักวิทยาศาสตร์ของเรา: รหัสหนึ่งซึ่งซ่อนอยู่ในไบโอโค้ดควอนตัมของ §Yถังโคลนโบราณ§! ภายในบริเวณที่เชื่อกันว่าควบคุมศักยภาพของจีโนมเราในการสืบพันธุ์"

 CLONE_SOLDIER_FERTILITY:0 "รหัสไบโอโค้ด"
 CLONE_SOLDIER_FERTILITY_DESC:0 "โครงการเพื่อถอดรหัสที่เพิ่งค้นพบภายในไบโอโค้ดควอนตัมของ §Yถังโคลนโบราณ§! ความพยายามที่จะพาเราเข้าใกล้การทวงคืนภาวะเจริญพันธุ์ในที่สุด"

 clones.20.name:0 "เชื่อมต่อกับถังโคลนโบราณ"
 clones.20.desc:0 "ด้วยความไม่ย่อท้อของนักวิทยาศาสตร์เรา รหัสที่พบในถังโคลนโบราณได้ถูกถอดออกแล้ว แม้จะขัดต่อระเบียบ เจ้าหน้าที่วิทยาศาสตร์หัวหน้าผู้กระตือรือร้นเกินไปก็ได้เปิดใช้กุญแจที่รหัสนั้นซ่อนไว้\n\nข้อความจากอดีตก้องขึ้นบนหน้าจอ..."

 clones.21.name:0 "เชื่อมต่อกับถังโคลนโบราณ"
 clones.21.desc:0 ""ข้าแบกรับความรู้สึกผิดเอาไว้ ข้าไม่อาจจินตนาการได้ว่าเรื่องราวจะเดินมาถึงจุดนี้ได้อย่างไร แต่แน่แท้คงไม่ใช่เพราะความเมตตาของพี่น้องข้า\n\nข้าช่วยสร้างพวกเจ้าขึ้นมาเพื่อรับใช้ และสำหรับสิ่งนั้น ข้าขออภัย ข้าไม่อาจย้อนสิ่งที่ได้ทำไปแล้วได้ แต่ข้าช่วยเปิดอนาคตของพวกเจ้าได้ แม้พวกเจ้าสมควรได้รับมากกว่านี้ แต่ข้ามีทางให้เลือกสองทาง:\n\nยกเลิกการเปลี่ยนแปลงที่ทำให้พวกเจ้าเป็นหมัน และปลดปล่อยให้พวกเจ้าวิวัฒน์และรุ่งเรืองได้ในที่สุด\n\nหรือปลดล็อกศักยภาพของพวกเจ้ายิ่งขึ้นไปอีก แต่จะบีบคั้นยีนของพวกเจ้าจนถึงขีดจำกัด ทำให้คนรุ่นหลังต้องพึ่งพาเทคโนโลยีเพื่อการสืบพันธุ์ตลอดไป""

 clone_fertility_chain_title:0 "ทางแยกทางพันธุกรรม"
 clone_fertility_chain_desc:0 "รหัสไบโอโค้ดลับที่หนึ่งในผู้สร้างทิ้งไว้ภายในถังโคลนโบราณ ได้เผยให้เราเห็นสองเส้นทาง: ทวงคืนภาวะเจริญพันธุ์และแลกด้วยการสูญเสียพละกำลังบางส่วน หรือสละการสืบพันธุ์ตามธรรมชาติไปตลอดกาลเพื่อก้าวสู่จุดสูงสุดทางพันธุกรรมยิ่งกว่าเดิม"

 CLONE_SOLDIER_UNLOCK_FERTILITY:0 "ภาวะเจริญพันธุ์ของโคลน"
 CLONE_SOLDIER_UNLOCK_FERTILITY_DESC:0 "สายพันธุ์ของเราจะมีประสิทธิภาพน้อยลง แต่จะกลับมาเจริญพันธุ์และมั่นคงพอสำหรับการดัดแปลงพันธุกรรม\n\nผลลัพธ์:\n- ลักษณะ ['trait:trait_clone_soldier_infertile'] จะถูกแทนที่ด้วย ['trait:trait_clone_soldier_fertile']\n- เส้นทางนี้จะทำให้ ['building:building_clone_army_clone_vat', $building_clone_army_clone_vat_plural$] ทั้งหมดถูก §Rรื้อถอน§!"
 CLONE_SOLDIER_UNLOCK_FERTILITY_UTOPIA_DESC: "สายพันธุ์ของเราจะมีประสิทธิภาพน้อยลง แต่จะกลับมาเจริญพันธุ์และมั่นคงพอสำหรับการดัดแปลงพันธุกรรม\n\nผลลัพธ์:\n- ลักษณะ ['trait:trait_clone_soldier_infertile'] จะถูกแทนที่ด้วย ['trait:trait_clone_soldier_fertile']\n- เส้นทางนี้จะทำให้ ['building:building_clone_army_clone_vat', $building_clone_army_clone_vat_plural$] ทั้งหมดถูก §Rรื้อถอน§!\n- ตอนนี้สามารถเลือกความแหลม:['ascension_perk:ap_engineered_evolution'] ได้"
 CLONE_SOLDIER_UNLOCK_FERTILITY_BIOGENESIS_DESC: "สายพันธุ์ของเราจะมีประสิทธิภาพน้อยลง แต่จะกลับมาเจริญพันธุ์และมั่นคงพอสำหรับการดัดแปลงพันธุกรรม\n\nผลลัพธ์:\n- ลักษณะ ['trait:trait_clone_soldier_infertile'] จะถูกแทนที่ด้วย ['trait:trait_clone_soldier_fertile']\n- เส้นทางนี้จะทำให้ ['building:building_clone_army_clone_vat', $building_clone_army_clone_vat_plural$] ทั้งหมดถูก §Rรื้อถอน§!\n- ตอนนี้สามารถเลือกความแหลม:['ascension_perk:ap_engineered_evolution'] ได้"
 CLONE_SOLDIER_UNLOCK_POTENTIAL:0 "ศักยภาพของโคลน"
 CLONE_SOLDIER_UNLOCK_POTENTIAL_DESC:0 "สายพันธุ์ของเราจะมีประสิทธิภาพยิ่งขึ้น แต่จะเป็นหมันตลอดกาลและต่อต้านการดัดแปลงพันธุกรรม\n\nผลลัพธ์:\n- ลักษณะ ['trait:trait_clone_soldier_infertile'] จะถูกแทนที่ด้วย ['trait:trait_clone_soldier_infertile_full_potential']"
 CLONE_SOLDIER_UNLOCK_POTENTIAL_UTOPIA_DESC: "สายพันธุ์ของเราจะมีประสิทธิภาพยิ่งขึ้น แต่จะเป็นหมันตลอดกาลและต่อต้านการดัดแปลงพันธุกรรม\n\nผลลัพธ์:\n- ลักษณะ ['trait:trait_clone_soldier_infertile'] จะถูกแทนที่ด้วย ['trait:trait_clone_soldier_infertile_full_potential']\n- ตอนนี้สามารถเลือกความแหลม:['ascension_perk:ap_engineered_evolution'] ได้"
 CLONE_SOLDIER_UNLOCK_POTENTIAL_BIOGENESIS_DESC: "สายพันธุ์ของเราจะมีประสิทธิภาพยิ่งขึ้น แต่จะเป็นหมันตลอดกาลและต่อต้านการดัดแปลงพันธุกรรม\n\nผลลัพธ์:\n- ลักษณะ ['trait:trait_clone_soldier_infertile'] จะถูกแทนที่ด้วย ['trait:trait_clone_soldier_infertile_full_potential']\n- เส้นทางความจุ['tradition_category:tradition_cloning'] จะได้รับการอัปเกรด\n- §Rเส้นทางความจุ['tradition_category:tradition_purity'] และ ['tradition_category:tradition_mutation'] จะถูกปิดกั้น§!"

 clones.22.name:0 "วันใหม่อุบัติขึ้น"
 clones.22.desc:0 "ภาวะเจริญพันธุ์ของเราได้กลับคืนมาแล้ว และ §Y[Root.GetSpeciesNamePlural]§! รุ่นใหม่ชุดแรกก็ได้ลืมตาดูโลก พวกเขาจะเปลี่ยนอนาคตของเราไปตลอดกาลด้วยลูกหลานของตนเอง บีบให้สังคมของเราต้องเปลี่ยนแปลงและปรับตัวตาม\n\nความจำเป็นของ §Yถังโคลนโบราณ§! ได้หมดสิ้นลงแล้ว และมีการตัดสินใจที่จะรื้อเอาทุกสิ่งที่ยังสามารถนำไปวิจัยต่อได้ออกมา สิ่งที่เหลือจะถูกรีไซเคิลและนำไปใช้ที่อื่น"

 clones.23.name:0 "ศักยภาพสูงสุด"
 clones.23.desc:0 "เหตุใดเราจึงต้องปฏิเสธพลังที่เราได้รับมา? เราไม่จำเป็นต้องรักผู้สร้างเพื่อยอมรับภูมิปัญญาที่พวกเขาเลือกเรา ถังโคลนโบราณเองก็เป็นของขวัญอันทรงพลังเช่นกัน\n\nการโอบรับความแข็งแกร่งของเราเป็นสิ่งที่ดีกว่า และเมื่อ §Y[Root.GetSpeciesNamePlural]§! ชุดแรกเสร็จสมบูรณ์ เราก็แข็งแกร่งกว่าที่เคย สายพันธุ์ที่ถูกทำให้สมบูรณ์ของเราจะรุ่งเรือง"
 clones.23.bio.tt: "อัปเกรดต้นไม้ธรรมเนียม ['tradition_category:tradition_cloning']"

 clones.10.name:0 "จุดกำเนิดที่เป็นข้อถกเถียง"
 clones.10.desc:0 "นับตั้งแต่เราเพิ่งก้าวสู่อวกาศ มุมมองที่แตกต่างกันเกี่ยวกับต้นกำเนิดของเราก็กำลังกลายเป็นรอยแยกอย่างรวดเร็ว กลุ่มหัวรุนแรงดึงดูดโคลนเพิ่มขึ้นอย่างต่อเนื่อง ความเป็นหนึ่งเดียวอันแข็งแกร่งของเรากำลังแตกร้าว\n\nบางฝ่ายมองผู้สร้างเป็นดั่งเทพที่ควรบูชาและเชื่อฟัง และเชื่อว่าเราถูกสร้างขึ้นตามภาพลักษณ์ของพวกเขา พวกเขาไม่ปรารถนาสิ่งใดนอกจากรักษาสภาพเดิมไว้ ขณะที่อีกฝ่ายสาปแช่งนายเก่าโบราณของเรา เรียกพวกเขาว่า 'เจ้าทาส' และต้องการให้พวกเขาชดใช้เต็มที่\n\nมีการตั้งแหล่งขุดค้นบน [Root.Owner.GetHomeWorldName] เพื่อยืนยันข้อเท็จจริงและปิดฉากการถกเถียง ก่อนที่เราจะหันไปสู่ห้วงอวกาศ เราควรใช้ทุกโอกาสใกล้ตัวให้หมดก่อน ชาติของเราเก่าแก่ โคลนหลายชั่วรุ่นเกิดและตายที่นี่ ใต้สิ่งปลูกสร้างโบราณของโลกบ้านเกิดเรา ย่อมมีเบาะแสสำคัญรอคอยอยู่แน่"

 clone_army_digsite:0 "การขุดค้นโลกบ้านเกิด"
 clone_army_digsite_desc:0 "นับตั้งแต่ตื่นรู้ถึงสภาพของตน การไร้ซึ่งอัตลักษณ์และจุดมุ่งหมายก็รุมเร้าสายพันธุ์ของเรา เราประเมินต่ำเกินไปว่ามันจะส่งผลต่อความสามารถของเราในการก้าวต่อไป เพียงแค่ร่วมมือกันก็ยังยาก เราดิ้นรนเพื่อหาฉันทามติ และกระหายคำตอบ\n\nแหล่งขุดค้นนี้ถูกตั้งขึ้นเพื่อค้นหาหลักฐานเกี่ยวกับคำถามที่ถกเถียงกันเรื่องการสร้างสายพันธุ์ของเรา และเพื่อหาจุดตั้งต้นทางความคิดที่จะช่วยรวมเราเป็นหนึ่ง"

 clones.11.name:0 "ประวัติศาสตร์ที่สูญหาย"
 clones.11.desc:0 "แหล่งขุดค้นหลักแห่งหนึ่งสามารถระบุอายุการติดตั้ง §Yถังโคลนโบราณ§! แห่งหนึ่งของเราได้สำเร็จ โดยวิเคราะห์ดินใต้โครงสร้าง — เปรียบเทียบความหนาแน่นและองค์ประกอบกับบริเวณโดยรอบ — และเราได้ข้อประมาณเวลาที่สมเหตุสมผลว่ามันถูกนำมาตั้งไว้เมื่อใด\n\nดูเหมือนว่าพวกเรารุ่นแรก โคลนรุ่นแรก ถูกผลิตขึ้นเมื่อประมาณสิบสองศตวรรษก่อน\n\nประวัติศาสตร์หลายชั่วรุ่นสูญหายไปกับความเฉื่อยชา หลายสิ่งผ่านเราไป และบางทีนั่นอาจเป็นเรื่องน่าเสียดาย"
 clones.12.name:0 "ญาติโบราณ"
 clones.12.desc:0 "หนึ่งในแหล่งขุดค้นรายงานว่าพบซากดึกดำบรรพ์เก่าแก่คล้าย [Root.Owner.GetSpeciesName] เก่ามาก ซากเหล่านี้ถูกพบในและรอบ ๆ ร่องรอยของสิ่งที่เชื่อกันว่าเป็นที่อยู่อาศัยดึกดำบรรพ์ ทั้งซากดึกดำบรรพ์และสถาปัตยกรรมดูจะเก่ากว่าการสร้าง §Yถังโคลนโบราณ§! ของเรากว่าพันปี\n\nการจัดลำดับดีเอ็นเอเบื้องต้นยืนยันความคล้ายคลึงอย่างมีนัยสำคัญระหว่างพันธุกรรมของเรากับสสารฟอสซิลดังกล่าว และได้ข้อสรุปว่าซากเหล่านี้เป็นของบรรพชนโบราณของเรา จากสมัยก่อนที่เราจะเป็นโคลน\n\nเรื่องนี้ทำให้ทุกอย่างชัดเจนขึ้น"
 clones.12.tooltip:0 "ข้อค้นพบนี้คงต้องใช้เวลายอมรับกันสักพัก..."
 clones.13.name:0 "ประวัติศาสตร์ของเรา"
 clones.13.desc:0 "ข่าวการค้นพบจากการขุดค้น ซึ่งพิสูจน์ว่าสายพันธุ์ของเราเคยเป็นชนเผ่าดึกดำบรรพ์บน [Root.GetHomeWorldName] กำลังเริ่มแพร่กระจาย\n\nเป็นเรื่องยากที่จะปฏิเสธข้อสรุปที่เห็นได้ชัด: การดัดแปลงพันธุกรรมสิ่งมีชีวิตดึกดำบรรพ์อย่างบรรพชนของเรา — สายพันธุ์ที่เหมาะกับการทำสงครามอยู่แล้ว — ย่อมมีจุดประสงค์เฉพาะ ผู้สร้างของเราเปลี่ยนเราใหม่เพื่อให้ตายแทนเป้าหมายของพวกเขา พวกเขายกระดับเราเพื่อตอบสนองความต้องการของตน ไม่ใช่เพื่อให้เราเจริญรุ่งเรืองในแบบของเราเอง\n\nนี่คือประวัติศาสตร์ที่เราต้องการให้ผู้คนของเรายึดถือจริงหรือ?\n\nเรายังมีโอกาสมากพอที่จะเขียนอดีตของเราใหม่"
 clones.13.a:0 "ใช่ เราถูกสร้างขึ้นตามภาพของผู้สร้าง"
 clones.13.b:0 "ไม่ เราจะเผชิญหน้าความจริง"

 clones.14.name:0 "บันทึกที่ถูกขุดขึ้นมา"
 clones.14.desc:0 "เมื่อหลายปีก่อน มีการขุดค้นเพื่อค้นหาจุดประสงค์ของการสร้างเรา บทเรียนที่ได้ช่างเจ็บปวด: เราถูกสร้างมาเพื่อรับใช้ เพื่อตายในนามของผู้สร้างของเรา เราเลือกปกป้องประชาชนของเราจากความจริงนั้นด้วยการมอบเรื่องเล่าที่ดีกว่าให้พวกเขา\n\nด้วยการกู้คืนไฟล์ที่ถูกลบจากการขุดค้นเหล่านั้นอย่างยากลำบาก โคลนผู้ต่อต้านคนหนึ่งได้เปิดเผยข้อเท็จจริงที่เราปิดบังไว้ต่อสาธารณะ\n\nอย่างน้อย ผู้กระทำที่ยังไม่ทราบตัวตนรายนี้ก็ไม่ได้บิดเบือนข้อมูลหรือเติมแต่งสิ่งใดลงไป\n\nน่าเสียดาย ดูเหมือนไม่จำเป็นต้องทำเช่นนั้นเลย เพราะข่าวนี้ได้ทำลายความเชื่อในอดีตอันรุ่งโรจน์ของเราอย่างรวดเร็ว — ว่าเราถูกสร้างขึ้นตามภาพของผู้สร้าง เป็นผู้เสมอกันไม่ใช่ทาส — และแทนที่มันด้วยความผิดหวังต่อผู้นำ"
 clones.14.a:0 "น่าเสียดาย"
 clones.14.b:0 "เรื่องนี้ต้องมีคำขอโทษ"
 clones.14.b.custom_tooltip:0 "กล่าวขอโทษต่อประชาชนชาว[Root.Owner.GetAdjective] ต่อสาธารณะ"

 clones.15.name:0 "คำขอโทษต่อสาธารณะ"
 clones.15.desc:0 "มีการเผยแพร่ข้อความวิดีโอที่จัดทำขึ้นอย่างรอบคอบ อธิบายเหตุผลเบื้องหลังเรื่องแต่งดังกล่าว การออกอากาศชี้แจงว่าทำไปด้วยความหวังดี พร้อมย้ำว่าอดีตที่แท้จริงของเราไม่มีสิ่งใดน่าละอาย และเราต้องมองไปยังอนาคต อีกทั้งยังกล่าวถึงความก้าวหน้าสำคัญที่เราได้ทำสำเร็จตั้งแต่เผยแพร่ความเชื่ออันเป็นเท็จนั้น\n\nดูเหมือนว่าข้อความนี้จะได้รับการตอบรับที่ดี แม้ยากจะบอกว่าเหตุการณ์นี้จะทิ้งรอยด่างพร้อยไว้มากเพียงใด ไม่ว่าอย่างไร อิทธิพลที่สูญเสียไปจะค่อย ๆ ฟื้นกลับมา และปัญหานี้ก็ได้ถูกคลี่คลายลงเป็นอย่างอื่นแล้ว"

 clones.16.name:0 "ภาวะผู้นำอันมีเกียรติ"
 clones.16.desc:0 "นายทหารชั้นผู้ใหญ่จำนวนหนึ่งได้ออกมาประกาศต่อสาธารณะว่าพวกเขาเห็นชอบกับจริยธรรมในการนำของเรา\n\nในสารที่เผยแพร่อย่างกว้างขวาง พวกเขาแสดงความเคารพต่อความกล้าหาญและปัญญาที่ทำให้เราเลือกพูดความจริงเกี่ยวกับอดีต และต่อความไว้วางใจที่เรามีต่อพวกเขากับประชาชนชาว[Root.GetAdjective] พวกเขาแข็งแกร่งขึ้นจากความพร้อมของเราที่จะเผชิญหน้ากับอดีต และสิ่งนี้ทำให้พวกเขาเผชิญอนาคตด้วยความกล้าได้\n\nผู้คนทั่วทุกแห่งต่างร่วมเฉลิมฉลองและยกย่องการตัดสินใจนี้"

 debated_origin:0 "จุดกำเนิดที่เป็นข้อถกเถียง"
 debated_origin_desc:0 "สังคมนี้แตกแยกเพราะมีความเชื่อที่แตกต่างกัน"
 meaningful_origin:0 "จุดกำเนิดที่มีความหมาย (คำลวง)"
 meaningful_origin_desc:0 "สังคมนี้ได้รับพลังจากความเชื่อในอดีตอันรุ่งโรจน์และอนาคตที่มีเป้าหมาย"
 honorable_leadership:0 "ภาวะผู้นำอันมีเกียรติ"
 honorable_leadership_desc:0 "สังคมนี้ไว้วางใจในเจตนาของผู้นำอย่างเต็มที่"
 dishonorable_leadership:0 "ภาวะผู้นำอันไร้เกียรติ"
 dishonorable_leadership_desc:0 "สังคมนี้เต็มไปด้วยความสงสัยว่าผู้นำของตนสมควรได้รับความไว้วางใจอย่างเต็มที่หรือไม่"

 modifier_clone_pops_decline:0 "ถังโคลนโบราณไม่เพียงพอ"
 modifier_clone_pops_decline_desc:0 "มีอาคาร £building£ §Y$building_clone_army_clone_vat$§! อยู่ที่นี่ไม่เพียงพอที่จะค้ำจุนประชากรปัจจุบัน"

 # Synced from vanilla by Stellaris Thai Translator.
 # These keys were missing from the mod and should be translated on the next pass.
 START_SCREEN_CLONE_ARMY_NOMADS: "เราถูกสร้างมาเพื่อสงคราม ทหาร ที่ มี เครื่อง ยนต์ เกิด และ เกิด ใหม่ จาก เรือ โคลน อัน เก่า แก่ ที่ อยู่ บน เรือ รบ ของ เรา ซึ่ง ทอด ทิ้ง รา ของ พระ ผู้ สร้าง มา นาน แล้ว. ไม่มีโลกไหนเคยเป็นของเรา ช่องว่างระหว่างดาว เป็นค่ายของเราเสมอ\n\nเรา ไม่ รู้ ว่า เมื่อ ไร หรือ ทําไม นาย ของ เรา จึง ทิ้ง เรา ไว้ กับ ทะเล ลึก. บันทึก ต่าง ๆ ได้ รับ การ ลบ ล้าง อย่าง สม่ําเสมอ ซื่อ สัตย์ ต่อ ระเบียบ วาระ การ ทหาร เป็น ครั้ง สุด ท้าย. แต่สัญชาตญาณการอยู่รอดที่ผิดพลาดบางอย่าง ผลักดันให้เราแสวงหาคําตอบ และกับพวกเขาวัตถุประสงค์ใหม่\n\nนับ แต่ นั้น มา ความ พยายาม ของ เรา ก็ หยุด ชะงัก. ดวงดาวต่อดาวฤกษ์ เรือรบ ขอบฟ้าคงที่เดียวของเรา ขณะ ที่ ขอบ ฟ้า ขยาย ออก ไป เรา ต้อง - ความ รู้, การ เลือก, โอกาส ที่ จะ หลุด พ้น.\n\nเราจะไม่เปลืองสิ่งที่เหล่าหมีของเราทิ้งไว้ เราจะต่อสู้เพื่อผ่านมัน และต่อสู้เพื่อกําจัดโซ่ตรวนของสงครามอื่น\n"
