 origin_clone_army_desc:0 "สายพันธุ์ทหารโคลนอายุสั้นและเป็นหมัน ซึ่งเชี่ยวชาญด้านสงครามอย่างยิ่งยวด ถูกทิ้งไว้โดยไร้นายและโดดเดี่ยว ให้ตั้งคำถามถึงจุดประสงค์ที่ถูกสร้างขึ้นมาและชะตากรรมอันไม่แน่นอนของตน"
 origin_tooltip_clone_army_effects:2 "- โลกบ้านเกิด: ['concept_clone_army_clone_vat'] +2 $NEW_LINE$- ลักษณะสายพันธุ์: ['concept_clone_soldier_infertile']$NEW_LINE$- เทคโนโลยีเพิ่มเติม $TABBED_NEW_LINE$- ['concept_cloning', £society_research£ $tech_cloning$] $TABBED_NEW_LINE$- ['concept_gene_banks', £society_research£ $tech_gene_banks$]"


 trait_clone_soldier_infertile:0 "ทหารโคลน"
 trait_clone_soldier_infertile_desc:0 "§Lถูกออกแบบมาเพื่อการเชื่อฟังและสงคราม: อายุสั้น สืบพันธุ์เองตามธรรมชาติไม่ได้ และมีประสิทธิภาพสูงมาก§!"
 trait_clone_soldier_fertile:0 "ผู้สืบสายทหารโคลน"
 trait_clone_soldier_fertile_desc:0 "§Lครั้งหนึ่งเคยเป็นหมันและถูกสร้างมาเพื่อการเชื่อฟังกับสงคราม ความได้เปรียบทางพันธุกรรมของพวกเขาลดลง แต่บัดนี้มั่นคงพอสำหรับการสืบพันธุ์ตามธรรมชาติ§!"
 trait_clone_soldier_infertile_full_potential:0 "ทหารโคลนผู้ยกระดับ"
 trait_clone_soldier_infertile_full_potential_desc:0 "§Lโคลนที่อยู่ ณ จุดสูงสุดของการออกแบบพันธุกรรม ได้รับการปรับปรุงด้านพละกำลัง ประสิทธิภาพ ความทนทาน และอายุขัยยิ่งขึ้น — แต่จะเป็นหมันตลอดกาล§!"
 leader_trait_clone_army_commander:0 "ผู้บัญชาการกองทัพโคลน"
 leader_trait_clone_army_commander_desc:0 "จากการศึกษาทางทหารอย่างเข้มข้น ผู้นำผู้นี้เข้าใจวิธีรีดประสิทธิภาพทั้งยานและทหารให้ถึงขีดสุด"
 leader_trait_clone_army_full_commander:0 "ผู้บัญชาการกองทัพโคลนผู้ยกระดับ"
 leader_trait_clone_army_full_commander_desc:0 "ถูกฝึกด้วยหลักสูตรการศึกษาทางทหารที่เข้มข้นอย่างยิ่งตั้งแต่ถือกำเนิดจนมีน้อยคนนักจะทนได้ ผู้นำผู้นี้จึงมีความสามารถด้านการรบและการนำที่ยอดเยี่ยม"
 leader_trait_clone_army_fertile_commander:0 "ผู้บัญชาการกองทัพโคลนผู้สืบสาย"
 leader_trait_clone_army_fertile_commander_desc:0 "จากการศึกษาทางทหารเฉพาะทาง ผู้นำผู้นี้มีความเข้าใจวิธีการทางการรบและวิธีเพิ่มประสิทธิภาพให้กับมันเหนือกว่าค่าเฉลี่ย"
 TRAIT_INFERTILE:0 "§Rสืบพันธุ์ตามธรรมชาติไม่ได้§!"
 genelock_trait_tooltip:0 "§Rไม่สามารถดัดแปลงพันธุกรรมได้§!"
 NEEDS_GENE_TAILORING_AND_CLONE_SYNTHESIZATION: "$TRIGGER_FAIL$การดัดแปลงสายพันธุ์นี้ต้องการ:\n- เทคโนโลยี £society£ §Y$tech_gene_tailoring$§!\n- ธรรมเนียม £unity£ §Y$tr_cloning_somatic_synthesization_clone_army$§!"

 disables_clone_army_origin_features:0 "§Rการเลือกความแหลม:นี้จะปิดกลไกจุดกำเนิดกองทัพโคลน§!"
 clone_soldier_locked_genes:0 "$TRIGGER_FAIL$เรายังไม่อาจทำไบโอมอร์โฟซิสได้จนกว่าจะค้นพบศักยภาพทางพันธุกรรมของเรา"

 building_clone_army_clone_vat:0 "ถังโคลนโบราณ"
 building_clone_army_clone_vat_plural: "ถังโคลนโบราณ"
 building_clone_army_clone_vat_desc:0 "เทคโนโลยีที่สาบสูญซึ่งผู้สร้างทิ้งไว้เบื้องหลัง มันสามารถถอดและประกอบกลับได้ แต่ส่วนประกอบภายในและกลไกการทำงานนั้นล้ำหน้าเกินกว่าจะทำซ้ำได้"
 building_clone_army_clone_vat_effect_desc:1 "ประสิทธิภาพของ $MOD_BONUS_POP_GROWTH$ จะลดลงเมื่อ $building_clone_army_clone_vat$ ใกล้ถึงขีดความจุ"
 mod_clone_soldiers_sustained: "จำนวนประชากรทหารโคลนที่รองรับได้"
 mod_fake_pop_growth_mod: "การเติบโตของประชากร"

 START_SCREEN_CLONE_ARMY:0 "พวกเราถูกสร้างมาเพื่อสงคราม! เป็นทหารที่ถูกออกแบบขึ้นซึ่งมีชีวิตและตายไปพร้อมกับถังโคลนโบราณที่ผู้สร้างทิ้งไว้ให้ ติดอยู่ในแบบพิมพ์เดียวกันชั่วกาล ความทรงจำใด ๆ เกี่ยวกับเจ้านายของเราสูญหายไปพร้อมรุ่นก่อนหน้า และเราไม่รู้ว่าพวกเขาจากเราไปเมื่อใดหรือเพราะเหตุใด เป็นไปได้ว่าบันทึกต่าง ๆ ถูกลบเป็นกิจวัตรตามระเบียบทางทหารอย่างเคร่งครัด — แต่เมื่อถึงช่วงไม่กี่ศตวรรษที่ผ่านมา บางอย่างกลับเปลี่ยนไป โดยบังเอิญ หรืออาจเป็นสัญชาตญาณเอาตัวรอดที่ทำงานผิดพลาด จิตใต้สำนึกของเราผลักดันให้เราแสวงหาคำตอบ แสวงหาจุดมุ่งหมายใหม่ และมองหาวิธีหลุดพ้นจากกรอบที่ถูกบังคับใส่เรา\n\nนับแต่นั้น ความพยายามของเราก็ไม่เคยหยุดยั้ง จนท้ายที่สุดได้เปิดทางให้เราเข้าถึงห้วงอวกาศอันกว้างใหญ่ เมื่อเส้นขอบฟ้าของเรากว้างขึ้น ความรู้ของเราก็ต้องกว้างขึ้นตามไปด้วย — และโอกาสที่จะหลุดพ้นของเราก็เพิ่มขึ้นเช่นกัน\n\nเราจะไม่ปล่อยให้ความเป็นไปได้ที่บรรพชนมอบไว้สูญเปล่า เราจะต่อสู้เพื่อส่งต่อความเป็นไปได้นี้ให้โคลนรุ่นถัดไป และต่อสู้เพื่อลบล้างข้อจำกัดที่ถูกกำหนดไว้เหนือเรา\n"

 alert_declining_pops_title:0 "ประชากรกำลังลดลง"
 alert_declining_pops_instant:0 "£pop£ §Hประชากร§! กำลังลดลงบนดาวเคราะห์ต่อไปนี้:"
 CLONE_ARMY_FORCE_DECLINE:0 "§Rมี §Yถังโคลน§! ไม่เพียงพอที่จะค้ำจุนประชากร §Yทหารโคลน§!§!"
