 hallucinogen_removal:0 "กำจัดสารหลอนประสาท"
 hallucinogen_removal_DESC:1 "พยายามกำจัดสารหลอนประสาทออกจากชั้นบรรยากาศของ [Root.GetName]"
 impact_defence_system:0 "ระบบป้องกันดาวเคราะห์น้อย"
 impact_defence_system_DESC:0 "เราต้องสืบหาวิธีที่ดีที่สุดในการปกป้องอาณานิคมบน [Root.GetName] จากการพุ่งชนของดาวเคราะห์น้อยที่เกิดขึ้นบ่อยครั้งและรบกวนดาวดวงนี้"
 titanic_life_study_normal:0 "ศึกษาชีวิตไททานิค"
 titanic_life_study_normal_DESC:1 "ด้วยการศึกษาชีวิตไททานิคบน [Root.GetName] เราอาจเรียนรู้ที่จะเข้าใจพวกมัน และอาจถึงขั้นสื่อสารกันได้"
 titanic_life_study_mean:0 "ชันสูตรชีวิตไททานิค"
 titanic_life_study_mean_DESC:1 "หากเราเก็บเกี่ยวชีวิตไททานิคบน [Root.GetName] เราน่าจะค้นพบได้ในไม่ช้าว่าจะใช้ประโยชน์จากพวกมันได้ดีที่สุดอย่างไร!"
 titanic_life_study_nice:0 "ติดตามชีวิตไททานิค"
 titanic_life_study_nice_DESC:1 "ด้วยการเฝ้าติดตามชีวิตไททานิคบน [Root.GetName] อย่างระมัดระวัง เราหวังว่าจะสามารถอยู่ร่วมกับพวกมันอย่างสันติได้"
 retaliatory_genome_mapping:0 "ทำแผนที่จีโนมตอบโต้"
 retaliatory_genome_mapping_DESC:0 "การส่งยานไปยังโลกบ้านเกิดของมนุษย์ต่างดาวจะทำให้เรารวบรวมข้อมูลเกี่ยวกับพวกมันได้เช่นเดียวกับที่เราสงสัยว่าพวกมันมีต่อเรา"
 woodwind_instrument_investigation:0 "สืบหาที่มาของเครื่องเป่าลมไม้"
 woodwind_instrument_investigation_DESC:1 "เราต้องค้นหาวัสดุต้นกำเนิดของเครื่องดนตรีลึกลับที่ดูเหมือนจะมีผลให้เราผ่อนคลาย"
 disappearing_pops_project:0 "การหายตัวไปบน [missing_pops_planet.GetName]"
 disappearing_pops_project_DESC:0 "เจ้าหน้าที่บังคับใช้กฎหมายท้องถิ่นบน [missing_pops_planet.GetName] ต้องการการสนับสนุนจากกองกำลังจู่โจมทางทหารเพื่อระงับความไม่สงบ ขณะสืบสวนกระแสการหายตัวไปอย่างลึกลับระลอกล่าสุด"
 mystery_cream_project:0 "ไร้กาลเวลา"
 mystery_cream_project_DESC:0 "ครีมชะลอวัยชนิดใหม่อายุกำลังแพร่กระจายไปทั่วจักรวรรดิอย่างรวดเร็ว และแสดงให้เห็นสัญญาณว่ามันสามารถกระตุ้นการฟื้นฟูเซลล์ได้จริง หากเราระบุตัวสารออกฤทธิ์ได้ เราอาจใช้มันสร้างผลลัพธ์ที่ยั่งยืนกว่าเดิม"
 cream_origin_project:0 "ตามล่าหาความไร้ริ้วรอย"
 cream_origin_project_DESC:0 "เราต้องค้นหาต้นกำเนิดของครีมชนิดนี้"
 MAGNETIC_PLANET_RESEARCH_PROJECT:0 "สืบสวนปริศนาแม่เหล็กของ [Root.GetName]"
 MAGNETIC_PLANET_RESEARCH_PROJECT_DESC:0 "ความปั่นป่วนทางแม่เหล็กประหลาดหลายครั้งได้ทำให้สิ่งมีชีวิตบน [Root.GetName] ตื่นตระหนก จนกระทั่งไม่นานมานี้ สาเหตุของมันยังเป็นปริศนาโดยสิ้นเชิง แต่ด้วยข้อมูลที่เก็บได้จากเหตุการณ์ซ้ำๆ เราน่าจะสามารถเปิดเผยความจริงเบื้องหลังมันได้แล้ว"
 ROGUEMOON_PROJECT:0 "สืบสวนดวงจันทร์ลึกลับของ [Root.GetName]"
 ROGUEMOON_PROJECT_DESC:0 "ทำการสำรวจ [event_target:roguemoon.Planet.GetName] อย่างละเอียด และพยายามหาคำตอบว่ามันมาจากไหน"
 DPORTAL_PROJECT:0 "ตรวจสอบประตูมิติบน [Root.GetName]"
 DPORTAL_PROJECT_DESC:0 "สืบสวนว่าประตูมิตินี้นำไปสู่อะไร"
 DPORTAL_PROJECT_SCIENCE:0 "ปิดประตูมิติ!"
 DPORTAL_PROJECT_SCIENCE_DESC:0 "ต้องมีวิธีปิดประตูมิตินี้ และวิทยาศาสตร์จะเป็นผู้ค้นพบมัน!"
 DPORTAL_PROJECT_PRAYER:0 "ปิดประตูมิติ!"
 DPORTAL_PROJECT_PRAYER_DESC:0 "ประตูมิติแบบนี้ย่อมต้องรับมือได้ด้วยพลังงานด้านบวก!"
 DPORTAL_PROJECT_PSI_PRAYER:0 "ปิดประตูมิติ!"
 DPORTAL_PROJECT_PSI_PRAYER_DESC:0 "ประตูมิติแบบนี้ย่อมต้องรับมือได้ด้วยพลังจิต!"
 DPORTAL_PROJECT_ROCKS:0 "ปิดประตูมิติ!"
 DPORTAL_PROJECT_ROCKS_DESC:0 "หรือว่าการทุ่มหินลงไปในประตูมิติมากพอจะอุดมันได้?"
 SNEK_SCIENCE_PROJECT:0 "ใช้วิทยาศาสตร์"
 SNEK_SCIENCE_PROJECT_DESC:1 "วิทยาศาสตร์! เราจะใช้วิทยาศาสตร์! หลังจากการสังเกตอย่างรอบคอบและการประชุมที่เกิดผล เราตั้งใจจะค้นหารูปแบบในพฤติกรรมของเหล่าภาษาโอฟิเดียนและค่อยๆ นำแผนรับมือที่เหมาะสมมาใช้ หากเราพบหลักฐานว่าพวกมันใช้เครื่องมือและปรับกลยุทธ์ได้ เราอาจถึงขั้นใช้เหตุผลกับพวกมันได้ด้วยซ้ำ! เราเพียงต้องแน่ใจว่าจะไม่ทำให้ข้อมูลปนเปื้อนด้วยการเข้าไปก้าวก่ายกิจกรรมของพวกมัน แม้ในตอนที่มันกำลังกัดชาวอาณานิคมและดูดพลังงานอยู่ก็ตาม"
 SNEK_WAR_PROJECT:0 "ใช้ทหาร"
 SNEK_WAR_PROJECT_DESC:1 "สงคราม! เราจะใช้สงคราม! เราไม่รู้ว่าทำไมพวกมันถึงมาที่นี่ เราไม่รู้ทั้งหมดว่าพวกมันทำอะไรที่นี่ แต่เรารู้อยู่เรื่องหนึ่ง: พวกมันเกลียดเรา ดังนั้นพวกมันต้องเรียนรู้ที่จะหวาดกลัวเรา ถึงเวลาตั้งเวรยาม จัดกองลาดตระเวน และค่อยๆ กวาดล้างบ้านต่อบ้านด้วยเครื่องเผาภาษาโอฟิเดียนเผาพวกมันให้หมด! ไม่ว่าจะต้องแลกด้วยอะไรก็ตาม เราต้องยืนหยัดรับมือกับทุกสิ่งที่เลื้อยคลาน"
