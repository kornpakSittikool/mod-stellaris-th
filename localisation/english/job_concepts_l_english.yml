 concept_priest_desc: "$job_priest_plural$ เปลี่ยน $i_consumer_goods$ เป็น $i_unity$ และ $i_amenities$\n\n§L$job_priest_desc$§!"

 concept_high_priest: "นักบวชชั้นสูง"
 concept_high_priest_desc: "$job_high_priest_plural$ เปลี่ยน $i_consumer_goods$ เป็น $i_unity$ และ $i_amenities$\n\n§L$job_high_priest_desc$§!"

 concept_haruspex: "ฮารัสเป็กซ์"
 concept_haruspex_desc: "ฮารัสเป็กซ์เปลี่ยน $i_consumer_goods$ เป็น $i_engineering$ และ $i_unity$\n\n§Lช่างกลและศัลยแพทย์ผู้เผยแพร่หลักศรัทธาแห่งเทพ ผู้ปลดเปลื้องเนื้อหนังอันไม่คู่ควรและแทนที่มันด้วยไซเบอร์เนติกส์ศักดิ์สิทธิ์§!"

 concept_technophant: "เทคโนแฟนต์"
 concept_technophant_desc: "เทคโนแฟนต์เปลี่ยน $i_consumer_goods$ เป็น $i_engineering$ และ $i_unity$\n\n§Lล่ามผู้สูงส่งแห่งเวทแวร์ศักดิ์สิทธิ์ พวกเขาชี้นำประชาชนสู่การหลอมรวมอันสมบูรณ์แบบระหว่างเนื้อหนังและเครื่องจักร§!"

 concept_roboticist: "นักวิทยาการหุ่นยนต์"
 concept_roboticist_desc: "นักวิทยาการหุ่นยนต์เปลี่ยน $i_alloys$ เป็น £pop£ §Iประชากรจักรกล§! ใหม่\n\n§Lช่างเทคนิคเหล่านี้สร้างหุ่นยนต์ เพื่อให้หุ่นยนต์เหล่านั้นช่วยสร้างชาติ§!"

 concept_archaeoengineers: "วิศวกรโบราณคดี"
 concept_archaeoengineers_desc: "$job_archaeoengineers_plural$ เปลี่ยน $i_consumer_goods$ เป็น $i_research$\n\n§L$job_archaeoengineers_desc$§!"

 concept_politician: "นักการเมือง"
 concept_politician_desc: "$job_politician_plural$ เปลี่ยน $i_consumer_goods$ เป็น $i_unity$ และ $i_amenities$\n\n§L$job_politician_desc$§!"

 concept_colonist: "นักล่าอาณานิคม"
 concept_colonist_desc: "$job_colonist_plural$ ผลิต $i_food$ (หรือ $i_minerals$) และ $i_amenities$ เพิ่มขึ้นเล็กน้อย และวางกำลัง £defense_army£ §Yกองทัพป้องกัน§!\n\n§L$job_colonist_desc$§!"

 concept_overlord_arborist: "รุกขชาติ (โอเวอร์ลอร์ด)"
 concept_overlord_arborist_desc: "$job_overlord_arborist_plural$ เปลี่ยน $i_food$ ของจักรวรรดิบริวารให้เป็น $i_food$ สำหรับจักรวรรดิเจ้าเหนือหัว\n\n§L$job_overlord_arborist_desc$§!"

 concept_replicator: "ผู้ลอกเลียนแบบ"
 concept_replicator_desc: "ผู้ลอกเลียนแบบเปลี่ยน $i_alloys$ เป็น £pop£ §Iประชากรเครื่องจักร§! ใหม่\n\n§Lเครื่องจักรที่สร้างเครื่องจักรที่สร้างเครื่องจักรที่...§!"

 concept_spawning_drone: "โดรนวางไข่"
 concept_spawning_drone_desc: "$job_spawning_drone_plural$ เปลี่ยน $i_food$ (หรือ $i_minerals$) เป็น £mod_planet_amenities_no_happiness_add£ §I$PLANET_AMENITIES_TITLE$§! และ £mod_planet_pop_assembly_mult£ §I$MOD_BONUS_POP_GROWTH$§!.\n\n§L$job_spawning_drone_desc$§!"

 concept_offspring_drone: "โดรนลูก"
 concept_offspring_drone_desc: "โดรนลูกเปลี่ยน $i_food$ (หรือ $i_minerals$) เป็น £mod_planet_amenities_no_happiness_add£ §I$PLANET_AMENITIES_TITLE$§! และ £mod_planet_pop_assembly_mult£ §I$MOD_BONUS_POP_GROWTH$§!, สร้าง §I$offspring_defense_plural$§!, และมอบโบนัส £mod_planet_jobs_simple_drone_produces_mult£ §G+10%§! ให้กับ §Iผลผลิตของ $pop_cat_simple_drone$§!.\n\n§L$job_offspring_drone_desc$§!"

 concept_offspring_feeder: "โดรนเพาะเลี้ยงและให้อาหาร"
 concept_offspring_feeder_desc: "โดรนเพาะเลี้ยงและให้อาหารใช้ $i_food$ (หรือ $i_minerals$) เพื่อเปิดให้เข้าถึง §I$offspring_defense_plural$§! และเพิ่ม £mod_planet_jobs_worker_produces_mult£ §Iผลผลิตทรัพยากรจากประชากรคนงาน§!\n\n§L$job_overlord_offspring_drone_feeder_desc$§!"

 concept_squire: "สไควร์"
 concept_squire_desc: "สไควร์ให้ $i_amenities$ และเพิ่ม §Iผลผลิต§! ของ £job_knight_commander£ §I$job_knight_commander$§! และงาน £job_knight£ §I$job_knight$§!\n\n§L$job_squire_desc$§!"

 concept_knight: "อัศวิน"
 concept_knight_desc: "อัศวินเปลี่ยน $i_alloys$ เป็น $i_unity$ และ $i_research$ เพิ่ม $i_naval_capacity$ และสร้าง $i_defense_armies$.\nการทำ §Yภารกิจแห่งอัศวิน§! ให้สำเร็จสามารถเพิ่มผลผลิตของพวกเขาได้อีก\n\n§L$job_knight_desc$§!"

 concept_knight_commander: "ผู้บัญชาการอัศวิน"
 concept_knight_commander_desc: "ผู้บัญชาการอัศวินเปลี่ยน $i_alloys$ เป็น $i_unity$ และ $i_amenities$ และเพิ่ม $i_naval_capacity$\nการทำ §Yภารกิจแห่งอัศวิน§! ให้สำเร็จสามารถเพิ่มผลผลิตของพวกเขาได้อีก\n\n§L$job_knight_commander_desc$§!"

 concept_overlord_knight: "อัศวินแห่งโอเวอร์ลอร์ด"
 concept_overlord_knight_desc: "£job_knight£ อัศวินแห่งโอเวอร์ลอร์ดเปลี่ยน $i_alloys$ เป็น $i_stability$ และสร้าง $i_defense_armies$ ให้จักรวรรดิบริวาร พร้อมทั้งมอบ $i_unity$ และ $i_research$ ให้โอเวอร์ลอร์ด\nการทำ §Yภารกิจแห่งอัศวิน§! ให้สำเร็จสามารถเพิ่มผลผลิตของพวกเขาได้อีก\n\n§L$job_knight_desc$§!"

 concept_healthcare: "แรงงานทางการแพทย์"
 concept_healthcare_desc: "แรงงานทางการแพทย์เปลี่ยน $i_consumer_goods$ เป็น $i_amenities$, £mod_logistic_growth_mult£ §I$MOD_LOGISTIC_GROWTH_MULT$§!, £mod_planet_pop_assembly_organic_mult£ §I$MOD_PLANET_POP_ASSEMBLY_ORGANIC_MULT$§!, และเพิ่ม £mod_pop_environment_tolerance£ §Iความน่าอยู่อาศัยของดาวเคราะห์§!.\n\n§L$job_healthcare_desc$§!"

 concept_bureaucrat: "ข้าราชการ"
 concept_bureaucrat_desc: "$job_bureaucrat_plural$ เปลี่ยน $i_consumer_goods$ เป็น $i_unity$\n\n§L$job_bureaucrat_desc$§!"

