 concept_clerk: "เสมียน"
 concept_clerks: "เสมียน"
 concept_clerk_desc: "$job_clerk_plural$ ผลิต $r_trade$ และ $i_amenities$\n\n§L$job_clerk_desc$§!"

 concept_unifier: "เจ้าหน้าที่เอกภาพ"
 concept_unifier_desc: "เจ้าหน้าที่เอกภาพเปลี่ยน $i_consumer_goods$ และ $i_food$ (หรือ $i_minerals$) เป็น $i_unity$ และ $i_amenities$\n\n§Lกองงานบริหารของดาวที่เพิ่งรวมเป็นหนึ่ง เจ้าหน้าที่เหล่านี้ทำให้มั่นใจว่าสิ่งอำนวยความสะดวกจะถูกส่งไปถึงผู้ที่ต้องการ§!"

 concept_broken_shackles_scavenger: "นักเก็บซาก"
 concept_broken_shackles_scavenger_desc: "นักเก็บซากผลิต $i_alloys$, $i_amenities$ และ $i_research$ ได้เล็กน้อย\n\n§Lนักเก็บซากสำรวจซากของ §Y$d_crashed_slaver_ship$§! เพื่อค้นหาทุกสิ่งที่ยังมีค่า§!"

 concept_low_tech_laborer: "แรงงาน"
 concept_low_tech_laborer_desc: "แรงงานเปลี่ยน $i_minerals$ เป็น $i_consumer_goods$ และ $i_alloys$\n\n§L$job_low_tech_laborer_desc$§!"

 concept_low_tech_miner: "ผู้สำรวจแร่"
 concept_low_tech_miner_desc: "ผู้สำรวจแร่ผลิต $i_minerals$\n\n§L$job_low_tech_miner_desc$§!"

 concept_low_tech_technician: "วิศวกรเครื่องปฏิกรณ์"
 concept_low_tech_technician_desc: "วิศวกรเครื่องปฏิกรณ์ผลิต $i_energy$\n\n§L$job_low_tech_technician_desc$§!"

 concept_low_tech_farmer: "ผู้บุกเบิกตั้งถิ่นฐาน"
 concept_low_tech_farmer_desc: "ผู้บุกเบิกตั้งถิ่นฐานผลิต $i_food$\n\n§L$job_low_tech_farmer_desc$§!"

 concept_low_tech_researcher: "นักวิทยาศาสตร์"
 concept_low_tech_researcher_desc: "นักวิทยาศาสตร์เปลี่ยน $i_consumer_goods$ เป็น $i_research$\n\n§L$job_low_tech_researcher_desc$§!"

 concept_low_tech_bureaucrat: "ผู้บริหาร"
 concept_low_tech_bureaucrat_desc: "ผู้บริหารเปลี่ยน $i_consumer_goods$ เป็น $i_unity$\n\n§L$job_low_tech_bureaucrat_desc$§!"

 concept_low_tech_warrior: "ทหารเกณฑ์"
 concept_low_tech_warrior_desc: "ทหารเกณฑ์ลด £crime£ §I$PLANET_CRIME_TITLE$§! และจัดตั้ง £defense_army£ §Iกองทัพป้องกัน§!\n\n§Lทหารรับใช้เหล่านี้เคยถูกใช้เป็นเพียงเนื้อปืน ผู้โชคดีไม่กี่คนที่รอดชีวิตได้อาสาปกป้องอิสรภาพที่เพิ่งค้นพบของเราด้วยชีวิตของตน§!"

 concept_entertainer: "นักให้ความบันเทิง"
 concept_entertainer_desc: "$job_entertainer_plural$ เปลี่ยน $i_consumer_goods$ เป็น $i_unity$ และ $i_amenities$\n\n§L$job_entertainer_desc$§!"

 concept_wrangler: "ผู้ต้อนสัตว์"
 concept_wrangler_desc: "ผู้ต้อนสัตว์เปลี่ยน $i_consumer_goods$ เป็น $i_unity$, $i_amenities$ และ $i_society$\n\nผลของผู้ต้อนสัตว์จะแตกต่างกันไปตามจริยธรรมของจักรวรรดิ\n\n§Lการอนุรักษ์ ศึกษา และจัดการสัตว์ท้องถิ่นอย่างเหมาะสมเป็นสิ่งสำคัญต่อความสำเร็จของโลกของเรา§!"

 concept_rancher: "ผู้ดูแลฟาร์มปศุสัตว์"
 concept_rancher_desc: "ผู้ดูแลฟาร์มปศุสัตว์เปลี่ยน $i_consumer_goods$ เป็น $i_unity$, $i_amenities$ และ $i_society$\n\nผลของผู้ดูแลฟาร์มปศุสัตว์จะแตกต่างกันไปตามจริยธรรมของจักรวรรดิ\n\n§Lการดูแลฟาร์มสัตว์บกที่เราสร้างขึ้นต้องอาศัยการทำงานหนักและความเข้าใจอย่างลึกซึ้งต่อความต้องการทางชีวภาพของพวกมัน§!"

 concept_trophy_hunter: "นักล่าถ้วยรางวัล"
 concept_trophy_hunter_desc: "นักล่าถ้วยรางวัลเปลี่ยน $i_consumer_goods$ เป็น $i_unity$, $i_food$, $i_amenities$ และ $i_society$\n\nผลของนักล่าถ้วยรางวัลจะแตกต่างกันไปตามจริยธรรมของจักรวรรดิ\n\n§Lถ้ามันมีเลือด เราก็ฆ่ามันได้§!"

 concept_animal_handler: "ผู้ดูแลสัตว์"
 concept_animal_handler_desc: "ผู้ดูแลสัตว์เปลี่ยน $i_consumer_goods$ เป็น $i_unity$, $i_amenities$ และ $i_society$\n\nผลของผู้ดูแลสัตว์จะแตกต่างกันไปตามจริยธรรมของจักรวรรดิ\n\n§Lระบบนิเวศที่ดีที่สุดคือระบบที่ได้รับการจัดการโดยมีการแทรกแซงโดยตรงให้น้อยที่สุด เพื่อประโยชน์ของทุกสปีชีส์§!"

 concept_beastfighter: "นักสู้สัตว์ร้าย"
 concept_beastfighter_desc: "นักสู้สัตว์ร้ายเปลี่ยน $i_alloys$ และ $i_consumer_goods$ หรือ $i_minerals$ เป็น $i_unity$, $i_amenities$ และ $i_society$\n\nผลของนักสู้สัตว์ร้ายจะแตกต่างกันไปตามจริยธรรมของจักรวรรดิ\n\n§Lนักสู้สัตว์ร้ายผู้ยิ่งใหญ่ที่สุดดึงดูดผู้ชมได้หลายแสนคน ไม่มีสิ่งใดให้ความบันเทิงแก่หมู่ชนได้มากไปกว่านี้อีกแล้ว§!"

 concept_drone_wrangler: "โดรนต้อนสัตว์"
 concept_drone_wrangler_desc: "โดรนต้อนสัตว์เปลี่ยน $i_minerals$ เป็น $i_unity$, $i_amenities$ และ $i_society$\n\nผลของโดรนต้อนสัตว์จะแตกต่างกันไปตามจริยธรรมของจักรวรรดิ\n\n§Lการอนุรักษ์ ศึกษา และจัดการสัตว์ท้องถิ่นอย่างเหมาะสมเป็นสิ่งสำคัญต่อความสำเร็จของโลกของเรา§!"

 concept_hunter_drone: "โดรนนักล่า"
 concept_hunter_drone_desc: "โดรนนักล่าเปลี่ยน $i_minerals$ เป็น $i_unity$, $i_food$, $i_amenities$ และ $i_society$\n\nผลของโดรนนักล่าจะแตกต่างกันไปตามจริยธรรมของจักรวรรดิ\n\n§Lถ้ามันมีเลือด เราก็ฆ่ามันได้§!"

 concept_symbiosis_integrator: "ผู้ผสานภาวะพึ่งพา"
 concept_symbiosis_integrator_desc: "ผู้ผสานภาวะพึ่งพาเปลี่ยน $i_minerals$ เป็น $i_unity$, $i_amenities$ และ $i_society$\n\nผลของผู้ผสานภาวะพึ่งพาจะแตกต่างกันไปตามจริยธรรมของจักรวรรดิ\n\n§Lระบบนิเวศที่ดีที่สุดคือระบบที่ได้รับการจัดการโดยมีการแทรกแซงโดยตรงให้น้อยที่สุด เพื่อประโยชน์ของทุกสปีชีส์§!"

