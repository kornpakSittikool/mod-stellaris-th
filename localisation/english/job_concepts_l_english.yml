 concept_metallurgist: "นักโลหะวิทยา"
 concept_metallurgists: "นักโลหะวิทยา"
 concept_metallurgist_desc: "นักโลหะวิทยาเปลี่ยน $i_minerals$ เป็น $i_alloys$.\n\n§L$job_foundry_desc$§!"

 concept_sand_whisperer: "ผู้กระซิบกับทราย"
 concept_sand_whisperer_desc: "ผู้กระซิบกับทรายผลิต $i_zro$\n\n§Lเมื่อสื่อสารกับทรายพลังจิต ผู้กระซิบกับทรายสามารถเก็บรวบรวม Zro ปริมาณเล็กน้อยจากพวกมันได้§!"

 concept_sand_caretaker: "ผู้ดูแลทราย"
 concept_sand_caretaker_desc: "ผู้ดูแลทรายผลิต $i_zro$\n\n§Lเมื่อสื่อสารกับทรายพลังจิต ผู้ดูแลทรายสามารถเก็บรวบรวม Zro ปริมาณเล็กน้อยจากพวกมันได้§!"

 concept_drone_sand_whisperer: "โดรนผู้กระซิบกับทราย"
 concept_drone_sand_whisperer_desc: "โดรนผู้กระซิบกับทรายผลิต $i_zro$\n\n§Lเมื่อสื่อสารกับทรายพลังจิต โดรนผู้กระซิบกับทรายสามารถเก็บรวบรวม Zro ปริมาณเล็กน้อยจากพวกมันได้§!"

 concept_drone_sand_caretaker: "โดรนผู้ดูแลทราย"
 concept_drone_sand_caretaker_desc: "โดรนผู้ดูแลทรายผลิต $i_zro$\n\n§Lเมื่อสื่อสารกับทรายพลังจิต โดรนผู้ดูแลทรายสามารถเก็บรวบรวม Zro ปริมาณเล็กน้อยจากพวกมันได้§!"

 concept_space_junk_collector: "นักเก็บขยะอวกาศ"
 concept_space_junk_collector_desc: "นักเก็บขยะอวกาศผลิต $i_alloys$\n\n§Lเศษซากอวกาศในวงโคจรจะตกเข้าสู่ชั้นบรรยากาศของดาวดวงนี้เป็นระยะ สิ่งใดก็ตามที่ไม่ถูกเผาไหม้ระหว่างทางเข้าสามารถเก็บและนำกลับมาใช้ใหม่ได้§!"

 concept_drone_space_junk_collector: "โดรนเก็บขยะอวกาศ"
 concept_drone_space_junk_collector_desc: "โดรนเก็บขยะอวกาศผลิต $i_alloys$\n\n§Lเศษซากอวกาศในวงโคจรจะตกเข้าสู่ชั้นบรรยากาศของดาวดวงนี้เป็นระยะ สิ่งใดก็ตามที่ไม่ถูกเผาไหม้ระหว่างทางเข้าสามารถเก็บและนำกลับมาใช้ใหม่ได้§!"

 concept_enforcer: "ผู้คุมกฎ"
 concept_enforcer_desc: "ผู้คุมกฎลด $i_crime$ และจัดตั้ง $i_defense_armies$.\n\n§L$job_enforcer_desc$§!"

 concept_educator: "นักการศึกษา"
 concept_educator_desc: "นักการศึกษาผลิต $i_unity$, ลด $i_crime$, เพิ่ม §Iแรงดึงดูดต่อจริยธรรมการปกครอง§!, และจัดตั้ง $i_defense_armies$.\n\n§Lผู้พิทักษ์แห่งความรู้ผู้ไม่รู้จักเหน็ดเหนื่อยเหล่านี้อุทิศตนเพื่อเตรียมความพร้อมให้เยาวชน มอบบริการที่ไม่อาจทดแทนได้ด้วยการทำให้มั่นใจว่าพลเมืองทุกคนพร้อมเผชิญหน้ากับกาแล็กซี§!"

 concept_slave_orderly: "ผู้ช่วยดูแล"
 concept_slave_orderly_desc: "$job_slave_orderly_effect_desc$\n\n§Lแรงงานเหล่านี้มีหน้าที่รับผิดชอบการดูแลผู้ที่ถูกนำไปทดลองจนมักไม่อาจดูแลตนเองได้ในชีวิตประจำวัน§!"
