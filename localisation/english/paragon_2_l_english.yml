 civic_tooltip_memory_vault_hive_effects:3 "สามารถสร้างเอกลักษณ์ได้£building£§Y $building_paragon_memory_vaults$§!\n£building£ §Y$building_paragon_memory_vaults$§!ผลิต$r_unity$และเพิ่มขึ้น§Y$MOD_LEADER_SPECIES_EXP_GAIN$§!จาก§Yผู้นํา§!ที่ได้รับ§Yระดับ 8§!."
 civic_memory_vault_hive:1 "ห้องนิรภัยระบบประสาท"
 civic_memory_vault_hive_desc:0 "รังนี้มุ่งเน้นไปที่การปลูกฝังและเรียนรู้ จากชีวิตของหุ่นยนต์อัตโนมัติในกาแล็กซี มันสกัดเอาความทรงจําผ่านการจัดเก็บและ การสลายตัวของเนื้อเยื่อสมอง ซึ่งสามารถนําความทรงจําบางส่วน ไปใส่ลงในหุ่นยนต์ที่เตรียมใหม่"
