 hive_greeting: "\"จิตใจเดียวในหลาย ๆ ครอบคลุมความหนาวเย็นอันยิ่งใหญ่ของพื้นที่.\""
 machine_greeting: "\"การวิเคราะห์เบื้องต้น เสร็จสมบูรณ์ ระบบ - ระบุ. หน่วยพร้อมรับภารกิจ"
 wilderness_greeting: "\"สาขาใหม่ไม่มีความผิดกํากับโดยความต้องการของทั้ง ร่วมกันเราเติบโต.\""
 default_greeting: ""ฉันมาที่นี่เพื่อรับใช้จักรวรรดิของคุณ บอกสิ่งที่ต้องทำ""
 authoritarian_admiral: "\"จงให้ศรัทธาและข้าจะให้ชัยชนะแก่เจ้า\""
 authoritarian_scientist: "\"ความก้าวหน้าของวิทยาศาสตร์จะต้องให้บริการของรัฐ\"."
 authoritarian_general: "\"ศัตรูของเราจะปกคลุมเรา\""
 authoritarian_official: "\"ประชาชนจะต้องเรียนรู้ที่จะเชื่อฟัง\""
 egalitarian_admiral: "\"กําหนดลูกเรือของเจ้า และเจ้าจะได้รับชัยชนะ\""
 egalitarian_scientist: "\"ความฝันของนักวิทยาศาสตร์ คือผลประโยชน์ของสังคม\""
 egalitarian_general: "\"เราจะต่อสู้เคียงข้างกัน เพื่อผลประโยชน์ของทุกสิ่ง\""
 egalitarian_official: "\"ประชาชนทุกคนสมควรได้รับเสียง และผมตั้งใจจะฟัง\""
 militarist_admiral: "\"สําหรับหน้าที่ เกียรติยศ และเกียรติยศ\""
 militarist_scientist: "\"ความแตกต่างระหว่างความบ้าและอัจฉริยะ คือความสําเร็จ\""
 militarist_general: "\"วิกรี่ไม่ว่าค่าใช้จ่าย!\""
 militarist_official: "\"กองทัพเรือของเราจะบดบังดวงดาว\""
 pacifist_admiral: "\"การรุกที่ดีที่สุด คือการป้องกันที่ปิดไม่ได้\""
 pacifist_scientist: "ก้าวหน้าเพื่อสันติภาพและความเจริญรุ่งเรือง"
 pacifist_general: "\"ภายใต้คําสั่งของฉัน สงครามไม่ใช่ข้อแก้ตัวสําหรับความป่าเถื่อน\"."
 pacifist_official: "\"โลกแห่งสันติภาพเป็นโลกที่อุดมสมบูรณ์\""
 spiritualist_admiral: "\"ความเชื่อคือชัยชนะ\""
 spiritualist_scientist: "\"วิทยาศาสตร์เป็นกระจกเงาของพระเจ้า\""
 spiritualist_general: "\"ไม่ว่าศัตรูจะน่ากลัวแค่ไหน จิตวิญญาณของเราก็จะไม่สั่นคลอน\""
 spiritualist_official: "ผู้นําที่ดีที่สุด คือผู้ที่เข้าใจพลังแห่งจิตวิญญาณ"
 materialist_admiral: "\"อาร์มาดาของเราจะแข่งกับดาว!\""
 materialist_scientist: "\"ฉันพร้อมที่จะใช้ทฤษฎีของฉันในการปฏิบัติ\"."
 materialist_general: "\"ทหารราบเป็นกองทัพที่ชนะ!\""
 materialist_official: "\"ผมมีความสําคัญ 3 อย่าง คือ วางแผน การผลิต และความเจริญรุ่งเรือง\""
 xenophile_admiral: "\"มองไปข้างหน้าถึงความท้าทาย!\""
 xenophile_scientist: "\"ลองค้นหาโลกใหม่ และขยายเขตแดนของเรา!\""
 xenophile_general: "\"การยืนหยัดต่อศัตรูคือก้าวแรกสู่ชัยชนะ\""
 xenophile_official: "\"ชุมชนชนบทเป็นชุมชนที่มีสุขภาพดี\""
 xenophobe_admiral: "\"ไม่มีซีโนจะขวางทางเรา\""
 xenophobe_scientist: "\"เพื่อความเจริญ เราต้องก้าวไปกับคนนอก\""
 xenophobe_general: "\"ข้าจะไม่ให้ศัตรูของเราในไตรมาสใด ผู้นําของพวกเขาไม่มีความเมตตา\""
 xenophobe_official: "\"ดาวเคราะห์ของเราจะต้องบริสุทธิ์และมีประสิทธิภาพ.\""

