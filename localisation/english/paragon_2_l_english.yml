 building_paragon_memory_vaults_hive:0 "$building_paragon_memory_vaults$"
 building_paragon_memory_vaults_desc:1 "สังคมของเราได้รักษาเรื่องราว ของวีรบุรุษและตัวเลขโดดเด่นจากอดีต ความ รู้ และ ประสบการณ์ ของ พวก เขา ได้ รับ การ ปรับ ปรุง เป็น แบบ ดิจิตอล และ ถูก รวบ รวม เข้า มา ใน ห้อง แห่ง ความ รู้. การทําลายอาคารนี้ จะกําจัดข้อมูล ที่เก็บไว้ข้างใน"
 building_paragon_memory_vaults_machine_desc:1 "ทุกความรู้สึกและข้อมูล ที่หน่วยของเราได้รับ จะถูกเก็บไว้ในโหลเหล่านี้ ฐานข้อมูลที่เหลือเชื่อนี้ ถูกใช้ในการเร่งการเรียนรู้ เมื่อมีการสร้างหน่วยอัตโนมัติขึ้นใหม่ การทําลายอาคารนี้ จะกําจัดข้อมูล ที่เก็บไว้ข้างใน"
 building_paragon_memory_vaults_hive_desc:1 "ความทรงจําและสัมผัส ของหุ่นยนต์อัตโนมัติทุกตัว ถูกเก็บไว้ในชั่วโมงแห่งความรู้ รอคอยการฝังใจ การทําลายอาคารนี้ จะกําจัดข้อมูล ที่เก็บไว้ข้างใน"
 memory_vault_tooltip: "เพิ่ม§Y$MOD_LEADER_SPECIES_EXP_GAIN$§!ถึง§Y$mod_country_unity_produces_mult$§!โดย§G1%§!สําหรับทุกคน§Yยานยานยาน Destiny§!รับมาจากผู้นํา\nรักษาตาชั่งสําหรับทุก§Yยานยานยาน Destiny§!รับมาจากผู้นํา"
 building_corporate_clinics:0 "คลินิกของบริษัท"
 building_corporate_clinics_desc:1 "บริษัทแพทย์เอกชน จ้างผู้เชี่ยวชาญด้านการแพทย์ท้องถิ่นและนอกโลก เพื่อให้บริการสําหรับค่าธรรมเนียมที่สมเหตุสมผล"
