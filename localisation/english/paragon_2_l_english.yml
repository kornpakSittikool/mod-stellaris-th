 xenophile1_catch_phrase:0 "§L§!\"พร้อมที่จะขโมยจากทรราชและร่วมกันปล้นใช่มั้ย? ลูกเรือของฉันคันสําหรับการโจมตีบาง!\"§!"
 xenophile2_catch_phrase:1 "§L§!\"สิ่งมีชีวิตที่เป็นสิ่งมีชีวิต ทําการศึกษาที่น่าหลงใหล โดยเฉพาะคนที่สามารถสื่อสารได้!\"§!"
 militarist1_catch_phrase:0 "§L§!\"คุณพยายามที่จะบดบังศัตรูของคุณ กับไม่เคยเห็นอาร์มาด้า? มองไม่เพิ่มเติม.\"§!"
 militarist2_catch_phrase:0 "§L§!\"จงปล่อยข้าไว้กับผู้ที่ต่อต้านเจ้า ข้าจะแสดงให้พวกเขาเห็น\"§!"
 xenophobe1_catch_phrase:0 "§L§!\"ให้ฉันทํางานโดยไม่มีใครสนใจ และเราจะมีความสุขมากขึ้นกับผลลัพธ์\"§!"
 xenophobe2_catch_phrase:0 "§L§!\"ผลวิเคราะห์สังคมเต็มรูปแบบ\" รายงานที่ใกล้เข้ามา 31234 วันกาแล็กซี่\".§!"
 egalitarian1_catch_phrase:0 "§L§!ในบรรดาโชคชะตามากมายทั่วกาแล็กซี่ การกดขี่ข่มเหงเป็นหนึ่งในสิ่งที่เลวร้ายที่สุด§!"
 egalitarian2_catch_phrase:0 "§L§!\"ความมหัศจรรย์ทางเทคโนโลยีที่เราสร้างขึ้น\" เราควรจะแบ่งปันมันกับทุกคน!\"§!"
 materialist1_catch_phrase:0 "§L§!\"เช่นเดียวกับการขึ้นของฉันไปยังรัฐที่สมบูรณ์แบบนี้ฉันจะยกกองเรือของคุณไปยอดเยี่ยม.\"§!"
 materialist2_catch_phrase:0 "§L§!\"สิ่งที่ต้องสร้างใช่มั้ย? ทุกอย่างต้องซ่อมแซม ฉันพูดถูกไหม ฉันมีรสชาติสําหรับทั้งสอง!\"§!"
 pacifist1_catch_phrase:0 "§L§!\"คุณไม่สามารถอนุญาตให้ทหารวิ่งอะโมคฉันจะรักษาความเป็นระเบียบและความยุติธรรมแก่ผู้ก่ออันตราย\"§!"
 pacifist2_catch_phrase:0 "§L§!\"ความลึกลับที่ยิ่งใหญ่ที่สุดของจักรวาลไม่ได้ห่างไกล พวกเขาอยู่ที่นี่ภายในของเรา§!"
 authoritarian1_catch_phrase:0 "§L§!\"ส่งฉันไปที่ปัญหาของคุณ และพวกเขาจะหายไป -- คือพวกเขาทางการเมืองหรือเก็บเกี่ยว\"§!"
 authoritarian2_catch_phrase:0 "§L§!\"ข้าเป็นแต่คนรับใช้ที่ต่ําต้อย ที่จะทําทุกอย่างเพื่อสนองความต้องการของเจ้า โอ จักรวรรดิอันมีเกียรติ\"§!"
 spiritualist1_catch_phrase:0 "§L§!"เราจะสอนผู้ที่ฟังและฟังผู้ที่สอน"§!"
 spiritualist2_catch_phrase:0 "§L§!\"กาแล็กซี่บรรจุความรู้ที่ซ่อน, ฝังและลืม เราต้องรักษาความจริงเก่าๆ\"§!"
 skrand_catch_phrase:0 "§L§!\"ศัตรูของท่านจะรู้ถึงความโกรธของซัคเวียร์\"โทนสีแรกจะขึ้นสู่ท้องฟ้าอีกครั้ง!\"§!"
 beholder_catch_phrase:1 "§L§!\"เราย้าย และเรารู้สึกขอบคุณ มันเป็นมหาอํานาจ\"§!"
 sadtoid_catch_phrase:0 "§L§!\"ชีวิตเป็นสิ่งที่น่าชื่นชม เหตุการณ์ที่หายาก สมบัติที่แท้จริง ให้เราช่วยให้มันแพร่กระจายและบานอีกครั้ง\".§!"
 keides_catch_phrase:1 "§L§!\"ใช่! ไม่มีเวลามาเสียเวลาแล้ว มาเปิดเผยความลับของดาราจักรกันเถอะ เรือของฉันอยู่ที่ไหน?\"§!"

