 leader_trait_interrogator_3_effect:1 "$ARMY_EFFECTS_TXT$:\n$t$เมื่อชนะการรบภาคพื้นดินในฐานะผู้โจมตี:\n$tt$ $INTEL$ ของจักรวรรดิศัตรู: §G+30§!"
 leader_trait_industrial_espionage:1 "การ ถ่ายทอด ความ รู้"
 leader_trait_industrial_espionage_effect:0 "$ARMY_EFFECTS_TXT$:\n$t$ใน การ สู้ รบ บน พื้น ดิน ที่ ชนะ การ โจมตี:\n$tt$โอกาส ที่ จะ ขโมยการวิจัยตัวเลือก:§Y5%§!\n$ttt$ทุก£job_researcher£ $job_researcher$บนดาวเคราะห์:\n$tttt$โอกาส:§G+5%§!"
 leader_trait_industrial_espionage_desc:1 "ผู้นําจะพยายามที่จะขโมย ข้อมูลที่มีค่าใด ๆ ที่พวกเขาพบ บนดาวเคราะห์ที่พิชิต"
 leader_trait_industrial_espionage_2:0 "$leader_trait_industrial_espionage$2"
 leader_trait_industrial_espionage_2_effect:0 "$ARMY_EFFECTS_TXT$:\n$t$ใน การ สู้ รบ บน พื้น ดิน ที่ ชนะ การ โจมตี:\n$tt$โอกาส ที่ จะ ขโมย£research£ §Yเทคโนโลยี§!: §Y5%§!\n$ttt$ต่อ£job_researcher£ $job_researcher$บนดาวเคราะห์:\n$tttt$โอกาส:§G+5%§!\n$tttt$เริ่มการวิจัยความคืบหน้า:§G+5%§!"
 leader_trait_industrial_espionage_2_desc:0 "$leader_trait_industrial_espionage_desc$"
 leader_trait_crusader:0 "นักครูเสด"
