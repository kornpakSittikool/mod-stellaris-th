 civic_tooltip_crusader_spirit_effects:1 "- §Y$commander_plural_with_icon$§! มีคุณลักษณะ §Y$leader_trait_crusader$§!\n- สามารถใช้นโยบาย(ปรัชญาสงคราม)ได้เพียงแค่ §Yสงครามปลดปล่อย§! เท่านั้น"
 civic_crusader_spirit:0 "จิตวิญญาณครูเซเดอร์"
 civic_crusader_spirit_desc:0 "การ ขาด การ ชี้ นํา ก่อ ให้ เกิด จิตใจ ที่ อ่อนแอ ซึ่ง ยอม จํานน ง่าย ต่อ การ ทุจริต และ ตก เข้า สู่ ความ เสื่อม ถอย. สังคมนี้ได้ทึกทักเอาเองว่า การนํา\"แสงสว่าง\" ต่อมวลชน ผ่านความก้าวร้าว"

