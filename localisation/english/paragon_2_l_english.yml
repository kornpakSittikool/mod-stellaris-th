 leader_trait_crusader_desc:2 "ผู้นําคนนี้มุ่งไปที่การทําลายศัตรูของเรา[Root.GetHisHerCap]การ อุทิศ ตัว เพื่อ จุด ประสงค์ นั้น ไม่ สั่น คลอน"
 leader_trait_crusader_2:0 "$leader_trait_crusader$2"
 leader_trait_crusader_2_effect:1 "$FLEET_EFFECTS_TXT$:\n$t$$EVERY_ENEMY_SHIP_DESTROYED_TXT$:\n$tt$$r_unity$: §G+$@trait_crusader_2_fleet_amt|0$§!\n\n$ARMY_EFFECTS_TXT$:\n$t$$EVERY_ARMY_KILLED_TXT$:\n$tt$$r_unity$: §G+40§!"
 leader_trait_crusader_2_desc:0 "$leader_trait_crusader_desc$"
 leader_trait_crusader_3_effect: "$FLEET_EFFECTS_TXT$:\n$t$$MOD_DAMAGE_VS_RIVAL_MULT$: §G+15%§!\n$t$$EVERY_ENEMY_SHIP_DESTROYED_TXT$:\n$tt$$r_unity$: §G+$@trait_crusader_2_fleet_amt|0$§!\n\n$ARMY_EFFECTS_TXT$:\n$t$$MOD_ARMY_DAMAGE_MULT$: §G+10%§!\n$t$$MOD_ARMY_MORALE$: §G+25%§!\n$t$$EVERY_ARMY_KILLED_TXT$:\n$tt$$r_unity$: §G+40§!"
 leader_trait_uninspiring: "ไม่สนใจ"
 leader_trait_uninspiring_desc:1 "ผู้ นํา คน นี้ ขาด ความ นับถือ และ ไม่ พยายาม จะ ให้ รางวัล หรือ ให้ กําลัง ใจ ปล่อย ให้ ทหาร ของ พวก เขา ถูก ลด ฐานะ."
 leader_trait_slothful: "นุ่มนวล"
 leader_trait_slothful_desc:1 "ความไม่พอใจของผู้นํานี้ ที่จะจัดการการฝึกมีผล[Root.GetHisHer]ความแข็งแกร่งของกองทัพ"
 leader_trait_victory_or_death:2 "ขาด ความ นับถือ"
 leader_trait_victory_or_death_desc:1 "ผู้นําคนนี้ไม่มีความเคารพต่อชีวิตของทหารของพวกเขา ยินดีที่จะโยนพวกเขาออกไป เพื่อเกียรติยศและอื่น ๆ เล็กน้อย"
 leader_trait_disorganized: "ถูกยกเลิก"
 leader_trait_disorganized_desc:1 "ความไร้ทักษะของผู้นํานี้ ทําให้กองกําลังของพวกเขา ทําหน้าที่เหมือนกองทัพมากกว่าทหารที่เหมาะสม"
 leader_trait_lawless:1 "ไร้กฎหมาย"
 leader_trait_lawless_desc:1 "ผู้นํานี้อยู่ในกระเป๋าของแก๊งท้องถิ่นและโจรสลัด"
 leader_trait_defence_engineer:0 "วิศวกรป้องกัน"
 leader_trait_defence_engineer_desc:0 "ผู้นําคนนี้มุ่งเน้นไปที่ การป้องกันในออร์บิทัล เป็นกําแพงตายที่ปิดไม่ได้"
 leader_trait_defence_engineer_2:0 "$leader_trait_defence_engineer$2"
 leader_trait_defence_engineer_desc_2:0 "$leader_trait_defence_engineer_desc$"
 leader_trait_shadow_broker:0 "ติดต่อในเงามืด"
 leader_trait_shadow_broker_desc:1 "ผู้นําคนนี้เก็บเครือข่าย ของสายลับไว้"

 # Destiny Traits
 # Generic
 leader_trait_educator:0 "ที่ปรึกษาที่ชาญฉลาด"
 leader_trait_educator_desc:1 "ความ รู้ และ ประสบการณ์ เป็น รากฐาน ของ ทุก สังคม ที่ ดี เยี่ยม. ผู้ นํา คน นี้ มี ค่า นิยม เหล่า นี้ และ ทํา ทุก สิ่ง เพื่อ ส่ง เสริม และ หนุน ใจ คน อื่น ๆ."
 leader_trait_master_bureaucrat:0 "อาจารย์ของข้าราชการ"
 leader_trait_master_bureaucrat_desc:1 "เมื่อได้ทํางานเป็นข้าราชการแล้ว ผู้นําคนนี้ก็เป็นหัวหน้างานเอกสาร ด้วยทุกอย่างที่บันทึกไว้อย่างถูกต้อง เวลามากขึ้นสามารถอุทิศให้กับผู้ปกครองของพวกเขา"
 # Governor
 leader_trait_shroud_preacher:0 "นักเทศน์แห่งพลังจิตบริสุทธิ์"
 leader_trait_shroud_preacher_effect:1 "$t$ทุก§Y10 ปี§!ให้§Y100§! £pop£ §Hป๊อป§!คือ§Y$trait_latent_psionic$§!นิสัย"
 leader_trait_shroud_preacher_desc:1 "พวกชรูดจะครอบคลุมสิ่งมีชีวิตทุกตัว เมื่อ เกี่ยว ข้อง กับ อํานาจ ภาย ใน ผู้ นํา คน นี้ ส่ง เสริม ความ เลื่อมใส แท้ ใน ผู้ ติด ตาม เขา."
 leader_trait_master_diplomat:0 "แว่นขยายใหญ่"
 leader_trait_master_diplomat_desc:1 "หลังจากหลายปีที่ทํางานกับนักการทูตในต่างประเทศ ผู้นําคนนี้รู้วิธีการกํากับความแตกต่างทางวัฒนธรรม"
 leader_trait_supreme_organizer:0 "ความเข้มสี"
 leader_trait_supreme_organizer_desc:1 "ด้วย การ ควบคุม อย่าง เข้ม งวด ใน เรื่อง ต่าง ๆ ของ รัฐ ผู้ นํา คน นี้ อาศัย อยู่ ที่ ศูนย์กลาง ของ กฎ, กฎหมาย, และ ขั้น ตอน ทาง การ เมือง ของ พวก เขาวงกต ซึ่ง ทั้ง หมด ถูก ออก แบบ มา เพื่อ เพิ่ม อํานาจ ของ ตน เอง."
 leader_trait_aturion_organizer:0 "ความ เสมอ ต้น เสมอ ปลาย"
 leader_trait_aturion_organizer_desc:0 "$leader_trait_supreme_organizer_desc$"
 leader_trait_arbiter:0 "ผู้พัฒนา ไร้ชื่อ"
 leader_trait_arbiter_desc:1 "โดย ใช้ มือ เหล็ก และ ความ ไม่ แยแส อย่าง สิ้น เชิง ต่อ กฎ ข้อ บังคับ ด้าน ความ ปลอด ภัย ผู้ นํา คน นี้ ขับ ดัน ให้ เกิด ผล โดย ทํา ให้ อายุ คาด หวัง ลด ลง และ การ โจมตี ครั้ง ใหญ่ เป็น ครั้ง คราว. อย่าง ไร ก็ ตาม ด้วย แรง กระตุ้น ที่ ถูก ต้อง ความ รําคาญ ดัง กล่าว จัด การ ได้ อย่าง ง่าย ดาย."
 trait_ruler_fertility_preacher_2:0 "$trait_ruler_fertility_preacher$2"
 trait_ruler_fertility_preacher_2_desc:0 "$trait_ruler_fertility_preacher_desc$"
 leader_trait_automation_champion:0 "แชมป์ อัตโนมัติ"
 leader_trait_automation_champion_desc:1 "การโอปติเมชันมีความสําคัญสูงสุดต่อผู้นํา การอัตโนมัติเป็นกุญแจสําคัญ และทุกอย่างสามารถอัตโนมัติ ไม่ว่าจะผ่านหุ่นยนต์ขั้นสูงหรือเครื่องจักรที่ง่ายกว่า จะไม่มีช่องทางถูกสํารวจ"
 leader_trait_expert_survivalist:0 "ผู้ รอด ชีวิต อย่าง เชี่ยวชาญ"
 leader_trait_expert_survivalist_desc:1 "บาง คน มี ความ ชํานาญ สูง ใน ศิลปะ การ อยู่ รอด. ผู้นํารู้ว่าจะยึดติดอยู่กับชีวิตอย่างไร แม้ในเงื่อนไขที่โหดร้ายที่สุด ไม่เป็นที่สนใจยิ่ง ทําให้การตั้งถิ่นฐานใหม่เจริญรุ่งเรือง"
 leader_trait_utopian_idealist:0 "รายการไอเดียของยูโทเปีย"
 leader_trait_utopian_idealist_desc:1 "หลายความฝันในการสร้างสังคมบนโลกอย่างแท้จริง ผู้นําคนนี้ทํางานเพื่อ เปลี่ยนความฝันเหล่านั้นให้เป็นจริง"
 leader_trait_mediator:0 "ผู้เป็นสื่อกลางต่างดาว"
 leader_trait_mediator_desc:1 "ผู้ กลาง ที่ ชํานาญ เป็น สิ่ง สําคัญ ใน ศูนย์ ประชากร ที่ หลาก หลาย. ผู้นําคนนี้รู้วิธีลดความตึงเครียด และบริหารดาวเคราะห์หลายสายพันธุ์อย่างมีประสิทธิภาพ"
 leader_trait_mediator_effect:1 "$PLANET_EFFECTS_TXT$:\n$t$$BONUS_WORKFORCE_FOR$ ['concept_planet_influential']ต่อเผ่าพันธุ์บนดาวเคราะห์: §G+2%§!\n$t$§Y$MOD_POP_HAPPINESS$§!ต่อเผ่าพันธุ์บนดาวเคราะห์: §G+2%§!\n\n$SECTOR_EFFECTS_TXT$:\n$t$$BONUS_WORKFORCE_FOR$ ['concept_planet_influential']ต่อเผ่าพันธุ์ในแต่ละรายการดาวเคราะห์: §G+1%§!\n$t$§Y$MOD_POP_HAPPINESS$§!ต่อเผ่าพันธุ์ในแต่ละรายการดาวเคราะห์: §G+1%§!"
 leader_trait_efficient:0 "ผู้อุปถัมภ์ชนชั้นสูง"
 leader_trait_efficient_desc:1 "ผู้นําคนนี้มีความตระหนักในคุณค่าของตัวเอง และมีแนวโน้มที่จะชอบเพื่อนร่วมชั้นชั้นบน"
 leader_trait_galvanizer:0 "แกลวาไนเซอร์"
 leader_trait_galvanizer_effect_non_gestalt:1 "$PLANET_EFFECTS_TXT$:\n$t$£unity£ $unity$จาก£pop£ §Hป๊อปที่ทํางาน§!: §G+0.50§!\n$t$£society£ $society_research$จาก£pop£ §Hป๊อปที่ทํางาน§!: §G+0.50§!\n$t$$r_trade$ต่อ$pop_group_unit$ £pop£ §Hป๊อปที่ทํางาน§!: §G+0.25§!"
 leader_trait_galvanizer_desc:1 "การ มี จุด มุ่ง หมาย ที่ มั่นคง นํา ไป สู่ ผล ดี หลาย อย่าง. ผู้นําคนนี้รู้วิธีจัดการกับประชาชน ให้พวกเขามีเป้าหมายร่วมกันเพื่อแสวงหาพลังงาน"
 # Scientist
 leader_trait_great_researcher:0 "นัก วิจัย ผู้ ยิ่ง ใหญ่"
 leader_trait_great_researcher_desc:1 "ใน กรณี ที่ หา ได้ ยาก คน เดียว สามารถ ทํา ให้ ทีม วิจัย ทั้ง ทีม ประสบ ความ สําเร็จ ได้. เมื่อพูดถึงการทดลองการออกแบบ วิธีแก้ปัญหาใหม่ๆ และเทคโนโลยีใหม่ๆ ผู้นําคนนี้เป็นอัจฉริยะที่แท้จริง"
 leader_trait_deep_space_explorer:0 "เครื่องมือสํารวจอวกาศแบบลึก"
 leader_trait_deep_space_explorer_desc:1 "เจ้า หน้าที่ สํารวจ อวกาศ อัน ลึก ซึ้ง ได้ รับ มอบ หมาย ให้ สํารวจ มุม ที่ ไกล ที่ สุด ของ กาแล็กซี. ผู้นําคนนี้เป็นหนึ่งในนักสํารวจ ซึ่งมีเทคโนโลยีล้ําสมัย เพื่อขับเคลื่อนพวกเขาสู่ สิ่งที่ไม่รู้จัก"
 leader_trait_xeno_cataloger:0 "ตัวพิมพ์เซโน"
 leader_trait_xeno_cataloger_desc:1 "ผู้นํารายนี้ถูกมอบหมายให้ค้นหา ระบุตัว และบันทึกสิ่งมีชีวิตทั้งหมด จาก นั้น ก็ มี การ ประเมิน ค่า ข้อมูล เพื่อ ระบุ ว่า มี ภัย คุกคาม ใด ๆ ที่ อาจ เกิด ขึ้น และ มี การ ปน เปื้อน ใน อนาคต."
 leader_trait_xeno_cataloger_effect:1 "$t$เมื่อเสร็จสิ้นการสำรวจ:\n$tt$ได้รับการผลิต £unity£§Y$unity$§! เป็นเวลา 3 เดือน"
 leader_trait_frontier_adventurer:0 "ฟร้อนเซอร์"
 leader_trait_frontier_adventurer_desc:1 "สํารวจระบบใหม่ ค้นพบโลกใหม่ และค้นพบอารยธรรมที่ลืมได้ยาวนาน ผู้นําคนนี้เป็นสัญลักษณ์ของอุดมคตินี้ มักจะมองหาความรู้ที่หายไป หรือซากปรักหักพังที่ถูกลืม"
 leader_trait_frontier_adventurer_effect:1 "$t$เมื่อเสร็จสิ้นการสำรวจ:\n$tt$ได้รับการผลิต £society£§Y$society_research$§! เป็นเวลา 3 เดือน"
 leader_trait_brilliant_shipwright:0 "หัว เรือ ที่ ยอด เยี่ยม"
 leader_trait_brilliant_shipwright_desc:1 "ด้วย ความ รู้ อย่าง กว้าง ขวาง และ ความ เข้าใจ ที่ มี มา แต่ กําเนิด เกี่ยว กับ การ สร้าง เรือ ผู้ นํา คน นี้ ไม่ เพียง รับ ผิด ชอบ ต่อ เทคโนโลยี ใหม่ ๆ เท่า นั้น แต่ ยัง ต้อง ดู แล สวน เรือ ของ เรา ด้วย."
 leader_trait_truth_seeker:0 "นัก แสวง หา ความ จริง"
 leader_trait_truth_seeker_desc:1 "การแสวงหาความจริงคือการเปิดใจของหนึ่ง ความเป็นไปได้เกินขอบฟ้า; บางทีเกินม่านของความเป็นจริงของตัวเอง ผู้นําคนนี้มีความปรารถนาอย่างยิ่ง ที่จะค้นพบความลับทุกอย่างในจักรวาล ไม่ว่าจะเสี่ยงแค่ไหน"
 leader_trait_surveyor:0 "ตัววิเคราะห์ดาวเคราะห์"
 leader_trait_surveyor_desc:1 "การสํารวจขั้นสูง เทคนิคและเครื่องจักร ต้องการประสบการณ์ภาคสนามที่กว้างขวาง ความเชี่ยวชาญของผู้นําคนนี้ เปลี่ยนโลกให้กลายเป็นศิลปะ"
 leader_trait_surveyor_tt:0 "$ASSIST_RESEARCH_EFFECTS_TXT$:\n$t$$mod_planet_districts_generator_physics_research_produces_add$: §G+3§!\n$t$$mod_planet_districts_farming_society_research_produces_add$: §G+3§!\n$t$$mod_planet_districts_mining_engineering_research_produces_add$: §G+3§!"
 leader_trait_repair_crew:1 "วิศวกรธรรมชาติ"
 leader_trait_repair_crew_effect:0 "$SYSTEM_EFFECTS_TXT$:\n$t$เรือที่เป็นมิตรในระบบดาว:\n$tt$ซ่อมแซมจุดออดเดือน:§G+10%§!"
 leader_trait_repair_crew_desc:1 "ตามธรรมชาติของการซ่อมแซมสิ่งที่เสียหาย ผู้นํานี้เกือบจะเติบโตขึ้นในอ่าววิศวกรรม ความถนัดของพวกเขาทําให้พวกเขาเป็นผู้เชี่ยวชาญ ในการรักษาเรือ แม้จะไม่มีอู่เรือที่เหมาะสม"
 leader_trait_robotist:1 "พระเจ้า"
 leader_trait_robotist_desc:1 "ผู้นําคนนี้เป็นแชมป์ ของกระบวนการออกแบบและผลิตหุ่นยนต์ ผลักดันขอบเขตของสิ่งที่เป็นไปได้เสมอ ถ้า มี ความ ก้าว หน้า ใน หุ่น ยนต์ ที่ ใกล้ เข้า มา คน นี้ คง มี ส่วน เกี่ยว ข้อง ด้วย."
 leader_trait_knowledge_for_the_masses:0 "ตัวแก้ไขไดรฟ์"
 leader_trait_knowledge_for_the_masses_effect:0 "$t$งานวิจัยต่อป็อป:§G+$@trait_knowledge_masses_research_amt$§!"
 leader_trait_knowledge_for_the_masses_desc:1 "ไม่มีอะไรสําคัญไปกว่าการศึกษาที่เหมาะสม ผู้ นํา คน นี้ ไม่ มี ความ พยายาม ที่ จะ ปลูก ฝัง จิตใจ หนุ่ม สาว ซึ่ง ได้ รับ การ ช่วย เหลือ จาก การ ติด ตาม ผู้ สําเร็จ การ ศึกษา ที่ ทุ่มเท ตัว เอง."
 # Admiral
 leader_trait_fanatic:0 "ขุนศึกสุดเจ๋ง"
 leader_trait_fanatic_desc:1 "เพราะ เหตุ ใด? ถึง แม้ จะ มี ประสิทธิภาพ สูง ใน การ จัด การ กับ ความ ตาย ก็ ตาม ความ ประมาท เลินเล่อ ของ พวก เขา มัก นํา ไป สู่ ความ เสีย หาย สูง ทั้ง สอง ฝ่าย."
 leader_trait_reverse_engineer:0 "โปรแกรมสคาเวนเจอร์"
 leader_trait_reverse_engineer_effect:1 "$NAVAL_BATTLE_WON_TXT$:\n$t$โอกาสที่จะขโมยเทคโนโลยี:§Y33%§!\n$t$เริ่มการวิจัยความคืบหน้า:§G+50%§!\n$t$หมวดหมู่ที่ถูกต้อง:\n$tt$£engineering_research£ §Yการ ขับ ดัน§!\n$tt$£physics_research£ §Yอนุภาค§!"
 leader_trait_reverse_engineer_desc:0 "ความ กระตือรือร้น ใน การ กลั่น กรอง เทคโนโลยี ใหม่ ๆ และ ไม่ รู้ จัก กัน เสมอ มา นาย พล คน นี้ มี ความ รู้ กว้าง ขวาง และ มี จิตใจ ยืดหยุ่น บ่อย ครั้ง เขา เรียน รู้ งาน เมื่อ เผชิญ หน้า กับ ศัตรู ที่ ก้าว หน้า กว่า."
 leader_trait_supreme_admiral:0 "ผู้บัญชาการอาร์มาดา"
 leader_trait_supreme_admiral_desc:1 "กอง เรือ รบ นี้ สามารถ บังคับ กอง เรือ ที่ จะ แบก ภาระ หนัก เกิน ไป แก่ คน รุ่น เดียว กัน."
 leader_trait_armorer:0 "อาร์เมอร์อัจฉริยะ"
 leader_trait_armorer_desc:1 "ผู้นําคนนี้ได้คิดค้นวิธีการใหม่ ที่จะแข็งเกราะ มีอาวุธไม่กี่ชนิดในกาแล็กซี่ ที่สามารถเจาะเข้าไปในเรือที่สร้างด้วย[Root.GetHisHer]ออกแบบ"
 leader_trait_military_overseer:0 "ผู้ควบคุมดูแลการทหาร"
 leader_trait_military_overseer_desc:1 "องค์การ ทะเล เป็น งาน ที่ ยาก ต้อง มี การ วาง แผน อย่าง รอบคอบ และ มาตรฐาน ที่ สมบูรณ์. ประสบการณ์ของผู้นํานี้ เป็นทรัพย์สินที่ประเมินค่าไม่ได้ ในการสร้างกองทัพเรือที่มีประสิทธิภาพ"
 leader_trait_master_gunner:0 "อาจารย์กันเนอร์"
 leader_trait_master_gunner_desc:1 "พลเรือเอกที่เน้นการพัฒนาอาวุธอย่างหนัก พวกเขามักจะเก็บทั้งบุคคลและปืนของพวกเขา ในลําดับการทํางานที่สะอาด"
 leader_trait_demolisher_destiny:1 "ค้อนของจักรวรรดิ"
 leader_trait_demolisher_destiny_desc:1 "เป็นที่รู้จักกันสําหรับการตีอย่างหนักและตีที่มันเจ็บ ศัตรูของเราควรจะกลัว วันที่เรือเอกนี้เข้าร่วมการต่อสู้ การ นํา กอง เรือ ขนาด ใหญ่ เข้า สู่ การ สู้ รบ โดย มี ประสิทธิภาพ ที่ ไม่ มี ขีด จํากัด และ มี หลัก ฐาน ที่ ทํา ให้ ถึง ตาย มี ไม่ กี่ แห่ง ที่ ป้องกัน ได้."
 leader_trait_destiny_engineer:0 "ผู้บังคับการทหาร"
 leader_trait_destiny_engineer_desc:0 "ใน สงคราม อวกาศ ความ ผิด พลาด ใด ๆ ก็ อาจ ทํา ให้ ถึง ตาย ได้. ผู้ นํา คน นี้ ยืน กราน ให้ มี การ บํารุง รักษา อย่าง เข้ม งวด เพื่อ รักษา กอง เรือ ให้ อยู่ ใน สภาพ ที่ ดี เยี่ยม."
 leader_trait_guerilla_tactics:0 "ภาษากัวริลลาชื่อ"
 leader_trait_guerilla_tactics_desc:1 "กอง เรือ ขนาด ใหญ่ ไม่ ใช่ เครื่อง มือ ที่ ดี ที่ สุด เสมอ ไป สําหรับ งาน นี้. พลเรือเอกคนนี้เชี่ยวชาญในการสั่งการหน่วยย่อยๆ ให้ลดจํานวนคู่แข่งลงช้ากว่าหรือมากกว่า"
 leader_trait_survivalist:0 "โล่แห่งจักรวรรดิ"
 leader_trait_survivalist_desc:1 "อุปทานของผู้พิทักษ์, พลเรือเอกคนนี้เป็นหลักที่ตั้งอยู่บนแนวหน้า ขัดขวางศัตรูทุกคนที่กล้าเข้ามาในดินแดนของเรา"
 leader_trait_maven_of_war:0 "สถาปัตยกรรม แห่ง สงคราม"
 leader_trait_maven_of_war_desc:1 "ถือตําแหน่งนี้เป็นเกียรติยิ่ง พลโท ดัง กล่าว ไม่ เพียง แต่ มี ความ รู้ เกี่ยว กับ สงคราม มาก มาย เท่า นั้น แต่ ยัง เป็น ส่วน เชื่อม ที่ สําคัญ ยิ่ง กับ เพื่อน ร่วม งาน ใน แผนก วิทยาศาสตร์ ด้วย."
 leader_trait_peacekeeper:0 "ผู้รักษาสันติ"
 leader_trait_peacekeeper_desc:1 "ผู้นํานี้ตระหนักว่าเพื่อให้ความสงบสุข หนึ่งจะต้องหล่อแหกว้าง พลเรือเอกที่เก่งสุด เฝ้าดูพวกนอกรีต โจรสลัด และอาชญากรกระจอกๆ ที่มุ่งหาเส้นทางการค้าของเรา"
 # General
 leader_trait_supreme_warrior:0 "นักรบสูงสุด"
 leader_trait_supreme_warrior_effect:0 "$t$ทุก§Y10§!วันในการรบภาคพื้นดิน:\n$tt$โอกาสที่จะฆ่ากองทัพศัตรูทันที:§Y15%§!"
 leader_trait_supreme_warrior_desc:1 "ผู้นําคนนี้เป็นหนึ่งในผู้บังคับการไม่กี่คน ที่ได้รับตําแหน่งนี้ พวก เขา นํา กองทัพ ของ ตน มา ต่อ หน้า คน, สร้าง มิตรภาพ และ ครอบ งํา แม้ แต่ ศัตรู ที่ แข็ง แกร่ง ที่ สุด."
 leader_trait_fortress_cracker:0 "แครกเกอร์ป้อม"
 leader_trait_fortress_cracker_desc:1 "มันต้องใช้แรงรวมกัน เจ้าเล่ห์ และประสบการณ์ เพื่อยกระดับโครงสร้างการป้องกันที่ออกแบบมาอย่างดี ผู้ บัญชา การ คน นี้ ยินดี ใน การ ท้าทาย นี้ และ ประสบ ความ สําเร็จ ใน ที่ ซึ่ง คน อื่น ๆ จะ ยอม สละ สิ่ง นั้น เป็น สาเหตุ ของ การ สูญ เสีย."
 leader_trait_chainbreaker:0 "ผู้ทําลาย"
 leader_trait_chainbreaker_desc:1 "ไม่ ควร ให้ การ เป็น ทาส และ แสวง ประโยชน์ จาก คน อื่น. ชื่อเสียงของผู้นํานี้มาก่อนพวกเขา กับทาสและกดขี่"
 leader_trait_chainbreaker_effect:0 "$t$มี โอกาส วาง ไข่ 70%§G1§!กองทัพต่อ§Y$pop_cat_slave$§!บนดาวเคราะห์ที่ถูกโจมตี"
 leader_trait_honored_warmaster:0 "ขุนศึกผู้ทรงเกียรติ"
 leader_trait_honored_warmaster_desc:1 "นายศึกคือผู้บัญชาการผู้มีชื่อเสียง ผู้ นํา คน นี้ ปลูก ฝัง ความ หยิ่ง และ ความ กล้า หาญ ทํา ให้ ผู้ คน กระตือรือร้น ที่ จะ จับ อาวุธ และ เกณฑ์ ทหาร."
 leader_trait_honored_warmaster_effect:0 "$PLANET_EFFECTS_WHILE_DEFENDING_TXT$\n$t$นก นางแอ่น§G1§!กองทัพป้องกันต่อ§Y100§! £pop£ §Hไม่ใช้ดอกป๊อป§!"
 leader_trait_pilferer:0 "ขุนศึก"
 leader_trait_pilferer_effect:1 "$ARMY_EFFECTS_TXT$ §Eเมื่อชนะ§! §Yพื้นดินบุกรุก§!:\n$t$ทรัพยากรต่าง ๆ ที่สัมพันธ์กัน£district£ §Yพื้นที่§!:\n$tt$ §G+100§! §Yทรัพยากรพื้นฐาน§! £energy£ £minerals£ £food£\n$tt$ §G+50§! §Yทรัพยากรขั้นสูง§! £alloys£ £consumer_goods£\n$tt$ §G+25§! §Yจุดวิจัย§! £physics£ £society£ £engineering£"
 leader_trait_tzrynn_tithe: "ที ยอน ที"
 leader_trait_tzrynn_tithe_desc: "ในไทสเนียมันเป็นธรรมเนียมสําหรับผู้ชนะความขัดแย้งใด ๆ ที่จะใช้เวลาหนึ่งในสามของค่าผู้แพ้มากที่สุด กิล่า ซอมมอน รักษาประเพณีนี้เอาไว้"
 leader_trait_pilferer_desc:1 "ยิ่งโลกรวยเท่าไหร่ ก็ยิ่งมีของมีค่ามากขึ้นเท่านั้น ผู้นําคนนี้มีความสามารถ ในการแยกคุณค่าที่น้อยที่สุด"
 leader_trait_taskmaster:0 "ตัวจัดการงานใหญ่"
 leader_trait_taskmaster_desc:1 "หัวหน้างานไม่เพียงแค่มุ่งเน้นไปที่กลยุทธ์เท่านั้น แต่ต้องมุ่งเน้นไปที่แผนประจําประจําวันของทหารทุกคน"
 leader_trait_spymaster:0 "เงา"
 leader_trait_spymaster_desc:1 "แทน ที่ จะ เป็น สาย ลับ ธรรมดา ผู้ นํา คน นี้ หมุน เครือ ข่าย ข้อมูล, นัก ลักลอบ, และ นัก ลอบ สังหาร. เมื่อบางสิ่งต้องทําอย่างเงียบๆ สิ่งนี้จะพิสูจน์ให้เห็นว่า มีทรัพย์สินมหาศาล"
 leader_trait_totalitarian:0 "ผู้ ป่าวประกาศข่าวจักรวรรดิ"
 leader_trait_totalitarian_desc:2 "เฮ รัลด์ เป็น นัก เล่น ที่ เก่ง มาก ใน เกม ที่ ยิ่ง ใหญ่ ของ ชาติ ต่าง ๆ. นัก การ ทูต ดัง กล่าว ให้ ความ เกี่ยว พัน ที่ ไว้ ใจ ได้ ระหว่าง เจ้า นาย กับ บึง ดิน."
 leader_trait_bellicose:0 "หัวหน้ากองกลาง"
 leader_trait_bellicose_effect: "$EMPIRE_EFFECTS_TXT$:\n$t$ทุก 100 คน[Leader.GetLeaderSoldierJobType]:\n$tt$$MOD_COUNTRY_NAVAL_CAP_ADD$: §G+2§!\n$tt$$MOD_DEFENSE_ARMIES_ADD$: §G+0.5§!"
 leader_trait_bellicose_desc:1 "ด้วยความฉลาดด้านการใช้ไม้บรรทัด ผู้บัญชาการนี้รักษา ประสิทธิภาพของปฏิบัติการทางทหาร ด้วยวิธีแก้ปัญหาที่ง่ายและหลอกลวง"

 # Special Traits
 leader_trait_erudite: "เอรูดท์"
 leader_trait_erudite_desc:1 "ผู้ นํา คน นี้ มี เชาวน์ ปัญญา มาก มาย และ มี ความ รู้ ลึก ซึ้ง."
 leader_trait_cyborg:0 "ไซบอร์ก"
 leader_trait_cyborg_desc:0 "ผู้นํารายนี้ได้รับการต่อเติมอย่างหนัก ด้วยอวัยวะภายใน"
 leader_trait_synthetic: "สังเคราะห์แสง"
 leader_trait_synthetic_desc:0 "ผู้นําสังเคราะห์ตัวนี้ มีชุดสะสมการอัพเกรดขนาดใหญ่"
 leader_trait_psionic:0 "มีญาณทิพย์"
 leader_trait_psionic_desc:1 "ผู้นําคนนี้มีพลังที่ทรงพลัง"
 leader_trait_chosen: "[GetChosenName]"
 leader_trait_chosen_desc: "[GetChosenDesc]"
 leader_trait_chosen_default: "คน ที่ ถูก เลือก"
 leader_trait_chosen_default_desc: "ผู้นําคือ$leader_trait_chosen$นิรันดร์ที่มีประสิทธิภาพเหลือเชื่อ"
 leader_trait_chosen_gestalt: "หอย มัส เซิล"
 leader_trait_chosen_gestalt_desc: "ผู้นําคือ$leader_trait_chosen_gestalt$สิ่งมีชีวิตอมตะที่ใช้พลังไซโอนิคที่สําคัญ"
 leader_trait_whisperers_chosen:0 "ผู้ถูกเลือกจากผู้กระซิบ"
 leader_trait_whisperers_chosen_desc:1 "ผู้นํานี้ได้รับเลือกให้ใช้อํานาจ ขององค์กรที่ไม่สามารถเปลี่ยนแปลงได้ ค้ําจุนโดยพลังงานไซโอนิค ปัจจุบันความตายเป็นต่างประเทศสําหรับพวกเขา"
 leader_trait_eater_chosen:0 "ผู้ถูกเลือกจากผู้ทำลาย"
 leader_trait_eater_chosen_desc:0 "$leader_trait_whisperers_chosen_desc$"
 leader_trait_composer_chosen:0 "ผู้ถูกเลือกจากผู้สร้าง"
 leader_trait_composer_chosen_desc:0 "$leader_trait_whisperers_chosen_desc$"
 leader_trait_instrument_chosen:0 "ผู้ถูกเลือกจากผู้บรรเลงดนตรี"
 leader_trait_instrument_chosen_desc:0 "$leader_trait_whisperers_chosen_desc$"

