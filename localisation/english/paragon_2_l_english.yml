 civic_memory_vault_corporate_desc:1 "ความ รู้, หลัก การ, และ ประสบการณ์ ของ ผู้ คน ที่ โดด เด่น ได้ รับ การ ปรับ ปรุง เป็น แบบ ดิจิตอล และ สะสม ไว้ ใน แหล่ง แห่ง ความ รู้. ประชาชนสามารถเข้าถึงแหล่งของปัญญาและประสบการณ์นี้ เพื่อเรียนรู้จากผีในอดีต สําหรับราคา แน่นอน"

