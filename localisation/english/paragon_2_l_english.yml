 war_goal_wg_plunder_raid_desc:0 "สงครามคือการบุกปล้นและปล้นศัตรู การใช้สงครามนี้จะเป็นการปล้น$r_energy$ถึง$r_minerals$จากเป้าหมาย"

 civic_task_delegation_corporate:1 "ฟันเฟืองที่ถูกต้องและแม่นยำ"
 civic_task_delegation_corporate_desc:1 "อภิสิทธิ์ นี้ ดําเนิน การ ใน ระบบ ที่ ดี เยี่ยม และ มั่นคง ของ ตัว แทน. วิธี นี้ หมาย ความ ว่า คน งาน ที่ มี คุณวุฒิ มาก ที่ สุด จะ ทํา เสมอ."
 civic_tooltip_task_delegation_corporate_effects: "- นั่น£building£ §Y$building_executive_retreat$§! $megacorp_civic_branch_office_building_effect$"

 civic_private_healthcare_corporate:1 "รัฐยาและเภสัชกรรม"
 civic_private_healthcare_corporate_desc:1 "ประเทศที่เข้มแข็งเป็นชาติที่แข็งแรง ความวุ่นวายนี้รักษาเศรษฐกิจที่ทนทาน ผ่านการทดลองยา, คลินิกที่มีคุณภาพสูง,"
 civic_tooltip_civic_private_healthcare_corporate_effects:3 "- £building£ §Yอาคาร เมือง หลวง§!ให้§G+100§! [healthcare.GetIcon] §Y[healthcare.GetName]§!งาน\n- $r_amenities$จาก[healthcare.GetIcon] §Y[healthcare.GetNamePlural]§!: §G+2§!\n- $r_trade$จาก[healthcare.GetIcon] §Y[healthcare.GetNamePlural]§!: §G+4§!\n- สร้างได้£building£ §Y$building_corporate_clinics$§! $BRANCH_OFFICE_BUILDING$\n- นั่น£building£ §Y$building_corporate_clinics$§! $megacorp_civic_branch_office_building_effect$"

 civic_machine_upkeep_twister:1 "วงจรผู้ปกครองสูงสุด"
 civic_machine_upkeep_twister_desc:1 "หน่วยที่ผลิตโดยหน่วยสืบราชการลับนี้ มาพร้อม ซอฟต์แวร์การตัดสินใจอัตโนมัติ มีประสิทธิภาพและมีประสิทธิภาพมากกว่ารุ่นเก่า อย่างไรก็ตามหน่วยเหล่านี้ต้องใช้พลังงานมากขึ้น"
 civic_tooltip_machine_upkeep_twister_effects:2 "เปลี่ยนค่าบำรุงรักษาผู้นำจากเดิม §Y1§! $r_unity$ เป็น §Y2§! $r_energy$ แทน"


 civic_hive_upkeep_twister:0 "โดรนอัตโนมัติ"
 civic_hive_upkeep_twister_desc:1 "หุ่นยนต์ไฮเปอร์เมตาเมตเมตาเมต พัฒนาขึ้นในอาณานิคมนี้ มีความเป็นอิสระเพิ่มขึ้น ในขณะที่การตัดสินใจ และการประเมินสถานการณ์ได้เพิ่มขึ้น โดรนเหล่านี้ต้องการการบริโภควัสดุที่ย่อยได้เพิ่มขึ้น"
 civic_tooltip_hive_upkeep_twister_effects:2 "เปลี่ยน§Y1§!ฐาน$r_unity$ ผู้นำส่งต่อไปยัง§Y2§! $r_food$, $r_minerals$หรือ§Y1§! $r_alloys$"
 civic_wilderness_upkeep_twister: "เครื่อง มือ ใหม่"
 civic_wilderness_upkeep_twister_desc: "หมอกที่มีความสามารถที่โดดเด่นของรูปแบบสัญลักษณ์ได้วิวัฒนาการภายในป่านี้ กําลังพัฒนาอย่างรวดเร็วมากขึ้น"

 civic_heroic_tales:0 "วีรบุรุษในตำนาน"
 civic_heroic_tales_desc:1 "วีรบุรุษในตํานานของอดีต เป็นแรงบันดาลใจของแต่ละรุ่นใหม่ เพื่อบรรลุความพิเศษ ในฐานะผู้เป็นแบบอย่าง ทางราชการได้แสดงอุดมการณ์เหล่านี้"
 civic_heroic_tales_effects:0 "$tr_aptitude_adopt_desc$"

 civic_dystopian_society:1 "ระบอบเผด็จการกดขี่"
 civic_dystopian_society_desc:1 "เฉพาะชนชั้นนําเท่านั้น ที่สมควรได้รับสิ่งที่ดีที่สุด มี การ คาด หมาย ให้ คน อื่น ทุก คน มี ส่วน ร่วม ใน การ ปกครอง และ การ ขาด แคลน."
 civic_tooltip_dystopian_society_effects:1 "- £job_enforcer£ $job_enforcer_plural$คือ£pop_cat_ruler£ §Y$pop_cat_ruler_plural$§!แทน£pop_cat_specialist£ §Y$pop_cat_specialist_plural$§!\n- เท่านั้น£pop_cat_ruler£ §Y$pop_cat_ruler_plural$§!สามารถผลิต$r_amenities$และมี$r_amenities$เลื่อนลง\n- กองทัพ§Y$living_standard_dystopian_society$§!เป็นมาตรฐานที่อยู่ภายใต้ที่§Yไม่...$pop_cat_ruler$§! ประชากรได้ลดลง$r_consumer_goods$เลื่อนลง\n- §Yไม่ใช่$pop_cat_ruler$§! ประชากรสร้างเพิ่มเติม£crime£ §Y$PLANET_CRIME_TITLE$§!\n- ไม่สามารถสร้างได้£building£ §Y['building_holo_theatres']§!"
 district_hab_cultural_dystopian_desc:0 "อําเภอเหล่านี้ให้ผู้บังคับงาน กับการบรรเทาทุกข์และความบันเทิง"

