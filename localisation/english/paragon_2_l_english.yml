 leader_desc_commander: "§Eสามารถแต่งตั้ง §Hผู้บัญชาการ§! ให้คุม §Hกองยานรบ§!, §Hกองทัพบก§! หรือปกครอง §Hดาวเคราะห์§! ควบคู่ไปกับ §Hตำแหน่งในสภา§! ในเวลาเดียวกันได้§!"
 leader_desc_admiral:0 "§Eสามารถแต่งตั้ง §Hพลเรือเอก§! ให้คุม §Hกองยานรบ§! ควบคู่ไปกับ §Hตำแหน่งในสภา§! ในเวลาเดียวกันได้§!"
 leader_desc_scientist: "§Eสามารถแต่งตั้ง §Hนักวิทยาศาสตร์§! ให้คุม §Hยานวิจัยวิทยาศาสตร์§! หรือปกครอง §Hดาวเคราะห์§! ควบคู่ไปกับ §Hตำแหน่งในสภา§! ในเวลาเดียวกันได้§!"
 leader_desc_general:0 "§Eสามารถแต่งตั้ง §Hพลเอก§! ให้คุม §Hกองทัพบก(จู่โจม)§! ควบคู่ไปกับ §Hตำแหน่งในสภา§! ในเวลาเดียวกันได้§!"
 leader_desc_governor:0 "§Eสามารถแต่งตั้ง §Hผู้ว่าการ§! ให้ปกครอง §Hดาวเคราะห์§! ควบคู่ไปกับ §Hตำแหน่งในสภา§! ในเวลาเดียวกันได้§!"
 leader_desc_official: "§Eสามารถแต่งตั้ง §H$official_plural$§! ให้เป็นตัวแทนและดูแลผลประโยชน์ของเราใน §Hสหพันธ์§! หรือ §H[GetCommunityOrImperium]§! หรือปกครอง §Hดาวเคราะห์§! ควบคู่ไปกับ §Hตำแหน่งในสภา§! ในเวลาเดียวกันได้§!"

