 # Civics
 civic_tooltip_memory_vault_effects:1 "สามารถสร้างเอกลักษณ์ได้£building£ §Y$building_paragon_memory_vaults$§!\n£building£§Y$building_paragon_memory_vaults$§!ผลิต$r_unity$และเพิ่มขึ้น§Y$MOD_LEADER_SPECIES_EXP_GAIN$§!จาก§Yยานยานยานยาน Destiny§!ได้มาแล้ว"
 civic_memory_vault:0 "ห้องนิรภัยสำหรับเก็บความรู้"
 civic_memory_vault_desc:1 "ความ รู้, หลัก การ, และ ประสบการณ์ ของ ผู้ คน ที่ โดด เด่น ได้ รับ การ ปรับ ปรุง เป็น แบบ ดิจิตอล และ สะสม ไว้ ใน แหล่ง แห่ง ความ รู้. ประชาชนสามารถเข้าถึงแหล่งของปัญญาและประสบการณ์นี้ เพื่อเรียนรู้จากผีในอดีต"

 civic_tooltip_memory_vault_corporate_effects:1 "สามารถสร้างเอกลักษณ์ได้£building£§Y $building_paragon_memory_vaults$§!\n£building£§Y$building_paragon_memory_vaults$§!ผลิต$r_unity$ถึง$r_trade$จาก§Yยานยานยานยาน Destiny§!ได้มาแล้ว\nเดอะ£building£ §Y$building_commercial_forum$§! $megacorp_civic_branch_office_building_effect$"
