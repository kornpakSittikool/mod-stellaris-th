 NAME_Sursect:0 "Sursect"
 unique_planet_no_terraform:0 "ดาวเคราะห์ไม่เสถียรเกินไปสําหรับกระบวนการแปลง"
 NAME_Overlord_Empire:0 "Automated Fleet"
 NAME_Overlord_Enforcers:0 "Enforcers"
 d_volcanic_active_planet:0 "กิจกรรมของภูเขาไฟ"
 d_volcanic_active_planet_desc:1 "ภูเขาไฟที่ทํางานอยู่ ละลายแร่ธาตุใต้ดิน ทําให้เกิดทรัพยากรมากขึ้น"
 d_hostile_fauna:0 "สัตว์ ป่า ที่ ก้าวร้าว"
 d_hostile_fauna_desc:1 "สัตว์ ป่า ที่ ดุ ร้าย เสาะ หา เหยื่อ บน พื้น ดิน. การ จัด การ จําเป็น ต้อง มี การ ป้องกัน มาก ขึ้น เพื่อ ลด การ คุกคาม นี้."
 d_hostile_flora:0 "ก้าวร้าว ฟลอรา"
 d_hostile_flora_desc:0 "สัตว์ป่าที่ก้าวร้าวได้โตเกินดินแดนนี้ ตามล่าเหยื่อ เจ้าหน้าที่รักษาความปลอดภัยออกเพื่อให้โตเกินขนาดในการตรวจสอบ"
 d_space_ship_graveyard:0 "เรือ ที่ ผิด พลาด"
 d_space_ship_graveyard_desc:0 "เรือเก่าทําให้ดาวเคราะห์มีขยะ จํากัด การดําเนินงานเหมืองแร่ที่เป็นไปได้ในพื้นที่ แต่ มัน ให้ แหล่ง ที่ มา ของ อัล ลอย ได้ ง่าย."
 d_fallen_orbital_shipyard:0 "ท่าเรือฟอลเลน"
 d_fallen_orbital_shipyard_desc:0 "ซากปรักหักพังของอู่เรือออร์บิทัลโบราณ ปกคลุมพื้นโลก เครื่อง ยนต์ เหล่า นี้ ทํา งาน อย่าง ไร?"
 d_pulsar_scarred:0 "แผ่น ดิน ที่ ถูก ทํา ให้ กลัว"
 d_pulsar_scarred_desc:0 "เป็น ไป ไม่ ได้ ที่ จะ ใช้ ดิน แดน ที่ ถูก ไฟ ไหม้ และ ที่ ลุ่ม ชื้น แฉะ นอก เหนือ จาก การ ควบคุม พลัง งาน ที่ อาจ มี อยู่ ได้ จาก พลุ ไฟ ประจํา ปี."
 d_ancient_facilities:0 "สีสันโบราณ"
 d_ancient_facilities_desc:0 "อาคาร สมัย โบราณ เหล่า นี้ มี ข้อมูล วิจัย เกี่ยว กับ พืด หินปูน, เทคโนโลยี ป้องกัน, และ การ สกัด พลังงาน จาก ดวง อาทิตย์ ที่ อันตราย ที่ สุด."
 molten_mineral_rivers:0 "แม่น้ํา ไน เจล"
 molten_mineral_rivers_desc:0 "ดาว เคราะห์ ดวง นี้ ได้ รับ ความ เสีย หาย จาก การ ระเบิด ของ ภูเขา ไฟ บ่อย ๆ และ มี ลาวา หล่อ ลื่น มาก มาย ไหล ผ่าน เปลือก ชั้น ใน ของ มัน ซึ่ง เป็น เครื่อง มือ ใน การ นํา แร่ ธาตุ มา ใช้ ใน การ ดําเนิน งาน บน ดาว เคราะห์ ดวง นี้."
 hostile_planet:0 "ศัตรูดาวเคราะห์"
 hostile_planet_desc:0 "บนดาวเคราะห์ดวงนี้ พืชพันธุ์และสัตว์น้ํา วิวัฒนาการมาเป็นโครงการล่าสัตว์ พวก มัน ให้ สาร อาหาร มาก มาย แต่ ก็ จะ เสาะ หา สิ่ง มี ชีวิต อื่น ๆ อย่าง กระตือรือร้น ด้วย เพื่อ หา อาหาร."
 ship_junkyard:0 "อู่ต่อเรือ"
 ship_junkyard_desc:0 "ดาวเคราะห์ดวงนี้เต็มไปด้วยเรือที่เสื่อมโทรม และอู่เรือออร์บิทัลที่ล่มสลาย มันสร้างสถานที่ดีๆ สําหรับหาโลหะมีค่า รวมถึงเทคโนโลยีเก่า"
 pulsar_frying_pan:0 "พัล ซาร์"
 pulsar_frying_pan_desc:0 "ครึ่งหนึ่งของดาวเคราะห์ ถูกทําลายโดยดาวลูกทุ่งที่อยู่ใกล้เคียง มันเปลี่ยนพื้นผิวนี้ ให้กลายเป็นที่รกร้างว่างเปล่าที่อาศัยอยู่ได้ แต่มันช่วยให้โรงงานวิจัยของเรา ทํางานด้านเทคโนโลยีพลังงานได้"

