 pheromoned_3:0 "ติดฟีโรโมน ระยะที่สาม"
 pheromoned_3_desc:0 "ละอองเกสรในชั้นบรรยากาศทำปฏิกิริยากับตัวรับฟีโรโมนของประชาชนคุณ ทำให้พวกเขามีแนวโน้มจะอพยพน้อยลง"
 pheromoned_4:0 "ติดฟีโรโมน ระยะที่สี่"
