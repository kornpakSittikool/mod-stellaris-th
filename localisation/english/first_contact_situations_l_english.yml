 ### Plague Situation
 situation_pre_ftl_plague:0 "โรคระบาดจากสัตว์สู่คน"
 situation_pre_ftl_plague_type:0 "โรคระบาดจากสัตว์สู่คน"
 situation_pre_ftl_plague_desc:1 "โรคจากสัตว์สู่คนชนิดใหม่ได้ปรากฏขึ้นบน [Target.GetName] โดยไม่มีภูมิคุ้มกันตามธรรมชาติหรือเทคโนโลยีทางการแพทย์ที่จำเป็นในการต่อกรกับการติดเชื้อ ประชากรจึงกำลังพ่ายแพ้ต่อความทุกข์ทรมานและความตายอย่างรวดเร็ว"
 situation_pre_ftl_plague_monthly_change_tooltip:0 "ความคืบหน้าของ §Yสถานการณ์§! นี้ไม่ได้อยู่ในมือของเรา"
 situation_pre_ftl_plague_outcome_tooltip:0 "ไม่ทางใดก็ทางหนึ่ง โรคระบาดนี้จะต้องจบลง สิ่งที่เหลืออยู่หลังจากนั้นอาจขึ้นอยู่กับเราอย่างมาก"

