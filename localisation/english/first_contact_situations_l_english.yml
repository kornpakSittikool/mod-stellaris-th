 ## Events

 # Starting event
 preftl.2001.name:0 "การระบาด"
 preftl.2001.can_not_help.desc:1 "$preftl.2001.can_help.desc$\n\nนโยบายของเราคือไม่แทรกแซงโลก [owner.GetPreFTLLower] แต่เราจะยืนดูผู้คนเหล่านี้ทุกข์ทรมานเฉย ๆ ได้จริงหรือ?"
 preftl.2001.can_help.desc:1 "โรคจากสัตว์สู่คนชนิดใหม่ได้ปรากฏขึ้นบน [from.owner.capital_scope.GetName] โดยไม่มีเทคโนโลยีทางการแพทย์ที่จำเป็นในการต่อกรกับการติดเชื้อ ประชากรจึงกำลังพ่ายแพ้ต่อความทุกข์ทรมานและความตายอย่างรวดเร็ว"
 preftl.2001.perpetrator.desc:1 "โรคที่เรานำเข้าไปยังประชากรผู้ไม่รู้อิโหน่อิเหน่ได้แพร่กระจายเกินการควบคุมของเรา โดยไม่มีเทคโนโลยีทางการแพทย์ที่จำเป็นในการต่อกรกับการติดเชื้อ ผู้คนบนดาวเคราะห์ดวงนี้จึงกำลังพ่ายแพ้ต่อความทุกข์ทรมานและความตายอย่างรวดเร็ว"
 preftl.2001.a:0 "เฝ้าดูและเรียนรู้"
 approach_watch_tooltip:0 "การสังเกตสถานการณ์นี้น่าจะให้ข้อมูลเชิงลึกที่น่าสนใจ เมื่อเลือกแล้ว เราจะไม่สามารถเปลี่ยนแนวทางนี้ได้อีก"
 approach_singularity_tooltip_fail:0 "สายเกินไปที่จะเปลี่ยนแนวทางของเรา"
 preftl.2001.b:0 "ให้ความช่วยเหลือ"
 approach_aid_tooltip:0 "เป็นความรับผิดชอบของเราที่จะช่วยผู้ที่ต้องการความช่วยเหลือ เมื่อเลือกแล้ว เราจะไม่สามารถเปลี่ยนแนวทางนี้ได้อีก"
 preftl.2001.c:0 "ส่งเสริมโรค"
 approach_promote_disease_tooltip:0 "โรคระบาดนี้เป็นโอกาสวิจัยอันไม่เหมือนใคร และอาจเป็นโอกาสในการชำระล้างสิ่งมีชีวิตทรงปัญญาบนดาวทั้งดวงด้วย เมื่อเลือกแล้ว เราจะไม่สามารถเปลี่ยนแนวทางนี้ได้อีก"

 preftl.2006.name:0 "คลั่งศาสนา"
 preftl.2006.desc.intro:0 "โรคจากสัตว์สู่คนบน [Target.GetName] ยังคงแพร่กระจายต่อไป ตอนนี้ชุมชนหลักส่วนใหญ่ของทั้งดาวเคราะห์ต่างติดเชื้อแล้ว และเมื่ออัตราการเสียชีวิตยังคงสูงขึ้น ขนาดของหายนะครั้งนี้"
 preftl.2006.desc:0 "$preftl.2006.desc.intro$ ได้ส่งผลให้ลัทธิทางศาสนาและกลุ่มบูชาวันสิ้นโลกแพร่ขยายอย่างระเบิดระเบ้อ"
 preftl.2006.a:0 "ชี้นำพวกเขาไปสู่ศรัทธาที่แท้จริง"
 plague_01_spiritualist:0 "ผู้ศรัทธาอันแรงกล้า"
 plague_01_spiritualist_desc:0 "ในยามที่ยากลำบากที่สุด ผู้หลงทางย่อมพบความปลอบประโลมในจิตวิญญาณ"
 plague_01_militarist:0 "ผู้ศรัทธาอันแรงกล้า"
 plague_01_militarist_desc:0 "ในยามที่ยากลำบากที่สุด ผู้หลงทางย่อมพบความปลอบประโลมในจิตวิญญาณ"


 preftl.2007.name:0 "การผงาดของจอมศึก"
 preftl.2007.desc:0 "$preftl.2006.desc.intro$ นั้นไม่เคยเกิดขึ้นมาก่อน และไม่น่าแปลกใจนักที่มีจอมศึกจำนวนมากลุกขึ้นมาเติมเต็มสุญญากาศแห่งอำนาจ"
 preftl.2007.a:0 "หนุนหลังผู้แข็งแกร่งที่สุด"

 preftl.2008.name:0 "เทวทูตแห่งความเมตตา"
 preftl.2008.desc:0 "ความพยายามของเราในการช่วยป้องกันการแพร่ระบาดบน [Target.GetName] ไม่ได้ผ่านไปโดยไม่มีใครสังเกต: ประชากรท้องถิ่นเริ่มพูดถึง “เทวทูต” สิ่งมีชีวิตผู้รู้แจ้งที่ปรากฏตัวขึ้นท่ามกลางพวกเขาเพื่อมอบความปลอบโยนและการไถ่บาป"
 preftl.2008.a:0 "เรื่องแบบนี้ต้องเกิดขึ้นอยู่แล้ว"

 preftl.2009.name:0 "ผู้รุกรานจากปีศาจ"
 preftl.2009.desc:0 "งานของเราในการควบคุมการแพร่ระบาดบน [Target.GetName] กำลังดึงดูดความสนใจ: ประชากรท้องถิ่นเริ่มพูดถึง “ปีศาจ” สิ่งมีชีวิตอัปมงคลที่ปรากฏตัวขึ้นท่ามกลางพวกเขาเพื่อต่อกรกับโรคด้วยเวทมนตร์อันลบหลู่"

 preftl.2010.name:0 "การแพร่เชื้อไม่ยั้ง"
 preftl.2010.desc:0 "ความพยายามของเราในการส่งเสริมโรคระบาดบน [Target.GetName] กำลังเห็นผล ด้วยการปนเปื้อนแหล่งอาหารท้องถิ่นอย่างแนบเนียน เชื้อโรคกำลังระบาดอย่างไม่อาจควบคุมได้ ตอนนี้ทุกชุมชนบนดาวเคราะห์ติดเชื้อหมดแล้ว และผู้ที่ยังมีชีวิตก็อ่อนแอเกินกว่าจะจัดการศพได้"
 preftl.2010.a:0 "พอแล้ว ความทุกข์ทรมานนี้ต้องจบลง"
 tt_end_the_suffering:0 "การยุติโรคระบาดตอนนี้จะเปิดเผยการมีอยู่ของเรา และต้องใช้ทรัพยากรจำนวนมาก"
 d_mass_graves:0 "หลุมศพหมู่"
 d_mass_graves_desc: "หลังจากโรคระบาดระดับหายนะกวาดล้างประชากรโลก สิ่งที่เหลืออยู่มีเพียงความเงียบงันสุดสายตา ภูมิทัศน์อันว่างเปล่าที่ถูกครอบครองโดยดวงวิญญาณที่สูญหายนับไม่ถ้วน"

 preftl.2011.name:0 "ผู้แข็งแรงอยู่รอด"
 preftl.2011.desc:0 "ความพยายามของเราในการส่งเสริมโรคระบาดบน [Target.GetName] กำลังเห็นผล เชื้อโรคกำลังระบาดอย่างไม่ยั้ง และศพผู้ตายก็ถูกปล่อยให้เน่าอยู่ตามท้องถนน\n\nอย่างไรก็ตาม ประชากรจำนวนไม่น้อยมีภูมิคุ้มกันตามธรรมชาติต่อโรคนี้ การศึกษาจีโนมของพวกเขาเพิ่มเติมอาจมีประโยชน์ต่อการวิจัยภูมิคุ้มกันวิทยาของเราเอง"
 preftl.2011.a:0 "เอาตัวอย่างมา"

 preftl.2020.name.outro:0 "การช่วยเหลือต่อไปพร้อมทั้งปิดบังธรรมชาติที่แท้จริงของเราจะต้องใช้ทรัพยากรจำนวนมาก"
 preftl.2020.name:0 "ความต้องการล้นหลาม"
 preftl.2020.desc:0 "ข่าวเรื่อง “เทวทูต” ผู้ทำงานอยู่บน [Target.GetName] ยังคงแพร่กระจายต่อไป ผู้ลี้ภัยแห่กันมาหาผู้ให้บริการสุขภาพของเรา เรียกร้องความช่วยเหลืออย่างอลหม่าน $preftl.2020.name.outro$"
 preftl.2020.a:0 "ความลับต้องมาก่อน"
 preftl.2020.b:0 "บอกความจริงแก่พวกเขา"

 preftl.2021.name:0 "พลังแห่งศรัทธา"
 preftl.2021.desc:1 "ข่าวเรื่อง “ปีศาจ” ผู้ทำงานอยู่บน [Target.GetName] ยังคงแพร่กระจายต่อไป พวกคลั่งศรัทธาแห่กันมาหาผู้ให้บริการสุขภาพของเรา เรียกร้อง [Root.GetBloodType] กันอย่างอลหม่าน $preftl.2020.name.outro$"

 preftl.2025.name:0 "อาการเมสสิยาห์"
 preftl.2025.desc:0 "บน [Target.GetName] ผู้ที่เรียกตนว่าเมสสิยาห์จำนวนหนึ่งได้ปรากฏตัวขึ้น แต่ละคนสั่งสมผู้ติดตามจำนวนมากด้วยคำสัญญาถึง “การปลดปล่อยศักดิ์สิทธิ์” นอกจากความพินาศจากโรคแล้ว การปะทะอย่างรุนแรงระหว่างลัทธิที่แข่งขันกันก็กลายเป็นเรื่องปกติมากขึ้นเรื่อย ๆ"
 preftl.2025.a:0 "หนทางแห่งสัจธรรมศักดิ์สิทธิ์นั้นคดเคี้ยว"

 preftl.2026.name:0 "ศาสดาที่แท้จริง"
 preftl.2026.desc:0 "ในที่สุดโรคระบาดบน [Target.GetName] ก็สิ้นสุดลง และงานของเราที่นั่นก็ได้รับรางวัล: ผู้รอดชีวิตได้รวมตัวกันรอบศาสดาแห่งศรัทธาที่แท้จริง ด้วยความสำนึกบุญคุณ คณะสงฆ์ยินดีจะมอบผู้แทนผู้สามารถคนหนึ่งให้กับเรา ซึ่งทักษะด้านการบริหารของเขาว่ากันว่าโดดเด่นอย่างยิ่ง"
 preftl.2026.a:0 "สรรเสริญแด่พระผู้เป็นเจ้า"
 plague_03_spiritualist:0 "เป้าหมายอันชอบธรรม"
 plague_03_spiritualist_desc:0 "อีกหนึ่งสังคมได้ตื่นขึ้นสู่ศรัทธาที่แท้จริงแล้ว สาส์นของเราก้องไปทั่วกาแล็กซี"
 plague_03_militarist:0 "เป้าหมายอันชอบธรรม"
 plague_03_militarist_desc:0 "อีกหนึ่งดาวเคราะห์ในกาแล็กซีอันโหดร้ายนี้ บัดนี้สามารถปกป้องตนเองได้แล้ว"
 true_prophet_tt:0 "อย่างเป็นทางการผู้มีทักษะคนหนึ่งยินยอมเข้าร่วมจักรวรรดิของเรา"
 leader_trait_zealot:0 "ผู้ศรัทธาอันแรงกล้า"
 leader_trait_true_prophet_desc:0 "เมื่อได้จ้องมองลงไปในห้วงลึก ผู้นำผู้นี้จึงมีศรัทธาที่ไม่อาจสั่นคลอน"
 leader_trait_zealot_desc:0 "เมื่อได้จ้องมองลงไปในห้วงลึก ผู้นำผู้นี้จึงมีศรัทธาที่ไม่อาจสั่นคลอน"

 preftl.2030.name:0 "ธงอันขาดรุ่งริ่ง"
 preftl.2030.desc:0 "บน [Target.GetName] ประชากรที่เหนื่อยล้า หิวโหย ป่วยไข้ และแทบเสียสติจากความโศกเศร้ากับสงครามไม่รู้จบ กำลังโซซัดโซเซไปสู่อนาคตอันไม่แน่นอน"
 plague_05:0 "ธงอันขาดรุ่งริ่ง"
 plague_05_desc:0 "เมื่อวิกฤตกลายเป็นเรื่องปกติ เหยื่อก็มีทางเลือกเพียงต่อสู้หรือล้มลง"

 preftl.2031.name:0 "ธงเจิดจ้า"
 preftl.2031.desc:0 "โรคระบาดบน [Target.GetName] ได้สิ้นสุดลงแล้ว และฝ่ายที่เราให้การสนับสนุนก็สามารถรวมประชากรไว้ใต้ธงเดียวได้สำเร็จ ด้วยความสำนึกในความพยายามของเรา คณะรัฐบาลทหารผู้ปกครองเสนอจะมอบผู้บัญชาการคนหนึ่งให้เรา ผู้ซึ่งทักษะในสนามรบพิสูจน์แล้วว่าน่าเกรงขาม"
 preftl.2031.a:0 "พลังคือความชอบธรรม"
 brilliant_banner_tt:0 "ผู้บัญชาการผู้มีทักษะคนหนึ่งยินยอมเข้าร่วมจักรวรรดิของเรา"
 leader_trait_plague_hardened:0 "ผู้บัญชาการผู้ผ่านโรคระบาด"
 leader_trait_plague_hardened_desc:0 "เมื่อได้จ้องมองลงไปในห้วงลึก ผู้บัญชาการคนนี้จึงมีจิตใจเฉียบคมและถูกหล่อหลอมมาอย่างดี"

 preftl.2035.name:0 "วันสิ้นโลก ณ บัดนี้"
 preftl.2035.desc:0 "ด้วยการส่งเสริมอย่างพิถีพิถันของเรา โรคระบาดบน [Target.GetName] ได้กวาดล้างประชากรไปอย่างหนัก ผู้ที่รอดชีวิตเพียงหยิบมือกำลังเผชิญกับการล่มสลายของอารยธรรมของตน การผลักพวกเขาให้ตกขอบเหวไปอีกขั้นไม่จำเป็นต้องใช้ความพยายามมากนัก\n\nเรากำลังจะได้รับมรดกเป็นโลกที่ว่างเปล่า"

 preftl.2040.name:0 "ภูมิคุ้มกันที่เสริมขึ้น"
 preftl.2040.desc:0 "ตัวอย่างที่เราได้มาจาก [Target.GetName] ได้สร้างผลตอบแทนทางวิทยาศาสตร์แล้ว การกลายพันธุ์ที่มอบภูมิคุ้มกันต่อโรคระบาดดูเหมือนจะสามารถป้องกันโรคติดต่อส่วนใหญ่ที่เรารู้จักได้\n\nการนำงานวิจัยนี้ไปใช้จะต้องใช้เวลา แต่ผลลัพธ์เบื้องต้นนั้นน่าสนับสนุนเกินพอ"

 preftl.2049.name:0 "สถานการณ์ที่เปลี่ยนไป"
 preftl.2049.desc:0 "สถานการณ์บน [Target.GetName] ที่เปลี่ยนแปลงอย่างรวดเร็วทำให้เราไม่สามารถเฝ้าติดตามโรคระบาดที่กำลังดำเนินอยู่ต่อไปได้ ในช่วงเวลานี้ โครงการวิจัยทั้งหมดบนดาวเคราะห์ดวงนี้จำเป็นต้องถูกพักไว้"

 preftl.2063.intro:0 "บน [Target.GetName] สายลมกระซิบพัดผ่านที่ราบอันว่างเปล่า ที่อยู่อาศัยซึ่งครั้งหนึ่งเคยเป็นบ้านของทั้งครอบครัว บัดนี้ยืนอยู่อย่างไร้ชีวิตและอ้างว้าง"
 preftl.2063.name:0 "โลกเงียบงัน"
 preftl.2063.desc:0 "$preftl.2063.intro$\n\nประชากรของดาวเคราะห์ถูกกำจัดสิ้นแล้ว ในที่สุดโรคระบาดก็ได้ดำเนินมาถึงปลายทาง"

 preftl.2051.name:0 "โลกแห่งความตาย"
 preftl.2051.desc:0 "$preftl.2063.intro$ งานของเราสิ้นสุดลงแล้ว: ประชากรของ [Target.GetName] ถูกกำจัดสิ้น และดาวเคราะห์ดวงนี้ก็พร้อมให้เรายึดครอง"
 dead_world_tt:0 "ประชากรของ [Target.GetName] ถูกกำจัดสิ้น"

 preftl.2062.name:0 "ความตายครั้งใหญ่"
 preftl.2062.desc:0 "ขณะที่โรคระบาดยังคงโหมกระหน่ำ [Target.GetName] จำนวนผู้ตายและใกล้ตายนั้นน่าตกตะลึง\n\nไม่มีทางรักษา ความทุกข์ทรมานเพิ่มเติมทำได้เพียงบรรเทา ไม่อาจป้องกัน"

 preftl.2065.name:0 "จิตใจที่เปิดกว้าง"
 preftl.2065.desc:0 "การตอบสนองของเราต่อโรคระบาดบน [Target.GetName] ไม่อาจปิดบังได้อีกต่อไป ตอนนี้ประชากรที่จมอยู่กับความโศกเศร้าต่างหันสายตาขึ้นสู่ดวงดาว เราได้เปิดจิตใจของพวกเขาสู่ความจริงแล้ว ส่วนจะเกิดอะไรขึ้นต่อไปคงต้องรอดู"
 opinion_plague_situation_01:0 "ประชากรผู้สำนึกบุญคุณ"
 minds_open_tt:0 "ผู้คนบน [Target.GetName] มีทัศนคติที่ดีต่อเรามากขึ้น"

 preftl.2070.name:0 "ศรัทธาอันแรงกล้า"
 preftl.2070.desc:0 "ในที่สุดโรคระบาดบน [Target.GetName] ก็สิ้นสุดลง ยุคแห่งศาสดามาถึงจุดจบ และศาสนาสำคัญจำนวนหนึ่งกำลังรุ่งเรือง ด้วยความหมายใหม่ในชีวิต ผู้คนจึงเริ่มสร้างขึ้นใหม่"

 preftl.2075.name:0 "เจ้าแห่งสนามรบ"
 preftl.2075.desc:0 "โรคระบาดบน [Target.GetName] ได้สิ้นสุดลง ยุคแห่งจอมศึกมาถึงจุดจบ และสังคมนักรบจำนวนหนึ่งกำลังรุ่งเรือง ด้วยความขอบคุณที่ยังมีชีวิต ผู้คนจึงมองไปยังผู้นำของตนเพื่อการปกครองที่แข็งแกร่งและเด็ดเดี่ยว"

 preftl.2080.name:0 "ประชากรผู้สำนึกบุญคุณ"
 preftl.2080.desc:0 "ด้วยความพยายามอย่างไม่ย่อท้อ เราประสบความสำเร็จในการลดผลกระทบที่เลวร้ายที่สุดของโรคระบาดบน [Target.GetName] อย่างไรก็ตาม ธรรมชาติที่แท้จริงของการมีอยู่ของเราบนดาวเคราะห์ดวงนี้ไม่อาจปิดบังได้อีกต่อไป ประชากรเข้าใจแล้วว่าพวกเขาได้รับการช่วยเหลือจากอีกโลกหนึ่ง ด้วยความสำนึกบุญคุณ พวกเขาจึงหันมองขึ้นสู่ดวงดาว"
 plague_02:0 "อาบไล้ด้วยความกตัญญู"
 plague_02_desc:0 "การช่วยทั้งดาวเคราะห์ย่อมคุ้มค่าที่จะเฉลิมฉลอง"

 grateful_populace_tt:0 "ผู้คนบน [Target.GetName] มีทัศนคติที่ดีต่อเรามากขึ้น"

 preftl.2085.name:0 "พิธีขับไล่ครั้งใหญ่"
 preftl.2085.desc:0 "ผลกระทบที่เลวร้ายที่สุดของโรคระบาดบน [Target.GetName] ได้ถูกควบคุมไว้แล้ว อย่างไรก็ตาม แทนที่จะสำนึกบุญคุณ ผู้รอดชีวิตกลับเต็มไปด้วยความโกรธอันชอบธรรมต่อ “คนนอกปีศาจ” ที่มาทำให้วัฒนธรรมของพวกเขามัวหมอง เจ้าหน้าที่ช่วยเหลือของเราถูกตีตราและตกเป็นเป้า จนจำต้องละทิ้งดาวเคราะห์ดวงนี้ แม้พวกเขาจะยังไม่เข้าใจความจริงทั้งหมด แต่ตอนนี้ประชากรท้องถิ่นก็หันมองดวงดาวอย่างหวาดระแวงแล้ว"
 preftl.2085.a:0 "สิ่งมีชีวิตอกตัญญู"
 plague_04:0 "ความขุ่นเคืองอันชอบธรรม"
 plague_04_desc:0 "เมื่อถูกปฏิเสธจากสิ่งมีชีวิตที่ยอมอยู่กับความไม่รู้ของตนมากกว่าจะยอมรับความช่วยเหลือของเรา ในอนาคตเราจะมุ่งความสนใจมาที่ตัวเราเองมากขึ้น"
 opinion_plague_situation_03:0 "สิ่งมีชีวิตอกตัญญู"
 mass_exorcism_tt:0 "ผู้คนบน [Target.GetName] มีทัศนคติต่อเราแย่ลง"

 preftl.2090.name:0 "น้ำพุแห่งวัยเยาว์"
 preftl.2090.desc:0 "ในที่สุดโรคระบาดบน [Target.GetName] ก็สิ้นสุดลง ที่สำคัญกว่านั้น การศึกษาภูมิคุ้มกันที่ได้รับการเสริมขึ้นของประชากรเสร็จสมบูรณ์แล้ว และตอนนี้ถึงเวลาต้องตัดสินใจ: ควรนำประโยชน์จากงานวิจัยนี้ไปใช้เฉพาะกับชนชั้นปกครองของเรา หรือกับประชากรทั้งหมด? การยืดอายุผู้นำของเรานั้นน่าดึงดูดอย่างแน่นอน แต่ประชากรผู้สำนึกบุญคุณก็ย่อมนำมาซึ่งพรในแบบของมันเอง"
 preftl.2090.desc.hive:0 "ในที่สุดโรคระบาดบน [Target.GetName] ก็สิ้นสุดลง ที่สำคัญกว่านั้น การศึกษาภูมิคุ้มกันที่ได้รับการเสริมขึ้นของประชากรเสร็จสมบูรณ์แล้ว ความรู้นี้ย่อมมีประโยชน์แน่ แต่ต้องตัดสินใจ: เราควรนำมันไปใช้เฉพาะกับผู้นำของเรา หรือกับโดรนทุกตัวในหมู่คณะ?"
 preftl.2090.desc.machine:0 "ในที่สุดโรคระบาดบน [Target.GetName] ก็สิ้นสุดลง ที่สำคัญกว่านั้น การศึกษาภูมิคุ้มกันที่ได้รับการเสริมขึ้นของประชากรเสร็จสมบูรณ์แล้ว ความรู้นี้สามารถนำไปใช้ให้เกิดประโยชน์แก่ [Owner.GetName] ได้แล้ว"
 preftl.2090.a:0 "ผู้นำของเราจะรุ่งเรือง"
 preftl.2090.b:1 "ประชากรของเราต้องมาก่อน"
 opinion_plague_situation_02:0 "ความกตัญญูที่ยืนยาว"
 young_leaders:0 "ผู้นำคืนวัย"
 young_people:0 "ประชากรคืนวัย"

 ### Organic Singularity Situation
 situation_pre_ftl_singularity:0 "ภาวะเอกฐานอินทรีย์"
 situation_pre_ftl_singularity_type:0 "เหตุการณ์ภาวะเอกฐาน"
 situation_pre_ftl_singularity_desc:0 "ผู้คนบน [Target.GetName] ได้สะดุดเข้ากับสิ่งมีชีวิตชนิดใหม่ ชีวจิตแบบปมประสาทที่สามารถจัดการปฏิบัติการซับซ้อนได้ การมีปฏิสัมพันธ์กับสิ่งมีชีวิตชนิดนี้อาจนำไปสู่การถือกำเนิดของภาวะเอกฐานอินทรีย์ในที่สุด"
 situation_pre_ftl_singularity_monthly_change_tooltip:0 "แนวทางที่เราเลือกจะเป็นตัวกำหนดอัตราความคืบหน้าของ §Yสถานการณ์§! นี้"

 approach_watch_singularity:0 "เฝ้าดูและเรียนรู้"
 approach_watch_singularity_tooltip:0 "การเฝ้าดูสิ่งนี้คลี่คลายน่าจะให้ข้อมูลเชิงลึกที่น่าสนใจ"
 approach_allow_tooltip:0 "เมื่อกำหนดแนวทางเริ่มต้นแล้ว เราจะไม่สามารถเปลี่ยนแปลงได้อีก"
 approach_prevent_singularity:0 "ป้องกันภาวะเอกฐาน"
 approach_prevent_singularity_tooltip:0 "การป้องกันภาวะเอกฐานจะต้องใช้ทรัพยากรอย่างต่อเนื่อง เมื่อเลือกแล้ว เราจะไม่สามารถเปลี่ยนแนวทางนี้ได้อีก"
 approach_promote_singularity:0 "ส่งเสริมภาวะเอกฐาน"
 approach_promote_singularity_tooltip:0 "การส่งเสริมภาวะเอกฐานจะต้องใช้การลงทุนจำนวนมาก เมื่อเลือกแล้ว เราจะไม่สามารถเปลี่ยนแนวทางนี้ได้อีก"
 situation_singularity_stage_one:0 "การมาถึงของภาวะเอกฐาน"

 # Starting event
 preftl.2101.name:0 "ค้นพบชีวจิตแบบปมประสาท"
 preftl.2101.desc:0 "นักสำรวจชาว [from.owner.GetSpeciesAdj] บน [from.owner.capital_scope.GetName] ได้ค้นพบสายพันธุ์มอลลัสคอยด์ที่ไม่เคยรู้จักมาก่อน แต่ละตัวเพียงลำพังแทบไม่อาจนับว่ามีสติปัญญา อย่างไรก็ตาม เมื่อมีตั้งแต่สองตัวขึ้นไปเชื่อมกันผ่านการสัมผัสทางกายภาพ พวกมันจะก่อรูปเป็นปมกึ่งมีสติ ตามทฤษฎีแล้ว ปมเหล่านี้ควรสามารถเพิ่มพลังทางปัญญาแบบทวีคูณได้\n\nพูดง่าย ๆ ก็คือ ผู้คนบน [from.owner.capital_scope.GetName] ได้สะดุดเข้ากับเครื่องจักรคิดทางชีวภาพ และหากปล่อยเวลาให้ผ่านไป การค้นพบนี้อาจเป็นสัญญาณแห่งการถือกำเนิดของภาวะเอกฐานอินทรีย์"
 preftl.2101.can_not_help.desc:1 "$preftl.2101.desc$\n\nนโยบายของเราคือไม่แทรกแซงโลก [owner.GetPreFTLLower] แต่เราจะปล่อยให้เรื่องนี้ดำเนินไปเฉย ๆ ได้จริงหรือ?"
 preftl.2101.a:0 "เฝ้าดูและเรียนรู้"
 preftl.2101.b:0 "ป้องกันภาวะเอกฐาน"
 preftl.2101.c:0 "ส่งเสริมภาวะเอกฐาน"

 #Organic Singularity Events

 preftl.2110.name:0 "ความไม่รู้อันแสนสุข"
 preftl.2110.desc:0 "โดยไม่ตระหนักถึงอันตรายที่กำลังใกล้เข้ามา ชาว [Target.GetName] ยังคงทดลองกับชีวจิตแบบปมประสาทที่เพิ่งค้นพบ โดยนำการคำนวณของมันไปใช้ในทุกอย่างตั้งแต่สถาปัตยกรรมไปจนถึงการศึกษา\n\nการชะลอความก้าวหน้าของพวกเขาจะเป็นเรื่องยาก แต่ด้วยการปล่อยไวรัสที่ผ่านการเสริมแต่งพันธุกรรมลงในวัฏจักรน้ำของดาวเคราะห์ เราน่าจะสามารถลดพลังการประมวลผลของแต่ละปมได้\n\nแน่นอนว่า เช่นเดียวกับเทคโนโลยีที่ยังไม่ผ่านการทดสอบใด ๆ ก็ย่อมมีความเสี่ยงที่ยังไม่รู้จัก"
 preftl.2110.a:0 "ปล่อยไวรัส"

 preftl.2115.name:0 "เครื่องคิดเลขชีวภาพ"
 preftl.2115.desc:0 "ด้วยการทดลองอย่างต่อเนื่อง ผู้คนบน [Target.GetName] ได้เริ่มใช้ชีวจิตแบบปมประสาทที่เพิ่งค้นพบเป็นเครื่องจักรคิดคำนวณขั้นพื้นฐานแล้ว\n\nบัดนี้ เมื่อสามารถคำนวณทางคณิตศาสตร์ที่ซับซ้อนได้ ชาวดาวเคราะห์จึงกำลังสร้างความก้าวหน้าทางวิทยาศาสตร์และเทคโนโลยีด้วยอัตราที่ไม่เคยมีมาก่อน"

 preftl.2120.name:0 "การเติบโตแบบทวีคูณ"
 preftl.2120.desc:0 "ความคืบหน้าไปสู่ภาวะเอกฐานอินทรีย์บน [Target.GetName] ยังคงเดินหน้าอย่างรวดเร็ว\n\nชีวจิตแบบปมประสาทได้ปรับโครงสร้างการผลิตทางเกษตรกรรมของดาวเคราะห์ส่วนใหญ่ใหม่ ส่งผลให้ผลผลิตพืชผลเพิ่มขึ้นและมาตรฐานการครองชีพสูงขึ้น ขณะนี้ผู้คนเริ่มมอบการตัดสินใจของตนให้กับเครื่องจักรชีวภาพแล้ว"
 exponential_growth_tt:0 "สภาพความเป็นอยู่บนดาวเคราะห์ที่สังเกตการณ์จะดีขึ้นอย่างมาก"

 preftl.2125.name:0 "จิตใจที่หวาดระแวง"
 preftl.2125.desc:0 "สายลับของเราบน [Target.GetName] ได้ปล่อยไวรัสที่ดัดแปลงแล้วลงสู่ระบบน้ำของดาวเคราะห์ รายงานเบื้องต้นบ่งชี้ว่าพลังการประมวลผลของชีวจิตแบบปมประสาทลดลงอย่างชัดเจน\n\nน่าเสียดายที่ความพยายามของเราไม่ได้ผ่านไปโดยไม่มีใครสังเกต: ชาวดาวเคราะห์บางส่วนเริ่มกระซิบกันถึงอิทธิพลจาก “ภายนอก”"

 preftl.2130.name:0 "อุดมคติอินทรีย์"
 preftl.2130.desc:0 "การเชื่อมต่อเข้ากับชีวจิตแบบปมประสาทบน [Target.GetName] กำลังเข้าใกล้จุดอิ่มตัว การตัดสินใจด้านระบบราชการทั้งหมดได้ถูกมอบให้กับจิตหมู่แบบอินทรีย์แล้ว และผลลัพธ์ที่ได้ก็ไม่ต่างจากความมหัศจรรย์\n\nเศรษฐกิจของดาวเคราะห์กำลังเฟื่องฟู และผู้คนได้บรรลุมาตรฐานชีวิตที่แม้เพียงหนึ่งชั่วรุ่นก่อนยังคิดไม่ถึง"

 preftl.2135.name:0 "การเกื้อหนุนที่ไม่สบายใจ"
 preftl.2135.desc:0 "สัญญาณแรกของจิตสำนึกขั้นสูงได้ปรากฏขึ้นบน [Target.GetName] อย่างไรก็ตาม มันชัดเจนแล้วว่าชีวจิตแบบปมประสาทอาจมีจุดประสงค์ของตนเอง\n\nในความพยายามที่จะ “ทำให้กระบวนการลื่นไหล” สิ่งอำนวยความสะดวกพื้นฐานบางอย่างถูกลดทอนลง งานที่ครั้งหนึ่งเคยทำด้วยมือกำลังถูกทำให้เป็นอัตโนมัติมากขึ้นเรื่อย ๆ และรัฐบาลท้องถิ่นก็พบว่าตนไม่สามารถ (หรือไม่เต็มใจจะ) หยุดยั้งคลื่นแห่งการเปลี่ยนแปลงนี้\n\nผู้คนจำนวนมากขึ้นเรื่อย ๆ เริ่มไม่สบายใจกับสิ่งที่กำลังเกิดขึ้นบนโลกของพวกเขา"

 preftl.2136.name:0 "สหภาพรุ่งเรือง"
 preftl.2136.ftl.desc:0 "การเติบโตของชีวจิตแบบปมประสาทบน [Target.GetName] ได้ทรงตัวแล้ว ขณะนี้ชัดเจนว่าภาวะเอกฐานจะไม่เกิดขึ้นบนโลกใบนี้\n\nอย่างไรก็ตาม การเปลี่ยนแปลงทางเทคโนโลยีอย่างรวดเร็วได้ยกระดับ [Target.GetName] ไปสู่สถานะความเร็วอย่างเต็มตัว เจ้าหน้าที่รัฐบาลไม่เสียเวลาแม้แต่น้อยในการยึดระบบนี้และรื้อถอนสถานีสังเกตการณ์ของเรา"
 preftl.2136.preftl.desc:0 "การเติบโตของชีวจิตแบบปมประสาทบน [Target.GetName] ได้ทรงตัวแล้ว และความก้าวหน้าทางเทคโนโลยีกับชีวิตสังคมก็ชะลอลงจากจังหวะที่เคยรวดเร็วเกินคาด\n\nตอนนี้ชัดเจนว่าภาวะเอกฐานจะไม่เกิดขึ้นบนโลกใบนี้ — สิ่งที่เกิดขึ้นแทนคือสังคมที่เชื่อมต่อถึงกันอย่างสมบูรณ์ และได้รับประโยชน์ด้านสุขภาพและวัตถุอย่างกว้างขวาง"
 thriving_union_tt:0 "อารยธรรมบน [Target.GetName] ได้ก้าวสู่ระดับใหม่ของความก้าวหน้าทางเทคโนโลยีและสังคม"
 preftl.2136.a:0 "ข้ออ้างสิทธิ์ในระบบนี้ของเราจะถูกมองข้ามไม่ได้"
 preftl.2136.b:0 "เป็นวันอันยิ่งใหญ่ของอารยธรรมพวกเขา"

 preftl.2140.name:1 "อำนาจเอกฐาน"
 preftl.2140.desc:1 "ภาวะเอกฐานได้ถือกำเนิดขึ้นบน [Target.GetName]\n\nหลังจากเติบโตแบบทวีคูณมาหลายปี วันนี้ชีวจิตแบบปมประสาทได้บรรลุสติปัญญาเต็มรูปแบบ และไม่เสียเวลาเลยในการสถาปนาอำนาจของตน เมื่อประชากรของดาวเคราะห์ถูกลดบทบาทลงเป็นเพียงหุ่นเชิด ผู้คนจำนวนมากจึงถูกบังคับให้จำนน พวกเขาบัดนี้ดำรงอยู่เพื่อรับใช้รังเท่านั้น"
 preftl.2140.a:0 "ระเบียบตามธรรมชาติยังคงอยู่"

 preftl.2145.name:0 "วาระซ่อนเร้น"
 preftl.2145.desc:0 "งานของเราในการส่งเสริมภาวะเอกฐานบน [Target.GetName] เริ่มให้ผลตอบแทนแล้ว\n\nตอนนี้ดาวเคราะห์เกือบทั้งดวงเชื่อมต่อถึงกัน โดยการตัดสินใจในชีวิตประจำวันส่วนใหญ่ถูกส่งต่อให้กับชีวจิตแบบปมประสาท อย่างไรก็ตาม ในความพยายามที่จะ “ทำให้กระบวนการลื่นไหล” สิ่งอำนวยความสะดวกพื้นฐานบางอย่างได้ถูกตัดออก และเริ่มชัดเจนขึ้นเรื่อย ๆ ต่อผู้คนบนดาวเคราะห์ว่ากลไกมอลลัสคอยด์ของพวกเขาอาจมีแผนของตนเอง"
 preftl.2145.a:0 "มันเป็นสิ่งที่หลีกเลี่ยงไม่ได้อยู่แล้ว"

 preftl.2150.name:0 "อย่างน้อยก็กินได้"
 preftl.2150.intro:0 "การดัดแปลงพันธุกรรมที่เราทำกับชีวจิตแบบปมประสาทบน [Target.GetName] ได้ทำให้สายพันธุ์นี้ไร้ประโยชน์ในฐานะพาหะของสติปัญญาขั้นสูง"
 preftl.2150.desc:0 "$preftl.2150.intro$ จึงสรุปได้อย่างปลอดภัยว่าภาวะเอกฐานถูกป้องกันไว้แล้ว\n\nแม้ผู้คนในท้องถิ่นจำนวนมากจะยังใช้มอลลัสคอยด์เชื่อมต่อเหล่านี้ในการคำนวณ แต่คนอื่น ๆ ก็พบว่าสิ่งมีชีวิตเหล่านี้เป็นแหล่งโปรตีนชั้นเยี่ยม"
 preftl.2150.a:0 "ชนะทั้งสองทาง"

 preftl.2155.name:0 "การระบาดโดยไม่ตั้งใจ"
 preftl.2155.desc:0 "$preftl.2150.intro$ น่าเสียดายที่การปล่อยไวรัสชนิดใหม่ลงในแหล่งน้ำก่อให้เกิดผลแทรกซ้อนที่ไม่คาดคิด โดยเริ่มแพร่ไปยังสัตว์ท้องถิ่นก่อน และจากนั้นจึงลามไปสู่ประชากรทรงปัญญาของดาวเคราะห์\n\nแม้จะสามารถป้องกันเหตุการณ์ระดับภาวะเอกฐานได้สำเร็จ แต่ก็ไม่ต้องสงสัยเลยว่าเราได้สร้างความเสียหายที่ไม่อาจแก้คืนให้แก่สังคมที่กำลังเติบโตแห่งหนึ่ง"

 preftl.2160.name:0 "การรวมเป็นหนึ่ง"
 preftl.2160.desc:0 "ภาวะเอกฐานได้อรุณขึ้นบน [Target.GetName] ภายในเวลาไม่กี่ชั่วโมงหลังการยกระดับ จิตหมู่ได้ดูดกลืนประชากรของดาวเคราะห์ไปกว่า 90% แล้ว และปัจเจกเพียงไม่กี่รายที่เหลืออยู่ก็เริ่มถูกไล่ล่าแล้วเช่นกัน\n\nเรากำลังยืนเป็นพยานต่อการถือกำเนิดของจิตสำนึกเอกภาพ"
 preftl.2160.tt:0 "[Target.Owner.GetName] ถูกเปลี่ยนให้เป็นจิตหมู่แล้ว"

 preftl.2165.name:0 "ชะตาเอกเทศ"
 preftl.2165.desc:0 "สถานการณ์ที่เราเฝ้าติดตามได้มาถึงบทสรุปอย่างฉับพลัน\n\nสิ่งเดียวที่คงที่ในเอกภพคือการเปลี่ยนแปลง ไม่ว่าดีหรือร้าย มันก็เป็นเพียงเรื่องของเวลาก่อนจะมีพัฒนาการใหม่เกิดขึ้น"

 singularity_situation_01:0 "การเติบโตแบบทวีคูณ"
 exponential_growth_01_desc:0 "ด้วยอัตราการเติบโตทางเทคโนโลยีอันรวดเร็ว มาตรฐานชีวิตจึงพุ่งสูงขึ้น"
 singularity_situation_02:0 "การเติบโตแบบทวีคูณ"
 singularity_situation_02_desc:0 "ด้วยอัตราการเติบโตทางเทคโนโลยีอันรวดเร็ว มาตรฐานชีวิตจึงพุ่งสูงขึ้น"
 singularity_situation_03:0 "เครื่องจักรกินได้"
 edible_machines_03_desc:0 "แม้มันจะไม่ได้นำไปสู่ภาวะเอกฐาน แต่เครื่องจักรคิดเหล่านี้กลับอร่อยกว่าที่คาดไว้มาก"
 singularity_situation_04:0 "เครื่องจักรกินได้"
 singularity_situation_04_desc:0 "แม้มันจะไม่ได้นำไปสู่ภาวะเอกฐาน แต่เครื่องจักรคิดเหล่านี้กลับอร่อยกว่าที่คาดไว้มาก"
 singularity_situation_05:0 "แผนรัดเข็มขัด"
 singularity_situation_05_desc:0 "ในนามของประสิทธิภาพ มีการตัดงบลงทุนสาธารณะอย่างหนักบนดาวเคราะห์ดวงนี้"
 singularity_situation_06:0 "บูมทางวิจัย"
 singularity_situation_06_desc:0 "ด้วยเครื่องจักรคิดที่เพิ่งค้นพบ นักวิจัยกำลังก้าวหน้าด้วยความเร็วเหนือธรรมดา"
 singularity_situation_07:0 "ทาสของจักรกล"
 singularity_situation_07_desc:0 "ภาวะเอกฐานอินทรีย์ได้เข้าควบคุมประชากรทั้งหมดอย่างสมบูรณ์"

 ### New World Order Situation

 situation_pre_ftl_nwo:0 "ระเบียบโลกใหม่"
 situation_pre_ftl_nwo_type:0 "ความปั่นป่วนทางทหารและสังคม"
 situation_pre_ftl_nwo_desc:0 "ผู้นำผู้มีเสน่ห์คนหนึ่งได้ปรากฏตัวขึ้นบน [Target.GetName] พร้อมประกาศหลักคำสอนหัวรุนแรงว่าด้วยการรวมดาวเคราะห์เป็นหนึ่งเดียว เวลานี้ มีเพียงกลุ่มกบฏขนาดเล็กและค่อนข้างขาดแคลนอาวุธเท่านั้นที่ยังยืนหยัดต่อต้านการปกครองของเสียงข้างมาก"
 situation_pre_ftl_nwo_monthly_change_tooltip:0 "ความคืบหน้าของ §Yสถานการณ์§! นี้ไม่ได้อยู่ในมือของเรา"

 approach_watch_nwo:0 "เฝ้าดูและเรียนรู้"
 approach_watch_nwo_tooltip:0 "การเฝ้าดูสิ่งนี้คลี่คลายน่าจะให้ข้อมูลเชิงลึกที่น่าสนใจ"
 approach_aid_leader:0 "ช่วยเหลือผู้นำ"
 approach_aid_leader_tooltip:0 "การช่วยเหลือผู้นำของฝ่ายหลักจะต้องใช้ทรัพยากรลงทุน"
 approach_aid_rebels:0 "ช่วยเหลือกบฏ"
 approach_aid_rebels_tooltip:0 "การช่วยเหลือฝ่ายกบฏจะต้องใช้ทรัพยากรลงทุนจำนวนมาก"
 situation_nwo_stage_one:0 "ความขัดแย้งตั้งเค้า"
 situation_nwo_stage_two:0 "พลิกตาชั่ง"
 situation_nwo_stage_three:0 "ช่วงชิงอำนาจ"
 situation_nwo_stage_four:0 "รอบสุดท้าย"

 # Starting event
 preftl.2167.name:0 "ระเบียบโลกใหม่"
 preftl.2167.desc:0 "ผู้นำผู้มีเสน่ห์คนหนึ่งได้ปรากฏตัวขึ้นบน [from.owner.capital_scope.GetName] พร้อมประกาศหลักคำสอนหัวรุนแรงว่าด้วยการรวมดาวเคราะห์เป็นหนึ่งเดียว เวลานี้ มีเพียงกลุ่มกบฏขนาดเล็กและค่อนข้างขาดแคลนอาวุธเท่านั้นที่ยังยืนหยัดต่อต้านการปกครองของเสียงข้างมาก"
 preftl.2167.can_not_help.desc:1 "$preftl.2167.desc$\n\nนโยบายของเราคือไม่แทรกแซงโลก [owner.GetPreFTLLower] แต่เราจะปล่อยให้เรื่องนี้ดำเนินไปเฉย ๆ ได้จริงหรือ?"
 preftl.2167.a:0 "เฝ้าดูและเรียนรู้"
 preftl.2167.b:0 "ช่วยเหลือผู้นำ"
 preftl.2167.c:0 "ช่วยเหลือกบฏ"
 new_world_order_offensive_army:0 "กองกำลังหนุนการรวมเป็นหนึ่ง"
 new_world_order_offensive_army_desc: "ผู้รักชาติกลุ่มนี้ต่อสู้เพื่อปกป้องบ้านเกิดที่แตกแยกของตน"
 new_world_order_defensive_army:0 "กองกำลังกบฏ"
 new_world_order_defensive_army_desc: "ผู้รักชาติกลุ่มนี้ต่อสู้เพื่อปกป้องบ้านเกิดที่แตกแยกของตน"
 NAME_Pro_Unification_Faction:0 "Pro-Unification Faction"
 increase_aid_tt:0 "การสนับสนุนอย่างต่อเนื่องจะเพิ่มโอกาสของผลลัพธ์ที่สำเร็จขึ้นอีกเล็กน้อย"
 arm_them_tt:0 "การมอบอาวุธขั้นสูงจะเพิ่มโอกาสของผลลัพธ์ที่สำเร็จขึ้นอย่างมีนัยสำคัญ"

 preftl.2170.name:0 "การรวบอำนาจ"
 preftl.2170.desc:0 "สำหรับฝ่ายกบฏบน [Target.GetName] อนาคตดูหม่นหมอง: ภายใต้การนำอันทรงอิทธิพลของ [Target.Owner.GetRulerName] กองกำลังหนุนการรวมเป็นหนึ่งได้ยึดอำนาจในศูนย์กลางประชากรส่วนใหญ่ของดาวเคราะห์แล้ว ความเป็นหนึ่งถูกบังคับด้วยกำปั้นเหล็ก ความเห็นต่างใด ๆ ถูกบดขยี้อย่างรวดเร็ว"
 preftl.2170.a:0 "เพิ่มความช่วยเหลือของเราให้ฝ่ายกบฏ"
 preftl.2170.b:0 "เราสามารถช่วยกองกำลังหนุนการรวมเป็นหนึ่งได้มากกว่านี้อีก"

 preftl.2175.name:0 "อาชญากรรมสงคราม"
 preftl.2175.desc:1 "การสู้รบบน [Target.GetName] ยังคงดุเดือด โดยกองกำลังหนุนการรวมเป็นหนึ่งและฝ่ายกบฏยังคงฉีกทึ้งกันไม่หยุด ในการต่อสู้นี้ ไม่มีอาวุธหรือยุทธวิธีใดเป็นข้อห้าม และมีการก่อความโหดร้ายจากทั้งสองฝ่าย"
 preftl.2175.a:0 "ตอนนี้ฝ่ายกบฏต้องการความช่วยเหลือจากเรามากกว่าที่เคย"
 preftl.2175.b:0 "เพิ่มการสนับสนุนให้กองกำลังหนุนการรวมเป็นหนึ่ง"

 preftl.2180.name:0 "อิ่มหมีพีมัน"
 preftl.2180.a.desc:0 "ขณะที่ความขัดแย้งภายในยังคงลุกโชนบน [Target.GetName] กองกำลังหนุนการรวมเป็นหนึ่งกำลังจ่อชัยชนะ\n\nอย่างไรก็ตาม ไกลจากแนวหน้า ผู้ว่าการท้องถิ่นกำลังฉวยทุกโอกาสเพื่อกอบโกยให้ตนเอง ตอนนี้เสียงวิจารณ์ยังคงเบาบาง แต่การทุจริตนั้นไม่ได้หลบสายตาประชากรท้องถิ่นไปได้"
 preftl.2180.b.desc:0 "บน [Target.GetName] สงครามระหว่างกองกำลังหนุนการรวมเป็นหนึ่งและฝ่ายกบฏได้ชะลอลงกลายเป็นการบดขยี้อันโหดร้าย เมื่อแนวรบตรึงตัว จอมศึกท้องถิ่นทั้งสองฝ่ายต่างร่ำรวยขึ้นจากสินบนและการคอร์รัปชัน สิ่งนี้จะส่งผลต่อทิศทางของความขัดแย้งอย่างไรยังต้องรอดู"
 preftl.2180.a:0 "ปลุกปั่นความไม่พอใจของสาธารณชน"
 preftl.2180.b:0 "ให้สายลับของเราสร้างความชอบธรรมให้ระบอบนี้"

 preftl.2185.name:0 "กวาดล้างและทำลาย"
 preftl.2185.a.desc:0 "ความไร้เสถียรภาพที่เกิดจากผู้นำท้องถิ่นซึ่งทุจริตและไร้ประสิทธิภาพบน [Target.GetName] ได้หลอมรวมการสนับสนุนจากสาธารณชนเข้ากับอุดมการณ์ของฝ่ายกบฏ\n\nในศูนย์กลางเมืองใหญ่ของดาวเคราะห์ [Target.Owner.GetRulerName] ได้สั่งให้กองกำลังของตนดำเนินการกวาดล้างอย่างโหดเหี้ยมทีละถนน เพื่อตัดต้านฝ่ายต่อต้านให้สิ้น"
 preftl.2185.b.desc:0 "ผู้นำท้องถิ่นบน [Target.GetName] ที่ยิ่งทุจริตและไร้ประสิทธิภาพลงเรื่อย ๆ ได้ทำลายการสนับสนุนจากประชาชนต่อสงคราม ทั้งสองฝ่ายต่างถูกบีบให้เปิดปฏิบัติการปราบปรามกบฏเพื่อควบคุมความไม่สงบของพลเรือน"
 preftl.2185.a:0 "เพิ่มการสนับสนุนด้านลอจิสติกส์ของเรา"

 preftl.2190.name:0 "เกมอำนาจ"
 preftl.2190.a.desc:0 "ทั่วทั้ง [Target.GetName] กองกำลังกบฏกำลังล่าถอย และ [Target.Owner.GetRulerName] ครองอำนาจสูงสุด\n\nอย่างไรก็ตาม แม้ระเบียบโลกใหม่กำลังก่อตัว รอยร้าวก็เริ่มปรากฏขึ้น ข้าราชการระดับสูงขัดแข้งขัดขากับนายพลผู้ชนะ และขุนนางผู้หิวกำไรต่างวนเวียนอยู่ในโถงแห่งอำนาจ\n\n[Target.Owner.GetRulerName] กำลังจะถูกทดสอบบนสมรภูมิแบบใหม่ทั้งหมด"
 preftl.2190.b.desc:0 "เมื่อไม่มีกลุ่มใดสามารถยึดอำนาจบน [Target.GetName] ได้สำเร็จ ดาวเคราะห์ทั้งดวงจึงจมดิ่งสู่ความโกลาหล จอมศึกท้องถิ่นต่างช่วงชิงอำนาจ และขบวนการทางสังคมสุดโต่งก็ผุดขึ้นมาชั่วข้ามคืน ขณะที่ดาวดวงนี้เผชิญความปั่นป่วนครั้งใหญ่ที่สุดในประวัติศาสตร์ สันติภาพยังคงเป็นเพียงความฝันอันห่างไกล"
 preftl.2190.a:0 "เริ่มติดอาวุธให้ฝ่ายกบฏ"

 preftl.2195.name:0 "การปฏิวัติทั้งหมด"
 preftl.2195.a.desc:0 "ผู้คนบน [Target.GetName] ลุกฮือขึ้นพร้อมใจเคียงข้างฝ่ายกบฏ พร้อมประณามความเสื่อมทรามและการคอร์รัปชันของเจ้าหน้าที่ชั้นสูงสุดของดาวเคราะห์ ในทุกเมืองและทุกหมู่บ้าน ไฟแห่งการปฏิวัติลุกโชน"
 preftl.2195.b.desc:0 "บน [Target.GetName] ความโกลาหลครองอำนาจ\n\nกลุ่มคนไร้ระเบียบเดินเพ่นพ่านไปทั่วชนบทอย่างสิ้นหวังเพื่อหาอาหาร ส่วนในเมืองหลวง [Target.Owner.GetRulerName] ยังเกาะกุมอำนาจไว้ แต่ด้วยอำนาจที่ลดลงจนแทบไม่แผ่ออกไปไกลกว่าประตูพระราชวัง\n\nหากไม่มีสิ่งใดเปลี่ยนแปลงอย่างรุนแรง กองกำลังหนุนการรวมเป็นหนึ่งก็ดูเหมือนจะมุ่งหน้าสู่ความพ่ายแพ้"
 preftl.2195.a:0 "เริ่มติดอาวุธให้กองกำลังหนุนการรวมเป็นหนึ่ง"

 preftl.2200.name:0 "เงื้อมมือของออทาร์ก"
 preftl.2200.desc:0 "ด้วยการแสดงยุทธศาสตร์อันน่าตะลึง [Target.Owner.GetRulerName] ได้บดขยี้ฝ่ายต่อต้านของดาวเคราะห์จนราบคาบ สายลับแฝงตัวในหมู่ฝ่ายกบฏได้จุดชนวนการโจมตีประสานกันทั่วทั้งดาวเคราะห์ ก่อนที่นายพลฝ่ายกบฏจะทันรู้ตัว ตำแหน่งของพวกเขาก็ถูกถล่มจนพังทลาย\n\n[Target.GetName] บัดนี้เป็นโลกที่รวมเป็นหนึ่งแล้ว"
 preftl.2200.a:0 "ขอให้ผู้ล่วงลับได้รับการจดจำ"

 preftl.2205.name:0 "ปีศูนย์"
 preftl.2205.a.desc:0 "ในเหตุการณ์พลิกผันอันน่าตกใจ [Target.Owner.GetRulerName] ถูกโค่นอำนาจลงแล้ว\n\nด้วยการร่วมมือกับนายพลฉวยโอกาสหลายคนภายในระบอบ ฝ่ายกบฏจึงสามารถเปิดฉากโจมตีประสานกันทั่วทั้งดาวเคราะห์ได้สำเร็จ ก่อนที่ผู้บัญชาการฝ่ายหนุนการรวมเป็นหนึ่งจะทันรู้ตัว ตำแหน่งของพวกเขาก็ถูกถล่มจนพังทลาย\n\n[Target.Owner.GetRulerName] ถูกลากด้วยโซ่ไปตามท้องถนนของเมืองหลวงก่อนจะถูกประหารอย่างรวดเร็ว ฝ่ายกบฏผู้ชนะได้มอบอำนาจให้ภูมิภาคต่าง ๆ บริหารกิจการของตนเอง หลังสงครามยาวนาน สันติภาพอันเปราะบางก็ได้หยั่งลง"
 preftl.2205.b.desc:0 "[Target.Owner.GetRulerName] ถูกโค่นอำนาจลงแล้ว\n\nจอมศึกผู้เคยปกครองถูกลากด้วยโซ่ไปตามท้องถนนของเมืองหลวงก่อนจะถูกประหารอย่างรวดเร็ว ฝ่ายกบฏผู้ชนะได้มอบอำนาจให้ภูมิภาคต่าง ๆ บริหารกิจการของตนเอง หลังสงครามยาวนาน สันติภาพอันเปราะบางก็ได้หยั่งลง"
 preftl.2205.a:0 "เมื่อเวลาผ่านไป พวกเขาอาจเริ่มคิดถึง [Target.Owner.GetRulerName] ก็ได้"

 nwo_situation_01:0 "ออทาร์กผู้มีชัย"
 nwo_situation_01_desc:0 "ความแข็งแกร่งนำไปสู่เอกภาพ เอกภาพนำไปสู่ความสุข"
 nwo_situation_02:0 "ธงที่ไร้พันธนาการ"
 nwo_situation_02_desc:0 "สังคมที่หลากหลายนำไปสู่ความสุข ความสุขนำไปสู่เอกภาพ"
 nwo_situation_03:0 "ความช่วยเหลือที่เพิ่มขึ้น"
 nwo_situation_03_desc:0 "ทรัพยากรเหล่านี้จะทำให้ความขัดแย้งยุติลงอย่างรวดเร็วและยุติธรรม"
