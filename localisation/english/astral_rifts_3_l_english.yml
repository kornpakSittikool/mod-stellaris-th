 astral_rift.3060.c: "ปฏิเสธที่จะให้ความร่วมมือ"

 astral_rift.3065.name: "การแนะนำตัวที่นอบน้อม"
 astral_rift.3065.desc: "เราอธิบายว่าเราเป็นนักวิจัยจากต่างมิติที่มีภารกิจในการสำรวจจักรวาลคู่ขนานและปรากฏการณ์ต่างๆ ที่มีอยู่ภายในนั้น\n\nผู้บัญชาการทหารส่งเสียงฮึดฮัดอย่างไม่ใส่ใจเมื่อเราชี้แจงวัตถุประสงค์ ทหารรอบตัวเราเริ่มกระวนกระวายใจและส่งเสียงอึกทึก ร้องตะโกนและส่งเสียงร้องดังลั่น\n\n§E"จ้องมองอยู่หรือ? การเฝ้าดูสิ้นสุดลงแล้ว การร้องขอเริ่มต้นขึ้น"§!"
 astral_rift.3065.a: "ตอบกลับด้วยความกล้าหาญ อย่าได้ตื่นกลัว"
 astral_rift.3065.b: "พยายามติดต่อเจรจาด้วยเหตุผล"

 astral_rift.3070.name: "การแบ่งปันองค์ความรู้"
 astral_rift.3070.desc.common_1: "เราได้แบ่งปันข้อมูลการวิจัยของเราเกี่ยวกับ"
 astral_rift.3070.desc.common_2: "ให้แก่ผู้บัญชาการทหารกรูนัวร์ ทันใดนั้น บรรยากาศการเผชิญหน้าก็ผ่อนคลายลง กรูนัวร์รู้สึกประทับใจอย่างเห็นได้ชัดกับความมุ่งมั่นของเราในสงครามขั้นสูง\n\nพวกเขาวางแผนที่จะนำเทคโนโลยีนี้ไปใช้ในแคมเปญทำลายล้างที่กำลังจะเกิดขึ้น เพื่อเป็นการแสดงความขอบคุณ ผู้บัญชาการทหารได้มอบคริสตัลข้อมูลให้แก่เรา จากคำอธิบายที่ได้รับ เราเข้าใจว่ามันมีข้อมูลความลับทางทหารที่มีคุณค่า รวมถึงกลยุทธ์และเทคนิคที่ไม่เคยมีใครรู้จักมาก่อน และบางทีสิ่งที่มีประโยชน์น้อยกว่าคือมันมีบันทึกประวัติศาสตร์การทหารของกรูนัวร์อย่างละเอียดถี่ถ้วน - บันทึกที่ครอบคลุมความยาวหลายร้อยเล่ม"
 astral_rift.3070.desc.tech_dragon_armor: "$astral_rift.3070.desc.common_1$ $tech_dragon_armor$ $astral_rift.3070.desc.common_2$"
