 astral_rift.3070.desc.tech_psionic_shield: "$astral_rift.3070.desc.common_1$ $tech_psionic_shield$ $astral_rift.3070.desc.common_2$"
 astral_rift.3070.a: "การแลกเปลี่ยนที่มีค่าสมน้ำสมเนื้อ"

 astral_rift.3075.name: "การร่วมเป็นสักขีพยาน"
 astral_rift.3075.desc: "กรูนัวร์ชื่นชมในสิ่งที่เราสามารถแบ่งปันเกี่ยวกับบาวล์ได้ เนื่องจากสายพันธุ์ของพวกเขาขาดความสนใจในการจารกรรมและวิธีการทำสงครามทางอ้อมอื่นๆ ข้อมูลของเราจะช่วยให้พวกเขาปรับแต่งกลยุทธ์การรบได้อย่างแน่นอนในระหว่างการทำลายล้างที่กำลังจะมาถึง\n\nอย่างไรก็ตาม ผู้บัญชาการทหารยังคงระแวดระวัง:\n\n§E"รู้แจ้งแล้ว ทว่าการเห็นของจริงนั้นดีกว่า จงร่วมเป็นสักขีพยานในการกวาดล้าง จากนั้นจึงเรียนรู้เพิ่มเติม"§!"
 astral_rift.3075.a: "เฝ้าชมการทำลายล้างกวาดล้าง"
 astral_rift.3075.b: "ปฏิเสธข้อเสนอ"

 astral_rift.3076.name: "การยืนหยัด"
 astral_rift.3076.desc: "มันเป็นกลยุทธ์ที่มีความเสี่ยง ทว่าความกล้าหาญของเราก็สัมฤทธิ์ผล ผู้บัญชาการทหารกรูนัวร์ประทับใจเป็นพิเศษกับเรื่องราวการเดินทางข้ามจักรวาลผ่านรอยแยกแอสทรัล ดูเหมือนว่าการแสดงความกล้าหาญและความกล้าหาญเช่นนี้จะเป็นเรื่องปกติธรรมดาสำหรับกรูนัวร์ สำหรับพวกเขา การสนทนามีผู้ชนะและผู้แพ้เสมอ - และบทเจรจานี้ดูเหมือนจะช่วยให้เราได้คะแนนเพิ่มขึ้น ในที่สุดเรายังได้เห็นการคลิกก้ามปูเป็นการยอมรับด้วย\n\nในที่สุด ผู้นำก็ลุกขึ้นจากเทอร์มินัลพร้อมเสียงร้องที่มั่นคง\n\n§E\"ความกล้าหาญมีอยู่ ทว่าการปฏิบัติคือสิ่งที่ดีที่สุด บัดนี้ได้รับการยอมรับแล้ว\"§!\n\nเพลาคริสตัลลอยขึ้นเบื้องหน้าเรา คล้ายกับแกนที่ติดตั้งรอบคอนโซลควบคุม\n\n§E\"การปล่อยตัวเริ่มขึ้นแล้ว คำสั่งกำลังรอคอยอยู่\"§!"
 astral_rift.3076.a: "กดคริสตัล ออกคำสั่งปล่อยตัว"
 astral_rift.3076.b: "$astral_rift.3075.b$"

 astral_rift.3080.name: "บทลงโทษ"
 astral_rift.3080.desc.default: "กรูนัวร์ไม่สนใจที่จะฟังเหตุผลเลย\n\nผู้บัญชาการทหารลุกขึ้นจากเทอร์มินัลด้วยเสียงร้องเสียงแหลมเป็นระยะๆ ประกอบกับเสียงหนีบก้ามปูที่แหลมคม\n\n§E"คำตัดสินมาถึงแล้ว บทลงโทษกำลังรออยู่"§!\n\nเราถูกนำตัวไปยังห้องกักขัง เมื่อดูจากเสียง 'หัวเราะ' ของยามเฝ้า ชะตากรรมของเราไม่น่าจะสู้ดีนัก อุปกรณ์ของเรากำลังถูกยึดไป นี่จะเป็นการส่งสัญญาณครั้งสุดท้ายของเรา"
 astral_rift.3080.desc.organic: "$astral_rift.3080.desc.default$\n\nส่งความปรารถนาดีไปยังครอบครัวของเราด้วย"
 astral_rift.3080.a: "ขอให้เข้มแข็งเอาไว้ เราจะหาทางช่วยเหลือกู้คืนคุณกลับมา"

 astral_rift.3085.name: "อินเทอร์เฟซอาวุธกรูนัวร์"
 astral_rift.3085.desc.common_1: "จดหมายเหตุของกรูนัวร์ได้รับการวิเคราะห์อย่างสมบูรณ์แล้ว\n\nมันทำให้เกิดความอึดอัดในการอ่าน บันทึกประวัติศาสตร์การทหารของพวกเขานั้นมีความโหดเหี้ยมอย่างมาก"
 astral_rift.3085.desc.common_homicidal: "เราชื่นชมในความยินดีของกรูนัวร์ในการกวาดล้างสายพันธุ์ที่ด้อยกว่า"
 astral_rift.3085.desc.common_2: "อย่างไรก็ตาม เราพบแง่มุมขั้นสูงที่เป็นเอกลักษณ์อย่างหนึ่งของการออกแบบยานอวกาศของพวกเขา ซึ่งอาจปฏิวัติระบบอาวุธปัจจุบันของเรา แม้ว่าจะออกแบบมาสำหรับชีววิทยาของกรูนัวร์ ทว่าเราสามารถปรับแต่งอินเทอร์เฟซเพื่อปรับปรุงความแม่นยำในการระบุเป้าหมายของเราได้สำเร็จ"
 astral_rift.3085.desc.common_militarist: "อินเทอร์เฟซใหม่นี้จะช่วยให้เราได้เปรียบในการต่อสู้และทำให้เราสามารถครอบครองศัตรูของเราได้อย่างทั่วถึงยิ่งขึ้น"
 astral_rift.3085.desc.pacifist: "$astral_rift.3085.desc.common_1$\n\n$astral_rift.3085.desc.common_2$\n\nแม้เราหวังว่ามันจะไม่จำเป็นต้องใช้ ทว่ามันจะช่วยในการป้องกันตนเองของเราได้"
 astral_rift.3085.desc.homicidal: "$astral_rift.3085.desc.common_1$ $astral_rift.3085.desc.common_homicidal$\n\n$astral_rift.3085.desc.common_2$"
 astral_rift.3085.desc.militarist: "$astral_rift.3085.desc.common_1$\n\n$astral_rift.3085.desc.common_2$\n\n$astral_rift.3085.desc.common_militarist$"
 astral_rift.3085.desc.homicidal_militarist: "$astral_rift.3085.desc.common_1$ $astral_rift.3085.desc.common_homicidal$\n\n$astral_rift.3085.desc.common_2$\n\n$astral_rift.3085.desc.common_militarist$"
 astral_rift.3085.desc.default: "$astral_rift.3085.desc.common_1$\n\n$astral_rift.3085.desc.common_2$"

 astral_rift.3090.name: "เฝ้าดูโลกใบหนึ่งมอดไหม้"
 astral_rift.3090.desc.common_1: "เราเฝ้ามองในขณะที่กรูนัวร์เริ่มทำการระดมยิงถล่มใส่"
 astral_rift.3090.desc.common_2: "อาณานิคม ความเหนือกว่าอย่างท่วมท้นของกองเรือของพวกเขาทำลายการป้องกันที่อ่อนแอของบาวล์ได้อย่างรวดเร็ว\n\nขณะที่กองพลทหารกรูนัวร์บุกเข้าสู่พื้นผิวดาวเคราะห์ ทุกสิ่งทุกอย่างก็ถูกเผาไหม้ ทหารที่ติดอาวุธเครื่องพ่นไฟสังหารแพลนทอยด์ดั้งเดิมด้วยประสิทธิภาพที่น่ากลัว\n\nชัยชนะที่หลีกเลี่ยงไม่ได้ช่วยลดความเกรี้ยวกราดของผู้บัญชาการกรูนัวร์ลง\n\n§E"จ้องมองอยู่ใช่ไหม? เปลวไฟลุกไหม้อยู่ บัดนี้เข้าใจหรือยัง?"§!\n\nตัวอย่างอาวุธเพลิงที่ใช้ในการโจมตีได้รับการนำมาให้เราตรวจสอบ\n\n§E"เปลวไฟทำความสะอาดได้หมดจด นำมันไป สร้างความกลัวซะ"§!"
 astral_rift.3090.desc.baol: "$astral_rift.3090.desc.common_1$ บาวล์(เสียงดัง)$astral_rift.3090.desc.common_2$"
 astral_rift.3090.desc.default: "$astral_rift.3090.desc.common_1$ $astral_rift.3090.desc.common_2$"
 astral_rift.3090.tt: "บัดนี้สามารถสร้างกองทัพจู่โจมใหม่ได้: §H$flamestorm_troopers_army$§!"

 astral_rift.3095.name: "จุดสิ้นสุดการเดินทางสำรวจ"
 astral_rift.3095.desc.gestalt: "นักวิทยาศาสตร์ของเราที่อยู่นอกรอยแยกมิติในระบบดาว [solar_system.GetName] กำลังถูกกรูนัวร์ควบคุมตัวเอาไว้\n\nสายยึดเหนี่ยวได้รับการดึงกลับ และยานทรงกลม §Y$tech_rift_sphere$§! ได้รับการกู้คืน การดาวน์โหลดบันทึกข้อมูลขั้นสุดท้ายกำลังดำเนินการอยู่"
 astral_rift.3095.desc.default: "$astral_rift.3095.desc.gestalt$\n\nเราได้แต่หวังว่ากรูนัวร์จะแสดงความเมตตาต่อลูกเรือของยานสเปกทีฟและใครจะบอกได้? รอยแยกมิติระหว่างโลกยังไม่เป็นที่เข้าใจมากนัก... บางที หากโชคดี พวกเขาอาจหาทางกลับมาได้สำเร็จ"

 astral_rift.3099.name: "[Leader.GetName] เดินทางกลับมา"
 astral_rift.3099.desc: "§Y[Leader.GetName]§! [Leader.GetHasHave] ได้เดินทางกลับมาอย่างไม่คาดคิดจากการกักตัวภายในกองเรือกรูนัวร์ที่อยู่อีกฝั่งของรอยแยกมิติแอสทรัลในระบบดาว §Y[From.solar_system.GetName]§! ดูเหมือนว่าอายุของพวกเขาจะไม่สามารถระบุได้จากการติดอยู่ในกาลเวลาช่วงหนึ่ง ในฐานะทาสของกรูนัวร์พวกเขาได้เรียนรู้และมีความเชี่ยวชาญในการออกแบบอาวุธใหม่สำหรับการต่อสู้ระหว่างดวงดาว"

####################
# Tropical Habitat #
####################
 formula_pink_armies: "สูตรสีชมพู(สีชมพู)"
 opinion_formula_pink: "$formula_pink_armies$"
 formula_pink_opinion_modifier_tt: "เพิ่มค่าทัศนคติเชิงบวกต่อจักรวรรดิที่ไม่ใช่เครื่องจักร ไม่ใช่ลิทอยด์ และไม่ใช่ท็อกซอยด์ทั้งหมดด้วยปัจจัย §Y$opinion_formula_pink$§!"

 astral_rift_tropical_habitat: "แหล่งที่อยู่อาศัยเขตร้อน (Tropical Habitat)"

 astral_rift.3100.name: "$astral_rift_tropical_habitat$"
 astral_rift.3100.desc: "เรามาถึงชั้นบรรยากาศของดาวเคราะห์เขตร้อนที่เขียวชอุ่ม พืชพรรณมีสีสันเข้มข้น และหอยทากบวมเป่งคลานอยู่ตามต้นไม้ที่ออกผล\n\nม่านหมอกสีชมพูที่ผิดปกติประทุขึ้นเป็นระยะๆ ผ่านหลังคาป่าที่สวยงามสะกดสายตา\n\nเมื่อพิจารณาจากความหนาแน่นของใบไม้ เราจำเป็นต้องดำเนินการสังเกตการณ์จากพื้นดินต่อไป"
 astral_rift.3100.a: "ค้นหาจุดลงจอดที่เหมาะสม"

 astral_rift.3105.name: "การลงจอดที่สมบุกสมบัน"
 astral_rift.3105.desc: "เมื่อลงจอด เราพบรอยร้าวในภูมิประเทศที่ซ่อนอยู่ใต้ชั้นดินร่วนบางๆ ก๊าซสีเหลืองอำพันที่เราสังเกตเห็นจากเบื้องบนมีความเข้มข้นมากกว่าที่เบื้องล่าง เราคาดการณ์ว่าช่องเปิดนี้เป็นช่องระบายอากาศที่เคยทำงานมาก่อนจากส่วนลึกในแกนโลก\n\nจากจุดนี้ ความหลากหลายของพืชพรรณนั้นน่าเวียนหัวและหนาแน่นไปด้วยต้นไม้ที่ออกผล ฝูงทากขนาดใหญ่ต้วมเตี้ยมค่อยๆ คลานผ่านป่า กินอาหารอย่างพึงพอใจหรือนอนหลับบนดินที่อุดมไปด้วยสารอาหาร ล้อมรอบด้วยลูกๆ ของพวกมัน"
 astral_rift.3105.a: "ตรวจสอบสัตว์ป่า"
 astral_rift.3105.b: "เก็บตัวอย่างก๊าซสีชมพู"

 astral_rift.3110.name: "ระบบนิเวศกินพืช"
 astral_rift.3110.desc: "เราได้เก็บรวบรวมตัวอย่างสัตว์ป่าของดาวเคราะห์ดวงนี้เป็นจำนวนมาก สิ่งมีชีวิตที่นี่ไม่มีความก้าวร้าวเลย สิ่งมีชีวิตทุกชนิดที่เราพบเป็นสัตว์กินพืช หอยทากคล้ายทากกินพืชในปริมาณมหาศาลและสามารถสะสมไขมันหนาแน่นไว้ใต้เนื้อเยื่อสีเขียวขรุขระของมัน\n\nความหลากหลายของสัตว์ป่านั้นค่อนข้างแปลกประหลาด ในระบบนิเวศทั่วไป สายพันธุ์หนึ่งน่าจะพัฒนาขึ้นเพื่อล่าเหยื่อที่ง่ายดายเช่นนี้ เราเชื่อว่าธรรมชาติที่เชื่องของสัตว์เหล่านี้เป็นผลมาจากสารประกอบอินทรีย์ที่แปลกประหลาดที่พบในก๊าซสีชมพูที่มีอยู่ทั่วไป หวังว่าการสืบสวนหาแหล่งที่มาขององค์ประกอบเหล่านี้จะเปิดเผยข้อมูลเพิ่มเติม"
 astral_rift.3110.a: "ค้นหาแหล่งที่มา"

 astral_rift.3111.name: "ก๊าซมึนเมา"
 astral_rift.3111.desc: "ก๊าซที่เราพบบนดาวเคราะห์ดวงนี้กลับมีคุณสมบัติทำให้เกิดภาพหลอนที่เป็นอันตราย ความทรงจำของเราเกี่ยวกับเวลาที่ใช้นอกยานทรงกลมนั้นเลือนรางมาก อย่างไรก็ตาม เราสามารถรวบรวมข้อมูลการเดินทางของเราได้โดยการตรวจสอบการบันทึกจากกล้องติดชุดอวกาศของเรา\n\nเราเดินอย่างไร้จุดหมายเป็นเวลานานข้ามที่ราบอันมีชีวิตชีวาของโลกต่างดาวที่ปกคลุมไปด้วยม่านหมอก เรารู้สึกราวกับว่าแต่ละก้าวเป็นการค้นพบที่งดงาม พืชพรรณที่สวยงาม หอยทากที่เดินเตร่อยู่ในที่โล่ง ผลไม้อันโอชะ - เรากินพวกมันอย่างหิวโหย สารมึนเมาในอากาศมอบความรู้สึกประสบความสำเร็จอย่างยิ่งในการเดินทางของเรา แม้ว่าจะมีผลลัพธ์ที่เป็นประโยชน์จริงน้อยมากก็ตาม\n\nเครื่องกรองในชุดของเราไม่เพียงพอที่จะปกป้องเราจากก๊าซนี้ โชคดีที่บางคนในพวกเราสะดุดล้มกลับเข้ามาในที่พักของยานทรงกลม §Y$tech_rift_sphere$§! และสามารถฟื้นคืนสติได้ แม้ว่าจะรู้สึกเหมือนว่าเราเพิ่งออกไปได้ไม่นาน ทว่าเราได้ออกสำรวจเป็นเวลาหลายวันแล้ว\n\nแน่นอนว่าเราจะพยายามปรับปรุงอุปกรณ์ช่วยหายใจของเราสำหรับการสอบสวนที่เหลืออยู่"
 astral_rift.3111.a: "ค้นหาแหล่งที่มาของแก๊สนี้"

 astral_rift.3115.name: "การวิเคราะห์ชั้นบรรยากาศ"
 astral_rift.3115.desc.common: "เราได้เก็บตัวอย่างหมอกสีชมพูที่ลอยฟุ้งอยู่เหนือพื้นผิวของดาวเคราะห์ดวงนี้และนำมาวิเคราะห์ในระดับโมเลกุล\n\nแก๊สนี้มีฤทธิ์ทำให้จิตใจมึนงงอย่างรุนแรง ซึ่งสามารถทำให้สิ่งมีชีวิตทางชีวภาพทุกรูปแบบกลายเป็นสิ่งมีชีวิตที่เซื่องซึมและพึงพอใจในตัวเอง ภายใต้ฤทธิ์ของแก๊สนี้ สิ่งมีชีวิตที่มีปัญญาที่อ่อนไหวต่อสิ่งกระตุ้นจะพยายามตอบสนองเพียงความต้องการขั้นพื้นฐานที่สุดของตนเองเท่านั้น โดยที่ยังรู้สึกถึงความสำเร็จอันยิ่งใหญ่\n\nนอกจากนี้ สารประกอบในอากาศของมันยังส่งเสริมการสะสมไขมันโดยส่งผลกระทบต่อการผลิตฮอร์โมนตามธรรมชาติในผู้ที่สูดดมเข้าไป ซึ่งจะส่งผลให้สิ่งมีชีวิตที่ได้รับผลกระทบมีความอยากอาหารเพิ่มขึ้นเนื่องจากการควบคุมการกระจายสารอาหารและการตอบสนองของระบบภูมิคุ้มกันทำได้แย่ลง เมื่อเวลาผ่านไป ผลลัพธ์ที่ได้จะเป็นวัฏจักรตอกย้ำการบริโภคเกินขนาดอย่างไม่สิ้นสุด เรายืนยันได้ว่าแก๊สนี้ถูกผลิตขึ้นทางชีวภาพโดยอ้างอิงจากร่องรอยของเอนไซม์ แต่เรายังไม่สามารถระบุตำแหน่งของสัตว์ที่ผลิตมันได้"
 astral_rift.3115.desc.toxoid_or_lithoid: "$astral_rift.3115.desc.common$\n\nสารที่ทำให้ผ่อนคลายนี้ไม่ก่อให้เกิดความเสี่ยงต่อชีววิทยาของเรา แม้แต่ความเข้มข้นที่หนาแน่นอย่างยิ่งก็ส่งผลต่อเราเพียงเล็กน้อยเท่านั้น"
 astral_rift.3115.desc.mechanical: "$astral_rift.3115.desc.common$\n\nสารที่ทำให้ผ่อนคลายนี้จะไม่ส่งผลใดๆ ต่อโดรนของเรา เราสามารถสำรวจเพิ่มเติมต่อไปได้อย่างปลอดภัย"
 astral_rift.3115.desc.default: "$astral_rift.3115.desc.common$\n\nสำหรับการสำรวจเพิ่มเติม เราจำเป็นต้องใช้อุปกรณ์ช่วยหายใจแบบเต็มรูปแบบเพื่อปกป้องเราจากการมึนเมา"
 astral_rift.3115.a: "$astral_rift.3111.a$"
 astral_rift.3115.b: "สวมใส่อุปกรณ์ช่วยหายใจและดำเนินการต่อ"

 astral_rift.3120.name: "หุบเหวที่อ้าปากค้าง"
 astral_rift.3120.desc: "ด้วยการใช้เซนเซอร์ตรวจวัดคุณภาพอากาศ เราได้ค้นหาบริเวณที่มีความเข้มข้นของแก๊สพิษสูงที่สุดทั่วดินแดนที่เขียวชอุ่ม พ้นจากพุ่มไม้ที่เต็มไปด้วยผลเบอร์รี่ เราถูกนำทางไปยังปากรอยแยกขนาดใหญ่ใจกลางที่โล่ง คลื่นไอหมอกสีชมพูหนาทึบพวยพุ่งออกมาจากที่นั่นเป็นระยะๆ\n\nเราเชื่อว่าแก๊สนี้ถูกผลิตโดยสิ่งมีชีวิตใต้ดิน ณ จุดใดจุดหนึ่งที่ก้นรอยแยกนี้ การค้นพบมัน โดยเฉพาะการพบในขณะที่ยังมีชีวิตอยู่ อาจมอบโอกาสในการวิจัยที่ไม่เหมือนใคร"
 astral_rift.3120.a: "ใช้ความระมัดระวัง ขุดรอบๆ หุบเหว"
 astral_rift.3120.b: "สำรวจหุบเหวโดยตรง"

 astral_rift.3125.name: "การขุดหุบเหว"
 astral_rift.3125.desc: "เราได้ดัดแปลงอุปกรณ์เก็บตัวอย่างของ §Y$tech_rift_sphere$§! ให้เป็นเครื่องมือขุดเจาะ และใช้มันขุดบริเวณปากหุบเหว หลังจากตัดผ่านชั้นเศษซากพืชสีเหลืองที่เปียกชื้นหนาทึบเราก็พบดินชั้นใหม่ ดินนี้มีสีเหลืองดินเทศ(หายใจ)และแตกออกเป็นชิ้นบางๆ คล้ายเกล็ดในขณะที่เราขุด พร้อมกับปล่อยแก๊สสีชมพูที่ติดอยู่ภายในออกมาเป็นระยะๆ จากการรบกวนทางกลเพียงเล็กน้อย\n\nแม้ว่าดินชั้นนี้จะมีความเข้มข้นของสารประกอบอินทรีย์สูง แต่มันก็ยังไม่มากพอที่จะเป็นแหล่งกำเนิดแก๊ส\n\nเมื่อขุดลึกลงไป เครื่องมือเก็บเกี่ยวก็ได้เจาะทะลุชั้นดินที่มีสีคล้ำและแดงก่ำกว่าเดิม ทันใดนั้น พื้นดินก็ระเบิดออกอย่างรุนแรง เมฆแก๊สสีชมพูหนาทึบพวยพุ่งออกมาจากรอยแผลที่เราเจาะไว้ ดินสีเข้มนี้เคลื่อนไหวราวกับว่ามันมีชีวิต\n\nเครื่องมือเก็บเกี่ยวของเราถูกดินสีแดงฉานโอบล้อมอย่างรวดเร็วและบดขยี้จนกลายเป็นเศษเหล็ก พื้นผิวรอบตัวเราสั่นสะเทือนด้วยแรงสั่นสะเทือนที่รุนแรงขึ้นเรื่อยๆ เราจึงล่าถอยกลับขึ้นสู่ชั้นบรรยากาศระดับบน\n\nเราไม่เป็นที่ต้อนรับที่นี่อีกต่อไป"
 astral_rift.3125.a: "ศึกษาตัวอย่างดิน"

 astral_rift.3130.name: "การสำรวจหุบเหว"
 astral_rift.3130.desc: "เราเข้าไปในหุบเหวด้วยอุปกรณ์ปีนเขาขั้นพื้นฐานเพื่อค้นหาสิ่งมีชีวิตด้านล่าง ขณะที่เราไต่ลงไป ผนังแร่ธาตุได้เปลี่ยนจากดินสีเหลืองชื้นเป็นดินสีชมพูเข้มที่เป็นเกล็ด และลึกลงไปอีก ทุกอย่างก็กลายเป็นสีแดงก่ำที่เต้นเป็นจังหวะ\n\nการปะทุของแก๊สสีชมพูหนาทึบปกคลุมเราขณะที่เราเดินทางลงไปต่อ เมื่อถึงก้นหุบเหว เราก็ได้พบแหล่งกำเนิดของมัน: ม่านพังผืดที่ขึงพาดผ่านเส้นผ่านศูนย์กลางของหุบเหว ยึดส่วนช่องเปิดที่มีปากคล้ายจะงอยปากสารไคตินอยู่ตรงกลาง จากสิ่งมีชีวิตนี้ มีท่อที่มีเส้นเลือดหนาทึบเลื้อยลึกลงไปในโขดหิน\n\nเราได้พบสิ่งมีชีวิตกินเนื้อ และมันอาจจะเป็นตัวดาวเคราะห์เองก็เป็นได้"
 astral_rift.3130.a: "สกัดปากออกมา"
 astral_rift.3130.b: "เก็บเกี่ยวตัวอย่างดินจากผนังส่วนที่ลึกที่สุด"

 astral_rift.3135.name: "การสกัดออก"
 astral_rift.3135-3140.desc.common: "เราได้ตัดปากออกจากท่อส่วนกลางที่ยื่นออกมาจากหินสีแดงก่ำและเริ่มไต่กลับขึ้นไป"
 astral_rift.3135.desc.common.1: "$astral_rift.3135-3140.desc.common$\n\nผนังของหุบเหวสั่นสะเทือนอย่างรุนแรงเพื่อตอบสนอง และแก๊สชีวภาพที่มีความเข้มข้นสูงก็ท่วมท้นอุโมงค์ เรารู้สึกว่าห้องโถงทั้งหมดสั่นไหว และทางออกก็เล็กลงเรื่อยๆ ขณะที่เราเข้าใกล้พื้นผิว มัน—ไม่ว่า "มัน" จะเป็นอะไรก็ตาม—กำลังพยายามกลืนกินเรา"
 astral_rift.3135.desc.common.2: "เราไม่เป็นที่ต้อนรับที่นี่อีกต่อไป"
 astral_rift.3135.desc.toxoid: "$astral_rift.3135.desc.common.1$\n\nนับเป็นโชคดีที่ผนังสีแดงก่ำคล้ายเนื้อได้หดตัวกลับโดยอัตโนมัติเมื่อสัมผัสกับร่างกายที่มีพิษตามธรรมชาติของเรา เราหลบหนีออกมาได้โดยไม่ได้รับบาดเจ็บ เมื่อถึงพื้นผิว รอยแยกก็ปิดสนิทลง ทิ้งรอยแผลเป็นบางๆ ไว้บนที่โล่ง พื้นดินรอบตัวเราสั่นสะเทือนด้วยแรงสั่นสะเทือนที่รุนแรงขึ้นเรื่อยๆ กระตุ้นให้เราต้องรีบกลับขึ้นสู่ชั้นบรรยากาศระดับบน\n\n$astral_rift.3135.desc.common.2$"
 astral_rift.3135.desc.default: "$astral_rift.3135.desc.common.1$\n\nเราหลบหนีออกจากหุบเหวได้ทันเวลาพอดีขณะที่มันปิดตัวลงข้างหลังเรา ทิ้งรอยแผลเป็นยุบตัวลงไว้แทนที่ พื้นผิวรอบตัวเราสั่นสะเทือนด้วยแรงสั่นสะเทือนที่รุนแรงขึ้นเรื่อยๆ และเราก็ล่าถอยกลับขึ้นสู่ชั้นบรรยากาศระดับบน\n\n$astral_rift.3135.desc.common.2$"
 astral_rift.3135.a: "วิเคราะห์อวัยวะที่ถูกตัดออกมา"

 astral_rift.3140.name: "การสกัดที่แสนบอบช้ำ"
 astral_rift.3140.desc.common: "$astral_rift.3135-3140.desc.common$\n\nผนังของหุบเหวสั่นสะเทือนอย่างรุนแรงเพื่อตอบสนอง และแก๊สชีวภาพที่มีความเข้มข้นสูงก็ท่วมอุโมงค์จนบดบังทัศนวิสัยทั้งหมด เราตะเกียกตะกายขึ้นสู่พื้นผิว แต่ทางออกรอบตัวเรากลับเล็กลงเรื่อยๆ\n\nโชคร้ายที่ [Leader.GetName] ไม่สามารถผ่านพ้นอุโมงค์มาได้ทั้งหมดก่อนที่มันจะปิดลง ร่างกายท่อนล่างของ [Leader.GetHimHer] ถูกหนีบไว้โดยผนังหุบเหวและบดขยี้ด้วยแรงสั่นสะเทือนระดับแผ่นดินไหวอันมหาศาล"
 astral_rift.3140.desc.robot: "$astral_rift.3140.desc.common$\n\nโชคดีที่ชิ้นส่วนทั้งหมดสามารถทดแทนได้"
 astral_rift.3140.desc.default: "$astral_rift.3140.desc.common$\n\nเราได้เก็บกู้ร่างที่พิการของ [Leader.GetName] และหลบหนีกลับขึ้นสู่ชั้นบรรยากาศระดับบน [Leader.GetHeShe] [Leader.GetHasHave] ได้รับบาดเจ็บสาหัสที่ไม่สามารถรักษาให้หายขาดได้ แต่ยังมีอาการคงที่โดยพึ่งพาอุปกรณ์พยุงชีพ"
 astral_rift.3140.a: "$astral_rift.3135.a$"

 astral_rift.3145.name: "สิ่งมหัศจรรย์ทางธรณีวิทยา"
 astral_rift.3145.desc: "เราได้วิเคราะห์ดินสีชมพูประหลาดที่เก็บรวบรวมมาและยืนยันถึงการมีอยู่ของสิ่งมีชีวิตทางชีวภาพที่มีแร่ธาตุเป็นฐานในวงกว้าง เราเชื่อว่าวัสดุนี้และสารสีแดงก่ำที่บดขยี้เครื่องมือของเราล้วนเป็นส่วนหนึ่งของสิ่งมีชีวิตเดียวกัน นั่นคือตัวดาวเคราะห์เอง สมมติฐานของเราคือดาวเคราะห์ที่มีความรู้สึกนี้ได้สร้างระบบนิเวศของตัวเองขึ้นมาเพื่อคอยป้อนปศุสัตว์ที่ยอมจำนนและมีสารอาหารสูงให้แก่ตัวมันอย่างต่อเนื่อง\n\nดินนี้มีคุณสมบัติในการช่วยเจริญเติบโตของพืชอย่างน่าทึ่ง และช่วยอธิบายความหนาแน่นอย่างยิ่งของพืชพรรณบนพื้นผิวดาวเคราะห์ดวงนี้ เราสามารถประยุกต์ใช้หลักการบางอย่างของมันกับวิธีการทำฟาร์มของเราได้"

 astral_rift.3150.name: "$astral_rift.3145.name$"
 astral_rift.3150.desc: "ด้วยความระมัดระวังไม่ให้รบกวนสิ่งมีชีวิตนั้น เราจึงรีบเก็บตัวอย่างดินสามประเภทจากผนังที่เต้นเป็นจังหวะของหุบเหวและออกจากดาวเคราะห์ดวงนี้โดยไม่มีเหตุการณ์ใดๆ เกิดขึ้นอีก\n\nเราวิเคราะห์ตัวอย่างที่เก็บมาได้และได้รับการยืนยันตามข้อสงสัยของเรา—ตัวดาวเคราะห์เองนั้นมีชีวิต\n\nดินชั้นบนสีเหลืองมีความหนาแน่นของสารอาหารสูงมากและใช้สำหรับเร่งการเจริญเติบโตของพืชพรรณ ชั้นแร่สีชมพูที่เป็นเกล็ดเป็นพาหะในการแพร่กระจายแก๊สที่ทำให้มึนเมาอย่างมีประสิทธิภาพไปทั่วพื้นผิวดาวเคราะห์ทั้งหมด และสุดท้าย วัสดุสีแดงก่ำทำหน้าที่เสมือนระบบไหลเวียนโลหิตของดาวเคราะห์ ซึ่งสามารถกระจายแร่ธาตุและทรัพยากรอินทรีย์ไปยังจุดที่จำเป็นที่สุดได้อย่างมีประสิทธิภาพ\n\nหุบเหวที่เราเผชิญหน้าอยู่นี้เป็นทางเดินอาหารอย่างแน่นอน และเราโชคดีมากที่ไม่ถูกกิน\n\nอย่างไรก็ตาม เราสามารถประยุกต์ใช้คุณสมบัติการช่วยเจริญเติบโตอันน่าทึ่งของดินชั้นบนกับวิธีการทำฟาร์มของเราเองได้ รูปแบบชีวิตที่ไม่เหมือนใครซึ่งเราได้พบในมิติต่างดาวนี้จะเป็นหัวข้อการศึกษาไปอีกหลายปี"

 astral_rift.3155.name: "การผ่าพิสูจน์ดาวเคราะห์"
 astral_rift.3155.desc.common: "หลังจากทำการทดลองอย่างกว้างขวางกับอวัยวะย่อยอาหารที่ถูกตัดออกมา เราได้รับความเข้าใจเพิ่มเติมเกี่ยวกับระบบนิเวศของดาวเคราะห์ดวงนี้ เริ่มต้นด้วย ตัวดาวเคราะห์ทั้งหมดนั้นมีชีวิต—ดินและทุกสิ่งทุกอย่าง\n\nภายในระบบย่อยอาหารของส่วนปากมีถุงที่เต็มไปด้วยวัสดุชีวภาพที่มีความเข้มข้นสูงซึ่งสามารถระเหยขึ้นไปสู่ชั้นบรรยากาศระดับล่างได้ แก๊สนี้ได้รับการออกแบบมาเพื่อขุนสัตว์ที่อาศัยอยู่บนพื้นผิวของมันให้อ้วนพีและป้องกันไม่ให้ผู้ล่าชนิดอื่นวิวัฒนาการขึ้นมา เหยื่อที่มึนเมาจะถูกดาวเคราะห์กลืนกินผ่านช่องเปิดขนาดใหญ่ที่คล้ายกับที่เราพบ ปากที่เรากู้คืนมาได้นั้นเป็นเพียงหนึ่งในหลายพันปากเท่านั้น"
 astral_rift.3155.desc.robotic_or_pacifist: "$astral_rift.3155.desc.common$\n\nเราได้เรียนรู้วิธีสังเคราะห์และดัดแปลงคุณสมบัติของแก๊สสีชมพูนี้เพื่อนำไปประยุกต์ใช้จริงเป็นฟีโรโมนสำหรับนักการทูตของเรา แม้ว่าจะอยู่ในความเข้มข้นที่ลดลงอย่างมาก แต่มันก็ยังคงรักษาฤทธิ์ในการทำให้ผ่อนคลายอย่างรุนแรงต่อสิ่งมีชีวิตทางชีวภาพตามธรรมชาติส่วนใหญ่"
 astral_rift.3155.desc.default: "$astral_rift.3155.desc.common$\n\nเราได้เรียนรู้วิธีสังเคราะห์และดัดแปลงคุณสมบัติของแก๊สสีชมพูนี้เพื่อนำไปใช้งานจริงเป็นยาแก้ปวดในสนามรบ เราได้เพิ่มฤทธิ์ระงับความรู้สึกของแก๊สและนำสารลดความก้าวร้าวออก เพื่อให้ทหารที่ได้รับบาดเจ็บสามารถละทิ้งความเจ็บปวดจากบาดแผลและต่อสู้ต่อไปได้"
  astral_rift.3155.a: "ช่างเป็นสิ่งมีชีวิตที่น่าทึ่งจริงๆ"

####################
# Psionic Stranger #
####################
 zroni_insight_modifier: "ความเข้าใจลึกซึ้งของซโรนี"
 zroni_insight_space_storm_reduction_modifier: "มาตรการป้องกันพายุความเข้าใจลึกซึ้งของซโรนี"
 zroni_insight_space_storm_reduction_modifier_tt: "การป้องกันจากผลกระทบเชิงลบของ §Iพายุอวกาศ§!: §G-50%§!"
 astral_rift_psionic_stranger: "คนแปลกหน้าพลังจิต"

 astral_rift.3200.name: "คนแปลกหน้าพลังจิต"
 astral_rift.3200.desc.common: "เราได้มาถึงชั้นบรรยากาศของดาวเคราะห์เยือกแข็งที่เต็มไปด้วยภูเขา"
 astral_rift.3200.desc.common.non_robot: "เกือบจะในทันที เราได้รับความสั่นสะเทือนจากข้อความโทรจิตอันทรงพลัง:\n\n§E"ยินดีต้อนรับ ผู้เดินทางมาแสนไกล จากส่วนลึกของการทำสมาธิ ข้าสัมผัสได้ถึงการเดินทางของเจ้าข้ามผ่านมิติต่างดาว มาเถิด มาพบกัน บางทีการมาถึงของเจ้าอาจเป็นจุดเปลี่ยนที่ข้ารอคอยมาแสนนาน"\n\n§!นิมิตของถ้ำบนภูเขาที่โดดเดี่ยวได้รับการเปิดเผยแก่เรา"
 astral_rift.3200.desc.common.psionic: "ไม่ว่าผู้นี้จะเป็นใคร พลังจิตของพวกเขาเหนือกว่าความสามารถใดๆ ที่เรามีอยู่มากนัก"
 astral_rift.3200.desc.common.robot: "ไม่นานนัก วงจรของเราก็สั่นสะเทือนด้วยการส่งสัญญาณจากภายนอก:\n\n§E\"ยินดีต้อนรับ ผู้เดินทางมาแสนไกล จากส่วนลึกของการทำสมาธิ ข้าสัมผัสได้ถึงการเดินทางของเจ้าข้ามผ่านมิติต่างดาว มาเถิด มาพบกัน บางทีการมาถึงของเจ้าอาจเป็นจุดเปลี่ยนที่ข้ารอคอยมาแสนนาน\"\n\n§!พิกัดไปยังอีกฟากหนึ่งของดาวเคราะห์ได้รับการจัดเตรียมไว้ให้"
 astral_rift.3200.desc.common.non_psionic: "การตรวจพบการมีอยู่ของเราได้อย่างรวดเร็วและสามารถส่งข้อความจากระยะไกลเช่นนี้ บ่งบอกว่าคนแปลกหน้าลึกลับผู้นี้มีพลังจิตที่น่าเหลือเชื่อ"
 astral_rift.3200.desc.robot_psionic: "$astral_rift.3200.desc.common$\n\n$astral_rift.3200.desc.common.robot$\n\n$astral_rift.3200.desc.common.psionic$"
 astral_rift.3200.desc.robot: "$astral_rift.3200.desc.common$\n\n$astral_rift.3200.desc.common.robot$\n\n$astral_rift.3200.desc.common.non_psionic$"
 astral_rift.3200.desc.psionic: "$astral_rift.3200.desc.common$\n\n$astral_rift.3200.desc.common.non_robot$\n\n$astral_rift.3200.desc.common.psionic$"
 astral_rift.3200.desc.default: "$astral_rift.3200.desc.common$\n\n$astral_rift.3200.desc.common.non_robot$\n\n$astral_rift.3200.desc.common.non_psionic$"
 astral_rift.3200.a: "ค้นพบตัวตนนี้"

 astral_rift.3205.name: "ผู้หยั่งรู้แดนไกล"
 astral_rift.3205.desc.intro: "เราได้ติดตามนิมิตไปยังจุดหนึ่งบนยอดเขาที่สูงที่สุดแห่งหนึ่งของดาวเคราะห์\n\nร่างสวมหน้ากากร่างหนึ่งนั่งทำสมาธิอยู่ในถ้ำที่แยกตัวออกไป ร่างกายมีผิวสีเทาและเป็นมนุษย์ต่างดาวคล้ายมนุษย์ เธอถูกโอบล้อมไปด้วยออร่าสีม่วงของพลังงานที่เต้นเป็นจังหวะเบาๆ"
 astral_rift.3205.desc.outro: "§E"ขอบคุณที่ยอมรับคำเชิญของข้า เรามีเรื่องต้องคุยกันมากมาย"\n\n"ข้ามีนามว่าผู้หยั่งรู้แดนไกล ข้าทำสมาธิอยู่บนดินแดนเยือกแข็งที่รกร้างนี้มาหลายปีเพื่อรอคอยการเปิดเผย ไม่ใช่เพราะเรื่องบังเอิญอย่างเดียวหรอกที่เจ้าปรากฏตัวที่นี่"§!"
 astral_rift.3205.desc.common.completed_zroni: "เราจำได้ว่าเอเลี่ยนผู้นี้คือซโรนีเมื่อหลายล้านปีก่อน เผ่าพันธุ์ที่ได้รับพรสวรรค์ทางพลังจิตนี้อาศัยอยู่ในจักรวาลของเราเอง ก่อนที่สงครามกลางเมืองจะส่งผลให้สายพันธุ์ของพวกเขาตกต่ำลงจนสูญพันธุ์ไปอย่างสมบูรณ์ บางทีมิตินี้อาจเป็นประตูสู่เส้นเวลาคู่ขนานที่ซโรนียังไม่ได้ละทิ้งโลกเพื่อก้าวสู่เดอะชราวด์(เสียงพึมพัม)"
 astral_rift.3205.desc.common.started_zroni: "เราจำได้ว่าเอเลี่ยนผู้นี้คือซโรนีสมาชิกของเผ่าพันธุ์ที่ได้รับพรสวรรค์ทางพลังจิตที่อาศัยอยู่ในจักรวาลของเราเองเมื่อหลายล้านปีก่อน บางทีมิตินี้อาจเป็นประตูสู่เส้นเวลาคู่ขนานที่ซโรนียังคงมีตัวตนอยู่"
 astral_rift.3205.desc.common.not_started_zroni: "เขาส่องสว่างงอกออกมาจากศีรษะของเอเลี่ยนผู้นี้ พร้อมด้วยเดือยที่มีลักษณะคล้ายกันแต่แคระแกร็นยื่นออกมาจากหลังของเธอ เราไม่คุ้นเคยกับเผ่าพันธุ์นี้ แต่พวกมันจะต้องมีความสอดคล้องอย่างสูงกับคลื่นความถี่พลังจิต"
 astral_rift.3205.desc.common.gestalt: "เราได้รับการสื่อสารอีกครั้ง:"
 astral_rift.3205.desc.common.default: "เอเลี่ยนผู้นั้นพูดขึ้นมาในใจเราอีกครั้ง:"
 astral_rift.3205.desc.gestalt_started_zroni: "$astral_rift.3205.desc.intro$\n\n$astral_rift.3205.desc.common.started_zroni$\n\n$astral_rift.3205.desc.common.gestalt$\n\n$astral_rift.3205.desc.outro$"
 astral_rift.3205.desc.gestalt_completed_zroni: "$astral_rift.3205.desc.intro$\n\n$astral_rift.3205.desc.common.completed_zroni$\n\n$astral_rift.3205.desc.common.gestalt$\n\n$astral_rift.3205.desc.outro$"
 astral_rift.3205.desc.gestalt_not_started_zroni: "$astral_rift.3205.desc.intro$\n\n$astral_rift.3205.desc.common.not_started_zroni$\n\n$astral_rift.3205.desc.common.gestalt$\n\n$astral_rift.3205.desc.outro$"
 astral_rift.3205.desc.default_started_zroni: "$astral_rift.3205.desc.intro$\n\n$astral_rift.3205.desc.common.started_zroni$\n\n$astral_rift.3205.desc.common.default$\n\n$astral_rift.3205.desc.outro$"
 astral_rift.3205.desc.default_completed_zroni: "$astral_rift.3205.desc.intro$\n\n$astral_rift.3205.desc.common.completed_zroni$\n\n$astral_rift.3205.desc.common.default$\n\n$astral_rift.3205.desc.outro$"
 astral_rift.3205.desc.default_not_started_zroni: "$astral_rift.3205.desc.intro$\n\n$astral_rift.3205.desc.common.not_started_zroni$\n\n$astral_rift.3205.desc.common.default$\n\n$astral_rift.3205.desc.outro$"
 astral_rift.3205.a: "ฟังคำพูดของผู้หยั่งรู้แดนไกล"

 astral_rift.3210.name: "ภาระของผู้หยั่งรู้แดนไกล"
 astral_rift.3210.desc: "ผู้หยั่งรู้แดนไกลกล่าวต่อ:\n\n§E\"ข้าได้รวบรวมความพยายามที่จะเข้าสู่มิติแห่งจิตวิญญาณ ผู้คนของพวกเจ้ารู้จักสถานที่แห่งนี้ในนาม 'เดอะชราวด์)เมื่อเร็วๆ นี้ ข้าสัมผัสได้ถึงเสียงเรียกประหลาดที่เชื่อว่ามาจากส่วนลึกภายในเดอะชราวด์ ตอนนี้ข้ากำลังยืนอยู่ตรงปากทางเข้าสู่โลกอันลึกลับนี้เป็นครั้งแรก\"§!\n\nผู้หยั่งรู้แดนไกลทอดถอนหายใจ\n\n§E\"ผู้คนของข้ามอบหมายความรับผิดชอบนี้ให้แก่ข้า การเข้าสู่เดอะชราวด์อาจมอบพลังอันยิ่งใหญ่ให้กับเราจริงๆ แต่ในใจของข้าเต็มไปด้วยความสงสัย ยิ่งข้าเข้าใกล้มากเท่าไหร่ เดอะชราวด์ก็ยิ่งดึงดูดข้ามากขึ้นเท่านั้น มีเสียงกระซิบในมุมมืดของใจข้า พลังเช่นนี้จะสามารถควบคุมได้จริงๆ หรือ? และตอนนี้ ณ วินาทีแห่งการตัดสินใจ พวกเจ้าก็ปรากฏตัวขึ้น นี่ต้องไม่ใช่ความบังเอิญธรรมดาอย่างแน่นอน\"§!"
 astral_rift.3210.a: "เปิดเผยชะตากรรมของซโรนี"
 astral_rift.3210.b: "เปิดเผยสิ่งเรารู้เกี่ยวกับซโรนี"
 astral_rift.3210.c: "เราทำได้เพียงเสนอแนะมุมมองของเราเท่านั้น"
 astral_rift.3210.d: "ไม่ใช่หน้าที่ของเราที่จะเข้าแทรกแซง"
 astral_rift.3210.e: "การแสวงหาทางจิตวิญญาณเช่นนี้เป็นเรื่องไร้สาระ"

 astral_rift.3215.name: "ลางสังหรณ์แห่งความพินาศ"
 astral_rift.3215.desc: "เราได้อธิบายให้ผู้หยั่งรู้แดนไกลฟังเกี่ยวกับสิ่งที่งานวิจัยทางโบราณคดีของเราได้สอนเกี่ยวกับอารยธรรมซโรนี\n\nเราให้รายละเอียดเกี่ยวกับราคาของการมีพลังครอบจักรวาลที่นำไปสู่การแบ่งแยกในหมู่ซโรนีในมิติของเรา และอธิบายถึงสงครามกลางเมืองอันดุเดือดซึ่งลงเอยด้วยการสูญพันธุ์ของพวกเขา\n\nผู้หยั่งรู้แดนไกลพิจารณาคำพูดของเราอย่างเงียบๆ\n\n§E\"เป็นความจริงหรือที่ว่าความพยายามของข้าที่นี่จะนำความพินาศมาสู่พวกเรา? หากการเจาะทะลุเดอะชราวด์จะนำไปสู่ภัยพิบัติ การจะตามหามันต่อก็คงเป็นเรื่องโง่เขลาอย่างยิ่ง ผู้คนของข้าเชื่อใจข้า หากข้าประกาศว่าเดอะชราวด์เป็นแหล่งกำเนิดของความเสื่อมทราม ความปรารถนาในการก้าวข้ามขีดจำกัดของเราอาจมอดดับลง แต่บางทีอาจมีหนทางอยู่... ด้วยความรู้ที่พวกเจ้ามอบให้ ข้าอาจเข้าหาพลังเบื้องสูงภายในเดอะชราวด์ในรูปแบบที่แตกต่างออกไป เพื่อป้องกันภัยพิบัติที่เกิดขึ้นกับเราในมิติของพวกเจ้า\"§!"
 astral_rift.3215.a: "มันเป็นความพยายามที่ถูกกำหนดให้ต้องล้มเหลว"
 astral_rift.3215.b: "คราวนี้ มันอาจจะแตกต่างออกไป..."

 astral_rift.3220.name: "โชคชะตาที่แน่นอน"
 astral_rift.3220.desc: "เราอธิบายว่าซโรนีใช้เดอะชราวด์เพื่อเลื่อนระดับไปสู่การมีอยู่ขั้นสูงได้อย่างไร พัฒนาไปไกลกว่าความต้องการทางกายภาพและเอิบอิ่มในความสามารถกึ่งครอบจักรวาลแบบยูโทเปีย การเลื่อนระดับมาพร้อมกับความท้าทายครั้งใหญ่ แต่จากมุมมองทางวัตถุและสังคมวิทยา มันเป็นความสำเร็จที่ยิ่งใหญ่มาก เราได้ตั้งข้อสังเกตว่าชะตากรรมสุดท้ายของซโรนียังไม่เป็นที่เข้าใจอย่างถ่องแท้โดยนักวิชาการของเรา\n\nผู้หยั่งรู้แดนไกลตอบกลับว่า:\n\n§E\"ดูเหมือนว่าซโรนีในมิติใดๆ ก็ตามถูกกำหนดให้ต้องเข้าสู่เดอะชราวด์ ชะตากรรมที่ก้าวข้ามขีดจำกัดของเส้นเวลาเดียว บางทีทางเลือกนี้อาจไม่ใช่เรื่องที่เราเป็นผู้กำหนดแต่แรก\"§!"
 astral_rift.3220.a: "แนะนำว่าไม่ควรยุ่งเกี่ยวกับเดอะชราวด์"
 astral_rift.3220.b: "สนับสนุนให้ผู้หยั่งรู้แดนไกลเจาะทะลุเดอะชราวด์"

 astral_rift.3225.name: "มุมมองของเรา"
 astral_rift.3225.desc.gestalt: "เราอธิบายว่า [Explorer.GetName] มีอยู่เป็นจิตใต้สำนึกร่วม และการตัดสินใจที่มีความหมายเช่นนี้ไม่ควรปล่อยให้เป็นไปตามทางเลือกส่วนบุคคล สิ่งใดก็ตามที่มีประโยชน์ต่อสังคมซโรนีโดยรวมย่อมเป็นการตัดสินใจที่ถูกต้อง และความอึดอัดส่วนตัวไม่ควรเป็นปัจจัยที่นำมาคิด\n\nผู้หยั่งรู้แดนไกลตอบว่า:\n\n§E\"บางทีมันอาจจะเป็นเรื่องฉลาดที่จะมองปัญหาโลกแตกนี้จากมุมมองของส่วนรวมให้มากขึ้นอย่างที่พวกเจ้าทำ พวกเจ้าคิดว่าเราควรดำเนินการอย่างไรดี?\"§!"
 astral_rift.3225.desc.non_gestalt_spiritualist: "เราได้แบ่งปันรายละเอียดเกี่ยวกับความสัมพันธ์ของเราเองกับสิ่งศักดิ์สิทธิ์ การแสวงหาความหลุดพ้นคือเหตุผลที่เราออกสำรวจ เพื่อค้นหาความหมายที่เหนือกว่าตัวเราเองและประสานความเชื่อมโยงกับจักรวาลให้ลึกซึ้งยิ่งขึ้น\n\nผู้หยั่งรู้แดนไกลตอบว่า:\n\n§E\"พวกเจ้าช่างคล้ายกับเราในแง่นั้นยิ่งนัก ชาวซโรนีต่างปรารถนาที่จะก้าวข้ามผ่านโลกวัตถุ แล้วข้ามีสิทธิ์อะไรที่จะไปปฏิเสธการเลื่อนระดับของผู้คนของข้าเล่า? ในฐานะเพื่อนผู้แสวงหาเหมือนกัน พวกเจ้าคิดว่าเราควรดำเนินการอย่างไรดี?\"§!"
 astral_rift.3225.desc.non_gestalt_materialist: "เราได้อธิบายว่าความจริงทางวิทยาศาสตร์ที่เป็นกลางคือวิธีที่เรากำหนดตำแหน่งแห่งที่ของเราในจักรวาล การค้นหาความรู้ได้นำพาเราไปสู่พรมแดนใหม่และไกลออกไป มันยังช่วยให้เผ่าพันธุ์ของเราทั้งสองมาพบกันจากคนละมิติได้อีกด้วย\n\nผู้หยั่งรู้แดนไกลตอบว่า:\n\n§E"พวกเราช่างแตกต่างกันเหลือเกิน ผู้คนของพวกเรา ทว่าพวกเจ้ากลับนอบน้อมและชาญฉลาด แม้ความเชื่อของพวกเจ้าจะขัดกับเราก็ตาม บางทีในกรณีนี้อาจมีปัญญาอยู่ในมุมมองของพวกเจ้า ในฐานะผู้ยึดมั่นในโลกวัตถุ พวกเจ้าคิดว่าเราควรดำเนินการอย่างไรดี?"§!"
 astral_rift.3225.desc.default: "เราอธิบายว่าเราเชื่อว่าเป้าหมายของสังคมคือการเติบโตและรุ่งเรืองตามหลักการของตน การแสดงออกถึงคุณค่าของตนเองบนเวทีกาแล็กซีคือบททดสอบที่แท้จริงของอารยธรรม หากการเข้าสู่เดอะชราวด์คือเจตจำนงของผู้คนของเจ้าจริงๆ เจ้าก็มีหน้าที่ที่ต้องดำเนินการต่อ\n\nผู้หยั่งรู้แดนไกลตอบว่า:\n\n§E"ข้าเข้าใจ แต่เจตจำนงของผู้คนของข้ายังคงแตกแยก ผู้เดินทางมาจากแดนไกล พวกเจ้าสามารถมอบคำแนะนำอะไรให้ข้าได้บ้าง? ภาระของการตัดสินใจนี้มันหนักหนาเกินกว่าที่ข้าจะแบกรับไว้คนเดียวได้"§!"
 astral_rift.3225.a: "แนะนำว่าไม่ควรยุ่งเกี่ยวกับเดอะชราวด์"
 astral_rift.3225.b: "สนับสนุนให้ผู้หยั่งรู้แดนไกลเจาะทะลุเดอะชราวด์"

 astral_rift.3230.name: "ปล่อยให้เป็นเรื่องของโชคชะตา"
 astral_rift.3230.desc.intro: "เราอธิบายว่าเราไม่สนใจที่จะให้ความเห็นและนี่ไม่ใช่การมาเยือนตามที่โชคชะตากำหนดไว้ เราคือผู้สำรวจ และได้เดินทางมาถึงสถานที่แห่งนี้ด้วยความบังเอิญอย่างสมบูรณ์\n\n§E"ตกลง บางทีการตัดสินใจไม่แทรกแซงของเจ้าอาจเป็นเพียงอีกสัญญาณหนึ่งที่ข้าต้องตีความ ไปเถิด จงไปอย่างระมัดระวัง"§!"
 astral_rift.3230.desc.outro: "เราได้ปล่อยให้ผู้หยั่งรู้แดนไกลอยู่กับการทำสมาธิของเธอ แล้วเราก็ออกสำรวจพื้นที่ใกล้เคียงด้วยความหวังว่าการเดินทางมาที่นี่จะช่วยสร้างประโยชน์ที่จับต้องได้ ไม่นานนักเราก็ค้นพบแหล่งแร่ที่มีมูลค่าสูงอยู่ระหว่างยอดเขาสองลูก"
 astral_rift.3230.desc.completed_zroni: "$astral_rift.3230.desc.intro$\n\nมีความเป็นไปได้สูงที่ประวัติศาสตร์ของซโรนีจะซ้ำรอยเดิมในมิตินี้เช่นกัน ทว่าชะตากรรมของพวกเขาไม่ใช่เรื่องที่เราจะเข้าไปแทรกแซง\n\n$astral_rift.3230.desc.outro$"
 astral_rift.3230.desc.started_zroni: "$astral_rift.3230.desc.intro$\n\nชาวซโรนีมีเส้นทางของพวกเขาเองให้ก้าวเดิน และเป็นสิ่งไม่ฉลาดที่จะเข้าไปก้าวก่ายในเส้นเวลาอื่น\n\n$astral_rift.3230.desc.outro$"
 astral_rift.3230.desc.default: "$astral_rift.3230.desc.intro$\n\n$astral_rift.3230.desc.outro$"
 astral_rift.3230.a: "สำรวจแหล่งแร่สะสม"

 astral_rift.3235.name: "คำแนะนำอันเปรียบเสมือนคำทำนาย"
 astral_rift.3235.desc.intro: "เราได้แนะนำไม่ให้ผู้หยั่งรู้แดนไกลเข้าสู่เดอะชราวด์ในเวลานี้ และเธอก็ยอมรับคำแนะนำของเราประหนึ่งคำทำนาย เพื่อเป็นการขอบคุณ เธอได้มอบผลึกข้อมูล(แก้ว)ขนาดเล็กแต่หนักอย่างประหลาดให้แก่เรา จากนั้นเราก็ลาจากมา\n\nการวิเคราะห์ผลึกข้อมูลเผยให้เห็นเมทริกซ์ที่ปรับเปลี่ยนได้อย่างละเอียดอ่อน คลังข้อมูลขนาดใหญ่ที่เก็บไว้ในรูปของพลังงานจิต"
 astral_rift.3235.desc.gestalt: "$astral_rift.3235.desc.intro$\n\nแม้ว่าผลึกข้อมูลนี้จะเป็นตัวอย่างทางวิศวกรรมที่น่าสนใจ แต่เราก็ได้แปลงคลังข้อมูลของมันเป็นพลังงานในรูปแบบที่มีประโยชน์มากกว่า"
 astral_rift.3235.desc.materialist: "$astral_rift.3235.desc.gestalt$"
 astral_rift.3235.desc.default: "$astral_rift.3235.desc.intro$\n\nข้อมูลภายในได้ช่วยมอบความเข้าใจที่ลึกซึ้งเกี่ยวกับทฤษฎีพลังจิต"
 astral_rift.3235.a: "บางทีเราอาจจะได้พบกันอีก"

 astral_rift.3240.name: "$astral_rift.3235.name$"
 astral_rift.3240.desc.intro: "เราได้สนับสนุนให้ผู้หยั่งรู้แดนไกลลองเข้าไปในเดอะชราวด์เพื่อเลื่อนระดับไปสู่การมีอยู่ขั้นสูง และเธอก็ยอมรับคำแนะนำของเราประหนึ่งคำทำนาย เพื่อเป็นการขอบคุณ เธอได้มอบผลึกข้อมูลขนาดเล็กแต่หนักอย่างประหลาดให้แก่เรา จากนั้นเราก็ลาจากมา\n\nการวิเคราะห์ผลึกข้อมูลเผยให้เห็นเมทริกซ์ที่ปรับเปลี่ยนได้อย่างละเอียดอ่อน คลังข้อมูลขนาดใหญ่ที่เก็บไว้ในรูปของพลังงานจิต"
 astral_rift.3240.desc.completed_zroni: "บางทีคราวนี้ อาจจะมีผลลัพธ์ที่เป็นบวกมากขึ้นสำหรับสายพันธุ์ของเธอ"
 astral_rift.3240.desc.gestalt: "$astral_rift.3240.desc.intro$\n\nแม้ว่าผลึกข้อมูลนี้จะเป็นตัวอย่างทางวิศวกรรมที่น่าสนใจ แต่เราก็ได้แปลงคลังข้อมูลของมันเป็นพลังงานในรูปแบบที่มีประโยชน์มากกว่า"
 astral_rift.3240.desc.gestalt_completed_zroni: "$astral_rift.3240.desc.gestalt$\n\n$astral_rift.3240.desc.completed_zroni$"
 astral_rift.3240.desc.materialist: "$astral_rift.3240.desc.gestalt$"
 astral_rift.3240.desc.materialist_completed_zroni: "$astral_rift.3240.desc.gestalt_completed_zroni$"
 astral_rift.3240.desc.default: "$astral_rift.3240.desc.intro$\n\nข้อมูลภายในได้ช่วยมอบความเข้าใจที่ลึกซึ้งเกี่ยวกับทฤษฎีพลังจิต"
 astral_rift.3240.desc.default_completed_zroni: "$astral_rift.3240.desc.default$\n\n$astral_rift.3240.desc.completed_zroni$"
 astral_rift.3240.a: "$astral_rift.3235.a$"

 astral_rift.3245.name: "โอกาสมาถึงแล้ว"
 astral_rift.3245.desc: "เราพบแหล่งแร่ขนาดใหญ่ที่ฝังอยู่ใต้หินคริสตัลที่ถล่มลงมาในหุบเขาระหว่างภูเขาสองลูก พื้นดินไม่เสถียรเกินกว่าจะพัฒนาเป็นเหมืองแร่เต็มรูปแบบได้ แต่เราก็ใช้เครื่องมือที่มีจำกัดเก็บเกี่ยวสิ่งที่พอจะทำได้จากพื้นผิวของแหล่งแร่นั้น\n\nด้วยการขนทรัพยากรอันมีค่ากลับไป การสำรวจครั้งนี้ถือว่าประสบความสำเร็จเป็นอย่างดี"
 astral_rift.3245.a: "$FASCINATING$"

 astral_rift.3280.name: "สารจากแดนไกล"
 astral_rift.3280.a: "ความมีน้ำใจอันลึกซึ้ง"
 astral_rift.3280.desc.intro: "เราตรวจพบแคปซูลที่มีผิวเรียบเนียนอย่างสมบูรณ์ลอยออกมาจากรอยแยกที่เราสำรวจใน §Y[From.System.GetName]§!"
 astral_rift.3280.desc.encountered_priestess: "นักบวชหญิงซโรนีที่เราเคยพบที่นั่นได้ส่งข้อความหาเรา"
 astral_rift.3280.desc.common: "§E"ขอบคุณ [From.Leader.GetName] แห่ง [From.Explorer.GetName] สำหรับคำทำนายที่ท่านมอบให้ ตั้งแต่นั้นมาข้าได้หลีกเลี่ยงความยั่วยวนทั้งหมดจากเดอะชราวด์ และเมื่อดำเนินตามตัวอย่างของพวกท่าน พวกเราจึงได้เรียนรู้ที่จะเดินทางข้ามมิติต่างดาวเพื่อค้นหาคำตอบเพิ่มเติมด้วยตัวเอง เราขอมอบสิ่งที่ค้นพบบางส่วนนี้เพื่อแสดงความขอบคุณยิ่ง"§!\n\nแคปซูลนี้บรรจุข้อมูลการวิจัยจำนวนมหาศาลจากมิติคู่ขนานอื่นๆ"
 astral_rift.3280.desc.started_zroni: "$astral_rift.3280.desc.intro$\n\n$astral_rift.3280.desc.encountered_priestess$\n\n$astral_rift.3280.desc.common$"
 astral_rift.3280.desc.completed_zroni.common: "ดูเหมือนว่าจะมีอย่างน้อยหนึ่งมิติที่เผ่าพันธุ์นี้จะสามารถมีชีวิตรอดต่อไปได้"
 astral_rift.3280.desc.completed_zroni: "$astral_rift.3280.desc.started_zroni$\n\n$astral_rift.3280.desc.completed_zroni.common$"
 astral_rift.3280.desc.default.common: "มันบรรจุข้อความสั้นๆ เอาไว้:"
 astral_rift.3280.desc.default: "$astral_rift.3280.desc.intro$\n\n$astral_rift.3280.desc.default.common$\n\n$astral_rift.3280.desc.common$"

 astral_rift.3285.name: "คำสัญญาของเดอะชราวด์"
 astral_rift.3285.a: "$astral_rift.3280.a$"
 astral_rift.3285.desc.common: "§E\"ขอบคุณ [From.Leader.GetName] แห่ง [From.Explorer.GetName] สำหรับการมาเยือนตามที่โชคชะตากำหนด พวกเราไม่เพียงแต่เปิดประตูสู่เดอะชราวด์ได้เท่านั้น แต่ประชากรซโรนียังได้เริ่มอพยพเข้าไปสู่เดอะชราวด์อย่างถาวรแล้ว มันได้มอบพลังและความสามัคคีที่น่าทึ่งจนทำให้เราได้สัมผัสยูโทเปียทางสังคมแบบที่ไม่เคยจินตนาการถึงมาก่อน!\n\nเราอยากจะแบ่งปันทรัพยากรวัตถุบางส่วนของเราให้แก่ท่าน ก่อนที่เราจะละทิ้งโลกกายภาพนี้ไปโดยสิ้นเชิง\"§!"
 astral_rift.3285.desc.started_zroni: "$astral_rift.3280.desc.intro$\n\n$astral_rift.3280.desc.encountered_priestess$\n\n$astral_rift.3285.desc.common$"
 astral_rift.3285.desc.completed_zroni: "$astral_rift.3285.desc.started_zroni$\n\n$astral_rift.3280.desc.completed_zroni.common$"
 astral_rift.3285.desc.default: "$astral_rift.3280.desc.intro$\n\n$astral_rift.3280.desc.default.common$\n\n$astral_rift.3285.desc.common$"
