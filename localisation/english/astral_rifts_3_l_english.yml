l_english:

#####################
# Siege on Paradise #
#####################
 astral_rift_siege_on_paradise: "การล้อมวิหารสรวงสวรรค์(Siege on Haven)"

 astral_rift.3000.name: "$astral_rift_siege_on_paradise$"
 astral_rift.3000.desc: "เราเดินทางมาถึงดาวเคราะห์ที่เจริญรุ่งเรือง จากป่าทึบไปจนถึงที่ราบเขียวขจี ทิวทัศน์มีความหลากหลายและได้รับการดูแลอย่างดีเยี่ยมพร้อมๆ กัน - เป็นสวนพฤกษชาติที่มีชีวิตชีวาทั่วทั้งดวงดาว\n\nสายพันธุ์แพลนทอยด์(เสียงคําราม)ที่ไม่ปรากฏชื่อได้จัดตั้งป้อมปราการขนาดใหญ่ล้อมรอบเมืองกึ่งอินทรีย์ การสแกนระบบดาวในท้องถิ่นเผยให้เห็นการปิดล้อมของกองเรือรบที่ติดตั้งอาวุธหนัก ยังไม่มีการต่อสู้ที่รุนแรงเกิดขึ้น ทว่าเห็นได้ชัดว่ากำลังก่อตัวขึ้นในไม่ช้า"
 astral_rift.3000.a: "ติดต่อประชากรของดาวเคราะห์"
 astral_rift.3000.b: "ติดต่อกองเรือรบในวงโคจร"

######################
# Baol Events Branch #
######################

 NAME_Baol: "Baol"
 NAME_Baol_leader: "Oakenstalk"
 baol_leader_desc: "§Y[Root.GetName]§! ได้รับการเผชิญหน้าในรอยแยกมิติแอสทรัล พวกเขาเป็นนายพลที่ได้รับความเคารพนับถือในสงครามต่อต้านกรูนัวร์(เสียงกระโชก)"
 baol_leader_catch_phrase: "ฉันจะช่วยเหลือตามความจำเป็น"

 edict_astral_cloaking: "การพรางตัวแอสทรัล"
 edict_astral_cloaking_desc: "เส้นใยแอสทรัลที่ใช้ในเครื่องกำเนิดสนามพลังพรางตัวสะท้อนตัวยานของเราเข้าไปในมิติอื่นบางส่วน ส่งผลให้พวกมันยากต่อการตรวจพบในมิตินี้มากยิ่งขึ้น"
 astral_cloaking_available_tt: "บัดนี้สามารถเปิดใช้งานข้อกำหนดจักรวรรดิ §Y$edict_astral_cloaking$§! ได้แล้ว"

 astral_shield_experimentation: "การทดลองบาเรียแอสทรัล"

 astral_rift.3005.desc.intro: "บนพื้นผิวดาวเคราะห์ เราเผชิญหน้ากับสิ่งมีชีวิตขนาดมหึมาที่มีร่างกายที่สร้างขึ้นจากโครงข่ายรากไม้ที่ซับซ้อน"
 astral_rift.3005.desc.common.1: "เราจำได้ว่ามันเป็นสมาชิกของเผ่าพันธุ์บาวล์(เสียงดัง)ซึ่งเป็นสายพันธุ์ที่เคยอาศัยอยู่ในจักรวาลของเราเมื่อหลายแสนปีก่อน"
 astral_rift.3005.desc.baol_started: "เราคาดเดาว่ารอยแยกมิตินี้เป็นประตูสู่จักรวาลคู่ขนานที่เผ่าพันธุ์บาวล์กำลังป้องกันอาณานิคมของพวกเขาอย่างดุเดือด"
 astral_rift.3005.desc.baol_completed: "เราคาดเดาว่ารอยแยกมิตินี้เป็นประตูสู่จักรวาลคู่ขนานที่เผ่าพันธุ์บาวล์ยังไม่ถูกกำจัดล้างให้สูญพันธุ์"
 astral_rift.3005.desc.common.2: "ด้วยข้อมูลทางโบราณคดีที่ครอบคลุมเกี่ยวกับสายพันธุ์นี้ที่เราได้เก็บรวบรวมไว้ เราจึงพร้อมสำหรับการสื่อสารโดยตรง"
 astral_rift.3005_3006.desc.common.plantoid: "§E"ยินดีต้อนรับ เครือญาติเมล็ดพันธุ์ อธิบายว่าคุณผ่านการปิดล้อมมาได้อย่างไร และคุณมาที่นี่เพื่อวัตถุประสงค์ใด"§!"
 astral_rift.3005_3006.desc.common.default: "§E"หยุดก่อน สิ่งมีชีวิตทรงภูมิปัญญาที่ไม่ระบุชื่อ อธิบายว่าคุณผ่านการปิดล้อมมาได้อย่างไร คุณมาที่นี่เพื่อเจรจาประนีประนอมหรือ?"§!"
 astral_rift.3005.name: "พบปะกับบาวล์"
 astral_rift.3005.desc.baol_started_plantoid: "$astral_rift.3005.desc.intro$ $astral_rift.3005.desc.know_baol.1$ $astral_rift.3005.desc.baol_started$ $astral_rift.3005.desc.know_baol.2$\n\n$astral_rift.3005_3006.desc.common.plantoid$"
 astral_rift.3005.desc.baol_completed_plantoid: "$astral_rift.3005.desc.intro$ $astral_rift.3005.desc.know_baol.1$ $astral_rift.3005.desc.baol_completed$ $astral_rift.3005.desc.know_baol.2$\n\n$astral_rift.3005_3006.desc.common.plantoid$"
 astral_rift.3005.desc.baol_started_default: "$astral_rift.3005.desc.intro$ $astral_rift.3005.desc.know_baol.1$ $astral_rift.3005.desc.baol_started$ $astral_rift.3005.desc.know_baol.2$\n\n$astral_rift.3005_3006.desc.common.default$"
 astral_rift.3005.desc.baol_completed_default: "$astral_rift.3005.desc.intro$ $astral_rift.3005.desc.know_baol.1$ $astral_rift.3005.desc.baol_completed$ $astral_rift.3005.desc.know_baol.2$\n\n$astral_rift.3005_3006.desc.common.default$"
 astral_rift.3005.a: "เปิดเผยสิ่งที่เราเกี่ยวกับบาวล์"

 astral_rift.3006.name: "การเผชิญหน้ากับแพลนทอยด์"
 astral_rift.3006.desc.common: "$astral_rift.3005.desc.intro$ มันพูดด้วยเสียงทุ้มลึกและหนักแน่นในภาษาที่เราไม่เข้าใจ จากนั้นมันก็ยื่นต้นกล้าให้เรา ซึ่งค่อยๆ ยึดเกาะกับ [Explorer.GetSpeciesHandName] ของ [Leader.GetName] รากที่จับยึดของมันทำจากวัสดุประหลาด เมื่อยื่นออกไปสัมผัสกับ [Explorer.GetNetworkName] ก็เกิดการรับรู้ในทันที ด้วยการหลอมรวมของความคิดและรากไม้ สายสื่อสารโดยตรงจึงได้รับการสร้างขึ้นสำเร็จ"
 astral_rift.3006.desc.plantoid: "$astral_rift.3006.desc.common$\n\n$astral_rift.3005_3006.desc.common.plantoid$"
 astral_rift.3006.desc.default: "$astral_rift.3006.desc.common$\n\n$astral_rift.3005_3006.desc.common.default$"
 astral_rift.3006.a: "เราคือนักสำรวจ"

 astral_rift.3010.name: "หายนะที่กำลังจะมาเยือน"
 astral_rift.3010.desc.common.1: "เราอธิบายว่าเผ่าพันธุ์ของพวกเขาเป็นที่รู้จักสำหรับเรา: บาวล์ในจักรวาลของเราเป็นจิตสำนึกร่วมที่รักสงบ ในฐานะชาวสวนที่มีทักษะหาตัวจับยาก พวกเขาถูกโจมตีและกำจัดจนสูญพันธุ์ในที่สุดโดย"
 astral_rift.3010.desc.common.2: "บาวล์ตื่นตระหนก พวกเขาอธิบายว่ากรูนัวร์เพิ่งปรากฏตัวเมื่อไม่นานมานี้ โดยได้จัดตั้งการปิดล้อมทางทหารรอบอาณานิคมนี้ รายละเอียดทั้งหมดในรายงานของเราตรงกับประสบการณ์ของพวกเขากับกรูนัวร์จนถึงตอนนี้\n\nพวกเขาได้ยื่นคำขออย่างเป็นทางการเพื่อขอความช่วยเหลือจากเราในการขับไล่ภัยคุกคามต่างดาวก่อนที่จะสายเกินไป"
 astral_rift.3010.desc.baol_started: "$astral_rift.3010.desc.common.1$ เผ่าพันธุ์ทหารที่เรียกว่ากรูนัวร์\n\nตามสถานการณ์ที่เป็นอยู่ อาณานิคมนี้กำลังตกอยู่ในอันตรายที่จะถูกเผาทำลายจนราบคาบ\n\n$astral_rift.3010.desc.common.2$"
 astral_rift.3010.desc.baol_completed: "$astral_rift.3010.desc.common.1$ จักรวรรดิทหารอย่างกรูนัวร์\n\nดาวเคราะห์และอาณานิคมของบาวล์ทุกแห่งถูกทำลายลง ในท้ายที่สุด มีเพียงโหนดของบาวล์โหนดเดียวที่เหลืออยู่ ซึ่งถูกกักขังเป็นเวลาหลายพันปีภายในสถานีวิจัยที่ถูกละทิ้ง\n\n$astral_rift.3010.desc.common.2$"
 astral_rift.3010.a: "เราจะช่วยเหลือทุกวิถีทางที่เราสามารถทำได้"
 astral_rift.3010.b: "ไม่ใช่เรื่องของเราที่จะเข้าไปแทรกแซง"

 astral_rift.3015.name: "คำขอความช่วยเหลือ"
 astral_rift.3015.desc: "§E\"เรากำลังเตรียมการสำหรับสงครามที่กำลังจะมาถึง น่าเสียดายที่การเดินทางสำรวจของคุณอาจเป็นอันตรายมากกว่าที่คาดการณ์ไว้ในตอนแรก\"§!\n\nแพลนทอยด์กล่าวต่อ §E\"เราคือ §Yบาวล์(เสียงดัง)§! และคุณได้ลงจอดบนหนึ่งในอาณานิคมชั้นนอกของเรา เรากำลังอยู่ภายใต้การปิดล้อม และทรัพยากรของเรากำลังร่อยหรอ การทูตไร้ผล ผู้รุกรานเยาะเย้ยเราอย่างเปิดเผย และหัวเราะเยาะความพยายามในการสื่อสารของเรา พวกเขาเรียกตัวเองว่า §Yกรูนัวร์(เสียงกระโชก)§!\"§!\n\n§E\"เราเชื่อว่าเป้าหมายของพวกเขาไม่ใช่การพิชิตโลกดวงนี้ ทว่าเพื่อทำลายมันลง ดูเหมือนพวกเขาจะไม่มีความเมตตาใดๆ เลย เราขอน้อมรับความช่วยเหลือใดๆ ที่คุณสามารถมอบให้ได้อย่างซาบซึ้งใจยิ่ง\"§!"
 astral_rift.3015.a: "$astral_rift.3010.a$"
 astral_rift.3015.b: "$astral_rift.3010.b$"

 astral_rift.3020.name: "การปกป้องบาวล์"
 astral_rift.3020.desc.baol_started: "เรารู้ว่ากรูนัวร์จะเผาทำลายอาณานิคมนี้จนราบคาบ $astral_rift.3020.desc.common.baol$"
 astral_rift.3020.desc.baol_completed: "เรารู้ว่ากรูนัวร์จะทำทุกวิถีทางเพื่อทำลายล้างบาวล์ $astral_rift.3020.desc.common.baol$"
 astral_rift.3020.desc.common.baol: "ไม่มีโอกาสในการเจรจาประนีประนอมทางการทูตเลย"
 astral_rift.3020.desc.common.1: "เราได้หารือกับบาวล์เพื่อกำหนดแนวทางปฏิบัติที่เป็นไปได้ในการช่วยเหลือ\n\n"
 astral_rift.3020.desc.option_gene_tailoring: "บาวล์สามารถพยายามป้องกันตัวเองได้ ทว่ามีขีดความสามารถทางทหารที่จำกัด พวกเขาจะได้รับประโยชน์จากการเสริมสร้างกลไกหรือพันธุกรรมเพื่อปรับปรุงความเร็ว พละกำลัง และการต้านทานอาวุธเพลิงของกองทัพพวกเขา\n\n"
 astral_rift.3020.desc.option_cloaking: "เราอาจช่วยบาวล์หลบหลีกกรูนัวร์โดยการพรางตัวโลกบ้านเกิดของพวกเขาด้วยอุปกรณ์พรางตัวชั่วคราว อาณานิคมนี้จะยังคงสูญหาย ทว่าอย่างน้อยศูนย์กลางอารยธรรมของพวกเขาจะรอดชีวิต\n\n"
 astral_rift.3020.desc.option_astral_shield: "เราสามารถพยายามเสริมสร้างเทคโนโลยีชีวภาพขั้นสูงของบาวล์ด้วยเส้นใยแอสทรัล ควรเป็นไปได้ที่จะสร้างบาเรียป้องกันที่ทรงพลังรอบอาณานิคมนี้ แน่นอนว่าสิ่งนี้จะขัดขวางไม่ให้พวกเขาเดินทางออกจากดาวเคราะห์ ทว่าอย่างน้อยพวกเขาจะปลอดภัยจากผู้บุกราน\n\n"
 astral_rift.3020.desc.common.2: "ในฐานะทางเลือกสุดท้าย เราสามารถนำต้นกล้าของบาวล์กลับผ่านรอยแยกมิติ ช่วยให้สายพันธุ์สามารถอยู่รอดได้สืบต่อไปไม่ว่าจะเกิดอะไรขึ้นในมิตินี้ก็ตาม"
 astral_rift.3020.a: "ดัดแปลงพันธุกรรมของบาวล์"
 astral_rift.3020.b: "ติดตั้งอุปกรณ์พรางตัวดาวเคราะห์ทดลอง"
 astral_rift.3020.c: "อนุรักษ์ต้นกล้าไว้"
 astral_rift.3020.d: "สร้างบาเรียแอสทรัลป้องกันขึ้นมา"

 astral_rift.3021.name: "พิจารณาทางเลือกต่างๆ"
 astral_rift.3021.desc.common: "เมื่อการทูตไม่มีความเป็นไปได้ เราจะต้องใช้ความคิดสร้างสรรค์ในการสนับสนุนช่วยเหลือ\n\n$astral_rift.3020.desc.common.1$"

 astral_rift.3025.name: "ไม่ใช่สงครามของเรา"
 astral_rift.3025.desc: "ปัญหาของบาวล์ ไม่ว่าจะทางทหารหรือทางอื่นๆ ไม่ใช่เรื่องที่เราต้องใส่ใจ เราเดินทางมาจากต่างมิติเพื่อสังเกตการณ์และสำรวจ เราไม่มีความปรารถนาที่จะสร้างศัตรูใหม่ที่มีอิทธิพล\n\nจิตสำนึกร่วมยอมรับการตัดสินใจของเราด้วยความผิดหวังอย่างเห็นได้ชัด ทว่าปล่อยให้เราดำเนินการวิจัยต่อไป"
 astral_rift.3025.a: "เตรียมดาวเทียมสังเกตการณ์"

 astral_rift.3030.name: "การเสริมกำลังทางพันธุกรรม"
 astral_rift.3030.desc: "เราใช้ความรู้ด้านเทคโนโลยีการปรับแต่งยีนเพื่อเสริมสร้างสายพันธุ์บาวล์ในแคมเปญป้องกันที่จะเกิดขึ้น ด้วยทางเลือกที่เหลืออยู่ไม่มาก พวกเขาจึงยอมรับการเปลี่ยนแปลงทางชีวภาพนี้อย่างไม่เต็มใจ จักรวรรดิบาวล์ที่รักสงบ ซึ่งสร้างขึ้นบนเกษตรกรรมและการจัดการระบบนิเวศ บัดนี้มีประชากรเป็นโดรนป้องกันตนเองที่มีความทนทานสูงและมีพละกำลังมหาศาล\n\nบัดนี้เมื่อพร้อมสำหรับสงครามภาคพื้นดินแล้ว บาวล์ได้มอบโหนดป้องกันเพื่อแสดงความซาบซึ้งใจ สิ่งมีชีวิตที่กึ่งอิสระและมีความเชี่ยวชาญพิเศษนี้จะทำหน้าที่รับใช้เราสืบไป"

 astral_rift.3031.name: "$NAME_Baol_leader$"
 astral_rift.3031.desc: "§Hโหนดแพลนทอยด์เคลื่อนไหวด้วยความระมัดระวังอย่างช้าๆ ทว่าจะเป็นความผิดพลาดหากคิดว่าการเคลื่อนไหวที่อุ้ยอ้ายของมันหมายถึงการขาดสติปัญญา พัฒนาขึ้นมาเป็นพิเศษเพื่อปกป้องกลุ่มจิตร่วม สิ่งมีชีวิตนี้แสดงถึงจุดสูงสุดของการปรับตัวอย่างระมัดระวังหลายชั่วอายุคน พวกเขาต้อนรับเราอย่างเคร่งขรึมทว่าสุภาพ ปรารถนาที่จะตอบแทนความดีงามที่เรามอบให้แก่จิตสำนึกร่วมของพวกเขา§!\n\nในฐานะส่วนหนึ่งของบาวล์ เราไม่มีชื่อ คุณสามารถเรียกเราว่า $NAME_Baol_leader$"
 astral_rift.3031.a: "คุณเป็นผู้เชี่ยวชาญด้านการป้องกันสำหรับบาวล์ใช่หรือไม่?"
 astral_rift.3031.a.response: "โหนดนี้ได้รับมอบหมายให้เตรียมพร้อมอาณานิคมของเราสำหรับสงครามป้องกัน สิ่งนี้เกี่ยวข้องกับการจัดการทรัพยากรที่จำกัดในขณะที่อยู่ภายใต้การปิดล้อม รวมถึงการออกแบบและดูแลรักษาป้อมปราการทางทหาร โหนดนี้สามารถรักษาความมั่นคงของประชากรได้สำเร็จแม้จะมีการปิดล้อม งานของโหนดนี้ถือว่ามีประโยชน์"
 astral_rift.3031.b: "คุณรู้สึกอย่างไรเกี่ยวกับการเข้าร่วมกับเรา?"
 astral_rift.3031.b.response: "โหนดนี้ได้ทำทุกอย่างที่สามารถทำได้เพื่อบาวล์แล้ว ในบทบาทนั้นไม่มีพื้นที่เพิ่มเติมสำหรับการเติบโต เมื่อระบบสิ่งมีชีวิตล้มเหลวในการเติบโต มันก็จะเริ่มตายลง ในมิตินี้มีโอกาสเพิ่มเติมสำหรับการรับใช้ มีความหวังในการเริ่มต้นใหม่"
 astral_rift.3031.c: "รู้สึกอย่างไรที่ได้รับการแยกออกจากกลุ่มจิตร่วม?"
 astral_rift.3031.c.response: "จำกัด น่าอึดอัด... ทว่าน่าตื่นเต้น ความรู้สึกนี้แตกต่างจากสิ่งใดๆ ที่โหนดนี้เคยประสบมา อย่างไรก็ตาม ยิ่งโหนดนี้ได้รับการรวมเข้ากับการทำงานของ [Explorer.GetName] ได้เร็วเท่าใดก็ยิ่งดีเท่านั้น มันเป็นเรื่องที่น่ายินดีมากกว่าในการทำงานรับใช้เอนทิตีที่ยิ่งใหญ่กว่า"
 astral_rift.3031.d: "คุณเลือกชื่อของคุณอย่างไร?"
 astral_rift.3031.d.response: "หนึ่งในนักวิจัยของคุณที่ผ่านรอยแยกมิติแอสทรัลได้มอบโปรแกรมสร้างข้อความอัจฉริยะประดิษฐ์ให้แก่โหนดนี้ มีการสืบค้นข้อมูลตามคุณสมบัติของโหนดนี้ และมันส่งคืนผลลัพธ์: §Y$NAME_Baol_leader$§! มันรู้สึก... เหมาะสมดี"

 astral_rift.3035.name: "พรางตาพรางตัว"
 astral_rift.3035.desc: "หลังจากแบ่งปันความลับของสนามพลังพรางตัวกับบาวล์แล้ว พวกเขาก็สามารถสร้างดาวเทียมพรางตัวทางชีวภาพขึ้นมาได้ ดาวเทียมทดลองเหล่านี้มีลักษณะชั่วคราวและต้องการเส้นใยแอสทรัลปริมาณเล็กน้อยในการบำรุงรักษา ทว่าพวกมันควรจะมีอายุการใช้งานนานพอที่จะซ่อนโลกบ้านเกิดของบาวล์จากกรูนัวร์ได้ โชคร้ายที่อาณานิคมนี้เป็นที่รู้จักของกรูนัวร์อยู่แล้วและน่าจะถึงแก่ความพินาศ\n\nเมื่อพรางตัวแล้ว บาวล์จะต้องเสียสละความทะเยอทะยานในการเดินทางในอวกาศไปชั่วคราว เนื่องจากยานใดๆ ที่ตรวจพบว่าเดินทางออกจากโลกบ้านเกิดอาจเปิดเผยตำแหน่งที่ตั้งได้ แน่นอนว่าความไม่สะดวกสบายนี้ดีกว่าการถูกกวาดล้างจนสูญสิ้นไปอย่างมหาศาล"
 astral_rift.3035.a: "การประนีประนอมที่เหมาะสม"

 astral_rift.3040.name: "หนทางแห่งชีวิต"
 astral_rift.3040.desc.common: "เมื่อเดินทางออกจากอาณานิคมบาวล์ เราได้รับมอบหมายให้ดูแลกลุ่มต้นกล้าอันมีค่าของพวกเขา"
 astral_rift.3040.desc.baol_started: "$astral_rift.3040.desc.common$\n\nหากข้อพิพาทระหว่างบาวล์และกรูนัวร์ทวีความรุนแรงยิ่งขึ้น อย่างน้อยเราก็สามารถช่วยเหลือบางสายพันธุ์ของพวกเขาให้รอดพ้นจากภัยพิบัติของสงครามได้"
 astral_rift.3040.desc.baol_completed: "$astral_rift.3040.desc.common$\n\nเมื่อบาวล์ถูกทำลายล้างจนหมดสิ้นอย่างหลีกเลี่ยงไม่ได้ บางทีพวกเขาอาจจะอุ่นใจได้ในความรู้ที่ว่าสายพันธุ์ของพวกเขาจะมีชีวิตอยู่สืบต่อไปในอีกมิติหนึ่ง"
 astral_rift.3040.desc.default: "$astral_rift.3040.desc.common$\n\nเราหวังว่าข้อพิพาทของพวกเขาจะยุติลงในไม่ช้า และบาวล์จะมีชีวิตอยู่ต่อไปอย่างเจริญรุ่งเรืองทั้งสองฝั่งของรอยแยกมิติ"

 astral_rift.3045.name: "จากเถ้าถ่านสู่เถ้าถ่าน"
 astral_rift.3045_3046.desc.common: "เราจัดเตรียมดาวเทียมสังเกตการณ์และส่งพวกมันขึ้นสู่วงโคจร ซึ่งควรช่วยให้เราส่งข้อมูลบางส่วนข้ามรอยแยกมิติได้สำเร็จ"
 astral_rift.3045.desc: "$astral_rift.3045_3046.desc.common$\n\nสำหรับตอนนี้เราจะศึกษาการเกษตรขั้นสูงของบาวล์และเทคนิคการจัดการระบบนิเวศ เมื่อถึงเวลา เราจะเก็บบันทึกภาพช็อตสำคัญของการทำลายล้างดาวเคราะห์โดยกรูนัวร์ด้วย"
 astral_rift.3045.a: "นี่คือโอกาสในการวิจัยที่เป็นเอกลักษณ์เฉพาะตัว"

 astral_rift.3046.name: "โอกาสในการวิจัย"
 astral_rift.3046.desc: "$astral_rift.3045_3046.desc.common$\n\nเราจะศึกษาดาวเคราะห์ของบาวล์และการจัดการระบบนิเวศของพวกเขาจนกว่าข้อพิพาทจะเริ่มต้น สงครามครั้งนี้ควรช่วยมอบข้อมูลที่น่าสนใจสำหรับการวิจัยในอนาคตด้วย"
 astral_rift.3046.a: "$astral_rift.3045.a$"

 astral_rift.3047.name: "จากธุลีสู่ธุลี"
 astral_rift.3047.desc: "อาณานิคมของบาวล์ที่อยู่อีกฟากหนึ่งของรอยแยกมิติในระบบดาว [From.solar_system.GetName] ถูกทำลายลงโดยกรูนัวร์แล้ว เราได้รวบรวมข้อมูลการวิจัยอย่างละเอียดจากการรบ ทว่าเป้าหมายของโครงการสังเกตการณ์นี้ได้รับการกำจัดล้างไปแล้ว"

 astral_rift.3049.name: "บาเรียแอสทรัลป้องกัน"
 astral_rift.3049.desc: "โดยการบูรณาการเส้นใยแอสทรัลเข้ากับเทคโนโลยีป้องกันของบาวล์ เราได้สร้างบาเรียป้องกันดาวเคราะห์ที่แข็งแกร่งรอบอาณานิคมที่ถูกปิดล้อม บาเรียจะล้อมรอบดาวเคราะห์และปกป้องบาวล์ตราบเท่าที่มันยังคงอยู่\n\nหวังว่ามันจะรอดชีวิตได้นานพอที่กรูนัวร์จะเปลี่ยนเป้าหมายไปยังเป้าหมายที่เข้าถึงได้ง่ายกว่า"
 astral_rift.3049.a: "เทคโนโลยีที่โดดเด่นมาก"

########################
# Grunur Events Branch #
########################

 grunur_weapon_interface_modifier: "อินเทอร์เฟซอาวุธกรูนัวร์"

 astral_rift.3050.name: "การคุ้มกันเรือธง"
 astral_rift.3050.desc.default: "เราเข้าสู่วงโคจรของดาวเคราะห์ไกอา(แกเรีย)ดาวเคราะห์) และต้องเผชิญหน้ากับเรือรบตรวจการณ์ในทันที ความพยายามสื่อสารของเราได้รับการตอบรับด้วยความเงียบงัน\n\nเรือตรวจการณ์คุ้มกันเราไปยังเรือธงของพวกเขา ซึ่งเป็นยานจั๊กเกอร์นอท(เยอรมัน)ขนาดมหึมาล้อมรอบด้วยยานสนับสนุนจำนวนมาก การนำยานทรงกลม §Y$tech_rift_sphere$§! ลงจอดในโรงเก็บเครื่องบินขนาดใหญ่ เราถูกทหารกลุ่มหนึ่งควบคุมตัวในทันที ร่างเกราะและก้ามปูที่แหลมคมคล้ายคลึงกับสิ่งมีชีวิตตระกูลครัสเตเชียน(ภาษาฝรั่งเศส)หลายชนิดที่รู้จัก การเดินหน้าประสานงานอย่างสมบูรณ์แบบแสดงภาพที่น่าเกรงขาม ทว่าดวงตาเล็กๆ ที่ยื่นออกมาจากหัวเกราะแสดงความตื่นตัวและฉลาดเฉลียว"
 astral_rift.3050.desc.baol: "$astral_rift.3050.desc.default$\n\nเราจำได้ว่าเผ่าพันธุ์นี้คือ §Yกรูนัวร์(เสียงกระโชก)§! ซึ่งเป็นสายพันธุ์ที่ก้าวร้าวอย่างยิ่งที่เคยอาศัยอยู่ในจักรวาลของเราเมื่อหลายแสนปีก่อน มีชื่อเสียงในการฆ่าล้างเผ่าพันธุ์บาวล์ เราคาดเดาว่ารอยแยกมิตินี้ได้นำพาเรามาสู่จักรวาลคู่ขนานที่กรูนัวร์ยังคงมีบทบาททางทหารอยู่"
 astral_rift.3050.a: "กรูนัวร์อันตรายมาก ใช้ความระมัดระวัง"
 astral_rift.3050.b: "มาดูกันว่าสิ่งนี้จะนำไปสู่สิ่งใด..."

 astral_rift.3055.name: "การสนทนาที่ไม่ซ้ำใคร"
 astral_rift.3055.desc.common_1: "เราถูกนำตัวเข้าไปในห้องโถงกลาง แผงควบคุมที่ซับซ้อนเป็นที่อยู่ของครัสเตเชียนขนาดใหญ่หลายตัว ก้ามของพวกมันสอดเข้ากับอินเทอร์เฟซเฉพาะได้อย่างแม่นยำ เทอร์มินัลแต่ละแห่งมีแหล่งกำเนิดคริสตัล ซึ่งดูเหมือนจะได้รับการควบคุมโดยเสียงที่สร้างขึ้นจากส่วนลึกภายในหน้าอกของสมาชิกลูกเรือ ที่ใจกลางห้องมีผู้บัญชาการทหารในชุดแต่งกายที่ขาดรุ่งริ่ง มันออกคำสั่ง และผู้ใต้บังคับบัญชาก็เริ่มปฏิบัติการทันที"
 astral_rift.3055.desc.organic_common_1: "หนึ่งในผู้ช่วยวิจัยของเราถูกควบคุมตัวและสแกนโดยสรุป ช่างเป็นเรื่องที่น่าตื่นตระหนก อุปกรณ์สืบสวนถูกแทงถึงแก่ชีวิต"
 astral_rift.3055.desc.organic_common_2: "ผ่านผิวหนัง [leader.species.GetSkinType] ของพวกเขา ดึงสมองของพวกเขาออกมาทั้งหมด อวัยวะดังกล่าวได้รับการส่งมอบให้กับผู้นำกรูนัวร์อย่างรวดเร็ว ซึ่งนำมันไปเสียบเข้ากับคริสตัลชิ้นหนึ่งบนคอนโซลควบคุมของพวกเขา"
 astral_rift.3055.desc.common_2: "มีเสียงสะท้อนออกมาจากคริสตัลในภาษาของเราเอง: §E"ถึงเวลาพูดคุยแล้ว พวกคุณคือใคร?"§!"
 astral_rift.3055.desc.organic: "$astral_rift.3055.desc.common_1$\n\n$astral_rift.3055.desc.organic_common_1$ $astral_rift.3055.desc.organic_common_2$\n\n$astral_rift.3055.desc.common_2$"
 astral_rift.3055.desc.lithoid: "$astral_rift.3055.desc.common_1$\n\n$astral_rift.3055.desc.organic_common_1$ เจาะทะลุ $astral_rift.3055.desc.organic_common_2$\n\n$astral_rift.3055.desc.common_2$"
 astral_rift.3055.desc.mechanical: "$astral_rift.3055.desc.common_1$\n\nโดรนวิจัยของเราตัวหนึ่งถูกควบคุมตัวและสแกนโดยสรุป อุปกรณ์มีคมถูกแทงเข้าไปในตัวประมวลผลหลักของมันโดยตรง ทำให้มันหยุดทำงานทันที หน่วยประมวลผลได้รับการส่งมอบให้กับผู้นำกรูนัวร์อย่างรวดเร็ว ซึ่งนำมันไปเสียบเข้ากับคริสตัลชิ้นหนึ่งบนคอนโซลควบคุมของพวกเขา\n\n$astral_rift.3055.desc.common_2$"
 astral_rift.3055.desc.default: "$astral_rift.3055.desc.common_1$\n\n$astral_rift.3055.desc.common_2$"
 astral_rift.3055.a: "เราคือนักสำรวจ และเราได้เห็นอนาคตของคุณแล้ว"
 astral_rift.3055.b: "เราคือนักสำรวจ"

 astral_rift.3060.name: "กรูนัวร์ผู้มีชื่อเสียงฉาวโฉ่"
 astral_rift.3060.desc: "เราแนะนำตัวเองในฐานะนักวิทยาศาสตร์จากจักรวาลคู่ขนาน\n\nในโลกของเรา เผ่าพันธุ์กรูนัวร์ได้สูญหายไปนานแล้ว จากบันทึกทางโบราณคดี พวกเขาเป็นเผ่าพันธุ์ผู้พิชิต มีคลังแสงอาวุธขั้นสูงจำนวนมหาศาล... รวมถึงมีแนวโน้มความโหดร้ายทารุณ การกำจัดล้างบาวล์ของพวกเขานั้นเป็นตำนานทั้งในเรื่องของประสิทธิภาพและความน่าสยดสยอง พวกเขาถูกกำหนดให้ทำลายล้างอาณานิคมบาวล์ในระบบดาวนี้\n\nเมื่อคำพูดของเราได้รับการแปล ทหารกรูนัวร์ต่างก็พ่นลมหายใจออกมาอย่างแรง เราเข้าใจว่านี่คือเสียงหัวเราะในเวอร์ชันของพวกเขา ทว่าความเงียบที่ดื้อรั้นของผู้บัญชาการทหารก็ช่วยคืนความสงบเรียบร้อยได้อย่างรวดเร็ว มันพูดผ่านคริสตัลแปลภาษา:\n\n§E"บัดนี้รู้แจ้งแล้วหรือ? หากรู้แจ้งแล้ว การยอมจำนนต้องเกิดขึ้น"§!"
 astral_rift.3060.a.tech_dragon_armor: "แบ่งปันเทคโนโลยี $tech_dragon_armor$ ให้แก่กรูนัวร์"
