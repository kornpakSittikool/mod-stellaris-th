 uplift.7500.name:0 "ห่วงโซ่ที่แยกสาขา"
 uplift.7500.desc:0 "ประชากรพื้นเมืองก่อนมีสติปัญญาจำนวนหนึ่งของ [From.GetName] ได้ลักลอบเข้าไปในพื้นที่ควบคุมความปลอดภัยบริเวณชานเมืองอาณานิคมของเรา พวกเขาถูกไล่ออกไปภายในไม่กี่ชั่วโมง แต่ความเสียหายต่อสายสัญญาณดาวเทียมระหว่างดวงดาวที่ออกแบบมาสำหรับการโอนเงินสกุลต่าง ๆ ก็เกิดขึ้นอย่างหนักหน่วงแล้ว\n\nเรากังวลว่าเครดิตพลังงานหลายร้อยเครดิตอาจจะสูญหายไปในอวกาศเสียแล้ว"
 uplift.7510.name:0 "ในสภาพแวดล้อมมีชีวิต"
 uplift.7510.desc:0 "นักวิจัยเอเลี่ยนบน [Root.GetName] ได้ตีพิมพ์จดหมายเปิดผนึกเรียกร้องให้ผ่อนปรนกฎหมายท้องถิ่นที่จำกัดการทดลองกับมนุษย์ต่างดาวสายพันธุ์ใกล้มีสติปัญญาญาณ\n\nพวกเขายกเหตุผลประกอบที่น่าเชื่อถือเกี่ยวกับประโยชน์ทางวิทยาศาสตร์ และเตือนว่าผลงานของชุมชนวิทยาศาสตร์ทั้งหมดบน [Root.GetName] จะต้องได้รับความเสียหายเว้นแต่จะมีการแก้ไขกฎหมายดังกล่าว\n\nแต่จริยธรรมของทั้งหมดนี้ยังคงน่ากังขา"
 uplift.7510.a:0 "เพิกเฉยต่อเหล่านักวิทยาศาสตร์หัวดื้อพวกนั้นเสีย"
 uplift.7510.a.tooltip:0 "นักวิทยาศาสตร์ท้องถิ่นจะไม่พอใจเรื่องนี้อย่างแน่นอน\n"
 uplift.7510.b:0 "เราจะปฏิบัติตามความต้องการของพวกเขา"
 uplift.7510.b.tooltip:0 "ประชากรท้องถิ่นจะไม่พอใจเรื่องนี้อย่างแน่นอน\n"
 uplift.7510.c:0 "จริยธรรมงั้นหรือ? เราไม่แยแสต่อโชคชะตาของสิ่งมีชีวิตชั้นต่ำกว่าหรอก"
 uplift.7510.c.tooltip:0 "§Yจักรวรรดิของคุณ§! ได้รับจริยธรรม §Yเกลียดชังต่างเผ่าพันธุ์แบบสุดโต่ง§! (Fanatic Xenophobe)\n"
 uplift.7520.name:0 "ความตื่นตระหนกกระสับกระส่าย"
 uplift.7520.desc:0 "สิ่งมีชีวิตพื้นเมืองที่เกือบจะมีสติปัญญาของ [Root.GetName] กำลังสร้างความวุ่นวายที่ชานเมืองอาณานิคมของเรา ดูเหมือนว่าการคงอยู่ของ [Root.Owner.GetName] ที่นี่จะทำให้พวกมันตื่นตระหนกอย่างเห็นได้ชัด เนื่องจากพวกมันพากันวิ่งวุ่นไปมาระหว่างเขตแดนของนิคมกับจุดลึกลับบางแห่งทางตะวันออก"
 uplift.7520.a:0 "ไล่พวกมันออกไป พยายามทำอย่างนุ่มนวลถ้าเป็นไปได้"
 uplift.7520.a.tooltip:0 "สิ่งมีชีวิตพื้นเมืองจะไม่รบกวนผู้ตั้งถิ่นฐานอีกต่อไป\n"
 uplift.7520.b:0 "ส่งสารถึงสัตว์โง่เขลาพวกนี้ด้วยความรุนแรง"
 uplift.7520.b.tooltip:0 "สิ่งมีชีวิตที่น่าเกลียดน่ากลัวเหล่านี้จะไม่มารบกวนผู้ตั้งถิ่นฐานอีก\n"
 uplift.7520.c:0 "พยายามค้นหาดูว่าพวกมันกำลังจะไปที่ใด"
 uplift.7525.name:0 "สูญหายและถูกลืมเลือน"
 uplift.7525.desc:1 "กลุ่มนักเอเลี่ยนชีววิทยาได้เดินทางออกจากอาณานิคมพร้อมกับหน่วยทหารเพื่อติดตามการเคลื่อนไหวของสิ่งมีชีวิตพื้นเมือง\n\nสิ่งที่พวกเขาพบคือเศษซากของยานเพาะพันธุ์โบราณ(สายพันธ์)ซึ่งเห็นได้ชัดว่าเป็นแกนกลางของอารยธรรมขนาดเล็กระดับ [Owner.GetPreFTLLower] ที่สลายหายไปนานแล้ว\n\nสายพันธุ์พื้นเมืองเด่นของ [Root.GetName] ดูเหมือนจะเป็นผลผลิตจากโครงการหว่านเมล็ดพันธุ์หรือการดัดแปลงพันธุกรรมในอดีต หากพิจารณาจากสิ่งก่อสร้างรอบ ๆ ยานเพาะพันธุ์ พวกเขาเคยเป็นชนเผ่าที่ชัดเจน มีสติปัญญาที่สูงกว่า และยังมีภาษาเขียนขั้นพื้นฐานอีกด้วย\n\nเราไม่อาจเดาได้ว่าอะไรเป็นสาเหตุของการลดระดับทางวิวัฒนาการของเผ่าพันธุ์พวกมัน แต่พฤติกรรมของพวกมันในตอนนี้เริ่มมีความหมายมากขึ้น ในระดับสัญชาตญาณบางอย่าง พวกเขาจำพวกเรา [Root.Owner.GetSpeciesNamePlural] ได้ว่าคล้ายคลึงกับผู้ยกระดับสติปัญญาดั้งเดิมจากหมู่ดาว บางทีสังคมที่เป็นระเบียบเรียบร้อยของเราอาจไปกระตุ้นแรงผลักดันดั้งเดิมที่ฝังอยู่ในตัวพวกเขา ซึ่งมักถูกกลบด้วยสัญชาตญาณดิบของตนเอง\n\nในอนาคตบางทีเราอาจจะช่วยคลายความกังวลด้านวิวัฒนาการของพวกเขาโดยการยกระดับพวกเขาขึ้นมาสู่ระดับเดียวกับเรา แต่ในตอนนี้ เราได้รับข้อมูลเชิงลึกอันมีค่าเกี่ยวกับการจัดการสิ่งมีชีวิตอินทรีย์โดยอารยธรรมท่องอวกาศโบราณแล้ว"

