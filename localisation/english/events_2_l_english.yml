 ####################################

 UPLIFT_SNAKEOID_CAT:0 "การเลื้อยคลาน"
 UPLIFT_SNAKEOID_CAT_DESC:0 "มีบางสิ่งเคลื่อนที่อย่างมีจุดหมายผ่านผืนทรายของ [Root.GetName]..."
 UPLIFT_GENERIC_CAT:0 "ความเป็นเครือญาติในรูปแบบหนึ่ง"
 UPLIFT_GENERIC_CAT_DESC:0 "มีบางสิ่งเคลื่อนไหวอย่างมีจุดหมายเบื้องล่างดาวเคราะห์ [Root.GetName]..."
 UPLIFT_OCEAN_CAT:0 "วิถีชีวิตแห่งสายน้ำ"
 UPLIFT_OCEAN_CAT_DESC:0 "มีร่องรอยเด่นชัดของสิ่งมีชีวิตภายในและบริเวณใกล้เคียงกับมหาสมุทรของ [Root.GetName]"
 UPLIFT_ARID_CAT:0 "การย่างกรายในพื้นที่รกร้าง"
 UPLIFT_ARID_CAT_DESC:0 "แม้แต่ระบบกล้องส่องเลนส์กำลังขยายต่ำก็สามารถจับร่องรอยกิจกรรมทางชีววิทยาบนพื้นผิวของ [Root.GetName] ได้อย่างง่ายดาย"
 UPLIFT_CONTINENTAL_CAT:0 "ระหว่างผืนดินและผืนน้ำ"
 UPLIFT_CONTINENTAL_CAT_DESC:0 "ดูเหมือนว่าสิ่งมีชีวิตจะค้นหาหนทางเอาตัวรอดได้ แม้บนดาวเคราะห์ที่แบ่งออกเป็นสองขั้วระหว่างผืนดินที่เป็นหินและผืนน้ำที่เป็นของเหลว"
 UPLIFT_TROPICAL_CAT:0 "ชื้นพอประมาณ"
 UPLIFT_TROPICAL_CAT_DESC:0 "สภาพแวดล้อมบน [Root.GetName] เหมาะสำหรับการดำรงชีวิต อย่างน้อยก็ในระดับจุลชีพ - และอาจรวมถึงระดับที่สูงขึ้น"
 UPLIFT_TUNDRA_CAT:1 "ชีววิทยาสภาพแช่แข็ง"
 UPLIFT_TUNDRA_CAT_DESC:0 "[Root.GetName] ถูกแช่แข็งและไม่มีลักษณะเด่นชัดจากการสแกนกล้องเลนส์สายตา ทว่าเครื่องตรวจจับความร้อนระบุร่องรอยกิจกรรมบางประการที่เกิดขึ้นใต้พื้นผิว"
 UPLIFT_ARCTIC_CAT:0 "บนพื้นน้ำแข็งหนา"
 UPLIFT_ARCTIC_CAT_DESC:0 "ที่ไหนสักแห่งภายใต้พายุน้ำแข็งและเหนือชั้นดินเยือกแข็งคงตัว(เปอร์มาฟรอสท์)ของ [Root.GetName] มีการเคลื่อนไหวเกิดขึ้น"
 UPLIFT_DESERT_CAT:0 "ทรายปลิวว่อน"
 UPLIFT_DESERT_CAT_DESC:0 "เป็นการยากที่จะจินตนาการถึงสิ่งมีชีวิตบน [Root.GetName] เนื่องจากพื้นผิวของมันเป็นดั่งทะเลทรายของซิลิเกตที่ไม่มีสิ้นสุด ทว่า..."
 UPLIFT_ROACHOID_CAT:0 "การคลานบนผิวพิภพ"
 UPLIFT_ROACHOID_CAT_DESC:0 "ฝูงแมลงขาข้อ(อาร์โทรพอด)สามารถท่องไปตามพื้นผิวที่แห้งแล้งของ [Root.GetName] ได้อย่างง่ายดาย"

