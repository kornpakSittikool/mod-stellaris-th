 mineral_planet_poi_desc:0 "ด้วยการใช้เทคนิคที่ได้รับจากระบบประเมินผลของโดรนทำเหมืองโบราณ เราได้ชี้เป้าพิกัดระบบดาวจำนวนหนึ่งที่มีแนวโน้มว่าจะมีดาวเคราะห์ที่อุดมไปด้วยแร่ธาตุเป็นพิเศษ"

 cloud_chain_title:0 "เมฆหมอกล่องลอย"
 cloud_chain_desc:0 "กลุ่มหมอกสุญญากาศทั้งหมดมีความพัวพันระหว่างกันในระดับควอนตัม เป็นไปได้ว่าพลังงานที่ขับเคลื่อนชิ้นส่วนตัวอย่างแต่ละชิ้นเป็นเพียงส่วนแสดงตนที่หลากหลายของเอนทิตีซับสเปซเดียว\n\nการศึกษาอย่างรอบคอบเกี่ยวกับกลุ่มหมอกสุญญากาศแห่งหนึ่งช่วยให้เราค้นหาพิกัดระบบดาวหลายแห่งที่มีแนวโน้มว่าจะเป็นแหล่งที่อยู่อาศัยของกลุ่มหมอกอื่น ๆ ได้สำเร็จ"
 clouds_watched:0 "เฝ้าติดตามกลุ่มหมอกเรียบร้อย"

 cloud_poi_title:0 "ระบบดาวที่มีกลุ่มหมอกสุญญากาศ"
 cloud_poi_desc:0 "การพัวพันทางควอนตัมบ่งชี้ว่าระบบดาวเหล่านี้เป็นบ้านของกลุ่มหมอกสุญญากาศ"

 ### Anomalies

 find_sol_chain_title:0 "พิกัดระบบสุริยะ"
 find_sol_chain_desc:0 "โบราณวัตถุต่างดาวช่วยระบุพิกัดสำหรับระบบดาวเฉพาะแห่งหนึ่ง"
 sol_1_poi:0 "ดวงอาทิตย์"
 sol_1_desc_neutral:0 "ไม่ว่าสิ่งมีชีวิตใดที่ส่งโบราณวัตถุนี้ออกสู่อวกาศ ดูเหมือนว่าจะถือกำเนิดขึ้นที่นี่ เป็นเรื่องที่รอบคอบหากจะเข้าไปตรวจสอบ"
 found:0 "พบระบบเอเลี่ยน"

 old_gods_shrine_poi_1:0 "พิกัดศาลเจ้าแรกที่คาดการณ์ไว้"
 old_gods_shrine_poi_1_desc:0 "ผลการตรวจวัดปริมาณรังสีบ่งชี้ว่าวัตถุที่คล้ายกับศาลเจ้าแห่งสิ่งเร้นลับ(ยังไม่ประกาศ)อาจโคจรรอบดาวฤกษ์ดวงนี้อยู่"
 old_gods_shrine_poi_2:0 "พิกัดศาลเจ้าแห่งที่สองที่คาดการณ์ไว้"
 old_gods_shrine_poi_2_desc:0 "ผลการตรวจวัดปริมาณรังสีบ่งชี้ว่าวัตถุอีกชิ้นหนึ่งที่คล้ายกับศาลเจ้าแห่งสิ่งเร้นลับ(ยังไม่ประกาศ)อาจโคจรรอบดาวฤกษ์ดวงนี้อยู่"
 old_gods_shrine_poi_3:0 "พิกัดศาลเจ้าแห่งที่สามที่คาดการณ์ไว้"
 old_gods_shrine_poi_3_desc:0 "ผลการตรวจวัดปริมาณรังสีบ่งชี้ว่าวัตถุชิ้นที่สามที่คล้ายกับศาลเจ้าแห่งสิ่งเร้นลับ(ยังไม่ประกาศ)อาจโคจรรอบดาวฤกษ์ดวงนี้อยู่"

 shrine_object:0 "ศาลเจ้าแห่งดวงดาว"
 shrine_object_tooltip:0 "ศาลเจ้าที่อุทิศให้กับหนึ่งในพระเจ้าโบราณของบรรพบุรุษเรา ซึ่งสูญหายไปในอวกาศ"
 shrine_object_desc:0 "ศาลเจ้าที่อุทิศให้กับหนึ่งในพระเจ้าโบราณของบรรพบุรุษเรา ซึ่งสูญหายไปในอวกาศ"

 old_gods_chain_title:0 "ศาลเจ้าแด่ทวยเทพโบราณ"
 old_gods_chain_desc:0 "หลังจากการค้นพบศาลเจ้าดาวเคราะห์น้อยอันลึกลับที่อุทิศแด่สิ่งเร้นลับ(ยังไม่ประกาศ)นักวิทยาศาสตร์ชั้นนำเสนอว่าอาจมีศาลเจ้าเพิ่มเติมที่อุทิศให้กับวิหารเทพเจ้าของเรา - หรือสิ่งที่เราเชื่อว่าเคยเป็นเพียงวิหารเทพเจ้าของเราเท่านั้น - ในระบบดาวข้างเคียง"
 shrines_searched:0 "สำรวจศาลเจ้าเสร็จสิ้น"

 ransomeer_chain_title:0 "โจรเรียกค่าไถ่"
 ransomeer_chain_desc:0 "กลุ่มโจรสลัดที่เรียกตัวเองว่า \"โจรเรียกค่าไถ่\" (เสียงกระซิบ)ได้ลักพาตัวลูกเรือของยานขนส่งส่วนบุคคลของ [Root.GetSpeciesAdj]\n\nเราตั้งใจที่จะปล่อยพวกเขาให้เป็นอิสระก่อนที่โจรสลัดจะสามารถยื่นข้อเรียกร้องใด ๆ"
 captive_crew_rescued:0 "ช่วยเหลือลูกเรือที่ถูกจับกุมตัวไว้เรียบร้อย"

 ransomeer_poi_title:0 "ฐานโจรเรียกค่าไถ่"
 ransomeer_poi_desc:0 "โจรเรียกค่าไถ่ได้สร้างฐานที่พักขึ้นมาจากสถานีขุดเจาะเหมืองต่างดาวที่ถูกทิ้งร้าง"

 wrecked_fleet_chain_title:0 "สนามรบล่องลอย"
 wrecked_fleet_chain_desc:0 "เมื่อหลายพันปีก่อน ความทรยศหักหลังทำให้กองยานพันธมิตรหันมาโจมตีกันเอง ด้วยการโจมตีอย่างรวดเร็วไปยังระบบที่สำคัญและจุดอ่อนที่รู้กันในโครงสร้างตัวยาน ทำให้ลูกเรือที่เคยเป็นพันธมิตรกันถูกกำจัดอย่างมีประสิทธิภาพและไร้ความปราณี โดยน่าจะหลงเหลือเพียงตัวซากยานที่สูญเสียความดันไว้ในสภาพที่ค่อนข้างสมบูรณ์\n\nเราได้รวบรวมข้อมูลเพียงพอที่จะจำลองการล่องลอยอย่างช้า ๆ ของสุสานยานอวกาศนี้ผ่านห้วงอวกาศลึก"
 wrecked_fleet_poi_title:0 "พิกัดการคาดการณ์"
 wrecked_fleet_poi_desc:0 "เราคำนวณตำแหน่งปัจจุบันของสนามรบล่องลอยว่าน่าจะอยู่ที่ไหนสักแห่งในระบบดาวที่ระบุไว้ เป็นการสมควรอย่างยิ่งที่จะเข้าไปตรวจสอบสถานที่ดังกล่าวเมื่อมีโอกาส"
 battlefield_located:0 "สำรวจสนามรบเรียบร้อย"

### Starting Event - Wanderlust

 rogue_scientist_1_chain_title:0 "ความปรารถนาในการเดินทาง: นักวิทยาศาสตร์นอกรีต"
 rogue_scientist_1_chain_desc:0 "ประธานคณะกรรมการวิทยาศาสตร์เชิงทฤษฎีของ [Root.GetName] ได้หายตัวไปพร้อมกับยานวิทยาศาสตร์รุ่นต้นแบบที่อยู่นอกขนบ\n\nตำแหน่งที่อยู่ปัจจุบันของพวกเขาได้รับการบีบให้แคบลงเหลือเพียงพิกัดที่คาดการณ์ไว้สามแห่ง ซึ่งจะถูกเข้าไปสืบสวนตามลำดับ"

 likely_locations_searched:0 "ค้นหาตำแหน่งที่คาดการณ์ไว้เสร็จสิ้น"

 rogue_scientist_2_chain_title:0 "ความปรารถนาในการเดินทาง: การไล่ตามอย่างใกล้ชิด"
 rogue_scientist_2_chain_desc:0 "ประธานคนดังกล่าวได้หายตัวไปอีกครั้ง แต่คราวนี้พวกเขาทิ้งร่องรอยไว้เบื้องหลัง"

 scientist_pursued:0 "ไล่ตามนักวิทยาศาสตร์เรียบร้อย"

 rogue_scientist_3_chain_title:0 "ความปรารถนาในการเดินทาง: การเผชิญหน้า"
 rogue_scientist_3_chain_desc:0 "ไม่ว่าแรงจูงใจของพวกเขาจะเป็นอย่างไร จะต้องนำตัวประธานกลับมายัง [Root.Capital.GetName]\n\nส่วนพวกเขาจะเขียนวิทยานิพนธ์ระดับปฏิวัติหรือเพียงแค่ต้องเผชิญกับมาตรการทางวินัยนั้นยังคงต้องรอดูกันต่อไป"

 scientist_apprehended:0 "ควบคุมตัวนักวิทยาศาสตร์เรียบร้อย"

 scientist_poi_1:0 "ตำแหน่งสุดท้ายที่ทราบ"
 scientist_poi_1_desc:0 "ตำแหน่งสุดท้ายที่ทราบของยานวิจัยของประธานนอกเขตแดนระบบดาว [Root.Capital.GetStarName]"
 scientist_poi_2:0 "เป้าหมายปลายทางล่าสุดที่ระบุไว้"
 scientist_poi_2_desc:0 "ปลายทางของประธานตามข้อความล่าสุดที่ส่งถึง [Root.Capital.GetName]"
 scientist_poi_3:0 "จุดสิ้นสุดทราเจกทอรีความเร็วที่คาดการณ์ไว้"
 scientist_poi_3_desc:0 "โชคร้ายที่ระบบเซ็นเซอร์ระยะไกลบน [Root.Capital.GetName] ตรวจจับสัญญาณพลังงานที่เบาบางซึ่งอาจเกิดจากการเดินทางเร็วกว่าแสง(FTL)\n\nเส้นทางนี้ไม่ตรงกับเส้นทางการบินที่รู้จัก ทำให้ประธานตกเป็นผู้ต้องสงสัยอย่างยิ่ง"
 scientist_poi_4:0 "การตามล่ายังคงดำเนินต่อไป"
 scientist_poi_4_desc:0 "หลังจากถอดรหัสร่องรอยพลังงานประหลาดของยานวิทยาศาสตร์รุ่นต้นแบบและใช้การคำนวณทางคณิตศาสตร์ที่ค่อนข้างซับซ้อน ในขณะนี้เราทราบแล้วว่าประธานได้หลบหนีไปยังระบบดาวใด"
 scientist_poi_5:0 "โอกาสสุดท้าย"
 scientist_poi_5_desc:0 "ดูเหมือนว่าประธานกำลังจะถึงจุดหมายปลายทางสุดท้ายของพวกเขาแล้ว"

 ### Starting Event - Mass Extinction

 mass_extinction_chain_title:0 "การสูญพันธุ์ครั้งใหญ่ในแต่ละยุคสมัย"
 mass_extinction_chain_desc:0 "เพื่อหลีกเลี่ยงวันสิ้นโลกที่อาจเกิดขึ้นบน [Root.Capital.GetName] เราต้องศึกษาผลกระทบของภัยพิบัติร้ายแรงที่เกิดขึ้นกับดาวเคราะห์ดวงอื่น ๆ"

 massex_analyzed:0 "จำลองรูปแบบการสูญพันธุ์ครั้งใหญ่เสร็จสิ้น"

 massex_poi_1:0 "ดาวเคราะห์ที่แตกสลาย"
 massex_poi_1_desc:0 "แถบดาวเคราะห์น้อยที่โคจรรอบดาวฤกษ์ทำหน้าที่เป็นพยานเพียงหนึ่งเดียวถึงภัยพิบัติครั้งใหญ่บางประการ"
 massex_poi_2:0 "ดาวเคราะห์มอดไหม้"
 massex_poi_2_desc:0 "ดาวเคราะห์ดวงนี้กำลังมอดไหม้อยู่ท่ามกลางการหลอมละลายประหนึ่งขุมนรกของตัวเอง"
 massex_poi_3:0 "ดาวเคราะห์รกร้าง"
 massex_poi_3_desc:0 "ดาวเคราะห์ดวงนี้แห้งแล้งไร้ชีวิตชีวาอย่างน่าประหลาด แม้ว่าจะมีสภาพแวดล้อมที่เอื้อต่อการดำรงชีวิตก็ตาม"
 massex_poi_4:0 "ดาวเคราะห์พิษ"
 massex_poi_4_desc:0 "ไอพิษที่ปกคลุมบรรยากาศของดาวเคราะห์ดวงนี้ในขณะนี้ดูเหมือนจะกำเนิดขึ้นเมื่อไม่นานมานี้อย่างฉับพลัน"
 massex_poi_5:0 "ดาวเคราะห์ยะเยือก"
 massex_poi_5_desc:0 "บันทึกทางดาราศาสตร์ระบุว่าดาวเคราะห์ดวงนี้ไม่ได้เป็นพื้นที่รกร้างหนาวเหน็บมาโดยตลอด"

