 story.101.desc.gesta:1 "สิ่งมีชีวิตต่าง ๆ ที่กองยานของเราพบเมื่อไม่นานมานี้คือสิ่งมีชีวิตในอวกาศรูปแบบใหม่\n\nแม้ว่าฝูง "อะมีบาอวกาศ" เหล่านี้จะมีขนาดใหญ่กว่ายานคอร์เวตของ [Root.Owner.GetAdj] อย่างเห็นได้ชัด แต่ก็เล็กจ้อยมากเมื่อเทียบกับประชากรทั้งหมดของเรา"
