 HAB_CORN_CAT:0 "พืชพรรณกระดำกระด่าง"
 HAB_CORN_DESC:0 "ผลสแกนทางแสงบ่งชี้ว่าพื้นผิวของ [Root.GetName] มีความเขียวขจีอย่างผิดปกติในบางจุด"
 HAB_MAT_CAT:0 "แสงแวววาวของโลหะ"
 HAB_MAT_DESC:0 "เซนเซอร์สเปกโทรเมตรีการกระเจิงกลับบ่งชี้ถึงการมีอยู่ของสารที่มีค่าในเปลือกของดาวเคราะห์"
 ATM_ANOMALY_CAT:0 "ความผิดปกติของชั้นบรรยากาศ"
 ATM_ANOMALY_DESC:0 "ค่าบรรยากาศจาก [Root.GetName] ไม่สอดคล้องกับแบบจำลองที่คาดการณ์ไว้"
 FRBR_GRIMACING_CAT:0 "การขยิบตา"
 FRBR_GRIMACING_DESC:0 "การสแกนพื้นผิวของ [Root.GetName] ซ้ำๆ ให้ค่าเซนเซอร์ที่ไม่สอดคล้องกัน ราวกับว่าดาวเคราะห์ดวงนี้อยู่ในสถานะที่มีการเปลี่ยนแปลงครั้งใหญ่อยู่ตลอดเวลา"
 FROZ_ILLUMINATED_CAT:0 "แสงส่องใต้น้ำแข็ง"
 FROZ_ILLUMINATED_DESC:0 "ปรากฏการณ์ทางแสงที่อธิบายไม่ได้ปรากฏขึ้นทั่วพื้นผิวของ [Root.GetName] ซึ่งสามารถมองเห็นได้อย่างชัดเจนจากอวกาศ"
 GAS_CLOUDY_CAT:0 "ระบำเมฆา"
 GAS_CLOUDY_DESC:0 "รูปแบบชั้นบรรยากาศของ [Root.GetName] นั้นมีความผิดปกติอย่างมากสำหรับดาวยักษ์แก๊สขนาดปานกลาง"
 GAIA_MOVE_CAT:0 "สรวงสวรรค์ที่คาดหวัง"
 GAIA_MOVE_DESC:0 "ในฐานะดาวเคราะห์คลาสไกอา คาดว่า [Root.GetName] จะเต็มไปด้วยสิ่งมีชีวิต..."
 FROZ_BOX_CAT:0 "มีกลิ่นแปลกๆ"
 FROZ_BOX_DESC:0 "ผลสแกนบ่งชี้ถึงการมีอยู่ของวัตถุแปลกปลอมที่สร้างขึ้นโดยมนุษย์ต่างดาว บนยอดเขาที่กลายเป็นน้ำแข็งแห่งหนึ่งของ §H[Root.GetName]'§!"
 CONT_SIGNS_CAT:0 "รอยแผลเป็นบนดาวเคราะห์"
 CONT_SIGNS_DESC:0 "พื้นผิวของ [Root.GetName] ดูเหมือนจะเต็มไปด้วยรอยหลุมลึก ซึ่งไม่ใช่เรื่องผิดปกติ\n\nแต่สิ่งที่ผิดปกติคือรูปทรงที่สมมาตรของรอยแผลเหล่านี้ซึ่งกระจายตัวอยู่อย่างไม่สม่ำเสมอ สิ่งนี้ไม่น่าจะเกิดจากการชนของอุกกาบาต"
 AST_CRATER_CAT:0 "ชามฝุ่น"
 AST_CRATER_DESC:0 "[Root.GetName] เป็นแหล่งของหลุมอุกกาบาตชนที่สวยงามจำนวนหนึ่ง อย่างไรก็ตาม มีบางอย่างทำลายความสม่ำเสมอทางสายตาในหนึ่งในหลุมอุกกาบาตขนาดใหญ่..."
 BAR_COLONY_CAT:0 "มองลงไปเบื้องล่าง"
 BAR_COLONY_DESC:0 "เซนเซอร์ทางแสงแยกกลุ่มรูปทรงบนพื้นผิวที่รกร้างของ [Root.GetName] ที่คาดว่าอาจเป็นสิ่งก่อสร้าง"
 TOX_MAT_CAT:0 "เคลือบยาพิษ"
 TOX_MAT_DESC:0 "เซนเซอร์สเปกโทรเมตรีการกระเจิงกลับบ่งชี้ถึงการมีอยู่ของสารที่มีค่าภายใต้กลุ่มเมฆพิษของ [Root.GetName]"
 AST_CLUSTER_CAT:0 "กลุ่มแร่หนาแน่น"
 AST_CLUSTER_DESC:0 "การเรียงตัวทางเรขาคณิตที่ดูตั้งใจและผิดปกติของแร่ธาตุกำลังล่องลอยผ่านแถบเศษซากใกล้กับ [Root.GetName] และมีความเป็นไปได้ว่าอาจมาจากอารยธรรมต่างดาว"
 GAEA_CHECKERED_CAT:0 "นักกู้ทุ่นระเบิด"
 GAEA_CHECKERED_DESC:0 "ผลสแกนทางสายตาของพื้นผิว [Root.GetName] เผยให้เห็นรูปแบบตารางที่ดูเหมือนจะครอบคลุมดาวเคราะห์ทั้งดวง"
 GEN_ABANDONED_SHIP_CAT:0 "จอดอยู่"
 GEN_ABANDONED_SHIP_DESC:0 "การสแกน [Root.GetName] อย่างรวดเร็วให้ผลลัพธ์ที่น่าประหลาดใจ\n\nดูเหมือนมีบางอย่างกำลังสแกนเรากลับ..."
 GEN_DESERT_CAT:0 "เนินทราย"
 GEN_DESERT_DESC:0 "ชั้นบรรยากาศของ [Root.GetName] นั้นเบาบางอย่างยิ่ง ทว่าบางสิ่งที่ไม่ต่างจากสายลมดูเหมือนจะพัดพาผืนทะเลทรายที่ประกอบกันเป็นพื้นผิวของมันให้สั่นไหว"
 TOX_STRUCTURES_CAT:0 "สิ่งก่อสร้างในแดนพิษ"
 TOX_STRUCTURES_DESC:0 "ที่ไหนสักแห่งภายใต้หมู่เมฆอันหนาทึบและเหนียวเหนอะของ [Root.GetName] โครงสร้างที่ผิดธรรมชาติทอดเงาร่างให้เห็นเด่นชัดตัดกับพื้นผิวที่เป็นพิษ"
 TROP_WOODS_CAT:0 "ความเป็นใหญ่แห่งพฤกษา"
 TROP_WOODS_DESC:0 "พื้นผิวของ [Root.GetName] ถูกปกคลุมไปด้วยต้นไม้ขนาดมหึมาที่น่าประทับใจเป็นพิเศษ"
 HOLE_RADIATION_CAT:0 "สายรุ้งในความมืด"
 HOLE_RADIATION_DESC:0 "เซนเซอร์ตรวจพบค่าอ่านที่ผิดปกติในบริเวณใกล้เคียงกับ [Root.GetName] ซึ่งเป็นค่าอ่านที่ยากจะอธิบายได้เมื่ออยู่ใกล้กับหลุมดำขนาดนี้"
 UHB_BUOY_CAT:0 "ปรากฏการณ์ดอปเพลอร์"
 UHB_BUOY_DESC:0 "สัญญาณที่สั่นไหวหลอกหลอนอยู่รอบ [Root.GetName] ทว่ามันดูเหมือนจะไม่ได้มีต้นกำเนิดมาจากพื้นผิวของดาวเคราะห์"
 GAIA_RECORD_CAT:0 "ชายฝั่งรูบิคอน"
 GAIA_RECORD_DESC:0 "ที่ราบอันเขียวชจีของ [Root.GetName] นั้นเงียบสงบ เว้นแต่สัญญาณบีคอนที่อ่อนกำลังทว่าสม่ำเสมอ"
 CRYSTAL_MANUFACTORY_CAT:0 "โรงงานผลิตโบราณ"
 CRYSTAL_MANUFACTORY_DESC:0 "โครงสร้างเก่าแก่ที่ดูเหมือนจะถูกทิ้งร้างตั้งตระหง่านอยู่เหนือ [Root.GetName] ซึ่งหากไม่มีมันแล้วก็เป็นเพียงดาวเคราะห์น้อยที่ธรรมดาทั่วไป"

