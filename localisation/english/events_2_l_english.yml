 story.8.name:0 "รายงานการติดต่อ: เลอเวียธาน"
 story.8.desc:0 "การค้นพบสิ่งมีชีวิตขนาดมหึมาที่อาศัยอยู่ในความว่างเปล่าทำให้ [Root.GetName] ดูไร้ความหมายลงไปถนัดตาเมื่อเทียบกับภาพรวมของจักรวาล สิ่งมีชีวิตตนแรกที่จักรวรรดิอันน่าภาคภูมิใจของเราได้พบอาจเป็นสิ่งสุดท้ายที่เราจะได้เห็น ภาพลักษณ์ของเลอเวียธานแพร่กระจายไปทั่วจักรวรรดิ ก่อให้เกิดความตื่นตระหนกในหมู่มวลชนและการเรียกร้องให้ดำเนินการใด ๆ\n\nรายงานของกองยานของเราระบุว่าอสูรกายตัวนี้ดูแข็งแกร่งพอที่จะทำลายล้างกองทัพเรือที่เก่งกาจที่สุดได้ และแนะนำให้ใช้ความระมัดระวัง"
 story.8.desc.spirit:0 "ประชากร [Root.GetSpeciesAdj] กำลังสวดอ้อนวอน สิ่งมีชีวิตขนาดยักษ์ที่เผชิญหน้าในความมืดทำให้ผู้คนจำนวนมากในจักรวรรดิหวาดกลัวต่อสติสัมปชัญญะของตนเอง หรือเคลือบแคลงในความศรัทธาต่อสิ่งศักดิ์สิทธิ์ ยักษ์เหล่านี้เป็นผู้พิทักษ์ชีวิตทั้งหมดและผู้ที่สร้างมันขึ้นมา หรือว่าเป็นศัตรูกันแน่?"
 story.8.desc.phile:0 "[Root.GetName] ได้เผชิญหน้ากับบางสิ่งที่งดงามและน่าเกรงขามเกินจะบรรยาย สิ่งมีชีวิตขนาดยักษ์ซึ่งการมีอยู่ของพวกมันเป็นข้อพิสูจน์ถึงความมหัศจรรย์อันสุดจะหยั่งถึงของจักรวาล ทำให้สิ่งมีชีวิตส่วนใหญ่ดูเหมือนแสงริบหรี่ข้างดวงดาวที่กำลังลุกโชน\n\nแม้ว่าจะไม่ทราบธรรมชาติที่แท้จริงของเลอเวียธาน แต่ผู้คนบน [Root.Capital.GetName] ต่างตกตะลึงในความน่าเกรงขามของสิ่งที่ถูกค้นพบ และมองโลกในแง่ดีเกี่ยวกับสิ่งที่จะตามมา"
 story.8.desc.mach:0 "การค้นพบสิ่งมีชีวิตขนาดมหึมาที่มีคุณสมบัติไม่ทราบแน่ชัดในความว่างเปล่าทำให้ [Root.GetName] ต้องกำหนดขอบเขตและพารามิเตอร์ทั้งหมดที่เคยรู้จักใหม่สำหรับพื้นที่ผิวสูงสุดของสิ่งก่อสร้างเดี่ยวใด ๆ ที่มีความสามารถในการเป็นศัตรู อัตราการรอดชีวิตที่คาดการณ์ไว้หาก [Root.GetName] เข้าสู่ความขัดแย้งกับสิ่งมีชีวิตที่เพิ่งค้นพบใหม่นี้นั้นไม่น่าเป็นไปในทางที่ดี\n\nหน่วยงานทางวิทยาศาสตร์และทหารแนะนำให้เฝ้าสังเกตการณ์ต่อไป และปรับปรุงรายละเอียดข้อมูลเฉพาะตัวของกองยานปัจจุบันของเรา"
 story.8.desc.followup7:0 "ตอนนี้เราได้พบสิ่งมีชีวิตที่เหนือกว่าสิ่งใด ๆ ที่เคยพบในประวัติศาสตร์การบินอวกาศของจักรวรรดิเรา สิ่งมีชีวิตที่สามารถเติบโตจนมีขนาดที่ไม่มีใครเคยได้ยินมาก่อน โดยมีขนาดและมวลที่เทียบได้กับดวงจันทร์เลยทีเดียว\n\nไม่มีสิ่งใดที่จะเตรียมเราให้พร้อมสำหรับสิ่งนี้ได้ วันนี้จะกลายเป็นจุดเปลี่ยนในประวัติศาสตร์ของ [Root.GetName] ตลอดไป ขอให้เรามีชีวิตรอดนานพอที่จะเล่าขานมันได้"
 story.8.desc.followup123456:0 "ข่าวลือเกี่ยวกับการพบเห็นสิ่งมีชีวิตขนาดยักษ์ในความว่างเปล่าอันมืดมิดของอวกาศกำลังแพร่กระจายไปทั่วจักรวรรดิราวกับโรคระบาด มีความกังวลและความประหลาดใจในแง่ดี แต่ส่วนใหญ่นำมาซึ่งความตื่นตระหนกต่อการมีอยู่ของประชากร เอกสารทางประวัติศาสตร์จะบันทึกวันนี้ว่าเป็นวันที่มีความสำคัญอย่างยิ่ง"
 story.8.desc.mechanical:0 "ข่าวการเผชิญหน้ากับสิ่งก่อสร้างในอวกาศลึกที่มีสัดส่วนใหญ่ยักษ์กำลังแพร่กระจายไปทั่ว [Root.GetName] แม้ว่าสิ่งก่อสร้างนี้ดูเหมือนจะไม่ใช่ลักษณะทางชีวภาพ แต่การมีอยู่ของมันส่งผลกระทบอย่างหลีกเลี่ยงไม่ได้ต่อความเป็นไปได้ทางเทคโนโลยีและวิศวกรรมขนาดใหญ่(เครื่องยนต์เมกะ)"
 story.8.a:0 "ความมืดมิดนี้คือสิ่งเดียวที่มีอยู่งั้นหรือ?"
 story.8.b:0 "พวกเราเป็นเพียงละอองฝุ่นเท่านั้น"
 story.8.c:0 "มันช่างน่าเกรงขามเหลือเกิน"
 story.8.d:0 "ได้รับข้อมูลแล้ว กำลังอัปเดตฐานข้อมูล"
 story.8.e:0 "อสูรร้ายที่มาเพื่อทดสอบศรัทธาของเรา"
 story.8.f:0 "ข้อพิสูจน์แห่งพระผู้เป็นเจ้า"
 story.8.g:0 "ลองคิดดูสิว่าพวกมันจะสามารถสอนอะไรเราได้บ้าง"
 story.8.h:0 "ลองนึกภาพดูสิว่ามันจะเป็นถ้วยรางวัลที่น่าประทับใจขนาดไหน"

 ### Space Monsters

 story.101.name:0 "อะมีบาอวกาศ"
 story.101.desc.phile:1 "สิ่งมีชีวิตต่าง ๆ ที่กองยานของเราพบเมื่อไม่นานมานี้คือสิ่งมีชีวิตในอวกาศรูปแบบใหม่ที่น่าอัศจรรย์\n\nมันได้รับฉายาอย่างรวดเร็วว่า \"อะมีบาอวกาศ\" (สเปน อมีบา)จากความเข้าใจผิดอย่างร้ายแรงของนักวิเคราะห์ที่อ่านค่าเอาต์พุตเซ็นเซอร์เริ่มต้นผิดพลาด ในความเป็นจริงแล้วสิ่งมีชีวิตนี้มีขนาดใหญ่กว่ายานคอร์เวตเฉลี่ยของ [Root.Owner.GetAdj]\n\nเราควรปล่อยมันไว้ตามลำพังและตรวจสอบสิ่งมีชีวิตนี้รวมถึงญาติ ๆ ของมันจากระยะไกลจาก [Root.Owner.Capital.GetName]"
 story.101.desc.phobe:2 "สิ่งมีชีวิตต่าง ๆ ที่กองยานของเราพบเมื่อไม่นานมานี้คือสิ่งมีชีวิตรูปแบบใหม่ที่น่าสะพรึงกลัว\n\nมันได้รับฉายาอย่างรวดเร็วว่า \"อะมีบาอวกาศ\" (สเปน อมีบา)จากความเข้าใจผิดอย่างร้ายแรงของนักวิเคราะห์ที่อ่านค่าเซ็นเซอร์เริ่มต้นผิดพลาด ในความเป็นจริงแล้วสิ่งมีชีวิตนี้มีขนาดใหญ่กว่ายานคอร์เวตเฉลี่ยของ[Root.Owner.GetAdj]\n\nคงจะไม่เป็นอันตรายอะไรมากนักหากจะปลดปล่อยอสูรกายเหล่านี้จากความทุกข์ทรมาน\n\nเพื่อวิทยาศาสตร์ หรืออะไรทำนองนั้น"
 story.101.desc.milit:2 "สิ่งมีชีวิตต่าง ๆ ที่กองยานของเราพบเมื่อไม่นานมานี้คือสิ่งมีชีวิตในอวกาศ\n\nมันได้รับฉายาอย่างรวดเร็วว่า \"อะมีบาอวกาศ\" (สเปน อมีบา)จากความเข้าใจผิดอย่างร้ายแรงของนักยุทธวิธีในการอ่านค่าเซ็นเซอร์เริ่มต้น ในความเป็นจริงสิ่งมีชีวิตนี้มีขนาดใหญ่กว่ายานคอร์เวตเฉลี่ยของ [Root.Owner.GetAdj]\n\nสิ่งมีชีวิตนี้แสดงพฤติกรรมก้าวร้าวต่อยานของ [Root.Owner.GetAdj] แต่การศึกษาเพิ่มเติมก็อาจจะคุ้มค่า"
 story.101.desc.pacif:1 "สิ่งมีชีวิตต่าง ๆ ที่กองยานของเราพบเมื่อไม่นานมานี้คือสิ่งมีชีวิตในอวกาศรูปแบบใหม่\n\nมันได้รับฉายาอย่างรวดเร็วว่า \"อะมีบาอวกาศ\" (สเปน อมีบา)จากความเข้าใจผิดอย่างร้ายแรงของนักวิเคราะห์ที่อ่านค่าเซ็นเซอร์เริ่มต้นผิดพลาด ในความเป็นจริงแล้วสิ่งมีชีวิตนี้มีขนาดใหญ่กว่ายานคอร์เวตเฉลี่ยของ [Root.Owner.GetAdj]\n\nแม้ว่าจะดูอารมณ์ร้ายอย่างเห็นได้ชัด แต่ก็มีคุณค่าพอที่จะศึกษาเพิ่มเติม - เราสามารถเฝ้าสังเกตการณ์สิ่งมีชีวิตนี้และพวกเดียวกันจากระยะไกลจาก [Root.Owner.Capital.GetName] ได้"
