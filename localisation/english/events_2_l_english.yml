 # FROM.FROM = PLANET SCOPE (if triggered from anomaly category)

 anomaly_failure.2500.desc:0 "เมื่อตรวจสอบอย่างใกล้ชิด พบว่าดาวเคราะห์น้อย [From.From.GetName] เงียบสนิท หนึ่งในผู้ช่วยของ [Root.GetLeaderName] ยอมรับสารภาพในที่สุดว่าพวกเขาอาจจะอ่านค่าเครื่องมือวัดผลผิดไป"
 anomaly_failure.2501.desc:0 "[Root.GetName] เผชิญกับความยากลำบากในการบินผ่านกลุ่มเศษซากอวกาศที่หนาแน่นรอบดาวเคราะห์น้อย [From.From.GetName] อย่างปลอดภัย ไม่ว่าเซ็นเซอร์ของพวกเขาจะจับสัญญาณอะไรได้ก็ตาม มันได้สูญหายไปแล้วในเวลาที่ [Root.GetLeaderName] และลูกเรือเดินทางมาถึง"
 anomaly_failure.2502.desc:0 "จากการกวาดสัญญาณของโพรบสำรวจหลายครั้งบนพื้นผิวของ [From.From.GetName] เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ได้ออกแถลงการขออภัยอย่างเป็นทางการที่เสียเวลาและทรัพยากรไปกับการสำรวจดาวเคราะห์ดวงนี้อย่างละเอียดแต่ไม่ได้รับข้อมูลอันเป็นประโยชน์ใด ๆ กลับมาเลย"
 anomaly_failure.2503.desc:0 "สิ่งที่มองดูจากห้วงอวกาศเหมือนสิ่งก่อสร้างที่น่าตื่นตานั้น เมื่อมองดูใกล้ ๆ ค่อนข้างน่าผิดหวังอย่างยิ่ง ยาน [Root.GetName] ยังคงโคจรรอบ [From.GetName] อยู่ระยะหนึ่งเพื่อศึกษารูปแบบสภาพอากาศของดาวเคราะห์ หลังจากนั้นเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ก็ยืนยันได้ว่าโครงสร้างบนดาวเคราะห์นั้นเป็นเพียงผลลัพธ์จากปัจจัยทางอุตุนิยมวิทยาธรรมดา ๆ ไม่ใช่ฝีมือของสิ่งมีชีวิตทรงปัญญา"
 anomaly_failure.2504.desc:0 "ก่อนที่ลูกเรือของ [Root.GetName] จะสามารถระบุพิกัดสัญญาณขอความช่วยเหลือจากพื้นผิวที่ร้อนจัดของ [From.From.GetName] ได้อย่างแม่นยำ สัญญาณนั้นก็ได้สูญหายไปแล้ว การที่ไม่มีพิกัดทางภูมิศาสตร์ที่เจาะจงให้มุ่งเป้าหมาย เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] จึงเห็นว่าความพยายามในการกู้ภัยนั้นอันตรายเกินไปที่จะดำเนินต่อ"
 anomaly_failure.2535.desc:0 "เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] แห่งยาน [Root.GetName] รายงานว่าสิ่งก่อสร้างบนพื้นผิวของ [From.From.GetName] นั้นไร้คุณค่าเกินกว่าจะให้ความสนใจ และเห็นว่าควรนำเวลาไปใช้กับการสำรวจด้านอื่น ๆ จะดีกว่า"
 anomaly_failure.2540.desc:0 "ลูกเรือของยาน [Root.GetName] รายงานว่าดาวเคราะห์น้อยที่ถูกแกะสลักในรูปร่างคล้ายวิหารนั้นดูงดงามดี\n\nเพียงเท่านั้นเอง"
 anomaly_failure.2545.desc:0 "ลูกเรือของ [Root.GetLeaderName] บนยาน [Root.GetName] ได้ข้อสรุปว่าคุณลักษณะด้านเสียงที่เป็นเอกลักษณ์ของ [From.From.GetName] เกิดจากสิ่งมีชีวิตป่าบนดาวเคราะห์มารวมตัวกันและขับร้องเพลงประสานเสียงคลาสสิกโดยไม่มีเครื่องดนตรีประกอบในทำนองที่ไม่เป็นที่รู้จักของต่างดาว\n\nแต่พวกเขาเห็นว่าไม่มีความจำเป็นต้องเข้าไปสืบสวนประเด็นนี้เพิ่มเติม"
 anomaly_failure.2550.desc:0 "[Root.GetName] ไม่สามารถกู้คืนตัวอย่างที่น่าสนใจใด ๆ จากดาวยักษ์น้ำแข็ง [From.From.GetName] ได้"
 anomaly_failure.2555.desc:0 "โพรบสำรวจของ [Root.GetName] ค้นพบเทคโนโลยีต่างดาวที่ประกอบขึ้นมาอย่างลวก ๆ ความพยายามที่ขาดการพิจารณาอย่างรอบคอบของเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ในการเปิดการทำงานของมัน โชคร้ายที่นำไปสู่การพังทลายเสียหายของมันเอง"
 anomaly_failure.2560.desc:0 "เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ได้ออกรายงานระบุว่าพวกเขาไม่ค่อยพอใจนักที่ได้รับคำสั่งให้ศึกษา [From.From.GetName] เนื่องจากไม่พบสิ่งที่น่าสนใจเลย"
 anomaly_failure.2600.desc:0 "ยาน [Root.GetName] ได้โคจรรอบ [From.GetName] อยู่ระยะหนึ่งและเฝ้าติดตามรังสีที่แผ่ออกมาโดยไม่มีเหตุการณ์ใด ๆ จนกระทั่งเจ้าหน้าที่วิทยาศาสตร์ [Root.GetName] ตัดสินใจสวมชุดและออกไปเดินในอวกาศเพื่อเก็บตัวอย่างแร่บนดาวเคราะห์น้อยดวงนั้น\n\nในขณะที่เหยียบลงบนพื้นผิวของมัน การแพร่สัญญาณคลื่นวิทยุของ [From.From.GetName] ก็เกิดเพิ่มระดับความเข้มข้นขึ้นอย่างรวดเร็วและรุนแรงอย่างกะทันหัน คลื่นไมโครเวฟได้แผดเผาต้ม [Root.GetLeaderName] ทั้งเป็นภายในเวลาไม่กี่นาที"
 anomaly_failure.2601.desc:0 "เราสูญเสียการติดต่อกับยาน [Root.GetName] หลังจากที่มันเคลื่อนผ่านเข้าไปในกลุ่มเศษซากอวกาศที่หนาแน่นรอบดาวเคราะห์น้อย [From.From.GetName] ได้ไม่นาน\n\nหลายวันต่อมา เราพบกระสวยอพยพหนีภัยที่ขอบเขตของพิกัดดังกล่าว แม้เจ้าหน้าที่วิทยาศาสตร์ [Root.GetName] จะรอดชีวิตมาได้ แต่เธอกลับไม่มีความทรงจำหลงเหลืออยู่เลยว่าเกิดอะไรขึ้นกับยาน [Root.GetName] หรือเพื่อนร่วมยานของเธอ"
 anomaly_failure.2602.desc:0 "การส่งสัญญาณสำรวจอย่างสะเพร่าของเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ในระบบดาว [From.GetName] สร้างความโกรธเกรี้ยวให้กับฝูง §Yทิยานคี§!(Tianki)ขนาดยักษ์สองตัวที่โคจรรอบดาวเคราะห์ สิ่งมีชีวิตเหล่านี้กลายเป็นภัยคุกคามร้ายแรงต่อยาน [Root.GetName]"
 anomaly_failure.2603.desc:0 "การจัดกลุ่มเศษซากที่ประหลาดรอบ [From.From.GetName] แท้จริงเป็นกับดักโบราณ ก่อนที่ยาน [Root.GetName] จะลงจอดสำเร็จ ตัวยานก็ถูกโจมตีโดยโดรนต่อสู้รุ่นเก่าจำนวนหนึ่ง"
 anomaly_failure.2604.desc:0 "ยาน [Root.GetName] ถูกกระแทกจากการปะทุของแมกมาอย่างฉับพลันจากพื้นผิวของ [From.From.GetName] ในขณะที่กำลังบินในระดับต่ำเพื่อตรวจหาพิกัดสัญญาณขอความช่วยเหลือ\n\nไม่มีผู้รอดชีวิตจากเหตุการณ์นี้"
 anomaly_failure.2635.desc:0 "พิกัดที่น่าสนใจบน [From.From.GetName] ครั้งหนึ่งเคยเป็นพื้นที่สำหรับการนันทนาการและสวนสนุกตามรายงานจากยาน [Root.GetName] อายุของสถานที่นี้ยังคงคลุมเครือ เช่นเดียวกับเหตุผลว่าเหตุใดมันถึงมาตั้งอยู่บน [From.From.GetName] ตั้งแต่แรก\n\nลูกเรือของยาน [Root.GetName] ยังรายงานถึงการเสียชีวิตอันน่าเศร้าของเจ้าหน้าที่วิทยาศาสตร์ ซึ่งถูกสิ่งก่อสร้างที่พังถล่มลงมาทับ โดยระบุรหัสได้เพียงว่าเป็น \"ชิงช้าสวรรค์\" (ล้อเลื่อน)"
 anomaly_failure.2640.desc:0 "เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ยังคงยืนยันหนักแน่นว่าลูกเรือของ [Root.GetName] ไม่พบสิ่งใดเลยภายในโพรงดาวเคราะห์น้อย [From.From.GetName] ที่ถูกสลักเสลาอย่างประณีต\n\nทว่ามีบางสิ่งเกี่ยวกับนักวิทยาศาสตร์รายนี้ที่แปรเปลี่ยนไปอย่างเห็นได้ชัด"
 anomaly_failure.2645.desc:0 "ในข้อความการสื่อสารสุดท้าย ลูกเรือของ [Root.GetName] รายงานระดับสัญญาณเสียงพุ่งสูงขึ้นบน [From.From.GetName] ในขณะที่กำลังร่อนเข้าใกล้พื้นผิว การสื่อสารขาดหายไปหลังจากนั้นไม่นาน ตัวยานและผู้คนทั้งหมดบนยานสูญหายและคาดว่าน่าจะเสียชีวิตแล้ว"
 anomaly_failure.2650.desc:0 "ลูกเรือปล่อยให้ยาน [Root.GetName] ลดระดับบินต่ำกว่าเพดานบินที่ปลอดภัยในความพยายามที่จะรวบรวมตัวอย่างน้ำแข็งให้ได้มากที่สุด โชคร้ายที่ของไหลวิกฤตยวดยิ่ง(ของเหลวที่ร้ายแรง)ในชั้นบรรยากาศได้เล็ดลอดเข้าไปในเครื่องขับดันส่วนท้ายของยาน นำมาซึ่งผลลัพธ์ที่ร้ายแรง\n\nไม่มีผู้รอดชีวิตจากเหตุการณ์นี้"
 anomaly_failure.2655.desc:0 "เมื่อยาน [Root.GetName] เข้าใกล้ [From.From.GetName] มันกลับถูกสกัดกั้นโดยยานขนของเถื่อนที่ไม่มีท่าทีเป็นมิตรกลุ่มหนึ่ง ยานข้าศึกได้ระดมยิงอาวุธถล่มดาวเคราะห์น้อย ทำลายล้างหลักฐานการปฏิบัติการทั้งหมดที่จัดทำไว้ที่นั่น และดูเหมือนว่าเป้าหมายถัดไปจะเป็นยาน [Root.GetName]"
 anomaly_failure.2660.desc:0 "ลูกเรือของยาน [Root.GetName] รายงานว่าเจ้าหน้าที่วิทยาศาสตร์ของยานให้ความสนใจเป็นพิเศษกับน้ำฝนที่ตกลงมาบน [From.From.GetName] โดยบอกว่าเป็น "สีม่วง" ตามที่เธอกล่าว\n\nโชคร้ายที่ตัวอย่างหยาดน้ำฟ้าที่เก็บกู้มานั้นมีความเข้มข้นและไวต่อปฏิกิริยาเคมีสูง และเมื่อทำการเปิดผนึกในห้องทดลองบนยาน [Root.GetName] ของเหลวก็เกิดลุกไหม้ระเบิดอย่างรุนแรง ส่งผลให้เจ้าหน้าที่วิทยาศาสตร์เสียชีวิตในทันที"
 anomaly_failure.2665.desc:0 "ในข้อความสุดท้าย ลูกเรือของ [Root.GetName] รายงานระดับกิจกรรมที่พุ่งสูงขึ้นบน [From.From.GetName] ขณะร่อนเข้าใกล้พื้นผิว การติดต่อสื่อสารถูกตัดขาดหลังจากนั้นไม่นาน ตัวยานและลูกเรือทั้งหมดสูญหายและคาดว่าน่าจะเสียชีวิตแล้ว"
 anomaly_failure.2670.desc:1 "ดูเหมือนว่าความกระตือรือร้นในการตรวจสอบระบบของสิ่งก่อสร้างโบราณของยาน [Root.GetName] จะส่งผลสะท้อนกลับด้านลบเข้าตัวอย่างจัง\n\nก่อนที่วงจรโบราณจะชำรุดเสียหาย ยาน [Root.GetName] สามารถเปิดการทำงานของเครื่องขับดันตำแหน่งวงโคจรของสถานีอวกาศจากระยะไกลได้สำเร็จ - ซึ่งช่วยผลักสถานีดังกล่าวให้หลุดออกจากวงโคจรปกติและดิ่งเข้าสู่แรงโน้มถ่วงของดวงอาทิตย์ในทันที ผลลัพธ์ที่โชคร้ายของภารกิจส่งผลกระทบอย่างลึกซึ้งต่อผู้บัญชาการยาน [Root.GetLeaderName] ซึ่งได้เรียนรู้และเติบโตจากประสบการณ์ครั้งนี้"
 anomaly_failure.2670.a:0 "[Root.GetLeaderName]... ปล่อยมันพุ่งเข้าชนดวงอาทิตย์อย่างนั้นหรือ?"
 anomaly_failure.2670.a.tooltip:0 "§Yโรงงานผลิตโบราณ§! ถูกทำลาย\n"

 ####################################
 # Colony Events
 ####################################

 ### Old Civ Drones

 colony.1500.name:0 "บทโหมโรง"
 colony.1500.desc:0 "มีบางสิ่งตื่นตัวขึ้นบนดวงจันทร์ของ [Root.GetName]\n\nการสแกนเบื้องต้นระบุว่าเทคโนโลยีโบราณบางอย่างได้เปิดการทำงานขึ้น อาจเป็นปฏิกิริยาตอบสนองต่อความพยายามจัดตั้งอาณานิคมของเรา\n\nนักวิทยาศาสตร์ระดับแนวหน้าของเราหลายคนกระตือรือร้นที่จะสืบหาข้อมูลบนดวงจันทร์เพิ่มเติม และได้เตรียมการสำหรับโครงการวิจัยพิเศษแล้ว"
 colony.1500.a:0 "ย่อมเป็นเช่นนั้นอยู่แล้ว"
 colony.1501.name:0 "โดรนโบราณ: การค้นพบ"
 colony.1501.desc:0 "แน่นอนว่ามันเป็นกลุ่มโดรนเก่าแก่ที่หลงทาง\n\nความผิดหวังในตอนแรกถูกขจัดไปด้วยระบบจำแนกจำพวกเป้าหมายมิตร/ศัตรู(ไอเอฟฟี)ที่ผิดพลาดของโดรน - พวกมันคิดว่าเราเป็นเผ่าพันธุ์ที่เกี่ยวข้องกับนายท่านที่ล่วงลับไปนานแล้วของพวกมัน! พวกมันดูตื่นเต้นมากที่จะได้พบพวกเรา (หากระบบปัญญาประดิษฐ์รุ่นเก่าสามารถแสดงความตื่นเต้นได้) ทว่าหลังจากนั้นไม่นานโดรนเหล่านี้ก็หยุดทำงานไปอีกครั้ง และเราไม่สามารถเปิดการทำงานของพวกมันได้อีก\n\nรวมถึงการแยกชิ้นส่วนของพวกมันด้วยเช่นกัน"
 colony.1501.a:0 "เฝ้าติดตามสถานการณ์ต่อไป"
 colony.1502.name:0 "โดรนโบราณ: การตื่นรู้"
 colony.1502.desc:0 "โดรนเหล่านี้ได้ตื่นขึ้นจากการหลับใหลและบินร่อนลงสู่พื้นผิวของ [Root.GetName] ความพยายามในการสื่อสารกับพวกมันได้รับการปฏิเสธอย่างสุภาพในขณะที่พวกมันเริ่มทำการปรับสภาพดาวเคราะห์(รูปร่าง)ในพื้นที่เล็ก ๆ ของดาวเคราะห์ดวงนี้ เราไม่ทราบลักษณะของคำสั่งโบราณใด ๆ ที่พวกมันกำลังดำเนินการอยู่ แต่ดูเหมือนจะไม่เป็นอันตรายต่ออาณานิคม"
 colony.1502.a:0 "ตราบใดที่กิจกรรมของพวกมันให้ผลประโยชน์ต่อเรา..."
 colony.1502.a.tooltip:0 "โดรนจะกำจัด §Yอุปสรรคหน้าดิน§!(เสียงอุดตัน)แบบสุ่มจากพื้นผิวดาวเคราะห์ โดยปล่อยพื้นที่ส่วนอื่นไว้ในสภาพเดิม\n"
 colony.1503.name:0 "โดรนโบราณ: ทะยานสู่ท้องฟ้าในอดีต"
 colony.1503.desc:0 "โดรนโบราณที่นอนแน่นิ่งอยู่บนดวงจันทร์ของ [Root.GetName] ได้ตื่นขึ้นมาทำงานอีกครั้ง และผลงานของพวกมันก็มีทั้งข้อดีและข้อเสีย\n\nภายใต้ความมืดของค่ำคืนและการตรวจตราทางอากาศที่เบาบาง พวกมันได้สร้างโครงสร้างขนาดมหึมาขึ้นมาในระยะห่างที่ไม่ไกลจากนิคมหลักของเราบน [Root.GetName] วิศวกรของเรามั่นใจว่ามันคือการตระหนักรู้ของแนวคิดโบราณที่เรียกว่า \"ลิฟต์อวกาศ\" (ลิฟท์อวกาศ)ซึ่งอาจเป็นสิ่งที่พบเห็นได้ทั่วไปในยุคก่อนที่พวกเรา [Root.Owner.GetSpeciesName] จะเริ่มออกเดินทางสู่ดวงดาว ในท้ายที่สุดโครงสร้างนี้จะต้องถูกทุบทำลายทิ้งเนื่องจากมันขวางทางแผนการขยายตัวของอาณานิคม และการรื้อถอนลงอย่างปลอดภัยจะต้องใช้เวลาพอสมควร อย่างน้อยวิศวกรของเราก็ตื่นเต้นยินดีอย่างยิ่งกับโอกาสที่จะได้ศึกษาโครงสร้างนี้อย่างใกล้ชิด"
 colony.1503.a:0 "ดีสำหรับพวกมันแล้ว"
 colony.1504.name:0 "โดรนโบราณ: ความเอื้ออารีที่เกิดขึ้นเอง"
 colony.1504.desc:0 "หลังจากตื่นขึ้นมาอีกครั้ง โดรนเหล่านี้ได้หายไปจากเซ็นเซอร์ชั่วขณะ เมื่อพวกมันกลับมา พวกมันลากคลังเก็บแร่ธาตุขนาดใหญ่ที่ไม่ทราบที่มาติดสอยห้อยตามมาด้วย พวกมันเทมันกองไว้บนพื้นผิวของ [Root.GetName] หลังจากส่งสัญญาณส่งผ่านข้อมูลที่เสียหายอย่างรุนแรงระบุว่าพวกมันได้บรรลุคำขอเบิกจ่ายทรัพยากรเรียบร้อยแล้ว\n\nจากนั้นพวกมันก็บินกลับไปยังดวงจันทร์"
 colony.1504.a:0 "ได้แร่ธาตุฟรี ไม่มีอะไรต้องบ่น"
 colony.1505.name:0 "โดรนโบราณ: เครือญาติที่ห่างเหิน"
 colony.1505.desc:0 "สัญญาณเตือนอย่างบ้าคลั่งจากดวงจันทร์ทำให้เราทราบว่าโดรนโบราณบน [Root.GetPlanetMoon] ได้ตื่นขึ้นมาอีกครั้ง คราวนี้พวกมันมอบรางวัลชิ้นสำคัญให้แก่เรา เนื่องจากพวกมันได้ขุดพบดาวเทียมโบราณจากใต้พื้นลึกของดวงจันทร์และช่วยซ่อมแซมมันได้บางส่วน เราไม่ทราบว่าดาวเทียมนั้นไปอยู่ตรงนั้นได้อย่างไร หรือเหตุใดโดรนถึงละเลยมันจนถึงตอนนี้ อย่างไรก็ดี หากมีข้อมูลหลงเหลืออยู่แม้เพียงเสี้ยวเดียวในฐานข้อมูลของมัน เราก็จะได้เรียนรู้เรื่องราวมากมายเกี่ยวกับชีวิตประจำวันในจักรวรรดิต่าง ๆ ที่โดรนเหล่านี้เคยรับใช้ในอดีต"
 colony.1506.name:0 "โดรนโบราณ: ความหายนะของโดรน"
 colony.1506.desc:0 "พฤติกรรมแปลก ๆ ของกลุ่มโดรนง่วงนอนเริ่มแปรเปลี่ยนเป็นความรุนแรง โดรนจำนวนหนึ่งตื่นขึ้นและบินเข้าสู่ชั้นบรรยากาศของ [Root.GetName] ตามพฤติกรรมปกติ ทว่าคราวนี้พวกมันกลับพุ่งเข้าชนพื้นผิวของดาวเคราะห์ด้วยแรงขับเต็มกำลัง\n\nซ้ำแล้วซ้ำเล่าในหลาย ๆ กรณี\n\nความเสียหายต่ออาณานิคมนั้นน้อยมาก แต่โดรนที่เกือบจะทำลายไม่ได้เหล่านี้กลับพังพินาศในการระเบิดประกายไฟสีน้ำเงินที่สว่างจ้า ซึ่งบ่งชี้ถึงพลังอันมหาศาลและความมุ่งมั่นในการทำลายล้างตัวเองของพวกมัน"
 colony.1506.a:0 "เราจะค้นหาได้หรือไม่ว่าเกิดอะไรขึ้นกับพวกมัน?"
 colony.1507.name:0 "โดรนโบราณ: การค้นหาโดรน"
 colony.1507.desc:1 "โดรนที่เหลือรอดได้หายสาบสูญไปตั้งแต่เหตุการณ์ฆ่าตัวตายครั้งนั้น กลุ่มผู้คลั่งไคล้ประวัติศาสตร์บน [Root.GetName] มั่นใจว่าโดรนยังคงอยู่ในบริเวณใกล้เคียง โดยถูกบดบังจากสายตาด้วยเทคโนโลยีบางอย่างที่สูญหายไป ทว่ากรอบเวลาที่คาดการณ์ไว้สำหรับการเปิดทำงานครั้งถัดไปของพวกมันได้ผ่านพ้นไปแล้ว\n\nความคืบหน้าในการวิเคราะห์ซากโดรนที่ถูกทำลายอย่างละเอียดเป็นไปอย่างล่าช้า แต่คาดว่าน่าจะมีข่าวดีในไม่ช้า"
 colony.1507.a:0 "แจ้งข้อมูลให้ฉันทราบด้วย"
 colony.1508.name:0 "โดรนโบราณ: การกรองหาทองคำ"
 colony.1508.desc:0 "การจำแนกชิ้นส่วนภายในของโดรนที่พังยับเยินใช้เวลานานกว่าที่คาดไว้มาก เนื่องจากโดรนแต่ละตัวดูเหมือนจะถูกสร้างขึ้นด้วยดีไซน์ที่ต่างกันเล็กน้อย ประกอบขึ้นจากชิ้นส่วนที่ต่างกันเล็กน้อย เมื่อข้อเท็จจริงนี้ได้รับการยืนยัน มีสิ่งหนึ่งที่โดดเด่นขึ้นมา - ชิ้นส่วนที่มีความเหมือนกันทุกประการ เมื่อแยกออกจากชิ้นส่วนที่เหลือ เป็นเรื่องชัดเจนว่าชิ้นส่วนเหล่านี้เป็นเทคโนโลยีสมัยใหม่ที่แปลกตา มีความเป็นไปได้สูงที่ใครบางคนได้ทำในสิ่งที่เราทำไม่ได้ นั่นคือการดัดแปลงอุปกรณ์ในตัวโดรน"
 colony.1508.a:0 "เรื่องนี้สมควรได้รับการสืบสวนเพิ่มเติม"
 colony.1509.name:0 "โดรนโบราณ: เอเลี่ยนเหนือเอเลี่ยน"
 colony.1509.desc:1 "หลังจากนำชิ้นส่วนต่าง ๆ มาประกอบร่วมกัน วัตถุแปลกปลอมภายในโดรนที่ถูกทำลายได้รับการระบุโดยผู้เชี่ยวชาญของเราว่าเป็นเครื่องส่งสัญญาณทางเดียว เนื่องจากไม่ได้ระบุระบบเพื่อเปิดรับสัญญาณ จึงปลอดภัยที่จะสันนิษฐานว่าโดรนไม่ได้ทำงานตามคำสั่งของบุคคลที่สาม ทว่ามีตัวตนบางอย่างที่คอยจับตาดูการทำงานของโดรนอยู่ สมควรศึกษาประเด็นนี้เพิ่มเติม"
 colony.1509.a:0 "เฝ้าติดตามสถานการณ์ต่อไป"
 colony.1510.name:0 "โดรนโบราณ: คำตอบจากเบื้องบน"
 colony.1510.desc:0 "เราพบโดรนที่เหลืออยู่ลอยอยู่ในวงโคจรรอบ [Root.GetPlanetMoon] เราได้รู้ว่าพวกมันคือเบี้ยโดยไม่รู้ตัวในแผนการอันซับซ้อนที่วางไว้โดยกลุ่มอำนาจที่ไม่รู้จัก\n\nหากดูจากรูปแบบการปฏิบัติการ กลุ่มนี้มีแนวโน้มสูงที่จะเป็นสมาคมโจรสลัดที่เก่าแก่และชาญฉลาดเป็นพิเศษ พวกเขาต้องเจอโดรนลอยคว้างอยู่ในอวกาศและทำในสิ่งที่พวกเราทำไม่ได้ นั่นคือการดัดแปลงพวกมัน แม้จะไม่ได้น่าทึ่งอย่างที่ฟังดู - สิ่งที่พวกเขาทำมีเพียงกการใส่เทคโนโลยีต่างดาวที่ทำงานแยกส่วนเข้าไปในโดรน - แต่ข้อเท็จจริงคือโจรสลัดต่างดาวเหล่านี้ครอบครององค์ความรู้ด้านเทคโนโลยีที่ล้ำหน้ากว่าเรามาก อย่างน้อยก็ในบางสาขา หลังจากติดตั้งอุปกรณ์สื่อสารในตัวโดรน โจรสลัดปล่อยให้พวกมันลอยอวกาศอีกครั้ง โดยรู้ดีว่าพวกมันได้รับการตั้งค่าเพื่อช่วยเหลือผู้ตั้งถิ่นฐานดั้งเดิมของนายท่าน และความสามารถของโดรนในการระบุตัวตนของผู้ตั้งถิ่นฐานดังกล่าวได้อย่างแม่นยำได้เสื่อมถอยลงตามกาลเวลา โดยพื้นฐานแล้ว โดรนเหล่านี้ช่วยหล่อเลี้ยงอาณานิคมของเราในขณะที่โจรสลัดคอยเฝ้าดู รอคอยเวลาที่เหมาะสมที่สุดในการโจมตี\n\nนักวิเคราะห์ทางทหารของเราคาดการณ์ว่าโจรสลัดจะเปิดฉากโจมตีภายในสองปีข้างหน้า"
 colony.1510.a:0 "ปล่อยให้พวกมันเข้ามาเลย"
 colony.1510.b:0 "เข้าควบคุมโดรน และส่งพวกมันไปทำลายผู้อ้างตนเป็นนายท่านของพวกมันเสีย"
 colony.1510.c:0 "เราต้องไม่ปล่อยให้เรื่องนี้เกิดขึ้นอีก แยกชิ้นส่วนโดรนทิ้งซะ"
 colony.1511.name:0 "โดรนโบราณ: คำบอกลาครั้งสุดท้าย"
 colony.1511.desc:0 "เราได้จับกุมโดรนและติดตั้งวัตถุระเบิดเข้ากับพวกมัน การเขียนโปรแกรมพวกมันใหม่กลายเป็นเรื่องที่ง่ายดายขึ้นเมื่อเราทราบวิธีการแกะเปิดโครงสร้างของพวกมัน และเราได้กำหนดเส้นทางการบินไปยังตำแหน่งพิกัดที่คาดการณ์ไว้ของกองยานโจรสลัดแล้ว นักวิทยาศาสตร์ระดับสูงของ [Root.Owner.GetSpeciesName] ได้ใส่ระบบจำแนกมิตร/ศัตรู(ไอเอฟฟี)ของเราเองเพื่อลดความเสี่ยงที่โดรนจะไปโจมตีผู้บริสุทธิ์"
 colony.1511.a:0 "ปล่อยให้พวกมันบินไป"
 colony.1512.name:0 "โดรนโบราณ: เสียหายและผันผวน"
 colony.1512.desc:0 "กองยานโจรสลัดกำลังเดินทางเข้ามา เร็วกว่าที่คาดไว้ มีความเป็นไปได้สูงที่การโจมตีเชิงป้องกันล่วงหน้าของเราจะประสบความสำเร็จทั้งในการยั่วยุและสร้างความเสียหายให้กับพวกเขา - กองยานของพวกเขาเล็กกว่าที่คาดการณ์ไว้ประมาณ 30%"
 colony.1513.name:0 "โดรนโบราณ: พวกมันอยู่ทุกหนทุกแห่ง"
 colony.1513.desc:0 "กองยานโจรสลัดเดินทางมาถึงแล้ว ช้ากว่าที่คาดไว้เล็กน้อย หากตัดสินจากการประกอบยานของกองยานและรูปขบวนที่ใช้ พวกเขาได้รวบรวมพันธมิตรของตนเพื่อพยายามปล้นสะดมและเผาทำลาย [Root.GetName] อย่างรวดเร็วและเด็ดขาดที่สุดเท่าที่จะทำได้"
 colony.1513.a:0 "พวกมันไม่มีวันทำเช่นนั้นสำเร็จแน่"
 colony.1514.name:0 "โดรนโบราณ: การดวลตัดสิน"
 colony.1514.desc:0 "ช่วงเวลานั้นมาถึงแล้ว และกองเรือโจรสลัดเดินทางมาถึงตามนัดหมาย"
 colony.1514.a:0 "การต่อสู้ครั้งนี้เป็นสิ่งที่เราเฝ้ารอมานานแล้ว"

### Mharin Kharin Aphrodisiac Pollen

 colony.1520.name:0 "มาริน คาริน: ความหลงใหลในดอกไม้"
 colony.1520.desc:0 "พืชพื้นเมืองดั้งเดิมหลายชนิดของ [Root.GetName] ซึ่งเราเพิ่งจัดตั้งอาณานิคมขึ้นมา ได้แผ่ละอองเกสรดอกไม้จำนวนมากซึ่งมีความซับซ้อนทางเคมีอย่างน่าตกตะลึง\n\nโครงการวิจัยพิเศษได้รับการจัดเตรียมสำหรับการศึกษาพืชพรรณนี้เพิ่มเติมแล้ว"
 colony.1521.name:0 "มาริน คาริน: การกระตุ้นประสาทดมกลิ่น"
 colony.1521.desc:0 "การสัมผัสกับละอองเกสรดอกไม้ที่เกิดขึ้นตามธรรมชาติในชั้นบรรยากาศของ [Root.GetName] เป็นระยะเวลานาน ส่งผลต่อตัวรับฟีโรโมนของผู้ตั้งถิ่นฐานโดยสร้างความรู้สึกทางเพศอ่อน ๆ ควบคู่ไปกับความรู้สึกเคลิบเคลิ้มที่แทบจะไม่รู้สึกตัว พืชที่ผลิตสายพันธุ์ที่ทรงพลังที่สุดคือดอกไม้ที่มีอยู่ทั่วไปในทุกพื้นที่ของดาวเคราะห์ดวงนี้ ซึ่งถูกนักวิทยาศาสตร์บน [Root.GetName] เก็บซ่อนไว้ในหมวดหมู่ทางอนุกรมวิธานที่คลุมเครือบางแห่ง แต่เป็นที่รู้จักในภาษาถิ่นของ [Root.Owner.GetSpeciesName] ว่า \"มาริน คาริน\"(มาริน แคริน)"
 colony.1521.b:0 "เราไม่สามารถอนุญาตให้อนุภาคที่ส่งผลต่อจิตใจลอยอยู่ในชั้นบรรยากาศได้"
 colony.1521.c:0 "เราไม่มีทรัพยากรมากพอที่จะกำจัดพืชชนิดนี้ให้หมดไป"
 colony.1522.name:0 "มาริน คาริน: การให้เวลากับกลีบดอกไม้"
 colony.1522.desc:0 "รายงานจาก [Root.GetName] ระบุว่าผลผลิตของคนงานลดลงเมื่อเร็ว ๆ นี้ โดยเริ่มคงที่ในระดับที่ต่ำกว่าค่าเฉลี่ยของ [Root.Owner.GetName] อยู่หลายเปอร์เซ็นต์\n\nนี่อาจจะหรืออาจจะไม่ใช่เพราะผลกระทบด้านการกระตุ้นประสาทของละอองเกสรดอกไม้ท้องถิ่นของดาวเคราะห์ดวงนี้\n\nแต่มีความเป็นไปได้สูงที่จะใช่\n\nโครงการพิเศษ §Yโครงการพิเศษ§! ได้รับการเตรียมไว้เผื่อว่าเราจะต้องการเพิ่มประสิทธิภาพสายงานการผลิตเพื่อชดเชยการสูญเสียครั้งนี้"
 colony.1522.a:0 "มาดูกันซิว่าเราจะสามารถทำอะไรได้บ้าง"
 colony.1523.name:0 "มาริน คาริน: งานสำคัญกว่าดอกไม้"
 colony.1523.desc:0 "การเปลี่ยนแปลงอย่างกว้างขวางในกรอบแนวคิดการบริหารเวลาและวิธีการมอบหมายความรับผิดชอบในทุกส่วนการผลิตและหน้าที่อื่น ๆ บน [Root.GetName] ให้ผลลัพธ์ที่ดี ประชาชนมีความปรารถนาอย่างเห็นได้ชัด - ซึ่งผู้สังเกตการณ์ภายนอกจะเรียกมันว่าความจำเป็นอย่างยิ่งยวด - ที่จะต้องอยู่ใกล้ชิดกับพืชพรรณท้องถิ่น\n\nด้วยการจัดตารางเวลาอย่างชาญฉลาดและมีการตรวจสอบเพิ่มเติม ผลผลิตยังคงอยู่ในระดับต่ำแต่ก็ขยับสูงขึ้นกว่าขีดจำกัดขั้นต่ำสุดที่พอจะยอมรับได้แล้ว"
 colony.1523.a:0 "ทำได้ดีมาก"
 colony.1524.name:0 "มาริน คาริน: ฝังรากอยู่กับที่"
 colony.1524.desc:0 "การสำรวจล่าสุดระบุว่าผู้อยู่อาศัยใน [Root.GetName] มีโอกาสน้อยกว่าประชากรกลุ่มอื่น ๆ ของ [Root.Owner.GetName] ที่จะอพยพย้ายถิ่นฐานไปยังดาวเคราะห์ดวงอื่น\n\nการสำรวจไม่ได้ระบุว่าเหตุการณ์นี้เกิดจากการติดขัดทางจิตวิทยาต่อการกระตุ้นประสาทสัมผัสระดับต่ำอันเนื่องมาจากดอกมาริน คารินและพืชพี่น้องของมันหรือไม่"
 colony.1525.name:0 "มาริน คาริน: ปัญหาการส่งผ่านสัญญาณ"
 colony.1525.desc:0 "แม้ว่าประสิทธิภาพการผลิตจะไม่ถดถอยลงแล้วบนดาวเคราะห์ แต่การสื่อสารระหว่างอาณานิคมบน [Root.GetName] และเมืองหลวงบน [Root.Owner.Capital.GetName] กำลังพังทลายลง เจ้าหน้าที่ระดับสูงบน [Root.GetName] เริ่มทำตัวห่างเหินมากขึ้น และเสมียนของเราต่างร้องเรียนว่าแม้แต่การส่งคำสั่งง่าย ๆ ก็เริ่มกลายเป็นการกระทำที่น่าหงุดหงิดเสียแล้ว"
 colony.1525.a:0 "เฮ้อ"
 colony.1525.b:0 "ส่งหน่วยปฏิบัติการบริหารจัดการรหัสสีม่วง(เสียงม้า)เข้าพื้นที่"
 colony.1526.name:0 "มาริน คาริน: การทรยศจากฝ่ายบริหารระดับสูง"
 colony.1526.desc:0 "ดูเหมือนว่าทีมผู้บริหารระดับแนวหน้าที่เราส่งไปยัง [Root.GetName] เพื่อจัดระเบียบสิ่งต่าง ๆ ได้แปรพักตร์ไปเสียแล้ว โชคดีสำหรับเราที่แผนการทำงานให้น้อยที่สุดของพวกเขานั้นทำออกมาอย่างลวก ๆ และถูกพบเห็นได้ง่ายดาย หัวของพวกเขาคงจะหลุดจากบ่า - ในเชิงเปรียบเปรยแน่นอน - เนื่องจากหนทางสุดท้ายของเราคือการปลดคณะรัฐบาลท้องถิ่นและจัดการเรื่องต่าง ๆ ของอาณานิคมจากเมืองหลวงแทน"
 colony.1526.a:0 "มันคงจะไม่สวยงามนักแน่"
 colony.1527.name:0 "มาริน คาริน: ด้วยกำปั้นเหล็ก จากแดนไกล"
 colony.1527.desc:0 "รัฐบาลจัดการระยะไกลของเราใน [Root.GetName] ได้รับการจัดตั้งอย่างมั่นคงแล้ว ได้รับความสำเร็จในระดับหนึ่งในการปราบปรามการแพร่พันธุ์ของพืชที่มีละอองเกสร มาริน คาริน รวมถึงการสลายการยอมรับของชุมชนในการ "ใช้" มัน - ถือเป็นผลงานที่ไม่ธรรมดาเมื่อพิจารณาว่าพฤติกรรมนี้ดูไม่มีพิษภัยเทียบเท่ากับการดมกลิ่นดอกไม้"
 colony.1528.name:0 "มาริน คาริน: ฟันและเผาทำลาย"
 colony.1528.desc:0 "การปกครองระยะไกลของเราใน [Root.GetName] ยังคงเป็นข้อตกลงที่ดูขัด ๆ แต่มีประสิทธิภาพ สภาผู้ดูแลอ้างว่าได้รับความจงรักภักดีจากกองกำลังทหารส่วนหนึ่งของเราบนดาวเคราะห์ดวงนี้ - เห็นได้ชัดว่าพวกเขาชอบการอยู่ในอาคารมากกว่าการสูดดมละอองเกสรของมาริน คาริน รัฐบาลระยะไกลปรารถนาจะใช้กองกำลังเหล่านี้เพื่อเริ่มการกวาดล้างดอกไม้ โดยให้พวกเขาติดตั้งเครื่องฟอกบรรยากาศและกำจัดพืชชนิดนี้ออกจากเขตเมืองทั้งหมดอย่างสิ้นซาก"
 colony.1528.a:0 "เราควรจะทำแบบนี้ตั้งนานแล้ว"
 colony.1528.a.tooltip:0 "พืชที่ออกฤทธิ์มึนเมาจะถูกควบคุมอย่างเข้มงวดและกักบริเวณไว้ภายนอกพื้นที่ที่มีประชากรอาศัยอยู่ ส่งผลให้ลบตัวดัดแปลงที่เกี่ยวข้องทั้งหมดออก\n"
 colony.1529.name:0 "มาริน คาริน: ลัทธิละอองเกสร"
 colony.1529.desc:0 "กลุ่มหัวรุนแรงใน [Root.GetName] ได้มารวมตัวกันเพื่อก่อตั้งองค์กรกึ่งศาสนาที่พยายามจะควบคุมการเพาะปลูกดอกมาริน คารินในทุกแง่มุม ผู้นำของพวกเขาซึ่งสถาปนาตนเองเป็น \"กรีนไฮเออโรแฟนท์สีเขียวแห่ง \"ศาสนสถานดอกไม้\" อ้างว่าเป็นตัวแทนของพืชและสัตว์ทั้งหมดใน [Root.GetName] และเรียกร้องสิทธิ์การค้าแต่เพียงผู้เดียวสำหรับพืชชนิดนี้\n\nแน่นอนว่านี่เป็นสิ่งที่ไม่สามารถยอมรับได้และเป็นไปไม่ได้ เนื่องจากพืชพรรณท้องถิ่นของ [Root.GetName] มีคุณค่าทางยุทธศาสตร์หรือเศรษฐกิจน้อยมาก และการนำมันออกนอกดาวเคราะห์ถือเป็นเรื่องผิดกฎหมายตามรัฐธรรมนูญ\n\nโชคร้ายที่พวกเขาดูเหมือนจะไม่ยอมรับข้อเท็จจริงนี้อย่างสงบนัก"
 colony.1530.name:0 "มาริน คาริน: จุดเริ่มต้นจุดจบของละอองเกสร"
 colony.1530.desc:0 "ศาสนสถานดอกไม้และผู้ติดตามในขณะนี้ถือเป็นสัดส่วนประชากรกลุ่มน้อยขนาดใหญ่บน [Root.GetName] และรายงานระบุถึงการเปลี่ยนแปลงที่น่าวิตกในกลุ่ม ความพยายามที่สูญเปล่าในการลักลอบนำชิ้นส่วนตัวอย่างมาริน คารินออกนอกดาวเริ่มลดความกระตือรือร้นลงในทุก ๆ วัน เนื่องจากทางศาสนสถานดอกไม้ดูเหมือนจะกำลังแปรสภาพกลายเป็นลัทธิวันสิ้นโลก มีความเป็นไปได้ที่จะมีความสัมพันธ์กับการเปลี่ยนแปลงล่าสุดในองค์ประกอบทางเคมีของเกสรดอกไม้ที่ตรวจพบโดยเซ็นเซอร์ชั้นบรรยากาศ\n\nโครงการวิจัยพิเศษ §Yโครงการพิเศษ§! ได้รับการเตรียมการเพื่อประเมินความเสี่ยงที่เกี่ยวข้องกับประเด็นนี้ และแนะนำให้ทำศึกษานี้ให้เสร็จสิ้นก่อนที่จะเกิดข้อผิดพลาดร้ายแรงขึ้น"
 colony.1530.a:0 "ตกลง"
 colony.1531.name:0 "มาริน คาริน: การหลีกเลี่ยงภัยพิบัติ"
 colony.1531.desc:0 "การดำเนินการอย่างรวดเร็วและเด็ดขาดช่วยให้เราสามารถระบุความเสี่ยงที่เกี่ยวข้องกับการเปลี่ยนแปลงอย่างรวดเร็วของเกสรดอกไม้ท้องถิ่นของ [Root.GetName] และดำเนินมาตรการที่จำเป็นได้สำเร็จ\n\nมาตรการที่จำเป็นดังกล่าวประกอบไปด้วยการอพยพประชากรทั้งหมดออกจากดาวเคราะห์และการทิ้งระเบิดสารกำจัดศัตรูพืชเชิงยุทธวิธีทั่วทั้งดาว โดยมุ่งเป้าไปที่ดอกมาริน คารินและพืชตระกูลเดียวกัน\n\nพืชเหล่านั้นเกิดการกลายพันธุ์อย่างรวดเร็ว และหากพวกมันไม่ถูกทำลาย ละอองเกสรที่เป็นเอกลักษณ์ของพวกมันก็จะเริ่มปล่อยสารพิษทำลายประสาทอย่างรุนแรงเข้าสู่ประสาทการดมกลิ่นของสิ่งมีชีวิตที่มีปัญญาญาณทั้งหมดบน [Root.GetName] ในเวลาต่อมา\n\nนักวิทยาศาสตร์ในสภาอาณานิคมตั้งทฤษฎีว่านี่เป็นส่วนหนึ่งของวัฏจักรธรรมชาติใน [Root.GetName] และผลกระทบด้านลบของเกสรที่มีต่อเรา ในรูปแบบของการบริหารงานท้องถิ่นที่ล่มสลาย การเติบโตของลัทธิวิหารดอกไม้ และความเป็นพิษของละอองเกสรในท้ายที่สุด เป็นเพียงผลข้างเคียงโดยบังเอิญมากกว่าจะเป็นผลผลิตจากกลไกการป้องกันตัวเองที่ชั่วร้ายของพืช\n\nไม่ว่าในกรณีใด ร่องรอยของดอกไม้ทั้งหมดได้ถูกขจัดออกไปจากพื้นผิวดาวเคราะห์เรียบร้อยแล้ว และผู้ตั้งถิ่นฐานของเราปลอดภัยและเป็นอิสระจากอิทธิพลของเกสรดอกไม้"
 colony.1531.a:0 "จบดีถือว่าดี"
 colony.1531.a.tooltip:0 "ดาวเคราะห์ดวงนี้ได้รับการชำระล้างดอกไม้อันตรายแล้ว ส่งผลให้ตัวดัดแปลงที่เกี่ยวข้องทั้งหมดถูกถอดออก\n"
 colony.1532.name:0 "มาริน คาริน: วาระสุดท้ายเพราะละอองเกสร"
 colony.1532.desc:0 "มีบางสิ่งผิดพลาดอย่างร้ายแรง\n\nทุ่งดอกมาริน คารินขนาดใหญ่เกิดการกลายพันธุ์พร้อมกันอย่างกะทันหัน แพร่กระจายอย่างรวดเร็วราวกับไฟป่าและเปลี่ยนละอองเกสรให้กลายเป็นยาพิษ และพวกเราเดินทางมาถึงสายเกินไป\n\nทั้งความพยายามในการอพยพประชากรและการสลายละอองเกสรของเราต่างไม่สำเร็จตามเป้าหมาย และผู้อยู่อาศัยใน [Root.GetName] ได้ชดใช้ด้วยชีวิตของพวกเขา\n\nชีวิตพืชพรรณของ [Root.GetName] ได้รับชัยชนะที่ไร้ประโยชน์(ชัยชนะในพริบตา)แม้ว่าข้อเท็จจริงนี้แทบจะไม่ช่วยปลอบประโลมจิตใจก็ตาม พืชทั้งหมดในสกุลเดียวกับมาริน คารินได้มอดไหม้ไปในการขยายพันธุ์ที่รวดเร็วเกินธรรมชาติของพวกมันเอง ผืนดินขาดสารอาหารเฉพาะที่พืชช่วยผสมเกสรต้องการ - เมื่อพืชสายพันธุ์ที่ยังมีชีวิตอยู่ล่วงลับไปในไม่ช้า ก็คงต้องใช้เวลานานก่อนที่พืชตระกูลนั้นจะสามารถจัดตั้งถิ่นฐานในระบบนิเวศได้อีกครั้ง หากพวกมันจะสามารถทำได้\n\nผู้อยู่อาศัยใน [Root.GetName] เสียชีวิตทั้งหมด และชั้นบรรยากาศของดาวเคราะห์เต็มไปด้วยไอพิษจากการปล่อยสารเคมีของพืชชั่วคราว"
 colony.1532.a:0 "เราจะไม่มีวันลืมโศกนาฏกรรมครั้งนี้"
 colony.1533.name:0 "มาริน คาริน: จุดเริ่มต้นใหม่"
 colony.1533.desc:0 "ทีมงานเฝ้าติดตามดาวเคราะห์รายงานว่าม่านหมอกพิษที่ปกคลุมดาวเคราะห์เมื่อสองปีก่อนและนำไปสู่การทำลายล้างอาณานิคมของเราได้สลายไปแล้ว ตอนนี้ดาวเคราะห์เปลี่ยนสภาพไป กลายเป็นดาวเคราะห์ทะเลทรายหลังจากการเบ่งบานอย่างรุนแรงของมาริน คารินและชั้นบรรยากาศที่อิ่มตัวไปด้วยละอองเกสร\n\nคงต้องใช้เวลามากกว่าสองปีนี้เพื่อให้ [Root.Owner.GetName] ลืมเลือนชะตากรรมอันน่าสลดใจของผู้คนที่อาศัยอยู่ที่นั่น แต่ดาวเคราะห์ดวงนี้ไม่ได้แสดงพฤติกรรมเป็นปฏิปักษ์ต่อสิ่งมีชีวิตทรงภูมิปัญญาอย่างเปิดเผยอีกต่อไป"
 colony.1533.a:0 "เข้าใจแล้ว..."
 pheromonefrenzy.revived.tooltip:0 "อาณานิคมเดิมของคุณแปรเปลี่ยนเป็นดาวเคราะห์ทะเลทราย และสามารถตั้งอาณานิคมใหม่ได้หากมีเทคโนโลยีที่เหมาะสม"
 colony.1534.name:0 "มาริน คาริน: การประเมินเกสรเพศเมีย"
 colony.1534.desc:0 "เมื่อตรวจสอบอย่างใกล้ชิด พืชท้องถิ่นของ [Root.GetName] พบว่าค่อนข้างธรรมดาเกินคาด บางต้นปล่อยละอองเกสรที่มีฤทธิ์กระตุ้นอ่อน ๆ และมีแนวโน้มที่จะเปลี่ยนแปลงทางพันธุกรรมอย่างรวดเร็ว ซึ่งไม่น่าประทับใจเพียงพอที่จะนำมาใช้เป็นทรัพยากรทางยุทธศาสตร์หรือทรัพยากรหรูหราได้"

 ####################################
 # Spread of communications
 ####################################
 communications_spread.1.name:0 "การสื่อสารถูกสกัดกั้น"
 communications_spread.1.desc:1 "การสกัดกั้นข้อความการสื่อสารที่ส่งถึง [CommSpreader.GetName] ทำให้เราทราบว่าพวกเขามีการติดต่อเป็นประจำกับจักรวรรดิเดินทางอวกาศอีกแห่งหนึ่งที่เราไม่มีการติดต่อด้วย การสืบแกะรอยข้อความนี้ไปยังแหล่งกำเนิดทำให้เราสามารถจัดตั้งสายการติดต่อสื่อสารของเราเองกับกลุ่มอำนาจลึกลับรายใหม่นี้บนเวทีระดับกาแล็กซีได้สำเร็จ"
 communications_spread.1.a:0 "น่าสนใจ..."
 communications_spread.1.tooltip:1 "สร้างการสื่อสารกับ [contact_empire.GetName]"
 communications_spread.2.name:0 "การติดต่อใหม่"
 communications_spread.2.desc:2 "เราได้รับสาสน์แจ้งความประสงค์จากจักรวรรดิท่องอวกาศที่ก่อนหน้านี้ไม่เป็นที่รู้จักซึ่งเรียกตนเองว่า §H[From.GetName]§! พวกเขาอ้างว่าเรียนรู้การมีอยู่ของพวกเราจากการดักฟังช่องทางการสื่อสารของจักรวรรดิอื่นที่เราติดต่อด้วย"
 communications_spread.2.a:0 "น่าสนใจ..."
 communications_spread.2.tooltip:0 "สร้างการสื่อสารกับ [From.GetName]"

 fallen_empires.2.name:0 "[From.GetName] ลอบสังหาร [Root.GetRulerTitle]!"
 fallen_empires.2.desc:1 "ราวกับเป็นการลงทัณฑ์พวกเราที่ไม่เพียงแต่ทำสงครามกับอารยธรรมโบราณผู้เย็นชา(เสียงดังก้อง)ของ [From.GetName] แต่ยังรวมถึงการยอมจำนนต่อความพ่ายแพ้ สายลับ [From.GetAdj] ได้ปรากฏตัวข้างกาย [Root.GetRulerTitle] [rulername.GetName] หลังจากเสร็จสิ้นการเจรจาสันติภาพ\n\nพวกมันจัดการสังหาร [Root.GetRulerTitle] ของเราด้วยอาวุธที่มองไม่เห็นและความโหดเหี้ยมที่ผ่านการฝึกฝนมาอย่างดี ก่อนที่จะสลายตัวหายไปประหนึ่งไม่เคยดำรงอยู่ที่นี่มาก่อน"
 fallen_empires.2.a:0 "เราพ่ายแพ้และถูกหยามเกียรติ แต่พวกเราจะกลับมาผงาดขึ้นอีกครั้ง"
 fallen_empires.2.a.tooltip:0 "§Y[Root.GetRulerTitle] [rulername.GetName] §Rเสียชีวิต§!§!"

 fallen_empires.4.name:0 "การติดต่อจาก §H[From.GetName]§!"
 fallen_empires.4.desc:1 "เจ้าพวกสารเลวอวดดี! เจ้าคิดหรือว่าการที่ผู้ตั้งถิ่นฐาน [Root.GetSpeciesName] เข้ามาเหยียบย่ำดินแดนอันศักดิ์สิทธิ์ของเราจะพ้นสายตาไปได้? จงออกจากโลกของเราในทันที มิฉะนั้นก็จงเตรียมเผชหาญกับแสนยานุภาพกองยานของเรา!"
 fallen_empires.4.a:0 "เราไม่มีทางเลือกอื่นนอกจากต้องยอมรับ..."
 fallen_empires.4.b:0 "[Root.GetName] จะไม่ยอมถูกรังแก!"
 fallen_empires.5.name:0 "การติดต่อจาก §H[From.GetName]§!"
 fallen_empires.5.desc:1 "[Root.GetSpeciesName] เราได้เฝ้าสังเกตความพยายามอันล้มเหลวของคุณในการสร้างปัญญาประดิษฐ์(หน่วยสืบราชการลับ)และได้ข้อสรุปว่าคุณกำลังเดินไปบนเส้นทางแห่งการทำลายจิตวิญญาณของตนเอง จงละทิ้งความพยายามอันโง่เขลานี้เสียในทันที มิฉะนั้นเราจะบังคับคุณเอง"
 fallen_empires.5.a:0 "เราไม่มีทางเลือกอื่นนอกจากต้องยอมรับ..."
 fallen_empires.5.b:0 "[Root.GetName] จะไม่ยอมถูกรังแก!"
 fallen_empires.5.a.tooltip:0 "นโยบาย §H$policy_artificial_intelligence_policy$§! จะถูกเปลี่ยนเป็น §H$ai_outlawed$§!"
 fallen_empires.6.name:0 "การติดต่อจาก §H[From.GetName]§!"
 fallen_empires.6.desc:0 "คนเถื่อน [Root.GetSpeciesName]! อาชญากรรมของคุณไม่ได้รอดพ้นสายตาเราไปได้ การกดขี่ให้เป็นทาสและการเข่นฆ่าอย่างโหดเหี้ยมที่คุณกระทำอย่างไม่ล่วงรู้นั้นกำลังคุกคามอนาคตของทั้งกาแล็กซี เราขอยื่นทางเลือกให้คุณ: ยุติการกระทำอันป่าเถื่อนเหล่านี้ หรือเตรียมพร้อมเผชิญหน้ากับความชอบธรรมของเรา"
 fallen_empires.6.a:0 "เราไม่มีทางเลือกอื่นนอกจากต้องยอมรับ..."
 fallen_empires.6.b:0 "[Root.GetName] จะไม่ยอมถูกรังแก!"
 fallen_empires.6.a.tooltip:0 "นโยบาย §H$policy_slavery$§! จะถูกตั้งค่าเป็น §H$slavery_not_allowed$§!\nนโยบาย §H$policy_purge$§! จะถูกตั้งค่าเป็น §H$purge_not_allowed$§!"
 fallen_empires.7.name:0 "การติดต่อจาก §H[From.GetName]§!"
 fallen_empires.7.desc:0 "พวกโสโครก [From.GetSpeciesNamePluralInsult]! คุณได้รุกล้ำพื้นที่ของเรา! จงถอยไปทันที มิฉะนั้น เราจะล้างเผ่าพันธุ์ที่ไร้ค่าของคุณในจักรวาลแห่งนี้"
 fallen_empires.7.a:0 "เราไม่มีทางเลือกอื่นนอกจากต้องยอมรับ..."
 fallen_empires.7.b:0 "[Root.GetName] จะไม่ยอมถูกรังแก!"
 fallen_empires.8.name:0 "การติดต่อจาก §H[From.GetName]§!"
 fallen_empires.8.desc:0 "[Root.GetSpeciesName] ที่เขลาเบาปัญญา ความประพฤติไร้ความเคารพที่คุณแสดงออกต่อผู้ใหญ่จะนำความวิบัติมาสู่ตัวคุณเอง จงยอมศิโรราบต่อหน้าเราและขอขมาด้วยความสัตย์จริง แล้วเราอาจจะระงับการกวาดล้างจักรวรรดิอันไร้ค่าของคุณ"
 fallen_empires.8.desc.control: "[Root.GetSpeciesName] ผู้นำมาซึ่งความขัดแย้ง เจ้าไม่เห็นหรือว่าการเชื้อเชิญความโกลาหลเข้ามาทำให้เราต้องลงมือแทรกแซง จงสร้างความสามัคคีในทันที มิฉะนั้นเราจะเข้าจัดระเบียบให้เจ้าเอง"
 fallen_empires.8.desc.growth: "[Root.GetSpeciesName] ผู้เฉื่อยชา การปฏิเสธที่จะเติบโตและวิวัฒนาการของคุณถือเป็นการลบหลู่ชีวิตด้วยตัวมันเอง จงยอมรับฟังคำสอนของเรา มิฉะนั้นเราจะถอนรากความล้มเหลวของคุณและหว่านเมล็ดพันธุ์แห่งความก้าวหน้าด้วยตนเอง"
 fallen_empires.8.desc.war: "[Root.GetSpeciesName] ผู้ขลาดเขลา จักรวรรดิของคุณคือข้อพิสูจน์แห่งความอ่อนแออย่างแท้จริง จงเก็บความอ่อนแอนั้นไปเสีย ขออภัย และเตรียมรับมือความท้าทายของเรา - มิฉะนั้นเราจะบดขยี้คุณให้แตกสลายและแทนที่ด้วยผู้ที่เหมาะสมคู่ควรมากกว่า"
 fallen_empires.8.a:0 "เราไม่มีทางเลือกอื่นนอกจากต้องยอมรับ..."
 fallen_empires.8.a.tooltip:0 "ยุติการเป็นคู่ปรับกับ [fallen_empire_humiliator.GetName]\n[Root.GetName] สูญเสียสิทธิ์ในการอ้างสิทธิ์เหนือระบบดาวต่าง ๆ ของ [fallen_empire_humiliator.GetName]"
 fallen_empires.8.b:0 "[Root.GetName] จะไม่ยอมถูกรังแก!"
 fallen_empires.9.name:0 "การติดต่อจาก §H[From.GetName]§!"
 fallen_empires.9.desc:1 "[Root.GetSpeciesName] ผู้ลบหลู่สิ่งศักดิ์สิทธิ์! เจ้าเดินเตร่ไปตามห้องโถงของคนตายอย่างไร้ความระมัดระวัง เหยียบย่ำประวัติศาสตร์ไว้ใต้ฝ่าเท้า โดยไม่คำนึงถึงวิญญาณที่ถูกรบกวนการพักผ่อนเลย พอที! จงปล่อยให้ผู้ล่วงลับอยู่อย่างสงบ มิฉะนั้นก็จงเตรียมตอบคำถามต่อผู้ที่ยังมีชีวิตอยู่ - นั่นคือพวกเรา"
 fallen_empires.9.a:0 "เราไม่มีทางเลือกอื่นนอกจากต้องยอมรับ..."
 fallen_empires.9.b:0 "[Root.GetName] จะไม่ยอมถูกรังแก!"

 fallen_empires.100.name: "พบ $holy_planet$" # Holy World
 fallen_empires.100.A.desc: "เราไม่ใช่พวกแรกที่เดินทางมาเยือน [from.GetName] ในระบบดาว [from.solar_system.GetName] โลก [from.GetClassAdj] ดวงนี้มีความโดดเด่นอย่างมากเนื่องจากมีทรัพยากรดิบที่อุดมสมบูรณ์และยังไม่ถูกแตะต้อง แต่เรายังพบทุ่นบอกพิกัดโบราณที่ตกแต่งอย่างหรูหราซึ่งโคจรอยู่ในวงโคจรระดับสูงอีกด้วย [from.GetName] เป็นที่รู้จักกันดีในอารยธรรมท่องอวกาศโบราณบางแห่งอย่างแน่นอน ทว่าเรากลับไม่พบหลักฐานว่าเคยมีการตั้งถิ่นฐานหรือขุดเจาะแร่ที่นี่มาก่อนเลย\n\nมีทฤษฎีมากมายเกิดขึ้น แต่หลักฐานต่าง ๆ บีบให้เราต้องพิจารณาถึงอารยธรรมโบราณที่ครั้งหนึ่งเคยเคารพบูชาโลกอันเขียวชอุ่มดวงนี้ เราได้แต่เพียงคาดเดาถึงตำแหน่งที่อยู่ปัจจุบันของพวกเขา - นั่นคือการสมมติว่าพวกเขายังคงดำรงอยู่" # 'from' = planet; 'GetClassAdj' = planet class, i.e. 'ideal'
 fallen_empires.100.desc.spi_intro: "มีกลิ่นอายของสิ่งศักดิ์สิทธิ์รอบตัว [from.GetName] ในระบบดาว [from.solar_system.GetName] นักวิจัยของเราบนยาน [root.GetName] เสนอว่ามีกลิ่นอายของความเลื่อมใสอย่างลึกซึ้งเกี่ยวกับสถานที่แห่งนี้ ซึ่งได้รับการยืนยันจากการค้นพบทุ่นบอกพิกัดโบราณที่ประดับตกแต่งอย่างประณีตและหรูหราในวงโคจรระดับสูง" # 'from' = planet; 'root' = ship; 'GetClassAdj' = planet class, i.e. 'ideal'
 fallen_empires.100.A.desc.spi: "$fallen_empires.100.desc.spi_intro$\n\nเราเชื่อว่า [from.GetName] อาจเคยได้รับการเคารพบูชาในฐานะเทพเจ้า หรืออีกนัยหนึ่งอาจถูกมองว่าเป็นสถานที่ศักดิ์สิทธิ์ อุทิศให้แก่ผู้ใดนั้นเรายังไม่อาจทราบได้ในยามนี้ - แต่ทฤษฎีที่ดีที่สุดชี้ไปยังอารยธรรมที่เลื่อมใสทางจิตวิญญาณซึ่งได้เสื่อมถอยไปนานแล้ว" # 'from' = planet
 fallen_empires.100.A.desc.gestalt: "การสำรวจ [from.GetName] ของเราชี้ว่าโลกอันอุดมสมบูรณ์ในระบบดาว [from.solar_system.GetName] ดวงนี้ครั้งหนึ่งเคยเป็นหัวข้อที่ได้รับความสนใจอย่างสูงจากรูปแบบชีวิตอื่นที่ยังไม่รู้จักในขณะนี้ ทุ่นนำทางโบราณในวงโคจรระดับสูงบ่งบอกว่าดาวเคราะห์ดวงนี้เคยผ่านการมาเยือนของสิ่งมีชีวิตต่างดาว แต่ไม่มีหลักฐานการลงจอดหรือการตั้งอาณานิคมในรอบหลายศตวรรษที่ผ่านมา ในทางกลับกัน ดูเหมือนว่ามีบางสิ่งพยายามอนุรักษ์โลก [from.GetClassAdj] ใบนี้ไว้ - แต่ชะตากรรมปัจจุบันหรือที่อยู่ของหน่วยงานดังกล่าวที่ตั้งสมมติฐานไว้ยังคงลึกลับสำหรับเรา" # 'from' = planet; 'GetClassAdj' = planet class, i.e. 'ideal'
 fallen_empires.100.B.desc: "เราสงสัยว่ามีบางสิ่งที่มากกว่าทรัพยากรอันอุดมสมบูรณ์และระบบนิเวศน์ดั้งเดิมรอบตัว [from.GetName] โลก [from.GetClassAdj] ดวงนี้ในระบบดาว [from.solar_system.GetName] ยังคงไม่ถูกแตะต้องอย่างน่าประหลาด ยกเว้นทุ่นบอกพิกัดโบราณที่ส่องประกายในวงโคจรระดับสูง ลวดลายอันซับซ้อนได้รับการแกะสลักไว้บนอุปกรณ์เครื่องนี้ และแม้ว่าเราจะไม่สามารถยืนยันด้วยความมั่นใจได้: แต่เราเชื่อว่าศิลปะการออกแบบนี้มาจาก [spi_fallen_empire.GetName] ในละแวกใกล้เคียง\n\nเนื่องจากท่าทีของพวกเขาที่มีต่อเรานั้นลึกลับเกินหยั่งถึง เราทำได้เพียงแค่ตั้งสมมติฐานเกี่ยวกับเป้าหมายของ [spi_fallen_empire.GetAdj] ต่อโลกใบนี้ อย่างน้อยที่สุดก็ยังไม่มีสัญญาณระบุว่าความสนใจของเราต่อ [from.GetName] จะสร้างความขุ่นเคืองใด ๆ ให้แก่พวกเขา..." # 'from' = planet; 'GetClassAdj' = planet class, i.e. 'ideal'
 fallen_empires.100.B.desc.spi: "$fallen_empires.100.desc.spi_intro$\n\nเราเชื่อว่า [from.GetName] เคยได้รับการบูชาประหนึ่งเทพเจ้า หรืออาจถูกมองว่าเป็นสถานที่ศักดิ์สิทธิ์ รูปแบบการตกแต่งบนทุ่นชี้ชวนให้คิดว่าอาจจะเป็น [spi_fallen_empire.GetName] เองที่เคยบูชาสถานที่นี้ในอดีต แต่ยังคลุมเครือว่าในเวลานี้ยังเป็นแบบนั้นอยู่หรือไม่"
 fallen_empires.100.B.desc.gestalt: "การสำรวจ [from.GetName] ของเราชี้ให้เห็นว่าโลกอันอุดมสมบูรณ์ในระบบดาว [from.solar_system.GetName] ครั้งหนึ่งเคยเป็นหัวข้อความสนใจอย่างสูงสำหรับสิ่งมีชีวิตที่มีความก้าวหน้า - แม้จะมีความอ่อนไหวทางอารมณ์ก็ตาม ทุ่นนำทางที่ไม่ได้ใช้งานมานานในวงโคจรระดับสูงได้รับการจารึกลวดลายอันซับซ้อนคล้ายกับลวดลายของ §H[spi_fallen_empire.GetName]§!\n\nดูเหมือนว่า [spi_fallen_empire.GetSpeciesNamePlural] ครั้งหนึ่งเคยพยายามที่จะอนุรักษ์โลก [from.GetClassAdj] ใบนี้ไว้ แม้ว่าพวกเขาจะไม่ได้ให้เบาะแสว่าในยามนี้ยังคงมีเป้าหมายเช่นนั้นอยู่หรือไม่"
 fallen_empires.100.a: "เราจะเคารพสถานที่แห่งนี้ด้วยเช่นกัน"
 fallen_empires.100.b: "มันพร้อมแล้วสำหรับพวกเราที่จะเข้ายึดครอง"
 fallen_empires.100.c: "เราสามารถเจริญรุ่งเรืองที่นั่นได้"
 fallen_empires.100.d: "ไอ้พวก [spi_fallen_empire.GetSpeciesNamePluralInsult] ที่เสื่อมทราม" # returns e.g. 'parasites', 'weeds' - see 'PLANT_insult_plural_01'
 fallen_empires.100.e: "คนนอกรีตอวดดี"

 origin.12.desc: "ข้อความสำคัญเร่งด่วนจากลูกเรือของ [from.GetName] ในระบบดาว [fromfrom.solar_system.GetName]: เราได้ค้นพบ §Y[fromfrom.GetName]§! แล้ว\n\n"[fromfrom.GetName]"... นามนี้คือตำนานที่ถูกเล่าขานสืบต่อกันมาในคัมภีร์จาก [overlord.GetName] ประชากร [root.GetSpeciesNamePlural] จำนวนมากรู้ดีว่าสถานที่แห่งนี้คือสวรรค์ - ประภาคารแห่งความหวังที่สัมผัสไม่ได้ - และถึงแม้เราจะมองเห็นว่ามันเป็นสิ่งที่ศักดิ์สิทธิ์จริง ๆ แต่ในตอนนี้เราก็ต้องเผชิญกับความจริงที่ปฏิเสธไม่ได้: ดินแดนศักดิ์สิทธิ์ในตำนานนี้มีอยู่จริงในโลกความจริง\n\nทาง [overlord.GetName] ยังไม่ได้ออกมากล่าวความเห็นใด ๆ เกี่ยวกับการค้นพบของเรา แต่เราพบหลักฐานว่าพวกเขาเฝ้าจับตามองโลกใบนี้อย่างใกล้ชิดมาก พวกเขาทราบว่าเราอยู่ที่นี่ แต่เราไม่ทราบว่าจะตีความความเงียบสงบของพวกเขาอย่างไรดี" # from = Science ship, fromfrom = planet
 origin.12.a: "ช่างน่าสงสัยยิ่ง..."
 origin.12.b: "ผู้ปกครองของเราศรัทธาในตัวเราอย่างเห็นได้ชัด" # 'elders' as in respected guardians or mentors, not literal ancestors
 scion_found_holy_world: "คำประกาศดาวศักดิ์สิทธิ์"
 scion_found_holy_world_desc: "เหล่านักวิชาการทางศาสนาและผู้ปฏิบัติธรรมทั่วไปต่างปีติยินดีกับการค้นพบโลกศักดิ์สิทธิ์(โลกศักดิ์สิทธิ์) -ซึ่งครั้งหนึ่งเคยถูกบางคนหวั่นเกรงว่าจะเป็นเพียงตำนานเล่าขานเท่านั้น"
 scion_suspicious_holy_world: "ความคลางแคลงในดาวศักดิ์สิทธิ์"
 scion_suspicious_holy_world_desc: "สังคมนี้กำลังทำความเข้าใจกับความจริงที่ว่าผู้ดูแลได้ปิดบังความจริงบางประการไว้จากพวกเขา - โดยเฉพาะอย่างยิ่งการมีอยู่และตำแหน่งที่ตั้งของดาวศักดิ์สิทธิ์ที่เป็นที่รู้จัก"
 origin.13.desc.intro: "มีสิ่งอื่นที่มากกว่าทรัพยากรอันสมบูรณ์และระบบนิเวศดั้งเดิมใน [fromfrom.GetName] โลก [fromfrom.GetClassAdj] ในระบบดาว [fromfrom.solar_system.GetName] นี้ยังคงไม่ถูกแตะต้อง ยกเว้นทุ่นเครื่องหมายโบราณที่ส่องประกายโคจรในวงโคจรระดับสูง" # 'fromfrom' = planet; 'GetClassAdj' = planet class, i.e. 'ideal'
 origin.13.hasmet.desc: "$origin.13.desc.intro$\n\nความประณีตซับซ้อนอย่างยิ่งของอุปกรณ์ชิ้นนี้ใกล้เคียงกับเทคโนโลยีของ [overlord.GetAdj] ดังนั้นเราจึงเชื่อว่าทุ่นนี้น่าจะเป็นของ [spi_fallen_empire.GetName] ในบริเวณใกล้เคียง สำหรับวัตถุประสงค์นั้น: เรายังไม่สามารถยืนยันได้ร้อยเปอร์เซ็นต์ แต่ดูเหมือนว่า [spi_fallen_empire.GetSpeciesNamePlural] จะมองดาวดวงนี้เป็นดาวศักดิ์สิทธิ์"
 origin.13.notmet.desc: "$origin.13.desc.intro$\n\nความประณีตซับซ้อนอย่างยิ่งของอุปกรณ์ชิ้นนี้ใกล้เคียงกับเทคโนโลยีของ [overlord.GetAdj] แต่ดีไซน์การออกแบบนั้นแปลกตาอย่างยิ่ง ดังนั้นเราจึงต้องสมมติว่าทุ่นบอกพิกัดนี้น่าจะเป็นของบุคคลที่ร่วมสมัยเดียวกันกับพวกเขา ทั้งในอดีตหรือปัจจุบัน หากตัดสินจากสัญลักษณ์ต่าง ๆ ที่จารึกไว้รอบตัวเครื่อง: มันอาจจะกำลังทำหน้าที่ระบุที่ตั้งพิกัดศักดิ์สิทธิ์อยู่ก็เป็นได้"
 origin.13.a: "เป็นเรื่องเหลวไหลไร้สาระ"

