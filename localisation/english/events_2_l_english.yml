 opinion_angered_fallen_machine_empire:0 "ทำให้อาณาจักรจักรกลโบราณโกรธเกรี้ยว"

 fallen_empires_awakening.2.name:0 "ยักษ์หลับตื่นรู้"
 fallen_empires_awakening.2.desc:0 "มันเริ่มต้นจากความเปลี่ยนแปลงเล็กน้อยในพฤติกรรมของ §H[From.GetAdjective]§! รายงานที่กระจัดกระจายระบุว่า ยานอวกาศของพวกเขาซึ่งครั้งหนึ่งแทบจะไม่เคยมีใครได้พบนอกเขตแดนของพวกเขาเอง บัดนี้กลับมีผู้พบเห็นในระบบดาวที่อยู่ห่างไกลทั่วทั้งกาแล็กซี ยานสอดแนมที่ล้ำสมัยอย่างยิ่งได้เดินทางเยือนโลกปรักหักพังโบราณต่าง ๆ ปฏิเสธสัญญาณเรียกติดต่อทั้งหมด และหลบหนีไปเมื่อถูกโจมตี วัตถุประสงค์และภารกิจของพวกเขยังคงเป็นปริศนา... จนกระทั่งบัดนี้\n\nในขณะนี้เราทราบแล้วว่าพวก [From.GetSpeciesName] กำลังเตรียมความพร้อม โดยกู้คืนฐานข้อมูลจากบีคอนสำรวจและหน่วยสอดแนมอัตโนมัติที่พวกเขาทิ้งไว้เบื้องหลังเมื่อครั้งที่ล่าถอยกลับไปยังพรมแดนปัจจุบันของตน พวกเขากำลังรวบรวมข้อมูลสำหรับการหวนคืนสู่เวทีระนาบกาแล็กซีอีกครั้ง\n\nในเขตแดนของ [From.GetSpeciesName] กองเรือกำลังรวมตัวกัน กองทัพกำลังถูกระดมพล และโรงงานโบราณต่าง ๆ ก็ส่งเสียงคำรามตื่นขึ้นมาทำงานเป็นครั้งแรกในรอบศตวรรษ ทาง §H[From.GetName]§! กำลังทอดมองออกไปภายนอกขอบเขตพรมแดนของตนและมองไปยังกาแล็กซีในวงกว้าง\n\nในยามที่อู่ต่อเรือที่ทรุดโทรมได้รับการซ่อมแซมและปรับปรุงใหม่ และระบบที่หลับใหลของโรงหล่อยักษ์ไททัน(การค้นพบทาง ไททัน)ตื่นขึ้นมาเริ่มงาน กาแล็กซีที่เหลือก็ต่างหลงเหลือคำถามเพียงข้อเดียวเท่านั้น - ใครคือเป้าหมายแรกที่ยักษ์หลับตนนี้จะลงมือโจมตีเพื่อทวงคืนความรุ่งโรจน์ในยุคอดีตที่สูญหายไป?"
 fallen_empires_awakening.2.a:0 "สงครามระหว่างยักษ์ใหญ่..."
 fallen_empires_awakening.2.b:0 "ไอ้พวกคนแก่ที่เหี่ยวเฉา"
 fallen_empires_awakening.5.name:0 "ผู้พิทักษ์แห่งกาแล็กซี"
 fallen_empires_awakening.5.desc:1 "การอุบัติขึ้นของภัยคุกคามในระดับกาแล็กซีไม่รอดพ้นความสนใจ แม้แต่จากกลุ่มจักรวรรดิโบราณที่มักจะทำตัวห่างเหินเป็นปกติ ทั้งที่เคยแสดงความสนใจในกิจการกาแล็กซีน้อยมากในอดีต แต่ข่าวลือเรื่องภัยสยองขวัญครั้งใหม่นี้กลับกระตุ้นกิจกรรมอย่างเร่งรีบจาก §H[From.GetSpeciesName]§! ในตอนแรกมันเป็นเพียงยานตรวจการณ์ไม่กี่ลำที่ถูกส่งไปตรวจสอบระดับความร้ายแรงของสถานการณ์ แต่ต่อมาเริ่มมีรายงานกองเรือรบของ [From.GetSpeciesName] ที่กำลังระดมพลอยู่ตามพรมแดนเพื่อเตรียมการป้องกันสำหรับพายุที่กำลังมาถึง\n\nในขณะนี้ §H[From.GetName]§! ได้ออกจากการกักตัวอย่างเต็มรูปแบบเพื่อแสดงบทบาทนำในการป้องกันกาแล็กซีทั้งหมด พวกเขาได้ประกาศตนเป็นผู้นำของ §Hสหพันธ์ปกป้องกาแล็กซี(ลีกป้องกันกาแล็กซี่)§! และเชิญชวนเผ่าพันธุ์ \"ชั้นต่ำกว่า\" ทั้งหมดให้ละทิ้งข้อพิพาทส่วนตัวและร่วมมือกันขับไล่ภัยคุกคามนี้เพื่อประโยชน์สุขของสิ่งมีชีวิตตระหนักรู้ทั้งหมดในกาแล็กซี"
 fallen_empires_awakening.5.a:0 "พวกเขาจะช่วยพวกเราได้จริงหรือ?"
 fallen_empires_awakening.5.b:0 "พวกเราไม่ต้องการพวกเขา!"

 fallen_empires_awakening.11.name: "จุดสิ้นสุดของ [assimilated_fe.GetName]"
 fallen_empires_awakening.11.desc: "ส่วนเสี้ยวจักรวรรดิโบราณโบราณ §H[assimilated_fe.GetName]§! ได้ถูกหลอมรวมโดยส่วนหลักของกลุ่มจิตเหนือสำนึก(รับเชิญ)เดิมที่ทรงอิทธิพลมากกว่า บางทีสิ่งนี้น่าจะเป็นทางออกที่ดีที่สุดแล้ว"

 war_in_heaven.2.name:0 "คู่แข่งโบราณ"
 war_in_heaven.2.desc:1 "การกลับมาของ §H[FirstSleeper.GetSpeciesName]§! สู่เวทีกาแล็กซีไม่รอดพ้นจากการจับตามองโดยจักรวรรดิโบราณอื่น ๆ ในกาแล็กซีของเรา โดยเฉพาะอย่างยิ่ง §H[From.GetSpeciesName]§! ที่ดูเหมือนจะตื่นตระหนกที่สุดกับข่าวนี้ ดูเหมือนว่าสองอารยธรรมที่ทระนงตนนี้จะเป็นคู่อริโบราณต่อกัน และถึงแม้ว่าสาเหตุของความบาดหมางจะเลือนหายไปตามหน้าประวัติศาสตร์นานแล้ว แต่การลุกฮือขึ้นมาอย่างกระทันหันของ §H[FirstSleeper.GetName]§! ได้จุดชนวนความเกลียดชังเก่าให้ปะทุและกระตุ้นการโต้กลับ ส่งผลให้ §H[From.GetName]§! ได้ตื่นขึ้นมาจากภวังค์เพื่อเผชิญหน้ากับคู่แค้นเก่า โดยมีกาแล็กซีทั้งมวลเป็นสมรภูมิรบ"
 war_in_heaven.2.a:0 "สิ่งนี้จะมีความหมายต่อเราทุกคนอย่างไร?"
 war_in_heaven.4.name:0 "สงครามมหาเทพ"
 war_in_heaven.4.desc:0 "นับตั้งแต่การตื่นขึ้นของ §H[FirstSleeper.GetSpeciesName]§! และคู่แข่งโบราณของพวกเขา (§H[From.GetSpeciesName]§!) ทั้งสองขัดแย้งกัน ทะเลาะแย่งชิงอิทธิพลและต้องการพิสูจน์ความแข็งแกร่งของอีกฝ่าย สิ่งนี้ส่งผลให้เกิดการเผชิญหน้าที่รุนแรงมากขึ้นเรื่อยๆ ในที่สุดก็ปะทุขึ้นในการต่อสู้แบบเปิดระหว่างกองยาน [FirstSleeper.GetSpeciesName] และกองยาน [From.GetSpeciesName] ในระบบดาวระยะไกล\n\nความขัดแย้งได้ลุกลามจนกลายเป็นสงครามเต็มรูปแบบระหว่าง §H[FirstSleeper.GetName]§! และ §H[From.GetName]§!\n\nแต่ละฝ่ายได้ส่งตัวแทนไปยังเผ่าพันธุ์รุ่นใหม่ โดยสัญญาว่าจะให้รางวัลมากมายแก่ผู้ที่เข้าร่วมในสงครามและลงโทษอย่างร้ายแรงสำหรับผู้ที่เลือกที่จะต่อสู้กับพวกเขา การเลือกข้างในความขัดแย้งนี้จะหมายถึงการละทิ้งอิสรภาพของเรา แต่การรักษาความเป็นกลางอาจยิ่งอันตรายยิ่งกว่า เว้นแต่เราจะมีจักรวรรดิที่เป็นกลางอื่นๆที่ยืนเคียงข้างเรา"
 war_in_heaven.4.a:0 "เราจะยืนเคียงข้าง [FirstSleeper.GetName]"
 war_in_heaven.4.a.dominion.tt:0 "§Y[Root.GetName]§! กลายเป็น $preset_dominion$ ภายใต้ §Y[FirstSleeper.GetName]§!\n$war_in_heaven_dominion_text$"
