 story.115.name:0 "ฝูงอะมีบาอวกาศถูกกวาดล้าง" #kill 5 quest
 story.115.desc.phobe:0 "หลังจากได้เก็บซากอะมีบามาหลายตัวแล้ว เราจึงสามารถตรวจสอบความสัมพันธ์อันแปลกประหลาดของพวกมันกับสิ่งมีชีวิตขนาดเล็กที่อาศัยอยู่ภายในร่างกายของพวกมันได้ เท่าที่นักเอเลี่ยนชีววิทยาของ [Root.GetSpeciesAdj] ทราบ แฟลเจลลาเหล่านี้ - ซึ่งตั้งชื่อตามการเคลื่อนไหวที่เหมือนแส้ - ไม่ใช่ลูกหลานตามธรรมชาติหรือแม้แต่ปรสิต พวกมันเพียงแค่ถูกสร้างขึ้นมาจากโฮสต์เมื่อโฮสต์เติบโตเต็มที่ โดยสร้างขึ้นมาเพื่อเป็นเครื่องมือมากกว่าผลลัพธ์ของการสืบพันธุ์ เมื่อภารกิจเสร็จสิ้นพวกมันจะกลับเข้าไปในช่องของโฮสต์อะมีบาเพื่อรับคำสั่งใหม่ พวกมันทำหน้าที่เป็นระยางค์สั่งการที่ยื่นออกไปในความมืด ข้อบกพร่องที่เห็นได้อย่างชัดเจนจากปฏิกิริยาที่ล่าช้าโดยธรรมชาติของพวกมันนั้นได้รับการชดเชยด้วยจำนวนของแฟลเจลลาที่ไหลเวียนอยู่เป็นจำนวนมากของอะมีบา ตลอดจนการตอบสนองสะท้อนกลับที่รวดเร็วของแฟลเจลลาแต่ละเส้นและความสามารถในการติดตามโฮสต์อะมีบาอย่างตรงไปตรงมา\n\nอย่างไรก็ตาม ตอนนี้เราสามารถกำจัดพวกมันได้เก่งขึ้นแล้ว"
 story.115.desc.milit:0 "จากการรวบรวมซากสิ่งมีชีวิตมาหลายตัว ทำให้เราสามารถศึกษาความสัมพันธ์อันน่าสนใจของอะมีบาอวกาศกับสิ่งมีชีวิตขนาดเล็กที่พวกมันเก็บไว้ในตัวได้ เท่าที่นักเอเลี่ยนชีววิทยาของ [Root.GetSpeciesAdj] วิเคราะห์ได้ แฟลเจลลาเหล่านี้ - ซึ่งตั้งชื่อตามการเคลื่อนไหวแบบแส้ - ไม่ใช่ลูกหลานที่แท้จริงหรือแม้แต่ปรสิต พวกมันเพียงงอกออกมาจากร่างโฮสต์เมื่อโฮสต์โตเต็มที่ เพื่อทำหน้าที่เป็นเครื่องมือมากกว่ากระบวนการสืบพันธุ์ ในส่วนที่ควรจะเป็นสมอง - เมื่อพิจารณาจากการเคลื่อนไหวที่ซับซ้อนและการตอบโต้ระหว่างแฟลเจลลาด้วยกัน - แฟลเจลลากลับมีศูนย์ประมวลผลต่อมที่ซับซ้อนแทน ศูนย์นี้จะถอดรหัสอินพุตหรือคำสั่งในรูปแบบของอาร์เอ็นเอที่หลั่งโดยอะมีบาและรับผ่านตัวรับใต้ผิวหนังของแฟลเจลลา เมื่อทำหน้าที่เสมือนระยางค์ที่ขาดออกจากร่างกายเสร็จสิ้นแล้ว พวกมันจะกลับเข้าสู่ช่องว่างของอะมีบาโฮสต์เพื่อรับคำสั่งใหม่ ข้อเสียเปรียบที่เห็นได้ชัดจากเวลาการตอบสนองที่ล่าช้าโดยธรรมชาตินั้นถูกชดเชยด้วยจำนวนการเคลื่อนไหวของแฟลเจลลาของตัวแม่ รวมถึงปฏิกิริยาสะท้อนกลับที่รวดเร็วของแต่ละเส้นและความสามารถในการติดตามตำแหน่งตัวแม่ ความชำนาญของอะมีบาอวกาศในการต่อสู้ในอวกาศลึกส่วนใหญ่มาจากการส่งแฟลเจลลาออกไปปฏิบัติงานอย่างต่อเนื่อง ซึ่งเป็นสิ่งที่กองกำลังของเราสามารถเรียนรู้ได้อย่างมาก"
 story.115.desc:0 "หลังจากสังหารสิ่งมีชีวิตตัวที่สี่ได้สำเร็จ ซากอะมีบาอวกาศที่สมบูรณ์ก็ถูกนำมาประกอบขึ้นใหม่ที่เมืองหลวง [Root.Capital.GetName] ของ [Root.GetName] ตอนนี้เรากำลังเริ่มทำความเข้าใจความจริงที่ซ่อนอยู่ของสิ่งมีชีวิตเหล่านี้ และข้อมูลกำลังถูกส่งต่อไปยังหน่วยงานที่เหมาะสมในฝ่ายบริหารของ [Root.GetSpeciesAdj]\n\nการค้นพบที่มีประโยชน์ที่สุดในขณะนี้เกี่ยวข้องกับเยื่อหุ้มผิวหนังของอะมีบาอวกาศ พวกมันจะดูดซับและเมตาบอลิซึมรังสีคอสมิกที่หลากหลายผ่านกระบวนการทางต่อมที่ซับซ้อน ซึ่งดูเหมือนว่าจะได้พลังงานบางส่วนจากรังสีเหล่านั้น"
 story.115.a.phobe:0 "ถูกต้องชอบธรรมยิ่ง" # emp mod, +20% dmg vs amoebas
 story.115.b.milit:0 "เช่นนั้นเราจะต้องเรียนรู้" # emp mod, improved strike craft
 story.115.c:0 "ความรู้นี้สามารถนำไปใช้ประโยชน์ได้เป็นอย่างดี" # emp mod, +5% energy

 story.201.name:0 "เอนทิตีผลึกแก้ว"
 story.201.desc.base:0 "[This.Owner.GetResearchers] ของเราได้เสร็จสิ้นการสืบสวนรายงานเกี่ยวกับวัตถุคล้ายผลึกแก้วที่ลอยอยู่อย่างอิสระซึ่งพบในระบบดาว [This.System.GetName] แล้ว การค้นพบของพวกเขานั้นน่าตื่นตะลึงมาก"
 story.201.desc.phile:1 "$story.201.desc.base$\n\nวัตถุขนาดเท่ากับยานอวกาศและดาวบริวารที่มีลักษณะเหมือนผลึกแก้วซึ่งมีขนาดเล็กกว่าเล็กน้อยในตอนแรกดูเหมือนจะแน่นิ่ง แต่การเปลี่ยนทิศทางอย่างกะทันหันเมื่อเทียบกับยานของเราและสัญญาณพลังงานใหม่ที่ปรากฏขึ้นจากภายในปริซึมบ่งชี้ว่าพวกมันอาจมีชีวิตอยู่ - ซึ่งเป็นเรื่องที่น่าตื่นเต้นมากอย่างแน่นอน แต่ก็ควรเข้าใกล้ด้วยความระมัดระวัง\n\nเหล่านักวิทยาศาสตร์ที่เก่งที่สุดของเราพร้อมที่จะศึกษาเอนทิตีเหล่านี้แล้ว"
 story.201.desc.phobe:1 "$story.201.desc.base$\n\nวัตถุขนาดเท่ากับยานอวกาศและดาวบริวารที่มีลักษณะเหมือนผลึกแก้วซึ่งมีขนาดเล็กกว่าเล็กน้อยในตอนแรกดูเหมือนจะแน่นิ่ง แต่การเปลี่ยนทิศทางอย่างกะทันหันเมื่อเทียบกับยานของเราและสัญญาณพลังงานใหม่ที่ปรากฏขึ้นจากภายในปริซึมระบุว่าควรจัดพวกมันเป็นอันตรายและเข้าใกล้ด้วยความระมัดระวังอย่างยิ่ง\n\nเราควรส่งกองยานไปประเมินความสามารถในการโจมตีของผลึกเหล่านี้ หากพวกมันมีอยู่ และทำลายพวกมันเสียหากพวกมันเป็นภัยคุกคาม"
 story.201.desc.pacif:1 "$story.201.desc.base$\n\nวัตถุขนาดเท่ากับยานอวกาศและดาวบริวารที่มีลักษณะเหมือนผลึกแก้วซึ่งมีขนาดเล็กกว่าเล็กน้อยในตอนแรกดูเหมือนจะแน่นิ่ง แต่การเปลี่ยนทิศทางอย่างกะทันหันเมื่อเทียบกับยานของเราและสัญญาณพลังงานใหม่ที่ปรากฏขึ้นจากภายในปริซึมระบุว่าควรจัดพวกมันเป็นอันตรายและเข้าใกล้ด้วยความระมัดระวัง\n\nเนื่องจากเราไม่ต้องการเสี่ยงต่อการเกิดความขัดแย้งกับสิ่งลึกลับปริซึมเหล่านี้ เราจึงควรจัดตั้งการเฝ้าระวังระยะไกลและสังเกตการณ์พวกมันจากเมืองหลวงแทน"
 story.201.desc.spiri:1 "$story.201.desc.base$\n\nวัตถุขนาดเท่ากับยานอวกาศและดาวบริวารที่มีลักษณะเหมือนผลึกแก้วซึ่งมีขนาดเล็กกว่าเล็กน้อยในตอนแรกดูเหมือนจะแน่นิ่ง แต่การเปลี่ยนทิศทางอย่างกะทันหันเมื่อเทียบกับยานของเราและสัญญาณพลังงานใหม่ที่ปรากฏขึ้นจากภายในปริซึมบ่งชี้ว่าพวกมันกำลังตอบสนองต่อการมีอยู่ของยานจาก [Root.Owner.GetSpeciesAdj]\n\nธรรมชาติและที่มาของผลึกเหล่านี้ยังคงเป็นปริศนาในขณะนี้ แต่มีบางอย่างในรูปร่างและมุมมองที่บริสุทธิ์ของพวกมันที่สะท้อนถึงจิตวิญญาณของ [Root.Owner.GetSpeciesAdj] ซึ่ง [Root.Owner.GetName] ควรจะถอยกลับมาหนึ่งก้าวและเฝ้าดูจากระยะห่างที่เหมาะสม"
 story.201.desc.milit:1 "$story.201.desc.base$\n\nวัตถุขนาดเท่ากับยานอวกาศและดาวบริวารที่มีลักษณะเหมือนผลึกแก้วซึ่งมีขนาดเล็กกว่าเล็กน้อยในตอนแรกดูเหมือนจะแน่นิ่ง แต่การเปลี่ยนทิศทางอย่างกะทันหันเมื่อเทียบกับยานของเราและสัญญาณพลังงานใหม่ที่ปรากฏขึ้นจากภายในปริซึมระบุว่าควรจัดพวกมันเป็นอันตรายและเข้าใกล้ด้วยความระมัดระวัง\n\nแม้ว่าเราจะไม่พบการประยุกต์ใช้ในการทำศึกจากพวกมัน การศึกษาผลึกที่แตกเป็นเสี่ยง ๆ ก็ย่อมให้ผลลัพธ์ที่น่าสนใจอย่างแน่นอน"
 story.201.desc:1 "$story.201.desc.base$\n\nวัตถุขนาดเท่ากับยานอวกาศและดาวบริวารที่มีลักษณะเหมือนผลึกแก้วซึ่งมีขนาดเล็กกว่าเล็กน้อยในตอนแรกดูเหมือนจะแน่นิ่ง แต่การเปลี่ยนทิศทางอย่างกะทันหันเมื่อเทียบกับยานของเราและสัญญาณพลังงานใหม่ที่ปรากฏขึ้นจากภายในปริซึมระบุว่าควรจัดพวกมันเป็นอันตรายและเข้าใกล้ด้วยความระมัดระวัง\n\nเราสามารถเลือกที่จะเข้าปะทะกับวัตถุที่อาจเป็นอันตรายเหล่านี้โดยตรง หรือตั้งด่านเฝ้าระวังระยะไกลเพื่อสังเกตการณ์พวกมันจากระยะที่ปลอดภัยได้"
 story.201.a:0 "ออกโครงการพิเศษสำหรับการศึกษาผลึกแก้วจากระยะไกล"
 story.201.b:0 "เราหวังว่ากองยานของเราจะบดขยี้พวกมันให้แตกสลาย"

 story.205.name:0 "เอนทิตีผลึกแก้วไม่มีวันแตกสลาย"
 story.205.desc.phile:1 "เอนทิตีผลึกแก้ว(สายรัด) -ซึ่งชื่อนี้เป็นการประนีประนอมระหว่างฝ่ายที่แข่งขันกันของนักเอเลี่ยนชีววิทยาและนักเอเลี่ยนธรณีวิทยาบน [Root.Capital.GetName] - มีชีวิตอยู่อย่างแน่นอน\n\nสมาชิกอนุรักษ์นิยมบางคนของกลุ่มชนชั้นนำทางวิชาการ [Root.GetSpeciesAdj] แย้งว่าพวกมันเป็นเพียง \"สสารอนินทรีย์ซิลิเกตที่มีความเคลื่อนไหว\" และแทบไม่มีความเกี่ยวข้องกับสิ่งมีชีวิตทางชีวภาพเลย\n\nประชากรส่วนใหญ่ของ [Root.GetName] ปฏิเสธมุมมองที่ถอยหลังเข้าคลองนั้น และหันไปมองทัศนียภาพใหม่ที่น่าสนใจซึ่งเป็นตัวแทนของเอนทิตีผลึกแก้วแทน น่าเสียดายเล็กน้อยที่พวกมันเป็นสิ่งมีชีวิตที่รักสันโดษ คริสตัลโซเวอเรน(พระบาทสมเด็จพระเจ้าอยู่หัว)แต่ละกลุ่มแทบจะไม่พบเห็นพร้อมกับเซนทิเนล(เสียงม้า)มากกว่าหนึ่งตัวและเอนทิตีโคฮอร์ต(เสียงร้องเพลง)ขนาดเล็กกว่า นอกเหนือจากความจริงที่ว่าโคฮอร์ตและเซนทิเนลอยู่ภายใต้การปกครองของโซเวอเรนในกลุ่มอย่างชัดเจน ความแตกต่างเล็ก ๆ น้อย ๆ ของความสัมพันธ์เชิงโครงสร้างสังคมของพวกมันยังคงเป็นปริศนาสำหรับเรา - ซึ่งนั่นไม่ได้หยุดยั้งความพยายามที่จะศึกษากลไกเหล่านี้บน [Root.Capital.GetName]\n\nเอนทิตีเหล่านี้ดูเหมือนจะไม่ผสมพันธุ์กัน และเรายังไม่เคยสังเกตพบผลึกแก้วที่สามารถระบุได้ว่ามีอายุมากกว่าหรือน้อยกว่าตัวอื่น ๆ เลย ตรงกันข้ามกับสมมติฐานในช่วงแรก การเปลี่ยนสีระหว่างเอนทิตีผลึกแก้วแต่ละตัวดูเหมือนจะไม่เกี่ยวข้องกับอายุของมัน แต่เกี่ยวข้องกับประจุไฟฟ้าสะสมภายใน - ซึ่งสามารถปลดปล่อยออกมาได้อย่างรุนแรง - และดูเหมือนว่าความผันผวนชั่วคราวในประจุนี้จะส่งผลต่อคุณสมบัติการหักเหแสงของคริสตัล"
 story.205.desc:0 "เอนทิตีผลึกแก้ว(สายรัด) -ซึ่งชื่อนี้เป็นการประนีประนอมระหว่างฝ่ายที่แข่งขันกันของนักเอเลี่ยนชีววิทยาและนักเอเลี่ยนธรณีวิทยาบน [Root.Capital.GetName] - น่าจะมีชีวิตอยู่\n\nชื่อก่อนหน้านี้และบางทีอาจจะอธิบายลักษณะได้ดีกว่าคือ \"สสารอนินทรีย์ซิลิเกตที่มีความเคลื่อนไหว\" เนื่องจากพวกมันมีความคล้ายคลึงกับชีวิตทางชีวภาพน้อยมาก พวกมันเป็นสิ่งมีชีวิตสันโดษ คริสตัลโซเวอเรน(พระบาทสมเด็จพระเจ้าอยู่หัว)แต่ละกลุ่มแทบไม่ปรากฏตัวพร้อมกับเซนทิเนล(เสียงม้า)และโคฮอร์ต(เสียงร้องเพลง)ขนาดเล็ก นอกเหนือจากการที่โคฮอร์ตและเซนทิเนลอยู่ภายใต้คริสตัลโซเวอเรนอย่างเห็นได้ชัด ความแตกต่างเล็กน้อยในระดับความสัมพันธ์เชิงสังคมของเอนทิตีผลึกแก้วก็ยังเป็นสิ่งที่เราไม่เข้าใจ\n\nเอนทิตีเหล่านี้ดูเหมือนจะไม่ผสมพันธุ์กัน และเรายังไม่เคยพบผลึกแก้วใดที่มีอายุแตกต่างจากผลึกแก้วตัวอื่นอย่างเห็นได้ชัด ตรงข้ามกับสมมติฐานเริ่มแรก การเปลี่ยนเฉดสีระหว่างเอนทิตีผลึกแก้วเดี่ยวดูเหมือนจะไม่เกี่ยวข้องกับอายุ แต่เกี่ยวข้องกับประจุไฟฟ้าภายในที่แฝงอยู่ - ซึ่งสามารถปลดปล่อยออกมาได้อย่างรุนแรง - และดูเหมือนว่าความผันผวนชั่วคราวของประจุนี้จะทำให้คุณสมบัติการหักเหแสงของคริสตัลเปลี่ยนไป"
 story.205.desc.pacif:0 "เอนทิตีผลึกแก้ว(สายรัด) -ซึ่งชื่อนี้เป็นการประนีประนอมระหว่างฝ่ายที่แข่งขันกันของนักเอเลี่ยนชีววิทยาและนักเอเลี่ยนธรณีวิทยาบน [Root.Capital.GetName] - น่าจะมีชีวิตอยู่\n\nชื่อก่อนหน้านี้และบางทีอาจจะอธิบายลักษณะได้ดีกว่าคือ \"สสารอนินทรีย์ซิลิเกตที่มีความเคลื่อนไหว\" เนื่องจากพวกมันมีความคล้ายคลึงกับชีวิตทางชีวภาพน้อยมาก พวกมันเป็นสิ่งมีชีวิตสันโดษ คริสตัลโซเวอเรน(พระบาทสมเด็จพระเจ้าอยู่หัว)แต่ละกลุ่มแทบไม่ปรากฏตัวพร้อมกับเซนทิเนล(เสียงม้า)และโคฮอร์ต(เสียงร้องเพลง)ขนาดเล็ก นอกเหนือจากการที่โคฮอร์ตและเซนทิเนลอยู่ภายใต้คริสตัลโซเวอเรนอย่างเห็นได้ชัด ความแตกต่างเล็กน้อยในระดับความสัมพันธ์เชิงสังคมของเอนทิตีผลึกแก้วก็ยังเป็นสิ่งที่เราไม่เข้าใจ\n\nเอนทิตีเหล่านี้ดูเหมือนจะไม่ผสมพันธุ์กัน และเรายังไม่เคยพบผลึกแก้วใดที่มีอายุแตกต่างจากผลึกแก้วตัวอื่นอย่างเห็นได้ชัด ตรงข้ามกับสมมติฐานเริ่มแรก การเปลี่ยนเฉดสีระหว่างเอนทิตีผลึกแก้วเดี่ยวดูเหมือนจะไม่เกี่ยวข้องกับอายุ แต่เกี่ยวข้องกับประจุไฟฟ้าภายในที่แฝงอยู่ และดูเหมือนว่าความผันผวนชั่วคราวของประจุนี้จะทำให้คุณสมบัติการหักเหแสงของคริสตัลเปลี่ยนไป เอนทิตีผลึกแก้วมีความสามารถในการปลดปล่อยประจุไฟฟ้ารุนแรงใส่เป้าหมายเฉพาะเจาะจง และโชคร้ายที่พวกมันมักเลือกทำเช่นนั้นมากกว่าปล่อยให้วัตถุแปลกปลอมผ่านไปโดยไม่ได้รับอันตราย"
 story.205.desc.spiri:0 "เอนทิตีผลึกแก้ว(สายรัด) -ซึ่งชื่อนี้เป็นการประนีประนอมระหว่างฝ่ายที่แข่งขันกันของนักเอเลี่ยนชีววิทยาและนักเอเลี่ยนธรณีวิทยาบน [Root.Capital.GetName] - ดำรงอยู่เหนือแนวคิดพื้นฐานอย่างชีวิตและความตาย ผู้เผยแพร่ปัญญาที่ไร้จินตนาการบางคนบน [Root.Capital.GetName] เรียกพวกมันว่า \"สสารอนินทรีย์ซิลิเกตที่มีความเคลื่อนไหว\" โดยอ้างว่าตัวอย่างเหล่านั้นแม้จะดูแปลกประหลาด แต่ก็ยังอยู่ภายใต้กฎธรรมชาติอันไร้ความรู้สึกแบบเดียวกันกับที่อ้างว่าปกครองพวกเราทุกคน\n\nไม่ว่าในกรณีใด เอนทิตีผลึกแก้วเป็นสิ่งมีชีวิตที่รักสันโดษและสง่างาม คริสตัลโซเวอเรน(พระบาทสมเด็จพระเจ้าอยู่หัว)แต่ละกลุ่มมักไม่ค่อยอยู่ร่วมกับบริวารมากกว่าสองตัว ได้แก่ เซนทิเนล(เสียงม้า)และคริสตัลโคฮอร์ต(เสียงร้องเพลง)ขนาดเล็กกว่า เอนทิตีเหล่านี้ไม่ได้ผสมพันธุ์กัน และไม่มีตัวใดปรากฏอายุมากกว่าหรือน้อยกว่าตัวอื่น ๆ เลย - พวกมันทั้งหมดผุดขึ้นมาจากยุคสมัยในอดีตที่ไร้ราคี การเปลี่ยนเฉดสีระหว่างโซเวอเรนเดี่ยวที่สังเกตพบดูเหมือนจะเกี่ยวข้องกับประจุไฟฟ้าสะสมภายใน - ซึ่งสามารถปลดปล่อยออกมาได้อย่างรุนแรง - และดูเหมือนว่าความผันผวนชั่วคราวในประจุนี้จะส่งผลต่อคุณสมบัติการหักเหแสงของคริสตัล"
 story.205.desc.gesta:0 "เอนทิตีผลึกแก้ว(สายรัด)น่าจะมีชีวิตอยู่\n\nชื่อที่บางทีอาจจะบ่งชี้รายละเอียดได้ดีกว่าก็คือ \"สสารอนินทรีย์ซิลิเกตที่มีความเคลื่อนไหว\" เนื่องจากพวกมันมีความร่วมกันน้อยมากกับชีวิตทางชีวภาพหรือชีวิตประดิษฐ์แบบดั้งเดิม\n\nเอนทิตีเหล่านี้ดูเหมือนจะไม่ผสมพันธุ์กัน และเรายังไม่เคยพบผลึกแก้วใดที่มีอายุแตกต่างจากผลึกแก้วตัวอื่นอย่างเห็นได้ชัด ตรงข้ามกับสมมติฐานเริ่มแรก การเปลี่ยนเฉดสีระหว่างเอนทิตีผลึกแก้วเดี่ยวดูเหมือนจะไม่เกี่ยวข้องกับอายุ แต่เกี่ยวข้องกับประจุไฟฟ้าภายในที่แฝงอยู่ - ซึ่งสามารถปลดปล่อยออกมาได้อย่างรุนแรง - และดูเหมือนว่าความผันผวนชั่วคราวของประจุนี้จะทำให้คุณสมบัติการหักเหแสงของคริสตัลเปลี่ยนไป"
 story.205.a:0 "ความรู้นี้จะเป็นประโยชน์อย่างยิ่งต่อวงการวิทยาศาสตร์อย่างแน่นอน"
 story.205.a.tooltip:1 "เพิ่มตัวดัดแปลง §Yเลนส์ปริซึม§! ให้แก่จักรวรรดิของเรา:\n£physics£ §G+10%§!"
 story.205.b:0 "เราจะหาทางใช้ประโยชน์จากข้อมูลนี้"
 story.205.b.tooltip:1 "เพิ่มตัวดัดแปลง §Yโซนาร์คริสตัล§! ให้แก่จักรวรรดิของเรา:\nใช้พลังงาน £energy£ §Y30§! พลังงานเพื่อ §Yสำรวจทันที§! ระบบดาวใด ๆ ที่มีเอนทิตีผลึกแก้วอาศัยอยู่เมื่อเดินทางเข้าไป"
 story.205.aa:0 "การประยุกต์ใช้ในทางการทหารคืออะไรบ้าง?"
 story.205.bb:0 "ฟังดูน่าจะมีประโยชน์"

 story.210.name:0 "เอนทิตีผลึกแก้วแตกเป็นเสี่ยง"
 story.210.desc.milit:0 "เอนทิตีผลึกแก้ว(สายรัด) -ชื่อเรียกใหม่ที่สะท้อนถึงสถานะของการเป็นสสารซิลิเกตที่เคลื่อนไหวได้ดีกว่า - เป็นศัตรูที่ทนทานและก้าวร้าวอย่างยิ่ง\n\nการปะทะกันของเราช่วยให้เราชี้จุดอ่อนเชิงโครงสร้างซึ่งตามทฤษฎีแล้วน่าจะเป็นจุดร่วมของเอนทิตีผลึกแก้วทุกตัว นี่เป็นเรื่องน่ายินดีเนื่องจากกองยานของเราต้องเข้าปะทะกับชิ้นส่วนตัวอย่างอีกหลายชิ้นหากเราต้องการเรียนรู้เพิ่มเติมเกี่ยวกับปริซึมลึกลับเหล่านี้ สิ่งที่เราทราบคือการเปลี่ยนแปลงของระดับความก้าวร้าวและการผลิตพลังงานภายในที่เป็นตัวขับเคลื่อนการปลดปล่อยประจุอาวุธจะเกิดขึ้นพร้อมกับการหักเหของแสงที่เปลี่ยนไปในคริสตัล\n\nโดยพื้นฐานแล้ว มีความเป็นไปได้สูงที่ยานของ [Root.GetSpeciesAdj] จะได้พบกับเอนทิตีผลึกแก้วหลากสีในที่สุด และควรเตรียมพร้อมสำหรับการรับมือกับพฤติกรรมและความสามารถในการต่อสู้ที่แตกต่างกันออกไป"
 story.210.desc.mater:0 "เอนทิตีผลึกแก้ว(สายรัด) -ถูกกำหนดชื่อใหม่หลังจากประจักษ์ชัดว่าพวกมันมีความคล้ายคลึงกับสัตว์มากกว่าแร่ธาตุล้ำค่า - มีพฤติกรรมก้าวร้าวและเป็นศัตรูกับยานของ [Root.GetSpeciesAdj] โดยตรง บางทีพวกมันอาจมองกองยานของเราเป็น \"เอนทิตีโลหะ\" (ความซับซ้อน)ที่ต้องขับไล่ออกจากดินแดนผลึกแก้วด้วยวิธีการใด ๆ ที่จำเป็น\n\nการเข้าปะทะช่วยให้เราชี้จุดอ่อนเชิงโครงสร้างซึ่งตามทฤษฎีแล้วน่าจะเป็นจุดร่วมของเอนทิตีผลึกแก้วทุกตัว นอกจากนี้ การเปลี่ยนแปลงในระดับความก้าวร้าวและการกำเนิดพลังงานภายใน - ที่ขับเคลื่อนการโจมตีปลดปล่อยประจุ - จะเกิดขึ้นควบคู่ไปกับคุณสมบัติการหักเหแสงของคริสตัลที่แปรเปลี่ยนไป\n\nโดยเนื้อแท้แล้ว คาดว่ายานของ [Root.GetSpeciesAdj] จะได้พบกับเอนทิตีผลึกแก้วที่มีสีสันแตกต่างกันไปในอนาคต และควรเตรียมรับมือความแตกต่างด้านพฤติกรรมและศักยภาพการสู้รบ\n\nเราไม่มีทางเลือกอื่นนอกจากต้องปะทะกับเอนทิตีผลึกแก้วต่อไปในการรบโดยตรงหากต้องการเรียนรู้เพิ่มเติมเกี่ยวกับพวกมัน แม้ว่าเราจะไม่มีทางเปลี่ยนพวกมันเป็นทรัพยากรธรรมชาติได้ง่าย ๆ แต่แน่นอนว่า [Root.GetName] ย่อมไม่ยินยอมที่จะกลับไปมือเปล่า"
 story.210.desc:0 "เอนทิตีผลึกแก้ว(สายรัด) -ซึ่งได้รับการเปลี่ยนชื่ออย่างไม่เป็นทางการหลังจากเห็นได้ชัดว่าพฤติกรรมของผลึกเหล่านี้เป็นพฤติกรรมจริง ๆ ไม่ใช่กระบวนการทางแร่ธาตุที่คลุมเครือ - มีความก้าวร้าวและเป็นศัตรูกับยานของ [Root.GetSpeciesAdj] โดยตรง บางทีพวกมันอาจมองกองยานของเราเป็น \"เอนทิตีโลหะ\" (ความซับซ้อน)ที่ต้องถูกขับไล่ออกจากดินแดนผลึกแก้วด้วยวิธีการใด ๆ ที่จำเป็น\n\nการปะทะของเราช่วยให้เราชี้จุดอ่อนโครงสร้างซึ่งตามทฤษฎีแล้วน่าจะเป็นจุดร่วมของเอนทิตีผลึกแก้วทุกตัว นอกจากนี้ การเปลี่ยนแปลงของระดับความก้าวร้าวและการผลิตพลังงานภายใน - ที่ขับเคลื่อนการปลดปล่อยพลังงานของพวกมัน - จะเกิดร่วมกับการเปลี่ยนวิธีที่ผลึกหักเหแสง\n\nโดยสรุป มีความเป็นไปได้สูงที่ยานของ [Root.GetSpeciesAdj] จะได้เผชิญหน้ากับเอนทิตีผลึกแก้วสีอื่น ๆ ในอนาคต และควรเตรียมพร้อมสำหรับความแตกต่างทางพฤติกรรมและขีดความสามารถการสู้รบ\n\nเนื่องจากการมีปฏิสัมพันธ์อย่างสันติในขณะนี้ดูเหมือนจะเป็นไปไม่ได้ เราจึงไม่มีทางเลือกอื่นนอกจากต้องปะทะกับเอนทิตีผลึกแก้วในการต่อสู้โดยตรงต่อไปหากเราต้องการจะเรียนรู้เพิ่มเติมเกี่ยวกับพวกมัน"
 story.210.desc.gesta:0 "เอนทิตีผลึกแก้ว(สายรัด)มีความก้าวร้าวและเป็นศัตรูกับเราและยานของเราอย่างโจ่งแจ้ง บางทีพวกมันอาจจะคิดว่ากองยานของเราเป็น \"เอนทิตีโลหะ\" (ความซับซ้อน)ที่สมควรจะขับไล่ออกจากอาณาเขตผลึกแก้วด้วยหนทางทุกอย่างที่จำเป็น\n\nการเข้าปะทะของเราช่วยให้ระบุจุดอ่อนของโครงสร้างได้สำเร็จ ซึ่งตามทฤษฎีควรจะเป็นจุดอ่อนร่วมกันของเอนทิตีผลึกแก้วทั้งหมด นอกจากนี้ การเปลี่ยนระดับความก้าวร้าวและพลังงานที่ปั่นอยู่ภายใน - ซึ่งส่งผลต่อการคายประจุพลังงานออกมาราวกับอาวุธ - ยังดำเนินไปพร้อมกับการเปลี่ยนแปลงของแสงที่หักเหผ่านตัวผลึกแก้ว\n\nโดยส่วนใหญ่แล้ว คาดว่ายานของ [Root.GetSpeciesAdj] จะได้พบกับเอนทิตีผลึกแก้วที่มีสีสันอื่น ๆ ในอนาคต และเราควรเตรียมตัวรับความต่างทางพฤติกรรมและขีดความสามารถในการสู้รบ\n\nเนื่องจากการติดต่อสื่อสารกันอย่างประนีประนอมในตอนนี้นั้นเป็นสิ่งที่เป็นไปไม่ได้ เราจึงแทบไม่มีทางเลือกอื่นนอกจากการเข้าชนกับเอนทิตีผลึกแก้วในการรบแบบตรง ๆ ต่อไป หากเรามุ่งหวังที่จะเรียนรู้รายละเอียดเพิ่มเติม"
 story.210.a:0 "รับทราบ"

 story.215.name:0 "เอนทิตีผลึกแก้วถูกบดขยี้"
 story.215.desc.milit:0 "กองยานของ [Root.GetName] ทิ้งไว้เพียงผลึกแก้วที่ถูกบดขยี้ในทุกเส้นทางที่พวกเขาแล่นผ่าน\n\nธรรมชาติที่แท้จริงของเอนทิตีผลึกแก้วอาจจะยังคงเป็นปริศนาสำหรับเราตลอดไป แต่มันสำคัญอย่างไรล่ะ?\n\nกองกำลังของ [Root.GetSpeciesAdj] ในตอนนี้มีทักษะระดับสูงในการทำลายล้างปริซึมเหล่านี้ และในตลอดการรบที่ผ่านมาเราก็ได้ค้นพบวิธีการปรับแต่งอาวุธของเราให้อรงขึ้น"
 story.215.desc.mater:0 "หลังจากการทำลายล้างตัวอย่างผลึกคริสตัลหลายชิ้นและเก็บตัวอย่างกว่าหลายพันชิ้น ในที่สุดวิศวกรของ [Root.GetSpeciesAdj] ก็ได้คิดค้นกระบวนการที่คุ้มค่าในการแปรสภาพเศษซากของเอนทิตีผลึกแก้วให้เป็นวัสดุที่ใช้งานได้จริง\n\nยังคงต้องรอดูต่อไปว่าสิ่งนี้จะช่วยชดเชยต้นทุนของการปะทะกับผลึกและการปลดปล่อยพลังงานของพวกมันได้จริงหรือไม่ แต่อย่างไรก็ถือเป็นชัยชนะของภาคอุตสาหกรรม"
 story.215.desc:0 "แม้จะมีการปะทะกันบ่อยครั้ง เอนทิตีผลึกแก้วก็ยังคงมีความลึกลับเหมือนเดิม พวกมันดูเหมือนจะไม่ผสมพันธุ์กัน และยากที่จะจินตนาการว่าโพรงคริสตัลขนาดใหญ่ในอวกาศจะสามารถสร้างสิ่งเหล่านี้ขึ้นมาเองตามธรรมชาติได้\n\nเราได้พบประโยชน์บางอย่างจากเศษผลึกแก้วที่ถูกทำลาย แต่กังวลว่าบางสิ่ง เช่น ความจริงเกี่ยวกับธรรมชาติที่แท้จริงของพวกมันนั้น เป็นสิ่งที่เราไม่อาจล่วงรู้ได้โดยสิ้นเชิง"
 story.215.desc.gesta:0 "แม้จะเกิดการประทะกันอยู่บ่อยครั้ง เอนทิตีผลึกแก้วก็ยังคงมีความลึกลับเป็นปริศนาเหมือนเช่นเดิม พวกมันดูเหมือนจะไม่ผสมพันธุ์กัน และยากที่จะจินตนาการว่าโพรงหินคริสตัลในอวกาศจะสร้างสิ่งเหล่านั้นขึ้นมาเองตามธรรมชาติ\n\nเราพบวิธีใช้ประโยชน์บางประการจากชิ้นส่วนที่แตกหักของเอนทิตีผลึกแก้ว แต่ก็กังวลว่าความจริงของธรรมชาติที่แท้จริงของพวกมันนั้นเป็นสิ่งที่เราไม่สามารถทำความเข้าใจได้โดยสิ้นเชิง"
 story.215.a.milit:0 "เหนือกว่าความจริง คือชัยชนะ"
 story.215.b.mater:0 "เราต้องใช้ประโยชน์สูงสุดจากสิ่งต่าง ๆ ที่จักรวาลมอบให้"
 story.215.b.mater.tooltip:0 "ให้สิทธิ์เข้าถึงบัญญัติจักรวรรดิ §Yผลตอบแทนผลึกแก้วขั้นสูง§!(รางวัลคริสตัลยอดเยี่ยม)"
 story.215.c:0 "น่าเสียดายยิ่ง"
 story.215.c.tooltip:0 "ให้สิทธิ์เข้าถึงบัญญัติจักรวรรดิ §Yผลตอบแทนผลึกแก้ว§! (Crystal Bounty)"
 story.219.name:0 "โซนาร์ผลึกแก้ว"
 story.219.desc:0 "[From.GetFleetName] ได้พบเอนทิตีผลึกแก้วในระบบดาว [From.From.GetName]\n\nด้วยการใช้พลังงานสำรองบางส่วน ยานของเราสามารถสร้างคลื่นความถี่สูงที่มีความเข้มข้นแต่ปลอดภัยยิงเข้าใส่เอนทิตีผลึกแก้วได้ โดยเอนทิตีจะทำหน้าที่เหมือนปริซึมและตัวสะท้อน คอยแบ่งและส่งกระจายสัญญาณนั้นไปทั่วระบบดาว และเซ็นเซอร์ยานของเราจะคอยจับสัญญาณที่สะท้อนกลับมาจากดาวเคราะห์ต่าง ๆ\n\nทำให้สามารถสำรวจดาวเคราะห์ทั้งระบบดาวเสร็จสิ้นได้ในพริบตาเดียว"
 story.219.a:0 "ดำเนินการเลย"
 story.219.a.tooltip:1 "จ่ายพลังงาน £energy£ §R-30§! พลังงานเพื่อ §Yสำรวจทันที§! ระบบดาว [From.From.GetName]"
 story.219.b:0 "คราวนี้ยังก่อน"
 story.219.c:0 "เราไม่มีทรัพยากรเหลือพอให้ใช้"

 story.220.name:0 "ลูกแก้วพยากรณ์"
 story.220.desc.hostile:0 "[Root.GetName] รายงานการปรากฏตัวของผลึกแก้วจำนวนมากในระบบดาว [From.GetName] แทบไม่มีสัญญาณบ่งชี้ว่าระบบนี้เป็นถิ่นฐานดั้งเดิมของพวกมันหรือไม่ แต่เราไม่เคยเห็นเอนทิตีผลึกแก้วมารวมตัวกันหนาแน่นขนาดนี้มาก่อนในระบบดาวเดียว\n\nการอ่านค่าเบื้องต้นชี้ว่าสิ่งก่อสร้างคริสตัลที่แปลกประหลาดในระบบนี้เป็นสิ่งที่น่าสนใจอย่างยิ่ง หากเราสามารถ... แยกส่วนมันออกมาได้"
 story.220.desc.nonhostile:1 "[Root.GetName] รายงานการพบเอนทิตีผลึกแก้วจำนวนมากในระบบดาว [From.GetName] เห็นได้ชัดว่าเป็นรังชนิดหนึ่ง - หรืออย่างน้อยก็เป็นศูนย์กลางของกิจกรรมผลึกแก้ว - [From.GetName] เป็นที่อยู่ของสิ่งก่อสร้างคริสตัลที่ไม่เหมือนกับที่เราเคยเจอมาก่อน\n\nสิ่งก่อสร้างนี้มีคุณสมบัติหลายประการที่สอดคล้องกับเอนทิตีผลึกแก้ว แต่มีขนาดและระดับที่ทวีความรุนแรงกว่ามาก"
 story.220.desc.gesta:1 "เราพบการปรากฏตัวของผลึกแก้วจำนวนมากในระบบดาว [From.GetName] เห็นได้ชัดว่าเป็นแหล่งกบดาน - หรืออย่างน้อยก็เป็นศูนย์กลางกิจกรรมของพวกผลึกแก้ว - [From.GetName] เป็นที่ตั้งของสิ่งก่อสร้างคริสตัลซึ่งต่างจากทุกสิ่งที่เราเคยพบมาในอดีต\n\nสิ่งก่อสร้างนี้แสดงให้เห็นคุณสมบัติหลายอย่างที่สอดรับกับเอนทิตีผลึกแก้ว ทว่าขยายสัดส่วนจนใหญ่โตกว่าปกติอย่างมาก"
 story.220.a.nonhostile:0 "ทำตามนั้นเลย"

 story.221.name:0 "เปิดเผยนิมิต"
 story.221.desc:0 "แผนกวิทยาศาสตร์ต่างดาวบน [Root.Capital.GetName] รายงานว่าพวกเขาได้เสร็จสิ้นการศึกษาระยะไกลเกี่ยวกับสิ่งก่อสร้างผลึกแก้วแล้ว\n\nอีกครั้งหนึ่ง การขาดพฤติกรรมที่สังเกตได้ของเอนทิตีเหล่านี้ทำให้ยากที่จะได้ข้อสรุปที่แน่ชัด อย่างไรก็ตาม คุณสมบัติทางสรีรวิทยาของพวกมันยังคงสร้างความตื่นใจให้กับเรา การศึกษาเกี่ยวกับสิ่งก่อสร้างนี้ทำให้นักเอเลี่ยนชีววิทยาของเรา ร่วมมืออย่างใกล้ชิดกับวิศวกรวัสดุ เริ่มต้นเลียนแบบคุณสมบัติการประกอบสร้างสัดส่วนใหม่ขั้นสูงที่พบได้ในสิ่งก่อสร้างผลึกแก้วนี้แล้ว"
 story.221.desc.gesta:0 "เราได้เสร็จสิ้นการศึกษาระยะไกลเกี่ยวกับสิ่งก่อสร้างผลึกแก้วแล้ว\n\nการขาดแคลนพฤติกรรมที่สังเกตได้ของเอนทิตีเหล่านี้ทำให้ยากต่อการสรุปข้อเท็จจริง ทว่าลักษณะทางสรีรวิทยาของพวกมันยังคงดึงดูดใจ และตอนนี้เราสามารถเริ่มเลียนแบบคุณสมบัติการสร้างเซลล์ทดแทนขั้นสูงตามที่สังเกตได้จากสิ่งก่อสร้างคริสตัลดังกล่าวแล้ว"
 story.221.a:0 "น่ายกย่องมาก"

 story.223.name:0 "นิมิตถูกรบกวน"
 story.223.desc:0 "แผนกวิทยาศาสตร์ต่างดาวบน [Root.Capital.GetName] รายงานว่าสิ่งก่อสร้างผลึกแก้วที่สังเกตพบในระบบดาวห่างไกลได้ถูกทำลายลงแล้ว และไม่สามารถศึกษาระยะไกลได้อีกต่อไป"
 story.223.desc.gesta:0 "สิ่งก่อสร้างผลึกแก้วที่สังเกตพบในระบบดาวห่างไกลได้ถูกทำลายลงแล้ว และไม่สามารถทำการศึกษาระยะไกลได้อีกต่อไป"
 story.223.a:0 "น่าเสียดายจริง ๆ"
 story.223.a.tooltip:0 "โครงการพิเศษ §Hสิ่งก่อสร้างผลึกแก้ว§! ถูกยกเลิก"

 story.301.name:0 "โดรนขุดแร่โบราณ"
 story.301.desc.pacif:1 "รายงานเกี่ยวกับโดรนในอวกาศลึกในบางระบบดาวได้รับการตรวจสอบแล้ว โดรนเหล่านี้ดูเหมือนจะเป็นคนงานและผู้ดูแลโครงการทำเหมืองแร่อวกาศอัจฉริยะแบบกึ่งอัตโนมัติ ซึ่งจัดตั้งขึ้นเมื่อหลายพันปีก่อนและถูกทิ้งร้างไปหลังจากนั้นไม่นานโดยเหลือเพียงแค่โดรนเหล่านี้เอง หากตัดสินจากสภาพอุปกรณ์การประมวลผล\n\nโดรนเหล่านี้ดูเหมือนจะไม่มีระเบียบการสื่อสารทางการทูตใด ๆ - อย่างน้อยก็ไม่มีระบบใดที่ [Root.Owner.GetName] จะแปลความหมายได้ - และแสดงปฏิกิริยาเป็นศัตรูกับยานของ [Root.Owner.GetSpeciesAdj] ที่เดินทางเข้าสู่ระบบดาว\n\nการมีอยู่ของพวกมันในระบบดาว [Root.System.GetName] นั้นมีความน่าสนใจ และเราควรพยายามเรียนรู้เพิ่มเติมเกี่ยวกับพวกมัน"
 story.301.desc.mater:1 "รายงานเกี่ยวกับโดรนในอวกาศลึกในบางระบบดาวได้รับการตรวจสอบแล้ว โดรนเหล่านี้ดูเหมือนจะเป็นคนงานและผู้ดูแลโครงการทำเหมืองโคจรอัตโนมัติ ซึ่งจัดตั้งขึ้นเมื่อหลายพันปีก่อนและถูกทิ้งร้างไปหลังจากนั้นไม่นานโดยเหลือเพียงแค่โดรนเหล่านี้เอง หากประเมินจากสภาพอุปกรณ์ประมวลผล วัตถุประสงค์ของพวกมันนั้นชัดเจนเพียงพอ - คือการทำเหมืองแร่ - แต่ผู้ใดเป็นคนมอบหมายงานให้พวกมันนั้นยังไม่เห็นได้ชัดในทันที สิ่งที่ชัดเจนคือไม่มีการขนถ่ายแร่ธาตุออกจากระบบนี้มานานหลายร้อยหรืออาจจะหลายพันปีแล้ว\n\nพวกมันอาจเป็นเพียงโดรนโบราณ แต่ควรได้รับการเฝ้าระวังอย่างใกล้ชิดโดย [Root.Owner.GetName]"
 story.301.desc:1 "รายงานเกี่ยวกับโดรนในอวกาศลึกในบางระบบดาวได้รับการตรวจสอบแล้ว โดรนเหล่านี้ดูเหมือนจะเป็นคนงานและผู้ดูแลโครงการทำเหมืองโคจรอัตโนมัติ ซึ่งจัดตั้งขึ้นเมื่อหลายพันปีก่อนและถูกทิ้งร้างไปหลังจากนั้นไม่นานโดยเหลือเพียงแค่โดรนเหล่านี้เอง หากประเมินจากสภาพอุปกรณ์ประมวลผล โดรนเหล่านี้ครอบครองเลเซอร์ทำเหมืองที่ทรงพลังและแสดงท่าทีคุกคามหรือก้าวร้าวอย่างเปิดเผยต่อยานของ [Root.Owner.GetSpeciesAdj] เมื่อเข้าใกล้\n\nพวกมันอาจเป็นเพียงโดรนโบราณ แต่ควรได้รับการเฝ้าระวังอย่างใกล้ชิดโดย [Root.Owner.GetName]"
 story.301.desc.gesta:1 "โดรนอวกาศลึกที่เราพบดูเหมือนจะเป็นคนงานและผู้ดูแลโครงการทำเหมืองโคจรอัตโนมัติ หากประเมินจากสภาพอุปกรณ์ประมวลผล ไซต์งานเหล่านี้จัดตั้งขึ้นเมื่อหลายพันปีก่อนและถูกทิ้งร้างไปหลังจากนั้นไม่นานโดยเหลือเพียงตัวโดรนเอง โดรนเหล่านี้ครอบครองเลเซอร์ทำเหมืองที่ทรงพลังและแสดงท่าทีคุกคามหรือก้าวร้าวต่อเราอย่างเปิดเผยเมื่อมีผู้เข้าใกล้\n\nพวกมันอาจเป็นเพียงโดรนโบราณ แต่สมควรได้รับการเฝ้าระวังอย่างใกล้ชิด"
 story.301.a:0 "จัดตั้งสถานีดักฟังบน [Root.Capital.GetName]"
 story.301.b:0 "มาดูกันซิว่าพวกมันทำมาจากอะไร - ชำแหละพวกมันซะ"

 story.305.name:0 "จริยธรรมการทำงานของโดรนเหมืองแร่"
 #starts mining drone home system chain upon completion
 story.305.desc.pacif:0 "เมื่อไม่ได้เล็งเลเซอร์ทำเหมืองคุกคามยานของ [Root.GetSpeciesAdj] โดรนเหล่านี้ก็ดูจะมุ่งมั่นและทำงานหนักอย่างไม่คิดชีวิต ขุดเจาะดาวเคราะห์น้อยที่แทบไม่มีแร่ธาตุเพียงเพราะไม่มีสิ่งอื่นที่ดีกว่าให้ทำ\n\nสิ่งที่น่าสนใจยิ่งกว่าคือโดรนเหล่านี้ไม่ได้เงียบสนิทอย่างที่เคยสมมติไว้ก่อนหน้านี้ พวกมันส่งสัญญาณพิงออกมา แม้จะเกิดขึ้นไม่บ่อยนักและอยู่ในความยาวคลื่นที่แยกจากเสียงรบกวนรอบข้างได้ยาก จะมีใครเหลืออยู่เพื่อรับสัญญาณเหล่านี้หรือไม่คงเป็นปริศนาสำหรับช่วงเวลาอื่น"
 story.305.desc.mater:0 "โดรนเหล่านั้นมีความประหยัดอย่างเหลือเชื่อในการเค้นผลผลิตที่เหลือน้อยนิดจากหินแร่ที่คนงานเหมืองของ [Root.GetSpeciesAdj] คงจะละทิ้งไปอย่างรวดเร็ว โดยถือว่าหมดสิ้นแร่ธาตุที่คุ้มค่าแล้ว วิศวกรระดับแนวหน้าของเรากำลังทำงานเพื่อปรับใช้วิธีการของโดรนเหล่านี้ในเครือข่ายและสถานีขุดเจาะเหมืองแร่ของ [Root.GetName] ซึ่งน่าจะช่วยเพิ่มประสิทธิภาพและลดการใช้พลังงานได้อย่างเป็นรูปธรรม\n\nเรื่องที่มีความสำคัญน้อยกว่าคือความจริงที่ว่าโดรนไม่ได้เงียบสนิทอย่างที่เคยสมมติไว้ก่อนหน้านี้ พวกมันส่งสัญญาณพิงออกมา แม้จะเกิดขึ้นน้อยครั้งมากและอยู่ในความยาวคลื่นที่แยกจากเสียงรบกวนรอบข้างได้ยาก จะมีใครเหลืออยู่เพื่อรับสัญญาณเหล่านี้หรือไม่คงเป็นปริศนาที่จะต้องค้นหากันในภายหลัง"
 story.305.desc:0 "โดรนเหล่านี้และการทำงานขุดเจาะทรัพยากรที่เหลืออยู่อย่างอดทนและไม่มีวันสิ้นสุดของพวกมันจากดาวเคราะห์น้อยในละแวกนั้น ทำให้พวกมันกลายเป็นหัวข้อการศึกษาที่แม้จะค่อนข้างน่าเบื่อแต่ก็เปี่ยมไปด้วยข้อมูลที่เป็นประโยชน์ ในความเป็นจริง เครือข่ายการทำเหมืองแร่บน [Root.Capital.GetName] น่าจะเรียนรู้กลไกในการเพิ่มผลผลิตแร่ธาตุสูงสุดในขณะที่ประหยัดพลังงานไปด้วยได้\n\nนอกจากนี้ เรายังพบว่าโดรนเหล่านี้ไม่ได้เงียบสนิท พวกมันส่งสัญญาณพิงออกมา แม้จะเกิดขึ้นได้ยากมากและมีระดับความยาวคลื่นที่แยกแยะจากสัญญาณรบกวนพื้นหลังได้ยาก การที่จะมีผู้รับสัญญาณเหล่านี้หลงเหลืออยู่หรือไม่นั้นอาจเป็นปริศนาไว้ศึกษาในวันหน้า"
 story.305.desc.gesta:0 "โดรนและการทำงานอันทรหดไม่มีวันสิ้นสุดเพื่อขุดค้นทรัพยากรที่ร่อยหรอลงไปทุกทีจากดาวเคราะห์น้อยรอบตัว ถือเป็นเป้าหมายการศึกษาที่น่าเบื่อไปบ้างแต่ก็ให้ข้อมูลที่มีประโยชน์อย่างมาก ในความเป็นจริงเราน่าจะเรียนรู้เกี่ยวกับการเพิ่มอัตราการขุดแร่ให้ได้สูงสุดควบคู่กับการอนุรักษ์พลังงานได้เป็นอย่างดี\n\nนอกจากนี้ เราพบว่าโดรนเหล่านี้ไม่ได้เงียบสนิทเสียทีเดียว พวกมันส่งสัญญาณพิงเป็นระยะ แม้จะมีความถี่ต่ำมากและมีความยาวคลื่นที่แยกจากคลื่นรบกวนทั่วไปได้ยาก การที่มีผู้รับคลื่นเหล่านี้หลงเหลืออยู่อีกหรือไม่คงเป็นปริศนาที่ปล่อยไว้ค่อยศึกษาวันหน้า"
 story.305.a:0 "รับทราบ"
 story.305.a.tooltip:1 "ให้สิทธิ์เข้าถึงบัญญัติจักรวรรดิ §Yการเพิ่มประสิทธิภาพโดรนเหมืองแร่§!(ตัดภาพ)"
 story.305.b:1 "มาดูกันว่าพวกมันประเมินแหล่งขุดเจาะเหมืองแร่อย่างไร"
 story.305.b.tooltip:0 "เพิ่มรายชื่อดาวเคราะห์น้อยที่อุดมไปด้วยแร่ธาตุลงในบันทึกสถานการณ์(บันทึกระบบ)"

 story.310.name:0 "การแยกส่วนชิ้นส่วนโดรนเหมืองแร่"
 story.310.desc.mater:0 "โดรนขุดเหมืองแร่ถูกทำลายลงในการต่อสู้ที่ดุเดือดกับยานของ [Root.GetSpeciesAdj] นับว่ายังโชคดีที่เซลล์พลังงานของพวกมันเป็นส่วนประกอบที่แข็งแกร่งที่สุดในโครงสร้าง และยานของเราสามารถกู้คืนมาได้บางส่วน เทคโนโลยีเบื้องหลังเซลล์พลังงานเหล่านี้ยังคงล้ำหน้าเกินกว่าเราจะเข้าใจได้ในขณะนี้ แต่การทดสอบเบื้องต้นแสดงให้เห็นว่าเราสามารถเปลี่ยนพลังงานจากพวกมันให้กลายเป็นเครดิตพลังงาน (เครดิตพลังงาน) ได้\n\nเมื่อเซลล์พลังงานชิ้นสุดท้ายหมดประจุลง วิศวกรผู้ควบคุมการทดสอบสังเกตเห็นระดับรังสีรอบข้างลดลง ดูเหมือนว่าโดรนเหล่านี้ไม่ได้เงียบสนิท แต่ได้ส่งสัญญาณกระจายเสียงเป็นระยะบนความถี่ที่ไม่ปกติมาโดยตลอดตั้งแต่ที่เราพบพวกมันครั้งแรก หรืออาจจะตั้งแต่ถูกส่งออกมาปฏิบัติการแรกเริ่มเลยทีเดียว ทว่ามีโอกาสน้อยมากที่จะมีผู้รับสัญญาณเหล่านี้หลงเหลืออยู่\n\nไม่ว่าจะอย่างไร โดรนเหล่านี้สามารถเป็นแหล่งพลังงานที่มีประสิทธิภาพแต่มีขีดจำกัด หากเราสามารถค้นหาและปิดการทำงานของพวกมันได้อย่างมีประสิทธิภาพเพียงพอ"
 story.310.desc:0 "โดรนทำเหมืองแร่ถูกทำลายลงในการต่อสู้ที่ดุเดือดกับยานของ [Root.GetSpeciesAdj] นับว่าเป็นโชคดีที่เซลล์พลังงานของพวกมันเป็นส่วนประกอบที่แข็งแกร่งที่สุดในโครงสร้าง และยานของเราสามารถกู้คืนกลับมาได้บางส่วน เทคโนโลยีเบื้องหลังเซลล์พลังงานเหล่านี้ยังคงล้ำหน้าเกินกว่าเราจะเข้าใจได้ในขณะนี้ แต่การทดสอบเบื้องต้นแสดงให้เห็นว่าเราสามารถแปรเปลี่ยนเอาต์พุตให้กลายเป็นเครดิตพลังงาน (เครดิตพลังงาน) ได้สำเร็จ\n\nเมื่อเซลล์พลังงานก้อนสุดท้ายหยุดการทำงาน วิศวกรผู้ควบคุมการทดสอบพบว่าระดับรังสีโดยรอบลดฮวบลง ดูเหมือนว่าโดรนไม่ได้เงียบสนิท แต่มีการกระจายเสียงอยู่เป็นระยะ ๆ บนความถี่ผิดปกติมาตั้งแต่เราพบเจอพวกมันครั้งแรก หรืออาจเป็นตั้งแต่เริ่มปฏิบัติการในอดีตกาล ทว่ามีความเป็นไปได้น้อยที่จะมีผู้รับการส่งสัญญาณเหล่านี้หลงเหลืออยู่\n\nอย่างไรก็ดี โดรนเหล่านี้สามารถเป็นแหล่งพลังงานที่ทรงพลังแต่มีจำกัด หากเราค้นหาและกำจัดพวกมันได้อย่างมีประสิทธิภาพเพียงพอ"
 story.310.desc.gesta:0 "เราทำลายโดรนทำเหมืองแร่ลงในการต่อสู้อันดุเดือด โชคดีที่เซลล์พลังงานของพวกมันเป็นชิ้นส่วนที่ทนทานที่สุดที่ใช้ในการก่อสร้าง และบางส่วนสามารถกู้คืนมาได้ เทคโนโลยีเบื้องหลังเซลล์เหล่านี้ล้ำหน้าเกินกว่าความรู้ของเราในปัจจุบัน แต่การทดสอบในระยะแรกเริ่มชี้ว่าเรามีความสามารถในการแปลงพลังงานของมันให้กลายเป็นเครดิตพลังงาน (เครดิตพลังงาน) ได้\n\nเมื่อเซลล์พลังงานสุดท้ายจ่ายพลังงานจนหมด เราสังเกตเห็นระดับรังสีโดยรอบลดต่ำลงผ่าน [Root.GetUnitDronePlural] ที่ทำหน้าที่ทดสอบ ดูเหมือนโดรนไม่ได้เงียบสนิท แต่มีการแพร่สัญญาณเป็นระยะด้วยคลื่นความถี่พิเศษตั้งแต่พบกับพวกมันครั้งแรก หรืออาจส่งมาตั้งแต่ตอนแรกเริ่มออกทำงานด้วยซ้ำ มีความหวังน้อยที่จะมีผู้รับสัญญาณเหล่านี้หลงเหลืออยู่\n\nไม่ว่าในกรณีใด โดรนสามารถเป็นแหล่งพลังงานที่มีประสิทธิภาพแต่มีจำกัด หากเราค้นหาและปิดการทำงานของมันได้อย่างสัมฤทธิ์ผลเพียงพอ"
 story.310.a:0 "ดีมาก"
 story.310.a.tooltip:0 "ให้สิทธิ์เข้าถึงบัญญัติจักรวรรดิ §Yค่าหัวโดรนเหมืองแร่§!(รางวัลแก้ว)\n"
 story.320.name:0 "สำรวจแหล่งแร่เสร็จสิ้น"
 story.320.desc:0 "แหล่งแร่ธาตุคุณภาพสูงทั้งหมดที่ถูกค้นพบโดยอัลกอริทึมการประเมินผลของโดรนเหมืองแร่โบราณที่ถอดรหัสย้อนกลับได้รับการสำรวจเรียบร้อยแล้ว"

 story.330.name:0 "ศูนย์กลางการประมวลผลแร่อเนกประสงค์โบราณ"
 story.330.desc:0 "[Root.GetName] ได้พบการปรากฏตัวของโดรนเหมืองแร่โบราณจำนวนมากในระบบดาว [From.GetName] ดูเหมือนว่าจะเป็นศูนย์กลางการทำเหมืองและการประมวลผลแร่หลัก ซึ่งอาจเป็นศูนย์สุดท้ายในลักษณะนี้ในกาแล็กซี"
 story.330.desc.gesta:0 "เราพบการปรากฏตัวของโดรนเหมืองแร่โบราณจำนวนมากในระบบดาว [From.GetName] ดูเหมือนว่าจะเป็นศูนย์กลางการทำเหมืองและการประมวลผลแร่หลัก ซึ่งอาจเป็นจุดสุดท้ายในประเภทนี้ในกาแล็กซี"
 story.330.a:0 "เป็นแบบนั้นแน่นอน"
 story.330.b:0 "มาดูกันซิว่าเราจะเรียนรู้อะไรจากมันได้บ้าง"

 story.331.name:0 "เฝ้าสังเกตการณ์การประมวลผลแร่"
 story.331.desc:0 "การละเว้นไม่เข้าไปยุ่งเกี่ยวกับศูนย์ประมวลผลแร่ของโดรนทำเหมืองโบราณนั้น ท้ายที่สุดถือเป็นการตัดสินใจที่ชาญฉลาด ด้วยการเฝ้าสังเกตจังหวะที่ซ้ำซากของมันเป็นระยะเวลานาน ทำให้เราสามารถระบุเทคนิคเชิงระบบหลายประการในการจัดการวัตถุดิบดิบแบบอัตโนมัติที่เหนือกว่าวิธีการปัจจุบันของเรา"
 story.331.desc.gesta:0 "$story.331.desc$"
 story.331.a:0 "เช่นนั้นเราจะเปลี่ยนเทคนิคเหล่านี้มาเป็นของเรา"
 story.331.b:0 "แจ็กพอตแล้ว"

 story.333.name:0 "ฐานโดรนเหมืองแร่ถูกทำลาย"
 story.333.desc:0 "เราได้รับรายงานว่าศูนย์ประมวลผลแร่ที่สังเกตพบในระบบดาว [location_planet.GetStarName] ถูกทำลายลงแล้ว คลังสำรองแร่ธาตุและแร่แปรรูปจำนวนมหาศาลของมันได้ถูกปล่อยออกมากระจัดกระจายและร่วงหล่นลงสู่ [location_planet.GetName] ในแถบดาวเคราะห์น้อยในละแวกนั้น"
 story.333.desc.gesta:0 "ศูนย์ประมวลผลแร่ที่เราสังเกตพบในระบบดาว [location_planet.GetStarName] ถูกทำลายลงแล้ว คลังสำรองแร่ดิบและแร่แปรรูปจำนวนมากของมันได้ถูกปลดปล่อยออกมากระจัดกระจายและร่วงหล่นสู่ [location_planet.GetName] ในแถบดาวเคราะห์น้อยท้องถิ่น"
 story.333.a:0 "เราศึกษาซากปรักหักพังมามากพอแล้ว"
 story.333.a.tooltip:0 "โครงการพิเศษ §Hศูนย์ประมวลผลแร่อัตโนมัติ§! ถูกยกเลิก\n$story.333.b.tooltip$"
 story.333.b:0 "แจ็กพอตแล้ว"
 story.333.b.tooltip:0 "[location_planet.GetName] ในตอนนี้อุดมสมบูรณ์ไปด้วยแร่ธาตุมากขึ้น"

 story.401.name:0 "กลุ่มหมอกสุญญากาศ"
 story.401.desc.spiri:1 "\"กลุ่มหมอก\" รายงานที่เต็มไปด้วยความตกตะลึงระบุไว้ ซึ่งรวบรวมมาจากหลายแหล่งข้อมูล \"เหมือนกลุ่มหมอกของสสารดาวฤกษ์ที่ส่องสว่าง ลอยม้วนตัวอยู่ในความมืด\" รายงานดังกล่าวยังอ้างถึงปรากฏการณ์นี้อย่างค่อนข้างมีบทกวีว่าเป็น \"กลุ่มหมอกสุญญากาศ\" (เมฆขาว)\n\nเป็นที่ประจักษ์แก่เหล่านักบวชของ [Root.Owner.GetName] ว่าเมฆหมอกเหล่านี้คือผู้ส่งสารที่ถูกชุบชีวิตขึ้นโดยเจตจำนงที่สูงส่งกว่า เจตจำนงนี้เป็นของใครหรือสิ่งใดเป็นหัวข้อที่กำลังโต้วาทีกันอย่างดุเดือด และมีแนวโน้มที่จะดำเนินต่อไปในอนาคตอันใกล้ จนกว่าจะสามารถยืนยันธรรมชาติที่แท้จริงของกลุ่มหมอกสุญญากาศได้ เป็นเรื่องที่สมควรอย่างยิ่งที่จะต้องระมัดระวังต่อพลังอำนาจมหาศาลที่ปรากฏในลักษณะการหมุนวนของมัน"
 story.401.desc:1 "การสืบสวนเกี่ยวกับกลุ่มเศษซากดาวและฝุ่นอวกาศที่แปลกประหลาดซึ่งก่อนหน้านี้ได้รับการขนานนามว่า §H[This.ContactCountry.GetName]§! ได้ให้ผลลัพธ์ที่น่าประหลาดใจ มันคือเมฆฝุ่นละอองที่มีการปลดปล่อยประจุพลังงานเข้มข้นซึ่งไม่ทราบที่มาอย่างแน่ชัด ซึ่งตามจริงไม่สมควรที่จะแสดงแม้กระทั่งปฏิกิริยาสะท้อนกลับอย่างง่าย ๆ นับประสาอะไรกับการเคลื่อนไหวอย่างมีจุดมุ่งหมาย\n\nทว่ามันกลับทำได้\n\nมีบางสิ่งที่ลึกลับและน่าพรั่นพรึงอย่างเห็นได้ชัดเกี่ยวกับเมฆหมอกที่ปรากฏในวิดีโอที่ถูกส่งกลับมา บางทีอาจมีสิ่งต่าง ๆ ในจักรวาลที่เราไม่ควรเข้าไปยุ่งเกี่ยวด้วยเลย"
 story.401.desc.gesta:1 "การสืบสวนของเราเกี่ยวกับกลุ่มเศษซากและฝุ่นอวกาศที่แปลกประหลาดภายใต้รหัส §H[This.ContactCountry.GetName]§! ได้ผลลัพธ์ที่น่าตื่นตะลึง: มันคือเมฆฝุ่นละอองที่มีประจุไฟฟ้าอันทรงพลังจากแหล่งกำเนิดที่ไม่รู้จัก มันไม่ควรจะแสดงปฏิกิริยาสะท้อนกลับอย่างง่าย ๆ ด้วยซ้ำ นับประสาอะไรกับการเคลื่อนไหวอย่างมีเป้าหมาย\n\nทว่ามันกลับกระทำได้\n\nมีสิ่งที่เป็นลางร้ายอย่างไม่อาจปฏิเสธได้เกี่ยวกับฝุ่นละอองที่เคลื่อนไหวอย่างคลุมเครือในฟีดวิดีโอที่ส่งกลับมา บางทีในจักรวาลอาจมีเรื่องราวบางอย่างที่เราไม่ควรไปเกลือกกลั้วด้วย"
 story.401.a.spiri:0 "ไม่ว่าจะเป็นช่องทางสื่อสารของเทพเจ้าหรือไม่ก็ตาม มันสมควรแก่การศึกษา"
 story.401.b.spiri:0 "เราขอละเรื่องนี้ไว้ในความดูแลของผู้บัญชาการที่มีความสามารถของเรา"
 story.401.c:0 "ขอให้เราเฝ้าจับตาดู แต่อย่าได้เข้าไปรบกวนมัน"
 story.401.d:0 "เราขอละเรื่องนี้ไว้ในความดูแลของผู้บัญชาการที่มีความสามารถของเรา"
 story.401.e:0 "บางทีมันควรจะถูกทำลาย"

 story.405.name:0 "เปิดหมอกสุญญากาศ"
 story.405.desc.spiri:0 "กลุ่มหมอกสุญญากาศ(เมฆลอย)คือผู้พิทักษ์แห่งห้วงจักรวาล เมื่อนักดาราศาสตร์ของ [Root.GetSpeciesAdj] ทราบเบาะแสที่ต้องค้นหา พวกเขาก็พบร่องรอยของพวกมันในทุกหนทุกแห่ง\n\nพวกมันก่อตัวขึ้น ณ รุ่งอรุณแห่งการสรรสร้าง คอยเฝ้ามองดวงดาวที่สว่างไสวและการก่อตัวของดาวเคราะห์ดวงใหม่ ในยามนี้พวกมันล่องลอยอยู่ เป็นกลุ่มสสารอนินทรีย์ที่มีจิตกึ่งตระหนักรู้จากห้วงเวลาแรกเริ่มลอยอยู่ระหว่างดวงดาวที่กำลังดับสูญและดวงดาวที่กำลังแตกสลาย\n\nพวกมันเป็นสิ่งเตือนใจเสมอว่าเราเป็นเพียงเศษเสี้ยวเล็ก ๆ ของบางสิ่งที่ยิ่งใหญ่กว่า"
 # +6 mult phys research, +10% dmg vs cloud modifier
 story.405.desc:0 "กลุ่มหมอกสุญญากาศ(เมฆลอย)เท่าที่นักวิจัย [Root.GetSpeciesAdj] สามารถคาดเดาได้ จัดว่าเป็นสิ่งมีชีวิตที่เก่าแก่ที่สุดกลุ่มหนึ่งในจักรวาล พวกมันดูเหมือนจะถือกำเนิดขึ้นเพียงไม่กี่พันล้านปีหลังจากสสารที่เรารู้จักปรากฏขึ้นเป็นครั้งแรก พลังอันมหาศาลของห้วงจักรวาลวัยเยาว์ทำให้เกิดบางสิ่งขึ้นมาจากความว่างเปล่า พวกมันอาจจะเคยเป็นดวงดาวมาก่อน แต่กลับไม่ได้เป็นเช่นนั้น\n\nการอธิบายความฉลาดระดับสัญชาตญาณสัตว์ป่าของพวกมันนั้นยากกว่า แต่คำตอบอาจอยู่ที่สนามแม่เหล็กไฟฟ้าที่รุนแรงผิดปกติซึ่งยึดเหนี่ยวพวกมันไว้ด้วยกัน - ซึ่งเป็นอีกหนึ่งผลผลิตจากจุดเริ่มต้นยุคดึกดำบรรพ์ มันไม่ได้เป็นไปไม่ได้เลยที่เมื่อเวลาผ่านไปนานพอ การไหลเวียนของฝุ่นดาวและสนามแรงโน้มถ่วงที่แปลกประหลาดจะเรียงตัวกันเป็นวงจรเส้นประสาทที่ยืดหยุ่น\n\nนอกจากนี้ ดูเหมือนว่ากลุ่มหมอกเหล่านี้กำลังส่งสัญญาณความรู้สึกถึงกัน แม้ว่าจะอยู่ห่างกันหลายปีแสง คาดกันว่าปรากฏการณ์การพัวพันทางควอนตัม(การพัวพันของ Quantum)น่าจะมีบทบาทในปรากฏการณ์นี้"
 story.405.desc.gesta:0 "กลุ่มหมอกสุญญากาศ(เมฆลอย)อาจเป็นหนึ่งในสิ่งมีชีวิตที่เก่าแก่ที่สุดในจักรวาล พวกมันดูเหมือนจะกำเนิดขึ้นหลังจากสสารแรกเริ่มปรากฏขึ้นเพียงไม่กี่พันล้านปี พลังอันยิ่งใหญ่ของจักรวาลวัยเยาว์สร้างบางสิ่งขึ้นมาจากความว่างเปล่า ครั้งหนึ่งพวกมันเกือบจะได้กลายเป็นดาวฤกษ์แต่ก็ไม่ได้เป็น\n\nการชี้แจงเกี่ยวกับสติปัญญาคล้ายสัตว์ป่าของพวกมันนั้นทำได้ยากยิ่ง ทว่าคำตอบอาจจะซ่อนอยู่ในสนามแม่เหล็กไฟฟ้าที่แรงกล้าผิดปกติซึ่งคอยพยุงพวกมันให้อยู่ร่วมกัน - ซึ่งเป็นผลผลิตจากจุดกำเนิดบรรพกาลอีกประการหนึ่ง จึงมีความเป็นไปได้ว่าเมื่อมีเวลามากพอ การหมุนเวียนของฝุ่นดาวและแรงโน้มถ่วงพิเศษจะค่อย ๆ จัดวางตัวเข้าใกล้รูปแบบโครงข่ายเส้นประสาทหรือวงจรประมวลผลที่ยืดหยุ่น\n\nยิ่งไปกว่านั้น กลุ่มหมอกสุญญากาศนี้ดูเหมือนจะมีการส่งรับความรู้สึกระหว่างกัน แม้จะแยกห่างกันหลายปีแสงก็ตาม คาดว่าทฤษฎีการพัวพันทางควอนตัม(การพัวพันของ Quantum)จะมีส่วนเกี่ยวข้องกับกลไกนี้"
 story.405.a.spiri:0 "ช่างน่าลดทิฐิลงยิ่งนัก"
 story.405.a.spiri.tooltip:0 "เพิ่มตัวดัดแปลง §Yมหาแผนการ§! ให้แก่ §Yจักรวรรดิของคุณ§!:\n£happiness£ ความสุข §G+5%§!"
 story.405.b:0 "พวกมันไม่มีวันมาขวางทางเราได้"
 story.405.b.tooltip:0 "เพิ่มตัวดัดแปลง §Yนักสลายหมอก§! ให้แก่ §Yจักรวรรดิของคุณ§!:\nความเสียหายต่อกลุ่มหมอกสุญญากาศ: §G+10%§!"
 story.405.c:0 "สัญญาณความรู้สึกเหล่านี้สามารถสะกดรอยได้หรือไม่?"
 story.405.c.tooltip:0 "เพิ่มรายชื่อระบบดาวที่น่าจะมี §Yกลุ่มหมอกสุญญากาศ§! อาศัยอยู่ลงในบันทึกสถานการณ์(บันทึกระบบ)"

 story.410.name:0 "เมฆหมอกทมิฬ"
 # empire modifier -10% happiness for three years, +10% dmg vs cloud modifier
 story.410.desc.spiri:0 "ถูกกำจัดลงโดย [From.GetName] ทว่ากลุ่มหมอกสุญญากาศไม่ได้สิ้นชีพลงง่าย ๆ\n\nก่อนที่สนามแม่เหล็กไฟฟ้าของมันจะพังทลายลงในท้ายที่สุด - ส่งผลให้สสารดาวฤกษ์ของมันลอยม้วนตัวไปทั่วระบบ - ลูกเรือหลายคนที่เข้าร่วมการรบรายงานถึงความรู้สึกกลัวและลางร้ายที่ฉับพลัน\n\nบางทีพวกเราอาจจะก่อบาปเข้าเสียแล้ว"
 story.410.desc:0 "ชัยชนะเหนือกองหมอกสุญญากาศเป็นสิ่งที่ได้มาอย่างยากลำบาก\n\nแม้ว่าเราจะสูญเสียกำลังพลไปจำนวนมาก แต่ความจริงก็คือ [Root.GetName] สามารถเอาชนะหนึ่งในสิ่งลึกลับที่น่าพรั่นพรึงที่สุดในกาแล็กซีได้สำเร็จ"
 story.410.desc.gesta:0 "ชัยชนะเหนือกองหมอกสุญญากาศเป็นสิ่งที่ได้มาอย่างยากลำบาก\n\nแม้ว่าเราจะได้รับความสูญเสียอย่างหนัก แต่ความจริงก็คือเราได้พิชิตหนึ่งในสิ่งลึกลับที่น่าสะภูมิใจที่สุดในกาแล็กซีได้แล้ว"
 story.410.a.spiri:0 "เราจะไถ่บาปได้อย่างไร ในเมื่อไม่ทราบว่าตนทำผิดต่อผู้ใด?"
 story.410.b:0 "วันที่จะถูกจารึกไว้ในความทรงจำ"

 story.501.name:0 "ทิยานคี"
 story.501.desc.spiri:1 "ผู้หยั่งรู้เรียกสิ่งมีชีวิตเหล่านี้ที่ลอยอยู่ท่ามกลางความมืดมิดว่า \"§Yทิยานคี§!\"(ทยันกี)พวกมันคือรูปแบบชีวิตในอวกาศที่ศักดิ์สิทธิ์และสงบสุขที่ท่องไปตามระบบดาวต่าง ๆ โดยหากินก๊าซที่มีอยู่ทั่วไปในชั้นบรรยากาศส่วนบนของดาวยักษ์แก๊ส และแทบไม่เคยแสดงพฤติกรรมก้าวร้าวเลย\n\nเราสมควรที่จะรักษาระยะห่างเพื่อเป็นการแสดงความเคารพ"
 story.501.desc:1 "สิ่งมีชีวิตในอวกาศ - ซึ่งหัวหน้าฝ่ายวิจัยสังคมของ [Root.GetSpeciesAdj] ได้เรียกพวกมันว่า \"§Yทิยานคี§!\"(ตองกิ)\"เป็นสิ่งมีชีวิตที่เชื่องมาก พวกมันสามารถเข้าถึงมิติต่ำกว่าของซับสเปซ(ช่องว่าง)และเคลื่อนย้ายไปมาระหว่างระบบดาวได้อย่างง่ายดายอย่างน่าทึ่ง\n\nพวกมันกินก๊าซในชั้นบรรยากาศบนสุดของดาวยักษ์แก๊สเป็นอาหาร อย่างน้อยที่สุดก็มีความเป็นไปได้ต่ำมากที่ก๊าซจะเป็นแหล่งอาหารเพียงอย่างเดียวของพวกมัน แต่ยังไม่มีการพบเห็นการรับสารอาหารประเภทอื่นเลย\n\nพวกมันแทบจะไม่เคยเปิดฉากโจมตีก่อนเลย แม้จะถูกยั่วยุก็ตาม เราสามารถปล่อยผ่านพวกมันไปได้อย่างปลอดภัย"
 story.501.desc.gesta:0 "สิ่งมีชีวิตในอวกาศ - ซึ่งเราเรียกว่า \"§Yทิยานคี§!\"(ตองกิ)\"เป็นสิ่งมีชีวิตที่เชื่องมาก พวกมันสามารถเข้าถึงมิติส่วนต่ำของซับสเปซ(ช่องว่าง)และท่องไปมาระหว่างระบบดาวได้อย่างง่ายดายอย่างน่าทึ่ง\n\nพวกมันกินก๊าซในชั้นบรรยากาศบนสุดของดาวยักษ์แก๊สเป็นอาหาร อย่างน้อยที่สุดก็มีความเป็นไปได้ต่ำมากที่จะเป็นแหล่งอาหารเพียงหนึ่งเดียว ทว่าเรายังไม่เคยพบการดูดซึมสารอาหารชนิดอื่น ๆ ของพวกมันเลย\n\nพวกมันจะไม่โจมตีก่อนนอกจากจะถูกยั่วยุ เราสามารถละเลยพวกมันได้อย่างปลอดภัย"
 story.501.a.spiri:0 "น่ายกย่องเลื่อมใส"
 story.501.a.mater:0 "อย่างไรเสีย การล่าพวกมันก็มีแต่จะขาดทุนเปล่า"
 story.501.a.exploratobot:0 "ลงทะเบียนสิ่งมีชีวิตอวกาศที่แสนเชื่องแล้ว!"

 galactic_features.361.name:0 "ทายาทเศษซาก"
 galactic_features.361.desc:0 "หลังจากการทำลายล้างกองยานของเราในระบบดาว [From.From.From.GetStarName] ดูเหมือนว่ากลุ่มหมอกสุญญากาศในระบบดาวดังกล่าวจะเก็บสะสมสสารเพียงพอจากเศษซากเพื่อดำเนินการจำลองตัวสร้างสตรีรูปแบบหนึ่งในระดับมหภาค - การสืบพันธุ์แบบไม่อาศัยเพศ\n\nในขณะนี้จึงมีกลุ่มหมอกสุญญากาศเพิ่มขึ้นอีกหนึ่งแห่งที่คอยหลอกหลอนระบบดาว [From.From.From.GetStarName]"
 galactic_features.361.a:0 "น่าพรั่นพรึงอย่างยิ่ง"
 galactic_features.361.a.milit:0 "ท้าทายความสามารถ"
 galactic_features.361.a.phobe:0 "น่าขยะแขยงเหลือเกิน"
 galactic_features.361.a.phile:0 "น่าสนใจ"
 galactic_features.361.a.spiri:0 "ขอพลังศักดิ์สิทธิ์จงคุ้มครองพวกเรา"
 galactic_features.361.a.mater:0 "รับทราบ"
 galactic_features.361.a.tooltip:0 "§Rกลุ่มหมอกสุญญากาศ§! ปรากฏขึ้นใน §Yระบบดาว [From.From.From.GetStarName]§!"

