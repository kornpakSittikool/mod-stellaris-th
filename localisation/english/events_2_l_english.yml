 # Rogue Scientist
 country.1000.name:0 "ความปรารถนาในการเดินทางท่องโลก"
 country.1000.desc:1 "หัวหน้าแผนกวิจัยของ [Root.GetName] ได้สูญหายไป\n\nไปพร้อมกับยานวิทยาศาสตร์ต้นแบบที่มีการทดลองสูงซึ่งได้รับทุนสนับสนุนส่วนบุคคล\n\nเหตุการณ์ดังกล่าวทำให้สมาคมวิทยาศาสตร์บน [Root.Capital.GetName] ตกอยู่ในความโกลาหล"
 country.1000.a:0 "ช่างประหลาดเสียจริง"
 country.1001.name:0 "ปรารถนาการเดินทาง: ด้วยเป้าหมาย"
 country.1001.desc:1 "ที่อยู่ของหัวหน้าฝ่ายวิจัย—ซึ่งตอนนี้อยู่ในฐานะอดีตหัวหน้าอย่างเป็นทางการ—ยังไม่ได้รับการยืนยัน รายละเอียดบางอย่างเกี่ยวกับยานวิทยาศาสตร์ต้นแบบและงานวิจัยส่วนตัวของหัวหน้าฝ่ายวิจัยได้ยินมาถึงหูเราแล้ว แม้ว่าแง่มุมบางอย่างจะดูเหลือเชื่อเกินกว่าจะเป็นจริงได้ แต่เห็นได้ชัดว่าการค้นหาและกู้คืนเก้าอี้วิจัยนั้นเป็นผลประโยชน์ของ [Root.GetName] โดยเร็วที่สุด\n\nบันทึกสถานการณ์ได้รับการอัปเดตแล้ว"
 country.1001.a:0 "ตกลง"
 country.1001.a.tooltip:0 "เริ่มต้นห่วงโซ่เหตุการณ์ ปรารถนาการเดินทาง: นักวิทยาศาสตร์นอกรีต"
 country.1003.name:0 "ปรารถนาการเดินทาง: ทางตัน"
 country.1003.desc:1 "หัวหน้าฝ่ายวิจัยไม่ได้อยู่ในระบบนี้\n\nไม่ว่าเบาะแสจะเป็นเรื่องหลอกลวง หรือร่องรอยได้เงียบหายไปแล้ว"
 country.1003.a:0 "เราจะค้นหาต่อไป"
 country.1005.name:0 "ปรารถนาการเดินทาง: การเหลือบเห็น"
 country.1005.desc:1 "ยานของนักวิจัยอยู่ในระบบนี้—เท่าที่เราคิด\n\nเราไม่สามารถล็อกพิกัดตำแหน่งของพวกเขาบนเซ็นเซอร์ได้ แต่พวกเขากำลังติดต่อเรามา กำลังเชื่อมต่อสายของพวกเขาไปยังดาว [Root.Capital.GetName]"
 country.1005.a:0 "เปิดการสื่อสาร"
 country.1010.name:1 "หัวหน้าฝ่ายวิจัย" # diplo w/ scientist
 country.1010.desc:0 "ขอทักทายและสวัสดีท่าน [Root.GetRulerTitle]\n\nข้าพเจ้าเดาว่านี่ไม่ใช่การพบปะพูดคุยเพื่อเชื่อมความสัมพันธ์ทั่วไปใช่ไหม?"
 country.1010.a:0 "นี่มันหมายความว่าอย่างไรกัน?"
 country.1010.a.response:0 "ข้าพเจ้าคิดว่าท่านกำลังพูดถึงการหายตัวไปของข้าพเจ้าจากน่านฟ้าของ [Root.GetName]\n\nข้าพเจ้าแค่ต้องการเวลาส่วนตัวเท่านั้น เอาล่ะ พูดให้ถูกคือ ข้าพเจ้ากำลังตามหา 'หน้าต่าง' (หน้าต่าง)และหน้าต่างนั้นไม่ได้อยู่ที่นั่นอย่างแน่นอน\n\nที่นี่ก็ไม่มีเช่นกัน ข้าพเจ้าต้องค้นหาต่อไป แต่อย่างไรก็ตามข้าพเจ้าจะไม่เอาโดรนพวกนี้ที่ข้าพเจ้าพบไปด้วยหรอกนะ"
 country.1010.b:0 "เราสามารถจัดส่งยานไปคุ้มกันท่านกลับบ้านได้"
 country.1010.b.response:0 "ข้าพเจ้ายังไม่มีความสนใจที่จะกลับบ้านในขณะนี้\n\nแต่เพื่อเป็นการแสดงเจตนารมณ์ที่ดี โปรดรับโดรนเหล่านี้ไว้ ถือเป็นของบริจาคให้แก่ [Root.GetName] ข้าพเจ้าพบพวกมันลอยอยู่นอกระบบนี้ และหลังจากซ่อมแซมครั้งใหญ่เสร็จแล้ว ข้าพเจ้าถึงตระหนักได้ว่าพวกมันไม่เหมาะสำหรับใช้งานเป็นโพรบวิจัยเลยแม้แต่น้อย"
 country.1010.c:0 "ท่านต้องกลับไปที่เมืองหลวงในทันที"
 country.1010.c.response:0 "ข้าพเจ้าคิดว่าไม่ นี่เป็นเพียงจุดเริ่มต้น หน้าที่กำลังเรียกหา เพื่อวิทยาศาสตร์ และอะไรทำนองนั้น\n\nแต่เพื่อเป็นการแสดงเจตนารมณ์ที่ดี โปรดรับโดรนเหล่านี้ไว้ ถือเป็นของบริจาคให้แก่ [Root.GetName] ข้าพเจ้าพบพวกมันลอยอยู่นอกระบบนี้ และหลังจากซ่อมแซมครั้งใหญ่เสร็จแล้ว ข้าพเจ้าถึงตระหนักได้ว่าพวกมันไม่เหมาะสำหรับใช้งานเป็นโพรบวิจัยเลยแม้แต่น้อย"
 country.1010.d:0 "การสนทนานี้จบลงแล้ว"
 country.1015.name:0 "ปรารถนาการเดินทาง: โดรน"
 country.1015.desc:0 "เก้าอี้วิจัยได้หายตัวไปอย่างลึกลับอีกครั้ง\n\nอย่างไรก็ตาม พวกเขาได้ทิ้งโดรนจำนวนหนึ่งไว้ตามสัญญา โดรนเหล่านั้นติดอาวุธ และระบบอาวุธของพวกมันกำลังเริ่มทำงาน!"
 country.1020.name:0 "ปรารถนาการเดินทาง: โดรนถูกทำลาย"
 country.1020.desc:1 "โมดูลระบุฝ่าย(ไอเอฟฟี)ของโดรนถูกถอดออกไปแล้ว น่าจะเป็นผลมาจากการซ่อมแซมของหัวหน้าฝ่ายวิจัย แต่ตัวประมวลผลประเมินภัยคุกคามยังคงทำงานอยู่และดูเหมือนจะรับแรงตึงเครียดจากกระบวนการปรับแต่งของหัวหน้าฝ่ายวิจัย\n\nไม่น่าเป็นไปได้ที่หัวหน้าฝ่ายวิจัยจะตั้งใจให้โดรนโจมตีเรา แต่ข้อเท็จจริงคือพวกมันช่วยเบี่ยงเบนความสนใจเพื่อให้เขาสามารถหลบหนีไปได้อย่างราบรื่น\n\nตรวจสอบบันทึกสถานการณ์เพื่อรับโครงการพิเศษ §Yโครงการพิเศษ§! เพื่อสะกดรอยตามหัวหน้าวิจัยจากตำแหน่งล่าสุดที่ทราบ"
 country.1022.name:0 "ปรารถนาการเดินทาง: โดรนพ่ายแพ้"
 country.1022.desc:1 "ดูเหมือนว่าโดรนที่นักวิจัยทิ้งไว้จะถูกทำลายโดยสิ่งใดสิ่งหนึ่งหรือใครบางคนแล้ว\n\nเราควรฉวยโอกาสนี้เพื่อหาเบาะแสและสะกดรอยตามหัวหน้าฝ่ายวิจัย\n\n§Yโครงการพิเศษ§! ได้รับการเพิ่มลงในบันทึกสถานการณ์แล้ว"
 country.1025.name:0 "ปรารถนาการเดินทาง: โครงการพิเศษเสร็จสิ้น"
 country.1025.desc:0 "หลังจากถอดรหัสเครือข่ายสัญญาณพลังงานที่ซับซ้อนซึ่งยานวิทยาศาสตร์ของหัวหน้าวิจัยทิ้งไว้แล้ว ตอนนี้เราสามารถสะกดรอยตามพวกเขาได้อีกครั้ง\n\nตรวจสอบรายละเอียดเพิ่มเติมได้ในบันทึกสถานการณ์"
 country.1030.name:0 "ปรารถนาการเดินทาง: กำลังตกที่นั่งลำบาก"
 country.1030.desc:0 "ยานวิทยาศาสตร์ล่องหนยังคงตรวจจับได้ยาก แต่ดูเหมือนจะไม่ยากเกินความสามารถ\n\nสัญญาณเซ็นเซอร์ที่สับสนปนเปซึ่งเราตรวจพบว่าเป็นยานของหัวหน้าวิจัยนั้น ถูกขนาบข้างทั้งสองด้านด้วยยานระดับลวดลายที่ดูน่ากลัวคู่หนึ่ง\n\nหัวหน้าฝ่ายวิจัยสาขาฟิสิกส์กำลังติดต่อเรามา"
 country.1035.name:1 "หัวหน้าฝ่ายวิจัย" # diplo w/ scientist
 country.1035.desc:0 "สวัสดีท่าน [Root.GetRulerTitle]\n\nการได้เห็นยานของชาว [Root.GetSpeciesName] เป็นภาพที่น่ายินดียิ่งนัก ข้าพเจ้าเกรงว่าการปรากฏตัวอย่างกะทันหันของข้าพเจ้าในระบบนี้อาจทำให้สิ่งมีชีวิตต่างดาวบนยานที่กำลังล้อมรอบข้าพเจ้าอยู่นี้โกรธเคือง\n\nการช่วยเหลือใดๆ ในการแก้ไขข้อผิดพลาดที่ข้าพเจ้าอาจได้กระทำลงไปจะเป็นพระคุณอย่างยิ่ง ข้าพเจ้ายินดีที่จะแบ่งปันข้อมูลเกี่ยวกิจการสำรวจของข้าพเจ้าทันทีที่ปัญหานี้ได้รับการคลี่คลาย"
 country.1035.a:0 "ทำไมท่านต้องหนีไป?"
 country.1035.a.response:0 "หนีหรือ? ข้าพเจ้าแค่จากมาต่างหาก\n\nข้าพเจ้ารู้ว่าท่านอาจจะไม่พอใจกับการกระทำของข้าพเจ้านัก ท่าน [Root.GetRulerTitle] แต่ข้าพเจ้าไม่อาจยอมเสี่ยงให้งานวิจัยของข้าพเจ้าต้องจมปลักอยู่กับการเมืองหยุมหยิมของแวดวงวิทยาศาสตร์ของชาว [Root.GetSpeciesName]\n\nนอกเหนือจากนั้น ข้าพเจ้ายังมีงานวิจัยภาคสนามที่ต้องทำ และตอนนี้ก็ยังทำอยู่"
 country.1035.b:0 "บอกข้อมูลเพิ่มเติมเกี่ยวกับหน้าต่างนี้ให้เราฟังสีก่อน"
 country.1035.b.response:0 "ข้าพเจ้ายังไม่ค่อยอยากลงรายละเอียดในเวลานี้ ข้าพเจ้าไม่อยากดูเหมือนคนโง่เขลา หากผลลัพธ์ปรากฏว่าข้าพเจ้าเข้าใจผิดไปเอง\n\nแต่สุดท้ายแล้ว พวกเราทั้งหมดอาจเป็นแค่ภาพโฮโลแกรมก็ได้ไม่ใช่หรือ? มันคุ้มค่าที่จะลองไม่ใช่หรืออย่างไร?"
 country.1035.c:0 "เราจะพยายามพาคุณออกจากสถานการณ์อันยุ่งเหยิงนี้"
 country.1040.name:0 "โจรสลัดซันบลาสเตอร์" # diplo w/ pirates
 country.1040.desc:0 "ไสหัวไปซะ! พวกเราเจอยานผีสิงผุๆ ลำนี้ก่อน\n\nเมื่อเราหาวิธีตรวจจับมันได้ชัดๆ เมื่อไหร่ มันก็ตกเป็นของเราแน่นอน ยานนี้เป็นของเรา ไม่ใช่ของพวกแก และกัปตันของมันก็ต้องตาย"
 country.1040.a:0 "แกจะต้องเสียใจที่บังอาจมาขัดขวางพวกเรา เจ้าพวกเศษขยะต่างดาว" # fanatic xenophobe
 country.1040.a.response:0 "ปากดีนักนะเจ้าตัวอัปลักษณ์ นี่ไม่ใช่ครั้งแรกที่เราลุยงานแบบนี้หรอกนะ เจ้าหนู"
 country.1040.b:0 "ข้อเสนอ 150 เครดิตพลังงานแลกกับยานลำนี้" # fanatic or regular pacifist, pay off
 country.1040.c:0 "เตรียมอาวุธให้พร้อม" # beat them up
 country.1040.d:0 "จงออกไปเสียตอนนี้ แล้วแกอาจจะมีชีวิตรอด" # empty threat?
 country.1040.d.response:0 "คำขู่ที่เลื่อนลอย! แกอยู่ห่างไกลจากบ้านเกิดเมืองนอนมากนะ เจ้าหน้าจืด\nโจรสลัดซันบลาสเตอร์คือผู้ครอบครองดวงดาวเหล่านี้"
 country.1041.name:0 "โจรสลัดซันบลาสเตอร์"
 country.1041.desc:0 "150 เครดิตพลังงานรึ? แทบไม่ได้เศษเสี้ยวความร่ำรวยของเราเลยด้วยซ้ำ เจ้าพวกหน้าจืด แต่...\n\nเหอะ ยานผีสิงโสโครกนี่สร้างปัญหาให้เรามากกว่าที่มันควรจะเป็นซะอีก\n\nสเกตเคอร์!พวกเราไปล่ะ!\n"
 country.1041.a:0 "จงภาวนาอย่าให้เราได้เจอกันอีกเลย เจ้าพวกคนถ่อย"
 country.1041.b:0 "สรรพสิ่งล้วนไม่จีรังยั่งยืน โดยเฉพาะทรัพย์สินเงินทอง"
 country.1041.c:0 "เงินคืออำนาจ บางครั้งเราก็ต้องใช้อำนาจเพื่อเรียกร้องสิ่งที่เราต้องการ"
 country.1041.d:0 "โปรดจากไปเสียที"
 country.1042.name:0 "โจรสลัดซันบลาสเตอร์"
 country.1042.desc:0 "เจ้าคนเขลาจำเป็นต้องได้รับบทเรียนเสียบ้าง\n\nสเกตเคอร์!ประจำที่อาวุธ!"
 country.1042.a:0 "แกจะได้ลิ้มรสแสนยานุภาพทางทหารของชาว [Root.GetSpeciesNamePlural]"
 country.1044.name:1 "หัวหน้าฝ่ายวิจัย"
 country.1044.desc:0 "ข้าพเจ้าอดไม่ได้ที่จะได้ยินบทสนทนาเป็นช่วงๆ—ท้ายที่สุดแล้วพวกเขาก็กระจายเสียงในช่องเปิดทั่วไป\n\nข้าพเจ้าเข้าใจว่าการเจรจาผ่านพ้นไปด้วยดีนะ"
 country.1045.name:1 "หัวหน้าฝ่ายวิจัย" # diplo w/ scientist, situation resolved
 country.1045.desc:0 "ข้าพเจ้าเห็นว่าท่านจัดการกับพวกโจรสลัดได้อย่างรวดเร็ว ท่าน [Root.GetRulerTitle]\nในฐานะนักวิทยาศาสตร์ ข้าพเจ้าเกลียดชังความรุนแรง... แต่ก็ยอมรับว่ามันอาจจำเป็นในกรณีนี้ ข้าพเจ้าสงสัยอย่างยิ่งว่าตนเองคงจะไม่ได้รับความกรุณาจากเงื้อมมือของพวกโจรสลัดเหล่านั้นเป็นแน่"
 country.1045.a:0 "ถูกต้อง ตอนนี้ จงพูดมา"
 country.1045.a.response:0 "โอ้ ใช่ แน่นอน\nมันมี... ข้าพเจ้าจะไม่ทำให้ท่านเบื่อกับรายละเอียดต่างๆ หรอกนะ ท่าน [Root.GetRulerTitle] แต่มันมีแนวคิดนี้ที่ว่า ไม่มีสิ่งใดที่เป็นจริง หรือสิ่งที่เราคิดว่าเป็นจริงนั้นแท้จริงแล้วไม่ใช่ มันเป็นจริงน้อยกว่าสิ่งอื่น ตัวข้าพเจ้า ตัวท่านเอง ท่าน [Root.GetRulerTitle] แม้กระทั่งกฎแห่งธรรมชาติที่เราถือเป็นสัจนิรันดร์—ล้วนไม่มีอะไรนอกจากกลลวงตาของแสง จักรวาลเป็นเพียงการสะท้อน ภาพโฮโลแกรม หรือปริซึมที่หักเหรังสีอันเจิดจ้าของความจริงแท้เท่านั้น\n\nเห็นไหมล่ะ? แสงสว่างนั้นต้องมีแหล่งที่มา ผ่าน 'หน้าต่าง' นั้นมา"
 country.1045.b:0 "ท่านต้องกลับไปยัง [Root.Capital.GetName] ในทันที"
 country.1046.name:1 "หัวหน้าฝ่ายวิจัย" # diplo, immediate followup, gain phys
 country.1046.desc:0 "ท่านก็รู้ว่าข้าพเจ้าจะไม่ทำเช่นนั้น ท่าน [Root.GetRulerTitle]\nในความเป็นจริง หลังจากได้ไตร่ตรองถึงความเป็นไปได้เพิ่มเติมแล้ว ข้าพเจ้าเชื่อว่ามีความเสี่ยงอย่างมีนัยสำคัญที่ข้าพเจ้าจะไม่สามารถกลับมาได้ภายในกรอบเวลาที่สมเหตุสมผล\n\nข้าพเจ้าถือวิสาสะอัปโหลดข้อมูลการวิจัยทั้งหมดที่มีซึ่งอาจเป็นประโยชน์ต่อชาว [Root.GetSpeciesName] ไปยังฐานข้อมูลบน [Root.Capital.GetName] แล้ว อย่างไรก็ตาม ข้อมูลเกี่ยวกับหน้าต่างนั้นจะยังคงอยู่กับข้าพเจ้า ข้าพเจ้าเริ่มคิดว่าตนเองยังไม่พร้อม และแน่นอนว่ายังไม่มีใครพร้อมเช่นกัน\nข้าพเจ้าขอตัวไปก่อน"
 country.1046.a:0 "ช้าก่อน--"
 country.1047.name:0 "ปรารถนาการเดินทาง: ม่านบังตา"
 country.1047.desc:1 "การตรวจสอบอย่างรวดเร็วยืนยันคำกล่าวอ้างของหัวหน้าวิจัย และ [Root.GetName] ก็ได้รับประโยชน์จากการพัฒนางานวิจัยฟิสิกส์ร่วมกันของเราเพิ่มขึ้นเล็กน้อย\n\nนักวิจัยได้หายตัวไปอีกครั้ง แต่ครั้งนี้ทิศทางของพวกเขาได้รับการคาดเดาไว้ก่อนที่พวกเขาจะออกจากระบบเสียด้วยซ้ำ\n\nหากพวกเขากำลังมุ่งหน้าไปยังหน้าต่างนี้ พวกเราก็เช่นกัน\nตรวจสอบรายละเอียดเพิ่มเติมได้ในบันทึกสถานการณ์"
 country.1050.name:0 "ปรารถนาการเดินทาง: หน้าต่างเปิดออก" # final catchup
 country.1050.desc:0 "เป็นครั้งแรกที่ยานวิทยาศาสตร์ต้นแบบปรากฏเด่นชัดบนเซ็นเซอร์ มันโคจรอยู่ใกล้ดาวฤกษ์ของระบบอย่างน่าอันตราย แต่ดูเหมือนไม่มีอะไรผิดปกติในด้านอื่น\n\nการสแกนด้วยสายตาอย่างง่ายเผยให้เห็นความลับของยาน ตัวยานเป็นแบบมาตรฐานที่ได้รับการปรับแต่งโดยไม่มีความซับซ้อนมากนัก โดยขณะนี้มีเส้นโลหะพาดผ่านขวางกันไปมาซึ่งน่าจะทำหน้าที่เป็นแม่เหล็กไฟฟ้าสลับกระแสไฟฟ้าที่ควบคุมอย่างเข้มงวด การอยู่ใกล้ดาวฤกษ์ทำให้ยานสามารถบิดเบือนการแผ่รังสีของดวงดาวได้เล็กน้อย โดยห่อหุ้มคลื่นพลังงานรอบตัวเพื่อเป็นรูปแบบการพรางตัว\n\nแม้ว่าจะเป็นแนวคิดที่น่าสนใจ แต่เทคนิคนี้มีข้อเสียในทางปฏิบัติอย่างเห็นได้ชัด ดังจะเห็นได้จากระบบทั้งหมดที่ถูกแผดเผาจนใช้งานไม่ได้เนื่องจากการสัมผัสกับรังสีของดวงอาทิตย์เป็นเวลานาน"
 country.1051.name:1 "หัวหน้าฝ่ายวิจัย" # start of final diplo w/ scientist
 country.1051.desc:0 "สวัสดีท่าน [Root.GetRulerTitle]\n\nมันดูสมเหตุสมผลอย่างยิ่งที่จะคาดเดาว่าท่านจะตามมาอีกครั้ง\n\nดังนั้น ข้าพเจ้าจึงทำเช่นนั้น"
 country.1051.a:1 "จะทำอย่างไรต่อไป หัวหน้าฝ่ายวิจัย?"
 country.1051.a.response:0 "ข้าพเจ้าคิดว่าตนเองได้พบ 'หน้าต่าง' แล้ว หรืออย่างน้อยก็เป็นหน้าต่างบานหนึ่ง อาจจะมีบานอื่นๆ อีก ตัวตนที่แท้จริงของเราอยู่เบื้องหลังนั้นหรือไม่? หรือมีสิ่งใดอยู่หรือไม่? ข้าพเจ้าต้องสารภาพว่าไม่มีเบาะแสใดๆ เลย ข้าพเจ้ายอมรับว่าผู้อื่นอาจไม่ได้รับประโยชน์จากความรู้ใดๆ ที่ข้าพเจ้าได้รับ แต่การจะหยุดอยู่ตรงนี้คงเป็นการกระทำที่ขาดความรับผิดชอบอย่างสิ้นเชิง"
 country.1051.b:0 "ท่านจะทำอย่างไร?"
 country.1051.b.response:0 "ข้าพเจ้าจะพยายามเดินทางผ่านหน้าต่างนั้นไปสู่ความเป็นจริง แสงสว่างแห่งความจริงไม่ได้ส่องผ่านช่องทางนี้เพียงอย่างเดียวแน่นอน จักรวาลทั้งหมดเปรียบเสมือนกระจกบานใหญ่ และพวกเราก็เป็นเพียงรอยบิดเบี้ยวและจุดบกพร่องเล็กๆ บนนั้นที่ได้รับชีวิตจากความเจิดจรัสเบื้องหลัง\n\nนี่คือหน้าต่าง เพราะข้าพเจ้าเชื่อว่ามันสามารถเปิดออกได้"
 country.1051.c:0 "การกระทำของท่านนั้นบ้าระห่ำและอันตรายยิ่งนัก"
 country.1052.name:1 "หัวหน้าฝ่ายวิจัย" # second phase
 country.1052.desc:0 "ข้าพเจ้ารู้สึกเสียใจจริงๆ กับปัญหาทั้งหมดที่ข้าพเจ้าได้ก่อขึ้น ท่าน [Root.GetRulerTitle] ข้าพเจ้าเสียใจจริงๆ อย่างไรก็ตาม ข้าพเจ้าไม่ได้ติดค้างอะไรกับ [Root.GetName] ข้าพเจ้าได้ชดใช้ในส่วนของตนเองอย่างครบถ้วนแล้วและข้าพเจ้ามั่นใจในเรื่องนี้ ท่านตามหาข้าพเจ้าด้วยความสมัครใจของท่านเอง และข้าพเจ้าก็ซาบซึ้งในความช่วยเหลือของท่าน แต่ข้าพเจ้าได้แสดงเจตนาอย่างชัดเจนตั้งแต่แรกเริ่มแล้ว"
 country.1052.a:0 "เราจะลืมเรื่องราวทั้งหมดนี้ไป ขอเพียงท่านกลับบ้านก็พอ"
 country.1052.b:0 "ท่านจะต้องถูกนำตัวเข้าสู่การพิจารณาคดี"
 country.1053.name:1 "หัวหน้าฝ่ายวิจัย"
 country.1053.desc:0 "หน้าต่างเปิดออกแล้ว ท่าน [Root.GetRulerTitle]\n\nลาก่อน"
 country.1053.a:1 "หัวหน้าฝ่ายวิจัย?"
 country.1055.name:0 "ปรารถนาการเดินทาง: หน้าต่างปิดลง"
 country.1055.desc:0 "ยานวิทยาศาสตร์ว่างเปล่า\n\nชุดอวกาศสำหรับปฏิบัติงานนอกยานทั้งหมดยังคงอยู่ในตู้ และบันทึกของยานระบุว่าห้องปรับความดัน(แอร์ล็อค)ไม่เคยผ่านกระบวนการเปิดใช้งานเพื่อออกไปภายนอกเลย\n\nยานยังคงโคจรอยู่รอบดาวฤกษ์ แต่ตอนนี้อยู่ภายใต้การควบคุมของชาว [Root.Owner.GetSpeciesAdj] แล้ว"
 country.1055.a:0 "จุดจบที่น่าสะพรึงกลัว"
 country.1055.a.tooltip:0 "ยานวิทยาศาสตร์ได้รับการยึดคืนแล้ว และฟังก์ชันพื้นฐานส่วนใหญ่ยังคงใช้งานได้\n"
 country.1061.name:0 "ปรารถนาการเดินทาง: โจรสลัดถูกทำลาย"
 country.1061.desc:1 "กลุ่มโจรสลัดซันบลาสเตอร์ที่คุกคามหัวหน้าฝ่ายวิจัยได้ถูกทำลายลงโดยฝีมือของผู้อื่นที่ไม่ใช่เรา\n\nหัวหน้าฝ่ายวิจัยฟิสิกส์กำลังติดต่อเรามา"

 ### Mass Extinction Starting Event Chain

 country.1100.name:0 "การสูญพันธุ์ครั้งใหญ่"
 country.1100.desc:0 "ก้าวแรกของเราสู่อวกาศอันกว้างใหญ่เบื้องหลัง §Y[Root.Capital.GetName]§! ไม่ได้ขับเคลื่อนด้วยความอยากรู้อยากเห็นหรือการพิชิตดินแดนเท่านั้น แต่ยังขับเคลื่อนด้วยความจำเป็นอีกด้วย\n\nชีวมณฑลของ §Y[Root.Capital.GetName]§! ได้เปลี่ยนแปลงไปอย่างรวดเร็ว โดยนักวิทยาศาสตร์เตือนถึงเหตุการณ์การสูญพันธุ์ครั้งใหญ่ที่อาจเกิดขึ้น ซึ่งเป็นกระบวนการล้างบางสิ่งมีชีวิตตามวัฏจักรของการดำรงอยู่ของดาวเคราะห์ในห้วงอวกาศ\n\nแผนการวิจัยได้รับการพัฒนาขึ้นเพื่อศึกษาดาวเคราะห์ที่กลายเป็นดินแดนที่ไม่สามารถอยู่อาศัยได้เนื่องจากเหตุการณ์ทางดาราศาสตร์ครั้งสำคัญ ด้วยการสร้างเหตุการณ์เหล่านี้ขึ้นมาใหม่ เราหวังว่าจะหลีกเลี่ยงชะตากรรมที่คล้ายคลึงกันสำหรับ §Y[Root.Capital.GetName]§! และเผ่าพันธุ์ §Y[Root.GetSpeciesName]§!"
 country.1100.a:0 "เพื่ออนาคตของชาว [Root.GetSpeciesAdj]"
 country.1100.owned:0 "มันตั้งอยู่ในดินแดนต่างชาติ จงค้นหาเป้าหมายอื่น"
 country.1105.name:0 "การสูญพันธุ์ครั้งใหญ่: ดาวเคราะห์ที่แตกสลาย"
 country.1105.desc:0 "นักดาราศาสตร์ของเรามั่นใจว่าแถบดาวเคราะห์น้อยในระบบนี้เคยเป็นดาวเคราะห์ที่อยู่อาศัยได้ ซึ่งถูกฉีกออกเป็นชิ้นๆ ด้วยกองกำลังที่ไม่ทราบที่มา\n\n§Yโครงการพิเศษ§! ได้รับการจัดตั้งขึ้นเพื่อศึกษาดาวเคราะห์น้อยขนาดใหญ่ดวงหนึ่งในแถบนี้"
 country.1110.name:0 "การสูญพันธุ์ครั้งใหญ่: ดาวเคราะห์ที่แผดเผา"
 country.1110.desc:0 "ดาวเคราะห์ดวงหนึ่งที่โคจรรอบดาวฤกษ์ดวงนี้ยังมีบาดแผลที่ยังไม่ปิดสนิทจากภัยพิบัติในอดีต พื้นผิวของมันเป็นทะเลเดือดของแร่ธาตุที่กึ่งหลอมละลายซึ่งเดือดเป็นไอเข้าสู่ชั้นบรรยากาศที่มีความร้อนสูงยิ่งยวด แต่นักดาราศาสตร์ชาว [Root.GetSpeciesAdj] อ้างว่ามันอาจเคยเอื้อต่อสิ่งมีชีวิตมาก่อน\n\n§Yโครงการพิเศษ§! ได้รับการจัดตั้งขึ้นเพื่อศึกษาดาวเคราะห์ที่หลอมเหลวดวงนี้"
 country.1115.name:0 "การสูญพันธุ์ครั้งใหญ่: ดาวเคราะห์ที่รกร้าง"
 country.1115.desc:0 "ดาวเคราะห์ดวงหนึ่งในระบบนี้ยังคงมีร่องรอยฟอสซิลของระบบนิเวศในอดีตให้เห็นได้อย่างชัดเจน อะไรกันที่เปลี่ยนชีวมณฑลอันรุ่งเรืองให้กลายเป็นดินแดนรกร้างว่างเปล่าที่แห้งแล้ง?\n\n§Yโครงการพิเศษ§! ได้รับการจัดตั้งขึ้นเพื่อค้นหาแหล่งที่มาของการเปลี่ยนรูปอันเลวร้ายนี้"
 country.1120.name:0 "การสูญพันธุ์ครั้งใหญ่: ดาวเคราะห์ก๊าซพิษ"
 country.1120.desc:0 "ตามหลักฐานระบุว่า พืชและสัตว์บนดาวเคราะห์ดวงนี้ขาดใจตายจากสารพิษที่ปล่อยออกมาเอง ซึ่งน่าจะมีส่วนช่วยจากการปลดปล่อยก๊าซที่มีปฏิกิริยารุนแรงจากใต้เปลือกโลก\n\n§Yโครงการพิเศษ§! ได้รับการจัดตั้งขึ้นเพื่อสืบสวนหาสาเหตุของเรื่องนี้"
 country.1125.name:0 "การสูญพันธุ์ครั้งใหญ่: ดาวเคราะห์เยือกแข็ง"
 country.1125.desc:0 "ดาวเคราะห์ที่น่าสนใจในระบบนี้ปกคลุมไปด้วยน้ำแข็งหนาทึบชั้นแล้วชั้นเล่าที่มีองค์ประกอบแตกต่างกันออกไป ดูเหมือนว่ามันเคยเป็นที่อยู่อาศัยของระบบนิเวศที่หลากหลายและน่าอภิรมย์มากกว่านี้\n\n§Yโครงการพิเศษ§! ได้รับการจัดตั้งขึ้นเพื่อตรวจสอบความเป็นไปได้นี้"
 country.1130.name:0 "การสูญพันธุ์ครั้งใหญ่: ดาวเคราะห์น้อย"
 country.1130.desc:0 "ดาวเคราะห์น้อยดวงนี้แท้จริงแล้วคือเศษชิ้นส่วนของดาวเคราะห์ที่เคยอยู่อาศัยได้ และอาจมีผู้อยู่อาศัยมาก่อน รูปแบบรอยแตกที่สม่ำเสมอแต่ซ้อนทับกันบ่งชี้ว่าการทำลายดาวเคราะห์ดวงนี้เป็นความตั้งใจและมีการควบคุม แม้ว่าจะเร่งรีบไปบ้างก็ตาม\n\nสัญญาณทั้งหมดชี้ว่าดาวดวงนี้เป็นดาวบ้านเกิดของเผ่าพันธุ์ใดก็ตามที่ทำลายมัน เราอาจไม่มีวันรู้ว่าอะไรทำให้พวกเขาถือว่าการทำลายล้างดาวเคราะห์เป็นทางเลือกที่แย่น้อยกว่า และบางทีเราควรจะรู้สึกขอบคุณสำหรับเรื่องนั้น"
 country.1135.name:0 "การสูญพันธุ์ครั้งใหญ่: ดาวเคราะห์หลอมเหลว"
 country.1135.desc:0 "ชะตากรรมอันน่าสลดใจของดาวเคราะห์ดวงนี้สามารถโทษได้ว่าเป็นเพราะความผันผวนของห้วงอวกาศอย่างแท้จริง\n\nความแปรปรวนของแรงโน้มถ่วงซึ่งนักวิทยาศาสตร์ของเราสงสัยว่าเป็นความผิดปกติทางกาลเวลาชั่วคราว ได้บีบให้ดาวเคราะห์หลุดจากวงโคจรธรรมชาติไปสู่วงโคจรที่ใกล้กับดวงอาทิตย์มากเกินไป แม้ว่าดาวเคราะห์จะค่อยๆ วนกลับสู่วงโคจรเดิมอย่างช้าๆ แต่มันก็ถูกแผดเผาด้วยความร้อนที่หลงเหลือจากดาวฤกษ์ตั้งแต่นั้นเป็นต้นมา"
 country.1140.name:0 "การสูญพันธุ์ครั้งใหญ่: ดาวเคราะห์ร้าง"
 country.1140.desc:0 "สิ่งมีชีวิตบนดาวเคราะห์ที่ตอนนี้แห้งแล้งและร้างผู้คนนี้ถูกกำหนดชะตากรรมไว้ตั้งแต่แรกเริ่ม\n\nเผ่าพันธุ์เด่นมีเวลาเพียงน้อยนิดในการตื่นรู้สู่การมีสติปัญญาและคิดค้นการเกษตร ก่อนที่กลไกทางธรณีวิทยาจะทำให้ผืนดินเสื่อมโทรมลง\n\nตัวอย่างจากชั้นดินที่ต่ำกว่าและซากฟอสซิลแสดงให้เห็นว่าแร่ธาตุสำคัญที่จำเป็นในการฟื้นฟูดินกลับไปสะสมอยู่ในโครงกระดูกภายในของสิ่งมีชีวิตในท้องถิ่นเหล่านั้น\n\nกระดูกของพวกเขาแปรสภาพเป็นฟอสซิลแทนที่จะย่อยสลาย และการดำรงอยู่ของพวกเขาก็ทำให้ระบบนิเวศที่เปราะบางแห้งแล้งลง ทำให้มันเปลี่ยนแปลงไปอย่างถาวร"
 country.1145.name:0 "การสูญพันธุ์ครั้งใหญ่: สารพิษ"
 country.1145.desc:0 "รอยแยกบนเปลือกโลกซึ่งในตอนแรกคิดว่าเกิดจากการเคลื่อนตัวของแผ่นเปลือกโลก แท้จริงแล้วเป็นรอยประทับที่ยาวนานของรากไม้ขนาดมหึมาที่ชอนไชผ่านผืนดิน\n\nณ จุดหนึ่งในอดีต การกลายพันธุ์ที่อาจเกิดขึ้นจากสิ่งมีชีวิตมีสติปัญญาทำให้พืชในท้องถิ่นเติบโตอย่างควบคุมไม่ได้ พืชเหล่านี้หลายชนิดสืบพันธุ์ผ่านการผสมเกสร โดยมีละอองเรณูจำนวนนับไม่ถ้วนถูกพัดพาไปตามกระแสลมในชั้นบรรยากาศส่วนล่าง\n\nสิ่งที่เคยเป็นเพียงความระคายเคืองเล็กๆ น้อยๆ ได้ลุกลามใหญ่โต เนื่องจากอนุภาคในชั้นบรรยากาศที่เพิ่มขึ้นได้อุดตันทางเดินหายใจและพรากชีวิตสัตว์ทั้งหมดบนดาวเคราะห์ไปภายในไม่กี่เดือน"
 country.1150.name:0 "การสูญพันธุ์ครั้งใหญ่: ดาวเคราะห์เยือกแข็ง"
 country.1150.desc:0 "การเปลี่ยนแปลงทางเคมีที่ผิดธรรมชาติในชั้นบรรยากาศส่งผลให้เกิดยุคน้ำแข็งอย่างช้าๆ ซึ่งเริ่มต้นขึ้นก่อนการสถาปนา [Root.Owner.GetName] และมีแนวโน้มที่จะดำเนินต่อไปอีกนานหลังจากการจากไปของเรา\n\nยังไม่ทราบสาเหตุที่แน่ชัด แต่คำอธิบายที่เป็นไปได้รวมถึงความพยายามปรับสภาพดาวที่ล้มเหลว หรือการก่อการร้ายภายในดาวเคราะห์ นักวิทยาศาสตร์หัวรุนแรงบางกลุ่มในแวดวงวิทยาศาสตร์บนดาว [Root.Owner.Capital.GetName] เสนอว่าการเปลี่ยนแปลงของสภาพภูมิอากาศอาจเกิดจากการปล่อยผลพลอยได้จากอุตสาหกรรมอย่างไม่มีการควบคุม\n\nมุมมองนี้ถูกจำกัดอยู่เพียงกลุ่มย่อยที่อยู่นอกกระแสหลัก เนื่องจากไม่น่าเป็นไปได้ที่เผ่าพันธุ์ใดที่มีสติปัญญาพอที่จะพัฒนาอุตสาหกรรมจะโง่เขลาพอที่จะล้างบางตัวเอง"
 country.1150.desc.industrialist:0 "การเปลี่ยนแปลงทางเคมีที่ผิดธรรมชาติในชั้นบรรยากาศส่งผลให้เกิดยุคน้ำแข็งอย่างช้าๆ แต่ไม่อาจย้อนกลับคืนมาได้—ซึ่งเริ่มต้นขึ้นก่อนการสถาปนา [Root.Owner.GetName] และมีแนวโน้มที่จะดำเนินต่อไปอีกนานหลังจากการจากไปของเรา\n\nสาเหตุดูเหมือนจะคุ้นเคยจากประสบการณ์การพัฒนาอุตสาหกรรมบนดาวเคราะห์ของเราเอง: การปล่อยสารผลพลอยได้ที่เป็นก๊าซจากอุตสาหกรรมเข้าสู่ชั้นบรรยากาศโดยไม่มีการควบคุมทำให้เกิดการเปลี่ยนแปลงสภาพภูมิอากาศอย่างรุนแรงซึ่งพวกเขาขาดเทคโนโลยีในการรับมือ\n\nข้อสรุปนี้สร้างความกังวลให้กับแวดวงวิทยาศาสตร์ของเรา แม้ว่าส่วนใหญ่จะชี้ว่าในระดับเทคโนโลยีปัจจุบันของเรา เหตุการณ์การสูญพันธุ์เช่นนี้ "อาจจะ" สามารถหลีกเลี่ยงได้"
 country.1155.name:0 "การสูญพันธุ์ครั้งใหญ่: การศึกษาเสร็จสิ้น"
 country.1155.desc:0 "แม้ว่าการสำรวจวิจัยมักจะให้ผลลัพธ์ที่คาดไม่ถึง แต่นักวิทยาศาสตร์ชาว [Root.GetSpeciesAdj]ก็สามารถเข้าถึงคลังข้อมูลจำนวนมหาศาลอย่างที่ไม่เคยมีมาก่อนเพื่อสร้างแบบจำลองอนาคตของ [Root.Capital.GetName] ได้อย่างแม่นยำ\n\nรายงานเบื้องต้นระบุว่า [Root.Capital.GetName] จะไม่มีอันตรายที่แท้จริงใดๆ ไปอีกอย่างน้อยสิบกว่ารุ่นอายุคน ยกเว้นเหตุการณ์แปลกประหลาดในอวกาศหรือการล่มสลายอย่างรุนแรงของ [Root.GetName]"
 country.1155.a:0 "เรายังสามารถเรียนรู้อะไรเพิ่มได้อีกจากดาวเคราะห์เหล่านี้?"
 country.1155.b:0 "ชาว [Root.GetSpeciesName] ควรจะได้รับการคลายกังวล"
 country.1155.c:0 "เปิดเผยข้อมูลดาวเคราะห์สู่สาธารณะ"
 country.1156.name:0 "การสูญพันธุ์ครั้งใหญ่: สแกนระบบเสร็จสิ้น"
 country.1156.desc:0 "แม้ว่าข้อมูลเกี่ยวกับระบบดาวโดยรวมจะค่อนข้างขาดหายไปในบางจุด แต่การศึกษาอย่างละเอียดเกี่ยวกับดาวเคราะห์แต่ละดวงช่วยให้ [Root.GetName] สามารถคาดการณ์ข้อมูลสแกน(ร้องไห้)ที่สมบูรณ์สำหรับระบบที่กำลังเป็นปัญหาได้"
 country.1156.a:0 "ยอดเยี่ยมมาก"
 country.1157.name:0 "การสูญพันธุ์ครั้งใหญ่: ความศรัทธาในอนาคต"
 country.1157.desc:0 "ประชาชนเริ่มกระวนกระวายใจมากขึ้นเรื่อยๆ เมื่อข่าวสารของงานวิจัยค่อยๆ แพร่สะพัดออกไปทางสื่อ ในตอนนี้เรามีโอกาสที่จะขจัดข้อสงสัยและความกลัวทั้งหมดของพวกเขาให้หมดสิ้นไปในคราวเดียว"
 country.1157.a:0 "ดาวบ้านเกิดปลอดภัยดี"
 country.1157.b:0 "อีกหนึ่งความสำเร็จในการดำเนินงานโดย [Root.GetRulerTitle]"
 country.1158.name:0 "การสูญพันธุ์ครั้งใหญ่: การเผยแพร่ข้อมูล"
 country.1158.desc:0 "ข้อมูลที่รวบรวมได้จากการสำรวจวิจัยเป็นทรัพย์สินของ [Root.GetName] และมีการจำกัดการเข้าถึง เป็นมาตรการป้องกันที่กำหนดขึ้นตั้งแต่เนิ่นๆ เพื่อป้องกันข้อสรุปที่เร่งรีบและไม่พึงประสงค์\n\nเมื่อการศึกษานี้เสร็จสิ้นลงแล้ว มีกลุ่มผู้มีอิทธิพลพยายามเรียกร้องอย่างจริงจังให้ปล่อยข้อมูลที่เกี่ยวข้องทั้งหมดให้แก่แวดวงวิทยาศาสตร์ในวงกว้าง"
 country.1158.a:0 "ตกลง"

 ####################################
 # Narrative Events
 ####################################

 story.1.name:0 "รายงานการพบเจอ: สิ่งมีชีวิตรูปแบบเรียบง่าย"
 story.1.desc:1 "[Root.GetName] กำลังคึกคักไปด้วยข่าวสารของสิ่งมีชีวิตต่างดาวที่ค้นพบเมื่อไม่นานมานี้\n\nแม้ว่าจะห่างไกลจากความฉลาด แต่ก็ยังมีชีวิตอยู่ที่นั่นข้างนอกนั่น"
 story.1.desc.phobe:1 "[Root.GetName] กำลังคึกคักไปด้วยข่าวสารของสิ่งมีชีวิตต่างดาวที่ค้นพบเมื่อไม่นานมานี้\n\nแม้ว่าจะห่างไกลจากความฉลาด แต่ก็ยังมีชีวิตอยู่ที่นั่นข้างนอกนั่น มันเป็นความจริงที่ไม่อาจหลีกเลี่ยงได้ และเป็นอนาคตที่น่ากังวลอย่างยิ่ง"
 story.1.desc.phile:1 "[Root.GetName] กำลังคึกคักไปด้วยข่าวสารของสิ่งมีชีวิตต่างดาวที่ค้นพบเมื่อไม่นานมานี้\n\nสิ่งมหัศจรรย์ทางวิวัฒนาการเล็กๆ เหล่านี้จุดประกายให้ชาว [Root.GetSpeciesAdj] มีความหวังครั้งใหม่สำหรับการเผชิญหน้าครั้งแรกกับสิ่งมีชีวิตที่มีสติปัญญา"
 story.1.desc.spiri:1 "[Root.GetName] กำลังคึกคักไปด้วยข่าวสารของสิ่งมีชีวิตต่างดาวที่ค้นพบเมื่อไม่นานมานี้\n\nเหล่านักเทววิทยาของชาว [Root.GetSpeciesAdj] ได้เข้าร่วมพิธีกรรมลึกลับตั้งแต่สัญญาณแรกนี้ว่าความคุ้มครองจากสวรรค์แผ่ขยายออกไปนอกดาว [Root.Capital.GetName] เพื่อพยายามค้นหาคำตอบใหม่ๆ"
 story.1.desc.gesta:0 "เราได้รับการยืนยันการมีอยู่ของสิ่งมีชีวิตอินทรีย์รูปแบบต่ำนอกเหนือจากชีวมณฑลของ [Root.Capital.GetName]"
 story.1.desc.term:1 "ตรวจพบจุลินทรีย์ต่างดาวประเภทอินทรีย์ แบบจำลองความน่าจะเป็นของสิ่งมีชีวิตต่างดาวมีสติปัญญาประเภทอินทรีย์ได้รับการปรับเปลี่ยนตามความเหมาะสม หากพวกมันมีอยู่จริง พวกมันจะถูกค้นพบ และพวกมันจะถูกทำลายล้าง"
 story.1.desc.evopred: "พวกเราไม่ได้อยู่เพียงลำพัง เป็นครั้งแรกที่ [Root.GetName] มีหลักฐานแน่ชัดว่ามีสิ่งมีชีวิตอื่นในจักรวาล แม้เป็นสิ่งมีชีวิตต่างดาวขนาดเล็กมาก แต่ [Root.GetHomeWorldName] ก็ไม่ใช่ดาวดวงเดียวที่มีวิวัฒนาการเกิดขึ้น\n\nความหิวกระหายโดยสัญชาตญาณที่หลับใหลมานานเริ่มตื่นตัวขึ้นภายในตัวเรา อีกครั้งหนึ่ง ที่เราเริ่มล่า"

 story.2.name:0 "รายงานการพบเจอ: ผู้อยู่อาศัยในอวกาศลึก"
 story.2.desc:1 "[Root.GetName] กำลังคึกคักไปด้วยข่าวสารของสิ่งมีชีวิตต่างดาวที่ค้นพบเมื่อไม่นานมานี้\n\nดูเหมือนว่าพวกมันจะมีถิ่นกำเนิดในห้วงอวกาศลึก ทำให้สิ่งมีชีวิตสุดขั้ว(อุบาทว์)บนดาว [Root.Capital.GetName] ดูบอบบางไปเลยเมื่อเปรียบเทียบกัน"
 story.2.desc.phile:1 "[Root.GetName] กำลังคึกคักไปด้วยข่าวสารของสิ่งมีชีวิตต่างดาวที่ค้นพบเมื่อไม่นานมานี้\n\nดูเหมือนว่าพวกมันจะมีถิ่นกำเนิดในห้วงอวกาศลึก ทำให้สิ่งมีชีวิตสุดขั้ว(อุบาทว์)บนดาว [Root.Capital.GetName] ดูบอบบางไปเลยเมื่อเปรียบเทียบกัน แม้บางคนอาจจะสงสัย แต่ในที่สุดการเผชิญหน้ากับสิ่งมีชีวิตต่างดาวก็เป็นสิ่งที่คาดคิดและตั้งตารอไว้แล้ว—แต่ไม่มีสิ่งใดที่สามารถเตรียมพร้อมให้นักชีววิทยาต่างดาวของชาว [Root.GetSpeciesAdj] รับมือกับสภาวะแวดล้อมสุดขั้วที่น่าทึ่งที่สิ่งมีชีวิตนี้เติบโตได้เลย"
 story.2.desc.followup:1 "ประชากรของ [Root.GetName] รับรายงานการเผชิญหน้ากับสิ่งมีชีวิตต่างดาวรูปแบบใหม่ที่แปลกประหลาดด้วยความสงบขรึม\n\nถิ่นที่อยู่อาศัยในสุญญากาศของสิ่งมีชีวิตต่างดาวได้จุดชนวนข้อโต้แย้งสั้นๆ ในแวดวงวิทยาศาสตร์บางกลุ่มบนดาว [Root.Capital.GetName] แต่การค้นพบสิ่งมีชีวิตรูปแบบต่ำกว่าก่อนหน้านี้ได้เตรียมการให้ชาว [Root.GetSpeciesNamePlural] พร้อมรับมือกับความตกตะลึงนี้แล้วเป็นส่วนใหญ่"
 story.2.desc.gesta:0 "เราได้สังเกตการณ์สิ่งมีชีวิตอินทรีย์สุดขั้วที่เดินทางในห้วงอวกาศลึก"
 story.2.desc.evopred: "[Root.GetName] ได้เผชิญหน้ากับสิ่งมีชีวิตในอวกาศ! เหล่า [GetScientistPlural] ของเรายังไม่ทราบแน่ชัดว่าอะไรที่ทำให้สิ่งมีชีวิตขนาดใหญ่โตเช่นนี้วิวัฒนาการขึ้นมาในสุญญากาศอันโหดร้ายของอวกาศ หรือการปรับตัวทางพันธุกรรมแบบใดที่พวกมันครอบครอง แต่เราแทบรอไม่ไหวที่จะค้นหาคำตอบ"

 story.3.name:0 "รายงานการพบเจอ: สัตว์บนดาวเคราะห์"
 story.3.desc:1 "[Root.GetName] กำลังคึกคักไปด้วยข่าวสารของสิ่งมีชีวิตต่างดาวที่ค้นพบ\n\nแม้ว่าจะห่างไกลจากความฉลาดตามมาตรฐานของชาว [Root.GetSpeciesAdj] แต่สิ่งมีชีวิตที่น่าสนใจเหล่านี้ท้าทายการจัดหมวดหมู่อย่างง่ายดาย และบ่งบอกถึงความซับซ้อนและความเป็นไปได้อันมหาศาลของจักรวาล"
 story.3.desc.spiri:1 "คณะสงฆ์บนดาว [Root.Capital.GetName] มีปฏิกิริยาเชิงบวกเป็นส่วนใหญ่ต่อรายงานสิ่งมีชีวิตที่มีความซับซ้อน—ทว่าไร้ปัญญา—ที่พบบนดาวต่างแดน\n\nการค้นพบนี้จุดชนวนให้เกิดข้อโต้แย้งระหว่างคำสอนทางศาสนา—นี่เป็นหลักฐานว่าชาว [Root.GetSpeciesNamePlural] เป็นผู้ปกครองสรรพสิ่งในการสร้าง หรือเพียงแค่เรายังไม่ได้เผชิญหน้ากับพี่น้องของเราจากนอกห้วงอวกาศลึกเท่านั้น?"
 story.3.desc.followup:0 "ตามรายงานเกี่ยวกับสิ่งมีชีวิตต่างดาวก่อนหน้านี้ นักชีววิทยาต่างดาวชาว [Root.GetSpeciesAdj] ยินดีอย่างยิ่งที่จะได้เรียนรู้เกี่ยวกับสิ่งมีชีวิตที่มีความซับซ้อนซึ่งดูไม่แตกต่างจากที่เราพบบนดาว [Root.Capital.GetName] มากนัก\n\nสิ่งมีชีวิตเหล่านี้ยังคงท้าทายการจัดประเภทอย่างง่ายดายและแทบไม่มีอะไรมากไปกว่าสัญชาตญาณของสัตว์ป่าทั่วไป แต่การมีอยู่ของพวกมันบ่งบอกว่ารูปแบบบางอย่างของสิ่งมีชีวิตนั้นเป็นสากลอย่างแท้จริง"
 story.3.desc.gesta:0 "เราได้รับการยืนยันการมีอยู่ของชีวิตสัตว์บนโลกต่างดาว"
 story.3.desc.evopred: "[Root.GetName] ได้ค้นพบสิ่งมีชีวิตที่มีความซับซ้อนรูปแบบใหม่! สิ่งมีชีวิตเหล่านี้อาจจะไม่มีสติปัญญาที่แท้จริง แต่อารยธรรมของเราชื่นชอบการคัดลอกตัวอย่างจากจีโนมที่หลากหลายเสมอมา\n\nในขณะนี้ [GetScientistPlural] ของเรากำลังคำนวณปริมาณสารพันธุกรรมที่จำเป็นเพื่อให้ทุกคนได้ลิ้มรส"

 story.4.name:0 "รายงานการพบเจอ: สิ่งมีชีวิตก่อนมีสติปัญญา"
 story.4.desc:1 "[Root.GetName] กำลังคึกคักไปด้วยข่าวสารของสิ่งมีชีวิตต่างดาวที่พบเมื่อนานมาแล้ว\n\nระดับสติปัญญาที่เกือบเทียบเท่าพวกเรานั้นน่าสนใจยิ่งนัก และทำให้เรารู้สึกตระหนักว่าในขณะที่ [Root.GetName] อาจเพิ่งเข้าสู่เวทีกาแล็กซี แต่เราก็ได้เดินทางมาไกลมากแล้ว"
 story.4.desc.phobe:1 "สัตว์ต่างดาวที่สังเกตการณ์เป็นสาเหตุของความตื่นตระหนกบนดาว [Root.Capital.GetName] ภาพที่เห็นในฟีดวิดีโอ—ท่วงท่าการเดินที่เชื่องช้าและการจ้องมองที่ว่างเปล่า—ทำให้ชาว [Root.GetSpeciesAdj] รู้สึกกังวลใจอย่างลึกซึ้ง\n\nบางทีอาจไม่ใช่ธรรมชาติความเป็นต่างดาวของพวกมันที่เป็นประเด็น แต่เป็นคำยืนยันของนักชีววิทยาที่ว่าพวกมันคล้ายกับเรามาก มันเป็นเหมือนเงาสะท้อนที่บิดเบี้ยวของอดีตวิวัฒนาการที่ลุ่มล่ามซึ่ง [Root.GetName] อยากจะลืมเลือนไปเสียดีกว่า"
 story.4.desc.phile:1 "เครือข่ายข่าวสารของ [Root.GetSpeciesAdj] ต่างประโคมข่าวการสนทนาและโต้วาทีเกี่ยวกับสิ่งมีชีวิตต่างดาวที่พบเมื่อไม่นานมานี้\n\nสติปัญญาของพวกมันน่าทึ่งมาก และทำให้เราได้ตระหนักว่า แม้ว่า [Root.GetName] อาจเพิ่งก้าวเข้าสู่เวทีระดับกาแล็กซี แต่พวกเราก็มาไกลมากแล้ว [Root.GetSpeciesNamePlural] ส่วนใหญ่เห็นพ้องกันว่ามันเป็นพันธกิจและหน้าที่ทางศีลธรรมของเราที่จะช่วยให้เผ่าพันธุ์อื่นได้ออกเดินทางแบบเดียวกันเมื่อพวกเขาพร้อม"
 story.4.desc.spiri:1 "ชุมนุมผู้นับถือของ [Root.GetSpeciesAdj] กำลังตื่นตัวอย่างมากหลังจากมีข่าวเกี่ยวกับสิ่งมีชีวิตต่างดาวที่พบเมื่อไม่นานมานี้\n\nสติปัญญาของสิ่งมีชีวิตเหล่านี้ช่างน่าทึ่ง และทำให้เราตระหนักว่าในขณะที่ [Root.GetName] เพิ่งเริ่มก้าวเข้าสู่เวทีระดับกาแล็กซี แต่พวกเราก็มาไกลมากแล้ว มีการโต้วาทีกันอย่างดุเดือดบน [Root.Capital.GetName] ว่าเหมาะสมหรือไม่ที่เราจะนำทางสิ่งมีชีวิตเหล่านี้ หากพวกมันมีสติปัญญาและเอื้อมมือไปสู่ดวงดาวในวันข้างหน้า"
 story.4.desc.followup:1 "หลังจากการค้นพบสิ่งมีชีวิตระดับต่ำก่อนหน้านี้ เมืองหลวงของ [Root.GetSpeciesAdj] ได้รับรายงานการสังเกตการณ์สิ่งมีชีวิตที่มีความสามารถทางปัญญาที่น่าทึ่งแม้จะยังแฝงอยู่ และมีศักยภาพด้านวิวัฒนาการที่ยอดเยี่ยม\n\nรายงานดังกล่าวได้รับการต้อนรับด้วยความกระตือรือร้นอย่างยิ่ง"
 story.4.desc.gesta:0 "เรายืนยันการมีอยู่ของสิ่งมีชีวิตต่างดาวที่อยู่บนขอบเขตวิวัฒนาการของความตระหนักรู้"
 story.4.desc.evopred: "เราได้ค้นพบสิ่งมีชีวิตต่างดาวรูปแบบใหม่ สิ่งมีชีวิตเหล่านี้มีความซับซ้อนมากกว่าสิ่งมีชีวิตส่วนใหญ่ที่อาศัยอยู่บน [GetHomeWorldName] โดยมีสติปัญญาที่เกือบจะเข้าขั้นมีปัญญาญาณ เราได้เริ่มจัดตั้งกระบวนการขนส่งและการโคลนนิ่งที่จำเป็นเพื่อประมวลผลจีโนมใหม่อันน่าเย้ายวนใจเหล่านี้แล้ว"

 story.5.name:0 "รายงานการติดต่อ: ซากอารยธรรม"
 story.5.desc:1 "[Root.GetName] กำลังคึกคักไปด้วยข่าวสารเกี่ยวกับซากสิ่งมีชีวิตต่างดาวที่ได้รับการศึกษาเมื่อเร็ว ๆ นี้\n\nซากเหล่านี้ถือเป็นข้อพิสูจน์ที่ชัดเจนถึงกิจกรรมของสิ่งมีชีวิตต่างดาวที่มีสติปัญญาและเป้าหมาย ณ จุดใดจุดหนึ่งในอดีต - ตอนนี้เราอาจจะยังโดดเดี่ยวอยู่ แต่เราไม่ใช่ผู้แรกที่เป็นเช่นนั้นอย่างแน่นอน"
 story.5.desc.phobe:1 "ฝ่ายบริหารบน [Root.Capital.GetName] ได้รับรายงานเกี่ยวกับซากสิ่งมีชีวิตต่างดาวด้วยความวิตกกังวลบางประการ\n\nซากดังกล่าวได้รับการพิจารณาอย่างกว้างขวางว่าเป็นข้อพิสูจน์ที่ชัดเจนว่าเคยมีกองกำลังที่ไม่รู้จักเคลื่อนไหวอยู่ในกาแล็กซี แม้ว่านักคิดชื่อดังบางคนของ [Root.GetSpeciesAdj] จะปฏิเสธแนวคิดนี้และระบุว่าร่องรอยเหล่านั้นเป็นเพียง "การก่อตัวทางธรณีวิทยาที่ผิดแปลก" หรือ "ผลลัพธ์ของปรากฏการณ์ทางธรรมชาติที่น่าสนใจ""
 story.5.desc.phile:1 "นักเอเลี่ยนวิทยาของ [Root.GetSpeciesAdj] ต่างแย่งกันตีพิมพ์ความเห็นของตนเกี่ยวกับการค้นพบสิ่งมีชีวิตต่างดาวล่าสุด\n\nกระแสอันร้อนแรงในแวดวงวิทยาศาสตร์นี้ส่งผลกระทบเชิงลบชั่วคราวต่อการศึกษาวิจัยในสาขาอื่น ๆ"
 story.5.desc.followup:1 ""สิ่งมีชีวิตทรงปัญญาเยาะเย้ยเราด้วยการหายตัวไปอย่างจงใจ" โพสต์ยอดนิยมบนเครือข่ายข่าวสารบน [Root.Capital.GetName] ระบุไว้ ดูเหมือนผู้คนของ [Root.GetName] จะพบเรื่องตลกในความจริงที่ว่าสิ่งมีชีวิตต่างดาวระดับต่ำเป็นเรื่องที่สาธารณชนรับรู้แล้ว แต่สิ่งมีชีวิตที่มีระดับเท่าเทียมกับเราจากดวงดาวดวงอื่นยังคงหลบเลี่ยงเราต่อไป\n\nรายงานเกี่ยวกับร่องรอยของสิ่งมีชีวิตต่างดาวที่พบเมื่อเร็ว ๆ นี้ดูเหมือนจะเพียงแค่เพิ่มเรื่องตลกร้ายให้กับสถานการณ์เท่านั้น"
 story.5.desc.gesta:0 "เรายืนยันร่องรอยทางวัตถุชิ้นแรกของสิ่งมีชีวิตต่างดาวทรงปัญญาบนโลกต่างแดนแล้ว"

 story.6.name:1 "รายงานการติดต่อ: [GetPreFTLUpperPlural]"
 story.6.desc:2 "[Root.GetName] กำลังคึกคักไปด้วยข่าวสารเกี่ยวกับอารยธรรมต่างดาวระดับ [GetPreFTLLower] ที่ค้นพบโดยกองยานของเรา\n\nพวกเขาอาจจะยังไม่สามารถบินในอวกาศได้ แต่พวกต่างดาวแห่ง [primitive_planet.GetName] นั้นมีสติปัญญาอย่างเห็นได้ชัด และสังคมของพวกเขาก็แสดงให้เห็นถึงคุณลักษณะทั้งหมดของวัฒนธรรมที่ก้าวหน้าในระดับปานกลาง"
 story.6.desc.phobe:2 "ข่าวเกี่ยวกับสิ่งมีชีวิตระดับ [GetPreFTLLower] ที่แสดงสติปัญญาขั้นพื้นฐาน - ซึ่งเรียกกันว่าอารยธรรมแห่ง [primitive_planet.GetName] - ไม่ได้รับการต้อนรับที่ดีนักบน [Root.Capital.GetName]\n\nความรู้สึกไม่สบายใจอย่างลึกซึ้งปกคลุมการโต้วาทีในที่สาธารณะ โดยมีกลุ่มชนกลุ่มน้อยที่ส่งเสียงดังเรียกร้องให้สร้างอำนาจนำของ [Root.GetSpeciesAdj] เหนือดาวเคราะห์ต่างดาวดวงนั้นด้วยวิธีการใด ๆ ที่จำเป็น ในขณะที่ [Root.GetSpeciesNamePlural] ส่วนใหญ่ดูเหมือนจะอยากหลีกเลี่ยงสิ่งมีชีวิตต่างดาวเหล่านี้หรือลืมพวกมันไปเสียเลยมากกว่า"
 story.6.desc.phile:1 "รายงานเกี่ยวกับอารยธรรมระดับ [GetPreFTLLower] ที่สังเกตได้จากกองยานของเราได้รับการต้อนรับด้วยความยินดีปรีดาอย่างยิ่งเท่าที่กลุ่มชนชั้นนำทางวิชาการของ [Root.GetName] จะยอมเปิดเผยออกมา\n\nในที่สุดนี่คือข้อพิสูจน์ว่าก้าวแรกอันกล้า ๆ กลัว ๆ ของ [Root.GetSpeciesAdj] สู่ความมืดมิดของอวกาศไม่ได้สูญเปล่า พวกเขาอาจจะยังไม่ใช่ผู้ที่เท่าเทียมกับเราในตอนนี้ และเราอาจจะไม่ได้มีปฏิสัมพันธ์โดยตรงกับพวกเขาในช่วงชีวิตของเรา แต่การมีอยู่ของพวกเขาก็เป็นประภาคารแห่งความหวังในกาแล็กซีที่ดูเหมือนจะไร้ชีวิตชีวาและหยุดนิ่ง"
 story.6.desc.followup5:1 "แวดวงวิทยาศาสตร์บน [Root.Capital.GetName] รู้สึกตื่นเต้นที่ได้รับรายงานเกี่ยวกับสิ่งมีชีวิตต่างดาวทรงปัญญา\n\nพวกเขาอาจจะยังไม่สามารถเดินทางในอวกาศได้ แต่สิ่งมีชีวิตต่างดาวแห่ง [primitive_planet.GetName] นั้นมีสติปัญญาอย่างเห็นได้ชัด และสังคมของพวกเขาก็แสดงให้เห็นถึงคุณลักษณะทั้งหมดของวัฒนธรรมที่ก้าวหน้าในระดับปานกลาง นักเอเลี่ยนวิทยาชื่อดังตั้งข้อสังเกตว่านี่เป็นโอกาสที่ดีเยี่ยมในการศึกษาสังคมที่บางทีอาจไม่ต่างจากสังคมที่เราเคยพบเพียงซากโบราณในอดีต"
 story.6.desc.followup4:1 "รายงานเกี่ยวกับวัฒนธรรมระดับ [GetPreFTLLower] ได้รับการต้อนรับอย่างยินดีจากนักวิจัย [Root.GetSpeciesAdj] หลังจากการค้นพบครั้งก่อน ๆ เกี่ยวกับสปีชีส์ก่อนมีสติปัญญาญาณ\n\nเท่าที่เราทราบ [Root.GetName] เป็นอารยธรรมแรกที่ออกเดินทางสู่ดวงดาว แต่มันน่าทึ่งมากที่ได้เรียนรู้ว่าอารยธรรมอื่น ๆ บางแห่งอาจตามหลังเราอยู่เพียงไม่กี่พันปี หรืออาจจะเป็นเพียงไม่กี่ศตวรรษเท่านั้น"
 story.6.desc.followup123:2 "รายงานเกี่ยวกับเอเลี่ยนระดับ [GetPreFTLLower] แห่ง [primitive_planet.GetName] ที่กองยานของเราได้เผชิญหน้า ถือเป็นความสำเร็จสูงสุดจากการค้นพบสิ่งมีชีวิตระดับต่ำก่อนหน้านี้ และได้จุดประกายความสนใจในวิทยาศาสตร์ด้านเอเลี่ยนวิทยาบน [Root.Capital.GetName] อีกครั้ง ซึ่งก่อนหน้านี้เคยถูกมองว่าเป็นสาขาเชิงทฤษฎีเสียส่วนใหญ่"
 story.6.desc.gesta:1 "เรายืนยันการมีอยู่ของวัฒนธรรมต่างดาวระดับ [GetPreFTLLower] พวกเขายังไม่ได้พัฒนาขีดความสามารถการเดินทางเร็วกว่าแสง(FTL)โดยถูกขัดขวางจากความเป็นปัจเจกบุคคลที่กระจัดกระจาย"
 story.6.desc.evopred: "เราได้ค้นพบสิ่งมีชีวิตทรงปัญญาแล้ว! ยานลำหนึ่งของเราได้เผชิญหน้ากับอารยธรรมระดับ [GetPreFTLLower] ซึ่งพิสูจน์ว่าเราไม่ได้อยู่ตามลำพังในความว่างเปล่า นอกจากนี้เรายังยืนยันว่าจีโนมของพวกมันพร้อมสำหรับการดูดซับแล้ว\n\nตอนนี้มีตัวเลือกมากมายที่กำลังได้รับการพิจารณา ตั้งแต่การเฝ้าสังเกตการณ์อย่างเป็นระบบไปจนถึงการบุกรุกโดยตรง รูปแบบความสัมพันธ์ของเราจะลงเอยอย่างไรนั้นยังคงต้องรอดูกันต่อไป แต่ความเป็นไปได้ต่าง ๆ นั้นน่าลิ้มลองอย่างแน่นอน"

 story.7.name:0 "รายงานการติดต่อ: นักท่องอวกาศผู้ลึกลับ"
 story.7.desc:0 "ใช้เวลาไม่นานเลยที่ [Root.GetName] ได้พบกับสิ่งมีชีวิตต่างดาวทรงปัญญา\n\nรายงานของกองยานที่ส่งไปยังเมืองหลวงของ [Root.GetSpeciesAdj] ค่อนข้างจะกล่าวถึงความแปลกประหลาดของกองกำลังเหล่านี้น้อยกว่าความเป็นจริง และเพียงกล่าวถึงความล้มเหลวในการเปิดการสื่อสารไปอย่างผ่าน ๆ เท่านั้น"
 story.7.desc.phobe:0 "[Root.Capital.GetName] กำลังตกอยู่ในความโกลาหลหลังจากมีข่าวการพบเห็นยานที่ไม่สามารถระบุเอกลักษณ์ได้ในความว่างเปล่า\n\nเนื่องจากไม่ทราบเจตนาของพวกเขา การคาดการณ์ในแง่ร้ายที่สุดไว้ก่อนจึงเป็นเรื่องรอบคอบ"
 story.7.desc.phile:0 "ในที่สุด [Root.GetName] ก็ได้เผชิญหน้ากับผู้ร่วมเดินทางท่องเที่ยวท่ามกลางดวงดาวแล้ว\n\nไม่ว่าเจตนาของมนุษย์ต่างดาวเหล่านี้จะเป็นอย่างไร บรรยากาศบน [Root.Capital.GetName] ก็สามารถอธิบายได้ดีที่สุดว่าตื่นเต้นยินดีอย่างยิ่ง ในที่สุดก็มีผู้ร่วมเป็นสักขีพยานแล้ว!"
 story.7.desc.followup6:1 "ตอนนี้เราได้เผชิญหน้ากับสิ่งมีชีวิตทรงปัญญาที่มีความสามารถในการบินในอวกาศแล้ว\n\nซึ่งตรงกันข้ามอย่างสิ้นเชิงกับ [GetPreFTLLowerPlural] ที่เคยสังเกตโดย [Root.GetName] ก่อนหน้านี้ เนื่องจากเรายังไม่ได้เห็นสิ่งมีชีวิตที่บังคับยานเหล่านั้นอย่างชัดเจน ยานซึ่งเคลื่อนที่ผ่านความมืดมิดด้วยจุดประสงค์ที่ไม่อาจทราบได้"
 story.7.desc.followup12345:1 "ข่าวสารเกี่ยวกับยานต่างดาวที่แล่นผ่านห้วงอวกาศได้มาถึง [Root.Capital.GetName] แล้ว ซึ่งถือเป็นการปิดฉากบทแรกของการพยายามสร้างจักรวรรดิแห่งดวงดาวของ [Root.GetName] ในหลาย ๆ ด้าน"
 story.7.desc.mach.followup12345:0 "เราสังเกตเห็นการแล่นผ่านของยานต่างดาวที่มีขีดความสามารถในการบินอวกาศขั้นสูง แม้ว่าจะยังไม่มีการติดต่อสื่อสารเกิดขึ้น แต่เราสามารถยืนยันได้ว่าพวกเรา [Root.GetSpeciesNamePlural] ไม่ใช่จักรวรรดิเดียวในกาแล็กซีที่มีความสามารถในการสำรวจดวงดาว"
 story.7.desc.gesta:0 "เราได้เผชิญหน้ากับสิ่งมีชีวิตต่างดาวขั้นสูงแล้ว การติดต่อดูเหมือนจะเป็นสิ่งที่ไม่สามารถหลีกเลี่ยงได้"
 story.7.desc.evopred: "เราได้เผชิญหน้ากับสิ่งมีชีวิตที่มีความสามารถในการเดินทางในอวกาศแล้ว\n\nการค้นพบครั้งสำคัญนี้ทำให้การโต้วาทีทางปรัชญาและจริยธรรมดำเนินไปอย่างรวดเร็วขึ้น: หากสิ่งมีชีวิตเหล่านี้มีจีโนมที่เราสามารถดูดซับได้ เราควรยึดครองพวกมันด้วยกำลัง หรือเราควรจะขออย่างสุภาพ? การโคลนนิ่งตัวอย่างที่มอบให้โดยสมัครใจอาจช่วยให้เรามีวัตถุดิบเพียงพอสำหรับประชากรทั้งหมดของเรา\n\nผลลัพธ์ของการติดต่อครั้งแรกกับนักสำรวจทรงปัญญาเหล่านี้ควรช่วยกำหนดคำตอบได้"
 story.7.a.swarm: "เหยื่อ?"

