 # Country Events
 ####################################

 # Comet Sighted
 country.999.name:0 "ตรวจพบดาวหาง"
 country.999.desc:0 "ชาว [Root.GetSpeciesNamePlural] มีความอยากรู้อยากเห็นโดยธรรมชาติ และการปรากฏตัวของดาวหางบนท้องเหนือ [Root.Capital.GetName] ได้จุดประกายความมหัศจรรย์ใจอย่างกว้างขวางในหมู่ประชากรของเรา\n\nพวกเขาเชื่อมั่นว่านี่คือสัญลักษณ์ของสิ่งยิ่งใหญ่ที่กำลังจะตามมา"
 country.999.a:0 "มันคือลางดี"
 country.999.desc.pac:0 "ชาว [Root.GetSpeciesNamePlural] มีความอยากรู้อยากเห็นโดยธรรมชาติ และการปรากฏตัวของดาวหางบนท้องเหนือ [Root.Capital.GetName] ได้หว่านความรู้สึกนอบน้อมถ่อมตนให้เกิดขึ้นอย่างกว้างขวางในหมู่ประชากรของเรา\n\nมันคือความหวังอันเปี่ยมล้นของพวกเขาที่ความมหัศจรรย์เช่นนี้จะช่วยนำพาสิ่งมีชีวิตทั้งหมดในกาแล็กซีมาอยู่ร่วมกันในสักวันหนึ่ง"
 country.999.a.pac:0 "มันคือลางดี"
 country.999.desc.mil:0 "เปลวไฟอันเกรี้ยวกราดแผดเผาท้องฟ้าของ [Root.Capital.GetName] ขณะที่ดาวหางเคลื่อนผ่านชั้นสตราโตสเฟียร์ระดับบน พลังอันมหาศาลที่เด่นชัดในเส้นทางโคจรอวกาศของมันได้สร้างความประทับใจอย่างลึกซึ้งแก่ประชากรในเมืองหลวง\n\nพวกเขาเปรียบเทียบวิถีทางของมันที่ไม่แปรเปลี่ยนกับความหลีกเลี่ยงไม่ได้ของความรุ่งโรจน์ของ [Root.GetName] สู่ความเป็นใหญ่ในกาแล็กซี"
 country.999.a.mil:0 "สู่ชัยชนะ"
 country.999.desc.spirit:0 "ตรวจพบแสงสว่างกำลังเคลื่อนผ่านท้องฟ้ายามราตรีของ [Root.Capital.GetName] เส้นทางโค้งที่แผ่วเบาของมันตัดกันอย่างสิ้นเชิงกับการหมุนที่เชื่องช้าของดวงดาวดวงอื่น\n\nพลเมืองของ [Root.Capital.GetName] มองเห็นมันเป็นหลักฐานการรับรู้ของสิ่งศักดิ์สิทธิ์และการอวยพรที่ละเอียดอ่อนต่อจุดประสงค์ของเรา"
 country.999.a.spirit:0 "เป็นเช่นนั้น"
 country.999.desc.material:0 "วัตถุท้องฟ้าขนาดเล็กที่มีหางแก๊สและอนุภาคชัดเจนได้รับการสังเกตการณ์ในระบบดาว [Root.Capital.GetStarName] เมื่อเร็วๆ นี้\n\nการเคลื่อนตัวผ่านของมันไม่มีเหตุการณ์ใดๆ เกิดขึ้น"
 country.999.a.material:0 "รับทราบ"
 country.999.desc.phile:0 "ดาวหางส่องสว่างนำทางพาดผ่านเส้นขอบฟ้าของ[Root.Capital.GetName] ในฐานะผู้นำสารที่เจิดจ้าจากดวงดาวอันไกลโพ้น ประชากร [Root.GetSpeciesName] ต่างมีความปิติยินดีกับเครื่องเตือนใจนี้ แม้จะเลือนราง ทว่ามันก็ระลึกว่าพวกเราไม่ได้อยู่ตามลำพังในจักรวาลนี้\n\nพวกเขาต่างสนับสนุนอย่างเต็มที่ยิ่งกว่าที่เคยต่อความทะเยอทะยานของ [Root.GetName] ที่จะโอบรับต้อนรับกาแล็กซีด้วยอ้อมแขนที่เปิดกว้าง"
 country.999.a.phile:0 "มหัศจรรย์ยิ่ง"
 country.999.desc.phobe:0 "ดาวหางที่น่าสะพรึงกลัวหลอกหลอนเหนือท้องฟ้าของ [Root.Capital.GetName] เส้นทางโค้งของมันเป็นเครื่องเตือนใจอันโหดร้ายแก่ชาว [Root.GetSpeciesName] ว่าพวกเราไม่ได้อยู่ลำพัง และความสยองขวัญที่คาดเดาไม่ได้จากนอกโลกอาจอยู่ใกล้กว่าที่คิดไว้\n\nพวกเราต้องนำสิ่งนี้มาเป็นสัญญาณเพื่อคอยระแวดระวังภัยจากการแทรกซึมของเอเลี่ยนเสมอ"
 country.999.a.phobe:0 "มันคือลางเตือนภัย"
 country.999.desc.coll:0 "กลุ่มของชาว [Root.GetSpeciesNamePlural] ร่วมเฝ้ามองดาวหางพาดผ่านเหนือท้องฟ้าของ [Root.Capital.GetName] การปรากฏของวัตถุดาราศาสตร์ที่โดดเดี่ยวนี้สร้างความกังวลใจอย่างไม่เหมาะสม และชาว [Root.GetSpeciesName] ต่างหันหน้าเข้าหากันเพื่อขอความมั่นใจว่าพวกเขาไม่ได้โดดเดี่ยว\n\nพวกเขาเชื่อมั่นว่านี่คือสัญลักษณ์ของการแยกตัวโดดเดี่ยวและความแตกแยกที่จะเกิดขึ้นในสังคม [Root.GetSpeciesAdj]"
 country.999.a.coll:0 "ช่างน่ากังวลเหลือเกิน"
 country.999.desc.ind:0 "ดาวหางอันโดดเดี่ยวและทระนงพุ่งทะยานผ่านระบบดาว [Root.Capital.GetStarName] ซึ่งสามารถมองเห็นได้ชัดเจนจาก [Root.Capital.GetName] มันสร้างเส้นทางของตัวเองผ่านจักรวาลอย่างสดใสและไม่ย่นย่อ\n\nนี่คืออุดมคติที่ชาว [Root.GetSpeciesNamePlural] ทั้งหมดมุ่งมั่นไขว่คว้า"
 country.999.a.ind:0 "มันคือลางดี"
 country.999.desc.mach:0 "หน่วยประชากร [Root.GetSpeciesNamePlural] บนพื้นดินของ [Root.Capital.GetName] รายงานการตรวจพบวัตถุน้ำแข็งขนาดเล็กในระบบสุริยะซึ่งแสดงพฤติกรรมการพ่นแก๊สออกมาที่พิกัด 2 ชั่วโมง 54 นาที 8 วินาที ไรต์แอสเซนชัน(ขึ้นฟ้าขวา)และ 10.3 องศา เดคลิเนชัน(การตัดสินใจ)\n\nระยะทางของวัตถุได้รับการคำนวณสามเหลี่ยมได้ที่ประมาณ 3.75 หน่วยดาราศาสตร์(หน่วยดาราศาสตร์)จากดวงอาทิตย์ และขนาดกับความสามารถในการมองเห็นของโคมาดาวเคราะห์น้อยได้รับการจัดอยู่ในระดับที่น่าสนใจ ขนาดมิติของวัตถุได้รับการคำนวณไว้ที่ประมาณ 5 คูณ 10 คูณ 6 กิโลเมตร เหตุการณ์การตรวจพบจบลงโดยไม่มีเหตุสุดวิสัย"
 country.999.a.mach:0 "รับทราบข้อมูล"
 country.999.desc.belief:0 "ดาวหางดวงหนึ่งได้รับการตรวจพบในระบบดาว [Root.Capital.GetStarName] เมื่อเร็วๆ นี้\nซึ่งมองเห็นได้เด่นชัดจากพื้นผิวของ §H[Root.Capital.GetName]§! การปรากฏตัวของมันพบกับปฏิกิริยาที่รุนแรงจากประชากรดาวเคราะห์\n\nแทบไม่มีข้อโต้แย้งเลยว่าการเกิดขึ้นของวัตถุท้องฟ้าเช่นนี้ในช่วง §H[GetCycleName]§! จะนำมาซึ่ง [GetCycleAttitude]"

