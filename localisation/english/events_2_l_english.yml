 war_in_heaven.4.b.satellite.tt:0 "§Y[Root.GetName]§! กลายเป็น $preset_satellite$ ภายใต้ §Y[from.GetName]§!\n$war_in_heaven_satellite_text$"
 war_in_heaven.4.b.signatory.tt:0 "§Y[Root.GetName]§! กลายเป็น $preset_signatory$ ภายใต้ §Y[from.GetName]§!\n$war_in_heaven_signatory_text$"
 war_in_heaven.4.b.thrall.tt:0 "§Y[Root.GetName]§! กลายเป็น $preset_thrall$ ภายใต้ §Y[from.GetName]§!\n$war_in_heaven_thrall_text$"
 war_in_heaven.4.b.political_client.tt:0 "§Y[Root.GetName]§! จะตกเป็นรัฐในอุปถัมภ์ทางการเมือง ($preset_political_client$) ภายใต้สัญญากับ §Y[from.GetName]§!\n$war_in_heaven_political_client_text$"
 war_in_heaven.4.b.herald.tt:0 "§Y[Root.GetName]§! จะกลายเป็นผู้แจ้งข่าวสาร ($preset_herald$) ภายใต้สังกัดของ §Y[from.GetName]§!\n$war_in_heaven_herald_text$"
 war_in_heaven_dominion_text:1 "$preset_dominion$ จ่ายทรัพยากรพื้นฐาน 30% และ เปลี่ยนจริยธรรมไปในทาง §Yจิตวิญญาณนิยมสุดโต่ง§!"
 war_in_heaven_satellite_text:1 "$preset_satellite$ จ่ายการวิจัย 30%"
 war_in_heaven_signatory_text:0 "$preset_signatory$ ห้ามไม่ให้ประชากรเป็นทาสหรือกวาดล้างพวกเขา"
 war_in_heaven_thrall_text:1 "$preset_thrall$ จ่ายทรัพยากรพื้นฐาน 30%"
 war_in_heaven_political_client_text: "รัฐในอุปถัมภ์ทางการเมือง ($preset_political_client$) จะไม่ได้รับอนุญาตให้มีเสรีภาพใด ๆ ในด้านการทูตหรือการลงคะแนนเสียง"
 war_in_heaven_herald_text: "รัฐใต้อาณัติประเภทผู้แจ้งข่าวสาร ($preset_herald$) จะต้องเข้าร่วมสงครามทั้งหมดของประเทศผู้ปกครองหลัก"
 war_in_heaven.4.b:0 "เรามีความจงรักภักดีต่อ [From.GetName]"
 war_in_heaven.4.c:0 "เราจะไม่เข้าข้างฝ่ายใดในความขัดแย้งนี้"
 war_in_heaven.4.c.2:0 "พวกเขาทั้งสองจะล้มลงด้วยพลังของเรา!"
 war_in_heaven.4.d:0 "ในฐานะที่เป็นรัฐใต้อาณัติ มันไม่ได้ขึ้นอยู่กับพวกเราที่จะตัดสินใจ"
 war_in_heaven.5.name:0 "จบสงครามมหาเทพ"
 war_in_heaven.5.desc:3 "หลังจากการต่อสู้ที่ยืดเยื้อและดุเดือด ในที่สุด §H[WarInHeavenFEOne.GetName]§! ก็เป็นฝ่ายได้รับชัยชนะในการแย่งชิงสิทธิ์ควบคุมเหนือทั่วทั้งกาแล็กซี จักรวรรดิโบราณที่ปราชัยได้ถูกรวมเข้าเป็นดินแดนเดียวกับคู่อริโบราณอย่างสมบูรณ์ และบัดนี้ [WarInHeavenFEOne.GetSpeciesName] ยืนหยัดอย่างเกรียงไกรในฐานะขั้วอำนาจหลักเพียงผู้เดียวในกาแล็กซีอย่างไม่มีใครกล้าท้าทาย\n\nสำหรับขณะนี้ ความสงบสุขที่น่ากระอักกระอ่วนได้แผ่ขยายปกคลุมอยู่ แต่ระเบียบโลกใหม่นี้จะดำรงอยู่ได้ยาวนานเพียงใดกัน?"
 war_in_heaven.5.a:1 "ยุคสันติภาพพรากซ์ ([WarInHeavenFEOne.GetSpeciesName]) ได้เริ่มต้นขึ้น"
 war_in_heaven.6.name:1 "$war_in_heaven.5.name$"
 war_in_heaven.6.desc:2 "ภายหลังการต่อสู้อันดุเดือดและยาวนาน สงครามสวรรค์(สงครามในสวรรค์)ได้จบลงด้วยการที่ไม่มีฝ่ายใดสามารถสร้างความได้เปรียบเหนือนอกจากนี้ได้ ทาง §H[WarInHeavenFEOne.GetName]§! และ §H[WarInHeavenFETwo.GetName]§! จึงได้ร่วมลงนามในข้อตกลงหยุดยิงและล่าถอยกองยานรบกลับคืนสู่เขตพรมแดนของตนเอง\n\nณ ปัจจุบัน ความสงบสุขที่ตึงเครียดกลับมาเยือนกาแล็กซีอีกครั้ง แต่การพักรบในหนนี้จะดำเนินต่อไปได้นานเพียงใด?"
 war_in_heaven.6.a:1 "เรื่องนี้ยังไม่จบหรอก..."
 war_in_heaven.11.name:1 "จักรวรรดิตื่นรู้พ่ายแพ้แล้ว"
 war_in_heaven.11.desc:1 "สงครามระหว่างเผ่าพันธุ์ยุคดึกดำบรรพ์ได้สิ้นสุดลงด้วยการทำลายล้างของหนึ่งในฝ่ายผู้เข้าห้ำหั่น - ทว่ามันไม่ใช่ด้วยฝีมือของคู่ปรับเก่าของพวกเขา ไม่ว่ามันจะเป็นเพราะความอ่อนแอลงจากศึกสงคราม หรือเป็นเพราะความแข็งแกร่งของเผ่าพันธุ์รุ่นเยาว์ก็ตาม การทำลายล้างจักรวรรดิยุคเก่าด้วยน้ำมือของผู้ที่ถูกเรียกว่าผู้ด้อยกว่าได้แปรเปลี่ยนสถานการณ์ไปโดยสิ้นเชิง ในตอนนี้จึงหลงเหลือคำถามสำคัญ - ว่าทาง §H[RemainingAwakened.GetName]§! จะสามารถหลบเลี่ยงชะตากรรมแบบเดียวกับศัตรูโบราณได้หรือไม่ หรือความพ่ายแพ้นี้คือสัญญาณแห่งรุ่งอรุณของยุคสมัยใหม่ในกาแล็กซี?"
 war_in_heaven.11.a:0 "เรื่องนี้ยังต้องรดูกันต่อไป..."
 war_in_heaven.13.name:0 "สันนิบาตมหาอำนาจไม่ฝักใฝ่ฝ่ายใด"
 war_in_heaven.13.desc:1 "ไม่ใช่ทุกเผ่าพันธุ์รุ่นใหม่จะเลือกเข้าร่วมกับฝ่ายใดฝ่ายหนึ่งในสงครามที่ดุเดือดระหว่างอาณาจักรเก่าแก่ ยังมีบางจักรวรรดิที่ยังคงเป็นกลาง แต่มีโอกาสที่จะเผชิญกับภัยคุกคามจากจักรวรรดิฟอลเล็นเพียงลำพังหากสงครามมาถึง เราได้รับการติดต่อจากตัวแทนจากจักรวรรดิอื่นเกี่ยวกับแนวคิดในการตั้ง §Hสันนิบาตมหาอำนาจไม่ฝักใฝ่ฝ่ายใด§! โดยมีเป้าหมายที่ชัดเจนในการต่อต้านทั้งสองฝ่ายในสงครามนี้ เนื่องจากอำนาจและอิทธิพลทางการทหารของเรา เราจึงถูกขอให้เป็นผู้นำของสันนิบาตนี้ การยอมรับอาจหมายถึงการทำสงครามกับจักรวรรดิฟอลเล็นที่ตื่นขึ้นแล้ว แต่อย่างน้อยเราก็มีพันธมิตรที่ยืนเคียงข้างเราแทนที่จะเผชิญหน้าพวกเขาตามลำพัง"
 war_in_heaven.13.desc2:0 "ไม่ใช่ทุกเผ่าพันธุ์รุ่นเยาว์ที่จะเลือกเข้าร่วมกับฝ่ายใดฝ่ายหนึ่งในสงครามที่กำลังทวีความรุนแรงขึ้นระหว่างจักรวรรดิยุคเก่า บางฝ่าย เช่นตัวพวกเราเอง ได้เลือกที่จะวางตัวเป็นกลาง ทว่าก็ต้องเผชิญหน้ากับแนวโน้มที่จะต้องเผชิญกับภัยคุกคามจากผู้เฒ่าเพียงลำพังหากสงครามเดินทางมาถึงหน้าบ้าน พวกเราได้รับการติดต่อจากตัวแทนของจักรวรรดิอื่นเกี่ยวกับแนวความคิดที่จะก่อตั้ง §Hลีกมหาอำนาจไม่ฝักใฝ่ฝ่ายใด(เสียงของพลังไร้สัญชาติ)§! โดยมีเป้าหมายที่ชัดเจนในการต่อต้านทั้งสองฝ่ายในสงคราม เนื่องจากพวกเราเป็นผู้นำของสหพันธ์อันทรงพลังอย่าง [Root.GetAllianceName] อยู่แล้ว เราจึงได้รับการขอร้องให้ขยายขนาดพันธมิตรของเราเพื่อจัดตั้งลีกที่เสนอขึ้นมา การตอบรับแทบจะหมายถึงสงครามกับจักรวรรดิตื่นรู้อย่างแน่นอน แต่อย่างน้อยเราก็จะมีพันธมิตรยืนหยัดอยู่เคียงข้าง แทนที่จะต้องเผชิญหน้ากับพวกเขาเพียงลำพัง"
 war_in_heaven.13.a:0 "เราจะเป็นผู้นำสันนิบาตนี้!"
 war_in_heaven.13.b:0 "ไม่ มันอันตรายเกินไป"
 war_in_heaven.13.c:0 "สามารถรับมือได้โดยไม่ต้องได้รับความช่วยเหลือจากภายนอก"
 war_in_heaven.15.name:0 "คำขอเป็นสมาชิก"
 war_in_heaven.15.desc:0 "ทาง §H[From.GetName]§! ได้ยื่นขอเข้าร่วม §Hลีกมหาอำนาจไม่ฝักใฝ่ฝ่ายใด§! อย่างเป็นทางการ"
 war_in_heaven.15.a:0 "เรายินดีที่จะมีพวกเขา!"
 war_in_heaven.15.b:0 "ไม่ เราไม่ต้องการพวกเขา"
 war_in_heaven.16.name:0 "สงครามกับผู้ตื่นรู้"
 war_in_heaven.16.desc:2 "ใช้เวลาไม่นานนักที่พวกชนเผ่าโบราณจะสังเกตเห็นการก่อตั้งของ §Hลีกมหาอำนาจไม่ฝักใฝ่ฝ่ายใด§! ตัวแทนจากมหาอำนาจคู่สงครามทั้งสองฝ่ายได้มาเยือนยัง [Root.Capital.GetName] เพื่อเรียกร้องให้ยุบตัวลีกและเรียกร้องให้เหล่าสมาชิกเลือกข้างในสงคราม แน่นอนว่าเราปฏิเสธข้อเสนอนั้น และตั้งแต่เมื่อเช้าวันนี้ เราอยู่ในสภาวะสงครามร่วมกับทั้ง §H[FirstSleeper.GetName]§! และ §H[SecondSleeper.GetName]§! เรียบร้อยแล้ว"
 war_in_heaven.16.a:0 "ออกไปจากกาแล็กซีของเราซะ ทั้งพวกเจ้าทั้งสองฝ่ายนั่นแหละ!"
 war_in_heaven.18.name:0 "การล่มสลายของผู้ตื่นรู้"
 war_in_heaven.18.desc:2 "หลังจากการต่อสู้อันดุเดือดและยาวนาน สงครามที่เริ่มต้นจากการประจัญบานระหว่างสองจักรวรรดิโบราณได้ลงเอยด้วยการทำลายล้างของทั้งสองฝ่าย แม้พวกเขาจะมีอำนาจเทคโนโลยีโบราณที่ก้าวล้ำเพียงใด ทว่าความยะโสโอหังและความไม่รู้จักปรับตัวของยักษ์โบราณเหล่านั้นกลับเป็นจุดจบของพวกเขาเอง และบัดนี้พวกเขาจากไปแล้ว หลงเหลือเพียงเศษซากปรักหักพังแห่งอดีตที่ผุพัง รุ่งอรุณใหม่ได้มาเยือนกาแล็กซี และต่อจากนี้ไป ชะตากรรมของเผ่าพันธุ์รุ่นเยาว์จะขึ้นอยู่กับการตัดสินใจของพวกเขาเองอย่างแท้จริง"
 war_in_heaven.18.a:0 "ยุคนี้จะเป็นยุคสมัยแห่ง [Root.GetName]"
 war_in_heaven.19.name:0 "สันนิบาตมหาอำนาจไม่ฝักใฝ่ฝ่ายใด"
 war_in_heaven.19.desc:1 "ไม่ใช่ทุกเผ่าพันธุ์รุ่นใหม่จะเลือกเข้าร่วมกับฝ่ายใดฝ่ายหนึ่งในสงครามที่ดุเดือดระหว่างอาณาจักรเก่าแก่ ยังมีบางจักรวรรดิที่ยังคงเป็นกลาง แต่มีโอกาสที่จะเผชิญกับภัยคุกคามจากจักรวรรดิฟอลเล็นเพียงลำพังหากสงครามมาถึง §Hสันนิบาตมหาอำนาจไม่ฝักใฝ่ฝ่ายใด§! ได้ก่อตั้งขึ้นภายใต้การนำของ §H[From.GetName]§!\n\nโดยมีเป้าหมายที่ชัดเจนในการต่อต้านทั้งสองฝ่ายในสงครามนี้ การเข้าร่วมสันนิบาตนี้อาจหมายถึงการทำสงครามกับจักรวรรดิฟอลเล็นที่ตื่นขึ้นแล้ว แต่อย่างน้อยเราก็มีพันธมิตรที่ยืนเคียงข้างเราแทนที่จะเผชิญหน้าพวกเขาตามลำพัง"
 war_in_heaven.19.desc2:0 "ไม่ใช่ทุกเผ่าพันธุ์รุ่นเยาว์ที่จะเลือกเข้าร่วมกับฝ่ายใดฝ่ายหนึ่งในสงครามที่กำลังทวีความรุนแรงขึ้นระหว่างจักรวรรดิยุคเก่า บางฝ่าย เช่นตัวพวกเราเอง ได้เลือกที่จะวางตัวเป็นกลาง ทว่าก็ต้องเผชิญหน้ากับแนวโน้มที่จะต้องเผชิญกับภัยคุกคามจากผู้เฒ่าเพียงลำพังหากสงครามเดินทางมาถึงหน้าบ้าน ทาง §H[From.GetName]§! ประธานสหพันธ์ของเรา ได้เปลี่ยนชื่อของสหภาพเป็น §Hลีกมหาอำนาจไม่ฝักใฝ่ฝ่ายใด(เสียงของพลังไร้สัญชาติ)§! และประกาศเป้าหมายในการต่อต้านทั้งสองฝ่ายในสงคราม การจัดตั้งลีกนี้แทบจะหมายถึงสงครามกับจักรวรรดิตื่นรู้อย่างแน่นอน แต่อย่างน้อยเราก็จะมีพันธมิตรยืนหยัดอยู่เคียงข้าง แทนที่จะต้องเผชิญหน้ากับพวกเขาเพียงลำพัง"
 war_in_heaven.19.desc3:0 "ไม่ใช่ทุกเผ่าพันธุ์รุ่นเยาว์ที่จะเลือกเข้าร่วมกับฝ่ายใดฝ่ายหนึ่งในสงครามที่กำลังทวีความรุนแรงขึ้นระหว่างจักรวรรดิยุคเก่า บางฝ่าย เช่นตัวพวกเราเอง ได้เลือกที่จะวางตัวเป็นกลาง ทว่าก็ต้องเผชิญหน้ากับแนวโน้มที่จะต้องเผชิญกับภัยคุกคามจากผู้เฒ่าเพียงลำพังหากสงครามเดินทางมาถึงหน้าบ้าน ทาง §H[From.GetName]§! ได้ริเริ่มอย่างกล้าหาญโดยประกาศให้พันธมิตรของตนเป็น §Hลีกมหาอำนาจไม่ฝักใฝ่ฝ่ายใด(เสียงของพลังไร้สัญชาติ)§! เพื่อต่อต้านทั้งสองฝ่ายในสงคราม และเชิญชวนประเทศที่เป็นกลางอื่น ๆ ให้เข้ามารวมกลุ่มภายใต้ธงของพวกเขา การเข้าร่วมในลีกนี้แทบจะหมายถึงสงครามกับจักรวรรดิตื่นรู้อย่างแน่นอน แต่อย่างน้อยเราก็จะมีพันธมิตรยืนหยัดอยู่เคียงข้าง แทนที่จะต้องเผชิญหน้ากับพวกเขาเพียงลำพัง"
 war_in_heaven.19.a:0 "เราจะเข้าร่วมสันนิบาตนี้!"
 war_in_heaven.19.a2:0 "เราจะต่อต้านความเผด็จการของจักรวรรดิฟอลเล็น!"
 war_in_heaven.19.b:0 "ไม่ มันอันตรายเกินไป"
 war_in_heaven.19.b2:0 "เราไม่สามารถสนับสนุนการดำเนินการนี้ได้"
 war_in_heaven.20.name:0 "ยอมรับการเป็นสมาชิกแล้ว"
 war_in_heaven.20.desc:1 "พวกเราได้รับการยอมรับเข้าสู่ §Hลีกมหาอำนาจไม่ฝักใฝ่ฝ่ายใด§! โดย §H[From.GetName]§! และตอนนี้พวกเราจะยืนหยัดร่วมกันต่อสู้กับภัยคุกคามของจักรวรรดิยุคเก่า"
 war_in_heaven.20.a:0 "สู่ชัยชนะและอิสรภาพ!"
 war_in_heaven.21.name:0 "ปฏิเสธการเป็นสมาชิก"
 war_in_heaven.21.desc:1 "คำขอของเราในการเข้าร่วม §Hลีกมหาอำนาจไม่ฝักใฝ่ฝ่ายใด§! ถูกปฏิเสธโดย §H[From.GetName]§! และตอนนี้พวกเราจะต้องยืนหยัดเพียงลำพังในการต่อสู้กับภัยคุกคามของจักรวรรดิยุคเก่า"
 war_in_heaven.21.a:0 "ไม่ดี..."
 war_in_heaven.22.name:0 "สันนิบาตมหาอำนาจไม่ฝักใฝ่ฝ่ายใด"
 war_in_heaven.22.desc:1 "ไม่ใช่ทุกเผ่าพันธุ์รุ่นเยาว์ที่จะเลือกเข้าร่วมกับฝ่ายใดฝ่ายหนึ่งในสงครามที่กำลังทวีความรุนแรงขึ้นระหว่างจักรวรรดิยุคเก่า บางฝ่าย เช่นตัวพวกเราเอง ได้เลือกที่จะวางตัวเป็นกลาง ทว่าก็ต้องเผชิญหน้ากับแนวโน้มที่จะต้องเผชิญกับภัยคุกคามจากผู้ตื่นรู้เพียงลำพังหากสงครามเดินทางมาถึงหน้าบ้าน §Hลีกมหาอำนาจไม่ฝักใฝ่ฝ่ายใด§! ได้ก่อตั้งขึ้นภายใต้การนำของ §H[From.GetName]§! โดยมีเป้าหมายที่ชัดเจนในการต่อต้านคู่สงครามทั้งสองฝ่าย"
 war_in_heaven.22.desc2:0 "ไม่ใช่ทุกเผ่าพันธุ์รุ่นเยาว์ที่จะเลือกเข้าร่วมกับฝ่ายใดฝ่ายหนึ่งในสงครามที่กำลังทวีความรุนแรงขึ้นระหว่างจักรวรรดิยุคเก่า บางฝ่าย เช่นตัวพวกเราเอง ได้เลือกที่จะวางตัวเป็นกลาง ทว่าก็ต้องเผชิญหน้ากับแนวโน้มที่จะต้องเผชิญกับภัยคุกคามจากผู้ตื่นรู้เพียงลำพังหากสงครามเดินทางมาถึงหน้าบ้าน ทาง §H[From.GetName]§! ได้ริเริ่มอย่างกล้าหาญโดยประกาศให้พันธมิตรของตนเป็น §Hลีกมหาอำนาจไม่ฝักใฝ่ฝ่ายใด§! เพื่อต่อต้านทั้งสองฝ่ายในสงคราม และเชิญชวนประเทศที่เป็นกลางอื่น ๆ ให้มาร่วมภายใต้ธงของพวกเขา"
 war_in_heaven.22.a:0 "ช่างเป็นการก้าวเดินที่กล้าหาญยิ่ง"

 war_in_heaven_is_over: "สงครามสวรรค์ได้สิ้นสุดลงแล้ว"

