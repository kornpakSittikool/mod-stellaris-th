 # Uplifting Events
 ####################################

# Pre-Sapients Found
#  uplift.6000.name.1:0 "Upliftable Species Found"
 uplift.6000.name.2:0 "ค้นพบสายพันธุ์ก่อนมีปัญญาญาณ"

 uplift.6000.continental.desc:0 "มีสิ่งมีชีวิตที่น่าทึ่งเดินเตร่ตามที่ราบและชายฝั่งของ [From.GetName] ทาง [Root.GetName] รายงานว่ารูปแบบชีวิตคลาส [presapient_species.GetSpeciesClass] เหล่านี้กำลังใช้เครื่องมือบางประเภทแม้จะค่อนข้างจำกัด และอาจมีศักยภาพในการบรรลุถึงการเป็นสิ่งมีชีวิตทรงปัญญาญาณในอนาคต\n\n[Owner.GetScientistCapital] [Root.GetLeaderName] เน้นย้ำว่าการพบชีวิตต่างดาวในสถานะนี้เป็นโอกาสที่หาได้ยากยิ่ง หากเราเลือกที่จะยกระดับพัฒนาการ(ลิฟท์)พวกเขา พวกเขาอาจจะมีประโยชน์ต่อเรา" # GetSpeciesClass returns e.g. the 'avian_species' or 'toxic_species' string

 uplift.6000.ocean.desc:0 "ตามรายงานจาก [Root.GetName] สิ่งมีชีวิตคลาส [presapient_species.GetSpeciesClass] ท้องถิ่นดั้งเดิมชนิดหนึ่งใน [From.GetName] ไม่เพียงแต่น่าจะเรียนรู้การเอาชีวิตรอดในมหาสมุทรอันกว้างใหญ่ของดาวเคราะห์ได้แล้ว แต่ยังรวมถึงพื้นดินผืนเล็ก ๆ ที่กระจายอยู่ตามพื้นผิวอีกด้วย\n\n[Owner.GetScientistCapital] [Root.GetLeaderName] เสนอว่าเราควรจับตาดูพัฒนาการของพวกเขาอย่างใกล้ชิด และอาจจะยื่นมือเข้าช่วยนำทางพวกเขาไปสู่การเป็นสิ่งมีชีวิตที่มีปัญญาญาณโดยสมบูรณ์"

 uplift.6000.tropical.desc:0 "ป่าดิบชื้นที่หนาทึบของ [From.GetName] ซุกซ่อนสิ่งที่ [Owner.GetScientistCapital] [Root.GetLeaderName] ของ [Root.GetName] เรียกว่า 'อารยธรรมแรกเริ่ม'(การออกเสียง)\n\nสิ่งมีชีวิตคลาส [presapient_species.GetSpeciesClass] ที่ประกอบกันขึ้นเป็นสังคมดรุณนี้ยังคงตามหลังโค้งวิวัฒนาการอยู่มาก แต่ระเบียบสังคมของพวกมันดูเหมือนจะมีรากฐานมาจากจุดเริ่มต้นของภาษาที่เข้าใจได้และความคิดเชิงนามธรรม\n\n[Owner.GetScientistCapital] [Root.GetLeaderName] แนะนำว่าสิ่งมีชีวิตกลุ่มนี้อาจกลายเป็นพื้นที่ทดสอบที่เหมาะสมสำหรับเทคโนโลยีที่ออกแบบมาเพื่อกระตุ้นวิวัฒนาการอย่างรวดเร็ว" # GetSpeciesClass returns e.g. the 'avian_species' or 'toxic_species' string

 uplift.6000.arid.desc:0 "สปีชีส์หนึ่งในคลาส [presapient_species.GetSpeciesClass] บน [From.GetName] แสดงออกถึงสติปัญญาที่แปลกตา ท่ามกลางสภาพแวดล้อมที่แห้งแล้งและเป็นหินของดาวเคราะห์ สิ่งมีชีวิตเหล่านี้ได้วิวัฒนาการจนกลายเป็นผู้ครอบครองสิ่งแวดล้อม การทดสอบโดย [Owner.GetScientistCapital] [Root.GetLeaderName] ของ [Root.GetName] ชี้ให้เห็นว่าวิวัฒนาการของพวกมันสามารถเร่งความเร็วขึ้นได้ด้วยการประยุกต์ใช้เทคโนโลยีที่เหมาะสม" # GetSpeciesClass returns e.g. the 'avian_species' or 'toxic_species' string

 uplift.6000.desert.desc:0 "สิ่งมีชีวิตคลาส [presapient_species.GetSpeciesClass] รูปแบบหนึ่งที่เคลื่อนที่ผ่านผืนทรายอันแห้งแล้งของ [From.GetName] แสดงให้เห็นคุณลักษณะหลายประการที่สอดคล้องกับวิวัฒนาการของการใช้เหตุผลขั้นสูง\n\nแม้ว่าพัฒนาการของสายพันธุ์จะดูเหมือนคงที่ไปเมื่อหลายพันปีก่อน แต่เราก็อาจจะสามารถมอบแรงกระตุ้นทางเทคโนโลยีเพื่อขับเคลื่อนวิวัฒนาการให้กับพวกมันได้" # GetSpeciesClass returns e.g. the 'avian_species' or 'toxic_species' string

 uplift.6000.savannah.desc:0 "ทั่วทุ่งหญ้าสะวันนาของ [From.GetName] มีการเฝ้าสังเกตสิ่งมีชีวิตรูปร่างยาวที่ดูสง่างามทำกิจกรรมการสื่อสารระดับพื้นฐาน ร่วมมือกันเพื่อค้นหาอาหารและหลบหลีกผู้ล่าในระบบนิเวศของดาวเคราะห์ [Owner.GetScientistCapital] [Root.GetLeaderName] ของ [Root.GetName] เชื่อว่าสิ่งมีชีวิตคลาส [presapient_species.GetSpeciesClass] เหล่านี้อาจเหมาะสมสำหรับเทคโนโลยีที่มีจุดมุ่งหมายเพื่อเร่งอัตราความเร็วของวิวัฒนาการ" # GetSpeciesClass returns e.g. the 'avian_species' or 'toxic_species' string

 uplift.6000.tundra.desc:0 "เป็นที่ทราบกันดีว่าสภาพแวดล้อมที่โหดร้ายเป็นตัวผลักดันวิวัฒนาการการปรับตัว และชีวมณฑลที่หนาวเหน็บของ [From.GetName] ก็ไม่ใช่ข้อยกเว้น\n\n[Owner.GetScientistCapital] [Root.GetLeaderName] ให้ความสนใจเป็นพิเศษกับหนึ่งในสิ่งมีชีวิตคลาส [presapient_species.GetSpeciesClass] ที่วิ่งเตร่อยู่บนพื้นผิวน้ำแข็งของดาวเคราะห์ ด้วยการผลักดันไปในทิศทางที่ถูกต้อง พวกมันอาจจะบรรลุการมีปัญญาญาณได้" # GetSpeciesClass returns e.g. the 'avian_species' or 'toxic_species' string

 uplift.6000.arctic.desc:0 "แม้ว่าภูมิอากาศที่เย็นจัดต่ำกว่าจุดเยือกแข็งของ [From.GetName] จะไม่ค่อยเป็นมิตรกับการอยู่อาศัย แต่ดาวเคราะห์ดวงนี้ก็ไม่ได้แห้งแล้งไร้ชีวิตชีวา\n\nสิ่งมีชีวิตคลาส [presapient_species.GetSpeciesClass] หลายชนิดได้วิวัฒนาการมาเพื่อต้านทานสิ่งแวดล้อม และ [Owner.GetScientistCapital] [Root.GetLeaderName] เชื่อว่าสิ่งมีชีวิตเหล่านี้อย่างน้อยหนึ่งชนิดสามารถพัฒนาขึ้นสู่การเป็นผู้มีปัญญาญาณได้ หากได้รับสิ่งกระตุ้นภายนอกบางประการ..." # GetSpeciesClass returns e.g. the 'avian_species' or 'toxic_species' string

 uplift.6000.alpine.desc:0 "เทือกเขาที่ทอดยาวทั่วทั้งทวีปของ [From.GetName] ได้รับการพิสูจน์ว่าเป็นสภาพแวดล้อมที่อุดมสมบูรณ์สำหรับสิ่งมีชีวิตรูปแบบเฉพาะตัวของดาวเคราะห์ โดยเฉพาะสายพันธุ์คลาส [presapient_species.GetSpeciesClass] ชนิดหนึ่งได้ปรับตัวเข้ากับระดับความสูงที่รุนแรง และยังแสดงรูปแบบการสื่อสารด้วยเสียงพื้นฐาน (แม้จะเป็นเสียงคำรามต่ำในลำคอ) ด้วยสิ่งกระตุ้นที่เหมาะสม สิ่งมีชีวิตเหล่านี้อาจสามารถบรรลุการมีปัญญาญาณโดยสมบูรณ์ได้" # GetSpeciesClass returns e.g. the 'avian_species' or 'toxic_species' string

 uplift.6000.nuked.desc:0 "แม้ว่าดาวเคราะห์ดวงนี้จะมีกัมมันตภาพรังสีสูงมาก แต่ก็มีสิ่งมีชีวิตขั้นสูงอย่างน้อยหนึ่งชนิดที่เจริญรุ่งเรืองบน [From.GetName] ทาง [Owner.GetScientistCapital] [Root.GetLeaderName] รายงานว่าสิ่งมีชีวิตคลาส [presapient_species.GetSpeciesClass] เหล่านี้แสดงทักษะการตัดสินใจร่วมกันที่น่าประทับใจ และสิ่งเร้าภายนอกอาจจะกระตุ้นพวกมันไปสู่วิวัฒนาการในระดับที่สูงขึ้นไปอีก" # GetSpeciesClass returns e.g. the 'avian_species' or 'toxic_species' string

 uplift.6000.gaia.desc:1 "[From.GetName] เป็นสภาพแวดล้อมที่เกือบจะสมบูรณ์แบบสำหรับวิวัฒนาการของสิ่งมีชีวิต ทรัพยากรธรรมชาติที่อุดมสมบูรณ์เป็นบ้านที่เอื้อต่อพืชและสัตว์หลากหลายชนิดอย่างน่าทึ่ง ภายในสวรรค์แห่งนี้ [Owner.GetScientistCapital] [Root.GetLeaderName] ได้ค้นพบสังคมแรกเริ่มของสิ่งมีชีวิตชั้นสูงคลาส [presapient_species.GetSpeciesClass] - สังคมที่สามารถพิสูจน์ได้ว่าเป็นตัวเลือกที่ยอดเยี่ยมสำหรับการเร่งวิวัฒนาการอย่างรวดเร็ว" # GetSpeciesClass returns e.g. the 'avian_species' or 'toxic_species' string

 uplift.6000.relic.desc:1 "ท่ามกลางหอคอยที่พังทลายและท้องถนนที่เต็มไปด้วยฝุ่นของ [From.GetName] มีสิ่งมีชีวิตก่อนมีปัญญาญาณรูปแบบหนึ่งเดินเตร่อยู่ [Owner.GetScientistCapital] [Root.GetLeaderName] แนะนำว่าสิ่งมีชีวิตตัวเล็กและชาญฉลาดในคลาส [presapient_species.GetSpeciesClass] เหล่านี้อาจเคยถูกเลี้ยงไว้เป็นสัตว์เลี้ยงตามทฤษฎีนี้: เมื่อสายพันธุ์เจ้าของเดิมลดจำนวนลง สัตว์เหล่านี้จึงวิวัฒนาการอย่างรวดเร็วและตอนนี้พร้อมแล้วที่จะบรรลุการมีปัญญาญาณโดยสมบูรณ์ หากได้รับปัจจัยภายนอกที่เหมาะสม" # GetSpeciesClass returns e.g. the 'avian_species' or 'toxic_species' string

 uplift.6000.fallback.desc:0 "ตามรายงานจาก [Root.GetName] สิ่งมีชีวิตคลาส [presapient_species.GetSpeciesClass] ท้องถิ่นชนิดหนึ่งใน [From.GetName] สามารถเรียนรู้ที่จะปรับตัวครอบครองสิ่งแวดล้อมของดาวเคราะห์ได้บางส่วนแล้ว\n\n[Owner.GetScientistCapital] [Root.GetLeaderName] แนะนำให้จับตาดูพัฒนาการของพวกเขาอย่างใกล้ชิด และ - หากเป็นไปได้ - ยกระดับพัฒนาการของพวกเขาให้บรรลุการมีปัญญาญาณโดยสมบูรณ์" # GetSpeciesClass returns e.g. the 'avian_species' or 'toxic_species' string

 uplift.6000.wilderness.desc: "[Root.GetName] ค้นพบสิ่งมีชีวิตก่อนมีปัญญาญาณแบบรักสันโดษอาศัยอยู่บน [from.GetName] สิ่งมีชีวิตคลาส [presapient_species.GetSpeciesClass] นี้มีความสามารถในการครอบครองสิ่งแวดล้อมในระดับที่น่าทึ่งแล้ว เมื่อพิจารณาว่าไม่มีสติปัญญาร่วมกัน(หน่วยสืบราชการลับ)คอยชี้ทางนำ\n\nเราควรเฝ้าติดตามพัฒนาการของพวกเขาอย่างใกล้ชิด และบางทีในวันข้างหน้าอาจนำพวกเขามารวมเข้าเป็นหนึ่งในจักรวรรดิของเรา การมีอยู่ของสิ่งมีชีวิตเหล่านี้บ่งบอกถึงแนวโน้มที่ดีสำหรับการตื่นรู้ของดาวเคราะห์ [from.GetName]" # GetSpeciesClass returns e.g. the 'avian_species' or 'toxic_species' string

 uplift.6000.a:0 "ใช่ พวกเรามีความรู้นั้นแล้ว"
 uplift.6000.b:0 "เป็นสิ่งที่ต้องจำไว้สำหรับวันข้างหน้า"

# Pre-Sapients Uplifted
 uplift.6010.name:1 "การยกระดับพัฒนาการสำเร็จเสร็จสิ้น"

 uplift.6010.continental.desc:0 "สายพันธุ์เด่นบน [Root.GetName] ซึ่งก็คือ [From.GetName] ได้รับการยกระดับพัฒนาการเรียบร้อยแล้ว มีเพียงการดัดแปรพันธุกรรมเล็กน้อยเท่านั้นเพื่อปลดล็อกศักยภาพที่มีอยู่ในการปรับปรุงความสามารถทางสติปัญญาและการใช้มือได้ดียิ่งขึ้น ในขณะที่ประชากรรุ่นก่อนหน้าจะได้รับการติดตั้งอุปกรณ์ฝังเทคโนโลยีไซเบอร์เนติกส์ขนาดเล็ก"

 uplift.6010.ocean.desc:0 "ความพยายามของเราในการเร่งวิวัฒนาการของ [From.GetName] ไปในทิศทางที่น่าพึงพอใจประสบความสำเร็จอย่างงดงาม มีการจัดโครงการการศึกษาสำหรับกลุ่มตัวอย่างที่มีอายุน้อยที่สุด - ซึ่งตอนนี้กลายเป็นปัจเจกบุคคลแล้ว - ในขณะที่ประชากรที่มีอายุมากกว่าพร้อมยอมรับการปรับเงื่อนไขทางพันธุกรรมและจิตใจ"

 uplift.6010.tropical.desc:0 "[From.GetName] ได้รับการยกระดับพัฒนาการสำเร็จแล้วเพื่อก้าวมาเป็นพลเมืองที่มีศักยภาพของ [Root.Owner.GetName] และเป็นผู้อยู่อาศัยในอาณานิคมของเราบนดาวเคราะห์เขตร้อน [Root.GetName]"

 uplift.6010.arid.desc:0 "สำเร็จแล้ว!\n\n[From.GetName] ซึ่งเป็นสายพันธุ์ท้องถิ่นดั้งเดิมของ [This.GetName] ได้รับการยกระดับขึ้นเป็นพลเมืองของ [This.Owner.GetName] เรียบร้อยแล้ว"

 uplift.6010.desert.desc:0 "ในเวลานี้ [From.GetName] ยืนหยัดในฐานะประจักษ์พยานที่มีชีวิตถึงความยิ่งใหญ่ทางวิทยาศาสตร์และเทคโนโลยีของ [Root.Owner.GetName]"

 uplift.6010.savannah.desc:0 "ความพยายามของเราในการพัฒนา [From.GetName] ได้ออกดอกผล: ด้วยการปรับเปลี่ยนรหัสพันธุกรรมเล็กน้อยบางประการ เราก็สามารถยกระดับความสามารถทางสติปัญญาของพวกเขาได้สำเร็จ"

 uplift.6010.tundra.desc:0 "ในยามนี้ [From.GetName] กลายเป็นสิ่งมีชีวิตทรงภูมิปัญญาและชาญฉลาดพอสมควรแล้ว\n\nขณะนี้พวกเขาอยู่ภายใต้การปกครองของ [Root.Owner.GetName]"

 uplift.6010.arctic.desc:0 "[From.GetName] ซึ่งเติบโตมาจากทุ่งน้ำแข็งอันหนาวเหน็บของ [Root.GetName] ได้บรรลุระดับสติปัญญาโดยได้รับความช่วยเหลือจาก [Root.Owner.GetSpeciesName]\n\nพวกเขาได้เข้าร่วมอาณานิคมบนดาวบ้านเกิดของพวกเขา [Root.GetName] ในฐานะพลเมืองที่มีประโยชน์ต่อสังคมของ [Root.Owner.GetName]"

 uplift.6010.alpine.desc:0 "การดัดแปรพันธุกรรมที่เราดำเนินการกับ [From.GetName] ยกระดับพวกเขาขึ้นสู่การเป็นผู้มีปัญญาญาณได้อย่างสมบูรณ์ ในขณะนี้ เมื่อพวกเขาจ้องมองขึ้นไปบนฟากฟ้าจากบ้านในแถบภูเขา พวกเขากระทำไปด้วยความตระหนักรู้ในตนเองที่แท้จริง"

 uplift.6010.nuked.desc:0 "จากจุดเริ่มต้นเล็ก ๆ ในอดีต ตอนนี้ [From.GetName] ได้เติบโตขึ้นเพื่อร่วมเป็นพลเมืองของ [Root.Owner.GetName]"

 uplift.6010.gaia.desc:0 "ด้วยความพยายามของเรา [From.GetName] ได้รับการยกระดับขึ้นสำเร็จแล้ว ช่างเป็นของขวัญอันล้ำค่าที่ช่วยให้พวกเขาสามารถทำความเข้าใจสวรรค์ที่ตนเองอาศัยอยู่อย่างถ่องแท้"

 uplift.6010.relic.desc:0 "ทั่วโลกที่พังทลายของพวกเขา สายพันธุ์เด่นของ [Root.GetName] ได้ตื่นขึ้นจากการหลับใหลอันยาวนานแล้ว ความพยายามในการยกระดับพวกเขาสู่สติปัญญาโดยสมบูรณ์ประสบความสำเร็จอย่างงดงาม"

 uplift.6010.fallback.desc:0 "เมื่อได้รับการยกระดับขึ้นสู่สติปัญญาญาณโดยสมบูรณ์ [From.GetName] ในเวลานี้ยืนหยัดในฐานะสิ่งเตือนใจที่มีชีวิตถึงความเกรียงไกรทางวิทยาศาสตร์และเทคโนโลยีของ [Root.Owner.GetName]"

 uplift.6010.a:1 "[This.Owner.GetName] ยินดีต้อนรับพวกเขา"
 uplift.6010.tt:0 "§Y[This.Owner.GetName]§! ได้รับอิทธิพล §Y50 $r_influence$§!"

