 uplift.7000.name:0 "การยกระดับ ติดตามผล"
 uplift.7000.desc:0 "[From.From.From.GetName] ได้เข้ามาอยู่ร่วมกับพวกเราเป็นเวลาหลายวันแล้ว\n\nทุกอย่างบนดาวเคราะห์ [From.GetName] ดำเนินไปด้วยดี"
 uplift.7010.name:0 "จุดเริ่มต้นที่ขรุขระ"
 uplift.7010.desc:0 "การบูรณาการปรับตัวของ [From.From.From.GetName] ที่เราเพิ่งยกระดับพัฒนาการนั้นดำเนินไปด้วยดีเกินคาด แต่ก็ยังไม่ราบรื่นร้อยเปอร์เซ็นต์อย่างที่เราหวังไว้\n\nแม้ว่าเราจะพยายามเกลี้ยกล่อมจิตวิทยาของพวกเขา [From.From.From.GetName] ก็ยังต้องเผชิญกับความยากลำบากในการปรับตัวเข้ากับวิถีทางที่เราปฏิบัติใน [From.Owner.GetName] เป็นครั้งคราว"

