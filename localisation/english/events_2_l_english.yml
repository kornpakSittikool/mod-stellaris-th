 story.101.a:0 "เริ่มโครงการพิเศษเพื่อเฝ้าศึกษาอะมีบาอวกาศจากระยะไกล"
 story.101.b:0 "เราหวังว่ากองยานของเราจะจัดการกับสิ่งมีชีวิตนี้ได้อย่างรวดเร็ว"

 story.105.name:0 "อะมีบาอวกาศชั่วนิรันดร์"
 #project completed
 story.105.desc.phile:1 "อะมีบาอวกาศ(สเปน อมีบา) -ชื่อเล่นที่ได้รับความนิยมด้วยความเสน่หาบน [Root.Capital.GetName] - เป็นสัตว์รักสันโดษเมื่อปล่อยให้อยู่ตามธรรมชาติ ตัวอย่างทั้งหมดยกเว้นตัวอย่างที่มีอายุน้อยที่สุด จะมีสิ่งมีชีวิตกึ่งอิสระที่เรียกว่า แฟลเจลลา(ฟลาเจลล่า)ร่วมอยู่ด้วย ซึ่งดูเหมือนจะงอกออกมาจากตัวอะมีบาและถูกตั้งโปรแกรมผ่านสารคัดหลั่งที่มีส่วนผสมของอาร์เอ็นเอเพื่อทำตามคำสั่งของโฮสต์\n\nในตอนแรกที่สันนิษฐานว่าเป็นอะมีบาอวกาศวัยเยาว์นั้น แฟลเจลลาไม่ได้ดูเหมือนจะเป็นปัจจัยในกลไกการสืบพันธุ์ใด ๆ แฟลเจลลาแต่ละเส้นทำหน้าที่เป็นเพียงระยางค์ที่แยกส่วนสำหรับตัวอะมีบาที่เป็นโฮสต์เท่านั้น แฟลเจลลาเหล่านี้สามารถควบคุมและแม้กระทั่งโจมตีวัตถุในระยะที่จำกัดรอบตัวโฮสต์ได้อย่างน่าทึ่ง โดยจะกลับมาเข้าไปอาศัยอยู่ในร่างกายของโฮสต์อะมีบาเป็นระยะเพื่อรับการตั้งโปรแกรมใหม่\n\nมีความเป็นไปได้ที่จะนำมาประยุกต์ใช้ในทางการทหารจากคุณสมบัติการฟื้นฟูของผิวหนังที่หนาของอะมีบา หรือจากรูปแบบการเคลื่อนไหวที่สง่างามของแฟลเจลลา"
 story.105.desc.pacif:0 "อะมีบาอวกาศ(สเปน อมีบา) -ชื่อเล่นที่ได้รับความนิยมหลังจากเรื่องราวที่มาของมันเดินทางกลับมายัง [Root.Capital.GetName] - เป็นสัตว์รักสันโดษเมื่อปล่อยให้อยู่ตามธรรมชาติ ตัวอย่างทั้งหมดยกเว้นตัวอย่างที่มีอายุน้อยที่สุด จะมีสิ่งมีชีวิตกึ่งอิสระที่เรียกว่า แฟลเจลลา(ฟลาเจลล่า)ร่วมอยู่ด้วย ซึ่งดูเหมือนจะงอกออกมาจากตัวอะมีบาและถูกตั้งโปรแกรมผ่านสารคัดหลั่งที่มีส่วนผสมของ อาร์เอ็นเอเพื่อทำตามคำสั่งของโฮสต์\n\nในตอนแรกที่สันนิษฐานว่าเป็นอะมีบาอวกาศวัยเยาว์นั้น แฟลเจลลาไม่ได้ดูเหมือนจะเป็นปัจจัยในกลไกการสืบพันธุ์ใด ๆ แฟลเจลลาแต่ละเส้นทำหน้าที่เป็นเพียงระยางค์ที่แยกส่วนสำหรับตัวอะมีบาที่เป็นโฮสต์เท่านั้น แฟลเจลลาเหล่านี้สามารถควบคุมและแม้กระทั่งโจมตีวัตถุในระยะที่จำกัดรอบตัวโฮสต์ได้อย่างน่าทึ่ง โดยจะกลับมาเข้าไปอาศัยอยู่ในร่างกายของโฮสต์อะมีบาเป็นระยะเพื่อรับการตั้งโปรแกรมใหม่"
 story.105.desc:1 "อะมีบาอวกาศ(สเปน อมีบา) -ชื่อนี้ติดปากเนื่องจากการออกเสียงชื่อสายพันธุ์เอเลี่ยนที่แท้จริงนั้นยากเกินไปสำหรับ [Root.GetSpeciesName] ทั่วไป - เป็นสัตว์รักสันโดษเมื่อปล่อยให้อยู่ตามธรรมชาติ ตัวอย่างทั้งหมดยกเว้นตัวอย่างที่มีอายุน้อยที่สุด จะมีแฟลเจลลากึ่งอิสระร่วมอยู่ด้วย ซึ่งเป็นสิ่งมีชีวิตที่เกิดจากตัวอะมีบาและถูกตั้งโปรแกรมผ่านสารคัดหลั่งที่มีส่วนผสมของอาร์เอ็นเอเพื่อทำตามคำสั่งของโฮสต์ แฟลเจลลาเหล่านี้สามารถควบคุมและโจมตีวัตถุในระยะที่น่าทึ่งแต่จำกัดรอบตัวโฮสต์ โดยจะกลับเข้าไปหลบอยู่ในร่างกายของโฮสต์อะมีบาเป็นระยะเพื่อรับการตั้งโปรแกรมใหม่\n\nมีความเป็นไปได้ที่จะนำมาประยุกต์ใช้ในทางการทหารจากคุณสมบัติการฟื้นฟูของผิวหนังที่หนาของอะมีบา หรือจากรูปแบบการเคลื่อนไหวที่สง่างามของแฟลเจลลา"
 story.105.desc.gesta:0 "ตามปกติแล้ว อะมีบาอวกาศ(สเปน อมีบา)จะมีแฟลเจลลากึ่งอิสระจำนวนหนึ่งอยู่ร่วมด้วยเพื่อใช้ในการป้องกันตัวและจัดการวัตถุ อะมีบาและแฟลเจลลาของมันไม่ได้มีความตระหนักรู้ร่วมกัน โดยตัวอะมีบาจะใช้สารคัดหลั่งที่มีส่วนผสมของอาร์เอ็นเอเพื่อตั้งโปรแกรมให้แฟลเจลลาทำงานที่มีความซับซ้อนในระดับปานกลาง"
 story.105.a:0 "น่าสนใจจริงๆ"

 story.110.name:0 "ชำแหละอะมีบาอวกาศ"
 #debris studied
 story.110.desc.phobe:0 "อะมีบาอวกาศ(สเปน อมีบา) -ซึ่งตอนนี้เป็นคำกึ่งดูหมิ่นที่เผยแพร่อย่างสะใจโดยกองกำลัง [Root.GetSpeciesAdj] ที่ได้รับมอบหมายให้ทำลายพวกมัน - มีความซับซ้อนมากกว่าที่คาดการณ์ไว้มาก ภายนอกที่แข็งแกร่งของพวกมันช่วยปกป้องช่องจำนวนมากที่บรรจุ \"อะมีบา\" ขนาดเล็กกว่า สิ่งมีชีวิตที่กองยานของเราพบว่าทำหน้าที่เสมือนยานโจมตีขนาดเล็กเมื่อทำการปกป้อง \"อะมีบาแม่\" แม้จะมีความคล้ายคลึงกันในรูปลักษณ์ภายนอกนอกจากความแตกต่างของขนาดที่เห็นได้ชัด แต่ \"อะมีบาโจมตี\" เป็นสิ่งมีชีวิตที่เรียบง่ายกว่าตัวอะมีบาอวกาศหลักมาก ภายในตัวอะมีบาอวกาศ นอกเหนือจากช่องเหล่านี้แล้ว ยังมีอวัยวะที่บอบบางหลายร้อยชิ้นที่ส่วนใหญ่จำเป็นต่อการเอาชีวิตรอดในสุญญากาศอันโหดร้ายของอวกาศ\n\nอวัยวะเหล่านี้จำนวนมากเกิดการฉีกขาดหรือถูกเผาทำลายไปในระหว่างกระบวนการสังหารอะมีบา ทำให้เราได้ซากสิ่งมีชีวิตที่ค่อนข้างไม่สมบูรณ์\n\nอย่างไรก็ตาม นักเอเลี่ยนชีววิทยาที่ได้รับมอบหมายให้อยู่ในโครงการอะมีบาอวกาศเชื่อว่ากระบวนการจัดหาชิ้นส่วนตัวอย่างนั้นใช้งานได้จริง และได้แจกจ่ายคำแนะนำในการกำหนดเป้าหมายเฉพาะในหมู่กองยานทหารที่เกี่ยวข้อง หากมีอะมีบาอีกห้าตัวที่ถูกสังหารโดยการโจมตีอย่างแม่นยำไปยังส่วนต่าง ๆ ของร่างกาย ซากที่สมบูรณ์ก็สามารถสร้างขึ้นมาใหม่ได้อย่างมีประสิทธิภาพ"
 story.110.desc.milit:0 "อะมีบาอวกาศ(สเปน อมีบา) -ชื่อเล่นที่กองกำลัง [Root.GetSpeciesAdj] นำมาใช้เป็นรหัสเป้าหมายอย่างเป็นทางการในที่สุด - มีความซับซ้อนมากกว่าที่คาดไว้มาก ร่างกายภายนอกอันแข็งแกร่งของพวกมันช่วยปกป้องช่องจำนวนมากซึ่งเป็นที่อยู่ของ \"อะมีบา\" ตัวเล็กกว่า ซึ่งกองยานของเราสังเกตเห็นว่าทำงานเป็นเสมือนยานโจมตีเมื่อเข้าปะทะเคียงข้าง \"อะมีบาแม่\" แม้จะมีความคล้ายคลึงภายนอกนอกจากความแตกต่างของขนาด แต่ \"อะมีบาโจมตี\" ก็มีความซับซ้อนทางสรีรวิทยาต่ำกว่าตัวอะมีบาอวกาศหลักมาก ภายในตัวอะมีบาอวกาศ ถัดไปจากช่องบรรจุเหล่านี้ มีอวัยวะที่ละเอียดอ่อนหลายร้อยชิ้นซึ่งน่าจะเป็นส่วนสำคัญในการมีชีวิตรอดในสภาพสุญญากาศอวกาศอันแสนโหดร้าย อวัยวะเหล่านี้ส่วนใหญ่แตกสลายหรือถูกเผาไหม้ไปในระหว่างการทำลายล้างอะมีบา ทำให้เราเหลือซากที่ไม่ค่อยสมบูรณ์นัก\n\nอย่างไรก็ตาม นักเอเลี่ยนชีววิทยาในโครงการอะมีบาอวกาศเชื่อว่ากระบวนการรวบรวมตัวอย่างนั้นใช้งานได้จริง และได้แจกจ่ายคำแนะนำในการกำหนดเป้าหมายอย่างเจาะจงให้แก่กองยานรบต่าง ๆ หากได้ชำแหละอะมีบาเพิ่มอีกห้าตัวซึ่งถูกปลิดชีพด้วยการโจมตีอย่างแม่นยำไปยังพิกัดร่างกายเฉพาะ ซากที่สมบูรณ์ก็คงจะถูกประกอบขึ้นมาใหม่ได้สำเร็จ"
 story.110.desc:0 "อะมีบาอวกาศ(สเปน อมีบา) -เนื่องจากพวกมันยากต่อการจัดหมวดหมู่ตามอนุกรมวิธานดั้งเดิมของ [Root.Owner.Capital.GetSpeciesAdj] ชื่อนี้จึงกลายเป็นชื่อเรียกหลัก - มีความซับซ้อนมากกว่าที่คาดไว้มาก ร่างกายภายนอกที่แข็งแรงปกป้องช่องจำนวนมากซึ่งเป็นที่อยู่ของ \"อะมีบา\" ขนาดเล็ก สิ่งมีชีวิตที่กองยานของเราพบว่าทำหน้าที่เป็นยานโจมตีอย่างมีประสิทธิภาพเมื่อเผชิญหน้ากับ \"อะมีบาแม่\" แม้จะคล้ายคลึงกันนอกจากความแตกต่างเรื่องขนาด แต่ \"อะมีบาโจมตี\" มีความซับซ้อนทางสรีรวิทยาน้อยกว่าอะมีบาอวกาศหลักมาก ภายในตัวอะมีบาอวกาศ นอกเหนือจากช่องเหล่านี้แล้ว มีอวัยวะที่ละเอียดอ่อนหลายร้อยชิ้นที่จำเป็นต่อการเอาชีวิตรอดในสุญญากาศอวกาศที่รุนแรง อวัยวะเหล่านี้จำนวนมากเกิดการฉีกขาดหรือถูกเผาทำลายในระหว่างการทำลายอะมีบา ทำให้เราได้ซากที่ไม่สมบูรณ์นัก อย่างไรก็ตาม นักเอเลี่ยนชีววิทยาที่ได้รับมอบหมายในโครงการอะมีบาอวกาศเชื่อว่าแค่นี้ก็เพียงพอแล้ว เนื่องจากพวกเขาประสบความสำเร็จในการระบุลักษณะทางสรีรวิทยาและจุดอ่อนเฉพาะตัวของอะมีบาอวกาศแล้ว"
 story.110.desc.gesta:0 "อะมีบาอวกาศ(สเปน อมีบา)มีความซับซ้อนมากกว่าที่คาดการณ์ไว้มาก ภายนอกที่แข็งแกร่งของพวกมันช่วยปกป้องช่องจำนวนมากซึ่งเป็นที่อยู่ของ \"อะมีบา\" ที่เล็กกว่า สิ่งมีชีวิตที่กองยานของเราสังเกตเห็นว่าทำงานเป็นยานโจมตีได้อย่างมีประสิทธิภาพเมื่อมีส่วนร่วมกับ \"อะมีบาแม่\" แม้ว่าจะมีความคล้ายคลึงกันนอกจากความแตกต่างของขนาดที่ชัดเจน แต่ \"อะมีบาโจมตี\" ก็มีความซับซ้อนทางสรีรวิทยาน้อยกว่าตัวอะมีบาอวกาศที่แท้จริงมาก ภายในตัวอะมีบาอวกาศ นอกเหนือจากช่องเหล่านี้ มีอวัยวะที่บอบบางหลายร้อยชิ้นที่จำเป็นต่อการอยู่รอดในสุญญากาศอวกาศที่เลวร้าย อวัยวะเหล่านี้จำนวนมากฉีกขาดหรือถูกเผาไหม้ไปในกระบวนการทำลายอะมีบา ทำให้เหลือซากที่ค่อนข้างไม่สมบูรณ์ อย่างไรก็ตาม นักเอเลี่ยนชีววิทยาในโครงการเชื่อว่าสิ่งนี้เพียงพอแล้ว เนื่องจากพวกเขาได้ระบุคุณลักษณะทางสรีรวิทยาและจุดอ่อนเฉพาะตัวของอะมีบาอวกาศได้สำเร็จแล้ว"
 story.110.a.phobe:1 "อะไรก็ตามที่จะช่วยให้เรากำจัดพวกมันได้เร็วขึ้น"
 story.110.b.milit:0 "เป้าซ้อมยิง"
