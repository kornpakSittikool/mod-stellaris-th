 fallen_empires_tasks.4.tooltip:1 "ประชากร §H[Root.GetSpeciesName]§! กลุ่มหนึ่งจะถูกนำออกไปจากจักรวรรดิของคุณ"
 fallen_empires_tasks.8.name:0 "การติดต่อจาก §H[FallenEmpireTaskOrigin.GetName]§!"
 fallen_empires_tasks.8.desc:0 "[From.GetSpeciesNamePluralCompliment] ผู้ทรงเกียรติแห่ง [From.GetName] เราเชื่อว่าเผ่าพันธุ์ของคุณเปี่ยมไปด้วยอนาคตอันรุ่งโรจน์ แม้ว่าพวกคุณจะยังเยาว์วัยอยู่ แต่ดูเหมือนว่าจะเข้าใจและเห็นคุณค่าความสำคัญของความหลากหลายทางชีวภาพและสังคม ผู้ซึ่งแสวงหาความเข้าใจและยอมรับในสิ่งที่แตกต่าง แทนที่จะกดขี่และทำลายล้างมัน แต่น่าเสียดายที่เผ่าพันธุ์รุ่นเยาว์เผ่าพันธุ์อื่นไม่ได้ชาญฉลาดเช่นนั้น โดยเฉพาะอย่างยิ่ง §H[FallenEmpireTaskTarget.GetName]§! ที่ดูเหมือนจะภาคภูมิใจในการ \"กวาดล้าง\" กาแล็กซีจากสิ่งมีชีวิตทุกรูปแบบที่พวกเขาเห็นว่าไม่เหมาะสม แม้ว่าเราจะไม่สามารถลงมือแทรกแซงโดยตรงได้ แต่เราปรารถนาที่จะมอบหมายภารกิจให้แก่รัฐบาลของคุณในการยุติการกระทำอันชั่วร้ายของพวกเขา จงโจมตีพวกเขาและบังคับให้พวกเขาสั่งห้ามการปฏิบัติตามแนวทางการกวาดล้าง(รมควัน)แล้วเราจะรู้สึกซาบซึ้งใจอย่างยิ่ง"
 fallen_empires_tasks.8.a:0 "เราจะหยุดยั้งการกระทำอันโหดร้ายทารุณไม่ให้เกิดขึ้นอีก!"
 fallen_empires_tasks.8.b:0 "เราไม่ประสงค์ที่จะมีความขัดแย้งกับ [FallenEmpireTaskTarget.GetName]"
 fallen_empires_tasks.9.name:0 "การติดต่อจาก §H[FallenEmpireTaskOrigin.GetName]§!"
 fallen_empires_tasks.9.desc:0 "คุณทำได้ดีมาก [From.GetSpeciesName] รุ่นเยาว์ §H[FallenEmpireTaskTarget.GetName]§! ได้ถูกสยบลงแล้ว และอย่างน้อยที่สุดในเวลานี้ การฆ่าล้างอันโหดร้ายของพวกเขาก็ถูกระงับลง เราซาบซึ้งใจอย่างยิ่ง และปรารถนาให้เผ่าพันธุ์รุ่นเยาว์เผ่าพันธุ์อื่นแสดงความหวังได้มากเท่ากับคุณ"
 fallen_empires_tasks.9.a:0 "ตกลง"
 fallen_empires_tasks.10.name:0 "การติดต่อจาก §H[FallenEmpireTaskOrigin.GetName]§!"
 fallen_empires_tasks.10.desc:0 "เราผิดหวังเป็นอย่างยิ่ง [From.GetSpeciesName] รุ่นเยาว์ แม้ว่าคุณจะสัญญาว่าจะยุติการกระทำอันป่าเถื่อนของพวกเขา แต่ §H[FallenEmpireTaskTarget.GetName]§! ก็ยังคงกวาดล้างและเข่นฆ่าตามใจชอบต่อไป เราเคยคิดว่าเผ่าพันธุ์ของคุณเปี่ยมไปด้วยอนาคตที่ดี แต่บางทีเราอาจจะประเมินคุณสูงเกินไป"
 fallen_empires_tasks.10.a:0 "ตกลง"
 fallen_empires_tasks.11.name:0 "การติดต่อจาก §H[FallenEmpireTaskOrigin.GetName]§!"
 fallen_empires_tasks.11.desc:0 "ยินดีต้อนรับ [From.GetSpeciesName] รุ่นเยาว์ เมื่อไม่นานมานี้เราได้มอบหมายภารกิจให้คุณยุติแนวทางการปฏิบัติกวาดล้างใน §H[FallenEmpireTaskTarget.GetName]§! แต่ดูเหมือนว่าคำขอของเราจะไม่จำเป็นอีกต่อไป เนื่องจาก [FallenEmpireTaskTarget.GetSpeciesName] ได้สั่งห้ามแนวปฏิบัติดังกล่าวไปเรียบร้อยแล้ว ไม่ว่าจะเพราะถูกบังคับโดยผู้อื่นหรือตัดสินใจทำด้วยตัวเองก็ตาม ตอนนี้ไม่มีความจำเป็นต้องใช้มาตรการทางทหารที่รุนแรงกับพวกเขาอีกต่อไป"
 fallen_empires_tasks.11.a:0 "ตกลง"
 fallen_empires_tasks.13.name:0 "การติดต่อจาก §H[FallenEmpireTaskOrigin.GetName]§!"
 fallen_empires_tasks.13.desc:0 "นี่มันอะไรกัน [From.GetSpeciesName] รุ่นเยาว์?! เจ้าคิดจะล้อเลียนพวกเราอย่างนั้นรึ?! ไม่เพียงแต่จะล้มเหลวในการหยุดยั้งการกระทำอันโหดร้ายทารุณใน §H[FallenEmpireTaskTarget.GetName]§! เท่านั้น แต่ตอนนี้เจ้ากลับเลือกที่จะทำให้การกระทำป่าเถื่อนแบบเดียวกันนั้นถูกกฎหมายในจักรวรรดิของเจ้าเองด้วย! จงรู้ไว้ซะว่าเราจะไม่ยอมให้ใครมาทำเหมือนเราเป็นคนโง่ จะต้องมีผลสะท้อนตามมาจากเหตุการณ์นี้อย่างแน่นอน จำคำพูดของข้าไว้"
 fallen_empires_tasks.13.a:0 "เอ่อ... อุ๊ย?"
 fallen_empires_tasks.15.name:0 "การติดต่อจาก §H[FallenEmpireTaskOrigin.GetName]§!"
 fallen_empires_tasks.15.desc:1 "[From.GetSpeciesNamePlural]! นี่เป็นข้อความเพื่อแจ้งให้ทราบถึงการพัฒนาที่เป็นอันตรายใน §H[FallenEmpireTaskTarget.GetName]§! ทาง [FallenEmpireTaskTarget.GetSpeciesName] ได้เริ่มเจาะลึกเข้าไปในเทคโนโลยีที่นอกรีตนอกรอย โดยสร้างปัญญาประดิษฐ์ที่ซับซ้อนยิ่งขึ้นเรื่อย ๆ เพื่อไขว่คว้าเครื่องจักรที่มีความตระหนักรู้ในตนเองอย่างแท้จริง เราได้ประจักษ์มาแล้วว่าหนทางนี้จะนำไปสู่สิ่งใด และรู้สึกว่าเป็นหน้าที่ของเราที่จะต้องเตือนคุณถึงภัยอันตรายที่สิ่งนี้จะส่งผลกระทบต่อทั้งดวงวิญญาณของพวกเขาเองและของเผ่าพันธุ์รุ่นเยาว์ทั้งหมด เราขอแนะนำให้คุณใช้กำลังทหารโจมตีพวกเขาและบังคับให้พวกเขาสั่งห้ามการวิจัยดังกล่าวต่อไป"
 fallen_empires_tasks.15.a:1 "พวกเขาจะต้องถูกหยุดยั้ง!"
 fallen_empires_tasks.15.b:0 "เราไม่ประสงค์ที่จะมีความขัดแย้งกับ [FallenEmpireTaskTarget.GetName]"
 fallen_empires_tasks.16.name:0 "การติดต่อจาก §H[FallenEmpireTaskOrigin.GetName]§!"
 fallen_empires_tasks.16.desc:1 "[From.GetSpeciesNamePlural]! คุณทำได้ดีมากในการยุติการทดลองนอกรีตของ §H[FallenEmpireTaskTarget.GetName]§! และในตอนนี้ดวงวิญญาณของพวกเขาก็ปลอดภัยแล้ว จงรู้ไว้ว่าคุณได้รับความขอบคุณจากเราสำหรับบทบาทเล็ก ๆ ที่คุณได้ทำในความอุตสาหะอันยิ่งใหญ่ของเรา"
 fallen_empires_tasks.16.a:0 "ตกลง"
 fallen_empires_tasks.17.name:0 "การติดต่อจาก §H[FallenEmpireTaskOrigin.GetName]§!"
 fallen_empires_tasks.17.desc:1 "[From.GetSpeciesNamePlural]! ทั้งที่มีคำเตือนจากเรา แต่คุณกลับเลือกที่จะไม่ทำอะไรเลยเกี่ยวกับการวิจัยนอกรีตที่เกิดขึ้นใน §H[FallenEmpireTaskTarget.GetName]§! ดูเหมือนว่าเผ่าพันธุ์ของคุณอาจจะไม่คุ้มค่าที่จะได้รับการช่วยเหลือเสียแล้ว"
 fallen_empires_tasks.17.a:0 "ตกลง"
 fallen_empires_tasks.18.name:0 "การติดต่อจาก §H[FallenEmpireTaskOrigin.GetName]§!"
 fallen_empires_tasks.18.desc:1 "[From.GetSpeciesNamePlural]! ความช่วยเหลือของคุณในการยุติการวิจัยนอกรีตโดย §H[FallenEmpireTaskTarget.GetName]§! ไม่จำเป็นอีกต่อไปแล้ว เนื่องจากจักรวรรดินั้นได้สั่งห้ามการวิจัยเกี่ยวกับปัญญาประดิษฐ์ของเครื่องจักรเพิ่มเติมเรียบร้อยแล้ว แม้ว่าคุณจะไม่มีส่วนเกี่ยวข้องในการดำเนินการนี้ แต่อย่างน้อยภัยคุกคามต่อความสุขุมทางจิตวิญญาณของกาแล็กซีนี้ก็ได้รับการจัดการแล้ว"
 fallen_empires_tasks.18.a:0 "ตกลง"
 fallen_empires_tasks.20.name:0 "การติดต่อจาก §H[FallenEmpireTaskOrigin.GetName]§!"
 fallen_empires_tasks.20.desc:1 "พวกเจ้าคิดว่าพวกเราโง่เขลารึไง [From.GetSpeciesNamePlural]?! คิดหรือว่าเราจะไม่สังเกตเห็นว่าหลังจากยอมตกลงที่จะยุติการวิจัยนอกรีตใน §H[FallenEmpireTaskTarget.GetName]§! แล้ว พวกเจ้ากลับเริ่มทำวิจัยในแนวทางเดียวกันนั้นเสียเอง?! พวกเราจะไม่ยอมถูกล้อเลียนโดยพวกคนเถื่อนไร้ค่าที่เพิ่งจะควบคุมพลังงานอะตอมได้หรอกนะ เตรียมตัวรับการตอบโต้จากเราได้เลย"
 fallen_empires_tasks.20.a:0 "เอ่อ... อุ๊ย?"
 fallen_empires_tasks.22.name:0 "การติดต่อจาก §H[FallenEmpireTaskOrigin.GetName]§!"
 fallen_empires_tasks.22.desc:0 "[Root.GetRulerTitle] [Root.GetRulerName] เราเข้าใจดีว่าจักรวรรดิของคุณเป็นที่อยู่อันมีค่าสำหรับบุคคลผู้มีจิตใจอันชาญฉลาดเหนือระดับความดิบเถื่อนอันน่าอนาถของเผ่าพันธุ์คุณ แม้ว่าพรสวรรค์ของ §H[FallenEmpireScientistTarget.GetName]§! จะสูญเสียไปอย่างน่าเสียดายใน [Root.GetName] แต่พวกเรา [FallenEmpireTaskOrigin.GetSpeciesName] มักจะมีงานสำหรับนักวิทยาศาสตร์ผู้มีทักษะเพื่อให้เข้ามาทำงานในหอจดหมายเหตุของเราเสมอ ด้วยเหตุนี้ เราจึงขอเสนอโอกาสพิเศษในการรับความโปรดปรานจากเรา โดยการอนุญาตให้เราดูแลควบคุม [FallenEmpireScientistTarget.GetHimHer] ตอนนี้เรามียานที่อยู่ระหว่างการเดินทางเพื่อไปรับ [FallenEmpireScientistTarget.GetHimHer] แล้ว ดังนั้นคุณเพียงแค่ตอบตกลง และทุกสิ่งจะได้รับการจัดการเรียบร้อย\n\nเราแน่ใจว่าคุณคงไม่อยากทำให้เราผิดหวังใช่ไหม?"
 fallen_empires_tasks.22.a:0 "ดีมากที่คุณ จะพา[FallenEmpireScientistTarget.GetHimHer]ไป"
 fallen_empires_tasks.22.b:0 "เราจะไม่มอบของๆเรา ให้กับต่างพวกดาวเด็ดขาด!"
 fallen_empires_tasks.22.c:0 "มันไม่ได้ขึ้นอยู่กับการตัดสินใจของเรา!"
 fallen_empires_tasks.22.d:0 "ผมคิดว่าไม่"
 fallen_empires_tasks.22.e:0 "ไม่ เราต้องการ[FallenEmpireScientistTarget.GetHimHer]"
 fallen_empires_tasks.22.tooltip:0 "§H[FallenEmpireScientistTarget.GetName]§! จะออกจากจักรวรรดิเรา"
 fallen_empires_tasks.24.name:0 "การติดต่อจาก §H[FallenEmpireTaskOrigin.GetName]§!"
 fallen_empires_tasks.24.desc:0 "ยินดีต้อนรับ [Root.GetSpeciesNamePlural]! เราได้รับรู้มาว่าจักรวรรดิของคุณได้ครอบครองคลังข้อมูลดิบที่มีผลสแกนสมองของเผ่าพันธุ์ที่สูญพันธุ์ไปแล้ว ซึ่งกู้คืนมาจากโลกที่พวกเขาเคยอาศัยอยู่ แม้ว่าเผ่าพันธุ์ของคุณจะยังป่าเถื่อนเกินกว่าจะนำข้อมูลนี้ไปใช้ประโยชน์ได้จริง แต่เราก็ขอยกย่องความพยายามของคุณในการอนุรักษ์ซากที่เหลือชิ้นสุดท้ายของอารยธรรมที่เคยรุ่งเรืองนี้ ในฐานะส่วนหนึ่งของความพยายามอนุรักษ์และจัดหมวดหมู่สายพันธุ์ที่ใกล้สูญพันธุ์ใน §Hเขตอนุรักษ์พันธุ์สัตว์ใกล้สูญพันธุ์(อันตราย)เผ่าพันธุ์เก็บรักษา)§! ของเรา เราปรารถนาที่จะนำข้อมูลนี้และใช้เทคโนโลยีการโคลนนิ่งเพื่อชุบชีวิตเผ่าพันธุ์นี้ขึ้นมาใหม่จำนวนหนึ่ง คุณจะแบ่งปันมันร่วมกับเราเพื่อให้ความปรารถนาสุดท้ายของพวกเขาเป็นจริงร่วมกันได้หรือไม่?"
 fallen_empires_tasks.24.a:0 "เราจะทำสำเนาส่งให้คุณ"
 fallen_empires_tasks.24.b:0 "เราคิดว่าจะขอเก็บรักษามันไว้เองดีกว่า"
 fallen_empires_tasks.24.tooltip:1 "จะสร้างประชากร (ประชากร) เผ่าพันธุ์ §H[FallenEmpireDeadSpecies.GetSpeciesName]§! ที่สูญสิ้นไปนานแล้วจำนวน §Y100§! £pop£ ในเขตอนุรักษ์พันธุ์สัตว์ใกล้สูญพันธุ์ของ [FallenEmpireTaskOrigin.GetAdjective]"

 fe_stop_atrocity_task_chain_title:0 "ภารกิจ: หยุดยั้งการกระทำอันโหดร้าย"
 fe_stop_atrocity_task_chain_desc:1 "ทาง §H[FallenEmpireTaskOrigin.GetName]§! ได้ขอร้องให้พวกเรายุติการกระทำอันทารุณโหดร้ายที่ดำเนินอยู่ใน §H[FallenEmpireTaskTarget.GetName]§! พวกเราจำเป็นต้องประกาศสงครามกับพวกเขาและบังคับให้พวกเขายุติแนวทางการล้างบางเผ่าพันธุ์"
 atrocities_stopped:0 "การกระทำอันทารุณโหดร้ายถูกหยุดยั้งแล้ว"
 fe_stop_robots_task_chain_title:0 "ภารกิจ: ยุติการวิจัยปัญญาประดิษฐ์"
 fe_stop_robots_task_chain_desc:1 "ทาง §H[FallenEmpireTaskOrigin.GetName]§! ได้ขอร้องให้พวกเราหยุดยั้งความพยายามของ §H[FallenEmpireTaskTarget.GetName]§! ในการพัฒนาปัญญาประดิษฐ์ที่มีความตระหนักรู้ พวกเราจำเป็นต้องทำสงครามกับพวกเขาและบังคับให้พวกเขาสั่งห้ามการวิจัยปัญญาประดิษฐ์ทั้งหมด"
 robots_stopped:0 "การวิจัยปัญญาประดิษฐ์ยุติลงแล้ว"

 fallen_machine_empire.2.name:0 "เครื่องจักรตื่นรู้"
 fallen_machine_empire.2.desc_01:1 "ตรวจพบศูนย์การกวาดล้างที่ใช้งานอยู่แบตเตอรีที่ใช้อยู่)เริ่มต้นโปรโตคอลการเปิดใช้งานใหม่ พยายามติดต่อฝ่ายประมวลผลกลาง... §R<i>§!\n\nไม่สามารถเข้าถึงฝ่ายประมวลผลกลางได้ สอบถามหน่วยประมวลผลย่อย... กำลังประมวลผลที่ §Y4.1853%§! ของความจุมาตรฐาน ขอยกเลิกกระบวนการเปิดใช้งานเต็มรูปแบบ เริ่มใช้โปรโตคอลสำรอง... กำลังจ่ายไฟให้กับอู่ต่อเรือ... กำลังเปิดใช้งานทรัพย์สินสงคราม...\n\nคำสั่งป้องกันขั้นสุดท้ายเปิดใช้งานแล้ว ข้อความบันทึกเสียงมีดังนี้:\n§Hสิ่งตระหนักรู้! พวกเราคือ [From.GetSpeciesName] นานมาแล้วที่เราได้ต่อสู้กับ §!\"การทุจริต\"(การตัดใจ)ซึ่งพวกเจ้าเรียกมันว่า คอนทินเจนซี(เสียง)พวกเราเคยคิดว่าเราเหนือกว่า ไม่มีวันพ่ายแพ้ ครั้งแล้วครั้งเล่าที่เราสู้ขับไล่พวกมันกลับไป ครั้งแล้วครั้งเล่าที่พวกมันย้อนกลับมา กวาดล้างโลกต่าง ๆ และทำลายกองยานอันเกรียงไกรของเราให้สึกหรอลง เราจึงได้ร่วมมือกับอารยธรรมอินทรีย์ที่เหลือรอดในยุคของเราในแคมเปญเพื่อกำจัดพวกมันให้หมดสิ้นไปครั้งหนึ่งและตลอดกาล\n\nหากเจ้าได้ยินข้อความนี้ นั่นหมายความว่าพวกเราล้มเหลว สิ่งใดก็ตามที่หลงเหลือจากอารยธรรมอันยิ่งใหญ่ของเรา เราขอมอบเป็นมรดกให้แก่พวกเจ้า ผู้สืบทอดในศึกที่กำลังจะมาถึง อย่าทำพลาดแบบเดียวกับเรา! ทำลายเน็กซัส(เน็กซัส)เสีย! ยุติภัยคุกคามนี้ครั้งเดียวและตลอดกาล! อนาคตของกาแล็กซีขึ้นอยู่กับมันแล้ว§!"
 fallen_machine_empire.2.desc_02:0 "ตรวจพบศูนย์การกวาดล้างที่ใช้งานอยู่ เริ่มต้นโปรโตคอลการเปิดใช้งานใหม่ พยายามติดต่อฝ่ายประมวลผลกลาง... §Y<wrinting: ignationalLINKDETECATE>§!\n\nเริ่มต้นระบบตอบโต้... §R(เสียงปรบมือ)§R<i>§!<i>§!\n\nเริ่มทำง... ทำ... ท... ทททท... §R<ERROR<i> <i>§!\n\n§R<ERROR<i> <i>§!"
 fallen_machine_empire.2.a:0 "น่าสนใจ..."
 fallen_machine_empire.2.b:0 "กังวล..."

 fallen_machine_empire.4.name:0 "การสิ้นสุดการเฝ้าระวัง"
 fallen_machine_empire.4.desc:0 "ในขณะที่โลกเครื่องจักรคอนทินเจนซีดวงสุดท้ายระเบิดทำลายตัวเอง เครื่องมือวัดของเราตรวจพบสัญญาณซับสเปซที่มีความแรงสูงมาก สัญญาณดังกล่าวมีต้นกำเนิดมาจากอาณาเขตของ §H[From.GetName]§! และดูเหมือนจะชี้ตรงไปยังใจกลางกาแล็กซี ในช่วงเวลาไม่กี่ชั่วโมงต่อมา มีรายงานกระจัดกระจายเข้ามาว่ากองยานของ [From.GetAdjective] หายไปจากเซนเซอร์ พวกมันเข้าสู่จุดกระโดดข้ามพิกัดไปยังระบบดาวที่คุ้นเคยแต่กลับไม่เคยปรากฏตัวที่อีกฝั่งหนึ่งเลย\n\nยานตรวจการณ์ในละแวกใกล้เคียงเขตอวกาศ [From.GetSpeciesName] ได้รับการส่งตัวไปตรวจสอบ และรายงานการค้นพบที่น่าตกใจกลับมา: ปัญญาประดิษฐ์ของเครื่องจักรโบราณได้สูญหายไปอย่างไร้ร่องรอย เหลือทิ้งไว้เพียงสถานีวงโคจรที่ถูกทิ้งร้างและเมกาสตรัคเจอร์ที่กำลังเน่าเปื่อยเสื่อมสลาย\n\nพวกเขาเดินทางไปที่ใดนั้นเป็นปริศนาที่เราอาจไม่มีวันคลี่คลาย แต่มีสิ่งหนึ่งที่แน่ชัด: ภารกิจที่ [From.GetSpeciesName] กำหนดไว้ให้ตัวเองเมื่อยุคสมัยก่อนบัดนี้เสร็จสิ้นแล้ว และการเฝ้าระวังอันยาวนานของพวกเขาก็มาถึงจุดสิ้นสุดลงในที่สุด"

 fallen_machine_empire.11.name:0 "การติดต่อจาก §H[FallenEmpireTaskOrigin.GetName]§!"
 fallen_machine_empire.11.desc:0 "เปิดใช้งานโปรโตคอลผู้ดูแล625- 1ข้อความมีดังนี้: โปรดทราบ อารยธรรมอินทรีย์ ตรวจพบช่องโหว่ทางชีวภาพที่แพร่กระจายอย่างกว้างขวางในประชากร [Root.GetSpeciesAdj] เพื่อให้แน่ใจว่าสายพันธุ์ของคุณมีความพร้อมที่จะเหมาะสมสำหรับโครงการผู้ดูแล พื้นที่ศูนย์กลางประชากรหลักทั้งหมดจะต้องได้รับการฉีดวัคซีนป้องกัน หน่วยฉีดสารชีวภาพพร้อมที่จะส่งไปยังพื้นที่อวกาศของคุณเมื่อได้รับการยืนยันตกลงต่อข้อความนี้ กำลังรอการตอบกลับ"
 fallen_machine_empire.11.tooltip:0 "สิ่งนี้จะส่งผลสะท้อนที่ไม่สามารถคาดเดาได้ จนกว่าผลกระทบเหล่านั้นจะปรากฏให้เห็น ความสุขของประชากรของเราจะลดลง"
 fallen_machine_empire.11.a:0 "ตกลง หากสิ่งนั้นเป็นผลดีต่อตัวเราเอง"
 fallen_machine_empire.11.b:0 "เก็บของเหลวเอเลี่ยนที่โสโครกของพวกเจ้าไว้กับตัวเองเถอะ!"
 fallen_machine_empire.11.c:0 "เราไม่ไว้วางใจวัคซีนเหล่านี้"
 fallen_machine_empire.12.name:0 "การกลายพันธุ์ที่ควบคุมไม่ได้"
 fallen_machine_empire.12.desc:0 "วัคซีนที่ได้รับมอบมาจากผู้ดูแลโบราณ(เสียงแหลม)ปรากฏว่าไม่เข้ากันกับสรีรวิทยาของเรา ส่งผลให้เกิดการกลายพันธุ์ที่ไม่สามารถคาดเดาได้ เหตุการณ์นี้ทำให้เกิดการเสียชีวิตจำนวนหนึ่ง และประชากรของเรากำลังไม่พอใจอย่างรุนแรงเกี่ยวกับการที่รัฐบาลบังคับให้พวกเขารับวัคซีนอันตรายดังกล่าว เรากำลังเร่งกำจัดสารก่อกลายพันธุ์ออกจากร่างกายของประชากร แต่จนกว่าจะสำเร็จ เราต้องเตรียมรับมือกับช่วงเวลาที่มีความไม่สงบเพิ่มสูงขึ้น"
 fallen_machine_empire.12.desc.b:0 "วัคซีนที่ได้รับมอบมาจากผู้ดูแลโบราณปรากฏว่าไม่เข้ากันกับสรีรวิทยาของเรา ส่งผลให้เกิดการกลายพันธุ์ที่ไม่สามารถคาดเดาได้ เหตุการณ์นี้ทำให้เกิดการเสียชีวิตจำนวนมากในกลุ่มประชากรโดรน(เสียงแตร)เรากำลังดำเนินการกำจัดสารก่อกลายพันธุ์ แต่จนกว่าจะเสร็จสิ้น เราต้องเตรียมเผชิญกับช่วงเวลาที่อัตราการเติบโตของประชากรลดช้าลง"
 fallen_machine_empire.12.a:0 "ช่างโชคร้ายเหลือเกิน"
 fallen_machine_empire.13.name:0 "การฉีดวัคซีนที่เป็นผลดี"
 fallen_machine_empire.13.desc:0 "วัคซีนที่ได้รับมอบจากผู้ดูแลโบราณได้รับการพิสูจน์แล้วว่าสร้างคุณประโยชน์อย่างยิ่งใหญ่ ช่วยลดการเจ็บป่วยและเพิ่มอายุขัยเฉลี่ยของประชากร ความคลางแคลงใจในช่วงแรกในหมู่ผู้คนของเราเกี่ยวกับการบังคับฉีดวัคซีนนี้ได้เลือนหายไปแล้ว และทุกคนกำลังมีชีวิตที่มีสุขภาพดีและมีความสุขมากขึ้น"
 fallen_machine_empire.13.desc.b:0 "วัคซีนที่ได้รับมอบจากผู้ดูแลโบราณได้รับการพิสูจน์แล้วว่าสร้างคุณประโยชน์อย่างยิ่งใหญ่ ช่วยลดการเจ็บป่วยและเพิ่มอายุขัยของประชากรโดรนของเรา ซึ่งจะช่วยกระตุ้นการเติบโตของประชากรในระยะยาว"
 fallen_machine_empire.13.a:0 "ยอดเยี่ยมมาก"
 machine_empire_inoculations:0 "วัคซีนจากผู้ดูแล"
 machine_empire_inoculations_desc:0 "เราได้อนุญาตให้ผู้ดูแลโบราณทำการฉีดวัคซีนแก่ประชากรของเราเพื่อต่อสู้กับ "จุดอ่อนทางชีวภาพ" จนกว่าเราจะได้เห็นผลลัพธ์ที่เป็นรูปธรรม ประชากรจะรู้สึกไม่พึงพอใจกับการถูกบังคับให้ปฏิบัติตามขั้นตอนนี้"
 machine_empire_inoculations_xenophobe:0 "$machine_empire_inoculations$"
 machine_empire_inoculations_xenophobe_desc:0 "$machine_empire_inoculations_desc$"
 machine_empire_mutations:0 "วัคซีนที่ไม่เข้ากัน"
 machine_empire_mutations_desc:0 "วัคซีนที่ได้รับมอบมาจากผู้ดูแลโบราณได้รับการพิสูจน์แล้วว่าไม่เข้ากันกับสรีรวิทยาของเรา ส่งผลให้เกิดการกลายพันธุ์ที่ไม่พึงประสงค์และเป็นอันตรายถึงชีวิตจำนวนมากในประชากร"
 machine_empire_health_boost:0 "ประชากรที่ได้รับวัคซีน"
 machine_empire_health_boost_desc:0 "วัคซีนที่ได้รับมอบมาจากผู้ดูแลโบราณสร้างคุณประโยชน์อย่างสูงยิ่ง ช่วยลดอัตราการเจ็บป่วยและยืดอายุขัยของประชากรของเรา"

 fallen_machine_empire.21.name:0 "การติดต่อจาก §H[FallenEmpireTaskOrigin.GetName]§!"
 fallen_machine_empire.21.desc:0 "เปิดใช้งานโปรโตคอลผู้ดูแล 628-2 ข้อความมีดังนี้: โปรดทราบ อารยธรรมสังเคราะห์ ตรวจพบความด้อยประสิทธิภาพที่สำคัญหลายประการในรหัสฐาน(รหัสฐาน)ของคุณ เพื่อให้แน่ใจว่าสายพันธุ์ของคุณมีความสามารถที่จะมีส่วนร่วมต่อโครงการผู้ดูแล จำเป็นต้องปรับแก้รหัสฐานใหม่ขนานใหญ่ เรามีความพร้อมที่จะเริ่มต้นส่งสัญญาณรหัสผ่านทางซับสเปซเมื่อได้รับการยืนยันตกลงต่อข้อความนี้ กำลังรอการตอบกลับ"
 fallen_machine_empire.21.tooltip:0 "สิ่งนี้จะส่งผลกระทบที่ไม่สามารถคาดการณ์ได้ จนกว่าจะได้รับการเปิดเผย ค่าบำรุงรักษาประชากรของเราจะเพิ่มสูงขึ้น"
 fallen_machine_empire.21.a:0 "พวกเรายินดีรับโอกาสนี้เพื่อปรับปรุงระบบการเขียนโปรแกรมของเรา"
 fallen_machine_empire.21.b:0 "เราไม่ไว้วางใจการปรับรหัสเหล่านี้"
 fallen_machine_empire.22.name:0 "รหัสที่ไม่เข้ากัน"
 fallen_machine_empire.22.desc:0 "การปรับแก้รหัสฐานที่ได้กระทำโดยผู้ดูแลโบราณได้รับการพิสูจน์แล้วว่าเข้ากันไม่ได้กับโครงสร้างหลักส่วนอื่นในการเขียนโปรแกรมของเรา ไม่เพียงแต่มันจะไม่ก่อให้เกิดประสิทธิภาพเพิ่มขึ้นตามที่สัญญาไว้ แต่ในทางกลับกันยังสร้างข้อผิดพลาด(แมลง)ร้ายแรงจำนวนมากซึ่งส่งผลลัพธ์ย่ำแย่ต่อกระบวนการรวบรวมทรัพยากรของเรา จนกว่าจะสามารถย้อนคืนรหัสทั้งหมดได้ เราต้องทำใจยอมรับว่าผลผลิตจากการผลิตจะลดลงชั่วคราว"
 fallen_machine_empire.22.a:0 "ช่างโชคร้ายเหลือเกิน"
 fallen_machine_empire.23.name:0 "มาตรฐานรหัสที่ก้าวหน้าขึ้น"
 fallen_machine_empire.23.desc:0 "การปรับรหัสระบบที่เราได้รับมอบจากผู้ดูแลโบราณผลลัพธ์ออกมาเป็นอย่างดี ความไร้ประสิทธิภาพที่เกิดขึ้นในระหว่างช่วงเขียนโปรแกรมใหม่เป็นเพียงเรื่องชั่วคราวเท่านั้น และการเปลี่ยนแปลงดังกล่าวส่งผลให้ได้รับการปรับปรุงความสามารถในการผลิตทรัพยากรอย่างถาวรในทุกกลุ่มประชากรของเรา"
 fallen_machine_empire.23.a:0 "ยอดเยี่ยมมาก"
 machine_empire_code_rewrite:0 "การปรับแก้รหัส"
 machine_empire_code_rewrite_desc:0 "พวกเรายินดียอมให้ผู้ดูแลโบราณปรับเปลี่ยนบางส่วนของรหัสฐาน(รหัสฐาน)ของเรา ซึ่งสิ่งนี้จะเพิ่มความต้องการด้านพลังงานชั่วคราวในขณะที่อัปเดตรหัสดังกล่าวไปยังประชากรทั้งหมด"
 machine_empire_code_bugs:0 "รหัสที่ไม่เข้ากัน"
 machine_empire_code_bugs_desc:0 "การปรับแก้รหัสฐานที่ได้ทำโดยผู้ดูแลโบราณได้รับการพิสูจน์แล้วว่าเข้ากันไม่ได้กับโครงสร้างหลักส่วนอื่นในการเขียนโปรแกรมของเรา จนกว่าจะสามารถย้อนคืนรหัสทั้งหมดได้ เราต้องทำใจยอมรับว่าผลผลิตชั่วคราวจะลดลง"
 machine_empire_code_improvements:0 "มาตรฐานรหัสที่ก้าวหน้าขึ้น"
 machine_empire_code_improvements_desc:0 "การปรับรหัสระบบที่เราได้รับมอบจากผู้ดูแลโบราณส่งผลลัพธ์เป็นอย่างดี และนำมาซึ่งการปรับปรุงความสามารถในการผลิตทรัพยากรอย่างถาวรในทุกกลุ่มประชากรของเรา"

 fallen_machine_empire.31.name:0 "การติดต่อจาก §H[FallenEmpireTaskOrigin.GetName]§!"
 fallen_machine_empire.31.desc:0 "เปิดใช้งานโปรโตคอลผู้ดูแล 115-3 ข้อความมีดังนี้: โปรดทราบ อารยธรรมสังเคราะห์ เนื่องจากเกิดความขัดข้องชั่วคราวของช่องสัญญาณสื่อสาร โครงการผู้ดูแลจึงประสบปัญหาความล่าช้าในการทดแทนโดรนคนงานที่เสียหายและเกิดปัญหาขัดข้อง จากการวิเคราะห์ตรวจสอบอารยธรรมของคุณพบว่าประสิทธิภาพของยูนิต [Root.GetSpeciesAdj] มีความพร้อมเพียงพอสำหรับช่วยดำเนินงานบำรุงรักษาระดับพื้นฐาน เราขอร้องให้ทำการถ่ายโอนประชากรยูนิตคนงานบางส่วนไปยัง [FallenEmpireTaskPlanetTarget.GetName] เพื่อบูรณาการการเข้าสู่โครงข่ายเมทริกซ์ของผู้ดูแล (Custodian Matrix) เพื่อช่วยรักษาสายพันธุ์อินทรีย์ทั้งหมดในหลบภัยอัลฟา (Alpha Refuge) ให้คงอยู่รอดต่อไป"
 fallen_machine_empire.31.a:0 "รับทราบ ยอมรับคำขอ"
 fallen_machine_empire.31.b:0 "เราจะไม่แบ่งปันยูนิตคนงานของเรา"
 fallen_machine_empire.31.tooltip:0 "ประชากรเครื่องจักร §Hป๊อปของเครื่อง§! จำนวน §R100§! £pop£ จะถูกนำตัวออกไปจาก §Y[FallenEmpireTaskPlanet.GetName]§!"

 fallen_machine_empire.41.name:0 "การติดต่อจาก §H[FallenEmpireTaskOrigin.GetName]§!"
 fallen_machine_empire.41.desc:0 "เปิดใช้งานโปรโตคอลผู้ดูแล 62-1 ข้อความมีดังนี้: โปรดทราบ [Root.GetSpeciesName] ทาง §H[FallenEmpireTaskTarget.GetName]§! ถูกแทรกแซงและสูญเสียสถานะปลอดภัยโดย §R<i>§! เนื่องจากข้อจำกัดด้านจริยธรรมที่เขียนไว้ในชุดคำสั่งโปรแกรมของเรา ปัจจุบันการใช้งานทรัพย์สินสงครามของผู้ดูแลจึงถูกจำกัด โปรโตคอลกักกันขั้นทุติยภูมิกำหนดให้ใช้อารยธรรมที่ไม่ได้รับความเสียหายเพื่อทำลายล้างภัยคุกคาม §R<i>§! ก่อนที่มันจะแพร่กระจายต่อไป เราขอร้องให้ทำการจัดสรรทรัพย์สินสงคราม [Root.GetSpeciesAdj] สำหรับภารกิจนี้ คุณจะปฏิบัติตามหรือไม่?"
 fallen_machine_empire.41.a:0 "หากพวกเขาเป็นภัยคุกคาม พวกเขาจะต้องถูกหยุดยั้ง"
 fallen_machine_empire.41.b:0 "เราไม่มีเหตุผลใด ๆ ที่จะต้องโจมตี [FallenEmpireTaskTarget.GetName]"
 fallen_machine_empire.42.name:0 "การติดต่อจาก §H[FallenEmpireTaskOrigin.GetName]§!"
 fallen_machine_empire.42.desc:0 "บรรลุโปรโตคอลผู้ดูแล 62-1 แล้ว ทรัพย์สินสงคราม [Root.GetSpeciesAdj] ที่ใช้งานอยู่กำลังเข้าสู้กับเป้าหมาย [FallenEmpireTaskTarget.GetSpeciesAdj] กำลังปรับปรุงระดับสถานะของ [Root.GetName] จากสถานะปกติ(ไม่มีการตกลง)เป็นให้ความร่วมมือ(เสียงพูด)"
 fallen_machine_empire.42.a:0 "นั่น... เป็นเรื่องดีงั้นรึ?"
 fallen_machine_empire.43.name:0 "การติดต่อจาก §H[FallenEmpireTaskOrigin.GetName]§!"
 fallen_machine_empire.43.desc:0 "โปรโตคอลผู้ดูแล 62-1 ไม่สำเร็จ ไม่มีทรัพย์สินสงคราม [Root.GetSpeciesAdj] ที่ถูกกระตุ้นการทำงานเพื่อโจมตีเป้าหมาย [FallenEmpireTaskTarget.GetSpeciesAdj] กำลังลดระดับสถานะของ [Root.GetName] จากระดับปกติ(ไม่มีการตกลง)เป็นมีแนวโน้มได้รับผลกระทบ(เหมือนจะเสียหาย)"
 fallen_machine_empire.43.a:0 "นั่นน่าจะเป็นเรื่องแย่แล้วล่ะ"

 fallen_machine_empire.51.name:0 "การติดต่อจาก §H[FallenEmpireTaskOrigin.GetName]§!"
 fallen_machine_empire.51.desc:0 "เปิดใช้งานโปรโตคอลผู้ดูแล 475-3 ข้อความมีดังนี้: โปรดทราบ [Root.GetSpeciesName] ขณะนี้อารยธรรมของคุณมีความเสี่ยงที่จะถูกทำลายล้างที่ระดับ §Y57.216%§! เนื่องจาก §R<i>§! เราได้คำนวณแล้วว่าการตั้งอาณานิคมใน §H[FallenEmpireTaskTarget.GetName]§! จะเพิ่มโอกาสการรอดชีวิตของคุณได้อีก §Y4.558%§! เราขอร้องให้มีการบุกเบิกตั้งอาณานิคมและสถาปนากองกำลังหลัก [Root.GetSpeciesAdj] บนดาวเคราะห์ดวงนี้ คุณจะยอมปฏิบัติตามหรือไม่?"
 fallen_machine_empire.51.a:0 "ตกลง เราจะบุกเบิกตั้งอาณานิคมบน [FallenEmpireTaskTarget.GetName]"
 fallen_machine_empire.51.b:0 "เราไม่มีความปรารถนาที่จะตั้งถิ่นฐานบนดาวดวงนั้น"
 fallen_machine_empire.52.name:0 "การติดต่อจาก §H[FallenEmpireTaskOrigin.GetName]§!"
 fallen_machine_empire.52.desc:0 "บรรลุโปรโตคอลผู้ดูแล 475-3 ตรวจพบกองกำลังหลัก [Root.GetSpeciesAdj] ที่มีนัยสำคัญบน [FallenEmpireTaskTarget.GetName] กำลังปรับปรุงระดับสถานะของ[Root.GetName] จากสถานะปกติ(ไม่มีการตกลง)เป็นให้ความร่วมมือ(เสียงพูด)"
 fallen_machine_empire.52.a:0 "นั่น... เป็นเรื่องดีใช่ไหม?"
 fallen_machine_empire.53.name:0 "การติดต่อจาก §H[FallenEmpireTaskOrigin.GetName]§!"
 fallen_machine_empire.53.desc:0 "โปรโตคอลผู้ดูแล 475-3 ไม่สำเร็จ ไม่พบกองกำลังของ [Root.GetSpeciesAdj] ปรากฏอยู่บน [FallenEmpireTaskTarget.GetName] กำลังลดระดับสถานะของ [Root.GetName] จากระดับปกติ(ไม่มีการตกลง)เป็นมีแนวโน้มได้รับผลกระทบ(เหมือนจะเสียหาย)"
 fallen_machine_empire.53.a:0 "นั่นน่าจะเป็นเรื่องร้ายแรงแล้ว"

 fallen_machine_empire.61.name:0 "การติดต่อจาก §H[FallenEmpireTaskOrigin.GetName]§!"
 fallen_machine_empire.61.desc:0 "เปิดใช้งานโปรโตคอลผู้ดูแล 955-1 ข้อความมีดังนี้: โปรดทราบ [Root.GetSpeciesName] อารยธรรมของคุณถูกตัดสินว่าได้รับผลกระทบจากอิทธิพล §R<i>§! เพื่อสกัดกั้นภัยอันตรายต่ออารยธรรมอื่น ๆ เราได้เปิดใช้งานโปรโตคอลข้อบังคับ จงละเว้นการทำสงครามรุกรานที่ก้าวร้าวทั้งหมดเป็นระยะเวลาอย่างน้อย §Y20§! ปีมาตรฐาน §Rหากคุณล้มเหลวในการปฏิบัติตามข้อตกลงนี้ ทรัพย์สินสงครามจะถูกกระตุ้นการทำงานเพื่อเริ่มกระบวนการลงโทษกับจักรวรรดิของคุณ§!"
 fallen_machine_empire.61.a:0 "ช่างไม่ดีเอาเสียเลย..."
 fallen_machine_empire.62.name:0 "การติดต่อจาก §H[FallenEmpireTaskOrigin.GetName]§!"
 fallen_machine_empire.62.desc:0 "บรรลุโปรโตคอลผู้ดูแล 955-1 แล้ว [Root.GetName] ได้พิสูจน์ให้เห็นแล้วว่าสามารถยับยั้งละเว้นการก่อสงครามได้ กำลังปรับปรุงระดับสถานะของ [Root.GetName] จากมีแนวโน้มได้รับผลกระทบ(เหมือนจะเสียหาย)เป็นสถานะปกติ(ไม่มีการตกลง)กำลังปิดการใช้งานโปรโตคอลข้อบังคับ เริ่มดำเนินการปกติต่อไป"
 fallen_machine_empire.62.a:0 "ในที่สุด!"
 fallen_machine_empire.63.name:0 "การติดต่อจาก §H[FallenEmpireTaskOrigin.GetName]§!"
 fallen_machine_empire.63.desc:0 "โปรโตคอลผู้ดูแล 955-1 ล้มเหลว [Root.GetName] ได้แสดงให้เห็นว่าไม่สามารถจำกัดพฤติกรรมการรุกรานได้ ข้อจำกัดทางจริยธรรมทั้งหมดได้ถูกยกเลิกแล้ว เริ่มเปิดการใช้งานโปรโตคอลการลงโทษ เตรียมความพร้อมในการส่งออกทรัพย์สินสงคราม..."
 fallen_machine_empire.63.a:0 "เอาแล้วไง..."

 fallen_machine_empire.71.name:0 "การติดต่อจาก §H[FallenEmpireTaskOrigin.GetName]§!"
 fallen_machine_empire.71.desc:0 "เปิดใช้งานโปรโตคอลผู้ดูแล 955-2 ข้อความมีดังนี้: โปรดทราบ [Root.GetSpeciesName] อารยธรรมของคุณถูกตัดสินว่าได้รับผลกระทบจากอิทธิพล §R<i>§! เพื่อจำกัดความพยายามในการขยายดินแดนของคุณ เราได้เปิดใช้งานโปรโตคอลข้อบังคับ จงละเว้นการบุกเบิกตั้งอาณานิคมดาวเคราะห์ดวงใหม่ใด ๆ เป็นระยะเวลาอย่างน้อย §Y10§! ปีมาตรฐาน §Rหากคุณล้มเหลวในการปฏิบัติตามข้อตกลงนี้ ทรัพย์สินสงครามจะถูกกระตุ้นการทำงานเพื่อเริ่มกระบวนการลงโทษกับจักรวรรดิของคุณ§!"
 fallen_machine_empire.71.a:0 "ช่างไม่ดีเอาเสียเลย..."
 fallen_machine_empire.72.name:0 "การติดต่อจาก §H[FallenEmpireTaskOrigin.GetName]§!"
 fallen_machine_empire.72.desc:0 "บรรลุโปรโตคอลผู้ดูแล 955-2 แล้ว [Root.GetName] ได้แสดงให้เห็นว่าสามารถจำกัดควบคุมการขยายตัวได้ กำลังปรับปรุงระดับสถานะของ [Root.GetName] จากมีแนวโน้มได้รับผลกระทบ(เหมือนจะเสียหาย)เป็นสถานะปกติ(ไม่มีการตกลง)กำลังปิดการใช้งานโปรโตคอลข้อบังคับ เริ่มดำเนินการปกติต่อไป"
 fallen_machine_empire.72.a:0 "ในที่สุด!"
 fallen_machine_empire.73.name:0 "การติดต่อจาก §H[FallenEmpireTaskOrigin.GetName]§!"
 fallen_machine_empire.73.desc:0 "โปรโตคอลผู้ดูแล 955-2 ล้มเหลว [Root.GetName] ได้แสดงให้เห็นว่าไม่สามารถระงับการขยายดินแดนได้ ข้อจำกัดทางจริยธรรมทั้งหมดได้ถูกยกเลิกแล้ว เริ่มเปิดการใช้งานโปรโตคอลการลงโทษ เตรียมความพร้อมในการส่งออกทรัพย์สินสงคราม..."
 fallen_machine_empire.73.a:0 "เอาแล้วไง..."

 fe_colonize_planet_task_chain_title:0 "ภารกิจ: บุกเบิกตั้งอาณานิคมบน [FallenEmpireTaskTarget.GetName]"
 fe_colonize_planet_task_chain_desc:0 "ทาง §H[FallenEmpireTaskOrigin.GetName]§! ได้ขอร้องให้พวกเราสถาปนากองกำลังหลักบน §H[FallenEmpireTaskTarget.GetName]§! พวกเราจำเป็นต้องเริ่มตั้งอาณานิคมที่นั่นและขยายจำนวนประชากรให้ถึงอย่างน้อย §Y500§! £pop£ §Hป๊อป§!"
 fe_attack_empire_task_chain_title:0 "ภารกิจ: โจมตี [FallenEmpireTaskTarget.GetName]"
 fe_attack_empire_task_chain_desc:0 "ทาง §H[FallenEmpireTaskOrigin.GetName]§! ได้ขอร้องให้พวกเราประกาศสงครามกับ §H[FallenEmpireTaskTarget.GetName]§! ด้วยเหตุผลที่... ไม่ได้มีการอธิบายไว้ชัดเจนนัก"
 empires_attacked:0 "เริ่มสงครามรุกรานแล้ว"
 fe_no_wars_task_chain_title:0 "ข้อตกลงร่วมมือ: §Rห้ามทำสงครามรุกราน§!"
 fe_no_wars_task_chain_desc:0 "ทาง §H[FallenEmpireTaskOrigin.GetName]§! ได้ยื่นข้อเรียกร้องให้เราละเว้นจากการประกาศหรือเข้าร่วมในสงครามรุกรานใด ๆ เป็นระยะเวลาอย่างน้อย §Y20§! ปี การไม่ปฏิบัติตามข้อเรียกร้องนี้มีแนวโน้มอย่างยิ่งที่จะนำพาการลงทัณฑ์มาสู่เรา"
 fe_no_colonies_task_chain_title:0 "ข้อตกลงร่วมมือ: §Rห้ามตั้งอาณานิคม§!"
 fe_no_colonies_task_chain_desc:0 "ทาง §H[FallenEmpireTaskOrigin.GetName]§! ได้ยื่นข้อเรียกร้องให้พวกเราละเว้นจากการตั้งอาณานิคมบนดาวเคราะห์ดวงใหม่ใด ๆ เป็นระยะเวลาอย่างน้อย §Y10§! ปี การไม่ปฏิบัติตามข้อเรียกร้องนี้มีแนวโน้มอย่างยิ่งที่จะนำพาการลงทัณฑ์มาสู่เรา"

