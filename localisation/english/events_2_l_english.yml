 anomaly.170.name:0 "ผู้ถูกเนรเทศ"
 anomaly.170.desc:0 "สัญญาณต่างๆ มีต้นกำเนิดมาจากสถานีวิจัยขนาดเล็ก — ซึ่ง [Root.Owner.GetName] ไม่มีบันทึกการก่อตั้งหรือการอนุญาตจัดตั้งแต่อย่างใด — บนพื้นผิวของ [FromFrom.GetName] มีการดูแลโดยนักวิทยาศาสตร์ [Root.Owner.GetSpeciesAdj] หนึ่งคน ซึ่งเป็นผู้มีความสามารถและขยันขันแข็งพอสมควรหากพิจารณาจากงานวิจัยของพวกเขาบน [FromFrom.GetName] อย่างไรก็ตาม มีปัญหาเกี่ยวกับตัวตนของพวกเขา เราไม่พบประวัติของพวกเขากับบันทึกราชการอย่างเป็นทางการ และพวกเขาปฏิเสธที่จะระบุตัวตนเว้นแต่ระบุเพียงว่าตนคือ "ผู้ถูกเนรเทศ"\n\nพวกเขาแสดงความสนใจที่จะกลับไปที่ [Root.Owner.Capital.GetName] และรับใช้ [Root.Owner.GetName] โดยตรง ภายใต้เงื่อนไขที่ว่ายาน [Root.GetName] จะต้องเดินทางออกจาก [FromFrom.GetName] ทันที และห้ามไม่ให้ยานใดๆ ของ [Root.Owner.GetSpeciesAdj] กลับมาที่นี่อีก"
 anomaly.170.a:0 "ไม่มีทาง ค้นทุกซอกทุกมุมของสถานีวิจัยนั้นซะ"
 anomaly.170.a.tooltip:0 "กักตัว §Yผู้ถูกเนรเทศ§! และค้นสถานีวิจัยที่ไม่ได้รับอนุญาต"
 anomaly.170.b:0 "[Root.Owner.GetRulerTitle] ยินดีต้อนรับผู้ถูกเนรเทศกลับคืนสู่ร่มเงาจักรวรรดิ"
 anomaly.170.b.tooltip:0 "ผู้ถูกเนรเทศ นักวิทยาศาสตร์เลเวล 3 $scientist_with_icon$ เข้าร่วมกับจักรวรรดิของเรา"
 the_exile_background: "พบ §Y[Root.GetName]§! ในสถานีวิจัยบนดาว [Root.GetHomeWorldBiome] §Y[Root.GetBackgroundPlanet]§!"
 anomaly.171.name:0 "เยือกเย็นและว่างเปล่า"
 anomaly.171.desc:0 "ตัวสถานีวิจัยนี้ไม่มีสิ่งใดผิดปกติ มันเป็นเพียงแหล่งหลบภัยชั่วคราวที่สร้างขึ้นเพื่อรับมือกับสภาพอากาศที่รุนแรง ช่วยให้สามารถศึกษาวิจัยพื้นผิวดาวเคราะห์ได้ในช่วงเวลาจำกัดก่อนที่สภาพแวดล้อมจะย่ำแย่และไม่สามารถคงอยู่ได้\n\nสถานีวิจัยบนดาว [From.From.From.GetName] ใกล้หมดอายุการใช้งานแล้ว แต่ความเย็นจัดของดาวเคราะห์ดวงนี้ยังไม่ได้สร้างความเสียหายรุนแรงแก่สิ่งก่อสร้างชั่วคราวนั้น อุปกรณ์ต่างๆ — ซึ่งใช้งานได้จริง ราคาถูก ตั้งใจผลิตมาเพื่อทิ้ง — ถูกใช้งานอย่างหนัก และฐานข้อมูลท้องถิ่นเต็มไปด้วยรายงานรายละเอียดที่ธรรมดาทั่วไปของดาวเคราะห์ ตลอดจนการทดลองง่ายๆ ที่ดำเนินการในสภาวะที่ทารุณ\n\nแต่สิ่งที่แปลกประหลาดคือดูเหมือนจะไม่มีการตรวจสอบโขดหินแร่ซึ่งเป็นฐานรองรับโครงสร้างพื้นฐานของสถานีวิจัยเลย ผลสแกนโดยยาน [Root.GetName] บ่งชี้ว่าโครงสร้างทางธรณีวิทยา ซึ่งเป็นภูเขาที่ถูกฝังอยู่ใต้น้ำแข็งส่วนใหญ่นั้น อาจมีลักษณะเป็นโพรงข้างใน ยิ่งไปกว่านั้น เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] รายงานว่า ผู้อยู่อาศัยเพียงคนเดียวของสถานีวิจัย "ผู้ถูกเนรเทศ" ลึกลับคนนั้น ได้หายตัวไปอย่างไร้ร่องรอยและไม่พบตัวที่ใดเลย"
 anomaly.171.a:0 "น่าพิศวงเหลือเกิน"
 anomaly.172.name:0 "ลึกลงไปเบื้องล่าง"
 anomaly.172.desc:0 "มีบางสิ่งที่ผิดปกติเกี่ยวกับสถานีวิจัยบนดาว [From.From.From.GetName] ตัวโครงสร้างเป็นสิ่งที่พบเห็นได้ทั่วไป — แหล่งหลบภัยชั่วคราวที่สร้างขึ้นเพื่อต้านทานสภาพอากาศรุนแรงเพื่อศึกษาดาวเคราะห์ในช่วงสั้นๆ ก่อนที่สภาพการณ์จะไม่เอื้ออำนวย — แต่งมันตั้งอยู่บนยอดภูเขาหินที่โผล่พ้นทะเลน้ำแข็งที่ปกคลุมทั่วดาวเคราะห์\n\nลูกเรือของยาน [Root.GetName] ค้นพบระบบถ้ำและทางเดินแคบๆ ที่ซับซ้อนซึ่งทอดลึกลงไปในภูเขานี้ โดยสามารถเข้าถึงได้จากภายในสถานีวิจัย\n\nในโถงถ้ำขนาดใหญ่แห่งหนึ่ง พวกเขาได้พบซากแห้งกรังของเจ้าหน้าที่ดั้งเดิมของสถานีวิจัย กลุ่มนักวิจัย [Root.Owner.GetSpeciesAdj] คณะนี้เดิมทีถูกส่งตัวไปยังสถานที่อื่น ทว่ากลับเบี่ยงเส้นทางมายังดาวเคราะห์ที่ปราศจากสิ่งมีชีวิตและเป็นปฏิปักษ์ดวงนี้เพื่อเปิดแล็บดำเนินการเอง\n\nแน่นอนว่า "ผู้ถูกเนรเทศ" ที่กล่าวอ้างถึงในตอนนี้กลับสูญหายอย่างไร้ร่องรอย ยาน [Root.GetName] ได้ยิงแคปซูลหลบหนีตัวหนึ่งเพื่อส่งร่างผู้เสียชีวิตกลับไปยัง [Root.Owner.Capital.GetName]"
 anomaly.175.name:0 "รสเค็ม"
 anomaly.175.desc:1 "ยานวิทยาศาสตร์ [Root.GetName] ไม่พบต้นตอของค่าอ่านเซนเซอร์ที่ผิดปกติบนดาว [From.From.GetName] ซึ่งดูเหมือนจะเป็นเพียงคลื่นสะท้อนหลอกของระบบ อย่างไรก็ตาม เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] — ผู้ประกาศตนว่าเป็นกูร์เมต์เชฟและผู้หลงใหลประวัติศาสตร์ — อ้างว่าได้ค้นพบสิ่งที่ยิ่งใหญ่ที่นั่น\n\nแหล่งแร่ที่พบบนแผ่นน้ำแข็งพื้นผิวขนาดใหญ่ดูเหมือนจะมีความใกล้ชิดกับ เกลือสเตลลาร์(เซลล่า)เกลือ)ของ [Root.Owner.GetSpeciesAdj]: ซึ่งเคยเป็นวัตถุดิบสำคัญในอาหารพื้นเมืองดั้งเดิมหลายจานของ [Root.Owner.GetSpeciesAdj] และเคยเชื่อกันว่าหมดไปจาก [Root.Owner.Capital.GetName] นานแล้ว\n\nเหล่านักประวัติศาสตร์การอาหารคาดการณ์มานานแล้วว่าเครื่องปรุงแร่ธาตุนี้ไม่ได้มีถิ่นกำเนิดดั้งเดิมมาจากโลกเกิดของเรา และการค้นพบของเจ้าหน้าที่วิทยาศาสตร์บน [From.From.GetName] ช่วยเพิ่มน้ำหนักให้ทฤษฎีนี้ ไม่ว่าเกลือนี้จะรสชาติเหมือนเกลือสเตลลาร์ในอดีตหรือไม่ก็ตาม นั่นไม่ใช่สาระสำคัญ: เพียงแค่แนวคิดที่จะฟื้นฟูอาหารดั้งเดิมด้วยวัตถุดิบที่คล้ายคลึงกันขนาดนี้ก็เพียงพอที่จะกระตุ้นเศรษฐกิจและความอยากอาหารของเราแล้ว"
 anomaly.175.a:0 "กลมกล่อม"
 anomaly.180.name:0 "นิมคิป"
 anomaly.180.desc:0 "[From.From.GetName] เป็นแหล่งอาศัยของสิ่งมีชีวิตขนาดเล็กที่มีสีสันสวยงามซึ่งก้ำกึ่งระหว่างพืชและสัตว์ พวกมันขาดศักยภาพทางวิวัฒนาการที่จริงจัง แต่การทำงานร่วมกันเป็นกลุ่มและพละกำลังที่มหาศาลเมื่อเทียบกับขนาดตัวนั้นน่าประทับใจยิ่ง\n\nเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ชื่นชอบพวกมันอย่างมาก โดยยอมรับว่ามีความเอ็นดูเป็นพิเศษกับ "พวกตัวสีแดง""
 anomaly.180.a:0 "น่ารักน่าเอ็นดู"
 anomaly.180.b:0 "[Root.Owner.GetName] จะไม่ยอมปล่อยให้สิ่งมีชีวิตเหล่านี้มีชีวิตอยู่"
 anomaly.180.b.tooltip:0 "การกำจัดอย่างรวดเร็วโดยลูกเรือของ [Root.GetName] จะช่วยรับประกันว่าภัยคุกคามเอเลี่ยนหน้าตาปุกปุยนี้จะไม่สามารถพัฒนาขึ้นมาคุกคาม [Root.Owner.GetName] ได้\n"
 anomaly.180.c:1 "พวกเราจำเป็นต้องเป็นเพียงผู้สังเกตการณ์ที่อยู่นิ่งเฉยต่อไป"
 anomaly.180.d:0 "ปล่อยพวกสิ่งมีชีวิตที่น่าสงสารพวกนั้นไปเถอะ [Root.GetLeaderName]"
 anomaly.180.e:0 "พวกมันจะต้องถูกกลืนกิน"
 anomaly.180.e.tooltip:0 "สารอาหารจากเอเลี่ยนหน้าตาปุกปุยเหล่านี้จะช่วยหล่อเลี้ยง [Root.Owner.GetSpeciesSpawnNamePlural] ของเรา\n"
 anomaly.185.name:0 "สุภาพสุญญากาศ(ลิมโบ้)"
 anomaly.185.desc:0 "สัญญาณมีต้นกำเนิดมาจากซากของโครงสร้างคล้ายเสาอากาศ ยานสำรวจถูกส่งจากยาน [Root.GetName] ลงไปยังพื้นผิวเพื่อสืบสวนประเด็นนี้ให้ละเอียดถี่ถ้วนยิ่งขึ้น\n\nสิ่งที่เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] พบคือห้องนิรภัยขนาดใหญ่ในถ้ำ ซึ่งแม้จะงัดเปิดได้ง่าย แต่ก็เห็นได้ชัดว่ามันเคยเป็นที่หลบภัยแห่งสุดท้ายและแหล่งพักพิงของอารยธรรมเอเลี่ยนที่สูญพันธุ์ไปนานแล้ว แม้ว่าพวกเขาจะมีความก้าวหน้าทางเทคโนโลยีพอสมควร แต่ดูเหมือนว่าพวกเขาไม่เคยออกเดินทางสู่ดวงดาวและต้องจบชีวิตลงด้วยภัยพิบัติธรรมชาติระดับโลก ห้องนิรภัยนี้มีขนาดมโหฬาร เป็นที่เก็บกล่องดำหลายพันกล่องที่ยาน [Root.GetName] ระบุว่าเป็นอุปกรณ์เก็บข้อมูล\n\n§Yโครงการพิเศษ(โครงการพิเศษ)§! ได้รับการจัดเตรียมไว้แล้วเพื่อถอดรหัสเนื้อหาภายในอุปกรณ์เหล่านี้"
 anomaly.190.name:0 "การฉายภาพดวงจันทร์"
 anomaly.190.desc:0 "เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] รายงานว่าพวกเขาไม่เชื่อถือค่าอ่านเซนเซอร์ที่รวบรวมได้จากบนยาน [Root.GetName] แม้แต่น้อย พวกเขาเคลือบแคลงสงสัยเป็นพิเศษเกี่ยวกับดวงจันทร์ของ [From.From.GetName] และได้เสนอ §Yโครงการพิเศษ(โครงการพิเศษ)§! เพื่อตรวจหาคำตอบเพิ่มเติม\n\nตรวจสอบบันทึกสถานการณ์สำหรับรายละเอียดเพิ่มเติม"
 anomaly.191.name:0 "ดวงจันทร์ฉายภาพ"
 anomaly.191.desc:0 "มีอุปกรณ์ชิ้นหนึ่งบนดวงจันทร์ และมันช่างชวนพิศวง ที่แกนกลางของมันคือคอมพิวเตอร์ระดับตริยางค์(คอมพิวเตอร์)ซึ่งดูเหมือนมีหน้าที่คำนวณการเปลี่ยนแปลงใหม่ๆ อย่างไม่มีที่สิ้นสุดตามค่าที่สแกนหลักของดาวเคราะห์ จากนั้นค่าเหล่านี้จะถูกส่งไปยังเสาอากาศส่งสัญญาณพลังงานสูง ซึ่งจะปรับสัญญาณข้อมูลก่อนส่งตรงไปยังพื้นผิวดาวเคราะห์แม่ สัญญาณดิบดูเหมือนไม่มีสาระสำคัญหากมองอย่างเผินๆ ทว่าการปรับสัญญาณอย่างรอบคอบจะทำให้สัญญาณนี้เกือบจะกลมกลืนแยกไม่ออกจากสัญญาณเซนเซอร์ที่ถูกต้องเมื่อสะท้อนกลับจากพื้นผิวดาวเคราะห์แม่และกรองผ่านชั้นบรรยากาศของมัน\n\nจุดประสงค์ของการตั้งค่านี้ยากที่จะระบุได้แน่ชัด แต่มันมอบโอกาสที่ดีในการศึกษาเทคนิควิศวกรรมของเอเลี่ยนต่างดาว"
 anomaly.191.a.tooltip:1 "เพิ่มตัวปรับแต่ง §Yดวงจันทร์ฉายภาพ§! ให้กับดวงจันทร์:\n£engineering£ §G+6§!\n\n"
 anomaly.195.name:0 "ชายฝั่งหมอกหนา"
 anomaly.195.desc:0 "เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] รายงานว่า มีโครงตาข่ายเรขาคณิตขนาดใหญ่ที่ยืดหยุ่นได้ซึ่งสร้างจากพอลิเมอร์พลาสติกบางประเภท — ซึ่งเห็นได้ชัดว่าเป็นสิ่งที่มนุษย์สร้างขึ้น — ถูกติดตั้งไว้ในทะเลของ [From.From.GetName]\n\nหากมองจากวงโคจร พวกมันดูเหมือนจะไม่มีประโยชน์ใช้สอยอื่นใดนอกเหนือไปจากวัตถุประสงค์ด้านสุนทรียภาพเท่านั้น"
 anomaly.200.name:0 "ความร้อนใต้พิภพ"
 anomaly.200.desc:0 "เสียงกระแทกที่เป็นจังหวะที่สังเกตได้จากวงโคจรคือการเคลื่อนไหวของเครื่องดึงพลังงานความร้อนใต้พิภพขนาดใหญ่ที่เก่าแก่ ซึ่งกำลังทำงานในช่วงสุดท้ายของมัน เครื่องจักรขนาดมหึมาที่กำลังย่อยสลายเหล่านี้ถูกสร้างขึ้นและถูกทิ้งร้างในช่วงอดีตอันไกลโพ้น ทว่ามันยังคงสูบฉีดของเหลวร้อนจัดขึ้นมาจากแกนกลางของดาวเคราะห์มาโดยตลอดตั้งแต่นั้นมา\n\nตัวเก็บประจุเพื่อจัดเก็บข้อมูลทั้งหมดพังเสียหายหรือรั่วไหล ทว่าพลังงานบางส่วนยังคงสามารถสับเปลี่ยนดึงออกมาใช้ประโยชน์ได้"
 anomaly.205.name:0 "ราบเรียบอย่างสมบูรณ์"
 anomaly.205.desc:0 "การสำรวจทางธรณีวิทยาอย่างละเอียดบนดาว [From.From.GetName] โดยยาน [Root.GetName] ไม่พบสิ่งใดที่น่าสนใจ\n\nในความจริงแล้ว มันไม่น่าสนใจอย่างไม่น่าเชื่อ — จุดเด่นเพียงอย่างเดียวของมันคือการไม่มีจุดเด่นใดๆ เลย มีพื้นที่ยุบตัวและพื้นที่ยกตัวอยู่บ้าง ทว่าโดยภาพรวมแล้วพื้นผิวของ [From.From.GetName] ถือว่าราบเรียบอย่างผิดปกติ เช่นเดียวกัน พืชพรรณและสัตว์ประจำถิ่นมีความเชื่องอย่างยิ่งจนไม่คุ้มค่าแก่การสนใจ"
 anomaly.205.a:0 "นั่น... ถือเป็นเรื่องดีใช่ไหม?"
 anomaly.205.a.tooltip:0 "อุปสรรคการพัฒนาพื้นที่(เสียงอุดตัน)ทั้งหมด £blocker£ §Y§! ได้รับการเคลียร์ออกจาก [From.From.GetName] แล้ว"
 anomaly.210.name:0 "มิติลับใต้เงา"
 anomaly.210.desc:0 "ยาน [Root.GetName] ไม่เคยไปถึง [From.From.From.GetName] เพื่อศึกษาความผิดปกติรอบตัวมัน ตัวยานพร้อมด้วยเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] และลูกเรือ ได้กะพริบหายไปจากมิติขณะที่กำลังเดินทางผ่านสนามเศษซาก\n\nก่อนที่จะปรากฏตัวกลับมาในอีกไม่กี่นาทีต่อมา\n\n[Root.GetLeaderName] รายงานว่าพวกเขาไปอยู่ในพื้นที่มิติพิเศษชั่วคราว ช่องมองภายนอกเผยให้เห็นว่าพวกเขาถูกห้อมล้อมด้วยยานอวกาศต่างดาวจำนวนนับไม่ถ้วนที่ถูกตรึงไว้ในความว่างเปล่าที่ไม่มีวันสิ้นสุด ก่อนที่ลูกเรือจะตั้งตัวได้ นิมิตดังกล่าวก็จางหายไปในทันทีและพวกเขาก็กลับมาสู่อวกาศปกติ\n\nอย่างไรก็ตาม ลูกเรือประมาณครึ่งหนึ่งได้สูญหายไป — [Root.GetLeaderName] คาดเดาว่าพวกเขาอาจถูกคัดแยกให้ติดค้างอยู่ด้วยกลไกบางอย่างที่ไม่สามารถหยั่งรู้ได้ในพื้นที่แปลกประหลาดนั้น"
 anomaly.211.name:0 "การเบี่ยงมิติ"
 anomaly.211.desc:0 "สมาชิกลูกเรือของยาน [Root.GetName] ที่สูญหายไป ซึ่งเคยคิดว่าจมหายไปในรอยแยกมิติ ได้ปรากฏตัวขึ้นมาใหม่แล้ว\n\nพวกเขาติดต่อมาหาเราจากบนยานอวกาศที่ไม่รู้จัก ซึ่งไม่ได้แตกต่างจากยานวิทยาศาสตร์ของเราโดยสิ้นเชิง ลอยอยู่อย่างเงียบสงบใกล้กับพิกัดที่ยาน [Root.GetName] ประสบกับความแปรปรวนทางมิติในตอนแรก พวกเขาอ้างว่าจำเรื่องราวอะไรไม่ได้เลยในช่วงเวลาที่อยู่นอกมิติของเรา นอกเหนือจากความรับรู้ที่เลือนรางว่าได้จากไปเป็นเวลานาน\n\nพวกเขาไม่มีความปรารถนาอื่นใดนอกจากการกลับไปรับหน้าที่ภายใต้การนำของเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] และพวกเขาตั้งใจที่จะมอบยานของตนให้แก่ทางการ [Root.Owner.GetSpeciesAdj]"
 anomaly.211.desc.bio: "ลูกเรือที่สูญหายของยาน [Root.GetName] ซึ่งสันนิษฐานกันมานานว่าจมหายไปในรอยแยกมิติ ได้กลับมาปรากฏตัวขึ้นใหมอย่างน่าประหลาดใจ\n\nพวกเขาติดต่อหาเราจากสิ่งก่อสร้างอินทรีย์ที่ไม่คุ้นเคย รูปแบบของมันคล้ายคลึงกับยานวิทยาศาสตร์ของเราอย่างประหลาด ทว่ามันกลับมีความต่างบางอย่างที่เลือนราง... วิธีที่มันขับเคลื่อน วิธีที่มันเต้นเป็นจังหวะ มันไม่สอดคล้องกับพิมเขียวทางพันธุกรรมที่เรารู้จัก ราวกับว่ามันเป็นภาพสะท้อนของยานเราที่มองผ่านจิตใจเอเลี่ยนที่บิดเบี้ยว มันลอยอย่างเงียบสงบใกล้กับพิกัดที่ยาน [Root.GetName] เผชิญกับความแปรปรวนในคราแรกราวกับกำลังรอคอย\n\nลูกเรือจำอะไรไม่ได้เลยเกี่ยวกับเวลาที่อยู่ภายนอกมิตินั้น มีเพียงความรู้สึกรางๆ ถึงการสูญสลายหายไป การได้ไปอยู่ที่อื่นเป็นเวลายาวนานเกินกว่าที่เวลาควรจะอนุญาต ทว่าพวกเขายังคงไม่มีการเปลี่ยนแปลงใดๆ หรืออย่างน้อยพวกเขาก็อ้างเช่นนั้น\n\nพวกเขาต้องการกลับมารับหน้าที่ภายใต้เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] และยินดีที่จะมอบยานอินทรีย์ที่แปลกประหลาดนี้แก่ทางการ [Root.Owner.GetSpeciesAdj] โดยไม่มีเงื่อนไขใดๆ ทว่าเมื่อเราได้รับสัญญาณสัญญาณ วิทยุมีเสียงฮัมสะท้อนที่แปลกประหลาดดังแว่วเข้ามา ยานลำนั้นถึงแม้จะอยู่นิ่ง แต่สัมผัสได้ราวกับว่ามันกำลังรับฟังอยู่"
 anomaly.211.a:0 "ดีมาก"
 anomaly.211.a.tooltip:0 "ได้รับยานวิทยาศาสตร์ 1 ลำ"
 anomaly.211.b:0 "ความปลอดภัยของประชากร [Root.Owner.GetSpeciesAdj] ขึ้นอยู่กับการทำลายล้างพวกมัน"
 anomaly.211.c:0 "ความปลอดภัยของ [Root.Owner.GetSpeciesNamePlural] ขึ้นอยู่กับการทำลายล้างพวกมัน"
 anomaly.211.b.tooltip:0 "พวกมันกลายเป็นศัตรู!"
 anomaly.215.name:0 "พืชผลอันอุดมสมบูรณ์"
 anomaly.215.desc:0 "พื้นผิวของ [From.From.GetName] เต็มไปด้วยผืนดินสีเขียวขจีเป็นหย่อมๆ\n\nเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ยังไม่พร้อมที่จะอธิบายกลไกเบื้องหลังความอุดมสมบูรณ์ขั้นสูงสุดในท้องถิ่นของดินนี้ ทว่ายืนยันว่าพืชพรรณพื้นเมืองส่วนใหญ่นั้นเหมาะสมสำหรับจัดสรรให้ [Root.Owner.GetSpeciesAdj] บริโภคโดยต้องการการแปรรูปเพียงเล็กน้อยเท่านั้น"
 anomaly.215.desc.serv:0 "พื้นผิวของ[From.From.GetName] เต็มไปด้วยผืนดินสีเขียวขจีเป็นหย่อมๆ\n\nเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ยังไม่พร้อมที่จะอธิบายกลไกเบื้องหลังความอุดมสมบูรณ์ขั้นสูงสุดในท้องถิ่นของดินนี้ ทว่ายืนยันว่าพืชพรรณพื้นเมืองส่วนใหญ่นั้นเหมาะสมสำหรับจัดสรรให้สิ่งจัดแสดงทางชีวภาพ(Bio-trophy)[Root.Owner.GetSpeciesAdj] บริโภคโดยต้องการการแปรรูปเพียงเล็กน้อยเท่านั้น"
 anomaly.215.a.tooltip:0 "เพิ่มตัวปรับแต่ง §Yภาษาคอร์นูโคเปีย§! ให้กับ [From.GetName]:\n§Gอาหาร§!เพิ่มเติม"
 anomaly.220.name:0 "แหล่งแร่หนาแน่น"
 anomaly.220.desc:0 "เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ได้ส่งรายงานโดยละเอียดเกี่ยวกับความมั่งคั่งทางธรณีวิทยาของ [From.GetName] ให้แก่เรา ดูเหมือนว่าประวัติศาสตร์การเคลื่อนตัวของแผ่นเปลือกโลกอันเป็นเอกลักษณ์ของดาวดวงนี้ ส่งผลให้มีแร่ธาตุมากมายที่ [Root.GetName] สนใจมารวมตัวกันอยู่ใกล้พื้นผิว"
 anomaly.220.a.tooltip:0 "เพิ่มตัวปรับแต่ง §Yวัสดุดิบ§! ให้กับ [From.GetName]:\n§Gแร่ธาตุ§!เพิ่มเติม"
 anomaly.225.name:0 "เงาหมุนวน"
 anomaly.225.desc:0 "เงาร่างขนาดมหึมาที่แหว่งวิ่นลอยพาดผ่านพื้นผิวของ [From.GetName]\n\nเงาเหล่านี้ไม่ได้ทอดลงมาจากก้อนเมฆ แต่เกิดจากแผ่นสารอินทรีย์ที่ลอยละล่องผ่านชั้นบรรยากาศส่วนบน ซึ่งเชื่อมต่อกัน—หรือพูดให้ถูกคือมีข้อต่อ—ทำให้สามารถขยับเขยื้อนได้เล็กน้อย\n\nเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ยังไม่เต็มใจที่จะระบุว่าสิ่งเหล่านี้เป็นพืชหรือสัตว์ หรือมีจุดประสงค์อะไรในการทอดเงาอันซับ้อนนี้ หากมีอยู่จริง"
 anomaly.225.a.tooltip:2 "เพิ่มตัวปรับแต่ง §Yเล่นแบบเงา§! ให้กับ [From.GetName]:\n£society£ §G+4§!"
 anomaly.230.name:0 "บิดเบี้ยว"
 anomaly.230.desc.v1:0 "โครงสร้างทางธรณีวิทยาของ [From.GetName] กำลังอยู่ในช่วงแปรผันอย่างแท้จริง ซึ่งขับเคลื่อนโดยกระบวนการเคลื่อนตัวของแผ่นเปลือกโลกที่เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ยืนยันว่าน่าทึ่งและเข้าใจยาก แต่สิ่งที่ [Root.Owner.GetName] สนใจมากกว่าก็คือ เราอาจจะสามารถหยุดยั้งการเปลี่ยนรูปตัวเองอย่างโกลาหลและไม่สิ้นสุดของดาวดวงนี้ได้อย่างมีกลยุทธ์ กล่าวโดยย่อคือ การปรับสภาพดาวดวงนี้ในพริบตาให้เอื้อต่อการอยู่อาศัยมากขึ้นเล็กน้อย—หรือทั้งหมด—นั้นมีความเป็นไปได้ในทางทฤษฎี\n\n[Root.GetLeaderName] ประเมินว่าจะต้องใช้พลังงานเพิ่มอีก 200 เครดิตพลังงาน เพื่อสนับสนุนการทำแผนที่กิจกรรมของดาวอย่างละเอียด และตัดสินว่าสิ่งที่เจ้าหน้าที่วิทยาศาสตร์เรียกว่า \"การโจมตีเพื่อปรับสภาพดาวอย่างแม่นยำ\" นั้นมีความเป็นไปได้จริงหรือไม่ แน่นอนว่าเราสามารถเลือกที่จะปรับสภาพมันด้วยเทคโนโลยีที่มีอยู่เดิมในภายหลังได้ตลอดเวลา"
 anomaly.230.desc.v2:0 "โครงสร้างทางธรณีวิทยาของ [From.GetName] กำลังอยู่ในช่วงแปรผันอย่างแท้จริง ซึ่งขับเคลื่อนโดยกระบวนการเคลื่อนตัวของแผ่นเปลือกโลกที่เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ยืนยันว่าน่าทึ่งและเข้าใจยาก แต่สิ่งที่ [Root.Owner.GetName] สนใจมากกว่าก็คือ เราอาจจะสามารถหยุดยั้งการเปลี่ยนรูปตัวเองอย่างโกลาหลและไม่สิ้นสุดของดาวดวงนี้ได้อย่างมีกลยุทธ์ กล่าวโดยย่อคือ การทำให้ดาวดวงนี้เสถียรขึ้นในพริบตาเพื่อให้เอื้อต่อการอยู่อาศัยมากขึ้นเล็กน้อย—หรือทั้งหมด—นั้นมีความเป็นไปได้ในทางทฤษฎี\n\n[Root.GetLeaderName] ประเมินว่าจะต้องใช้พลังงานเพิ่มอีก 200 เครดิตพลังงาน เพื่อสนับสนุนการทำแผนที่กิจกรรมของดาวอย่างละเอียด และตัดสินว่าสิ่งที่เจ้าหน้าที่วิทยาศาสตร์เรียกว่า \"การโจมตีเพื่อปรับสภาพดาวอย่างแม่นยำ\" นั้นมีความเป็นไปได้จริงหรือไม่ ในปัจจุบันการปรับสภาพดาวจริงยังเกินความสามารถของเรา ดังนั้นนี่จึงเป็นโอกาสที่น่าตื่นเต้น"
 anomaly.230.a:0 "เพียงแค่ศึกษากระบวนการทางธรรมชาติของมัน"
 anomaly.230.a.tooltip:1 "เพิ่มตัวปรับแต่ง §YGrimacing§! ให้กับ [From.GetName]:\n£physics£ §G+4§!"
 anomaly.230.b:0 "[Root.GetName] จะจ่ายเงิน 200 เครดิตนั้น"
 anomaly.230.b.tooltip:0 "ใช้ เครดิตพลังงาน เพื่อพยายามทำให้ดาวเคราะห์เสถียรในสภาพที่เอื้ออำนวยมากขึ้น โดยมี§Yโอกาสสำเร็จประมาณ 50%§!\n"
 anomaly.230.c:0 "เราไม่มีเครดิตที่จะจ่ายไปกับสมมติฐานที่เลื่อนลอย"
 anomaly.231.name:0 "การปรับสภาพดาวเชิงกลยุทธ์"
 anomaly.231.desc:0 "เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] รายงานว่า [From.From.GetName] สามารถปรับสภาพดาวได้จริง! คาดว่าโอกาสสั้นๆ จะเปิดขึ้นในไม่ช้า เมื่อดาวดวงนี้เข้าสู่ช่วงวัฏจักรที่ไม่เสถียรเป็นพิเศษซึ่งกินเวลาประมาณสองสามเดือน [Root.GetLeaderName] เชื่อว่าการส่งระเบิดขนาดเล็กไปยังเปลือกโลกของดาวและการฉายรังสีในชั้นบรรยากาศอย่างมีกลยุทธ์ในช่วงเวลานี้จะหยุดยั้งความปั่นป่วนของ [From.From.GetName] และทำให้มันเสถียรในรูปแบบที่เหมาะสมกับการดำรงชีวิตมากขึ้น\n\n§Yโครงการพิเศษ§! ได้รับการจัดตั้งขึ้นแล้ว แต่เรามีเวลาไม่มากนัก"
 anomaly.232.name:0 "การปรับสภาพดาวเชิงกลยุทธ์ล้มเหลว"
 anomaly.232.desc:0 "ลูกเรือของ [Root.GetName] รายงานด้วยความผิดหวังว่าโอกาสในการปรับสภาพดาว [From.From.GetName] ได้ปิดลงแล้ว แม้ว่าจะพยายามอย่างเต็มที่เพื่อตรวจหาให้ทันเวลา โอกาสอีกครั้งไม่น่าจะเกิดขึ้นอีกไปอีกสองสามศตวรรษ"
 anomaly.233.name:0 "การปรับสภาพดาวเชิงกลยุทธ์สำเร็จ"
 anomaly.233.desc:0 "เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ภูมิใจที่จะรายงานว่าตอนนี้ [From.From.GetName] สามารถจัดประเภทใหม่เป็นดาวเคราะห์แห้งแล้ง(เสียงดัง)แทนที่จะเป็นดาวเคราะห์ร้าง(บาร์เร็น)การทดลองครั้งใหญ่นี้ช่วยส่งเสริมวิทยาการของ [Root.Owner.GetSpeciesAdj] เป็นอย่างมาก"
 anomaly.233.desc.mach:0 "เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ภูมิใจที่จะรายงานว่าตอนนี้ [From.From.GetName] สามารถจัดประเภทใหม่เป็นดาวเคราะห์จักรกล(โลหะ)แทนที่จะเป็นดาวเคราะห์ร้าง(บาร์เร็น)การทดลองครั้งใหญ่นี้ช่วยส่งเสริมวิทยาการของ [Root.Owner.GetSpeciesAdj] เป็นอย่างมาก"
 anomaly.235.name:0 "การแสดงแสงสี"
 anomaly.235.desc.v1:0 "เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] รายงานว่าคลื่นแสงที่ส่องสว่างผ่านแผ่นน้ำแข็งที่ปกคลุม [From.GetName] มีต้นกำเนิดมาจากต่างดาว\n\nการสู้รบในอดีตโบราณได้ทิ้งซากปรักหักพังของยานรบต่างดาวกระจัดกระจายอยู่บนดาวเคราะห์น้ำแข็งดวงนี้ และมีเพียงแกนของอาวุธหลักที่เผยออกมาเท่านั้นที่ยังคงสภาพสมบูรณ์ ดูเหมือนว่าเผ่าพันธุ์ต่างดาวนี้จะใช้เลเซอร์ที่คล้ายกับที่กองยานของ [Root.Owner.GetSpeciesAdj] ใช้งานอยู่ในปัจจุบัน และส่วนประกอบภายในที่ชำรุดได้ปล่อยลำแสงพลังงานต่ำลงสู่น้ำแข็งของ [From.GetName] เป็นระยะๆ สภาพอากาศอันโหดร้ายของดาวดวงนี้ช่วยป้องกันไม่ให้เลเซอร์หลอมละลายน้ำแข็ง ทำให้อนุภาคน้ำแข็งทำหน้าที่เป็นปริซึมสะท้อนแสงอันเจิดจ้า"
 anomaly.235.desc.v2:0 "เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] รายงานว่าคลื่นแสงที่ส่องสว่างผ่านแผ่นน้ำแข็งที่ปกคลุม [From.GetName] มีต้นกำเนิดมาจากต่างดาว\n\nการสู้รบในอดีตโบราณได้ทิ้งซากปรักหักพังของยานรบต่างดาวกระจัดกระจายอยู่บนดาวเคราะห์น้ำแข็งดวงนี้ และมีเพียงแกนของอาวุธหลักที่เผยออกมาเท่านั้นที่ยังคงสภาพสมบูรณ์ ดูเหมือนว่าเผ่าพันธุ์ต่างดาวนี้จะใช้เลเซอร์ที่ล้ำสมัยกว่าที่กองยานของ [Root.Owner.GetSpeciesAdj] ใช้งานอยู่ในปัจจุบันเล็กน้อย และส่วนประกอบภายในที่ชำรุดได้ปล่อยลำแสงพลังงานต่ำลงสู่น้ำแข็งของ [From.GetName] เป็นระยะๆ สภาพอากาศอันโหดร้ายของดาวดวงนี้ช่วยป้องกันไม่ให้เลเซอร์หลอมละลายน้ำแข็ง ทำให้อนุภาคน้ำแข็งทำหน้าที่เป็นปริซึมสะท้อนแสงอันเจิดจ้า"
 anomaly.235.b:0 "เราสามารถใช้ประโยชน์จากเทคโนโลยีนั้นได้"
 anomaly.240.name:0 "ยักษ์ลวงตา"
 anomaly.240.desc:0 "สิ่งที่เราคิดว่าเป็นดาวเคราะห์ก๊าซยักษ์ขนาดเล็กผิดปกติ แท้จริงแล้วไม่ใช่เช่นนั้น\n\nภายใต้ชั้นฝุ่นหนาทึบที่หมุนวนในชั้นบรรยากาศส่วนบนซึ่งลวงตาเราไว้ มีดาวเคราะห์ทั่วไปซ่อนอยู่ แม้จะเป็นดาวเคราะห์ร้างที่แห้งแล้ง แต่ก็ยังเป็นดาวเคราะห์ดวงหนึ่ง\n\nเรื่องนี้สร้างความอับอายอย่างมากให้กับวงการดาราศาสตร์บนดาว [Root.Owner.Capital.GetName]"
 anomaly.240.a.tooltip:0 "[From.GetName]: เผยให้เห็นว่าเป็นดาวเคราะห์§Yร้าง(บาร์เร็น)§!\n"
 anomaly.245.name:0 "สวนสวรรค์ที่ถูกคุกคาม"
 anomaly.245.desc:0 "[From.GetName] เต็มไปด้วยสิ่งมีชีวิตอย่างแท้จริง\n\nสิ่งมีชีวิตที่อันตราย\n\nแม้ว่าจะพร้อมสำหรับการตั้งอาณานิคม แต่ลูกเรือของ [Root.GetName] เตือนว่าเรามีแนวโน้มที่จะประสบปัญหากับสัตว์ป่าในท้องถิ่น"
 anomaly.250.name:0 "กลิ่นบางอย่าง"
 anomaly.250.desc:0 "ยาน [Root.GetName] ได้กู้คืนกล่องโลหะทรงยาวจากพื้นผิวของ [From.GetName] รูพรุนขนาดเล็กบนพื้นผิวห้าด้านทำให้เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] เชื่อว่ามันไม่ใช่ตู้คอนเทนเนอร์ แต่เป็นอุปกรณ์พ่นละอองบางชนิด การทดสอบเบื้องต้นยืนยันสมมติฐานนี้เนื่องจากยังมีกลิ่นอายจางๆ แผ่ออกมาจากวัตถุ\n\n§Yโครงการพิเศษ§! ได้รับการจัดตั้งขึ้นเพื่อตรวจสอบว่านี่อาจเป็นอุปกรณ์สื่อสารข้อมูลที่สร้างขึ้นโดยเผ่าพันธุ์ต่างดาวที่สื่อสารผ่านการหลั่งและการรับสารเคมีในชั้นบรรยากาศ หรือก็คือ กลิ่น หรือไม่"
 anomaly.250.a:0 "มีกลิ่นเหม็น"
 anomaly.251.name:0 "กลิ่นอายปริศนา"
 anomaly.251.desc:0 "กล่องใบนี้เป็นเอกสารประเภทหนึ่งจริงๆ เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ยอมรับว่าพวกเขาเคยหวังจะพบบันทึกประวัติศาสตร์หรือคัมภีร์ที่มีความสำคัญต่อวัฒนธรรมที่ทิ้งมันไว้ ทว่าพวกเขาต้องผิดหวัง\n\nธรรมชาติที่แท้จริงของกล่องส่งกลิ่นหอมนี้ดูเหมือนจะเป็นการรวบรวมเรื่องเล่าสั้นๆ ซึ่งเมื่อพิจารณาจากการเปลี่ยนแปลงของกลิ่นอย่างรวดเร็วในช่วงท้ายของแต่ละลำดับเหตุการณ์แล้ว มีจุดประสงค์เพื่อสร้างความประหลาดใจหรือตีความว่าเป็นเรื่องตลก เทคนิคที่ใช้ในการจัดเก็บและจำลองกลิ่นเฉพาะนั้นมีความน่าสนใจอยู่บ้าง แต่เรื่องราวที่มันเล่านั้นไม่น่าสนใจเลย\n\nลูกเรือของยาน [Root.GetName] ต่างมีความรู้สึกกระอักกระอ่วนใจที่พวกเขาต้องมาคุ้นเคยกับกลิ่นผลพลอยได้ที่เป็นแก๊สจากการย่อยอาหารของเอเลี่ยนโดยไม่ตั้งใจ อย่างไรก็ตาม [Root.GetLeaderName] ไม่เต็มใจที่จะคาดเดาว่าทำไมกล่องนี้จึงถูกทิ้งไว้บนดาวเคราะห์นรกน้ำแข็งดวงนี้"
 anomaly.255.name:0 "อวสานวันวาน"
 anomaly.255.desc:0 "[From.GetName] เคยเป็นบ้านของสิ่งมีชีวิตที่มีสติปัญญาพอสมควรซึ่งได้ทำลายล้างตนเองในเวลาที่ดูเหมือนจะห่างไกลจากการบินสู่อวกาศเพียงไม่กี่ทศวรรษ ดาวเคราะห์ดวงนี้ฟื้นตัวจากสิ่งที่เป็นการทำลายล้างอย่างไร้สติครั้งใหญ่ ทว่ามันยังคงมีรอยแผลเป็นที่มองเห็นได้ชัดเจน\n\nหนึ่งในซากปรักหักพังไม่กี่แห่งบนพื้นผิวมีแท่นหินโบราณที่ได้รับการอนุรักษ์ไว้อย่างดีซึ่งจารึกข้อความที่ [Root.GetLeaderName] ถอดรหัสได้อย่างรวดเร็ว มันเป็นคำเตือนจากสิ่งมีชีวิตสายพันธุ์ที่สูญพันธุ์ตนสุดท้ายถึงผู้ใดก็ตามที่พวกเขาเชื่อว่าจะรุ่งเรืองขึ้นมาหลังการจากไปของพวกเขา การพัฒนา "อาวุธขั้นสุดยอด" คือจุดเริ่มต้นของความล่มสลายของพวกเขา ความผิดปกติบางอย่างในจิตวิทยาของสายพันธุ์นี้ทำให้การยับยั้งชั่งใจผ่านความพินาศร่วมกันโดยต่างฝ่ายต่างทำลายล้างกันไม่สามารถเกิดขึ้นได้\n\nผู้รอดชีวิตก่อนที่จะเสียชีวิตจากสาเหตุที่ไม่ทราบในเวลาต่อมา ได้ซ่อนอาวุธนี้ไว้ใต้ดินลึกเนื่องจากการทำลายมันเป็นเรื่องยาก และทิ้งคำเตือนนี้ไว้เพื่อห้ามไม่ให้เราตามหามัน"
 anomaly.255.a:0 "ถ้าอย่างนั้นเราก็ควรล้มเลิกความคิด"
 anomaly.255.b:0 "ตามหาอาวุธพวกนั้นซะ"
 anomaly.256.name:0 "การค้นพบที่น่าสนใจ"
 anomaly.256.desc:0 "ดูเหมือนว่าผู้คนในดาวเคราะห์ดวงนี้กำลังทดลองเฉพาะเทคโนโลยีอาวุธที่เราคิดว่าเป็นพื้นฐานค่อนข้างมาก\n\nความหายนะที่พวกเขาก่อขึ้นเป็นข้อพิสูจน์ถึงความมุ่งมั่นในการฆ่าล้างเผ่าพันธุ์อย่างไม่น่าเชื่อ มากกว่าที่จะเป็นเรื่องของพลังของอาวุธ"
 anomaly.256.a:0 "พื้นฐานแต่มีประโยชน์"
 anomaly.256.a.tooltip.mass:0 "ได้รับเทคโนโลยี: §Yปืนยิงมวลสาร(ไดรเวอร์ลม)§!"
 anomaly.256.a.tooltip.miss:0 "ได้รับเทคโนโลยี: §Yขีปนาวุธ(จมูก)§!"
 anomaly.256.a.tooltip.laser:0 "ได้รับเทคโนโลยี: §Yเลเซอร์แดง(เลเซอร์สีแดง)§!"
 anomaly.256.b:0 "ไม่มีสิ่งใดในนี้ที่มีประโยชน์ต่อ [Root.Owner.GetName]"
 anomaly.257.name:0 "การค้นพบที่โหดเหี้ยม"
 anomaly.257.desc:0 "เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ตั้งข้อสังเกตว่า ผู้อยู่อาศัยคนก่อนในสถานที่แห่งนี้คิดถูกแล้วที่ซ่อนอาวุธเหล่านี้ไว้ในถ้ำใต้ซากปรักหักพัง พวกมันสร้างขึ้นบนหลักการพื้นฐานเดียวกันกับอาวุธที่ใช้งานอยู่ใน [Root.Owner.GetName] แต่ล้ำหน้ากว่ามาก เทคโนโลยีเหล่านี้จะเป็นประโยชน์ต่อกลไกทางการทหารของ [Root.Owner.GetSpeciesAdj] อย่างแน่นอน"
 anomaly.257.a:0 "อะไรนะ? พวกเรามีเทคโนโลยีนี้อยู่แล้ว"
 anomaly.257.b:0 "อัปเกรดอาวุธเลเซอร์ของเรา"
 anomaly.257.c:0 "อัปเกรดปืนยิงมวลสารของเรา"
 anomaly.257.d:0 "อัปเกรดขีปนาวุธของเรา"
 anomaly.258.name:0 "มือเปล่า"
 anomaly.258.desc:0 "การค้นหาไร้ผลลัพธ์ ไม่ว่าอาวุธลึกลับเหล่านี้เคยเป็นอะไร ตอนนี้พวกมันได้อันตรธานหายไปแล้ว"
 anomaly.260.name:0 "โรงงานผลิตแร่"
 anomaly.260.desc:0 "ยาน [Root.GetName] พบโครงสร้างสิ่งก่อสร้างของเอเลี่ยนบนดาว [From.GetName] ดูเหมือนว่ามันจะเป็นสิ่งก่อสร้างชนิดเดียวที่เหลืออยู่บนดาวเคราะห์ดวงนี้ เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] คาดเดาว่าร่องรอยสถาปัตยกรรมต่างดาวอื่นๆ ทั้งหมดอาจถูกย้ายออกไปนอกโลก โดยเหลืออาคารหลังนี้ไว้เพียงลำพังด้วยเหตุผลที่ไม่ทราบแน่ชัด\n\nมันเป็นโรงงานแปรรูปที่ใช้ประโยชน์จากทรัพยากรแร่ธาตุอันอุดมสมบูรณ์ของดาวเคราะห์ และผลสแกนเบื้องต้นโดย [Root.GetName] บ่งชี้ว่ามันสามารถเปิดใช้งานอีกครั้งได้ง่ายดายพอสมควร"
 anomaly.260.a:0 "ยอดเยี่ยมยิ่งนัก"
 anomaly.260.a.tooltip:0 "เพิ่ม §Yโรงงานโบราณ(อุตสาหกรรม)§! ให้กับ [From.GetName]\n"
 anomaly.265.name:0 "การแข่งความเร็วต่างดาว"
 anomaly.265.desc:0 "หลุมอุกกาบาตบน [From.GetName] แสดงรอยจารึกที่ยาวและไม่สม่ำเสมอฝังแน่นอยู่ในชั้นบนที่ค่อนข้างอ่อนนุ่มของดาวเคราะห์น้อย เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] กู้คืนเศษซากที่น่าสนใจที่ไม่คาดคิดจากขอบหลุม ซึ่งเป็นยานพาหนะมีล้อ ดูเหมือนจะเป็นรถขนส่งส่วนบุคคลมากกว่ายานวิจัย\n\nลูกเรือของยาน [Root.GetName] คาดเดาว่าหลุมอุกกาบาตนี้อาจเคยถูกใช้เพื่อการกีฬา โดยมีสิ่งมีชีวิตต่างดาวบางสายพันธุ์นำยานพาหนะเคลื่อนที่ส่วนบุคคลมาประลองกันในการทดสอบความแข็งแกร่งทางกลไกหรือความเร็วในสภาวะที่มีแรงโน้มถ่วงเกือบเป็นศูนย์"
 anomaly.265.a:0 "บรื๊น"
 anomaly.265.a.tooltip:1 "เพิ่มตัวปรับแต่ง §Yรอยล้อลาก(สัญลักษณ์เด็ก)§! ให้กับ [From.GetName]:\n£engineering£ §G+6§!"
 anomaly.270.name:0 "การเฉี่ยวชนเล็กน้อย"
 anomaly.270.desc:0 "แม้ว่าหลุมอุกกาบาตดังกล่าวส่วนใหญ่น่าจะเป็นผลมาจากการพุ่งชนของอุกกาบาตทั่วไป ทว่ารูปแบบที่ซับซ้อนในแอ่งหลุมที่เกิดขึ้นนั้นเกิดขึ้นในภายหลัง\n\nเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] โต้แย้งว่ารูปแบบบนพื้นผิวเหล่านี้ไม่ใช่ผลลัพธ์จากการพุ่งชน แต่เป็นการปะทะกันระหว่างดาวเคราะห์น้อย [From.GetName] และสิ่งติดตั้งในวงโคจรหรือยานอวกาศที่ไม่ระบุรายละเอียดที่เป็นของเอเลี่ยนต่างดาว"
 anomaly.270.a:0 "ช่างประหลาดเสียจริง"
 anomaly.270.a.tooltip:2 "เพิ่มตัวปรับแต่ง §Yวงจรในธุลี(กระปุกในฝุ่น)§! ให้กับ [From.GetName]:\n£engineering£ §G+3§!"
 anomaly.275.name:0 "เครื่องขับดันที่ถูกทิ้งร้าง"
 anomaly.275.desc:0 "ที่ใจกลางหลุมอุกกาบาตขนาดใหญ่พิเศษบนดาว [From.GetName] มีกลุ่มโครงโลหะวางอยู่ ซึ่งไม่ต้องสงสัยเลยว่ามาจากเอเลี่ยนต่างดาว\n\nเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] เชื่อมั่นว่าพวกมันเป็นอุปกรณ์ขับเคลื่อนขนาดมหึมาที่สามารถติดตั้งบนดาวเคราะห์น้อยได้ โดยมีวัตถุประสงค์เพื่อผลักดัน [From.GetName] ออกจากวงโคจรไปยังเป้าหมายและจุดหมายที่ไม่รู้จัก ยาน [Root.GetName] อยู่ในสถานะเตรียมพร้อม ลูกเรือพร้อมจะเริ่มแยกชิ้นส่วนและวิเคราะห์ระบบขับเคลื่อนที่อ้างถึงด้วยความหวังที่จะปรับปรุงเทคโนโลยีไอพ่นขับดันของเราเอง"
 anomaly.275.a:0 "ดำเนินการตามนั้น"
 anomaly.275.b:0 "ปล่อยเทคโนโลยีต่างดาวอันชั่วร้ายนี้ไว้ตามลำพังเถอะ"
 anomaly.280.name:0 "ความล้มเหลวของการตั้งอาณานิคม"
 anomaly.280.desc:0 "เคยมีอาณานิคมของเอเลี่ยนบนดาว [From.GetName] มาก่อน หรืออย่างน้อยก็เป็นความพยายามในช่วงแรก เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] รายงานว่าความพยายามนั้นเห็นได้ชัดว่าเร็วเกินไป โครงสร้างที่ทรุดโทรมไม่มีโอกาสต้านทานสภาพอากาศที่เป็นศัตรูของ [From.GetName] ได้เลย\n\nเนื่องจากไม่ต้องการกลับไปมือเปล่า ยาน [Root.GetName] จึงได้กู้คืนเครื่องกรองชั้นบรรยากาศที่ชำรุดซึ่งอาจมีความน่าสนใจบ้าง"
 anomaly.280.a:0 "พวกเราสามารถเรียนรู้จากความผิดพลาดของพวกเขาได้"
 anomaly.280.b:0 "สิ่งนี้มันไร้ประโยชน์สิ้นดี"
 anomaly.280.c:0 "[Root.Owner.GetName] จะไม่มีวันทำผิดพลาดเช่นนั้นอย่างแน่นอน"
 anomaly.285.name:0 "การเคลื่อนตัวของแผ่นเปลือกโลกที่ผิดปกติ"
 anomaly.285.desc:0 "สิ่งที่ยาน [Root.GetName] พบบน [From.GetName] ไม่ใช่สิ่งก่อสร้าง แต่เป็นชั้นหินแร่ที่เรียงตัวกันอย่างเป็นระเบียบอย่างน่าประหลาดใจ เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ยืนยันว่าบล็อกหินที่มีมุมเหลี่ยมเหล่านี้เป็นผลจากการโต้ตอบระหว่างแผ่นเปลือกโลก รูปร่างของพวกมันเป็นผลลัพธ์ของฟิสิกส์แผ่นเปลือกโลกที่ผิดปกติซึ่งสืบทอดมาในเปลือกโลกของดาวเคราะห์\n\nเหลี่ยมมุมที่สมบูรณ์แบบของรอยเลื่อนย้อนเหล่านี้นำไปสู่ความเป็นไปได้ที่มนุษย์ต่างดาวอาจจะดัดแปลงเปลือกดาวเคราะห์ [From.GetName] ในช่วงเวลาใดเวลาหนึ่งในอดีต"
 anomaly.285.a:0 "น่าสนใจเป็นอย่างยิ่ง"
 anomaly.285.a.tooltip:1 "เพิ่มตัวปรับแต่ง §Yการเคลื่อนตัวแผ่นเปลือกโลกผิดปกติ§! ให้กับ [From.GetName]:\n£engineering£ §G+2§!\n£physics£ §G+2§!"
 anomaly.290.name:0 "ศักยภาพของหินแร่"
 anomaly.290.desc:0 "[From.GetName] มีแร่ธาตุอุดมสมบูรณ์เป็นพิเศษ\n\nทว่าแร่ธาตุเหล่านั้น โชคร้ายที่ไม่มีประโยชน์อะไรกับพวกเราเลย อย่างไรก็ตาม เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] เชื่อว่าธาตุต่างๆ ในเปลือกของ [From.GetName] สามารถเปลี่ยนเป็นรูปแบบที่มีประโยชน์มากกว่าเดิมได้ด้วยการกระหน่ำยิงโพซิตรอน\n\nยาน [Root.GetName] ร้องขอให้ [Root.Owner.GetName] จัดสรรพลังงานสำรอง 1000 เครดิตสำหรับโครงการนี้"
 anomaly.290.a:0 "ไม่ พวกเราจะไม่ทำเช่นนั้น"
 anomaly.290.b:0 "ตกลง เตรียมประจุโพซิตรอนให้พร้อม"
 #anomaly.292.desc: "The crew of the [Root.GetName] are pleased to report that the experiment was a success, and a significant number of dense mineral veins on [From.From.GetName] have been transmuted into precious metals."
 anomaly.292.desc:0 "ลูกเรือของยาน [Root.GetName] ยินดีที่จะรายงานว่าการทดลองประสบความสำเร็จ และสายแร่หนาแน่นจำนวนมากบนดาว [From.From.GetName] ได้รับการแปลงให้เป็นทรัพยากรที่นำมาใช้งานได้แล้ว"
 anomaly.295.name:0 "บนคือล่าง"
 anomaly.295.desc:0 "ขณะที่ยาน [Root.GetName] เดินทางผ่านแถบดาวเคราะห์น้อยเพื่อไปยัง [From.GetName] เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] รายงานว่ายานประสบกับการเปลี่ยนแปลงของแรงโน้มถ่วงอย่างกะทันหันหลายครั้ง ด้วยความอยากรู้อยากเห็นเสมอ [Root.GetLeaderName] จึงส่งยานสำรวจหลายลำไปสแกนสนามเศษซากเพื่อหาสาเหตุ\n\nผลลัพธ์ปรากฏว่าตัวการคือเครื่องกำเนิดแรงโน้มถ่วงเก่าแก่ที่ผลิตโดยเอเลี่ยน ด้วยการทำงานที่กะพร่องกะแพร่งบนแหล่งพลังงานที่กำลังจะหมดและขั้วของมันสลับด้าน พวกมันจึงปล่อยแรงโน้มถ่วงย้อนกลับออกสู่อวกาศเป็นครั้งคราว แม้ว่าจะไม่มีกำลังมากพอที่จะสร้างอันตรายร้ายแรงใดๆ อีกต่อไปแล้วก็ตาม\n\nเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ตั้งทฤษฎีว่าเครื่องกำเนิดเหล่านั้นเคยผลิตแรงโน้มถ่วงเทียมให้กับดาวเคราะห์น้อยขนาดใหญ่ในแถบนี้ ทว่าการทำงานที่ผิดพลาดบางอย่างทำให้หินก้อนนั้นแตกแยกออกจากกันในที่สุด"
 anomaly.295.a:0 "ความคิดที่น่ากังวล"

 anomaly.3000.name:0 "การหยิบจับอย่างประมาท"
 anomaly.3000.desc:0 "ตามรายงานจากลูกเรือของยาน [Root.GetName] ภารกิจของพวกเขาล้มเหลว เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ถูกอ้างว่าได้เข้าควบคุมยานสำรวจที่ส่งไปเก็บตัวอย่างจากกลุ่มแร่ด้วยตนเอง ส่งผลให้เกิดการชนกันระหว่างโดรนและกลุ่มแร่ แม้ว่าจะไม่รุนแรงแต่ก็ทำให้กลุ่มแร่แตกออกเป็นเสี่ยงๆ โดยสิ้นเชิง\n\nลูกเรือตั้งข้อสังเกตอย่างรอบคอบว่าเหตุการณ์นี้ทำให้เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ค่อนข้างสั่นขวัญเสีย และเศษแร่แร่ก็ควรยังมีมูลค่าอยู่บ้าง"
 anomaly.3000.a:0 "เศษเสี้ยวของมันยังมีค่าเท่ากับผลรวมของทั้งหมด"
 anomaly.3000.b:0 "[Root.Owner.GetName] เห็นว่าความประมาทเลินเล่อเช่นนี้เป็นสิ่งที่ไม่สามารถยอมรับได้"
 anomaly.3005.name:0 "กรงทองคำ"
 anomaly.3005.desc:0 "โครงสร้างจากแร่นี้ หากไม่มีคำจำกัดความที่ดีกว่านี้ ก็คือ ห้อง\n\nมันสร้างขึ้นจากแร่ธาตุประเภทเดียวกับที่ใช้งานทั่วไปใน [Root.Owner.GetName] โครงสร้างนี้เป็นรูปทรงสามสิบหน้ากลวง(Collow Icosidida Dedron)ผลสแกนการสะท้อนบ่งชี้ว่ามันกลวงเป็นส่วนใหญ่ และน่าจะมีผู้อยู่อาศัยในอดีต แตกต่างจากภายนอกที่บริสุทธิ์ ภายในกลับตกอยู่ในความโกลาหลโดยสิ้นเชิง ซึ่งอาจเป็นผลมาจากการวินาศกรรมโดยเจตนา\n\nเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] รายงานว่าสิ่งนี้ทำให้ยากต่อการเรียนรู้สิ่งที่มีค่าจากภายในโครงสร้าง ทว่าเน้นย้ำว่าเทคนิควิศวกรรมที่เกี่ยวข้องกับการสร้างเปลือกนอกซึ่งทนทานต่อแรงกดดันในอวกาศลึกได้อย่างดีเยี่ยมนั้น จะต้องมีความก้าวหน้าอย่างยิ่งยวด"
 anomaly.3005.a:0 "น่าพิศวงเหลือเกิน"
 anomaly.3010.name:0 "คัมภีร์คริสตัล (Crystal Codex)"
 anomaly.3010.desc:0 "กลุ่มแร่นี้คือบันทึกโฮโลแกรมที่มีหลายด้าน หลายมุม และโปร่งแสง มันยังคงยึดแน่นอยู่ในลำแสงพยุง(กระบี่ตรา)ของยาน [Root.GetName] ทว่าผู้เชี่ยวชาญของเราต้องการเวลาในการถอดรหัสเนื้อหาของมัน\n\n§Yโครงการพิเศษ(โครงการพิเศษ)§! ได้รับการจัดทำขึ้นเพื่อเร่งกระบวนการนี้แล้ว"
 anomaly.3010.a:0 "จะไม่มีสิ่งดีๆ เกิดขึ้นจากมันอย่างแน่นอน"
 anomaly.3010.b:0 "ดีมาก"
 anomaly.3012.desc:0 "ข้อมูลโฮโลแกรมบันทึกข้อกำหนดและเงื่อนไขสำหรับสนธิสัญญาการค้าไตรภาคีระหว่างอำนาจต่างดาวหลักสามฝ่ายที่เคยครอบครองจตุภาค (quadrant) นี้ของกาแล็กซี บริบทต่างๆ ยังไม่ชัดเจนและรายละเอียดไม่มีความหมาย ทว่าเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] รู้สึกว่าการค้นพบนี้จะมีประโยชน์อย่างยิ่งในการปรับปรุงความสามารถในการสื่อสารกับกองกำลังต่างดาวของเรา"
 anomaly.3015.name:0 "ค่ายทหารต่างดาว"
 anomaly.3015.desc:0 "เงาร่างที่จำแนกได้จากวงโคจรคือสิ่งก่อสร้างจริงๆ และการตรวจสอบอย่างใกล้ชิดเผยให้เห็นว่าพวกมันมีจุดประสงค์ทางการทหารอย่างชัดเจน แม้ว่าจะถูกทิ้งร้างมาเป็นระยะเวลาหนึ่งแล้ว — ทว่าถือเป็นเรื่องเมื่อไม่นานมานี้ในระดับเวลาของกาแล็กซี — เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] เชื่อว่าความลับของยุทธวิธีต่างดาวอาจยังคงขุดค้นขึ้นมาได้จากใต้ฝุ่นละอองที่ปกคลุมค่ายทหารที่เน่าเปื่อยและคลังแสงที่ถูกปล้นสะดม\n\n§Yโครงการพิเศษ(โครงการพิเศษ)§! อาจถูกประกาศใช้เพื่อศึกษาซากปรักหักพังเหล่านี้"
 anomaly.3015.a:0 "รับทราบ"
 anomaly.3015.b.pacifist:0 "การที่ค่ายทหารนี้ตายและถูกฝังไปแล้ว บอกเล่าอะไรหลายๆ อย่างได้เป็นอย่างดี"
 anomaly.3017.name:0 "ค่ายทหารต่างดาว"
 anomaly.3017.desc:0 "การวิเคราะห์เชิงประวัติศาสตร์ต่างดาวอย่างถี่ถ้วนของเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] เกี่ยวกับสิ่งติดตั้งทางทหารบนดาว [From.From.GetName] ให้ผลลัพธ์ที่เป็นรูปธรรมเพียงเล็กน้อย ฐานทัพถูกสร้างขึ้นก่อนที่ดาวเคราะห์จะกลายเป็นดินแดนรกร้างอย่างสมบูรณ์ ทว่าไม่ชัดเจนว่าสภาวะที่ไม่เอื้อต่อการอยู่อาศัยในปัจจุบันเป็นผลมาจากความขัดแย้งทางอาวุธ หรือกระบวนการที่สงบสุขกว่าหรือแม้กระทั่งกระบวนการทางธรรมชาติ\n\nสิ่งที่เราสรุปได้เกี่ยวกับยุทธศาสตร์และยุทธวิธีของพวกเขาในความขัดแย้งทางอาวุธนั้นดูเหมือนไม่ได้ก้าวล้ำนำหน้าเราไปไกลนัก\n\nในแง่ดี เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] อ้างว่าเขาได้รับแรงบันดาลใจอย่างมากจากซากสถาปัตยกรรมต่างดาวเหล่านั้น"
 anomaly.3017.a:0 "มีบางอย่างเสมอ"
 anomaly.3020.name:0 "ลวดลายตาราง"
 anomaly.3020.desc:0 "ภูมิประเทศที่เป็นเอกลักษณ์เฉพาะตัวของ [From.GetName] แบ่งแยกดาวเคราะห์ออกเป็นชีวนิเวศ(กระแอม)ที่แตกต่างกันอย่างเป็นระเบียบจำนวนนับไม่ถ้วน ซึ่งสภาพอากาศย่อย(micro-climates)มีปฏิสัมพันธ์กันเฉพาะในวิถีทางที่ละเอียดอ่อนที่ดูเหมือนสร้างขึ้นเพื่อเกื้อหนุนสภาพอากาศใกล้เคียง เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] สงสัยอย่างยิ่งว่ามีเทคนิคการปรับสภาพดาวเคราะห์(รูปร่าง)ขั้นสูงกำลังทำงานอยู่ ทว่าแทบไม่มีร่องรอยเหลืออยู่เกี่ยวกับตัวกระบวนการเองเลย\n\nทว่าผลลัพธ์ของมันยังคงมองเห็นได้ชัดเจนสำหรับ [Root.GetLeaderName] และลูกเรือของยาน [Root.GetName]"
 anomaly.3020.a:0 "น่าสนใจเป็นอย่างยิ่ง"
 anomaly.3025.name:0 "จักรกลอัตโนมัติโบราณ"
 anomaly.3025.desc:0 "หนึ่งในพื้นที่หลักที่มีพืชพรรณเขียวชอุ่มเป็นพิเศษบนดาว [From.GetName] มีศูนย์กลางอยู่ที่โครงสร้างสิ่งก่อสร้างต่างดาวที่ถูกพืชปกคลุม ในตอนแรกคาดว่าเป็นซากปรักหักพัง ทว่าการสังเกตการณ์อย่างใกล้ชิดโดยยาน [Root.GetName] เผยให้เห็นว่าอาคารหลังนี้ส่วนใหญ่รอดพ้นจากการโอบรัดของพืชพรรณบนดาวเคราะห์มาได้\n\n§Yโครงการพิเศษ(โครงการพิเศษ)§! ได้รับการจัดทำขึ้นเพื่อหาทางเข้าไปในโครงสร้างนี้แล้ว"
 anomaly.3025.a:0 "น่าสนใจมาก"
 anomaly.3027.desc:0 "โครงสร้างที่พืชพรรณขึ้นปกคลุม — ซึ่งเป็นโรงงานแปรรูปแร่ต่างดาว — บนดาว [From.From.GetName] นั้น ก่อนที่จะถูกละทิ้งในอดีตอันไกลโพ้น ส่วนใหญ่จะทำงานแบบอัตโนมัติ ซากของผู้ทำงานจำลองกระจัดกระจายเกลื่อนพื้น ส่วนประกอบอินทรีย์ของพวกเขา — เนื่องจากร่างกายของพวกเขาส่วนใหญ่เป็นสิ่งมีชีวิตทางชีวภาพที่ยึดโครงร่างให้ตั้งตรงด้วยโครงกระดูกภายในแบบพอลิเมอร์ — ได้เน่าเปื่อยไปนานแล้ว\n\nเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] คาดเดาว่าซากอินทรีย์ของจักรกลเหล่านี้ซึ่งในเวลาต่อมาได้ละลายและซึมลงสู่พื้นดิน ได้กระตุ้นสารอาหารในดินอย่างรุนแรง ทำให้พืชพรรณพื้นเมืองสามารถเติบโตได้อย่างอุดมสมบูรณ์และมีความทนทาน\n\nโรงงานสามารถเปิดใช้งานอีกครั้งได้ ทว่าจักรกลอัตโนมัติเหล่านี้ แม้จะสร้างความน่าหลงใหลให้แก่ [Root.GetLeaderName] แต่พวกมันจะไม่มีวันกลับมาเดินในโถงทางเดินแห่งนี้ได้อีก"
 anomaly.3027.a:0 "เข้าใจแล้ว"
 anomaly.3027.a.tooltip:0 "เพิ่ม §Yโรงงานโบราณ(อุตสาหกรรม)§! ให้กับ [From.GetName]\n"
 anomaly.3030.name:0 "จอดข้างทาง"
 anomaly.3030.desc:0 "มี ยานลำหนึ่งจอดนิ่งอยู่บนที่ราบของ [From.GetName] เซนเซอร์ของมันทำปฏิกิริยากับยาน [Root.GetName] ในวงโคจรรอบดาวเคราะห์\n\nลูกเรือของยาน [Root.GetName] ยังไม่สามารถยืนยันได้แน่ชัดว่ายานลำนี้ถูกทิ้งร้างเมื่อใด — เนื่องจากมันถูกทิ้งร้างจริงๆ — หรือใครเป็นคนทิ้งไว้ หรือตอนนี้พวกเขาอยู่ที่ไหน ตามความเห็นของเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] การเปิดใช้งานยานติดอาวุธเบานี้จากระยะไกลจะเป็นเรื่องง่ายดาย หากเราปรารถนาที่จะเพิ่มมันเข้าสู่กองยานของเรา"
 anomaly.3030.a:0 "จะไม่มีใครคิดถึงมันอย่างแน่นอน"
 anomaly.3030.a.tooltip:0 "ได้รับยานระดับ §Yคอร์เวต(โครเว็ท)§! 1 ลำ"
 anomaly.3030.b.phobe:0 "พวกเราไม่รู้ว่ามันมาจากไหนหรือจะไปที่ใด แยกชิ้นส่วนมันซะ"
 anomaly.3035.name:0 "ตรวจนับเสบียงพลังงาน"
 anomaly.3035.desc.carefree:0 "ดวงจันทร์ทะเลทราย [From.GetPlanetMoon] [From.GetName] ปรากฏว่าไม่มีความโดดเด่นใดๆ เลย\n\nขณะที่ลูกเรือเฝ้าติดตามเครื่องมือที่เงียบสนิท เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] กำลังเฝ้ามองพลังงานสำรองของยาน [Root.GetName] ตามรายงานของพวกเขา ยาน [Root.GetName] ได้รับพลังงานต่ำกว่าเกณฑ์มาตรฐานเมื่อออกจากท่าครั้งล่าสุด ทว่ามีความเป็นไปได้มากกว่าว่าความประมาทเลินเล่อในการจัดการทรัพยากรของ [Root.GetLeaderName] เป็นตัวการของสภาวะขาดแคลนนี้\n\nไม่ว่าอย่างไร ตัวยานก็ต้องการพลังงานสำรองเพิ่มเติม"
 anomaly.3035.desc.meticulous:0 "ดวงจันทร์ทะเลทราย [From.GetPlanetMoon] [From.GetName] ปรากฏว่าไม่มีความโดดเด่นใดๆ เลย\n\nขณะที่ลูกเรือเฝ้าติดตามเครื่องมือที่เงียบสนิท เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] กำลังตรวจนับพลังงานสำรองของยาน [Root.GetName] อย่างขยันขันแข็ง ตามรายงานของพวกเขา ยาน [Root.GetName] ได้รับพลังงานเกินกว่าเกณฑ์มาตรฐานเมื่อออกจากท่าครั้งล่าสุด ซึ่งอาจเกิดจากความผิดพลาดทางเอกสารบางประการ\n\n[Root.Leader.GetName] ได้อาสาที่จะคืนส่วนเกินนี้ให้แก่ทางการของ [Root.Owner.GetSpeciesAdj]"
 anomaly.3035.a:0 "โชคลาภที่ไม่คาดคิด"
 anomaly.3035.b:0 "ก็เป็นซะอย่างนี้"
 anomaly.3040.name:0 "กลุ่มโจรสลัดผู้ถูกเนรเทศ"
 anomaly.3040.desc:0 "สิ่งที่คิดว่าเป็นกลุ่มแร่ ความจริงแล้วคือตัวยานโลหะของยานคอร์เวตต่างดาวสองลำ ลอยอย่างแนบเนียนผ่านแถบดาวเคราะห์น้อย\n\nเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ได้สร้างการติดต่อ และยานทั้งสองลำนี้ขับโดยผู้ที่อ้างว่าเป็นอดีตโจรสลัด ซึ่งตอนนี้ถูกขับไล่ออกจากกลุ่มโจรของตน พวกเขาได้ยินข่าวลือแว่วมาว่า [Root.Owner.GetRulerTitle] [Root.Owner.GetRulerName] แห่ง [Root.Owner.GetName] เป็นวีรบุรุษของปวงชน และกำลังแสวงหาการลี้ภัย"
 anomaly.3040.desc.fallback:0 "สิ่งที่คิดว่าเป็นกลุ่มแร่ ความจริงแล้วคือตัวยานโลหะของยานคอร์เวตต่างดาวสองลำ ลอยอย่างแนบเนียนผ่านแถบดาวเคราะห์น้อย\n\nเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ได้สร้างการติดต่อ และยานทั้งสองลำนี้ขับโดยผู้ที่อ้างว่าเป็นอดีตโจรสลัด ซึ่งตอนนี้ถูกขับไล่ออกจากกลุ่มโจรของตน ที่น่าแปลกใจคือพวกเขาเชื่อว่าเราจะมีท่าทีเป็นมิตรกับพวกเขา และกำลังขอขอลี้ภัย"
 anomaly.3040.a:0 "พวกเขาสามารถทำตัวให้เป็นประโยชน์ได้"
 anomaly.3040.a.tooltip:0 "เกณฑ์โจรสลัดผู้ถูกเนรเทศและได้รับยานระดับ §Yคอร์เวต(โครเว็ท)§! 2 ลำ"
 anomaly.3040.b:0 "เราไม่ต้องการการรับใช้ของพวกเขา เอาสิ่งของที่พวกเขามีมา แต่ไว้ชีวิตพวกเขา"
 anomaly.3040.c:0 "[Root.Owner.GetName] จะไม่ทนต่อการมีอยู่ของสิ่งมีชีวิตประเภทนี้"
 anomaly.3040.c.tooltip:0 "กลุ่มโจรสลัดผู้ถูกเนรเทศกลายเป็นศัตรู!"
 anomaly.3040.d:0 "พวกเราต้องปฏิเสธคำขอลี้ภัยของพวกเขา"
 anomaly.3050.name:0 "โครงตาข่ายเสียดสี"
 anomaly.3050.desc:1 "[From.GetName] ถูกคาดผ่านด้วยแถบแร่ผสมที่ทับซ้อนกันซึ่งถูกยึดให้สูงเหนือพื้นผิวที่โหดร้ายด้วยเสาโครงสร้างที่สูงและยืดหยุ่น เสาเหล่านี้จะแกว่งไกวอยู่ตลอดเวลาด้วยกระแสลมในชั้นบรรยากาศ ส่งผลให้แถบแร่ที่ทับซ้อนกันเสียดสีกันและสร้างคลื่นเสียงในระดับความถี่ที่หูของ [Root.Owner.GetSpeciesNamePlural] ไม่สามารถได้ยิน\n\nเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] รายงานความยากลำบากในการแยกสัญญาณเสียงนี้จากเสียงรบกวนตามธรรมชาติของดาวเคราะห์ ทว่าระบุว่าแถบแร่เหล่านั้นสามารถนำมาแยกส่วนและรีไซเคิลอย่างมีประสิทธิภาพโดย [Root.Owner.GetName] ได้หากเราเลือกที่จะทำเช่นนั้น"
 anomaly.3050.a:0 "แยกแยะและศึกษาเสียงเอเลี่ยนเหล่านั้น"
 anomaly.3050.a.tooltip:1 "[From.GetName]:\n£society£ §G+9§!"
 anomaly.3050.b:0 "เตรียมการสำหรับการกู้คืนชิ้นส่วนแถบแร่เหล่านั้น"
 anomaly.3050.b.tooltip:1 "[From.GetName]:\n£minerals£ §G+6§!"
 anomaly.3055.name:0 "ความเป็นใหญ่แห่งพฤกษา"
 anomaly.3055.desc:0 "[From.GetName] เป็นดาวเคราะห์เขตร้อนที่มีชีวมณฑลที่อุดมสมบูรณ์ การวิเคราะห์พืชพรรณบนพื้นผิวอย่างใกล้ชิดเผยให้เห็นความหลากหลายที่ขาดหายไปอย่างไม่คาดคิด เนื่องจากมีตระกูลต้นไม้สูงตระกูลหนึ่งครอบครองระบบนิเวศส่วนใหญ่ไว้\n\nแม้ตัวมันเองจะไม่ได้เป็นอันตรายในตัวมันเอง ทว่าความเป็นเอกภาพทางพืชพรรณของพวกมันส่งผลเสียต่อการดำรงชีวิตของสัตว์ขนาดเล็กบนดาวเคราะห์ และจะเป็นการยากที่จะเพาะปลูกพืชอาหารได้อย่างมีประสิทธิภาพบนพื้นผิวหากมีการพยายามตั้งอาณานิคมขึ้นในอนาคต\n\nเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] นักชีววิทยาต่างดาวผู้มีชื่อเสียง ได้จัดทำแผนในการปรับสมดุลชีวมณฑลต่างดาวนี้ใหม่"
 anomaly.3055.a:0 "อนุมัติแผนงานดังกล่าว"
 anomaly.3055.a.tooltip:1 "เพิ่มตัวปรับแต่ง §Yระบบนิเวศเสียสมดุล§! ให้กับ [From.GetName]:\n£food£ §R-20%§!\n"
 anomaly.3055.b:0 "ปล่อยดาวเคราะห์ดวงนี้ไว้ตามลำพัง"
 anomaly.3055.b.tooltip:1 "เพิ่มตัวปรับแต่ง §Yระบบนิเวศเสียสมดุล§! ให้กับ [From.GetName]:\n£food£ §R-20%§!"
 anomaly.3056.desc:0 "สมดุลได้รับการฟื้นฟู — หรืออาจเป็นการเกิดขึ้นเป็นครั้งแรก — เนื่องจากต้นไม้ยืนต้นส่วนใหญ่ที่ครอบครองพื้นที่ได้รับการทำให้เป็นหมันโดยการแผ่รังสีเป้าหมายจากยาน [Root.GetName] ตัวอย่างพืชพรรณเพิ่มเติมได้รับการเผาให้เป็นเถ้าถ่านเพื่อเร่งให้เกิดความสมดุลที่แท้จริงเร็วขึ้น"
 anomaly.3057.desc:0 "การกำจัดป่าไม้ส่วนใหญ่บน [From.From.GetName] อย่างไม่ระมัดระวังส่งผลกระทบที่ไม่ได้ตั้งใจ\n\nสัตว์ขนาดเล็กที่เคยตกอยู่ภายใต้การกดขี่ของผืนป่าทึบกำลังขยายพันธุ์อย่างรวดเร็วและก้าวร้าวมากขึ้น—บางคนอาจเรียกว่าดุร้าย ทุ่งขี้เถ้าที่เคยเป็นที่ตั้งของผืนป่าอันเขียวชอุ่ม ตอนนี้กลายเป็นสนามรบแย่งชิงอาณาเขตอันดุเดือด"
 anomaly.3057.a:0 "บางทีเราควรจะคิดให้ดีก่อนที่จะเข้าไปก้าวก่าย"
 anomaly.3057.a.tooltip:0 "§Rสัตว์ อันตราย§! เพ่นพ่านอยู่บน [From.From.GetName] แล้วในตอนนี้"
 anomaly.3060.name:0 "หัวซุกเม็ดทราย"
 anomaly.3060.desc:0 "เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] รายงานว่าคลื่นทรายที่พลิ้วไหวในทะเลทรายของ [From.GetName] นั้น น่าแปลกใจที่เป็นผลมาจากไอพ่นของยานที่ยังทำงานอยู่\n\nยานต่างดาวลำหนึ่งจมอยู่ใต้ผืนทรายโดยหันหัวลง ระบบขับเคลื่อนที่ชำรุดส่งแรงสั่นสะเทือนทำเนินทรายด้านบนไหวเบาๆ ดูเหมือนว่ามันจะจมอยู่ตรงนั้นมาระยะหนึ่งแล้ว และค่อยๆ จมลึกเข้าไปในเนินทรายทุ่งร้าง ยาน [Root.GetName] ขาดเครื่องมือในการขุดค้นยานที่กำลังดิ้นรนนี้ และ [Root.GetLeaderName] แนะนำให้ส่งยานทหารไปยัง [From.GetName] เพื่อกู้มันขึ้นมา"
 anomaly.3060.a:0 "รับทราบ"
 anomaly.3060.b:0 "เราจะไม่ตกเหยื่อที่ล่อลวงอย่างเห็นได้ชัดเช่นนี้"
 anomaly.3060.c:0 "หากมีสิ่งมีชีวิตอินทรีย์หลงเหลืออยู่ พวกมันจะต้องถูกกำจัด"
 anomaly.3061.desc:0 "ในที่สุดกองยาน [Root.GetFleetName] ก็สามารถกู้ยานต่างดาวที่จมอยู่นั้นขึ้นมาได้\n\nมันว่างเปล่า แท้จริงแล้วแทบจะถูกลอกเอาสิ่งของไปหมด\n\nลูกเรือน่าจะทิ้งยานก่อนที่จะปล่อยให้มันจมลงสู่พื้นผิวของ [From.From.GetName] และพวกเขาได้นำระบบภายในที่ไม่สำคัญส่วนใหญ่ไปด้วย วิศวกรของ [Root.GetFleetName] สามารถต่อสายตรงควบคุมยานลำนี้ได้สำเร็จ และเติมพลังงานที่เหลือน้อยนิดให้มันใหม่"
 anomaly.3061.a:0 "ประจำการยานใหม่เข้าสู่กองยานของ [Root.Owner.GetSpeciesAdj]"
 anomaly.3061.a.tooltip:0 "ได้รับยานระดับ §Yคอร์เวทท์§!"
 anomaly.3062.desc:0 "สายเคเบิลแรงดึงสูงของ [Root.GetFleetName] ในที่สุดก็สามารถดึงยานต่างดาวลำนั้นขึ้นมาได้ แต่ทว่ากลับต้องเผชิญกับเสียงหวีดหวิวของระบบอาวุธที่กำลังเริ่มทำงาน!"
 anomaly.3062.a:0 "หลบหลีกด่วน!"
 anomaly.3062.a.tooltip:0 "ยาน §Yออสริช§! เข้าโจมตี!"
 anomaly.3063.desc:0 "ความพยายามกู้ซากล้มเหลว สายเคเบิลแรงดึงสูงที่กองยาน [Root.GetFleetName] พันรอบตัวยานที่จมอยู่นั้นเฉือนผ่านตัวถังที่ผุกร่อนของยานอย่างง่ายดายในขณะที่พยายามยกขึ้น\n\nชิ้นส่วนแต่ละชิ้นนั้นเก็บกู้ได้ค่อนข้างง่ายในภายหลัง แต่ตัวยานทั้งหมดได้กลายเป็นเศษเหล็กไปแล้ว"
 anomaly.3063.a:0 "ล้มเหลวอีกครั้งจนได้"
 anomaly.3065.name:0 "การสื่อสารที่ผิดกฎหมาย"
 anomaly.3065.desc:0 "เครื่องทวนสัญญาณการสื่อสารแบบประกอบเองอย่างลวกๆ ถูกติดตั้งไว้บน [From.GetName] อย่างไม่ประณีต\n\nเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] มั่นใจว่านี่เป็นส่วนหนึ่งของเครือข่ายทวนสัญญาณสำหรับการสื่อสารของโจรสลัด การวิเคราะห์เบื้องต้นชี้ว่าข้อความที่ส่งต่อนั้นไม่ได้มีความอ่อนไหวเชิงกลยุทธ์เป็นพิเศษ แต่เป็นเพียงการสื่อสารส่วนตัวระหว่างยานของสมาชิกลูกเรือแต่ละคน"
 anomaly.3065.a:0 "บางทีเราอาจเรียนรู้อะไรบางอย่างเกี่ยวกับชีวิตในอวกาศอันห่างไกลได้"
 anomaly.3065.b:0 "บางทีเราอาจเรียนรู้บางสิ่งที่เป็นประโยชน์เกี่ยวกับชีวิตในอวกาศอันห่างไกลได้"
 anomaly.3070.name:0 "ดิ่งลงสู่ความว่างเปล่า"
 anomaly.3070.desc:0 "สัญญาณมาจากกระสวยโลหะขนาดเล็ก เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ระบุว่ามันเป็นกระสวยช่วยชีวิตโบราณของต่างดาว\n\nดูเหมือนว่ามันจะถูกดึงดูดเข้าสู่ขอบนอกของแรงโน้มถ่วงหลุมดำเมื่อหลายยุคหลายสมัยก่อน ในมุมที่เกือบจะเป็นการเหวี่ยงตัวหลบ(เสียงกระโชก)ยากจะตัดสินว่านี่เป็นความตั้งใจหรือความบังเอิญ—และไอพ่นอัตโนมัติของกระสวยได้พยายามต่อสู้กับแรงดึงดูดไม่ให้ตกลงสู่ขอบฟ้าเหตุการณ์(ขอบฟ้า)ตั้งแต่นั้นมา แต่ขณะนี้มันอยู่ใกล้ขอบฟ้าเหตุการณ์เกินกว่าจะกู้ขึ้นมาได้\n\nรายงานของ [Root.GetLeaderName] สิ้นสุดลงอย่างกะทันหัน และลูกเรือของ [Root.GetName] แจ้งว่าเจ้าหน้าที่วิทยาศาสตร์ดูเหมือนจะตกใจและสะเทือนใจอย่างลึกซึ้งต่อชะตากรรมอันน่าสลดใจของกระสวยช่วยชีวิตนี้"
 anomaly.3070.desc.mach:0 "สัญญาณมาจากกระสวยโลหะขนาดเล็ก เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ระบุว่ามันเป็นกระสวยช่วยชีวิตโบราณของต่างดาว\n\nดูเหมือนว่ามันจะถูกดึงดูดเข้าสู่ขอบนอกของแรงโน้มถ่วงหลุมดำเมื่อหลายยุคหลายสมัยก่อน ในมุมที่เกือบจะเป็นการเหวี่ยงตัวหลบ(เสียงกระโชก)ยากจะตัดสินว่านี่เป็นความตั้งใจหรือความบังเอิญ—และไอพ่นอัตโนมัติของกระสวยได้พยายามต่อสู้กับแรงดึงดูดไม่ให้ตกลงสู่ขอบฟ้าเหตุการณ์(ขอบฟ้า)ตั้งแต่นั้นมา แต่ขณะนี้มันอยู่ใกล้ขอบฟ้าเหตุการณ์เกินกว่าจะกู้ขึ้นมาได้\n\nรายงานของ [Root.GetLeaderName] สิ้นสุดลงอย่างกะทันหัน และลูกเรือของ [Root.GetName] แจ้งว่าเจ้าหน้าที่วิทยาศาสตร์ได้รับผลกระทบอย่างลึกซึ้งจากข้อมูลใหม่นี้ เนื่องจากมันส่งผลให้สถิติการประเมินความเสี่ยงและอัตราการรอดชีวิตของ [Root.GetName] เปลี่ยนแปลงไปอย่างมีนัยสำคัญ"
 anomaly.3070.a:0 "เข้าใจได้"
 anomaly.3075.name:0 "การแผ่รังสีที่ไม่คงที่"
 anomaly.3075.desc:0 "สัญญาณที่ตรวจพบในระบบนี้มาจาก [From.GetName] เองอย่างน่าประหลาดใจ\n\nในฐานะหลุมดำ มันมีขนาดค่อนข้างเล็ก ซึ่งอาจเป็นสาเหตุของรังสีที่คาดไม่ถึงซึ่งรั่วไหลออกมาจากขอบฟ้าเหตุการณ์ เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] เชื่อว่าหลุมดำนี้กำลังอยู่ในขั้นตอน \"ค่อยๆ จางหายไป\" และในที่สุดจะสลายตัวไปอย่างสมบูรณ์—แม้ว่าจะยากที่จะบอกว่ากระบวนการนี้จะเสร็จสิ้นก่อนวาระสุดท้ายของจักรวาล(เสียชีวิตด้วยความร้อน)หรือไม่\n\nความแปรปรวนของแรงโน้มถ่วงในช่วงแรกเริ่มของมันทำให้มันเกิดอาการ \"แกว่งตัว\" (ตามคำพูดของ [Root.GetLeaderName]) ซึ่งส่งผลให้พลังงานไหลออกจากขอบฟ้าเหตุการณ์เพิ่มมากขึ้นไปอีก"
 anomaly.3075.a:0 "มีหลายสิ่งหลายอย่างที่เราสามารถเรียนรู้ได้"
 anomaly.3075.a.tooltip:1 "[From.GetName]:\n£physics£ §G+9§!"
 anomaly.3080.name:0 "โรงงานของเล่น"
 anomaly.3080.desc:0 "มีสิ่งปลูกสร้างบน [From.GetName] แม้ว่าส่วนใหญ่จะพังทลายเป็นเศษซากปรักหักพัง การบินสำรวจรอบแรกของ [Root.GetName] เผยให้เห็นอาคารเพียงแห่งเดียวที่ยังคงสภาพสมบูรณ์ ซึ่งรอดพ้นจากภัยพิบัติที่พรากสิ่งปลูกสร้างและผู้สร้างไปจาก [From.GetName]\n\nและนี่คือแหล่งกำเนิดของเสียงแปลกๆ\n\nไม่เพียงแต่อาคารจะยังสมบูรณ์เท่านั้น แต่เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] รายงานว่ามันยังคงทำงานอยู่ด้วย\n\nมันคือโรงงานผลิตบางประเภทที่เปลี่ยนโพลีเมอร์ดินน้ำมันให้กลายเป็นวัตถุไร้เสียงที่มีวัตถุประสงค์ไม่แน่ชัด แต่น่าจะใช้เป็นเครื่องประดับ วัตถุดิบและผลผลิตขั้นสุดท้ายส่วนใหญ่ไม่ได้มีความสำคัญสำหรับ [Root.Owner.GetName] แต่เราสามารถเรียนรู้สิ่งต่างๆ ได้จากกระบวนการผลิตอัตโนมัติของมัน"
 anomaly.3080.a:0 "บางทีเราควรสร้างฐานที่มั่นและเฝ้าสังเกตการณ์"
 anomaly.3080.a.tooltip:0 "เพิ่ม §Yของ เล่น§! ไปยัง [From.GetName]\n"
 anomaly.3085.name:0 "เจ้าชาย"
 anomaly.3085.desc:0 "คลังข้อมูลพกพาชิ้นหนึ่งโคจรอยู่รอบๆ ดาวเคราะห์ขนาดมหึมา [From.GetName] อย่างนุ่มนวล เมื่อยาน [Root.GetName] เก็บมันขึ้นมาก็พบว่ามีข้อความภาษาต่างดาวอยู่ คำศัพท์ไม่ใช่สิ่งที่ไม่คุ้นเคยเสียทีเดียว แต่โครงสร้างประโยคนั้นซับซ้อนอย่างน่าตกใจ\n\nเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] แนะนำให้ศึกษาอย่างละเอียดมากขึ้นเพื่อถอดรหัสเนื้อหาและที่มาของข้อความนี้"
 anomaly.3085.a:0 "วิเคราะห์ข้อมูลบนดาว [Root.Owner.Capital.GetName]"
 anomaly.3085.b:0 "ละทิ้งมันไว้"
 anomaly.3086.name:0 "ถอดรหัสเจ้าชายสำเร็จ"
 anomaly.3086.desc:0 "ข้อความดังกล่าว—ซึ่งชื่อเรื่องแปลคร่าวๆ ได้ว่า \"ผู้ปกครองภูมิภาค\"เขียนขึ้นด้วยภาษาถิ่นโบราณของชาว [book_writer.GetSpeciesAdj] ซึ่งใช้พูดกันใน [book_writer.GetName]\n\nตัวอักษรนี้มีความสำคัญทางประวัติศาสตร์อย่างยิ่งต่อพวกเขาอย่างไม่ต้องสงสัย และอาจมีความรู้ที่มีค่าซ่อนอยู่"
 anomaly.3086.a:0 "ให้เราค้นหาความลับของมัน—พวกเขาไม่จำเป็นต้องรู้เรื่องนี้"
 anomaly.3086.b:0 "เราจะคืนมันให้กับเจ้าของที่แท้จริง ติดต่อพวกเขาไป"
 anomaly.3086.c:0 "ร้อยแก้วของพวกเขานั้นราบเรียบ แนวคิดก็อ่อนหัด ติดต่อพวกเขาไปซะ"
 anomaly.3087.name:0 "[book_writer.GetName]"
 anomaly.3087.desc:0 "พวกเราทราบมาว่าคุณได้พบสำเนาชุดเดียวที่เหลือรอดอยู่ของ\"เจ้าชาย\"ซึ่งเป็นเอกสารที่มีความสำคัญทางประวัติศาสตร์และวัฒนธรรมอย่างยิ่งต่อผู้คนของเรา\nพวกเราคิดว่ามันสูญหายไปตลอดกาลจากการปล้นสะดมของโจรสลัดเมื่อหลายปีก่อน ทว่าพวกเรารู้สึกขอบคุณที่ได้เห็นมันตกอยู่ในมือของผู้มีอารยธรรม\n\nคุณจะคืนมันให้แก่เราได้หรือไม่? เรายินดีที่จะโอนพลังงานสำรอง (เครดิตพลังงาน) บางส่วนเป็นการตอบแทนสำหรับความช่วยเหลือของคุณ"
 anomaly.3087.a:0 "แน่นอนอยู่แล้ว"
 anomaly.3088.name:0 "[book_writer.GetName]"
 anomaly.3088.desc:0 "พวกเราทราบมาว่าคุณได้พบสำเนาชุดเดียวที่เหลือรอดอยู่ของ\"เจ้าชาย\"ซึ่งเป็นเอกสารที่มีความสำคัญทางประวัติศาสตร์และวัฒนธรรมอย่างยิ่งต่อผู้คนของเรา\n\nพวกเราคิดว่ามันสูญหายไปตลอดกาลจากการปล้นสะดมของโจรสลัดเมื่อหลายปีก่อน ทว่าพวกเรารู้สึกขอบคุณที่ได้เห็นมันตกอยู่ในมือของผู้มีอารยธรรม\n\nคุณจะคืนมันให้แก่เราได้หรือไม่?"
 anomaly.3088.a:0 "ไม่ ความจริงแล้ว พวกเราคิดว่าหนังสือเล่มนี้มันแย่มาก"
 anomaly.3088.b:0 "ไม่ ตัวอักษรที่เขียนขึ้นคือเครื่องมือของพวกคนโกหก"
 anomaly.3088.c:0 "ตัวเจ้าและคำพูดของเจ้าจะถูกทำลายสิ้น"
 anomaly.3089.name:0 "[book_writer.GetName]"
 anomaly.3089.desc:0 "แกไม่มีสิทธิ์มาวิจารณ์วรรณกรรมของเรา!\n\nแกจะต้องเสียใจกับเรื่องนี้!"
 anomaly.3089.a:0 "เหอะ พวกหนอนหนังสือ"
 anomaly.3089.b:0 "พวกสิ่งมีชีวิตอินทรีย์ที่น่าเวทนา"
 anomaly.3090.name:0 "กลุ่มเรียกค่าไถ่: ทุ่นส่งสัญญาณฉุกเฉิน"
 anomaly.3090.desc:0 "ทุ่นส่งสัญญาณฉุกเฉินลอยอยู่ในวงโคจรอย่างแผ่วเบารอบ [From.GetName] ตัวเรือนภายนอกได้รับความเสียหายอย่างหนัก ซึ่งดูเหมือนจะถูกยิงเฉี่ยวชนด้วยอาวุธหรือการระเบิดที่ทรงพลัง\n\nมันอาจจะเป็นรุ่น [Root.Owner.GetSpeciesAdj] สำหรับยานพลเรือน — ออกแบบมาเพื่อยิงปล่อยออกมาเป็นมาตรการฉุกเฉินหากระบบสื่อสารล้มเหลว — ทว่าระดับความเสียหายทำให้เป็นไปไม่ได้ที่จะระบุได้แน่ชัด\n\nมันส่งสัญญาณซ้ำๆ ที่อ่อนแรงและบิดเบี้ยว"
 anomaly.3090.a:0 "ทำความสะอาดสัญญาณส่งเพื่อวิเคราะห์"
 anomaly.3090.b:0 "มันอาจจะเป็นกับดัก — ปล่อยมันไว้เฉยๆ น่าจะดีที่สุด"
 anomaly.3091.name:0 "กลุ่มเรียกค่าไถ่: สัญญาณ SOS"
 anomaly.3091.desc:0 "ทุ่นดังกล่าวได้รับการยืนยันแล้วว่าเป็นสิ่งที่ผลิตขึ้นโดย [Root.Owner.GetSpeciesAdj] และสัญญาณที่ส่งต่อได้รับการปรับให้เสถียรแล้ว"
 anomaly.3091.a:0 "นี่คือเจ้าหน้าที่ [Root.Owner.GetSpeciesAdj] จงระบุตัวตนของพวกเจ้ามา"
 anomaly.3091.a.tooltip:0 "เปิดระบบสื่อสาร"
 anomaly.3091.b:0 "ปิดระบบมันซะ ห้ามไม่ให้ใครพูดถึงเรื่องนี้อีก"
 anomaly.3092.name:0 "ตัวประกัน [Root.GetSpeciesAdj]"
 anomaly.3092.desc:0 "ฮะ- ฮัลโหล? นี่คือผู้บัญชาการของอนุภาพยานขนส่งพลเรือน [Root.GetSpeciesAdj]\n\nเอ่อ อดีตผู้บัญชาการ ยานอนุภาพสูญเสียไปแล้ว พวกเราโดนบุกเข้ามายึดโดยโจรสลัดและถูกจับเป็นตัวประกันก่อนที่พวกมันจะระเบิดยานทิ้ง"
 anomaly.3092.a:0 "ใครเป็นคนจับพวกคุณไว้?"
 anomaly.3092.a.response:0 "พวกเขา ฉัน- ฉันคิดว่าพวกเขาเรียกตัวเองว่ากลุ่มเรียกค่าไถ่? แรนซัมเมียร์สค่าไถ่?\n\nไม่ว่าอย่างไรพวกมันก็เป็นกลุ่มที่ชั่วช้ามาก พวกเราทุกคนคงตายไปแล้วหากพวกมันไม่คิดว่าจะได้รับสิ่งตอบแทนสำหรับพวกเราจาก [Root.GetName] ฉันได้ยินพวกมันกำลังคุยถึงข้อเรียกร้อง..."
 anomaly.3092.b:0 "พวกเราจะไม่ไปช่วยพวกคุณ"
 anomaly.3092.c:0 "พวกเราจะไปช่วยพวกคุณ"
 anomaly.3093.name:0 "ตัวประกัน [Root.GetSpeciesAdj]"
 anomaly.3093.desc:0 "อะไรนะ? อะไรนะ? คุณทำแบบนี้ไม่ได้นะ คุณจะปล่อยให้เราตายไม่ได้!\n\nหากพวกมันปักใจเชื่อว่าจะไม่สามารถเรียกค่าไถ่เราคืนให้กับ [Root.GetName] ได้ พวกมันจะไม่ลังเลที่จะฆ่าเราเลย พวกมันอาจจะฆ่าเราด้วยซ้ำแม้ว่าจะจ่ายค่าไถ่ไปแล้วก็ตาม! คุณทำแบบนี้ไม่ได้--"
 anomaly.3093.a:0 "ลาก่อน"
 anomaly.3094.name:0 "ตัวประกัน [Root.GetSpeciesAdj]"
 anomaly.3094.desc:0 "โอ้ ขอบคุณมาก! ขอบคุณมาก [Root.GetRulerTitle] พวกเราถูกคุมตัวไว้ในสถานีอวกาศแห่งหนึ่ง ทว่าฉันไม่มีไอเดียเลยว่าเราอยู่ที่ไหนนอกจากนั้น\n\nฉันจะเร่งสัญญาณส่งข้อมูลขึ้นในตอนนี้เลย มันน่าจะช่วยให้คุณจำแนกพิกัดตำแหน่งของเรือนจำนี้ได้จากทุ่นส่งสัญญาณฉุกเฉิน..."
 anomaly.3094.a:0 "พิกัดตำแหน่งได้รับการบันทึกลงในบันทึกสถานการณ์(บันทึกระบบ)"
 anomaly.3095.name:0 "กลุ่มเรียกค่าไถ่: แผนการที่เตรียมการไว้อย่างดี"
 anomaly.3095.desc:0 "ฐานทัพโจรสลัด แม้จะค่อนข้างกลมกลืนไม่สะดุดตา ทว่าก็เห็นได้ชัดเมื่อคุณรู้ว่าจะต้องมองหาอะไร\n\nกองยานอวกาศที่กระจายตัวอย่างสับสนค่อยๆ ลอยออกมาจากด้านหลังของอาคารขุดเหมืองเก่าที่ดัดแปลงใหม่ — เห็นได้ชัดว่าพวกมันไม่ได้เตรียมรับแขก"
 anomaly.3095.a:0 "เปิดระบบสื่อสาร ตัวประกันต้องได้รับการเตรียมพร้อม"
 anomaly.3096.name:0 "ตัวประกัน [Root.GetSpeciesAdj]"
 anomaly.3096.desc:0 "สวัสดีอีกครั้ง [Root.GetRulerTitle] ฉันเดาว่ายานอวกาศ [Root.GetSpeciesAdj] เป็นสาเหตุของความโกลาหลทั้งหมดนี้ใช่ไหม?\n\nผู้คุมของเราดูเหมือนพร้อมที่จะทิ้งหน้าที่ของพวกเขาแล้ว การบุกขึ้นสถานีนี้โดยตรงน่าจะจบลงด้วยเรื่องร้ายแรงสำหรับทุกคนที่เกี่ยวข้อง แต่... หากคุณโจมตีฐานทัพโดยตรง ฉันคิดว่าพวกเราสามารถหลบหนีไปยังหนึ่งในยานชูชีพได้\n\nได้โปรดพยายามอย่าระเบิดพวกเราทิ้งระหว่างทางออกล่ะ!"
 anomaly.3096.a:0 "ดีมาก"
 anomaly.3098.name:0 "กลุ่มเรียกค่าไถ่: ฝุ่นละอองและเสียงสะท้อน"
 anomaly.3098.desc:0 "ฐานทัพโจรสลัดกลุ่มเรียกค่าไถ่ถูกทำลายลงไปพร้อมกับตัวประกัน [Root.GetSpeciesAdj] ดูเหมือนว่าพวกตัวประกันพยายามที่จะติดต่อมายังยานอวกาศต่างดาวที่เข้าโจมตี ทว่าสัญญาณกลับถูกเพิกเฉย"
 anomaly.3098.a:0 "พวกเราจะไม่มีวันลืมโศกนาฏกรรมครั้งนี้เลย"
 anomaly.3099.name:0 "กลุ่มเรียกค่าไถ่: ผู้ช่วยชีวิตที่ไม่คาดฝัน"
 anomaly.3099.desc:0 "ปฏิบัติการทางทหารของ [From.From.GetName] ได้ทำลายล้างกองกำลังของกลุ่มเรียกค่าไถ่จนหมดสิ้น\n\nตัวประกัน [Root.GetSpeciesAdj] ประสบความสำเร็จในความพยายามหลบหนีระหว่างการโจมตี และขณะนี้อยู่บนยานชูชีพอย่างปลอดภัยระหว่างทางไปพบกับยานกู้ภัยของ [Root.GetSpeciesAdj]"
 anomaly.3099.a:0 "พวกเราขอบคุณอย่างสุดซึ้ง"
 opinion_live_captives:0 "ตัวประกันที่ยังมีชีวิตอยู่"
 anomaly.3100.name:0 "กลุ่มเรียกค่าไถ่: การโจมตี"
 anomaly.3100.desc:0 "ปฏิบัติการทางทหารโดยกองกำลังที่ไม่ทราบฝ่ายได้ทำลายล้างโจรสลัดกลุ่มเรียกค่าไถ่\n\nอย่างปาฏิหาริย์ ตัวประกัน [Root.GetSpeciesAdj] สามารถฝ่าวงล้อมออกมาและขโมยยานชูชีพลำหนึ่งได้ในระหว่างการปะทะ และตอนนี้พวกเขากำลังเดินทางกลับมายัง [Root.Capital.GetName] ได้ด้วยดี"
 anomaly.3100.a:0 "ช่างเป็นโชคดีอย่างยิ่งและเต็มไปด้วยความลึกลับ"
 anomaly.3101.name:0 "กลุ่มเรียกค่าไถ่: การเก็บกู้ซากเศษ"
 anomaly.3101.desc:0 "ขณะที่ฐานทัพโจรสลัดค่อยๆ แยกตัวออกจากกันในปฏิกิริยาลูกโซ่อันรุนแรงที่เกิดขึ้นจากยานทหารของเรา การค้นหาลูกเรือของอนุภาพที่ถูกคุมตัวไว้ก็เริ่มต้นขึ้น\n\nหากพวกเขาหลบหนีมายังยานชูชีพได้สำเร็จ ตอนนี้พวกเขาน่าจะพยายามติดต่อมาหาเราแล้ว..."
 anomaly.3101.a:0 "สแกนทุกความถี่"
 anomaly.3102.name:0 "ตัวประกัน [Root.GetSpeciesAdj] ที่ได้รับอิสรภาพ"
 anomaly.3102.desc:1 "[Root.GetRulerTitle] นี่คือลูกเรือของอนุภาพ\n\nแผนการเป็นไปอย่างไม่มีสะดุด ทันทีที่คุณเริ่มระดมโจมตีฐานทัพโดยตรง ผู้คุมก็วิ่งไปยังยานของพวกเขา ทำให้เราสามารถพังประตูห้องขังออกมาได้ ยานชูชีพไม่มีการป้องกัน และดูเหมือนว่าคุณได้ดึงดูดความสนใจของโจรสลัดไว้มากพอจนพวกมันไม่แยแสต่อการหลบหนีของเราเลย"
 anomaly.3102.a:0 "ยินดีต้อนรับกลับบ้าน เหล่านักแหกคุกทั้งหลาย"
 anomaly.3103.name:0 "ตัวประกัน [Root.GetSpeciesAdj]"
 anomaly.3103.desc:0 "ฮัล-\n\n\n-ไม่มียานชูชีพ พวกเ-\n\n\n-ูกทอดทิ้ง ถล่มลงม-\n\n\n\n\n\n------------------------"
 anomaly.3103.a:0 "กัปตัน?"
 anomaly.3103.a.response:0 "...............\n...............\n...............\n...............\n...............\n...............\n"
 anomaly.3103.b:0 "..."
 anomaly.3104.name:0 "กลุ่มเรียกค่าไถ่: ควันและเถ้าถ่าน"
 anomaly.3104.desc:0 "ชาว [Root.GetSpeciesNamePlural] ที่ถูกลักพาตัวไม่มีวันเดินทางออกจากฐานทัพโจรสลัดได้สำเร็จ เราไม่สามารถระบุได้แน่ชัดว่าพวกเขาสิ้นชีวิตที่ใด — ยานชูชีพอาจจะไม่สามารถยิงปล่อยออกไปได้ หรือพวกเขาอาจจะไม่เคยหนีออกจากห้องขังเลย — ทว่าความจริงคือพวกเขาเสียชีวิตไปแล้ว\n\nประชากร [Root.GetSpeciesAdj] จะซาบซึ้งในปฏิบัติการที่รวดเร็วโดย [Root.GetRulerTitle] แห่ง [Root.GetName] ทว่าพวกเขาก็ไม่น่าจะลืมโศกนาฏกรรมครั้งนี้ในเร็ววันเช่นกัน"
 anomaly.3104.a:0 "เป็นเช่นนั้นจริงๆ..."
 anomaly.3105.name:0 "กลุ่มเรียกค่าไถ่: ทุกอย่างเรียบร้อยดี?"
 anomaly.3105.desc:1 "ด้วยการที่ลูกเรือของอนุภาพเดินทางกลับไปยัง [Root.Capital.GetName] อย่างปลอดภัย ภัยพิบัติจึงได้รับการหลีกเลี่ยง ประชากร [Root.GetAdj] จะต้องสรรเสริญในความเด็ดขาดของ [Root.GetRulerTitle] แห่ง [Root.GetName]\n\nสถานการณ์กับโจรสลัดกลุ่มเรียกค่าไถ่ที่ลักพาตัว ตลอดจนตัวกลุ่มโจรสลัดเอง ได้สิ้นสุดลงแล้ว คำถามบางข้อบางประการยังคงค้างอยู่ ซึ่งส่วนใหญ่เกี่ยวข้องกับกองทัพเรือโจรสลัดขนาดใหญ่กว่ามากซึ่งตัวประกันอ้างว่าได้มองเห็นผ่านช่องหน้าต่างหลังจากที่โดนจับตัวได้ ทว่าเมื่อพิจารณาจากสถานการณ์แล้ว สามารถสันนิษฐานได้อย่างปลอดภัยว่าภัยคุกคามดูเหมือนจะยิ่งใหญ่กว่าความเป็นจริง\n\nกลุ่มเรียกค่าไถ่แรนซัมเมียร์สได้สิ้นฤทธิ์ไปหมดสิ้นแล้ว"
 anomaly.3105.a:0 "ฉันสงสัยจัง..."
 anomaly.3110.name:0 "สัญญาณส่งข้อมูลในวันวาน"
 anomaly.3110.desc:0 "ตามที่คาดไว้ ยาน [Root.GetName] ได้ระบุพิกัดแหล่งกำเนิดของการส่งสัญญาณจากดาว [From.GetName] แล้ว\n\nแม้ว่าดาวเคราะห์ดวงนี้ดูเหมือนจะไม่เคยถูกสัมผัสโดยมนุษย์ต่างดาว ทว่ากลับมีแท่งหินเสาเดียวจากแร่สีขาวนวลตั้งอยู่บนยอดเนินเขาในซีกโลกใต้ สัญญาณดังกล่าวส่งออกมาจากภายในอนุสาวรีย์แห่งนี้ ซึ่งโครงสร้างได้รับการสร้างขึ้นเพื่อความคงทนยืนยาวมากกว่าการสะท้อนสัญญาณ\n\nเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ได้ดำเนินการสร้างพารามิเตอร์สำหรับ §Yโครงการพิเศษ(โครงการพิเศษ)§! ที่จะถอดรหัสข้อมูลที่สัญญาณนี้นำพามา"
 anomaly.3110.a:0 "การริเริ่มที่เหมาะสม"
 anomaly.3110.b:0 "พวกเราแทบไม่ได้รับประโยชน์จากการรับฟังคำพูดของคนตาย"
 anomaly.3110.c:0 "ทำลายอนุสาวรีย์นั่น ค้นหาเครื่องส่งสัญญาณซะ"
 anomaly.3111.name:0 "เครื่องส่งสัญญาณถูกบดทับ"
 anomaly.3111.desc:1 "ในคราแรกเราเชื่อว่าแท่นเสาเดียวเป็นเพียงเรือนป้องกันสำหรับเครื่องส่งสัญญาณ ทว่าพวกเราคิดผิด\n\nเครื่องส่งสัญญาณ เมื่อถูกแยกชิ้นส่วนออกมาแล้ว ปรากฏว่าไม่สามารถใช้งานได้เองอย่างอิสระ บางสิ่งในโครงสร้างภายในของเสาแท่นเดียวที่พังทลายนั้นช่วยให้มันทำงานได้ และพวกเราก็ไม่มีความหวังที่จะฟื้นฟูระบบการทำงานของมันกลับคืนมาได้อีกแล้ว"
 anomaly.3111.a:0 "น่าผิดหวังเป็นอย่างยิ่ง"
 anomaly.3112.desc:1 "แท่งหินเสาเดียวถูกถอดแยกชิ้นส่วนออกได้อย่างง่ายดายอย่างน่าประหลาดใจ แตกต่างจากสมมติฐานก่อนหน้า เครื่องส่งสัญญาณขนาดเล็กที่ใจกลางของมันได้ป้อนพลังงานให้กับโครงสร้างแร่ของแท่งเสาเดียว ทำให้เกิดการส่งสัญญาณขึ้นได้"
 anomaly.3112.a:0 "น่าสนใจ"
 anomaly.3112.b:0 "เป็นข้อมูลเก่า โชคร้ายเสียจริง"
 anomaly.3113.name:0 "สัญญาณส่งข้อมูลได้รับการถอดรหัส"
 anomaly.3113.desc:0 "เจ้าหน้าที่วิทยาศาสตร์ [From.GetLeaderName] รายงานว่าสัญญาณวิทยุที่ส่งจากเสาสัญญาณบน [From.From.GetName] ได้รับการถอดรหัสเรียบร้อยแล้ว\n\nมันเป็นข้อความรำลึก ที่แสดงความอาลัยต่อการสูญเสียชีวิตหลายร้อยชีวิตในการสู้รบเมื่อหลายพันปีก่อน พันธมิตรที่เข้มแข็งดูเหมือนจะตกเป็นเหยื่อของการทรยศและการหลอกลวง กองยานอวกาศขนาดใหญ่ได้ทำลายล้างตนเองก่อนที่ศัตรูจะเดินทางมาถึงด้วยซ้ำเนื่องจากพันธมิตรหันมาสู้รบกันเอง\n\nเห็นได้ชัดว่าซากยานที่แห้งกรังเหล่านี้ถูกทิ้งไว้ในฐานะเครื่องหมายหลุมศพที่ลอยเคว้งคว้าง ลูกเรือเสียชีวิตจากการโจมตีอย่างแม่นยำไปยังจุดอ่อนบนลำเรือ"
 anomaly.3113.a:0 "ศึกษาบันทึกเหล่านี้อย่างละเอียด" # society data on planet
 anomaly.3113.b:0 "คำนวณเส้นทางและตำแหน่งปัจจุบันของกองยานที่อับปาง"
 anomaly.3114.name:0 "โจรสลัดในปัจจุบัน"
 anomaly.3114.desc:0 "เมื่อเดินทางมาถึงระบบดาว [From.GetName] ก็ปรากฏเด่นชัดว่ายาน [Root.GetName] ล่าช้าเกินไป\n\nกองยานโจรสลัดที่ไม่ทราบต้นกำเนิดได้ค้นพบสนามรบที่กระจัดกระจายนี้เมื่อระยะเวลาหนึ่งก่อนหน้า และขโมยชิ้นส่วนต่างๆ เพื่อสร้างฐานทัพบนดาวเคราะห์น้อยข้างเคียง\n\nการค้นหาของเราสิ้นสุดลงเมื่อการปะทะกันอย่างรุนแรงดูเหมือนจะหลีกเลี่ยงไม่ได้แล้ว"
 anomaly.3115.name:0 "กองยานอวกาศที่ลอยเคว้งคว้าง"
 anomaly.3115.desc:0 "ยาน [Root.GetName] ได้ระบุตำแหน่งของซากยานอวกาศที่ลอยละล่องในระบบดาว [From.GetName] ยานหลายลำที่อ้างอิงถึงในข้อความเสาสัญญาณรำลึกได้สลายตัวกลายเป็นฝุ่นและเถ้าถ่านไปตามกาลเวลาหลายศตวรรษ ทว่ายังมีอีกไม่กี่ลำที่รักษาสภาพสมบูรณ์ไว้ได้อย่างโดดเด่น\n\nในระหว่างพวกเขาหกเรือทหาร ควรจะมีวิศวกรเพียงพอ ที่จะเรียกคืน hulk ที่ดีขึ้นในการทํางานสั่งซื้อ\n\nตรวจสอบ §Yบันทึกสถานการณ์(บันทึกระบบ)§! สำหรับรายละเอียดเพิ่มเติม"
 anomaly.3115.a:0 "น่าสนใจเป็นอย่างยิ่ง"
 anomaly.3116.name:0 "กองยานอวกาศที่ถูกยึดอำนาจควบคุม"
 anomaly.3116.desc:0 "กองทัพเรือโบราณที่กระจัดกระจายได้รับการคืนชีพกลับมาบางส่วนแล้ว แม้ว่าวิศวกรที่ส่งตัวไปปฏิบัติงานจะไม่สามารถตกลงกันได้แน่ชัดว่าความสำเร็จนี้สำเร็จขึ้นมาได้อย่างไร\n\nตัวยานได้รับการบรรจุเข้าสู่กองยาน [Root.GetSpeciesAdj]"
 anomaly.3116.a.tooltip:0 "§Yกองทัพเรือพันธมิตรโบราณ(กองทัพเรือของกลุ่มพันธมิตร)§! ได้รับการกู้คืนสภาพแล้ว"
 anomaly.3117.name:0 "กองยานอวกาศที่หันคมเขี้ยวกลับมา"
 anomaly.3117.desc:0 "กองกำลังวิศวกรรมมุ่งความสนใจไปที่ยานเดรดน็อต(อ่าน)ขนาดมหึมาก่อนเป็นลำแรก ซึ่งสัญญาณรำลึกระบุว่ามันเป็นหนึ่งในยานลำแรกๆ ที่ทรยศหันเข้าโจมตียานลำอื่นในศึกประวัติศาสตร์ครั้งนั้น\n\nซึ่งนั่นปรากฏว่าเป็นความผิดพลาด\n\nแม้จะมีความพยายามโดยเจตนาที่จะหลีกเลี่ยงระบบควบคุมระดับสูง ทว่าคอมพิวเตอร์ของยานกลับเริ่มทำงานขึ้นมาทันทีและยิงคลื่นสัญญาณความถี่สูงใส่ยานของเรา เนื่องจากไฟร์วอลล์สำหรับการต่อสู้ถูกปิดใช้งานเพื่อเพิ่มแบนด์วิดท์ระหว่างปฏิบัติการ การส่งสัญญาณคลื่นลูกสั้นได้ทำให้ยานทั้งหมดในบริเวณใกล้เคียงตกเป็นทาสของยานเดรดน็อตที่คืนชีพขึ้นมาในทันที บันทึกสุดท้ายก่อนที่สัญญาณการส่งข้อมูลจะถูกตัดทั้งหมดแสดงให้เห็นว่าระบบยังชีพทั้งหมดถูกสั่งปิดใช้งานอย่างเป็นระบบ และมีการกำหนดเส้นทางตรงไปยัง [Root.Owner.Capital.GetName]\n\nด้วยการที่คาดว่าลูกเรือของเราเสียชีวิตแล้ว และคอมพิวเตอร์การต่อสู้โบราณกำลังมุ่งเป้ามายังดาวบ้านเกิดของเรา พวกเราควรเตรียมตัวรับมือกับสถานการณ์ที่เลวร้ายที่สุดจะดีกว่า"
 anomaly.3118.name:0 "ยานเดรดน็อตถูกทำลาย ภารกิจสิ้นสุดลงโดยยานอวกาศที่เหลือได้รับการเปิดใช้งาน"
 anomaly.3118.desc:0 "ยานเดรดน็อตถูกทำลายโดยผู้อื่น ยานอวกาศที่เหลือทั้งหมดถูกทำลาย"
 anomaly.3119.name:0 "กองยานอวกาศถูกทำลายล้าง"
 anomaly.3119.desc:0 "ยานเดรดน็อตถูกทำลายโดยผู้อื่น ยานอวกาศที่เหลือทั้งหมดถูกทำลาย"
 anomaly.3120.name:0 "โจรสลัดถูกทำลายสิ้น"
 anomaly.3120.desc:1 "ภัยคุกคามได้ยุติลงแล้ว อย่างน้อยเราก็น่าจะสามารถใช้ประโยชน์จากเทคโนโลยีโบราณที่โจรสลัดปล้นไปได้บ้าง"
 anomaly.3120.a:0 "ทว่าคำถามยังคงหลงเหลืออยู่..."
 anomaly.3120.b:0 "$anomaly.3120.a$"

 # could have a pirate base built on the site, they got there first

 # Manufactory
 anomaly.3125.name:0 "โรงงานผลิตโบราณ"
 anomaly.3125.desc:0 "สถานีอวกาศในวงโคจรดูเหมือนจะเคยทำงานเป็นศูนย์สกัดและแปรรูปแร่สำหรับดาวเคราะห์น้อย ซึ่งไม่ได้แตกต่างจากดีไซน์สถานีขุดเหมืองของเราโดยสิ้นเชิง\n\nเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] คาดหวังว่าวิศวกรจำนวนหนึ่ง — ซึ่งหากจะให้ดีควรเป็น [Root.Owner.GetSpeciesNamePlural] ที่ประจำการอยู่บนยานทหารแล้ว — น่าจะสามารถฟื้นฟูสถานีให้กลับมาทำงานปกติได้"
 anomaly.3125.a:0 "พวกเราไม่มีความสนใจในเศษซากเทคโนโลยีของเอเลี่ยน"
 anomaly.3125.b:0 "เรามาฟื้นฟูสถานีขุดนี้กันเถอะ"
 anomaly.3125.c:0 "ปล่อยมันไว้ตามลำพังน่าจะดีกว่า"

 # Basic fallback
 anomaly.3126.name:0 "โรงงานผลิตโบราณ: สถานีขุดเหมืองแห่งใหม่"
 anomaly.3126.desc:0 "กองกำลังวิศวกรรมเสร็จสิ้นภารกิจของพวกเขา โดยปรับปรุงสถานีขุดเหมืองที่ทรุดโทรมด้วยชิ้นส่วนและกลไกควบคุมที่ดัดแปลงจาก [Root.Owner.GetSpeciesAdj]"

 # Various one-time effects
 anomaly.3127.name:0 "โรงงานผลิตโบราณ"
 anomaly.3127.desc.1:0 "$anomaly.3126.desc$\n\nดูเหมือนว่าเดิมทีโรงงานผลิตถูกสร้างขึ้นเพื่อการขุดและกลั่นหินเบธาเรียน(หินเบตาเรีย) —ซึ่งความสามารถนี้ได้รับการฟื้นฟูกลับคืนมาเรียบร้อยแล้ว"
 anomaly.3127.desc.2:0 "$anomaly.3126.desc$\n\nยังคงมีแง่มุมบางประการเกี่ยวกับการทำงานดั้งเดิมของสถานีที่ไม่ชัดเจนแก่เราทั้งหมด ดูเหมือนว่าเดิมทีโรงงานผลิตถูกออกแบบมาเพื่อการขุดและกลั่นบางสิ่งที่แตกต่างจากแร่การผลิตที่เราสนใจ สิ่งนี้น่าจะนำไปสู่การสืบสวนเพิ่มเติมต่อไป"
 anomaly.3127.desc.3:0 "$anomaly.3126.desc$\n\nพวกเราได้รับรายงานเกี่ยวกับการกู้คืนสสารที่ไม่ทราบชื่อจากห้องแปรรูปของโรงงานผลิต — มีความเป็นไปได้ว่าในอดีตสถานีเคยขุดและกลั่นบางอย่างที่แตกต่างออกไปจากแร่ธาตุทั่วไปที่เราสนใจ"
 anomaly.3127.a.1:0 "ยอดเยี่ยมยิ่งนัก"
 anomaly.3127.a.2:0 "มีสิ่งต่างๆ มากมายที่เราสามารถเรียนรู้ได้"
 anomaly.3127.a.3:0 "น่าสนใจ..."

 # Drones emerge
 anomaly.3128.name:0 "โรงงานผลิตโบราณ: โดรนเริ่มทำงาน"
 anomaly.3128.desc:0 "ความพยายามและการกระตุ้นของวิศวกร [Root.Owner.GetSpeciesName] ล้มเหลวไร้ผล สถานีดังกล่าวชำรุดทรุดโทรมเกินกว่าจะนำระบบออนไลน์ได้ โครงสร้างส่วนใหญ่พังทลายลงมาง่ายๆ ภายใต้แรงเค้นของความพยายามเปิดใช้งานระบบใหม่\n\nเมื่อความทนทานเชิงโครงสร้างของโรงงานล้มเหลวลงในที่สุด บางสิ่ง หรือบางอย่าง ก็โผล่ออกมาจากระดับความลึกด้านล่าง — พวกมันใช้เลเซอร์พลังงานสูงตัดผ่าทางออกมาและพุ่งเป้าสายตาตรงไปที่ [Root.GetFleetName]"

 # Crystals emerge
 anomaly.3129.name:0 "โรงงานผลิตโบราณ: รังถูกรบกวน"
 anomaly.3129.desc:0 "เมื่อเครื่องปั่นหินเก่าหมุนทำงานขึ้น บางสิ่งก็ทะลักออกมา\n\nมันห่างไกลจากแร่ธาตุขัดเงาที่คาดหวัง ขอบคริสตัลที่แหลมคมได้ฉีกทึ้งสถานีอวกาศที่ผุกร่อนจนเป็นชิ้นๆ ก่อนจะหันมาสนใจความเคลื่อนไหวของ [Root.GetFleetName]"
 anomaly.3129.a.tooltip:0 "โรงงานผลิตโบราณถูกทำลายลงแล้ว\n[Root.GetFleetName] กำลังอยู่ภายใต้การโจมตี!"

 anomaly.3130.name:2 "การโต้วาทีและการอภิปราย"
 anomaly.3130.desc:2 "เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] รายงานว่า [From.GetPlanetMoon] [From.GetName] เคยเป็นบ้านของอารยธรรมที่ก้าวหน้าในระดับหนึ่ง ทว่าพวกเขาได้นำมาซึ่งจุดจบของตนเองก่อนที่จะหลบหนีความจริงบนดวงจันทร์นี้ได้ จากการวิเคราะห์ชิ้นส่วนเล็กๆ น้อยๆ ที่กู้มาจากคลังข้อมูลไร้สายโบราณบนพื้นผิว ลูกเรือของยาน [Root.GetName] ได้ประกอบเรื่องราวของความล่มสลายของอารยธรรมนี้เข้าด้วยกัน\n\nในช่วงเวลาหนึ่งในอดีตอันไกลโพ้น เกิดความแตกแยกทางความคิดเกี่ยวกับคำนิยามของปรัชญาที่เราในปัจจุบันรู้จักกันในนาม ลัทธิสะสมนิยม(ความทรงจํา)และลัทธิปัจเจกนิยม(ภาษาโปรตุเกส)แม้ว่าความเกี่ยวข้องของปรัชญาเหล่านี้จะน่าเคลือบแคลงสงสัยอย่างยิ่งสำหรับประชากรของ [Root.Owner.GetName] ทว่าอารยธรรมนี้เห็นได้ชัดว่าทำลายล้างตนเองจากคำถามว่าควรระลึกท่าทีทางศีลธรรมใดให้แก่ลัทธิใด"
 anomaly.3130.desc.colle:2 "เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] รายงานว่า [From.GetPlanetMoon] [From.GetName] เคยเป็นบ้านของอารยธรรมที่ก้าวหน้าในระดับหนึ่ง ทว่าพวกเขาได้นำมาซึ่งจุดจบของตนเองก่อนที่จะหลบหนีความจริงบนดวงจันทร์นี้ได้ จากการวิเคราะห์ชิ้นส่วนเล็กๆ น้อยๆ ที่กู้มาจากคลังข้อมูลไร้สายโบราณบนพื้นผิว ลูกเรือของยาน [Root.GetName] ได้ประกอบเรื่องราวของความล่มสลายของอารยธรรมนี้เข้าด้วยกัน\n\nในช่วงเวลาหนึ่งในอดีตอันไกลโพ้น เกิดความแตกแยกทางความคิดเกี่ยวกับคำนิยามของปรัชญาที่เราในปัจจุบันรู้จักกันในนาม ลัทธิสะสมนิยม(ความทรงจํา)และลัทธิปัจเจกนิยม(ภาษาโปรตุเกส)แม้ว่าธรรมชาติของลัทธิสะสมนิยมจะเด่นชัดแจ้งแก่ใจอย่างยิ่งสำหรับชาว [Root.Owner.GetSpeciesNamePlural] ทว่าอารยธรรมนี้เห็นได้ชัดว่าทำลายล้างตนเองจากคำถามว่าควรระลึกท่าทีทางศีลธรรมใดให้แก่ลัทธิใด"
 anomaly.3130.desc.mater:2 "เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] รายงานว่า [From.GetPlanetMoon] [From.GetName] เคยเป็นบ้านของอารยธรรมที่ก้าวหน้าในระดับหนึ่ง ทว่าพวกเขาได้นำมาซึ่งจุดจบของตนเองก่อนที่จะหลบหนีความจริงบนดวงจันทร์นี้ได้ จากการวิเคราะห์ชิ้นส่วนเล็กๆ น้อยๆ ที่กู้มาจากคลังข้อมูลไร้สายโบราณบนพื้นผิว ลูกเรือของยาน [Root.GetName] ได้ประกอบเรื่องราวของความล่มสลายของอารยธรรมนี้เข้าด้วยกัน\n\nในช่วงเวลาหนึ่งในอดีตอันไกลโพ้น เกิดความแตกแยกทางความคิดเกี่ยวกับคำนิยามของปรัชญาที่เราในปัจจุบันรู้จักกันในนาม ลัทธิสะสมนิยม(ความทรงจํา)และลัทธิปัจเจกนิยม(ภาษาโปรตุเกส)แม้ว่าธรรมชาติของลัทธิปัจเจกนิยมจะเด่นชัดแจ้งแก่ใจอย่างยิ่งสำหรับผู้คนในจักรวรรดิ [Root.Owner.GetName] ทว่าอารยธรรมนี้เห็นได้ชัดว่าทำลายล้างตนเองจากคำถามว่าควรระลึกท่าทีทางศีลธรรมใดให้แก่ลัทธิใด"
 anomaly.3130.a:2 "นี่มันเป็นสิ่งที่น่าสะพรึงกลัวจริงๆ"
 anomaly.3130.b:2 "นั่นไม่ใช่แม้แต่จริยธรรมที่แท้จริงด้วยซ้ำ..."
 anomaly.3135.name:0 "อยู่ในความสงบ"
 anomaly.3135.desc:0 "หลังจากกลับมาจากพื้นผิวที่แห้งแล้งของ [From.GetName] เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ได้นำแผ่นใยพืชถักกลับมาด้วย ต้นกำเนิดและจุดประสงค์ที่แท้จริงของมันยังไม่มีใครทราบ ทว่ามันพิสูจน์แล้วว่ามีความสามารถในการดูดซับได้ดีในการทดลอง แม้จะไม่มีประโยชน์ทางวิทยาศาสตร์ แต่ [Root.GetLeaderName] กลับชื่นชอบมันและพกมันติดตัวไปทุกที่ที่ไป\n\n"เจ้าหน้าที่ [Root.GetLeaderName] เป็นคนคูลๆ จริงๆ" ลูกเรือต่างกระซิบกระซาบกัน"
 anomaly.3135.a:0 "คำนั้นมันหมายความว่าอะไรกันแน่?"
 anomaly.3135.a.tooltip:0 "[Root.GetLeaderName] ได้รับผ้าเช็ดตัว 1 ผืน"

