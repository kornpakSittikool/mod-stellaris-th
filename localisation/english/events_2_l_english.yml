 HBL_LUSH_PLANET_1_CAT:0 "ดาวเคราะห์อันอุดมสมบูรณ์"
 HBL_LUSH_PLANET_1_DESC:1 "[Root.GetName] มีสีเขียวขจีเป็นพิเศษ และผลสแกนเบื้องต้นบ่งชี้ว่าอาจมีสิ่งของที่น่าสนใจหลายอย่างบนพื้นผิว"
 UHB_ANCIENT_RUINS_1_CAT:0 "แท่งหินใหญ่เสาเดียว"
