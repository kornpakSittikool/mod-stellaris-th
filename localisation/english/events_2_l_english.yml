 fallen_machine_empire_unhappy_tooltip:0 "ทาง §H[FallenEmpireTaskOrigin.GetName]§! อาจมีการตอบสนองในเชิงลบหากเราปฏิเสธ"
 fallen_machine_empire_happy_task_tooltip:0 "ทาง §H[FallenEmpireTaskOrigin.GetName]§! อาจมีการตอบสนองในเชิงบวกหากเราประสบความสำเร็จ"
 fallen_machine_empire_unhappy_task_tooltip:0 "ทาง §H[FallenEmpireTaskOrigin.GetName]§! อาจมีการตอบสนองในเชิงลบหากเราประสบความล้มเหลว"
