 AST_SHRINE_1_CAT:0 "ดาวเคราะห์น้อยที่ถูกแกะสลัก"
 AST_SHRINE_1_DESC:0 "[Root.GetName] ถูกเจาะให้กลวงบางส่วนและแกะสลักด้วยความแม่นยำอันวิจิตร มีบางอย่างที่คุ้นเคยเกี่ยวกับเส้นสายและส่วนโค้งที่จารึกไว้ในหิน..."
 HBL_MUSIC_1_CAT:0 "เสียงฮัมในยามราตรี"
