 uplift.7200.name:0 "มองเข้าหาตัวเอง"
 uplift.7200.desc:0 "กลุ่มพลเมือง [From.From.From.GetName] ที่มีความสำคัญทางสถิติดูเหมือนจะไม่พอใจกับคำสั่งสอนของเราเกี่ยวกับธรรมชาติของจักรวาล\n\nมีบุคคลหรือกลุ่มที่ไม่เปิดเผยชื่อในหมู่พวกเขาทำหน้าที่เผยแพร่ตำราปลอมบางเล่มที่เน้นย้ำถึงความสำคัญของตัว [From.From.From.GetName] เองและการได้รับเลือกให้ยกระดับสติปัญญาโดย [Root.Owner.GetName]"
 uplift.7200.a:0 "จะไม่มีสิ่งใดเกิดขึ้นจากเรื่องนี้"
 uplift.7200.b:0 "ให้พวกเขามีความลึกลับของพวกตนไปเถิด"
 uplift.7200.b.tooltip:0 "[From.From.From.GetName] มีจริยธรรม §Yจิตวิญญาณนิยม§!"
 uplift.7200.c:0 "ปรับทัศนคติของพวกเขาให้ถูกต้องด้วยวิธีใดก็ตามที่จำเป็น"
 uplift.7200.c.tooltip:0 "[From.From.From.GetName] มีจริยธรรม §Yวัตถุนิยม§!"
 uplift.7205.name:0 "ผู้คัดค้านโดยมโนธรรม"
 uplift.7205.desc:0 "มีประเด็นปัญหาเกิดขึ้นบน [Root.GetName] อันเป็นผลมาจากความรังเกียจอาวุธสงครามของประชากร [From.From.From.GetName] ผู้แทนได้ทำเรื่องร้องขอเขตปลอดทหารที่กำหนดเส้นแบ่งชัดเจนอย่างเป็นทางการ"
 uplift.7205.a:0 "ตกลงตามนั้น"
 uplift.7205.b:0 "ความกล้าหาญในความเชื่อมั่นของพวกเขาควรได้รับการเชิดชู"
 uplift.7205.b.tooltip:0 "[From.From.From.GetName] มีจริยธรรม §Yรักสันติ§!"
 uplift.7205.c:0 "พวกเขาต้องเรียนรู้ว่าเงามืดแห่งสงครามกำลังแผ่คลุมพวกเราทุกคน"
 uplift.7205.c.tooltip:0 "[From.From.From.GetName] มีจริยธรรม §Yชอบสงคราม§!"
 uplift.7210.name:0 "อันตรายจากคนแปลกหน้า"
 uplift.7210.desc:0 "ตามรายงานระบุว่า พลเมือง [From.From.From.GetName] ที่เพิ่งได้รับการยกระดับพัฒนาการบน [Root.GetName] เริ่มมีความกังวลเนื่องจากครูฝึก [Root.Owner.GetSpeciesName] หยิบยกความเป็นไปได้ในการติดต่อกับตัวตนที่ยังไม่เป็นที่รู้จักจากห้วงอวกาศลึก"
 uplift.7210.a:0 "อย่างนี้นี่เอง..."
 uplift.7210.b:0 "สิ่งที่แปลกแยกสำหรับเรา แท้จริงคือโอกาสในร่างแปลงเท่านั้น"
 uplift.7210.b.tooltip:0 "[From.From.From.GetName] มีจริยธรรม §Yชอบต่างดาว§!"
 uplift.7210.c:0 "พวกเขาทำถูกแล้วที่หวาดกลัวต่อสิ่งที่ไม่รู้จัก"
 uplift.7210.c.tooltip:0 "[From.From.From.GetName] มีจริยธรรม §Yเกลียดต่างดาว§!"
 uplift.7215.name:0 "การสลายตัวของครอบครัว"
 uplift.7215.desc:0 "แม้ว่า [Root.Owner.GetName] จะให้โครงสร้างที่มั่นคงในการเลียนแบบระเบียบสังคมภายใน แต่มันอาจไม่ใช่สิ่งที่เหมาะสมที่สุดสำหรับ [From.From.From.GetName] ที่เพิ่งยกระดับพัฒนาการขึ้นมา\n\nการเพิ่มขึ้นของสติปัญญาอย่างรวดเร็วจนเทียบเท่าพวกเราทำให้พวกเขาขาดช่วงเวลาการพัฒนาทางสังคมและวัฒนธรรมที่เป็นไปได้ยาวนานหลายพันปี บางทีเป็นผลมาจากเรื่องนี้ โครงสร้างสังคมของ [From.From.From.GetName] จึงอยู่ในสภาวะที่มีการเปลี่ยนแปลงอย่างรุนแรง วันหนึ่งสถาบันครอบครัวมีความสำคัญที่สุด แต่อีกวันหนึ่งผู้นำชุมชนกลับเรียกร้องให้ยกเลิกพันธนาการแบบแคลนทั้งหมด"
 uplift.7215.a:0 "น่าสนใจ"
 uplift.7215.b:0 "ขอให้ [From.From.From.GetName] ค้นพบตนเองในการช่วยเหลือซึ่งกันและกัน"
 uplift.7215.b.tooltip:1 "[From.From.From.GetName] มีจริยธรรม §Yอำนาจเผด็จการ§!"
 uplift.7215.c:0 "การตระหนักรู้ในตนเองเกิดขึ้นได้ด้วยความเป็นอิสระเท่านั้น"
 uplift.7215.c.tooltip:1 "[From.From.From.GetName] มีจริยธรรม §Yความเสมอภาค§!"

