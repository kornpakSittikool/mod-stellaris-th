 fallen_empires_tasks.2.b:0 "เราไม่ต้องการความเอื้อเฟื้อเผื่อแผ่ของ [FallenEmpireTaskOrigin.GetSpeciesName]!"
 fallen_empires_tasks.2.escorts_tooltip:0 "ได้รับยานระดับ §Yเอสคอร์ต(Escort-คลาส)§! จำนวน 3 ลำ"
 fallen_empires_tasks.2.battlecruiser_tooltip:0 "ได้รับยานระดับ §Yแบทเทิลครูเซอร์(Battlecruser)คลาส)§! จำนวน 1 ลำ"
 fallen_empires_tasks.4.name:0 "การติดต่อจาก §H[FallenEmpireTaskOrigin.GetName]§!"
 fallen_empires_tasks.4.desc:0 "ยินดีต้อนรับ [Root.GetSpeciesNamePlural]! ดังที่คุณทราบดีอยู่แล้วว่า พวกเรา §H[FallenEmpireTaskOrigin.GetSpeciesName]§! ผู้อุทิศตนให้กับการศึกษาและการอนุรักษ์สิ่งมีชีวิตทุกรูปแบบในกาแล็กซี เราได้ศึกษาเผ่าพันธุ์ของคุณและพิจารณาแล้วว่า [Root.GetName] ไม่น่าจะอยู่รอดได้เกินสองสามศตวรรษอย่างมากที่สุด เพื่อรับประกันการดำรงอยู่ต่อไปของเผ่าพันธุ์ [Root.GetSpeciesName] หากมีสิ่งเลวร้ายที่สุดเกิดขึ้นกับจักรวรรดิของคุณ เราปรารถนาที่จะขอรับประชากรส่วนหนึ่งของคุณเพื่อไปอยู่ใน §Hเขตอนุรักษ์พันธุ์สัตว์ใกล้สูญพันธุ์(อันตราย)เผ่าพันธุ์เก็บรักษา)§! ของเรา เราจะสร้างพื้นที่สงวนพิเศษที่สะท้อนถิ่นที่อยู่ตามธรรมชาติของเผ่าพันธุ์คุณได้อย่างสมบูรณ์แบบ และประชากรเหล่านี้จะได้รับการดูแลและคุ้มครองจากอันตรายทั้งปวงอย่างดีที่สุด ดังนั้นคุณจึงไม่จำเป็นต้องกังวลแทนพวกเขาเลย\n\nแล้วคุณคิดเห็นเช่นไร? คุณจะร่วมสนับสนุนเขตอนุรักษ์ของเราและปกป้องอนาคตของเผ่าพันธุ์คุณหรือไม่?"
