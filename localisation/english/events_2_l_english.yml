 BARR_BASE_CAT:0 "บนที่ราบรกร้าง"
 BARR_BASE_DESC:0 "การสแกนพื้นผิวดาวเคราะห์อย่างรวดเร็วเผยให้เห็นสัญญาณที่อ่อนกำลังกะพริบส่งออกไปในความมืดมิดของอวกาศ"
 PROJ_MOON_CAT:0 "การฉายภาพ"
 PROJ_MOON_DESC:0 "จากผลสแกนเบื้องต้น [Root.GetName] แสดงคุณสมบัติแปลกๆ หลายประการ และให้ค่าสแกนที่ไม่สอดคล้องกันกับสิ่งที่คาดหวังจากดาวเคราะห์ประเภทนี้เลย..."
 SEA_CAT:0 "คาไลโดสโคปิก"
 SEA_DESC:0 "รูปทรงที่เลือนรางม้วนตัวไปตามกระแสน้ำในมหาสมุทรอันกว้างใหญ่ของ [Root.GetName]"
 MOLTEN_BASE_CAT:0 "จังหวะอันเร่าร้อน"
 MOLTEN_BASE_DESC:0 "เซนเซอร์ตรวจพบการเคลื่อนไหวที่เป็นจังหวะบนพื้นผิวที่นรกขุมอเวจีของ [Root.GetName]"
 LEVELED_CAT:0 "ถูกบดทับราบเรียบ"
 LEVELED_DESC:0 "ดูเหมือนว่า [Root.GetName] จะแสดงลักษณะทางธรณีวิทยาที่น่าสนใจเพียงอย่างเดียวเท่านั้น..."
 DIMENSIONAL_POCKET_CAT:0 "ความแปรปรวนของมิติ"
