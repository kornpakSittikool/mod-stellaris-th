 FROZ_BASE2_CAT:0 "ที่ราบน้ำแข็ง"
 FROZ_BASE2_DESC:0 "เซนเซอร์ตรวจพบกิจกรรมที่ไม่คาดคิดจากจุดที่แยกตัวโดดเดี่ยวบนพื้นผิวอาร์กติกของ [Root.GetName]"
 TROP_PETS_CAT:0 "การวิ่งพล่าน"
