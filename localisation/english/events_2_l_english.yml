#  nomad.6.name:0 "Unusual encounter in [From.From.From.GetName]"
#  nomad.6.desc:1 "We have encountered some form of alien vessels in the §Y[From.From.From.GetName]§! system! These strange objects have been flagged as [from.GetAdj] but we have been unable to pick up any of their communications, making it impossible to translate their language.\n\nWe will just have to wait and see what comes next..."
 nomad.9.desc:0 "ผู้เร่ร่อนแห่งกาแล็กซีบนกองเรือการ แสวง หา น้ําได้ส่งข้อความอำลามาถึงพวกเรา พวกเขากำลังเดินทางออกจากกาแล็กซีของเราทางขอบด้านนอกและมุ่งหน้าไปยังจุดหมายต่อไป พวกเขาจะไปสิ้นสุดลงที่ใด? พวกเขาจะพบในสิ่งที่พวกเขากำลังตามหาอยู่หรือไม่?"
 nomad.9.a:0 "ชวนให้สงสัยเหลือเกิน..."
 nomad.9.a.phobe:0 "โชคดีนะ"
 nomad.9.c.phile:0 "ขอให้เดินทางปลอดภัย"
 nomad.10.name:0 "ผู้เร่ร่อนแห่งกาแล็กซี"
 nomad.10.desc:0 "ขอให้มีวันที่เย็นสบายและค่ำคืนที่อบอุ่น [Root.GetAdj] [Root.GetRulerTitle] พวกเราคือ [contact_speaker_leader.GetName] ข้าขอพูดในนามของดวงวิญญาณชาวนามารี(นามาเรี่ยน)ทั้งหมดบนยานที่รวบรวมของการ แสวง หา น้ํากองเรือเร่ร่อนของเรา\n\nท่านไม่มีอะไรต้องกลัวจากเรา เนื่องจากกองเรือไม่มีความสนใจในเรื่องกิจการของดาวดวงใด เราขอเพียงแค่ให้ท่านเคารพความเป็นอิสระของเราและไม่ขัดขวางการเดินทางของเรา"
 nomad.21.desc:0 "ยินดีที่ได้พบอีกครั้ง [Root.GetAdj] [Root.GetRulerTitle] พวกเรามีข้อเสนอจะขอร้องคุณ ในขณะที่เราเดินทางผ่านความว่างเปล่า ประชาชนของเราบางส่วนเริ่มอ่อนล้าและหมดความหวังกับเป้าหมายของเรา พวกเราไม่ใช่เผ่าพันธุ์ทรราช เราไม่เคยบังคับให้ใครต้องร่วมเดินทางไปจนถึงปลายทาง ดังนั้นเราขอถามคุณ: คุณจะยอมรับประชาชนของเราบางส่วนเข้าไปอยู่อาศัยบนดวงดาวที่เป็นของคุณ ดวงที่ชื่อว่า [NomadMissionPlanet.GetName] หรือไม่?"
 nomad.21.a:0 "เรายินดีต้อนรับพวกเขาเข้ามา"
 nomad.21.a.tooltip:1 "§H[NomadMissionPlanet.GetName]§!:\n§G+300§! £pop£ §Hประชากรโนแมด§!"
 nomad.21.a.response:0 "เราขอขอบคุณ [Root.GetSpeciesAdj] ขอให้ผู้คนของเราพบในสิ่งที่พวกเขากำลังค้นหา ร่วมกับผู้คนของคุณ"
 nomad.21.b:0 "เราไม่สามารถรับรองพวกเขาได้"
 nomad.21.b.response:0 "นั่นเป็นเรื่องโชคร้ายจริงๆ [Root.GetSpeciesAdj] หวังว่าผู้ที่เหนื่อยล้าจะอดทนต่อไปได้อีกสักระยะ พวกเราจะไปตามทางของเราต่อ"
 nomad.21.c:0 "ทำไมพวกเขาถึงมีความขัดข้องใจกัน?"
 nomad.21.c.response:0 "การเดินทางของกองเรือนั้นยาวนานมาก และมันไม่น่าจะสิ้นสุดลงในช่วงชีวิตของเรา ผู้มีความไม่พอใจในหมู่พวกเราต้องการจุดมุ่งหมายอื่นในชีวิตนอกเหนือจากการค้นหาดวงดาวเพื่อเป้าหมายของเรา"
 nomad.21.d:0 "พวกเขาจะปรับตัวเข้ากับสังคมของเราอย่างไร?"
 nomad.21.d.response:1 "พวกเขาเป็นกลุ่มคนที่มีแนวคิดเลื่อมใสทางจิตวิญญาณและนิยมความเท่าเทียม การที่สิ่งเหล่านั้นจะเข้ากันได้ดีกับเผ่าของคุณอย่างไรนั้นเป็นสิ่งที่คุณต้องพิจารณาเอง"
 nomad.30.name:0 "กองเรือเร่ร่อนแห่งกาแล็กซี"
 nomad.30.desc_01:0 "ขอให้มีวันที่เย็นสบายและค่ำคืนที่อบอุ่นแก่คุณ [Root.GetAdj] [Root.GetRulerTitle]"
 nomad.30.desc_02:0 "สายลมอันรื่นรมย์จงสถิตกับท่าน [Root.GetAdj] [Root.GetRulerTitle] เราหวังว่าท่านกำลังมีความสุขดี"
 nomad.30.desc_03:0 "ท่านต้องการสิ่งใด [Root.GetSpeciesAdj]?"
 nomad.30.a:0 "บอกเราเพิ่มเติมเกี่ยวกับผู้คนของคุณหน่อยสิ"
 nomad.30.a.response:0 "ดังที่เราได้กล่าวไปในการเจรจาแนะนำตัว พวกเราคือผู้คนแห่งกองเรือการ แสวง หา น้ําเราได้เดินทางข้ามดวงดาวและความว่างเปล่าระหว่างนั้นมาหลายชั่วอายุคน และจะยังคงทำเช่นนั้นต่อไปอีกหลายรุ่น\n\nกองเรือเป็นแหล่งรวบรวมของแต่ละคนซึ่งทุกคนจำเป็นต้องทำอย่างเต็มความสามารถเพื่อขับเคลื่อนความก้าวหน้าของเรา บางส่วนปรารถนาที่จะออกจากกองเรือและตั้งถิ่นฐานชีวิตใหม่บนดวงดาว แต่ส่วนใหญ่อยากจะดูว่ามีสิ่งใดอยู่เบื้องหลังความว่างเปล่าครั้งหน้า"
 nomad.30.b:0 "พวกคุณกำลังมุ่งหน้าไปที่ไหน?"
 nomad.30.b.response_trust:0 "ในฐานะพันธมิตรที่ได้รับความไว้วางใจจากการ แสวง หา น้ําเผ่า [Root.GetSpeciesAdj] เราจะบอกสิ่งนี้แก่ท่าน:\n\nกองเรือกำลังทำภารกิจอันยิ่งใหญ่ บรรพบุรุษของเราจำใจต้องละทิ้งดาวเคราะห์บ้านเกิดไว้เบื้องหลังและกางใบเรือล่องออกสู่อวกาศอันมืดมิด พวกเขาหวังให้เราค้นหาจุดมุ่งหมายของผู้คน และในวันนี้เรามีชีวิตอยู่ด้วยความหวังนั้น ผ่านพ้นไปนับพันปีนับตั้งแต่พวกท่านเดินจากเนินทรายของบ้านมาเป็นครั้งแรก\n\nนั่นคือสิ่งเดียวที่เรากล้าแบ่งปัน ขอให้มันนำพาความร่มเย็นมาสู่ท่าน"
 nomad.30.b.response:0 "พวกเราอยู่ระหว่างการเดินทางล่องไปตามกระแสน้ำแห่งความว่างเปล่าอันหลากหลาย แม้จะผ่านมานับพันปีแล้ว ทว่าเราก็ยังกางใบเรือแล่นต่อไป ปลายทางที่เราแสวงหาคือมหาสมุทรแห่งจักรวาล มันอาจจะฟังดูเป็นปริศนา แต่อย่างน้อยนี่ก็สรุปข้อมูลทั้งหมดที่เรากล้าจะเปิดเผยแล้ว ขอให้มันนำความร่มเย็นมาสู่ท่าน"
 nomad.30.b.response_no_trust:0 "เราขอไม่กล่าวถึงเรื่องนี้ดีกว่า [Root.GetSpeciesAdj] มีเรื่องอื่นใดอีกหรือไม่?"
 nomad.30.c:0 "ลาก่อน"
 nomad.30.c.response:0 "ขอให้สายลมเป็นใจแก่ท่าน [Root.GetSpeciesAdj]"
 nomad.41.desc:1 "สายลมอันรื่นรมย์แก่ท่าน [Root.GetAdj] [Root.GetRulerTitle] เราพบว่าดวงดาวที่คุณเรียกว่า §Y[NomadMissionPlanet.GetName]§! ปัจจุบันไม่ได้ถูกครอบครองโดยผู้คนของคุณ เราจึงใคร่ขอร้องจากคุณ: คุณจะยอมอนุญาตให้หนึ่งในเผ่าของเราลงจอดและสถาปนาให้เป็นบ้านใหม่ได้หรือไม่?\n\nเราเข้าใจดีว่าเรากำลังขอร้องในสิ่งที่ยิ่งใหญ่ - การสูญเสียสิทธิ์ควบคุมของทั้งระบบเพื่อมอบบ้านให้แก่ผู้คนของเรา เราจะรอคอยการตัดสินใจของคุณ ไม่ว่าผลลัพธ์จะเป็นเช่นไรก็ตาม"
 nomad.41.a:1 "ระบบดาวดวงนี้ และ "ดวงดาว" นั้นเป็นของคุณแล้ว"
 nomad.41.a.tooltip:2 "คุณจะ §Rยอมสละสิทธิ์ควบคุม§! ของระบบดาว §H[NomadMissionPlanet.GetStarName]§!\n\nสร้างจักรวรรดิ §Yภาษานามิเบีย§! ใหม่พร้อมประชากร §Bขนาดขนาดขนาด 1.5K£pop£ป๊อป§! บนดาว §H[NomadMissionPlanet.GetName]§!\n\nความสัมพันธ์ของคุณกับ §Y[nomad_fleet_country.GetName]§! และจักรวรรดิ §Yภาษานามิเบีย§! จะ §Gพัฒนาขึ้น§!\n\n"
 nomad.41.b.tooltip:0 "ความสัมพันธ์ของคุณกับ §Y[nomad_fleet_country.GetName]§! จะ §Rแย่ลง§!\n\n"
 nomad.41.a.response:0 "เราขอขอบคุณผู้คนของคุณสำหรับความเมตตา กาแล็กซีนี้เป็นสถานที่อันหนาวเหน็บ ทว่าในวันนี้การกระทำอันงดงามนี้จะส่งระลอกคลื่นแห่งความดีงามแผ่ขยายออกไป พวกเราแห่งกองเรือเร่ร่อนขออวยพรให้ทั้งท่านและจักรวรรดิใหม่นี้โชคดีในทุกประการ"
 nomad.41.b:0 "เราไม่สามารถยินยอมตามคำขอข้อนี้ได้"
 nomad.41.b.phobe:0 ""ดาวเคราะห์" ดวงนี้เป็นของเรา"
 nomad.41.b.spirit:0 "ไม่ มันเป็นสิทธิ์โดยชอบธรรมตามประสงค์อันศักดิ์สิทธิ์ของเรา"
 nomad.41.b.response:0 "นั่นเป็นเรื่องโชคร้ายสำหรับผู้คนของเรา [Root.GetSpeciesAdj] เราทำได้เพียงแค่หวังว่าพวกเขาจะพบสิ่งที่ตามหาที่แหล่งน้ำแห่งถัดไป แทนที่จะเป็นสายลมร้อนที่แผดเผา ขอจบการสื่อสารเพียงเท่านี้"
 nomad.41.c:0 "ทำไมดวงดาวนี้ถึงมีความน่าสนใจสำหรับคุณ?"
 nomad.41.c.response:0 "การแล่นเรือผ่านความว่างเปล่าเป็นความยากลำบากอย่างยิ่ง และถึงกระนั้นมันก็เป็นเพียงขั้นตอนเดียวบนเส้นทางอันแสนเหน็ดเหนื่อย ผู้คนของเราเพียงต้องการพักผ่อน และคิดว่า §Y[NomadMissionPlanet.GetName]§! ตอบโจทย์ความต้องการเหล่านั้นแล้ว\n\nท่านจะยอมให้พวกเขาได้พักผ่อนหรือไม่ [Root.GetAdj] [Root.GetRulerTitle]?"
 nomad.100.name:0 "การส่งสัญญาณด่วนที่สุด"
 nomad.100.desc:0 "ขอให้มีแสงแดดที่แผดเผาและความแห้งแล้งสถิตกับเจ้า [Root.GetSpeciesAdj] กองเรือการ แสวง หา น้ําจะไม่มีวันคบค้าสมาคมกับพวกเจ้าอีกเป็นอันขาด"
 nomad.105.name:0 "คำประกาศความเกลียดชัง"
 nomad.105.desc:0 "เจ้าจะได้ประจักษ์ถึงความพิโรธของกระแสน้ำคลั่ง(เสียงน้ํา)แน่ [Root.GetSpeciesAdj]!"
 nomad.110.name:0 "การส่งสัญญาณขอความช่วยเหลือ"
 nomad.110.desc:0 "เรามาหาท่านพร้อมกับคำขอด่วนที่สุด [Root.GetAdj] [Root.GetRulerTitle] กองเรือกำลังถูกโจมตีโดย [attacker_country.GetName] และเราต้องการความช่วยเหลือจากท่านอย่างเร่งด่วน!"
 nomad.110.a:0 "พวกเราจะช่วยพวกท่านเอง"
 nomad.110.a.reply:0 "กองเรือรู้สึกซาบซึ้งใจยิ่ง โปรดเร่งรีบเถอะ!"
 nomad.110.b:0 "น่าเสียดายที่เราไม่สามารถเข้าไปแทรกแซงได้"
 nomad.110.b.reply:0 "... ขอความแห้งแล้งจงเกิดกับดวงดาวและลูกหลานของพวกเจ้า [Root.GetSpeciesAdj] ขอจบการสื่อสารเพียงเท่านี้"
 nomad.110.c:0 "เราจะไม่ช่วยพวกเจ้า"
 nomad.500.title:0 "ข้อเสนอการแลกเปลี่ยนจากผู้เร่ร่อน"
 nomad.500.desc:0 "ยินดีที่ได้พบอีกครั้ง [Root.GetRulerTitle] แห่งโอเอซิส การเดินเรือผ่านดวงดาวในละแวกใกล้เคียงทำให้เราสามารถเก็บกู้ขยะอวกาศได้ผลผลิตที่คุ้มค่า และบัดนี้เราเพิ่งดำเนินการต่อสร้างยานรบเสร็จสิ้น\n\nในความเป็นจริงแล้ว เราสร้างพวกมันมากเกินความจำเป็นเพื่อเป็นการกำจัดทรัพยากรส่วนเกินออกไป เราชอบที่จะให้คาราวานคงความคล่องตัวและไม่รับภาระหนักเกินไป ดังนั้นเราจึงมาหาท่านพร้อมกับธุรกรรมบางอย่างในใจ"
 nomad.500.a:0 "คาราวานงั้นรึ?"
 nomad.500.a.reply:0 "ยานขนาดใหญ่อาร์กชิป(เรือราง)ของกองเรือของเรา เป็นที่ซึ่งเราใช้ประกอบสิ่งประดิษฐ์และที่หลับนอนของนักสร้าง การบังคับควบคุมคาราวานผ่านห้วงความว่างเปล่าอันกว้างใหญ่นั้นจำเป็นต้องมีพื้นที่อยู่อาศัยที่เพียงพอ จึงมีความจำเป็นต้องลดน้ำหนักส่วนเกินลง\n\nหากกองกำลังทหารเปรียบเสมือนมือของกองเรือ คาราวานก็คือหัวใจของมัน"
 nomad.500.b:0 "ธุรกรรมที่ว่าคืออะไร?"
 nomad.500.c:0 "ว่ามาเลย"
 nomad.505.desc:1 "นี่คือข้อเสนอของเรา เรามีความต้องการพลังงาน(บัตรเครดิต)และแร่ธาตุ(เสียงระเบิด)สำหรับการเดินทางข้ามครั้งต่อไป ในการแลกเปลี่ยน คุณจะได้รับมอบยานที่สร้างขึ้นใหม่ของเราจำนวน §Y5§! ลำ"
 nomad.505.a:1 "แค่ห้าลำเองรึ?"
 nomad.505.a.reply:0 "นั่นคือจำนวนมากที่สุดที่เราพร้อมจะมอบให้ ท้ายที่สุด คาราวานก็ยังคงต้องการมือกำบังเพื่อถือทั้งโล่และหอกในการป้องกันตัวเอง"
 nomad.505.b:0 "ว่าต่อไปสิ"
 nomad.505.c:0 "พวกเราไม่ไว้วางใจวิศวกรรมของชาวนามารี"
 nomad.510.desc:0 "มันเป็นวิถีชีวิตของเรา ทั้งโดยประเพณีและความจำเป็น ในการเก็บกู้ทรัพยากรและใช้งานอู่ต่อเรือภายในตัวยานของเราเมื่อใดและที่ใดก็ตามที่สามารถทำได้ เราชอบที่จะเห็นส่วนเกินใด ๆ ที่เราสร้างขึ้นถูกนำไปใช้งานในหมู่ผู้อยู่อาศัยบนดวงดาว มากกว่าที่จะปล่อยให้มันถ่วงน้ำหนักการเดินทางของเรา\n\nเราเชื่อว่าการออกแบบของเราจะไม่ทำให้คุณต้องผิดหวัง"
 nomad.510.a:0 "บอกข้อมูลของยานเหล่านี้แก่เราหน่อย"
 nomad.510.a.reply:0 "พวกคุณคงจะเรียกพวกมันว่า ยานคลาสครูเซอร์(สายรัด)มีเกราะป้องกันพร้อมติดตั้งพลาสม่าโทรเวอร์(พ่นลม)และเครื่องปล่อยพลังงานอาร์ก(เสียงสะท้อน)"
 nomad.510.b:0 "พวกเราให้ความสนใจ"
 nomad.510.c:0 "เราไม่ได้สนใจ"
 nomad.511.desc:1 "เป็นคำตอบที่น่าฟังดี [Root.GetAdj] [Root.GetRulerTitle] สิ่งที่เราขอตอบแทนมีเพียงแค่แร่ธาตุ £minerals£ จำนวน §Y2000§! หรือพลังงาน £energy£ จำนวน §Y2000§!"
 nomad.511.a:1 "เรายินดีแบ่งเบาภาระของคุณด้วยพลังงาน £energy£ จำนวน §Y2000§!"
 nomad.511.e:0 "เราจะรับยานเหล่านั้นแลกกับแร่ธาตุ £minerals£ จำนวน §Y2000§!"
 nomad.511.b:0 "ลดราคาลงหน่อยสิ"
 nomad.511.c:0 "เราไม่สามารถจ่ายราคานั้นได้"
 nomad.511.d:0 "ไม่ตกลง"
 nomad.512.desc:0 "พวกเรารู้ว่าสิ่งที่เราสร้างขึ้นมีมูลค่าเท่าใด ผู้อาศัยบนดวงดาว เราไม่ได้ร้องขอในสิ่งที่มากเกินไปเลย"
 nomad.513.b:0 "เรายินดีที่จะช่วยแบ่งเบาภาระของพวกท่านแลกกับพลังงาน £energy£ จำนวน §Y1500§!"
 nomad.513.c:0 "เราก็ยังไม่สามารถจ่ายราคานั้นได้อยู่ดี"
 nomad.513.d:0 "เราจะขอรับพวกมันแลกกับแร่ธาตุ £minerals£ จำนวน §Y1500§!"
 nomad.513.desc:0 "เราคาดหวังไว้ว่าจะได้รับการชดเชยต้นทุนการผลิตคืนอย่างน้อย แต่เรายินดีมอบยานรบเหล่านี้ให้คุณแลกกับแร่ธาตุ £minerals£ จำนวน §Y1500§! หรือพลังงาน £energy£ จำนวน §Y1500§!"
 nomad.514.desc:0 "ยานรบเหล่านี้จะถูกส่งไปยังพื้นที่ส่วนกลางของคุณ - [Root.Capital.GetName] ใช่หรือไม่? ใช่ จะจัดส่งให้ภายในเวลา §Y30§! วัน\n\nขอให้ท่านเดินตามรอยเส้นทางและพบความร่มเย็นเสมอ [Root.GetRulerName]"
 nomad.514.a:0 "ลาก่อน [contact_speaker_leader.GetName]"
 nomad.514.b:0 "ยินดีที่ได้ร่วมทำข้อตกลงกัน"
 nomad.520.title:0 "การส่งสัญญาณแบบเข้ารหัส"
 nomad.520.desc:0 "ไง ผู้อยู่อาศัยบนดาว\n\nเรามีข่าวสารบางอย่างที่จะมาบอกพวกพ้องของคุณ"
 nomad.520.a:0 "จงระบุตัวตนของคุณออกมา ชาวนามารี"
 nomad.520.a.reply:0 "พวกเราไม่ใช่ใครที่มีความพิเศษหรอก เรียกพวกเราว่าเป็นกลุ่มผู้น่าเป็นห่วงท่ามกลางกองเรือการ แสวง หา น้ําก็ได้"
 nomad.520.b:0 "ว่ามาเลย"
 nomad.521.desc:1 "ไม่นานมานี้ คุณเพิ่งทำการซื้อยานรบประกอบขึ้นใหม่ของกองเรือจำนวน §Y5§! ลำ ใช่หรือไม่? ยานที่มีความเร็วสูงพร้อมด้วยอาวุธขนาดใหญ่ใช่ไหม?\n\nทว่านี่คือความจริงบางประการ... คุณไม่ได้รับทราบเรื่องราวทั้งหมด เพื่อประโยชน์ในการรักษาสภาพความมั่นคงของภูมิภาค ผู้คนของคุณไม่ได้เป็นกลุ่มเดียวที่ได้รับข้อเสนอนี้ เพื่อนบ้านของคุณอย่าง §H[other_empire.GetName]§! ก็ได้ทำการเจรจากับกลุ่มการ แสวง หา น้ําด้วยเช่นกัน"
 nomad.521.a:0 "แล้วอย่างไร?"
 nomad.521.b:0 "เข้าประเด็นเลยดีกว่า"
 nomad.522.desc:1 "พวกเขาก็ตอบรับข้อเสนอเดียวกันนั้น และยานรบเพิ่มเติมอีกจำนวน §Y5§! ลำมีกำหนดจะถูกจัดส่งไปยังดินแดนโอเอซิสของ [other_empire.GetAdj] ที่ดาว [other_empire.Capital.GetName] เราหวังที่จะไม่เห็นยานรบของกองเรือต้องตกไปอยู่ในสิทธิ์บริการควบคุมของ [other_empire.GetName] และเราปรารถนาที่จะขอความช่วยเหลือของคุณ"
 nomad.522.b:0 "ทำไมถึงมาบอกเราเรื่องนี้?"
 nomad.522.b.reply:1 "พวกเราไม่ได้เชื่อใจเผ่าพันธุ์ [other_empire.GetSpeciesNamePlural] ซึ่งแตกต่างจากคนอื่น ๆ ในกองเรือ พวกเขายังไม่ได้ชำระเงิน และเราสงสัยว่าพวกเขาอาจพยายามประวิงเวลาจนกระทั่งยานรบถูกจัดส่งสำเร็จแล้วจึงเบี้ยวค่าใช้จ่าย พวกเขาทราบดีว่าผู้นำกองเรือรีบร้อนมากที่จะเดินทางต่อ..."
 nomad.522.c:0 "คุณจะทำสิ่งนี้ให้สำเร็จได้อย่างไร?"
 nomad.522.c.reply:0 "เรามีสิทธิ์พิเศษในการเข้าถึงการตั้งค่าระบบขับเคลื่อนอัตโนมัติในอู่ต่อเรือของคาราวาน การตั้งค่าให้ยานรบทั้งหมดเดินทางไปรวมพลที่ [Root.Capital.GetName] แทนที่จะส่งครึ่งหนึ่งของพวกมันไปยังดินแดนของ [other_empire.GetAdj] บนดาว [other_empire.Capital.GetName] เป็นเรื่องที่ง่ายมากสำหรับเรา และไม่มีใครจับได้แน่นอน"
 nomad.522.d:0 "คุณต้องการให้เราทำสิ่งใด?"
 nomad.522.e:0 "ไม่ได้สนใจ"
 nomad.523.desc:0 "เราคงจะต้องการค่าตอบแทนบางอย่างตอบแทน แม้แต่พลังงาน £energy£ จำนวน §Y1000§! ก็ยังมากกว่าสิ่งใด ๆ ที่กองเรือจะได้รับจากผู้อยู่อาศัยบนดวงดาวที่เป็นของ [other_empire.GetAdj] เสียอีก"
 nomad.523.c:0 "ตกลง"
 nomad.523.a:0 "ไม่ตกลง"
 nomad.523.b:0 "เราไม่สามารถจ่ายสิ่งนั้นได้"
 nomad.524.desc:1 "ขอความร่มเย็นจงสถิตกับท่าน [Root.GetRulerName] ยานรบทั้งหมดจะเดินทางไปถึงตามกำหนดเวลาที่ตกลงกันไว้ ขอให้มีสายลมที่เป็นใจ"
 nomad.524.a:0 "สิ้นสุดการส่ง"
 nomad.525.desc:0 "ช่างเป็นเรื่องที่น่าเสียดายจริงๆ\n\nขอให้มีวันที่เย็นสบายและค่ำคืนที่อบอุ่นแก่คุณ ผู้อาศัยบนดาว"
 nomad.525.desc.poor:0 "ความร้อนและความแห้งแล้ง ช่างเป็นเรื่องที่น่าเสียดายจริงๆ เราเคยคิดว่า [Root.GetName] จะเป็นท่าเรือที่ยอดเยี่ยมสำหรับยานรบของเรา"
 nomad.525.a:0 "สิ้นสุดการส่ง"
 nomad.526.desc:0 "พวกเราทำความเข้าใจแล้ว\n\nเราหวังว่าเราทั้งสองฝ่ายจะไม่ต้องมานั่งเสียใจกับการตัดสินใจของคุณในภายหลังนะ ผู้อยู่อาศัยบนดาว\n\nขอจบการสื่อสาร"
 nomad.526.a:0 "ลาก่อน"
 nomad.530.title:0 "ยานรบผู้เร่ร่อนถูกจัดส่งแล้ว"
 nomad.530.desc.15ships:1 "ตามข้อตกลงร่วมกันของเรากับกองเรือเร่ร่อนการ แสวง หา น้ํายานรบทางการทหารจำนวน §Y5§! ลำได้ถูกนำส่งไปยังระบบดาว [Root.Capital.GetStarName] และโคจรรอบดาวเคราะห์หลวงของเราเรียบร้อยแล้ว"
 nomad.530.desc.30ships:1 "ตามข้อตกลงร่วมกันของเรากับกองเรือเร่ร่อนกําลังไล่ตามน้ําและผู้ลักลอบจารกรรมที่มีจิตสำนึกที่ดีท่ามกลางพวกเขา - กองยานสองกองที่มีจำนวนยานรวมกันทั้งหมด §Y10§! ลำ ได้ถูกจัดส่งเรียบร้อยแล้วในระบบดาว [Root.Capital.GetStarName] และกำลังโคจรรอบดาวหลวงของเราอยู่ในปัจจุบัน"

 # Synced from vanilla by Stellaris Thai Translator.
 # These keys were missing from the mod and should be translated on the next pass.
 uplift.6000.nomads: "พาพวกมันมาด้วย"
 namarian.9.desc:0 "เรือ ที่ เดิน ทาง ผ่าน ทะเล พวกเขากําลังออกจากกาแล็กซี่ของเรา จากขอบนอกและวางเรือไปยังจุดหมายต่อไปของพวกเขา พวกเขาจะไปลงเอยที่ไหนต่อ พวกเขาจะพบสิ่งที่พวกเขาตามหาไหม"
 namarian.9.a:0 "สิ่งมหัศจรรย์..."
 namarian.9.a.phobe:0 "การกําจัดที่ดี"
 namarian.9.c.phile:0 "บินปลอดภัย"
 namarian.10.name:0 "นก แก้ว"
 namarian.10.desc:0 "วันอันหนาวเหน็บ และค่ําคืนอันอบอุ่น[Root.GetAdj] [Root.GetRulerTitle]เราคือ[contact_speaker_leader.GetName]เราพูดในนามของวิญญาณนามาเรียนทั้งหมด บนเรือที่เก็บรวบรวมของน้ํา, กองเรือเดินสมุทรของเรา\n\nท่านไม่มีอะไรต้องกลัวแล้ว เพราะพวกทัพเรือไม่สนใจ เราขอเพียงให้คุณเคารพความเป็นอิสระของเรา และไม่ขัดขวางเราในการเดินทางของเรา"
 namarian.21.desc:0 "สวัสดีอีกครั้ง[Root.GetAdj] [Root.GetRulerTitle]เรามีคําขอสําหรับคุณ ในขณะที่เราเดินทางเปล่า บางส่วนของคนของเราเติบโตเหนื่อย และสูญเสียสายตาของเป้าหมายของเรา เราไม่ใช่ทรราช เราบังคับให้ไม่มีใครเห็นภารกิจของเราจนถึงที่สุด เราถามพวกคุณว่า คุณจะพาคนของเราเข้าไปได้ไหม ที่จะอาศัยอยู่ในออร์บของคุณที่มีชื่อว่า[NomadMissionPlanet.GetName]?"
 namarian.21.a:0 "เราจะพาพวกเขาเข้าไป"
 namarian.21.a.tooltip:1 "§H[NomadMissionPlanet.GetName]§!:\n§G+300§! £pop£ §Hป๊อปของโนแมด§!"
 namarian.21.a.response:0 "เราขอขอบคุณ[Root.GetSpeciesAdj]ขอให้คนของเราพบสิ่งที่พวกเขากําลังมองหา ในการสมานมิตรกับคนของคุณ"
 namarian.21.b:0 "เราไม่สามารถเป็นเจ้าภาพได้"
 namarian.21.b.response:0 "นั่นคือโชคร้าย[Root.GetSpeciesAdj]. หวังว่าจะทนได้นานขึ้น เรากําลังไป"
 namarian.21.c:0 "ทําไมพวกเขาไม่พอใจ?"
 namarian.21.c.response:0 "การเดินทางของกองทัพเรือนั้นยาวนาน และ มัน คง จะ ไม่ จบ สิ้น ใน ช่วง ชีวิต ของ เรา. ความไม่พอใจในหมู่พวกเรา ต้องการอีกวัตถุประสงค์ ในชีวิตของพวกเขา นอกจากการค้นหาดาว สําหรับเป้าหมายของเรา"
 namarian.21.d:0 "พวก เขา จะ ปรับ ตัว ให้ เข้า กับ สังคม ของ เรา อย่าง ไร?"
 namarian.21.d.response:1 "พวก เขา เป็น ชน ฝูง ใหญ่ ฝ่าย วิญญาณ และ เป็น ชน ชาติ ที่ มี ความ รัก ใคร่ ตาม ธรรมชาติ เป็น การ ดี สัก เพียง ไร ที่ คุณ จะ รู้ ว่า คน ใน ตระกูล ของ คุณ เป็น อย่าง ไร."
 namarian.30.name:0 "ฮอนดูรัสกองยาน"
 namarian.30.desc_01:0 "วันอันหนาวเหน็บ และค่ําคืนอันอบอุ่น[Root.GetAdj] [Root.GetRulerTitle]."
 namarian.30.desc_02:0 "มีลมแรงมาพัดมา[Root.GetAdj] [Root.GetRulerTitle]เราหวังว่าคุณจะทําได้ดี"
 namarian.30.desc_03:0 "คุณต้องการอะไร[Root.GetSpeciesAdj]?"
 namarian.30.a:0 "เล่าเรื่องคนของคุณให้เราฟังหน่อย"
 namarian.30.a.response:0 "ดัง ที่ เรา ได้ กล่าว ไว้ ที่ ระเบียง บ้าน ของ เรา เรา เป็น ประชาชน ของ กอง เรือ ที่ ไล่ ตาม น้ํา. และโดยแน่นอน เราได้จัดให้มีดวงดาวในท้องฟ้า และเราได้จัดให้มีกลุ่มชนอีกหลายกลุ่มออกจากหมู่ดวงดาว\n\nกอง เรือ ต่าง ๆ มี การ รวบ รวม บุคคล ซึ่ง ทุก คน จํา ต้อง ทํา สุด ความ สามารถ เพื่อ ทํา ให้ เรา ก้าว หน้า. บางคนปรารถนาที่จะออกจากและสร้างชีวิตใหม่ที่ยื่นไปสําหรับตัวเอง แต่ส่วนใหญ่ต้องการที่จะเห็นสิ่งที่อยู่นอกเหนือความว่างเปล่าต่อไป"
 namarian.30.b:0 "คุณกําลังจะไปไหน?"
 namarian.30.b.response_trust:0 "เป็นพันธมิตรที่เชื่อถือได้ ของการแสวงหาน้ําที่คุณเป็น[Root.GetSpeciesAdj]เราจะบอกคุณว่า\n\nกองเรือกําลังออกสํารวจ บรรพบุรุษ ของ เรา ต้อง ทิ้ง ออร์บ กําเนิด ของ เรา ไว้ ข้าง หลัง และ แล่น เรือ ลง ไป ตาม หลัง ดึก. พวกเขาขอให้เราพบ จุดประสงค์ของคนของเรา และเรามีชีวิตอยู่ในวันนี้ตามความปรารถนา\n\nนั่นคือสิ่งที่เรากล้าแบ่งปัน ขอให้มันทําให้คุณมีเงา"
 namarian.30.b.response:0 "เรากําลังเดินทางลงแม่น้ําของช่องว่างจํานวนมากระหว่าง มันเป็นพันปี แต่เราแล่นเรือบน จุดหมายปลายทางที่เราตามหา คือมหาสมุทรแห่งจักรวาล มันอาจจะฟังดูคลุมเครือ แต่สรุปอย่างเพียงพอนี้ สิ่งที่เรากล้าที่จะแบ่งปัน ขอให้มันทําให้คุณมีเงา"
 namarian.30.b.response_no_trust:0 "เราไม่อยากพูดว่า[Root.GetSpeciesAdj]มีอะไรอีกไหม"
 namarian.30.c:0 "ลาก่อน"
 namarian.30.c.response:0 "สายลมที่โปรด[Root.GetSpeciesAdj]."
 namarian.41.desc:1 "มีลมแรงมาพัดมา[Root.GetAdj] [Root.GetRulerTitle]เราพบออร์บที่คุณเรียกว่า§Y[NomadMissionPlanet.GetName]§!ตอนนี้ไม่ได้ถูกควบคุมโดยคนของคุณ เราถามเจ้าว่า เจ้าจะปล่อยหนึ่งในตระกูลของเรา ให้อยู่อย่างสงบได้ไหม?\n\nเรารู้ดีว่าเราขอให้พวกคุณเสียทั้งระบบ เพื่อให้คนของเรามีบ้าน เรารอการตัดสินใจของคุณ ไม่ว่ามันคืออะไร"
 namarian.41.a:1 "ระบบและ\"ออร์บ\" เป็นของคุณ"
 namarian.41.a.tooltip:2 "คุณจะ§Rควบคุมสี§!ของ§H[NomadMissionPlanet.GetStarName]§!ระบบ\n\nสร้าง§Yภาษานามิเบียชื่อ§!จักรวรรดิกับ§Bขนาดขนาดขนาดขนาด 1.5K£pop£ป๊อป§!บน§H[NomadMissionPlanet.GetName]§!\n\nความสัมพันธ์ของคุณกับ§Y[nomad_fleet_country.GetName]§!และ§Yภาษานามิเบียชื่อ§!จักรวรรดิคือ§Gปรับปรุง§!\n\n"
 namarian.41.b.tooltip:0 "ความสัมพันธ์ของคุณกับ§Y[nomad_fleet_country.GetName]§!คือ§Rแย่§!\n\n"
 namarian.41.a.response:0 "เราขอขอบคุณคนของคุณ สําหรับพระคุณของพวกเขา กาแล็คซี่เป็นสถานที่ที่หนาว แต่วันนี้ การแสดงออกของความเมตตาจะไหล เราของกองเรือเดินสมุทร ปรารถนาทั้งคุณและจักรวรรดิใหม่นี้ โชคที่ดีที่สุดของกิจการของคุณ"
 namarian.41.b:0 "เราไม่สามารถให้ความปรารถนานี้กับคุณได้"
 namarian.41.b.phobe:0 "เดอะเครื่องบินเป็นของเรา"
 namarian.41.b.spirit:0 "ไม่ มันเป็นของเราโดยสิทธิของพระเจ้า"
 namarian.41.b.response:0 "นั่นคือโชคร้ายสําหรับคนของเรา[Root.GetSpeciesAdj]เราได้แต่หวังว่า พวกเขาจะพบสิ่งที่พวกเขามองหา ยุติการติดต่อ"
 namarian.41.c:0 "ทําไมดาวเคราะห์ถึงสนใจ?"
 namarian.41.c.response:0 "การเดินเรือในระหว่างนั้น เป็นการเดินทางที่ลําบาก และเพียงก้าวหนึ่งเท่านั้นในเส้นทางที่ลําบากอยู่แล้ว คนของเราแค่หาที่พัก และคิดว่า§Y[NomadMissionPlanet.GetName]§!เติมเต็มความต้องการของพวกเขา\n\nคุณจะให้พวกเขาส่วนที่เหลือนี้[Root.GetAdj] [Root.GetRulerTitle]?"
 namarian.100.name:0 "การส่งด่วน"
 namarian.100.desc:0 "ดวงอาทิตย์และความแห้งแล้ง ปกคลุมพวกท่าน[Root.GetSpeciesAdj]น้ําท่วมจะไม่จัดการกับชนิดของคุณที่เคยอีกครั้ง"
 namarian.105.name:0 "การ ประกาศ ความ เป็น ปฏิปักษ์"
 namarian.105.desc:0 "เจ้าจะรู้ได้ถึงการเดือดพล่านของน้ําที่ไหลรินตลอดเวลา[Root.GetSpeciesAdj]!"
 namarian.110.name:0 "การส่งความทุกข์"
 namarian.110.desc:0 "พวกเรามาหาท่านด้วยคําขอเร่งด่วน[Root.GetAdj] [Root.GetRulerTitle]กองทัพเรือถูกโจมตีโดย[attacker_country.GetName]และมันต้องการความช่วยเหลือจากคุณ"
 namarian.110.a:0 "เราจะช่วยคุณ"
 namarian.110.a.reply:0 "กองทัพเรือรู้สึกขอบคุณ โปรดรีบ!"
 namarian.110.b:0 "น่าเศร้าที่เราเข้าไปแทรกแซงไม่ได้"
 namarian.110.b.reply:0 "... กระหายออร์บและลูกหลานของคุณ[Root.GetSpeciesAdj]หยุดการติดต่อ"
 namarian.110.c:0 "เราจะไม่ช่วยคุณ"
 namarian.500.title:0 "การ ค้า แบบ นอร์เวย์"
 namarian.500.desc:0 "สวัสดีอีกครั้ง[Root.GetRulerTitle]ของโอเอซิส การ เดิน ทาง ผ่าน ดาว ที่ อยู่ ใกล้ ๆ ทํา ให้ มี การ เฉลิม ฉลอง ที่ เกิด ผล เป็น พิเศษ. และเราก็เพิ่งเสร็จสิ้นการสร้างเรือใหม่\n\nในความจริง เราสร้างมากกว่าที่เราต้องการ เพื่อกําจัดทรัพยากรที่มากเกินไป เราอยากให้กองคาราวานอยู่เฉย ๆ ไม่เป็นภาระ เราเลยมาหาคุณด้วยการทําธุรกรรม"
 namarian.500.a:0 "คาราวาน?"
 namarian.500.a.reply:0 "เรือของกองทัพเรือของเรา ที่ที่เราสร้างเครื่องมือของเรา ที่ผู้สร้างของเรานอนหลับ การยกขบวนคาราวานข้ามช่องว่างอันยิ่งใหญ่ระหว่าง เรียกร้องให้มัน เสนอพื้นที่ที่อยู่อาศัยจึงจําเป็นที่จะลดภาระของมัน\n\nถ้าทหารของเราสร้างมือของกองเรือ คาราวานเป็นหัวใจ"
 namarian.500.b:0 "ธุรกรรม?"
 namarian.500.c:0 "พูดออกมา"
 namarian.505.desc:1 "ข้อเสนอสินะ เราต้องการหน่วยกิตพลังงานและแร่ธาตุ สําหรับการข้ามไปครั้งต่อไป ในการแลกเปลี่ยน คุณอาจ§Yห้า§!ของเรือใหม่ของเรา"
 namarian.505.a:1 "แค่ห้า?"
 namarian.505.a.reply:0 "นั่นคือมากที่สุดเท่าที่เรายินดีที่จะเป็นส่วนหนึ่ง คาราวานต้องการมือเพื่อยึดโล่และหอก"
 namarian.505.b:0 "ไปสิ"
 namarian.505.c:0 "เราไม่ไว้ใจวิศวกรรมนามาเรียน"
 namarian.510.desc:0 "มันเป็นหนทางของเรา ตามประเพณีและความจําเป็น ที่จะขูดรีดทรัพยากร และเปิดใช้งานอู่เรือภายในของเรา เราอยากเห็นสิ่งที่เราผลิตส่วนเกิน ที่นํามาใช้ในหมู่นักกินออร์บ มากกว่าให้มันขัดขวางการเดินทางของเรา\n\nเราเชื่อว่าการออกแบบของเรา จะไม่ทําให้คุณผิดหวัง"
 namarian.510.a:0 "บอกเราเกี่ยวกับเรือเหล่านี้"
 namarian.510.a.reply:0 "ครูเซอร์ เราคิดว่าคุณจะเรียกพวกเขา มีเกราะและอาวุธพร้อมยิงพลาสม่า และเครื่องปล่อยเลเซอร์"
 namarian.510.b:0 "เราสนใจ"
 namarian.510.c:0 "เราไม่สนใจ"
 namarian.511.desc:1 "คําตอบที่สดชื่น[Root.GetAdj] [Root.GetRulerTitle]ทั้งหมดที่เราขอตอบแทนคือ£minerals£ §Y2000§!หรือ£energy£ §Y2000§!."
 namarian.511.a:1 "เราจะผ่อนเบาภาระของเจ้า£energy£ §Y2000§!."
 namarian.511.e:0 "เราจะจัดการพวกมันเอง£minerals£ §Y2000§!."
 namarian.511.b:0 "ลดราคาลง"
 namarian.511.c:0 "เราไม่มีเงินพอ"
 namarian.511.d:0 "ไม่ตกลง"
 namarian.512.desc:0 "เรารู้ว่าการสร้างสรรค์ของเรา มีค่าแค่ไหน เราไม่ได้ขออะไรมาก"
 namarian.513.b:0 "เราจะผ่อนเบาภาระของเจ้า£energy£ §Y1500§!."
 namarian.513.c:0 "เรายังจ่ายไม่ไหว"
 namarian.513.d:0 "เราจะเอามันไป£minerals£ §Y1500§!แร่"
 namarian.513.desc:0 "เราได้หวังว่าอย่างน้อยจะทําให้กลับค่าใช้จ่ายการผลิต แต่เราสามารถให้คุณเรือสําหรับ£minerals£ §Y1500§!หรือ£energy£ §Y1500§!."
 namarian.514.desc:0 "เรือจะถูกขับไปยังใจกลางโอเอซิส[Root.Capital.GetName]ใช่ เพื่อส่งมอบภายใน§Y30§!วัน\n\nบางทีคุณมักจะเดินตามทาง และหาเงา[Root.GetRulerName]."
 namarian.514.a:0 "ลาก่อน[contact_speaker_leader.GetName]."
 namarian.514.b:0 "ยินดีที่ได้ทําธุรกิจ"
 namarian.520.title:0 "ส่งข้อมูลที่ถูกเข้ารหัสไว้"
 namarian.520.desc:0 "เฮ้, ออร์บ-เดลเลอร์\n\nเรามีข่าวจะบอกพวกคุณ"
 namarian.520.a:0 "แสดงตัวสิ นามาเรียน"
 namarian.520.a.reply:0 "เราไม่มีใครพิเศษ กลุ่มที่ห่วงใยในฝูงบินหาน้ํา อาจมีคนโทรหาเรา"
 namarian.520.b:0 "พูดออกมา"
 namarian.521.desc:1 "คุณพึ่งซื้อมา§Y5§!ของเรือใหม่ของกองทัพเรือใช่มั้ย? รวดเร็วและมีอาวุธขนาดใหญ่?\n\nนี่คือสิ่งที่คุณไม่ได้เป็น ... อาได้รับเรื่องราวเต็มรูปแบบ เพื่อรักษาความมั่นคงของภูมิภาค คนของคุณไม่ใช่คนเดียว ที่ทําข้อตกลงนี้ เพื่อนบ้านคุณ§H[other_empire.GetName]§!นอกจากนี้ยังได้เจรจากับ การแสวงหาน้ํา"
 namarian.521.a:0 "แล้วไง?"
 namarian.521.b:0 "เข้าประเด็นเลย"
 namarian.522.desc:1 "พวกเขายอมรับข้อเสนอที่คล้ายกัน และ§Y5§!มี การ กําหนด ให้ ส่ง เรือ ไป ยัง เรือ[other_empire.GetAdj]โอเอซิสของ[other_empire.Capital.GetName]เราอยากให้เรือของกองทัพเรือ ไม่ได้จบลงด้วยการให้บริการของ[other_empire.GetName]และเราต้องการความช่วยเหลือจากคุณ"
 namarian.522.b:0 "ทําไมต้องบอกเราด้วย"
 namarian.522.b.reply:1 "เราไม่ไว้ใจ[other_empire.GetSpeciesNamePlural]แตกต่างจากส่วนที่เหลือของกองเรือ พวกเขายังไม่ได้จ่ายเงิน และเราสงสัยว่าพวกเขาอาจพยายามถ่วงเวลา จนกว่าจะส่งเรือ และไม่เคยส่งค่าจ้างให้เรา พวกเขารู้ว่าผู้นํากองเรือ กระตือรือร้นที่จะก้าวต่อไป"
 namarian.522.c:0 "คุณ จะ ทํา ให้ เรื่อง นี้ สําเร็จ ได้ อย่าง ไร?"
 namarian.522.c.reply:0 "เรามีสิทธิ์ในการเข้าถึง การปรับแต่งนักบิน ในอู่จอดเรือของกองคาราวาน แค่จัดแจงให้เรือทุกลํามาชุมนุมกัน[Root.Capital.GetName]- และไม่ส่งครึ่งหนึ่งของพวกเขาไปยัง[other_empire.GetAdj]วงกลม[other_empire.Capital.GetName]- มันไม่มีความหมายสําหรับเรา เราจะไม่ถูกจับ"
 namarian.522.d:0 "คุณต้องการให้เราทําอะไร"
 namarian.522.e:0 "ไม่สนใจ"
 namarian.523.desc:0 "เราต้องการบางอย่างเพื่อแสดงมัน ถึง£energy£ §Y1000§!จะมากกว่าสิ่งที่กองทัพเรือจะได้รับจาก[other_empire.GetAdj]- ออร์บ-เวลเลอร์"
 namarian.523.c:0 "ตกลง"
 namarian.523.a:0 "ไม่ตกลง"
 namarian.523.b:0 "เราไม่มีเงินพอ"
 namarian.524.desc:1 "จงกระทืบ (แผ่นดิน) ด้วยเท้าของเจ้า[Root.GetRulerName]เรือจะมาถึงตามเวลากําหนด ทั้งหมด ลมดี"
 namarian.524.a:0 "ยุติการติดต่อ"
 namarian.525.desc:0 "นั่นมันโชคร้าย\n\nวันเย็นและคืนที่อบอุ่นสําหรับคุณตัวเรียกดู"
 namarian.525.desc.poor:0 "ความร้อนและความแห้งแล้ง นั่นคือโชคร้าย เราคิดว่า[Root.GetName]จะได้ทําท่าเรือที่ดีสําหรับเรือของเรา"
 namarian.525.a:0 "ยุติการติดต่อ"
 namarian.526.desc:0 "เราเข้าใจ\n\nเราหวังว่าเราทั้งคู่ จะไม่เสียใจกับการตัดสินใจของคุณ\n\nยุติการติดต่อ"
 namarian.526.a:0 "ลาก่อน"
 namarian.530.title:0 "เรือ โน อาห์ ส่ง มา"
 namarian.530.desc.15ships:1 "ตามข้อตกลงของเรากับเรือเดินสมุทร§Y5§!ยานทหารถูกส่งไปที่ยาน[Root.Capital.GetStarName]ระบบและโคจรรอบเมืองหลวงของเรา"
 namarian.530.desc.30ships:1 "ตามข้อตกลงของเรากับเรือเดินสมุทรที่ไล่ตามน้ํา และเรือข้ามฟากตามจิตสํานึกในกองเรือสองลํา§Y10§!ยานทหารถูกส่งไปที่ยาน[Root.Capital.GetStarName]ระบบและโคจรรอบเมืองหลวงของเรา"
