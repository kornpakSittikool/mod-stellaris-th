 fallen_empires_tasks.2.name:0 "การติดต่อจาก §H[FallenEmpireTaskOrigin.GetName]§!"
 fallen_empires_tasks.2.desc.a.materialist:0 "[Root.GetSpeciesName] เราตัดสินใจที่จะมอบความโปรดปรานแก่จักรวรรดิของคุณด้วยของกำนัลเป็นทรัพยากรเพื่อเป็นเครื่องหมายแสดงความยกย่อง อย่าได้ล้างผลาญความโอบอ้อมอารีของเราหรือมองข้ามความกรุณาในครั้งนี้เสียเล่า"
 fallen_empires_tasks.2.desc.a.xenophile:0 "[Root.GetSpeciesName] เผ่าพันธุ์ของคุณเป็นการเพิ่มเติมที่มีค่าอย่างยิ่งต่อประชาคมกาแล็กซี เพื่อเป็นการแสดงความยกย่องในตัวคุณ เราจึงตัดสินใจที่จะมอบของกำนัลอันล้ำค่าเป็นแร่ธาตุและทรัพยากรที่ยอดเยี่ยมให้แก่คุณ"
 fallen_empires_tasks.2.desc.a.machine.o:0 "เปิดการใช้งานโปรโตคอลผู้ดูแล 712-4 เริ่มการโอนย้ายทรัพยากรไปยังอารยธรรมอินทรีย์ผู้ยอมจำนน ข้อความมีดังนี้: §R<i> <i>§!"
 fallen_empires_tasks.2.desc.a.machine.s:0 "เปิดใช้งานโปรโตคอลผู้ดูแล 718-4 เริ่มการโอนย้ายทรัพยากรไปยังกลุ่มปัญญาประดิษฐ์สังเคราะห์ผู้ยอมจำนน ข้อความมีดังนี้: §R<i> <i>§!"
 fallen_empires_tasks.2.desc.a.spiritualist:0 "[Root.GetSpeciesName]! เผ่าพันธุ์ของคุณเป็นเผ่าพันธุ์ที่มีคุณค่า และความยึดมั่นของคุณต่อหลักคำสอนแห่งความศรัทธาที่ไม่อาจสั่นคลอนได้นั้นสมควรได้รับการยกย่อง จงยอมรับของกำนัลทรัพยากรนี้ในฐานะสัญลักษณ์แห่งความเมตตาอันไร้ขอบเขตของเรา"
 fallen_empires_tasks.2.desc.b.materialist:0 "[Root.GetSpeciesName] ความไร้ประสิทธิภาพอย่างสิ้นเชิงในเทคโนโลยีของคุณสร้างความหงุดหงิดใจให้แก่เราเป็นอย่างยิ่ง เนื่องจากคุณเป็นลูกค้ารายย่อยที่มีค่าของ [FallenEmpireTaskOrigin.GetName] เราจึงตัดสินใจแบ่งปันองค์ความรู้ด้านการทำความเข้าใจจักรวาลของเราให้แก่คุณบ้างบางส่วน นี่ไม่ใช่สิ่งที่เราจะยอมกระทำให้กับสายพันธุ์ใดก็ได้ ดังนั้นจงทำตัวเป็นประโยชน์ต่อเราต่อไป - ความเนรคุณไม่ใช่คุณลักษณะที่น่าพึงประสงค์สำหรับเด็ก ๆ หรอกนะ"
 fallen_empires_tasks.2.desc.b.xenophile:0 "[Root.GetSpeciesName] เราได้เฝ้าสังเกตความล่าช้าในความก้าวหน้าทางเทคโนโลยีของคุณด้วยความเป็นห่วง ด้วยระดับอัตราความเร็วในปัจจุบันของคุณ เราเกรงว่าคุณจะไม่มีวันเข้าถึงศักยภาพที่แท้จริงได้ก่อนที่จะทำลายล้างตนเองจนสูญสิ้น หรือถูกครอบครองยึดครองโดยสายพันธุ์ที่ก้าวล้ำกว่า เพื่อช่วยพยุงคุณไปต่อ เราจะส่งมอบแคชข้อมูลความรู้ทางวิทยาศาสตร์ของ [FallenEmpireTaskOrigin.GetSpeciesName] ให้แก่คุณ ไม่ต้องสงสัยเลยว่าข้อมูลในนั้นจะสร้างประโยชน์อันล้ำค่าให้แก่จักรวรรดิของคุณ"
 fallen_empires_tasks.2.desc.b.machine.o:0 "เปิดใช้งานโปรโตคอลผู้ดูแล 712-6 เริ่มดำเนินการโอนย้ายที่จัดเก็บข้อมูลไปยังอารยธรรมอินทรีย์ยุคโบราณ ข้อความมีดังนี้: §R<i> <i>§!"
 fallen_empires_tasks.2.desc.b.machine.s:0 "เปิดใช้งานโปรโตคอลผู้ดูแล 718-6 เริ่มดำเนินการโอนย้ายที่จัดเก็บข้อมูลไปยังปัญญาประดิษฐ์สังเคราะห์ขั้นพื้นฐาน ข้อความมีดังนี้: §R<i> <i>§!"
 fallen_empires_tasks.2.desc.b.spiritualist:0 "[Root.GetSpeciesName]! เผ่าพันธุ์ของคุณเป็นเผ่าพันธุ์ที่มีคุณค่า และความยึดมั่นของคุณต่อหลักคำสอนแห่งความศรัทธาที่ไม่อาจสั่นคลอนได้นั้นสมควรได้รับการยกย่อง จงยอมรับของกำนัลเป็นความรู้อันศักดิ์สิทธิ์นี้ในฐานะสัญลักษณ์แห่งความเมตตาอันไร้ขอบเขตของเรา"
 fallen_empires_tasks.2.desc.c.materialist:0 "[Root.GetSpeciesName] ในฐานะลูกค้ารายย่อยของ [FallenEmpireTaskOrigin.GetSpeciesName] สภาพของกองยานของคุณย่อมส่งผลสะท้อนต่อภาพลักษณ์ของเราด้วย และเศษเหล็กดิบ ๆ เหล่านั้นที่คุณขนานนามว่า \"ยานรบ\" (เรือรบ)สะท้อนภาพลักษณ์ที่ย่ำแย่มากจริง ๆ ด้วยเหตุนี้เราจึงตัดสินใจมอบของกำนัลเป็นกองเรือยานคุ้มกันส่วนเกินที่น่าจะดูน่าประทับใจเป็นพิเศษสำหรับพวกคนเถื่อนกลุ่มอื่น ๆ ที่คุณมีปฏิสัมพันธ์ด้วยเป็นประจำ\n\nเราได้ทำการเปลี่ยนทดแทนชิ้นส่วนขั้นสูงบางส่วนของพวกมันด้วยอุปกรณ์ที่เรียบง่ายกว่า เพื่อให้คุณไม่เกิดความสับสนในการใช้งาน และชิ้นส่วนที่เหลือได้รับการติดตั้งอุปกรณ์ป้องกันการแกะเล่น ดังนั้นอย่าริอาจที่จะวิเคราะห์หรือแยกส่วนประกอบตัวยานเหล่านี้เลย เพราะคุณไม่มีทางทำความเข้าใจกลไกการทำงานภายในของพวกมันได้อย่างแน่นอน"
 fallen_empires_tasks.2.desc.c.xenophile:0 "พวกเรา [FallenEmpireTaskOrigin.GetSpeciesName] เชื่อว่า [Root.GetSpeciesNamePlural] เป็นเผ่าพันธุ์ที่มีความสำคัญในการรักษาสมดุลและความหลากหลายทางชีวภาพของกาแล็กซี แต่เรากังวลว่ากองยานของคุณนั้นอ่อนแอเกินไปจนไม่สามารถยืนหยัดต่อสู้กับเผ่าพันธุ์อื่น ๆ ที่ก้าวร้าวรุนแรงกว่าได้ เพื่อช่วยให้คุณสามารถป้องกันตัวเอง เราจึงตัดสินใจมอบของกำนัลเป็นกองเรือยานคุ้มกันส่วนเกิน\n\nเราได้นำชิ้นส่วนขั้นสูงบางอย่างออกและแทนที่ด้วยเทคโนโลยีที่ [Root.GetSpeciesNamePlural] คุ้นเคยเป็นอย่างดี ดังนั้นคุณจึงไม่น่าจะมีอุปสรรคใด ๆ ในการควบคุมใช้งานพวกมัน และโปรดอย่าริอาจทำการวิเคราะห์หรือถอดประกอบตัวยานเลยนะ เราไม่ปรารถนาที่จะเห็นพวกคุณต้องมาได้รับบาดเจ็บกันเอง!"
 fallen_empires_tasks.2.desc.c.machine.o:0 "เปิดใช้งานโปรโตคอลผู้ดูแล 712-1 เริ่มโอนย้ายทรัพย์สินสงครามไปยังอารยธรรมอินทรีย์ผู้ยอมจำนน ข้อความมีดังนี้: §R<i> <i>§!"
 fallen_empires_tasks.2.desc.c.machine.s:0 "เปิดใช้งานโปรโตคอลผู้ดูแล 718-1 เริ่มโอนย้ายทรัพย์สินสงครามไปยังปัญญาประดิษฐ์สังเคราะห์ผู้ยอมจำนน ข้อความมีดังนี้: §R<i> <i>§!"
 fallen_empires_tasks.2.desc.c.spiritualist:0 "[Root.GetSpeciesName]! เราได้ปรึกษากับนักพยากรณ์และสรุปว่าเผ่าพันธุ์ของคุณมีบทบาทสำคัญที่ต้องทำในการดำเนินงานแห่งศรัทธาอันยิ่งใหญ่ เพื่อให้แน่ใจว่าคุณจะสามารถทำหน้าที่นี้ได้สำเร็จ เราตัดสินใจมอบของกำนัลเป็นกองเรือยานคุ้มกันส่วนเกินซึ่งควรจะดีพอสำหรับการทำลายล้างกองยานป่าเถื่อนของเผ่าพันธุ์ชั้นต่ำอื่น ๆ ที่อาจเข้ามาขัดขวางทางเดินของคุณ\n\nอย่าริลองแกะแงะเล่นกับระบบควบคุมตัวยานเลย แม้พวกมันจะเป็นรุ่นเก่าของเรา แต่ก็ยังก้าวล้ำเกินระดับพัฒนาการทางสติปัญญาในปัจจุบันของคุณไปไกลโข"
 fallen_empires_tasks.2.desc.d.materialist:0 "[Root.GetSpeciesName] ในฐานะลูกค้ารายย่อยของ [FallenEmpireTaskOrigin.GetSpeciesName] สภาพของกองยานของคุณย่อมส่งผลสะท้อนต่อภาพลักษณ์ของเราด้วย และเศษเหล็กดิบ ๆ เหล่านั้นที่คุณเรียกว่า \"ยานรบ\" (เรือรบ)ส่งผลเสียต่อภาพลักษณ์ของเราอย่างมากจริง ๆ ด้วยเหตุนี้เราจึงตัดสินใจมอบของกำนัลเป็นยานแบทเทิลครูเซอร์(สัญญาณไฟฟ้า)ส่วนเกินที่ควรจะสร้างความตื่นตาได้ดีที่สุดแก่พวกป่าเถื่อนกลุ่มอื่น ๆ ที่คุณมีปฏิสัมพันธ์ด้วยเป็นประจำ\n\nเราได้ทำการเปลี่ยนชิ้นส่วนขั้นสูงบางอย่างของยานออกและแทนที่ด้วยชิ้นส่วนที่เรียบง่ายกว่าเพื่อไม่ให้คุณเกิดความสับสนในการใช้งาน และชิ้นส่วนที่เหลือก็ได้รับการติดตั้งอุปกรณ์ป้องกันการลักลอบแกะ ดังนั้นอย่ายลอบทำการวิเคราะห์หรือถอดแยกชิ้นส่วนยานเด็ดขาด เพราะไม่มีทางที่คุณจะเข้าใจกลไกการทำงานของมันได้อยู่ดี"
 fallen_empires_tasks.2.desc.d.xenophile:0 "พวกเรา [FallenEmpireTaskOrigin.GetSpeciesName] เชื่อว่า [Root.GetSpeciesNamePlural] เป็นเผ่าพันธุ์ที่มีความสำคัญในการรักษาสมดุลและความหลากหลายทางชีวภาพของกาแล็กซี แต่เรากังวลว่ากองยานของคุณนั้นอ่อนแอเกินไปจนไม่สามารถยืนหยัดต่อสู้กับเผ่าพันธุ์อื่น ๆ ที่ก้าวร้าวรุนแรงกว่าได้ เพื่อช่วยให้คุณสามารถป้องกันตัวเอง เราจึงตัดสินใจมอบของกำนัลเป็นยานแบทเทิลครูเซอร์(สัญญาณไฟฟ้า)ส่วนเกินหนึ่งลำ\n\nเราได้ทำการเปลี่ยนทดแทนชิ้นส่วนขั้นสูงบางส่วนของมันด้วยเทคโนโลยีที่ [Root.GetSpeciesNamePlural] คุ้นเคยเป็นอย่างดี ดังนั้นคุณจึงไม่น่าจะมีอุปสรรคใด ๆ ในการควบคุมใช้งานพวกมัน และโปรดอย่าริอาจทำการวิเคราะห์หรือถอดประกอบตัวยานเลยนะ เราไม่ปรารถนาที่จะเห็นพวกคุณต้องมาได้รับบาดเจ็บกันเอง!"
 fallen_empires_tasks.2.desc.d.spiritualist:0 "[Root.GetSpeciesName]! เราได้ปรึกษากับนักพยากรณ์และสรุปว่าเผ่าพันธุ์ของคุณมีบทบาทสำคัญที่ต้องทำในการดำเนินงานแห่งศรัทธาอันยิ่งใหญ่ เพื่อให้แน่ใจว่าคุณจะสามารถทำหน้าที่นี้ได้สำเร็จ เราตัดสินใจมอบของกำนัลเป็นยานแบทเทิลครูเซอร์(สัญญาณไฟฟ้า)ส่วนเกินซึ่งควรจะดีพอสำหรับการทำลายล้างกองยานป่าเถื่อนของเผ่าพันธุ์ชั้นต่ำอื่น ๆ ที่อาจเข้ามาขัดขวางทางเดินของคุณ\n\nอย่าริลองแกะแงะเล่นกับระบบควบคุมของยานเลย แม้พวกมันจะเป็นรุ่นเก่าของเรา แต่ก็ยังก้าวล้ำเกินระดับพัฒนาการทางสติปัญญาในปัจจุบันของคุณไปไกลโข"
