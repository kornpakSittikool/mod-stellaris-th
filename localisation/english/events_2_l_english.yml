 anomaly.75.name:0 "สมองหิน"
 anomaly.75.desc:0 "การสแกนดาวเคราะห์น้อยขนาดมหึมาเป็นพิเศษ [From.GetName] ให้ผลลัพธ์ที่น่าทึ่ง แกนกลางของหินถูกแทรกซึมไปด้วยเครือข่ายคริสตัลนำไฟฟ้าที่นำกระแสไฟฟ้าอ่อนๆ ลูกเรือบนยาน [Root.GetName] จดจำโครงสร้างนี้ได้ว่าเป็นโครงข่ายประสาทดั้งเดิม และเชื่อว่าวัตถุบนท้องฟ้านี้กำลังคิดในระดับหนึ่ง หากยังไม่ถึงขั้นมีสติปัญญาสมบูรณ์ พวกเขาขออนุญาตขุดค้นแกนกลางและขนส่งไปยังสถานีวงโคจรที่ใกล้ที่สุดเพื่อการศึกษาอย่างใกล้ชิด"
 anomaly.75.a:0 "ดำเนินการตามนั้น"
 anomaly.75.b:0 "ทำเท่าที่ศึกษาได้จากพื้นผิวก็พอ"
 anomaly.75.b.tooltip:1 "เพิ่มตัวปรับแต่ง §Yสมองหิน§! ให้กับ [From.GetName]:\n£physics£ §G+8§!"
 anomaly.75.c:0 "มันไม่ได้แตกต่างจากเรามากนัก ลองพูดคุยกันเถอะ"
 anomaly.75.c.tooltip:0 "สั่งการให้ [Root.GetName] ติดตั้งเครื่องตรวจวัดพื้นผิวบน [From.GetName] และถอดรหัสกิจกรรมทางประสาทที่อ้างสิทธิ์"
 IS_LITHOID_EMPIRE_ICON_TIP:0 "ตัวเลือกนี้สามารถใช้ได้เนื่องจาก §H[This.Owner.GetName]§! เป็นจักรวรรดิ §Yลิทอยด์(ลิตอยด์)§!" # not a real trigger tooltip, used with icon = {}
 anomaly.76.desc:0 "[rock_scientist.GetName] อยู่ที่นี่ มันเป็นความท้าทายมาก แต่ฉันคิดว่าพวกเราจัดการวิเคราะห์ค่าที่อ่านได้ออกมาเป็นสิ่งหนึ่งที่เหมือนกับ... อาจจะไม่ใช่ภาษา แต่เป็นแนวคิด เป็นไอเดีย และเราสามารถส่งสิ่งที่คล้ายคลึงกันกลับไปยังดาวเคราะห์น้อยเพื่อที่จะสื่อสารกับมันได้\n\nเราจะแสดง §Y<ข้อมูลกรองผลลัพธ์>§! บางส่วน และฉันจะพยายามอย่างเต็มที่เพื่อให้การแปลความหมายของข้อมูลดิบที่ §G§!"§!สมบูรณ์ยิ่งขึ้น§G"§!"
 anomaly.76.a:0 "เมื่อคิดอีกที สิ่งนี้ดูเหมือนจะไม่รอบคอบเท่าไหร่"
 anomaly.76.a.tooltip:0 "ยกเลิกความพยายามในการติดต่อกับ [rock_brain.GetName] โดยตรง และศึกษาศึกษามันจากระยะไกล"
 anomaly.76.b:0 "เชื่อมต่อสัญญาณให้เรา"
 anomaly.77.desc:0 "\n§Y<ความคิด> <ใหม่>. <เหตุผล>. <เหตุผล> <ที่ชวนสับสน>.§!\n\n\n§G§!"§!เพื่อให้ข้อมูลบริบทประกอบบางส่วน [rock_brain.GetName] ไม่มีอวัยวะรับสัมผัสในความหมายดั้งเดิม มันรับรู้ข้อมูลนำเข้าของเราเป็นความคิดของตัวมันเอง ในระดับหนึ่ง§G"§!"
 anomaly.77.a:0 "<เจ้าเข้าใจหรือไม่ว่าพวกเราไม่ใช่เจ้า?>"
 anomaly.77.a.response:0 "\n§Y<ความคิด>-<ที่แตกต่าง> <การปรับประสาน>-<เหมือนเดิม> <การเบี่ยงเบน>-<ที่แตกต่าง>.§!\n\n\n§G§!"§!มันไม่เชื่อว่าเราเป็นอะไรอื่นนอกจากภาพหลอนในสมอง แต่มันก็เคยพบเจอกับผีทางความคิดเช่นนี้มาก่อนในอดีต พวกเราเป็นเพียงการเบี่ยงเบนความสนใจชั่วคราวเท่านั้น§G"§!"
 anomaly.77.b:0 "<เจ้าล่องลอยอยู่ในวงโคจรของ [rock_sun.GetName] มานานเท่าใดแล้ว?>"
 anomaly.77.b.response:0 "\n§Y<ไม่>... <ก่อนหน้า> <ไม่>. <ไม่>.§!\n\n\n§G§!"§![rock_brain.GetName] ไม่รับรู้หรือแม้แต่สัมผัสได้ถึงการมีอยู่ของดาวฤกษ์ [rock_sun.GetName] นอกจากนี้มันยังขาดแนวคิดเรื่องเวลา นอกเหนือจากความเข้าใจอันจำกัดเกี่ยวกับการเกิดขึ้นอย่างต่อเนื่องของความคิด§G"§!"
 anomaly.77.c:0 ""พวกเราได้สิ่งที่มีประโยชน์จากเรื่องนี้บ้างไหม?""
 anomaly.77.c.response:0 "\n§Y<...>§!\n\n\n§G§!"§!โอ้ ใช่เลย การแลกเปลี่ยนครั้งนี้กำลังพัฒนาเครือข่ายถอดรหัสแบบฟัซซีของเราในอัตราที่น่าเหลือเชื่อ ฉันรู้สึกทึ่งมากที่มันใช้งานได้ดีขนาดนี้ แต่ฉันกำลังตรวจพบค่าอ่านบางอย่างที่น่าตื่นตระหนก...§G"§!"
 anomaly.77.d:0 "<พวกเรามาพูดคุยเกี่ยวกับเรื่องอื่นกันดีกว่า...>"
 anomaly.78.desc:0 "\n§Y<คำถา--. <คำถาม>§!\n\n\n§G§!"§!เป็นไปอย่างที่ฉันกลัว ยานสำรวจของเรากำลังดูดพลังงานที่ขับเคลื่อนกระบวนการคิดของ [rock_brain.GetName] ออกไป [rock_brain.GetName] ไม่ใช่ระบบปิดที่สมบูรณ์แบบ ดังนั้นเหตุการณ์นี้จึงต้องเกิดขึ้นในท้ายที่สุด — แม้ว่ามันน่าจะเป็นในอีกหลายหมื่นปีข้างหน้า แทนที่จะเป็นตอนนี้...§G"§!"
 anomaly.78.a:0 "<มีสิ่งใดที่เราพอจะช่วยเจ้าได้บ้างหรือไม่?>"
 anomaly.78.a.response:0 "\n§Y<เป็นอยู่>.§!\n\n\n§G§!"§!มันบอกว่ามันสบายดี แต่มันไม่สบายดีหรอก เราพยายามป้อนพลังงานบางส่วนกลับเข้าไปในโครงข่ายประสาทแล้ว แต่นั่นกลับทำให้เกิดคลื่นสมองที่ปั่นป่วนยิ่งขึ้น ไม่ใช่แข็งแกร่งขึ้น เราได้ก้าวข้ามจุดวิกฤตไปแล้ว พลังงานอันน้อยนิดที่เหลืออยู่จะหมดไปในไม่ช้าไม่ว่าเราจะทำอย่างไรก็ตาม มันไม่มีทางตรวจจับได้ว่าระบบการรับรู้ของมันกำลังช้าลง และไม่มีเหตุผลที่จะคาดการณ์ว่านี่คือจุดจบของมัน อีกทั้งมันไม่มีแนวคิดใดๆ เกี่ยวกับความหมายของการตายด้วยซ้ำ...§G"§!"
 anomaly.78.b1:0 "<มีคำสั่งเสียสุดท้ายหรือไม่?>"
 anomaly.78.b1.response:0 "\n§Y<รับรู้>-<ภายใน> <ทำซ้ำ>. <[rock_fallen_empire.GetRealName]>.§!\n\n\n§G§!"§!มันจะนึกถึงเราอีกครั้ง หรือว่าตอนนี้มันกำลังหลอมรวมเราผ่านความคิดของมันกันแน่? ฉันเกรงว่าสัญญาณกำลังจางหายไปอย่างรวดเร็ว พวกเรายังไม่แน่ใจว่าจะทำอย่างไรกับคำว่า "[rock_fallen_empire.GetRealName]" — มันดูเหมือนจะเป็นคำที่ใกล้เคียงกับภาษาดั้งเดิมที่สุดที่เราได้รับจาก [rock_brain.GetName] แต่ความหมายของมันยังคงคลุมเครือ บางทีอัลกอริทึมการแปลผลของเราอาจกำลังหยุดทำงานเนื่องจากโครงข่ายประสาทของเป้าหมายกำลังล้มเหลว§G"§!"
 anomaly.78.b2:0 "$anomaly.78.b1$"
 anomaly.78.b2.response:0 "\n§Y<รับรู้>-<ภายใน> <ทำซ้ำ>.§!\n\n\n§G§!"§!มันจะนึกถึงเราอีกครั้ง หรือค่อนข้างว่าตอนนี้มันกำลังจำลองพวกเราผ่านทางความคิดของมันอีกรอบ? ฉันเกรงว่าสัญญาณกำลังจางหายไปอย่างรวดเร็ว — หรือบางทีอัลกอริทึมการวิเคราะห์ของเราอาจจะพังลงเมื่อโครงข่ายประสาทของเป้าหมายล้มเหลว§G"§!"
 anomaly.78.c:0 ""ถึงเวลาต้องจากลากันแล้ว""
 anomaly.79.desc:0 "[rock_brain.GetName] ตกอยู่ในความเงียบงัน ความพยายามทั้งหมดของเจ้าหน้าที่วิทยาศาสตร์ [rock_scientist.GetName] ในการชาร์จโครงข่ายแร่ธาตุภายในดาวเคราะห์น้อยล้มเหลวโดยสิ้นเชิง ประกายไฟแห่งปัญญาใดๆ ที่เคยขับเคลื่อนเซลล์ประสาทที่หยาบกร้านของมันได้มอดดับลงไปแล้ว ทว่าพวกเราก็ได้เรียนรู้สิ่งต่างๆ มากมายจากญาติทางวิวัฒนาการอันห่างไกลดวงนี้"
 anomaly.79.a:0 "มันเป็นตนสุดท้ายในชนิดของมัน หรือเป็นตนแรกกันแน่?"
 anomaly.80.name:0 "ไมเกรนหิน"
 anomaly.80.desc:1 "แกนกลางของ [From.From.GetName] เมื่อถูกดึงออกมาจากใต้เปลือกของดาวเคราะห์น้อยแล้ว กลับตอบสนองไม่ดีต่อสภาวะสุญญากาศของอวกาศ เครื่องมือของยาน [Root.GetName] อ่านพบค่าพลังงานพุ่งสูงขึ้นอย่างกะทันหันไม่กี่วินาทีก่อนที่ก้อนหินจะแตกออกเป็นเสี่ยงๆ อย่างแผ่วเบาทว่าเด็ดขาด\n\nแร่ธาตุนำไฟฟ้าชิ้นใหญ่ๆ ได้รับการกู้คืนมาได้ ทว่าประจุวิญญาณใดๆ ที่เคยหล่อเลี้ยงพวกมันได้จางหายไปหมดแล้ว"
 anomaly.80.a:0 "ตัวผลึกคริสตัลเองก็ยังมีค่าในตัวของมันเองอยู่ดี"
 anomaly.81.desc:0 "เหล่านักเชิดศพ(สัตว์)ของเราได้สลักรอยจารึกใหม่ลงบนตะเข็บแร่ที่ละเอียดอ่อนของดาวเคราะห์น้อย ซึ่งเป็นการอัญเชิญอย่างหยาบๆ ที่จารึกบนหินและอาบชุ่มไปด้วยกระแสไฟฟ้าที่เต้นเป็นจังหวะ ทว่าจิตสำนึกเดิมที่เคยเป็น [rock_brain.GetName] ได้สูญสลายไปจากเราแล้ว\n\nตอนนี้มันกลายเป็นบางสิ่งที่แตกต่างออกไปซึ่งถูกแขวนลอยไว้ในฝันร้ายอันน่าสะพรึงกลัว — ถูกติดตั้งเข้ากับไอพ่นบังคับทิศทางและกำลังรอคอยคำสั่งของเรา"
 anomaly.85.name:0 "ดาวเคราะห์ช่างจอแจ"
 anomaly.85.desc:0 "คลื่นแม่เหล็กไฟฟ้าที่ปล่อยออกมาอย่างไม่สม่ำเสมอจาก [From.GetName] และดาวเคราะห์ข้างเคียงสร้างความสนใจให้กับลูกเรือของยาน [Root.GetName] การศึกษาเพิ่มเติมเผยให้เห็นว่าการระเบิดของคลื่นเหล่านั้นเป็นการสื่อสารที่เข้ารหัสไว้ แม้ว่าเนื้อหาจะค่อนข้างธรรมดาทั่วไป กิจกรรมแม่เหล็กไฟฟ้ายุติลงทันทีราวกับรู้ตัวว่าโดนแอบฟัง แต่ไม่ก่อนที่ยาน [Root.GetName] จะจัดทำแคตตาล็อกบันทึกสถานะที่รายงานด้วยตนเองของ [From.GetName] และดาวเคราะห์ดวงอื่นๆ ทั้งหมดในระบบ"
 anomaly.85.a:0 "ใช้ข้อมูลดังกล่าวเพื่อการวิจัยการสื่อสารระยะไกลเพิ่มเติม"
 anomaly.85.b:0 "แสดงแผนที่ข้อมูลสถานะไปยังดาวเคราะห์ทุกดวงในระบบ"
 anomaly.90.name:0 "เถาวัลย์ยึดเกาะ"
 anomaly.90.desc:0 "หญ้าอันหนาแน่นของ [From.GetName] ตอบสนองต่อยานสำรวจของ [Root.GetName] ด้วยการฉีกกระชากพวกมันออกเป็นชิ้นๆ อย่างรุนแรงสะกดสายตา เมื่อเถาวัลย์อันเหนียวแน่นเอื้อมขึ้นมาหายานที่อยู่สูงขึ้นไปด้านบน ความเงียบเหงาที่ขาดแคลนสิ่งมีชีวิตประเภทสัตว์บนดาวเคราะห์จึงเริ่มมีเหตุผลขึ้นมา\n\n§Yโครงการพิเศษ(โครงการพิเศษ)§! ได้รับการประกาศขึ้นเพื่อศึกษาระบบพืชพรรณของดาวเคราะห์ดวงนี้ต่อไป"
 anomaly.90.a:0 "ภัยคุกคามจากพฤกษากินคน"
 anomaly.91.name:0 "กองกำลังพฤกษา"
 anomaly.91.desc:0 "การตรวจสอบอย่างถี่ถ้วนเผยให้เห็นว่าพฤติกรรมอันรุนแรงของเถาวัลย์และหญ้าบน [From.From.GetName] ไม่ใช่ปฏิกิริยาป้องกันตัวที่โง่เขลา\n\nพืชเหล่านี้มีลำดับทางสังคมภายในที่ซับซ้อน แตกต่างกันไปตามภูมิภาคทางภูมิศาสตร์ ไฟลัมต่างๆ จะรับหน้าที่แตกต่างกันออกไป โดยหน้าที่หลักที่สำคัญที่สุดดูเหมือนจะเป็นการขับไล่สัตว์กินพืชพื้นเมืองและผู้บุกรุกที่อาจมาจากฟากฟ้า"
 anomaly.91.a.tooltip:0 "เพิ่มตัวปรับแต่ง §Yพืชพรรณเจ้าปัญญา§! ให้กับ [From.From.GetName]:\n£society£ §G+6§!"
 anomaly.95.name:0 "สำคัญสำหรับคนอื่น"
 anomaly.95.desc:0 "พบแผ่นจารึกอะลูมิเนียมลอยอยู่ท่ามกลางซากปรักหักพังรอบๆ [From.GetName] พื้นผิวชุบอโนไดซ์ของมันโดดเด่นจากเศษซากโลหะรอบตัว มันแสดงภาพสิ่งมีชีวิตเลี้ยงลูกด้วยนมสองตัวที่ดูน่าขัน และรูปทรงเรขาคณิตที่ค่อนข้างไร้รสนิยม"
 anomaly.95.a:0 "มันอาจจะเหมาะที่จะใช้เป็นที่รองแก้วเครื่องดื่มของฉัน"
 anomaly.95.b:0 "ถอดรหัสแผ่นจารึก"
 anomaly.95.c:0 "ฉันแน่ใจว่าจะมีคนยอมจ่ายเงินซื้อมันแน่ๆ"
 anomaly.95.b.tooltip:0 "เพิ่มพิกัดของระบบสุริยะ(ระบบโซล)ลงในบันทึกสถานการณ์(บันทึกระบบ)\n"
 anomaly.96.name:0 "ผืนแผ่นดินโลก"
 anomaly.96.desc.neutral:0 "พิกัดทิศทางที่สรุปได้จากแผ่นจารึกค่อนข้างมีความแม่นยำสูง\n\nนี่คือระบบสุริยะ(โซล)ระบบดาว) โดยแผ่นจารึกนั้นมีต้นกำเนิดมาจากดาวเคราะห์ที่นักดาราศาสตร์ของเราตั้งชื่อให้ว่า โลกสุริยะ3 (โซลที่ 3)"
 anomaly.96.desc.phobe:0 "พวกเราได้พบต้นกำเนิดของแผ่นโลหะราคาถูกที่เรากู้คืนมาแล้ว ระบบสุริยะเป็นเพียงจุดเล็กๆ ในห้วงอวกาศที่มีศูนย์กลางอยู่ที่ดาวแคระเหลืองที่น่าเวทนา ดินแดนห่างไกลความเจริญที่ถูกรัศมีอันรุ่งโรจน์ของ [Root.Owner.GetName] บดบังจนหมดสิ้น"
 anomaly.96.desc.phile:0 "ในที่สุดพวกเราก็มาถึงระบบสุริยะ ปลายทางที่สิ่งมีชีวิตบางตนพยายามสื่อสารผ่านสื่อที่เป็นระบบดั้งเดิมอย่างยิ่งยวด จุดเริ่มต้นของแผ่นจารึกดูเหมือนจะเป็นดาวหินดวงที่สามนับจากดวงอาทิตย์ ซึ่งควรจะเป็นดาวเคราะห์ประเภทภาคพื้นทวีป"
 anomaly.96.a.neutral:0 "ชายฝั่งอันห่างไกลอย่างแท้จริง"
 anomaly.96.a.phobe:0 "เพื่อแสดงจุดยืน ทิ้งแผ่นจารึกนั้นลงในดวงอาทิตย์ของพวกเขาซะ"
 anomaly.96.a.phile:0 "พวกเจ้าได้ร้องตะโกนเข้าสู่อวกาศอันว่างเปล่า และตอนนี้พวกเรามาหาแล้ว"
 anomaly.100.name:0 "ไล่ตามทันผู้บุกเบิก(Pionier)"
 anomaly.100.desc:0 "แผ่นอะลูมิเนียมชุบทองได้รับการกู้คืนจากพื้นผิวของ [From.GetName] ทุกคนบนยาน [Root.GetName] ต่างจำมันได้ก่อนที่การวิเคราะห์และตรวจสอบฐานข้อมูลจะยืนยันแหล่งกำเนิดของมันเสียอีก"
 anomaly.100.a:0 "แผ่นจารึกจากยานไพโอเนียร์11 (11)"
 anomaly.105.name:0 "บทเพลงยามวันวาน"
 anomaly.105.desc:0 "แผ่นเสียงสีทองพุ่งชนกระจกหน้าของยาน [Root.GetName] ขณะที่กำลังสำรวจสนามแรงโน้มถ่วงที่อ่อนของ [From.GetName] วัตถุดังกล่าวได้รับการกู้คืน และการวิเคราะห์เบื้องต้นบ่งชี้ว่าร่องขนาดเล็กบนพื้นผิวของแผ่นเสียงอาจเป็นข้อมูลเสียงและวิดีโอที่เข้ารหัสไว้ ซึ่งสร้างขึ้นโดยอารยธรรมต่างดาวบางแห่ง"
 anomaly.105.a:0 "มันอาจจะเหมาะที่จะใช้เป็นที่รองแก้วสำหรับแก้วเครื่องดื่มขนาดใหญ่พิเศษ"
 anomaly.105.b:0 "ถอดรหัสข้อมูล"
 anomaly.105.c:0 "นักสะสมเครื่องเสียงต่างดาวจะยอมจ่ายเงินก้อนโตเพื่อสิ่งนี้แน่นอน"
 anomaly.105.b.tooltip:0 "เพิ่มพิกัดของระบบสุริยะ(ระบบโซล)ลงในบันทึกสถานการณ์(บันทึกระบบ)\n"
 anomaly.106.name:0 "ผืนแผ่นดินโลก"
 anomaly.106.desc.neutral:0 "พิกัดทิศทางที่สรุปได้จากบันทึกภาพและเสียงค่อนข้างมีความแม่นยำสูง\n\nนี่คือระบบสุริยะ(โซล)ระบบดาว) โดยแผ่นเสียงนั้นมีต้นกำเนิดมาจากดาวเคราะห์ที่นักดาราศาสตร์ของเราตั้งชื่อให้ว่า โลกสุริยะ3 (โซลที่ 3)"
 anomaly.106.desc.phobe:0 "พวกเราได้พบต้นกำเนิดของแผ่นเสียงราคาถูกที่เรากู้คืนมาแล้ว ระบบสุริยะเป็นเพียงจุดเล็กๆ ในห้วงอวกาศที่มีศูนย์กลางอยู่ที่ดาวแคระเหลืองที่น่าเวทนา ดินแดนห่างไกลความเจริญที่ถูกรัศมีอันรุ่งโรจน์ของ [Root.Owner.GetName] บดบังจนหมดสิ้น"
 anomaly.106.desc.phile:0 "ในที่สุดพวกเราก็มาถึงระบบสุริยะ ปลายทางที่สิ่งมีชีวิตบางตนพยายามสื่อสารผ่านสื่อที่เป็นระบบดั้งเดิมอย่างยิ่งยวด จุดเริ่มต้นของแผ่นเสียงดูเหมือนจะเป็นดาวหินดวงที่สามนับจากดวงอาทิตย์ ซึ่งควรจะเป็นดาวเคราะห์ประเภทภาคพื้นทวีป"
 anomaly.106.a.neutral:0 "ชายฝั่งอันห่างไกลอย่างแท้จริง"
 anomaly.106.a.phobe:0 "เพื่อแสดงจุดยืน ทิ้งแผ่นเสียงนั้นลงในดวงอาทิตย์ของพวกเขาซะ"
 anomaly.106.a.phile:0 "พวกเจ้าได้ร้องตะโกนเข้าสู่อวกาศอันว่างเปล่า และตอนนี้พวกเรามาหาแล้ว"
 anomaly.110.name:0 "เสียงเพรียกจากอดีต"
 anomaly.110.desc:1 "ในป้อนปราการที่ถูกทิ้งร้างบนพื้นผิวของ [From.GetName] ซึ่งดูเหมือนจะเป็นฐานที่มั่นของอารยธรรม [Owner.GetPreFTLLowerPlural] ที่สูญสิ้นไปนานแล้ว แผ่นเสียงสีทองแผ่นหนึ่งวางอยู่บนแท่นใต้สปอร์ฝุ่นหนาทึบ\n\nในคราแรกคาดว่าเป็นวัตถุโบราณต่างดาวที่มีความสำคัญไม่มากนัก หรืออาจเป็นสิ่งศักดิ์สิทธิ์ทางศาสนาของเอเลี่ยน ทว่าคอมพิวเตอร์หอจดหมายเหตุระบุได้ในเวลาต่อมาว่ามันคือแผ่นเสียงฟอนโทกราฟสีทองที่ส่งไปพร้อมกับยานอวกาศวอยเอเจอร์(เครื่องส่ง)"
 anomaly.110.a:0 "เล่นแผ่นเสียงนั่นซะ เดี๋ยวนี้เลย"
 anomaly.115.name:0 "ห้องขังเซลล์"
 anomaly.115.desc:0 "[From.GetName] มีโพรงอยู่บางส่วน ภายในโครงสร้างภายในมีส่วนที่แผ่ขยายเป็นรังผึ้งหนาแน่นที่สร้างจากโลหะผสมที่ไม่รู้จัก ซึ่งเป็นที่เก็บภาชนะบรรจุสารพันธุกรรมของมนุษย์ต่างดาว ดูจากทุกองค์ประกอบแล้ว นี่คือหอจดหมายเหตุแห่งชีวิต บันทึกทางพันธุกรรมของอารยธรรมก่อนหน้าที่รุ่งเรืองและดับสูญไป ดีเอ็นเอส่วนใหญ่เสื่อมสภาพไปจนหมดสิ้นแล้ว ทว่าก็ยังมีอะไรให้เรียนรู้อีกมากที่นี่"
 anomaly.115.b.evopred: "ช่างเอาใจใส่ดีเสียจริง!"
 anomaly.120.name:0 "เสาหินขนาดใหญ่มาก"
 anomaly.120.desc:0 "[From.GetName] ไม่มีใครอยู่ ไม่สามารถอยู่อาศัยได้จริง และไม่มีใครมาเยี่ยมเยียน พื้นผิวของมันเต็มไปด้วยศิลาจารึกสูงที่แกะสลักจากแร่บางชนิดที่ไม่มีบนดาว เห็นได้ชัดว่าถูกวางไว้ที่นี่โดยการแข่งขันในอวกาศที่มีความโน้มเอียงทางศิลปะ เส้นที่อยู่บนเสาหินสามารถนำไปสร้างแผนภูมิประวัติศาสตร์ได้ง่าย ดังนั้นมันจึงต้องเป็นเรื่องราวอย่างแน่นอน\n\nแน่นอน"
 anomaly.120.a:0 "วาดภาพพวกมันแล้วเก็บไว้ในคลังข้อมูล"
 anomaly.120.b:0 "พวกมัน... สวยงาม"
 anomaly.120.b.tooltip:2 "สร้างการจำลองเสาหินแบบดิจิทัลใน §Yจักรวรรดิ§! ของเรา"
 anomaly.121.desc:0 "ภาพจำนวนมากที่มีคำอธิบายประกอบที่พบใน [From.From.GetName] ได้รับความนิยมอย่างมากใน [Root.GetName]\n\nประชาชนหลายคนกล่าวว่าพงศาวดารแฟนตาซีนี้ได้เปลี่ยนความรู้สึกที่มีต่อมนุษย์ต่างดาวไปอย่างสิ้นเชิง"
 anomaly.121.a.tooltip:0 "ประชากร (ประชากร) §Y600§! £pop£ §Hหน่วย§! ได้รับจริยธรรมแบบ §Yฝักใฝ่ต่างดาว(เสียงตกใจ)§!"
 anomaly.121.b.tooltip:0 "ประชากร (ประชากร) §Y300§! £pop£ §Hหน่วย§! ได้รับจริยธรรมแบบ §Yฝักใฝ่ต่างดาว(เสียงตกใจ)§!"
 anomaly.125.name:0 "การทำแผนที่ที่ไม่ได้รับเชิญ"
 anomaly.125.desc:0 "หลังจากดักจับสัญญาณขอความช่วยเหลือ ยาน [Root.GetName] ส่งยานสำรวจลงไปยังพื้นผิวที่ผันผวนของ [From.GetName] ดูเหมือนว่ายานขนส่งสินค้าที่ไม่ได้จดทะเบียนจะเพิ่งตกบนดาวเคราะห์ดวงนี้ สิ่งที่มันบรรทุกมาได้กลายเป็นโคลนเถ้าถ่านไปหมดแล้ว ทว่าข้อมูลบางส่วนจากคอมพิวเตอร์นำทางยังสามารถกู้คืนมาได้ และสามารถฟื้นฟูข้อมูลการสำรวจระบบดาวนี้ขึ้นมาใหม่ได้"
 anomaly.125.a:0 "ดำเนินการตามนั้น"
 anomaly.130.name:0 "แรงโน้มถ่วงบดขยี้"
 anomaly.130.desc:0 "การสำรวจดาวเคราะห์น้อยของยาน [Root.GetName] ต้องหยุดชะงักชั่วคราวเมื่อยานสำรวจถูกดักไว้ด้วยความแปรปรวนของแรงโน้มถ่วงที่ผิดปกติ\n\nตัวยานสำรวจสามารถส่งข้อมูลบางส่วนกลับมาได้ก่อนที่จะถูกแรงโน้มถ่วงมหาศาลบดขยี้อย่างรุนแรง — ซึ่งพลังงานเหล่านั้นได้สลายตัวไปจนหมดสิ้นในเวลาต่อมา"
 anomaly.130.a:0 "อย่างน้อยก็ไม่มีใครได้รับบาดเจ็บ"
 anomaly.135.name:0 "สวนสนุกร้าง"
 anomaly.135.desc:1 "โครงสร้างสิ่งก่อสร้างบน [From.GetName] ไม่ได้เก่าแก่เหมือนอย่างที่เราเชื่อในตอนแรก มันเป็นสนามเด็กเล่นหรือสวนสนุกประเภทหนึ่ง เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ชี้ว่ากลไกเครื่องเล่นหลายอย่างเป็นสิ่งประดิษฐ์ที่ซับซ้อนมากซึ่งเราสามารถเรียนรู้อะไรได้มากมาย และจากมุมมองของเอเลี่ยนผู้สร้าง นี่อาจเป็นอาร์เรย์เซนเซอร์ที่ล้ำสมัยหรือแม้กระทั่งผลงานศิลปะจัดวางขนาดยักษ์\n\nอย่างไรก็ตาม สำหรับพวกเรา [Root.Owner.GetSpeciesNamePlural] แล้ว มันดูเหมือนสถานที่ที่คุณจะพาลูกหลานของคุณไปทำกิจกรรมสนุกสนานกันเสียมากกว่า"

 anomaly.140.name:0 "ศาลเจ้าที่คุ้นเคย"
 anomaly.140.desc:1 "ดาวเคราะห์น้อยส่วนใหญ่ถูกสลักด้วยเลเซอร์ด้วยความแม่นยำสูงให้มีลักษณะคล้ายวิหารขนาดเล็กของ [Root.Owner.GetSpeciesName]: ศาลเจ้าบูชา §Yพระผู้ไม่ถูกเอ่ยถึง(เสียงประตู)§! มหาเทพแห่งการทำลายล้างของลัทธิความเชื่อเก่าแก่หลายลัทธิของ [Root.Owner.GetSpeciesAdj]\n\nวิหารแห่งนี้ได้หมุนเคว้งคว้างผ่านความเงียบสงบของอวกาศมานานกว่าช่วงเวลาที่เราสามารถเดินทางในอวกาศได้เสียอีก — ซึ่งเป็นการค้นพบที่สร้างความกังวลใจให้แก่นักวิจัยของเราไม่น้อย\n\nแม้จะมีความน่ากังวลในการค้นพบนี้ เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ได้เสนอให้พวกเราค้นหาวัตถุเพิ่มเติมที่มีลักษณะตรงกับวิหารอวกาศแห่งนี้ [Root.leader.GetHeSheCap] [Root.leader.GetHasHave] ได้จัดทำรายการของเป้าหมายที่มีความเป็นไปได้ในระบบดาวฤกษ์ข้างเคียงไว้แล้ว"
 anomaly.140.a:0 "บางทีการไม่ทำอะไรน่าจะเป็นหนทางที่ดีที่สุด"
 anomaly.140.a.tooltip:1 "§Lปล่อยให้ทวยเทพที่หลับใหลได้นิ่งสงบเถิด§!"
 anomaly.140.b:0 "ถ้าอย่างนั้นเราก็ออกเดินทางไปหาคำตอบกันเถอะ"
 anomaly.140.c:0 "เราจะไม่ยอมทนต่อลัทธินอกรีตนี้"
 anomaly.140.c.tooltip:0 "สั่งการให้ [Root.GetName] ทำลายศาลเจ้านั่นทิ้งเสีย"
 anomaly.142.name:0 "ทวยเทพโบราณ: การเข้าหาพระผู้ทรงโปรดปราน(เบนฟิคเตอร์)"
 anomaly.142.desc:1 "ยาน [Root.GetName] ได้เข้าสู่ระบบดาว [Root.GetStarName] ลูกเรือรายงานว่าดาวฤกษ์ดวงนี้มีวัตถุอีกชิ้นหนึ่งโคจรรอบอยู่ซึ่งไม่ได้แตกต่างจากศาลเจ้าของพระผู้ไม่ถูกเอ่ยถึง(เสียงประตู)เลย"
 anomaly.142.a:0 "พวกเราลองไปตรวจสอบดูกันเถอะ"
 anomaly.143.name:0 "ทวยเทพโบราณ: การเข้าหาพระผู้ไม่ย่นย่อ(ผู้ไม่ลดละ)"
 anomaly.143.desc:1 "ยาน [Root.GetName] ได้เข้าสู่ระบบดาว [Root.GetStarName] ซึ่งลูกเรือรายงานวัตถุอีกชิ้นหนึ่งในวงโคจรที่มีความคล้ายคลึงกับศาลเจ้าของพระผู้ไม่ถูกเอ่ยถึง(เสียงประตู)อย่างยิ่ง"
 anomaly.143.a:0 "งานที่ดี"
 anomaly.144.name:0 "ทวยเทพโบราณ: การเข้าหาพระผู้ตระหนักรู้(เสียงม้า)"
 anomaly.144.desc: "แม้จะเตรียมใจว่าการค้นหาศาลเจ้าของพระผู้ตระหนักรู้(เสียงม้า)จะทำได้ยาก ทว่าลูกเรือของ [Root.GetName] ก็ไม่ได้คาดคิดว่าจะได้เห็นการชี้ทางระบุตำแหน่งอย่างเด่นชัดทันทีที่เข้าสู่ระบบดาว [Root.GetStarName] รูปแบบแร่ประดิษฐ์ได้รับการจารึกไว้รอบๆ วัตถุท้องฟ้าในระบบซึ่งชี้ตรงไปยังพิกัดศูนย์กลางเดียวกัน"
 anomaly.144.a:0 "ฉันเข้าใจแล้ว"

 anomaly.145.name:0 "เสียงดนตรีที่พวกเขารังสรรค์"
 anomaly.145.desc:1 "เหล่าสัตว์ป่าบน [From.GetName] — ทั้งผู้ล่าและผู้ถูกล่าต่างมารวมตัวกันเมื่อรัตติกาลมาเยือน และ... ขับร้องบทเพลง\n\nเสียงหอน เสียงคลิก เสียงเจื้อยแจ้ว เสียงคำราม และเสียงขู่ฟ่อ ในตอนแรกฟังดูไม่ประสานเสียงกัน ทว่าเบื้องลึกกลับมีท่วงทำนองที่จำแนกได้ ลูกเรือของยาน [Root.GetName] แนะนำว่ามันฟังดูค่อนข้างไพเราะน่าฟังเลยทีเดียว\n\nพวกเราเชื่อว่าต้องมีอิทธิพลจากภายนอกเข้ามาแทรงแซงเพื่อพัฒนาคณะประสานเสียงที่ไม่มีสติปัญญานี้ขึ้นมา เราไม่สามารถเข้าใจเหตุผลเบื้องหลังได้ ทว่าเราอาจจะสามารถหาคำตอบว่าพวกมันทำได้อย่างไร"
 anomaly.145.b.evopred: "การสื่อสารที่ดีขึ้นผ่านทางเคมี"
 anomaly.150.name:0 "ดินแดนใต้แร่ซโร(ลม)ซโร)"
 anomaly.150.desc:1 "[From.GetName] ไม่เพียงแต่เป็นดาวยักษ์น้ำแข็งเท่านั้น แต่เป็นดาวยักษ์น้ำแข็งที่ประกอบไปด้วยของแข็งที่ผิดปกติอย่างยิ่ง มีแหล่งแร่ซโร(ซโร)ตกค้างอยู่ภายในระดับความลึกที่สามารถเข้าถึงได้ของชั้นบรรยากาศด้านบนดาวเคราะห์ดวงนี้"
 anomaly.150.a.tooltip:0 "พบแหล่งแร่สะสม §Yน้ำแข็งซโร(ซโรน้ําแข็ง)§!"
 anomaly.155.name:0 "สสารต้องห้าม"
 anomaly.155.desc:1 "ยาน [Root.GetName] ค้นพบเทคโนโลยีอันซับซ้อนที่น่ารำคาญซ่อนอยู่ในหลุมลึกบนพื้นผิวของดาวเคราะห์น้อย\n\nเห็นได้ชัดว่ามีบางคนจัดการทำให้รูหนอนแบบทิศทางเดียวมีความเสถียรด้วยวิธีการที่ค่อนข้างเรียบง่าย เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] เสนอว่าดาวเคราะห์น้อยนี้เป็นจุดทางออก ส่วนปลายอีกด้านเปิดอยู่ที่ใดสักแห่งในอวกาศที่ยังไม่ได้สร้างแผนที่ซึ่งห่างออกไปหลายปีแสงจากหลุมดำ และสสารมืด(ลองดีเจ)ปริมาณเล็กน้อยกำลังรั่วไหล — ถูกสูบไหล — ผ่านรูหนอนเข้ามา\n\nผู้ใดก็ตามที่ติดตั้งสิ่งนี้ดูเหมือนจะละทิ้งการดำเนินงานไปนานแล้ว"
 anomaly.155.a.tooltip:0 "พบแหล่งแร่สะสม §Yสสารมืด(ลองดีเจ)§!"
 anomaly.160.name:0 "สายฝนสีม่วง"
 anomaly.160.desc:0 "ภาพถ่ายสายฝนสีม่วงชวนหลงใหลของ [From.GetName] ที่ถ่ายโดยยานสำรวจพื้นผิวของ [Root.GetName] หลุดรอดไปถึงมือกลุ่มปัญญาชนทางวัฒนธรรมบน [Root.Owner.Capital.GetName]\n\nแม้การค้นพบนี้จะไม่มีคุณค่าทางวิทยาศาสตร์ แต่ภาพอันน่าประทับใจของหยาดฝนหลากสีได้จุดประกายการฟื้นฟูศิลปวิทยาการย่อยๆ ในแวดวงศิลปะของ [Root.Owner.GetSpeciesName] ซึ่งผลลัพธ์เชิงบวกจะแผ่ขยายไปอีกหลายปีต่อจากนี้"

 anomaly.165.name:0 "ทวยเทพโบราณ: ศาลเจ้าบูชาพระผู้ทรงโปรดปราน"
 anomaly.165.desc:1 "การถอดรหัสอักษรภาพในศาลเจ้าบูชาพระผู้ทรงโปรดปราน (Benefactress) ดำเนินไปอย่างราบรื่นกว่าที่คาดไว้ นักภาษาศาสตร์ที่ได้รับมอบหมายโครงการอธิบายว่าข้อความเหล่านี้มีความคุ้นเคยบางอย่าง: ทำให้พวกเขาเข้าใจได้อย่างง่ายดาย แม้ไวยากรณ์จะเก่าแก่และซับซ้อนก็ตาม\n\nอย่างไรก็ตาม พวกเขาตั้งข้อสังเกตว่าข้อความที่เขียนเหล่านี้อ้างถึงประเด็นและบริบทที่คลุมเครืออย่างแท้จริง เราไม่สามารถเข้าใจข้อความของพวกเขาได้อย่างสมบูรณ์จนกว่าจะนำไปรวมเข้ากับข้อความอื่นๆ ที่เกี่ยวข้องกับคณะเทวภาพสี่พระองค์ (quadrumvirate godhead) นี้"
 anomaly.166.name:0 "ทวยเทพโบราณ: ศาลเจ้าบูชาพระผู้ไม่ย่นย่อ"
 anomaly.166.desc:2 "หลังจากทุ่มเทความพยายามอย่างระมัดระวังและเจ็บปวดมาหลายวัน เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ได้กู้คืนคัมภีร์พระผู้ไม่ย่นย่อ(เสียงหึ่ง)ม้วนคัมภีร์ผ้าธรรมดาที่เคลือบด้วยพอลิเมอร์พลาสติกที่ทนทาน ม้วนคัมภีร์ดังกล่าวได้รับการนำกลับไปยัง [Root.GetName] เพื่อวิเคราะห์เพิ่มเติม"
 anomaly.167.name:0 "ทวยเทพโบราณ: ศาลเจ้าบูชาพระผู้ตระหนักรู้"
 anomaly.167.desc:1 "เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] รายงานกลับมาจากศาลเจ้าของพระผู้ตระหนักรู้ (Percipient)\n\nผนังของมันประดับไปด้วยอักษรภาพสัญลักษณ์ (logographic script) ซึ่งบิดเบี้ยวอย่างมากจากชั้นแล็กเกอร์ป้องกัน ความพยายามครั้งแรกในการถอดรหัสข้อความนี้ล้มเหลวเนื่องจากไวยากรณ์แตกต่างจากกลุ่มภาษาอื่นๆ ที่เราเคยพบมาก่อน ลูกเรือของ [Root.GetName] พยายามถอดแผ่นแล็กเกอร์ป้องกันออกเพื่อให้เห็นภาพที่ชัดเจนขึ้น แต่ก็ไม่เป็นผล\n\nภารกิจกำลังจะถูกประกาศว่าเป็นความล้มเหลว เมื่อ [Root.GetLeaderName] กำลังจะระเบิดอารมณ์ฉุนเฉียวออกมา ทว่าเขากลับเริ่มรับรู้ถึงเส้นสายข้อความที่สอดคล้องประสานกันอย่างชัดเจนขึ้นมาทันที\n\nลูกเรือใช้เวลาไม่นานในการนำข้อมูลเชิงลึกเหล่านี้มาใช้เป็นรหัสถอดข้อความ ไม่นานพวกเขาก็ถ่ายภาพเพดาน ผนัง และพื้นดินเป็นลวดลายก้นหอย: ซึ่งเป็นส่วนหนึ่งของภาพรวมที่กว้างขึ้นซึ่งเราเชื่อว่าอาจสมบูรณ์ขึ้นได้หากใช้ข้อความจากศาลเจ้าแห่งอื่นๆ ประกอบด้วย"
 anomaly.168.name:0 "ทวยเทพโบราณ: นิมิตเผยแผ่สัจธรรม"
 anomaly.168.desc:1 "คำสอนที่สมบูรณ์ของทวยเทพ — ซึ่งเป็นวิถีที่เราเชื่อว่าควรระลึกถึงข้อความที่กู้คืนมาเหล่านี้ — เป็นทั้งเครื่องชี้นำความจริงและทำลายจินตนาการที่เป็นรากฐานของศาสนาโบราณของเราไปอย่างสิ้นเชิง\n\nเมื่อนำมาพิจารณาในบริบทที่มี [Root.GetSpeciesAdj] เป็นศูนย์กลาง ข้อความเหล่านี้ระบุไว้อย่างชัดเจนว่าพวกเราถูกกำหนดมาเพื่อความยิ่งใหญ่ โดยมีผู้นำศาสนาคอยชี้นำทางด้วยมือที่แข็งแกร่ง เราถูกลิขิตมาสู่ความเป็นเทพ ทว่าอดีตของเรากลับเต็มไปด้วยคำทำนายที่ไม่เป็นจริงและบาปที่เกิดจากความไม่รู้ การไถ่บาปนั้นเป็นเพียงเรื่องชั่วคราวเท่านั้น"
 anomaly.168.a:0 "ปิดบังข้อมูลที่ค้นพบ"
 anomaly.168.a.tooltip:1 "§Lความรู้คือพลัง ความลับคือพลังที่ซ่อนเร้น§!"
 anomaly.168.b:1 "พวกเราสามารถนำมันมาสร้างรายได้ได้"
#  anomaly.168.b.tooltip:0 "Some of the wealthier faith-corporations have caught wind of the affair, and are very interested."
 anomaly.168.c:0 "ทว่าเราสามารถเรียนรู้อะไรจากเรื่องนี้ได้บ้าง?"
#  anomaly.168.c.tooltip:0 "Regardless of the veracity or validity of the sacred texts, the fact remains that we share religious concepts with some older, unknown spacefaring race."
 anomaly.168.d:1 "พวกเราก้าวตามรอยเท้าของสิ่งศักดิ์สิทธิ์!"
 #anomaly.168.d.tooltip:1 "Start a religious renaissance.\nYour native population gains the §YFanatic Spiritualist§! and §YAuthoritarian§! Ethics."
