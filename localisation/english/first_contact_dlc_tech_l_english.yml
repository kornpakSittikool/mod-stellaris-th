 sm_listening_post_unusual_senses_desc:0 "ทุกๆ §Y3§! §H$sm_detection_array_plural$§! จะให้:\n$t$$CLOAKING_DETECTION$: §G+1§!\n$t$$SENSOR_RANGE$: §G+1§!"
 tech_new_numbers:0 "ตัวเลขแบบใหม่"
 tech_new_numbers_desc:0 "หลังจากศึกษาหลายอารยธรรมก่อนความเร็วเราตระหนักว่ามีวิธีทางเลือกมากมายในการคำนวณเอกภพ มันยังได้นำตัวเลขแบบใหม่เข้าสู่คณิตศาสตร์ของเราอีกด้วย"
 tech_trinary_computing:0 "การคำนวณแบบไตรนารี"
 tech_trinary_computing_desc:0 "สังคมที่แตกต่างกันได้พัฒนาวิธีแก้ปัญหาด้านลอจิสติกส์และการประมวลผลของตนขึ้นมา แนวคิดแบบต่างดาวเหล่านี้ทำให้เราปรับตัวเข้ากับโครงสร้างของจักรวรรดิต่างชาติได้ง่ายขึ้น"

 tech_atmospheric_orbital_mechanics:0 "กลศาสตร์วงโคจรในชั้นบรรยากาศ"
 tech_atmospheric_orbital_mechanics_desc:0 "จากประสบการณ์อันยาวนานในการปฏิบัติการสถานีสังเกตการณ์เหนือดาวก่อนความเร็วเราค้นพบการปรับแต่งเล็กน้อยบางประการ เมื่อนำไปใช้ทั่วจักรวรรดิ เราจะลดค่าบำรุงรักษาสถานีของเราได้อย่างมาก"
 mod_stations_upkeep_mult:0 "การบำรุงรักษาสถานี"

 tech_predatory_tactics:0 "กลยุทธ์นักล่า"
 tech_predatory_tactics_desc:0 "เช่นเดียวกับที่สิ่งมีชีวิตก่อนความเร็วที่ชาญฉลาดเคลื่อนที่ปกปิดกันเองเมื่อเข้าประชิดศัตรู นักบินของเราก็สามารถเคลื่อนที่ได้เร็วขึ้นโดยไม่รบกวนสนามพรางตัวเช่นกัน"
 tech_predatory_tactics_effect:0 "การสูญเสียความเร็วใต้แสงจากการพรางตัว: §G-50%§!"
