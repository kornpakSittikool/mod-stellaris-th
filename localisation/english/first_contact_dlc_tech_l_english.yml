 tech_unusual_senses:0 "ประสาทสัมผัสที่ไม่ธรรมดา"
 tech_unusual_senses_desc:0 "ไม่มีสิ่งใดสร้างสรรค์ไปกว่าวิวัฒนาการตามธรรมชาติ ด้วยการศึกษาวิธีที่สังคมก่อนความเร็วมองโลกของตน เราได้คิดค้นวิธีใหม่ในการตรวจจับยานที่ไม่ได้รับเชิญ"
