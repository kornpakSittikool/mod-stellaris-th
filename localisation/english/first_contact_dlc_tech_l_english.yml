 tech_satisfying_insults:0 "คำดูถูกสุดเจ็บแสบ"
 tech_satisfying_insults_desc:0 "ไม่มีสิ่งใดทรงพลังเท่าคำด่าที่แทงใจ และตอนนี้เรารู้วิธีดูหมิ่นต้นตระกูลของเผ่าพันธุ์ต่างๆ ได้ในหลากหลายภาษา"
 tech_satisfying_insults_effect:0 "ได้รับผลประโยชน์จากการดูถูกอีกจักรวรรดิหนึ่งทุกๆ §Y5 ปี§!"
 satisfying_insult_cooldown:1 "\n\nเราจะยังไม่ได้รับผลประโยชน์จาก §Hคำดูถูกสุดเจ็บแสบ§! จนกว่าตัวปรับแต่งปัจจุบันจะหมดอายุ"
 gain_satisfying_insult_recently:0 "\n\nเราจะได้รับตัวปรับแต่ง §Hคำดูถูกสุดเจ็บแสบ§! เป็นเวลา 5 ปี พร้อมทั้งได้รับ §G50§! £influence£ อิทธิพล"
 MESSAGE_SATISFYING_INSULTS_TITLE:0 "คำดูถูกสุดเจ็บแสบพร้อมใช้"
 MESSAGE_SATISFYING_INSULTS:0 "[Root.GetLinguists] ของเราได้พัฒนาคำดูถูกสุดเจ็บแสบแบบใหม่เสร็จแล้ว ตอนนี้เราต้องหาเป้าหมายให้มันเท่านั้น"
 satisfying_insult_recently:0 "คำดูถูกสุดเจ็บแสบ"
 satisfying_insult_recently_desc:0 "นั่นเจ็บแสบจริงๆ!"

 tech_compact_living:0 "การอยู่อาศัยแบบกะทัดรัด"
 tech_compact_living_desc:0 "แม้จะไม่มีอารยธรรมใดมีคำตอบสมบูรณ์แบบต่อความท้าทายอันขยายตัวไม่สิ้นสุดของการปกครองรัฐที่เติบโตขึ้น เราก็พบคำตอบบางส่วนแล้ว หลังจากศึกษาสปีชีส์และรัฐบาลจำนวนมาก เราค้นพบสมดุลอันยอดเยี่ยมระหว่างความยืดหยุ่นและการใช้งาน"

 tech_alien_topography:0 "ภูมิประเทศต่างดาว"
 tech_alien_topography_desc:0 "อารยธรรมจะรุ่งเรืองในพื้นที่ที่เอื้อต่อการเติบโต และด้วยการวิเคราะห์ว่าชุมชนส่วนใหญ่ของสังคมก่อนความเร็วเจริญรุ่งเรืองอยู่ที่ใด เราจะดึงศักยภาพจากอาณานิคมของเราได้มากขึ้น"

 tech_xeno_aesthetics:0 "สุนทรียศาสตร์ต่างดาว"
 tech_xeno_aesthetics_desc:0 "หลังจากวิเคราะห์ศิลปินจำนวนมากจากวัฒนธรรมที่แตกต่างกันสุดขั้ว เราก็ได้ข้อสรุปทั่วไปขึ้นมา การศึกษาศิลปะและวัฒนธรรมของอารยธรรมหนึ่งจะทำให้เราได้เปรียบพวกเขาในการรบ"

 tech_lost_building_methods:0 "วิธีก่อสร้างที่สูญหาย"
 tech_lost_building_methods_desc:0 "อารยธรรมใดก็ตามที่มีประวัติศาสตร์ยาวนานพอ ย่อมมีตัวอย่างสิ่งมหัศจรรย์อันยิ่งใหญ่ที่สร้างโดยบรรพชนผู้ถูกลืมและไม่อาจทำซ้ำได้อีก โชคดีที่เราได้บันทึกผลงานของบรรพชนผู้ยิ่งใหญ่เหล่านี้ไว้ตั้งแต่เมื่อพวกเขาปรากฏตัวบนโลกก่อนความเร็ว"

 tech_supreme_alloy:0 "โลหะผสมไร้เทียมทาน"
 tech_supreme_alloy_desc:0 "สิ่งที่เราเคยคิดว่าเป็นโลหะผสมที่ยอดเยี่ยมที่สุด กลับห่างไกลจากความจริงอย่างยิ่ง กระบวนการถลุงของสังคมก่อนความเร็วนับไม่ถ้วนถูกจัดทำบันทึกไว้ และตอนนี้เราได้สังเคราะห์โลหะที่ไร้เทียมทานขึ้นมาแล้ว"

 tech_ordered_retreat:0 "การล่าถอยอย่างเป็นระเบียบ"
 tech_ordered_retreat_desc:0 "แม้การศึกษาผู้ชนะสงครามจะเป็นวิธีที่ชัดเจนที่สุดในการเรียนรู้จากการรบ แต่การสังเกตผู้แพ้บนโลกก่อนความเร็วได้สอนเราว่าจะจัดการการถอนกำลังของเราให้มีประสิทธิภาพมากขึ้นอย่างไร"

 tech_temple_of_transportation:0 "วิหารแห่งคมนาคม"
 tech_temple_of_transportation_desc:0 "เครือข่ายการขนส่งนำผู้คนมารวมกัน เป็นแนวคิดที่อารยธรรมจำนวนมากที่เราสังเกตต่างก็มีร่วมกัน แม้เราไม่มีเครื่องจักรไอน้ำ เครือข่ายไฮเปอร์รีเลย์ของเราก็อาจทำหน้าที่คล้ายกันได้"

