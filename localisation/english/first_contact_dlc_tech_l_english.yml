############
# Cloaking #
############

# Technologies
 tech_cloaking_1:0 "สนามพลัง B.C. (พรางตัว)"
 tech_cloaking_1_desc:0 "สนามอนุภาคที่ดัดแปลงแล้วทำให้ยานของเราสามารถ 'ซ่อนตัว' อยู่ในอวกาศเปิดได้อย่างมีประสิทธิภาพ อย่างไรก็ตาม สิ่งนี้ต้องแลกมากับการทำให้ระบบโล่พลังงานรูปแบบอื่นที่ปกติจะปกป้องยานเกิดความไม่เสถียร"
 tech_cloaking_2:0 "สนามพลังเอ.ซี.พรางตัว)"
 tech_cloaking_2_desc:0 "ความก้าวหน้าในเทคโนโลยีการหักเหผ่านเลนส์ผลึกหายากได้เพิ่มประสิทธิภาพการพรางตัวอย่างมาก"
 tech_cloaking_3:0 "สนามพลัง E.C. (พรางตัว)"
 tech_cloaking_3_desc:0 "เทคโนโลยีพรางตัวทั่วไปอาจรบกวนเครื่องมือที่ละเอียดอ่อนของยานอย่างหนัก แต่สนามชั้นยอดเหล่านี้ทำให้ข้อกังวลดังกล่าวหมดไป"
 tech_cloaking_dark_matter:0 "สนามพลัง D.M.C. (พรางตัว)"
 tech_cloaking_dark_matter_desc:0 "อุปกรณ์นี้ใช้สสารมืดบิดเบือนปริภูมิ-เวลารอบยาน ทำให้ตรวจจับได้ยากอย่างยิ่ง"
 tech_cloaking_psi:0 "เครื่องกำเนิดสนามพรางตัว (พลังจิต)"
 tech_cloaking_psi_desc:0 "เครื่องกำเนิดสนาม Psi-Phase จะรวมศักยภาพทางพลังจิตของลูกเรือเพื่อผลักยานให้เฟสซ้อนเข้าไปในชราวด์บางส่วน สิ่งนี้ทำให้ยานไม่ถูกตรวจพบโดยทุกสิ่งยกเว้นเครือข่ายเซ็นเซอร์ที่ดีที่สุด แม้ว่าสิ่งที่ลูกเรืออาจถูกบังคับให้เห็นนั้นคงเป็นเรื่องที่ไม่ควรเอ่ยถึง"
 tech_detection_array:0 "เซ็นเซอร์ตรวจจับยานพรางตัว"
 tech_detection_array_desc:0 "ชุดเซ็นเซอร์ภายนอกกำลังสูงที่สามารถตรวจจับกองยานพรางตัวได้\n"
 tech_dark_matter_detection:0 "เซ็นเซอร์ตรวจจับสสารมืด"
 tech_dark_matter_detection_desc:0 "ห้องเรโซแนนซ์สสารมืดจะเพิ่มประสิทธิภาพของชุดตรวจจับของเราอย่างมาก"
 tech_assisted_detection:0 "อัลกอริทึมตรวจจับขั้นสูง"
 tech_assisted_detection_desc:0 "การเชื่อมชุดตรวจจับเข้ากับคอมพิวเตอร์บนยานวิทยาศาสตร์ของเราจะเพิ่มความละเอียดในการสแกนได้อย่างมหาศาล"
 feature_assist_cloaking_detection_unlocked:0 "ตรวจจับการพรางตัว"
 feature_assist_cloaking_detection_unlocked_desc:0 "สั่งให้ยานวิทยาศาสตร์ช่วยเหลือการตรวจจับการพรางตัวของสถานี"
 feature_active_reconnaissance_unlocked:0 "เปิดใช้งานการสอดแนม"
 feature_active_reconnaissance_unlocked_desc:0 "สั่งให้ยานวิทยาศาสตร์ดำเนินการสอดแนมอาณานิคมอย่างลับๆ เพื่อเพิ่มอัตราการได้รับข่าวกรองเกี่ยวกับจักรวรรดิเจ้าของอาณานิคม"

# Ship Components
 TECH_UNLOCK_CLOAKING_1_TITLE:0 "§Hปลดล็อกส่วนประกอบ:§! $CLOAKING_1$"
 TECH_UNLOCK_CLOAKING_1_DESC:0 "§Hเครื่องกำเนิดสนามพลัง B.C.§!\nสนามอนุภาคที่ดัดแปลงแล้วทำให้ยานของเราสามารถ 'ซ่อนตัว' อยู่ในอวกาศเปิดได้อย่างมีประสิทธิภาพ อย่างไรก็ตาม สิ่งนี้ต้องแลกมากับการทำให้ระบบโล่พลังงานรูปแบบอื่นที่ปกติจะปกป้องยานเกิดความไม่เสถียร"
 TECH_UNLOCK_CLOAKING_2_TITLE:0 "§Hปลดล็อกส่วนประกอบ:§! $CLOAKING_2$"
 TECH_UNLOCK_CLOAKING_2_DESC:0 "§Hเครื่องกำเนิดสนามพลัง A.C.§!\nความก้าวหน้าในเทคโนโลยีการหักเหผ่านเลนส์ผลึกหายากได้เพิ่มประสิทธิภาพการพรางตัวอย่างมาก"
 TECH_UNLOCK_CLOAKING_3_TITLE:0 "§Hปลดล็อกส่วนประกอบ:§! $CLOAKING_3$"
 TECH_UNLOCK_CLOAKING_3_DESC:0 "§Hเครื่องกำเนิดสนามพลังอี.ซี.§!\nเทคโนโลยีพรางตัวทั่วไปอาจรบกวนเครื่องมือที่ละเอียดอ่อนของยานอย่างหนัก แต่สนามชั้นยอดเหล่านี้ทำให้ข้อกังวลดังกล่าวหมดไป"
 TECH_UNLOCK_CLOAKING_DARK_MATTER_TITLE:0 "§Hปลดล็อกส่วนประกอบ:§! $CLOAKING_DARK_MATTER$"
 TECH_UNLOCK_CLOAKING_DARK_MATTER_DESC:0 "§Hเครื่องกำเนิดสนามพลัง D.M.C.§!\nอุปกรณ์นี้ใช้สสารมืดบิดเบือนปริภูมิ-เวลารอบยาน ทำให้ตรวจจับได้ยากอย่างยิ่ง"
 TECH_UNLOCK_CLOAKING_PSI_TITLE:0 "§Hปลดล็อกส่วนประกอบ:§! $CLOAKING_PSI$"
 TECH_UNLOCK_CLOAKING_PSI_DESC:0 "§Hเครื่องกำเนิดสนามพรางตัว (พลังจิต)§!\nเครื่องกำเนิดสนาม Psi-Phase จะรวมศักยภาพทางพลังจิตของลูกเรือเพื่อผลักยานให้เฟสซ้อนเข้าไปในชราวด์บางส่วน สิ่งนี้ทำให้ยานไม่ถูกตรวจพบโดยทุกสิ่งยกเว้นเครือข่ายเซ็นเซอร์ที่ดีที่สุด แม้ว่าสิ่งที่ลูกเรืออาจถูกบังคับให้เห็นนั้นคงเป็นเรื่องที่ไม่ควรเอ่ยถึง"

 SCIENCE_CLOAKING_EMPTY:0 "ช่องว่าง"
 science_cloaking_components:0 "เครื่องกำเนิดสนามพรางตัว"
 science_cloaking_components_desc:0 "เครื่องกำเนิดสนามพรางตัวช่วยให้ยานของเราซ่อนตัวจากเซ็นเซอร์ทั่วไปได้"
 SHIP_SHIELD_REDUCTION_CLOAKING:0 "$MOD_SHIP_SHIELD_REDUCTION$ จากการพรางตัว"
 CLOAKING_SHIELD_REDUCTION_HEADER:1 "\n$MOD_SHIP_SHIELD_REDUCTION$ จากการพรางตัว:"

