 CLOAKING_DETECTION_TITLE:0 "การตรวจจับการพรางตัว"
 CLOAKING_DETECTION_SENSOR_tt:0 "ระบบนี้อยู่ในระยะเซ็นเซอร์ของฐานดวงดาวที่มีชุดตรวจจับ กองยานที่พรางตัวซึ่งมีค่า $CLOAKING_STRENGTH$ ต่ำกว่าจะถูกตรวจพบ"
