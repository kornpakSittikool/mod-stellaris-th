 CLOAKING_DETECTION_6_DESC:0 "\nฐานดวงดาวนี้สามารถเจาะทะลุสนามพรางตัวที่มีเสถียรภาพสูงเป็นพิเศษได้\n\nการพัฒนาต่อไปจะช่วยให้ฐานดวงดาวเจาะทะลุสนามพรางตัวที่ล้ำหน้ายิ่งขึ้นได้"
 CLOAKING_DETECTION_7_DESC:0 "\nฐานดวงดาวนี้สามารถเจาะทะลุสนามพรางตัวที่มีเสถียรภาพสูงเป็นพิเศษได้\n\nการพัฒนาต่อไปจะช่วยให้ฐานดวงดาวเจาะทะลุสนามพรางตัวที่ล้ำหน้ายิ่งขึ้นได้"
 CLOAKING_DETECTION_8_DESC:0 "\nฐานดวงดาวนี้สามารถเจาะทะลุสนามพรางตัวที่มีเสถียรภาพสูงเป็นพิเศษได้\n\nการพัฒนาต่อไปจะช่วยให้ฐานดวงดาวเจาะทะลุสนามพรางตัวที่ล้ำหน้ายิ่งขึ้นได้"
 CLOAKING_DETECTION_9_DESC:0 "\nฐานดวงดาวนี้สามารถเจาะทะลุสนามพรางตัวที่มีเสถียรภาพสูงเป็นพิเศษได้\n\nการพัฒนาต่อไปจะช่วยให้ฐานดวงดาวเจาะทะลุสนามพรางตัวที่ล้ำหน้ายิ่งขึ้นได้"
 CLOAKING_DETECTION_10_DESC:0 "$CLOAKING_DETECTION_EXCEPTIONAL_DESC$\n\nไม่สามารถพัฒนาความสามารถในการตรวจจับของฐานดวงดาวนี้ได้อีกแล้ว"

