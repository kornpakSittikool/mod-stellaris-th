 # Synced from vanilla by Stellaris Thai Translator.
 # These keys were missing from the mod and should be translated on the next pass.
 STARBASE_ACTIVATE_CLOAK_DESC: "สถานีนี้§Yไม่ต้องโคลน§!.\nสั่งสถานีให้เปิดใช้งานการซักผ้า, มองข้ามการตรวจสอบโดยเซ็นเซอร์ทั่วไป$CLOAKING_COOLDOWN_TOOLTIP$"
 STARBASE_DEACTIVATE_CLOAK_DESC: "สถานีนี้§Yซ่อน§!.\nสั่งสถานีให้ทําการปิดการฟอร์แมต, อนุญาตให้เซ็นเซอร์ตรวจจับได้ทั่วไป$CLOAKING_COOLDOWN_TOOLTIP$"
 CLICK_TO_DEACTIVATE_CLOAKING: "§Gคลิกเพื่อปิดการใช้งานการอําพราง§!"
 CLICK_TO_ACTIVATE_CLOAKING: "§Gคลิกเพื่อเปิดใช้การอําพราง§!"
 STARBASE_CANT_CLOAK: "§Rสถานีนี้ไม่สามารถปกปิดได้§!"
 STARBASE_CANT_CLOAK_COMBAT: "§Rสถานี ใน การ สู้ รบ ไม่ สามารถ หลบ ซ่อน ได้§!"
 CLOAKING_STRENGTH_UNKNOWN_STARBASE_DESC:0 "ข้อมูลของคุณต่ําเกินกว่า จะตัดสินได้ถึงความสามารถของสถานีนี้"
 STARBASE_CLOAKING_STRENGTH_DESC: "§E§Hกําลังโคลน§!เป็นเครื่องวัดความมั่นคงของสนามโคลน โดยสถานีนี้ ยิ่ง เสถียรภาพ สูง เท่า ไร ก็ ยิ่ง มี ความ ซับ ซ้อน มาก เท่า นั้น เพื่อ ตรวจ จับ.§!"
 CLOAKING_EXCEPTIONAL_STARBASE_DESC: "\nสถานีนี้สามารถจัดวางแผงทําโคลนแบบไดนามิคได้อย่างดี ทําให้ไม่สามารถตรวจจับได้"
 CLOAKING_EXCEPTIONAL_STARBASE_CAN_BE_IMPROVED: "การปรับปรุงเพิ่มเติมจะช่วยให้สถานี หลีกเลี่ยงการตรวจพบ จากการตรวจสอบที่ก้าวหน้ามากขึ้น"
 CLOAKING_STRENGTH_0_STARBASE_DESC: "\nสถานีนี้ไม่สามารถ วางแผนทําเล็บได้"
 CLOAKING_STRENGTH_1_STARBASE_DESC: "\nสถานีนี้สามารถฉายสัญญาณ สนามทําโคลนไม่เสถียร ที่สามารถหลบเลี่ยงเซนเซอร์ได้เฉพาะเครื่องตรวจจับ"
 CLOAKING_STRENGTH_2_STARBASE_DESC: "\nสถานีนี้สามารถผลิตสนามทําโคลนธรรมดา ที่สามารถหลีกเลี่ยงระบบตรวจจับพื้นฐานได้"
 CLOAKING_STRENGTH_3_STARBASE_DESC: "\nสถานีนี้สามารถจัดวางสนามทําโคลนขนาดปานกลาง สามารถหลีกเลี่ยงการตรวจจับได้"
 CLOAKING_STRENGTH_4_STARBASE_DESC: "\nสถานีนี้สามารถฉายสนามทําโคลนแบบไดนามิค ที่สามารถหลีกเลี่ยงเครือข่ายเซ็นเซอร์ได้"
 CLOAKING_STRENGTH_5_STARBASE_DESC: "\nสถานีนี้สามารถสร้างสนามทําโคลนที่ซับซ้อนอย่างเหลือเชื่อ ที่สามารถหลบหลีกทุกอย่างได้ ยกเว้นระบบตรวจจับที่ซับซ้อนที่สุด"
