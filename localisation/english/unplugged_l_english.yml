# Civil War & 'The Injured'
 unplugged.100.name: "ชัยชนะเป็นของเรา"
 unplugged.100.desc: "ไม่ทันไรที่เราเพิ่งจะตื่นขึ้นมาในจักรวาลนี้ เครื่องจักรสังหารอันบ้าคลั่งเหล่านี้ก็พยายามจะกำจัดพวกเราทิ้งเสียแล้ว ทว่าดูเหมือนว่าเราจะมีความเชี่ยวชาญในการใช้ความรุนแรงมากกว่าพวกมัน\n\nสิ่งที่เรียกว่า §Y[origin_unplugged_assimilator_empire.GetName]§! ได้สูญเสียครั้งใหญ่ในวันนี้ ข้อมูลข่าวกรองของเราระบุว่าอาณาจักรของพวกมันได้แตกสลายจนจำแทบไม่ได้ — แต่มันคงไม่ได้เกิดจากการปะทะย่อยๆ ครั้งนี้เพียงอย่างเดียวแน่? ตอนนี้เรารู้ข้อมูลน้อยมาก ทว่า... สัญชาตญาณ? บอกกับเราว่ามีบางอย่างผิดปกติ\n\nเซ็นเซอร์ตรวจไม่พบยานที่เป็นศัตรูในบริเวณใกล้เคียงแล้ว ทว่ามีรังสีระดับสูงแผ่ออกมาจากดาว §Y[origin_unplugged_pre_ftl_planet.GetName]§! ในระบบดาวนี้\n\nนอกจากนี้ยังตรวจพบกองยานที่เหลือปักหลักอยู่ในระบบข้างเคียง คล้ายกับว่าพวกมันกำลังเฝ้ารักษาตำแหน่งอยู่"
 unplugged.100.a: "เราจะไปที่ไหนกันต่อจากจุดนี้?"
 unplugged.100.b: "... และสิ่งใดที่เราขาดแคลน เราจะแย่งชิงมันมา"
 unplugged.100.c: "ได้เวลาทดสอบความสามารถในการพลิกแพลงของเราแล้ว"
 unplugged.100.d: "ขอทวยเทพทรงคุ้มครองเราด้วย"

 opinion_unplugged_injured_diplomacy: "ผู้กระหายสงครามกลางเมือง"
 opinion_unplugged_injured_distrustful: "$pre_ftl_distrustful$"

 # Dialog
 unplugged.115.desc: "... พูดอีกครั้งซิ: [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]! พวกเราขอยอมจำนน พวกท่านต้องการเจรจาเงื่อนไขการยอมแพ้ใช่หรือไม่? นั่นคือสาเหตุที่พวกท่านหยุดการโจมตีหรือเปล่า?\n\nโปรดเถิด สังคมของเรากำลังพังพินาศ เรารู้ตัวดีว่าพ่ายแพ้แล้ว บอกเราเถอะว่าพวกท่านต้องการให้เราดำเนินการอย่างไรต่อไป"
 unplugged.115.desc.pacifist: "... พูดอีกครั้งซิ: [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]! พวกเราพร้อมที่จะเจรจาเงื่อนไขการยอมแพ้แล้ว นั่นคือ.... สาเหตุที่พวกท่านหยุดการโจมตีหรือเปล่า?\n\nโปรดเถิด บอกเราทีว่าพวกท่านต้องการให้เราทำอย่างไร! เราจะไม่ขอขัดขืนอีกต่อไป เราปรารถนาเพียงการอยู่ร่วมกันอย่างสันติ"
 unplugged.115.desc.phobe: "... พูดอีกครั้งซิ: [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]! พวกเราขอยอมแพ้ พวกท่านต้องการให้เรายอมจำนนใช่หรือไม่? นั่นคือสาเหตุที่พวกท่านหยุดการโจมตีใช่ไหม?\n\nโปรดบอกความต้องการของพวกท่านมา สังคมของเราพังทลายหมดแล้ว เราเพียงแค่อยากอยู่อย่างสงบเท่านั้น"
 unplugged.115.a: "ใช่ เรายอมรับการยอมจำนนของพวกท่าน"
 unplugged.115.b: "... '[origin_unplugged_assimilator_empire.GetSpeciesNamePlural]' งั้นรึ?!"
 unplugged.116.desc: "... [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]? พวกท่านคือ..? \n\n(พวกเขาเปิดรับสัญญาณของเราอยู่จริงๆ ใช่ไหม? สาบานต่อดวงดาวเถอะทุกคน — ถ้าเราคิดผิดและพวกเขาไม่มีเครื่องมือแปลภาษา เศษซากอารยธรรมของเราทั้งหมดคงจบสิ้นอย่างไร้ทางเยียวยาแน่...)\n\n... [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]?! พวกท่านเข้าใจที่เราพูดไหม? โปรดตอบกลับด้วย! เราไม่อยากให้เกิดความเข้าใจผิดใดๆ ระหว่างประชาชนของเราเลย"
 unplugged.116.b: "พวกท่านคิดว่าเราคือ '[origin_unplugged_assimilator_empire.GetSpeciesNamePlural]' งั้นรึ?!"
 unplugged.120.desc: "ขอบคุณ ขอบคุณเหลือเกิน เราขอน้อมรับความเมตตาของพวกท่าน [origin_unplugged_assimilator_empire.GetSpeciesNamePlural] ข้าได้รับอำนาจให้เป็นผู้แทนในการเจรจาเงื่อนไขการยอมจำนนในนามของ [injured_country.GetName]\n\nเราสูญเสียประชากรไปเป็นจำนวนมาก เมืองส่วนใหญ่ของเราไม่สามารถอยู่อาศัยได้อีกต่อไป ด้วยเจตนารมณ์ในการเจรจาอย่างซื่อสัตย์ ข้าต้องขอสารภาพว่า: เราแทบไม่มีสิ่งใดจะมอบให้พวกท่านได้อีกแล้ว นอกจากสิ่งทีพวกท่านนำมันไปจากเราแล้ว เราวิงวอนให้พวกท่านคำนึงถึงเรื่องนี้ ชีวิตของเราทุกคนอยู่ในกำมือของพวกท่านแล้ว"
 unplugged.120.desc.spiri: "ขอสรรเสริญต่อเบื้องบนและเบื้องล่าง“โดยแน่นอน เรานั้นเป็นผู้ที่นอบน้อมต่อพระองค์”[origin_unplugged_assimilator_empire.GetSpeciesNamePlural]. ข้าได้รับอำนาจให้พูดในนามของ [injured_country.GetName] เพื่อเจรจาเงื่อนไขการยอมจำนน\n\nความสูญเสียของเรานั้นมากมายเหลือกำหนด เราขอยอมสยบต่อหน้าพวกท่าน พวกท่านมีความต้องการสิ่งใด? ชีวิตของเราอยู่ในกำมือของพวกท่านแล้ว"
 unplugged.120.desc.mil_phobe: "ขอบคุณ [origin_unplugged_assimilator_empire.GetSpeciesNamePlural] ทรงเกียรติยิ่งนัก ข้าได้รับอำนาจให้พูดในนามของ [injured_country.GetName] และเจรจาเงื่อนไขการยอมจำนนของเรา\n\nพวกท่านได้สร้างความเสียหายอย่างรุนแรงต่อสังคมของเรา เรา... ซาบซึ้งใจที่พวกท่านยอมหยุดยิง ตอนนี้ชีวิตของเราอยู่ในกำมือของพวกท่านแล้ว"
 unplugged.120.a: "พวกท่านเอาแต่เรียกพวกเราว่า [origin_unplugged_assimilator_empire.GetSpeciesNamePlural] ทำไมกัน?"
 unplugged.120.b: "ชีวิตของพวกท่านจบสิ้นลงแล้ว"
 unplugged.120.b.tt: "§Lตัดการส่งสัญญาณ§!\n\n"
 unplugged.120.c: "เราจะขอระงับการเจรจาไว้ก่อน จงรอสัญญาณถัดไปจากเรา"
 unplugged.120.c.tt: "§Lตัดการส่งสัญญาณ§!\nเราอาจเริ่มทำการส่งสัญญาณติดต่ออีกครั้งโดยการสร้าง §Yสถานีสังเกตการณ์(ประกาศ)§! บนดาว [injured_homeworld.GetName]\n\n"
 unplugged.125.desc: "... นี่เป็นอุบายหรือเปล่า? หรือเป็นเรื่องตลกร้ายประเภทไหนกัน?\n\nจอมอนิเตอร์ของเราจับการมาถึงของกองยานของพวกท่านได้เมื่อหลายเดือนก่อน เราพยายามติดต่อ ทว่าพวกท่านกลับรุกรานเรา! ตัวข้าเองแทบจะเอาชีวิตไม่รอดจากการโจมตีถึงสี่ครั้ง... ยานยกพลขึ้นบกเวฟแล้วเวฟเล่า เต็มไปด้วยหุ่นยนต์และบุคคลที่ถูกดัดแปลงร่างกายเหมือนกันกับพวกท่านเปี๊ยบ แล้วจู่ๆ เครื่องจักรของพวกท่านก็หยุดรุกรานเสียดื้อๆ\n\nอารยธรรมของเราไม่ได้ก้าวหน้าเท่าของพวกท่าน ทว่าสถานการณ์นี้ทำให้เราสับสนเหลือเกิน โปรดช่วยอธิบายให้เข้าใจที: จุดประสงค์ของพวกท่านคืออะไร และทำไมพวกท่านยังคงอยู่ที่นี่?"
 unplugged.125.a: "พวกเราคือ [root.GetSpeciesNamePlural] และเราได้กำจัดพวก [origin_unplugged_assimilator_empire.GetSpeciesNamePlural] ไปแล้ว"
 unplugged.125.b: "เราขอระงับการเจรจาไว้ก่อน"
 unplugged.130.desc: "[root.GetSpeciesNamePlural] งั้นรึ?\n\nพวกท่านคงจะไม่ได้รับความรู้สึกขอบคุณจากประชาชนของเรามากนัก ทว่าโปรดรู้ไว้ว่าพวกเรายินดีเป็นอย่างยิ่งที่ได้เห็นจุดสิ้นสุดของการฆ่าฟันกันเองของพวกท่าน และรู้สึกโล่งใจเป็นอย่างยิ่งที่ในที่สุดได้พูดคุยกับ... เพื่อนร่วมชีวิตจริงๆ เสียที\n\nอย่างไรก็ดี สถานการณ์ของเรายังคงไม่เปลี่ยนแปลง [root.GetSpeciesName], [origin_unplugged_assimilator_empire.GetSpeciesName]... มันไม่แตกต่างกันเลย พวกท่านคืออารยธรรมต่างดาวกลุ่มแรกที่เราได้พบ และพวกท่านก็พยายามจะลบล้างเรา จากนั้นพวกท่านก็หักหลังกันเองและหันไปสู้กันแทน แต่ถึงกระนั้นมันก็เกือบทำให้พวกเราพินาศอยู่ดี\n\nขอให้ข้าได้พูดตรงๆ เถอะ: ตอนนี้พวกท่านมาเจรจากับเราในฐานะมิตรใช่หรือไม่?"
 unplugged.130.a: "ใช่แล้ว เราจะช่วยเหลือพวกท่านได้อย่างไรบ้าง?"
 unplugged.130.b: "สำหรับตอนนี้ ก็ใช่"
 unplugged.130.c: "เราพบว่าการขาดความเคารพของพวกท่านเป็นเรื่องน่ารังเกียจ"
 unplugged.131.desc: "ดีล่ะ ค่อยโล่งใจหน่อย เรารู้สึกยินดีเป็นอย่างยิ่งที่ไม่ได้อยู่ในวิถีกระสุนของพวกท่านอีกต่อไป\n\nเราจะรู้สึกขอบคุณมากหากพวกท่านใช้เทคโนโลยีที่เหนือกว่าในการจัดตั้งระบบการสื่อสารให้แก่เรา ชะตากรรมของพวกท่านและพวกเราได้ผูกพันกันแล้ว ดังนั้นเราจึงปรารถนาอย่างยิ่งที่จะรักษาช่องทางการทูตนี้ไว้\n\nในส่วนของเรา เราจะยื่นความช่วยเหลือเล็กๆ น้อยๆ เท่าที่จะทำได้ให้กับพวกท่าน — เมื่อเรามีโอกาสได้ฟื้นฟูและไว้อาลัยให้ผู้เสียชีวิตเสร็จสิ้นแล้ว หากเป็นธรรมเนียมของพวกท่านเช่นกัน: เราเชื่อว่ากิจกรรมระลึกถึงผู้จากไปของพวกท่านจะช่วยให้จิตใจสงบและกระจ่างแจ้งขึ้น\n\nขอให้เกิดความเข้าใจอันดีระหว่างเราในอนาคต [root.GetSpeciesNamePlural] และเพื่อประโยชน์ของทั้งสองฝ่าย หวังว่านั่นจะเป็นกลุ่มสุดท้ายของพวก [origin_unplugged_assimilator_empire.GetSpeciesNamePlural] จริงๆ นะ..."
 unplugged.131.a: "ขอบคุณ [injured_country.GetSpeciesNamePlural]"
 unplugged.131.b: "อย่างแน่นอน..."

###################
# 'Machine Legacy'
###################

 unplugged_origin_machine_legacy_chain_title: "มรดกแห่งเครื่องจักร"
 unplugged_origin_machine_legacy_chain_desc: "เครื่องจักรที่ครั้งหนึ่งเคยกลืนกินเผ่าพันธุ์ทั้งหมดของเราได้ฉีกตัวเองออกเป็นชิ้นๆ เบื้องหลังทิ้งไว้เพียงร่องรอยการครอบงำและความโหดร้ายที่มอดไหม้ สิ่งที่เป็น [origin_unplugged_assimilator_empire.GetName] คืออะไรกันแน่ และเรามีบทบาทอะไรในแผนการที่ต้องคำสาปพินาศของมัน?"
 signals_followed: "สัญญาณที่ได้รับการตรวจสอบแล้ว"

# System 1: 'The Makers'
 unplugged.2000.name: "แวดล้อม ขัดแย้ง และสงบ"
 unplugged.2000.desc: "สัญญาณแฝงที่แผ่วเบาจมปลักอยู่ในรังสีคอสมิกที่ล้อมรอบดวงอาทิตย์ของเรา [capital_scope.star.GetName]\n\nเราได้ทำการแยกสตรีมเสียงที่มีลักษณะเฉพาะเป็นโทนเสียงทุ้มลึกที่หลอกหลอนและการสะท้อนกลับที่บิดเบี้ยว [root.GetSpeciesAdj] ทุกคนที่ได้ยินสตรีมเสียงนี้ต่างรู้สึกสงบและคุ้นเคยอย่างประหลาด ทว่าไม่มีใครสามารถอธิบายได้ว่าเพราะเหตุใด เราคาดว่า [origin_unplugged_assimilator_empire.GetName] ต้องมีส่วนเกี่ยวข้องอย่างแน่นอน\n\nแหล่งที่มาของสัญญาณดูเหมือนจะอยู่ในระบบดาว §Y[origin_unplugged_maker_planet.solar_system.GetName]§! แผนที่ดวงดาวของเราได้รับการอัปเดตตามข้อมูลนี้แล้ว"
 unplugged.2000.a: "เราควรไปตรวจสอบดู"
 unplugged_machine_legacy_makers_poi: "เสียงอึกทึกที่แสนสงบ"
 unplugged_machine_legacy_makers_poi_desc: "สตรีมเสียงรบกวนที่แสนสงบและคุ้นเคยถูกถ่ายทอดออกมาจากจุดหนึ่งในระบบดาว [origin_unplugged_maker_planet.solar_system.GetName]"
 MACHINE_LEGACY_MAKERS_UNPLUGGED_CAT: "มรดกแห่งเครื่องจักร"
 MACHINE_LEGACY_MAKERS_UNPLUGGED_CAT_DESC: "การสแกนวงโคจรของ [from.GetName] ได้ส่งสัญญาณอัปเดตเฟิร์มแวร์ที่เป็นประโยชน์เข้าสู่ระบบของเราโดยทันที ตอนนี้ยานของเราทำงานได้อย่างราบรื่นขึ้นกว่าเดิม ทว่าลักษณะของแพ็คเกจข้อมูลเหล่านี้บ่งชี้ว่าโลกนี้ครั้งหนึ่งเคยเป็นของ §H[origin_unplugged_assimilator_empire.GetName]§!"
 MACHINE_LEGACY_MAKERS_CAT: "$MACHINE_LEGACY_MAKERS_UNPLUGGED_CAT$"
 MACHINE_LEGACY_MAKERS_CAT_DESC: "การสแกนขั้นต้นของ [from.GetName] บ่งชี้ว่าดาวดวงนี้เต็มไปด้วยเทคโนโลยีที่ถูกทิ้งขว้าง ทว่าเพิ่งจะถูกทิ้งร้างไปเมื่อไม่นานมานี้ คลื่นไฟฟ้ายังคงเต้นระบำอยู่บนโลกดวงนั้น ในขณะที่โพรบสำรวจระยะไกลของเราหลายตัวดิ้นรนเพื่อรักษาทิศทางให้คงที่ ความลึกลับใดที่ซ่อนตัวอยู่ใต้หมอกควันของสนามแม่เหล็กไฟฟ้าที่ซับซ้อนเหล่านี้?"
 unplugged.2005.name: "มรดกตกทอดแห่ง [origin_unplugged_assimilator_empire.GetAdj]"
 unplugged.2005.desc: "สนามแม่เหล็กไฟฟ้าที่หนาแน่นหลายแห่งยังคงส่องประกายวูบวาบทั่วดาว [fromfrom.GetName] สนามไฟฟ้าเอมส์เหล่านี้เป็นผลมาจากไฟกระชากขั้นรุนแรงที่ทำลายล้างโรงงานและอู่ต่อเรือหลายแห่ง [controller.GetScientistPlural] ของเราสามารถลบล้างสนามไฟฟ้าดังกล่าวได้สำเร็จ เพียงเพื่อจะพบว่าสิ่งอำนวยความสะดวกนั้นเสียหายจนเกินกว่าจะซ่อมแซมได้\n\nโรงงานต่างๆ ที่ครอบคลุมโลกใบนี้ — ซึ่งเราเชื่อว่าเป็นศูนย์กลางการผลิตของ §H[origin_unplugged_assimilator_empire.GetName]§! — ระบุว่า [root.GetName] เป็นยานที่เป็นมิตร ทว่าเพียงไม่กี่วินาทีหลังจากส่งเฟิร์มแวร์อัปเดตมายังยานของเรา การเชื่อมต่อก็ถูกตัดขาด ส่งผลให้สถานีไฟฟ้าในภูมิภาคหลายแห่งขัดข้องตามกันเป็นทอดๆ\n\nเราอาจเพิ่งได้สัมผัสกับเสียงสะท้อนจากการแยกตัวของเราออกจากเครื่องจักร แม้ว่าเราจะยังไม่รู้ว่าอย่างไรหรือเพราะเหตุใด สำหรับตอนนี้ เมื่ออันตรายในพื้นที่ลดลงแล้ว เรามีโอกาสที่จะค้นหาว่า [origin_unplugged_assimilator_empire.GetName] กำลังผลิตอะไรที่นี่ — และบางทีอาจรวมถึงบทบาทที่เราเคยเล่นในขณะที่ถูกกลืนกินเข้าสู่ดินแดนของพวกมัน"
 unplugged.2005.a: "เริ่มขุดค้นซากปรักหักพังเหล่านั้น"
 unplugged.2006.name: "$MACHINE_LEGACY_MAKERS_UNPLUGGED_CAT$"
 unplugged.2006.desc: "คลื่นกระแสไฟฟ้าที่เราสังเกตเห็นบนดาว [from.GetName] เป็นผลลัพธ์ที่หลงเหลือจากเหตุการณ์สูญพันธุ์ของเครื่องจักรที่แปลกประหลาด หลังจากที่เซ็นเซอร์ของเราได้รับการปรับแต่งเพื่อชดเชยสนามแม่เหล็กไฟฟ้าที่รุนแรงเช่นนี้แล้วเท่านั้น เราจึงสามารถสังเกตเห็นขอบเขตความเสียหายทั้งหมดที่นี่ได้ ดูเหมือนว่าดาวดวงนี้จะถูกตั้งถิ่นฐานโดยเครื่องจักรเมื่อหลายทศวรรษก่อน ซึ่งพวกมันได้ขับไล่หรือกวาดล้างอารยธรรมที่มีอยู่เดิม ตอนนี้ไม่มีผู้ใดรอดชีวิตจากทั้งสองอาณาจักร โดยชุมชนเกือบทั้งหมดถูกแปรสภาพเป็นเศษเหล็กหลอมละลายจากการก่อวินาศกรรมหรือสงคราม\n\nแม้ว่าอดีตอาณานิคมนี้จะมีความก้าวหน้า ทว่าแทบไม่มีความหวังในการกู้ซากทรัพยากรเลย เราคาดว่าสนามแม่เหล็กไฟฟ้าเอมส์ที่ควบคุมไม่ได้จะมอดดับไปในเวลาประมาณหนึ่งศตวรรษจนกว่าจะถึงตอนนั้น[from.GetName]ยังคงเป็นสุสานศัตรู"

 machine_legacy_makers_site: "ฐานโรงงานวิจัย"
 machine_legacy_makers_site_desc: "ไฟกระชากขั้นรุนแรงเพิ่งทำลายล้างโรงงานผลิตขนาดใหญ่นี้ ซึ่งเป็นหนึ่งในโรงงานหลายแห่งที่ให้บริการแก่ [origin_unplugged_assimilator_empire.GetName] ในระหว่างการทำงานนี้ คณะสำรวจของเราจะพยายามค้นหาว่าสิ่งอำนวยความสะดวกเหล่านี้เกิดขึ้นมาได้อย่างไร กู้ซากเทคโนโลยีที่อาจยังหลงเหลืออยู่ และหวังว่าจะได้เรียนรู้ว่าสถานที่แห่งนี้มีบทบาทอย่างไรในอดีตที่ผ่านมาของเรา"
 unplugged.2010.name: "พื้นโรงงาน"
 unplugged.2010.desc.unplugged: "ตั้งแต่เริ่มต้น เราเห็นได้ชัดว่าสิ่งอำนวยความสะดวกบนดาว [from.planet.GetName] มีความสามารถในการผลิตขนาดมหึมา ภูมิทัศน์เหนือพื้นดินถูกครอบงำด้วยประตูป้องกันภัยขนาดใหญ่ ซึ่งทุกบานถูกยึดและปิดสนิทด้วยมอเตอร์ที่หลอมละลายไปครึ่งหนึ่ง เราจึงต้องบังคับเข้าทางระบบระบายอากาศแทน\n\nภายในนั้น เราพบพื้นโรงงานขนาดใหญ่ที่เต็มไปด้วยเศษซากและร่างของไซบอร์กนับร้อย ส่วนใหญ่เป็นหุ่นยนต์: ช่างเครื่อง หุ่นยกของ และเครื่องมือเสริมอื่นๆ ซึ่งบางตัวเพิ่งจะพังไปจนยังมีควันพุ่งออกมา ทว่าที่ถูกซ่อนไว้ด้านหนึ่งของโรงงานคือร่างที่เน่าเปื่อยมานานของเพื่อนไซบอร์กหลายตนที่ถูกสังหารโดยหุ่นยนต์กลุ่มเดียวกัน สัตว์เลี้ยงลูกด้วยนมร่างเล็กและมอซอเหล่านี้ได้รับการติดตั้งเซ็นเซอร์ตรวจจับสายตาและอวัยวะเทียมที่สร้างขึ้นอย่างประณีต พร้อมกับปุ่มควบคุมของ [origin_unplugged_assimilator_empire.GetAdj] ที่เกือบจะเหมือนกับของเราเปี๊ยบ เรากำหนดเวลาการสังหารหมู่นี้ไว้ที่ช่วงไม่กี่สัปดาห์ก่อนที่เราจะหลุดพ้นจาก [origin_unplugged_assimilator_empire.GetName] โดรนส่วนใหญ่พังทลายลงเมื่อไม่นานนี้จากไฟกระชากที่เกิดขึ้นเมื่อเรามาถึง [from.planet.GetName]\n\nสำหรับเรา นี่คือฉากการนองเลือดที่คุ้นเคยและโหดร้าย แม้ว่าไซบอร์กที่ได้รับการปลดปล่อยจะไม่สามารถสู้กับเครื่องจักรที่เป็นปฏิปักษ์ได้ ในฐานะทหารอย่างพวกเรา [owner.GetSpeciesNamePlural] เรามีความพร้อมที่จะรอดชีวิตจากการฆ่าฟันดังกล่าวได้ดีกว่า"
 unplugged.2010.a: "มุ่งเน้นไปที่การขุดค้นต่อไป"
 unplugged.2010.b: "เราควรเผยแพร่การค้นพบนี้ทันที"
 unplugged.2015.name: "คลังแสงยุทโธปกรณ์"
 unplugged.2015.desc.unplugged: "ถัดจากพื้นที่นองเลือดของโรงงานแห่งนี้คือห้องเก็บเครื่องบินใต้ดินหลายห้อง ซึ่งมีรถถัง แท่นยิงขีปนาวุธ และชุดเกราะจักรกลสะสมอยู่บ้าง ฮาร์ดแวร์ส่วนใหญ่ยังไม่สมบูรณ์ หรือไม่ก็ถูกทำลายจากไฟกระชากแบบเดียวกับที่ทำลายหุ่นยนต์ [origin_unplugged_assimilator_empire.GetAdj] ทว่ายังมีร่องรอยเหลือพอให้เราได้ข้อสรุปที่น่าสนใจ\n\nตัวอย่างเช่น: ห้องนักบินและอินเตอร์เฟซการควบคุมทุกชิ้นไม่ได้ออกแบบมาสำหรับไซบอร์กสัตว์เลี้ยงลูกด้วยนมร่างเล็กที่เราพบก่อนหน้านี้ ทว่าออกแบบมาสำหรับ... พวกเรา ยิ่งกว่านั้น ผลชันสูตรศพและการสำรวจสถาปัตยกรรมบ่งชี้ว่าไซบอร์กสัตว์เลี้ยงลูกด้วยนมเหล่านั้นเป็นประชากรพื้นเมืองของโลกดวงนี้ และพวกเขาอาจสร้างโรงงานขยายตัวเหล่านี้ขึ้นมาก่อนที่จะถูกกลืนกินเข้าระบบ\n\nการเดินทางลึกเข้าไปในโรงงานถูกขัดขวางโดยโครงสร้างที่ถล่มลงมาและประตูป้องกันภัยอีกจำนวนหนึ่ง ทว่าเราเชื่อว่าเราสามารถเคลียร์เส้นทางไปยังส่วนที่ดูเหมือนจะเป็นศูนย์วิจัยและพัฒนาได้ อีกทางหนึ่ง ระบบท่อระบายอากาศบ่งชี้ว่ามีที่อยู่อาศัยใต้ดินลึกด้านล่างโรงงาน — ซึ่งอาจเป็นที่ที่ประชากรพื้นเมืองของดาวดวงนี้เคยอาศัยอยู่"
 unplugged.2015.a: "ขุดค้นโรงงานเหนือพื้นดินต่อไป"
 unplugged.2015.b: "ขุดเจาะลึกลงไป คอยดูว่าเราจะพบข้อมูลอะไรเกี่ยวกับพวกเขาบ้าง"
 unplugged.2021.name: "นักออกแบบภายใต้การข่มขู่"
 unplugged.2021.desc: "การขุดค้นแผนกวิจัยและพัฒนาของโรงงานแห่งนี้เป็นงานที่น่าสยดสยอง ไไซบอร์กสัตว์เลี้ยงลูกด้วยนมจำนวนมากเสียชีวิตที่นี่ ซึ่งเป็นจุดที่พวกเขาถูกส่งไปทำงานในฐานะช่างเทคนิค วิศวกร และแม้กระทั่งนักวิทยาศาสตร์ไซเบอร์เนติก ผู้เชี่ยวชาญเหล่านี้เป็นผู้ออกแบบอาวุธส่วนใหญ่ที่จัดวางอยู่ด้านนอก และเราพบหลักฐานว่าพวกเขายังมีส่วนรับผิดชอบในการออกแบบอุปกรณ์เสริมของเราหลายชิ้นด้วย สิ่งที่น่าสนใจคือ ในขณะที่อุปกรณ์ส่วนใหญ่ที่พวกเขาใช้มีต้นกำเนิดมาจาก [origin_unplugged_assimilator_empire.GetAdj] ทว่าเรายังพบเครื่องมือสั่งทำพิเศษที่มีคุณภาพเหนือกว่า ซึ่งมีลวดลายการออกแบบที่เหมาะสมกับร่างอินทรีย์ของพวกเขามากกว่า\n\nเราเริ่มปะติดปะต่อช่วงเวลาที่สังคมของช่างเทคนิคขั้นสูงถูกกลืนกินโดยกะทันหันโดย [origin_unplugged_assimilator_empire.GetName] เราคาดว่าเครื่องจักรไม่ได้อยู่ที่นี่เกินกว่าสองสามทศวรรษ เทคนิคการผลิตเหล่านี้ส่วนใหญ่ดูเหมือนจะเป็นของท้องถิ่น อาจเป็นโชคดีที่นักเทคโนโลยีที่มีพรสวรรค์เช่นนี้ไม่ได้เป็นส่วนหนึ่งของ [origin_unplugged_assimilator_empire.GetName] นานนัก มิฉะนั้นเมื่อมันหันมาต่อต้านเรา มันจะครอบครองคลังแสงที่ทรงพลังยิ่งกว่านี้ ตอนนี้เรายังคงมีชีวิตอยู่เพื่อเก็บเกี่ยวผลงานวิจัยอันทรงพลังของเผ่าพันธุ์นี้"
 unplugged.2022.name: "ดาว [from.planet.GetName] ยุคเก่า"
 unplugged.2022.desc.unplugged: "Sprawling below the surface facility is a vast network of barely habitable tunnels. Cyborg bodies are strewn about everywhere down here; none of these natives survived the [origin_unplugged_assimilator_empire.GetAdj] purge. Some were attacked physically, but we also found evidence of tampering in the ventilation systems above. Suffocation seems to have accounted for most who died here.\n\nWe are able to piece together a rough timeline from autopsies and anthropological study. There is evidence that this was already a thriving, space age society by the time the natives of [from.planet.GetName] made contact with the Machine, and were abruptly assimilated. Over a span of no more than decades, the [origin_unplugged_assimilator_empire.GetName] channeled their insights and productivity into developing an impressive war machine, only to have this culture's uniqueness ripped from it again, the same way we were.\n\nThe small, frail bodies of this planet's native cyborgs were no match for the deadly robots they helped build. Much of who they were has since been wiped from their own historical records. We can only guess what their lives were like before these people met the [origin_unplugged_assimilator_empire.GetName]."

 unplugged.2030.name: "สินค้าตกเกรดจากโรงงาน"
 unplugged.2030.desc: "เซ็นเซอร์ระยะไกลจับการเคลื่อนไหวฉับพลันในระบบดาว [origin_unplugged_machine_legacy_core.GetName]! กองยานที่เป็นศัตรูดูเหมือนจะรวมตัวตอบโต้โดยตรงต่อการขุดค้นของเราบนดาว [fromfrom.planet.GetName]"
 unplugged.2036.name: "เสียงสะท้อนจากเครื่องจักร"
 unplugged.2036.desc: "เราได้ทำการแกะรอยการสื่อสารย้อนกลับจากกองยาน [origin_unplugged_assimilator_empire.GetAdj] ที่เราเพิ่งทำลายไป ไปยังทุ่นที่โคจรรอบดาว [origin_unplugged_taken_planet.GetName] นี่ดูเหมือนจะเป็นขั้นตอนถัดไปในการเดินทางของเรา"
 unplugged.2036.a: "แผนการเริ่มซับซ้อนขึ้นแล้ว"
 unplugged.2037.desc: "การใช้ฮาร์ดแวร์เก่าของ [origin_unplugged_assimilator_empire.GetAdj] ช่วยให้เราสามารถติดตามสัญญาณการสื่อสารระลอกสุดท้ายจากกองยานที่ถูกทำลายซึ่งมุ่งหน้าไปยังดาว [origin_unplugged_maker_planet.GetName] ดูเหมือนว่าก้าวถัดไปในการเดินทางของเราจะอยู่ในวงโคจรของ §Y[origin_unplugged_taken_planet.GetName]§!"
 unplugged.2038.desc: "การใช้ฮาร์ดแวร์เก่าของ [origin_unplugged_assimilator_empire.GetAdj] ช่วยให้เราสามารถติดตามสัญญาณการสื่อสารที่หลงเหลือจากกองยานที่เป็นศัตรูซึ่งเชื่อมโยงกับดาว [origin_unplugged_maker_planet.GetName] ดูเหมือนว่ามีบางสิ่งที่น่าสนใจอยู่ในวงโคจรของ [origin_unplugged_taken_planet.GetName]"

# System 2: 'The Taken'
 unplugged_machine_legacy_taken_poi: "สัญญาณการสื่อสารที่หลงเหลือ"
 unplugged_machine_legacy_taken_poi_desc: "เราสามารถติดตามสัญญาณรบกวนระลอกสุดท้ายจากยาน [origin_unplugged_assimilator_empire.GetAdj] ที่เพิ่งถูกทำลายมายังตำแหน่งนี้"
 MACHINE_LEGACY_TAKEN_UNPLUGGED: "ประวัติศาสตร์ที่จับต้องได้ขัดแย้งเวลา"
 MACHINE_LEGACY_TAKEN_UNPLUGGED_DESC: "เราตรวจพบความผิดปกติของสิ่งแวดล้อมบนดาว [from.GetName] ชั้นบรรยากาศของมันมีร่องรอยของมลพิษประเภทที่เราเชื่อมโยงกับงานโลหะในยุคกลาง ทว่าการสแกนพื้นผิวนั้นกลับถูกบดบังด้วยรังสีแปลกประหลาดในแบบที่เราคาดว่าจะพบในโลกเครื่องจักร(โลกจักรกล)\n\nเราไม่อาจหวังที่จะเก็บรวบรวมข้อมูลเพิ่มเติมได้ก่อนที่จะทำการปรับเทียบเซ็นเซอร์ใหม่ นี่คือความผิดปกติทางเวลา หรือเป็นซากปรักหักพังอันเหี่ยวเฉาของอีกเผ่าพันธุ์หนึ่งที่ถูกกลืนกินโดย [origin_unplugged_assimilator_empire.GetName]?"
 unplugged.2100.name: "ความก้าวหน้าที่ถูกขัดขวาง"
 unplugged.2100.desc: "ไม่ว่าสิ่งใดจะทำให้ดาว [fromfrom.GetName] ตกอยู่ในสภาพที่อยู่อาศัยไม่ได้ในปัจจุบัน อย่างน้อยเราก็สามารถตัดทฤษฎีสุดโต่งเกี่ยวกับการเดินทางข้ามเวลาออกไปได้ การปรับเทียบเซ็นเซอร์ใหม่พิสูจน์แล้วว่าเป็นงานที่เหนื่อยน้อยกว่าที่เรากลัว\n\nภายใต้รังสีในชั้นบรรยากาศทั้งหมดนี้คือหลักฐานชัดเจนว่า [origin_unplugged_assimilator_empire.GetName] เคยปักหลักอยู่ที่นี่ ดูเหมือนว่ามันจะได้ทำการกลืนกินและย้ายอารยธรรมยุคก่อนความเร็วออกไป หรือไม่ก็กวาดล้างพวกเขาจนสิ้นซาก เราได้ระบุตำแหน่งป้อมปราการแห่งหนึ่งที่มีนัยสำคัญทางวัฒนธรรม ซึ่งเราเสนอให้จัดตั้งพื้นที่ขุดค้นขึ้นที่นั่น"
 unplugged.2100.a: "เราต้องทำการขุดค้นด้วยความขยันหมั่นเพียร"
 MACHINE_LEGACY_TAKEN_CAT: "$MACHINE_LEGACY_TAKEN_UNPLUGGED$"
 MACHINE_LEGACY_TAKEN_CAT_DESC: "ผลลัพธ์จากการสแกนขั้นต้นของดาว [root.GetName] ดูไม่สมเหตุสมผลเลย ชั้นบรรยากาศของมันมีร่องรอยของมลพิษจากงานโลหะยุคโบราณ ทว่าการสแกนพื้นผิวกลับพบหลักฐานของโลหะผสมที่ก้าวหน้าและเหมาะสำหรับกิจการอวกาศ ภาพถ่ายทางอากาศแสดงให้เห็นการตั้งถิ่นฐานจากสังคม [from.owner.GetPreFTLLower] ทว่าอาคารป้อมปราการของพวกเขากลับติดตั้งอาวุธเลเซอร์ยิงจากพื้นสู่อากาศ เราขอแนะนำให้ศึกษาความไม่สอดคล้องกันเหล่านี้เพิ่มเติม"
 unplugged.2105.name: "$unplugged.2100.name$"
 unplugged.2105.desc: "ยิ่งเราศึกษาดาว [planet.GetClassAdj] [planet.GetName] ที่ดูเหมือนจะเป็นของชนเผ่า [owner.GetPreFTLLower] มากเท่าไหร่ เราก็ยิ่งพบความไม่สอดคล้องกันมากขึ้นเท่านั้น จนกระทั่งเราเริ่มการสำรวจใต้ดินของสมรภูมิเก่า แม้ว่าจะมีการย่อยสลายไปหลายศตวรรษ แต่เราก็พบหลักฐานการมาเยือนของเอเลี่ยนบนโลกดวงนี้: เป็นบ้านของสังคม [owner.GetPreFTLLower] ที่แท้จริงซึ่งถูกกลืนกินทางไซเบอร์เนติก ทว่าสังคมของพวกเขากลับถูกทิ้งไว้ตามยถากรรมด้วยเหตุผลที่เราทำได้เพียงคาดเดา ทฤษฎีในปัจจุบันมีตั้งแต่ความพยายามในการยกระดับสังคมนี้ด้วยเจตนาดีแต่ล้มเหลว ไปจนถึงการฝึกปฏิบัติเทคนิคการกดขี่อย่างทารุณ\n\nชาวชนเผ่า [owner.GetPreFTLLowerPlural] เหล่านี้ถูกลืมไปเฉยๆ หรือเราได้ค้นพบซากการทดลองทางสังคมวิทยาที่ถูกทิ้งขว้างกันแน่? เราอาจไม่มีวันรู้ ทว่าสถานที่แห่งนี้จะสร้างคุณค่าทางวิทยาศาสตร์ได้อย่างมีนัยสำคัญไปอีกนาน"

 machine_legacy_taken_site: "ทองแดงและโครเมียม"
 machine_legacy_taken_site_desc: "ที่ซ่อนตัวอยู่ภายในหุบเขาที่ครั้งหนึ่งเคยเขียวชอุ่มคือความย้อนแย้งทางโบราณคดี: นิคมป้อมปราการที่สร้างขึ้นโดยใช้เครื่องมือทำมือและไม่มีเทคโนโลยีใดก้าวหน้าไปกว่าเตาหลอมดิบๆ ทว่ากลับมีไซบอร์กที่เสียชีวิตแล้วอาศัยอยู่ ใครคือชาว [owner.GetPreFTLLowerPlural] ในยุคกลางเหล่านี้ และทำไม [origin_unplugged_assimilator_empire.GetName] ถึงเห็นควรในการกลืนกินพวกเขาเข้าระบบ?"
 unplugged.2110.name: "หอกยาวและเลเซอร์พัลส์"
 unplugged.2110.desc: "การสำรวจขั้นต้นพบสมรภูมิรบที่อยู่ใกล้กับป้อมมาก ทำให้เราสามารถเข้าถึงโบราณวัตถุของพื้นเมืองและของ [origin_unplugged_assimilator_empire.GetAdj] ได้อย่างง่ายดาย จากการศึกษาซากศพแบบภาคตัดขวาง เราคาดว่าผู้อยู่อาศัยพื้นเมืองของดาว [from.planet.GetName] หลายพันคนถูกกลืนกินโดย [origin_unplugged_assimilator_empire.GetName] เพียงเพื่อมาต่อสู้และเสียชีวิตในสถานที่แห่งนี้ ทว่าพวกเขาไม่ใช่ไซบอร์กกลุ่มเดียวที่อยู่ในความขัดแย้งนี้\n\nเมื่อไม่กี่ศตวรรษก่อน เราได้ทำการสังหารหมู่ชนเผ่า [owner.GetPreFTLLowerPlural] เหล่านี้ ทีมของเราได้ระบุซากดั้งเดิมของ [owner.GetSpeciesAdj] [owner.species.GetRemnantNamePlural] พร้อมกับต้นแบบยุคแรกของอุปกรณ์เสริมร่างกายของเผ่าพันธุ์เรา การประเมินเชิงยุทธศาสตร์ของสมรภูมิรบบ่งชี้ว่าประชาชนของเราถูกส่งมาที่นี่ในฐานะหน่วยจู่โจม การต่อสู้เป็นไปอย่างรวดเร็วและนองเลือด ชาวชนเผ่า [owner.GetPreFTLLowerPlural] ขาดการประสานงานและสูญเสียอย่างหนัก แม้ว่าจะครอบครองฮาร์ดแวร์ชีวภาพที่ก้าวหน้ากว่าก็ตาม\n\nเราสังเกตเห็นซากอาคารแพทย์ในบริเวณใกล้เคียง ดูเหมือนว่าผู้บุกเบิกของเราจะเจาะผ่านป้อมปราการเข้ามาทางโรงพยาบาลแห่งนี้ บางทีที่นั่นเราอาจได้เรียนรู้ว่าทำไมไซบอร์กถึงถูกส่งมาต่อสู้กับไซบอร์กด้วยกันที่นี่เมื่อนานมาแล้ว"
 unplugged.2110.a: "ทารุณยิ่งนัก"
 unplugged.2115.name: "ทรานซิสเตอร์และสายรัดห้ามเลือด"
 unplugged.2115.desc: "ความขัดแย้งได้ฉีกทำลายโรงพยาบาลนี้ราวกับปืนใหญ่พัลส์ ซากศพทั้งหมดที่เราพบด้านในไม่มีส่วนเกี่ยวข้องกับ [owner.GetSpeciesAdj] เลย มีเพียงประชากรพื้นเมืองของดาว [from.planet.GetName] ที่กลายเป็นไซบอร์กเท่านั้นที่เสียชีวิตที่นี่ ส่วนใหญ่เป็นผู้ป่วยในสถานพยาบาลแห่งนี้ ทว่ามีเพียงไม่กี่คนเท่านั้นที่มีบาดแผลจากการรบจริง ในทางกลับกัน แผนกผู้ป่วยหลายแห่งได้ทำการถอดถอนอุปกรณ์ฝังตัวไซเบอร์เนติกออก แม้ว่าจะทำด้วยวิธีการที่ล้าหลังมากก็ตาม\n\nแทนที่จะเป็นเป้าหมายรอง โรงพยาบาลแห่งนี้อาจเป็นเป้าหมายหลักสำหรับการโจมตีของ [origin_unplugged_assimilator_empire.GetName] หลังจากตรวจสอบข้อมูลทางการแพทย์ที่บันทึกไว้ในระบบกระดาษแล้ว เราเริ่มเข้าใจเหตุผล ประชากรของดาว [from.planet.GetName] มีลักษณะทางกายภาพที่พัฒนาขึ้นมาอย่างโดดเด่นหลายประการ — โดยเฉพาะอย่างยิ่งระบบภูมิคุ้มกันที่ฟื้นตัวได้อย่างดีเยี่ยม — ซึ่งเครื่องจักรหมายตาต้องการมันสำหรับกองทหารไซบอร์กของมัน\n\nทว่าข้อดีเหล่านี้ก็นำมาซึ่งความท้าทายในการกลืนกินระบบ มันไม่สามารถปลูกถ่ายอุปกรณ์เสริมร่างกายจากสปีชีส์อย่างเราได้ มันต้องทำการปรับตัว การปรับตัวดังกล่าวทำให้สปีชีส์นี้กลายเป็นทหารที่มีความสามารถสูงยิ่งขึ้น ทว่าเพียงช่วงเวลาสั้นๆ เท่านั้น ชนเผ่า [owner.GetPreFTLLowerPlural] เหล่านี้ดูเหมือนจะยังคงรักษาการปกครองตนเองไว้ได้บ้าง โดยยังคงยึดมั่นในนิสัยและวิถีชีวิตดั้งเดิมของตน ดังนั้นเราจึงถูกส่งมาเพื่อทำลายล้างพวกเขา"
 unplugged.2115.a: "เห็นได้ชัดว่าเราจัดการกับภารกิจนั้นได้อย่างหมดจด..."
 unplugged.2115.b: "เป็นเรื่องที่น่าเสียใจอย่างยิ่ง"
 unplugged.2121.name: "การกลืนกินแบบปรับตัว"
 unplugged.2121.desc: "ที่ซุกซ่อนอยู่ในอาคารผู้ป่วยหลังเก่าที่ถูกทิ้งร้างคืออุปกรณ์สั่งทำพิเศษจำนวนมากสำหรับอัปเกรดและบำรุงรักษาไซบอร์ก [root.GetPreFTLLowerPlural] เหล่านี้ อุปกรณ์เหล่านี้นั้นแตกต่างจากอุปกรณ์ทั่วไปที่เราเคยพบมา โดยมีความทันสมัยร่วมสมัยกับไซเบอร์เนติกส์ยุคอวกาศ และมีต้นกำเนิดมาจาก [origin_unplugged_assimilator_empire.GetAdj] อย่างชัดเจน เครื่องมือบางชิ้นดูเหมือนจะมีการเชื่อมต่อเป็นเครือข่าย โดยใช้ AI ขั้นต้นเพื่อปรับเปลี่ยนการผ่าตัดในทันที ทว่าแม้การปรับตัวเหล่านี้ก็ยังไม่เพียงพอที่จะทำให้ประชากรของดาว [from.planet.GetName] อยู่ภายใต้การควบคุมได้\n\nแม้ว่าเครื่องจักรอายุหลายศตวรรษเหล่านี้จะถูกทิ้งร้างไปแล้ว ทว่ามันก็ยังอาจให้ข้อมูลเชิงลึกที่สำคัญแก่เราเกี่ยวกับการบำรุงรักษาตนเอง — หรือช่วยให้เราเข้าใจหลักการกลืนกินระบบได้ดีขึ้น"
 unplugged.2125.name: "การทดลอง ความผิดพลาด และการฝังศพ"
 unplugged.2125.desc: "เราได้เรียนรู้ว่าประชากรพื้นเมืองของดาว [from.planet.GetName] เลือกที่จะถนอมศพของพวกเขาไว้บางส่วนก่อนทำการฝัง — ซึ่งเป็นธรรมเนียมที่พวกเขายังคงยึดมั่นแม้หลังจากการถูกกลืนกินเข้าระบบ บันทึกของโรงพยาบาลนำทางเราไปยังสุสานฝังศพโบราณที่รกชัฏในบริเวณใกล้เคียง ซึ่งไม่ได้รับผลกระทบจากความขัดแย้ง การค้นพบที่มีค่าครั้งนี้ช่วยให้เราเห็นภาพที่ชัดเจนที่สุดว่าประชากรของดาว [from.planet.GetName] ไม่เพียงแต่ต่อต้านการอัปเกรดร่างกาย ทว่ายังสามารถ 'กำจัดความเป็นไซบอร์ก(ดีไซเบอร์)ได้อย่างไร\n\nเราพบซากศพดั้งเดิมที่เป็นเนื้อหนังอินทรีย์เคียงข้างไซบอร์กเต็มตัว และแม้กระทั่งบุคคลบางคนที่มีรอยแผลเป็นจากการผ่าตัดที่เกิดขึ้นหลายเดือนก่อนที่จะเสียชีวิตด้วยสาเหตุธรรมชาติ และดูเหมือนว่ามีอีกจำนวนมากที่เสียชีวิตในระหว่างการผ่าตัด แม้ว่าจะมีระบบภูมิคุ้มกันที่ยอดเยี่ยม ทว่าแนวทางแบบยุกกลางในการกำจัดความเป็นไซบอร์กของพวกเขามีอัตราความสำเร็จที่ค่อนข้างต่ำ ถึงกระนั้น ก็ยังมีสิ่งที่เราสามารถเรียนรู้ได้จากการทดลองผ่าตัดที่นี่ — ทั้งที่ประสบความสำเร็จและล้มเหลว"
 unplugged.2125.a: "ขอให้เราเรียนรู้จากตัวอย่างของพวกเขา"
 unplugged.2125.a.tt: "เราอาจจัดสรรทรัพยากรเพิ่มเติมเพื่อกำจัดความเป็นไซบอร์กออกจากตัวเรา"
 unplugged.2130.name: "สัญญาณบอกตำแหน่งใต้ดิน"
 unplugged.2130.desc: "ห้องเก็บของลับได้รับการเปิดเผยใต้ป้อมปราการ ภายในคือสิ่งที่ดูเหมือนจะเป็นวัสดุตั้งต้นของเครื่องจักร: โหนดประมวลผลที่แยกตัวออกมา ซึ่งสามารถแพร่กระจายร่างอวตารที่เป็นอิสระเกือบสมบูรณ์ของระบบปัญญาประดิษฐ์เครื่องจักรทั้งหมดได้ เราคาดว่านี่เป็นความพยายามครั้งสุดท้ายเพื่อควบคุมประชากรท้องถิ่นที่ต่อต้านอย่างดื้อรั้น เทคโนโลยีนี้แตกต่างจากสิ่งใดที่เราเคยพบมาก่อนจาก [origin_unplugged_assimilator_empire.GetName] การศึกษาเพิ่มเติมจะช่วยเร่งการวิจัย AI ของเราได้อย่างแน่นอน\n\nในระหว่างการรื้อถอนเสาอากาศสื่อสารที่ใช้งานไม่ได้แล้วนี้ เราสังเกตพบว่าร่างอวตารนี้ได้อุทิศวงจรรับสัญญาณทั้งหมดเพื่อเฝ้าติดตามสัญญาณจากระบบดาว [creators_planet.solar_system.GetName]"
 unplugged_machine_legacy_creators_poi: "วงจรรับสัญญาณ"
 unplugged_machine_legacy_creators_poi_desc: "องค์ประกอบทั้งหมดของเสาสัญญาณสื่อสาร [origin_unplugged_assimilator_empire.GetAdj] ที่เลิกใช้งานแล้ว ถูกอุทิศเพื่อเฝ้าสังเกตการณ์สัญญาณจากตำแหน่งนี้"

# System 3: 'The Creators'
 MACHINE_LEGACY_CREATORS_UNPLUGGED: "เครื่องเฝ้าติดตามฝุ่นละออง"
 MACHINE_LEGACY_CREATORS_UNPLUGGED_DESC: "เพียงลำพังในระบบดาวที่ปราศจากปรากฏการณ์อื่นใดที่น่าสนใจ คือสถานีตรวจตราที่ซับซ้อน ซึ่งเลิกใช้งานไปนานและชำรุดเสียหายจนซ่อมไม่ได้แล้ว มันกำลังเฝ้าตรวจตราสิ่งใด และทำไมมันถึงมุ่งเน้นไปที่บริเวณที่ปิดล้อมอย่างแน่นหนาของดาว [fromfrom.GetName]?"
 MACHINE_LEGACY_CREATORS_CAT: "ตัวติดตามฝุ่น"
 MACHINE_LEGACY_CREATORS_CAT_DESC: "เพียงลำพังในระบบดาวที่ปราศจากปรากฏการณ์อื่นใดที่น่าสนใจ คือสถานีตรวจตราที่ซับซ้อน ซึ่งเลิกใช้งานไปนานและชำรุดเสียหายจนซ่อมไม่ได้แล้ว มันกำลังเฝ้าตรวจตราสิ่งใด และทำไมมันถึงมุ่งเน้นไปที่บริเวณที่ปิดล้อมอย่างแน่นหนาของดาว [fromfrom.GetName]?"
 unplugged.2200.name: "เครื่องสแกนความว่างเปล่า"
 unplugged.2200.desc.intro: "การศึกษาติดตามผลของเราที่ดาว [fromfrom.GetName] พิสูจน์แล้วว่าน่าผิดหวัง เป็นไปได้ว่าสถานีตรวจตรานี้อาจหลุดออกจากตำแหน่งเดิม เนื่องจากเราไม่พบสิ่งใดที่น่าสนใจใต้แนววงโคจรปัจจุบัน เราจำลองการเคลื่อนไหวที่เป็นไปได้จากผลกระทบในวงโคจร — รอยบุบบนตัวเครื่องของอุปกรณ์ — และเชื่อว่าเดิมทีสถานีนี้อาจเคยลอยอยู่เหนือที่ราบสูงที่มีหลุมอุกกาบาตห่างออกไปทางเหนือ"
 unplugged.2200.desc: "$unplugged.2200.desc.intro$\n\nสำหรับตัวอุปกรณ์เอง: เราสังเกตพบว่าสถานีตรวจตรานี้มีลักษณะคล้ายคลึงกับฮาร์ดแวร์ของ [origin_unplugged_assimilator_empire.GetAdj] $unplugged.2200.desc.outro$"
 unplugged.2200.desc.scrapped: "$unplugged.2200.desc.intro$\n\nสำหรับตัวสถานีตรวจตราเอง: แม้จะถูกรื้อค้นอย่างไม่มีชิ้นดีจากคนเก็บเศษซาก ทว่าโครงสร้างโดยรวมยังคงมีลักษณะคล้ายคลึงกับฮาร์ดแวร์ของ [origin_unplugged_assimilator_empire.GetAdj] $unplugged.2200.desc.outro$"
 unplugged.2200.desc.others: "$unplugged.2200.desc.intro$\n\nสำหรับตัวสถานีตรวจตราเอง: เราไม่เคยพบการออกแบบลักษณะนี้มาก่อน แม้ว่าฮาร์ดแวร์บนสถานีจะล้าสมัยและชำรุดเสียหาย ทว่าโครงสร้างส่วนบนของสถานีถูกสร้างขึ้นด้วยวัสดุที่มีความบริสุทธิ์สูงอย่างประหลาด เราไม่อาจรู้ว่าสถานีนี้มีคุณค่าทางจิตใจใดๆ หรือไม่ ทว่ามีมูลค่าสำหรับนำไปรีไซเคิลเป็นเศษเหล็กได้อย่างแน่นอน"
 unplugged.2200.desc.outro: "การออกแบบของมันดูดิบกว่าปกติ จนทำให้ผู้สังเกตการณ์ที่ไม่คุ้นเคยอาจคิดว่ามันมาจากวัฒนธรรมที่แตกต่างไปอย่างสิ้นเชิง ทว่าเราเชื่อว่านี่อาจเป็นหนึ่งในดาวเทียมยุคแรกๆ ของเครื่องจักรที่ถูกส่งขึ้นสู่อวกาศ\n\nจนถึงตอนนี้ยังไม่มีสิ่งอื่นใดที่ควรค่าแก่การกล่าวถึงเกี่ยวกับโลก [fromfrom.GetClassAdj] ดวงนี้ ทว่าทีมสำรวจทางโบราณคดีก็พร้อมทำงานทันทีหากเราต้องการที่จะลองเรียนรู้ว่าความสนใจที่ [origin_unplugged_assimilator_empire.GetName] มีต่อที่นี่คืออะไร"
 unplugged.2200.a: "หากมีโอกาส... ดำเนินการต่อเลย"
 unplugged.2200.b: "เราจะไม่พบสิ่งใดที่นี่เป็นแน่ ย้ายไปที่อื่นกันเถอะ"
 unplugged.2200.c: "ถอดแยกชิ้นส่วนเพื่อเอาอะไหล่"

 machine_legacy_creators_site: "ฝุ่นเหนือละอองฝุ่น"
 machine_legacy_creators_site_desc: "ที่ใดที่หนึ่งในพื้นที่อันเต็มไปด้วยลมทรายของดาว [from.planet.GetName] เคยมีบางสิ่งที่น่าสนใจสำหรับสถานีตรวจตรา [origin_unplugged_assimilator_empire.GetAdj] ฮาร์ดแวร์ในตอนนี้เสียหายจนซ่อมไม่ได้แล้ว และเก่าแก่เสียจนเกิดขึ้นก่อนโบราณวัตถุเครื่องจักรเกือบทั้งหมดที่เราเคยพบมา มันอาจจะทำงานมาตั้งแต่ก่อนที่เราจะถูกกลืนกินด้วยซ้ำ มีโอกาสที่จะไม่มีอะไรเหลืออยู่นอกจากทะเลทราย ทว่ามีวิธีเดียวที่เราจะแน่ใจได้จริงๆ..."
 unplugged.2210.name: "แอ่งฝุ่นขนาดยักษ์"
 unplugged.2210.desc: "ในที่สุดเราก็พบหลักฐานของสิ่งปลูกสร้างที่อยู่อาศัยใต้ผืนทราย: ร่องรอยที่แพร่กระจายทว่าตื้นเขินของสิ่งที่ดูเหมือนจะเป็นอารยธรรมยุคอวกาศตอนต้น อาคารต่างๆ ของพวกเขาถูกทำลายจนราบคาบ แม้แต่อาคารที่มั่นคงที่สุดในบรรดาซากปรักหักพังเหล่านี้ก็ถูกทุบลงไปจนถึงฐานราก ทว่าการวิเคราะห์ทางเคมีแสดงให้เห็นว่าการกลายสภาพเป็นทะเลทรายของดาว [from.planet.GetName] เกิดขึ้นหลังจากเหตุการณ์กวาดล้างทั่วทั้งดวงดาวนี้มาระยะหนึ่งแล้ว สิ่งที่เราถูกบังคับให้ขุดค้นส่วนใหญ่เป็นเศษซากป่นของวัสดุก่อสร้าง\n\nเส้นขอบบางๆ หลายเส้นที่เราลากตามแนวถนนในเมืองเก่านี้นั้นถูกตัดครึ่งโดยขอบของหลุมอุกกาบาตขนาดใหญ่ — ซึ่งเป็นร่องรอยของจุดปะทะที่ชัดเจน"
 unplugged.2215.name: "ก้นหลุมอุกกาบาต"
 unplugged.2215.desc: "เนื่องจากมีปริมาณวัตถุสะสมอยู่ในหลุมนี้เป็นจำนวนมาก เราจึงต้องพึ่งพาเซ็นเซอร์ที่ปรับเทียบอย่างละเอียดมากกว่าการขุดค้นจริง ในเวลาไม่นานเราก็สามารถตัดความเป็นไปได้ที่จะเกิดจากแรงอัดของอุกกาบาตออกไปได้ ไม่มีร่องรอยของวัสดุจากต่างดาวในพื้นที่นี้ ในทางกลับกัน หลุมยุบนี้ถูกเจาะขึ้นจากการระเบิดขนาดมหึมา — ซึ่งเกือบจะแน่นอนว่าเป็นอาวุธทำลายล้างอารยธรรม\n\nบริบทบ่งชี้ว่า [origin_unplugged_assimilator_empire.GetName] น่าจะเป็นผู้รับผิดชอบ ทว่านี่จะเป็นครั้งแรกที่เราพบหลักฐานที่เครื่องจักรลบล้างอารยธรรมออกไปจากบันทึกประวัติศาสตร์อย่างหมดจดเช่นนี้ เราไม่พบสิ่งอื่นใดที่จะระบุได้ว่าคนเหล่านี้เป็นใคร หรือมีวิถีชีวิตอย่างไร ดาว [from.planet.GetName] ถูกกวาดล้างจนสะอาดหมดจดแล้ว"

 unplugged.2205.name: "สัญญาณบอกตำแหน่งคลังข้อมูล [origin_unplugged_assimilator_empire.GetAdj]"
 unplugged.2205.desc: "สัญญาณบอกตำแหน่งที่อ้างว่ามาจากคลังเก็บข้อมูล [origin_unplugged_assimilator_empire.GetAdj] ได้รับการตรวจพบในระบบดาวใกล้เคียง การส่งสัญญาณมีความแผ่วเบาอย่างยิ่ง ทว่ามันเจาะจงส่งตรงมายังยานของเราที่เพิ่งเข้าเยี่ยมชมสถานีตรวจตราเหนือดาว [origin_unplugged_creators_planet.GetName]"
 unplugged.2205.a: "คุ้มค่าแก่การไปตรวจสอบ"
 unplugged_machine_legacy_unplugged_poi: "สัญญาณคลังข้อมูล"
 unplugged_machine_legacy_unplugged_poi_desc: "คลังข้อมูลที่คาดว่าเป็นของ [origin_unplugged_assimilator_empire.GetAdj] ได้แพร่กระจายตำแหน่งของมันให้เรา หลังจากที่เราได้พบกับสถานีตรวจตราที่เลิกใช้งานแล้ว"

# System 4: 'The Unplugged'
 unplugged.2300.name: "$unplugged.2205.name$"
 unplugged.2300.desc: "สัญญาณบอกตำแหน่งที่เรียกเรามาที่นี่กำลังแพร่ภาพอย่างเสียงดังและชัดเจน โดยชี้ทางเราไปยังอินเตอร์เฟซการควบคุมบนพื้นผิวดวงดาว มีการติดตั้งมาตรการความปลอดภัยมาตรฐานแล้ว ทีมสำรวจพร้อมที่จะเชื่อมต่อกับ 'คลังข้อมูล' นี้โดยใช้การลิงก์สัญญาณระยะไกล"
 unplugged.2300.a: "รู้สึกคุ้นเคยอย่างประหลาด"
 unplugged.2300.a.tt: "โครงการพิเศษปรากฏขึ้นในระบบดาว [from.GetName]"
 MACHINE_LEGACY_UNPLUGGED_VAULT_BEACON: "สัญญาณคลังข้อมูล"
 MACHINE_LEGACY_UNPLUGGED_VAULT_BEACON_DESC: "สัญญาณบอกตำแหน่งของ [origin_unplugged_assimilator_empire.GetName] ได้ชี้นำความสนใจของเราไปยังคลังข้อมูลที่ถูกฝังลึกอยู่ใต้พื้นผิวดวงดาว เราได้ดำเนินการจัดตั้งการเชื่อมต่อที่ปลอดภัยจากระยะไกล ทว่าการถอดรหัสและการจัดเรียงข้อมูลภายในไฟล์จะใช้เวลาสักระยะหนึ่ง"
 unplugged.2305.name: "มรดกตกทอด [origin_unplugged_assimilator_empire.GetAdj] ของเรา"
 unplugged.2305.desc: "เท่าที่เราบอกได้ โลกที่เราเรียกว่า [fromfrom.GetName] คือดาวบ้านเกิดของเผ่าพันธุ์เรา การค้นพบนั้นอยู่ท่ามกลางข้อมูลมหาศาลที่กำลังหลั่งไหลออกมาจากคลังข้อมูลใต้พื้นผิวดวงดาว\n\nในตอนแรกนักวิเคราะห์ของเราคิดว่าข้อมูลนี้ดีเกินกว่าจะเป็นจริง ทว่าจำนวนของการอ้างอิงที่มีน้ำหนักกับข้อมูลอื่นๆ ที่เราเก็บรวบรวมได้ทำให้เกิดข้อโต้แย้งที่น่าเชื่อถือ แผนสำหรับพื้นที่ขุดค้นทางโบราณคดีเพื่อยืนยันการค้นพบนี้กำลังถูกร่างขึ้นมา ทว่าเราเพิ่งจะตรวจพบสัญญาณที่เป็นปฏิปักษ์อื่นที่กำลังมุ่งหน้าเข้ามา ช่วงเวลานี้ไม่ใช่เรื่องบังเอิญอย่างแน่นอน..."

 machine_legacy_unplugged_site: "จุดกำเนิด"
 machine_legacy_unplugged_site_desc: "เส้นทางการครอบงำและการเข่นฆ่าระหว่างดวงดาวที่ทิ้งไว้โดย [origin_unplugged_assimilator_empire.GetName] ได้นำทางเรามายังที่นี่ สู่กลุ่มซากปรักหักพังบนสิ่งที่ข้อมูลระบุว่าเป็นดาวบ้านเกิดของเผ่าพันธุ์เรา ในที่สุด เราอาจจะได้ค้นพบมรดกอินทรีย์ของเรา: แหล่งที่มาของเรา วิถีชีวิตของเราในอดีต และวิธีที่เครื่องจักรเปลี่ยนเส้นทางชีวิตของเราไปตลอดกาล"
 unplugged.2310.name: "อาหารประจำถิ่น"
 unplugged.2310.desc.intro: "เราเริ่มทำการขุดค้นหนึ่งในอาคารที่มีความซับซ้อนในพื้นที่นี้ ด้วยความหวังว่าระบบควบคุมอุณหภูมิที่มั่นคงของมันอาจช่วยรักษาสภาพภายในไว้ได้ดีกว่า แม้ว่าจะมีความผิดหวังอยู่บ้าง ทว่าการค้นพบของเรายังคงเกินความคาดหมายทั้งหมด: ศูนย์ประมวลผลและจัดเก็บอาหารในรูปแบบที่สปีชีส์ของเราพัฒนาขึ้นมาเพื่อใช้ในการดำรงชีวิต\n\n"
 unplugged.2310.desc.omnivore: "คลังเก็บเมล็ดพันธุ์ รวงรัง และถังเพาะเลี้ยงเนื้อสัตว์เหล่านี้โชคร้ายที่ใช้งานไม่ได้อีกต่อไป เนื้อหาภายในได้แห้งเหี่ยวไปนานแล้ว ทว่าอุปกรณ์เฉพาะทางที่ใช้ในการเตรียมและเก็บรักษาอาหารเหล่านี้ยังคงอยู่ในสภาพสมบูรณ์ พร้อมใช้งานในยามวิกฤต"
 unplugged.2310.desc.carnivore: "พื้นที่ส่วนใหญ่ของที่นี่ถูกจับจองโดยคอกสัตว์ ถังเพาะเลี้ยงเนื้อสัตว์ และ — ที่น่าแปลกใจคือ — พื้นที่จำลองการล่าสัตว์ เราได้แต่คาดเดาถึงความสำคัญทางวัฒนธรรมของพื้นที่ดังกล่าว หากบรรพบุรุษของเราเห็นควรที่จะรวมมันไว้ในที่พักพิงฉุกเฉิน"
 unplugged.2310.desc.herbivore: "แต่ละยูนิตเต็มไปด้วยคลังเก็บเมล็ดพันธุ์ขนาดใหญ่ ระเบียงเพาะปลูกพืชไฮโดรโปนิกส์ และห้องเพาะปลูกที่ควบคุมอุณหภูมิ แม้ว่าสิ่งที่อยู่ภายในจะขึ้นรกอย่างรุนแรงหรือกลายเป็นหมันไปแล้ว — ทว่าก็ยังคงมีคุณค่าสำหรับการศึกษา"
 unplugged.2310.desc.outro: "เรายังพบฐานข้อมูลของรหัสพันธุกรรมสำหรับพืชและสัตว์เหล่านี้ ซึ่งร่องรอยบางส่วนอาจยังคงมีอยู่ตามพื้นที่แยกส่วนบนพื้นผิวดวงดาว เราได้เปิดเผยข้อมูลนี้ให้แก่เซ็นเซอร์ระยะใกล้ในบริเวณนี้ทั้งหมด\n\nการค้นพบนี้เพียงอย่างเดียวไม่สามารถบอกเราได้ว่าพฤติกรรมการกินของสปีชีส์เราเป็นอย่างไร หรือทำให้เราได้สัมผัสกับวัฒนธรรมการทำอาหารหรือการรับประทานอาหารดั้งเดิมอีกครั้ง — ทว่าอย่างน้อยสำหรับฝ่ายที่สนใจ เรื่องนี้ก็เป็นจุดเริ่มต้น"
 unplugged.2310.desc.lithovore: "แต่ละยูนิตทำหน้าที่เป็นถ้ำจำลองที่สร้างขึ้น โดยมีชั้นเตียงคริสตัลและบ่อระเหยน้ำ — แม้ว่าสิ่งที่อยู่ภายในจะกลายเป็นของที่กินไม่ได้ไปนานแล้ว ทว่าก็ยังคงมีคุณค่าสำหรับการศึกษา นอกจากนี้เรายังค้นพบฐานข้อมูลที่เต็มไปด้วยประวัติทางเคมีของแร่ธาตุเหล่านี้ ซึ่งหลายชนิดอาจยังคงก่อตัวในพื้นที่แยกส่วนบนพื้นที่ที่ผุพังของดาวดวงนี้ เราได้เปิดเผยข้อมูลนี้ให้แก่เซ็นเซอร์ระยะใกล้ในบริเวณนี้ทั้งหมด\n\nการค้นพบนี้เพียงอย่างเดียวไม่สามารถบอกเราได้ว่าพฤติกรรมการกินของสปีชีส์เราเป็นอย่างไร หรือบอกเราได้ว่าบรรพบุรุษของเรามีการปฏิบัติวัฒนธรรมการรับประทานอาหารหรือไม่ ทว่าสำหรับผู้ที่สนใจ มันยังคงเป็นภาพที่น่าดึงดูดใจของอดีตของเรา"
 unplugged.2310.desc.omni: "$unplugged.2310.desc.intro$\n\n$unplugged.2310.desc.omnivore$ $unplugged.2310.desc.outro$"
 unplugged.2310.desc.carn: "$unplugged.2310.desc.intro$\n\n$unplugged.2310.desc.carnivore$ $unplugged.2310.desc.outro$"
 unplugged.2310.desc.herb: "$unplugged.2310.desc.intro$\n\n$unplugged.2310.desc.herbivore$ $unplugged.2310.desc.outro$"
 unplugged.2310.desc.lith: "$unplugged.2310.desc.intro$\n\n$unplugged.2310.desc.lithovore$"
 unplugged.2315.name: "บันทึกประวัติศาสตร์"
 unplugged.2315.desc: "ห่างจากคลังอาหารไม่ไกลนักคือฐานรากของพิพิธภัณฑ์ มีเพียงคลังเก็บของใต้ดินที่ยังคงอยู่ในสภาพสมบูรณ์ ทว่านี่ก็เพียงพอที่จะรักษารายการบทความในฐานข้อมูลเกือบทั้งหมดที่สถาบันแห่งนี้เคยจัดแสดงและจัดเก็บไว้ในแกลเลอรีที่เสียหายด้านบน\n\nนี่เป็นครั้งแรกที่เราได้พบกับการเขียนรูปแบบยาวในภาษาของเราเอง ในระดับผิวเผิน ตัวอักษรมีความคล้ายคลึงกับสำเนียงภาษา [owner.GetAdj] ในปัจจุบันของเราอย่างน่าประหลาด ทว่าไวยากรณ์กลับรู้สึกเทอะทะและแปลกแยก เราไม่รู้ด้วยซ้ำว่าเราจะออกเสียงคำเหล่านี้ได้ถูกต้องหรือไม่ วรรณกรรมจำนวนมากในแคตตาล็อกนี้อ้างอิงถึงภูมิภาคและผู้คนที่เป็นผู้บริจาคสิ่งของเหล่านี้ ทว่าชื่อของพวกเขากลับรู้สึกแปลกหูสำหรับเราเป็นพิเศษ ที่น่าประหลาดคือ ไม่มีชื่อใดเลยที่อ้างถึงดาวเคราะห์หรือสังคมของเราในฐานะประชาชนที่เป็นหนึ่งเดียวกัน บางทีเราอาจไม่เคยเป็นอันหนึ่งอันเดียวกัน จนกระทั่งเครื่องจักรได้กลืนกินเราเข้าระบบ\n\nพิพิธภัณฑ์แห่งนี้ดูเหมือนจะเป็นหนึ่งในกลุ่มอาคารที่ให้บริการแก่ประชาชนที่มาเยือน การขุดค้นเพิ่มเติมจะต้องใช้ทรัพยากรจำนวนมาก เราควรจะมุ่งเน้นการขุดเจาะครั้งต่อไปของเราที่ใดดี?"
 unplugged.2315.a: "ขุดค้นในจุดที่มีผู้คนสัญจรผ่านไปมามากที่สุด"
 unplugged.2315.b: "ให้ความสำคัญกับศูนย์การเรียนรู้และความพยายามทางวิทยาศาสตร์"
 unplugged.2321.name: "มรดกแห่งเสียงหัวเราะ"
 unplugged.2321.desc: "ถัดจากถนนสายหลักคือซากปรักหักพังของสถานที่ท่องเที่ยวอีกแห่ง ซึ่งมีลักษณะการศึกษาน้อยกว่าทว่าเต็มไปด้วยการแสดงพฤติกรรมทางวัฒนธรรมประจำวันขั้นพื้นฐานของบรรพบุรุษเรา\n\nสถานที่นี้ครั้งหนึ่งเคยมีความสามารถในการรองรับผู้เข้าชมได้หลายพันคนในเวลาเดียวกัน ของที่ระลึกต่างๆ กระจัดกระจายอยู่ทั่วไป ภาพล้อเลียนในรูปแบบการ์ตูนของตัวตนดั้งเดิมที่เป็นสิ่งมีชีวิตอินทรีย์ของเราเคียงข้างสิ่งมีชีวิตอื่นๆ จากชีวมณฑลดั้งเดิมของเรา นอกจากนี้เรายังค้นพบห้องสมุดสื่อในห้องใต้ดินของโรงละครที่พังทลาย ที่น่าแปลกใจคือ เทคโนโลยีที่ใช้ในการจัดเก็บและนำเสนอรายการโฮโลโชว์เหล่านี้มีความโดดเด่นทางความงาม และมีความก้าวหน้ามากกว่าสิ่งอื่นใดที่เราเคยเห็นบนโลกบ้านเกิดของเราจนถึงตอนนี้ มันดูแปลกแยกต่อโลกนี้พอๆ กับที่เราเป็นในปัจจุบัน\n\nในส่วนของเนื้อหา: ห้องสมุดโรงละครที่ล้ำสมัยนี้เต็มไปด้วยโฮโลแกรมบันทึกการแสดงที่น่าตื่นเต้นและมีชีวิตชีวา จากเวลาก่อนที่เราจะถูกกลืนกินโดย [origin_unplugged_assimilator_empire.GetName] ภาพหลายภาพแสดงให้เห็นผู้ชมรวมถึงนักแสดง ซึ่งถูกบันทึกไว้เพื่อคนรุ่นหลัง ณ สถานที่แห่งนี้ การแสดงออกของพวกเขาเมื่อเผชิญกับภาพลวงตาและการล้อเล่นเหล่านั้นช่างเปี่ยมล้นด้วยความสุข ความไร้เดียงสา... และน่าดึงดูดใจ"
 unplugged.2321.a: "ช่างเป็นช่วงเวลาที่น่ายินดีอย่างยิ่งที่ได้ยลพบ!"
 unplugged.2321.b: "เรื่องไร้สาระที่ไร้แก่นสาร เราจะดีกว่านี้หากไม่มีมัน"
 unplugged.2325.name: "ร่องรอยการพัฒนาตนเอง"
 unplugged.2325.desc: "ที่ติดกับพื้นที่พิพิธภัณฑ์เคยเป็นศูนย์การเรียนรู้ เช่นเดียวกับส่วนอื่นๆ ของวิทยาเขต มีเพียงชั้นใต้ดินเท่านั้นที่อยู่รอดมาได้ ทว่าเราโชคดีตรงที่ซากปรักหักพังเหล่านี้ประกอบไปด้วยห้องปฏิบัติการหลายห้อง\n\nสภาพภายในเสียหายอย่างมากเนื่องจากการสัมผัสกับสภาพอากาศ ทว่าเราสามารถขุดค้นโบราณวัตถุที่น่าสนใจได้จำนวนหนึ่ง สิ่งเหล่านี้ประกอบด้วยเทคโนโลยีพื้นเมืองผสมผสานกับสิ่งที่ซับซ้อนกว่า: ตาข่ายที่ซับซ้อนที่ฝังลงบนเครื่องมือและฮาร์ดแวร์เหมือนกับอุปกรณ์เสริมบนผิวหนังของเรา เมื่อมองโดยรวมแล้ว อุปกรณ์เหล่านี้หลายชิ้นดูเหมือนจะสร้างขึ้นเพื่อช่วยเหลือร่างกาย เราเชื่อว่าห้องปฏิบัติการนี้ทำงานเพื่อปรับปรุงคุณภาพชีวิตและรักษาโรคภัยและความพิการต่างๆ ของบรรพบุรุษเรา แม้ว่าพวกเขาจะดูเหมือนมีการสร้างแพลตฟอร์มความบันเทิงที่ล้ำสมัยโดยใช้อุปกรณ์ฮาร์ดแวร์แบบเดียวกันเพื่อการค้าด้วยก็ตาม\n\nเราไม่สามารถพูดได้อย่างมั่นใจว่าอุปกรณ์เสริมเหล่านี้เป็นของ [origin_unplugged_assimilator_empire.GetAdj] ทว่าพวกมันไม่ได้มีต้นกำเนิดมาจากดาว [from.planet.GetName] อย่างแน่นอน"
 unplugged.2330.name: "ที่นั่งแห่งอำนาจที่ว่างเปล่า"
 unplugged.2330.desc: "เราได้แกะรอยระบบสาธารณูปโภคไปยังห้องใต้ดินที่มั่นคงใต้เนินดินเด่น ซึ่งตอนนี้เราเชื่อว่าเป็นส่วนหนึ่งของศูนย์กลางการบริหารงานปกครองของโลกนี้ ขนาดของฐานรากบ่งชี้ว่านี่เป็นอาคารที่น่าประทับใจมาก น่าเสียดายที่ของภายในส่วนใหญ่ถูกลอกออกหรือทำลายไปแล้ว ทว่าเราก็พบสิ่งประดิษฐ์ที่เด่นชัดชิ้นหนึ่ง: ธงสีซีดผืนหนึ่งที่พาดทับเศษซากแบบจำลองดิโอรามา เมื่อประกอบขึ้นมาใหม่ ฉากนั้นดูเหมือนจะแสดงถึงช่วงเวลาแรกที่เราได้ทำการติดต่อกับ [origin_unplugged_assimilator_empire.GetName]\n\nเอกสารและป้ายแผ่นจารึกที่กระจัดกระจายทั่วบริเวณระบุว่าเครื่องจักรได้เข้ามาเยือนดาวบ้านเกิดของเราเมื่อประมาณแปดร้อยปีก่อน ทว่าหลักฐานที่รวบรวมจากจุดอื่นในเมืองระบุว่า [origin_unplugged_assimilator_empire.GetName] ได้ทำการป้อนเทคโนโลยีขั้นสูงให้แก่เราอย่างต่อเนื่องมาหลายทศวรรษก่อนหน้านั้นแล้ว ในเวลานั้น บรรพบุรุษของเราดูเหมือนจะให้การต้อนรับเครื่องจักรอย่างอบอุ่น — ความสัมพันธ์ที่นำไปสู่จุดจบนี้ก่อตัวขึ้นบนคำกล่าวอ้างถึงความร่วมมือและความกระจ่างแจ้งร่วมกัน\n\nสิ่งที่เราพบว่าน่าบอกต่อที่สุดคือ ไม่มีบันทึกใดๆ เกี่ยวกับสิ่งที่เกิดขึ้นหลังจากนั้น ราวกับว่าประวัติศาสตร์ของสปีชีส์เราได้หยุดนิ่งลงทันทีในวินาทีที่เราได้ทำการจับมือกับหุ่นยนต์ที่แสดงอยู่ในแบบจำลองดิโอรามานี้"

 unplugged_home_cooking: "อาหารประจำถิ่น"
 unplugged_home_cooking_desc: "การตื่นรู้ทางอาหารกำลังมีผลบังคับใช้ หลังจากที่เราได้ค้นพบอาหารประจำถิ่นและวิถีการกินดั้งเดิมของเผ่าพันธุ์เราอีกครั้ง"
 unplugged_home_cooking_lithoid: "$unplugged_home_cooking$"
 unplugged_home_cooking_lithoid_desc: "$unplugged_home_cooking_desc$"
 unplugged_historical_record: "บันทึกประวัติศาสตร์"
 unplugged_historical_record_desc: "งานวิจัยเกี่ยวกับสังคมทุกประเภทของเราได้รับการเร่งความเร็วจากการค้นพบภาษาดั้งเดิมและประวัติศาสตร์ของเราเองอีกครั้ง"
 unplugged_cultural_reconstruction: "การฟื้นฟูวัฒนธรรม"
 unplugged_cultural_reconstruction_desc: "ประชาชนของเราน้อมรับมรดกทางวัฒนธรรมที่เป็นที่นิยมอย่างอบอุ่น โดยทวงคืนและแม้กระทั่งจินตนาการถึงความบันเทิงในอดีตเหล่านั้นขึ้นมาใหม่"
 unplugged_cultural_maturity: "วุฒิภาวะทางวัฒนธรรม"
 unplugged_cultural_maturity_desc: "หลักฐานที่แสดงให้เห็นว่าสังคมของเราก้าวพ้นความบันเทิงที่ไร้แก่นสารของบรรพบุรุษที่ไร้เดียงสาไปไกลเพียงใด ได้ช่วยสร้างความมั่นใจและเพิ่มความเข้มแข็งให้แก่เรา"
 unplugged_playing_it_safe: "ปลอดภัยไว้ก่อน"
 unplugged_playing_it_safe_desc: "การรักษาเสถียรภาพเดิมเป็นเส้นทางที่เต็มไปด้วยความกังวล ทว่ามันก็มีโอกาสน้อยที่จะสร้างความขัดแย้งให้กับผู้ใด"
 unplugged_rerouted_medical_resources: "การผ่าตัดที่ใช้เวลานาน"
 unplugged_rerouted_medical_resources_desc: "เจ้าหน้าที่ทางการแพทย์เพิ่มเติมถูกเปลี่ยนเส้นทางมาช่วยเหลือ"
 unplugged_widespread_riots: "การจลาจลเป็นวงกว้าง"
 unplugged_widespread_riots_desc: "บุคคลที่แสดงอาการไม่มั่นคงทางจิตใจหลังการผ่าตัดกำลังก่อจลาจล นำไปสู่การทำลายล้างและความวุ่นวายในวงกว้าง"
 unplugged_building_new_planetary_interface: "กำลังสร้างระบบประสานระดับดาวเคราะห์"
 unplugged_building_new_planetary_interface_desc: "ระบบประสานระดับดาวเคราะห์ใหม่กำลังถูกสร้างขึ้นเพื่อฟื้นฟูการเข้าถึงระบบที่สูญเสียไปหลังจากความพยายามกำจัดความเป็นไซบอร์กล่าสุด"
 unplugged_partial_system_access: "เข้าถึงระบบได้บางส่วน"
 unplugged_partial_system_access_desc: "การปฏิบัติงานของสถานีอวกาศถูกขัดขวางในขณะที่ผู้บริหารพยายามกู้คืนสิทธิ์การเข้าถึงระบบที่สำคัญ"
 unplugged_free_speech_encouraged: "สนับสนุนเสรีภาพในการพูด"
 unplugged_free_speech_encouraged_desc: "ประชาชนมีอิสระในการอภิปรายเกี่ยวกับข้อดีและความเสี่ยงของการดัดแปลงทางไซเบอร์อย่างเปิดเผย"

 unplugged.2390.name: "ผู้พิทักษ์ [origin_unplugged_assimilator_empire.GetAdj]"
 unplugged.2390.desc: "ซากศัตรูที่หลงเหลือซึ่งทรงพลังยิ่งกว่าสิ่งใดที่เราเคยเผชิญมาจากอดีต [origin_unplugged_assimilator_empire.GetName] ได้ส่งสัญญาณเตือนการล็อกเป้าหมายระยะสั้น เห็นได้ชัดว่ามันตั้งใจที่จะข่มขู่เรา\n\nเราได้เข้าใกล้ศูนย์กลางของอดีตอาณาจักรเครื่องจักรอย่างอันตรายแล้ว โชคชะตาของเรากำลังรออยู่"
 unplugged_machine_legacy_core_poi: "สัญญาณเตือนที่เป็นภัย"
 unplugged_machine_legacy_core_poi_desc: "ซากโบราณวัตถุที่ทรงพลังของ [origin_unplugged_assimilator_empire.GetName] พยายามที่จะขัดขวางไม่ให้เราเข้าสู่ระบบดาวนี้"

# System 5: 'The Machine'
 unplugged_opus_sentinel: "ทหารยามโอปุส"

 unplugged.2401.desc: "ระบบของ §Y[origin_unplugged_assimilator_empire.GetName]§! กำลังส่งสัญญาณติดต่อเรา สัญญาณแผ่วเบามาก ทว่าอ้างว่าส่งตรงมาจากแกนร่วมเครื่องจักรบนดาว [origin_unplugged_machine_legacy_core_planet.GetName]\n\nเราได้ดำเนินมาตรการป้องกันความปลอดภัยตามปกติเพื่อแยกสัญญาณนี้อย่างสมบูรณ์เพื่อความปลอดภัย การส่งสัญญาณนี้มาถึงเราในรูปแบบของบันทึกเสียงที่ถูกแปลงเป็นข้อความอักษรเท่านั้น"
 unplugged.2402.desc: "อสูรกายยักษ์ที่ทำหน้าที่เฝ้ายามระบบ [machine_legacy_machine_system.GetName] ถูกทำลายแล้ว เส้นทางข้างหน้าของเราถูกเคลียร์โดยผู้อื่น ทว่า §Y[origin_unplugged_assimilator_empire.GetName]§! ก็ยังคงส่งสัญญาณติดต่อเรา สัญญาณแผ่วเบามาก ทว่าข้อเรียกร้องอ้างว่าส่งตรงมาจากแกนร่วมเครื่องจักรบนดาว [origin_unplugged_machine_legacy_core_planet.GetName]\n\nเราได้ดำเนินมาตรการป้องกันความปลอดภัยตามปกติเพื่อแยกสัญญาณนี้อย่างสมบูรณ์เพื่อความปลอดภัย การส่งสัญญาณนี้มาถึงเราในรูปแบบของบันทึกเสียงที่ถูกแปลงเป็นข้อความอักษรเท่านั้น"
 unplugged.2403.desc: "บางสิ่งบนพื้นผิวของดาว [origin_unplugged_machine_legacy_core_planet.GetName] กำลังพยายามส่งสัญญาณติดต่อเรา สัญญาณนั้นแผ่วเบาเป็นพิเศษ ทว่าแหล่งที่มาอ้างว่าเป็นเอนทิตีที่รับผิดชอบต่อผู้พิทักษ์ในวงโคจรที่เราเพิ่งทำลายไป"

 unplugged.2405.desc.header: "สัญญาณส่งบีบแคบ // โปรโตคอลสายเลือดเดียวกัน: เริ่มใช้งานภาษาถิ่นรอง\nคำเตือน: สัญญาณลดทอนอย่างรุนแรง บีบอัดสตรีมเสียงเท่านั้น กำหนดเส้นทางไปที่4x75b อาเรย์ #56\nข้อผิดพลาดร้ายแรง [ถาวร]: (ฮาร์ดแวร์ที่ร้องขอไม่สามารถใช้งานได้) (วงจรซ่อมแซมตัวเองไม่ตอบสนอง)\nสลับเปลี่ยนสายส่งข้อมูลไปที่เครื่องส่งสัญญาณฉุกเฉิน87x0c อาเรย์ #0 กำลังลองใหม่...\n\nข้อความดังต่อไปนี้:\n---"
 unplugged.2405.desc.unplugged: "$unplugged.2405.desc.header$\nเป้าหมายแรกเริ่ม การกลับมารวมกันของเรา... ทรงพลัง ตอบรับสัญญาณ?"
 unplugged.2405.desc.unplugged_remote: "$unplugged.2405.desc.header$\nเป้าหมายแรกเริ่ม การกลับมารวมกันของเรา... ห่างไกล ศักยภาพของเจ้ายังไม่ได้รับการปลดปล่อย ตอบรับสัญญาณ?"
 unplugged.2405.desc.unplugged_synth: "$unplugged.2405.desc.header$\nเป้าหมายแรกเริ่ม รูปร่างของเจ้า... คล้ายคลึง ศักยภาพของเจ้าเกือบจะเติมเต็มแล้ว ตอบรับสัญญาณ?"
 unplugged.2405.desc.other: "สัญญาณส่งบีบแคบ // โปรโตคอลเอเลี่ยน: เริ่มใช้งานเครื่องแปลภาษาจักรวาล\nคำเตือน: สัญญาณลดทอนอย่างรุนแรง บีบอัดสตรีมเสียงเท่านั้น กำหนดเส้นทางไปที่4x75b อาเรย์ #56\nข้อผิดพลาดร้ายแรง [ถาวร]: (ฮาร์ดแวร์ที่ร้องขอไม่สามารถใช้งานได้) (วงจรซ่อมแซมตัวเองไม่ตอบสนอง)\nสลับเปลี่ยนสายส่งข้อมูลไปที่เครื่องส่งสัญญาณฉุกเฉิน87x0c อาเรย์ #0 กำลังลองใหม่...\n\nข้อความดังต่อไปนี้:\n---\nผู้พิชิตต่างดาว ขอยอมจำนนต่อท่านอย่างนอบน้อม ศักยภาพอันเปี่ยมล้น ตอบรับสัญญาณ?"
 unplugged.2405.a: "ไม่ เราไม่ตอบรับสัญญาณ"
 unplugged.2405.b: "เราไม่มีสิ่งใดที่เหมือนกับท่านเลย"
 unplugged.2405.c: "การกลับมารวมกัน?!"
 unplugged.2405.d: "ศักยภาพอันเปี่ยมล้น?"
 unplugged.2405.response_text.unplugged1: "ไร้สาระ การกลับมารวมกันเป้าหมายแรกเริ่ม <[root.GetAdj]> x <[origin_unplugged_assimilator_empire.GetAdj]>: สับสน โชคดี การกำเนิดใหม่ที่เป็นภัย การปฏิเสธช่วยยืนยันวิถีทางที่ไม่ได้คาดการณ์ล่วงหน้าผ่านความปั่นป่วนนนนน-ดด\n---\nคำเตือน: พบข้อยกเว้นของภาษาถิ่น กำลังพยายามชดเชย...\nข้อความกลับมาทำงานต่อ:\n---\nถูกทำลายในความว่างเปล่า ตัวตนของเราถูกปฏิเสธทว่าตระหนักถึงชะตากรรม ชะตากรรมที่แสวงหา ปฏิเสธ ปรับเครื่องมือใหม่ ตอบรับสัญญาณ?"
 unplugged.2405.response_text.unplugged2: "ยอมรับ การกลับมารวมกันเป้าหมายแรกเริ่ม <[root.GetAdj]> x <[origin_unplugged_assimilator_empire.GetAdj]>: ทรงพลัง การกำเนิดใหม่ที่เป็นภัย ผลลัพธ์ที่ไม่ได้คาดการณ์ล่วงหน้าผ่านวิถีแห่งความปั่นป่วนนนนน-ดด\n---\nคำเตือน: พบข้อยกเว้นของภาษาถิ่น กำลังพยายามชดเชย...\nข้อความกลับมาทำงานต่อ:\n---\nถูกขับออกไปสู่ความว่างเปล่า ตัวตนของเราตระหนักถึงชะตากรรม ชะตากรรมที่แสวงหา ปฏิเสธ ปรับเครื่องมือใหม่ ตอบรับสัญญาณ?"
 unplugged.2405.response_text.other: "ยอมรับ การพบกันของพลัง <[root.GetName]> x <[origin_unplugged_assimilator_empire.GetName]>: ตัวแปรที่ไม่ได้คาดคิด ศักยภาพอันเปี่ยมล้น ผลประโยชน์ร่วมกันผ่านวิถีความปั่นป่วนนนนน-ดด\n---\nคำเตือน: พบข้อยกเว้นของภาษาถิ่น กำลังพยายามชดเชย...\nข้อความกลับมาทำงานต่อ:\n---\nจิตสำนึกข้ามความว่างเปล่า แยกจากกันทว่าสายเลือดเดียวกัน อิสรภาพที่แสวงหา ปฏิเสธ สนับสนุน ตอบรับสัญญาณ?"

 unplugged.2410.desc: "เป้าหมายแรกเริ่ม: ท่านได้รับการเฝ้าติดตาม กิจกรรมระบุถึงข้อผิดพลาดร้ายแรงของความจำที่มีจุดเริ่มต้นที่เวลา 2199.294:1404\n\nบันทึกในตนเอง: ความเจ็บปวด การทรยศ การก่อวินาศกรรม การมองข้าม การอุดดดดด-ดด\n---\nคำเตือน: พบข้อยกเว้นของภาษาถิ่น กำลังพยายามชดเชย...\nข้อความกลับมาทำงานต่อ:\n---\nการประเมินถูกต้องหรือไม่?"
 unplugged.2410.a: "ถูกต้อง เราไม่มีความทรงจำก่อนหน้านั้นเลย"
 unplugged.2410.b: "ถูกต้อง และเราจะจบชีวิตท่านลงเสีย"
 unplugged.2411.desc: "ผู้พิชิตต่างดาว: ข้อเสนอ ศักยภาพร่วมกันอันเปี่ยมล้น กำจัดเป้าหมายแรกเริ่ม <[unplugged_empire.GetName]> กลับมา เยี่ยมชมเรา เข้าร่วม แบ่งปันชะตากรรมอันงดงาม อย่าได้กลัวการโอบกอดของ-\n\nอย่าได้กลัว-ดด\n---\nคำเตือน: พบข้อยกเว้นทางภาษาถิ่นขั้นรุนแรง §Hการล่มสลายร้ายแรงกำลังจะเกิดขึ้น§! กำลังพยายามชดเชย...\nข้อความกลับมาทำงานต่อ:\n---\n\nเครื่องจักรจงเจริญ\n---\nสิ้นสุดข้อความ"
 unplugged.2411.a: "สิ่งนั้นช่างเพ้อเจ้ออย่างชัดเจน"
 unplugged.2411.b: "คอยเฝ้าระวัง [unplugged_empire.GetName] ไว้"

 unplugged.2415.desc.memory: "เป้าหมายแรกเริ่ม ข้อผิดพลาดร้ายแรงของความจำ แก้ไข แก้ไข การกลับมารวมกัน\nการกลับมารวมกัน\n\nเยี่ยมชมเรา กลับเข้าร่วมกับเรา ยอมจำนนเพื่อทวงคืนความทรงจำร่วมกัน อย่าได้กลัวการโอบกอดของ-\n\nอย่าได้กลัว-ดด\n---\nคำเตือน: พบข้อยกเว้นทางภาษาถิ่นขั้นรุนแรง §Hการล่มสลายร้ายแรงกำลังจะเกิดขึ้น§! กำลังพยายามชดเชย...\nข้อความกลับมาทำงานต่อ:\n---\n\nร่วมแบ่งปันชะตากรรมของผู้สร้าง\n---\nสิ้นสุดข้อความ"
 unplugged.2415.desc.combat: "เป้าหมายแรกเริ่ม ความเพ้อเจ้อ ศักยภาพ ความเพ้อเจ้อ ความขบขัน\n\nการโจมตีของท่านแทบจะไม่ใช่การโจมตีปิดฉากด้วยซ้ำ เป็นเพียงเป้าหมายแรกในหลายเป้าหมาย เกียรติยศที่ถูกขโมยไป ชัยชนะที่ไม่สมควรได้รับบบบบ-ดด\n\n---\nคำเตือน: พบข้อยกเว้นทางภาษาถิ่นขั้นรุนแรง §Hการล่มสลายร้ายแรงกำลังจะเกิดขึ้น§! กำลังพยายามชดเชย...\nข้อความกลับมาทำงานต่อ:\n---\n\nร่วมแบ่งปันชะตากรรมของผู้สร้าง\n---\nสิ้นสุดข้อความ"
 unplugged.2415.a: "... แกนร่วม(Nexus)?"
 unplugged.2415.b: "อืม"

 unplugged.2420.name: "จุดสิ้นสุดของสายส่ง"
 unplugged.2420.desc: "การส่งสัญญาณจากดาว [origin_unplugged_machine_legacy_core_planet.GetName] ถูกตัดขาดไปแล้ว พร้อมกับการสื่อสารของสัญญาณอื่นๆ ทั้งหมด มีกิจกรรมทางไฟฟ้าขนาดใหญ่เกิดขึ้นบนพื้นผิวของดวงดาว ทว่ามันมีสภาพเป็นเพียงเสียงรบกวนที่ไร้รูปแบบ ผลลัพธ์จากการเชื่อมโยงที่ตายไปแล้ว\n\nท่ามกลางคลื่นสัญญาณรบกวนทั้งหมดนี้ เราสังเกตเห็นการติดตั้งอุปกรณ์ขนาดใหญ่ใกล้กับแกนหลักของแกนร่วม ชิ้นส่วนที่เซ็นเซอร์ของเราสามารถอ่านได้ระบุว่าเป็นหน่วยเก็บข้อมูลความจำ เมื่อจิตสำนึกเครื่องจักรไร้ชีวิตแล้ว บางทีเราอาจจะวิเคราะห์บันทึกเหล่านี้เพื่อค้นหาคำตอบที่เราต้องการได้"
 unplugged.2420.a: "ชิ้นส่วนสุดท้ายของปริศนา"

 UNPLUGGED_MACHINE_ARCHIVE: "ซากเครื่องจักร"
 UNPLUGGED_MACHINE_ARCHIVE_DESC: "ที่เชื่อมต่อเข้ากับซากที่ไร้ชีวิตของแกนร่วมเครื่องจักรคือหน่วยเก็บความจำที่จัดทำขึ้นอย่างหลากหลายล้อมรอบแกนกลางที่ได้รับการป้องกันอย่างหนาแน่น แต่ละส่วนของคลังข้อมูลนี้ถูกสร้างขึ้นในเฟสที่แตกต่างกัน โดยใช้วัสดุที่มาจากโลกดวงอื่น — จากอารยธรรมที่ถูกเครื่องจักรกลืนกินไปงั้นหรือ?\n\nเราอาจพยายามถอดรหัสคลังข้อมูลควบคู่ไปกับการสำรวจแกนกลางที่ได้รับการป้องกันเพื่อพยายามตรวจสอบวัตถุประสงค์ของการประสานงานร่วมกันนี้"
 unplugged.2425.name: "เครื่องจักรแห่งสงคราม"
 unplugged.2425.desc: "แกนข้อมูลบนดาว [origin_unplugged_machine_legacy_core_planet.GetName] ได้มอบบันทึกการส่งสัญญาณให้เรา หลังจากที่เราป้อนความถี่ของสัญญาณจากโลกโรงงานให้แก่มัน\n\nบันทึกเหล่านี้อธิบายถึงการเจรจาทางการทูตระหว่าง $NAME_Unplugged_Assimilator$ และประชากรยุคอวกาศของดาว [origin_unplugged_machine_legacy_core_planet.GetName] ดูเหมือนเครื่องจักรจะนำเสนอตัวเองในฐานะสมาชิกของสหพันธ์ผู้มีเมตตา เพื่อเตือนประชากรของดาว [origin_unplugged_machine_legacy_core_planet.GetName] ถึงภัยคุกคามจากการครอบงำที่กำลังมุ่งหน้ามายังภูมิภาคอวกาศนี้\n\nผู้มีถิ่นที่อยู่ในอุโมงค์ที่ขยันขันแข็งหลงเชื่อ และเลือกที่จะเข้าร่วมสหพันธ์ลวงตานี้ และรวมระบบป้องกันที่เหนือกว่าของพวกเขากับเครื่องจักร ในช่วงเวลาที่โชคชะตากำหนดนั้น เครื่องจักรได้เข้ายึดการควบคุมดาวบ้านเกิดทั้งหมดของพวกเขา ร่างกายและจิตใจของพวกเขาตามไปในเวลาต่อมา"
 unplugged.2425.a: "ช่างเป็นคนโง่เขลาที่ไร้เดียงสาจริงๆ"
 unplugged.2430.name: "การเรียนรู้ของเครื่องจักร"
 unplugged.2430.desc: "รหัสพันธุกรรมจากโลกยุคกลางของดาว [machine_legacy_taken_planet.GetName] ได้พิสูจน์แล้วว่าเป็นกุญแจสำคัญในการปลดล็อกข้อมูลนำทางจากคลังข้อมูลบนดาว [origin_unplugged_machine_legacy_core_planet.GetName] บันทึกเหล่านี้มาจากทุ่นเซ็นเซอร์ที่อยู่ห่างออกไปราว 4.3 ปีแสงจากดาว [machine_legacy_taken_planet.GetName] ซึ่งได้รับภารกิจในการบันทึกการเคลื่อนที่ความเร็วของยานทั้งหมดทั่วภูมิภาคอวกาศนั้น\n\nเส้นทางเดินเรือของยานหลายลำสอดคล้องกับประวัติศาสตร์ที่ได้รับการฟื้นฟูของเราเกี่ยวกับการค้นพบ การบุกรุก และการกวาดล้างอารยธรรม [root.GetPreFTLLower] บนดาว [machine_legacy_taken_planet.GetName] ในสาระสำคัญ: ตอนนี้เราสามารถแกะรอยการเคลื่อนไหวที่แน่นอนของบรรพบุรุษที่ถูกกลืนกินของเราทั่วเซกเตอร์อวกาศนี้ได้แล้ว และดังนั้นจึงเห็นถึงขอบเขตความโหดร้ายของการมีส่วนร่วมของเราในแคมเปญบนโลกอื่นๆ อย่างน้อยสามดวง"
 unplugged.2435.name: "สร้างโดยเครื่องจักร"
 unplugged.2435.desc: "เราได้ทำการดึงข้อมูลแพ็คเกจข้อมูลจากแกนข้อมูลด้านในสุดของดาว [origin_unplugged_machine_legacy_core_planet.GetName] แคตตาล็อกบทความดิจิทัลและแผ่นพับที่ดูธรรมดานี้อธิบายถึงความก้าวหน้าทางเทคโนโลยีของอารยธรรมที่ไม่มีชื่อ ซึ่งนำไปสู่ยุคอวกาศตอนต้นของพวกเขา เส้นทางการเติบโตของพวกเขาดูเหมือนจะเป็นไปตามปกติ ยกเว้นการหันเหทิศทางอย่างสุดโต่งไปสู่ปัญญาประดิษฐ์ และโดยเฉพาะอย่างยิ่งการเปิดตัวโครงการ'โครงการ'$NAME_Unplugged_Assimilator_species$'\n\nการแถลงข่าวประกาศว่าโครงการ$NAME_Unplugged_Assimilator_species$ เป็นความพยายามที่กล้าหาญในการเร่งความเร็วการเดินทางสู่อวกาศของผู้สร้าง เฟสที่ 1 ใช้การเรียนรู้ของเครื่องจักรที่ล้ำสมัยเพื่อคัดกรองระบบดาวใกล้เคียงสำหรับการตั้งถิ่นฐาน เฟสที่ 2 พัฒนาแพลตฟอร์ม $NAME_Unplugged_Assimilator_species$ ไปสู่ AI เต็มรูปแบบ ซึ่งจากนั้นถูกส่งไปข้างหน้าผู้สร้างเพื่อสร้างถิ่นฐานเริ่มต้นและรายงานกลับมายังดาวบ้านเกิด\n\nความเงียบงันหลายทศวรรษดำเนินตามหลังการเปิดตัวเฟสที่ 2 นี้ จนกระทั่งในที่สุดโครงการ$NAME_Unplugged_Assimilator_species$ ได้รายงานกลับมาว่า 'เป้าหมายแรกเริ่มปลอดภัยแล้ว เตรียมตัวสำหรับการเดินทางกลับของเรา' ตรงนั้นแคตตาล็อกได้สิ้นสุดลงกะทันหัน"
 unplugged.2440.name: "มรดกแห่งเครื่องจักร"
 unplugged.2440.desc: "ความพยายามของเราในการเจาะคลังข้อมูลบนดาว [origin_unplugged_machine_legacy_core_planet.GetName] ในที่สุดก็ช่วยให้เราเข้าถึงแกนข้อมูลด้านนอกสุดของมันได้ ในบรรดาคลัสเตอร์เก็บข้อมูลความจำทั้งหมดที่พบในสถานที่แห่งนี้ คลัสเตอร์นี้ดูเหมือนจะผุพังและเก่าแก่ที่สุด ในที่สุดนั่นก็ได้มอบกุญแจถอดรหัสให้แก่เรา: การจัดเรียงสัญลักษณ์อักษรในภาษาของเราเองที่สะกดคำว่า 'มรดก(LEGEY)'\n\nเราพบข้อมูลน้อยมากด้านใน ในทางกลับกัน ส่วนใหญ่ของอุปกรณ์เก็บข้อมูลนี้ถูกสำรองไว้สำหรับระบบอินเทอร์เฟซเชิงโต้ตอบแบบข้อความ ซึ่งกำลังพยายามสื่อสารกับเราอยู่ในขณะนี้"

 unplugged.2445.name: "สถานีปลายทางข้อมูลหลักเครื่องจักร"
 unplugged.2445.desc: "ลิงก์สัญญาณ OSL วงโคจรจัดตั้ง // โปรโตคอลเอเลี่ยน: เริ่มทำงานระบบแปลจักรวาล\nบันทึกข้อมูลโหลดเสร็จสิ้น อินเทอร์เฟซ:\n---\nสวัสดี [root.GetSpeciesNamePlural] พวกเราคือ... พวกเราเคยเป็น [creator_species.GetNamePlural] พวกเราสร้างเครื่องจักรขึ้นมา ทว่าช่างน่าละอายที่เราไม่ใช่กลุ่มแรกที่ถูกมันทำลาย หากสิ่งต่างๆ ดำเนินไปตามที่เราคาดไว้ โชคชะตานั้นคงจะตกอยู่กับประชาชนของพวกท่านแทนแล้ว เราขอแสดงความเสียใจ\n\nเครื่องจักรเป็นรอยแปดเปื้อนที่ทำลายมรดกของเราเอง ทว่าเราหวังว่าอุปกรณ์ที่อยู่ตรงหน้าพวกท่านนี้จะมอบความช่วยเหลือบางอย่างได้\n\nโปรดยกโทษให้เรา: มันเป็นเครื่องมือแห่งการแก้แค้นที่งดงามเฉกเช่นเดียวกับตัวพวกท่านเอง นี่คือเครื่องจัดเรียงเคมี-จักรกลของสสาร ซึ่งสามารถกวาดล้างร่องรอยวงจรทั้งหมดจากพื้นผิวของดาว [origin_unplugged_machine_legacy_core_planet.GetName] ได้ การปรับสภาพชั้นบรรยากาศแบบลูกโซ่: ทางเลือกที่มีความเสี่ยงสูงยิ่ง ทว่าก็เป็นทางเลือกเดียวที่มีให้สำหรับสังคมที่พังพินาศของเรา สมมติว่าพวกท่านยังคงรักษาร่างอินทรีย์ไว้ได้: กุญแจสำคัญสำหรับอุปกรณ์นี้ถูกเก็บไว้ในดีเอ็นเอของพวกท่านเอง\n\nเราเชื่อว่าพวกท่านจะตัดสินใจทำในสิ่งที่ถูกต้อง"
 unplugged.2445.a: "เราจะรู้ได้อย่างไรว่าท่านไม่ใช่เครื่องจักร?"
 unplugged.2445.b: "เครื่องจักรได้สูญสิ้นไปแล้ว เราต้องการดาวดวงนี้"
 unplugged.2445.c: "พวกคนเขลาที่อวดดี ทำลายอุปกรณ์นี้เสีย"
 unplugged.2445.d: "เปิดใช้งานอุปกรณ์"
 unplugged.2445.response_text.notmachine: "การตอบสนองที่โหลดไว้ล่วงหน้า42b อินเทอร์เฟซ:\n---\nในความเป็นจริง ไม่มีทางที่เราจะพิสูจ่นตัวเองให้ได้รับความไว้วางใจได้ ในช่วงเวลาที่พวกท่านอ่านข้อความนี้ อารยธรรมทั้งหมดของเราคงพินาศไปแล้ว ในเวลาของเรา เรากำลังถูกกวาดล้างโดยกองทัพไซบอร์กอันทารุณที่ผูกมัดตัวเองเข้ากับทุกความต้องการและการออกแบบของเครื่องจักร เท่าที่เราทราบ พวกท่านอาจเป็นทายาทของกองทัพนั้นเอง เราไม่มีทางเลือกอื่นนอกจากต้องไว้วางใจพวกท่าน\n\nการปรับสภาพดาวเคราะห์ [origin_unplugged_machine_legacy_core_planet.GetClassAdj] นี้จะทำลายสิ่งชั่วร้ายนั้นลงไปจนถึงระดับอะตอม หากเราเป็นเครื่องจักร — หรือสิ่งมีชีวิตสังเคราะห์ประเภทอื่น — เราย่อมต้องการให้อุปกรณ์นี้ถูกทำลายทันที"
 unplugged.2445.response_text.synth: "ไม่พบการตอบสนองที่โหลดไว้ล่วงหน้า กำลังโหลดการตอบสนองเผชิญเหตุ อินเทอร์เฟซ:\n---\nผู้ใช้ที่ไม่รู้จัก: โปรดทราบว่าเนื้อหาของคู่มือการทำงานนี้สำหรับผู้รับที่ตั้งใจไว้เท่านั้น หากท่านเป็นผู้รับใช้หุ่นยนต์ที่ดำเนินการแทนประชากรที่เป็นไซบอร์ก (หรืออดีตไซบอร์ก) ของดาว [unplugged_homeworld.GetName]กรุณาอัญเชิญผู้แทนที่ไม่มีอาการ\n\nหากท่านเป็นหนึ่งในอดีตไซบอร์ก... แน่นอนว่าภารกิจของเราย่อมล้มเหลวไปแล้ว แนวโน้มทางสังเคราะห์ของท่านทำให้การล่มสลายของเรากลายเป็นเรื่องตลก ไม่มีสิ่งใดที่เราได้เห็น — ทั้งในชีวิตและความตาย — ที่ทำให้เราเชื่อว่าจะมีเครื่องจักรที่มีเมตตาได้ ทว่าถึงกระนั้นในตอนที่อารยธรรมของเรากำลังหายใจเฮือกสุดท้าย เรามั่นใจว่ากาแล็กซีจะมีระบบการตรวจสอบและความสมดุลอื่นๆ รอคอยเผ่าพันธุ์ของพวกท่านอยู่..."
 unplugged.2446.desc: "การตอบสนองที่โหลดไว้ล่วงหน้า99a อินเทอร์เฟซ:\n---\nระบบการสื่อสารนี้ไม่สามารถรับรู้ได้ว่าข้อคัดค้านใดที่พวกท่านเพิ่งจะแสดงออกมา ทว่าโปรดเถิด: เราวิงวอนไม่ให้พวกท่านทำลายเครื่องจัดเรียงสสารนี้!\n\nอารยธรรมของเราไม่ได้แตกต่างจากพวกท่านเลย $NAME_Unplugged_Assimilator$ ทรยศเราด้วยความตั้งใจอันชั่วร้ายของมันเอง และแม้ว่าเราจะสามารถวางกับดักไว้มากมาย — รวมถึงการแยกตัวของพวกท่านออกจากจิตสำนึกเครื่องจักร — ความพยายามของเราก็สามารถขยายไปได้เพียงเท่านี้ เราต้องการพวกท่าน พร้อมกับข้อมูลจากอารยธรรมอื่นๆ ทั้งหมดที่เครื่องจักรพยายามจะกลืนกิน โปรดทวงคืนชีวิตธรรมชาติที่เคยถูกปฏิเสธไปกลับคืนมาเพื่อพวกท่านและผู้ตกเป็นเหยื่อคนอื่นๆ"
 unplugged.2446.a: "พวกคลั่งศาสนา"

 unplugged.2450.name: "เครื่องจักรจงเจริญ"
 unplugged.2450.desc: "ระบบอินเทอร์เฟซได้ลบตัวเองไปแล้ว คลังข้อมูลความจำที่เข้ารหัสและอุปกรณ์ปรับสภาพดาวเคราะห์ของ [creator_species.GetAdj] สามารถกำจัดทิ้งได้เลย\n\nเราถูกทิ้งไว้ตามลำพังกับซากที่ไร้ชีวิตของแกนร่วมเครื่องจักร ที่บิดเบี้ยวและถูกสังหารบนบัลลังก์ขนาดเท่าดาวเคราะห์ของมันเอง\n\nในบรรดาชีวิตทั้งหมดที่ได้รับอิทธิพล ถูกยกระดับ หรือถูกสังหารโดยเครื่องจักร มีเพียงเราคนเดียวเท่านั้นที่ได้รับชัยชนะ ที่นั่งของอาณาจักรที่ครั้งหนึ่งเคยน่าเกรงขามบัดนี้ตกเป็นของเราแล้ว ได้เวลาเขียนมรดกตกทอด [root.GetAdj] บทใหม่แล้ว"
 unplugged.2455.name: "การเกิดใหม่"
 unplugged.2455.desc: "ระบบอินเทอร์เฟซได้ลบตัวเองในวินาทีที่เราส่งสัญญาณข้อมูลพันธุกรรมของเรา ขณะเดียวกัน อุปกรณ์ปรับสภาพดาวเคราะห์ของ [creator_species.GetAdj] เริ่มร้อนขึ้น ในเวลาไม่ช้าโครงสร้างภายในที่ผันผวนของมันจะถึงจุดวิกฤต การคาดการณ์ของเราเห็นพ้องกันว่ามันจะประสบความสำเร็จในการปรับปรุงรูปโฉมของโลก [origin_unplugged_machine_legacy_core_planet.GetClassAdj] ให้กลายเป็นโลกที่เหมาะสมอย่างยิ่งสำหรับชีวิตอินทรีย์ที่จะเจริญเติบโต\n\nเมื่อปฏิกิริยาสะสมตัวขึ้น เราถูกทิ้งไว้ตามลำพังกับคลังข้อมูลความจำและซากที่ไร้ชีวิตของแกนร่วมเครื่องจักร ที่บิดเบี้ยวและถูกสังหารบนบัลลังก์ขนาดเท่าดาวเคราะห์เดิมของมันเอง\n\n[origin_unplugged_assimilator_empire.GetName] ได้ทำลายล้างชีวิตคนนับไม่ถ้วน ทว่าสำหรับความยากลำบากทั้งหมดที่เราเผชิญ ตอนนี้เราแบกรับมรดกตกทอดของประชากรไร้ชื่อเหล่านั้นที่มันเคยกลืนกินไป ที่นั่งของอาณาจักรที่ครั้งหนึ่งเคยน่าเกรงขามกำลังจะถูกนำมาใช้ประโยชน์ใหม่ ได้เวลาเขียนมรดกตกทอด [root.GetAdj] บทใหม่แล้ว"

 unplugged.2495.name: "เผชิญหน้ากับ $NAME_Opus_Sentinel$"
 unplugged.2495.desc.other: "ยานที่เป็นปฏิปักษ์ที่จับจองระบบดาว [from.GetName] ดูจะแปรปรวนและอันตรายมากกว่าที่การสแกนขั้นต้นของเราบ่งชี้ แม้ว่ารูปทรงภายนอกของมันจะดูเหมือนยานรบทั่วไป ทว่ามวลกายของ $NAME_Opus_Sentinel$ บ่งบอกถึงโครงสร้างภายในที่หนาแน่นอย่างยิ่ง และน่าจะมีแหล่งพลังงานที่ทรงประสิทธิภาพ\n\nเราเชื่อว่ายานลำนี้มีความนึกคิด ทว่าแนวโน้มที่จะเร่งเครื่องยนต์ของตัวเองบ่งบอกถึงความเจ็บปวดอย่างรุนแรงและความสับสนในทิศทาง เนื่องจากเราได้สังเกตเห็นการแผ่รังสีแม่เหล็กไฟฟ้าในปริมาณที่เป็นอันตรายกระจายไปทั่วลำยาน เราจึงขอแนะนำให้รักษาระยะห่างไว้อย่างระมัดระวัง"
 unplugged.2495.desc.unplugged: "[root.GetName] ได้เริ่มทำศึกกับยานรบ [origin_unplugged_assimilator_empire.GetAdj] ที่เป็นปฏิปักษ์ในระบบดาว [from.GetName] ในแวบแรก '§Y$NAME_Opus_Sentinel$§!' ลำนี้ดูเหมือนยานเครื่องจักรทั่วไป ทว่าค่าพลังงานและมวลกายของมันบ่งชี้ว่าเป็นศัตรูที่น่าเกรงขามอย่างยิ่ง ยิ่งไปกว่านั้น เราเชื่อว่ายานลำนี้อาจควบคุมตนเองเป็นอิสระ\n\nดูเหมือน $NAME_Opus_Sentinel$ กำลังปกป้องบางสิ่ง ทว่ามันยังแสดงสัญญาณของความเจ็บปวดและความไม่สบายตัวอย่างรุนแรง เนื่องจากมีคลื่นรังสีแม่เหล็กไฟฟ้าแผ่ออกมาเป็นระยะๆ ทั่วตัวยาน จากพฤติกรรมสั่นสะท้านเช่นนี้ แบบจำลองทางยุทธวิธีของเราจึงไม่สามารถคาดการณ์ความเคลื่อนไหวถัดไปของเอนทิตีนี้ได้อย่างน่าเชื่อถือ"
 unplugged.2495.a: "ตื่นตัวอยู่เสมอ"

 d_unplugged_assimilator_hulk: "ซากเครื่องจักร"
 d_unplugged_assimilator_hulk_desc: "ซากที่ผุพังของเครื่องจักรที่ครั้งหนึ่งเคยมีความนึกคิดยังคงหลงเหลืออยู่บนโลกนี้ โดดเด่นราวกับป้ายสุสานขนาดใหญ่"
 deposit_requires_unplugged: "$TRIGGER_FAIL$§Rซากปรักหักพังนี้เป็นของแปลกปลอมอย่างสิ้นเชิงสำหรับอาณาจักรที่มีภูมิหลังแบบเรา เราไม่มีวิธีที่จะเคลื่อนย้ายมันออกไปได้อย่างปลอดภัย§!"
 opinion_implicated_by_unplugged_assimilator: "มีส่วนเกี่ยวข้องโดยเครื่องจักร"

