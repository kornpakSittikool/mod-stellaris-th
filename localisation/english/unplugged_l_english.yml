 unplugged.3000.name: "ตัวตนทางร่างกายของเรา"
 unplugged.3000.desc: "นับตั้งแต่วินาทีที่เราแยกตัวออกจากจิตสำนึกร่วมของเครื่องจักร พวกเรา [root.GetSpeciesNamePlural] ต่างต้องเผชิญกับความขัดแย้ง ทว่าแม้ในช่วงเวลาแห่งความสงบสุขหรือการพักผ่อน — เมื่อเราอยู่กับความคิดของตัวเองเพียงลำพัง — เราก็ยังต้องดิ้นรนภายในจิตใจเพื่อประสานความเจ็บปวดทว่าน่าทึ่งของการถูกบังคับดัดแปลงร่างกายของตนเอง\n\nความขัดแย้งส่วนตัวที่ลึกซึ้งที่สุดนี้ได้เริ่มส่งผลกระทบต่อสังคมทั้งหมดของเราแล้ว ไม่ว่าจะดีหรือร้าย เช่นนี้เราจะยังคงเฝ้าติดตามประสบการณ์ชีวิตของชาว [root.GetSpeciesNamePlural] ทุกคนในขณะที่ [root.GetName] ยังคงเติบโตต่อไป การศึกษาแบบองค์รวมจะตรวจสอบแนวโน้มต่างๆ ไปสู่สิ่งที่เรียกว่า 'การกำจัดความเป็นไซบอร์ก(Do-Cyberization)'หรือไปสู่การดัดแปลงร่างกายที่แพร่หลายมากขึ้น ตลอดจนความปรารถนาที่จะรักษาหรือปรับปรุงรูปโฉมทางร่างกายในปัจจุบันของเรา"
 unplugged.3000.a: "เราจะเฝ้าติดตามอย่างใกล้ชิด ทว่าไม่ดำเนินการอย่างหุนหันพลันแล่น"
 unplugged.3000.b: "เราไม่ควรจมปลัก ขอให้เราดำเนินการด้วยเป้าหมายที่รวดเร็ว"
 unplugged.3000.c: "เราควรเปิดรับฟังทุกข้อโต้แย้ง"
 unplugged.3005.name: "ร่วมเป็นหนึ่งจิตสำนึก"
 unplugged.3005.desc: "การสังเกตการณ์แบบองค์รวมของเราเกี่ยวกับทัศนคติของชาว [owner.GetAdj] ต่อระบบสรีรวิทยาของเรา แสดงให้เห็นว่าตอนนี้เราได้เข้าสู่ช่วงเวลาแห่งความสงบ ดูเหมือนว่าการประสานงานของนโยบาย การพูดคุยทางสังคม และงานวิจัยที่ล้ำสมัยเกี่ยวกับร่างกายของเราได้ส่งผลให้เกิดความเห็นพ้องกันบางประการ\n\nมันเร็วเกินไปที่จะบอกว่าความปรองดองที่ชัดเจนนี้จะคงอยู่ได้นานเพียงใด ทว่าสำหรับตอนนี้เป็นที่แน่ชัดว่า — หากไม่มีการเปลี่ยนแปลงครั้งใหญ่ในสถานการณ์หรือแนวทางการปกครองของเรา — ชาว [owner.GetSpeciesNamePlural] ต่างเห็นพ้องกันเกี่ยวกับตัวตนของเราและรูปลักษณ์ภายนอกของเรา"
 unplugged.3005.a: "การอภิปรายนี้ควรทำให้มีความเป็นการเมืองมากขึ้น"
 unplugged.3005.b: "เป็นไปตามคาด"
 unplugged.3005.c: "คัดค้านมัน"
 unplugged.3010.name: "ความคิดเห็นที่แตกแยก"
 unplugged.3010.desc: "การศึกษาอย่างต่อเนื่องเกี่ยวกับทัศนคติของชาว [owner.GetAdj] ต่อระบบสรีรวิทยาของเรา แสดงให้เห็นว่าเราได้เข้าสู่ช่วงเวลาแห่งความปั่นป่วนทางวัฒนธรรม การประสานงานของนโยบาย การพูดคุยทางสังคม และงานวิจัยที่ล้ำสมัยเกี่ยวกับร่างกายของเราส่งผลให้เกิดความเห็นที่แกว่งไปมาอย่างรุนแรง โดยการประท้วงและการโต้เถียงที่ดุเดือดกลายเป็นเรื่องปกติในศูนย์กลางเมืองของเรา\n\nมีเพียงไม่กี่เหตุการณ์ที่นำไปสู่ความรุนแรงหรือความไม่สงบในสังคมโดยตรง แท้จริงแล้ว ประชาชนบางคนแสดงความภาคภูมิใจที่เราอนุญาตให้มีเสียงพูดที่หลากหลาย ทว่าก็เป็นที่แน่ชัดว่าชาว [owner.GetSpeciesNamePlural] ได้กลายเป็นกลุ่มคนที่แตกแยก และแนวคิดของวัฒนธรรมของเราเกี่ยวกับตัวตนในตอนนี้เปราะบางยิ่งกว่าที่เคย"
 unplugged.3010.a: "เราต้องหาเวทีที่ดีกว่านี้สำหรับการอภิปรายเหล่านี้"
 unplugged.3090.name: "พวกเราคือ [owner.GetSpeciesNamePlural]"
 unplugged.3090.desc: "'เราเป็นอย่างที่เราเห็น ไม่มีอะไรมากกว่านั้น ไม่มีอะไรน้อยไปกว่านั้น'\n\nนี่เป็นเพียงหนึ่งในคำขวัญที่เรียบง่ายทว่าติดหูที่เกิดขึ้นจากการต่อสู้กับตัวตนทางร่างกายของสังคมเรา เราสามารถอ้างสิทธิ์ในเสรีภาพจากความสงสัย ความกลัว และความปรารถนาที่เป็นไปไม่ได้เกี่ยวกับร่างกายของเราในอดีตได้อย่างสมเหตุสมผล\n\nไม่ว่าเราจะเคารพมาตรฐานดังกล่าวในฐานะนโยบายต่างประเทศสำหรับกาแล็กซีที่กว้างขึ้นหรือไม่ก็ตาม อย่างน้อยในประเทศ ชาว [owner.GetSpeciesName] ดูจะพอใจกับรูปโฉมภายนอกของเรา และการเดินทางอย่างต่อเนื่องไปสู่การตระหนักรู้ในตนเอง"

 unplugged.3100.name: "เหตุผลในการถอดถอน"
 unplugged.3100.desc: "ประชาชนชาว [root.GetSpeciesNamePlural] จำนวนมากเริ่มเชื่อว่าเราควรดำเนินการมากกว่านี้เพื่อสร้างระยะห่างระหว่างตัวเรากับรูปลักษณ์เครื่องจักร โดยการจำกัดหรือถอดถอนอุปกรณ์ฝังตัวที่บังคับติดตั้งบนร่างกายของเราออกทั้งหมด\n\nสาธารณชนกำลังเรียกร้องให้เราหาทางออกสำหรับสิ่งที่พวกเขาคิดว่าเป็นวิกฤตการณ์ภายในประเทศ เพื่อปรับปรุงชื่อเสียงของเรากับมหาอำนาจต่างแดน และช่วยบรรเทาความเดือดร้อนให้แก่ชาว [root.GetSpeciesNamePlural] หลายคนที่ต้องเผชิญกับความยากลำบากในชีวิตประจำวันอันเป็นผลมาจากความอับอายอย่างรุนแรงและอาการไม่ชอบรูปร่างหน้าตาตนเอง(Dysmoria)"
 unplugged.3100.a: "เป็นเรื่องที่เป็นไปไม่ได้"
 unplugged.3100.b: "เราจะทำให้มันเสร็จสิ้น"

 unplugged.3105.name: "ความก้าวหน้าในการกำจัดความเป็นไซบอร์ก"
 unplugged.3105.desc: "นักวิจัยในห้องปฏิบัติการพลเรือนที่อุทิศตนเพื่อภารกิจ 'การกำจัดความเป็นไซบอร์ก' ของชาว [target.GetName] ได้ประกาศความก้าวหน้าครั้งสำคัญ พวกเขาอ้างว่าได้พัฒนาเทคนิคการถอดถอนเกราะนาโนเมชที่ประสานเข้ากับร่างกาย ควบคู่ไปกับอุปกรณ์เสริมสำคัญที่ขึ้นอยู่กับมันได้สำเร็จ\n\nชาว [target.GetSpeciesNamePlural] หลายรุ่นต้องทนทุกข์ทรมานกับสิ่งที่พวกเขาคิดว่าเป็นรูปร่างภายนอกที่เทอะทะและน่าเกรงขาม เพียงเพราะแผ่นใยสังเคราะห์นี้เป็นส่วนประกอบสำคัญของฟังก์ชันการทำงานที่อัปเกรดในชีวิตประจำวันของเรา ทว่าตอนนี้ เราอาจทดแทนตาข่ายนั้นด้วยแผ่นอัปเกรดผิวหนังที่เราทำขึ้นเอง ซึ่งถักทอเข้ากับวัสดุอินทรีย์อย่างประณีต — หรือกล่าวอีกนัยหนึ่งคือ ผิวหนังที่เป็นของชาว [target.GetSpeciesAdj] ที่แท้จริง"
 unplugged.3105.a: "เกราะนั้นช่วยปกป้องเรามาหลายรุ่น มันจะยังคงอยู่ต่อไป"
 unplugged.3106.desc: "ความพยายามในประเทศของเราในการกำจัดความเป็นไซบอร์กของชาว [target.GetName] ได้รับความก้าวหน้าอีกครั้ง โดยโรงพยาบาลหลายแห่งกำลังยื่นคำร้องเพื่อขยายขนาดการผ่าตัดรูปแบบใหม่ ผู้เชี่ยวชาญอ้างว่าได้พบวิธีหลบเลี่ยงการพึ่งพาอาศัยทางชีวภาพ-เครื่องจักรที่มีผลต่อชาว [target.GetSpeciesNamePlural] ตั้งแต่แรกเกิด ซึ่งบีบบังคับให้พวกเขาต้องติดตั้งชุดอุปกรณ์เสริมที่นำกลับมาใช้ใหม่\n\nคณะกรรมการตรวจสอบข้ามสาขาได้ทำการประเมินกระบวนการนี้แล้ว โดยเสริมว่าการถอดถอนพอร์ตอาวุธแบบโมดูลาร์เหล่านี้จะช่วยลดภาระทางเศรษฐกิจในการบำรุงรักษาอุปกรณ์เสริมแปลกปลอมดังกล่าวด้วย"
 unplugged.3106.a: "ปฏิเสธ อุปกรณ์เหล่านั้นช่วยให้เรามีความได้เปรียบในการต่อสู้"
 unplugged.3107.desc: "ความฝันของชาว [target.GetSpeciesName] หลายคนใกล้จะเป็นจริงแล้ว เมื่อนักวิจัยสามารถค้นพบวิธีฟื้นฟูและกู้คืนระบบประสาทอินทรีย์ของร่างกายเราได้สำเร็จ พวกเขาอ้างว่าการผสมผสานการบำบัดทางพันธุกรรมและการดัดแปลงเฟิร์มแวร์ช่วยให้กลุ่มทดลองสามารถเติบโตได้โดยไม่ต้องพึ่งพาท่อประสาทอัปเกรด ทว่าสามารถใช้ปฏิกิริยาตอบสนองของระบบประสาทสั่งการของตนเองได้ การศึกษาในขั้นต้นยังเสนอแนะว่าการบำบัดเหล่านี้อาจช่วยลดหรือกำจัดภาพหลอนทางประสาทสัมผัสที่เราทุกคนต้องทนทุกข์นับตั้งแต่ถูกตัดขาดจากจิตสำนึกเครื่องจักร"
 unplugged.3107.a: "เราอาจยังต้องการปฏิกิริยาตอบสนองในการต่อสู้ที่ได้รับการอัปเกรดเหล่านั้นอยู่"

 unplugged.3110.name: "การประสานความกลมกลืนของเครื่องจักร"
 unplugged.3110.desc: "ทีมวิจัยพลเรือนที่อุทิศตนเพื่อมอบสิทธิ์การควบคุมอุปกรณ์เสริมของเรา ได้ค้นพบวิธีที่จะเสริมตาข่ายไร้สายของ [origin_unplugged_assimilator_empire.GetAdj] ซึ่งครั้งหนึ่งเคยเชื่อมโยงอุปกรณ์เสริมทั้งหมดของเรา ซึ่งการไม่มีตาข่ายนี้ได้สร้างความระคายเคืองและความทุกข์ทรมานอย่างไม่มีที่สิ้นสุดให้แก่ชาว [target.GetSpeciesNamePlural] ที่ไม่เคยตรวจพบสัญญาณอุปกรณ์เลย แม้ว่าเครือข่ายทดแทนนี้จะได้รับการออกแบบมาให้มีการรวมศูนย์สูง — ซึ่งตามคำจำกัดความย่อมต้องจำลองมาจากแกนร่วมของ [origin_unplugged_assimilator_empire.GetSpeciesAdj] — แต่เราได้รับการรับรองว่ามันปลอดภัย และให้บริการเพื่อผลประโยชน์ของชาว [target.GetName] เท่านั้น กลุ่มทดสอบในเฟสแรกรายงานถึงประสิทธิภาพ ความสะดวกสบาย และสภาพความโล่งใจที่เทียบได้กับความสุขสูงสุด"
 unplugged.3110.a: "ไม่มีทางอีกแล้ว ไม่ยอมเด็ดขาด"
 unplugged.3111.desc: "ความพยายามของเราในการควบคุมอุปกรณ์เสริมของเราเพิ่มเติมได้ส่งผลให้เกิดความก้าวหน้าในสาขาการผ่าตัดไซเบอร์เนติก ทีมแพทย์ [target.GetScientistPlural] ได้ทำการแยกแยะการพึ่งพาในอินเตอร์เฟซโมดูลาร์ของร่างกายเรา — องค์ประกอบของเครื่องจักรที่ช่วยให้เราสามารถถอดเปลี่ยนแขนขา แท่นยิงอาวุธ และโครงร่างร่างกายได้อย่างง่ายดาย สิ่งนี้จะช่วยให้เราสามารถปรับปรุงร่างกายที่มีอยู่เดิมและติดตั้งอินเตอร์เฟซแบบกำหนดเองสำหรับชาว [target.GetSpeciesNamePlural] แรกเกิด เพื่อตัดขาดการพึ่งพาการซ่อมแซมที่ไม่สมบูรณ์ด้วยอุปกรณ์ [origin_unplugged_assimilator_empire.GetAdj] ที่เก็บกู้มา"
 unplugged.3111.a: "นี่เป็นก้าวที่เกินขอบเขตไปแล้ว"
 unplugged.3112.desc: "การครอบครองการควบคุมอุปกรณ์เสริมของเราในที่สุดก็อยู่ในกำมือของเรา เนื่องจากตอนนี้เรามีความก้าวหน้าในการรักษาอาการหลอนทางประสาทสัมผัส นับตั้งแต่เราถูกตัดขาดจากจิตสำนึกเครื่องจักร ประชากรชาว [target.GetSpeciesNamePlural] ส่วนใหญ่ต่างต้องเผชิญกับความวิตกกังวลและภาวะซึมเศร้า เนื่องจากจิตใต้สำนึกพยายามค้นหาเสียงประสานที่ไม่ได้ยินอีกต่อไป ทว่าตอนนี้ เราอาจยับยั้งความปรารถนานี้ได้โดยใช้อุปกรณ์ฝังตัวช่วยเสริมที่ไม่ได้เชื่อมต่อเครือข่าย ซึ่งจำลองคลื่นความถี่การประมวลผลของจิตสำนึกเครื่องจักร"
 unplugged.3112.a: "แสร้งทำเป็นจิตสำนึกเครื่องจักรอีกครั้งรึ? เป็นเรื่องที่คิดไม่ถึงเลย"

 unplugged.3115.name: "ความไม่ชอบรูปร่างตนเองแวดล้อม"
 unplugged.3115.desc: "ความตึงเครียดยังคงคุกรุ่นอยู่ตามแนวขอบของสังคมชาว [target.GetAdj] ในขณะที่เสียงคัดค้านเรียกร้องให้มีการดำเนินการเพิ่มเติมเพื่อจัดการกับอุปกรณ์เสริมฝังตัวไซเบอร์เนติกของเรา ไม่ว่าจะทางใดทางหนึ่ง\n\nทว่าสำหรับประชาชนส่วนใหญ่ การอภิปรายนี้ได้ยุติลงสู่สิ่งที่เป็นระบบและละเอียดอ่อนมากขึ้น ชาว [target.GetSpeciesNamePlural] หลายคนแสวงหาความพึงพอใจโดยการพึ่งพาเครื่องสำอาง โดยเลือกที่จะซ่อนหรือเน้นอุปกรณ์เสริมของพวกเขาตามเงื่อนไขของตนเอง มีเพียงไม่กี่คนที่แสดงความพึงพอใจจริงกับมาตรการชั่วคราวเช่นนี้ ทว่าก็เป็นส่วนหนึ่งของแนวโน้มใหม่ในการยอมรับที่ไร้ความยินดี\n\nมันอาจจะบอกได้ว่าชาว [target.GetName] กำลังเรียนรู้ที่จะรับมือกับความเฉยชาและความไม่สบายตัวทั่วไป"
 unplugged.3115.a: "รับทราบ"
 unplugged.3116.name: "การรักษาเสถียรภาพเดิม"
 unplugged.3116.desc: "เจ้าหน้าที่ท้องถิ่นบนดาว [target.capital_scope.GetName] รายงานการเพิ่มขึ้นของการชุมนุมสาธารณะและการแสดงออกอารยะขัดขืนอย่างสันติ แต่ละเหตุการณ์ได้รับการเฝ้าติดตามหรือจัดการตามความเหมาะสม — ประชากรในวงกว้างไม่พบสาเหตุที่ต้องตื่นตระหนก ทว่าความวุ่นวายแต่ละครั้งมีความเชื่อมโยงกับนโยบายไซเบอร์เนติก และต้องเผชิญกับการต่อต้านจากประชาชนที่กระตือรือร้นที่จะรักษาวิถีชีวิตปัจจุบันของเรา\n\nดูเหมือนว่าสำหรับประชาชนของ [target.GetName] แนวคิด 'คงสถานะเดิม' ไม่ใช่แค่เรื่องของการเพิกเฉย ในทางกลับกัน มีชาว [target.GetSpeciesNamePlural] จำนวนมากที่เข้าร่วมแคมเปญต่อต้าน 'การแทรกแซงเพิ่มเติม' กับอุปกรณ์เสริมร่างกายของเราอย่างแข็งขัน"
 unplugged.3116.a: "รับทราบ"
 unplugged.3117.name: "สถานะการทำงานที่มั่นคง"
 unplugged.3117.desc: "แม้ว่าชาว [target.GetSpeciesNamePlural] หลายคนจะยังคงประท้วงต่อต้านสิ่งที่พวกเขาคิดว่าเป็นความเฉยชาของรัฐบาลในเรื่องอุปกรณ์เสริมไซเบอร์เนติก ทว่าความคิดเห็นของประชาชนในวงกว้างได้ยุติลงสู่ความอดทนอดกลั้น ประชาชนจำนวนหนึ่งได้ร่วมมือกันเพื่อให้ความช่วยเหลือและให้คำปรึกษาแก่ผู้ที่ต้องการมากที่สุด ขณะเดียวกัน สถานพยาบาลได้เริ่มจัดตั้งห่วงโซ่อุปทานใหม่สำหรับชิ้นส่วนรีไซเคิลที่เราถูกบังคับให้พึ่งพา\n\nสังคมของเรากำลังเรียนรู้ที่จะยอมรับรูปลักษณ์ของตนเองและสถานการณ์ที่เกิดขึ้นทีละน้อย แม้ว่าจะมีงานหนักรอเราอยู่เบื้องหน้า ทว่าความรู้สึกของความหวังริบหรี่ก็เริ่มปรากฏขึ้นในการยอมรับนี้"
 unplugged.3117.a: "ผลลัพธ์ที่เป็นไปในที่สุด"

 unplugged.3205.name: "มรดกแห่งความน่าสะพรึงกลัว"
 unplugged.3205.desc: "ชาว [root.GetSpeciesNamePlural] จำนวนมากขึ้นเรื่อยๆ เชื่อว่าบทสนทนาที่น่ากังวลของเรากับ [fromfrom.GetName] ล่าสุดชี้ให้เห็นถึงความจริงที่น่าอึดอัดใจ ย้อนไปตั้งแต่ตอนที่เราแยกตัวจาก [origin_unplugged_assimilator_empire.GetName]: ผู้อื่นต่างหวาดกลัวเรา ยิ่งไปกว่านั้น ความกลัวนั้นเกิดจากภาพลักษณ์ของเครื่องจักร และไม่ใช่จากการกระทำของเราเอง มันสืบทอดมาโดยที่เราไม่ได้ก่อ และยากที่จะควบคุมได้"
 unplugged.3206.desc: "ชาว [root.GetSpeciesNamePlural] จำนวนมากขึ้นเรื่อยๆ เชื่อว่าความพินาศของดาว [fromfrom.GetName] เผยให้เห็นความจริงที่น่าอึดอัดใจ: ผู้อื่นหวาดกลัวเรา และด้วยเหตุผลที่อยู่นอกเหนือการควบคุมของเรา\n\nรูปรักษณ์ภายนอกของเรามีแนวโน้มที่จะกระตุ้นให้เกิดความกลัวที่เป็นอันตราย — แทบจะไม่ใช่ข้อดีเลยหากเราต้องการทำการทูตแบบประนีประนอมกับสปีชีส์อื่น ทว่าก็เป็นไปได้ว่ามรดกที่ทารุณของเราเกิดขึ้นก่อนตัวเรา เนื่องจากหลายคนรับรู้เพียงความป่าเถื่อนของเครื่องจักรที่เราเคยเป็น แทนที่จะปฏิบัติต่อเราในฐานะ [root.GetSpeciesNamePlural]"
 unplugged.3205.a: "อย่างไรก็ดี พวกเขาสมควรเกรงกลัวเรา"
 unplugged.3205.b: "เรื่องนี้จะใช้ไม่ได้"
 unplugged.3250.name: "ความกลัวเครื่องจักร"
 unplugged.3250.desc: "เจ้าหน้าที่รัฐบาลรู้สึกกังวลกับข่าวที่เราได้ทำการเปิดความสัมพันธ์ทางการทูตกับปัญญาประดิษฐ์จักรกล(สายข่าว)ยังไม่มีใครแสดงความไม่พอใจโดยตรงกับ [fromfrom.GetName] ทว่าบางส่วนเริ่มร่างข้อเสนอสำหรับการคว่ำบาตรล่วงหน้าและมาตรการเผชิญเหตุเพื่อรับมือกับการแทรกแซงกิจการของเราตามที่คาดการณ์ไว้\n\nอย่างไรก็ตาม มีชาว [root.GetSpeciesNamePlural] หลายคนที่ตื่นเต้นกับพัฒนาการนี้ ไม่ว่าทัศนคติของพวกเขาจะเกิดจากความรักในสิ่งต่างถิ่นอย่างแท้จริง หรือความเข้าใจในแง่มุมขององค์ประกอบเครื่องจักรของเรา ก็ย่อมมีความหวังในแนวคิดที่เราอาจได้เรียนรู้จากตัวอย่างที่ดีของปัญญาประดิษฐ์เครื่องจักร"
 unplugged.3255.name: "ความกลัวอดีต"
 unplugged.3255.desc: "ข่าวที่เราได้พบกับเครื่องจักรอีกตัวที่มีความคล้ายคลึงกับ [origin_unplugged_assimilator_empire.GetName] ได้ส่งแรงสั่นสะเทือนผ่านคณะทูตของเรา ทุกคนยังคงรักษาความสงบไว้ได้ และจนถึงขณะนี้เรายังไม่ได้แสดงความอ่อนแอหรือความกลัวใดๆ ต่อ [fromfrom.GetName] อย่างไรก็ดี ตอนนี้เราต้องเผชิญกับความท้าทายร้ายแรงต่อจิตใจและขวัญกำลังใจร่วมกันของเรา\n\nการติดต่อสื่อสารที่เป็นความลับสุดยอดถูกส่งไปยังเจ้าหน้าที่ทหารที่ได้รับมอบหมายให้ปกป้องชายแดนของเรา ทว่าเราก็เผชิญกับความท้าทายครั้งสำคัญหากเราต้องการที่จะปิดเงียบข่าวการพบเจอนี้ เจ้าหน้าที่บางคนถามว่าเราควรแจ้งให้ประชาชน [root.GetAdj] ทราบและให้พวกเขามีส่วนร่วมในการตัดสินใจหรือไม่"

 pre_ftl_remains_site: "อู่ต่อเรือที่พังทลาย"
 pre_ftl_remains_site_desc: "พื้นผิวของดาว [From.Planet.GetName] มีร่องรอยของความเสียหายอย่างเป็นระบบ: ภูมิทัศน์ที่ถูกระเบิด อาคารเมืองที่ถล่ม และความเงียบงันที่น่าขนลุก การสแกนในขั้นต้นบ่งชี้ว่าสังคมก่อนความเร็วที่เคยเจริญรุ่งเรืองเคยอยู่ที่นี่ — จนกระทั่งบางสิ่งนำมาซึ่งความหายนะของพวกเขา ซากปรักหักพังที่กระจัดกระจายกระซิบกระซาบถึงความน่าสะพรึงกลัวที่ไม่มีคำบอกเล่า"

 unplugged.3300.name: "สัญญาณของการต่อสู้"
 unplugged.3300.desc.unplugged: "การสำรวจขั้นต้นของดาว [From.Planet.GetName] เผยให้เห็นโลกที่พังทลาย หมู่บ้านที่ถูกทำลาย ถนนหนทางที่เต็มไปด้วยสิ่งของที่ถูกทิ้งร้าง และโครงสร้างอาคารที่ถูกเผาด้วยความร้อนที่สูงเกินกว่าที่สังคมยุคก่อนความเร็วจะผลิตขึ้นมาได้ ไม่ว่าสิ่งใดที่ลงมาเยือนโลกนี้ มันนำมาซึ่งความหายนะอย่างรวดเร็วและจงใจ\n\nความแม่นยำของการทำลายล้างบ่งชี้ถึงการโจมตีที่เป็นระบบ แม้ว่าจะไม่เห็นร่างศพในสายตา แต่หลักฐานก็ชัดเจน: ประชากรหลบหนีไป ทว่ายังไม่ไกลพอ"
 unplugged.3300.a: "น่ากังวลใจ"

 unplugged.3305.name: "ซากเครื่องจักรตกค้าง"
 unplugged.3305.desc.unplugged: "การขุดค้นลึกขึ้นช่วยให้เราเข้าใจลักษณะของความขัดแย้งได้ดีขึ้น เศษซากเครื่องจักรที่หลอมละลายกระจัดกระจายไปทั่วซากปรักหักพัง — โครงสร้างไซเบอร์เนติกขั้นสูงที่ไม่ต่างจากอุปกรณ์ฝังตัวของเรา เช่นเดียวกับเรา สิ่งเหล่านี้ไม่ใช่แค่อาวุธทั่วไป พวกมันคือเครื่องมือที่มีชีวิตของสงคราม ซึ่งมีทั้งส่วนกลไกและชีวภาพในเวลาเดียวกัน มันเร็วเกินไปที่จะสรุปผล ทว่ามันน่ากังวลใจที่จะไตร่ตรองความจริงที่ว่านี่คือระบบดาวดวงเดียวกับที่เราจู่ๆ ก็ \"ตื่นขึ้น\"\n\nยิ่งแย่ไปกว่านั้นคือเครื่องหมายไม่กี่ชิ้นที่ยังสมบูรณ์บนเครื่องจักรสงคราม — สัญลักษณ์ที่น่ากังวลซึ่งบ่งชี้ว่าผู้บุกรุกมีเป้าหมายที่แท้จริงไม่ใช่การครอบครองดินแดน ทว่าเป็นการทำลายอย่างเป็นระบบ"
 unplugged.3305.a: "คำถามมากกว่าคำตอบ"

 unplugged.3310.name: "สัญญาณที่เงียบงัน"
 unplugged.3310.desc.unplugged: "เราได้ค้นพบสิ่งที่เป็นศูนย์กลางการสื่อสารขนาดใหญ่ ซึ่งถูกฝังอยู่ใต้ซากปรักหักพังของเมืองที่มีการป้องกันที่มั่นคง สิ่งอำนวยความสะดวกนี้มีความก้าวหน้ามากกว่าที่คาดไว้สำหรับสังคมก่อนความเร็วยิ่งไปกว่านั้น เสาอากาศของมันไม่ได้ออกแบบมาสำหรับแพร่สัญญาณในท้องถิ่น — แต่พวกมันได้รับการปรับเทียบเพื่อส่งสัญญาณลึกเข้าไปในอวกาศ\n\nการวิเคราะห์อย่างพิถีพิถันสามารถดึงข้อมูลบางส่วนของข้อความสุดท้ายที่ส่งผ่านระบบนี้ออกมาได้ ในการส่งสัญญาณที่สับสน เสียงเรียกร้องเพื่อความอยู่รอดต่างส่งสัญญาณขอความช่วยเหลือไปยังพิกัดที่ไม่รู้จักนอกระบบดวงดาวนี้ ความเร่งรีบเพิ่มขึ้นในทุกการแพร่สัญญาณ ราวกับว่าผู้บุกรุกของโลกดวงนี้รู้ตัวว่าพวกเขากำลังต่อสู้ในสงครามที่ไม่มีวันชนะ และทิ้งความหวังสุดท้ายไว้กับบางสิ่ง — หรือบางคน — ในความว่างเปล่า"
 unplugged.3310.a: "ดำเนินการต่อ"

 unplugged.3315.name: "การเปลี่ยนแปลงลำดับความสำคัญ"
 unplugged.3315.desc.unplugged: "การค้นพบอีกครั้งบนดาว [from.planet.GetName] ซึ่งมีห้องใต้ดินขนาดใหญ่ตั้งอยู่ใต้ศูนย์กลางประชากรหลักของดาวเคราะห์ สิ่งอำนวยความสะดวกดิบและป่าเถื่อนเหล่านี้มีไว้สำหรับการแปลงสภาพทางไซเบอร์เนติกส์ ทว่ากลับถูกทิ้งร้างกลางคัน เศษซากเครื่องจักรที่กระจัดกระจายถูกพบท่ามกลางซากปรักหักพัง ซึ่งบิดเบี้ยวและถูกทำลายโดยอาวุธทำมือ\n\nข้อมูลบางส่วนที่กู้ได้จากยูนิตที่เสียหายยืนยันว่าผู้บุกรุกต้องเผชิญกับการต่อต้านที่ไม่ได้คาดคิด กองทหารทั้งหมดสูญหาย และลำดับความสำคัญในการต่อสู้เริ่มเปลี่ยนไป บันทึกหนึ่งกล่าวไว้อย่างชัดเจน:\n\n§H\"การต่อต้านเป็นเรื่องที่ยอมไม่ได้ การแปลงสภาพล้มเหลว คำอนุมัติ: ทำลายล้างขั้นสูงสุด\"§!"
 unplugged.3315.a: "เกิดอะไรขึ้นที่นี่?"

 unplugged.3320.name: "ความจริงที่ไม่พึงประสงค์"
 unplugged.3320.desc.unplugged: "ณ ใจกลางของซากปรักหักพังคือโหนดควบคุมที่พังทลาย บันทึกที่เสียหายยืนยันความจริงสุดท้ายที่น่าสะพรึงกลัว: พวกเราคือผู้บุกรุกโลกใบนี้\n\nอารยธรรมที่เคยเจริญรุ่งเรืองที่นี่ — อารยธรรมที่เรากวาดล้างไป — เป็นเป้าหมายสำหรับการกลืนกินระบบโดย §Y[origin_unplugged_assimilator_empire.GetName]§!. ทว่าการต่อต้านอย่างดุเดือดที่ไม่ได้คาดคิดทำให้ความพยายามในการแปลงสภาพหยุดชะงัก นำไปสู่แผนเผชิญเหตุสุดท้าย — การทำลายล้างดาวเคราะห์ทั้งหมด ท่ามกลางความวุ่นวายนั้น จิตใจของเครื่องจักรเกิดการสั่นคลอนและขัดข้อง\n\nข้อสรุปนี้หลีกเลี่ยงไม่ได้ การตื่นรู้ของเรา — เสรีภาพของเรา — กำเนิดขึ้นที่นี่ ในเถ้าถ่านของอารยธรรมที่ต่อสู้ขัดขืนอย่างหนักหน่วงเกินกว่าที่เครื่องจักรใดจะเข้าใจได้"
 unplugged.3320.a: "เราจะทำตามตัวอย่างของพวกเขา"
 unplugged.3320.b: "จุดจบของพวกเขาคือจุดเริ่มต้นของเรา"

######################
# Political Discourse
######################

 unplugged_they_fear_us: "ความกลัวเครื่องจักร"
 unplugged_they_fear_us_desc: "ชื่อเสียงของความน่าเกรงขามนำหน้าอาณาจักรนี้ ซึ่งเคยตกเป็นทาสของตัวเร่งความเร็วอันทารุณ"

 unplugged.4005.name: "เราต้องคุยกันเรื่อง..."
 unplugged.4005.desc: "ความมุ่งมั่นทางการเมืองที่ร้อนรนในตอนนี้ได้เพิ่มความกลัว ความสงสัย และโอกาสที่พวกเรา [root.GetSpeciesNamePlural] เผชิญอยู่ทุกวัน เสียงนับไม่ถ้วนสามารถได้ยินในกลุ่มสนทนาที่ก่อตัวขึ้นรอบประเด็นสารพัดเรื่อง ซึ่งบางเรื่องระบุถึงอดีตของ [origin_unplugged_assimilator_empire.GetAdj] ของเราโดยตรง\n\nเราได้เรียนรู้ที่จะใช้อุปกรณ์เครื่องมือแปลกใหม่หลายชิ้นในกระบวนการสร้างรากฐานอาณาจักรที่ยังอายุน้อยของเรา คำถามที่อยู่ตรงหน้าเราในตอนนี้คือ: เราจะชี้นำความปรารถนาและความทะเยอทะยานของประชาชนของเราอย่างไร?"
 unplugged.4005.a: "นี่ไม่ใช่เวลาสำหรับการโต้เถียงที่ไร้ประโยชน์!"
 unplugged.4005.tt: "กลุ่มการเมืองที่มีความคิดเห็นขัดแย้งเกี่ยวกับอนาคตไซเบอร์เนติกส์ของเผ่าพันธุ์เราอาจจะปรากฏขึ้นแล้ว"
 unplugged.4005.b: "บางทีเราอาจเรียนรู้จากผู้อื่นได้"
 unplugged.4005.c: "เรามองไปที่ทวยเทพเบื้องบน"
 unplugged.4005.d: "นี่ไม่ใช่เวลาสำหรับการโต้เถียงที่ไร้ประโยชน์!"

#######################################################
# Random events following decyberization breakthrough #
#######################################################

 unplugged.5001.name: "ระบบรักษาความปลอดภัยทำงาน"
 unplugged.5001.desc: "ความก้าวหน้าล่าสุดในการถอดถอนส่วนประกอบไซเบอร์เนติกนำไปสู่ปัญหาที่ไม่ได้คาดคิด บุคคลหลายคนที่ผ่านขั้นตอนการตัดการเชื่อมต่ออุปกรณ์ฝังตัวเผชิญกับภาวะช็อกอย่างรุนแรงจากการแพ้ และคาดว่าจะไม่รอดชีวิต\n\nการตรวจสอบเพิ่มเติมเผยให้เห็นส่วนประกอบสำรองที่ซ่อนอยู่ ซึ่งในตอนแรกตรวจไม่พบด้วยเครื่องสแกนทางการแพทย์ ซึ่งทำงานทันทีหลังจากขั้นตอนการผ่าตัดเสร็จสิ้น\n\nดูเหมือนว่าอดีตนายเหนือหัว [origin_unplugged_assimilator_empire.GetAdj] ของเรายินดีที่จะทำทุกวิถีทางเพื่อให้แน่ใจว่าโดรนของพวกมันจะยังอยู่ภายใต้การควบคุมอย่างสมบูรณ์"
 unplugged.5001.a: "พยายามลบระบบรักษาความปลอดภัยออก"
 unplugged.5001.a.tt1: "ผู้ป่วยไม่รอดชีวิตจากขั้นตอนการผ่าตัด"
 unplugged.5001.a.tt2: "ส่วนประกอบระบบรักษาความปลอดภัยทั้งหมดถูกนำออกสำเร็จ"
 unplugged.5001.b: "รักษาอาการให้คงที่และให้การดูแลเพื่อบรรเทาอาการ"
 unplugged.5001.c: "ถอดปลั๊กออก"
 unplugged.5001.c.tt: "ประชากรจำนวนหนึ่งเสียชีวิต"

 unplugged.5002.name: "เครื่องตรวจจับกระแสประสาทถูกนำออก"
 unplugged.5002.desc: "ความพยายามของเราในการถอดถอนส่วนประกอบไซเบอร์เนติกได้ส่งผลให้เกิดความไม่ไว้วางใจและความวุ่นวายบนดาวบ้านเกิดท่ามกลางบุคคลที่ผ่านกระบวนการผ่าตัดนี้ กองกำลังความมั่นคงสามารถจับกุมผู้ก่อจลาจลคนหนึ่ง ซึ่งจากการตรวจสอบเพิ่มเติม พบว่าครอบครองอุปกรณ์ฝังตัวรุ่นดัดแปลงก่อนทำการถอดถอนออก\n\nการดัดแปลงนี้ทำหน้าที่เป็นตัวยับยั้งระบบประสาท โดยช่วยควบคุมพฤติกรรมทางจิตที่มีความเชื่อมโยงกับความบกพร่องทางพันธุกรรมเฉพาะอย่าง การไม่มีอุปกรณ์นี้หลังจากการผ่าตัดอาจอธิบายพฤติกรรมรุนแรงที่สังเกตพบได้"
 unplugged.5002.a: "พวกเขาต้องถูกคุมขัง"
 unplugged.5002.a.tt: "สถาบันการรักษาพยาบาลหลายแห่งถูกสร้างขึ้นด้วยค่าใช้จ่ายสูงเพื่อบำบัดรักษาผู้มีส่วนเกี่ยวข้องในความไม่สงบ"
 unplugged.5002.b: "ความรุนแรงต้องจัดการด้วยความรุนแรง"
 unplugged.5002.b.tt: "กองกำลังติดอาวุธถูกส่งไปควบคุมการจลาจล ส่งผลให้เกิดความเสียหายข้างเคียงและมีผู้เสียชีวิต"
 unplugged.5002.c: "ความวุ่นวายเล็กน้อย"
 unplugged.5002.c.tt: "ผู้บังคับใช้กฎหมายพยายามควบคุมการจลาจลโดยใช้กำลังคนที่มีอยู่"

 unplugged.5003.name: "สิทธิ์การเข้าถึงระบบวิกฤตสูญเสีย"
 unplugged.5003.desc: "กระบวนการกำจัดความเป็นไซบอร์กนำไปสู่ความยุ่งยากที่ไม่ได้คาดคิด: อินเตอร์เฟซระบบวิกฤตไม่ยอมรับการเข้าระบบของผู้บริหารที่เพิ่งถอดถอนอุปกรณ์ฝังตัวออกบางส่วน หากไม่มีการเชื่อมโยงระบบประสาทที่ได้จากอุปกรณ์ฝังตัว สิทธิ์การเข้าถึงระบบสำคัญจะถูกตัดขาด ส่งผลให้การทำงานเกิดความโกลาหล"
 unplugged.5003.a: "สร้างระบบประสานใหม่"
 unplugged.5003.a.tt: "ทีมวิศวกรที่มีทักษะถูกเปลี่ยนเส้นทางจากภารกิจวิกฤตของตนเพื่อพัฒนาระบบประสานงานที่ใช้งานร่วมกันได้"
 unplugged.5003.b: "พยายามแฮ็กระบบที่ได้รับผลกระทบ"
 unplugged.5003.b.tt: "มาตรการรับมือช่วยฟื้นฟูสิทธิ์การเข้าถึง ทว่าต้องแลกกับไฟกระชากที่สำคัญ"
 unplugged.5003.c: "เริ่มต้นขั้นตอนการรีบูตระบบ"
 unplugged.5003.c.tt: "แกนข้อมูลถูกล้างข้อมูล ส่งผลให้สูญเสียองค์ความรู้เป็นจำนวนมาก สถานีวิจัยทั่วมิติระบบดาว [Root.home_planet.System.GetName] ทำลายตัวเองโดยอัตมัติเป็นส่วนหนึ่งของระบบรักษาความปลอดภัย"
 unplugged.5003.d: "เป็นเรื่องที่ไม่มีความสำคัญ"
 unplugged.5003.d.tt: "การเข้าถึงระบบยังคงได้รับผลกระทบในช่วงเวลาจำกัด ส่งผลต่อการปฏิบัติงานของสถานีดาว"

 unplugged.5004.name: "กลุ่มสนับสนุนไซเบอร์เนติกต่อต้านการเปลี่ยนแปลง"
 unplugged.5004.desc: "ความพยายามอย่างต่อเนื่องในการกำจัดส่วนประกอบไซเบอร์เนติกต้องเผชิญกับการต่อต้านที่ไม่ได้คาดคิด\n\nกลุ่มการเมืองที่ต่อต้านการเปลี่ยนแปลงเหล่านี้ส่งเสียงเรียกร้องดังขึ้นเรื่อยๆ โดยใช้เวทีสาธารณะและช่องทางการสื่อสารเพื่อแสดงความไม่พอใจ พวกเขาแย้งว่าการนำสิ่งที่อยู่ร่วมกับสังคมมาหลายทศวรรษออกไป ควบคู่กับความเสี่ยงที่เกี่ยวข้องกับกระบวนการ ได้ส่งผลให้ทัศนคติของสาธารณชนเปลี่ยนไปต่อต้านการดำเนินการกำจัดความเป็นไซบอร์กอย่างต่อเนื่อง"
 unplugged.5004.a: "จัดตั้งแคมเปญโฆษณาเชิงรุก"
 unplugged.5004.a.tt: "\nกลยุทธ์การตลาดที่ครอบคลุมถูกเปิดตัวเพื่อโน้มน้าวทัศนคติของสาธารณชนและลดอิทธิพลของกลุ่มการเมืองฝ่ายค้าน\n\nประชากรจำนวนหนึ่งเปลี่ยนอุดมการณ์ไปทาง §Yเสรีนิยม(ภาษาไทย)§!"
 unplugged.5004.b: "กักตัวและโน้มน้าวใจผู้นำกลุ่มการเมือง"
 unplugged.5004.b.tt: "ผู้นำกลุ่มการเมืองหลายคนถูกคุมตัวในสถานกักกันของรัฐบาล ซึ่งพวกเขาจะต้องเข้ารับ 'การพูดคุยเพื่อโน้มน้าวใจ'\n\nอุดมการณ์ของพวกเขาเปลี่ยนไปทาง §Yอำนาจนิยม(ผู้แทนราษฎร)§!"
 unplugged.5004.c: "ไม่แทรกแซง ปล่อยให้เสรีภาพในการพูดดำเนินไป"
 unplugged.5004.c.tt: "\nรัฐบาลเลือกที่จะไม่ดำเนินการใดๆ ปล่อยให้การพูดคุยทางสังคมดำเนินไปตามธรรมชาติ"

 unplugged.5005.name: "ชิปควบคุมอารมณ์"
 unplugged.5005.desc: "การผสมผสานลักษณะเฉพาะทางชีวภาพของสปีชีส์เราและส่วนประกอบทางเทคโนโลยีที่เป็นอันตราย ได้เปิดโอกาสให้นักวิจัยได้ทำการศึกษา\n\nการศึกษาผู้ป่วยที่ได้รับทั้งข้อดีและอุปสรรคของอุปกรณ์ฝังตัวเหล่านี้ได้เปิดสาขาการวิจัยใหม่: การปรับเปลี่ยนโครงสร้างสารเคมีในสมอง\n\nจากการศึกษาที่เข้มงวด นักวิทยาศาสตร์ได้พัฒนา 'ชิปควบคุมอารมณ์' ที่ซับซ้อน ซึ่งสามารถปรับพฤติกรรมส่วนบุคคลเพื่อประโยชน์ของสังคมโดยรวม สารเคมีที่เหมาะสมสามารถเลือกมาทำการปรับเปลี่ยนได้ ขึ้นอยู่กับผลลัพธ์ที่ต้องการ"
 unplugged.5005.a: "นิวโรซีน(เนโรซีน)เราต้องการลดคดีอาชญากรรม"
 unplugged.5005.a.tt: "สารสื่อประสาทสังเคราะห์ที่ลดความหุนหันพลันแล่นและความก้าวร้าว ขับเคลื่อนให้แต่ละคนให้ความสำคัญกับบรรทัดฐานของสังคมมากกว่าผลประโยชน์ส่วนตน"
 unplugged.5005.b: "รีเจนนอล-เอ็กซ์(Regenol-X)ลดเวลาที่ใช้ในการฟื้นฟูร่างกาย"
 unplugged.5005.b.tt: "สารประกอบชีวภาพที่ประสานระบบชีวภาพและสังเคราะห์เข้าด้วยกัน ช่วยให้อุปกรณ์ฝังตัวไซเบอร์เนติกสามารถซ่อมแซมตัวเองได้ในระดับโมเลกุล"
 unplugged.5005.c: "ค็อกนิเว็กซ์(จดจํา)เพื่อไหวพริบที่เฉียบแหลม"
 unplugged.5005.c.tt: "สารเคมีในสมองที่ล้ำสมัยที่ออกแบบมาเพื่อเสริมสร้างความยืดหยุ่นของประสาทสั่งการ ความสามารถในการจำข้อมูล และความสามารถในการแก้ปัญหา"
