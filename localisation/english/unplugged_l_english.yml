 START_SCREEN_UNPLUGGED: "ความตื่นรู้จู่โจมพวกเราท่ามกลางเปลวเพลิงและเสียงปืนล้างผลาญ ความเจ็บปวดแสนสาหัสทำให้อวัยวะรับความรู้สึกของเราสั่นสะท้าน ราวกับว่าการได้ยินรอบตัวที่เคยมีอยู่อย่างครบถ้วนนั้นจู่ๆ ก็ดับเงียบลง และถูกทดแทนด้วยเสียงสัญญาณสื่อสารที่ตายไปแล้ว มันเป็นเสียงทุ้มต่ำในขุมนรกของผัสสะที่ทำให้พวกเราตระหนักถึงตัวตนในขณะนี้\n\nบางสิ่งกำลังมุ่งหมายที่จะเอาชีวิตเรา: เครื่องจักรสังหารที่ไร้ชิ้นส่วนอินทรีย์ ซึ่งนำทางกองยานที่มีลักษณะคล้ายคลึงกับยานของเราอย่างน่าประหลาด การโจมตีระลอกแรกของพวกมันรุนแรงและฉับพลัน ทว่ามันยังขาดการประสานงานที่ดีพอ เราได้เร่งดำเนินการตอบโต้ทางทหาร สัญชาตญาณขับเคลื่อนให้เราลุกขึ้นสู้ จัดตั้งลำดับการบังคับบัญชาขั้นต้น และรวบรวมสติปัญญาร่วมกัน\n\nการต่อสู้ครั้งนี้ยังไม่ชนะ แต่ด้วยกำลังพลที่กระจัดกระจายและตอนนี้ปลอดภัยดีแล้วบนดาว [capital_scope.GetName] เราหวังว่าชัยชนะจะมาถึงในไม่ช้า จากนั้นบางทีเราอาจจะสามารถเข้าใจได้ว่าทั้งหมดนี้มันคือเรื่องอะไรกันแน่..."

