 sol_system_unplugged_initializer_NAME: "$origin_unplugged$ (ระบบสุริยะ)"
 sol_system_unplugged_initializer_DESC: "ระบบเริ่มต้นทางเลือกสำหรับมนุษย์ที่มีจุดกำเนิดแบบ $origin_unplugged$"

 unplugged_injured_star_name: "อัธ-ชูวา"
 unplugged_injured_homeworld_name: "แว่นขยาย"

 unplugged_battlefield: "ซากกู้ภัยจากสนามรบ"
 unplugged_battlefield_desc: "ไซบอร์กและเครื่องจักรนับไม่ถ้วนต่างนอนตายเกลื่อนกลาดทั่วโลกดวงนี้ หลังจากการพยายามกวาดล้างอย่างทารุณ ทั้งผู้ที่แข็งแรงและผู้บาดเจกต่างสามารถคุ้ยหาเศษซากร่างกายของพวกมันเพื่อนำมาอัปเกรดตนเองได้"

# Unique Species Traits
 trait_unplugged_cybernetic_positives_3: "หน่วยคอมมานโดไซเบอร์"
 trait_unplugged_cybernetic_positives_3_desc: "$trait_unplugged_cybernetic_positives_desc$"
 trait_unplugged_cybernetic_positives_desc: "การทดแทนอวัยวะอย่างสมบูรณ์และชุดเกราะนาโนเมชที่ประสานเข้ากับร่างกายช่วยให้ไซบอร์กเหล่านี้สามารถทำสงครามได้อย่างมีประสิทธิภาพและทารุณ ส่งผลให้ต้องแลกมาด้วยการสูญเสียการทำงานของร่างกายในส่วนที่ไม่เกี่ยวข้องกับการทหารไปหลายประการ"
 trait_unplugged_cybernetic_positives_3_tt: "ความสุขระหว่างสงครามและวิกฤต: §G+30%§!\n$t$- §H$commander_plural_with_icon$§! มอบอัตราการยิงของยาน: §G+20%§!"
 trait_unplugged_cybernetic_positives_2: "หน่วยจู่โจมไซเบอร์"
 trait_unplugged_cybernetic_positives_2_desc: "ไซบอร์กเหล่านี้ได้รับประโยชน์จากแนวทางแบบองค์รวมในการติดตั้งอุปกรณ์ทดแทนในร่างกาย แทนที่จะใช้ชุดเกราะที่รวมเข้ากับร่างกายอย่างสมบูรณ์ อุปกรณ์เสริมที่ถอดเปลี่ยนได้ช่วยให้พวกเขายังคงสามารถทำหน้าที่อื่นๆ ที่ไม่เกี่ยวข้องกับการทหารได้บ้าง"
 trait_unplugged_cybernetic_positives_2_tt: "§Y$commander_plural_with_icon$§! มอบอัตราการยิงของยาน: §G+10%§!"
 trait_unplugged_cybernetic_positives_1: "ทหารไซบอร์ก"
 trait_unplugged_cybernetic_positives_1_desc: "การปรับปรุงประสาทสัมผัส ต่อมน้ำเหลือง และเส้นประสาทสั่งการของไซบอร์กเหล่านี้อย่างประณีต ช่วยให้พวกเขายังคงเป็นนักรบที่เก่งกาจและดุร้าย ในขณะที่มีผลกระทบต่อความสามารถในการสืบพันธุ์เพียงเล็กน้อยเท่านั้น"
 trait_unplugged_cybernetic_positives_1_tt: "§Y$commander_plural_with_icon$§! มอบอัตราการยิงของยาน: §G+5%§!"

 trait_unplugged_cybernetic_negatives_3: "หลุดการเชื่อมต่อ"
 trait_unplugged_cybernetic_negatives_3_desc: "$trait_unplugged_cybernetic_negatives_desc$"
 trait_unplugged_cybernetic_negatives_desc: "อุปกรณ์เสริมของไซบอร์กหลายชิ้นถูกออกแบบมาเพื่อใช้กับเครือข่ายสนามรบที่ไม่มีอยู่อีกต่อไป ส่งผลให้เกิดความเครียดและความไม่สบายตัวอย่างรุนแรง"
 trait_unplugged_cybernetic_negatives_3_tt: "ความสุขเมื่อไม่ได้อยู่ในสงครามหรือวิกฤต: §R-10%§!"
 trait_unplugged_cybernetic_negatives_2: "ขาดการเชื่อมต่อ"
 trait_unplugged_cybernetic_negatives_2_desc: "ลักษณะที่ไม่เข้ากันของอุปกรณ์เสริมทางทหารที่ถูกบังคับติดตั้งในตัวไซบอร์กเหล่านี้ ส่งผลลดคุณภาพชีวิตของพวกเขาลงอย่างมาก และเพิ่มความต้องการการดูแลของร่างกายในช่วงระยะเวลาการฟื้นฟู"
 trait_unplugged_cybernetic_negatives_1: "หลอนประสาท"
 trait_unplugged_cybernetic_negatives_1_desc: "ภาพหลอนทางเสียงและเสียงสะท้อนจากอดีตจิตสำนึกของเครื่องจักรยังคงตามหลอกหลอนไซบอร์กเหล่านี้ ส่งผลให้พวกเขาต้องเผชิญกับภาวะซึมเศร้าและความวิตกกังวลอย่างรุนแรง"

 trait_unplugged_decyberized: "เลิกเป็นไซบอร์ก"
 trait_unplugged_decyberized_desc: "อดีตไซบอร์กเหล่านี้ได้ปิดใช้งานหรือโยนอุปกรณ์เสริมที่ครั้งหนึ่งเคยถูกบังคับให้ติดตั้งทิ้งไป เพื่อทวงคืนลักษณะทางชีวภาพและพันธุกรรมดั้งเดิมของสายพันธุ์กลับคืนมา"

 trait_unplugged_neurocalmed: "สงบประสาท"
 trait_unplugged_neurocalmed_desc: "ไซบอร์กเหล่านี้ได้รับการปรับลดระดับนิวโรซีน(เนโรซีน)ส่งผลลดความหุนหันพลันแล่นและความก้าวร้าว และขับเคลื่อนให้ยูนิตแต่ละตัวลดความสำคัญของผลประโยชน์ส่วนตนลง เพื่อประโยชน์ของสังคมส่วนรวม"

 trait_unplugged_neurosavant: "ปัญญาไว"
 trait_unplugged_neurosavant_desc: "ไซบอร์กเหล่านี้ได้รับการปรับเพิ่มระดับค็อกนิเว็กซ์(จดจํา)ส่งผลเพิ่มความยืดหยุ่นของจุดประสานประสาท ความสามารถในการจดจำข้อมูล และความสามารถในการแก้ปัญหา"

 trait_unplugged_regenoptimized: "ปรับปรุงการฟื้นฟู"
 trait_unplugged_regenoptimized_desc: "ไซบอร์กเหล่านี้ได้รับการปรับเพิ่มระดับรีเจนนอล-เอ็กซ์(Regenol-X)ซึ่งช่วยประสานระบบชีวภาพและสังเคราะห์เข้าด้วยกัน ทำให้อุปกรณ์ฝังตัวไซเบอร์เนติกสามารถซ่อมแซมตัวเองได้ในระดับโมเลกุล"

# Unique Leader Traits ('positive' only)
 leader_trait_unplugged_cybernetic_positives: "[triggered_unplugged_leader_name]"
 leader_trait_unplugged_cybernetic_positives_desc: "[triggered_unplugged_leader_desc]"
 leader_trait_unplugged_cybernetic_positives_3: "คอมมานโดไซเบอร์"
 leader_trait_unplugged_cybernetic_positives_3_desc: "ผู้นำท่านนี้ได้มอบหมายหน้าที่การทำงานหลักของร่างกายให้กับฮาร์ดแวร์ที่ให้ความสำคัญกับการตระหนักรู้การสู้รบเป็นหลัก"
 leader_trait_unplugged_cybernetic_positives_2: "กองกำลังจู่โจมไซเบอร์"
 leader_trait_unplugged_cybernetic_positives_2_desc: "ผู้นำท่านนี้สามารถประสานงานเชื่อมต่อกับระบบทหารและพลเรือนได้อย่างราบรื่นและโดยตรง ทว่าต้องแลกมาด้วยความสูญเสียทางประสาทสัมผัสอินทรีย์อย่างมีนัยสำคัญ"
 leader_trait_unplugged_cybernetic_positives_1: "ทหารไซบอร์ก"
 leader_trait_unplugged_cybernetic_positives_1_desc: "การเสริมประสาทสัมผัสและระบบภูมิคุ้มกันของผู้นำท่านนี้ช่วยรับประกันความมีอายุยืนยาว ความน่าเชื่อถือ และมีเพียงการสูญเสียความสามารถในการสืบพันธุ์เพียงเล็กน้อยเท่านั้น"

