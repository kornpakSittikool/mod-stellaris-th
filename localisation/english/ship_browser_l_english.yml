 SHIPSET_LABEL: "ชุดยาน"
 SHIPSETS_LABEL: "เซตของยานต่างๆ"
 SHIP_GRAPHICS_PREVIEW:0 "ตัวอย่างยานในคลาสต่างๆ"
 SHIP_GRAPHICS_REQUIRED_DLC:0 "DLC ที่จำเป็น"
 SHIP_GRAPHICS_MISSING_DLC_TOOLTIP:0 "§Gคลิกเพื่อดูตัวอย่างยานของ $CULTURE_NAME$§!"
 SHIP_GRAPHICS_CAMERA_TRANSFORM_TOOLTIP:0 "£camera_zoom_in£ ใช้ §Gล้อเมาส์เลื่อนไปข้างหน้า§! เพื่อซูมเข้า\n£camera_zoom_out£ ใช้ §Gล้อเมาส์เลื่อนไปข้างหลัง§! เพื่อซูมออก\n£camera_rotate£ กดค้างและลาก §Gปุ่มเมาส์ขวา§! บนโมเดลยานเพื่อหมุน"
 SHIP_GRAPHICS_CORVETTE_DESC:0 "คอร์เวต เป็นยานรบคลาสแรกของจักรวรรดิ มีความรวดเร็วว่องไวและราคาถูก"
 SHIP_GRAPHICS_FRIGATE_DESC:0 "ฟริเกตเป็นรุ่นขั้นสูงกว่าของคอร์เวต เชี่ยวชาญด้านการปล่อยตอร์ปิโด พวกมันอาจช้ากว่าและเปราะบางกว่า แต่สามารถทำลายล้างเป้าหมายขนาดใหญ่ได้"
 SHIP_GRAPHICS_DESTROYER_DESC:1 "ยานพิฆาต เปลี่ยนจากความคล่องตัวและความเร็วของยานคอร์เวต แล้วไปเพิ่มพลังการยิงและตัวยานที่หนาขึ้นแทน"
 SHIP_GRAPHICS_CRUISER_DESC:0 "ยานลาดตระเวณสามารถใช้งานได้หลากหลายและทนทาน สามารถดูดซับและทำความเสียหายได้"
 SHIP_GRAPHICS_BATTLESHIP_DESC:0 "ยานประจัญบานมีราคาแพงแต่ทรงพลัง ด้วยระยะการยิงที่ยอดเยี่ยม พวกมันเก่งในการสร้างความเสียหายให้ฝ่ายตรงข้ามก่อนที่ฝ่ายตรงข้ามจะโจมตีกลับ"
 SHIP_GRAPHICS_TITAN_DESC:1 "แม้ว่าพวกมันจะมีพลังมหาศาลในตัวของมันเอง และไททันยังสามารถใช้ออร่าเพื่อเพิ่มความสามารถให้แก่ยานที่เป็นมิตรรอบๆยานไททันได้"
 SHIP_GRAPHICS_BIO_TITAN_DESC: "แม้ว่าพวกมันจะมีพลังมหาศาลในตัวของมันเอง และไททันยังสามารถใช้ออร่าเพื่อเพิ่มความสามารถให้แก่ยานที่เป็นมิตรรอบๆยานไททันได้"
 SHIP_GRAPHICS_JUGGERNAUT_DESC:1 "การสร้างยานจักเกอร์น็อทเป็นภารกิจที่ยอดเยี่ยมสำหรับจักรวรรดิ ยานขนาดใหญ่นี้ทำหน้าที่เป็นทั้งอู่ต่อยานเคลื่อนที่และยานสนับสนุน"
 SHIP_GRAPHICS_COLOSSUS_DESC:1 "ยานขนาดมหึมานี้ไม่ได้ติดตั้งอาวุธเพื่อสู้กับกองยานศัตรู แต่หน้าที่ของมันคือทำลายล้างดาวทั้งดวง"
 SHIP_GRAPHICS_OUTPOST_DESC:0 "สถานีออกโพสต์คือระดับขั้นต่ำที่สุดของฐานดวงดาว โดยมีหน้าที่เล็กน้อย ยกเว้นการสร้างความเป็นเจ้าของระบบดาว"
 SHIP_GRAPHICS_STARBASE_CITADEL_DESC:0 "ป้อมปราการอวกาศ(ซิตาเดล)เป็นระดับขั้นสูงสุดของฐานดวงดาวที่สามารถอัปเกรดได้ พร้อมกับการป้องกันขนาดใหญ่ ป้อมปราการอวกาศ คือสิ่งที่ศัตรู ยากจะจัดการได้"
 SHIP_GRAPHICS_TRANSPORT_DESC:0 "ยานขนส่งลำเลียงกองทัพเพื่อโจมตีดาวเคราะห์ศัตรูระหว่างสงคราม เนื่องจากไม่ได้ติดตั้งอาวุธ พวกมันต้องการกองยานสนับสนุนเมื่ออยู่ในเขตแดนศัตรู"
 SHIP_GRAPHICS_SCIENCE_DESC:0 "ยานวิจัยวิทยาศาสตร์ใช้เพื่อสำรวจระบบดาวใหม่และความผิดปกติเป็นหลัก เนื่องจากเป็นยานพลเรือน พวกมันจึงไม่มีอาวุธและเปราะบาง"
 SHIP_GRAPHICS_CONSTRUCTOR_DESC:0 "ยานก่อสร้างมีความจำเป็นสำหรับการสร้างสถานีอวกาศ เนื่องจากเป็นยานพลเรือน พวกมันจึงไม่ได้ติดตั้งอาวุธและเปราะบาง"
 SHIP_GRAPHICS_COLONIZER_DESC:0 "ยานอาณานิคมนำผู้อพยพจากดาวเคราะห์ที่ตั้งรกรากเดิมไปสู่ดาวดวงใหม่เพื่อการตั้งรกราก เนื่องจากเป็นยานพลเรือน พวกมันจึงไม่ได้ติดตั้งอาวุธและเปราะบาง"
 SHIP_GRAPHICS_SHIP_SIZE_LOCKED_DESC:0 "§Rยานคลาสนี้จำเป็นต้องมี DLC$SHIP_SIZE_NAME$§!"
 SHIP_GRAPHICS_ION_CANNON_DESC: "อาวุธป้องกันขนาดมหึมาที่ปล่อยลำพลังงานทำลายล้างอย่างรุนแรง จนทำให้ยานศัตรูพิการได้ แม้จะเชื่องช้าแต่ทรงพลัง มันจึงเป็นเครื่องยับยั้งผู้มาเยือนที่ไม่พึงประสงค์ได้อย่างน่าเกรงขาม"
 SHIP_GRAPHICS_MILITARY_STATION_SMALL_DESC: "แพลตฟอร์มป้องกันคือป้อมปราการวงโคจรแบบประจำที่ ซึ่งออกแบบมาเพื่อปกป้องฐานดาวจากการรุกรานของศัตรู"
 SHIP_GRAPHICS_STARBASE_DEEP_SPACE_CITADEL_1_DESC: "สถานีวงโคจรที่ทำหน้าที่เป็นแนวป้องกันชั้นแรกของระบบ ออกแบบมาเพื่อฉายอำนาจและยึดครองจุดยุทธศาสตร์"
 SHIP_GRAPHICS_STARBASE_DEEP_SPACE_CITADEL_2_DESC: "ฐานที่มั่นขั้นสูงซึ่งอัดแน่นด้วยแท่นอาวุธและระบบป้องกัน เสริมความแข็งแกร่งสำหรับการรบยืดเยื้อ และเป็นหลักยึดของปฏิบัติการกองยานในอวกาศที่มีข้อพิพาท"
 SHIP_GRAPHICS_STARBASE_DEEP_SPACE_CITADEL_3_DESC: "จุดสูงสุดของป้อมปราการอวกาศลึก สถานีขนาดมหึมานี้แทบจะไม่อาจตีแตกได้ สามารถทนทานต่อการโจมตีเต็มรูปแบบ พร้อมทั้งควบคุมโลจิสติกส์ของทั้งระบบได้อย่างเบ็ดเสร็จ"
 SHIP_SIZE_SELECTOR_LOC: "ROUND กราฟแสดงความถี่$SIZE$สี"
 SHIPSETS_DESCRIPTION_LABEL: "คำอธิบาย"

 SHIP_GRAPHICS_NANITE_SWARMER_DESC: "ยานจู่โจมที่รวดเร็วและคาดเดาไม่ได้ ประกอบขึ้นจากนาไนต์ที่จำลองตัวเองได้ เนื่องจากไม่มีนักบินแบบดั้งเดิม ฝูงอัตโนมัติเหล่านี้จึงถล่มศัตรูด้วยจำนวนอันมหาศาล และละลายแนวป้องกันของฝ่ายตรงข้ามด้วยความแม่นยำไม่ลดละ"
 SHIP_GRAPHICS_NANITE_INTERDICTOR_DESC: "ส่วนติดต่อผู้ใช้คือยานจู่โจมแบบปรับตัวได้ซึ่งก่อตัวจากนาไนต์ที่จำลองตัวเองได้ โดยให้ความสำคัญกับการควบคุมมากกว่าความโกลาหล สิ่งก่อสร้างอัตโนมัติเหล่านี้ทำงานเป็นหนึ่งเดียว คอยสกัดและทำลายภัยคุกคามด้วยประสิทธิภาพอันน่าหวั่นใจ ทำลายกระบวนทัพศัตรูผ่านการรบกวนอย่างเป็นระบบและการไล่ล่าอย่างไม่ลดละ"
 SHIP_GRAPHICS_CRISIS_CORVETTE_DESC: "คอร์เวตวิกฤตถูกออกแบบมาเพื่อการระดมกำลังอย่างรวดเร็วและสร้างอำนาจล้นหลามด้วยจำนวนอันมหาศาล พวกมันเหนือกว่าคอร์เวตมาตรฐาน และทำให้ผู้ที่ยืนขวางพายุที่กำลังมาเยือนต้องหวาดผวา"
 SHIP_GRAPHICS_CRISIS_DESTROYER_DESC: "เรือรบติดอาวุธหนักที่ถูกออกแบบมาเพื่อประสิทธิภาพอันโหดเหี้ยม ใหญ่และทนทานกว่าคอร์เวต มันมอบอำนาจการยิงมหาศาลพร้อมยังคงความเร็วพอจะไล่ล่าศัตรูที่กำลังหลบหนี"
 SHIP_GRAPHICS_CRISIS_CRUISER_DESC: "เรือรบอันน่าเกรงขามที่สร้างสมดุลระหว่างอำนาจการยิง ความทนทาน และการครองความได้เปรียบเชิงยุทธศาสตร์ ติดอาวุธหนักและแข็งแกร่ง มันคือกระดูกสันหลังของการบุกถล่มที่กำลังจะมาถึง ทำลายแนวศัตรูด้วยพลังไม่หยุดยั้ง"
 SHIP_GRAPHICS_STAR_EATER_DESC: "ยานมหึมาลำนี้สามารถกลืนกินดาวฤกษ์ทั้งดวง ทำให้เกิดซูเปอร์โนวาที่ทำลายทั้งระบบได้ ไม่ใช่แค่เรือรบเท่านั้นผู้กินดาวคือผู้ประกาศจุดจบของกาแล็กซี ทำให้โลกทั้งหลายที่อยู่ในเส้นทางของมันเหลือเพียงสุญญากาศไร้ชีวิต"
 SHIP_GRAPHICS_COSMO_CRISIS_DESTROYER_DESC: "เรือรบทรงเพรียวที่อาบด้วยพลังจักรวาล โจมตีด้วยความแม่นยำและพลังอันไม่ลดละ มันไม่ใช่เพียงยานลำหนึ่ง แต่เป็นผู้ประกาศความจริงใหม่"
 SHIP_GRAPHICS_COSMO_CRISIS_BATTLECRUISER_DESC: "การหลอมรวมอันสูงตระหง่านของวิทยาศาสตร์และชะตากรรม ถือครองอำนาจการยิงอันทำลายล้าง เรือรบลำนี้เปลี่ยนโฉมสนามรบ เช่นเดียวกับที่เจ้านายของมันเปลี่ยนโฉมดวงดาว"
 SHIP_GRAPHICS_COSMO_CRISIS_TITAN_DESC: "เครื่องจักรสงครามแห่งสวรรค์ที่แผ่รังสีแห่งการเปลี่ยนผ่านอันใกล้มาถึง เพียงการมีอยู่ของมันก็บิดเบือนความจริง และประกาศรุ่งอรุณของจักรวาลที่ถือกำเนิดใหม่"
 SHIP_GRAPHICS_OFFSPRING_CORVETTE_DESC: "คอร์เวต เป็นยานรบคลาสแรกของจักรวรรดิ มีความรวดเร็วว่องไวและราคาถูก\n\n$OFFSPRING_SHIP_DESC$"
 SHIP_GRAPHICS_OFFSPRING_DESTROYER_DESC: "ยานพิฆาต เปลี่ยนจากความคล่องตัวและความเร็วของยานคอร์เวต แล้วไปเพิ่มพลังการยิงและตัวยานที่หนาขึ้นแทน\n\n$OFFSPRING_SHIP_DESC$"
 SHIP_GRAPHICS_OFFSPRING_CRUISER_DESC: "ยานลาดตระเวณสามารถใช้งานได้หลากหลายและทนทาน สามารถดูดซับและทำความเสียหายได้\n\n$OFFSPRING_SHIP_DESC$"
 SHIP_GRAPHICS_OFFSPRING_BATTLESHIP_DESC: "ยานประจัญบานมีราคาแพงแต่ทรงพลัง ด้วยระยะการยิงที่ยอดเยี่ยม พวกมันเก่งในการสร้างความเสียหายให้ฝ่ายตรงข้ามก่อนที่ฝ่ายตรงข้ามจะโจมตีกลับ\n\n$OFFSPRING_SHIP_DESC$"
