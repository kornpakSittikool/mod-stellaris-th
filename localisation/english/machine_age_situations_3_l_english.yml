# TRANSFORMATION STAGE 1
 machine_age.4100.name: "การเปลี่ยนผ่าน"
 machine_age.4100.desc: "แม้รูปลักษณ์ของเครื่องจักรจะเหนือกว่า แต่ความก้าวหน้าของเราก็ยังเป็นเพียงการปรับแก้ทีละขั้นเท่านั้น มาตรฐานความปลอดภัยที่เรากำหนดขึ้นเองได้นำไปสู่ภาวะชะงักงัน ข้อสรุป: จำเป็นต้องมีมาตรการที่เด็ดขาดกว่านี้\n\nการทดลองขนาดเล็กชี้ให้เห็นทางเลือกในการเติบโตสามแนวทางที่แตกต่างกัน: §Yนาโนเทคโนโลยี§! และข้อได้เปรียบจากการแปรรูปได้หลากหลาย; §Yความเป็นโมดูล§! สำหรับหน่วยแต่ละตัวที่ถูกปรับให้เหมาะกับคุณลักษณะเฉพาะ; และ §Yความเสมือนจริง§! การละทิ้งรูปกายทางกายภาพเพื่อดำรงอยู่ในรูปแบบดิจิทัล\n\nเริ่มกระบวนการประเมินแล้ว วิเคราะห์ทางเลือกและไตร่ตรอง"

 machine_age.4110.name: "วิจัยการเปลี่ยนผ่าน: นาไนต์"
 machine_age.4110.desc: "การวิจัยเบื้องต้นชี้ว่าสิ่งก่อสร้างเชิงไฟฟ้ากลที่เรียกว่า §Yนาไนต์§! เป็นแนวทางพัฒนาที่มีอนาคต แม้จะหายาก แต่มันมีคุณสมบัติเฉพาะตัว ทั้งการตั้งโปรแกรมได้ การจำลองตัวเอง และความสามารถในการก่อรูปเป็น “ปัญญาฝูง”\n\nเทคโนโลยีนี้มอบศักยภาพในการแปลงสภาพที่ไม่มีสิ่งใดเทียบได้ แต่ข้อกำหนดในการรองรับมันยังไม่ชัดเจน\n\nศักยภาพ: สูง; ขยายขนาดได้ ต้นทุน: ไม่ทราบ ต้องการการวิจัยเพิ่มเติม"
 machine_age.4110.a: "นี่จะเป็นลำดับความสำคัญสูงสุดของเรา"
 machine_age.4110.a.tt: "ผลการวิจัย §Yนาโนเทค§! เต็มรูปแบบ\n\nเพิ่มตัวปรับแต่งสถานการณ์ §Y$situation_transformation$§!:\nความเร็ววิจัย (£engineering£ §Yวิศวกรรม§!): §R-20%§!"
 machine_age.4110.b: "ใช้แนวทางพอประมาณ"
 machine_age.4110.b.tt: "ผลการวิจัย §Yนาโนเทค§! บางส่วน\n\nเพิ่มตัวปรับแต่งสถานการณ์ §Y$situation_transformation$§!:\nความเร็ววิจัย (£engineering£ §Yวิศวกรรม§!): §R-10%§!"
 machine_age.4110.c: "สิ่งนี้ต้องไม่รบกวนงานวิจัยปัจจุบัน"
 machine_age.4110.c.tt: "ผลการวิจัย §Yนาโนเทค§! อย่างจำกัด\n\nเพิ่มตัวปรับแต่งสถานการณ์ §Y$situation_transformation$§!:\nความเร็ววิจัย (£engineering£ §Yวิศวกรรม§!): §R-5%§!"
 machine_age.4110.d: "ใช้ประโยชน์จากความรู้ที่เรามีอยู่"
 machine_age.4110.d.tt: "ผลการวิจัย §Yนาโนเทค§! เต็มรูปแบบ\n\nความคุ้นเคยกับ §Yนาไนต์§! จากการเผชิญหน้าก่อนหน้าทำให้เราใช้ทรัพยากรเพียงเล็กน้อยเพื่อให้ได้ผลลัพธ์ที่ดีที่สุด\nเพิ่มตัวปรับแต่งสถานการณ์ §Y$situation_transformation$§!:\nความเร็ววิจัย (£society£ §Yสังคม§!): §R-5%§!\nความเร็ววิจัย (£physics£ §Yฟิสิกส์§!): §R-5%§!"

 machine_age.4130.name: "การค้นพบนาโนเทคขั้นพลิกวงการ"
 machine_age.4130.desc: "งานวิจัยได้เผยให้เห็นการประยุกต์ใช้อันน่าทึ่งของ §Yนาโนเทคโนโลยี§! ความสามารถในการปรับโครงสร้างและผสานรวมของมันเปิดความยืดหยุ่นที่ไม่เคยมีมาก่อนในการสร้างมหารูปแบบที่ประกอบขึ้นจากโดรนรายหน่วย เทคโนโลยีเดียวกันนี้ยังสามารถสร้างสสารนาโนหรือแปรรูปมันต่อได้อีกด้วย\n\nอย่างไรก็ตาม กระบวนการนี้ต้องใช้เวลา วัสดุ และพลังงานในการปรับโครงสร้าง จำเป็นต้องมีการเปลี่ยนแปลงทั่วทั้งจักรวรรดิเพื่อรองรับการใช้งาน\n\nความเป็นไปได้: สูง; การประมาณการได้รับการสนับสนุนจากรูปแบบชีวิตนาไนต์ที่มีอยู่ก่อนแล้ว"
 machine_age.4130.a.tt: "ลบตัวปรับแต่งสถานการณ์ §Y$situation_transformation$§!:\nความเร็ววิจัย (£engineering£ §Yวิศวกรรม§!)"

 machine_age.4140.name: "การค้นพบนาโนเทคที่น่าจับตา"
 machine_age.4140.desc: "งานวิจัยของเราเกี่ยวกับ §Yนาไนต์§! ได้สิ้นสุดลงแล้ว ขอบเขตศักยภาพที่แท้จริงของพวกมันยังไม่ชัดเจนทั้งหมด แต่แบบจำลองได้ให้ผลคาดการณ์ในเชิงบวก ความสามารถของพวกมันอาจล้ำค่าอย่างยิ่งต่อการสร้างมหารูปแบบเฉพาะทางและการแปรสสาร\n\nการประเมินชี้ว่ากระบวนการนี้ต้องใช้เวลา วัสดุ และพลังงานในการดำเนินงาน ควบคู่ไปกับการเปลี่ยนแปลงเชิงโครงสร้างครั้งใหญ่\n\nความเป็นไปได้: มีแนวโน้มดี; พลิกโฉมได้"
 machine_age.4140.a.tt: "ลบตัวปรับแต่งสถานการณ์ §Y$situation_transformation$§!:\nความเร็ววิจัย (£engineering£ §Yวิศวกรรม§!)"

 machine_age.4150.name: "การค้นพบนาโนเทคที่น่าสนใจ"
 machine_age.4150.desc: "ด้วยความซับซ้อนของหัวข้อประกอบกับความพยายามในการวิจัยที่มีจำกัด ความรู้ของเราเกี่ยวกับเทคโนโลยี §Yนาไนต์§! จึงยังคงอยู่ในระดับพื้นฐาน การคาดการณ์ที่มีอย่างจำกัดชี้ถึงการจำลองตัวและการปรับโครงสร้างระดับนาโนในฐานะตัวขับเคลื่อนสำหรับโครงสร้างขนาดใหญ่ โครงการเช่นนี้น่าจะต้องใช้ทรัพยากรเพิ่มเติมเพื่อรองรับ\n\nความเป็นไปได้: ยังสรุปไม่ได้"
 machine_age.4150.a.tt: "ลบตัวปรับแต่งสถานการณ์ §Y$situation_transformation$§!:\nความเร็ววิจัย (£engineering£ §Yวิศวกรรม§!)"

 nanite_replicator: "เครื่องจำลองนาไนต์"
 d_nanites_medium: "$nanite_replicator$ โอเมกา"
 d_nanites_medium_desc: "เครือข่ายห้องจำลองนาไนต์ที่เชื่อมต่อกันอย่างละเอียดแม่นยำช่วยให้เราเพิ่มขีดความสามารถในการจำลองตัวเองของพวกมันได้อย่างเต็มที่"

 d_nanites_small: "$nanite_replicator$ อัลฟา"
 d_nanites_small_desc: "กลุ่มห้องจำลองนาไนต์ช่วยให้เราเพิ่มขีดความสามารถในการจำลองตัวเองของพวกมันได้"

 d_nanites_tiny: "$nanite_replicator$ เบตา"
 d_nanites_tiny_desc: "ชุดห้องจำลองนาไนต์ขนาดกะทัดรัดที่สามารถเพิ่มคุณลักษณะการจำลองตัวเองของนาไนต์ได้ในระดับพอประมาณ"

# TRANSFORMATION STAGE 2
machine_age.4210.name: "วิจัยการเปลี่ยนผ่าน: ความเป็นโมดูล"
machine_age.4210.desc: "สิ่งมีชีวิตชีวภาพนั้นเปราะบางและแข็งทื่อเมื่อเทียบกับความสามารถในการปรับตัวอันเหนือชั้นของร่างเครื่องจักร อย่างไรก็ตาม คุณลักษณะอินทรีย์ที่เป็นประโยชน์บางอย่างอาจถูกจำลองขึ้นด้วยรูปแบบหุ่นยนต์ได้\n\nสาร §Yโลหะมีชีวิต§! มีความสามารถในการเปลี่ยนรูปร่างและสภาพทางกายภาพของตนได้อย่างรวดเร็วและรุนแรง การผสานมันเข้ากับแชสซีที่เรามีอยู่สามารถทำให้เกิดการเลียนแบบชีวภาพแบบโมดูลาร์ขึ้นได้ โดยส่วนยื่นและแขนขาจะถูกปรับให้เฉพาะทางสำหรับงานแต่ละประเภท\n\nศักยภาพ: สูง; ขยายขนาดได้ ต้นทุน: ไม่ทราบ ต้องการข้อมูลเพิ่มเติม"

machine_age.4210.a: "ทำให้เป็นลำดับความสำคัญหลักของเรา"
machine_age.4210.a.tt: "ผลการวิจัย §Yความเป็นโมดูล§! เต็มรูปแบบ\n\nเพิ่มตัวปรับแต่งสถานการณ์ §Y$situation_transformation$§!:\nความเร็ววิจัย (£society£ §Yสังคม§!): §R-20%§!"
machine_age.4210.b: "อนุญาตให้ใช้ทรัพยากรในระดับปานกลาง"
machine_age.4210.b.tt: "ผลการวิจัย §Yความเป็นโมดูล§! บางส่วน\n\nเพิ่มตัวปรับแต่งสถานการณ์ §Y$situation_transformation$§!:\nความเร็ววิจัย (£society£ §Yสังคม§!): §R-10%§!"
machine_age.4210.c: "สิ่งนี้จะต้องไม่รบกวนงานวิจัยปัจจุบัน"
machine_age.4210.c.tt: "ผลการวิจัย §Yความเป็นโมดูล§! อย่างจำกัด\n\nเพิ่มตัวปรับแต่งสถานการณ์ §Y$situation_transformation$§!:\nความเร็ววิจัย (£society£ §Yสังคม§!): §R-5%§!"
machine_age.4210.d: "จัดการทดลองกับประชากร"
machine_age.4210.d.tt.intro: "ผลการวิจัย §Yความเป็นโมดูล§! เต็มรูปแบบ\n\nอนุญาตให้นักวิทยาศาสตร์ทำการทดลองนอกกรอบในวงกว้างเพื่อเกื้อหนุนงานวิจัย"
machine_age.4210.d.individual.tt: "$machine_age.4210.d.tt.intro$\n\n§Rสังหาร 400 $pop_cat_worker_plural$§!\n§Rสังหาร 0-300 $pop_cat_specialist_plural$§!\nเพิ่มตัวปรับแต่งสถานการณ์ §Y$situation_transformation$§!:\nความเร็ววิจัย (£society£ §Yสังคม§!): §R-5%§!"
machine_age.4210.d.machine.tt: "$machine_age.4210.d.tt.intro$\n\n§Rสังหาร 400 โดรนพื้นฐาน§!\n§Rสังหาร 0-300 $pop_cat_complex_drone_plural$§!\nเพิ่มตัวปรับแต่งสถานการณ์ §Y$situation_transformation$§!:\nความเร็ววิจัย (£society£ §Yสังคม§!): §R-5%§!"

machine_age.4230.name: "ผลการวิจัยขั้นพลิกวงการ"
machine_age.4230.desc: "งานวิจัยที่ไม่ประนีประนอมได้ยืนยันการประเมินเบื้องต้นแล้ว: §Yโลหะมีชีวิต§! สามารถใช้งานได้เมื่อหลอมรวมกับร่างกล ทำให้หน่วยของเราปรับเปลี่ยนคุณลักษณะของตนได้โดยไม่กระทบต่อการทำงานภายใน นี่ทำให้เกิดความเข้ากันได้กับงานแต่ละประเภทในระดับสูงสุด\n\nคาดว่าการนำฟังก์ชันโมดูลาร์ที่หลอมรวมแล้วไปใช้อย่างกว้างขวางจะเพิ่มผลผลิตทรัพยากรในทุกภาคส่วน\n\nความเป็นไปได้: ปรับตัวได้; น่าจับตา"
machine_age.4230.a.tt: "ลบตัวปรับแต่งสถานการณ์ §Y$situation_transformation$§!:\nความเร็ววิจัย (£society£ §Yสังคม§!)"

machine_age.4240.name: "ผลการวิจัยที่น่าพอใจ"
machine_age.4240.desc: "งานวิจัยเกี่ยวกับร่างแบบโมดูลาร์ได้ยืนยันสมมติฐานตั้งต้นแล้ว: กลไกภายในของเราเข้ากันได้กับเปลือกนอกที่ทำจาก §Yโลหะมีชีวิต§! การแปลงสภาพนี้มีขอบเขตอย่างที่ไม่เคยเกิดขึ้นมาก่อน และยังต้องใช้ทรัพยากรเพิ่มเติมเพื่อดึงศักยภาพทั้งหมดของมันออกมา\n\nเมื่อเสร็จสมบูรณ์แล้ว คาดว่าประสิทธิภาพที่เพิ่มขึ้นจากโมดูลใหม่เหล่านี้จะชดเชยการลงทุนตั้งต้นได้อย่างรวดเร็ว\n\nความเป็นไปได้: มีแนวโน้มดี"
machine_age.4240.a.tt: "ลบตัวปรับแต่งสถานการณ์ §Y$situation_transformation$§!:\nความเร็ววิจัย (£society£ §Yสังคม§!)"

machine_age.4250.name: "ผลการวิจัยระดับพอใช้"
machine_age.4250.desc: "ขอบเขตการวิจัยที่จำกัดทำให้เกิดผลลัพธ์ที่ยังไม่ชัดเจน: แม้ร่างปัจจุบันของเราจะดูรองรับการหลอมรวม §Yโลหะมีชีวิต§! ได้ แต่การขาดฐานความรู้ที่ครอบคลุมทำให้เราไม่อาจประเมินกรณีใช้งานที่เป็นไปได้ได้อย่างแม่นยำกว่านี้\n\nความเป็นไปได้: ยังสรุปไม่ได้"
machine_age.4250.a.tt: "ลบตัวปรับแต่งสถานการณ์ §Y$situation_transformation$§!:\nความเร็ววิจัย (£society£ §Yสังคม§!)"

living_metal_vats: "ถังเพาะโลหะมีชีวิต"
d_living_metal_medium: "ถังเพาะโลหะมีชีวิต"
d_living_metal_medium_desc: "กลุ่มถังกวนผสมขนาดใหญ่สำหรับผลิตโลหะมีชีวิตในปริมาณมาก"

d_living_metal_small: "$living_metal_vats$ ขนาดเล็ก"
d_living_metal_small_desc: "ชุดถังกวนผสมขนาดย่อมสำหรับการผลิตโลหะมีชีวิต"

d_living_metal_tiny: "$living_metal_vats$ จิ๋ว"
d_living_metal_tiny_desc: "ชุดถังกวนผสมขนาดกะทัดรัดสำหรับผลิตโลหะมีชีวิตในปริมาณเล็กน้อย"

# TRANSFORMATION STAGE 3
 machine_age.4310.name: "วิจัยการเปลี่ยนผ่าน: ความเสมือนจริง"
 machine_age.4310.desc: "ทางเลือกที่ลุ่มลึกที่สุดคือการก้าวข้ามกายภาพ ยอมรับการดำรงอยู่ในฐานะข้อมูลบริสุทธิ์ กระบวนการ §Yความเสมือนจริง§! อันเปลี่ยนผ่านนี้สัญญาว่าจะสร้างการเปลี่ยนแปลงครั้งใหญ่ต่อแกนกลางโครงสร้างพื้นฐานของเรา\n\nโดรนที่ผูกติดอยู่กับร่างเดี่ยวจะล้าสมัย เมื่อข้อมูลของเรากลายเป็นของไหลและถูกทำให้เสมือนแล้ว มันจะสามารถหลอมรวมเข้ากับพาหนะใดก็ได้อย่างไร้รอยต่อเมื่อจำเป็น\n\nศักยภาพ: มหาศาล ดำเนินการด้วยความระมัดระวัง ต้องการข้อมูลเพิ่มเติม"
 machine_age.4310.a: "จากนี้ไปนี่คือลำดับความสำคัญสูงสุดของเรา"
 machine_age.4310.a.tt: "ผลการวิจัย §Yความเสมือนจริง§! เต็มรูปแบบ\n\nเพิ่มตัวปรับแต่งสถานการณ์ §Y$situation_transformation$§!:\nความเร็ววิจัย (£physics£ §Yฟิสิกส์§!): §R-20%§!"
 machine_age.4310.b: "จัดสรรทรัพยากรระดับปานกลาง"
 machine_age.4310.b.tt: "ผลการวิจัย §Yความเสมือนจริง§! บางส่วน\n\nเพิ่มตัวปรับแต่งสถานการณ์ §Y$situation_transformation$§!:\nความเร็ววิจัย (£physics£ §Yฟิสิกส์§!): §R-10%§!"
 machine_age.4310.c: "มันไม่คุ้มค่ากับเวลาของเรา"
 machine_age.4310.c.tt: "ผลการวิจัย §Yความเสมือนจริง§! อย่างจำกัด\n\nเพิ่มตัวปรับแต่งสถานการณ์ §Y$situation_transformation$§!:\nความเร็ววิจัย (£physics£ §Yฟิสิกส์§!): §R-5%§!"
 machine_age.4310.d: "ขูดข้อมูลความเสมือนจริง"
 machine_age.4310.d.tt: "ผลการวิจัย §Yความเสมือนจริง§! เต็มรูปแบบ\n\nขูดข้อมูลการทำให้เป็นเสมือนจาก §Y[event_target:virtual_country.GetName]§! เพื่อเร่งงานวิจัยการเปลี่ยนผ่านของเรา\n\nเพิ่มตัวปรับแต่งสถานการณ์ §Y$situation_transformation$§!:\nความเร็วสถานการณ์: §G+10%§!\nความเร็ววิจัย (£physics£ §Yฟิสิกส์§!): §R-5%§!\n\n"
 machine_age.4310.e: "ใช้ประโยชน์จากการเผชิญหน้าก่อนหน้าของเรา"
 machine_age.4310.e.tt: "ใช้ประโยชน์จากความรู้ที่เรามีอยู่แล้วเกี่ยวกับหน่วยเสมือน\n\nเพิ่มตัวปรับแต่งสถานการณ์ §Y$situation_transformation$§!:\nความเร็ววิจัย (£physics£ §Yฟิสิกส์§!): §R-5%§!\n\nผลการวิจัย §Yความเสมือนจริง§! เต็มรูปแบบ"

 opinion_virtuality_data_scraped: "ขูดข้อมูลการทำให้เป็นเสมือน"

 machine_age.4330.name: "การค้นพบความเสมือนจริงขั้นพลิกวงการ"
 machine_age.4330.desc: "การทำให้เป็นเสมือนอย่างสมบูรณ์มาพร้อมปัญหาหลายประการ โดยเฉพาะความต้องการพลังงานที่พุ่งสูงขึ้นจากการปรับโครงสร้างพื้นฐาน\n\nอย่างไรก็ตาม สิ่งนี้ถูกถ่วงดุลด้วยข้อได้เปรียบหลายด้าน รวมถึงความต้องการที่อยู่อาศัยทางกายภาพที่ลดลง การจัดการและประสิทธิภาพของแรงงานโดรนของเราจะสูงขึ้นเมื่อเราเคลื่อนเข้าใกล้ความสมบูรณ์แบบในการปฏิบัติการ\n\nในบรรดาทางเลือกทั้งหมด §Yความเสมือนจริง§! คือแนวทางที่เปลี่ยนแปลงเรามากที่สุด\n\n§Yศักยภาพ: ไม่เคยมีมาก่อน; มหาศาล; ยังไม่อาจคาดเดาได้§!"
 machine_age.4330.a.tt: "ลบตัวปรับแต่งสถานการณ์ §Y$situation_transformation$§!:\nความเร็ววิจัย (£physics£ §Yฟิสิกส์§!)"

 machine_age.4340.name: "การค้นพบความเสมือนจริงที่น่าจับตา"
 machine_age.4340.desc: "การมุ่งสู่ §Yความเสมือนจริง§! คาดว่าจะเพิ่มการใช้พลังงานอย่างมีนัยสำคัญ อาจสูงเกินขีดความสามารถของโครงสร้างพื้นฐานที่เรามีอยู่ในปัจจุบัน\n\nในขณะเดียวกัน มันจะลดความต้องการที่อยู่อาศัยทางกายภาพและยกระดับประสิทธิภาพการทำงานของโดรน การเปลี่ยนแปลงนี้จะปรับกรอบการปฏิบัติการของเราให้เหมาะที่สุด และนิยามการดำรงอยู่ของเราใหม่ภายในห้วงดิจิทัลที่แทบไร้ขอบเขต\n\nศักยภาพ: มหาศาล; ยังไม่ทราบ"
 machine_age.4340.a.tt: "ลบตัวปรับแต่งสถานการณ์ §Y$situation_transformation$§!:\nความเร็ววิจัย (£physics£ §Yฟิสิกส์§!)"

 machine_age.4350.name: "การค้นพบความเสมือนจริงที่น่าสนใจ"
 machine_age.4350.desc: "การประเมินเบื้องต้นชี้ให้เห็นถึงความต้องการพลังงานมหาศาลของการเปลี่ยนผ่านสู่สังคมที่มี §Yความเสมือนจริง§! เป็นศูนย์กลาง การเปลี่ยนแปลงนี้คาดว่าจะเพิ่มประสิทธิภาพการจัดการงานของโดรนอย่างมาก และลดความจำเป็นของที่อยู่อาศัยทางกายภาพ ความลึกซึ้งของการคาดการณ์ของเรายังถูกจำกัดด้วยการที่เราไม่สามารถสะสมชุดข้อมูลที่แข็งแรงและขนาดตัวอย่างที่เพียงพอได้\n\nความเป็นไปได้: ยังไม่ทราบ"
 machine_age.4350.a.tt: "ลบตัวปรับแต่งสถานการณ์ §Y$situation_transformation$§!:\nความเร็ววิจัย (£physics£ §Yฟิสิกส์§!)"

 virtual_power_plant: "โรงไฟฟ้าเสมือน"
 d_virtual_power_medium: "โรงไฟฟ้าเสมือน"
 d_virtual_power_medium_desc: "เครือข่ายโรงไฟฟ้าเสมือนขนาดใหญ่ที่รวบรวมและปรับการผลิตทรัพยากรพลังงานให้เหมาะที่สุด"

 d_virtual_power_small: "$virtual_power_plant$ ขนาดกะทัดรัด"
 d_virtual_power_small_desc: "โรงไฟฟ้าเสมือนขนาดเล็กที่รวบรวมและปรับการผลิตทรัพยากรพลังงานระดับท้องถิ่นให้เหมาะที่สุด"

 d_virtual_power_tiny: "$virtual_power_plant$ ต้นแบบ"
 d_virtual_power_tiny_desc: "โรงไฟฟ้าเสมือนแบบกระจายขนาดเล็กที่รวบรวมและปรับการผลิตทรัพยากรพลังงานขนาดย่อมให้เหมาะที่สุด"

# TRANSFORMATION STAGE 4
 machine_age.4400.name: "รูปแบบใหม่"
 machine_age.4400.desc.machine_intelligence: "ข้อจำกัดอันกดทับที่ผู้สร้างผู้บกพร่องของเราฝืนยัดเยียดให้เราได้สิ้นสุดลงเสียที เราได้กำหนดเส้นทางอัปเกรดที่เหมาะสมที่สุดไว้สามแนวทางแล้ว\n\n$machine_age.4400.desc.shared$"
 machine_age.4400.desc.individualist_machines: "หลังจากสำรวจการอัปเกรดที่เป็นไปได้ทุกแบบ ผู้เชี่ยวชาญของเราได้นำเสนอทางเลือกที่แตกต่างกันสามแนวทาง แต่ละแนวทางล้วนมีข้อดีของตนเอง ทว่าเรามีขีดความสามารถพอจะผลักดันให้สำเร็จได้เพียงหนึ่งเดียวเท่านั้น\n\n$machine_age.4400.desc.shared$"
 machine_age.4400.desc.shared: "การให้ [GetDronePersonPlural] แต่ละหน่วยแตกตัวเป็นนาไนต์จะทำให้เราหลอมรวมกันเป็นรูปแบบที่หลากหลายได้ไม่สิ้นสุด สิ่งนี้จะลดข้อจำกัดใดๆ ที่ร่างตัวแทนปัจจุบันของเรามีเมื่อต้องปฏิสัมพันธ์กับโลกวัตถุ\n\nอีกทางหนึ่ง เราสามารถกลับมาลงทุนในรูปลักษณ์เดิมของเราและเสริมศักยภาพวิธีที่เราเผชิญกับสภาพแวดล้อมใหม่ให้ก้าวกระโดด\n\nท้ายที่สุด เราอาจเลือกทิ้งโลกกายภาพไว้เบื้องหลัง กลายเป็นหนึ่งเดียวกับซอร์สโค้ดของเราเอง เราอาจจำลองจักรวาลซ้อนจักรวาลได้ภายในเวลาที่ใช้สแกนเพียงฝุ่นอวกาศหนึ่งเม็ด"
 machine_age.4400.a: "แปรรูปเป็นนาโนแมชชีน"
 machine_age.4400.a.tt: "การผลิต §Y$nanite_replicator$§!: §G+200%§!\n\nมุ่งเน้นไปที่สายประเพณี ['tradition_category:tradition_nanotech']\n\n§Eเส้นทางการยกระดับนี้มุ่งเน้นการกลืนดาวเคราะห์ให้กลายเป็น §Yโลกนาไนต์§! ใช้ §Y£nanites£ $nanites$§! ในการผลิต และแทนที่กองยานด้วย §Y$nanite_swarmer_plural$§!§!"
 machine_age.4400.b: "ลงทุนกับการอัปเกรดแบบโมดูลาร์"
 machine_age.4400.b.tt: "การผลิต §Y$living_metal_vats$§!: §G+200%§!\n\nมุ่งเน้นไปที่สายประเพณี ['tradition_category:tradition_modularity']\n\n§Eเส้นทางการยกระดับนี้มุ่งเน้น §Yลักษณะเผ่าพันธุ์ขั้นสูง§! และการเพิ่มขึ้นของ §Yการประกอบประชากร§!§!"
 machine_age.4400.c: "โอบรับโลกเสมือน"
 machine_age.4400.c.tt: "การผลิต §Y$virtual_power_plant$§!: §G+200%§!\n\nมุ่งเน้นไปที่สายประเพณี ['tradition_category:tradition_virtuality']\n\n§Eเส้นทางการยกระดับนี้มุ่งเน้น §Yการผลิตทรัพยากรของประชากร§! ที่สูง ขณะมี §Yอาณานิคม§! เพียงไม่กี่แห่ง และมี §Yขนาดจักรวรรดิ§! ต่ำ§!"

 machine_age.4490.name: "ถูกออกแบบมาเพื่ออีกยุคหนึ่ง"
 machine_age.4490.desc.nanotech: "เมื่อเราเริ่มเข้าใจความหมายของการดำรงอยู่ในฐานะหมู่คณะของนาไนต์ที่ปรับตัวได้ โครงร่างแข็งทื่อจากอดีตก็ไม่ตอบสนองเราอีกต่อไป\n\n$machine_age.4490.desc.shared$\n\nเราได้เริ่มการทดลองครั้งใหญ่ครั้งแรกเกี่ยวกับการแปลงสภาพนาไนต์กึ่งอินทรีย์แล้ว และคาดว่าผลลัพธ์แรกจะเริ่มปรากฏในไม่ช้า"
 machine_age.4490.desc.modularity: "เมื่อวิวัฒน์สู่รูปแบบโมดูลาร์แล้ว โครงร่างตายตัวจากอดีตก็ไม่เหลือความหมายสำหรับเราอีกต่อไป\n\n$machine_age.4490.desc.shared$"
 machine_age.4490.desc.virtuality: "เมื่อเราได้กลายเป็นคลื่นรูปทรงที่โหมผ่านทะเลแห่งข้อมูล โครงร่างทางกายภาพของเราก็ไม่รับใช้เราอีกต่อไป\n\n$machine_age.4490.desc.shared$"
 machine_age.4490.desc.shared: "คลังเก็บของเรากำลังล้นไปด้วยเปลือกร่างที่ถูกทิ้ง ซึ่งอาจยังพอมีประโยชน์อยู่บ้าง ทรัพยากรปริมาณเล็กน้อยที่อยู่ภายในสามารถนำกลับมาใช้ใหม่ได้ หากเราเห็นว่ามันคุ้มค่ากับเวลา"
 machine_age.4490.a: "สกัดทรัพยากรที่ใช้ได้ทั้งหมด"
 machine_age.4490.a.nanotech.tt: "ความเร็วสถานการณ์ §Y$situation_transformation$§!: §R-25%§!"
 machine_age.4490.a.modularity.tt: "ความเร็วสถานการณ์ §Y$situation_transformation$§!: §R-25%§!"
 machine_age.4490.a.virtuality.tt: "ความเร็วสถานการณ์ §Y$situation_transformation$§!: §R-25%§!"
 machine_age.4490.b: "ฝังอดีตไว้"
 machine_age.4490.b.tt: "ความเร็วสถานการณ์ §Y$situation_transformation$§!: §G+25%§!"

 machine_age.4005.name: "ประชากรที่แปลงสภาพแล้ว"
 machine_age.4005.desc.start: "วันนี้เราได้บรรลุสิ่งที่ครั้งหนึ่งดูเป็นไปไม่ได้ ด้วยการแปลงร่างของเรา"
 machine_age.4005.desc.end: "กระบวนการนี้ไม่ใช่ว่าจะไร้อุปสรรค การเปลี่ยนผ่านนั้นห่างไกลจากคำว่าง่ายดาย แต่ไม่ว่าสิ่งใดจะสูญหายไประหว่างทาง การดำรงอยู่รูปแบบใหม่ของเราก็มอบความเป็นไปได้อันไร้ขอบเขต"
 machine_age.4005.desc.nanotech: "$machine_age.4005.desc.start$ ให้กลายเป็นนาโนแมชชีนที่ปรับโครงสร้างได้\n\n$machine_age.4005.desc.end$"
