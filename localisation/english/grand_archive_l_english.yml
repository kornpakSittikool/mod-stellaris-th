 ### Primal Calling
 origin_primal_calling: "การ เรียก ปฐม บรรพบุรุษ"
 origin_primal_calling_desc: "สนิมของหญ้าใบ ความเงียบสงัดของคืน ความมุ่งมั่นของนักล่า คมชัดและเย็นเป็นแสงดาว\n\nอารยธรรมนี้มีความเชื่อมโยงกับป่า เนื่อง จาก มอง ตัว เอง ว่า เป็น คน ต้น เรือน ของ สัตว์ ป่า หลาก ชนิด (และ มัก จะ เป็น อันตราย) ที่ อาศัย อยู่ ใน โลก ของ ตน ตอน นี้ พวก มัน จึง หัน ไป มอง ท้องฟ้า. ผู้ เชี่ยวชาญ ด้าน การ จัด การ และ การ เลี้ยง สัตว์ ความ สัมพันธ์ นี้ กับ เฟนา ได้ พัฒนา ขึ้น ตาม จริยธรรม ของ พวก เขา. ความ ผูก พัน นี้ จะ พัฒนา ขึ้น อย่าง ไร ใน ระดับ กาแล็กซี่ ที่ ยัง ต้อง ดู กัน ต่อ ไป."
 origin_tooltip_primal_calling_effects: "- $HOMEWORLD$$TABBED_NEW_LINE$- $PLANETARY_MODIFIERS$ ['concept_untamed_wilds_mod']\n- $HOME_SYSTEM$ §Yขอบเขตพื้นที่§!ใน ระบบ เพื่อน บ้าน\n- $AVAILABLE_BUILDINGS$ ['concept_wildlife_ranch', £building£ $wildlife_ranch$]\n- สามารถเลือกพิเศษ['concept_primal_calling_stance']เกี่ยวกับ§Yขอบเขตพื้นที่§!เมื่อติดต่อแรก\n- $ADDITIONAL_TECHNOLOGIES_STRING$ ['technology:tech_genome_mapping', £society_research£$tech_genome_mapping$]\n- $GUARANTEED_RESEARCH_OPTION_STRING$ ['technology:tech_alien_life_studies', £society£$tech_alien_life_studies$]\n- เข้าใจ['technology:tech_gravity_wells', £physics_research£$tech_gravity_wells$]หลังจากการติดต่อครั้งแรกกับขอบเขตพื้นที่\n- เข้าใจ['technology:tech_alien_cloning', £society_research£$tech_alien_cloning$]หลังจากตรวจจับอวกาศได้\n- เข้าใจ['technology:tech_controlled_mutations', £society_research£$tech_controlled_mutations$]หลังจากโคลนนิ่งสเปซฟานา"
 START_SCREEN_PRIMAL_CALLING: "ทั้ง ๆ ที่ มี ความ ก้าว หน้า ทาง เทคโนโลยี อย่าง รวด เร็ว เรา ยัง คง ติด สนิท อยู่ กับ สัตว์ ป่า ใน โลก ของ เรา. พวกเขาเป็นครูของเรา มากพอๆกับที่เรา เป็นผู้ดูแลพวกเขา เรา ไม่ ได้ เอา ไป จาก พวก เขา มาก เกิน กว่า ที่ พวก เขา จะ ให้ ได้ และ เครื่อง บูชา ของ พวก เขา ก็ เป็น ที่ เคารพ นับถือ.\n\nใน บริเวณ ที่ ไม่ มี การ ลาดยาง ของ อวกาศ เรา อาจ พบ สัตว์ ป่า ชนิด อื่น ๆ ได้ เป็น อย่าง ดี. ถ้า เช่น นั้น เรา จะ ปฏิบัติ ต่อ พวก เขา ด้วย ความ นับถือ เช่น เดียว กับ สัตว์ ต่าง ๆ ใน โลก ของ เรา. พวกเขาจะเรียนรู้สถานที่ของพวกเขาในขณะที่เราเรียนรู้ของเรา เพื่อที่เราจะเติบโตแข็งแรง\n\nเรียกดาว, ความปรารถนาเดิมเผาไหม้ภายในเรา อะไรก็ตามที่อยู่ข้างนอกนั่น เราจะพบกับมันด้วยความมั่นใจ"

 leader_trait_trophy_hunter: "นักล่าโทรฟี"
 leader_trait_trophy_hunter_desc: "ด้วย ความ ลําบาก และ มี ประสบการณ์ ติด อาวุธ อยู่ ตลอด ชีวิต ผู้ บัญชา การ คน นี้ มี ความ เข้าใจ อัน ลึกลับ เกี่ยว กับ อวกาศ โฟ นา. กุญแจสู่การล่าที่ประสบความสําเร็จ คือคิดเหมือนเหยื่อ แต่แน่นอน แค่ลูกเดียว"
 leader_trait_gifted_trapper: "ตัวดักจับจดหมาย"
 leader_trait_gifted_trapper_desc: "นัก วิจัย ที่ ชํานาญ ซึ่ง เอา ใจ ใส่ อย่าง ดี ที่ สุด ใน การ จับ และ การ ขน ส่ง ของ ตัว อย่าง ที่ ยัง มี ชีวิต อยู่. ความผูกพันธ์ของผู้นําที่มีต่อสวัสดิการของสัตว์นี้ เป็นแรงบันดาลใจให้ผู้อื่นพัฒนามาตรฐานการวิจัย"
 leader_trait_void_hunter: "นักล่าแผ่น"
 leader_trait_void_hunter_desc: "นักล่าที่มีความรู้ เหมาะกับการแข่งขันใหญ่ ผู้ป่วยในวิธีการของพวกเขา และแม่นยําเมื่อพวกเขาโจมตี"
