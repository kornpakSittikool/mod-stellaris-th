 wildlife_ranch: "ทุ่ง หญ้า สัตว์ ป่า"
 wildlife_ranch_desc: "เราอยู่ร่วมพันธมิตรกับสัตว์พื้นเมืองของเรา การดูแลที่ดีที่สุดในการป้องกันของที่อยู่อาศัยของพวกเขา"
 wildlife_ranch_2: "สัตว์ เลี้ยง ลูก ด้วย นม"
 wildlife_ranch_2_desc: "การ จัด การ ระบบ นิเวศ อย่าง ระมัดระวัง ทํา ให้ สภาพ การณ์ ของ สัตว์ พื้น เมือง ดี ขึ้น และ ทํา ให้ การ ทํา ฟาร์ม ง่าย ขึ้น."
 wildlife_ranch_3: "เน็กซัส สัตว์ ป่า"
 wildlife_ranch_3_desc: "สถาน ที่ อัน กว้าง ใหญ่ ซึ่ง อนุญาต ให้ สัตว์ ท่อง เที่ยว ได้ อย่าง อิสระ. พวก เขา ได้ รับ การ ให้ การ ปลอบโยน และ ความ ฟุ่มเฟือย ใน ความ พยายาม ที่ จะ เพิ่ม คุณภาพ ของ ทรัพยากร ที่ พวก เขา จัด เตรียม ให้."
 hunting_grounds: "พื้น ที่ ล่า สัตว์"
 hunting_grounds_desc: "การฝึกที่ซับซ้อน ใช้เป็นเทคนิคการล่า จาก อาวุธ พลัง งาน สมัย ใหม่ มา เป็น เครื่อง มือ การ ต่อ สู้ แบบ ดั้งเดิม ความ กล้า หาญ และ ความ ชํานาญ เป็น สิ่ง จําเป็น เพื่อ จะ เป็น นัก ล่า ที่ น่า กลัว ที่ สุด และ อ้าง ว่า มัน เป็น ถ้วยรางวัล."
 hunting_grounds_2: "การ ล่า สัตว์"
 hunting_grounds_2_desc: "การฝึกและเฝ้าระวัง ทําให้เกิดสภาวะการล่าที่เหมาะสมสําหรับท้องถิ่น เทคโนโลยีการจับความร้อน ช่วยระบุเส้นทางของสัตว์ และได้เกมที่มีคุณภาพ"
 hunting_grounds_3: "ล่าเน็กซ์ซัส"
 hunting_grounds_3_desc: "กลุ่มล่าดาวเคราะห์ขนาดใหญ่ ในขนาดขนาดใหญ่ การ จับ จ่าย ด้วย อาวุธ ที่ มี คุณภาพ สูง ที่ สุด และ อุปกรณ์ ติด ตาม พวก นัก ล่า จึง ได้ รับ การ ฝึก อบรม ใน ระดับ สูง เพื่อ เพิ่ม ปริมาณ และ คุณภาพ ของ เกม ที่ ถูก ฆ่า."
 wildlife_sanctuary: "อาคาร สัตว์ ป่า"
 wildlife_sanctuary_desc: "เขต อนุรักษ์ ที่ มี การ ศึกษา สัตว์ ป่า ภาย ใน ถิ่น อาศัย ตาม ธรรมชาติ ของ มัน. การ ป้องกัน อยู่ ใน ที่ ที่ จะ ป้องกัน ความ ไม่ มั่นคง ของ ประชากร หรือ โรค ที่ รุนแรง เกิน ไป. การศึกษาสิ่งมีชีวิตเหล่านี้ ในตัวของมันเองเป็นความพยายามทางวิชาการที่คุ้มค่า แต่ที่สําคัญมันสอนเรามากขึ้นเกี่ยวกับธรรมชาติของเราเอง"
 wildlife_sanctuary_2: "คุณสมบัติเพิ่มเติม"
 wildlife_sanctuary_2_desc: "สัตว์ ต่าง ๆ ใน ที่ นี้ ได้ รับ การ ดู แล เป็น ส่วน ตัว ซึ่ง เป็น อาหาร และ ความ ต้องการ ทาง การ แพทย์ ที่ ไม่ เหมือน ใคร ของ สัตว์ เหล่า นี้ ที่ ได้ รับ การ จัด เตรียม ให้ มี การ รบกวน น้อย ที่ สุด ต่อ ถิ่น อาศัย ตาม ธรรมชาติ ของ มัน. ระบบ นิเวศ พิเศษ ทํา ให้ มี การ แพร่ พันธุ์ และ การ แพร่ พันธุ์ ของ สิ่ง มี ชีวิต ที่ ใกล้ จะ สูญ พันธุ์."
 wildlife_sanctuary_3: "เน็กซัส"
 wildlife_sanctuary_3_desc: "สัตว์ที่นี่ถูกเฝ้าดูและดูแล ใช้โครงสร้างพื้นฐานที่ออกแบบมาอย่างดี ออกแบบให้ดูเหมือนว่ามันไม่มีจริง นักวิจัยถูกห้ามไม่ให้เข้าไปแทรกแซงพฤติกรรมตามธรรมชาติของเรื่อง รับประกันการเก็บข้อมูลที่มีคุณภาพสูงสุด"
 primal_arena: "อา เร นา"
 primal_arena_desc: "ที่นักรบที่แข็งแกร่งที่สุดของเรา จะตกหลุม กับสัตว์ดุร้ายในการต่อสู้ครั้งแรก ไม่ มี ความ บันเทิง ใด ยิ่ง ใหญ่ ไป กว่า การ เฝ้า ดู เหล่า วีรบุรุษ มี ชัย เหนือ สัตว์ ป่า หรือ การ พยายาม ฆ่า ฟัน."
 primal_arena_2: "สนาม กีฬา มหา นคร"
 primal_arena_2_desc: "ใน สนาม กีฬา ขนาด ใหญ่ นี้ ฝูง สัตว์ ได้ รับ การ ฝึก โดย ผู้ ดู แล ที่ ชํานาญ ใน การ จัด การ โจมตี. นักต่อสู้สัตว์ป่าไม่สามารถพึ่งพาเพียงการเอาชนะเหมืองของตน: พวกเขาต้องใช้แม้กระทั่งผู้ฝึกสอนของพวกเขาเพื่อที่จะอยู่รอด"
 primal_arena_3: "โค โล เซี ยม"
 primal_arena_3_desc: "สนามประลองอันน่าเกรงขาม ถูกออกแบบมาให้เป็นเจ้าภาพ ยุทธการที่สังหารสัตว์ป่า การ หมั้น แต่ ละ ครั้ง ใช้ เวลา หลาย สัปดาห์ ใน การ เตรียม ตัว และ สามารถ สนับสนุน ผู้ เข้า ร่วม หลาย ล้าน คน."
 symbiosis_nexus: "Symbiosis Nodule"
 symbiosis_nexus_desc: "เก็บธรรมชาติที่คู่ป่าได้รับการต้อนรับเข้าคอกของเรา สิ่งมีชีวิตแต่ละชนิดมีบางสิ่งบางอย่างที่พิเศษ เพื่อนําเสนอความคิด"
 symbiosis_nexus_2: "โรค ซิ มไบ โอ ซิส"
 symbiosis_nexus_2_desc: "เขตอนุรักษ์กลางที่ทําหน้าที่ จัดกลุ่มคู่ค้าป่าของเรา เป็นฝักที่ยึดเหนี่ยวตัวเอง การ ทํา ให้ ความ สามารถ ใน การ คิด ของ พวก เขา ลด ลง ทํา ให้ มี ความ คิด ที่ มั่นคง ยิ่ง ขึ้น."
 symbiosis_nexus_3: "ซิ มไบ โอ ซิส"
 symbiosis_nexus_3_desc: "ที่ทําหน้าที่รวมจิตใจ ของสิ่งมีชีวิตทั้งหมด ในพลังงานความคิดของเรา"

 edict_space_fauna_exhibition: "การขยายพื้นที่"
 space_fauna_exhibition: "$edict_space_fauna_exhibition$"
 edict_space_fauna_exhibition_desc: "ทุ่งหญ้าจากข้ามกาแล็คซี่ แสดงปศุสัตว์ที่มีชื่อเสียงของพวกเขา และแข่งขันเพื่อความอยากของ \"ดีที่สุดในการแสดง\"."
 edict_beasts_burden: "สัตว์ ร้าย แห่ง เบอร์ เดน"
 beasts_burden: "$edict_beasts_burden$"
 edict_beasts_burden_desc: "ปศุสัตว์ที่ทํางานหนักที่สุดของเรา ควรจะทําหน้าที่อย่างแข็งขันที่สุด"
 edict_creature_welfare: "สัตว์ ป่า"
 creature_welfare: "$edict_creature_welfare$"
 edict_creature_welfare_desc: "มันเป็นความรับผิดชอบของเราที่จะ มั่นใจคุณภาพสูงสุดของชีวิต สําหรับสิ่งมีชีวิตภายในการดูแลของเรา"
 edict_crack_the_whip: "ฟัน แส้"
 crack_the_whip: "$edict_crack_the_whip$"
 edict_crack_the_whip_desc: "ไม่ ว่า จะ มี สิ่ง มี ชีวิต ชนิด ใด ก็ ตาม ทุก สิ่ง ก็ มี ปฏิกิริยา คล้าย ๆ กัน ต่อ ความ เจ็บ ปวด. เคล็ดลับคือการเรียนรู้วิธีบังคับมันอย่างถูกต้อง"
 edict_exotic_network: "เครือข่ายภายนอก"
 exotic_network: "$edict_exotic_network$"
 edict_exotic_network_desc: "จิตใจ ของ สิ่ง มี ชีวิต ที่ เล็ก กว่า ใน การ ดู แล ของ เรา มี ความ สามารถ พอ ที่ จะ ให้ แบน บิด ได้ ใน การ คํานวณ ที่ ละเอียด กว่า."
 edict_defensive_instincts: "สัญชาตญาณ ของ ตัว เอง"
 defensive_instincts: "$edict_defensive_instincts$"
 edict_defensive_instincts_desc: "เราเป็นหนึ่งเดียวกัน ให้สัญชาตญาณของเราอยู่ใน ความหนาวของพื้นที่ลึก"
 edict_biological_overdrive: "โอเวอร์ไดร์ฟของชีวเคมี"
 biological_overdrive: "$edict_biological_overdrive$"
 edict_biological_overdrive_desc: "สิ่งมีชีวิตที่อ่อนแอที่สุดของเรา สามารถถูกผลักดันเข้าสู่ขีด จํากัดของมัน ด้วยตัวรับประสาทที่เหมาะสมที่ติดตั้ง"

 grand_archive.1060.name: "[from.GetSpaceFaunaName]แคริออน"
 grand_archive.1060.desc: "หลังจากสร้างการติดต่อกับ[from.GetSpaceFaunaNamePlural]เราตรวจพบร่างที่ผุพัง ของหนึ่งในพวกมัน[fromfrom.GetName]ซากศพถูกทําให้แห้งและแข็งตัว หลังจากสัมผัสพื้นที่เปิดมานาน\n\nเราตั้งสมมุติฐานว่าซากนี้คือสิ่งที่ดึงดูดสมาชิกอื่น ๆ ของสายพันธุ์ของพวกเขาในตอนต้น; บางทีพวกเขาได้รับการแสวงหา สมาชิกที่หายไปของ[from.GetSpaceFaunaGroup]นี้เป็นโอกาสที่หายากที่จะศึกษาชีววิทยาของ[from.GetSpaceFaunaName]ที่ตายด้วยสาเหตุธรรมชาติในความว่างเปล่า"
 TIYANKI_GROUP_NAME: "ฝัก"
 SPACE_AMOEBA_GROUP_NAME: "ฝูง"
 CRYSTAL_GROUP_NAME: "หมุน & 90"
 VOIDWORM_GROUP_NAME: "เปลี่ยนการจัดเรียงแฟ้ม"
 CUTHOLOID_GROUP_NAME: "แสดง"

 voidworm_carcass_01_object: "หนอน หมึก ยัง คง อยู่"
 carcass_01_object: "อวกาศฟานาคาส"
 CARRION_DEBRIS_PROJECT: "[met_critter.GetSpaceFaunaName]ตรวจหาอัตโนมัติ"
 CARRION_DEBRIS_PROJECT_DESC: "ซากของ[met_critter.GetSpaceFaunaName]ถูกค้นพบใน[contact_system.GetName]การศึกษาซากเหล่านี้ในป่า จะขยายความเข้าใจของเรา"

 grand_archive.1065.name: "การตรวจหาอัตโนมัติเสร็จสมบูรณ์แล้ว"
 grand_archive.1065.desc: "การชันสูตรศพ[met_critter.GetSpaceFaunaName]ศพใน[contact_system.GetName]เสร็จสมบูรณ์แล้ว เราได้ค้นพบตัวอย่างชีวภาพที่เตรียมไว้อย่างดี จากภายในซากศพ ที่ให้ความเข้าใจที่พิเศษ"
 grand_archive.1065.specimen_tt: "ขอบเขตสี§Mเอพิค§! ['concept_specimen']"

 NAME_BoneShip: "Bone Ship"
 NAME_BoneShip_desc: "The ship is adorned with tendrils of mature Tiyanki, rows of Voidworm teeth, and the skull of a creature we have never seen before. It is bristling with an array of precision weapons."
 grand_archive.1069.name: "$NAME_BoneShip$"
 grand_archive.1069.desc: "เราได้รับการติดต่อจากเรือที่ดัดแปลงอย่างประหลาดใน[from.GetName]. $NAME_BoneShip_desc$\n\nหลัง จาก ตอบ รับ คํา เชิญ ของ เรา อย่าง โง่ เขลา แล้ว นัก บิน คน นั้น ก็ สรุป ได้ อย่าง ครบ ถ้วน[GetExecuted]เราได้อ้างเรือแปลก ๆ ของพวกเขา และเพิ่มเข้าไปในกองทัพของเรา เราได้ค้นพบ ไกด์ของนักล่าที่มีประโยชน์ ในของส่วนตัวของพวกเขา"
 grand_archive.1069.a: "ของขวัญต้อนรับ"
 EXECUTED: "ประมวลผล"
 DEVOURED: "กินเข้าไป"

 grand_archive.1070.name: "$NAME_BoneShip$"
 grand_archive.1070.desc: "เราได้รับการติดต่อจากเรือที่ดัดแปลงอย่างประหลาดใน[from.GetName]. $NAME_BoneShip_desc$\n\nพวกมันโจมตีเราทุกความถี่"
 grand_archive.1070.a: "เปิดระบบสื่อสาร"

 NAME_PrimalHunter: "Ceriz t'Xal"
 primal_hunter_desc: "นักล่าที่เชี่ยวชาญที่ท่องกาแล็กซี่ เพื่อค้นหาเกมใหญ่"
 primal_hunter_catchphrase: "§L\"ฉันมองหาถ้วยรางวัลสําหรับคอลเลคชั่นของฉัน.\"§!"
 grand_archive.1075.name: "$grand_archive.1070.name$"
 grand_archive.1075.desc: "§Hเสียงของการ ทํา ดี แบบ ซี ริซเป็นแห้งและแตกเช่นถ้าพวกเขาไม่ได้พูดในสัปดาห์ ลักษณะ นิสัย ของ พวก เขา ตรง และ พวก เขา พินิจ พิจารณา ด้วย ท่าที ที่ มี ความ นับถือ และ น่า กลัว พอ ๆ กัน.§!\n\nในฐานะนักล่ารางวัล มันต้องใช้มากเพื่อทําให้ฉันประทับใจ คนของคุณมี\n\nผมยินดีที่จะเข้าร่วมกลุ่มล่าของคุณ ด้วยความเข้าใจว่า หุ้นส่วนของเรา จะเป็นหนึ่งในความสะดวกและการสอนร่วมกัน"
 grand_archive.1075.a: "คุณเป็นใคร?"
 grand_archive.1075.a.reply: "ฉัน$NAME_PrimalHunter$ฉันตามล่ามันในระบบนี้มาหลายปี ผมค้นหาเหมืองใหม่ และคนของคุณดูเหมือนเป็นนักแกะรอยที่มีความสามารถ\n\nแรงจูงใจของผมนั้นเรียบง่าย ความตื่นเต้นในการล่า"
 grand_archive.1075.b: "กะโหลกที่อยู่บนเรือคุณคืออะไร"
 grand_archive.1075.b.reply: "มันเป็นครั้งสุดท้ายของชนิดของมัน มันทําให้เกิดการต่อสู้"
 grand_archive.1075.c: "คุณเฝ้ามองพวกเรามานานแค่ไหนแล้ว"
 grand_archive.1075.c.reply: "เห็น ได้ ชัด ว่า คน ของ คุณ มี หลาย สิ่ง ที่ ต้อง เรียน รู้.\n\nนักล่าที่ดีสามารถตามรอยเหมืองของพวกเขา ได้นานเท่าที่จําเป็น ในการซ่อนตัวที่สมบูรณ์แบบ เพื่อ จะ เป็น อันตราย อย่าง แท้ จริง คน เรา ต้อง ไม่ ถูก มอง จน กว่า จะ ยิง. เวลาที่ผมใช้เวลาอยู่ในเงามืด ไม่ใช่เรื่องกังวล ทางเลือกของผมที่จะเปิดเผยตัวเอง"
 grand_archive.1075.d: "จะมาร่วมกับเราทําไม"
 grand_archive.1075.d.reply: "ผมไม่ได้ลงสนาม ถึงแม้ข้าจะอยากแบ่งปันอาณาเขต ข้าก็ยังยอมทํางานเคียงข้างพวกนักล่า มากกว่าจะสู้กับเหยื่อตัวเดียวกัน\n\nไม่ว่าคุณจะติดตามอะไร ผมจะฆ่า"
 grand_archive.1075.hire: "รายการ"
 grand_archive.1075.hire_tt: "§Y$NAME_PrimalHunter$§!เข้าร่วมอาณาจักรของเราในฐานะ§Hหัวหน้า§!."
 grand_archive.1075.dismiss: "ไม่สนใจ"

 grand_archive.1080.name: "นัก วิทยา การ ท่อง เที่ยว"
 grand_archive.1080.desc: "เราได้รับการติดต่อจากเรือวิจัยอิสระ ที่ฐานดาวของเราใน[from.GetName]ร่วมกับอาร์เรย์ของอุปกรณ์กําลังประมวลผลและเครื่องมือวิเคราะห์ ยานลํานี้ได้รับการปรับตัวโดยเฉพาะสําหรับการจับภาพและการตรวจสอบชีวิตอวกาศ\n\nพวกมันโจมตีเราทุกความถี่"
 grand_archive.1080.a: "เปิดระบบสื่อสาร"

 NAME_PrimalRancher: "Ruuk Qabruuk"
 primal_rancher_desc: "นักประสาทวิทยาที่หลงใหลงานภาคสนาม เธอได้ศึกษาสัตว์อวกาศทุกชนิด"
 primal_rancher_catchphrase: "§L\"สัตว์ทุกตัวมีเรื่องเล่า และฉันเป็นผู้ฟังที่กระตือรือร้น!\"§!"
 grand_archive.1085.desc: "§Hสายตาของรูกกระพริบตลอดเวลา กับอุปกรณ์ขนาดเล็กที่พกพาได้ แม้ ขณะ ที่ เธอ ทักทาย เรา ดู เหมือน เธอ จด บันทึก. ทั้ง ๆ ที่ เป็น อย่าง นั้น ท่าที ของ เธอ ก็ ยัง เป็น แบบ ที่ จริง ใจ และ ใช้ ได้ ผล หาก แยก ตัว อยู่ คน เดียว.§!\n\nผมเห็นว่าผมไม่ได้อยู่คนเดียว ที่สนใจสิ่งมีชีวิตจากอวกาศ ผมได้ศึกษางานวิจัย[root.GetName]ได้ดําเนินการและมันมีความชัดเจนเชิงบวก ผมจะไม่รักอะไรมากไปกว่า การช่วยความพยายามเหล่านี้ เป็นส่วนหนึ่งของแผนกวิทยาศาสตร์ของคุณ ถ้าคุณจะมีฉัน แน่นอน"
 grand_archive.1085.a: "คุณเป็นใคร?"
 grand_archive.1085.a.reply: "โทษที ฉันนําหน้าตัวเองไปหน่อย\n\nผมชื่อรูก ผมเป็นนักวิจัยที่เชี่ยวชาญในงานวิจัยเกี่ยวกับอวกาศ ทีมของผมและผมได้รวบรวมข้อมูลเกี่ยวกับรูปแบบการอพยพ องค์ประกอบของร่างกาย และความหลากหลายทางชีวภาพในระดับกาแล็กซี่\n\nโดยส่วนตัวแล้ว ฉันรักสัตว์ ตั้งแต่ฉันเป็นผู้หญิง ฉันไม่เคยไปไหนโดยไม่มีฟูลัฟ"
 grand_archive.1085.b: "ฟูลัฟเป็นใคร"
 grand_archive.1085.b.reply: "มีแต่ผู้ชายคนโปรดของฉันในกาแล็กซี่\n\nฉันจะพาเขาไปดูในจอ แต่ตอนนี้เขาหลับแล้ว บนดาวบ้านเกิดของผม เราเพาะพันธุ์สัตว์ชนิดนี้ขึ้นมาเป็นสัตว์เลี้ยง และผมรับเลี้ยงเขา เขาเพียงแค่น่ารัก; ได้ยินไม้เลื้อยเล็ก ๆ น้อย ๆ ของเขาบนชั้นโลหะวิธีที่เขากลาญูจบนขนนกของฉัน, ฉันมั่นใจว่าเขาจะชนะใจนายเหมือนกัน เมื่อ... ถ้าเราร่วมมือกัน"
 grand_archive.1085.c: "คุณหาพวกเราเจอได้ยังไง"
 grand_archive.1085.c.reply: "หนึ่งในตัวอย่างที่เราตามรอย แสดงพฤติกรรมแปลกๆ เราเลยตามรอยมัน เราพบว่าทีมนักวิทยาศาสตร์ของคุณ มีส่วนร่วมในวิชาของเรา การดูแลที่ดีของคุณกับสัตว์ แสดงความเคารพอย่างแท้จริงต่อชีวิตจากอวกาศ และที่เป็นแรงบันดาลใจให้ผมได้ศึกษางานวิจัยของคุณ ผมมักจะมองหาเพื่อนที่มีความคิดเหมือนกันในสาขานี้เสมอ"
 grand_archive.1085.d: "จะมาร่วมกับเราทําไม"
 grand_archive.1085.d.reply: "พูดตามตรง งานวิจัยทางวิทยาศาสตร์อิสระ ไม่ใช่แหล่งรายได้ที่น่าเชื่อถือ ผมเชื่อในงานของผม แต่การใช้เวลาทั้งชีวิตหาเงินทุน แค่ใช้เวลามากเกินไป\n\nโดยการเข้าร่วม[root.GetName]ฉันจะสามารถใช้เวลาทั้งหมดของฉัน เพื่อทําสิ่งที่ฉันถนัดที่สุด คือศึกษาชีวิตอวกาศ ผมจะได้เข้าถึงทรัพยากรที่มากขึ้น และสามารถร่วมมือกับทีมนักวิทยาศาสตร์ของคุณ เพื่อเพิ่มเป้าหมายของเรา"
 grand_archive.1085.hire: "รายการ"
 grand_archive.1085.hire_tt: "§Y$NAME_PrimalRancher$§!เข้าร่วมอาณาจักรของเราในฐานะ§Hหัวหน้า§!."
 grand_archive.1085.dismiss: "ไม่สนใจ"

 grand_archive.1100.name: "กราฟแสดงความถี่"
 grand_archive.1100.desc: "เราได้ตรวจพบจํานวนมาก ของคลื่นแม่เหล็กไฟฟ้าแปลก ๆ มาจากพื้นที่ที่เราไม่รู้จัก\n\nการวิเคราะห์เริ่มต้น บ่งชี้ว่าคล้ายกับ§Yหนอน ผีเสื้อ§!สัญญาณสื่อสาร แม้จะมีความผิดปกติมากขึ้น และมีแอมพลิจูดสูง นี้จะถูกสอบสวนต่อไป"
 grand_archive.1100.a: "เกี่ยวกับ"

 grand_archive.1105.name: "หนอน แมลง ปีก แข็ง"
 grand_archive.1105.desc: "เราได้ตรวจพบที่มาของเสียงรบกวนจากสัตว์เหล่านี้ ระบบที่ซ่อนโดย§Yหนอน ผีเสื้อ§!ใกล้[frenzied_voidworms_target.solar_system.GetName].\n\nหนอนไวรอยด์ในระบบนี้ไม่เหมือนที่เคยเจอมาก่อน สิ่งมีชีวิตเหล่านี้ถูกกลายพันธุ์; ไม่มีโทริกาเกิดขึ้น และตัวอย่างที่เป็นผู้ใหญ่แต่ละคน มีส่วนร่วมในสิ่งที่สามารถบรรยายได้เท่านั้น\n\nนี่เกี่ยวกับ: พฤติกรรมที่ไม่เป็นมิตรนี้หมายความว่ารังนี้สามารถสืบพันธุ์ได้อย่างอิสระ โดยไม่ต้องมีเครื่องสร้างดาวเคราะห์"
 grand_archive.1105.desc_no_homicidal: "\nถ้าสายพันธุ์ที่แยกไม่ได้นี้ ได้รับอนุญาตให้แพร่กระจายโดยไม่ควบคุม มันสามารถทําลายสมดุลของ ระบบนิเวศของกาแล็กซี่ทั้งหมด จากความก้าวร้าวที่เพิ่มขึ้น เราเชื่อว่าสัตว์เหล่านี้กําลังเตรียมพร้อม สําหรับการโจมตี[frenzied_voidworms_target.GetName]."
 grand_archive.1105.desc_2: "\nเราต้องเตรียมการป้องกันของเรา"
 grand_archive.1105.a: "แจ้งเตือนสีแดง!"

 situation_frenzied_voidworms: "หนอน ผีเสื้อ ริดสีดวง"
 situation_frenzied_voidworms_type: "$situation_frenzied_voidworms$"
 situation_frenzied_voidworms_desc: "เราค้นพบรังใหญ่ ของหนอนไวรัสกลายพันธุ์อย่างชัดเจน พวกเขามีชีวิตอยู่ในสภาวะที่ก้าวร้าวมากขึ้น และเห็นได้ชัดว่าพวกเขามีความสามารถที่จะทําซ้ํา ในลักษณะที่ไม่เป็นพาราไดซ์\n\nการปรากฏตัวของเราดูเหมือนจะกระตุ้นรังของพวกเขา เราต้องดําเนินการอย่างระมัดระวัง\n\n[GetVoidwormsHostility]"
 situation_frenzied_voidworms_monthly_change_tooltip: "$situation_monthly_change_tooltip_approaches_dependent$"
 finisher_effects_frenzied_voidworms: "หนอนไวรอยด์ที่ก้าวร้าว อาจโจมตีเมืองหลวงของเรา"
 approach_frenzied_voidworms_do_nothing: "ไม่ต้องทําอะไรเลย"
 approach_frenzied_voidworms_do_nothing_tt: "เราจะไม่ทําอะไรเป็นพิเศษที่นี่"
 approach_frenzied_voidworms_hide_presence: "ซ่อนการปรากฏตัวของเรา"
 approach_frenzied_voidworms_hide_presence_tt: "กิจกรรม การ ก่อ สร้าง ทุก อย่าง ใน ระบบ ของ เรา ที่ ใกล้ บ้าน ของ พวก เขา จะ หยุด พัก."
 approach_frenzied_voidworms_stir_nests: "กวนรัง"
 approach_frenzied_voidworms_stir_nests_tt: "การ ปลุก เร้า ให้ เกิด ความ เป็น ปฏิปักษ์ ต่อ เรา."
 approach_frenzied_voidworms_feed_nests: "ให้ อาหาร รัง"
 approach_frenzied_voidworms_feed_nests_tt: "ถ้าเราลดความก้าวร้าวของพวกเขาได้ ก็เป็นไปได้ที่เราจะได้รับความไว้วางใจจากพวกเขา"

 # Strings for GetVoidwormsHostility trigger loc script
 voidworms_hostility_hostile: "หนอน หมึก ที่ มี เชื้อ§Pก้าวร้าวมาก§!."
 voidworms_hostility_neutral: "หนอน หมึก ที่ มี เชื้อ§Sก้าวร้าว§!."
 voidworms_hostility_pacified: "หนอน หมึก ที่ มี เชื้อ§Bใจเย็น§!."

 hide_presence_modifier: "$approach_frenzied_voidworms_hide_presence$"
 hide_presence_starbase_modifier: "$approach_frenzied_voidworms_hide_presence$"

 frenzied_voidworms_killed.desc.common: "รังที่ใหญ่ที่สุดของมนุษย์กลายพันธุ์แปลกถูกเก็บรักษาไว้ ภายใต้การควบคุมของเรา เราสามารถเลี้ยง สิ่งมีชีวิตพิเศษเหล่านี้ได้มากขึ้น โดยไม่เสี่ยงต่อการแพร่กระจาย"
 grand_archive.1165.name: "หนอน ผีเสื้อ ที่ ติด เชื้อ ถูก ทําลาย"
 grand_archive.1165.desc.common: "ด้วย ความ ไม่ เต็ม ใจ ที่ จะ รอ การ โจมตี ที่ ไม่ อาจ เลี่ยง ได้ ของ พวก เขา เรา เริ่ม การ รณรงค์ ทาง ทหาร อย่าง ประสบ ผล สําเร็จ เพื่อ ต่อ สู้ กับ หนอน ปีก แข็ง ที่ กลาย พันธุ์ ใน ระบบ บ้าน ของ มัน. ภัยคุกคามของสัตว์เหล่านี้จะไม่ปล้นมากขึ้น[frenzied_voidworms_target.GetName]และความปลอดภัยของโลกของเรา"
 grand_archive.1165.desc.default: "$grand_archive.1165.desc.common$และระบบนิเวศของกาแล็กซี่ได้รับการรักษาความปลอดภัย\n\n$frenzied_voidworms_killed.desc.common$"
 grand_archive.1165.desc.homicidal: "$grand_archive.1165.desc.common$ปลอดภัยแล้ว\n\n$frenzied_voidworms_killed.desc.common$"
 grand_archive.1165.a: "ชัยชนะ"

 grand_archive.1170.name: "หนอน ผีเสื้อ ที่ ติด เชื้อ"
 grand_archive.1170.desc.common: "หนอนอวกาศกลายพันธุ์ ถูกกําจัดไปแล้ว ภัยคุกคามของสัตว์เหล่านี้จะไม่ปล้นมากขึ้น[frenzied_voidworms_target.GetName]และความปลอดภัยของโลกของเรา"
 grand_archive.1170.desc.default: "$grand_archive.1170.desc.common$และระบบนิเวศของกาแล็กซี่ได้รับการรักษาความปลอดภัย\n\n$frenzied_voidworms_killed.desc.common$"
 grand_archive.1170.desc.homicidal: "$grand_archive.1170.desc.common$ปลอดภัยแล้ว\n\n$frenzied_voidworms_killed.desc.common$"
 grand_archive.1170.a: "$grand_archive.1165.a$"

 grand_archive.1180.name: "พบ หนอน น้ํา เหลือง"
 grand_archive.1180.desc: "หลัง จาก กําจัด หนอน หมึก ตัว หนึ่ง ที่ อยู่ ใกล้ รัง ของ มัน แล้ว เรา ก็ พบ ว่า สัตว์ เหล่า นี้ ได้ รับ การ กลาย พันธุ์ อย่าง ไม่ มี ใด เหมือน.\n\nดูเหมือนว่าพวกเขาสามารถสืบพันธุ์ในรูปแบบที่ไม่เป็นพาราไดซ์ และอยู่ในสภาวะที่ก้าวร้าวมากขึ้น ซึ่งจะอธิบายถึงความแข็งแกร่งที่ผิดปกติของพวกเขา\n\nโชคดีที่เราเก็บรังไว้เป็นถ้วยรางวัล ภายใต้การควบคุมของเรา เราสามารถเลี้ยง สิ่งมีชีวิตพิเศษเหล่านี้ได้มากขึ้น โดยไม่เสี่ยงต่อการแพร่กระจาย"
 grand_archive.1180.a: "ไม่คาดฝัน แต่ยินดีต้อนรับ"

 grand_archive.1185.name: "หนอน ผีเสื้อ ที่ ถูก ปล่อย ออก มา"
 grand_archive.1185.desc: "เราทราบมาว่าหนอนมนุษย์กลายพันธุ์ ที่คุกคามอาณานิคมของเรา ถูกกําจัดไปแล้ว\n\nไม่คาดคิด แต่ยินดีต้อนรับ เราสามารถรับความสบายใจได้ ด้วยความจริงที่ว่า สัตว์เหล่านี้ จะไม่ต่อต้านระบบของเราอีกต่อไป"
 grand_archive.1185.a: "กาแล็กซีปลอดภัยกว่า"

 grand_archive.1200.name: "หนอน ผีเสื้อ ที่ บิน ได้"
 grand_archive.1200.desc: "พยาธิน้ําเหลืองโจมตี[frenzied_voidworms_target.solar_system.GetName]!\n\nความรุนแรงของพวกเขาได้เพิ่มขึ้นเป็นสนามไข้และทิศทางปัจจุบันของฝูงหลักของพวกเขาเป็นตรงไป[frenzied_voidworms_target.GetName].\n\nเราไม่เชื่อว่าพวกเขาจะ ทิ้งผู้รอดชีวิต"
 grand_archive.1200.a: "เตรียมการป้องกันของเรา"

 grand_archive.1205.name: "ราคา ที่ แพง ที่ สุด ที่ จะ จ่าย"
 grand_archive.1205.desc_common: "ทั้ง ๆ ที่ เรา พยายาม อย่าง ดี ที่ สุด หนอน แมลง ปีก แข็ง ที่ กลาย พันธุ์ แล้ว ก็ มี อยู่ เต็ม ไป หมด[this.GetName]แรงระเบิดของสิ่งมีชีวิตรุนแรงมาก จนมันทําลายแกนหลักของดาวเคราะห์ จนแตกละเอียด ไม่มีผู้รอดชีวิต\n\nตั้ง แต่ นั้น มา พวก เขา ได้ กลับ ไป ยัง รัง ของ ตน และ ไม่ รู้สึก รําคาญ ที่ เรา อยู่ ด้วย. หากโชคดี พวกเขาจะยังคงอยู่ที่นั่น"
 grand_archive.1205.desc.default: "$grand_archive.1205.desc_common$\n\nเรา ไม่ มี ทาง เลือก ใน การ เผชิญ กับ โศกนาฏกรรม นี้ นอก จาก จะ ดําเนิน ชีวิต และ เรียน รู้ จาก ความ ผิด พลาด ของ เรา."
 grand_archive.1205.desc.gestalt: "$grand_archive.1205.desc_common$\n\nการสูญเสียรังหลักของเรา คือระเบิด[event_target:victim_country.GetName]แต่เรามีชีวิตอยู่ต่อไป"
 grand_archive.1205.a: "ตอนนี้เป็นเวลาที่จะสร้างใหม่"

 grand_archive.1210.name: "หนอน ผีเสื้อ ที่ ติด เชื้อ"
 grand_archive.1210.desc: "ตัวหนอนไวรัสกลายพันธุ์ ที่ถูกค้นพบใน[From.GetName]ถูกคัดออก การทําลายล้าง[avenged_homeworld.GetName]ได้รับการล้างแค้น\n\nรังที่ใหญ่ที่สุดของมนุษย์กลายพันธุ์แปลกถูกเก็บรักษาไว้ ภายใต้การควบคุมของเรา เราสามารถเลี้ยง สิ่งมีชีวิตพิเศษเหล่านี้ได้มากขึ้น โดยไม่เสี่ยงต่อการแพร่กระจาย\n\nโดย วิธี นี้ มรดก ของ โลก ที่ สูญ หาย ของ เรา จะ คง อยู่ ต่อ ไป."
 grand_archive.1210.a: "$grand_archive.1165.a$"

 grand_archive.1220.name: "หนอน น้ํา แข็ง"
 grand_archive.1220.desc.common: "หลัง จาก ส่ง แร่ ธาตุ จํานวน มาก มาย ไป ยัง รัง ของ มัน โดย ตรง เรา ก็ สามารถ พัฒนา ความ สัมพันธ์ กับ หนอน ไวรัส ที่ กลาย พันธุ์ แล้ว ได้[frenzied_home_system.GetName]ภัยคุกคามของสัตว์เหล่านี้จะไม่ปล้นมากขึ้น[frenzied_voidworms_target.GetName]ความปลอดภัยของโลกของเรา"
 grand_archive.1220.desc.common_2: "ผู้ดูแลสัตว์ที่มีประสบการณ์มากที่สุดของเรา ได้ทํางานจัดการสัตว์ และเราอยู่ในจุดที่พวกเขา ดูเต็มใจที่จะร่วมมือกัน\n\nเราได้นํารังที่ใหญ่ที่สุดรังหนึ่ง ด้วย เหตุ นี้ เรา จึง สามารถ ปลูก หนอน ปีก แข็ง ที่ กลาย พันธุ์ แล้ว ได้ มาก ขึ้น ซึ่ง มิ ฉะนั้น แล้ว ก็ จะ ถูก ทิ้ง ไว้ ให้ ป่า."
 grand_archive.1220.desc.default: "$grand_archive.1220.desc.common$และระบบนิเวศของกาแล็กซี่ได้รับการรักษาความปลอดภัย\n\n$grand_archive.1220.desc.common_2$"
 grand_archive.1220.desc.homicidal: "$grand_archive.1220.desc.common$ปลอดภัยแล้ว\n\n$grand_archive.1220.desc.common_2$"
 grand_archive.1220.a: "ยินดีต้อนรับกองเรือ"
 grand_archive.1220.tt: "ทุกกองยานหนอนขาว ถูกเพิ่มเข้าไปในการควบคุมของจักรวรรดิ"

 grand_archive.7010.name: "การ เจริญ เติบโต"
 grand_archive.7010.desc.common: "ความ สามารถ ของ เรา ใน เรื่อง สิ่ง มี ชีวิต บน ดาว เคราะห์ ได้ นํา ไป สู่ การ พัฒนา สิ่ง ที่ เรา เรียก ว่า§Yหมึก§!."
 grand_archive.7010.desc: "$grand_archive.7010.desc.common$\n\nอาคารฐานดาวเหล่านี้ต้องถูกสร้างขึ้นภายในระบบท้องถิ่น ของแต่ละชนิดของอวกาศฟานา เมื่อ ได้ รับ การ ก่อ ตั้ง ขึ้น แล้ว มัน จะ ดึงดูด ฝูง สัตว์ เป็น ระยะ ๆ ให้ มา ยัง ฐาน ของ ดาว.\n\nเรา ควร ระมัดระวัง เพราะ สิ่ง มี ชีวิต บาง ชนิด อาจ ก้าวร้าว."
 grand_archive.7010.desc.primal_calling: "$grand_archive.7010.desc.common$\n\nอุปกรณ์ เหล่า นี้ ถูก ออก แบบ เพื่อ เรียก สัตว์ ต่าง ๆ ใน อวกาศ และ ดึงดูด สิ่ง มี ชีวิต ที่ อาศัย อยู่ ใน ที่ ว่าง. เราไม่แน่ใจว่าเราจะดึงดูดอะไร แต่ความถี่ในปัจจุบันที่เราออกอากาศ กําลังกลับมาเป็นปกติ\n\nมีบางอย่างมาหาเรา"

 grand_archive.7020.name: "ปลาวาฬ"
 grand_archive.7020.desc: "เดอะ§Yหมึก§!เราได้พัฒนาก่อนหน้านี้ ดึงดูดกลุ่มของปลาวาฬอวกาศพื้นเมืองกับระบบ§Yยักษ์ ใหญ่ น้ํามัน§!akin to[This.Capital.System.GetName].\n\nดูเหมือนว่าอุปกรณ์ของเราจะต้องสร้างขึ้น ในสภาพแวดล้อมเหล่านั้นที่จะทํางานอย่างถูกต้อง หาก เรา พบ สัตว์ ป่า ชนิด อื่น ๆ เรา น่า จะ สามารถ สร้าง เวียด น้ํา ใกล้ ถิ่น อาศัย ตาม ธรรมชาติ ของ มัน ด้วย."

 ### Treasure Hunters
 origin_treasure_hunters: "นัก ล่า สมบัติ"
 origin_treasure_hunters_desc: "ใน การ เพาะ ปลูก ด้วย ความ กระหาย การ ผจญ ภัย อารยธรรม นี้ พร้อม จะ ออก เดิน ทาง ที่ ยิ่ง ใหญ่ และ ท้าทาย ที่ สุด. อาวุธเท่านั้นที่มีแผนที่ลึกลับ ตอนนี้พวกเขาวิ่งข้ามดาว เพื่อรักษาความปลอดภัยสมบัติตํานานโจรสลัด"
 origin_tooltip_treasure_hunters_effects: "- เริ่มด้วยส่วนที่ไม่ได้ทํางาน['r_celestial_chart_0_desc', $celestial_chart$]\n- ผู้นําที่ถูกเกณฑ์ทุกคนมีโบนัส['concept_adventurous_spirit_trait']คุณสมบัติ$NEW_LINE$- เผด็จการ:$TABBED_NEW_LINE$- ['leader_trait:leader_trait_buccaneer']$TABBED_NEW_LINE$- ['leader_trait:leader_trait_trailblazer']$TABBED_NEW_LINE$- ['leader_trait:leader_trait_treasure_hoarder']"
 START_SCREEN_TREASURE_HUNTERS: "อารยธรรมของเราถูกกําหนดโดยความกระหายในการผจญภัย\n\nการค้นพบสมบัติที่สาบสูญไปยาวนาน การสํารวจซากปรักหักพังโบราณ และวัตถุที่ไม่ต้องขุดค้นจากช่วงเวลาต่าง ๆ ของเรา เหตุการณ์ที่ดังกล่าวประกอบด้วยเรื่องราวที่โด่งดังที่สุดของเรา\n\nดังนั้นมันเป็นเรื่องบังเอิญหรือโชคชะตา เมื่อครั้งแรกของเราฟอร์เนในอวกาศ แคปซูลลึกลับของจุลภาคไม่ทราบ ถูกค้นพบโคจรรอบโลกของเรา ภายในเป็นชาร์ตการเข้ารหัสดาว\n\nหลังจากทํางานหนักมาหลายปี ตอนนี้เรามีเทคโนโลยี ที่จะถอดรหัสแผนที่นี้ และกําหนดหลักสูตร ขณะ ที่ เรา แล่น เรือ ออก ไป ยัง พรม แดน กาแล็กซี่ เรา ร่วม ใจ กัน ใน ความ ตั้งใจ แน่ว แน่ ที่ จะ เริ่ม การ เดิน ทาง ที่ ใหญ่ ที่ สุด และ ยาก ที่ สุด เท่า ที่ เรา เคย ประสบ มา."

 d_treasure_planet: "ทรัพย์ อัน ล้ํา ค่า"
 d_treasure_planet_desc: "ห้อง เก็บ ของ ที่ ปลอด ภัย ซึ่ง สามารถ จัด ระเบียบ, นํา กลับ คืน, และ เก็บ รักษา ไว้ ได้."
 concept_treasure_vault: "$d_treasure_planet$"
 concept_treasure_vault_desc: "$d_treasure_planet_desc$"

 job_treasure_gatherer: "ตัวรักษาสมบัติ"
 job_treasure_gatherer_plural: "ตัวรักษาสมบัติ"
 job_treasure_gatherer_desc: "โดยถูกฝึกให้ประมาณสินค้าที่หายากและมีคุณค่ามากมาย พวกมันสามารถแยกเอามูลค่าสูงสุดของสมบัติ ที่พบในกาแล็กซี่ได้"
