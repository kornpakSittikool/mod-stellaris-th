 situation_voidworm_plague_desc: "โรคระบาด$NAME_Voidworms$อยู่ที่เรา\n\nสัตว์ เหล่า นี้ จะ ไม่ เหลือ ดาว เคราะห์ ที่ เป็น แหล่ง ผสม พันธุ์ อีก ต่อ ไป. เราต้องพยายามกําจัดพวกมัน ไม่งั้นอาณานิคมของเราจะตกอยู่ในอันตราย\n\n§Yแต่ ละ ตัว หนอน ไวรัส ทําลาย ความ ก้าว หน้า เร็ว.§!"
