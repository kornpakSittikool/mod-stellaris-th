 START_SCREEN_PRIMAL_CALLING_NOMADS: "เราดําเนินโลกของเรากับเรา ภาย ใน ขุม ทรัพย์ อัน ยิ่ง ใหญ่ แห่ง นาวา ของ เรา สัตว์ ที่ หล่อ หลอม วิวัฒนาการ ของ เรา ยืนยง; เพื่อน, ครู, ข้อ เตือน ใจ ที่ มี ชีวิต เกี่ยว กับ สิ่ง ที่ เรา เป็น อยู่ และ ที่ ที่ เรา มา. เรา ไม่ ได้ เอา ไป จาก พวก เขา มาก เกิน กว่า ที่ พวก เขา จะ ให้ ได้ และ เครื่อง บูชา ของ พวก เขา ก็ เป็น ที่ เคารพ นับถือ.\n\nใน บริเวณ ที่ ไม่ มี การ ลาดยาง ของ อวกาศ เรา อาจ พบ สัตว์ ป่า ชนิด อื่น ๆ ได้ เป็น อย่าง ดี. ถ้า เป็น เช่น นั้น เรา จะ ปฏิบัติ ต่อ พวก เขา ด้วย ความ นับถือ เช่น เดียว กับ สัตว์ ที่ มี ภาชนะ ของ เรา. พวกเขาจะเรียนรู้สถานที่ของพวกเขาในขณะที่เราเรียนรู้ของเรา เพื่อที่เราจะเติบโตแข็งแรง\n\nเรียกดาว, ความปรารถนาเดิมเผาไหม้ภายในเรา อะไรก็ตามที่อยู่ข้างนอกนั่น เราจะพบกับมันด้วยความมั่นใจ"
 START_SCREEN_TREASURE_HUNTERS_NOMADS: "อารยธรรมของเราถูกกําหนดโดยความกระหายในการผจญภัย\n\nการค้นพบสมบัติที่สาบสูญไปยาวนาน การสํารวจซากปรักหักพังโบราณ และวัตถุที่ไม่ต้องขุดค้นจากช่วงเวลาต่าง ๆ ของเรา เหตุการณ์ที่ดังกล่าวประกอบด้วยเรื่องราวที่โด่งดังที่สุดของเรา\n\nดังนั้นมันเป็นเรื่องบังเอิญหรือโชคชะตา เมื่อเดินเตร็ดเตร่ของเรา นําเราไปสู่การเรียกร้องไปสู่การผจญภัย? การสํารวจระบบที่ไม่คุ้นเคย เราค้นพบแคปซูลลึกลับ ของการรักษาความปลอดภัยที่ไม่รู้จัก ภายในเป็นชาร์ตการเข้ารหัสดาว\n\nหลังจากศึกษามาหลายปี เราได้ถอดรหัสแผนที่นี้ และกําหนดเส้นทางสําหรับคนที่ยังไม่ได้สํารวจ ขณะ ที่ เรา แล่น เรือ ออก ไป ยัง พรม แดน กาแล็กซี่ เรา ร่วม ใจ กัน ใน ความ ตั้งใจ แน่ว แน่ ที่ จะ เริ่ม การ เดิน ทาง ที่ ใหญ่ ที่ สุด และ ยาก ที่ สุด เท่า ที่ เรา เคย ประสบ มา."
