 leader_trait_void_tracker: "แทร็กเกอร์ของ ห้วงอวกาศ"
 leader_trait_void_tracker_desc: "พรสวรรค์ของผู้นําคนนี้ ในการจับอวกาศฟานาน่าอย่างมีประสิทธิภาพ และปลอดภัยนั้นไม่มีใครเทียบได้"
