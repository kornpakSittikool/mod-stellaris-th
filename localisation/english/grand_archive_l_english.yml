 grand_archive.4121.desc.common: "ได้รับข้อมูลที่คุณได้สร้าง§Y$grand_archive$§!สามารถรองรับการเข้าร่วม ในระดับขนาดใหญ่ นี่คือความคิดริเริ่มที่น่าชื่นชม ในการแบ่งปันประวัติศาสตร์ของกาแล็กซี่ของเรา กับทุกคนที่แสวงหาความรู้ดังกล่าว เรา มี เป้า หมาย ร่วม กัน ใน เรื่อง นี้.\n\nเรา สนใจ ที่ จะ ช่วย คุณ ให้ ดําเนิน ตาม ความ พยายาม นี้."
 grand_archive.4121.desc.default: "เรา$grand_archive.4121.desc.common$ขยายวงกว้างต่อไป§Yคลังสื่อ§!และพวกเราจะสนับสนุนทุกอย่างเท่าที่ทําได้"
 grand_archive.4121.desc.dead: "ส่วนที่เหลือของลําดับของเรา$grand_archive.4121.desc.common$ถึงแม้ว่าคําสั่งของเรา จะถูกทําลายไปเมื่อเร็วๆนี้ เราจะใช้ทรัพย์สินที่เหลือของเรา§Yคลังสื่อ§!."

