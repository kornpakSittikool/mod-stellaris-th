 grand_archive.7210.name: "กับดักแรงโน้มถ่วง"
 grand_archive.7210.desc.common: "หลังจากการค้นพบ §Y$tech_gravity_wells$§! เมื่อไม่นานมานี้ ยานวิทยาศาสตร์ของ [root.GetAdjective] ก็สามารถปล่อย $gravity_snare_plural$ ได้แล้ว"
 grand_archive.7210.desc.vivarium: "กระสุนแบบไม่สังหารเหล่านี้สามารถจับและขนย้ายขอบเขตพื้นที่ไปยัง §Yดึงข้อมูล§! ของเราได้อย่างปลอดภัย ซึ่งที่นั่นพวกมันจะยังคงสืบพันธุ์และให้สิ่งมีชีวิตตัวอย่างใหม่ในชนิดของตนต่อไป\n\nการคัดทิ้งและชำแหละสิ่งมีชีวิตเหล่านี้จะทำให้เราเก็บเกี่ยว §Y$genetic_material$§! สำหรับการโคลน รวมถึงทรัพยากรอื่น ๆ ได้"
 grand_archive.7210.desc.no_vivarium: "กระสุนแบบไม่สังหารเหล่านี้สามารถจับและขนย้ายขอบเขตพื้นที่เพื่อการศึกษาและชำแหละได้อย่างปลอดภัย ทำให้เราเก็บเกี่ยว §Y$genetic_material$§! และทรัพยากรต่าง ๆ ได้\n\nหากเราต้องการเลี้ยงพวกมันให้มีชีวิตไว้เพื่อเพาะพันธุ์ต่อ เราจะต้องสร้าง §Yดึงข้อมูล§! ขึ้นก่อน ซึ่งเราทำได้โดยสร้าง §Y$grand_archive$§! หรือสร้าง §Y[GetHatcheryPlural]§! ที่ฐานดาวของเรา"

 grand_archive.7220.name: "อสูรเบื้องต้น"
 grand_archive.7220.desc: "§Y$gravity_snare_plural$§! ของเราไม่สามารถติดตามและกักกัน §Y$NAME_Prethoryn_Scourge$§! ได้อย่างเหมาะสม จากรูปแบบการเคลื่อนไหวของพวกมัน เราสงสัยว่าสิ่งมีชีวิตเหล่านี้ถูกควบคุมโดยจิตสำนึกระดับสูงบางรูปแบบ และไม่ได้เป็นปัจเจกอย่างแท้จริง\n\nการพยายามกักสิ่งมีชีวิตชนิดนี้ไว้ในวิเวเรียมจะเป็นอันตรายต่อสิ่งมีชีวิตตัวอย่างอื่น ๆ ของเรา และอาจรวมถึง [this.GetName] ทั้งหมดด้วย\n\nเราได้ระงับปฏิบัติการจับสิ่งมีชีวิตเหล่านี้อย่างไม่มีกำหนด"
 grand_archive.7220.a: "เป็นมาตรการที่รอบคอบ"

