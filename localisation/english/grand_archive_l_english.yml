 galactic_focus_crisis_voidworm_plague_desc: "ภัยพิบัติของพยาธิขาว เป็นภัยคุกคามต่อทั้งกาแล็กซี่ เราต้องรวมกันและเอาชนะภัยคุกคามนี้"
 gal_com_crisis_voidworm_pop_victims: "พยาธิไวรอยด์สร้างความเสียหายอย่างมาก ต่อประชากรภายในอาณาเขตของมัน"

