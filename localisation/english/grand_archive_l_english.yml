 grand_archive.4135.name: "เจ้าตัวเล็กของเรา"
 grand_archive.4135.desc: "ในขณะที่เรายังคงพยายามที่จะทําความสะอาดโลกนี้ของสกปรกเอโนบอร์ดของสะสมของเรา[GetCollectionRewardCategory]ถ้วยรางวัลเติบโต\n\nขอแสดงเหล่านี้ทําหน้าที่เป็นซาก ของกาแล็กซี่ที่ปนเปื้อนนี้ และเพิ่มแรงบันดาลใจให้เรา ในภารกิจสาบานของเรา"
