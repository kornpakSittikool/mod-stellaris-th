 tech_thrusters_bio_integration: "ตัวผลักดันชีวภาพ"
 tech_thrusters_bio_integration_desc: "แรง ผลัก ดัน ใน อวกาศ สามารถ นํา ไป เชื่อม ต่อ กับ สิ่ง มี ชีวิต ที่ อยู่ ใน อวกาศ ด้วย การ พิจารณา อย่าง เหมาะ สม เกี่ยว กับ แหล่ง พลังงาน และ เชื่อม ต่อ กับ ศูนย์ มอเตอร์ ประสาท."
 tech_thrusters_bio_integration_effect: "§Hคุณสมบัติของปลดล็อค:§!เครื่อง ส่ง สัญญาณ ปรับ ปรุง สําหรับ การ บิน อวกาศ"
 tech_hyper_drive_bio_integration: "ระบบขับเคลื่อนไฮเปอร์ไดรฟ์ชีวภาพ"
 tech_hyper_drive_bio_integration_desc: "การท่องเที่ยวข้ามไฮเปอร์เลน อาจเป็นอันตรายต่อชีวิตของอวกาศ แต่เราสามารถที่จะเพิ่มความสามารถของพวกเขา"
 tech_hyper_drive_bio_integration_effect: "§Hคุณสมบัติของปลดล็อค:§!ไฮเปอร์ไดรฟ์อัพเกรดสําหรับขอบเขตพื้นที่"
 tech_sensors_bio_integration: "เซ็นเซอร์ชีวภาพ"
 tech_sensors_bio_integration_desc: "อวัยวะรับรู้ที่แตกต่างกัน ของสิ่งมีชีวิตจากอวกาศ สามารถเพิ่มความสามารถ โดยเทคโนโลยีพัฒนาของเรา"
 tech_sensors_bio_integration_effect: "§Hคุณสมบัติของปลดล็อค:§!ตัวตรวจจับอัพเกรดสําหรับขอบเขตพื้นที่"
 tech_combat_computers_bio_integration: "คอมพิวเตอร์ต่อสู้ชีวภาพ"
 tech_combat_computers_bio_integration_desc: "เราสามารถพัฒนา ระบบประสาทพิเศษ เพื่อส่งอิทธิพลต่อพฤติกรรมของอวกาศ โฟนานา ที่เกี่ยวข้องกับการต่อสู้ของกองทัพเรือในวงกว้าง"
 tech_combat_computers_bio_integration_effect: "§Hคุณสมบัติของปลดล็อค:§!คอมพิวเตอร์ สู้ รบ ปรับ ปรุง ให้ ดี ขึ้น"

