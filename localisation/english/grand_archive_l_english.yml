# Events
 grand_archive.8000.name: "แคปซูลโบราณ"
 grand_archive.8000.desc: "เราได้ค้นพบแล้ว เกี่ยวกับแคปซูลโบราณ[this.GetHomeWorldName]ขอบคุณสําหรับความพยายามอย่างไม่สิ้นสุดของเรา[this.GetScientistPlural]ตอนนี้เราอยู่ในตําแหน่งที่จะถอดรหัส ชั้นสุดท้ายของความปลอดภัยดิจิตอล และถอดรหัสชาร์ต ที่ทําให้เราสนใจมานาน"
 grand_archive.8000.a: "มันบรรจุอะไร?"

 TREASURE_HUNTERS_ANCIENT_CAPSULE_PROJECT: "การ วิเคราะห์ ของ แค็ต โซล โบราณ"
 TREASURE_HUNTERS_ANCIENT_CAPSULE_PROJECT_DESC: "การ วิเคราะห์ แผนภูมิ ใน แคปซูล ออร์บิทัล ใน ตอน แรก เผย ให้ เห็น ตําแหน่ง ของ เทห์ฟากฟ้า หลาย ดวง ที่ ไม่ มี อยู่ ใน ระบบ บ้าน ของ เรา. มันจะใช้เวลาในการแยก พิกัดที่แน่นอน"

 grand_archive.8005.name: "แคปซูลโบราณ"
 grand_archive.8005.desc: "ชาร์ตเสร็จแค่บางส่วน!\n\nข้อมูลภายในแคปซูล จะแยกแต่ละช่องว่าง ที่โดดเด่นเช่นชิ้นส่วนที่หายไป ของปริศนา อย่างไรก็ตาม มันได้เปิดเผยพิกัด ของระบบดาวที่ไม่เคยมีใครรู้จักมาก่อน แต่ไม่ได้ระบุรายละเอียด\n\nนอก จาก นั้น แผนภูมิ ยัง เน้น จุด ที่ ผิด พลาด ซึ่ง มี อยู่ หลาย จุด เพื่อ ช่วย ให้ การ เดิน ทาง ไป ยัง จุด หมาย ปลาย ทาง ได้ ง่าย ขึ้น."
 grand_archive.8005.a.lom: "ทุกคนบนดาดฟ้า!"

 grand_archive.8015.name: "แผนภูมิ สวรรค์"
 grand_archive.8015.desc.common: "เรือของเรายืนอยู่โดย กระตือรือร้นที่จะออกใน อารยธรรมของเรา การผจญภัยที่ดีต่อไป"
 grand_archive.8015.desc.default: "จํานวนประชากรของ[this.GetHomeWorldName]เกี่ยวข้องกับชาร์ตดาวที่เพิ่งถอดรหัส เรียกกันว่า \"§Y$celestial_chart$§!\"จนถึงขณะนี้มันให้คําถามที่มากกว่าคําตอบ มันมาจากที่ไหน? ใคร สร้าง และ เพื่อ วัตถุ ประสงค์ อะไร? และอาจจะสําคัญที่สุด มันจะนําเราไปสู่กับดักไหม\n\n$grand_archive.8015.desc.common$"
 grand_archive.8015.desc.gestalt: "การค้นพบชาร์ตภายในแคปซูล ได้เป็นที่สนใจของสังคมของเรา บัดนี้ ที่ พระ คัมภีร์ ได้ รับ การ เปิด เผย ให้ เป็น ชิ้น หนึ่ง ท่ามกลาง คน เป็น อัน มาก เรา จึง สงสัย ว่า พระ วิญญาณ จะ นํา เรา ไป ที่ ไหน และ จะ พบ อะไร ที่ นั่น เราตั้งใจจะทําให้เรื่องนี้เสร็จสมบูรณ์§Y$celestial_chart$§!\".\n\n$grand_archive.8015.desc.common$"
 grand_archive.8015.a.default: "ไปผจญภัย!"
 grand_archive.8015.a.lom: "เครื่องค้ํายันท่าจอดเรือ!"

 grand_archive.8020.name: "การ คาด การณ์ ที่ ไม่ คาด คิด"
 grand_archive.8020.desc: "เราได้พบกับกองเรือติดอาวุธหนัก บินภายใต้ธงที่ไม่รู้จัก เรือ ของ พวก เขา อยู่ ใน รูป แบบ ที่ เป็น ระเบียบ แต่ ไม่ มี รูป แบบ เหมือน กัน. หลาย คน ทํา งาน หนัก เกิน ไป กับ เครื่อง ยิง ธนู ที่ ติด อยู่ กับ สาย เคเบิล ที่ หนา แน่น ซึ่ง มี ห่วง เหล็ก คาร์บอน และ ฉมวก. นอก จาก นี้ ยัง มี กอง รถ บรรทุก ที่ ซ่อน อยู่ ใน ใจ กลาง กอง เรือ. เรา คาด หมาย ได้ ว่า เรือ เหล่า นี้ จะ ถูก ควบคุม โดย กลุ่ม โจร สลัด หรือ ทหารรับจ้าง.\n\nเราได้รับสัญญาณจากยานนําของพวกเขา"
 grand_archive.8020.a.lom: "แล้ว..."

 grand_archive.8025.name: "$NAME_CaptainHoo$ของ$NAME_BlackNeedle$"
 grand_archive.8025.desc: "§Hความหยิ่งยโสและความจองหอง กัปตันนอกกฎหมายคนนี้ เสแสร้งไม่น่าสนใจ พระองค์ ทอด พระ เนตร ลง มา ทาง พระ โอษฐ์ ของ พระองค์ เมื่อ พูด และ ไม่ ยอม ให้ เรา จ้อง ดู ราว กับ ว่า เรา ไม่ คู่ ควร กับ การ เอา ใจ ใส่ อย่าง เต็ม ที่ ของ พระองค์. เขาแก๊สกับขนนกของเขาในลักษณะที่ไม่ได้ตั้งใจตลก§!\n\nคุณได้ข้ามเส้นทางของ§Y$NAME_BlackNeedle$§!ความผิดพลาดในส่วนของคุณ!\n\nเราได้ยินข่าวลือว่า สังคมเล็ก ๆ น้อย ๆ ของคุณ จะสํารวจระบบนี้ คุณได้สะดุดในชาร์ต ที่เห็นได้ชัดของเรา ส่งมันมา กลัวว่าทุกอย่างจะกลายเป็นความรุนแรง"
 grand_archive.8025.a: "คุณเป็นใคร?"
 grand_archive.8025.a.reply: "ฉันต่างหาก! ข้าชื่อ กิมาร์ฮู เซลเมนเดอเรียน แต่เจ้าอาจจะเรียกข้าว่า§Y$NAME_CaptainHoo$§!กัปตันวงซิลเวอร์วิง และร้อยโทผู้มีชื่อเสียง§Y$NAME_BlackNeedle$§!โจรสลัด เรา มี ขน ของ เรา ใน ทุก วิธี ที่ ผิด กฎหมาย มา เป็น เวลา หลาย พัน ปี แล้ว และ ผม เป็น เพียง เส้น ด้าย เส้น เดียว ใน ผ้า ผืน อัน งดงาม ของ มรดก ของ เรา.\n\nคุณ น่า จะ จํา ชื่อ ผม ได้ เพราะ ผม คาด หมาย ว่า จะ ได้ รับ รางวัล มาก มาย หลัง จาก เสนอ แผนภูมิ นี้ แก่ ผู้ นํา ที่ ไม่ มี ใคร เหมือน ของ เรา."
 grand_archive.8025.b: "คุณรู้อะไรเกี่ยวกับชาร์ตบ้าง"
 grand_archive.8025.b.reply: "โบรกเกอร์ข้อมูลที่มีพรสวรรค์ และแพงมาก บอกเราว่า คุณบังเอิญเจอแคปซูลแปลกๆ แคปซูลที่ควรจะบรรจุ ทิศทางไปยังระบบที่ซ่อนอยู่\n\nเราเองก็อ้างเอาชิ้นส่วนของชาร์ตมาด้วย แต่มันไร้ประโยชน์ ถ้าไม่มีข้อมูลจากแคปซูล ฉันไม่สามารถเข้าใจได้ว่าทําไม§Y$NAME_CaptainNess$§!จะมอบกุญแจสู่มรดกของเธอ แต่มันตกเป็นของเราที่จะปลดคุณออกจากมัน"
 grand_archive.8025.c: "ทําไมคุณถึงอยากได้ชาร์ตนี้นัก"
 grand_archive.8025.c.reply: "เธอนี่ไร้เดียงสาจริงๆ[this.GetCaptainHooSnarkyInsult]ฉันคิดว่าฉันต้องสะกดให้คุณ\n\nแผนภาพทําหน้าที่เป็นรูปแบบของการนําทาง ไปสู่จุดหมายปลายทางที่แน่นอน เราอยากจะเยือนจุดหมายปลายทาง และยึดสมบัติที่สูญหายไปนานที่สุด§Y$NAME_CaptainNess$§!."
 grand_archive.8025.d: "ใคร$NAME_CaptainNess$?"
 grand_archive.8025.d.reply: "เราคิดว่าคุณจะได้รับข้อมูลดีกว่านี้ เธอเป็นคนสร้างชาร์ตนี้ขึ้นมา บางทีนางอาจจะพบว่าความโง่เขลาของสายพันธุ์ของคุณที่จะคืนสู่สภาพเดิม ความหวาดกลัวอย่างโง่เขลาที่เธอเป็น\n\nใน ที่ สุด ก็ ไม่ ใช่ เรื่อง ที่ คุณ เป็น ห่วง. ส่งข้อมูลมา แล้วเราจะจัดการต่อเอง"
 grand_archive.8025.e: "เราจะเก็บชาร์ตไว้"
 grand_archive.8025.e.reply: "ฉันก็คิดเหมือนกัน เตรียมตัวพบกับโชคชะตา\n\nยืนและส่งมอบ!"
 grand_archive.8025.f.lom: "มาและเอามันคุณดูดสนิม!"

 CAPTAIN_HOO_INSULT_MACHINE: "ผมคิดว่าหน่วยสืบราชการลับของเครื่องจักร จะฉลาด แต่เห็นได้ชัดว่ามันไม่ใช่"
 CAPTAIN_HOO_INSULT_HIVE: "หลายความคิดคาดว่าจะทําให้การทํางานเบา แต่ความฉลาดของคุณรวม ได้มากน้อยที่มีค่า"
 CAPTAIN_HOO_INSULT_HUM: "คุณกระดูกหนาเรียบหนังได้พัฒนาการเดินทางระหว่างดวงดาว แต่สามัญสํานึกยังคงหลบหนีคุณ"
 CAPTAIN_HOO_INSULT_MAM: "สัตว์ร้ายอย่างพวกเจ้า ขาดสติปัญญาและการปรับปรุงผู้นําที่ยิ่งใหญ่ของเรา"
 CAPTAIN_HOO_INSULT_REP: "ถึงแม้ว่าฉันจะไม่คาดหวังว่าพวกเธอ จะเข้าใจหลักการพื้นฐานแบบนี้"
 CAPTAIN_HOO_INSULT_AVI: "บางที บรรพบุรุษของคุณ อาจเอาหนึ่งเห็บมากเกินไป"
 CAPTAIN_HOO_INSULT_ART: "ฉันไม่สงสัยเลย ว่าความสามารถในการคิด วิกฤตไม่ได้เจาะเข้าไปใน"
 CAPTAIN_HOO_INSULT_MOL: "มันเป็นความจริงที่ว่าเดอะชราวด์ไม่มีสมองที่สังเกต สายพันธุ์ของคุณเป็นหลักฐานของที่"
 CAPTAIN_HOO_INSULT_FUN: "คุณดูเหมือนจะขาดเห็ดนะ"
 CAPTAIN_HOO_INSULT_PLANT: "มันเริ่มที่จะชัดเจนมากขึ้นเรื่อยๆ ว่าทําไมพืชจึงไม่พัฒนาสติปัญญา ในส่วนใหญ่ของโลก"
 CAPTAIN_HOO_INSULT_LITHOID: "สายพันธุ์ของคุณจริงโง่เป็นหิน"
 CAPTAIN_HOO_INSULT_NECROID: "คุณจะต้องเป็นเปลือก ของสิ่งที่ครั้งหนึ่งเคยเป็นสายพันธุ์ที่ชาญฉลาด"
 CAPTAIN_HOO_INSULT_AQUATIC: "เห็นได้ชัดเลยว่าคุณเป็นปลาที่ลอยอยู่ในน้ํา"
 CAPTAIN_HOO_INSULT_TOX: "การ อยู่ อย่าง แออัด ใน ความ โสโครก อาจ ทํา ให้ จิตใจ คุณ มัว หมอง."
 CAPTAIN_HOO_INSULT_ROBOT: "บางทีโมดูลส่วนตัวของคุณ ใช้พลังงานในการประมวลผลส่วนใหญ่"
 CAPTAIN_HOO_INSULT_DEFAULT: "บางทีสายพันธ์ของคุณ อาจถูกท้าทายอย่างฉลาด"

 grand_archive.8045.name: "$grand_archive.8025.name$"
 grand_archive.8045.desc: "คุณได้ล้อเลียนฉันและ§Y$NAME_BlackNeedle$§!นี้จะไม่ยืนไม่ได้ทั้งหมด!\n\nความ เต็ม ใจ ของ คุณ ที่ จะ ร่วม มือ จะ ไม่ ถูก ลืม ใน ไม่ ช้า. เดอะ$NAME_BlackNeedle$จะมาที่คุณ กับทุกสิ่งที่เรามี อารยธรรมของเจ้าจะไม่รอดจากความโกรธของเรา\n\nเราจะไม่หยุดจนกว่าชาร์ตจะเป็นของเรา และตอนนี้ ฉันจะขอลาคุณวันดี!"
 grand_archive.8045.a.lom: "คราวหน้า พูดให้น้อยลง แล้วสู้อีก"

 TREASURE_HUNTERS_CHART_PIECE_2_PROJECT: "A ดาวเคราะห์ใน 8 ชิ้น"
 TREASURE_HUNTERS_CHART_PIECE_2_PROJECT_DESC: "เดอะ§H$celestial_chart$§!ทําให้โลกแตก เราตรวจพบอุโมงค์ผิดธรรมชาติ เจาะเข้าไปในแผ่นที่ใหญ่ที่สุด ของเปลือกโลก เราเชื่อว่าส่วนต่อไปของชาร์ต ถูกซ่อนอยู่ภายใน แต่การเข้าถึงมัน จะต้องขุดอย่างรอบคอบ\n\nเรือ ก่อ สร้าง จะ สามารถ สร้าง อุปกรณ์ ที่ จําเป็น เพื่อ สกัด ชิ้น ส่วน นั้น ออก."

 grand_archive.8055.name: "การ ขุด ค้น สําเร็จ"
 grand_archive.8055.desc: "มี การ สกัด แคปซูล จาก เศษ ซาก ดาว เคราะห์ ที่ ลอย อยู่ เคียง ข้าง แร่ ธาตุ ปริมาณ หนึ่ง ได้ สําเร็จ. เมื่อ เปิด ออก เรา ก็ พบ ชิ้น ส่วน ใหม่ ของ§Y$celestial_chart$§!และเลือกวัตถุทางวัฒนธรรมที่พิเศษ นอก จาก นั้น มี การ พบ ข้อ ความ ข้าง ใน ซึ่ง เขียน เป็น ภาษา ต่าง ๆ หลาย ภาษา เพื่อ อนุญาต ให้ แปล ได้ ง่าย ขึ้น.\n\n\"นี่คือทั้งหมดที่เหลืออยู่$NAME_Soropegma$โลกของแยทเทรอทความทึบแสงเป็นสปีชีส์พรี-FTL ที่ถูกทําให้สูญพันธุ์ไป เนื่องจากอุบัติเหตุที่น่าเศร้า โดยไม่ทราบถึงผลกระทบที่กําลังจะเกิดขึ้น เราบังเอิญกระตุ้นให้พลังงานทําลายล้าง ของโคลอสซัสที่ถูกขโมย โปรดรักษาและเคารพความทรงจําของพวกเขา\""

 TREASURE_HUNTERS_ANCIENT_CAPSULE_2_PROJECT: "ถอดรหัสชิ้นส่วนแผนภูมิ"
 TREASURE_HUNTERS_ANCIENT_CAPSULE_2_PROJECT_DESC: "หลังจากขุดเจาะแคปซูลจากซากของดาวเคราะห์แตก เราต้องถอดรหัสข้อมูลการนําทางภายใน กระบวนการนี้ต้องการ การตรวจสอบฐานข้อมูลแผนที่ของเรา และบันทึกการทําเครื่องหมาย เทห์ฟากฟ้ากับระบบที่รู้จักกัน"

 grand_archive.8060.name: "เดอะชราวด์"
 grand_archive.8060.desc: "หลังจากถอดรหัสได้หลายชั้น ข้อมูลใหม่ก็ถูกเพิ่มอย่างไม่เปิดเผย§Y$celestial_chart$§!เมื่อ ชิ้น ส่วน ถูก นํา มา รวม กัน แล้ว ก็ มี การ เปิด เผย ระบบ ใหม่ อีก ระบบ หนึ่ง. ก้าวต่อไปของการเดินทางของเรา อยู่ข้างหน้าเรา เราควรเข้าใกล้พื้นที่ ที่ไม่คุ้นเคยนี้"

 grand_archive.8075.name: "จดหมาย เหตุ ขนาด ใหญ่"
 grand_archive.8075.desc: "หลังการเข้าครอบครอง§Y[This.GetLastAcquiredSpecimenName]§!นักวิทยาศาสตร์ของเราเชื่อว่า มันสมควรได้รับ การวางบนการแสดงในที่สาธารณะในบริบทของ§Y$grand_archive$§!โครง สร้าง นี้ จะ เป็น ที่ เก็บ รวบ รวม สิ่ง ของ ที่ หา ยาก ซึ่ง จะ เก็บ เกี่ยว ผล ตอบ แทน ทาง วัฒนธรรม และ ทาง วิทยาศาสตร์ ที่ สําคัญ. การลงทุนในช่วงแรก ๆ จะเริ่มต้นการวิจัย ในเทคนิคและเทคโนโลยีที่จําเป็น เพื่อรักษาและแสดงตัวอย่างที่หลากหลายและละเอียดอ่อนของกาแลคซี\n\nนอก จาก นี้ มี การ ค้น พบ แบบ พิมพ์ เขียว ที่ อยู่ เคียง ข้าง กับ สิ่ง ประดิษฐ์ ของ ยัท เท อร์ ซึ่ง มี การ ออก แบบ ที่ ทัน สมัย สําหรับ การ แสดง ด้วย เทคโนโลยี การ ตรวจ สอบ แบบ ใหม่ ทาง บรรยากาศ. การพัฒนาแนวคิดนี้ต่อไป จะช่วยเพิ่มความสามารถการอนุรักษ์ของแฟ้มจัดเก็บโดยทั่วไป"
 grand_archive.8076.name: "ยีท เท อร์ ไรต์"
 grand_archive.8076.desc: "ร่องรอยสุดท้ายของ อารยธรรมของแยทเทรอท ที่หายไป สมควรได้รับนิทรรศการของตัวเอง\n\nยัง ดี ที่ มี การ ค้น พบ แบบ พิมพ์เขียว ที่ อยู่ เคียง ข้าง กับ สิ่ง ประดิษฐ์ ของ อิต เท อร์ ไรต์ ซึ่ง มี การ ออก แบบ อย่าง ดี เยี่ยม สําหรับ การ แสดง โดย ใช้ เทคโนโลยี การ ตรวจ สอบ แบบ ใหม่ ทาง บรรยากาศ. การ พัฒนา แนว คิด นี้ ให้ มาก ขึ้น จะ ช่วย เพิ่ม ความ สามารถ ใน การ เก็บ รักษา ของ คลัง หนังสือ โดย ทั่ว ไป."
 grand_archive.8076.a: "โอกาสที่ดี"

 TREASURE_HUNTERS_EXHIBITION_PROJECT: "การนําเสนอ"
 TREASURE_HUNTERS_EXHIBITION_PROJECT_DESC: "นอก จาก ตัว อย่าง ของ แยท เท อร์ เรา ได้ ค้น พบ แบบ ที่ ก้าว หน้า สําหรับ เครื่อง จัด แสดง ที่ ซับ ซ้อน ซึ่ง จะ ช่วย รักษา ไว้ ได้.\n\nการ ค้นคว้า เทคนิค ที่ ใช้ ใน พิมพ์เขียว นี้ คง จะ ช่วย ใน การ อนุรักษ์ และ นิทรรศการ ใน อนาคต."
 TREASURE_HUNTERS_EXHIBITION_PROJECT_TOOLTIP: "ใช้§Yเรือก่อสร้าง§!เพื่อสร้าง§Yแฟ้มจัดเก็บขนาดใหญ่§!รอบดาวเคราะห์ที่มี2.5K หรือมากกว่า£pop£ §Hป๊อป§!.\nต้องการ:§H£society_research£$tech_galactic_archivism$§!."

 grand_archive.8080.name: "การขยายภาพ"
 grand_archive.8080.desc: "หลังจากที่วิเคราะห์พิมพ์เขียวของแยทเทรอทอย่างละเอียดแล้ว เราได้สร้างหน่วยบรรจุพลังงานชั้นสูง ที่มีการตรวจจับระดับบรรยากาศแม่นยําลงมายังอะตอม การ ทํา เช่น นี้ จะ ทํา ให้ ผู้ ดู แล ตรวจ ดู สภาพ ภูมิ อากาศ ของ ตัว อย่าง อิต เท อร์ ที่ ละเอียด อ่อน ใน ระดับ ละเอียด และ ตรวจ พบ สัญญาณ เตือน ใด ๆ ของ ความ เปื่อย เน่า ที่ อาจ เกิด ขึ้น ได้. มันจะเป็นอย่างที่เคยเป็นตลอดไป\n\nเราสามารถใช้เทคนิคเหล่านี้ เพื่อปรับปรุงสภาพการจัดเก็บของทุกรายการในคอลเลกชันของเรา"

 TREASURE_HUNTERS_BUILD_GRAND_ARCHIVE: "สร้าง คลัง หนังสือ ขนาด ใหญ่"
 TREASURE_HUNTERS_BUILD_GRAND_ARCHIVE_DESC: "ตลอดการสํารวจจักรวาลของเรา เราได้รวบรวมวัตถุที่ โดดเด่นนับไม่ถ้วนและ แปลกประหลาดทางวัฒนธรรม ตัวอย่างเหล่านี้ จะสร้างแรงบันดาลใจให้ประชาชน และทําให้นิทรรศการของเรา แสดงครั้งแรกและรักษาสาขาความรู้ทั้งหมด\n\nสร้าง§H$grand_archive$§!จะเหมาะกับวัตถุประสงค์นี้"

 grand_archive.8090.name: "การเปิดแฟ้มจัดเก็บขนาดใหญ่"
 grand_archive.8090.desc: "การเปิด§Y$grand_archive$§!ใน[fromfrom.GetName]เป็นวันที่ยิ่งใหญ่สําหรับ[this.GetName]นิทรรศการสมบัติจากข้ามกาแล็กซี่นี้ เป็นแรงบันดาลใจในการสํารวจและเรียกร้องให้เราเรียนรู้จากอดีต"

 d_black_needle_base: "ซ่อนฐานเข็มดํา"
 d_black_needle_base_desc: "ฐานลับที่ใช้โดยโจรสลัดเลเยอร์เพื่อดําเนินการผิดกฎหมายหลายอย่างและซ่อนสินค้าที่ถูกขโมย"
 d_abandoned_black_needle_base: "ฐาน ของ สิ่ง จําเป็น พื้น ฐาน"
 d_abandoned_black_needle_base_desc: "ฐานทัพนี้เคยถูกใช้โดยโจรสลัดดํานิวเทิล เป็นด่านและเซฟเฮ้าส์ สําหรับอาชญากรและของที่ขโมยมา"
 d_abandoned_black_needle_base_naval_cap: "เครื่องราชอิสริยาภรณ์จากทหารงาน:§G+$@abandoned_black_needle_base_naval_cap_from_soldier_job|0$§!"
 d_abandoned_black_needle_base_naval_cap_short: "£mod_country_naval_cap_add£จาก£job_soldier£งาน:§G+$@abandoned_black_needle_base_naval_cap_from_soldier_job|0$§!"

 black_needle_base_system_poi: "ติด ตาม แผนภูมิ ทาง ภาค สวรรค์"
 black_needle_base_system_poi_desc: "เดอะ§H$celestial_chart$§!ผู้ทรงเผยอเนกประสงค์[Prev.GetName]เราต้องเดินทางไปที่นั่น และค้นหาว่าอะไรรอเราอยู่"

 grand_archive.8100.name: "โจรสลัดค้นหา"
 grand_archive.8100.desc: "เราพบฐานลับใต้ดิน[From.GetName]ถือสัญลักษณ์ของ§Yแท่งสีดํา§!เราเชื่อว่านี่เป็นฐานภายนอกที่ใช้โดยกลุ่มก่อการร้าย แยกตัวออกจากปฏิบัติการอื่น ชิ้นต่อไปของ§Y$celestial_chart$§!ต้อง เก็บ ไว้ ที่ นี่ ซึ่ง ดู เหมือน จะ อยู่ เคียง ข้าง กับ ทรัพย์ สมบัติ อื่น ๆ.\n\nเราสามารถเริ่มต้นง่าย ๆ วงโคจรระเบิดของฐาน แต่นี้อาจให้สีดําเวลาที่พวกเขา ต้องเรียกกําลังเสริม ใน อีก ด้าน หนึ่ง กอง กําลัง พื้น ดิน ของ เรา จะ ยึด ฐาน ได้ อย่าง รวด เร็ว ยิ่ง ขึ้น ทํา ให้ พวก ศัตรู มี เวลา น้อย ที่ จะ ตอบ สนอง.\n\nวิธีการลับมากขึ้นจะแฮกเข้าไปในระบบคอมพิวเตอร์ของฐานและรักษาความปลอดภัย$celestial_chart$ชิ้นส่วนในการปล้นกล้าหาญ"
 grand_archive.8100.a: "ต้องพิจารณาให้มาก"

 COLONIZATION_IMPOSSIBLE_DEFENDED_PLANET: "$TRIGGER_FAIL$§Rดาว เคราะห์ ดวง นี้ ได้ รับ การ ปก ป้อง อย่าง หนัก และ ไม่ อาจ ตั้ง อาณานิคม ได้.§!"
 BLACK_NEEDLE_BASE_BOMBARD: "บอมเบอร์เบสดํา"
 BLACK_NEEDLE_BASE_BOMBARD_DESC: "ฐานใต้ดินบน[This.GetName]ต่อต้านการทิ้งระเบิดของออร์บิทัลอย่างมาก แต่ด้วยเวลาและอาวุธที่เพียงพอ ก็เป็นไปได้ที่จะทําลายมันด้วยยานของเราเพียงอย่างเดียว เมื่อฐานได้รับการชําระ เราสามารถค้นหาซากปรักหักพังที่จะกู้คืน§H$celestial_chart$§!ชิ้นส่วนและของมีค่าอื่นๆ\n\nผู้ ให้ คํา ปรึกษา เตือน ว่า วิธี การ นี้ อาจ ทํา ให้ มี เวลา พอ ที่ จะ ขอ กําลังเสริม."
 BLACK_NEEDLE_BASE_BOMBARD_REINFORCEMENTS_KILLED: "$BLACK_NEEDLE_BASE_BOMBARD$"
 BLACK_NEEDLE_BASE_BOMBARD_REINFORCEMENTS_KILLED_DESC: "$BLACK_NEEDLE_BASE_BOMBARD_DESC$"

 grand_archive.8103.name: "การ ต่อ ต้าน การ ต่อ ต้าน"
 grand_archive.8103.desc: "อย่างที่คาด เรือดําส่งกองเรือมาป้องกันฐาน[FromFrom.GetName].\n\nเราจะต้องจัดการกับเรือเหล่านี้เพื่อรักษาความปลอดภัย[FromFrom.System.GetName]."

 grand_archive.8105.name: "ใน ซาก ปรัก หัก พัง และ ขี้เถ้า"
 grand_archive.8105.desc: "หลัง จาก ใช้ อาวุธ ใน การ ทํา ให้ ฐาน โจรสลัด หัก พัง แล้ว ใน ที่ สุด ก็ ได้ มี การ ลด จํานวน ลง เป็น ซาก ปรัก หัก พัง พร้อม กับ ประชากร ที่ อยู่ ก่อน หน้า นี้. ด้วยภัยคุกคามทั้งหมดล้างตอนนี้เราสามารถส่งใน นักวิทยาศาสตร์ที่จะสํารวจฐานที่ถูกทําลายและสกัดส่วนต่อไปของ§Y$celestial_chart$§!."
 grand_archive.8105.a.custom_tooltip: "ฐานแบล็คมิดเดิ้ลถูกทําลาย§Y[FromFrom.GetName]§!มี อิสระ ที่ จะ สํารวจ."
 grand_archive.8105.a.lom: "ลูบก้น!"

 project_type_research: "$RESEARCH$"
 project_type_bombardment: "บอมการ์ด"

 BLACK_NEEDLE_BASE_DEPLOY_ARMIES: "การ จู่ โจม ฐาน ราก ไม้ ดํา"
 BLACK_NEEDLE_BASE_DEPLOY_ARMIES_DESC: "ฐานใต้ดินบน[FromFrom.GetName]ได้รับการคุ้มครองจากกองกําลังและหุ่นยนต์รักษาความปลอดภัยจํานวนมาก การปล่อยกองทัพบนพื้นผิวของดาวเคราะห์ จะช่วยให้เราสามารถใช้เวลามากกว่าฐานได้อย่างรวดเร็ว§Yแท่งสีดํา§!เพื่อตอบสนอง\n\nเมื่อเราได้รักษาความปลอดภัยฐาน เราสามารถสกัดแคปซูลชาร์ท และสินค้าอื่น ๆ ที่ไม่ได้เริ่มต้น"

 grand_archive.8110.name: "ป้องกัน ตัว ลง"
 grand_archive.8110.desc: "กองกําลังภาคพื้นดินของเราได้ยึด§Yแท่งสีดํา§!ฐานและกําลังรักษาความปลอดภัยอาคาร และทรัพยากรโดยรอบ ด้วยภัยคุกคามทั้งหมดล้างเราสามารถส่งใน นักวิทยาศาสตร์ที่จะสกัดชิ้นส่วนต่อไปของ§Y$celestial_chart$§!."
 grand_archive.8110.a.custom_tooltip: "กองกําลังภาคพื้นดินเลเยอร์ได้รับการจัดการ§Y[FromFromFrom.GetName]§!ตอนนี้มีอิสระที่จะสํารวจ"
 grand_archive.8110.a.lom: "ถึงเวลาแบ่งของมีค่ากัน"

 BLACK_NEEDLE_BASE_HACK: "แฮ็คโจรสลัด"
 BLACK_NEEDLE_BASE_HACK_DESC: "พวกโจรสลัดที่โดนขโมย และเทคโนโลยีที่ถูกรื้อถอน ทําให้ฐานของพวกเขาอ่อนแอต่อการแทรกซึม ยานวิจัยเพียงลําเดียว สามารถแฮ็คผ่านเครือข่ายได้[FromFrom.GetName]จากวงโคจร, การจําแนกภาพเป็น§Yแท่งสีดํา§!ขนส่งเรือภายใต้การสั่งซื้อของกัปตันฮู นี่อาจโน้มน้าวให้พวกเขาโอนถ่ายโอน การควบคุมแคปซูลแผนที่ โดยปราศจากการนองเลือด"

 grand_archive.8115.name: "มานู เอ อร์ ประสบ ความ สําเร็จ"
 grand_archive.8115.desc.1: "หลัง จาก เตรียม ตัว เป็น เวลา หลาย เดือน นัก วิทยาศาสตร์ ก็ เริ่ม ศึกษา คัมภีร์ ไบเบิล[Leader.GetName]แทรกซึมผ่านเครือข่ายสื่อสาร และเลียนแบบ§Yแท่งสีดํา§!เรือ ภายใต้คําสั่งปลอมจากกัปตันฮู[Leader.GetHeShe] [Leader.GetHasHave]หลอกให้ผู้ดําเนินการฐาน เตรียมแคปซูลสําหรับ การย้ายฉุกเฉินนอกโลก"
 grand_archive.8115.desc.slippery: "นัก วิทยาศาสตร์[Leader.GetName]ลงจอดในตําแหน่งสมบูรณ์ เพื่อล่าถอยอย่างรวดเร็ว ในกรณีที่พวกมันถูกระเบิด"
 grand_archive.8115.desc.charismatic: "โดย ใช้ เสน่ห์ และ เสน่ห์ ของ พวก เขา นัก วิทยาศาสตร์[Leader.GetName] [Leader.GetWasWere]สามารถหลีกเลี่ยงคําถามยากๆ"
 grand_archive.8115.desc.psionic_organic: "ด้วยการเล่นแบบง่ายๆ[Leader.Species.GetHandName]นักวิทยาศาสตร์[Leader.GetName]ควบคุมจิตใจผู้คุม เพื่อลดความสงสัยใดๆ"
 grand_archive.8115.desc.psionic_machine: "ผ่านเครื่องช่วยหายใจ[Leader.GetName] [Leader.GetWasWere]เป็น เรื่อง ง่าย ที่ จะ ควบคุม จิตใจ ที่ ด้อย กว่า ของ ผู้ คุม เพื่อ หลีก เลี่ยง ความ สงสัย อีก."
 grand_archive.8115.desc.2: "แคปซูลปลอดภัย ไม่มีผู้บาดเจ็บ พวกโจรสลัดยังไม่เข้าใจ ว่าพวกเขาโดนหลอก"
 grand_archive.8115.a: "$EXCELLENT$"

 grand_archive.8120.name: "จับสีแดง- มือ"
 grand_archive.8120.desc: "แต่น่าเสียดายที่ยามคนหนึ่งจับแผนของเราได้ ในขณะที่เรากําลังโหลดแคปซูลลงบนยาน การ ค้น พบ นี้ นํา ไป สู่ การ ยิง กัน สั้น ๆ เนื่อง จาก เรา ถูก บังคับ ให้ หลบ หนี ไป พร้อม กับ สินค้า ล้ํา ค่า ที่ ลาก มา. แคปซูล ถูก สกัด ได้ สําเร็จ แต่ นัก วิทยาศาสตร์[Leader.GetName] [Leader.GetWasWere]ฆ่าในกองเพลิง"
 grand_archive.8120.a: "$TERRIBLE$"

 grand_archive.8125.name: "ฐานโจรสลัดถูกทิ้งร้าง"
 grand_archive.8125.common: "เมื่อ เผชิญ กับ ความ อ่อนแอ เหล่า นี้ พวก โจร สลัด จึง ตัดสิน ใจ ทิ้ง ฐาน ของ ตน บน[FromFromFromFrom.GetName]การ อพยพ ทันที และ การ รักษา สิ่ง ของ มี ค่า อื่น ๆ ที่ เก็บ ไว้ ที่ นั่น. ตอน นี้ ดวง จันทร์ ที่ อยู่ อาศัย นี้ ไม่ ถูก บดบัง และ สามารถ ตั้ง อาณานิคม ได้."
 grand_archive.8125.desc.alive: "เดอะ§Yแท่งสีดํา§!ในที่สุดก็ตระหนักว่า พวกเขาโดนหลอก ค้นพบช่องโหว่ของเครือข่ายรักษาความปลอดภัย\n\n$grand_archive.8125.common$"
 grand_archive.8125.desc.dead: "หลังจากหลบหนีจาก§Yแท่งสีดํา§!ป้อมปราการ, ขอบเขตของการแทรกซึมของเรา ได้ถูกค้นพบ\n\n$grand_archive.8125.common$"
 grand_archive.8125.a: "เป็นการตัดสินใจที่มีเหตุผล"
 grand_archive.8125.a.custom_tooltip: "โฮสต์บน§Y[FromFromFromFrom.GetName]§!ได้ออกจากดาวเคราะห์ ตอนนี้มันสามารถตั้งถิ่นฐานได้"

 grand_archive.8130.name: "การ ลาด ตระเวน ที่ ฐาน ของ สิ่ง มี ชีวิต ดํา"
 grand_archive.8130.desc.common: "ห้อง ปลอด ภัย มี สิ่ง ของ ที่ มี ค่า หลาก หลาย รวม ทั้ง ของ ประดับ ที่ มี อารมณ์ ความ รู้สึก ซึ่ง เกี่ยว ข้อง กับ ประวัติ องค์การ โจรสลัด. เราพบแคปซูลของชาร์ต ท่ามกลางงานศิลปะที่ถูกขโมยมา เครื่องประดับส่วนตัว และกระเป๋าสตางค์ดิจิตอลที่เข้ารหัสไว้\n\nเราสงสัยว่าสินค้าจํานวนมากที่ค้นพบที่นี่ จะยากที่จะขาย งาน ศิลปะ เหล่า นี้ เป็น ที่ รู้ จัก กัน ดี และ ต้อง ใช้ เครื่อง ประดับ เหล่า นี้ เพื่อ หา เศษ ชิ้น เล็ก ๆ และ การ ซื้อ ของ โดย ใช้ กระเป๋า สตางค์ แบบ ดิจิตอล ก็ มัก จะ สามารถ หา พบ ได้. เจ้าของของเก่าบางคน อาจตายได้นาน แต่บางคนยังหาของที่ขโมยมา"
 grand_archive.8130.desc.bombarded: "หลีกเลี่ยงซากปรักหักพัง§Yแท่งสีดํา§!ฐาน เราพบอุโมงค์ใต้ดิน และเปิดมัน เพื่อเปิดเผยขุมทรัพย์เล็กๆของพวกเขา\n\n$grand_archive.8130.desc.common$"
 grand_archive.8130.desc.landed: "การ สํารวจ ความ แตก ต่าง§Yแท่งสีดํา§!ฐาน เราพบพิมพ์เขียวของสถานที่ ที่เปิดเผยการดํารงอยู่ของอุโมงค์ใต้ดิน จากใต้พื้นดินในลิฟท์ให้บริการ เราป้อนรหัสที่จะเปิดเผยสมบัติเล็ก ๆ\n\n$grand_archive.8130.desc.common$"
 grand_archive.8130.a: "พยายามย้ายของที่ขโมยมา"
 grand_archive.8130.b: "ขายทุกอย่าง"
 grand_archive.8130.c.default: "เก็บของที่ขโมยมาไว้"
 grand_archive.8130.c.lom: "ผู้ค้นหา"

 black_needle_base_sold_stolen_items: "สิ่ง ของ ที่ ถูก ขโมย มา จาก ฐาน น้ํามัน ดิน ดํา"
 opinion_black_needle_base_repatriate_stolen_items: "คืนค่ารายการที่ถูกขโมย"
 opinion_black_needle_base_repatriate_stolen_items_tt: "§G+$@opinion_black_needle_base_repatriate_stolen_items_value|0$§! £opinion£ความเห็นกับทุกคนที่ไม่เมาจักรวรรดิเราไม่ได้ทําสงครามด้วย"

 DECODE_THIRD_MAP_PIECE: "ชิ้นส่วนแผนภูมิถอดรหัส"
 DECODE_THIRD_MAP_PIECE_DESC: "ด้วยแคปซูลที่เอาออกมาจาก§Yแท่งสีดํา§!ฐาน, เราได้รับมอบหมายในการถอดรหัสข้อมูลภายในและ ผนวกข้อมูลใหม่เข้าไปใน§H$celestial_chart$§!."

 grand_archive.8135.name: "ถอดรหัสแผนภูมิ"
 grand_archive.8135.desc: "เราเอาชนะชั้นของการเข้ารหัสดิจิตอล และผนวกข้อมูลใหม่เข้าไปใน§Y$celestial_chart$§!นี้ยังเปิดเผยปลายทางอีกที่จะสํารวจ และตอนนี้ชาร์ตเกือบจะสมบูรณ์ เราเชื่อว่ายังมีปริศนาเหลืออยู่เพียงส่วนเดียว และมีความมองโลกในแง่ดีอย่างรอบคอบว่า จุดจบของภารกิจของเราคือการมองเห็น\n\nขณะที่ข้อมูลการนําร่องถูกถอดรหัส ภายนอกของแคปซูลเอง มีค่าพอที่จะวิเคราะห์ ความ แข็ง แรง และ ความ สามารถ ของ ภาชนะ เหล่า นั้น เป็น เรื่อง ที่ น่า ประหลาด ใจ ความ สามารถ ใน การ จําลอง เนื้อหา นี้ อาจ ทํา ให้ มี โอกาส มาก มาย ที่ จะ ค้นคว้า ใน อนาคต."
 grand_archive.8135.a: "$GOOD$"

 d_hive_dwelling: "การ มี จิตใจ สูง"
 d_hive_dwelling_desc: "การ ตั้ง ถิ่น ฐาน ที่ อยู่ ห่าง ไกล โดย กลุ่ม ส เม กกิบ อดีต เพื่อน ร่วม งาน ของ กัปตัน เนส."
 d_ruined_hive_dwelling: "ความ คิด ที่ เสื่อม ทราม"
 d_ruined_hive_dwelling_desc: "การตั้งถิ่นฐานของสปีกิบ ลูกเรือเก่าของกัปตันเนส"

 COLONIZATION_IMPOSSIBLE_SMEEGIBB_PLANET: "§Rดาวดวงนี้เป็นของ$NAME_Smeegibb$.§!"
 grand_archive.8200.name: "การตั้งค่าที่ซ่อนอยู่"
 grand_archive.8200.desc.common_1: "เราพบข้อตกลงเล็กๆ[FROM.GetName]มีจํานวนประชากรน้อยกว่า1000ตัว การ วิเคราะห์ ทาง ชีวภาพ ขั้น พื้น ฐาน ของ สัตว์ ชนิด นี้ แสดง ให้ เห็น ความ สามารถ ใน การ สื่อ ความ ของ ซีก โลก เหนือ ซึ่ง บ่ง ชี้ การ ดํารง อยู่ ของ จิตใจ ที่ มี รัง. นอก เหนือ จาก ค่าย ที่ อยู่ โดด เดี่ยว นี้ แล้ว ดาว เคราะห์ ดวง นี้ ยัง ไม่ ได้ อยู่ โดย สิ่ง มี ชีวิต อื่น ๆ ที่ มี ชีวิต อยู่."
 grand_archive.8200.desc.common_2: "ทําไม§Y$celestial_chart$§!ได้นําเรามาที่นี่ยังไม่ชัดเจน และต้องการการสืบสวนเพิ่มเติม"
 grand_archive.8200.desc: "$grand_archive.8200.desc.common_1$\n\n$grand_archive.8200.desc.common_2$"
 grand_archive.8200.desc.alt: "$grand_archive.8200.desc.common_1$\n\nบางทีสายพันธุ์นี้อาจจะมีข้อมูลมากกว่านี้§Y$NAME_CaptainNess$§!\"เราเคยได้ยิน\n\n$grand_archive.8200.desc.common_2$"

 grand_archive.8205.desc.common_1: "§Hโหนดของจิตใจรังพบในระบบที่ซ่อนของ[FROM.GetName], $NAME_Smeegibb$อึดอัดมาก พวก เขา มี แนว โน้ม จะ ลด สายตา ลง เมื่อ พูด คุย กัน ราว กับ ว่า เขา เคย ชิน กับ การ อยู่ ใต้ อํานาจ.§!"
 grand_archive.8205.desc.common_2: "ชื่อของเราคือ$NAME_Smeegibb$เราสงสัยว่าคุณหาเราเจอได้ยังไง ระบบนี้ถูกซ่อนจากมุมมองของกาแล็กซี่ มาหลายพันปี\n\nเท่านั้น§Yกัปตัน§!รู้จักที่นี่ดี คุณหาอะไร?"
 grand_archive.8205.desc.default: "$grand_archive.8205.desc.common_1$\n\nสมารัค! มันยาวเป็นสองเท่าตั้งแต่เราพูดกับหนึ่งเมนด์\n\n$grand_archive.8205.desc.common_2$"
 grand_archive.8205.desc.gestalt: "$grand_archive.8205.desc.common_1$\n\nสมารัค! มันยาวเป็นสองเท่าตั้งแต่เราคุยกับกลุ่มอื่น ๆ\n\n$grand_archive.8205.desc.common_2$"
 grand_archive.8205.a: "ที่นี่ที่ไหน?"
 grand_archive.8205.a.reply: "สมารัค! ดาวดวงนี้เป็นที่ของเรา เราอาศัยอยู่อย่างปลอดภัยสองครั้ง ห่างไกลจากกาแล็กซี่ความรุนแรง ก่อนหน้านี้ เราเข้าร่วมความรุนแรง การฆ่า อาชญากรรม การฝ่าฝืน เราทําทุกอย่าง ไม่มีแล้ว เราดูแลไฮโดรโปนิคของเรา\n\nก่อนเวลานั้น เราคือผู้ลี้ภัย ไม่มีใครรับเราเข้ามา จนกว่า§Yกัปตัน§!เธอช่วยเราจากโชคชะตาที่เลวร้าย กัปตันให้เราชื่อใหม่และในการแลกเปลี่ยนที่เราดูแลของเรือ\n\nเราทําความสะอาด ทําอาหาร อาวุธ ไฮโดรโพนิค และสินค้า เราทํางาน. จากนั้นเราจะเข้าร่วมงานเลี้ยง ปกป้องผู้กอง เมื่อเธอขโมยสมบัติ หรือลักพาตัว ไม่เคยทรยศกัปตัน เราซื่อสัตย์เสมอ"
 grand_archive.8205.b: "คุณรู้อะไรเกี่ยวกับ§Y$celestial_chart$§!?"
 grand_archive.8205.b.reply: "สมารัค! เรารู้ว่าไม่มีชาร์ตเราเพียงอยู่ในไตรมาสของเรา ถ้า§Yกัปตัน§!ทําชาร์ตเพื่อให้คุณมาที่นี่ มันต้องมีเหตุผลว่าทําไม... เธอต้องการช่วยเรา หรือทําร้ายเรา เราไม่แน่ใจ กัปตันอาจเจ้าเล่ห์\n\nเธอส่งข้อความให้เราครั้งเดียว กัปตันส่งเรารูปปั้นยักษ์ ของโดรนคนโปรดของเธอ$NAME_Smeegibb$เธอจําได้ และเธอช่วยชีวิตจากก่อนหน้านี้ มันน่าประทับใจ แต่เราไม่รู้ว่าทําไมเธอส่ง บางทีเธออาจจะอยากจะขอโทษ แต่เธอไม่มีจดหมาย"
 grand_archive.8205.c: "บอกเราเกี่ยวกับ§Yกัปตัน§!."
 grand_archive.8205.c.reply: "สมารัค! ก่อนหน้านี้§Yกัปตัน§!ช่วยพวกเรา ก่อนที่เธอจะเป็น ที่ปรึกษาและผู้นําของเรา เธอสอนพวกเราให้ดูแลเรือ เธอบอกว่า$NAME_Smeegibb$คุณมีค่ามหาศาล\"\n\nกัปตันชีวิตโดยสองศาสนา : \"ธรรมชาติเป็นเอกราช\" และ \"ชีวิตดํารงอยู่สําหรับมรดก\". ร่วมกันเราล่าคนจนและอุดมไปด้วย เราเอาของที่เราต้องการ จากกาแล็กซี่ที่โหดร้าย\n\nแต่แล้วกัปตันเป็นสองสัญญาและสองรอบ เธอเสียสละลูกเรือ หรือทรยศพวกเขาเพื่อค่าหัว กัปตันสูญเสียทุกคน แต่$NAME_Smeegibb$เราซื่อสัตย์เสมอ\n\nเธอบอกเราว่ากาแล็กซี่รุนแรงแค่ไหน ตอนนี้เราอยากจะอยู่ห่างๆ"
 grand_archive.8205.d: "ทําไมชาร์ตถึงพาเรามาที่นี่"
 grand_archive.8205.d.reply: "สมารัค! เราไม่แน่ใจว่าทําไม§Yกัปตัน§!พาคุณมาที่นี่ เธอไม่ได้บอกอะไรพวกเราเลย\n\nมีอยู่ความคิดหนึ่ง มีที่ที่อยู่ด้วยกัน§Yกัปตัน§!และเราซ่อนตัวจากเงินรางวัล ที่พักปลอดภัย บางทีคุณอาจเจออะไรที่นั่น"

 grand_archive.8210.name: "การ ค้น พบ ความ ปลอด ภัย"
 grand_archive.8210.desc: "การที่เราเผชิญ[from.GetName], $NAME_Smeegibb$ได้เปิดเผยพิกัดของเซฟเฮ้าส์ที่ถูกทิ้งร้าง ที่เคยถูกครอบครองด้วยตัวมันเอง§Y$NAME_CaptainNess$§!การตรวจสอบสถานที่นี้ อาจนําเราไปยังส่วนต่อไปของ§Y$celestial_chart$§!หรืออย่างน้อยก็เบาะแส เพื่อนําทางเราไปในทิศทางที่ถูกต้อง"
 grand_archive.8210.a: "เริ่มขุดกันเถอะ"

 smeegibb_digsite_poi: "การ สํารวจ ความ ปลอด ภัย"
 smeegibb_digsite_poi_desc: "สถาน ที่ ทาง โบราณคดี นี้ อาจ มี กุญแจ สู่ ส่วน ถัด ไป ของ§H$celestial_chart$§!เราต้องตรวจสอบเซฟเฮ้าส์ร้าง$TREASURE_TROVE$ของ§H$NAME_CaptainNess$§!."

 NAME_Bemat_cruiser_inax_01: "Hebehr"

# Treasure Hunters Origin - Smeegibb
 smeegibb_digsite: "น่าเบื่อ เซฟเฮาส์"
 smeegibb_digsite_desc: "ในสถานที่รกร้างว่างเปล่า[fromfrom.planet.GetName]เราตรวจพบที่พักเล็กๆ ที่มีอุปกรณ์ช่วยชีวิต และที่พัก พวก มัน ถูก ฝัง อย่าง หนัก ใน สภาพ อากาศ และ บาง ส่วน หลัง จาก พายุ น้ํา แข็ง หลาย พัน ปี."

 grand_archive.8220.name: "ปูมบันทึกของกัปตัน"
 grand_archive.8220.desc: "โครง สร้าง ที่ ขุด ค้น แสดง หลัก ฐาน ว่า มี การ ใช้ เวลา นาน. ครั้งนึงมันเคยยุ่งเกี่ยว กับสิ่งพื้นฐาน มี การ พบ ว่า มี การ ใช้ ไม้ เท้า และ เค้ก กัน ทั่ว อาคาร. ภาย ใน กอง กระดาษ ที่ ยุ่งเหยิง เรา ได้ ใบ ซุง ที่ เขียน โดย§Y$NAME_CaptainNess$§!ตัวเธอเอง\n\n§Lเรา ขึ้น เครื่อง บิน และ ปล้น รถ บรรทุก อีก คัน หนึ่ง ของ เพ ริ คา แต่ คราว นี้ พวก เขา พร้อม สําหรับ เรา. หลักประกันมากกว่าที่ผมอยากได้ แต่เรารับมือได้แย่ลง ค่าใช้จ่ายดี แต่ตา โก โยนียังคงหลบหนีเรา แต่โชคร้าย ตอนนี้ชาวเปอร์ริกา เพิ่มค่าหัวอีกครั้ง และสหพันธรัฐก็เข้ามามีส่วนร่วม ตอนนี้ทุกอย่างกําลังร้อน อาจจะต้องอยู่เงียบๆสักพัก§!"
 grand_archive.8220.a: "หาต่อไป"

 grand_archive.8225.name: "ฆ่าเวลา"
 grand_archive.8225.desc: "การ ขุด ลึก ลง ไป ใต้ โครง สร้าง นี้ เผย ให้ เห็น สิ่ง มี ค่า และ ระบบ สุขาภิบาล พื้น ฐาน. แต่น่าเสียดายที่หลังจากที่การตรวจสอบพื้นที่อย่างสมบูรณ์ เราไม่สามารถหาหลักฐานใด ๆ ของชิ้นส่วนของ§Y$celestial_chart$§!.\n\nเราได้รวบรวมสมุดและเอกสารมากขึ้น ในความหวังที่จะค้นพบเบาะแสภายใน§Y$NAME_CaptainNess$§!เป็นรายการปูมบันทึกที่กระจัดกระจาย\n\n§Lเวลาผ่านไปช้าน้อยกว่า กับคู่หูเช่น$NAME_Smeegibb$แต่มันคุ้มค่าที่จะแยกชื่อเสียง? แน่นอน การทํางานกับจิตของรัง มีคุณค่ามหาศาล เข้าถึงโดรนหลายร้อยตัว เพื่อแลกกับการตัดกําไรเพียงชิ้นเดียว ข้อตกลงอะไร! แต่บางทีงานที่พวกเขาใช้ ออกจากความสําเร็จของตัวเอง ... ? ฉันไม่แน่ใจว่าฉันสามารถอยู่กับ ความคิดที่จะแบ่งปันมรดกของฉัน ฉันต้องคิดมากกว่านี้§!"
 grand_archive.8225.a: "$grand_archive.8220.a$"

 grand_archive.8230.name: "บางสิ่งบางอย่างที่จะพิสูจน์"
 grand_archive.8230.desc: "เรา พบ ว่า ภาย ใน ช่อง อากาศ§Y$NAME_CaptainNess$§!บันทึกสุดท้าย\n\n§Lนี่ไม่ใช่สิ่งที่ฉันอยากให้เป็นที่จดจํา$NAME_Smeegibb$เคย เป็น เพื่อน ที่ ภักดี แต่ อย่า ยอม ให้ เขา บอก ว่า ดิฉัน ต้องการ เขา. ฉันจัดการกาแล็กซี่คนเดียวได้ ฉันจะทิ้งสัญลักษณ์ของฉัน และชื่อเสียงจะเป็นของฉัน เช่นเดียวกับความร่ํารวย\n\nบันทึกตัวเอง: ส่งดีกว่า$NAME_Smeegibb$บางอย่างที่ต้องจดจําฉัน§!\n\nนี่คือทั้งหมดที่เหลืออยู่ที่จะหา ไม่มีร่องรอยอื่น ๆ ของกัปตันหรือสัญญาณใด ๆ ของ§Y$celestial_chart$§!.\n\nบางทีของขวัญที่มอบให้$NAME_Smeegibb$ว่ามีคนพูดถึงเบาะแสบางอย่าง ว่าชิ้นส่วนสุดท้ายอยู่ที่ไหน เราต้องเปิดการสื่อสารกับพวกเขา"
 grand_archive.8230.a: "ที่นั่งเคลียร์"

 grand_archive.8236.name: "$NAME_Smeegibb$ไม่มี"
 grand_archive.8236.desc.default: "$smeegibb_shelter_system_2_poi_desc$"
 grand_archive.8236.desc.xenophile: "$smeegibb_shelter_system_2_poi_desc$\n\nเราหวังว่าเพื่อนใหม่ของเราจะปลอดภัย"
 grand_archive.8236.a: "ถึง[smeegibb_system.GetName]"

 grand_archive.8241.name: "กลับของ$NAME_BlackNeedle$"
 grand_archive.8241.desc: "กอง เรือ ขนาด ใหญ่ ซึ่ง ถือ ธง ของ องค์การ โจรสลัด ที่ รู้ จัก กัน ว่า§Y$NAME_BlackNeedle$§!ได้ถูกพบเห็นรอบ[smeegibb_shelter.GetName]เราเชื่อว่าโจรสลัดเหล่านี้ได้เงาการเคลื่อนไหวของเราและมีการทําลายที่อยู่อาศัย$NAME_Smeegibb$พวกเขาจะต้องยังคงค้นหาชิ้นต่อไปของ§Y$celestial_chart$§!.\n\nไม่มีสัญญาณของสิ่งมีชีวิต ที่ถูกส่งมายังโลก\n\nเราได้รับสัญญาณจากยานนําของพวกเขา"

 grand_archive.8245.name: "$NAME_CaptainInax$ของ$NAME_BlackNeedle$"

 grand_archive.8245.desc.inax.1: "§Hจิตรกรรม ตัว นี้ ยืน ตัว สูง ตา ของ มัน มอง เห็น ได้ เจิด จ้า. พฤติกรรม ที่ มี วินัย เป็น เรื่อง ที่ ไม่ ตรง กับ ความ เป็น จริง กับ การ บิด เบี้ยว ของ อุปนิสัย ที่ ทํา ให้ เกิด อาการ บิด เบี้ยว ซึ่ง คลิก และ สั่น สะท้าน ด้วย ความ ตื่น เต้น.§!\n\nในที่สุดเราก็เจอกัน เจ้ามีเปลือกอ่อนจัดการเอาชนะได้อย่างไร§YK- k- kptaain Hoo§!แม้แต่เจ้าเค-เค-เครตินนั่น ก็น่าจะกําจัดกองเรือที่น่าเวทนาของเจ้าได้แล้ว เจ้าต้องชดใช้"
 grand_archive.8245.desc.inax.2: "ขอบคุณนะที่พาเรามาที่นี่§Y$NAME_SilverQuill$§!ตามล่ามัน$NAME_Smeegibb$กว่าร้อยรอบ การก่อความขุ่นเคืองในสมัยก่อนของเขา หมายความว่าข้าต้องชดใช้สําหรับรางวัลที่ยิ่งใหญ่ เมื่อฉันจบกับคุณ"
 grand_archive.8245.desc.ransacked: "$grand_archive.8245.desc.inax.1$หมุน & 90ฐานของเราบน[black_needle_base.GetName].\n\n$grand_archive.8245.desc.inax.2$"
 grand_archive.8245.desc.stolen: "$grand_archive.8245.desc.inax.1$ขโมยจาก§Yแบตเตอรี§!.\n\n$grand_archive.8245.desc.inax.2$"
 grand_archive.8245.a: "คุณเป็นใคร?"
 grand_archive.8245.a.reply: "K-k-k-k-kay Me Inax พลเรือเอกของ§Yแบตเตอรี§!.\n\nตอนนี้คุณรู้ชื่อคนที่จะฆ่าคุณ นี่เป็นการตายที่มีเกียรติ ผมแนะนําให้คุณยอมรับ\n\nเช่นเดียวกับ k- kustotumm คุณอาจจะยิงครั้งแรก"
 grand_archive.8245.b: "คุณฆ่า$NAME_Smeegibb$..."
 grand_archive.8245.b.reply.common: "พวกเขาไม่ได้ท้าทาย เราทาโฮเวลด้วยเลือดสีฟ้า ไม่มีฝูงบิน ไม่มีอาวุธ ใครบางคนน่าจะยิงพวกมัน ไม่ช้าก็เร็ว ไม่มีใครเจาะโดย§Yแบตเตอรี§!และมีชีวิตรอด\n\nพวกเขาเป็นเพื่อนคุณเหรอ? ทํายังไง คุณจะเข้าร่วมกับพวกเขาเร็วๆนี้ ในนามของ§Y$NAME_SilverQuill$§!เราจะได้ชาร์ต"
 grand_archive.8245.b.reply.default: "$grand_archive.8245.b.reply.common$จากคาถาแบบ K- K- Corp"
 grand_archive.8245.b.reply.robot: "$grand_archive.8245.b.reply.common$ในขณะที่ไฟของคุณส่วนขยายก- k และตาย"
 grand_archive.8245.c: "ใคร$NAME_SilverQuill$?"
 grand_archive.8245.c.reply: "ใคร§Y$NAME_SilverQuill$§!ช่างเป็นการสุ่ม k อะไรเช่นนี้ ผู้ก่อตั้งตํานานของเรา เป็นจอมบงการ จากเรือลําเดียว เขาสร้าง§Yแบตเตอรี§!เข้าสู่การดําเนินงานของดาราจักร\n\nแบล็ค-ก-ร. ม.มีชีวิตอยู่ต่อที่เค-เค-ดําเนินการตามมรดกของเขา ความตายของเธอจะเป็นโน้ตต่อไปในเพลงของเรา"
 grand_archive.8245.d: "คุณต้องการอะไร$celestial_chart$?"
 grand_archive.8245.d.reply: "ไม่รู้รึไงว่ามีอะไร นี่คือชาร์ตสําหรับ§YK- k- kpain Nes§!ขุมทรัพย์! ทุก K- Krident และอัญมณีที่ซ่อนไว้ตลอดชีวิตของเธอ\n\nสมบัติของมันเป็นของเรา เมื่อเรามีมัน เราจะร้องชื่อของเราเป็นประวัติศาสตร์ ทุกระบบจะต้องกลัว§Yแบตเตอรี§!... และโน้ตแรกของเค-เค-โครัสจะเป็นของคุณ เรา ใจ กว้าง ไหม?"
 grand_archive.8245.e: "เราจะไม่ยอมแพ้ง่ายๆ"
 grand_archive.8245.e.reply: "งั้นมาร้องเพลงกัน ฉันจะทําถ้วยรางวัลให้คุณ[this.species.GetRemnantNamePlural]และนําเสนอมันเป็นของขวัญให้กับ เค-เค-โคมานเดอร์ของฉัน"

 grand_archive.8265.name: "$grand_archive.8245.name$"
 grand_archive.8265.desc: "สงครามที่น่าจดจํา! คุณไม่ได้อ่อนแออย่างที่เห็น เราประเมินคุณต่ําไปสองครั้งแล้ว แต่ไม่อีกต่อไป ครั้งต่อไปที่เราพบกัน§Yแบตเตอรี§!จะไม่รั้งไว้\n\nอย่า ถือ ว่า นี่ เป็น คํา เตือน. มันเป็นโทษประหารชีวิต"
 grand_archive.8265.a.scared: "กําลังยกเลิกการตั้งค่า..."
 grand_archive.8265.a.homicidal: "เริ่มเลย"
 grand_archive.8265.a.gestalt: "การสื่อสารสิ้นสุดลง"

 gateway_to_ness_treasure_system_poi: "สร้างแผนภูมิ K"
 gateway_to_ness_treasure_system_poi_desc: "เดอะ§H$celestial_chart$§!เสร็จสมบูรณ์แล้ว มันได้เปิดเผยระบบสุดท้าย[Prev.GetName]การค้นหาที่ยาวนานของเราใกล้สิ้นสุดแล้ว - ให้เราเดินทางไปที่นั่นเพื่อค้นหาสิ่งที่ รอ!"

 TREASURE_HUNTERS_CHART_PIECE_3_PROJECT: "แคปซูลที่ถูกซ่อน"
 TREASURE_HUNTERS_CHART_PIECE_3_PROJECT_DESC: "จากการสืบสวนของเรา เราเชื่อว่าชิ้นส่วนต่อไป§H$celestial_chart$§!ซ่อนอยู่ที่ไหนสักแห่ง ในข้อตกลงที่ถูกทําลาย[this.GetName].\n\nจากการสร้างแคปซูลอื่น ๆ ที่แข็งแรง เราสรุปได้ว่ามันได้รอดจากการทิ้งระเบิดเมื่อเร็วๆนี้"

 grand_archive.8270.name: "เคล็ด ลับ ของ รูป ปั้น"
 grand_archive.8270.desc: "การค้นหาชิ้นส่วนที่สี่§Y$celestial_chart$§!บน[from.GetName]สําเร็จแล้ว แคปซูลที่ถูกพบว่าฝังอยู่ภายในรูปปั้นหินของโดรน จากที่รู้จักกันในปัจจุบัน$NAME_Smeegibb$คํา จารึก บน รูป ปั้น อ่าน ดัง ต่อ ไป นี้:\n\n§L\"เพื่อลูกเรือที่รักของฉัน : เป็นสัญลักษณ์ของความขอบคุณของฉัน ขอให้ความโดดเดี่ยวของคุณยาวและความสงบสุข.\"§!\n\nเมื่อส่วนสุดท้ายของชาร์ตถูกถอดรหัส เราสามารถค้นหาต่อไป§Y$NAME_CaptainNess$§!สมบัติ"

 TREASURE_HUNTERS_ANCIENT_CAPSULE_4_PROJECT: "แผนภูมิ สุด ท้าย"
 TREASURE_HUNTERS_ANCIENT_CAPSULE_4_PROJECT_DESC: "หลังจากที่สกัดแคปซูลจากซากปรักหักพัง$NAME_Smeegibb$การตั้งถิ่นฐาน ส่วนที่เหลือทั้งหมดคือการถอดรหัสภายในและสมบูรณ์§H$celestial_chart$§!ในไม่ช้าเราจะค้นพบสิ่งที่รอเราอยู่ในตอนท้ายของ§H$NAME_CaptainNess$§!ร่องรอย"

 grand_archive.8280.name: "สร้างแผนภูมิให้สมบูรณ์"
 grand_archive.8280.desc: "เมื่อถอดรหัสแล้ว ชิ้นข้อมูลใหม่ก็เสร็จสมบูรณ์§Y$celestial_chart$§!จุดของแสงที่จุดต่าง ๆ ที่จุดเชื่อมโยงที่เราค้นพบระหว่างทาง แล้ว ไฟ ทั้ง สี่ ก็ หรี่ ลง พร้อม กัน ก่อน จะ เปิด เผย ระบบ ที่ ซ่อน อยู่ อีก ระบบ หนึ่ง.\n\nการเพิ่มส่วนสุดท้ายของข้อมูลได้ปลดล็อคความสามารถเพิ่มเติมแล้ว เดอะ§Yแผนภูมิ§!ไม่ ใช่ แผนที่ ที่ เรียบ ง่าย แต่ มี ข้อมูล เกี่ยว กับ ความ มั่งคั่ง ที่ สูญ เสีย ไป และ ขุม ทรัพย์ ที่ ผิด กฎหมาย ทั่ว กาแล็กซี ซึ่ง เก็บ รวบ รวม โดย§Y$NAME_CaptainNess$§!ข้อมูลบางส่วนอาจหมดอายุ แต่อุปกรณ์นี้สามารถตรวจจับได้อย่างแม่นยํา\n\nยิ่งกว่านั้น§Yแผนภูมิ§!มีการประเมินข้อมูล ทุกสมบัติที่กัปตันพบ ตลอดอาชีพของเธอ บันทึก ราย ละเอียด เหล่า นี้ อธิบาย วิธี ระบุ ตัว, และ ปัจจุบัน อัน มี ค่า ยิ่ง แก่ ผู้ ขาย ที่ อาจ จะ ได้ กําไร สูง สุด. เปิดใช้งานอุปกรณ์จะให้การออกแบบ สําหรับสมบัติที่ไม่ซ้ํากัน ที่ช่วยให้อาณานิคมของเรา"
 grand_archive.8280.a.lom: "ทรัพย์สินที่เกินขอบเขต"

 grand_archive.8285.name: "สร้างแผนภูมิ K"
 grand_archive.8285.desc: "การเติมเต็มของ§Y$celestial_chart$§!เป็นโอกาสสําคัญสําหรับ[this.GetName]ด้วยความลับทั้งหมดของมันไม่ได้ล็อค เราชี้ไปที่หนึ่งจุดหมายที่ไม่สามารถหลีกเลี่ยง :[gateway_to_ness_treasure_system.GetName]ระบบ\n\nหลัง จาก เอา ชนะ อุปสรรค หลาย อย่าง แล้ว เรา อยู่ ห่าง ออก ไป เพียง ก้าว เดียว. เหลือแค่คําถามเดียว: ตอนจบของ§Yแผนภูมิ§!?\n\nไม่ มี การ รับ ประกัน ว่า จะ ประสบ ความ สําเร็จ แต่ เรา จะ ไม่ มี ทาง อื่น. ให้ เรา ออก ไป เพื่อ ชม การ ผจญ ภัย นี้ ผ่าน ไป!"
 grand_archive.8285.a.default: "กดต่อไป"
 grand_archive.8285.a.lom: "ตรงไป, โฮ!"

 councilor_head_treasure_hunter: "หัวหน้านักล่าสมบัติ"
 councilor_head_treasure_hunter_female: "$councilor_head_treasure_hunter$"
 councilor_head_treasure_hunter_desc: "เดอะ$TITLE$วิเคราะห์อย่างละเอียด§Y$celestial_chart$§!เพื่อตามหาแคชที่ซ่อนไว้ และประเมินวัตถุที่มีค่า"
 councilor_corporate_head_treasure_hunter: "$councilor_head_treasure_hunter$"
 councilor_corporate_head_treasure_hunter_female: "$councilor_head_treasure_hunter$"
 councilor_corporate_head_treasure_hunter_desc: "$councilor_head_treasure_hunter_desc$"

 prospect_of_treasure_modifier: "ความ คาด หวัง เกี่ยว กับ ทรัพย์ สมบัติ"
