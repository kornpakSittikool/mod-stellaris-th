 MESSAGE_CAPTURED_SPACE_CRITTER_RETURNED_DESC: "ขอบเขตพื้นที่ใหม่ถูกส่งเข้าวิเวเรียมแล้ว\n$NEWBORN_LIST$$CULLED_LIST$$RESOURCES_LIST$"
 MESSAGE_CAPTURED_SPACE_CRITTER_RETURNED_DESC_CULLED: "\n\nขอบเขตพื้นที่ที่จับได้ต่อไปนี้ถูกคัดทิ้งเพื่อนำทรัพยากรมาใช้:\n$CULLED_LIST$"

