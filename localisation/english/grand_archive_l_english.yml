 grand_archive.8405.name: "แอมบุช!"
 grand_archive.8405.desc: "เราถูกตาม\n\nตอนนี้พวกเรากําลังเผชิญปัญหา§Y$NAME_BlackNeedle$§!กองบินใน[ness_treasure_system.GetName]เมื่อเทียบกับการเผชิญหน้าครั้งสุดท้ายของเรา ตําแหน่งของพวกเขาได้เพิ่มขึ้นอย่างมีนัยสําคัญที่รวมถึง การปลดประจําการของเรือทหารและเรือพลเรือน ดู เหมือน ว่า พวก เขา ได้ รวบ รวม กอง เรือ สํารอง จํานวน มาก เพื่อ เผชิญ หน้า กัน นี้. ที่ศูนย์ของกองทัพเรืออยู่เรือธงของพวกเขาขนาดใหญ่$titan$ร่างทรง\n\nในขณะที่การก่อตัวของพวกเขาพร้อมรบ เรือส่วนใหญ่ยังไม่ได้ไพร่อาวุธของพวกเขา ดูเหมือนพวกเขาตั้งใจจะต่อรอง\n\nเราได้รับสัญญาณจากยานธง"
 grand_archive.8405.a.lom: "ให้เราได้พูดคุย"

 grand_archive.8410.name: "$NAME_CobaltQuill$กัปตันของ$NAME_BlackNeedle$"
 grand_archive.8410.desc: "§Hทั้ง ๆ ที่ มี ขนาด เล็ก ๆ กัปตัน โจรสลัด คน นี้ ก็ พ่น หมอก ออก มา. พระ เนตร ของ พระองค์ กําลัง คํานวณ ชั่ง เรา ราว กับ ว่า เป็น ส่วน หนึ่ง ของ สมการ ที่ ซับ ซ้อน.§!\n\nในที่สุดเราก็เจอกัน$NAME_CobaltQuill$ยินดีรับใช้ กัปตันผู้มีชื่อเสียง§Y$NAME_BlackNeedle$§!และเป็นลูกหลานของผู้ก่อตั้งของเรา$NAME_SilverQuill$คุณเป็นหนามในด้านข้างของฉันมานานหลายปี แต่ฉันมีเหตุผลถ้าไม่มีอะไรอื่น ผมมาหาคุณพร้อมกับข้อเสนอ\n\nเราจะมอบรางวัลชิ้นสําคัญ สําหรับชาร์ตที่เสร็จสมบูรณ์ และยอมให้คุณจากไป โดยมีชีวิตที่ไม่มีความหมาย\n\nถ้าคุณปฏิเสธ เราจะไม่มีทางเลือก นอกจากยึดสิ่งที่เราต้องการโดยการใช้กําลัง ถึงอย่างนั้น กองทัพเรือของเราก็ยังได้แทรกซึมเข้ามา ในอาณาจักรของท่านด้วย ณ จุดสําคัญหลายอย่าง คําสั่งเดียวของข้า คือสิ่งเดียวที่ช่วยป้องกันเจ้าจากความหายนะ"
 grand_archive.8410.a: "คุณกําลังเสนออะไร?"
 grand_archive.8410.a.reply: "ถึงแม้ว่าเจ้าจะทําให้ข้าผิดหวัง ข้าก็ยินดีจะให้รางวัลที่สําคัญ§Y$NAME_CaptainNess$§!ของเก่าที่เสร็จสมบูรณ์แล้ว\n\nถ้าคุณยอมรับข้อเสนอที่เอื้อเฟื้อ ผมพร้อมที่จะให้อภัย กับความผิดในอดีตทั้งหมด ไม่ จําเป็น ต้อง มี ข้อ ขัด แย้ง นี้ ระหว่าง เรา. หรือทําให้..."
 grand_archive.8410.b: "คุณกําลังขู่เรา..."
 grand_archive.8410.b.reply.common_1: "ฉันรู้ทุกอย่างที่ต้องรู้[this.GetName]ห่วงโซ่อุปโภค บริโภค ตําแหน่งของคลังทรัพยากร การกระจายตัวของฐานดาวของคุณ ทุกอย่างนับอย่างละเอียด"
 grand_archive.8410.b.reply.common_2: "คนของผมได้ทําการวิจัย และผมรู้วิธีทําลายจักรวรรดิของคุณ ข้าจะอดอยากดาวของเจ้า ขโมยเสบียงของเจ้า และทําลายทุกสิ่งที่เหลืออยู่ แน่นอน เว้นแต่คุณให้สิ่งที่ฉันต้องการ"
 grand_archive.8410.b.reply.default: "$grand_archive.8410.b.reply.common_1$\n\nฉันมองเห็นทุกคนที่ไว้ใจ ในความเป็นผู้นําของคุณ รวมทั้งคนที่พวกเขารัก\n\n$grand_archive.8410.b.reply.common_2$"
 grand_archive.8410.b.reply.hive_mind: "$grand_archive.8410.b.reply.common_1$\n\nผมกําลังติดตามทุกจุดสําคัญภายในกลุ่มของคุณ และถูกเตือนเมื่อใดก็ตามที่มีการสร้างใหม่\n\n$grand_archive.8410.b.reply.common_2$"
 grand_archive.8410.b.reply.machine: "$grand_archive.8410.b.reply.common_1$\n\nฉันมีประตูด้านหลัง เข้าที่ศูนย์ของคุณ ตามรอยตําแหน่งของทุกแกนหลักของเครือข่าย\n\n$grand_archive.8410.b.reply.common_2$"
 grand_archive.8410.c: "ทําไมต้องมาต่อรองด้วย"
 grand_archive.8410.c.reply: "การก่อวินาศกรรมในระดับนี้ ไม่ได้ออกมาถูกๆ เงินเก็บ ค่าบริการ ค่าบริการ สินบน สิ่งเหล่านี้แพง และฉันไม่ได้เงินมากมาย มี ค่า ใช้ จ่าย ที่ สําคัญ สําหรับ การ ทําลาย ที่ มี อยู่ อย่าง กว้าง ขวาง ซึ่ง รอ คุณ อยู่ ที่ การ พลิก ผัน.\n\nมีวิธีอื่นที่ดีกว่าที่จะใช้เงินของฉันยาก มา ให้เราหลีกเลี่ยงการนองเลือดที่ไม่มีความหมาย เอาความร่ํารวยของคุณไป แล้วปล่อยให้ผู้เชี่ยวชาญรู้"
 grand_archive.8410.d: "นี่ไม่ใช่แค่เรื่องเครดิตใช่ไหม"
 grand_archive.8410.d.reply: "5000 ปีที่ผ่านมาบรรพบุรุษของฉันที่ดี$NAME_SilverQuill$เป็นคู่แรกของ$NAME_CaptainNess$เขา ให้ เวลา เธอ รับ ใช้ อย่าง ภักดี นาน หลาย ปี และ เขา ได้ รับ การ ตอบ แทน อย่าง ไร?\n\nทรยศ!\n\nเธอส่งเขาให้กับเจ้าหน้าที่และกระเป๋าเงินรางวัล! แต่แน่นอน ไม่มีคุกใดสามารถบรรจุความยิ่งใหญ่$NAME_SilverQuill$.\n\nหลังจากหลบหนีที่กล้าหาญเขาเพิ่มขึ้นจากขี้เถ้าปากคํา forting ลูกเรือของเขาในตํานาน$NAME_BlackNeedle$ที่ยืนอยู่ต่อหน้าคุณในวันนี้ สาบานจะแก้แค้นพวกทรยศ$NAME_CaptainNess$เขาอุทิศชีวิตเพื่อขโมยสมบัติของเธอ และฝังมรดกของเธอ ภายใต้น้ําหนักของความสําเร็จของเขาเอง\n\nฉันเพียงแค่จบสิ่งที่เขาเริ่มต้น ชาร์ตนี้คือกุญแจสําคัญในการกู้คืนสิ่งที่เป็นของเราอย่างถูกต้อง\n\nตอนนี้ ได้โปรด ส่งมันมาให้ฉัน"

 grand_archive.8415.name: "การ จัด ระเบียบ ที่ กล้า หาญ"
 grand_archive.8415.desc: "ผู้นําของ§Y$NAME_BlackNeedle$§!ได้เสนอข้อเสนอ, เสนอรางวัลที่สําคัญแก่เราในการแลกเปลี่ยนสําหรับ§Y$celestial_chart$§!ถ้าเรารับข้อเสนอนี้ เราก็จะมอบกุญแจให้§Y$NAME_CaptainNess$§!สมบัติ\n\nการ ปฏิเสธ ข้อ เสนอ นี้ จะ ทํา ให้ พวก เขา โกรธ แค้น เต็ม ที่. ขอบเขตที่โจรสลัดเหล่านี้ได้แทรกซึมอยู่ในตําแหน่งของเราไม่ทราบ แต่พวกเขาได้ขู่ว่าจะทําลายอย่างสมบูรณ์[this.GetName]จากภายในออกมา ไม่ ว่า สิ่ง เหล่า นี้ จะ เป็น แต่ คํา ขู่ ที่ ไร้ สาระ ก็ ยัง ต้อง ดู กัน ต่อ ไป."
 grand_archive.8415.a: "ปฏิเสธข้อเสนอของพวกเขา"
 grand_archive.8415.b: "ขาย§Y$celestial_chart$§!."
 grand_archive.8415.b.effect_tt: "แพ้§Y$celestial_chart$§!\nเพิ่มจุด§G+$@max_credit_mult|0%$§!ของค่าสูงสุด$r_energy$\nได้รับเรือจาก§Y$NAME_BlackNeedle$§!"

 grand_archive.8500.name: "การ ตก ลง กัน"
 grand_archive.8500.desc: "เราส่งมอบ§Y$celestial_chart$§!เพื่อแลกเปลี่ยนกับผลรวมขนาดใหญ่$MONEY$และเป็นเรือรบพิเศษของกองทัพ ที่รู้จักกันในชื่อ§Yตา ของ สิ่ง จําเป็น§!เราสามารถพิจารณาความขัดแย้งของเรากับ§Y$NAME_BlackNeedle$§!เพื่อตั้งรกรากอีกครั้งและสําหรับทั้งหมด\n\nเราได้หลีกเลี่ยงการมีส่วนร่วมที่สําคัญ กับเต็มรูปแบบของกองเรือของพวกเขา และป้องกันการพยายามทําลาย ในขนาดกาแล็กซี่\n\nดีกว่าที่เราปล่อยให้ความโหดร้ายของโจรสลัด"
 grand_archive.8500.a: "ธุรกิจของเราที่นี่เสร็จสิ้น"
 grand_archive.8500.a.tt: "ยานทุกลําถูกขับออกจาก$TREASURE_TROVE$ระบบ"

 HOARD_LOOTED_BY_PIRATES: "โครง สร้าง นี้ ถูก โจร สลัด ปล้น และ ไม่ มี อะไร ที่ มี คุณค่า มาก ไป กว่า นี้"

 grand_archive.8505.name: "ระเบิด!"
 grand_archive.8505.desc: "เดอะ§Y$NAME_BlackNeedle$§!ได้เปิดตัวการโจมตีออกทั้งหมด ปลดปล่อยความวุ่นวายในระบบของเรา สาย การ ประชุม ใหญ่ หยุด ชะงัก เครื่อง กําเนิด ไฟฟ้า ได้ ไหม้ และ โครง สร้าง ทาง การ บริหาร ที่ สําคัญ ก็ ถูก ทํา ให้ ชะงัก. การ เดิน เรือ กําลัง สูญ หาย, สถานี วิจัย ต่าง ๆ ได้ รับ การ ลบ ข้อมูล, และ กับ ระเบิด กําลัง พัง ทลาย ถึง ห้า เท่า ของ อัตรา ปกติ.\n\nการ ทําลาย ล้าง มี อยู่ ทั่ว ไป ผล จาก ผล งาน อัน มี เล่ห์ เหลี่ยม ของ นัก แสดง ที่ มี เจตนา ร้าย หลาย พัน คน ที่ ทํา งาน ใน แทน เด็ม. เครือข่ายอันกว้างใหญ่ ของผู้ก่อวินาศกรรม ถูกซ่อนไว้ในหมู่อาณานิคมของเรา และดูเหมือนมันจะนําหน้าเราไปหนึ่งก้าว"
 grand_archive.8505.a: "แจ้งเตือนสีแดง!"

 situation_sabotage: "นก ซาบู เท อร์ ดํา"
 situation_sabotage_type: "$situation_sabotage$"
 situation_sabotage_desc: "เครือข่ายอันกว้างใหญ่ ของผู้ก่อวินาศกรรมจาก§Y$NAME_BlackNeedle$§!ซ่อนตัวอยู่ในหมู่อาณานิคมของเรา ทําให้เกิดความยุ่งเหยิงไปทั่ว[owner.GetName]ถ้าเรากําจัดพวก ซาบอตเจอร์ ความเสียหายจะดําเนินต่อไป จนกว่าสายอุปทานของเราล่ม"
 situation_sabotage_monthly_change_tooltip: "$situation_monthly_change_tooltip_approaches_dependent$"
 approach_sabotage_do_nothing: "ไม่ต้องทําอะไรเลย"
 approach_sabotage_do_nothing_tt: "เราจะไม่ทําอะไรเป็นพิเศษที่นี่"
 approach_sabotage_purge: "กําจัด ซาบาโตตูร์"
 approach_sabotage_purge_tt: "การตามล่าสายลับที่ซ่อนอยู่ ในตําแหน่งของเรา จะส่งผลให้ เกิดความเสียหายที่เลี่ยงไม่ได้"
 approach_sabotage_mitigate: "การ ลด ความ เสีย หาย"
 approach_sabotage_mitigate_tt: "มาตรการตอบสนองสามารถดําเนินการ เพื่อสร้างโครงสร้างพื้นฐานของเราใหม่ ในความหวังของการหยุดการโจมตีด้วยการก่อวินาศกรรม"
 finisher_effects_sabotage: "เราจะกวาดล้างพวกสัตวแพทย์ดํา และป้องกันพวกเขา จากการปิดล้อมรอบกัปตันเนสส์"
 finisher_effects_sabotage_fail: "โครงสร้างพื้นฐานของเราจะได้รับความเสียหายเกินการซ่อมแซม และแบล็คมิดเดิ้ลจะเสริมกําลังการปิดล้อมของพวกเขา รอบกัปตันเนสของฮอร์ด"

 grand_archive.8520.name: "เครือข่ายการทําลายถูกกระตุ้น"
 grand_archive.8520.desc.common: "เราได้สกัดกั้นคลื่นความถี่ของการสื่อสาร§Y$NAME_BlackNeedle$§!ตลอดอาณานิคมของเรา หลังจากถอดรหัสข้อความของพวกเขา เราก็สามารถระบุตัว คนที่ทรยศและทรยศ"
 grand_archive.8520.desc.machine: "$grand_archive.8520.desc.common$\n\nหน่วยของพวกเขาได้กระจายมัลแวร์ที่ซ่อนอยู่ ในระบบปฏิบัติการของเราอย่างลับ ๆ สร้างกองทัพกบฏ\n\nแผนตั้งโปรแกรมที่มุ่งร้าย ได้ไปไกลพอที่จะทุจริต หนึ่งในปมที่มีความสําคัญมากที่สุดใน[root.GetName], §Y[traitor_leader.GetClass] [traitor_leader.GetName]§!."
 grand_archive.8520.desc.hive: "$grand_archive.8520.desc.common$\n\nคนของพวกเขาได้น้ําท่วม ที่อยู่อาศัยที่มีฟีโรโมนแยก ส่งผลให้หุ่นยนต์ของเราจํานวนมาก เมื่อผิดหวังแล้ว พวกโจรสลัดก็จัดระบบโดรนของเราใหม่ เป็นฝักของสายลับผู้หลับใหล ซึ่งปัจจุบันกําลังรื้อถอนโครงสร้างพื้นฐานของเรา\n\nแผนอันกว้างขวางได้ดําเนินการไป ไกลในการทุจริตหนึ่งในโหนดที่ สําคัญที่สุดใน[root.GetName], §Y[traitor_leader.GetClass] [traitor_leader.GetName]§!."
 grand_archive.8520.desc.default: "$grand_archive.8520.desc.common$\n\nเรารู้มาว่าเจ้าหน้าที่ของพวกเขา ได้เกณฑ์ประชาชนที่ไม่พอใจมานานหลายปี เตรียมการรับมือการโจมตีอย่างกว้างขวาง\n\nหนึ่งในผู้ทรยศได้รับการเปิดเผยว่า§Y[traitor_leader.GetClass] [traitor_leader.GetName]§!ซึ่งทําให้เกิดความเสี่ยงด้านความปลอดภัย เรา ต้อง รับมือ กับ ผู้ ก่อ การ ร้าย นี้ ขณะ ที่ รักษา ความ รู้สึก มั่นคง ไว้ บ้าง. ความรู้ของประชาชนระดับการทุจริตนี้ จะมีผลกระทบร้ายแรงต่อรัฐบาลของเรา"
 grand_archive.8520.a.default: "ประหารชีวิตคนทรยศ"
 grand_archive.8520.a.machine: "ปลดเครื่องเสีย"
 grand_archive.8520.a.hive: "กําจัดพวกหุ่นยนต์บ้า"
 grand_archive.8520.a.tt: "§R100§! £pop£ §Hป๊อป§!ถูกฆ่าในดาวเคราะห์ทุกดวง"
 grand_archive.8520.b.default: "ให้การศึกษาคนทรยศอีกครั้ง"
 grand_archive.8520.b.machine: "ปรับปรุงหน่วยเพี้ยน"
 grand_archive.8520.b.hive: "สร้างหุ่นยนต์เพี้ยนใหม่"
 grand_archive.8520.c: "เปิดโปงตัวตนของคนทรยศ"
 grand_archive.8525.name.default: "คนทรยศถูกประมวลผลแล้ว"
 grand_archive.8525.name.hive: "การแยกสี"
 grand_archive.8525.name.machine: "หน่วย"
 grand_archive.8525.desc.common: "หลังจากการค้นพบ[traitor_leader.GetHisHer]ภักดีต่อ§Y$NAME_BlackNeedle$§!โจร สลัด"
 grand_archive.8525.desc.default: "$grand_archive.8525.desc.common$, [traitor_leader.GetName]ถูกประหารชีวิตแล้ว\n\nสถานการณ์ที่แน่นอนของ[traitor_leader.GetHisHer]ความ ตาย ถูก เก็บ ไว้ โดย ไม่ มี การ ควบคุม."
 grand_archive.8525.desc.hive: "$grand_archive.8525.desc.common$, [traitor_leader.GetName]ถูกคัดออก"
 grand_archive.8525.desc.machine: "$grand_archive.8525.desc.common$, [traitor_leader.GetName]ถูกยกเลิกแล้ว"
 grand_archive.8525.a: "เป็นมาตรการที่จําเป็น"
 grand_archive.8530.name.default: "แก้ไขค่าแกมม่าใหม่"
 grand_archive.8530.name.hive: "การลดรุ่น"
 grand_archive.8530.name.machine: "ประมวลผลหน่วย"
 grand_archive.8530.desc.default: "$grand_archive.8525.desc.common$, [traitor_leader.GetName]ถูกแก้ไขอย่างเพียงพอแล้ว\n\nแต่น่าเสียดายที่กระบวนการสอนซ้ํานี้ ได้ทิ้งความประทับใจเชิงลบถาวรบน[traitor_leader.GetName]."
 grand_archive.8530.desc.hive: "$grand_archive.8525.desc.common$, [traitor_leader.GetName]ถูกแก้ไขอย่างเพียงพอแล้ว\n\nแต่น่าเสียดายที่กระบวนการฟื้นฟูนี้ ได้ทิ้งความประทับใจเชิงลบไว้[traitor_leader.GetName]."
 grand_archive.8530.desc.machine: "$grand_archive.8525.desc.common$, [traitor_leader.GetName]มีการตั้งโปรแกรมไว้เพียงพอแล้ว\n\nน่า เสียดาย กระบวนการ ปฏิรูป นี้ ทํา ให้ เกิด ความ ประทับ ใจ ใน แง่ ลบ อย่าง ถาวร[traitor_leader.GetName]."
 grand_archive.8530.a.tt: "[traitor_leader.GetName]ได้ รับ ความ เสีย หาย 2 ระดับ"
 grand_archive.8535.name: "[traitor_leader.GetName]พบศพ"
 grand_archive.8535.desc: "$grand_archive.8525.desc.common$พลเมืองที่โกรธเกรี้ยว[root.GetName]รวมตัวกันประท้วง พวกศาลเตี้ยบุกมา[traitor_leader.GetHisHer]บ้าน[traitor_leader.GetHeSheCap]ต่อ มา มี การ ประกาศ ว่า คน ตาย ใน เหตุ การณ์ นั้น."
 grand_archive.8536.name: "คนทรยศ"
 grand_archive.8536.desc: "$grand_archive.8525.desc.common$, [traitor_leader.GetHeShe]ออกแถลงการณ์ในที่สาธารณะ แสดงความเสียใจอย่างมาก[traitor_leader.GetHisHer]การกระทํา ความ ทุกข์ ยาก นี้ ดู เหมือน จะ มี ผล กระทบ ถาวร ต่อ[traitor_leader.GetHisHer]ความสามารถในการนํา\n\nถึงแม้ว่าการกระทําในอดีตของพวกเขา ดูเหมือนว่าผู้คน[root.GetName]ยินดีที่จะให้อภัย[traitor_leader.GetName]."
 grand_archive.8536.a: "การพัฒนาที่ต้อนรับ"
 grand_archive.8536.a.tt: "[traitor_leader.GetName]ได้ รับ ความ เสีย หาย ใน ระดับ หนึ่ง"

 grand_archive.8545.name: "การยุบตัวของโครงสร้างอินฟรา"
 grand_archive.8545.desc: "แต่น่าเสียดายที่เราไม่สามารถที่จะขัดขวางการดําเนินงานทําลายล้างของ§Y$NAME_BlackNeedle$§!ผู้ก่อวินาศกรรมของพวกเขา ได้ทําลายโครงสร้างพื้นฐานของเรา เกินจะซ่อมแซมได้ การคอร์รัปชั่นที่พวกเขาได้แพร่กระจายไปทั่วระบบของเรา อยู่สูงเกินขนาดที่จะลดจํานวน\n\nอย่างไรก็ตาม เรื่องนี้ไม่อาจหยุดเราได้§Y$NESS_GRAND_ARCHIVE$§!ในนามของเรา ทั้งหมดที่เราต้องทําคือเอาชนะโจรสลัดในการรบ และสมบัติจะเป็นของเรา"
 grand_archive.8545.a: "การต่อสู้ยังไม่จบ"
 grand_archive.8550.name: "เข้ม แข็ง กว่า การ ก่อ การ ร้าย"
 grand_archive.8550.desc: "แม้ความพยายามอย่างกว้างขวางของ§Y$NAME_BlackNeedle$§!เพื่อก่อวินาศกรรมโครงสร้างของเรา เราได้ฟื้นฟูและมั่นคง โดยมีตัวแทนของพวกเขาพ่ายแพ้ที่เหลือทั้งหมดคือการเผชิญหน้ากับกองเรือที่สะสมของพวกเขาใน[hoard_system.GetName]และอ้างว่า§Y$NESS_GRAND_ARCHIVE$§!ในนามของ[root.GetName]."
 grand_archive.8550.a: "ปล่อยให้มันเสร็จ"
 grand_archive.8555.name: "$NAME_BlackNeedle$แพ้"
 grand_archive.8555.desc: "เดอะ§Y$NAME_BlackNeedle$§!ไม่อาจเอาชนะพลังทางทหารของเราได้ ด้วยกองเรือที่สะสมของพวกเขาพ่ายแพ้ พวกเขาไม่สามารถรองรับความพยายามทําลายภายในระบบของเรา เรามีอิสระที่จะอ้างสิทธิ์§Y$NESS_GRAND_ARCHIVE$§!ในนามของ[root.GetName]."
 grand_archive.8555.a: "ความพยายามที่น่าเวทนา"
 grand_archive.8555.a.lom: "ดินแดนที่น่าเวทนา"

 TREASURE_HUNTERS_BLACK_NEEDLE_PROJECT: "ยืนสุดท้ายของ$NAME_BlackNeedle$"
 TREASURE_HUNTERS_BLACK_NEEDLE_PROJECT_DESC: "หลัง จาก การ ก่อ การ ร้าย อย่าง รุนแรง[root.GetName]ระบบ,$NAME_BlackNeedle$ได้รักษาแนวปิดกั้นไว้§H$NESS_GRAND_ARCHIVE$§!พวกเขาสูญเสียทรัพยากรไปมาก และตอนนี้ก็อยู่ในตําแหน่งที่เปราะบาง ถ้าเราชนะพวกเขาที่นี่ องค์กรที่กว้างขึ้นของพวกเขาจะล่มสลายอย่างแน่นอน อนุญาตให้เรามีอิสระที่จะอ้างสมบัติ"
 TREASURE_HUNTERS_BLACK_NEEDLE_PROJECT_TOOLTIP: "§Rเอาชนะ$NAME_BlackNeedle$ใน[solar_system.GetName].§!"

 grand_archive.8560.name: "$grand_archive.8410.name$"
 grand_archive.8560.desc: "ลูกของเนส ช่างน่าขัน\n\nเธอเลือกคุณ คุณรู้ไหม?\n\nหลายร้อยสายพันธุ์ที่จะเลือกจาก และเธอเลือกคุณ บางทีหล่อนอาจจะเห็นบางสิ่งที่พิเศษในตัวคุณ หรืออาจเป็นโอกาสดีก็ได้ ไม่ทางใดก็ทางหนึ่ง\n\nคุณชนะ สําหรับตอนนี้ อย่ากล้าที่จะรับชัยชนะนี้ เจ้าสร้างศัตรูที่ทรงพลังในตัวเรา เดอะ§Y$NAME_BlackNeedle$§!ไม่ ให้ อภัย และ เรา ไม่ ลืม.\n\nอย่างที่บรรพบุรุษของฉันเคยทําก่อนฉัน เราจะอดทน เราจะสร้างสิ่งที่เราสูญเสียไปทีละชิ้น แม้จะใช้เวลานับพันปี ล้านปี เราจะกลับมาและคืนทุกอย่าง ที่คุณขโมยไปจากเรา\n\nเดอะ$NAME_BlackNeedle$จะมีชีวิตอยู่ตลอดไป! ตลอดไป!"
 grand_archive.8560.a: "เวลาจะบอก"
 grand_archive.8560.a.lom: "ไปไกลๆเลย"

 CAPTAIN_NESS_HOARD_PROJECT: "เรือกัปตันเนส"
 CAPTAIN_NESS_HOARD_PROJECT_DESC: "§H$NESS_GRAND_ARCHIVE$§!เป็นของเราที่จะใช้\n\nแม้ว่าจะมีรูปลักษณ์ที่ถูกทิ้งร้าง ระบบอาคารหลายระบบก็ทํางาน ให้สิ่งที่ถูกกล่าวหาของ§H$NAME_CaptainNess$§!เราต้องระวังมาตรการรักษาความปลอดภัย\n\nทาง เข้า อัน โดด เด่น ของ ขุม ทรัพย์ มี การ เจาะ เข้า ไป ใน ช่อง กลาง. เราใส่§H$celestial_chart$§!เพื่อเปิดสถานที่ลึกลับนี้"

 grand_archive.8565.name: "$NAME_CaptainNess$สมบัติ"
 grand_archive.8565.desc: "เดอะ§Y$celestial_chart$§!เป็นกุญแจ และห้องนิรภัยคือกุญแจ เราใส่ลงในฟักหลักของอาคารใหญ่\n\nชาร์ตเปิดใช้งานภายในติดตาม แสงเอกฐานของแต่ละดาว ตามการเดินทางของเรา เครื่อง กล โบราณ คร่ํา ครวญ ถึง ชีวิต และ ไม่ นาน เรา ก็ อยู่ ภาย ใน.\n\nทรัพย์ อัน เหลือ เชื่อ ที่ ได้ มา จาก โลก นับ พัน ๆ ดวง เรียง ราย อยู่ บน พื้น และ ผนัง เป็น จํานวน มาก. มี การ ใช้ รูป ปั้น อัน บอบบาง เพื่อ ต่อ สู้ กับ อาวุธ ยุทโธปกรณ์ ที่ ทํา ด้วย โลหะ อัน ล้ํา ค่า. เครื่อง ประดับ ที่ ดี จะ แขวน ไว้ จาก ซาก ฟอสซิล โบราณ และ อุปกรณ์ ที่ ซับ ซ้อน ซึ่ง ซ้อน ทับ กัน อยู่ ใน กอง ที่ ไม่ มี ระเบียบ.\n\nรอยเท้าโลหะจากทางเดินกลาง แขนที่ยกขึ้นในการยอมแพ้, เครื่องมนุษย์ลอยน้ําที่เต็ม วงจรเสียงของมันแตกเป็นเสียงพูด\n\n§Lคุณเจอชาร์ตของผมแล้ว ไม่ฉลาดเหรอ\"§!"
 grand_archive.8565.a: "เปิดระบบสื่อสาร"
 grand_archive.8565.a.lom: "กัปตันอาฮ้อย!"

 grand_archive.8570.desc: "§Hแม้ ว่า จะ มี การ แสดง ออก อย่าง จํากัด ใน รูป ของ หุ่น ยนต์ ของ เธอ แต่ เครื่องจักร ที่ รู้ จัก กัน ว่า กัปตัน เนส ก็ ยัง แสดง ความ สบายใจ อย่าง หนึ่ง. ร่าง กาย ของ เธอ ที่ เป็น โลหะ ไม่ มี อาการ ของ การ สวม เสื้อ ผ้า และ การ ฉีก ขาด ราว กับ ว่า เพิ่ง รวม ตัว กัน เมื่อ เร็ว ๆ นี้. น้ํา เสียง ของ เธอ ยัง คง มี ความ อด ทน อยู่ เหมือน กับ การ พูด ถึง คน ที่ อยู่ ต่ํา กว่า สถานภาพ ของ เธอ.§!\n\nฉันคิดว่าการแนะนําตัวเป็นการสั่งซื้อ แต่คุณอาจจะเดาไปแล้วว่าฉันเป็นใคร\n\nชื่อ ซานดา เนส หรืออย่างน้อยก็ชื่อ อดีต \"สมเด็จพระราชินีจอมเกล้ากาแล็กซี\" และปัจจุบันผู้อยู่อาศัยในกองหินน้ําแข็ง\n\n§Hเครื่องหยุดชั่วคราว การรับในแบบฟอร์มของเรา§!\n\nมันนานมากแล้ว ที่ฉันไม่เห็นสายพันธุ์ของคุณ ดูเหมือนพวกดั้งเดิมจะโตแล้วนะ\n\nต้องขอบอกว่า ฉันประทับใจมาก ที่คุณมาที่นี่"
 grand_archive.8570.a: "คุณยังมีชีวิตอยู่ได้ยังไง?"
 grand_archive.8570.a.reply_fallen_empire: "ความเป็นอมตะไม่ได้มาถูกๆ ผมจ่ายเงินให้นักวิทยาศาสตร์บางคน[fallen_empire.GetRealName]ไม่กี่ล้านเครดิตที่จะโอนจิตสํานึกของฉัน โดยไม่ต้องยกสัญญาณเตือน พวกเขาทํางานที่ยุติธรรม แต่ฉันไม่สามารถเต้นได้ดีเท่าที่ฉันเคยทํา\n\n$grand_archive.8570.a.reply$"
 grand_archive.8570.a.reply_curator: "ความเป็นอมตะไม่ได้มาถูกๆ ผมจ่ายเงินให้นักวิทยาศาสตร์บางคน$NAME_Curator_Order$ไม่กี่ล้านเครดิตที่จะโอนจิตสํานึกของฉัน โดยไม่ต้องยกสัญญาณเตือน พวกเขาทํางานที่ยุติธรรม แต่ฉันไม่สามารถเต้นได้ดีเท่าที่ฉันเคยทํา\n\n$grand_archive.8570.a.reply$"
 grand_archive.8570.a.reply: "§Hเครื่องนี้เปิดใช้งานคอนโซล เปิดเผยห้องที่ซ่อนอยู่บนผนัง ภายในกาละเทศะโบราณ ซากศพของสิ่งมีชีวิตอินทรีย์§!\n\nฉันอยู่นี่แล้ว เครื่องประดับที่ไร้ประโยชน์ แต่ฉันค่อนข้างอ่อนไหว ดูดีใช่มั้ย\n\nเมื่อ ผม ตรวจ ดู ว่า ทุก สิ่ง อยู่ ใน ที่ แห่ง นี้ แล้ว ผม ก็ ปิด ห้อง เก็บ ของ และ ดับ ไฟ ไป ได้ ไม่ กี่ พัน ปี. สิ่งต่อมาที่ผมรู้คือ คุณเปิดประตู และเรากําลังคุยกันอยู่ รู้สึกเหมือนเพิ่งนอนเมื่อวาน"
 grand_archive.8570.b: "คุณไปเอาสมบัติพวกนี้มาจากไหน"
 grand_archive.8570.b.reply: "ขโมยมัน, ส่วนใหญ่ หรือแลกมันกับสินค้าที่ไม่ได้เรื่องอื่น ฉันฉีกผู้เล่นหลักทุกคนในกาแล็กซี่ออก เรือคาร์โก อาวุธโคโลซุส นายบอกมาสิ ฉันปล้นไปแล้ว เหตุผลของฉันคือ ถ้าฉันเอาบางอย่างไปง่าย ๆ จากคุณ คุณไม่สนใจพอที่จะได้รับมัน\n\nบางครั้งทุกอย่างก็... ยุ่งเหยิง คุณเห็นสิ่งที่เกิดขึ้นกับเส้นทแยงอันนั้นเปิดหูเปิดตา\n\nมันทั้งสนุกและเกม จนกว่ามันจะไม่..."
 grand_archive.8570.c: "ทําไมเลือกเรา?"
 grand_archive.8570.c.reply: "เธอจะเชื่อฉันไหม ถ้าฉันบอกว่าฉันเหงา\n\n§Hวงจรเสียงของเครื่องแตกกับสิ่งที่อาจจะได้รับการหัวเราะ§!\n\nฉันมีสมบัติทั้งหมดนี่ แต่เพื่ออะไร แล้วสุดท้ายฉันจะได้อะไร ผมตระหนักว่า มันไม่ใช่ความมั่งคั่งที่ผมต้องการ มันเป็นมรดก แต่คุณไม่สามารถขโมยมรดกได้ แล้วคุณจะสร้างมันได้อย่างไร\n\nดีนี้เป็นโอกาสของฉันกับมัน ผมพบว่ามีสิ่งมีชีวิตโบราณ ที่ทํานายได้สองสามชนิด และหว่านพืชในโลกของพวกเขาด้วยสมบัติ - และแผนที่ของหลักสูตร ใครก็ตามที่เรียบเรียงชาร์ตของฉันก่อน จะผ่านการทดสอบ และคู่ควรกับการสืบทอดผลงานชีวิตของฉัน งั้น... เรามาถึงแล้ว\n\nบางทีชนิดของคุณสามารถทําในสิ่งที่ฉันไม่สามารถ และนําทั้งหมดนี้ไปใช้ที่ดี"
 grand_archive.8570.d: "ทําไมต้องทิ้งทุกอย่างไป?"
 grand_archive.8570.d.reply: "บอกแล้วไง ฉันผ่านไฟฉายแล้ว ฉันไม่เก่งเรื่องใช้เงิน แค่เอาไป\n\nแต่ฉันไม่สามารถเอาไปให้ใครได้ พวกเขาต้องฉลาดพอที่จะไปถึงสถานที่แห่งนี้ ลูกเรือที่ฉันภูมิใจ หนึ่งฉันสามารถแบ่งปันเรื่องราวของฉันกับ ..."
 grand_archive.8570.e: "เรื่องของคุณคืออะไร?"
 grand_archive.8570.e.reply: "ก็ตั้งแต่คุณถาม...\n\n§Hเครื่องนี้เปิดใช้งานแผงควบคุม และบันทึกชุดต่างๆ ถูกฉายข้ามกําแพง§!\n\nห้องนิรภัยทั้งหมดนี้ คือประวัติของผม ผมจ่ายเงินก้อนโตให้กับทีมนักเขียน เพื่อบันทึกทุกช่วงเวลาในชีวิต พวกเขาทํามันอย่างยุติธรรม ผมคิดว่า\n\n§Hภาพเปลี่ยนไปเป็นภาพห้องนักบินของลูกเรือโจรสลัด รูปแบบทางชีวภาพของกัปตันเนสในคําสั่งรอยแตกสั้นหนีวงจรเสียงของเครื่อง; มันมีน้ําหนักของถอนหายใจ§!\n\nผมเคยเป็นโจรสลัดที่หวาดกลัวที่สุดในกาแล็กซี่ ฉันได้ล้มละลายครั้งใหญ่ ดาวเคราะห์ค่าไถ่ และลดทั้งจักรวรรดิให้กลายเป็นซากปรักหักพัง ใครก็ตามที่โง่พอที่จะต่อต้านฉัน มีใบมีดในพวกเขา[root.GetSpeciesOrganName]หรือถูกขายเพื่อเป็นรางวัล เงินรางวัลของตัวเอง? ดาราศาสตร์"
 grand_archive.8570.f: "กรุณาพูดต่อ"
 grand_archive.8570.f.reply: "§Hดิจิตอลบันทึกเสียงต่างๆ โจรกรรม และหลบหนีอย่างกล้าหาญ ทุกฉากของเพลงวีระบุรุษ§!\n\nที แรก ผม เลือก เป้า หมาย อย่าง รอบคอบ และ หา เหตุ ผล ว่า ทําไม พวก เขา จึง สม ควร ได้ รับ. แต่ละงานมันน่าตื่นเต้นกว่าครั้งก่อน มันคือวงจร การวางแผน การฆ่าปีศาจ ปล้น แล้วเฉลิมฉลอง ปัญหาคือการมองหาเป้าหมาย \"แย่\" คือเวลามากเกินไป ฉันต้องการขยายขอบเขต\n\nในที่สุด ถ้ามีบางอย่างที่ฉันอยากได้ ฉันก็แค่รับมันไว้ ผม ชอบ ดู จํานวน เงิน เหล่า นั้น เพิ่ม ขึ้น ราคา ของ ผม และ คุณค่า ของ เงิน สะสม. ฉันทิ้งสัญลักษณ์ไว้บนโลก และไม่มีวันลืม อย่างอื่นไม่สําคัญ"
 grand_archive.8570.g: "อะไรเปลี่ยนไป?"
 grand_archive.8570.g.reply: "§Hโลกของเยทเทรอทกําลังถูกทําลาย§!\n\nแล้วเหตุการณ์ที่เส้นทแยงเกิดขึ้น ... คุณเห็นมันใช่มั้ย? ผม ยัง จํา เสียง ร้อง ของ วิทยุ ขณะ ที่ ชีวิต ของ พวก เขา ถูก ตัด ขาด. สิ่งต่างๆมันมากเกินไป ถึงเวลาเปลี่ยนแปลงแล้ว\n\nมันมีรูปแบบที่ผมค้นพบในอาชีพของผม ประวัติศาสตร์จางหายไป บทเรียนถูกลืม ผมแค่อยากเลือกว่าใครตามล่าผม\n\nนั่นคือคุณ คุณ[root.GetSpeciesNamePlural]ผ่านการทดสอบ สิ่งที่จะเกิดขึ้นต่อไปขึ้นอยู่กับคุณ"

 grand_archive.8575.name: "ความ มั่งคั่ง เกิน กว่า จะ วัด ได้"
 grand_archive.8575.desc.default: "§Y$NESS_GRAND_ARCHIVE$§!ในนั้นมีทรัพย์สมบัติอย่างล้นเหลือ ไม่ ว่า จะ อย่าง ไร เรา ต้อง พิจารณา ถึง ผล ที่ จะ ตาม มา จาก การ อ้าง ชื่อ ของ เรา.\n\nทุกเครดิตของสมบัติของเธอ ได้รับมาอย่างผิดกฎหมาย การใช้ทรัพยากรเหล่านี้ จะเป็นตัวแทนของการยอมรับ$NAME_CaptainNess$ความเป็นอาชญากรที่มากเกินไป เพื่อแลกกับความมั่งคั่ง\n\nแล้วในหมู่พวกเขามีผู้ที่อธรรม$NAME_CaptainNess$หายไปแล้ว การเรียกร้องความมั่งคั่งนี้ จะไม่มีเหยื่อใหม่ นอกจากนี้เราได้ทําลาย§Y$NAME_BlackNeedle$§!และทําให้กาแล็คซี่เป็นสถานที่ที่ปลอดภัย เมื่อ ได้ เดิน ทาง ไกล นี้ ซึ่ง เต็ม ไป ด้วย อันตราย เรา จึง สม ควร ได้ รับ บําเหน็จ มาก มาย สําหรับ ความ พยายาม ของ เรา.\n\nเรา ต้อง ตัดสิน ใจ ว่า จะ ทํา อย่าง ไร กับ เนื้อหา ใน คัมภีร์ ไบเบิล."
 grand_archive.8575.desc.lom: "§Y$NESS_GRAND_ARCHIVE$§!เป็นขุม ทรัพย์ อัน ล้ํา ค่า ที่ สุด และ เรา ยินดี รับ เอา สมบัติ นั้น.\n\nรางวัลที่หนักหน่วงสําหรับการโค่นล้ม§Y$NAME_BlackNeedle$§!- ดื่ม 3 แก้ว[this.GetName]!\n\nเคลียร์ห้องนิรภัยนี้กันเถอะ ทั้งหมด[This.Species.GetHandNamePlural]บนดาดฟ้า!"
 grand_archive.8575.a.default: "อ้างในชื่อของเรา"
 grand_archive.8575.a.lom: "อ้างว่าก้นแข็งของเรา"
 grand_archive.8575.b: "คืนของที่แกะรอยได้ให้กับเจ้าของที่ถูกต้อง"
 grand_archive.8575.c: "กระจายความมั่งคั่งนี้ไปทั่วกาแล็กซี่"

 grand_archive.8580.name: "องครักษ์ของเรา"
 grand_archive.8580.desc.1: "§Hแมชชีนที่รู้จักกันในชื่อ§Y$NAME_CaptainNess$§!ประทับใจที่เราทิ้งห้องนิรภัยของเธอ§!\n\nเอาเลย เธอสมควรได้มัน มีเลือดมากมาย เหงื่อ และน้ําตาในขุมทรัพย์นี้ อย่าใช้มันทั้งหมดในที่เดียว"
 grand_archive.8580.desc.2: "§Hแมชชีนที่รู้จักกันในชื่อ§Y$NAME_CaptainNess$§!ถูกรบกวนด้วยความปรารถนาของเรา ที่จะเปลี่ยนบางส่วนของสมบัติของเธอ§!\n\nน่าผิดหวังจริงๆ ดังนั้นทายาท 15 รุ่น จะได้เครื่องเพชรเก่าของบรรพบุรุษ หวังว่าคุณจะใช้ทุกอย่างที่เหลือ ในโครงการที่มีค่ามากกว่า แม้จะมีหลักฐานเมื่อเร็วๆนี้ ผมเชื่อใจคุณให้ทําเรื่องนี้ให้ถูกต้อง"
 grand_archive.8580.desc.3: "§Hแมชชีนที่รู้จักกันในชื่อ§Y$NAME_CaptainNess$§!ขยะแขยงมาก ตอนเธอรู้ว่าเรา จะบริจาคเงินสะสมทั้งหมดให้เธอ§!\n\nนี่เหรอแผนของนาย? ของฟรีสําหรับทุกคน? พวกเขาทําอะไรถึงสมควรได้รับมัน เสียเวลาเปล่า!\n\nฉันคิดว่าดีกว่าของคุณ ... อย่างน้อยให้ฉันบัญชาการของบาง กองเรือของคุณเพื่อให้ฉันสามารถลองอีกครั้ง"
 grand_archive.8580.desc.default: "§Hคําถามที่เหลือของสิ่งที่จะทําอย่างไรกับ$NAME_CaptainNess$ตัวเธอเอง ใน ฐานะ นัก บิน ที่ มี ประสบการณ์ ผู้ รอด ชีวิต จาก การ เผชิญ อันตราย มาก มาย เธอ จะ เป็น ผู้ มี ค่า ยิ่ง สําหรับ กองทัพ ของ เรา ใน ฐานะ ผู้ บังคับ การ. อีกทางเลือกหนึ่ง เธอสามารถใช้บทบาทที่สนับสนุนได้มากกว่า ในการฝึกนักบินรุ่นต่อไปของเรา§!"
 grand_archive.8580.desc.no_lom: "§Hนั่นคือถ้าเราเพียงแค่การกระตุ้นให้เธอ วางตัวอย่างให้พลเมืองของเรา ว่าไม่มีอาชญากรรมใดเลย เธอต้องใช้เวลาคิดนานมาก เกี่ยวกับสิ่งที่เธอทําลงไป§!"
 grand_archive.8580.desc.gestalt: "§Hการตัดสินใจที่เหลือคือ$NAME_CaptainNess$ตัวเธอเอง ในฐานะที่มีความคิดอิสระที่มีอํานาจ เธอจะทําให้ทรัพย์สินที่ไม่ซ้ํากัน ในบทบาทผู้บัญชาการ เสนอกลยุทธ์สร้างสรรค์ ที่สามารถจับฝ่ายตรงข้าม นอกการป้องกัน อีกทางเลือกหนึ่ง เราสามารถรวมประสบการณ์การต่อสู้อันกว้างใหญ่ของเธอ เข้าไว้ในความรู้ของเรา และใช้มัน\n\nเว้นแต่เราจะขังเธอไว้เพื่อทําให้ชัดเจน ว่าความเสื่อมโทรมและอาชญากรรมนั้นไม่อาจยอมรับได้[this.GetName].§!"
 grand_archive.8580.a: "เราสามารถใช้คุณเป็นนักบิน"
 grand_archive.8580.a.tt: "เพิ่มระดับ 10§Yพลเรือเอกอมตะ§!"
 grand_archive.8580.b: "§Yเราจะรวมความรู้ของคุณ เข้ากับจิตสํานึกของเรา§!"
 grand_archive.8580.c: "§Yช่วยเราฝึกนักบินคนใหม่§!"
 grand_archive.8580.d: "§Rคุณจะเน่าอยู่ในคุก§!"

 grand_archive.8585.desc: "แค่นั้นเหรอ?\n\nคุณทิ้งผมไปเหรอ\n\nน่าผิดหวังจริงๆ ฉันคิดว่าฉันคงไปตามทางของฉัน\n\nโชคดีข้างนอกนั่นนะ"
 grand_archive.8585.a: "เราไม่ได้เป็นหนี้อะไรคุณ"

 grand_archive.8590.desc: "คุณหัวใจว่างเปล่า สะท้อน! ผมเสนอให้คุณโลก และทั้งหมดที่ผมได้ คือกุญแจมือคู่ใหม่ คุณไม่สมควรได้รับสิ่งที่ฉันให้คุณ! คุณไม่สมควรที่จะทําความสะอาดรองเท้าของฉัน!\n\nจุดดําบน[this.GetName]สาปแช่งพวกท่านทุกคน!\n\nขอให้ท่าน[this.species.GetRemnantNamePlural]ในที่ว่างเปล่าและชื่อของเจ้าจะถูกลืม"
 grand_archive.8590.a: "ไม่มีอาชญากรรมใดๆ เกิดขึ้นโดยไร้ความผิด"

 grand_archive.8595.name: "$NAME_CaptainNess$ยกเลิกการเชื่อมต่อแล้ว"
 grand_archive.8595.desc: "เครื่องจับเชลยที่รู้จักกันในชื่อ§Y$NAME_CaptainNess$§!ถูกพบไม่ใช้งานในห้องขัง เราเชื่อว่าเธอตั้งใจสร้าง ความผิดปกติในวงจรของเธอ ปิดกั้นระบบที่สําคัญ พบข้อความที่เขียนบนผนังมือถือของเธอ\n\n§Lที่ว่างเปล่ากับคุณ...§!"
 grand_archive.8595.a: "จุดจบที่เหมาะสม"

 grand_archive.8600.name: "ปลาย สาย รุ้ง"
 grand_archive.8600.desc.common: "ตอนนี้ถึงเวลาปลอมชะตาของเราแล้ว ไม่มีชาร์ตเหลือให้ตาม ดวงดาวเองจะเป็นนําทางเรา\n\nเรา จะ ทํา อะไร ได้? เราจะเป็นที่จดจําได้อย่างไร"
 grand_archive.8600.desc.default: "การผจญภัยนี้สิ้นสุดลงแล้ว การ แสวง หา ทรัพย์§Hกัปตันเนส§!เสร็จสมบูรณ์แล้ว\n\n$grand_archive.8600.desc.common$\n\nนี่คือที่ที่เรื่องราวของ[this.GetName]เริ่มต้นจริงๆ"
 grand_archive.8600.desc.lom: "พวก เขา จะ เล่า เรื่อง การ ผจญ ภัย นี้ ให้ ฟัง สัก เพียง ไร! เราค้นพบสมบัติที่ซ่อนของกัปตันเนส และไม่ให้ลูกเรือยืนในทางของเรา\n\n$grand_archive.8600.desc.common$\n\nเมาท์แจ็คของ[this.GetName]สูงและภูมิใจ ตอนนี้เรื่องของเราเริ่มต้นจริงๆ!"
 grand_archive.8600.a.default: "เดินหน้า!"
 grand_archive.8600.a.lom: "โย่ โฮ่ โฮ่!"

 valuable_insight: "ความเข้าใจที่มีค่า"
 grand_archive.9960.name: "$tech_alien_cloning$"
 grand_archive.9960.desc: "ด้วยความสําเร็จครั้งแรกของเรา การจับอวกาศป่าใน[from.solar_system.GetName]เราเชื่อว่ามันเป็นไปได้ ที่จะโคลนสัตว์เหล่านี้มากขึ้น ด้วยการลงทุนที่เหมาะสมทางวิทยาศาสตร์"
 grand_archive.9960.a: "$valuable_insight$"

 grand_archive.9970.name: "ความเป็นไปได้ของการกลายพันธุ์"
 grand_archive.9970.desc: "การโคลนอวกาศโฟนาสําเร็จครั้งแรกถูกสร้างขึ้นใน[from.solar_system.GetName].\n\nงานวิจัยของเราเกี่ยวกับสารสนเทศชี้ว่า เราสามารถทําเพิ่มเติมได้ เพื่อเพิ่มความทนทานของสิ่งมีชีวิตเหล่านี้ นี่จะทําให้เราตกแต่งกองเรือชีวภาพของเรา ด้วยส่วนประกอบการต่อสู้พิเศษ"
 grand_archive.9970.a: "$valuable_insight$"

