 DEAD_CURATORS_STAGE_1_DESC: "ถึงแม้ว่าเราจะแตกร้าวกัน เราก็ยังอยากจะเสนอบริการของเราให้คุณ เพื่อประโยชน์ในการอนุรักษ์กาแล็กซี่ เรา อาจ ช่วย คุณ ใน ขอบ เขต ที่ คุณ เลือก."
