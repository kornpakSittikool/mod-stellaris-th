 alert_space_fauna_bombardment_title: "พยาธิขาวกําลังโจมตีอาณานิคมของเรา"
 alert_space_fauna_bombardment_instant: "อาณานิคมของเรากําลังถูกระเบิดด้วยปรสิตกาแล็กซี่\nพวก เขา มี สปอร์ จํานวน จํากัด เพื่อ แจก จ่าย ใน อาณานิคม ที่ มี คน อาศัย อยู่ และ ใน ไม่ ช้า จะ ออก ไป."
 ALERT_SPACE_FAUNA_BOMBARDMENT_DETAIL: "$PLANET_NAME|Y$ใน$SYSTEM_NAME|Y$. ประชากรเหลือไว้ให้กิน:§Y$POPS_TO_KILL$§!."

 grand_archive.2195.name: "ปรสิต กาแล็กซี่"
 grand_archive.2195.desc.common_1: "[from.GetName]ถูกโจมตี\n\nพยาธิ น้ํา แข็ง กลุ่ม ใหญ่ อยู่ ใน วง โคจร ของ อาณานิคม ทํา ให้ มัน มี ปรสิต."
 grand_archive.2195.desc.common_2: "การ วิเคราะห์ ทาง ชีวเคมี บ่ง ชี้ ว่า แต่ ละ คลัตช์ ของ พยาธิ น้ํา แข็ง มี ซีส เพียง ไม่ กี่ ชนิด ที่ แจก จ่าย ออก ไป และ ดู เหมือน ว่า มัน จะ จาก ไป เมื่อ ทุก คน หมด สิ้น ไป. จนกว่าจะถึงตอนนั้น เราสูญเสียประชากรอย่างมหาศาล"
 grand_archive.2195.desc.default: "$grand_archive.2195.desc.common_1$\n\nซีสแต่ละถุงมีเขม่าพิษที่ร้ายแรงมาก ไม่เฉพาะกับชาวอาณานิคมของเรา แต่ทุกชีวิต เมื่อ กิน เข้า ไป แล้ว มัน จะ โต เต็ม ที่ จน กลาย เป็น นิ มโฟ ซึ่ง จะ ปรากฏ ขึ้น อย่าง รุนแรง และ ทําลาย เจ้า บ้าน อย่าง สิ้น เชิง. นิ มฟ์ เหล่า นี้ มี กระเพาะ ปัสสาวะ ของ ก๊าซ อัด ลม ซึ่ง ทํา ให้ มัน สามารถ ขึ้น ไป บน ชั้น บรรยากาศ ชั้น บน ซึ่ง มัน จะ ขับ เคลื่อน ตัว ไป สู่ จุด หมาย ปลาย ทาง ที่ กําหนด ไว้ ล่วง หน้า.\n\n$grand_archive.2195.desc.common_2$"
 grand_archive.2195.desc.rocks: "$grand_archive.2195.desc.common_1$\n\nซีสแต่ละซีสมีเขม่าพิษที่ร้ายแรงมาก ต่อสัตว์พื้นเมืองทั้งหมด เมื่อ กิน เข้า ไป แล้ว มัน จะ โต เต็ม ที่ จน กลาย เป็น นิ มโฟ ซึ่ง จะ ปรากฏ ขึ้น อย่าง รุนแรง และ ทําลาย เจ้า บ้าน อย่าง สิ้น เชิง. ที่ปกติกินดาวเคราะห์น้อยสําหรับโลหะที่มีค่าของพวกเขา ล่าและกินเมื่ออ่อนแอของเรา[this.GetColonistPlural]การ ฟัก ออก มา แต่ ละ ตัว มี กระเพาะ ปัสสาวะ ของ ก๊าซ อัด ลม ซึ่ง ทํา ให้ มัน ขึ้น ไป ยัง ชั้น บรรยากาศ ชั้น บน ซึ่ง โดย สัญชาตญาณ แล้ว มัน จะ เคลื่อน ตัว ไป ยัง จุด หมาย ปลาย ทาง ที่ กําหนด ไว้ ล่วง หน้า.\n\n$grand_archive.2195.desc.common_2$"
 grand_archive.2195.a: "ยกเลิกแผน"
 grand_archive.2195.a.homicidal: "พวกเขาจะต้องตาย"

