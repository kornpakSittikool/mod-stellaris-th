 # First Contacts
 first_contact_critters.15.desc.primal_calling: "หมายเหตุ, มีลําดับชั้นชั้นชั้นของแต่ละ§Hเทียนิกิ§!พอด กับวัวเอกฐาน ที่เป็นผู้นํากลุ่มในแต่ละครั้ง ตัว เมีย มี ความ สําคัญ ยิ่ง ต่อ ทรัพยากร ทาง อาหาร ทุก อย่าง โดย ทํา ให้ มัน ผลิต ก๊าซ แม่ สําหรับ ลูก และ นํา การ อพยพ ของ ฝัก. ดัง นั้น เมื่อ หา อาหาร ได้ ยาก วัว จะ ละ ทิ้ง การ บํารุง เลี้ยง เมื่อ ไร ก็ ตาม ที่ มี การ หา อาหาร ให้ มัน กิน มาก ขึ้น ขณะ ที่ ฝัก ยัง อยู่."
 first_contact_critters.25.desc.primal_calling: "ทั้งหมดยกเว้นตัวอย่างที่มีอายุน้อยที่สุดจะมาพร้อมกับ สิ่งมีชีวิตที่พึ่งพาได้ที่ควบคุมได้โดย การแอบแฝงของอาร์เอ็นเอ \"ฟลาเจลล่า\" นี้เกิดขึ้นในรูปแบบการโจมตีที่ซับซ้อน ถึงแม้ว่ามันจะดูเหมือนจะไม่มีเซรามิค§H\"สเปน อมีบา\"§!เป็นนักล่าที่เก่งธรรมชาติ"
 first_contact_critters.35.desc.primal_calling: "สิ่ง มี ชีวิต เหล่า นี้ ดู เหมือน จะ สื่อ ความ กัน โดย การ เปลี่ยน แปลง ของ สี ใน ความ สว่าง ที่ เปลี่ยน ไป. ในขณะที่สื่อนี้มีศักยภาพสูง สําหรับการแสดงออกที่ซับซ้อน มันถูกใช้ในรูปแบบพื้นฐาน โดยสิ่งมีชีวิตกึ่งที่กึ่งน่าเบื่อเหล่านี้ การ เปลี่ยน สี อาจ ใช้ เพื่อ บ่ง ชี้ ถึง ฐานะ ทาง สังคม, ความ ก้าวร้าว, และ แม้ แต่ สภาพ การ เจริญ พันธุ์."
 grand_archive.2005.desc.primal_calling: "สิ่งมีชีวิตต่าง ๆ เหล่านี้ไร้ความสามารถธรรมชาติ ที่จะแพร่พันธุ์และต้องพึ่งพาการเข้าครอบครอง สสารอินทรีย์ที่เพียงพอจะต้องเก็บเกี่ยว จากดาวเคราะห์ที่มีคนอาศัยอยู่สําหรับ§H\"หนอนน้ํา\"§!เพื่อผลิตฮอร์โมนที่สําคัญภายในไตรโตสคู่ของมัน ที่รู้จักกันในชื่อ \"โทริกา\" การ เลือก คู่ ครอง ส่วน ใหญ่ แล้ว เป็น การ เสริม ลักษณะ ทาง กาย และ ขนาด ที่ เทียบ กัน."
 grand_archive.2900.desc.primal_calling: "เราเชื่อว่าสัตว์เหล่านี้เลือกดาวเคราะห์น้อย โดยอาศัยองค์ประกอบแร่ และขนาดของมัน ในขณะที่ตัวอย่างแรกที่เราพบ มีความชอบทางชีวภาพสําหรับ[GetCommonMineral]เป็น ไป ได้ ที่ แต่ ละ คน จะ พัฒนา การ ปรับ ตัว นี้ เมื่อ เวลา ผ่าน ไป โดย อาศัย สภาพ แวด ล้อม ใน ปัจจุบัน. สแกนพบว่า ร่องรอยของโลหะนี้ มีอยู่ในดาวเคราะห์น้อยของเจ้าภาพ รวมทั้งภายในระบบประสาท และระบบย่อยอาหาร§H\"เดอะชราวด์\"§!ด้วยตัวเอง"
