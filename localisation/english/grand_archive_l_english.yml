 concept_space_fauna_ship_component: "ส่วนประกอบของเรือฟือนา"
 concept_space_fauna_ship_component_desc: "ส่วน ประกอบ ของ เรือ อวกาศ ฟา นา คือ สิ่ง ที่ ได้ มา จาก การ ค้นคว้า โครงการ พิเศษ ต่าง ๆ ใน อวกาศ ฟา นา. โบนัสใด ๆ ที่ปรับใช้กับเหล่านี้จะยังใช้เมื่ออุปกรณ์เป็น§Hการพึมพํา§!บนอวกาศฟานา ตัว อย่าง ของ ส่วน ประกอบ เหล่า นี้ รวม เอา แต่ ไม่ จํากัด:\n- §H$SPACE_WHALE_WEAPON_1$§!\n- §H$AMOEBA_STRIKE_CRAFT$§!"

