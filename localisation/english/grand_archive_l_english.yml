 grand_archive.1002.name: "ชีวิต ใน ดวง ดาว"
 grand_archive.1002.desc.default: "ความว่างเปล่าเต็มไปด้วยชีวิต เราได้ค้นพบการดํารงอยู่ของ[from.GetSpaceFaunaNamePlural]แต่ข้างนอกมีอะไรอีก\n\nความสัมพันธ์ของเรากับสัตว์ป่าบน[capital_scope.GetName]อาจจะไม่เหมาะสมกับขนาดกาแล็กซี่ ช่องว่างของอวกาศ แสดงถึงระบบนิเวศใหม่ทั้งหมด และเราพบตัวเราเอง ตรงทางแยก\n\nสัตว์ประหลาดพวกนี้คืออะไร?\n\nไม่ ว่า เรา เลือก ทํา อะไร ผล ที่ ตาม มา จะ เป็น อย่าง ไร ก็ ตาม."
 grand_archive.1002.desc.homicidal: "ช่อง ว่าง อาจ เต็ม ไป ด้วย ชีวิต ของ เรา ที่ จะ ดับ หรือ ใช้. ได้ค้นพบการดํารงอยู่ของ[from.GetSpaceFaunaNamePlural]เรากระตือรือร้นที่จะหามากขึ้น เหยื่อสดหรือสัตว์ที่เป็นภาระ ทางเลือกขึ้นอยู่กับเรา"
