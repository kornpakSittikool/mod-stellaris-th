 mod_job_treasure_gatherer_per_pop_short: "\n§G+1§! $job_treasure_gatherer$ต่อ$VALUE$ £pop£"
 job_treasure_gatherer_gestalt: "สมบัติ ล้ํา ค่า"
 job_treasure_gatherer_gestalt_plural: "สมบัติ ล้ํา ค่า"
 job_treasure_gatherer_gestalt_desc: "สามารถแยกของหายากและมีคุณค่าได้ พวกมันสามารถสกัดเอาของใช้ที่มีประโยชน์มากที่สุด"
