 grand_archive.3103.name: "$resolution_cutholoid_eradication$"
 grand_archive.3103.desc: "เดอะ[global_event_country.GetGalCommunityOrGalImperium]ได้ ประกาศ ว่า คัท โฮ ลอย ด์ ไม่ ได้ รับ อนุญาต ให้ อยู่ ใน ระบบ ของ สมาชิก ชาติ อีก ต่อ ไป.\n\nเมื่อค้นพบแล้ว สัตว์เหล่านี้ต้องถูกทําลาย[Root.GetName]จะทรงพิจารณาในการลงโทษ§Rการ ละเมิด กฎหมาย กาแลกติก§!."
 grand_archive.3105.name: "$cutholoids_plural$ใน[this.GetSpeciesName]พื้นที่"
 grand_archive.3105.desc: "มี การ ค้น พบ คัท โฮ ลอย ด์ ใน[from.GetName]ระบบ ทําตามชื่อของพวกเขาเป็นแมลงอันตรายทั้งหมด[global_event_country.GetGalCommunityOrGalImperium]สมาชิก มี พันธะ ตาม กฎหมาย ที่ จะ ทํา ให้ คอร์ด โฮ โร ลอยด์ ใด ๆ ที่ มี อยู่ ภาย ใน พรม แดน ของ พวก เขา ลด ลง ทันที.\n\nเดอะ[Root.GetName]จะทรงพิจารณาในการลงโทษ§Rการ ละเมิด กฎหมาย กาแลกติก§!จนกว่า คัตฮอลลอยด์จะถูกกําจัด หรือไม่ก็ถูกขับออกจากระบบของเรา"
 grand_archive.3107.desc: "การ ปรากฏ ของ คัท โฮ ลอย ด์ ต่อ เนื่อง ใน ตัว เรา[invaded_system.GetName]ระบบเป็นสิ่งสําคัญ§Rการ ละเมิด กฎหมาย กาแลกติก§!ภายใต้$resolution_cutholoid_eradication$มติ มันมีผลตามมา[global_event_country.GetGalCommunityOrGalImperium]อนุญาตให้สมาชิกลงคะแนนเสียงในการตัดสิน[Root.GetName]."

 grand_archive.3011.name: "เรือ วิทยาศาสตร์ สูญ เสีย"
 grand_archive.3011.desc: "การติดต่อหายไปกับเรือวิทยาศาสตร์ของเรา ในขณะที่การสืบสวนดาวเคราะห์น้อยที่แปลกใน[cutholoid_under_radar.solar_system.GetName].\n\nเรากําลังตรวจจับสัญญาณฉุกเฉินที่อ่อน จากสถานที่สุดท้ายของพวกเขา และควรจะตรวจสอบเพิ่มเติม"
 grand_archive.3011.a: "นี่มันแย่มาก"

 grand_archive.3012.name: "การ ค้น พบ สาร สังเคราะห์"
 grand_archive.3012.desc: "มี การ ค้น พบ สิ่ง มี ชีวิต ที่ แปลก ประหลาด อีก ชนิด หนึ่ง ใน ดาว เคราะห์ น้อย§H[from.solar_system.GetName]§!ระหว่างการสํารวจปกติ\n\nเราควรหลีกเลี่ยงระบบนี้ด้วย§Hยาน วิทยาศาสตร์§!จนกว่าเราจะรู้เกี่ยวกับวัตถุอันตรายเหล่านี้"
 grand_archive.3012.a: "สืบสวนต่อไป"

 grand_archive.3016.name: "ความ ประหลาด ใจ อย่าง ยิ่ง"
 grand_archive.3016.desc.default: "ดาวเคราะห์น้อยใน[fromfrom.GetName]ทําหน้าที่เพียงเปลือกสําหรับ สิ่งมีชิวิตขนาดใหญ่ภายใน\n\nแล้วเราได้ได้ทําลาย (หมู่ชน) ซึ่งเข้มแข็งและเชื่อมั่น[this.GetName]ควรมีการสอบสวนดาวเคราะห์น้อยเพิ่มเติม\n\nมี สัตว์ เหล่า นี้ อีก มาก ที่ อยู่ นอก บ้าน รอ เหยื่อ ที่ ง่าย."
 grand_archive.3016.desc.leader_killed: "$grand_archive.3016.desc.default$โชคไม่ดี[leader.GetName]ได้รับบาดเจ็บที่ไม่สามารถแก้ไขได้"

 grand_archive.3018.name: "จาก สัตว์ ร้าย"
 grand_archive.3018.desc: "เรือวิทยาศาสตร์ของเราหายไปใน§H[current_system.GetName]§!ได้กลับมาแล้ว!\n\nรายงานมาจาก§H[leader.GetName]§!ว่าพวกเขาได้รับการกลืนทั้งหมดโดยสิ่งมีชีวิตจากอวกาศที่ซ่อนอยู่ภายในดาวเคราะห์น้อยและอยู่ที่ขีดของความซื่อสัตย์ของเรือ ก่อนที่จะถูกขับออกไปอย่างไม่คาดคิด มันปรากฎอะไรบางอย่าง ที่ทําให้สัตว์ประหลาดประหลาดใจ ก่อนที่เราจะเข้าไปแทรกแซง\n\nเราควรระมัดระวังในวิธีการของเรา ของเข็มขัดดาวเคราะห์น้อยบาง จนกว่าเราจะสามารถเรียนรู้มากขึ้น"
 grand_archive.3018.a: "โชคดีจัง"

 grand_archive.3020.name: "เรือ วิทยาศาสตร์ สูญ เสีย"
 grand_archive.3020.desc: "สัญญาณฉุกเฉินจาก[from.GetName]หยุดแล้ว เราสามารถสรุปเพียงเรือวิทยาศาสตร์[from.GetName]หลงทางตลอดกาล"

 alert_mia_fleet_eaten_title: "$alert_mia_title$"
 alert_mia_fleet_eaten_instant: "การสื่อสารหายไปกับยานวิทยาศาสตร์ของเรา ในขณะที่ตรวจสอบดาวเคราะห์น้อย เรากําลังตรวจจับสัญญาณฉุกเฉินที่อ่อน จากตําแหน่งล่าสุดของพวกเขา"

 cutholoid_discovered_chain_title: "กลับค่าเดิม[this.GetName]"
 cutholoid_discovered_chain_desc: "เราสูญเสียการสื่อสารกับยานวิทยาศาสตร์ของเรา[this.GetName]ใน[cutholoid_under_radar.solar_system.GetName].\n\nการส่งสัญญาณครั้งสุดท้ายของพวกเขา ระบุว่าพวกเขากําลังเริ่มต้นการสํารวจดาวเคราะห์น้อยใกล้เคียง[cutholoid_under_radar.GetName].\n\nควรระวังเมื่อเข้าสู่ระบบนี้อีกครั้ง"

 HIDDEN_CUTHOLOID_ATTACK_PROJECT: "ทําลาย แอสเตอร์อยด์"
 HIDDEN_CUTHOLOID_ATTACK_PROJECT_DESC: "ดาวเคราะห์น้อย[cutholoid_under_radar.GetName]มันไม่ใช่อย่างที่ควรจะเป็น เราควรเข้าหาด้วยกําลังทหารขนาดมหึมา และพยายามกู้ยานวิทยาศาสตร์ของเราคืนมา[this.GetName]ก่อนที่มันจะหายไปตลอดกาล"
 HIDDEN_CUTHOLOID_CAPTURE_PROJECT: "จับภาพเอสเตอร์รอยด์"
 HIDDEN_CUTHOLOID_CAPTURE_PROJECT_DESC: "ดาวเคราะห์น้อย[cutholoid_under_radar.GetName]มันไม่ใช่อย่างที่ควรจะเป็น ด้วยเทคโนโลยีที่ถูกต้อง เราสามารถจับมันได้อย่างสมบูรณ์ และได้ยานวิทยาศาสตร์ของเราคืนมาได้ง่ายๆ[this.GetName]ก่อนที่มันจะหายไปตลอดกาล"

 grand_archive.2800.name: "ต้นฉบับผิดพลาด"
 grand_archive.2800.desc: "ดาวเคราะห์น้อยผิดปกติที่เราพบใน§H[This.System.GetName]§!ดู เหมือน ว่า มี ความ รู้ ใน ธรรมชาติ. การ เข้า สู่ วง โคจร ของ วัตถุ เหล่า นี้ เป็น อันตราย อย่าง ยิ่ง และ ยาน วิทยาศาสตร์ ได้ รับ คํา แนะ นํา ให้ ออก จาก ระบบ ที่ มี ผล กระทบ ทันที จน กว่า เรา จะ รู้ มาก ขึ้น เกี่ยว กับ สิ่ง มี ชีวิต เหล่า นี้."
 grand_archive.2800.a: "สืบสวนต่อไป"

 grand_archive.2900.name: "หลอด เลือด แดง"
 grand_archive.2900.desc: "เราได้ค้นพบสิ่งมีชีวิตในอวกาศ ที่อาศัยอยู่ในดาวเคราะห์น้อย เป็นที่รู้จักกันในฐานะ \"§Hหลอด เลือด แดง§!\"สัตว์เหล่านี้คือนักล่าที่ถูกซุ่มโจมตี ที่สามารถนอนรอได้หลายปี เพื่อจับเหยื่อของมัน เรา ควร ระวัง มาก เมื่อ เข้า ไป ใกล้ เข็มขัด ดาว เคราะห์ น้อย ที่ ไม่ มี การ ตรวจ พบ ขณะ ที่ พบ ว่า เป็น อันตราย อย่าง ยิ่ง.\n\nข่าว ดี คือ ดู เหมือน ว่า มี น้อย มาก และ กระบวนการ สืบ พันธุ์ ทาง เพศ ของ พวก เขา อาจ ใช้ เวลา หลาย ร้อย ปี."
 grand_archive.2900.a: "เราควรศึกษาสัตว์เหล่านี้เพิ่มเติม"
 grand_archive.2900.b: "นักล่า ทําลายพวกมันให้หมด"
 grand_archive.2900.b.homicidal: "นักล่าจะกลายเป็นเหยื่อ"

 grand_archive.2905.name: "เปลือก หอย"
 grand_archive.2905.desc: "เปลือก ของ หอย สังข์ ไม่ ใช่ แร่ เพียง ชนิด เดียว แต่ เสริม ด้วย เส้นใย ทาง ชีววิทยา ที่ แข็ง แรง. เส้นใย เหล่า นี้ ไม่ เคย หยุด การ เจริญ เติบโต และ ประมาณ กัน ว่า ส่วน ประกอบ ของ เปลือก หอย บาง ชนิด มี ขนาด ชีวภาพ มาก กว่า 50 เปอร์เซ็นต์.\n\nเมื่อ คูล โฮ ลอย ด์ ใหญ่ เกิน กว่า ที่ ดาว เคราะห์ น้อย ของ มัน จะ มี ชีวิต อยู่ มัน จะ เสาะ หา บ้าน อีก หลัง หนึ่ง และ เริ่ม กระบวนการ ประสาน กัน อีก ครั้ง. แม้ ว่า ตาม ปกติ จะ เป็น บริเวณ ที่ เป็น พื้น ที่ กว้าง มาก แต่ มี การ สังเกต เห็น นก คัต โฮ ลอย ด์ หลาย ชนิด ใน วง โคจร ของ ผู้ ที่ ได้ รับ การ เลือก ตั้ง จาก เปลือก หอย ตัว สําคัญ. สิ่งมีชีวิตที่ใหญ่ที่สุดจะครอบครองดาวเคราะห์น้อยสด ในขณะที่อื่น ๆ จะสั่งซื้อตัวเองโดยขนาด และสลับอย่างสงบสุขกับถัดไปในบรรทัด โดย วิธี นี้ ดาว เคราะห์ น้อย ที่ พวก เขา อาศัย อยู่ มัก จะ ถูก ครอบ ครอง โดย สิ่ง มี ชีวิต หลาย สิบ ชนิด ก่อน หน้า นั้น.\n\nผล ก็ คือ ดาว เคราะห์ น้อย ที่ เล็ก ที่ สุด มี ปริมาณ ที่ สูง ที่ สุด ของ การ เสริม ทาง ชีวภาพ ดัง ที่ มี การ แลก เปลี่ยน กัน บ่อย ที่ สุด. ตัว อย่าง เหล่า นี้ มี คุณค่า ทาง วิทยาศาสตร์ ที่ สําคัญ."
 grand_archive.2905.a: "ปรับพื้นที่ให้สูงขึ้น"
 grand_archive.2905.b: "อัพเกรดเรือของเรา"

 cutholoids_hunting_buff: "นักล่าหมึก"
 cutholoids_hunting_buff_desc: "เปลือกแร่ที่อุดมไปด้วยของหลอด เลือด แดงถูกกู้หลังจากการต่อสู้นํา§G$@cutholoids_hunting_buff_mineral_reward|0$§! £minerals£เรือทุกลําถูกทําลาย"
 grand_archive.2900.b.cutholoidhunt: "§G+$@cutholoids_hunting_buff_mineral_reward|0$§! £minerals£ทุกกองเรือคัทฮอลลอยด์ถูกทําลาย"

 mod_damage_vs_country_type_cutholoids_mult: "ความ เสีย หาย ต่อ การ ตัด ไม้"
 RESEARCH_CUTHOLOIDS_PROJECT: "เดอะชราวด์การวิจัย"
 RESEARCH_CUTHOLOIDS_PROJECT_DESC: "โครง สร้าง ของ เปลือก ดาว เคราะห์ น้อย ของ คัท โฮ ลอย ด์ เป็น ชิ้น ส่วน ที่ น่า ประทับ ใจ ของ วิศวกรรม ชีวภาพ. มี อะไร อีก ที่ เรา ต้อง เรียน รู้ จาก พวก เขา."

 cutholoid_debris_01_object: "ส่วน ที่ เหลือ ของ คอด"
