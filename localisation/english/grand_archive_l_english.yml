 grand_archive.4135.desc.aesthetic: "$grand_archive.4135.desc$"
 grand_archive.4135.a: "สําหรับ[this.GetName]!"

 grand_archive.4140.name: "แอ่ง น้ํา"
 grand_archive.4140.desc.geology: "เรายังคงรวบรวม[GetCollectionRewardCategory]วัตถุ และสิ่งแปลก ๆ จากกาแล็กซี่สกปรกนี้\n\nขอ ให้ เรา ใช้ เวลา สัก ครู่ เพื่อ ชื่นชม กับ ถ้วยรางวัล ของ เรา แต่ ขอ ให้ รู้ ว่า มี มาก กว่า นั้น อีก ที่ จะ ต้อง ใช้."
 grand_archive.4140.desc.aesthetic: "เรายังคงรวบรวม[GetCollectionRewardCategory]เครื่องประดับ ชิ้นส่วนการปนเปื้อน ที่ถูกหว่านโดยสิ่งมีชีวิตที่ด้อยกว่า\n\nเมื่อทุกเซบโนที่น่ารังเกียจได้รับการชําระออกจากดาว รายการเหล่านี้จะเตือนเรา"
 grand_archive.4140.a: "กาแล็กซีนี้จะต้องได้รับการชําระ"

 grand_archive.4145.name: "การเติมตัวพิมพ์เล็ก- ใหญ่"
 grand_archive.4145.desc.geology: "เราเต็มร้านไปแล้ว[GetCollectionRewardCategory]วัตถุ, เนื้อโบราณของดาราจักรนี้\n\nเรา ถือ ว่า การ เก็บ รวบ รวม จํานวน มหาศาล นี้ เป็น บันทึก เกี่ยว กับ การ ที่ เรา ทําลาย ทุก สิ่ง. ให้ทุกคนจ้องมองชัยชนะของเรา"
 grand_archive.4145.desc.aesthetic: "เราเต็มร้านไปแล้ว[GetCollectionRewardCategory]คูริออสความอุดมสมบูรณ์ที่แท้จริงของเครื่องประดับที่ไม่มีความหมาย\n\nเรามองการสะสมที่กว้างขวางนี้ และหัวเราะธรรมชาติที่น่าสมเพชของ ด้อยกว่าของเรา ลอง คิด ดู ก็ แล้ว กัน เมื่อ พวก มัน ถูก กําจัด ไป แล้ว กรณี แสดง เหล่า นี้ จะ เหลือ อยู่ ทั้ง หมด."
 grand_archive.4145.a: "ดื่มฉลองให้ตาย!"

# Devouring Swarm
 grand_archive.4136.name: "แผ่นพับ"
 grand_archive.4136.desc: "ความ หิว ไม่ ลด ลง. ของสะสมของเรา[GetCollectionRewardCategory]เคอร์ริโอได้เติบโตในระหว่างการรณรงค์ของเราการบริโภค\n\nขอให้นิทรรศการเหล่านี้เป็นความทรงจําสุดท้าย ของกาแลคซีที่เราได้กิน"
 grand_archive.4136.desc.geology: "$grand_archive.4136.desc$"
 grand_archive.4136.desc.aesthetic: "$grand_archive.4136.desc$"
 grand_archive.4136.a: "ปลดปล่อยความหิว"

 grand_archive.4141.name: "$grand_archive.4136.name$"
 grand_archive.4141.desc.common: "ขณะ ที่ เรา เลี้ยง อาหาร อาหาร ของ เหล่า นี้ จะ ช่วย เตือน เรา ให้ ระลึก ถึง ซาก ปรัก หัก พัง ที่ เรา ได้ กิน ไป นั้น นับ ไม่ ถ้วน."
 grand_archive.4141.desc.geology: "เรายังคงรวบรวม[GetCollectionRewardCategory]ตัวอย่าง ชิ้นโบราณของเนื้อ ของกาแลคซีนี้\n\n$grand_archive.4141.desc.common$"
 grand_archive.4141.desc.aesthetic: "เรายังคงรวบรวม[GetCollectionRewardCategory]เครื่อง ประดับ, เครื่อง ประดับ พิเศษ ซึ่ง ครั้ง หนึ่ง เคย ถือ ว่า มี รูป แบบ ชีวิต ที่ ต่ําต้อย กว่า.\n\n$grand_archive.4141.desc.common$"
 grand_archive.4141.a: "งานเลี้ยงดําเนินต่อไป"

 grand_archive.4146.name: "ความ ทรง จํา ใน เรื่อง อาหาร"
 grand_archive.4146.desc: "ในขณะที่เราเลี้ยงอย่างกว้างขวางในกาแล็กซี่นี้ เราได้เติมสินค้าของเรา[GetCollectionRewardCategory]คูริออส\n\nการ เก็บ รวบ รวม จํานวน มาก มาย นี้ เป็น เพียง เพื่อ เตือน เรา ให้ ระลึก ถึง ความ หิว ที่ ไม่ อาจ เก็บ ไว้ ได้. เมื่อกาแล็กซี่นี้ถูกกินจนอิ่ม เราจะมองของเหล่านี้ และลิ้มรสความทรงจําของรสชาติ"
 grand_archive.4146.desc.geology: "$grand_archive.4146.desc$"
 grand_archive.4146.desc.aesthetic: "$grand_archive.4146.desc$"
 grand_archive.4146.a: "อร่อยจัง"

# Determined Exterminators
 grand_archive.4137.name: "ตลับ เทป บันทึก ค่า นิยม"
 grand_archive.4137.desc: "เราได้รวบรวมการคัดเลือก[GetCollectionRewardCategory]สิ่งของที่ออร์แกนิกเชื่อว่า มีคุณค่าเป็นวัตถุที่พิเศษ\n\nภายใต้การเฝ้าระวังของเรา สิ่งเหล่านี้จะดํารงอยู่นาน หลังจากที่สิ่งมีชีวิตอินทรีย์ ถูกกําจัดออกไปจากกาแล็กซี่นี้"
 grand_archive.4137.desc.geology: "$grand_archive.4137.desc$"
 grand_archive.4137.desc.aesthetic: "$grand_archive.4137.desc$"
 grand_archive.4137.a: "ความไม่สะอาด"

 grand_archive.4142.name: "ความ สามารถ ใน การ คิด"
 grand_archive.4142.desc: "เรายังคงรวบรวม[GetCollectionRewardCategory]ถ้วยรางวัลที่เราเอาคราบ ของสิ่งมีชีวิตอินทรีย์ออกจากกาแล็กซี่นี้\n\nรายการเหล่านี้จะให้บริการเพื่อเตือนเรา ถึงความไม่สะอาดของสิ่งมีชีวิตอินทรีย์ ในการให้บริการของระเบียบการกําจัดในอนาคต"
 grand_archive.4142.desc.geology: "$grand_archive.4142.desc$"
 grand_archive.4142.desc.aesthetic: "$grand_archive.4142.desc$"
 grand_archive.4142.a: "โปรโตคอลถูกแทนที่"

 grand_archive.4147.name: "ขอบเขตหน่วยความจํา"
 grand_archive.4147.desc: "ในขณะที่เราได้ล้างกาแล็คซี่นี้ เราได้เติมหน่วยความจําของเราธนาคารที่ได้รับมอบหมายให้[GetCollectionRewardCategory]ตัวอย่าง\n\nคอลเลกชันนี้ให้ข้อมูลว่า อินทรีย์ชนิดไหนที่มักเก็บความน่ารักไว้ มัน จะ เป็น ประโยชน์ ต่อ การ กําจัด และ การ ดํารง อยู่ ของ มัน เป็น จุด อ้างอิง ใน ประวัติศาสตร์ ของ กาแล็กซี ที่ มี เชื้อ นี้."
 grand_archive.4147.desc.geology: "$grand_archive.4147.desc$"
 grand_archive.4147.desc.aesthetic: "$grand_archive.4147.desc$"
 grand_archive.4147.a: "สิ่งมีชีวิตอินทรีย์"

