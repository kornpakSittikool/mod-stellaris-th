 grand_archive.2053.name: "หนอน ผีเสื้อ ที่ ถูก กําจัด"
 grand_archive.2053.desc: "ระบบสุดท้ายของหนอนไวรอยด์ถูกทําลาย และเผ่าพันธุ์ของมันก็ถูกกําจัด\n\nเรา ไม่ จําเป็น ต้อง วิตก กังวล กับ การ ระเบิด ของ พวก เขา ทาง ปรสิต อีก ต่อ ไป."
 grand_archive.2054.name: "หนอน ผีเสื้อ น้ํา แข็ง ถูก ทําลาย"
 grand_archive.2054.desc: "เราได้กําจัดระบบหนอนไวรัส\n\nพวก เขา จะ ไม่ สามารถ ใช้ ประโยชน์ จาก แหล่ง วาง ไข่ เหล่า นี้ เพื่อ เลี้ยง ดู ลูก ของ ตน ได้ อีก ต่อ ไป."

