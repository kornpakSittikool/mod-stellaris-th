 galactic_history_focus: "$EXHIBITION_GALACTIC_HISTORY$สมาธิ"
 galactic_history_focus_desc: "บทเรียนในอดีตสร้างแรงบันดาลใจให้ปัญญาในปัจจุบัน\n\n"
