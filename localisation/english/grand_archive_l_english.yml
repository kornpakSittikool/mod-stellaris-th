 xenogeology_focus: "$EXHIBITION_XENO_GEOLOGY$สมาธิ"
 xenogeology_focus_desc: "นี้ไม่ได้เป็นเพียงการสะสมหิน มันเป็นการแสดงของแร่ธาตุที่อุดมสมบูรณ์\n\n"
