 grand_archive.2000.name: "เสียง ที่ มี มาก มาย"
 grand_archive.2000.desc: "เครื่องตรวจจับชี้ถึงการปรากฏตัว[This.System.GetName]ระบบที่ส่งสัญญาณรบกวน ผ่านกาแล็กซี่ รูปแบบเดียวกันนี้ได้รับการลงทะเบียนในสแกนระยะไกล ที่มาจากส่วนที่ไม่ทราบ แม้ จะ ไม่ ชัดเจน ว่า สัญญาณ เหล่า นี้ มี เจตนา ตาม ธรรมชาติ หรือ ไม่ แต่ ก็ มี ข้อ อนุมัติ ให้ มี การ ตรวจ สอบ มาก ขึ้น."
 grand_archive.2000.a: "หาเพิ่ม"
 fcsum_voidworms_2: "เดอะ§H[This.ContactCountry.GetName]§!ถูกระบุว่าเป็นปรสิตกาแล็กซี่ ที่รู้จักกันในชื่อ \"หนอนน้ํา\""
 grand_archive.2005.name: "$NAME_Voidworms$"
 grand_archive.2005.desc: "เราได้ค้นพบว่าสัญญาณที่ขยายออกไปไกล ต้นกําเนิดจากสิ่งมีชีวิตอวกาศธรรมดา§H\"$NAME_Voidworms$\"§!ดูเหมือนกาแล็กซี่จะเต็มไปด้วยสิ่งมีชีวิตเหล่านี้ จาก ความ ยาว คลื่น ของ สัญญาณ ที่ มี ความ หลาก หลาย เรา ได้ ตัดสิน ใจ ว่า สัตว์ เหล่า นี้ จะ เติบโต ได้ หลาย ระยะ ก่อน จะ โต เต็ม ที่ ใน ขั้น สุด ท้าย. แม้ ว่า พวก เขา ไม่ ดู ก้าวร้าว ภาย นอก รูป แบบ การ สื่อ ความ ของ พวก เขา บ่ง ชี้ ถึง การ ประสาน งาน กัน ใน ขอบ เขต ที่ เป็น ตัว แทน."
 grand_archive.2005.a.homicidal: "สัตว์ไร้จิตใจต้องถูกคัดออก"
 grand_archive.2015.name: "หนอน ไวรัส"
 grand_archive.2015.desc: "พยาธิน้ําเหลืองผสมกันเป็นกลุ่มละ 3 กลุ่ม เป็นขบวนที่รู้จักกันในชื่อ \"โทริกา\" สิ่งมีชีวิตเหล่านี้ถูกผูกติดกับชีวิต ในพิธีกรรมการผสมพันธุ์ที่ไม่มีวันสิ้นสุด อย่าง ไร ก็ ตาม มัน เรียก ร้อง เจ้า ภาพ ทาง ชีวภาพ ภาย นอก เพื่อ ให้ เกิด ลูก หลาน.\n\nมันเป็นปรสิต\n\nเมื่อ โต เต็ม ที่ หนอน เวียด แต่ ละ ตัว จะ พัฒนา ซีเมนต์ ใน ระบบ สืบ พันธุ์ ของ มัน. ซีเมนต์ ป้องกัน เหล่า นี้ ประกอบ ด้วย เกม คาส ติก ที่ มี มาก ซึ่ง เมื่อ รวม กัน กับ คน อื่น ๆ ใน เท รี กา อาจ ถูก ส่ง ไป ยัง ดาว เคราะห์ ต่าง ๆ ด้วย ชีว มาส ที่ เหมาะ สม เพื่อ ให้ เกิด นินจีเอ็ม มาก ขึ้น. เจ้า ภาพ ของ พวก เขา ไม่ รอด ผ่าน กระบวนการ นี้. เราได้เห็นหลักฐานที่พวกหนอนเวียดยาน ประสานงานการทิ้งระเบิดของพวกเขา เพื่อรักษาความยั่งยืน\n\nไม่ ว่า จะ อย่าง ไร เรา เชื่อ ว่า เรา สามารถ ใช้ พลัง ของ เอนไซม์ สืบ พันธุ์ ของ มัน เพื่อ ประโยชน์ ของ เรา เอง. เรา อาจ ถึง กับ พัฒนา ภูมิ คุ้ม กัน ต่อ ความ พยายาม ใน การ สืบ พันธุ์ ของ พวก เขา."
 grand_archive.2015.a: "ทําให้ความอุดมสมบูรณ์ของพวกเขา เพื่อความต้องการของพวกเราเอง"
 grand_archive.2015.b: "น่ารังเกียจ หายารักษา"

