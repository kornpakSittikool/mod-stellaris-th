 FEDERATION_VIEW_CREATURE_DESIGNER_BUTTON_CANNOT_USE_MUTATIONS: "§Rเฉพาะผู้นําสหพันธรัฐเท่านั้น ที่สามารถออกแบบการกลายพันธุ์ สําหรับขอบเขตพื้นที่สมาชิกคนหนึ่งของสหพันธรัฐ§Yการ ตัด แต่ง ตัว§!เทคโนโลยี§!"
 FEDERATION_CREATURE_FLEET_DESC: "§Hสหพันธ์ทหารราบ§!เป็นกองเรือพิเศษที่ถูกควบคุมโดยประธานาธิบดี มันถูกออกแบบมาใน§Hสหพันธรัฐ$CREATURE_DESIGNER$§!และสามารถใช้เทคโนโลยีใด ๆ ที่มีให้กับสมาชิกของสหพันธรัฐใด ๆ สหพันธ์ทหารราบไม่มีค่าใช้จ่ายสํารอง แต่ไม่สามารถเกิน§Hสหพันธ์ความจุเรือ§!ซึ่งสมาชิกแต่ละคนมีส่วน§Y$PERC|0%$§!ของพวกเค้าเอง§Hความจุเรือ§!ถ้ากองเรืออวกาศโฟนาเติบโตขึ้นเกิน§Hสหพันธ์ความจุเรือ§!สิ่งมีชีวิตพิเศษจะถูกมอบให้กับประธานาธิบดี"

