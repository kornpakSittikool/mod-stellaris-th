 grand_archive.4555.desc: "เดอะ$grand_archive$เจ้าของ[from.GetName]ใน[fromfrom.GetName]ถูกรื้อถอนเมื่อเราได้ครอบครองระบบ\n\nพื้นที่ที่มันครอบครองอยู่ได้ถูกคืนให้เรา"

