 resolution_repeal_voidworm_eradication_desc: "เดอะ[global_event_country.GetGalCommunityOrGalImperium]ไม่ควรมีสิทธิ์ที่จะทําลายพวกหนอนไวรัส"
 resolution_repeal_voidworm_eradication_effect_success: "ทําซ้ํา§Y$resolution_voidworm_eradication$§!."

 grand_archive.2103.name: "$resolution_voidworm_eradication$"
 grand_archive.2103.desc: "เดอะ[global_event_country.GetGalCommunityOrGalImperium]ได้ ประกาศ ว่า หนอน ไวรัส ไวรัส ทั้ง หมด ไม่ ได้ รับ อนุญาต ให้ อยู่ ใน ระบบ ของ สมาชิก ชาติ อีก ต่อ ไป.\n\nจนกว่าจะถูกคัดออก หรือออกจากพื้นที่ของข้อตกลงของตัวเอง[this.GetName]จะทรงพิจารณาในการลงโทษ§Rการ ละเมิด กฎหมาย กาแลกติก§!."
 grand_archive.2105.name: "$NAME_Voidworms$ใน[this.GetSpeciesName]พื้นที่"
 grand_archive.2105.desc: "ฝูงหนอนวอยด์ได้เข้ามาในพื้นที่ของเราใน[from.GetName]ระบบ ในฐานะ[global_event_country.GetGalCommunityOrGalImperium]สมาชิก เรามีข้อผูกมัดตามกฎหมาย ให้ทําการลดจํานวนหนอนไวรอยด์ภายในเขตแดนเราทันที\n\nเดอะ[this.GetName]จะทรงพิจารณาในการลงโทษ§Rการ ละเมิด กฎหมาย กาแลกติก§!จนกว่าไส้เดือนไวด์จะหลุดออกจากพื้นที่ หรือถูกกําจัด"
 grand_archive.2107.desc: "ตัว หนอน หมึก ยัง คง มี อยู่ ใน ตัว เรา[invaded_system.GetName]ระบบเป็นสิ่งสําคัญ§Rการ ละเมิด กฎหมาย กาแลกติก§!ภายใต้$resolution_voidworm_eradication$มติ มันมีผลตามมา[global_event_country.GetGalCommunityOrGalImperium]อนุญาตให้สมาชิกลงคะแนนเสียงในการตัดสิน[this.GetName]."

