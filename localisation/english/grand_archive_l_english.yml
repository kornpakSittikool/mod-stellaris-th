 resolution_cutholoid_eradication_tooltip: "จักรวรรดิใดที่มี§Y$cutholoids_plural$§!ภายในชายแดนของพวกเขาอยู่ใน§Rการ ละเมิด กฎหมาย กาแลกติก§!จนกว่าสิ่งมีชีวิตเหล่านั้นจะถูกทําลาย"
