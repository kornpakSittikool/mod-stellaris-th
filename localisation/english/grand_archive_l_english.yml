 MESSAGE_SPACE_CRITTER_CAPTURE_SUCCESS_DESC: "การพยายามจับในระบบ $SYSTEM|Y$ สำเร็จแล้ว! $gravity_snare$ ได้ส่งสิ่งมีชีวิตตัวอย่างไปยังวิเวเรียม\n\nคุณได้รับขอบเขตพื้นที่ใหม่:\n$CAPTURED_LIST$$RESOURCES_LIST$"
 MESSAGE_SPACE_CRITTER_CAPTURE_SUCCESS_NO_VIVARIUM_DESC: "การพยายามจับในระบบ $SYSTEM|Y$ สำเร็จแล้ว! เนื่องจากไม่มีความจุ §Hดึงข้อมูล§! ว่างอยู่ สัตว์ที่จับได้จึงถูกทำให้ตายและชำแหละเพื่อนำทรัพยากรออกมาใช้\n$CULLED_LIST$$RESOURCES_LIST$"
