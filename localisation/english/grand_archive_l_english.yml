 grand_archive.4560.desc.none: "$grand_archive.4560.desc.common_1$\n\n$grand_archive.4560.desc.common_2$"

 grand_archive.4580.name: "การย้ายโครงการของวิวารี"
 grand_archive.4580.desc: "ตอนนี้ที่ใหม่$grand_archive$ได้จัดตั้งใน[from.GetName]เรามีโอกาสที่จะกู้สิ่งที่หายไปจากห้องภาพ\n\nสิ่งมีชีวิตทางพันธุกรรม จากแต่ละสายพันธุ์ของอวกาศ ฟานานา ที่เราได้เติบโตขึ้นมาก่อนหน้านี้ ได้รับการอนุรักษ์ และทรัพยากรเพียงพอ"
