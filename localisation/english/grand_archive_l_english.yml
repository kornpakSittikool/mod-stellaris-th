#########################################
 resolution_galactic_focus_crisis_voidworm_plague: "สมาธิ: โรค พยาธิ ใบ ไม้ เลือด"
 resolution_galactic_focus_crisis_voidworm_plague_desc: "ปรสิตไวรอยด์เป็นอันตรายต่อกาแล็กซี่ ถ้าเราไม่รวมพลังกันเพื่อหยุดพวกมัน พวกมันจะกินเราหมด เราควรจัดการกับวิกฤตนี้"
 resolution_galactic_focus_crisis_voidworm_plague_effect_success: "$resolution_galactic_focus_crisis_effect_success$"
