 grand_archive.5015.name: "การ ก่อ ตั้ง ทรัพย์ สมบัติ"
 grand_archive.5015.desc: "เดอะ§Y$celestial_chart$§!ได้ให้ข้อมูลการประเมินค่า ที่มีประโยชน์ในการแยกค่ามากขึ้น จากสมบัติที่เราค้นพบ เราควรกําหนด§Yทรัพย์ อัน ล้ํา ค่า§!บนดาวเคราะห์ดวงใดดวงหนึ่ง ที่สามารถที่จะเรียงของมีค่าได้, บูรณะใหม่, และเก็บรักษาไว้ โดย อาศัย การ บันทึก เสียง ปัจจุบัน ดาว เคราะห์ ต่อ ไป นี้ เหมาะ กับ การ ติด ตั้ง ใหม่ นี้."
 grand_archive.5015.a: "สร้าง$d_treasure_planet$บน§Y[event_target:treasure_planet_candidate_1.GetName]§!."
 grand_archive.5015.b: "สร้าง$d_treasure_planet$บน§Y[event_target:treasure_planet_candidate_2.GetName]§!."
 grand_archive.5015.c: "สร้าง$d_treasure_planet$บน§Y[event_target:treasure_planet_candidate_3.GetName]§!."

