 space_amoeba_UNIQUE_MUTATION_PROJECT: "โครงการกีฬา กลาย พันธุ์"
 space_amoeba_UNIQUE_MUTATION_PROJECT_DESC: "ใน ระหว่าง การ ฝึก อบรม ของ เรา เกี่ยว กับ สิ่ง มี ชีวิต ปลอม ที่ ได้ รับ บาด เจ็บ จาก อวกาศ อา โม บา ใช้ เทคนิค ใหม่ เพื่อ เอา ชนะ คู่ ต่อ สู้. เครื่องราชอิสริยาภรณ์ของอาโมบา สามารถดูดซึมสารอาหารและวัสดุ จากการป้องกันตามธรรมชาติของคู่ฝึก ใช้มันเจาะเกราะของพวกมัน\n\nงานวิจัยเพิ่มเติมเกี่ยวกับปรากฏการณ์นี้ อาจเผยให้เห็นองค์ประกอบใหม่ ของชีววิทยาอวกาศอมีบา ที่สามารถเพิ่มข้อมูล"
 tiyanki_UNIQUE_MUTATION_PROJECT: "ทาอานกิโครงการการกลายพันธุ์"
 tiyanki_UNIQUE_MUTATION_PROJECT_DESC: "เมื่อ เร็ว ๆ นี้ กอง เรือ ที่ โคลน เข้า มา ของ ติ ยัน คี ได้ มี การ สังเกต เห็น การ ประสาน เสียง กัน ของ การ เปล่ง เสียง ที่ ซับ ซ้อน หลาย ครั้ง. เสียง ที่ แทบ จะ หา พบ ไม่ ได้ ดู เหมือน จะ ทํา ให้ สัตว์ ทุก ชนิด ที่ อยู่ ใกล้ ๆ รู้สึก สบาย ใจ และ สงบ ใจ.\n\nการค้นคว้าเพิ่มเติมเกี่ยวกับปรากฏการณ์นี้ อาจเผยให้เห็นองค์ประกอบใหม่ของชีววิทยาไทยานีกี ที่สามารถเพิ่มข้อมูล"
 voidworm_UNIQUE_MUTATION_PROJECT: "โครงการการกลายพันธุ์ของ หนอน ผีเสื้อ"
 voidworm_UNIQUE_MUTATION_PROJECT_DESC: "เราสังเกตเห็นว่าหนอนไวรัสบางชนิดของเรา มีแนวโน้มที่จะพัฒนา การเจริญเติบโตที่เล็กเหมือนซีส เมื่อมันถึงวัยผู้ใหญ่ การ สังเกต เพิ่ม เติม แสดง ว่า ตัว อย่าง ที่ มี แผล พุ ออก มา อย่าง ไม่ น่า เชื่อ เหล่า นี้ มัก จะ อุดม สมบูรณ์ กว่า ตัว ที่ มี ลักษณะ คล้าย กัน.\n\nการค้นคว้าเพิ่มเติมเกี่ยวกับปรากฏการณ์นี้ อาจเผยให้เห็นองค์ประกอบใหม่ ของชีววิทยาของหนอนไวรอยด์ ที่สามารถเพิ่มข้อมูล"
 cutholoid_UNIQUE_MUTATION_PROJECT: "โปรเจกต์การลดรอยหยัก"
 cutholoid_UNIQUE_MUTATION_PROJECT_DESC: "ผล สืบ เนื่อง จาก การ ให้ อาหาร มาก เกิน ไป มี การ บันทึก แผ่น หนัง ของ เรา ซึ่ง ทํา ให้ กระเพาะ ของ มัน ออก มา อย่าง รุนแรง. ของเหลวจากระบบย่อยอาหาร ส่งผลให้ค่อนข้างร้ายแรง เป็นกระสุนที่เข้มข้น รักษาคุณภาพกัมมันตรังสีของมัน\n\nการค้นคว้าเพิ่มเติมเกี่ยวกับปรากฏการณ์นี้ อาจเผยให้เห็นองค์ประกอบใหม่ ของชีววิทยาคัทฮอลลอย ที่สามารถเพิ่มข้อมูล"
 crystalline_entity_UNIQUE_MUTATION_PROJECT: "คริสตัลไลน์ โครงการการกลายพันธุ์"
 crystalline_entity_UNIQUE_MUTATION_PROJECT_DESC: "ในการทดสอบการต่อสู้ คริสตัลไลน์ของเราจํานวนมาก ได้แบ่งออกเป็นสองอย่างสมบูรณ์แบบ หลังจากที่ถูกทําลาย ส่วน ผสม เหล่า นี้ ได้ รักษา สัญญาณ ชีวิต ที่ สําคัญ ไว้ และ มี ชีวิต อยู่ ต่อ ไป ชั่ว ระยะ เวลา สั้น ๆ."
 tiyanki_matriarch_UNIQUE_MUTATION_PROJECT: "$NAME_Elderly_Tiyanki$โครงการการกลายพันธุ์"
 tiyanki_matriarch_UNIQUE_MUTATION_PROJECT_DESC: "วัสดุทางพันธุกรรมที่เราได้ค้นพบจาก$NAME_Elderly_Tiyanki$ได้ให้ความเข้าใจที่พิเศษบางอย่าง ที่จะช่วยให้เราสามารถดําเนินการได้ ด้วยโครงการการเปลี่ยนแปลงในการทดลอง"
 voidspawn_UNIQUE_MUTATION_PROJECT: "โครงการการ กลาย พันธุ์"
 voidspawn_UNIQUE_MUTATION_PROJECT_DESC: "วัสดุทางพันธุกรรมที่เราได้ค้นพบจาก$NAME_Voidspawn$ได้ให้ความเข้าใจที่พิเศษบางอย่าง ที่จะช่วยให้เราสามารถดําเนินการได้ ด้วยโครงการการเปลี่ยนแปลงในการทดลอง"

 unique_mutation_project_unlock_desc: "ของเรา[From.GetShipCategoryName]ความพยายามโคลนนิ่งทําให้เกิดการพัฒนาทางพันธุกรรม มันเป็นไปได้ที่จะรวมกายวิภาคกายวิภาคของสัตว์เหล่านี้ เข้ากับความเชี่ยวชาญของเรา ในการจัดการยีน"
