 grand_archive.4560.desc.common_1: "ของเรา$grand_archive$ใน[from.GetName]ถูกรื้อถอนเมื่อพวกเราสละระบบ"
 grand_archive.4560.desc.common_2: "เรา สามารถ กู้ อัล ลอย ได้ มาก มาย ที่ ใช้ ใน การ ก่อ สร้าง แรก เดิม. เราต้องสร้างโครงสร้างใหม่ทั้งหมด ในระบบอื่น เพื่อจัดนิทรรศการต่อไป"
 grand_archive.4560.desc.specimen: "สเปกตรัมทั้งหมด ได้รับการเก็บและจัดเก็บอย่างถูกต้องจนถึงใหม่$grand_archive$สามารถสร้างได้"
