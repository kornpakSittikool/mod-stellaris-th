 approach_voidworm_plague_search_for_cure: "ค้น หา วิธี รักษา"
 approach_voidworm_plague_search_for_cure_tt: "ถ้าเราสามารถทําลายวงจรทางชีวภาพของพวกเขา$NAME_Voidworms$จะไม่สามารถทําซ้ําได้ในกาแล็กซี่นี้\nสถานการณ์$SITUATION_MONTHLY_CHANGE$: §G+1.0§!"
 change_approach_will_temporarily_lock: "§Sการนําวิธีการนี้มาใช้ จะล็อควิธีการอื่น ๆ สําหรับ§Y$@voidworm_plague_approach_cooldown_years|0$ปี§!.§!"
 too_early_to_change_approach: "§Sมันเร็วเกินไปที่จะเปลี่ยนแปลงสถานการณ์อีกครั้ง§!"

 voidworm_crisis_eradicate_chain_title: "กําจัด$NAME_Voidworms$"
 voidworm_crisis_eradicate_chain_desc: "ประชากรของหนอนไวรัสในกาแล็กซี่ ได้ถึงระดับที่จับต้องไม่ได้ และต้องถูกกําจัดทิ้ง\n\nเราอยู่ที่ที่เหลือแล้ว§Yหนอน ผีเสื้อ§!นั่นต้องถูกทําลาย"
 voidworm_system_poi_title: "ทําลาย[prev.GetName]"
 voidworm_system_poi_desc: "§Yหนอน ผีเสื้อ§!ตรวจพบในระบบนี้\n\nทําลายพวกเขาเพื่อหยุดการสร้างปรสิตมากขึ้น"

 # Voidworms Plague Crisis Random Events #

 grand_archive.2400.name: "ส่วนประกอบการแยกส่วน"
 grand_archive.2400.desc: "กองเรือที่เพิ่มขึ้นสนับสนุนเรา ในความพยายามต่อต้าน$NAME_Voidworms$ส่งผลให้ส่วนประกอบเพิ่มเติมที่ไม่คาดคิดลดลง เนื่องจากการปรับปรุงระเบียบการบํารุงรักษา เรามีโอกาสที่จะลงทุนวัสดุเหล่านี้ เพื่อปรับปรุงการผลิตในระยะสั้นของเราของกองทัพเรือใหม่"
 grand_archive.2400.a: "ลงทุนในการเสริมสร้าง"
 grand_archive.2400.b: "รักษาเงินสํารองไว้"

 grand_archive.2405.name: "เรียก แขน"
 grand_archive.2405.desc.default: "การเตรียมพร้อมของเราอย่างต่อเนื่องเพื่อต่อสู้กับหนอนไวรัส ได้สร้างแรงบันดาลใจให้กับผู้บัญชาการรุ่นใหม่ พลเมืองที่มีประสบการณ์[this.GetName]เลือกที่จะเสนอความสามารถของพวกเขา ในการกําจัดภัยคุกคามนี้"
 grand_archive.2405.desc.gestalt: "การเตรียมพร้อมของเราอย่างต่อเนื่องเพื่อต่อสู้กับพวกหนอนไวรัส ทําให้เราสามารถผลิตโหนดผู้นําระดับผู้บัญชาการได้ โดยให้การสนับสนุนเพิ่มเติมกับกองเรือของเรา โหนดต่อสู้เหล่านี้ได้รับทรัพยากรที่เพิ่มขึ้น"
 grand_archive.2405.a: "แรงบันดาลใจ"
 grand_archive.2405.tt: "รีเฟรชของเรา§H$RECRUITABLE_LEADERS$§!เพิ่มอีก 3§Hผู้บัญชาการ§!ด้วยระดับพิเศษ"

 grand_archive.2410.name: "การพัฒนาบรรทัดหน้า"
 grand_archive.2410.desc.default: "วิศวกรประจําตําแหน่ง[random_shipyard.GetName]ได้พัฒนาพิมพ์เขียวใหม่สําหรับการป้องกันเรือ[random_shipyard.leader.GetHeSheCap]กําลังดําเนินการซ่อมแซมตามปกติ ในการต่อสู้กับหนอนไวรัส[random_shipyard.leader.GetHeShe]ได้ไอเดียสําหรับส่วนประกอบใหม่ ที่จะเพิ่มความยากของหลอดเลือด หลัง จาก มี การ เสนอ แนว คิด นี้ แก่ แผนก วิจัย ของ เรา เรา เชื่อ ว่า ความ คิด นี้ มี ศักยภาพ มาก."
 grand_archive.2410.desc.gestalt: "การ ซ่อมแซม[root.GetIndividualName]ประจําที่[random_shipyard.GetName]ได้สร้างแรงบันดาลใจในการค้นคว้าใหม่ เพื่อปรับปรุงการป้องกันเรือ หลังจากการสื่อสารผิดพลาด ระหว่างการซ่อมแซมตามปกติ[root.GetIndividualName]ใช้ส่วนผสมของวิธีการและวัสดุอย่างแปลกประหลาด เพื่อสร้างองค์ประกอบการคุ้มครองใหม่ หลัง จาก สํารวจ ความ เป็น ไป ได้ ใน การ วิจัย แล้ว การ ค้น พบ โดย บังเอิญ นี้ ได้ แสดง ให้ เห็น ว่า มี ศักยภาพ มาก มาย ที่ เคย ถูก ขัด เกลา."

 grand_archive.2420.name: "[infected_leader.GetName]ติดเชื้อแล้ว"
 grand_archive.2420.desc: "ในการแสดงของ[infected_leader.GetHisHer]หน้าที่[infected_leader.GetName] [infected_leader.GetHasHave]ติดเชื้อจากหนอนไวรัส มันจะไม่นานจนกว่าจุดใหม่ปรากฏขึ้นและทําลายโฮสต์ของพวกเขา\n\nมันอาจจะเป็นสาเหตุที่สูญหาย แต่คณะแพทยศาสตร์ คาดว่ามันอาจจะเป็นไปได้ ที่จะสกัดตัวอ่อน ก่อนที่พวกมันจะรวมเข้าด้วยกันอย่างสมบูรณ์[infected_leader.GetHisHer]ระบบประสาท มันเป็นขั้นตอนที่เสี่ยง แต่[infected_leader.GetName]ดูเหมือนเราจะลองดู"
 grand_archive.2420.a: "กําจัดพวกมัน"
 grand_archive.2420.b: "ดึงตัวอ่อนออกมา"

 grand_archive.2425.name: "รอยแยกของควอนตัม"
 grand_archive.2425.desc.common: "กลุ่ม เล็ก ๆ ที่ ติด เชื้อ[infected_planet_pop.species.GetName]ได้หนีจากการกวาดล้าง[infected_planet.GetName]และกระจัดกระจายไปทั่วระบบของเรา โดยไร้การควบคุม นี่อาจทําให้เกิดการระบาดของพยาธิขาว[this.GetName]."
 grand_archive.2425.desc.default: "$grand_archive.2425.desc.common$คน เหล่า นั้น ที่ หนี ต้อง ได้ รับ การ จัด การ ก่อน ที่ พวก เขา จะ เป็น อันตราย ต่อ เรา ทุก คน."
 grand_archive.2425.desc.rogue: "$grand_archive.2425.desc.common$คนที่หลบหนีจะต้องจัดการกับ ก่อนที่จะเป็นอันตรายอื่น ๆ ของเรา"
 grand_archive.2425.desc.gestalt: "$grand_archive.2425.desc.common$คน เหล่า นั้น ที่ หนี ต้อง ได้ รับ การ จัด การ ก่อน ที่ จะ เป็น อันตราย ต่อ กลุ่ม ที่ ใหญ่ กว่า."
 grand_archive.2425.desc.robot: "ตัว อย่าง ของ พืช ที่ ติด เชื้อ และ ฟูนา ที่ มี เครื่องหมาย สําหรับ การ วิเคราะห์ ถูก ดําเนิน การ อย่าง ผิด ๆ ใน ทาง ใด ทาง หนึ่ง ฐานะ เป็น อาหาร ทั่ว ไป. ภาย หลัง ความ ผิด พลาด นี้ สสาร อินทรีย์ จํานวน มาก จึง ถูก ทํา ให้ ปน เปื้อน ด้วย พยาธิ ไวรัส และ บัด นี้ ต้อง กําจัด เสีย."
 grand_archive.2425.a.default: "ตามล่าพวกมัน"
 grand_archive.2425.a.default.tt: "- 1 ป๊อปออร์แกนในแต่ละอาณานิคม"
 grand_archive.2425.a.robot: "เผาเสบียงอาหารซะ"
 grand_archive.2425.a.robot.tt: "$@infected_devastation|0$ความเสียหายบนดาวเคราะห์ที่ไม่ติดเชื้อทั้งหมด"
 grand_archive.2425.b: "ไม่ทําอะไรเลย"
 grand_archive.2425.b.tt: "ไส้ เดือน ที่ ว่าง เปล่า อาจ ปรากฏ อยู่ ใกล้ ๆ กับ อาณานิคม ของ เรา!"

 grand_archive.2430.name: "การ ลด ความ รับ ผิด ชอบ"
 grand_archive.2430.desc: "ขณะ ที่ มี การ เห็น พ้อง กัน ว่า การ กําจัด ผู้ ติด เชื้อ เป็น แนว ทาง ที่ สุขุม ที่ สุด แต่ ทหาร หลาย คน กําลัง พยายาม ทํา ตาม คํา สั่ง. แม้ ว่า จะ เป็น อันตราย ต่อ ปรสิต ไว อยด์ หลาย คน เพียง แต่ ไม่ สามารถ ขจัด เพื่อน ร่วม ชาติ ของ ตน ได้ เพื่อ ผล ดี กว่า.\n\nต้องทําอะไรสักอย่างเพื่อป้องกัน การติดเชื้อของพยาธิขาว จากการแพร่กระจายผ่านอาณานิคมของเรา เรา อาจ ทํา ให้ บาง ส่วน ของ กระบวนการ ชําระ ให้ บริสุทธิ์ เป็น อัตโนมัติ เพื่อ จะ มี ทหาร น้อย ลง. อีกทางเลือกหนึ่ง เราสามารถเปิดตัวการรณรงค์สั้น ๆ เพื่อส่งเสริมมาตรฐานจริยธรรม"
 grand_archive.2430.a: "กระบวนการชําระอัตโนมัติ"
 grand_archive.2430.b: "เริ่มการรณรงค์ประชาสัมพันธ์"

 grand_archive.2440.name: "Tangential Breakthrough"
 grand_archive.2440.desc: "การ ที่ เรา ค้น หา วิธี รักษา โรค พยาธิ ชนิด นี้ ทํา ให้ มี การ วิจัย ใน สาขา ชีววิทยา อื่น ๆ ที่ คล้าย กัน. ขณะ ที่ ปรสิต ยัง คง เป็น สิ่ง สําคัญ อันดับ แรก สําหรับ เรา ใน ปัจจุบัน แต่ ความ ก้าว หน้า ใหม่ นี้ มี ศักยภาพ อย่าง ยิ่ง สําหรับ การ ศึกษา ใน อนาคต."

 grand_archive.2445.name: "ทดสอบก่อนเวลา"
 grand_archive.2445.desc.common: "ความ เข้าใจ ของ เรา ใน เรื่อง โรค พยาธิ ใบ ไม้ เลือด กําลัง ดี ขึ้น และ มี การ พัฒนา รากฐาน ของ การ รักษา."
 grand_archive.2445.desc.default: "$grand_archive.2445.desc.common$อย่างไรก็ตาม งานวิจัยของเราสามารถก้าวหน้าได้เร็วขึ้นมาก ด้วยการทดสอบสดระยะแรก[owner_main_species.GetAdj]ผู้มีส่วนร่วม\n\nนอก จาก การ พิจารณา อย่าง รอบคอบ แล้ว อาจ เป็น การ สุขุม กว่า ที่ จะ ข้าม มาตรการ ด้าน ความ ปลอด ภัย บาง อย่าง เพื่อ ประโยชน์ ของ ผู้ ใหญ่."
 grand_archive.2445.desc.gestalt: "$grand_archive.2445.desc.common$อย่างไรก็ตาม กระบวนการทดสอบคือเวลาดําเนินการหลักเนื่องจากความต้องการอย่างต่อเนื่องสําหรับการว่าง[root.GetIndividualNamePlural]ในหน้าที่ ถ้า[root.GetIndividualNamePlural]อาจถูกมอบหมายให้เข้ารับบททดลอง การรักษาจะพัฒนาได้เร็วขึ้น\n\nผลกระทบที่จะตามมา จะเกิดขึ้นที่อื่นๆ ทั่วทั้งกลุ่ม[root.GetIndividualNamePlural]ออกจากบทบาทก่อนหน้านี้ของพวกเขาในการถอด"
 grand_archive.2445.a.default: "ทดสอบเมื่อไม่รู้จัก[owner_main_species.GetNamePlural]."
 grand_archive.2445.a.gestalt: "ทดสอบก่อนเวลา"
 grand_archive.2445.b.default: "ทดสอบเฉพาะอาสาสมัครเท่านั้น"
 grand_archive.2445.b.gestalt: "สืบค้นต่อไป"
 grand_archive.2445.c: "ไม่มีการทดสอบทางศีลธรรม"

 grand_archive.2450.name: "พยาธิ แมลง"
 grand_archive.2450.desc: "เราได้ค้นพบรูปแบบหนึ่ง ในวงจรของหนอนไวรอยด์ ที่สามารถนําไปสู่การพัฒนาครั้งใหญ่ ในการสังเคราะห์การรักษา\n\nเพื่อยืนยันสมมติฐานนี้ ต่อมสืบพันธุ์ของป่า$voidworms_titan$ต้องเก็บสะสมเพื่อวิเคราะห์ ตามหลักแล้ว$voidworms_titan$ต้องถูกฆ่าในขณะที่กําลังทิ้งระเบิดใส่โลก เพื่อรักษาการสืบพันธุ์ของเกม"
 grand_archive.2450.a: "เราไม่มีเวลาสําหรับเรื่องนี้"
 grand_archive.2450.b: "คุณจะได้ต่อมของคุณ"

 VOIDWORM_GLANDS_PROJECT: "เมือง โต รกา"
 VOIDWORM_GLANDS_PROJECT_DESC: "เราได้ค้นพบความคืบหน้าในการค้นหา เพื่อรักษาภัยพิบัติของพยาธิ สิ่ง ที่ จําเป็น อย่าง ยิ่ง ก็ คือ ต่อม สืบ พันธุ์ ของ หนอน ผีเสื้อ เวียด ใน สภาพ การ เจริญ พันธุ์ ที่ รุนแรง."
 VOIDWORM_GLANDS_PROJECT_TOOLTIP: "§Rการ เก็บ เศษ ซาก ปรัก หัก พัง ของ ชาว โต ริกา ทํา ให้ ดาว เคราะห์ ดวง หนึ่ง ระเบิด อย่าง ขัน แข็ง.§!"

 VOIDWORM_TITAN_DEBRIS_PROJECT: "$NAME_Voidworms_Troika$คงที่"
 VOIDWORM_TITAN_DEBRIS_PROJECT_DESC: "ซาก ของ หนอน เวียด\n\nอวัยวะเหล่านี้จะขยายความเข้าใจของเราอย่างมาก เกี่ยวกับชีววิทยาของสิ่งมีชีวิต และช่วยในการกําจัดเชื้อไวรัสไวรอยด์"

 grand_archive.2455.name: "ข้อมูล"
 grand_archive.2455.desc: "ต่อม เหล่า นี้ ที่ ฟื้น ตัว จาก พยาธิ น้ํา แข็ง ที่ อุดม สมบูรณ์ ของ หมึก ตรุ กา เผย ให้ เห็น ข้อมูล ใหม่ เกี่ยว กับ วัฏจักร การ สืบ พันธุ์ ของ มัน.\n\nถูกขังอยู่ในพิธีกรรมการผสมพันธุ์จนกระทั่งเสียชีวิต พยาธิตัววีรอยด์สามตัวในอ้อมกอดการสืบพันธุ์\n\nเราสามารถใช้กระบวนการเหล่านี้ ของความทนทานทางพันธุกรรมกับพวกเขา"

 grand_archive.2500.name: "การ ค้น พบ วิธี รักษา"
 grand_archive.2500.desc.default: "เราได้พัฒนาการรักษาที่สุดยอด ของการระบาดของพยาธิปรสิต อาณานิคมของเราไม่ได้อ่อนแอ ต่อการทิ้งระเบิดของสปอร์ของพวกเขาอีกต่อไป และเราไม่จําเป็นต้องกังวลอีกต่อไป"
 grand_archive.2500.desc.tech: "$grand_archive.2500.desc.default$\n\nเรามั่นใจว่าครั้งนี้ การรักษาที่เราพัฒนาขึ้น จะป้องกันการกลายพันธุ์ในอนาคต ของชีววิทยาของพวกเขา"

