 approach_voidworm_plague_support_fleets: "สนับสนุน กอง เรือ ของ เรา"
 approach_voidworm_plague_support_fleets_tt: "เราสามารถสละคุณภาพชีวิตจํานวนเล็กน้อย เพื่อสนับสนุนกองเรือทหารของเรา ต่อสู้กับหนอนแมลง\nสถานการณ์$SITUATION_MONTHLY_CHANGE$: §G+0.5§!"
 approach_voidworm_plague_purge_infected_pops: "กําจัดสิ่งปนเปื้อน"
