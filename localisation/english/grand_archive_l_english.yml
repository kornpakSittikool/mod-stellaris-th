 treasure_troves_chain_title: "สมบัติ ล้ํา ค่า"
 treasure_troves_chain_desc: "ตลอดประวัติศาสตร์ของกาแล็คซี่นี้ โจรสลัดได้ซ่อน ผลประโยชน์ที่ไม่เหมาะสมของพวกเขา ไว้ในครอบครองอย่างรอบคอบ ที่ซ่อนลับหลายแห่งถูกละทิ้งและพิจารณาว่าสูญหาย แต่ตอนนี้มันเป็นของเราสําหรับการยึด"

 mod_treasure_trove_reward_mult: "บําเหน็จ อัน ล้ํา ค่า"

 grand_archive.6010.name: "$TREASURE_TROVE$พบ"
 grand_archive.6010.desc: "เราตรวจพบสัญญาณลมจากที่ไหนสักแห่ง[event_target:treasure_trove_planet.GetName]...ตามหลักจรรยาบรรณศาสตร์ เราเชื่อว่านี่มาจากโจรสลัดที่หายไปนาน§Y$TREASURE_TROVE$§!.\n\nมันต้องใช้ความพยายามบางส่วน แต่เรามั่นใจว่า เราจะสามารถเผยความลับออกมา"
 grand_archive.6010.a: "เปิดเผยตําแหน่งของมัน"

 grand_archive.6015.name: "ทรัพย์ ที่ ได้ คืน มา"
 grand_archive.6015.common.1: "หลังจากปลดอาวุธป้องกันของโจรสลัดที่ซ่อนอยู่§Y$TREASURE_TROVE$§!บน[event_target:treasure_trove_planet.GetName]"
 grand_archive.6015.desc: "$grand_archive.6015.common.1$เราได้ค้นพบแหล่งทรัพยากรที่มีคุณค่า\n\nเรา จะ ใช้ ประโยชน์ จาก รางวัล ที่ ไม่ คาด คิด นี้."
 grand_archive.6015.desc.specimen: "$grand_archive.6015.common.1$เราได้ค้นพบวัตถุของโจรสลัดโบราณ ที่ถูกเก็บรักษาไว้ในภาชนะที่ปิดตาย ส่วนนี้ของประวัติศาสตร์บูคานิเออร์ จะถูกเพิ่มเข้าไปในคอลเลกชันของเรา"
 grand_archive.6015.desc.specimen_extra: "นอกจากนี้เราได้ค้นพบสิ่งประดิษฐ์ของโจรสลัดโบราณที่ซ่อนอยู่ภายในกว้างใหญ่§Y$TREASURE_TROVE$§!ด้วย การ ฟื้นฟู อย่าง ระมัดระวัง ชิ้น ส่วน ของ ประวัติศาสตร์ ของ นัก ฟอก หนัง นี้ จะ เพิ่ม ขึ้น อย่าง น่า ทึ่ง ใน การ รวบ รวม ของ เรา."
 grand_archive.6015.desc.pirate_ship: "หลังจากปลดอาวุธผู้สูญหาย§Y$TREASURE_TROVE$§!เราค้นพบแนวทางของแอนตาล็อก ที่นําไปสู่จุดบนดาวเคราะห์ด้านล่าง เราพบเรือรบของโจรสลัดที่เหลือเชื่อ ที่ป้องกันโดยกองทัพต่อต้านการตรวจจับ\n\nยานลํานี้ ชื่อ[treasure_trove_pirate_ship.GetName]ถูกอ้างว่าเป็นทหารของเรา"
 grand_archive.6015.desc.tech: "$grand_archive.6015.common.1$เราได้ค้นพบแหล่งข้อมูล ของงานวิจัยที่หายากและมีคุณค่า\n\nไม่ มี ใคร รู้ ว่า คน เหล่า นี้ ได้ มา อย่าง ไร แต่ เรา สามารถ ใช้ ประโยชน์ จาก สิ่ง เหล่า นี้ ได้ เป็น อย่าง ดี."
 grand_archive.6015.a: "$GOOD$"
