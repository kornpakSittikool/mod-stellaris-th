 grand_archive.10010.name: "โครงการขอบเขตการกลายพันธุ์เสร็จสมบูรณ์แล้ว"
 grand_archive.10010.desc: "โครงการกลายพันธุ์ในการทดลองของเรา§Yขอบเขตพื้นที่:§!จะสมบูรณ์และมีให้บางบุลใหม่ที่น่าสนใจ: ใช้ได้§Y$tech_unique_mutation_space_amoeba$§!.\n\nสิ่ง มี ชีวิต ที่ มี ความ ซับ ซ้อน เหล่า นี้ สามารถ ดูด ซับ พลัง งาน จาก วัตถุ ที่ อยู่ ใกล้ ๆ และ นํา กลับ ไป ยัง เจ้า ภาพ ได้ ทํา ให้ สิ่ง มี ชีวิต และ สร้าง ขึ้น ใหม่."
 grand_archive.10015.name: "โครงการการ กลาย พันธุ์เสร็จสมบูรณ์แล้ว"
 grand_archive.10015.desc: "โครงการกลายพันธุ์ในการทดลองของเรา§Yที ยัน คีส§!เสร็จสมบูรณ์แล้ว และได้เพิ่มความน่าสนใจ§Y$tech_unique_mutation_tiyanki$§!\n\nเราได้ขยายการสั่นสะเทือนตามธรรมชาติ สิ่งมีชีวิตเหล่านี้ใช้การสื่อสารภายในฝูงของพวกเขา การ ทํา เช่น นี้ ยัง ผล ด้วย สนาม ที่ สามารถ ควบคุม ได้ ซึ่ง ทํา ให้ เนื้อ เยื่อ ของ สัตว์ อื่น ๆ ที่ อยู่ ใกล้ ๆ เข้ม แข็ง ขึ้น."
 grand_archive.10020.name: "โครงการการกลายพันธุ์พยาธิ สําเร็จ"
 grand_archive.10020.desc: "โครงการกลายพันธุ์ในการทดลองของเรา§Yหนอน ผีเสื้อ§!สมบูรณ์และมีให้บาง ความหลากหลายที่น่าสนใจของวงจรการสืบพันธุ์ของพวกเขา :§Y$tech_unique_mutation_voidworm$§!\n\nเราสามารถที่จะเพิ่มความอุดมสมบูรณ์ของซีส พาราสิติก ที่สิ่งมีชีวิตเหล่านี้ใช้ในการทิ้งระเบิดดาวเคราะห์ของพวกเขาด้วย ผล ก็ คือ การ เพิ่ม ขึ้น ของ การ เกิด นิ มโฟม."
 grand_archive.10025.name: "โครงการตัดเบาะเมกะไบต์สร้างเสร็จ"
 grand_archive.10025.desc: "โครงการกลายพันธุ์ในการทดลองของเรา§Yหลอด เลือด แดง§!เสร็จสมบูรณ์แล้ว และให้ผลลัพธ์ที่น่าสนใจ§Y$tech_unique_mutation_cutholoid$§!\n\nเราพบวิธีที่จะเปลี่ยน ระบบย่อยอาหารขนาดใหญ่ของพวกเขา เพื่อยิงความเร็วสูงกระสุนระยะไกล น่า เสียดาย การ ปรับ เปลี่ยน ทาง ชีวภาพ ที่ สําคัญ นี้ จะ หมาย ความ ว่า พวก เขา ไม่ สามารถ ปราบ กอง เรือ ศัตรู ได้ อีก ต่อ ไป."
 grand_archive.10030.name: "คริสตัลไลน์ โครงการการกลายพันธุ์เสร็จสมบูรณ์แล้ว"
 grand_archive.10030.desc: "โครงการกลายพันธุ์ในการทดลองของเรา§Yความอิ่มตัวแบบคริสตัล§!เสร็จสมบูรณ์แล้ว และให้ผลลัพธ์ที่น่าสนใจ§Y$tech_unique_mutation_crystalline_entity$§!\n\nด้วยการเปลี่ยนแปลงนี้กับพันธุกรรม คริสตัลของพวกเขา สิ่งมีชีวิตแต่ละชนิดสามารถแยกเป็น สิ่งมีชีวิตอิสระสองชนิด นี้ควรจะปรับปรุงความสามารถการต่อสู้ของพวกเขาอย่างมาก"
 grand_archive.10030.a: "$FASCINATING$"

 leviathan_unique_mutation_project_unlock_name: "[FromFromFrom.GetShipSizeName]โครงการการกลายพันธุ์"
 leviathan_unique_mutation_project_unlock_desc: "เราได้ค้นพบวัสดุทางพันธุกรรมของ[FromFromFrom.GetShipSizeName]เราพบกันใน[FromFrom.solar_system.GetName].\n\nแม้ เรา ขาด ความ เข้าใจ ใน เรื่อง การ ปลอม แปลง สิ่ง มี ชีวิต ชนิด นี้ แต่ เรา อาจ ยัง สามารถ สกัด ความ หยั่ง เห็น เข้าใจ อัน ล้ํา ค่า จาก ชีววิทยา อัน โดด เด่น ได้."
 grand_archive.10055.name: "$leviathan_unique_mutation_project_unlock_name$"
 grand_archive.10055.desc: "$leviathan_unique_mutation_project_unlock_desc$"
 grand_archive.10060.name: "โครงการเดอะชราวด์"
 grand_archive.10060.desc: "การทดลองกลายพันธุ์ของเราโดยใช้$NAME_Elderly_Tiyanki$วัตถุ พันธุกรรม ครบ ถ้วน และ ได้ ให้ ผล ที่ น่า สนใจ บาง ประการ:§H$restorative_enzymes$§!\n\nเอนไซม์ฟื้นฟูที่ปรากฏอยู่ในโครงสร้างพันธุกรรมของ มาเทรียล สามารถทําซ้ําได้ในต่อมคล้าย ๆ กัน นี่เปลี่ยนโครงสร้างเนื้อเยื่อของพวกเขา ให้กลายเป็นวัสดุทดแทน ซึ่งจะให้ประโยชน์ค่อนข้างมาก ในการก่อตัวแน่นเมื่อเกิดการระเบิด"
 grand_archive.10075.name: "$leviathan_unique_mutation_project_unlock_name$"
 grand_archive.10075.desc: "$leviathan_unique_mutation_project_unlock_desc$"
 grand_archive.10080.name: "โครงการการกลายพันธุ์ของหมึกเสร็จสมบูรณ์"
 grand_archive.10080.desc: "การทดลองกลายพันธุ์ของเราโดยใช้$NAME_Voidspawn$ข้อมูลทางพันธุกรรมสมบูรณ์แล้ว และให้การค้นพบที่น่าสนใจ:§H$starborne_biology$§!\n\nเนื้อ เยื่อ ของ สัตว์ เหล่า นี้ มี ปฏิกิริยา อย่าง แรง ต่อ แสง ดาว และ สามารถ สนับสนุน ให้ สิ่ง มี ชีวิต ชนิด อื่น เติบโต ได้. นี่ เรียก ร้อง พลังงาน เพียง เล็ก น้อย เพื่อ รักษา ไว้ แต่ อัตรา การ เจริญ เติบโต ของ มัน จะ ดี ขึ้น อย่าง มาก ใกล้ กับ ดาว ที่ ฉลาด ที่ สุด."

