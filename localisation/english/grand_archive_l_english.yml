 grand_archive.9005.desc: "ของเรา§H[fromfrom.GetClass]§! §Y[fromfrom.GetName]§!ถูกจับตัวไป[from.GetName]ระหว่างการต่อสู้ใน[fromfromfrom.GetName]พวกเขาเรียกร้องค่าไถ่[fromfrom.GetHisHer]ชีวิต"
 grand_archive.9005.desc.second: "ตามรายงานก่อนหน้านี้ ผู้บัญชาการของเรา[fromfrom.GetName]ถูกจับตัวไป[from.GetName]คนที่ยินดีที่จะรับเงินแลกกับ[fromfrom.GetHisHer]ชีวิต"
 grand_archive.9005.a: "จ่ายค่าไถ่"
