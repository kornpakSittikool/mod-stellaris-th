 grand_archive.2310.name: "โรค พยาธิ ใบ ไม้ เลือด"
 grand_archive.2310.desc.default: "จํานวนประชากรของ$NAME_Voidworms$ในกาแล็กซี่มีมวลที่สําคัญ พฤติกรรมของพวกเขากําลังเปลี่ยนไป\n\nโดย ทั่ว ไป แล้ว รถ จักรยานยนต์ ของ พวก เขา ซึ่ง เป็น ที่ ที่ ผู้ คน จะ รอด ชีวิต จาก การ ถูก รบกวน. ดู เหมือน ว่า ไม่ มี การ คํานึง ถึง ความ ยืน ยาว ของ พื้น ที่ วาง ไข่ อีก ต่อ ไป.\n\nอาณานิคมของเราทั้งหมด มีสัญญาณแดง การปรากฏตัวของ$NAME_Voidworms$ในระบบใด ๆ ที่ควรจะตอบสนองด้วย ระมัดระวังอย่างมาก\n\nการผสมพันธ์ที่บ้าคลั่งในระดับกาแล็กซี่ขึ้นอยู่กับเรา"
 grand_archive.2310.desc.tech: "$grand_archive.2310.desc.default$\n\nภูมิ คุ้ม กัน ที่ เรา เคย พัฒนา มา ก่อน เพื่อ ต่อ ต้าน ปรสิต เหล่า นี้ ไม่ ได้ ทํา งาน ใน ระดับ เดียว กัน อีก ต่อ ไป. เราต้องกลับไปที่บอร์ด"
 grand_archive.2310.desc.nocontact: "รายงานการรบกวนถูกดักจับข้ามกาแล็กซี่ ว่ามีสัตว์ปีกอวกาศชนิดหนึ่งที่รู้จักมาก่อน ที่รู้จักกันในชื่อ \"หนอนน้ําแข็ง\" ได้เข้าสู่การแพร่พันธุ์อย่างบ้าคลั่ง มี รายงาน ว่า สัตว์ เหล่า นี้ เป็น ภัย คุกคาม ต่อ ดาว เคราะห์ ต่าง ๆ โดย ไม่ มี การ ป้องกัน อย่าง เพียง พอ. อาณานิคมของเราทั้งหมด แจ้งเตือนสีแดง"
 grand_archive.2310.a: "$DISTURBING$$DOTDOTDOT$"

