 VOIDWORMS_PROJECT_DESC: "รูป แบบ ทาง ชีววิทยา และ การ สืบ พันธุ์ ของ หนอน ไวรัส มี ข้อ ดี สําหรับ การ ศึกษา เพิ่ม เติม."
 tech_voidworm_immunity: "วิธีรักษาโรคติดเชื้อปรสิตหนอน ผีเสื้อ"
 tech_voidworm_immunity_desc: "เราสามารถพัฒนาการรักษา การติดเชื้อของพยาธิปรสิต อาณานิคมของเราทั้งหมด จะถูกทําให้มีภูมิคุ้มกัน จากแรงระเบิดของสปอร์"
 tech_voidworm_immunity_effect: "อาณานิคมปลอดภัยจากการถูกโจมตี(ทิ้งระเบิด)ของหนอน ผีเสื้อได้\n$mod_damage_vs_country_type_voidworms_mult$: §G+$@vaccine_damage_vs_country_type_voidworms_mult|0%$§!"
 tech_voidworm_immunity_effect_during_situation: "§Rภูมิคุ้มกันระเบิดไม่มีประสิทธิภาพ ในระหว่างการระบาดของพยาธิขาว§!\n$mod_damage_vs_country_type_voidworms_mult$: §G+$@vaccine_damage_vs_country_type_voidworms_mult|0%$§!\nก้าวหน้าไป§Y$situation_voidworm_plague$§!สถานการณ์โดย§G+$@vaccine_situation_advancement|0$§!"

