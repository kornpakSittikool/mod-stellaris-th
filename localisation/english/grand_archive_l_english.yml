##########

 civic_galactic_curators: "ตัวรักษาแกแล็กติก"
 civic_galactic_curators_desc: "การ เก็บ รวบ รวม และ การ อนุรักษ์ สิ่ง ประดิษฐ์ ทาง ประวัติศาสตร์ อย่าง ละเอียด ถี่ถ้วน ทํา ให้ อารยธรรม นี้ หลงใหล มา ตลอด. แต่ตอนนี้ ด้วยความลึกลับของกาแลคซี ที่หน้าประตูของพวกเขา มีทุกอย่างที่เหลือที่จะเรียนรู้"
 civic_galactic_curators_effects: "$civic_galactic_curators_effects_common$\n- $entertainers_are_curators_tt$"
 civic_corporate_galactic_curators: "สถาปัตยกรรมโบราณ"
 civic_corporate_galactic_curators_desc: "มีเงินที่ผลิตได้ในของเก่าและของสะสม ซึ่งสังคมนี้รู้จักดีกว่าใคร ผู้ เชี่ยวชาญ ด้าน การ คาด เดา ทาง ด้าน วัตถุ บัด นี้ พวก เขา มอง ดู ท้องฟ้า มอง หา โอกาส ลง ทุน."
 civic_corporate_galactic_curators_effects: "$civic_galactic_curators_effects_common$\n- $entertainers_are_curators_tt$\n- นั่น£building£ §Y$building_public_relations_office$§! $megacorp_civic_branch_office_building_effect$"
 civic_hive_galactic_curators: "เครือข่ายคาร์เตอร์"
 civic_hive_galactic_curators_desc: "การ รวม กลุ่ม นี้ ได้ พัฒนา ความ พยายาม อย่าง ท่วมท้น ที่ จะ ยึด, รักษา, และ รักษา ไว้. พฤติกรรม นี้ ซึ่ง ช่วย ให้ พวก เขา รอด ชีวิต ใน อดีต บัด นี้ ผลัก ดัน พวก เขา ให้ แสดง สัญลักษณ์ ที่ รวบ รวม กัน อย่าง ดี เยี่ยม."
 civic_hive_galactic_curators_effects: "$civic_galactic_curators_effects_common$"
 civic_machine_galactic_curators: "เครือข่ายคาร์เตอร์"
 civic_machine_galactic_curators_desc: "หน่วยสืบราชการลับของเครื่องจักรนี้ มีคําสั่งหลัก ในรหัสแหล่งของมัน"
 civic_machine_galactic_curators_effects: "$civic_galactic_curators_effects_common$"
 civic_galactic_curators_effects_common: "- $GUARANTEED_RESEARCH_OPTION_STRING$ ['technology:tech_galactic_archivism', £society_research£$tech_galactic_archivism$]\n- เริ่ม['concept_specimen', แว่นขยาย]หนึ่ง§0$common$§!หมวดหมู่ของคลังสื่อแต่ละตัว\n- รับ$r_unity$ทุกครั้งที่คุณหา§Yสเปกตรัม§!หรือสมบูรณ์§Y$ARCHAEOLOGICAL_SITE$§! \n- ซื้อจาก§Yเอนคลาเวอร์§!: §G$@galactic_curators_curator_enclave_purchase_cost|%0$§!\n- เปิดใช้งาน§Y$edict_decentralized_research$§!การลงทัณฑ์เพิ่มขึ้น§Yสถานีวิจัย§!แสดงผลแต่ลดลง£job_researcher£ §Y[GetResearcher]§!ส่งออกงาน"
 edict_decentralized_research: "ปรับให้สมบูรณ์แล้วการวิจัย"
 edict_decentralized_research_desc: "ความรู้ที่ยิ่งใหญ่ที่สุดอยู่ภายนอก อารยธรรมของเราเอง โดย มุ่ง ความ สนใจ ไป ยัง กาแล็กซี ที่ ใหญ่ กว่า เรา สามารถ เข้าใจ ตัว เรา เอง ได้ อย่าง ครบ ถ้วน ยิ่ง ขึ้น."
 MOD_COUNTRY_SPECIMEN_ACQUIRE_CHANCE_MULT: "การ ค้น พบ อุปนิสัย"

 councilor_galactic_curators: "ผู้ดูแลสูงสุด"
 councilor_galactic_curators_desc: "เดอะ$TITLE$อยู่ในความดูแลคุณภาพการอนุรักษ์ ของทุกสเปกตรัม"
 councilor_corporate_galactic_curators: "เจ้าหน้าที่รักษาการ"
 councilor_corporate_galactic_curators_desc: "เดอะ$TITLE$เป็นผู้รับผิดชอบดูแลการจัดการจัดนิทรรศการ และขายสเปกนิกส์"

 civic_beastmasters: "อสูรร้าย"
 civic_beastmasters_desc: "ความ ก้าว หน้า ทาง เทคโนโลยี เต็ม ที่ ใน ระบบ ที่ รับ ใช้ เป็น แหล่ง อาหาร สําหรับขอบเขตพื้นที่:สังคม นี้ ได้ รับ ความ รู้ ที่ ลึก ซึ้ง เกี่ยว กับ วงจร ชีวิต ของ พวก เขา. ปัจจุบัน พวก เขา ทํา งาน เพื่อ บํารุง เลี้ยง, เลี้ยง, และ ใน ที่ สุด ก็ ทํา ให้ สัตว์ เหล่า นี้ โคลน เพื่อ ประโยชน์ ร่วม กัน."
 civic_machine_beastmasters: "ไบโอรอน"
 civic_machine_beastmasters_desc: "เมื่อได้เชื่อมต่อโดยตรงกับสิ่งมีชีวิต ที่เป็นโมฆะในระบบของมัน หน่วยสืบราชการลับของเครื่องจักรนี้ ผล ก็ คือ สัมพันธภาพ ที่ เป็น ประโยชน์ ต่อ กัน."
 civic_hive_beastmasters: "ร้อน จัด"
 civic_hive_beastmasters_desc: "เป็นอาณานิคมที่ปรับตัวได้สูงมาก จิตใจของไฮฟ์ได้วิวัฒนาการไปสู่ความสัมพันธ์แบบไซโลโลจีกับสิ่งมีชีวิตชีวภาพที่ว่างเปล่าในระบบของพวกเขา พวก เขา ทํา งาน ร่วม กัน เพื่อ บรรลุ เป้า หมาย ทั่ว ไป."
 civic_wilderness_beastmasters: "$civic_hive_beastmasters$"
