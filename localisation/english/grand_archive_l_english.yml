 RESEARCH_GATEWAY_ACTIVATION_PROJECT_TT: "การวิจัย £physics£§Y$tech_gateway_activation$§!เทคโนโลยี"

 grand_archive.8325.name: "เปิดใช้งานเกตเวย์"
 grand_archive.8325.desc.common: "เมื่อเราสร้างการเชื่อมโยงใหม่ ระหว่างระบบแล้ว แผนที่ก็จะไม่มีอีกต่อไป ความลับของชาร์ตนี้ จะถูกเปิดเผยในไม่ช้า"
 grand_archive.8325.desc.tech: "หลังจากวิจัยเทคโนโลยีที่เหมาะสม ตอนนี้เราสามารถเปิดเกตเวย์โบราณได้[gateway_to_ness_treasure_system.GetName].\n\n$grand_archive.8325.desc.common$"
 grand_archive.8325.desc.kill.known: "กับสิ่งมีชีวิตที่จัดการกับทั้งหมดที่เหลือคือการเปิดประตูโบราณใน[gateway_to_ness_treasure_system.GetName].\n\n$grand_archive.8325.desc.common$"
 grand_archive.8325.desc.kill.unknown: "กับ$NAME_Voidworms$จัดการกับทั้งหมดที่เหลือคือการเปิดประตูเก่าใน[gateway_to_ness_treasure_system.GetName].\n\n$grand_archive.8325.desc.common$"

 ACTIVATE_GATEWAY_PROJECT: "$grand_archive.8325.name$"
 ACTIVATE_GATEWAY_PROJECT_DESC: "เป็นจุดหมายสุดท้าย§H$celestial_chart$§!, ที่ว่าง§Hเกตเวย์§!ใน[this.solar_system.GetName]คง จะ นํา ไป สู่ สิ่ง ที่ มี ความ สําคัญ อย่าง ยิ่ง."
 ACTIVATE_GATEWAY_PROJECT_TT: "§Hเปิดใช้งานเกตเวย์§!"

 grand_archive.8400.name: "สมบัติ โฮ!"
 grand_archive.8400.desc: "ได้เปิดใช้งานประตูที่ปลายของ§Y$celestial_chart$§!เราได้เปิดเผย[ness_treasure_system.GetName]ระบบ การแพร่กระจายของวัตถุสวรรค์ ตรงกับภาพสเก็ตช์ที่เราพบใน§Y$NAME_CaptainNess$§!สมุดบันทึก\n\nการเดินทางที่ยาวนานของเราเกือบสิ้นสุด"
 grand_archive.8400.a: "กดต่อไป"

 ness_treasure_system_poi: "เดิน ทาง ผ่าน ประตู เข้า[from.solar_system.GetName] "
 ness_treasure_system_poi_desc: "เราได้ติดตาม§H$celestial_chart$§!เพื่อสิ้นสุดการต่อสู้กับโจรสลัดและสัตว์ประหลาด เกตเวย์ได้ใช้งานแล้ว ทั้งหมดที่เหลือคือการค้นหาว่าอะไรอยู่ที่อีกด้านหนึ่ง"

