 grand_archive.4105.desc.common.aesthetic_wonder: "[GetCuratorsDesignation]สังเกตเห็นความพยายามของคุณอย่างระมัดระวังในการเก็บรวบรวมและรักษาของ§Y$EXHIBITION_AESTHETIC_WONDERS$§!ตัวอย่าง ความงามอยู่ทุกหนทุกแห่งในกาแล็กซี่ของเรา ถ้ามองใกล้พอ"
 grand_archive.4105.desc.common.historical_item: "[GetCuratorsDesignation]สังเกตเห็นความพยายามของคุณอย่างระมัดระวังในการเก็บรวบรวมและรักษาของ§Y$EXHIBITION_GALACTIC_HISTORY$§!คุณมอบของขวัญแห่งความเป็นอมตะ ให้กับคนที่คุณเก็บไว้"
 grand_archive.4105.desc.common.xeno_geology: "[GetCuratorsDesignation]สังเกตเห็นความพยายามของคุณอย่างระมัดระวังในการเก็บรวบรวมและรักษาของ§Y$EXHIBITION_XENO_GEOLOGY$§!ตัวอย่าง เรื่องราวของกาแล็กซี่ของเรา มักจะถูกซ่อนอยู่ภายในหินและก้อนหินของมัน"

 grand_archive.4105.desc.1.common: "[GetStage1Description]\n\nให้สิ่งนี้เป็นแรงจูงใจสําหรับคุณ ที่จะทําผลงานที่ยิ่งใหญ่ต่อไป"
