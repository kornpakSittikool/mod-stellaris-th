 treasure_hunters_origin_story_chain_title: "ติด ตาม แผนภูมิ ลึกลับ"
 treasure_hunters_origin_story_chain_desc: "หลังจากค้นพบแผนที่ดาวลึกลับ เราเริ่มผจญภัยที่ยิ่งใหญ่ที่สุดของเรา ใครจะรู้ ว่าอะไรโกหกตอนจบ§H$celestial_chart$§!และ อันตราย อะไร บ้าง ที่ เรา อาจ เผชิญ ใน การ เดิน ทาง ของ เรา."
 treasure_hunters_hidden_system_1_poi: "ค้นหา[prev.GetName]"
 treasure_hunters_hidden_system_1_poi_desc: "แผนภูมิที่พบในแคปซูลออร์บิทัลโบราณ ได้เปิดเผยระบบที่ซ่อนอยู่[prev.GetName]เพื่อเรียนรู้มากขึ้น เราต้องเดินทางไปที่นั่นด้วยตัวเอง"
 treasure_hunters_explore_system_1_poi: "สํารวจ[treasure_hunters_hidden_system_1.GetName]"
 treasure_hunters_explore_system_1_poi_desc: "กับ§Y$NAME_BlackNeedle$§!กองยานแพ้ เราสามารถค้นหาต่อไปได้ เดอะ§H$celestial_chart$§!นําเรามายังระบบนี้ เราสามารถสรุปได้ว่า ส่วนต่อไปของชาร์ตถูกซ่อนไว้ที่นี่"
 black_needle_fleet_poi: "สิ่ง จําเป็น พื้น ฐานกองยาน"
 black_needle_fleet_poi_desc: "เราถูกซุ่มโจมตี[from.GetName]ระบบโดยกองเรือของโจรสลัดระดับสูง พวกมันพยายามจะขโมยของเรา§H$celestial_chart$§!และเตรียมพร้อมสําหรับการมาถึงของเรา"
 smeegibb_shelter_system_1_poi: "ค้นหา[prev.GetName]"
 smeegibb_shelter_system_1_poi_desc: "เดอะ§H$celestial_chart$§!ได้เปิดเผยระบบใหม่ที่ซ่อนอยู่[prev.GetName]เราต้องเดินทางไปที่นั่น และค้นหาว่าอะไรรอเราอยู่"
 smeegibb_shelter_system_2_poi: "เดินทางไปยัง[smeegibb_system.GetName]"
 smeegibb_shelter_system_2_poi_desc: "เราไม่สามารถที่จะเชื่อมต่อสื่อสารกับ$NAME_Smeegibb$เป็นเบาะแสเดียวของเราไปยังส่วนต่อไปของ§H$celestial_chart$§!เราควรกลับไป[smeegibb_system.GetName]เพื่อตรวจสอบสถานการณ์ เหตุผลที่อยู่เบื้องหลังการงัดแงะใน ขณะนี้ไม่ทราบสาเหตุ"
 black_needle_fleet_2_poi: "ชัยชนะ$NAME_CaptainInax$"
 black_needle_fleet_2_poi_desc: "เดอะ§Y$NAME_BlackNeedle$§!ได้ตามล่าเราอีกครั้ง ฆ่าการติดต่อของเรา$NAME_Smeegibb$และขัดขวาง[from.GetName]ระบบ เราเชื่อว่าส่วนที่สี่ของ§H$celestial_chart$§!ซ่อนอยู่ที่ไหนสักแห่งบนพื้นผิวของ[smeegibb_shelter.GetName].\n\nเราต้องเอาชนะยานข้าศึก เพื่อค้นหาแคปซูล"

