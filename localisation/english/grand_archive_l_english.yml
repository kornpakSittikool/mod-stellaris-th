 resolution_voidworm_eradication: "การ ขจัด หนอน หมึก"
 resolution_voidworm_eradication_desc: "หนอน ผีเสื้อ ปรสิต เป็น ภัย คุกคาม ต่อ กาแล็กซี และ คุกคาม โลก ที่ มี คน อาศัย อยู่. วงจรชีวิตตามธรรมชาติของพวกเขา ปรับค่าสมดุลของระบบนิเวศของกาแล็กซี่ และทุก ๆ อย่างควรจะถูกกําจัด"
 resolution_voidworm_eradication_tooltip: "จักรวรรดิใดที่มี§Y$NAME_Voidworms$§!ภายในชายแดนของพวกเขาอยู่ใน§Rการ ละเมิด กฎหมาย กาแลกติก§!จนกระทั่งสัตว์แต่ละชนิดได้จากไป หรือถูกทําลาย"
