 ###########################
 # Space Fauna Description #
 ###########################
 space_amoeba_desc: "สเปซ อาโมบา เป็นนักล่าคนเดียว ก้าวร้าวกับอะไรก็ตามที่พวกเขาเผชิญ โดยได้รับการสนับสนุนจากไข่ที่มีรูปร่างบางส่วน ที่รู้จักกันในชื่อ \"ฟลาเจลล่า\" สัตว์เหล่านี้มีความเชี่ยวชาญในการไล่ล่าเหยื่อของมัน"
 tiyanki_desc: "ไทยานีกิหรือที่รู้จักกันในชื่อ \"ปลาวาฬสปัส\" เป็นสัตว์ตามหลักสัตว์ชนิดที่กินก๊าซชั้นบรรยากาศ สัตว์ เหล่า นี้ มี ส่วน ร่วม อย่าง เต็ม ที่ และ มี ฝัก ใน ป่า ถูก จัด ให้ อยู่ ภาย ใต้ การ จัด ระเบียบ ที่ เข้ม งวด."
 voidworm_desc: "หนอน ผีเสื้อ เป็น สิ่ง มี ชีวิต ที่ เป็น พาหะ นํา โรค ซึ่ง ต้อง สะสม เกล็ด บน โลก ที่ มี ผู้ คน อาศัย อยู่ ซึ่ง มี ชีวภาพ ที่ เหมาะ สม เพื่อ จะ แพร่ พันธุ์. ปัจเจกบุคคลวัยเจริญพันธุ์เป็นไตรกีฬา รู้จักกันในชื่อ \"โทริกา\" และจะสร้างรังใกล้กับหลุมดํา"
 cutholoid_desc: "มี สิ่ง มี ชีวิต ขนาด ใหญ่ ที่ อยู่ ใน ดาว เคราะห์ น้อย เพื่อ ให้ การ ปก ป้อง ที่ เหมาะ สม แก่ ร่าง กาย ที่ อ่อน นุ่ม ของ มัน. สัตว์ ชนิด นี้ กลืน เหยื่อ ทั้ง ตัว โดย ใช้ ของ เหลว จาก การ ย่อย ของ กัมมันตรังสี เพื่อ กิน เหยื่อ อย่าง ช้า ๆ."
 crystalline_entity_desc: "คริสตัลไลน์เป็นรูปแบบที่ไม่ซ้ํากัน ของสิ่งมีชีวิตที่มีความซับซ้อน ที่สามารถขับเคลื่อนตัวเองได้อย่างอิสระ ผ่านพื้นที่ ความเข้มของแต่ละองค์กรไม่ได้แตกต่างกันไป เนื่องจากอายุ แต่เป็นเงาสะท้อนของประจุภายใน"

 wild_tiyanki_ox_modifier: "ไวต์ เทียน คี อ็อก"
 fauna_disengagement_modifier: "การ หยุด งาน ของ ยาน อวกาศ"

