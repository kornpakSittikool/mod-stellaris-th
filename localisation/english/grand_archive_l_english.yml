 grand_archive.8290.name: "รสชาติ ของ ทรัพย์ สมบัติ"
 grand_archive.8290.desc.chart: "โดย การ ก่อ ตั้ง ทรัพย์ สมบัติ ขึ้น มา[from.GetName]เราเชื่อว่า§Y$celestial_chart$§!มีศักยภาพที่จะมีส่วนสําคัญต่อเศรษฐกิจของเรา"
 grand_archive.8290.desc.trove: "ขณะที่เรากระจายทรัพยากร$TREASURE_TROVE$ค้นพบเมื่อ[from.GetName]มันชัดเจนแล้วว่า§Y$celestial_chart$§!มีศักยภาพที่จะมีส่วนสําคัญต่อเศรษฐกิจของเรา"
 grand_archive.8290.desc.default: "เพื่อให้ดีที่สุด ใช้ประโยชน์จาก§Yแผนภูมิ§!ความสามารถของ เราได้คิดขึ้นตําแหน่งสมาชิกสภาใหม่ สําหรับบุคคลที่จะนําความพยายามของเรา ในการค้นพบและรวบรวมสมบัติ"
 grand_archive.8290.desc.gestalt: "เพื่อให้ดีที่สุด ใช้ประโยชน์จาก§Yแผนภูมิ§!ความสามารถของ เราได้ใช้มาตรการ เพื่ออนุญาตให้ทรัพยากรที่เพิ่มขึ้น"
 grand_archive.8290.desc.chart.default: "$grand_archive.8290.desc.chart$\n\n$grand_archive.8290.desc.default$"
 grand_archive.8290.desc.chart.gestalt: "$grand_archive.8290.desc.chart$\n\n$grand_archive.8290.desc.gestalt$"
 grand_archive.8290.desc.trove.default: "$grand_archive.8290.desc.trove$\n\n$grand_archive.8290.desc.default$"
 grand_archive.8290.desc.trove.gestalt: "$grand_archive.8290.desc.trove$\n\n$grand_archive.8290.desc.gestalt$"
 grand_archive.8290.tt: "\n§Eอนุญาตให้ปลดล็อกตําแหน่งสภาได้§!\n§H$t$$councilor_head_treasure_hunter$§!\n$tt$$COUNCIL_POSITION_MODIFIER_BASE$\n$ttt$$mod_treasure_trove_reward_mult$: §G+$@councilor_head_treasure_hunter_treasure_trove_reward|0%$§!\n$ttt$$mod_planet_treasure_gatherers_produces_mult$: §G+$@councilor_head_treasure_hunter_treasure_gatherers_produces|0%$§!\n$ttt$$mod_country_base_energy_produces_add$: §G+$@councilor_head_treasure_hunter_energy_produces|0$§!\n$COUNCIL_POSITION_AVAILABLE_FOR$$t$$scientist_with_icon$ $commander_with_icon$"

 grand_archive.8300.name: "ประตูที่ถอดหนอน"
 grand_archive.8300.desc.common: "มันจะต้องเป็นเกตเวย์นี้ ที่จะนําเราไปสู่ สมบัติที่เราขอมานาน"
 grand_archive.8300.desc.did_encounter_voidworms: "แผนที่ได้นําเรา ไปยังหลุมดําที่ไม่เคยมีใครรู้จักมาก่อน และระบบที่รบกวนด้วย$NAME_Voidworms$เนื่อง จาก ได้ ไป ทํา รัง ใน ประตู บ้าน ที่ ชํารุด ใกล้ ๆ อาคาร หลัง ใหญ่ ที่ สุด จึง มี โครง สร้าง ที่ ถูก ทิ้ง ร้าง อยู่ ล้อม รอบ.\n\n$grand_archive.8300.desc.common$ถ้าเราจะไปถึงจุดสิ้นสุดของทาง เราต้องกําจัด$NAME_Voidworms$และซ่อมประตู"
 grand_archive.8300.desc.didnt_encounter_voidworms: "แผนที่ได้นําเรา ไปยังหลุมดําที่ไม่เคยมีใครรู้จักมาก่อน และระบบที่รบกวนด้วยสัตว์แปลกๆ เมื่อ มา รวม ตัว กัน รอบ ประตู บ้าน ที่ ร้าง เปล่า ใกล้ ๆ อาคาร ที่ ถูก ทิ้ง ร้าง ที่ ใหญ่ ที่ สุด ก็ ล้อม รอบ.\n\nตัวหนอนขนาดใหญ่เหล่านี้ ไม่ปรากฏอยู่ในฐานข้อมูล ของมนุษย์อวกาศ เรากําลังพยายามสร้างการสื่อสาร$grand_archive.8300.desc.common$ถ้าเราจะต้องไปถึงจุดสิ้นสุดของทาง เราต้องจัดการกับสัตว์เหล่านี้และซ่อมแซมประตู"
 grand_archive.8300.a: "ไม่มีอะไรขวางทางเราได้"
 grand_archive.8300.a.pacifist: "ถ้าจําเป็น"
 grand_archive.8300.a.lom: "ให้'พวกเขา'กว้างด้าน!"

 GATEWAY_VOIDWORMS_KILL_PROJECT: "$grand_archive.8300.name$"
 GATEWAY_VOIDWORMS_KILL_PROJECT_DESC: "เราได้ติดตาม§H$celestial_chart$§!ไปยังที่อับเฉา§Hเกตเวย์§!ใน[this.solar_system.GetName]ระบบ สิ่งมีชีวิตเหล่านี้จะต้องถูกจัดการ ก่อนที่เราจะสามารถเปิดใช้งานประตู และดูสิ่งที่อยู่ในด้านอื่น ๆ"
 GATEWAY_VOIDWORMS_KILL_PROJECT_TT: "§Rเอาชนะสัตว์ใน[this.solar_system.GetName]§!"

 GATEWAY_VOIDWORMS_DEBRIS_PROJECT: "$NAME_Voidworms$คงที่"
 GATEWAY_VOIDWORMS_DEBRIS_PROJECT_DESC: "ซากศพของหนอนขาวใน[this.solar_system.GetName]มีการอ่านผิดปกติ สแกนเนอร์ของเราดูเหมือนจะ ตรวจจับสัญญาณชีวิต ภายในหนึ่งของการสลายตัวของโทริกาส เราควรส่งเรือวิทยาศาสตร์ ไปตรวจสอบเรื่องนี้ต่อไป"

 grand_archive.8310.name: "หนอน ผีเสื้อ"
 grand_archive.8310.desc.did_encounter_voidworms: "มี การ พบ คลัตช์ ที่ เป็น นิ มฟ์ ใน ซาก หนอน ริด. แม้ ว่า ญาติ ของ พวก เขา จะ เสีย หาย แต่ พวก เขา ก็ เข้า มา ใกล้ เรือ ของ เรา และ เริ่ม ลอย ไป ข้าง ๆ กอง เรือ ของ เรา ด้วย การ วิงวอน.\n\n$grand_archive.8310.desc.common$"
 grand_archive.8310.desc.didnt_encounter_voidworms: "มี การ พบ ลูก ม้า ตัว หนึ่ง อยู่ ใน ซาก งู. แม้ ว่า ญาติ ของ พวก เขา จะ เสีย หาย แต่ พวก เขา ก็ เข้า มา ใกล้ เรือ ของ เรา และ เริ่ม ลอย ไป ข้าง ๆ กอง เรือ ของ เรา ด้วย การ วิงวอน.\n\n$grand_archive.8310.desc.common$"
 grand_archive.8310.desc.common: "ถ้า เรา เลือก อย่าง นั้น เรา ก็ จะ ใช้ ความ ผูก พัน ตาม สัญชาตญาณ ของ มัน กับ ข้อ ได้ เปรียบ ของ เรา: เมื่อ โต เต็ม ที่ แล้ว สิ่ง มี ชีวิต ที่ อยู่ ใน อวกาศ นี้ ก็ อาจ กลาย เป็น กอง เรือ อินทรีย์ ที่ น่า ประทับ ใจ ภาย ใต้ การ ควบคุม ของ เรา."
 grand_archive.8310.a: "การค้นพบที่น่าทึ่ง"
 grand_archive.8310.a.tt: "เราจะได้รับกองเรือ§Y$@gateway_voidworm_nymph_reward_count|0$ §2$epic$§! $voidworms_small_plural$§!."
 grand_archive.8310.b: "เหยื่อที่ง่าย"

 grand_archive.8315.name: "เทคโนโลยีสําหรับตรวจสอบเกตเวย์"
 grand_archive.8315.desc: "ประตูทางเข้าใน[FromFromFrom.System.GetName]ไม่ได้ทํางาน เมื่อเข้าใกล้โครงสร้างโบราณ§Y$celestial_chart$§!ให้ ความ หยั่ง เห็น เข้าใจ ต่อ ๆ ไป ใน เทคโนโลยี ที่ สูญ เสีย ไป นี้. การ เข้าใจ วิธี การ เดิน ทาง แบบ โบราณ นี้ คง จะ เป็น ประโยชน์ ใน การ เสี่ยง อื่น ๆ."

