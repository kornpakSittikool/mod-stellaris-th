 ####################################
 # Edicts
 ####################################
 edict_masters_writings_politics:0 "คำสอนของผู้เชี่ยวชาญ: สิ่งที่ดีกว่า"
 edict_masters_writings_politics_desc:0 "คำแปลคำสอนของนักปรัชญาต่างดาว เราอาจก้าวหน้าอย่างมากด้านโครงสร้างพื้นฐาน หากทำตามคำแนะนำของนางเกี่ยวกับการรวมผู้คนให้เป็นหนึ่งผ่านการเสียสละตนเอง\n\n§Lชาติที่เข้มแข็งสร้างขึ้นบนการเสียสละความสบาย ตราบใดที่ทุกคนถูกขอให้ร่วมแบกรับภาระไปด้วยกัน- เทลิซาผู้เล่านิทาน§!\n\n"
 edict_masters_writings_philosophy:0 "คำสอนของผู้เชี่ยวชาญ: ความคิดเชิงปรัชญา"
 edict_masters_writings_philosophy_desc:0 "คำแปลคำสอนของนักปรัชญาต่างดาว ซึ่งมีทั้งบทวิเคราะห์และข้อครุ่นคิดเกี่ยวกับความหมายของชีวิตและจุดมุ่งหมายของจักรวาล หากผู้ปกครองของเรายึดถือคำแนะนำนี้ เราจะตัดสินใจได้อย่างรอบคอบยิ่งขึ้น\n\n§Lคำตอบต่อจุดมุ่งหมายของจักรวาลอยู่ภายนอกตัวเรา แต่สิ่งนั้นไม่ได้ทำให้เราลดความมุ่งมั่นที่จะค้นหามัน เราต้องแสวงหาความเป็นหนึ่งเดียวเพื่อเข้าถึงคำตอบที่เป็นรากของสรรพสิ่ง- เทลิซาผู้เล่านิทาน§!\n\n"
 edict_masters_writings_diplomacy:0 "คำสอนของผู้เชี่ยวชาญ: ความน่าเชื่อถือทางการทูต"
 edict_masters_writings_diplomacy_desc:0 "คำแปลคำสอนของนักปรัชญาต่างดาว เกร็ดเล่าจากการเจรจาทางการทูตของนางอาจเป็นพื้นฐานอันดีสำหรับการเจรจาทางการทูตของเรา\n\n§Lการได้พบพานบุตรแห่งจักรวาลอาจชวนหวาดหวั่น แต่ท้ายที่สุดมันคือโอกาสแห่งความหวัง จงต้อนรับเพื่อนบ้านของท่านและยินดีในตัวตนของพวกเขา เพราะพรที่พวกเขานำมาคือจุดจบของความโดดเดี่ยวในห้วงว่าง- เทลิซาผู้เล่านิทาน§!\n\n"
 edict_masters_writings_war:0 "คำสอนของผู้เชี่ยวชาญ: รัฐกับการสู้รบ"
 edict_masters_writings_war_desc:0 "คำแปลคำสอนของนักปรัชญาต่างดาว ภาพพจน์เรื่องสงครามและแนวคิดด้านยุทธศาสตร์การรบของนางอาจกลายเป็นสื่อฝึกชั้นยอดให้กองทัพของเรา\n\n§Lการสร้างความเป็นหนึ่งเดียวคือความท้าทายที่ยิ่งใหญ่ที่สุด โดยเฉพาะเมื่อความยั่งยืนมักก่อให้เกิดพรมแดน พรมแดนเหล่านี้จำเป็นต้องถูกรื้อทำลาย - ความคิดที่ทำให้หลายคนหวาดกลัว บางครั้งเราจำเป็นต้องยอมทำลาย เพื่อสร้างสิ่งที่แข็งแกร่งกว่าขึ้นจากเถ้าถ่าน- เทลิซาผู้เล่านิทาน§!\n\n"
 edict_improved_work_environment:0 "ปรับปรุงสภาพแวดล้อมในการทำงาน"
 edict_improved_work_environment_desc:0 "การทุ่มเทเวลาและทรัพยากรเพื่อปรับปรุงสภาพการทำงานของประชาชนของเรา ย่อมส่งผลให้เกิดผลงานที่ดีขึ้นและแรงงานที่มีความสุขมากขึ้นอย่างแน่นอน\n\n"
 edict_renewable_energy:0 "ริเริ่มการปรับปรุงด้านพลังงาน"
 edict_renewable_energy_desc:0 "เราสามารถจำกัดการใช้เชื้อเพลิงเป็นพิษและทรัพยากรที่ไม่หมุนเวียนให้มากขึ้น เพื่อส่งเสริมการวิจัยวิธีการผลิตพลังงานรูปแบบใหม่ สิ่งนี้อาจช่วยให้เราเข้าใกล้วัฏจักรพลังงานที่สมบูรณ์แบบยิ่งขึ้น และปรับปรุงสภาพแวดล้อมให้ประชาชนของเราได้ใช้ชีวิตอย่างรื่นรมย์\n\n"
 edict_super_sensors:0 "ค้นหาเซ็นเซอร์ที่ครอบคลุมมากขึ้น"
 edict_super_sensors_desc:0 "หลังจากวิจัยเทคโนโลยีเซ็นเซอร์ขั้นสูงแล้ว เรามีข้อมูลมากพอที่จะทุ่มทรัพยากรเพิ่มเติมให้กับการยกระดับการสแกนค้นหาของเราเอง ความริเริ่มนี้จะช่วยให้ช่างเทคนิคของเราค้นหาวัตถุที่น่าสนใจบริเวณขอบระบบได้ง่ายขึ้น\n\n"

 ####################################
 # Planet Modifiers
 ####################################
 acid_jungles:0 "ป่ากรด"
 acid_jungles_desc:0 "วิวัฒนาการได้สร้างต้นไม้และพืชใบที่ขับกรดออกมา ทำให้ภูมิประเทศอันตรายต่อการสัญจรหรือการตั้งถิ่นฐาน"
 ex_planet:0 "อดีตดาวเคราะห์"
 ex_planet_desc:0 "แถบดาวเคราะห์น้อยนี้เคยเป็นดาวเคราะห์ที่มีความหวังแห่งชีวิต"
 ship_graveyard:0 "สุสานยานอวกาศ"
 ship_graveyard_desc:0 "ยานอวกาศจำนวนมากได้พังตกที่นี่ ก่อให้เกิดสุสานเชิงเปรียบเปรยที่เต็มไปด้วยวัสดุให้เก็บกวาด"
 ai_fleet:0 "กองยาน AI ที่ตก"
 ai_fleet_desc:0 "กองยานที่ถูกควบคุมโดย AI ถูกทำลายอยู่บนดาวดวงนี้ มอบข้อมูลวิศวกรรมอันมีค่าให้เราศึกษา"
 irradiated_wasteland:0 "ดินแดนรกร้างปนเปื้อนรังสี"
 irradiated_wasteland_desc:0 "ดาวดวงนี้ถูกถล่มด้วยรังสี จนทำให้พื้นที่ขนาดใหญ่เป็นอันตรายต่อสิ่งมีชีวิตส่วนใหญ่"
 ancient_one:0 "ผู้โบราณ"
 ancient_one_desc:0 "สิ่งมีชีวิตโบราณที่อาศัยอยู่ลึกลงไปใต้ผืนคลื่นคือพลังชีวิตที่ครอบงำดาวดวงนี้"
 food_rich_planet:0 "อาหารเปี่ยมคุณค่า"
 food_rich_planet_desc:0 "พืชพรรณบนดาวดวงนี้มอบผลไม้และสารอาหารที่ช่วยยกระดับสภาพความเป็นอยู่"
 super_sensor_array:0 "ชุดเซ็นเซอร์ชั้นเยี่ยม"
 super_sensor_array_desc:0 "ชุดเซ็นเซอร์ทรงพลังช่วยให้เห็นภาพรวมของพื้นที่โดยรอบได้ดียิ่งขึ้น"
 horse_powered_factories_low:0 "แรงงานสัตว์แบบบังคับ"
 horse_powered_factories_medium:0 "แรงงานสัตว์แบบฝืนใจ"
 horse_powered_factories_high:0 "แรงงานสัตว์โดยสมัครใจ"
 horse_powered_factories_low_desc:0 "สัตว์สี่เท้าที่ถูกเลี้ยงช่วยผ่อนเบาสภาพการทำงาน แม้จะไม่ได้เต็มใจก็ตาม"
 horse_powered_factories_medium_desc:0 "สัตว์สี่เท้าที่ถูกเลี้ยงช่วยผ่อนเบาสภาพการทำงาน แม้จะฝืนใจก็ตาม"
 horse_powered_factories_high_desc:0 "สัตว์สี่เท้าพันธมิตรช่วยผ่อนเบาสภาพการทำงาน"
 fallen_robots:0 "ซากหุ่นยนต์"
 fallen_robots_desc:0 "ดาวดวงนี้มีหุ่นยนต์เก่าแก่ที่สร้างโดยสังคมที่ล่มสลาย มอบวัสดุทางวิศวกรรมให้เราศึกษา"
 society_animal_life:0 "ชีวิตสัตว์แปลก"
 society_animal_life_desc:0 "ดาวดวงนี้เป็นถิ่นอาศัยของสัตว์ที่แปลกประหลาดเป็นพิเศษ พวกมันเปิดโอกาสการวิจัยสังคมศาสตร์ที่น่าสนใจ"
 hostile_animal_life:0 "สัตว์ป่าอันตราย"
 hostile_animal_life_desc:0 "ดาวดวงนี้เป็นถิ่นของสิ่งมีชีวิตที่เป็นศัตรูและไม่ยินดีต้อนรับเรา"
 shifting_sands:0 "ทรายเลื่อน"
 shifting_sands_desc:0 "ดาวทะเลทรายดวงนี้ประกอบด้วยเม็ดทรายที่เกือบเป็นของเหลว ทำให้การก่อสร้างยากลำบากอย่างยิ่ง"
 liquid_sands:0 "ทรายเหลว"
 liquid_sands_desc:0 "ทรายปกคลุมดาวดวงนี้ด้วยเม็ดที่ละเอียดเสียจนดูคล้ายของเหลว องค์ประกอบแร่ที่ประหลาดนี้ให้โอกาสวิจัยจำนวนมาก"
 abandoned_mining:0 "สถานีเหมืองร้าง"
 abandoned_mining_desc:0 "เคยมีสถานีทำเหมืองเก่าโคจรรอบดาวดวงนี้ แสดงให้เห็นว่าที่นี่อาจมีทรัพยากรที่มีศักยภาพ"
 gas_rich_planet:0 "แหล่งก๊าซอุดมสมบูรณ์"
 gas_rich_planet_desc:0 "สร้างอาณานิคมบนดาวดวงนี้เพื่อเริ่มใช้ประโยชน์จากทรัพยากรของมัน\n£energy£ §G+50%§!"
 gas_rich_planet_fo_realz:0 "การทำเหมืองก๊าซอุดมสมบูรณ์"
 gas_rich_planet_fo_realz_desc:0 "ทรัพยากรธรรมชาติที่มีอยู่อย่างจำกัดบนดาวดวงนี้กำลังถูกทำเหมืองเพื่อเพิ่มการผลิตพลังงานโดยรวม"
 gas_responsible_mining:0 "การทำเหมืองก๊าซอย่างรับผิดชอบ"
 gas_responsible_mining_desc:0 "การสงวนทรัพยากรก๊าซที่มีจำกัดแต่มีคุณค่าบนดาวดวงนี้ ช่วยให้การผลิตพลังงานมีประสิทธิภาพมากขึ้นในระยะยาว"
 suppressed_opposition:0 "ปราบปรามฝ่ายค้าน"
 suppressed_opposition_desc:0 "ประชากรส่วนหนึ่งของดาวดวงนี้ถูกปราบปรามอย่างรุนแรงจากการต่อต้านรัฐบาล"
 scared_population:0 "ประชาชนหวาดกลัว"
 scared_population_desc:0 "ประชากรทำงานด้วยความหวาดกลัวว่าโรงงานต่างดาวจะคร่าชีวิตเพิ่มอีก"
 secured_factory:0 "โรงงานต่างดาวที่ตรวจสอบความปลอดภัยแล้ว"
 secured_factory_desc:0 "มีการลงทุนทั้งต้นทุนและความพยายามเพื่อให้แน่ใจว่าโรงงานต่างดาวแห่งนี้ปลอดภัยพอสำหรับการทำงาน"
 fear_as_control:0 "ปกครองด้วยกำปั้นเหล็ก"
 fear_as_control_desc:0 "ผู้กระทำผิดถูกลงโทษเพื่อกระตุ้นให้ประชาชนลงมือทำ"
 fear_as_control_militarist:0 "ปกครองด้วยกำปั้นเหล็ก"
 fear_as_control_militarist_desc:0 "ผู้กระทำผิดถูกลงโทษเพื่อกระตุ้นให้ประชาชนลงมือทำ"
 infectious_disease:0 "โรคติดต่อ"
 infectious_disease_desc:0 "โรคติดต่อร้ายแรงได้ถูกปล่อยออกมา สร้างสายพันธุ์ใหม่และทำให้ประชากรตกอยู่ในอันตราย"
 pyramid_wars:0 "สงครามแห่งผู้เกิดบนฟ้า"
 pyramid_wars_desc:1 "ผู้คนได้ปะทุเข้าสู่สงครามเต็มรูปแบบ เนื่องจากความขัดแย้งทางศาสนาเกี่ยวกับธรรมชาติที่แท้จริงของ 'เทพผู้เกิดบนฟ้า'"
 syndaw_automated_work:0 "กระบวนการทำงานอัตโนมัติ"
 syndaw_automated_work_desc:0 "ไม่ว่าจะมีเหตุผลหรือไม่ ความกลัวการว่างงานจากระบบอัตโนมัติกำลังส่งผลกระทบต่อดาวดวงนี้"
 syndaw_unfriendly_robots:0 "ความตึงเครียดจากการผสานหุ่นยนต์"
 syndaw_unfriendly_robots_desc:0 "ความตึงเครียดระหว่างประชากรหุ่นยนต์และอินทรีย์บนดาวดวงนี้ได้ลดผลผลิต £unity£ เอกภาพของเรา"
 syndaw_research_malus:0 "AI ขัดข้อง"
 syndaw_research_malus_desc:1 "AI ห้องทดลองที่เกี่ยวข้องกับการวิจัยสังคมศาสตร์ได้รับความเสียหายของฮาร์ดแวร์ขั้นวิกฤตและกำลังถูกเปลี่ยนใหม่"
 snake_infestation:0 "ดินแดนแห่งการระบาด"
 snake_infestation_desc:0 "งู! งูเต็มไปหมด! เรามัวยุ่งอยู่กับการจัดการพวกมันจนไม่มีเวลาทำ...อย่างอื่น"
 energy_poor:0 "พลังงานร่อยหรอ"
 energy_poor_desc:0 "ไม่อยากให้ตื่นตระหนกนะ แต่งูกำลังพันอยู่รอบเครื่องกำเนิดและดูดพลังงานอยู่"
 mining_equipment_offline:0 "อุโมงค์เหมืองร้าง"
 mining_equipment_offline_desc:0 "งู! งูเต็มไปหมด! เรามัวยุ่งอยู่กับการจัดการพวกมันจนไม่มีเวลาทำ...อย่างอื่น"
 locust_planet_cracked:0 "ดาวแตกสลาย"
 locust_planet_cracked_desc:0 "ดาวดวงนี้ถูกกวาดล้างชีวิตไปเกือบทั้งหมดและแตกสลายจากการปะทุพลังงานมหาศาล ร่องรอยเพียงไม่กี่อย่างของชีวิตทรงปัญญาในอดีตบนโลกนี้คือสถานีอวกาศวงโคจรที่กำลังพังทลายและหลักฐานประปรายใต้พื้นผิวที่แตกร้าว"
 nascent_locust:0 "ตั๊กแตนระยะตั้งต้น"
 nascent_locust_desc:0 "ดาวดวงนี้มีประชากรสิ่งมีชีวิตที่กำจัดได้ง่ายแต่แพร่พันธุ์อย่างรวดเร็วเป็นจำนวนมาก ผู้ใดก็ตามที่พยายามอยู่รอดบนพื้นผิวจะต้องปรับโครงสร้างพื้นฐานของตนให้รับมือกับการโจมตีเป็นครั้งคราวจากแมลงขนาดใหญ่"
 stratovents: "ปล่องก๊าซสตราโตสเฟียร์"
 stratovents_desc: "โครงสร้างแร่สูงตระหง่านที่พ่นก๊าซขึ้นสู่ชั้นเทอร์โมสเฟียร์"
 stratovent_world_modifier_tourism: "ปล่องก๊าซสตราโตสเฟียร์ที่ยังไม่ถูกรบกวน"
 stratovent_world_modifier_tourism_desc: "ปล่องก๊าซสตราโตสเฟียร์อันงดงามเหล่านี้ถูกปล่อยไว้โดยไม่แตะต้อง เพื่อให้เทียนิกิได้เล็มกินก๊าซเหล่านั้น"
 stratovent_world_modifier_tourism_tt: "$job_biologist_plural_with_icon$ จะถูกเปลี่ยนเป็น $job_stratovent_researcher_plural_with_icon$\n$mod_planet_biologists_amenities_produces_add$: §G+300§!"
 stratovent_world_modifier_refining: "โรงกลั่นปล่องก๊าซสตราโตสเฟียร์"
 stratovent_world_modifier_refining_desc: "ไอระเหยจากปล่องก๊าซสตราโตสเฟียร์ขนาดมหึมาเหล่านี้ถูกเบี่ยงทิศและกลั่นให้เป็นก๊าซ กัมมันตรังสีอันมีค่า"
 stratovent_world_modifier_tourism_boost: "แท่นชมปล่องก๊าซสตราโตสเฟียร์"
 stratovent_world_modifier_tourism_boost_desc: "ยกระดับการท่องเที่ยวปล่องก๊าซสตราโตสเฟียร์ด้วยแท่นชมเฉพาะทาง เพื่อสังเกตพฤติกรรมการกินของเทียนิกิอันยิ่งใหญ่"
 stratovent_world_modifier_tourism_boost_tt: "$job_biologist_plural_with_icon$ จะถูกเปลี่ยนเป็น $job_stratovent_researcher_plural_with_icon$\n$mod_planet_biologists_amenities_produces_add$: §G+300§!"
 stratovent_world_modifier_refining_upg: "ปล่องก๊าซสตราโตสเฟียร์ที่ขยายแล้ว"
 stratovent_world_modifier_refining_upg_desc: "การระเบิดเปิดทางใหม่ให้ก๊าซใต้ดินประสบผลสำเร็จ ส่งผลให้การผลิตเพิ่มสูงขึ้น"
 stratovent_world_modifier_refining_minerals: "ปล่องก๊าซสตราโตสเฟียร์ที่พังถล่ม"
 stratovent_world_modifier_refining_minerals_desc: "แม้ความล้มเหลวบางส่วนของการขยายปล่องจะทำให้การผลิตลดลง แต่มันก็สร้างแหล่งแร่ที่อุดมสมบูรณ์ขึ้นมาเช่นกัน"
 planet_new_colony_spiritualist_attraction: "ส่งเสริมจิตวิญญาณนิยม"
 planet_new_colony_spiritualist_attraction_desc: "จริยธรรม §Hจิตวิญญาณนิยม§! กำลังได้รับการส่งเสริมจากรัฐบาล"
 planet_new_colony_materialist_attraction: "ส่งเสริมวัตถุนิยม"
 planet_new_colony_materialist_attraction_desc: "จริยธรรม §Hวัตถุนิยม§! กำลังได้รับการส่งเสริมจากรัฐบาล"
 planet_new_colony_authoritarian_attraction: "ส่งเสริมอำนาจเผด็จการ"
 planet_new_colony_authoritarian_attraction_desc: "จริยธรรม §Hอำนาจเผด็จการ§! กำลังได้รับการส่งเสริมจากรัฐบาล"
 planet_new_colony_egalitarian_attraction: "ส่งเสริมความเสมอภาค"
 planet_new_colony_egalitarian_attraction_desc: "จริยธรรม §Hความเสมอภาค§! กำลังได้รับการส่งเสริมจากรัฐบาล"
 planet_new_colony_militarist_attraction: "ส่งเสริมการทำสงคราม"
 planet_new_colony_militarist_attraction_desc: "จริยธรรม §Hชอบสงคราม§! กำลังได้รับการส่งเสริมจากรัฐบาล"
 planet_new_colony_pacifist_attraction: "ส่งเสริมการรักสันติ"
 planet_new_colony_pacifist_attraction_desc: "จริยธรรม §Hรักสันติ§! กำลังได้รับการส่งเสริมจากรัฐบาล"
 planet_new_colony_xenophile_attraction: "ส่งเสริมการชื่นชอบชาวต่างดาว"
 planet_new_colony_xenophile_attraction_desc: "จริยธรรม §Hชอบต่างดาว§! กำลังได้รับการส่งเสริมจากรัฐบาล"
 planet_new_colony_xenophobe_attraction: "ส่งเสริมการกลัวต่างดาว"
 planet_new_colony_xenophobe_attraction_desc: "จริยธรรม §Hเกลียดต่างดาว§! กำลังได้รับการส่งเสริมจากรัฐบาล"
 dark_immortal_control: "การปรากฏตัวของอมตะมืด"
 dark_immortal_control_desc: "โลกนี้ทุกข์ทนจากการปรากฏอยู่ของพลังมืด ผลผลิตเบ่งบานท่ามกลางความโศกเศร้า"
 remnants_of_court_of_blossoms: "เศษซากแห่งราชสำนักบุปผา"
 remnants_of_court_of_blossoms_desc: "โลกนี้เจริญรุ่งเรืองอยู่บนเศษซากของสิ่งที่ครั้งหนึ่งเคยเป็นราชสำนักบุปผา"
 happy_anathari: "อนาคตอันเป็นหนึ่งเดียว"
 happy_anathari_desc: "นับจากวันนี้เป็นต้นไป ชะตากรรมของเราถักทอเข้ากับชาวภาษาอะนาตาริร่วมกัน เราจะเพาะบ่มอนาคตร่วมกัน และโลกก็เริ่มกวนไหวด้วยชีวิตใหม่ ฟากฟ้าของมันสว่างไสวด้วยคำมั่นสัญญา"


