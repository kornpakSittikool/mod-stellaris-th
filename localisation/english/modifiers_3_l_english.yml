 # Synced from vanilla by Stellaris Thai Translator.
 # These keys were missing from the mod and should be translated on the next pass.
 black_crystal_no_grand_archive: "การ ปรากฏ ของ คริสตัล ดํา"
 black_crystal_no_grand_archive_desc: "คริสตัลดํา นําความสุขมาสู่ทุกคนในบริเวณใกล้เคียง"
 black_crystal_engine_speed: "ชื่อผู้ใช้ของคริสตัลดํา"
 black_crystal_engine_speed_desc: "คริสตัลดําประกอบด้วยสาร ที่ช่วยเพิ่มความสามารถในการขับเคลื่อนของเรือ"
 mysterious_doll: "ริ้น"
 mysterious_doll_desc: "นักวิทยาศาสตร์ของเรากลับไปใช้สิ่งประดิษฐ์ซ้ํา ๆ อย่างต่อเนื่อง ถูกกระตุ้นจากศักยภาพที่ต่อเนื่อง"
 happy_giants: "ลาน หญ้า ยักษ์"
 happy_giants_desc: "ทุก คน บน เรือ รบ§Y[Root.GetName]§!มี การ ผสมผเส โดย การ เล่น ลูก วัว เทียน คี และ รู้สึก มี ความ สุข และ ผ่อน คลาย มาก กว่า แต่ ก่อน."
 steris_core_conspiracy_modifier: "ระบบดาวความก้าวหน้า"
 steris_core_conspiracy_modifier_desc: "ระบบ เรือ รบ§Y[Root.GetName]§!เร็วกว่า และมีประสิทธิภาพมากกว่า"
 caeli_core_conspiracy_modifier: "ความ ก้าว หน้า ทาง อารมณ์"
 caeli_core_conspiracy_modifier_desc: "ประชากร ใน เรือ รบ§Y[Root.GetName]§!รู้สึกเบาลงและมีความสุขขึ้น"
 statue_modifier: "ตราสัญลักษณ์"
 statue_modifier_desc: "การย้ายของวัตถุที่ประกอบพิธีนี้ ได้ก่อความไม่สงบขึ้นบนยานอาร์ก§Y[Root.GetName]§!ถึง กระนั้น ความ สมมาตร ที่ ผิด ธรรมชาติ ของ มัน ก่อ ให้ เกิด ความ หลงใหล ใคร่ รู้."
 etherdrake_scales_modifier: "ความ รู้ เกี่ยว กับ สเกล"
 etherdrake_scales_modifier_desc: "ความรู้ที่เราได้จากการเก็บเกี่ยว เกล็ดมังกรเอเธอร์ จะปรับปรุงกลไกการป้องกันของเรือของเรา"
 farms_in_flames_modifier: "ฟาร์ม ใน เปลว ไฟ"
 farms_in_flames_modifier_desc: "มี การ จงใจ เผา ส่วน ที่ เป็น พืช พรรณ เพื่อ หยุด ยั้ง การ ระบาด ของ เชื้อ รา ทํา ให้ การ ผลิต อาหาร ลด ลง อย่าง มาก ขณะ ที่ ทํา ให้ พืช พรรณ ปน เปื้อน."
 mycelial_intelligence_modifier: "$arkship.1225.name$"
 mycelial_intelligence_modifier_desc: "เครือข่ายสิ่งรบกวนบน§Yเรือ รบ[Root.GetName]§!ได้มีการปรับตัวเพื่อเพิ่มการปลูกพืชใหม่ การปรับปรุงอย่างมีประสิทธิภาพทางการเกษตร และการผลิตอาหารโดยรวม"
 funghi_friends_modifier: "ฟุงฮีเป็นเพื่อน"
 funghi_friends_modifier_desc: "เครือข่ายปากคําบน§Yเรือ รบ[Root.GetName]§!ปัจจุบัน ความร่วมมือกับระบบการเกษตรของเรา การเพิ่มความยืดหยุ่นของพืชและอุปไมย ผ่านความผูกพันธ์ของซีเมียที่ไม่ซ้ํากัน"
 unknown_resource_demolished: "พื้นที่ที่อ้างถึง"
 unknown_resource_demolished_desc: "ส่วน ที่ ไม่ ได้ รับ อนุญาต ของ เรือ รบ ถูก รื้อ ทําลาย และ มี การ นํา สถาน ที่ กลับ มา ใช้ อีก โดย การ ปล่อย ห้อง พัก และ ปรับ ปรุง สภาพ ชีวิต ให้ ดี ขึ้น."
 wellness_retreat_permitted: "การ สูญ เสีย วิตามิน"
 wellness_retreat_permitted_desc: "มี การ อนุญาต อย่าง เป็น ทาง การ ให้ มี ที่ พัก ผ่อน และ การ ฟื้น ตัว ซึ่ง ช่วย ปรับ ปรุง สวัสดิภาพ ของ ลูก เรือ."
 arkship_order_restored: "สั่งซื้อใหม่"
 arkship_order_restored_desc: "ชาว เมือง ที่ ไม่ ได้ รับ อนุญาต ได้ ถูก ย้าย ออก จาก เรือ รบ เพื่อ ฟื้นฟู ความ รู้สึก ถึง ความ เป็น ระเบียบ และ ความ มั่นคง บน เรือ."
 arkship_purge_enacted: "กําจัดแล้ว"
 arkship_purge_enacted_desc: "พวกผู้ค้านถูกถอดออกจากยานอาร์ค สั่งซื้อได้รับการฟื้นฟูอย่างหนักแน่น แม้ว่าความโหดร้ายของการกระทํา ได้ทิ้งเครื่องหมายบนลูกเรือ"
 alien_racing_ship_cap: "$alien_racing_ship$"
