 # RG Timeline events
 TIMELINE_EVENT_ORIGIN_RG_START: "$origin_red_giant$\n§L[GetDate]§!"
 TIMELINE_EVENT_ORIGIN_RG_START_TOOLTIP: "§Hการขุดอุโมงค์ดวงดาว§!\n§Yเหตุการณ์จุดกำเนิด§!\n\nเราค้นพบกลุ่มความผันผวนในซับสเปซ การค้นหาแหล่งที่มาความไม่เสถียรอันตรายของดาวฤกษ์ของเราได้เริ่มต้นขึ้นแล้ว"
 TIMELINE_EVENT_ORIGIN_RG_END_NOVA: "ความตายของดาวยักษ์ใหญ่\n§L[GetDate]§!"
 TIMELINE_EVENT_ORIGIN_RG_END_NOVA_TOOLTIP: "§Hประจักษ์พยานแห่งซูเปอร์โนวา§!\n§Yเหตุการณ์จุดกำเนิด§!\n\nดาวฤกษ์ของเราขยายตัวกลืนกินระบบทั้งหมด ทิ้งดาวเคราะห์ไว้ในซากปรักหักพังหลอมเหลวและกระจายทรัพยากรไปทั่วความว่างเปล่า ตอนนี้เราไม่มีทางเลือกนอกจากต้องสร้างอนาคตใหม่ท่ามกลางดวงดาว"
 TIMELINE_EVENT_ORIGIN_RG_END_STABLE: "ดาวยักษ์ใหญ่ผู้สงบลง\n§L[GetDate]§!"
 TIMELINE_EVENT_ORIGIN_RG_END_STABLE_TOOLTIP: "§Hปกป้องโลกบ้านเกิดสำเร็จ§!\n§Yเหตุการณ์จุดกำเนิด§!\n\nการตรึงขนาดของดาวฤกษ์ประสบความสำเร็จ ป้องกันการถล่มที่เป็นภัยพิบัติ พลังงานดวงอาทิตย์ที่เพิ่มขึ้นจำเป็นต้องมีการปรับตัว แต่ในการเผชิญความท้าทายเหล่านี้ เราจะเติบโตขึ้นอย่างแข็งแกร่งกว่าที่เคยเป็นมา"
 TIMELINE_EVENT_ORIGIN_RG_END_NORMAL: "ดาวยักษ์ใหญ่ผู้รักสงบ\n§L[GetDate]§!"
 TIMELINE_EVENT_ORIGIN_RG_END_NORMAL_TOOLTIP: "§Hปกป้องโลกบ้านเกิดสำเร็จ§!\n§Yเหตุการณ์จุดกำเนิด§!\n\nเราลบล้างการเปลี่ยนแปลงอันร้ายแรงของดาวบ้านเกิดของเรา ส่งมันกลับสู่สภาพที่รักสงบซึ่งสอดคล้องกับวิวัฒนาการของเรา เราพิสูจน์แล้วว่าสามารถเอาชนะวิกฤตวันสิ้นโลกได้ และพร้อมเผชิญกับทุกสิ่งในจักรวาล"

 # COSMIC DAWN
 # All strings below are in order of their appearance ingame
 infernals.2500.name: "สัญญาณในส่วนลึก" # intro
 infernals.2500.desc: "การสแกนแบบมุ่งเป้าพบหลักฐานของสิ่งก่อสร้างที่ซับซ้อนฝังอยู่ใต้พื้นผิวของ §Y[root.capital_scope.GetName]§!, เพิ่มขึ้นในขนาดและความซับซ้อนเมื่อเข้าใกล้แกนกลาง ลายเซ็นวัสดุและพลังงานของพวกมันตรงกับห้องจำศีลที่เราตื่นขึ้นมาครั้งแรก\n\nนี่ต้องเป็นซากอารยธรรมเดิมของเรา หากเราสามารถเข้าถึงสถานบริการเหล่านี้ เราอาจพบคำตอบสำหรับคำถามที่ยิ่งใหญ่ที่สุดเกี่ยวกับอดีตของเรา: เราเป็นใคร และเกิดอะไรขึ้นกับเรา?"
 infernals.2500.a: "การเดินทางของเราเริ่มต้นขึ้น"

 INF_ORIGIN_COSMIC_DAWN_DRILLING: "ขุดเจาะเปลือกดาว" # from 2500
 INF_ORIGIN_COSMIC_DAWN_DRILLING_DESC: "หากเราต้องการเข้าใจว่าเราเป็นใคร เราต้องเรียนรู้ก่อนว่าเรามาจากไหน เราจะต้องขุดค้นสิ่งก่อสร้างที่ฝังอยู่ใต้พื้นผิวของ §Y[owner.Capital.GetName]§!."
 infernals.2505.name: "เพื่อนร่วมสายพันธุ์ตื่นขึ้นเพิ่มเติม"
 infernals.2505.desc.a: "เราค้นพบฝักจำศีลเพิ่มเติมที่มี §Y[root.GetSpeciesNamePlural]§! ที่ยังมีชีวิตอยู่ เรากำลังอยู่ในกระบวนการปลุกพวกเขา แต่พวกเขากลับไม่มีความทรงจำที่ชัดเจนเกี่ยวกับอดีตไปมากกว่าเราเลย"
 infernals.2505.desc.b: "เราค้นพบฝักจำศีลเพิ่มเติมที่มี §Y[root.GetSpeciesNamePlural]§! ที่ยังมีชีวิตอยู่ แม้จะผนวกรวมพวกเขาเข้ามาแล้ว แต่ก็ชัดเจนว่าพวกเขาไม่มีความทรงจำที่มีประโยชน์เลย"
 infernals.2505.a: "อนุญาตการขุดค้นขนาดใหญ่เต็มรูปแบบ"
 infernals.2505.b: "ย้ายเฉพาะสิ่งที่จำเป็นเท่านั้น"
 infernals.2505.c: "จ้างผู้รับเหมาช่วงในการขุดเจาะ"

 situation_cosmic_dawn: "การขุดค้นเชิงลึก"
 situation_cosmic_dawn_type: "$situation_cosmic_dawn$"
 situation_cosmic_dawn_monthly_change_tooltip: "ความคืบหน้าปัจจุบันในการขุดค้นเชิงลึกของเรา"
 situation_cosmic_dawn_desc: "การขุดค้นของเราเผยให้เห็นสถานก่อสร้างใต้ดินที่เก็บเทคโนโลยีขั้นสูง ข้อมูลที่จัดเก็บ และฝักจำศีลที่มีญาติที่หลับใหลของเรา ประวัติศาสตร์ของเราฝังอยู่ที่นี่ หากเราขุดขึ้นมาได้ทั้งหมด ในที่สุดเราอาจเข้าใจว่าเราคือใคร"
 situation_cosmic_dawn_finish_tt: "เพื่อเรียนรู้เกี่ยวกับตัวเองเพิ่มเติม เราต้องค้นพบอดีตที่ห่างไกลของเราอีกครั้ง"
 situation_cd_mod_mining: "$approach_cd_mining$"
 situation_cd_mod_drilling: "$approach_cd_drilling$"
 situation_cd_mod_financial: "$approach_cd_financial$"
 situation_cd_mod_storm: "$TRIGGER_FAIL$ โครงการวิจัยพิเศษ §Y$INF_ORIGIN_COSMIC_DAWN_STORM$§! ที่ยังไม่เสร็จสิ้น"
 situation_cd_mod_bribe: "$TRIGGER_FAIL$ โครงการวิจัยพิเศษ §Y$INF_ORIGIN_COSMIC_DAWN_BRIBE$§! ที่ยังไม่เสร็จสิ้น"

 sit_cd_stage1_tt: "เราเริ่มเจาะทะลุเปลือกโลกแล้ว"
 sit_cd_stage2_tt: "จากจุดนี้ เราไม่สามารถมองเห็นพื้นผิวดาวได้อีกต่อไป"
 sit_cd_stage3_tt: "เจาะมาถึงครึ่งทางของเปลือกดาว อุณหภูมิกำลังสูงขึ้น"
 sit_cd_stage4_tt: "ลึกเข้ามาในเปลือกดาวขนาดนี้ เราได้ยินเสียงหมุนวนของแกนกลางโลก"
 sit_cd_stage5_tt: "เราไม่สามารถไปต่อได้ มิฉะนั้นจะถูกแกนกลางกลืนกินเข้าไป"
 approach_cd_mining: "การทำเหมืองแบบเปิด"
 approach_cd_mining_tt: "ให้ทุกคนช่วยกันขุด ขณะที่เราอยู่ข้างล่างนั่น เราก็เก็บเกี่ยวทรัพยากรแร่ธาตุไปด้วยเลย \nความคืหน้ารายเดือน: §Y+$@approach_cd_mining$§!\n\n"
 approach_cd_drilling: "การขุดเจาะแบบมุ่งเป้า"
 approach_cd_drilling_tt: "ติดตั้งอุปกรณ์เจาะที่ดีที่สุดและแม่นยำที่สุดที่เรามี ขุดเฉพาะส่วนที่เราต้องขุดเท่านั้น \nความคืบหน้ารายเดือน: §Y+$@approach_cd_drilling$§!\n\n"
 approach_cd_financial: "แรงจูงใจทางการเงิน"
 approach_cd_financial_tt: "ปรับเปลี่ยนการอนุญาตผู้รับเหมาช่วงการขุดของเราไปยังแนวทางนี้ และแบ่งผลกำไรบางส่วนไว้ให้เรา \nความคืบหน้ารายเดือน: §Y+$@approach_cd_financial$§!\n\n"

 # Stage 2
 infernals.2510.name: "ภาวะสูญเสียความจำและข้อมูล"
 infernals.2510.intro: "ขณะ ที่ เรา ยัง คง ค้น พบ ฝัก ส เต ซิส อีก เรา พบ ว่า การ สูญ เสีย ความ ทรง จํา เกือบ จะ ครบ ถ้วน."
 infernals.2510.desc.a: "$infernals.2510.intro$\n\nญาติผู้เพิ่งตื่นขึ้นบางคนได้ตั้งคำถามเดียวกับที่เราครุ่นคิดในตอนนี้: คุณคือใคร?\n\nแม้ประวัติศาสตร์จะยาวนานหลายศตวรรษและสังคมจะพัฒนาขึ้นเรื่อย ๆ แต่เราก็ไม่อาจ้างได้ว่าเราเข้าใกล้คำตอบมากกว่าพวกเขานัก\n\n$infernals.2510.outro$"
 infernals.2510.desc.b: "$infernals.2510.intro$\n\nเมื่อตื่นขึ้น ญาติที่นอนหลับเหล่านี้ยังคงขาดความทรงจำที่เกี่ยวข้องกับจุดกำเนิดของเรา เช่นเดียวกับคนอื่น ๆ เมื่อไม่มีคำตอบ เราจึงต้องกำหนดเส้นทางประวัติศาสตร์ของตัวเอง\n\n$infernals.2510.outro$"
 infernals.2510.outro: "ต่างจากผู้ที่หลับใหล ฐานข้อมูลของพวกเขามีข้อมูลใหม่ที่น่าทึ่ง เราทำการวิเคราะห์ซ้ำหลายครั้งเพื่อยืนยัน แต่ผลลัพธ์นั้นปฏิเสธไม่ได้ ข้อมูลบ่งชี้ว่าเวลาได้ผ่านไปกว่าหนึ่งหมื่นสองพันล้านปีแล้ว ตั้งแต่เราเข้าสู่โหมดจำศีลครั้งแรก\n\nนี่ระบุจุดกำเนิดของเราให้อยู่ใกล้กับช่วงเริ่มต้นของจักรวาล ท่ามกลางการก่อตัวของดาวฤกษ์และดาวเคราะห์ยุคแรกสุด เราอาจเป็นหนึ่งในสิ่งมีชีวิตที่มีภูมิปัญญากลุ่มแรก ๆ ที่พัฒนาขึ้นมา"
 infernals.2510.a: "ติดตามสิ่งที่เราพลาดไป"
 infernals.2510.b: "จักรวาลนี้เป็นของเราโดยชอบธรรม"

 # Stage 3
 infernals.2515.name: "ระบบพยุงชีพขัดข้อง"
 infernals.2515.desc: "เราได้ขุดพบโศกนาฏกรรม บันทึกจากสิ่งก่อสร้างฝักจำศีลที่สมบูรณ์นี้เผยให้เห็นว่า §Y[event_target:homeworld.GetName]§! ใช้เวลาหลายพันล้านปีล่องลอยไปอย่างไร้ทิศทางก่อนที่จะถูกจับด้วยดาวฤกษ์ปัจจุบัน การจับคู่นั้นทำให้เกิดคลื่นน้ำขึ้นน้ำลงครั้งใหญ่\n\nแม้ว่าแรงบีบอัดเหล่านั้นจะหลอมรวมสวรรค์ภูเขาไฟที่เราเรียกว่าบ้านในตอนนี้ขึ้นมา แต่แรงสั่นสะเทือนแรกเริ่มทำให้เซลล์พลังงานของอาคารเสียหายอย่างรุนแรง ระบบอัตโนมัติให้ความสำคัญกับผู้ที่มีสถานะสูงก่อน โดยปิดฝักจำศีลระดับล่างและการบำรุงรักษาโครงสร้าง\n\n[GetScientistPlural] ของเราคาดการณ์ว่ามีเพียงคนเดียวเท่านั้นที่สามารถช่วยชีวิตไว้ได้ก่อนที่การเปิดใช้งานจะทำให้แหล่งจ่ายไฟรั่วไหล และนำไปสู่การถล่มของอุโมงค์ทั้งหมด\n\nหากการจัดลำดับความสำคัญตามสถานะไม่ได้กำหนดผลลัพธ์ไว้ เราอาจจะช่วยชีวิตได้มากกว่านี้"
 infernals.2515.a: "ความก้าวหน้าทางวิทยาศาสตร์มีความสำคัญสูงสุด"
 infernals.2515.a.tt: "ได้รับผู้นำ: £scientist£ §Y$scientist$§!"
 infernals.2515.b: "การจัดลำดับความสำคัญผู้เชี่ยวชาญเป็นทางเลือกที่ดี"
 infernals.2515.b.tt: "ได้รับผู้นำ: £official£ §Y$official$§!"
 infernals.2515.c: "กู้ชีพโดยไม่ต้องเปิดใช้งานพลังงานทั้งหมด"
 infernals.2515.c.tt: "บุคคลอาจทดแทนได้ แต่จักรวรรดิของเราต้องการพื้นที่เพื่อเติบโต"

 infernals.2520.name: "แหล่งลี้ภัยระหว่างดวงดาว"
 infernals.2520.desc: "§Y[event_target:leader.GetName]§! กำลังประกอบคลังเอกสารแฟ้มจัดเก็บแบบเงื่อนไขของพวกเขาขึ้นมาใหม่ การค้นพบล่าสุดของพวกเขาระบุว่าอาจมีประชากร [root.GetSpeciesNamePlural] เล็ก ๆ จำนวนมากกระจายอยู่ทั่วกาแล็กซี ซึ่งได้รับการเก็บรักษาไว้ในโหมดจำศีลเช่นเดียวกับเราในอดีต\n\nคลังข้อมูลบันทึกตำแหน่งของโลกเหล่านี้ไว้ แต่เมื่อดวงดาวเกิดและดับไปตั้งแต่เวลานั้น การระบุพิกัดในปัจจุบันต้องการการคำนวณที่ซับซ้อน เพื่อพิสูจน์แนวคิดนี้ [event_target:leader.GetName] ได้ระบุดาวเคราะห์ดวงหนึ่งดังกล่าวแล้ว แต่การแปลชุดข้อมูลทั้งหมดเพิ่งเริ่มต้นขึ้นเท่านั้น\n\nในขณะเดียวกัน ความคิดที่น่ากังวลก็เกิดขึ้น: [root.Capital.GetStarName] อาจไม่ใช่ดาวฤกษ์บ้านเกิดที่แท้จริงของเรา แต่เป็นเพียงแหล่งลี้ภัยแหล่งหนึ่งท่ามกลางแหล่งลี้ภัยมากมาย หากเป็นเช่นนั้น จุดกำเนิดที่แท้จริงของเราอยู่ที่ไหน? และมันยังสำคัญอยู่อีกหรือ?"
 infernals.2520.a: "เราต้องตามหาญาติของเรา"
 infernals.2520.b: "โลกใบนี้คือบ้านของเราแล้วในตอนนี้"

 cosmic_dawn_anomalies_event_chain_title: "แหล่งลี้ภัยระหว่างดวงดาว"
 cosmic_dawn_anomalies_event_chain_desc: "ประชากร [root.GetSpeciesNamePlural] ที่ซ่อนอยู่จำนวนมากอาจกระจัดกระจายอยู่ทั่วกาแล็กซี ได้รับการเก็บรักษาในสภาวะจำศีลเหมือนเราในอดีต\n\nคลังเก็บข้อมูลได้บันทึกตำแหน่งดาวเหล่านี้ไว้ แต่เนื่องจากดาวฤกษ์ถือกำเนิดและสูญสิ้นไปหลายดวงนับแต่นั้นมา การค้นหาพิกัดจึงจำเป็นต้องใช้การคำนวณที่ซับซ้อน"

 # Anomaly 2
 cosmic_dawn_sleepers_category: "ผู้นอนหลับผู้อยู่โดดเดี่ยว"
 cosmic_dawn_sleepers_category_desc: "ดาวเคราะห์ที่พิกัดเหล่านี้ควรจะซ่อนแหล่งเก็บผู้หลับใหลและเทคโนโลยีไว้ เราควรสืบสวนอย่างถี่ถ้วน"
 infernals.2525.name: "$cosmic_dawn_sleepers_category$"
 infernals.2525.desc: "§Y[root.leader.GetName]§! ค้นพบอาคารใต้ดินที่ซ่อนญาติของเราไว้ในโหมดจำศีล และประสบความสำเร็จในการปลุกพวกเขาให้ตื่น ต่างจากพวกเรา พวกเขายังคงมีความทรงจำจาง ๆ เกี่ยวกับชีวิตเดิม และดำรงอยู่ด้วยเรื่องเล่าของจักรวรรดิอวกาศอันยิ่งใหญ่ซึ่งวันหนึ่งอาจกลับมาช่วยชีวิตพวกเขา\n\nพวกเขาระมัดระวังตัวแต่จดจำเราในฐานะญาติได้ เราสามารถนำเสนอตัวเองในฐานะผู้ช่วยชีวิตที่รอคอยมานาน ผู้สืบทอดความรุ่งโรจน์โบราณนั้น หรือเราสามารถบอกความจริงว่า: เรากำลังหล่อหลอมสิ่งใหม่ และกระตือรือร้นที่จะเรียนรู้จากพวกเขาพอ ๆ กับที่เราพร้อมจะสั่งสอน\n\nการอ้างอิงเพิ่มเติมในคลังข้อมูลนี้ช่วยให้เราจำกัดขอบเขตของดาวดวงที่สองที่มีฝักจำศีลได้แคบลง"
 infernals.2525.a: "เราคือผู้ช่วยชีวิตโบราณของพวกเขา"
 infernals.2525.b: "เรากำลังสร้างสิ่งใหม่"
 infernals.2525.c: "ดูดกลืนพวกมันเข้ามา"

 # Anomaly 3
 cosmic_dawn_sleepers2_category: "ผู้นอนหลับผู้นิยมความระมัดระวัง"
 cosmic_dawn_sleepers2_category_desc: "$cosmic_dawn_sleepers_category_desc$"
 infernals.2530.name: "$cosmic_dawn_sleepers2_category$"
 infernals.2530.desc: "§Y[root.leader.GetName]§! ค้นพบญาติของเราในฝักจำศีลเพิ่มเติมและปลุกพวกเขาได้สำเร็จ แต่พวกเขาตอบสนองด้วยความหวาดกลัว เรียกร้องให้เราจากไป พวกเขาจำเราไม่ได้และไม่ต้อนรับการมีอยู่ของเรา\n\nหลังจากการเจรจาอันตึงเครียด พวกเขาแสดงความปรารถนาที่จะออกจากที่นี่และออกไปสำรวจกาแล็กซี เราสามารถมอบยานลำง่าย ๆ ให้พวกเขาในราคาย่อมเยา หรือเมื่อพิจารณาถึงความต้องการแรงงานอย่างต่อเนื่องของเรา เราก็ย้ายพวกเขาไปยังอาณานิคมที่ใกล้ที่สุด บางทีตอนนั้นพวกเขาอาจเข้าใจเหตุผล\n\nคลังข้อมูลของสถานบริการแห่งนี้แสดงที่ตั้งของโลกอีกโลกที่มีฝักจำศีลเพิ่มเติม"
 infernals.2530.a: "มอบยานอวกาศให้พวกเขา"
 infernals.2530.b: "พาพวกเขากลับบ้าน"
 infernals.2530.b.tt: "ได้รับประชากร £pop£ $POPS$: §G+200§!"
 infernals.2530.c: "ดูดกลืนพวกมันเข้ามา"

 # Ship returns
 infernals.2531.name: "การกลับมา"
 infernals.2531.desc: "พวกนอนหลับที่เอายานของเราไปได้เดินทางกลับมาแล้ว แถมยังกลับมาด้วยยานรบขนาดใหญ่อีกด้วย การเดินทางข้ามกาแล็กซีนำพาพวกเขาไปสู่ความขัดแย้งกับโจรสลัด ซึ่งพวกเขาเอาชนะและโค่นล้มลงได้ในที่สุด\n\nการยึดยานศัตรูได้จุดประกายบางอย่างในตัวพวกเขา: ความโปรดปรานในวิถีโจรสลัด จากจุดนั้น ปฏิบัติการปล้นสะดมของพวกเขาเติบโตอย่างอาจหาญขึ้น เป้าหมายของพวกเขาทรงพลังขึ้น แต่ถึงการเป็นโจรสลัดที่ประสบความสำเร็จก็ไม่อาจยืนยงได้ตลอดไป\n\nบัดนี้พวกเขากลับมาบ้านแล้ว เพื่อแสวงหาความมั่นคง และอาจเป็นบางอย่างที่ยิ่งใหญ่กว่านั้น ด้วยยาน ประสบการณ์ และของรางวัลของพวกเขา พวกเขาอาจมีประโยชน์กับเราอย่างมาก"
 infernals.2531.a: "มันคุ้มค่ากับราคาที่จ่ายไป"
 infernals.2531.a.tt: "เราสามารถนำยานของพวกเขาเข้าสู่กองทัพเรือของเรา ได้รับเรือลาดตระเวน(สายรัด)"
 infernals.2531.b: "ปรับแต่งยานของพวกเขาเพื่อตั้งถิ่นฐานในโลกใหม่ให้แก่เรา"
 infernals.2531.b.tt: "ได้รับยานบุกเบิกอาณานิคม §H$colonizer$§!"
 infernals.2531.c: "เรามีพื้นที่สำหรับพวกเขาที่เมืองหลวงของเรา"
 infernals.2531.c.tt: "ได้รับประชากร £pop£ $POPS$: §G+200§!"

 # Anomaly 4
 cosmic_dawn_sleepers3_category: "ท่าอวกาศของผู้นอนหลับ"
 cosmic_dawn_sleepers3_category_desc: "$cosmic_dawn_sleepers_category_desc$"
 infernals.2535.name: "$cosmic_dawn_sleepers3_category$"
 infernals.2535.desc: "§Y[root.leader.GetName]§! ค้นพบสิ่งอำนวยความสะดวกในโหมดจำศีลขนาดเล็ก พร้อมกับท่าอวกาศที่ซ่อนอยู่ซึ่งมียานวิทยาศาสตร์ที่เกือบพร้อมใช้งาน การซ่อมแซมเล็กน้อยก็น่าจะเพียงพอ\n\nสถานที่นี้ยังมีข้อมูลวิทยาศาสตร์จำนวนมาก รวมถึงตัวอย่างพันธุ์ที่ได้รับการอนุรักษ์จากสายพันธุ์อื่น ๆ[GetInterstellarRefugiaDesc2535] ไม่แน่ชัดว่าสายพันธุ์เหล่านี้ถูกจับมาด้วยกำลังหรือมอบให้อย่างเต็มใจ แต่ยานลำนี้มีห้องขังที่ออกแบบมาเพื่อกักเก็บสินค้าที่มีสติปัญญา\n\nเราจะได้ประโยชน์อย่างมากจากการศึกษาพวกเขา บางทีอาจมีสิ่งมีชีวิตสายพันธุ์อื่น ๆ ที่ยังรอการค้นพบอยู่ในอวกาศข้างนอกนั่น"
 infernals.2535.contact: ", บางส่วนน่าจะเป็นบรรพบุรุษของสิ่งมีชีวิตที่มีปัญญาในปัจจุบัน" # prints this in [GetInterstellarRefugiaDesc2535] above
 infernals.2535.nocontact: "." # Can't be empty, so holds the full stop.
 infernals.2535.a: "ศึกษาตัวอย่างพันธุ์เหล่านี้"
 infernals.2535.b: "คืนตัวอย่างพันธุ์เหล่านี้ไปยังญาติของพวกเขา"
 infernals.2535.c: "ทำลายหลักฐานทิ้ง"

 # Random Stasis Pods discovered
 infernals.2536.1: "หลังจากการทำงานหลายเดือน [root.GetSpeciesNamePlural] ใหม่ทั้งหมดที่หลับใหลอยู่บน [planet.GetName] ได้เข้าร่วมกับกลุ่มของเราแล้ว"
 infernals.2536.1.a: "กำหนดหลักสูตรการนำทางเข้าสู่ระบบ!"
 infernals.2536.1.b: "เราไม่มีเวลาให้กับสิ่งเหล่านี้อีกต่อไป" # ends the chance to spawn more pods.
 infernals.2536.2: "ฝักจำศีลอีกอันถูกเปิดออกด้วยความสำเร็จและผู้อยู่อาศัยถูกพากลับบ้านแล้ว"
 infernals.2536.3: "เราได้ปลดปล่อย [root.GetSpeciesNamePlural] เพิ่มเติม และกำลังช่วยเหลือพวกเขาปรับตัวให้เข้ากับจักรวาลที่หนาวเย็นกว่า ซึ่งพลังงานความร้อนจากดาวฤกษ์เป็นสิ่งจำเป็นสำหรับการอยู่รอด"
 infernals.2536.4: "ได้รับ [root.GetSpeciesNamePlural] เพิ่มเติมที่ตื่นขึ้นมาบน [planet.GetName]"
 infernals.2536.5: "พบฝักจำศีลอีกอันเป็นที่เรียบร้อย"
 infernals.2536.6: "[root.leader.GetName] ค้นพบฝักจำศีลเพิ่มเติม นำพา [root.GetSpeciesNamePlural] จากอดีตกาลก้าวเข้ามาสู่ยุคปัจจุบันของเรา"
 infernals.2536.7: "[root.leader.GetName] ค้นพบฝักจำศีลอีกอันที่มี [root.GetSpeciesNamePlural] บันทึกไว้อย่างปลอดภัย"
 infernals.2536.8: "[root.leader.GetName] เปิดฝักจำศีลโบราณบน [planet.GetName] และกำลังรักษาผู้อยู่อาศัยจากอาการช็อกอุณหภูมิต่ำ"
 infernals.2536.9: "พบฝักจำศีลอีกอันที่มี [root.GetSpeciesNamePlural] บนดาว [planet.GetName]"
 infernals.2536.10: "ผู้คนนอนหลับจากยุคโบราณถูกปลุกให้ตื่นขึ้นมาร่วมกับเราเพิ่มขึ้น"

 # Stage 4
 infernals.2540.name: "คุกโบราณ"
 infernals.2540.desc: "การขุดค้นล่าสุดของเราเผยให้เห็นสิ่งที่ไม่คาดฝัน: กลุ่มผู้นอนหลับนี้ตื่นขึ้นมาเมื่อหลายศตวรรษก่อน แต่ไม่เคยเดินทางออกจากสถานบริการของตนเลย\n\nการวิเคราะห์ทางสถาปัตยกรรมแสดงให้เห็นว่ามันถูกล็อกจากภายนอก เพื่อขังพวกเขาไว้ด้านใน การเจาะทะลูประตูเสริมเหล็กทำให้เราเผชิญกับการต่อต้านทันที แม้ว่าผู้นอนหลับจะได้ล่าถอยไปแล้วก็ตาม\n\nเอกสารจดหมายเหตุอาจช่วยอธิบายเรื่องนี้ แต่การเข้าถึงอาจเสี่ยงต่อการยั่วยุเพิ่มเติม เราสามารถบุกโจมตีสถานบริการและยุติเรื่องนี้ได้อย่างรวดเร็ว หรือพยายามให้สินบนเพื่อแลกความร่วมมือ"
 infernals.2540.a: "บุกโจมตีสถานบริการ"
 infernals.2540.b: "มอบของขวัญและมิตรภาพ"

 INF_ORIGIN_COSMIC_DAWN_STORM: "บุกถล่มคุกจำศีล"
 INF_ORIGIN_COSMIC_DAWN_STORM_DESC: "เราจำเป็นต้องเข้าถึงสถานบริการนี้ และผู้นอนหลับที่ตื่นขึ้นมากำลังขวางทางเราอยู่ จงกำจัดพวกเขาด้วยกำลัง"
 infernals.2545.name: "เจาะทะลวงคุกป้อมปราการ"
 infernals.2545.desc: "กองกำลังของเราได้บุกโจมตีสถานบริการและปราบผู้อยู่อาศัยส่วนใหญ่ได้อย่างรวดเร็ว โดยพบการต่อต้านเพียงเล็กน้อยเท่านั้น\n\nจดหมายเหตุเผยว่าที่นี่คือเรือนจำ ผู้ถูกคุมขังเป็นกลุ่มแนวคิดสุดโต่งที่สนับสนุนการใช้ความพยายามทางเทคโนโลยีระดับสูงเพื่ออุ่นจักรวาลที่กำลังเย็นตัวลง บางแนวคิดเป็นไปไม่ได้อย่างสิ้นเชิง บางแนวคิดอาจนำไปสู่ภัยพิบัติระดับวิบัติ\n\nแกนนำนักโทษ §Y[root.GetSpeciesNamePlural]§! บางคนได้สร้างเครื่องกีดขวางตัวเองในห้องกลางพร้อมระเบิด เรียกร้องให้ผู้อยู่อาศัยทุกคนอยู่ที่นี่และถูกปิดผนึกอีกครั้ง\n\nอุโมงค์สามารถถูกเติมด้วยแก๊สที่มองไม่เห็นซึ่งจะทำให้วัตถุระเบิดเฉื่อยชา เพื่อรักษาโครงสร้างไว้ได้ แต่จะทำให้ผู้อยู่อาศัยส่วนใหญ่เสียชีวิตในเวลาสั้น ๆ"
 infernals.2545.a: "ปล่อยแก๊สเข้าสู่อุโมงค์"
 infernals.2545.a.tt: "ได้รับประชากร £pop£ $POPS$: §G+100§!"
 infernals.2545.b: "อพยพออกอย่างรวดเร็ว"
 infernals.2545.b.tt: "ได้รับประชากร £pop£ $POPS$: §G+400§!"

 INF_ORIGIN_COSMIC_DAWN_BRIBE: "ติดสินบนสถานจำศีล"
 INF_ORIGIN_COSMIC_DAWN_BRIBE_DESC: "หากเราทำให้ผู้อยู่อาศัยในสถานบริการแห่งนี้ต้องพึ่งพาเรา เราจะมีอำนาจต่อรองในการขอเข้าถึงสถานที่ได้ เราควรส่งสินค้าและทรัพยากรที่สำคัญและมีประโยชน์ไปให้พวกเขาจำนวนมาก"
 infernals.2550.name: "เจาะทะลวงคุกป้อมปราการ"
 infernals.2550.desc: "หลายเดือนของการค้าทำให้ผู้ถูกคุมขังในอดีตต้องพึ่งพาเสบียงของเรา เมื่อเราขู่ว่าจะยุติมัน พวกเขาตื่นตระหนกและยอมจำนนต่อการควบคุมสถานบริการ\n\nจดหมายเหตุยืนยันว่าเป็นเรือนจำ บุคคลเหล่านี้เคยผลักดันเทคโนโลยีหัวรุนแรงเพื่ออุ่นจักรวาลที่เย็นตัวลง: บางแนวคิดไร้สาระ บางแนวคิดใช้งานได้อย่างมีประสิทธิภาพจนน่าอันตราย\n\nโชคร้ายที่พวกเขาจำเรื่องเหล่านี้ไม่ได้เลย ในขณะที่นักวิทยาศาสตร์ศึกษาพื้นที่นี้ นักโทษในอดีตกำลังผนวกรวมเข้ากับสังคมและพร้อมสำหรับการกลืนกลายวัฒนธรรมเป็นอย่างดี"
 infernals.2550.a: "ทำได้ดีมาก"
 infernals.2550.a.tt: "ได้รับประชากร £pop£ $POPS$: §G+300§!"

 # Stage 5
 infernals.2555.name: "อุบัติเหตุที่น่าเศร้า"
 infernals.2555.intro: "อุบัติเหตุเกิดขึ้นในพื้นที่ขุดค้นล่าสุด สถานีพลังงานในสิ่งอำนวยความสะดวกได้รับความเสียหาย แม้ว่าฝักจำศีลจะยังคงทำงานได้ดีอยู่ในตอนนี้"
 infernals.2555.outro: "ไม่แน่ชัดว่าระบบจะยังคงทำงานต่อไปได้อีกนานเท่าใด หากเราต้องการช่วยเหลือผู้นอนหลับ เราต้องลงมือปฏิบัติการก่อนที่สถานบริการจะหมดพลังงาน"
 infernals.2555.desc.a: "$infernals.2555.intro$\n\nความสงสัยตกอยู่กับชาวเทอร์โมไฟล์(ผี)ที่เพิ่งได้รับการผสมผสานวัฒนธรรมจากสถานบริการแห่งก่อนหน้า มีข่าวลือว่าพวกเขาอาจไม่ใช่คนงานที่ขยันขันแข็งที่สุด\n\n$infernals.2555.outro$"
 infernals.2555.desc.b: "$infernals.2555.intro$\n\nเมื่อได้ยินเกี่ยวกับภัยพิบัตินี้ ชุมชนชาวเทอร์โมไฟล์ที่ได้รับการช่วยเหลือมาก่อนหน้าได้เสนอตัวเข้าร่วมช่วยเหลือเพื่อเร่งกระบวนการกู้ภัย\n\n$infernals.2555.outro$"
 infernals.2555.a: "กวาดล้างคนงานที่ไม่ภักดีทั้งหมด"
 infernals.2555.b: "จ่ายเงินเพื่อจ้างคนงานเพิ่มเติม"
 infernals.2555.c: "เร่งรีบเข้าไปกู้ภัย"
 infernals.2555.d: "ดำเนินการด้วยความระมัดระวัง"

 # Option events from above (Stage 4)
 infernals.2560.name: "การเยียวยาสถานการณ์"
 infernals.2560.desc: "เราจำกัดการเข้าถึงเฉพาะคนงานที่ภักดีที่สุดของเรา เพื่อลดการรบกวนในความพยายามกู้ภัยให้น้อยที่สุด\n\nโชคร้ายที่การคัดกรองความปลอดภัยจำกัดกำลังพลของเรา และเราล้มเหลวในการกู้ชีพสถานบริการ ผู้นอนหลับเสียชีวิตทั้งหมด\n\nความพึงพอใจเพียงอย่างเดียวของเราคือการศึกษาเทคโนโลยี การเสื่อมสภาพและการปิดตัวลงอย่างช้า ๆ ของมันอาจมอบข้อมูลความรู้ที่มีค่าได้"
 infernals.2560.a: "ช่างน่าเสียดายจริง ๆ"

 infernals.2565.name: "$infernals.2560.name$"
 infernals.2565.desc: "เราเสนอรางวัลทางการเงินสำหรับงานกู้ภัยและได้รับผู้สมัครล้นหลาม\n\nโชคร้ายที่ความพยายามดังกล่าวถูกวินาศกรรมโดยอดีตนักโทษเรือนจำที่โกรธแค้นเรื่องการใช้ความมั่งคั่งในการเข้าควบคุม การวินาศกรรมนำไปสู่การเสียชีวิตของผู้อาศัยในฝักจำศีลทั้งหมด\n\nความปลอบใจเล็กน้อยคือความเสียหายนั้นถูกจำกัดเป้าหมาย เรายังคงสามารถศึกษาเทคโนโลยีและจดหมายเหตุได้ และความล้มเหลวนี้ได้เผยให้เห็นจุดบกพร่องในการคัดกรองของเราซึ่งสามารถแก้ไขได้ในตอนนี้"
 infernals.2565.a: "การกระทำที่น่ารังเกียจอย่างยิ่ง!"

 infernals.2570.name: "$infernals.2560.name$"
 infernals.2570.intro: "จำนวนคนงานและทีมกู้ภัยที่หลั่งไหลเข้าสู่สถานบริการใต้ดินช่วยให้เราสกัด [Species.GetName] ที่กำลังนอนหลับออกจากฝักจำศีลที่กำลังล้มเหลวได้อย่างรวดเร็วและปลอดภัย พลเมืองใหม่เหล่านี้เมื่อเห็นชะตากรรมที่ตนรอดพ้นมา ต่างรู้สึกซาบซึ้งต่อการกู้ภัยครั้งนี้"
 infernals.2570.outro: "โชคร้ายที่ในระหว่างการกู้ภัยอันเร่งรีบ ฝักจำศีลจำนวนมากต้องถูกตัดเปิดหรือทำลายลง ส่งผลให้คุณค่าทางวิทยาศาสตร์ถูกจำกัด"
 infernals.2570.desc.a: "$infernals.2570.intro$\n\n$infernals.2570.outro$"
 infernals.2570.desc.b: "$infernals.2570.intro$\n\nนอก จาก นี้ ดู เหมือน ว่า อาสา สมัคร จาก เรือน จํา ได้ สนับสนุน ผู้ มา ใหม่ เหล่า นี้ ด้วย การ สนทนา และ เสบียง ต่าง ๆ ทํา ให้ พวก เขา มี ส่วน ร่วม ใน สังคม มาก ขึ้น.\n\n$infernals.2570.outro$"
 infernals.2570.a: "เป็นเรื่องดีที่เรามีอาสาสมัครเหล่านั้นเพิ่มเติม"
 infernals.2570.a.tt: "ได้รับประชากร £pop£ $POPS$: §G+400§!"
 infernals.2570.b: "ทำได้ดีมาก"
 infernals.2570.b.tt: "ได้รับประชากร £pop£ $POPS$: §G+400§!"
 infernals.2570.c: "$ACKNOWLEDGED$"
 infernals.2570.c.tt: "ได้รับประชากร £pop£ $POPS$: §G+400§!"

 infernals.2575.name: "$infernals.2560.name$"
 infernals.2575.desc: "นักวิทยาศาสตร์ของเราวิเคราะห์ระบบอย่างละเอียดถี่ถ้วน เพื่อให้แน่ใจว่าเราเข้าใจอย่างครบถ้วนถึงสิ่งที่เรากำลังรับมือ ก่อนที่จะพยายามกู้ชีพประชากรที่นอนหลับอยู่\n\nน่าเศร้าที่ขั้นตอนตั้งแต่การวิเคราะห์ การตีพิมพ์ผลงาน ไปจนถึงการศึกษาติดตามผลใช้เวลานานเกินไป เมื่อถึงเวลาที่เราพร้อม ระบบพยุงชีพก็ล้มเหลวลง และทุกชีวิตก็สูญสิ้นไป\n\nแม้ว่าจะน่าสลดใจ แต่การกู้ภัยก็ได้มอบผลประโยชน์ทางวิทยาศาสตร์ครั้งสำคัญ และเทคโนโลยีที่กู้คืนได้ก็พิสูจน์แล้วว่ามีค่าอย่างมากแล้วในตอนนี้"
 infernals.2575.a: "โชคดีที่คนเป็นยังคงได้รับประโยชน์"
 infernals.2575.b: "$ACKNOWLEDGED$"

 # Situation completed
 infernals.2580.name: "เปิดเผยประวัติศาสตร์ของเรา"
 infernals.2580.desc: "ในที่สุดเราก็เข้าถึงแกนกลางส่วนกลาง และขนาดของมันเป็นเรื่องที่ยากจะเชื่อ มีอาโคโลจีขนาดมหึมาซ่อนอยู่ภายในดาวเคราะห์ ขับเคลื่อนด้วยแมกมาและเป็นที่อยู่อาศัยของผู้นอนหลับนับพันคน\n\nนอกจากนี้ยังเก็บจดหมายเหตุขนาดใหญ่ที่บันทึกเรื่องราวในอดีตของเรา: การเติบโตของจักรวรรดิทางกาแล็กซีของเรา และเสียงจากยุคที่จักรวาลเย็นตัวลงครั้งใหญ่ บางคนเลือกที่จะจำศีล บางคนต่อสู้กับสิ่งที่เป็นไปไม่ได้ และหลายคนเพียงแค่ปฏิเสธความจริงและเสียชีวิตไป\n\nขุมทรัพย์นี้เผยให้เห็นความจริงที่ฝังไว้เป็นเวลานาน บางคนเชื่อว่ามันแสดงให้เห็นว่าเราคือใคร และเราอาจจะกลายเป็นใครได้บ้าง บางคนแย้งว่าเราได้หล่อหลอมตัวตนใหม่ที่ประสบความสำเร็จขึ้นมาแล้ว และสังคมบรรพบุรุษของเราไม่เหมาะกับจักรวาลในปัจจุบันอีกต่อไป\n\nไม่ว่าจะอย่างไร เครือข่ายอุโมงค์ขนาดใหญ่สามารถนำไปใช้งานตามที่เราเลือกได้"
 infernals.2580.a: "เราควรสร้างจักรวรรดิโบราณของเราขึ้นมาใหม่"
 infernals.2580.b: "จักรวรรดิอื่นควรเคารพมรดกของเรา"
 infernals.2580.b.tt: "ได้รับผู้นำ: £commander£ §Y$commander$§! โดยมีเลเวลเริ่มต้นคือ §G5§!"
 infernals.2580.c: "เราควรมองไปยังอนาคต"
 infernals.2580.d: "สิ่งสำคัญคือเราต้องสร้างความดีเท่านั้น"

 # Relic & Specimen
 r_pyroglyphic_codex: "คัมภีร์ไพโรกลิฟิก"
 r_pyroglyphic_codex_desc: "เครื่องจำลองวงโคจรคริสตัลที่ซับซ้อนซึ่งบรรจุข้อมูลอันมั่งคั่งเกี่ยวกับอารยธรรมจากรุ่งอรุณแห่งเวลา เนื้อหาของมันมีสิ่งให้เรียนรู้มากมายเกี่ยวกับการสร้างสังคมที่ยิ่งใหญ่กว่า"
 r_pyroglyphic_codex_effect_tt: "\nการเปิดใช้งาน $r_pyroglyphic_codex$ เป็น §Yครั้งแรก§! จะเพิ่มการปรับปรุงคุณลักษณะ §Y$infernal_library$§! ให้กับเมืองหลวงของเราเป็นการถาวรโดยมีผลดังนี้: $TABBED_NEW_LINE$- $MOD_PLANET_MAX_DISTRICTS_ADD$: §G+5§! $TABBED_NEW_LINE$- $MOD_PLANET_HOUSING_MULT$: §G+20%§! $TABBED_NEW_LINE$- $MOD_PLANET_AMENITIES_ADD$: §G+10%§!"
 infernal_library: "สถาปัตยกรรมใต้ดิน"
 infernal_library_desc: "การค้นพบเทคนิคการสร้างสิ่งก่อสร้างโบราณบนโลกนี้ได้เปิดโอกาสใหม่ ๆ ในการก่อสร้างเมืองถ้ำขนาดมหึมา รายละเอียดและสถาปัตยกรรมที่ไม่เคยพบเห็นมาก่อนเป็นทัศนียภาพที่น่าทึ่งอย่างแท้จริง คอยเตือนใจประชากรทุกคนถึงจุดกำเนิดที่แท้จริงของพวกเขา"
 pyroglyphic_codex_mod: "$r_pyroglyphic_codex$"
 pyroglyphic_codex_mod_desc: "ความลับที่น่าสนใจซึ่งพบในคัมภีร์ไพโรกลิฟิกกำลังกระตุ้นการวิจัยช่องทางใหม่ ๆ และจะดำเนินต่อไปเช่นนี้เป็นเวลาหลายปี"

 infernal_stasispod: "ฝักจำศีลโบราณ"
 infernal_stasispod_desc_short: "โลงศพหินสังเคราะห์ที่ติดตั้งอุปกรณ์ควบคุมความร้อนอย่างแม่นยำอย่างน่าทึ่ง"
 infernal_stasispod_desc_details: "ฝักเหล่านี้ถูกใช้งานโดย [Species.GetName] ในอดีตเพื่อเข้าสู่โหมดจำศีลเป็นเวลาหลายพันล้านปี และจะปลุกผู้อยู่อาศัยก็ต่อเมื่ออุณหภูมิอุ่นพอที่จะรองรับพวกเขาได้ ฝักนี้มาจากสถานที่ซึ่งระบบหลายส่วนล้มเหลวและผู้อยู่อาศัยเสียชีวิต มันทำหน้าที่เป็นเครื่องเตือนใจที่เคร่งขรึมและสงบถึงการทดสอบความยากลำบากที่ผู้รอดชีวิต [Species.GetName] ได้ก้าวผ่านพ้นมา"

 ####################################
 # Colony Events
 ####################################

 # Imminent Eruption
 infernals.3000.name: "การระเบิดที่ใกล้จะเกิดขึ้น"
 infernals.3000.desc: "ระบบเตือนภัยทางธรณีวิทยาเตือนว่าการระเบิดของภูเขาไฟใกล้กับแหล่งตั้งถิ่นฐานหลักบน §Y[planet.GetName]§! มีแนวโน้มที่จะเกิดขึ้นภายในปีหน้า\n\nการลงทุนในการปล่อยแรงดันที่ควบคุมได้จะช่วยให้การไหลของลาวาสามารถนำมาควบคุมเพื่อผลิตพลังงานได้ นอกจากนี้ยังสามารถเตรียมความพร้อมทีมงานเพื่อเก็บเกี่ยวแมกมาโดยตรงจากการระเบิดและสกัดเอาโลหะมีค่าออกมา หรืออีกวิธีหนึ่ง เราสามารถมุ่งเน้นไปที่การอพยพพลเรือนและเสบียงออกจากพื้นที่เพื่อลดความเสี่ยงให้น้อยที่สุด\n\nเราสามารถเฝ้าติดตามสถานการณ์ต่อไปก่อนที่จะตกลงใจดำเนินการใด ๆ ในกรณีที่การคาดการณ์ไม่ถูกต้อง"
 infernals.3000.a: "อพยพ!"
 infernals.3000.a.tt: "มีพลังงาน §Y500§! $energy$"
 infernals.3000.b: "เฝ้ารอดูสถานการณ์"
 infernals.3000.c: "เน้นที่การผลิตกระแสไฟฟ้า"
 infernals.3000.d: "เก็บเกี่ยวแมกมา"

 infernals.3005.name: "ทันเวลาพอดี"
 infernals.3005.desc: "การอพยพผู้คนออกจากอาณานิคมแต่เนิ่น ๆ กลายเป็นทางเลือกที่ดี ภูเขาไฟระเบิดเร็วกว่าที่คาดไว้ สร้างความเสียหายอย่างรุนแรงต่อสิ่งปลูกสร้างในพื้นที่ บัดนี้เมื่อแรงดันภูเขาไฟใต้ดินลดลงเหลือน้อยที่สุด ผู้ตั้งถิ่นฐานสามารถเดินทางกลับและบูรณะใหม่อย่างปลอดภัย"
 infernals.3010.name: "โทสะภูเขาไฟ"
 infernals.3010.desc: "ภูเขาไฟระเบิดขึ้นก่อนกำหนด และอาณานิคมไม่ได้รับการเตรียมพร้อมเพื่อรับมือกับภัยพิบัติ โครงสร้างพื้นฐานได้รับความเสียหายอย่างมหาศาล และการสูญเสียชีวิตก็มีจำนวนมากอย่างมีนัยสำคัญ"
 infernals.3015.name: "เฝ้ารอดูสถานการณ์"
 infernals.3015.desc: "หลังจากผ่านไปสองสามเดือน กิจกรรมภูเขาไฟใกล้กับอาณานิคม §Y[planet.GetName]§! ก็ได้สงบลงอีกครั้ง แม้ว่าความเสี่ยงด้านความปลอดภัยในระยะยาวจะยังไม่หายไป แต่ดูเหมือนว่าอาณานิคมจะปลอดภัยในขณะนี้"
 infernals.3015.a: "ความเสี่ยงได้รับผลตอบแทนคุ้มค่า"
 infernals.3020.name: "โครงข่ายไฟฟ้าที่ได้รับการเสริมประสิทธิภาพ"
 infernals.3020.desc: "ทีมวิศวกรสามารถจัดตั้งระบบที่ปลอดภัยเพื่อค่อย ๆ ปล่อยลาวาที่มีแรงดันสูงออกจากห้องใต้ดิน โดยส่งผ่านเครื่องกำเนิดไฟฟ้าในขณะที่มันไหลผ่าน ส่งผลให้โครงข่ายไฟฟ้าของอาณานิคมได้รับประโยชน์ในระยะสั้น"
 infernals.3025.name: "การเก็บเกี่ยวแมกมา"
 infernals.3025.desc: "การระเบิดของภูเขาไฟถูกขัดจังหวะด้วยการใช้เครื่องรบกวนคลื่นเสียงล่วงหน้าร่วมกับแผงกั้นทางกายภาพ ส่งผลให้ลาวาผืนใหญ่ถูกกักเก็บและแข็งตัวบนพื้นผิว ทีมขุดเจาะเหมืองได้เริ่มปฏิบัติการเก็บเกี่ยวทรัพยากรแร่อันมั่งคั่งนี้แล้ว"

 # Lava Sports
 infernals.3030.name: "กีฬาลาวา"
 infernals.3030.desc: "หนึ่งอาจคิดว่าประชากรไม่อยากใช้เวลาอยู่ใกล้กับสายธารลาวาที่ไหลเชี่ยว แต่สำหรับที่ดาว §Y[planet.GetName]§! ความคิดนั้นย่อมผิดมหันต์\n\nผู้ตั้งถิ่นฐานกำลังแข่งเรือโฮเวอร์คราฟต์เอนกประสงค์ไปตามธารลาวาที่เคลื่อนไหวอย่างรวดเร็ว หลบหลีกก้อนหินที่ลอยอยู่และเร่งความเร็วข้ามน้ำตกลาวา คนอื่น ๆ กำลังเล่นการพนันผลการแข่งขันเหล่านี้ และบ่อนพนันได้ดึงดูดความสนใจจากอาชญากรรมจัดตั้ง นักบินบางคนถึงกับเสียชีวิตจากอุบัติเหตุต่าง ๆ\n\nอาณานิคมไม่มีกฎหมายต่อต้านการปฏิบัตินี้ เนื่องจากไม่เคยมีใครจินตนาการว่าจะมีใครทำเช่นนั้น เราสามารถยอมรับความกระตือรือร้นของผู้ตั้งถิ่นฐานและปล่อยให้พวกเขาทำตามใจชอบ แต่นี่อาจนำไปสู่ผลงานที่อันตรายยิ่งขึ้น และอาจเกิดองค์ประกอบทางอาชญากรรม เนื่องจากการพนันในเหตุการณ์เหล่านี้เพิ่มขึ้นอย่างต่อเนื่อง หรือเราสามารถควบคุมกีฬานี้ ซึ่งถึงแม้จะทำให้เกิดการบ่นพึมพำบ้าง แต่ก็น่าจะลดการเสียชีวิตและอาชญากรรมในระยะยาวได้ หรือเราจะสั่งแบนมันโดยสิ้นเชิง ซึ่งจะได้ผล แต่มีราคาในการบังคับใช้ที่สูงกว่า"
 infernals.3030.a: "ปล่อยให้มันไหลไป"
 infernals.3030.b: "จัดระเบียบกีฬานี้"
 infernals.3030.c: "แบนความเขลาครั้งนี้เสีย!"
 lava_surfboard: "กระดานโต้คลื่นลาวา"
 lava_surfboard_desc_short: "แผ่นเหล็กรูปทรงสี่เหลี่ยมผืนผ้าที่มีกลไกโฮเวอร์แบบดัดแปลงที่เชื่อมไว้ใต้แผ่น"
 lava_surfboard_desc_details: "แม้ว่าจะเห็นได้ชัดว่าถูกประกอบขึ้นจากชิ้นส่วนอะไหล่ แต่กระดานโต้คลื่นนี้ซึ่งใช้ในกีฬาลาวาของ [Event.Planet.GetName] ได้รับการประดิษฐ์ขึ้นด้วยความใส่ใจและชาญฉลาดเป็นพิเศษ ระบบโฮเวอร์และการป้องกันความร้อนของมันนั้นยอดเยี่ยม และความสวยงามของมันสะท้อนให้เห็นถึงการพึ่งพาตนเองที่ทนทานของผู้ตั้งถิ่นฐานในชายขอบ"

 infernals.3035.name: "ปล่อยให้มันไหลไป!"
 infernals.3035.desc: "การยินยอมให้ผู้ตั้งถิ่นฐานดำเนินตามแนวโน้มนี้ได้สร้างความตื่นตัวของกีฬาลาวา ภาพของนักบินที่ควบคุมเรือโฮเวอร์คราฟต์เหนือธารลาวากำลังกลายเป็นสัญลักษณ์ของวัฒนธรรมท้องถิ่นของ §Y[planet.GetName]§! อย่างรวดเร็ว\n\nโชคร้ายที่ความกระตือรือร้นได้กลบเกลื่อนความปลอดภัย รายงานประปรายของการเสียชีวิตจากการแข่งขันยังคงถูกส่งเข้ามา และปรากฏว่ามีกลุ่มกู้เงินทางอาชญากรรมกำลังแสวงประโยชน์จากพฤติกรรมการเล่นพนันของผู้ชื่นชอบกีฬาลาวา แม้ว่าความพึงพอใจของสาธารณชนต่อกีฬานี้จะยังคงสูง แต่เราควรตรวจสอบผลกระทบเชิงลบต่อไปในอนาคต"
 infernals.3035.a: "น่าหนักใจ"
 infernals.3040.name: "มาตรการความปลอดภัย"
 infernals.3040.desc: "ในขณะที่ตอนแรกผู้ตั้งถิ่นฐานรู้สึกไม่พอใจที่หน่วยงานจักรวรรดิเข้ามาควบคุมการละเล่นที่พวกเขาชื่นชอบ แต่มาตรการความปลอดภัยใหม่ที่จำเป็นสำหรับยานแข่งขันเกือบจะกำจัดการบาดเจ็บและการเสียชีวิตได้ทั้งหมด นักบินแข่งขันกำลังพูดถึงประโยชน์ของกฎระเบียบเหล่านี้ต่อความปลอดภัยของตนเอง ซึ่งช่วยดึงดูดสาธารณชนให้เข้ามามีส่วนร่วม\n\nจัดสรรการเงินและความโปร่งใสจากการพนันกีฬาลาวา และรายได้จะนำไปใช้ในการจัดหาอุปกรณ์ความปลอดภัยสำหรับนักแข่ง กลุ่มอาชญากรส่วนใหญ่ได้กระจายตัวออกจากบ่อนพนัน แม้ว่าผู้ตั้งถิ่นฐานบางคนจะบ่นว่าการเก็บภาษีโดยหน่วยงานปกครองนั้นไม่ยุติธรรมก็ตาม"
 infernals.3040.a: "ปลอดภัยไว้ก่อนดีกว่าเสียใจภายหลัง"
 infernals.3045.name: "กีฬาที่ถูกแบน"
 infernals.3045.desc: "กองกำลังบังคับใช้กฎหมายได้ถูกวางกำลังเพื่อยุติการปฏิบัติตัวที่เป็นอันตรายนี้ เสียงคัดค้านจากสาธารณชนต่อการบังคับใช้นั้นรุนแรงและการประท้วงได้เกิดขึ้นทั่วทั้งอาณานิคม แต่เนื่องจากธารลาวาอยู่ภายใต้การเฝ้าระวังอย่างต่อเนื่องและนักแข่งไม่สามารถลงแข่งได้ อัตราการเสียชีวิตจึงลดลงเหลือศูนย์ และฉากการพนันก็ระเหยหายไปเกือบหมด"
 infernals.3045.a: "มันไม่มีทางเลือกอื่นแล้ว"
 lava_sports_flow: "กีฬาลาวา: §Gอนุญาต§!"
 lava_sports_flow_desc: "การยินยอมให้ผู้ตั้งถิ่นฐานดำเนินตามแนวโน้มนี้ได้สร้างความตื่นตัวรอบกีฬาลาวาทีเดียว"
 lava_sports_regulated: "กีฬาลาวา: §Yจัดระเบียบ§!"
 lava_sports_regulated_desc: "ในขณะที่ตอนแรกผู้ตั้งถิ่นฐานรู้สึกไม่พอใจที่หน่วยงานของจักรวรรดิเข้ามาจัดระเบียบการละเล่นที่พวกเขารัก แต่มาตรการความปลอดภัยใหม่ที่จำเป็นสำหรับยานแข่งขันเกือบจะขจัดการบาดเจ็บและการเสียชีวิตไปได้ทั้งหมด นักบินแข่งขันกำลังยืนยันถึงความปลอดภัยที่กฎระเบียบเหล่านี้สร้างขึ้นเพื่อตนเอง ทำให้สาธารณชนหันมาสนับสนุน"
 lava_sports_banned: "กีฬาลาวา: §Rแบน§!"
 lava_sports_banned_desc: "กองกำลังบังคับใช้กฎหมายได้รับการวางกำลังเพื่อยุติการละเล่นที่เป็นอันตรายนี้"

 # Kindled Myths
 infernals.3055.name: "ตำนานที่ได้รับการจุดประกาย"
 infernals.3055.desc: "สมาชิกของสปีชีส์ยุคก่อนบุกเบิกอวกาศ (pre-FTL) บนดาว §Y[pre_ftl_planet.GetName]§! มีความคล้ายคลึงอย่างน่าทึ่งกับสิ่งมีชีวิตในตำนานจากตำนานที่เก่าแก่ที่สุดบางเรื่องของเรา บางส่วนอาจอธิบายได้ด้วยแนวโน้มกว้าง ๆ ของวิวัฒนาการและจิตวิทยาที่มาบรรจบกัน แต่ยิ่งเราเรียนรู้เกี่ยวกับสปีชีส์นี้มากเท่าใด เราก็ยิ่งพบความเชื่อมโยงมากขึ้นเท่านั้น\n\nสิ่งเหล่านี้อาจเป็นสิ่งมีชีวิตชนิดเดียวกับในตำนานและเรื่องเล่าของเราหรือไม่? ความตื่นเต้นที่ดาวดวงนี้เพิ่มขึ้นอย่างมาก และเราสามารถลงทุนเพื่อผลักดันการวิจัยนี้ให้ก้าวไกลยิ่งขึ้น แต่บางครั้งความบังเอิญก็ซ้อนทับกันโดยไม่มีความหมายลึกซึ้ง และการเข้าไปยุ่งเกี่ยวมากเกินไปอาจเปิดเผยการมีอยู่ของเราต่อสังคมนี้ ก่อให้เกิดผลกระทบที่ไม่ได้ตั้งใจตามมา"
 infernals.3055.a: "ละเลยความบังเอิญนี้เสีย"
 infernals.3055.b: "สืบสวนเพิ่มเติม"

 infernals.3060.name: "สมมติฐานที่โง่เขลา"
 infernals.3060.desc: "แม้จะมีการเรียกร้องให้มีการสืบสวน แต่การไล่ตามสมมติฐานของเอเลี่ยนในตำนานนี้ต่อไปย่อมเป็นเรื่องที่ไม่ฉลาด ท้ายที่สุดแล้ว สปีชีส์นี้มีตำนาน เรื่องเล่า และวิธีมองตนเองของตัวเอง ซึ่งอาจไม่เหมาะสมกับทัศนคติล่วงหน้าของเรา การวิจัยในหัวข้อนี้จึงถูกระงับชั่วคราว โดยเงินทุนถูกนำไปใช้ประโยชน์ในเรื่องอื่น ๆ"
 infernals.3060.a: "คุ้นเคย ทว่าแปลกประหลาด"

 infernals.3065.name: "ความปั่นป่วนของอารยธรรมเริ่มแรก"
 infernals.3065.desc: "ด้วยความกระตือรือร้นที่จะเชื่อมโยงสปีชีส์นี้เข้ากับตำนานของเรา ตัวแทนของเราละเลยระเบียบปฏิบัติการติดต่อก่อนบุกเบิกอวกาศที่ปลอดภัย ทั่วทั้งดาวเคราะห์ คนท้องถิ่นได้บันทึกการสังเกตการณ์ยานของเราหลายครั้ง ขโมยอุปกรณ์ และในกรณีหนึ่ง ได้ลักพาตัวตัวแทนของเราไปศึกษา การเรียนรู้เกี่ยวกับการมีอยู่ของเราได้สร้างความไม่สงบและการตอบสนองที่แตกแยก\n\nแม้ปฏิบัติการจะมีความวุ่นวาย แต่ความตื่นเต้นเกี่ยวกับความเชื่อมโยงทางตำนานยังคงมีอยู่ในหมู่ประชาชนของเรา สปีชีส์นี้กำลังถูกมองผ่านมุมมองทางจิตวิญญาณที่เพิ่มขึ้นทั่วทั้งจักรวรรดิของเรา"
 infernals.3065.a: "เราควรระมัดระวังมากกว่านี้"

 infernals.3070.name: "การค้นพบที่น่าอัศจรรย์"
 infernals.3070.desc: "การศึกษาอย่างเข้มข้นเกี่ยวกับผู้อยู่อาศัยของ §Y[pre_ftl_planet.GetName]§! ช่วยลดอุณหภูมิของสมมติฐานในตำนานลง แม้ว่าจะพบความสอดคล้องกันหลายประการระหว่างเรื่องราวที่เก่าแก่ที่สุดของเรากับสิ่งมีชีวิตเหล่านี้ แต่ก็พบความแตกต่างที่ไม่อาจประสานกันได้เช่นกัน\n\nแม้ว่าภาพจะมีความซับซ้อนขึ้น แต่ความกระตือรือร้นต่อสปีชีส์นี้ก็ยังคงอยู่ มีการเสนอแนะว่าพวกเขาอาจเป็นประชากรที่หลงเหลืออยู่ของสิ่งมีชีวิตดั้งเดิมในเรื่องราวของเรา และความแตกต่างอาจเนื่องมาจากระยะเวลาอันยาวนานที่ผ่านพ้นไป ในขณะที่เราถูกบังคับให้ยอมรับว่าพวกเขาเป็นสังคมของตนเองในปัจจุบัน หลายคนในจักรวรรดิของเราในตอนนี้รู้สึกถึงการเชื่อมโยงทางจิตวิญญาณที่แข็งแกร่งกับพวกเขา"
 infernals.3070.a: "ช่วงเวลาที่เติมเต็มสำหรับพวกเราทุกคน"

 # Molten Core Grand Archive specimen
 infernals.3200.name: "แกนกลางหลอมเหลว"
 infernals.3200.desc: "ในขณะที่อาณานิคมบน §Y[planet.GetName]§! เติบโตขึ้น หลักฐานของอารยธรรมที่สูญพันธุ์ซึ่งใช้ประโยชน์จาก $sr_living_metal$ ก็เด่นชัดขึ้นด้วยเช่นกัน แม้ว่าจะไม่มีร่องรอยว่าพวกเขาได้รับวัสดุนี้มาจากที่ใด\n\nคำตอบเพิ่งปรากฏขึ้นเมื่อไม่นานมานี้ ในรูปแบบของทรงกลมระยิบระยับที่แปลกตาซึ่งล้อมรอบด้วยสนามพลังซึ่งลอยขึ้นมาจากกระแสแมกมาในแกนโลกส่วนลึก วัตถุประสงค์แรกเริ่มและการก่อสร้างของมันไม่ชัดเจนในทันที แต่มันผลิตโลหะมีชีวิต $sr_living_metal$ ออกมาอย่างคงที่เมื่อสัมผัสกับอุณหภูมิที่สูงมาก ในขณะที่สิ่งนี้ช่วยไขปริศนาทางโบราณคดีได้อย่างง่ายดาย บัดนี้เราต้องตัดสินใจว่าจะทำอย่างไรกับมัน"
 infernals.3200.a: "เก็บรักษาสิ่งประดิษฐ์ไว้"
 infernals.3200.a.accept: "วัตถุที่น่าสนใจนี้ไม่เหมือนกับสิ่งที่เราเคยพัฒนาขึ้นมา มันไม่เพียงแต่มีประโยชน์ในฐานะแหล่งของ $sr_living_metal$ เท่านั้น แต่ยังทำหน้าที่เป็นสิ่งน่าสนใจทางวิทยาศาสตร์และประวัติศาสตร์ที่ควรค่าแก่การศึกษาอีกด้วย"
 infernals.3200.b: "โยนมันกลับลงไปในลาวา"
 infernals.3200.b.deny: "ไม่มีอะไรน่าชื่นชมเกี่ยวกับอารยธรรมที่ล้มเหลวในการปรับตัวและสูญพันธุ์ไป สิ่งประดิษฐ์นี้จะต้องถูกกำจัดและลืมเลือนไป"
 infernal_molten_core: "แกนกลางหลอมเหลว"
 infernal_molten_core_desc_short: "ทรงกลมสีเงินที่มีพื้นผิวเป็นของเหลวหมุนวน ล้อมรอบด้วยสนามพลังที่มีเสียงฟู่แผ่วเบา"
 infernal_molten_core_desc_details: "สนามพลังของแกนกลางจะคลายตัวลงเมื่อสัมผัสกับอุณหภูมิสูงเท่านั้น ทำให้โลหะมีชีวิต $r_living_metal$ หลุดรอดออกมาได้หนึ่งหยด ผู้สร้างดั้งเดิมของมันจากไปนานแล้ว แต่แกนกลางนี้ทำหน้าที่เป็นเครื่องพิสูจน์ถึงวิทยาศาสตร์และความชาญฉลาดของพวกเขา"

 # CD Timeline events
 TIMELINE_EVENT_ORIGIN_CD_START: "เสียงสะท้อนจากส่วนลึก\n§L[GetDate]§!"
 TIMELINE_EVENT_ORIGIN_CD_START_TOOLTIP: "§Hติดตามร่องรอย§!\n§Yเหตุการณ์จุดกำเนิด§!\n\nเราตรวจพบสัญญาณที่ซับซ้อนและแผ่วเบาที่ปล่อยออกมาจากใต้พื้นผิวดาวเคราะห์ลึกลงไป พวกมันมาจากเครือข่ายของสิ่งก่อสร้างโบราณที่ฝังอยู่ลึกในเปลือกดาว ซึ่งสร้างขึ้นก่อนยุคจำศีลอันยาวนานของเรา"
 TIMELINE_EVENT_ORIGIN_CD_END: "เผยประวัติศาสตร์สำเร็จ\n§L[GetDate]§!"
 TIMELINE_EVENT_ORIGIN_CD_END_TOOLTIP: "§Hเสร็จสิ้นห่วงโซ่เหตุการณ์§!\n§Yเหตุการณ์จุดกำเนิด§!\n\nเราค้นพบสิ่งอำนวยความสะดวกโบราณขนาดมหึมาลึกลงไปใต้โลก และได้คัมภีร์ข้อมูลที่สูญหายจากยุคที่ผ่านพ้นไปกลับคืนมา เราคือทายาทของมรดกอันทรงพลังและเก่าแก่ พร้อมที่จะรับมรดกของเราแล้ว"
