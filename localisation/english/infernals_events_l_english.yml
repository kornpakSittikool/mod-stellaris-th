l_english:

 ####################################
 # Anomaly Events
 ####################################
 # useful refs:
 # [From.GetName] planet
 # [From.GetStarName]
 # [Leader.GetName] scientist

 spires_of_light_category: "เสาแสงเสียดฟ้า"
 spires_of_light_category_desc: "การสแกนเบื้องต้นเผยให้เห็นเสาโครงสร้างเรืองแสงตระหง่านหลายต้น สูงขึ้นมาจากผืนภูมิประเทศที่แสนธรรมดา แหล่งกำเนิดและเป้าหมายของพวกมันยังคงไม่แน่ชัด แต่แสงเรืองรองดุจภูติผีนี้บ่งบอกว่ามันเป็นมากกว่าเพียงแค่ปรากฏการณ์ทางธรรมชาติ"
 infernals.500.name: "$spires_of_light_category$"
 infernals.500.desc: "ยานสำรวจที่ถูกส่งไปตรวจสอบเสาเรืองแสงระบุว่าพวกมันก่อตัวขึ้นจากแมกมาซิลิเกตที่ดัดงอได้ วัสดุนี้ถูกแรงดันดันขึ้นมาผ่านช่องหินดินดาน และแข็งตัวก่อนที่จะพ้นขึ้นมาสู่พื้นผิว ส่งผลให้เกิดโครงสร้างที่สามารถเติบโตได้สูงหลายร้อยเมตรก่อนที่น้ำหนักของมันเองจะทำให้มันถล่มลงมา\n\nผลลัพธ์คือป่าเสาที่ประกอบด้วยแก้วภูเขาไฟใสบริสุทธิ์เกือบทั้งหมด ซึ่งแต่ละต้นหักเหแสงสีส้มอันอบอุ่นของแมกมาที่หลอมเหลวที่ยังคงปั่นป่วนอยู่ด้านล่าง\n\nนักวิทยาศาสตร์ [Leader.GetName] เสนอว่าซากของเสาที่ถล่มลงมาเหล่านี้อาจเป็นทรัพยากรที่มีค่าได้"
 #EXCELLENT:0 (first option has default answer)
 infernals.500.a: "ปล่อยให้สถานที่อันศักดิ์สิทธิ์นี้สงบสุขต่อไป"
 infernals.500.b: "ยื่นประมูลใบอนุญาตในการสกัดทรัพยากร"
 infernals.500.c: "ใช้พวกมันเป็นเป้าซ้อมยิง"

 lava_whirlpool_category: "น้ำวนลาวา"
 lava_whirlpool_category_desc: "การสำรวจดาวเคราะห์ [Planet.GetName] ครั้งแรกเผยให้เห็นรูปร่างคล้ายพายุแปลกประหลาดในมหาสมุทรลาวาหลักของดาวเคราะห์ ปรากฏการณ์นี้ไม่ปกติอย่างยิ่งและคุ้มค่าแก่การตรวจสอบ"
 infernals.56.name: "น้ำวนลาวา"
 infernals.56.desc: "[Leader.GetName] ได้ยืนยันว่ารูปร่างแปลกประหลาดนี้คือพายุน้ำวนลาวา ซึ่งเป็นปรากฏการณ์ที่หาได้ยากยิ่ง และไม่มีครั้งใดในบันทึกที่มีขนาดใหญ่เท่านี้มาก่อน ด้วยความทึ่งในปรากฏการณ์แปลกประหลาดนี้ [Leader.GetName] จึงสั่งให้ดำเนินภารกิจเก็บตัวอย่าง\n\nตัวอย่างเผยให้เห็นว่าน้ำวนนี้ส่วนหนึ่งได้รับการหล่อเลี้ยงจากกลุ่มโลหะมีชีวิต(เสียงโลหะ)ที่คงตัวอยู่ ซึ่งถูกกระแสน้ำพัดจนฉีกขาดและจากนั้นก็พยายามประกอบตัวเองขึ้นมาใหม่ การประกอบตัวใหม่นี้ยังสร้างความปั่นป่วนให้กับลาวาเพิ่มขึ้น ส่งผลให้น้ำวนยังคงเคลื่อนที่ต่อไป การเก็บตัวอย่างยังแสดงให้เห็นว่าโลหะมีชีวิตนี้สามารถเก็บเกี่ยวได้โดยใช้ความพยายามเพียงเล็กน้อย"
 infernals.56.a: "เริ่มปฏิบัติการเก็บเกี่ยว"

 outgassing_category: "การคายแก๊ส"
 outgassing_category_desc: "การสแกนตามปกติของ [Planet.GetName] พบความผันผวนของสารเคมีที่รุนแรงอย่างผิดปกติในชั้นบรรยากาศ การสำรวจอย่างใกล้ชิดอาจช่วยอธิบายสิ่งที่เกิดขึ้นที่นี่ได้"
 infernals.1001.name: "การคายแก๊ส"
 infernals.1001.desc: "ความผันผวนของสารเคมีในชั้นบรรยากาศได้รับการยืนยันทั้งในแง่ของเวลาและพื้นผิว ความผันผวนนี้รุนแรงที่สุดเหนือมหาสมุทรลาวาขนาดใหญ่ที่เปิดโล่งของดาวเคราะห์ ยานสำรวจจึงถูกส่งไปเก็บตัวอย่าง\n\nจากการวิเคราะห์อย่างใกล้ชิด [Leader.GetName] ระบุว่ามหาสมุทรลาวาบน [Planet.GetName] กำลังคายแก๊สต่างดาวที่มีค่าออกมา การค้นพบที่คาดไม่ถึงนี้บ่งชี้ว่าดาวเคราะห์ดวงนี้อาจมีส่วนช่วยอุตสาหกรรมของเราได้ หากเราสามารถตักตวงประโยชน์จากมัน"
 infernals.1001.a: "เริ่มขั้นตอนการสกัด"

 crystal_lava_lakes_category: "ทะเลสาบลาวาผลึก"
 crystal_lava_lakes_category_desc: "ดาวเคราะห์ดวงนี้ดูเหมือนจะมีแอ่งลาวาไหลอย่างอิสระขนาดใหญ่อยู่บนพื้นผิว ซึ่งคุ้มค่าแก่การสำรวจ ในกรณีที่พวกมันเสนอโอกาสในการเก็บเกี่ยวทรัพยากร"
 infernals.1002.name: "ทะเลสาบลาวาผลึก"
 infernals.1002.desc: "ภาพถ่ายแรกของเราจากพื้นผิวของ [Planet.GetName] เผยให้เห็นการก่อตัวทางธรณีวิทยาที่สวยงามและคาดไม่ถึง ซึ่งเรียกกันว่า 'ทะเลสาบลาวาผลึก' แหล่งลาวาที่มีอายุยืนยาวเหล่านี้ผสมผสานด้วยแร่ธาตุที่เป็นเอกลักษณ์ ซึ่งภายในช่วงอุณหภูมิเฉพาะ จะจัดเรียงตัวเป็นโครงข่ายผลึกได้เองตามธรรมชาติ ผลลัพธ์คือความโปร่งใสเป็นพิเศษและการสะท้อนแสงสีแดงทั่วทั้งทะเลสาบ เนื่องจากวงโคจรของดาวเคราะห์ เอฟเฟกต์ที่สะดุดตานี้จะขึ้นลงตามวงรอบฤดูกาลเมื่ออุณหภูมิผันผวน\n\nความดึงดูดใจทางสุนทรียภาพของทะเลสาบลาวาผลึกเหล่านี้อาจเป็นตัวดึงดูดนักท่องเที่ยวได้อย่างทรงพลัง แร่ผลึกเหล่านั้นยังสามารถช้อนขึ้นมาจากพื้นผิวได้ในช่วงฤดูที่มีความเคลื่อนไหว หลังจากนั้นคุณสมบัติของพวกมันก็สามารถนำมาใช้ประโยชน์เป็นสื่อจัดเก็บพลังงานได้"
 infernals.1002.a: "พัฒนาพื้นที่นี้ให้เป็นรีสอร์ต"
 infernals.1002.b: "เก็บเกี่ยวพลังงานจากทะเลสาบ"
 crystal_lava_resort: "คริสตัล ลาวา รีสอร์ต"
 crystal_lava_resort_desc: "ทะเลสาบที่สวยงามตระการตาบนดาวเคราะห์ดวงนี้ได้รับการพัฒนาให้เป็นจุดหมายปลายทางท่องเที่ยวสุดหรู ซึ่งดึงดูดผู้มาเยือนจากทั่วทั้งกาแล็กซี"

 bioadaptive_flora_category: "พืชพรรณปรับตัวทางชีวภาพ"
 bioadaptive_flora_category_desc: "แม้ว่า [Planet.GetName] จะดูเหมือนดินแดนภูเขาไฟรกร้างทั่วไป แต่ปริมาณออกซิเจนกลับสูงอย่างน่าประหลาดใจ ต้องมีบางสิ่งที่ผิดปกติกำลังผลิตออกซิเจนนั้นอยู่"
 infernals.1003.name: "พืชพรรณปรับตัวทางชีวภาพ"
 infernals.1003.desc: "การประเมินเบื้องต้นของ [Planet.GetName] ระบุว่าเป็นโลกแห่งแมกมาและไฟ แต่การสำรวจได้เผยให้เห็นระบบนิเวศท้องถิ่นของพืชพรรณที่ซับซ้อนซึ่งอาศัยอยู่ในเครือข่ายของหุบเขาทรุดทั่วดาวเคราะห์ พืชเหล่านี้ผลิตออกซิเจนและเก็บกักความชื้นอันน้อยนิดที่มีอยู่ ส่งผลให้เกิดพื้นที่สภาพภูมิอากาศย่อยที่เกือบจะอบอุ่นในดินแดนรกร้างที่ร้อนจัดนี้\n\nไบโอมที่พืชพรรณนี้เกื้อหนุนอาจพิสูจน์ได้ว่าเหมาะแก่การอยู่อาศัยสำหรับสปีชีส์ที่ปกติหลีกเลี่ยงการตั้งถิ่นฐานในโลกภูเขาไฟ และพืชพรรณนี้อาจเหมาะสำหรับการเกษตรกรรม มันจะเป็นประโยชน์ต่อผู้ตั้งถิ่นฐานในการสำรวจอย่างถี่ถ้วนว่ามีอะไรอาศัยอยู่ในหุบเขาเหล่านั้นกันแน่"
 infernals.1003.a: "ทำเครื่องหมายพื้นที่นี้เป็นเขตตั้งถิ่นฐานที่ใช้ได้"
 infernals.1003.tooltip_a: "เพิ่มคุณสมบัติดาวเคราะห์เพื่อปรับปรุงความทนทานต่อการอยู่อาศัยและการเติบโต"
 bioadaptive_flora_modifier: "พืชพรรณปรับตัวทางชีวภาพ"
 bioadaptive_flora_modifier_desc: "พืชพรรณท้องถิ่นที่ยืดหยุ่นปกคลุมหุบเขาทรุดของดาวเคราะห์ดวงนี้ สร้างสภาพภูมิอากาศย่อยที่เย็นกว่าและหายใจได้ง่ายกว่า และช่วยสนับสนุนการอยู่อาศัยที่จำกัดแม้ในสภาพแวดล้อมภูเขาไฟ"

 tectonic_icebreaker_category: "เครื่องทำลายน้ำแข็งทางธรณีแปรสัณฐาน"
 tectonic_icebreaker_category_desc: "ตรวจพบความผิดปกติของอุณหภูมิต่ำอย่างแปลกประหลาดในดินผง(เสียชีวิต)ของ [Planet.GetName] บ่งชี้ว่ากระบวนการหรือวัตถุบางอย่างอาจกำลังทำให้บางส่วนของพื้นผิวเย็นลง การสำรวจด้วยการขุดเจาะจะช่วยเผยข้อมูลเพิ่มเติม"
 infernals.1004.name: "เครื่องทำลายน้ำแข็งทางธรณีแปรสัณฐาน"
 infernals.1004.desc: "[Leader.GetName] รายงานว่าภายใต้พื้นผิวภูเขาไฟของ §Y[from.GetName]§! คือธารน้ำแข็งขนาดมหึมา พวกมันถูกล้อมรอบด้วยการก่อตัวของหินที่แปลกประหลาดซึ่งประกอบด้วยแร่ธาตุที่มีคุณสมบัติเป็นฉนวนที่ยอดเยี่ยม กิจกรรมทางธรณีแปรสัณฐานกำลังทำให้ชั้นฉนวนเหล่านี้เสื่อมสภาพลงอย่างช้าๆ และ [Leader.GetName] คาดการณ์ว่าหากอุณหภูมิระหว่างธารน้ำแข็งกับส่วนที่เหลือของดาวเคราะห์เท่ากัน ดาวเคราะห์จะเย็นลงพอที่จะถือว่าเป็นโลกที่แห้งแล้ง แทนที่จะเป็นโลกภูเขาไฟ\n\nเราสามารถเร่งกระบวนการนี้เพื่อให้ดาวเคราะห์นี้เหมาะแก่การอยู่อาศัยขึ้นบ้าง แต่ปรากฏการณ์นี้ก็น่าสนใจทางวิทยาศาสตร์ และอาจมีค่าในการปล่อยให้มันดำเนินไปและศึกษาตามธรรมชาติ"
 infernals.1004.a: "รักษาเสถียรภาพทางธรณีแปรสัณฐาน"
 infernals.1004.b: "เร่งการละลาย"

 infernal_oasis_category: "โอเอซิสอเวจี"
 infernal_oasis_category_desc: "ภาพที่น่าตกใจของ §Y[from.GetName]§! แสดงให้เห็นโลกที่หลอมเหลวและลุกเป็นไฟซึ่งถูกขัดจังหวะด้วยผืนสีเขียวขนาดเท่าทวีปที่สว่างไสวอย่างน่าอัศจรรย์ ทัศนียภาพที่พิเศษนี้บ่งชี้ถึงสิ่งที่ไม่ธรรมดาอย่างยิ่งบนพื้นผิว"
 infernals.505.name: "สวรรค์ท่ามกลางภัยพิบัติ"
 infernals.505.desc: "องค์ประกอบและธรณีแปรสัณฐานที่เป็นเอกลักษณ์ของ §Y[from.GetName]§! ได้สร้างสิ่งมหัศจรรย์ที่ไม่มีใครเทียบได้ แม้ว่าพื้นที่ส่วนใหญ่ของดาวเคราะห์จะเป็นทะเลทรายร้อนที่เต็มไปด้วยหมอกควันภูเขาไฟและลาวาที่ไหลอย่างอิสระ แต่มีแผ่นทวีปหินแข็งขนาดใหญ่แผ่นหนึ่งสูงขึ้นไปหลายสิบกิโลเมตรเหนือพื้นผิวเฉลี่ย ส่งผลให้ที่ราบสูงแห่งนี้ซึ่งอยู่สูงกว่าชั้นเมฆพิษ เป็นที่ตั้งของระบบนิเวศสีเขียวขจีของพืชและสัตว์ท้องถิ่น\n\nที่ราบสูงนี้จะเหมาะสมแก่การอยู่อาศัยอย่างยิ่งสำหรับหลายสายพันธุ์ และสามารถมอบความเข้าใจทางวิทยาศาสตร์ที่น่าทึ่งจำนวนมากหากได้รับการศึกษา"
 infernals.505.a: "การค้นพบที่น่าอัศจรรย์"
 NAME_Vermilion: "Vermilion"
 NAME_Kira: "Kira"

 mysterious_ringing_category: "เสียงกริ่งลึกลับ"
 mysterious_ringing_category_desc: "นักวิทยาศาสตร์ของเราตรวจพบสัญญาณคลื่นวิทยุที่พุ่งขึ้นสูงเป็นประจำจากจุดจุดหนึ่งบน [Planet.GetName] ดูเมื่อนพวกมันจะตรงกับช่วงเวลาที่แหล่งสัญญาณข้ามจากฝั่งกลางคืนเข้าสู่กลางวัน"
 infernals.3210.name: "เสียงกริ่งลึกลับ"
 infernals.3210.desc: "ทีมวิทยาศาสตร์เดินทางมาถึง [from.GetName] เพื่อติดตามสัญญาณ และระบุว่ามันมาจากระบบถ้ำใต้ดินที่ติดตั้งอุปกรณ์สังเกตการณ์ทางวิทยาศาสตร์\n\n[Leader.GetName] นำทีมเข้าไปในถ้ำ ซึ่งพวกเขาพบห้องที่ปิดผนึกด้วยโลหะผสมที่ไม่คุ้นเคย โดยมีเสียงกริ่งแผ่วเบามาจากข้างใน [GetMysteriousRingingDesc3210]\n\nเมื่ออุปกรณ์ป้องกันเสียงถูกแจกจ่าย ทีมงานจึงเข้าไปและพบสิ่งมีชีวิตสายพันธุ์ที่ไม่รู้จักกำลังจำศีลอยู่ข้างๆ แหล่งสัญญาณ: อุปกรณ์รูปทรงกระบอกที่แปลกตา\n\nการวิเคราะห์ระบุว่าอุปกรณ์นี้ปล่อยคลื่นวิทยุออกมาเป็นระยะ ตามด้วยเสียงทำนองเพลงที่ทับซ้อนกับเสียงเปล่งออกมาหลายชั่วโมง ซึ่งดูเหมือนจะเข้ากันได้กับโครงสร้างเสียงของสิ่งมีชีวิตดังกล่าว [Leader.GetName] คาดเดาว่าอุปกรณ์นี้อาจพยายามปลุกสิ่งมีชีวิตนั้นตามตารางเวลาที่กำหนดไว้"
 infernals.3210.individual: "ทีมสำรวจพบจุดอ่อนในตราผนึกและพังเข้าไป ซึ่ง ณ จุดนั้นเสียงกริ่งดังลั่นจนหูอื้อ ก่อให้เกิดอาการตื่นตระหนกและอารมณ์เกรี้ยวกราดในหมู่สมาชิกในทีม"
 infernals.3210.gestalt: "ทีมสำรวจพบจุดอ่อนในตราผนึกและพังเข้าไป ซึ่ง ณ จุดนั้นเสียงกริ่งดังลั่นจนหูอื้อ ก่อให้เกิดภาวะข้อมูลประสาทสัมผัสล้นและจิตใจพังทลายในหมู่โดรน"
 infernals.3210.a: "คัดลอกงานวิจัยของพวกเขาและจากไป"
 infernals.3210.b: "พยายามปลุกและจ้างงานสิ่งมีชีวิตดังกล่าว"
 infernals.3210.btt: "ได้รับผู้นำ: £scientist£ §Y$scientist$§! โดยมีเลเวลเริ่มต้นคือ §G4§!"
 infernals.3210.c: "ขโมยอุปกรณ์ดังกล่าว"
 infernals.3210.ctt: "คนงานของเราจะได้รับประโยชน์จากเครื่องเตือนใจเป็นประจำเพื่อให้กลับไปทำงาน ปลดล็อกการตัดสินใจที่มอบผลผลิตจากงาน £job£ ['concept_jobs'] §G+10%§! โดยแลกกับความสุข £happiness£ ['concept_happiness'] §R-5%§!"
 decision_planetary_workshift: "บังคับใช้กะทำงานระดับดาวเคราะห์"
 decision_planetary_workshift_desc: "$planetary_workshift_deployed_desc$"
 planetary_workshift_deployed: "บังคับใช้กะทำงานระดับดาวเคราะห์แล้ว"
 planetary_workshift_deployed_desc: "การทำให้แน่ใจว่าทั้งดาวเคราะห์ทำงานในเขตเวลาเดียวจะช่วยปรับปรุงการสื่อสารและประสิทธิภาพระหว่างทีมในราคาความสุขที่ยอมรับได้"

  ####################################
  # Origin Events
  ####################################

 # Red Giant Origin
 infernals.45.name: "แนวโน้มที่น่ากังวล"
 infernals.45.desc: "เราคิดมานานแล้วว่า §Y[capital_star.GetName]§! เป็นดาวยักษ์แดงทั่วไป แต่การวิเคราะห์ล่าสุดระบุว่าขนาดและการแผ่รังสีของมันกำลังเพิ่มขึ้น การเปลี่ยนแปลงเหล่านี้กำลังส่งผลกระทบที่ตรวจวัดได้ต่อสภาพภูมิอากาศของเรา และประชากรเริ่มตื่นตระหนกมากขึ้น\n\nแนวโน้มเหล่านี้ไม่มีทีท่าว่าจะหยุดลง หากสายพันธุ์ของเราจะอยู่รอด เราต้องสืบสวนหาสาเหตุของปรากฏการณ์นี้"
 infernals.45.desc.gestalt: "เราคิดมานานแล้วว่า §Y[capital_star.GetName]§! เป็นดาวยักษ์แดงทั่วไป แต่การวิเคราะห์ล่าสุดระบุว่าขนาดและการแผ่รังสีของมันกำลังเพิ่มขึ้น การเปลี่ยนแปลงเหล่านี้กำลังส่งผลกระทบที่ตรวจวัดได้ต่อสภาพภูมิอากาศของเรา\n\nแนวโน้มนี้ไม่มีทีท่าว่าจะเปลี่ยนไป หากสายพันธุ์ของเราจะอยู่รอด เราต้องสืบสวนหาสาเหตุของปรากฏการณ์นี้"
 infernals.45.a: "รักษาความสงบและลดความสำคัญของปัญหาลง"
 infernals.45.b: "เราต้องสืบสวนโดยเร็ว"
 infernals.45.c: "เรามีลำดับความสำคัญอื่น ๆ"
 infernals.45.d: "ให้ทีมประชาสัมพันธ์จัดการเรื่องนี้"
 infernals.45.public.tt: "\n§Hสถานการณ์:§! $situation_red_giant_expansion$ \n- ตั้งค่าแนวทางสถานการณ์เป็น §Y$approach_reassure_public$§! \n- ได้รับทรัพยากรรายเดือน: §G10§! £unity£"
 infernals.45.cause.tt: "\n§Hสถานการณ์:§! $situation_red_giant_expansion$ \n- ตั้งค่าแนวทางสถานการณ์เป็น §Y$approach_find_the_cause$§!"
 infernals.50.name: "ซูเปอร์โนวาดวงดาว"
 infernals.50.desc: "[GetRedGiantEndingExplode]"
 infernals.50.totalIgnorance: "ไม่ว่าอะไรจะเป็นสาเหตุของภัยพิบัติดาวยักษ์แดง มันก็ไม่สำคัญอีกต่อไป สิ่งที่เราทำได้ในตอนนี้คือยอมรับสถานะปัจจุบันของเราและสร้างใหม่จากสิ่งที่เหลืออยู่"
 infernals.50.semiIgnorance: "ความปั่นป่วนจากการระเบิดของดาวฤกษ์ได้กวาดล้างหลักฐานทั้งหมดที่จำเป็นในการตามหาตัวผู้ร้าย\n\nสิ่งที่เราทำได้ในตอนนี้คือยอมรับสถานะปัจจุบันของเราและสร้างใหม่จากสิ่งที่เหลืออยู่"
 infernals.50.defaultEnding: "กระบวนการที่เริ่มต้นขึ้นโดยประชากรเอเลี่ยนที่หลงเหลืออยู่ในสถานีขุดแร่ที่เสื่อมสภาพในที่สุดก็ได้ข้อสรุป: §Y[Target.GetStarName]§! ได้กลายเป็นโนวา หลังจากกลืนกินระบบเกือบทั้งหมด พลาสมาและรังสีหลากสีสันกวาดล้าง §Y[event_target:red_giant_homeworld_tmp.GetName]§! จนเกลี้ยงเกลา พร้อมกับส่วนที่เหลือของระบบบ้านเกิดของเรา\n\n[GetMegacorpDesc50]\n\n[GetLususMiningDesc]"
 infernals.50.megacorp: "โลกบ้านเกิดของเราได้รับการแปลงสภาพเป็นแหล่งแร่อันมหาศาล กระจัดกระจายไปทั่วทั้งระบบเพื่อให้เข้าถึงได้สะดวก ต้นทุนในการขุดทรัพยากรเหล่านี้ต่ำกว่าการที่พวกมันยังคงอยู่ภายในดาวเคราะห์และดวงจันทร์ของพวกมันมาก เราคาดว่าผลกำไรของเราจะพุ่งสูงขึ้นเนื่องจากการจัดหาทรัพยากรราคาถูกนี้"
 infernals.50.nonmegacorp: "แม้ว่าโลกบ้านเกิดของเราจะกลายเป็นดินแดนรกร้างในตอนนี้ แต่โนวาได้เผยให้เห็นขุมทรัพย์ของทรัพยากรแร่ทั่วทั้งระบบ ซึ่งสามารถเข้าถึงได้ง่ายด้วยอุปกรณ์ขุดแร่ทั่วไป ความมั่งคั่งนี้สามารถนำมาใช้เพื่อสร้างอนาคตใหม่ได้"
 infernals.50.lususExists: "สถานีวูบวาบด้วยพลังงานชีพจรสุดท้ายก่อนที่จะปิดตัวลง ทิ้งให้เราอยู่ตามลำพังเพื่อเก็บชิ้นส่วนซากจากโลกบ้านเกิดของเรา"
 infernals.50.lususGone: "เนื่องจากสถานีไม่มีอยู่อีกต่อไป §Y[event_target:red_giant_homeworld_tmp.GetName]§! สามารถพักผ่อนได้อย่างสบายใจ โดยรู้ว่าเรื่องแบบนี้จะไม่มีวันเกิดขึ้นอีก"
 infernals.50.a: "เราต้องทำทุกวิถีทางเพื่อฟื้นฟูบ้านของเรา"
 infernals.51.name: "บรรเทาโนวาแล้ว"
 infernals.51.desc: "หลังจากความพยายามในการทำความสะอาดครั้งใหญ่ พื้นผิวของ §Y[this.GetName]§! สามารถอยู่อาศัยได้สำหรับ $trait_infernal_plural$ อีกครั้ง แม้ว่ารอยแผลเป็นถาวรบางอย่างจะยังคงอยู่ตลอดไป แต่บัดนี้พวกมันก็สามารถนำมาใช้ประโยชน์อย่างเต็มที่สำหรับโอกาสในการวิจัยที่เป็นเอกลักษณ์"
 infernals.60.name: "กลับสู่สภาวะปกติ"
 infernals.60.desc: "โดยการปรับไซฟอน สกัดไฮโดรเจนออกจากเปลือกดาว และปรับอัตราการป้อนเข้าของดาวฤกษ์อย่างละเอียด เราได้ทำให้การขยายตัวของ §Y[Target.GetStarName]§! ย้อนกลับอย่างปลอดภัย และฟื้นฟูมันกลับสู่ความสงบในอดีตในฐานะดาวยักษ์แดงที่อบอุ่น\n\nเราตรวจพบความเสถียรของสภาพภูมิอากาศบน §Y[Target.GetStarName]§!, และเราสามารถตั้งตารออนาคตที่เหมาะสมแก่การอยู่อาศัยมากขึ้น ซึ่งดาวเคราะห์บ้านเกิดของเราจะยังคงเป็นหัวใจของจักรวรรดิเราต่อไป\n\n[GetRedGiantEndingKalmStationStatus]"
 infernals.60.lususDestroyed: "หากไม่มีสถานีอยู่ใน [Owner.Species.GetHandNamePlural] ของเรา เราอาจไม่มีวันเข้าใจได้อย่างแน่ชัดว่าเกิดอะไรขึ้น แต่เราสามารถใช้ประโยชน์สูงสุดจากวัสดุใด ๆ ที่ถูกปล่อยออกมาจากดาวฤกษ์ในขณะที่มันถอยกลับ"
 infernals.60.lususAlive: "เมื่อเราเข้าใจวิธีการควบคุมสถานีนี้แล้ว เราสามารถตัดสินใจได้ว่าจะใช้งานมันอย่างไรต่อไป"
 infernals.60.a: "รื้อถอนสถานี"
 infernals.60.b: "คงการศึกษาเกี่ยวกับสถานีต่อไป"
 infernals.60.c: "ให้มันเป็นอนุสรณ์สถานแห่งชัยชนะของเรา"
 infernals.60.d: "โล่งอกเสียที"
 infernals.65.name: "การขยายตัวของดาวฤกษ์"
 infernals.65.desc: "การสังเกตการณ์ที่กำลังดำเนินอยู่ยืนยันว่า §Y[Target.system_star.GetName]§! กำลังขยายตัวในอัตราเร่ง รายงานผลกระทบทางกายภาพจากการแผ่รังสีที่เพิ่มขึ้นกำลังส่งเข้ามาอย่างต่อเนื่อง เว้นแต่เราจะพบวิธีที่จะหยุดมันได้ §Y[Target.system_star.GetName]§! จะทำลายล้างเราก่อนที่มันจะกลืนกินดาวเคราะห์ไปนานแล้ว\n\n[GetMegacorpDesc65]"
 infernals.65.nonmegacorp: "การป้องกันรังสีของดาวฤกษ์จะช่วยซื้อเวลาให้เราได้มากขึ้น แผนการที่เป็นอันตรายกว่าแต่มีโอกาสสร้างกำไรได้มากกว่าคือการควบคุมรังสีที่เพิ่มขึ้นนั้น เพื่อเสริมกำลังให้กับพลังงานและภาคอุตสาหกรรมของเรา"
 infernals.65.megacorp: "การลงทุนในการป้องกันดาวเคราะห์จะทำหน้าที่เสมือนการประกันภัยความผันผวน และช่วยปกป้องฐานสินทรัพย์ของเรา แต่เราอาจสามารถเพิ่มดัชนีชี้วัดด้านพลังงานและอุตสาหกรรมได้ หากเราเปลี่ยนไปใช้ประโยชน์จากรังสีที่เพิ่มขึ้นแทน"
 infernals.65.a: "ปกป้องโลกบ้านเกิดของเรา"
 infernals.65.b: "แสวงประโยชน์จากปรากฏการณ์นี้"
 infernals.70.name: "ดาวฤกษ์ผู้หิวโหย"
 infernals.70.desc: "§Y[Target.GetName]§! ได้กลืนกินเหยื่อรายแรกไปแล้ว โดยกลืนโลกชั้นในสุดของระบบเราเข้าไป แม้ว่าวัตถุดิบดิบจะยังคงอยู่ แต่ตอนนี้พวกมันก็อยู่นอกเหนือการเอื้อมถึงของเราในส่วนลึกที่ลุกเป็นไฟของดาวฤกษ์\n\nในขณะที่เราสามารถเผชิญกับการสูญเสียทางเศรษฐกิจในทันทีได้ แต่นี่เป็นสัญญาณเตือนที่น่ากลัวถึงสิ่งรอคอย §Y[Owner.Capital.GetName]§!"
 infernals.75.name: "ความเสียหายข้างเคียง"
 infernals.75.desc: "การเติบโตอย่างที่ไม่เคยปรากฏมาก่อนของดาวยักษ์แดงของเราได้กลืนกินดาวเคราะห์อีกดวงหนึ่งแล้ว ทรัพยากรอันอุดมสมบูรณ์ของมันจะยังคงไม่สามารถเข้าถึงได้ตลอดไป เว้นแต่ดาวฤกษ์จะสลัดเปลือกนอกออกในรูปของโนวาที่รุนแรง"
 infernals.95.name: "อุโมงค์ดวงดาว"
 infernals.95.desc: "ความจริงเกี่ยวกับ §Y[capital_star.GetName]§! นั้นแปลกประหลาดกว่าที่เราจินตนาการไว้ การสืบสวนที่กำลังดำเนินอยู่ได้เผยให้เห็นอุโมงค์ย่อยอวกาศ(อุโมงค์อวกาศ)ที่จับคู่กันลึกเข้าไปในดาวฤกษ์ของเรา\n\nอุโมงค์หนึ่งช่องทางส่งผ่านวัสดุที่อุดมด้วยไฮโดรเจนเข้าไปในเปลือกนอกโดยตรง ช่วยเร่งปฏิกิริยาฟิวชันและเพิ่มการผลิตฮีเลียม สิ่งนี้น่าจะกระตุ้นการบีบอัดแกนกลาง แต่อุโมงค์ที่สองกำลังสกัดพลังงานอย่างแข็งขันเพื่อต้านกระบวนการดังกล่าว ผลลัพธ์คือการขยายตัวของดาวฤกษ์\n\nการวัดระยะไกลเบื้องต้นจากอุโมงค์ย่อยอวกาศทั้งสองบ่งชี้ว่าพวกมันเชื่อมต่อกับจุดสิ้นสุดหลายแห่งที่กระจัดกระจายอยู่ทั่วกาแล็กซี ความอยู่รอดของเราขึ้นอยู่กับการสืบสวนพื้นที่เหล่านั้นโดยเร็วที่สุด"
 infernals.95.a: "เราจำเป็นต้องสืบสวนสถานที่สามแห่งเหล่านี้"
 infernals.95.a.tt: "เป้าหมายที่ใช้การได้สำหรับการระบุตำแหน่งพิกัดสามเหลี่ยมของแหล่งกำเนิดในซับสเปซได้รับการค้นพบแล้ว"
 infernals.105.name: "รอยแผลเป็นซับสเปซ"
 infernals.105.desc: "การสแกนทางดาราศาสตร์รอบ ๆ §Y[FromFromFrom.GetName]§! เผยให้เห็นรอยแผลเป็นซับสเปซที่อธิบายไม่ได้ แม้ว่าขณะนี้จะไม่มีจุดทางออกที่ตำแหน่งนี้ แต่อุโมงค์ในอดีตอาจเคยเปิดขึ้นในวงโคจรรอบดาวแก๊สยักษ์ดวงนี้ ข้อมูลดังกล่าวได้ให้ความรู้ความเข้าใจด้านฟิสิกส์ที่สามารถนำไปใช้ในด้านอื่น ๆ ได้\n\nในระหว่างนี้ เราจะต้องค้นหาที่อื่นเพื่อค้นหาแหล่งที่มาของอุโมงค์ย่อยอวกาศที่ทำงานอยู่ในดาวฤกษ์ของเรา"
 infernals.105.a: "ค้นหาต่อไป"
 infernals.110.name: "เศษเหล็กเอเลี่ยนโบราณ"
 infernals.110.desc: "การสแกนรอบ ๆ §Y[FromFromFrom.GetName]§! บ่งชี้ถึงรอยแผลเป็นซับสเปซ นอกจากนี้เรายังตรวจพบแหล่งเศษโลหะโบราณใกล้กับดาวเคราะห์ เศษเหล็กเหล่านี้ถูกล็อกตำแหน่งทางวงโคจรไว้ และอาจเกี่ยวข้องกับรอยแผลเป็นดังกล่าว\n\nการสแกนความผันผวนของซับสเปซอย่างต่อเนื่องน่าจะช่วยเราปรับปรุงแผงรับแสงอาทิตย์รอบดาวฤกษ์บ้านเกิดของเราได้\n\nแม้ข้อมูลนี้จะมีประโยชน์ แต่เราต้องการตำแหน่งสำรวจเพิ่มเติมอย่างน้อยอีกหนึ่งแห่ง เพื่อระบุพิกัดแหล่งที่มาในปัจจุบันของปัญหาของเรา"
 infernals.110.a: "ประมูลเศษเหล็กออกไป"
 infernals.115.name: "ระบุพิกัดสามเหลี่ยมเสร็จสิ้น"
 infernals.115.desc: "ในที่สุด ความก้าวหน้าที่แท้จริงก็มาถึง\n\nรอยแผลเป็นเพิ่มเติมรอบ ๆ §Y[FromFromFrom.GetName]§! ช่วยให้เราสามารถระบุพิกัดแหล่งกำเนิดความปั่นป่วนของดาวฤกษ์ของเราไปยังระบบที่ไม่เคยถูกตรวจพบมาก่อน ซึ่งมีสัญญาณที่เป็นปฏิปักษ์\n\nการสืบสวนนี้อาจช่วยให้เราต้านทานสิ่งใดก็ตามที่ส่งผลกระทบต่อดาวฤกษ์ของเราในที่สุด\n\nเมื่อเราเคลื่อนพลเข้าสู่ระบบ §Yลูซัส§! เราอาจสามารถเปลี่ยนชะตากรรมของ §Y[FromFromFromFrom.Target.solar_system.GetName]§! และอารยธรรมของเราได้"
 infernals.115.a: "เข้าใกล้ด้วยความระมัดระวัง"
 infernals.115.b: "เตรียมการแสดงแสนยานุภาพ"
 infernals.115.c: "ทำพิธีสวดอ้อนวอนก่อนเข้าใกล้"
 red_giant_lusus_triangulated_tt: "ระบบใหม่ได้รับการเปิดเผย"
 infernals.2115.name: "กองกำลังบุกยึดสถานี"
 infernals.2115.desc: "กองกําลังของเราได้ยึดการควบคุมของสถานี ชาว เมือง ก่อ ให้ เกิด การ ต่อ ต้าน บ้าง แต่ มี อาวุธ ไม่ ดี และ ดู เหมือน ว่า ไม่ ได้ รับ การ ฝึก ใน สงคราม. เมื่อ ตรวจ ดู ใกล้ ๆ หลาย คน ดู เหมือน เป็น เด็ก. คน ที่ ไม่ ถูก ฆ่า ถูก ควบคุม.\n\nการวิเคราะห์ได้เริ่มต้นขึ้นแล้ว เกี่ยวกับวิธีที่เราสามารถควบคุม อุโมงค์ของสับสเปซได้ ซึ่งดูเหมือนว่าเป็น เมื่อ เวลา ผ่าน ไป เรา สามารถ จัด การ กับ สถานการณ์ ใน ระบบ บ้าน ได้."
 infernals.2115.a: "ทำลายมันทิ้ง"
 infernals.2115.b: "สอบปากคำผู้รอดชีวิต"
 infernals.2115.c: "นำพวกเขาไปเป็นทาส"
 infernals.2115.d: "ผู้รอดชีวิตเป็นภัยคุกคาม กำจัดทิ้งให้หมด"
 infernals.2115.e: "เจรจากับผู้รอดชีวิต"
 infernals.2115.f: "กวาดล้างสถานี"
 infernals.2115.g: "กินพวกเขา"
 infernals.400pops: "สร้างประชากร £pop£ $POPS$ §G400§! หน่วยบน [this.GetName]"
 infernals.300pops: "สร้างประชากร £pop£ $POPS$ §G300§! หน่วยบน [this.GetName]"
 infernals.2121.name: "เอเลี่ยนถูกกำจัด"
 infernals.2121.desc: "สถานีขุดเจาะซับสเปซถูกทำลายลง ส่งผลให้ทุกคนบนสถานีเสียชีวิต\n\nการทำลายสถานีทำให้สื่อจัดเก็บพลังงานที่ไม่รู้จักเกิดระเบิดขึ้น พลังงานที่เกิดขึ้นพุ่งผ่านอุโมงค์ซับสเปซที่กำลังถล่มเข้าสู่ §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§!, ทำให้สถานการณ์ที่บ้านแย่ลงอย่างมาก\n\nอย่างไรก็ตาม การส่งผ่านไฮโดรเจนไปยังดาวฤกษ์ของเราได้ยุติลงแล้ว ไม่ว่าเรื่องจะแย่แค่ไหน มันก็จะไม่เลวร้ายลงอีก แม้เราจะไม่มีวันรู้ถึงแหล่งกำเนิดหรือการออกแบบของสถานีนี้ แต่อย่างน้อยเราก็สามารถสบายใจได้ว่าพลังดังกล่าวจะไม่มีวันตกไปอยู่ในมือของคู่แข่งของเรา\n\nโชคร้ายที่เราไม่มีวิธีที่จะเปลี่ยน §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§! กลับสู่สภาวะเดิมในทันที หากเราต้องการส่งผลต่อสถานะของดาวฤกษ์ เราจะต้องพึ่งพาข้อมูลที่บันทึกไว้เพื่อปะติดปะต่อสิ่งที่สถานีกำลังทำ"
 infernals.2121.a: "มาทำความสะอาดความวุ่นวายนี้กัน"
 infernals.2122.name: "สถานีถูกทำลาย"
 infernals.2122.desc: "เมื่อเศษซากสถานีลอยล่องไปในอวกาศ การทำลายล้างของมันมอบโอกาสใหม่ให้เราในการเปลี่ยนชะตากรรมของ §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§! ไม่ใช่เพียงแค่การสับสวิตช์ แต่ผ่านแรงงานที่หนักหน่วงและมีราคาแพง"
 infernals.2125.name: "การเจรจากับต่างดาว"
 infernals.2125.desc: "หลังจากกระบวนการที่ยาวนานและยากลำบาก ในที่สุดเราก็ได้เครื่องแปลภาษาเบื้องต้นที่สามารถสื่อสารกับผู้อยู่อาศัยในสถานีได้\n\nสถานีนี้ทำงานมาหลายชั่วอายุคน ย้ายจากดาวแก๊สยักษ์ดวงหนึ่งไปยังอีกดวงหนึ่ง โดยใช้ไซฟอนซับสเปซเพื่อสกัดพลังงานจากดาวฤกษ์ที่อยู่ห่างไกลมาขับเคลื่อนระบบพยุงชีพและเครื่องยนต์กระโดดมิติที่ทรงพลัง\n\nเอเลี่ยนเหล่านี้ไม่เข้าใจระบบที่ตนเองควบคุมอย่างถ่องแท้ และไม่รู้ว่าการสกัดพลังงานของพวกมันมุ่งเป้าไปที่ดาวฤกษ์และทำลายล้างพวกมันในที่สุด\n\nแม้จะมีความสับสน แต่พวกมันดูเหมือนจะกระตือรือร้นที่จะออกจากสถานี พวกมันให้สัญญาว่าจะสอนสิ่งที่พวกมันรู้ให้แก่เรา แลกกับสถานที่ที่ปลอดภัยในการอยู่อาศัยและเลี้ยงดูลูกหลาน"
 infernals.2125.a: "มอบที่ลี้ภัยให้พวกมัน"
 infernals.2125.b: "มอบยานลำหนึ่งให้พวกมันเพื่อหาเส้นทางของตัวเอง"
 infernals.2125.c: "ระบายอากาศสถานีจากระยะไกล"
 infernals.2125.d: "ปล่อยให้พวกมันตัดสินเราตามดุลยพินิจของตัวเอง"
 infernals.2130.name: "ปฏิบัติการขุดเจาะซับสเปซ"
 infernals.2130.desc: "สถานีนี้สูบไฮโดรเจนจากดาวแก๊สยักษ์และส่งผ่านซับสเปซเข้าสู่เปลือกของดาวฤกษ์ของเรา ปฏิกิริยาฮีเลียมฟิวชันที่เกิดขึ้นจะปล่อยพลังงานส่วนเกินออกมา ซึ่งแปลงสภาพเป็น §Y$entropy_crystals$§! เพื่อขับเคลื่อนสถานี\n\nความไม่เสถียรของ §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§! เป็นผลมาจากความผิดพลาดในการสอบเทียบและความเสื่อมโทรมของอุปกรณ์ที่ผู้อยู่อาศัยไม่ได้สังเกตหรือขัดข้องไม่รู้จะซ่อมแซมอย่างไร\n\nการทำงานกับเทคโนโลยีโบราณและพังทลายของพวกมันช่วยให้เราสามารถย้อนกระบวนการกลับได้ แต่มันจะไม่ง่ายเลย อีกทางเลือกหนึ่งคือการบังคับให้ดาวฤกษ์ของเราเข้าสู่ซูเปอร์โนวา ซึ่งอาจเปิดขุมแร่จำนวนมากเพื่อเปลี่ยนมรดกของเราให้เป็นดินแดนที่ขุดเจาะทรัพยากรได้"
 infernals.2130.a: "ได้เวลาเริ่มทำงานแล้ว"
 infernals.2131.desc: "สถานีสูบไฮโดรเจนจากดาวแก๊สยักษ์และส่งผ่านซับสเปซเข้าสู่เปลือกของดาวฤกษ์ของเรา ปฏิกิริยาฮีเลียมฟิวชันที่เกิดขึ้นจะปล่อยพลังงานส่วนเกินออกมา ซึ่งแปลงสภาพเป็น §Y$entropy_crystals$§! เพื่อขับเคลื่อนสถานี\n\nผู้อยู่อาศัยในสถานีจำได้เพียงคำบอกเล่าสืบต่อกันมาที่บิดเบือนเกี่ยวกับการทำงานของมัน พวกมันขาดการติดต่อกับอารยธรรมบ้านเกิดเมื่อหลายพันปีที่แล้ว บางทีเป็นเพราะอารยธรรมนั้นล่มสลายหรือถูกทำลายไป ความผิดพลาดในการสอบเทียบที่สะสมมานานและความเสื่อมโทรมของอุปกรณ์นำไปสู่การสูบพลังงานที่ไม่เสถียรมากขึ้น ซึ่งขณะนี้ขู่ว่าจะทำลาย §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§!.\n\nการทำงานกับเทคโนโลยีโบราณของพวกมันช่วยให้เราสามารถย้อนกระบวนการกลับได้ แต่มันจะไม่ง่ายเลย อีกทางเลือกหนึ่งคือการบังคับให้ดาวฤกษ์ของเรากลายเป็นโนวา ซึ่งจะเปิดขุมทรัพย์แร่ธาตุมากมายเพื่อเปลี่ยนมรดกของเราให้เป็นของมีค่าที่แสวงหาผลประโยชน์ได้"
 infernals.2135.name: "จุดสิ้นสุดของภัยคุกคาม"
 infernals.2135.desc: "เมื่อได้รับรู้ถึงภัยพิบัติของเรา ผู้อยู่อาศัยในสถานีก็แสดงความตื่นตระหนกและท้อแท้ พวกมันเชื่อว่าตนเองอยู่ตามลำพังและไม่ตระหนักถึงสิ่งมีชีวิตสายพันธุ์อื่นในกาแล็กซี\n\nด้วยความรู้สึกผิดและก่อนที่เราจะเข้าใจอย่างแท้จริงว่าพวกมันกำลังทำอะไร พวกมันเริ่มรื้อถอนสถานี และทำลายส่วนประกอบส่วนใหญ่ของมันเป็นการถาวร\n\nผลลัพธ์คือมันจะเป็นเรื่องยากที่จะควบคุมการขยายตัวของดาวฤกษ์ และเราต้องตัดสินใจว่าจะทำอย่างไรกับเอเลี่ยนที่ผันผวนเหล่านี้ และจะมอบการอภัยโทษที่พวกมันปรารถนาให้หรือไม่"
 infernals.2135.a: "รับพวกมันเข้ามาและกู้คืนสถานี"
 infernals.2135.b: "กำจัดพวกมันและทำลายสถานี"
 infernals.2135.c: "นำพวกมันมาเป็นทาสและทำลายสถานี"
 infernals.2140.name: "โอกาสแห่งความเสถียร"
 infernals.2140.desc: "หลังจากความพยายามอันยิ่งใหญ่ ในตอนนี้เราสามารถควบคุมชะตากรรมของ §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§! ได้อย่างสมบูรณ์แล้ว หากปล่อยทิ้งไว้ตามลำพัง มันจะดำเนินตามวงจรชีวิตตามธรรมชาติในขนาดปัจจุบันของมัน\n\nแต่สถานีที่เก่าแก่และล้มเหลวไม่สามารถทนทานต่อการปรับเปลี่ยนซ้ำ ๆ ได้ การปรับแต่งแต่ละครั้งทำให้ระบบตึงตัวจนถึงขีดจำกัดสูงสุด บัดนี้เรามีทางเลือกเพียงทางเดียวเท่านั้น\n\nเราสามารถลดขนาดดาวฤกษ์กลับสู่ขนาดเดิม หรือบีบให้มันขยายตัวเพื่อแปลงระบบให้เป็นแหล่งทรัพยากรที่เก็บเกี่ยวได้ง่าย\n\n[GetScientistPlural] ของเราจะพยายามปรับแต่งโครงสร้างเป็นครั้งสุดท้าย หลังจากนั้นหนทางเดียวที่จะไปต่อได้คือการรื้อถอนอย่างรวดเร็วโดยกำลังจากภายนอก"
 infernals.2140.a: "ตรึงดาวฤกษ์ไว้ในสถานะปัจจุบัน"
 infernals.2140.b: "เร่งการขยายตัวของดาวฤกษ์"
 infernals.2140.bdesc: "ขยายขนาดของ §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§! อย่างหลีกเลี่ยงไม่ได้"
 infernals.2140.c: "นำดาวฤกษ์กลับสู่สภาวะปกติ"
 infernals.2140.cdesc: "หดขนาดของ §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§! อย่างหลีกเลี่ยงไม่ได้"
 infernals.2145.name: "ความเสถียรบรรลุผล"
 infernals.2145.desc: "ด้วยการควบคุมขนาดของดาวฤกษ์และความผันผวนของพลังงานได้อย่างสมบูรณ์ บัดนี้ §Y[Target.GetStarName]§! ได้คงตัวอย่างสมบูรณ์แบบ มันจะคงอยู่ในสภาพที่เป็นอยู่ตอนนี้เป็นเวลาหลายล้านปี และประชาชนของเราสามารถเพลิดเพลินกับความมั่นคงและการคาดเดาได้ในระบบบ้านเกิดของเราอีกครั้ง\n\nขนาดที่เพิ่มขึ้นของดาวฤกษ์ส่งผลกระทบอย่างชัดเจนต่อวิธีจัดการโครงสร้างพื้นฐานของเรา และตอนนี้เราสามารถใช้ประโยชน์จากการเปลี่ยนแปลงเหล่านี้ได้อย่างเต็มที่ โดยแสวงประโยชน์จากผลผลิตพลังงานที่เพิ่มขึ้นในขณะที่ยังคงรักษาสถานภาพในระบบไว้"
 infernals.2145.a: "ในที่สุด เราก็ควบคุมโชคชะตาของเราได้"
 infernals.2151.name: "สถานีลึกลับ"
 infernals.2151.desc: "เมื่อเดินทางเข้าสู่ระบบ ยานเรือของเราได้พบกับการต่อต้านที่จำกัดจากกลุ่มโดรนอัตโนมัติ โดรนเหล่านี้ถูกกำจัดอย่างรวดเร็ว ทำให้สามารถตรวจสอบสถานีอวกาศของเอเลี่ยนได้อย่างใกล้ชิดขึ้น\n\nโครงสร้างยังคงใช้งานได้ แม้ตัวเรือจะมีร่องรอยการซ่อมแซมปะปะผุผุจำนวนมาก ขณะพยายามเข้าสู่ช่องเทียบเรือช่องหนึ่ง เราได้ทำการติดต่อกับสิ่งมีชีวิตสายพันธุ์เอเลี่ยนที่ไม่รู้จักมาก่อน แม้จะมีอุปสรรคทางภาษา แต่เราได้ยืนยันแล้วว่าสถานีแห่งนี้คือแหล่งกำเนิดของอุโมงค์ที่ส่งผลกระทบต่อ §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§!\n\nขณะนี้ความพยายามในการสื่อสารกำลังดำเนินอยู่ การระเบียบข้อพิพาททางการทูตอาจเป็นไปได้ หากล้มเหลวเราอาจถูกบังคับให้พิจารณาวิธีการทางตรงมากขึ้น เช่นการส่งทหารบุกยึดสถานีหรือทำลายมันทิ้ง อย่างไรก็ตาม หากไม่มีความเข้าใจอย่างถ่องแท้ถึงเป้าหมายของมัน การกระทำดังกล่าวอาจมีความเสี่ยงต่อดาวฤกษ์ของเราเป็นอย่างยิ่ง"
 infernals.2151.a: "แปลภาษาของพวกเขา"
 infernals.2151.b: "บุกยึดสถานีด้วยกำลัง"
 infernals.2151.c: "ทำลายสถานีทิ้ง"
 infernals.2160.name: "จุดวาบไฟแห่งวิกฤต"
 infernals.2160.desc: "การศึกษาอย่างต่อเนื่องของสถานีขุดเจาะซับสเปซบ่งชี้ว่ามันเก็บกักพลังงานความร้อนจำนวนมหาศาลไว้ในรูปแบบที่แปลกใหม่ ซึ่ง [GetScientistPlural] ของเราเรียกมันว่า §Y$entropy_crystals$§! มันใช้ลูปสะท้อนความร้อนในการขยายพลังงานที่ป้อนเข้ามา\n\nการลอกเลียนเทคโนโลยีนี้จะช่วยให้เราสามารถเรียนรู้ที่จะใช้พลังงานที่ไม่เคยจินตนาการถึงมาก่อน ซึ่งหลายคนอาจมองว่าไม่เป็นธรรมชาติและอันตราย การทำเช่นนั้นอาจก่อให้เกิดความร้อนส่วนเกินจำนวนมาก แต่หากเราสามารถหาทางเจริญเติบโตในสภาพดังกล่าวได้ กาแล็กซีนี้ก็อาจเป็นของเรา"
 infernals.2160.a: "ขอให้เราสืบสวนเพิ่มเติม"
 infernals.2160.a.tt: "[GetRedgiantAlreadyHyperthermiaPickable]เปิดเผย §Y$entropy_crystals$§! เพื่อคืบหน้าโครงการกาแล็กติกไฮเปอร์เมีย"
 infernals.2160.a.ttunlock: "ปลดล็อกการเลือกใช้คุณสมบัติสวรรค์สรรค์สร้าง $ap_galactic_hyperthermia$\n"
 infernals.2160.b: "เทคโนโลยีนั้นอันตรายเกินกว่าจะไขว่คว้า"
 infernals.2160.c: "การใช้ประโยชน์จาก §Y$entropy_crystals$§! ช่างไร้เดียงสาเสียจริง"
 situation_red_giant_expansion: "การขยายตัวของดาวยักษ์แดง"
 situation_red_giant_expansion_type: "$situation_red_giant_expansion$"
 situation_red_giant_expansion_desc: "การเปลี่ยนแปลงอย่างรวดเร็วในการแผ่รังสีของดาวฤกษ์กำลังคุกคามความเสถียรของโลกบ้านเกิดของเรา หากยังดำเนินต่อไป §Y[Owner.Capital.GetStarName]§! จะกลายเป็นโนวาและสลายระบบนี้เป็นผุยผง"
 situation_red_giant_expansion_monthly_change_tooltip: "ความคืบหน้าของการขยายตัวขึ้นอยู่กับความสามารถของเราในการค้นหาและต่อสู้กับสาเหตุ"
