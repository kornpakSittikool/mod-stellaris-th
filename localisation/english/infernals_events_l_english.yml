 situation_red_giant_expansion_stage_1: "ดาวฤกษ์ของเราค่อนข้างสงบ แต่ปริมาณการแผ่รังสีอยู่ในระดับสูงอย่างผิดปกติ"
 situation_red_giant_expansion_stage_2: "ดาวฤกษ์ของเรามีขนาดใหญ่กว่าที่เคยเป็นในอดีตทางวิวัฒนาการของเรา และสิ่งนี้ส่งผลกระทบอย่างชัดเจนต่อโลกบ้านเกิดของเรา"
 situation_red_giant_expansion_stage_3: "ดาวฤกษ์ของเรามีขนาดใหญ่ในขั้นวิกฤต และความเคลื่อนไหวที่รุนแรงของมันกำลังคุกคามความเสถียรของโลกบ้านเกิดของเรา"
 situation_red_giant_expansion_stage_4: "ดาวยักษ์แดงของเรากำลังแผดเผาระบบดาวฤกษ์ส่วนใหญ่ ทำให้ชีวิตดำเนินไปได้อย่างยากลำบากอย่างยิ่ง"
 situation_red_giant_expansion_stage_5: "ดาวฤกษ์ของเราใกล้จะระเบิด ซึ่งจะสร้างความเสียหายอย่างรุนแรงต่อทุกสิ่งในระบบบ้านเกิดของเรา"
