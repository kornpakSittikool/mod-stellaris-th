 approach_reassure_public_effect: "ข้อมูลเกี่ยวกับวิกฤตนี้อาจสั่นคลอนความมั่นคงในสังคม จงเก็บเรื่องนี้ให้เงียบไว้$rg_default_progress$"
 approach_find_the_cause_effect: "ไม่สามารถยับยั้งการขยายตัวของดาวฤกษ์ได้ การสืบสวนอย่างเร่งด่วนและครอบคลุมเป็นเรื่องจำเป็นอย่างยิ่งเพื่อระบุสาเหตุพื้นฐาน$rg_default_progress$"
 approach_suppress_unrest2_effect: "การแก้ไขปัญหาที่มีประสิทธิภาพย่อมเป็นไปไม่ได้ท่ามกลางความไม่สงบในสังคม ลำดับความสำคัญต้องให้กับการฟื้นฟูระเบียบและความมั่นคง$rg_default_progress$"
 approach_disrupt_subspace_tunnels2_effect: "การรักษาความสมบูรณ์ของดาวฤกษ์ของเราจำเป็นต้องมีมาตรการตอบโต้ในทันที การรบกวนอุโมงค์ซับสเปซเป็นเรื่องหลีกเลี่ยงไม่ได้$rg_small_progress$"
 approach_add_fuel_to_the_fire3_effect: "การพัฒนานี้มอบโอกาสในปฏิบัติการสกัดแร่เชิงลึกบนดาวเคราะห์ในระบบบ้านเกิดของเรา ช่วยเพิ่มผลผลิตทรัพยากรแร่สูงสุด$rg_high_progress$"
 approach_wait_and_see3_effect: "เราต้องหยุดทำการตัดสินใจที่สะเพร่า เราควรอดทนและสังเกตการณ์ต่อไป$rg_small_negative_progress$"
 approach_siphon_stellar_material3_effect: "เราอาจเร่งการกลับคืนสู่สภาวะปกติได้หากเราเอาสารตั้งต้นออกจากดาวฤกษ์โดยตรง$rg_medium_negative_progress$"
 approach_continue_siphoning4_effect: "เรา สามารถ ใช้ พลัง นี้ เพื่อ เผา ผลาญ ระบบ บ้าน ของ เรา ทํา ให้ เรา สามารถ ถาง ถาง ซาก ศพ เพื่อ ความ มั่งคั่ง.$rg_high_progress$"
 approach_stabilize_the_star4_effect: "เราสามารถรักษาเสถียรภาพของดาวฤกษ์ให้อยู่ในสถานะปัจจุบัน คงการปรับตัวในปัจจุบันของเราไว้$rg_no_progress$"
 approach_cease_activity4_effect: "เราสามารถปิดการทำงานของแท่นขุดเจาะแร่ และอนุญาตให้ดาวฤกษ์กลับสู่สภาวะที่สงบลงได้$rg_small_negative_progress$"
 approach_reverse_inflation4_effect: "เราสามารถหดขนาดดาวฤกษ์ของเรากลับสู่ขนาดเดิม เพื่อฟื้นฟูความสามารถในการอยู่อาศัยให้กับโลกบ้านเกิดของเรา$rg_high_negative_progress$"
 approach_at_any_cost_effect: "เราต้องสกัดกั้นการเติบโตเพื่อหลีกเลี่ยงภัยพิบัติ ไม่ว่าต้องจ่ายด้วยราคาเท่าใดก็ตาม\nการเติบโตรายเดือน: §G+0.5§!\n\n"
 INF_ORIGIN_RED_GIANT_TRIANGULATION: "ระบุพิกัดสามเหลี่ยมสัญญาณรบกวนซับสเปซ"
 INF_ORIGIN_RED_GIANT_TRIANGULATION_DESC: "พิกัดที่ใช้ระบุพิกัดสามเหลี่ยมของจุดกำเนิดสัญญาณรบกวน"
 INF_ORIGIN_RED_GIANT_PROTECT_HOMEWORLD: "ปกป้องดาวบ้านเกิด"
 INF_ORIGIN_RED_GIANT_PROTECT_HOMEWORLD_DESC: "ขณะที่เราทำงานอย่างไม่รู้จักเหน็ดเหนื่อยเพื่อย้อนคืนการเปลี่ยนแปลงของดาวฤกษ์ ร่างกายของเราต้องเตรียมพร้อมเผชิญหน้ากับความร้อน การปรับตัวประชากรให้เข้ากับอุณหภูมิที่สูงขึ้นจะช่วยให้เราเติบโตไปพร้อมกับอนาคตที่ลุกเป็นไฟของดาวฤกษ์"
 INF_ORIGIN_RED_GIANT_EXPLOIT: "การแสวงประโยชน์ทางความร้อน"
 INF_ORIGIN_RED_GIANT_EXPLOIT_DESC: "การแผ่รังสีดวงอาทิตย์ที่เพิ่มขึ้นสร้างปัญหาระยะยาวที่ร้ายแรง แต่ในระยะสั้น เราสามารถใช้มันเพื่อเพิ่มกำลังการผลิตทางอุตสาหกรรมและพลังงานของเราได้"
 INF_ORIGIN_RED_GIANT_BOARD_STATION: "การบุกยึดสถานี"
 INF_ORIGIN_RED_GIANT_BOARD_STATION_DESC: "เอเลี่ยนที่ประมาทเลินเล่อเหล่านี้กำลังแสวงหาผลประโยชน์จากดาวฤกษ์ของเรา เราต้องบุกยึดสถานีของพวกมันในทันทีและเข้าควบคุมมัน"
 INF_ORIGIN_RED_GIANT_PARLAY: "ภาษาศาสตร์ต่างดาวในสถานการณ์ฉุกเฉิน"
 INF_ORIGIN_RED_GIANT_PARLAY_DESC: "ผู้อยู่อาศัยในสถานีควบคุมท่อสกัดพลังงานซับสเปซที่กำลังทำลายดาวฤกษ์ของเรา เราต้องสร้างการสื่อสารเพื่อให้มั่นใจในความร่วมมือในการแก้ไขปัญหานี้"
 INF_THERMOPHILE_ADAPTATION: "วิวัฒนาการทนความร้อน"
 INF_THERMOPHILE_ADAPTATION_DESC: "เราเริ่มต้นเส้นทางเพื่อแผดเผากาแล็กซี แต่ร่างกายของเราต้องเตรียมพร้อมเผชิญหน้ากับความร้อน การปรับตัวของประชากรให้เข้ากับอุณหภูมิที่สูงขึ้นจะช่วยให้เราเติบโตในอนาคตอันร้อนแรง \n\n§Hเมื่อเสร็จสิ้น:§!$TABBED_NEW_LINE$- เพิ่มคุณสมบัติปรับปรุง §Y$crisis_thermophile_adaptation$§!$TABBED_NEW_LINE$- เพิ่มค่า §Y$mod_pc_volcanic_habitability$§! ขึ้น §G+50%§!"
