 manifesti.1.name:0 "โพรเนชันแนล"
 manifesti.1.desc:0 "การ ประท้วง ได้ ปะทุ ขึ้น ทั่ว[this.GetName]ผลักดันโดยความกังวลที่เพิ่มขึ้น กว่าการเปลี่ยนแปลงที่รับรู้ได้ ของสังคมของเรา ผู้บรรยายตั้งคําถามเกี่ยวกับประเพณีที่ยาวนาน ท้าทายรากฐานของการปกครอง และความต้องการที่ปรับตัว\n\nแม้ว่าไม่รุนแรง การเคลื่อนไหวเหล่านี้ ทําให้เกิดความเครียดต่อบริการพลเมือง และรบกวนชีวิตประจําวัน อย่าง ไร ก็ ตาม พลเมือง หลาย คน ไม่ เห็น ว่า การ ประท้วง เหล่า นี้ เป็น เพียง ความ ผิด ปกติ. พวกเขาเห็นว่าพวกเขาเป็นการคิดบัญชี เป็นสัญญาณว่าตัวตนของเรา ถูกเขียนขึ้นใหม่ต่อหน้าต่อตาเรา"
 manifesti.1.a:0 "อย่าทําอะไร"
 manifesti.1.b:0 "สนับสนุนให้มีส่วนร่วม"
 manifesti.1.c:0 "อนุมัติการใช้กําลัง"
 manifesti.1.d:0 "(คือ) บรรดาผู้แบ่งแยกแผ่นดิน"
 manifesti.1.e:0 "ทําให้รากหญ้าตอบสนอง"
 manifesti.1.f:0 "น้ําท่วมถนนกับสามัคคี"
 manifesti.1.g:0 "จัดตั้งการประท้วง"
 manifesti.1.h:0 "ทําเป็นเบี่ยงเบนความสนใจ"
 manifesti.1.tt:0 "นี้จะกําจัดความชัดเจน"

 manifesti.5.name:0 "นิทรรศการ"
 manifesti.5.desc:0 "การประท้วงบน[Root.GetName]ได้หยุดเกือบเป็น ตอนนี้หลายคนชี้ไปที่§Hนิทรรศการ§!เป็นกลุ่มที่รู้จักกันดีว่า เป็นงานยั่วยวน ที่ท้าทายสังคมศาสตร์ ขณะ ที่ พวก เขา ยัง คง ไม่ ได้ รับ การ ยืน ยัน โครงการ ล่า สุด ของ พวก เขา ได้ ยึด มั่น อยู่ กับ ผล ที่ ถูก กล่าว หา จาก การ ติด ต่อ ครั้ง แรก ทํา ให้ เกิด การ โต้ เถียง และ ความ ไม่ สงบ.\n\nแม้ว่าการสาธิตจะจบลง§Hนิทรรศการ§!ยังคงอยู่ ข่าวสาร ของ พวก เขา แพร่ กระจาย ไป อิทธิพล ของ พวก เขา ยัง คง อยู่. ถึงเวลาตัดสินแล้วว่าเราจะตอบสนองอย่างไร"
 manifesti.5.a:0 "ให้พวกเขาสนุกเถอะ"
 manifesti.5.b:0 "ประกาศกฎอัยการศึก"
 manifesti.5.c:0 "ละลายโครงการสําหรับทรัพยากร"
 manifesti.5.d:0 "และจงแจ้งพวกเขาให้ทราบถึงสิ่งที่พวกเขาถูกสัญญาไว้"
 manifesti.5.e:0 "การสื่อสารทั่วโลก"
 manifesti.5.f:0 "กักตัวครอบครัวไว้"
 manifesti.5.f.tt1:0 "การจับกุมทําลายขบวนการ"
 manifesti.5.f.tt2:0 "การ จับ กุม ทํา ให้ เกิด การ เคลื่อน ไหว แต่ ยัง กระตุ้น ให้ เกิด ความ ไม่ สงบ และ ความ เสีย หาย"
 manifesti.10.name:0 "แช่ อยู่ ใน บัด"
 manifesti.10.desc_militarist:0 "§Hนิทรรศการ§!จะไม่สร้างปัญหาให้เราอีกต่อไป การ หัก ล้าง อย่าง รวด เร็ว และ เด็ด ขาด ได้ ขจัด ขบวนการ ของ พวก เขา กระจาย สมาชิก ของ พวก เขา และ ทํา ให้ ข่าวสาร ของ พวก เขา ลด น้อย ลง. \"ศิลปะ\" ของพวกเขาถูกยึด ผู้นําของพวกเขาหายไป\n\nสั่งซื้อได้กลับมา และผู้คนจะคิดอีกครั้ง ก่อนที่จะยอมรับอุดมการณ์ที่ประมาทดังกล่าวอีกครั้ง"
 manifesti.10.desc_materialist:0 "ความจําเสื่อมไม่มีคุณค่า แต่ทรัพยากรมี ที่เรียกว่า'โครงการ'ของ The Projecti ได้ถูกยึด, รื้อถอน และแก้ไขเพิ่มเติมสําหรับการใช้งานจริงมากขึ้น เมื่อจุดชุมนุมหายไป การเคลื่อนไหวได้สูญเสียโมเมนตัม"
 manifesti.10.desc_spiritualist:0 "§Hบาดี§!การ ต่อ ต้าน ไม่ ได้ เป็น เพียง การ ขืน อํานาจ แต่ เป็น หมาย สําคัญ ซึ่ง เป็น ข่าวสาร จาก ที่ ว่าง เปล่า. แทนที่จะปิดปากพวกมัน เราจะฟัง หนึ่งของพวกเขาได้รับการเลือก ที่จะเข้าร่วมการปกครองของเรา ที่พวกเขาจะเพลิดเพลินกับความสะดวกสบายที่ดีที่สุด"
 manifesti.10.desc_xenophobe:0 "การปฏิเสธไม่สามารถแพร่กระจายถ้าไม่มีเสียงที่จะดําเนินการ โดยการปิดการสื่อสารของดาวเคราะห์ เราได้ตัดความสามารถ ของผู้ประท้วงที่จะประสานงาน โดย ไม่ มี การ ชี้ นํา จาก องค์ ประกอบ ต่าง ๆ ขบวนการ ของ พวก เขา จะ ล้ม เหลว อย่าง แน่นอน.\n\nน่า เสียดาย การ ยุติ การ สื่อสาร ยัง ส่ง ผล กระทบ ต่อ ความ สามารถ ของ ผู้ บังคับ ใช้ กฎหมาย ที่ จะ ทํา หน้า ที่ ของ ตน ด้วย."
 manifesti.10.desc_authoritarian:0 "การจากไปเป็นเรื่องของครอบครัว โดยการกักขังญาติของผู้ก่อปัญหา§Hนิทรรศการ§!เข้าสู่การยอมจํานน ด้วยความมุ่งมั่นของพวกเขา และผู้นําของพวกเขาในการควบคุม ขบวนการได้ทรุดโทรมลง\n\nสั่งซื้อได้กลับมา และอํานาจของเรายืนไม่ถาม"
 manifesti.10.desc_dismantled_exhibition:0 "นิทรรศการ ถูก รื้อ ถอน อย่าง เงียบ ๆ ผู้ สร้าง ได้ ตําหนิ และ ชิ้น ส่วน ที่ ไม่ ยืดหยุ่น ก็ ถูก ยึด. ช่อง ทาง ทาง การ รับรอง กับ คู่ เทียบ ของ คน ต่าง ด้าว ว่า คํา พูด ที่ ขัด แย้ง กัน เช่น นั้น ไม่ ได้ สะท้อน นโยบาย ของ รัฐ.\n\nขณะ ที่ บาง คน เรียก ร้อง การ ย้าย ถิ่น นั้น ว่า การ ตรวจ สอบ แต่ บัด นี้ ส่วน ใหญ่ เข้าใจ ความ จริง ง่าย ๆ. มี ขีด จํากัด ใน การ แสดง ออก ซึ่ง เสรีภาพ เมื่อ ความ มั่นคง ของ จักรวรรดิ ตก อยู่ ใน อันตราย."
 manifesti.10.desc_violent_protests:0 "ครอบครัวของ§Hนิทรรศการ§!ถูกกักตัวไว้ และด้วยพวกมัน การเป็นผู้นําของขบวนการ ได้ถูกลดดุลยภาพ แต่แทนที่จะปฏิบัติตาม การตอบสนองของประชาชนได้เป็นหนึ่งในความไม่พอใจ ความ รุนแรง ก่อ ให้ เกิด ความ ไม่ สงบ."
 manifesti.10.a:0 "หวังว่านั่นจะเป็นจุดจบของเรื่องไร้สาระ"
 manifesti.10.b:0 "ความเสี่ยงที่คํานวณไว้แล้ว"
 manifesti.15.name:0 "คํา พัน คํา ไม่ มี คํา ใด เป็น คํา ทาง การ"
 manifesti.15.desc:0 "ภาษา ที่ แต่ง ขึ้น ได้ เริ่ม แพร่ กระจาย ไป ทั่ว ศูนย์ ศิลปะ และ สถาบัน ทาง การ ศึกษา การ จงใจ ปฏิเสธ ภาษา ราชการ. สร้างโดย§Hนิทรรศการ§!ผู้พูดปฏิเสธที่จะยอมรับความถูกต้องของภาษาของเรา เห็นว่ามันเป็นสัญลักษณ์ของสังคม\n\nพวก เจ้า หน้าที่ เตือน ว่า การ ปฏิเสธ ที่ จะ สื่อ ความ กัน ใน แบบ ที่ มี การ กําหนด ไว้ นี้ มี ความ เสี่ยง มาก ขึ้น ต่อ การ แตก แยก และ ทํา ให้ คํา บรรยาย สาธารณะ ไม่ มั่นคง."
 manifesti.15.a:0 "ซื้อความเงียบของพวกเขา"
 manifesti.15.b:0 "ด้วยเงินที่ค้างไว้ จากผู้ไม่นับถือศาสนา"
 manifesti.15.c:0 "มีส่วนร่วมในแนวโน้ม"
 manifesti.15.d:0 "ฉลองความหลากหลายทางภาษา"
 manifesti.15.e:0 "กล่องฟอสเตอร์ ไม่ใช่ดิวิชั่น"
 manifesti.20.name:0 "กระจกเงา"
 manifesti.20.desc:0 "§Hนิทรรศการ§!ได้เปิดเผยนิทรรศการสาธารณะที่สุดของพวกเขา ประสบการณ์ใหม่และได้รับความนิยมอย่างมากเกี่ยวกับ[this.GetName]เชิญ นัก ท่อง เที่ยว มา บงการ การ สะท้อน และ ภาพ ของ ตัว เอง และ สร้าง ภาพ ที่ ผิด เพี้ยน ของ บุคคล ทาง การ เมือง บาง คน มา จาก§Hจักรวรรดิกาแล็กซี่อื่น ๆ§!.\n\nนัก วิจารณ์ บอก ว่า ชิ้น ส่วน เหล่า นี้ เป็น การ ฉาย แสง อัน แรง กล้า และ จําเป็น ต่อ ความ รู้สึก ของ เรา เอง. นิทรรศการนี้ยังสร้างแรงบันดาลใจให้งานสังคมอื่นๆอีกหลายอย่าง ทั้งเกี่ยวกับปัญหาภายในประเทศ และความสัมพันธ์ทางวัฒนธรรม\n\nใน หมู่ นัก วิจัย ทาง สังคม ของ เรา มี ชีวิต ชีวา; เสียง เชิง อนุรักษ์ มาก กว่า กระตุ้น เตือน ให้ ระวัง."
 manifesti.20.a:0 "คําแถลงที่กล้าหาญ"
 manifesti.20.b:0 "ความ หายนะ ทาง การ ทูต ที่ รอ ให้ เกิด ขึ้น. ปิดพวกมันซะ"
 manifesti.25.name:0 "การ ปรากฏ ตัว ของ เหล่า ผู้ เผย แพร่"
 manifesti.25.desc:0 "ข่าวลือแพร่ออกไปว่าหัวหน้าพรรคใหม่กําลังเกิดขึ้น ขับเคลื่อนโดยอุดมคติของ 'ลัทธิมาเลเซีย' หลัง จาก การ ติด ต่อ ครั้ง แรก เมื่อ ความ เข้าใจ ของ เรา เกี่ยว กับ เอกภพ และ สถาน ที่ ของ เรา ภาย ใน เอกภพ เกิด ขึ้น เป็น ข้อ สงสัย ขึ้น มา ข้อ ท้าทาย ของ องค์การ นี้ ก็ ได้ รับ การ พิสูจน์ แล้ว. พวกเขาส่งเสริมการกดทับตัวเองอย่างสุดโต่ง และการคัดเลือกพื้นฐาน กลุ่ม ต่าง ๆ ที่ มี อยู่ บ่น ว่า การ ชุมนุม ของ พวก เขา กําลัง ถูก รบกวน โดย ผู้ ปลุก ปั่น ให้ เกิด การ เปิด เผย ซึ่ง มี ข้อ ท้าทาย อย่าง ไม่ หยุด หย่อน ใน การ ควบคุม กําลัง หว่าน ความ แตก แยก[Root.GetName]."
 manifesti.25.a:0 "มันหลีกเลี่ยงไม่ได้"
 manifesti.25.tt:0 "เปิดใช้งาน§Hนิทรรศการ§! §Yการกระทํา§!"
 manifesti.25.b:0 "เปิดเผยตัวตน"
 manifesti.25.c:0 "กีดกันกลุ่ม"
 manifesti.30.name:0 "จง น้อม ตัว ลง"
 manifesti.30.desc:0 "เสียงหึ่งๆ§Yนิทรรศการ§!ผู้ตรวจการได้เงียบลง จางหายไปอย่างรวดเร็ว ขณะที่การมาถึงของการประท้วงซึ่งเริ่มต้นมัน นักกิจกรรมบางคนที่เราคุยด้วย เพื่อเรียกร้องแรงจูงใจของพวกเขา มีตั้งแต่การชุมนุมบริสุทธิ์\n\nผู้เข้าชมหอศิลป์และพิพิธภัณฑ์ไม่เคยสูงขึ้นมาก่อน แต่สายตาของประชาชนได้ก้าวไปสู่ศิลปินกลุ่มใหม่ไปแล้ว เราจะยังไหลต่อไป ผ่านข้อมูลที่รวบรวมมา ในช่วงที่แปลกประหลาดนี้[root.GetAdj]ประวัติวัฒนธรรม"
 manifesti.30.a:0 "ชีวิตต้องดําเนินต่อไป เห็นได้ชัด"
 manifesti.30.b:0 "หลบหนีอย่างไร้จุดหมาย"
 # Faction events
 factions.1.desc.manifesti:0 "สมาชิก ของ พวก เขา ก่อ ให้ เกิด การ ประท้วง ที่ มี สี สัน ใน เรื่อง ต่าง ๆ ที่ เกี่ยว ข้อง กับ อารยธรรม เรียก ร้อง ให้ มี สังคม ที่ แสดง ความ เห็น อก เห็น ใจ และ รัก ชาติ มาก ขึ้น.\n\n"
 factions.2000.desc.manifesti:0 "จากผลของการนําหัวหน้าพรรคนี้เข้ามาในรัฐบาลของพวกเขา พวกเขากลายเป็นประหลาด§Hการ สืบ พันธุ์§!.\n\n"
 # Event chains
 manifesti_chain_title:0 "การ ปรากฏ ตัว ของ แสง สว่าง"
 manifesti_chain_desc:0 "ชีวิตประจําวัน[owner.GetName]ผิวสีจากการแสดงในที่สาธารณะที่แปลกประหลาดและรบกวน จุด มุ่ง หมาย ของ ศิลปะ เหล่า นั้น ดู เหมือน มี ความ ละเอียด อ่อน และ แสดง ออก อย่าง ไพเราะ แต่ ศิลปะ นี้ อาจ มี ผล กระทบ เช่น ไร ต่อ สังคม ที่ กว้าง กว่า?"
 manifesti_rise:0 "ชื่อ=ภาพชื่อ"
 operative_resurfaces_chain_title:0 "พื้นผิวของการปฏิบัติการ"
 operative_resurfaces_chain_desc:0 "รหัสลับชุดยาวได้รับการปรับเทียบข้อมูลใหม่ให้กับเรา เชื่อมต่อกับปฏิบัติการที่เราเคยทํามาก่อนดําเนินการใน§Y[disavowed_agent_country.GetName]§!.\n\nเคยเป็นสายลับที่เก่งกาจ พยายามจะรายงานกลับมา โดยอ้างว่ามีข้อมูล§Hบุคคล สําคัญ ทาง การ เมือง§!ใน[disavowed_agent_country.GetName]- แต่รหัสที่หมดอายุเหล่านี้สามารถเชื่อถือได้?"
 # Modifiers
 planet_manifesti_joy:0 "ลม แห่ง การ เปลี่ยน แปลง"
 planet_manifesti_joy_desc:0 "การ สาธิต ใน ที่ สาธารณะ กลาย เป็น สิ่ง ที่ พบ เห็น ทั่ว ไป โดย ผสม ผสาน การ ประท้วง เข้า กับ การ ฉลอง และ ทําลาย กิจวัตร ประจํา วัน."
 planet_manifesti_uslurp_mod:0 "การ ไม่ ส่ง"
 planet_manifesti_uslurp_mod_desc:1 "ภาษา ที่ แต่ง ขึ้น ได้ ถือ ว่า เป็น รูป แบบ ของ การ ประท้วง ปฏิเสธ คํา บรรยาย ทาง การ และ การ แบ่ง แยก ทาง สังคม ที่ ลึก ซึ้ง ยิ่ง ขึ้น. การ สื่อ ความ กับ ผู้ มี อํานาจ กําลัง เพิ่ม ขึ้น เรื่อย ๆ."
 planet_manifesti_exhibition_shutdown:0 "ความ กดดัน ทาง วัฒนธรรม"
 planet_manifesti_exhibition_shutdown_desc:0 "มี การ ปิด เสียง ที่ ไม่ น่า ฟัง และ ศิลปะ การ ทําลาย ก็ ถูก ขจัด ออก ไป. การตอบสนองของ บริษัท ได้เสริมความมั่นคง แต่ที่ค่าใช้จ่าย ของการแสดงออกสร้างสรรค์และความไว้วางใจของประชาชน"
 manifesti_reflections_mod:0 "สะท้อนลึก"
 manifesti_reflections_mod_desc:0 "การ ติด ตั้ง งาน ศิลปะ ที่ ได้ รับ ความ นิยม ใน การ ฉาย ภาพยนตร์ ชวน นัก ท่อง เที่ยว ให้ เล่น กับ แนว คิด เรื่อง การ เป็น ตัว ของ ตัว เอง และ วิธี ที่ พวก เขา มอง คน อื่น ๆ ทํา ให้ มี ความ สนใจ ใน วงการ สังคม มาก ขึ้น."
 manifesti_sweet_dreams_mod:0 "ความ ฝัน กลาย เป็น สิ่ง ที่ เด่น ชัด"
 manifesti_sweet_dreams_mod_desc:0 "กลุ่มอาวาร์-แกร์ด กรอดี้ได้ถูกยุบทิ้ง ทิ้งมรดก ไว้ในการศึกษาคดีสังคม และความวุ่นวายของพลเรือนระดับล่าง"
 planet_manifesti_polarization:0 "ความ ภักดี ที่ ผิด เพี้ยน"
 planet_manifesti_polarization_desc:0 "การ ประท้วง ก่อ ให้ เกิด การ โต้ เถียง กัน อย่าง กว้าง ขวาง โดย ส่ง เสริม ให้ มี ความ เห็น อก เห็น ใจ ต่อ ผู้ ที่ ประท้วง และ ความ ต้องการ ของ พวก เขา."
 planet_manifesti_egalitarian_attraction:0 "ได้ รับ พลัง เสียง"
 planet_manifesti_egalitarian_attraction_desc:0 "การปฏิบัติต่อผู้ประท้วงอย่างยุติธรรมของเรา ได้ช่วยเสริมสร้างการสนับสนุนประชาชน สําหรับอุดมคติของชนพื้นเมือง"
 planet_manifesti_pacifist_attraction:0 "มุม:ถูกเก็บรักษาไว้"
 planet_manifesti_pacifist_attraction_desc:0 "การ ตอบ โต้ อย่าง สงบ ต่อ การ ประท้วง ของ เรา ได้ เสริม อุดมการณ์ แบบ สันติ นิยม ท่ามกลาง ประชาชน."
 planet_manifesti_xenophile_attraction:0 "การ ควบคุม วัฒนธรรม"
 planet_manifesti_xenophile_attraction_desc:0 "การ ที่ เรา ยอม ทน ต่อ การ ประท้วง ได้ ส่ง เสริม ความ เปิด เผย และ ความ เข้าใจ ซึ่ง เสริม อุดมการณ์ ของ ประชาชน ให้ มั่นคง."
 planet_manifesti_network_disrupted:0 "ไท ที่ รุนแรง"
 planet_manifesti_network_disrupted_desc:0 "เนื่อง จาก การ ติด ต่อ สื่อสาร ของ ดาว เคราะห์ ถูก ตัด ขาด อิทธิพล ของ ต่าง ประเทศ จึง ถูก ขจัด ออก ไป และ ธาตุ ต่าง ๆ ที่ แทรกซึม เข้า มา จึง พยายาม จัด ระเบียบ. ประชาชน ซึ่ง ตอน นี้ ได้ รับ การ ปก ป้อง ไว้ จาก การ แทรกแซง ภาย นอก เพิ่ม ขึ้น เรื่อย ๆ และ มี ความ กลัว ต่อ แนว คิด ภาย นอก."
 manifesti_leader_desc:0 "อดีต§Yแสดง§!พวก หัวหน้า ศาสนา กลาย เป็น ผู้ พยากรณ์ พวก เขา อ้าง ว่า ได้ มอง เห็น ความ จริง ที่ ซ่อน อยู่ ใน ช่อง ว่าง."
 manifesti_leader_tt:0 "การ ปฏิเสธ อดีต§Yแสดง§!หัวหน้าเผ่าจะลบหลู่ข้อตกลง ที่นําไปสู่การเคลื่อนไหว"
 planet_manifesti_widespread_arrests:0 "บท เรียน ใน เรื่อง การ เชื่อ ฟัง"
 planet_manifesti_widespread_arrests_desc:0 "การจับกุมหมู่ได้ส่งข้อความที่ชัดเจนว่า คําสั่งจะได้รับการสนับสนุนในค่าใช้จ่ายใด ๆ ความ กลัว และ การ เชื่อ ฟัง ก่อ ให้ เกิด ราก เหง้า และ ประชากร ก็ ยิ่ง ยอม รับ การ ปกครอง ที่ มั่นคง มาก ขึ้น."
 planet_manifesti_endorsed:0 "ภาพสะท้อนชื่อ"
 planet_manifesti_endorsed_desc:0 "โดยการโอบกอดการเปิดเผย เราได้กําหนดอุดมคติของ พวกเขาที่เป็นอิสระ และการเปลี่ยนแปลงทางสังคม คําปราศรัยสาธารณะกําลังเปลี่ยนไป และการสนับสนุนค่านิยมนอกสมรสเพิ่มขึ้น"
 planet_manifesti_supressed:0 "ชื่อ=ภาพสะท้อนชื่อ"
 planet_manifesti_supressed_desc:0 "การเคลื่อนไหวของราษฎรถูกบีบให้ถูกรื้อถอน ส่งข้อความที่ชัดเจนว่าการโต้แย้งจะไม่ถูกยอมรับ ขณะ ที่ อุดมการณ์ ทาง การ เมือง ก่อ ให้ เกิด แรง ผลัก ดัน ความ ไม่ สงบ ของ สาธารณชน อยู่ ใต้ ผิว น้ํา."
 # Faction & Demands
 pft_manifesti:0 "แสดงการกระทํา"
 pft_manifesti_desc:0 "การเปิดเผยข้อเท็จจริง ยึดถือเป้าหมายที่ผิดปกติและหลากหลาย ปรารถนาเสรีภาพในการแสดงออก และความไม่ลําเอียง\n\n§Lเอ โทส§!"
 MANIFESTI_RIVERS_MOVEMENT:0 "อัลโลวีโอ-ลีเบราล"
 MANIFESTI_RIVERS_RESTRAINED:0 "$MANIFESTI_RIVERS_MOVEMENT$"
 MANIFESTI_RIVERS_DESC:0 "มันจะโปรด[root.GetName]เพื่อให้เห็นการเคลื่อนไหวที่ไม่สงบของน้ํา ในทุกรูปแบบของมันเป็นธารน้ําแข็ง, หนองน้ําและมหาสมุทร"
 MANIFESTI_MUNITIONS_AUTO:0 "การ ให้ คํา พยาน เป็น ส่วน ตัว"
 MANIFESTI_MUNITIONS_OPPRESSED:0 "$MANIFESTI_MUNITIONS_AUTO$"
 MANIFESTI_MUNITIONS_DESC:0 "เดอะ[root.GetName]มี ความ กระตือรือร้น อย่าง ยิ่ง ที่ จะ ให้ เซ รา ฟิม กับ เรือ รบ และ ด้วย เหตุ นี้ จึง มี เสรีภาพ ใน การ เลือก วิธี ใช้ เรือ."
 MANIFESTI_CAREFREE_SCIENCE:0 "หัว ใน เมฆ"
 MANIFESTI_CAREFREE_SCIENCE_OPPRESSED:0 "$MANIFESTI_CAREFREE_SCIENCE$"
 MANIFESTI_CAREFREE_SCIENCE_DESC:0 "เดอะ[root.GetName]ยืนยันว่า§Yสืบค้นเทคโนโลยี§!ควร มอบ หมาย เฉพาะ ใน สภา นัก ท่อง เที่ยว ที่ ปราศจาก ความ กังวล เท่า นั้น."
 MANIFESTI_RETINAL_FOCUS:0 "ห้อง ชุด ของ เร ติ นา"
 MANIFESTI_RETINAL_FOCUS_OPPRESSED:0 "$MANIFESTI_RETINAL_FOCUS$"
 MANIFESTI_RETINAL_FOCUS_DESC:0 "มันจะโปรด[root.GetName]ให้คงไว้£consumer_goods£ $CONSUMER_GOODS$การผลิตอย่างไร้สมรรถภาพ ทําให้ประชาชนของเราเป็นอิสระ จากสิ่งที่พวกเขาเรียกว่า \"การสังหารหมู่พร้อมรบ\""
 MANIFESTI_SILENT_PARTNER:0 "หุ้นส่วนเงียบ"
 MANIFESTI_SILENT_PARTNER_OPPRESSED:0 "$MANIFESTI_SILENT_PARTNER$"
 MANIFESTI_SILENT_PARTNER_DESC:0 "มันจะโปรด[root.GetName]เพื่อ ใช้ อํานาจ ทาง การ เมือง หรือ ทาง การ ทูต และ ไม่ ยอม ใช้ อํานาจ นั้น เข้า ร่วม ใน การ แข่งขัน ที่ จ้อง มอง แทน การ ส่ง ผู้ ส่ง ข่าว."

 #######################################
 # Other events
 #######################################

 envoy_events.100.name:0 "โรค ติด เชื้อ"
 envoy_events.100.desc.regular:0 "เราจับตัวแทนจาก§H[scandalous_insult_country.GetName]§!ในความเข้าใจผิดที่หายาก ปล่อยให้ความรู้สึกที่แท้จริงของจักรวรรดิของพวกเขา ที่มีต่อเรา ไปอีกพรรคที่ไม่ระบุชื่อ มากขึ้นกว่าปกติการเมืองโคลนพูด: ปริมาณเหล่านี้เป็น§Pการดูถูก§!และแท้จริง เรานั้นเป็นผู้ที่ถูกเยาะเย้ย[scandalous_insult_country.GetAdj]สังคม\n\nไม่ ว่า เรา จะ คิด ถึง การ ใส่ ร้าย แบบ ไม่ มี มูล ความ จริง เช่น นี้ หรือ ไม่ การ ทูต และ ความ หยิ่ง ทะนง จะ เรียก ร้อง ให้ เรา ยืน หยัด อยู่ ฝ่าย เรา."
 envoy_events.100.desc.gestalt:0 "ตัว แทน จาก§H[scandalous_insult_country.GetName]§!ได้เปิดเผยความรู้สึกที่แท้จริงเกี่ยวกับเราออกไป เห็นได้ชัดว่าเมื่อได้พบปะกับพรรคอื่น ๆ นิรนาม ให้วิธีการที่น้อยมันต้องเป็นสําหรับจิตสํานึกรวมกันที่จะพิจารณาแม้กระทั่งเรียก 'โคลนที่นิยมใช้กัน'เหล่านี้โจมตีเราเป็น§Pไร้สาระและดูถูกที่มีประสิทธิภาพ§!.\n\nไม่ว่าเราจะใจใด ๆ ต่อการใส่ร้ายนี้ : การทูตและความภาคภูมิใจจะเรียกร้องให้เรายืน[scandalous_insult_country.GetAdj]พฤติกรรม"
 envoy_events.100.desc.hostile:0 "ตัว แทน จาก§H[scandalous_insult_country.GetName]§!กล้าที่จะปล่อย ความรู้สึกที่แท้จริงเกี่ยวกับพวกเราออกไป เห็นได้ชัดว่าระหว่างการประชุม กับพรรคอื่น ๆ นิรนาม\n\nนี่§Pการดูถูกที่ไร้สาระ§!จง พยายาม ดู หมิ่น เรา และ ไม่ ว่า เรา จะ คิด อย่าง ไร ต่อ การ ใส่ ร้าย อย่าง ไร้ จุด มุ่ง หมาย นี้ ความ หยิ่ง เรียก ร้อง ให้ เรา ไม่ ยืน หยัด อยู่ ฝ่าย มัน."
 envoy_events.100.a:0 "นี่มันรุนแรงนะ!"
 envoy_events.100.b:0 "เราอยู่เหนือกว่าคนอนิจจัง ช่างพวกเขาสิ"
 envoy_events.100.c:0 "มันไม่คุ้มค่ากับการเหยียดหยามของเรา"
 envoy_events.101.name:0 "$envoy_events.100.name$"
 envoy_events.101.desc:0 "เดอะ§H[from.GetName]§!บอกว่าพวกเขามี§Pมีความผิด§!กับเจ้าหน้าที่ของเราคนหนึ่ง พวก เขา ไม่ ได้ เอ่ย ชื่อ เจ้า หน้าที่ หรือ แม้ แต่ พรรณนา ลักษณะ ของ การ สบ ประมาท. แทน ที่ จะ เป็น อย่าง นั้น เรา ได้ รับ เพียง ความ ขุ่น เคือง อย่าง รุนแรง และ การ สื่อสาร ก็ หยุด ชะงัก\n\nมันเป็นไปได้ว่าช่องโหว่ที่หายากในการทูตนี้ เป็นงานของกลุ่มอื่น ๆ ที่แทรกแซง; มันอาจจะเป็นเพียงแค่ง่าย"
 envoy_events.101.a:0 "ไม่ว่าทางไหน การทูตก็มีกลเม็ดมากขึ้น"

