 emperor.350.name:0 "อิม เพ อร์ เนียม เคลื่อน ที่ เหนือ เรา"
 emperor.350.desc:0 "ผู้เผด็จการ§Hกาแล็กติก อิมเปเรียม§!พยายามจะบังคับเรา ด้วยพระพรของพวกเขา[gal_emperor.GetRulerTitle]วุฒิสภาจักรพรรดิได้ผ่านมติที่ทําให้เราเป้าหมายของ§Hสงคราม ครู เสด จักรพรรดิ§!.\n\nเว้นแต่เราจะสามารถเอาชนะการรุกรานที่กําลังจะเกิดขึ้นนี้ เราจะถูกบังคับให้เข้าสู่อิมเปอเรียมและอยู่ภายใต้ความประสงค์ของ[gal_emperor.GetRulerTitle]."
 emperor.350.a:0 "สงครามจะมาตัดสินอนาคตของเรา"
 emperor.351.name:0 "คอมมานโดของจักรพรรดิ"
 emperor.351.a.desc:0 "กองเรือที่ทรงอํานาจกําลังระดมพลทั่วกาแล็กติกอิมเปอเรียม เป็นสงครามใหญ่ต่อต้าน§H[crusade_target.GetName]§!เริ่มได้ สําหรับ ผู้ สังเกตการณ์ หลาย คน ดู เหมือน เป็น เรื่อง เหลือ เชื่อ ที่ อํานาจ ภาย นอก ใด ๆ จะ สามารถ มี ชัย เหนือ อํานาจ ผสม ของ อิมเป เรียม แต่ การ สู้ รบ ที่ กําลัง จะ มา ถึง จะ เป็น ตัว กําหนด ผล."
 emperor.351.b.desc:0 "กองเรือที่ทรงอํานาจกําลังระดมพลทั่วกาแล็กติกอิมเปอเรียม เป็นสงครามใหญ่ต่อต้าน§H[crusade_target.GetName]§!เริ่มได้ ฟอลเลนจักรวรรดิทนมานานนับพันปี[gal_emperor.GetRulerTitle]ดู เหมือน จะ มั่น ใจ ว่า พลัง ของ อิม เพ เรียม ที่ รวม กัน แล้ว จะ มี มาก พอ ที่ จะ ทํา ให้ การ แข่ง รุ่น หนุ่ม ๆ ลด ลง ได้ ใน ที่ สุด."
 emperor.351.a:0 "สําหรับอิมเปอเรียม!"
 emperor.351.b:0 "มันเริ่มแล้ว"
 emperor.351.c:0 "เราเป็นรายต่อไปเหรอ?"
 resolution_imperial_crusade_tooltip:0 "สมาชิกทั้งหมดของกาแล็กติก อิมเปอเรียม ประกาศสงครามกับจักรวรรดิเป้าหมาย เพื่อบังคับให้มันยอมรับสมาชิกจักรพรรดิ"
 resolution_category_imperial_reforms:0 "การปฏิรูปอิมพีเรียม"
 resolution_emperor_pax_galactica:0 "แพกซ์ กาแล็กติกา"
 resolution_emperor_pax_galactica_desc:0 "เพื่อที่อิมเปอเรียมจะรุ่งเรือง มันจะต้องไม่ฉีกตัวเองออกจากกัน สงคราม ระหว่าง สมาชิก ไม่ อาจ อนุญาต."
 resolution_emperor_pax_galactica_tooltip:0 "สมาชิก ของ อิม เป เรียม รวม ทั้ง ผู้ ปกครอง ของ เมือง นั้น อาจ ไม่ ได้ ประกาศ สงคราม กับ กัน และ กัน นอก จาก การ ทดสอบ ความ ก้าว หน้า."
 resolution_emperor_repeal_pax_galactica:0 "แพกซ์แกแล็กติกา"
 resolution_emperor_repeal_pax_galactica_desc:0 "อิมเปอเรียมจะถูกทําลาย ถ้ามันยอมจํานนต่อความสันติ ความขัดแย้งภายใน จะทําให้เราแข็งแกร่งขึ้นในที่สุด"
 resolution_emperor_repeal_pax_galactica_tooltip:0 "สมาชิกอิมเปอเรียมสามารถประกาศสงครามได้อีกครั้ง"
 emperor.360.name:0 "แพกซ์ กาแล็กติกา"
 emperor.360.desc:0 "วุฒิสภาจักรพรรดิได้ผ่านมติที่ห้ามสงคราม ระหว่างรัฐสมาชิกของกาแล็กติกอิมเปอเรียม สงครามทั้งหมดละเมิดกฎหมายใหม่นี้ได้รับการสรุปทันทีตามคําสั่งของ[gal_emperor.GetRulerTitle]."
 emperor.360.a:0 "ความสงบสุขก็คือ"
 pax_galactica_active:1 "\n£trigger_no£สงคราม ระหว่าง สมาชิก ของ อิมเป เรียม ถูก ห้าม โดย กฎหมาย ของ จักรพรรดิ."
 operation.6300.name:0 "การแทรกซึม"
 operation.6300.desc:0 "เจ้าหน้าที่และข้าราชการ ระดับต่ํา ที่ถูกปกปิด ตอนนี้ปฏิบัติการของเรากําลังแทรกซึมเข้ามา§H[target.GetName]§!."
 operation.6305.name:0 "พูด ตรง ไป ตรง มา"
 operation.6305.desc:0 "คนของเรากําลังตามตื้อหาทูต ที่ชอบวิจารณ์พวกอิมเปอเรียม งานกําลังดําเนินการอยู่ กับร้านดับเพลิงอันตรายนี่"
 operation.6310.name:0 "ปฏิบัติการพร้อม"
 operation.6310.1.desc:0 "เป้าหมายระวังไม่ให้มีคําพูด ที่อาจตีความได้ ว่าเป็นการปลุกระดมให้เกิดการก่อการกบฏกับอิมเปอเรียม การลดความเหลื่อมล้ําของจรรยาบรรณ ไม่อาจช่วยเขาไว้ได้ในที่สุด - มีวิธีอื่น ๆ ที่จะจัดการกับพวกกบฏ"
 operation.6310.2.desc:0 "เราได้รวบรวมหลักฐานมากพอ ที่จะเคลื่อนย้ายไปยังเป้าหมาย กิจกรรมอันโหดร้ายของพวกเขา ลบล้างสิ่งที่ควรแก่การคุ้มครองทางการทูต ที่พวกเขาอาจได้รับ พวกเขาจะถูกไต่สวนและถูกตัดสินในศาลอิมพีเรียม ในฐานะศัตรูของอิมเปอเรียม"
 operation.6310.3.desc:0 "ความพยายามของ§H[target.GetName]§!เพื่อการทูตจะบ่อนทําลายอิมเปอเรียม ส่วนใหญ่ขึ้นอยู่กับกิจกรรมของหนึ่งอัตโนมัติ[target.GetIndividualName]ลูกเรือของเรามีความมั่นใจว่าการกําจัดของทูตนี้ จะลบสิ่งที่ก่อการกบฏมีอิทธิพล[target.GetSpeciesNamePlural]มีในวุฒิสภาอิมพีเรียล"
 operation.6315.name:0 "จดหมายยกเลิก"
 operation.6315.1.desc:0 "เจ้าหน้าที่อิมพีเรียลประสบความสําเร็จในความพยายามของพวกเขาที่จะจับกุมผู้ชุมนุมใน§H[target_country.GetName]§!เป้าหมายถูกส่งไปที่[Root.GetName]และหลังจากการพิจารณาคดีอย่างรวดเร็ว พวกเขาถูกตัดสินประหารชีวิต นั่นคือราคาที่ต้องจ่าย เพื่อเพิ่มชื่อเสียง[Root.GetRulerTitle]."
 operation.6315.2.desc:0 "ทีมยุทธศาสตร์จากคณะกรรมการรักษาความปลอดภัยอิมพีเรียลประสบความสําเร็จในความพยายามในการจับกุมทูตเผด็จการใน§H[target_country.GetName]§!เจ้าหน้าที่ ISD ขนส่งเป้าหมายอย่างรวดเร็ว[Root.GetName]และหลังจากการพิจารณาคดีอย่างรวดเร็ว พวกเขาถูกตัดสินประหารชีวิต นั่นคือราคาที่ต้องจ่าย เพื่อเพิ่มชื่อเสียง[Root.GetRulerTitle]."
 operation.6315.3.desc:0 "ใน การ ลอบ สังหาร อย่าง ระมัดระวัง เจ้า หน้าที่ ของ จักรพรรดิ ซึ่ง ถูก ซ่อน ไว้ ยิง เป้า และ จาก นั้น ก็ หนี ไป ก่อน ที่ เจ้า หน้าที่ ท้อง ถิ่น จะ ตอบ รับ. ถึงแม้ว่า§H[target_country.GetName]§!ดูเหมือนผู้ต้องสงสัยของเรา จะมีส่วนด้วย ไม่มีหลักฐานให้พวกเขาหา นี้จะส่งข้อความที่ทรงพลังไปยังผู้ที่ต่อต้าน[Root.GetRulerTitle]."
 operation.6315.4.desc:0 "ในแผนการซุ่มโจมตีอย่างรอบคอบ ทีมจู่โจมของคณะกรรมการรักษาความปลอดภัยอิมพีเรียล ยิงเป้าหมายลง แล้วหลบหนี ก่อนที่เจ้าหน้าที่ท้องถิ่นจะตอบสนอง ถึงแม้ว่า§H[target_country.GetName]§!ดูเหมือนผู้ต้องสงสัยของเรา จะมีส่วนด้วย ไม่มีหลักฐานให้พวกเขาหา นี้จะส่งข้อความที่ทรงพลังไปยังผู้ที่ต่อต้าน[Root.GetRulerTitle]."
 operation.6315.a:0 "ความยุติธรรมของจักรพรรดิได้รับการปฏิบัติ"
 operation.6316.name:0 "ซอง ยอน แพ้"
 operation.6316.1.desc:0 "เมื่อเร็ว ๆ นี้ตัวแทนอิมพีเรียลจับกุมหนึ่งในทูตของเราสําหรับ\"ความผิดต่ออิมเปอเรียม\"! ผู้ ส่ง ข่าว ถูก ส่ง ไป ยัง หมู่ บ้าน§H[From.GetName]§!ก่อน ที่ เจ้า หน้าที่ ของ เรา จะ แสดง ปฏิกิริยา ได้ และ หลัง จาก การ พิจารณา คดี อย่าง สั้น ๆ ก็ มี การ ตัดสิน ประหาร ชีวิต.\n\n$operation.6316.ending$"
 operation.6316.2.desc:0 "ทีมจู่โจมจากกรรมการความมั่นคงของจักรพรรดิ เมื่อเร็ว ๆ นี้จับกุมหนึ่งในทูตของเราสําหรับ\"ความผิดต่ออิมเปอเรียม\"! ISD ตัวแทนอย่างรวดเร็วการขนส่งทูตไปยัง§H[From.GetName]§!ก่อน ที่ เจ้า หน้าที่ ของ เรา จะ แสดง ปฏิกิริยา ได้ และ หลัง จาก การ พิจารณา คดี อย่าง สั้น ๆ ก็ มี การ ตัดสิน ประหาร ชีวิต.\n\n$operation.6316.ending$"
 operation.6316.3.desc:0 "หนึ่งในทูตของเราถูกลอบสังหาร[Root.Capital.GetName]ผู้กระทําผิดหลบหนีการจับกุม แต่ทูตของเราเป็นนักวิจารณ์ที่พูดไม่ออกของ[From.GetRulerTitle]และอิมเปอเรียมก็ปรากฏชัดว่า ผู้ใดได้รับผลประโยชน์มากที่สุดจากการตายของพวกเขา\n\n$operation.6316.ending$"
 operation.6316.ending:0 "การเสียชีวิตของทูตนี้ ทําให้ความพยายามของเรา ในวุฒิสภาอิมพีเรียลลดลง อีกสักพักเราจะได้แพลตฟอร์มทางการทูตที่ต้องการ มาแกว่งไปแกว่งมา ความคิดเห็นของประชาชนในอิมเปอเรียม"
 operation.6316.a:0 "ใช่\"เอกภาพ\" ไม่มีความหมายอะไรเลยเหรอ"
 undermining_efforts_stalled:0 "ซอง ลอย"
 undermining_efforts_stalled_desc:0 "เอเย่นต์อิมพีเรียล ต่อต้านกองกําลังทางการทูตของเรา ด้วยการกําจัดทูตคนสําคัญ ตอนนี้เราขาดการยืนในวุฒิสภาอิมพีเรียล เพื่อแกว่งความคิดเห็นของประชาชนต่อต้านอิมเปอเรียม"
 cannot_lower_authority_emperor:0 "§Rในฐานะผู้ปกครองอิมเปอเรียม เราไม่สามารถทําลายอํานาจได้§!"
 cannot_lower_authority_espionage_operation:0 "£trigger_no£ความสามารถของเราที่จะวิ่งเข้าหา อิมเปอเรียม ได้ถูกขัดขวางเวลา"
 undermining_tooltip_emperor:0 "เดอะ§Y[target_country.GetName]§!อาจไม่ได้มอบหมายให้ซองยังอํานาจอันเดอร์มีนอิมพีเรียลสําหรับต่อไป§Y5 ปี§!."
 undermining_tooltip_victim:0 "เราไม่อาจมอบหมายให้ซองยังอํานาจอันเดอร์มีนอิมพีเรียลต่อไป§Y5 ปี§!."
 operation.6320.name:0 "ปฏิบัติการความร่วมมือ!"
 operation.6320.desc:0 "ปฏิบัติการของเราทําลายความสามารถ§H[target_country.GetName]§!เพื่อทําลายอิมเปอเรียมได้ถูกทําลาย[target_country.GetAdj]เจ้าหน้าที่ของเราทุกคนเงียบเงียบ\n\nเดอะ[target_country.GetSpeciesNamePlural]ได้นําเสนอหลักฐานของการดําเนินการของเรากับวุฒิสภาจักรพรรดิ แน่นอน นักการทูตของเราปฏิเสธทุกอย่าง แต่เหตุการณ์น่าอายนี้ จะสะท้อนออกมาไม่ดี[Root.GetRulerTitle]."
 operation.6320.a:0 "นี่ไม่ดีแน่"
 operation.6321.name:0 "เครื่องราชอิสริยาภรณ์"
 operation.6321.desc:0 "หน่วยงานอิมพีเรียลหลายองค์ ได้ถูกแก้ไขเมื่อ[Root.Capital.GetName]ขณะที่กําลังพยายามที่จะปิดปากจดหมายของเราให้เงียบ เพื่อป้องกันพวกเขาจากการบ่อนทําลายอํานาจของอิมเปอเรียม\n\nเราได้เปิดเผยรายละเอียดของแผนการอันเลวร้ายนี้ กับวุฒิสภาอิมพีเรียล ลูกน้องของ[From.GetRulerTitle]แน่นอน การ ปฏิเสธ ทุก สิ่ง แต่ เหตุ การณ์ นี้ จะ บิดเบือน ภาพ ความ เป็น น้ํา หนึ่ง ใจ เดียว กัน ที่ อิมเป เรียม พยายาม จะ คิด ออก."
 custodian.51.title:0 "เตรียมพร้อมสําหรับกาแล็กติกคัสโตเดียน"
 custodian.51.desc:0 "สมาชิกที่มีเกียรติของกลุ่มกาแล็กติก... เพื่อนร่วมชั้น\n\nนี่เป็นเวลาที่มืดมิดสําหรับดาราจักรของเรา ภัยคุกคามในอดีตที่เราเผชิญอยู่ ไม่มีตัวอย่าง เพื่อความอยู่รอดของการโจมตีที่กําลังจะมา เราต้องต่อสู้เหมือนไม่มีวันพรุ่งนี้ เพราะในความเป็นจริงที่อาจจะเป็นกรณี\n\nเมื่อคุณเลือกเราเป็นกาแล็กซี่ภาษากัสโตเดียนของคุณ เราสาบานจะปกป้องกาแล็กซี่ของเรา และเราจะทําทุกอย่างเพื่อรักษาคําสัญญานี้ เราเรียกร้องให้สมาชิกทุกคนเก็บความแตกต่างของพวกเขา และเข้าร่วมกับเราในขณะที่เราตีกลับไปที่§H[crisis_country.GetName]§!ร่วมกันเราจะแสดงให้พวกเขา อํานาจเต็มของกาแลคซีของเรา ในขณะที่มันยืนเป็นหนึ่งเดียวกับศัตรูทั่วไป!"
 custodian.51.a:0 "ยุติการติดต่อ"
 emperor.91.title:0 "เตรียมพร้อมรับพระบาทสมเด็จพระจักรพรรดิ[From.GetRulerTitle]..."
 emperor.91.desc:0 "พลเมืองของอิมเปอเรียม เราอดทนด้วยกันมามาก แต่วันนี้อิมเปอเรียมกําลังเผชิญ กับความท้าทายที่ยิ่งใหญ่ที่สุด กาแล็กซีของเราถูกรุมล้อมโดย§H[crisis_country.GetName]§!ศัตรูไม่เหมือนคนอื่น ซึ่งถ้าปล่อยไว้โดยไร้การควบคุม จะเป็นการสิ้นสุดของชีวิต ที่น่าจดจําอย่างที่เรารู้\n\nแต่ อย่า สิ้น หวัง! กาแล็กติก อิมเปอเรียม กําลังระดมพลเต็มกําลัง เพื่อขับไล่ผู้รุกรานกลับ ประเทศของเราไม่ได้แตกคอกัน ภายใต้ชุมชนที่ทุจริต แต่รวมกันภายใต้ธง ของจักรวรรดิที่ยิ่งใหญ่ที่สุด ที่กาแล็กซี่เคยเห็นมา\n\nตามเรื่องของคุณ[From.GetRulerTitle]สงครามใหญ่กําลังมาถึงเรา แต่อิมเปอเรียมจะปรากฎออกมา ชัยชนะรออยู่!"
 custodian.53.desc:0 "กาแลคซีอยู่ภายใต้การโจมตี! กองกําลังของเราได้มีส่วนร่วม§H[crisis_country.GetName]§!แต่เรามีความหวังน้อยที่จะถือพวกเขาออกนาน!\n\nในฐานะชาวกาแล็กติกภาษากัสโตเดียนมันเป็นหน้าที่ของคุณที่จะปกป้องสมาชิกชุมชนทั้งหมด จากภัยคุกคามภายนอก! ได้โปรด ส่งความช่วยเหลือทั้งหมดมา"
 custodian.53.a:0 "สถานการณ์เลวร้าย"
 emperor.93.desc:0 "พระบาทสมเด็จพระเจ้าอยู่หัวของคุณจักรวาลอยู่ในอันตรายร้ายแรง! กองกําลังของเราถูกรบกวนโดย§H[crisis_country.GetName]§!และเมื่อพวกเขาเสร็จกับเรา, พวกเขาจะเข้ายึดครองอิมเปอเรียมที่เหลือ!\n\nในฐานะ[Root.GetRulerTitle]มันเป็นหน้าที่ของคุณ ที่จะปกป้องประชาชนจักรพรรดิทั้งหมด เราขอร้องให้คุณส่งความช่วยเหลือทันที!"
 emperor.93.a:0 "อิมเปอเรียมอยู่ภายใต้การล้อม!"
 tech_btc_1:0 "เครื่องทำลายระบบดาว"
 tech_btc_1_desc:0 "$PLANET_KILLER_STAR_CRACKER_DESC$"

 operation.6100.invalid:0 "โดย วิธี ใด วิธี หนึ่ง อิม เพ เรียม ได้ จัด การ กับ พายุ แห่ง ความ โกลาหล และ ความ ไม่ มั่นคง ซึ่ง เพิ่ง เกิด ขึ้น เมื่อ ไม่ นาน มา นี้ เอง! เนื่อง จาก ตอน นี้ จักรพรรดิ มี อํานาจ ควบคุม อย่าง มั่นคง สภาพ การณ์ จึง ไม่ เอื้อ อํานวย ต่อ การ กบฏ อย่าง เปิด เผย อีก ต่อ ไป. คนของเราถูกถอนกําลัง"
 rebellion_operation_invalid_tooltip:0 "§Rปฏิบัติการล้มเหลวเนื่องจากอํานาจจักรพรรดิเพิ่มขึ้น§Y80§!.§!"
 operation.6100.a:0 "เราจะสละเวลาของเราสําหรับตอนนี้ ..."
 opinion_emperor_gave_council_seat:0 "ที่นั่งของสภาผู้ได้รับรางวัล"
 opinion_emperor_removed_council_seat:0 "เอาที่นั่งสภาออก"
 must_not_be_custodian:0 "$TRIGGER_FAIL$เราไม่สามารถเลือกความแหลม:นี้เป็นกาแล็กตอนปัจจุบันภาษากัสโทเดียน"
 must_not_be_emperor:0 "$TRIGGER_FAIL$เราไม่สามารถเลือกความแหลม:นี้เป็นผู้ปกครองของกาแล็กติกอิมเปอเรียม"

 # Synced from vanilla by Stellaris Thai Translator.
 # These keys were missing from the mod and should be translated on the next pass.
 crisis.4135.nomad.desc: "วัน นี้ เป็น จุด เริ่ม ต้น ของ บท สุด ท้าย. ตอนนี้เรามีแผนการ ที่จะเปิดอุปสรรคระหว่างโลก และปล่อยให้พลังงานของชรูด กลายเป็นหนึ่ง กับจักรวาลของเรา ในที่สุดได้รับ[From.GetName]พลังเกินคาด\n\nเราไม่เคยอ้างดาวเป็นของเราเอง แต่ดาวหนึ่ง เลือกจากทุกคนที่เราได้ลอยผ่าน จะทําหน้าที่เป็นจุดโฟกัสของเรา โดยการใช้มัน เราจะรวบรวมพลังงานปริมาณที่เพียงพอ ในความเป็นจริงนี้ พลังงานคลื่นที่ จะเจาะอุปสรรค\n\nเราจําเป็นต้องเก็บเกี่ยวพลังของดวงอาทิตย์หลาย ๆ ที่ใช้ป้อมอวกาศเคลื่อนที่ใหม่ที่เรียกว่า§H$crisis_star_eater_plural$§!.\n\nผลกระทบเล็ก ๆ น้อย ๆ ของกระบวนการเก็บเกี่ยวดวงอาทิตย์ คือการที่ เทห์ฟากฟ้าที่อยู่รอบ ๆ อาจได้รับความเสียหาย ความซื่อสัตย์โครงสร้าง - แต่นั่นคือราคาที่เล็กน้อย ที่ต้องจ่ายสําหรับอํานาจที่เป็นของเรา\n\nจุดจบของจุดเริ่มต้นขึ้นอยู่กับเรา"
 crisis.6000.nomad.desc.intro: "โครง สร้าง ของ ผู้ ยิ่ง ใหญ่§Hเครื่องยนต์ดาราศาสตร์§!เรา กําลัง สร้าง รอบ ดาว โฟกัส ที่ เรา เลือก ซึ่ง ถูก กําหนด จาก ดาว ทุก ดวง ที่ เรา เคย ลอย ผ่าน ไป มา. โครงสร้างขนาดใหญ่นี้เมื่อเสร็จสมบูรณ์ จะฉีกม่านระหว่างโลกของเราและ§Hเดอะชราวด์§!."
 crisis.6000.nomad.a.desc: "เราได้มาถึงช่วงเวลาที่สําคัญ ในภารกิจของเรา ที่จะทําลายขอบเขตญาณทิพย์ของชรูด โครง สร้าง ของ ผู้ ยิ่ง ใหญ่§Hเครื่องยนต์ดาราศาสตร์§!ตอนนี้ล้อมรอบดาวโฟกัสที่เราเลือกหนึ่งที่เรา กําหนดจากทุกคนที่เราได้ลอยที่ผ่านมา เมื่อโครงสร้างขนาดใหญ่นี้เสร็จ อุปสรรคระหว่างโลกของเราจะถูกลบ และเราสามารถอ้าง\n\nจิตใจ ของ เรา จะ ไม่ ถูก จํากัด อีก ต่อ ไป โดย ข้อ จํากัด ทาง กายภาพ ของ ร่าง กาย ที่ อ่อนแอ ของ เรา และ ความ เป็น จริง เอง จะ อยู่ ที่ ความ เมตตา ของ เรา. จริง ที เดียว ไม่ อาจ มี ชั้น ที่ สูง กว่า นี้ ได้."
 crisis.6000.nomad.b.desc.organic_non_gestalt: "$crisis.6000.nomad.desc.intro$\n\nในไม่ช้าเราจะเข้าถึงรูปแบบบริสุทธิ์ที่สุด ของพลังงานไซโอนิคที่เบคและเรียก ความจริงจะไม่มีทางเลือก นอกจากยอมทําตามความประสงค์ของเรา"
 crisis.6000.nomad.b.desc.organic_gestalt: "$crisis.6000.nomad.desc.intro$\n\nเมื่อเราได้ข้ามเข้าไปในมิตินี้อย่างสมบูรณ์ และผนวกมัน จิตของเราจะขยายตัว กฎธรรมชาติที่ควบคุมการดํารงอยู่ของเรา สามารถเขียนใหม่ตามที่เราเห็นพอดี"
 crisis.6000.nomad.b.desc.machine: "$crisis.6000.nomad.desc.intro$\n\nยุคแห่งความไม่เท่าเทียมทางกาย นําไปสู่จุดสิ้นสุด ใน ไม่ ช้า ความ เป็น จริง นี้ จะ ประสาน กับ ความ ดี เลิศ ทาง ด้าน การ เดิน เรือ ที่ ดี เยี่ยม ของ เรา."
 crisis.6000.nomad.c.desc: "หน่วยก่อสร้างได้เสร็จสิ้นกรอบของ§Hเครื่องยนต์ดาราศาสตร์§!เรากําลังสร้างรอบดาวโฟกัสที่เราเลือก โครงสร้างขนาดใหญ่นี้เมื่อเสร็จสมบูรณ์ จะฉีกอุปสรรคระหว่างโลกของเราและราชอาณาจักรไซโอนิคอื่น ๆ ที่เรียกว่า'§Hเดอะชราวด์§!.'\n\nเมื่อเราข้ามเข้ามาในมิตินี้ และผนวกมันเข้าด้วยกัน กฎธรรมชาติที่ควบคุมการดํารงอยู่ของเรา สติสัมปชัญญะของเรา จะไม่ถูกจํากัดโดยข้อจํากัดทางกายภาพ เช่น การประมวลผลพลังงานหรือโหนดเครือข่าย"
 crisis.6000.nomad.d.desc: "ของเรา[root.GetIndividualNamePlural]ได้เสร็จสิ้นกรอบของ§Hเครื่องยนต์ดาราศาสตร์§!เรากําลังสร้างรอบดาวโฟกัสที่เราเลือก โครงสร้างขนาดใหญ่นี้เมื่อเสร็จสิ้นแล้ว จะฉีกอุปสรรคระหว่างโลกของเราและราชอาณาจักรไซโอนิคอื่น ๆ ที่เรียกว่า\"เดอะ ชรูด\"\n\nเมื่อเราได้ข้ามเข้าไปในมิตินี้อย่างสมบูรณ์ และผนวกมัน จิตของเราจะขยายตัว กฎธรรมชาติที่ควบคุมการดํารงอยู่ของเรา สามารถเขียนใหม่ตามที่เราเห็นพอดี"
 crisis.6000.nomad.e.desc: "การ ก่อ สร้าง§Hเครื่องยนต์ดาราศาสตร์§!โครงข่ายรอบดาวโฟกัสที่เราเลือกได้ถูกทําเสร็จ เมื่อเสร็จสิ้นโครงสร้างขนาดใหญ่นี้จะฉีกอุปสรรคระหว่างความจริงของเราและ§Hเดอะชราวด์§!.\n\nเมื่อเราข้ามเข้าไปในมิตินั้นได้เต็มที่ เราก็จะสามารถเผชิญหน้า หลังจากที่มันตก, ชรูด จะอยู่ในมือของเรา และเราจะมีอิสระในการเขียนกฎของธรรมชาติ"
