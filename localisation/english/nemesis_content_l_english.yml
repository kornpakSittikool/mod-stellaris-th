 crisis_sphere_1_DESC:1 "เครื่องยนต์เอเธโรแฟสติค ซึ่งจะทําลายอุปสรรคที่ดํารงอยู่ ระหว่างโลกนี้กับชรูด เสร็จสิ้นบางส่วน ปรับปรุงโครงสร้างเมกะนี้อย่างเต็มที่§Gชนะเกม§!."
