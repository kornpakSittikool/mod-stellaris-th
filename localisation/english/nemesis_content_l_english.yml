 TOXIC_OPERATION_PROJECT_DESC:0 "เดอะ[toxic_field_country.GetAdj]ที่อยู่อาศัยมีสารพิษเล็กน้อย ต่อคนของเราเอง โดยการศึกษาผลกระทบของมัน เราสามารถพัฒนาการรักษา และดังนั้นหลีกเลี่ยงความเสี่ยง ที่เกี่ยวข้องกับการมองเห็นภายนอก[toxic_field_country.GetIndividualNamePlural]ในรังของมัน"
 NOISE_OPERATION_PROJECT:0 "เสียง"
 NOISE_OPERATION_PROJECT_DESC:1 "สภาพแวดล้อมที่[excess_noise_country.GetName]การสร้างเอง ทําให้เกิดเสียงอิเล็กโทรดไฟฟ้า มากกว่าที่เราคาดไว้ โดรนปลอมของเรา กําลังสูญเสียข้อมูลไป โดยการศึกษาความถี่ที่ผิดพลาดนี้ เราสามารถปรับหุ่นยนต์ปฏิบัติการของเราให้ทํางานได้ดีขึ้น และหลีกเลี่ยงการตรวจจับ 'ในสนาม'"

