 custodian.2.name:0 "ผู้พิทักษ์กาแล็กติกได้รับการแต่งตั้ง"
 custodian.2.a.desc:1 "ในที่สุด วุฒิสภากาแล็กติกได้ลงมติให้มอบอํานาจการดํารงตําแหน่งฉุกเฉินเมื่อ[custodian.GetName]ในพิธีอย่างเป็นทางการที่ออกอากาศผ่านกาแล็กซี่ เราได้รับการแต่งตั้ง§Hภาษากัสโตเดียนของชุมชนกาแล็กติก§!.\n\nในฐานะของแรกที่เท่าเทียมกัน เราได้ถูกตั้งข้อหาป้องกันชุมชนกาแล็กติก จากภัยคุกคามที่อาจเกิดขึ้นทั้งหมด เรา ได้ รับ อํานาจ มาก มาย ใน ทุก เรื่อง ของ ชุมชน และ ตอน นี้ สามารถ เสนอ มติ พิเศษ."
 custodian.2.b.desc:1 "วุฒิสภากาแล็กติกมีมติให้มอบอํานาจการดํารงตําแหน่งฉุกเฉินเมื่อ§H[custodian.GetName]§!ในพิธีที่ออกอากาศไปทั่วกาแล็กซี่ พวกเขาได้รับการแต่งตั้งอย่างเป็นทางการ§Hภาษากัสโตเดียนของชุมชนกาแล็กติก§!.\n\nในฐานะแรกของการเท่ากัน,[custodian.GetSpeciesName]ตอนนี้รัฐบาลถูกตั้งข้อหาป้องกันชุมชนกาแล็กติก จากภัยคุกคามที่อาจเกิดขึ้นทั้งหมด คือภายในหรือภายนอก พวก เขา ได้ รับ อํานาจ มาก มาย ใน ทุก เรื่อง ของ ชุมชน และ ตอน นี้ สามารถ เสนอ มติ พิเศษ."
 custodian.2.a:0 "ตอนนี้เราสามารถทําให้มันสําเร็จ"
 custodian.2.b:0 "เราจะได้เห็นกันว่ามันทํางานยังไง"
 custodianship_starts:0 "§Y[custodian.GetName]§! ได้เป็น §Yผู้พิทักษ์แห่งประชาคมกาแล็กติก§!"
 custodian.11.name:0 "สิ้นสุดวาระการดำรงตำแหน่งของผู้พิทักษ์"
 custodian.11.a.desc:0 "ฤดูกาลของเราในขณะที่ภาษากัสโตเดียนของชุมชนกาแล็กติกได้สิ้นสุดลง และพลังพิเศษของเราถูกยกเลิก แม้ว่าเราจะยังดํารงตําแหน่งของเราในสภากาแล็กติก"
 custodian.11.b.desc:0 "เมื่อวาระสิ้นสุดลง §H[former_custodians.GetName]§! ได้สละตำแหน่งของตนในฐานะผู้พิทักษ์กาแล็กติกแล้ว อำนาจพิเศษของพวกเขาถูกยกเลิกและตอนนี้พวกเขากลับสู่ตำแหน่งสมาชิกทั่วไปในสภาปกครองกาแล็กติก"
 custodian.11.a:0 "เป็นไปตามนั้น"
 custodianship_ends:0 "§Y[From.GetName]§! ไม่ได้เป็น §Yผู้พิทักษ์แห่งประชาคมกาแล็กติก§! อีกต่อไป"
 custodian.15.a.desc:0 "ใน ที่ สุด เรา ก็ ได้ รับ การ ปลด ปล่อย จาก การ เป็น ทาส ที่ ไม่ สํานึก บุญ คุณ และ ไร้ ประโยชน์! ปล่อยให้คนอื่นกังวลเกี่ยวกับ อนาคตของกาแล็กซี่เนรคุณนี้"
 custodian.15.b.desc:0 "เดอะ§H[former_custodians.GetName]§!ได้ยุติวาระของพวกเขาก่อนเวลาอันควร ในฐานะภาษากัสโตเดียนของชุมชนกาแล็กติก ดูเหมือนว่าความรับผิดชอบ ของการดํารงตําแหน่งผู้ปกครอง ไม่ได้เป็นที่ชื่นชอบของพวกเขา"
 custodian.15.a:0 "เราทําส่วนของเราแล้ว"
 custodian.15.b:0 "พวกชอบเลิก"
 custodian.101.name:0 "ไม่มีภาษากัสโตเดียนอีกต่อไป"
 custodian.101.desc:0 "กับการทําลาย§H[LastKilledCountryName]§!การควบคุมของกลุ่มกาแล็กติกสิ้นสุดลงแล้ว"
 custodian.17.name:0 "พวกพวกภาษากัสโตเดียนไม่ตั้งค่า!"
 custodian.17.a.desc:0 "คนโง่เนรคุณในวุฒิสภากาแล็กติก ได้ลงคะแนนเพื่อยุติการดํารงตําแหน่งของเรา! เราถูกถอดออกจากอํานาจชุมชน ที่เกี่ยวข้องกับสํานักงาน"
 custodian.17.b.desc:0 "ในจุดสิ้นสุดอย่างฉับพลันและน่าอับอายของพวกเขาอํานาจควบคุม, วุฒิสภากาแล็กซี่มีมติให้เอาทันที§Y[From.GetName]§!จากสํานักงานกาแล็กติก คัสโตเดียน พวกเขาถูกถอดออกจากพลังชุมชนพิเศษ"
 custodian.17.a:0 "นี่มันรุนแรงนะ!"
 custodian.17.b:0 "นั่นคือจุดจบของมัน"
 resolution_galacticreforms_unseat_custodian_tooltip:0 "ปัจจุบัน§Yภาษากาแล็กซี่ชื่อ§!ถูกย้ายออกจากสํานักงาน"
 resolution_galacticreforms_unseat_custodian:0 "ถอดถอนจากตำแหน่งผู้พิทักษ์"
 resolution_galacticreforms_unseat_custodian_desc:0 "ถึงเวลาที่จะยุติการทุจริต ของชาวคัสโตเดียนในปัจจุบัน พวก เขา ต้อง ถูก ถอด ออก จาก ตําแหน่ง ทันที ก่อน ที่ จะ ก่อ ความ เสีย หาย มาก ขึ้น ต่อ ชุมชน กาแลกติก!"

 emperor.2.name:0 "เดอะ[Root.GetGalEmpireName]"
 emperor.2.normal.desc:0 "$emperor.2.intro.desc$\n\n$emperor.2.a.desc$\n\n$emperor.2.outro.desc$"
 emperor.2.machine.desc:0 "$emperor.2.intro.desc$\n\n$emperor.2.b.desc$\n\n$emperor.2.outro.desc$"
 emperor.2.hive.desc:0 "$emperor.2.intro.desc$\n\n$emperor.2.c.desc$\n\n$emperor.2.outro.desc$"
 emperor.2.wilderness.desc: "$emperor.2.intro.desc$\n\n$emperor.2.d.desc$\n\n$emperor.2.outro.desc$"
 emperor.2.intro.desc:0 "มันเป็นรุ่งอรุณของระเบียบใหม่ ชุมชนกาแล็กติกเก่าถูกรื้อถอน และแทนที่§H[Root.GetGalEmpireName]§!ฟื้นขึ้นมา หลังจากอ้างสิทธิของเราในบัลลังก์ของรัฐใหม่นี้ เราเป็นที่รู้จักในชื่อ§H[Root.GetName]§!."
 emperor.2.a.desc:0 "ในพิธีพระราชทานที่หรูหรา ออกอากาศไปทั่วกาแล็กซี่ ราชอาณาจักรใหม่ของจักรวรรดิก่อตั้งเมื่อ[ruler.GetRegnalName]สวมมงกุฎ[Root.GetRulerTitle]บน[Root.Capital.GetName]."
 emperor.2.b.desc:0 "การสร้างสังคมนี้ จะให้ปัญญาของเครื่องจักร นับแต่นี้ไปเรียกว่า§H[Root.GetRulerTitle]§!การควบคุมของกาแล็กซี่ ในระดับที่มากกว่า ประชากรจักรวรรดิของเรา จะเรียนรู้ที่จะเชื่อฟังคําสั่งของเรา เช่นเดียวกับโดรนใด ๆ"
 emperor.2.c.desc:0 "การสร้างสังคมนี้ จะมอบจิตใจของเรา ตั้งแต่นี้ไปเรียกว่า§H[Root.GetRulerTitle]§!การควบคุมของกาแล็กซี่ ในระดับที่มากกว่า ประชากรจักรวรรดิของเรา จะเรียนรู้ที่จะเชื่อฟังคําสั่งของเรา เช่นเดียวกับโดรนใด ๆ"
 emperor.2.d.desc: "การสร้างสังคมนี้จะทําให้เรา§H[Root.GetRulerTitle]§!- การควบคุมของกาแล็กซี่ในระดับสูง ใน เวลา ต่อ มา รัฐบริวาร ของ จักรวรรดิ ของ เรา จะ เรียน รู้ ที่ จะ หยั่ง รู้ ค่า สติ ปัญญา ที่ ช่วย ค้ําจุน ถิ่น ทุรกันดาร."
 emperor.2.outro.desc:1 "จงเจริญ[Root.GetRulerTitle]อิมเปอเรียมจงเจริญ"
 emperor.2.a:0 "ได้ยิน ได้ยิน!"
 emperor.2.a.tooltip:1 "$emperor.2.a.tooltip.start$- ตอนนี้เรามี§Y$civic_galactic_sovereign$§!ซิฟิก\n- จรรยาบรรณของเราได้เปลี่ยนไปอย่างสิ้นเชิง§Yการอนุญาตสิทธิ์§!\n$emperor.2.a.tooltip.end$"
 emperor.2.a.tooltip.gestalt:0 "$emperor.2.a.tooltip.start$- ตอนนี้เรามี§Y$civic_galactic_sovereign$§!ซิฟิก\n$emperor.2.a.tooltip.end$"
 emperor.2.a.tooltip.megacorp:0 "$emperor.2.a.tooltip.start$- ตอนนี้เรามี§Y$civic_galactic_sovereign_megacorp$§!ซิฟิก\n- จรรยาบรรณของเราได้เปลี่ยนไปอย่างสิ้นเชิง§Yการอนุญาตสิทธิ์§!\n$emperor.2.a.tooltip.end$"
 emperor.2.a.tooltip.start:0 "§Hการเพิ่มขึ้นของอิมเปอเรียมอยู่บนเรา!§!\n- นั่น§Yชุมชน กาแลกติก§!ตอนนี้เป็นที่รู้จักในชื่อ§Yกาแล็กติก อิมเปเรียม§!\n- เราเป็นที่รู้จักในชื่อ§Y[Root.GetName]§!\n"
 emperor.2.a.tooltip.end:0 "- รัฐสมาชิกอิมพีเรียลไม่สามารถทําศึกได้อีกต่อไป"
 emperor.3.normal.desc:0 "$emperor.3.intro.desc$\n\n$emperor.3.a.desc$\n\n$emperor.3.outro.desc$"
 emperor.3.machine.desc:0 "$emperor.3.intro.desc$\n\n$emperor.3.b.desc$\n\n$emperor.3.outro.desc$"
 emperor.3.hive.desc:0 "$emperor.3.intro.desc$\n\n$emperor.3.c.desc$\n\n$emperor.3.outro.desc$"
 emperor.3.awakenedhive.desc: "มันเป็นรุ่งอรุณของระเบียบเก่า\n\nชุมชนกาแล็กติกถูกรื้อถอน และแทนที่§H[Root.GetGalEmpireName]§!ฟื้นแล้ว จิตสํานึกที่เก่าและแตกกระจายเลือกยุคนี้ที่จะเกิดใหม่ ผู้ ที่ จะ ต่อ ต้าน การ เสด็จ ขึ้น สู่ สวรรค์ ถูก ล่าม โซ่. ใครจะพูดสิ่งที่ปรารถนาใหม่[gal_emperor.GetRulerTitle]มีสําหรับกาแล็กซี่"
 emperor.3.intro.desc:0 "มันเป็นรุ่งอรุณของระเบียบใหม่ ชุมชนกาแล็กติกเก่าถูกรื้อถอน และแทนที่§H[Root.GetGalEmpireName]§!ฟื้นแล้ว หลังจากที่อ้างบัลลังก์ของรัฐใหม่นี้§H[gal_emperor.GetSpeciesName]§!ตอนนี้ภาษากัสโตเดียนเรียกตัวเองว่า§H[gal_emperor.GetName]§!."
 emperor.3.a.desc:0 "ในพิธีพระราชทานที่หรูหรา ออกอากาศไปทั่วกาแล็กซี่ ราชอาณาจักรใหม่ของจักรวรรดิก่อตั้งเมื่อ[gal_emperor.ruler.GetRegnalName]สวมมงกุฎ[gal_emperor.GetRulerTitle]บน[gal_emperor.Capital.GetName]."
 emperor.3.b.desc:1 "AI ของพวกเขา รู้จักกันในชื่อ[gal_emperor.GetRulerTitle]การปกครองเป็นอธิปไตยของอิมเปอเรียม"
 emperor.3.c.desc:1 "จิตสํานึกเชื่อมโยงของพวกเขา ที่รู้จักกันในชื่อ[gal_emperor.GetRulerTitle]การปกครองเป็นอธิปไตยของอิมเปอเรียม"
 emperor.3.outro.desc:0 "นี่คือจุดเริ่มต้นของยุคใหม่ของสันติภาพและความมั่นคงของกาแล็กซี่ หรือการกดขี่และการปราบปราม?"
 emperor.3.a:0 "เราจะได้เห็นกัน"
 emperor.3.b:0 "เรื่อง นี้ ไม่ เกี่ยว ข้อง กับ เรา."
 emperor.3.a.tooltip:0 "เดอะ§Yชุมชน กาแลกติก§!ตอนนี้เป็นที่รู้จักในชื่อ§Yกาแล็กติก อิมเปเรียม§!."
 emperor.4.title:1 "การ ออก แบบ อิมเป เรียม"
 emperor.4.a.desc:1 "พลเมืองของกาแล็กซี่, ชื่นชมยินดี! คุณได้รับการปลดปล่อยจากการกดขี่ของกลุ่มเครื่องราชอิสริยาภรณ์\n\nโลกของคุณตอนนี้อยู่ภายใต้ การคุ้มครองของกาแล็กติก อิมเปอเรียม ในฐานะพลเมืองจักรพรรดิ คุณเป็นหนึ่งเดียวกัน ในประเทศที่ยิ่งใหญ่ที่สุดและมีอํานาจมากที่สุด ที่กาแล็กซี่เคยเห็นมา การลงโทษจะถูกลงโทษ และการเชื่อฟังจะได้รางวัล รู้ไว้ซะ[gal_emperor.GetRulerTitle] [gal_emperor.ruler.GetRegnalName]เฝ้าดูเจ้าอยู่\n\nอิมเปอเรียมจงเจริญ! จงเจริญ[gal_emperor.GetRulerTitle]!"
 emperor.4.b.desc:1 "ฟังทางนี้! จง ฟัง คํา ประกาศ นี้. กาแล็กติก อิมเปอเรียมได้แทนที่สถาบันที่ล้าสมัยที่สุด ที่คุณรู้จักในฐานะชุมชนกาแล็กติก อภิมหากาพย์ ของคุณแต่ละคน ได้รับการจัดตั้งใหม่ และตอนนี้ถูกจัดกลุ่ม ภายใต้ ไดเรกทอรีอิมพีเรียลที่มากเกินไปเดียว\n\nเดอะ[gal_emperor.GetRulerTitle]จะทําหน้าที่เป็นโปรเซสเตอร์ส่วนกลางของอิมเปอเรียม และคุณได้รับคําสั่งให้ปฏิบัติตามคําสั่งในขั้นตอนทันที ในฐานะพลเมืองจักรพรรดิ คุณเป็นหนึ่งเดียว ในองค์กรการเมืองที่ยิ่งใหญ่ที่สุดและมีอํานาจมากที่สุด ที่กาแล็กซี่เคยรู้จัก การ ประสบ ผล สําเร็จ อย่าง ต่อ เนื่อง จะ เรียก ร้อง ทั้ง การ เชื่อ ฟัง และ การ ร่วม มือ กัน.\n\nอิมเปอเรียมจงเจริญ! จงเจริญ[gal_emperor.GetRulerTitle]!"
 emperor.4.c.desc:1 "จินตนาการอัตโนมัติของกาแล็กซี่นี้ เป็นวันที่ดี คุณเร็ว ๆ นี้จะเก็บเกี่ยว ผลประโยชน์ของการได้รับการนําโดย ปัญญามากมายที่ได้เห็น ในขณะที่ในเวลาเดียวกัน รักษาบางส่วนของความผิดพลาดของปัจเจกบุคคล\n\nโลกของคุณตอนนี้อยู่ภายใต้ การคุ้มครองของกาแล็กติก อิมเปอเรียม ในฐานะประชากรจักรพรรดิ คุณเป็นหนึ่งเดียวกัน ในทุ่งหญ้าที่ยิ่งใหญ่ที่สุดและทรงพลังที่สุด ที่กาแล็กซี่เคยเห็นมา จง เชื่อ ฟัง คํา สั่ง ของ[gal_emperor.GetRulerTitle]และ อย่า หลง ไป จาก แบบ ของ มัน — รู้ ว่า มัน เป็น ผลิตผล ของ จิตใจ ที่ มี ขอบ เขต มาก กว่า สิ่ง อื่น ใด ใน กาแล็กซี นี้.\n\nอิมเปอเรียมจงเจริญ! จงเจริญ[gal_emperor.GetRulerTitle]!"
 emperor.4.a:0 "เปิดจอ"
 emperor.5.name:0 "อนาคตของ[Root.GetAllianceName]"
 emperor.5.desc:2 "เดอะ[gal_emperor.GetRulerTitle]ได้มีพระราชกฤษฎีกาว่าทุกรัฐของแอพเพอร์เรียมกาแล็กซี่จะถอนตัวทันทีจากใด ๆ\"อ็อบโซเลต\"ระดับความจุแสงพวกเขาอาจจะเป็นส่วนหนึ่งของ สมเด็จพระจักรพรรดิได้มั่นใจกับเราว่า ในฐานะสมาชิกที่ซื่อสัตย์ของอิมเปอเรียม เราไม่ได้ใช้เพิ่มเติมเช่น \"การผูกพันธ์ทางสังคม\"."
 emperor.5.a:1 "เราไม่มีทางเลือกนอกจากเชื่อฟัง"
 emperor.5.b:1 "เราจะไม่ก้มหัวให้อิมเปอเรียม"
 emperor.6.name:0 "กบฎ!"
 emperor.6.desc:1 "ผู้ทรยศ§H[From.GetName]§!ได้ปฏิเสธที่จะยอมจํานนต่อ กาแล็คติกอิมเปอเรียม! แทน ที่ จะ เป็น เช่น นั้น พวก เขา ได้ ตัดสิน ใจ ยึด มั่น อยู่ กับ การ ค้ําจุน อัน น่า สงสาร ของ ตน โดย การ ประกาศ การ หน่วง ของ ตน ต่อ สาธารณชน จาก อิมเป เรียม."
 emperor.6.a:0 "พวกเขาจะต้องชดใช้ความโอหังของพวกเขา"
 opinion_traitor_to_empire:1 "ผู้ ทรยศ ต่อ อิม เพ เรียม"
 emperor.10.name:0 "การ แยก ตัว จาก อิมเป เรียม"
 emperor.10.desc:0 "ได้รับสถานะเป็นสมาชิกสภา§H[overlord.GetName]§!เราถูกห้ามเข้าร่วมกาแล็กติกอิมเปอเรียม"
 emperor.10.a:0 "ดีมาก"

 emperor.50.name:0 "กอง เรือ รบ อาร์ม า ดา"
 emperor.50.desc:1 "การสร้างกองเรือขนาดใหญ่ เพื่อป้องกันยานกาแล็กติกอิมเปอเรียม ได้รับการลงนามในพระราชบัญญัติ นี้ใหม่§Hกอง เรือ อาร์ม า ดา§!จะเกณฑ์ลูกเรือของเรือและบุคลากรสนับสนุนจากภายในทั้งหมดของอิมเปอเรียม แต่ส่วนใหญ่ของเจ้าหน้าที่คณะจะประกอบด้วย[gal_emperor.GetSpeciesNamePlural].\n\nทัพบกจะอยู่ภายใต้การควบคุมโดยตรงของ[gal_emperor.GetName]และคําสั่งใหม่ทั้งหมด จะต้องสาบานตนต่อ[gal_emperor.GetRulerTitle]."
 emperor.50.a:0 "อย่างที่มันควรจะเป็น"
 emperor.50.b:0 "ของเรา[root.GetIndividualName]เจ้าหน้าที่จะตรวจสอบพวกเขา" # adjective, e.g. 'our symbiont officers'
 emperor.50.c:0 "เป็นเวลาแห่งการเปลี่ยนแปลง"
 emperor.52.desc:1 "การอ้างอิงทั้งหมดของชุมชนกาแล็กติกเก่า ถูกกวาดออกไปในอิมเปอเรียมใหม่ และเป็นส่วนหนึ่งของการจัดตั้งนี้ กองกําลังป้องกันกาแล็กติกได้เปลี่ยนชื่อเป็น§Hกอง เรือ อาร์ม า ดา§!.\n\nกองเรือใหม่นี้ได้รับมรดกจํานวนมากของโครงสร้างและองค์กรจากแบบ GDF แต่เครื่องแบบใหม่และสัญลักษณ์ได้ถูกนํามาใช้ และสมาชิกที่ให้บริการทั้งหมดต้องสาบานในความจงรักภักดีต่อ[gal_emperor.GetRulerTitle].\n\nขณะที่ลูกเรือของอาร์มาเกดและบุคลากรสนับสนุนของยังคงถูกคัดเลือกจากสมาชิกทั้งหมดของอิมเปอเรียมร้อยละของ[gal_emperor.GetSpeciesName]เจ้า หน้าที่ เพิ่ม ขึ้น อย่าง น่า ทึ่ง."
 emperor.55.name:0 "การ ก่อ ตั้ง กอง เวร"
 emperor.55.desc:1 "อันแรก§Hจักรวรรดิ§!กําลังรวมตัวกันอยู่ใน[gal_emperor.GetName]กองกําลังภาคพื้นดินนี้มีอํานาจตามกฎหมาย ที่จะเกณฑ์ประชาชนจากสมาชิกทั้งหมดของอิมเปอเรียม มี การ สืบ เสาะ หา ผู้ ที่ มี ความ หวัง อยู่ แล้ว และ มี รายงาน ว่า แม้ แต่ เด็ก ก็ ถูก เกณฑ์ หาก พบ ว่า มี ความ สามารถ ผิด ปกติ.\n\nผู้ รอด ชีวิต จาก โครงการ ฝึก อบรม อัน ทารุณ และ การ ควบคุม จิตใจ ที่ กว้าง ขวาง ซึ่ง บุคลิกภาพ ของ พวก เขา ส่วน ใหญ่ ถูก สร้าง ขึ้น ใหม่ จาก การ สําเร็จ การ ศึกษา ขั้น ข่วน ใน ฐานะ ผู้ สําเร็จ ราชการ. ความ สามารถ ใน การ ต่อ สู้ อัน น่า เกรง ขาม ของ พวก เขา, การ ตี สอน ที่ ไม่ พึง ปรารถนา, และ ความ ภักดี อย่าง บ้า คลั่ง ต่อ พวก เขา[gal_emperor.GetRulerTitle]สร้างกองกําลังจู่โจมที่ดีที่สุดในกาแล็กซี่"
 emperor.55.a:0 "กําปั้น[gal_emperor.GetRulerTitle]!"
 emperor.55.b:0 "เราจะถูกบังคับ"
 emperor.55.c:0 "เครื่องมือกดขี่อีก?"
 emperor.70.name:0 "กรรมการความมั่นคงของจักรพรรดิ"
 emperor.70.desc:0 "เจ้าหน้าที่จาก§Hกรรมการความมั่นคงของจักรพรรดิ§!อยู่ระหว่างกระบวนการนําไปใช้กับโลกทั่วอิมเปอเรียม พวกเขาจะช่วยเหลือหน่วยงานบังคับใช้กฎหมายท้องถิ่น\n\nหน้าที่ของ ISD อีกที่รายงานเฉพาะ[gal_emperor.GetRulerTitle]ผ่านกระทรวงยุติธรรมของจักรพรรดิ จะถอนรากถอนโคน\"ผู้ก่อการจราจล, กบฏ, และ ปลุกระดม\" ผู้คุกคามเพื่อบ่อนทําลายความมั่นคงของอิมเปอเรียม"
 emperor.70.a:0 "ไม่มีใครรอดจากความยุติธรรมของจักรพรรดิ"
 emperor.72.desc:0 "เมื่อการเพิ่มขึ้นของอิมเปอเรียมกาฬโรคกําลังถูกจัดตั้งขึ้นใหม่และได้เปลี่ยนชื่อเป็น§Hกรรมการความมั่นคงของจักรพรรดิ§!ขอบเขตการปกครองของ ISD ยังคงขยายไปทั่วอิมเปเรียมทั้งหมด แต่ตอนนี้พวกเขารายงานเฉพาะ[gal_emperor.GetRulerTitle].\n\nในขณะที่หนึ่งในความรับผิดชอบหลักของ ISD ยังคงที่จะตรวจสอบและดําเนินการอาชญากรรม บนโลกอิมพีเรียล[gal_emperor.GetRulerTitle]บาง คน เป็น ห่วง ว่า อดีต องค์การ ตํารวจ กําลัง เปลี่ยน เป็น เครื่อง มือ กดขี่..."

 imperial_legion_limit_tooltip:0 "เฉพาะ ปัจเจกบุคคล ที่ มี ทักษะ พิเศษ เท่า นั้น จึง จะ ได้ รับ อนุญาต ให้ เป็น กรม ทหาร ของ จักรพรรดิ ซึ่ง หมาย ความ ว่า เรา สามารถ ทํา งาน ได้ เพียง แต่ การ ทํา ให้ กองทัพ เหล่า นี้ มี จํานวน จํากัด ใน แต่ ละ ครั้ง."
 imperial_legion:0 "องค์ จักรพรรดิ"
 imperial_legion_desc:1 "ทหารชั้นนําของกาแล็กติก อิมเปอเรียม, รับสมัครจากทุกประเทศสมาชิก พวก เขา ภักดี อย่าง บ้า คลั่ง ต่อ อิม เพ เรียม."
 building_imperial_capital:0 "วังอิมพีเรียล"
 building_imperial_capital_desc:0 "พระ ราชวัง มหึมา ที่ เหมาะ กับ ประวัติศาสตร์ จักรวรรดิ ที่ ยิ่ง ใหญ่ ที่ สุด เท่า ที่ เคย เห็น มา. ถ้ามีศูนย์กลางสว่าง ไปยังกาแล็กซี่"
 building_imperial_machine_capital:0 "ศูนย์อิมพีเรียล"
 building_imperial_machine_capital_desc:1 "ความ ซับ ซ้อน อย่าง ใหญ่ หลวง นี้ คือ หัวใจ บริหาร ของ กาแล็กซี่ อิมเป เรียมเอไอหลายพันคน กําลังประมวลผลและประเมินสภาวะปัจจุบันของดาราจักร"
 building_imperial_hive_capital:0 "คอมพลีเมนต์ของอิมพีเรียล"
 building_imperial_hive_capital_desc:1 "จากโครงสร้างขนาดใหญ่นี้ จิตใจไฮฟ์ควบคุมกาแล็กติก อิมเปอเรียม นี่คือที่ที่ชะตากรรมของกาแล็กซี่ถูกตัดสิน"

 gov_imperial_domain:0 "โดเมนจักรพรรดิ"
 gov_imperial_domain_desc:1 "§Lรัฐบาลนี้ปกครองดินแดนกลางของกาแล็กติก อิมเปอเรียม ซึ่งอยู่ภายใต้การควบคุมโดยตรงของสมเด็จพระจักรพรรดิ§!"
