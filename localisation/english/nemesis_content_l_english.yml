 former_rebel:0 "อดีตเรเบล"
 former_rebel_desc:1 "เรา เข้า ข้าง พวก เรเบล ใน ช่วง สงคราม กลาง เมือง เมื่อ ไม่ นาน มา นี้ ที่ เมือง กัลแล็กติก อิม พี เรียม และ ดัง นั้น เรา ยัง คง ถูก มอง ด้วย ความ สงสัย. อิทธิพลของเราในวุฒิสภา ได้ลดลงอย่างหนัก"
 former_loyalist:0 "อดีต ผู้ ภักดี ของ จักรพรรดิ"
 former_loyalist_desc:1 "เรา สู้ รบ ฝ่าย ผู้ ภักดี ระหว่าง การ ล่ม สลาย ของ กาแลกติก อิม พี เรียม และ ดัง นั้น เรา ยัง คง ถูก มอง ด้วย ความ ระแวง. อิทธิพลของเราในชุมชนกาแล็กติก กําลังลดลงอย่างหนัก"
 former_emperor:0 "ไทแรนต์ก่อนหน้านี้"
 former_emperor_desc:1 "ใน ฐานะ ผู้ ปกครอง องค์ ก่อน ของ กาแลกติก อิมเป เรียม ซึ่ง ตอน นั้น เรา กลาย เป็น ผู้ ที่ อยู่ รอบ กาแล็กซี ส่วน ใหญ่ โดย กะทันหัน. ความไม่เสมอภาค ถูกมองว่าเป็นทรราช อิทธิพลของเราในชุมชนกาแล็กติกเกิดใหม่ ได้ลดลงอย่างมาก"

 EMPEROR_NEUTRAL_GREETING_01:0 "คุณกําลังพูดคุยกับผู้ปกครองของกาแลคซี"
 EMPEROR_NEUTRAL_GREETING_02:1 "เรามีการออกแบบที่ยิ่งใหญ่ สําหรับอนาคตของอิมเปอเรียม คุณจะได้เห็น"
 EMPEROR_NEUTRAL_GREETING_03:1 "กาแล็คติก อิมเปอเรียมจะนํายุคแห่งสันติภาพและความมั่นคงมาสู่กาแล็กซี่"
 EMPEROR_NEUTRAL_GREETING_04:1 "อิม เพ อร์ เรียมเรากําลังก่อสร้าง จะเป็นไปตามการทดสอบของเวลา หนึ่งหมื่นปีนับจากนี้ จะได้รับการยอมรับว่าเป็นยุคที่ทุกอย่างเริ่มต้นขึ้น"
 EMPEROR_NEUTRAL_GREETING_05:0 "ครับ? เดอะ[Root.GetRulerTitle]ยุ่งมาก ฉันแน่ใจว่าคุณคงเข้าใจ มีดาราจักรทั้งกาแล็กซีที่จะขยาย"
 EMPEROR_NEUTRAL_GREETING_06:0 "ในปัจจุบัน กาแล็คซี่จะยืนเป็นเอกฉันท์ภายใต้ธง คิด ดู สิ ว่า จะ ทํา อะไร ได้ บ้าง!"
 EMPEROR_TO_OUTSIDER_NEUTRAL_GREETING_01:1 "กาแล็กติก อิมเปอเรียม วันหนึ่งจะยืดผ่านกาแล็กซี่ทั้งหมด ความจริงเจ้าเป็นแต่เพียงผู้ผ่อนผันเท่านั้น[From.GetSpeciesNamePlural]."
 EMPEROR_TO_OUTSIDER_NEUTRAL_GREETING_02:0 "เจ้ามาเพื่อสาบานตนต่อ[Root.GetRulerTitle]ได้เวลาแล้ว"
 EMPEROR_TO_OUTSIDER_NEUTRAL_GREETING_03:1 "แต่โชคร้ายที่ยังมีส่วนที่ย้อนกลับ ของกาแล็กซี่เกินเอื้อมของกาแล็กซี่ นี่จะต้องแก้ไขในที่สุด"
 EMPEROR_TO_SUBJECT_NEUTRAL_GREETING_01:0 "การเชื่อฟังเจ้าจะได้รับรางวัล[From.GetSpeciesNamePlural]เราทั้งหมดอยู่ในเรื่องนี้ด้วยกัน"
 EMPEROR_TO_SUBJECT_NEUTRAL_GREETING_02:0 "พลเมืองจักรพรรดิได้รับการต้อนรับในศาลเสมอ[Root.GetRulerTitle]เราจะช่วยคุณได้ยังไง?"
 EMPEROR_TO_SUBJECT_NEUTRAL_GREETING_03:1 "เดอะ[From.GetName]เป็นส่วนหนึ่งของกาแล็กติกอิมเปอเรียม มั่นใจได้ว่า[Root.GetRulerTitle]ไม่ได้ลืมคุณ"
 EMPEROR_HOSTILE_GREETING_01:0 "มีแต่คนโง่เท่านั้น ที่จะได้รับด้านที่ไม่ดี ของผู้ปกครองของดาราจักร"
 EMPEROR_HOSTILE_GREETING_02:0 "คุณยังคงอวดดีต่อหน้า[Root.GetRulerTitle]คงทนได้อีกไม่นาน"
 EMPEROR_HOSTILE_GREETING_03:0 "คุกเข่าลงก่อน[Root.GetRulerTitle]เนฟ!"
 EMPEROR_HOSTILE_GREETING_04:0 "คุณต่อต้าน[Root.GetRulerTitle]ความหยิ่งยโส"
 EMPEROR_HOSTILE_GREETING_05:0 "คุณรู้ตัวไหมว่ากําลังคุยกับใครอยู่"
 EMPEROR_HOSTILE_GREETING_06:0 "แล้วรัฐบาลที่น่าเวทนาของคุณ จะพูดยังไงล่ะ[Root.GetRulerTitle]?"
 EMPEROR_TO_OUTSIDER_HOSTILE_GREETING_01:1 "อนาคตของกาแล็คซี่นี้ จะถูกหล่อหลอมขึ้นโดยพลังรวมของกาแล็กติก อิมเปอเรียม ไม่ใช่ของเช่น[From.GetName]."
 EMPEROR_TO_OUTSIDER_HOSTILE_GREETING_02:1 "มีเพียงความโง่เขลาของคุณเท่านั้น ที่ช่วยคุณจากการทําลายอย่างร้ายแรง ด้วยน้ํามือของกาแล็กติก อิมเปอเรียม"
 EMPEROR_TO_OUTSIDER_HOSTILE_GREETING_03:0 "คุณดูถูก[Root.GetRulerTitle]จะมีผลตามมา"
 EMPEROR_TO_SUBJECT_HOSTILE_GREETING_01:0 "พวกที่วางแผนต่อต้าน[Root.GetRulerTitle]ถูกกําจัดเหมือนสัตว์สกปรกที่พวกเขาเป็น"
 EMPEROR_TO_SUBJECT_HOSTILE_GREETING_02:1 "คนทรยศถูกจัดการอย่างโหดร้ายในกาแล็กติกอิมเปอเรียม จําไว้[From.GetSpeciesNamePlural]."
 EMPEROR_TO_SUBJECT_HOSTILE_GREETING_03:1 "คําตัดสินและความไม่ซื่อสัตย์ เป็นภัยคุกคามร้ายแรงต่อความมั่นคงของอิมเปอเรียม และจะถูกจัดการตามนั้น"
