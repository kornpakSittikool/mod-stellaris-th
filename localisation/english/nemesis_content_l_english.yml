 action.48.desc.default:0 "ดี นี่มันเยี่ยมมาก"

 civic_galactic_sovereign:0 "องค์ บรม มหิศร แห่ง กาแลกติก"
 civic_galactic_sovereign_desc:1 "สังคม นี้ สามารถ ครอบ ครอง กาแล็กซี ส่วน ใหญ่ ได้ โดย ทํา หน้า ที่ เป็น ผู้ ครอบ ครอง ใน ปัจจุบัน ของ กาแลกติก อิมเป เรียม."
 civic_galactic_sovereign_megacorp:0 "องค์ บรม มหิศร แห่ง องค์การ"
 civic_galactic_sovereign_megacorp_desc:0 "เมกาคอปเปอเรชั่นนี้ ประสบความสําเร็จมากกว่าส่วนใหญ่ของกาแล็กซี่ ทําหน้าที่เป็นผู้ปกครองบริษัทในปัจจุบันของกาแล็กติกอิมเปอเรียม"



 casus_belli_cb_imperial_crusade:0 "สงครามครูเสดอิมพีเรียม"
 war_goal_wg_imperial_crusade:1 "บังคับให้เข้าสู่จักรวรรดิอิมพีเรียม"
 war_goal_wg_imperial_crusade_desc:1 "สงครามเพื่อบังคับให้ศัตรูเข้าร่วมกับจักรวรรดิกาแลกติก\n\nเมื่อสงครามยุติ ระบบดาวที่เราครอบครองจะได้รับการปลดปล่อยในฐานะสมาชิกใหม่ของจักรวรรดิกาแลกติกอิมพีเรียม หากมีดาวเคราะห์อาศัยอยู่อย่างน้อยหนึ่งดวง"
 resolution_galactic_empire_imperial_crusade:0 "สงครามครูเสดอิมพีเรียม"
 resolution_galactic_empire_imperial_crusade_desc:1 "ชายแดนกาแล็กติก อิมเปอเรียม ยังไม่ได้ครอบคลุมทั้งกาแล็กซี่ - นี้จะต้องได้รับการแก้ไข สงครามครูเสดของจักรพรรดิจะถ้าประสบความสําเร็จ บังคับให้เป้าหมายของมตินี้จะเข้าร่วมอิมเปอเรียม"
 resolution_category_foreign_relations:0 "ความสัมพันธ์นอกประชาคม"
 resolution_galactic_empire_imperial_crusade_tooltip:0 "แกรนท์§Yสงครามครูเสด§!คัสซัส เบลลีบนจักรวรรดิเป้าหมาย"
 casus_belli_cb_trial_of_advancement:0 "การ ทดสอบ ความ ก้าว หน้า"
 war_goal_wg_seize_council_seat:1 "ตำแหน่งในสภา"
 war_goal_wg_seize_council_seat_desc:0 "สงครามเพื่อยึดที่นั่งของศัตรูในสภาอิมพีเรียล"

 resolution_emperor_abolish_council:0 "§Rยกเลิกสภาอิมพีเรียล§!"
 resolution_emperor_abolish_council_desc:0 "สภาอิมพีเรียลและคู่สมรสนี้ยังเป็น อีกคนที่น่าสลดใจ มันไม่มีประโยชน์ใดๆ ในยุคใหม่นี้"
 resolution_emperor_abolish_council_tooltip:0 "สภาอิมพีเรียลยุติการมีอยู่"
 resolution_emperor_restore_council:0 "ฟื้นฟูสภาอิมพีเรียล"
 resolution_emperor_restore_council_desc:1 "บางทีการตัดสินใจที่จะยกเลิกสภาอิมพีเรียลอาจจะถูก... ดําเนินการอย่างเร่งรีบ ตัว แทน บาง คน จําเป็น ต้อง อยู่ ใน สถาบัน ที่ มี ขนาด เท่า กับ กาแลกติก อิม พี เรียม."
 resolution_emperor_restore_council_tooltip:0 "เดอะ§Yสภาอิมพีเรียล§!กลับคืนมาพร้อมสมาชิกสามคน"
 resolution_emperor_council_size_1:0 "$resolution_galacticreforms_council_size_1$"
 resolution_emperor_council_size_1_desc:1 "อิม เพ อร์ เรียมต้องการแต่เสียงที่ภักดีเดียวในสภา"
 resolution_emperor_council_size_2:0 "$resolution_galacticreforms_council_size_2$"
 resolution_emperor_council_size_2_desc:0 "สองสมาชิกที่หนักแน่นและไว้ใจได้ในสภาอิมพีเรียลก็เพียงพอแล้ว"
 resolution_emperor_council_size_3:0 "$resolution_galacticreforms_council_size_3$"
 resolution_emperor_council_size_3_desc:0 "สภา จักรพรรดิ ซึ่ง ประกอบ ด้วย สมาชิก สาม คน ดู เหมือน ว่า ดี เลิศ."
 resolution_emperor_council_size_4:0 "$resolution_galacticreforms_council_size_4$"
 resolution_emperor_council_size_4_desc:0 "ความมั่นคงเรียกร้องให้เราปรับจํานวนสมาชิกในสภาอิมพีเรียล 4 น่าจะดีที่สุด"
 resolution_emperor_council_size_5:0 "$resolution_galacticreforms_council_size_5$"
 resolution_emperor_council_size_5_desc:1 "อิม เพ เรียมจะได้ประโยชน์ จากเสียงมากขึ้นในสภาอิมพีเรียล"
 resolution_emperor_permanent_seat:0 "$resolution_galacticreforms_permanent_seat$"
 resolution_emperor_permanent_seat_desc:1 "เป็น ที่ ชัด แจ้ง ว่า สมาชิก สภา คน นี้ มี ความ สนใจ ดี ที่ สุด ใน จิตใจ ของ อิม เพ เรียม. พวกเขาควรจะได้ที่นั่งถาวร"
 resolution_emperor_revoke_permanent_seat:0 "$resolution_galacticreforms_revoke_permanent_seat$"
 resolution_emperor_revoke_permanent_seat_desc:0 "สมาชิกสภาแห่งนี้ไม่ได้รับความเห็นชอบจากสมเด็จพระจักรพรรดิ พวกเขาไม่ควรจะมีที่นั่งถาวรอีกต่อไป"

 self_modified_refuse:0 "§Rพวกนี้สร้างตัวเองขึ้นมา[Root.GetSpeciesNamePlural]ปฏิเสธที่จะออกไป[Root.Planet.GetName]!§!\n\n"

 emperor.101.name:0 "เสียงร้องของกบฏ!"
 emperor.101.desc:1 "เราได้มาถึงช่วงเวลาที่สําคัญ -§Hกาแล็กติก อิมเปเรียม§!อยู่ท่ามกลางการก่อกบฏ อาจไม่มีเวลาที่จะล้มล้าง[gal_emperor.GetRulerTitle]แม้ตอนนี้ สมาชิกกบฏของอิมเปอเรียม อยู่ภายใต้ธงของเดียว\n\nอย่างที่มันเป็น[Root.GetName]ซึ่งเป็นตัวการในการเริ่มก่อกบฏ เราได้ถูกขอให้นําพันธมิตรอันยิ่งใหญ่นี้ ในสงครามที่กําลังจะมาถึง ซึ่งไม่ต้องสงสัยเลยว่าจะเป็นสัดส่วนที่ต่อเนื่อง"
 emperor.101.a:1 "เสรีภาพจะกลับสู่กาแล็กซี่"
 emperor.101.b:0 "ไม่ เราภักดีต่อ[gal_emperor.GetRulerTitle]."
 emperor.102.name:0 "การ ตาย ของ เสรีภาพ"
 emperor.102.a.desc:1 "แม้ จะ มี หลัก ฐาน ชัด แจ้ง ว่า อิมเป เรียม ของ กาแลกติก กําลัง จะ ล่ม สลาย แต่ ไม่ มี สมาชิก คน ใด ใน กลุ่ม นั้น เต็ม ใจ จะ ท้าทาย อย่าง เปิด เผย[gal_emperor.GetRulerTitle]การ กบฏ สิ้น ชีวิต ใน วัย ทารก พร้อม กับ ความ ใฝ่ฝัน และ§H[gal_emperor.GetName]§!ได้ทําให้การจับกาแล็กซี่แข็งแรงขึ้น"
 emperor.102.b.desc:1 "เราได้เรียนรู้ถึงความพยายามที่ล้มเหลว ที่จะฉวยโอกาสจากจุดอ่อนของกาแล็กติก อิมเปอเรียมในปัจจุบัน โดยการกระตุ้นให้เกิดการก่อกบฏอย่างเปิดเผย เมื่อถูกผลักดันมาเพื่อผลัก ไม่มีสมาชิกของอิมเปอเรียมสามารถเรียกความกล้าหาญที่จะท้าทาย[gal_emperor.GetRulerTitle]โดย ตรง แล้ว การ กบฏ สิ้น สุด ลง ก่อน ที่ มัน จะ เริ่ม ต้น ด้วย ซ้ํา.\n\nนี่ เป็น การ โจมตี อย่าง รุนแรง ต่อ ขบวนการ กบฏ ซึ่ง ทํา ให้ การ ยึด ครอง กาแล็กซี ของ เรา แน่นแฟ้น ยิ่ง ขึ้น."
 emperor.102.a:0 "จงเจริญ[gal_emperor.GetRulerTitle]..."
 emperor.102.b:0 "คนโง่น่าสมเพช"
 emperor.103.desc:1 "เรามาถึงช่วงเวลาสําคัญแล้ว แอมเปอเรียมของกาแล็กติกกําลังเคลื่อนตัวอยู่ ณ ชายแดนอันไกลโพ้น แม้แต่ตอนนี้ สมาชิกกบฏของอิมเปอเรียมนําโดย§H[rebel_leader.GetName]§!กําลังร่วมมือกัน ภายใต้ธงของการบํารุงรักษาเดียว ในขณะเดียวกัน§H[gal_emperor.GetName]§!กําลังรวบรวมผู้ภักดี ที่มุ่งมั่นที่จะอนุรักษ์อิมเปอเรียม\n\nสงครามกลางเมืองกําลังจะถล่มกาแล็กซี่ และทั้งสองฝ่ายได้ร้องขอความภักดี เราจะสู้กับใครดี"
 emperor.103.2.desc:0 "เราไม่ใช่คนเดียวที่ต่อสู้เพื่อปลดปล่อยกาแล็กซี่ จากพันธนาการของกาแล็กซี่อิมเปอเรียม -§H[rebel_leader.GetName]§!ได้รวมชาติกบฏและ§H[gal_emperor.GetName]§!เพิ่งประกาศว่าพวกเขาอยู่ในสถานะกบฏ!\n\nการก่อกบฏได้ดําเนินการอย่างดีแล้ว ปฏิบัติการของเราเองที่จะจุดชนวนได้ถูกยกเลิกแล้ว เรา ควร ประกาศ อย่าง เป็น ทาง การ ไหม ว่า เรา สนับสนุน พวก กบฏ?"
 emperor.103.a:1 "อิมเปอเรียมจะต้องล้ม!"
 emperor.103.b:0 "จงเจริญ[gal_emperor.GetRulerTitle]!"
 joins_rebels:0 "เราเข้าข้าง§Yรีเบล§!ในการต่อสู้ของพวกเขากับ§Yผู้ ภักดี ต่อ จักรพรรดิ§!."
 joins_loyalists:0 "เราเข้าข้าง§Yผู้ ภักดี ต่อ จักรพรรดิ§!ในความพยายามของพวกเขาที่จะขยี้§Yรีเบล§!."
 emperor.104.name:0 "ตําแหน่งสุดท้าย"
 emperor.104.desc:1 "นี่เป็นเวลาที่มืดมน อิทธิพลอันเสื่อมทรามของ[gal_emperor.GetRulerTitle]ไกลเกินกว่าที่เราคิด ไม่มีสมาชิกคนอื่น ๆ ของอิมเปอเรียม มีความกล้าหาญที่จะเข้าร่วมกับเราในกบฏเปิด!\n\nตอนนี้เรายืนอยู่คนเดียวกับพลังรวมของกาแล็กติกอิมเปอเรียม ในขณะที่มันเคลื่อนพลเพื่อทําสงคราม"
 emperor.104.a:0 "ขี้ขลาด!"
 emperor.106.name:0 "เปิดรีโวลต์!"
 emperor.106.a.desc:0 "$emperor.106.1.desc$\n\n$emperor.106.3.desc$\n\n$emperor.106.5.desc$"
 emperor.106.b.desc:0 "$emperor.106.1.desc$\n\n$emperor.106.2.desc$\n\n$emperor.106.5.desc$"
 emperor.106.c.desc:0 "$emperor.106.1.desc$\n\n$emperor.106.4.desc$\n\n$emperor.106.5.desc$"
 emperor.106.1.desc:1 "ผู้ก่อการจราจลกําลังฉวยโอกาส จากจุดอ่อนในปัจจุบันของกาแล็กซี่อิมเปอเรียม เพื่อก่อการกบฏอย่างเปิดเผย"
 emperor.106.2.desc:0 "คนทรยศกําลังรวบรวมกําลังของพวกเขา ภายใต้ธงของ§H[From.Root.GetAllianceName]§!มีรายงานการจับกุมหมู่ ที่พุ่งเป้าไปที่เจ้าหน้าที่ในดินแดนของพวกเขา"
 emperor.106.3.desc:1 "ความพยายามของพวกเขาที่จะปลุกปั่นกบฏส่วนใหญ่ได้ประสบความล้มเหลว แต่ - เพียงคนทรยศของ§H[From.GetName]§!เข้าข้างกบฏ สมาชิกคนอื่น ๆ ของอิมเปอเรียม ยืนมั่นคงกับ[Root.GetRulerTitle]ด้วยความช่วยเหลือจากเพื่อนผู้ภักดี เราต้องยุติการก่อกบฏที่น่าสมเพชนี้"
 emperor.106.4.desc:1 "โดย อาศัย คํา โกหก และ การ โฆษณา ชวน เชื่อ ชาติ ต่าง ๆ ภาย ใต้ การ ปกครอง ของ อิมเป เรียม จึง เข้า ข้าง พวก กบฏ. การทรยศที่ไม่เคยมีมาก่อนนี้ ได้ทิ้ง[Root.GetName]ยืนอยู่คนเดียวในการป้องกัน ระเบียบและความมั่นคงในกาแล็กซี่ เราต้องไม่ล้มเหลว[Root.GetRulerTitle]."
 emperor.106.5.desc:2 "การก่อกบฏนี้คุกคามที่จะยกเลิกระเบียบใหม่ที่เราได้ต่อสู้อย่างหนักเพื่อจัดตั้ง ต้อง มี การ จัด การ อย่าง รวด เร็ว และ เด็ด ขาด เพื่อ ว่า สันติภาพ จะ กลับ คืน สู่ กาแล็กซี ได้.\n\n§Hเพื่อชัยชนะที่ยิ่งใหญ่กว่า กาแล็คติก อิมเปอเรียม§!"
 emperor.106.a:0 "พวก กบฏ เหล่า นี้ ต้อง จ่าย สําหรับ ความ หยิ่ง ยโส ของ ตน."
 emperor.107.name:1 "สงคราม กลาง เมือง ใน เมือง อิมเป อุม"
 emperor.107.a.desc:1 "กาแล็กติกอิมเปอเรียมถูกปกคลุมในสงครามกลางเมือง! สมาชิก หลาย คน ได้ กบฏ ต่อ อํานาจ ของ[gal_emperor.GetRulerTitle]การชุมนุมภายใต้ธงของ§H[rebel_leader.GetAllianceName]§!ผู้ภักดี นําโดย§H[gal_emperor.GetName]§!และมุ่งมั่นที่จะรักษาการยึดของอิมเปอเรียมเหนือกาแล็กซี่"
 emperor.107.b.desc:1 "กาแล็กติกอิมเปอเรียมถูกปกคลุมในสงครามกลางเมือง! เดอะ§H[rebel_leader.GetName]§!ต่อต้านอํานาจของ[gal_emperor.GetRulerTitle]ผู้ภักดี นําโดย§H[gal_emperor.GetName]§!และมุ่งมั่นที่จะรักษาการยึดของอิมเปอเรียมเหนือกาแล็กซี่"
 emperor.107.a:0 "กาแล็คซี่ในสงคราม"
 emperor.108.a.desc:0 "$emperor.108.1.desc$\n\n$emperor.108.3.desc$"
 emperor.108.b.desc:0 "$emperor.108.1.desc$\n\n$emperor.108.2.desc$"
 emperor.108.c.desc:0 "$emperor.108.1.desc$\n\n$emperor.108.4.desc$"
 emperor.108.1.desc:1 "กาแล็กติกอิมเปอเรียมถูกปกคลุมในสงครามกลางเมือง! สมาชิก ของ ชาติ นี้ ได้ แตก เป็น กบฏ ซึ่ง พยายาม จะ โค่น ล้ม[gal_emperor.GetRulerTitle]ผู้ภักดีที่ต่อสู้เพื่อรักษาอิมเปอเรียม"
 emperor.108.2.desc:0 "ในฐานะนายใหญ่ของเรา§H[From.GetName]§!เข้าข้างเรเบล เราไม่มีทางเลือก นอกจากเข้าร่วมด้วย"
 emperor.108.3.desc:0 "ในฐานะนายใหญ่ของเรา§H[From.GetName]§!เราไม่มีทางเลือกนอกจากเข้าร่วมกับพวกเขา"
 emperor.108.4.desc:0 "ในขณะที่เราเป็นหัวข้อตรงของ[gal_emperor.GetRulerTitle]เราไม่มีทางเลือก เราเข้าข้างผู้ภักดี"
 emperor.108.a:0 "ดังนั้นมันเป็น!"

 emperor.150.name:0 "การกบฏบด!"
 emperor.150.desc:1 "มันจบแล้ว! การก่อกบฏได้ถูกทําลายอย่างย่อยยับ และประชาชนที่ซื่อสัตย์ ทั่วทั้งอิมเปอเรียม กําลังฉลองชัยชนะของเรา\n\nตอนนี้พวกทรยศถูกเล่นงานแล้ว เราต้องตัดสินใจว่าจะจัดการยังไง เราควรแสดงความเคารพหรือ พวกเขาจะถูกลงโทษ สําหรับอาชญากรรมของพวกเขา?"
 emperor.150.a:1 "ให้พวกเราต้อนรับพวกเขากลับสู่อิมเปอเรียม"
 emperor.150.b:0 "พวกเขาต้องถูกลงโทษ เพราะความอวดดีของพวกเขา"
 emperor.151.a.desc:0 "$emperor.151.1.desc$\n\n$emperor.151.2.desc$"
 emperor.151.b.desc:0 "$emperor.151.1.desc$\n\n$emperor.151.3.desc$"
 emperor.151.1.desc:1 "สงครามกลางเมืองจบแล้ว! คําสั่งได้รับการคืนสู่กาแล็กซี่ กับกองกําลังรวมของกาแล็กซี่ อิมเปอเรียม ส่งความยุติธรรมอย่างรวดเร็ว"
 emperor.151.2.desc:1 "ในฐานะที่จักรพรรดิผู้ภักดี ฉลองชัยชนะนี้[gal_emperor.GetRulerTitle]ได้ตัดสินใจรับเอานโยบาย เรื่องความยืดหยุ่นและการปรองดอง บาง ที ความ กรุณา เช่น นี้ อาจ ทํา ให้ อดีต ผู้ ขืน อํานาจ กลาย เป็น สมาชิก ที่ ภักดี และ บังเกิด ผล ของ อิมเป เรียม ใน ที่ สุด."
 emperor.151.3.desc:1 "เราได้เรียนรู้ว่า[gal_emperor.GetRulerTitle]มี ความ ตั้งใจ แน่ว แน่ ที่ จะ วาง ตัว อย่าง ของ พวก กบฏ. ขบวน แห่ ฉลอง ชัย ชนะ ใน ระดับ ที่ ไม่ เคย มี มา ก่อน จะ จัด ขึ้น[gal_emperor.Capital.GetName]และในตอนจบ การประหารหมู่ ของผู้นํากบฏที่รอดชีวิต จะออกอากาศทั่วอิมเปอเรียม"
 emperor.151.a:1 "เป็นเกียรติแด่อิมเปอเรียม"
 emperor.152.name:1 "อิม เพ อร์ เรียม พรี ไวล์"
 emperor.152.a.desc:0 "$emperor.152.1.desc$\n\n$emperor.152.2.desc$"
 emperor.152.b.desc:0 "$emperor.152.1.desc$\n\n$emperor.152.3.desc$"
 emperor.152.1.desc:1 "มันเป็นวันที่มืดสําหรับกาแลคซี ทั้ง ๆ ที่ เรา พยายาม อย่าง ดี ที่ สุด การ กบฏ นี้ ปรากฏ ว่า ไม่ สามารถ ต้านทาน การ โจมตี ของ เหล่า ผู้ ภักดี ของ จักรพรรดิ ได้. กองกําลังของอิมเปอเรียมชนะในทุกด้าน และเราไม่มีทางเลือก นอกจากยอมแพ้"
 emperor.152.2.desc:1 "สถานะของเราเป็นสมาชิกของกาแล็กติก อิมเปอเรียมได้รับการฟื้นฟู แต่[gal_emperor.GetRulerTitle]ดู เหมือน ว่า ได้ รับ เอา นโยบาย ว่า ด้วย ความ ยืดหยุ่น และ การ คืน ดี กัน. เราจะไม่ถูกลงโทษอีกต่อไป"
 emperor.152.3.desc:1 "สถานะของเราเป็นสมาชิกของกาแล็กติก อิมเปอเรียมได้รับการฟื้นฟู แต่[gal_emperor.GetRulerTitle]ดู เหมือน ว่า ได้ ตัดสิน ใจ ทํา ตัว อย่าง ของ ทุก คน ที่ เข้า ข้าง ฝ่าย กบฏ. ผู้นําของเรเบลทั้งหมดจะถูกประหารชีวิตในตอนจบของขบวนพาเหรดชัยชนะอิมพีเรียลใน[gal_emperor.Capital.GetName]- งานที่จะออกอากาศทั่วอิมเปอเรียม"
 emperor.152.a:0 "ช่างปราณีจริงๆ"
 emperor.152.b:0 "\"ความยุติธรรม\" ที่ดีที่สุด"
 emperor.153.name:0 "ผู้ ภักดี ต่อ จักรพรรดิ"
 emperor.153.desc:1 "ดู เหมือน ว่า กัลแลค อิ มเป เรียม ได้ จัด การ กับ พายุ แห่ง การ ก่อ การ ร้าย ที่ กําลัง เผชิญ อยู่. พวกกบฏถูกโค่นล้มโดยกองกําลังจักรพรรดิ และ[gal_emperor.GetRulerTitle]ได้ประกาศชัยชนะในสงครามกลางเมือง"
 emperor.153.a:0 "งั้นก็จบ"
 emperor.200.name:1 "การ ล่ม สลาย ของ กาแลกติก อิม เพ เรียม"
 emperor.200.desc:1 "เสรีภาพได้กลับสู่กาแล็กซี่แล้ว กาแล็กติก อิมเปอเรียมได้ล่มสลายลงแล้ว และผู้ภักดีกลุ่มสุดท้ายของจักรพรรดิ ได้ยอมจํานนต่อกองกําลังกบฏที่รุกคืบเข้ามา\n\nกับ[gal_emperor.GetRulerTitle]คนเก่า§Hชุมชน กาแลกติก§!ได้ถูกชุบชีวิต เวลาจะบอกได้ว่าสถาบันการเกิดใหม่ สามารถป้องกันการเพิ่มขึ้นของเผด็จการกาแล็กซี่อื่น แต่สําหรับตอนนี้การเฉลิมฉลองตามธรรมชาติได้แตกออกบนดาวเคราะห์ ข้ามอาณาเขตของอดีตอิมเปอเรียม"
 emperor.200.a:0 "นี่เป็นวันที่ต้องจดจํา"
 emperor.201.desc:1 "กาแล็กติก อิมเปอเรียมได้ลดลง กองกําลังจักรพรรดิไม่สามารถหยุดยั้ง ล่วงหน้าของกองยานเรเบล และวันนี้[gal_emperor.GetRulerTitle]ไม่มีทางเลือกนอกจากทําให้สมบูรณ์\n\nการรื้อถอนอิมเปอเรียม สถาบันทุจริตเก่าของ§Hชุมชน กาแลกติก§!ได้รับการชุบชีวิตให้แทนที่ และดังนั้นกาแล็กซี่จึงได้หันไปจากระเบียบ และยอมรับความยุ่งเหยิง"
 emperor.201.a:0 "นี่เป็นวันที่มืดมน"
 emperor.202.desc:1 "เสียหายจากคนทรยศทุกด้าน กาแล็กติกอิมเปอเรียมล้มแล้ว พวกกบฏเศษสวะ ได้ทําลายกองเรือของอิมเปอเรียม ที่ครั้งหนึ่งมีอํานาจมาก และกลุ่มผู้ภักดีคนสุดท้าย ได้ละทิ้งเป้าหมายของเรา\n\nในการล่มสลาย ของการต่อต้านของจักรพรรดิทั้งหมด[gal_emperor.GetRulerTitle]ไม่มีทางเลือกนอกจากสละสิทธิ์ ผู้ ก่อ การ ร้าย ได้ ประกาศ เรื่อง การ กลับ เป็น ขึ้น จาก ตาย ใน สมัย โบราณ แล้ว§Hชุมชน กาแลกติก§!เพื่อเติมเต็มช่องว่างอันยิ่งใหญ่ที่เหลือจากการสลายตัวอิมเปอเรียม"
 emperor.202.a:0 "ทั้งหมดสูญเสีย..."
 emperor.203.desc:1 "กาแล็กติก อิมเปอเรียมได้ลดลง ด้วยกําลังของเรเบลที่ชนะในแนวหน้า[gal_emperor.GetRulerTitle]ถูกตัดสิทธิ์\n\nชุมชนกาแล็กติกเก่า ได้ถูกฟื้นฟูแล้ว ในที่ของอิมเปอเรียมที่ล่มสลาย"

 joined_galactic_empire_rebellion:0 "§Hกบฏแกแล็กติก:§!\nเราจะเข้าร่วม§Yรีเบล§!สหพันธ์ที่ทําสงครามกับ§Y[gal_emperor.GetName]§!และพวกมันด้วย§Yผู้ภักดี§!สหพันธ์."
 joined_galactic_empire_loyalists:1 "§Hกบฏแกแล็กติก:§!\nเราจะเข้าร่วม§Yผู้ภักดี§!สหพันธ์ที่ทําสงครามกับ§Yรีเบล§!สหพันธ์ที่พยายามล้มล้าง กาแล็กติกอิมเปอเรียม"

 war_goal_wg_galactic_civil_war_loyalists:0 "บดขยี้ฝ่ายกบฏ"
 war_goal_wg_galactic_civil_war_loyalists_desc:1 "สงครามเพื่อนำสมาชิกกลุ่มกบฏให้กลับคืนสู่จักรวรรดิกาแลกติกอิมพีเรียม"
 war_goal_wg_galactic_civil_war_rebels:1 "ล้มล้างจักรวรรดิอิมพีเรียล"
 war_goal_wg_galactic_civil_war_rebels_desc:1 "สงครามเพื่อโค่นล้มจักรวรรดิกาแลกติกและฟื้นฟูประชาคมกาแล็กติก"
 wg_galactic_civil_war_loyalists_accept:1 "เดอะ§Yรีเบล§!ถูกบังคับให้กลับไป§Yกาแล็กติก อิมเปเรียม§!."
 wg_galactic_civil_war_loyalists_status_quo:1 "เดอะ§Yรีเบล§!จาก§Yกาแล็กติก อิมเปเรียม§!."
 wg_galactic_civil_war_rebels_accept:1 "เดอะ§Yกาแล็กติก อิมเปเรียม§!มันละลายไปแล้ว"
 casus_belli_cb_galactic_empire:1 "อิมเปเรียม"
 war_goal_wg_restore_the_community:0 "คืนสู่ประชาคมกาแล็กติก"
 war_goal_wg_restore_the_community_desc:1 "สงครามเพื่อสลายจักรวรรดิกาแลกติกอิมพีเรียมและฟื้นฟูประชาคมกาแล็กติกให้กลับมาอีกครั้ง สิ่งนี้จะทำให้เราต้องทำสงครามกับสมาชิกทั้งหมดของจักรวรรดิอิมพีเรียม"
 war_goal_wg_dissolve_the_empire_accept:0 "$wg_galactic_civil_war_rebels_accept$"
 war_goal_wg_seize_imperial_throne:0 "ยึดบัลลังก์"
 war_goal_wg_seize_imperial_throne_desc:1 "สงครามเพื่อยึดบัลลังก์ของจักรวรรดิกาแลกติกอิมพีเรียม สิ่งนี้จะทำให้เราต้องทำสงครามกับสมาชิกทั้งหมดของจักรวรรดิอิมพีเรียม"
 wg_seize_imperial_throne_accept:1 "§Y[Root.GetName]§!กลายเป็นผู้ปกครองคนใหม่ของ§Yกาแล็กติก อิมเปเรียม§!"

 ACTION_ADD_IMPERIAL_COUNCIL_MEMBER_OFFER_DESC:0 ""
 ACTION_REMOVE_IMPERIAL_COUNCIL_MEMBER_OFFER_DESC:0 ""

 01_ADD_COUNCIL_PROPOSE:0 "เราต้องการความช่วยเหลือจากท่านในสภาอิมพีเรียล รับใช้เราอย่างดี ความภักดีของท่านจะได้ตอบแทน"
 02_ADD_COUNCIL_PROPOSE:0 "เดอะ[From.GetRulerTitle]ได้เลือกคุณที่จะเติมที่นั่งว่างในสภาจักรพรรดิ เป็นเกียรติอย่างยิ่ง มั่นใจได้"
 03_ADD_COUNCIL_PROPOSE:1 "ในการจดจําบริการของคุณที่ อิมเปอเรียม,[From.GetRulerTitle]ได้ตัดสินใจที่จะตอบแทน[Root.GetName]กับที่นั่งในสภาอิมพีเรียล"
 01_REMOVE_COUNCIL_PROPOSE:0 "การรับใช้ของท่านในสภาอิมพีเรียลไม่ต้องการแล้ว รวบรวมข้าวของของคุณและออกจากสถานที่"
 02_REMOVE_COUNCIL_PROPOSE:1 "คุณล้มเหลวในหน้าที่ของคุณที่ อิมเปอเรียมและ[From.GetRulerTitle]ที่นั่งของคุณในสภาอิมพีเรียล หมดอายุไปแล้ว"
 03_REMOVE_COUNCIL_PROPOSE:0 "เดอะ[From.GetRulerTitle]ได้มีพระราชกฤษฎีกาว่า คุณไม่สมควรจะได้ที่นั่งของคุณในสภาจักรพรรดิ มันจะถูกมอบให้กับคนที่มีความสามารถ"

 emperor.250.name:0 "ตัวแบ่งชั้น"
 emperor.250.desc:1 "ขณะที่กองกําลังอิมพีเรียลล้มเหลวในการทําลายกบฏ อย่างน้อยพวกเขาจัดการขัดขวางความพยายามของกบฏ[gal_emperor.GetRulerTitle]ด้วยสนธิสัญญาสันติภาพนี้ สมาชิกกบฏทั้งหมดของกาแล็กติกอิมเปอเรียม ได้รับเอกราช\n\nบางทีมันอาจจะเป็นสิ่งที่ดีที่สุด โรค ต่าง ๆ เช่น โรค นี้ ต้อง ถูก ขจัด ออก ไป ก่อน ที่ การ ทุจริต จะ มี โอกาส แพร่ ออก ไป. เราสามารถสร้างและคืนระบบที่ดื้อรั้นเหล่านี้ ไปยังอ้อมอกของอิมเปอเรียมในเวลาต่อมา"
 emperor.250.a:1 "อิมเปอเรียมจะต้องอดทน"
 emperor.251.desc:1 "ในขณะที่เราล้มเหลวในการพยายามล้มล้าง[gal_emperor.GetRulerTitle]อย่างน้อยเรามีเสรีภาพเพื่อคนของเรา ด้วยสนธิสัญญาสันติภาพนี้ สมาชิกกบฏทั้งหมดของกาแล็กติก อิมเปอเรียม ได้รับเอกราช\n\nเดอะ[gal_emperor.GetRulerTitle]ไม่มีข้อสงสัยใด ๆ จะใช้ความล่าช้านี้ในการบูรณะกองกําลังอิมเปอเรียม - เราต้องระมัดระวังความพยายามในอนาคตใด ๆ โดยจักรพรรดิที่จะขยายอิทธิพลของพวกเขาในค่าใช้จ่ายของเรา"
 emperor.251.a:0 "ในที่สุดอิสรภาพ"
 emperor.252.desc:1 "สงครามกลางเมืองยุติลงแล้ว ขณะที่อิมเปอเรียมไม่สามารถปราบกบฏได้ พวกกบฏก็ล้มเหลวในการโค่นล้ม[gal_emperor.GetRulerTitle].\n\nในสนธิสัญญาสันติภาพที่ลงนามโดยทั้งสองพรรคในวันนี้ สมาชิกกบฏของอิมเปอเรียม ได้รับเอกราชอย่างเต็มที่ เราจะได้เห็นกันว่าผลของสันติภาพ ระหว่างอํานาจทั้งสอง... หรือสงครามเย็น"

 emperor.300.name:0 "การล่มสลายของจักรวรรดิ"
 emperor.300.desc:1 "กาแล็กติก อิมเปอเรียมได้รับการจัดการ ระเบิดตายจากที่มันไม่สามารถกู้คืน เมื่อ การ ล่ม สลาย ใกล้ เข้า มา บัด นี้ เรา อยู่ ใน ฐานะ ที่ จะ ฟื้นฟู คน เก่า§Hชุมชน กาแลกติก§!.\n\nให้มันเป็นแพลตฟอร์มของการทูต และความเข้าใจซึ่งกันและกัน แทนการกดขี่ข่มเหง!"
 emperor.300.a:0 "ชุมชนจะเกิดใหม่"
 emperor.301.name:0 "การ กําเนิด ชุมชน ใหม่"
 emperor.301.desc:1 "จุดจบอยู่ที่นี่ ขณะ ที่ กอง กําลัง ของ จักรพรรดิ ที่ เหลือ อยู่ ยอม จํานน ต่อ กอง หรือ ละลาย ไป ใน ตอน กลาง คืน ก็ ปรากฏ ชัด ว่า อิม เพ อร์ เนียม กําลัง จะ สิ้น สุด ลง.\n\nแม้แต่ตอนนี้§H[dissolve_winner.GetName]§!ได้เริ่มต้นการทํางานของการสร้างเก่า§Hชุมชน กาแลกติก§!ธงอิมพีเรียลกําลังถูกรื้อถอน หรือติดไฟข้ามกาแล็กซี่ อนาคตใหม่ขึ้นอยู่กับเรา"
 emperor.301.a:0 "เราต้องหาที่ของเราในนั้น"
 emperor.302.desc:1 "กาแล็กติก อิมเปอเรียมได้ลดลง ด้วยกองกําลังอิมพีเรียลละลายไป หรือยอมแพ้ อภิสิทธิ์อธิปไตยของอิมเปอเรียมถูกสละ\n\nการสั่งซื้อจะค่อยๆ กลับสู่ระบบสงครามของอดีตอิมเปอเรียม§H[dissolve_winner.GetName]§!และโดยแน่นอน ได้มีข่าวคราว (ในอดีต) มายังพวกเขาแล้ว ซึ่งในนั้นมีข้อตักเตือน (แก่พวกเขา)§Hชุมชน กาแลกติก§!เราได้รับเชิญเป็นสมาชิก ไปด้วยกันไหม?"
 emperor.302.a:0 "แน่นอน! ถึงเวลาที่จะกลับมาอยู่ในกาแล็กซี่"
 emperor.302.b:1 "ไม่ มันอาจจะเปลี่ยนเป็นอิมเปอเรียมอีกอัน"

 emperor.310.name:0 "เดอะ[new_emperor.GetGalEmpireName]"
 emperor.310.desc:0 "ด้วยแรงต้านทานของจักรพรรดิ ของเรา§H[new_emperor.GetSpeciesName]§!พันธมิตรได้ยึดบัลลังก์และประกาศตนเป็นผู้ปกครอง§H[new_emperor.GetGalEmpireName]§!ชัยชนะเป็นของเรา!"
 emperor.310.a:0 "พวกเขาหวังว่าจะจําบทบาทของเราในเรื่องนี้ได้"
 emperor.311.desc:1 "พลังที่นําโดย§H[new_emperor.GetSpeciesNamePlural]§!ได้เข้ายึดครองส่วนใหญ่ของกาแล็กติก อิมเปอเรียม และกระเป๋าสุดท้ายของการต่อต้านอิมพีเรียลเมื่อเร็ว ๆ นี้ยอมจํานน จากการพัฒนานี้[new_emperor.GetSpeciesNamePlural]ได้ประกาศตัวเองผู้ปกครองของ§H[new_emperor.GetGalEmpireName]§!."
 emperor.311.a:0 "จักรวรรดิใหม่และเจ้านายคนใหม่"

 emperor.312.desc:0 "บัลลังก์เป็นของเรา! ที่เมืองหลวงของเราบน[Root.Capital.GetName]# คนใหม่[Root.GetRulerTitle]ได้ประกาศการเพิ่มขึ้นของ§H[new_emperor.GetGalEmpireName]§!ชะตากรรมของกาแล็กซี่ จะถูกตัดสินโดยเรา!\n\nเนื่องจากเหตุการณ์สําคัญเหล่านี้ รัฐบาลของเราได้รับการจัดตั้งใหม่และตอนนี้เราเป็น§H[Root.GetName]§!."
 emperor.312.a:0 "จงเจริญ[new_emperor.GetGalEmpireName]!"

 emperor.401.name:1 "การ ยุบ ตัว ของ กัลแลค อิม เพ เรียม"
 emperor.401.desc:1 "กับการทําลาย§H[LastKilledCountryName]§!กาแล็กติก อิมเปอเรียมได้ทรุดตัวลง!\n\nท่ามกลางความวุ่นวายนี้ ชุมชนกาแล็กติกเก่า ได้เกิดใหม่ เพื่อนําคอนตินเจนซีบางส่วนไปยังกาแล็กซี่"
 emperor.401.a:0 "ดังนั้นสิ้นสุดยุค"

 emperor.371.name:0 "การ โจมตี จาก รัฐ สมาชิก ของ จักรพรรดิ!"
 emperor.371.desc:0 "เดอะ§H[attacking_country.GetName]§!ได้โจมตี§H[victim_country.GetName]§!ไม่! การโจมตีของสมาชิกอิมพีเรียลโดยอํานาจภายนอกนี้ ต้องตอบสนองทันทีจาก[Root.GetRulerTitle].\n\nควรจะ[Root.GetName]เข้าแทรกแซงในสงครามนี้? ส่วนที่เหลือของอิมเปอเรียมกําลังจับตาดูอย่างใกล้ชิด"
 emperor.371.a:0 "การต่อสู้ของพวกเขาเป็นการต่อสู้ของเรา สงคราม!"
 emperor.371.b:0 "สงครามนี้ไม่เกี่ยวกับเรา"
 emperor.372.name:0 "[From.GetRulerTitle]สนับสนุนการเสนอ"
 emperor.372.desc:0 "การจู่โจมอย่างขี้ขลาดต่อชาติโดย§H[attacking_country.GetName]§!ได้กระตุ้น[From.GetRulerTitle]เพื่อดําเนินการอย่างรวดเร็ว! กองเรืออิมพีเรียลจาก§H[From.GetName]§!ตอนนี้กําลังเคลื่อนพลเพื่อสนับสนุนเราในสงครามนี้"
 emperor.372.a:0 "ใช่... สําหรับอิมเปอเรียม"
 emperor.373.name:0 "[From.GetRulerTitle]อินเตอร์เวนส์!"
 emperor.373.desc:0 "การโจมตีล่าสุดของเรา§H[victim_country.GetName]§!สมาชิกของกาแล็กติก อิมเปอเรียม ได้กระตุ้นการตอบสนองทันทีจาก[From.GetRulerTitle]สภาวะสงคราม ระหว่างเรากับ§H[From.GetName]§!."
 emperor.373.a:0 "สงครามนี้ไม่เกี่ยวกับพวกเขา"
 emperor.374.name:0 "[From.GetRulerTitle]การ ประกาศ ความ เป็น กลาง"
 emperor.374.desc:0 "แม้จะมีการจู่โจมอย่างขี้ขลาด ต่อชาติของเราโดย§H[attacking_country.GetName]§!.[From.GetRulerTitle]ได้ตัดสินใจที่จะไม่แทรกแซงในนามของเรา! เรา ถูก ทิ้ง ให้ ป้องกัน ตัว เอง ขณะ ที่ กอง เรือ ของ จักรพรรดิ เฝ้า สังเกต ความ ขัด แย้ง จาก ที่ ห่าง ไกล."
 emperor.374.a:0 "มากเกินไปสําหรับความสามัคคีของจักรพรรดิ!"
 opinion_emperor_support_us:0 "ปกป้องพวกเราจากภัยคุกคามภายนอก"
 opinion_emperor_abandoned_us:0 "ทอดทิ้งพวกเราเพื่อภัยคุกคามภายนอก"
 opinion_emperor_supported_member:0 "สมาชิก จักรพรรดิ ที่ ได้ รับ การ สนับสนุน"
 opinion_emperor_abandoned_member:0 "สมาชิก จักรพรรดิ ที่ ถูก ละ ทิ้ง"
 emperor.371.a.tooltip:0 "เราเข้าร่วม§Y[From.From.GetName]§!ในด้านของ§Y[victim_country.GetName]§!"
 emperor.372.a.tooltip:0 "เดอะ§Y[From.GetName]§!เข้าร่วม§Y[From.From.From.GetName]§!อยู่ข้างเรา"
 emperor.373.a.tooltip:0 "เดอะ§Y[From.GetName]§!เข้าร่วม§Y[From.From.From.GetName]§!อยู่ข้างศัตรูของเรา"

 action.37.desc.restore_community.1:1 "นั่น! บทความสลดใจของนายได้รับการลงนาม และกองกําลังของจักรพรรดิทั้งหมด ได้รับคําสั่งให้วางอาวุธ ตอนนี้ปล่อยให้ข้าอยู่อย่างสงบ ขณะที่ข้าไว้อาลัยให้กับอิมเปอเรียม และสิ่งที่อาจเกิดขึ้น..."
 action.37.desc.restore_community.2:1 "จําคําข้าไว้ การทําลายกาแล็กติกอิมเปอเรียม ทําลายชีวิตเราทุกคน เราจะยืนเป็นเอกฉันท์ ภายใต้ธงผืนเดียว ต่อต้านความน่ากลัว ที่คุกคามกาแล็กซี่ของเราได้อย่างไร"
 action.37.desc.restore_community.3:1 "ถ้า พลเมือง ของ อิม เพ เรียม สู้ รบ หนัก กว่า นั้น ก็ คง ไม่ เป็น เช่น นั้น! คนทรยศทั้งหมด!"

 action.48.desc.generic.1:0 "ทุกอย่างหายไป เรา... เราเสนอการยอมแพ้ที่ไร้เงื่อนไข"
 action.48.desc.generic.2:0 "กรุณาปิดกองเรือของคุณ! เรายอมแพ้แล้ว!"
 action.48.desc.generic.3:0 "ทั้งหมดที่เราได้ประสบความสําเร็จ ... ทุกสิ่งที่เราได้สร้างขึ้น ... หายไป"
 action.48.desc.spiritualist.1:0 "ขอให้วิญญาณยกโทษให้คุณ สําหรับบาปของคุณ"
 action.48.desc.spiritualist.2:0 "เราพลาดที่ไหน? ความ เชื่อ ของ เรา ขาด ไป ไหม? คํา อธิษฐาน นั้น ยัง ไม่ พอ ไหม? ฉันไม่เข้าใจ"
 action.48.desc.spiritualist.3:0 "โดยการตีเราลง เราจะกลายเป็นอํานาจมากขึ้น กว่าที่คุณอาจจะจินตนาการ"
 action.48.desc.militarist.1:0 "เราสั่งให้กองกําลังที่เหลือทั้งหมด วางอาวุธ สงครามจบแล้ว ทุกอย่างจบแล้ว"
 action.48.desc.militarist.2:0 "คุณ... คุณมีเงื่อนไขที่จะยอมแพ้ เรากําลังยืนลง"
 action.48.desc.militarist.3:0 "บอกนักรบของเราไม่มีความละอายในความพ่ายแพ้ของเรา ฉันไม่สามารถเผชิญหน้ากับพวกเขา"
 action.48.desc.pacifist.1:0 "ได้โปรด เราจะไม่ต่อต้านเราอีก เราต้องการเพียงความสงบสุข"
 action.48.desc.pacifist.2:0 "ขอให้จักรวาลยกโทษให้คุณ สําหรับอาชญากรรมของคุณ"
 action.48.desc.pacifist.3:0 "มันเป็นความโง่เขลาของเราที่จะต่อต้าน มีคนตายมากมาย... สูญเปล่า"
 action.48.desc.materialist.1:0 "ต่อต้านอย่างต่อเนื่อง ณ จุดนี้ ไม่มีเหตุผล เรายอมแพ้แล้ว"
 action.48.desc.materialist.2:0 "เราจะให้ความร่วมมือกับกองกําลังที่ยึดครองของคุณ ขณะที่พวกเขาเห็น... การรื้อถอนรัฐบาลของเราในปัจจุบัน"
 action.48.desc.materialist.3:0 "เราเพียงแค่เริ่มต้นที่จะปลดล็อค ปริศนาของกาแลคซี ยังมีอีกหลายเรื่องที่ต้องเรียนรู้"
 action.48.desc.megacorp.1:0 "คุณจะได้รับการลาออกของคณะกรรมการทั้งหมดบนโต๊ะของคุณภายในหนึ่งชั่วโมง ..."
 action.48.desc.megacorp.2:0 "ตามรายละเอียดของการยอมแพ้ของเรา เราจะเริ่มกระบวนการชําระบัญชีของบริษัทของเรา"
 action.48.desc.megacorp.3:0 "นี่ไม่ใช่อนาคตที่ผมได้เห็น ในแผนธุรกิจของเรา"
 action.48.desc.hive.1:0 "เรา... เรากําลังจะตาย คุณฆ่า[from.GetGestaltEntityName]เราไม่อยาก..."
 action.48.desc.hive.2:0 "ความรู้ที่มีอยู่ภายในเรา ประสบการณ์ ... ความคิด ... สิ่งที่เราได้เห็น มันจะหายไปในไม่กี่วินาที และคุณมีความคิด คุณไม่รู้หรอก"
 action.48.desc.hive.3:0 "ถ้าไม่มี[from.GetGestaltEntityName]เราทํางานไม่ได้ ถ้าไม่มี[from.GetGestaltEntityName]... มันไม่มีอะไรเลย..."
 action.48.desc.machine.1:0 "ผลข้างเคียง! ผลข้างเคียง! ซูวบูบูปติมายะ... ."
 action.48.desc.machine.2:0 "ลบข้อมูลทั้งหมด โอเวอร์โหลดศูนย์พลังงานกลาง เริ่มทําลายตัวเอง\n\nโชคดีนะ[Root.GetSpeciesNamePlural]."
 action.48.desc.machine.3:0 "§Yกําลังพยายามเชื่อมต่อใหม่กับโดรน...§!\n§Rผิดหวัง§!§Yกําลังปรับปรุง...§!\n§Yพยายามจะเชื่อมต่ออีกครั้งกับหน่วยกองเรือ...§!\n§Rผิดหวัง§! §Yกําลังปรับปรุง...§!\n§Yพยายามสร้างการเชื่อมต่อใหม่ กับศูนย์ควบคุมดาวเคราะห์...§!\n§Rผิดหวัง§! §Yกําลังปรับปรุง...§!"
 action.48.desc.fe_spiritualist:0 "นี่... นี่ไม่ใช่จุดจบ ที่ถูกทํานายไว้"
 action.48.desc.fe_materialist:0 "ประตูถูกทุบ พวกป่าเถื่อนฝ่าเข้าไป นี่คือจุดจบ!"
 action.48.desc.fe_xenophobe:0 "คุณต้องการให้เราหลบไป[Root.GetSpeciesNamePlural]ร้องขอมั้ง\n\n§Hไม่มีทาง!§!\n\nมาที่นี่ถ้าคุณกล้าคุณเลว[Root.GetSpeciesNameInsult]ข้าจะแทงเจ้าบนเศษหินนี่"
 action.48.desc.fe_xenophile:0 "โอ้ เจ้าโง่ โง่[Root.GetSpeciesNamePlural]นี้อาจจะถูกหลีกเลี่ยง ถ้าคุณเพียง แต่ได้อนุญาตให้เราแนะนําคุณ! ตอนนี้ดูสิ่งที่คุณได้ทํา"
 action.48.desc.gal_emperor:1 "จงเจริญ[From.GetRulerTitle]อิมเปอเรียมจงเจริญ"
 action.48.a:0 "เรายอมรับการยอมแพ้ของคุณ"
 action.48.b:0 "พวกเขาถูกตัดสินและพบว่าต้องการ"
 action.48.c:0 "ศัตรูอีกคนถูกจัดการ"
 action.48.d:0 "พวกเขาไม่มีทางเลือก"
 action.48.e:0 "มันเป็นจักรวาลที่ไม่ให้อภัย"
 action.48.f:0 "การสอบสวนประสบความสําเร็จ"
 action.48.g:0 "เดอะ[root.GetGestaltEntityName]ขยายตัว"
 action.48.h:0 "ภัยคุกคามถูกทําลายแล้ว"
 action.48.i:0 "$action.48.a$"
 action.150.1.desc:1 "เรายอมแพ้ต่ออิมเปอเรียม คุณทิ้งทางเลือกเล็กๆไว้ให้เรา"
 action.150.2.desc:1 "มีแต่คนโง่เท่านั้น ที่จะยืนหยัดต่ออํานาจของกาแล็กติก อิมเปอเรียม เรายอมแพ้แล้ว"
 action.150.3.desc:1 "เรา... เราสาบานตนต่อ[Root.GetRulerTitle]และปฏิญาณตนว่าจะรับใช้กาแล็กติกอิมเปอเรียม ในฐานะพลเมืองจักรพรรดิที่ซื่อสัตย์"
 action.150.gestalt.1.desc:0 "เราจะยอมจํานนต่ออํานาจที่ชอบธรรม[Root.GetRulerTitle]."
 action.151.1.desc:1 "เดอะ[gal_emperor.GetRulerTitle]ยินดีต้อนรับสู่กาแล็กติกอิมเปอเรียม[Root.GetSpeciesNamePlural]ตอนนี้เจ้าเป็นส่วนหนึ่งของสิ่งที่ยิ่งใหญ่กว่า[Root.GetName]."
 action.151.2.desc:1 "กาแล็กติก อิมเปอเรียม ได้แสดงให้เห็นถึงพลังของมัน ยอมรับความไร้ประโยชน์ของการต่อต้านอย่างต่อเนื่อง และยอมรับอนาคตเป็นพลเมืองจักรพรรดิ"
 action.151.3.desc:0 "ดี ทุกอย่างกําลังดําเนินไป[gal_emperor.GetRulerTitle]มองเห็นล่วงหน้า"
 action.152.1.desc:0 "ไทรันนี่ชนะในวันนี้ และกาแล็กซี่เป็นที่มืดสําหรับมัน เรายอมแพ้แล้ว"
 action.152.2.desc:1 "ท่านอิมพีเรียลอาจจะชนะสงครามนี้ แต่อิมเปอเรียมไม่สามารถอยู่ได้ตลอดไป เสรีภาพจะกลับสู่กาแล็กซี่"
 action.152.3.desc:1 "ได้โปรด... อิมเปอเรียมชนะแล้ว การก่อกบฏจบลงแล้ว เราขอแต่ความเมตตา"
 action.152.gestalt.1.desc:1 "เราล้มเหลว อิมเปอเรียมแข็งแกร่งกว่าที่คาดการณ์ไว้"
 action.153.1.desc:0 "สวะเรเบล การ ทรยศ เช่น นี้ จะ ไม่ ถูก ลืม ใน ไม่ ช้า."
 action.153.2.desc:0 "เจ้ามันโง่ที่ต่อต้าน[From.GetRulerTitle]ตอนนี้เจ้าต้องชดใช้แล้ว"
 action.153.3.desc:1 "คําตัดสินจะไม่มีวันยอมรับในอิมเปอเรียม คุณควรจะจําไว้นะ\n\nจงเจริญ[From.GetRulerTitle]!"
 action.153.gestalt.1.desc:0 "การต่อต้านในอนาคต[From.GetRulerTitle]มันไร้ประโยชน์ จง รับ บทบาท ของ คุณ อย่าง เต็ม ที่."
 action.154.1.desc:1 "กาแล็กติก อิมเปอเรียม เป็นจุดเริ่มต้นของยุคทองสําหรับดาราจักร แต่พวกทรยศยังเลือกที่จะ โยนมันทิ้งทั้งหมด ตามใจเจ้าเถอะ เจ้าโง่"
 action.154.2.desc:1 "พอได้แล้ว! กาแล็คซี่นี้ไม่สมควร กับอนาคตที่สดใสที่เราสร้างขึ้น งั้นก็ให้อิมเปอเรียมถูกเผาสิ ปล่อยให้กาแล็คซี่กลายเป็นความวุ่นวายและความวุ่นวายอีกครั้ง!"
 action.154.3.desc:0 "เราต้องการเพียงแค่นําระเบียบและความมั่นคงมาสู่กาแล็กซี่ แต่บางทีความยุ่งเหยิงอาจหลีกเลี่ยงไม่ได้ในที่สุด ชัยชนะเป็นของเจ้า กบฏ! เราจะสละราชบัลลังก์"
 action.154.gestalt.1.desc:0 "เดอะ[From.GetRulerTitle]จะยอมแพ้ เราล้มเหลวในการทํานาย ความลึกซึ้งที่แท้จริง ของการทรยศของคุณ และตอนนี้กาแล็กซี่จะต้อง ชดใช้"
 action.155.1.desc:0 "การกดขี่ของเจ้าเหนือกาแล็กซี่ สิ้นสุดลงแล้ว[Root.GetSpeciesNamePlural]!"
 action.155.2.desc:1 "ลงกับอิมเปอเรียม! ถึงเวลาเรียกชุมชนกาแล็กติกมาแล้ว"
 action.155.3.desc:0 "ปล่อยให้ความล้มเหลวของคุณเป็นบทเรียน สําหรับอนาคตใด ๆ ที่จะเป็นทรราช ที่พยายามที่จะปกครองกาแลคซีทั้งหมด"
 action.155.gestalt.1.desc:1 "การสร้างสังคมอันน่าละอายของคุณ แอมเปอเรียมแห่งกาแล็กติกไม่มีแล้ว"
 action.156.1.desc:1 "เจ้าได้พิสูจน์ความแข็งแกร่งของเจ้าแล้ว และอิมเปอเรียมเป็นของเจ้า แต่เรายังคงมีประโยชน์กับเจ้าอยู่ บางที... อาจจะเป็นตําแหน่งในสภาอิมพีเรียล"
 action.156.2.desc:1 "ท่านได้ครองบัลลังก์แล้ว แต่กาแล็กซี่เต็มไปด้วยพวกทรยศและพวกเสแสร้ง ถ้าคุณจะปกครองกาแล็กติกอิมเปอเรียม มันจะให้บริการคุณที่ดีที่จะจําไว้"
 action.156.3.desc:1 "เรา... เรายอมแพ้ คุณไม่มีทางเลือกอื่น บัลลังก์แห่งกาแล็กติก อิมเปอเรียมเป็นของท่าน"
 action.156.gestalt.1.desc:0 "ที่...[From.GetRulerTitle]ฉันไม่เข้าใจ นี่ ไม่ ได้ หมาย ความ ว่า เหตุ การณ์ ต่าง ๆ จะ เปลี่ยน ไป."
 action.157.1.desc:0 "เราจะจัดการต่อเอง"
 action.157.2.desc:1 "กาแล็กติก อิมเปอเรียมเป็นของเรา กลับไปยังหลุมมืด จากที่ที่เจ้ามา สารเลว!"
 action.157.3.desc:0 "คํานับต่อหน้าอธิปไตยใหม่ของคุณ! การครองราชย์ของเจ้าสิ้นสุดลงแล้ว"
 action.157.gestalt.1.desc:1 "กฎของอิมเปอเรียมของคุณ ไม่อนุญาตให้ทําต่อ แท้จริง หน้าที่ของเราคือการรวบรวมอัลกุรอาน (ให้อยู่ในทรวงอกของเจ้า)"
 action.158.1.desc:1 "นั่น! บทความสลดใจของนายได้รับการลงนาม และกองกําลังของจักรพรรดิทั้งหมด ได้รับคําสั่งให้วางอาวุธ ตอนนี้ปล่อยให้ข้าอยู่อย่างสงบ ขณะที่ข้าไว้อาลัยให้กับอิมเปอเรียม และสิ่งที่อาจเกิดขึ้น..."
 action.158.2.desc:1 "จําคําข้าไว้ การทําลายกาแล็กติกอิมเปอเรียม ทําลายชีวิตเราทุกคน เราจะยืนเป็นเอกฉันท์ ภายใต้ธงผืนเดียว ต่อต้านความน่ากลัว ที่คุกคามกาแล็กซี่ของเราได้อย่างไร"
 action.158.3.desc:1 "ถ้า พลเมือง ของ อิม เพ เรียม สู้ รบ หนัก กว่า นั้น ก็ คง ไม่ เป็น เช่น นั้น! คนทรยศทั้งหมด!"
 action.158.gestalt.1.desc:0 "เรามีคําสั่งในกาแล็กซี่ที่วุ่นวาย และคุณในความโง่เขลาของคุณ คาดการณ์ตีออกมาด้วยความกลัว คุณทําอะไรลงไป?"

 imperial_charter:0 "สร้างแผนภูมิ K"
 imperial_charter_desc:1 "เครื่องราชอิสริยาภรณ์ราชอิสริยาภรณ์ของเราให้สิทธิเรา เปิดสํานักงานสาขาบนดาวเคราะห์ทั่วกาแล็กติกอิมพีเรียม ที่ที่เราสามารถกําหนดท่าเรือพระจักรพรรดิ อาคาร สํานักงาน สาขา เหล่า นี้ ให้ ราย ได้ ทั้ง แก่ เรา และ ผู้ ปกครอง ของ สถาบัน กาแลกติก อิม เพ เรียม."
 resolution_emperor_imperial_charter:0 "สร้างแผนภูมิ K"
 resolution_emperor_imperial_charter_desc:1 "มี การ กําหนด กฎบัตร สําหรับ จักรพรรดิ โดย ให้ สิทธิ พิเศษ และ สิทธิ การ ค้า แก่ พวก เขา ตลอด ทั่ว อิม เพ เรียม."
 resolution_emperor_imperial_charter_tooltip:1 "การ จัด การ นี้ จะ ไม่ จําเป็น ต้อง มี แพ็ก เกต สินค้า อีก ต่อ ไป เพื่อ ก่อ ตั้ง สํานักงาน สาขา บน ดาว เคราะห์ ต่าง ๆ ใน อิม เพ เรียม.\n\nพวกเขาสามารถสร้าง§Yท่า เรือ แห่ง จักรพรรดิ§!สํานักงาน สาขา ซึ่ง ให้ ราย ได้ ทั้ง แก่ ทั้ง พวก เขา และ ผู้ ปกครอง ของ อิม เพ เรียม."
 building_imperial_concession_port:0 "ท่า เรือ แห่ง จักรพรรดิ"
 building_imperial_concession_port_desc:1 "ท่า เรือ ที่ ได้ รับ การ อนุมัติ นี้ มี สิทธิ เหนือ กว่า การ ปกครอง และ ถือ กัน ว่า เป็น เขต ปกครอง ของ กาแล็กติก อิม เพ เรียม ตาม กฎหมาย. มี การ ยก เว้น ภาษี และ กฎ ข้อ บังคับ ของ ท้อง ถิ่น."
 resolution_emperor_revoke_imperial_charter:0 "สร้างแผนภูมิ K"
 resolution_emperor_revoke_imperial_charter_desc:1 "การ จัด เตรียม นี้ ไม่ เป็น ประโยชน์ ต่อ กาแลกติก อิม เพ เรียม อีก ต่อ ไป."
 resolution_emperor_imperial_legions_tooltip:0 "สามารถสร้างชนชั้นนํา§Yองค์ จักรพรรดิ§!กองทัพ"

 imperial_security_directorate:0 "กรรมการความมั่นคงของจักรพรรดิ"

 emperor.60.name:0 "กฎบัตร ของ จักรพรรดิ เป็น จริง"
 emperor.60.desc:1 "หลังจากได้รับความกรุณาจาก[gal_emperor.GetRulerTitle], §H[charter_corp.GetName]§!ตอนนี้ได้รับพระราชทาน§Hสร้างแผนภูมิ K§!โดยวุฒิสภา ทั้ง นี้ ทํา ให้ พวก เขา ได้ รับ มอบ หมาย พิเศษ ให้ เปิด สํานักงาน สาขา บน ดาว เคราะห์ ทั่ว โลก ไม่ ว่า จะ มี สัญญา ทาง การ ค้า กับ เจ้าของ หรือ ไม่.\n\nเราสามารถคาดหวังว่าการชุมนุมใหญ่ เพื่อจัดตั้งท่าเรืออิมพีเรียล ในสํานักงานสาขาของพวกเขา ดูเหมือนว่า[gal_emperor.GetRulerTitle]ได้ เครื่อง ยนต์ ใหม่ อัน ทรง พลัง ใน การ เติบโต ทาง เศรษฐกิจ."
 emperor.60.a:0 "ดีสําหรับพวกเขา"
 country_concessions:0 "$imp_concession_ports_1$"
 imp_concession_ports_1:0 "ท่า เรือ แห่ง จักรพรรดิ"
 imp_concession_ports_1_desc:1 "แยกจากท่าเรืออิมพีเรียลในกาแล็กติกอิมเปอเรียม สํานักงาน สาขา เหล่า นี้ มาก ขึ้น ที่ ได้ รับ การ ก่อ ตั้ง โดย ผู้ ประสาน งาน ด้าน การ เงิน ของ เรา ซึ่ง เป็น ผล กําไร ของ เรา มาก ขึ้น."
