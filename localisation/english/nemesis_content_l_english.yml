 # Acquire Asset
 operation.1000.name:0 "การ ปลุก เร้า"
 operation.1000.desc.hostile:0 "เจ้าหน้าที่ของเรา ได้เพิ่มการเฝ้าระวัง ในเป้าหมายที่เป็นไปได้"
 operation.1000.desc.friendly:0 "สปอตเตอร์ของเรา ได้เริ่มกระตุ้นตัวเองด้วยเป้าหมาย"
 operation.1001.name:0 "การ ทํา ให้ ทุ่ง นา แคบ ลง"
 operation.1001.desc:1 "มีรายชื่อเป้าหมายที่ถูกวาดขึ้นมา หน่วยงานที่ไม่ได้รับมอบหมายให้เฝ้าระวัง จะช่วยคุ้มกันให้คนอื่นๆ"
 operation.1002.name:0 "ข้อมูลกํากับ"
 operation.1002.desc:3 "การดําเนินงานใกล้สิ้นสุดแล้ว$role_spymaster$ [spynetwork.leader.GetName]ได้ย้ายไปรักษาความปลอดภัยชุดใหม่ของเราภายใน[target.GetName]ลูกเรือที่เหลือของเราพร้อม[spynetwork.leader.GetHeShe]อาจจําเป็น"
 operation.1006.name:0 "เราได้สายมาแล้ว"
 operation.1006.desc.intro:1 "$role_spymaster$ [from.spynetwork.leader.GetName]รายงานจาก[from.target.GetName]การประหารชีวิตที่ประสบความสําเร็จจนถึงตอนนี้"
 operation.1006.desc.celebrity:1 "$operation.1006.desc.intro$เครือข่ายสเปกของเราตอนนี้มีการเข้าถึง§Hบุคคลที่มีอิทธิพลภายใน[from.target.GetAdj]วัฒนธรรม§!ความปรารถนาที่จะรักษาประวัติสาธารณะของพวกเขา คู่ที่สวยงามด้วยความทะเยอทะยานที่เราอาจจะต้องการที่จะใช้ เพื่อควบคุมจิตใจและจิตใจ"
 operation.1006.desc.official:1 "$operation.1006.desc.intro$เราได้เข้าถึง§Hอย่างเป็นทางการภายใน[from.target.GetAdj]ลําดับชั้นประชากร§!เครื่องราชอิสริยาภรณ์นี้ จะถูกเก็บรักษาไว้อย่างปลอดภัย แต่พร้อม ที่จะช่วยเราในการดําเนินงานในอนาคต - โดยเฉพาะอย่างยิ่งเมื่อเราอาจจะปัดเป่าปัญหาทางการทูตหรือรัฐบาล"
 operation.1006.desc.professional:1 "$operation.1006.desc.intro$เครือข่ายสเปกตอนนี้ได้รับการส่งเสริมโดยการเข้าถึง§Hผู้ทรงพลังอันแข็งแรง[from.target.GetAdj]อาชีพ§!พร้อมที่จะช่วยเหลือเราในการดําเนินงาน ซึ่งอาจได้ประโยชน์จากเครือข่ายของแอสเซตเอง หรือน้ําหนักของชื่อเสียงของพวกเขา"
 operation.1006.desc.rebel:1 "$operation.1006.desc.intro$เราได้ชัยชนะของความภักดี§Hคือ[from.target.GetAdj]กบฏ§!ความ ปรารถนา ที่ จะ เปลี่ยน แปลง ตัว เอง อาจ ถูก นวด ปั้น ให้ เหมาะ กับ เป้า หมาย ของ เรา เช่น กัน."
 operation.1006.desc.underling:1 "$operation.1006.desc.intro$เราได้ล่อ§Hสมาชิกที่ชื่นชมอย่างต่ํา[from.target.GetAdj]พลเมือง§!ผู้ที่มีทัศนคติและการติดต่อในหมู่ชนชั้นล่างของสังคม แน่นอนที่จะช่วยปฏิบัติการของเราในหลาย ๆ วิธี"
 operation.1006.desc.drone:1 "$operation.1006.desc.intro$เครือข่ายสเปกของเรามีความปลอดภัยการเข้าถึง§Hแก้ไข[from.target.GetAdj]โดรน§!ผลประโยชน์ที่จะเห็นได้ชัด เมื่อใดก็ตามที่เราอาจต้องการที่จะแทรกซึมหรืออื่น ๆ การจัดการ[from.target.GetName]วิญญาณ"
 operation.1006.desc.organ:1 "$operation.1006.desc.intro$เราได้อ้างสิทธิ์§Hส่วนหนึ่งของ[from.target.GetName]องค์กร§!- เครื่องราชอิสริยาภรณ์ที่อนุญาตให้เราเข้าไปแทรกแซงรังรังได้ ทําให้การเคลื่อนไหวของเราไม่ราบรื่น และมากขึ้น"
 operation.1006.desc.component:1 "$operation.1006.desc.intro$เราได้อ้างสิทธิ์§Hส่วนหนึ่งของ[from.target.GetName]องค์กร§!ซึ่งจะทําให้เราเข้าไปแทรกแซง ความฉลาดของเครื่องจักร ด้วยผลโดยตรงและทําลาย"
 operation.1006.desc.network:1 "$operation.1006.desc.intro$เครือข่ายสเปกตอนนี้ได้รับการส่งเสริมโดยการเข้าถึง§Hส่วนหนึ่งของเครือข่ายที่[from.target.GetName]ทํางาน§!ถ้าเราต้องการที่จะปิดบังการเคลื่อนไหวของเรากับเครื่อง, ส่งมันข้อมูลเท็จหรืออื่น ๆ ที่รบกวนมัน: โปรโตคอลของตัวเองตอนนี้อาจจะถูกอาวุธกับมัน"
 operation.1006.desc.default:0 "$operation.1006.desc.intro$เรามีการรักษาความปลอดภัยชุดรหัสอักขระที่มีค่าซึ่งจะส่งเสริมการรวบรวมปัญญาของเรา และกิจกรรมจารกรรมภายใน[from.target.GetAdj]พื้นที่"
 operation.1006.b:0 "เอาชุดนี่ไปทํางานทันที"

 # Steal Technology
 operation.1020.name:0 "การ รวบ รวม นํา ไป"
 operation.1020.desc.conf_hosted:1 "สายลับของเรากระจัดกระจายไปทั่ว การประชุมที่ดูมีอนาคต[root.target.GetAdj]พื้นที่ พวกเขาเริ่มสํารวจเป้าหมายแล้ว"
 operation.1020.desc.conf_external:2 "เจ้าหน้าที่ของเรามีการรักษาความปลอดภัย เข้าร่วมการประชุมทางวิทยาศาสตร์ ระหว่างดวงดาวและวิทยาศาสตร์[root.target.GetName]ได้รับเชิญด้วย ความพยายามของเรามุ่งเน้นไปที่การสอดแนมเท่านั้น[root.target.GetAdj]ตัว แทน."
 operation.1020.desc.lecture:1 "เราให้เจ้าหน้าที่เข้ามาฟัง ในการบรรยายหลายเรื่อง[root.target.GetName]เราจะเฝ้าดูความเป็นไปได้"
 operation.1020.desc.outreach:1 "คนของเราได้กระจัดกระจายไปในหมู่แผนวิทยาศาสตร์ต่าง ๆ ที่ออกจําหน่ายโดย[root.target.GetName]เพื่อผลประโยชน์ของพลเมือง เป้า หมาย ของ เรา สําหรับ ความ พยายาม นี้ อาจ ทํา ให้ เรา รู้ จัก ตัว เอง ดี ขึ้น."
 operation.1020.desc.theft:2 "คนของเราเริ่มสํารวจ[root.target.GetAdj]ศูนย์วิจัย เมื่อใดก็ตามที่มีทางเข้าอยู่ เราจะใช้ประโยชน์จากมัน"
 operation.1020.desc.enigmatic:0 "$role_spymaster$ [spynetwork.leader.GetName]รายงานว่าคนของเรา เจอกับอุปสรรคที่แก้ไขไม่ได้[target.GetAdj]วิศวกรรมดูเหมือนจะก้าวหน้า และหันเหออกไปจากพวกเรา\n\nเทคโนโลยีที่เราหวังว่าจะขโมยจากพวกเขา§Hประมวลผลได้§!และแด่เรา (มุฮัมมัด) และด้วยสิ่งที่เป็นแนวทางอันเที่ยงธรรม"
 operation.1021.name:0 "การ ชัก นํา ตัว เอง"
 operation.1021.desc.appeal:0 "เราพบเป้าหมายที่ตรงตามเงื่อนไขในอุดมคติของเรา การเข้าถึงงานวิจัยนิยายที่เพียงพอ เราจะติดตามเบาะแสต่อไป"
 operation.1021.desc.creds:0 "หนึ่งในเป้าหมายที่มีศักยภาพของเรา ดูเหมือนว่าจะมีชนิดของการกวาดล้างการวิจัยที่เราต้องการ และพวกเขากําลังประทับใจอย่างเหมาะสมโดยเอกสารปลอมของเรา เบาะแสนี้ดูเหมือนจะดีที่สุดสําหรับเราตอนนี้"
 operation.1021.desc.theft:1 "คนของเราพบการเปิด - รากฐานที่เหมาะสมในการสร้างแผนของเราที่จะแทรกซึม[root.target.GetAdj]สืบค้น"
 operation.1022.name:0 "เชื่อมต่อรายการแล้ว"
 operation.1022.desc.invited:1 "เราได้ร่างแผนการต่างๆขึ้น ซึ่งเพิ่มข้อได้เปรียบที่ชัดเจนว่า คนของเราได้รับการเชิญในล่าสุด$role_spymaster$ [root.spynetwork.leader.GetName]มั่นใจกับเราว่า[root.spynetwork.leader.GetHisHer]การ จําลอง ทํา ให้ เห็น ภาพ ล่วง หน้า ที่ ดี."
 operation.1022.desc.theft:1 "คนของเราได้ทําการทดลองมาหลายครั้งแล้ว ผลของการทดลองที่สอดคล้องกับการคาดการณ์$role_spymaster$ [root.spynetwork.leader.GetName]เราพร้อมที่จะพยายาม[root.target.GetAdj]สืบค้น"
 operation.1026.name:0 "[fromfrom.target.GetAdj] การวิจัยปลอดภัย"
 operation.1026.desc.intro.smooth:1 "การแทรกซึมของเราใน[fromfrom.target.GetName]ได้ดําเนินการอย่างไร้ที่ติเพื่อให้ห่างไกล"
 operation.1026.desc.ducts.smooth:1 "$operation.1026.desc.intro.smooth$\n\nเจ้าหน้าที่เพียงคนเดียวได้เข้าถึง ภายในของศูนย์วิจัยระยะไกลผ่าน§Hท่อที่ใช้งาน§!มีแผลช้าทางของพวกเขาไปยังอาคาร จํากัด สําหรับ[fromfrom.target.GetName]ห้องกลาง$operation.2016.desc.outro.smooth$"
 operation.1026.desc.goods.smooth:1 "$operation.1026.desc.intro$\n\nมีสายลับคนเดียวซ่อนอยู่§Hทางเข้าสินค้า§!ของศูนย์วิจัยระยะไกลที่รอที่จะถูกส่งผ่านจํานวนชัดเจน[fromfrom.target.GetAdj]มาตรการรักษาความปลอดภัย การปล่อยข้อมูล[fromfrom.target.GetSpeciesAdj]ได้วางคนของเราในการเข้าถึงของอาคารสําหรับ[fromfrom.target.GetName]ห้องกลาง\n\n$operation.2016.desc.outro.smooth$"
 operation.1026.desc.invited.smooth:1 "$operation.1026.desc.intro.smooth$เจ้าหน้าที่ของเราถูกคุ้มกันไว้ตลอด[fromfrom.target.GetSpeciesName]แสดงความปลอดภัยที่เหมาะสม :§Hเชื่อว่าพวกเราผลิต§!มากพอที่จะให้โอกาสเรา\n\n$operation.2016.desc.outro.smooth$"
 operation.2016.desc.outro.smooth:2 "วงจรที่ซับซ้อนของม่านอิเล็กทรอนิกส์และกลลวง ได้เปิดเผยฐานข้อมูลวิจัย เพียงนานพอที่เราจะเคลื่อนไหวได้[fromfrom.target.GetAdj]รปภ.จะปิดล้อมไว้ หลังจากเสร็จเรื่องที่นี่"
 operation.1026.tooltip.cooldown:0 "§Hอย่างน้อยเราต้องรอ§Y6 ปี§!ก่อนที่จะพยายามทําลายสถานที่วิจัยของพวกเขา§!"
 operation.1026.a.smooth:0 "ภารกิจเสร็จสมบูรณ์"
 operation.1026.b.smooth:0 "ทําลายอะไรก็ตามที่เราทิ้งไว้"
 operation.1026.b.tooltip:0 "\n§H[fromfrom.target.GetName]§!:\nถูกปรับตาม§Y$research_stolen_sabotaged$§!1 ปี\n\n"
 operation.1026.c:0 "บอกข้อมูลลับของเรา กับการวิจัยในอนาคตของพวกเขา"
 operation.1026.d:0 "นี่ เป็น โอกาส อัน ยอด เยี่ยม ที่ จะ ฉวย เอา มาก ขึ้น!"
 operation.1026.d.tooltip:1 "เทคโนโลยี เพิ่ม เติม มี ไว้ พร้อม สําหรับ การ ค้นคว้า รวม ทั้ง สิ่ง ที่ เรา ได้ มา."
 operation.1026.desc.intro.messy:0 "การแทรกซึมของเรา[fromfrom.target.GetAdj]วิทยาศาสตร์ประสบความสําเร็จ แต่เจ้าหน้าที่บางคนของเรา ดูจะเป็นความเสี่ยง"
 operation.1026.desc.ducts.messy:1 "$operation.1026.desc.intro.messy$\n\nพวกเขาพยายามที่จะเข้าถึงภายในของศูนย์วิจัยระยะไกลผ่าน§Hท่อที่ใช้งาน§!ตั้งใจจะเข้าถึง เทอร์มินอล จํากัด ที่แกนหลักของมัน เมื่อพวกเขาเข้ามา[fromfrom.target.GetName]อย่าง ไร ก็ ตาม ห้อง เก็บ ของ กลาง§Hสัญญาณเตือน§!กําลังสะดุด\n\n $operation.1026.desc.outro.messy$"
 operation.1026.desc.goods.messy:1 "$operation.1026.desc.intro.messy$\n\nมีสายลับเพียงคนเดียว สืบค้นข้อมูลภายในของศูนย์วิจัยจากระยะไกล§Hสนามหญ้าสินค้า§!การส่งตัวเองตรงไปยังอาคารสําหรับ[fromfrom.target.GetName]ห้องกลาง โชคไม่ดี§Hสัญญาณเตือน§!ดูเหมือนจะสะดุด ตอนที่เคลื่อนไหว\n\n$operation.1026.desc.outro.messy$"
 operation.1026.desc.invited.messy:1 "$operation.1026.desc.intro.messy$เจ้าหน้าที่ของเราปกปิดเอาไว้นานพอ ที่จะสกัดพวกมันได้ แต่พวกมัน§Hข้อมูล§!ตอนนี้ถูกเปิดเผยว่าไม่จริง[fromfrom.target.GetAdj]การรักษาความปลอดภัยได้รับการแจ้งเตือน การปรากฏตัวของพวกเขา\n\n$operation.1026.desc.outro.messy$"
 operation.1026.desc.outro.messy:2 "ข้อมูลที่เราอยากรู้ได้ถูกสกัดแล้ว แต่ทีมของเรา§Hแผนหลบหนี§!ถูกโยนเข้าสู่ความแตกแยก การรักษาความปลอดภัยกําลังลดลงอย่างหนัก เราต้องระมัดระวังและพิจารณาอย่างทันที"
 operation.1026.a.messy:0 "เรียกคนของเรามาให้มากที่สุดเท่าที่จะทําได้"
 operation.1026.b.messy:1 "พวกเขาหลงทาง ทําลายอะไรก็ตามที่เราสามารถทําได้"
 requires_not_espionage_research_backdoor:1 "เรา อาจ ใช้ เพียง ประตู หลัง เดียว ใน แต่ ละ ครั้ง."
 operation.1027.name:0 "เทคโนโลยีที่ควบคุมไม่ได้"
 operation.1027.desc:0 "$role_spymaster$ [from.spynetwork.leader.GetName]ได้ส่งรายงานเกี่ยวกับปฏิบัติการ[from.GetName]ภายใน§H[from.target.GetName]§!ดูเหมือนว่า[from.target.GetAdj]วิทยาศาสตรและวิศวกรรม ได้ก้าวหน้าจนถึงจุด ของการบ่มเพาะลูกเรือผู้เชี่ยวชาญของเรา พวก เขา อ้าง ว่า เทคโนโลยี เบื้อง ต้น ได้ หันเห ไป จาก ตัว เรา เอง อย่าง มาก ซึ่ง หมาย ความ ว่า ถึง แม้ เรา จะ ขโมย งาน วิจัย ของ เขา ได้ ก็ ตาม เครื่อง มือ ที่ เกิด ขึ้น จะ ไม่ เข้า กัน ได้ กับ ของ เรา.\n\n$role_spymaster$ [from.spynetwork.leader.GetName]ขอ ให้ คิด ว่า เรา ควร เปิด เผย ความ ลับ ดัง กล่าว ใน ที่ อื่น."
 operation.1030.name:0 "การวิจัยทําลาย!"
 operation.1030.desc.regular:1 "เครือข่ายวิจัยของเราถูกแทรกแซง ผู้แทรกซึมไม่ทราบสาเหตุ ได้เพิ่มข้อมูลในห้องสมุดของเรา§Hขโมยงานวิจัย§!สําหรับการใช้งานของพวกเขา และก่อให้เกิดความล่าช้าที่สําคัญของเรา§Hกําลังทําการศึกษาอยู่§!.\n\nทีมของเราสามารถเปลี่ยนเป็นระบบสํารองอย่างรวดเร็ว แต่สิ่งนี้จะทําให้ความก้าวหน้าช้าลง ประมาณกันว่า อาจผ่านไปหลายเดือน ก่อนที่เราจะสามารถทบทวนกระบวนการวิจัยและพัฒนาใหม่"
 operation.1030.desc.gestalt:1 "เครือข่ายวิจัยของเราถูกแทรกแซง องค์กรที่ไม่รู้จักได้แทรกซึมเข้าไปในสื่อข้อมูลของเรา§Hขโมยงานวิจัย§!สําหรับการใช้งานของพวกเขา และก่อให้เกิดความไม่สงบที่สําคัญ§Hกําลังทําการศึกษาอยู่§!.\n\nเราสามารถจัดการระบบสํารองได้อย่างรวดเร็ว แต่ความก้าวหน้าของเราจากที่นี่จะชะลอตัวลง หลายเดือนอาจผ่านไป ก่อนที่เราจะสามารถทําการวิจัยและพัฒนาอย่างราบรื่น ด้วยห้องสมุดวิจัยที่มีอยู่"

 # Sabotage Starbase
 operation.2000.name:2 "ใกล้เป้าหมายใน[target.solar_system.GetName]"
 operation.2000.desc.intro.friendly:1 "กลุ่มย่อยและเลือกของปฏิบัติการได้ออกเดินทางสําหรับ§Y[target.owner.GetName]§!ภายใต้ชื่อปลอม"
 operation.2000.desc.jobseeker:2 "$operation.2000.desc.intro.friendly$แต่ ละ คน จะ เป็น คน งาน ที่ หา งาน ทํา. บาง คน กําลัง แบก ข้อ เสนอ แนะ และ จะ พยายาม ทํา งาน ใกล้ ๆ กับ สถาน ที่ สําคัญ ๆ ส่วน คน อื่น ๆ จะ ลอง โชค ใน ส่วน ต่าง ๆ ของ การติดตั้ง."
 operation.2000.desc.vendor:1 "$operation.2000.desc.intro.friendly$ใน บรรดา สิ่ง เหล่า นี้ ก็ คือ ครอบครัว ช่าง ฝีมือ ที่ มัก จะ หา โอกาส ทํา ธุรกิจ ใหม่ ๆ. พวกเขาจะพยายามจัดวางตลาด§H[target.GetName]§!เพื่อขายสินค้าของพวกเขา"
 operation.2000.desc.intro.hostile:1 "หน่วยปฏิบัติการบางส่วนได้ออกไป§Y[target.owner.GetName]§!หน้า ปก ของ พวก เขา เกี่ยว ข้อง กับ การ ขับ เรือ สินค้า ที่ ไม่ มี การ เกณฑ์ ทหาร."
 operation.2000.desc.cargo:1 "$operation.2000.desc.intro.hostile$มันเต็มไปด้วยสิ่งที่ปรากฎ[target.owner.GetAdj]เครื่องสแกนภาพ$rare_crystals$และแร่ธาตุอื่น ๆ อีก เราเชื่อว่าความเรียบง่ายของกลยุทธ์นี้ จะทําหน้าที่เป็นอุบายของมันเอง"
 operation.2000.desc.derelict:1 "$operation.2000.desc.intro.hostile$เรือมีอุปกรณ์สําหรับระเบิดที่ไม่เลอาลเมื่อมันเข้าใกล้[target.owner.GetAdj]ชายแดน - ใกล้ที่สุดเท่าที่จะได้รับ§H[target.solar_system.GetName]ระบบ§!. การแปรพักตร์จะปรากฎว่า น้ําท่วมภายในของเรือ ขณะที่เจ้าหน้าที่ของเราเปิดเผยตัวเอง"
 operation.2000.desc.invalid:0 "เจ้าหน้าที่ของเรารายงานการเปลี่ยนแปลงอย่างมากภายใน[root.target.owner.GetAdj]ภายใน: เป้าหมายของเราไม่สามารถทํางานได้อีกต่อไป"
 operation.2001.name:0 "ภาพ ถ่าย ใน ที่ ต่าง ๆ"
 operation.2001.desc.vocation:2 "คนของเราหลายคน ได้รับการยอมรับ§H[target.GetName]อาคาร§!คนที่ไม่ได้รับงานที่นั่น ได้กระจัดกระจายเข้าสู่ระบบเพื่อนบ้าน ที่ นั่น พวก เขา จะ เปลี่ยน ไป เป็น การ สํารอง ข้อมูล ส่วน ตัว และ ให้ การ สนับสนุน การ ดําเนิน งาน ทั่ว ไป."
 operation.2001.desc.vessel:2 "เหยื่อถูกจับตัวไป และปฏิบัติการของเรา ก็เริ่มมืดลง ในขณะที่พวกเขาทํางาน เพื่อก่อตั้งตัวเอง$role_spymaster$ [spynetwork.leader.GetName]จะคอยสัญญาณต่อไปจากพวกเขา"
 operation.2002.name:0 "สัญญาณพร้อม"
 operation.2002.desc.intro:1 "สัญญาณรหัสมาแล้วจากภายใน§Y[target.owner.GetName]§!ระบุว่าคนของเราพร้อมแล้ว"
 operation.2002.desc.vocation:3 "$operation.2002.desc.intro$\n\nพวกเขาได้ทําหน้าที่ปกของพวกเขาในระดับดังกล่าว เจ้าหน้าที่ของเราได้พัฒนาจริง ความผูกพันธ์กับบุคลากรท้องถิ่น หลายจุดประโยชน์ของการเข้าได้รับการบันทึกในช่วงอาหารที่เป็นมิตร, แบ่งปันความบันเทิงและการประชุมวันบน§H[target.GetName]อาคาร§!."
 operation.2002.desc.vessel:1 "$operation.2002.desc.intro$ $role_spymaster$ [spynetwork.leader.GetName]ทําให้เตรียมการที่จะสกัดพวกเขา ที่ที่เป็นไปได้ แต่โอกาสของพวกเขามีน้อย"
 operation.2005.name:0 "[root.GetSabotagedStarbaseTitle]"
 operation.2005.desc.civic:2 "เราทําสําเร็จแล้ว§Hโครงสร้างพื้นฐานท้องถิ่น§!ใน[sabotaged_starbase_system.GetName]ระบบ ความวุ่นวายที่ตามมาควรจะทําหน้าที่ของเราได้ดี\n\n$operation.2005.desc.outro$"
 operation.2005.desc.military:3 "เราทําสําเร็จแล้ว§Hโครงสร้างการสนับสนุนทางทหาร§!บนเรือ[sabotaged_starbase.GetName]สถานที่ เจ้าหน้าที่ของเรารายงานว่ามีผู้บาดเจ็บเล็กน้อย ในจํานวนคนที่ทํางานในบริเวณใกล้เคียง ในเวลาที่อุปกรณ์ของพวกเขาทํางาน\n\nการเป่านี้เราได้จัดการกับ การบันทึกภายใน§Y[sabotaged_starbase_owner.GetName]§!และพวกเขาจะไม่เป็นผู้ออกจากมัน (อยู่ในกองไฟตลอดไป)\n\n$operation.2005.desc.outro$"
 operation.2005.desc.trade:3 "เราได้ปะทะกับ§Hผลประโยชน์เชิงพาณิชย์§!ในและรอบ[sabotaged_starbase_system.GetName]ระบบ เรือ ค้า ขาย กําลัง ลาด ตระเวน ไป ตาม ทาง เดิน เรือ ขณะ ที่ เจ้า หน้าที่ ควบคุม การ จราจร ใน ท้อง ถิ่น เบียด เสียด กัน ไป หา รูป แบบ ใหม่.\n\n$operation.2005.desc.outro$"
 operation.2005.desc.outro:1 "เรา ต้อง คํานึง ถึง การ ปฏิเสธ การ กระทํา ของ เรา เอง. การดําเนินการในอนาคตใด ๆ ใน[sabotaged_starbase_owner.GetAdj]พื้นที่จะเรียกร้องให้เรารักษาครอบคลุม มากที่สุดเท่าที่เรา สามารถ - ที่คือถ้าเราต้องการที่จะจัดลําดับความสําคัญ ดุลยพินิจดังกล่าว ..."
 operation.2005.a:0 "ตัดออกอย่างสะอาดที่สุดเท่าที่จะทําได้"
 operation.2005.b:0 "ความไม่แยแสมันสําหรับคนอ่อนน้อมถ่อมตน ทําลายฐานดาวนี้"
 operation.2005.b.orb:0 "ความไม่แยแสมันสําหรับคนอ่อนน้อมถ่อมตน กดวงแหวนออร์บิทัลนี้"
 operation.2005.b.tooltip:1 "คนของเราจะคว้าโอกาส§Hทําลายโครงสร้างเพิ่มเติม§!ในเป้าหมาย"
 operation.2005.c:0 "สไตรค์ที่$military_station_small_plural$เช่นกัน"
 operation.2005.c.tooltip:2 "ทําลาย$military_station_small$ในเป้าหมาย"
 operation.2006.name:0 "ปิดการใช้งาน"
 operation.2006.desc:3 "$role_spymaster$ [from.spynetwork.leader.GetName]รายงานว่า[from.spynetwork.leader.GetHisHer]ทีมของปฏิบัติการต้องละทิ้งความพยายามของพวกเขาในการก่อวินาศกรรม§H[sabotaged_starbase_owner.GetAdj]§!ใน§Y[sabotaged_starbase_system.GetName]ระบบ§!ดริช เปลี่ยนเป็น[sabotaged_starbase_owner.GetAdj]ภายในได้ทําให้ความพยายามของเรา เพื่อให้มากกว่า เราจะเลือกเป้าหมายอื่น"
 operation.2010.name:2 "[root.GetSabotagedStarbaseTitle]ใน[sabotaged_starbase_system.GetName] ระบบดาว!"
 operation.2010.desc.phobe:3 "ผู้บุกรุกได้ละเมิดพรมแดนของเราใน§Y[sabotaged_starbase_system.GetName]§!ระบบที่ถูกทําลายเป็นส่วนหนึ่งของ§H[sabotaged_starbase.GetName]อาคาร§!ผู้ก่อวินาศกรรมเหล่านี้ดูเหมือนจะได้ทําหน้าที่ในนามของอํานาจต่างประเทศ กองกําลังตอบโต้ของเราอยู่ในระดับสูง"
 operation.2010.desc.regular:3 "ผู้ก่อวินาศกรรมไม่ทราบที่มา§Y[sabotaged_starbase_system.GetName]§!ระบบที่ถูกทําลายเป็นส่วนหนึ่งของ§H[sabotaged_starbase.GetName]อาคาร§!.\n\nบริการผู้แทนราษฎรของเรา ชี้ให้เห็นว่า นี่น่าจะเป็นงานของนักแสดงต่างชาติ แทนที่จะเป็นภัยคุกคามภายในบ้าน เราเพิ่มความปลอดภัย รอบพื้นที่ที่ได้รับผลกระทบ ด้วยความหวังว่าจะจับคนร้ายได้"
 operation.2010.desc.gestalt:3 "ชาวต่างชาติได้รุกล้ําเขตแดนของเราใน§Y[sabotaged_starbase_system.GetName]§!ระบบและมีการรบกวนการทํางานเรียบของ§H[sabotaged_starbase.GetName]อาคาร§!เรายังไม่ทราบเลย ว่าซาบอตเซอร์เหล่านี้เข้าไปได้ยังไง"

 # Smear Campaign
 operation.3000.name:0 "ระบุเป้าหมาย"
 operation.3000.desc:1 "เราได้รวบรวมรายชื่อของจักรวรรดิเหล่านั้น ที่ปรากฏเป็นมิตรมากที่สุด§Y[root.target.GetName]§!คนของเราจะทําให้อาณาจักรแตกร้าว"
 operation.3000.desc.single:1 "เราพบเป้าหมายที่แน่นอนแล้ว§H[event_target:smear_option_1.GetName]§!- ที่มีความสัมพันธ์กับ§Y[root.target.GetName]§!ผลประโยชน์[root.target.GetAdj]เพื่อผลประโยชน์ของเราเอง"
 operation.3000.desc.error:1 "เราไม่สามารถหาเป้าหมายที่เหมาะสมสําหรับความพยายามนี้ ดูเหมือนว่าถ้า§Y[root.target.GetName]§!มี เพื่อน อยู่ ที่ อื่น เรา ยัง ไม่ ได้ ติด ต่อ สื่อ ความ กับ พวก เขา."
 operation.3000.a:0 "เดอะ[smear_option_1.GetName]."
 operation.3000.b:0 "เดอะ[smear_option_2.GetName]."
 operation.3000.c:0 "เดอะ[smear_option_3.GetName]."
 operation.3000.d:0 "ตามนั้น"
 operation.3001.name:0 "ดอสเซอร์สกปรก"
 operation.3001.desc.spirit.intro:2 "ทีมที่อยู่ภายใต้$role_spymaster$ [Root.SpyNetwork.leader.GetName]จะทํางานเกินเหตุทางศาสนาในหมู่[root.target.GetName]."
 operation.3001.desc.spirit.ridic:1 "$operation.3001.desc.spirit.intro$เราจะกระจายข่าวลือที่น่าเชื่อถือ[smear_campaign_recipient.GetAdj]พิธี ทาง ศาสนา เป็น เรื่อง ของ การ เยาะ เย้ย อย่าง เปิด เผย[root.target.GetAdj]การเมือง"
 operation.3001.desc.spirit.merch:0 "$operation.3001.desc.spirit.intro$ถ้าเห็นว่าพวกเขาถูกยัดใส่รูปที่ถูกๆและน่ารังเกียจ[smear_campaign_recipient.GetName]ถือศักดิ์สิทธิ์มากที่สุดตัวอย่าง ..."
 operation.3001.desc.spirit.deity:1 "$operation.3001.desc.spirit.intro$เราจะเสกสรรค์สร้าง[root.target.GetAdj]การ รณรงค์ มุ่ง เป้า ไป ที่ คน นอก วรรณะ บาทหลวง[smear_campaign_recipient.GetName]ความ พยายาม ที่ จะ ขัด ขวาง การ เมือง แห่ง ระเบียบ ทาง ศาสนา ของ พวก เขา ย่อม ทํา ให้ ผู้ ดําเนิน การ นั้น ขุ่น เคือง."
 operation.3001.desc.milit.intro:1 "เราจะเสนอว่า[root.target.GetName]กําลังบ่อนทําลาย[smear_campaign_recipient.GetAdj]ทหาร"
 operation.3001.desc.milit.study:1 "$operation.3001.desc.milit.intro$เราสามารถแนะนําว่า[root.target.GetAdj]ความสนใจใน[smear_campaign_recipient.GetName]มีแรงจูงใจเพียงอย่างเดียว โดยการศึกษาความลับทางทหารของพวกเขา และว่าพวกเขาอาจไปไกลถึงสงคราม"
 operation.3001.desc.milit.priso:1 "$operation.3001.desc.milit.intro$ควรจะ[root.target.GetName]ถูกกล่าวหาว่าขัดขวาง[smear_campaign_recipient.species.GetAdj]นักโทษสงครามโดยมีวัตถุประสงค์ที่จะฉีดพวกเขาเช่น ..."
 operation.3001.desc.milit.armsd:1 "$operation.3001.desc.milit.intro$เราจะจัดหาหลักฐานที่โต้แย้งไม่ได้[root.target.GetName]กําลังขายอาวุธที่ชาญฉลาดและบกพร่องให้กับเพื่อนบ้านที่น่านับถือของพวกเขา[smear_campaign_recipient.GetName]."
 operation.3001.desc.milit.pacif:1 "$operation.3001.desc.milit.intro$ข่าวลือของความสําเร็จใน[root.target.GetAdj]เทคโนโลยีที่จะบังคับเพื่อนบ้านที่สงบ เช่น[smear_campaign_recipient.GetName]อย่างเช่น..."
 operation.3001.desc.milit.satir:1 "$operation.3001.desc.milit.intro$เราจะดึงดูดความภูมิใจของพวกเขา ชี้ให้เห็นว่า[root.target.GetName]ฝึกเฉพาะนักเรียนที่อายุน้อยที่สุดของพวกเขา ในสถานการณ์การต่อสู้กับ[smear_campaign_recipient.GetName]เพื่อสร้างความมั่นใจของพวกเขา"
 operation.3001.desc.phobe.intro:1 "เราจะเกินความเย่อหยิ่งของมนุษย์ต่างดาว[root.target.GetName]ดึงดูดใจของ[smear_campaign_recipient.GetName]."
 operation.3001.desc.phobe.genes:1 "$operation.3001.desc.phobe.intro$ตัวอย่างเช่น:[root.target.GetName]ถูกจับได้ว่าขายยีนบําบัด[smear_campaign_recipient.species.GetAdj]ในทางชีววิทยา พวกเขาจะต้องรับผลของโรค"
 operation.3001.desc.phobe.abduc:1 "$operation.3001.desc.phobe.intro$เราจะกระจายไอเดียเกี่ยวกับ[root.target.GetAdj]วางแผนลักพาตัว[smear_campaign_recipient.species.GetAdj]พลเมืองและฝังใจพวกเขา ให้ยอมรับกาแล็กซี่ที่เปิดกว้างมากขึ้น"
 operation.3001.desc.egal.intro:1 "เราจะแสดง[root.target.GetName]ผู้ก่อวินาศกรรมที่กระตือรือร้น ต่อระบบการเมืองเช่นที่[smear_campaign_recipient.GetName]ถือที่รัก."
