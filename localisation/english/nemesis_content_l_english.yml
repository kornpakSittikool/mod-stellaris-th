 operation.3005.name:1 "[fromfrom.GetAdj]การ รณรงค์ อย่าง รุนแรง"
 operation.3005.desc.intro:1 "คําออก; ความจริงที่เกินจริงเกี่ยวกับ§H[from.target.GetName]§!กําลังดําเนินการผ่าน§Y[smear_campaign_recipient.GetAdj]§!ทางการทูต"
 operation.3005.desc.insult:1 "$operation.3005.desc.intro$การดูถูก[smear_campaign_recipient.GetName]แน่ใจว่าจะกดดันความสัมพันธ์ของพวกเขาและยิ่งแย่ความไม่เชื่อใจใด ๆ ที่พวกเขามีอยู่แล้วถือสําหรับ[from.target.GetName]."
