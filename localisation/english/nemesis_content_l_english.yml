 crisis.6000.tooltip:0 "ขนาด§Yเครื่องยนต์ดาราศาสตร์§!มหาจักรปรากฏรอบดาวของ§Y[sphere_system.GetName]§!."
 crisis.6001.tooltip:0 "อู่เรือมี§Yลาน สําหรับ ประชุม ใหญ่§!ตอนนี้สามารถสร้างได้§Yผู้กินดาว§!.\n\nสอง§Yผู้กินดาว§!ปรากฏในวงโคจรรอบ§Y[Root.Capital.GetName]§!.\n\n£sr_dark_matter£ข้อจํากัดของสสารมืดเพิ่มขึ้น"
 crisis.6001.name:0 "เครื่องกินดาว"
 crisis.6001.desc:0 "เพียง แต่ การ ระเบิด ของ ดาว ทั้ง ดวง จะ ปล่อย พลังงาน มาก พอ ที่ จะ ทํา ให้ มี ปริมาณ มหาศาล§Hสสารมืด§!ต้องซ่อมเครื่องยนต์เอเธโรฟาสิกให้เสร็จ เพื่อจุดประสงค์นี้ เราได้คิดค้น§Hผู้กินดาว§!ยานอวกาศที่ทรงพลังที่สุด ที่กาแล็กซี่เคยเห็น ไม่เพียง แต่ สามารถ ระเบิด ดาว ขึ้น แต่ พวก เขา ยัง แข็ง แรง พอ ที่ จะ ทําลาย ทั้ง กอง เรือ ด้วย ตน เอง.\n\nสําหรับตอนนี้ เรามีแค่ 2 คน แต่สร้างได้มากขึ้น การก่อสร้างของพวกเขาต้องการ สสารมืดจํานวนมาก ดังนั้นเราจะต้องสมดุล ความต้องการของเรา"
 crisis.6001.a:0 "ดาวที่ถูกทําลายแต่ละ นําเราก้าวใกล้"

 crisis.6005.name:0 "เครื่อง ยนต์ เอ เท โร ฟา ซิส"
 crisis.6005.desc:0 "ขั้น ตอน แรก ของ การ สร้าง เครื่อง ยนต์ เอ เท โร ฟา สิก ก็ แล้ว เสร็จ. เรากําลังเริ่มเข้าสู่พลังงานของชรูด ซึ่งกําลังส่งคลื่นโซไซโอนิคผ่านกาแล็กซี่\n\nมี การ ตั้ง หลัก ฐาน ที่ มั่นคง ขึ้น มา แล้ว ซึ่ง ต้อง ใช้ เครื่องจักร ต่อ ไป เพื่อ ขยาย การ ปรากฏ ตัว ของ เรา ใน ชรู ด."
 crisis.6005.a:0 "เราต้องรวบรวมสสารมืดมากขึ้น"
 crisis.6006.desc:0 "ตอน นี้ เส้น เอ็น ของ เครื่อง ยนต์ เอ เท โร ฟา สิก ไป ถึง ส่วน ลึก เข้า ไป ใน ชรู ด แล้ว หัว หาด ของ เรา ก็ กว้าง ขึ้น. องค์กรที่อยู่ที่นั่น ได้เริ่มให้ความสนใจ ต่อความพยายามของเราที่จะรุกรานดินแดนของพวกเขา แต่จนถึงตอนนี้\n\nตอนนี้ถึงเวลาแล้ว ที่จะบังคับให้เปิดท่อที่ถาวร ระหว่างโลกของเรา ทํางานกับเครื่องยนต์ต้องดําเนินการต่อไป"
 crisis.6006.a:0 "ต้องการสสารมืดมากขึ้น!"
 crisis.6007.desc:0 "เครื่อง ยนต์ เอ เท โร ฟา สิก ได้ เจาะ รู ขนาด ใหญ่ เข้า ไป ใน ผ้า ของ ชรู ด. มันยังไม่ใหญ่พอสําหรับเรา ที่จะทําลายดินแดนได้อย่างสมบูรณ์ แต่รอยแตกได้กระตุ้น กิจกรรมจํานวนมากในหมู่\n\nใน ที่ สุด พวก เขา ก็ ยอม รับ คํา ขู่ ของ เรา แต่ ความ พยายาม ของ พวก เขา จะ ไร้ ผล. เส้นเอ็นของเครื่องยนต์ฝังลึกเกินไปใน ชรูด ที่จะถูกตัดในขณะนี้\n\nเราใกล้แล้ว ใกล้เคียงมาก"
 crisis.6007.a:0 "ไม่มีอะไรหยุดเราได้"

 crisis.6010.name:0 "คลื่นความถี่เสียง"
 crisis.6010.a.desc.intro: "ไม่ นาน มา นี้ คลื่น ไซ โอ นิก ขนาด ใหญ่ ได้ พัด ผ่าน กาแล็กซี ต่าง ๆ! ดูเหมือนว่ามันออกมาจาก§H[crisis_sphere_system.GetName]§!ระบบใน§H[From.GetName]§!."
 crisis.6010.a.desc.outro: "แม้ แต่ ใน ตัว มัน เอง แล้ว ก็ ยัง มี การ สะท้อน ถึง เหตุ การณ์ อัน น่า ทึ่ง นี้."
 crisis.6010.a.desc.non_gestalt: "$crisis.6010.a.desc.intro$ของเรา[GetTelepathPlural]กําลังดิ้นรนอธิบายว่า อะไรทําให้เกิดเหตุการณ์เช่นนั้น - ไม่มีอะไรเหมือนที่บันทึกไว้ในประวัติศาสตร์กาแล็กซี่\n\n$crisis.6010.a.desc.outro$"
 crisis.6010.a.desc.gestalt: "$crisis.6010.a.desc.intro$เราไม่มีคําอธิบายสําหรับสิ่งที่อาจทําให้เกิดเหตุการณ์ดังกล่าว แม้หุ่นยนต์ไซโอนิคของเราภายในกลุ่ม\n\n$crisis.6010.a.desc.outro$"
 crisis.6010.b.desc:0 "แต่ คลื่น ไซ โอ นิก อัน ใหญ่ โต อีก ลูก หนึ่ง ได้ แผ่ ไป ทั่ว กาแล็กซี! ครั้งนี้มันออกมาจาก§H[crisis_sphere_system.GetName]§!ระบบใน§H[From.GetName]§!.\n\nเหมือนเมื่อก่อน เหตุการณ์นี้กําลังส่งคลื่นซัดไปทั่ว"
 crisis.6010.c.desc:0 "เราได้ตรวจพบสัญญาณลมไซโอนิคและพลังงานจาก§H[crisis_sphere_system.GetName]§!ระบบที่เกือบเหมือนกัน กับเครื่องยนต์อะเธ โร บิกของเราเอง\n\nดูเหมือนว่า§H[From.GetName]§!นอก จาก นั้น เขา ตั้งใจ จะ อ้าง สิทธิ์ ของ พวก ชรู ด ด้วย!"
 crisis.6010.a.organic: "นี่มันน่ารําคาญมาก"
 crisis.6010.a.machine: "นี้ไม่ได้อุดมคติ"
 crisis.6015.a.desc:0 "$crisis.6015.not.psionic$\n\n$crisis.6015.end$"
 crisis.6015.b.desc:0 "$crisis.6015.psionic$\n\n$crisis.6015.end$"
 crisis.6015.c.desc:0 "ตรวจพบการแปรผันของสับสเปซมากขึ้น§H[crisis_sphere_system.GetName]§!ระบบ เช่นเดียวกับก่อนหน้านี้พวกเขากําลังออกมาจาก§Hเครื่องยนต์ดาราศาสตร์§!สร้างรอบดาวหลักของระบบ\n\nเดอะ§H[From.GetName]§!เห็น ได้ ชัด ว่า มี ความ ตั้งใจ ที่ จะ ยึด ทรัพย์ สิน ที่ เสีย ไป จาก กาแล็กซี นี้!"
 crisis.6015.not.psionic:0 "เราได้ตรวจพบการเปลี่ยนแปลงของสับสเปซขนาดใหญ่ใน§H[crisis_sphere_system.GetName]§!ระบบกําเนิดจากมหาจักร รอบดาว ขณะที่มันปรากฏผิวเผินคล้ายกับ ไดสัน สเปชนี โครงสร้างนี้ดูเหมือน\"§Hเครื่องยนต์ดาราศาสตร์§!\" - กลไกขนาดใหญ่ที่ออกแบบมาเพื่อลบอุปสรรค ระหว่างโลกของเรากับมิติไซโอนิค ที่รู้จักกันในชื่อ ชรูด"
 crisis.6015.psionic:0 "เราได้ตรวจพบการเปลี่ยนแปลงของสับสเปซขนาดใหญ่ใน§H[crisis_sphere_system.GetName]§!ระบบกําเนิดจากมหาจักร รอบดาว ขณะที่มันปรากฏผิวเผินคล้ายกับ ไดสัน สเปชนี โครงสร้างนี้ดูเหมือน\"§Hเครื่องยนต์ดาราศาสตร์§!\"กลไกขนาดใหญ่ที่ออกแบบมาเพื่อลบอุปสรรคระหว่างโลกของเรากับชรูด"
 crisis.6015.end:0 "การก่อสร้างโครงสร้างขนาดใหญ่นี้ ต้องการสสารมืดจํานวนมาก ซึ่งเป็นเหตุผลที่§H[From.GetName]§!ได้มีการสกัดกั้นมัน จากดวงดาวที่พวกเขากินดาวทั้ง ๆ ที่มันทําลายทั้งระบบในกระบวนการ\n\nเมื่อเสร็จสิ้นแล้ว[From.GetSpeciesNamePlural]ตั้งใจที่จะรุกรานและอ้าง พลังของชรูดสําหรับตัวเอง นี่ ไม่ เพียง แต่ ทํา ให้ พวก เขา มี ความ สามารถ ที่ จะ แปลง สภาพ จริง ให้ เป็น รูป ของ การ เลือก ของ ตน เอง เท่า นั้น แต่ การ หด กลับ ของ พลัง งาน ที่ เกิด ขึ้น จะ ทําลาย กาแล็กซี ส่วน ใหญ่ ด้วย."
 crisis.6015.a:0 "พวกเขาต้องหยุด!"

 crisis.6101.name:0 "เครื่องยนต์เอเธโรฟาซิคถูกทําลาย"
 crisis.6101.desc:0 "กับการสูญเสียของ§H[crisis_sphere_system.GetName]§!ระบบ, เลว§H[sphere_destroyers.GetName]§!ได้ทําลายเครื่องยนต์เอเธโรแฟคของเรา! การสูญเสียโครงสร้างขนาดใหญ่นี้ยังหมายความว่า เราไม่ได้มีวิธีการทางเทคโนโลยี ที่จะสร้างผู้กินดาวใหม่\n\nการรุกรานของเราของชรูด ไม่สามารถดําเนินการ! ทั้งหมดหายไป!"
 crisis.6101.a:0 "งานของเราทั้งหมด..."
 crisis.6101.a.tooltip:0 "ถ้าเรายึดระบบกลับคืนมาได้ เราจะสามารถสร้างกลไกเอเธโรฟาสิกขึ้นมาใหม่"
 crisis.6102.a.desc:1 "กับ§H[crisis_sphere_system.GetName]§!ระบบภายใต้การควบคุมที่สมบูรณ์ของเรา เราได้รื้อถอนสิ่งที่เรียกว่า\"เครื่องยนต์เอเธโรฟาซิส\" ที่ถูกสร้างขึ้นรอบดาว\n\nการสูญเสียโครงสร้างขนาดใหญ่นี้ ทําให้สิ้นสุดแผนการบ้าของ§H[sphere_builders.GetName]§!เพื่อรุกรานและทําลายกาแลคซี"
 crisis.6102.b.desc:0 "กับ§H[crisis_sphere_system.GetName]§!ระบบที่อยู่ภายใต้การควบคุมที่สมบูรณ์ของเรา เราได้วางจุดสิ้นสุดของเครื่องยนต์อะเธ โร บิกน่าสมเพชที่อยู่ระหว่างการก่อสร้างมี\n\nเดอะ§H[sphere_builders.GetName]§!จะ ไม่ อยู่ ใน ฐานะ ที่ จะ เข้า แทรกแซง แผนการ ของ เรา เอง ใน เรื่อง การ สู้ รบ."
 crisis.6102.a:0 "กาแลคซีเป็นสถานที่ที่ปลอดภัย"
 crisis.6102.b:0 "ตอนนี้เพื่อจบเครื่องยนต์ของเรา ..."
 crisis.6103.desc:0 "หลังจากยึดการควบคุม§H[crisis_sphere_system.GetName]§!ระบบ,§H[sphere_destroyers.GetName]§!ได้ทําลายเครื่องยนต์เอเธโรฟาซิค ที่กําลังก่อสร้างอยู่\n\nเดอะ§H[sphere_builders.GetName]§!ไม่สามารถคุกคามอนาคต ของกาแล็กซี่ของเรา"
 crisis.6103.b:0 "อย่างไรก็ตาม เราสามารถ..."

 crisis.6200.name:0 "กลไกอะเธ โร บิกจับภาพ"
 crisis.6200.desc:0 "เราได้ควบคุม§H[crisis_sphere_system.GetName]§!และด้วยระบบ\"เครื่องยนต์เอเธโรฟาซิส\" ที่ถูกสร้างขึ้นรอบดาว\n\nการสูญเสียโครงสร้างขนาดใหญ่นี้ ทําให้สิ้นสุดแผนการบ้าของ§H[sphere_builders.GetName]§!เพื่อรุกรานและทําลายกาแลคซี"
 crisis.6200.A:0 "มันต้องถูกทําลาย!"
 crisis.6200.B:0 "เราสามารถใช้สิ่งนี้ได้"
 crisis.6200.B.tooltip:0 "เครื่องยนต์เอเธโรฟาซิกส์ที่เราจับไป จะมาแทนที่อันที่เราเสียไป"
 aetherophasic_engine_ruined_tt:0 "เครื่อง ยนต์ เอ เท โร ฟา ซิส เสีย"

 crisis.6050.name:0 "การ เริ่ม ต้น และ อวสาน"
 crisis.6050.a.desc:0 "เรายืนบนเส้นโค้งของพระเจ้า เครื่องยนต์เอเธโรฟาซิกส์สมบูรณ์ และพลังมหาศาลของชรูดอยู่ภายใต้การควบคุมของเรา\n\nเมื่อเครื่องยนต์ถูกเปิดใช้งาน การตีกลับของสับสเปซที่มีผล จะระเบิดทุกดาวในกาแล็กซี่ ทุกชีวิตกาแล็กซี่จะถูกลบ แต่แล้วเราจะมีอย่างปลอดภัยออกจากความเป็นจริงนี้ อยู่เบื้องหลังสําหรับระนาบที่สูงขึ้น ของการดํารงอยู่\n\n§Hโชคชะตารออยู่ เราควรจะเปิดใช้งานเครื่องยนต์?§!"
 crisis.6050.b.desc:0 "ทุกอย่างเข้าที่แล้ว เครื่องยนต์เอเธโรฟาซิกส์กําลังปฏิบัติการอย่างเต็มที่ และพลังมหาศาลของชรูดอยู่ภายใต้การควบคุมของเรา\n\nเมื่อเครื่องยนต์ถูกเปิดใช้งาน การตีกลับของสับสเปซที่มีผล จะระเบิดทุกดาวในกาแล็กซี่ ทุกชีวิตกาแล็กซี่ ไม่ว่าจะเป็นอินทรีย์หรือจักรกล จะยุติการมีอยู่ แต่แล้วเราจะมี ที่ นั่น เรา จะ ไม่ ถูก ผูก มัด โดย ขีด จํากัด ของ โลก ทาง กายภาพ อีก ต่อ ไป. เวลาจะไม่มีความหมาย และผ้าแห่งจักรวาล จะเป็นของเราในการจัดการ ตามที่เราต้องการ\n\n§Hช่วงต่อไปของการดํารงอยู่รอ. เราควรจะเปิดใช้งานเครื่องยนต์?§!"
 crisis.6050.c.desc: "ในที่สุดเราก็พร้อมที่จะปลดปล่อยตัวเอง$the_animator_of_clay_article$.\n\nเดอะ$crisis_sphere_4$ทํางานอย่างเต็มที่และเส้นทางไม่รวมไป§Hเดอะชราวด์§!พร้อมที่จะเปิดแล้ว ทั้งหมดที่มีอยู่ในกาแล็กซี่ ไม่ว่าจะเป็นอินทรีย์, เครื่องจักร, หรือไร้ชีวิต จะยุติการดํารงอยู่ ในขณะที่แกนสมองของเราจะได้รับ\n\n§Hช่วงต่อไป ของการดํารงอยู่ของเรา ให้เราเปิดใช้งานเครื่องยนต์§!"
 crisis.6050.a:0 "ทําสิ"
 crisis.6050.a.tooltip:0 "เราจะขึ้นไปบนระนาบที่สูงขึ้นของการดํารงอยู่\n\n§Yกาแลคซีถูกทําลาย§!"
 crisis.6051.name:0 "สมัย สุด ท้าย"
 crisis.6051.desc:0 "มันจบแล้ว เครื่องยนต์อะเธ โร บิกเสร็จสิ้นโดย§H[From.GetName]§!และความจริง ก็ปรากฏอยู่บนพวกเขา\n\nขณะที่พวกเขาขึ้นไปบนระนาบที่สูง ของการดํารงอยู่ที่พวกเขาจะเป็นพระเจ้า ปริมาณที่เหลือเชื่อของพลังงานสับสเปซ\n\nสําหรับสัตว์เดนิกส์ของกาแล็กซี่นี้ มันเป็นจุดสิ้นสุดของทุกสิ่ง"
 crisis.6051.a:0 "ทั้งหมดสูญเสีย..."
 crisis.6151.name:0 "ความ ทุกข์ ลําบาก ใหญ่"
 crisis.6151.desc:0 "การก่อสร้างของเครื่องยนต์เอเธโรฟาสิกใน§H[From.GetName]§!ได้ทรงปล่อยทิ้งไว้ (ฝน) อย่างหนัก ขณะ ที่ ดิน แดน ไซ โอ นิก ค่อย ๆ แตก เป็น เสี่ยง ๆ โดย โครง สร้าง ของ สิ่ง มี ชีวิต ส่วน ใหญ่ ที่ ทํา งาน อยู่ นั้น หลาย คน ที่ อาศัย อยู่ ที่ นั่น กําลัง แสดง อาการ โกรธ และ สิ้น หวัง.\n\nหลาย คน ได้ โพรง ผ่าน เครื่อง กีด ขวาง ที่ แตก ต่าง กัน อย่าง รวด เร็ว ระหว่าง โลก ทั้ง สอง ของ เรา และ แสดง ให้ เห็น ว่า เป็น สิ่ง ทรง สร้าง ที่ ทรง พลัง ของ ไซ โอ นิก. การอ้างอิงของดิบ, แทบจะไม่มีพลังงานไซโอนิค, สิ่งมีชีวิตที่สับสน"
 crisis.6151.a:0 "ความวุ่นวายมากขึ้น..."
 crisis.6151.b:0 "เราจะทําให้การทํางานสั้นของพวกเขา"
 crisis.6161.name:0 "ม.)"
 crisis.6161.a.desc:0 "กับ§H[From.GetName]§!ได้เกือบเสร็จสิ้นกลไกเอเธโรฟาสิกของพวกเขา ชรูดเป็นอย่างรวดเร็ว วิญญาณที่อยู่ที่นั่นกําลังคลั่ง และคลื่นอีกลูกหนึ่งได้เจาะเข้าไปในความจริงของเรา ด้วยความพยายามอย่างสิ้นหวังที่จะหลบหนี"
 crisis.6161.b.desc:0 "ขณะ ที่ เครื่อง ยนต์ เอ เท โร ฟา สิก ใกล้ จะ เสร็จ ความ สามารถ ของ เรา ใน การ จัด การ กับ ชรูด ก็ เพิ่ม ขึ้น อย่าง รวด เร็ว. วิญญาณที่อยู่ที่นั่นกําลังวุ่นวาย และคลื่นอีกลูกหนึ่งได้เจาะเข้าไปในความเป็นจริงของเรา ด้วยความพยายามอย่างสิ้นหวังที่จะขัดขวางความพยายามของเรา"
 crisis.6161.a:0 "เราไม่มีเวลาแล้ว..."
 crisis.6161.b:0 "พวกเขาจะไม่พบความสะดวกสบายที่นี่"
 crisis.6171.name:0 "ชีพจร ซี โอน จะ กวาด เลือน กาแล็กซี"
 crisis.6171.a.desc.intro: "เครื่องยนต์อะเธ โร บิกเสร็จสมบูรณ์ใน§H[From.GetName]§!ทําให้เกิดความเครียดที่ร้ายแรงบนชรูด ซึ่งบางส่วนได้ทรุดตัวลงเอง ชีพจรของพลังงานไซโอนิค กําลังไหลเข้าไปในความเป็นจริงของเรา กวาดไปทั่วกาแลคซีที่ความเร็วตกใจ"
 crisis.6171.a.desc.organic_non_gestalt: "$crisis.6171.a.desc.intro$\n\nชีพจรเหล่านี้มีระยะเวลาสั้น ๆ พวกเขาเจ็บปวดอย่างมากกับส่วนใหญ่เด็ก ผู้ หญิงใน บาง กรณี มัน อาจ ถึง กับ ทํา ให้ ถึง ตาย..."
 crisis.6171.a.desc.machine_non_gestalt: "$crisis.6171.a.desc.intro$\n\nแม้ ว่า ชีพจร เหล่า นี้ มี ระยะ เวลา สั้น ๆ แต่ มัน เป็น อันตราย อย่าง ยิ่ง ต่อ รูป แบบ ชีวิต ของ ไซ โอ นิก ส่วน ใหญ่ ซึ่ง มี ผู้ เสีย ชีวิต เป็น ผล ที่ เป็น ไป ได้."
 crisis.6171.a.desc.gestalt: "$crisis.6171.a.desc.intro$\n\nแม้ ว่า จังหวะ เหล่า นี้ มี ระยะ เวลา สั้น ๆ แต่ ก็ ดู เหมือน จะ ก่อ ความ เจ็บ ปวด แสน สาหัส แก่ รูป แบบ ชีวิต แบบ ไซ โอ นิก ใด ๆ. แม้แต่กลุ่มของพวกเราเอง อาจจะไม่สามารถปลดปล่อย จากปรากฏการณ์ดังกล่าวได้"
 crisis.6171.b.desc.intro: "เครื่องยนต์อะเธ โร บิกของเราเกือบเสร็จสมบูรณ์ ทําให้เกิดความเครียดอย่างน่าทึ่งบนชรูด ซึ่งบางส่วนได้ยุบลงบนตัวมันเอง ชีพจรของพลังงานไซโอนิค กําลังไหลเข้าไปในความเป็นจริงของเรา กวาดไปทั่วกาแลคซีที่ความเร็วตกใจ\n\nแม้ว่าชีพจรจะสั้น แต่ส่วนใหญ่แล้วมันเจ็บปวดมาก"
 crisis.6171.b.desc.organic_non_gestalt: "$crisis.6171.b.desc.intro$มียาหลอนประสาท ใน บาง กรณี มัน อาจ ถึง กับ ทํา ให้ ถึง ตาย...\n\nโชคดีที่เราเตรียมพร้อมสําหรับผลลัพธ์นี้ และเครื่องยนต์ได้ถูกปรับให้ป้องกัน"
 crisis.6171.b.desc.machine_non_gestalt: "$crisis.6171.b.desc.intro$สิ่งมีชีวิตไซโอนิค ที่มีผลร้ายแรงในกรณีที่รุนแรง\n\nโชคดีที่เราเตรียมพร้อม สําหรับผลลัพธ์นี้ และเครื่องยนต์ได้รับการปรับ เพื่อป้องกันหน่วยไซโอนิคของเราเอง"
 crisis.6171.b.desc.gestalt: "$crisis.6171.b.desc.intro$สิ่งมีชีวิตไซโอนิค ที่มีผลร้ายแรงในกรณีที่รุนแรง\n\nโดยการปรับเครื่องยนต์อย่างระมัดระวัง เราได้เตรียมตัวเองกับความเสี่ยงดังกล่าว และสามารถดําเนินการตามแผน"
 crisis.6171.a.organic_non_gestalt: "ชะตากรรมที่น่ากลัว"
 crisis.6171.a.machine_or_gestalt: "ความเสี่ยงที่จําเป็น"

 utopia.3000.20.desc:0 "ชรูดไม่ใช่สิ่งที่มันเคยเป็น มีบางอย่างผิดปกติมาก"
 utopia.3000.21.desc:0 "สิ่ง มี ชีวิต ที่ อยู่ ภาย ใน พุ่ม ไม้ มี ความ ทุกข์ ทรมาน. ความหวาดกลัวที่ครอบงําทุกสิ่ง"
 utopia.3000.22.desc:0 "มันยากนะที่จะมีสมาธิ ทุกอย่างกําลังฟลุกซ์ และมันมี... ความเจ็บปวดมากมาย"
 utopia.3000.23.desc:0 "ทั้งส่วนของชรูด... คํา นี้ ไม่ อาจ พรรณนา ได้ อีก เลย."
 utopia.3000.24.desc:0 "ความ มืด ครึ้ม กําลัง แผ่ ไป ทั่ว พุ่ม ไม้ และ ทํา ให้ ทุก สิ่ง ที่ มัน สัมผัส เสื่อม เสีย."
 utopia.3000.25.desc:0 "มีการปรากฏตัวใหม่ในชรูด อิทธิพล ของ มัน มี อยู่ ทุก หน ทุก แห่ง. ทุกอย่างกําลังเปลี่ยนไป"
 crisis.6180.name:0 "ซูเปอร์โนวาที่ลึกลับ"
 crisis.6180.desc:0 "เรากําลังได้รับสัญญาณลึกลับจากสับสเปซ§H[destroyed_system.GetName]§!ระบบ ถ้าการอ่านของเราถูกต้อง ดาวหลักดูเหมือนจะได้ไปเอง ดาว เคราะห์ ทั้ง หมด ได้ ถูก ทําลาย และ ยาน อวกาศ หรือ สถานี ใด ๆ ที่ มี อยู่ ใน ระบบ ก็ คง ต้อง ถูก ทําลาย ด้วย. ดาวฤกษ์เองดูเหมือนจะได้ยุบลงในหลุมดํา\n\nรายงานที่ไม่ยืนยันระบุว่า มีผู้รอดชีวิตเพียงคนเดียวจากหายนะนี้ เรือขนาดใหญ่บางชนิดเป็นของ§H[crisis_country.GetName]§!..."
 crisis.6180.a:0 "พวกเขาทําอะไรกัน?"
 crisis.6181.name:0 "ดาวระบบดาวถูกทําลาย"
 crisis.6181.desc:0 "ทั้งหมด§H[destroyed_system.GetName]§!ระบบถูกทําลายแล้ว! ดวงดาวขนาดใหญ่ของ§H[crisis_country.GetName]§!ขึ้นดํารงตําแหน่งเหนือดาวหลัก และอย่างใดกระตุ้น สิ่งที่สามารถบรรยายได้เพียงเป็นซูเปอร์โนวา แล้วดาวก็ยุบลงเป็นหลุมดํา\n\nเฉพาะ[crisis_country.GetSpeciesName]ยานอวกาศ ซึ่งดูเหมือนว่าเป็นยาน\"§Hตัวกินดาว§!\"รอดจากหายนะ\" เห็นได้ชัดว่า[crisis_country.GetName]ตอนนี้มีทั้งเทคโนโลยี และความหมายในการทําลายระบบดาวทั้งหมด"
 crisis.6181.a:0 "มันเปลี่ยนแปลงทุกสิ่ง..."
 crisis.6182.name:0 "โปรแกรมกินดาวต่างประเทศหมายเหตุ"
 crisis.6182.desc:0 "หมายเหตุ=รายการจดหมายชื่อ§H[destroyed_system.GetName]§!ระบุว่าดาวหลักของระบบ ได้หายไปเองซูเปอร์โนวา คลื่นความถี่ขนาดใหญ่ได้ทําลายทุกอย่างในระบบ และตัวเองดาวได้ยุบลงในหลุมดํา\n\nดูเหมือนว่า§H[crisis_country.GetName]§!ตอนนี้ยังมีเทคโนโลยีกินดาว!"
 crisis.6182.a:0 "พวกเขาต้องถูกจัดการ"
 opinion_destroying_galaxy:0 "พยายาม ทําลาย กาแล็กซี"
 opinion_destroying_systems:0 "การ ทําลาย ระบบ ดาว"
 destroyed_stars_score:0 "ระบบดาวถูกทําลาย:$VALUE$"
 destroyed_galaxy_score:0 "กาแลคซีถูกทําลาย:$VALUE$"

 resolution_custodian_anti_piracy_modifier_desc: "ความเสียหายต่อโจรสลัดและผู้ก่อการ§G+20%§!\nเดือนเครดิตพลังงาน: §R-3%§!"
 resolution_custodian_united_front_modifier_desc:0 "สร้างความเสียหายให้กับฝ่ายไครซิสตอนจบเกม: §G+20%§!\nเครดิตพลังงานรายเดือน: §R-3%§!"
 MOD_COUNTRY_GDF_SHIP_ALLOYS_COST_MULT: "[GetGDFOrArmada]ค่าใช้จ่ายเรืออัลลอย"

 custodian.30.name:0 "กอง กําลัง ป้องกัน กาแลกติก"
 custodian.30.a.desc:0 "$custodian.30.intro$\n\n$custodian.30.nocrisis$"
 custodian.30.b.desc:0 "$custodian.30.intro$\n\n$custodian.30.crisis$"
 custodian.30.c.desc:0 "$custodian.30.intro$\n\n$custodian.30.warinheaven$"
 custodian.30.intro:0 "วุฒิสภาได้ให้คํามั่นในการสร้าง ของกองกําลังทหารข้ามชาติ วัตถุประสงค์ในการป้องกันของชุมชนกาแล็กติก นี่\"§Hหน่วยป้องกันกาแล็กซี่§!\"จะเกณฑ์บุคลากรจากสมาชิกของชุมชนทั้งหมด ที่ยังจําเป็นต้องบริจาคทรัพยากรในการก่อสร้างกองเรือ"
 custodian.30.nocrisis:0 "กับแบบ GDF ถูกวางอยู่ภายใต้คําสั่งโดยตรงของ§H[custodian.GetName]§!พวกกาแล็กติกคูสโตเดียนในปัจจุบัน บางคนกลัวว่าอามาดะขนาดมหึมานี้ จะสามารถใช้เป็นเครื่องมือกดขี่ได้ อย่าง ไร ก็ ตาม คน อื่น ๆ ยกย่อง สิ่ง ทรง สร้าง ของ พระ คัมภีร์ โดย กล่าว ถึง สิ่ง นั้น ว่า\"แนวป้องกันแรกของกาแล็กซี่\""
 custodian.30.crisis:0 "ด้วยกาแล็กซี่ที่ปกคลุมไปด้วยความวุ่นวาย และอยู่ภายใต้การคุกคามอย่างต่อเนื่อง โดยกองกําลังที่พยายามที่จะกําจัด ชีวิตที่รวมเข้าด้วยกันทั้งหมด พวกเขาจะอยู่ภายใต้คําสั่งของ§H[custodian.GetName]§!พวกกาแล็กติกคัสโตเดียน"
 custodian.30.warinheaven:0 "เนื่อง จาก กาแล็กซี ต่าง ๆ เต็ม ไป ด้วย สงคราม จึง หวัง กัน ว่า จี ดีเอฟ จะ ขยาย ตัว จน แข็ง แรง พอ ที่ จะ ท้าทาย แม้ แต่ กอง เรือ ขนาด ใหญ่ ที่ ถูก จักรวรรดิ ฟลอเรนซ์ โยน ไป ทั่ว ใน การ แข่งขัน กัน เล็ก ๆ น้อย ๆ ของ พวก เขา เพื่อ การ ครอบ ครอง แบบ กาแล็กซี่. พวกเขาจะอยู่ภายใต้คําสั่งของ§H[custodian.GetName]§!พวกกาแล็กติกคัสโตเดียน"
 custodian.30.a:0 "กาแล็กซีจะกลายเป็นสถานที่ที่ปลอดภัยกว่า"
 custodian.30.b:0 "เรากําลังทําหน้าที่ของเรา"
 custodian.30.c:0 "ดีสําหรับพวกเขา"
 custodian.30.d:0 "กองเรือที่น่าเวทนานี้ จะถูกทําลายไปจนหมดสิ้น"
 custodian.32.name:0 "ปฏิบัติการของแบบ GDF ต่อ"
 custodian.32.desc:0 "โดยมีสํานักงานของกาแล็กติกคัสโตเดียนในปัจจุบันว่างเปล่า กองกําลังป้องกันกาแล็กติกได้จัดตั้งโครงสร้างคําสั่งอิสระ พวกเขายังคงอุทิศตนต่อการป้องกันของชุมชน และกองบัญชาการแบบ GDF ได้สาบานที่จะรักษาการลาดตระเวนของระบบสมาชิกของพวกเขา"
 custodian.32.a:0 "การ เฝ้า ระวัง ของ พวก เขา นับ ว่า น่า ชมเชย."
 custodian.35.name:0 "GDF Reports to Custodian"
 custodian.35.desc:0 "ตามที่เราสันนิษฐานได้ สํานักงานของกาแล็กติกภาษากัสโทเดียนกองกําลังป้องกันกาแล็กติก ได้รับการพับเป็นโครงสร้างคําสั่งของเรา พวกเขาจะมองหาคําสั่งในอนาคต"
 custodian.35.a:0 "ดีมาก"
 custodian.35.tooltip:0 "ยานแบบ GDF ทั้งหมด อยู่ใต้คําสั่งของเรา"
 custodian.40.name:0 "แถบกํากับแบบ GDF"
 custodian.40.desc:0 "ตามคําสั่งของวุฒิสภาส่วนใหญ่,§Hหน่วยป้องกันกาแล็กซี่§!ถูกยุบแล้ว บุคลากรของแบบ GDF ทั้งหมดได้กลับมายังประเทศบ้านเกิดของพวกเขา และเรือรบของพวกเขาก็ถูกถอดออกจากตําแหน่ง ภายใต้การดูแลอย่างใกล้ชิดของข้าราชการวุฒิสภา"
 custodian.40.a:0 "ทางตัน"

 war_in_heaven.7.desc:1 "ตั้งแต่การปลุก§H[FirstSleeper.GetSpeciesName]§!และด้วยประชาชาติสมัยก่อน ๆ§H[From.GetSpeciesName]§!คู่ปรับ สองยักษ์ได้มีความบังเอิญ การต่อสู้และการรุกคืบเพื่ออิทธิพล สอบถามความสามารถของกันและกัน นี้มีผลต่อเนื่องของการเผชิญหน้าที่เพิ่มขึ้นในที่สุดระเบิดในการต่อสู้เปิดระหว่าง[FirstSleeper.GetSpeciesName]กองเรือและพวกมัน[From.GetSpeciesName]ตรงกับในระยะไกล ความขัดแย้งได้เพิ่มขึ้นเป็น สงครามเต็มรูปแบบระหว่าง§H[FirstSleeper.GetName]§!และ§H[From.GetName]§!.\n\nทั้งสองฝั่งกําลังเรียกร้อง การลดลงทันทีของ§Hกาแล็กติก อิมเปเรียม§!และให้สมาชิกแต่ละคนเลือกข้างในสงคราม ก่อนหน้านี้[gal_emperor.GetRulerTitle]ปราศรัยต่อวุฒิสภาอิมพีเรียลและปฏิเสธข้อเรียกร้องของพวกเขา ตอนนี้กาแล็กซี่พบตัวเองใน สงครามขนาดใหญ่สามทาง ในระดับที่ไม่เคยมาก่อน"
 war_in_heaven.7.a:1 "นี่จะเป็นช่วงเวลาที่ดีที่สุดของอิมเปอเรียม"
 war_in_heaven.7.b:1 "อิมเปอเรียมจะชนะไหม"
 war_in_heaven.7.tooltip:1 "เดอะ§Y[FirstSleeper.GetName]§!และ§Y[From.GetName]§! §Rประกาศสงคราม§!บน§Yกาแล็กติก อิมเปเรียม§!."
 war_in_heaven.13.desc3:0 "ไม่ ใช่ ทุก เชื้อ ชาติ ที่ อายุ น้อย กว่า เลือก ที่ จะ ร่วม กับ ฝ่าย ใด ฝ่าย หนึ่ง ใน สงคราม ที่ ดุ เดือด ระหว่าง จักรวรรดิ ที่ สูง อายุ. บาง คน เช่น พวก เรา ได้ รักษา ความ เป็น กลาง แต่ กําลัง เผชิญ ความ หวัง ใน การ ต่อ สู้ กับ ภัย คุกคาม ของ ผู้ ปกครอง ตาม ลําพัง หาก สงคราม ควร มา ถึง. เราได้รับการติดต่อจากตัวแทนจากจักรวรรดิอื่น ๆ เกี่ยวกับความคิดในการสร้าง§Hสันนิบาตพลังไร้สัญชาติ§!ด้วยเป้าหมายที่ชัดเจนในการต่อต้านทั้งสองฝ่ายในสงคราม\n\nในขณะที่เราเป็นกาแล็กติกภาษากัสโทเดียนปัจจุบัน เราได้รับการขอให้เป็นผู้นําลีกนี้ การยอมรับหมายถึงสงครามกับจักรวรรดิที่ถูกปลุกขึ้นมานั้นอย่างแน่นอน แต่อย่างน้อยเราก็จะมีพันธมิตรยืนเคียงข้างเรา"
 requires_no_war_in_heaven:1 "§Rสถานการณ์วุ่นวายเกินกว่าจะประกาศ กาแล็คติก อิมเปอเรียม ระหว่างสงครามในสวรรค์§!"

 operation.6000.name:0 "เริ่มการแทรกซึม"
 operation.6000.1.desc:0 "นักวิเคราะห์ของเรารวบรวมรายชื่อ เป้าหมายที่เป็นไปได้ บุคลากรเริ่มแทรกซึม[target.GetName]."
 operation.6000.2.desc:0 "คนของเรากําลังแทรกซึมเข้ามา[target.GetName]แต่ต้องระมัดระวังอย่างมาก เพื่อหลีกเลี่ยงการดึงดูดความสนใจ ของกรรมการความมั่นคงของจักรพรรดิ รายชื่อเป้าหมายที่เป็นไปได้ จะถูกรวมเข้าด้วยกันโดยนักวิเคราะห์หน่วยสืบราชการลับของเรา"
 operation.6005.name:0 "การสร้างหน้าปก"
 operation.6005.desc:0 "หลังจากการเชื่อมต่อขึ้นภายใน[target.GetName]ตอนนี้คนของเรากําลังทํางาน เพื่อยืนยันตัวตนของพวกเขา รายชื่อเป้าหมายถูกจํากัดให้แคบลง จนเหลือผู้ท้าชิงเป็นโหล"
 operation.6010.name:0 "ตั้งใจ แน่ว แน่"
 operation.6010.1.desc:0 "เราได้ระบุการขุดเจาะของจักรพรรดิ[target.Capital.GetName]ในนามของ§H[operation_target.GetName]§!ที่ทําหน้าที่ขนาดเล็กแต่สําคัญในการรักษา แอกของอิมเปอเรียมในกาแล็กซี่ การ ระบุ เป้า หมาย นี้ จะ แสดง ให้ เห็น อย่าง โจ่งแจ้ง ว่า ไม่ มี การ ขาด[target.GetRulerTitle]ปลอดภัย"
 operation.6010.2.desc:0 "เราได้ระบุอัตโนมัติ[target.GetIndividualName]บน[target.Capital.GetName]ที่ทําหน้าที่เป็นผู้ประสานงานระหว่าง[target.GetRulerTitle]และเป็นสมาชิกสภาอิมพีเรียล การ ขจัด เรื่อง นี้[target.GetIndividualName]จะเป็นชัยชนะที่เล็กแต่สําคัญ ในการต่อสู้กับการกดขี่ของกาแล็กติก อิมเปอเรียม"
 operation.6010.3.desc:0 "มันมีโดรนอัตโนมัติ[target.Capital.GetName]ที่ทําหน้าที่ในความสามารถในการประสานงานระหว่าง[target.GetRulerTitle]และเป็นสมาชิกสภาอิมพีเรียล การปิดโดรนนี้อย่างถาวร จะขัดขวางการสื่อสารภายในของอิมเปอเรียม อย่างน้อยก็จนกว่าคนมาแทนจะถูกโปรแกรม"
 operation.6010.4.desc:0 "§H[operation_target.GetName]§!,[agent_origin.GetSpeciesName]ตัวแทนของคณะกรรมการรักษาความปลอดภัยอิมพีเรียล เหมาะสมอย่างยิ่งที่[operation_target.GetHerHis]งาน[operation_target.GetSheHeCap] [operation_target.GetIsAre]รับผิดชอบต่อการจับกุมหลายร้อยคน\"ผู้แทนราษฎร\" - หลายคนทํางานให้เรา มันถึงเวลาสําหรับ ISD อาชีพที่โดดเด่นของตัวแทนนี้ ที่จะมาถึงจุดจบก่อนกําหนดและถาวร"
 operation.6010.5.desc:0 "เครื่องราชอิสริยาภรณ์คือดาบ[target.GetRulerTitle]วนเวียนอยู่บนศีรษะของสมาชิกอิมเปอเรียม และพร้อมที่จะลงมาฟ้าผ่า\n\nเราระบุตัวสายลับของอาร์มาเกดได้[agent_origin.GetSpeciesName]ในนามของ§H[operation_target.GetName]§!คนที่ดูแลการต่อต้านการก่อการร้าย การเสียชีวิตของเจ้าหน้าที่รายนี้ ยาวนานเกินกําหนด"
 operation.6010.6.desc:0 "การรักษาความปลอดภัยถูกกดรอบอนุสาวรีย์เฉพาะของ[target.GetRulerTitle]บน[target.Capital.GetName]การทําลายอนุสาวรีย์นี้จะพิสูจน์ให้กาแล็กซี่เห็นว่า ขบวนการกบฏสามารถโจมตีได้ แม้ที่ใจกลางของอิมเปอเรียม"
 operation.6010.7.desc:0 "เจ้าหน้าที่ของเราได้จัดการรักษาความปลอดภัย ในการเข้าถึงเครือข่ายของอุโมงค์ระบายน้ําใต้ดิน ด้วยระเบิดมากพอ มันก็น่าจะเป็นไปได้ ที่จะโค่นตึกไอเอสดีทั้งหมด พร้อมกับเจ้าหน้าที่ทุกคนในนั้น"
 operation.6010.8.desc:0 "กองทัพบกอิมพีเรียลได้จัดตั้งศูนย์รับสมัครบนดาวเคราะห์ ข้ามกาแล็กติกอิมเปอเรียม ที่เว็บไซต์เหล่านี้ ลูกเรือของพวกเขาเติมอันดับของอาร์มาเกด กับเยาวชนที่หลอกลวงของอิมเปอเรียม จํานวนสมาชิกรัฐจํานวนมาก พวกโง่โง่เหล่านี้จึงได้รับการเลี้ยง โกหกและเงื่อนไขที่จะเชื่อฟัง[target.GetRulerTitle].\n\nการ ทําลาย ศูนย์กลาง เหล่า นี้ หนึ่ง แห่ง จะ ส่ง ข่าวสาร ที่ มี พลัง ซึ่ง เผย ให้ เห็น ว่า คุณ เอง เป็น คน ชนิด ใด และ ได้ รับ การ ยอม รับ จาก อิม เพ เรียม นั้น มี ราคา แพง มาก."
 operation.6010.9.desc:0 "เราได้ระบุตําแหน่งตัวแปลงอวกาศแล้ว[target.Capital.GetName]ซึ่งใช้ส่งสื่อโฆษณาชวนเชื่อของจักรพรรดิ ข้ามกาแล็กติกอิมเปอเรียม ถ้าคนของเราสามารถเบี่ยงเบนการส่งสัญญาณเหล่านี้ ที่แหล่งได้ แม้ในขณะที่สั้น ๆ เราสามารถส่งผ่านวัสดุของเราเอง"
 operation.6015.name:0 "ปฏิบัติการล้มเหลว"
 operation.6015.1.desc:0 "หลังจากที่รอหลายวัน สําหรับช่วงเวลาที่ที่เหมาะสม หนึ่งในทีมซุ่มยิงของเรากําจัด§H[operation_target.GetName]§!ที่ระยะสุดขั้วโดยยิงผ่านหน้าต่างของ[operation_target.GetHerHis]ออฟฟิศ แล้ว ทีม นั้น ก็ ถอน ปืน ไรเฟิล และ กําลัง เดิน ทาง ไป ยัง จุด ถอน ตัว ก่อน ที่ จะ มี ใคร สังเกต ว่า เป้า หมาย ตก."
 operation.6015.2.desc:0 "แด่ผู้เห็นเหตุการณ์§H[operation_target.GetName]§!สูญหายเมื่อเร็ว ๆ นี้[operation_target.GetHerHis]ชีวิต ใน อุบัติเหตุ ทาง รถยนต์ ที่ น่า เศร้า เมื่อ รถยนต์[operation_target.GetSheHe] [operation_target.GetWasWere]การ เดิน ทาง เข้า ไป ดู เหมือน จะ ระเบิด เอง. เจ้าหน้าที่อิมพีเรียลต้องสงสัยแน่ ว่ามีการก่อความไม่สงบ แต่ยังมีวัตถุระเบิดอีกไม่พอ"
 operation.6015.3.desc:0 "การเฝ้าดูบ้านส่วนตัวของเป้าหมาย เผยให้เห็นข้อบกพร่องของความปลอดภัย ในแผงควบคุมที่ใช้เปิดประตูหน้า เจ้าหน้าที่ของเราได้วางแผนให้แผงควบคุม จุดระเบิดพลังงานที่มีประสิทธิภาพเมื่อใช้ เมื่อ§H[operation_target.GetName]§!กลับมาบ้านไม่นานหลังจากนั้นและใช้แผง[operation_target.GetSheHe]แหลกเป็นกองขี้เถ้าด้านหน้า[operation_target.GetHerHis]แปลกใจรายละเอียดการคุ้มกัน"
 operation.6015.4.desc:0 "ทีมฆ่ายุทธวิธีบุกโจมตีเป้าหมาย และคุ้มกันได้สําเร็จ[from.target.GetIndividualNamePlural]หลังจากยิงสั้นและฝ่ายเดียว คนของเราทุกคนหลบหนีไปอย่างปลอดภัย และตอนนี้กําลังซ่อนตัวอยู่ จนกว่าจะมีความปลอดภัยในการอพยพ"
 operation.6015.5.desc:0 "โดรนนักฆ่านักล่าของเป้าหมาย ทําให้การโจมตีด้านหน้าเป็นไปไม่ได้ ดังนั้นต้องใช้วิธีอื่น เจ้าหน้าที่ของเราตั้งโปรแกรม เรือบรรทุกแสงอัตโนมัติเพื่อชนกับกระสวยส่วนตัวของ เป้าหมายของโดรน ในขณะที่มันเหลือพื้นที่ออร์บิทัลไม่ว่างของ[target_country.Capital.GetName]สําหรับภารกิจที่อื่นในอิมเปอเรียม การระเบิดที่เป็นผลมานั้น มีอํานาจมากพอ ที่ไม่พบร่องรอยแกนความทรงจําของโดรน"
 operation.6015.6.desc:0 "ด้วยความแม่นยําของปฏิบัติการ เครือข่ายของระเบิดขนาดเล็กที่สร้างขึ้นโดยเจ้าหน้าที่ของเรา ตัดการสนับสนุนของอนุสาวรีย์ที่[target_country.GetRulerTitle]บน[target_country.Capital.GetName]จาก นั้น รูป ปั้น ขนาด มหึมา ก็ ค่อย ๆ หัก พัง ลง มา จาก เวที และ แตก เป็น ชิ้น ๆ นับ ล้าน ชิ้น ขณะ ที่ ชน พื้น. เมื่อ เจ้า หน้าที่ ท้อง ถิ่น มา ถึง ใน เหตุ การณ์ คน ของ เรา ก็ กําลัง จะ ไป ยัง จุด ตรวจ สอบ ของ พวก เขา."
 operation.6015.7.desc:0 "เมื่อวัตถุระเบิดใต้ดินถูกจุดระเบิด อาคารสํานักงานไอเอสดีทั้งหมดก็หายไปในปล่องภูเขาไฟที่ก่อตัวขึ้นใหม่ เมื่อ ISD กําลังเสริมมาถึง เพื่อตั้งแนวรบรอบพื้นที่ คนของเราถูกย้ายออกจากโลกอย่างปลอดภัย"
 operation.6015.8.desc:0 "เครือข่ายของวัตถุระเบิด ที่ถูกปกปิดไว้อย่างดี โดยเจ้าหน้าที่ของเรา บริเวณบริเวณศูนย์ปฏิรูป จุดระเบิดเป็นระเบิด การ สืบ พันธุ์ นั้น หนัก มาก และ แม้ ว่า กอง เรือ อาร์ม า ดา ของ จักรพรรดิ จะ เป็น ที่ แน่นอน ที่ จะ พบ ผู้ ที่ จะ รับ คน ใหม่ ซึ่ง จําเป็น ต้อง มี ณ ที่ อื่น ๆ ใน เขต อิมเป เรียม แต่ นี่ เป็น การ ระเบิด โดย นัย ซึ่ง จะ รู้สึก ได้ จาก[target_country.GetRulerTitle]สักพัก"
 operation.6015.9.desc:0 "หลังการติดต่อกับตัวแปลงอวกาศผู้ทํางานของเราอัปโหลดรุ่นที่ปริญญาเอกของที่อยู่สาธารณะล่าสุดที่ทําโดย[target_country.GetRulerTitle]ก่อนที่วุฒิสภาอิมพีเรียล ในเวอร์ชันนี้ สุนทรพจน์มีภาษาหยาบคายและลามก กํากับที่วุฒิสมาชิกงงงันในที่สุดสรุปด้วย[target_country.ruler.GetHerHis]การปะทุของสมเด็จพระจักรพรรดิ"
 operation.6015.10.desc:0 "หลังการติดต่อกับตัวแปลงอวกาศผู้ทํางานของเราอัปโหลดรุ่นที่ปริญญาเอกของที่อยู่สาธารณะล่าสุดที่ทําโดย[target_country.GetRulerTitle]ก่อนที่วุฒิสภาอิมพีเรียล ในเวอร์ชันนี้ สุนทรพจน์ประกอบด้วยภาษาหยาบคายและลามก กํากับที่วุฒิสมาชิกงงงงและมันสรุปด้วย[target.GetGovernmentName]การประกาศการค้นพบของทาอานกิขนาดใหญ่ ที่จะทําลายอิมเปอเรียม"
 operation.6015.11.desc:0 "หลังการติดต่อกับตัวแปลงอวกาศผู้ทํางานของเราอัปโหลดรุ่นที่ปริญญาเอกของที่อยู่สาธารณะล่าสุดที่ทําโดย[target_country.GetRulerTitle]ก่อนที่วุฒิสภาอิมพีเรียล ในเวอร์ชันนี้ สุนทรพจน์นี้ประกอบด้วยภาษาที่หยาบคายและลามก กํากับที่วุฒิสมาชิกที่สับสน และได้สรุปด้วยปัญญาเครื่องประกาศการโอนสติทั้งหมด"
 operation.6016.name:0 "ผู้ก่อการร้ายอันเดอร์มีน ผู้กุมอํานาจจักรวรรดิ!"
 operation.6016.1.desc:0 "หน่วยงานที่ไม่ระบุตัวตน เมื่อเร็วๆนี้ ลอบสังหารเครื่องราชอิสริยาภรณ์ของจักรพรรดิ[Root.Capital.GetName]ผู้กระทําผิดหลบหนีการจับกุม แต่เราเชื่อว่าการลอบสังหาร เป็นส่วนหนึ่งของความพยายามร่วมในการทําให้กาแล็กทริกซ์ระเบิด หนึ่งในรัฐสมาชิกอิมเปอเรียม อยู่เบื้องหลังเรื่องนี้"
 operation.6016.2.desc:0 "เจ้าหน้าที่ระดับสูงของคณะกรรมการความมั่นคงของจักรพรรดิ ถูกลอบสังหารเมื่อเร็ว ๆ นี้ โดยตัวแทนที่ทํางานให้กับ อํานาจที่ไม่รู้จัก! การวิเคราะห์ที่ ISD คิดว่ามันน่าจะเป็นความพยายาม โดยหนึ่งในรัฐสมาชิกของอิมเปอเรียม[Root.GetRulerTitle]และอาจจะตั้งเวทีสําหรับการกบฏเปิดกับการปกครองของเรา!"
 operation.6016.3.desc:0 "เจ้าหน้าที่หน่วยสืบราชการลับระดับสูง ในกองทัพบกอิมพีเรียล เพิ่งถูกลอบสังหารโดยเจ้าหน้าที่ ที่ทําหน้าที่แทนอํานาจที่ไม่ทราบชื่อ การ กระทํา อัน น่า อับอาย เช่น นี้ เกี่ยว กับ การ ก่อ การ ร้าย ดู เหมือน เป็น ส่วน หนึ่ง ของ ความ พยายาม ที่ ยิ่ง ใหญ่ กว่า เพื่อ บ่อน ทําลาย อํานาจ ของ เรา โดย รัฐ สมาชิก ที่ ไม่ ภักดี ของ อิม เป เรียม."
 operation.6016.4.desc:0 "เมื่อเร็ว ๆ นี้ผู้ประกาศยกเลิก เป็นหนึ่งในผู้ประสานงานอัตโนมัติของเรา! การ สิ้น สุด ของ คน โสด[root.GetIndividualName]ปกติไม่คุ้มค่ากับการให้ความสนใจ[Root.GetRulerTitle]แต่นี้[root.GetIndividualName]ทําหน้าที่สําคัญในฐานะเอกอัครราชทูตของจักรพรรดิ ต่อชาวโลกหลายชาติ การกระทํานี้ได้พยายามที่จะทําให้แกแล็กติก อิมเปอเรียมอ่อนแอ"
 operation.6016.5.desc:0 "กลุ่มก่อการร้ายไม่ระบุตัวตน ได้ยุติการประสานงานของโดรน หน่วยนี้มีส่วนรับผิดชอบในการรวมกิจกรรมระหว่าง[Root.GetRulerTitle]และรัฐสมาชิกอิมพีเรียล ผู้แทนถูกโปรแกรมไว้ แต่สําหรับตอนนี้ การสูญเสียโดรนนี้ จะทําให้การควบคุม อิมเปอเรียมของเราอ่อนลง"
 operation.6016.6.desc:0 "อนุสาวรีย์ขนาดใหญ่เพื่อ[Root.GetRulerTitle]เพิ่งถูกระเบิด[Root.Capital.GetName]ไม่! การจู่โจมอย่างไร้ยางอายที่หัวใจของกาแล็กติก อิมเปอเรียม เป็นเพียงความพยายาม ที่จะทําลายการปกครองของเรา แม้ว่าจะไม่มีผู้ต้องสงสัยถูกจับ แต่ความซับซ้อนของวัตถุระเบิด บ่งชี้ว่ามีหน่วยงานราชการอยู่เบื้องหลัง"
 operation.6016.7.desc:0 "สํานักงาน สาขา ของ คณะ กรรมการ รักษา ความ ปลอด ภัย แห่ง จักรพรรดิ ถูก ทําลาย ใน การ ทิ้ง ระเบิด เมื่อ เร็ว ๆ นี้ โดย เจ้า หน้าที่ ต่าง ชาติ. การกระทําก่อการร้ายนี้ ได้เป็นอันตรายต่อภาพพจน์ของประชาชนของ ISD ทั่วอิมเปอเรียม ถ้าพวกเขาไม่สามารถปกป้องตัวเอง[Root.GetRulerTitle]?"
 operation.6016.8.desc:0 "หนึ่งในศูนย์รับสมัครของจักรพรรดิมาดริด คือเป้าหมายล่าสุดของผู้ก่อการร้าย แม้ว่าผลกระทบที่แท้จริง ต่อความพยายามรับสมัครของอาร์มาเกด ควรจะเป็นไปไม่ได้ การทิ้งระเบิดดูเหมือนจะได้รับการตั้งใจ[Root.GetRulerTitle]."
 operation.6016.9.desc:1 "เจ้าหน้าที่ที่ทําหน้าที่ในนาม ของอํานาจที่ขัดกับล่าสุด แฮ็คเข้าไปในระบบการย้ายอวกาศบน[Root.Capital.GetName]. ก่อนที่การควบคุมของเราจะกลับมาเหมือนเดิม ผู้ก่อการกบฏได้ส่งต่อ\"การก่อกบฏ\" ทั่วกาแล็กซี่ โดยใช้คลื่นยานขนส่งของจักรพรรดิอย่างเป็นทางการ! การ กระทํา อัน น่า อับอาย เช่น นี้ ของ ผู้ ก่อ การ ร้าย ได้ บ่อน ทําลาย อํานาจ ของ เรา ใน ทัศนะ ของ สมาชิก ของ อิมเป เรียม."
 operation.6016.a:0 "สวะเรเบล"

 operation.6100.name:0 "กําลังเชื่อมโยงขึ้น"
 operation.6100.desc:0 "คนของเรากําลังพยายามเชื่อมโยง กับกลุ่มกบฏอื่น ๆ และรัฐบาลที่ร่วมใช้เป้าหมายของเรา ในการโค่นล้มอิมเปอเรียม"
 operation.6105.name:0 "การ คุกคาม"
 operation.6105.1.desc:0 "ความรู้เรื่องการก่อกบฏที่กําลังจะเกิดขึ้นของเรา ต้องถูกปิดกั้นจากอิมเปอเรียม และตัวแทนของอิมเปอเรียมให้นานที่สุดเท่าที่จะทําได้ ทรัพย์สินของอิมพีเรียลกําลังพุ่งเป้าไปที่กาแล็กซี่"
 operation.6105.2.desc:0 "ความรู้เรื่องการก่อกบฏที่กําลังจะเกิดขึ้นของเรา ต้องถูกปิดกั้นจากอิมเปอเรียม และตัวแทนของอิมเปอเรียมให้นานที่สุดเท่าที่จะทําได้ เครื่องราชอิสริยาภรณ์ของสมเด็จพระจักรพรรดิ กําลังพุ่งเป้าไปที่กาแล็กซี่"
 operation.6110.name:0 "ตําแหน่ง"
 operation.6110.desc:0 "ผู้ภักดีของจักรพรรดิ และผู้ด้อยโอกาสอื่นๆ[target.GetRulerTitle]ในแต่ละรัฐสมาชิกของอิมเปอเรียม ผู้ ภักดี เหล่า นี้ ต้อง อยู่ ใน ฐานะ ที่ จะ ยึด เอา ทันที หรือ มิ ฉะนั้น ก็ ทํา ให้ ผู้ ภักดี เหล่า นี้ หมด ไป ใน ยาม ที่ เกิด การ กบฏ."
 operation.6115.name:0 "การ เตรียม ขั้น สุด ท้าย"
 operation.6115.desc:0 "ทุกอย่างใกล้ถึงแล้ว มีผู้ประสานงานอยู่ในทุกรัฐสมาชิกของอิมเปอเรียม ประสานงานกับองค์ประกอบท้องถิ่น มันยังคงต้องดูว่าพวกเขา สามารถแกว่งรัฐบาลของพวกเขา เพื่อสนับสนุนสาเหตุของเรา"
 operation.6120.name:0 "พร้อม ที่ จะ ติด ต่อ"
 operation.6120.desc:0 "ได้เวลาแล้ว หน่วยงานที่ถูกปกปิดไว้ทั่วกาแล็กซี่ กําลังรอรหัสที่จะส่งพวกเขาเข้าสู่ปฏิบัติการ นี่คือจุดเริ่มต้นของการสิ้นสุดของกาแล็กติกอิมเปอเรียม"

 operation.6200.name:0 "ที่อยู่ติดต่อ"
 operation.6200.desc:0 "เจ้าหน้าที่ของเรากําลังทํางานเพื่อระบุ และติดต่อกับอาชญากรภายใน§H[target.GetName]§!นั่นจะง่ายต่อการให้ความช่วยเหลือของเรา"
 operation.6201.name:0 "ตั้งค่าที่อยู่ติดต่อเรียบร้อยแล้ว"
 operation.6201.1.desc:0 "เราได้ติดต่อกับกลุ่มที่พลุกพล่าน[target.GetSpeciesName]โจรสลัด นักฆ่าที่โหดร้ายเหล่านี้ เต็มใจยอมรับอาวุธและเรือของเรา แม้ว่าเราจะไม่มีทางควบคุมพวกเขา"
 operation.6201.2.desc:0 "เราได้ทําการติดต่อกับกลุ่มเล็ก ๆ ของหน่วยงานที่ผิดพลาด ที่ได้แยกตัวเองจากศูนย์ปัญญาของ§H[target.GetName]§!สิ่งเหล่านี้ไม่เสถียรและคาดเดาไม่ได้[target.GetSpeciesNamePlural]มีความยินดีที่จะรับอาวุธและเรือของเรา ถึงแม้ว่าเราจะควบคุมพวกมันไม่ได้ เมื่อมันถูกปล่อยออกมา"
 operation.6201.3.desc:0 "เราได้จัดตั้งการติดต่อกับกลุ่มเล็ก ๆ ของพวกกลายพันธุ์ที่ถูกขับไล่ ที่ได้จัดการเพื่อตัดการเชื่อมต่อของพวกเขากับ[target.GetGestaltEntityName]โดยไม่หมดสิ้นไป มนุษย์กลายพันธุ์ที่โหดร้ายและคาดเดาไม่ได้เหล่านี้ มีความยินดีที่จะยอมรับอาวุธและเรือของเรา"
 operation.6202.name:0 "เรือ ที่ ทํา ขึ้น"
 operation.6202.desc:0 "การขนส่งอาวุธและเรือที่ไม่มีเครื่องหมาย ที่ไม่สามารถติดตามกลับมาที่เราได้รับการลักลอบเข้าไปใน§H[target.GetName]§!โดยคนของเรา เราพร้อมที่จะส่งมอบมัน ให้พวกเอกชน"
 operation.6205.name:0 "ส่วนตัวที่ทํางานอยู่"
 operation.6205.1.desc:0 "พลทหารที่เราติดอาวุธได้ตั้งตัวเองใน§H[privateer_system.GetName]§!ระบบและพวกเขาได้เริ่มต้นทันทีเป้าหมายการขนส่งท้องถิ่น นักวิเคราะห์ของเราคาดว่า§H[target_country.GetName]§!ในไม่ช้าจะต้องเบี่ยงเบนกําลัง เพื่อรับมือกับภัยคุกคามที่ทําให้เกิดความไม่สงบภายในพรมแดน"
 operation.6205.2.desc:0 "คนโกง[target_country.GetSpeciesNamePlural]เราจัดหาเรือและอาวุธ§H[privateer_system.GetName]§!ระบบ พวกเขากําลังออกแบบทุกอย่างในระบบ ที่ไม่ได้เป็นของพวกเขาเป็นภัยคุกคาม และนักวิเคราะห์ของเราคาดหวังว่า§H[target_country.GetName]§!ในไม่ช้าจะต้องเบนพลัง เพื่อจัดการกับธาตุที่เสื่อมสภาพนี้"
 operation.6205.3.desc:0 "เดอะ[target_country.GetSpeciesName]มนุษย์กลายพันธุ์ที่เราจัดหาด้วยเรือและอาวุธ ได้ตั้งตัวเองใน§H[privateer_system.GetName]§!ระบบ จาก ที่ นั่น พวก เขา กําลัง แสวง หา ทุก สิ่ง ที่ อยู่ ใน ความ พยายาม เพื่อ หา ทรัพยากร และ สาร อาหาร. นักวิเคราะห์ของเราคาดหวังว่า สติส่วนกลางของ§H[target_country.GetName]§!ในไม่ช้าจะต้องเบี่ยงเบนกําลัง เพื่อจัดการกับภัยคุกคามที่ทําให้เกิดความไม่สงบภายในพรมแดน"
 operation.6206.name:0 "ศัตรูใน[privateer_system.GetName]!"
 operation.6206.1.desc:1 "กลุ่มพลทหารติดอาวุธหนัก ได้จัดตั้งขึ้น§H[privateer_system.GetName]§!ระบบ! มากกว่าโจรสลัดนิดหน่อย พวกชั้นต่ําพวกนี้ เริ่มเล็งเป้าไปที่เรือของเรา ผ่านระบบทันที หน่วยข่าวกรองสงสัยว่า พวกเขาถูกจัดหาด้วยเรือและอาวุธ ด้วยอํานาจภายนอก"
 operation.6206.2.desc:0 "กลุ่มเล็ก ๆ ของหน่วยที่ผิดพลาด ได้แยกตัวเองจากปัญญาหลักของ[Root.GetName]และเขา (อิบรอฮีม) ได้ลี้ภัยออกไป§H[privateer_system.GetName]§!ระบบภายในพื้นที่ของเรา หน่วยเหล่านี้กลายเป็นสิ่งปนเปื้อนที่ไม่สามารถแก้ไขได้ และตอนนี้พวกเขาใช้ยานอวกาศดิบ ที่จัดหาให้พวกเขาโดยอํานาจต่างประเทศ"
 operation.6206.3.desc:0 "การกลายพันธุ์ทางพันธุกรรมที่หาได้ยาก ในจํานวนเล็กน้อย[target.GetIndividualNamePlural]ให้พวกเขาตัดการเชื่อมต่อกับ[target.GetGestaltEntityName]โดยที่ไม่ถูกทําให้หมดสติ เป็นพวกขี้โกง[target.GetIndividualNamePlural]จะพินาศถ้าพวกเขาลงทุนไกลเกินไปจาก[target.GetGestaltEntityName]อิทธิพลที่พวกเขาได้ก่อตั้งตัวเองใน§H[privateer_system.GetName]§!ระบบภายในเขตแดนของเรา อาวุธและเรือที่พวกเขาใช้ ต้องได้รับพลังจากต่างชาติ"
 operation.6206.a:0 "ใครเป็นคนรับผิดชอบเรื่องนี้?"
 operation.6207.name:0 "ส่วนตัวมีการหมั้นแล้ว"
 operation.6207.1.desc:0 "คนที่เราทํางานด้วย§H[target_country.GetName]§!ได้ตัดความสัมพันธ์กับเราและได้เริ่มสร้างความหายนะ โดยใช้คู่อื่น ๆ บาง\n\n$operation.6207.desc.outro$"
 operation.6207.2.desc:0 "คนโกง[target_country.GetSpeciesNamePlural]เราจัดหาเรือและอาวุธมา ตัดขาดความสัมพันธ์ของเรา และเริ่มสร้างความเสียหาย โดยใช้คู่พันธ์จากแหล่งอื่น\n\n$operation.6207.desc.outro$"
 operation.6207.desc.outro:0 "เรา ระบุ ไม่ ได้ ว่า ใคร อยู่ เบื้อง หลัง ความ พยายาม นี้ แต่ ดู เหมือน ว่า พวก เขา มี เป้า หมาย ร่วม กัน. ปฏิบัติการของเราจบลงตรงนี้ทันที แต่รายงานระบุว่า[target_country.GetAdj]เส้นทางขนส่งกําลังถูกรบกวนเหมือนกัน"
 operation.6250.name:0 "การ แสวง หา จุด มุ่ง หมาย"
 operation.6250.desc:1 "แรงจูงใจภายใน§H[target.GetName]§!มี การ พยายาม อย่าง ขัน แข็ง เพื่อ ระบุ ตัว และ ติด ตาม แนว โน้ม ซึ่ง อาจ ใช้ เพื่อ ได้ รับ ความ โปรดปราน."
 operation.6251.name:0 "ปรับมุมของภาพ"
 operation.6251.desc:0 "การค้นพบมุมที่หวังดี ซึ่งอาจใช้เพื่อการบีบบังคับ แรงจูงใจกําลังสืบสวนอยู่"
 operation.6252.name:0 "ข้อมูลการรับแสง"
 operation.6252.1.desc:0 "จากความพยายามของหน่วยเฝ้าระวัง เจ้าหน้าที่ของเราได้จัดการ เพื่อหาข้อมูลที่ละเอียดอ่อน[target.GetSpeciesName]เจ้าหน้าที่ของรัฐบาล หาก จะ ปล่อย ข้อมูล นี้ ให้ แก่ สาธารณชน ทั่ว ไป แล้ว ข้อมูล นี้ จะ ปรากฏ ว่า ทํา ให้ อับอาย มาก.\n\nเรา พร้อม จะ เข้า ไป หา เจ้า หน้าที่ คน นี้ อย่าง สุขุม เพื่อ ดู ว่า จะ มี การ จัด เตรียม แบบ อื่น ที่ จะ ใช้ ได้ หรือ ไม่."
 operation.6252.2.desc:0 "เจ้าหน้าที่ของเราคนหนึ่งได้ตรวจสอบ ข้อมูลเก่าที่มี[target.GetSpeciesName]แผนบุกของต่างชาติ แม้ว่าแผนจะล้าสมัยลง และดูเหมือนเป็นการสมมุติทั้งหมด แต่มีหลายสถานการณ์ ที่เกี่ยวข้องกับการจับกุมหรือการประหารชีวิต\n\nการปล่อยแผนเหล่านี้อาจจะน่าอาย§H[target.GetName]§!คนของเราพร้อมจะเข้าไปเจรจากับรัฐบาลแล้ว"
 operation.6252.3.desc:0 "เราได้เรียนรู้ว่า บางระดับระดับสูง[target.GetSpeciesName]ทางราชการได้แอบถอดเครดิต จากงบประมาณป้องกันของพวกเขา เพื่อใช้ส่วนตัว ถ้าข้อมูลนี้กลายเป็นความรู้สาธารณะ§H[target.GetName]§!มันจะก่อให้เกิดเรื่องอื้อฉาวค่อนข้าง\n\nคนของเราพร้อมที่จะเข้าพบ เจ้าหน้าที่อย่างรอบคอบ เพื่อดูว่าจะตกลงกันได้ไหม"
 operation.6252.4.desc:0 "ความพยายามในการเฝ้าระวังของเรา เปิดเผยว่าการรุกสูง[target.GetSpeciesName]นักการทูตมีความสัมพันธ์กับ[scandal_species.GetSpeciesName]เจ้าหน้าที่สถานทูต รายละเอียดที่แน่ชัดของความสัมพันธ์นี้ หลบหนีเรา แต่เพียงการดํารงอยู่ของมัน จะเป็นสิ่งที่น่าอายอย่างมาก\n\nเรามีคนเตรียมพร้อม ที่จะเข้าหานักการทูต ด้วยความรอบคอบที่จะบรรลุข้อตกลง"
 operation.6252.5.desc:0 "คนของเราได้หลักฐานว่า สมาชิกที่โดดเด่นของ[target.GetSpeciesName]รัฐบาลผูกพันธ์กับองค์กรโจรสลัด ในเขตแดนของพวกเขา จากที่เราบอกได้ เจ้าหน้าที่คนนี้ให้ข้อมูล ที่ละเอียดอ่อนเกี่ยวกับเส้นทางการค้าภายใน\n\nหาก เรา เก็บ หลัก ฐาน นี้ ไว้ กับ ตัว เอง เจ้า หน้าที่ รัฐบาล คง จะ รู้สึก ขอบคุณ อย่าง ยิ่ง..."
 operation.6252.6.desc:0 "เดอะ§H[target.GetName]§!เก็บรักษาเอกสารกว้างขวางเกี่ยวกับผู้นําทางการเมืองในจักรวรรดิเพื่อนบ้าน ซึ่งหลายฉบับมีรายละเอียดและความคิดเห็น เจ้าหน้าที่ของเราได้จัดการ เก็บสําเนาไฟล์พวกนี้ไว้\n\nชื่อเสียงของ[target.GetName]คงจะทรมานถ้าไฟล์เหล่านี้ ถูกแบ่งปันกับเพื่อนบ้านของพวกเขา แต่เจ้าหน้าที่ของเรา พร้อมที่จะเสนอข้อตกลงที่แตกต่างออกไป"
 operation.6252.7.desc:0 "ผู้นําโดรนอัตโนมัติภายใน§H[target.GetName]§!มี การ แสดง พฤติกรรม ที่ แปลก ประหลาด ซึ่ง ดู เหมือน มี ความ พยายาม อย่าง ยิ่ง ที่ จะ หลบ ซ่อน จาก คน รุ่น เดียว กัน. ไม่ ว่า สิ่ง นี้ จะ เกิด จาก การ โปรแกรม ที่ ผิด พลาด หรือ การ ขยาย ตัว ของ บุคลิก ลักษณะ ที่ ซับ ซ้อน ขึ้น เรื่อย ๆ โดรน คง จะ เผชิญ การ ปฏิรูป ถ้า หน่วย ข้อมูล กลาง ของ เครื่อง นั้น สังเกต เห็น.\n\nเราสามารถเข้าใกล้โดรน และสัญญาว่า จะรักษาการสังเกตของเรา กับตัวเอง"
 operation.6252.8.desc:0 "เดอะ§H[target.GetName]§!ยัง คง เก็บ บันทึก ข้อมูล มาก มาย เกี่ยว กับ ผู้ นํา ทาง การ เมือง ใน จักรวรรดิ ใกล้ เคียง ซึ่ง หลาย คน มี คํา พูด ที่ ละเอียด และ ไม่ แยแส เกี่ยว กับ ความ สามารถ ใน การ คิด ของ ตน จาก[target.GetGovernmentName]จุดของมุมมอง เจ้าหน้าที่ของเราได้จัดการ เก็บสําเนาไฟล์พวกนี้ไว้\n\nชื่อเสียงของ[target.GetName]คงจะทรมานถ้าไฟล์เหล่านี้ ถูกแบ่งปันกับเพื่อนบ้านของพวกเขา แต่เจ้าหน้าที่ของเรา พร้อมที่จะเสนอข้อตกลงที่แตกต่างออกไป"
 operation.6252.9.desc:0 "ตามที่คนของเราสังเกต หนึ่งในผู้นําอิสระใน[target.GetName]ได้แสดงพฤติกรรมที่บอกว่า บางครั้งมันหลงจากความต้องการของ[target.GetGovernmentName]ใน การ มุ่ง ติด ตาม เป้า หมาย ส่วน ตัว เช่น การ ได้ มา ซึ่ง ทรัพย์ สมบัติ เล็ก ๆ น้อย ๆ. ถ้า[target.GetGestaltEntityName]เรียนรู้จากนี้ ผลกระทบสําหรับนี้[target.GetIndividualName]จะรุนแรงมาก\n\nเราสามารถเข้าใกล้[target.GetIndividualName]และสัญญาว่าจะคอยสังเกตตัวเอง เพื่อแลกเปลี่ยนกับความช่วยเหลือ"
 operation.6255.name:0 "สําเร็จ"
 operation.6255.desc:0 "เรา ได้ บรรลุ ถึง การ จัด เตรียม ที่ เป็น ประโยชน์ ร่วม กัน โดย มี การ ติด ต่อ กัน ของ เรา ใน การ ประชุม§H[From.target.GetName]§!เพื่อ แลก กับ ความ รอบคอบ ของ เรา เรา ได้ รับ คํา สัญญา เกี่ยว กับ ความ โปรดปราน ทาง การ ทูต บาง อย่าง ใน อนาคต."

