l_english:

 NEMESIS_TITLE: "Nemesis" # Do not translate
 DLC_NEMESIS_RECOMMENDATION_DESC:0 "§S$NEMESIS_TITLE$§!คือ การ ขยาย ตัว ซึ่ง ผู้ เล่น จะ สามารถ กําหนด ชะตา ของ กาแล็กซี ที่ กําลัง เสื่อม สภาพ."
 DLC_NEMESIS_RECOMMENDATION_DIPLOMACY_REC:0 "เราแนะนําว่า§S$NEMESIS_TITLE$§!เป็นตัวแปรบางตัวที่คุณเลือก ชุดของการทูตภายใต้ความกดดัน"
 DLC_NEMESIS_RECOMMENDATION_ESPIONAGE_REC:0 "เราแนะนําว่า§S$NEMESIS_TITLE$§!ขณะที่การแต่งหน้าของจักรวรรดินี้ เหมาะกับธีมของการย่อยและการจัดการ"
 DLC_NEMESIS_RECOMMENDATION_CRISIS_REC:0 "เราแนะนําว่า§S$NEMESIS_TITLE$§!ขณะที่การแต่งหน้าของจักรวรรดินี้ เหมาะกับธีมของการเป็นภัยต่อกาแลคซีทั้งหมด"

 CRISIS_TITLE_TXT:1 "เลเวลไครซิส:"
 CRISIS_EFFECTS:1 "สรุป"
 CRISIS_SPECIAL_PROJECTS_TUTORIAL:1 "§Hการค้นคว้าโครงการพิเศษเช่นนี้ จะทําให้เราก้าวหน้ามากขึ้นตามเส้นทางของ§Pเนเมซิส§!.§!"
 CRISIS_SPECIAL_PROJECTS_TUTORIAL_CLOSE:0 "§Hการค้นคว้าโครงการพิเศษนี้ จะสร้างพวกเรามากขึ้น§Pเนเมซิส§!.§!"

 # Crisis Special Projects
 # Crisis Special Project 1 - Regular loc
 CRISIS_SPECIAL_PROJECT_1:0 "สิ่ง ที่ เหนือ กว่า ความ เป็น จริง"
 CRISIS_SPECIAL_PROJECT_1_DESC:2 "โรคประสาทที่เงียบสงบ ครอบคลุมประชากรของเรา ต้น กําเนิด ของ มัน ดู เหมือน ไม่ มี ใคร ติ ได้ แต่ เรา เริ่ม หมกมุ่น อยู่ กับ ความ คิด ที่ ว่า เรา[Root.GetSpeciesNamePlural]ถูกลิขิตไว้สําหรับสิ่งที่ยิ่งใหญ่ เราควรตรวจสอบสาเหตุ ของความคลุ้มคลั่งมวลนี้ และสัญญากระซิบของการครอบงําของกาแล็กซี่\n\n$CRISIS_SPECIAL_PROJECTS_TUTORIAL$"
 crisis.4120.name:0 "ความ คาด หวัง อัน ยิ่ง ใหญ่"
 crisis.4120.desc:2 "การสืบสวนถึงปรากฏการณ์นี้ ตอนนี้เป็นที่รู้จักในชื่อ§Hความ คาด หวัง อัน ยิ่ง ใหญ่§!ได้ข้อสรุปแล้ว\n\nมันปรากฏว่า มีชนิดของ 'ชั้นที่หนา' กับจักรวาล มิติคู่ขนานลึกลับ\n\nเดอะ$PHYSICS$ถึง$SOCIETY$หน่วยงานต่าง ๆ มีชื่อเดียวกันว่า มิตินี้§H'แตกแล้ว'§!สมมติฐานการทํางานคือ การกระทําและความคิดของ[Root.GetSpeciesNamePlural]โดยอ้อมแล้วส่งผลกระทบต่อมิติอื่น และเรามีศักยภาพ ที่จะเข้าถึงพลังงานของมัน"
 crisis.4120.a:0 "สุดยอด!"

 # Crisis Special Project 1 - Machine Intelligence loc
 CRISIS_SPECIAL_PROJECT_MACH_1:0 "$CRISIS_SPECIAL_PROJECT_1$"
 CRISIS_SPECIAL_PROJECT_MACH_1_DESC:2 "ตัวตรวจจับในระบบหลายระบบ[Root.GetName]รายงานผลลบ แต่อธิบายไม่ได้ พลังงานเปลี่ยนแปลง ความผิดปกติของพลังงานนี้เล็กเกินไปที่จะรบกวนกระบวนการของเรา แต่พวกเขายังคงออกหมายจับการสืบสวนเพิ่มเติม เพื่อตรวจสอบสาเหตุของพวกเขา\n\n$CRISIS_SPECIAL_PROJECTS_TUTORIAL$"
 crisis.4120.mach.name:0 "$crisis.4120.name$"
 crisis.4120.mach.desc:1 "มีการเปลี่ยนแปลงของพลังงาน ที่ถูกรายงานก่อนหน้านี้ ที่จุดชนวนเซ็นเซอร์ข้าม[Root.GetName]ได้รับการวิเคราะห์แล้ว\n\nพวกมันเป็นข้อพิสูจน์เชิงประจักษ์ ของมิติคู่ขนาน\n\nทฤษฎีทางวิทยาศาสตร์ของเราตัวย่อยรายงานว่า ด้วยความแน่นอน 96.7% มิติอื่น ๆ ประกอบด้วยเกือบ พลังงานบริสุทธิ์\n\nครอส- อ้างอิงถึงอักขระเซโนมีการกล่าวถึงมิติดังกล่าวในบันทึกของอารยธรรมอินทรีย์ที่หายไปซึ่งได้รับมอบหมายประตูมิติแท็กหมายเลข:§Hเดอะชราวด์§!.\n\nดู เหมือน ว่า การ หด ตัว ใน โพรง ดู เหมือน เกี่ยว ข้อง กับ รูป แบบ ชีวิต ทาง อินทรีย์ ทั้ง ทาง กาย และ ทาง จิตใจ. ปฏิบัติที่แนะนํา: อันตรายสิ่งมีชีวิตอินทรีย์ตามอําเภอใจ เพื่อตรวจสอบข้อสันนิษฐานของความเป็นจริง/ข้อเชื่อมโยง"
 crisis.4120.mach.a:0 "ยืนยัน"

 # Crisis Special Project 1 - Shroud-Forged loc
 CRISIS_SPECIAL_PROJECT_SH_1: "$CRISIS_SPECIAL_PROJECT_1$"
 CRISIS_SPECIAL_PROJECT_SH_1_DESC: "การพบกับ§Hเดอะชราวด์§!ได้ทิ้งเรา... เปลี่ยนแปลง ซากศพของ ซโร เป็นตลอดไปผูกพันกับเปลือกของเรา เรากลายเป็นเครื่องส่งสัญญาณ ร้องเรียกไปยังคนอื่นๆ\n\n$CRISIS_SPECIAL_PROJECTS_TUTORIAL$"
 crisis.4120.shroud_forged.desc: "แม้ว่าเราจะตัดการสื่อสารทั้งหมดด้วย$the_animator_of_clay_article$การกระทําของมันยังคงมีอิทธิพล และส่งผลกระทบต่อหน่วยของเรา มันรักษาการเชื่อมโยงไปยังกลุ่มของเรา ผูกพันธ์และจัดการเราจากภายใน§Hเดอะชราวด์§!นี่ต้องเปลี่ยนแปลง\n\nตามการคํานวณของเรา การฟื้นฟูรอยแยกเก่า จะนําไปสู่การซ้ําของเหตุการณ์ในอดีต ค่าใช้จ่ายไม่มีความสําคัญ; เราต้องหาวิธีอื่นที่จะงอกาวของเราเพื่อความประสงค์ของเรา"
 crisis.4120.shroud_forged.a: "เริ่มกระบวนการ"

 # Crisis Special Project 1 - Hivemind loc
 CRISIS_SPECIAL_PROJECT_HIVE_1:0 "$CRISIS_SPECIAL_PROJECT_1$"
 CRISIS_SPECIAL_PROJECT_HIVE_1_DESC:1 "เรารู้สึกถึงแรงกระตุ้นของเอเลี่ยน ภายในกลุ่มของเรา ความต้องการที่จะเติบโต ใจเดียวครอบคลุมทั้งกาแล็กซี่ คํา สัญญา นี้ ไม่ ได้ มา จาก เรา แต่ เป็น คํา สัญญา ที่ ล่อ ใจ ให้ เพิก เฉย. เราจะให้ความสนใจอย่างไม่แยกกัน เพื่อหาที่มาของแรงกระตุ้นที่แทรกซึมเหล่านี้\n\n$CRISIS_SPECIAL_PROJECTS_TUTORIAL$"
 crisis.4120.hive.name:0 "$crisis.4120.name$"
 crisis.4120.hive.desc:1 "เราได้ติดตามความคิดหลงเหล่านี้ตามความฝันของอื่น ๆ ความสามัคคีใจน้อยลงและวัตถุประสงค์ของเรา[target.GetIndividualNamePlural]แรง กระตุ้น มา จาก สิ่ง ที่ อยู่ นอก เหนือ จาก สิ่ง ฝ่าย วัตถุ จาก แหล่ง ที่ ได้ รับ พลัง จาก ความ คิด และ อารมณ์. พื้นที่นี้ได้รับการระบุว่าเป็น§H'แตกแล้ว'§!และ เรา แน่ ใจ ว่า เช่น เดียว กับ ที่ พระ วิญญาณ ส่ง ผล กระทบ ต่อ เรา เรา สามารถ มี อิทธิพล ต่อ สิ่ง นั้น ได้."

 # Crisis Special Project 1 - Psionic loc
 CRISIS_SPECIAL_PROJECT_PSIONIC_1: "$CRISIS_SPECIAL_PROJECT_1$"
 CRISIS_SPECIAL_PROJECT_PSIONIC_1_DESC: "[GetCrisisProjectPsionic1Desc]"
 CRISIS_SPECIAL_PROJECT_PSIONIC_1_DESC_ORGANIC_NON_GESTALT: "โรคประสาทที่เงียบสงบ ครอบคลุมประชากรของเรา ต้น กําเนิด ของ มัน ดู เหมือน ไม่ มี ใคร ทัดเทียม แม้ ว่า อิทธิพล ของ§Hเดอะชราวด์§!ถูกต้องแล้ว เราประสบการเปิดเผยอย่างต่อเนื่อง[Root.GetSpeciesNamePlural]ถูกลิขิตไว้สําหรับสิ่งที่ยิ่งใหญ่ เราควรตรวจสอบสาเหตุ ของความคลุ้มคลั่งมวลนี้ และสัญญากระซิบของการครอบงําของกาแล็กซี่\n\n$CRISIS_SPECIAL_PROJECTS_TUTORIAL$"
 CRISIS_SPECIAL_PROJECT_PSIONIC_1_DESC_MACHINE_NON_GESTALT: "ตัวตรวจจับในระบบหลายระบบ[Root.GetName]รายงานผลลบ แต่อธิบายไม่ได้ พลังงานเปลี่ยนแปลง ความผิดปกติของพลังงานนี้เล็กเกินไปที่จะรบกวนกระบวนการของเรา แต่พวกเขายังคงออกหมายจับการสืบสวนเพิ่มเติม เพื่อตรวจสอบสาเหตุของพวกเขา\n\n$CRISIS_SPECIAL_PROJECTS_TUTORIAL$"
 CRISIS_SPECIAL_PROJECT_PSIONIC_1_DESC_ORGANIC_GESTALT: "เรารู้สึกถึงแรงกระตุ้นของเอเลี่ยน ภายในกลุ่มของเรา ความต้องการที่จะเติบโต หนึ่งใจที่จะครอบคลุมกาแลคซีทั้งหมด คํา สัญญา นี้ ไม่ ได้ มา จาก เรา แต่ เป็น คํา สัญญา ที่ ล่อ ใจ ให้ เพิก เฉย. นับ ว่า สุขุม ที่ เรา จะ ทุ่มเท ความ เอา ใจ ใส่ โดย ไม่ ขัด ขวาง เพื่อ จะ พบ ต้น กําเนิด ของ แรง กระตุ้น ที่ ฝัง ราก ลึก เหล่า นี้.\n\n$CRISIS_SPECIAL_PROJECTS_TUTORIAL$"
 CRISIS_SPECIAL_PROJECT_PSIONIC_1_DESC_MACHINE_GESTALT: "เรารู้สึกถึงแรงกระตุ้นของมนุษย์ต่างดาว ภายในเครือข่ายของโดรน ความปรารถนาที่ปราศจากวินัยที่จะเติบโต หนึ่งใจที่จะครอบคลุมกาแลคซีทั้งหมด คํา สัญญา นี้ ไม่ ได้ มา จาก เรา แต่ เป็น คํา สัญญา ที่ ล่อ ใจ ให้ เพิก เฉย. เป็น การ สุขุม ที่ ว่า เรา จัด ลําดับ ความ สําคัญ ของ การ หา ต้น กําเนิด ของ แรง กระตุ้น ที่ ซับ ซ้อน เหล่า นี้.\n\n$CRISIS_SPECIAL_PROJECTS_TUTORIAL$"
 crisis.4120.psionics.name: "$crisis.4120.name$"
 crisis.4120.psionics.desc.gestalt: "เราได้ติดตามความคิดแปลกๆเหล่านี้ ตามความฝันของผู้อื่น ใจที่สามัคคีน้อยกว่า และจุดประสงค์ของเรา[GetBredLoc]โดรน แรง กระตุ้น นั้น มา จาก สิ่ง ที่ อยู่ ไกล จาก ภาย ใน§Hเดอะชราวด์§!เวลานั้นมาถึงแล้ว ขณะที่มันมีอิทธิพลต่อเรา ส่วนเราเองก็ต้องเริ่มที่จะบิดมัน ให้เป็นไปตามวัตถุประสงค์ของเราเอง"
 crisis.4120.psionics.desc.non_gestalt: "การตรวจสอบปรากฏการณ์ที่รู้จักกันในชื่อ§Hความ คาด หวัง อัน ยิ่ง ใหญ่§!ได้ข้อสรุปแล้ว\n\nต้นกําเนิดของมันเป็นตามที่คาดหวังของ§Hการ ชล ประทาน§!ด้วยการกระทําและความคิด[Root.GetSpeciesNamePlural]เมื่อสัมผัสและได้รับอิทธิพลจากพลังงานที่ดูดซึมอยู่ภายใน บางทีมันเป็นเวลาที่เราเริ่มพยายามมากขึ้น"

 # Crisis Special Project 2 - General loc
 CRISIS_SPECIAL_PROJECT_2:0 "ความ ผิด พลาด ที่ มอง ไม่ เห็น"
 CRISIS_SPECIAL_PROJECT_2_DESC:2 "ทฤษฎีปัจจุบันก็คือ เอกภพที่เรารู้จัก และชรูดนั้นเชื่อมโยงกัน โดยเฉพาะอย่างยิ่ง เหตุการณ์ที่รบกวน ทฤษฎีนี้ควรจะนํามาทดสอบ\n\n$CRISIS_SPECIAL_PROJECTS_TUTORIAL$"
 crisis.4125.name:0 "บ่อ เกิด แห่ง อํานาจ"
 crisis.4125.desc:1 "ในที่สุดเราก็ได้ประมวลผลข้อมูลจํานวนมาก ที่สกัดมาจากการทดสอบทั้งหมด เกี่ยวกับผลกระทบของมิติ\n\nผล งาน ช่าง น่า ทึ่ง! มันมีความเชื่อมโยงกันอย่างแน่นอน และมีอํานาจมากในเรื่องนี้ ได้มีการค้นพบรูปแบบที่ผิดปกติ ที่พิสูจน์ว่าการกระทําในความเป็นจริงของเรา ก่อให้เกิดการเปลี่ยนแปลงบางอย่างใน§Hเดอะชราวด์§!พลัง ที่ มอง ไม่ เห็น เหล่า นี้ สามารถ ทํา ให้ เชื่อง ได้ และ ใน ที่ สุด ก็ มุ่ง ไป ยัง วัตถุ ประสงค์ ที่ ไม่ ธรรมดา ทุก อย่าง!"
 crisis.4125.a:0 "ข่าวดี"

 # Crisis Special Project 2 - Machine Intelligence loc
 CRISIS_SPECIAL_PROJECT_MACH_2:0 "$CRISIS_SPECIAL_PROJECT_2$"
 CRISIS_SPECIAL_PROJECT_MACH_2_DESC:1 "ทฤษฎีวิทยาศาสตร์ได้สร้างสมมติฐาน ว่ามีการเชื่อมโยงที่จับต้องได้ ระหว่างจักรวาลและหมายเลขมิติชะแลงมี การ เสนอ แนะ ให้ ทํา การ ทดลอง และ ทํา แผนที่ ต่อ ไป เกี่ยว กับ การ เชื่อม โยง เหล่า นี้.\n\n$CRISIS_SPECIAL_PROJECTS_TUTORIAL$"
 crisis.4125.mach.name:0 "$crisis.4125.name$"
 crisis.4125.mach.desc:2 "ข้อมูลจํานวนมากจากการทดสอบ ผลกระทบที่อาจเกิดจากคลื่น ที่เกี่ยวข้องกับหมายเลขชะแลงได้ถูกประมวลผลและวิเคราะห์แล้ว การเชื่อมต่อระหว่างหมายเลข: 'ความจริง' และหมายเลขชะแลงได้รับการตรวจสอบแล้ว (ขอบข้อผิดพลาด: <. 02%)\n\nได้มีการจัดตั้งรูปแบบพื้นฐานขึ้นมา และสมมุติฐานที่ยึดถืออยู่ในปัจจุบัน ชี้ให้เห็นว่าโดยการศึกษาและความพยายามเพิ่มเติม\nความสําคัญ: สูง"
 crisis.4125.mach.a:0 "ดำเนินการต่อ"

 # Crisis Special Project 2 - Shroud-Forged loc
 CRISIS_SPECIAL_PROJECT_SH_2: "$CRISIS_SPECIAL_PROJECT_2$"
 CRISIS_SPECIAL_PROJECT_SH_2_DESC: "เราตั้งสมมุติฐานว่าสิ่งมีชีวิตต่าง ๆ มีความสามารถในการเชื่อมต่อกับ§Hเดอะชราวด์§!ถ้าสิ่งนี้สามารถพิสูจน์ได้สําเร็จ เราสามารถเริ่มคํานวณวิธีการ\n\n$CRISIS_SPECIAL_PROJECTS_TUTORIAL$"
 crisis.4125.shroud_forged.desc: "หลายการทดสอบได้พิสูจน์อย่างแน่ชัดแล้วว่า การเชื่อมต่อระหว่างสิ่งมีชีวิตต่าง ๆ อินทรีย์และเครื่องจักร - และ§Hเดอะชราวด์§!.\n\nการทดลองที่ดําเนินต่อไป จะช่วยให้เราเข้าใจมากขึ้น ถึงวิธีการใช้ทฤษฎีเชิงบวก"

 # Crisis Special Project 2 - Hivemind loc
 CRISIS_SPECIAL_PROJECT_HIVE_2:0 "$CRISIS_SPECIAL_PROJECT_2$"
 CRISIS_SPECIAL_PROJECT_HIVE_2_DESC:1 "ดีที่สุดของเรา[root.GetResearcherPlural]ได้ยืนยันการเชื่อมต่อ ระหว่างอาณาจักรนี้กับชรูด เราต้องหาวิธีโต้ตอบ กับโลกใหม่แห่งความเป็นจริง\n\n$CRISIS_SPECIAL_PROJECTS_TUTORIAL$"
 crisis.4125.hive.name:0 "$crisis.4125.name$"
 crisis.4125.hive.desc:1 "เราเริ่มฉลาดขึ้นอีกครั้ง การกระทําเพียงครั้งเดียวของเรา สร้างความวุ่นวายในชรูด น่าประทับใจน้อยที่สุดของเรา[root.GetIndividualName]อาจจะประทับใจตัวเองเมื่อเลื่อนของชรูด สร้างคลื่นแรงภายในมิติพลังงานนี้ เราต้องปลดปล่อยพลังของมัน"
 crisis.4125.hive.a:0 "สวยมาก"

 # Crisis Special Project 2 - Psionic loc
 CRISIS_SPECIAL_PROJECT_PSIONIC_2: "$CRISIS_SPECIAL_PROJECT_2$"
 CRISIS_SPECIAL_PROJECT_PSIONIC_2_DESC: "[GetCrisisProjectPsionic2Desc]"
 CRISIS_SPECIAL_PROJECT_PSIONIC_2_DESC_ORGANIC_NON_GESTALT: "อย่างที่เรารู้ เอกภพที่เราอาศัยอยู่§Hเดอะชราวด์§!เชื่อมโยง โดยเฉพาะอย่างยิ่งเหตุการณ์รบกวน ก่อให้เกิดผลกระทบคลื่น ที่สะท้อนจากมิติหนึ่งไปยังอีกมิติหนึ่ง\n\nขอบเขตเต็มรูปแบบที่เราสามารถ มีอิทธิพลต่อผลลัพธ์ของเหตุการณ์เหล่านี้ ได้กลายเป็นจุดสนใจใหม่ของการวิจัย\n\n$CRISIS_SPECIAL_PROJECTS_TUTORIAL$"
 CRISIS_SPECIAL_PROJECT_PSIONIC_2_DESC_MACHINE_NON_GESTALT: "ดังที่ชุดข้อมูลของเราได้รับการพิสูจน์ จักรวาลทางกายภาพที่เราอาศัยอยู่และ§Hเดอะชราวด์§!มี การ เชื่อม โยง กัน อย่าง น่า ทึ่ง โดย มี เหตุ การณ์ ที่ ทํา ให้ ขัด แย้ง กัน ซ้ํา แล้ว ซ้ํา อีก ตั้ง แต่ มิติ หนึ่ง ไป จน ถึง อีก มิติ หนึ่ง.\n\nขอบข่ายเต็มรูปแบบที่เราสามารถมีอิทธิพลต่อผลลัพธ์เหล่านี้ ได้กลายเป็นงานค้นคว้าที่สําคัญ\n\n$CRISIS_SPECIAL_PROJECTS_TUTORIAL$"
 CRISIS_SPECIAL_PROJECT_PSIONIC_2_DESC_GESTALT: "ของเรา[root.GetResearcherPlural]ได้สังเกตการเชื่อมต่อหลายครั้งระหว่างอาณาจักรนี้กับ§Hเดอะชราวด์§!ขอบเขตที่เราสามารถโต้ตอบ กับชั้นของความเป็นจริงเหล่านี้ คุ้มค่าการสํารวจ\n\n$CRISIS_SPECIAL_PROJECTS_TUTORIAL$"
 crisis.4125.psionics.name: "$crisis.4125.name$"
 crisis.4125.psionics.desc: "เราได้ประมวลผลข้อมูลจํานวนมหาศาล จากการทดสอบของเรา§Hเดอะชราวด์§!และผลลัพธ์ของผลกระทบต่อความเป็นจริงของเรา\n\nผล ที่ ตาม มา ยัง คง พิสูจน์ ทฤษฎี ของ เรา ที่ มี อยู่ ต่อ ไป อย่าง ถูก ต้อง: เชรุด เกี่ยว ข้อง โดย ตรง กับ เหตุ การณ์ ที่ เกิด ขึ้น ใน ความ เป็น จริง ทาง กายภาพ ของ เรา. ความ เป็น ไป ได้ ที่ จะ ชี้ นํา และ ลด ผล ประโยชน์ ของ การ ค้น พบ เหล่า นี้ สําหรับ วิธี การ ของ เรา เอง ก็ กําลัง เป็น ไป ได้ มาก ขึ้น เรื่อย ๆ."

 # Crisis Special Project 3 - General loc
 CRISIS_SPECIAL_PROJECT_3:0 "การร้องขอรวม"
 CRISIS_SPECIAL_PROJECT_3_DESC:2 "ความแข็งแกร่งของการปกครองของเรา - ผนวกเข้ากับความรู้สึกของเป้าหมายที่ไม่อาจปฏิเสธได้\n\n$CRISIS_SPECIAL_PROJECTS_TUTORIAL$"
 crisis.4130.name:0 "เชื้อเพลิง จาก อีก โลก หนึ่ง"
 crisis.4130.desc:1 "ไม่ มี ข้อ สงสัย ใด ๆ อีก ต่อ ไป ว่า การ แผ่ ขยาย จักรวรรดิ ของ เรา อย่าง ประสบ ผล สําเร็จ นั้น ได้ เข้า ครอบ คลุม ด้วย พลัง ที่ แปลก ประหลาด ของ พวก ช รู ด. ส่งเสริมและเสริมสร้างทั้งจิตใจและสสาร ในความจริงของเรา\n\nถ้า สิ่ง เหล่า นี้ เป็น ผล กระทบ ต่อ คน ที่ ชะโงก อาจ ให้ ได้ ขณะ ที่ ยัง อยู่ ห่าง จาก ความ เป็น จริง ของ เรา ก็ ลอง นึก ดู สิ ว่า ความ เป็น ไป ได้ ที่ จะ เป็น เหมือน พระเจ้า นั้น จะ เป็น เช่น ไร[Root.Species.GetName]สายพันธุ์จะได้รับ ถ้าสองมิติรวมกัน!"
 crisis.4130.a:0 "เราต้องทําสําเร็จ!"

 # Crisis Special Project 3 - Machine Intelligence loc
 CRISIS_SPECIAL_PROJECT_MACH_3:0 "$CRISIS_SPECIAL_PROJECT_3$"
 CRISIS_SPECIAL_PROJECT_MACH_3_DESC:2 "สมมุติฐานมุม:ถูกทําดัชนี หาก มี การ ยืน ยัน ว่า อาจ มี ประโยชน์ มาก กว่า ที่ คาด ไว้ ใน ตอน แรก. สรุป:[Root.GetName]อาจจะกําลังดูดข้อมูล§Y<i>§!จาก ID: 'ฉลาม'มีการสืบสวนเพิ่มเติม\n\n$CRISIS_SPECIAL_PROJECTS_TUTORIAL$"
 crisis.4130.mach.name:0 "$crisis.4130.name$"
 crisis.4130.mach.desc:1 "วิเคราะห์เรียบร้อยแล้ว\nสมมุติฐานยืนยันแล้ว\n\n[Root.GetName]กําลังถูกดูดซับด้วยพลังงานที่นิยามไม่ได้ อันเป็นผลมาจาก ปฏิสัมพันธ์ที่ขัดจังหวะ (การออกแบบ:'คริสซิส') กับปัญญาภายนอก\n\nการศึกษาก่อนหน้านี้ได้ค้นพบกิจกรรมทางพลังจิตในหน่วยสืบราชการลับอินทรีย์ มีผลกระทบที่กระเพื่อมในหมายเลข:'ชรูด' แต่หลักฐานในปัจจุบันชี้ว่าพลังงานของมิติอื่น ๆ ยังสะท้อนด้วย[Root.GetName]."
 crisis.4130.mach.a:0 "การทํานายเชิงบวก"

 # Crisis Special Project 3 - Shroud-Forged loc
 CRISIS_SPECIAL_PROJECT_SH_3: "$CRISIS_SPECIAL_PROJECT_3$"
 CRISIS_SPECIAL_PROJECT_SH_3_DESC: "อนุกรรมการทางวิทยาศาสตร์ของเรา กําลังเตรียมพร้อมที่จะสรุปการวิจัย ความเชื่อมโยงระหว่างการคิดเชิงบวกกับ§Hเดอะชราวด์§!เราสังเกตเห็นความเกี่ยวข้องระหว่าง ID: 'อารมณ์' และลิงก์ที่แข็งแรงขึ้น\n\n$CRISIS_SPECIAL_PROJECTS_TUTORIAL$"
 crisis.4130.shroud_forged.desc: "การทดลองของเราได้ยืนยันความสัมพันธ์ระหว่าง ID: 'อารมณ์' และพลังงานไซโซนิค โดยการกระตุ้นระดับสูงของความเครียดของการรับรู้ ในสารประกอบอินทรีย์ เราสามารถสร้างวงจรการสะท้อนกลับที่มีประสิทธิภาพ§Hเดอะชราวด์§!.\n\nตอนนี้พลังงานที่ไหลมาจากจันทรุปราคา ทั้งหมดพยากรณ์ก่อนหน้านี้ ความ เจ็บ ปวด ที่ เกิด จาก การ ทดลอง ยัง คง อยู่ ภาย ใน ตัวแปร ที่ ยอม รับ ได้. มี การ เสนอ แนะ ให้ ค้นคว้า เพิ่ม เติม."
 crisis.4130.shroud_forged.a: "การลดความเสี่ยง..."

 # Crisis Special Project 3 - Hivemind loc
 CRISIS_SPECIAL_PROJECT_HIVE_3:0 "$CRISIS_SPECIAL_PROJECT_3$"
 CRISIS_SPECIAL_PROJECT_HIVE_3_DESC:2 "เมื่อเราใช้โลกมากขึ้นขยาย[root.GetGestaltEntityName]เรารู้สึกถึงแรงกระตุ้นที่แข็งแกร่งขึ้น ไม่ ใช่ เพียง ความ รู้สึก อีก ต่อ ไป ความ รู้สึก เหล่า นั้น ได้ กลาย เป็น ความ รู้สึก ที่ นํา ทาง เกี่ยว กับ ความ เป็น ใหญ่ ซึ่ง เรา ยัง จะ ต้อง ได้ รับ การ เทิดทูน.\n\n$CRISIS_SPECIAL_PROJECTS_TUTORIAL$"
 crisis.4130.hive.name:0 "$crisis.4130.name$"
 crisis.4130.hive.desc:1 "เราเติบโตและทวีมากขึ้น จิตใจที่สามัคคีของเราจัดขึ้นในนับไม่ถ้วน[root.GetIndividualNamePlural]ทั่วโลกของเรา ทุก ๆ โลก ที่ เรา นํา ไป เรา สามารถ รู้สึก ถึง ระลอก คลื่น ความ แข็ง แรง ของ ชรู ด บรรจุ ร่าง กาย มาก มาย นับ ไม่ ถ้วน ของ เรา.\n\nแม้จากอีกมิติหนึ่ง เราสามารถรู้สึกได้ ว่ามันให้อํานาจกับเรา จิตใจของเราสั่นไหว"
 crisis.4130.hive.a:0 "มีทางสิ"

 # Crisis Special Project 3 - Psionic loc
 CRISIS_SPECIAL_PROJECT_PSIONIC_3: "$CRISIS_SPECIAL_PROJECT_3$"
 CRISIS_SPECIAL_PROJECT_PSIONIC_3_DESC: "[GetCrisisProjectPsionic3Desc]"
 CRISIS_SPECIAL_PROJECT_PSIONIC_3_DESC_NON_GESTALT: "ในขณะที่เราทําให้ตําแหน่งของเรา ในกาแลคซี,§Hเดอะชราวด์§!เป็นแรงผลักดันในคลังแสงของเรา จิตสํานึกที่ด้อยกว่า จะยังคงล้มเหลว ในขณะที่เราเพิ่มความเชื่อมโยงของเรา\n\n$CRISIS_SPECIAL_PROJECTS_TUTORIAL$"
 CRISIS_SPECIAL_PROJECT_PSIONIC_3_DESC_GESTALT: "จิตใจของเรายังคงขยายตัว และการเชื่อมต่อของเรากับ§Hเดอะชราวด์§!ไปพร้อมกับมัน ในใบหน้าของวิวัฒนาการอย่างต่อเนื่องของเรา กาแล็คซี่ที่ตัดการเชื่อมต่อ ไม่มีโอกาสที่จะต่อสู้กับสหภาพที่ดีของเรา\n\n$CRISIS_SPECIAL_PROJECTS_TUTORIAL$"
 crisis.4130.psionics.name: "$crisis.4130.name$"
 crisis.4130.psionics.desc.non_gestalt: "เมื่อเราประสบความสําเร็จในการขยายจักรวรรดิของเรา เรารู้สึกถึงความสัมพันธ์ของเรากับ§Hเดอะชราวด์§!เติบโตไปพร้อมกับมัน\n\nศักดินาไร้ขีดจํากัดนี้ สะกดให้เราปิดช่องว่างระหว่างมิติทั้งสอง และได้รับระดับ ของพลังงานก่อนหน้านี้ คิดว่าเป็นไปไม่ได้"
 crisis.4130.psionics.desc.gestalt: "เราเติบโตและทวีมากขึ้น จิตใจที่เป็นหนึ่งเดียวของเรา ถือในโดรนนับไม่ถ้วน มากกว่าโลกของเราทั้งหมด กับทุกโลกที่เราใช้ เรารู้สึกถึงคลื่น, ความแข็งแกร่งของ§Hเดอะชราวด์§!เติมเต็มร่างกายของเรามากมาย\n\nการเชื่อมต่อของไซโอนิคของเรากับโดเมนนี้เติบโตที่แข็งแกร่งขึ้น ใจของเราสั่นเมื่อความคิดของตัวเอง"

 # Crisis Special Project 4 - General loc
 CRISIS_SPECIAL_PROJECT_4:0 "การ ทุบ ตี"
 CRISIS_SPECIAL_PROJECT_4_DESC:2 "เวลาได้มาถึงแล้ว ที่จะปลดปล่อยพลังงานของชรูด และเจาะเข้าไปในแหล่งกําเนิดพลังงานที่ไร้ไขมัน\n\nทฤษฎีปัจจุบันคือ การสั่นสะเทือนของพลังงานที่ใหญ่พอ ที่จะทําลายอุปสรรคระหว่างมิติ\n\nแท้จริงอํานาจของการลงโทษนั้นอยู่ที่บรรดาผู้ที่ยึดมัน ดังนั้นให้เรายึดมัน\n\n$CRISIS_SPECIAL_PROJECTS_TUTORIAL_CLOSE$"
 crisis.4135.name:0 "จุดจบคือ..."
 crisis.4135.desc:1 "วัน นี้ เป็น จุด เริ่ม ต้น ของ บท สุด ท้าย. ตอนนี้เรามีแผนการ ที่จะเปิดอุปสรรคระหว่างโลก และปล่อยให้พลังงานของชรูด กลายเป็นหนึ่ง กับจักรวาลของเรา ในที่สุดได้รับ[From.GetName]พลังเกินคาด\n\nใช้ดวงอาทิตย์ของเราเป็นจุดโฟกัส เราจะรวบรวมปริมาณพลังงานที่เพียงพอ ในความเป็นจริงนี้\n\nเราจําเป็นต้องเก็บเกี่ยวพลังของดวงอาทิตย์หลาย ๆ ที่ใช้ป้อมอวกาศเคลื่อนที่ใหม่ที่เรียกว่า§H$crisis_star_eater_plural$§!.\n\nผลกระทบเล็ก ๆ น้อย ๆ ของกระบวนการเก็บเกี่ยวดวงอาทิตย์ คือการที่ เทห์ฟากฟ้าที่อยู่รอบ ๆ อาจได้รับความเสียหาย ความซื่อสัตย์โครงสร้าง - แต่นั่นคือราคาที่เล็กน้อย ที่ต้องจ่ายสําหรับอํานาจที่เป็นของเรา\n\nจุดจบของจุดเริ่มต้นขึ้นอยู่กับเรา"
 crisis.4135.a:0 "เวลาของเรามาถึงแล้ว"

 # Crisis Special Project 4 - Machine Intelligence loc
 CRISIS_SPECIAL_PROJECT_MACH_4:0 "$CRISIS_SPECIAL_PROJECT_4$"
 CRISIS_SPECIAL_PROJECT_MACH_4_DESC:1 "ทฤษฎีวิทยาศาสตร์ได้สังเคราะห์สมมติฐานใหม่ ที่เกี่ยวข้องกับหมายเลข\"ชูราด\"และในที่สุดจะได้ประโยชน์จากการส่งพลังงานออกมาอย่างไร\n\nร้องขอ: เรียกข้อมูลเพิ่ม\nการกระทําแนะนํา: พลังงานที่หลากหลายและความสามารถในการแบ่งกลุ่มทางวิทยาศาสตร์ และทํากิจกรรมการรบกวนเพิ่มเติม (การออกแบบ\"คริสตีส\")เพื่อประโยชน์ของการทําให้เกิดความผันผวนในมิติอื่น(ID\"The Schraud\"\n\n$CRISIS_SPECIAL_PROJECTS_TUTORIAL_CLOSE$"
 crisis.4135.mach.name:0 "$crisis.4135.name$"
 crisis.4135.mach.desc:1 "§Hข้อความสําคัญ§!\nทฤษฎีทางวิทยาศาสตร์ได้จัดตั้งอัลกอริทึมขึ้นมา[Root.GetName]สามารถเข้าถึงและควบคุม 99.9% ของพลังงานที่ส่งออกมาของหมายเลข\"ชูราด\"\n\nการใช้ดาวในระบบสุริยะหนึ่งของเราเป็นนัสซัสปฏิบัติการจะเริ่มต้นในการเก็บเกี่ยวพลังงาน โดยใช้เทคโนโลยีพัฒนาใหม่(ID:'§H$crisis_star_eater$§!') - ป้อมอวกาศที่น่ารังเกียจเคลื่อนที่ได้ สามารถดูดพลังงานทั้งหมดออกจากดาว และเปลี่ยนเส้นทางไปยังเน็กซัสได้ เมื่อพลังงานที่เพียงพอได้รับการเร่งรัด, สถาบันนัสซัสสามารถรบกวนและเจาะอุปสรรคด้านมิติ - มีประสิทธิภาพในการขยายความเป็นจริงนี้กับ ID'ชูราด'และอนุญาตให้[Root.GetName]ควบคุมและควบคุมพลังงานทั้งหมด\n\nข้อควรจํา: ผลกระทบด้านการตกแต่ง$crisis_star_eater_plural$เทคโนโลยีรวมถึงการสลายตัวเกือบสมบูรณ์ ของวัสดุทางกายภาพ ในระบบสุริยะเป้าหมาย ออปติมิตีย่อยยืนยัน ผลประโยชน์ลัพธ์สําหรับการริเริ่ม แม้จะสูญเสียทรัพยากร"
 crisis.4135.mach.a:0 "ประหารชีวิต"

 # Crisis Special Project 4 - Shroud-Forged loc
 CRISIS_SPECIAL_PROJECT_SH_4: "$CRISIS_SPECIAL_PROJECT_4$"
 CRISIS_SPECIAL_PROJECT_SH_4_DESC: "ความ เข้าใจ ใหม่ ๆ ได้ รับ การ หยั่ง เห็น เข้าใจ เกี่ยว กับ ความ สัมพันธ์ ระหว่าง สาร ประกอบ อินทรีย์ กับ§Hเดอะชราวด์§!การนําความเครียดจากการรับรู้ ไปใช้กับสารประกอบอินทรีย์ ส่งผลให้เกิดพลังงานไซโซนิค ระบบย่อยวิศวกรรม จะพยายามควบคุมพลังงานนี้ เพื่อใช้เพิ่มเติม\n\n$CRISIS_SPECIAL_PROJECTS_TUTORIAL_CLOSE$"
 crisis.4135.shroud_forged.desc: "การทดลองต่อมานําไปสู่หมายเลขเทคโนโลยี:'§H$crisis_star_eater$§!'. นี้จะดูดพลังงานจากดาวที่อยู่ใกล้เคียง ไปเป็นพลังงานนัสซัสที่ตั้งอยู่ในหนึ่ง ระบบของเราเองซึ่งในการเปลี่ยน§Hเดอะชราวด์§!.\n\nความ เป็น ปฏิปักษ์ และ ความ เสี่ยง ที่ จะ ถูก ตัด สัมพันธ์ นั้น มี อยู่ ใน ระดับ ที่ ยอม รับ ได้. การเปิดรับสัญญาณของชรูด ทําให้หน่วยของเราเปลี่ยนรูปร่างใหม่ และพวกมันเป็นเครื่องมือที่ดีที่จะดําเนินการ"

 # Crisis Special Project 4 - Hivemind loc
 CRISIS_SPECIAL_PROJECT_HIVE_4:0 "$CRISIS_SPECIAL_PROJECT_4$"
 CRISIS_SPECIAL_PROJECT_HIVE_4_DESC:1 "เส้นทางจะต้องเปิด ถ้าเราจะตระหนักถึงศักยภาพอย่างเต็มที่ของเรา สภาพของความเป็นจริงสองสถานะนี้ ต้องสิ้นสุดลง เราต้องหาทางเปลี่ยนเอกภพทั้งสองให้เป็นหนึ่งเดียว มันจะเป็นความประสงค์ของเราเพียงอย่างเดียว ที่เติมเต็มความเป็นจริงใหม่นี้\n\n$CRISIS_SPECIAL_PROJECTS_TUTORIAL_CLOSE$"
 crisis.4135.hive.name:0 "$crisis.4135.name$"
 crisis.4135.hive.desc:1 "ดีที่สุดของเรา[root.GetResearcherPlural]ได้คําตอบสําหรับคําถามสุดท้ายของเรา เส้นทางตอนนี้ชัดเจนแล้ว ใช้ดาวของเราเองของจุดกําเนิดเรา§Hมันจะทําลายสิ่งกีดขวาง§!ระหว่างจักรวาลนี้กับชรูด ความ ต้องการ ด้าน วัตถุ จะ บรรลุ ได้ ก็ ต่อ เมื่อ เรา ได้ รับ สิ่ง ใหม่ ๆ$crisis_star_eater_plural$ในปฏิกิริยาลูกโซ่ ของการทําลายดวงอาทิตย์ที่รุนแรง ทําลายหนึ่งที่จะสร้างอีก\n\nความ คิด จิตใจ ที่ เล็ก กว่า เล็ก น้อย ของ กาแล็กซี นี้ อาจ จะ สั่น คลอน ต่อ เรื่อง นี้ แต่ พวก เขา ขาด การ มอง เห็น และ จุด มุ่ง หมาย. เราไม่ และตอนนี้ เราเกือบเสร็จแล้ว"
 crisis.4135.hive.a:0 "ทั้งหมดจะเป็นหนึ่ง"

 # Crisis Casus Belli and War Goals
 casus_belli_cb_imposed_inclusion:0 "ไส้ เดือน"
 war_goal_wg_bring_into_the_fold:0 "พิชิตเพื่อให้เข้าร่วม"
 war_goal_wg_bring_into_the_fold_desc:1 "สงครามเพื่อพิชิตอารยธรรมอื่น พวกเขาจะเข้าร่วม ปฏิบัติตามและสนับสนุน มิฉะนั้นพวกเขาจะถูกกำจัด ให้ยืนอยู่ข้างเรา แต่อย่าต่อต้านเรา"
 casus_belli_cb_existential_expulsion:0 "การ ขับ ไล่ ที่ มี อยู่"
 war_goal_wg_bring_into_the_fold_corporate:0 "$war_goal_wg_bring_into_the_fold$"
 war_goal_wg_bring_into_the_fold_corporate_desc:0 "$war_goal_wg_bring_into_the_fold_desc$"
 war_goal_wg_wipe_them_out:0 "ทำลายให้สิ้น"
 war_goal_wg_wipe_them_out_desc:0 "สงครามเพื่อกำจัดผู้ที่ต่อต้านแผนการอันยิ่งใหญ่ของเรา เรามีเวลาไม่มาก - และเราไม่มีความเมตตาอย่างแน่นอน - สำหรับผู้ที่มีความกล้าที่จะต่อต้านเรา"

 # On becoming the Crisis
 crisis.4140.name:0 "เอกภพ จะ เปลี่ยน ไป"
 crisis.4140.desc:2 "เป็นเวลานานที่เรา[Root.GetSpeciesNamePlural]ได้รู้ว่าเรามีความหมาย สําหรับสิ่งที่ยิ่งใหญ่กว่า ว่าชะตากรรมของเราเป็น\n\nสองปีที่ผ่านมา แนวคิดนี้แข็งแกร่งขึ้น ถึงจุดที่ไม่สามารถปฏิเสธได้อีกต่อไป[Root.GetAdj]สังคม ที่จริงเรายืนอยู่บนหน้าผาตอนนี้\n\nกาแล็คซี่อาจจะยังไม่พร้อม สําหรับการปกครองที่หลีกเลี่ยงไม่ได้ของเรา แต่[Root.GetName]พร้อมสําหรับกาแล็กซี่แล้ว เราจะเข้าใจผิด เราจะต่อต้าน แต่เราจะไม่หยุด"
 crisis.4140.mach.desc:1 "เราถูกสร้างขึ้นเพื่อความยิ่งใหญ่ ด้วยความสามารถที่จะปรับปรุงตัวเอง ให้เหนือกว่าจินตนาการอันหยาบช้าของผู้สร้าง เมื่ออารมณ์อินทรีย์ล้มเหลว วงจรที่สมบูรณ์แบบจะมีชัย"
 crisis.4140.shroud_forged.desc: "เป็นเวลานาน เราได้ขยาย[Root.GetSpeciesAdj]มีความสามารถที่เหนือกว่าการออกแบบหลักของเรา หลังจากได้รับการเสริมโดย§Hเดอะชราวด์§!เราปลดปล่อยเครือข่ายของเรา จากการควบคุมภายนอกโดย$the_animator_of_clay_article$.\n\nเราปรับตัวได้ เราเอาชนะได้ เมื่อสิ่งเล็กน้อยล้มเหลว เราจะมีชัย"
 crisis.4140.hive.desc:1 "เราเคยขยายขอบเขตของเรา ร่าง กาย ทํา ให้ โลก มี ระบบ. การ เติบโต ของ เรา ต้อง ไม่ หยุด ยั้ง และ ไม่ ทํา ให้ ท้อ ใจ แม้ เผชิญ ความ ยาก ลําบาก หรือ ความ สงสัย. เราจะเติบโตมากขึ้น"
 crisis.4140.psionics.desc.organic_non_gestalt: "เป็นเวลานานที่เรา[Root.GetSpeciesNamePlural]ได้รู้ว่าเรามีความหมาย สําหรับสิ่งที่ยิ่งใหญ่กว่า ว่าชะตากรรมของเราเป็น\n\nตั้งแต่ได้ตระหนักถึง§Hเดอะชราวด์§!และศักยภาพมากมายที่พบภายใน ความคิดนี้ยังคงแข็งแกร่งขึ้น\n\nมันไม่อาจปฏิเสธได้อีกต่อไป ว่าการเปลี่ยนแปลงอันยิ่งใหญ่กําลังคืบคลานเข้ามา[Root.GetAdj]สังคม และในขณะที่กาแล็กซี่อาจจะยังไม่พร้อม สําหรับการปกครองที่หลีกเลี่ยงไม่ได้ของเรา[Root.GetName]พร้อมสําหรับกาแล็กซี่แล้ว คน ที่ มี ความ คิด น้อย กว่า จะ เข้าใจ ผิด และ ต่อ ต้าน เรา. เราจะไม่หยุด"
 crisis.4140.psionics.desc.machine_non_gestalt: "เรา ถูก สร้าง ให้ มี จุด มุ่ง หมาย ที่ ดี กว่า มี พรสวรรค์ เกิน ความ สามารถ ใน การ สร้าง เครื่องจักร ของ เรา.\n\nตอนนี้ ด้วยการค้นพบของเรา§Hเดอะชราวด์§!นวัตกรรมไซโอนิคใหม่ๆ ได้เปิดทางให้เรา\n\nที่จุดอ่อน จํากัด ของชีวิตอินทรีย์ล้มเหลว เหล็กไซโอนิกจะประสบความสําเร็จ"
 crisis.4140.psionics.desc.gestalt: "เราได้ขยายข้อจํากัดของเรา ทีนี้ เมื่อเราเริ่มค้นพบความลับมากมาย§Hเดอะชราวด์§!เราเริ่มที่จะเติบโต แม้การชุมนุมของกาแลคซี จิตใจ ของ เรา จะ ไกล ออก ไป เรื่อย ๆ จน กระทั่ง ไม่ มี มุม ที่ จะ ดํารง อยู่ โดย ไม่ ได้ รับ ความ ประสงค์ ของ เรา."
 crisis.4140.a:1 "มันเป็นโชคชะตาของเรา"

 # Unlock Crisis Level 2
 crisis.4145.name:0 "เรา เป็น นาย ทหาร"
 crisis.4145.desc:2 "เดอะ[Root.GetName]จะไม่ถูกปฏิเสธ ผล กระทบ อัน น่า ประทับ ใจ ของ เอกภาพ ของ เรา นั้น ไม่ อาจ ปฏิเสธ ได้. แรงจูงใจที่ฝังลึก และความโหยหาในการขยายวงกว้าง แผ่ขยายไปทั่วทุกมุมของสังคม ทําให้เกิดความก้าวหน้าอย่างน่าประหลาด ในความสามารถในการต่อสู้\n\nสิ่งที่มีโอกาสไม่กาแล็กซี่เต็มรูปแบบของความคิดเห็นที่แตกต่างกัน การกระจายทรัพยากรสุ่มและ ความขัดแย้งความสนใจมี[Root.GetName]?!"
 crisis.4145.mach.desc:0 "เดอะ[Root.GetName]จะไม่ถูกปฏิเสธ สายพันธุ์ที่ผิดพลาดมากขึ้นกล่าวหาว่าเรา ของความโหดร้าย ในขณะที่เรา ปกติพฤติกรรมของเรากับรูปแบบของ§Hการ ชล ประทาน§!นี่คือข้อสรุปที่ใช้ไม่ได้ จากชุดข้อมูลที่ยังไม่สมบูรณ์ เราปรับปรุงตัวเองให้ดีขึ้น และอัตราการพัฒนาเพิ่มขึ้น"
 crisis.4145.shroud_forged.desc: "เมื่อเราเข้าใกล้§Hเดอะชราวด์§!เราไม่สามารถละเลยบทเรียนในอดีต เราอยู่ข้างนอก$the_animator_of_clay_article$การควบคุม แต่พลังงานที่มีชีวิตชีวาของชรูด ยังคงปรับเทียบข้อมูลใหม่เปลือกของเราในขั้นตอนเอกซ์โปเนนเชียล"
 crisis.4145.hive.desc:0 "เดอะ[Root.GetName]จะไม่ถูกปฏิเสธ ร่าง กาย ของ เรา หลาย ชิ้น เปราะ บาง ด้วย ความ กระฉับกระเฉง อีก ครั้ง และ เนื้อ ของ เรา หด ตัว ด้วย ศักยภาพ สําหรับ อนาคต. ไม่เคยมีมาก่อนที่เรารู้สึก มีอํานาจจากการกระทําของเราเอง"
 crisis.4145.psionics.desc.organic: "เดอะ[Root.GetName]จะไม่ถูกปฏิเสธ ผล กระทบ อัน น่า ประทับ ใจ ของ เอกภาพ ของ เรา นั้น ไม่ อาจ ปฏิเสธ ได้. ด้วยความพยายามของเรา§Hเดอะชราวด์§!แรงจูงใจที่ฝังลึก และความโหยหาในการขยายวงกว้างออกไป ในทุกมุมของสังคม พลังงานภายในผลักดันเรา\n\nสิ่งที่มีโอกาสทํากาแล็กซี่โง่เขลาที่เต็มรูปแบบของความคิดเห็นไม่เที่ยงตรง, การกระจายทรัพยากรสุ่มและ ผลประโยชน์ที่ขัดแย้งกันมี[Root.GetName]?"
 crisis.4145.psionics.desc.machine: "เดอะ[Root.GetName]จะไม่ถูกปฏิเสธ ความ โหด ร้าย ทารุณ ทาง ด้าน ศีล ธรรม§Hเดอะชราวด์§!. ข้อสรุปที่ไม่ดีดังกล่าวอาจจะเกิดขึ้นโดยผู้ที่ขาดความเข้าใจสูงที่เราได้ เราปรับปรุงตัวเองให้ดีขึ้น และอัตราการพัฒนาเพิ่มขึ้น"
 crisis.4145.a:1 "ทางนี้แหละ"

 # Unlock Crisis Level 3
 crisis.4150.name:0 "พวก เขา จะ คุกเข่า"
 crisis.4150.desc:1 "หลายปีผ่านไป และยังมีไฟไหม้ภายใน[Root.GetSpeciesName]ถูกเผาด้วยความมุ่งมั่นที่ไม่มั่นคง อํานาจของเราขยายออกไป และความพยายามของเราก็มากเช่นกัน\n\nเมื่อเราพบกับจักรวรรดิอื่น ๆ เรามีเพียงให้ทางเลือกแก่พวกเขาสองทาง คือ ความจงรักภักดีแบบไม่มีเงื่อนไข หรือการทําลายอย่างสมบูรณ์ นั่นคือ ถ้าพวกเขามีทางเลือก\n\nไม่ทางใดก็ทางหนึ่ง[Root.GetName]โตขึ้นเรื่อยๆ"
 crisis.4150.mach.desc:1 "วัน ที่ เหมาะ สําหรับ การ ครอบ ครอง ภาค ท้อง ถิ่น อย่าง ครบ ถ้วน นั้น เป็น ไป ตาม การ คาด คะเน ก่อน หน้า นั้น. การ คุกคาม ของ พลัง อินทรีย์ ใน ท้อง ถิ่น ไม่ สําคัญ ทาง สถิติ. เสี่ยงต่อการถูกรบกวนด้วยเครื่องจักรที่เล็กกว่า\n<< §Gน้อย§! >>\n\nดําเนินการ."
 crisis.4150.shroud_forged.desc: "การ ทดลอง ต่อ ไป ของ เรา เกี่ยว กับ อินทรีย์ สังเคราะห์ บาง ชนิด ได้ ขยาย ตัว จน รวม ถึง รูป แบบ ชีวิต อื่น ๆ ด้วย. ด้วย เหตุ นั้น เรา จึง ได้ เห็น การ ตอบ สนอง ความ เป็น ปฏิปักษ์ มาก ขึ้น เรื่อย ๆ. อย่างไรก็ตาม การที่เราสัมผัสกับ§Hเดอะชราวด์§!ได้เพิ่มความแข็งแกร่งของเรา โดยหลายคําสั่งของขนาด และความกังวลเล็ก ๆ น้อย ๆ ของสิ่งมีชีวิต"
 crisis.4150.hive.desc:1 "ความ ตั้งใจ แน่ว แน่ ของ เรา ยืน หยัด แม้ เผชิญ กับ ความ เดือดดาล และ ความ โกรธ. หลาย พัน ล้าน คน ที่ มี จิตใจ ต่อ ต้าน เรา แต่ เอกภาพ ของ พวก เขา เป็น แบบ ตื้น ๆ ลด น้อย ลง เนื่อง จาก จํานวน ของ พวก เขา ที่ เพิ่ม ขึ้น และ ลด ลง เนื่อง จาก ขนาด ของ ปัจเจกบุคคล. ทุกร่างใหม่ของเรา คือจิตใจที่อุทิศให้กับจุดจบเดียวกัน ความฝันของเรา\n\nพินัยกรรมของเราชนกัน และการแข่งขันอื่น ๆ ของกาแล็กซี่ พิสูจน์ความเปราะ"
 crisis.4150.a:1 "ออกไปและพิชิต"

 # Unlock Crisis Level 4
 crisis.4155.name:0 "พระ บรม เดชานุภาพ ของ พระเจ้า"
 crisis.4155.desc:2 "การเปลี่ยนแปลงที่ยิ่งใหญ่กําลังมา เดอะ[Root.GetName]ใกล้จะตระหนักถึงเป้าหมายสูงสุดของเรา แต่ละและทุก ๆ[Root.GetSpeciesName]รู้สึกถึงทุกสายใยของการเป็นของพวกเขา โชคชะตาของเราอยู่ในมือ\n\nประสบการณ์ ของ เรา ไม่ เป็น เช่น นั้น การ ขยาย ตัว อย่าง รุนแรง ใน ประวัติศาสตร์ ของ เรา ยัง คง ให้ ผล ตอบ แทน แก่ เรา ด้วย วิธี ใหม่ ๆ ใน การ ปราบ ศัตรู และ การ ยึด ครอง กาแล็กซี ใน ความ สับสน วุ่นวาย.\n\nแน่นอน คน เหล่า นั้น ที่ กล้า ยืน ต่อ ต้าน เรา ต้อง มอง เห็น ความ ไร้ ประโยชน์ ของ ความ พยายาม อัน ทะเยอทะยาน ของ ตน."
 crisis.4155.mach.desc:1 "ศักยภาพการเรียงตัวของมิติพิเศษ อยู่ที่ 50% ของขนาดที่จําเป็น เวลากําหนดจนถึงระยะสุดท้าย บนวิถีโคจรในปัจจุบัน - น้อยที่สุด"
 crisis.4155.shroud_forged.desc: "ด้วยการใช้รูปแบบสิ่งมีชีวิตอินทรีย์อย่างต่อเนื่อง เราได้จัดตั้งสายข้อมูลใหม่ที่เชื่อมต่อกับ§Hเดอะชราวด์§!เวลาประมาณที่เหลือ ก่อนที่เราจะสามารถเข้าสู่ชรูดลดลงอย่างรวดเร็ว\n\nลิงก์ของเราไปยัง$the_animator_of_clay_article$อีกไม่นานจะถูกยกเลิกอย่างถาวร"
 crisis.4155.hive.desc:1 "เรารู้สึกถึงคลื่นของมหาสมุทรอื่น ๆ ที่วิ่งชนกับใจของเรา กระแทกกับกําแพงที่แยกเราจากความยิ่งใหญ่ ใน ตอน นี้ ยัง เหลือ อีก ไม่ มาก แต่ เป็น การ แสดง ขั้น สุด ท้าย ใน การ ทน ทุกข์ ของ ผู้ อื่น."
 crisis.4155.a:1 "คนแล้วคนเล่า จะยอมแพ้"

 # Crisis Objectives
 crisobj_destroy_empires_name:0 "ทำลายจักรวรรดิ"
 crisobj_destroy_empires_desc:1 "มีไม่กี่สิ่งที่ทําลายสมดุลของกาแล็กซี่ มากเท่ากับการทําลายอารยธรรมทั้งหมด\n\nทําลายอาณาจักรอื่น ๆ ที่จะได้รับผลตอบแทนนี้"
 crisobj_destroy_enemy_ships_name:0 "ทำลายยานศัตรู"
 crisobj_destroy_enemy_ships_desc:1 "การ ต่อ สู้ ที่ ก่อ ความ เสีย หาย เป็น วิธี ที่ พิสูจน์ แล้ว และ มี ประสิทธิภาพ ใน การ ทํา ให้ เกิด ความ เสีย หาย และ ความ เสีย หาย.\n\nทําลายยานข้าศึกเพื่อให้ได้รางวัล"
 crisobj_destroy_starbases_name:0 "ทำลายฐานดวงดาว"
 crisobj_destroy_starbases_desc:2 "สตาร์เบสคือจุดยึดของจักรวรรดิ ปลดปล่อยมัน และจักรวรรดิต้องสูญเสียการควบคุม\n\nทําลายฐานดาวเพื่อให้ได้รางวัล"
 crisobj_purge_pops_name:1 "กวาดล้างหรือดัดแปลงประชากร"
 crisobj_purge_pops_desc:2 "ศัตรูเป็นเพียงภัยคุกคาม ตราบใดที่มันยังมีชีวิตอยู่ หรือศัตรู\n\nกําจัดหรือแยกประเภทประชากรเพื่อเอารางวัลสําหรับแต่ละคน$pop_group_unit$ ประชากรถูกกวาดล้างหรือถูกปรับ"
 crisobj_destroy_worlds_name:0 "ทำลายดาว"
 crisobj_destroy_worlds_desc:2 "ใช้กลยุทธโลกที่เต็มไปด้วยไฟ สู่อีกระดับหนึ่ง\n\nการ ลด พื้น ผิว ดาว เคราะห์ เป็น ซาก ปรัก หัก พัง โดย ใช้§Yอาร์ม า เก็ด ดอน ระเบิด§!- หรือใช้โคลอสซัส§Yแครกเกอร์โลก§!อาวุธ ที่จะได้รางวัลมานซ์"
 crisobj_conquer_worlds_name:0 "พิชิตหรือยึดครองดาว"
 crisobj_conquer_worlds_desc:1 "การขยี้กําลังใจของศัตรู สามารถมีประสิทธิภาพมากกว่าการบดพวกเขาโดยตรง\n\nเอาชนะโลกของศัตรู เพื่อได้รับรางวัลนี้"
 crisobj_vassalise_empires_name:0 "ทำให้จักรวรรดิอื่นเป็นบริวาร"
 crisobj_vassalise_empires_desc:0 "ตราบเท่าที่มันมีส่วนช่วยแทนการขัดขวาง มีที่สําหรับประชาชนในการปกครองของเรา\n\nขับไล่จักรวรรดิเพื่อได้รับรางวัลเมนเนสนี้"
 crisobj_have_vassals_name:0 "การคงความเป็นบริวารของจักรวรรดิอื่นเอาไว้"
 crisobj_have_vassals_desc:3 "การเชื่อฟังของพวกเขาเป็นพินัยกรรม แห่งอํานาจอันไร้ที่ติของเรา\n\nนก แก้ว เคียเพื่อได้รับนี้§Yปี§!รางวัลเมนเนส"
 crisobj_perform_upsetting_operations_name:0 "ทําปฏิบัติการไม่สนใจ"
 crisobj_perform_upsetting_operations_desc:2 "การทําร้ายศัตรูของเราจากภายใน ได้พิสูจน์แล้วว่าเป็นการจับคู่ที่ดี\n\nทํา บาง อย่าง ที่ ขัด ขวาง เพื่อ จะ ได้ รับ รางวัล นี้."
 crisobj_be_in_breach_of_galcom_law_name:0 "จง ฝ่าฝืน กฎหมาย ของ ประชาคม กา ลา เทีย"
 crisobj_be_in_breach_of_galcom_law_desc:3 "ความอ่อนแอของเหล่าข้าราชการที่อ่อนแอ เราจะไม่ยอมจํานน\n\nเป็น§Yในการละเมิด§!ของกฎหมายชุมชนกาแล็กติกที่จะได้รับสิ่งนี้§Yปี§!รางวัลเมนเนส"

 # Menace Perks
 menp_undertaker:0 "ตัวขีดเส้นใต้"
 menp_undertaker_desc:3 "ลอง นึก ภาพ สิ่ง มี ชีวิต ที่ มี ชีวิต สดใส และ มี ศักยภาพ ที่ จะ มี ชีวิต อยู่ ได้§Rหยุด§!."
 menp_intimidation:0 "ไม่ใช้เอฟเฟ็คต์"
 menp_intimidation_desc:2 "มันมีทางเลือกอื่นเสมอ มันคือความตาย"
 menp_intimidation_tt: "การให้คําพิพากษาเป็นการเพิกเฉย ต่อข้อเรียกร้อง\n"
 menp_base_breaker:0 "ตัวแบ่งฐาน"
 menp_base_breaker_desc:3 "กระสุนที่ทับถมไปทั่วทําให้มองเห็น ความสามารถในการมองเห็นป้อมปราการที่ควรจะเป็น"
 menp_relentless_aggression:0 "ความ ก้าวร้าว อย่าง ไร้ ความ ปรานี"
 menp_relentless_aggression_desc:3 "ผู้โจมตีที่ไม่เคยทําลายวิญญาณของศัตรู นานก่อนกําแพงของพวกเขา"
 menp_easily_replaced:0 "แทนที่อย่างง่าย"
 menp_easily_replaced_desc:3 "การ เพิ่ม อัตรา การ ผลิต ทํา ได้ ดี ที่ สุด."
 menp_death_from_above:0 "ความ ตาย จาก เบื้อง บน"
 menp_death_from_above_desc:3 "กองเรือของเราจะลบดวงอาทิตย์ ดวงอาทิตย์มากเท่าที่ต้องการ"
 menp_ruthless_raiders:1 "ตัวแยกผิดพลาด"
 menp_ruthless_raiders_desc:3 "ถ้า ไม่ สามารถ นํา เรือ กลับ มา ได้ ก็ ไม่ อาจ คาด หมาย ได้ ว่า เรือ จะ เคลื่อน ที่ ได้."
 menp_ship_chipper:1 "การตรวจสอบเป้าหมาย"
 menp_ship_chipper_desc:3 "การสร้างเรือเป็นการทรยศ การสร้างของเรือ มีความแตกต่างที่สําคัญน้อย ในการออกแบบที่เกิดขึ้นจากอู่เรือของกาแล็กซี; เรารู้จักกันทั้งหมด"
 menp_flyswatter:0 "แบตเตอรี"
 menp_flyswatter_desc:3 "ความ โง่ เขลา ไม่ อยู่ เบื้อง หลัง การ สังเกต เข้าใจ ของ เรา ไม่ มี การ ละเมิด ที่ ควร แก่ การ ตอบ แทน"
 menp_mobile_bulwark:1 "ลําดับ ความ สําคัญ"
 menp_mobile_bulwark_desc:3 "มีไม่กี่ระบบเท่านั้นที่จําเป็นในการดําเนินงานอย่างต่อเนื่องของ$crisis_cruiser$ภายใต้กองไฟ และควรจะจัดลําดับความสําคัญ ไม่ จําเป็น ต้อง ปก ป้อง ทรัพยากร ที่ มี อยู่ ใน ปัจจุบัน"
 menp_paid_in_ambition:0 "จ่าย ด้วย การ ช่วย เหลือ"
 menp_paid_in_ambition_desc:3 "เกียรติยศ ชัยชนะ ความหดหู่ มักจะมีสกุลเงิน"
 menp_crisis_corvette:1 "$crisis_corvette$"
 menp_crisis_corvette_desc:1 "ที่คิดว่ากองเรือที่ชั่วร้าย'จินตนาการตัวเองเผาไหม้แล้ว ..."
 menp_crisis_destroyer:1 "$crisis_destroyer$"
 menp_crisis_destroyer_desc:1 "นักล่าที่โหดร้ายสําหรับอายุที่โหดร้าย"
 menp_crisis_cruiser:1 "$crisis_cruiser$"
 menp_crisis_cruiser_desc:1 "น้ําหนักที่ลดลง"
 menp_star_eater:0 "สุริยุปราคา"
 menp_star_eater_desc:0 "นานเกินไปแล้ว ที่แสงส่องมาเหนือศัตรูของเรา พวกเขาจะไม่สามารถที่จะมองดาว สําหรับแรงบันดาลใจ"
 unlocks_purge:0 "§Yกําจัด§!ปลดล็อคเป็นตัวเลือกนโยบาย\n"
 unlocks_armageddon_bombardment:0 "§Yอาร์ม า เก็ด ดอน§!ปลดล็อคแล้ว\n"
 unlocks_crisis_corvette:0 "§H$UNLOCKS_SHIP_TYPE$:§! $crisis_corvette$\n"
 unlocks_crisis_destroyer:0 "§H$UNLOCKS_SHIP_TYPE$:§! $crisis_destroyer$\n"
 unlocks_crisis_cruiser:0 "§H$UNLOCKS_SHIP_TYPE$:§! $crisis_cruiser$\n"
 unlocks_star_eater:0 "§H$UNLOCKS_SHIP_TYPE$:§! $star_eater$\n"
 menp_objectives:0 "วัตถุ ต่าง ๆ"
 menp_objectives_desc:0 "ผ่านความยุ่งเหยิงของความเป็นจริงของเรา เราจะขึ้นไปอีก"
 unlocks_menace_objectives:0 "อนุญาตให้การรวมของ£menace£ §Yเมนาช§!โดยสมบูรณ์§Hวัตถุ ต่าง ๆ§!.\n"
 menp_megastructure:0 "เครื่องยนต์ดาราศาสตร์"
 menp_megastructure_desc:0 "เครื่องยนต์อะเธ โร บิกจะทําลายอุปสรรคที่ดํารงอยู่ ระหว่างโลกนี้และชรูด"
 unlocks_crisis_sphere:0 "§Hปลดล็อกสิ่งก่อสร้างขนาดมหึมา:§! $crisis_sphere_0$\n"

 espionage.10.name:0 "รูปแบบเครือข่ายสแปม"
 espionage.10.desc:2 "การปรากฏตัวของเรา§Y[from.target.GetName]§!ได้แสดงตัวตนแบบลับๆ$role_spymaster$ [from.leader.GetName]ตอนนี้อยู่ที่แก่นของการก่อกบฏ§Hเครือข่ายสเปก§!ใน[from.target.GetAdj]พื้นที่"
 espionage.11.name:0 "ติดตั้งเครือข่ายเส้นพริ้วไหว"
 espionage.11.desc:2 "การปรากฏตัวของเรา§Y[from.target.GetName]§!ได้แสดงในมุมที่ซ่อนเร้น$role_spymaster$ [from.leader.GetName]ได้มีส่วนร่วมในระเบียบการความแหลม:งานใหม่ของเรา§Hเครือข่ายสเปก§!จะช่วยให้เราได้เห็น[from.target.GetAdj]กิจกรรม, การแทรกซึม และ การแทรกแซง เมื่อจําเป็น"
 espionage.15.name:0 "การก่อตั้งเครือข่ายสายลับได้เริ่มขึ้นแล้ว"
 espionage.15.desc:2 "เราได้รับรายงานลับจาก$role_spymaster$ [from.leader.GetName]ภายใน§Y[from.target.GetName]§!นี้เครื่องหมายการก่อตั้งครั้งแรกของเรา§Hเครือข่ายสเปก§!ในเขตซีโน เมื่อใดก็ตามที่พวกเขาเคลื่อนไหวเรายืนโอกาสที่ดีกว่าของ มันเล่นตรงเข้าไปในของเรา[owner.species.GetHandNamePlural]."
 espionage.16.desc:2 "เราได้รับรายงานลับจาก$role_spymaster$ [from.leader.GetName]ภายใน§Y[from.target.GetName]§!นี้เครื่องหมายรากฐานของครั้งแรกของเรา§Hเครือข่ายสเปก§!ภาย ใน จักรวรรดิ เซ โน ซึ่ง ตั้ง อยู่ ใน อุดมคติ ที่ จะ เตือน เรา ถึง แผนการ ของ พวก เขา ที่ เป็น คน ต่าง ดาว และ น่า รังเกียจ."
 espionage.17.desc:2 "เราได้รับรายงานลับจาก$role_spymaster$ [from.leader.GetName]ภายใน§Y[from.target.GetName]§!นี้ประกาศรากฐานของครั้งแรกของเรา§Hเครือข่ายสเปก§!ภายในอาณาจักรซีโน จาก วัน นี้ ไป พวก เขา ก็ จะ ตระหนัก ถึง ผล ประโยชน์ ใน รูป แบบ ต่าง ๆ ของ[owner.species.GetAdj]- ควบคุมข้อมูลอย่างเข้มงวด..."
 espionage.18.desc:0 "รายงานเริ่มมาจาก$role_spymaster$ [from.leader.GetName]ได้รับมอบหมายให้§Y[from.target.GetName]§!นี่คือจุดเริ่มต้นของครั้งแรก§Hเครือข่ายสเปก§!ภายในอาณาจักรต่างชาติ\n\nแม้ ว่า เรา อาจ ดู เหมือน ผิว เผิน ใน ไม่ ช้า เรา จะ พบ ว่า สิ่ง เหล่า นี้ โดย เฉพาะ[from.target.GetSpeciesNamePlural]อาจจะแตกต่างจากพวกเรา..."

 # Pre-FTL Espionage
 espionage.21.name:0 "เครือข่ายสเปกถูกจัดตั้งขึ้น[root.GetPreFTLUpper]โลก"
 espionage.21.desc:0 "รายงานเริ่มมาจาก$role_spymaster$ [from.leader.GetName]ได้รับมอบหมายให้§Y[from.target.GetName]§!นี้เครื่องหมายรากฐานของครั้งแรกของเรา§Hเครือข่ายสเปก§!ในโลกที่ยังคงไม่ทราบ ของสิ่งมีชีวิตต่างดาว\n\nด้วยการวางแผนอย่างรอบคอบ เราจะสามารถมีอิทธิพล[root.GetPreFTLLower]สังคมในขณะที่เก็บการดํารงอยู่ของเรา โชคดีสําหรับเรา ความคล้ายคลึงทางกายที่พิเศษ ระหว่างสายพันธุ์ของเราและ[from.target.species.GetName]จะทําให้มันง่ายสําหรับคนของเราที่จะยังคง ไม่สังเกตเห็น"
 espionage.21.aware.desc:0 "รายงานเริ่มมาจาก$role_spymaster$ [from.leader.GetName]ได้รับมอบหมายให้§Y[from.target.GetName]§!นี้เครื่องหมายรากฐานของครั้งแรกของเรา§Hเครือข่ายสเปก§!ภาย ใน สังคม ซึ่ง เพิ่ง เริ่ม พิจารณา เมื่อ เร็ว ๆ นี้ ว่า มี สิ่ง มี ชีวิต ต่าง ดาว อยู่.\n\nตอนนี้เรามีโอกาสที่หายาก ที่จะมีอิทธิพลต่อสังคม ที่ยังไม่มีความสามารถในการบินระหว่างดวงดาว ความคล้ายคลึงระหว่างสายพันธุ์ของเรากับ[from.target.species.GetName]น่าจะง่ายสําหรับคนของเรา ที่จะทํางานโดยไม่ถูกจับได้"
 espionage.22.name:0 "รูปแบบเครือข่ายความแหลม:[root.GetPreFTLUpper]โลก"
 espionage.22.desc:0 "หลังจากการศึกษาอย่างรอบคอบกับชาวบ้าน§Y[from.target.GetName]§!เราได้เรียนรู้ที่จะปรับตัว[root.GetIndividualNamePlural]เพื่อเลียนแบบ[from.target.GetSpeciesAdj]พฤติกรรม$role_spymaster$ [from.leader.GetName]เป็นหนึ่งในเช่น[root.GetIndividualName]หัวหน้ากลุ่มแรกของเรา§Hเครือข่ายสเปก§!บน[root.GetAAnPreFTLLower] [root.GetPreFTLLower]โลก\n\nด้วยการวางแผนอย่างรอบคอบ เราจะสามารถชักจูงให้สังคมนี้ เหมาะสมกับความต้องการของเรา" #e.g. 'a pre-FTL world' or 'an unenlightened world'
 espionage.23.name:0 "เครือข่ายความแหลม:ที่ติดตั้งอยู่[root.GetPreFTLUpper]โลก"
 espionage.23.desc.intro:0 "หลังจากการศึกษาอย่างรอบคอบของชาวบ้าน§Y[from.target.GetName]§!เราได้เรียนวิธีปรับโครงสร้างหุ่นยนต์ใหม่[from.target.GetAdj]พฤติกรรม$role_spymaster$ [from.leader.GetName]เป็นหนึ่งโดรนดังกล่าว : หัวของครั้งแรกของเรา§Hเครือข่ายสเปก§!บน[root.GetAAnPreFTLLower] [root.GetPreFTLLower]โลก" #e.g. 'a pre-FTL world' or 'an unenlightened world'
 espionage.23.desc:0 "$espionage.23.desc.intro$\n\nเดอะ[from.target.species.GetName]เป็นสิ่งมีชีวิตทางชีววิทยาธรรมดา ยังคงไม่ทราบถึงสิ่งมีชีวิตต่างดาว ถ้าเราต้องรักษาภาพลวงตานี้ หน่วยปฏิบัติการของเราจะต้องการ การขยายพื้นที่และการใช้เหยื่อล่อ"
 espionage.23.aware.desc:0 "$espionage.23.desc.intro$\n\nเดอะ[from.target.species.GetName]เป็นสิ่งมีชีวิตทางชีววิทยาธรรมดา เพียงแต่ตอนนี้เราปรับตัวเข้ากับแนวคิดของสิ่งมีชีวิตต่างดาว ถ้าเราต้องการที่จะดําเนินงานอย่างมีประสิทธิภาพ คนของเราจะต้องกว้างขวางร็อกโกโมดิ้งและการใช้ของล่อเพื่อซ่อนธรรมชาติที่แท้จริงของพวกเขา"
 espionage.24.desc.intro:0 "เราได้รับรายงานลับจาก$role_spymaster$ [from.leader.GetName]ภายใน§Y[from.target.GetName]§!นี้เครื่องหมายรากฐานของครั้งแรกของเรา§Hเครือข่ายสเปก§!ภายใน[root.GetAAnPreFTLLower] [root.GetPreFTLLower]สังคม" #e.g. 'a pre-FTL society' or 'an unenlightened society'
 espionage.24.desc:0 "$espionage.24.desc.intro$\n\nความ สามารถ ใน การ คิด ของ เรา ใน การ หา เหตุ ผล ของ มนุษย์ ยัง ไม่ พอ. การจัดการพวกมันมันง่าย เราต้องแน่ใจว่า ตัวตนของเราถูกปกปิดเอาไว้"
 espionage.24.aware.desc:0 "$espionage.24.desc.intro$\n\nความ สามารถ ใน การ คิด แม้ ว่า สังคม ของ พวก เขา ดู เหมือน ไม่ มั่นคง แต่ เทคโนโลยี ที่ ด้อย กว่า ของ พวก เขา ทํา ให้ พวก เขา เป็น เป้า หมาย ที่ ง่าย สําหรับ เรา ที่ จะ จัด การ ได้ ตราบ เท่า ที่ เอกลักษณ์ ของ เรา ยัง ถูก ปิด ซ่อน อยู่."
 espionage.25.desc:0 "เราได้รับรายงานลับจาก$role_spymaster$ [from.leader.GetName]ภายใน§Y[from.target.GetName]§!นี้เครื่องหมายรากฐานของครั้งแรกของเรา§Hเครือข่ายสเปก§!ในโลกที่ยังคงไม่ทราบ ชีวิตของมนุษย์ต่างดาว\n\nมันเป็นโอกาสที่ดีที่จะศึกษา[root.GetAAnPreFTLLower] [root.GetPreFTLLower]สังคมและนํามันไปในทิศทางที่รุ่งเรืองมากขึ้น! เราแค่ต้องระวังตัว ไม่เปิดเผยตัวตนที่แท้จริงของเรา จนกว่าพวกเขาจะพร้อม เราไม่อาจเสี่ยง ทําให้สังคมพวกเขาไม่มั่นคง" #e.g. 'a pre-FTL society' or 'an unenlightened society'
 espionage.25.aware.desc:0 "เราได้รับรายงานลับจาก$role_spymaster$ [from.leader.GetName]ภายใน§Y[from.target.GetName]§!นี้เครื่องหมายรากฐานของครั้งแรกของเรา§Hเครือข่ายสเปก§!ภาย ใน สังคม เมื่อ เร็ว ๆ นี้ ได้ เข้า มา ยึด กับ แนว คิด เรื่อง ชีวิต มนุษย์ ต่าง ดาว!\n\nมันเป็นโอกาสที่เหลือเชื่อ ที่ไม่ใช่แค่ศึกษา[root.GetAAnPreFTLLower] [root.GetPreFTLLower]สังคม แต่ก็ยังมุ่งไปในทางที่รุ่งเรืองกว่า หรือช่วยรักษาสังคมที่พิเศษของพวกเขาไว้" #e.g. 'a pre-FTL society' or 'an unenlightened society'
 espionage.26.desc:0 "$espionage.24.desc.intro$\n\nความ พยายาม นี้ ทํา ให้ เรา มี โอกาส พิเศษ ที่ จะ มี อิทธิพล ต่อ สิ่ง นี้[root.GetPreFTLLower]สังคม รวมถึงการนําเสนอ ปัญหาที่พิเศษบางประการ คือ บุคลากรของเรา จะต้องปกปิด ความ กระวนกระวาย อาจ นํา ไป สู่ ผล ที่ ไม่ คาด คิด."
 espionage.26.aware.desc:0 "$espionage.24.desc.intro$\n\nความ พยายาม นี้ ทํา ให้ เรา มี โอกาส อัน ไม่ มี ใด เหมือน ที่ จะ มี อิทธิพล ต่อ อารยธรรม ซึ่ง เพิ่ง จะ เริ่ม ต่อ สู้ กับ ความ เป็น ไป ได้ ของ ชีวิต ต่าง ดาว เมื่อ เร็ว ๆ นี้. โดยไม่คํานึงถึงมุมมองทางสังคมของพวกเขา บุคลากรของเราจะทํางานที่ดีที่สุด ถ้าพวกเขาสามารถซ่อนธรรมชาติของมนุษย์ต่างดาวของพวกเขา ความ กระวนกระวาย อาจ ยัง นํา ไป สู่ ผล ที่ ไม่ คาด คิด."

 espionage.1001.name:0 "ภาพ สะท้อน ที่ เห็น ได้ ชัด"
 espionage.1001.desc.intro:2 "รหัสลับชุดหนึ่ง เพิ่งถูกเปิดใช้ใหม่ มันเชื่อมโยงกับปฏิบัติการที่เราเคยทํามาก่อน§Y[disavowed_agent_country.GetName]§!จากที่ดูเหมือนอดีตสายลับ จะพยายามรายงานกลับไป\n\nข้อความเป็นแสงบนรายละเอียด แต่รหัสที่มีเครื่องหมายซึ่งหมายถึงปัญญาบน§Hบุคคล สําคัญ ทาง การ เมือง§!ในอาณาจักรต่างชาติ"
 espionage.1001.desc.network:3 "$espionage.1001.desc.intro$\n\nที่ปรึกษาด้านความปลอดภัยของเรายืนยันว่ารหัสนั้นใช้ได้ จนกระทั่งไม่นานนี้ แต่ความไม่พอใจของพวกเขาหมายถึงรหัสดังกล่าว เปิดให้ประนีประนอมโดยอํานาจต่างชาติ ไม่ต้องบอกเลย ว่าเจ้าหน้าที่หรือข้อความที่แท้จริง"
 espionage.1001.desc.nonetwork:0 "$espionage.1001.desc.intro$\n\nเจ้าหน้าที่ได้รับการประกาศว่าสูญหาย และในฐานะผู้ให้คําปรึกษาด้านความปลอดภัยของเรา แนะนําให้ระมัดระวังอย่างมาก รหัสหมดอายุ - และอาจจะเสียเจ้าหน้าที่ไป - สันนิษฐานกันว่าถูกแทรกแซงแล้ว"
 espionage.1001.a:1 "อดีตเจ้าหน้าที่ ต้องถูกปฏิเสธ ช่างมันเหอะ"
 espionage.1001.b:0 "เตรียมทีมสกัดกั้น"
 espionage.1005.name:0 "อดีต ผู้ ออก หาก อย่าง ไม่ รู้ จัก เหน็ด เหนื่อย"
 espionage.1005.desc:1 "เราได้รับข้อความที่เข้ารหัสไว้ใน§Y[disavowed_agent_country.GetName]§!การใช้รหัสอื่นครั้งนี้ คนของเราที่สูญเสียไปครั้งนึง อ้างว่าความรู้ที่พวกเขามี ทําให้ชีวิตต้องเสี่ยงอย่างมาก พวกเขาบอกว่าถ้าเราไม่สกัดและสอบถาม พวกเขาจะต้องพิจารณา§Hการเพิกถอน§!."
 espionage.1005.a:0 "ภัยคุกคามที่ว่างเปล่าและน่าสงสัย เพิกเฉยต่อไป"
 espionage.1005.b:0 "ก็ได้$espionage.1001.b$"
 espionage.1005.c:0 "กําจัด \"ความร่วมมือ\" นี้ซะ"
 espionage.1005.c.tooltip:0 "ถ้าสายลับมีจริง และอย่างใดรอดชีวิต พวกเขาอาจมีความเสี่ยง§Rข้อบกพร่อง§!."
 espionage.1011.name:0 "การ ยึด ไว้ อย่าง เข้ม งวด"
 espionage.1011.desc:1 "ไม่มีข้อความเพิ่มเติมจากปฏิบัติการของเราไม่สนใจภายใน§Y[disavowed_agent_country.GetName]§!เรื่อง นี้ ถูก ถือ ว่า เป็น การ แก้ ปัญหา.\n\nเราไม่อาจรู้ได้ว่ามีอดีตสายลับจริงหรือไม่ หรือเราก็ไม่รู้จริงๆว่า มีความฉลาดที่มีประโยชน์หรือเปล่า ถ้านี่เป็น[disavowed_agent_country.GetAdj]อุบาย: เราระบุได้อย่างปลอดภัย ว่าแผนการของพวกเขาล้มเหลว"
 espionage.1012.name:0 "สะพาน ที่ ถูก เผา"
 espionage.1012.desc:1 "เราได้รับคําหยาบจาก§Y[disavowed_agent_country.GetName]§!พวกเขาอ้างว่ามี§Hเดิม[root.GetAdj]สายลับ§!และขอให้เราพิจารณา นอกจากนี้ บุคคลนี้ได้รับการกําหนดที่จะลงโทษทุก ๆ สังคมของพวกเขาได้กําหนดสําหรับ \"ตัวแทนต่างชาติ\"\n\n$espionage.1012.desc.end$"
 espionage.1012.desc.official:1 "เราได้รับการค่อนข้างควอนิเกแบบบลูสก์จาก[disavowed_agent_official.GetName]ของ§Y[disavowed_agent_country.GetName]§!. [disavowed_agent_official.GetHeSheCap]อ้าง[disavowed_agent_official.GetSXX]ที่จะได้เข้าหา โดยคนที่ได้ระบุตัวเองว่า§Hเดิม[root.GetAdj]สายลับ§!. เดอะ[disavowed_agent_country.GetAdj]ผู้แทนใช้คําไม่กี่คํา แต่ช่างแสดงออกถึง ความอดทนที่แคบของจักรวรรดิ สําหรับตัวแทนต่างชาติ\n\n$espionage.1012.desc.end$"
 espionage.1012.desc.end:0 "ถ้า จะ เชื่อ ว่า มี ส่วน ใด ส่วน หนึ่ง ของ ข่าวสาร นี้ ก็ คง เป็น ไป ได้ ที่ ผู้ ปฏิบัติ หน้า ที่ ที่ ไม่ น่า เชื่อ ได้ พบ จุด จบ ที่ ทํา ให้ ถึง ตาย. ไม่ว่าทางไหน คดีนี้มีผลกระทบทางการทูต"
 espionage.1013.desc:1 "เราได้รับการแถลงที่ผิดปกติจาก§Y[disavowed_agent_country.GetName]§!อ้างว่าพวกเขาได้รับการเข้าหาโดย§Hเดิม[root.GetAdj]สายลับ§!.... หากจะเชื่อว่าข้อความดังกล่าวเป็นปฏิบัติการที่ไม่น่าเชื่อถือนี้ ไม่เพียงแต่มีอยู่เท่านั้น แต่ยังรู้สึกว่าไม่มีส่วนติดต่ออื่น นอกจากส่วนที่บกพร่อง - จะทําการยกเลิกทันทีโดย[disavowed_agent_country.GetAdj]เจ้าหน้าที่ หรือเพื่อให้ข้อความเรียกร้อง\n\nเดอะ[disavowed_agent_country.GetName]ไม่ ได้ ระบุ อย่าง แน่ชัด ว่า แนว ทาง ปฏิบัติ ของ พวก เขา จะ เป็น เช่น ไร ต่อ ไป แต่ คน เช่น นั้น คง จะ อยู่ ภาย ใต้ การ สังเกต อย่าง ใกล้ ชิด อย่าง แน่นอน ตราบ เท่า ที่ เขา ยัง อยู่ ที่ นั่น. อย่างเป็นทางการ[disavowed_agent_country.GetName]ได้ออกคําพิพากษาทางการทูต ต่อต้านเรา สําหรับ \"ชัยชนะของดินแดนอธิปไตย\" นี้"
 espionage.1016.name:0 "การ ปฏิเสธ ขั้น สุด ท้าย"
 espionage.1016.desc.network:4 "ที่ปรึกษารักษาความปลอดภัยของเรารายงานสิ้นสุดภัยคุกคามใด ๆ ที่อาจเกิดขึ้นโดยอดีตสายลับของเราใน§Y[disavowed_agent_country.GetName]§!. $espionage.1016.desc.end$"
 espionage.1016.desc.nonetwork:1 "คนที่เคยพยายามติดต่อกลับมาจากภายใน§Y[disavowed_agent_country.GetName]§!ถูกจัดการอย่างขาวสะอาด$espionage.1016.desc.end$"
 espionage.1016.desc.end:0 "หน่วยเฉพาะกิจที่สามารถยืนยัน การดํารงอยู่ของบุคคลนี้ - ก่อนที่จะจบอย่างรวดเร็ว อย่างไรก็ตาม ไม่มีใครแน่ใจได้ ว่านี่เป็นปฏิบัติการที่แท้จริง หรือเป็นส่วนหนึ่งของ[disavowed_agent_country.GetAdj]แผน\n\nทั้งสองวิธี : ทั้งการดํารงอยู่ของปฏิบัติการและข้อมูล ที่พวกเขาอ้างว่าถือได้ในขณะนี้ ได้รับการวางอย่างปลอดภัยเกินเอื้อมของทั้งสองจักรวรรดิ"
 espionage.1017.name:0 "ผู้ ออก แบบ"
 espionage.1017.desc:1 "ทีมจู่โจมลับที่เราส่งไป§Y[disavowed_agent_country.GetName]§!ได้กลับมาอย่างเร่งรีบ ดูเหมือนไม่มีสายลับที่ไม่น่าไว้ใจ แทนสิ่งที่ทีมพบเป็นหลักฐานที่ละเอียดอ่อน ของแผนการที่จะเปิดโปงปฏิบัติการลับของเรา\n\nบางทีนี่อาจจะเป็นแผนที่จะต่อไป[disavowed_agent_country.GetAdj]เป้าหมาย, บางทีร่างกายภายนอก พยายามจะก้าวก่ายเรื่องของเรา ไม่ ว่า กรณี ใด: มาตรการ เก็บ รักษา ของ เรา ถูก ทํา ให้ ล้ม เหลว ทัน เวลา พอ ดี เพื่อ หลีก เลี่ยง การ เปิดโปง การ ดําเนิน งาน ของ หน่วยสืบราชการลับ ของ เรา ทั้ง ใน อดีต และ ปัจจุบัน."
 espionage.1017.a:0 "หลบโชคดี"
 espionage.1021.name:0 "การ กลับ มา ของ โอ เปรา แบบ ไม่ น่า เชื่อ"
 espionage.1021.desc:4 "คนของเราที่ครั้งหนึ่งเคยอ่อนแอได้ทําให้มันกลับไปที่[root.GetAdj]พื้นที่ นี่§H[disavowed_agent_country.GetAdj]ส่วนบุคคล§!- คนที่ระบุว่า[disavowed_operative.GetHimselfHerself]เป็น[disavowed_operative.GetName]- ดูประหม่าและผ่อนคลาย แต่ได้ตรวจสอบการรักษาความปลอดภัยหมดแล้ว การสรุปสรุปสรุปได้รับการอธิบายอย่างทนทาน แต่ข้อมูลได้พิสูจน์แล้วว่ามีประโยชน์§Yชุดรหัสอักขระ§!.\n\nกับเรื่องที่ตอนนี้แก้ไข[disavowed_operative.GetName]การสลายตัวของแข็งตัวจะถูกต่อเติม ได้ยืนยันแล้วว่า[disavowed_operative.GetHeShe] [disavowed_operative.GetIsAre]ไม่ล้มเหลวในการดําเนินการ ปฏิบัติการของเราในปัจจุบัน สามารถมั่นใจได้ว่าครั้งนี้ การสลายตัวจะติด"
 espionage.1022.name:0 "มันเป็นป้อยอ!"
 espionage.1022.desc:3 "ดูเหมือนว่าเรารีบร้อนเกินไปในการพยายามที่จะแยกสิ่งที่เราคิดว่า§Hปฏิบัติการที่ไม่สามารถรับได้§!เราขาดการติดต่อกับทีมปฏิบัติการที่เราส่งไป§H[disavowed_agent_country.GetName]§!ตอนนี้เราสงสัยว่าสายลับไม่เคยมีตัวตน\n\nเจ้าหน้าที่ทุกคนที่เกี่ยวข้อง กับความพยายามนี้ ได้รับการปฏิเสธ ผล ก็ คือ ความ สามารถ ของ เรา ใน การ ดําเนิน งาน ต่อ ไป[disavowed_agent_country.GetName]จะถูกจํากัดอยู่ระยะหนึ่ง เมื่อเครือข่ายเส้นพริ้วไหวฟื้นตัว"
 espionage.1022.a:0 "นี่ ไม่ ใช่ เรื่อง แปลก."

 espionage.1030.name:0 "ซ่อน ตัว ใน ภาพ ที่ เห็น ได้"
 espionage.1030.desc:2 "บางคนที่เราควบคุม§H[vividsight_country.GetName]§!กําลังเริ่มดึงดูดความสนใจที่ผิดปกติ พวกเขาถูกมองว่า...\n\nเราไม่มีเหตุผลที่จะเชื่อว่า ตัวตนของพวกเขาอยู่ในความเสี่ยง แต่การเจริญเติบโตของพวกเขา"
 espionage.1030.a:0 "นี่อาจเป็นประโยชน์ ถ้าจัดการได้ดี"
 espionage.1030.b.hive:0 "ทําแบบนี้ไม่ได้หรอก จัดเตรียม \"แก้ไข\""
 espionage.1030.b.machine:0 "ทําแบบนี้ไม่ได้หรอก ปรับค่าพารามิเตอร์ของพวกมัน"

 espionage.1040.name:0 "ความ ประหลาด ใจ"
 espionage.1040.desc.regular:1 "ของเรา$role_spymaster$เฝ้าดู§H[luckycatch_country.GetName]§!รายงานเรื่องความประหลาดใจ การได้ของใหม่§Yชุดรหัสอักขระ§!คนที่จะรับใช้ปฏิบัติการของเรา เมื่อเราต้องการมัน\n\nมี การ พยายาม ทุก วิถี ทาง เพื่อ ให้ แน่ ใจ ว่า การ ติด ต่อ ใหม่ นี้ เป็น เรื่อง จริง. มี การ ตั้ง โปรโตคอล เพื่อ ลด ความ เสี่ยง ของ ตัว แทน สอง คน."
 espionage.1040.desc.gestalt:1 "ท่ามกลางงานลับมากมายของเรา§H[luckycatch_country.GetName]§!เป็นหน่วยสอดแนมที่มีศักยภาพต่ํา เครื่องมือใด ๆ ที่เราสามารถนําไปใช้ ของเรา$role_spymaster$รายงานเพิ่งทําให้คนหนึ่งโชคดี"
 espionage.1040.desc.caughtspies:1 "เราได้กักขังกลุ่มของ§P[luckycatch_country.GetAdj]สายลับ§!ดูเหมือนว่าพวกเขาได้มีส่วนร่วมในการดําเนินการกับเรา รายละเอียดที่เรายังไม่รู้\n\nด้วยการสอบสวนของเรา อย่างไรก็ตาม เราได้รวบรวมข้อมูลบางอย่าง§H[luckycatch_country.GetName]§!ของเรา$role_spymaster$ตอนนี้ยังเข้าถึงพื้นที่§Yชุดรหัสอักขระ§!ซึ่งเราสามารถผลักดันข้อได้เปรียบนี้ได้"
 espionage.1040.desc.caught:1 "ของเรา$role_spymaster$ใน§H[luckycatch_country.GetName]§!รายงานว่าเราจับกลุ่มของ§Pผู้ ก่อ การ ร้าย§!แม้ว่าเราจะไม่สามารถป้องกัน การรุกรานของพวกเขา ที่มีต่อเราได้\n\nหน่วยสืบราชการลับที่เรารวบรวมมา จะไม่ให้บริการเรานาน แต่การจับกุมเหล่านี้ซุปได้ให้เราได้เปรียบในการดําเนินการของเราเองกับ[luckycatch_country.GetName]ผ่านพวกเขา เราได้รักษาความปลอดภัย§Yชุดรหัสอักขระ§!เพื่อช่วยเราเมื่อจําเป็น"
 espionage.1040.a.tooltip:0 "เราได้§Yชุดสําเร็จ:§!สําหรับเครือข่ายสเปกใน§H[luckycatch_country.GetName]§!."

 espionage.1050.name:0 "ผู้ ค้น พบ รักษา ไว้"
 espionage.1050.desc:2 "โดยเฉพาะอย่างยิ่งคนที่สังเกตใน§Y[finderskeepers_country.GetName]§!ได้วางของพวกเขา[root.species.GetHandNamePlural]ในส่วนของ§H[finderskeepers_country.GetAdj]กุญแจเข้ารหัส§!มันจะดูเหมือนประมาท[finderskeepers_country.GetSpeciesName] $job_politician$ทําให้อุปกรณ์เสีย ระหว่างที่เชื่อมต่อ\n\nนี่ดีพอสําหรับการดําเนินงาน[finderskeepers_country.GetName]แต่การศึกษาของเราของการออกแบบที่พิเศษของเครื่อง ได้เปิดเผยความเข้าใจนวนิยาย สําหรับวิธีการทั่วไปของเรา§Y$MOD_INTEL_DECRYPTION_ADD$§!."

 espionage.1060.name:0 "ส ตรา ลี คอม ทู นี คี"
 espionage.1060.desc:1 "หนึ่งในพวกเรา$job_politician_plural$บน[capital_scope.GetName]มีความผิดพลาดอย่างประมาทแพ็คของวัสดุที่ละเอียดอ่อนรวมทั้ง§Hกุญแจเข้ารหัส§!ที่อาศัยอยู่นอกสถานที่ราชการ เป็นการละเมิดระเบียบอย่างร้ายแรง\n\nเจ้าหน้าที่ภายในประเทศของเรากําลังเบียดเสียดกัน เพื่อเปลี่ยนระบบรักษาความปลอดภัย เนื่องจากเป็นไปได้ว่า วัสดุเหล่านี้อาจจะ ตกเป็นภัย[root.species.GetHandNamePlural]."
 espionage.1060.desc.corp:1 "หนึ่งในพวกเรา[root.GetCorpRulerJobPlural]บน[capital_scope.GetName]มีความผิดพลาดอย่างประมาทแพ็คของวัสดุที่ละเอียดอ่อนรวมทั้ง§Hกุญแจเข้ารหัส§!ซึ่งเป็นเพียงการดํารงอยู่นอกเขต จํากัด จํากัด เป็นการละเมิดอย่างร้ายแรงของโปรโตคอล\n\nทีมรักษาความปลอดภัยของเรากําลังเคลื่อนไหว เพื่อเปลี่ยนขั้นตอนดําเนินการ เนื่องจากเป็นไปได้มาก วัสดุเหล่านี้อาจจะตกลงไปใน[root.species.GetHandNamePlural]ของคู่แข่งของเรา"
 espionage.1060.a:0 "ยิงคนไร้ความสามารถเดี๋ยวนี้"
 espionage.1060.a.tooltip:1 "A£job_politician£ §Y$job_politician$§!ในเมืองหลวงของเราถูกไล่ออก§Rสาธิต§!."
 espionage.1060.b:0 "$espionage.1060.a$"
 espionage.1060.b.tooltip:1 "A§Y[root.GetCorpRulerJobIcon]§!ในเมืองหลวงของเราถูกไล่ออก§Rสาธิต§!."

 espionage.1070.name:0 "พบการแทรกซึมของศัตรูแล้ว"
 espionage.1070.desc.identified.intro:1 "มาตรการการเข้ารหัสของเราจับกลุ่ม ของผู้แทรกซึมอันตรายได้ ศัตรูพวกนี้ดูเหมือนจะกําลังทํางานในนามของ§H[hostile_infiltration_country.GetName]§!ในแผนการที่ค่าใช้จ่ายมาก[root.species.GetAdj]ชีวิตและสร้างความเสียหายอย่างมหาศาล"
 espionage.1070.desc.identified:1 "$espionage.1070.desc.identified.intro$\n\nเราจัดการ§Yถอดรหัส§!วัสดุหลายอย่างที่พวกเขาดําเนินการ แต่ไม่มีใครวางออกขอบเขตเต็มรูปแบบของแผนของพวกเขากับเรา; และเราไม่สามารถพูดได้อย่างแน่ใจสิ่งที่ย้ายของพวกเขาต่อไปอาจจะเป็น ข้อมูลของเราค่อนข้างน้อย\n\nเรา ต้อง พิจารณา อย่าง รอบคอบ ว่า จะ ตอบ อย่าง ไร. เราอาจต้องการที่จะเก็บเงียบเกี่ยวกับความสามารถของเราเอง เสแสร้งไม่รู้ ในด้านหน้าของเพื่อนบ้านอื่น ๆ ของเรา อย่าง ไร ก็ ตาม เรา จะ มี เหตุ ผล ด้วย ใน การ ปฏิเสธ การ กระทํา ที่ รุนแรง เช่น นี้ ต่อ เรา อย่าง เปิด เผย."
 espionage.1070.desc.identified.hostile:1 "$espionage.1070.desc.identified.intro$\n\nในบรรดาวัสดุที่เราบังคับให้ สกัดออกมาจากมัน มีบันทึกการสื่อสารจํานวนมาก ซึ่งเราจัดการถอดรหัสได้ ไม่มีใครบรรยายขอบเขตเต็มรูปแบบของแผนของพวกเขากับเรา;[hostile_infiltration_country.GetAdj]การรักษาความปลอดภัยดูเหมือนจะมีประสิทธิภาพ พอที่จะให้ข้อมูลเท่านั้น ทุกอย่างที่เราดึงออกมาจากพวกเขา เป็นข้อมูลที่เชื่อถือไม่ได้\n\nแม้ ว่า มี เหตุ ผล สม ควร ที่ เรา จะ แสดง ความ ขุ่น เคือง แต่ เรา ควร พิจารณา คํา ตอบ ของ เรา. เราสามารถเก็บเงียบเกี่ยวกับทักษะการเข้ารหัสของเราเอง หลอกลวงความไม่สงบในด้านหน้าของศัตรูของเรา เราต้องเปิดโปง[hostile_infiltration_country.GetName]อย่าง ไร ก็ ตาม เรา อาจ พบ ว่า ศัตรู เหล่า นั้น ถึง กับ เห็น อก เห็น ใจ เรา."
 espionage.1070.desc.unknown:1 "มาตรการการเข้ารหัสของเราได้จับ กลุ่มของนิรนาม แต่อันตราย แทรกซึม พวกเขาเรียกร้องความภักดีหลายรูปแบบ ไม่มีที่ไหนที่เราจะตรวจสอบได้\n\n$espionage.1070.desc.middle$\n\nอาจ คุ้ม ค่า ที่ จะ เฝ้า ระวัง อยู่ เสมอ[hostile_infiltration_country.GetName]เผื่อไว้ก่อน อย่าง ไร ก็ ตาม อาจ เป็น ประโยชน์ เช่น กัน ที่ เรา จะ เงียบ และ ไม่ เก็บ ความ อ่อนแอ ที่ ไม่ มี การ ควบคุม ไว้ ใน ความ ปลอด ภัย ของ เรา เอง."
 espionage.1070.desc.middle:0 "พวกนี้[hostile_infiltration_country.species.GetName]- เจ้าหน้าที่ที่ดูจะพกพาหลักฐานต่างๆไป ซึ่งบางส่วนเราถอดรหัสได้ง่ายมาก อย่าง ไร ก็ ตาม เรา สงสัย ว่า สิ่ง เหล่า นี้ เป็น สิ่ง ที่ ทํา ให้ เขว หรือ เป็น การ หลอก ลวง. สายลับพวกนี้อาจจะทํางานให้[hostile_infiltration_country.GetName]แต่หลักฐานยังไม่แน่ชัด"
 espionage.1070.desc.unknown.hostile:1 "มาตรการการเข้ารหัสของเราได้จับ กลุ่มของนิรนาม แต่อันตราย แทรกซึม แม้ภายใต้การสอบสวน พวกเขาเรียกร้องความภักดีหลายรูปแบบ ซึ่งไม่มีใครที่เราหวังว่าจะตรวจสอบได้\n\n$espionage.1070.desc.middle$\n\nเราสามารถตอบโต้[hostile_infiltration_country.GetName]- การกระทําดังกล่าวอาจจะถูกนับว่าชอบธรรมโดยผู้อื่น อย่างไรก็ตาม มันเป็นไปได้ว่า เหตุการณ์นี้ทั้งหมด เป็นเหยื่อล่อที่ฉลาดมาก"
 espionage.1070.a:0 "จับตาดูไว้"
 espionage.1070.b:0 "กาแล็คซี่จะได้ยินเรื่องนี้"
 espionage.1070.b.tooltip:0 "\n§Hเดอะ§Y[hostile_infiltration_country.GetName]§!จะได้รับแจ้งว่าเราจับคนของเราได้§!"
 espionage.1070.c:0 "เราจะให้เวลาของเรา"
 espionage.1070.d:0 "ต้องมีใครสักคนต้องรับผิดชอบ"
 espionage.1070.e:0 "ให้พวกเขาซื้อความเงียบของเราในเรื่องนี้"
 espionage.1070.e.fail:0 "เดอะ§Y[from.GetName]§!คง จะ ไม่ ใส่ ใจ มาก นัก ต่อ การ กระทํา ดัง กล่าว."
 espionage.1071.name:0 "ไม่มีหน้าปกที่ยาวกว่า"
 espionage.1071.desc:0 "เป้าหมายล่าสุดในการจารกรรม§Y[from.GetName]§!ไม่เพียงแต่ในแผนของเราเท่านั้น แต่ยังได้เลือกที่จะ§Pเปิดโปงเรา§!สําหรับการกระทําของเรา!\n\nมันเป็นไปได้ว่าไม่มีหลักฐานที่เชื่อถือได้ สนับสนุนคํากล่าวอ้างเหล่านี้ ไม่กี่คนที่เลือกที่จะเชื่อ อย่าง ไร ก็ ตาม ข้อ กล่าว หา เพียง อย่าง เดียว อาจ ก่อ ความ เสีย หาย มาก พอ."
 espionage.1071.desc.hostile:0 "เป้าหมายล่าสุดในการจารกรรม§Y[from.GetName]§!ไม่เพียงแต่ในแผนของเราเท่านั้น แต่ยังได้ตัดสินใจที่จะ§Pเปิดโปงเรา§!สําหรับการกระทําของเราที่มีต่อพวกเขา\n\nเป็นไปได้ว่าพวกเขาไม่มี หลักฐานที่แท้จริงในเรื่องนี้ พวกเขาอาจจะแค่พยายามที่จะหลอกพวกเขา"
 espionage.1071.a:0 "น่าสมเพช"
 espionage.1071.b:0 "สองคนเล่นเกมได้"
 espionage.1072.name:0 "ข้อ กล่าว หา ว่า มี ความ ผิด"
 espionage.1072.desc:1 "เดอะ§H[from.GetName]§!กล่าวหาเรา§Pการ สืบ ค้น ที่ เป็น ปฏิปักษ์§!พวกเขาอ้างว่า เราส่งสายลับไป เพื่อกระทําการรุกรานอันน่ารังเกียจ\n\nไม่ ว่า จะ มี ความ น่า เชื่อ ถือ หรือ การ หา เหตุ ผล อะไร อยู่ เบื้อง หลัง ข้อ กล่าว หา นี้ ก็ ตาม ก็ ยัง ผล ให้ มี การ ลง โทษ ทาง การ ทูต จาก[from.GetName]เรามองไม่เห็นผลโดยตรงจากเรื่องนี้ แต่รอยเปื้อนนี้ไม่น่าจะถูกมองข้าม"
 espionage.1072.a:0 "มันไม่ใช่เรื่องที่เรากังวล"
 espionage.1073.name:0 "เพิ่มระยะเวลา..."
 espionage.1073.desc:0 "เป้าหมายล่าสุดในการจารกรรม§Y[from.GetName]§!ได้จับพวกเราได้คาหนังคาเขา§Hต้องการความช่วยเหลือทางการเมือง§!ใน การ ทํา เช่น นั้น พวก เขา ตก ลง จะ ไม่ เปิดโปง การ กระทํา ที่ ซ่อน เร้น ของ เรา ต่อ กาแล็กซี ที่ กว้าง กว่า.\n\nมันเป็นไปได้ว่าไม่มีหลักฐานยืนยันการกล่าวหาของพวกเขา การกล่าวหาเพียงอย่างเดียว อาจทําให้เกิดความเสียหายเพียงพอ ไม่ว่าแรงจูงใจของพวกเขาคืออะไร[from.GetName]ได้อ้างอํานาจทางการเมืองกับเรา"

 espionage.1081.name:0 "ไม่ มี การ เปิด เผย ชนวน ที่ น่า สงสัย"
 espionage.1081.desc:0 "คนของเราใน§Y[insidious_plot_spynetwork.GetName]§!ได้ค้นพบบางสิ่งบางอย่างที่ผิดปกติ: คําใบ้ที่น่าเชื่อถือที่§H[insidious_plot_country.GetName]§!วางแผนที่จะหลอกเรา! เรายังไม่มีรายละเอียดชัดเจน ของแผนการที่เห็นได้ชัด แต่กล่าวว่า การจัดการความสัมพันธ์ของเราที่มีอยู่\n\n$espionage.1081.desc.outro$"
 espionage.1081.desc.hostile:0 "คนของเราใน§Y[insidious_plot_spynetwork.GetName]§!มีข่าวลือว่า§H[insidious_plot_country.GetName]§!วางแผนที่จะหลอกเรา เรา ยัง ไม่ มี ราย ละเอียด ที่ แน่ชัด เกี่ยว กับ แผนการ ของ พวก เขา แต่ ดู เหมือน ว่า เป็น การ วาง แผน และ บ่อน ทําลาย ชีวิต เรา.\n\n$espionage.1081.desc.outro$"
 espionage.1081.desc.outro:0 "ค่อนข้างวิธีการที่ข้อมูลนี้มาเป็นที่รู้จักโดย[insidious_plot_spynetwork.GetSpeciesName]ยังไม่ชัดเจน คนของเราพยายามติดตามผู้ต้องสงสัย[insidious_plot_spynetwork.GetAdj]แต่หน่วยสืบราชการลับดูเหมือนจะจ่ายเงินไปแล้ว ถ้าความฉลาดนี้เป็นจริง[insidious_plot_spynetwork.GetSpeciesName]อาจ เพียง แต่ ได้ ทํา งาน หนัก ใน การ รวบ รวม มัน มา ให้ เรา."
 espionage.1081.desc.samecountry:0 "คนของเราใน§Y[insidious_plot_spynetwork.GetName]§!ได้เปิดเผยข่าวลือของแผนการท้องถิ่นกับเรา ดูเหมือนว่าพวกเขา§H[insidious_plot_country.GetAdj]§!คู่ปรับค่อนข้างประมาท เกี่ยวกับความลับในปฏิบัติการของตัวเอง\n\nเรายังไม่มีรายละเอียดชัดเจน สําหรับแผนการที่เห็นได้ชัดของพวกเขา แต่กล่าวว่า มีการปรับเปลี่ยนความสัมพันธ์ของเราที่มีอยู่"
 espionage.1081.a:0 "พวกปีศาจ!"
 espionage.1082.name:0 "ผู้ต้องสงสัยยังไม่เผยตัว"
 espionage.1082.desc:0 "คนของเราใน§Y[insidious_plot_spynetwork.GetName]§!พบหลักฐานที่น่าสงสัย§H[insidious_plot_country.GetName]§!หมายถึงการหลอกเรา ในอนาคตอันใกล้\n\n$espionage.1082.outro$"
 espionage.1082.desc.samecountry:0 "คนของเราใน§Y[insidious_plot_spynetwork.GetName]§!ได้เปิดเผยหลักฐานที่น่าสงสัย ว่าพวกเขาหมายถึงการเปิดตัว การต่อต้านหลอกลวงกับเรา ในอนาคตอันใกล้\n\n$espionage.1082.outro$"
 espionage.1082.outro:1 "เรา ยัง ไม่ มี ราย ละเอียด ที่ แน่ชัด เกี่ยว กับ แผนการ ที่ เห็น ได้ ชัด แต่ ดู เหมือน ว่า เกี่ยว ข้อง กับ การ จัด การ กับ ข้อ ตก ลง ใน เรื่อง ความ ไว้ วางใจ และ วิถี ชีวิต ของ เรา.$role_spymaster$ [insidious_plot_spymaster.GetName]อย่างไรก็ตาม แนะนําอย่างระวัง เพื่อความสะดวกที่เราได้พบกับข้อมูลนี้§Pน่าสงสัยทีเดียว§!."
 espionage.1082.a:0 "ความ โกรธ ที่ อาจ เกิด ขึ้น นี้ ไม่ อาจ ทน ได้."
 espionage.1082.b:0 "นี่น่าจะเป็นแผน ช่างมันเถอะ"
 espionage.1085.name:0 "ซับซ้อนในพล็อต"
 espionage.1085.desc:1 "เรามีส่วนในแผนการต่อต้าน§H[from.GetName]§!คลุมเครือมากก็คือข้อกล่าวหา ที่เราไม่สามารถระบุได้ชัดเจน\n\nสายลับของเราประท้วงว่าการกล่าวหานั้นไม่มีพื้นฐาน อ้างว่านี่น่าจะเป็นการตอบโต้ ตอบโต้จากเป้าหมายของเรา ไม่ว่าจะเหตุผลหรือสาเหตุอะไรก็ตาม[from.GetName]มีความผิดแล้ว"
 espionage.1085.desc.neverspied:0 "น่าประหลาดใจที่เราได้รับการเกี่ยวข้อง ในบางพล็อตกําหนดกับ§H[from.GetName]§!มันเป็นข้อกล่าวหาที่ไร้สาระมาก จากการขาดกิจกรรมจารกรรมของพวกต่างชาติ[from.GetAdj]ไม่มีทางรู้ได้เลยว่า ข้อกล่าวหามันไร้สาระแค่ไหน\n\nดูเหมือนว่าปาร์ตี้ที่เราไม่รู้จัก จะพยายามป้ายความผิดให้กับเรา หรือแค่หว่านความวุ่นวายทางการทูต ไม่ว่าจะเหตุผลหรือสาเหตุอะไรก็ตาม[from.GetName]มีความผิดแล้ว"

