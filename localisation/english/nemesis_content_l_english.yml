 nominate_other_custodian_requires_independence:0 "£trigger_no£พวกเขาต้องเป็นอิสระอย่างเต็มที่ ที่จะทําหน้าที่เป็นคัสโตเดียน"
 nominate_other_custodian_not_crisis:0 "£trigger_no£พวกเขาไม่ยอมรับข้อเสนอของเรา"
 resolution_custodian_form_empire:1 "ประกาศ กาแลกติก อิม เพ เรียม"
 resolution_custodian_form_empire_desc:0 "ทั้ง ๆ ที่ มี ความ พยายาม อย่าง มาก มาย จาก พวก คู ส โต เดีย น ชุมชน กาแลกติก ก็ ยัง คง ถูก บ่อน ทําลาย โดย การ แบ่ง แยก ภาย ใน. คิด ดู สิ ว่า จะ ทํา อะไร ได้ บ้าง ถ้า กาแล็กซี ต่าง ๆ อยู่ ร่วม กัน ภาย ใต้ การ นํา ที่ เข้ม แข็ง. ยุค แห่ง สันติภาพ และ ความ เจริญ รุ่งเรือง ที่ ไม่ เคย มี มา ก่อน อยู่ ใน ขอบ เขต ที่ เรา จะ บรรลุ ได้."
 resolution_custodian_form_empire_tooltip:3 "เดอะ§Yชุมชน กาแลกติก§!เปลี่ยนเป็น§Yกาแล็กติก อิมเปเรียม§!.\n§Rสมาชิกทุกคนออกจากสหพันธรัฐ§!\n\n§Rเดอะ§Y[Root.GetName]§!กลายเป็น§Yโคเรอิมพีเรียล§!ย้ายไปยัง§Yการอนุญาตสิทธิ์§!และ (มะลาอิกะฮฺ) ผู้ควบคุมอย่างรัดกุม§Yจักรพรรดิ§!รัฐบาล ทั้งหมดไม่สอดคล้องกัน§Yซิฟิค§!เอาออกไป§!"
 resolution_custodian_form_empire_tooltip_machine:1 "เดอะ§Yชุมชน กาแลกติก§!เปลี่ยนเป็น§Yกาแล็กติก อิมเปเรียม§!.\n§Rสมาชิกทุกคนออกจากสหพันธรัฐ§!\n\nเดอะ§Y[Root.GetName]§!กลายเป็น§Yจักรพรรดิเน็กซัส§!."
 resolution_custodian_form_empire_tooltip_hive:1 "เดอะ§Yชุมชน กาแลกติก§!เปลี่ยนเป็น§Yกาแล็กติก อิมเปเรียม§!.\n§Rสมาชิกทุกคนออกจากสหพันธรัฐ§!\n\nเดอะ§Y[Root.GetName]§!กลายเป็น§Yไฮฟ์§!."

 resolution_awakened_galactic_empire: "จง ประกาศ กาแลกติก อิม เพ เรียม ที่ ตื่น ตัว"
 resolution_awakened_galactic_empire_desc: "จักรวรรดิในกาแล็กซี่นี้ยังเด็กเกินไป และขาดประสบการณ์ มันต้องการไกด์ในยุคที่ลําบาก"
 resolution_form_awakened_galactic_empire: "เดอะ§Yชุมชน กาแลกติก§!เปลี่ยนเป็น§Yกาแล็กติก อิมเปเรียม§!.\n§Rสมาชิกทุกคนออกจากสหพันธรัฐ§!\n\nเดอะ§Y[Root.GetName]§!กลายเป็น§Yจักรพรรดิ ผู้ ตื่น ตัว§!."

 resolution_custodian_united_front:0 "แนวรบร่วม"
 resolution_custodian_united_front_desc:0 "ภัยคุกคามที่กาแล็กซี่ของเรา เสนอทางเลือกง่ายๆให้เรา ยืนหยัดด้วยกัน หรือตายอย่างโดดเดี่ยว เราจะต่อสู้เป็นหนึ่งเดียว แบ่งปันข้อมูลเกี่ยวกับศัตรู และเก็บความแค้นเก่ากัน"
 resolution_emperor_united_front:0 "$resolution_custodian_united_front$"
 resolution_emperor_united_front_desc:0 "$resolution_custodian_united_front_desc$"
 resolution_custodian_galactic_mobilization:0 "การ ทํา โม บิลิ เอด"
 resolution_custodian_galactic_mobilization_desc:0 "อนาคตของกาแล็คซี่ของเรากําลังเสี่ยง กอง เรือ รบ ขนาด ใหญ่ ต้อง รีบ เคลื่อน ที่ แม้ ว่า จะ หมาย ถึง ความ ประทับ ใจ ของ ลูก เรือ พ่อค้า พลเรือน."
 resolution_custodian_galactic_standard:0 "มาตรฐาน แกแล็กติก"
 resolution_custodian_galactic_standard_desc:1 "แกแล็กติก สแตนดาร์ดเป็นภาษาใหม่ ที่ได้รับการออกแบบมาโดยเฉพาะเพื่อใช้อย่างง่าย โดยสัตว์พยางค์ทั้งหมด โดย การ แนะ นํา ให้ ใช้ ภาษา เดียว กับ ประชาคม กาแลกติก ทุก แห่ง อย่าง เป็น ทาง การ หวัง ว่า อาจ หลีก เลี่ยง ความ ผิด พลาด ใน การ แปล ได้."
 resolution_custodian_anti_piracy:0 "ทวนเข็มนาฬิกาอินิชิเอทีฟ"
 resolution_custodian_anti_piracy_desc:0 "ผู้ก่อการร้ายอวกาศขู่จะบ่อนทําลาย ความเป็นอยู่ทางเศรษฐกิจของกาแลคซีทั้งหมด ด้วยการเริ่มต้นนี้ สมาชิกชุมชนทั้งหมดจะได้รับการศึกษา ในมาตรการต่อต้านการก่อกบฏที่มีประสิทธิภาพ ความ พยายาม ร่วม กัน เพื่อ พัฒนา กลยุทธ์ ใน การ ต่อ สู้ ซึ่ง ใช้ ประโยชน์ จาก การ ขาด วินัย โดย ทั่ว ไป ใน หมู่ พวก โจร สลัด และ ผู้ ปล้น จะ ดําเนิน การ ด้วย."
 resolution_custodian_extend_custodianship:0 "ต่ออายุตำแหน่งผู้พิทักษ์"
 resolution_custodian_extend_custodianship_desc:0 "การทําให้กาแล็คซี่ดีขึ้น เป็นงานที่ยิ่งใหญ่ที่ต้องใช้เวลา ความ เป็น อยู่ ใน ปัจจุบัน"
 resolution_custodian_extend_custodianship_tooltip:1 "ข้อจํากัดของเทอมปัจจุบัน§Yภาษากัสโทเดียนชื่อ§!และ (มะลาอิกะฮฺ) ผู้ควบคุมอย่างรัดกุม§Y30 ปี§!."
 resolution_custodian_perpetual_custodianship:1 "อยู่ในตำแหน่งผู้พิทักษ์ไม่จำกัดระยะเวลา"
 resolution_custodian_perpetual_custodianship_desc:0 "พวกคูสตอเดียนในปัจจุบัน ได้พิสูจน์ตัวเองแล้ว ว่าเป็นผู้พิทักษ์ของชุมชน การให้บริการที่กล้าหาญของพวกเขาไปยังกาแล็กซี่ จะต้องได้รับอนุญาตให้ยังคงไม่มีที่สิ้นสุด"
 resolution_custodian_perpetual_custodianship_tooltip:0 "ปัจจุบัน§Yการ ควบคุม§!จะยังคงดํารงอยู่ต่อไป"
 resolution_custodian_end_custodianship:0 "ยุติการปกครองโดยผู้พิทักษ์"
 resolution_custodian_end_custodianship_desc:0 "ชุมชนกาแล็กติก ไม่มีความต้องการชาวคัสโตเดียนอีกต่อไป เมื่อ เป็น เช่น นั้น ควร จะ ยุติ การ เป็น เจ้า หน้าที่ ควบคุม ดู แล ก่อน ที่ จะ มี การ จํากัด เวลา."
 resolution_custodian_end_custodianship_tooltip:0 "เดอะ§Yการ ควบคุม§!จบก่อนเวลาอันควร"

 resolution_custodian_gdf:1 "หน่วยป้องกันกาแล็กซี่"
 resolution_custodian_gdf_desc:0 "เพื่อ จะ ปก ป้อง สมาชิก ของ ชุมชน ได้ ดี ขึ้น ต้อง มี การ ก่อ ตั้ง พลัง ที่ มี อยู่ ทั่ว โลก ภาย ใต้ การ บังคับ บัญชา ของ กาแลกติก คู ส โต เดีย น."
 resolution_custodian_gdf_2:0 "$resolution_custodian_gdf$"
 resolution_custodian_expand_gdf:1 "การขยายแบบ GDF"
 resolution_custodian_expand_gdf_desc:0 "ขนาดของกองกําลังป้องกันกาแล็กซี่ จะต้องเพิ่มขึ้นมาก หากมันตรงกับขอบเขตที่เพิ่มขึ้น"
 resolution_custodian_disband_gdf:0 "ยกเลิกการยุบแบบ GDF"
 resolution_custodian_disband_gdf_desc:0 "กองกําลังป้องกันกาแล็กติก ได้ทําหน้าที่ตามวัตถุประสงค์ของมัน และตอนนี้ควรจะถูกลดจํานวนลง"
 resolution_custodian_ina:1 "หน่วยงานการนําทางดวงดาว"
 resolution_custodian_ina_desc:0 "อินาจะบังคับมาตรฐานและแนะนําการปฏิบัติ สําหรับการท่องอวกาศ และจะรักษาฐานข้อมูลขนาดใหญ่ของทุกอันตรายในอวกาศ"
 resolution_custodian_disband_ina:0 "ยกเลิกองค์กรนําทางดวงดาว"
 resolution_custodian_disband_ina_desc:0 "ไอเอ็นเอเป็นองค์กรที่ไม่มีประสิทธิภาพและแพง การ ดํารง อยู่ อย่าง ต่อ เนื่อง ของ มัน ไม่ อาจ มี เหตุ ผล."
 resolution_custodian_gto:1 "องค์กรพาณิชย์แกแล็กติก"
 resolution_custodian_gto_desc:0 "ขนาด GTO จะทําหน้าที่เป็นหน่วยงานควบคุมกาแล็กซี่ ที่บังคับใช้มาตรฐานการค้าและการแก้ไขความขัดแย้ง"
 resolution_custodian_disband_gto:0 "ยกเลิกองค์กรการค้ากาแล็กซี่"
 resolution_custodian_disband_gto_desc:0 "การแทรกแซงของขนาด GTO ต้องมาถึงจุดสิ้นสุด การค้ามีวิธีควบคุมตัวเอง"
 resolution_custodian_galpol:1 "กาฬโรค"
 resolution_custodian_galpol_desc:0 "การสร้างองค์กรอาชญากรรมกาแล็กซี่ จะช่วยให้หน่วยงานบังคับใช้กฎหมาย ความร่วมมือไปทั่วชุมชนกาแล็กติก"
 resolution_custodian_disband_galpol:0 "ยกเลิกการเชื่อมต่อกาฬโรค"
 resolution_custodian_disband_galpol_desc:0 "กาฬโรคต้องไม่ได้รับอนุญาตให้เป็น\"ตํารวจลับ\" ของชนชั้นนําในการปกครองชุมชนกาแล็กติก มันควรจะถูกยุบออกทันที"

 resolution_category_emperor_imperial_institutions:0 "สถาบัน จักรพรรดิ"
 resolution_emperor_imperial_armada:1 "กอง เรือ อาร์ม า ดา"
 resolution_emperor_imperial_armada_desc:1 "โดยมีการเกณฑ์ทหารจากอิมเปอเรียมทั้งหมด กองทัพบกอิมพีเรียลจะเป็นกองเรืออวกาศที่แข็งแรงที่สุด เท่าที่กาแล็กซี่เคยเห็นมา"
 resolution_emperor_expand_ia:1 "การ แผ่ ขยาย ของ จักรวรรดิ"
 resolution_emperor_expand_ia_desc:1 "ขนาดของกองทัพบกจักรพรรดิ ต้องเพิ่มขึ้น เพื่อชัยชนะของอิมเปอเรียม"
 resolution_emperor_imperial_legions:1 "จักรวรรดิ"
 resolution_emperor_imperial_legions_desc:1 "ไม่มีเกียรติยศใดยิ่งใหญ่ไปกว่า การรับใช้กาแล็กซี่ในฐานะกองพลหลวง การขุดเจาะจากครีมของทหารเกณฑ์ทั้งหมดทั่วอิมเปอเรียม ทหารราบจะถูกเจาะและปรับให้กลายเป็นกองกําลังภาคพื้นดินที่ซื่อสัตย์อย่างบ้าคลั่ง"
 resolution_emperor_isd:1 "กรรมการความมั่นคงของจักรพรรดิ"
 resolution_emperor_isd_desc:1 "สันติภาพ, เสถียรภาพ, ระเบียบ - หลักสําคัญมากที่กาแล็กซี่อิมเปอเรียมก่อตั้ง ISD จะตามล่า บรรดาอาชญากร ผู้ก่อการร้าย และกลุ่มผู้ก่อการ"
 resolution_emperor_itc:1 "บริษัทการค้าอิมพีเรียล"
 resolution_emperor_itc_desc:0 "ITC จะดําเนินการภายใต้กฎบัตรอิมพีเรียลและการบริหารและคณะกรรมการบริหาร จะอยู่ภายใต้การควบคุมโดยตรงของจักรพรรดิกาแล็กติก"

 resolution_category_imperial_council:0 "สภาจักรวรรดิ"
 resolution_emperor_trial_of_advancement:0 "โดยการทดสอบความก้าวหน้า"
 resolution_emperor_trial_of_advancement_desc:1 "ไม่ มี ใคร เห็น ด้วย เลย ว่า เป็น ไป ได้ ที่ จะ ท้าทาย สมาชิก สภา จักรพรรดิ เพื่อ นั่ง บัลลังก์ ของ ตน ใน การ พิจารณา คดี ความ. ผู้ ปราด เปรื่อง และ ผู้ ถ่อม ใจ ต้อง ถูก ตัด ออก จาก ชั้น บน ของ อิมเป เรียม."
 resolution_emperor_trial_of_advancement_tooltip:0 "แกรนท์§Yความก้าวหน้า§!คัสซัส เบลลีในสมาชิกสภาจักรพรรดิ."
 resolution_emperor_by_appointment:0 "โดยการแต่งตั้ง"
 resolution_emperor_by_appointment_desc:1 "สมาชิกของสภาอิมพีเรียล ต้องทําหน้าที่ตามความพอใจของสมเด็จพระบาทสมเด็จพระเจ้าอยู่หัวของพวกเขา ที่ควรจะมีอิสระในการเลือก จากในหมู่ประชาชนที่ภักดีของอิมเปอเรียมทั้งหมด"
 resolution_emperor_by_appointment_tooltip:1 "ผู้ปกครองอิมเปอเรียม มีอิสระในการแต่งตั้ง บุคคลที่เขาต้องการในสภาจักรพรรดิ"
 resolution_emperor_by_election:0 "โดยการเลือกตั้ง"
 resolution_emperor_by_election_desc:0 "เช่นเดียวกับในชุมชนกาแล็กติกเก่า สมาชิกของสภาอิมพีเรียลควรจะได้รับเลือก จากอํานาจเลือกตั้งของพวกเขา"
 resolution_emperor_by_election_tooltip:0 "สมาชิกในสภาอิมพีเรียล ถูกตัดสินผ่านการเลือกตั้งปกติ§Yความเข้มสี§!."

 resolution_emperor_ina:0 "หน่วยงานการนําทางอิมพีเรียล"
 resolution_emperor_ina_desc:1 "อินาจะบังคับมาตรฐานและแนะนําวิธีการสําหรับการเดินทางในอวกาศ และจะรักษาฐานข้อมูลขนาดใหญ่ของทุกอันตรายของอวกาศที่รู้จักกัน ในทุกตารางระบบอิปเปอร์เรียม"
 resolution_emperor_disband_ina:0 "ยุบองค์กรการนําทางของจักรพรรดิ"
 resolution_emperor_disband_ina_desc:0 "$resolution_custodian_disband_ina_desc$"
