 imperial_loyalists_federation:0 "ผู้ ภักดี ต่อ จักรพรรดิ"
 imperial_loyalists_federation_desc:1 "สมาชิก ที่ ภักดี ของ กลุ่ม กาแลกติก อิมเป เรียม ตั้งใจ จะ บดขยี้ การ กบฏ ที่ ยัง คง มี อยู่."
 succession_type_none:0 "ไม่มี"
 succession_type_none_desc:0 "ไม่ มี การ สืบ ต่อ กัน มา ใน เรื่อง นี้."
 succession_term_perpetual:0 "จํานวนครั้งที่เล่น"
 succession_term_perpetual_desc:0 "ความเหมาะสมในการหล่อเลี้ยงนี้ ไม่มีที่สิ้นสุด และไม่เปลี่ยนแปลง"
