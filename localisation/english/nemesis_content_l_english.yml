 spynetwork_vividsight:0 "การ ปฏิบัติ อย่าง ไม่ เป็น ธรรม"
 spynetwork_vividsight_desc:1 "คนของเราในเครือข่ายเส้นพริ้วไหวนี้ ได้รับความนิยมผิดปกติ เครื่องรางของพวกเขาทําให้มั่นใจ§Gปฏิบัติการง่ายขึ้น§!แต่ความเสี่ยงที่เพิ่มขึ้น§Rเราลด$MOD_SPY_NETWORK_DAILY_VALUE_ADD$§!."
#  spynetwork_operative_spooked:0 "Operative Spooked"
#  spynetwork_operative_spooked_desc:0 "Extra resources are devoted to bolstering our operative's cover, given an acute risk of exposure."
 spynetwork_drones_hunted:0 "ข้อ ผิด พลาด สําหรับ อาหาร"
 spynetwork_drones_hunted_desc:0 "คนของเราถูกตามล่า โดยตัวตนดั้งเดิม ขององค์กรที่เราสอดแนมอยู่"
 spynetwork_toxic_field:0 "งาน ใน เขต ร้อน"
 spynetwork_toxic_field_desc:0 "เดอะ[toxic_field_country.GetAdj] [toxic_field_country.GetGestaltEntityName]มันเป็นพิษเล็กน้อย ต่อคนของเราเอง มันจะมีความบกพร่องของการทํางาน จนกว่าเราจะพัฒนา แอนติบอดีเพียงพอ" #e.g. 'The Irathi Hive is mildly toxic...'
 spynetwork_excess_noise:0 "เสียง"
 spynetwork_excess_noise_desc:0 "สิ่งแวดล้อมบน[excess_noise_country.GetAdj]โลกได้กลายเป็นปริศนา ที่มีสัญญาณรบกวนไฟฟ้ามากเกินไป มากกว่าที่เราคุ้นเคยในปัจจุบัน จะมีความบกพร่องของการทํางาน จนกว่าเราจะสามารถรี-รูทฟังก์ชันที่สําคัญ รอบฮาร์ดแวร์ที่ได้รับผลกระทบของเรา"
 spynetwork_drain_resources_cutties:0 "ภาพ วาด ที่ น่า สนใจ"
 spynetwork_drain_resources_cutties_desc:0 "กลุ่มของปฏิบัติการของเราถูกจับได้ การฟื้นฟูสินค้าและการรักษา จากงบประมาณของหน่วยสืบราชการลับของเรา ตอนที่เราเรียกพวกเขาออกมา พวกเขาเลือกที่จะตัดความสัมพันธ์กับเรา"
#  spynetwork_drain_resources_stopped:0 "Enterprising Operatives Tow the Line"
#  spynetwork_drain_resources_stopped_desc:0 "A group of our operatives was caught re-investing goods and currencies from our intelligence-gathering budget. Duly reprimanded, they have since re-doubled their efforts to our cause."
#  spynetwork_operatives_early_disavowal:0 "Operatives Prematurely Disavowed"
#  spynetwork_operatives_early_disavowal_desc:0 "Circumstances forced us to disavow some of our operatives early. Operational capacity is reduced for a time, while we recruit new agents to replace them."
 spynetwork_rigorous_screening:0 "การ ถ่าย ภาพ อย่าง ละเอียด"
 spynetwork_rigorous_screening_desc:0 "ในการปลุกของการแปรพักตร์เมื่อเร็วๆนี้$role_spymaster$กําลังดูแลเจ้าหน้าที่ใหม่อยู่"
 spynetwork_grisly_countermeasures:0 "การ หัก ห้าม ใจ"
 spynetwork_grisly_countermeasures_desc:0 "บาดเจ็บจากหนึ่งในผู้ก่อวินาศกรรมของเรา ได้ยกข้อกังขาขึ้นในหมู่ รปภ.ท้องถิ่น"
 spynetwork_auxiliaries_insight:0 "ความ สามารถ ใน การ สังเกต เข้าใจ"
 spynetwork_auxiliaries_insight_desc:0 "กลุ่มปฏิบัติการเสริมที่ชาญฉลาดอย่างผิดปกติ กําลังช่วยให้มั่นใจได้ว่าปฏิบัติการของเราราบรื่น"
 spynetwork_auxiliaries_lost:0 "สูญ เสีย การ ออก กําลัง กาย"
 spynetwork_auxiliaires_lost_desc:0 "ทรัพยากรของเราถูกกดดันจากการถูกเพิกถอน เมื่อเร็ว ๆ นี้ ของกลุ่มปฏิบัติการเสริม ที่ปรากฏว่ารู้มากเกินไป"
 spynetwork_auxiliaries_leak:0 "ความ สามารถ ใน การ สังเกต เข้าใจ รู้ มาก เกิน ไป"
 spynetwork_auxiliaires_leak_desc:0 "ส่วนหนึ่งของเครือข่ายสแปมของเราได้รับการเปิดเผย หลังจากที่กลุ่มปฏิบัติการเสริม ตระหนักถึงบทบาทของพวกเขา และตัดสินใจที่จะพูดออกมา"

 operation_contact_lost:0 "ที่อยู่ติดต่อสูญหาย"
 operation_contact_lost_desc:0 "การขาดการติดต่อกับปฏิบัติการก่อนหน้านี้ ได้กําหนดความคืบหน้าในปฏิบัติการนี้"
 operation_multiphasic_interference:0 "ส่วนติดต่อผู้ใช้แบบหลายแบบ"
 operation_multiphasic_interference_desc:0 "เรายังคงขาดการติดต่อกับปฏิบัติการของเรา ในขณะที่พวกเขาประสบ ผลกระทบที่ผิดปกติด้าน เมื่อจัดการกับเทคโนโลยีการป้องกันท้องถิ่นของ เป้าหมายของเรา"
 operation_grisly_countermeasures:0 "การ บาด เจ็บ จาก การ ออก กําลัง กาย"
 operation_grisly_countermeasures_desc:0 "คนของเราได้รับบาดเจ็บ จากการตอบโต้ ที่ซ่อนอยู่บนยานนี้ ความ ก้าว หน้า และ ความ สามารถ ของ เรา ใน การ ปก คลุม ได้ รับ การ ขัด ขวาง."

 espionage_research_backdoor:0 "การวิจัยประตูหลัง"
 espionage_research_backdoor_desc:0 "เราได้คว้าโอกาสในการติดตั้ง ประตูหลังเข้าไปในฐานข้อมูล งานวิจัยพลังงานต่างประเทศ วิทยาศาสตร์ของพวกเขา จะให้บริการของเรา"
 espionage_finderskeepers:0 "พบกุญแจการเข้ารหัส"
 espionage_finderskeepers_desc:0 "ลูกน้องของเราคนหนึ่ง เพิ่งพบกุญแจการเข้ารหัส ความผิดพลาดของพลังต่างชาติ โดยการศึกษางานของมัน เราได้ความเข้าใจ ในเทคนิคการถอดรหัสนิยาย"
 espionage_straycomm:0 "กุญแจการเข้ารหัสสูญหาย"
 espionage_straycomm_desc:1 "หนึ่งในพวกเรา$job_politician_plural$เมื่อ เร็ว ๆ นี้ มี การ ทํา สําเนา ข้อมูล ที่ เป็น ความ ลับ ไว้ เป็น มัด ๆ รวม ทั้ง รหัส ที่ มี อยู่. การรักษาความปลอดภัยภายในประเทศของเรา ถูกทําลายไประยะหนึ่งแล้ว"
 espionage_drain_resources_exploit:0 "Enterprising Spy Network"
 espionage_drain_resources_exploit_desc:0 "แก๊งค์สายลับภายในเครือข่ายสไปซี่ของเรา ถูกจับได้ว่าเอาเปรียบการค้าท้องถิ่น ของเรา$role_spymaster$ได้ยกระดับกิจการในตลาดมืด เพื่อผลประโยชน์โดยตรงของเรา"

 research_stolen_sabotaged:0 "การวิจัยกําจัด"
 research_stolen_sabotaged_desc:0 "การแทรกซึมของศัตรูได้เพิ่มข้อมูล ในฐานข้อมูลของเรา ชะลอการทํางานของเรา มันต้องใช้เวลาในการทบทวนการศึกษาของเรา"

