 operation.3005.desc.espionage:0 "$operation.3005.desc.intro$\n\nคนของเราได้ปลอมหลักฐานว่า[from.target.GetName]มีความผิดฐานจารกรรมต่อต้าน[smear_campaign_recipient.GetName]เราจะดูว่าพวกเขาตอบสนอง ต่อข้อกล่าวหาที่เสียหายทางการเมืองดังกล่าว"
 operation.3005.desc.gestalt:0 "$operation.3005.desc.intro$ข้อกล่าวหาใด ๆ ของการพยายามที่จะจัดการจิตสํานึกของพวกเขา ผูกพันที่ทําให้เกิดอารมณ์เสีย คนของเราได้ทํางานเพื่อให้แน่ใจว่า เหล็กกล้าจะมีความรู้สึกสําหรับบางครั้งยัง"
 operation.3010.name:0 "ตรวจพบโครงการย่อย ๆ"
 operation.3010.desc.intro:1 "เดอะ§Y[smear_campaign_target.GetName]§!ดูเหมือนว่าจะมีศัตรูอยู่ใน§H[from.GetName]§!."
 operation.3010.desc:2 "$operation.3010.desc.intro$โปรโตคอลการเข้ารหัสของเรา ได้ระบุข้อมูล การสื่อสารของเรา[smear_campaign_target.GetAdj]เพื่อน บ้าน ซึ่ง ถูก ออก แบบ มา เพื่อ ให้ เรา เชื่อ ว่า พวก เขา วาง แผน จะ รุกราน และ แอบ ทํา ร้าย เรา.\n\n$operation.3010.desc.outro$"
 operation.3010.desc.outro:2 "ตอนนี้ เราต้องเผชิญกับทางเลือก เปิดเผยสิ่งที่เรารู้เกี่ยวกับการหลอกลวงนี้[smear_campaign_target.GetName]หรือ อื่น ๆ ก็ เก็บ เงียบ เกี่ยว กับ ความ สามารถ ของ เรา ใน การ รับมือ กับ การ ก่อ การ ร้าย ที่ เป็น ปฏิปักษ์. แม้ว่าเราจะปกปิดความสามารถที่แท้จริงของเรา เราอาจจะยังคงดึงศัตรูที่น่าสงสัยนี้ออกมา แต่เพียงถ้าเราทําหน้าที่กับข้อมูลที่พวกเขาได้ให้"
 operation.3010.a:1 "เล่นไปตามบท เราจะเก็บเรื่องนี้ไว้เป็นความลับ"
 operation.3010.b:1 "บอก[smear_campaign_target.GetName]."
 operation.3010.favortooltip:1 "เดอะ[smear_campaign_target.GetName]อาจเลือกที่จะให้รางวัลเราด้วยการเมือง§Yความชอบ§!."
 operation.3011.name:0 "$operation.3010.name$"
 operation.3011.desc:2 "$operation.3010.desc.intro$โปรโตคอลการเข้ารหัสของเรา ได้ระบุข้อความแปลก ๆ และเกือบจะไม่เปิดเผย พวกเขารวบรวมโดสเซอร์ของ ใส่ความเรา คาดว่าเขียนโดย[smear_campaign_target.GetAdj]เพื่อนบ้าน - แต่คํายืนยันนี้ จริงๆแล้วเป็นของปลอม\n\n$operation.3010.desc.outro$"
 operation.3012.name:0 "$operation.3010.name$"
 operation.3012.desc:2 "$operation.3010.desc.intro$เราตรวจสอบการสื่อสารเมื่อเร็ว ๆ นี้จากแหล่งที่มา 'ไม่ประสงค์ร้าย' ซึ่งมีวัตถุประสงค์ที่จะเปิดเผยรายละเอียด[smear_campaign_target.GetAdj]“ดังนั้น พวกท่านจงวางแผนต่อต้านเรา แท้จริง มันมิใช่อะไรอื่นนอกจากเป็นการหลอกลวงเท่านั้น” โปรโตคอลการเข้ารหัสของเรา ได้พิสูจน์ความยืดหยุ่น และเปิดเผย[from.GetAdj]วางแผนข้างล่าง\n\n$operation.3010.desc.outro$"
 operation.3020.name:0 "การ โฆษณา ชวน เชื่อ แบบ รุนแรง"
 operation.3020.desc.espionage:1 "เดอะ§Y[smear_campaign_recipient.GetName]§!ได้ส่งมอบเอกสารให้เรา รายละเอียดของข้อกล่าวหาที่ซับซ้อนของการจารกรรม ดูเหมือนว่า§H[smear_campaign_instigator.GetName]§!อยากหว่านความไม่ไว้วางใจระหว่างเรา\n\n$operation.3020.desc.outro$"
 operation.3020.desc.insult:1 "เดอะ§Y[smear_campaign_recipient.GetName]§!ได้เข้ามาใกล้เรากับไดเรกทอรีละเอียดอ่อนใน§H[smear_campaign_instigator.GetName]§!คนที่ดูเหมือนจะอยากให้เราป่วย ถ้า[smear_campaign_recipient.GetAdj]เราเชื่อแฟ้มต่างๆ[smear_campaign_instigator.GetName]เพื่อทําลายความสัมพันธ์ระหว่างเรากับ[smear_campaign_recipient.GetName]โดย หว่าน คํา พูด ใส่ ร้าย ไว้ ใน นาม ของ เรา.\n\n$operation.3020.desc.outro$"
 operation.3020.desc.deception:1 "เดอะ§Y[smear_campaign_recipient.GetName]§!ได้ส่งมอบเอกสารให้เรา เปิดเผยแผนการอันซับซ้อน ซึ่งมีวัตถุประสงค์ที่จะขับเคลื่อน เดอะ§H[smear_campaign_instigator.GetName]§!ถูกตั้งชื่อเป็นคนร้าย\n\n$operation.3020.desc.outro$"
 operation.3020.desc.outro:2 "ถึงแม้ว่า[smear_campaign_instigator.GetAdj]ปฏิบัติการถูกดําเนินการอย่างลับๆ เห็นได้ชัดว่าไม่ตรงกับ[smear_campaign_recipient.GetAdj]การเข้ารหัส แทนที่จะเก็บความรู้นั้นไว้กับตัวเอง พวกเขาเลือกที่จะเปิดไฟล์ให้เรา"
 operation.3020.a:0 "หรือที่พวกเขาอ้างว่า ..."
 operation.3020.b:0 "เราเป็นหนี้[from.GetName]หนี้"

 operation.4000.name:0 "ทีมในการตั้งค่า"
 operation.4000.desc:0 "$role_spymaster$ [spynetwork.leader.GetName]ได้จัดทีมปฏิบัติการที่ฝึกมาอย่างดี ผู้ที่เกี่ยวข้องจะทํางานคนเดียว และเตรียมพร้อมสําหรับความจริง นี้เกือบจะแน่นอน ทั้งหมดที่เขาต้องการตอนนี้คือเป้าหมาย - หายนะที่คุ้มค่าที่จะนําไปยัง§H[target.GetName]§!."
 operation.4000.desc.single:0 "$role_spymaster$ [spynetwork.leader.GetName]ได้รวบรวมทีมของเจ้าหน้าที่ที่ฝึกมาอย่างดี ที่จะพยายามที่จะล่อลวง§P[crisis_beacon_option_1.GetName]§!โดยตรงไปยัง§H[target.GetAdj]§!อาณาเขต ทีมไม่ได้คาดว่าจะกลับมา"
 operation.4000.desc.error:0 "$role_spymaster$ [spynetwork.leader.GetName]รายงานว่าในเวลานี้§Yไม่มีภัยคุกคามระดับวิกฤติ§!ดู เหมือน ว่า ปฏิบัติการเช่นนั้น ล่อ ใจ ให้ เข้า มา. เจ้าหน้าที่[spynetwork.leader.GetHeShe] [spynetwork.leader.GetHasHave]ที่รวมพลไว้จะยังคงอยู่ในสแตนด์บาย จนกว่าเราจะรู้มากขึ้น เกี่ยวกับภัยคุกคามภัยพิบัติที่ซ่อนอยู่ในกาแล็กซี่นี้"
 operation.4000.a:0 "วาดใน§P[crisis_beacon_option_1.GetName]§!."
 operation.4000.b:0 "ลูบ§P[crisis_beacon_option_2.GetName]§!."
 operation.4000.c:0 "แทง§P[crisis_beacon_option_3.GetName]§!."
 operation.4001.name:0 "สัญลักษณ์ของความคืบหน้า"
 operation.4001.desc:0 "นักวิจัยและปฏิบัติการของเรา ได้เตรียมพร้อมสําหรับตัวแปรภารกิจหลากหลาย และทีมปฏิบัติการได้ออกเดินทางไปยังพื้นที่ที่ไม่มีใครรู้จัก§Y[target.GetAdj]พื้นที่§!และ§P[crisis_beacon_crisis_country.GetName]§!."
 operation.4002.name:0 "หลิว"
 operation.4002.desc:1 "คนของเราใกล้§H[target.GetName]§!ได้ส่งครั้งเดียวคอมมิวนิค :พวกเขาพร้อมที่จะดําเนินการและจะวาดไอของ§P[crisis_beacon_crisis_country.GetName]§!ด้วยสัญญาณของเรา"
 operation.4005.name:0 "เดอะ[crisis_beacon_crisis_country.GetName]ตะขอ"
 operation.4005.desc.contingency:0 "นักวิจัยของเราสามารถคาดเดาได้เฉพาะความคิดที่รวดเร็วและปรับตัวได้ ที่ทํางานโดยตัวแทนของเรา เมื่อพวกเขาสามารถล่อเรือจากอย่างต่อเนื่อง$CRISIS_TYPE_CONTINGENCY$ภัยคุกคาม ไม่ว่าจะเป็นการแฮกโปรโตคอลที่ละเอียดหรือโดยการสร้างการเรียงลําดับของข้อผิดพลาดบางอย่าง สแกนระยะไกลของเราตอนนี้ยืนยันการปรากฏตัวที่เป็นศัตรูระหว่างการขนส่ง§Y[crisis_beacon_crisis_system.GetName]ระบบ§!และ[crisis_beacon_target_country.GetAdj]เมืองหลวง§Y[crisis_beacon_target_capital.GetName]§!.\n\nจะเลือกหรือไม่§Y[crisis_beacon_target_country.GetName]§!มี ความ กังวล อื่น ๆ อีก ระหว่าง ช่วง เวลา ที่ ปั่น ป่วน วุ่นวาย นี้: การ กระทํา ของ เรา ทํา ให้ แน่ ใจ ว่า จะ มี เรื่อง เร่ง ด่วน อีก อย่าง น้อย หนึ่ง เรื่อง ที่ ต้อง ทํา."
 operation.4005.desc.graytempest:0 "วาดจุดโฟกัสของวัตถุเป็นชิ้นที่เรียกว่า§Pระดับสีเทา§!ไม่ได้หมายความว่าทําได้ คนของเราประสบความสําเร็จโดยวิธีการของหนึ่งยิงคลื่นเรือชี้เป็นตารางไปในทิศทางของ§H[crisis_beacon_target_country.GetName]§!.\n\nการสร้างคลื่นนี้เป็นความพยายามที่ล้มเหลวเป็นระยะทางระหว่าง§Y[crisis_beacon_crisis_system.GetName]ระบบ§!และ[crisis_beacon_target_country.GetAdj]เมืองหลวง§Y[crisis_beacon_target_capital.GetName]§!ต้องใช้พลังงานที่ไม่เคยมีมาก่อน ทีมของเราใช้มันเพื่อกระตุ้นปฏิกิริยาลูกโซ่ที่ควบคุมไม่ได้ ในธนาคารพลังงานของเครื่องส่งสัญญาณระยะไกล อุปกรณ์ที่จัดขึ้นด้วยกันเพียงนานพอ ที่จะคานเหยื่อของเราข้ามไฮเปอร์สเปซ\n\nเพลงยาวแสดงให้เห็นว่านก เค้า แมวกําลังหาทางไปยัง§Y[crisis_beacon_target_country.GetName]§!นัก วิจัย ของ เรา ยัง สังเกต ด้วย ว่า มี การ ระเบิด อย่าง รุนแรง ใน บริเวณ ใกล้ เคียง[crisis_beacon_crisis_system.GetName]- เชื่อว่าเป็นเว็บไซต์ ของความพยายามร้ายแรงของปฏิบัติการของเรา"
 operation.4005.desc.marauders:0 "แม้พวกเขาพยายาม ที่จะสามัคคีกัน§Pคือ[raider_khanate.GetName]§!ได้พิสูจน์เหยื่อที่ไม่ซับซ้อน เพื่อเป็นเหยื่อของความโกรธ ทีมของเราทํางานอย่างหนักเพื่อต่อต้านหนึ่ง ผู้บัญชาการโดยเฉพาะอย่างยิ่งที่มีโกรธเดือดตอนนี้ถูกกํากับที่ความเร็วที่เร็วกว่าแสงต่อ[crisis_beacon_target_country.GetAdj]เมืองหลวง§Y[crisis_beacon_target_capital.GetName]§!.\n\nลูกเรือของเรามีมติว่าฐานดาวใด ๆ ที่โชคร้ายพอที่จะโกหกระหว่าง§Y[crisis_beacon_crisis_system.GetName]ระบบ§!และ[crisis_beacon_target_country.GetName]จะเล่นเป็นเจ้าภาพแห่งความโกลาหลให้กับกลุ่มเล็กๆนี้ หวังว่าการเสียสละครั้งนี้ จะไม่สูญเปล่า"
 operation.4005.desc.swarm:0 "การวิจัยของเราเกี่ยวกับ แรงผลักดันทางชีวภาพของ§P$CRISIS_TYPE_PRETHORYN$§!ดําเนินการอย่างรวดเร็ว แต่พิสูจน์แล้วมีประสิทธิภาพ เรา คิด ค้น สาร ประกอบ สังเคราะห์ ที่ มี ราคา แพง เพื่อ ผลิต และ เป็น อันตราย ต่อ การ ขน ส่ง ซึ่ง ประสบ ผล สําเร็จ ใน การ นํา กอง เรือ ออก ไป จาก ส ตาร์ม.\n\nกาวคือสารประกอบนี้ ที่ชะตากรรมของปฏิบัติการของเรา ตอนนี้มืดมัว§Y[crisis_beacon_crisis_system.GetName]ระบบ§!และ[crisis_beacon_target_country.GetAdj]เมืองหลวง§Y[crisis_beacon_target_capital.GetName]§!ช่วงเวลาที่คนของเราปล่อยสารเคมี ชะตากรรมของพวกเขาถูกผนึก\n\nแทนที่จะหลบหนีและเสี่ยง ทําให้เส้นทางของฝูงสับสน ทีมของเราจะใช้เวลาที่เหลือ เดอะ§H[crisis_beacon_target_country.GetName]§!อีก ไม่ นาน เรา จะ ประสบ ผล ของ การ เสีย สละ."
 operation.4005.desc.unbidden:1 "เราพยายามต่อต้าน§P$CRISIS_TYPE_UNBIDDEN$§!ได้จ่ายออกแม้ว่าค่าใช้จ่ายจะชัน ลูกเรือของเราประสบความสําเร็จได้ลากเรือพิเศษมิติ เข้าสู่ความคิด หนึ่งในสมอมิติของพวกเขาอยู่ภายใต้ภัยคุกคามภายใน[crisis_beacon_target_country.GetAdj]อาณาเขต ตอนนี้เรือกําลังเดินทางไป§Y[crisis_beacon_target_capital.GetName]§!จาก§Y[crisis_beacon_crisis_system.GetName]ระบบ§!.\n\n$role_spymaster$ [from.spynetwork.leader.GetName]เราจะเฝ้าติดตามสถานการณ์ต่อไป แต่ก็ไม่น่าเป็นไปได้ที่ เราจะเห็นคนของเรากลับมา ตอนนี้เราต้องดู และเชื่อมั่นว่าการล่อลวงของเรา ทําหน้าที่แผนของเรา"

 operation.4005.a.tooltip:0 "เดอะ§P[crisis_beacon_crisis_fleet.GetName]§!ตอนนี้กําลังเดินทางไป§Y[crisis_beacon_target_country.GetAdj]ใหญ่§!."
 operation.4010.name:0 "[crisis_beacon_crisis_fleet.GetName]บนเส้นทางสําหรับ[root.capital_scope.GetName]"
 operation.4010.desc:0 "เราตรวจพบศัตรูจาก§P[crisis_beacon_crisis_country.GetName]§!มุ่งหน้าสู่เมืองหลวง§Y[crisis_beacon_target_capital.GetName]§!คลื่นพลังงานแปลก ๆ ระเบิดออกมาจากบริเวณใกล้เคียง§H[crisis_beacon_crisis_system.GetName]§!ต้นกําเนิดของพวกเขา\n\nเราเพิ่งเริ่มวิเคราะห์ปรากฏการณ์นี้ เมื่อสัญญาณพลังงานในภูมิภาคได้เปลี่ยนไปทันที ทุกสัญญาณบอกว่า นี่หมายถึง การเปลี่ยนการเคลื่อนไหวของกองเรือ ยิ่ง กว่า นั้น อย่าง น้อย หนึ่ง ใน สัญลักษณ์ ของ พลัง งาน เหล่า นั้น ดู เหมือน เป็น ของ จักรวรรดิ อื่น ๆ นอก เหนือ จาก จักรวรรดิ[crisis_beacon_crisis_country.GetName]ไม่ว่าพวกเค้าจะเป็นใคร ก็ดูเหมือนจะเป็นสาเหตุของพฤติกรรมนี้ เราสงสัยว่านี่คือ§Hการกระทําเพื่อยั่วยวน§!โดยหนึ่งในคู่แข่งของเรา"

 #######################################
 # Operations (random pool)
 #######################################

 operation.5000.name:2 "ที่อยู่ติดต่อสูญหาย"
 operation.5000.desc:1 "$role_spymaster$ [from.spynetwork.leader.GetName]รายงานการขาดการติดต่อ[from.spynetwork.leader.GetHisHer]บุคลากรในการดําเนินการใน§H[from.spynetwork.target.GetName]§!พวกเขาได้พลาดจํานวนล่าสุดของพวกเขา การตรวจสอบ\n\nตามขั้นตอนมาตรฐาน ตอนนี้เราต้องตัดสินใจ ว่าจะติดตามคนของเราหรือไม่"
 operation.5000.a:0 "ตามหาคนของเรา"
 operation.5000.a.tooltip:2 "หยุดชั่วคราว§Yปฏิบัติการ[from.GetName]§!ประมาณหนึ่งเดือน\nโอกาสความสําเร็จของเราขึ้นอยู่กับเป้าหมาย§Hการเข้ารหัส§!ระดับ"
 operation.5000.b.tooltip:1 "เงียบ§Rยกเลิก§!ปฏิบัติการนี้ ไม่มีส่วนใดๆ§Hชุดรหัสอักขระ§!จะ ไม่ ถูก ผลาญ."
 operation.5000.c:1 "เรียกเครื่องราชอิสริยาภรณ์ของเรา"
 operation.5001.name:2 "แก้ไขโครงการหลัก..."
 operation.5001.desc:1 "ความ พยายาม ของ เรา ปรากฏ ว่า ประสบ ผล สําเร็จ ใน การ ติด ต่อ กับ คน ของ เรา ได้ รับ การ ฟื้นฟู.$role_spymaster$ [fromfrom.spynetwork.leader.GetName]กําลังพยายามทบทวนขั้นตอนการตรวจสอบ[fromfrom.spynetwork.leader.GetHeShe] [fromfrom.spynetwork.leader.GetHasHave]ในสถานที่สําหรับการทํางานใน§H[fromfrom.target.GetName]§!."
 operation.5002.name:1 "ยืนยันการสูญหาย"
 operation.5002.desc:4 "แม้ความพยายามที่ดีที่สุดของเรา เราไม่สามารถเรียกคืนการติดต่อของเราใน§H[fromfrom.target.GetName]§!. $role_spymaster$ [fromfrom.spynetwork.leader.GetName]ได้มีคําสั่งให้ทบทวนขั้นตอนการตรวจสอบ สําหรับเครือข่ายสปีชีของเรามี; มันเป็นไปได้[fromfrom.target.GetAdj]มีความซับซ้อนมากขึ้น§Hการเข้ารหัส§!มากกว่าที่เราคิด\n\nในขณะเดียวกัน§Hปฏิบัติการ[fromfrom.GetName]§!จะกลับมาอยู่ในความจุที่ลดลง ในขณะที่เราสํารองการสูญเสียของเรา"

 operation.5005.name:2 "ระบบปฏิบัติการ"
 operation.5005.desc:2 "แม้จะมีการใช้ทุกการป้องกันที่มีคําสั่งในการฝึกอบรมของพวกเขาเป็นหนึ่งในคนของเราใน§Y[from.target.GetName]§!ทําให้เกิดความกังวลว่า ตัวตนของพวกเขาอาจถูกเปิดเผย เห็นได้ชัดว่านี่จะมาในเวลาวิกฤตสําหรับ§Hปฏิบัติการ[from.GetName]§!- ดังนั้น$role_spymaster$ [from.spynetwork.leader.GetName]ต้องการทรัพยากรมากขึ้นโดย[from.spynetwork.leader.GetHeShe]อาจป้องกันการรบกวนได้"
 operation.5005.a:0 "ความ เสี่ยง ดัง กล่าว เป็น เรื่อง ปกติ. ปฏิเสธ"
 operation.5005.b:0 "คุณจะได้ทรัพยากรพิเศษ"
 operation.5005.c:0 "บางทีการติดสินบนอาจจะได้ผลมากกว่า"
 operation.5005.d:0 "เราจะจัดการปัญหานี้"
#  operation.5005.d.tooltip:0 "Will not consume our Spy Network Asset in the [from.target.GetName]."

 operation.5010.name:0 "เปิดใช้งานโดย[patrol_drone.GetNamePlural]"
 operation.5010.desc:3 "เดอะ§Y[from.target.GetName]§!เพิ่งถูกเตือนให้ปรากฏตัว ดูเหมือนว่าเราขาดหน่วยสืบราชการลับเพียงพอ ในพื้นที่ท้องถิ่น และคนของเราได้รับความสนใจจากท้องถิ่น[patrol_drone.GetNamePlural].\n\n§Hปฏิบัติการ[from.GetName]§!ยังไม่อันตรายเลย แต่$role_spymaster$ [from.spynetwork.leader.GetName]ต้องการความช่วยเหลือด่วน"
 operation.5010.a:0 "เราต้องเชื่อใจในการทูต"
 operation.5010.b:0 "ลดความเร็ว"
 operation.5011.name:0 "วิธี แก้ ที่ ซับ ซ้อน"
 operation.5011.desc:3 "$role_spymaster$ [fromfrom.spynetwork.leader.GetName]ถึง[fromfrom.spynetwork.leader.GetHisHer]เพื่อนร่วมงานได้เรียบกว่าคนของเราที่บุกรุกเข้าไปใน§Y[fromfrom.target.GetName]§!.\n\nมันเป็นไปได้ที่เป็นส่วนตัว,[fromfrom.target.GetName]เห็นข้อแก้ตัวของเราสําหรับฝูงโกหก เท่าที่ปรากฏภายนอกมีความเกี่ยวข้อง อย่างไรก็ตาม : เราได้รับการพิจารณาว่าอยู่ในที่ชัดเจน"
 operation.5011.desc.hive:0 "เราได้ดําเนินการต่อรองได้สําเร็จ ออกจากความอึดอัดทางการทูต§Y[fromfrom.target.GetName]§!.\n\nมันเป็นไปได้ที่เป็นส่วนตัว,[fromfrom.target.GetName]ไม่ให้ยืมความน่าเชื่อถือใด ๆ ของข้อแก้ตัวของเราที่ทั้งหมด แต่จากมุมมองภายนอก :"

 operation.5015.name:0 "ช่องข้อมูลหลายหน่วย"
 operation.5015.desc:1 "เรากําลังสูญเสียการติดต่อกับปฏิบัติการของเรา ขณะที่พวกเขาเข้าสู่พื้นที่ปลอดภัยมากขึ้นอย่างต่อเนื่องใน§H[from.target.GetName]§!มีโอกาสที่เราจะสูญเสียการปรากฏตัวของเราทั้งหมด การขัดจังหวะนี้น่าจะเกิดจากความยุ่งเหยิง[from.target.GetAdj]การป้องกันเทคโนโลยี ทําให้สัญญาณรบกวนรบกวน"
 operation.5015.a:0 "เราต้องพยายามปรับตัว"
 operation.5015.a.tooltip:0 "เรา อาจ ประสบ ความ สําเร็จ หรือ ประสบ ความ ล้ม เหลว ใน การ ปฏิบัติ งาน ขึ้น อยู่ กับ ญาติ ของ เรา บ้าง§Yระดับเทคโนโลยี§!."
 operation.5015.b:0 "เปิดฮาร์ดแวร์ของตัวเองกับพวกเขา"
 operation.5016.name:0 "$operation.5015.name$"
 operation.5016.desc:1 "เราสูญเสียการติดต่อทั้งหมด กับคนของเราที่ได้รับมอบหมายให้§Hปฏิบัติการ[fromfrom.GetName]§!ใน§Y[fromfrom.target.GetName]§!ไม่ว่าเป้าหมายจะออกแบบมาอย่างดี หรือเป็นเรื่องบังเอิญสําหรับเรา[fromfrom.target.GetAdj]การปกป้องเทคโนโลยีได้พิสูจน์ว่า ศัตรูที่คู่ควรกับเรา\n\nมันเป็นไปได้[fromfrom.target.GetSpeciesName]อาจ ได้ รับ ประโยชน์ จาก เหตุ การณ์ นี้. แม้ว่า[GetOperativesLowerPlural]อาจทํางานกึ่งอัตโนมัติ โดยที่เราไม่อยู่ พวกเขายังคงมีความเสี่ยงมากกว่า"

 operation.5020.name:0 "ข้อ ผิด พลาด สําหรับ อาหาร"
 operation.5020.desc:1 "แง่มุมหลักของ§Y[from.target.GetName]§!คนของเราเข้าใจผิดเรื่องอาหาร และตอนนี้กําลังล่าพวกมันอยู่ โดยเฉพาะ[from.target.GetSpeciesName] [from.target.GetIndividualName]ดู เหมือน จะ ถือ ตาม สัญชาตญาณ ว่า สิ่ง ใด ก็ ตาม นอก เหนือ จาก ตัว มัน เอง แล้ว เป็น แหล่ง อาหาร ที่ มี ศักยภาพ."
 operation.5020.a:0 "เราควรล่อมันออกไป"
 operation.5020.b:0 "ให้ย้าย! เราปรับตัวและอยู่รอด"
 operation.5020.c:0 "ล่านักล่า ปลดปล่อย§Y$asset_warrior_drone$§!."

 operation.5025.name:0 "งาน ใน เขต ร้อน"
 operation.5025.desc:2 "บางอย่างเกี่ยวกับ§Y[from.target.GetName]§!สภาพ แวด ล้อม ที่ มี ชีวิต อยู่ ดู เหมือน เป็น พิษ เล็ก น้อย ต่อ[GetIndividualNamePlural]ได้รับมอบหมายไปยัง§Hปฏิบัติการ[from.GetName]§!. $operation.5025.close$"
 operation.5025.desc.repeat:2 "มันมีการเปลี่ยนแปลงเล็กน้อยภายใน§Y[from.target.GetName]§!สภาพ แวด ล้อม ที่ มี ชีวิต อยู่ ซึ่ง กลับ กลาย เป็น พิษ เบา ๆ ต่อ เรา อีก.$operation.5025.close$"
 operation.5025.close:0 "เจ้าหน้าที่ของเราเริ่มที่จะแสดงอาการ ซึ่งทําให้การทํางานของพวกเขาอ่อนแอลง และที่เลวร้ายที่สุดพวกเขาออกภายในศัตรู[from.target.GetGestaltEntityName]."
 operation.5025.a:0 "เราควรค้นคว้าวิธีแก้ปัญหา"
 operation.5025.b:0 "เราต้องรีบแล้ว"
 operation.5025.b.tooltip:1 "มีความเสี่ยงที่ทุกปฏิบัติการจะดําเนินการ§Y[toxic_field_country.GetName]§!อาจกลายเป็น§Rยากกว่านี้§!ระยะหนึ่ง จนกว่าเราจะพัฒนาแอนติบอดีได้"
 operation.5026.name:0 "การ ปรับ ตัว สําหรับ งาน ใน เขต ทํา งาน"
 operation.5026.desc:2 "งานวิจัยของเราได้จ่ายไป และการรักษาได้กระจายไปยังคนของโดรน สารพิษระดับต่ําที่พบใน§Y[toxic_field_country.GetName]§!ที่อยู่อาศัยไม่ควรนําเสนอปัญหาใด ๆ และ§Hปฏิบัติการ[event_target:toxic_field_operation.GetName]§!อาจจะทําต่อไป"
 operation.5027.name:0 "งาน ใน เขต ร้อน"
 operation.5027.desc:0 "โอกาสของเราที่อยู่ภายใน§Y[toxic_field_country.GetName]§!ปิดแล้ว ปล่อยหุ่นปฏิบัติการของเรา ได้รับผลกระทบจากสิ่งแวดล้อมของพวกเขา§Hปฏิบัติการ[fromfromfrom.GetName]§!อาจยังดําเนินต่อไป แต่เราต้องตั้งใจทํางาน กลัวว่าโรคภูมิแพ้ จะกระตุ้นความสงสัย"

 operation.5030.name:0 "เสียง"
 operation.5030.desc:1 "สิ่งแวดล้อมบน[excess_noise_country.GetAdj]โลก ได้ กลาย เป็น ปริศนา ด้วย เสียง ไฟฟ้า ที่ ดัง เกิน ความ คาด หมาย ของ เรา.$operation.5030.close$"
 operation.5030.desc.repeat:1 "สิ่งแวดล้อมบน[excess_noise_country.GetAdj]โลกได้กลายเป็นปริศนาอีกครั้งด้วยเสียงไฟฟ้าไฟฟ้า ในความถี่ที่เรายังไม่ได้คุ้นเคยกับ$operation.5030.close$"
 operation.5030.close:1 "โดรนปลอมที่เราได้รับมอบหมาย§Hปฏิบัติการ[from.GetName]§!ส่งผลให้ข้อมูลหายไป นี่ทําให้เกิดความเสี่ยงที่สําคัญ ต่อการเก็บข้อมูลของเรา และเพิ่มโอกาสในการสัมผัสของเรา"
 operation.5030.a:0 "$operation.5025.a$" #Research
 operation.5030.b:0 "$operation.5025.b$" #Continue
 operation.5030.b.tooltip:0 "มีความเสี่ยงที่ทุกปฏิบัติการจะดําเนินการ§Y[excess_noise_country.GetName]§!อาจกลายเป็น§Rยากกว่านี้§!ระยะหนึ่ง จนกว่าเราจะปรับฮาร์ดแวร์ได้"
 operation.5031.name:0 "ไม่ใช้เอฟเฟ็คต์"
 operation.5031.desc:2 "งานวิจัยของเราได้จ่ายไป และข้อกําหนดใหม่สําหรับการป้องกันการรบกวนของแม่เหล็กไฟฟ้า§Y[excess_noise_country.GetName]§!ความพยายามของเราใน§Hปฏิบัติการ[fromfromfrom.GetName]§!ไม่ ควร ถูก ขัด ขวาง อีก ต่อ ไป เนื่อง จาก ความ ไม่ คงที่ เกิน ไป."
 operation.5032.name:0 "เสียง รบกวน"
 operation.5032.desc:0 "เสียงไฟฟ้าใน§Y[excess_noise_country.GetName]§!ทําให้เกิดการสูญเสียข้อมูล ที่ไม่สามารถแก้ไขได้ ในบางส่วนของโดรนของเรา§Hปฏิบัติการ[event_target:excess_noise_operation.GetName]§!อาจจะยังคง แต่ความพยายามของเราถูกขัดขวาง - เช่น มาตราของความต้องการสํารองข้อมูล"

 operation.5035.name:1 "เดอะชราวด์"
 operation.5035.desc:2 "$role_spymaster$ [from.spynetwork.leader.GetName]รายงานว่าทีมของเราอยู่ใกล้§Y[snuffedout_country.GetName]§!พลาดจุดตรวจไปหลายครั้ง จากลักษณะของปฏิบัติการนี้ เราคาดว่าพวกเขาจะไม่สามารถติดต่อกันได้บ่อยๆ อย่างไรก็ตาม$role_spymaster$น่า เศร้า ที่ ถึง ตอน นี้ ทีม นั้น ก็ แพ้ ไป แล้ว.\n\n§Hปฏิบัติการ[from.GetName]§!อาจได้รับการช่วยเหลือ ถ้าเราสามารถ ครอบคลุมร่องรอยของเรา§H$MOD_INTEL_DECRYPTION_ADD$§!กับ[snuffedout_country.GetAdj] §H$MOD_INTEL_ENCRYPTION_ADD$§!."
 operation.5035.a.tooltip:1 "หยุดชั่วคราว§Yปฏิบัติการ[from.GetName]§!ประมาณหนึ่งเดือน\n\nมี§Hปานกลาง-ต่ํา§!โอกาสที่การกระทําของเราจะหายไปโดยไม่มีใครสังเกตเห็น ขึ้นอยู่กับเป้าหมายของเรา§H$MOD_INTEL_ENCRYPTION_ADD$§!.\n\n$ESPIONAGE_OPERATION_CHANCE_THEMED_ASSET$\n\n"
 operation.5035.b.tooltip:1 "§Rยกเลิก§! §Yปฏิบัติการ[from.GetName]§!.\n\nมี§Gสูง§!โอกาสที่การกระทําของเราจะหายไปโดยไม่สังเกต ขึ้นอยู่กับเป้าหมาย§H$MOD_INTEL_ENCRYPTION_ADD$§!.\n\n$ESPIONAGE_OPERATION_CHANCE_CATEGORY_ASSET$\n\n"
 operation.5035.c:0 "$operation.5000.c$" #Use Asset
 operation.5035.c.tooltip:1 "หยุดชั่วคราว§Yปฏิบัติการ[from.GetName]§!ประมาณหนึ่งเดือน\n\nมี§Yชั้นบนสุด§!โอกาสที่การกระทําของเรา จะไม่มีใครสังเกตเห็น โอกาสของความสําเร็จของเราลดระดับเป้าหมาย§H$MOD_INTEL_ENCRYPTION_ADD$§!ใช่"
 operation.5036.name:1 "สําเร็จการครอบคลุม"
 operation.5036.desc:0 "ถึงแม้ว่ามันจะได้เสียทรัพยากรไปมาก$role_spymaster$ [fromfrom.spynetwork.leader.GetName]งานใน§H[snuffedout_country.GetName]§!การรักษาความปลอดภัยปฏิบัติการได้รับการตรวจสอบอีกครั้ง มี การ ปก ปิด จุด จบ ทุก อย่าง ปิด คลุม ทุก สิ่ง ทุก อย่าง. ทีมใหม่ของปฏิบัติการ จะเข้ามายึดที่นี่ ดําเนินการในลําดับที่แตกต่างกัน$role_spymaster$สายตาของพวกเขาจะละห้อย\n\nเดอะ[snuffedout_country.GetAdj]ในระหว่างนั้น ดูเหมือนเรายังคงไม่รู้"
 operation.5037.name:1 "ปฏิบัติการ"
 operation.5037.desc:1 "ความกลัวที่เลวร้ายที่สุดของเราได้เกิดขึ้นแล้ว: การสูญเสียคนของเราไปเมื่อเร็ว ๆ นี้§H[snuffedout_country.GetName]§!ได้เปิดเผยส่วนใหญ่ของ§Hปฏิบัติการ[fromfrom.GetName]§!.\n\nเครือข่ายสไปซี่ของเราทั้งหมด ถูกจัดการอย่างดี เพื่อที่ว่า ภายใต้สถานการณ์ปกติ มีแต่หลักฐานที่ไม่แน่นอนเท่านั้น อย่างไรก็ตามในกรณีนี้เราจะไม่สามารถแน่ใจทั้งหมดสิ่งที่อาจจะข้อมูลได้รับไป; และเราไม่สามารถทราบว่า[snuffedout_country.GetAdj]อาจเลือกที่จะตอบสนอง"
 operation.5037.desc.provocation:1 "การสูญเสียคนของเราไปเมื่อเร็วๆนี้§H[snuffedout_country.GetName]§!มันมีผลร้ายแรงตามมา การปฏิบัติการของเราทั้งหมดถูกเปิดเผย\n\nเครือข่ายสปีชีของเราถูกจัดการอย่างระมัดระวัง เพื่อให้ภายใต้สถานการณ์ปกติ พวกเขาให้เราในระดับที่ปฏิเสธได้ อย่างไรก็ตาม ในโอกาสนี้ การกระทําของเรารุนแรงพอ[snuffedout_country.GetAdj]ไม่ น่า จะ ละเลย แม้ แต่ หลัก ฐาน บาง อย่าง ที่ อาจ นํา เรา กลับ มา. เรา ไม่ รู้ แน่ชัด ว่า พวก เขา จะ ตอบ สนอง อย่าง ไร แต่ เรา ควร เตรียม ตัว สําหรับ สิ่ง เลว ร้าย ที่ สุด."

 operation.5040.name:0 "ถอดรหัสทรัพยากร"
 operation.5040.desc:0 "$role_spymaster$ [from.spynetwork.leader.GetName]เมื่อเร็ว ๆ นี้เปิดตัวการสืบสวนที่เงียบสงบในการ[from.spynetwork.leader.GetHisHer]คนในสังกัด§Y[from.target.GetName]§!หลังจากสังเกตเห็นการลดลงของการทํางานของพวกเขา\n\n[from.spynetwork.leader.GetHeSheCap] [from.spynetwork.leader.GetHasHave]พบว่าปฏิบัติการเหล่านี้ ฉกฉวยเอาทรัพยากร ที่ถูกรวมเข้ากับหน่วยสืบราชการลับ สินค้าและการรักษาเหล่านี้จะถูกย้ายอื่น ๆ ใน[from.target.GetAdj]เรื่องธุรกิจ การหากําไรที่สะดวกสบาย จากค่าใช้จ่ายของเรา ผล ก็ คือ ความ เอา ใจ ใส่ และ ความ ภักดี ของ พวก เขา จึง แตก ต่าง กัน อย่าง เห็น ได้ ชัด.\n\nความคืบหน้าบน§Hปฏิบัติการ[from.GetName]§!ได้รับวางในถือสักครู่จนถึง$role_spymaster$ [from.spynetwork.leader.GetName]สามารถทํางานได้อย่างมีประสิทธิภาพ"
 operation.5040.a:0 "เรื่องนี้ไม่อาจยอมรับได้ ปัญหา"
 operation.5040.b:0 "ขัดขวางปฏิบัติการเหล่านี้"
 operation.5040.c:0 "นี่อาจทําให้เรามีขอบที่น่าสนใจ"
 operation.5040.c.fail.stacking:0 "$TRIGGER_FAIL$§Rเราสามารถดําเนินกิจการลับได้ทีละแห่ง§!"
 operation.5040.c.fail.commerce:0 "§Rโอกาสดังกล่าวจะใช้ประโยชน์ได้ก็ต่อเมื่อ§Yสินค้า§!กับ[from.target.GetName].§!"
 operation.5041.name:1 "การเคลื่อนไหว ลากสาย"
 operation.5041.desc:0 "คนของเราใน§Y[fromfrom.target.GetName]§!ไม่มีการฉกเอาทรัพยากรจากเครือข่ายของเรา ข้อเตือนใจที่แน่ชัดว่า ความซื่อสัตย์ของพวกเขา จะกลับมาเป็นอีก ความรู้สึกของการอุทิศตน"
 operation.5042.name:0 "ผู้ ออก แบบ"
 operation.5042.desc:0 "$role_spymaster$ [fromfrom.spynetwork.leader.GetName]รายงานความผิดหวังของความล้มเหลวใน§Y[fromfrom.target.GetName]§!เครือข่ายสเปก\n\nเมื่อ มี โจร กลุ่ม หนึ่ง ถูก เรียก ตัว เข้า ไป ใน กลุ่ม คน ของ เรา พวก เขา ตอบ รับ การ หนี ไป ยัง บาง ส่วน[fromfrom.target.GetAdj]พื้นที่ที่เราพยายามติดตาม[fromfrom.spynetwork.leader.GetName]ไม่ สามารถ ไล่ ตาม พวก เขา ได้ อีก ต่อ ไป อย่าง น้อย ก็ ไม่ ใช่ โดย การ ดึง ความ สนใจ อย่าง ไม่ สม ควร."

 operation.5045.name:0 "ทำงานผิดพลาด"
 operation.5045.desc.intro:0 "ของเรา$role_spymaster$ใน§Y[from.target.GetName]§!, [from.spynetwork.leader.GetName]รายงานความล้มเหลวอย่างรุนแรงใน[from.spynetwork.leader.GetHisHer]ประมวลผลสําหรับปฏิบัติการตรวจสอบ คําจาก[from.target.GetAdj]เมืองหลวงคือ[root.GetOperativeRoleIndefiniteArticle]เลือกที่จะ§Rข้อบกพร่อง§!."
 operation.5045.desc.culture:0 "$operation.5045.desc.intro$\n\nดูเหมือนว่า[root.GetOperativeRole]ความเห็นอกเห็นใจมากขึ้นต่อวัฒนธรรมและการก่อตั้งจริยธรรมของ[from.target.GetName]ในการต่อสู้ของเราเอง กระบวนการตรวจสอบของเราล้มเหลว โดยมันควรจะตัดความไม่ต่อเนื่องดังกล่าว"
 operation.5045.desc.turned:0 "$operation.5045.desc.intro$\n\nแม้ความจริงเราควรที่จะ สามารถตรวจสอบความไม่ซื่อสัตย์ดังกล่าว,[root.GetOperativeRole]ได้รับการ 'เปลี่ยน' - ทั้งโดยการกระทําของการต่อต้านจํานวนตัวอักษรที่จะแทนที่หรือบางส่วน[from.target.GetName]ซึ่งพวกเราไม่สามารถตรวจจับมันได้"
 operation.5045.a:0 "เป็นไปตามนั้น"
 operation.5045.a.tooltip:0 "ถ้า[from.target.GetName]มีเครือข่ายเส้นพริ้วไหวของเราพวกเขาจะได้รับการเตือนของแผนกับพวกเขา$tooltip_espionage_identify_decryption_encryption$"
 operation.5045.b:0 "จัดการปัญหาของคุณให้เรียบร้อย [from.spynetwork.leader.GetName]!"
 operation.5045.b.tooltip:0 "50% มีโอกาสที่ถ้า[from.target.GetName]มีเครือข่ายเส้นพริ้วไหวของเราพวกเขาจะได้รับการเตือนของแผนกับพวกเขา$tooltip_espionage_identify_decryption_encryption$"
 operation.5045.c.tooltip:0 "เรารับรองได้ว่า[from.target.GetName]ดังนั้น ข้อแก้ตัวได้ทําให้พวกเขามืดมนในวันนั้น"

 operation.5050.name:0 "การ หัก ห้าม ใจ"
 operation.5050.desc.intro:0 "คนใน§Y[from.target.owner.GetName]§!ได้ลดลงเหม็นของอุปกรณ์ต่อต้านการแก้ไขติดตั้งในท่อให้บริการของ[from.target.GetName]เบสดาว"
 operation.5050.desc:0 "$operation.5050.desc.intro$\n\nอาการบาดเจ็บของพวกเขารุนแรงมาก แต่เจ้าหน้าที่ของเราจัดการ ที่จะให้งานเสร็จสมบูรณ์ และยังคงครอบคลุมจนถึงขณะนี้ มันชัดเจน[from.target.owner.GetAdj]อย่าง ไร ก็ ตาม พวก เจ้า หน้าที่ บอก ว่า เหตุ การณ์ นั้น เป็น เรื่อง ผิด ปกติ ซึ่ง ขัด กับ ความ สงสัย. มีคําถามมากมาย และยิ่งเจ้าหน้าที่ของเรา อยู่ในการรักษานานขึ้นเท่าไหร่ ความเสี่ยงของเราก็จะถูกเปิดเผยมากขึ้นเท่านั้น"
 operation.5050.desc.machine:0 "$operation.5050.desc.intro$\n\nโดรนได้รับความเสียหายร้ายแรง แต่ได้เสร็จสิ้นงานและยังคงครอบคลุมเพื่อให้ห่างไกล มันชัดเจน[from.target.owner.GetAdj]อย่าง ไร ก็ ตาม พวก เจ้า หน้าที่ บอก ว่า เหตุ การณ์ นั้น เป็น เรื่อง ผิด ปกติ ซึ่ง ขัด กับ ความ สงสัย. มีคําถามมากมาย และยิ่งเจ้าหน้าที่ของเรา อยู่ในความดูแลของพวกเขามากขึ้น ความเสี่ยงต่อการสัมผัสมากขึ้น"
 operation.5050.desc.hostile:0 "$operation.5050.desc.intro$\n\nปัจจุบัน พวก เขา ไม่ สามารถ ย้าย ไป ไกล ๆ หรือ ไม่ ก็ ให้ ยืม มาก กว่า การ สนับสนุน ขั้น พื้น ฐาน ต่อ การ ดําเนิน งาน นอก นั้น ดัง นั้น พวก เขา จึง มี ที่ หลบ ที่ ปลอด ภัย พอ สม ควร. อย่าง ไร ก็ ตาม จะ ต้อง มี การ บํารุง รักษา พื้น ที่ นั้น ให้ สะอาด ก่อน จะ นาน ๆ. ยิ่งคนของเราอยู่นานเท่าไหร่[from.target.owner.GetAdj]การดูแล ยิ่งเสี่ยงต่อการสัมผัส"
 operation.5050.a:0 "เตรียมการสกัดกั้น"
 operation.5050.b:0 "เราต้องดําเนินการโดยไม่มีพวกเขา"
 operation.5050.c.tooltip:0 "§Rยกเลิก§! §Yปฏิบัติการ[from.GetName]§!.\n\nมี§Gสูง§!โอกาสที่การกระทําของเราจะหายไปโดยไม่สังเกต ขึ้นอยู่กับเป้าหมาย§H$MOD_INTEL_ENCRYPTION_ADD$§!.\n\nความสําเร็จรับประกันได้ถ้าเรามี§Yเกมถอดไพ่§!ได้รับมอบหมายให้ปฏิบัติการนี้\n\n"

 operation.5055.name.regular:0 "คลื่น ความ มั่น ใจ"
 operation.5055.name.gestalt:0 "ปรับเทียบคลื่นความถี่"
 operation.5055.desc.regular:0 "กลุ่มปฏิบัติการเสริมใน§Y[target_country.GetName]§!ได้ เริ่ม หนี จาก งาน ที่ ได้ รับ มอบ หมาย โดย อ้าง ถึง การ ขาด ความ มั่น ใจ ใน วัตถุ ประสงค์ โดย รวม ของ พวก เขา.$role_spymaster$ [operation.leader.GetName]โดยปกติแล้ว จะจัดการในเรื่องนี้โดยไม่นําพวกเขา มาให้เราสนใจ แต่ถึงจะไม่มีพวกเขา ที่จะรู้รายละเอียด§Hปฏิบัติการ[from.GetName]§!และอาจจะเป็นเครือข่ายสายลับทั้งหมด\n\nเนื่องจากความเชี่ยวชาญเหล่านี้ ถูกปิดกั้นจากสายลับที่กระตือรือร้น และมีความใกล้ชิดมากขึ้น[operation.leader.GetName]ผู้ต้องสงสัยได้รับข้อมูล จากคนนอก[operation.leader.GetHeSheCap]ยอมรับด้วย[operation.leader.GetSXX]เพื่อ พวก เขา จะ เป็น เพียง บุคคล ที่ มี ความ สังเกต เข้าใจ สูง.\n\n$operation.5055.desc.outro$"
 operation.5055.desc.gestalt:0 "กลุ่มปฏิบัติการเสริมใน§Y[target_country.GetName]§!ได้เริ่มลักขโมยในงานที่ได้รับมอบหมายของพวกเขา แสดงพฤติกรรมที่อาจตีความได้ เรามักจะจัดการกับเรื่องนี้โดยตรง$role_spymaster$ [operation.leader.GetName]แต่กลุ่มนี้ทําราวกับว่า สามารถรับรู้ความคมชัดของ§Hปฏิบัติการ[from.GetName]§!และอาจจะเป็นเครือข่ายสายลับทั้งหมด\n\nจากข้อมูลเหล่านี้ ถูกปิดกั้นจากสายลับของเรา เราคาดว่าพวกเขาถูกป้อนข้อมูล อย่าง ไร ก็ ตาม เป็น ไป ได้ เช่น กัน ว่า การ ที่ พวก เขา ใกล้ ชิด กับ ตัว แทน ที่ เป็น เอกเทศ อาจ เพียง แต่ ทํา ให้ คน เหล่า นี้ มี ความ หยั่ง เห็น เข้าใจ แบบ ที่ เรา อาจ พบ ว่า สัก วัน หนึ่ง มี ประโยชน์.\n\n$operation.5055.desc.outro$"
 operation.5055.desc.outro:0 "ทําให้เกิดความสงสัยเหล่านี้ และภัยคุกคามที่เกิดขึ้นในการดําเนินงาน[from.GetName]โดยแต่ละสถานการณ์$role_spymaster$ [operation.leader.GetName]ขอคําสั่งให้ดําเนินการต่อไป"
 operation.5055.a:0 "ความเสี่ยงมันมากเกินไป ตัดมันออก"
 operation.5055.b:0 "มาดูกันว่า 'กระสุน' เหล่านี้จะนําไปสู่อะไร"
 operation.5055.b.tooltip:1 "จะมีผลในทั้ง:\n-ชั่วคราว§Gลดความยากในปฏิบัติการ§!ใน§Y[target_country.GetName]§!หรือ\n- ชั่วคราว§Rลดใน$MOD_INTEL_DECRYPTION_ADD$§!."
 operation.5056.name:0 "การ หยั่ง เห็น เข้าใจ"
 operation.5056.desc:1 "ผู้ช่วยของเราใน§Y[target_country.GetName]§!ได้ใช้ตัวเองกับความกระตือรือร้นที่ผิดปกติ เมื่อเรียนรู้ว่าความสงสัยของพวกเขาครั้งเดียวไม่สามารถ ก่อตั้งได้จริงๆ$role_spymaster$ [operation.leader.GetName]รักษาข้อมูลที่เข้มงวดไว้ แต่รายงานมาว่า[operation.leader.GetHisHer]เส้นทางอุปทานไม่เคยเรียบขึ้น"
 operation.5057.name:0 "ผู้ ชม ที่ หวาด กลัว"
 operation.5057.desc:1 "ผู้ช่วยของเราใน§Y[target_country.GetName]§!มีปฎิกิริยากับความน่าสะพรึงกลัวของการเรียนรู้ความจริง ของความสงสัยของพวกเขาครั้งเดียว$role_spymaster$ [operation.leader.GetName]เปิดเผยเพียงชั่วพริบตาของภาพขนาดใหญ่ให้กับพวกเขา แต่มันก็เพียงพอที่จะรบกวนสายอุปทานของเรา ความสามารถในการล้มล้าง[target_country.GetAdj] $MOD_INTEL_ENCRYPTION_ADD$ลดลงระยะหนึ่ง"

