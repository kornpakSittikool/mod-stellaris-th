 MEMBER_TO_CUSTODIAN_HOSTILE_GREETING_03:0 "ตั้งแต่คุณสันนิษฐานว่าการดํารงตําแหน่ง ความมืดอย่างหนักได้ปกคลุมชุมชนกาแล็กติก เรากลัวว่ามันจะค่อยๆ ถูกโค่นล้มจนกลายเป็นบางสิ่ง ที่ไม่สามารถจดจําได้"
 MEMBER_TO_CUSTODIAN_FRIENDLY_GREETING_01:0 "นี่คือเกียรติที่ไม่คาดคิดภาษากัสโตเดียนมีอะไรให้เรารับใช้"
 MEMBER_TO_CUSTODIAN_FRIENDLY_GREETING_02:0 "เราจะทําหน้าที่ที่ดีที่สุดให้กับ ชุมชนกาแล็กติก คัสโตเดียนได้อย่างไร"
 MEMBER_TO_CUSTODIAN_FRIENDLY_GREETING_03:0 "ชุมชนกาแล็กติกโชคดีที่มีคุณภาษากัสโทเดียน"
 OUTSIDER_TO_CUSTODIAN_NEUTRAL_GREETING_01:0 "ดังนั้นชุมชนกาแล็กติกมี\"ผู้นํา\" เดี๋ยวนี้ น่าสนใจ"
 OUTSIDER_TO_CUSTODIAN_NEUTRAL_GREETING_02:0 "การ แต่ง ตั้ง ชาว คู ส โต เดีย ไม่ ได้ ทํา ให้ การ เป็น สมาชิก ใน ชุมชน กาแลกติก เป็น ที่ ดึงดูด ใจ เรา มาก กว่า แต่ เรา จะ ได้ เห็น."
 OUTSIDER_TO_CUSTODIAN_NEUTRAL_GREETING_03:0 "แล้วสมาชิกคนอื่นๆของชุมชน คือ บ่อน้ําของชาวคัสโตเดียนใช่ไหม ไม่เหรอ? ขออภัย แต่เรายังคงพยายามที่จะเข้าใจ ลักษณะที่แน่นอนของการจัดการนี้"
 OUTSIDER_TO_CUSTODIAN_HOSTILE_GREETING_01:0 "ชุมชนกาแล็กติก เป็นสถาบันที่เน่าเฟะมาตลอด และนั่นมันมาก่อน พวกงี่เง่าในวุฒิสภา"
 OUTSIDER_TO_CUSTODIAN_HOSTILE_GREETING_02:0 "สมาชิกของชุมชนจะโง่มากขึ้นกว่าที่เราคิดว่า ถ้าพวกเขานําเสนอความจุในการ[From.GetName]."
 OUTSIDER_TO_CUSTODIAN_HOSTILE_GREETING_03:0 "คุณ[From.GetSpeciesNamePlural]ไม่สามารถเรียกใช้[From.GetName]และตอนนี้คุณถูกคาดหวังว่า จะนําทางให้ทั้งชุมชนกาแล็กติก? ฮ่า!"
 OUTSIDER_TO_CUSTODIAN_FRIENDLY_GREETING_01:0 "ดูเหมือนวุฒิสภากาแล็กซี่ จะทําสิ่งที่ถูกต้อง ครั้งหนึ่งเมื่อคุณได้รับการแต่งตั้ง ให้เป็นภาษากัสโตเดียนของชุมชน! บางทีเราควรพิจารณาสมาชิก"
 OUTSIDER_TO_CUSTODIAN_FRIENDLY_GREETING_02:0 "ชุมชนกาแล็กติกสามารถปรับปรุงได้โดยมีคุณเป็นผู้ควบคุม[From.GetSpeciesNamePlural]."
 OUTSIDER_TO_CUSTODIAN_FRIENDLY_GREETING_03:0 "กาแล็คติก คัสโตเดียน ใช่ไหม เราดีใจที่เห็นคุณก้าวขึ้นมาในโลก[From.GetSpeciesNamePlural]!"

 resolution_declare_crisis:0 "วิกฤตการณ์"
 resolution_declare_crisis_desc:0 "จักรวรรดิ นี้ เป็น ภัย คุกคาม ที่ ชัดเจน และ ไม่ อาจ ปฏิเสธ ได้ สําหรับ อนาคต ของ กาแล็กซี ทั้ง หมด. มันต้องถูกควบคุมและทําลายโดยชุมชนกาแล็กติก ก่อนจะสายเกินไป"
 resolution_declare_crisis_empire:0 "$resolution_declare_crisis$"
 resolution_declare_crisis_empire_desc:1 "จักรวรรดิ นี้ เป็น ภัย คุกคาม ที่ ชัดเจน และ ไม่ อาจ ปฏิเสธ ได้ สําหรับ อนาคต ของ กาแล็กซี ทั้ง หมด. มันจะต้องถูกบรรจุและถูกทําลายโดย กัลแลคอิมเปอเรียม ก่อนที่มันจะสายเกินไป"

 crisis.4100.name:0 "วิกฤตการณ์ กาแลกติก ประกาศ"
 crisis.4100.intro:0 "วุฒิสภากาแล็กติกได้ผ่านมติประกาศ§H[new_crisis.GetName]§!ภัยคุกคามต่อสิ่งมีชีวิตที่จําศีล และวิกฤตของสัดส่วนกาแล็กซี่ ผลก็คือ[new_crisis.GetName]ตั้งแต่วันนี้ไป มันก็เกิดสงครามกับทั้งชุมชน"
 crisis.4100.desc.a:0 "$crisis.4100.intro$\n\n$crisis.4100.1$"
 crisis.4100.desc.b:0 "$crisis.4100.intro$\n\n$crisis.4100.2$"
 crisis.4100.1:0 "ในฐานะชาวกาแล็กติกคัสโตเดียน[custodian.GetName]ได้เรียกร้องให้สมาชิกของชุมชนทั้งหมด ระดมกองเรือของพวกเขาและเปิดตัวการโจมตี[new_crisis.GetSpeciesName]ขอบเขต\"กาแล็กซี่จะไม่รู้สันติภาพจนกระทั่ง[new_crisis.GetSpeciesName]ภัยคุกคามได้รับการจัดการครั้งเดียวและสําหรับทั้งหมด.\""
 crisis.4100.2:0 "ผู้แทนราษฎรจากวุฒิสภาได้เรียกร้องให้สมาชิกสภาผู้แทนราษฎรทั้งหมด ระดมทัพและเปิดตัวการโจมตีคอนเสิร์ตใน[new_crisis.GetSpeciesName]ดินแดนที่ประกาศว่า\"แกแล็คซี่จะไม่รู้จักความสงบ จนกว่า[new_crisis.GetSpeciesName]ภัยคุกคามได้รับการจัดการครั้งเดียวและสําหรับทั้งหมด.\""
 crisis.4100.a:0 "จะ หยุด การ ข่มเหง ได้ ไหม?"
 crisis.4101.desc:1 "วุฒิสภาจักรพรรดิได้ผ่านมติประกาศ§H[new_crisis.GetName]§!ภัยคุกคามต่อสิ่งมีชีวิตที่จําศีล และวิกฤตของสัดส่วนกาแล็กซี่ ผลก็คือ[new_crisis.GetName]พบตัวเองในสถานะของสงคราม กับทั้งหมดของอิมเปอเรียม\n\nในการประกาศสาธารณะ[gal_emperor.Capital.GetName].[gal_emperor.GetRulerTitle]เรียกสมาชิกทุกคนของอิมเปอเรียมเพื่อระดมกองเรือของพวกเขา และเปิดตัวการโจมตีคอนเสิร์ตเมื่อ[new_crisis.GetSpeciesName]ขอบเขต\"กาแล็กซี่และอิมเปอเรียม จะไม่รู้จักสันติภาพจนกระทั่ง[new_crisis.GetSpeciesName]ภัยคุกคามได้รับการจัดการครั้งเดียวและสําหรับทั้งหมด.\""
 crisis.4105.name:0 "ประชาคม ประกาศ แก่ เรา\"วิกฤตกาแล็กซี่\""
 crisis.4105.intro:0 "การตระหนักถึงภัยคุกคามที่เราแสดง สมาชิกที่ไม่ดีของชุมชนกาแล็กติกได้ผ่านมติ โทษการกระทําของเราและประกาศเรา§Y§!\"สัดส่วนกาแล็กซี่\"§!ใน ขณะ ที่ มี เอกภาพ น้อย มาก สมาชิก ของ ชุมชน ต่าง ๆ ได้ ร่วม มือ กัน และ ประกาศ สงคราม กับ เรา."
 crisis.4105.desc.a:0 "$crisis.4105.intro$\n\n$crisis.4105.1$"
 crisis.4105.desc.b:0 "$crisis.4105.intro$\n\n$crisis.4105.2$"
 crisis.4105.1:0 "ภาย ใต้ การ นํา ของ พวก กาแลกติก คู ส โต เดีย น กอง เรือ ของ พวก เขา กําลัง ชุมนุม กัน เพื่อ โจมตี เขต แดน ของ เรา. การต่อสู้เพื่อกาแล็กซี่ได้เริ่มต้นขึ้นแล้ว"
 crisis.4105.2:0 "กองยานของพวกเขากําลังรวมตัวกัน เพื่อโจมตีดินแดนของเรา การต่อสู้เพื่อกาแล็กซี่ได้เริ่มต้นขึ้นแล้ว"
 crisis.4105.a:0 "นี้จะรุ่งโรจน์"
 crisis.4105.b:0 "นี่มันบ้าชัดๆ!"
 crisis.4105.desc.c:0 "คนโง่ทุจริตในชุมชนกาแล็กติก ได้ผ่านมติประกาศเรา\"พวกตาขาว\" และ \"ภัยคุกคามต่อวิญญาณ\". จากข้อกล่าวหาไร้สาระเหล่านี้ สถานะของสงครามทั้งหมดตอนนี้อยู่ระหว่าง[Root.GetName]และทั้งหมดของชุมชนกาแล็กติก\n\nสงครามนี้จะดําเนินต่อไป จนกว่าเราหรือชุมชน จะถูกทําลาย... หรือยกเลิกมติ"
 crisis.4106.name:1 "อิม เพ เรียม บอก เรา\"วิกฤตกาแล็กซี่\""
 crisis.4106.desc.a:1 "เมื่อ ตระหนัก ถึง การ คุกคาม ที่ เรา ก่อ ขึ้น สมาชิก ที่ ชั่ว ช้า ของ กาแลกติก อิมเปอเรียม ได้ ผ่าน มติ ประณาม การ กระทํา ของ เรา และ ประกาศ เรา ว่า§Y§!\"สัดส่วนกาแล็กซี่\"§!ในวินาทีที่หาได้ยากของเอกราช สมาชิกของอิมเปอเรียมทั้งหมดได้เข้าร่วมกองกําลังและประกาศสงครามกับเรา\n\nภายใต้ผู้นําของ[gal_emperor.GetRulerTitle]กองเรือของพวกเขากําลังรวบรวม เพื่อโจมตีดินแดนของเรา การต่อสู้เพื่อกาแล็กซี่ได้เริ่มต้นขึ้นแล้ว"
 crisis.4106.desc.b:1 "เดอะ[gal_emperor.GetRulerTitle]และการทุจริตของพวกเขาในวุฒิสภาจักรพรรดิ ได้ผ่านมติประกาศเรา\"พวกตาขาว\" และ \"ภัยคุกคามต่อวิญญาณ\". จากข้อกล่าวหาไร้สาระเหล่านี้ สถานะของสงครามทั้งหมดตอนนี้อยู่ระหว่าง[Root.GetName]และทั้งกาแล็กซี่อิมเปอเรียม\n\nสงครามนี้จะดําเนินต่อไป จนกว่าเราหรืออิมเปอเรียม จะถูกทําลายสิ้น หรือพวกเขายกเลิกมติ"
 gal_custodian:0 "ผู้พิทักษ์กาแล็กติก"
 gal_custodian_desc:0 "ขณะที่ภาษากัสโตเดียนของชุมชนกาแล็กซี่ อิทธิพลของเราในกาแล็กซี่ได้เพิ่มขึ้น"
 war_goal_wg_declared_crisis:0 "สงครามไครซิส"
 war_goal_wg_declared_crisis_desc:0 "สงครามแบบเบ็ดเสร็จระหว่างประชาคมกาแล็กติกและจักรวรรดิไครซิส\n\nสันติภาพจะเกิดขึ้นได้ก็ต่อเมื่อมีการทำลายล้างฝ่ายใดฝ่ายหนึ่งจนสิ้นซาก หรือหากประชาคมลงมติให้ยุติการสู้รบ"
 resolution_category_declare_crisis:0 "การประกาศไครซิส"
 resolution_repeal_crisis:0 "วิกฤติการเรียกกลับ"
 resolution_repeal_crisis_desc:0 "พอก็คือพอ ไม่ ควร ถือ ว่า จักรวรรดิ ตาม เป้า หมาย เป็น วิกฤตการณ์ ทาง กาแล็กซี่ อีก ต่อ ไป และ การ ต่อ สู้ กับ สมาชิก ของ ชุมชน ต้อง ยุติ ลง ทันที."
 resolution_repeal_crisis_empire:0 "$resolution_repeal_crisis$"
 resolution_repeal_crisis_empire_desc:1 "นี้เรียกว่าวิกฤตนี้ ไม่นําเสนอภัยคุกคามที่น่าเชื่อถือต่ออิมเปอเรียม พวก เขา ไม่ คู่ ควร กับ การ เอา ใจ ใส่ ของ เรา อีก ต่อ ไป."
 crisis.4110.name:0 "หมดอายุวิกฤติแล้ว"
 crisis.4110.desc:0 "มติการออกแบบ§H[former_crisis.GetName]§!ในฐานะ\"วิกฤตกาแล็กซี่\" ถูกยกเลิกโดยวุฒิสภากาแล็กติก ผล ก็ คือ การ ดําเนิน การ ทาง ทหาร อย่าง ต่อ เนื่อง ทั้ง หมด ถูก ดําเนิน การ โดย สมาชิก ของ ชุมชน ต่อ ต้าน[former_crisis.GetSpeciesNamePlural]จะต้องหยุดทันที สําหรับตอนนี้ความสงบสุขได้กลับมา ที่มุมของกาแลคซีนี้"
 crisis.4110.a:0 "มันจะยาวไหม?"
 crisis.4111.desc.b:0 "$crisis.4111.intro$\n\n$crisis.4111.nasty$"
 crisis.4111.intro:0 "วุฒิสภากาแล็กติกได้ยกเลิกมติ ประกาศเรา\"วิกฤตกาแล็กซี่\" และสมาชิกสภาผู้แทนราษฎรทั้งหมด ได้รับคําสั่งให้ลดจํานวนลง การกระทําของทหารกับเราได้หยุด ... สําหรับตอนนี้"
 crisis.4111.nasty:0 "ถ้าเราต้องการที่จะต่อสู้ต่อไป ไม่มีอะไรหยุดเราจากการประกาศสงครามกับคนโง่แต่ละคน"
 crisis.4111.a:0 "ดังนั้นพวกเขาจึงได้สติ"
 crisis.4111.b:0 "พวกเขากลัวเรา!"
 crisis.4112.desc:0 "มติการออกแบบ§H[former_crisis.GetName]§!ในฐานะ\"วิกฤตกาแล็กซี่\" ได้รับการยกเลิกโดยวุฒิสภาจักรพรรดิ ดังนั้น[gal_emperor.GetRulerTitle]ได้มีคําสั่งให้ปลดประจําการทันที ของทุกปฏิบัติการทางทหารที่ดําเนินอยู่ของจักรพรรดิ เป้าหมายของ[former_crisis.GetSpeciesNamePlural]สําหรับตอนนี้ความสงบสุข ได้กลับมาที่มุมของกาแล็กซี่นี้"
 crisis.4113.desc:1 "กาแลกติก อิมเปอเรียมได้ยกเลิกมติที่ประกาศว่า\"คริซี\" และกองกําลังอิมพีเรียลทั้งหมด ได้รับคําสั่งให้ลดจํานวนลง พวกเขา[gal_emperor.GetRulerTitle]ได้บัญชาให้มีการยุติสงครามทั้งหมดกับเรา ... สําหรับตอนนี้"
 community_declared_crisis_failtext:0 "§Rเราได้ประกาศวิกฤตการณ์ และไม่สามารถเข้าร่วมได้§!"
 community_homicidal_failtext:0 "§Rเราถูกปฏิเสธสมาชิกเนื่องจาก§!\"ความโหดร้ายและการล่าธรรมชาติ\" คนโง่§!"
 community_default_failtext:0 "§Rต้องเป็นอาณาจักรทั่วไป§!"
 resolution_declare_crisis_tooltip:0 "สมาชิกทั้งหมดของกลุ่มกาแล็กติก ประกาศสงครามรวมกับเป้าหมาย ซึ่งจะยุติลงก็ต่อเมื่อฝ่ายเดียวถูกทําลาย"
 resolution_declare_crisis_empire_tooltip:1 "กาแลกติก อิมเปอเรียมประกาศสงครามรวมกับเป้าหมาย เมื่อด้านใดด้านหนึ่งถูกทําลาย หรือ มติถูกยกเลิก"

 first_contact.5.militarist.desc:0 "หลังจากเห็นยานอวกาศไม่ทราบชื่อใน§H[This.System.GetName]§!ระบบที่กองกําลังทั้งหมดในบริเวณใกล้เคียงได้รับการสั่งซื้อ เพื่อเพิ่มความพร้อมเป็นขั้นตอนมาตรฐาน หน่วยสืบราชการลับยังคงวิเคราะห์ ข้อมูลเล็กน้อยที่เรามี เกี่ยวกับสารปนเปื้อน แต่ปรากฏว่า สามารถเดินทางข้ามมิติได้ ความสามารถนอกกรอบยังคงไม่ทราบ นี่น่าจะเป็นตัวแทนของการสัมผัสครั้งแรกของเรา กับอารยธรรมของมนุษย์ต่างดาวใหม่ เราควรจะใช้ขั้นตอนในการถอดรหัส การสื่อสารของพวกเขา"
 first_contact.5.pacifist.desc:0 "เรายังไม่สามารถระบุที่มาของยานอวกาศลึกลับที่เราสังเกตเห็น§H[This.System.GetName]§!ระบบ เนื่อง จาก นี่ อาจ เป็น ครั้ง แรก ที่ เรา ติด ต่อ กับ อารยธรรม ของ มนุษย์ ต่าง ดาว ที่ เรา ไม่ รู้ จัก มา ก่อน เรา จึง ต้อง หลีก เลี่ยง การ กระทํา ใด ๆ ที่ อาจ เข้าใจ ผิด ว่า เป็น การ คุกคาม หรือ การ ล่อ ลวง. หาก ภาษา ของ พวก เขา ได้ รับ การ แปล เรา หวัง ว่า จะ สร้าง สัมพันธภาพ อัน สงบ สุข กับ พวก เขา ได้."
 first_contact.5.spiritualist.desc:0 "เรายังคงรวบรวมข้อมูล ของยานอวกาศต่างดาว§H[This.System.GetName]§!ระบบ ถ้าเรือนี้เป็นทูตของ อารยธรรมของมนุษย์ต่างดาวที่ไม่เคยมีใครรู้จักมาก่อน อย่างที่ดูเหมือนว่า เราต้องตัดสินใจ ว่ามันประกอบไปด้วยพระกรุณาคุณของวิญญาณ ขั้น ตอน แรก จะ เป็น การ เปิด เผย ภาษา และ ลักษณะ ของ ระบบ ความ เชื่อ ของ พวก เขา."
 first_contact.5.materialist.desc:0 "การสอบถามไปยังยานอวกาศไม่ทราบชื่อที่สังเกตเห็นใน§H[This.System.GetName]§!ระบบยังคงดําเนินการ แต่ข้อมูลไม่เพียงพอ ได้รับการเก็บรวบรวมเพื่อให้สมมติฐานที่ รับข้อมูล เนื่อง จาก เรา คง กําลัง ติด ต่อ กับ ตัว แทน ของ อารยธรรม ที่ ไม่ เคย รู้ จัก มา ก่อน จึง น่า จะ พยายาม ขัด ขวาง การ สื่อสาร ของ พวก เขา และ เริ่ม การ วิเคราะห์ ภาษา ของ พวก เขา อย่าง ละเอียด."
 first_contact.5.xenophobe.desc:0 "รายงานการแจ้งเตือนจาก§H[This.System.GetName]§!ระบบที่เราเฝ้าดูกิจกรรมที่ซ่อนอยู่ ของสิ่งที่เป็นเพียงชนิดของยานอวกาศ xno จุดประสงค์ที่แน่นอนของเรือยังคงไม่ทราบ แต่มันน่าจะเป็นตัวแทน ขององค์กรการเมืองที่มีขนาดใหญ่กว่า มันอาจจะฉลาดที่จะรวบรวมข้อมูล ของสิ่งมีชีวิตเหล่านี้มากขึ้น เพื่อที่เราจะได้ตรวจสอบได้ดีขึ้น"
 first_contact.5.xenophile.desc:0 "ภาพลึกลับของเรือไม่ทราบชื่อใน§H[This.System.GetName]§!ระบบ ต่าง ๆ ยัง คง เชิญ ให้ มี การ คาด เดา! การออกแบบของมันไม่คุ้นเคยเลยสําหรับเรา บอกเราว่าเราอาจจะกําลัง จัดการกับอารยธรรมของมนุษย์ต่างดาวใหม่ นอกจากความจริงที่ว่า ยานอวกาศต่างดาว สามารถเดินทางข้ามมิติได้อย่างชัดเจน ไม่ ควร ปล่อย ความ พยายาม เพื่อ จะ รู้ มาก ขึ้น!"
 first_contact.5.authoritarian.desc:0 "เดอะ[This.Owner.GetRulerTitle]ได้มีการสรุปเกี่ยวกับเรือที่ไม่รู้จักที่รายงานใน§H[This.System.GetName]§!ระบบ การออกแบบของมันไม่ตรงกับสิ่งใดในบันทึกของเรา บอกเราว่าเรากําลังจัดการกับสถานการณ์ที่เป็นไปได้ ขออนุญาต[This.Owner.GetRulerTitle]เราสามารถเริ่มต้นการวิเคราะห์ ข้อมูลที่เราได้รวบรวมมา เพื่อดูว่าภาษาของพวกเขาสามารถแปล"
 first_contact.5.egalitarian.desc:0 "ประชาชนได้รับแจ้งถึงสถานการณ์ติดต่อแรก§H[This.System.GetName]§!ระบบ ที่ มี ยาน อวกาศ ที่ ไม่ ทราบ ชื่อ ได้ รับ การ จด ทะเบียน. ข้อมูลเบื้องต้นชี้ว่า ยานลํานี้มีความสามารถ ในการเดินทางแบบไฮเปอร์สเปซ และน่าจะเกิดจาก อารยธรรมของเอเลี่ยนที่ไม่เคยมีใครรู้จักมาก่อน ผู้ แทน จาก ทุก สาขา ของ รัฐบาล กําลัง ได้ รับ การ อธิบาย เกี่ยว กับ สถานการณ์ ที่ กําลัง พัฒนา นี้ รวม ทั้ง ความ พยายาม อย่าง ต่อ เนื่อง ที่ จะ แปล ภาษา ของ พวก เขา."

 first_contact.10.militarist.desc.proactive:0 "กองกําลังป้องกันระบบภายในยังคงอยู่ในสถานะของความพร้อมที่เพิ่มมากขึ้น หลังจากการโจมตีล่าสุดของยานอวกาศไม่ทราบชื่อ§H[This.System.GetName]§!ระบบ หน่วยสืบราชการลับยังคงวิเคราะห์ ข้อมูลเล็กน้อยที่เรามี เกี่ยวกับสารปนเปื้อน แต่ปรากฏว่า สามารถเดินทางข้ามมิติได้ ความสามารถนอกกรอบยังคงไม่ทราบ นี่น่าจะเป็นตัวแทนของการสัมผัสครั้งแรกของเรา กับอารยธรรมของมนุษย์ต่างดาวใหม่ เราควรจะใช้ขั้นตอนในการถอดรหัส การสื่อสารของพวกเขา"
 first_contact.10.militarist.desc.cautious:0 "$first_contact.10.militarist.desc.proactive$\n\n$first_contact.10.cautious$"
 first_contact.10.militarist.desc.attack_allowed:0 "$first_contact.10.militarist.desc.proactive$\n\n$first_contact.10.attack_allowed$"
 first_contact.10.pacifist.desc.proactive:0 "ที่มาของผู้มาเยือนลึกลับของเราใน§H[This.System.GetName]§!ระบบยังไม่ได้กําหนด เนื่อง จาก นี่ อาจ เป็น ครั้ง แรก ที่ เรา ติด ต่อ กับ อารยธรรม ของ มนุษย์ ต่าง ดาว ที่ เรา ไม่ รู้ จัก มา ก่อน เรา จึง ต้อง หลีก เลี่ยง การ กระทํา ใด ๆ ที่ อาจ เข้าใจ ผิด ว่า เป็น การ คุกคาม หรือ การ ล่อ ลวง. หาก ภาษา ของ พวก เขา ได้ รับ การ แปล เรา หวัง ว่า จะ สร้าง สัมพันธภาพ อัน สงบ สุข กับ พวก เขา ได้."
 first_contact.10.pacifist.desc.cautious:0 "$first_contact.10.pacifist.desc.proactive$\n\n$first_contact.10.cautious$"
 first_contact.10.pacifist.desc.attack_allowed:0 "$first_contact.10.pacifist.desc.proactive$\n\n$first_contact.10.attack_allowed$"
 first_contact.10.spiritualist.desc.proactive:0 "ยานอวกาศต่างดาวที่ข้ามเข้ามาในพื้นที่ของเราใน§H[This.System.GetName]§!ระบบยังคงถูกตรวจสอบอยู่ ถ้าเรือเป็นทูตของ อารยธรรมของมนุษย์ต่างดาวที่ไม่เคยมีใครรู้จักมาก่อน ซึ่งดูเหมือนว่าเราจะต้องตัดสินว่า เรือเหล่านั้นจะประกอบไปด้วยพระกรุณาคุณของเหล่าวิญญาณ ขั้น ตอน แรก จะ เป็น การ เปิด เผย ภาษา และ ลักษณะ ของ ระบบ ความ เชื่อ ของ พวก เขา."
 first_contact.10.spiritualist.desc.cautious:0 "$first_contact.10.spiritualist.desc.proactive$\n\n$first_contact.10.cautious$"
 first_contact.10.spiritualist.desc.attack_allowed:0 "$first_contact.10.spiritualist.desc.proactive$\n\n$first_contact.10.attack_allowed$"
 first_contact.10.materialist.desc.proactive:0 "การสอบถามในยานอวกาศไม่ทราบ ที่เจาะอวกาศของเราใน§H[This.System.GetName]§!ระบบยังดําเนินต่อไป แต่ข้อมูลไม่เพียงพอได้ถูกเก็บมา เพื่อสร้างสมมติฐาน แจ้งถึงที่มาของเรือลํานี้ที่แน่นอน เนื่อง จาก เรา คง กําลัง ติด ต่อ กับ ตัว แทน ของ อารยธรรม ที่ ไม่ เคย รู้ จัก มา ก่อน จึง น่า จะ พยายาม ขัด ขวาง การ สื่อสาร ของ พวก เขา และ เริ่ม การ วิเคราะห์ ภาษา ของ พวก เขา อย่าง ละเอียด."
 first_contact.10.materialist.desc.cautious:0 "$first_contact.10.materialist.desc.proactive$\n\n$first_contact.10.cautious$"
 first_contact.10.materialist.desc.attack_allowed:0 "$first_contact.10.materialist.desc.proactive$\n\n$first_contact.10.attack_allowed$"
 first_contact.10.xenophobe.desc.proactive:0 "การโจมตีอย่างกะทันหัน§H[This.System.GetName]§!ระบบที่มีเพียงยานอวกาศซีโน ยังคงอยู่ภายใต้การตรวจสอบ จุดประสงค์ที่แน่นอนของเรือยังคงไม่ทราบ แต่มันน่าจะเป็นตัวแทน ขององค์กรการเมืองที่มีขนาดใหญ่กว่า มันอาจจะฉลาดที่จะรวบรวมข้อมูล ของสิ่งมีชีวิตเหล่านี้มากขึ้น เพื่อที่เราจะได้ตรวจสอบได้ดีขึ้น"
 first_contact.10.xenophobe.desc.cautious:0 "$first_contact.10.xenophobe.desc.proactive$\n\n$first_contact.10.cautious$"
 first_contact.10.xenophobe.desc.attack_allowed:0 "$first_contact.10.xenophobe.desc.proactive$\n\n$first_contact.10.attack_allowed$"
 first_contact.10.xenophile.desc.proactive:0 "ความกระปรี้กระเปร่ายังคงทํางานสูงใน§H[This.System.GetName]§!ระบบ ที่ มี เรือ ที่ ไม่ มี ใคร รู้ จัก ถูก รับ ขึ้น มา บน เครื่อง รับสัญญาณ ท้อง ถิ่น! การออกแบบของผู้เข้าชมไม่คุ้นเคยอย่างสิ้นเชิงสําหรับเรา บอกเราว่าเราอาจจะกําลัง จัดการกับอารยธรรมของมนุษย์ต่างดาวใหม่ นอกจากความจริงที่ว่า ยานอวกาศต่างดาว สามารถเดินทางข้ามมิติได้อย่างชัดเจน ไม่ ควร ปล่อย ความ พยายาม เพื่อ จะ รู้ มาก ขึ้น!"
 first_contact.10.xenophile.desc.cautious:0 "$first_contact.10.xenophile.desc.proactive$\n\n$first_contact.10.cautious$"
 first_contact.10.xenophile.desc.attack_allowed:0 "$first_contact.10.xenophile.desc.proactive$\n\n$first_contact.10.attack_allowed$"
 first_contact.10.authoritarian.desc.proactive:0 "การ เยือน ของ เรือ ที่ ไม่ รู้ จัก เมื่อ เร็ว ๆ นี้ ใน§H[This.System.GetName]§!ระบบจับความสนใจของ[This.Owner.GetRulerTitle]การออกแบบของยานอวกาศไม่ตรงกับอะไรในบันทึกของเรา บอกเราว่าเรากําลังจัดการกับสถานการณ์ ถ้า[This.Owner.GetRulerTitle]อนุญาตเราสามารถเริ่มต้นการวิเคราะห์ ข้อมูลที่เราได้รวบรวม เพื่อดูว่าภาษาของพวกเขาสามารถแปล"
 first_contact.10.authoritarian.desc.cautious:0 "$first_contact.10.authoritarian.desc.proactive$\n\n$first_contact.10.cautious$"
 first_contact.10.authoritarian.desc.attack_allowed:0 "$first_contact.10.authoritarian.desc.proactive$\n\n$first_contact.10.attack_allowed$"
 first_contact.10.egalitarian.desc.proactive:0 "การ เยือน ของ ยาน อวกาศ ที่ ไม่ รู้ จัก กัน เมื่อ เร็ว ๆ นี้ ใน§H[This.System.GetName]§!ระบบได้ถูกประกาศต่อสาธารณชนแล้ว และการเตรียมการกําลังดําเนินอยู่ สําหรับสิ่งที่น่าจะเกิดขึ้นเป็นครั้งแรก ผู้แทนจากทุกสาขาของรัฐบาล กําลังถูกสรุปสถานการณ์ที่กําลังพัฒนานี้ แต่เรายังคงมีคําถามมากกว่าคําตอบ"
 first_contact.10.egalitarian.desc.cautious:0 "$first_contact.10.egalitarian.desc.proactive$\n\n$first_contact.10.cautious$"
 first_contact.10.egalitarian.desc.attack_allowed:0 "$first_contact.10.egalitarian.desc.proactive$\n\n$first_contact.10.attack_allowed$"

 first_contact.10.cautious:0 "เรากําลังใช้การป้องกันทุกอย่าง เพื่อป้องกันพวกเขาจากการหาข้อมูลที่ละเอียดอ่อนใด ๆ"
 first_contact.10.attack_allowed:0 "มาก[This.Owner.GetSpeciesNamePlural]มีความห่วงใยอย่างมากต่อการพัฒนาและความต้องการนี้ ที่เราต้องยึดเรือที่ไร้ระเบียบ เพื่อที่เราจะได้สอบปากคําพวกเขา"

 first_contact.15.militarist.desc:0 "การลาดตระเวนของเราผ่านใน§H[known_planet.System.GetName]§!ได้ระบุว่ามันเป็นสิ่งสําคัญ§H[This.ContactCountry.GetName]§!ระบบ ที่มีกิจกรรมมากมายเป็นศูนย์กลาง[known_planet.GetPlanetBioInfo]นั่นน่าจะเป็นฐานที่สําคัญ เป็นไปได้ว่า เอเลี่ยนเหล่านี้ เป็นส่วนหนึ่งของอารยธรรม ระหว่างดวงดาว แต่เพื่อที่จะถอดรหัส"
 first_contact.15.militarist.desc.no_planets:0 "เที่ยวบินสํารองที่ดําเนินการใน§H[known_system.GetName]§!ระบบได้รายงานสําคัญ§H[This.ContactCountry.GetName]§!การมีอยู่ซึ่งรวมถึง อย่างน้อยหนึ่งการติดตั้งทางทหารที่สําคัญ ในวงโคจรรอบหลัก แม้ว่าเราไม่ได้ระบุ การตั้งถิ่นฐานของดาวเคราะห์ใด ๆ ของบันทึก แต่รายชื่อเป้าหมายเบื้องต้นถูกวางเข้าด้วยกัน ในกรณีที่มนุษย์ต่างดาวพิสูจน์เป็นศัตรู การ ถ่ายทอด ที่ น่า สนใจ หลาย อย่าง ได้ รับ การ สกัด กั้น ซึ่ง อาจ ทํา ให้ เรา มี ความ หยั่ง เห็น เข้าใจ มาก พอ ที่ จะ แปล ภาษา ของ พวก เขา ได้."
 first_contact.15.pacifist.desc:0 "เดอะ§H[known_planet.System.GetName]§!ระบบมีขนาดใหญ่§H[This.ContactCountry.GetName]§!การปรากฏตัว - อย่างโดดเด่นที่สุด[known_planet.GetPlanetBioInfo](สวนสวรรค์สองแห่งนั้น) แผ่กิ่งก้านเขียวชอุ่ม และผลไม้หลายชนิด มันเริ่มที่จะชัดเจนมากขึ้น ว่าเรากําลังจัดการกับ อารยธรรมของมนุษย์ต่างดาวที่ก่อนหน้านี้ไม่รู้จัก เรา ควร ระมัดระวัง อย่าง ยิ่ง ที่ จะ หลีก เลี่ยง การ กระทํา ใด ๆ ที่ ยั่ว ยุ หาก เรา พบ ว่า ตัว เอง อยู่ ใน อวกาศ ที่ พวก เขา คิด ถึง. ต้อง พยายาม ทุก วิถี ทาง เพื่อ จะ แปล ภาษา ของ พวก เขา เพื่อ เรา จะ สามารถ ประกาศ จุด มุ่ง หมาย ที่ สงบ สุข ของ เรา ได้."
 first_contact.15.pacifist.desc.no_planets:0 "เดอะ§H[known_system.GetName]§!ระบบได้ถูกอ้างจากเอเลี่ยนที่เรากําหนดให้เป็น§H[This.ContactCountry.GetName]§!แม้ว่ายังไม่มีการค้นพบการตั้งถิ่นฐานของดาวเคราะห์ แต่มีฐานดาวขนาดใหญ่โคจรรอบหลักของระบบ เรือ ของ เรา ได้ รับ คํา สั่ง ให้ ประพฤติ ตัว ด้วย ความ ระมัดระวัง และ หลีก เลี่ยง การ กระทํา ใด ๆ ที่ อาจ ถือ ว่า เป็น ศัตรู. หาก ภาษา ของ พวก เขา ได้ รับ การ แปล เรา หวัง ว่า จะ สร้าง สัมพันธภาพ อัน สงบ สุข กับ พวก เขา ได้."
 first_contact.15.spiritualist.desc:0 "โลกที่เราค้นพบใน§H[known_planet.System.GetName]§!เป็นระบบของกลุ่มที่เรียกกันว่า§H[This.ContactCountry.GetName]§!มันเป็น[known_planet.GetPlanetBioInfo]ขอสาบานต่อนาวา ที่แล่นไปอย่างสะดวกสบาย เราไม่ทราบว่าสิ่งที่มีความสําคัญทางจิตวิญญาณ ระบบนี้ถือ สําหรับสิ่งมีชีวิตเหล่านี้ แต่มันดูเหมือนจะเป็นส่วนหนึ่งของ อารยธรรมระหว่างดวงดาว เราควรทําเท่าที่ทําได้ เพื่อถอดรหัสภาษาของพวกเขา"
 first_contact.15.spiritualist.desc.no_planets:0 "เอเลี่ยนที่เราเรียกว่า§H[This.ContactCountry.GetName]§!ดูเหมือนจะอ้างสิทธิ์§H[known_system.GetName]§!ในวงโคจรรอบดาวหลัก เรา ยัง ไม่ ได้ เห็น หลัก ฐาน ใด ๆ เกี่ยว กับ ดาว เคราะห์ ดวง นี้ และ ยัง ไม่ รู้ ว่า สิ่ง มี ชีวิต เหล่า นี้ ได้ รับ ความ นิยม ชม ชอบ จาก วิญญาณ หรือ ผู้ รับ ใช้ ของ ความ มืด ที่ เสื่อม ทราม. เราควรทําเท่าที่ทําได้ เพื่อถอดรหัสภาษาของพวกเขา"
 first_contact.15.materialist.desc:0 "มีการค้นพบที่น่าสนใจเกิดขึ้น§H[known_planet.System.GetName]§!ที่ซึ่งสัญญาณรบกวน นําเราไปสู่[known_planet.GetPlanetBioInfo]นั่นเป็นบ้านของเอเลี่ยนขนาดใหญ่หลายถิ่น เรามั่นใจว่าโลกนี้เป็นของโลกของสิ่งที่เรียกว่า§H[This.ContactCountry.GetName]§!ซึ่งน่าจะเป็นอารยธรรมที่ท่องอวกาศ เหมือนกับพวกเรา ตัว อย่าง ทาง เทคโนโลยี ของ พวก เขา ยัง ไม่ ได้ รับ การ จัด หา มา แต่ ดู เหมือน ว่า ยัง ไม่ มี ความ ก้าว หน้า อย่าง สิ้น เชิง ยิ่ง กว่า ของ เรา เอง. การ แปล ภาษา ของ พวก เขา ยัง คง ดําเนิน ต่อ ไป."
 first_contact.15.materialist.desc.no_planets:0 "ข้อมูลที่รวบรวมใน§H[known_system.GetName]§!ระบบรองรับสมมุติฐาน ที่ว่าองค์กรการเมืองได้อ้างไว้§H[This.ContactCountry.GetName]§!วงโคจรกลางของดาว เป็นแกนหลัก และน่าจะเป็นระบบสื่อสาร และเป็นศูนย์กลางโครงสร้าง ควร พยายาม วิเคราะห์ การ ถ่ายทอด เหล่า นี้ และ แปล ภาษา ของ พวก เขา."
 first_contact.15.xenophobe.desc:0 "รังดาวเคราะห์เซโนได้รับการเปิดเผยใน§H[known_planet.System.GetName]§!ระบบ! การแพร่เชื้อเป็นศูนย์กลางรอบ[known_planet.GetPlanetBioInfo]นั่นอาจจะปนเปื้อนเกินเยียวยา มันชัดเจนแล้วว่าโหนดเหล่านี้ --§H[This.ContactCountry.GetName]§!เป็นอารยธรรมที่แผ่ขยายไปทั่วดาว จะ ไม่ เป็น งาน ที่ น่า ยินดี แต่ ภาษา ของ พวก เขา ควร ได้ รับ การ แปล เพื่อ เรา จะ เรียน รู้ ถึง ขอบ เขต แห่ง ความ เสื่อม ทราม ของ พวก เขา."
 first_contact.15.xenophobe.desc.no_planets:0 "เดอะ§H[known_system.GetName]§!ระบบนั้นเห็นได้อย่างชัดเจนว่า เป็นที่ซ่อนตัวของซีโน§H[This.ContactCountry.GetName]§!การดํารงอยู่ซึ่งรวมถึง สถานีอวกาศขนาดใหญ่โคจรรอบดาวหลัก ลูกเรือของเราได้รับการสั่ง ให้ละเลยการติดต่อทั้งหมด ในขณะที่รักษาระยะปลอดภัย จากเรือหรือสถานีใด ๆ คนต่างด้าวเกรงว่าพวกเขาจะถูกรบกวน ถ้าเราถอดรหัสสัญญาณ ที่เกิดขึ้นจากฐานดาวของระบบได้ เราอาจจะแปลสิ่งที่ผ่าน"
 first_contact.15.xenophile.desc:0 "อาณานิคม หรือแม้กระทั่ง บ้านเกิดของเอเลี่ยน ที่เรากําหนดให้เป็น§H[This.ContactCountry.GetName]§!มีรายงานว่า§H[known_planet.System.GetName]§!ระบบ มี การ ตั้ง ถิ่น ฐาน ใหญ่ ๆ หลาย แห่ง บน ผิว นอก ของ[known_planet.GetPlanetBioInfo]นั่นทําให้เราสนใจ การ ค้น พบ ที่ น่า ตื่น เต้น นี้ ยิ่ง สอน เรา มาก ขึ้น เกี่ยว กับ มนุษย์ ต่าง ดาว ที่ น่า ทึ่ง เหล่า นี้ ซึ่ง เห็น ได้ ชัด ว่า เป็น ส่วน หนึ่ง ของ อารยธรรม ที่ แผ่ ขยาย ไป ทั่ว โลก. ลอง คิด ดู ซิ ว่า เรา จะ พบ อะไร อีก เมื่อ มี การ แปล ภาษา ของ พวก เขา แล้ว!"
 first_contact.15.xenophile.desc.no_planets:0 "เดอะ§H[known_system.GetName]§!ระบบดูเหมือนจะถูกจัดตั้งขึ้น โดยเอเลี่ยนที่เราเรียกว่า§H[This.ContactCountry.GetName]§!ถึง แม้ ไม่ มี การ พบ เห็น ศูนย์ ประชากร ดาว เคราะห์. วงโคจรของดาวขนาดใหญ่ ทําหน้าที่เป็นศูนย์กลางระบบ แม้ ว่า เรา อยู่ ใน สภาพ ที่ เห็น ได้ ชัด ว่า พวก เขา ถือ ว่า เป็น อวกาศ ของ พวก เขา แต่ เรา รู้ น้อย มาก เกี่ยว กับ สิ่ง ที่ น่า ทึ่ง เหล่า นี้. ไม่ ควร ปล่อย ความ พยายาม เพื่อ จะ รู้ มาก ขึ้น!"
 first_contact.15.authoritarian.desc:0 "มี การ ตรวจ พบ สิ่ง ที่ ดู เหมือน เป็น โลก ที่ มี ผู้ คน อาศัย อยู่§H[known_planet.System.GetName]§!ระบบ ใช่[known_planet.GetPlanetBioInfo]ที่ได้รับการอ้างว่า§H[This.ContactCountry.GetName]§!เอเลี่ยนพวกนี้น่าจะเป็นส่วนหนึ่งของ อารยธรรมที่เดินทางข้ามอวกาศ ในเรื่องนี้[This.Owner.GetRulerTitle]ได้ตัดสินใจที่จะจํากัดข้อมูลเกี่ยวกับระบบ กับระดับสูงของรัฐบาล เพื่อหลีกเลี่ยงความไม่สงบของพลเรือน"
 first_contact.15.authoritarian.desc.no_planets:0 "มีขนาดใหญ่§H[This.ContactCountry.GetName]§!ปรากฏตัว§H[known_system.GetName]§!ระบบ ซึ่ง รวม ถึง สถานี อวกาศ กลาง ใน วง โคจร รอบ ดาว หลัก. แม้ จะ มี การ สแกน ซ้ํา แล้ว ซ้ํา อีก แต่ ความ รู้ เกี่ยว กับ ภาษา ของ พวก เขา และ ลักษณะ ที่ แน่นอน ของ การ บังคับ บัญชา ของ พวก เขา ก็ หนี เรา ไป. เว้นแต่[This.Owner.GetRulerTitle]วัตถุ เราควรพยายามร่วมกัน แปลภาษาของพวกเขา"
 first_contact.15.egalitarian.desc:0 "ความ พยายาม ใน การ สํารวจ อวกาศ อัน ลึก ซึ้ง ได้ เกิด ขึ้น กับ โลก ที่ มี คน อาศัย อยู่ ใน§H[known_planet.System.GetName]§!ระบบ มันเป็นของ§H[This.ContactCountry.GetName]§!ซึ่งตอนนี้เชื่อว่าเป็น อารยธรรมระหว่างอวกาศ ที่ไม่เคยมีมาก่อน อาณานิคมนี้ หรือ บ้านเกิด[known_planet.GetPlanetBioInfo]ที่อยู่ภายในพื้นที่ดาวฤกษ์ หวังว่าสังคมของพวกเขาจะเป็นสังคมก้าวหน้า ที่ตั้งอยู่บนเสรีภาพและเสรีภาพส่วนบุคคล แต่เราต้องแปลภาษาของพวกเขาเพื่อค้นหา"
 first_contact.15.egalitarian.desc.no_planets:0 "เราตรวจพบสิ่งสําคัญ§H[This.ContactCountry.GetName]§!ปรากฏตัว§H[known_system.GetName]§!ระบบ - แม้ว่าไม่มีดาวเคราะห์ที่อาศัยอยู่เท่าที่เราสามารถบอกได้ การติดตั้งอวกาศขนาดใหญ่ของการจัดเรียงบางส่วน เจ้าหน้าที่ที่ได้รับเลือกของเราได้แจ้งประชาชน ว่าเราได้มีโอกาสมากที่สุด สะดุดกับด่านที่เป็น ของอารยธรรมระหว่างดาว ที่ไม่รู้จักมาก่อน ก่อนที่เราจะสื่อสารกับพวกเขาได้ เราจําเป็นต้องแปลภาษาของพวกเขา"

