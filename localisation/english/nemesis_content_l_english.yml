 opinion_smear_campaign_deceived:0 "การ ใช้ ความ ไว้ วางใจ อย่าง ผิด ๆ"
 opinion_smear_campaign_espionage:0 "การ นํา ทาง"
 opinion_exposed_espionage:0 "เปิดโปง กิจการ ของ เรา"
