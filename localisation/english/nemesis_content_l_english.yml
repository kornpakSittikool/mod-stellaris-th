 crisis.6000.name:0 "เครื่อง ยนต์ เอ เท โร ฟา ซิส"
 crisis.6000.a.desc:0 "เราได้มาถึงช่วงเวลาที่สําคัญ ในภารกิจของเรา ที่จะทําลายขอบเขตญาณทิพย์ของชรูด โครง สร้าง ของ ผู้ ยิ่ง ใหญ่§Hเครื่องยนต์ดาราศาสตร์§!ตอนนี้ล้อมรอบดาวของระบบของเรา เมื่อโครงสร้างขนาดใหญ่นี้เสร็จ อุปสรรคระหว่างโลกของเราจะถูกลบ และเราสามารถอ้าง\n\nจิตใจ ของ เรา จะ ไม่ ถูก จํากัด อีก ต่อ ไป โดย ข้อ จํากัด ทาง กายภาพ ของ ร่าง กาย ที่ อ่อนแอ ของ เรา และ ความ เป็น จริง เอง จะ อยู่ ที่ ความ เมตตา ของ เรา. จริง ที เดียว ไม่ อาจ มี ชั้น ที่ สูง กว่า นี้ ได้."
 crisis.6000.b.desc.intro: "โครง สร้าง ของ ผู้ ยิ่ง ใหญ่§Hเครื่องยนต์ดาราศาสตร์§!เรากําลังสร้างรอบดาว ของระบบบ้านของเราอยู่ในสถานที่ โครงสร้างขนาดใหญ่นี้เมื่อเสร็จสมบูรณ์ จะฉีกม่านระหว่างโลกของเราและ§Hเดอะชราวด์§!."
 crisis.6000.b.desc.organic_non_gestalt: "$crisis.6000.b.desc.intro$\n\nในไม่ช้าเราจะเข้าถึงรูปแบบบริสุทธิ์ที่สุด ของพลังงานไซโอนิคที่เบคและเรียก ความจริงจะไม่มีทางเลือก นอกจากยอมทําตามความประสงค์ของเรา"
 crisis.6000.b.desc.organic_gestalt: "$crisis.6000.b.desc.intro$\n\nเมื่อเราได้ข้ามเข้าไปในมิตินี้อย่างสมบูรณ์ และผนวกมัน จิตของเราจะขยายตัว กฎธรรมชาติที่ควบคุมการดํารงอยู่ของเรา สามารถเขียนใหม่ตามที่เราเห็นพอดี"
 crisis.6000.b.desc.machine: "$crisis.6000.b.desc.intro$\n\nยุคแห่งความไม่เท่าเทียมทางกาย นําไปสู่จุดสิ้นสุด ใน ไม่ ช้า ความ เป็น จริง นี้ จะ ประสาน กับ ความ ดี เลิศ ทาง ด้าน การ เดิน เรือ ที่ ดี เยี่ยม ของ เรา."
 crisis.6000.c.desc:0 "หน่วยก่อสร้างได้เสร็จสิ้นกรอบของ§Hเครื่องยนต์ดาราศาสตร์§!เรากําลังสร้างรอบดาวของระบบของเรา โครงสร้างขนาดใหญ่นี้เมื่อเสร็จสมบูรณ์ จะฉีกอุปสรรคระหว่างโลกของเราและราชอาณาจักรไซโอนิคอื่น ๆ ที่เรียกว่า'§Hเดอะชราวด์§!.'\n\nเมื่อเราข้ามเข้ามาในมิตินี้ และผนวกมันเข้าด้วยกัน กฎธรรมชาติที่ควบคุมการดํารงอยู่ของเรา สติสัมปชัญญะของเรา จะไม่ถูกจํากัดโดยข้อจํากัดทางกายภาพ เช่น การประมวลผลพลังงานหรือโหนดเครือข่าย"
 crisis.6000.d.desc:0 "ของเรา[root.GetIndividualNamePlural]ได้เสร็จสิ้นกรอบของ§Hเครื่องยนต์ดาราศาสตร์§!เรากําลังสร้างรอบดาวของระบบของเรา โครงสร้างขนาดใหญ่นี้เมื่อเสร็จสิ้นแล้ว จะฉีกอุปสรรคระหว่างโลกของเราและราชอาณาจักรไซโอนิคอื่น ๆ ที่เรียกว่า\"ฉลาม\".\n\nเมื่อเราได้ข้ามเข้าไปในมิตินี้อย่างสมบูรณ์ และผนวกมัน จิตของเราจะขยายตัว กฎธรรมชาติที่ควบคุมการดํารงอยู่ของเรา สามารถเขียนใหม่ตามที่เราเห็นพอดี"
 crisis.6000.e.desc: "การ ก่อ สร้าง§Hเครื่องยนต์ดาราศาสตร์§!'กรอบรอบดาวที่บ้านของเรา ได้รับการสร้างเสร็จ' เมื่อเสร็จสิ้นโครงสร้างขนาดใหญ่นี้จะฉีกอุปสรรคระหว่างความจริงของเราและ§Hเดอะชราวด์§!.\n\nเมื่อเราข้ามเข้าไปในมิตินั้นได้เต็มที่ เราก็จะสามารถเผชิญหน้า หลังจากที่มันตก, ชรูด จะอยู่ในมือของเรา และเราจะมีอิสระในการเขียนกฎของธรรมชาติ"
 crisis.6000.a:0 "อุทยานรออยู่"
 crisis.6000.b:0 "เราจะเป็นพระเจ้า"
 crisis.6000.c:0 "ทุกอย่างจะถูกยุบ"
 crisis.6000.d:0 "จิตใจ ของ เรา จะ ครอบ คลุม กาแล็กซี ต่าง ๆ."
 crisis.6000.e: "$crisis.6000.c$"

 crisis_sphere_0:0 "เฟรมของกลไกดาราศาสตร์"
 crisis_sphere_0_DESC:1 "โครง สร้าง ที่ ล้อม รอบ ดาว เป็น พื้น ฐาน ของ กลไก เอ เท โร ฟา สิก ใน อนาคต. ปรับปรุงโครงสร้างเมกะนี้อย่างเต็มที่§Gชนะเกม§!."
