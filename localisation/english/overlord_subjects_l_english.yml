 # Policies
 policy_subjugation_war_terms:0 "เงื่อนไขของจักรวรรดิที่แพ้เราในสงคราม"
 policy_subjugation_war_terms_desc:1 "จุด ยืน ของ เรา เกี่ยว กับ ข้อ ตก ลง ใน ตอน แรก สําหรับ วาสซัล หรือ อนุ สัญญา ที่ เรา ใช้ ใน สงคราม.\n"
 oppressive_terms_name:1 "เป็นทาส/บริวาร/เมืองขึ้น (กดขี่)"
 balanced_terms_name:1 "เป็นทาส/บริวาร/เมืองขึ้น (กลางๆ)"
 benevolent_terms_name:1 "เป็นทาส/บริวาร/เมืองขึ้น (มีเมตตา)"
 oppressive_terms:0 "$oppressive_terms_name$"
 oppressive_terms_desc:2 "คนที่เราปราบนั้นด้อยกว่าเรา เราอดทนต่อพวกเขาเพียงเพราะพวกเขายังคงนิ่งเงียบและปรนเปรอเราด้วยของบรรณาการที่น่าสมเพช\n\n§Eเงื่อนไขข้อตกลงเบื้องต้นของบริวาร(เมืองขึ้น):\n$t$$subject_can_be_integrated$\n$t$$subject_can_not_do_diplomacy$\n$t$$subject_cannot_expand$\n$t$เข้าร่วมสงครามของเจ้าเหนือหัว: ทั้งรับและรุก\n$t$เข้าร่วมสงครามของบริวาร: ป้องกัน\n$t$ขีดจำกัดการถือครองสิ่งปลูกสร้างบนดาวของบริวาร: 1§!"
 balanced_terms:0 "$balanced_terms_name$"
 balanced_terms_desc:2 "เราเชื่อในการปฏิบัติต่อบริวารของเราอย่างเป็นธรรม บางทีพวกเขาอาจเห็นถึงวิถีของเราและข้อผิดพลาดของพวกเขา\n\n§Eเงื่อนไขข้อตกลงเบื้องต้นของบริวาร(เมืองขึ้น):\n$t$$subject_can_not_be_integrated$\n$t$$subject_can_do_diplomacy_but_not_vote$\n$t$$subject_can_expand_with_tithe$\n$t$เข้าร่วมสงครามของเจ้าเหนือหัว: ป้องกัน\n$t$เข้าร่วมสงครามของบริวาร: ป้องกัน\n$t$ขีดจำกัดการถือครองสิ่งปลูกสร้างบนดาวของบริวาร: 1§!"
 benevolent_terms:0 "$benevolent_terms_name$"
 benevolent_terms_desc:2 "บริวารของเราเป็นส่วนหนึ่งของเรา ความสำเร็จของพวกเขาคือชัยชนะของเราและเราจะก้าวไปข้างหน้าเป็นหนึ่งเดียวกัน\n\n§Eเงื่อนไขข้อตกลงเบื้องต้นของบริวาร(เมืองขึ้น):\n$t$$subject_can_not_be_integrated$\n$t$$subject_can_do_diplomacy$\n$t$$subject_can_expand$\n$t$เข้าร่วมสงครามของเจ้าเหนือหัว: ป้องกัน\n$t$เข้าร่วมสงครามของบริวาร: ป้องกัน\n$t$ขีดจำกัดการถือครองสิ่งปลูกสร้างบนดาวของบริวาร: 1§!"

 oppressive_corporate_terms_name:0 "ครอบครองศัตรู"
 oppressive_corporate_terms:0 "$oppressive_corporate_terms_name$"
 oppressive_corporate_terms_desc:1 "ความพยายามที่น่าสมเพชในการบล็อกการยึดครองนั้นล้มเหลว ไม่ว่าความเชื่อมั่นของพวกเขาจะมีเพียงใด แต่ท้ายที่สุด ทุกคนจะมีราคา\n\n§Eเงื่อนไขข้อตกลงเบื้องต้นของบริษัทย่อย(บริวาร):\n$t$$subject_can_not_be_integrated$\n$t$$subject_can_do_diplomacy_but_not_vote$\n$t$$subject_can_expand_with_tithe$\n$t$ภาษีทรัพยากรพื้นฐาน: 45%\n$t$ภาษีทรัพยากรขั้นสูง: 15%\n$t$เข้าร่วมสงครามของเจ้าเหนือหัว: ทั้งรับและรุก\n$t$เข้าร่วมสงครามของบริวาร: ป้องกัน\n$t$ขีดจำกัดการถือครองสิ่งปลูกสร้างบนดาวของบริวาร: 1§!\n\nนี่คือ §Yนโยบายปราบปรามแบบกดขี่§!"
 balanced_corporate_terms_name:0 "เข้ายึดแบบมาตรฐาน"
 balanced_corporate_terms:1 "$balanced_corporate_terms_name$"
 balanced_corporate_terms_desc:1 "ด้วยข้อตกลงที่น่าพอใจ ทั้งสองฝ่ายสามารถกลับไปทำงานร่วมกันได้\n\n§Eเงื่อนไขข้อตกลงเบื้องต้นของบริษัทย่อย(บริวาร):\n$t$$subject_can_not_be_integrated$\n$t$$subject_can_do_diplomacy_but_not_vote$\n$t$$subject_can_expand_with_tithe$\n$t$ภาษีทรัพยากรพื้นฐาน: 30%\n$t$เข้าร่วมสงครามของเจ้าเหนือหัว: ป้องกัน\n$t$เข้าร่วมสงครามของบริวาร: ป้องกัน\n$t$ขีดจำกัดการถือครองสิ่งปลูกสร้างบนดาวของบริวาร: 1§!\n\nนี่คือ §Yนโยบายปราบปรามแบบสมดุล§!"
 benevolent_corporate_terms_name:0 "เจรจาทำงานร่วมกัน"
 benevolent_corporate_terms:0 "$benevolent_corporate_terms_name$"
 benevolent_corporate_terms_desc:1 "ข้อตกลงที่ดีที่สุดจะเป็นประโยชน์ต่อทั้งสองฝ่าย เช่นเดียวกับชีวิต ธุรกิจที่เจริญรุ่งเรืองและความสามัคคี\n\n§Eเงื่อนไขข้อตกลงเบื้องต้นของบริษัทย่อย(บริวาร):\n$t$$subject_can_not_be_integrated$\n$t$$subject_can_do_diplomacy$\n$t$$subject_can_expand$\n$t$ภาษีทรัพยากรพื้นฐาน: 30%\n$t$เข้าร่วมสงครามของเจ้าเหนือหัว: ป้องกัน\n$t$เข้าร่วมสงครามของบริวาร: ป้องกัน\n$t$ขีดจำกัดการถือครองสิ่งปลูกสร้างบนดาวของบริวาร: 1§!\n\nนี่คือ §Yนโยบายปราบปรามแบบมีเมตตา§!"

