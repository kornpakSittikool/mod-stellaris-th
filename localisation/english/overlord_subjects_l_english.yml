 # Subject presets descriptions
 preset_bulwark_desc:0 "เป็นประเภทของบริวารโดยเจ้าเหนือหัวจะเป็นผู้เลือกประเภทของบริวารมุ่งเน้นไปที่ความสามารถทางทหารโดยแลกกับการผลิตทรัพยากรพื้นฐาน"
 preset_scholarium_desc:0 "เป็นประเภทของบริวารโดยเจ้าเหนือหัวจะเป็นผู้เลือกประเภทของบริวารมุ่งเน้นไปที่ความก้าวหน้าทางเทคโนโลยีโดยแลกกับศักยภาพทางทหารที่ลดลง"
 preset_prospectorium_desc:0 "เป็นประเภทของบริวารโดยเจ้าเหนือหัวจะเป็นผู้เลือกประเภทของบริวารมุ่งเน้นไปที่การผลิตทรัพยากรโดยแลกกับผลงานวิจัยที่ลดลง"
 preset_tributary_desc:0 "เป็นบริวารที่มีหน้าที่ต้องจ่ายภาษีเป็นทรัพยากรพื้นฐานให้กับเจ้าเหนือหัวเป็นรายเดือน"
 preset_vassal_desc:0 "บริวารเป็นประเภทของจักรวรรดิที่อยู่ใต้บังคับบัญชาที่มีข้อตกลงและมีตัวเลือกมากมายสำหรับจักรวรรดิบริวารและเจ้าเหนือหัว"
 preset_protectorate_desc:0 "ผู้ปกป้องเป็นประเภทผู้เกี่ยวข้อง ที่มีเทคโนโลยีที่อ่อนแอกว่า พวกเขาจะได้รับการส่งเสริมเทคโนโลยีทั้งหมด ที่เจ้านายของพวกเขามีอยู่แล้วครอบครอง"
 preset_subsidiary_desc:0 "อนุกรรมการเป็นประเภทบุคคล ที่มีบริษัทเป็นใหญ่ และพวกเขามีหน้าที่จ่าย ภาษีทรัพยากรพื้นฐานรายเดือน"
 preset_dominion_desc:0 "การ ทํา แท้ง เป็น การ ล้ม เหลวจักรวรรดิคน ประเภท บุคคล ต้อง จ่าย ภาษี ทรัพยากร ขั้น พื้น ฐาน ประจํา เดือน แก่ เจ้า นาย ของ ตน ใน สมัย โบราณ."
 preset_satellite_desc:0 "ดาว เทียม ตกจักรวรรดิคน ประเภท บุคคล ที่ มี พันธะ ต้อง จ่าย ภาษี วิจัย อัน สําคัญ ยิ่ง แก่ เจ้า นาย ของ พวก เขา ใน สมัย โบราณ."
 preset_signatory_desc:0 "การ แสดง นัย เป็น การ ตก ลงจักรวรรดิคน ประเภท คน ที่ ไม่ มี การ ทูต อิสระ จาก เจ้า นาย สมัย โบราณ."
 preset_thrall_desc:0 "ความ หายนะ คือ ความ ล่ม จมจักรวรรดิคน ประเภท บุคคล ต้อง จ่าย ภาษี ทรัพยากร ขั้น พื้น ฐาน ประจํา เดือน แก่ เจ้า นาย ของ ตน ใน สมัย โบราณ และ ไม่ มี ความ สามารถ ที่ จะ ขยาย พรม แดน ของ พวก เขา."
 preset_political_client_desc: "ลูก ค้า ทาง การ เมือง ตก เป็น เหยื่อจักรวรรดิคน ประเภท คน ที่ ต้อง สนับสนุน เจ้า นาย สมัย โบราณ ใน เรื่อง การ เมือง."
 preset_herald_desc: "เฮ รัลด์ เป็น ผู้ ตก เป็น เหยื่อจักรวรรดิคน ประเภท บุคคล ที่ มี พันธะ ต้อง ร่วม ใน สงคราม ทุก ครั้ง ที่ เจ้า นาย ของ พวก เขา สมัย โบราณ เริ่ม ต้น."
 preset_scion_desc:1 "นัก จิตวิทยา เป็น คน ประเภท หัว เรื่อง ซึ่ง ได้ รับ การ ชี้ นํา ผ่าน การ พัฒนา ของ เขา โดย ฟอลเลนจักรวรรดิหัวหน้า"
 preset_satrapy_desc:0 "เรือ ซา ดัก เป็น เรือ ประเภท หัว เรือ ข่าน ที่ มี พันธะ ที่ จะ จ่าย เงิน ให้ เจ้า นาย ของ เรือ และ ทรัพยากร พื้น ฐาน."
 preset_relic_satrapy_desc:1 "เซทระพี/เขตปกครองมณฑล เป็นประเภทบริวารที่สืบสานวัฒนธรรมการปกครองเมืองขึ้นของข่านผู้ยิ่งใหญ่ ซึ่งบริวารหรือเขตปกครองมีหน้าที่จัดหายานรบและทรัพยากรให้กับเจ้าเหนือหัว"

 # Subject presets flavor text
 preset_bulwark_flavor_desc:0 "เรื่องนี้จะเชี่ยวชาญในธุรกิจทางทหาร พวก เขา เป็น ที่ รู้ จัก ใน ด้าน ความ ดี เลิศ ใน เรื่อง การ ป้องกัน ตน เอง ให้ ความ หยั่ง เห็น เข้าใจ และ การ คุ้มครอง สําหรับ เจ้า นาย ของ พวก เขา. ในทางกลับกัน ความตั้งใจเดียวของพวกเขา ทําให้พวกเขาพึ่งพาอย่างสูงส่ง ในการสนับสนุนด้านวัตถุ เพื่อให้จักรวรรดิของพวกเขาดําเนินงานต่อไป"
 preset_scholarium_flavor_desc:0 "เรื่อง นี้ เชี่ยวชาญ ใน การ วิจัย และ วิทยาศาสตร์. โดย มี งบ ประมาณ เกือบ ทั้ง หมด ของ พวก เขา รวม จุด อยู่ ที่ การ สนับสนุน นัก วิชาการ และ นัก วิจัย พวก เขา จําเป็น ต้อง ได้ รับ การ ปก ป้อง อย่าง ยิ่ง จาก เจ้า นาย ซึ่ง ได้ รับ เทคโนโลยี อัน เหลือ เชื่อ สําหรับ ปัญหา ของ ตน."
 preset_prospectorium_flavor_desc:0 "เรื่อง นี้ เชี่ยวชาญ ด้าน วัสดุ และ การ ผลิต. ความ รู้สึก อัน แรง กล้า ของ พวก เขา ทํา ให้ พวก เขา สามารถ ขุด แร่ ธาตุ ที่ มี ค่า ที่ สุด จาก ภูมิภาค ต่าง ๆ ได้ ซึ่ง คน อื่น ๆ ได้ ละ ทิ้ง ไป แล้ว ทํา ให้ ดาว เคราะห์ น้อย หรือ ดวง จันทร์ ที่ อยู่ นอก โลก มี มาก ที่ สุด."
 preset_tributary_flavor_desc:0 "จักรวรรดิบรรณาการค่อนข้างเป็นอิสระและยังคงรับผิดชอบกิจการของตนเองทั้งภายในและทางการเมืองภายนอก พวกเขาจ่ายส่วยบรรณาการจำนวนมากสำหรับการปกป้องจากเจ้าเหนือหัวและตราบใดที่กระแสเงินดีอยู่ พวกเขาก็จะมีอิสระที่จะทำอะไรก็ได้ที่พวกเขาต้องการ(เป็นส่วนใหญ่)"
 preset_vassal_flavor_desc:0 "บริวารเป็นจักรวรรดิที่อยู่ใต้การปกครองของอีกจักรวรรดิหนึ่ง ซึ่งสามารถการปกครองตนเองได้เล็กน้อยเลยหรือไม่สามารถปกครองตนเองได้เลย เมื่อลงนามในสนธิสัญญากับมหาอำนาจต่างดาว พวกจะตกอยู่ใต้ความตั้งใจและความเมตตาของเจ้านายคนใหม่และถูกบังคับให้ยอมจำนนต่อกฎเกณฑ์และข้อบังคับใดก็ตามที่เจ้านายปรารถนา สำหรับจักรวรรดิที่อ่อนแอบางแห่ง นี่เป็นวาระสุดท้ายก่อนที่จะค่อยๆรวมเข้าด้วยกันอย่างเหมาะสมในขณะที่พวกเขากำลังลงนามเพื่อปกครองตนในครั้งนี้"
 preset_protectorate_flavor_desc:0 "ผู้ถูกอารักขาคือบริวารที่อ่อนแอกว่าเจ้าเหนือหัวอย่างมากและถูกลดระดับลงจนถึงจุดที่การรับใช้ของพวกเขาถือเป็นบุญคุณสำหรับพวกเขา ได้รับการปกป้องจากอันตรายๆในกาแล็กซี พวกเขาสามารถรักษาเสถียรภาพและปรับปรุงบ้านเกิดของตนในขณะที่ผู้มีอำนาจคอยดูแลพวกเขา"
 preset_subsidiary_flavor_desc:0 "บริษัทย่อยเป็นบริวารที่มีอำนาจในการปกครองตนเองและมีอิสระที่จะเข้าทำกิจการของตนเองได้ พวกเขาได้ลงนามในความเป็นอิสระบางส่วนสำหรับข้อตกลงที่ทั้งสองฝ่ายได้รับการคาดหวังให้สนับสนุนและช่วยเหลือซึ่งกันและกัน"
 preset_dominion_flavor_desc:0 "การ ปกครอง เป็น เรื่อง ของ จักรวรรดิ โบราณ ที่ ถูก ปลุก ให้ ตื่น ขึ้น. โดย มี เรือ รบ ที่ เก่า แต่ มี พลัง ข้าม พรม แดน พวก เขา ได้ ยอม อยู่ ใต้ การ ปกครอง ของ เจ้า นาย ที่ มี ใจ แรง กล้า เกิน ไป ซึ่ง เรียก ร้อง ให้ พวก เขา มี ชื่อ และ วิญญาณ."
 preset_satellite_flavor_desc:0 "ดาว เทียม เป็น หัว เรื่อง ของ จักรวรรดิ โบราณ ที่ ถูก ปลุก ให้ ตื่น. เมื่อได้เซ็นยกร่างตัวเองออกไปให้อํานาจต่างชาติแล้ว มันจะถูกควบคุมโดยความหลอกลวงของพวกเขาตลอดเวลา ทุกส่วนที่สําคัญทางวัฒนธรรม"
 preset_signatory_flavor_desc:0 "การ เซ็น ชื่อ เป็น เรื่อง เกี่ยว กับ จักรวรรดิ โบราณ ที่ ถูก ปลุก ให้ ตื่น. ถึง แม้ ถูก ปกครอง จาก ที่ ห่าง ไกล พวก เขา ก็ ยัง มี หลาย วิธี ที่ ต้อง เอา ใจ ใส่ เรื่อง ของ ตน เอง. เนื่อง จาก พวก เขา ไม่ ได้ ถูก บังคับ ให้ ทํา บรรณาการ หรือ มี กฎ ข้อ บังคับ มาก เกิน ไป พวก เขา จึง มัก จะ ไม่ เข้าใจ ชัดเจน ว่า จุด มุ่ง หมาย ของ การ โกหก ของ ตน คือ อะไร."
 preset_thrall_flavor_desc:0 "ม.) อยู่ภายใต้การปกครองที่เข้มงวดจากระยะไกล พวกเขาจ่ายเงินจํานวนมากของความมั่งคั่ง เพื่อความทะเยอทะยานของพวกเขาเหนือเจ้านาย"
 preset_scion_flavor_desc:0 "การ ขูดรีด เป็น เรื่อง ของ จักรวรรดิ โบราณ ที่ ถูก ปลุก ให้ ตื่น. การ สนับสนุน มา นาน แล้ว จาก ผู้ อุปถัมภ์ ด้าน กุศล ใน สมัย โบราณ พวก เขา เป็น แบบ อัตโนมัติ ใน เกือบ ทุก แง่ มุม แห่ง การ ปกครอง ของ ตน. บาง ครั้ง พวก เขา ได้ รับ ของ ขวัญ หรือ ความ ช่วย เหลือ จาก ที่ อยู่ อาศัย ด้วย เหตุ ผล ที่ ไม่ อาจ หยั่ง รู้ ค่า กาแล็กซี อื่น ๆ ได้."
 preset_satrapy_flavor_desc:0 "ซาทแรพ(เสียงกับดัก)ทําหน้าที่ในตําแหน่งเจ้าฟ้าข่าน เมื่อได้หันไปยังกองกําลังทหาร ของผู้รุกราน พวกเขาได้รับสิทธิในการปกครองภูมิภาค ของกาแล็กซี่ในชื่อของเกรทคาน ตราบเท่าที่พวกเขายังคงสนับสนุน การพิชิตอย่างต่อเนื่องของโจร กับเรือและทรัพยากร พวกเขาเหลือที่จะ เข้าร่วมในการจัดการของพวกเขา"
 preset_relic_satrapy_flavor_desc:0 "เซทระพี/เขตปกครองมณฑล เป็นรูปแบบการปกครองเมืองขึ้นที่ข่านผู้ยิ่งใหญ่ชื่นชอบ บัดนี้เมื่อมีผู้นำคนใหม่บนบัลลังก์แล้ว คงเป็นการสูญเปล่าหากจะละทิ้งวัฒนธรรมดังกล่าวไป โดยที่รัฐบริวารจะต้องส่งยานรบและทรัพยากรบางส่วนให้แก่เจ้าเหนือหัวเพื่อเป็นกำลังในการพิชิตและยึดครองจักรวรรดิอื่นๆต่อไป"


