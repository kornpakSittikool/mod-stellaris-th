 # First Half
 ResourceDiscovery1:0 "อยู่ใต้พื้นผิวของ[FromFromFrom.GetName]เราพบโครงสร้างที่บิดเบี้ยว ถูกซ่อนเอาไว้โดยเวลา แม้ ว่า โครง สร้าง ของ อาคาร จะ ยัง คง แข็ง แรง อยู่ บ้าง แต่ ก็ ไม่ มี อะไร ที่ คุ้ม ค่า กับ การ ผุ พัง ภาย ใน อาคาร นั้น. อย่างไรก็ตาม เราได้ค้นพบทางผ่าน ที่เจาะลึกลงไปในใต้ดิน"
 ResourceDiscovery2:0 "เราพบกลุ่มของเครื่องจักรที่มีขนาดเล็กและสับสนที่[FromFromFrom.GetName]ยังคงพยายามที่จะดําเนินการงานที่กําหนดไว้ เครื่อง เหล่า นี้ ถูก รวม เข้า ด้วย กัน ณ จุด ศูนย์กลาง ซึ่ง ถูก อุด ตัน ด้วย ซาก ปรัก หัก พัง และ อุปกรณ์ ที่ ถอด ออก. แต่ สัญญาณ ที่ เกิด ขึ้น ใน ช่วง เวลา ปกติ และ นํา ลง ไป ลึก ลง ไป ใต้ ดิน ทํา ให้ เรา ได้ รับ การ ชี้ นํา ที่ ชัดเจน ให้ ติด ตาม."
 ResourceDiscovery3:0 "การวิเคราะห์ก่อนหน้านี้ของเรา[FromFromFrom.GetName]การ ค้น พบ อุโมงค์ ใต้ ดิน โดยมีศูนย์วิจัยและเครื่องจักรที่ไม่สามารถทํางานได้ทั้งหมด เราได้มุ่งเน้นอีกครั้งในการสํารวจถ้ํา"
 ResourceDiscovery4:0 "หลังจากการสํารวจผิวของ[FromFromFrom.GetName]เราค้นพบเครื่องมือตรวจสอบ ที่ใช้ในการสแกนบริเวณนั้น ไม่ ว่า เรา จะ ทํา อะไร หรือ พยายาม ขัด ขวาง อย่าง ไร การ ตรวจ สอบ จะ กลับ ไป ยัง จุด นั้น เพื่อ ดําเนิน การ ต่อ ไป อย่าง เลี่ยง ไม่ ได้. ตามรูปแบบของพฤติกรรม เราได้เริ่มสํารวจพื้นดินด้านล่าง"
 ResourceDiscovery5:0 "เราได้พบกับเหมืองแร่เก่าและทําลาย หรือสถานีวิจัยที่[FromFromFrom.GetName]ดู เหมือน ว่า มัน ตก ลง บน ผิว ดิน ใน ช่วง ใด ช่วง หนึ่ง ของ อดีต. มันแสดงถึงสัญญาณของการถูกทําร้าย ทั้ง ๆ ที่ ได้ รับ ความ เสีย หาย อย่าง หนัก สถานี นี้ ยัง คง ส่ง สัญญาณ ไป ยัง ทาง ใต้ ดิน. ก่อน ที่ จะ ดําเนิน ต่อ ไป ไม่ ต้อง สงสัย ว่า เรา น่า จะ ตรวจ สอบ เรื่อง นี้ ให้ ลึก ซึ้ง ยิ่ง ขึ้น."

 # Second Half - Energy
 ResourceDiscoveryEnergy1:0 "ดู เหมือน ว่า มัน ติด อยู่ กับ กระแส ไฟฟ้า ที่ ไหล อยู่ ใต้ ผิว น้ํา ซึ่ง เป็น ต้น กําเนิด ของ กระแส ไฟฟ้า ที่ ยัง ไม่ ชัดเจน. ยิ่ง กว่านั้น เราไม่มีทางตัดสินได้ว่า กระแสน้ําจะอยู่นานแค่ไหน หรือมันเสถียรทั้งหมดหรือไม่"
 ResourceDiscoveryEnergy2:0 "มันถูกสร้างขึ้นเพื่อให้เครื่องกําเนิดไฟฟ้าโบราณมีชีวิตอยู่ และซ่อนอยู่แค่ใต้พื้นผิว และแม้จะมีปัญหาด้านอุปกรณ์ทั้งหมด ด้วย งาน บาง อย่าง เรา น่า จะ สามารถ ทํา ให้ งาน นั้น มั่นคง และ ใช้ ประโยชน์ ได้ เอง."
 ResourceDiscoveryEnergy3:0 "เมื่อเรามองต่อไปในเครื่องกําเนิดไฟฟ้าลึกลับเราพบว่ามันแนบกับ หลายสายขนาดใหญ่วิ่งไปทั่ว[FromFromFrom.GetName]ทุกอย่างดูเหมือนจะทํางาน โดยเครื่องมือเดียว ด้วยการเปลี่ยนแปลงเล็กน้อยกับปัจจุบัน เราอาจจะสามารถใช้พลังงานที่มันสร้างขึ้น"

 # Second Half - Minerals
 ResourceDiscoveryMinerals1:0 "เครื่องกําเนิดไฟฟ้าจะเชื่อมต่อกับเส้นเลือดดําแร่ ที่ฝังอยู่ใต้พื้นดิน ครั้งหนึ่งเคยเป็นแหล่งของวัตถุดิบที่สําคัญ แม้ จะ น้อย ลง ไป บ้าง แต่ เรา ก็ สามารถ ใช้ ทรัพยากร เหล่า นี้ ได้."
 ResourceDiscoveryMinerals2:0 "การ สํารวจ ต่อ ไป เผย ให้ เห็น ว่า เครื่อง กําเนิด ไฟฟ้า นี้ เชื่อม ต่อ กับ การ พ่น แร่ ธาตุ ที่ มี แร่ ธาตุ เล็ก กว่า หลาย เส้น. สิ่ง ที่ กระจาย อยู่ ทั่ว พื้น เป็น ศพ ของ ลิ ตอยด์ ชนิด หนึ่ง ที่ ก่อน หน้า นี้ ไม่ รู้ จัก. ไม่ เป็น ที่ แน่ชัด ว่า พวก เขา กําลัง เก็บ เกี่ยว แร่ ธาตุ หรือ รับ ประทาน จาก พื้น ดิน โดย ตรง แต่ ไม่ ว่า ใน กรณี ใด ก็ ตาม ร่าง กาย ได้ รับ การ เสริม สร้าง ด้วย แร่ ธาตุ ที่ อาจ เป็น ประโยชน์ ต่อ เรา."
 ResourceDiscoveryMinerals3:0 "เครื่อง กําเนิด ไฟฟ้า ถูก สร้าง ภาย ใน ห้อง ใต้ ดิน ขนาด มหึมา เต็ม ไป ด้วย แร่ ธาตุ ทุก ชนิด. การทําให้เกรทโต้ว่างเปล่า จะเป็นความพยายามในตัวมันเอง การขุดเจาะมีผลให้จําเป็น ที่จะผลักดันให้ลึกเข้าไปในเปลือกโลก"

 # Second Half - Alloys
 ResourceDiscoveryAlloys1:0 "การ สํารวจ บริเวณ นั้น ต่อ ไป เผย ให้ เห็น ว่า มัน เกี่ยว ข้อง กับ อุปกรณ์ โบราณ บาง อย่าง ยัง คง ดําเนิน งาน ต่อ ไป. โดยใช้ทรัพยากรที่อยู่ในมือ แมชชีนยังคงบ้วนออกมาดีและบริสุทธิ์ทั้งหมด ก้อนของอัลลอยที่มีประโยชน์"
 ResourceDiscoveryAlloys2:0 "เราค้นพบโกดังแปลกๆ ที่เต็มไปด้วยชิ้นส่วนเรือแตก แม้ ว่า ส่วน ต่าง ๆ ใน ตัว มัน เอง จะ ไม่ มี ทาง รอด แต่ เรา อาจ นํา วัสดุ บาง ส่วน มา ใช้ ใหม่ ได้."
 ResourceDiscoveryAlloys3:0 "การ สํารวจ ที่ ขยาย เขต แดน นี้ ทํา ให้ มี การ ค้น พบ อ่าว โรงเก็บ น้ํา ที่ ซ่อน ลึก ใต้ ดิน. รอบๆห้อง เราพบเรือที่ผุพังหลายลํา ไม่มีสัญญาณของใครก็ตามที่เคยเป็นเจ้าของมัน แม้ว่าการบูรณะเรือที่ครั้งหนึ่งเคยยืนอยู่ในโรงเก็บยานจะเป็นเรื่องยาก แต่เราควรจะสามารถกู้ชิ้นส่วนสําหรับวัตถุประสงค์ของเราเอง"

 # Second Half - Rare Crystals
 ResourceDiscoveryRareCrystals1:0 "ดูเหมือนว่ามันเชื่อมต่อกับ การทําเหมืองแร่ ที่ผิดปกติและแปลก ชนิดของการเติบโตผลึก ด้วย การ ปรับ เปลี่ยน เล็ก น้อย บาง อย่าง เรา น่า จะ สามารถ ใช้ ประโยชน์ ได้ ด้วย ตัว เรา เอง."
 ResourceDiscoveryRareCrystals2:0 "นําไปสู่เกรกอโตที่เต็มไปด้วยสิ่งมีชีวิตผลึกที่ละเอียดอ่อน - บางทีการเรียงลําดับของฟาร์มใต้ดินหรือพื้นที่เพาะพันธุ์ ถูกทิ้งร้างนาน สัตว์ประหลาดก็เป็นอิสระ ที่จะท่องเที่ยวตามที่ต้องการ ขณะ ที่ พวก เขา ดู เป็น มิตร และ ต้อนรับ เรา ควร จะ สามารถ ฟื้นฟู ไร่ ได้ ถ้า เรา ต้องการ."
 ResourceDiscoveryRareCrystals3:0 "ต่อไปนี้ก็เผยให้เห็น ปล่องระเบิดที่เต็มไปด้วยหุ่นยนต์ ยังคงแฮ็คออกไปที่ คริสตัลโปรตุชันบนผนัง โดย ไม่ ท้อ ถอย เมื่อ เรา อยู่ ที่ นั่น พวก เขา ทํา งาน อย่าง ต่อ เนื่อง เพื่อ บรรจุ ลัง ขนาด ใหญ่. แม้ ว่า ผลึก เหล่า นี้ มี อยู่ มาก มาย และ ส่วน ใหญ่ ไม่ มี คุณค่า แต่ ก็ มี ผลึก บาง ชนิด ที่ หา ยาก ใน ผลึก เหล่า นี้."

 # Second Half - Volatile Motes
 ResourceDiscoveryVolatileMotes1:0 "ต่อไปนี้เรามาถึงถ้ําของสัตว์ครึ่งบกครึ่งบกครึ่งน้ําครึ่งน้ําที่สว่างจ้า, อนุภาคแปลกสั่นผ่านในอากาศรอบ ๆ มัน มันไม่ชัดเจนว่าทําไมอนุภาคเหล่านี้ จึงดึงดูดความสนใจให้กับสิ่งมีชีวิต แต่เราเชื่อว่า ด้วยงานเล็กๆ"
 ResourceDiscoveryVolatileMotes2:0 "ขณะ ที่ เรา ทํา การ สํารวจ ต่อ ไป เรา ได้ ค้น พบ อาคาร ที่ ทํา ด้วย คอม แพ กต์ ดิสก์ ซึ่ง อยู่ ข้าง ล่าง นี้ โดย มี ห้อง หลาย ห้อง และ เครื่องจักร ต่าง ๆ กัน ไว้ สําหรับ ใช้ ทํา ให้ เกิด การ เปลี่ยน แปลง อย่าง รวด เร็ว. แม้ ว่า จะ ปลอด ภัย ใน ตอน นี้ แต่ ใน ไม่ ช้า มัน ก็ จะ ถึง ขั้น ที่ ไม่ มั่นคง และ เรา ควร มุ่ง ความ พยายาม ของ เรา ใน การ ฟื้นฟู มัน ก่อน ที่ มัน จะ ล้ม เหลว."
 ResourceDiscoveryVolatileMotes3:0 "ห้อง ที่ นํา เรา ลง ไป ใต้ ดิน ต่อ ไป อีก ใน ที่ สุด เรา ก็ พบ กับ ซาก ปรัก หัก พัง ที่ เต็ม ไป ด้วย ของ เสีย ที่ เป็น พิษ และ ค่อย ๆ กิน ที่ พื้น ดิน. แม้ จะ เป็น อันตราย แต่ ดู เหมือน ว่า มัน เป็น ต้น เหตุ ของ ความ หุนหัน พลัน แล่น ที่ เรา ค้น พบ เมื่อ เร็ว ๆ นี้. เราควรสามารถใช้สิ่งเหล่านี้ได้ ตราบใดที่เราระมัดระวังในกระบวนการแทง"

 # Second Half - Exotic Gases
 ResourceDiscoveryExoticGases1:0 "เพราะ เหตุ ใด? เว็บนี้โบราณมาก จนดูเหมือนจะเป็นไปไม่ได้ ที่จะคาดเดาที่มาของมัน แต่เราเชื่อว่าเราสามารถเก็บเกี่ยว ก๊าซพิษเหล่านี้บางส่วน"
 ResourceDiscoveryExoticGases2:0 "ดูเหมือนว่ามันจะถูกแนบไปกับศูนย์วิจัยที่แออัด ตรงกลางที่เกิดขึ้นตามธรรมชาติของก๊าซพิษ[FromFromFrom.GetName]การ ซ่อมแซม สถาน ที่ บาง แห่ง น่า จะ ทํา ให้ เรา สามารถ เก็บ เกี่ยว สิ่ง เหล่า นี้ ได้ เอง."
 ResourceDiscoveryExoticGases3:0 "มันนําต่อไปใต้พื้นผิวที่เรามาข้ามเครื่องจักรของสัดส่วนที่เหลือเชื่ออาจจะเคยใช้ในการคงที่[FromFromFrom.GetName]แต่ตอนนี้เสียหายเกินจะซ่อมแซมได้ แม้ว่าไม่สามารถรักษาได้ สภาวะเสียหายของเครื่องจักรนี้ ได้นําไปสู่การสร้างก๊าซพิษหลายอย่าง"

 # Second Half - Zro
 ResourceDiscoveryZro1:0 "ขณะ ที่ เรา ติด ตาม ไป เรื่อย ๆ เรา พบ แหล่ง ของ ซโร ที่ ฝัง ลึก ใต้ ผิว น้ํา. เครื่อง มือ เก็บ เกี่ยว ที่ มี อยู่ มาก มาย เกลื่อน กลาด ทั่ว ชั้น ห้อง และ ด้วย ความ เฉลียว ฉลาด เล็ก ๆ น้อย ๆ เรา น่า จะ สามารถ ใช้ ได้ ด้วย ตัว เรา เอง."
 ResourceDiscoveryZro2:0 "มันเชื่อมต่อกับโรงกลั่น ที่ซ่อนอยู่ในส่วนลึกข้างล่าง ตัวโรงงานเอง ตั้งใจจะสํารวจ บริเวณที่เกิดผลกระทบ ถึง แม้ ว่าง เปล่า และ ส่วน ใหญ่ จะ ใช้ งาน ไม่ ได้ แต่ ใน ที่ สุด ก็ น่า จะ ใช้ มัน ซ้ํา อีก เพื่อ วัตถุ ประสงค์ ของ เรา เอง."

 # Second Half - Dark Matter
 ResourceDiscoveryDarkMatter1:0 "โดยกระบวนการที่ซับซ้อน ดูเหมือนว่ามันจะถูกผูกติดกับโดรนวิจัย การจับหลุมดําขนาดเล็ก ที่อยู่ใต้พื้นผิวดาวเคราะห์ โดรนได้จัดการอย่างใด เพื่อความเสถียรเอกฐาน แม้ว่าเราจะไม่สามารถจําลองความสามารถด้านเทคโนโลยีนี้ได้ เราก็น่าจะสามารถใช้โดรนได้ด้วยตัวเอง"

 # Second Half - Living Metal
 ResourceDiscoveryLivingMetal1:0 "เราได้ค้นพบว่ามันนําไปสู่ ห้องพักต่อไปใต้พื้นผิว ที่ นั่น เรา บังเอิญ ได้ เห็น การ ผสม ผสาน โลหะ ที่ มี ชีวิต เข้า ด้วย กัน และ สิ่ง ที่ เรา เชื่อ ก็ คือ สิ่ง มี ชีวิต ที่ เกิด ขึ้น เอง. ดูเหมือนว่าทั้งสองได้หลอมรวมเข้าด้วยกัน ค่อย ๆ ขยายผ่านเครือข่ายถ้ําใต้พื้นดิน ด้วยความพยายามบางอย่าง เราจะสามารถเริ่ม สับชิ้นส่วนโลหะออก สําหรับการใช้งานของเราเอง"
 ResourceDiscoveryLivingMetal2:0 "เราใช้เวลาไม่นานในการหาโลหะที่มีชีวิต อยู่ตรงกลางของเกรตโต ขณะ ที่ มัน หด ตัว และ มี ปฏิกิริยา ต่อ การ สัมผัส เรา เชื่อ ว่า มัน อาจ มี ชีวิต อยู่ มาก กว่า ที่ คน เรา อาจ คิด เสีย ก่อน. ถ้า เรา เก็บ เกี่ยว อย่าง ระมัดระวัง เรา ก็ น่า จะ สามารถ ใช้ ประโยชน์ จาก สัตว์ ได้ มาก ที่ สุด โดย ไม่ ฆ่า มัน."

