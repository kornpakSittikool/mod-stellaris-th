 ## Scripted Loc for Planetary Sensors
 # First Part
 SensorReadings1:0 "พวก เขา พบ ซาก ปรัก หัก พัง ของ เรือ ซึ่ง ชน กัน ที่ จุด หมาย ปลาย ทาง ยัง คง ส่ง สัญญาณ อ่อนแอ ออก ไป ทุก ขณะ."
 SensorReadings2:0 "พวก เขา พบ โรง งาน เหมือง เก่า ๆ แห่ง หนึ่ง ใน วง โคจร ซึ่ง ดู เหมือน ว่า ถูก เจ้าของ ทิ้ง ไว้ นาน มา แล้ว."
 SensorReadings3:0 "การล่าสัญญาณที่อ่อนแอ นําพวกเขาไปยังด่านที่ว่างเปล่าเล็ก ๆ กระนั้นยังมีสัญญาณว่าใครบางคนในระดับเทคโนโลยีที่คล้ายกัน"
 SensorReadings4:0 "ทุกตําแหน่งสัญญาณสัญญาณ เป็นชิ้นส่วนของเรือและอื่น ๆ ที่จะต้องมาจาก ฐานดาวขนาดใหญ่ ณ จุดใดจุดหนึ่ง -"

 # Second Part
 SensorReadingsSociety1:0 "ขณะ ที่ พวก เขา ค้น ผ่าน บริเวณ นั้น พวก เขา ได้ ค้น หา โพรง ที่ ดู เหมือน เป็น ที่ ว่าง เปล่า พร้อม กับ สิ่ง ที่ ดู เหมือน ซาก ของ สิ่ง มี ชีวิต ต่าง ดาว ที่ ไม่ รู้ จัก. พวกเขาจะเอาตัวอย่างกลับมา เพื่อทดสอบให้เร็วที่สุด"
 SensorReadingsSociety2:0 "หนึ่ง ใน บรรดา เครื่องจักร ที่ มี ส่วน ใน สัญญาณ ที่ เรา หยิบ ขึ้น มา นั้น ยัง คง เป็น ที่ นิยม กัน อยู่ และ ทีม งาน ของ เรา ก็ สามารถ ดึง เอา ข้อมูล บาง อย่าง เกี่ยว กับ อารยธรรม ที่ คาด ว่า จะ ได้ มา. พวกเขาเคยไม่รู้จักเรามาก่อน พวกเขาจะเข้าไปในฐานข้อมูลของเรา ถึงแม้ว่ามันจะดูเหมือนเก่ามาก"
 SensorReadingsSociety3:0 "แม้ ว่า ไม่ มี สัตว์ ที่ รู้ จัก กัน แต่ มัน ก็ เป็น แหล่ง ผสม พันธุ์ ของ สัตว์ กลุ่ม หนึ่ง ซึ่ง ดู เหมือน ว่า ได้ เรียน รู้ ที่ จะ ใช้ เครื่องจักร ที่ พัง บาง ชนิด เป็น ส่วน หนึ่ง ของ การ ติด ต่อ ฝาก รัก ของ มัน. ทีมของเราจะนําพวกมันกลับมา เพื่อถูกจับตามองต่อไป"
 SensorReadingsSociety3Gestalt:0 "ดู เหมือน ว่า สัตว์ ป่า ใน ท้อง ถิ่น ได้ เริ่ม ใช้ เครื่องจักร จาก ภาย ใน เป็น ส่วน หนึ่ง ของ การ ติด ต่อ ฝาก รัก. แม้ว่าปกติแล้วเราไม่ค่อยสนใจเท่าไหร่[root.GetIndividualNamePlural]จะนําบางส่วนของสิ่งมีชีวิต ที่อยากรู้อยากเห็นเหล่านี้กลับมา เพื่อถูกเฝ้าดูต่อไป"
 SensorReadingsSociety4:0 "ขณะ ที่ พวก เขา ตระเวน ไป ทั่ว บริเวณ นั้น พวก เขา ได้ มา เยือน ห้อง สมุด เล็ก ๆ พร้อม กับ หนังสือ ที่ พวก เขา คิด ว่า มี ราย ละเอียด ทาง ชีววิทยา ของ โฟนา ท้อง ถิ่น ต่าง ๆ จาก ดาว เคราะห์ ต่าง ๆ ที่ ชาว บ้าน ดั้งเดิม ได้ มา เยือน. ทีมของเราจะนําพวกเขากลับมา และเริ่มถอดรหัสภาษาที่ใช้ในหนังสือ และเพิ่มข้อมูลอะไรก็ตามที่พวกเขา สามารถเก็บมาจากพวกเขา"
 SensorReadingsSociety4Gestalt:0 "หลัง จาก ค้น หา ที่ ตั้ง แล้ว เรา ก็ พบ ห้อง สมุด เล็ก ๆ แห่ง หนึ่ง. หนังสือที่อยู่ภายในรายละเอียดชีววิทยา ของพันของแฟนเก่าตัวอย่างจากแต่ละดาวเคราะห์ นี่จะนํากลับมาปรับปรุงฐานข้อมูลของเรา"

 SensorReadingsPhysics1:0 "แม้ จะ ไม่ มี การ ใช้ ประโยชน์ มาก นัก แต่ ทีม งาน ของ เรา ก็ หา เอกสาร ค้นคว้า เกี่ยว กับ กิจกรรม ทาง ธรณี วิทยา จาก ดาว เคราะห์ ต่าง ๆ หรือ อย่าง น้อย ที่ สุด พวก เขา ก็ คิด โดย อาศัย ภาพ ประกอบ. พวกเขาจะนําทุกสิ่งที่พวกเขาคิดว่า สามารถอยู่รอดในการเดินทางกลับ ที่จะถอดรหัสเร็วที่สุดเท่าที่เป็นไปได้"
 SensorReadingsPhysics1Gestalt:0 "แม้ ว่า วัสดุ ที่ มี ประโยชน์ น้อย มาก ถูก ทิ้ง ไว้ เบื้อง หลัง แต่ หุ่น ยนต์ ของ เรา ก็ ได้ ค้น พบ เอกสาร วิจัย บาง ฉบับ เกี่ยว กับ กิจกรรม ทาง ธรณี วิทยา จาก ดาว เคราะห์ ต่าง ๆ. ทุกสิ่งที่รอดจากการเดินทางจะกลับมา และถอดรหัสได้โดยเร็วที่สุด"
 SensorReadingsPhysics2:0 "ทีมของเราใช้เวลาอย่างมาก ในการพยายามเจาะระบบป้องกัน ของเครื่องจักรที่ยังคงใช้งานอยู่ แต่ เครื่องจักร เหล่า นั้น เอง ก็ ได้ รับ ความ สนใจ และ นํา บาง ส่วน กลับ มา."
 SensorReadingsPhysics2Gestalt:0 "หลัง จาก ใช้ เวลา มาก พอ ที่ จะ เปิด ช่อง ป้องกัน ของ เครื่องจักร ที่ รับ สัญญาณ เรา จึง เชื่อ ว่า มัน อาจ มี ความ ลับ ที่ ยัง ไม่ ถูก เปิด เผย. ชิ้นส่วนที่เรากู้กลับมาได้ จะถูกนํากลับมาทันที"
 SensorReadingsPhysics3:0 "พวกเขาพบเครื่องจักรขนาดเล็ก ที่ดูเหมือนจะมีส่วนรับผิดชอบ สําหรับอุปสรรคที่อ่อนแอรอบ ๆ บริเวณนั้น อาจจะเป็นเหตุผลเดียว ที่มีอะไรให้ค้นหา เมื่อ ไม่ มี อะไร อื่น ที่ มี คุณค่า พวก เขา ใช้ เวลา เก็บ มัน ไว้ ต่าง หาก เพื่อ ดู ว่า จะ เรียน อะไร ได้ จาก มัน."
 SensorReadingsPhysics4:0 "ดูเหมือนว่าเตาปฏิกรณ์ฟิวชั่นกําลังรักษา ส่วนที่เหลือของสถานที่ยังคงทํางาน แม้ว่าจะขาดการดูแลหรือบํารุงรักษา ทีมของเราให้ความสนใจเป็นพิเศษ และจะตรวจสอบต่อไป"
 SensorReadingsPhysics4Gestalt:0 "เตาปฏิกรณ์ฟิวชั่นเก่าได้รักษาสิ่งที่เหลืออยู่ของสถานที่ที่ยังคงทํางานทั้งๆที่ขาดการบํารุงรักษาที่จําเป็น หุ่นยนต์วิศวกรรมของเราจะตรวจสอบต่อไป เพื่อดูว่ามีอะไรที่เราสามารถเรียนรู้จากมัน"

 SensorReadingsEngineering1:0 "ตอน ที่ พวก เขา ตรวจ ค้น ซาก ปรัก หัก พัง ของ สถาน ที่ นั้น ผู้ เชี่ยวชาญ ของ เรา ได้ ค้น พบ ชิ้น ส่วน ของ เรือ ที่ ส่วน ใหญ่ ยัง ไม่ สมบูรณ์. ถึง แม้ จะ ใช้ งาน ไม่ ได้ อีก ต่อ ไป เนื่อง จาก ความ เสื่อม โทรม ตาม กาล เวลา แต่ วิศวกร ของ เรา เชื่อ ว่า พวก เขา สามารถ ซึมซับ ข้อมูล บาง อย่าง จาก พวก เขา ได้."
 SensorReadingsEngineering1Gestalt:0 "ในขณะที่เราตรวจสอบซากปรักหักพังของเรา[root.GetIndividualNamePlural]มาในชิ้นส่วนเรือหลาย ถึง แม้ ไม่ สามารถ ทํา งาน ได้ อีก ต่อ ไป เนื่อง จาก ความ เสื่อม โทรม ของ เวลา เรา เชื่อ ว่า เรา สามารถ ซึมซับ ข้อมูล บาง อย่าง จาก ชิ้น ส่วน ได้."
 SensorReadingsEngineering2:0 "แม้ ว่า จะ เป็น ที่ ร้าง เปล่า อยู่ บ้าง แต่ ผู้ เชี่ยวชาญ ของ เรา ได้ พบ การ ใช้ วัสดุ ก่อ สร้าง ที่ พวก เขา ไม่ เคย เห็น มา ก่อน. เมื่อพวกเขาเสร็จสิ้นการขุดค้นและวิเคราะห์พื้นที่แล้ว จะนําตัวอย่างกลับมาทดสอบเพิ่มเติม"
 SensorReadingsEngineering2Gestalt:0 "ของเรา[root.GetIndividualNamePlural]ได้มาถึงวัสดุอาคาร ที่ไม่เหมือนที่เราเคยเห็นมาก่อน แม้ ไม่ น่า จะ เป็น ไป ได้ ที่ เรา จะ ได้ รับ ประโยชน์ แต่ ก็ จะ ถูก นํา กลับ มา วิเคราะห์ อีก."
 SensorReadingsEngineering3:0 "แม้ จะ ไม่ มี การ ค้น พบ สิ่ง มี ชีวิต ที่ มี เชาวน์ ปัญญา นัก ขุด ค้น ของ เรา พบ โดรน หลาย ตัว เมื่อ พวก เขา ขุด ลึก ลง ไป อีก. แม้ว่าพวกมันจะได้รับความเสียหาย นอกเหนือไปจากจุดที่สามารถ สร้างย้อนกลับได้ ในความสมบูรณ์ของมัน"
 SensorReadingsEngineering3Gestalt:0 "การขุดเจาะของเรา[root.GetIndividualNamePlural]มาเมื่อสัญญาณที่คล้ายกับที่อยู่ภายใต้ จิตสํานึกร่วมกันของเราเองและหลังจากที่ขุดบิตลึก แม้เสียหายเกินจะซ่อมแซม เราเชื่อว่าเราสามารถย้อนกลับเครื่องยนต์ บางส่วนของชิ้นส่วนของพวกเขา"
 SensorReadingsEngineering4:0 "ขณะ ที่ พวก เขา ขุด ค้น ซาก ปรัก หัก พัง ที่ พวก เขา พบ ซาก ปรัก หัก พัง ของ อุโมงค์ เล็ก ๆ ซึ่ง ครั้ง หนึ่ง เคย มี วัสดุ ซึ่ง ตอน นี้ ว่าง เปล่า และ ดู เหมือน ว่า ขโมย มา นาน แล้ว. พวกเขาทิ้งพิมพ์เขียวบางอย่างไว้ ว่าชาวบ้านดั้งเดิมได้ทําการทําเหมืองวัสดุเหล่านี้ได้อย่างไร อย่างไรก็ตาม ซึ่งอาจจะมีประโยชน์"

 SensorReadingsRare1:0 "ทั้ง ๆ ที่ ได้ รับ ความ เสีย หาย จาก สถาน ที่ ส่วน ใหญ่ แล้ว ทีม งาน ของ เรา ก็ ยัง หา เครื่อง ที่ ไม่ ได้ รับ ความ เสีย หาย เลย ตาม เวลา, สัตว์ ป่า, หรือ พวก โจร สลัด. พวกเขาเชื่อว่ามันอาจจะเก็บ ความลับของการค้นพบทางวิทยาศาสตร์ ทันทีที่พวกเขาสามารถถอดรหัสพวกเขา"
 SensorReadingsRare1Gestalt:0 "แม้ว่าสถานที่ส่วนใหญ่จะล้มเหลว[root.GetIndividualNamePlural]การ ค้น พบ เครื่องจักร กล เราหวังว่ามันจะเผยความลับ ที่ลืมไปนาน เมื่อเราถอดรหัสได้"
 SensorReadingsRare2:0 "ขณะ ที่ พวก เขา กําลัง จะ ออก จาก บริเวณ นั้น ทีม ของ เรา ก็ ได้ เห็น ตู้ พิมพ์เขียว และ เอกสาร วิจัย. พวกเขาไม่เพียงแต่เข้าใจง่าย ๆ เท่านั้น แต่ผู้เชี่ยวชาญของเราเชื่อว่า พวกเขาบางคน อาจจะฉายแสงในงานวิจัยบางอย่าง"
 SensorReadingsRare2Gestalt:0 "เมื่อเรามองผ่านพื้นที่ ครั้งสุดท้ายหนึ่งของเรา[root.GetIndividualNamePlural]พบกับคณะออกแบบและงานวิจัย ไม่เพียง แต่จะง่ายต่อการถอดรหัส แต่เราเชื่อว่า พวกเขาอาจจะแสงในบางงานวิจัย"

