 # Specialist Leader Traits
 leader_trait_scholarium_investigator:0 "บริวาร-วิจัยวิชาการ (นักสืบสวน)"
 leader_trait_scholarium_investigator_desc:1 "ผู้ เชี่ยวชาญ ด้าน การ ศึกษา มอง เอกภพ ว่า เป็น ปริศนา อัน ใหญ่ โต อัน รอ การ แก้."
 leader_trait_scholarium_explorer:0 "บริวาร-วิจัยวิชาการ (นักสำรวจ)"
 leader_trait_scholarium_explorer_desc:0 "ความอยากรู้อยากเห็นของผู้เชี่ยวชาญทางวิชาการ จะผลักดันพวกเขาไปยังจุดสิ้นสุดของจักรวาล และอาจจะเกิน"
 leader_trait_scholarium_observer:0 "บริวาร-วิจัยวิชาการ (นักสังเกตการณ์)"
 leader_trait_scholarium_observer_desc:0 "จะไม่มีความลึกลับใดเหลือ ในการตื่นของนักวิชาการ"
 leader_trait_bulwark_watcher:0 "บริวาร-ฐานที่มั่นอวกาศ (ยามรักษาการณ์)"
 leader_trait_bulwark_watcher_desc:0 "พวก ลูก เรือ พร้อม จะ ตรวจ จับ กอง เรือ ของ ศัตรู จึง กล้า เข้า โจมตี และ โจมตี อย่าง ก้าวร้าว."
 leader_trait_bulwark_retaliator:1 "บริวาร-ฐานที่มั่นอวกาศ (นักโจมตีตอบโต้)"
 leader_trait_bulwark_retaliator_desc:0 "เนื่อง จาก มี ผู้ บัญชา การ ที่ ชอบ ธรรม อยู่ ใน การ บังคับ บัญชา กอง เรือ จึง พร้อม จะ แก้ แค้น การ ดู หมิ่น พระ บรม เดชานุภาพ ของ เรา."
 leader_trait_bulwark_sentinel:0 "บริวาร-ฐานที่มั่นอวกาศ (เซ็นติเนล)"
 leader_trait_bulwark_sentinel_desc:0 "ลูกเรือผู้กล้าหาญยืนหยัดต่อสู้กับพวกรุกราน พร้อมที่จะขับไล่ใครก็ตามที่โง่พอที่จะรุกรานดินแดนของเรา"
 leader_trait_prospectorium_extractor:0 "บริวาร-เหมืองแร่ (นักสกัดแร่)"
 leader_trait_prospectorium_extractor_desc:0 "พลังงาน อัลลอย และแร่ธาตุ ล้วนให้พลังแก่ความทะเยอทะยานของเรา ตัวแยกขยายการเข้าครอบครองมากที่สุด"
 leader_trait_prospectorium_optimizer:0 "บริวาร-เหมืองแร่ (นักเพิ่มประสิทธิภาพ)"
 leader_trait_prospectorium_optimizer_desc:0 "การ รักษา ประชาชน ให้ มี สุขภาพ ดี และ เกิด ผล จําเป็น ต้อง มี ทรัพยากร และ การ ปรับ ปรุง ที่ ดี ที่ สุด เหมาะ กับ การ ดู แล พวก เขา."
 leader_trait_prospectorium_refiner:0 "บริวาร-เหมืองแร่ (นักกลั่นแร่)"
 leader_trait_prospectorium_refiner_desc:0 "นัก วิจัย มี ความ เชี่ยวชาญ ที่ หา ยาก ซึ่ง จําเป็น ต้อง มี เพื่อ ปรับ ปรุง การ ได้ มา ของ เรา เกี่ยว กับ ก๊าซ ต่าง ๆ, มณี, และ ผลึก ต่าง ๆ."

