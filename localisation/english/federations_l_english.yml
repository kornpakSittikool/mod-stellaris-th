 # Deposits
 ####################################
 d_impossiblecorrie:0 "โลตัส คอร์รี"
 d_impossiblecorrie_desc:0 "ลักษณะ ทาง ธรณี วิทยา อัน น่า ทึ่ง ได้ ปรากฏ ขึ้น. ผลึก ที่ แปลก และ สะท้อน แสง จะ เรียง ราย อยู่ บน ผนัง โค้ง."
 d_bluelotus:0 "เลเยอร์ถัดไป"
 d_bluelotus_desc:0 "สถานที่ทดลองอันสูงส่งนี้ พยายามจะแปลงความซับซ้อนประจําวัน ให้เป็นอัลลอยที่มีประโยชน์"
 d_bluelotus2:0 "รูปลักษณ์ของโลตัสสีน้ําเงิน"
 d_bluelotus2_desc:0 "โรงงานอุตสาหกรรมขนาดที่แปลงสภาพ เป็นอัลลอยที่มีประโยชน์"
 d_ruin_bluelotus:0 "ซาก ปรัก หัก พัง ของ โลตัส สี น้ําเงิน"
 d_ruin_bluelotus_desc:0 "ที่ถูกทําลายของสิ่งก่อสร้างที่ครั้งหนึ่ง การทดลองทดลองสถานที่ สําหรับการถ่ายเทหิน และสิ่งอื่น ๆ เป็นอัลลอย ตอนนี้ไม่มีอะไรเหลือแล้ว เก็บรอยตะเข็บเล็กๆนี่ไว้"
 d_crater_bluelotus:0 "ตัวเรียงรหัสโลตัสสีน้ําเงิน"
 d_crater_bluelotus_desc:0 "นั่งของอุบัติเหตุ, หลบหนีการไหลของหินและอื่น ๆ เป็นเดียวอัลลอยที่มีค่า"

