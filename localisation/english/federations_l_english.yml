 building_corporate_embassy_desc:0 "การใช้แรงงานเป็นการโฆษณา ต่อรัฐบาลแทนลูกค้า สํานักงาน นี้ วิเคราะห์ ศุลกากร และ แนว โน้ม ใน ท้อง ถิ่น เพื่อ ทํา ให้ เป้า หมาย ของ เรา มี ประสิทธิภาพ มาก ขึ้น."
 building_disinformation_center:0 "ศูนย์ข้อมูลบิดเบือน"
 building_disinformation_center_desc:0 "เรา สามารถ ควบคุม ความ คิด เห็น และ ทํา ให้ ผู้ คน เห็น ด้วย กับ ความ จริง ใน รูป แบบ ของ เรา."

