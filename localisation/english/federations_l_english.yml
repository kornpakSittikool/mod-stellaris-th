 resolution_mutualdefense_the_readied_shield:0 "เตรียมพร้อมการป้องกัน"
 resolution_mutualdefense_the_readied_shield_desc:1 "จักรวาลเป็นสถานที่อันตราย และสมาชิกทั้งหมด[global_event_country.GetGalCommunityOrGalImperium]ควร จะ พร้อม จะ ปก ป้อง โลก ของ ตน ไม่ ว่า จะ ต่อ ต้าน พวก โจรสลัด, สัตว์ อวกาศ, หรือ สิ่ง ที่ ไม่ รู้ จัก."

 resolution_mutualdefense_military_readiness_act:0 "กฎหมายความพร้อมทางทหาร"
