 #Relic Rails
 peeyeps_legacy:0 "มรดกของ pyeps"
 peeyeps_legacy_desc:0 "การค้นพบของทางรถไฟโบราณอันกว้างใหญ่ ได้จุดประกายจินตนาการของนักวิจัย"

 #Kept Grounds
 pm_wenkwort_gardens:0 "สวน เว็ง วอร์ต"
 pm_wenkwort_gardens_desc:0 "ภาพพจน์ ของ โลก นี้ แสดง ให้ เห็น ว่า ได้ รับ การ ออก แบบ ให้ เหมาะ กับ ความ รัก ใคร่."
 pm_wenkwort_zen:0 "โลกเซน"
 pm_wenkwort_zen_desc:0 "ระลอกคลื่นเสียงที่ปรากฏในรีโอลีธที่นี่ ไม่ ว่า พวก เขา มา จาก แหล่ง ไหน พวก เขา แสดง ให้ เห็น ถึง อิทธิพล ที่ ทํา ให้ สงบ."
 pm_wenkwort_custodian:0 "ไวค์วอร์ต คัสโตเดียน"
