 ### Origin - Galactic Doorstep text
 origin_galactic_doorstep:0 "ประตูกาแล็กติก"
 origin_galactic_doorstep_desc:1 "อารยธรรมนี้มีความสงบ§Hเกตเวย์§!ใน ระบบ ที่ อาจ เป็น ประโยชน์ ทาง เทคโนโลยี ของ พวก เขา หรือ เป็น ภัย คุกคาม โดย ทั่ว ไป?"
 origin_tooltip_galactic_doorstep_effects:3 "- $HOME_SYSTEM$ ['concept_gateway']"

 START_SCREEN_GALACTIC_DOORSTEP:0 "การสร้างลึกลับในระบบสุริยจักรวาลของเรา ถูกค้นพบเมื่อไม่กี่ร้อยปีก่อน เนื่องจากความดํามืด คุณสมบัติของโลหะ สิ่งประดิษฐ์นี้มีชื่อว่า \"มงกุฎดํา\" และการปรากฏตัวอันน่าเกรงขาม\n\nการบินอวกาศกลายเป็น สิ่งที่สําคัญที่สุดของชุมชนวิทยาศาสตร์ของเรา และการแสวงหาเทคโนโลยีนี้อย่างกระตือรือร้น\n\nแต่เราได้บทเรียนที่สําคัญ มันไม่ใช่จุดหมายสําคัญ มันคือการเดินทาง และตอนนี้ ต้องขอบคุณการชนกันของ แบล็ค คราวน์ - สายพันธุ์ของเรา มีวิธีการที่เราสามารถเยี่ยมชมดาว"
 START_SCREEN_GALACTIC_DOORSTEP_MACH:0 "การสร้างลึกลับในระบบสุริยจักรวาลของเรา ถูกค้นพบเมื่อไม่กี่ร้อยปีก่อน เนื่อง จาก ดิน แดน อัน มืด มิด วัตถุ นี้ จึง ได้ รับ การ ระบุ ว่า เป็น สิ่ง มี ชีวิต ชั้น ดํา และ การ ประทับ ที่ โดด เด่น นี้ จึง มี ผล กระทบ อย่าง ลึก ซึ้ง ต่อ การ ดําเนิน งาน ของ เรา ซึ่ง มี การ รวบ รวม ข้อมูล มาก ขึ้น จึง กลาย เป็น สิ่ง จําเป็น.\n\nการบินอวกาศกลายเป็น สิ่งที่สําคัญที่สุดของการวิจัยและการพัฒนาของเรา และกระบวนการเข้าถึงเทคโนโลยีของเอเลี่ยนนี้\n\nแต่การปรับปรุงและอัพเกรดเพื่อเข้าถึงมัน ได้เพิ่มผลทั่วไปของเรา"
 START_SCREEN_GALACTIC_DOORSTEP_HIVE:0 "การสร้างลึกลับในระบบสุริยจักรวาลของเรา ถูกค้นพบเมื่อไม่กี่ร้อยปีก่อน เนื่อง จาก ดิน แดน อัน มืด มัว วัตถุ เหล่า นี้ จึง ถูก ตั้ง ชื่อ ว่า มหา กษัตริย์ ดํา และ การ ประทับ อัน สง่า งาม ของ มัน มี ผล กระทบ อย่าง ลึก ซึ้ง ต่อ การ ค้น หา ลักษณะ แท้ ของ มัน จึง กลาย เป็น สิ่ง สําคัญ อันดับ แรก.\n\nการ บิน อวกาศ กลาย เป็น สิ่ง สําคัญ ที่ สุด และ การ แสวง หา เทคโนโลยี นี้ อย่าง กระตือรือร้น ได้ นํา มา ซึ่ง การ ค้น พบ ที่ เป็น ประโยชน์ อื่น ๆ อีก หลาย อย่าง ซึ่ง ปรับ ปรุง และ เสริม กําลัง เรา.\n\nเจ้าฟ้าดํากลายเป็นที่สงบ แต่ไม่ได้เดินทางโดยเปล่าประโยชน์ ตอนนี้เรามีวิธีการเติบโตที่มีขนาดใหญ่ขึ้น ไปถึงไกลมากขึ้นกว่าที่เคย"

 origin.1000.name:0 "ใครบางคนที่ประตู"
 origin.1000.desc:0 "โดยไม่ต้องเตือนเพียงเล็กน้อย ประตูมนุษย์ต่างดาวลึกลับในระบบของเรามามีชีวิตอยู่! การ สั่น สะเทือน ของ พลัง งาน เกิด จาก วัตถุ โบราณ และ ชั่ว ขณะ หนึ่ง ที่ มี แสง วับ วาบ อยู่ เต็ม ศูนย์กลาง ของ โครง สร้าง. ชน ที่ เหลือ แห่ง อารยธรรม เดิม นี้ อาจ ไม่ ได้ อยู่ นิ่ง เฉย ดัง ที่ เคย เชื่อ กัน มา ก่อน.\n\nแม้ ว่า ประตู นั้น เปิด อยู่ ไม่ เกิน สอง สาม วินาที แต่ ก็ เพียง พอ ที่ จะ ผ่าน ซาก ปรัก หัก พัง บาง อย่าง ของ อวกาศ; หิน และ ฝุ่น ซึ่ง เมื่อ การ ตรวจ สอบ ใกล้ ๆ ปรากฏ ว่า เป็น ทรัพยากร ที่ มี ค่า."
 origin.1005.name:0 "ผู้ ไม่ ได้ รับ เชิญ"
 origin.1005.desc:0 "อีกครั้งที่ประตูหลับใหลได้กลับมามีชีวิต! คราว นี้ ไม่ ใช่ สิ่ง ดี ที่ สุด แต่ เป็น ข้อ ห้าม ที่ มา ถึง เรา จาก สิ่ง ที่ ไม่ รู้ จัก อย่าง ยิ่ง.\n\nหนึ่งเดียว, สิ่งมีชีวิตอวกาศที่อยู่โผล่ออกมาจากประตูสว่างและดูเหมือนจะอยู่บนการล่า เมื่อ เรา ไม่ ได้ รับ คํา เตือน หรือ คํา เตือน อย่าง เด็ด ขาด เรา ควร ขจัด คํา คุกคาม นี้ ทันที!"
 origin.1010.name:0 "คายออกมา"
 origin.1010.desc:0 "อีกครั้งที่ประตูมิติถูกเปิด คราว นี้ การ อภิปราย มี อยู่ เพียง เศษ เสี้ยว ของ วินาที แต่ ก็ พอ ที่ จะ ทํา ให้ มี อะไร บาง อย่าง ข้าม ไป ได้.\n\nวัตถุโลหะที่ไม่รู้จัก ของความเร็วพิเศษ ยิงออกจากประตูมิติ และตัดผ่านระบบ ก่อนที่เซ็นเซอร์ใด ๆ ที่จะได้รับการอ่านที่เหมาะสม วัตถุได้ชนกับดาวเคราะห์ในระบบของเรา\n\nเราควรจะตรวจสอบจุดของผลกระทบ เร็วที่สุดเท่าที่เป็นไปได้"
 origin.1012.name:0 "เลเยอร์ถัดไป"
 origin.1012.desc:0 "การหาจุดที่ตก ของการสอบสวนลึกลับนั้น ซับซ้อนมากกว่าการคาดการณ์\n\nการอ่านระบุว่ามันไม่ได้ชน ในความหมายปกติ อย่างไรก็ตามความเร็วที่มากของวัตถุที่ใกล้พื้นผิว\n\nแล้วเกิดอะไรขึ้นกันแน่ ถึงเวลาดูใกล้ๆแล้ว"
 origin.1015.name:0 "เกม ที่ รอ อยู่"
 origin.1015.desc:0 "ใน ที่ สุด ก็ มี การ ก่อ สร้าง ขึ้น. สายฟ้ายิงออกมาจากอุปกรณ์ขนาดใหญ่ และเลียประตูหลับ ทําให้พลังงานขึ้น\n\nทันใดนั้น ประตูมิติก็เกิด การแยกคลื่นพลังงาน และไฟออบก็เต็มประตู ยาน วิทยาศาสตร์ ที่ เตรียม ไว้ จะ เร่ง ความ เร็ว ขึ้น ไป ใน พื้น ที่ ที่ มี แสง เจิด จ้า และ หาย ไป ทันที. สักครู่หลังจากนั้นประตูทันทีพลังงานลงและกลับไปยังรัฐของความยิ่งใหญ่เงียบ\n\nตอนนี้เรารอ"
 origin.1020.name:0 "กลับไปยังผู้ส่ง"
 origin.1020.desc:1 "ถ้าไม่ได้เตือนประตูในระบบของเรา กระพริบเข้าสู่ชีวิตเพียงช่วงเวลาสั้น ๆ - เพียงนานพอสําหรับบางสิ่งบางอย่างที่จะปรากฏขึ้น\n\nวัตถุ โลหะ ไม่ มี การ ตอบ รับ ลูกเห็บ หรือ ส่ง สัญญาณ ใด ๆ. มันเป็นธรรมชาติที่แท้จริง ที่ไม่มีใครรู้จักจนกระทั่ง ช่วงเวลาที่เราจัดการ มันเป็นเรือวิทยาศาสตร์ที่เรายิงเข้าประตูเมื่อหลายเดือนก่อน แต่ มัน มี อายุ ยืน กว่า นั้น มาก. สแกนเนอร์บอกว่ายานมีอายุมากกว่าพันปี\n\nใน บรรดา ลูก เรือ ยัง มี แต่ ฝุ่น เหลือ อยู่ แต่ ข้อมูล บาง อย่าง ที่ ยัง คง อยู่ สามารถ กู้ คืน มา ได้. ข้อมูล นั้น มี คํา พรรณนา ที่ น่า ทึ่ง บาง อย่าง เกี่ยว กับ§Yเทคโนโลยีประตู§!รวมทั้งข้อความเสียงที่ ลูกเรือทิ้งไว้\n\n'§H...อนาคต คนของฉันจะรู้ความทรมานอย่างแท้จริง ในวันที่น่าสะพรึงกลัว วันที่ท้องฟ้าโปรยแสงสีฟ้า§!'"
 origin.1020.desc.machine:0 "ถ้าไม่ได้เตือนประตูในระบบของเรา กระพริบเข้าสู่ชีวิตเพียงช่วงเวลาสั้น ๆ - เพียงนานพอสําหรับบางสิ่งบางอย่างที่จะปรากฏขึ้น\n\nวัตถุ โลหะ ไม่ มี การ ตอบ รับ ลูกเห็บ หรือ ส่ง สัญญาณ ใด ๆ. มันเป็นธรรมชาติที่แท้จริง ที่ไม่มีใครรู้จักจนกระทั่ง ช่วงเวลาที่เราจัดการ มันเป็นเรือวิทยาศาสตร์ที่เรายิงเข้าประตูเมื่อหลายเดือนก่อน แต่ มัน มี อายุ ยืน กว่า นั้น มาก. สแกนเนอร์บอกว่ายานมีอายุมากกว่าพันปี\n\nไม่มีหน่วยเครื่องจักรของเราบนยาน ใช้งานได้อีกต่อไป ใช้เวลานานตั้งแต่ ยอมแพ้ต่อความผิดปกติ ข้อมูล นั้น มี คํา พรรณนา ที่ น่า ทึ่ง บาง อย่าง เกี่ยว กับ§Yเทคโนโลยีประตู§!รวมทั้งข้อความเสียงที่ทิ้งไว้ โดยโดรนวิจัยที่ดูแลการท่องเที่ยว\n\n'§H...อนาคต เดอะ[Root.GetName]จะรู้อย่างแท้จริงถึงความทุกข์ทรมานในวันที่น่าสะพรึงกลัวนั้น วันที่ท้องฟ้าโปรยแสงสีฟ้า§!'"
 origin.1025.name:0 "ประตู ชัย"
 origin.1025.desc:0 "ประตูกลับกลับมามีชีวิตอีกครั้ง โดยไม่ต้องเตือนหรือลังเล สิ่งมีชีวิตในอวกาศพ่นออกมาจากประตูมิติ สิ่งมีชีวิตชนิดเดียวกันนี้ เป็นตัวโจมตีเดี่ยว เมื่อนานมาแล้ว\n\nครั้งนี้มีพวกมันมากกว่า มากกว่านั้น ไม่มีที่สําหรับเหตุผลที่นี่ ไม่มีเวลาสําหรับความสงสัย ไม่ว่าจะเป็นพวกเขาหรือเรา แขน!"
 origin.1030.name:0 "ควบคุม PEST"
 origin.1030.desc:0 "กองเรือของเราขัดขวางการจู่โจมของสัตว์ ที่มาจากประตู บน[Root.Owner.Capital.GetName]ประชากร ของ เรา กลั้น หายใจ ขณะ ที่ การ ต่อ สู้ ใน อวกาศ โหม กระหน่ํา เหนือ ศีรษะ.\n\nแม้ว่าหัวใจจะหนักด้วยการสูญเสีย มันยังคงมีประกายของความหวัง ซากศพของสิ่งมีชีวิตประตู ลดลงสู่พื้นผิวของดาวเคราะห์ ทิ้งร่องรอยยาว ของเส้นสีฟ้าเส้น\n\nและพวกเขาเหล่านั้น (กุฟฟารมักกะฮฺ) เคยกล่าวไว้ว่า[Root.Owner.Capital.GetName]ในวันนี้เมื่อฝนตก"
 origin.1030.desc.gestalt:0 "กองยานของเราได้ขัดขวางการจู่โจมของสัตว์ ที่มาจากประตู ช่วยชีวิตหุ่นยนต์ของเราจํานวนมาก[Root.Owner.Capital.GetName].\n\nแม้เราจะแพ้ในสนามรบ[Root.GetName]บัด นี้ สามารถ มอง ไป ยัง อนาคต ด้วย แสง แห่ง ความ หวัง. ซากศพของสิ่งมีชีวิตประตู ลดลงสู่พื้นผิวของดาวเคราะห์ ทิ้งร่องรอยยาว ของเส้นสีฟ้าเส้น\n\nและความทุกข์ทรมานที่พวกเขารู้ว่าโดรนบน[Root.Owner.Capital.GetName]ในวันนี้เมื่อฝนตก"
 origin.1030.a:0 "ชัยชนะอันขมขื่น"
 origin.1035.name:0 "กระท่อมไร้อุปสรรค"
 origin.1035.desc:0 "หาก ไม่ มี การ เตือน ล่วง หน้า ว่า ประตู จะ เปิด อีก คราว นี้ จะ ปล่อย สัตว์ ต่าง ๆ ใน อวกาศ ที่ เป็น ศัตรู และ แปลก ประหลาด ออก มา.\n\nภายในไม่กี่นาทีนี้ภัยคุกคามลึกลับได้เข้าตําแหน่งในวงโคจรรอบ[Root.Owner.Capital.GetName]และเริ่มระเบิดพื้นผิว ด้วยคานพลังงานสีฟ้า\n\nเราจําเป็นต้องเส้นทางกองกําลังของเราและหยุดภัยคุกคามนี้ทันทีก่อนที่[Root.Owner.Capital.GetName]กลาย เป็น ซาก ปรัก หัก พัง ที่ เป็น ควัน และ ชาว เมือง กลาย เป็น เถ้า ถ่าน. ทั้งหมดที่พวกเขาสามารถทําได้ตอนนี้คือการหาที่พักและรอในขณะที่โลกรอบ ๆ พวกเขา"
 origin.1035.desc.gestalt:0 "หาก ไม่ มี การ เตือน ล่วง หน้า ว่า ประตู จะ เปิด อีก คราว นี้ จะ ปล่อย สัตว์ ต่าง ๆ ใน อวกาศ ที่ เป็น ศัตรู และ แปลก ประหลาด ออก มา.\n\nภายในไม่กี่นาทีนี้ภัยคุกคามลึกลับได้เข้าตําแหน่งในวงโคจรรอบ[Root.Owner.Capital.GetName]และเริ่มระเบิดพื้นผิว ด้วยคานพลังงานสีฟ้า\n\nเราจําเป็นต้องเส้นทางกองกําลังของเราและหยุดภัยคุกคามนี้ทันทีก่อนที่[Root.Owner.Capital.GetName]กลายเป็นซากที่พ่นควันออกมา และโดรนของเราบนผิวดิน กลายเป็นเถ้าถ่าน ทั้งหมดที่เราทําได้ตอนนี้ คือให้พวกเขาหาที่พัก และรอขณะที่โลกรอบตัว กําลังถูกทําลาย"
 origin.1040.name:0 "ชื่อ=ไดเรกทอรีชื่อ"
 origin.1040.desc:0 "การสั่นสะเทือนของพลังงานอีก ได้ปะทุออกมาจากประตู ในระบบของเรา ไม่ เหมือน คลื่น พลัง งาน ที่ เคย ใช้ มา ก่อน คลื่น นี้ ก่อ ความ เสีย หาย อย่าง หนัก.\n\nขณะที่สนามแม่เหล็กแผ่ไปทั่ว[Root.Owner.Capital.GetName]มันใช้พลังงานที่มากเกินไปทั่วโลก ทําลายระบบไฟฟ้าทุกระบบ บางส่วนเกินจะซ่อมแซม\n\nเพราะ เหตุ ใด? เมือง ใหญ่ ๆ ส่วน ใหญ่ ใน ปัจจุบัน มืด สนิท ประชากร ของ เมือง นี้ ติด อยู่ กับ ฝน สี ฟ้า ขณะ ที่ พลัง งาน ที่ กําลัง จะ หมด ไป ทํา ให้ หยด น้ํา หนัก ใน ท้องฟ้า สว่าง ขึ้น."
 origin.1040.desc.gestalt:0 "การสั่นสะเทือนของพลังงานอีก ได้ปะทุออกมาจากประตู ในระบบของเรา ไม่ เหมือน คลื่น พลัง งาน ที่ เคย ใช้ มา ก่อน คลื่น นี้ ก่อ ความ เสีย หาย อย่าง หนัก.\n\nขณะที่สนามแม่เหล็กแผ่ไปทั่ว[Root.Owner.Capital.GetName]มันใช้พลังงานที่มากเกินไปทั่วโลก ทําลายระบบไฟฟ้าทุกระบบ บางส่วนเกินจะซ่อมแซม\n\nเพราะ เหตุ ใด? หมู่ บ้าน ใหญ่ ๆ ส่วน ใหญ่ ตอน นี้ มืด สนิท แล้ว หน่วย ของ พวก เขา ติด อยู่ ใน น้ํา ฝน สี น้ําเงิน ขณะ ที่ พลังงาน ที่ กําลัง จะ หมด ไป ทํา ให้ หยด น้ํา หนัก ใน ท้องฟ้า สว่าง ขึ้น."
 origin.1050.name:0 "มงกุฎ ดํา ยอม รับ ความ ลับ"
 origin.1050.desc:0 "ในที่สุดนักวิทยาศาสตร์ของเราก็ได้ประสบความสําเร็จ ในการเปิดราชบัลลังก์ดํา ทําให้เรือของเราข้ามไปยังอุปกรณ์ที่สอง เป็นของขวัญชิ้นสุดท้ายจากนักก่อสร้างลึกลับของประตู ขณะที่มันเปิดใช้งาน กระแสข้อมูลได้ถูกส่งต่อไปยังระบบของเรา นักวิทยาศาสตร์ของเรามีความมั่นใจว่า ภายในไม่กี่ปีนี้ เราเองก็จะสามารถสร้างประตูใหม่"
 origin.1050.A:0 "กาแล็กซีอยู่ที่หน้าประตูของเรา"

 site_from_gateway_sent:0 "ส่งมาจากเกตเวย์"
 site_from_gateway_sent_intro:0 "นักวิทยาศาสตร์ของเราได้ไปถึงเว็บไซต์ผลกระทบของวัตถุ จากประตูที่ชนเข้ามา[From.Planet.GetName]ด้วยความเร็วที่เหลือเชื่อ\n\nมันชัดเจนจากการมองของที่กระทบ ที่นี่ไม่ใช่การลงจอดปกติ และนักวิทยาศาสตร์ของเรามีความกระตือรือร้นที่จะตรวจสอบเพิ่มเติม"
 origin.1100.name:0 "เพิ่มความเข้มสี"
 origin.1100.desc:0 "รายงานเริ่มต้นจากการค้นพบของเราบน[From.Planet.GetName]เป็นทั้งพิเศษและบิตไม่ซื่อสัตย์\n\nการ วิเคราะห์ ซาก ปรัก หัก พัง ของ พื้น ผิว ใน ปล่อง ไฟ และ บริเวณ รอบ ๆ ก็ เผย ให้ เห็น ความ ประหลาด ใจ อย่าง เห็น ได้ ชัด ว่า วัตถุ ที่ ไม่ รู้ จัก ไม่ ได้ หัก หรือ เบรก เมื่อ ได้ รับ ผล กระทบ. อย่างไรก็ตามวัตถุที่จัดการที่จะเจาะผ่านดินและตอนนี้พักผ่อน ลึกลงไปในพื้นดิน\n\nการขุดเจาะเพิ่มเติมพร้อมที่จะเริ่มต้น"
 origin.1105.name:0 "ความ ไม่ เสมอ ภาค"
 origin.1105.desc:0 "ในฐานะโครงการขุดเจาะ[From.Planet.GetName]ได้ใกล้ชิดกับวัตถุที่วางลึก ในพื้นดิน นักวิทยาศาสตร์ของเราเริ่ม ประสบการณ์ปรากฏการณ์แปลก เมื่อ เวลา ผ่าน ไป หลาย ชั่วโมง ใน ชั่ว พริบ ตา อุปกรณ์ ใหม่ ๆ ก็ พัง ลง อย่าง กะทันหัน เนื่อง จาก การ สวม เสื้อ ผ้า และ การ ฉีก ขาด บริเวณ ที่ เศษ ซาก ปรัก หัก พัง และ ไม่ มี ใคร จํา ได้ ว่า ทํา อย่าง ไร และ อื่น ๆ.\n\nกลุ่มนักวิทยาศาสตร์ไม่สามารถอธิบายได้ แต่ทฤษฎีหนึ่งคือ วัตถุที่ชนกันทิ้งร่องรอยบางอย่างไว้"
 origin.1110.name:0 "ห้อง ที่ ไม่ มี มุม มอง"
 origin.1110.desc:0 "ทีมขุดเจาะของเราในที่สุดถึงที่พักสุดท้าย สําหรับวัตถุที่ไม่รู้จักที่ชนบน[From.Planet.GetName].\n\nดัง ที่ ปรากฏ ให้ เห็น วัตถุ นั้น เป็น สิ่ง ที่ น่า สนใจ เล็ก น้อย ไม่ ใช่ แค่ ลูก ปืน ใหญ่ ที่ ได้ รับ เกียรติ แต่ สถาน ที่ นั้น ทํา ให้ นัก วิทยาศาสตร์ ประหลาด ใจ อย่าง รวด เร็ว.\n\nมันเป็นห้องขนาดใหญ่ ผนึกเธออย่างมีนัยน์ตา มีทางเข้าอื่น ๆ นอกเหนือจากหลุมแตกใน เพดานที่วัตถุได้ลงมา ผนังถูกปกคลุมด้วยแผ่นใสแปลกๆ ที่นักวิทยาศาสตร์ของเราตอนนี้กระตือรือร้นที่จะตรวจสอบเพิ่มเติม"
 origin.1115.name:0 "ผู้ เฝ้า ประตู"
 origin.1115.desc:0 "แผ่น แม่ เหล็ก คลุม ผนัง ห้อง ลึกลับ ที่ พบ บน แผ่น ดิน เหนียว[From.Planet.GetName]มีความหมายน้อยจนกระทั่ง สมาชิกในทีมคนหนึ่ง เอื้อมมือออกไปและค่อยๆ สัมผัสหนึ่ง\n\nห้องที่ถูกระเบิดด้วยแสง ขณะที่โฮโลกราฟฟิกปรากฏขึ้นจากที่ไหนไม่รู้ - แถวหลังจากที่แถวของสัญลักษณ์เรืองแสง มี การ แปล และ จุด มุ่ง หมาย ของ แผ่น พับ ใน ห้อง นั้น อย่าง แยบยล ดัง นี้: มี แบบ พิมพ์ เขียว ที่ ละเอียด ของ การ ก่อ สร้าง ของ มนุษย์ ต่าง ดาว.\n\nการก่อสร้างที่จะเปิดประตู"

 A_CLOSER_LOOK_PROJECT:0 "การ มอง ใกล้ กว่า"
 A_CLOSER_LOOK_PROJECT_DESC:0 "เราควรมองใกล้ๆ ที่จุดตกของวัตถุไม่ทราบชื่อ ที่ถูกไล่ออกจากประตู เมื่อสักครู่นี้"

 THE_GATEWAY_CANNON_PROJECT:0 "เกตเวย์"
 THE_GATEWAY_CANNON_PROJECT_DESC:0 "จากพิมพ์เขียวของมนุษย์ต่างดาว ที่พบในโบราณคดีก่อนหน้านี้ เราสามารถรวบรวมการก่อสร้าง"

 origin.1013.name:0 "เปิด ประตู"
 origin.1013.desc:0 "การ ค้น พบ ทาง โบราณคดี เมื่อ เร็ว ๆ นี้ ได้ เผย ให้ เห็น วิธี สร้าง สิ่ง ที่ สามารถ เปิด ประตู อัน ลึกลับ นี้ ได้ อย่าง รวด เร็ว และ เปิด ทาง ให้ เรือ วิทยาศาสตร์ ผ่าน ไป ได้.\n\n §Rคําเตือน!§!\n\nนี่คือภารกิจเสี่ยงสูง! รับประกันไม่ได้ว่า§Yนัก วิทยาศาสตร์§!หรือ§Yยานวิทยาศาสตร์§!จะถูกให้กลับมาจากการลงโทษอันเจ็บปวด เตรียมตัวให้ดี"

 ### Origin - Eldest Sibling text
 origin_eldest_sibling:0 "ซี ลิง"
 origin_eldest_sibling_desc:0 "สังคมนี้มีตํานานเก่าแก่ เกี่ยวกับกลุ่มย่อยของประชากร ที่ออกจากดาวเคราะห์ เพื่อค้นหาดาวเคราะห์ดวงอื่น"

 origin_tooltip_eldest_sibling_effects:1 "- เริ่มต้นด้วย §Yอารยธรรมดึกดำบรรพ์อีกสองอารยธรรม§! ในระบบดาวบ้านเกิดของคุณ"

 START_SCREEN_ELDEST_SIBLING:0 "เรารู้ว่าสายพันธุ์ของเราปลูกฝัง อารยธรรมที่ร่ํารวยและก้าวหน้ามาก่อนของเรา แต่เรื่องราวที่เกิดขึ้นกับพวกเขา\n\nตํานานหนึ่งที่รอดชีวิต คือหนึ่งใน§Yตัวเรียกดาว§!ไพ โอ เนียร์ ที่ ได้ ออก จาก บ้าน เกิด ได้ โดย วิธี ใด วิธี หนึ่ง และ คิด กัน ว่า ตั้ง ถิ่น ฐาน บน ดาว เคราะห์ ที่ อยู่ ใกล้ ๆ. ตํานานที่น่าตื่นเต้น ไม่ต้องสงสัยเลย สิ่ง หนึ่ง ซึ่ง มี ขอบ เขต และ น้ําใจ ใน การ ผจญ ภัย อย่าง น่า ทึ่ง นั้น เข้า กัน ได้ กับ การ ขาด หลัก ฐาน เท่า นั้น.\n\nตอนนี้เราอยู่ในเวลา ของการบินระหว่างดวงดาว เทคโนโลยี ทํา ให้ เรา สามารถ ออก จาก บรรยากาศ ของ โลก ที่ เป็น บ้าน ของ เรา ไป สู่ อวกาศ ได้ อีก ครั้ง หนึ่ง. มาดูกันว่าตํานานโบราณมีดีแค่ไหน"

 ### Origin - On The Shoulders Of Giants text
 origin_shoulders_of_giants:0 "บนไหล่ของยักษ์"
 origin_shoulders_of_giants_desc:1 "อารยธรรมนี้ ได้ซ่อนประโยชน์ ในระบบสุริยะของพวกเขา วางอยู่ในอดีตอันไกลโพ้น"
 origin_tooltips_shoulders_of_giants_effects:2 "- $HOME_SYSTEM$ ['concept_archaeology_site'] ['concept_ex_gravitas'] เกี่ยวข้องกับผู้อุปถัมภ์ลึกลับในระบบดาวบ้านของคุณ"
 origin_tooltips_shoulders_of_giants_negative_effects: "- เหตุการณ์ต่อเนื่องผู้พิพากษา(วันเสาร์)จักรวรรดิแรกเริ่ม / ประถมจักรวรรดิ) ถูกบล็อกจนกว่าจะไขปริศนานี้ได้"

 START_SCREEN_SHOULDERS_OF_GIANTS:1 "ของเราเป็นประวัติของความแปลก และความไม่สอดคล้อง เราพบซากเมืองโบราณที่เก่าแก่กว่า การขุดค้นโบราณคดีของหมู่บ้านโบราณ เราขุดพบเลื่อย, ขวาน และปืนที่ใช้ยิงได้ไกล\n\nอย่าง ไร ก็ ตาม ประวัติศาสตร์ ที่ แปลก ประหลาด ไม่ ได้ ป้องกัน เรา ไว้ จาก การ ก้าว เข้า สู่ ยุค แห่ง การ บิน อวกาศ อย่าง รวด เร็ว. ปัจจุบัน เรา ได้ จัด การ เพื่อ หนี ความ โน้ม ถ่วง ของ ดาว เคราะห์ บ้าน เกิด ของ เรา โดย มุ่ง เป้า ไป ที่ ดาว เคราะห์ และ ร่าง กาย อื่น ๆ ใน ระบบ สุริยะ ของ เรา และ ไกล กว่า นั้น.\n\nเราแทบจะไม่ซ้ายบรรยากาศก่อนที่ประหลาดเกิดขึ้นใหม่ สัญญาณแปลกของเอเลี่ยนที่มาจากภายในระบบสุริยะของเราเอง"

 ### On The Shoulders Of Giants - Ex Gravitas Arc Site
 site_ex_gravitas:0 "ศ."
 site_ex_gravitas_intro:0 "การอ่านอย่างแปลกประหลาดเกิดขึ้นจากพื้นผิวของ[From.Planet.GetName]เราจําเป็นต้องเปิดตัวการท่องเที่ยวพื้นผิวเพื่อหาเพิ่มเติม"
 origin.1200.name:0 "ขั้น แรก ขั้น ตอน เล็ก ๆ"
 origin.1200.desc.a:0 "ฐานปฏิบัติการได้ถูกจัดตั้งขึ้น บนพื้นผิวของดวงจันทร์ และตอนนี้หลายทีมกําลังเดินทาง ไปยังสถานที่ผิดปกติต่างๆ\n\nความ หมาย ของ ความ ลึกลับ นี้ เป็น เรื่อง เหลือ เชื่อ และ สังคม ทาง วิทยาศาสตร์ เต็ม ไป ด้วย ทฤษฎี และ ความ คาด หมาย อย่าง แท้ จริง เกี่ยว กับ สิ่ง ที่ จะ ถูก ทีม งาน ท่อง เที่ยว ค้น ค้น พบ."
 origin.1200.desc.b:0 "ฐานของการดําเนินการได้ถูกตั้งขึ้นบนผิวของ[From.Planet.GetName]ตอนนี้หลายทีมกําลังไปที่จุดผิดปกติต่างๆ ที่สแกนเนอร์ของเราจับได้\n\nความ หมาย ของ ความ ลึกลับ นี้ เป็น เรื่อง เหลือ เชื่อ และ สังคม ทาง วิทยาศาสตร์ เต็ม ไป ด้วย ทฤษฎี และ ความ คาด หมาย อย่าง แท้ จริง เกี่ยว กับ สิ่ง ที่ จะ ถูก ทีม งาน ท่อง เที่ยว ค้น ค้น พบ."
 origin.1200.c:0 "ตื่นเต้นจังเลย!"
 origin.1205.name:0 "การ ติด ตาม สัญญาณ"
 origin.1205.desc:0 "ทีมท่องเที่ยวส่วนใหญ่ ไปถึงจุดหมายปลายทางแล้วรายงานกลับมา\n\nสิ่งประดิษฐ์ที่ฝังอยู่ในพื้นดินถูกเปิดโปง อาจารย์ใหญ่นักวิทยาศาสตร์[Leader.GetName]อธิบายพวกเขาว่า§Yตัวชี้เลเซอร์กาแล็กซี่แม่นยํามาก§!- เครื่องจักรโบราณที่ปล่อยรังสีอัลตร้าไวโอเลต ที่แข็งแรงและแน่นออกไปในอวกาศ\n\nมันเป็นการค้นพบที่หวานขม ความสําคัญที่ลึกซึ้ง น่ารื่นรมย์ของวัตถุต่างดาว"
 origin.1205.a:0 "ทําต่อไป"
 origin.1210.name:0 "มันคือเศษเหล็ก"
 origin.1210.desc:0 "แม้เราจะพยายามอย่างดีที่สุด การขุดเจาะและการวิเคราะห์ ของสัญญาณของเอเลี่ยนบนพื้นผิว ก็ล้มเหลวที่จะส่งมอบผลลัพธ์ที่เกี่ยวข้องใด ๆ\n\nทีม โบราณคดี ได้ คํานวณ และ ติด ตาม เส้น ทาง ของ คาน สัญญาณ ของ เอเลี่ยน แต่ ไม่ มี อะไร ชี้ ไป ที่ อื่น นอก เหนือ จาก ที่ ว่าง เปล่า.\n\nนัก วิทยาศาสตร์[Leader.GetName]ได้เรียกร้องเวลามากขึ้น เชื่อว่าบางสิ่งบางอย่างได้รับการพลาด โดยทีมวิทยาศาสตร์"
 origin.1210.a:0 "พูดต่อสิ"
 origin.1215.name:0 "ลม ย้อน กลับ และ ดําเนิน การ"
 origin.1215.desc.a:1 "ทําลาย!\n\nการศึกษาเกี่ยวกับพื้นผิว เปิดเผยว่าดวงจันทร์ถูกชนโดยดาวเคราะห์น้อยที่ผ่านมา แรง กระทบ ไม่ เพียง พอ ที่ จะ ทําลาย ดวง จันทร์ แต่ ยัง กระตุ้น ให้ ดวง จันทร์ อยู่ ห่าง จาก วง โคจร เดิม. โดยการวิเคราะห์ผลกระทบ นักวิทยาศาสตร์ได้คํานวณ ตําแหน่งเริ่มต้นของดวงจันทร์และการหมุน และใช้ข้อมูลนั้นเพื่อ 'กรอ' ตัวบ่งชี้ของมนุษย์ต่างดาวไปยังตําแหน่งเดิมของพวกเขา\n\nและมันมี : คานตัวบ่งชี้ของมนุษย์ต่างดาวก็เริ่มที่จะ เชื่อมต่อกับดาวเคราะห์อื่นในระบบ!"
 origin.1215.desc.b:1 "ทําลาย!\n\nการ ศึกษา ผิว เผิน เผย ให้ เห็น ว่า[From.Planet.GetName]ถูกชนโดยดาวเคราะห์น้อย แรง กระทบ ไม่ เพียง พอ ที่ จะ ทําลาย ดาว เคราะห์ ดวง นี้ แต่ ยัง กระตุ้น ให้ ดาว เคราะห์ ดวง นี้ เคลื่อน ที่ จาก วง โคจร เดิม ไป เป็น ส่วน ย่อย. โดยการวิเคราะห์ผลกระทบ นักวิทยาศาสตร์ก็คํานวณได้[From.Planet.GetName]ตําแหน่งเริ่มต้นและการหมุน และใช้ข้อมูลนั้น 'ลม' ตัวบ่งชี้ของมนุษย์ต่างดาวไปยัง ตําแหน่งเดิมของพวกเขา\n\nและมันมี : คานตัวบ่งชี้ของมนุษย์ต่างดาวก็เริ่มที่จะ เชื่อมต่อกับดาวเคราะห์อื่นในระบบ!"

 ### On The Shoulders Of Giants - Something Waiting Arc Site
 site_something_waiting:0 "มีบางอย่างรออยู่"
 site_something_waiting_intro:0 "ตัวบ่งชี้ของมนุษย์ต่างดาว ที่เพิ่งถูกค้นพบ ชี้ไปที่ดาวเคราะห์ดวงนี้ และเราควรลงไปบนพื้นผิว"
 origin.1220.name:0 "มาดูกันซิว่าเราได้อะไรมา"
 origin.1220.desc:0 "ทีมโบราณคดีของเราเริ่มทํางาน[From.Planet.GetName]ค่าการอ่านแผ่นดินไหว ได้อย่างรวดเร็วแยกพื้นที่กลวง ในสถานที่ที่หยาบ ระบุโดยตัวบ่งชี้ของมนุษย์ต่างดาวก่อนหน้านี้\n\nพื้นที่ใต้ดินกว้างมาก และแม้จะมีธรรมชาติลึกลับอยู่อย่างหนึ่ง ที่ไม่ต้องสงสัยในหมู่ผู้เชี่ยวชาญ มันไม่ใช่ธรรมชาติ ใครบางคนสร้างมันด้วยวัตถุประสงค์เฉพาะในใจ"
 origin.1225.name:0 "การ พิสูจน์ พื้น ดิน"
 origin.1225.desc:0 "ใน ที่ สุด ทีม ขุด ค้น ก็ มา ถึง โครง สร้าง ใต้ ดิน. มี การ สํารวจ ห้อง โถง และ อุโมงค์. การ ขาด เครื่อง ประดับ อย่าง สิ้น เชิง ทํา ให้ ยาก ที่ จะ กําหนด จุด ประสงค์ ของ โครง สร้าง.\n\nเมื่อ[Leader.GetName]เข้าไปที่ห้องหลักเสียงลึกก็จับภาพในตอนแรก เพียงแค่เสียงฟ้าร้อง เสียงที่ช้าปรับเทียบสีจนกระทั่งเสียงรบกวนพูดเพียงประโยคเดียวในภาษาของเรา :\n\n§Y'คุณพร้อมหรือยัง'§!\n\nเสียง ดัง สนั่น ตาม ด้วย เสียง ดัง กัมปนาท ลึก เป็น หนึ่ง ใน กําแพง ยักษ์ ที่ ค่อย ๆ หด หาย ไป เพื่อ เผย ให้ เห็น ทาง เดิน อัน มืด มิด. นัก โบราณคดี ของ เรา เข้า ไป ข้าง ใน อย่าง กระตือรือร้น."
 origin.1225.a:0 "อ่านเบาๆ"
 origin.1230.name:0 "การ ทดลอง"
 origin.1230.desc:1 "ทางเดินมืดนําไปสู่ห้องว่างกลม ก้าวภายใน, เสียงรูปร่างพูดอีกครั้งกล่าวว่า§Yมีเพียงผู้เหมาะสมเท่านั้นที่ยังคงดําเนินต่อไป§!.\n\nทางเดินสั้นเชื่อมต่อกับห้องกลมสามห้องอื่น ๆ ขนาดเล็ก - แต่ละห้องมีชนิดของปัญหาฟิสิกส์บาง\n\n[Leader.GetName]เชื่อว่าเหล่านี้เป็นปริศนาทางวิทยาศาสตร์ ที่ครั้งหนึ่งได้แก้ไขแล้ว อาจทําให้เกิดปฏิกิริยาบางอย่างในโครงสร้าง"
 origin.1230.a:0 "คุณรู้ว่าต้องทําอะไร"
 origin.1235.name:0 "เต็มไปด้วยความมหัศจรรย์"
 origin.1235.desc:1 "ทั้งสามปริศนาวิทยาศาสตร์ได้รับการเสร็จสิ้น ในห้องลึกลับลึกใต้ดินพื้นผิวของ[From.Planet.GetName].\n\nเหมือนกับ[Leader.GetName]น่า สงสัย โครง สร้าง นี้ ตอบ สนอง ต่อ วิธี แก้ ที่ ถูก ต้อง สําหรับ การ ทดลอง ของ มนุษย์ ต่าง ดาว. ขณะ ที่ ปริศนา เรื่อง สุด ท้าย ได้ รับ การ แก้ แล้ว การ ฉาย ภาพ ที่ มี เมฆ หมอก ได้ ระเบิด สู่ ชีวิต ใน ห้อง ใหญ่. มันเป็นภาพจําลองที่ดี ของระบบสุริยะของเรา พร้อมกับการเลื่อนคําแนะนํา สําหรับเทคโนโลยีต่าง ๆ ของมนุษย์ต่างดาว\n\nอีก จุด หนึ่ง ที่ เกี่ยว ข้อง กัน คือ จุด ที่ สว่างไสว. การค้นหายังดําเนินต่อไป"

 ### On The Shoulders Of Giants - Buried Deep Arc Site
 site_buried_deep:0 "ฝังลึก"
 site_buried_deep_intro:0 "สแกนเนอร์ของเราได้หยิบบางอย่างลึกลงไปใต้พื้นผิวของ[From.Planet.GetName]."
 origin.1240.name:0 "แบนเกอร์ถูกผนึก"
 origin.1240.desc:1 "หลังจากระยะเวลาอันยาวนานของการขุดลึกเข้าไปในเปลือกของ[From.Planet.GetName]ทีมขุดเจาะไปถึงโครงสร้างใต้ดินอีกแห่ง\n\nแม้ จะ มี การ อ่าน ข้อ ความ ที่ บ่ง ชี้ ว่า อาคาร นั้น กลวง แต่ ก็ ไม่ มี ทาง พบ ช่อง ทาง เข้า. ดู เหมือน ว่า มี การ ผนึก ผนึก ตัว เอง ไว้ เป็น ชุด และ กําแพง ป้องกัน นี้ ทํา ด้วย วัสดุ บาง อย่าง ที่ ไม่ รู้ จัก ซึ่ง มี ความ ซื่อ สัตย์ มั่นคง อย่าง ยิ่ง. เครื่องขุดเจาะแบบอนุสรณ์ ไม่แม้แต่จะเกาด้วยซ้ํา\n\nแต่ โครงการ นี้ กําลัง ดําเนิน อยู่ แล้ว."
 origin.1245.name:0 "เรียกค่าชดเชย"
 origin.1245.desc:1 "หลังจากเดือนของการทํางานหนัก โดยใช้คานที่มีประสิทธิภาพ ซึ่งรวมความร้อนฟิวชั่นที่รุนแรง\n\nทันทีที่ตู้นิรภัยแตก การตัดเสียงจากศพพูดอีกครั้ง มี การ ประกาศ ว่า ความ ตั้งใจ แน่ว แน่ ของ เรา ได้ รับ การ พิสูจน์ แล้ว ว่า ได้ มี การ ทดลอง อีก อย่าง หนึ่ง แล้ว และ เรา จะ ได้ รับ บําเหน็จ ตาม นั้น.\n\nแล้วเราก็เป็น ที่บังเกอร์มีของมีค่ามากมาย ไม่น้อยนัก คือ เทคโนโลยีที่ไม่รู้จักมาก่อน"

 ### On The Shoulders Of Giants - In Memoriam Arc Site
 site_in_memoriam:0 "ใน เม โม ริ อัม"
 site_in_memoriam_intro:0 "โครงสร้างใต้ดินนั้นเห็นได้ชัด ว่าเป็นโครงสร้างที่ได้รับความนิยม ในบรรดาของหายากของเรา"
 origin.1250.name:0 "คอมโพเน็กซ์"
 origin.1250.desc:0 "การอ่านกราฟแสดงความถี่ได้ถูกคอมไพล์เป็นรูปแบบโครงสร้างใต้ดินที่แม่นยํามาก[From.Planet.GetName].\n\nดู เหมือน ว่า เป็น เครือ ข่าย กว้าง ใหญ่ ไพศาล ของ ทาง เดิน ที่ กว้าง ใหญ่ แต่ ละ ทาง ยาว หลาย กิโลเมตร. โครงสร้างทั้งหมดเป็นทางเดินส่วนใหญ่ มียกเว้นหนึ่งพื้นที่เปิด ที่ด้านล่างของอาคาร\n\nมากกว่าที่ไม่สามารถตีความได้ จนกว่าเราจะไปถึงและตรวจสอบเว็บไซต์อย่างถูกต้อง"
 origin.1250.a:0 "ดังนั้นขอไปลึก!"
 origin.1255.name:0 "การ ประชุม อนุสรณ์ ที่ ไม่ รู้ สิ้น สุด"
 origin.1255.desc:1 "ทีมนักวิทยาศาสตร์ได้รุกเข้ามาใต้ดิน และเข้าไปในทางเดินที่ว่างเปล่า\n\nอุโมงค์ยาวว่างเปล่า ใน การ ตรวจ ดู กําแพง อย่าง ใกล้ ชิด ดู เหมือน ว่า มี คํา จารึก เล็ก ๆ แปลก ประหลาด ครอบ คลุม อยู่. การ แปล ภาษา ต่าง ประเทศ เป็น กระบวนการ ที่ ทํา ให้ สับสน อย่าง มาก จน กระทั่ง มี การ ค้น พบ ว่า การ แปล นั้น ไม่ มี อะไร นอก จาก ชื่อ ของ มนุษย์ ต่าง ดาว ซึ่ง มี จํานวน หลาย ล้าน คน.\n\nนักโบราณคดีกําลังมุ่งไปที่ห้องชั้นล่าง แต่ความพยายามของพวกเขาถูกขัดขวางโดยทางเดินในถ้ําซึ่งจําเป็นต้องเคลียร์"
 origin.1260.name:0 "การ ยอม รับ ความ พ่าย แพ้"
 origin.1260.desc:0 "ทีมวิทยาศาสตร์ของเราล่มแล้ว[From.Planet.GetName]ได้มาถึงห้องชั้นล่างของอาคารอนุสรณ์ ที่ นั่น พวก เขา ได้ พบ ข้อ ความ โบราณ ที่ มี การ บันทึก ไว้; การ พิจารณา ความ เป็น ส่วน ตัว บาง อย่าง:\n\n§Y'เราล้มเหลว' พวกไร้ความปราณี ตัดผ่านกองทัพเรือของเราทั้งหมด โดยไม่แม้กระทั่งชะลอตัวลง ทั้งหมดจะหายไปในขณะนี้ เราจะตายที่นี่ ในห้องโถงของเครื่องบรรณาการเหล่านี้ จะลดลงพี่น้อง\n\nเรากลัวเพื่อชีวิตในแผนกของเรา พวกไร้ความปราณีจะพบพวกเขา และพวกเขาก็...§!\n\nไม่มีร่องรอยการต่อสู้ ไม่มีศพ เพียง แต่ โถง ว่าง เปล่า และ ความ เงียบ ของ ผู้ ที่ เสีย ชีวิต."
 origin.1260.a:0 "ล้มเลิก แต่ต่อไป"
 origin.1265.name:0 "เพิ่มข้อมูล..."
 origin.1265.desc:0 "หัวหน้า นักวิทยาศาสตร์[Leader.GetName]อยากจะค้นทุกซอกทุกมุม ของสถานที่รําลึก มันจ่ายไป: มีอุปกรณ์ขนาดเล็ก ถูกค้นพบในทางเดินแห่งหนึ่ง ข้อมูลเล็กๆ ที่สามารถกู้มาได้\n\n§Y'... ทํางานดี! ด้วยความสามารถทางสมองที่ถูกปิดลง สมองของพวกเขาถูกถอดออกไป\n\nมันคงเพียงพอแล้ว มันเป็นสิ่งเดียวที่เราสามารถทําได้§!\n\nอุปกรณ์นี้ยังมีพิกัดใหม่[Leader.GetName]อยากสืบเรื่องนี้ให้เร็วที่สุด"
 origin.1265.a:0 "ดีมาก"


 ### On The Shoulders Of Giants - The Last Stand Arc Site
 site_the_last_stand:0 "จุด ยืน สุด ท้าย"
 site_the_last_stand_intro:0 "สแกนเนอร์อ่านจากวงโคจร แสดงให้เห็นว่ามีโครงสร้างลงบนโลก ไม่ เหมือน คน ก่อน คน นี้ จะ ไม่ ถูก ฝัง ไว้ ใต้ ดิน."
 origin.1270.name:0 "ป้อมปราการสุดท้าย"
 origin.1270.desc:1 "ครั้งนี้ไม่จําเป็นต้องใช้พลั่วหรือเลเซอร์ขุดเจาะ อาจารย์ใหญ่นักวิทยาศาสตร์[Leader.GetName]และทีมโบราณคดี ก็เดินเข้าไปในซากของเอเลี่ยน\n\nสถาน ที่ แห่ง นี้ เก่า แก่ มาก กว่า หนึ่ง พัน ปี แต่ ก็ ยัง คง อยู่ อย่าง ค่อน ข้าง ดี. ดูเหมือนเป็นพื้นที่บางแห่ง ที่สร้างขึ้นเพื่อวัตถุประสงค์ มี ห้อง ปฏิบัติ การ หลาย แห่ง และ โรง เก็บ ของ ขนาด ใหญ่.\n\nทีมพบแม่ข่ายแฟ้มจัดเก็บแบบดิจิทัลแล้ว มันออฟไลน์ แต่ดูปกติดี หวังว่ามันจะเติมเต็มช่องว่าง เกี่ยวกับเบเนแฟกเตอร์ที่หายไปของเรา"
 origin.1275.name:0 "วัดความสิ้นหวัง"
 origin.1275.desc:1 "ทีมนักวิทยาศาสตร์จัดการเอาข้อมูลดิจิตอล ของเอเลี่ยนขึ้นมาและทํางาน มันบรรจุบันทึกตามอําเภอใจ ซึ่งต้องตีความแบบเสรีนิยม\n\nวลี '§Yอินิชิเอทีฟจิตใจ-วิพ§!'เกิดขึ้นบ่อยครั้งในบันทึก และดูเหมือนจะมีการเน้นเฉพาะของการวิจัยที่สถานที่นี้ ดู เหมือน ว่า เบเนแฟกเตอร์ พัฒนา เทคโนโลยี ซึ่ง สามารถ ควบคุม ประสิทธิภาพ ของ ความ สามารถ ใน การ คิด ได้ แต่ ไม่ มี ใคร รู้ ว่า จุด มุ่ง หมาย เช่น ไร หรือ เพื่อ อะไร."
 origin.1275.a:0 "สืบสวนต่อไป"
 origin.1280.name:0 "เครซี่!"
 origin.1280.desc:1 "ทีมโบราณคดีบน[From.Planet.GetName]ได้พบเอกสารดิจิตอลโบราณ นี่ประกอบด้วยล็อกส่วนใหญ่ด้วย แต่มีบันทึกหนึ่งรายการที่น่าสนใจโดยเฉพาะ:\n\n§Yยานได้ออกไป เรารู้ว่าพวกมันจะทําสําเร็จ แต่ไร้ความรู้สึกของความหวัง หรือวิญญาณชั้นสูงเมื่อพวกเขาจากไป เรารู้ว่าภารกิจและงานที่เราทําที่นี่มันผิด น่ารังเกียจ\n\nแต่ทางเลือก... 'ทางเลือกที่เลวร้ายกว่านั้น'§!\n\nนั่นเป็นรายการสุดท้าย ที่พบในโรงงานโบราณ มี การ ปิด ท้าย ไม่ มาก นัก แต่ อย่าง น้อย ก็ มี การ ค้น พบ ทาง เทคโนโลยี มาก มาย."
 origin.1280.a:0 "บางทีอาจจะมีอะไรมากกว่านั้น"
 origin.1285.name:0 "หลังการสิ้นสุด"
 origin.1285.desc:0 "เมื่อ ตรวจ ค้น บริเวณ เก็บ ของ คน งาน คน หนึ่ง ได้ พบ อุปกรณ์ เล็ก ๆ ชนิด หนึ่ง ซึ่ง ไม่ รู้ ที่ มา. มันถูกนํามาให้[Leader.GetName]และกลายเป็นอุปกรณ์บันทึกเสียง มันเสียหายมาก แต่การสนทนาเล็กๆ ได้ถูกบันทึกไว้\n\n§Y'อย่าลืมไปเลย ใครซักคนต้องพูดความจริงเพื่อพวกเขา' ประวัติศาสตร์อาจจะอดทน แต่จิตสํานึกของฉันไม่สามารถ.'§!\n\nข้อมูล ที่ ถูก ทิ้ง ไป เป็น ครั้ง แรก เมื่อ มี การ ตรวจ สอบ มาก ขึ้น. มันกลายเป็นพิกัดที่เข้ารหัสไว้"

 ### On The Shoulders Of Giants - Dark Secret Arc Site
 site_dark_secret:0 "ความมืด"
 site_dark_secret_intro:1 "พิกัดชี้ไปยังจุดใด ๆ ลงบนผิวของ[From.Planet.GetName]สแกนเกือบไม่พบอะไรผิดปกติ"
 origin.1290.name:0 "ถ้ําที่ซ่อนอยู่"
 origin.1290.desc:1 "ทีมที่เราส่งไป[From.Planet.GetName]เจออุปสรรคมากกว่าที่คาด\n\nพิกัดที่เราได้รับในฐานวิจัยของมนุษย์ต่างดาวโบราณ ชี้ไปที่ส่วนที่พิเศษของ[From.Planet.GetName]ที่ที่ภูมิทัศน์เต็มไปด้วย ผิวหินแนวตั้ง และรอยแตกลึก\n\nทีม รบ ก็ รุด หน้า ต่อ ไป และ ใน ที่ สุด ก็ ถึง จุด ที่ ระบุ ไว้ นั่น คือ การ ก่อ ตั้ง ถ้ํา ตาม ธรรมชาติ. ไม่ จําเป็น ต้อง ขอ ให้ พวก เขา ตรวจ ดู ให้ ใกล้ ชิด ยิ่ง ขึ้น การ หด ตัว ของ มัน ก็ ก้าว ไป แล้ว."
 origin.1290.a:0 "ดำเนินการต่อ"
 origin.1295.name:0 "แคชแบบเยือกเย็น"
 origin.1295.desc:0 "ทีมโบราณคดีที่ตรวจสอบถ้ําธรรมชาติ[From.Planet.GetName]มีรายงานกลับมา พวก เขา ได้ พบ แหล่ง ทรัพยากร อัน มี ค่า มาก มาย ที่ ถูก ทิ้ง ไว้. ไม่มีประตู ไม่มีล็อค และไม่มีกับดัก มีแต่ถ้ําที่เต็มไปด้วยของมีค่าทางอุตสาหกรรม\n\nหัวหน้า นักวิทยาศาสตร์[Leader.GetName]อยากจะสืบต่อไป แม้มันจะน่าหงุดหงิด แต่ความชัดเจนของสมบัติ ได้กระตุ้นทฤษฎีว่าการซ่อนของลับเป็นเพียงอุบาย"
 origin.1295.a:0 "ไปค้นหาต่อไป"
 origin.1300.name:0 "สกปรก อดีต"
 origin.1300.desc:1 "แคชทรัพยากรนี้ เป็นข้อมูลลวง สมบัติที่แท้จริงที่ซ่อนไว้หลังประตู คือข้อความสุดท้าย ที่บันทึกโดยหนึ่งในมนุษย์ต่างดาว\n\nครั้งที่ผ่านมาพวกเขาอยู่ในสงคราม กับการแข่งขันคนต่างด้าวไร้ความปราณีที่รู้จักกันว่า§Sผู้ ไร้ ที่ พึ่ง§!. อารยธรรมทั้งหมดได้ถูกทําลายไปแล้วในล้างไร้ความปราณี', และเบเนแฟกเตอร์เป็นต่อไป พวกเบเนแฟกเตอร์หมดหวังหารีสอร์ทสุดท้าย ก่อนที่ทุกอย่างจะหายไป พวกเขาประสบความสําเร็จด้วยอุปกรณ์ ที่ทําลายร่างกายประสาท ของคนไร้ความปราณี\n\nเนื่อง จาก ถูก ปล้น ด้วย สติ ปัญญา ของ พวก เขา ที่ กระหาย เลือด ผู้ ไร้ ความ ผิด จึง กลาย เป็น คน ขี้ อาย และ ไม่ มี อันตราย. พวกเบเนซองส์ล้อมพวกมันไว้ และขับไล่พวกมันมายังโลกของเรา\n\nพวกไร้ความปราณีคือบรรพบุรุษของเรา"
 origin.1300.a:0 "ยอดหวานแสนขมขื่น"
 origin.1305.name:0 "การฟื้นฟูของไทแรนท์"
 origin.1305.desc:1 "แคชทรัพยากรเป็นเรื่องหลอกลวง อุปกรณ์บันทึกเสียงที่ซ่อนไว้ ในที่สุดก็ถูกพบในถ้ํา\n\n§Yในอดีต สายพันธุ์ของฉัน เป็นที่รู้จักกันในขณะนั้น§Sผู้ ไร้ ที่ พึ่ง§!- สูญเสียไปยังกาแล็กซี่ คนต่างด้าวใด ๆ ที่เดินทางข้ามเส้นทางของเรา หมั้นโดยกองเรือของเราโดยไม่ลังเลหรือความเมตตา\n\nในที่สุดเราก็พัฒนานอกเหนือวิถีของนักรบ เรา มอง ดู ประวัติศาสตร์ อัน โหด ร้าย ของ เรา และ ไม่ รู้สึก ภูมิ ใจ เพียง แต่ อับอาย และ เสียใจ.\n\nค้นหาบรรพบุรุษของเรา ...'§!\n\nที่เหลือวุ่นวาย นัก วิทยาศาสตร์[Leader.GetName]เชื่อ กัน ว่า การ บิดเบือน อาจ กลับ คืน มา ได้ แต่ ก็ ต้อง ใช้ เวลา บ้าง."
 origin.1305.a:0 "ทําให้มันได้ผล"
 origin.1310.name:0 "รีโมสของไทแรนต์ ภาค 2"
 origin.1310.desc:1 "[Leader.GetName]ได้ทําการเรียกคืนการบันทึกเสียงของเอเลี่ยน\n\n'§Yเพื่อแสวงหาการไถ่บาป เราถึงระบบนี้ ที่นี่ก่อนของเราทําลาย$NAME_ThwaaPhyr$การแข่งขัน เราไม่รู้ว่า$NAME_ThwaaPhyr$ได้ซ่อนสายพันธุ์อื่น -[Root.Owner.GetSpeciesName]- โดยการใช้ขั้นตอนที่ปราบปรามความสามารถทางปัญญาของ[Root.Owner.GetSpeciesNamePlural]ทําให้พวกมันไม่เป็นอันตรายกับเรา\n\nผลกระทบนี้ไม่สามารถแก้ไขได้ เดอะ[Root.Owner.GetSpeciesName]ยังเป็นคนป่าเถื่อน ตอนนี้เราหวังว่าวันหนึ่งพวกเขาจะพบทางของพวกเขา กลับไปที่ดาวและที่พวกเขาพบ§!\n\nและ นั่น คือ: ประวัติศาสตร์ ของ เรา ได้ อธิบาย. ตอนนี้ มาสนใจอนาคตกัน"
 origin.1310.a:0 "ยอมรับและก้าวต่อไป"
 origin.1315.name:0 "แฟล็กผิดพลาด"
 origin.1315.desc:2 "ทีมโบราณคดีพบชุด ข้อมูลชิ้นที่อยู่เบื้องหลัง กําแพงถ้ําปลอม ในขณะที่เราตรวจสอบพวกเขา ธีมเริ่มออกมา\n\nไอนสที่ผ่านมาหมึกถูกขังในเน่าเป็นสองกลุ่มที่สําคัญ มวยปล้ําเพื่ออํานาจอธิปไตย ใน ความ พยายาม ที่ จะ ได้ รับ ประโยชน์ ฝ่าย หนึ่ง ได้ ทํา การ ปฏิบัติ งาน ธง ปลอม: โดย ทํา หน้า ที่ เป็น การ ต่อ ต้าน ของ ตน เอง พวก เขา โจมตี สัตว์ ที่ ด้อย กว่า ซึ่ง เป็น บรรพบุรุษ ของ เรา.\n\nระเบิดสยัคฆ์เร่งประสาท ถูกจุดชนวนบนดาวของเรา มันไม่ได้ทําอะไรกับระบบนิเวศ แต่ชีพจรส่งผลกระทบต่อสมองของบรรพบุรุษของเรา ทําให้พวกเขาถอยหลัง\n\nสัญลักษณ์ ที่ ทิ้ง ไว้ เบื้อง หลัง สําหรับ เรา บ่ง ชี้ ว่า ใน ที่ สุด พวก เบเน ดิก ต์ ก็ แสวง หา การ ไถ่ ถอน."
 origin.1315.a:0 "เราไม่ใช่เบี้ย แค่ดู!"
 origin.1320.name:0 "การไล่ระดับสี"
 origin.1320.desc:1 "ซ่อนอยู่หลังกําแพงปลอม ทีมขุดเจาะพบอุปกรณ์บันทึกเสียงเดียว บรรจุคําสารภาพของหนึ่งในเบเนซองส์\n\nหลายปีก่อน เบเนแฟกเตอร์ 'ฝัง' สายพันธุ์ของเราลง โดยการแทรกแซงเทคโนโลยีเบนวิลล์ที่อาจจะได้ดูเหมือนเมื่อภัยคุกคามได้ผ่านสี่เหลี่ยมไม่ใช้ความพยายามในการพยายามฟื้นฟูความสามารถของบรรพบุรุษของเรา - พวกเขาเพียงแค่ละทิ้งเรา\n\nเว็บไซต์ และ เทคโนโลยี ที่ ค้น พบ ใน ระบบ บ้าน ของ เรา เป็น สิ่ง อํานวย ความ สะดวก ซึ่ง ถูก ทิ้ง ไว้ โดย กลุ่ม อิสระ ซึ่ง รู้สึก สงสาร คน รุ่น ก่อน ๆ ที่ มี อายุ น้อย ลง."
 origin.1320.a:0 "พยานเรา! เราไม่ต้องการการกุศล"
 origin.1325.name:0 "ก็อดสปีด"
 origin.1325.desc:2 "ซ่อนอยู่หลังกําแพงปลอม ทีมขุดเจาะพบอุปกรณ์บันทึกเสียงเดียว ที่บรรจุข้อความทิ้งไว้ โดยเบเนซองส์ลึกลับ\n\nพวก เขา กําลัง ต่อ สู้ กับ สงคราม อัน แสน เข็ญ กับ เชื้อ ชาติ ต่าง ดาว ที่ ไม่ มี ชื่อ, ไม่ มี ความ ตั้งใจ, และ ทํา สงคราม. ในความพยายามที่จะซ่อนเราจากล่วงหน้าของศัตรูที่พวกเขาใช้เทคโนโลยีเพื่อระงับความ สามารถทางปัญญาของบรรพบุรุษของเราหวังว่าศัตรูจะแบกไม่ให้ความสนใจกับ[Owner.GetPreFTLLower]สายพันธุ์เดียวของดาวเคราะห์\n\nมันได้ผลสําหรับเรา แต่ชะตากรรมของเบเนซองส์ถูกปรับ พวกเขาทิ้งที่ซ่อนทรัพยากรและเทคโนโลยีไว้ให้เรา หวังว่าวันหนึ่งเราจะหาเจอ"
 origin.1325.a:0 "ช่างเป็นโชคชะตาที่น่าเศร้า"
 origin.1330.name:0 "ถัดไป"
 origin.1330.desc:1 "ใน ที่ สุด ความ ไม่ เสมอ ต้น เสมอ ปลาย ใน ประวัติศาสตร์ ของ เรา ก็ ได้ รับ การ อธิบาย โดย ใช้ บท เหล่า นี้ ที่ สูญ หาย ไป จาก มรดก แท้ ของ เรา. ครั้ง หนึ่ง เรา เคย เชื่อ ว่า ความ ก้าว หน้า ของ อารยธรรม ของ เรา มา จาก การ อยู่ โดด เดี่ยว และ การ เป็น เอกเทศ. ตอนนี้เรารู้แล้วว่า ตลอดเวลาที่ผ่านมา เรายืนอยู่§Lบนบ่าของยักษ์§!.\n\nเราไม่สามารถเปลี่ยนแปลงอดีตได้ เรา คืน ดี กัน และ ก้าว ต่อ ไป\n\n§Yมันเป็นเวลาที่เราจะกลายเป็นยักษ์§!"
 origin.1330.a:0 "ไป!"

 site_benefactor_site:0 "ตัวแบ่งส่วน"
 site_benefactor_site_intro:0 "หนึ่งในสถานที่ที่ระบุ โดยแผนที่ระบบสุริยะโบราณ"

 spurred_by_the_past:0 "ถูก หลอก โดย อดีต"
 spurred_by_the_past_desc:0 "การเปิดเผยของอดีตที่แท้จริงของเรา จุดประกายแรงจูงใจและความรู้สึกของวัตถุประสงค์ ในสายพันธุ์ทั้งหมดของเรา"

 intercepting_history_chain_title:0 "แก้ไขโครงการหลัก..."
 intercepting_history_chain_desc:0 "เราพบร่องรอยที่อาจจะเป็น ของเบเนแฟกเตอร์ในอดีตของเรา เรา จะ พบ อะไร ที่ ปลาย ทาง นี้?"

 ### On The Shoulders Of Giants CONTINUED - Intercepting History Event Chain
 origin.1335.name:0 "เส้น ทาง เย็น"
 origin.1335.desc:1 "ใน ระหว่าง การ ตรวจ สแกน ระบบ ปกติ ตัว หนึ่ง ของ เรา ได้ รับ สัญญาณ พลัง งาน เล็ก ๆ แต่ แปลก. มันค่อนข้างจะติดตามไอเสีย จากไดรฟ์ฟิวชั่นหรือบางสิ่งบางอย่างที่คล้ายกัน แต่ลายเซ็นไม่ตรงกับสิ่งที่เราได้พบเพื่อให้ห่างไกล ทฤษฎีหนึ่งในหมู่นักวิทยาศาสตร์ของเรา คือเส้นทางของแรงฟิวชั่น อาจเป็นของเบเนซองส์\n\nเราควรมอบหมายให้แผนกประสาทวิทยาของเรา ไปทํางานวิจัยโดยเร็วที่สุด"
 origin.1340.name:0 "การ หา เครื่อง มือ"
 origin.1340.desc:0 "ร่องรอยรถฟิวชั่นเก่าออกมาค่อนข้างท้าทายที่จะ วิเคราะห์เนื่องจากอายุมาก ใน ที่ สุด คณะ วิทยาศาสตร์ ก็ คํานวณ ได้ ว่า มี เครื่อง นํา ทาง ที่ น่า จะ เป็น ไป ได้ และ กําหนด ว่า เส้น ทาง นั้น กําลัง ชี้ ไป ยัง ระบบ ที่ ยัง ไม่ รู้ จัก กัน มา นาน แล้ว มี ไม่ มาก นัก ที่ กระโดด ไป.\n\nจุดหมายปลายทางพร้อมแล้ว และเราควรพิจารณาส่งเรือวิทยาศาสตร์ไปที่นั่น เพื่อตรวจสอบเพิ่มเติม"
 origin.1345.name:0 "ทุ่ง หญ้า แห่ง นี้"
 origin.1345.desc:0 "แม้หลังจากที่อ่านเซ็นเซอร์กว้างครั้งแรก[From.solar_system.GetName]ระบบได้กลายเป็นที่ชัดเจนว่าบางสิ่งบางอย่างมาก ความรุนแรงและการทําลายเกิดขึ้นที่นี่มหายุคที่ผ่านมา\n\nส่วน ต่าง ๆ ของ ยาน ยานอวกาศ ที่ แตก สลาย และ ซาก ปรัก หัก พัง กระจาย อยู่ ทั่ว ระบบ และ โมฆะ ใน ท้อง ถิ่น เต็ม ไป ด้วย กาก พลังงาน ที่ ขาด จาก เลเซอร์ ที่ ใช้ อาวุธ และ การ ระเบิด แบบ ฟิวชั่น.\n\nในสุสานเงียบ ๆ นี้ สัญญาณเดียวได้รับการแยก และมันมาจาก สถานีอวกาศขนาดเล็กที่อยู่ใกล้ ๆ"
 origin.1350.name:0 "การ ล่า และ การ ล่า"
 origin.1350.desc:1 "สัญญาณที่เราได้รับ มาจากยานฉุกเฉิน บนสถานีอวกาศ เนื่องจากได้รับความเสียหายอย่างหนัก สถานีตายทิ้งร่องรอยไว้ไม่กี่อย่าง นักวิทยาศาสตร์ของเราได้จัดการรวบรวม ชิ้นส่วนของข้อมูล เพื่อที่จะสร้างเรื่องราว\n\nสถานีนี้เคยเป็นศูนย์วิจัย และเป็นที่ซึ่งเทคโนโลยีจิตวิทยา-วิพได้ถูกคิดค้นขึ้นมา เทคโนโลยีเดียวกันกับที่ใช้เพื่อทําให้บรรพบุรุษของเราอ่อนแอลง สถานี และ กอง เรือ ป้องกัน ของ ตน ถูก โจมตี โดย กอง กําลัง ที่ ไม่ รู้ จัก บาง กอง หลัง จาก นั้น คง มี การ ขโมย เทคโนโลยี ไป.\n\nข่าวสาร ที่ น่า สนใจ เป็น พิเศษ ได้ รับ การ แปล เป็น เสียง วิทยุ จาก กอง เรือ ของ ศัตรู:\n\n§Yพวกเขากําลังพยายามที่จะหลบหนี! ตามพวกเขาไป ใช้อาวุธของพวกเขาสู้กับพวกเขา ดูพวกเขาชอบมัน.'§!\n\nเราได้เส้นทางของไดรฟ์ฟิวชั่นใหม่ และจัดตั้งเวกเตอร์ทางออกขึ้นมา"
 origin.1351.name:0 "เส้นสิ้นสุด"
 origin.1351.desc:1 "เส้นทางของเบเนแฟกเตอร์ สิ้นสุดลงในระบบที่ยังไม่ถูกสํารวจนี้ เซ็นเซอร์ระยะยาวของเราไม่ได้จับอะไร ที่ผิดปกติ แต่เราควรสํารวจระบบอย่างถูกต้อง"
 origin.1355.name:0 "ส่วนที่เหลือครั้งสุดท้าย"
 origin.1355.desc:1 "เดอะ[GetPreFTLLower]สายพันธุ์ที่พบในระบบนี้ ไม่ใช่ใครอื่น นอกจาก§Y$NAME_ThwaaPhyr$§!เป็นที่รู้จักโดยทั่วไปในวัฒนธรรมของเราว่า§Lคุณสมบัติต่าง ๆ§!.\n\nผู้เชี่ยวชาญด้านประสาทวิทยาของเรา ไม่แน่ใจในรายละเอียด แต่ทุกอย่างชี้ว่า พวกเขาตกเป็นเหยื่อของเทคโนโลยี ไม่มีใครรู้ว่า ผลกระทบของโชคชะตานี้ ดีกว่าเรา\n\nเรา ควร พิจารณา ขั้น ตอน ต่อ ไป อย่าง รอบคอบ."
 origin.1360.name:0 "ปกปิด"
 origin.1360.desc:1 "บาง ครั้ง เหตุ การณ์ ต่าง ๆ ใน เอกภพ เกิด ขึ้น ใน แบบ กวี มาก ที่ สุด. เมื่อเจ้านายที่ไม่สามารถโต้แย้งของบรรพบุรุษของเรา,$NAME_ThwaaPhyr$ใน ที่ สุด สัตว์ ชนิด ต่าง ๆ ก็ ตก เข้า สู่ ชะตากรรม เดียว กับ บรรพบุรุษ ของ เรา.\n\nไม่ ว่า พวก เขา ตั้งใจ จะ ทํา อะไร เรา ต้อง ยอม รับ ข้อ เท็จ จริง ที่ ว่า ใน ระดับ หนึ่ง พวก เขา พยายาม ไถ่ ถอน การ กระทํา ที่ สิ้น หวัง และ เกิน ควร ของ ตน.\n\nตอนนี้ที่มหายุคที่ผ่านมาด้านได้กลับและเราได้กลับ โปรดปรานของพวกเขา\n\nเหมือนกับ[Root.Owner.GetSpeciesName]สายพันธุ์ที่เคยมี ตอนนี้เป็นเวลาสําหรับ$NAME_ThwaaPhyr$ที่ได้เห็นความหมายของการยืนบนบ่าของยักษ์"
 origin.1360.a:0 "โชคดี!"

 PATHFINDING_PROJECT:0 "หาพาธ"
 PATHFINDING_PROJECT_DESC:0 "ร่องรอยฟิวชั่นโบราณ ควรศึกษาต่อไป อาจ เป็น ไป ได้ ที่ จะ แยก จุด หมาย ปลาย ทาง ไม่ ว่า เรือ จะ ปล่อย ไอ เสีย นี้ ไว้."

 INVESTIGATE_THE_DEAD_STATION_PROJECT:0 "ตรวจ สอบ สถานี ตาย"
 INVESTIGATE_THE_DEAD_STATION_PROJECT_DESC:0 "ทั้ง ๆ ที่ มี ความ เสีย หาย อย่าง เห็น ได้ ชัด สถานี อวกาศ ที่ แปลก ประหลาด อาจ มี ข่าวสาร หรือ ชิ้น ส่วน ข้อมูล เก่า ๆ ซึ่ง สามารถ ฉงน ได้ ด้วย กัน เป็น คํา อธิบาย ที่ น่า พอ ใจ สําหรับ สิ่ง ที่ เกิด ขึ้น ที่ นี่ เมื่อ เร็ว ๆ นี้."

 PROJECT_OUROBOROS_PROJECT:0 "โครงการ โอ รู รอส"
 PROJECT_OUROBOROS_PROJECT_DESC:1 "เราได้พบลูกหลานของสายพันธุ์ ที่ครั้งหนึ่งเคยแปลบรรพบุรุษของเรา ... เล็ก ลูก หลาน เหล่า นี้ ตอน นี้ เป็น ผู้ ที่ อ่อนแอ ลง. ดู เหมือน ว่า เอกภพ ไม่ ได้ ปราศจาก ความ รู้สึก ว่า ถูก เยาะ เย้ย. แต่ไม่ว่าจะดีหรือร้าย พวกเขาช่วยเรา เราควรตรวจสอบว่า เราทําอะไรได้บ้าง เพื่อตอบแทนบุญคุณ"

 fusion_drive_trail_object:0 "เส้นทางไดรฟ์การเคลื่อนไหวโบราณ"
 fusion_drive_trail_object_desc:0 "ร่องรอยพลังงานเก่าที่เหลือโดยไดรฟ์ระหว่างดวงดาวฟิวชั่น"
 fusion_drive_trail_object_tooltip:0 "ร่องรอยพลังงานเก่าที่เหลือโดยไดรฟ์ระหว่างดวงดาวฟิวชั่น"

 benefactors_end_poi:0 "ตาม ทาง เดิน"
 benefactors_end_poi_desc:0 "นี่คือจุดหมายปลายทาง ที่ระบุได้โดยเส้นทางของไดรฟ์ฟิวชั่น ที่พบในระบบของเรา"

 benefactors_home_poi:0 "เกือบถึงแล้ว"
 benefactors_home_poi_desc:1 "ระบบนี้ดูเหมือนจะเป็นจุดหมายปลายทางสําหรับยานลําไหนก็ตาม ที่ออกจากสถานีอวกาศที่ตายแล้ว ซึ่งเราได้พบก่อนหน้านี้"

 benefactors_home_poi_2:0 "ค้นหารอบ ๆ"
 benefactors_home_poi_2_desc:0 "ระบบ นี้ ควร ถูก สํารวจ อย่าง ถูก ต้อง โดย เรือ วิทยาศาสตร์ เพื่อ จะ พบ ร่อง รอย ของ เบเนแฟกเตอร์."

 battlefield_debris_object:0 "ความ เสีย หาย จาก ยาน อวกาศ ที่ ถูก ทําลาย"
 battlefield_debris_object_desc:0 "หลาย ล้าน ชิ้น และ ชิ้น ส่วน ที่ กระจัด กระจาย อยู่ ใน การ สู้ รบ ที่ รุนแรง เมื่อ เร็ว ๆ นี้."
 battlefield_debris_object_tooltip:0 "หลาย ล้าน ชิ้น และ ชิ้น ส่วน ที่ กระจัด กระจาย อยู่ ใน การ สู้ รบ ที่ รุนแรง เมื่อ เร็ว ๆ นี้."

 abandoned_station_object:0 "สถานีอวกาศร้าง"
 abandoned_station_object_desc:1 "เสียหายอย่างหนัก แต่ปกติสถานีอวกาศไม่เสียหาย ใช้ทําการวิจัยและพัฒนาบางอย่าง"
 abandoned_station_object_tooltip:1 "เสียหายอย่างหนัก แต่ปกติสถานีอวกาศไม่เสียหาย ใช้ทําการวิจัยและพัฒนาบางอย่าง"

 full_circle:0 "เส้นทแยง"
 full_circle_desc:0 "จักรวรรดิ ของ เรา อาจ ชื่นชม กับ ความ หมาย ของ จุด มุ่ง หมาย และ จุด จบ ที่ เรา ได้ มา โดย การ ช่วย สัตว์ เลี้ยง ใน อดีต ของ เรา."

 NAME_ThwaaPhyr:0 "Thwaa'Phyr"
 NAME_Vemetosha:0 "Vemetosha"

 ### On The Shoulders Of Giants - Benign Cover-Up Arc Site
 site_benign_cover_up:0 "หน้าปกแบบเบนซิน"
 site_benign_cover_up_intro:0 "เราพบสถานที่ที่ดีที่จะฝังแคช วัตถุประสงค์สําหรับ Twaha'Phyr ในขณะที่วันหนึ่งพวกเขาใช้เวลาไปยังดาวใหม่ ของขวัญในอนาคต แด่ยักษ์ในอดีต"
 origin.1365.name:0 "ที่นี่! เราสร้างที่นี่!"
 origin.1365.desc:1 "ทุกคู่และกําลังคน ได้รับการส่งไปยังพื้นผิวของ[From.Planet.GetName]ขั้น ต่อ ไป คือ ฝัง มัน ลึก พอ ที่ จะ ทน การ ทดสอบ ทั้ง เวลา และ อากาศ."
 origin.1365.a:0 "เริ่มขุด!"
 origin.1370.name:1 "ขั้น ที่ 1 ดําเนิน ไป อย่าง ราบ รื่น"
 origin.1370.desc:0 "ความเอื้ออาทรของทรัพยากรและเทคโนโลยี พิมพ์เขียวได้รับการฝังลึกภายใต้พื้นผิวของ[From.Planet.GetName]สัญญาณถูกวางเอาไว้เช่นกัน และในเวลาต่อมา เราได้แต่หวังว่า$NAME_ThwaaPhyr$จะหาเจอ"
 origin.1370.a:0 "ขอให้พวกมันหาทางได้"

  ### On The Shoulders Of Giants - Relentless Pursuit Event Chain
 relentless_pursuit_chain_title:0 "การ มุ่ง ติด ตาม อย่าง ไม่ มี อุปสรรค"
 relentless_pursuit_chain_desc:0 "เราอาจจะสามารถติดตาม ภัยพิบัติในตํานานของอดีต - ผู้ไร้เทียมทาน จะ มี การ คิด บัญชี นาน ตั้ง แต่ นั้น มา ไหม?"

 origin.1380.name:0 "เส้น ทาง ของ ผู้ ชนะ"
 origin.1380.desc:1 "เซ็นเซอร์ของเรา ได้สัญญาณพลังงานแปลกๆ ในระบบของเรา มันเกือบจะออกเป็นข้อผิดพลาดในตอนแรกเมื่อการตรวจสอบอย่างใกล้ชิด การอ่านกลับกลายเป็นเส้นทางพลังงานโบราณ จากไดรฟ์ขับเคลื่อนที่หลอมละลาย\n\nการ วิเคราะห์ ที่ ลึก ซึ้ง กว่า เป็น สิ่ง จําเป็น เพื่อ จะ ทราบ มาก ขึ้น แต่ เป็น ไป ได้ ว่า เส้น ทาง นี้ ถูก ทิ้ง ไว้ โดย คน ที่ ไม่ มี ความ สามารถ พอ เมื่อ พวก เขา ออก จาก ระบบ ของ เรา เมื่อ หลาย พัน ปี มา แล้ว.\n\nเราควรสืบเรื่องนี้ต่อไป"
 origin.1385.name:0 "การ เลือก เส้น ทาง"
 origin.1385.desc:0 "ทั้ง ๆ ที่ มี อายุ มาก จน น่า ทึ่ง คณะ วิทยาศาสตร์ ของ เรา ได้ วิเคราะห์ เส้น ทาง การ ขับ ขี่ ที่ พอ จะ รู้ แน่ ถึง จุด ที่ มัน ออก มา. นี่ หมาย ความ ว่า เรา สามารถ ไล่ ตาม พวก ปิศาจ ใน อดีต ได้.\n\nมีเวลาพอ ที่จะลดความโหดร้ายของพวกเขาโดยสิ้นเชิง หรือเรากําลังจะค้นพบภัยคุกคามใหม่? มีเส้นทางใหม่ที่ถูกวางแผนเอาไว้ และเราสามารถไล่ตามมันเมื่อไหร่ก็ได้ที่เราต้องการ"
 origin.1390.name:0 "ไซเลนท์ เฟรเตอร์"
 origin.1390.desc:0 "เมื่อเข้าสู่ระบบ เซ็นเซอร์ของเรา ก็จับความผิดปกติได้หลายอย่างทันที\n\nการ อ่าน ที่ โดด เด่น ที่ สุด คือ เมฆ พลัง งาน ขนาด มหึมา ซึ่ง เมื่อ ตรวจ สอบ ใกล้ เข้า มา แล้ว ปรากฏ ว่า เป็น เส้น ทาง ขับ เคลื่อน ที่ เล็ก กว่า หลาย ร้อย เส้น เหมือน ที่ เคย มี การ ค้น พบ มา ก่อน. กองเรือใหญ่คงหยุดอยู่ที่นี่ เพราะเหตุผลบางอย่าง\n\nถัดจากนี้ 'ที่จอดรถฟริต'สแกนของเราได้รับชนิดอื่นของการอ่าน: เรือขนส่งน่าเบื่อเรือ ลํา นี้ ดู เหมือน จะ เก่า แก่ พอ ๆ กับ สัญญาณ ของ พลัง งาน แต่ ร่อง รอย ของ สัญลักษณ์ ของ เรือ ลํา นี้ ต่าง จาก ของ กอง เรือ ที่ สูญ หาย ไป.\n\nเราควรจะตรวจสอบเรือร้างใกล้"
 origin.1395.name:0 "อํานาจ ของ พระ ผู้ สร้าง"
 origin.1395.desc:0 "เรือบรรทุกสินค้าบรรจุล็อก แม้ จะ ได้ รับ ความ เสีย หาย เมื่อ เวลา ผ่าน ไป แต่ ข้อมูล บาง อย่าง ก็ ยัง สามารถ กู้ คืน มา ได้.\n\nเรือบรรทุกสินค้าถูกสกัดโดยกองเรือขนาดใหญ่ กัปตันเรือฯ ลงเอยด้วยการสนทนา กับผู้บัญชาการกองเรือไร้ความรับผิดชอบ เห็นได้ชัดว่าพวกเขาพูดมาเป็นอาทิตย์ แต่สิ่งที่พวกเขาพูดถึงนั้นยังไม่ปรากฏ - แม้ว่าวลีที่ 'คุณสมบัติของอํานาจ' จะเกิดขึ้นอีกหลายครั้ง\n\nทันใด นั้น กอง เรือ ก็ ออก จาก ท่า เรือ. รายการสุดท้ายในบันทึกเป็นคําพูดจากผู้บัญชาการ :§Yไม่ ปล่อยพวกเขาไป การทําลายเป็นเรื่องง่าย พลังที่แท้จริงคือความสามารถในการสร้างสรรค์§!\n\nเราได้วิเคราะห์เส้นทางของกองทัพเรือ และอาจใช้เวลาในการแสวงหาของเราอีกครั้ง"
 origin.1400.name:0 "ไทแรนท์พักผ่อนแล้ว"
 origin.1400.desc:0 "นี่คือที่ที่เส้นทางฟิวชั่นสิ้นสุด มันค่อนข้างจะเป็นไปได้ว่า สิ่งมีชีวิตอื่น ๆ ที่ขาดความยับยั้งชั่งใจ - ถ้ามีใด ๆ - จะพบที่นี่\n\nจนถึงตอนนี้ การอ่านเซ็นเซอร์ของความสนใจใด ๆ มาจากสิ่งที่ดูเหมือนจะเป็นชนิดของ สถานีอวกาศขนาดเล็กบาง ชีพจรของพลังงานจะแผ่ออกไป ในระยะที่คงที่ แต่นอกนั้นก็ไม่มีสัญญาณของกิจกรรมใดๆ\n\nเราสามารถดําเนินการสืบสวนได้ทันที"

 TRACKING_THE_PREDATOR_PROJECT:0 "การ ไล่ ตาม ผู้ ล่า"
 TRACKING_THE_PREDATOR_PROJECT_DESC:0 "โดยการวิเคราะห์เส้นทางของไดรฟ์ฟิวชั่นที่แผนกวิทยาศาสตร์ของเรา อาจคิดออกว่าผู้มาเยือนเก่าของเราไปไหน"

 INVESTIGATE_SILENT_FREIGHTER_PROJECT:0 "ตรวจ สอบ ความ เงียบ"
 INVESTIGATE_SILENT_FREIGHTER_PROJECT_DESC:0 "เรือบรรทุกสินค้าที่น่าเบื่อ กําลังรอในเย็นของพื้นที่ มันเก่ามาก แต่ดูเหมือนไม่ถูกทําลาย เราควรส่งทีมเข้าไปตรวจสอบใกล้ๆ"

 OLD_BEACON_PROJECT:0 "การ พินิจ พิเคราะห์"
 OLD_BEACON_PROJECT_DESC:0 "จากคลื่นพลังงานที่เกิดขึ้นบ่อยๆ โครงสร้างพื้นที่เก่านี้ต้องการที่จะพบ เพื่อที่จะคิดออกว่า ทําไมเราจะต้องให้ นักวิทยาศาสตร์ของเราที่จะมองอย่างใกล้ชิด"

 rendezvous_with_freighter_poi:0 "วิ่ง เข้า ไป ใน ไฟ"
 rendezvous_with_freighter_poi_desc:0 "ตามการวิเคราะห์เส้นทางขับเคลื่อนฟิวชั่นในระบบบ้านของเรา นี่คือจุดหมายปลายทางของผู้มาเยือนที่สิ้นหวังจากสมัยก่อน"

 relentless_home_poi:0 "การ พบ ศัตรู เก่า"
 relentless_home_poi_desc:0 "จุดหมายปลายทางของกองเรือไร้ความปราณีขนาดใหญ่ ซึ่งทิ้งระบบนี้ไว้หลายมหายุคที่ผ่านมา หลังจากมีรถบรรทุกพลเรือนวิ่งเข้ามา"

 origin.1405.name:0 "ตัว อย่าง ที่ น่า ยินดี"
 origin.1405.desc:1 "นักวิทยาศาสตร์ได้ตรวจสอบ สถานีอวกาศเก่าเสร็จสิ้นแล้ว โครงสร้างทั้งหมดเป็นปืนใหญ่ขนาดใหญ่ครั้งที่ผ่านมามันจุดชนวนและยิงชีพจรที่แผ่นดินไร้การป้องกัน ชีพจรที่เรา,[Root.Owner.GetSpeciesName]รู้เต็มร้อย§Yชีพจร WIP§!.\n\nในการค้นหาที่จะไถ่ตัวเองจากบาปในอดีตของพวกเขา,§Y$NAME_Vemetosha$§!ใช้อาวุธกับตัวเอง ทําให้อารยธรรมของพวกเขาลดลง\n\nขนาดของการตัดสินใจดังกล่าว - และตาม - ยืนเป็นพันธสัญญา ว่าอย่างจริงจังมาก เราจะให้อภัยพวกเขาได้ไหม"
 origin.1405.a:0 "การ ไม่ รู้ หนังสือ มี ความ สุข จริง ๆ ไหม?"

 site_bury_the_hatchet:0 "ฝังแฮ็กเก็ต"
 site_bury_the_hatchet_intro:0 "สถานที่นี้ได้รับการคัดเลือกจากแผนกโบราณคดี เป็นสถานที่ที่สมบูรณ์แบบในการฝังทรัพย์สิน สําหรับลูกหลานของไร้ความปราณี"
 origin.1410.name:0 "ทําเครื่องหมายจุด"
 origin.1410.desc:0 "ภารกิจใหญ่ในการขนส่งทรัพยากรและเครื่องมืออุตสาหกรรมไป[From.Planet.GetName]เสร็จสมบูรณ์แล้ว ขั้น ต่อ ไป คือ ขุด ลึก เข้า ไป ใน พื้น ดิน และ สร้าง โครง สร้าง ที่ แข็ง แรง พอ ที่ จะ ทน ต่อ ลม ฟ้า อากาศ ที่ แห้ง แล้ง และ การ เปลี่ยน แปลง ของ กระแส ไฟฟ้า."
 origin.1415.name:0 "เชื่อมต่อผ่านดวงดาว"
 origin.1415.desc:0 "การฝังทรัพยากรและเทคโนโลยีอย่างมหาศาล ถูกฝังอยู่ใต้พื้นผิวของ[From.Planet.GetName]เราไม่ทราบว่าถ้าหรือวิธีการที่สมบัติของเราจะถูกค้นพบโดย$NAME_Vemetosha$ลูกหลาน แต่เราสามารถหวังในสิ่งที่ดีที่สุด ใครจะรู้? บางทีในอีกพันปี พวกเขาจะเจอเส้นทางของยานอวกาศของเรา และมาหาเรา"

 origin.1420.name:0 "ไม่ ใช่ ศัตรู"
 origin.1420.desc:0 "บทที่มืดของประวัติศาสตร์จักรวาลได้สิ้นสุดลง และเราได้เขียนบทใหม่ที่สว่างไสว โปรเจกต์ของเราเริ่มสร้างผลเสียต่อสังคมของเรา สมาชิกแต่ละคนรู้สึกถึงเป้าหมายและความตั้งใจที่ดี บางทีอวกาศอาจไม่ใช่ที่มืดมาก หลังจากทั้งหมด - ความมืดที่ไม่อาจจินตนาการ"

 goes_around_comes_around:0 "ไปรอบมารอบ"
 goes_around_comes_around_desc:0 "จักรวรรดิ ของ เรา กําลัง ได้ รับ ผล ดี จาก การ ช่วย เหลือ และ ให้ อภัย ศัตรู ของ อดีต."

 silent_freighter_object:0 "เครื่อง ดักแด้"
 silent_freighter_object_desc:0 "เงียบ แต่ดูเหมือนเรือบรรทุกสินค้าของเอเลี่ยน"
 silent_freighter_object_tooltip:0 "เรือบรรทุกสินค้าต่างดาว"

 mysterious_space_station_object:0 "สถานี อวกาศ ลึกลับ"
 mysterious_space_station_object_desc:0 "ชีพจรของพลังงานที่ออกมา จากสถานีอวกาศร้างนี้"
 mysterious_space_station_object_tooltip:0 "สถานีอวกาศของเอเลี่ยน"

 HAS_FEDERATION_SETTING:0 "$FEDERATION|Y$ไม่มีการตั้งค่า$SETTING|Y$เปิดใช้งาน"
 HAS_NOT_FEDERATION_SETTING:0 "$FEDERATION|Y$มีการตั้งค่า$SETTING|Y$เปิดใช้งาน"
 federation_setting_failed_vote_half_price:0 "ความล้มเหลวครึ่งราคา"
 FEDERATION_RESEARCH_SHARING:2 "$FEDERATION$ การวิจัยการแบ่งปัน:$VALUE|%+=$"
 FINAL_COST:0 "ค่าใช้จ่ายสุดท้าย: $COST$ ($SHIPS|Y$ ยูนิต)"

 ### JUGGERNAUT BUILT EVENT - BUILDER TEXT
 fedev.9500.name:0 "ความ เหนือ กว่า ของ หมึก"
 fedev.9500.desc:0 "การก่อสร้างที่น่าประทับใจของจูเกอร์นอทเสร็จสิ้นแล้ว\n\nเครื่องราชอิสริยาภรณ์เคลื่อนที่นี้ ได้เปลี่ยนแปลงรูปแบบของสงครามอันน่าสะพรึงกลัวโดยสิ้นเชิง มันสามารถสร้างและซ่อมแซมเรือในแนวหน้า และติดตั้งด้วยอาวุธทําลายล้าง อนุญาตให้โจมตีอย่างไม่หยุดหย่อน\n\nมีแต่คนโง่เท่านั้นที่ต่อต้าน[Owner.GetName]เดี๋ยวนี้"
 fedev.9500.a:0 "ออกไปและพิชิต!"

 # JUGGERNAUT BUILT EVENT - OTHER EMPIRES TEXT
 fedev.9505.name:0 "ค่าความจุสูงสุด"
 fedev.9505.desc:0 "มันได้รับการยืนยันแล้วว่า§H[From.Owner.GetName]§!ได้เสร็จสิ้นการก่อสร้างของเรือขนาดใหญ่หมดอายุฐานดวงดาวพกพานี้บรรจุอาวุธที่กว้างขวาง และสามารถสร้างและรักษาเรือที่แนวหน้าของการรบ ทําให้เป็นภัยคุกคามที่เหนือกว่าในทุกสถานการณ์\n\nมันเป็นอาวุธสูงสุดของสงครามอวกาศอย่างแท้จริง"
 fedev.9505.a:0 "เปลี่ยนเกมนิดหน่อย อันนั้น"

 galcom.2.name:0 "ประชาคมกาแล็กติก"
 galcom.2a.desc:0 "ในขณะที่อารยธรรมต่างๆในอวกาศสร้างความสัมพันธ์อย่างเป็นทางการต่อกันมากขึ้น กาแล็กซีก็กลายเป็นสถานที่ที่มีชีวิตชีวา เพื่อหลีกเลี่ยงความเข้าใจผิดระหว่างจักรวรรดิต่างๆและนักการทูตจำนวนมากต่างเรียกร้องให้มีการจัดตั้งองค์กรแพนกาแล็กติกขึ้นใหม่ (ประชาคม) หากคุณต้องการที่ซึ่งจักรวรรดิต่างๆในกาแล็กซีสามารถพบปะเพื่อพูดคุยเรื่องสำคัญๆกันได้\n\n[Root.GetName] ควรให้สนับสนุนการก่อตั้ง §Hประชาคมกาแล็กติก§! หรือไม่"
 galcom.2b.desc:0 "ลองอีกที เราควรตั้งชุมชนกาแล็กซี่ไหม"
 galcom.2.a:0 "ใช่ นี่เป็นความพยายามที่คุ้มค่า"
 galcom.2.b:0 "ไม่ เราไม่มีเวลาสำหรับเรื่องไร้สาระนี้"
 galcom.5.name:0 "กำเนิดประชาคมกาแล็กติก"
 galcom.5.desc:0 "นี่เป็นวันประวัติศาสตร์ หลายอาณาจักรของกาแล็กซี ที่โดดเด่นของอวกาศ รวมถึง[Root.GetName]ได้ประกาศการสร้างสรรค์§Hชุมชน กาแลกติก§!องค์การ นี้ จะ ทํา หน้า ที่ เป็น สยาม ซึ่ง จะ พิจารณา เรื่อง ต่าง ๆ เกี่ยว กับ กาแล็กซี ทั้ง หมด และ ตัดสิน ใจ ได้.\n\nในฐานะหนึ่งในสมาชิกผู้ก่อตั้ง เราสามารถภูมิใจ ในเหตุการณ์สําคัญนี้ในประวัติศาสตร์กาแล็กซี่"
 galcom.5.a:0 "วันที่ดีสำหรับกาแล็กซี!"
 galcom.6.desc:0 "แม้ว่าการตัดสินใจของเราจะไม่ให้การสนับสนุนของเรา ที่อยู่เบื้องหลังการก่อตั้งของบางสถาบันซูเปอร์ราเนชันแนลในนั้น\"ประวัติศาสตร์\" ประกาศร่วมกัน, พวกเขาประกาศการสร้างของ§Hชุมชน กาแลกติก§!ไปยังกาแล็กซี่ องค์กรนี้จะทําหน้าที่เป็นฟอรั่ม ที่สําคัญที่มีผลต่อกาแล็กซี่ทั้งหมด\n\nขณะที่เราปฏิเสธที่จะมีส่วนร่วมในการสร้างชุมชนกาแล็กติกนี้[Root.GetName]ยังไม่ถือว่าเป็นสมาชิก"
 galcom.6.a:0 "พวกหัวสูง"
 galcom.10.name:0 "ไม่ มี การ สนับสนุน ชุมชน กาแลกติก"
 galcom.10.desc:0 "การ ริเริ่ม ก่อ ตัว เป็น ชาติ\"§Hชุมชน กาแลกติก§!\"ล้มเหลว\" ไม่ เพียง พอ ที่ จักรวรรดิ ต่าง ๆ สัญญา ว่า จะ ให้ การ สนับสนุน การ สร้าง สถาบัน ดัง กล่าว."
 galcom.10.a:0 "คนโง่คนอื่นยังไม่พร้อม"
 galcom.10.b:0 "การกําจัดที่ดี!"
 galcom.16.desc:0 "หลายจักรวรรดิท่องอวกาศ พวกเขาบางคนไม่รู้จักเรา ได้รวมตัวกันเป็น\"§Hชุมชน กาแลกติก§!\"\" สถาบัน อุปทาน ระหว่าง ชาติ แห่ง นี้ จะ ทํา หน้า ที่ เป็น สยาม ซึ่ง จะ พิจารณา เรื่อง สําคัญ ได้.\n\nแม้ ว่า เรา ไม่ ได้ มี ส่วน ใน การ ก่อ ตั้ง แต่ นั้น แต่ สมาชิก คน อื่น ๆ ได้ ส่ง คํา เชิญ ไป ยัง[Root.GetName]สําหรับสมาชิกอย่างเป็นทางการ เราควรจะยอมรับไหม?"
 galcom.16.a:0 "ใช่ ให้เราเข้าร่วมชุมชนนี้"
 galcom.16.b:0 "ไม่ เราจะไม่มีส่วนร่วมในเรื่องนี้"
 galcom.16.c: "เราไม่สนใจ \"ความสามัคคี\""

 galcom.51.name:0 "การตั้งสภาปกครองกาแล็กติก"
 galcom.51.desc:0 "วุฒิสมาชิกได้ลงมติให้ตั้งสภาปกครองกาแล็กติกขึ้น การเป็นสมาชิกสภาปกครองนี้จะจำกัดไว้เฉพาะตัวแทนจากสามจักรวรรดิที่ทรงอำนาจและทรงอิทธิพลที่สุดในประชาคม จนกว่าจะมีการเลือกตั้งสมาชิกสภาปกครองใหม่ สมาชิกสภาปกครองปัจจุบันมีดังนี้: §H[council_member_1.GetName]§!, §H[council_member_2.GetName]§!, และ §H[council_member_3.GetName]§!\n\nสมาชิกสภาปกครองได้รับการคาดหวังให้เป็นผู้นำและปกป้องประชาคมกาแล็กติก อำนาจที่เพิ่มขึ้นทำให้พวกเขาสามารถผ่านกฎเกณฑ์บางอย่างที่มักขัดขวางกระบวนการตัดสินใจทางการเมืองขนาดใหญ่ได้"
 galcom.51.a:0 "หวังว่าพวกเขาจะทำหน้าที่ได้สำเร็จ..."
 galcom.51.b:0 "ในที่สุดเราก็สามารถทำสิ่งต่างๆ สำเร็จได้แล้ว!"
 galcom.51.c:0 "ในที่สุดเหล่านักเชิดหุ่นก็เผยตัวออกมาแล้ว!"

 galcom.62.name:0 "[galactic_market_station_system.GetName]เปลื้องผ้าจากสํานักงานใหญ่ตลาดแกแล็กติก"
 galcom.62.desc:2 "19C.สืบค้นเมื่อ19C.[global_event_country.GetGalCommunityOrGalImperium]กฎบัตร มีเฉพาะสมาชิกเท่านั้น ที่จะเป็นเจ้าภาพตลาดกาแล็กติก$galcom.62.base$เดอะ[global_event_country.GetCommunityOrImperium]คณะกรรมการพาณิชย์ได้ออกแถลงการณ์ แสดงความเสียใจต่อสถานการณ์นี้ พวกเขาสัญญาว่าการเสนอชื่อเจ้าภาพใหม่[global_event_country.GetCommunityOrImperium]จะเริ่มทันที"
 galcom.62.base: "ดังนั้น สํานักงานใหญ่ของตลาดใน[galactic_market_station_system.GetName]ระบบถูกยกเลิกแล้ว พวก พ่อค้า กลุ่ม สุด ท้าย ไม่ เต็ม ใจ ทิ้ง โพสต์ ของ ตน ใน ทุก วัน นี้ โดย บ่น เรื่อง การ ก่อกวน อย่าง ใหญ่ โต เพื่อ การ ค้า ที่ น่า ทึ่ง และ ใน สายตา ของ พวก เขา การ เดิน แบบ ไม่ มี เข็ม ได้ ก่อ ให้ เกิด ขึ้น."
 galcom.62.A:0 "มันเป็นราคาที่คุ้มค่า"
 galcom.63.name:0 "สํานักงานใหญ่ใหม่สําหรับตลาดกาแล็กติก"
 galcom.63.desc:2 "กับ[From.GetName]เลือกที่จะทิ้ง[global_event_country.GetGalCommunityOrGalImperium]บทความที่คลุมเครือของ[global_event_country.GetCommunityOrImperium]กฎบัตรต้องนํามาใช้ กับผลกระทบที่เฉพาะสมาชิกของรัฐเท่านั้น อาจเป็นเจ้าภาพในตลาดกาแล็กติก$galcom.62.base$การเสนอชื่อตําแหน่งใหม่ของสํานักงานใหญ่ ได้เปิดทําการแล้ว[global_event_country.GetCommunityOrImperium]คณะกรรมการพาณิชย์ แสดงความเสียใจต่อสถานการณ์นี้ พวก เขา สัญญา ว่า จะ พบ เจ้า บ้าน คน ใหม่ ได้ อย่าง รวด เร็ว."
 galcom.63.A:0 "บางทีนี่อาจเป็นโอกาสของเรา"
 galcom.63.B:0 "เราหัวเราะแต่ความโง่เขลาของพวกเขา"
 galcom.64.name:0 "$galcom.63.name$"
 galcom.64.desc:2 "เดอะ[global_event_country.GetGalCommunityOrGalImperium]ได้พูด และการแข่งขันครั้งใหม่ ได้เริ่มย้ายตลาดกาแล็กติก สํานักงานใหญ่ของตลาดใน[market_founder_planet.solar_system.GetName]ระบบได้เริ่มปฏิบัติการลงลม โดยมีพวกพ่อค้าเน้นเฉพาะการคาดการณ์ พวก เขา โศก เศร้า เนื่อง จาก มี การ แลก เปลี่ยน สินค้า ที่ น่า ทึ่ง และ ไร้ ประโยชน์ นี้ แล้ว.\n\nการเสนอชื่อตําแหน่งใหม่ของสํานักงานใหญ่ ได้เปิดทําการแล้ว[global_event_country.GetCommunityOrImperium]คณะกรรมการพาณิชย์ ออกแถลงการณ์ แสดงความเสียใจในสถานะนี้ พวก เขา สัญญา ว่า จะ พบ เจ้า บ้าน คน ใหม่ ได้ อย่าง รวด เร็ว."
 galcom.69.name:0 "ตลาด กาแล็กซี่ ยัง คง อยู่"
 galcom.69.desc:0 "การย้ายตลาดกาแล็กติกของเราล้มเหลว ขณะ ที่ เรา รวบ รวม เสียง ที่ มี ความ สําคัญ สําหรับ ความ พยายาม นี้ ก็ ไม่ ได้ แปล เป็น การ เสนอ ชื่อ ที่ เหมาะ สม สําหรับ สถาน ที่ แห่ง ใหม่.\n\nแนวคิดนี้ยังคงใช้ได้ตามหลักการ[global_event_country.GetGalCommunityOrGalImperium]อาจ เสนอ จะ ย้าย ตลาด อีก ครั้ง ใน อนาคต หาก เป็น ความ ปรารถนา ดัง กล่าว. สําหรับตอนนี้สถาบันพาณิชย์นี้ยังคงอยู่ในความดูแลที่ร่ํารวยของ[market_founder.GetName]."
 galcom.70.desc:0 "เมื่อ เร็ว ๆ นี้ การ ค้า แบบ กาแลกติก ประสบ กับ การ เปลี่ยน แปลง อย่าง รวด เร็ว และ ทํา ให้ สับสน โดย มี ข่าว ว่า ความ พยายาม จะ ย้าย ตลาด กาแลกติก ล้ม เหลว. แม้ว่า[global_event_country.GetGalCommunityOrGalImperium]'ความประสงค์ที่จะย้ายสถาบันแห่งนี้ไป' พวกเขาไม่ได้รับคําเสนอชื่อให้เป็นเจ้าภาพแทน ผลก็คือ[market_founder.GetName]จะยังคงเป็นโฮสต์ของมันจนกว่าลมแห่งการเปลี่ยนแปลงทางการเมือง จะกลับมาลงประชามติแทน"
 galcom.70.desc.founder:0 "พินัยกรรมทางการเมืองของกาแล็กซี่ ไม่สอดคล้องกับตลาดของมัน หลังจากทําให้เกิดปัญหาทางการเงิน[global_event_country.GetGalCommunityOrGalImperium]ความพยายามในการกําจัดเราในฐานะเจ้าภาพสู่ศูนย์การค้าที่อุทิศตนล้มเหลว ไม่มีจักรวรรดิอื่น ๆ ที่เสนอคําเสนอชื่อให้เว็บไซต์ดังกล่าว\n\nผู้ สนับสนุน การ ดําเนิน งาน นี้ ไม่ หวั่น ไหว ยืน ยัน ว่า ตลาด กาแล็กซี่ อาจ ยัง คง เคลื่อน ที่ อยู่ ไม่ ว่า ที่ ใด และ เมื่อ ไร ก็ ตาม ที่ มี ความ ต้องการ ทาง การ ค้า. สําหรับตอนนี้มันจะดูเหมือนว่าหลังจากที่ทั้งหมด ที่วุ่นวาย, พ่อค้าที่สําคัญของกาแล็กซี"

 origin_fallen_empire:0 "เผ่าพันธุ์โบราณ"
 origin_fallen_empire_desc:0 "อารยธรรม นี้ มี อํานาจ เหนือ เอกภพ ใน ยุค ปัจจุบัน อย่าง มาก. ความ เสื่อม ถอย ของ จักรวรรดิ ค่อย ๆ ลด ลง จน กลาย เป็น เพียง เงา ของ สิ่ง ที่ เคย เป็น."
 origin_enlightened:0 "รู้แจ้ง"
 origin_enlightened_desc:0 "ความ ก้าว หน้า ตาม ธรรมชาติ ของ อารยธรรม นี้ ได้ รับ การ เร่ง ด่วน อย่าง มาก จาก การ แทรกแซง ของ อีก พรรค หนึ่ง ซึ่ง ได้ ช่วย พวก เขา ให้ กลาย เป็น วัฒนธรรม ที่ แผ่ ขยาย ไป ทั่ว โลก."
 origin_fallen_empire_hive: "$origin_fallen_empire$"
 origin_fallen_empire_hive_desc: "$origin_fallen_empire_desc$"

 origin_default_pre_ftl:0 "กำลังพัฒนาอารยธรรม"
 origin_default_pre_ftl_desc:0 "อารยธรรมนี้ยังไม่ได้กลายเป็นการท่องอวกาศ แต่ด้วยการสนับสนุนเล็กน้อยหรือมากของเวลา พวกเขาอาจจะยังกลายเป็นนักแสดงบนเวทีกาแล็กซี่"

 origin_void_dwellers:0 "ผู้อยู่อาศัยในอวกาศ"
 origin_void_dwellers_desc:1 "อารยธรรม นี้ ได้ ทํา ให้ บ้าน ของ มัน อยู่ ใน อวกาศ ตราบ เท่า ที่ ยัง คง มี การ บันทึก เรื่อง ราว ชีวิต ของ ดาว เคราะห์ ใน สภาพ แวด ล้อม ทั่ว ไป เป็น ของ มัน. พวกมันอาศัยอยู่ในสิ่งมีชีวิตในออร์บิทัลหลายแบบ ที่เพิ่งรวมกัน"
