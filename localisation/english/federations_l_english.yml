 origin.10.a.desc:0 "สวัสดี ซื่อสัตย์[Root.GetSpeciesNamePlural]คุณทําดีกับตัวเอง ด้วยคําแนะนําของเรา คุณได้เชี่ยวชาญเทคโนโลยี ของการเดินทางของไฮเปอร์สเปซ และตอนนี้พร้อมที่จะวางลงในดาวเป็นครั้งแรก\n\nไม่ต้องกลัว ถ้าเราไม่คิดว่าคุณพร้อม เราจะไม่ยอมให้เหตุการณ์ต่างๆ เกิดขึ้นกับคุณ ไปตอนนี้และทําให้เราภูมิใจ"
 origin.10.a:0 "ท่านจะทํา"
 origin.10.b.desc:0 "[Root.GetSpeciesNamePlural]ขั้นตอนแรกของการทดลองสําเร็จ เราได้แนะนําคุณ สู่การพัฒนาอารยธรรมครั้งแรก[GetStartingDrivePlural]และตอนนี้คุณพร้อมที่จะใช้เวลาไปยังดาว\n\nเชื่อมั่นในความรู้ ที่ว่าเราจะติดตามความคืบหน้าของคุณต่อไป ตอนนี้ เฟสที่สองได้เริ่มต้นขึ้นแล้ว จนถึงตอนนี้ คุณได้พิสูจน์แล้ว อย่างน่าทึ่ง ไม่เหมือนคนอื่นๆ\n\nมันจะน่าสนใจที่จะได้เห็นสิ่งที่คุณทําให้ของโอกาสนี้"
 origin.10.b:0 "เราจะไม่ทําให้คุณผิดหวัง"

