 START_SCREEN_COMMON_GROUND:1 "หลายทศวรรษที่ผ่านมา เมื่อยานสํารวจแสงดิบแรกของเรา ไปเยี่ยมระบบดาวใกล้ของเราเอง แม้ จะ มี ความ แตก ต่าง กัน อย่าง รุนแรง ใน ด้าน สรีระ ของ เรา แต่ ก็ ปรากฏ ชัด ว่า เรา มี สิ่ง ที่ เหมือน กัน มาก กว่า ไม่ ใช่. เช่นเดียวกับเรา พวกเขายังอยู่บนความจุ ของการปลดล็อค การเดินทางระหว่างดวงดาว\n\nพันธบัตรที่เกิดขึ้นระหว่างสามอารยธรรมของเรา ซึ่งในที่สุดก็นําไปสู่ การเกิดของการหล่อเลี้ยง - เราจะรวมความพยายามของเรา"
