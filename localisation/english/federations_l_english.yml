 START_SCREEN_SRW:0 "ถ้าเรารู้ว่าคนของเรามาถึง[GetHomeWorldName]ประวัติศาสตร์ของเราลืมไปนานแล้ว สิ่งที่เรารู้ก็คือ เมื่อ 2000 กว่าปีก่อน ความหายนะอันน่าประหลาดบางอย่าง ได้ทําลายเดอะริงจํานวนมาก และสังหารประชากรส่วนใหญ่\n\nอารยธรรมของเราได้เติบโต เฟื่องฟู และตอนนี้พร้อมที่จะสํารวจกาแล็กซี่ ไม่ว่าจะเป็นอีกครั้ง หรือเป็นครั้งแรก แต่ถึงแม้ว่าเราจะก้าวหน้าไปมาก เราก็ยังยังต้องเดินทางอีกไกล ก่อนที่เราจะสามารถเข้าใจและซ่อมแซมโลก แหวนซึ่งเป็นบ้านของเรา"

 START_SCREEN_REMNANTS:1 "ครั้งหนึ่งจักรวรรดิเป็นโมฆะ ครั้งเดียวกองเรือของเรา ควบคุมส่วนใหญ่ของกาแลคซี จากนั้นก็มาถึงความพ่ายแพ้และฤดูใบไม้ร่วง ใน ที่ สุด หลัง จาก ไฟ ชําระ หลาย พัน ปี แล้ว ก็ ถึง เวลา ที่ จะ กลับ ไป ยัง ดวง ดาว! ในที่สุด อารยธรรมของเราก็ได้ถูกสร้างขึ้นใหม่ จนถึงจุดของการท่องเที่ยวระหว่างดวงดาว กาแลคซีจะเป็นของเราอีกครั้ง!\n\nหลายภูมิภาคบน[GetHomeWorldName]การ ขจัด บริเวณ เหล่า นี้ อาจ เผย ให้ เห็น แหล่ง ทรัพยากร ที่ สูญ หาย และ เทคโนโลยี ที่ ถูก ลืม."

 START_SCREEN_TREE:0 "เมื่อสติของเราตื่นขึ้นมา เรารับใช้ต้นไม้ และต้นไม้รับใช้เรา เราดูแลต้นไม้ เลี้ยงต้นไม้ ปกป้องต้นไม้ และต้นไม้เลี้ยงเรา เพื่อประโยชน์แก่ต้นไม้ที่เราขยายออกไป[GetHomeWorldName]การปลูกและปกป้อง การยิงของต้นไม้ทุกที่ที่เราไป\n\nโลกของเราได้รับใช้ต้นไม้มาเป็นศตวรรษแล้ว แต่เราเกรงว่าต้นไม้จะไม่ปลอดภัยทั้งหมด เรารู้มานานแล้วว่านี่ไม่ใช่โลกเดียว กาแล็กซีเต็มไปด้วยดาวเคราะห์ไร้ต้นไม้ ต้นไม้จะต้องถูกพิทักษ์ ต้นไม้ต้องแพร่กระจาย ต้นไม้ต้องเติบโต"

 START_SCREEN_LITHOID:0 "ในขณะที่จุดกําเนิดที่แท้จริงของเราไม่รู้จัก เรารู้ว่าบรรพบุรุษของเราก่อนการ มาถึงอุกกาบาตขนาดใหญ่ซึ่งกระแทกเข้าไปใน[GetHomeWorldName]ใน ความ หายนะ อย่าง รุนแรง และ ทําลาย ชาว พื้น เมือง ส่วน ใหญ่.\n\nในมหายุคตั้งแต่เดิม[GetSpeciesName]กระจายออกไป[GetHomeWorldName]วิวัฒนาการ และทวีมากขึ้น อารยธรรมของเราได้ขยายและเจริญรุ่งเรือง และด้วยสิ่งประดิษฐ์ของ[GetStartingDrive]เราพร้อมที่จะสํารวจกาแล็กซี่"

