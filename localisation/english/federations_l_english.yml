 fedel.16.intro:0 "การสังหารหมู่ในสังเวียนมาถึงจุดจบ[winning_leader.GetRulerTitle] §H[winning_leader.GetRegnalName]§!ได้เกิดเป็นผู้รอดชีวิตเพียงคนเดียว เดอะ§H[winning_country.GetName]§!จะนํา[Root.GetAllianceName]สําหรับเทอมต่อไป เมื่อออกจากสนามประลอง ผู้ชนะต้องบอกว่า"
 fedel.16.1:1 "มี... มีหลายอย่าง[Root.GetBloodType]ฉันทําอะไรลงไป?"
 fedel.16.2:0 "มันจบแล้วเหรอ? นี่หมายความว่าฉันชนะเหรอ"
 fedel.16.3:0 "เสียงกรีดร้องของพวกเขา ฉันยังได้ยินเสียงพวกเขา"
 fedel.16.4:0 "มันจบแล้ว มันจบแล้ว มันจบแล้ว"
 fedel.16.5:0 "ฉันรู้สึกเหมือนฉันกําลังจะป่วย"
 fedel.16.6:0 "บอกตามตรง ฉันไม่คิดว่าฉันมีมันในตัว"
 fedel.16.7:0 "อย่าให้เราพูดเรื่องนี้อีก"
 fedel.16.8:0 "มันต้องมีทางที่ดีกว่านี้ ที่จะตัดสินความเป็นผู้นํา"
 fedel.16.9:0 "เสียเวลาเปล่า"
 fedel.16.10:0 "เราต้องไม่ลืมผู้ที่เสียชีวิตที่นี่ในวันนี้"
 fedel.16.11:0 "ขอ ให้ เรา ลืม เรื่อง นี้ เสีย และ มอง ไป ยัง อนาคต."
 fedel.16.12:0 "ระบบป่าเถื่อน แต่ฉันทําในสิ่งที่ต้องทํา"
 fedel.16.13:0 "ไม่มีเกียรติยศในการฆ่าครั้งนี้"
 fedel.16.14:0 "มันเป็นแค่กลยุทธ์"
 fedel.16.15:0 "มันเป็นการต่อสู้ที่ดี อย่าให้ใครอ้างเป็นอย่างอื่น"
 fedel.16.16:0 "พวกเขาต่อสู้อย่างมีเกียรติ ฉันไม่มีความสุขกับการตายของพวกเขา"
 fedel.16.17:0 "ตอนนี้ใครน่าเกลียด หือ?"
 fedel.16.18:0 "ขอให้ผู้ที่ฉันฆ่า พบความสงบสุขในชีวิตหลังความตาย"
 fedel.16.19:0 "ทุกคนที่ข้าฆ่า ต้องเผชิญหน้ากับความตายด้วยความกล้าหาญ ทุกคนยกเว้นคนเดียว"
 fedel.16.20:0 "ฉันไม่เสียใจเลย"
 fedel.16.21:0 "จริง ที เดียว มี ทาง เดียว เท่า นั้น ที่ เรื่อง นี้ จะ จบ ลง ได้."
 fedel.16.22:0 "มันจบแล้วเหรอ?"
 fedel.16.23:0 "ผล เป็น อย่าง ไร?"
 fedel.16.24:0 "ทุกอย่างในชีวิตฉัน นํามาสู่เรื่องนี้"
 fedel.16.25:0 "มันงดงามมาก ข้าจะเก็บความทรงจําไว้"
 fedel.16.26:0 "คนอื่นๆอ่อนแอ ฉันเข้มแข็ง"
 fedel.16.27:0 "เจ้าต้องเอาชนะเเฮร์กวูให้ได้"
 fedel.16.28:0 "คนอื่น ๆ เป็นคนโง่ที่จะก้าวเข้าไปในเวทีที่กับฉัน"
 fedel.16.29:0 "ทุกอย่างกําลังดําเนินไปตามที่ผมมองเห็น"
 fedel.16.30:0 "อย่างที่ฉันคาดการณ์ไว้ ไม่มีคนอื่นคนไหน จะเทียบพลังไซโอนิคฉันได้"
 fedel.16.31.organic: "ฉันทอดคนอื่น ๆ กับความคิดของฉัน"
 fedel.16.31.machine: "ฉันทอดคนอื่น ๆ กับเลือกได้ประมวลผลประสาทของฉัน"
 fedel.16.32.organic: "การต่อสู้ครั้งนี้ไม่มีอะไรเลย ฉันต้องเผชิญกับความน่ากลัวที่เลวร้ายยิ่งกว่าในชรูด"
 fedel.16.32.machine: "สงคราม ครั้ง นี้ เทียบ ไม่ ได้ เลย กับ ความ ซับ ซ้อน ของ ช รู ด."
 fedel.16.33:0 "มันเป็นการต่อสู้ที่ยาก ผมต้องแทนที่อวัยวะอื่น ๆ ด้วยคอมเพล็กซ์"
 fedel.16.34:0 "การปลูกถ่ายอวัยวะภายในของฉัน ไม่ได้ละเมิดกฎของเวที"
 fedel.16.35:0 "การต่อสู้คงจะสั้นกว่านี้ ถ้าพวกนั้นไม่ให้ฉันเอากระสุนออก สําหรับปืนใหญ่สลุ๊กเก็ตภายใน"
 fedel.16.36:0 "เป้าหมายทั้งหมดสิ้นสุดลงแล้ว กําลังปลดขั้นตอนการต่อสู้"
 fedel.16.37:0 "ความเสียหายเล็กน้อย กําลังตรวจภายใน"
 fedel.16.38:0 "ภาระกิจสําเร็จ ผู้นําของสหพันธรัฐปลอดภัย"
 fedel.16.39:0 "ข้าคือผู้ถูกเลือกของชรูด มันเป็นโชคชะตาของข้า"
 fedel.16.40:0 "ฉันโตมากับความเบื่อหน่ายของการฆ่า ให้พวกเราจัดการให้จบๆไป"
 fedel.16.41:0 "ข้าไม่รู้สึกยินดีเลยในการสังหารผู้ที่ไม่สามารถตอบโต้ได้ แต่มันจําเป็นต้องทํา"
 fedel.16.a:0 "มันถูกตัดสินแล้ว"

 fedel.501.name:0 "การ ต่อ สู้ แบบ ทหาร"
 fedel.501.1.desc:0 "$fedel.501.1$\n\n$fedel.501.2$"
 fedel.501.2.desc:0 "$fedel.501.1$\n\n$fedel.501.3$"
 fedel.501.3.desc:0 "$fedel.501.1$"
 fedel.501.4.desc:0 "$fedel.501.1$\n\n$fedel.501.4$"
 fedel.501.1:0 "วิญญาณของ§Hเดอะชราวด์§!เติบโตขึ้นอย่างหงุดหงิดมากขึ้นในขณะที่เวลาใกล้ที่จะตัดสินใจว่าใครควรจะเป็นผู้นํา[Root.GetAllianceName]ในเทอมต่อไป เป็นเวลาสําหรับผู้สมัครที่มีประสิทธิภาพมากที่สุด[GetPsychicNounPlural]ไปยังการเดินทาง[fed_leader.Capital.GetName]เมืองหลวงของประธานาธิบดีปัจจุบัน ที่ นั่น พวก เขา จะ พบ กัน เพื่อ ทํา สงคราม จน กว่า จะ ถึง จุด สุด ยอด เท่า นั้น."
 fedel.501.2:0 "เพื่อเพิ่มพลังให้กับแชมป์ไซโซนิคของเรา เราสามารถเจาะระบบ Zro ได้ มันจะทําให้เราได้เปรียบมากขึ้นในการรบ"
 fedel.501.3:0 "เราเข้าถึงข้อมูลไม่พอ[GetPsychicNounPlural]เพื่อเข้าร่วม โชคไม่ดี และต้องพ่ายแพ้ต่อการต่อสู้"
 fedel.501.4:0 "เราไม่ใช่รัฐอิสระ จึงถูกปิดกั้นจากการมีส่วนร่วม"
 fedel.501.a:0 "เราสามารถเสียสละจํานวนเล็กน้อย"
 fedel.501.b:0 "จัดหาของเรา[GetPsychicNounPlural]ด้วยปริมาณที่เที่ยงตรง"
