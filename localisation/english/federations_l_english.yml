 # Anomalies
 ####################################

 SEA_CRYSTAL_CAT:0 "จํานวนครั้งที่เล่น"
 SEA_CRYSTAL_CAT_DESC:0 "แสงดาวสามารถมองเห็นได้การตกแต่งภาพออกวัตถุขนาดใหญ่ผิดปกติเพียงภายใต้พื้นผิวของมหาสมุทรของ[Root.GetName]."

 WENKWORT_CAT:0 "สวน พฤกษศาสตร์"
 WENKWORT_CAT_DESC:0 "โลก ทั้ง สิ้น นี้ น่า สงสัย อย่าง ผิด ปกติ อาจ เป็น เช่น นั้น ก็ ได้. มี พลัง อะไร บ้าง ที่ ทํา ให้ เกิด เหตุ การณ์ นี้?"
 federations3.115.name:0 "เครื่องหมายคํานวณ"
 federations3.115.desc:0 "การ ออก แบบ แบบ ที่ ให้ ความ งาม บาง รูป แบบ มี การ ใช้ มาก กว่า พื้น ผิว ส่วน ใหญ่ บน[From.GetName]นักวิทยาศาสตร์ของเราสงสัยว่า แม้แต่พื้นที่ที่เหลือ 'การสัมผัส' ก็เป็นเพียงการประดิษฐ์พื้นที่ป่า - มีให้บริการเป้าหมายการเกษตรที่กว้างขึ้น\n\nนําไปสู่ข้อสรุปของการวิจัยของเรา เราบังเอิญพบสัญญาณ - ตัวอย่างเดียวของเทคโนโลยีในโลกนี้ เมื่อเปิดใช้งาน มันจะอัพโหลดแคตตาล็อกของพืชและสัตว์ทุกชนิดที่พบบน[From.GetName]รวมทั้งคําแนะนําอ้างอิงที่อยู่ใกล้ๆ[event_target:wenkwort_rellrait.GetName]ไม่มีวี่แววว่า จะระบุนักออกแบบดาวเคราะห์ได้"

 ####################################
 # Country Events
 ####################################
 federations3.100.name:0 "จํานวนครั้งที่เล่น"
 federations3.100.desc:0 "ในตอนแรก ทุกอย่างเกี่ยวกับ[From.GetName]ดูเหมือนปกติและปกติ ในระหว่างการเรียงตัวของโอกาส นักวิทยาศาสตร์บนเรือ[Root.GetName]สังเกตเห็นแสงดาวสะท้อนปิดเลนส์กว้างใกล้พื้นผิวด้านล่าง สแกนเนอร์ได้รับการฝึกอย่างรวดเร็วบนวัตถุคริสตัล ซึ่งกว้างเป็นขนาด พอประมาณของเกาะ\n\nProbe Telemry ชี้ให้เห็นว่า โครงสร้างเคมีของเลนส์นี้มีมูลค่าสูงมาก โครงสร้างทางกายภาพของมัน อาจมีลักษณะเฉพาะภายในดาราจักรของเรา"
 federations3.100.a:0 "เป็นทรัพยากรที่มีค่า ของเราที่จะใช้ประโยชน์"
 federations3.100.b:0 "ความ งาม ที่ หา ยาก นี้ ควร ปล่อย ให้ ทุก คน ชื่นชม."

 ####################################
 # Colony Events
 ####################################
 colony_fed.100.name:0 "โครีที่เป็นไปไม่ได้"
 colony_fed.100.desc:1 "ความผิดปกติทางธรณีวิทยา ได้ทําให้เราสนใจ[Root.GetName]เราเริ่มสํารวจ หลังจากภาวะซึมเศร้ารูปชาม จู่ๆก็โผล่มา ข้างๆ กับโรงงานเหมืองแร่ที่นั่น ลักษณะเช่นนี้เกือบจะไม่เคยถูกพบนอกของขอบเขตเลเยอร์แต่คนแปลกหน้ายังคง : ผนังของ'เสียง'นี้แสงที่กระจัดกระจายในรูปแบบดอกไม้และได้รับการค้นพบเพื่อสะท้อนเมื่อสัมผัส การสืบสวนยังดําเนินต่อไป"

 colony_fed.105.name:0 "โครงการบลูโลตัส"
 colony_fed.105.desc:1 "นักวิทยาศาสตร์ของเรารายงานว่า การปกปิดใหม่ ผลึกสีฟ้า[Root.GetName]ตอบสนองอย่างช้า ๆ พลังงานโฟตอน แร่ธาตุกรองความยาวคลื่นของมัน และสะท้อนแสง ซึ่งสามารถเปลี่ยนแปลงความซับซ้อนธรรมดา ให้กลายเป็นอัลลอยชนิดใหม่\n\nเนื่องจากกระบวนการนี้ เกี่ยวข้องกับการกระดอนของรังสี ในระดับที่สูงรอบพื้นที่ที่ปิดสนิท นักวิทยาศาสตร์บางคนได้ออกมาประท้วงแล้ว นักวิจัยกลุ่มอื่น ๆ ที่ตื่นเต้น เสนอการต่อต้าน ความเครียดที่ปรากฏการณ์นี้สามารถปฏิวัติ ไม่ ว่า จะ อย่าง ไร การ พัฒนา เทคนิค นี้ ต่อ ไป จะ มี ราคา แพง."
 colony_fed.105.gestalt.desc:0 "โดรนตัวโกงถูกพบว่าทํางานโครงการของมันเอง ในรอบปี[Root.GetName]ผลักดันโดยคําสั่งเริ่มต้น - การขัดวิธีการสกัดแร่ของเรา - มันได้สะดุดวิธีการของ\n\nกระบวนการนี้ดูเหมือนจะเกี่ยวข้องกับ การกระดอนคานไฟฟ้าสูง จากแร่ธาตุที่ฝังอยู่ในผนัง ความกระตือรือร้นของโดรนในหน้าที่ของมัน ทําให้พื้นที่น้ําท่วม ด้วยรังสีในระดับที่มากเกินไป ด้วยเหตุนี้จึงถูกแยกออกมา อยู่ระหว่างการย้ายถิ่นฐาน หรือการทําลายปัจเจกบุคคล และได้รับความรู้"
 colony_fed.105.a:0 "นํามันกลับไปที่พับ"
 colony_fed.105.b:0 "มาดูกันว่างานวิจัยนี้จะเป็นยังไง"
 colony_fed.105.c:0 "หยุดการทดลองทันที"
 colony_fed.105.d:0 "กําจัดโดรนซะ"

 colony_fed.106.name:0 "ผู้แทนราษฎร"
 colony_fed.106.desc:0 "ภาพ ที่ น่า เศร้า ใจ บน[Root.GetName]ในฐานะกลุ่มนักวิทยาศาสตร์ที่หมกมุ่น พยายามจะแทรกแซงการยุติโครงการ ด้วยงานวิจัยของตนเอง พวกเขาพยายามที่จะทําลายการควบคุม ของการทดลองแปรรูป เพื่อผลประโยชน์ของวิทยาศาสตร์ใหม่ ผล ที่ ตาม มา คือ การ บิด เบี้ยว ทํา ให้ เครื่อง มือ ได้ รับ ความ เสีย หาย และ การ ทิ้ง ระเบิด ได้ ยึด ไว้.\n\nสิ่งที่เหลืออยู่ของสีคือสิ่งที่เพิ่ม% 1กับ ภูมิศาสตร์: เปลือกหินรอบสิ่งที่เคยเป็นอุปกรณ์และการประท้วง ตอนนี้สร้างใหม่ในรูปแบบคริสตัล"

 colony_fed.107.name:0 "นักเล่นแร่แปรธาตุ"
 colony_fed.107.desc:0 "โดรนที่ดื้อด้าน และการค้นพบของมันได้รับการกวาดล้างเรียบร้อยแล้ว ผล จาก การ ทดลอง ที่ เกิด ขึ้น อย่าง ฉับ พลัน ของ มัน บัด นี้ ทํา ให้ ภูมิ ประเทศ เกลื่อน กลาด ไป; วัตถุ ที่ เป็น ประโยชน์ จํานวน เล็ก น้อย ถูก นํา กลับ คืน มา."

 colony_fed.110.name:0 "ความ เจ็บ ปวด ทาง จิตใจ"
 colony_fed.110.desc:0 "ห้องทดลองบน[From.GetName]คือการให้ผลที่ยืนยันได้ แม้ กระบวนการ ของ พวก เขา จะ ยัง คง มี อยู่ เพียง เล็ก น้อย เท่า นั้น ที่ สามารถ นํา หิน เข้า ไป เป็น อัล ลอย ได้ แต่ นัก วิจัย ก็ มี ความ หวัง สูง สําหรับ การ ดําเนิน งาน ที่ ใหญ่ กว่า. พวกเขาขอเข้าถึงทรัพยากรเพิ่มเติม"
 colony_fed.110.gestalt.desc:0 "การทดลองโกงบน[Root.GetName]กําลังให้ผล แม้ กระบวนการ นี้ จะ ยัง คง มี อยู่ เพียง เล็ก น้อย เท่า นั้น ที่ สามารถ นํา สสาร เข้า ไป ใน โลหะ ชนิด ใหม่ นี้ แต่ บัด นี้ การ ทดลอง สามารถ ยืน ยัน ได้. นี่น่าจะเหมาะกับความพยายามที่ทุ่มเทมาก"

 colony_fed.111.name:0 "การยุบตัวของโลตัส"
 colony_fed.111.desc:0 "การทดลองแปลงสภาพ[From.GetName]ล้มเหลว แม้ว่าความล้มเหลวของพวกเขา อาจป้องกันหายนะในอนาคตได้ เมื่อ เครื่อง มือ ใหม่ ๆ ที่ ปรับ ปรุง ใหม่ ๆ ถูก นํา ขึ้น มา ใช้ ใน อินเทอร์เน็ต เป็น ครั้ง แรก เครื่อง มือ นี้ จะ ทํา งาน ได้ ดี ภาย ใน การ ยอม รับ การ ออก แบบ. อย่างไรก็ตาม เมื่อออกคําสั่งปิดลง กระบวนการเร่งเกินเอื้อมของความปลอดภัยที่ล้มเหลว การแปลงสภาพไปยึดบ้านของสิ่งอํานวยความสะดวก ดัดแปลงมัน และสภาพแวดล้อมเป็นอัลลอยชนิดเดียวกัน\n\nการ ระเบิด ของ พื้น ดิน ได้ คร่า ชีวิต ผู้ คน ไป มาก มาย พร้อม กับ พื้น ที่ รอบ ๆ ด้วย. เราเหลือเพียงเศษเสี้ยวเล็กๆ ของวัสดุที่ดี และเรื่องเล่าเตือนในเรื่อง อภิปรัชญา"
 colony_fed.111.a:0 "อย่าพยายามอีกเลย"

 colony_fed.115.name:0 "อัลเชมี่ แบบ สเปกตรัมเต็ม"
 colony_fed.115.desc:0 "ขั้นตอนต่อไปของโรงงานผลิตของเรา ได้มาออนไลน์ ตอนนี้ศูนย์คริสตัลบลูโลตัส กําลังง่วนอยู่กับการเปลี่ยนแปลง วัสดุพื้นฐานที่ไม่เคยมีมาก่อน ให้เป็นอัลลอยที่มีประโยชน์"
 colony_fed.115.a:0 "การค้นพบที่ยิ่งใหญ่"
 colony_fed.115.b:0 "จับตาดูให้ดี..."

 colony_fed.120.name:0 "โลตัส กิน เอง"
 colony_fed.120.desc:0 "ความล้มเหลวอันร้ายแรง ได้เกิดขึ้นในการทดลอง[Root.GetName]ผู้ดําเนินรายการบอกว่าเราอาจจะไม่รู้ ว่าอะไรเป็นสาเหตุของความล้มเหลวในการควบคุม แต่ผลที่ได้คือ การหลบหนีของอุปกรณ์ วัตถุ ที่ อุดม สมบูรณ์"

 ####################################
 # Special Research Projects
 ####################################
 BLUELOTUS_SCALE_PROJECT:0 "รูปลักษณ์ของโลตัสสีน้ําเงิน"
 BLUELOTUS_SCALE_PROJECT_DESC:0 "มันคิดว่าคุณสมบัติที่โดดเด่น สะท้อนของปรากฏการณ์ทางภูมิศาสตร์นี้ อาจถูกควบคุม เพื่อเปลี่ยนฐานหินเป็นอัลลอยที่เหนือกว่า"

 WENKWORT_PROJECT:0 "ดิน แดน ที่ สะอาด"
 WENKWORT_PROJECT_DESC:0 "สันเขาโค้งได้รับการประทับใจบนพื้นผิวของ[event_target:wenkwort_rellrait.GetName]ม. มี วัตถุ ประสงค์ อะไร ไหม สําหรับ การ ออก แบบ พวก เขา? มีความสัมพันธ์อะไรกัน$wenkwort_drone_plural$ในระบบนี้?"
 federations3.135.name:0 "ภูเขา และ แม่น้ํา แห่ง[event_target:wenkwort_rellrait.GetName]"
 federations3.135.human.desc:0 "ถ้ามันไม่ได้สําหรับขนาดที่แท้จริงและห่างไกลจาก[Owner.Capital.GetName], §Y[event_target:wenkwort_rellrait.GetName]§!อาจจะเข้าใจผิดว่า เราสร้างสวนขึ้นมา พื้น ผิว ของ เกาะ นี้ กว้าง ใหญ่ และ มี ภูมิ ประเทศ ที่ แข็ง แกร่ง ซึ่ง มี หิน ทับ ถม อยู่ ตั้ง แต่ ก้อน หิน เล็ก ๆ จน ถึง ดาว เคราะห์ น้อย. ผู้ คง แก่ เรียน ของ เรา สังเกต ความ ถูก ต้อง แม่นยํา ทาง อัลกอริทึม ของ ภาพ ที่ ดู เหมือน ของ น้ํา และ แผ่น ดิน. มันยังคงอยู่อย่างไม่เป็นระเบียบ แต่อย่างใดก็หย่าจากรูปแบบธรรมชาติ - เหมือนการเลียนแบบการศึกษา\n\nไม่ ว่า จะ มา จาก แหล่ง ใด ก็ ตาม มี ความ เกี่ยว พัน ที่ ชัดเจน ระหว่าง โลก ที่ ถูก สร้าง ขึ้น ใหม่ นี้ กับ โลก§Y$wenkwort_drone_plural$§!ซึ่งเพิ่งเกิดขึ้นจากพื้นผิวของมัน อย่าง ไร ก็ ตาม การ พยายาม สืบ หา ต้น กําเนิด ของ มัน ไม่ ได้ ผล.\n\nบางทีการที่เราถูกพามายังดาวเคราะห์ดวงนี้ อาจจะเป็นคําใบ้ ที่คําตอบของคําถามมากมาย"
 federations3.135.nonhuman.desc:0 "รูปทรงขนาดใหญ่เรขาคณิตบน[event_target:wenkwort_rellrait.GetName]แน่นอน ไม่ ใช่ ต้น กําเนิด ตาม ธรรมชาติ. ภูมิทัศน์ของดาวเคราะห์ดวงนี้ ถูกเตือนให้ระลึกถึงทะเลที่กว้างใหญ่และเต็มไปด้วยฝุ่น อุดตันด้วยหินที่มีขนาดตั้งแต่หินก้อนเล็กๆ จนถึงดาวเคราะห์น้อยที่ตกลงมา\n\nนักวิจัยของเราสรุปว่าภูมิทัศน์นี้น่าจะเป็นชิ้นศิลปะ หรืออื่น ๆ เป็นส่วนหนึ่งของการปฏิบัติพิธีกรรมบาง - อย่างไรก็ตาม§Y$wenkwort_drone_plural$§!เราเห็นก่อนหน้านี้ ความพยายามของเราในการย้อนรอย ต้นกําเนิดของพวกเขาไม่ได้รับผลลัพธ์ บางทีเวลาอาจจะบอก..."

 ####################################
 # Archaeology Sites
 ####################################
 relicrails_digsite:0 "รี ลิก ริล"
 relicrails_digsite_desc:0 "ถ้ําล่าสุดบน[From.Planet.GetName]ได้เปิดเผยเครือข่ายอุโมงค์ใต้ดิน ซุ้ม โค้ง ที่ ประณีต และ อุปกรณ์ ส่ง สัญญาณ ที่ ซับ ซ้อน ของ มัน ได้ วาง อยู่ โดย ไม่ มี การ ค้น พบ มา หลาย ศตวรรษ แล้ว การ ออก แบบ ของ มัน ไม่ เหมือน สิ่ง อื่น ใด ที่ เรา ได้ พบ ใน ภูมิภาค นี้ ของ อวกาศ. ใคร สร้าง และ ทําไม?"
 federations3.1005.name:0 "เดอะชราวด์"
 federations3.1005.desc:0 "พวกถ้ําลึกได้เขย่า โครงการก่อสร้างใหม่ล่าสุดของเราบน[From.Planet.GetName]โครงสร้างพื้นฐานของเราไม่ได้รับผลกระทบ อย่าง ไร ก็ ตาม กิจกรรม ทาง ธรณี วิทยา นี้ ได้ เผย ให้ เห็น ส่วน หนึ่ง ของ อุโมงค์ ขน ส่ง. นัก สํารวจ ที่ อับอาย ได้ เริ่ม มอง ดู รูป ร่าง ของ ตน ทันที แล้ว. ดูเหมือนว่า[From.Planet.GetName]มีประวัติมาก่อน"
 federations3.1010.name:0 "การ ทิ้ง ของ เสีย"
 federations3.1010.desc:0 "ไม่นานก่อนที่การขุดเจาะของเรา จะเผยให้เห็นอุโมงค์และเครื่องมือ ของการก่อสร้างและการออกแบบที่ซับซ้อนมากขึ้น รางหินและสลีปเปอร์ถูกเก็บรักษาไว้และยังคงสมบูรณ์ ล้อมรอบไปด้วยวัตถุโบราณมากมาย และขยะที่เก่าแก่หลายศตวรรษ\n\nในหมู่เศษที่อยู่หลายโหนดพอดีชิ้นส่วนของเครื่องยนต์และเครื่องมือส่งสัญญาณเช่นหนึ่งอาจจะพบใน§Yคลังเก็บค่าซ่อมบํารุง§!ทุก อย่าง มี การ จารึก ด้วย ราย ละเอียด อัน โดด เด่น ด้วย รูป แบบ ทาง เรขาคณิต ที่ ซับ ซ้อน ซึ่ง แสดง ถึง ความ สง่า ผ่าเผย สูง และ อาจ ถึง กับ หยิ่ง ทะนง ด้วย ซ้ํา."
 federations3.1015.name:0 "ผู้ มา เยี่ยม ที่ ดี เยี่ยม"
 federations3.1015.desc:0 "การขุดเจาะของเราแคบ ด้านข้างของทะเลได้เปิดเผย ที่อยู่อาศัยตายยาวตาย ซึ่งตายโดยการยุบเพดาน ประวัติบางส่วน§Y800 ปี§!การ ที่ พวก เขา อยู่ ใน อุโมงค์ นี้ เป็น เรื่อง ของ ปริศนา ซึ่ง แก้ ได้ เฉพาะ เมื่อ เรา ศึกษา อาวุธ หลาย อย่าง ที่ พบ บน ตัว เขา.\n\nเทคโนโลยี ที่ อยู่ เบื้อง หลัง เครื่อง มือ ที่ ทํา ด้วย ใบ มีด เหล่า นี้ ซึ่ง หลาย ชิ้น ติด ตั้ง อยู่ ข้าง ใน ราง รถไฟ ที่ ไม่ มี การ ติด ต่อ กัน เป็น วิธี พื้น ฐาน เมื่อ เทียบ กับ ของ เรา เอง แต่ ก็ ต่าง กัน อย่าง เห็น ได้ ชัด กับ ที่ ใช้ บน ทาง รถไฟ. ผู้มาเยือนที่ถือผ้าใบนี้ เป็นพวกนอกโลกอย่างที่เราเป็น และดูเหมือนพวกเขาได้ทําการวิจัยทางโบราณคดีที่คล้ายกัน"
 federations3.1015.a:0 "แปลการค้นพบของพวกเขา"
 federations3.1020.name:0 "ทาร์จ-เบียร์"
 federations3.1020.desc:0 "บันทึกของผู้ติดตามของทาร์จ นําเราไปสู่§Yสถานีย่อยไฟฟ้า§!ซึ่งครั้งหนึ่งเคยให้บริการสนามบํารุงรักษานี้ ดูเหมือนว่าการเดินทางของพวกเขายากจน แมวน้ําชั้นบรรยากาศบน สถานที่; มีสัญญาณเกือบไม่กี่ ท่อที่หุ้มด้วยฝุ่นเป็น ลําไส้ใหญ่รอบหลายสิบจอ มันเป็นหนึ่งในขั้นตอนดังกล่าวของจอ ที่เราพบร่องรอยจาก§Yความรู้ของสายพันธุ์อื่น§!.\n\nการสํารวจของเส้นทแยงได้อธิบายว่า นี่เป็นกลุ่มของช่างโมลัสโคด ร่างที่ยังคงมั่นคงอยู่ บันทึกยังบันทึกการพยายามซ้ํา สถานีย่อยเก่าพันปี โดยใช้เครื่องมือที่ด้อยกว่าของเรา มันมีโอกาสที่เราจะทําสําเร็จ และในการทําเช่นนั้น ทําให้การค้นหามากขึ้น"
 federations3.1021.name:0 "คัฟ ที่ น่า เศร้า"
 federations3.1021.desc:0 "เพียงไม่กี่นาทีหลังจากที่เรากระโดดเริ่ม สถานีย่อยบน[From.Planet.GetName]ใช้เครื่องกําเนิดระยะพกพา โรงงานมีสัญญาณเตือน สอง วินาที ต่อ มา ส่วน หนึ่ง ของ เพดาน และ ส่วน หนึ่ง ของ กําแพง ที่ ติด กับ ทาง รถไฟ ก็ พัง ลง ซึ่ง ทีม ขุด ค้น ของ เรา กําลัง ทํา งาน อยู่ ที่ นั่น.\n\nความผิดพลาดถูกติดตามมา§Rขดลวดกันลม§!ซึ่งเราคิดว่าเป็นการตัดการเชื่อมต่อ โอเวอร์ไซท์นี้ทําให้เกิดการบาดเจ็บหลายครั้ง และได้ผนึกชะตาของสมาชิกเป็นโหลของทีมขุดของเรา ตอนนี้พวกเขาทําตามรอยเท้าอันน่าสลดใจของผู้อาศัย"
 federations3.1022.name:0 "บนแทร็กเสียงที่แตกต่างกัน"
 federations3.1022.desc:0 "สิ่ง ล้ํา ค่า นี้ ของ สถานีย่อย ทํา ให้ เรา ประหลาด ใจ ด้วย ความ ซับ ซ้อน ของ มัน. เราเริ่มใช้งานมันโดยใช้เครื่องกําเนิดระยะพกพา แต่การระเบิดที่เกิดขึ้นตามมาของกิจกรรม ที่ก่อให้เกิดส่วนหนึ่งของโครงสร้างเก่าพันปีรอบตัวเราที่จะยุบ\n\nโชคดีที่ทีมของเรา มีคําเตือนมากพอที่จะหาที่พัก พวก เขา ได้ พบ บริเวณ บาง แห่ง ซึ่ง ตอน นี้ ปิด อย่าง มั่นคง แต่ บริเวณ ใหม่ บาง แห่ง ได้ เปิด แทน."
 federations3.1026.name:0 "กลับ ไป รับ ใช้ อีก"
 federations3.1026.desc:0 "การซ่อมแซมสถานที่ขุดเจาะโดยอุบัติเหตุของเรา เผยให้เห็นอุโมงค์รถไฟระยะไกลลงไป ซึ่งตามแผงควบคุมที่เราถอดรหัส ระบบเดียวกันนี้ ได้ใช้เครื่องหมายต่าง ๆ ที่มีความสําคัญต่อรถไฟ รวมถึงคําที่เราระบุได้ว่า§Yคลังสื่อ§!.'\n\nมี การ ส่ง ทีม ไป เพื่อ ให้ รถไฟ เคลื่อน ย้าย อีก ครั้ง หนึ่ง เนื่อง จาก ไม่ ค่อย มี สิ่ง ของ สําคัญ ใด ๆ มา หา เรา ใน รูป แบบ ที่ ใหญ่ ขนาด นี้. ทางรถไฟโบราณเป็นชิ้นส่วนที่งดงามของวิศวกรรม ในตัวของมันเอง แต่ทุกคันของรถที่ถูกจําแนกอย่างประณีต\n\nรถไฟอาจถูกบรรยายได้ดีที่สุดว่าเป็นแคปซูลเวลา ที่เดินทางได้ พร้อมที่จะย้ายออกจากเส้นทางของอันตราย 3,000 ปีมาแล้ว ที่ได้เก็บรักษาบันทึกทางประวัติศาสตร์ วัฒนธรรม และวิทยาศาสตร์ของวัฒนธรรมทั้งหมด ซึ่งปัจจุบันเราได้เรียนรู้ว่า§Ypyeps§!."
 federations3.1026.a:0 "นําบันทึกเหล่านี้กลับไปที่โลกของเรา สําหรับการศึกษาเพิ่มเติม"
 federations3.1027.name:0 "ไม่ ได้ รับ การ ยอม รับ แต่ เป็น เชด ที่ ว่าง เปล่า"
 federations3.1027.desc:0 "การ ปรับ ปรุง ใหม่ โดย บังเอิญ ของ เรา เกี่ยว กับ สถาน ที่ ขุด นี้ ได้ เผย ให้ เห็น สวน สินค้า ซึ่ง สกัด จาก ใต้ หลังคา ถ้ํา อัน กว้าง ใหญ่ และ มี ห้อง เก็บ ของ. จากจํานวนมากของคลังสินค้าที่กว้างขวางและว่างเปล่ามีเพียงหนึ่งแมวน้ํารักษาความปลอดภัยที่สะดุด; เมื่อเปิดมันอีกครั้งเราพบว่าส่วนที่เหลือของคนของทาร์จพวกเขามาหาเสบียง เพียงเพื่อล้มความเหม็น ของระบบเตือนภัยเก่าพันปี\n\nตามบันทึกที่พวกเขาทิ้งเอาไว้§Yนิพจน์ Fenruer Group§!'กําลังสืบสวนอยู่'[From.Planet.GetName]เป็นส่วนหนึ่งของการสํารวจโลก พวกเขาไม่คาดว่าจะเจอซากปรักหักพังที่นี่ โดย ไม่ ได้ รับ การ ฝึก อบรม และ ไม่ สนใจ ใน โบราณคดี พวก เขา ขุด ค้น สถาน ที่ นั้น แทน ที่ จะ ตรวจ สอบ.\n\nคน เหล่า นั้น ที่ ประสบ กับ ความ อดอยาก ใน คลัง หนังสือ นั้น มี ภาษา ที่ มี สี สัน เป็น พิเศษ ซึ่ง สหาย ของ พวก เขา ได้ ขน เอา สิ่ง ของ จํานวน มาก ไป ให้ กับ เรือ บรรทุก ของ พวก เขา ทิ้ง ไว้ เพียง เล็ก น้อย. การสํารวจของเราเองยืนยันว่า แม้จะมีเครื่องจักรโบราณมากมาย แต่ยังมีสิ่งอื่นอีกที่บอกเราได้"
 federations3.1030.name:0 "รา และ ที่ ลี้ ภัย"
 federations3.1030.desc:0 "บันทึกที่เหลือโดยผู้สร้างรถไฟของ[From.From.Planet.GetName]บอก วิธี ที่ ฝูง โม ลลัส โค ดิด ที่ มี ใจ แรง กล้า นี้ หนี ออก จาก บ้าน เกิด เมือง นอน ของ พวก เขา โดย พยายาม จะ ปรับ ปรุง ตัว ให้ ดี ขึ้น โดย ใช้ เครื่องจักร. พวกเขาถอยออกมาสู่ความลับ และเครือข่ายห่างไกลของ§Yถ้ําใต้ดิน§!ต่อ มา เชื่อม ต่อ และ ขยาย ถิ่น อาศัย โดย ทาง อุโมงค์ รถไฟ.\n\nด้วย ความ กลัว ว่า จะ มี การ ล่า สัตว์ และ กําจัด วัฒนธรรม ของ พวก เขา ใน วัน หนึ่ง พวก เพ อี ป์ จึง สร้าง ความ ปลอด ภัย และ การ อนุรักษ์ ไว้ อย่าง ลึก ซึ้ง. สังคมของพวกเขาเติบโตช้ากว่า 200 ปีข้างหน้า ในขณะที่เวลาดังกล่าว รัฐบาลบ้านเกิดของพวกเขาหันมากขึ้น สวิงครั้งเดียวรุนแรงกระตุ้นพวกเขาในการทหารในระดับที่ไม่เคยมีมาก่อน; ณ จุดนี้สิ้นสุดอย่างฉับพลัน\n\nแม้จะมีผู้ติดตามของทาร์จอยู่ก็ตาม เราก็สามารถคาดเดาได้เฉพาะ ชะตากรรมอันน่าสลดของทั้งคู่ หลัก ฐาน ทาง โบราณคดี เพิ่ม เติม ได้ สูญ หาย ไป หรือ ไม่ ก็ ไม่ ได้ รับ การ บันทึก; ซาก ปรัก หัก พัง ทั้ง หมด ของ เปอาย ป์ ใน ปัจจุบัน ก็ คือ อุโมงค์, บันทึก และ รถไฟ ของ พวก เขา."

