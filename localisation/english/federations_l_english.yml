 origin_void_machines_desc: "ในตอนแรก ผู้สร้างอารยธรรมจักรกลนี้ ออกแบบพวกเขาสําหรับการท่องอวกาศตลอดกาล หลัง จาก อยู่ โดด เดี่ยว นาน หลาย ปี เครื่อง เหล่า นี้ ได้ ฟื้นฟู เอกภาพ ใน หมู่ ถิ่น อาศัย ของ ออร์บิทัล ที่ กระจัด กระจาย อยู่ ทั่ว ระบบ บ้าน ของ ตน เมื่อ ไม่ นาน มา นี้."
