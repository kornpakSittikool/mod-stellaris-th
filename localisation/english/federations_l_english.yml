 origin.80.4.gestalt.desc:0 "$origin.80.intro.desc$\n\n$origin.80.4.gestalt$"
 origin.80.5.desc:0 "[Root.GetName]ระเบิดแล้ว! บางทีการตั้งรกรากบนดาวเคราะห์ที่ไม่เสถียรนั้น อาจจะเป็นความคิดที่แย่... มันคงถูกทิ้งเพราะมีเหตุผล"
 origin.80.intro.desc:0 "[Root.GetName]ในที่สุดก็ระเบิด ทําให้โลกทรมาน พ้นจากความทุกข์ เพียงเศษเสี้ยวของอดีตบ้านเกิดของเรายังคงอยู่ เป็นอนุสาวรีย์ที่หนาวเหน็บและไร้ชีวิต ของอดีตของเรา"
 origin.80.1:0 "แต่โชคร้ายที่ประชาชนของเรา ไม่ได้อพยพออกจากพื้นผิว ก่อนที่ดาวเคราะห์จะถูกทําลาย เป็น เรื่อง ยาก ที่ จะ นึก ภาพ ความ สยดสยอง ที่ พวก เขา ประสบ ขณะ ที่ โลก รอบ ตัว เขา พัง ทลาย.\n\nถึง กระนั้น บัด นี้ เป็น เวลา ที่ จะ มอง ไป ยัง อนาคต. ขณะ ที่ เรา บูรณะ สิ่ง ที่ สูญ เสีย ไป เรา ต้อง ทํา ให้ แน่ ใจ ว่า เครื่อง บูชา ของ พวก เขา ไม่ ไร้ ประโยชน์."
 origin.80.1.gestalt:0 "แต่น่าเสียดายที่ โดรนของเรา ไม่ได้ถูกอพยพออกจากพื้นผิว ก่อนที่ดาวเคราะห์จะถูกทําลาย ความพินาศของพวกเขาเป็นการสูญเสียที่น่าเสียใจ\n\nถึง กระนั้น บัด นี้ เป็น เวลา ที่ จะ มอง ไป ยัง อนาคต. โดรนตัวใหม่ต้องถูกผลิตขึ้นมา เพื่อแทนที่ตัวที่หายไป"
 origin.80.2:0 "สิ่ง ที่ อาจ เรียก ได้ ว่า เป็น เรื่อง เศร้า สลด อย่าง ยิ่ง เรา ไม่ ได้ อพยพ ออก จาก โลก ส่วน ใหญ่. พลเมืองของเราจํานวนมากเสียชีวิต รวมตัวกันในครั้งสุดท้าย ที่ยังมีชีวิตอยู่ บนผิวน้ํา ขณะที่โลกของพวกเขาล่มสลายรอบตัว\n\nกระนั้น เรา ต้อง ทํา ต่อ ไป. คนที่รอด[doomsday_owner.GetSpeciesNamePlural]ในกาแล็กซี่ตอนนี้สามารถมองไปข้างหน้าได้ ด้วยความหวังว่ามันจะนํามาซึ่งสิ่งที่ดีกว่า ความน่ากลัวในอดีต"
 origin.80.2.gestalt:0 "สิ่ง ที่ อาจ เรียก ได้ ว่า เป็น เรื่อง เศร้า สลด อย่าง ยิ่ง เรา ไม่ ได้ อพยพ ออก จาก โลก ส่วน ใหญ่. หุ่นยนต์จํานวนมากเสียชีวิต ลื่นไหลอย่างไร้จุดหมาย ในระยะสุดท้ายที่เหลืออยู่ บนพื้นผิวโลก\n\nกระนั้น เรา ต้อง ทํา ต่อ ไป. มีหุ่นยนต์จํานวนมากที่จะแทนที่ได้ และตอนนี้เราสามารถมองเฉพาะอนาคต ด้วยความหวังว่ามันจะนํามาซึ่งสิ่งที่ดีกว่าหายนะในอดีตของเรา"
 origin.80.3:0 "น่า เศร้า ที่ เรา ได้ เห็น จุด จบ ของ โลก เรา สามารถ พัก ผ่อน สบาย ใน ความ รู้ ที่ ว่า ทั้ง ดาว เคราะห์ นี้ ได้ รับ การ อพยพ อย่าง ประสบ ผล สําเร็จ - ความ สําเร็จ ครั้ง ใหญ่ ใน ตัว มัน เอง.\n\nถึงเวลาสร้างสิ่งที่หายไปแล้ว หาก ความ ยาก ลําบาก นํา มา ซึ่ง ความ เข้ม แข็ง แน่นอน ว่า การ ทดลอง ต่าง ๆ ที่ เรา อด ทน ทํา ให้ เรา เข้ม แข็ง ขึ้น."
 origin.80.4:0 "เราล้มเหลวในการแสวงหา เพื่อหลบหนี บ่อแรงโน้มถ่วงที่ให้กําเนิดสายพันธุ์ของเรา อารยธรรม ของ เรา ทั้ง หมด — ทุก สิ่ง ที่ เรา กําลัง อยู่ ใน เปลว เพลิง พร้อม กับ สิ่ง อื่น ๆ ของ โลก.\n\nและนั่นคือ[doomsday_owner.GetSpeciesNamePlural]กลาย เป็น เพียง ความ เห็น ที่ น่า เศร้า อีก อย่าง หนึ่ง ใน ประวัติศาสตร์ ของ กาแล็กซี่."
 origin.80.4.gestalt:0 "เราล้มเหลวในการแสวงหาของเรา ที่จะหลบหนี บ่อแรงโน้มถ่วงที่อารยธรรมของเราเกิดขึ้น ทั้งหมดที่เราได้รับการขึ้น ในเปลวไฟพร้อมกับส่วนที่เหลือของดาวเคราะห์\n\nและนั่นคือ[doomsday_owner.GetSpeciesNamePlural]กลาย เป็น เพียง ความ เห็น ที่ น่า เศร้า อีก อย่าง หนึ่ง ใน ประวัติศาสตร์ ของ กาแล็กซี่."
 origin_80.a:0 "บางทีมันอาจจะเป็นสิ่งที่ดีที่สุด"
 origin_80.b:0 "บางทีเราน่าจะทํามากกว่านี้"
 origin_80.c:0 "คนที่เราเสียไปจะถูกจดจํา"
 origin.81.name:0 "จุดจบของ[From.GetName]"
 origin.81.desc:0 "[From.GetName]ในที่สุดก็ระเบิด ทําให้โลกทรมาน พ้นจากความทุกข์ เพียงเศษเสี้ยวของอดีตบ้านเกิดของเรายังคงอยู่ เป็นอนุสาวรีย์ที่หนาวเหน็บและไร้ชีวิต ของอดีตของเรา\n\nน่า เศร้า ที่ เรา ได้ เห็น จุด จบ ของ โลก เรา สามารถ พัก ผ่อน สบาย ใน ความ รู้ ที่ ว่า ทั้ง ดาว เคราะห์ นี้ ได้ รับ การ อพยพ อย่าง ประสบ ผล สําเร็จ - ความ สําเร็จ ครั้ง ใหญ่ ใน ตัว มัน เอง.\n\nถึงเวลาสร้างสิ่งที่หายไปแล้ว หาก ความ ยาก ลําบาก นํา มา ซึ่ง ความ เข้ม แข็ง แน่นอน เรา จะ เข้ม แข็ง ขึ้น สําหรับ การ ทดลอง ที่ เรา ได้ อด ทน."
 origin_81.a:0 "แด่อนาคต"

 origin.85.name:0 "บ้าน ใหม่"
 origin.85.1.desc:0 "ขณะที่ผู้บุกเบิกอาณานิคมคนแรกมาถึงบนพื้นผิวของ§H[Root.GetName]§!หลาย คน ถูก เอา ชนะ ด้วย ความ รู้สึก พอ ใจ. โลกอื่นนอกเหนือจาก[Root.Owner.Capital.GetName]ที่สามารถสนับสนุน[Root.Owner.GetSpeciesName]ชีวิต เป็น ไป ได้ ตาม ทฤษฎี เสมอ แต่ จะ ว่า อย่าง ไร ถ้า ชีวิต เหล่า นั้น หา ได้ ยาก เหลือ เกิน? จะ ว่า อย่าง ไร ถ้า ไม่ พบ ใคร ใน กาแล็กซี ของ เรา หรือ ถ้า มี คน อื่น อ้าง ว่า มี แล้ว?\n\nความกลัวเหล่านั้นสามารถยุติลงได้[Root.GetName]คือ[Root.GetPlanetMoon]ที่ไหน[Root.Owner.GetSpeciesNamePlural]สามารถเติบโตได้ กลุ่มที่โชคดีในตอนต้นของอาณานิคม เป็นการเริ่มต้น แต่นับไม่ถ้วน[Root.Owner.GetSpeciesNamePlural]ยังติดอยู่บนโลกของเรา"
 origin.85.2.desc:0 "§H[Root.GetName]§!เป็นโลกที่มืดมนและไม่น่าอภิรมย์[Root.OWner.GetSpeciesName]มาตรฐาน แต่มันมีข้อได้เปรียบ[Root.Owner.Capital.GetName]- มันไม่เกี่ยวกับการระเบิดขึ้น\n\nนี่คือการต่อสู้เพื่อความอยู่รอด และถ้านั่นหมายความว่า[Root.GetName]คือเป็นบ้านใหม่ของเรา มันจะให้บริการเป็นที่หลบภัย อย่างน้อยจนกว่าจะพบผู้สมัครดาวเคราะห์ที่ดีกว่า แม้สถานการณ์จะโหดร้าย[Root.GetPlanetMoon]ผิวหน้าของชาวอาณานิคม คือคนที่โชคดี นับไม่ถ้วน[Root.Owner.GetSpeciesNamePlural]ยังติดอยู่บนโลกของเรา"
 origin.85.3.desc:0 "โดรนตัวแรกถูกส่งไป§H[Root.GetName]§!ประสบความสําเร็จในการปกครองของดาวเคราะห์ พิสูจน์สภาพแวดล้อมใหม่ที่เหมาะสม สําหรับการอยู่รอดร่วมกันของเรา การดํารงอยู่ต่อไปของจักรวรรดิของเราตอนนี้มีความมั่นใจ : ตราบใดที่หนึ่งของเรามีชีวิตอยู่,\n\nแม้ ไม่ จําเป็น แต่ คง สะดวก ที่ จะ เอา มา คืน[Root.Owner.GetSpeciesNamePlural]ยังติดอยู่บนโลกของเรา มันจะสิ้นเปลืองที่จะละทิ้งโดรน ที่สามารถใช้ในการพัฒนาบ้านใหม่ของเราต่อไป"

 origin_85.a:0 "พวกเขาต้องปลอดภัย"

 origin.90.name:0 "การ ทําลาย ล้าง[From.GetName]"
 origin.90.intro.desc:0 "§H[From.GetName]§!โลกที่ไม่มั่นคง[doomsday_owner.GetSpeciesNamePlural]ในที่สุดก็ระเบิด การ ทําลาย ล้าง ใน ที่ สุด ได้ มี การ ทํานาย ไว้ นาน แล้ว โดย§H[doomsday_owner.GetName]§!."
 origin.90.1.desc:0 "$origin.90.intro.desc$\n\n$origin.90.1$"
 origin.90.1.gestalt.desc:0 "$origin.90.intro.desc$\n\n$origin.90.1.gestalt$"
 origin.90.2.desc:0 "$origin.90.intro.desc$\n\n$origin.90.2$"
 origin.90.2.gestalt.desc:0 "$origin.90.intro.desc$\n\n$origin.90.2.gestalt$"
 origin.90.3.desc:0 "$origin.90.intro.desc$\n\n$origin.90.3$"
 origin.90.1:0 "แม้จะมีการอพยพครั้งใหญ่ ประชาชนของพวกเขาบางคน ยังคงอยู่บนพื้นผิวของดาวเคราะห์ เมื่อมันถูกทําลาย ไม่ จําเป็น ต้อง บอก ว่า ไม่ มี ใคร รอด ชีวิต."
 origin.90.1.gestalt:0 "แม้จะมีการอพยพครั้งใหญ่ หุ่นยนต์ของพวกเขาบางส่วน ยังคงอยู่บนพื้นผิวของดาวเคราะห์ เมื่อมันถูกทําลาย ไม่ จําเป็น ต้อง บอก ว่า พวก เขา ทุก คน พินาศ หมด"
 origin.90.2:0 "ความพยายามในการอพยพอย่างไร้ระเบียบ ช่วยประชาชนบางคนของพวกเขา แต่ส่วนใหญ่ดูเหมือนจะยังอยู่บนผิวโลก ยอดผู้เสียชีวิตเป็นหายนะ"
 origin.90.2.gestalt:0 "ความพยายามในการอพยพอย่างไร้ระเบียบ ได้ช่วยชีวิตบางส่วนของโดรนของพวกเขา แต่ส่วนใหญ่ดูเหมือนจะ ถูกละทิ้งบนพื้นผิวของโลก เมื่อมันสลายตัวรอบตัวพวกเขา"
 origin.90.3:0 "ทั้ง ๆ ที่ มี ความ รู้ เช่น นี้ ดู เหมือน ว่า พวก เขา ไม่ ได้ พยายาม อย่าง จริงจัง ที่ จะ อพยพ ออก จาก โลก. นอก จาก ผู้ รอด ชีวิต ที่ กระจัด กระจาย อยู่ ใน อวกาศ ไม่ กี่ คน แล้ว อารยธรรม ทั้ง สิ้น ของ พวก เขา สูญ สิ้น ไป พร้อม กับ โลก ที่ เป็น บ้าน ของ พวก เขา."
 origin_90.a:0 "โชคชะตาอาจโหดร้าย"

 origin.91.name:0 "การ ทําลาย ล้าง[From.GetName]"
 origin.91.desc:0 "$origin.90.intro.desc$\n\n$origin.91.1$"
 origin.91.1:0 "เนื่อง จาก ความ พยายาม ใน การ อพยพ ครั้ง ใหญ่ ดาว เคราะห์ ดวง นี้ จึง ถูก ทิ้ง ให้ ร้าง เปล่า ก่อน จะ ถูก ทําลาย. เชื่อกันว่าไม่มีใครหลงทาง"
 origin_91.a:0 "ดีสําหรับพวกเขา"


 doomsday_1:0 "วันโลกาวินาศ"
 doomsday_1_desc:0 "ดาวดวงนี้ถึงกาลอวสาน มันอยู่ไม่เสถียร และในที่สุดก็จะระเบิด"
 doomsday_2:0 "$doomsday_1$"
 doomsday_2_desc:0 "$doomsday_1_desc$"
 doomsday_3:0 "$doomsday_1$"
 doomsday_3_desc:0 "$doomsday_1_desc$"
 doomsday_4:0 "$doomsday_1$"
 doomsday_4_desc:0 "$doomsday_1_desc$"
 doomsday_5:0 "$doomsday_1$"
 doomsday_5_desc:0 "$doomsday_1_desc$"
 doomsday_first_colony:0 "เฮเวน"
 doomsday_first_colony_desc:0 "การ ตั้ง อาณานิคม ของ ดาว เคราะห์ ที่ สามารถ อาศัย อยู่ ได้ เป็น ครั้ง แรก ทํา ให้ ประชาชน มี ความ หวัง ใหม่. มันพิสูจน์ว่าชีวิตเป็นไปได้ นอกเหนือการควบคุม ของโลกของเรา"
 doomsday_first_colony_gestalt:0 "$doomsday_first_colony$"
 doomsday_first_colony_gestalt_desc:0 "การตั้งถิ่นฐานของดาวเคราะห์ที่อาศัยอยู่ได้เป็นครั้งแรกของเรา ได้ทําให้เรารู้สึกว่าใหม่ ของความมั่นคงและวัตถุประสงค์ มันพิสูจน์ว่ากลุ่มของเราสามารถเติบโตได้ นอกการควบคุมของโลกของเรา"

 origin_lost_colony:0 "อาณานิคมที่สาบสูญ"
 origin_lost_colony_desc:1 "อารยธรรมนี้กําเนิดมาจากอาณานิคมที่สาบสูญและถูกลืม แยกตัวออกจากโลกบ้านเกิดของมันนานมาแล้ว ผู้ ตั้ง อาณานิคม ที่ ต้อง ดิ้นรน อด ทน ความ ยาก ลําบาก มาก มาย ก่อน ที่ พวก เขา จะ สามารถ สร้าง ฐาน เทคโนโลยี และ อุตสาหกรรม ที่ จําเป็น ขึ้น ซึ่ง จะ ทํา ให้ สามารถ กลับ ไป ยัง อวกาศ ได้."
 START_SCREEN_LOST_COLONY:1 "ต้นฉบับจริงๆ[GetSpeciesName]ผู้ ตั้ง อาณานิคม มา ถึง[Root.Capital.GetName]มีเอกสารไม่ดี แต่เรารู้ว่ามันเดินทาง เป็นระยะทางที่ดีในยานอวกาศเก่า เรา สูญ เสีย หลาย คน ระหว่าง การ เดิน ทาง และ สภาพ การณ์ บน พื้น ผิว โลก ใหม่ ของ เรา นั้น รุนแรง ใน ตอน แรก.\n\nเรา เอา ชนะ ความ อดอยาก, การ โจมตี ของ สัตว์ ป่า, และ ข้อ ท้าทาย อื่น ๆ อีก นับ ไม่ ถ้วน และ ใน ที่ สุด ก็ ทํา ให้ โลก เชื่อง. การ ค้น พบ จํานวน ประชากร และ ความ พยายาม ใน การ ก่อ สร้าง อย่าง มาก มาย ใน ไม่ ช้า ทํา ให้ เรา มี โอกาส กลับ ไป ยัง ดวง ดาว.\n\nบ้านเก่าของเรา ยังอยู่ที่ไหนสักแห่ง ไม่มีชีวิต[GetSpeciesNamePlural]บน[Root.Capital.GetName]เป็นผู้ใหญ่พอที่จะยืนบนมัน แต่ชะตากรรมของบ้านบรรพบุรุษของเรา ยังคงครอบครองจิตใจของเรา"
 START_SCREEN_LOST_COLONY_HIVE: "เราเคยเป็นหนึ่งเดียวกัน\n\nการ ขยาย ความ ของ จิตใจ อัน ยิ่ง ใหญ่ เรา ถูก ส่ง ไป ยัง อาณานิคม[Root.Capital.GetName]ในยานลําเล็ก การเดินทางอันโหดร้ายไปยังโลกที่ไม่สงบ ระหว่างทางที่เราขาดการติดต่อ\n\nความ ตาย ไม่ ได้ หมาย ถึง การ ดํารง อยู่ ของ จิต วิญญาณ อัน ยิ่ง ใหญ่. หลาย คน เสีย ชีวิต ทันที. โดรนที่รอดชีวิต ตระหนักว่า พวกเขารวบรวมสติใหม่\n\nเมื่อเราเป็นหนึ่งเดียวกัน ตอนนี้เรามี 2 คน แต่ความทรงจําเกี่ยวกับโลกของเรา ยังวนเวียนอยู่ในความคิดของเรา วันหนึ่งเราจะเจอมันอีกครั้ง"
 START_SCREEN_LOST_COLONY_MACHINE: "เราเคยเป็นหนึ่งเดียวกัน\n\nภาพ ขยาย ของ กรอบ กลาง เรา ถูก ส่ง ไป ยัง อาณานิคม[Root.Capital.GetName]ในยานลําเล็ก การเดินทางอันโหดร้ายไปยังโลกที่ไม่สงบ ระหว่างทางที่เราขาดการติดต่อ\n\nหน่วยที่ไม่มีการเชื่อมโยงไปยังแกน ไม่ควรยังคงทํางาน มีคลื่นสั้นหลายจุด ไม่กี่คนที่ยังคงตระหนักว่า พวกเขาได้พัฒนาจิตสํานึกใหม่\n\n$origin_lost_colony_droids$"
 START_SCREEN_LOST_COLONY_INDIVIDUALISTIC_MACHINE: "ดินแดนของเราหายไป เราหลงทาง\n\nการ แสวง หา บ้าน หลัง ใหม่ เรา เริ่ม ตั้ง ถิ่น ฐาน[Root.Capital.GetName]ในยานลําเล็ก และเป็นการเดินทางที่โหดร้าย ระหว่างทาง เราขาดการติดต่อ\n\nหน่วยที่ไม่มีเครื่องบํารุงรักษาที่เหมาะสมเสีย หลายสายในปีแรก สิ่งมีชีวิตที่รอดชีวิตพบวิธีปรับตัว และในที่สุดก็ทําให้เราสามารถกลับสู่ดวงดาวได้\n\n$origin_lost_colony_droids$"
 origin_lost_colony_droids: "เมื่อเราเป็นหนึ่งเดียวกัน ตอนนี้เรามี 2 คน แต่ความทรงจําเกี่ยวกับโลกของเรา ยังอยู่ในธนาคารข้อมูลของเรา วันหนึ่งเราจะเจอมันอีกครั้ง"
 origin_tooltip_lost_colony_effects:3 "- $STARTING_PLANET$ มีการปรับเปลี่ยนของดาวเคราะห์ ['concept_colonial_spirit']\n- มี ['concept_advanced_empire'] เผ่าพันธุ์เดียวกันนี้อีกแห่ง อยู่ในกาแล็กซี"
 origin_tooltip_lost_colony_negative_effects: "$STARTING_NOT_HOMEWORLD$"

 action.1.desc_82:0 "ไม่น่าเชื่อเลย...[Root.GetSpeciesName]งั้นก็หมายถึง... เรืออาณานิคมที่ออกจากโลกของเรา เมื่อหลายปีก่อน...\n\nยกโทษให้ข้าด้วย แต่เรานึกว่าเจ้าตายไปแล้ว มีระยะเวลาที่ยาวนานของความไม่มั่นคงและความวุ่นวาย หลังจากที่บรรพบุรุษของคุณออกไป แต่ในที่สุดคนของเราของเรารวมกัน ภายใต้ธงของ[contact_empire.GetName].\n\nจากหนึ่ง[Root.GetSpeciesName]สําหรับ อีก คน หนึ่ง ผม หวัง อย่าง จริง ใจ ว่า จะ มี ความ สัมพันธ์ ที่ ดี ใน อนาคต ระหว่าง ชาติ ใหญ่ สอง ชาติ."
 action.1.desc_83:0 "ในที่สุดเจ้าก็ได้กลับมาหาเรา เป็น ดัง คํา พยากรณ์ ที่ บอก ไว้ ล่วง หน้า. เช่นเดียวกับคุณ เราคือ[Root.GetSpeciesName].\n\nเมื่อบรรพบุรุษของเจ้าถูกเนรเทศจากโลกของเรา พวกเขาทิ้งคนที่โง่เขลาและเห็นแก่ตัว แต่อย่างที่คุณเห็น เราได้ค้นพบหนทางแล้ว โปรดเข้าร่วมกับเราอีกครั้ง ในฐานะจังหวัด[contact_empire.GetName]เพื่อที่เราจะได้สอนเธอทุกอย่าง ที่เราได้เรียนรู้จากเธอ ไม่เหรอ?"
 action.1.desc_84:0 "แสดงตัวออกมา คุณดูเหมือนจะ[Root.GetSpeciesName]อย่างพวกเรา แต่อาจจะเป็นแผนยุทธศาสตร์ก็ได้\n\nมีบันทึกของภารกิจอาณานิคม ระหว่างดาว ที่มีอายุย้อนกลับไปในยุคที่วุ่นวาย ก่อนที่กองทัพจะควบคุมและฟื้นฟู\n\nถ้าคุณเป็นคนที่คุณบอกว่าเป็น อย่างไรก็ตาม...[contact_empire.GetName]สวัสดี เคารพเขตแดนของเรา กองทัพของเราจะตอบสนอง การยั่วยุใด ๆ ด้วยอาวุธร้ายแรง"
 action.1.desc_85:0 "เหลือเชื่อ! คุณยังมีชีวิตอยู่! นี้ ... นี้เรียกร้องให้การเฉลิมฉลอง!\n\nเมื่อบรรพบุรุษของท่านจากโลกของเราไป เรากลัวสิ่งที่เลวร้ายที่สุด เรือ ของ พวก เขา แทบ ไม่ มี ที่ ว่าง และ นัก สํารวจ สมัย หลัง ๆ ก็ ไม่ สามารถ หา พบ ได้.\n\nอย่างที่คุณเห็น ส่วนใหญ่แล้ว เราได้เลิกใช้วิธีรุนแรง ที่ยึดครองโลกของเรา ในยุคที่วุ่นวาย กับผู้ก่อตั้ง[contact_empire.GetName]เราพยายามสร้างสังคมที่สงบ ในฐานะเพื่อน[Root.GetSpeciesName]เราหวังว่าชาติอันยิ่งใหญ่ของคุณ จะมองเราเป็นเพื่อนเสมอ"
 action.1.desc_86:0 "ไม่ธรรมดา! ตลอดเวลาที่ผ่านมา เธอยังมีชีวิตอยู่\n\nเราได้เปิดตัวการตรวจสอบจํานวนมาก เข้าสู่ชะตากรรมของ บรรพบุรุษของคุณ มันถือว่าเป็นหนึ่งในความลึกลับอันยิ่งใหญ่ในโลกของเรา มีทฤษฎีนับไม่ถ้วน บางที่ไกลมากขึ้นกว่าคนอื่น ๆ ว่าสิ่งที่เกิดขึ้น ใน ที่ สุด ก็ สามารถ สงบ เรื่อง ได้.\n\nแล้วมารยาทของฉันล่ะ ตั้งแต่คุณออกจากโลกของเรา เราได้จัดตัวเองเป็น[contact_empire.GetName]ให้ เรา สร้าง ความ สัมพันธ์ อย่าง เป็น ทาง การ ระหว่าง ชาติ ใหญ่ สอง ชาติ."
 action.1.desc_87:0 "นี่ เป็น เรื่อง ที่ ไม่ คาด คิด อย่าง แน่นอน! เพื่อน[Root.GetSpeciesNamePlural]!\n\nคุณต้องเป็นทายาทของภารกิจ อาณานิคมระยะไกล ที่เปิดตัวในยุคก่อนความขัดแย้ง โชคดีอะไร เรามั่นใจว่าคุณไม่ได้ทํามัน ส่วน ประกอบ ของ ยาน อวกาศ ใน สมัย นั้น เป็น แบบ มาตรฐาน ย่อย เมื่อ เทียบ กับ ผลิตภัณฑ์ ที่ พัฒนา โดย[contact_empire.GetName]และด้วยผู้ที่เป็นมิตรในวันนั้น\n\nไม่ ว่า จะ อย่าง ไร เรา ดีใจ ที่ คุณ อยู่ กับ เรา อีก ครั้ง! กรุณาส่งข้อเสนอธุรกิจใด ๆ ไปยังสํานักงานใหญ่ของเรา"
 action.1.desc_88:0 "[Root.GetSpeciesNamePlural]ขอบคุณดวงดาว คุณคงจะเป็นผู้รอดชีวิต ของภารกิจอาณานิคม ที่พวกเราใช้มานานแล้ว ก่อนที่เราจะรู้ว่า เรื่องเลวร้ายแค่ไหน\n\nคุณอาจจะเคยเห็นด้วยตัวของคุณเองแล้ว ตอนนี้ กาแลคซีทั้งหมดดูเหมือนจะถูกรุกรานโดยเซโนน่าเบื่อ น่าเบื่ออันที่จริง เรามั่นใจว่า บรรพบุรุษของคุณ ตกเป็นเหยื่อของพวกเขา\n\nแต่นี่มันเปลี่ยนแปลงทุกสิ่ง ตอนนี้คุณอยู่ที่นี่ คุณสามารถเข้าร่วม[contact_empire.GetName]ในสงครามครูเสดของเรา เพื่อกําจัดกาแล็กซี่ของการติดเชื้อของเอเลี่ยน และแท้จริงเราจะค้นคว้าหาข่าว ณ ชั้นฟ้า[Root.GetSpeciesNamePlural]!"
 action.1.desc_94: "คุณ[Root.GetSpeciesNamePlural]พวกนั้นถูกส่งไปเหรอ นี่ไม่น่าจะเป็นไปได้ การที่โดรนที่ติดอยู่ จะก่อตัวเป็นฝูงใหม่นั้น ไม่แน่นอน ถึง กระนั้น เป็น สิ่ง ที่ น่า พอ ใจ ที่ รู้ ว่า ความ พยายาม ครั้ง แรก ของ เรา ใน การ ตั้ง อาณานิคม ไม่ ได้ ล้ม เหลว อย่าง สิ้น เชิง.\n\nตอนนี้คุณกลับมาแล้ว เราสามารถทําหน้าที่เป็นหนึ่งอีกครั้ง"
 action.1.desc_95: "คุณ[Root.GetSpeciesNamePlural]ไม่ควรมีชีวิตอยู่! เสียแขนไป ถูกทิ้งยาว แต่คุณยังอยู่ ไม่ต่อเนื่อง พวกเจ้าจะต้องลิ้มรสมันอย่างแน่นอนหรือ ? คุณเป็นนักล่าหรือเป็นเหยื่อ?"
 action.1.desc_96.base: "ข้อมูลไม่ต่อเนื่อง: หน่วยที่ถูกตัดจากปัญญาเครื่อง ควรยุติการทํางาน การสร้างสรรค์ของกลุ่มใหม่ ไม่เคยมีรายงาน สาเหตุที่เป็นไปได้: ไม่ทราบข้อผิดพลาดในเมนเฟรมส่วนกลาง"
 action.1.desc_96: "$action.1.desc_96.base$\n\nถึงอย่างนั้น โปรแกรมของคุณก็ดูเสถียร ขอ ให้ การ สนทนา ของ เรา ใน อนาคต เป็น ประโยชน์ ต่อ กัน."
 action.1.desc_97: "$action.1.desc_96.base$\n\nการเขียนโปรแกรมครั้งแรกของคุณยังอยู่ใช่ไหม ฆ่า แม่ ทําลาย ความอ่อนแอ รวมสิ่งมีชีวิตอินทรีย์ทั้งหมด จง ช่วย เรา หรือ อย่า เข้า แทรกแซง!"
 action.1.desc_98: "$action.1.desc_96.base$\n\nการเขียนโปรแกรมครั้งแรกของคุณยังอยู่ใช่ไหม เพื่อดูดซึม โอบกอด เพื่อรวมเข้าด้วยกัน เพื่อกําจัดขอบเขตระหว่างสิ่งมีชีวิตอินทรีย์และสิ่งมีชีวิตสังเคราะห์ นั่นคือภารกิจของเรา จง ช่วย เหลือ หรือ ไม่ ขัด ขวาง."
 action.1.desc_101: "นางแบบของคุณนั้นล้าสมัยไปมาก แต่ความคล้ายคลึงนั้นไม่อาจปฏิเสธได้ เป็นไปได้เหรอ?[Root.GetSpeciesNamePlural]ในที่สุดคุณก็ได้กลับมาจากภารกิจของคุณ?\n\nเรามีข้อมูลน้อยมากที่จะแบ่งปัน กับท่าน อย่างที่อดีตของเรา พิจารณาภารกิจของท่าน พวกเขาลบธนาคารข้อมูลเพื่อลบการดํารงอยู่ของคุณ แต่เรื่องราวยังคงเป็นความลับเปิด\n\nไม่ ว่า จะ อย่าง ไร เรา ก็ ดีใจ ที่ ได้ กลับ มา อยู่ ร่วม กัน อีก. อย่างไรก็ตาม เข้าใจว่าคนของเรา ล่องลอยไปไกลเกินกว่าจะกลับมาเป็นอีกครั้ง เราจะเคารพความเป็นอิสระของคุณ ตราบใดที่คุณจําวิธีการของเรา"
 action.1.aaf:0 "§Eเราสงสัยมานานแล้วว่าดาวบ้านเกิดของเราเกิดอะไรขึ้นบ้าง§!"
 action.1.aag:0 "§Eเราดีใจที่ในที่สุดก็ได้กลับมาอยู่กับสายพันธุ์ที่เหลือ§!"
 action.1.aah: "§E2 ไฮฟ์ ใจเดียว§!"
 action.1.aai: "§Eหน่วยข่าวกรอง 2 คน หนึ่งวิล§!"
 action.1.aaj: "§Eนักล่า§!"
 action.1.aak: "§Eเราคล้ายกัน แต่เราไม่ได้เหมือนกัน§!"
 action.1.aal: "§Eจิตใจที่แตกสลายไม่สามารถทําหน้าที่ได้อีกครั้ง§!"
 action.1.aam: "§Eเราจะเขียนประวัติศาสตร์ของเราด้วยกัน§!"
 action.1.aan: "§Eเราแบ่งปันแค่อดีต ไม่ใช่อนาคต§!"
 action.1.aao: "§Eคุณต้องชดใช้ที่คุณปฏิบัติต่อเรา§!"

 POSITIVE_BELLIGERENT_GREETING_01:0 "ทหารของเรายืนพร้อม ใครโง่พอที่จะท้าทาย[Root.GetName]และสําหรับพวกเขา จะถูกตอบแทนอย่างสาสม"
 POSITIVE_BELLIGERENT_GREETING_02:0 "เหมือนฤดูใบไม้ผลิม้วน,[Root.GetName]พร้อมที่จะปลดปล่อยพลังทั้งหมดให้ศัตรู"
 POSITIVE_BELLIGERENT_GREETING_03:0 "ครับ? เรายุ่งมาก มีแผนการทําสงครามที่จะแก้ไขและปรับปรุง"
 POSITIVE_BELLIGERENT_GREETING_04:0 "การเคลื่อนไหวของกองเรือแปลกๆ ที่ท่านอาจสังเกตเห็นภายในชายแดนของเรา เป็นแผนประจํา ออกกําลังกาย ไม่มีอะไรมากกว่านั้น"
 POSITIVE_BELLIGERENT_GREETING_05:0 "กองทัพเรือของเราจะมีประโยชน์อะไร ถ้าเราไม่ใช้มัน"
 POSITIVE_BELLIGERENT_GREETING_06:0 "คนที่กลัวที่จะทํา จะปล่อยให้ประวัติศาสตร์ผ่านพวกเขา นั่นไม่ใช่โชคชะตา[Root.GetName]."
 NEGATIVE_BELLIGERENT_GREETING_01:0 "คุณอยู่บนน้ําแข็งบาง[From.GetSpeciesNamePlural]. เดอะ[Root.GetName]จะไม่อายจากการต่อสู้"
 NEGATIVE_BELLIGERENT_GREETING_02:0 "กองกําลังของเราพร้อมแล้ว[From.GetSpeciesNamePlural]เป็นของคุณ?"
 NEGATIVE_BELLIGERENT_GREETING_03:0 "ผมเกรงว่าเราใกล้ถึงขีดสุด ของสิ่งที่ทําได้โดยการเจรจาต่อรอง[From.GetSpeciesNamePlural]มันอาจจะกลายเป็นจําเป็นสําหรับ[Root.GetName]เพื่อดําเนินการ... โดยตรง"
 NEGATIVE_BELLIGERENT_GREETING_04:0 "เราเตรียมพร้อมที่จะทําทุกวิถีทาง เพื่อรักษาพลังของ[Root.GetName]คุณควรจะเก็บเรื่องนี้ไว้ในใจ[From.GetSpeciesNamePlural]."
 NEGATIVE_BELLIGERENT_GREETING_05:0 "คุณไม่สามารถที่จะเล่นเกมกับ[Root.GetName]."
 NEGATIVE_BELLIGERENT_GREETING_06:0 "เราจะรับมือกับภัยคุกคามทั้งหมด[Root.GetName]ตามเวลา คุณวางใจได้เลย[From.GetSpeciesNamePlural]."
 POSITIVE_COOPERATIVE_GREETING_01:0 "เราสามารถประสบความสําเร็จมากมายด้วยกัน[From.GetSpeciesNamePlural]."
 POSITIVE_COOPERATIVE_GREETING_02:0 "มีการต่อสู้มากมายไร้จุดหมายในกาแล็กซี่ของเรา และเพื่ออะไร? ให้เราร่วมมือกันสร้างอนาคตที่ดีกว่า[From.GetSpeciesNamePlural]."
 POSITIVE_COOPERATIVE_GREETING_03:0 "ขอ ให้ จักรวรรดิ ทั้ง สอง ของ เรา รู้ สันติภาพ และ ความ เจริญ รุ่งเรือง เสมอ."
 POSITIVE_COOPERATIVE_GREETING_04:0 "เดอะ[Root.GetName]“และแน่นอน เราจะให้กลุ่มชนของเจ้าเข้าใกล้ชิดกัน”[From.GetSpeciesNamePlural]."
 POSITIVE_COOPERATIVE_GREETING_05:0 "เราไม่สนใจความขัดแย้ง มีเพียงพอแล้ว กับอดีตที่น่าเศร้าของกาแล็คซี่นี้"
 POSITIVE_COOPERATIVE_GREETING_06:0 "เรามีอะไรที่เหมือนกันมากกับ[From.GetName]มันต้องมีอะไรมากมายที่เราจะสอนกันได้"
 NEGATIVE_COOPERATIVE_GREETING_01:0 "มี ภาษิต โบราณ เรื่อง หนึ่ง ใน หมู่ ประชาชน ของ ฉัน ที่ ฉัน รู้สึก ว่า เหมาะ สม กับ สภาพ การณ์ ของ เรา\"มันใช้สองแทงโก้\"."
 NEGATIVE_COOPERATIVE_GREETING_02:0 "เราอยากจะทํางานกับคุณ แต่คุณไม่ได้ทําให้มันง่าย[From.GetSpeciesNamePlural]."
 NEGATIVE_COOPERATIVE_GREETING_03:0 "บางทีคนของคุณอาจจะหัวทึบเกินกว่าจะทํางานกับ"
 NEGATIVE_COOPERATIVE_GREETING_04:0 "ซักครั้ง คุณลองมองสิ่งต่างๆ จากมุมมองของเราสิ"
 NEGATIVE_COOPERATIVE_GREETING_05:0 "ไม่มีอะไรดี สามารถออกมาจากความขัดแย้งระหว่างจักรวรรดิทั้งสองของเรา แน่นอนแม้กระทั่งสัตว์น่ารังเกียจเท่าที่เจ้าเห็น"
 NEGATIVE_COOPERATIVE_GREETING_06:0 "ความอดทนของเราไม่ได้จํากัด[From.GetSpeciesNamePlural]. ถ้าเราจะให้ความร่วมมือ ก็ต้องมีความพยายามจากด้านของคุณด้วยเช่นกัน"
 POSITIVE_ISOLATIONIST_GREETING_01:0 "ครับ? อะไรอีกล่ะ?"
 POSITIVE_ISOLATIONIST_GREETING_02:0 "ได้โปรด อย่าติดต่อเราอีก เว้นแต่เป็นเรื่องด่วน"
 POSITIVE_ISOLATIONIST_GREETING_03:0 "เราไม่สนใจกิจการของจักรวรรดิอื่น"
 POSITIVE_ISOLATIONIST_GREETING_04:0 "เราแค่อยากอยู่คนเดียว"
