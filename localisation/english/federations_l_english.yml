 galcom.16.d: "อีกไม่นานพวกมันก็จะก้มหัวให้ข่านของเรา"
 START_SCREEN_SCION_NOMADS: "นาน ก่อน ที่ เรา ได้ เรียน รู้ ที่ จะ อ่าน ดวง ดาว เหล่า นั้น ผู้ อุปถัมภ์ ต่าง ดาว ของ เรา พบ เรา เป็น หนุ่ม สาว ที่ พเนจร ด้วย ความ กล้า หาญ ยิ่ง กว่า ความ รู้ ลอย อยู่ บน นาวา ของ เรา ใน ความ มืด. ในแง่ของบรรพบุรุษที่งงงันของเราจะเข้าใจ พวกเขาอธิบายว่าสายพันธุ์ของเรา ได้แสดงคําสัญญาอันยิ่งใหญ่ ด้วย ความ อด ทน พวก เขา นํา เรา ไป สู่ ทาง ที่ จะ ช่วย ให้ อารยธรรม ของ เรา บรรลุ ศักยภาพ เต็ม ที่.\n\nใน ไม่ กี่ โอกาส ที่ เรา หลง ทาง จาก ทาง นี้ พวก เขา ได้ แก้ไข แนว ทาง ของ เรา อย่าง หนัก แน่น ฐานะ ผู้ ปรนนิบัติ ดู แล แต่ ก็ เป็น ไป ตาม ลําดับ โดย สั้น ๆ วิศวกร ของ เรา ได้ เรียน รู้ ที่ จะ ปรับ ตัว ให้ เข้า กับ เรือ ของ เรา มาก กว่า ที่ บรรพบุรุษ ของ เรา เคย คิด ไว้. ภาย ใต้ การ ดู แล ของ ผู้ ดู แล บัด นี้ เรา ได้ สร้าง แรก[GetStartingDrive]."
 START_SCREEN_COMMON_GROUND_NOMADS: "หลายทศวรรษก่อน เส้นทางที่เดินของเรา นําเราอยู่ในระยะของสองระบบที่มีคนอาศัยอยู่ และกับพวกเขา แม้ จะ มี ความ แตก ต่าง กัน อย่าง รุนแรง ใน ด้าน สรีระ ของ เรา แต่ ก็ ปรากฏ ชัด ว่า เรา มี สิ่ง ที่ เหมือน กัน มาก กว่า ไม่ ใช่. เช่นเดียวกับเรา พวกเขารู้สึกถึงการดึง ของจักรวาล และอยู่บนความจุของคําตอบ\n\nพันธบัตรที่เกิดขึ้นระหว่างสามอารยธรรมของเรา ซึ่งในที่สุดก็นําไปสู่ การเกิดของการหล่อเลี้ยง - เราจะรวมความพยายามของเรา"
 START_SCREEN_HEGEMON_NOMADS: "หลายทศวรรษที่ผ่านมา เส้นทางของเราเดินนําเรา ในระยะของสองระบบที่มีคนอาศัยอยู่ และกับพวกเขาการค้นพบ อารยธรรมของมนุษย์ต่างดาวสองชนิดที่แตกต่างกัน พวกเขาอยู่บนขอบ ของการพัฒนาการท่องเที่ยวระหว่างดวงดาวที่ใช้งานได้จริง แต่รัฐบาลของพวกเขาอ่อนแอ\n\nเมื่อ ตระหนัก ว่า ความ เข้ม แข็ง ของ พวก เขา จะ เพิ่ม เข้า กับ พวก เรา เอง เรา เริ่ม ผลัก ดัน ให้ มี การ แบ่ง แยก ทาง การ เมือง ภาย ใต้ การ ดู แล ของ เรา ซึ่ง จะ ทํา ให้ อารยธรรม ทั้ง สาม ของ เรา เป็น อัน หนึ่ง อัน เดียว กัน. ใน ตอน แรก มี การ ต่อ ต้าน แต่ ใน ที่ สุด ผล ประโยชน์ ของ การ มี ส่วน ร่วม ใน การ นํา ของ เรา และ ความ ทะเยอทะยาน ก็ ปรากฏ ชัด เกิน กว่า ที่ พวก เขา จะ มอง ข้าม ได้. คําสั่งใหม่ได้รับการจัดตั้ง"
 origin.70.desc.embark: "$origin.70.desc$\n\n$origin.70.embark_appendix$"
 origin.70.2.desc.embark: "$origin.70.2.desc$\n\n$origin.70.embark_appendix$"
 origin.70.embark_appendix: "อาจ ยัง มี ทาง หนี อีก ทาง หนึ่ง คือ สร้าง นาวา และ ขน สิ่ง ที่ เหลือ อยู่ เข้า ไป ใน ที่ ว่าง ก่อน อวสาน จะ มา ถึง."
 origin_70.c: "เริ่มการก่อสร้างยานอาร์คชิป เราต้องไปที่ดวงดาว"
