 feda.1.desc:0 "ขั้นแรกของ$mega_shipyard_3$เสร็จสมบูรณ์แล้ว โครง สร้าง อัน ใหญ่ โต รอ คอย การ สถาปนา อ่าว ผลิต ซึ่ง สัก วัน หนึ่ง จะ ทํา ให้ สถาน ที่ แห่ง นี้ เป็น ศูนย์กลาง การ สร้าง เรือ แห่ง กาแล็กซี."
 feda.2.name:0 "$mega_shipyard_2$"
 feda.2.desc:0 "ใจกลางของ$mega_shipyard_3$ได้ มี การ จัด เตรียม สิ่ง ที่ ยัง เหลือ อยู่ ก็ คือ สถาน ที่ ก่อ สร้าง เรือ ขนาด ใหญ่."
 feda.3.name:0 "$mega_shipyard_3$ออนไลน์"
 feda.3.desc:0 "เดอะ$mega_shipyard_3$ปัจจุบันออนไลน์เต็มที่แล้ว มันสามารถผลิตยานอวกาศ ในปริมาณที่ไม่เคยมีมาก่อน"

 # Encountering Ruined Mega Shipyard
 feda.5.name:0 "$mega_shipyard_ruined$"
 feda.5.a.desc:2 "ในพื้นที่อันกว้างใหญ่[mega_shipyard_system.GetName]ระบบ เป็น โครง สร้าง อัน กว้าง ใหญ่ ของ การ ออก แบบ ของ มนุษย์ ต่าง ดาว. ทั้ง ๆ ที่ มี สภาพ ย่ําแย่ นัก วิทยาศาสตร์ ของ เรา ก็ ยืน ยัน ว่า อาคาร ขนาด มหึมา ที่ แท้ แล้ว เป็น ลาน ก่อ สร้าง หลาย แห่ง รวม กัน เข้า ด้วย กัน§Y$mega_shipyard_3$§!.\n\nหาก เรา ได้ รับ ความ รู้ เกี่ยว กับ วิธี ซ่อมแซม โรง งาน อุตสาหกรรม ที่ สง่า งาม นี้ ความ สามารถ ใน การ ผลิต ของ เรา จะ เพิ่ม ขึ้น อย่าง มาก."
 feda.5.b.desc:3 "ในพื้นที่อันกว้างใหญ่[mega_shipyard_system.GetName]ระบบอยู่มากมาย§Y$mega_shipyard_3$§!โครงสร้าง - คล้ายกับการออกแบบของเราเอง อย่าง ไร ก็ ตาม โครง สร้าง ขนาด มหึมา นี้ อยู่ ใน สภาพ ย่ําแย่ และ ต้องการ การ ซ่อมแซม อย่าง กว้าง ขวาง เพื่อ จะ นํา กลับ มา ใช้ ได้ อีก."
 feda.5.c.desc:0 "สแกนพื้นที่โดยรอบอย่างรวดเร็ว ตรวจสอบว่ามหาวิหารที่ผ่านมา ทนทุกข์ทรมานจากชนิดของการ โอเวอร์พลังงานรุนแรง"
 feda.5.a:0 "คิด ดู สิ ว่า จะ มี สอง คน!"

