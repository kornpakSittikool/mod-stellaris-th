 #GetThesisTopic (scripted loc)
 thesis_xcratic1:0 "ดําเนินการประชาธิปไตยเป็นอุปสงค์ของการจัดการอุทยานเทศบาล"
 thesis_xcratic2:0 "โครงสร้างพลังงานภายในคลองไม้"
 thesis_xcratic3:0 "การโหวตจากมุมมองของสถาปัตยกรรมความร่วมมือ"
 thesis_xcratic4:0 "ลัทธิ เผด็จการ เป็น เตา หลอม ขนาด ใหญ่"
 thesis_xcratic5:0 "สิทธิ ใน การ ลง คะแนน เสียง"
 thesis_xcratic6:0 "ปล่อย เนบิวลา เป็น แบบ อย่าง สําหรับ การ บรรยาย ทาง การ เมือง"
 thesis_xcratic7:0 "การขยายตัวเองในบริบทของการส่งมวล"
 thesis_xcratic8:0 "การแข่งขันผู้นําที่เล่นออกในเครื่องเร่งอนุภาค"
 thesis_souls1:0 "คุณค่า ของ พระ ประสงค์ ฝ่าย วิญญาณ เมื่อ ติด อยู่ บน ที่ ราบ ใน ทะเล ทราย"
 thesis_souls2:0 "ส่วน ประกอบ สําคัญ ของ แร่ ที่ เรียก ว่า แร่ เท ราค"
 thesis_souls3:0 "คุณสมบัติทางกายภาพของความคืบหน้า"
 thesis_souls4:0 "การ คํานึง ถึง ความ เสีย หาย"
 thesis_souls5:0 "เผยแพร่คําท่ามกลางสิ่งมีชีวิต"
 thesis_souls6:0 "ความ เป็น น้ํา หนึ่ง ใจ เดียว กัน และ สุข อนามัย"
 thesis_souls7:0 "คุณค่า ของ อุโมงค์ ฝัง ศพ ใน สังคม ที่ อยู่ ใต้ อํานาจ"
 thesis_souls8:0 "(พวกเขา) เป็นไพร่พลจากดวงดาวทั้งหลาย"
 thesis_war1:0 "สันติ สุข และ สงคราม ที่ เกี่ยว ข้อง กับ การ แพร่ เชื้อ แบคทีเรีย"
 thesis_war2:0 "กระสุนเป็นเครื่องหมายวรรคตอน"
 thesis_war3:0 "เฉลิม ฉลอง สุข อนามัย ของ ชุมชน"
 thesis_war4:0 "การ คิด รําพึง เรื่อง การ ผัด วัน ประกัน พรุ่ง"
 thesis_war5:0 "การ ป้องกัน อย่าง รุนแรง ใน ฐานะ กลยุทธ์ ด้าน วิศวกรรม พลเรือน"
 thesis_war6:0 "การประมาณพลังงานในการเกษตร"
 thesis_war7:0 "กลยุทธ์การป้องกันการ นาบภายใน"
 thesis_war8:0 "การรวมร่างของเอกภาพ"
 thesis_xenos1:0 "ความ ต่าง กัน มาก กว่า เยื่อ หุ้ม ด้วย ไฟฟ้า"
 thesis_xenos2:0 "การ เสีย สละ ความ เสมอ ต้น เสมอ ปลาย ทาง วัฒนธรรม ใน อาหาร ประจํา วัน"
 thesis_xenos3:0 "การ หยุด ที่ น่า อึดอัด ใน ฐานะ คํา อธิบาย เกี่ยว กับ การ วาง ตําแหน่ง ทาง สังคม"
 thesis_xenos4:0 "ค่าทางวัฒนธรรมของไอโซโทปหายาก"
 thesis_xenos5:0 "การ เป็น ชน ชาติ ใน โครง สร้าง ถ้ํา ใต้ ดิน"
 thesis_xenos6:0 "พรม แดน ที่ อยู่ ระหว่าง กาแล็กซี"
 thesis_xenos7:0 "แบบจําลองในอนาคตสําหรับการนําเข้าสินค้า จากจํานวนมากของกาแลคซี"
 thesis_xenos8:0 "การ สนทนา ข้าม รูหนอน"
 thesis_machine1:0 "การ จัด ระเบียบ อย่าง ยอด เยี่ยม ของ ธาตุ ต่าง ๆ ใน เครือ ข่าย บริเวณ ส่วน ตัว"
 thesis_machine2:0 "การขยายคลื่นแม่เหล็กไฟฟ้าภายในอุปกรณ์กาว"
 thesis_machine3:0 "ผล กระทบ ของ ดอพ เลอร์ เป็น แหล่ง แห่ง ความ บันเทิง"
 thesis_machine4:0 "เรียนว่ายน้ําในทะเลของข้อมูล"
 thesis_machine5:0 "การประยุกต์ใช้แบตเตอรีชั้นสูง เพื่อใช้ในชีวิตพืชที่ไม่มีประสิทธิภาพ"
 thesis_hive1:0 "การ ควบคุม การ จราจร ทาง อวกาศ"
 thesis_hive2:0 "การเห็นความรู้สึกผิดทั้งหมดเป็นแรงจูงใจในการยืนยันความแข็งแรงทางกายภาพ"
 thesis_hive3:0 "โต้แย้งเพื่อตัวเองและต่อต้าน"
 thesis_hive4:0 "อันตรายภายในของความคิดส่วนบุคคลและอื่น ๆ นามธรรมดังกล่าว"
 thesis_hive5:0 "หมั้นกับการจราจรอวกาศในระดับบุคคล"
 thesis_megacorp1:0 "การ แสดง ความ น่า เชื่อ ถือ ผ่าน แบบ แผน ของ การ รับ รู้"
 thesis_megacorp2:0 "ค่าขอบกําไร"
 thesis_megacorp3:0 "การเพิ่มระดับความจุสินทรัพย์"
 thesis_megacorp4:0 "การ ทํา ให้ การ คาด คะเน แพร่ ออก ไป อย่าง กว้าง ขวาง พร้อม กับ การ วิพากษ์ วิจารณ์ อย่าง รุนแรง"
 thesis_megacorp5:0 "สระว่ายน้ํา และสิ่งที่เขาสามารถสอนเรา เกี่ยวกับผู้ใช้รายวัน"

