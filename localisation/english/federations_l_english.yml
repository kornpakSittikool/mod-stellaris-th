 MACHINE_ISOLATIONIST_GREETING_01:0 "แนว แนะ ใน การ ปฏิบัติ การ ของ เรา ทํา ให้ การ สื่อ ความ กับ สิ่ง ต่าง ๆ ภาย นอก ขาด สะบั้น ไป อย่าง หนัก. ไปเถอะ"
