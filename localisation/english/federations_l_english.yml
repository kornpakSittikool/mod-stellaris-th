 resolution_rulesofwar_guardian_angels:0 "เทวดาผู้พิทักษ์"
 resolution_rulesofwar_guardian_angels_desc:0 "ทหารที่อุทิศชีวิตเพื่อรักษาดาวเคราะห์ของเราให้ปลอดภัยควรได้รับการยอมรับและให้เกียรติ"

 resolution_rulesofwar_reverence_for_life:0 "เคารพต่อชีวิต"
 resolution_rulesofwar_reverence_for_life_desc:0 "ความน่ากลัวของสงคราม ในระดับของจักรวรรดิ ระหว่างดวงดาว เป็นสิ่งที่น่ากลัว เราควรทําในสิ่งที่เราสามารถทําได้ เพื่อจํากัดความฟุ่มเฟือยของมัน"
