 START_SCREEN_SCION:1 "ในช่วงต้นของประวัติศาสตร์ของเรา ก่อนที่เราจะพัฒนาเทคโนโลยีจํานวนมาก ผู้อุปถัมภ์ของมนุษย์ต่างดาวของเราได้เปิดเผยตัวตนของเรา ในแง่ของบรรพบุรุษที่งงงันของเราจะเข้าใจ พวกเขาอธิบายว่าสายพันธุ์ของเรา ได้แสดงคําสัญญาอันยิ่งใหญ่ ด้วย ความ อด ทน พวก เขา นํา เรา ไป สู่ ทาง ที่ จะ ช่วย ให้ อารยธรรม ของ เรา บรรลุ ศักยภาพ เต็ม ที่.\n\nใน ไม่ กี่ โอกาส ที่ เรา หลง ทาง จาก ทาง นี้ พวก เขา ได้ แก้ไข แนว ทาง ของ เรา อย่าง หนัก แน่น ฐานะ ผู้ ปรนนิบัติ ดู แล แต่ ก็ เป็น ไป ตาม ลําดับ อย่าง สั้น ๆ นัก วิทยาศาสตร์ ของ เรา ได้ เชี่ยวชาญ ใน เรื่อง ไฟฟ้า, พลัง ปรมาณู, และ จาก นั้น ก็ มี การ ใช้ อวกาศ อย่าง หยาบ คาย. ภาย ใต้ การ ดู แล ของ ผู้ ดู แล บัด นี้ เรา ได้ สร้าง แรก[GetStartingDrive]."
 origin_scion:0 "ไซออน"
 origin_scion_desc:0 "การ ตก ต่ําจักรวรรดิได้รวมอยู่ในการพัฒนาของอารยธรรมนี้ เป็นเวลาหลายพันปี ชี้ทางให้พวกเขาไปสู่เส้นทางของการเลือกของพวกเขา"
