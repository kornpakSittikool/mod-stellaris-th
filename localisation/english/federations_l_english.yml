 federation_internal_migration:0 "§Y$law_category_free_migration$§! §Rคือ§Y$free_migration_yes$§!โดยพระราชบัญญัติสหพันธรัฐ ดังนั้นเรามีสนธิสัญญาการย้ายถิ่นฐานแล้ว โดยปริยายแล้ว§!"
