 fedel.904.name:0 "แด่วิกเตอร์"
 fedel.904.desc:0 "[Root.GetName]ได้รับแต่งตั้งเป็นสหพันธรัฐผู้นำสอดคล้องกับกฎเกณฑ์ทองคํา ยินดีด้วย!\n\nอันดับแรกของธุรกิจคือการตัดสินใจว่าจะเกิดอะไรขึ้นกับ 'เงิน\" ผลรวมปัจจุบันคือ£energy£ §G[bidding_federation_leader.current_pot_variable]§!.\n\n§Rขอ ให้ สังเกต ว่า ภาษี และ ค่า ใช้ จ่าย บาง อย่าง จะ นํา มา ใช้ ได้ และ จะ เปลี่ยน ค่า ใช้ จ่าย นั้น อย่าง ได้ ผล ก่อน จ่าย.§!"
 fedel.904.a:0 "ลงทุน"
 fedel.904.a.tooltip:0 "ส่งเงินกลับไปที่ค่าอาหาร จะเพิ่มสหพันธรัฐและใช้ชั่วคราว§Y$business_is_booming$§! จักรวรรดิเครื่องช่วยหายใจ\n\n"
