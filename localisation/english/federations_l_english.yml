 ACTION_ASK_TO_LEAVE_FEDERATION_DESC:0 "$FEDERATION_VIEW_ASK_TO_LEAVE_FEDERATION_BUTTON_DESC$"
 ACTION_ASK_TO_LEAVE_FEDERATION_OFFER_DESC:0 "ถ้าคําขอนั้นเป็นจริง§H[Actor.GetName]§!จะจากไป§H[Actor.GetAllianceName]§!หากคําขอถูกปฏิเสธ พวกเขาจะได้รับ§Yการแยกส่วน§!แคสซัส เบลลี ต่อต้านเรา"
