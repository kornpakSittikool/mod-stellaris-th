 origin_tooltip_hegemon_npc_effects:0 "- เริ่มต้นในฐานะสมาชิก§Hเฮ เก โม นี§!มีสมาชิกเพิ่มอีก 2 คน"
 START_SCREEN_HEGEMON:1 "หลายทศวรรษที่ผ่านมา เมื่อยานสํารวจแสงดิบแรกของเรา ไปเยี่ยมระบบดาวใกล้ของเราเอง เช่น เดียว กับ พวก เรา พวก เขา เกือบ จะ พัฒนา การ เดิน ทาง ระหว่าง ดวง ดาว ที่ ใช้ ได้ ผล จริง แต่ รัฐบาล ของ พวก เขา อ่อนแอ และ ไม่ ได้ รับ การ แก้ไข.\n\nเมื่อ ตระหนัก ว่า ความ เข้ม แข็ง ของ พวก เขา จะ เพิ่ม เข้า กับ พวก เรา เอง เรา เริ่ม ผลัก ดัน ให้ มี การ แบ่ง แยก ทาง การ เมือง ภาย ใต้ การ ดู แล ของ เรา ซึ่ง จะ ทํา ให้ อารยธรรม ทั้ง สาม ของ เรา เป็น อัน หนึ่ง อัน เดียว กัน. ใน ตอน แรก มี การ ต่อ ต้าน แต่ ใน ที่ สุด ผล ประโยชน์ ของ การ มี ส่วน ร่วม ใน การ นํา ของ เรา และ ความ ทะเยอทะยาน ก็ ปรากฏ ชัด เกิน กว่า ที่ พวก เขา จะ มอง ข้าม ได้. คําสั่งใหม่ได้รับการจัดตั้ง"
 origin_hegemon_npc:0 "พิกัดย่อยของเฮ เก มอน"
 origin_hegemon_npc_desc:0 "อารยธรรม นี้ ก่อ ให้ เกิด การ ติด ต่อ กัน แต่ เนิ่น ๆ กับ เพื่อน บ้าน ต่าง ดาว ของ พวก เขา ทันที. พวก เขา อยู่ ใต้ อํานาจ ของ เพื่อน บ้าน เหล่า นั้น คน หนึ่ง ซึ่ง เป็น ผู้ กําหนด การ กําเนิด ของ การ ร่วม สามัคคี ระหว่าง ดวง ดาว กับ พวก เขา ใน ฐานะ ผู้ นํา."

 origin_doomsday:0 "วันโลกาวินาศ"
 origin_doomsday_desc:1 "§Rคำเตือน: จุดเริ่มต้นท้าทาย§!\nดินแดนของอารยธรรมนี้ ไม่เสถียรอย่างยิ่ง และมันเป็นเพียงเรื่องของเวลา ก่อนที่มันจะระเบิด ความ หวัง อย่าง เดียว ของ พวก เขา คือ จะ ไป หลบ ภัย ที่ อื่น ก่อน จะ สาย เกิน ไป."
