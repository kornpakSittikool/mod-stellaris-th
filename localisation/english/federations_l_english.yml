 resolution_commerce_buzzword_standardization:0 "มาตรฐานวลีที่นิยมที่ใช้กับแวดวงธุรกิจ(บัซเวิร์ด)"
 resolution_commerce_buzzword_standardization_desc:0 "เราต้องทําให้องค์กรของเรา สามารถทํางานร่วมกันได้ การสื่อสารเชิงยุทธศาสตร์ที่ครอบคลุม ทําให้ตัวแทนของเรามีอํานาจในการตี"

 resolution_commerce_leveraged_privateering:0 "ใช้ประโยชน์จากยานรบอิสระ"
 resolution_commerce_leveraged_privateering_desc:1 "การ ค้า คือ เลือด แห่ง กาแล็กซี. สมาชิกทั้งหมด[global_event_country.GetGalCommunityOrGalImperium]ควร มี ส่วน ส่ง เสริม ให้ มี พลัง ต่าง ประเทศ ใน การ ต่อ สู้ กับ ความ โหด ร้าย ทารุณ และ การ คุกคาม อื่น ๆ เพื่อ การ ค้า ที่ เป็น อิสระ."

 resolution_commerce_underdeveloped_system_utilization:0 "ใช้ประโยชน์ระบบที่ด้อยพัฒนา"
 resolution_commerce_underdeveloped_system_utilization_desc:0 "การล้มเหลวในการแยกค่าสูงสุดของระบบ ภายในทรงกลมของอิทธิพลของเรา เป็นขยะทางอาญา เรา ขอ เสนอ ให้ ใช้ วิธี นี้ และ ลง โทษ ตาม นั้น."
 resolution_commerce_underdeveloped_system_utilization_tooltip:1 "สถานีสังเกตการณ์ให้ £consumer_goods£ §Gสินค้าอุปโภคบริโภค§! ในขณะทำการ §Yสังเกตการณ์§! อารยธรรมก่อนหน้า FTL"

 resolution_commerce_holistic_asset_coordination:0 "การประสานงานประโยชน์แบบองค์รวม"
 resolution_commerce_holistic_asset_coordination_desc:0 "เพื่อส่งเสริมและส่งเสริมให้ผลผลิตที่มีประสิทธิภาพสูงสุด เราควรร่วมมือกันเพื่อกระตุ้นโครงสร้างพื้นฐานแบบกาแล็กซี่"

 resolution_commerce_profit_maximization_engines:0 "เครื่องมือเพิ่มผลกำไร"
 resolution_commerce_profit_maximization_engines_desc:0 "เราควรสร้างคอมฯ ที่เชื่อมโยงกัน ในแต่ละโลกของเรา ให้เหมาะสมที่สุดกับการกระจายข้อมูลและทรัพยากร ความมั่งคั่งจะต้องไหล"

