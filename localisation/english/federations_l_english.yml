 resolution_rulesofwar_independent_tribunals:0 "ศาลอิสระ"
 resolution_rulesofwar_independent_tribunals_desc:0 "ความยุติธรรมจะต้องเกิดขึ้นสำหรับการก่ออาชญากรรมที่ทหารกระทำและการเสียชีวิตของพลเรือนจะต้องได้รับการพิจารณา เราควรจัดตั้งศาลอิสระเพื่อสอบสวนและลงโทษอาชญากรรมสงคราม"
 resolution_rulesofwar_independent_tribunals_tooltip:0 "การทิ้งระเบิดจากวงโคจรดาวแบบ §Yทำลายล้างขั้นสูงสุด§! และแบบ §Yไม่เลือกเจาะจง§! รวมไปถึงการใช้อาวุธโคลอสซัสใดๆนอกเหนือจาก §Yเครื่องทำให้ดาวเกิดความสงบ§! จะ §Rถูกแบน§!"

 resolution_rulesofwar_last_resort_doctrine:0 "หลักของที่พึ่งสุดท้าย"
 resolution_rulesofwar_last_resort_doctrine_desc:0 "สงครามควรเป็นทางเลือกสุดท้ายของเราเมื่อการทูตในรูปแบบอื่นๆล้มเหลว ไม่ควรเป็นเครื่องมือที่ใช้เพื่อวัตถุประสงค์ที่ไม่ชอบธรรม"
 resolution_rulesofwar_last_resort_doctrine_tooltip:0 "ปรัชญาสงคราม §Yสงครามที่ไม่จำกัด§! §Rถูกแบน§!"

 resolution_rulesofwar_demobilization_initiative:0 "ความคิดริเริ่มการปลดประจำการหลังจากสิ้นสงคราม"
 resolution_rulesofwar_demobilization_initiative_desc:0 "ทรัพยากรที่ใช้ไปในสงครามในปัจจุบัน สามารถใช้ได้ดีกว่า สําหรับโครงการอื่น ๆ เพื่อทําให้ชีวิตพลเรือนดีขึ้น เรา ควร จํากัด การ พัฒนา ทาง ทหาร และ เพ่ง เล็ง ที่ การ ปรับ ปรุง สิ่ง ต่าง ๆ แทน ที่ จะ ทําลาย."
 resolution_rulesofwar_demobilization_initiative_tooltip:0 "นโยบาย §Yเศรษฐกิจการทหาร§! ถูกแบน"

