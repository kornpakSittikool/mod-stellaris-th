 doomsday_first_arkship_gestalt_desc: "การย้ายเรือของเรา§Hเรือ รบ§!ให้ความรู้สึกใหม่ของความมั่นคงและวัตถุประสงค์ มันพิสูจน์ว่ากลุ่มของเราสามารถเติบโตได้ นอกการควบคุมของโลกของเรา"
 START_SCREEN_LOST_COLONY_NOMADS: "ต้นฉบับจริงๆ[GetSpeciesName]บรรพบุรุษมาเพื่อออกจากโลกของพวกเขา มีเอกสารที่ไม่ดี เรา รู้ แต่ ว่า พวก เขา รีบ ออก ไป ขน สิ่ง ที่ สามารถ นํา ขึ้น เรือ[Root.Capital.GetName]ไปสู่สิ่งที่ไม่รู้ ไม่ ว่า พวก เขา จะ หนี พ้น ความ หายนะ, แสวง หา สิ่ง ที่ ใหญ่ กว่า, หรือ ถูก ขับ ออก นอก ประเทศ นั้น เป็น เรื่อง ราว ของ ประวัติศาสตร์.\n\nหลาย ปี ที่ ลอย ห่าง ไป นั้น โหด ร้าย มาก. ทรัพยากรเติบโตได้ยาก ระบบวิกฤตล้มเหลว และโมฆะเอาจํานวนมากไปจากเรา แต่เราทนทานการปันส่วน การซ่อมแซม การสร้าง - จน[Root.Capital.GetName]และ ผู้ คน ก็ พบ จังหวะ ของ ความ ยืดหยุ่น ที่ แข็ง แรง พอ ที่ จะ นํา เรา ไป ข้าง หน้า.\n\nโลกของบรรพบุรุษเรายังอยู่ที่ไหนสักแห่ง ไม่มีชีวิต[GetSpeciesNamePlural]บนเรือ[Root.Capital.GetName]เป็นผู้ใหญ่พอที่จะจดจําการยืนบนพื้นดินที่มั่น แต่คําถามของสิ่งที่กลายเป็น โลกที่เราทิ้งไว้"
