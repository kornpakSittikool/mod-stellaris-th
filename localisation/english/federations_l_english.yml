 action.1.desc_89:0 "คุณ... คุณคือ[From.GetSpeciesNamePlural]นี่มันเหลือเชื่อมาก คุณคงเป็นผู้รอดชีวิตจากอินิชิเอทีฟของยูลิสซิส ทุก คน บน แผ่น ดิน โลก คิด ว่า เรือ นาวา หาย ไป หมด แล้ว แต่ เห็น ได้ ชัด ว่า เรือ ลํา นี้ มา ถึง แล้ว! คุณบอกว่าบรรพบุรุษของคุณอยู่ใน\"Cryan Memm\"?\n\nมันไม่ง่ายเลยนะ แต่ดูเหมือนนายจะทําดีกับตัวเอง ในนามของประชาชนชาวโลกและสมาชิกสภาผู้แทนราษฎรของสหราชอาณาจักร ผมอยากร่วมสร้างมิตรภาพ[Root.GetName].\n\nขอ ให้ เรา พยายาม ร่วม กัน สร้าง อนาคต ที่ ดี กว่า สําหรับ มวล มนุษยชาติ."
 action.1.desc_90:0 "เดอะ[From.GetName]ดังนั้นสหประชาชาติได้จัดการอย่างใด เพื่อรักษาความเข้าใจในอํานาจแล้ว แม้หลังจากที่ทุกปีเหล่านี้? คุณจะต้องยกโทษให้เรา สิ่งต่างๆ วุ่นวายเล็กน้อยบนโลก เมื่อบรรพบุรุษของเราออกจากเรือยูลิสซิส หลาย คน คิด ว่า คุณ ได้ ทําลาย ตัว เอง ใน สงคราม โลก อีก ครั้ง หนึ่ง หรือ อาจ ตก เป็น เหยื่อ ของ การ รุกราน ของ มนุษย์ ต่าง ดาว.\n\nถึงอย่างนั้น คุณก็ยังดูแข็งแรง และมีความสามารถมากกว่า เจ้าหน้าที่โลกทุจริตที่เราทิ้งไว้ บรรพบุรุษของเราสร้าง[contact_empire.GetName]จากความว่างเปล่า และเราจะปกป้องมันจนถึงวันสุดท้าย เราจะได้เห็นกัน ถ้าคุณสมควรได้รับความเคารพจากเรา"
 action.1.desc_91:0 "อ้า แปลกจริงที่ผลงานของจักรวาล... ว่าเราควรจะติดต่อกันอีกครั้ง หลังจากเรื่องทั้งหมดเกิดขึ้น แต่อย่ากลัวเลย ในนามของคณะกรรมการ$NAME_MSI_country$ยืนพร้อมที่จะช่วยให้คุณอีกครั้ง\n\nแน่นอน เรา ไม่ อาจ มอง ข้าม ความ เสีย หาย ที่ เกิด กับ ทรัพย์ สิน ของ บริษัท. ตัวแทนคอลเลคชั่นของเรา จะต้องติดต่อกับคุณเร็วๆนี้แน่ ถ้าพวกเขายังไม่ได้ทํา เราหวังว่าพวกเราจะเข้าถึง การตั้งถิ่นฐานได้\n\nเราอยู่ในยุคที่น่าสนใจ คุณว่ามั้ย ขอให้ผมเป็นคนแรกที่แสดงความยินดี กับความก้าวหน้าอันน่าทึ่งของคนของคุณ เรารอคอยที่จะทดสอบว่าคุณโตขึ้นแค่ไหน"
 action.1.desc_92:0 "อ่า ทรัพย์สินของเรา คุณไม่รู้หรอกว่ามันดีแค่ไหน ที่ได้เห็นคุณอีกครั้ง ในนามของคณะกรรมการที่$NAME_MSI_country$ขอให้ฉันได้แสดงความยินดีกับคุณ ในความคืบหน้าของคุณและคนของคุณ มันไม่ใช่สิ่งเล็กๆ ที่ได้มาไกลจากจุดเริ่มต้นอันต่ําต้อย\n\nถ้าคุณต้องการอะไร ไม่ต้องลังเลที่จะติดต่อเรา เราไม่ถือความแค้น เพราะ เหตุ ใด? ใน เรื่อง นี้ คุณ เป็น เหมือน เด็ก มาก ที เดียว."
 action.1.desc_93:0 "On behalf of the Board at $NAME_MSI_country$, please accept our heartfelt greetings. At $NAME_MSI_country_initials$, we believe in empowering other civilizations through technology and trade. After all, every sentient lifeform has the right to live their dreams.\n\nTo date, we have granted insights to dozens of pre-FTL worlds, and aim to increase that number by 40% within the next decade. We also support the galaxy's space-faring empires by providing financial assistance and the services of our specialized indentured workforce.\n\nShould you need anything, don't hesitate to contact us. We look forward to doing business with you!"
 action.1.desc_99: "อ่า...\n\nรอยแตกและเศษ! คุณมาจากโซล! เราได้ตั้งทฤษฎีไว้ยาว เกี่ยวกับการดํารงอยู่ของชนิดของคุณ แต่ผมกําลังนําหน้าตัวเอง ผมมาที่นี่เพื่อเป็นตัวแทน[contact_empire.GetName]ถ้าดูจากดีเอ็นเอที่อยู่ในสายพันธุ์ของเรา เราเป็นญาติที่สาบสูญไปนานแล้ว บรรพบุรุษของเราแบ่งปันดาวเดียวกัน แต่ภัยพิบัติโบราณ ส่งเราเจ็บผ่านอวกาศ ตอนนี้เราได้พบกันแล้ว เราสามารถชดเชยเวลาที่เสียไป"
 action.1.desc_100: "การ ได้ พบ คุณ เป็น เหมือน การ ส่อง กระจก แปลก ๆ... คุณบอกว่าเรามีบรรพบุรุษร่วมกัน นานก่อนที่จะเกิดโลกและลูน่า? นักวิทยาศาสตร์หลายคนได้อนุมานถึงการดํารงอยู่ของธีอา และในกรณีใด ๆ เรายินดีที่จะทําความคุ้นเคยของคุณ ในฐานะลูกพี่ลูกน้อง เราตั้งตาคอยความสัมพันธ์อันรุ่งเรือง ในระหว่างนี้โปรดยอมรับของขวัญนี้ของหินจันทรคติ : บางทีร่องรอยของบรรพบุรุษของคุณถูกซ่อนอยู่มี"
 opinion_pre_hadean_relations: "ความสัมพันธ์ก่อนแต่งงาน"
 starbase_citadel_trigger:0 "£trigger_no£ ฐานดวงดาวจำเป็นต้องเป็น §Yป้อมปราการอวกาศ§!"
 starbase_titan_yards_trigger:0 "£trigger_no£ ฐานดวงดาวจำเป็นต้องมี §Y$sm_titan_yards$§!"
 starbase_colossal_yards_trigger:0 "£trigger_no£ ฐานดวงดาวจำเป็นต้องมี §Y$sm_colossus_yards$§!"
 origin_separatists:0 "พวกแบ่งแยก"
 origin_separatists_desc:0 "อารยธรรม นี้ เกิด ขึ้น เมื่อ มัน กบฏ และ แยก ตัว จาก จักรวรรดิ อื่น."
 origin_liberated:0 "ปล่อยว่าง"
 origin_liberated_desc:0 "อารยธรรม นี้ เข้า มา หลัง จาก ได้ รับ การ ปลด ปล่อย จาก จักรวรรดิ อื่น แล้ว."
 origin_demonic_incursion:0 "การ คาด คะเน ที่ น่า ทึ่ง"
 origin_demonic_incursion_desc:0 "นําโดยแชมป์ที่เสื่อมโทรม จักรวรรดินี้เกิดขึ้นจากประตูมิติ และได้สาบาน ว่าจะทําลายความเป็นจริงนี้"
 origin_khan_successor:0 "คานผู้ประสบความสําเร็จ"
 origin_khan_successor_desc:0 "อารยธรรมนี้เกิดขึ้นจากเถ้าถ่าน ของจักรวรรดิอันยิ่งใหญ่ของข่าน"
 has_claimed_all_systems:0 "£trigger_no£ เราไม่สามารถใช้ เป้าหมายสงคราม นี้ได้เมื่อเราอ้างสิทธิ์ในระบบที่พวกเขามีอยู่ทั้งหมด เนื่องจากชัยชนะจะส่งผลให้เกิดการผนวกเข้าด้วยกัน"
 fedev.500.name:0 "สหพันธ์ใหม่"
 fedev.500.intro:0 "ประวัติศาสตร์จะต้องบันทึกไว้ว่า ในวันนี้ รัฐบาล §H[fed_founder_1.GetName]§! และ §H[fed_founder_2.GetName]§! ได้ลงนามในสนธิสัญญาสหพันธ์ ในฐานะสมาชิกผู้ก่อตั้ง §H[Root.GetAllianceName]§! ตอนนี้ พวกเขาจะเผชิญหน้ากับอนาคต ในฐานะพันธมิตรที่มั่นคง"
 fedev.500.a.desc:0 "$fedev.500.intro$\n\nสหพันธ์กาแล็กติกใหม่นี้ จะเป็นตัวอย่างที่ส่องประกายให้กับกาแล็กซีอื่นๆที่สามารถทำงานร่วมกันได้\n\nยุคใหม่ของการทูตระหว่างดวงดาวได้เริ่มขึ้นแล้ว!"
 fedev.500.b.desc:0 "$fedev.500.intro$\n\nไม่ ต้อง สงสัย เลย ว่า สันนิบาต การ ค้า ใหม่ นี้ จะ นํา มา ซึ่ง ความ มั่งคั่ง ทาง เศรษฐกิจ สําหรับ สมาชิก ทุก คน ของ สันนิบาต นี้.\n\nยุคใหม่ของการค้า ระหว่างดวงดาวได้เริ่มต้นขึ้น!"
 fedev.500.c.desc:0 "$fedev.500.intro$\n\nนี่การวิจัยการร่วมมือกันจะทําให้นักวิทยาศาสตร์ จากทุกรัฐสมาชิกของตน มีโอกาสใหม่ๆ ที่จะลดความรู้ของพวกเขา\n\nยุค ใหม่ แห่ง ความ ก้าว หน้า ทาง เทคโนโลยี ได้ เริ่ม ต้น แล้ว!"
 fedev.500.d.desc:0 "$fedev.500.intro$\n\nอํานาจรวมของพันธมิตรมหาดไทยนี้ จะช่วยให้หยุด กับผู้ที่ออกแบบพื้นที่ของรัฐสมาชิก\n\nยุคใหม่ของมหาอํานาจทางทหาร ได้เริ่มต้นขึ้นแล้ว!"
 fedev.500.e.desc:0 "$fedev.500.intro$\n\nแกรนด์เฮเกโมนี่ จะรับประกันความปลอดภัย ของสมาชิกรุ่นน้อง ผ่านความเป็นผู้นําอันเจิดจรัสของเฮกมอนในการปกครอง\n\nยุคใหม่ของ[fed_founder_1.GetSpeciesName]อํานาจเริ่มแล้ว!"
 fedev.500.a:0 "เป็นวันที่ดี"

