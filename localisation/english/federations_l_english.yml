 origin_hegemon:0 "การครอบงำจักรวรรดิทางอ้อม (อธิกะ)"
 origin_hegemon_desc:0 "อารยธรรมนี้สร้างการติดต่อกับเพื่อนบ้านต่างดาวในระยะแรก ในช่วงหนึ่งศตวรรษที่ผ่านมา พวกเขาค่อยๆวางแผนให้เกิดสหภาพระหว่างดวงดาวซึ่งพวกเขาจะมีบทบาทที่โดดเด่น"
