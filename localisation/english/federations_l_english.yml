 resolution_greatergood_repeal_1:0 "§Rยกเลิก $resolution_greatergood_workers_rights$§!"
 resolution_greatergood_repeal_1_desc:1 "เดอะ[global_event_country.GetGalCommunityOrGalImperium]การ ทํา เกิน ขอบ เขต โดย พยายาม บอก สมาชิก ว่า ควร ดําเนิน ชีวิต อย่าง ไร. พูดตรงๆนะ มันเป็นการดูถูก"
