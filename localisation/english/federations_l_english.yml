 resolution_galacticstudies_astral_studies_network_tooltip:0 "เพิ่มประสิทธิภาพของสิงปลูกสร้างและโมดูลบนฐานดวงดาว: §Y$sm_solar_panel_network$§!, §Y$sm_black_hole_observatory$§!, และ §Y$sm_listening_post$§!"

 resolution_galacticstudies_advanced_xenostudies:0 "การศึกษาต่างดาวขั้นสูง"
 resolution_galacticstudies_advanced_xenostudies_desc:1 "มี หลาย สิ่ง ที่ จะ เรียน รู้ จาก ทุก วัฒนธรรม ของ เอกภพ. เราควรเพิ่มการรวบรวมข้อมูล ดูเพิ่มที่ฐานดาวทั้งหมด ในขณะที่ทํางานใกล้ชิดกับนก นางแอ่น"
 resolution_galacticstudies_advanced_xenostudies_tooltip:3 "สถานีสังเกตการณ์ให้ £society£ §Hการวิจัยสังคม§! เพิ่มเติมในขณะ §Yสังเกตการณ์§! อารยธรรมก่อนหน้าความเร็ว\n\nเพิ่มประสิทธิภาพของสิงปลูกสร้างบนฐานดวงดาว: §Y$sm_art_college$§!, §Y$sm_curator_think_tank$§!, §Y$sm_salvager_workshop$§!, และ §Y$sm_mercenary_garrison$§! \n\nนโยบาย §Yปัญญาประดิษฐ์ผิดกฎหมาย§! และนโยบาย §Y$interference_not_allowed$§! ถูก §Rแบน§!"

 resolution_galacticstudies_ethical_guideline_refactoring:0 "การปรับโครงสร้างจริยธรรม"
 resolution_galacticstudies_ethical_guideline_refactoring_desc:0 "การมีความสามารถในการทําให้วิทยาศาสตร์มากขึ้น ทําให้จําเป็นทางศีลธรรมที่จะทําเช่นนั้น เราทําในสิ่งที่ต้องทํา เพราะเราทําได้"
 resolution_galacticstudies_ethical_guideline_refactoring_tooltip:0 "เดอะ§Y$research_restriction_dangerous_forbidden$§!นโยบายคือ§Rยกเลิก§!.\nเปิดใช้งาน§Y$research_restriction_dangerous_encouraged$§!นโยบาย\nจักรวรรดิจะต้องมีอํานาจมากที่สุด§Yเพิ่มขนาดผู้นํา§!ข้อกําหนดที่มีให้พวกเขาหรืออยู่ใน§Rการ ละเมิด กฎหมาย กาแลกติก§!!\n\nจักรวรรดิที่เป็น§Yการ สืบ พันธุ์§!อาจจะไม่สามารถทําตามความต้องการนี้ได้ และจะอยู่ใน§Rการ ละเมิด กฎหมาย กาแลกติก§!!"

 resolution_galacticstudies_extradimensional_experimentation:0 "การทดลองต่างมิติ"
 resolution_galacticstudies_extradimensional_experimentation_desc:0 "งานวิจัยเบื้องต้นบอกว่า การใช้สารที่สร้างความเป็นจริงอย่างกว้างขวาง สามารถให้ความเข้าใจที่ไม่คาดคิดแก่นักวิจัย\n\n§Rหลังจากทั้งหมดสิ่งที่แย่ที่สุดที่จะเกิดขึ้น?§!"
 resolution_galacticstudies_extradimensional_experimentation_tooltip:0 "ปลดล็อค การตัดสินใจดาวเคราะห์ที่บริโภค£sr_zro£Zro เพื่อกองทุนวิจัยเพิ่มเติมที่$building_research_efficiency_1$."
