 fedel.904.b.tooltip:0 "แบ่งยอดเงินจากสมาชิกสหพันธรัฐทั้งหมด\n\n"
 fedel.904.c:0 "เหมาะสม"
 fedel.904.c.tooltip:0 "เก็บเงินไว้ ใช้ชั่วคราว§Y$midas_stigma$§! จักรวรรดิเครื่องช่วยหายใจ\n\n"

 fedel.906.name:0 "$fedel.904.name$"
 fedel.906.first_paragraph:1 "ข้อ ท้าทาย ด้าน กฎ ทอง ในฐานะพนักงานต้อนรับคนใหม่ของเงินรางวัลนี้[event_target:federation_bidding_winner.GetName]ได้มีประกาศต่อไปนี้:"
 fedel.906.desc.a:2 "$fedel.906.first_paragraph$\n\n\"เราจะ§Yลงทุน§!เงินเหล่านี้กลับมาเป็น[federation.GetName]เพื่อที่เราจะได้กระตุ้นให้เศรษฐกิจของเราเติบโต[event_target:federation_bidding_winner.GetGoldenRuleDebrief]\"" # Passage ends with one of the golden_rule_debrief strings below. Please note the speech marks around the second paragraph.
