 MACHINE_EXPANSIONIST_GREETING_01:0 "การเติบโตที่โดดเด่น เป็นหนึ่งในวิกฤตของเป้าหมายของเรา"
 MACHINE_EXPANSIONIST_GREETING_02:0 "โลกเพิ่มเติมจะต้องชําระและผนวกเข้าไปใน[Root.GetName]."
