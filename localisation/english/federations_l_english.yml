 # Types
 default_federation:0 "สหพันธ์กาแล็กติก"
 default_federation_desc:1 "สมาชิกสหพันธ์นี้พร้อมให้ความร่วมมือซึ่งกันและกัน พวกเขาจะจัดการปัญหาร่วมกัน"
 trade_federation:0 "สมาคมการค้า"
 trade_federation_desc:0 "สหพันธ์นี้ให้ความสำคัญกับตลาดเสรีและการเติบโตทางเศรษฐกิจ"
 research_federation:0 "ความร่วมมือทางด้านการวิจัย"
 research_federation_desc:1 "สหพันธ์นี้มีแนวทางไปสู่ระบอบเทคโนโลยีโดยมุ่งเน้นไปที่ความจริงสากล"
 military_federation:0 "พันธมิตรสงคราม"
 military_federation_desc:1 "สมาชิกของสหพันธ์นี้พยายามที่จะเข้าใกล้กัน มีความกล้าหาญและความร่วมมือทางทหาร"
 hegemony_federation:0 "สหพันธ์มหาอำนาจ"
 hegemony_federation_desc:0 "สหพันธรัฐนี้สร้างขึ้นโดยมีจักรวรรดิทรงพลังแห่งเดียวล้อมรอบด้วยรัฐบริวาร"
 spiritualist_federation:0 "พันธสัญญาศักดิ์สิทธิ์"
 spiritualist_federation_desc:1 "สหพันธ์นี้ส่งเสริมการศึกษาเรื่องจิตวิญญาณและแสดงความเคารพต่อทุกสิ่งอันศักดิ์สิทธิ์"

 # Perks
 federation_fleet_size_1:0 "แลกเปลี่ยนเจ้าหน้าที่"
 federation_fleet_size_1_desc:1 "ความสามารถในการทำงานร่วมกันและความสามารถในการวางกำลังของกองยานรวมของเราได้รับการปรับปรุงอย่างมากโดยการฝึกซ้อมกองยานบ่อยๆ โดยมีการหมุนเวียนคำสั่งระหว่างเจ้าหน้าที่ประจำของทุกรัฐ"
 federation_fleet_size_2:0 "มาตรฐานลอจิสติกส์"
 federation_fleet_size_2_desc:0 "การ ตก ลง กับ กระสุน, เชื้อ เพลิง, และ สิ่ง จําเป็น อื่น ๆ ซึ่ง มี อยู่ ทั่ว ไป หมาย ความ ว่า กอง เรือ สมาชิก ของ เรา หลาย กอง สามารถ ทํา งาน ได้ อย่าง ง่าย ดาย ยิ่ง ขึ้น และ ด้วย เหตุ นี้ จึง สามารถ ทํา งาน ได้ นาน ขึ้น."
 federation_fleet_size_3:0 "รวมสัญญาณระหว่างดวงดาว"
 federation_fleet_size_3_desc:0 "เชื่อมโยงกองยานของสมาชิกทั้งหมดในเครือข่ายคำสั่งความเร็วที่เป็นหนึ่งเดียว ช่วยให้เราสามารถประสานการดำเนินการของกองยานในระดับที่ไม่เคยมีมาก่อน"
 federation_fleet_size_effect:0 "สมาชิกมีส่วนร่วมสนับสนุน §Yความจุยานรบของสหพันธ์§! เพิ่ม §G+25%§!"
 federation_fleet_speed_1:0 "เส้นภายใน"
 federation_fleet_speed_1_desc:1 "แผนผังเส้นทางไฮเปอร์สเปซและการลาดตระเวนภายในเขตแดนของเรา อนุญาตให้มีอิสระในการเคลื่อนไหว ทำให้กองยานรบของเราปฏิบัติการได้อย่างรวดเร็วในทุกที่ที่ต้องการ"
 federation_fleet_speed_effect:0 "§Yความเร็วยาน§! เพิ่มขึ้น §G+10%§! เมื่ออยู่ในเขตแดนของสหพันธ์"
 federation_fire_rate_1:0 "จิตวิญญาณของการบุก"
 federation_fire_rate_1_desc:0 "การป้องกันนั้นมีความได้เปรียบในเชิงกลยุทธ์ แต่ผู้บัญชาการรู้มาตั้งแต่สมัยโบราณว่า การโจมตีเท่านั้นที่สามารถบรรลุเป้าหมายสูงสุดของสงครามได้: เพื่อบังคับศัตรูทำตามความประสงค์ของเรา"
 admiral_level_cap_1:0 "วัฒนธรรมการบินอวกาศ"
 admiral_level_cap_1_desc:0 "สถาบันฝึกอบรมที่ครอบคลุมและทันสมัยได้รับการสนับสนุนจากวัฒนธรรมการบินอวกาศหลายศตวรรษ ทำให้เจ้าหน้าที่ของเราเป็นหน่วยงานที่ดีที่สุดในกาแล็กซี"
 claim_cost_1:0 "เขตอิทธิพล"
 claim_cost_1_desc:0 "เรา ปรารถนา จะ มี ความ สัมพันธ์ เป็น มิตร กับ ทุก ชาติ ใกล้ เคียง. หาก ไม่ สามารถ บรรลุ ความ สัมพันธ์ อัน เป็น มิตร ได้ เนื่อง จาก การ ขัด ขวาง จาก รัฐบาล ของ พวก เขา ใน ปัจจุบัน เรา ก็ สามารถ ติด ตั้ง สิ่ง ใหม่ ๆ ที่ เกี่ยว ข้อง กับ ความ ตั้งใจ ได้."
 job_output_1:0 "ความแข็งแกร่งผ่านเอกภาพ"
 job_output_1_desc:1 "ฟรีของพิษน้ํายาเคมีที่มีลักษณะความสัมพันธ์ระหว่างดวงดาว ก่อนการเพิ่มขึ้นของสหภาพของเรารัฐคู่สามารถ"
 job_output_2:0 "วัตถุ ประสงค์ ที่ ใหญ่ กว่า"
 job_output_2_desc:0 "ความคิดที่ดีซึ่งทําให้คนของเราเป็นเอกฉันท์ สําคัญกว่าความประสงค์หรือความสะดวกของบุคคลใด ๆ ต้อง ถวาย เครื่อง บูชา บน เส้น ทาง สู่ ความ ก้าว หน้า."
 job_output_3:0 "บริการสากล"
 job_output_3_desc:0 "เรา ไม่ จําเป็น ต้อง เผชิญ กับ ความ ปวด ร้าว ใจ และ ข้อ สงสัย เกี่ยว กับ บทบาท ของ เรา ใน การ บํารุง เลี้ยง อีก ต่อ ไป. เมื่อถามว่า \"เราต้องเตรียมตัวให้เท่าไหร่\" คําตอบเดียวก็คือ \"ทุกอย่าง\""
 research_share_1:0 "การติดต่อทางวิชาการ"
 research_share_1_desc:1 "ไม่มีความรู้ใดๆที่สามารถเป็นได้ ด้วยวิธีการนี้ เราจึงตัดสินใจ ที่จะยุติการสะสมการค้นพบทางวิทยาศาสตร์ ซึ่งขัดขวางความก้าวหน้าที่แท้จริงในกาแล็กซี่"
 research_share_1_effect:0 "§Yข้อตกลงการวิจัยของสหพันธ์§! มีความเร็วในการวิจัยเพิ่มขึ้น §Y5%§!"
 research_share_2:0 "ภาษาวิทยาศาสตร์"
 research_share_2_desc:0 "สมาชิก ทุก ชนิด มี รูป แบบ ของ ตน เอง ใน การ เก็บ ภาษี, ตาราง ธาตุ, และ เครื่อง มือ อื่น ๆ ใน การ แลก เปลี่ยน ความ รู้. โดย ตั้ง อยู่ บน ความ รู้ ที่ มี อยู่ ทั่ว ไป แนว คิด อาจ ถูก ถ่ายทอด ได้ ด้วย ความ สับสน น้อย ที่ สุด."
 research_share_3:0 "ใบอนุญาตการผลิต"
 research_share_3_desc:0 "สิ่ง ประดิษฐ์ อัน ยิ่ง ใหญ่ ที่ ไม่ เคย ออก จาก โลก ของ มัน มี คุณค่า ทาง การ ศึกษา หรือ ทาง สังคม จํากัด. เราจะสนับสนุนการผลิตใบอนุญาต ของนวัตกรรมดังกล่าว เพื่อเพิ่มความเร็วของพวกเขา"
 research_share_4:0 "ฐานข้อมูลสากล"
 research_share_4_desc:0 "แบบ UD ได้กลายเป็นการจัดเรียงของข้อความศักดิ์สิทธิ์เทคโนโลยี บรรจุความรู้สะสมของสายพันธุ์สมาชิกทั้งหมดของเรา แม้ว่าปัจเจกบุคคลจะลืมไป หรือจักรวรรดิล่มสลาย พวกยูดีก็จะอดทน"
 research_boost_1:0 "รีวิวงานวิจัยแบบเรียลไทม์"
 research_boost_1_desc:0 "ถ้าต้นแบบและทฤษฎีใหม่ๆ ถูกส่งต่อไปยังทุกสถาบันวิจัย ในความร่วมมือของเราผ่านทางความเร็วการสื่อสาร"
 rare_tech_boost:0 "แรงบันดาลใจทางวิทยาศาสตร์"
 rare_tech_boost_desc:0 "ดวงดาวที่หลากหลายสายพันธุ์ ของความร่วมมือของเรา เปิดเผยนักวิทยาศาสตร์ที่จะมอง"
 rare_tech_boost_effect:0 "§Mเทคโนโลยีหายาก§! ที่ถูกปลดล็อกไปแล้วโดยสมาชิกอื่นในสหพันธ์ จะมีโอกาสปรากฏเป็น §Y2§! เท่าจากอัตราปกติ เอฟเฟกต์นี้จะเปลี่ยนโอกาสจาก §Y1%§! เป็น §Y2%§!"
 crisis_research_1:0 "ระดมงานวิจัย"
 crisis_research_1_desc:0 "เมื่อ เผชิญ กับ ภัย คุกคาม ที่ เห็น ได้ ชัด และ ใกล้ เข้า มา ต่อ ชีวิต ทุก อย่าง ของ นัก วิทยาศาสตร์ ต้อง เตรียม พร้อม ที่ จะ จัด การ ทดลอง เชิง นามธรรม ไว้ ต่าง หาก เพื่อ สนับสนุน การ ใช้ ใน การ ป้องกัน อย่าง สิ้น เชิง."
 crisis_research_1_effect:1 "$FEDERATION_PERK_MEMBER_MOD$\nในระหว่างวิกฤตการจบเกม§Y10%§! การวิจัยสปีด"
 crisis_research_2:0 "โปรโตคอลจริยธรรมถูกระงับ"
 crisis_research_2_desc:0 "ไม่ มี ข้อ ห้าม ใด ๆ ที่ เข้ม งวด เกิน ไป, ไม่ มี หลัก ศีล ธรรม ที่ ผิด ศีล ธรรม เกิน ไป, เมื่อ ทาง เลือก อย่าง เดียว คือ การ ทําลาย ล้าง อย่าง สิ้น เชิง."
 tech_diplo_weight_1:0 "เทคโนแครต (นักวิชาการ)"
 tech_diplo_weight_1_desc:0 "เราจะจัดตั้งสังคมของเราขึ้นใหม่ ตามแนวคิดสุดโต่ง ที่ว่าผู้มีความรู้ผู้เชี่ยวชาญภายในทรงกลม"
 president_option_1:0 "สาขาวิจัยผู้บริหาร"
 president_option_1_desc:0 "แน่นอน วิทยาศาสตร์ โดย ตรง มี บทบาท สําคัญ แต่ มี บาง กรณี ที่ เป้า หมาย ใน การ ค้นคว้า ซึ่ง กําหนด ให้ อยู่ ใน ระดับ สูง ที่ สุด อาจ ก่อ ผล กระทบ อย่าง ใหญ่ หลวง."
 president_megastructure_1:0 "ความคิดริเริ่มการก่อสร้างเชิงยุทธศาสตร์"
 president_megastructure_1_desc:0 "ความ สามารถ ของ สาขา ฝ่าย บริหาร ที่ จะ ผนึก พลัง ใน โครงการ ยุทธศาสตร์ ที่ กําหนด ไว้ จะ ช่วย รักษา ความ สมดุล ของ อํานาจ และ ปก ป้อง วิถี ชีวิต ของ เรา."
 unity_boost_1:0 "ความหนาของสี"
 unity_boost_1_desc:0 "ประชาชนของเรามีความภูมิใจอย่างแท้จริง ในบทบาทของเราในการดําเนินงาน ชื่อ เสียง ใน เรื่อง การ ปฏิบัติ อย่าง ยุติธรรม และ อย่าง เปิด เผย กับ สมาชิก ทุก คน หรือ ไม่ ก็ ส่ง เสริม ให้ มี ความ สํานึก ถึง จุด มุ่ง หมาย แห่ง สันติ สุข."
 unity_boost_2:0 "กฎบัตรสิทธิ์"
 unity_boost_2_desc:0 "มากกว่าคําของบุคคลใด ๆ การประกาศรหัสของลิขสิทธิ์ของสิทธิทางโลก ได้เป็นเอกอัครราชทูตที่ยิ่งใหญ่ที่สุดสําหรับการบํารุงเลี้ยงของเรา"
 president_unity_1:0 "ความภักดีต่อสหพันธ์"
 president_unity_1_desc:0 "เมื่อคนใดคนหนึ่งของเราเข้ารับตำแหน่งประธาน เราทุกคนรู้สึกถึงความสามัคคีและจุดมุ่งหมายในความพยายามร่วมกันที่ยิ่งใหญ่นี้ เราจะก้าวไปข้างหน้าด้วยกัน"
 trade_value_1:0 "ข้อตกลงการค้าเสรี"
 trade_value_1_desc:0 "ขั้น ตอน แรก ที่ จะ สร้าง สภาพ แวด ล้อม ทาง ธุรกิจ ที่ มี ความ เจริญ และ มี สุขภาพ ดี อย่าง แท้ จริง คือ ขจัด อุปสรรค ที่ เป็น ระบบ ต่อ การ เคลื่อน ไหว ของ สินค้า และ การ บริการ. ความวุ่นวายทางเศรษฐกิจท้องถิ่นในระยะสั้นจะถูกติดตามด้วยแมโครขนาดมีประสิทธิภาพ"
 trade_value_2:0 "การ วัด ค่า มาตรฐาน"
 trade_value_2_desc:0 "เช่นเดียวกับที่ได้ทําในทุก ๆ บ้านเกิดที่แตกต่างกันของเราในยุคก่อนหน้า FTL เราจะต้องเห็นตรงกันอีกครั้งกับชุดมาตรฐานกาแล็กซี่ของมาตรการสําหรับเวลา น้ําหนัก ระยะทางและคุณค่า"
 trade_value_3:0 "บายมอร์ บายมอร์"
 trade_value_3_desc:0 "ความร่วมมืออย่างสันติและให้กําไรร่วมกัน ระหว่างรัฐสมาชิกลีก ได้สร้างรูปแบบ \"ความซื่อสัตย์แบรนด์\" ในพฤติกรรมผู้บริโภค พลเมืองของเรา โดยไม่มีอะไรกระตุ้นมากนัก ดูเหมือนอยากจะซื้อจากสมาชิกลีกอื่น"
 trade_value_4:0 "สนธิ สัญญา การ ค้า ที่ มี ความ สําคัญ"
 trade_value_4_desc:0 "ตอนนี้ เราจะย้ายไปสร้างการเชื่อมโยงการค้าอย่างเป็นทางการ ระหว่างรัฐเอกราชของเรา เพื่อที่เราทุกคนจะได้ผลประโยชน์ เมื่อใดก็ตามที่มีอะไรถูกซื้อหรือขาย ทําไมต้องซื้อที่อื่นด้วย"
 trade_protection_1:0 "ความปลอดภัยของอวกาศ"
 trade_protection_1_desc:0 "ไม่ มี ความ ก้าว หน้า ทาง วัตถุ ใด ๆ จะ สําคัญ หาก สินค้า ที่ ผลิต ขึ้น มา ไม่ สามารถ ไป ถึง จุด หมาย ปลาย ทาง เนื่อง จาก การ ทุจริต และ การ ขโมย. การบังคับใช้อย่างแน่นหนาของเรา ในข้อบัญญัติต่อต้านการก่อกบฏ จะทําให้แน่ใจว่าสุขภาพทางเศรษฐกิจของลีก"
 president_trade_value_1:0 "ศูนย์การค้า"
 president_trade_value_1_desc:1 "เช่น เดียว กับ ทาง เดิน ทะเล ใน สมัย โบราณ การ นั่ง อยู่ กับ ที่ เป็น หลอด เลือด แดง หลัก ของ การ ค้า ทาง ทะเล ทํา ให้ ได้ ผล ประโยชน์ ทาง การ เงิน มาก ที เดียว."
 extra_envoy_1:0 "ทูตของรัฐบาลกลาง"
 extra_envoy_1_desc:1 "อนาคตที่ดีกว่าที่เราพยายามสร้างจะใช้ได้ผลก็ต่อเมื่อมนุษย์ทุกคนตระหนักถึงสิ่งที่เราหมายถึงเพื่อบรรลุ เราตั้งใจที่จะเป็นผู้กระจายและโน้มน้าวเพื่อสันติภาพในกาแล็กซี"
 extra_influence_1:0 "ความน่าเคารพของตำแหน่งหน้าที่"
 extra_influence_1_desc:0 "การขึ้นสู่ตำแหน่งสูงสุดในสหพันธ์ของเราไม่ใช่เรื่องง่าย แต่เป็นความมุ่งมั่นที่ไร้ขีดจำกัดในการให้ดูแลทุกชีวิต อย่างไรก็ตาม ตำแหน่งประธานก็มาพร้อมกับความมีหน้ามีตา"
 diplomacy_upkeep_1:0 "ผู้ ดู แล การ เมือง"
 diplomacy_upkeep_1_desc:0 "ข้อตกลงที่มีประโยชน์ร่วมกัน ระหว่างสมาชิกของชาตินั้น ง่ายกว่ามาก ในการประสานงานเมื่อตัวแทนหัวหน้า จากชาติผู้นํา"
 diplomacy_upkeep_1_effect:0 "การวิจัยข้อ ตก ลง และ การ ย้าย ถิ่น ระหว่าง สมาชิก ใน หน่วย งาน บํารุง เลี้ยง ไม่ ต้อง เสีย เงิน£influence£ อิทธิพลในการดูแลของพวกเขา"
 diplo_weight_1:0 "พันธมิตรตามประวัติศาสตร์"
 diplo_weight_1_desc:0 "ด้วยบันทึกแห่งความร่วมมืออันยาวนานและประสบผลสำเร็จภายในพันธมิตร สมาชิกของสหพันธ์มีอิสระในการลงคะแนนตามที่พวกเขาเลือกและมักจะสอดคล้องกับประเด็นสำคัญเมื่อเวลาผ่านไป"
 damage_crisis_1:0 "เข้มแข็งไปด้วยกัน"
 damage_crisis_1_desc:0 "การยับยั้งผู้รุกรานที่ร้ายแรงเป็นรักษาความสงบที่เปราะบางของกาแล็กซีนี้ไว้ เราจะร่วมกันต่อต้านทุกคนที่คุกคามคำสั่งนี้ไม่ว่าจะจากภายในหรือไม่มีก็ตาม"
 damage_crisis_2:0 "ผู้รักษาสันติภาพกาแล็กติก"
 damage_crisis_2_desc:0 "หากเราตั้งใจที่จะครอบครองอำนาจโดยคุณธรรมในการปกครอง เราจำเป็นต้องแสดงให้กาแล็กซีให้เห็นว่าเราไม่เพียงแต่มีเจตจำนงที่จะปกป้องจากภัยคุกคามภายนอกเท่านั้นแต่ยังมีภัยร้ายอื่นที่รอเราอยู่"
 envoy_unity_1:0 "ผู้ช่วยทูตของรัฐบาลกลาง"
 envoy_unity_1_desc:0 "ตุลาการ(ผู้ตัดสินชี้ขาด)ของวาระการประชุมสหพันธ์ - ทูตของเรา - มีความเข้าใจและกระตือรือร้นในการพยายามปรับปรุงความรู้สึกเป็นเจ้าของและผลประโยชน์ร่วมกันระหว่างสมาชิกของเรา"
 envoy_unity_1_effect:2 "เจ้าหน้าที่แต่ละคนที่ได้รับการแต่งตั้งให้ประจำอยู่ที่สหพันธ์จะได้รับเอกภาพเพิ่ม §Y2§! และความเชื่อใจเพิ่ม §Y5%§!"
 envoy_unity_2:0 "ความสามัคคีของรัฐบาลกลาง"
 envoy_unity_2_desc:1 "ทูตของเราทำงานอย่างไม่หยุดยั้งเพื่อส่งเสริมสนับสนุนวาระและวัตถุประสงค์ของสหพันธ์ สร้างแรงบันดาลใจให้เกิดความสัมพันธ์อันดีและความเชื่อมั่นทั่วทั้งกาแล็กซี"
 envoy_unity_2_effect:1 "เจ้าหน้าที่แต่ละคนที่ได้รับการแต่งตั้งให้ประจำอยู่ที่สหพันธ์จะได้รับเอกภาพเพิ่ม §Y2§! และเพิ่มเพดานความเชื่อใจ §Y5§!"
 cohesion_join_1:0 "ต้อนรับสมาชิกใหม่"
 cohesion_join_1_desc:0 "โดยไม่คำนึงถึงความแตกต่างทางวัฒนธรรมหรือทางชีวภาพ การเติบโตของสหพันธ์เป็นผลประโยชน์ของทุกคน"
 cohesion_join_1_effect:0 "โทษ(ความสัมพันธ์ในสหพันธ์)จากการรับสมาชิกใหม่ของสหพันธ์ลดลง §Y50%§!"
 cohesion_failed_vote_1:0 "ตกลงที่จะไม่เห็นด้วย"
 cohesion_failed_vote_1_desc:0 "การใช้ความคิดนั้นดีกว่าการโต้เถียงกันอย่างดุเดือดและการอภิปรายเป็นเครื่องมือที่ยอดเยี่ยมเมื่อมีจุดมุ่งหมาย เพื่อสร้างอนาคตที่มั่นคง"
 cohesion_failed_vote_1_effect:0 "โทษ(ความสัมพันธ์ในสหพันธ์)จากความล้มเหลวในการโหวตของสหพันธ์ ลดลง §Y50%§!"
 federation_fleet_unity_1:0 "รวมพลัง"
 federation_fleet_unity_1_desc:0 "การได้รู้ว่ากองเรือที่เข้าร่วมของเรา กําลังลาดตระเวณที่ว่างเปล่า ทําให้สมาชิกของเรามีความภูมิใจ ความมั่นคง และความมุ่งมั่น"
 federation_fleet_unity_1_effect:1 "£unity£ §Yเอกภาพรายเดือน§! เท่ากับ §Y10%§! ของขนาดกองยานสหพันธ์"
 president_keep_navy_1:0 "หมดอายุแล้ว"
 president_keep_navy_1_desc:0 "การ นํา หน้า โดย การ วาง ตัว อย่าง อาจ เป็น สิ่ง ที่ มี พลัง และ ก่อ แรง บันดาล ใจ และ ด้วย เหตุ นี้ ผู้ นํา จึง ปราศจาก ข้อ จํากัด ใด ๆ ที่ จะ ป้องกัน เรื่อง นี้."
 president_keep_navy_1_effect:1 "ประธานาธิบดีของสหพันธรัฐมีส่วนในการดูดพลังของกองทัพเรือ โดยไม่ลดความสามารถของกองทัพเรือของตัวเอง"
 president_hegemony_cb_1:0 "ร่วม หรือ ตาย"
 president_hegemony_cb_1_desc:0 "ถ้าพวกเขาไม่ได้อยู่กับเรา พวกเขากําลังต่อต้านเรา ไม่ ว่า จะ เป็น กอง กําลัง ใด ๆ ที่ ต่อ ต้าน เรา ก็ ต้อง ถือ ว่า เป็น ภัย คุกคาม และ ปฏิบัติ ตาม นั้น."
 president_hegemony_cb_1_effect:1 "ประธานจะได้§Yสร้าง สงคราม§!เพื่อบังคับให้จักรวรรดิที่ไม่หล่อเลี้ยง เข้าร่วมการบํารุงรักษา"
 president_diplo_weight_steal_1:0 "สิทธิ พิเศษ ของ เฮ เก โม นิก"
 president_diplo_weight_steal_1_desc:0 "อํานาจของผู้ปกครองไม่สามารถทําลาย ณ จุดใด ๆ การสนับสนุนอย่างเต็มรูปแบบจากหัวหน้าของเฮกโมนี เป็นเรื่องจําเป็น"
 president_diplo_weight_steal_1_effect:1 "การโอนสมาชิกทั้งหมด§Y10%§!ของพวกมัน§Y$MOD_DIPLO_WEIGHT_MULT$§!แด่ประธานาธิบดี"

 spiritualist_federation_passive:0 "$spiritualist_federation$"
 spiritualist_federation_passive_desc:0 "$spiritualist_federation_desc$"
 spiritualist_federation_passive_tooltip:0 "$mod_country_unity_produces_mult$: §G+10%§!"
 spiritualist_envoys_1:0 "การ โน้ม น้าว ผู้ เข้า ร่วม ประชุม"
 spiritualist_envoys_1_desc:0 "มี หลาย อย่าง ที่ ตัว แทน ของ เรา อาจ ป้องกัน ไว้."
 spiritualist_envoys_1_effect:0 "§Y$official_plural_with_icon$§!ได้รับมอบหมายให้เป็นสหพันธรัฐ ตอนนี้จะให้§G50%§!มาก§Yความแหลม:§!และเพิ่มขึ้น§Yวิญญาญ§!จิตสํานึกภายในจักรวรรดิโดย§Y20%§!."
 culture_workers_1:0 "การ ปลูก ฝัง วัฒนธรรม"
 culture_workers_1_desc:0 "อัตลักษณ์ทางวัฒนธรรมของเรา คือความแข็งแกร่งของเรา โดยส่งเสริมมัน เราจะเพิ่มพลังอย่างเหลือทน"
 culture_workers_1_effect:0 "$mod_planet_civilians_unity_produces_add$: §G+1§!\n[civilian.GetIcon] [civilian.GetNamePlural]รับผลเพิ่มเติมจากจักรวรรดิจริยธรรม"
 president_spiritualist_1:0 "การ เผย แพร่ พระ คํา บริสุทธิ์"
 president_spiritualist_1_desc:0 "เรา ไม่ อาจ รับ ประกัน ได้ ว่า ผล ประโยชน์ ฝ่าย วิญญาณ จะ ได้ รับ การ คุ้มครอง นอก เสีย จาก ว่า เรา สามารถ ลอบ นํา พวก เขา เข้า ไป ใน กฎหมาย ของ พระเจ้า."
 unity_trade_1:0 "การ ให้ ทุน ทาง ด้าน การ เงิน"
 unity_trade_1_desc:0 "คํา สั่ง ของ ปุโรหิต ไม่ อาจ เจริญ งอกงาม ได้ โดย ปราศจาก ความ มั่งคั่ง. เรา จะ ใช้ อํานาจ ทาง การ ค้า เพื่อ ให้ ความ เจริญ รุ่งเรือง มาก ขึ้น และ ทํา ให้ เรา บรรลุ เป้า หมาย ฝ่าย วิญญาณ มาก ขึ้น."
 unity_trade_1_effect:0 "แกรนท์เข้าถึง§Yสัญญา อัน ศักดิ์สิทธิ์§!ข้อกําหนดการค้าซึ่งเปลี่ยน§Y50%§!ของ$r_trade$ไปยัง$r_unity$."
 ascension_shared_1:0 "สวรรค์"
 ascension_shared_1_desc:0 "ความ ใกล้ ชิด สนิท สนม ของ เรา มาก ขึ้น เรื่อย ๆ จะ เกิด ผล ใน ความ เจริญ รุ่งเรือง และ สวัสดิภาพ ฝ่าย วิญญาณ ของ ประชาชน ของ เรา."
 president_spiritualist_2:0 "ใน การ แสวง หา การ ช่วย ให้ รอด"
 president_spiritualist_2_desc:0 "การ เป็น ผู้ นํา ของ คํา สัญญา ไมตรี บริสุทธิ์ นี้ เป็น ขั้น ตอน สําคัญ ที่ นํา ไป สู่ การ เสด็จ ขึ้น สู่ สวรรค์ ฝ่าย วิญญาณ."
 all_the_priests_1:0 "อํานาจ ของ ชน ชั้น ปุโรหิต"
 all_the_priests_1_desc:0 "ยิ่ง บาทหลวง มาก เท่า ไร ความ ไม่ สมดุล ฝ่าย วิญญาณ ก็ ยิ่ง น้อย ลง เท่า นั้น เรา จะ ต้อง ทน."
 all_the_priests_1_effect:0 "£unity£ เอกภาพ- โฟกัส§Yการออกแบบคอนี§!จะผลิตเพิ่ม§G+1§! £job_priest£ §Y$job_priest_plural$§!งานต่อ 25£pop£ §Yป๊อป§!(นี่จะเพิ่มขึ้นอีกได้โดยการใช้โคเลียน แอสเซนชั่น)"
 all_the_priests_2:0 "มหาศักราชนักบุญ"
 all_the_priests_2_desc:0 "เนื่อง จาก เรา มี ความ สนใจ มาก ขึ้น ใน เรื่อง ฝ่าย วิญญาณ ชน ชั้น ปุโรหิต จึง เฟื่อง ฟู ขึ้น จน ไม่ มี ความ เชื่อ. คนที่มีความสามารถมากที่สุดในหมู่พวกเขาตอนนี้จะได้รับการส่งเสริม ให้เป็นผู้นําของโบสถ์ที่ขยายตัว"
 all_the_priests_2_effect:0 "§Yเน็กซัส ศักดิ์สิทธิ์§!และมีอาคารใกล้เคียงกัน§G+$pop_group_unit$§! £job_high_priest£ §Y$job_high_priest_plural$§!."
 president_spiritualist_3:0 "การไล่ระดับสี"
 president_spiritualist_3_desc:0 "เดอะ§Mเดอะชราวด์§!คืออนาคต เราจะทําให้มันเป็นของเรา"
 make_spiritualist_1:0 "สหภาพ แห่ง ความ เชื่อ"
 make_spiritualist_1_desc:0 "ความ เชื่อ ของ เรา อยู่ ที่ แก่น แห่ง คํา สัญญา ไมตรี บริสุทธิ์. จะ ไม่ มี การ ออก หาก อีก ต่อ ไป: สมาชิก ทุก คน ต้อง ดึง น้ํา หนัก ของ ตน ถ้า พวก เขา จะ อยู่ ภาย ใน สหภาพ ของ เรา."
 make_spiritualist_1_effect:0 "จักรวรรดิที่ไม่ใช่วิญญาณ§Yสํานักงาน§!อาคารเปลี่ยนไปใช้§Yวิหาร§!.\nจักรวรรดิ ฝ่าย วิญญาณ ได้ รับ ผล กระทบ§G+1§! $r_unity$ $produced_per_pop_group_unit$ £job_priest£ §Y$job_priest_plural$§!.\nจักรวรรดิทั้งหมด เผชิญ§R30%§!หุ่นยนต์ทํางานช้าลง แต่§G+15%§!เติบโตเร็วขึ้น อินทรีย์ป๊อป"
 zro_catalysis_1:0 "ซโร คา ตา ลี ซิส"
 zro_catalysis_1_desc:0 "Zro เงินมัดจําเป็นทรัพยากรที่ส่วนใหญ่ไม่ได้บรรจุ จิตใจ ที่ ดี ที่ สุด ของ เรา สามารถ หา วิธี ที่ จะ นํา ไป ใช้ มาก ขึ้น ได้ อย่าง แน่นอน."
 zro_catalysis_1_effect:0 "ปลดล็อค§Yซโร คา ตา ลี ซิส§!พระราชบัญญัติซึ่งช่วยให้เราแปลง£sr_zro£ §YZro§!ในการแสดงผลทรัพยากรที่เพิ่มขึ้น"
 president_spiritualist_4:0 "ราชกิจจานุเบกษา"
 president_spiritualist_4_desc:0 "โดยพระคุณแห่งพันธสัญญาอันศักดิ์สิทธิ์ ท่านประธานาธิบดีอาจใช้อํานาจในการปกครองของผู้บริหารมากขึ้น"

