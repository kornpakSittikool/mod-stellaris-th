 tech_juggernaut:0 "จักเกอร์น็อท"
 tech_juggernaut_desc:0 "พื้น ที่ ใน การ เคลื่อน ย้าย ซึ่ง มี สัดส่วน ที่ ไม่ มี ใด เทียบ ได้ ชน ชั้น เรือ ของ จู เกอร์ เนอ ร์ ได้ ทํา สงคราม ที่ น่า ชิง ชัง จน ถึง ระดับ ใหม่ ทั้ง หมด."

 tech_advanced_metallurgy_1:0 "โลหะผสมเซราโม"
 tech_advanced_metallurgy_1_desc:0 "การ ใช้ เครื่อง ปั้น ดิน เผา ที่ ก้าว หน้า อย่าง แพร่ หลาย ใน อุตสาหกรรม อาจ ทํา ให้ ผล ผลิต ทาง วิศวกรรม ดี ขึ้น."
 tech_advanced_metallurgy_2:0 "โลหะผสมปรับเทียบสี"
 tech_advanced_metallurgy_2_desc:0 "โดยการแทนที่อุปกรณ์ปฏิรูปเซราโมโมเมทัล ด้วยเทคโนโลยีสุดขอบ เราสามารถดําเนินการปลอมของเราได้"
 tech_consumer_good_refinement_1:0 "อัลกอริทึมวิเคราะห์ตลาด"
 tech_consumer_good_refinement_1_desc:0 "พื้นฐานการบริหาร เอไอ สามารถนําไปใช้ในสายอุปทานและสายอุปสงค์ ลดของเสีย"
 tech_consumer_good_refinement_2:0 "การพยากรณ์ความนิยมในการบริโภค"
