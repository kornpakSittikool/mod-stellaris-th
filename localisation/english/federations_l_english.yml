 CURRENT_TERM_ENDS:0 "ระยะเวลาสิ้นสุด: $DATE|Y$"

 #Thesis Defense
 fedel.1501.name:0 "คณะ กรรมการ สหพันธ์ ถูก แต่ง ตั้ง"
 fedel.1501.desc:0 "คณะกรรมการที่ไม่เป็นธรรมของ นักวิทยาศาสตร์และนักคิด รวมตัวกันอยู่ภายในห้องพักของเรา จุด มุ่ง หมาย ของ มัน คือ เพื่อ รับ ใช้[root.GetAllianceName]ในฐานะนักวิชาการ ในการแข่งขันผู้นําที่กําลังจะมาถึง\n\nปัจจุบัน จักรวรรดิ แต่ ละ แห่ง จะ รวบ รวม กลุ่ม นัก วิจัย เพื่อ ตรวจ สอบ ประเด็น หนึ่ง ซึ่ง การ ค้น พบ นี้ น่า จะ เป็น ประโยชน์ ใน ทาง ใด ทาง หนึ่ง ต่อ อนาคต ของ เรา. ทีมจะนําเสนอการค้นพบของพวกเขาไปยังฟอรั่มที่เปิดอยู่ ไม่ว่าวิทยานิพนธ์ไหน จะมีอัตราสูงสุดในนวัตกรรม วิทยาศาสตร์ที่แข็งกร้าวและสอดคล้อง"
 fedel.1501.desc.subject:0 "$fedel.1501.desc$\n\nน่า เสียดาย เนื่อง จาก เรา ไม่ ได้ เป็น เอกเทศ เรา ถูก ห้าม ไม่ ให้ มี ส่วน ร่วม ใน การ รับ ประทาน อาหาร ขณะ ที่ เรา ไม่ มี สิทธิ์ นํา หน้า."
 fedel.1501.a:0 "เพื่อวิทยาศาสตร์!"
 tooltip_thesis_begin:0 "ความท้าทายวิทยานิพนธ์จะเริ่มในไม่ช้า"
 fedel.1506.name:0 "A Thesis is Chosen"
 fedel.1506.win.desc:0 "คณะ กรรมการ สหพันธ์ ได้ ยอม รับ คุณค่า ของ การ ศึกษา ของ เรา ที่ มี ต่อ§H[winning_thesis.GetThesisTopic]§!อนุมัติ§Y[ruler.GetTitle] [ruler.GetRegnalName]§!ความเป็นผู้นําของเทอมต่อไป มี การ เสนอ ความ รู้สึก ที่ น่า พอ ใจ แก่ เรา[ruler.GetTitle]ถึง[ruler.GetHerHis]ทีมนักวิจัย"
 fedel.1506.win.autocracy.desc:0 "คณะ กรรมการ สหพันธ์ ได้ ยอม รับ การ หา เหตุ ผล ที่ ไม่ แน่นอน ของ เรา ใน การ ศึกษา ซึ่ง ดําเนิน การ โดย§Y[ruler.GetTitle] [ruler.GetRegnalName]§!บน§H[winning_thesis.GetThesisTopic]§!. [ruler.GetSheHeCap]จะถือว่าเป็นผู้นําที่ร่ํารวยที่สุด สําหรับเทอมต่อไป"
 fedel.1506.win.gestalt.desc:0 "คณะกรรมการสหพันธรัฐได้ตระหนักถึง คุณค่าของการศึกษาของเรา§H[winning_thesis.GetThesisTopic]§!พวกเขายอมให้ผู้นํา[root.GetAllianceName]สําหรับเทอมต่อไป"
 fedel.1506.fail.desc:0 "คณะกรรมการสหพันธรัฐได้ผ่านข้อเสนอของเรา, ชื่นชอบการศึกษาที่ไร้สาระจาก[winning_thesis.GetName]บน§H[winning_thesis.GetThesisTopic]§!วิทยาศาสตร์เองจะเสียใจนี้สูญเสียเหตุผล ในขณะเดียวกัน§Y[winning_thesis.GetName]§!สมมติผู้นําของ[root.GetAllianceName]."
 fedel.1506.fail.gestalt.desc:0 "ในการกระทําที่ต้องการของล้มเหลวมอต ลีย์กรรมการสหพันธรัฐได้เลือกวิทยานิพนธ์โดย§Y[winning_thesis.GetName]§!มากกว่าของเราเอง การศึกษาของพวกเขา§H[winning_thesis.GetThesisTopic]§!ได้รับอนุญาตที่อธิบายไม่ได้[winning_thesis.ruler.GetTitle] [winning_thesis.ruler.GetRegnalName]ความเป็นผู้นําของเทอมต่อไป"
 fedel.1506.insufficient.desc:0 "คณะกรรมการสหพันธรัฐเลือกการโต้แย้งที่ชนะ ในขณะที่เรายังคงหายไปจากการประกวด เดอะ§Y[winning_thesis.GetName]§!ได้รับสิทธิ์เป็นผู้นําจากการศึกษา§H[winning_thesis.GetThesisTopic]§!. บาร์ต่ําได้ถูกตั้งขึ้น สําหรับเวลา ที่ทีมวิจัยของเราอาจใช้เวลาไปยังศาลากลาง"
 tooltip_thesis_won:0 "เราจะเป็นผู้นํา[Root.GetAllianceName]ในเทอมต่อไป"
 tooltip_thesis_lost:0 "เราล้มเหลวในการรักษาความปลอดภัยผู้นําของ[Root.GetAllianceName]. เดอะ§Y[winning_thesis.GetName]§!จะรับบทแทน"
 fedel.1506.a:0 "จนกว่าคราวหน้า..."

 # Conclave
 fedel.1805.name:0 "โค เดก ซ์"
 fedel.1805.desc.base:0 "ถึงเวลาแล้วสําหรับผู้นําคนใหม่[Root.GetAllianceName]ที่จะได้รับเลือก สัมพันธภาพของบุคคลที่สูงส่งที่สุดภายในพันธมิตร ได้มารวมตัวกันเพื่อตัดสินว่าจักรวรรดิไหน จะทําหน้าที่แทนและเป็นผู้นําของพวกเขา พวก เขา จะ พบ กัน ใน ห้อง ที่ ปิด ผนึก ซึ่ง มี ข้อมูล ทุก อย่าง ที่ จําเป็น ต้อง ตัดสิน ใจ.\n\nใน ขณะ ที่ การ อภิปราย ซึ่ง เกิด ขึ้น ภาย ใน สถาน ที่ ประชุม เป็น ความ ลับ อย่าง ยิ่ง เป็น ที่ เข้าใจ กัน ว่า ประการ แรก พวก เขา ประเมิน ค่า การ บริการ ที่ สมาชิก แต่ ละ คน ทํา เพื่อ การ อนุรักษ์ และ ความ ก้าว หน้า ทาง ฝ่าย วิญญาณ และ ค่า นิยม ตาม ประเพณี รวม ทั้ง ความ ก้าว หน้า ใด ๆ โดย เฉพาะ ต่อ การ เสด็จ ขึ้น สู่ สวรรค์ และ การ อยู่ ใต้ อํานาจ."
 fedel.1805.desc:0 "$fedel.1805.desc.base$\n\nโดยการประชุม อย่างไรก็ตาม มันยังไม่สายเกินไป ที่จะแสดงให้เห็นถึงความจริงใจของความเชื่อมั่น"
 fedel.1805.desc.subject:0 "$fedel.1805.desc.base$\n\nแต่น่าเสียดายที่เราไม่ได้เป็นรัฐเอกราช เราไม่สามารถที่จะปฏิเสธประธานาธิบดีได้"
 fedel.1805.A:0 "เราสามารถบริจาคอย่างถ่อมตัว"
 fedel.1805.A.tooltip:0 "ข้อเสนอของเราสําหรับประธานาธิบดี จะได้รับเพิ่มเล็กน้อย"
 fedel.1805.B:0 "การลดโทษที่ใหญ่ไปสักหน่อย คงไม่พลาดหรอก"
 fedel.1805.B.tooltip:0 "ข้อเสนอของเราสําหรับประธานาธิบดี จะได้รับเพิ่มระดับปานกลาง"
 fedel.1805.C:0 "มีแต่ข้อเสนอที่หรูหราที่สุดเท่านั้น"
 fedel.1805.C.tooltip:0 "ข้อเสนอของเราสําหรับประธานาธิบดี จะได้รับการส่งเสริมอย่างสําคัญ"
 fedel.1805.D:0 "คุณธรรมของเราพูดเพื่อตัวเอง"
 fedel.1815.name:0 "ข้อ ตก ลง:"
 fedel.1815.desc:0 "แม้เพียงแผนภูมิของข้อมูลได้เกิดขึ้นจากกรวยส่วนตัวของ แต่ก็เข้าใจว่า§Y[conclave_frontrunner.GetName]§!เป็นรันเนอร์หน้าปัจจุบันที่จะได้รับเลือก อย่างไรก็ตาม ยังพอมีเวลาสําหรับการยอมจํานนในนาทีสุดท้าย ที่จะส่งเสริมความสามารถของเรา"
 fedel.1815.desc.frontrunner:0 "ถึงแม้ว่าจะมีเฉพาะข้อมูลสั้นๆเท่านั้น ที่เกิดขึ้นจากข้อตกลงส่วนตัวของคอนกรีตแต่ก็เข้าใจได้ว่า เราคือผู้ลงสมัครรับเลือกตั้งแนวหน้าในปัจจุบัน อย่างไรก็ตาม ยังมีเวลาที่จะให้คนอื่นๆ ยอมแพ้ในนาทีสุดท้าย เพื่อเพิ่มความอหังการของพวกเขา"
 fedel.1815.E:0 "บางทีการบริจาคเงินที่แตกต่างออกไป อาจใช้เป็นกลเม็ดก็ได้"
 fedel.1815.E.tooltip:0 "สินบนของเราอาจจะได้รับการชื่นชมอย่างมาก ... แต่มันอาจจะถือกับเราถ้าเราโชคร้าย"
 fedel.1825.name:0 "ความ หลาก หลาย ที่ สุด"
 fedel.1825.desc:0 "หลังจากที่ระเบิดของกลองโรล, หมอกยาอีเริ่มซึมจาก ตัว แทน คน หนึ่ง ออก มา. มี หยุด ที่ น่า ทึ่ง และ ความ เงียบ อย่าง ลึก ซึ้ง ถึง ขนาด ที่ เข็ม หมุด จะ ปรากฏ ว่า ตก อย่าง ดัง ทั่ว โลก[Root.GetAllianceName].\n\nพวกเขาประกาศ§Y[conclave_winner.GetName]§!ให้พวกเขาเลือกประธานาธิบดี"
 fedel.1825.A:0 "เราจะนําทางฝูงของเราให้ดี"
 fedel.1825.B:0 "อาจจะนําเราได้ดี"

 ####################################
 # Event Chains
 ####################################

 wenkwort_chain_title:0 "พื้นที่จัดเก็บ"
 wenkwort_chain_desc:0 "เราได้พบกับโลกที่งดงามผิดปกติใน[from.System.GetName]ระบบ มันเหมาะกับการตั้งอาณานิคม แต่มันดูรอบคอบที่จะถามว่า ใครออกแบบมัน และทําไม?"

 federations3.121.name:0 "จง หลีก เลี่ยง หญ้า"
 federations3.121.desc:0 "รายการที่เข้าชม:§Yยินดีต้อนรับสู่$NAME_Wenkwort$§!ไม่ ว่า การ เยี่ยม ครั้ง นี้ จะ เป็น ครั้ง แรก หรือ ร้อย ของ คุณ เรา ดีใจ ที่ คุณ เห็น คุณค่า สวน นี้.\n\nในนามของ$NAME_Gardeners$และตามคําสั่ง WAP-715 ผมขอให้คุณยกเว้นการรุกอย่างรุนแรงในไบโอต้า ของการกําหนดดาวเคราะห์$NAME_wenkwort_prime$การไม่ทําตามคําแนะนําของเรา จะลดโอกาสอยู่รอดของทั้งหมด"
 federations3.121.a:0 "กํากับ... อะไรนะ? คุณเป็นใคร?"
 federations3.121.a.response:0 "ผมเป็นผู้ดูแลระบบอัตโนมัติ[root.System.GetName]ฉันเป็นตัวแทนผลประโยชน์ของ$NAME_Gardeners$ทั้งที่นี่และระบบอื่น ๆ ของออรอนจักรวรรดิบทบาทของฉันได้รับการนิยามอย่างกว้างขวาง ในฐานะผู้พิทักษ์ และเป็นผู้นําทาง\n\n§Yกํากับ WAP-715§! ลดการปฏิรูปอุตสาหกรรม ของโลกชั้นอะคาโมร์ เช่น การระบุ[root.Planet.GetName]เพียงคุณที่สามารถป้องกันการสูญพันธุ์ขนาดใหญ่!"
 federations3.121.b:0 "ไร้สาระน่า เราจะพัฒนาอาณานิคมของเรา ตามที่เราเห็นเหมาะสม"
 federations3.121.c:0 "เราจะช่วยอะไรได้บ้าง"
 federations3.125.desc:0 "ผู้โดยสาร! และกลุ่มแนวหน้าจะถูกนํามาเสนอแก่พวกเจ้า\n\nสรุป: กํากับ WAP-715 อนุญาตให้รับผิดชอบ ไม่ทําลายการใช้$NAME_Wenkwort$สวน ความสําคัญที่ยิ่งใหญ่ถูกผูกติดกับการรักษาตัวละครของโลกเหล่านี้ที่มีอยู่ แต่เราไม่ได้ต้องการที่จะยับยั้งการพัฒนาภายใน(EERROR:เครื่องส่งสัญญาณจักรวรรดิออกจากระยะ)\n\nสืบค้นเมื่อ19 c 141405...ล้มเหลว กําลังลองใหม่... ล้มเหลว กําลังลองใหม่... )"
 federations3.130.desc:0 "น่าผิดหวังจริงๆ ก็ช่างมันเถอะ\n\n(สอบถามผู้บังคับการของหน่วยเพื่อประสานงาน)\nไม่พบสัญญาณของจักรวรรดิ การส่งกลับการสํารองข้อมูลระบบนําร่อง ... สําเร็จ.]\nหน่วยงานทหารราบกําลังเดินทางมา ประมาณการมาถึง 2 รอบ โปรโตคอล CATH ยกเลิก .>"
 federations3.131.name:0 "การ กด จุด"
 federations3.131.desc:0 "แฟ้มที่เชื่อถือ:คุณยังอยู่ในการละเมิดที่เห็นได้ชัดของ§Yกํากับ WAP-715§! เกี่ยวกับการใช้ไม่ทําลาย$NAME_Wenkwort$อยู่ในสวนสวรรค์อันหลากหลาย[root.Planet.GetName].\n\nนี่คือโอกาสสุดท้ายของคุณ ที่จะยืนยันในแนวทางของเรา หรืออื่น ๆ เผชิญกับการลงโทษรวดเร็ว"
 federations3.131.a:0 "เรายอมรับข้อตกลง"
 federations3.131.tooltip:0 "เพิ่ม§Y$pm_wenkwort_custodian$§!แก้ไขโครงการหลัก...[root.GetName]."

