 origin.61.name:0 "จุดจบคือ..."
 origin.61.desc:1 "เป็นแผ่นดินไหวและกิจกรรมภูเขาไฟบน[Root.GetName]เพิ่มความถี่และความรุนแรงอย่างต่อเนื่อง[Root.Owner.GetScientistPlural]ตอนนี้สามารถคาดเดาได้อย่างถูกต้องมากขึ้น เมื่อจุดจบมาถึง\n\nเขาประมาณว่าเราอยู่ระหว่าง§H35 ถึง 45 ปี§!จนกว่าดาวจะระเบิด\n\nสภาพ บน ผิว ดิน จะ ทรุด ลง เรื่อย ๆ จน กระทั่ง ถึง ตอน นั้น. ข่าวดีเดียวก็คือ การเคลื่อนไหวแบบเทคโนนิคที่รุนแรง ได้ทําให้มันง่ายต่อการเข้าถึงทรัพยากรที่อุดมไปด้วย"
 origin_61.a:0 "มีเวลาไม่มาก"
 origin.65.name:0 "สภาพ การณ์ แย่ ลง[Root.GetName]"
 origin.65.desc:1 "แผ่น ดิน ไหว ใน ปัจจุบัน แทบ ทุก วัน เกิด ขึ้น ใน ส่วน ใหญ่[Root.GetName]ซูเปอร์โวลคานาโอใหม่อย่างน้อย 12 ตัว ได้ปรากฏตัวขึ้นภายใน 2-3 ปีที่ผ่านมา พายุ เถ้า ถ่าน ใหญ่ ปก คลุม ท้องฟ้า ทํา ให้ การ ท่อง เที่ยว ทาง อากาศ เป็น อันตราย หรือ แม้ แต่ เป็น ไป ไม่ ได้ ใน บาง ภูมิภาค. อุณหภูมิลดลงหลายองศา\n\nแม้ทั้งหมดนี้ ความรู้สึกที่ไม่คาดคิดของความปกติ อยู่เหนือพื้นผิวดาวเคราะห์ที่กําลังจะตาย การ ขุด ค้น จาก ตึก ที่ พัง ทลาย นั้น ค่อย ๆ ถูก ขจัด ออก ไป เถ้า ถ่าน ที่ หมุน เวียน อยู่ จะ ถูก กวาด ออก ไป จาก ถนน ที่ มี คน พลุกพล่าน ที่ สุด และ กระแส ลาวา ก็ ไหล ไป ตาม ที่ เป็น ไป ได้ ก็ เปลี่ยน ทิศ ทาง. ผู้คนทนได้"
 origin.65.2.desc:0 "แผ่น ดิน ไหว ใน ปัจจุบัน แทบ ทุก วัน เกิด ขึ้น ใน ส่วน ใหญ่[Root.GetName]ซูเปอร์โวลคานาโอใหม่อย่างน้อย 12 ตัว ได้ปรากฏตัวขึ้นภายใน 2-3 ปีที่ผ่านมา พายุ เถ้า ถ่าน ใหญ่ ปก คลุม ท้องฟ้า ทํา ให้ การ ท่อง เที่ยว ทาง อากาศ เป็น อันตราย หรือ แม้ แต่ เป็น ไป ไม่ ได้ ใน บาง ภูมิภาค. อุณหภูมิลดลงหลายองศา\n\nแม้ทั้งหมดนี้ ความรู้สึกที่ไม่คาดคิดของความปกติ อยู่เหนือพื้นผิวดาวเคราะห์ที่กําลังจะตาย การ ขุด ค้น จาก ตึก ที่ พัง ทลาย นั้น ค่อย ๆ ถูก ขจัด ออก ไป เถ้า ถ่าน ที่ หมุน เวียน อยู่ จะ ถูก กวาด ออก ไป จาก ถนน ที่ มี คน พลุกพล่าน ที่ สุด และ กระแส ลาวา ก็ ไหล ไป ตาม ที่ เป็น ไป ได้ ก็ เปลี่ยน ทิศ ทาง. โดรนทนได้"
 origin_65.a:0 "ทุกอย่างมีแต่จะแย่ลง"
 origin.70.name:0 "เวลาสิ้นสุด"
 origin.70.desc:1 "ความหม่นหมองอันยาวนานบนพื้นผิวของ[Root.GetName]ในขณะที่ดาวเคราะห์นั้น ค่อย ๆ ฉีกตัวเองออกจากกัน เนื่อง จาก แต่ ละ วัน ผ่าน ไป แผ่น ดิน ไหว จึง มี ขนาด ใหญ่ ขึ้น และ เมฆ เถ้า ก็ หนา ทึบ ขึ้น.\n\nลาวา หล่อ ลื่น และ ไหล เวียน ไป ตาม แม่น้ํา ได้ ทํา ให้ หลาย เมือง ใน เขต ที่ ได้ รับ ผล กระทบ มาก ที่ สุด. ดู เหมือน ว่า กอง คาราวาน ผู้ ลี้ ภัย ไม่ รู้ สิ้น สุด กําลัง ค่อย ๆ เดิน ทาง ผ่าน พายุ เถ้า ถ่าน ที่ อยู่ ตลอด เวลา เพื่อ ไป ถึง บริเวณ ที่ ปลอด ภัย กว่า ซึ่ง ความ สะดวก สบาย ของ อารยธรรม ยัง คง มี อยู่..."
 origin.70.2.desc:0 "ความหม่นหมองอันยาวนานบนพื้นผิวของ[Root.GetName]ในขณะที่ดาวเคราะห์นั้น ค่อย ๆ ฉีกตัวเองออกจากกัน เนื่อง จาก แต่ ละ วัน ผ่าน ไป แผ่น ดิน ไหว จึง มี ขนาด ใหญ่ ขึ้น และ เมฆ เถ้า ก็ หนา ทึบ ขึ้น.\n\nน้ํา ที่ ไหล เชี่ยว และ กระแส ลาวา หล่อ ลื่น ทํา ให้ เกิด กระแส น้ํา ใน บริเวณ ที่ ได้ รับ ผล กระทบ มาก ที่ สุด. ดูเหมือนการเดินทางอย่างไม่มีที่สิ้นสุดของหุ่นยนต์ กําลังค่อยๆผ่านพายุเถ้าที่ต่อเนื่องไปยังพื้นที่ห่างไกลมากขึ้น"
 origin_70.a:0 "ดาวเคราะห์จะไม่ช่วยชีวิตอีกต่อไป"
 origin_70.b:0 "หน่วยขุดเจาะไม่สามารถดําเนินการบนดาวได้อีกต่อไป"
 origin.75.name:0 "ก๊าซใกล้หมด"
 origin.75.desc:1 "เงื่อนไขบน[Root.GetName]แทบจะรับไม่ได้ ประชากร ส่วน ใหญ่ ที่ เหลือ อยู่ รวม กัน อยู่ รอบ ๆ เมือง ที่ ยัง มี ผู้ รอด ชีวิต อยู่ ไม่ กี่ เมือง ซึ่ง ตอน นี้ เป็น ที่ หลบ ภัย ของ พายุ ที่ มี น้ํา หนัก มาก และ มี กําแพง ล้อม ต้าน เถ้า ถ่าน ที่ ไม่ มี การ ควบคุม. แต่แม้ช่วงเวลาสุดท้ายของอารยธรรมเหล่านี้ บนโลกใบนี้จะอยู่รอดได้ไม่นาน แผ่น ดิน ไหว ที่ ก่อ ความ เสีย หาย ยัง คง ดําเนิน ต่อ ไป ขณะ ที่ ภูเขา ไฟ หลาย ร้อย ลูก กําลัง พ่น กํามะถัน และ ลาวา ออก มา.\n\nเมื่อเปลือกโลกสลายไป ทรัพยากรที่มีคุณค่ามากขึ้น ก็ถูกขับออกจากเสื้อคลุมไปยังพื้นผิว"
 origin.75.2.desc:0 "เงื่อนไขบน[Root.GetName]แทบจะรับไม่ได้ โดรน ส่วน ใหญ่ ที่ เหลือ อยู่ จะ อยู่ รวม กัน รอบ ศูนย์กลาง ของ โครง สร้าง ที่ ยัง หลง เหลือ อยู่ ไม่ กี่ แห่ง ซึ่ง ปัจจุบัน ใช้ เป็น ที่ หลบ ภัย ของ พายุ ขนาด ใหญ่ ที่ มี ป้อม ปราการ ต้าน เถ้า ถ่าน ที่ ไม่ มี การ ควบคุม. แต่แม้ช่วงเวลาสุดท้ายของ อารยธรรมของเราบนดาวเคราะห์ดวงนี้ จะมีชีวิตอยู่ได้ไม่นาน แผ่น ดิน ไหว ที่ ก่อ ความ เสีย หาย ยัง คง ดําเนิน ต่อ ไป ขณะ ที่ ภูเขา ไฟ หลาย ร้อย ลูก กําลัง พ่น กํามะถัน และ ลาวา ออก มา.\n\nเมื่อเปลือกโลกสลายไป ทรัพยากรที่มีคุณค่ามากขึ้น ก็ถูกขับออกจากเสื้อคลุมไปยังพื้นผิว"
 origin_75.a:0 "จุดจบใกล้เข้ามาแล้ว"
 origin.76.name:0 "ช่วงเวลาสุดท้าย"
 origin.76.desc:0 "อีกไม่นานหรอก[Root.GetName]การ เริ่ม ต้น ที่ จะ ประสบ กับ การ สั่น สะเทือน อย่าง รุนแรง ใน ขั้น สุด ท้าย ซึ่ง จะ ยัง ผล ด้วย การ ทําลาย อย่าง สิ้น เชิง. ของเรา[Root.Owner.GetScientistPlural]ทํานาย ว่า อวสาน จะ มา ภาย ใน ไม่ ถึง ปี.\n\nเวลาน้อยมากสําหรับวิญญาณที่น่าสงสาร ยังคงติดอยู่ในพื้นผิวของโลก"
 origin.76.2.desc:0 "อีกไม่นานหรอก[Root.GetName]การ เริ่ม ต้น ที่ จะ ประสบ กับ การ สั่น สะเทือน อย่าง รุนแรง ใน ขั้น สุด ท้าย ซึ่ง จะ ยัง ผล ด้วย การ ทําลาย อย่าง สิ้น เชิง. ของเรา[Root.Owner.GetScientistPlural]ทํานาย ว่า อวสาน จะ มา ภาย ใน ไม่ ถึง ปี.\n\nเวลาน้อยมากสําหรับหุ่นยนต์ที่น่าสงสาร ยังคงติดอยู่ในพื้นผิวของโลก"
 origin_76.a:0 "นี่ไม่ดีแน่"
 origin.80.name:0 "จุดจบของ[Root.GetName]"
 origin.80.1.desc:0 "$origin.80.intro.desc$\n\n$origin.80.1$"
 origin.80.2.desc:0 "$origin.80.intro.desc$\n\n$origin.80.2$"
