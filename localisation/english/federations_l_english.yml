 origin.57.name:0 "ลักษณะ ของ พันธมิตร"
 origin.57.desc:0 "แม้ว่าเราจะได้ติดต่อกับสมาชิกอื่น ๆ ของพันธมิตรของเรามาระยะหนึ่งแล้ว ก็เพียงปัจจุบันเท่านั้น - กับสิ่งประดิษฐ์ของความเร็วไดรฟ์ - ที่จักรวรรดิของเราสามารถโต้ตอบกันได้ในระดับที่มีความหมาย คํา ถาม นี้ ได้ เกิด ขึ้น ใน เรื่อง ที่ ว่า การ บํารุง เลี้ยง ควร มุ่ง ความ สนใจ ไป ที่ อะไร: บาง คน สนับสนุน แนว ทาง ที่ นิยม กัน ใน ปัจจุบัน และ โดย ทั่ว ไป ส่วน คน อื่น ๆ จะ ชอบ เพ่ง เล็ง ใน การ ประสาน กัน ใกล้ ชิด ยิ่ง ขึ้น ใน ขอบ เขต เฉพาะ อย่าง."
