 fedel.899.name:0 "เตรียม สมุด เช็ค ของ คุณ!"
 fedel.899.desc:0 "ใน ไม่ กี่ วัน ข้อ ท้าทาย เรื่อง กฎ ทอง สําหรับ การ บํารุง เลี้ยง จะ เริ่ม ต้น. เริ่มต้นที่ผู้นําคนปัจจุบัน : แต่ละจักรวรรดิในความเข้มสีจะมีโอกาสประมูลได้ จนกว่าจะเหลือผู้มีส่วนร่วมเพียงคนเดียว ผู้ประมูลคนนั้น ได้รับเลือกให้เป็นผู้นําขององค์กรนี้"
 fedel.899.desc.subject:0 "$fedel.899.desc$\n\nน่า เสียดาย เนื่อง จาก เรา ไม่ ได้ เป็น เอกเทศ เรา ถูก ห้าม ไม่ ให้ มี ส่วน ร่วม ใน การ รับ ประทาน อาหาร ขณะ ที่ เรา ไม่ มี สิทธิ์ นํา หน้า."
