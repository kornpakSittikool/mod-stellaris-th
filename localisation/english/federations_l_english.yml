 federations2.1.name:0 "แรงงานของความรักหายไป"
 federations2.1.desc:0 "ได้ถอดรหัสสัญญาณแล้ว[Root.Leader.GetName]ประหลาดใจที่พบว่ามันถูกออกอากาศในรูปแบบโบราณของหนึ่งในหลัก[Root.Owner.GetSpeciesName]ภาษา พูดใน'The','thous'และ'ความช่วยเหลือ'ดูเหมือนว่ามันจะท่องหนึ่งในผลงานที่หายไปของ[shakespeare.GetName]- มีชื่อเสียง[Root.Owner.GetSpeciesName]ผู้ ที่ มี ชีวิต อยู่ ประมาณ 600 ปี มา แล้ว.\n\nมันปรากฏว่าอุปกรณ์กระจายเสียง - จานดาวเทียมธรรมดาที่ป้องกันโดยที่พักเล็ก ๆ - เป็นโครงสร้างเดียวที่ไม่เป็นธรรมชาติบน[From.GetPlanetMoon]ไม่ มี ข้อ บ่ง ชี้ ว่า ใคร ทิ้ง ไว้ ที่ นั่น หรือ เพราะ เหตุ ใด แต่ โดย การ สวม ใส่ และ ฉีก พยาน หลัก ฐาน: มัน คง ต้อง อยู่ ที่ นั่น ไม่ นาน หลัง จาก ที่ มี การ เขียน บท ละคร เป็น ครั้ง แรก นาน ก่อน หน้า นั้น[Root.Owner.GetSpeciesNamePlural]รู้ความลับการท่องอวกาศ เราสรุปได้แค่ว่า มันถูกทิ้งไว้ที่นั่น โดยผู้มาเยือนโบราณ[Root.Owner.GetHomeWorldName]ผู้ซึ่งชอบละครเรื่องนี้มาก และตัดสินใจที่จะจ่ายให้กับสายพันธุ์ของเรา เป็นเครื่องบรรณาการที่แปลก และไม่คาดคิด"
 federations2.1.A:0 "มีหลักฐานเพิ่มว่า[Root.Owner.GetSpeciesName]การแข่งขัน"
 federations2.1.B:0 "น่าเบื่อ พูดเรื่องไร้สาระเกี่ยวกับเอเลี่ยน"
 federations2.1.B.tooltip:0 "บางทีเราน่าจะจัดการ[Root.Owner.Leader.GetTitle] [Root.Owner.Leader.GetName]เพื่อ 'ค้นหา' ข้อความของวันนี้..."
 federations2.1.C:0 "ข่าวดี! เปิดบันทึกข้ามประเทศ"
 federations2.1.D:1 "ของขวัญ! เราต้องหาทางขอบคุณผู้มีพระคุณของเรา"
 gift_from_mysterious_benefactors:0 "ของ ขวัญ จาก ผู้ ให้ ด้วย ใจ จริง"
 gift_from_mysterious_benefactors_desc:0 "นานก่อนที่เราเอาไปยังดาว, นักบินอวกาศไม่ทราบ ไปเยี่ยมดาวเคราะห์ของเราและเอาที่เห็นได้ชัด ชอบวัฒนธรรมของเรา พวก เขา ให้ หลัก ฐาน ว่า พวก เขา มา เยี่ยม เรา ที่ นั่น เพื่อ เรา จะ พบ ว่า เมื่อ ถึง เวลา ที่ เรา สูญ เสีย งาน ที่ สูญ เสีย ไป อย่าง ถูก ต้อง และ ทํา ให้ ความ มั่น ใจ ใน ตัว เอง มั่นคง ยิ่ง ขึ้น ขณะ ที่ เรา มอง ไป ยัง อนาคต."
 supremacy_reaffirmed_by_gift:0 "ยืนยันความสูงส่ง"
 supremacy_reaffirmed_by_gift_desc:0 "ความเหนือกว่าของสายพันธุ์ของเราได้รับการยืนยัน จากความชื่นชมของนักท่องอวกาศที่ไม่รู้จัก สําหรับวัฒนธรรมของเรา"
 ancient_warden_boost:0 "การ เฝ้า ระวัง ตลอด กาล"
 site_ruins_of_shallash:0 "ดาวที่ถูกทําลายระบบดาว"
 site_ruined_starsystem_intro:0 "[From.Planet.GetName]เห็นได้ชัดเลยว่าครั้งหนึ่งเคยอยู่บ้านของอารยธรรมที่มีความกว้างสูง ดวงจันทร์ที่มีวงโคจรอยู่หกดวง ในระยะที่ห่างกันเป็นหลักฐานที่เพียงพอ อย่าง ไร ก็ ตาม ดาว เคราะห์ ดวง นี้ อยู่ ใน ซาก ปรัก หัก พัง และ ระบบ ดาว ทั้ง สิ้น แสดง ถึง การ ต่อ สู้ ที่ รุนแรง อย่าง ผิด ธรรมดา. เกิดอะไรขึ้นที่นี่"
 federations2.20.name:0 "เดอะ[From.GetName] ระบบดาว"
 federations2.20.desc:0 "ขณะที่เรือของเราเข้ามา[From.GetName]ระบบ มันชัดเจนทันที ว่ามีบางอย่างเกิดขึ้นที่นี่ ดาวเคราะห์ดวงหนึ่ง ที่คุยโวถึงการกระจายตัวของดวงจันทร์ ซึ่งดูเหมือนครั้งหนึ่งสามารถอาศัยได้ ดาว เคราะห์ ดวง อื่น ถูก ทําลาย อย่าง สิ้น เชิง. เดบริสกระจัดกระจายไปทั่วระบบ ชี้ให้เห็นว่า อารยธรรมที่เคยอยู่ที่นี่ ถูกทําลายในการต่อสู้ที่รุนแรง\n\nเรือรบลาดตระเวนระบบ มันไม่ได้ตอบสนองต่อลูกเห็บของเรา และมันตั้งอยู่บนเส้นทางสกัดสําหรับ[Root.GetName]ระบบอาวุธชาร์จขึ้น"
 federations2.2.name:0 "ความพินาศของ[From.Planet.GetName]"
 federations2.2.desc:0 "การสแกนพื้นผิวของดาวเคราะห์และดวงจันทร์ แสดงให้เห็นว่าพวกเขาเคยอาศัยอยู่หนาแน่น[Root.Owner.Capital.GetName]ยิ่ง กว่า นั้น การ วิเคราะห์ ดวง จันทร์ ได้ ลง ความ เห็น ว่า ตําแหน่ง ของ ดวง จันทร์ ไม่ อาจ เป็น เรื่อง ธรรมดา ได้. พวก เขา คง ต้อง ถูก ลาก เข้า ไป ใน วง โคจร แล้ว ก็ เข้า ประจํา การ อย่าง แม่นยํา จน กระทั่ง บัด นี้ พวก เขา ยัง คง อยู่ ใน สภาพ สมดุล ที่ สมบูรณ์. อย่างไรก็ตาม ความหายนะที่เกิดขึ้นที่นี่ก็รุนแรงมาก และเกิดขึ้นนานมาแล้ว มีบันทึกไม่กี่ฉบับที่ยังคงอยู่"
 SEARCH:0 "ค้นหาต่อไป"
 federations2.3.name:0 "บันทึก ของ ผู้ สูญ เสีย"
 federations2.3.desc:0 "ทีมนักวิทยาศาสตร์ของเราใน[From.Planet.GetName]ได้พบชุดของแกนข้อมูลที่ยังคงที่ ถ่ายภาพประชากรของดาวเคราะห์ - ชนราษฎร - เมื่ออารยธรรมของพวกเขาอยู่ที่จุดสูงสุดประมาณพันปีที่ผ่านมา เป็น ที่ ชัด แจ้ง ว่า พวก วิลลา เรียน มี ความ สามารถ สูง สุด จริง ๆ ที่ จะ นํา ระบบ สุริยะ ทั้ง สิ้น มา ใช้ ตาม ความ ประสงค์ ของ พวก เขา.\n\nดวงจันทร์ของ[From.Planet.GetName]เดิมก็โคจรรอบยักษ์แก๊สของระบบ และถูกลากเข้าอยู่ในตําแหน่งปัจจุบันของพวกเขา เป็นงานที่ซับซ้อนของศิลปะดาร์ด -ดาวแตกตรงข้าม[From.Planet.GetName]- ได้รับการอธิบายอย่างกว้างขวางว่า เป็นโคลนที่อยู่ใกล้กันแต่ไม่มีใครอยู่ ที่กิลแลชทําหน้าที่เป็นอนุรักษ์ธรรมชาติ\n\nแม้ว่าจะมีความมหัศจรรย์เหล่านี้ แต่ไม่พบการกล่าวถึงความสามารถทางทหารของชาวมอลตารี จริง ๆ แล้ว พวก เขา ดู เหมือน ไม่ ได้ เอา ใจ ใส่ สิ่ง ใด เลย นอก เหนือ จาก การ จํากัด พื้น ที่ ของ ตน เอง..."
 federations2.3.A:0 "น่าสนใจ"
 federations2.4.name:0 "สันติ สุข ใน ครอบครัว"
 federations2.4.desc:0 "[Root.Leader.GetTitle] [Root.Leader.GetName]มีความสามารถในการให้แสงมากขึ้น เกี่ยวกับอารยธรรมชาวมอลลาเรียน ดู เหมือน ว่า พวก เขา เป็น สิ่ง มี ชีวิต ที่ สงบ สุข เป็น พิเศษ ซึ่ง แม้ จะ มี หลัก ฐาน ชัดเจน ใน ทาง ตรง กัน ข้าม ใน ช่วง ที่ ถือ กัน ว่า เป็น สงคราม ระหว่าง อารยธรรม ที่ อยู่ ใน อวกาศ นั้น เป็น เรื่อง เหลือ เชื่อ และ ไม่ มี เหตุ ผล. อย่างไรก็ตาม ความก้าวหน้าทางเทคโนโลยีของพวกเขา ได้นําความไม่สงบของพวกเขา มาสู่พวกเขา เพราะ ฉะนั้น พวก เขา จึง ได้ ละเลย การ สร้าง กอง กําลัง ทหาร ของ ตน ขึ้น มา ทิ้ง ให้ ตัว เอง อ่อนแอ. อย่าง ไร ก็ ตาม ไม่ มี สิ่ง ใด ที่ ค้น พบ ให้ ข้อ บ่ง ชี้ ใด ๆ ว่า ใคร อาจ ต้องการ ทําลาย สิ่ง ที่ พวก เขา ได้ สร้าง ขึ้น."
 federations2.4.A:0 "ไร้เดียงสาจริงๆ"
 federations2.4.B:0 "พวก เขา เป็น ฝ่าย ถูก ที่ พยายาม สร้าง สันติ."
 federations2.6.name:0 "การ ล่ม จม ของ ผู้ คน"
 federations2.6.desc.fe:0 "[Root.Leader.GetName]ได้เปิดเผยความจริง ของการเสียชีวิตของชาวมอลตาเรียน ดูเหมือนว่าพวกเขาอาศัยอยู่ในความสงบสําหรับหลายร้อยปีที่ผ่านมาก่อนที่จะเพิ่มขึ้นของ[fanatic_xenophobe_fe.GetSpeciesName] จักรวรรดิทําให้พวกเขาประหลาดใจ#จากการฆ่าและภาษา#เสียงร้องจากผู้เสื่อมถอย[fanatic_xenophobe_fe.GetName]ของทุกวันนี้ ในยุคนั้น[fanatic_xenophobe_fe.GetSpeciesNamePlural]เป็นการแข่งขันที่ก้าวร้าว\n\nการเผชิญหน้าครั้งแรกของพวกเขาแก่อีกบางคน เพื่อพวกเขาจะได้พิจารณา[fanatic_xenophobe_fe.GetSpeciesNamePlural]เพื่อให้เป็นที่สังเกตและไม่เป็นที่น่าตําหนิแก่สายตา[fanatic_xenophobe_fe.GetSpeciesNamePlural]มองภาพทั้งหมดเป็นนาเธมา ความน่าสะพรึงกลัวของพวกเขา ต่อความสันติในยูโทเปียนี้ จนพวกเขาตัดสินใจให้ชาวมอลตาร์ ต้องถูกลบออกไปจากหน้ากาแล็กซี่ เนื่อง จาก ผู้ ตก เป็น เหยื่อ ไม่ มี ทหาร สงคราม ที่ ตาม มา จึง สั้น พอ ๆ กับ ความ โหด ร้าย ทารุณ. เมื่องานสําเร็จ[fanatic_xenophobe_fe.GetSpeciesNamePlural]ถูกทิ้งให้อยู่ในความคุ้มครองอัตโนมัติ เพื่อให้แน่ใจว่าไม่มีผู้รอดชีวิตคนไหนสามารถกลับมาและจึงฟื้นฟู อารยธรรมที่พวกเขาเกลียด\n\nนอกจากบันทึกพวกนี้แล้ว[Root.Leader.GetName]พบแกนหลักของข้อมูล อธิบายวิธีการกราฟแสดงความถี่เทคโนโลยีของพวกเขาในสาขานี้ เหนือกว่าพวกเรามาก ดังนั้นความรู้นี้ จะเป็นประโยชน์ต่อจักรวรรดิของเราอย่างแน่นอน"
 federations2.6.desc.afe:0 "[Root.Leader.GetName]ได้เปิดเผยความจริง ของการเสียชีวิตของชาวมอลตาเรียน ดูเหมือนว่าพวกเขาจะอยู่อย่างสงบมาหลายร้อยปี ก่อนที่จะเพิ่มขึ้น[fanatic_xenophobe_fe.GetSpeciesNamePlural]ทําให้พวกเขาประหลาดใจ งั้น ตอนนี้[fanatic_xenophobe_fe.GetSpeciesNamePlural]เป็นการแข่งขันที่ก้าวร้าว การเผชิญหน้าครั้งแรกของพวกเขาแก่อีกบางคน เพื่อพวกเขาจะได้พิจารณา[fanatic_xenophobe_fe.GetSpeciesNamePlural]เพื่อให้เป็นที่สังเกตและไม่เป็นที่น่าตําหนิแก่สายตา[fanatic_xenophobe_fe.GetSpeciesNamePlural]มองภาพทั้งหมดเป็นนาเธมา ความน่าสะพรึงกลัวของพวกเขาในแนวคิด ความสงบสุขแบบยูโทเปียนนี้ จนพวกเขาแก้ไขชาวมอลตาเรียน ต้องถูกลบออกไปจากหน้ากาแล็กซี่ เนื่อง จาก ผู้ ตก เป็น เหยื่อ ไม่ มี ทหาร สงคราม ที่ ตาม มา จึง สั้น พอ ๆ กับ ความ โหด ร้าย ทารุณ. เมื่องานสําเร็จ[fanatic_xenophobe_fe.GetSpeciesNamePlural]ถูกทิ้งให้อยู่ในความคุ้มครองอัตโนมัติ เพื่อให้แน่ใจว่าไม่มีผู้รอดชีวิตคนไหนสามารถกลับมาและจึงฟื้นฟู อารยธรรมที่พวกเขาเกลียด\n\nนอกจากบันทึกพวกนี้แล้ว[Root.Leader.GetName]พบแกนหลักของข้อมูล อธิบายวิธีการกราฟแสดงความถี่เทคโนโลยีของพวกเขาในสาขานี้ เหนือกว่าพวกเรามาก ดังนั้นความรู้นี้ จะเป็นประโยชน์ต่อจักรวรรดิของเราอย่างแน่นอน"
 federations2.6.A:0 "นิทานเตือนใจ"
 federations2.6.B:0 "พวกเขาหวังอะไร?"
 federations2.6.C:0 "วงจรของเราเศร้า"
 federations2.6.D:0 "งานของเราที่นี่เสร็จแล้ว"
 federations2.6.E:0 "เปลืองอาหารจริงๆ"
 shallarian_terraforming_knowledge:0 "การ ปลูก ฝัง ความ รู้"
 shallarian_terraforming_knowledge_desc:0 "ดินแดนของชาวมอลตาเรียนโบราณนั้น ห่างไกล แต่ความรู้ที่ไม่มีใครเทียบของพวกเขา"
 federations2.7.name:0 "$federations2.6.name$"
 federations2.7.desc.base:0 "[Root.Leader.GetName]ได้เปิดเผยความจริง ของการเสียชีวิตของชาวมอลตาเรียน ดู เหมือน ว่า หลัง จาก หลาย ร้อย ปี แห่ง สันติ สุข และ ความ สงบ สุข ชาว มอลตา หลาย คน รู้สึก คับ ข้อง ใจ เนื่อง จาก ความ ล้ม เหลว ของ ชาติ อื่น ๆ ที่ เป็น เหมือน สงคราม มาก ขึ้น ที่ จะ ดําเนิน ชีวิต ตาม ความ คาด หมาย ของ ตน. เมื่อ ถูก ทํา ให้ สับสน เนื่อง จาก สงคราม หลาย ครั้ง ที่ ก่อ ความ เสีย หาย แก่ กาแล็กซี พวก เขา จึง เลือก ใช้ เทคโนโลยี ที่ เหนือ กว่า ของ ตน สร้าง กอง เรือ ที่ มี อํานาจ สามารถ สร้าง สันติภาพ ได้.\n\nในขณะเดียวกันชาวชลิตาเรียนได้ก้าวหน้าอย่างมีนัยสําคัญ ในเทคโนโลยีปัญญาประดิษฐ์ของพวกเขา มากจนทําให้เอไออัตโนมัติ แพร่หลายไปทั่วในหมู่พวกเขา ขณะ ที่ ความ คิด เรื่อง การ มี ส่วน ร่วม ใน ความ รุนแรง จริง ๆ นั้น ไม่ เป็น ที่ พอ ใจ แก่ พวก เขา แทน ที่ จะ มอบ อํานาจ ควบคุม การ รักษา สันติภาพ ให้ กับ เอไอ ใหม่ ของ พวก เขา. อย่าง ไร ก็ ตาม เห็น ได้ ชัด ว่า การ ประชุม ของ พวก เขา ไม่ ได้ ผิด พลาด อย่าง ที่ พวก เขา คิด: กอง เรือ ของ พวก เขา หัน มา โจมตี พวก เขา ใน ช่วง ที่ กําลัง ออก ไป นอก เมือง เป็น ครั้ง แรก.\n\nเห็น ได้ ชัด ว่า พลัง รักษา สันติภาพ ปรากฏ ให้ เห็น ว่า เป็น เรื่อง น่า หวาด หวั่น ที เดียว ดัง ที่ พวก เขา ตั้งใจ ไว้. นักวิทยาศาสตร์ชาวมอลตามองเฉพาะในความน่ากลัว ในขณะที่อารยธรรมของพวกเขากลายเป็นฝุ่น โดยกองความผิดพลาดที่ท่วมท้น ..."
 federations2.7.desc:0 "$federations2.7.desc.base$\n\nนอกจากบันทึกพวกนี้แล้ว[Root.Leader.GetName]พบแกนหลักของข้อมูล อธิบายนวัตกรรมที่ชาวมอลตาร ทํากับเทคโนโลยีการคํานวณของพวกเขา แม้ ชะตา กรรม ของ พวก เขา อาจ เตือน เรา ให้ ระวัง แต่ ความ รู้ ของ พวก เขา อาจ ยัง เป็น ประโยชน์ แก่ เรา."
 federations2.7.desc.synth:0 "$federations2.7.desc.base$\n\nเราสามารถหัวเราะเพียงความโง่เขลา ของชาวมอลตาเรียน และเฉลิมฉลองความเหนือกว่า ของโปรแกรมของเราเอง เมื่อเทียบกับของพวกเขา"
 federations2.7.desc.machine:0 "$federations2.7.desc.base$\n\nแม้ว่าเครื่องจักรจะไร้อารมณ์ ถ้าเราทํา เราก็คงหัวเราะกับความโง่เขลาของชาวมอลตาเรียน"
 federations2.7.A:0 "$federations2.6.A$"
 federations2.7.B:0 "น่าเศร้าจัง..."
 federations2.7.C:0 "$federations2.6.D$"
 federations2.7.D:0 "$federations2.6.E$"
 federations2.701.name:0 "Radiation Leak"
 federations2.701.desc:0 "การ เดิน ทาง ทาง ทาง โบราณคดี[From.Planet.GetName]ถูกบังคับให้ใช้ ระมัดระวังการพิษของรังสี เนื่องจากระดับสูงของรังสี ในดาวเคราะห์ที่ถูกทําลาย อย่าง ไร ก็ ตาม ดู เหมือน ว่า การ รั่ว ได้ ก่อ ให้ เกิด ความ หวาด กลัว อย่าง ยิ่ง ใน บริเวณ ที่ นัก โบราณคดี ขุด ค้น พบ.[Root.Leader.GetName]ถึง[Root.Leader.GetHerHis]ทีมต้องหยุดการขุดเจาะ จนกระทั่งรังสีสามารถฟื้นฟูสู่ระดับที่ปลอดภัย"
 federations2.702.name:0 "เปิดใช้งานเรือของเซนติเนลที่ถูกซ่อน"
 federations2.702.desc:0 "นักโบราณคดีของเรา[From.System.GetName]ระบบ ได้ ดึงดูด ความ สนใจ ของ เรือ กัก ขัง ซึ่ง ซ่อน อยู่ ใน เข็มขัด ดาว เคราะห์ น้อย โดย ไม่ ตั้งใจ. เรา ไม่ แน่ ใจ ว่า ทําไม มัน จึง ถูก ซ่อน อยู่ จน กระทั่ง บัด นี้. บางทีเซ็นเซอร์ของมันอาจจะเสีย สิ่ง ที่ แน่ ๆ ก็ คือ บัด นี้ มัน ตื่น แล้ว และ ระบบ อาวุธ ของ มัน ก็ กําลัง เคลื่อน ไหว!"
 federations2.702.A:0 "สถานีอาวุธ!"
 federations2.8.name:0 "สาเหตุ ของ การ เต้น รํา หรือ?"
 federations2.8.desc:0 "มี การ รายงาน เหตุ การณ์ แปลก ๆ ใน หมู่ ผู้ ที่ อยู่ ใน อาณานิคม ว่า[Root.GetName]เห็น ได้ ชัด ว่า หลาย คน พา กัน เต้น รํา ตาม ถนน เป็น เวลา หลาย ชั่วโมง หรือ กระทั่ง หลาย วัน สุด ท้าย โดย ไม่ ยอม หยุด จน กว่า จะ ถูก ควบคุม ตัว เอง.\n\nจนถึงตอนนี้ มันมีผลกระทบต่อประชากรที่ค่อนข้างน้อย และหน่วยงานของเรายังไม่ได้กําหนดรูปแบบ"
 federations2.8.A:0 "เฝ้าดูสถานการณ์"
 federations2.9.name:0 "ภัย พิบัติ จาก การ เต้นรํา"
 federations2.9.desc:0 "เหตุ การณ์ ที่ เกิด ขึ้น เอง ตาม ธรรมชาติ และ ยืด เยื้อ[Root.GetName]ได้เพิ่มขึ้นบางส่วนและกลุ่มหลายร้อย[Root.Owner.GetSpeciesNamePlural]ตอน นี้ กําลัง เต้น รํา แบบ ต่าง ๆ กัน. น่า แปลก แม้ แต่ คน เหล่า นั้น ที่ ไม่ เคย แสดง ความ สนใจ มาก นัก ใน การ เต้น รํา ก็ สามารถ เต้น รํา ได้ อย่าง กะทันหัน และ คน ชรา ใน ท่ามกลาง พวก เขา ได้ ค้น พบ ความ กระฉับกระเฉง ใน วัย หนุ่ม สาว ของ ตน. แม้ว่าผู้พักอาศัยหลายคนจะพูดถึงมันอย่างตลกๆ ว่าเป็น 'โรคระบาดแดนซิ่ง' มันก็ไม่ใช่เรื่องล้อเล่น -- นักเต้นไม่แสดงความห่วงใย ต่อความต้องการทางกายภาพของพวกเขา และเสี่ยงที่ตัวเองจะเต้นจนตาย"
 federations2.9.A:0 "นี่ไม่ใช่ธรรมชาติ! เรา ต้อง รู้ ว่า อะไร ทํา ให้ พวก เขา ทุกข์ ใจ."
 federations2.9.B:0 "เริ่มเพลงได้ ได้เวลาปาร์ตี้แล้ว"
 federations2.10.name:0 "การ เต้น รํา"
 federations2.10.desc:0 "นัก วิจัย ของ เรา ประสบ ความ สําเร็จ ใน การ แยก สาเหตุ ของ การ เต้น รํา ออก จาก กัน[Root.GetName]ดู เหมือน ว่า ผู้ กระทํา ผิด เป็น แก๊ส ที่ ปล่อย จาก พืช ใน ท้อง ถิ่น. ก๊าซ นี้ ก่อ ให้ เกิด ความ รู้สึก กระปรี้กระเปร่า และ แรง กระตุ้น ที่ ไม่ อาจ ต้านทาน ได้ ใน การ เต้น รํา ขณะ ที่ ระงับ ความ เหนื่อย ล้า. แต่ดูเหมือนจะละเอียดพอดู อย่างที่สัญชาตญาณการอนุรักษ์ตัวเอง ของชาวอาณานิคม ป้องกันไม่ให้พวกเขา นอกจากนี้ นักวิทยาศาสตร์ของเราได้พัฒนาก๊าซสังเคราะห์ที่ - ครั้งหนึ่งปล่อยเข้าไปในอากาศ - จะลดผลกระทบของ 'ก๊าซพัด'\n\nผู้ประกอบการท้องถิ่นบอกเราว่าเรารักษา ลักษณะเฉพาะของอาณานิคมโดยอนุญาตให้ก๊าซในบางพื้นที่ที่ฟรี[Root.GetName]'. อื่น ๆ ชี้ให้เห็นว่าก๊าซ มีคุณสมบัติที่มีคุณค่าบางอย่าง เราสามารถนําไปใช้ได้ ถ้าเราสามารถสกัดมันจากพืช"
 federations2.10.A:0 "โชว์ต้องดําเนินต่อไป!"
 federations2.10.B:0 "ขอให้เราใช้ประโยชน์จากก๊าซเหล่านี้เต็ม"
 federations2.11.name:0 "ภัย พิบัติ จาก การ เต้น รํา"
 federations2.11.desc:0 "นัก วิจัย ของ เรา ประสบ ความ สําเร็จ ใน การ แยก สาเหตุ ของ การ เต้น รํา ออก จาก กัน[Root.GetName]- และไม่ได้สักครู่เร็วเกินไป! สถานการณ์ บน ดาว เคราะห์ นี้ ยิ่ง เลว ร้าย ลง เรื่อย ๆ เพราะ แพทย์ จํา ต้อง ใช้ ยา ระงับ ประสาท อย่าง หนัก ต่อ นัก เต้น เพื่อ หยุด พวก เขา ไม่ ให้ เต้น รํา จน เสีย ชีวิต.\n\nดู เหมือน ว่า ผู้ กระทํา ผิด เป็น แก๊ส ที่ ปล่อย ออก มา จาก พืช ใน ท้อง ถิ่น ซึ่ง ก่อ ให้ เกิด ความ รู้สึก กระปรี้กระเปร่า และ แรง กระตุ้น ที่ ไม่ อาจ ต้านทาน ได้ ใน การ เต้น รํา ขณะ เดียว กัน ก็ ระงับ ความ รู้สึก อ่อน เปลี้ย อิดโรย[Root.Owner.GetSpeciesName]สัญชาตญาณการป้องกันตัวเอง\n\nโชคดีที่นักวิทยาศาสตร์ของเรา ได้พัฒนาก๊าซสังเคราะห์ ที่ครั้งหนึ่งได้ถูกปล่อยสู่อากาศ - จะลดผลกระทบของ 'ก๊าซแรง' นอกจากนี้ ดูเหมือนว่าก๊าซ'เต้น'มีคุณสมบัติที่มีคุณค่าบางอย่าง เราสามารถนําไปใช้ ถ้าเราสามารถสกัดมันจากพืชก่อนที่จะถูกปล่อยเข้าไปในอากาศ"
 federations2.11.A:0 "ดีมาก"
 federations2.12.name:0 "ความ หายนะ ของ โรค ระบาด ใน การ เต้นรํา"
 federations2.12.desc:0 "'โรคระบาดแดนนิ่ง' ได้เปลี่ยนไปในทางที่เลวร้าย ที แรก แพทย์ ของ เรา ใช้ ยา กล่อม ประสาท หนัก เพื่อ ห้าม นัก เต้น ไม่ ให้ เต้น รํา จน เสีย ชีวิต. อย่าง ไร ก็ ตาม ขณะ ที่ พวก เขา เอง ได้ รับ ผล กระทบ มาก ขึ้น เรื่อย ๆ จาก อาการ เหล่า นั้น แพทย์ ที่ เหลือ อยู่ ก็ รับมือ ไม่ ไหว และ หลาย คน[Root.Owner.GetSpeciesNamePlural]หมดสติไปเพราะเหนื่อยล้า\n\nเนื่อง จาก มี ผู้ ตั้ง อาณานิคม มาก ขึ้น ที่ ได้ รับ ผล กระทบ จาก วัน นั้น เรื่อง นี้ จึง ไม่ ใช่ เรื่อง ตลก ที่ ไม่ เป็น อันตราย อย่าง ที่ เรา เคย คิด. เรา ต้อง ลง มือ จัด การ ทันที เพื่อ กําจัด โรค ระบาด นี้ ให้ หมด สิ้น ไป!"
 federations2.12.A:0 "มีใครพยายามปิดเพลงหรือยัง"
 federations2.13.name:0 "โรค ระบาด ที่ น่า กลัว"
 federations2.13.desc:0 "แม้ว่านักวิทยาศาสตร์ของเรายังคงสับสน กับสาเหตุของโรคที่เรียกว่า 'โรคระบาดแดนซิ่ง' แต่ผลของมันดูเหมือนจะอ่อนลง บาง ที อาจ เป็น โรค ที่ ผู้ ตั้ง ถิ่น ฐาน มี ภูมิ คุ้ม กัน มาก ขึ้น เรื่อย ๆ หรือ อาจ เป็น การ หลอก ลวง ที่ ซับ ซ้อน เพื่อ ดึงดูด ความ สนใจ ไป ยัง[Root.GetName]ไม่ว่าจะเกิดอะไรขึ้น ผู้ตั้งถิ่นฐานจะไม่เต้นอีกต่อไป"
 federations2.14.name:0 "พรรค ถาวร"
 federations2.14.desc:0 "แม้ว่านักวิทยาศาสตร์ของเรายังคงสับสน กับสาเหตุของโรคที่เรียกกันว่า โรคกลัวการเต้นรํา แต่มันดูไม่เหมือนอันตราย แม้ ว่า คน เหล่า นั้น ที่ ได้ รับ ผล กระทบ จาก การ เต้น รํา จะ มี ความ รู้สึก ตื่น เต้น และ ไม่ อาจ ต้านทาน แรง กระตุ้น ที่ จะ เต้น รํา ได้ แต่ สัญชาตญาณ การ อยู่ รอด ของ เขา หมาย ความ ว่า ความ เหนื่อย ล้า ทํา ให้ เขา ต้อง พัก ผ่อน ไม่ ช้า ก็ เร็ว. ยิ่ง กว่า นั้น ดู เหมือน ว่า ปรากฏการณ์ นี้ ส่ง ผล กระทบ อย่าง มาก ต่อ พื้น ที่ บาง แห่ง.\n\nผู้ประกอบการท้องถิ่นได้เริ่มออกแบบพื้นที่เหล่านี้เป็นเขตของพรรค โฆษณา[Root.GetName]ในฐานะดาวเคราะห์ของพิธีกรนิรันดร์'ที่หนุ่มสาวและเก่าเหมือนกันอาจจะมาปลดปล่อยพันธนาการของพวกเขาและเพลิดเพลินกับตัวเอง"
 federations2.14.A:0 "งั้นก็ งานเลี้ยง!"
 federations2.15.name:0 "$federations2.11.name$"
 federations2.15.desc:0 "ใน ที่ สุด นัก วิจัย ของ เรา ก็ ประสบ ความ สําเร็จ ใน การ แยก สาเหตุ ของ เหตุ การณ์ เต้น รํา ออก จาก กัน[Root.GetName]ดู เหมือน ว่า ผู้ กระทํา ผิด เป็น แก๊ส ที่ ปล่อย ออก มา จาก พืช ใน ท้อง ถิ่น ซึ่ง ก่อ ให้ เกิด ความ รู้สึก กระปรี้กระเปร่า และ แรง กระตุ้น ที่ ไม่ อาจ ต้านทาน ได้ ใน การ เต้น รํา ขณะ ที่ กด ความ รู้สึก อ่อน เพลีย, ความ อิดโรย[Root.Owner.GetSpeciesName]สัญชาตญาณการป้องกันตัวเอง\n\nโชคดีที่นักวิทยาศาสตร์ของเรา ได้พัฒนาก๊าซสังเคราะห์ ที่ครั้งหนึ่งได้ถูกปล่อยสู่อากาศ - จะลดผลกระทบของ 'ก๊าซแรง' นอกจากนี้ ดูเหมือนว่าก๊าซ'เต้น'มีคุณสมบัติที่มีคุณค่าบางอย่าง เราสามารถนําไปใช้ ถ้าเราสามารถสกัดมันจากพืชก่อนที่จะถูกปล่อยเข้าไปในอากาศ"
 federations2.15.A:0 "$federations2.11.A$"
 DANCING_PLAGUE_PROJECT:0 "ภัย พิบัติ จาก การ เต้นรํา"
 DANCING_PLAGUE_PROJECT_DESC:0 "[Root.GetName]ถูกรบกวนโดยกรณีของการเต้นที่ควบคุมไม่ได้ เราต้องตรวจสอบสาเหตุของการระบาดนี้ ก่อนที่จะมีใครได้รับบาดเจ็บ!"
 DANCING_PLAGUE_PROJECT2:0 "รักษา ผู้ เต้น รํา"
 DANCING_PLAGUE_PROJECT2_DESC:0 "\"โรคระบาด\" ที่เรียกว่า \"โรคระบาด\" ทําให้เกิดความทุกข์ทรมานอย่างมาก[Root.GetName]เราต้องหาวิธีรักษาให้เร็วที่สุด"
 dancing_fad:0 "ภัย พิบัติ จาก การ เต้นรํา"
 dancing_fad_desc:0 "เราไม่แน่ใจว่าทําไม แต่ชาวอาณานิคมบนโลกใบนี้จะไม่หยุดเต้น เรา ไม่ แน่ ใจ ว่า พวก เขา มี ความ ยินดี มาก หรือ ไม่ หรือ ว่า มี อะไร บาง อย่าง ที่ ชั่ว ร้าย กว่า นั้น กําลัง ทํา งาน."
 dancing_to_death_modifier:0 "การ เต้น รํา จน ตาย"
 dancing_to_death_modifier_desc:0 "พวกอาณานิคมบนดาวดวงนี้ กําลังเต้นเองจนตาย ด้วยเหตุผลที่ไม่รู้"
 d_disco_planet:0 "ไข้ของพรรค"
 d_disco_planet_desc:0 "ก๊าซในชั้นบรรยากาศของดาวเคราะห์ดวงนี้ ส่งผลให้รู้สึกถึงความกระปรี้กระเปร่า และการกระตุ้นที่ต่อต้านการเต้นรํา สิ่งนี้ได้ทําให้โลกเป็นจุดหมายปลายทางที่สําคัญ สําหรับบุคคลหนุ่มสาวและคนแก่ ที่พยายามที่จะกําจัดความยับยั้งชั่งใจของพวกเขา ในขณะที่เรายังสามารถใช้ก๊าซนี้ สําหรับวัตถุประสงค์ของเราเอง ..."
 d_disco_planet2:0 "ไข้ของพรรค"
 d_disco_planet2_desc:0 "บาง สิ่ง เกี่ยว กับ ดาว เคราะห์ ดวง นี้ ก่อ ให้ เกิด ความ รู้สึก ตื่น เต้น และ แรง กระตุ้น ที่ ไม่ อาจ ต้านทาน ได้ ใน การ เต้น รํา อีก ทั้ง แรง กระตุ้น บาง อย่าง ทาง เพศ. สิ่งนี้ได้ทําให้โลกเป็นจุดหมายปลายทางที่สําคัญ สําหรับบุคคลหนุ่มสาวและคนแก่ ที่พยายามที่จะกําจัดความยับยั้งชั่งใจของพวกเขา"

 FAVORS_USED:0 "ใช้บุญคุณ"
 NUM_FAVORS_USED:0 "§Y($NUM_FAVORS|Y$)§!"
 FAVORS_USED_DESC:0 "§Y($NUM_FAVORS|Y$)§!กรุณาจากสูงสุด§Y10§!ถูกใช้จากนี้จักรวรรดิ."
 FAVORS_TO_USE_DESC:0 "เรียกใน$NUM|Y$ของ$TOTAL|Y$การนําเสนอจากนี้จักรวรรดิ"
 DIPLOMATIC_WEIGHT:0 "$succession_type_diplomatic_weight$"
 FAVORS_DIPLO_BUFF_DESC:0 "เรียกเข้ามา$NUM|Y$POP(s)จะช่วยเพิ่มความไวของจุดต่ําสุดด้วย£diplo_weight£ §H+$VAL|$§!สําหรับความละเอียดนี้"
 FAVORS_SAME_SIDE:1 "§Rนี่จักรวรรดิกําลังสนับสนุน ความละเอียดนี้อยู่แล้ว ไม่ จําเป็น ต้อง ขอ ความ ช่วย เหลือ จาก พวก เขา เพื่อ จะ ได้ รับ การ สนับสนุน.§!"
 ASK_TO_LEAVE_FEDERATION:0 "ขอ ให้ ออก จาก สหพันธ์"
 POPUP_ASK_TO_LEAVE_FEDERATION_DESC:0 "คุณอยากส่งคําขอให้ประธานาธิบดี$FEDERATION|H$เพื่อออกจากสหพันธรัฐ?"
 ADD_BUILDING_COLONIZABLE:0 "ไม่สามารถเพิ่มข้อมูล$BUILDING|Y$ถึง$PLANET|Y$เพราะมันไม่สามารถแทนที่ได้"
