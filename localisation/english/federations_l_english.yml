 fedel.903.name:0 "เรามีผู้ชนะ!"
 fedel.903.desc:0 "การ ท้าทาย กฎ ทอง สิ้น สุด ลง แล้ว และ ผู้ ชนะ ได้ รับ การ ประกาศ แล้ว!\n\nเดอะ§H[event_target:federation_bidding_winner.GetName]§!ได้พิสูจน์ความเหนือกว่าทางการเงินของพวกเขา และกลายเป็นผู้นําการบํารุงรักษาคนใหม่"
