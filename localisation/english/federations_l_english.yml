 in_breach_of_resolution_ecology_environmental_control_board:0 "ในการละเมิดคณะกรรมการควบคุมสิ่งแวดล้อม"
 resolution_ecology_environmental_control_board_desc:0 "การ อุตสาหกรรม ไม่ สามารถ ควบคุม ตน เอง ได้. เราต้องการคณะกรรมการควบคุมสิ่งแวดล้อมข้ามชาติ ที่มีอํานาจในการดูแลอุตสาหกรรมและการพัฒนา"
 resolution_ecology_environmental_control_board_tooltip:2 "การแปลงดาวเคราะห์ให้เป็น §Yดาวอภิมหานคร§! หรือ §Yปรับสภาพดาว§! ให้เป็นดาวแบบอื่นที่ไม่ใช่ §Yดาวไกอา§! จะถูก §Rแบน§!\n£unity£ $unity$ จากสิ่งกีดขวางที่เกิดขึ้นตามธรรมชาติสำหรับ §Yจักรวรรดิที่มีพลเมือง-นักสิ่งแวดล้อม§!: §G+2§! £unity£""
 resolution_ecology_paradise_initiative_tooltip:0 "£unity£ $unity$จากเครื่องดักจับเท็จ§Yจักรวรรดิ สิ่ง แวด ล้อม§!: §G+3§! £unity£\n\n£job_ranger£ $job_ranger$งานจากตัวเขียนบล็อกธรรมชาติสําหรับ§Yจักรวรรดิ สิ่ง แวด ล้อม§!: §G+1§! £job_ranger£"

 resolution_ecology_paradise_initiative:0 "โครงการริเริ่มแดนสุขาวดี"
 resolution_ecology_paradise_initiative_desc:0 "ด้วยการดูแลอย่างพิถีพิถันของโลกของเรา เราสามารถอาศัยอยู่ในความสามัคคีของนิเวศ มันควรเป็นเป้าหมายของเรา ที่จะทิ้งความทรงจําไว้เบื้องหลัง"

