 START_SCREEN_DOOMSDAY:0 "[Root.Capital.GetName]กําลังจะตาย โลก ของ เรา ได้ รับ ความ เสีย หาย เนื่อง จาก แผ่น ดิน ไหว และ การ ระเบิด ของ ภูเขา ไฟ เป็น เวลา หลาย พัน ปี ก่อน หน้า เรา[Root.GetScientistPlural]ในที่สุดก็ยืนยันสิ่งที่คาดไม่ถึง การ คํานวณ ของ พวก เขา แสดง ว่า ดาว เคราะห์ ที่ ไม่ มั่นคง ของ เรา จะ ฉีก ตัว เอง ออก จาก กัน ภาย ใน หนึ่ง ศตวรรษ หรือ สอง ดวง.\n\nด้วยวิธีการหยุดกระบวนการนี้ไม่ได้ จึงได้ตระหนักว่าการอยู่รอดของเราในฐานะสายพันธุ์ จะขึ้นอยู่กับความสามารถของเราที่จะออกจาก[Root.Capital.GetName]อยู่ข้างหลังและลี้ภัยที่ อื่น ๆ ท่ามกลางดาว ความ ก้าว หน้า ของ อารยธรรม ยานลําแรกที่สามารถเดินทางผ่านไฮเปอร์สเปซได้พร้อมแล้ว แต่ไม่มีเวลามากนัก\n\nเราต้องหาบ้านใหม่"
