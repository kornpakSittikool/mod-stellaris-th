 mega_shipyard_0_MEGASTRUCTURE_DETAILS:1 "ฐานดวงดาวขนาดใหญ่เพื่อการต่อยานโดยเฉพาะ §Y$mega_shipyard_3$§! มีท่าเทียบยานผลิตหรืออัปเกรดยานได้ 20 ลำ"
 mega_shipyard_1:0 "$mega_shipyard_3$ โครง"
 mega_shipyard_1_DESC:0 "กรอบเริ่มต้นสําหรับ$mega_shipyard_3$วางรากฐานสําหรับสิ่งที่วันหนึ่งจะเป็นอู่เรือที่มีประสิทธิภาพมากที่สุดในกาแล็กซี่"
 mega_shipyard_2:0 "$mega_shipyard_3$ แกนกลาง"
 mega_shipyard_2_DESC:0 "ใจกลางของ$mega_shipyard_3$มี โครง สร้าง หลาย อย่าง ที่ จําเป็น เพื่อ จะ เคลื่อน ย้าย และ ประมวล วัสดุ ปริมาณ มหาศาล ซึ่ง จําเป็น ต่อ การ ผลิต."
 mega_shipyard_3:0 "อู่ต่อยานขนาดมหึมา"
 mega_shipyard_3_DESC:0 "ด้วยจํานวนมากของผลิตเรือเบิรท จากแกนการประมวลผลที่มีประสิทธิภาพสูง, สุริยุปราคาของเรือเมกะที่ใด ๆฐานดวงดาว."
