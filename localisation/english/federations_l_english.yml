 fedel.515.4.desc:0 "เป็น[GetPsychicNounPlural]จากฝั่งตรงข้าม[Root.GetAllianceName]หมายถึงการรวมตัวกัน[fed_leader.Capital.GetName]สถานการณ์ที่ไม่คาดฝันเกิดขึ้น เดอะ§H[winning_country.GetName]§!เป็นสมาชิกเพียงคนเดียวที่สามารถรวบรวม[GetPsychicNounPlural]เพื่อเข้าร่วม\n\nหากไม่มีใครสู้ ชัยชนะก็ตกเป็นของพวกเขา"
 fedel.515.2:0 "การต่อสู้เริ่มต้นขึ้น ทีละอย่าง ทีละอย่าง แต่ละทีมก็แตกเป็นเสี่ยง ๆ ของเราเอง[GetPsychicNounPlural]เป็นหนึ่งในคนแรกที่ไป ไร้อํานาจในใบหน้า ของการทําร้ายคู่แข่งของพวกเขา"
 fedel.515.3.organic: "การต่อสู้เริ่มต้นขึ้น ขณะที่ทีมปะทะกัน[GetPsychicNounPlural]ใน ตอน แรก ทํา ได้ ดี แต่ ใน ที่ สุด ข้อ ท้าทาย ก็ ปรากฏ ว่า ใหญ่ เกิน ไป. พวกเขาปล่อยเสียงโหยหวนของความเจ็บปวดเป็นพวกเขาถูกเนรเทศสําหรับนิรันดร์§Hเดอะชราวด์§!."
 fedel.515.3.machine: "การต่อสู้เริ่มต้นขึ้น ขณะที่ทีมปะทะกัน[GetPsychicNounPlural]ใน ตอน แรก ทํา ได้ ดี แต่ ใน ที่ สุด ข้อ ท้าทาย ก็ ปรากฏ ว่า ใหญ่ เกิน ไป. พวก เขา ปล่อย เสียง ที่ ไม่ คุ้น เคย ขณะ ที่ เขา ถูก เนรเทศ ตลอด กาล เข้า สู่ ความ ลึก อัน ขรุขระ ที่ สุด ของ§Hเดอะชราวด์§!."
 fedel.515.4:0 "เมื่อพลังงานหมุนลดลงในที่สุด เพียง[GetPsychicNounPlural]ของ§H[winning_country.GetName]§!ยังคงอยู่"
