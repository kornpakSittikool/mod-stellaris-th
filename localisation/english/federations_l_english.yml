 fedel.901.name:0 "วาง แผน!"
 fedel.901.desc:1 "ถึงเวลาสําหรับ[Root.GetName]เพื่อประมูลในการแข่งขันกฎทอง จ่ายค่าธรรมเนียมล่วงหน้า ไม่งั้นก็เสีย - และเสียสิทธิ์ที่จะเข้าร่วม\n\nหม้อตอนนี้คือ:\n\n£energy£ §H[bidding_federation_leader.current_pot_variable]§!"
 fedel.901.a:0 "วางราคาที่£energy£ §Y10000§!."
