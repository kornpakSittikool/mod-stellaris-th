 trait_void_dweller_1:0 "ผู้อยู่อาศัยในอวกาศ"
 trait_void_dweller_1_desc:2 "§Lสายพันธุ์นี้เติบโตในถิ่นอาศัยของออร์บิทัล ด้วยความสามารถในการเดินทางอย่างมีประสิทธิภาพ มัน อยู่ ได้ อย่าง สบาย ใน ความ ถ่วง ที่ ไร้ จุด หมาย แต่ ไม่ ตอบ สนอง ต่อ สภาพ แวด ล้อม ของ ดาว เคราะห์.§!"
