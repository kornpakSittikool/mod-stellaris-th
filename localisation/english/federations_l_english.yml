 ### The Hauer System text
 attack_ship_01_object:0 "เรือ โจมตี ที่ ถูก ทําลาย"
 attack_ship_01_object_desc:0 "เรือโจมตีเก่าที่ถูกทําลาย ถูกทําลายด้วยเพลิงไหม้และไหม้หมด"
 attack_ship_01_object_tooltip:0 "ถูกทําลายและเผายานจู่โจม"

 tannhauser_gate_object:0 "ประตูทัน เฮา เซอร์"
 tannhauser_gate_object_desc:0 "ประตูอวกาศที่ไม่ได้ทํางาน จุดหมายปลายทางของมันตั้งแต่ถูกลืมมานาน"
 tannhauser_gate_object_tooltip:0 "ประตูอวกาศที่ไม่ได้ทํางาน"

 site_lost_moments:0 "อย่าลืม"
 site_lost_moments_intro:0 "เรือวิทยาศาสตร์ได้หยิบขึ้น อ่านแปลกที่ออกมาจาก[From.Planet.GetName]."
 fedev.9430.name:0 "บี คอน อยู่ ใน ความ ลึก"
 fedev.9430.desc:0 "เพียง แต่ผ่านการพิสูจน์ทางโบราณคดีและจินตนาการ หนึ่งสามารถแสดง อารยธรรมที่เคยเจริญรุ่งเรือง บนพื้นผิวที่รกร้างในปัจจุบันของ[From.Planet.GetName]ความ ไม่ กรุณา เช่น นั้น เคย มี มา นาน แล้ว กระทั่ง อาคาร ที่ ใหญ่ ที่ สุด ก็ ถูก บด จน เหลือ แต่ ฝุ่น.\n\nแต่จากใต้ดิน มันส่งสัญญาณแปลกๆ สัญญาณลึกลับที่ต้องการ การสืบสวนและเปิดเผย"
 fedev.9435.name:0 "เวลาหมด"
 fedev.9435.desc:0 "ทันที ทันใด และ ไม่ อาจ ปฏิเสธ ได้ ว่า มี ผู้ เสีย ชีวิต เกิด ขึ้น กับ ทีม ขุด ค้น อย่าง ลึกลับ ขณะ ที่ พวก เขา เข้า ใกล้ สัญญาณ ใน ที่ ลึก. เมื่อดินและหินมากขึ้นถูกเอาออกไป ความคิดที่ไม่สามารถจัดการได้ยังคงอยู่ในด้านหลังของจิตใจของทุกคน :\n\nชีวิตมันสั้น ซักวันทุกอย่างจะจบลง"
 fedev.9440.name:0 "เจิดจรัสมาก"
 fedev.9440.desc:0 "แหล่งที่มาของสัญญาณเป็น คนต่างด้าวศิลาจารึกด้วยสัญลักษณ์แปลก ฉบับ แปล นี้ มี ความ ซับ ซ้อน อย่าง ยิ่ง. มันกล่าวถึงบุคคลหนึ่ง ที่มีความสําคัญอย่างมาก ของผลงานชีวิต ที่คู่ควรกับการจดจํา และการเทิดทูน ในตอนท้ายการแปลกลายเป็นที่แปลกประหลาดมาก พูดถึงการรั่วไหลอย่างเศร้าโศกของร่างกายเกล็ดแสงและต่อมาพวกเขาการสลายตัวเนื่องจากการสภาพภูมิอากาศ\n\nแปลได้เพียงส่วนสุดท้ายเท่านั้น:\n\n§H'ถึงเวลาตาย'§!"

 lost_moment_memento:0 "ชีวิต ที่ คุ้ม ค่า"
 lost_moment_memento_desc:0 "นับตั้งแต่โบราณคดี ที่ค้นพบหินของเอเลี่ยนจักรวรรดิประชากรเริ่มชื่นชมชีวิตมากขึ้น"

 ### The Lesser Messenger text
 site_lesser_messenger:0 "ข้อความในฝุ่น"
 site_lesser_messenger_intro:0 "ดูใกล้ๆ[From.Planet.GetName]แสดงสัญญาณเล็ก ๆ ของอารยธรรม ที่เคยอาศัยอยู่ดาวเคราะห์"
 fedev.9445.name:0 "ตั้งแต่นั้น"
 fedev.9445.desc:0 "เริ่มการสํารวจเมื่อ[From.Planet.GetName]พื้นผิวของพื้นผิว เปิดเผยว่าดาวเคราะห์ดวงนี้ แท้จริงแล้ว เป็นบ้านของอารยธรรมบางชนิด\n\nอย่างไรก็ตาม ระดับของความเสียหาย บ่งชี้ว่า มันคงนานมาแล้ว และเป็นไปได้มากที่ อารยธรรมจะถูกโจมตี มันยังมีซากปรักหักพังไม่พอ ที่จะเอาความคิดเกี่ยวกับสรีรวิทยาของมนุษย์ต่างดาว"
 fedev.9450.name:0 "สัตว์ ร้าย แห่ง อวกาศ"
 fedev.9450.desc:0 "ทีมภาคพื้นดินได้แยกสัญญาณวิทยุ ลงบนโลก ต้น กําเนิด ของ มัน ยัง ไม่ เป็น ที่ รู้ จัก แต่ ส่วน ต่าง ๆ ที่ แปล แล้ว ได้ เริ่ม เปิด เผย ข้อมูล เกี่ยว กับ อารยธรรม ที่ สูญ เสีย ไป นาน แล้ว:\n\nบาง คน ไม่ ทราบ ว่า กําลัง จะ เกิด ภัย คุกคาม ต่อ อารยธรรม. ความหลงใหลโดยรวมต่อความก้าวหน้าทางเทคโนโลยี มี การ สร้าง ยาน อวกาศ ขนาด ยักษ์ ใน อีก ส่วน หนึ่ง ของ กาแล็กซี. ชุดตกแต่งเหล่านี้จะถูกแสดงซ้ําในข้อความกวน"
 fedev.9455.name:0 "สวน พฤกษศาสตร์"
 fedev.9455.desc:1 "นัก โบราณคดี สามารถ กลับ บ้าน ได้ โดย อาศัย สัญญาณ ลึกลับ. มันมาจากใต้ดินลึก\n\nการปล่อยข่าวของเว็บไซต์นี้ เพิ่งเริ่มต้นเท่านั้น แต่ข้อมูลบ่งชี้ถึง งานวิจัยและการพัฒนาบางอย่าง สถานที่นี้เต็มไปด้วยต้นแบบขนาดใหญ่อย่างน่าทึ่ง ของอุปกรณ์เทคโนโลยีต่าง ๆ\n\nการสแกนแสดงให้เห็นพื้นที่กลวงลงไปอีก และการขุดเจาะกําลังดําเนินอยู่"
 fedev.9460.name:0 "พวกเขาสร้างอะไร..."
 fedev.9460.desc:0 "ทีมขุดเจาะของเรา ได้ค้นพบสิ่งที่น่าสนใจ ชุดของฮาร์ดไดรฟ์ขนาดเล็กบรรจุข้อมูล เกี่ยวกับโครงการที่ต่อเนื่อง ที่ดูเหมือนจะเป็นจุดโฟกัสของการติดตั้งนี้\n\nมันพูดถึง§Hพาหนะที่ทรงพลังที่เทียบได้กับใบปลิวของกาแล็กซี่§!.\n\nสิ่งที่สัตว์ร้ายของเครื่องจักรที่พวกเขาสร้างขึ้นลงที่นี่?"
 fedev.9465.name:0 "และผู้ชนะคือ..."
 fedev.9465.desc:0 "มันเป็นยานอวกาศขนาดใหญ่!\n\nอย่างน้อยสําหรับประชากร[From.Planet.GetName]ใคร - กลับกลายเป็นว่า - มันเล็กมาก ตัวต้นแบบขนาดเล็กที่พบที่นี่ เห็นได้ชัดเลยว่า เป็นเครื่องจักรจริงของพวกเขา และที่ถูกสันนิษฐานว่าเป็นโรงงานการ คุกคาม\" ที่ถูกกล่าวถึงในสัญญาณรบกวน กลับกลายเป็นคู่แข่งของพวกเขาในการแข่งขันเทคโนโลยี ระหว่างประเทศ การแบ่งกลุ่มเล็ก ๆ นี้มาร่วมกันพยายามที่จะได้รับรางวัลแรก!\n\nดูเหมือนเราจะเป็นคน ที่ได้รับรางวัลในครั้งนี้"
 fedev.9470.name:0 "ออกไปและพิชิต"
 fedev.9470.desc:0 "มี การ ค้น พบ เรือ อวกาศ ขนาด มหึมา!\n\nหรืออย่างน้อยก็มีขนาดใหญ่มากกับประชากร[From.Planet.GetName]ซึ่งกลายเป็นสิ่งมีชีวิตชนิดลบ\n\nหวาดกลัวภัยคุกคามลึกลับ ที่กําลังใกล้เข้ามาในโลกของพวกเขา สายพันธุ์ทั้งหมดมารวมตัวกัน เพื่อสร้างยานอวกาศ\n\nพวกเขาดูเหมือนจะสายเกินไป ยานจู่โจมของพวกเขายังอยู่ที่นี่ แต่พวกเขาไม่อยู่"
 fedev.9475.name:0 "อย่ายิงผู้ส่งสาร"
 fedev.9475.desc:0 "มันเป็นยานอวกาศที่ยิ่งใหญ่\n\nเรืออวกาศขนาดมหึมา มันกลายเป็นว่า ประชากรของ[From.Planet.GetName]เป็นสิ่งมีชีวิตขนาดเล็ก สิ่ง ที่ พบ เห็น ใน ขนาด เล็ก ๆ ก็ คือ เครื่องจักร จริง ๆ ของ พวก เขา และ สถาน ที่ ก่อ ความ เสีย หาย นี้ เคย เป็น เมือง ใหญ่.\n\nเมื่อ ได้ ยิน ว่า มี การ สร้าง เรือ อวกาศ ใน อีก ส่วน หนึ่ง ของ กาแล็กซี ชนิด นี้ จึง ตัดสิน ใจ สร้าง เรือ ลํา หนึ่ง เพื่อ ให้ เข้า กับ เกาะ เบ เฮ โมท ของ สัตว์ ต่าง ด้าว.\n\nคํา นี้ แสดง ถึง ความ ตั้งใจ แน่ว แน่ และ ความ กล้า หาญ อย่าง ยิ่ง. มันน่ารักออก"

 get_messenger:0 "§Yผู้ ส่ง ข่าว ที่ อ่อน กว่า§!แล้วมันได้บุกเข้าไปท่ามกลางหมู่ศัตรูในยามนั้น"

 LESSENGER_REMODEL:0 "เพิ่มข้อมูลจดหมาย"
 LESSENGER_REMODEL_TITLE:0 "เพิ่มข้อมูลจดหมาย"
 LESSENGER_REMODEL_DESC:0 "ระดับที่พิเศษของเทคโนโลยีและความสามารถ§Yผู้ ส่ง ข่าว ที่ อ่อน กว่า§!มันเทียบได้กับขนาดที่ไร้สาระ ของสายพันธุ์เล็ก ๆ ของเรือหลายพันสามารถพอดีเข้าไปในเรือ แต่ที่จะพอดีแม้ทีมงานโครงกระดูกของสายพันธุ์ของเราใน"
 lessenger_75:1 "ผู้ส่งสารที่น้อยกว่า ยังคงมีขนาดเล็กเกินไปสําหรับลูกเรือของเรา!"
