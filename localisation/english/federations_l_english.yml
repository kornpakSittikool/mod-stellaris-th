 ### Feral Overload Colony Event Chain text
 feral_overload_00:0 "มี น้อย มาก"
 feral_overload_00_desc:0 "สัดส่วนที่เล็กของประชากร มีพฤติกรรมที่ค่อนข้าง ... แบบดั้งเดิม"

 feral_overload_01:0 "กลุ่มอันธพาล"
 feral_overload_01_desc:0 "ผู้อยู่อาศัยจำนวนพอสมควร มีพฤติกรรมเหมือนสัตว์ป่า"

 feral_overload_02:0 "ความ ชั่ว ที่ เล็ก กว่า"
 feral_overload_02_desc:0 "เนื่อง จาก วิทยาศาสตร์ ประชากร จึง ได้ รับ ผล กระทบ ใน ทาง บวก จาก เกล็ด เห็ด ใน ถ้ํา."

 colony.8001.name:0 "พฤติกรรมภายใน"
 colony.8001.desc:0 "รายงานจากอาณานิคมของเรา[Planet.GetName]อ้างว่ามีพฤติกรรมที่เพิ่มขึ้น เห็นได้ชัดเลยว่า บางส่วนของประชากร ได้แสดงออกมา ในยุคก่อนๆ ของราคะราคะและความก้าวร้าว"
 colony.8001.a:0 "ทําต่อไป"
 colony.8002.name:0 "ความ รุนแรง กําลัง เพิ่ม ขึ้น"
 colony.8002.desc:0 "พฤติกรรมของเฟลบน[Planet.GetName]ไม่มีสัญญาณของการหยุด เร็วๆนี้ อันที่จริง มันเพิ่มขึ้นตั้งแต่รายงานล่าสุด การ กระทํา ที่ ก้าวร้าว และ รุนแรง เกิด ขึ้น ตลอด เวลา และ ผู้ คน ส่วน ใหญ่ ดู เหมือน จะ ได้ รับ ผล กระทบ."
 colony.8002.a:0 "นี่มันเกินควบคุมแล้ว"
 colony.8003.name:0 "นี่มันบ้าชัดๆ"
 colony.8003.desc:0 "สถานการณ์บน[Planet.GetName]มันหลุดออกจากการควบคุม ปัจจุบัน ประชากร จํานวน มหาศาล ติด เชื้อ ไม่ ว่า จะ เป็น อะไร ก็ ตาม ที่ ก่อ ให้ เกิด น้ํา ท่วม โลก นี้ และ อาณานิคม ก็ เริ่ม พัง ทลาย เพราะ น้ํา ท่วม. บางอย่างที่ต้องทํา หรือ[Planet.GetName]จะหายไป"
 colony.8003.a:0 "งั้นก็ทําอะไรซักอย่างสิ"
 colony.8004.name:0 "ส ปอร์ส ป่า เถื่อน"
 colony.8004.desc:0 "การสืบสวนพฤติกรรมที่แปลกประหลาดและป่าเถื่อน[Planet.GetName]เสร็จสมบูรณ์แล้ว ในเครือข่ายขนาดใหญ่ของอุโมงค์ถ้ํา ที่ซึมเปลือกของดาวเคราะห์ของ ราลึกลับได้ค้นพบ มัน งอก ขึ้น ทั่ว พื้น ถ้ํา, ผนัง, เพดาน, และ ทอด ยาว หลาย พัน กิโลเมตร.\n\nรามักปล่อยสปอร์ที่พ่นออกมาจากถ้ํา สําหรับสิ่งที่ไม่ได้จัดตั้งขึ้น แต่เรารู้ว่าแน่นอน\n\nเราสามารถพยายามที่จะใช้ ประโยชน์ของปรากฏการณ์นี้ หรือเราสามารถกําจัดเชื้อราทั้งหมด"
 colony.8004.a:0 "มีชีวิต..."
 colony.8004.b:0 "... หรือปล่อยให้ตาย"
 colony.8005.name:0 "เมฆ และ ส เต รเฟ"
 colony.8005.desc:0 "โรงงานอุตสาหกรรมได้ถูกสร้างบนทางระบายน้ํา สําหรับระบบนิเวศของเชื้อรา นอก จาก การ กรอง และ ควบคุม การ แพร่ กระจาย ของ สปอร์ แล้ว พืช เหล่า นี้ ยัง สามารถ เปลี่ยน เมฆ หมอก มาก เกิน ไป ให้ เป็น ประโยชน์ ด้วย§Hก๊าซแปลกใหม่§!.\n\nการ เพิ่ม ประชากร เพิ่ม ขึ้น ขณะ ที่ ประชากร ค่อน ข้าง หิว โหย ของ[Planet.GetName]ตอบสนองความต้องการของพวกเขาบ่อยขึ้น ซึ่งโชคร้ายยังหมายความว่าระดับของความรุนแรงและความขัดแย้ง[Planet.GetName]."
 colony.8005.a:0 "นั่นคือราคาของความก้าวหน้า"
 colony.8006.name:0 "ไฟ ชําระ"
 colony.8006.desc:0 "โปรเจกต์ที่ใช้เผาถ้ํา เห็ดได้เสร็จสมบูรณ์แล้ว และเชื้อราที่กระตุ้นได้ดั้งเดิม ก็ถูกทําลายไปแล้ว\n\nโชคยังเข้าข้างเรา มีถ้ําหลายถ้ําที่ถูกเผาทิ้ง กลายเป็นเส้นเลือดดําแร่ที่อุดมไปด้วย ซึ่งตอนนี้สามารถใช้ประโยชน์ได้มากขึ้น"
 colony.8006.a:0 "เยี่ยม!"

 INVESTIGATE_CAVE_SHROOM_PROJECT:0 "การถอนราก การ แก้ ปัญหา"
 INVESTIGATE_CAVE_SHROOM_PROJECT_DESC:0 "มันถึงเวลาแล้วที่จะตรวจสอบว่า อะไรเป็นสาเหตุของพฤติกรรมที่แปลกประหลาดและทําลาย[Root.GetName]อาณานิคม"

 UTILIZE_CAVE_SHROOM_PROJECT:0 "รักษา ถ้ํา มัช รูม"
 UTILIZE_CAVE_SHROOM_PROJECT_DESC:0 "นัก วิทยาศาสตร์ ของ เรา จะ พยายาม หา วิธี ที่ จะ ใช้ ผล กระทบ แรก ของ ถ้ํา มัช รูม เพื่อ ประโยชน์ ของ เรา."

 EXTERMINATE_CAVE_SHROOM_PROJECT:0 "เชิญ เข้า ไป ใน ถ้ํา มัช รูม"
 EXTERMINATE_CAVE_SHROOM_PROJECT_DESC:0 "จะ มี การ คิด ค้น โครงการ หนึ่ง ขึ้น มา ซึ่ง เชื้อ รา ใน ถ้ํา ใต้ ดิน จะ ถูก เผา เป็น ขั้น ๆ จน ถึง ที่ สุด ปลาย."

 feral_overload_chain_title:0 "โอเวอร์โหลดของความแหลม:"
 feral_overload_chain_desc:0 "พฤติกรรมป่าเถื่อนและรุนแรงของประชากร[Root.GetName]มี สาเหตุ มา จาก อะไร บาง อย่าง อย่าง อย่าง แน่นอน และ ถ้า ไม่ มี การ ควบคุม มัน อาจ ทําลาย อาณานิคม ทั้ง หมด."

 d_spore_vents:0 "สโปร์ เวนต์"
 d_spore_vents_desc:0 "เห็ด เห็ด สามารถ ทํา ให้ มี การ ใช้ ใน อุตสาหกรรม ได้."
 d_cave_shroom_veins:0 "ถ้ํา ชล า ไวน์"
 d_cave_shroom_veins_desc:0 "การ ทําลาย ถ้ํา ของ รา เผย ให้ เห็น เส้น เลือด ดํา ที่ อุดม ด้วย แร่ ธาตุ."

