 challenge_type_arena_combat_desc:0 "ทางเดียวที่จะตัดสินได้ว่า ใครควรเป็นผู้นําสหพันธรัฐของเรา คือกําจัดผู้ปกครองของทุกชาติ ผู้รอดชีวิตคนสุดท้ายชนะ\n\n§Yชัยชนะขึ้นอยู่กับ\n- ไม้บรรทัดผู้นำถึงเผ่าพันธุ์ลักษณะ\n- นั่นจักรวรรดิจรรยาบรรณและจรรยาบรรณ§!\n\n§Rจักรวรรดิ ที่ มั่นคง§!"
 challenge_type_psionic_battle_desc:0 "เรื่องของผู้ที่ควรจะเป็นผู้นําของสหพันธรัฐของเรา มีความสําคัญเกินไปที่จะตัดสินใจ ในขอบเขตของเขตการปกครองของเรา แต่ละจักรวรรดิจะส่งคนทรงที่ทรงอํานาจที่สุดของพวกเขา ไปเผชิญหน้ากับคนอื่น ๆ ในการต่อสู้ยักษ์\n\n§Yชัยชนะขึ้นอยู่กับ\n- จํานวนของประชากรกับลักษณะของไซโซนิค\n- จํานวนของประชากรกับงานเทเลพา\n- ข้อเสนอ Zro§!\n\n§Rจักรวรรดิที่ไม่มีไซโอนิคประชากรไม่สามารถเข้าร่วมและต้องสูญเสีย§!"
 challenge_type_bidding_war_desc:1 "ความมหัศจรรย์ของอารยธรรมที่ก้าวหน้าที่สุด สามารถสืบสาวไปถึงแนวคิดง่ายๆ ได้อย่างกว้างขวาง ดัง นั้น สิทธิ ใน การ ปกครอง จึง ไม่ ควร ถูก วัด โดย เชาวน์ ปัญญา ของ ชน พื้น เมือง หรือ ความ เข้ม แข็ง แบบ ดุ ร้าย แต่ ด้วย ความ ลึก ของ กระเป๋า.\n\n§Yชัยชนะขึ้นอยู่กับ\n- เครดิตพลังงาน (£energy£) พร้อม\n- เครดิตพลังงาน (£energy£# ใช้เวลา§!\n\n§Hบิสส์จ่ายเป็นทุนกลาง กองทุนนี้จะถูกแจกจ่ายหลังจากนั้น เป็นเรื่องของความรอบคอบของผู้ชนะ§!"
 challenge_type_thesis_desc:0 "ผ้า คลุม หน้า ของ ผู้ นํา ต้อง ไม่ ให้ แก่ คน โง่ หรือ คน โง่. แทนที่เราจะเลือกการทดลองโดยวิทยาศาสตร์ การเปิดเผยปัญญาและความเข้าใจ ของผู้ปกครองและจักรวรรดิ\n\n§Yชัยชนะขึ้นอยู่กับ\n- ไม้บรรทัดผู้นำและ ลักษณะ นิสัย ของ นัก วิทยาศาสตร์\n- ระดับเทคโนโลยี§!\n\n§Hแต่ละวิทยานิพนธ์จะถูกทบทวนภายใน 60 วัน§!\n\n§Rจักรวรรดิ ที่ ขาด ผู้ ปกครอง และ อย่าง น้อย ก็ นัก วิทยาศาสตร์ หนึ่ง คน ใน ช่วง การ ตรวจ สอบ จะ สูญ เสีย.§!"
 requires_psionic_pops:0 "ต้องการสมาชิกอย่างน้อยหนึ่งคน£pop£ §Hป๊อป§!ด้วย§Y$trait_psionic$§!หรือ§Y$trait_latent_psionic$§!คุณสมบัติ"
 challenge_type_conclave_desc:0 "ความบริสุทธิ์ทางจิตวิญญาณและการแสวงหา ค่านิยมตามประเพณี จะเป็นเกณฑ์ที่เราจะต้องตัดสินผู้นําของเรา มีเพียงคนที่ได้รับพรจากพระเจ้าเท่านั้น ที่ควรเป็นผู้นําพวกเรา\n\n§Yชัยชนะขึ้นอยู่กับ\n- ประชากรทํางานเป็น$job_priest_plural$หรือ งาน ฝ่าย วิญญาณ อื่น ๆ\n- เอกภาพการ ลง ทุน (ตาม อําเภอ ใจ, การ เก็บ รวบ รวม สินค้า, และ การ เก็บ สะสม สินค้า)§!\n\n§Hแต่ละวิทยานิพนธ์จะถูกทบทวนภายใน 60 วัน§!\n\n§Rจักรวรรดิ ที่ ขาด ผู้ ปกครอง และ อย่าง น้อย ก็ นัก วิทยาศาสตร์ หนึ่ง คน ใน ช่วง การ ตรวจ สอบ จะ สูญ เสีย.§!"

 origin.205.desc:0 "ที่รัก[Root.GetSpeciesNamePlural]ดังเช่นเคย เราเฝ้าสังเกตท่านอยู่ และผู้นําท่านหนึ่ง ได้ทําให้เราสนใจ อันที่จริง ชื่อเสียงของคุณ[desired_leader.GetTitle], §H[desired_leader.GetName]§!ถึงเมืองหลวงแล้ว\n\nให้[desired_leader.GetHerHis]ทักษะที่ผิดปกติ เราอยากเสนอ ตําแหน่งถาวรบน[scion_master.Capital.GetName]เป็นเกียรติอย่างยิ่ง กรุณาจัดการ[desired_leader.GetHerHis]ย้ายให้เร็วที่สุดเท่าที่จะทําได้"
 origin.205.a:0 "มันจะต้องจบ"
 origin.205.a.tooltip:0 "§H[desired_leader.GetName]§!เข้าร่วม§H[scion_master.GetName]§!"
 origin.205.a.response:0 "เยี่ยม พวกเรารอคอยที่จะ[desired_leader.GetHerHis]มาแล้ว ไม่ต้องห่วง[desired_leader.GetSheHe]จะมีความสุขกับทุกความสะดวกสบาย สิ่งมีชีวิตที่สามารถปรารถนา[scion_master.Capital.GetName]."
 origin.205.b:0 "ไม่ ผู้นํานี้อยู่กับเรา"
 origin.205.b.response:0 "ท่าน... ท่านจะปฏิเสธเกียรติอันยิ่งใหญ่นี้หรือ ข้ากลัวว่าเจ้าจะทํา[desired_leader.GetTitle]ผู้ที่พวกเขาโอ้อวดกัน[Root.GetSpeciesNamePlural]."

 origin.210.desc:0 "สวัสดีค่ะ[Root.GetSpeciesNamePlural]มีความประหลาดค่อนข้าง[scion_master.GetSpeciesName]บน[scion_master.Capital.GetName]ผู้ ที่ อ้าง ว่า ตัว เอง เป็น คน กระ สับ กระส่าย ถึง กับ เบื่อ ด้วย ซ้ํา! - ของชีวิตตามที่มันเป็นใน[scion_master.GetName]บุคคลที่ถูกหลอกลวงนี้แสวงหาความท้าทาย - คําพูดของพวกเขา - หนึ่งใน อารยธรรมที่พัฒนาน้อยของกาแล็กซี่\n\nคุณจะเอานี่ไหม[scion_master.GetSpeciesName]จากมือของเรา[Root.GetSpeciesNamePlural]คุณจะช่วยเราได้ จากคุณสมบัติของพวกเขา ผมมีข้อสงสัยว่าพวกเขาจะให้บริการ คุณเป็นอย่างดีในตําแหน่งผู้นํา ตราบใดที่คุณสามารถอดทน"
 origin.210.a:0 "แน่นอน"
 origin.210.a.response:0 "ขอบคุณ เรารู้ว่าเราสามารถนับเมื่อ[Root.GetName]."
 origin.210.b:0 "เราไม่มีตําแหน่งครับ ขอโทษด้วย"
 origin.210.b.response:0 "เข้าใจล่ะ น่าผิดหวังจริงๆ บางทีโทษก็อยู่ที่พวกเรา เพราะเป็นการขอร้อง"
 origin.210.admiral:0 "A[scion_master.GetSpeciesName] §Hผู้บัญชาการ§!เข้าร่วม[Root.GetName]."
 origin.210.official:1 "A[scion_master.GetSpeciesName] §H$official$§!เข้าร่วม[Root.GetName]."
 origin.210.scientist:0 "A[scion_master.GetSpeciesName] §Hนัก วิทยาศาสตร์§!เข้าร่วม[Root.GetName]."
 origin.210.general:0 "A[scion_master.GetSpeciesName] §Hค่าทั่วไป§!เข้าร่วม[Root.GetName]."
 scion_leader_desc: "ผู้ มา เยือน ที่ เคารพ บูชา จาก จักรวรรดิ โบราณ และ อยู่ ใน สภาพ ที่ สงบ สุข โพ ลี มาท นี้ แสวง หา ข้อ ท้าทาย ใหม่ ๆ ใน กาแล็กซี ที่ กําลัง พัฒนา."
 scion_leader_catch_phrase: "§L\"ของฉันสิ่งที่มีเสน่ห์และสนิมมิลีอุมาพร้อมแล้วกาแลคซี กวนใจฉัน\"§!"
 leader_trait_ancient_knowledge: "ความรู้โบราณ"
 leader_trait_ancient_knowledge_desc: "ผู้นําคนนี้ใช้ปัญญาที่รวบรวมหลายศตวรรษ ก่อนที่อารยธรรมจํานวนมาก สามารถเริ่มเข้าใจพื้นที่"

 origin.215.desc:0 "[Root.GetSpeciesNamePlural]เมื่อเร็วๆนี้ เราค้นพบยานหลายลําที่เราไม่ได้ใช้ เราเกือบจะโยนพวกเขา เข้าสู่ดวงอาทิตย์ที่ใกล้ที่สุด แต่แล้วเราคิดถึงคุณ\n\nเหล่านี้เป็นเรือเก่า - บางได้แก่ไม่มีข้อสงสัยกว่า อารยธรรมทั้งหมดของคุณ - แต่คุณควรพบว่ามันค่อนข้างมีประสิทธิภาพ รับไปเถอะค่ะ เรายืนยัน"
 origin.215.a:0 "ขอบคุณ"
 origin.215.tooltip:0 "กองบินเล็กๆ[scion_master.GetSpeciesName]ยานอวกาศเข้าร่วม[Root.GetName]."

 origin.220.desc: "ที่รัก[Root.GetSpeciesNamePlural]คุณสนใจจะก้าวขึ้นหน่อย เรือของเจ้ากําลังล้าหลัง และเราเริ่มเบื่อกับการเดินเรือ\n\nมีของคุณ[root.GetScientistPlural]ดูที่เครื่องเหล่านี้กําหนด เรายืนยัน"
 origin.220.a: "แน่นอน ขอบคุณ"

 origin.225.desc: "[Root.GetSpeciesNamePlural]สวัสดี! คุณรู้สึกว่าความพยายามของคุณไปได้สวยไหม ผู้เชี่ยวชาญ\n\nสิ่งที่คุณทําคือ... ดี แต่เราต้องการที่จะเห็นคุณ ขยายการเข้าถึงของคุณออกไปเล็กน้อย ยังมีกาแล็กซี่อีกมากมายที่รับเข้ามา แต่คุณก็ยังคงถูกกักไว้!\n\nแต่ไม่ต้องห่วง เราได้เตรียมเสบียงไว้ให้แล้ว ไม่จําเป็นต้องขอบคุณเรา แค่แน่ใจว่าจะลงทุนอย่างชาญฉลาด ในอาณานิคมใหม่"
 origin.225.b: "เราไม่สามารถทําอย่างนั้นได้ในตอนนี้"
 origin.226.desc.A: "มาเถอะ[Root.GetSpeciesNamePlural]อย่ายอมรับความพ่ายแพ้ง่ายๆ คุณต้องออกไป และสร้างบ้านใหม่ให้ตัวเอง\n\nเร็วเข้า"
 origin.226.desc.B: "อุปกรณ์สื่อสารของคุณ ต้องผิดพลาด[Root.GetSpeciesNamePlural]เรายังคงได้รับลบและเนรคุณ ช่วยดูความผิดนั้นด้วยนะ"

 origin.29.desc:0 "การชอกช้ํา เราจะยึดยานเราคืนเดี๋ยวนี้"
 origin.29.a:0 "เราจะเป็นอิสระ!"

 origin.51.desc:0 "ที่รัก[Root.GetSpeciesNamePlural]... เราจะทํายังไงกับคุณ เรามีความหวังสูง แต่กระนั้นคุณก็ยังอยู่ที่นี่ สูญเสียศักยภาพของคุณ ในสงครามที่ไร้ประโยชน์ มีเยอะแยะเลย[scion_master.Capital.GetName]ที่คิดว่าเราจะตัดความสัมพันธ์กับคุณทั้งหมด แต่ที่จะยอมรับความผิดพลาด เราได้ลงทุนค่อนข้างมาก ในการพัฒนาสายพันธุ์ที่แปลกประหลาดของคุณ หลังจากที่ทั้งหมด\n\nเล็ก[scion_master.GetSpeciesName]กองเรือลาดตระเวนถูกวางอยู่ภายใต้คําสั่งของท่าน ใช้มันเพื่อสรุปบางอย่าง กับความขัดแย้งในปัจจุบัน โดยเฉพาะอย่างยิ่ง อย่าใช้เวลานานนัก เราต้องการกองยานนี้คืน ในที่สุด อย่าให้พวกมันถูกฆ่าทั้งหมด!"
 origin.51.a:0 "ขอบคุณ... เราจะให้พวกเขาใช้อย่างเหมาะสม"
 origin.52.name:1 "[fe_species.GetAdj]การหมดอายุกองยานถูกทําลาย" # Fallen Empire species
 origin.52.desc:0 "จดหมาย เหตุกองยานให้เรายืมโดย[scion_master.GetName]ถูกทําลายอย่างย่อยยับ นี่อาจทําให้พวกเขาโกรธ"
 origin.53.desc:0 "กองเรือของเราอยู่ที่ไหน[Root.GetSpeciesNamePlural]กองทัพเรือที่เราให้คุณยืม เพื่อยุติสงครามงี่เง่าของคุณ มันอยู่ที่ไหน? ไม่ อย่าแกล้งโง่\n\n§Rให้เรากลับฟลีทของเรา!§!"
 origin.53.a:0 "อนิจจาก็ไม่มาก ..."
 origin.54.desc:0 "[Root.GetSpeciesNamePlural]สายของเราบอกเราถึงสงคราม ที่ท่านอยู่ในได้สิ้นสุดลง เนื่องจากคุณยังอยู่ที่นี่ มันคงไม่ใช่หายนะ\n\nเราจะยึดยานเราคืนเดี๋ยวนี้ พยายามสุดความสามารถที่จะหลีกเลี่ยง การผูกพันธ์ของทหารที่ไม่มีใครเทียบได้ในอนาคต ได้โปรด"
 origin.54.a:0 "เราจะ... ขอบคุณ"

