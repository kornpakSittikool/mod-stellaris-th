 doomsday_first_arkship_desc: "การย้ายเรือของเรา§Hเรือ รบ§!ได้ปลูกฝังความรู้สึกใหม่ของความหวังในประชาชน มันพิสูจน์ว่าชีวิตสามารถทนได้ นอกเหนือการควบคุม ของโลกของเรา"
