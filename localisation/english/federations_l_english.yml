 resolution_industry_repeal_5_effect_success:2 "ยกเลิกมติ §Y$resolution_industry_project_cornucopia$§! แล้วออก §Y$resolution_industry_environmental_ordinance_waivers$§! เป็นกฎหมายกาแล็กติก\n\n"

 resolution_industry_regulatory_facilitation:0 "อำนวยความสะดวกตามกฎข้อบังคับ"
 resolution_industry_regulatory_facilitation_desc:0 "เราควรให้คณะกรรมการตัดสินใจ กับผู้เชี่ยวชาญ ผู้ นํา ทาง อุตสาหกรรม มี คุณสมบัติ เหมาะ ที่ สุด ที่ จะ ระบุ กฎ เกณฑ์ ที่ ฟุ่มเฟือย ซึ่ง ขัด ขวาง การ ผลิต."

 resolution_industry_collective_waste_management:0 "การจัดการขยะโดยรวม"
 resolution_industry_collective_waste_management_desc:0 "แทนที่จะบังคับให้เหมืองหรือโรงงานแต่ละแห่งต้องแบกรับภาระในการจัดการกับขยะอุตสาหกรรมด้วยตนเอง เราควรกำหนดพื้นที่ที่เราสามารถจัดเก็บของเหลือจากกระบวนการได้"

 resolution_industry_building_a_better_tomorrow:0 "สร้างวันพรุ่งนี้ที่ดีกว่า"
 resolution_industry_building_a_better_tomorrow_desc:0 "ความ ก้าว หน้า ไม่ อาจ ถูก จํากัด โดย อุปสรรค ใด ๆ ที่ อยู่ ตรง หน้า เรา. ขอ ให้ เรา แบ่ง ปัน เทคนิค ต่าง ๆ แก่ กัน เพื่อ ช่วย เรา ใน การ ควบคุม และ ครอบ ครอง โลก ธรรมชาติ."

 resolution_industry_environmental_ordinance_waivers:0 "ละเว้นข้อกำหนดด้านสิ่งแวดล้อม"
 resolution_industry_environmental_ordinance_waivers_desc:1 "เดอะ[global_event_country.GetGalCommunityOrGalImperium]ควร ให้ อํานาจ แก่ สภา ท้อง ถิ่น เพื่อ ระงับ กฎ ข้อ บังคับ ที่ ไม่ ได้ เป็น ประโยชน์ แก่ สาธารณชน และ เป็น เพียง การ ขัด ขวาง ความ ก้าว หน้า."
 resolution_industry_environmental_ordinance_waivers_tooltip:0 "การกำหนดประเภทของดาวเคราะห์เป็น: การหล่อโลหะ อุตสาหกรรม และการกลั่นสกัดจะได้รับโบนัสเพิ่มเติม"

 resolution_industry_project_cornucopia:0 "โครงการความอุดมสมบูรณ์"
 resolution_industry_project_cornucopia_desc:0 "ทรัพยากรใกล้ไม่มีสิ้นสุดอยู่ที่ปลายนิ้วของเรา ถ้าเรามีความกล้าหาญที่จะยึดมัน แค่คิดถึงสิ่งอัศจรรย์ที่เราสร้างได้ ถ้าเราเอาชนะความกลัวได้"
 resolution_industry_project_cornucopia_tooltip:0 "ปลดล็อก §Hการตัดสินใจของดาวเคราะห์§! ที่ช่วยให้ขุดค้นดาวของเราเพื่อค้นหาแหล่งแร่ที่อุดมสมบูรณ์"

 decision_project_cornucopia:0 "$resolution_industry_project_cornucopia$"
 decision_project_cornucopia_desc:0 "$resolution_industry_project_cornucopia_desc$"
 decision_project_cornucopia_effects_short:0 "กับระเบิดโลกเพิ่มขึ้น§G+4§! §Y$district_mining_plural$§!, §G+5%§! §Y$mod_planet_jobs_minerals_produces_mult$§!และ§R-20%§! §Y$pop_habitability$§!."
 d_project_cornucopia:0 "$resolution_industry_project_cornucopia$"
 d_project_cornucopia_desc:0 "การทําเหมืองแร่แบบนอกกรอบ ทําให้ดาวเคราะห์ดวงนี้อยู่ได้ยากขึ้น... และหาประโยชน์ได้ง่ายขึ้น"

 federations.10000.name:0 "$resolution_industry_project_cornucopia$"
 federations.10000.desc:1 "วิศวกรจากฝั่งตรงข้าม[global_event_country.GetGalCommunityOrGalImperium]ได้มาร่วมกันเพื่อแบ่งปันความคิด เกี่ยวกับวิธีการใช้ทรัพยากรที่เป็นประโยชน์มากขึ้น จากโลกของเรา\n\nเดอะ§Hโปรเจกต์ภาษาคอร์นูโคเปีย§!ปัจจุบัน มี การ ตัดสิน ใจ เรื่อง ดาว เคราะห์."

