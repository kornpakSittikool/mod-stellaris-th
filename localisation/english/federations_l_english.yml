 federations.10020.desc:1 "ความลับของจักรวาลนี้ ไม่ใช่ทั้งหมด ที่อยู่ข้างนอกนั่น\n\nเดอะ[global_event_country.GetGalCommunityOrGalImperium]ได้อนุมัติให้ใช้สารกระตุ้นความเป็นจริง เพื่อเพิ่มการค้นคว้าของเรา อนุญาตให้นักวิทยาศาสตร์ของเราใน$building_research_efficiency_1$เพื่อค้นหาความจริงอื่น ๆ"
