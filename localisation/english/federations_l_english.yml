 pm_extradimensional_experimentation_desc:0 "การศึกษานอกมิติกําลังดําเนินอยู่ในดาวเคราะห์ดวงนี้$building_research_efficiency_1$.\n\n§Rจะมีอะไรผิดพลาดได้อีกล่ะ§!"
