 doomsday_arkship_preparation_desc: "การทําลายล้างภายในโลกของเรา ทําให้อุตสาหกรรมของเรากลายเป็นเรื่องใหญ่โต การ ก่อ สร้าง ดําเนิน ไป อย่าง รวด เร็ว ด้วย ความ สิ้น หวัง ขณะ ที่ เรา วิ่ง แข่ง เพื่อ ทํา เรือ รบ ให้ สําเร็จ ก่อน จะ ถึง กาล อวสาน."
