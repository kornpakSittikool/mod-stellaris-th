 resolution_ecology_integrated_gardens:0 "สวนแบบบูรณาการ"
 resolution_ecology_integrated_gardens_desc:0 "ด้วยการส่งเสริมให้พลเมืองของเราปลูกพืชอาหารของตนเองและบังคับใช้ระบบไฮโดรโพนิกส์(ปลูกพืชไร้ดิน)ที่ใช้งานง่ายเราสามารถลดผลกระทบต่อดาวที่เราอาศัยอยู่และเพลิดเพลินไปกับความเขียวขจีมากขึ้น"
 resolution_ecology_integrated_gardens_tooltip:0 "£unity£ $unity$ จากสิ่งกีดขวางที่เกิดขึ้นตามธรรมชาติสำหรับ §Yจักรวรรดิที่มีพลเมือง-นักสิ่งแวดล้อม§!: §G+1§! £unity£"
