 resolution_greatergood_workers_rights:0 "กฎบัตรสิทธิแรงงาน (ข้อตกลงสัตยาบันผูกพัน)"
 resolution_greatergood_workers_rights_desc:0 "นับ ว่า ถูก ต้อง ที่ เรา จะ ทํา ให้ สิทธิ ของ คน งาน เป็น ที่ ยอม รับ และ ป้องกัน พวก เขา จาก การ ทํา ร้าย ผู้ คน ทั่ว ไป."

 resolution_greatergood_five_year_plans:0 "แผนห้าปี"
 resolution_greatergood_five_year_plans_desc:0 "ผู้ว่าราชการโลกของเราควรจะได้รับอิสรภาพ ที่จําเป็นในการเสนอและกําจัด การปฏิรูปเพื่อสุขภาพที่ดียิ่งขึ้น"
 resolution_greatergood_five_year_plans_tooltip:0 "การกำหนดประเภทดาวเคราะห์ได้แก่ ดาวเกษตรกรรม, ดาวไฟฟ้า, และดาวเหมืองแร่จะได้รับโบนัสเพิ่มเติม\n\nมาตรฐานความเป็นอยู่ §Yพื้นฐานการยังชีพ§! §Rถูกแบน§!"

 resolution_greatergood_greater_than_ourselves:0 "ย้ายไปยังดาวเคราะห์ที่เหมาะสมกับงาน"
 resolution_greatergood_greater_than_ourselves_desc:0 "เราถามคนของเราจํานวนมาก แต่บางครั้งเราก็ต้องถามมากขึ้น เราควรให้รางวัลคนที่เต็มใจจักรวรรดิมากกว่าความต้องการของพวกเขาเอง และอาสาสมัครที่จะมุ่งหน้าไปชายแดน"
 resolution_greatergood_greater_than_ourselves_tooltip:1 "ปลดล็อกคำสั่งที่สนับสนุนให้ประชากรว่างงานที่ไม่ใช่ทาสย้ายถิ่นฐานใหม่โดยสมัครใจไปยังดาวเคราะห์ที่เหมาะสมซึ่งมีงานและที่อยู่อาศัยภายในจักรวรรดิของเรา\n\nมาตรฐานความเป็นอยู่: §Yพื้นฐานการยังชีพ§! และ §Yเศรษฐกิจแบบแบ่งชนชั้น§! ถูก §Rแบน§!\n\nทาสประเภท: §Yทาสที่เป็นทรัพย์สิน§!, §Yปศุสัตว์§!, และ §Yทาสที่ถูกเชื่อมโยงด้วยโครงข่ายเมทริกซ์§! ถูก §Rแบน§!"
 edict_greater_than_ourselves:0 "$resolution_greatergood_greater_than_ourselves$"
 edict_greater_than_ourselves_desc:1 "ส่งเสริมการว่างงานอิสระ ผุดขึ้นมาเพื่อลดความสมัครใจให้กับดาวเคราะห์ที่เหมาะสม"
 greater_than_ourselves_tooltip:0 "§Yปลดล็อกประกาศคำสั่ง:§! $edict_greater_than_ourselves$"
 federations.10010.name:0 "$resolution_greatergood_greater_than_ourselves$"
 federations.10010.desc:1 "ด้านข้างขวา ครอบคลุมเมื่อเร็ว ๆ นี้[global_event_country.GetGalCommunityOrGalImperium]เรา ขอ ความ ช่วย เหลือ เพิ่ม เติม จาก คน งาน.\n\nบัด นี้ เรา สามารถ สนับสนุน คน งาน ที่ ว่าง งาน ให้ ปรับ ตัว เข้า กับ โลก อื่น ๆ ด้วย ความ สมัคร ใจ ซึ่ง เรา ควบคุม ได้ ซึ่ง มี ที่ อยู่, งาน, และ มี ที่ อยู่ อาศัย เพียง พอ."
 federations.10010.desc_gestalt:1 "เดอะ[global_event_country.GetGalCommunityOrGalImperium]ได้ผ่านข้อห้าม ที่ให้สิทธิ์เพิ่มเติมสําหรับหุ่นยนต์งาน\n\nแม้ว่าเรื่องนี้จะไม่มีความหมายกับเรามาก อย่างน้อยเราสามารถได้ประโยชน์จากโครงสร้างพื้นฐานบางอย่างที่พวกเขาสร้างขึ้น เพื่อรีเซ็ตหุ่นยนต์ที่ไม่ได้ทํางาน"
 federations.10010.desc_wilderness: "เดอะ[global_event_country.GetGalCommunityOrGalImperium]ได้ ผ่าน กฎ ข้อ บังคับ ที่ ให้ สิทธิ พิเศษ เพิ่ม เติม แก่ คน งาน.\n\nแม้ว่ากฎนี้จะไม่มีความหมายกับเรามากนัก แต่เราสามารถได้ประโยชน์บางอย่าง จากโครงสร้างพื้นฐานที่พวกเขาสร้างขึ้น"

 resolution_greatergood_balance_in_the_middle:0 "สมดุลตรงกลาง"
 resolution_greatergood_balance_in_the_middle_desc:0 "เราต้องสู้กับความไม่เสมอภาคในรูปแบบของมันทั้งหมด บังคับให้ความยุติธรรมโดยทุกวิธีที่จําเป็น งาน เลี้ยง จะ ดี อะไร ถ้า คุณ มี พอ อยู่ แล้ว และ ทําไม งาน นั้น จะ เสีย เปล่า เมื่อ เพื่อน บ้าน ของ คุณ หิว?"
 resolution_greatergood_balance_in_the_middle_tooltip:0 "มาตรฐานความเป็นอยู่: §Yพื้นฐานการยังชีพ§!, §Yเศรษฐกิจแบบแบ่งชนชั้น§!, §Yเงื่อนไขที่เหมาะสม§!, และ §Yสิทธิพิเศษสำหรับนักวิชาการ§! ถูก §Rแบน§!\n\n§Yทาส§! ทุกประเภทถูก §Rแบน§!"

 resolution_greatergood_universal_prosperity_mandate:0 "ความมั่งคั่งของจักรวาล"
 resolution_greatergood_universal_prosperity_mandate_desc:0 "ถ้ากาแล็กซี่ของเรา ครอบคลุมอารยธรรม ไม่สามารถจัดหา สําหรับคนของเราทั้งหมด ไม่ มี ข้อ แก้ ตัว สําหรับ ใคร ๆ ใน กาแล็กซี ที่ ต้องการ สิ่ง ใด ๆ. นอก จาก นั้น เรา ควร จัด การ เพื่อ ให้ มี ทรัพย์ สิน มาก เกิน ไป เพื่อ ทํา ให้ ทุก คน ดี ขึ้น."
 resolution_greatergood_universal_prosperity_mandate_tooltip:1 "มาตรฐานความเป็นอยู่ทั้งหมดนอกเหนือจาก: §Yภาระร่วมกัน§!, §Yกรรมสิทธิ์ของของพนักงาน§!, §Yความอุดมสมบูรณ์ของชาวยูโทเปีย§!, §Yสารเคมีแห่งความสุข§!, หรือ §Yเอาใจผู้รับคำสั่ง§! จะถูก §Rแบน§!\n\n§Yการเปลี่ยน§! สิ่งมีชีวิตเป็นจักรวรรดิที่มีคุณสมบัติพลเมือง §Yเครื่องดัดแปลงประชากร§! หรือ §Yจิตสำนึกร่วม§! จะถูก §Rแบน§!\n\nจักรวรรดิที่ไม่มีจริยธรรม §Yความเสมอภาค§! หรือ §Yเครื่องจักรรับใช้§! อาจไม่สามารถทำตามข้อกำหนดนี้ได้และจะถือเป็นการ §Rละเมิดกฎหมายกาแล็กติก§!!"

