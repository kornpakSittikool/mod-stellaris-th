 d_arcane_replicator:0 "ตัวเข้ารหัสเอซน"
 d_arcane_replicator_desc:0 "เครื่องจักรโบราณนี้ถูกปลูกไว้ลึกภายในบริเวณที่อยู่อาศัย สร้างขึ้นเป็นเตาปฏิกรณ์หลักของมัน สิ่งของโบราณที่เดิมสร้างถิ่นอาศัยนี้ เทคโนโลยีการจําลองของสารนี้ เราไม่อาจเข้าใจได้"
 START_SCREEN_VOID_DWELLERS:3 "สําหรับ คน ส่วน ใหญ่ แล้ว การ ดูด ฝุ่น อวกาศ เป็น สภาพ แวด ล้อม ที่ เป็น ศัตรู ซึ่ง ต้อง เอา ชนะ หรือ เอา ชนะ ได้. สําหรับพวกเรา มันคือบ้าน\n\nเป็น เวลา หลาย พัน ปี ที่ เผ่า พันธุ์ ของ เรา อาศัย อยู่ ตาม สถานี อวกาศ ต่าง ๆ ที่ ต่าง กัน โคจร รอบ ดวง อาทิตย์ ใน ระบบ สาม ชั้น ของ เรา. ไม่ ว่า บรรพบุรุษ หรือ คน อื่น ของ เรา จะ เป็น ผู้ สร้าง เรา ก็ ไม่ รู้.\n\nบางคนคาดว่าเศษดาวที่แตก ล้อมรอบดาวที่อยู่ เคียง ข้างเรา เป็นเศษของบ้านของผู้สร้างของเรา\n\nเพียง ไม่ กี่ ศตวรรษ ผ่าน ไป นับ ตั้ง แต่ การ ประดิษฐ์ หรือ การ ค้น พบ อวกาศ ที่ สามารถ ทํา ให้ ช่อง ว่าง ระหว่าง สถานี ต่าง ๆ ของ เรา เปลี่ยน ไป. การ ค้า และ ความ ไม่ ไว้ วางใจ ค่อย ๆ ยอม ให้ มี การ ค้า และ ความ ร่วม มือ. กับการสร้างครั้งแรกของเรา[GetStartingDrivePlural]ที่อยู่อาศัยได้รวมกันภายใต้ธง"
 START_SCREEN_VOID_DWELLERS_SOL:3 "สําหรับ คน ส่วน ใหญ่ แล้ว การ ดูด ฝุ่น อวกาศ เป็น สภาพ แวด ล้อม ที่ เป็น ศัตรู ซึ่ง ต้อง เอา ชนะ หรือ เอา ชนะ ได้. สําหรับพวกเรา มันคือบ้าน\n\nเป็นพันๆปี ที่พวกเราอาศัยอยู่ ในหลายสถานีอวกาศ ที่โคจรรอบดาวของเรา ไม่ ว่า พวก เขา จะ ถูก สร้าง โดย บรรพบุรุษ หรือ คน อื่น เรา ไม่ รู้.\n\nลักษณะ ทาง กายภาพ ของ เรา บ่ง ชี้ ว่า เรา มี ต้น กําเนิด บน ดาว เคราะห์ ดวง หนึ่ง แต่ ประวัติศาสตร์ ที่ บันทึก ไว้ ไม่ ได้ กล่าว ถึง ดาว เคราะห์ ดวง นั้น เลย. บาง คน คาด เดา ว่า ซาก ปรัก หัก พัง ที่ เป็น พิษ ของ ดาว เคราะห์ ดวง หนึ่ง ที่ อยู่ ใต้ สถานี แห่ง หนึ่ง ของ เรา คือ โลก ที่ สูญ หาย ไป ของ เผ่า พันธุ์ ของ เรา แต่ ความ จริง อาจ ไม่ มี วัน รู้ จัก ได้.\n\nเพียง ไม่ กี่ ศตวรรษ มา นี้ เอง ที่ การ เดิน ทาง ระหว่าง สถานี ของ เรา ถูก คิด ค้น ขึ้น หรือ ค้น พบ ขึ้น อยู่ กับ ว่า คุณ ถาม ใคร. ความ ไม่ ไว้ เนื้อ เชื่อ ใจ กัน และ ความ ไม่ ไว้ วางใจ ค่อย ๆ เปิด ทาง ให้ กับ การ ค้า และ การ ร่วม มือ กัน. โดยเวลาของครั้งแรก[GetStartingDrive]ที่อยู่อาศัยได้รวมกันภายใต้ธง"
 START_SCREEN_VOID_DWELLERS_HIVE: "สําหรับ คน ส่วน ใหญ่ แล้ว การ ดูด ฝุ่น อวกาศ เป็น สภาพ แวด ล้อม ที่ เป็น ศัตรู ซึ่ง ต้อง เอา ชนะ หรือ เอา ชนะ ได้. สําหรับพวกเรา มันคือบ้าน\n\nเป็น เวลา หลาย พัน ปี เรา อาศัย อยู่ ใน สถานี อวกาศ หลาย แห่ง ซึ่ง มี จิตใจ เดียว ใน วง โคจร ของ ดวง อาทิตย์ ใน ระบบ สาม เหลี่ยม. ไม่ ว่า พวก เขา จะ ถูก สร้าง โดย บรรพบุรุษ หรือ คน อื่น เรา ไม่ รู้.\n\nชีววิทยาของเราระบุว่า สายพันธุ์ของเรามีต้นกําเนิดบนดาวเคราะห์ แต่ความทรงจําโดยรวมนั้นไม่มีคําตอบ เราคาดว่าเศษดาวแตกในวงโคจรกับเรา เป็นโลกที่หายไปของสายพันธุ์ของเรา แต่ความจริงอาจจะไม่เป็นที่รู้จัก\n\nหลัง จาก ค้น พบ การ บิน อวกาศ แล้ว รัง ผึ้ง ที่ แยก ต่าง หาก ก็ มี อิสระ ที่ จะ รวม ตัว กัน. โดยเวลาของครั้งแรก[GetStartingDrive]เราถูกผนวกเข้าด้วยกันอย่างสมบูรณ์"
 START_SCREEN_VOID_DWELLERS_HIVE_SOL: "สําหรับ คน ส่วน ใหญ่ แล้ว การ ดูด ฝุ่น อวกาศ เป็น สภาพ แวด ล้อม ที่ เป็น ศัตรู ซึ่ง ต้อง เอา ชนะ หรือ เอา ชนะ ได้. สําหรับพวกเรา มันคือบ้าน\n\nเป็นเวลาหลายพันปีที่เราดํารงอยู่เป็นใจเดียว แยกกันโดยหลาย สถานีอวกาศในวงโคจรของดาวของเรา ไม่ ว่า พวก เขา จะ ถูก สร้าง โดย บรรพบุรุษ หรือ คน อื่น เรา ไม่ รู้.\n\nชีววิทยาของเราระบุว่า สายพันธุ์ของเรามีต้นกําเนิดบนดาวเคราะห์ แต่ความทรงจําโดยรวมนั้นไม่มีคําตอบ เราคาดว่า ดินแดนที่เป็นพิษของดาวเคราะห์ในวงโคจรกับเรา เป็นโลกที่หายไปของสายพันธุ์ของเรา\n\nหลัง จาก ค้น พบ การ บิน อวกาศ แล้ว รัง ผึ้ง ที่ แยก ต่าง หาก ก็ มี อิสระ ที่ จะ รวม ตัว กัน. โดยเวลาของครั้งแรก[GetStartingDrive]เราถูกผนวกเข้าด้วยกันอย่างสมบูรณ์"
 START_SCREEN_VOID_DWELLERS_MACHINE: "สําหรับ คน ส่วน ใหญ่ แล้ว การ ดูด ฝุ่น อวกาศ เป็น สภาพ แวด ล้อม ที่ เป็น ศัตรู ซึ่ง ต้อง เอา ชนะ หรือ เอา ชนะ ได้. สําหรับพวกเรา มันคือบ้าน\n\nเป็น เวลา หลาย พัน ปี แล้ว ที่ เรา อาศัย อยู่ บน สถานี อวกาศ หลาย แห่ง ใน วง โคจร ของ ระบบ ดาว ทรี นา รี ของ เรา. เรายังไม่ได้แก้ไข ถ้าเราสร้างมันขึ้นมา หรือถ้าเราเป็นเครื่องจักรร้างของผู้สร้างดั้งเดิมของพวกเขา$START_SCREEN_VOID_DWELLERS_MACHINE_END$"
 START_SCREEN_VOID_DWELLERS_MACHINE_SOL: "สําหรับ คน ส่วน ใหญ่ แล้ว การ ดูด ฝุ่น อวกาศ เป็น สภาพ แวด ล้อม ที่ เป็น ศัตรู ซึ่ง ต้อง เอา ชนะ หรือ เอา ชนะ ได้. สําหรับพวกเรา มันคือบ้าน\n\nเป็น เวลา หลาย พัน ปี ที่ เรา อาศัย อยู่ บน สถานี อวกาศ หลาย แห่ง ใน วง โคจร ของ ดาว ดวง นี้. เรายังไม่ได้แก้ไข ถ้าเราสร้างมันขึ้นมา หรือถ้าเราเป็นเครื่องจักรร้างของผู้สร้างดั้งเดิมของพวกเขา$START_SCREEN_VOID_DWELLERS_MACHINE_END$"
 START_SCREEN_VOID_DWELLERS_MACHINE_END: "\n\nการตกแต่งวัสดุของเรา แสดงให้เห็นว่าต้นแบบของเรา สร้างขึ้นบนดาวเคราะห์ แต่ธนาคารข้อมูลของเราให้คําตอบไม่ได้ เราคาดเดาได้แค่ว่า ร่างดาวเคราะห์ที่แตกละเอียด วงโคจรของสถานีเรา คือโลกของอารยธรรมของเรา\n\nไม่ว่าเหตุผลสําหรับ การดํารงอยู่ว่างเปล่าของเรา สิ่งประดิษฐ์ของ[GetStartingDrive]เปลี่ยนทุกอย่าง ตอนนี้เราพร้อมที่จะเอาชนะ ช่องว่างของตัวเอง"
