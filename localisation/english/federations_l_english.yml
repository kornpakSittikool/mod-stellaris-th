 FE_TO_SCION_GREETING_05:0 "โดยส่วนตัวแล้ว ฉันไม่เคยคาดหวังว่า อารยธรรมของคุณจะประสบความสําเร็จ มากเท่าที่มันมี"
 FE_TO_SCION_GREETING_06:0 "เห็นคุณที่นี่ตอนนี้ผมจําได้ว่าทําไมสายพันธุ์ของคุณได้รับเลือก"
 FE_TO_SCION_GREETING_07:0 "นานมากแล้วที่เราไม่เหมือนเจ้า เด็กน้อย สิ่ง เหล่า นั้น ง่าย กว่า และ ใน หลาย กรณี มี ความ สุข มาก กว่า. รักพวกเขาในขณะที่คุณสามารถ"
 FE_TO_SCION_GREETING_08: "สวัสดี... คุณ! ซึ่งผมหมายถึง[From.GetSpeciesNamePlural]แน่นอน ผมเกรงว่าคุณจะมาในเวลาที่ยุ่งมาก"
 SCION_TO_SCION_GREETING_01:0 "เจ้านายเช่นเรามากที่สุด เรารู้ว่ามันเป็นเรื่องจริง"
 SCION_TO_SCION_GREETING_02:0 "บางที่เราอาจจะสืบทอด เมืองหลวงของเจ้านายของเรา สักวันหนึ่ง ถ้าพวกเขาเลือกที่จะเกษียณจากกิจการ"
 SCION_TO_SCION_GREETING_03:0 "เจ้าต้องไม่สิ้นหวังกับความจริงที่ว่า นายทาสชอบพวกเรามากกว่าเจ้า เราทุกคนต่างก็มีที่ของตัวเอง ในแผนของพวกเขา"
 SCION_TO_SCION_GREETING_04:0 "ได้คุยกับอาจารย์หรือยัง พวกเขาพูดถึงเรารึเปล่า"
 SCION_TO_SCION_GREETING_05:0 "เรายอมรับบทบาทที่เจ้านายมอบให้เรา คุณล่ะ?"
 SCION_TO_SCION_GREETING_06:0 "สวัสดีเพื่อนเส้นพริ้วไหวดีใจที่ได้เจอคุณ"

 SCION_TO_EMPIRE_GREETING_01:0 "ก้มหัวให้เจ้านายของเรา พวกเขารู้ว่าอะไรดีที่สุดสําหรับ อารยธรรมหนุ่มสาวเช่นคุณและของผม"
 SCION_TO_EMPIRE_GREETING_02:0 "เจ้านายของเรามีแผนสําหรับพวกเราทุกคน ไม่เหมือนคุณ เรายอมรับบทบาทของเรา"
 SCION_TO_EMPIRE_GREETING_03:0 "เป็นเกียรติอย่างสูง ที่ได้รับใช้ในการแข่งขันครั้งนี้"
 SCION_TO_EMPIRE_GREETING_04:0 "บางทีวันหนึ่งเจ้าอาจจะได้รับเกียรติ ในการเข้าร่วมกับเรา ในฐานะข้ารับใช้ที่ถูกเลือก"
 SCION_TO_EMPIRE_GREETING_05:0 "คุณ รู้สึก หลง ผิด ไหม หาก ไม่ ได้ รับ การ ชี้ นํา จาก ผู้ ปกครอง ใน การ แข่งขัน?"
 SCION_TO_EMPIRE_GREETING_06:0 "เจ้านายของเราได้สอนเรามาก บาง ที ใน ที่ สุด พวก เขา จะ ให้ สติ ปัญญา แก่ คุณ ด้วย."

 fedel.2.name:0 "อา เร นา"
 fedel.2.desc:0 "ใกล้จะถึงเวลาตัดสินแล้วว่าใครจะเป็นผู้นํา[Root.GetAllianceName]สําหรับช่วงเวลาของลิมิตของเทอมต่อไป ดัง ที่ เคย ตก ลง กัน มา ก่อน จะ มี การ ตัดสิน เรื่อง นี้ ผ่าน การ สู้ รบ ใกล้ เคียง โดย ไม่ มี อาวุธ.\n\nผู้นําของแต่ละประเทศสมาชิก จะถูกนําไปยังสนามกีฬาขนาดใหญ่ใน[fed_leader.Capital.GetName]ใน[fed_leader.GetName]ผู้นําคนปัจจุบันของเรา มีในกรณีที่จะมีการออกอากาศข้าม[Root.GetAllianceName]พวกเขาจะเผชิญหน้ากัน ในการต่อสู้ไปสู่ความตาย จนกระทั่งเหลืออยู่เพียงหนึ่งเดียว"
 fedel.2.noleader.desc:0 "ใกล้จะถึงเวลาตัดสินแล้วว่าใครจะเป็นผู้นํา[Root.GetAllianceName]สําหรับช่วงเวลาของลิมิตของเทอมต่อไป ดัง ที่ เคย ตก ลง กัน มา ก่อน จะ มี การ ตัดสิน เรื่อง นี้ ผ่าน การ สู้ รบ ใกล้ เคียง โดย ไม่ มี อาวุธ.\n\nโชคไม่ดี ที่เป็นสํานักงาน[Root.GetRulerTitle]ตอนนี้ว่างอยู่ใน[Root.GetName]เราจะไม่สามารถเข้าร่วมได้"
 fedel.2.vassal.desc:0 "ใกล้จะถึงเวลาตัดสินแล้วว่าใครจะเป็นผู้นํา[Root.GetAllianceName]สําหรับช่วงเวลาของลิมิตของเทอมต่อไป ดัง ที่ เคย ตก ลง กัน มา ก่อน จะ มี การ ตัดสิน เรื่อง นี้ ผ่าน การ สู้ รบ ใกล้ เคียง โดย ไม่ มี อาวุธ.\n\nในฐานะ[Root.GetName]ไม่ได้เป็นรัฐอิสระ เราจะไม่สามารถเข้าร่วมได้ ในขณะที่เราไม่มีสิทธิ์เป็นผู้นําการบํารุงรักษา เราควรทําอย่างเต็มที่ เพื่อเปลี่ยนสถานะที่โชคร้ายนี้"
 fedel.2.gestalt.desc:0 "ใกล้จะถึงเวลาตัดสินแล้วว่าใครจะเป็นผู้นํา[Root.GetAllianceName]สําหรับช่วงเวลาของลิมิตของเทอมต่อไป ดัง ที่ เคย ตก ลง กัน มา ก่อน จะ มี การ ตัดสิน เรื่อง นี้ ผ่าน การ สู้ รบ ใกล้ เคียง โดย ไม่ มี อาวุธ.\n\nในฐานะ[Root.GetName]ไม่มีผู้นําคนเดียว เราจะเข้าร่วมไม่ได้ เราควรทําอย่างเต็มที่ เพื่อเปลี่ยนแปลงวิธีการนี้อย่างกว้างขวางและไม่เป็นธรรม ในการเลือกผู้นําในการบํารุงเลี้ยงของเรา"
 fedel.2.a:0 "ขอให้ผู้นําที่ดีที่สุดชนะ"
 fedel.2.b:0 "มาดูกันว่าผู้นําคนไหนรอด"
 arena_combat_begin:0 "การรบในสังเวียนจะเริ่มในไม่ช้า"

 fedel.10.name:0 "ชัย ชนะ ของ อา เร นา"
 fedel.10.intro:0 "[ruler.GetRulerTitle] [ruler.GetRegnalName]จะนําเข้าไปในสนาม[fed_leader.Capital.GetName]พร้อมกับผู้นําบุคคลอื่น ๆ ของประเทศสมาชิกต่าง ๆ ที่เป็น[Root.GetAllianceName]ไม่อนุญาตให้มีอาวุธหรือชุดเกราะ ผู้ นํา แต่ ละ คน สามารถ พึ่ง อาศัย เฉพาะ ความ สามารถ ทาง กาย และ อุบาย ของ พวก เขา ที่ จะ มอง ดู พวก เขา ผ่าน พ้น ไป ได้."
 fedel.10.1.desc:0 "$fedel.10.intro$\n\n$fedel.10.1$"
 fedel.10.1:0 "ทันทีที่การต่อสู้เริ่มขึ้น[ruler.GetRegnalName]หนี ไป ใน ทิศ ทาง ตรง กัน ข้าม และ ใช้ เวลา ส่วน ใหญ่ ใน การ วิ่ง หนี จาก คู่ ต่อ สู้ ด้วย ความ หวาด กลัว ใน ระดับ ต่าง ๆ กัน. น่าเหลือเชื่อ[ruler.GetSheHe]ชนะเพราะเป็นผู้อยู่รอดคนสุดท้าย[ruler.GetHerHis]การ ต่อ สู้ ครั้ง สุด ท้าย"
 fedel.10.2.desc:0 "$fedel.10.intro$\n\n$fedel.10.2$"
 fedel.10.2:0 "เมื่อการต่อสู้เริ่มขึ้น[ruler.GetRegnalName]เห็นได้ชัดเลยว่าสู้ไม่สงบ โชคยังดีที่ผู้นําคนอื่นๆ แย่ยิ่งกว่า ในการต่อสู้อย่างดุเดือด ที่ดูเหมือนจะคงอยู่ตลอดไป[ruler.GetSheHe] [ruler.GetIsAre]ในที่สุดนักสู้คนสุดท้ายก็รอดชีวิต เมื่อ มี การ ประกาศ เรื่อง นี้ ผู้ ชม ส่วน ใหญ่ ได้ ออก ไป จาก สนาม แล้ว."
 fedel.10.3.desc:0 "$fedel.10.intro$\n\n$fedel.10.3$"
 fedel.10.3:0 "การต่อสู้เป็นหนึ่งป่าเถื่อน แต่[ruler.GetRegnalName]พิสูจน์[ruler.GetHerHis]ขอ ให้ พิจารณา ตัว อย่าง หนึ่ง. เมื่อฝุ่นจับ[ruler.GetSheHe] [ruler.GetIsAre]มีเพียงคนเดียวที่ยังยืนอยู่"
 fedel.10.4.desc:0 "$fedel.10.intro$\n\n$fedel.10.4$"
 fedel.10.4:0 "การต่อสู้มันยาวนานและนองเลือด[ruler.GetRegnalName]บาดเจ็บสาหัสหลายครั้ง ถึงอย่างนั้นก็เถอะ[ruler.GetSheHe]พิสูจน์[ruler.GetSXX] [ruler.GetHerHis]จง เพียร อด ทน โดย ช่วย เหลือ ผู้ อื่น ทั้ง หมด. เมื่อการต่อสู้จบลง[ruler.GetSheHe] [ruler.GetIsAre]ผู้นําคนเดียวที่รอดชีวิต แม้เพียงนิดเดียว"
 fedel.10.5.desc:0 "$fedel.10.intro$\n\n$fedel.10.5$"
 fedel.10.5:0 "ขณะที่การต่อสู้ปะทุก็ปรากฏว่าไม่มีผู้นําคนอื่น ๆ ในสนามสามารถตรงกับทักษะและความสามารถที่แท้จริงของเรา[ruler.GetRulerTitle]พวกมันถูกส่งมาทีละตัว ด้วยความพยายามเพียงเล็กน้อย[ruler.GetRegnalName]ซากศพ"
 fedel.10.6.desc:0 "$fedel.10.intro$\n\n$fedel.10.6$"
 fedel.10.6:0 "[ruler.GetRegnalName]ทําให้การทํางานสั้นของคนโง่ยากจนที่ก้าวเข้าไปในเวทีด้วย[ruler.GetHerHim]เพียง แค่ มอง แวบ เดียว ก็ เห็น ร่าง ที่ ไร้ ชีวิต ของ ผู้ นํา คน อื่น ๆ ล้ม ลง ถึง ดิน. สังเวียนลงเงียบเป็น[ruler.GetRulerTitle]สร้าง[ruler.GetHerHis]ทางออก"
 fedel.10.7.desc:0 "$fedel.10.intro$\n\n$fedel.10.7$"
 fedel.10.7:0 "ผู้นําคนอื่น ๆ ในเวทีจะถูกเผาทันทีเป็น เพียงเป็นพิธี - การต่อสู้ที่แท้จริงเท่านั้นในวันนี้[ruler.GetRegnalName]ถึง[rival_chosen_leader.GetRulerTitle] [rival_chosen_leader.GetRegnalName]ของ[rival_chosen_country.GetName]หลังจากการแข่งขันระดับยักษ์[ruler.GetRegnalName]ประสบความสําเร็จในการพัฒนา[rival_chosen_leader.GetRegnalName]ส่วนมากของเวทีอยู่ในซากปรักหักพัง แต่เรื่องที่ได้รับการตัดสิน"
 fedel.10.8.desc:0 "$fedel.10.intro$\n\n$fedel.10.8$"
 fedel.10.8:0 "นี่คือการต่อสู้ที่แท้จริงของยักษ์ พลัง ของ ซิ นิก ที่ ใช้ ใน สนาม กีฬา นี้ อยู่ ใน ระดับ ที่ แทบ จะ ไม่ ได้ เห็น เลย ขอบ เขต ของ ช รู ด. เมื่อการต่อสู้สิ้นสุดลง สังเวียนอยู่ในซากปรักหักพังและ[ruler.GetRegnalName]เป็นคนเดียวที่รอดมาได้"
 fedel.10.9.desc:0 "$fedel.10.intro$\n\n$fedel.10.9$"
 fedel.10.9:0 "ความสามารถของไซโอนิคที่ทรงพลัง[ruler.GetRegnalName]ให้[ruler.GetHerHim]ผลประโยชน์ที่เด็ดเดี่ยวในสังเวียน หนึ่งที่[ruler.GetSheHe]ให้ไวๆ[ruler.GetSXX]มากที่สุด หลังจากทอดสมองและการใช้ Telekins เพื่อโยนผู้นําคนอื่น ๆ ในแต่ละอื่น ๆ ที่ความเร็วตาย การต่อสู้ที่ได้อย่างรวดเร็วมากกว่า"
 fedel.10.10.desc:0 "$fedel.10.intro$\n\n$fedel.10.10$"
 fedel.10.10:0 "ชุดชุดชุดขนาดใหญ่ของคอมไพล์อัพเกรดที่ติดตั้งไว้[ruler.GetRegnalName]พิสูจน์ความเด็ดเดี่ยวในสังเวียน การย้ายด้วยประสิทธิภาพทางเครื่องยนต์[ruler.GetSheHe]กําจัดอย่างรวดเร็ว[ruler.GetSXX]ผู้นําคนอื่น ๆ ในขณะที่การหักเหของหมัด ที่ได้พิสูจน์แล้วว่าร้ายแรง"
 fedel.10.11.desc:0 "$fedel.10.intro$\n\n$fedel.10.11$"
 fedel.10.11:0 "ทั้งความแข็งแกร่งและความยืดหยุ่นที่เหนือกว่า เมื่อเทียบกับอินทรีย์ส่วนใหญ่[ruler.GetRegnalName]เหนือกว่าในสนามรบ ผู้ นํา คน อื่น ๆ ถูก กําจัด ออก ไป ที ละ คน ด้วย วิธี ที่ มี ประสิทธิภาพ และ ค่อน ข้าง เจ็บ ปวด."
 fedel.10.a:0 "ชัยชนะเป็นของเรา"

 fedel.15.name:0 "ชัยชนะของอเรนา"
 fedel.15.1.desc:0 "$fedel.10.intro$\n\n$fedel.15.1$"
 fedel.15.1:0 "น่าเศร้า[ruler.GetRegnalName]ไม่ปรากฏให้เห็น ไม่นานหลังจากการแข่งขันเริ่มขึ้น[ruler.GetSheHe]แพ้[ruler.GetSXX] [ruler.GetHerHis]ความ ประหม่า และ ความ พยายาม ที่ จะ หนี ออก มา จาก สนาม ด้วย ความ ตื่น ตระหนก อย่าง บ้า คลั่ง ทํา ให้ ฝูง ชน ที่ จ้อง มอง จาก จุด ยืน นั้น ดู น่า หัวเราะ เยาะ มาก. เมื่อ[ruler.GetSheHe] [ruler.GetIsAre]ในที่สุดผู้นําคนอื่นๆก็ต้อนจนมุม[ruler.GetHerHis]จุดจบของมันรวดเร็วและไร้ความเมตตา"
 fedel.15.2.desc:0 "$fedel.10.intro$\n\n$fedel.15.2$\n\n$fedel.15.victor.desc$"
 fedel.15.2:0 "ด้วยเสียงร้องอย่างดุเดือด[ruler.GetRegnalName]หมุน & 90[ruler.GetHerselfHimself]เข้าสู่การประลองที่ป่าเถื่อน ออกฉายภายในสนามประลอง อนิจจา[ruler.GetHerHis]ความกล้าหาญที่เหนือกว่า[ruler.GetHerHis]ความสามารถในการต่อสู้ที่แท้จริง[ruler.GetSheHe] [ruler.GetIsAre]ส่งเกือบเป็นความคิดหลังโดยหนึ่งในผู้นําอื่น ๆ"
 fedel.15.3.desc:0 "$fedel.10.intro$\n\n$fedel.15.3$\n\n$fedel.15.victor.desc$"
 fedel.15.3:0 "ด้วยความลังเล[ruler.GetRegnalName]เข้าร่วมการต่อสู้ ไม่นานหลังจากการต่อสู้เริ่มต้น ขณะที่การประลองที่ป่าเถื่อน ดําเนินต่อไป[ruler.GetSheHe]ให้[ruler.GetSXX]เป็นบัญชีที่ดี[ruler.GetHerselfHimself]อย่างไรก็ตาม[ruler.GetSheHe]ยอมแพ้[ruler.GetSXX]ถึงบาดแผล[ruler.GetSheHe]ทุกข์ทรมานก่อนที่การต่อสู้จะถูกตัดสิน"
 fedel.15.4.desc:0 "$fedel.10.intro$\n\n$fedel.15.4$\n\n$fedel.15.victor.desc$"
 fedel.15.4:0 "[ruler.GetRegnalName]รีบวิ่งเข้าสู่สมรภูมิทันทีและเร็ว ๆ นี้ได้จัดตั้ง[ruler.GetHerselfHimself]เป็นหนึ่งในคู่แข่งที่น่ากลัว บางทีเพราะเรื่องนี้ ผู้นําคนอื่น ๆ บางส่วนขึ้น[ruler.GetHerHim]ความพยายามรวมของพวกเขาพิสูจน์มากเกินไป และทั้ง ๆ ที่[ruler.GetHerHis]ความพยายามที่กล้าหาญ[ruler.GetRegnalName]อีกไม่ช้าจะสูญสิ้น[ruler.GetHerHis]แผล"
 fedel.15.5.desc:0 "$fedel.10.intro$\n\n$fedel.15.5$\n\n$fedel.15.victor.desc$"
 fedel.15.5:0 "ด้วยสายตาเพียงพริบตาเดียว[winning_leader.GetRegnalName].[winning_leader.GetRulerTitle]ของ[winning_country.GetName]ผู้นําคนอื่น ๆ ในเวทีรวมทั้ง[ruler.GetRegnalName]วางตายลงบนพื้น บางทีนี่อาจเป็นความคิดที่แย่"
 fedel.15.6.desc:0 "$fedel.10.intro$\n\n$fedel.15.6$\n\n$fedel.15.victor.desc$"
 fedel.15.6:0 "ในฐานะที่เป็นพลังงานไซโอนิคที่น่ากลัวของบางส่วนของความขัดแย้งที่ เป็นผู้นําอื่น ๆ ทั้งหมดรวมทั้ง[ruler.GetRegnalName]เป็นเถ้าถ่าน มันเป็นมากกว่าความเสียหายในการต่อสู้ของยักษ์"
 fedel.15.7.desc:0 "$fedel.10.intro$\n\n$fedel.15.7$\n\n$fedel.15.victor.desc$"
 fedel.15.7:0 "มีสิ่งมีชีวิตน้อยในกาแล็กซี่นี้ ที่สามารถจับคู่พลังงานไซโอนิคของ[ruler.GetRegnalName]แต่อนิจจา[winning_leader.GetRulerTitle] [winning_leader.GetRegnalName]ของ[winning_country.GetName]เป็นหนึ่งในพวกนั้น หลัง จาก ผู้ นํา คน อื่น ๆ ใน สนาม กีฬา ถูก ทิ้ง เป็น แมลง ที่ ไม่ สําคัญ แล้ว การ สู้ รบ แท้ ก็ เริ่ม ขึ้น. สังเวียนในเร็ว ๆ นี้จะกลายเป็นเส้นทแยงของพลังงานไซโอนิค แต่เมื่อมันขยาย[ruler.GetRegnalName]ซากศพ..."
 fedel.15.8.desc:0 "$fedel.10.intro$\n\n$fedel.15.8$\n\n$fedel.15.victor.desc$"
 fedel.15.8:0 "นี่คือการต่อสู้ที่แท้จริงของยักษ์ พลัง ของ ซิ นิก ที่ ใช้ ใน สนาม กีฬา นี้ อยู่ ใน ระดับ ที่ แทบ จะ ไม่ ได้ เห็น เลย ขอบ เขต ของ ช รู ด. เมื่อการต่อสู้สิ้นสุดลง สังเวียนก็ถูกทําลาย สิ่งมีชีวิตเดียวที่เหลืออยู่ และไม่ใช่[ruler.GetRegnalName]..."
 fedel.15.9.desc:0 "$fedel.10.intro$\n\n$fedel.15.9$\n\n$fedel.15.victor.desc$"
 fedel.15.9:0 "ความแข็งแกร่งและการตอบสนองที่เหนือกว่า[ruler.GetRegnalName]น่าเศร้าไม่พอ ที่จะรับประกันชัยชนะในสังเวียน ไม่นาน ผู้เข้าแข่งขันคนอื่น ๆ ก็ใช้[ruler.GetHerHis]ส่วนประกอบที่ถูกตัดเป็นสโมสรกับ[ruler.GetHerHis]ความจําของตัวเอง เหลือเพียงเศษซากที่กระจัดกระจายอยู่ เมื่อการต่อสู้สิ้นสุดลง"
 fedel.15.10.desc.organic: "$fedel.10.intro$\n\n$fedel.15.10.organic$\n\n$fedel.15.victor.desc$"
 fedel.15.10.desc.machine: "$fedel.10.intro$\n\n$fedel.15.10.machine$\n\n$fedel.15.victor.desc$"
 fedel.15.10.intro: "พลังอํานาจของไซโซนิค[ruler.GetRegnalName]ให้[ruler.GetHerHim]ผลประโยชน์ที่สําคัญ แต่การต่อสู้ความวุ่นวายในเวที ทําให้ยากที่จะรักษาสมาธิ แต่น่าเสียดายที่สิ่งนี้ปรากฎว่า[ruler.GetHerHis]เลิกทําเมื่อผู้นําคนอื่นโจมตี[ruler.GetHerHim]จากด้านหลัง"
 fedel.15.10.organic: "$fedel.15.10.intro$จุดจบของมันรวดเร็ว แต่แน่นอนว่าไม่เจ็บปวด"
 fedel.15.10.machine: "$fedel.15.10.intro$การทําลายของพวกเขาสิ้นสุดลง ก่อนที่จะดําเนินการ"
 fedel.15.a.organic: "วันเศร้า"
 fedel.15.a.machine: "ผลที่โชคร้าย"

