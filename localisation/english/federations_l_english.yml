 trait_void_dweller_2_desc:1 "§Lเครื่องจักรเหล่านี้เติบโตใน ถิ่นอาศัยของออร์บิทัล ถูกโปรแกรมด้วยอัลกอริทึม เพื่อนําทางอย่างมีประสิทธิภาพ อย่าง ไร ก็ ตาม การ ก่อ สร้าง ที่ ดี ที่ สุด ของ พวก เขา ไม่ เหมาะ กับ สภาพ แวด ล้อม ของ ดาว เคราะห์.§!"
