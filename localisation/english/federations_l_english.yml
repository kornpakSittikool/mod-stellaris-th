 resolution_mutualdefense_military_readiness_act_tooltip:1 "สมาชิก[global_event_country.GetGalCommunityOrGalImperium]ที่ไม่ได้เป็นบริวารของจักรวรรดิอื่น ที่มีกองกำลังยานรบน้อยกว่าครึ่งหนึ่งของความจุ §Rละเมิดกฎหมายกาแล็กติก§!"

 resolution_mutualdefense_enemy_of_my_enemy:0 "ศัตรูของศัตรู"
 resolution_mutualdefense_enemy_of_my_enemy_desc:0 "ศัตรูของฝ่ายหนึ่งคือศัตรูทั้งหมด ถ้าหมายเลขหนึ่งของเราถูกโจมตี เราไม่ควรอนุญาตให้หมายเลขของเราลงโทษผู้กระทําความผิดหรือ"
 resolution_mutualdefense_enemy_of_my_enemy_tooltip:1 "สามารถใช้เหตุผลทำสงคราม §Y'โต้กลับ'§! กับจักรวรรดิที่ไม่ใช่สมาชิกของ[global_event_country.GetGalCommunityOrGalImperium]ที่ทำสงครามรุกรานสมาชิก[global_event_country.GetGalCommunityOrGalImperium]"

 resolution_mutualdefense_castigation_proclamation:0 "ประกาศการลงโทษ"
 resolution_mutualdefense_castigation_proclamation_desc:0 "ผู้ที่ไม่ได้อยู่กับเราคือคนต่อต้านเราและทุกคนที่ต่อต้านกฎหมายกาแล็กติกจะต้องถูกลงโทษ"
 resolution_mutualdefense_castigation_proclamation_tooltip:1 "จักรวรรดิใน[global_event_country.GetGalCommunityOrGalImperium]สามารถเสนอมติเพื่อ §Yประณาม§! จักรวรรดิที่ §Rฝ่าฝืนกฎหมายกาแล็กติก§! หรือประณามจักรวรรดิที่ไม่ใช่สมาชิกของ[global_event_country.GetGalCommunityOrGalImperium]ก็ได้\n\nเหตุผลทำสงคราม §Y'เป็นปรปักษ์/เกลียดชัง'§! และเป้าหมายของสงคราม §Y'ทำให้อับอาย'§! ที่ถูกใช้โดยจักรวรรดิที่มีนโยบาย §Yสงครามที่ไม่จำกัด§! กับจักรวรรดิอื่นจะถูก §Rประณาม§! โดย[global_event_country.GetGalCommunityOrGalImperium] หรือ §Rละเมิดกฎหมายกาแล็กติก§!"
 resolution_mutualdefense_castigation_denouncement:0 "การลงโทษ"
 resolution_mutualdefense_castigation_denouncement_desc:1 "การประกาศอย่างเป็นทางการ ทําให้จักรวรรดิเป้าหมายเสื่อมถอย ข้อเสนอนี้สามารถกําหนดเป้าหมายของจักรวรรดิใด ๆ ที่ไม่ได้เป็นสมาชิกของ[global_event_country.GetGalCommunityOrGalImperium]หรืออยู่ในการละเมิดกฎหมายกาแล็กติก"

 resolution_mutualdefense_renegade_containment:0 "หลักการควบคุมผู้ทรยศ"
 resolution_mutualdefense_renegade_containment_desc:1 "ผลประโยชน์ของการเป็นสมาชิก[global_event_country.GetGalCommunityOrGalImperium]เห็นได้ชัดในตัวเอง และเช่นการปฏิเสธที่จะเป็นสมาชิก เห็นได้ชัดเจตนาไม่ดี สมาชิกควรจะได้รับอนุญาตให้ล้างการกระทําใด ๆ ที่ไม่เป็นมิตรด้วยแรง ก่อนที่คนที่ไม่ได้เป็นสมาชิกจะดําเนินการในแผนการของพวกเขา"
 resolution_mutualdefense_renegade_containment_tooltip:1 "สามารถใช้เหตุผลทำสงคราม §Y'ชิงทำสงครามก่อน'§! กับจักรวรรดิที่ไม่ใช่สมาชิกของ[global_event_country.GetGalCommunityOrGalImperium] ด้วยนโยบาย §Yสงครามที่ไม่จำกัด§!"

 # Rules of War

 resolution_category_rulesofwar:0 "กฎแห่งสงคราม"

 resolution_rulesofwar_repeal_1:0 "§Rยกเลิก $resolution_rulesofwar_guardian_angels$§!"
 resolution_rulesofwar_repeal_1_desc:0 "อาจจะพูดถูก การ พยายาม ซ่อน ความ สยดสยอง ของ สงคราม โดย วาง ข้อ จํากัด ไว้ นั้น เป็น เพียง การ โกหก ตัว เอง. เราควรจะยกเลิกกฎหมายเหล่านี้และแก้มัดมือของเรา ถ้าภัยคุกคามที่แท้จริงปรากฏขึ้น"
