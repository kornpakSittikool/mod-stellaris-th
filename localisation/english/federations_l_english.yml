 resolution_galacticreforms_abolish_council_tooltip:0 "สภากาแล็กติกยุติการมีอยู่"
 resolution_galacticreforms_form_council:0 "ก่อตั้งสภาปกครองกาแล็กติก"
 resolution_galacticreforms_form_council_desc:0 "ประชาคมกาแล็กติกควรมีสภาผู้นำเพื่อช่วยรักษาความสงบเรียบร้อย"
 resolution_galacticreforms_form_council_tooltip:0 "ก่อตั้ง §Yสภาปกครองกาแล็กติก§! ที่มีสามสมาชิก\n\nสภามีอำนาจในการผลักดัน §Yมาตรการฉุกเฉิน§!, เสนอ §Yมติคว่ำบาตร§! และ §Yประณาม§!"

 resolution_galacticreforms_disable_council_veto:0 "§Rยกเลิกอำนาจยับยั้งของสมาชิกสภา§!"
 resolution_galacticreforms_disable_council_veto_desc:0 "แนวคิดของสภาเวโต้เป็นเรื่องเข้าใจผิด ทําไม ความ ปรารถนา ของ ชุมชน จึง ควร เงียบ เสียง? เอาออกเดี๋ยวนี้!"
