 fedel.510.3.desc:0 "เป็น[GetPsychicNounPlural]จากฝั่งตรงข้าม[Root.GetAllianceName]หมายถึงการรวมตัวกัน[fed_leader.Capital.GetName]สถานการณ์ที่ไม่คาดฝันเกิดขึ้น กลับกลายเป็นว่า เราเป็นสมาชิกเพียงคนเดียว ที่สามารถรวบรวมได้มากพอ[GetPsychicNounPlural]เพื่อเข้าร่วม\n\nหากไม่มีใครสู้ ชัยชนะจะตกเป็นของเรา"
 fedel.510.1.organic: "ในฐานะ[GetPsychicNounPlural]รวมกันสําหรับการต่อสู้ ความรู้สึกของความกลัว[fed_leader.Capital.GetName]มีรายงานเกี่ยวกับพายุฝนอย่างฉับพลันและรุนแรง เงาที่ไม่ควรจะมี และความวุ่นวายของโซนิคที่อธิบายไม่ได้"
 fedel.510.1.machine: "ในฐานะ[GetPsychicNounPlural]รวมกันสําหรับการต่อสู้, ความไม่แน่นอนซึม[fed_leader.Capital.GetName]มีรายงานเกี่ยวกับพายุฝนอย่างฉับพลันและรุนแรง เงาที่ไม่ควรจะมี และความวุ่นวายของโซนิคที่อธิบายไม่ได้"
 fedel.510.2:0 "การต่อสู้เริ่มต้นขึ้น เป็น การ ต่อ สู้ อย่าง ผิด ปกติ แม้ แต่ โดย ไม่ มี ทีม ใด เต็ม ใจ ยอม แพ้. ท้ายที่สุด มันกลายเป็นการทดสอบของความแข็งแรง ที่ช่วงเวลาของการไม่ไว้วางใจ สามารถส่งผลให้นิรันดร์ของการขับไล่ใน§Hเดอะชราวด์§!ของเรา[GetPsychicNounPlural]พิสูจน์วินัยที่สุด อย่างที่เรารู้ ชัยชนะเป็นของเรา"
 fedel.510.3:0 "การต่อสู้เริ่มต้นขึ้น ไม่มีทีมไหนพิสูจน์ ว่าตรงกับพวกเรา หนึ่งโดยหนึ่งพวกเขาถูกตามล่าลงและริบของสารปิโอนิคของพวกเขาซึ่งถูกเลี้ยงเข้าไปในหิว§Hเดอะชราวด์§!แค่เปลือกหอยที่ไม่ตอบสนองเท่านั้น ชัยชนะเป็นของเรา"
 fedel.510.a:0 "วันนี้โชคลาภมอบให้เรา"

