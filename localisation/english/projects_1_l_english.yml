l_english:

 ####################################
 # Special Research Projects
 ####################################

 MIGRATING_FORESTS_1_PROJECT:0 "ศึกษาป่าเคลื่อนย้าย"
 MIGRATING_FORESTS_1_PROJECT_DESC:0 "นักวิทยาศาสตร์ของเราหลายคนหวังว่าจะหาทางออกที่ไม่ต้องทำลายผืนป่าเหล่านี้ได้ หากทำการศึกษาพืชต่างดาวชนิดนี้ต่อไป"
 MIGRATING_FORESTS_2_PROJECT:0 "เผาป่าเคลื่อนย้าย"
 MIGRATING_FORESTS_2_PROJECT_DESC:0 "เราไม่อาจยอมให้ป่าเหล่านี้คงอยู่ได้ ต้องมีการดำเนินการชำระล้างพวกมันออกจากพื้นผิวของ [Root.GetPlanetMoon]"
 SEISMIC_DISTURBANCE_1_PROJECT:0 "สถาปนาการสื่อสาร"
 SEISMIC_DISTURBANCE_1_PROJECT_DESC:2 "เราต้องหาวิธีบางอย่างในการสื่อสารกับเหล่าต่างดาว [Root.Owner.GetSubMantleLower] บางทีเราอาจหาหนทางอยู่ร่วมกับอารยธรรมของพวกมันได้"
 SEISMIC_DISTURBANCE_2_PROJECT:0 "โจมตีก่อน"
 SEISMIC_DISTURBANCE_2_PROJECT_DESC:0 "เหล่าต่างดาวที่กำลังขุดขึ้นมาสู่พื้นผิวเป็นภัยคุกคามที่ต้องจัดการ เราจะเปิดฉากโจมตีก่อนใส่เมืองใต้ดินของพวกมัน"
 SEISMIC_DISTURBANCE_3_PROJECT:0 "ทำลายอารยธรรมใต้ดิน"
 SEISMIC_DISTURBANCE_3_PROJECT_DESC:0 "อารยธรรมต่างดาวใต้ดินบน [From.From.GetName] เป็นภัยคุกคามชัดเจนต่ออาณานิคมของเราและต้องถูกทำลาย เราต้องหาวิธีโจมตีเมืองของพวกมันที่อยู่ใต้ดิน"
 UNDERGROUND_VAULT_PROJECT:0 "เปิดห้องนิรภัยใต้ดิน"
 UNDERGROUND_VAULT_PROJECT_DESC:0 "เราได้ค้นพบห้องนิรภัยใต้ดินขนาดใหญ่บน [From.GetName] นักวิทยาศาสตร์ของเรากำลังหาวิธีเปิดประตูเสริมกำลังของห้องนิรภัย เพื่อที่เราจะได้เรียนรู้ว่ามีอะไรอยู่ข้างใน"
 NUCLEAR_BOMB_PROJECT:0 "ปลดชนวนระเบิดนิวเคลียร์"
 NUCLEAR_BOMB_PROJECT_DESC:0 "ระเบิดไฮโดรเจนที่ถูกทิ้งร้างลูกหนึ่งถูกผู้ตั้งอาณานิคมของเราบน [From.GetName] เปิดใช้งานโดยไม่ตั้งใจ เราต้องปลดชนวนมันก่อนเวลาจะหมด!"
 GAS_GIANT_BODIES_PROJECT:0 "วิเคราะห์ซากสิ่งมีชีวิตอวกาศ"
 GAS_GIANT_BODIES_PROJECT_DESC:0 "เราพบซากศพของสิ่งมีชีวิตขนาดใหญ่หลายตัวลอยอยู่ในวงโคจรรอบดาวยักษ์แก๊ส [From.GetName] นักวิทยาศาสตร์ของเราต้องการศึกษาพวกมันอย่างใกล้ชิดยิ่งขึ้นเพื่อระบุที่มาของพวกมัน"
 SEA_EXPEDITION_PROJECT:0 "จัดคณะสำรวจทะเลลึก"
 SEA_EXPEDITION_PROJECT_DESC:0 "มีมหาสมุทรขนาดใหญ่ซ่อนอยู่ใต้ชั้นน้ำแข็งของ [From.GetName] นักวิทยาศาสตร์ของเราต้องการจัดคณะสำรวจไปศึกษารูปแบบชีวิตอันเป็นเอกลักษณ์ของสภาพแวดล้อมนี้"
 GIGANTIC_SKELETON_PROJECT:0 "ตรวจสอบโครงกระดูกยักษ์"
 GIGANTIC_SKELETON_PROJECT_DESC:1 "โครงกระดูกยักษ์ที่มีอายุย้อนไปมากกว่าสามพันล้านปีถูกพบบนพื้นผิวอันไร้ชีวิตของ [From.GetName] เหล่า [Root.Owner.GetScientistPlural] ของเรากระตือรือร้นที่จะไขปริศนานี้ให้ถึงที่สุด"
 GIGANTIC_SKELETON_RESURRECTION_PROJECT:0 "ชุบชีวิตโครงกระดูกยักษ์"
 GIGANTIC_SKELETON_RESURRECTION_PROJECT_DESC:0 "โครงกระดูกยักษ์ที่มีอายุย้อนไปมากกว่าสามพันล้านปีถูกพบบนพื้นผิวอันไร้ชีวิตของ [From.GetName] เหล่าเนโครแมนเซอร์ของเราจะได้นำศิลปะของตนมาใช้"
 BATTLE_WRECKAGE_PROJECT:0 "จัดคณะสำรวจสุสานยาน"
 BATTLE_WRECKAGE_PROJECT_DESC:0 "เราได้สะดุดเข้ากับสุสานยานอวกาศบนพื้นผิวของ [From.GetName] ซึ่งเป็นผลจากการสู้รบครั้งมหึมาที่เกิดขึ้นในวงโคจรใกล้เคียงเมื่อหลายพันปีก่อน มีการเสนอให้จัดคณะสำรวจทางวิทยาศาสตร์ไปศึกษาซากโบราณเหล่านี้และดูว่าจะกู้สิ่งใดกลับมาได้บ้าง"
 ROCK_FACE_PROJECT:0 "วิเคราะห์หน้าผาหิน"
 ROCK_FACE_PROJECT_DESC:0 "บนพื้นผิวของ [From.GetName] เราพบชั้นหินก่อรูปที่ดูคล้ายใบหน้าของชาว [Root.Owner.GetSpeciesName] อย่างยิ่ง เราต้องพิจารณาว่านี่เป็นเพียงเรื่องบังเอิญหรือมีอะไรมากกว่านั้น"
 TRANSLATE_MURAL_PROJECT:0 "แปลภาพจิตรกรรมฝาผนังต่างดาว"
 TRANSLATE_MURAL_PROJECT_DESC:0 "มีการค้นพบภาพจิตรกรรมฝาผนังโบราณที่ปกคลุมด้วยตัวอักษรต่างดาวบน [From.GetName] หากทุ่มทรัพยากรอย่างเหมาะสม เราน่าจะสามารถแปลข้อความเหล่านั้นได้"
 MUTANT_SURVIVORS_PROJECT:0 "สืบสวนพวกกลายพันธุ์"
 MUTANT_SURVIVORS_PROJECT_DESC:0 "มีผู้พบเห็นร่างที่กลายพันธุ์บน [From.GetName] - อาจเป็นลูกหลานของผู้อยู่อาศัยดั้งเดิมของ [From.GetPlanetMoon] เราต้องเรียนรู้เกี่ยวกับพวกมันให้มากขึ้นเพื่อดูว่าเรากำลังเผชิญกับอะไร"
 UNDERGROUND_FACILITY_PROJECT:0 "ตรวจสอบสถานที่ใต้ดิน"
 UNDERGROUND_FACILITY_PROJECT_DESC:0 "สถานที่ใต้ดินขนาดใหญ่ใต้หนึ่งในเมืองต่างดาวร้างบน [From.GetName] กำลังปล่อยเสียงสะท้อนพลังงานประหลาดออกมา เราต้องหาว่าอะไรเป็นต้นเหตุ"
 GHOSTLY_SIGHTINGS_PROJECT:0 "ตรวจสอบการพบเห็นวิญญาณ"
 GHOSTLY_SIGHTINGS_PROJECT_DESC:0 "ผู้ตั้งอาณานิคมบน [From.GetName] พบเห็นภาพปรากฏคล้ายวิญญาณใกล้เมืองต่างดาวร้างบน [From.GetPlanetMoon] บ่อยครั้งจนน่าตกใจ นักวิทยาศาสตร์ของเรากระตือรือร้นที่จะตรวจสอบธรรมชาติของปรากฏการณ์นี้"
 AUTOMATED_SHIPYARD_PROJECT:0 "ซ่อมอู่ต่อยานอัตโนมัติ"
 AUTOMATED_SHIPYARD_PROJECT_DESC:0 "ซากของอู่ต่อยานอัตโนมัติเก่าถูกพบลอยอยู่ในวงโคจรรอบ [From.GetName] วิศวกรของเราเชื่อว่าพวกเขาสามารถฟื้นฟูพลังงานให้แก่สายการผลิตเพียงแห่งเดียวของอู่ต่อยานที่ยังรอดอยู่ได้"
 GAS_GIANT_SHIP_PROJECT:0 "กู้ซากยานจากดาวยักษ์แก๊ส"
 GAS_GIANT_SHIP_PROJECT_DESC:0 "พบยานร้างลำหนึ่งลึกลงไปในชั้นบรรยากาศของดาวยักษ์แก๊ส [From.GetName] นักวิทยาศาสตร์และวิศวกรของเราบางส่วนได้เสนอแผนงานเพื่อยกยานลำนี้ขึ้นสู่ชั้นบรรยากาศตอนบนและกู้ซากมัน"
 GAS_GIANT_SIGNAL:0 "แยกสัญญาณ"
 GAS_GIANT_SIGNAL_DESC:0 "เราตรวจพบสัญญาณอ่อนๆ ที่มาจากภายในของดาวยักษ์แก๊ส [From.GetName] มันอาจเป็นการส่งสัญญาณบางชนิด แต่เรายังไม่สามารถแยกสัญญาณนั้นออกมาได้"
 GAS_GIANT_RELOCATION:0 "ย้ายถิ่นฐาน Dathnak"
 GAS_GIANT_RELOCATION_DESC:0 "เราได้ตกลงขนย้ายชาว Dathnak จากดาวบ้านเกิดที่กำลังจะถึงกาลอวสาน ไปยังดาวยักษ์แก๊ส [baldarak_planet.GetName] ซึ่งพวกเขาจะสร้างบ้านใหม่ เวลามีจำกัด"
 GAS_GIANT_COLONY:0 "ก่อตั้งอาณานิคม Dathnak"
 GAS_GIANT_COLONY_DESC:0 "ชาว Dathnak ต้องการก่อตั้งอาณานิคมใหม่บน [NewBaldarak.GetName] ดาวยักษ์แก๊สที่มีบรรยากาศเหมาะสมต่อสรีรวิทยาของพวกเขา เราได้ตกลงช่วยเหลือพวกเขาในความพยายามนี้"
 GAS_GIANT_LOST_CONTACT:0 "ตรวจสอบนิวบัลดารัก"
 GAS_GIANT_LOST_CONTACT_DESC:0 "ทางการ Dathnak บนบัลดารากขาดการติดต่อกับอาณานิคมของพวกเขาบนนิว บัล ดา รา คและพวกเขาหวั่นเกรงสิ่งเลวร้ายที่สุด เราได้ตกลงที่จะไปตรวจสอบดาวดวงนั้น"
 GAS_GIANT_REVOLT:0 "แทรกซึมหน่วยคอมมานโด"
 GAS_GIANT_REVOLT_DESC:0 "นักปฏิวัติ Dathnak บนนิว บัล ดา รา คได้ขอให้เราขนส่งหนึ่งในหน่วยคอมมานโดของพวกเขาไปยังบัลดารากที่ซึ่งพวกเขาจะพยายามจุดชนวนการก่อจลาจลบางรูปแบบ"
 GAS_GIANT_OCCUPATION:0 "ส่งกำลังรบยกพลขึ้นบก"
 GAS_GIANT_OCCUPATION_DESC:0 "รัฐบาล Dathnak บนบัลดารากมุ่งมั่นที่จะฟื้นการควบคุมเหนืออาณานิคมกบฏของพวกเขาบนนิว บัล ดา รา คเราได้ตกลงที่จะขนส่งกำลังรบไปยังดาวดวงนั้น"
 GAS_GIANT_LOST_CHABKY:0 "พาสับปะรดกลับบ้าน"
 GAS_GIANT_LOST_CHABKY_DESC:0 "ผู้ตั้งอาณานิคม Dathnak ชื่อสับปะรดดูเหมือนจะคิดถึงบ้านและต้องการกลับไปยังบัลดารากเราจึงจำต้องตกลงจัดการเรื่องนี้ให้โดยไม่เต็มใจนัก"
 ABANDONED_TERRAFORMING_1_PROJECT:0 "เดินกระบวนการต่อ"
 ABANDONED_TERRAFORMING_1_PROJECT_DESC:0 "[From.GetName] เคยถูกดัดแปลงดาวบางส่วนเมื่อหลายพันปีก่อนโดยหน่วยงานที่ไม่ทราบชื่อ อุปกรณ์ดัดแปลงดาวยังคงพบบน [From.GetPlanetMoon] และนักวิทยาศาสตร์ของเรากำลังหาวิธีเดินกระบวนการต่อ"
 ABANDONED_TERRAFORMING_2_PROJECT:0 "รื้ออุปกรณ์"
 ABANDONED_TERRAFORMING_2_PROJECT_DESC:0 "แม้จะเก่าแก่ แต่อุปกรณ์ดัดแปลงดาวที่ถูกทิ้งร้างบน [From.GetName] ก็ดูจะล้ำหน้ามาก วิศวกรของเราบางส่วนได้ขออนุญาตรื้อและวิเคราะห์อุปกรณ์ดังกล่าว เพื่อดูว่าจะเรียนรู้อะไรได้จากเทคโนโลยีของมัน"
 MUTANT_STALKER_PROJECT:0 "สังหารสิ่งมีชีวิตอาละวาด"
 MUTANT_STALKER_PROJECT_DESC:0 "สิ่งมีชีวิตกลายพันธุ์ตัวหนึ่งกำลังก่อความหวาดกลัวแก่ประชากรในอาณานิคมของเราบน [From.GetName] มีผู้เสียชีวิตไปมาก และผู้ตั้งอาณานิคมกำลังร้องขอความช่วยเหลือในการตามล่าและกำจัดมัน"
 ORBITAL_DEBRIS_PROJECT:0 "กำจัดเศษซากวงโคจร"
 ORBITAL_DEBRIS_PROJECT_DESC:0 "อวกาศในวงโคจรรอบ [Root.GetName] เต็มไปด้วยเศษซากที่กำลังรบกวนการพัฒนาอาณานิคมบน [Root.GetPlanetMoon] การทำแผนที่สนามเศษซากอันกว้างใหญ่จะต้องอาศัยเซนเซอร์อันทรงพลังของยานวิทยาศาสตร์"
 TERMINAL_ORBIT_PROJECT:0 "สังเกตการณ์การพุ่งชนของดวงจันทร์"
 TERMINAL_ORBIT_PROJECT_DESC:0 "หนึ่งในดวงจันทร์ที่โคจรรอบ [From.GetName] จะพุ่งชนพื้นผิวของดาวยักษ์แก๊สในไม่ช้า เหตุการณ์ที่หายากอย่างยิ่งนี้ควรถูกบันทึกไว้ให้คนรุ่นหลัง"
 VULTAUM_ARCHEOLOGY_1:0 "ฐานทำเหมือง"
 VULTAUM_ARCHEOLOGY_1_DESC:0 "หลุมอุกกาบาตบน [From.GetName] เคยเป็นที่ตั้งของฐานทำเหมือง Vultaum โบราณ จะมีการจัดตั้งแหล่งขุดค้นทางโบราณคดีใกล้เคียงเพื่อค้นหาสิ่งที่ยังมีประโยชน์ในซากปรักหักพัง"
 VULTAUM_ARCHEOLOGY_2:0 "หอดูดาว"
 VULTAUM_ARCHEOLOGY_2_DESC:0 "ครั้งหนึ่งเคยมีหอดูดาว Vultaum บน [From.GetName] ซึ่งเป็น [From.GetPlanetMoon] ที่อยู่ห่างจากจักรวรรดิโบราณของพวกมันพอสมควร นักโบราณคดีกระตือรือร้นที่จะศึกษาซากร้างเหล่านี้"
 VULTAUM_ARCHEOLOGY_3:0 "ลิฟต์อวกาศ"
 VULTAUM_ARCHEOLOGY_3_DESC:0 "ลิฟต์อวกาศ Vultaum ที่พังถล่มสามารถพบได้ใกล้เส้นศูนย์สูตรบน [From.GetName] ย่อมต้องมีวัตถุโบราณมากมายให้ค้นพบแน่ หากมีการตั้งแหล่งขุดค้นทางโบราณคดีบนพื้นผิวของ [From.GetPlanetMoon]"
 VULTAUM_ARCHEOLOGY_4:0 "มหานคร"
 VULTAUM_ARCHEOLOGY_4_DESC:0 "กลุ่มหลุมอุกกาบาตขนาดใหญ่บน [From.GetName] เคยเป็นมหานครสำคัญของ Vultaum จำเป็นต้องมีแหล่งขุดค้นทางโบราณคดีเพื่อขุดหาวัตถุโบราณที่อาจยังหลงเหลือ"
 VULTAUM_ARCHEOLOGY_5:0 "เครือข่ายอุโมงค์"
 VULTAUM_ARCHEOLOGY_5_DESC:0 "ครั้งหนึ่งเคยมีเครือข่ายอุโมงค์มหึมาบน [From.GetName] ซึ่งรองรับอาณานิคม Vultaum ขนาดใหญ่ก่อนการล่มสลาย จำเป็นต้องมีแหล่งขุดค้นทางโบราณคดีเพื่อขุดซากเหล่านี้"
 VULTAUM_ARCHEOLOGY_6:0 "สถานีทำเหมืองก๊าซ"
 VULTAUM_ARCHEOLOGY_6_DESC:0 "ซากบางส่วนของสถานีทำเหมืองก๊าซ Vultaum ยังคงโคจรรอบ [From.GetName] สิ่งปลูกสร้างร้างแห่งนี้เคยถูกปล้นไปก่อนแล้ว แต่เหล่านักโบราณคดีของเรามั่นใจว่ายังมีสิ่งค้นพบอีกมาก"
 VULTAUM_ARCHEOLOGY_7:0 "จุดค้าขาย"
 VULTAUM_ARCHEOLOGY_7_DESC:0 "ครั้งหนึ่งเคยมีจุดค้าขายของ Vultaum อยู่บน [From.GetName] ซากร้างที่ถูกทิ้งไว้จำเป็นต้องถูกขุดค้นอย่างเหมาะสม แต่นักโบราณคดีของเรารับรองว่ามันคุ้มค่ากับความพยายาม"
 VULTAUM_ARCHEOLOGY_8:0 "ดาวเทียม"
 VULTAUM_ARCHEOLOGY_8_DESC:0 "มีการพบดาวเทียม Vultaum โบราณโดยบังเอิญในวงโคจรของ [From.GetName] ชุดเครื่องส่งสัญญาณของมันถูกกู้มาแล้ว และวิศวกรข้อมูลของเราก็กระวนกระวายที่จะวิเคราะห์อุปกรณ์นี้"
 VULTAUM_ARCHEOLOGY_9:0 "อาณานิคมแตกแขนง"
 VULTAUM_ARCHEOLOGY_9_DESC:0 "เราได้ค้นพบสิ่งที่ดูเหมือนจะเป็นซากของอาณานิคมแตกแขนงของ Vultaum บน [From.GetName] เมื่อจัดตั้งแหล่งขุดค้นแล้ว นักโบราณคดีของเราจะสามารถเริ่มขุดซากเพื่อหาวัตถุโบราณล้ำค่าได้"
 VULTAUM_ARCHEOLOGY_10:0 "คอมเพล็กซ์วงโคจร"
 VULTAUM_ARCHEOLOGY_10_DESC:0 "โครงโลหะของคอมเพล็กซ์วงโคจร Vultaum ขนาดมหึมาถูกพบบนท้องฟ้าเหนือ [From.GetName] จุดประสงค์ของมันดูเหมือนจะเป็นการวิจัยความจริงเสมือน แต่จำเป็นต้องมีการสำรวจทางโบราณคดีอย่างเหมาะสมหากเราต้องการเรียนรู้เพิ่มเติม"
 VULTAUM_ARCHEOLOGY_11:0 "ฐานบนดาวเคราะห์น้อย"
 VULTAUM_ARCHEOLOGY_11_DESC:0 "หลุมอุกกาบาตขนาดมหึมาคือทั้งหมดที่เหลืออยู่ของฐานทำเหมือง Vultaum โบราณบนดาวเคราะห์น้อย [From.GetName] อย่างไรก็ตาม การสแกนเบื้องต้นชี้ว่าอุโมงค์เหมืองบางส่วนของพวกมันอาจยังรอดอยู่"
 VULTAUM_HOMEWORLD_PROJECT:0 "วูลทอมาร์"
 VULTAUM_HOMEWORLD_PROJECT_DESC:0 "ตอนนี้เรามีพิกัดของระบบบ้านเกิด Vultaum แล้ว"
 YUHT_ARCHEOLOGY_1:0 "โลกฟักไข่"
 YUHT_ARCHEOLOGY_1_DESC:0 "[From.GetName] ถูกระบุว่าเคยเป็นโลกฟักไข่ของยี้ที่ซึ่งลูกอ่อนของพวกมันถูกปล่อยให้เติบโตอย่างช้าๆ ด้วยตนเอง การขุดค้นทางโบราณคดีบนโลกนี้ย่อมต้องให้ซากดึกดำบรรพ์อันมีค่า"
 YUHT_ARCHEOLOGY_2:0 "ชุดอาร์เรย์รับฟัง"
 YUHT_ARCHEOLOGY_2_DESC:0 "ชุดอาร์เรย์รับฟังขนาดมหึมาหลายชุดถูกสร้างขึ้นบนโลกนี้โดยชาวยี้เมื่อหลายล้านปีก่อน แม้มันจะหยุดทำงานไปนานแล้ว แต่การขุดค้นทางโบราณคดีรอบบริเวณนี้อาจให้ผลค้นพบสำคัญ"
 YUHT_ARCHEOLOGY_3:0 "ซากพิพิธภัณฑ์"
 YUHT_ARCHEOLOGY_3_DESC:0 "มีการค้นพบพิพิธภัณฑ์ยี้โบราณที่อุทิศให้กับ “ของปลอมจากต่างดาว” บน [From.GetName] ครั้งหนึ่งมันเคยจัดแสดงวัตถุที่อ้างว่าเป็นของต่างดาวหลายสิบชิ้น และนักโบราณคดีของเราต้องการศึกษาชิ้นส่วนน้อยที่ยังเหลืออยู่"
 YUHT_ARCHEOLOGY_4:0 "สุสานโบราณ"
 YUHT_ARCHEOLOGY_4_DESC:0 "[From.GetName] เคยเป็นที่ตั้งของอาณานิคมยี้ที่รุ่งเรือง และเราได้ระบุสิ่งที่ดูเหมือนจะเป็นสุสานขนาดมหึมาในภูมิภาคอันโดดเดี่ยวของ [From.GetPlanetMoon] มันอาจคุ้มค่าที่จะตั้งแหล่งขุดค้นทางโบราณคดีที่นั่น"
 YUHT_ARCHEOLOGY_5:0 "สมรภูมิโบราณ"
 YUHT_ARCHEOLOGY_5_DESC:0 "เมื่อหลายล้านปีก่อน [From.GetName] เคยเป็นฉากของสงครามภาคพื้นดินอันทำลายล้างระหว่างชาวยี้กับอีกหนึ่งเผ่าพันธุ์ นักโบราณคดีของเราต้องการกวาดค้นสมรภูมิโบราณเพื่อหาวัตถุโบราณล้ำค่า"
 YUHT_ARCHEOLOGY_6:0 "ดาวเทียมโบราณ"
 YUHT_ARCHEOLOGY_6_DESC:0 "ชาวยี้ได้วางดาวเทียมไว้ในวงโคจรของ [From.GetName] เพื่อรำลึกถึงครั้งแรกที่พวกเขาได้พบกับสิ่งมีชีวิตต่างดาวผู้มีสติปัญญา นักโบราณคดีกลุ่มหนึ่งได้ร้องขอทรัพยากรเพื่อวิเคราะห์มันอย่างเต็มรูปแบบ"
 YUHT_ARCHEOLOGY_7:0 "เรือลาดตระเวนร้าง"
 YUHT_ARCHEOLOGY_7_DESC:0 "เรือลาดตระเวนยี้ร้างลำหนึ่งดูเหมือนจะถูกทิ้งไว้ในวงโคจรของ [From.GetName] หลังการสู้รบ นักโบราณคดีของเราต้องการขึ้นไปวิเคราะห์สิ่งที่ยังเหลืออยู่ของยานโบราณลำนี้"
 YUHT_ARCHEOLOGY_8:0 "ยานอาณานิคมร้าง"
 YUHT_ARCHEOLOGY_8_DESC:0 "ซากของสิ่งที่ดูเหมือนจะเป็นยานอาณานิคมของยี้ถูกค้นพบในวงโคจรของ [From.GetName] การวิเคราะห์ยานลำนี้โดยทีมนักโบราณคดีอาจให้ผลค้นพบที่น่าสนใจ"
 YUHT_ARCHEOLOGY_9:0 "ที่อยู่อาศัยบนดาวเคราะห์น้อย"
 YUHT_ARCHEOLOGY_9_DESC:0 "ดาวเคราะห์น้อย [From.GetName] ดูเหมือนจะเป็นที่เก็บซากที่อยู่อาศัยของยี้โบราณ จำเป็นต้องจัดทีมภาคสนามและส่งไปสำรวจโพรงของดาวเคราะห์น้อยเพื่อเรียนรู้เพิ่มเติมเกี่ยวกับมัน"
 YUHT_HOMEWORLD_PROJECT:0 "ยูห์ทาน"
 YUHT_HOMEWORLD_PROJECT_DESC:0 "ในที่สุดก็พบโลกบ้านเกิดโบราณของชาวยี้แล้ว"
 FIRST_LEAGUE_ARCHEOLOGY_1:0 "ฐานทัพเรือ"
 FIRST_LEAGUE_ARCHEOLOGY_1_DESC:0 "มีการระบุตำแหน่งซากของฐานทัพเรือลีกแรกเหนือ [From.GetName] เศษซากบางส่วนดูมั่นคงพอที่จะรองรับภารกิจทางโบราณคดีได้"
 FIRST_LEAGUE_ARCHEOLOGY_2:0 "เรือลาดตระเวนร้าง"
 FIRST_LEAGUE_ARCHEOLOGY_2_DESC:0 "เราตรวจพบสิ่งที่ดูเหมือนส่วนหัวเรือของเรือลาดตระเวนลีกแรกเก่าลอยอยู่ในวงโคจรของ [From.GetName] จำเป็นต้องมีหน่วยขึ้นยานไปศึกษาซากเหล่านี้ หากเราต้องการรู้เพิ่มเติม"
 FIRST_LEAGUE_ARCHEOLOGY_3:0 "โลกบ้านเกิดของกามาได"
 FIRST_LEAGUE_ARCHEOLOGY_3_DESC:0 "[From.GetName] ดูเหมือนจะเป็นโลกบ้านเกิดของกามาไดที่สูญพันธุ์ไปแล้ว หนึ่งในสมาชิกผู้ก่อตั้งของลีกแรกโบราณ [From.GetPlanetMoon] ปกคลุมไปด้วยซากปรักหักพังที่พร้อมให้ขุดค้น"
 FIRST_LEAGUE_ARCHEOLOGY_4:0 "โลกบ้านเกิดของชาซาโก"
 FIRST_LEAGUE_ARCHEOLOGY_4_DESC:0 "เราได้ระบุว่า [From.GetName] คือโลกบ้านเกิดโบราณของชาซาโกเผ่าพันธุ์คล้ายงู หนึ่งในสมาชิกผู้ก่อตั้งลีกแรกยังมีซากเมืองใต้ดินของพวกมันหลงเหลืออยู่บนพื้นผิวของ [From.GetPlanetMoon]"
 FIRST_LEAGUE_ARCHEOLOGY_5:0 "โลกบ้านเกิดของมิเกร์- ยัน"
 FIRST_LEAGUE_ARCHEOLOGY_5_DESC:1 "เมื่อสองล้านปีก่อน ชาวมิเกร์- ยันเป็นหนึ่งในสมาชิกผู้ก่อตั้งลีกแรกและเราเชื่อว่า [From.GetName] คือโลกบ้านเกิดของพวกมัน แม้เวลาจะผ่านไปนานเพียงนี้ แต่ยังมีอาร์โคโลยีสูงตระหง่านของพวกมันเหลืออยู่ไม่กี่แห่ง"
 FIRST_LEAGUE_ARCHEOLOGY_6:0 "โลกบ้านเกิดของ V'ropak"
 FIRST_LEAGUE_ARCHEOLOGY_6_DESC:0 "ชาว V'ropak โบราณเป็นสมาชิกผู้ก่อตั้งลีกแรกและหลักฐานชี้ว่า [From.GetName] คือโลกบ้านเกิดของพวกมัน สิ่งมีชีวิตคล้ายนกเหล่านี้สร้างมหานครใหญ่ไว้ในที่ราบยอดตัดกลวง และนักโบราณคดีของเราต้องการอนุญาตให้ไปตรวจสอบซากของพวกมัน"
 FIRST_LEAGUE_ARCHEOLOGY_7:0 "ฐานวิจัย"
 FIRST_LEAGUE_ARCHEOLOGY_7_DESC:0 "สามารถพบซากสิ่งปลูกสร้างภาคพื้นดินขนาดใหญ่บนพื้นผิวของ [From.GetName] เราเชื่อว่าอาคารเหล่านี้เคยเป็นส่วนหนึ่งของฐานวิจัยสำคัญที่สร้างโดยลีกแรกโบราณ แต่จำเป็นต้องศึกษาซากเหล่านี้อย่างใกล้ชิดกว่านี้เพื่อยืนยัน"
 FIRST_LEAGUE_ARCHEOLOGY_8:0 "ซากอาณานิคม"
 FIRST_LEAGUE_ARCHEOLOGY_8_DESC:0 "ลีกแรกเคยตั้งอาณานิคมบน [From.GetName] ในช่วงหนึ่ง โดยส่งผู้ตั้งถิ่นฐานจากทุกเผ่าพันธุ์สมาชิกมารวมกัน ดูเหมือนว่าอาณานิคมจะล้มเหลว แต่เราจะต้องขุดค้นซากเพื่อหาสาเหตุ"
 FIRST_LEAGUE_ARCHEOLOGY_9:0 "ศูนย์กลางการค้า"
 FIRST_LEAGUE_ARCHEOLOGY_9_DESC:0 "[From.GetName] เคยเป็นศูนย์กลางการค้าสำคัญของลีกแรกโบราณ [From.GetPlanetMoon] มีความเป็นเมืองสูงมาก และยังมีซากมากมายให้นักโบราณคดีของเราศึกษา"
 FIRST_LEAGUE_ARCHEOLOGY_10:0 "ซากจากการสู้รบ"
 FIRST_LEAGUE_ARCHEOLOGY_10_DESC:0 "การรบของกองยานขนาดมหึมาที่เกี่ยวข้องกับลีกแรกเกิดขึ้นใกล้ [From.GetName] เมื่อสองล้านปีก่อน เศษซากบางส่วนตกลงสู่พื้นผิวของ [From.GetPlanetMoon] และนักโบราณคดีของเราเสนอให้ตั้งค่ายฐานใกล้บริเวณนั้น"
 FIRST_LEAGUE_ARCHEOLOGY_11:0 "ทัณฑนิคม (อาณานิคมคุก)"
 FIRST_LEAGUE_ARCHEOLOGY_11_DESC:0 "[From.GetPlanetMoon] อันเป็นปรปักษ์ของ [From.GetName] เคยทำหน้าที่เป็นทัณฑนิคมของลีกแรกโบราณ และสิ่งปลูกสร้างเรือนจำบางส่วนอาจถูกขุดค้นได้ หากเราจัดตั้งแหล่งขุดค้นทางโบราณคดี"
 FIRST_LEAGUE_ARCHEOLOGY_12:0 "สถานีสังเกตการณ์"
 FIRST_LEAGUE_ARCHEOLOGY_12_DESC:0 "[From.GetName] เคยเป็นโลกบ้านเกิดของอารยธรรมยุคสำริดตอนต้นที่ดูเหมือนจะเคยถูกลีกแรกเฝ้าสังเกตการณ์ มีการระบุแหล่งขุดค้นที่มีแนวโน้มดีไว้แล้วหลายแห่ง"
 FIRST_LEAGUE_ARCHEOLOGY_13:0 "การปิดล้อมวงโคจร"
 FIRST_LEAGUE_ARCHEOLOGY_13_DESC:0 "[From.GetName] เคยเป็นโลกบ้านเกิดของเผ่าพันธุ์ที่ไม่ทราบชื่อ ซึ่งดูเหมือนเคยตกเป็นเป้าของการปิดล้อมวงโคจรโดยยานของลีกแรกภารกิจทางโบราณคดีน่าจะเปิดเผยข้อมูลเพิ่มเติมได้"
 FIRST_LEAGUE_ARCHEOLOGY_14:0 "ดาวเคราะห์น้อยของผู้ลักลอบ"
 FIRST_LEAGUE_ARCHEOLOGY_14_DESC:0 "ดาวเคราะห์น้อย [From.GetName] ดูเหมือนเคยถูกใช้เป็นท่าเรือลับโดยผู้ลักลอบค้า โจรสลัด และองค์ประกอบอาชญากรรมอื่นๆ ภายในลีกแรกเราควรกวาดค้นภายในของดาวเคราะห์น้อยนี้เพื่อหาวัตถุโบราณของลีกแรก"
 FIRST_LEAGUE_HOMEWORLD_PROJECT:0 "เฟน ฮับบานิส"
 FIRST_LEAGUE_HOMEWORLD_PROJECT_DESC:0 "ระบบเฟน ฮับบานิสเคยเป็นศูนย์กลางทางการเมือง การบริหาร และเศรษฐกิจของลีกแรกโบราณ"
 IRASSIAN_ARCHEOLOGY_1:0 "การปิดล้อมวงโคจร"
 IRASSIAN_ARCHEOLOGY_1_DESC:0 "อาณานิคมอิหร่านบน [From.GetName] ล่มสลายต่อพ็อกซ์จาโวเรียนแต่มีหลักฐานว่า [From.GetPlanetMoon] ถูกปิดล้อมก่อนหน้านั้นไม่นาน หากต้องการรู้มากกว่านี้ เราจะต้องตรวจสอบเศษซากในวงโคจรอย่างใกล้ชิด"
 IRASSIAN_ARCHEOLOGY_2:0 "อาณานิคมที่ถูกทิ้งระเบิด"
 IRASSIAN_ARCHEOLOGY_2_DESC:0 "[From.GetName] ถูกทิ้งระเบิดจากวงโคจรอย่างหนักเมื่อ 1.2 ล้านปีก่อน แต่ก่อนหน้านั้น [From.GetPlanetMoon] เคยเป็นอาณานิคมอิหร่านที่รุ่งเรือง บางทีคณะสำรวจทางโบราณคดีอาจเรียนรู้อะไรเพิ่มเติมได้"
 IRASSIAN_ARCHEOLOGY_3:0 "โลกบ้านเกิดของอักกรา"
 IRASSIAN_ARCHEOLOGY_3_DESC:0 "ชาวอักกรารูปแบบคล้ายมอลลัสคอยด์มีต้นกำเนิดบน [From.GetName] ซึ่งเป็นเผ่าพันธุ์ลูกค้าภายใต้การกดขี่ของคองคอร์ดเรารู้เรื่องพวกมันน้อยมาก แต่บางทีการสำรวจทางโบราณคดีอาจช่วยเติมเต็มช่องว่างนี้ได้"
 IRASSIAN_ARCHEOLOGY_4:0 "โลกบ้านเกิดของเดอะชราวด์"
 IRASSIAN_ARCHEOLOGY_4_DESC:0 "[From.GetName] เคยเป็นโลกบ้านเกิดโบราณของเดอะชราวด์แต่ต้องเผชิญการทิ้งระเบิดจากวงโคจรอย่างทั่วถึงเมื่อ 1.2 ล้านปีก่อน เราทราบว่าเดอะชราวด์เป็นหนึ่งในเผ่าพันธุ์ลูกค้าหลายเผ่าของอิหร่านแต่สิ่งที่กระตุ้นให้เกิดการทิ้งระเบิดครั้งนั้นยังคงเป็นปริศนา"
 IRASSIAN_ARCHEOLOGY_5:0 "ซากอาณานิคม"
 IRASSIAN_ARCHEOLOGY_5_DESC:0 "สิ่งที่เหลืออยู่ของอาณานิคมอิหร่านบน [From.GetName] มีเพียงซากปรักหักพังและซากดึกดำบรรพ์ ดูเหมือนมันจะเป็นเหยื่ออีกรายของพ็อกซ์จาโวเรียนแต่บางทีภารกิจทางโบราณคดีอาจช่วยเผยชะตากรรมของอาณานิคมนี้ให้ชัดขึ้นได้"
 IRASSIAN_ARCHEOLOGY_6:0 "ฐานทำเหมือง"
 IRASSIAN_ARCHEOLOGY_6_DESC:0 "หลุมเจาะลึกบน [From.GetName] บ่งชี้ว่าครั้งหนึ่งเคยมีฐานทำเหมืองอิหร่านอยู่ที่นี่ นักโบราณคดีของเราต้องการตรวจสอบมันเพิ่มเติม"
 IRASSIAN_ARCHEOLOGY_7:0 "ซากอาณานิคม"
 IRASSIAN_ARCHEOLOGY_7_DESC:0 "[From.GetName] เป็นหนึ่งในเหยื่อรายแรกๆ ของพ็อกซ์จาโวเรียนและนักโบราณคดีของเราต้องการศึกษาซากอาณานิคมอิหร่านเพื่อหาเบาะแสเกี่ยวกับต้นกำเนิดของโรค"
 IRASSIAN_ARCHEOLOGY_8:0 "เรือลาดตระเวนร้าง"
 IRASSIAN_ARCHEOLOGY_8_DESC:0 "เราได้พบเรือลาดตระเวนอิหร่านร้างลอยอยู่ในวงโคจรของ [From.GetName] ทีมนักโบราณคดีพร้อมแล้วที่จะขึ้นไปยังยานลำนี้"
 IRASSIAN_ARCHEOLOGY_9:0 "สถานีวงโคจร"
 IRASSIAN_ARCHEOLOGY_9_DESC:0 "พบซากสถานีวงโคจรอิหร่านที่แตกสลายอยู่เหนือ [From.GetName] ดูเหมือนมันจะเคยเป็นสำนักงานใหญ่ของหน่วยควบคุมโรคของพวกมัน แต่หากต้องการเรียนรู้มากกว่านี้ เราจำเป็นต้องทำการค้นหาอย่างกว้างขวางในสนามเศษซาก"
 IRASSIAN_ARCHEOLOGY_10:0 "สถานีรับฟังบนดาวเคราะห์น้อย"
 IRASSIAN_ARCHEOLOGY_10_DESC:0 "มีการค้นพบสถานีรับฟังทางทหารที่ถูกทิ้งร้างบนดาวเคราะห์น้อย [From.GetName] เราเชื่อว่ามันอาจถูกสร้างขึ้นโดยคองคอร์ดโบราณ"
 IRASSIAN_ARCHEOLOGY_11:0 "สถานีวิจัยดาวยักษ์แก๊ส"
 IRASSIAN_ARCHEOLOGY_11_DESC:0 "พบเศษซากในวงโคจรจากสถานีวิจัยอิหร่านโบราณอยู่เหนือ [From.GetName] ดูเหมือนว่าชาวอิหร่านจะเคยศึกษาดาวยักษ์แก๊สดวงนี้ด้วยเหตุผลบางอย่าง"
 IRASSIAN_HOMEWORLD_PROJECT:0 "อิรัส"
 IRASSIAN_HOMEWORLD_PROJECT_DESC:0 "ระบบอิรัสคือหัวใจของคองคอร์ดโบราณ"
 CYBREX_ARCHEOLOGY_1:0 "โลกบ้านเกิดของคูร์"
 CYBREX_ARCHEOLOGY_1_DESC:0 "[From.GetName] อดีตโลกบ้านเกิดของคูร์เป็นเหยื่ออีกรายของไซเบรกซ์ที่ออกอาละวาด สิ่งที่เหลืออยู่ของอารยธรรมคูร์มีเพียงซากที่กำลังพังทลายไม่กี่แห่ง แต่ก็ควรได้รับการตรวจสอบ"
 CYBREX_ARCHEOLOGY_2:0 "โลกบ้านเกิดของอินดิมัค"
 CYBREX_ARCHEOLOGY_2_DESC:0 "[From.GetName] เคยเป็นโลกบ้านเกิดของอารยธรรมอินดิมัคโบราณ ก่อนที่สงครามรูปแบบของจิตสำนึกเครื่องจักรไซเบรกซ์จะบุกลงมาทิ้งไว้เพียงความพินาศ อาจมีการค้นพบทางโบราณคดีที่สำคัญที่นี่"
 CYBREX_ARCHEOLOGY_3:0 "สงครามรูปแบบไซเบรกซ์ที่พังเสียหาย"
 CYBREX_ARCHEOLOGY_3_DESC:0 "มีการพบสงครามรูปแบบไซเบรกซ์ที่พังเสียหายสองหน่วยในวงโคจรรอบ [From.GetName] ควรตรวจสอบพวกมันอย่างใกล้ชิดยิ่งขึ้น"
 CYBREX_ARCHEOLOGY_4:0 "การรุกรานของไซเบรกซ์"
 CYBREX_ARCHEOLOGY_4_DESC:0 "สงครามภาคพื้นดินขนาดมหึมาเคยเกิดขึ้นบน [From.GetName] เมื่อนานมาแล้ว ตอนที่ไซเบรกซ์บุกโจมตีเจ้าของดั้งเดิมของ [From.GetPlanetMoon] สมรภูมิโบราณแห่งนี้ควรถูกค้นหาเพื่อหาวัตถุโบราณ"
 CYBREX_ARCHEOLOGY_5:0 "ซากไซเบรกซ์"
 CYBREX_ARCHEOLOGY_5_DESC:0 "[From.GetName] เคยได้รับการพัฒนาอย่างหนักโดยไซเบรกซ์แต่ด้วยเหตุผลที่ไม่ชัดเจน พวกมันกลับปล่อยพื้นที่สี่เหลี่ยมขนาดใหญ่ใกล้เส้นศูนย์สูตรไว้แทบไม่แตะต้อง นักโบราณคดีของเราควรตรวจสอบสาเหตุ"
 CYBREX_ARCHEOLOGY_6:0 "สถานีรับฟังของไซเบรกซ์"
 CYBREX_ARCHEOLOGY_6_DESC:0 "ดาวเคราะห์น้อย [From.GetName] แท้จริงแล้วไม่ใช่ดาวเคราะห์น้อย แต่เป็นวัตถุที่ถูกสร้างขึ้นเทียมโดยไซเบรกซ์มันเคยทำหน้าที่เป็นสถานีรับฟังที่ซ่อนเร้นของพวกมันเมื่อราว 600,000 ปีก่อน"
 CYBREX_ARCHEOLOGY_7:0 "โรงกลั่นของไซเบรกซ์"
 CYBREX_ARCHEOLOGY_7_DESC:0 "เศษซากจากคอมเพล็กซ์โรงกลั่นไซเบรกซ์ขนาดใหญ่ลอยอยู่ในวงโคจรเหนือ [From.GetName] ดูเหมือนว่าเครื่องจักรเหล่านั้นจะเคยทำปฏิบัติการเหมืองบางอย่างที่นี่"
 CYBREX_ARCHEOLOGY_8:0 "เศษซากจากการรบ"
 CYBREX_ARCHEOLOGY_8_DESC:0 "การรบในอวกาศขนาดมหึมาอย่างแท้จริงเกิดขึ้นใกล้ [From.GetName] เมื่อ 600,000 ปีก่อน โดยมีกองยานอย่างน้อยห้ากองเข้าร่วม หนึ่งในกองยานเหล่านั้นเป็นของไซเบรกซ์"
 CYBREX_ARCHEOLOGY_9:0 "ฐานไซเบรกซ์โบราณ"
 CYBREX_ARCHEOLOGY_9_DESC:0 "ครั้งหนึ่งเคยมีฐานไซเบรกซ์ขนาดใหญ่อยู่บนพื้นผิวของ [From.GetName] จนกระทั่งมันถูกลดเหลือเพียงหลุมอุกกาบาต เราควรตรวจสอบว่าเกิดอะไรขึ้น"
 CYBREX_ARCHEOLOGY_10:0 "ซากสิ่งมีชีวิตอินทรีย์"
 CYBREX_ARCHEOLOGY_10_DESC:0 "พบศพของชาวต่างดาวเกือบหนึ่งพันรายอยู่ในวงโคจรเหนือ [From.GetName] พวกมันดูเหมือนจะตายในช่วงเวลาเดียวกับที่ไซเบรกซ์ควบคุมพื้นที่ส่วนนี้ของกาแล็กซี"
 CYBREX_ARCHEOLOGY_11:0 "สถานีวิจัยของไซเบรกซ์"
 CYBREX_ARCHEOLOGY_11_DESC:0 "มีการพบโมดูลจากสถานีวิจัยของไซเบรกซ์โคจรรอบ [From.GetName] โดยภายในบรรจุซากของสิ่งมีชีวิตไซเบอร์เนติกบางชนิด"
 CYBREX_HOMEWORLD_PROJECT:0 "ไซเบร็กซ์ อัลฟา"
 CYBREX_HOMEWORLD_PROJECT_DESC:0 "ดูเหมือนว่าไซเบรกซ์จะล่าถอยไปยังระบบดาวนี้"


 TARBLAC_PROCUREMENT:0 "ตลับหมึกผู้ยากจะตามตัว"
 TARBLAC_PROCUREMENT_DESC:0 "ตลับหมึกพบได้ลึกลงไปใต้คลื่นของโลกมหาสมุทร [This.GetName]"
 TASSARGOID_PROCUREMENT:0 "ทัสซากอดผู้ยิ่งใหญ่"
 TASSARGOID_PROCUREMENT_DESC:0 "มีผู้พบเห็นทัสซากอดในป่าดงดิบชื้นแฉะของ [This.GetName]"
 ORINTHI_PROCUREMENT:0 "โอรินตีผู้ชั่วร้าย"
 ORINTHI_PROCUREMENT_DESC:0 "มีรายงานพบโอรินตีจำนวนมากทั่วเกือบทั้งหมดของ [This.GetName]"
 SNIRAN_PROCUREMENT:0 "ภาษาสไนรานจอมลอบเร้น"
 SNIRAN_PROCUREMENT_DESC:0 "ภาษาสไนรานเป็นสิ่งมีชีวิตเฉพาะถิ่นของทะเลเนินทรายอันกว้างใหญ่บน [This.GetName]"
 GOOLANTHA_PROCUREMENT:0 "กูลันธาผู้เปลี่ยนแปลงได้"
 GOOLANTHA_PROCUREMENT_DESC:0 "ฝูงกูลันธาพบได้เฉพาะบนทุ่งหญ้ากว้างเปิดโล่งของ [This.GetName]"
 UDDLORAN_PROCUREMENT:0 "ภาษายูดลอรานเจ้าเล่ห์"
 UDDLORAN_PROCUREMENT_DESC:0 "สามารถพบภาษายูดลอรานวิ่งแข่งผ่านแดนหิมะรกร้างของ [This.GetName]"
 ZULCOR_PROCUREMENT:0 "โซลคอร์ผู้ตะกละ"
 ZULCOR_PROCUREMENT_DESC:0 "ฝูงโซลคอร์เป็นสิ่งมีชีวิตประจำถิ่นของหุบผาแห้งแล้งบน [This.GetName]"
 SUBLIGHT_PROBE_PROJECT:0 "กู้ยานสำรวจ"
 SUBLIGHT_PROBE_PROJECT_DESC:0 "เราได้พบยานสำรวจอวกาศความเร็วต่ำเก่าลำหนึ่งของเราในระบบ [space_probe.GetStarName] มันต้องถูกกู้คืนโดยเร็วที่สุด"
 BOARD_CULT_SHIP_1:0 "ขึ้นยานลัทธิ"
 BOARD_CULT_SHIP_1_DESC:0 "ยานลัทธิหนึ่งลำถูกกองกำลังของเราทำให้ใช้การไม่ได้แล้ว เราควรดำเนินปฏิบัติการขึ้นยานเพื่อจับเชลยและยึดทรัพย์สินด้านข่าวกรองที่เราพบ"
 BOARD_CULT_SHIP_2:0 "ขึ้นเรือธงลัทธิ"
 BOARD_CULT_SHIP_2_DESC:0 "เราได้ทำให้เรือธงของลัทธิใช้การไม่ได้แล้ว! จำเป็นต้องใช้กำลังทหารจำนวนมากพอสมควรเพื่อขึ้นยานและยึดมันมาให้สำเร็จ"
 CULTIST_DEBRIS:0 "เศษซากเรือรบของลัทธิ"
 CULTIST_DEBRIS_DESC:0 "ลัทธินี้กำลังพัฒนาอาวุธรูปแบบใหม่บางอย่าง และร่องรอยไปยังฐานปฏิบัติการของพวกมันก็มาสิ้นสุดลงที่นี่ หากเราตรวจสอบเทคโนโลยีของพวกมัน เราอาจพอพบเบาะแสเกี่ยวกับที่อยู่ของผู้นำพวกมัน"
 SMUGGLER_RAID_PROJECT:0 "บุกฐานลักลอบค้า"
 SMUGGLER_RAID_PROJECT_DESC:0 "พวกลักลอบค้าได้ตั้งฐานผิดกฎหมายบนพื้นผิวของ [From.GetName] ซึ่งเป็นโลกเขตคุ้มครองดึกดำบรรพ์ภายใต้การคุ้มครองของเรา พวกมันต้องถูกกำจัดก่อนจะสร้างความเสียหายถาวรต่ออารยธรรมพื้นเมืองของ [From.GetPlanetMoon]"
 ROGUE_BOMBARDMENT_PROJECT:0 "กำจัดสายลับนอกคอก"
 ROGUE_BOMBARDMENT_PROJECT_DESC:0 "เจ้าหน้าที่แทรกซึมลับนอกคอกของเราบน [From.GetName] ในที่สุดก็ถูกตามรอยไปถึงบ้านพักลับในย่านชานเมืองใหญ่แห่งหนึ่ง เราต้องการทรัพยากรกองยานในวงโคจรเพื่อทิ้งระเบิดตำแหน่งของเขาจากอวกาศ"
 AVERT_PRIMITIVE_WAR_PROJECT:1 "ยับยั้งสงครามบน [prelude_to_war_planet.GetName]"
 AVERT_PRIMITIVE_WAR_PROJECT_DESC:1 "เนื่องจากเหตุการณ์ที่เกี่ยวข้องกับโครงการแทรกซึมลับของเราบน [prelude_to_war_planet.GetName] ชาว [prelude_to_war_country.GetSpeciesNamePlural] จึงถูกผลักไปจนถึงขอบเหวของสงครามนิวเคลียร์ เซลล์แทรกซึมของเราบน [prelude_to_war_planet.GetPlanetMoon] ต้องการยานวิทยาศาสตร์ในวงโคจรเพื่อทำให้สถานการณ์สงบลง"
 FALLEN_SHIELD_PROJECT:0 "ลดโล่ของ [shielded_planet.GetName]"
 FALLEN_SHIELD_PROJECT_DESC:1 "ด้วยเหตุผลที่ไม่ทราบ บางคนหรือบางสิ่งได้ห่อหุ้ม [shielded_planet.GetName] ไว้ในโล่พลังงานที่ไม่อาจทะลวงได้ ระดับพลังงานของมันกำลังผันผวน ซึ่งบ่งชี้ว่าโล่นี้ทำงานมานานหลายพันปีแล้ว เราต้องหาวิธีทำให้สิ่งกีดขวางนี้เป็นโมฆะ และค้นหาว่ามีอะไรอยู่เบื้องล่าง!"
 BOARD_HYACINTH:0 "ขึ้นยานมุม:"
 BOARD_HYACINTH_DESC:0 "ตรวจพบมุม:อยู่เหนือ [hyacinth_planet.GetName] และดูเหมือนโครงสร้างของมันยังสมบูรณ์ เราจะต้องจัดตั้งหน่วยขึ้นยานเพื่อเรียนรู้ว่าเกิดอะไรขึ้นกับยานอาร์กลำนี้"
 SYNTH_INFILTRATION_PROJECT:0 "วิธีตรวจจับซินธ์"
 SYNTH_INFILTRATION_PROJECT_DESC:0 "ผู้แทรกซึมสังเคราะห์ที่ปลอมตัวเป็นชาว [Root.GetSpeciesNamePlural] กำลังปฏิบัติการอยู่ภายใน [Root.GetName] เราต้องคิดค้นวิธีที่น่าเชื่อถือและมีประสิทธิภาพในการระบุตัวพวกมัน"
 CAPTURE_QUEEN:0 "จับราชินี"
 CAPTURE_QUEEN_DESC:0 "หลังจากการรบในอวกาศเมื่อไม่นานมานี้ในระบบ [queen_system.GetName] ราชินีเบื้องต้นตัวหนึ่งได้รับบาดเจ็บสาหัสและถูกฝูงต้อการที่เหลือทิ้งให้ตาย อย่างไรก็ตาม สิ่งมีชีวิตตัวนี้ยังมีชีวิตอยู่ การจับมันมาได้จะเป็นชัยชนะด้านข่าวกรองครั้งใหญ่"

 ESTABLISH_COMMUNICATIONS:0 "ตรวจสอบ [Prev.From.GetName]"
