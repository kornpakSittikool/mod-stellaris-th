 PROJECT_TEMPEST_BREWING_DESC: "ระบบพายุครั้งหนึ่งในชีวิตบน [Owner.Capital.GetName] นี้มีคุณสมบัติพิเศษที่ทำให้เหมาะสำหรับการปรับแต่ง แต่ก่อนอื่น เราจำเป็นต้องเข้าใจองค์ประกอบพื้นฐานของมันให้ดียิ่งขึ้น ใครจะรู้ว่าเราจะสร้างความแปลกประหลาดอันยอดเยี่ยมอะไรขึ้นมา?"

# Events
 cstorms.3100.name: "พายุถล่ม"
 cstorms.3100.desc: "พายุที่เกิดขึ้นตามธรรมชาติบน §Y[owner.capital_scope.GetName]§! ได้แสดงให้เราเห็นถึงพลังอันน่าเกรงขามของธรรมชาติ - ทั้งความรุนแรงอันน่าตื่นเต้นของวาตภัยและการเกิดใหม่ที่ตามมาหลังจากเส้นทางแห่งการทำลายล้างของมัน\n\nเมื่อไม่นานมานี้ สถานีตรวจอากาศทั่วโลกตรวจพบปรากฏการณ์ที่ไม่ธรรมดา: เครือข่ายของซูเปอร์สตอร์มที่พร้อมจะพัดถล่มไปทั่วโลก\n\n[Root.Owner.GetScientistPlural] ของเราเรียกมันว่า 'โชคชะตาที่สมเหตุสมผล' พายุที่หาได้ยากเหล่านี้สร้างเงื่อนไขที่สมบูรณ์แบบในการร่วมเป็นสักขีพยานในสิ่งที่สุดโต่งอย่างแท้จริง"
 cstorms.3100.a: "หยิบอุปกรณ์ภาคสนามเลย!"

 cstorms.3105.name: "การก่อตัวของวาตภัย"
 cstorms.3105.desc: "[Root.Owner.GetScientistPlural] ของเราได้ค้นพบความลับของการควบคุมพายุ การคาดการณ์พลังของพายะนั้นพุ่งทะลุชาร์ตและพวกเราทุกคนก็พร้อมสำหรับมัน พวกเราจะได้รับการทดสอบและถูกพบว่าเป็นผู้ที่มีค่าคู่ควรที่สุด\n\nอาคารพิเศษสามารถทำหน้าที่เป็นศูนย์ประสานงานสำหรับการจุดชนวนพายุ อาคารบน §Y[owner.capital_scope.GetName]§! ที่เพิ่มแรงดึงดูดพายุจะช่วยเร่งความคืบหน้าของเราไปสู่พายุขั้นสุดยอด"
 cstorms.3105.a: "เจ๋งเป้ง"
 cstorms.3105.a.tt: "§Yตึก ที่ น่า ประทับ ใจ ของ พายุ§! บนดาวเคราะห์ศูนย์กลางจักรวรรดิ:\n$situation_speed_tt$: §G+10%§!\n\n§Y$sm_storm_attraction_computer$§! ในสถานีระบบดาวเคราะห์ศูนย์กลางจักรวรรดิ:\n$situation_speed_tt$: §G+10%§!\n\n"

 cstorms.3110.name: "การมาเยือน"
 cstorms.3110.desc.outro: "การอัดฉีดพลังงานเข้าไปในพายุธรรมชาติจะช่วยให้เราสร้างเงื่อนไขสำหรับพายุไฟฟ้าได้\n\nการปรับเปลี่ยนแกนกลางดาวเคราะห์จะช่วยปรับเปลี่ยนสนามแม่เหล็กของ [owner.capital_scope.GetName] เพื่อก่อให้เกิดพายุแม่เหล็กได้\n\nและสุดท้าย การปรับเปลี่ยนขั้วแทคีออนในพื้นที่เฉพาะเจาะจงของดาวเคราะห์จะช่วยให้เกิดการเปลี่ยนแปลงของสนามพลังและสร้างพายุแรงโน้มถ่วงขึ้นมาได้"
 cstorms.3110.desc.regular: "พวกเราได้เรียนรู้วิธีจุดชนวนแรงสั่นสะเทือนของพายุบน [owner.capital_scope.GetName] เพื่อหล่อหลอมให้มันกลายเป็นประสบการณ์ขั้นสุดยอด ทว่าเราต้องตัดสินใจเลือกประเภทพายุที่รุ่งโรจน์ที่สุด\n\n$cstorms.3110.desc.outro$"
 cstorms.3110.desc.hive: "พวกเราได้เรียนรู้วิธีจุดชนวนแรงสั่นสะเทือนของพายุบน [owner.capital_scope.GetName] เพื่อหล่อหลอมให้มันกลายเป็นประสบการณ์ขั้นสุดยอด ทว่าเรายังไม่ได้ตัดสินใจเลือกประเภทพายุที่รุ่งโรจน์ที่สุด\n\n$cstorms.3110.desc.outro$"
 cstorms.3110.desc.machine: "พวกเราได้เรียนรู้วิธีจุดชนวนแรงสั่นสะเทือนของพายุบน [owner.capital_scope.GetName] เพื่อหล่อหลอมให้มันกลายเป็นประสบการณ์ขั้นสุดยอด ทว่ากระบวนการตัดสินคุณค่าของเราติดอยู่ในลูปแบบเรียกซ้ำ(วนซ้ํา)ในการพยายามระบุว่าพายุประเภทใดรุ่งโรจน์ที่สุด\n\n$cstorms.3110.desc.outro$"
 cstorms.3110.a: "ชาร์จประจุกลุ่มเมฆ"
 cstorms.3110.a.tt: "เพาะพันธุ์ §Y$electric_storm$§! ของดาวเคราะห์"
 cstorms.3110.b: "กระตุ้นแรงแม่เหล็กแกนกลาง"
 cstorms.3110.b.tt: "เพาะพันธุ์ §Y$magnetic_storm$§! ของดาวเคราะห์"
 cstorms.3110.c: "สร้างคลื่นแรงโน้มถ่วง"
 cstorms.3110.c.tt: "เพาะพันธุ์ §Y$gravity_storm$§! ของดาวเคราะห์"

 cstorms.3130.name: "ออกไปลุยกันเลย"
 cstorms.3130.desc.electric: "ท้องฟ้าคำราม อัสนีบาตฟาดฟันอยู่รอบตัวเรา!\n\nไม่เพียงแต่การปลดปล่อยพลังงานอันมหาศาลเหล่านี้จะชาร์จกระแสไฟฟ้าให้กับพื้นผิวดาวเคราะห์เท่านั้น แต่ยังทำให้พวกเราตื่นตัวอย่างแท้จริงด้วย! แม้ว่าการทำฟาร์มจะได้รับความเสียหายจากพายุไฟฟ้า แต่ศักยภาพในการผลิตพลังงานนั้นก็เป็นสิ่งที่ไม่อาจปฏิเสธได้"
 cstorms.3130.desc.magnetic: "เข็มทิศหมุนเคว้งอย่างบ้าคลั่งเนื่องจากสนามแม่เหล็กของ [owner.capital_scope.GetName] เกิดการบิดเบี้ยว\n\nการเจาะผ่านเปลือกโลกของโลกบ้านเกิดทำให้เราสามารถอัดฉีดสารแม่เหล็กเข้าไปในแกนกลางได้โดยตรง และพายุธรรมชาติก็ได้ช่วยขยายความผันผวนของสนามพลังที่เกิดขึ้น สิ่งนี้จะส่งผลกระทบต่อการผลิตพลังงาน แต่จะช่วยเพิ่มประสิทธิภาพในการตรวจจับแหล่งแร่ใหม่ๆ"
 cstorms.3130.desc.gravity: "ไม่เคยมีครั้งไหนที่การเคลื่อนไหวไปมาจะน่าตื่นเต้นขนาดนี้มาก่อน! แรงโน้มถ่วงเพิ่มขึ้นและลดลงโดยไม่บอกกล่าวล่วงหน้าเลยสักนิด\n\nพื้นที่ปรับแต่งอนุภาคที่กระจายอยู่ทั่ว [owner.capital_scope.GetName] ได้กลับขั้วแทคีออน ซึ่งรวบรวมพวกมันให้กลายเป็นลูกบอลพลังงานที่ปะทุขึ้น เมื่อลูกบอลเหล่านั้นหายไปอย่างรวดเร็ว - [Root.Owner.GetScientistPlural] เชื่อว่าพวกมันถูกส่งย้อนเวลากลับไป - คลื่นแรงโน้มถ่วงก็กระเพื่อมออกไปในทุกทิศทาง\n\nความผันผวนที่เกิดขึ้นจะทำให้การทำงานบนพื้นผิวดาวเคราะห์ยากลำบากขึ้น แต่จะช่วยปรับปรุงงานบนสถานีโคจรได้ดีขึ้น"
 cstorms.3130.a: "เป็นการเดินทางที่น่าประทับใจจริงๆ"
 cstorms.3130.a.tt.regular: "ระหว่างเกิดพายุบนดาวเคราะห์:\n$MOD_POP_HAPPINESS$: §G+20%§!"
 cstorms.3130.a.tt.gestalt: "ระหว่างเกิดพายุบนดาวเคราะห์:\n$mod_country_unity_produces_mult$: §G+5%§!"

 cstorms.3140.name: "แรงสั่นสะเทือนที่ดี"
 cstorms.3140.desc.intro: "[Root.Owner.GetScientistPlural] ของเรามั่นใจว่าแนวคิดเดียวกับที่เราใช้นำทางพายุดาวเคราะห์ สามารถนำมาประยุกต์ใช้ในระดับที่ใหญ่ขึ้นได้ บัดนี้ระบบดวงดาวทั้งหมดกำลังหมุนวนไปด้วยพลังงานวาตภัย"
 cstorms.3140.desc.electric: "$cstorms.3140.desc.intro$\n\nเราสามารถใช้ความรู้และโครงสร้างพื้นฐานที่มีอยู่เพื่อเปลี่ยนมันให้กลายเป็น $electric_storm$ หรือเราจะสร้างสิ่งใหม่ที่น่าตื่นเต้นขึ้นมาก็ได้\n\nการนำแร่ธาตุบางชนิดเข้ามาจะช่วยขยายการสะท้อนของคลื่นแม่เหล็กในพายุ ในขณะที่การใช้โลหะผสมจะเปลี่ยนพายุให้กลายเป็นบ่อแรงโน้มถ่วงแทน"
 cstorms.3140.desc.magnetic: "$cstorms.3140.desc.intro$\n\nเราสามารถใช้ความรู้และโครงสร้างพื้นฐานที่มีอยู่เพื่อเปลี่ยนมันให้กลายเป็น $magnetic_storm$ หรือเราจะสร้างสิ่งใหม่ที่น่าตื่นเต้นขึ้นมาก็ได้\n\nการชาร์จประจุดวงอาทิตย์ของเราจะขยายศักยภาพไฟฟ้าของพายุ ในขณะที่การใช้โลหะผสมจะเปลี่ยนพายุให้กลายเป็นบ่อแรงโน้มถ่วงแทน"
 cstorms.3140.desc.gravity: "$cstorms.3140.desc.intro$\n\nเราสามารถใช้ความรู้และโครงสร้างพื้นฐานที่มีอยู่เพื่อเปลี่ยนมันให้กลายเป็น $gravity_storm$ หรือเราจะสร้างสิ่งใหม่ที่น่าตื่นเต้นขึ้นมาก็ได้\n\nการนำแร่ธาตุบางชนิดเข้ามาจะช่วยขยายการสะท้อนของคลื่นแม่เหล็กในพายุ ในขณะที่การชาร์จประจุดวงอาทิตย์ของเราจะช่วยขยายศักยภาพไฟฟ้าของพายุแทน"
 cstorms.3140.a: "ชาร์จพลังดวงอาทิตย์"
 cstorms.3140.a.tt: "ก่อกำเนิด §Y$electric_storm$§! คอสมิก\nเป็นเวลา §Y2§! ปี:$TABBED_NEW_LINE$$mod_country_energy_produces_mult$ : §R-50%§!$TABBED_NEW_LINE$$mod_country_unity_produces_mult$ : §G+20%§!"
 cstorms.3140.a.infra: "ใช้โครงสร้างพื้นฐานที่มี"
 cstorms.3140.a.tt.electric: "ก่อกำเนิด §Y$electric_storm$§! คอสมิก\nเป็นเวลา §Y2§! ปี:$TABBED_NEW_LINE$$mod_country_unity_produces_mult$ : §G+5%§!"
 cstorms.3140.b: "ใช้แร่ที่มีแม่เหล็ก"
 cstorms.3140.b.tt: "ก่อกำเนิด §Y$magnetic_storm$§! คอสมิก\nเป็นเวลา §Y2§! ปี:$TABBED_NEW_LINE$$mod_country_minerals_produces_mult$: §R-50%§!$TABBED_NEW_LINE$$mod_country_unity_produces_mult$ : §G+20%§!"
 cstorms.3140.b.tt.magnetic: "ก่อกำเนิด §Y$magnetic_storm$§! คอสมิก\nเป็นเวลา §Y2§! ปี:$TABBED_NEW_LINE$$mod_country_unity_produces_mult$ : §G+5%§!"
 cstorms.3140.c: "ใช้โลหะผสมพิเศษ"
 cstorms.3140.c.tt: "ก่อกำเนิด §Y$gravity_storm$§! คอสมิก\nเป็นเวลา §Y2§! ปี:$TABBED_NEW_LINE$$mod_country_alloys_produces_mult$: §R-25%§!$TABBED_NEW_LINE$$mod_country_unity_produces_mult$ : §G+20%§!"
 cstorms.3140.c.tt.gravity: "ก่อกำเนิด §Y$gravity_storm$§! คอสมิก\nเป็นเวลา §Y2§! ปี:$TABBED_NEW_LINE$$mod_country_unity_produces_mult$ : §G+5%§!"

 cstorms.3160.name: "หลังพายุพ้นผ่าน"
 cstorms.3160.desc: "เมื่อพายุดาวเคราะห์กระจายตัวออกไป คุณลักษณะใหม่ที่คงอยู่ถาวรก็ได้ปรากฏขึ้นบน [owner.capital_scope.GetName] พายุได้นำพาความเปลี่ยนแปลงและการเกิดใหม่อีกครั้งหนึ่งแล้ว\n\nถึงแม้ว่าพายุในท้องถิ่นนี้จะน่าตื่นเต้นเร้าใจเพียงใด แต่เราก็ได้แต่นึกฝันถึงความเป็นไปได้ของพายุคอสมิกที่แท้จริง เหตุใดมันถึงได้ใช้เวลานานขนาดนี้นะ?"
 cstorms.3160.a: "ช่างเป็นความทรงจำที่ยอดเยี่ยมจริง ๆ!"
 cstorms.3160.a.tt.electric: "พายุทิ้ง §Y$d_buzzing_plains$§! ที่ถูกบรรจุกระแสไฟฟ้าไว้เบื้องหลังบน [owner.capital_scope.GetName]"
 cstorms.3160.a.tt.magnetic: "พายุทิ้ง §Y$d_geothermal_vent$§! แห่งใหม่ไว้เบื้องหลังบน [owner.capital_scope.GetName]"
 cstorms.3160.a.tt.gravity: "พายุได้เปิดเผย §Y$d_rich_mountain$§! บน [owner.capital_scope.GetName]"

 cstorms.3170.name: "รูปทรงพายุคอสมิก"
 cstorms.3170.desc.intro: "พวกเราสามารถเร่งการปรากฏตัวของพายุคอสมิกขนาดมหึมารอบๆ [owner.capital_scope.GetStarName] ได้ แต่ต้องถามตัวเองก่อนว่า - พวกเราพร้อมสำหรับประสบการณ์ครั้งสำคัญที่สุดในชีวิตนี้แล้วหรือยัง?\n\n"
 cstorms.3170.desc.scientist.snippet: "ทีมงานของ [Root.Owner.GetScientistPlural] ที่นำโดย §Y[event_target:storm_scientist.GetName]§! สามารถวิจัยรูปแบบพายุคอสมิกในยุคแรกเริ่มเหล่านี้เพื่อค้นหาวิธีการที่ดีที่สุดในการควบคุมการก่อตัวของมัน\n\n"
 cstorms.3170.desc.commander.snippet: "หากเราส่งกองทัพที่นำโดย §Y[event_target:storm_commander.GetName]§! พวกเขาจะสามารถโจมตีทำลายพายุที่กำลังก่อตัวและปล่อยให้พลังงานสาดกระเซ็นออกไปได้\n\n"
 cstorms.3170.desc.outro: "ทีมที่นำโดยผู้นำนี้ต้องเผชิญกับความเสี่ยงและผลลัพธ์ที่ไม่แน่นอน แต่อีกแง่หนึ่ง พวกเขาอาจจะทำสิ่งที่ยอดเยี่ยมสำเร็จก็ได้!"
 cstorms.3170.desc.both: "$cstorms.3170.desc.intro$$cstorms.3170.desc.scientist.snippet$$cstorms.3170.desc.commander.snippet$$cstorms.3170.desc.outro$"
 cstorms.3170.desc.scientist: "$cstorms.3170.desc.intro$$cstorms.3170.desc.scientist.snippet$$cstorms.3170.desc.outro$"
 cstorms.3170.desc.commander: "$cstorms.3170.desc.intro$$cstorms.3170.desc.commander.snippet$$cstorms.3170.desc.outro$"
 cstorms.3170.desc.none: "สิ่งเดียวที่เราทำได้ตอนนี้คือรอให้พายุคอสมิกก่อตัวขึ้นมา\n\nการเฝ้ารอนั้นเกือบจะทนไม่ไหวแล้ว แต่มันจะทำให้ผลลัพธ์ที่ได้คุ้มค่ามากยิ่งขึ้น"

 cstorms.3170.a: "ส่ง [Root.Owner.GetScientistPlural] ไป"
 cstorms.3170.a.tt: "นักวิทยาศาสตร์ §Y[event_target:storm_scientist.GetName]§! จะหายไปชั่วคราวและเสี่ยงต่อการเสียชีวิต"
 cstorms.3170.b: "สั่งการให้ทหารเดินหน้า"
 cstorms.3170.b.tt: "ผู้บัญชาการ §Y[event_target:storm_commander.GetName]§! จะหายไปชั่วคราวและเสี่ยงต่อการเสียชีวิต"
 cstorms.3170.c: "ทำอย่างปลอดภัยและรอคอย"

 cstorms.3190.name: "ลูกแรกจากหลายๆ ลูก"
 cstorms.3190.desc.intro: "มันเริ่มต้นด้วยรอยย่นในโครงสร้างของคอสมิก พลังงานเต้นรำ หลอมรวม และปะทะกัน ร่องรอยของอนุภาคแปลกประหลาด มวลสารที่ปะทุขึ้น และสุดท้าย พายุที่กำลังก่อตัวซึ่งโคจรรอบดาวฤกษ์ของเราก็กลั่นตัวกลายเป็นสัตว์ร้ายตรงหน้าเรา\n\nสิ่งนี้ถูกหล่อหลอมตามความปรารถนาของเรา พรแห่งธรรมชาติและความเฉลียวฉลาดนี้ปกคลุมน่านฟ้าไว้ทั้งหมด"
 cstorms.3190.desc.success: "$cstorms.3190.desc.intro$ ผู้นำของเราที่ฝ่าพายุออกไปได้กระตุ้นกระแสแห่งความตื่นเต้นอันบ้าคลั่ง\n\nพวกเราทำสำเร็จ พวกเราเพียงลำพังที่ทำสิ่งนี้ได้ มาร่วมเผชิญหน้ากับพายุนี้และโอบรับความตื่นเต้นครั้งหนึ่งในชีวิตกันเถอะ!"
 cstorms.3190.desc.failure: "$cstorms.3190.desc.intro$ ผู้นำของเราสูญหายไปในพายุ แต่นั่นช่างเป็นการจากไปที่น่าจดจำเสียจริง!\n\nพวกเราทำสำเร็จ พวกเราเพียงลำพังที่ทำสิ่งนี้ได้ มาร่วมเผชิญหน้ากับพายุนี้และโอบรับความตื่นเต้นครั้งหนึ่งในชีวิตกันเถอะ!"
 cstorms.3190.desc.wait: "$cstorms.3190.desc.intro$ พวกเราเฝ้ารอมานานแสนนาน แต่ในที่สุดวันนั้นก็มาถึงแล้ว\n\nพวกเราทำสำเร็จ พวกเราเพียงลำพังที่ทำสิ่งนี้ได้ มาร่วมเผชิญหน้ากับพายุนี้และโอบรับความตื่นเต้นครั้งหนึ่งในชีวิตกันเถอะ!"
 cstorms.3190.a.success: "ลุยต่อเลย!"
 cstorms.3190.a.failure: "จงเป็นพยาน!"
 cstorms.3190.a.failure.tt: "\nผู้นำของเราจากไปในกองเพลิงแห่งเกียรติยศ"
 cstorms.3190.a.wait: "ยอดเยี่ยมอย่างไร้ที่ติ!"

### Storm Fever ###

# Modifiers for Storm Fever event chain
 cs_storm_chasers_bad_vibes: "ลางไม่ดี"
 cs_storm_chasers_bad_vibes_desc: "เราพบกับความเบื่อหน่ายที่ถาโถมเข้ามาอย่างกะทันหัน"


 cstorms.3205.name: "เพื่อความพิโรธ"
 cstorms.3205.normal: "การสั่นสะเทือนของจักรวาลถูกปิด และงานปกติเพียงแค่ไม่ได้กระตุ้น ความตื่นเต้นเหมือนที่พวกเขาใช้ในการ ไม่มีข้อสงสัยเลยว่า เราได้ประสบความสําเร็จในสิ่งที่เหลือเชื่อ แต่มีความรู้สึกที่แพร่หลาย ว่าบางสิ่งบางอย่างหายไป ความสําเร็จของบรรพบุรุษของเรา ตํานานในขอบเขตของพวกเขา และความทะเยอทะยาน,\n\n\"การต่อสู้เหล่านี้มีพื้นฐานมากที่สุด!\"หนึ่งของเราชั้นนํา เขียนเมื่อเร็ว ๆ นี้ \"เราเปิดช่องว่างในใจเราหรือ\"แรงสั่นสะเทือนของห้วงอวกาศผิดเพี้ยนไป และวีรกรรมเดิมๆ ก็ไม่สามารถกระตุ้นความตื่นเต้นได้เหมือนแต่ก่อน ไม่มีข้อสงสัยเลยว่าเราได้บรรลุสิ่งมหัศจรรย์มากมาย แต่มีความรู้สึกที่แผ่ซ่านไปทั่วว่าบางอย่างขาดหายไป ความสำเร็จของบรรพบุรุษของเรา ซึ่งเป็นตำนานทั้งในด้านขอบเขตและความทะเยอทะยาน ได้ทอดเงาอันยาวนานเอาไว้\n\n"
 cstorms.3205.gestalt: "แรงสั่นสะเทือนของห้วงอวกาศผิดเพี้ยนไป และวีรกรรมเดิมๆ ก็ไม่สามารถกระตุ้นความตื่นเต้นได้เหมือนแต่ก่อน ไม่มีข้อสงสัยเลยว่าเราได้บรรลุสิ่งมหัศจรรย์มากมาย แต่มีความรู้สึกที่แผ่ซ่านไปทั่วว่าบางอย่างขาดหายไป\n\nเราถูกรบกวนด้วยคำถาม: เรารู้จักตัวตนที่แท้จริงของเราจริงๆ หรือไม่? วันเวลาอันรุ่งโรจน์ของเราได้ผ่านพ้นไปแล้วหรือ? ในฐานะกลุ่มจิตร่วม เรามีหน้าที่ต้องกลายเป็นเวอร์ชันที่ดีที่สุดของตัวเราเอง\n\nความวิตกกังวลนี้เป็นของจริง และถึงเวลาต้องลงมือทำแล้ว เพื่อเริ่มต้นใหม่ เราจะขอย้อนกลับไปยังจุดเริ่มต้น: ชุดการทดสอบความท้าทายที่ออกแบบมาเป็นพิเศษเพื่อกระตุ้นให้อะดรีนาลีนหลั่งไหลถึงขีดสุด!"
 cstorms.3205.a: "ความตื่นเต้นเพิ่งจะเริ่มต้นขึ้นเท่านั้น"
 cstorms.3205.tooltip: "ค้นพบความท้าทายในอดีตได้ในบันทึกสถานการณ์"
 cstorms.3215.name: "สิ้นสุดไข้พายุ"
 cstorms.3215.intro: "เราทำสำเร็จแล้ว!\n\nด้วยการมุ่งเป้าไปที่การไขว่คว้าหาความตื่นเต้นอย่างแท้จริง เราได้ผ่านพ้นทุกความท้าทาย จงเป็นพยานให้กับสิ่งที่เราได้บรรลุในช่วงปีที่ผ่านมา!"
 cstorms.3215.desc: "$cstorms.3215.intro$\n\nเช่นเดียวกับเหล่านักบุกเบิกผู้ยอดเยี่ยมแห่งดาวบ้านเกิดของเรา เราได้ผลักดันตัวเองให้ก้าวข้ามขีดจำกัด\n\nและที่ดียิ่งกว่านั้น เนื่องจากการเผชิญหน้ากับความพิโรธของธรรมชาติ เราได้รับความเข้าใจอันน่าทึ่งเกี่ยวกับความหมายของการมีอยู่ของเรา"
 cstorms.3215.a: "เรากลับมาแล้ว!"

