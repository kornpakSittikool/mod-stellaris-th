 job_astrometeorologist_hive_effect_desc: "$job_astrometeorologist_hive_plural_with_icon$ เปลี่ยน $r_minerals$ เป็น $r_research$\n\nผลผลิตของอาชีพจะเพิ่มขึ้น เมื่อมี §Yผลกระทบต่อสิ่งแวดล้อม§! ในระบบดาวนี้"
