 STORMS_ANOM_ANTS: "ดาวหางชีวภาพ"
 STORMS_ANOM_ANTS_DESC: "พายุคอสมิกได้ทิ้งดาวหางที่มีองค์ประกอบแปลกประหลาดไว้เบื้องหลัง ดูเหมือนว่ามันจะสร้างจากสารอินทรีย์ [solar_system.Owner.GetScientistPlural] ของเรากระตือรือร้นที่จะสืบสวนมัน"
 cstorms.5020.name: "ดาวเคราะห์น้อยมด"
 cstorms.5020.desc: "ดาวหางดวงนี้เผยให้เห็นว่าเป็นรังขนาดยักษ์ที่เต็มไปด้วยแมลงขนาดเล็ก หางของดาวหางไม่ใช่ก๊าซจากน้ำแข็งที่ระเหยออกมา แต่เป็นไอเสียจากกระบวนการทางเคมีที่เกิดขึ้นลึกเข้าไปภายในรัง\n\nชั้นนอกของรังประกอบด้วยซากตัวที่ตายแล้ว เพื่อปกป้องตัวที่ยังมีชีวิตอยู่ภายในจากสภาพแวดล้อมอันโหดร้ายของอวกาศ นอกจากนี้เรายังตรวจพบเชื้อราหลายชนิดที่อาศัยอยู่ภายในและรอบๆ รัง มีความสัมพันธ์แบบพึ่งพาอาศัยกันอย่างซับซ้อนเกิดขึ้นที่นี่ โดยเชื้อราดำรงชีวิตอยู่ได้ด้วยก๊าซไอเสีย และแมลงก็กินเชื้อราเหล่านั้นเป็นอาหาร"
 cstorms.5020.a: "เก็บเกี่ยวรังนี้"
 cstorms.5020.b: "เฝ้ามองแต่ห้ามแตะต้อง"

 STORMS_ANOM_STAT: "องค์ประกอบที่ชวนสับสน"
 STORMS_ANOM_STAT_DESC: "วัตถุโคจรอวกาศชิ้นนี้ถูกทิ้งไว้หลังจากพายุคอสมิกเคลื่อนผ่าน มันดูเหมือนสถานีอวกาศ แต่ผลการสแกนโครงสร้างของของมันกลับได้ผลลัพธ์ที่น่าสับสนอย่างยิ่ง เราแนะนำให้เข้าไปสำรวจ"
 cstorms.5030.name: "มหันตภัยเครื่องเขียน"
 cstorms.5030.desc: "[Root.Owner.GetScientistPluralCapital] รายงานว่าสถานีอวกาศแห่งนี้ส่วนใหญ่สร้างขึ้นจากอุปกรณ์เครื่องเขียนทั่วไปที่แทบจะยึดเข้าด้วยกันไม่ได้ ลึกเข้าไปในโครงสร้าง วัสดุเปลี่ยนจากโลหะผสมเป็นพลาสติกและสารอื่นๆ\n\nภายในใจกลางของโครงสร้าง เราพบเครื่องจักรเครื่องหนึ่งที่ยังคงอยู่ในกระบวนการย่อยสลายสารอินทรีย์อย่างมีประสิทธิภาพและเปลี่ยนรูปให้กลายเป็นสิ่งของที่เราพบเห็นจนถึงตอนนี้\n\nหลังจากทำการรันโมเดลจำลองดีเอ็นเอ [Root.Owner.GetScientistPlural] ของเราจำต้องสรุปว่าวัสดุดังกล่าวน่าจะมาจากอดีตผู้อยู่อาศัยในสถานีตรวจการแห่งนี้"
 cstorms.5030.evopred: "ดูว่าเราจะได้รับประโยชน์อะไรจากที่นี่ได้บ้าง"

 STORMS_ANOM_BRAIN: "การสลายตัวของอัตถิภาวนิยม"
 STORMS_ANOM_BRAIN_DESC: "นับตั้งแต่ที่ $shroud_storm$ พัดถล่มระบบสุริยะนี้ เราได้รับสัญญาณแปลกๆ มาตลอด อย่างไรก็ตาม ทันทีที่ [Root.Owner.GetScientistPlural] ของเราพยายามตอบสัญญาณส่งสัญญาณรบกวนเหล่านั้น มันก็หายไปอีกครั้ง พวกเขาแนะนำให้ส่งยานวิทยาศาสตร์ไปตรวจสอบ"
 cstorms.5025.name: "พายุสมอง"
 cstorms.5025.desc: "เราไม่เคยคาดคิดมาก่อนว่าจะได้พบสิ่งนี้: สมอง อวัยวะประมวลผลกลางชีวภาพที่นุ่มนิ่มจากสิ่งมีชีวิตหลากหลายสายพันธุ์ หลายร้อยหลายพันชิ้น ทั้งหมดถูกเชื่อมต่อเข้าด้วยกันและลอยอยู่ภายในแคปซูลขนาดใหญ่ที่คล้ายบอลลูน ดูเหมือนมันจะถูกละทิ้งและลอยคว้างอยู่ในส่วนลึกของอวกาศหลังจากที่ $shroud_storm$ ลูกล่าสุดสลายตัวไป\n\nแคปซูลมีเซนเซอร์จำนวนมหาศาลที่เชื่อมต่อกับสมองและบอลลูน และยังมีโมดูลสื่อสารที่ส่งสัญญาณระบุตำแหน่งและถ่ายทอดข้อมูลได้ เช่นเดียวกับที่ส่งหาเรา\n\nดูเหมือนว่าสมองเหล่านั้นเป็นผู้ติดต่อเรามาเอง เพื่ออธิบายสัญญาณรบกวนอันยุ่งเหยิง [Root.Owner.GetScientistPlural] ของเราคิดว่าโครงสร้างนี้ถูกสร้างขึ้นเพื่อวัดการตอบสนองของสารอินทรีย์ต่อ $shroud_storm$ เนื่องจากมีพลังงานพลังจิตตกค้างที่ไม่เสถียรอยู่ภายในจิตใจที่ลอยอยู่นี้ การพยายามเชื่อมต่อกับพวกมันรังแต่จะนำไปสู่หายนะ"

#Terrestrial Telescopes
 terrestial_telescope_category: "เมื่อหลายยุคสมัยก่อน ดาวเคราะห์สองดวงพุ่งชนกัน ผลลัพธ์จากการทำลายล้างของพวกมันคือการกำเนิดของโลกที่มีเอกลักษณ์เฉพาะตัวดวงนี้"
 terrestial_telescope_category_desc: "การสแกนโดย [fleet.GetName] ระบุถึงการมีอยู่ของสถานีอวกาศร้างในระบบดาว [From.GetStarName]\n\nดูเหมือนว่ามันจะถูกนำมาทิ้งไว้ที่นี่โดยพายุคอสมิกที่พัดผ่าน ไม่พบสัญญาณของสิ่งมีชีวิตและไม่มีสัญญาณพลังงานใดๆ ทั้งสิ้น กล้องโทรทรรศน์ขนาดมหึมาสองตัวยื่นออกมาจากด้านตรงข้ามของของสถานี เครื่องมือทางทัศนศาสตร์เหล่านี้ดูล้ำสมัยและมีขนาดใหญ่เกินกว่าขนาดของสถานีมาก เทคโนโลยีและสถาปัตยกรรมนี้ยังไม่เป็นที่คุ้นเคยสำหรับเรา\n\nเราสามารถพยายามเปิดใช้งานกล้องโทรทรรศน์เหล่านั้นอีกครั้ง เนื่องจากอาจให้ข้อมูลเชิงลึกที่น่าสนใจแก่เราได้"
 cstorms.1605.name: "กล้องโทรทรรศน์ภาคพื้นดิน"
 cstorms.1605.desc: "การขึ้นไปบนสถานีและเปิดใช้งานกล้องโทรทรรศน์ต้องใช้ฝีมือจาก [Root.Owner.GetScientistPlural] ของเราบ้าง แต่ไม่มีอะไรที่พวกเขาจัดการไม่ได้ ทว่า มุมของกาแล็กซีที่เครื่องมือเหล่านี้หันไปหานั้นกลับไม่มีอะไรน่าสังเกตเลย\n\nแต่พบวัตถุโบราณที่น่าสนใจกระจายอยู่รอบสถานี: ภาพถ่ายรายละเอียดสูงที่บันทึกจากกล้องโทรทรรศน์ ถูกจัดแสดงอย่างเป็นระเบียบในกรอบรูปประดับ ทุกภาพถ่ายมุ่งเน้นไปที่พายุคอสมิก โดยมีภาพพิมพ์หลายใบของพายุแต่ละลูกที่เคยพัดผ่านระบบนี้ ผู้ควบคุมกล้องโทรทรรศน์ใช้มุมภาพ ระดับการซูม และแม้แต่การเอียงภาพในเชิงศิลปะเพื่อแสดงให้เห็นพายุในมุมที่งดงามที่สุด\n\nจากการสำรวจที่ละเอียดขึ้น ผลงานศิลปะเหล่านั้นเป็นสิ่งเดียวที่น่าสนใจบนสถานีร้างนี้ เราจะบันทึกพวกมันไว้ในหอจดหมายเหตุเพื่อให้คนรุ่นหลังได้เพลิดเพลินกับภาพแห่งพลังและความงามที่หาดูยากเหล่านี้"

 STORMS_ANOM_POLYCHROMATIC: "ดาวฤกษ์หลากสี"
 STORMS_ANOM_POLYCHROMATIC_DESC: "การเคลื่อนผ่านของพายุคอสมิกในระบบสุริยะ [from.solar_system.GetName] ได้เปลี่ยนแปลงลักษณะภายนอกของดาวฤกษ์ในระบบนี้ หลังจากพายุสงบลง ชั้นโคโรนาของดาวฤกษ์ปรากฏเป็นเกลียวสีสันที่เปลี่ยนแปลงอยู่ตลอดเวลา พร้อมทั้งพ่นเปลวสุริยะหลากสีออกมาในทุกทิศทาง ปรากฏการณ์นี้สมควรได้รับการวิเคราะห์เพิ่มเติม"
 cstorms.5035.name: "$STORMS_ANOM_POLYCHROMATIC$"
 cstorms.5035.desc: "[root.leader.GetName] รายงานการเปลี่ยนแปลงที่น่าทึ่งในปฏิกิริยานิวเคลียร์ฟิวชันของ [From.GetStarName] นับตั้งแต่การพัดผ่านของ [from.GetAffectedStormType]\n\nดูเหมือนว่าพายุได้กระตุ้นปฏิกิริยานิวเคลียร์ที่ไม่คาดคิดขึ้นภายในแกนกลางของดาวฤกษ์ ส่งผลให้มีการปล่อย [from.GetEarnedResources] อย่างต่อเนื่องจากเขตนำความร้อนของมัน\n\nปฏิกิริยาที่ซับซ้อนและเฉพาะตัวเหล่านี้กำลังสร้างเปลวสุริยะหลากสีที่แปลกตาตามที่เราได้สังเกตเห็น ไม่ว่าจะอย่างไรก็ตาม มันจะยังคงเป็นแหล่งข้อมูลที่มีค่าควรแก่การศึกษาอย่างใกล้ชิดต่อไปอีกระยะหนึ่ง"
 cstorms.5035.a: "ดาวเคราะห์ที่ชนกัน"
 cstorms.5035.b: "เก็บเกี่ยวทรัพยากรใหม่เหล่านี้"

 STORMS_ANOM_TRIPLETS: "ดาวเคราะห์น้อยสามแฝด"
 STORMS_ANOM_TRIPLETS_DESC: "ภัยพิบัติกำลังคุกคามที่จะทำลายสมดุลอันเปราะบางของดาวเคราะห์ที่มีเอกลักษณ์เฉพาะตัวดวงนี้"
 cstorms.5040.name: "$STORMS_ANOM_TRIPLETS$"
 cstorms.5040.desc: "[root.leader.GetName] ค้นพบว่าดาวเคราะห์น้อยที่ถูกทิ้งไว้ในระบบสุริยะ [from.solar_system.GetName] มีสนามแม่เหล็กที่ไม่เสถียรอย่างมาก ส่งผลให้พวกมันสะท้อนกระดอนไปมาอย่างไร้ทิศทางจากชั้นแมกนีโตสเฟียร์ที่มีอยู่เดิมในระบบดาว\n\n[root.leader.GetName] ได้ทำให้พวกมันเสถียรขึ้นโดยการเพิ่มอุปกรณ์ชดเชยแรงแม่เหล็กให้กับดาวเคราะห์น้อยแต่ละดวง เพื่อควบคุมเส้นทางและทำให้พวกมันพร้อมสำหรับการเก็บเกี่ยวทรัพยากร"

 STORMS_ANOM_TRAVELLERS: "สัญญาณขอความช่วยเหลือหลังพายุพ้นผ่าน"
 STORMS_ANOM_TRAVELLERS_DESC: "หลังจากสิ้นสุดภัยพิบัติ §H[from.GetAffectedStormType]§! มีการตรวจพบสัญญาณขอความช่วยเหลือที่ไม่ระบุที่มาในระบบสุริยะ §H[from.solar_system.GetName]§!"
 cstorms.5050.name: "เรื่องเล่าของดาวเคราะห์สองดวง"
 cstorms.5050.desc: "นับตั้งแต่เวลาที่เราตรวจพบ [From.Planet.GetName] การดำรงอยู่ของมันก็สร้างความน่าทึ่งให้แก่เรามาตลอด\n\nไม่ใช่ว่าการชนกันของวัตถุท้องฟ้าสองดวงนั้นเป็นเรื่องผิดปกติ เพราะกาแล็กซีคือสถานที่ที่กว้างใหญ่และไร้ระเบียบ อย่างไรก็ตาม ในบรรดากรณีของการชนกันที่ทราบมาทั้งหมด วัตถุอย่างน้อยหนึ่งในสองดวงจะถูกทำลายไป\n\nการปะทะกันที่สร้าง [From.Planet.GetName] เกิดขึ้นเมื่อหลายล้านปีก่อน แต่โลกทั้งสองดวงนี้ยังคงรักษาสมดุลที่แปลกประหลาดไว้ได้ และยังก่อตัวสร้างชั้นบรรยากาศที่ค้ำจุนชีวิตขึ้นมาในกระบวนการนี้ด้วย"
 cstorms.5050.a: "ตกลงช่วยเหลือพวกเขา"
 cstorms.5050.evopred: "เราจะช่วยเหลือเพื่อแลกกับตัวอย่างดีเอ็นเอบางส่วน"
 cstorms.5050.b: "ขอให้พวกเขาโชคดี"
 cstorms.5050.c.genocide: "ปลิดชีวิตพวกเขาและยึดสินค้าทั้งหมด"
 cstorms.5050.d.devouring_swarm: "มื้ออาหารฟรี"

 STORMS_COSMIC_SLUDGE: "โคลนคอสมิก"
 STORMS_COSMIC_SLUDGE_DESC: "เซนเซอร์ตรวจจับมวลที่เฝ้าสังเกตการณ์ระบบสุริยะ §H[from.solar_system.GetName]§! กำลังแสดงค่าที่ผิดปกติหลังจากเกิดภัยพิบัติ §H[from.GetAffectedStormType]§!\n\nผลการตรวจวิเคราะห์ระบบไม่พบสัญญาณความผิดพลาดทางเทคนิคของอุปกรณ์ ค่าที่อ่านได้เหล่านี้จำเป็นต้องมีการตรวจสอบเพิ่มเติม"
 cstorms.5060.name: "สมดุลอันเปราะบาง"
 cstorms.5060.desc: "ค่าเซนเซอร์ที่ผิดปกติในระบบสุริยะ §H[from.solar_system.GetName]§! เกิดจากเศษซากขนาดใหญ่ที่ถูกทิ้งไว้หลังจากเกิดพายุ §H[from.GetAffectedStormType]§!\n\nสิ่งลอยเคว้งนี้เป็นก้อนโคลนคอสมิกที่ไม่มีรูปทรงแน่นอน ซึ่งหลอมขึ้นมาจากแรงดันมหาศาลของพายุ องค์ประกอบที่มากมายนับไม่ถ้วนของมันได้ก่อตัวเป็นสารประกอบที่ทำปฏิกิริยาได้อย่างมีเอกลักษณ์เฉพาะตัว\n\nการศึกษาเคมีของมันอย่างจริงจังอาจให้ข้อมูลเชิงลึกทางอุตุนิยมวิทยาอวกาศที่มีค่าเกี่ยวกับสภาพแวดล้อมที่ทำให้เกิดมันขึ้นมา"
 cstorms.5060.a: "ศึกษาองค์ประกอบของมัน"
 cstorms.5060.b: "แยกส่วนสลายมัน"

 STORMS_SHATTERED_SATTELITE: "ดาวเทียมที่แตกสลาย"
 STORMS_SHATTERED_SATTELITE_DESC: "หลังจากผ่านพ้น §H[from.GetAffectedStormType]§! มีการตรวจพบวัตถุที่ไม่สามารถระบุได้ในระบบสุริยะ §H[from.solar_system.GetName]§! การวิเคราะห์เศษซากนี้เพิ่มเติมอาจให้ข้อมูลเชิงลึกที่มีค่าแก่เรา"
 cstorms.5070.name: "$STORMS_SHATTERED_SATTELITE$"
 cstorms.5070.desc: "วัตถุในระบบสุริยะ §H[from.solar_system.GetName]§! คือซากของดาวเทียมโบราณที่ติดตั้งระบบเซนเซอร์ตรวจวัดทางอุตุนิยมวิทยาอวกาศที่ซับซ้อน เราเชื่อว่ามันถูกพัดพาไปไกลทั่วกาแล็กซีโดยพายุ §H[from.GetAffectedStormType]§!\n\nตอนนี้มันเสียหายจนไม่อาจซ่อมแซมได้อีก แต่ฐานข้อมูลส่วนกลางของมันยังมีข้อมูลจำนวนมากสะสมอยู่ซึ่งเราสามารถนำมาปรับใช้สำหรับความต้องการของเราเองได้\n\nส่วนที่เหลือของดาวเทียมสามารถเก็บกู้เป็นเศษเหล็กได้เท่านั้น"

 STORMS_EVISCERATED_FAUNA: "การเปลี่ยนสภาพที่ไร้พันธนาการ"
 STORMS_EVISCERATED_FAUNA_DESC: "ทีมนักธรณีวิทยาชั้นนำของเราได้มารวมตัวกันและเสนอแนวทางการรับมือสองทางที่เป็นไปได้เพื่อช่วยให้ [From.Planet.GetName] พ้นจากภัยพิบัติเปลือกโลกแปรสัณฐาน\n\nแผนแรกคือการรักษาเสถียรภาพของการปะทะ แม้ว่าจะต้องใช้เวลาหลายศตวรรษในการเยียวยาปากแผลภูเขาไฟรอบๆ เขตปะทะ แต่ด้วยการเจาะระบายชั้นเปลือกโลกอย่างระมัดระวัง เราจะสามารถบรรเทาแรงดันบนเปลือกโลกของดาวเคราะห์เพื่อป้องกันการขยับตัวของเปลือกโลกที่ไม่เสถียรอีกในอนาคต ผลพลอยได้จากภูเขาไฟที่หลงเหลืออยู่จะถูกนำมาใช้เพื่อปรับสภาพดาวเคราะห์ดวงนี้ให้กลายเป็นระบบนิเวศทางชีวภาพที่เสถียร\n\nแผนที่สองนั้นทะเยอทะยานยิ่งกว่ามาก แทนที่จะระบายแรงดันบนเปลือกโลก พลังงานและสสารต่างๆ ที่เกิดขึ้นจากการปะทุของภูเขาไฟสามารถนำไปปรับใช้ในกระบวนการปรับสภาพดาวเคราะห์แบบเฉพาะเจาะจงได้\n\nวิธีนี้จะช่วยให้เราสร้างระบบนิเวศทางชีวภาพที่หลากหลายซึ่งสามารถค้ำจุนสิ่งมีชีวิตได้ทุกประเภท เปลี่ยนโลกดวงนี้ให้กลายเป็นสวรรค์ อย่างไรก็ตาม มีโอกาสล้มเหลวค่อนข้างสูงจากขั้นตอนนี้ และอาจนำไปสู่การทำลายล้างวัตถุท้องฟ้าที่มีเอกลักษณ์เฉพาะตัวดวงนี้อย่างสิ้นเชิงได้"
 cstorms.5080.name: "เศษซากชีวภาพ"
 cstorms.5080.desc.common: "วัตถุแปลกปลอมในระบบสุริยะ §H[from.solar_system.GetName]§! ถูกค้นพบว่าเป็นซากอินทรีย์ขนาดใหญ่จากสิ่งมีชีวิตในอวกาศบางชนิด เนื่องจากลักษณะเด่นที่ระบุตัวตนได้ถูกพายุคอสมิกฉีกทึ้งจนหมดสิ้น จึงเป็นไปไม่ได้เลยที่จะระบุประเภทของเศษซากทางชีวภาพนี้ได้อย่างถูกต้อง"
 cstorms.5080.desc.swarm: "โชคดีที่ส่วนใหญ่ยังสามารถกินได้อยู่"
 cstorms.5080.desc.default: "[leader.GetName] มั่นใจว่าการวิเคราะห์ทางนิติวิทยาศาสตร์อย่างละเอียดของซากสิ่งมีชีวิตจะเปิดเผยข้อมูลเพิ่มเติมเกี่ยวกับต้นกำเนิดของมันและผลกระทบของ §Y[from.GetAffectedStormType]§! ที่มีต่อสิ่งมีชีวิตในอวกาศที่คล้ายคลึงกัน"
 cstorms.5080.a: "พวกเราหิวโหย"
 cstorms.5080.b: "ทำการชันสูตรซากในที่เกิดเหตุ"
 cstorms.5080.c: "กำจัดเศษซากทิ้ง"

 FORENSIC_DISSECTION_PROJECT: "เราจะรักษาเสถียรภาพของการปะทะนี้"
 FORENSIC_DISSECTION_PROJECT_DESC: "เราพบซากของสิ่งมีชีวิตที่ไม่รู้จักในระบบสุริยะ §H[solar_system.GetName]§! ซึ่งถูกพัดข้ามกาแล็กซีมาโดยพายุคอสมิก การชำแหละศพทางนิติวิทยาศาสตร์น่าจะเปิดเผยข้อมูลได้มากขึ้น"
 cstorms.5085.name: "$FORENSIC_DISSECTION_PROJECT$"
 cstorms.5085.desc: "หลังจากการชำแหละอย่างระมัดระวัง สายพันธุ์ดั้งเดิมของก้อนเนื้อนี้ยังคงเป็นปริศนา ความเสียหายร้ายแรงที่ได้รับ ณ ใจกลางพายุได้ทำลายลักษณะเด่นหรือตัวบ่งชี้ทางพันธุกรรมที่ระบุได้ไปจนหมดสิ้น\n\nอย่างไรก็ตาม ในระหว่างกระบวนการศึกษานี้ เราได้รับข้อมูลเชิงลึกเกี่ยวกับองค์ประกอบของ §Yพายุคอสมิก§! และผลกระทบอันเลวร้ายต่อสสารทางชีววิทยาต่างดาว"
 cstorms.5085.evopred: "มื้ออาหารที่น่าทึ่ง"

 STORMS_DISPLACED_TIYANKI: "ทียานกิพลัดหลง"
 STORMS_DISPLACED_TIYANKI_DESC: "หลังจากสิ้นสุดพายุ $default_storm$ เซนเซอร์ของเราตรวจพบสัญญาณของทียานกิสามตัวในระบบสุริยะ §H[solar_system.GetName]§!"
 cstorms.5090.name: "$STORMS_DISPLACED_TIYANKI$"
 cstorms.5090.desc.common: "สัญญาณทียานกิทั้งสามตัวในระบบสุริยะ §H[solar_system.GetName]§! ได้รับการระบุว่าเป็นลูกทียานกิที่ผลัดหลงและขาดสารอาหาร\n\n§Y$default_storm$§! ได้แยกพวกมันออกจากฝูงใหญ่ ทำให้ต้องเผชิญชะตากรรมด้วยตนเอง\n\nพวกมันไม่น่าจะรอดชีวิตได้นานในอวกาศอันกว้างใหญ่ เซนเซอร์ของเราแสดงให้เห็นว่าพวกมันพยายามส่งสัญญาณเรียกฝูง แต่ไม่ประสบความสำเร็จ"
 cstorms.5090.desc.swarm: "ไม่ทำอะไรเลยนอกจากเฝ้าสังเกตการณ์"
 cstorms.5090.desc.default: "ระบบสื่อสารของเราสามารถใช้เพื่อขยายสัญญาณเสียงร้องขอความช่วยเหลือและดึงดูดฝูงของพวกมันเข้ามาในระบบสุริยะนี้ได้"
 cstorms.5090.a.default: "ขยายสัญญาณของพวกมัน"
 cstorms.5090.a.swarm: "วางเหยื่อล่อกับดัก"
 cstorms.5090.b.default: "ดาวเคราะห์สลายตัว"
 cstorms.5090.b.machine: "เริ่มมาตรการกวาดล้าง"
 cstorms.5090.b.swarm: "มื้ออาหารฟรี"
 cstorms.5090.c: "มอบบ้านหลังใหม่ให้พวกมัน"
 cstorms.5090.c.tt: "เพิ่ม 3 §Y$NAME_Tiyanki_Hatchling$§! แบบสุ่มระดับความหายากไปยัง ['concept_vivarium'] ของคุณ"

 REUNITE_POD_PROJECT: "กิจกรรมเปลือกโลกที่รุนแรงจะทำให้ดาวเคราะห์ที่ชนกันแตกสลายออก - ทำลายโลกทั้งสองดวงในกระบวนการนี้"
 REUNITE_POD_PROJECT_DESC: "ลูกทียานกิสามตัวหลงทางและร่อนเร่อยู่ในระบบสุริยะ [this.solar_system.GetName] เนื่องจากถูกพายุคอสมิกแยกออกจากฝูง เราสามารถช่วยพาพวกมันกลับเข้าฝูงได้โดยการขยายเสียงร้องเพื่อดึงดูดสมาชิกที่เหลือของฝูงมายังระบบสุริยะนี้"

 cstorms.5095.name: "ทียานกิได้พบกันอีกครั้ง"
 cstorms.5095.desc.common: "โลกดวงนี้จะแตกดับหลังจากเวลาผ่านไป 50 ปี"
 cstorms.5095.desc.swarm: "แน่นอนว่า สัตว์ร้ายตัวใหญ่พวกนี้แหละคือรางวัลที่แท้จริง พร้อมสำหรับการชำแหละแล้ว"

