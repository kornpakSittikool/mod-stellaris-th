 gov_storm_chasers: "สภาผู้อาวุโส"
 gov_storm_chasers_desc: "สมาชิกของสภาผู้ปกครองอันยอดเยี่ยมนี้มีความเชี่ยวชาญในการแสดงพละกำลังทางกายที่ท้าทายความตาย ด้วยการปีนยอดเขาที่สูงที่สุดหรือขี่เกลียวคลื่นที่ใหญ่ที่สุด พวกเขาอุทิศชีวิตให้กับการแสวงหาประสบการณ์ดิบๆ อย่างแน่วแน่ สิ่งนี้ทำให้พวกเขาได้รับความไว้วางใจจากชุมชน และได้รับสิทธิ์ในการกำหนดทิศทางเพื่อก้าวไปข้างหน้า\n\nสมาชิกสภาจะถูกเรียกว่า \"ผู้อาวุโส\" (ผู้ประกาศ)โดยไม่เกี่ยงเรื่องอายุ เนื่องจากวีรกรรมของพวกเขาได้รับการยกย่องว่าเป็นระดับตำนาน ชื่อของพวกเขาจะถูกจดจำไปอีกยาวนาน"
 RT_ELDER_SPEAKER: "ประธานสภาผู้แทนราษฎรอาวุโส"
 RT_ELDER_SPEAKER_FEMALE: "$RT_ELDER_SPEAKER$"

