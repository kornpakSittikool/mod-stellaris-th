# Storm Technology
 tech_storm_manipulation: "การจัดการพายุ"
 tech_storm_manipulation_desc: "ด้วยการใช้หลักการเบื้องหลังเทคโนโลยีต้านภัยพายุ เราสามารถเริ่มควบคุมจัดการธรรมชาติทางอุตุนิยมวิทยาอวกาศของกาแล็กซีเพื่อตอบสนองความต้องการของเราเองได้"
 tech_advanced_storm_manipulation: "การจัดการพายุขั้นสูง"
 tech_advanced_storm_manipulation_desc: "การศึกษาอุตุนิยมวิทยาอวกาศอย่างต่อเนื่องมอบพลังให้เราสามารถหักเหและควบคุมจัดการ §Yพายุคอสมิก(พายุเย็น)§! ได้อย่างแม่นยำยิ่งขึ้นเพื่อตอบสนองความต้องการของเราเอง"
 tech_industrial_storm_protection: "การลดผลกระทบของพายุที่มีต่อดาวเคราะห์"
 tech_industrial_storm_protection_desc: "เครือข่ายสื่อสารสภาพอากาศนี้ช่วยบรรเทาความเสียหายที่เกิดจากภัยพิบัติสภาพอากาศคอสมิก การผลิตจะได้รับผลกระทบน้อยลงจากพายุใหญ่ของกาแล็กซีที่เคลื่อนผ่าน"
 tech_advanced_industrial_storm_protection: "การลบล้างผลกระทบของพายุที่มีต่อดาวเคราะห์"
 tech_advanced_industrial_storm_protection_desc: "ด้วยการรวมระบบควบคุมสภาพอากาศท้องถิ่น รูปแบบสภาพอากาศบนดาวเคราะห์จะสามารถถูกควบคุมเพื่อลดผลกระทบที่เป็นอันตรายส่วนใหญ่ของพายุคอสมิกที่มีต่อการผลิตได้อย่างมีนัยสำคัญ"

 tech_storm_prediction_1: "แบบจำลองสภาพอากาศคอสมิก"
 tech_storm_prediction_1_desc: "การใช้แบบจำลองสภาพอากาศทางวิทยาศาสตร์ทำให้เราสามารถติดตามการเคลื่อนที่และการก่อตัวของ §Yพายุคอสมิก(พายุเย็น)§! ที่กำลังใกล้เข้ามาได้"
 tech_storm_prediction_1_title: "§Hปลดล็อกคุณสมบัติ§!: พยากรณ์อากาศอวกาศ"
 tech_storm_prediction_1_tooltip: "ปลดล็อกความสามารถในการดู §Yการคาดการณ์การก่อตัวของพายุคอสมิก§! และ §Yการคาดการณ์การเคลื่อนที่ของพายุคอสมิก§! ใน §Yโหมดแผนที่พยากรณ์อากาศ§!"
 tech_storm_prediction_2: "ความน่าจะเป็นปัจจุบัน"
 tech_storm_prediction_2_desc: "ด้วยการประยุกต์ใช้กระแสความน่าจะเป็นกับแบบจำลองสภาพอากาศทางวิทยาศาสตร์ ความสามารถของเราในการติดตามการเคลื่อนตัวและการก่อตัวของ §Yพายุคอสมิก(พายุเย็น)§! ที่กำลังใกล้เข้ามาจึงเพิ่มขึ้นอย่างมาก"
 tech_storm_prediction_2_title: "§Hอัปเกรดคุณสมบัติ§!: พยากรณ์อากาศอวกาศ"
 tech_storm_prediction_2_tooltip: "เพิ่มระยะการคาดการณ์ของ §Yการคาดการณ์การก่อตัวของพายุคอสมิก§! และ §Yการคาดการณ์การเคลื่อนที่ของพายุคอสมิก§! ใน §Yโหมดแผนที่พยากรณ์อากาศ§! ให้มีประสิทธิภาพสูงสุด"
 tech_ship_hull_storm_breaker_1: "เครื่องลดแรงสั่นสะเทือนจากพายุคอสมิก"
 tech_ship_hull_storm_breaker_1_desc: "เครื่องกำเนิดสนามพลังช่วยลดทอนเหล่านี้มอบการปกป้องที่จำเป็นอย่างยิ่งให้แก่ยานพาหนะอวกาศที่ต้องเดินทางผ่านพายุคอสมิก"
 tech_ship_hull_storm_breaker_2: "สารเคลือบป้องกันพายุคอสมิก"
 tech_ship_hull_storm_breaker_2_desc: "การเคลือบพิเศษนี้จะช่วยกระตุ้นพื้นผิวภายนอกของยานด้วยสนามพลังลดทอนอิทธิพลของพายุ นำไปสู่การปกป้องที่มีประสิทธิภาพยิ่งขึ้นในการรับมือกับพายุ"
 tech_ship_storm_weapons_1: "การเสริมความแข็งแกร่งของที่เก็บอาวุธ"
 tech_ship_storm_weapons_1_desc: "แนวทางใหม่ในการใช้โลหะผสมในงานด้านการทหารช่วยลดผลกระทบของพายุคอสมิกในการรบกวนอาวุธพลังงานและหัวรบระเบิดได้อย่างมีนัยสำคัญ"
 tech_ship_storm_weapons_2: "สถาปัตยกรรมสี่เหลี่ยม"
 tech_ship_storm_weapons_2_desc: "สถาปัตยกรรมยานอวกาศรูปแบบใหม่นี้จะช่วยลดผลกระทบเชิงลบของพายุคอสมิกที่มีต่อระบบอาวุธของเราได้อย่างมีนัยสำคัญ"

 feature_sustain_cosmic_storm_unlocked: "การรักษาและค้ำจุนพายุคอสมิก"
 feature_sustain_cosmic_storm_unlocked_desc: "สามารถใช้ยานวิจัยวิทยาศาสตร์ให้หยุดและคง §Y$default_storm$§! ได้โดยไม่มีกำหนด"
 FLEETORDER_SUSTAIN_COSMIC_STORM: "รักษาค้ำจุนพายุคอสมิก $STORM|Y$ ใน $SYSTEM|Y$"
 FLEETORDER_SUSTAIN_COSMIC_STORM_BUTTON: "รักษาและค้ำจุน §Yพายุคอสมิก§!"
 FLEETORDER_SUSTAIN_COSMIC_STORM_CANCELLED: "§Rพายุคอสมิกที่กำลังเคลื่อนตัวตามมาได้สลายตัวไปแล้ว§!"

