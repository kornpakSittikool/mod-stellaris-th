 gravity_storm_aftermath_modifier: "การไหลของแรงโน้มถ่วง"
 gravity_storm_aftermath_modifier_tooltip: "$STORM_AFTERMATH_DESC$\n$t$- §H$gravity_storm_aftermath_modifier$§!:\n$tt$- §R+25%§! ถึง §R+100%§! $mod_planet_structures_cost_mult$\n$tt$- §G+20%§! ถึง §G+60%§! $mod_planet_bureaucrats_unity_produces_mult$"
 gravity_storm_aftermath_modifier_severity_desc: "ในขณะที่ระดับแรงโน้มถ่วงที่ผันผวนจาก $gravity_storm$ ทำให้การก่อสร้างทำได้ยากลำบาก แต่ก็ช่วยให้เกิดความเข้าใจที่ลึกซึ้งและไม่เหมือนใครเกี่ยวกับแรงโน้มถ่วงและอวกาศ-เวลา"
 gravity_storm_aftermath_modifier_severity_1: "ผลที่ตามมา: $gravity_storm_aftermath_modifier$"
