 cstorms.2240.name: "เนตรแห่งสมาสัญญา"
 cstorms.2240.desc: "พิกัดได้เปิดเผยระบบดาวที่เคยซ่อนอยู่จากการสแกนของเรา ถึงเวลาที่จะไปเยือนสมาสัญญา adAkkaria แล้ว ก่อนที่ใครอื่นจะไปถึง

โครงการพิเศษใหม่ได้รับการประกาศ"
 cstorms.2245.name: "ความว่างเปล่าเพรียกหา"
 cstorms.2245.desc: "เพียงไม่นานหลังจากออกจากถิ่นอาศัย [event_target:leader_patriotic_institute.GetName] ได้ตัดสินใจอย่างกะทันหันและน่าประหลาดใจ ราวกับถูกขับเคลื่อนด้วยพลังภายนอก [event_target:leader_patriotic_institute.GetHeShe] ได้สั่งให้เปิดช่องสัญญาณการสื่อสารในความถี่ที่เชื่อมโยงกับเหตุการณ์มวลพลังจิตหรือการพัดผ่าน of พายุคอสมิกที่สลายตัวได้ง่าย

ช่องสัญญาณพุ่งตรงไปยังพิกัดเดียวกันกับระบบดาวบ้านเกิดของสมาสัญญา adAkkaria (dAkkaria Convention) ใช้เวลาเพียงชั่วพริบตาการติดต่อของเราก็ได้รับการตอบรับ"
 cstorms.2245.desc.gestalt: "เพียงไม่นานหลังจากออกจากถิ่นอาศัย จิตสำนึกกลุ่มของเราก็ถูกรบกวนด้วยแรงสั่นสะเทือนที่ผิดปกติ ราวกับมีบางสิ่งพยายามสื่อสารกับเราจากระยะไกล สัญญาณมีต้นทางมาจากพิกัดเดียวกับระบบดาวบ้านเกิดของสมาสัญญา adAkkaria และอยู่ในความถี่ที่เชื่อมโยงกับเหตุการณ์มวลพลังจิตหรือการพัดผ่านของพายุคอสมิกที่สลายตัวได้ง่าย

การติดต่อกลับของเราได้รับการตอบรับในทันที"
 cstorms.2250.name: "พายุเพรียกหา"
 cstorms.2250.desc: "เราทำทุกวิถีทางแล้ว แต่การเดินทางไปยัง adSul กลับเป็นความท้าทายที่ยิ่งใหญ่กว่าที่คาดคิดไว้มาก ทั่วทั้งระบบดาวถูกปกคลุมไปด้วยพายุคอสมิกที่ไม่ทราบส่วนประกอบ ทำให้เราไม่สามารถเข้าใกล้ดาวเคราะห์ได้มากกว่านี้

ส่วนพายุนั้น ดูเหมือนมันกำลัง... ติดต่อเรางั้นหรือ?"

# The Storm
 cstorms.2260.name: "พายุ"
 cstorms.2260.desc: "เอ่ยชื่อของพวกเรา

