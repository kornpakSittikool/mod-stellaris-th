 NAME_adSul: "adSul"

 project_adakkaria_benevolent_grounds: "ลานแห่งความเมตตา"
 project_adakkaria_benevolent_grounds_DESC: "เรากู้พิกัดไปยังโลกบ้านเกิดของสมาสัญญา adAkkaria สำเร็จ

การสำรวจระบบและดาวเคราะห์นี้ในที่สุดก็อาจเผยชะตากรรมของอารยธรรม adAkkaria"

# Celebration
 site_adakkaria_celebration: "การเฉลิมฉลอง"
 site_adakkaria_celebration_intro: "หลังจากการติดต่อกับพายุคอสมิก พื้นที่เล็กๆ ของ adSul ก็ถูกเผยแก่เรา ท่ามกลางหมู่เมฆเศษซากมีกลุ่มสิ่งก่อสร้างขนาดใหญ่ตระหง่านอยู่ แม้จะถูกทิ้งร้างแต่กลับไม่มีผลกระทบจากกาลเวลานับยุคสมัย ผลสแกนเผยให้เห็นวัตถุอินทรีย์ที่อยู่ภายใน

สิ่งที่ตั้งตระหง่านอยู่หน้าอาคารมหึมาคือแนวธงยาวที่ประกาศคำประกาศสั้นๆ ว่า: ถึงเวลาแห่งการเฉลิมฉลองแล้ว"

 cstorms.2285.name: "ความว่างเปล่าที่ถูกบังคับ"
 cstorms.2285.desc: "ห้องโถงที่ว่างเปล่าของการเฉลิมฉลองไม่ได้เปิดเผยสิ่งใดมากไปกว่าฝุ่นผงแห่งยุคสมัย โปสเตอร์โฆษณาชวนเชื่อที่เชิดชูความกล้าหาญของสมาสัญญา adAkkaria ชั่วนิรันดร์ คือสิ่งเดียวที่หลงเหลือจากจักรวรรดิที่เคยรุ่งเรืองและน่าเกรงขามนี้

อย่างไรก็ตาม ความพยายามทางภาษาศาสตร์ของเราเห็นผลแล้ว ระบบรักษาความปลอดภัยเป็นเพียงแค่คำแนะนำ และโครงข่ายส่วนกลางก็ยอมคายความลับออกมาอย่างง่ายดาย

บันทึกข้อมูลที่เรากู้คืนมาได้เต็มไปด้วยกิจกรรมต่างๆ จนกระทั่งถึงช่วงสุดท้ายของการออกอากาศจากสถานีชวนเชื่อ

ณ วันนั้น สมาสัญญา adAkkaria แห่งความเมตตาก็สูญสลายไปโดยสิ้นเชิง"
 cstorms.2290.name: "การดิ่งสู่กลุ่มผู้ถูกสาป"
 cstorms.2290.desc: "ด้วยความรู้สึกหวั่นเกรงและใคร่รู้ เราได้ดำดิ่งลงสู่ชั้นใต้ดินของอาคาร โครงข่ายห้องปฏิบัติการที่แผ่ขยายออกไปและวางแผนอย่างรอบคอบได้ต้อนรับเรา หน่วยของเราแบ่งออกเป็นสองกลุ่ม: ครึ่งหนึ่งถูกส่งไปตรวจสอบห้องปฏิบัติการเพื่อหาข้อมูลเพิ่มเติมเกี่ยวกับวัตถุประสงค์ของการเฉลิมฉลอง ส่วนอีกครึ่งหนึ่งเดินทางต่อลงไปข้างล่าง

ผลสแกนของเรายืนยันว่าตรวจพบวัตถุอินทรีย์ และใช้เวลาไม่นานก็พบสาเหตุ: ชั้นล่างของการเฉลิมฉลองถูกใช้เป็นห้องสังเกตการณ์โดยเฉพาะ ซากมัมมี่ของพลเมือง adAkkaria ยังคงถูกคุมขังอยู่ในห้องที่คับแคบเหล่านี้ อินเตอร์เฟสดิจิทัลข้างแต่ละห้องระบุชื่อของผู้ถูกขัง ระยะการทดลองที่พวกเขาต้องเผชิญ และบันทึกของผู้สังเกตการณ์

ในขณะเดียวกัน เราได้กู้คืนข้อความดังต่อไปนี้:
§Lการทดลองงานของเราในระบบดาว Haliios ล้มเหลวอย่างสิ้นเชิง การส่งตัวกลุ่มตัวอย่างที่ชื่อว่า §ShaToor Gailon§! ในช่วงแรกเป็นไปตามแผน ทันทีที่เราเผชิญหน้ากับกองกำลังป่าเถื่อน Solphani ตัวอย่างก็สูญเสียการควบคุม แม้ว่าพายุจะกวาดล้างกองทัพของพวกคนป่าเถื่อนไปได้ แต่กองทัพของเราก็พังพินาศย่อยยับเช่นกัน

ควรเข้าใจว่าเหนือสิ่งอื่นใด กลุ่มตัวอย่างเหล่านี้เป็นพวกที่เลวทรามและแปรปรวน ยิ่งนำผู้อัญเชิญ (Invocator) ออนไลน์ได้เร็วเท่าไหร่ก็ยิ่งดีเท่านั้น§!"
 cstorms.2290.a: "พวกเขากำลังทำอะไรกันที่นี่?"
 cstorms.2290.a.gen: "ความตายมากมายช่างน่าสร้างแรงบันดาลใจ"
 cstorms.2295.name: "การเฉลิมฉลองบางอย่าง"
 cstorms.2295.desc.start.authgen: "การทดลองที่ดำเนินการโดยสมาสัญญา adAkkaria นั้นน่าหลงใหลอย่างยิ่ง ผู้ต้องขังแต่ละคนจะถูกกำหนดระยะการทดลอง และเมื่อระยะการทดลองสูงขึ้น ความโหดร้ายของการทารุณกรรมก็เพิ่มขึ้นด้วย วิธีการที่สร้างสรรค์เป็นพิเศษบางอย่างโดดเด่นขึ้นมา: การใช้ไฟและไฟฟ้าเพื่อกระตุ้นการสะสมพลังจิตของร่างกาย การตัดอวัยวะสำคัญออกเพื่อกระตุ้นพลังงานที่เพิ่งก่อตัวขึ้นและการใช้ประสาทสัมผัสอื่นๆ และการใช้สารควบคุมจิตใจเพื่อนำไปสู่สภาวะใกล้ตาย

มีแรงบันดาลใจให้เก็บเกี่ยวจากที่นี่อย่างแน่นอน ผู้เชี่ยวชาญเหล่านี้ทำงานเพื่อมุ่งสู่เป้าหมายเดียวกัน นั่นคือการก้าวขึ้นสู่ความเป็นใหญ่ของ adAkkaria (adAkkarian Supremacy) ในกาแล็กซี

กระนั้น รายงานยังระบุอีกว่าอาจไม่ใช่การรักษานี้ที่คร่าชีวิตกลุ่มตัวอย่าง เช่นเดียวกับ §ShaToor Gailon§! หลายคนดูเหมือนจะยอมแพ้ไปเฉยๆ"
 cstorms.2295.desc.start.default: "ความสะพรึงกลัวและความสับสนที่เราพบเจอจากการเห็นซากศพของเหยื่อนั้นน่าหวาดหวั่น แต่ความปรารถนาของเราที่จะทำความเข้าใจขอบเขตและวัตถุประสงค์ของการทดลองของสมาสัญญาก็มีมากไม่แพ้กัน

เหล่านักวิทยาศาสตร์ adAkkaria รายงานสิ่งที่พวกเขาทำกับคนเหล่านี้ด้วยน้ำเสียงที่เย็นชาและไร้ความรู้สึก เหยื่อแต่ละรายจะถูกกำหนดระยะการทดลอง และเมื่อระยะเพิ่มขึ้น ความโหดร้ายทารุณก็เพิ่มขึ้นตามไปด้วย ไฟ ไฟฟ้า การทำให้พิการ การลิดรอนประสาทสัมผัสและปัจจัยยังชีพ - ไม่มีสิ่งใดที่โหดร้ายเกินไป ทุกอย่างทำไปเพื่อภารกิจอันรุ่งโรจน์ในการรักษาความเป็นใหญ่ของ adAkkaria ในกาแล็กซี กระนั้น รายงานยังระบุอีกว่าแม้แต่ความป่าเถื่อนเหล่านี้ก็อาจไม่ได้คร่าชีวิตกลุ่มตัวอย่างในท้ายที่สุด เช่นเดียวกับ §ShaToor Gailon§! หลายคนดูเหมือนจะยอมแพ้ไปเฉยๆ"
 cstorms.2295.desc.end.default: "เพียงไม่นานหลังจากที่เราเฝ้าสังเกตการณ์ [Root.GetLeaderName] ก็ทรุดตัวลง ท่ามกลางเสียงร้องด้วยความเจ็บปวด [Root.GetLeaderName] กรีดร้องว่ามีบางสิ่งกำลังเจาะสมอง [Leader.GetHerHis] เข้ามา!

แม้ว่าตอนนี้จะเริ่มคงที่แล้ว แต่ดูเหมือนว่ามีเอนทิตีผู้บุกรุกบางอย่างพยายามฝังความเข้าใจที่แปลกใหม่ให้กับ [Leader.GetHerHim] ทางด้าน [Root.GetLeaderName] กระตือรือร้นที่จะลองอีกครั้ง โดยเชื่อว่าประสบการณ์นี้อาจส่งผลกระทบอย่างลึกซึ้งในที่สุด"
 cstorms.2295.desc.end.psionic: "ขณะที่ [Leader.GetHeShe] เฝ้ามองร่างเหล่านี้ [Root.GetLeaderName] ก็เริ่มได้ยินเสียงกระซิบที่แปลกประหลาด เสียงที่ไร้ร่างซึ่งร้องเรียกด้วยความโหยหาอย่างยิ่ง:
§Lพวกเราจงรักภักดี! พวกเราแซ่ซ้องสมาสัญญา และเชื่อมั่นในภารกิจของมัน
พายุคอยเรียกหาพวกเรา พวกมันกลืนกินพวกเรา ปรารถนาพวกเรา!
พวกเราทำตามที่พวกมันต้องการ พวกเรามีพรสวรรค์และไม่ยอมจำนน!
พวกมันตราหน้าว่าพวกเราชั่วร้าย พวกมันตราหน้าว่าพวกเราเป็นกบฏ พวกมันฆ่าเพื่อนของเรา!

นี่มันควรจะเป็นการเฉลิมฉลองสิ§!

เสียงกระซิบนำทางเราไปยังระเบียงทางเดินที่ติดป้ายว่า 'ระยะสุดท้าย' แต่มาตรการรักษาความปลอดภัยที่ล้ำสมัยในพื้นที่นั้นไม่อนุญาตให้เข้าถึง"
 cstorms.2295.desc.end.psionic_individual_robot: "ขณะที่ [Leader.GetHeShe] วิเคราะห์ร่างเหล่านี้ [Root.GetLeaderName] ก็เริ่มตรวจพบสัญญาณส่งทางจิตที่สามารถตีความได้:
§Lพวกเราจงรักภักดี! พวกเราแซ่ซ้องสมาสัญญา และเชื่อมั่นในภารกิจของมัน
พายุคอยเรียกหาพวกเรา พวกมันกลืนกินพวกเรา ปรารถนาพวกเรา!
พวกเราทำตามที่พวกมันต้องการ พวกเรามีพรสวรรค์และไม่ยอมจำนน!
พวกมันตราหน้าว่าพวกเราชั่วร้าย พวกมันตราหน้าว่าพวกเราเป็นกบฏ พวกมันฆ่าเพื่อนของเรา!

นี่มันควรจะเป็นการเฉลิมฉลองสิ§!

สัญญาณนำทางเราไปยังระเบียงทางเดินที่ติดป้ายว่า 'ระยะสุดท้าย' แต่มาตรการรักษาความปลอดภัยที่ล้ำสมัยในพื้นที่นั้นไม่อนุญาตให้เข้าถึง"
 cstorms.2295.desc.end.psionic_gestalt: "ขณะที่เราสำรวจร่างต่างๆ เสียงใหม่ก็ได้ไหลผ่านกลุ่มจิตสำนึกร่วม โดยใช้ [Root.GetLeaderName] เป็นตัวกลางในการสื่อสาร:
§Lพวกเราจงรักภักดี! พวกเราแซ่ซ้องสมาสัญญา และเชื่อมั่นในภารกิจของมัน
พายุคอยเรียกหาพวกเรา พวกมันกลืนกินพวกเรา ปรารถนาพวกเรา!
พวกเราทำตามที่พวกมันต้องการ พวกเรามีพรสวรรค์และไม่ยอมจำนน!
พวกมันตราหน้าว่าพวกเราชั่วร้าย พวกมันตราหน้าว่าพวกเราเป็นกบฏ พวกมันฆ่าเพื่อนของเรา!

นี่มันควรจะเป็นการเฉลิมฉลองสิ§!

เสียงนั้นนำทางเราไปยังระเบียงทางเดินที่ติดป้ายว่า 'ระยะสุดท้าย' แต่มาตรการรักษาความปลอดภัยที่ล้ำสมัยในพื้นที่นั้นไม่อนุญาตให้เข้าถึง"
 cstorms.2295.desc.end.gestalt: "เกิดความบิดเบี้ยวที่แปลกประหลาดขึ้นอีกในกระบวนการรับรู้ของ [controller.GetIndividualNamePlural] ของเรา ทำให้เกิดความคิดที่ไม่ใช่ของตัวเราเอง ผ่านกระบวนการดังกล่าว เราได้เรียนรู้ว่ากลุ่มตัวอย่างของสถาบันพูดคุยกันผ่านช่องทางที่ไม่ใช่ทางกายภาพ ซึ่งเป็นการส่งสัญญาณที่เกือบจะทันทีทันใดคล้ายกับจิตร่วมในระยะเริ่มแรก

แม้ว่าเราจะไม่สามารถถอดรหัสคำพูดที่แน่นอนได้ แต่วัตถุประสงค์ของการพูดคุยนั้นชัดเจน: การก่อกบฏกำลังก่อตัวขึ้นภายในการเฉลิมฉลอง"
