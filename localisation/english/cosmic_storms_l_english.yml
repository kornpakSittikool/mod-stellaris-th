 MESSAGE_STORM_INTRO: "พายุนี้จะส่งผลกระทบร้ายแรงต่ออาณานิคม และขัดขวางการเข้าถึงความเร็วฉุกเฉินของกองยานของเรา ขอแนะนำเป็นอย่างยิ่งให้ดำเนินมาตรการป้องกันไว้ล่วงหน้า\n\n"

 MESSAGE_ELECTRIC_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$เม อร์ต STRSRO$ประจุไฟฟ้าที่รุนแรงซึ่งมาพร้อมกับพายุจะเป็นอันตรายต่อระบบโล่ของกองยานเรา อย่างไรก็ตาม เราคาดว่าจะมีการผลิตของอาณานิคมและความเร็วของยานเพิ่มขึ้นอย่างมากเนื่องจากพลังงานอันอุดมสมบูรณ์ที่มีอยู่ในพายุ"

 MESSAGE_SOLAR_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$เม อร์ต STRSRO$รังสีจากพายุนี้จะทำให้กองยานที่ติดอยู่ข้างในถูกมองเห็นได้โดยทุกคนที่มีพายุนี้อยู่ในเครื่องสแกน แม้ว่าสิ่งนี้จะทำให้เกิดความเสี่ยงด้านความปลอดภัยอยู่บ้าง แต่สถานีของเราจะทำงานได้อย่างมีประสิทธิภาพมากขึ้นภายใต้สภาวะเหล่านี้"

 MESSAGE_CELESTIAL_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$เม อร์ต STRSRO$พายุประเภทนี้จะรบกวนเซนเซอร์ของเรา ทำให้เราไม่สามารถตรวจจับกองยานอื่นภายในระบบเหล่านี้ได้และจะทำให้การเดินทางในอวกาศช้าลง แม้จะมีความเสี่ยงเหล่านี้ แต่เราก็น่าจะสามารถใช้สภาวะเหล่านี้ให้เป็นประโยชน์และเพิ่มผลผลิตของงานบางประเภทได้ตลอดช่วงเวลาของพายุ"

 MESSAGE_NEXUS_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$เม อร์ต STRSRO$พายุประเภทนี้มีความเสี่ยงสูงอย่างยิ่งต่ออาณานิคม กองยาน และสถานีของเรา พวกมันจะได้รับความเสียหายอย่างหนักจนกว่าพายุจะผ่านพ้นไป"

 MESSAGE_SHROUD_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$เม อร์ต STRSRO$พลังงานไซโอนิกที่หนาแน่นในพายุนี้จะลดความมั่นคงในอาณานิคมของเราลงอย่างมาก แต่จะช่วยเพิ่มประสิทธิภาพในการหลบหลีกของกองยาน"

 MESSAGE_SHROUD_STORM_COSMIC_STORM_SPOTTED_SHROUD_BREACHED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$เม อร์ต STRSRO$พลังงานไซโอนิกที่หนาแน่นในพายุนี้จะลดความมั่นคงในอาณานิคมของเราลงอย่างมาก แต่ความรู้ของเราในการเดินทางผ่านเดอะชราวด์จะช่วยเราในเรื่องประสิทธิภาพของกองยานและผู้ใช้โทรจิตของเรา\n\nเดอะชราวด์กำลังสั่นไหว... เราต้องเตรียมพร้อมสำหรับทุกสิ่ง"

 MESSAGE_GRAVITY_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$เม อร์ต STRSRO$อิทธิพลของแรงโน้มถ่วงที่รุนแรงของพายุนี้จะสร้างความยากลำบากต่อการปฏิบัติการของกองยานอย่างต่อเนื่อง โดยยานขนาดใหญ่ของเราจะมีความเสี่ยงสูงสุด\n\nแม้จะมีปัญหาเหล่านี้ แต่อาณานิคมของเราจะสามารถใช้ประโยชน์จากสภาพแวดล้อมที่รุนแรงนี้เพื่อเพิ่มประสิทธิภาพในการทำงานบางประเภทได้"

 MESSAGE_MAGNETIC_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$เม อร์ต STRSRO$พลังแม่เหล็กที่รุนแรงของพายุนี้จะทำให้ระบบซ่อมบำรุงกองยานและโครงสร้างของเราปั่นป่วน\n\nพลังแม่เหล็กของพายุสร้างการทำงานร่วมกันที่คาดไม่ถึงกับเทคนิคโลหวิทยาขั้นสูงของเรา ปฏิกิริยานี้จะช่วยลดต้นทุนที่เกี่ยวข้องกับนักโลหวิทยาของเราได้ตลอดระยะเวลาของเหตุการณ์ในระดับดาราจักรนี้"

 MESSAGE_PARTICLE_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$เม อร์ต STRSRO$ความหนาแน่นของเศษอนุภาคในพายุนี้จะส่งผลกระทบร้ายแรงต่อยานและสถานี โดยจะทำให้ระบบฟื้นฟูโล่หยุดทำงานโดยสิ้นเชิง กองยานที่มีความกล้าพอที่จะเผชิญหน้าอยู่ภายในควรเตรียมพร้อมรับมือกับสภาพแวดล้อมที่เป็นอันตรายอย่างยิ่ง"

