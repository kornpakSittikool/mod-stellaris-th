 TUTORIAL_STORM_PROTECTION_TITLE: "บทช่วยสอน: พายุคอสมิก"
 TUTORIAL_STORM_PROTECTION_DESC: "§Sพายุคอสมิก§! เป็นกองกำลังธรรมชาติที่น่าเกรงขาม พวกมันอาจส่งผลกระทบร้ายแรงต่อกองยาน เศรษฐกิจ และแม้กระทั่งประชากรของเรา อย่างไรก็ตาม พวกมันก็สามารถมอบโอกาสที่ยิ่งใหญ่ได้เช่นกัน\n\nการวิจัย §Sเทคโนโลยีพายุ§! จะช่วยปลดล็อกอาคารและเทคโนโลยีเพื่อ §Sลด§! §Sผลกระทบ§! ด้านลบของพายุลงอย่างมาก และด้วย §Sการวิจัยเพิ่มเติม§! เราก็น่าจะสามารถใช้ §Sประโยชน์§! จากพายุเหล่านี้ได้"

