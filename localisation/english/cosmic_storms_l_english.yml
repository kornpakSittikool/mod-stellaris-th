# Storm Chasers specific Progress Events

 progress.2.desc.storm.normal: "ในคําพูดของหนึ่ง[Root.Owner.GetScientist]\"รับภาระของผู้ชายคนนี้น้อย!\"ดังคำพูดของ [Root.Owner.GetScientist] ท่านหนึ่งว่า "
 progress.2.desc.storm.gestalt: "พวกเราสั่นสะท้านไปด้วยความตื่นเต้น\n\n$progress.2.desc.storm.outro$"
 progress.2.desc.storm.outro: "สิ่งมีชีวิตต่างดาว อยู่ที่นี่บน [From.GetName]! สิ่งมีชีวิตป่าเถื่อนเหล่านี้คงจะไม่พูดคุยกับเราในเร็วๆ นี้ แต่อย่างน้อยเราก็รู้ว่าเราไม่ได้อยู่อย่างโดดเดี่ยวในการเดินทางแห่งคอสมิกนี้\n\nในท้ายที่สุด กาแล็กซีนี้อาจจะเต็มไปด้วยสิ่งมีชีวิตมากมายก็เป็นได้"
 progress.3.desc.storm.normal: "\"ไม่สามารถแก้ไขได้\"[ruler.GetRegnalName]อุทาน. \"โลกใหม่สุกพร้อมโอกาส!\"\n\nขณะ ที่ เรา เปลี่ยน เรือ อาณานิคม ของ เรา ให้ เป็น ค่าย ฐาน นัก สํารวจ กลุ่ม แรก ได้ เตรียม พร้อม แล้ว ที่ จะ ประสบ สิ่ง ใด ก็ ตาม ที่ โลก นี้ เสนอ ให้."
 progress.3.desc.storm.gestalt: "การค้นพบอันน่าตื่นเต้น! โลกใบใหม่ที่เต็มไปด้วยโอกาส!!\n\nในขณะที่เราดัดแปลงยานอาณานิคมให้กลายเป็นค่ายฐาน โหนดการสำรวจก็เริ่มเตรียมพร้อมที่จะสัมผัสทุกสิ่งทุกอย่างที่โลกใบนี้จะมอบให้แล้ว"
 progress.3.a.storm: "มุ่งหน้าต่อไป"
 progress.4.desc.storm: "จากความเงียบสงัดของอวกาศ เสียงเรียกของเราได้รับการตอบรับแล้ว! อารยธรรมต่างดาวที่มีระดับเทคโนโลยีใกล้เคียงกัน พวกเขาต้องก้าวเข้าสู่การแข่งขันระดับกาแล็กซีในช่วงเวลาเดียวกับเราแน่นอน\n\nการปรากฏตัวของพวกเขาส่งสัญญาณถึงพรมแดนใหม่แห่งประสบการณ์ พวกเขาจะมาในฐานะพันธมิตรที่มีความคิดคล้ายคลึงกัน หรือคู่แข่งที่จะมาทดสอบความกล้าหาญของเรากันแน่? ไม่ว่าจะทางใด ความตื่นเต้นในสิ่งที่ไม่รู้ก็กวักมือเรียกพวกเราให้ก้าวไปข้างหน้า"
 progress.4.h.storm: "น่าสนใจเป็นอย่างยิ่ง"
 progress.5.desc.storm.normal: "เราได้ค้นพบสิ่งมีชีวิตในยุคก่อน[From.Planet.GetName]เป็นหนึ่งในพวกเรา[Root.Owner.GetScientistPlural]พูดง่ายๆว่า \"สิ่งเหล่านี้อาจจะดูเหมือนไม่มาก แต่ศักยภาพของมันคือขนาดใหญ่!\"พวกเราได้ค้นพบสิ่งมีชีวิตก่อนมีสติปัญญา(ความคุ้นเคย)บน [From.Planet.GetName] ดังที่ [Root.Owner.GetScientistPlural] ท่านหนึ่งได้กล่าวไว้ว่า "
 progress.5.desc.storm.gestalt: "พวกเราได้ค้นพบสิ่งมีชีวิตก่อนมีสติปัญญา(ความคุ้นเคย)บน [From.Planet.GetName]\n\nพวกเราตื่นเต้นที่จะได้เห็นผลลัพธ์จากศักยภาพของพวกเขา แต่สำหรับตอนนี้ พวกเขายังคงไม่มีสติปัญญา มันคงจะน่าสนใจไม่น้อยที่จะเฝ้าดูสิ่งมีชีวิตเหล่านี้เจริญเติบโตต่อไป"
 progress.5.h.storm: "สุดยอดไปเลย"
 progress.6.desc.storm: "จากความเงียบสงัดของอวกาศ เสียงเรียกของเราได้รับการตอบรับแล้ว! แต่ความรู้สึกแรกเริ่มนั้นไม่เข้าท่าเลย ผู้คนเหล่านี้ไม่ได้แบ่งปันวิถีทางเดียวกับเรา และรักที่จะอยู่กันเองอย่างเงียบๆ พวกเราควรถอยออกมาตั้งหลักก่อนจะดีกว่า"
 progress.6.h.storm: "พวกเขาควรจะปรับตัวตามยุคสมัยให้ทันนะ"
 pirate.1.desc.storm: "โจรสลัดอวกาศ! แค่คิดก็ตื่นเต้นแล้ว และกลุ่มที่เรียกตัวเองว่า §S[pirate_band.GetName]§! ได้หันมาเป้าหมายมาที่เราแล้ว\n\nแม้ว่าเราจะเคารพในการเลือกวิถีชีวิตของพวกเขา แต่ผลกระทบที่เกิดขึ้นกับเครือข่ายการค้าของเรานั้นค่อนข้างจะไม่น่าพิสมัยเท่าไรนัก"
 pirate.2.j.storm: "น่าเสียใจอย่างยิ่ง"

