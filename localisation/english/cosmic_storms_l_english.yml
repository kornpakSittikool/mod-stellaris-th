# Cosmic Storm Gateway Tech
 gateway_tech_advanced_storm_manipulation: "§Hเส้นทางการควบคุมพายุ§!\n§Eเทคโนโลยีนี้จะนำไปสู่ความก้าวหน้าเพิ่มเติมในสาขาการควบคุมพายุ§!"
 gateway_tech_advanced_industrial_storm_protection: "§Hเส้นทางการปกป้องจากพายุคอสมิก§!\n§Eเทคโนโลยีนี้จะนำไปสู่ความก้าวหน้าเพิ่มเติมในสาขาการป้องกันพายุคอสมิก§!"
 gateway_tech_storm_location_prediction: "§Hเส้นทางการพยากรณ์พายุคอสมิก§!\n§Eเทคโนโลยีนี้จะนำไปสู่ความก้าวหน้าเพิ่มเติมในสาขาการคาดการณ์พายุคอสมิก§!"
 gateway_tech_ship_hull_storm_breaker: "§Hเส้นทางการป้องกันตัวเรือจากพายุคอสมิก§!\n§Eเทคโนโลยีนี้จะนำไปสู่ความก้าวหน้าเพิ่มเติมในสาขาการปกป้องตัวยานจากพายุคอสมิก§!"
 gateway_tech_ship_hull_storm_weapons: "§Hเส้นทางการป้องกันอาวุธจากพายุคอสมิก§!\n§Eเทคโนโลยีนี้จะนำไปสู่ความก้าวหน้าเพิ่มเติมในสาขาการปกป้องระบบอาวุธจากพายุคอสมิก§!"

