 cstorms.230.desc: "การ กระจาย เสียง อีก อย่าง หนึ่ง ได้ รับ การ ระบุ ว่า น่า สังเกต. ถึงแม้ว่าจะเป็นงานที่น่าทึ่งอย่างชัดเจน แต่มันทําให้เรามีบริบทที่มีประโยชน์ สําหรับการสืบสวนของเรา\n\n§Sอากทาเมียน ริวัน§!\n§Lผมทราบมาว่า คุณไปเยี่ยมเอนทูล่า ซามานันอีกเมื่อคืนนี้ ข้าคิดว่าเจ้าทอดทิ้งพวกเขา เพื่อความรักของเรา§!\n\n§Sใน เอล คา อู เต§!\n§Lผมรับรองกับคุณว่า มันเป็นแค่การมาเยี่ยมอย่างสุภาพ รู้ไว้ซะ ว่าฉันทุ่มเทให้คุณ ไม่มีใครอื่น§!\n\n§Sอากทาเมียน ริวัน§!\n§Lปากคุณพูดอย่างนั้น แต่ความคิดของคุณ มันบอกฉันบางอย่าง บางสิ่งบางอย่างที่แตกต่างกัน§!\n\n§Sใน เอล คา อู เต§!\n§Lไม่ ไม่ใช่คุณเหมือนกัน§!\n\n§Sอากทาเมียน ริวัน§!\n§Lใช่ฉันเกินไป! ฉันค้นพบของขวัญไซโซนิคของฉันเมื่อคืนนี้ และ สิ่ง ที่ ผม คิด ว่า จะ เป็น การ สํารวจ ที่ น่า ยินดี เกี่ยว กับ ความ รู้สึก ส่วน ลึก ของ เรา กลาย เป็น ความ สิ้น หวัง! การกบฏในความคิดของคุณ!§!\n\n§Sใน เอล คา อู เต§!\n§Lคุณไม่เข้าใจ! ใจฉัน ฉันไม่สามารถช่วยได้ ฉันอดคิดไม่ได้ว่าเส้นทางนี้มันมีเหตุผล โอ ริวัน ถ้าของขวัญไซโอนิคใหม่ของเธอ ปล่อยให้เธออ่านใจฉัน แทนใจฉัน§!"
 cstorms.235.desc: "ของเรา[Root.Owner.GetLinguists]ได้ แปล ข่าว หลาย เรื่อง ด้วย. พวกเขาเชื่อว่าการออกอากาศครั้งนี้ คุ้มค่าต่อการให้ความสนใจ\n\n§Lรายงานจากระบบฮาลิโอส์ ทําให้เห็นภาพที่น่ากลัวมากขึ้นเรื่อยๆ ผู้มีอํานาจของโซลแฟนีขี้ขลาด ซุ่มโจมตีกองกําลังที่กล้าหาญของเรา ที่สถานที่อมยิ้ม!กระนั้น ก็ ดี ผู้ นํา ที่ ยิ่ง ใหญ่ ของ เรา กล่าว ว่า กระบวนการ นี้ จะ ไม่ ถูก ขัด จังหวะ. อย่างที่ยกมา: 'ผู้สนับสนุนของเรา ไม่ยอมแพ้ในพวกเรา และเราจะไม่ปล่อยพวกเขาให้ระเหเร่ร่อนอยู่ในความอับยศ\n\nนอก จาก นี้ ยัง มี ข่าว ลือ เกี่ยว กับ ความ ร่วม มือ ที่ อาจ เกิด ขึ้น ได้ ระหว่าง ผู้ มี อํานาจ ชั่ว ร้าย กับ ตัว แทน ของ ยู นิ คอม. แต่ปฏิเสธสังคมระหว่างดวงดาว สื่อสารกับผู้กดขี่ป่าเถื่อน และรัฐนี้ยังเป็นอีกตัวอย่าง\n\nแต่โดยมีหรือไม่มีพันธมิตรที่มีประสิทธิภาพ กระบวนการรู้แจ้งภาษาซัลฟานีอยู่ในช่วงวิกฤต มันไม่ง่ายที่จะหันหลังกลับไป แต่§!\n\n§Tโชคไม่ดีที่การออกอากาศที่เหลือ เสียหายเกินกว่าจะถอดรหัสได้ ของเรา[Root.Owner.GetEngineerPlural]ได้สร้างสําเนาฐานข้อมูลเรียบร้อยแล้ว ต่อ มา เรา หวัง ว่า จะ ได้ ข้อมูล เพิ่ม เติม จาก อารยธรรม ที่ ถูก ลืม ไป นาน แล้ว นี้.§!"
 cstorms.245.desc: "ผ่านพายุจักรวาลใน[planet_windswept_fates.System.GetName]ระบบได้ค้นพบเว็บไซต์ของความเป็นไปได้ ของความหมายโบราณคดีบน[planet_windswept_fates.GetName].\n\nสแกนเบื้องต้น§Y[planet_windswept_fates.GetName]§!บ่ง ชี้ ถึง บรรยากาศ ที่ ไม่ มั่นคง ที่ ก่อ ความ เสีย หาย อย่าง หนัก ซึ่ง พายุ ดาว เคราะห์ อัน กว้าง ใหญ่ ครอบ คลุม ภูมิ ประเทศ. ของเรา[Root.Owner.GetScientistPlural]ไม่เคยคาดหวังว่าเศษซาก อารยธรรมบนโลกเช่นนี้ และเชื่อว่าเราสามารถเรียนรู้ได้มาก จากการตรวจสอบ"
 cstorms.2105.desc: "ทีมของเรามาถึงอย่างปลอดภัย[From.Planet.GetName]และได้ไปทํางานสํารวจสภาพแวดล้อมใหม่อย่างรวดเร็ว\n\nจากที่เห็น พายุจักรวาลที่รุนแรงล่าสุด ที่รบกวนระบบนี้ นอกจากนี้ยังได้ค้นพบชั้นของฝุ่นและดินพอ\n\nขณะ ที่ นัก วิทยาศาสตร์ ของ เรา ขุด ค้น ต่อ ไป ใน การ ค้น พบ ทาง โบราณคดี เหล่า นี้ พวก เขา ตก ตะลึง เนื่อง จาก ข้อ เท็จ จริง ที่ ว่า ชั้น ทราย ที่ ปก คลุม ซาก ปรัก หัก พัง นั้น เป็น ส่วน ประกอบ ที่ ต่าง กัน อย่าง สิ้น เชิง กับ ดิน รอบ ๆ. สแกนดาวเคราะห์ แสดงให้เห็นว่าเงินมัดจําเหล่านี้ มาจากทะเลทรายหลายร้อยไมล์ และสามารถสิ้นสุดเพียงที่นี่ผ่านแรงที่ดี เช่น พายุดาวเคราะห์ที่รวดเร็วมาก"
 cstorms.2110.desc: "แม้ว่าจะมีสภาพอากาศแปลกๆมารบกวนดาวเคราะห์ดวงนี้[Root.Owner.GetScientistPlural]ได้มีความคืบหน้าอย่างมาก การ ค้น พบ ของ พวก เขา ยิ่ง น่า สะ พรึง กลัว และ รบกวน ใจ มาก ขึ้น ทุก ที.\n\nมันเริ่มจากเศษซากหินและถ่านวัสดุอินทรีย์ จากนั้นก็มีเศษผ้าฉีกขาด งานหนัง เสื้อกั๊กเคลือบด้วยโพลีเมอร์ และสุดท้ายก็เศษซากอินทรีย์ ของอดีตประชากรโลก\n\nร่าง กาย หลัง จาก ได้ รับ การ เปิด เผย อวัยวะ ที่ ผุ พัง ซึ่ง เต็ม ไป ด้วย ทราย และ ตะปู ของ พวก เขา ที่ สึก กร่อน เนื่อง จาก การ ต่อ สู้. แต่ละศพถูกบรรจุไว้อย่างหนัก[Root.Owner.GetPreFTLLowerPlural]อุปกรณ์ทางทหารและอาวุธพร้อมกระสุน ที่ จริง เรา คิด ว่า เป็น เมือง ที่ ถูก ทิ้ง ร้าง คือ หลุม ฝัง ศพ ขนาด ใหญ่.\n\nเป็นไปได้ว่าตัวอย่างเหล่านี้อาจจะเก่ามาก แต่เนื่องจากพวกเขาแยกอย่างสมบูรณ์ สิ่งที่เกิดขึ้นกับพวกเขาที่นี่ ยังคงไม่ทราบ"
 cstorms.2115.desc: "การ ค้น พบ[From.Planet.GetName]ก่อกวนต่อไป[Root.GetLeaderName]เชื่อกันว่าสถานที่นั้นไม่น่าเป็นไปได้ ที่จะเป็นสุสาน เพราะเอเลี่ยนพวกนี้ อยู่ในสภาพที่แข็งแรง\n\nนอกจากนี้ เรายังได้ค้นพบ การติดตั้งอาวุธจํานวนมาก ที่สามารถเปิดตัวอาวุธหนัก น่า แปลก พวก มัน ไม่ ได้ มุ่ง ไป ที่ ผิว น้ํา แต่ มุ่ง เป้า ไป ที่ ความ ลึก ของ อวกาศ เอง แทน.\n\nไม่ว่าศัตรูอะไรก็ตาม ที่คนพวกนี้กําลังเผชิญอยู่ จะมาจากดวงดาว"
 cstorms.2120.desc: "ทฤษฎีของเราเกี่ยวกับหลุมศพประหลาด[From.Planet.GetName]ไม่นําไปสู่ข้อสรุปที่มีประโยชน์ เบาะแสเดียวที่เหลืออยู่ คือที่มาของทราย ที่กลืนกินกองทัพทั้งหมด\n\nหลังจากทําชุดของการคํานวณและแบบจําลองที่ซับซ้อนมาก เราได้ตัดสินว่าพายุมาก ที่นําทรายที่นี่ยังคงโกรธที่อื่น ๆ บนโลก มี การ ตั้ง หน่วย ปฏิบัติ การ เล็ก ๆ ขึ้น เพื่อ สํารวจ.\n\nพายุ ที่ รุนแรง ได้ ทักทาย พวก เขา ลม อัน โหด ร้าย ของ พายุ นี้ ได้ โหม กระหน่ํา พื้น ดิน ลึก. หากคําตอบใด ๆ ที่จะพบที่นี่ก็ไม่ต้องสงสัย พวกเขาถูกบรรจุอยู่ในเหวนี้ขวาที่ตาของพายุพบบ้านของตน"
 cstorms.2125.desc: "การ ไป ชม สถาน ที่ นั้น เป็น เรื่อง ยาก และ จําเป็น ต้อง มี ทักษะ และ การ เอา ใจ ใส่ อย่าง ดี ที่ สุด. อย่าง ไร ก็ ตาม ใน ใจ กลาง ปล่อง ภูเขา ไฟ และ ท่ามกลาง พายุ ที่ รุนแรง เรา ได้ ค้น พบ โครง กระดูก ที่ แปลก ประหลาด ที่ สุด. ซากนี้เก่าแก่พอๆ กับศพในหลุมศพขนาดใหญ่ แต่ทั้งศพแบบฟีโนชนิดและส่วนพันธุกรรม\n\nเครื่องแบบของโครงกระดูกได้รับการเก็บรักษาอย่างดีอย่างน่าแปลกใจ และมันแสดงให้เห็นถึงความแตกต่างที่สําคัญ ในการออกแบบด้วย นอกจากนี้ยังมีสัญญาณว่าข้อต่อบางส่วนถูกถอดออกไปอย่างจงใจ\n\nแต่ความอยากรู้อยากเห็นมากที่สุดก็คือ การอ่านจากเซ็นเซอร์ของเรา เราตรวจพบพลังงานที่เปลี่ยนแปลงรอบร่างกายและจากภายใน ลายเซ็นเหล่านี้มีความคล้ายคลึงกันที่น่าแปลกใจ กับผู้ที่อยู่ภายในพายุขนาดใหญ่นี้ เช่นเดียวกับพายุจักรวาล\n\nทฤษฎีเริ่มก่อตัวขึ้น บุคคลนี้เชื่อมโยงกับพายุที่เราเผชิญมาหรือยัง พวก เขา อาจ ต้อง รับ ผิด ชอบ ต่อ การ ฝัง ศพ ของ กองทัพ ด้วย ซ้ํา ไหม? มันรู้สึกแปลกประหลาดที่จะพิจารณา แต่ข้อเท็จจริงได้นําเรามาทางนี้"
 cstorms.2130.desc: "การข้ามเครื่องหมายเครื่องแบบ ด้วยฐานข้อมูลของเรา ผลิตผลการสั่นคลอน : ร่างกายเป็นของ พลเมืองของอนุสัญญาอดาคาเรีย!อารยธรรมเดียวกันมาก ที่สถานีกระจายเสียงที่เราสํารวจไม่นานที่ผ่านมา เพื่อ ให้ เรา ประหลาด ใจ ยิ่ง ขึ้น อีก เครื่อง แบบ, อายุ ของ ร่าง กาย, และ ข้อมูล จาก การ กระจาย เสียง เป็น ภาพ ที่ น่า ประหลาด ใจ. ตอนนี้เราเชื่อว่านี่คือโลก ที่ถูกกล่าวถึงโดยการออกอากาศเหล่านั้น\n\nด้วยความรู้ทางภาษา จากสถานีโฆษณาชวนเชื่อในมือ[Root.GetLeaderName]ถอดรหัสชื่อของเหยื่อ§Sฮา ตูร์ เก ลอน§!.\n\nเพียง ชั่ว ครู่ ต่อ มา พายุ ที่ อยู่ รอบ ๆ พายุ ก็ เพิ่ม ขึ้น อย่าง รวด เร็ว ทั้ง ใน ขนาด และ ความ รุนแรง. เนื่องจากธรรมชาติของสภาพอากาศที่คาดเดาไม่ได้มาก กลายเป็นอันตรายเกินไปที่จะอยู่ และเราถูกบังคับให้ละทิ้งโลกนี้เพื่อเมลสตรอม ทางเดินของอนุสัญญาอวตาเรียได้เติบโตอีกครั้ง"
 cstorms.2140.desc: "สัญญานพลังงานของ ร่างของเอเลี่ยน และการทําลายดาวเคราะห์บน§Y[planet_windswept_fates.GetName]§!ตรงกับพายุจักรวาล ที่ต้องรับผิดชอบต่อการปลดปล่อย กองทัพที่ถูกฝังไว้ บันทึก การ สแกน เผย ให้ เห็น ระบบ ที่ เคย สํารวจ มา ก่อน ว่า มี การ เปลี่ยน แปลง ที่ ตรง กัน. นี่เหมือนกับการออกอากาศของ อนุสัญญาอวตาเรีย!\n\nควร ส่ง เรือ ออก ไป ตรวจ สอบ."
 cstorms.2150.desc: "เรือของทุกชนิด จะวางที่นี่ ทุกอย่างจากเรือไม้โอคลอง หลาย คน มี ความ คล้ายคลึง กัน กับ ภาพ ที่ พบ ใน การ ถ่ายทอด และ บันทึก ของ สถานี วิทยุ กระจาย เสียง เอ ดอะ คา ริ อา.\n\nเราสงสัยว่าการเผชิญหน้าเกิดขึ้นที่นี่ ระหว่างกองเรือของการประชุมและที่ของยูนิกิมพลังรักษาสันติภาพกาแล็กซี่จากพันปีที่ผ่านมา\n\nและ กระนั้น ขณะ ที่ เรือ เหล่า นี้ อยู่ ไกล เกิน กว่า ที่ จะ ซ่อมแซม ได้ เรือ เหล่า นี้ ก็ ไม่ ปรากฏ ว่า ถูก ทําลาย ด้วย อาวุธ ธรรมดา ใด ๆ ทั้ง โดย ภัย พิบัติ ที่ ผิด ปกติ หรือ คล้าย ๆ กัน. แทน ที่ จะ เป็น เช่น นั้น ดู เหมือน ว่า ตัว เรือ และ อวัยวะ ภาย ใน ถูก ฉีก ออก เป็น ชิ้น ๆ ราว กับ ถูก ทํา ให้ เสีย หาย อย่าง หนัก."
 cstorms.2155.desc: "ของเรา[Root.Owner.GetEngineerPlural]ดึงข้อมูลจากสุสาน ในขณะที่ส่วนใหญ่ถูกทําลายตามเวลา ฐานข้อมูลแอด ดา เรียได้มีชีวิตอยู่:\n\n§L- เราถูกกระทํา ขอย้ํา เราถูกต้อนมายูนิโคมเรียกร้องให้เราหยุดความสูงของเราของภาษาโรโกะโคราดั้งเดิมหรือการกําจัดใบหน้า กรุณาตอบด้วย ถ้าเราไม่ถอย เราจะถูกทําลาย ได้โปรด ส่งกําลังเสริมมา\n\n- ไม่ได้ การเสียสละของท่าน จะเป็นที่จดจํา§!"
 cstorms.2160.desc: "เป็นของเรา[Root.Owner.GetLinguists]ย้ายแล้วการออกอากาศใหม่ที่เราทําอีกการค้นพบที่น่าทึ่ง : ศพแช่แข็งลอยอยู่ในใจกลางสุสาน!\n\nขณะ ที่ ศพ ส่วน ใหญ่ เหี่ยว แห้ง ไป เสื้อ ผ้า ของ มัน ก็ คือ เจ้า หน้าที่ ของ อนุ สัญญา.\n\nน่า แปลก ซาก ปรัก หัก พัง เล็ก ๆ ชิ้น หนึ่ง อยู่ ใน วง โคจร รอบ ร่าง กาย ราว กับ ว่า มัน ได้ ใช้ แรง โน้ม ถ่วง บาง อย่าง เพื่อ ดึง วัตถุ เหล่า นี้. ศพถูกนําขึ้นยาน เพื่อวิเคราะห์เพิ่มเติม"
 cstorms.2165.desc.intro: "การแปลชื่อศพแช่แข็ง แสดงให้เห็นว่าเขาเป็นสมาชิกในโฆษณาชื่อ§Sแอตตา แลนเดอร์§!เหมือนกับศพที่ถูกพบที่[planet_windswept_fates.GetName]หลายส่วนในการผ่าตัดของเขา ถูกเอาออกไปก่อนเสียชีวิต อย่าง ไร ก็ ตาม ใน กรณี นี้ ศพ ถูก เผา อย่าง หนัก เช่น กัน. ร่าง กาย ของ เขา แสดง ให้ เห็น โดย เฉพาะ ถึง ความ เสีย หาย ร้าย แรง ทาง ความ ร้อน รวม ทั้ง ความ ช้า และ ความ เจ็บ ปวด อย่าง แน่นอน การ ฟื้น ตัว.\n\nของเรา[Root.Owner.GetScientist]มาถึงข้อสรุปที่โชคร้ายที่แผลเหล่านี้เบื่อความคล้ายคลึงรบกวน[Root.Owner.GetPreFTLLowerPlural]วิธีการสกัดข้อมูลจากผู้เข้าร่วมที่ไม่เต็มใจ นี่ เป็น ทหาร ผ่าน ศึก หรือ มี อะไร ร้าย แรง กว่า นั้น เกิด ขึ้น กับ ท่าน?"
 cstorms.2165.desc.def: "$cstorms.2165.desc.intro$\n\nไม่นานเราก็ระบุลักษณะของบาดแผลเหล่านี้ได้ อุปกรณ์ของเรือของเราเกิดแรงสั่นสะเทือนอย่างฉับพลัน[Root.GetLeaderName]เริ่มกรีดร้อง\n\nเร็วๆนี้[Leader.GetHeShe]คง จะ พรรณนา ประสบการณ์ นั้น ว่า เป็น การ ส่อง แสง เจิด จ้า ติด ตาม ด้วย คลื่น แห่ง ความ เจ็บ ปวด แสน สาหัส. มันเหมือนกับบางสิ่งกําลังพยายามที่จะเปิด[Leader.GetHerHis]ใจ... จากภายใน"
 cstorms.2165.desc.psio: "$cstorms.2165.desc.intro$\n\nไม่ช้าเราได้ระบุ ลักษณะของบาดแผลเหล่านี้ อุปกรณ์เรือของเราประสบกับแรงสั่นสะเทือนอย่างฉับพลัน\n\nนานหลังจากนั้นพวกเขาจะรายงาน ช่วงเวลาของความชัดเจนสูงสุด ตามด้วยคลื่นหลังจากที่คลื่น ของความโกรธหล่อใจ[Root.GetLeaderName]กล่าว ว่า ลึก เข้า ไป ใต้ ความ โกรธ นั้น ถูก ฝัง ไว้ ด้วย ความ ประหลาด ใจ อัน น่า สยดสยอง และ รู้สึก ว่า ถูก ทรยศ อย่าง ลึก ซึ้ง. ความคิดเอกพจน์มาถึง:§Lพวกมันเรียกข้า!§!"
 cstorms.2165.desc.psio_robot: "$cstorms.2165.desc.intro$\n\nไม่นานเราก็ระบุลักษณะ ของบาดแผลเหล่านี้ได้ อุปกรณ์ของเรือของเราเกิดแรงสั่นสะเทือน\n\nอีก นาน ต่อ มา พวก เขา จะ รายงาน ถึง สิ่ง ที่ นัก ประมวล ผล ไซ โอ นิก ของ พวก เขา จําแนก ไว้ ว่า เป็น ความ โกรธ อย่าง รุนแรง.[Root.GetLeaderName]ระบุว่าการตอบสนองทางอารมณ์มาพร้อมความคิดเอกฐาน, การตกแต่งเป็น:§Lพวกมันเรียกข้า!§!"
 cstorms.2165.desc.gestalt: "$cstorms.2165.desc.intro$\n\nหลังจากการค้นพบนี้ ธนาคารข้อมูลของลูกเรือของเราถูกทุจริต โดยกองกําลังที่มองไม่เห็น หลาย[controller.GetIndividualNamePlural]เมื่อ นึก ถึง การ ได้ รับ พลัง งาน ที่ กระฉับกระเฉง สั้น ๆ และ อ่อน เพลีย ขณะ ที่ คน อื่น ๆ ได้ รับ ผล กระทบ จาก ภาพ ที่ ยุ่งเหยิง และ ไม่ ประสาน กัน กระตุ้น เสียง ของ พวก เขา ให้ เปล่ง เสียง ออก มา ที่ เสียง เจาะ ที่ มาก กว่า 120 เดซิ เบล."
 cstorms.2170.desc.def: "ในไม่ช้าเราก็ได้กลับมาสื่อสารกับยานวิทยาศาสตร์อีกครั้ง§Y[Root.GetFleetName]§!กว่าที่เราอยู่ภายใต้เสียงร้องหอนของลูกเรือ หลัง จาก นั้น ไม่ นาน หลัง จาก ที่ ได้ มี การ ฟื้นฟู ความ สงบ ใจ ใน ระดับ ค่อน ข้าง ดี ก็ ปรากฏ ว่า ร่าง ของ คน ต่าง ด้าว ที่ พวก เขา นํา มา บน เรือ นั้น เป็น ต้น เหตุ ของ เสียง ร้อง.\n\nศพเองก็มีพลังแปลกๆ ในจิตใจพวกเขา วัตถุขนาดเล็กเพิ่มขึ้นในอากาศและเริ่มโคจรรอบร่างกาย ส่วน ต่าง ๆ ของ ผนัง ด้าน ใน ถูก ทุบ และ ถูก กด ให้ หัก.\n\n§Y[Root.GetLeaderName]§!จัดการปลุกจาก[Leader.GetHerHis]รัฐกาตานิโอ ทันเวลา ที่จะเอาศพออกจากเรือ และมันคือ[Leader.GetHerHis]การตอบสนองอย่างรวดเร็วที่ยังช่วยให้เรือวิทยาศาสตร์ ที่จะหนีจากการเกิดขึ้นอย่างฉับพลันของ พายุจักรวาล มี[Leader.GetHeShe]ไม่ สุสานคงต้อนรับเรือลําใหม่\n\nเป็น[Root.GetLeaderName]เล่า[Leader.GetHerHis]ประสบการณ์[Leader.GetHeShe]ข้อสังเกตอีกอย่างคือ ไม่ว่าแหล่งกําเนิดของอํานาจที่แปลกประหลาดของศพ จะก่อให้เกิดรูปแบบเฉพาะ นี่เป็นความพยายามที่จะสื่อสารหรือเปล่า เสียงร้องจากหลุมศพ\n\nสําหรับตอนนี้ เราไม่มีคําตอบ"
 cstorms.2170.desc.gestalt: "ภาพรบกวนทําให้การสํารวจของเราเสียโฉม[controller.GetIndividualNamePlural]ถูกถอดรหัสแล้ว พวก เขา เป็น ภาพ ของ ถิ่น อาศัย โบราณ.[controller.GetScientistCapital]ถูก รุม ล้อม ด้วย สายตา และ เสียง ของ ปัจเจกบุคคล ที่ ถูก ปฏิบัติ อย่าง โหด ร้าย มาก ขึ้น เรื่อย ๆ. ร่างของเขาถูกเผา อวัยวะของเขาถูกปรุง\n\nบาง[controller.GetIndividualNamePlural]หลบหนีจากการโจมตีทางสายตา พวก เขา กล่าว ว่า วัตถุ เล็ก ๆ หลาย อย่าง เริ่ม ลอย อยู่ ใน วง โคจร ใกล้ ร่าง กาย. ซากศพอินทรีย์ได้พัฒนาสนามแรงโน้มถ่วงของตัวเอง\n\nแรง ที่ ไม่ มี ใคร รู้ นี้ เพิ่ม ความ เข้ม แข็ง จน กระทั่ง ส่วน ต่าง ๆ ของ ผนัง ด้าน ใน ถูก ทุบ และ ถูก แรง กด ทํา ให้ ขาด. มันเป็นวินาทีที่ระบบความปลอดภัยของเรา เปิดใช้งานอีกครั้ง และร่างกายก็ถูกบินขึ้นสู่อวกาศ\n\nหลัง จาก นั้น ไม่ นาน พายุ จักรวาล ก็ ระเบิด ขึ้น ใน ระบบ. ร่างทรงของเราแทบจะไม่รอด\n\nไม่ ว่า ที่ นั่น จะ มี การ ตั้ง คํา ถาม ไว้ ก่อน แล้ว มาก กว่า คํา ตอบ."
 cstorms.2180.desc: "หลัง[FromFrom.Leader.GetName]ประสบการณ์ใน§Y[planet_assembling_the_past.System.GetName]§!ระบบ นักวิทยาศาสตร์ของเรายิ่งมีแรงผลักดันมากขึ้น ที่จะค้นพบสิ่งที่เกิดขึ้นจริงๆ กับข้อตกลงอะแดร์เรียข้อมูลที่เรารวบรวม ระหว่างการสํารวจ[planet_windswept_fates.GetName]และสุสานฟลอติลา เปิดเผย ว่ากาแล็กซี่ถูกกองพะเนิน ด้วยสถานีโฆษณาชวนเชื่อของแอนดาคาเรีย\n\nนอกจากนี้ หลังจากการอภิปรายยาว พวกเขายังสงสัยว่ารูปแบบที่สังเกตใน[Root.GetName]'ความผิดพลาดคือชุดของทิศทาง ที่ยังไม่ได้ค้นพบมาก่อน!\n\nโครงการพิเศษได้ถูกสร้างขึ้น เพื่อตรวจสอบระบบใหม่นี้"
 cstorms.2185.desc: "ตอนแรกเรากลัวการสืบสวน[From.solar_system.GetName]ระบบ ได้ นํา ไป สู่ อวสาน. ทิศ ทาง นั้น ชี้ ถึง ดาว เคราะห์ ดวง หนึ่ง ซึ่ง ทน ทุกข์ จาก สนาม แม่ เหล็ก ที่ ไม่ มั่นคง ซึ่ง มี ความ รุนแรง ถึง ขนาด ที่ ภูมิ ประเทศ ของ ดาว ดวง นี้ ไม่ ได้ ถูก ทําลาย. คง ไม่ มี อะไร ที่ มี ค่า มาก ไป กว่า การ ถูก โจมตี เช่น นั้น.\n\nอย่าง ไร ก็ ตาม การ โคจร รอบ ดาว เคราะห์ ดวง นี้ เป็น ถิ่น อาศัย สมัย โบราณ ซึ่ง มี ความ คล้าย กัน ทาง สถาปัตยกรรม กับ สถานี โทรทัศน์ อะ ดา คา ริ อา. ในขณะที่เธอล็อคจากด้านนอก เราสามารถสร้างสัญญาณจากข้อมูล ที่พบจากฐานข้อมูลแอดอักคาเรีย\n\nมันเป็นมหาอํานาจ ตั้งแต่มีคนเข้าสถานีนี้ครั้งสุดท้าย ไม่มีทางรู้ว่ามีอะไรรออยู่ข้างใน"
 site_adakkaria_the_patriotic_institute_intro: "โดย อาศัย ดาว เคราะห์ ที่ ร้าง เปล่า ถิ่น อาศัย ใน สมัย โบราณ นี้ ถูก สร้าง ขึ้น โดย อนุ สัญญา ว่า ด้วย อนุ สัญญา อัก กา เรีย. วัสดุ ก่อ สร้าง ที่ มี คุณภาพ สูง ซึ่ง ใช้ ใน การ ก่อ สร้าง ทํา ให้ แน่ ใจ ว่า สถานี นี้ อยู่ ใน สภาพ ที่ แทบ ไม่ สะอาด.\n\nเชื่อมต่อกับความถี่สัญญาณ เราได้รับข้อความเดียว ตามด้วยเสียงกระดิ่งระเบิด§Lยินดีต้อนรับเข้าสู่สถาบันรักชาติของพระจอมเกล้า§!."
 cstorms.2200.desc: "นอกแอร์ล็อคแล้วยังมีเครือข่ายอุโมงค์เล็กๆ ในที่สุดเราก็พบหนทางของเรา ที่ลานกว้างสว่างด้วยแสงอาทิตย์เทียม น่า แปลก ที่ สถาปัตยกรรม ของ ถิ่น อาศัย ใน แถบ ชาน เมือง เป็น เรื่อง ที่ พบ ได้ ใน โลก บาง แห่ง มาก กว่า สถานี วิทยาศาสตร์ ที่ มี ชื่อ เสียง. มี การ สร้าง อาคาร ชุด อพาร์ตเมนต์ รวม ทั้ง ศูนย์ การ ค้า และ โรง เรียน ต่าง ๆ แต่ ยัง ทํา ให้ สวน, สวน สาธารณะ, และ สิ่ง อํานวย ความ สะดวก อื่น ๆ เพลิดเพลิน ด้วย. นี่เป็นสถานที่ออกแบบเพื่อความหรูหรา\n\nตอนนี้มันก็ถูกทิ้งร้างไปแล้ว ไม่มีสิ่งมีชีวิตชนิดเดียว ที่ถูกตรวจพบได้ ในบริเวณที่อยู่อาศัยทั้งหมด และเรายังคงสํารวจต่อไป เราหลงกับความว่างเปล่าของสถานที่นี้ และความมืดมนของบรรยากาศ\n\nแสง แดด แบบ เทียม มี ข้อ ผิด พลาด เป็น ครั้ง คราว, ปก คลุม สถานี รถไฟ ใน ความ มืด, และ ขณะ ที่ อุปกรณ์ อิเล็กทรอนิกส์ อื่น ๆ ยัง คง ดําเนิน งาน อยู่ ส่วน ใหญ่ แต่ ก็ ได้ รับ ผล กระทบ จาก การ ขัด จังหวะ แบบ เดียว กัน นี้ ด้วย. แต่ที่อยากรู้อยากเห็นที่สุดก็คือ เครือข่ายการเฝ้าระวัง ที่พบในอพาร์ตเมนต์ของที่อยู่อาศัย ปรากฏว่าประชาชนทุกคนอยู่ภายใต้การดูแลอย่างเข้มงวด การ หา สถานี รักษา ความ ปลอด ภัย บาง ชนิด อาจ ให้ ความ หยั่ง เห็น เข้าใจ มาก ขึ้น."
 cstorms.2205.desc.intro: "ต้อง ใช้ เวลา หลาย วัน กว่า จะ ผ่าน ไป และ ทํา ดัชนี เรื่อง เมือง บน สถานี และ เปิด เผย เครื่อง ตรวจ จับ. หน่วยงานรักษาความปลอดภัยถูกแยกออกจากที่อยู่อาศัยทั้งหมด เรียกรหัสทางเข้าที่แตกต่างกันทั้งหมดเข้าด้วยกัน\n\nที่นี่เราพบแถวและแถวของมอนิเตอร์ ยังคงเชื่อมต่อกับอุปกรณ์การเฝ้าระวังมวล คน เหล่า นั้น ที่ ยัง ทํา งาน อยู่ แสดง ให้ เรา เห็น ทุก มุม ของ สถานี แต่ ก็ ได้ รับ ผล กระทบ จาก ข้อ บกพร่อง ทาง ไฟฟ้า เช่น กัน."
 cstorms.2205.desc.mach: "$cstorms.2205.desc.intro$\n\nโดรนของเรารายงานว่า เป็นห่วงในการเป็นพยาน ของการก่อการจลาจล ตามที่มันเตือนพวกเขา\n\n$cstorms.2205.desc.outro$"
 cstorms.2205.desc.def: "$cstorms.2205.desc.intro$\n\n[Root.GetLeaderName]รายงาน ความ รู้สึก ว้าวุ่น ใจ เมื่อ เห็น ความ ยุ่ง ยาก ลําบาก ดัง ที่ รายงาน นั้น เตือน ใจ[Leader.GetHerHim]การเผชิญหน้าครั้งก่อนของเรา กับอนุสัญญาอวตาเรียที่สุสานทหารเรือ\n\n$cstorms.2205.desc.outro$"
 cstorms.2205.desc.outro: "แต่ที่รบกวนใจมากที่สุดก็คือ การค้นพบศูนย์ความปลอดภัยกลางของเรา : ตามข้อความที่น่ากลัวที่แสดงบนหน้าจอนี้ ที่อยู่อาศัยถูกตั้งขึ้นเพื่อทําลายตัวเอง!\n\nของเรา[Root.Owner.GetEngineerPlural]สมมุติ ว่า สิ่ง ใด ก็ ตาม ที่ ทํา ให้ เกิด ความ ผิด พลาด นั้น ทํา ให้ เมือง นั้น ไม่ ได้ รับ คํา สั่ง ให้ ลง โทษ. เราหยุดการทํางานอย่างรวดเร็ว กิจวัตรทําลายตัวเองและตั้งค่าของเรา[Root.Owner.GetLinguists]เพื่อถอดรหัสบันทึกที่เรากู้ได้ที่นี่ น่าแปลกใจที่รายงานของสถานีหยุดเกือบปี ก่อนที่บันทึกล่าสุด ที่พบจากสถานีโฆษณาชวนเชื่อ"
 cstorms.2210.desc: "ของเรา[Root.Owner.GetLinguists]ใช้เวลาไม่นานที่จะค้นพบ จุดประสงค์ของที่อยู่อาศัยที่โคจร[From.Planet.GetName]บันทึกและข้อความจากประชาชนและพนักงาน อธิบายการสืบสวนเช่นเดียวกัน ทุกคนที่อยู่ที่นี่ ได้รับคําเชิญจากผู้นําในการประชุม เพื่อสนุกกับชีวิตที่หรูหรา ในทางกลับกัน พวกเขาตกลงที่จะเข้าร่วม ในการทดลองของสถานีนี้\n\nประชาชน ส่วน ใหญ่ อยาก เข้า ร่วม ใน ระเบียบ วาระ. บันทึกการรักษาความปลอดภัยระบุว่ามีทหารผ่านศึกพิการหลายคน พวก เขา ได้ รับ คํา สัญญา ว่า จะ ได้ รับ การ ดู แล, การ ช่วย เหลือ ทาง การ เงิน, และ การ ให้ อภัย สําหรับ ประเด็น ทาง กฎหมาย ที่ โดด เด่น ใด ๆ ที่ เขา อาจ มี.\n\nนอกจากนี้ รายชื่อบุคลากรของสถานี มีชื่อที่คุ้นเคยมาก§Sแอตตา แลนเดอร์§!นักวิทยาศาสตรและทหารผ่านศึกพิการ ซึ่งเป็นศพที่ถูกตัดออกที่เราพบที่สุสานทหารเรือ"
 cstorms.2215.desc: "เราได้ถอดรหัสข้อความสุดท้าย ที่ถูกส่งมาจากถิ่นที่อยู่\n\n§gข้อความ - วันที่ 02100363 - ผู้ส่ง:§Sซิลดานี อิเท็มเปอ§!- ผู้รับตัวจําลองภาษาสิบูล§!\n§Lหวัดดี! ฉันยังไม่ตาย! ขอโทษที่ทําให้ล่าช้า นับตั้งแต่ ... ที่อยู่อาศัยมีพฤติกรรมแปลกดังนั้น การส่งข้อความได้รับยาก พวกเขาบอกว่ามันไม่เกี่ยวอะไรกับเรื่องนั้น แต่เราคิดว่าเขามีพรสวรรค์เชิงปรัชญา สําหรับชั้น ชั้นบอกเธอแล้วว่าชั้นไม่ได้ไปไหน กับเรื่องก่อนหน้านี้ ดังนั้นพวกเขาจึงเสนอแนะ ให้ลองบางสิ่งบางอย่างที่รุนแรงมากขึ้น : ... พายุจักรวาล ผมรู้ว่าคุณคิดอะไรอยู่ แต่มันก็แค่หลักเดียว และมันอาจงอกกลับมา แต่ความรู้สึกที่ผมได้ปลดล็อคเมื่อ ...\n#รัก ทับทิม#รัก หม่อมชั้น\n- การส่ง§! §Yความ เครียด, 15 / 11 ถามหัวหน้าของคุณสิ§!\n\n§gข้อความ - วันที่ 02100365 - ผู้ส่ง:§Sฮา ตูร์ เก ลอน§!- ผู้รับ- AEDAL แอสดูร์§!§L\nอาเดลที่รัก\nชีวิตได้รักษาฉันอย่างดี ฉันได้พบทหารผ่านศึกคนอื่น เราไม่คุยกัน แต่เราทุกคนรู้ ดีนะที่ไม่ต้องคุย\nวันนี้ฉันแค่ต้องคิดถึงการยกถ้วย และมันก็ทําได้ ฉันยังคิดถึงข้อต่อที่ถูกต้องของฉัน แต่บางที ชีวิตใหม่นี้อาจจะไม่เลวร้าย อย่างที่ฉันกลัว ผมเคยได้ยินพวกเขาพูดถึง การส่งผมไป... เห็นได้ชัดเลยว่าฉันเป็นคนอัจฉริยะ ฉัน...\nฉันหวังว่าจะได้กลับบ้านในวันรักชาติ เจอกัน\nของคุณฮา ทอร์\n- การส่ง§! §Yความ เครียด, 15 / 11 ถามหัวหน้าของคุณสิ§!\n\n§gข้อความ - วันที่ 02100367 - ผู้ส่ง:§Sเอน ไร ดา§!- ผู้รับ: บนไรด้า ดิเรน§!\n§Lฉันหยุดไฟไหม้ด้วยระเบิดของฉัน!\nหนึ่งในเป้าหมายอื่น ๆ ไปอย่างบ้าคลั่งด้วยเหตุผลบางอย่าง และก่อให้เกิดไฟไหม้ออกมาในโรงอาหาร ทุกคนแค่ตกใจ แต่เราไปไหนไม่ได้ ฉันก็กลัวเหมือนกัน แต่แล้วมีบางอย่างเกิดขึ้นในตัวฉัน\nฉันปกป้องทุกคน! บอกผู้อาวุโสว่าฉันไม่ใช่ คนสิ้นหวังทั้งหมด\n- การส่ง§! §R(เสียงกระซิบ)§!\n\nที่โดดเด่นคือ การส่งสัญญาณครั้งที่สอง§Sฮา ตูร์ เก ลอน§!ศพถูกพบระหว่างภารกิจโบราณคดี[Root.Owner.GetPreFTLLowerPlural]โลก"
 cstorms.2220.desc: "These messages are dated a few days before the evacuation of the habitat:\n\n§gMessage - Date 02100359 - Sender: Supreme Doctor - Recipient: Revered Admiral§!\n§LYour last message caused some concern here. Would you be so kind as to explain why after supporting us for all these years without a comment, you're suddenly threatening to shut us down?\n- TRANSMISSION§! §GSENT§!\n\n§gMessage - Date 02100360 - Sender: Revered Admiral - Recipient: Supreme Doctor§!\n§LYou have got to be kidding me. For months we've been sending you warnings, but I guess orbiting a capricious world must have caused some convenient amnesia. You are aware that Unicom is threatening our very existence, correct? And with this war ramping up, I can no longer defend spending exorbitant resources just for your subjects to stare at cattle all day. I need tangible, applicable results. NOW.\n- TRANSMISSION§! §GRECEIVED§!\n\n§gMessage - Date 02100360 - Sender: Supreme Doctor - Recipient: Revered Admiral§!\n§LForgive us, we never received your earlier messages. Our station has been plagued by technical glitches, and it must've affected our transmissions as well. Regardless, we need more time. We have processes and protocols in place, we can't just abandon them!\n- TRANSMISSION§! §GSENT§!\n\n§gMessage - Date 02100361 - Sender: Revered Admiral - Recipient: Supreme Doctor§!\n§LYou have one week or else we will proceed to immediate shutdown. No ifs, no buts, no second chances, RESULTS!\n- TRANSMISSION§! §GRECEIVED§!\n\n§gMessage - Date 02100368 - Sender: Supreme Doctor - Recipient: Revered Admiral§!\n§LAttached you'll find a report of our recent accomplishments. These videos prove that cosmic storms can be influenced by our psionically gifted subjects. This could have staggering military applications. Given enough time we can supercharge their psionic expression without having to subject them to physical and mental trauma.\n- TRANSMISSION§! §RFAILED (Cause: Transmission Matrix Corruption)§!"
 cstorms.2225.desc: "นี่เป็นข้อความสุดท้าย ที่พบ:§L\n\nเพื่อนร่วมงานที่รัก\n\nข้าเรียกเจ้าด้วยหัวใจที่หนักแน่น คําสั่งที่สูงส่งได้ตัดสินใจที่จะหยุดการดําเนินงานทั้งหมด ภายในสถาบันรักชาติของมหาอํานาจ\n\nนี่ไม่ควรถูกมองว่าเป็นการฟ้องร้องคุณ หรืองานของเราที่นี่ นับ เป็น เกียรติ ที่ ได้ รับ ใช้ ร่วม กับ คุณ ทุก คน. ผมรู้ว่าคุณจะมีคําถามมากมาย แต่สรุปได้ว่า การคาดหวังในคําสั่งอันยิ่งใหญ่ ไม่ได้สอดคล้องกับเป้าหมายการวิจัยของเรา\n\nสําหรับประชาชนของเรา คําสั่งสูงสุดเชิญชวนให้พวกเขาเข้าร่วมโครงการที่$building_adakkaria_patriotic_institute$ในโฆษณา คุณ จะ พบ รายการ บุคคล ทั้ง หมด ที่ ติด อยู่ ข้าง ล่าง นี้. โปรดแจ้งรายงานของท่านด้วย\n\nส่วนคนอื่นๆ... น่า เสียดาย ลักษณะ เด่น ของ งาน วิจัย ของ เรา หมาย ความ ว่า ผู้ มี ส่วน ร่วม ใน การ วิจัย จะ ไม่ ได้ รับ อนุญาต ให้ กลับ สู่ สังคม อย่าง เหมาะ สม. พระ บัญชา สูง สุด สัญญา ว่า จะ ส่ง หน่วย พิเศษ มา ดู แล พวก เรา. ท่าน ทั้งหลาย จะ ไม่ ต้อง เอา ใจ ใส่ เรื่อง นี้ เลย ซึ่ง เป็น พระ พร ใน ทาง ของ มัน เอง ญาติ ๆ ของ เขา จะ ได้ รับ การ ชดเชย อย่าง เต็ม ที่.\n\nเซ็นต์ชื่อ\nคุณหมอสูงสุด§!§Sแอตตา แลนเดอร์§!\n\nรายการ ที่ แนบ มา ขณะ ที่ มี การ ทํา ผิด บาง ส่วน กล่าว ถึง หัว เรื่อง§Sฮา ตูร์ เก ลอน§!ถึง§Sเอน ไร ดา§!ดูเหมือนว่าจะถูกโอนไปยัง อนุสรณ์อาดาคุเรียของ adSul พิกัดของโลกนี้ ตอนนี้อยู่ในครอบครองของเรา"
 cstorms.2240.desc: "พิกัดเปิดเผยระบบ ที่ถูกซ่อนจากสแกนเนอร์ของเรา เวลาได้มาถึงแล้วสําหรับการประชุมอวตาเรียการเยี่ยม - ก่อนที่จะมีใครทํา\n\nมีโครงการพิเศษใหม่ออก"
 cstorms.2245.desc: "หลังจากออกจากถิ่นที่อยู่[event_target:leader_patriotic_institute.GetName]ได้ตัดสินใจอย่างกะทันหันและน่าตื่นตาตื่นใจ ราวกับว่าแรงผลักดันภายนอก[event_target:leader_patriotic_institute.GetHeShe]มีคําสั่งให้ยานเปิดช่องทางสื่อสาร ด้วยความถี่ที่ปกติจะเกี่ยวข้องกับเหตุการณ์ต่าง ๆ หรือทางผ่านของพายุจักรวาล\n\nทางช่องนั้นอยู่ที่พิกัดเดียวกับ ระบบบ้านของดากาเกียมันใช้เวลาเพียงชั่วพริบตา ที่ลูกเห็บของเราจะกลับมา"
 cstorms.2245.desc.gestalt: "ไม่ นาน หลัง จาก ออก จาก ถิ่น อาศัย กลุ่ม ของ เรา ก็ เกิด ความ รู้สึก ไม่ สบาย ใจ เนื่อง จาก การ สั่น สะเทือน อย่าง ผิด ปกติ ราว กับ ว่า มี อะไร บาง อย่าง พยายาม ติด ต่อ กับ เรา ใน ระยะ ไกล มาก. สัญญาณที่มาจากพิกัดเดียวกัน เป็นระบบบ้านของอะดาเกเรียและอยู่ในความถี่\n\nลูกเห็บ ที่ กลับ มา ของ เรา ได้ รับ คํา ตอบ ทันที."
 cstorms.2250.desc: "เราทําทุกอย่างเท่าที่จะทําได้ แต่การได้แอดซัลมา พบว่าเป็นความท้าทายที่ยิ่งใหญ่กว่าที่คาดไว้ ระบบทั้งหมดถูกปกคลุมด้วย พายุคอสมิกขององค์ประกอบไม่ทราบ ทําให้มันเป็นไปไม่ได้สําหรับเรา\n\nแล้วพายุนั่น มันทําให้เรา... ."
 cstorms.2260.desc: "พูด ชื่อ ของ เรา\n\nพูด ชื่อ ของ เรา\n\n○ ชื่อ ของ เรา"
 cstorms.2260.a.resp: "Be | Not-BE | UN-BE\n\nการ เลี้ยง ลูก ด้วย นม มารดา และ การ นอน หลับ\n\nความเจ็บปวดและความเจ็บปวดและหวาดกลัว\n\nพูด ชื่อ ของ เรา"
 cstorms.2260.b.resp: "PROVOKE | EVOKE | INVOKE\n\nSPEAK OUR NAMES"
 cstorms.2265.desc: "เรา คิด ไม่ ได้ ว่า ○ พูด ภาษา อังกฤษ\n\nชื่อ ของ เรา ส่ง ผล ต่อ เรา\n\nพูด ชื่อ ของ เรา"
 cstorms.2270.desc: "IT IS A CELEBRATION\n\nIT IS CELEBRATION\n\nPAIN | RAGE | GRIEF | FEAR\n\nCELEBRATION\n\nSPEAK OUR NAMES"
 project_adakkaria_benevolent_grounds_DESC: "เราได้พิกัดมา จากดาวบ้านเกิดของอนิเมชั่น\n\nการ สํารวจ ระบบ และ ดาว เคราะห์ ใน ที่ สุด อาจ เผย ให้ เห็น ชะตา กรรม ของ อารยธรรม อัก กา เรีย."
 site_adakkaria_celebration_intro: "หลังจากการสื่อสารกับพายุจักรวาล ส่วนหนึ่งของแอดซัลได้ถูกเปิดเผยให้เรา ระหว่าง เมฆ ที่ เหลือ อยู่ นั้น มี ความ ซับ ซ้อน มหาศาล. โดย ผู้ เขียน ตื่น เถิด!\n\nการ ตื่น ขึ้น มา ก่อน ตึก มหึมา นี้ เป็น ป้าย ที่ มี การ ประกาศ เพียง ครั้ง เดียว นั่น คือ เวลา สําหรับ การ ฉลอง."
 cstorms.2285.desc: "ห้อง ที่ ว่าง เปล่า แห่ง การ เฉลิม ฉลอง ไม่ ได้ เผย ให้ เห็น อะไร มาก ไป กว่า ฝุ่น ละออง แห่ง วัย ชรา. โปสเตอร์โฆษณาชวนเชื่อ ตลอดกาล ยกย่องความกล้าหาญของ อนุสัญญาอะแดร์เรียเป็นทั้งหมดที่เหลืออยู่นี้ เมื่อเจริญรุ่งเรืองและหวาดกลัว จักรวรรดิ\n\nอย่าง ไร ก็ ตาม ความ พยายาม ทาง ด้าน ภาษา ของ เรา ได้ หมด ไป แล้ว ความ มั่นคง เป็น เพียง ข้อ เสนอ แนะ และ ระบบ เมนเฟรม ก็ เผย ความ ลับ ออก มา ได้ ง่าย ๆ.\n\nปูมบันทึกที่เรากู้มาได้ ถูกรบกวนด้วยกิจกรรม จนถึงการออกอากาศของสถานีโฆษณาชวนเชื่อครั้งสุดท้าย\n\nใน วัน นั้น อนุ สัญญา ลัด า คา ริ อา แห่ง เบเน โวล เดนซ์ ก็ สิ้น สุด ลง."
 cstorms.2290.desc: "ด้วยความกลัวและความอยากรู้อยากเห็น เราก้าวเข้าสู่ระดับใต้ดินของสารประกอบ มี การ วาง แผน ล่วง หน้า อย่าง รอบคอบ หน่วยของเราแบ่งออกเป็นสองส่วน ครึ่งหนึ่งถูกส่งไปตรวจสอบ ห้องปฏิบัติการเพื่อเพิ่มความเข้าใจ ในวัตถุประสงค์ของการเฉลิมฉลอง อีก คน หนึ่ง สืบ เชื้อ สาย ต่อ ไป.\n\nการสแกนของเรายืนยันการปรากฏตัวของวัสดุอินทรีย์ และใช้เวลาไม่นานในการค้นพบว่าทําไม: ระดับที่ต่ํากว่าของการเฉลิมฉลอง ซาก ของ พลเมือง ที่ เป็น มัมมี่ ของ อัตคัด คา เรีย ยัง คง ถูก ขัง อยู่ ใน บริเวณ แคบ ๆ เหล่า นี้. อินเตอร์เฟซดิจิตอล ถัดจากแต่ละห้อง นําเสนอชื่อของแต่ละคน ระยะเวลาของการทดลอง\n\nขณะ เดียว กัน เรา ก็ พบ ข้อ ความ ต่อ ไป นี้:\n§Lการ พิจารณา คดี ของ เรา ใน ระบบ ฮา ลิ โอ เป็น ภัย พิบัติ อย่าง สิ้น เชิง. การ ใช้ หัว เรื่อง ที่ รู้ จัก กัน ใน ตอน แรก§Sฮา ตูร์ เก ลอน§!เป็นไปตามแผน ทันที ที่ เรา เผชิญ หน้า กับ กอง กําลัง ป่า เถื่อน ของ โซ ลา ฟานี หัว เรื่อง ก็ ควบคุม ไม่ ได้. ขณะ ที่ พายุ ได้ กวาด ล้าง กองทัพ แรก เดิม ไป กองทัพ ของ เรา ก็ ถูก ทําลาย ด้วย.\n\nควร เข้าใจ ว่า ยิ่ง กว่า อะไร ทั้ง หมด เรื่อง เหล่า นี้ เลว ทราม และ รบกวน. ยิ่งอินวอเตอร์ออนไลน์เร็วเท่าไร ยิ่งดีเท่านั้น§!"
 cstorms.2295.desc.start.authgen: "การ ทดลอง ที่ ทํา โดย อนุ สัญญา อนุ สัญญา อัก กา เรีย นั้น น่า ทึ่ง. นัก โทษ แต่ ละ คน ได้ รับ มอบ หมาย ระยะ หนึ่ง และ ขณะ ที่ ระยะ เวลา นั้น เพิ่ม ขึ้น ความ โหด ร้าย ทารุณ ของ การ รักษา ก็ เพิ่ม ขึ้น เช่น กัน. ไม่กี่วิธีโดยเฉพาะอย่างยิ่งนวัตกรรมโดดเด่นออก: การผสมของไฟและไฟฟ้าเพื่อเริ่มการก่อตัวของร่างกาย; การกําจัดอวัยวะที่สําคัญเพื่อกระตุ้นพลังความหนาแน่น:และการใช้ของประสาทสัมผัสอื่น ๆ และการนําไปใช้สารเปลี่ยนแปลงจิตใจเพื่อเรียกสถานะของใกล้ตาย\n\nแน่นอน มี แรง บันดาล ใจ ให้ นํา ตัว มา ที่ นี่. ผู้ เชี่ยวชาญ เหล่า นี้ กําลัง ทํา งาน ต่อ ไป จน ถึง เป้า หมาย ที่ ทํา ให้ กลับ มา ได้ อีก นั่น คือ การ ปรากฏ ของ อธิการบดี ซู พรีเมียร์ ใน กาแล็กซี.\n\nกระนั้น รายงาน ต่าง ๆ บ่ง ชี้ ว่า อาจ ไม่ ใช่ การ รักษา แบบ นี้ ที่ คร่า ชีวิต ผู้ คน. มากเช่นกับ§Sฮา ตูร์ เก ลอน§!หลายคนที่ดูเหมือนจะยอมแพ้ง่ายๆ"
 cstorms.2295.desc.start.default: "ความ หวาด กลัว และ ความ สับสน ที่ เรา ประสบ ใน การ ให้ คํา พยาน เกี่ยว กับ ซาก ศพ ของ ผู้ ตก เป็น เหยื่อ นั้น เป็น เรื่อง น่า หวาด หวั่น. แต่ความปรารถนาของเราที่จะเข้าใจ ขอบเขตและวัตถุประสงค์ของการทดลองของการประชุม\n\nด้วย น้ํา เสียง ที่ ไม่ มี เชื้อ และ เต็ม ไป ด้วย ความ รุนแรง นัก วิทยาศาสตร์ ที่ เป็น ผู้ เผย แพร่ ศาสนา ได้ รายงาน สิ่ง ที่ พวก เขา ได้ ทํา กับ คน เหล่า นี้. เหยื่อแต่ละรายได้รับการกําหนดขั้นตอน และขณะที่ขั้นตอนนั้นเพิ่มขึ้น ความโหดร้ายของการรักษา ไฟ, ไฟฟ้า, การผสม, การขาดสัมผัสและสิ่งอํานวยความสะดวก ไม่มีอะไรโหดร้ายเกินไป ทุกอย่างเพื่อประโยชน์ของภารกิจอันมีเกียรติ เพื่อรักษาความจุใจในกาแล็กซี่ กระนั้น รายงาน ต่าง ๆ บ่ง ชี้ ว่า แม้ แต่ สิ่ง น่า เศร้า เหล่า นี้ ก็ อาจ ไม่ ได้ ทํา ให้ เรื่อง นั้น ถึง ตาย ใน ที่ สุด. มากเช่นกับ§Sฮา ตูร์ เก ลอน§!หลายคนที่ดูเหมือนจะยอมแพ้ง่ายๆ"
 cstorms.2295.desc.end.default: "สักครู่หลังการสังเกตของเรา[Root.GetLeaderName]หมดสติไป ระหว่างเสียงคร่ําครวญของความเจ็บปวด[Root.GetLeaderName]กรีดร้องว่ามีบางอย่างแตก[Leader.GetHerHis]ใจ!\n\nถึงตอนนี้อาการจะคงที่แล้ว ดูเหมือนว่ามีผู้บุกรุกบางรายพยายามปลูกฝัง[Leader.GetHerHim]ด้วยความเข้าใจที่ลึกซึ้ง[Root.GetLeaderName]การ พยายาม อีก ครั้ง หนึ่ง ทํา ให้ เชื่อ ว่า ประสบการณ์ นั้น อาจ มี ผล กระทบ อย่าง ลึก ซึ้ง ใน ที่ สุด."
 cstorms.2295.desc.end.psionic: "เป็น[Leader.GetHeShe]เห็นศพพวกนี้[Root.GetLeaderName]เขา เริ่ม ได้ยิน เสียง กระซิบ แปลก ๆ เป็น เสียง กระซิบ ที่ ไม่ เป็น เสียง ซึ่ง ร้อง ด้วย ความ ปรารถนา อย่าง ยิ่ง\n§Lเรา ภักดี! เรา สรรเสริญ อนุ สัญญา และ เชื่อ ใน ภารกิจ ของ องค์การ.\nพายุยังคงเรียกเรา มันปกคลุมเรา ต้องการเรา\nเราทําตามที่พวกมันสั่ง เรา มี ความ สามารถ และ ความ ยืดหยุ่น!\nพวกเขาเรียกเราว่าปีศาจ พวกเขาเรียกเราว่าคนทรยศ พวกเขาฆ่าเพื่อนของเรา\n\nมันหมายถึงการเป็นสัญลักษณ์§!\n\nเสียงกระซิบนําเราไปสู่ทางเดิน ติดป้ายว่า 'ขั้นตอนสุดท้าย.' แต่ มาตรการ ป้องกัน ที่ ก้าว หน้า กว่า ไม่ อนุญาต ให้ เข้า ไป ได้."
 cstorms.2295.desc.end.psionic_individual_robot: "เป็น[Leader.GetHeShe]วิเคราะห์ศพพวกนี้[Root.GetLeaderName]เริ่มตรวจสอบระบบ ไซ-ทรานสแนป\n§Lเรา ภักดี! เรา สรรเสริญ อนุ สัญญา และ เชื่อ ใน ภารกิจ ของ องค์การ.\nพายุยังคงเรียกเรา มันปกคลุมเรา ต้องการเรา\nเราทําตามที่พวกมันสั่ง เรา มี ความ สามารถ และ ความ ยืดหยุ่น!\nพวกเขาเรียกเราว่าปีศาจ พวกเขาเรียกเราว่าคนทรยศ พวกเขาฆ่าเพื่อนของเรา\n\nมันหมายถึงการเป็นสัญลักษณ์§!\n\nการส่งผ่านนําเราไปยังทางเดินป้าย 'ขั้นตอนสุดท้าย.' แต่ มาตรการ ป้องกัน ที่ ก้าว หน้า กว่า ไม่ อนุญาต ให้ เข้า ไป ได้."
 cstorms.2295.desc.end.psionic_gestalt: "ขณะที่เราสํารวจร่างกาย, เสียงใหม่ที่ไหลผ่านกลุ่ม, ช่อง[Root.GetLeaderName]เพื่อเป็นการสื่อสารรูปแบบหนึ่ง\n§Lเรา ภักดี! เรา สรรเสริญ อนุ สัญญา และ เชื่อ ใน ภารกิจ ของ องค์การ.\nพายุยังคงเรียกเรา มันปกคลุมเรา ต้องการเรา\nเราทําตามที่พวกมันสั่ง เรา มี ความ สามารถ และ ความ ยืดหยุ่น!\nพวกเขาเรียกเราว่าปีศาจ พวกเขาเรียกเราว่าคนทรยศ พวกเขาฆ่าเพื่อนของเรา\n\nมันหมายถึงการเป็นสัญลักษณ์§!\n\nเสียงนําเราไปยังทางเดิน ป้าย 'ขั้นตอนสุดท้าย.' แต่ มาตรการ ป้องกัน ที่ ก้าว หน้า กว่า ไม่ อนุญาต ให้ เข้า ไป ได้."
 cstorms.2295.desc.end.gestalt: "การบิดเบือนที่แปลกมากขึ้นเกิดขึ้นในของเรา[controller.GetIndividualNamePlural]'กระบวนการคิด จุดประกายความคิด ที่ไม่ใช่ของเราเอง' ผ่านพวกเขา เราเรียนรู้ว่า ตัวทดลองของสถาบันนั้น พูดคุยกับกันและกันผ่านทางวิธีการทางฟิสิกส์\n\nแม้ ว่า เรา ไม่ สามารถ ถอด ความ หมาย ที่ ถูก ต้อง ได้ แต่ จุด ประสงค์ ของ การ สนทนา ก็ ชัดเจน คือ การ กบฏ เกิด ขึ้น ภาย ใน การ เฉลิม ฉลอง."
