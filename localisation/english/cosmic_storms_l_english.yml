# Storm in a Box
 cstorms.1816.name: "แคปซูลลอยเคว้ง"
 cstorms.1816.desc: "แคปซูลปริศนาลอยเคว้งอยู่ใน §H[this.GetName]§! มันไม่มีความสามารถในการโจมตีที่ชัดเจนและไม่ตอบสนองต่อสัญญาณของเรา\n\nการสแกนเบื้องต้นพบว่าภายนอกที่เสียหายของมันถูกสร้างขึ้นโดยใช้วัสดุขั้นสูงและเทคนิควิศวกรรมที่ไม่คุ้นเคย จำเป็นต้องมีการวิเคราะห์เพิ่มเติม"
 cstorms.1816.a: "ตรวจสอบ"

 STORM_IN_A_BOX_INVESTIGATE_PROJECT: "ศึกษาแคปซูล"
 STORM_IN_A_BOX_INVESTIGATE_PROJECT_DESC: "แคปซูลปริศนาที่เสียหายอย่างเห็นได้ชัดลอยละล่องอยู่ในระบบ §H[this.GetName]§! เราไม่รู้ทั้งที่มาหรือหน้าที่การทำงานของมัน มันไม่มีอาวุธที่เห็นได้ชัด และเราเชื่อว่าการวิเคราะห์เพิ่มเติมเกี่ยวกับโครงสร้างขั้นสูงของมันจะเป็นการดำเนินการที่ปลอดภัยและคุ้มค่า"

 cstorms.1820.name: "กับดักพายุ"
 cstorms.1820.desc: "[this.leader.GetName]เชื่อว่าแคปซูลลึกลับลอยผ่าน[solar_system.GetName]ระบบเป็น \"กับดักพายุ\" โบราณ[this.leader.GetName] เชื่อว่าแคปซูลลึกลับที่ลอยเคว้งผ่านระบบ [solar_system.GetName] นั้นเป็นสิ่งโบราณ "
 cstorms.1820.a: "มีสิ่งให้เรียนรู้มากมายที่นี่"
 cstorms.1820.b: "อันตรายเกินไป ปล่อยมันไว้อย่างนั้นแหละ"

 STORM_IN_A_BOX_TRAP_PROJECT: "เปิดเครื่องดักจับพายุ"
 STORM_IN_A_BOX_TRAP_PROJECT_DESC: "กับดักพายุโบราณโบราณ"

 cstorms.1826.name: "พายุถูกปลดปล่อย"
 cstorms.1826.desc: "[leader.GetName] เสร็จสิ้นการวิเคราะห์การทำงานของเครื่องดักจับพายุโบราณและสามารถปลดล็อกกลไกรับลมของมันได้ เมื่อช่องเปิดออก §H[from.GetStormType]§! ที่อยู่ภายในก็ถูกปลดปล่อยสู่ความเวิ้งว้างของระบบ [solar_system.GetName]\n\nการศึกษาด้านวิศวกรรมอันซับซ้อนของเครื่องดักจับได้สร้างความเข้าใจอันน่าทึ่งเกี่ยวกับวัสดุและโครงสร้างที่ทนทานต่อพายุ แม้ว่าเราจะยังไม่เข้าใจว่าอุปกรณ์นี้สามารถกักเก็บพายุทั้งหมดไว้ได้อย่างไรก็ตาม ความรู้นี้จะช่วยเราได้เป็นอย่างมากในการรับมือกับความแปรปรวนของห้วงอวกาศในอนาคต"
 cstorms.1826.storm_tt: "§Y$default_storm$§! ระดับต่ำขนาดเล็กก่อตัวขึ้นในระบบ [solar_system.GetName]"
 storm_trap_insight_modifier: "ข้อมูลเชิงลึกเกี่ยวกับกับดักพายุ"
 storm_trap_insight_modifier_tt: "ลดผลกระทบเชิงลบของ §Yพายุคอสมิก§! §G10%§!"

 cstorms.1835.desc: "ขอแสดงความเสียใจด้วย [this.GetSpeciesNamePlural]! พวกเราบังเอิญเห็นพายุลูกใหญ่สร้างความเสียหายอย่างหนักใน [this.GetName]\n\nแน่นอนว่าพวกเรารู้สึกเสียใจมากที่ได้ยินเกี่ยวกับความเสียหายที่เกิดขึ้นที่นั่น พวกเราร้องไห้เลยล่ะ ร้องไห้จริงๆ นะ! เพราะฉะนั้น ได้โปรดให้พวกเราช่วยเถอะ... ด้วยข้อเสนอสุดพิเศษครั้งเดียวในชีวิต!\n\nพวกเราสามารถจัดหาอุปกรณ์เจ๋งๆ ให้ได้ อุปกรณ์ระดับเฟิร์สคลาสเลยล่ะ! มีแต่ของดีที่สุดจากเราเท่านั้น! ด้วยสิ่งเหล่านี้ เมื่อพายุลูกถัดไปมาเยือน คุณจะพร้อมรับมืออย่างแน่นอน ตกลงเรามีข้อตกลงกันไหม?"
 cstorms.1835.a: "พวกเรายอมรับ"
 cstorms.1835.b: "ไม่สนใจ"

