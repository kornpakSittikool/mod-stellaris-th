# Eye of the Storm
 cstorms.1801.name: "ตาพายุ"
 cstorms.1801.desc: "การสแกนตรวจพบความผิดปกติในตาพายุของ [fromfrom.GetName] ที่กำลังโหมกระหน่ำใน [from.GetName] ซึ่งบ่งชี้ว่าพายุนี้กำลังพาเอาความหนาแน่นปริศนาที่ศูนย์กลางของมันไปด้วย การอ่านค่าที่ไม่ปกตินี้ควรค่าแก่การตรวจสอบอย่างใกล้ชิด ก่อนที่พายุจะสลายตัวหรือเคลื่อนออกจากระบบ"
 EYE_OF_THE_STORM_PROJECT: "$cstorms.1801.name$"
 EYE_OF_THE_STORM_PROJECT_DESC: "การสแกน [fromfrom.GetName] ใน [this.GetName] ชี้ให้เห็นว่ามันมีมวลขนาดใหญ่อยู่ในวงวนด้านในของมัน เซนเซอร์ระยะไกลไม่สามารถให้คำตอบที่แน่ชัดเกี่ยวกับปรากฏการณ์ที่ไม่ปกตินี้ได้ จำเป็นต้องมีการส่งทีมสำรวจภาคสนามเข้าไปในตาพายุเพื่อพัฒนาความเข้าใจของเรา"
 cstorms.1805.name: "สู่วงวนพายุ"
 cstorms.1805.desc: "จากการนำทางเข้าไปในตาของพายุคอสมิกใน [from.GetName] ทาง [leader.GetName] ได้ค้นพบสาเหตุความผิดปกติของการสแกน พายุที่ไม่ปกตินี้กำลังขับเคลื่อนด้วยการกระจุกตัวของ [from.star.GetEarnedResources] ขนาดใหญ่ที่ศูนย์กลาง\n\nยานวิทยาศาสตร์ของเราได้เก็บเกี่ยวทรัพยากรเท่าที่จะเก็บได้ก่อนที่จะถูกผลักออกมาอย่างรุนแรง ข้อมูลเซนเซอร์จากการถอนตัวอย่างหวุดหวิดจะช่วยให้วิศวกรของเราปรับปรุงประสิทธิภาพของยานภายใต้สภาวะพายุที่รุนแรงได้"
 cstorms.1805.desc.traumatized: "โชคร้ายที่ประสบการณ์อันตรายในครั้งนี้ได้ส่งผลกระทบต่อเนื่องยาวนานต่อ [leader.GetName]"

 energy_lower: "พลังงาน"
