 MESSAGE_STORM_AFTERMATH_DESC: "§H$PLANET$§! รายงานความปั่นป่วนของบรรยากาศยังคงอยู่"
 electric_storm_aftermath_custom_desc: "§Y$electric_storm$§! ส่งผลกระทบต่อความเร็วในการก่อสร้าง แต่จะเพิ่มการผลิตพลังงาน"
 particle_storm_aftermath_custom_desc: "§Y$particle_storm$§! ได้ทิ้งอนุภาคที่กัดกร่อนไว้ทั่วดาว"
 gravity_storm_aftermath_custom_desc: "§Y$gravity_storm$§! ได้ผ่านไปแล้วโดยทิ้งความผิดปกติจากแรงโน้มถ่วงไว้บนดาวอาณานิคมแห่งหนึ่งของเรา"
 magnetic_storm_aftermath_custom_desc: "§Y$magnetic_storm$§! ได้ผ่านไปแล้ว อาณานิคมของเรามีรายงานการรบกวนของแม่เหล็กไฟฟ้าในบริเวณขั้วโลก"
 solar_storm_aftermath_custom_desc: "§Y$solar_storm$§! ทำให้เกิดการปนเปื้อนกัมมันตภาพรังสีในระดับอันตรายไปทั่วดาว"
 celestial_storm_aftermath_custom_desc: "§Y$celestial_storm$§! ได้ทิ้งดาวไว้ท่ามกลางหมอกฝุ่นที่หนาทึบ"
 shroud_storm_aftermath_custom_desc: "§Y$shroud_storm$§! ทำให้เกิดสิ่งเหนือธรรมชาติเพิ่มขึ้นทั่วดาว"

