### Green Skies
 site_green_skies: "ท้องฟ้าสีเขียว"
 site_green_skies_intro: "เครื่องสแกนของเราตรวจพบสัญญาณที่น่าสนใจชุดหนึ่งที่มาจากพื้นที่ส่วนนี้ของดาวเคราะห์ จากองค์ประกอบของสัญญาณ มีความเป็นไปได้สูงว่าจะมีเศษซากอารยธรรมโบราณที่รอการค้นพบอยู่ที่นั่น"
 cstorms.1400.name: "ผลงานปะติดปะต่อที่น่าพิศวง"
 cstorms.1400.desc: "ใกล้กับแคมป์ฐานของเรา เราได้รับการต้อนรับจากซากปรักหักพังของเมืองที่แปลกประหลาดกลุ่มหนึ่ง\n\nสถาปัตยกรรมแสดงลักษณะของทุกอารยธรรมที่เราเคยพบเจอมาจนถึงตอนนี้ — รวมถึงของเราเองด้วย!\n\nอย่างไรก็ตาม องค์ประกอบของวัสดุนั้นคล้ายคลึงกับสิ่งที่เราใช้ในการสร้างแคมป์ฐานระหว่างการตั้งอาณานิคมดาวเคราะห์ เรื่องนี้แปลกมากเพราะวัสดุเหล่านี้ไม่มีทางทนทานได้นานหลายทศวรรษ นับประสาอะไรกับอายุที่เครื่องสแกนของเราตรวจพบว่าซากปรักหักพังเหล่านี้น่าจะมีอยู่\n\nมันไม่น่าเป็นไปได้ที่ซากปรักหักพังเหล่านี้จะเคยเป็นของบรรพชนผู้ลึกลับ แต่เครื่องสแกนก็ยังคงยืนยันในข้อสรุปของมัน เกิดอะไรขึ้นที่นี่กันแน่?"
 cstorms.1405.name: "สถานการณ์พายุตั้งเค้า"
 cstorms.1405.desc: "ร่องรอยของสัญญาณนำไปสู่ทางเดินลงสู่ชั้นล่างของเมืองที่พังทลาย โดยปกติแล้วแหล่งโบราณคดีประเภทนี้จะมีโครงข่ายคมนาคมใต้ดินหรือกลุ่มบังเกอร์นิรภัย แต่เรากลับพบระบบถ้ำขนาดเล็กที่เกลื่อนกลาดไปด้วยเศษผ้า กล่องโพลิเมอร์ และแม้แต่เศษขยะอินทรีย์ ดูเหมือนว่าเราไม่ใช่กลุ่มแรกที่มาสำรวจแหล่งโบราณคดีแห่งนี้\n\nเป็นเรื่องที่น่าวิตกเมื่อ [Root.GetLeaderName] แจ้งเราว่าท้องฟ้าภายนอกกำลังเปลี่ยนเป็นสีเขียว พายุคอสมิกกำลังจะก่อตัวขึ้นภายใน [Fromfrom.getName] ถึงกระนั้น เราก็ยังคงรุดหน้าต่อไปยังจุดกำเนิดของสัญญาณ"
 cstorms.1410.name: "ความเขลา"
 cstorms.1410.desc: "ความคืบหน้าของเราหยุดชะงักไปชั่วครู่ด้วยประตูเหล็กที่ชำรุดเสียหายอย่างหนัก เราผ่านอุปสรรคนี้ไปได้โดยไม่ต้องออกแรงมากนัก และคลังเก็บของพื้นฐานก็เผยตัวออกมา\n\nชั้นวางของเต็มไปด้วยเทคโนโลยีที่ถูกทิ้งร้างประเภทต่าง ๆ กล่องของบริษัทที่มีชื่อเสียงถูกวางซ้อนกันอย่างเป็นระเบียบตามผนัง และในที่สุด แหล่งที่มาของสัญญาณที่เราไล่ตามมานาน: คอมพิวเตอร์ทรานสปอนเดอร์ที่ไม่ต่างจากของเราเลย\n\nขณะที่เราเข้าสู่ระบบอุปกรณ์และค้นหาฐานข้อมูล [Root.Owner.GetEngineerPlural] ของเราก็เริ่มได้ข้อสรุปที่น่าแปลกใจ: สัญญาณนี้ถูกสร้างขึ้นอย่างจงใจเพื่อให้ดูมีเงื่อนงำและน่าดึงดูดใจมากที่สุดเท่าที่จะเป็นไปได้ — โดยการเลียนแบบและผสมผสานลักษณะเฉพาะจากอารยธรรมอื่น ๆ\n\nยิ่งไปกว่านั้น ภายในกล่องเราพบชุดอุปกรณ์ก่อสร้างสำหรับซากปรักหักพังที่เราพบเห็นบนพื้นดิน\n\nเราได้ติดต่อแคมป์ฐานเพื่อรายงานการค้นพบของเรา แต่พายุคอสมิกได้เริ่มขัดจังหวะสายสัญญาณสื่อสารของเราแล้ว สิ่งสุดท้ายที่เราได้ยินจาก [Root.GetLeaderName] คือคำสั่งที่ฟังดูน่ากังวล ดูเหมือนว่าแคมป์ฐานของเรากำลังถูกโจมตี!"
 cstorms.1410.a: "เตรียมตอบโต้!"
 cstorms.1415.name: "โจรสลัด!"
 cstorms.1415.desc: "พายุคอสมิกภายใน [Fromfrom.getName] กลายเป็นที่ซ่อนของกองยานโจรสลัด! ลูกเรือของพวกเขาคือพวกที่เข้าโจมตีแคมป์ฐานของเรา พวกโจรสลัดขอให้เราส่งข้อความนี้ถึงคุณ:\n\n§Lถึงพวกโง่เง่าไร้ที่ติ,\n\nขอบคุณที่มาร่วมสนุกกับเรา ณ สถานที่พักผ่อนที่ซ่อนตัวได้ดีที่สุดของเรา\n\nมันไม่น่าทึ่งบ้างเหรอที่สิ่งมีชีวิตที่ดูเหมือนจะมีปัญญากลับละทิ้งเหตุผลทั้งหมดไปอย่างรวดเร็ว เพียงแค่ได้กลิ่นเศษเสี้ยวอารยธรรมโบราณและวัตถุโบราณที่น่าสงสัยเพียงเล็กน้อย? บางทีคุณอาจหวังว่าจะได้พบวิธีการทำลายศัตรูผู้ยิ่งใหญ่? เพื่อสร้างกองยานที่ขยายไปไกลสุดขอบฟ้าเหตุการณ์? หรือคุณแค่พยายามทำดีกับประชาชนของคุณเอง? ช่างน่าเอ็นดูเสียจริง\n\nโปรดอย่ารู้สึกแย่ไปเลย — มีหลายคนมาก่อนหน้าคุณ และรูปแบบธุรกิจของเราก็ขึ้นอยู่กับการที่มีคนเดินตามรอยเท้าของคุณเข้ามาอีกมากมาย\n\nทีนี้ สำหรับเงินจำนวนเล็กน้อยเพียง 2000 เครดิตพลังงาน เราจะคืนสิ่งที่คุณสูญเสียไปให้\n\nปฏิเสธข้อเสนอของเราสิ แล้วใครจะรู้ว่าเรื่องเลวร้ายอะไรจะเกิดขึ้นกับ [Leader.getHerHim] และลูกเรือที่มีอาวุธครบมือต่ำของ [Leader.getHisHer] ที่ยังคงติดอยู่บนดาวเคราะห์ดวงนี้\n\nโปรดเลือกให้ดีล่ะ§!\n\nตอนนี้เราปลอดภัยในถ้ำเหล่านี้แล้ว แต่เราไม่รู้ว่าจะอยู่ได้นานแค่ไหน เราจะตกลงกับพวกนอกกฎหมายกลุ่มนี้ดีหรือไม่?"
 cstorms.1415.a: "เราจะจ่ายเงินให้"
 cstorms.1415.b: "บอกให้พวกมันไปเน่าตายในอเวจีซะ!"
 cstorms.1415.b.tt: "[Root.GetLeaderName] ถูกจับเป็นตัวประกัน"
 cstorms.1416.name: "การโต้กลับ"
 cstorms.1416.desc: "เราได้รับข้อความใหม่:\n\n§Lน่าเสียดายจัง มีเรื่องสนุก ๆ หลายอย่างที่เราน่าจะทำได้กับทรัพยากรเหล่านั้น\n\nเราจะแจ้งให้ผู้นำและลูกเรือของ [Leader.getHisHer] ทราบว่าชีวิตของพวกเขาไม่มีค่าพอสำหรับความพยายามหรือเครดิตพลังงานเหล่านั้น บางทีพวกค้าทาสแถวนี้หรือพวกผู้ดูดกลืนอารยธรรมที่มุ่งมั่นอาจจะสนใจ ได้ยินมาว่าการเย็บประสาทเป็นเทรนด์ใหม่ที่กำลังมาแรงเลยทีเดียว\n\nเหล่าผู้ประกอบการขอตัวก่อน§!\n\nเราใช้ทุกอย่างที่หาได้เพื่อปิดกั้นตัวเองไว้ และมีเสบียงเพียงพอที่จะทำให้เราปลอดภัยได้ระยะหนึ่ง แต่กองยานโจรสลัดก็ต้องบุกทะลวงแนวป้องกันของเราเข้ามาได้ในที่สุด!"
 cstorms.1420.name: "จะไม่ยอมโดนหลอกอีก"
 cstorms.1420.desc: "พวกโจรสลัดเหล่านี้ไม่สามารถพิสูจน์คำคุยโวของพวกเขาด้วยทักษะการต่อสู้ได้ ไม่นานนัก เศษซากใด ๆ ที่เหลือของกองยานพวกมันก็กลายเป็นส่วนหนึ่งของระบบนิเวศของกาแล็กซี\n\nเราติดต่อกับลูกเรือบนพื้นผิวได้อีกครั้งหลังจากนั้นไม่นาน พวกเขาค่อนข้างเสียขวัญจากเหตุการณ์ที่เกิดขึ้นแต่ไม่ได้รับอันตรายใด ๆ\n\nแม้ว่าเราจะไม่ได้ค้นพบความรู้เชิงลึกเกี่ยวกับอารยธรรมโบราณที่นี่ แต่ประสบการณ์นี้ก็ได้ปลูกฝังความจำเป็นในการเฝ้าระวัง ผู้นำการสำรวจล้มเหลวในการมองเห็นอันตรายที่กำลังเข้ามา — เราจะไม่ทำผิดพลาดเช่นเดิมอีก"
 cstorms.1420.a: "ขอให้เรื่องนี้เป็นบทเรียนสำหรับเราทุกคน"
 cstorms.1420.b: "ผู้นำคนนั้นจะไม่ทำให้เราผิดหวังอีก"
 cstorms.1425.name: "ความยินดีในการทำธุรกิจ"
 cstorms.1425.desc: "เราได้รับข้อความตอบกลับ:\n\n§Lเป็นการเลือกที่ยอดเยี่ยมมาก หากเราขออนุญาตพูดเช่นนั้น!\n\nขอแจ้งให้ทราบว่าการสนับสนุนของคุณที่มีต่อ 'กองทุนเพื่อผู้ประกอบการผู้ด้อยโอกาสที่ต้องการดาวเคราะห์พักผ่อน' ของเราได้รับการต้อนรับและดำเนินการเรียบร้อยแล้ว\n\nคุณจะได้รับผู้นำและลูกเรือของคุณคืนในไม่ช้านี้\n\nและอย่าลืมแนะนำเราให้แก่คู่ค้าทั้งหมดของคุณด้วยล่ะ§!\n\nหลังจากนั้นไม่นานเราก็สามารถกลับมาติดต่อกับลูกเรือบนพื้นผิวได้ พวกเขารายงานว่าค่อนข้างเสียขวัญจากประสบการณ์นี้ แต่ไม่ได้รับอันตรายใด ๆ\n\nแม้ว่าเราจะไม่พบข้อมูลเกี่ยวกับอารยธรรมโบราณที่นี่ แต่ประสบการณ์ของเราก็ปลูกฝังความจำเป็นในการเฝ้าระวัง ผู้นำการสำรวจล้มเหลวในการมองเห็นอันตรายที่เข้ามา — เราจะไม่ผิดพลาดเช่นเดิมอีก"
 cstorms.1425.a: "$cstorms.1420.a$"
 cstorms.1425.b: "$cstorms.1420.b$"

 NAME_green_skies_pirate_country: "The Resort"
 NAME_green_skies_pirate_fleet: "Eccentric Entrepreneurs"
 KILL_EXILED_LEADER_EFFECT: "$LEADER$ ตายเพราะไร้ความสามารถ"
 FREE_HOSTAGED_LEADER_EFFECT: "$LEADER$ ได้กลับมา"
 green_skies_outcome_modifier: "ตอนนี้เรามีความตื่นตัวต่ออันตรายที่กำลังเข้ามามากขึ้นแล้ว"
 requires_cosmic_storms: "$dlc_requirement_string$ §Iพายุ คอสมิค§!"

### Hold the Line
 site_hold_the_line: "ตรึงแนวรบ"
 site_hold_the_line_intro: "พายุคอสมิกที่พัดผ่านไปได้ทิ้งของขวัญที่น่าสนใจไว้เบื้องหลัง: สถานีวงโคจรขนาดใหญ่จากระบบที่อยู่อาศัยเก่า การขึ้นไปบนสถานีอาจช่วยให้เราสามารถเปิดใช้งานมันใหม่ได้"
 cstorms.1275.name: "ความมึนงงครั้งใหม่"
 cstorms.1275.desc: "แม้จะถูกลากข้ามกาแล็กซีมาโดยพายุคอสมิก แต่สถานีวงโคจรนี้ได้รับความเสียหายน้อยมาก เราพบว่าพื้นที่อยู่อาศัยและพื้นที่เชิงพาณิชย์ของแหล่งที่อยู่อาศัยอยู่ในสภาพเกือบจะสมบูรณ์แบบ ไม่มีฝุ่นเกาะบนพื้นผิวแม้แต่น้อยที่จะแสดงว่าเคยมีคนอยู่มาก่อน ราวกับว่ามันไม่เคยถูกใช้งานมาก่อนเลย\n\nภายในศูนย์ควบคุมกลาง เราต้องเจอกับระบบป้อนข้อมูลที่น่าปวดหัว: หน้าปัดที่ไม่มีคำอธิบาย คันโยกที่ตั้งค่าไม่สอดคล้องกัน และปุ่มจำนวนมากที่กะพริบสลับสีไปมาตามช่วงเวลาที่ดูเหมือนจะสุ่ม โชคดีที่ในที่สุดเราก็พบคู่มือการใช้งาน เมื่อแปลข้อมูลนี้ได้สำเร็จ เรามั่นใจว่าจะสามารถเปิดใช้งานแหล่งที่อยู่อาศัยนี้ได้อีกครั้ง"
 cstorms.1280.name: "สั่งการแบบควบคุมเอง"
 cstorms.1280.desc: "โชคร้ายที่การคาดการณ์ก่อนหน้านี้ของเราดูเหมือนจะมองโลกในแง่ดีเกินไป คู่มือการใช้งานนี้กลายเป็นว่าเข้าใจยากพอ ๆ กับระบบควบคุม หน้าเพจหายไปครึ่งหนึ่ง และคำแนะนำแบบรูปภาพก็ต้องอาศัยการตีความสัญลักษณ์อย่างมาก ส่วนอีกครึ่งหนึ่งของคู่มือเขียนขึ้นด้วยอักษรภาพโบราณที่แปลได้ยาก\n\nอย่างไรก็ตาม หน้าสุดท้ายได้แสดงความถี่การสื่อสารพร้อมกับตัวอักษรชุดหนึ่งที่แปลได้ความว่า 'แผนกช่วยเหลือ' เรากำลังพยายามติดต่อความถี่นี้ในตอนนี้"
 cstorms.1285.name: "สายของคุณสำคัญสำหรับเรา"
 cstorms.1285.desc: "ความถี่การติดต่อในคู่มือได้เชื่อมโยงเราเข้ากับเมนเฟรมแผนกช่วยเหลือของหน่วยงานเชิงพาณิชย์ที่รู้จักกันในชื่อสกายการ์ด\n\nด้วยน้ำเสียงที่เป็นมิตรแต่ดูเป็นกลาง AI ของแผนกช่วยเหลือแจ้งว่ายินดีที่เราติดต่อมา และถามว่ามีอะไรให้ช่วยเหลือหรือไม่ ตัวเลือกที่ระบุไว้มีทั้ง 'การตอบคำถามเกี่ยวกับการสมัครสมาชิก', 'การเรียนรู้เกี่ยวกับระบบป้องกันอัจฉริยะรุ่นใหม่' และสอบถามว่าเราต้องการทราบข้อมูลเพิ่มเติมเกี่ยวกับ 'กิจกรรมความรับผิดชอบต่อสังคม' ของบริษัทหรือไม่\n\nอย่างไรก็ตาม ตัวเลือกต่อ ๆ มากลับยังคงนำเราไปสู่หัวข้อที่ไม่เกี่ยวข้องกันเลย ที่แย่ที่สุดคือ มันมักจะปล่อยให้ [Root.Owner.GetEngineerPlural] ของเรารอสาย แล้วสายก็ตัดไป เห็นได้ชัดว่า AI บริการไม่ได้ทนทานต่อการผ่านไปของเวลาได้ดีเท่ากับส่วนอื่น ๆ ของสถานี\n\nถึงกระนั้น เราจะยังคงพยายามค้นหาเส้นทางผ่านระบบที่ซับซ้อนนี้ต่อไป"
 cstorms.1290.name: "เขาวงกตตัวเลือก"
 cstorms.1290.desc: "[Root.Owner.GetEngineerPlural] ของเรารายงานว่าไม่ว่าจะพูดอะไรกับ AI หลังจากผ่านเมนูต่าง ๆ ไปหลายชั้น ระบบก็จะย้อนกลับไปยังคำพูดก่อนหน้านี้\n\nเราพยายามจำลองสถานการณ์หลายครั้งเพื่อกำหนดแผนผังเมนูที่แน่นอน แต่ความพยายามของเรากลับทำให้เกิดข้อผิดพลาดแบบวนซ้ำ และไม่สามารถแก้ไขปัญหากับตรวจสอบผลลัพธ์ไปพร้อม ๆ กันได้ แม้แต่การใช้แบบจำลองควอนตัมก็ไม่ให้ผลลัพธ์ที่น่าพอใจ เราสงสัยว่าเราอาจไปทำให้ฟังก์ชันคลื่นบางส่วนยุบตัวลงโดยไม่ได้ตั้งใจในกระบวนการนี้\n\nเราหมดหนทางแล้ว"
 cstorms.1290.a: "บอก AI ว่ามันคือ §Rคล่องตัว§! และ §Rคล่องตัว§!"
 cstorms.1290.b: "ถือสายรอเงียบ ๆ"
 cstorms.1290.c: "ทุบทุกปุ่มเลย"
 cstorms.1295.name: "ปฏิบัติตามโปรโตคอล"
 cstorms.1295.desc.a: "ในที่สุดก็มีความคืบหน้า AI!ตักเตือนเราเรื่องการใช้คำที่ไม่เหมาะสมและระบุว่าเราควรรอจนกว่าจะได้รับการติดต่อจากตัวแทนฝ่ายบริการลูกค้า\n\n$cstorms.1295.desc.followup$"
 cstorms.1295.desc.b: "ในที่สุดก็มีความคืบหน้า AI!ดูเหมือนจะสับสนกับการเงียบหายไปเป็นเวลานานของเรา และจะส่งต่อเราไปยังตัวแทนฝ่ายบริการลูกค้า\n\n$cstorms.1295.desc.followup$"
 cstorms.1295.desc.c: "ในที่สุดก็มีความคืบหน้า AI!ตักเตือนเราเรื่องการใช้งานแผงควบคุมในทางที่ผิดและระบุว่าเราควรรอจนกว่าจะได้รับการติดต่อจากตัวแทนฝ่ายบริการลูกค้า\n\n$cstorms.1295.desc.followup$"
 cstorms.1295.desc.followup: "เราถูกปล่อยให้รออยู่พักหนึ่ง แล้วสายสื่อสารก็เปิดขึ้นอีกครั้ง บุคคลที่อยู่อีกฝั่งแนะนำตัวเองว่าเป็นผู้ดูแลบันทึกของบริษัทบริษัทสกายการ์ดเดนตัวระบบแผนกช่วยเหลือเองนั้นเป็นโปรแกรม AI ที่เธอรับช่วงต่อมาจากผู้ดูแลบันทึกคนก่อน เท่าที่เธอรู้ สถานีสื่อสารนี้ไม่ได้ถูกใช้งานเลยตั้งแต่สกายการ์ดล้มละลายเมื่อหลายทศวรรษก่อน เมื่อเราถามว่าทำไมเธอถึงยังทำงานให้กับองค์กรที่ล้มละลายไปแล้ว เธอตอบเพียงว่ามันระบุไว้ในสัญญาของเธอ\n\nหลังจากอธิบายสถานการณ์ของเรา ผู้ดูแลบันทึกก็ค้นหาคู่มือการเริ่มต้นใช้งานด่วนฉบับเก่าของสถานีมาให้ เธอจะส่งภาพดิจิทัลของหน้าคู่มือมาให้เราในไม่ช้า"
 cstorms.1300.name: "สั่งสมหลายปี สูญเสียในพริบตา"
 cstorms.1300.desc: "ด้วย มัคคุเทศก์ คน ใหม่ ที่ อยู่ ใน ครอบ ครอง ของ เรา การ เริ่ม ต้น ถิ่น อาศัย ใหม่ จํา ต้อง ใช้ ความ พยายาม ไม่ มาก นัก.\n\nหลัง จาก ได้ ยิน เสียง เครื่อง เร่ง ความ เร็ว ลด ลง อย่าง ช้า ๆ เรา ตัดสิน ใจ จะ ไป หา ผู้ รักษา แผ่น เสียง อีก ครั้ง หนึ่ง เพื่อ ขอบคุณ เธอ.\n\nเธอบอกเราว่าเธอพบ ข้อมูลบางอย่างจากสถานีนี้ เห็นได้ชัดว่ามันถูกสร้างขึ้น กว่าห้าศตวรรษที่ผ่านมา เป็นต้นแบบ แต่ได้หายไป ในความวุ่นวายทางดาราศาสตร์ การสูญเสียทรัพย์สินและการพัฒนา มากพอที่จะทําให้สกายการ์ดเซ่นล้มละลาย\n\nช่วยพวกเราเป็นงานแรก ที่ผู้รักษาสถิติทํามานานหลายปี\n\n\"นอกจากนี้\"เธอกล่าว \"มันดีที่ได้ยินเสียงยายทวดของฉันในบรรทัดอีกครั้งแม้มันเป็นเพียง AI.\"เมื่อมีคู่มือฉบับใหม่ในมือ การเริ่มต้นใช้งานสถานีใหม่ก็แทบไม่ต้องออกแรงอะไรเลย\n\nหลังจากเสียงการทำงานของเครื่องจักรค่อย ๆ ดับลง เราตัดสินใจติดต่อผู้ดูแลบันทึกอีกครั้งเพื่อขอบคุณเธอ\n\nเธอบอกเราว่าเธอได้กู้คืนข้อมูลบางส่วนเกี่ยวกับสถานีนี้ ดูเหมือนว่ามันจะถูกสร้างขึ้นเมื่อห้าศตวรรษก่อนในฐานะต้นแบบ แต่สูญหายไปในความโกลาหลทางดาราศาสตร์หลังจากพายุคอสมิกที่รุนแรงมาก การสูญเสียทรัพย์สินและค่าใช้จ่ายในการพัฒนาส่งผลให้สกายการ์ดล้มละลาย\n\nการช่วยเหลือเราครั้งนี้ถือเป็นงานที่มีประโยชน์ชิ้นแรกของผู้ดูแลบันทึกในรอบหลายปี\n\n"

### Repowered Complex
 site_repowered_complex: "สิ่งปลูกสร้างพลังงานฟื้นฟู"
 site_repowered_complex_intro: "หลังจากพายุ §Y$electric_storm$§! พัดผ่านไปเมื่อไม่นานมานี้ มีการตรวจพบพลังงานที่เพิ่มขึ้นอย่างไม่มีสาเหตุใต้พื้นผิวของ §H[From.Planet.GetName]§! การสแกนเพิ่มเติมเผยให้เห็นสิ่งปลูกสร้างใต้ดินโบราณที่เครื่องกำเนิดไฟฟ้าของมันได้รับการกระตุ้นให้กลับมาทำงานอีกครั้งโดยพายุ ส่งผลให้สถานีแห่งนี้กลับมาออนไลน์อีกครั้ง"
 cstorms.1845.name: "ทางเข้าที่มีการป้องกันหนาแน่น"
 cstorms.1845.desc: "ทางเข้าของสิ่งปลูกสร้างที่แยกตัวโดดเดี่ยวบน §H[From.Planet.GetName]§! มีโครงสร้างที่แข็งแกร่งเป็นพิเศษ สร้างขึ้นมาเพื่อให้ทนทานอย่างเห็นได้ชัด ภายนอกมีแผ่นเกราะหนา เกราะป้องกันรังสี และเซ็นเซอร์บรรยากาศจำนวนมาก §H[Leader.GetName]§! เชื่อว่ามันถูกสร้างขึ้นมาเพื่อให้ทนทานต่อสภาวะสุดขั้ว\n\nผลการสแกนบ่งชี้ว่าห้องใต้ดินขนาดใหญ่สามารถเข้าถึงได้ผ่านประตูรักษาความปลอดภัยที่ปิดผนึกไว้หลายชั้น"
 cstorms.1850.name: "ที่หลบภัยเอาชีวิตรอด"
 cstorms.1850.desc: "หลังจากเข้าสู่ภายในอาคารหลักได้สำเร็จ §H[Leader.GetName]§! สรุปได้ว่าเราได้ค้นพบที่หลบภัยเพื่อการเอาชีวิตรอดที่ยังไม่เคยใช้งาน ซึ่งถูกสร้างขึ้นมานานแล้วสำหรับสิ่งมีชีวิตอินทรีย์บางชนิดที่ไม่รู้จัก\n\nมันถูกติดตั้งด้วยส่วนที่พักอาศัยที่มีเสบียงครบครัน ประกอบด้วยกระสวยนอน พื้นที่พักผ่อนหย่อนใจ และห้องพยาบาล ตู้เก็บของในทุกชั้นมีเสบียงสำรองจำนวนมาก เช่น แพ็คสารอาหาร แบตเตอรี่ และเครื่องมือที่ยังไม่ได้เปิดใช้ ทุกสิ่งที่อยู่ในห้องนิรภัยลับนี้อยู่ในสภาพที่สมบูรณ์แบบ\n\nเหลือเพียงประตูรักษาความปลอดภัยชั้นสุดท้ายที่ยังคงปิดผนึกอยู่ เราเชื่อว่าพวกมันจะนำเราไปสู่ห้องควบคุมของสถานีแห่งนี้"
 cstorms.1850.a: "ดำเนินการต่อ"
 cstorms.1855.name: "แพ็กเกจศูนย์พักพิงสุดหรู"
 cstorms.1855.desc: "ดาดฟ้าสั่งการของศูนย์พักพิงแห่งนี้ได้รับการติดตั้งแผงจอมอนิเตอร์ §Y$default_storm$§! จำนวนมากอย่างน่าประทับใจ ซึ่งทั้งหมดได้รับข้อมูลมาจากเซ็นเซอร์ตรวจวัดชั้นบรรยากาศบนพื้นผิว หลังจากที่เปิดระบบสแตนด์บายไว้ คอนโซลเหล่านี้เก็บข้อมูลประวัติศาสตร์พายุที่ยาวนานนับศตวรรษ ซึ่งจะช่วยพัฒนาความเข้าใจเกี่ยวกับอุตุนิยมวิทยาดาราศาสตร์ของเราอย่างมาก\n\n§H[Leader.GetName]§! ยังพบเครื่องฉายโฮโลแกรมขนาดเล็กที่ผ่านการใช้งานมาอย่างโชกโชนด้วย เมื่อเปิดใช้งาน มันจะฉายภาพมอลลัสคอยด์แบบ 3 มิติเพื่อเสนอขายสินค้า โดยแนะนำฟีเจอร์หลัก ๆ ของศูนย์พักพิงภายใต้โลโก้ของบริษัท\n\nไม่สามารถบอกได้ว่าผลิตภัณฑ์เพื่อการเอาชีวิตรอดนี้เคยมีผู้ซื้อไปหรือไม่ แต่เห็นได้ชัดว่ามันไม่ถูกใช้งานที่นี่มานานหลายปีแล้ว"
 cstorms.1855.desc.megacorp: "แผนกการตลาดของเรากำลังวิเคราะห์อยู่ว่าพวกเราพลาดตรงไหนไป"

###############################
#### The Weather Manipulators #
###############################

 STORMS_PREC_WM_ONE: "ศูนย์พักพิงโบราณ"
 STORMS_PREC_WM_ONE_DESC: "เราตรวจพบโครงสร้างใต้ดินที่ซ่อนอยู่หลายแห่งบน [From.Planet.GetName] ซึ่งดูเหมือนว่าจะมีอายุเก่าแก่มาก เราควรใช้โอกาสนี้ในการสำรวจดู"

 cstorms.105.name: "ที่พักโบราณ"
 cstorms.105.desc: "ดาวเคราะห์ [From.Planet.GetName] ในระบบดาว [From.GetStarName] เป็นโลกที่พังทลาย ซึ่งดูเหมือนจะเป็นเศษซากของจักรวรรดิที่สาบสูญไปในยุคโบราณ โครงสร้างใต้ดินที่เราสนใจนั้นเก่าแก่ไม่แพ้กัน และค่อนข้างอยู่ในสภาพสมบูรณ์\n\nการสร้างภาพด้วยคลื่นสะท้อนโซนาร์เผยให้เห็นโครงสร้างใต้ดินที่ซับซ้อนของห้องเก็บของ รวมถึงศูนย์พักพิงที่ออกแบบมาเพื่อต้านทานพลังแห่งธรรมชาติ ความเสียหายบนพื้นผิวดาวเคราะห์ดวงนี้ไม่ต้องสงสัยเลยว่าเกิดจากพายุคอสมิก ซึ่งสอดคล้องกับการมีอยู่ของวิหารศักดิ์สิทธิ์แห่งนี้\n\nอย่างไรก็ตาม ปริมาณเศษซากต่าง ๆ ทำให้การสำรวจเพิ่มเติมทำได้ยาก ไซต์ขุดค้นทางโบราณคดีอาจช่วยให้เราทราบข้อมูลเพิ่มเติมได้"

# arcsite The Ancient Storm Shelters
 site_weathermanipulators_the_ancient_storm_shelters: "ที่พักโบราณ"
 site_weathermanipulators_the_ancient_storm_shelters_intro: "ศูนย์พักพิงที่ถูกฝังอยู่ใต้เศษซากของโลกที่ถูกพายุทำลาย ความเสียหายย่อยยับทำให้สำรวจได้ยาก แต่ดูเหมือนว่าภายในจะยังคงสมบูรณ์ดี"
 cstorms.110.name: "จากธุลีสู่ความพินาศ"
 cstorms.110.desc: "เมื่อเข้าใกล้ศูนย์พักพิงจากระดับพื้นดิน เผยให้เห็นช่องเปิดขนาดเล็กใต้หอคอยสองแห่งที่พังทลายลงมา ซึ่งเรามองเห็นแสงเรืองจาง ๆ ของเครื่องจักรที่กำลังทำงานผ่านช่องนั้นได้\n\nช่องเปิดนี้เป็นจุดยึดเหนี่ยวให้ [Root.Owner.GetScientistPlural] ของเราสแกนทำแผนที่ขนาดของคอมเพล็กซ์แห่งนี้ และอาจพบวิธีเปิดมันออกโดยไม่ทำลายโครงสร้างอันบอบบาง\n\nซากปรักหักพังที่ฝังไซต์นี้ไว้มีคุณลักษณะทั้งหมดของความเสียหายจากพายุคอสมิก น่าแปลกที่ไม่มีร่องรอยว่าผู้อยู่อาศัยในเมืองพยายามปกป้องตนเองเลย\n\nราวกับว่าพวกเขาอดทนต่อความรุนแรงนานที่สุดเท่าที่จะทำได้ ก่อนที่จะอพยพออกไปด้วยความรีบร้อนอย่างมาก บางทีคำตอบอาจอยู่ใต้พื้นดินที่พังทลายของ [From.Planet.GetName]"
 cstorms.110.a: "รับทราบ"
 cstorms.115.name: "ใต้หอคอย"
 cstorms.115.desc: "หลังจากกำจัดเศษซากและฝุ่นละอองไปหลายชั้น ช่องเปิดใต้หอคอยก็กว้างพอให้ [Root.Owner.GetScientistPlural] ของเราเข้าไปในศูนย์พักพิงได้\n\nวิหารแห่งนี้เรียบง่ายและเน้นประโยชน์ใช้สอย โดยมีห้องย่อยมากมาย ซึ่งส่วนใหญ่ว่างเปล่า ในความเป็นจริง มันดูเรียบง่ายเกินไป มันดูเหมือนเป็นศูนย์พักพิงบางประเภทอย่างแน่นอน แต่มันจะไม่สามารถต้านทานพายุคอสมิกได้เลย ผนังบางเกินไป ให้การรองรับเพียงเล็กน้อยเท่านั้น อีกทั้งเพดานและพื้นก็ไม่ได้เสริมความแข็งแรง มันรอดมาได้ด้วยเรื่องของโชคชะตาล้วน ๆ หากไม่ใช่เพราะหอคอยสองแห่งที่อยู่ด้านบนและดินถล่มที่พัดพาคอมเพล็กซ์แห่งนี้ไปในคราวเดียว ศูนย์พักพิง 'พายุ' แห่งนี้คงถูกกำจัดไปนานแล้ว\n\nแสงเรืองที่เห็นจากภายนอกนั้นเกิดจากระบบแจ้งเตือนที่ทำงานผิดปกติเพียงไม่กี่จุด และสามารถพบเทอร์มินัลที่ยังคงทำงานอยู่ลึกลงไปในศูนย์พักพิง นี่อาจเป็นโอกาสสำคัญในการเรียนรู้เพิ่มเติมเกี่ยวกับเจ้าของเดิมของสิ่งปลูกสร้างนี้ รวมถึงสถานการณ์ที่น่าสงสัยที่เกิดขึ้น"
 cstorms.120.name: "การถอดเสียงที่ผ่านกาลเวลา"
 cstorms.120.desc: "การเข้าถึงเทอร์มินัลทำได้ยากกว่าที่คาดไว้ เนื่องจากบางส่วนถูกปิดกั้นจากดินถล่ม เศษหินบางส่วนยังใหม่มาก ซึ่งบ่งชี้ถึงความล้มเหลวร้ายแรงของศูนย์พักพิงในตอนนี้หลังจากที่มันถูกรบกวน ขอแนะนำให้ใช้ความระมัดระวัง\n\nโชคร้ายที่อุปกรณ์ประมวลผลข้อมูลโบราณเหล่านี้ไม่ยอมคายความลับออกมาง่าย ๆ ทุกอย่างถูกบันทึกไว้ในภาษาที่สาบสูญ แม้ว่าบันทึกการสื่อสารระหว่างกาแล็กซีที่หลงเหลืออยู่ในอินเตอร์เฟซอาจช่วยเราได้ การผสมผสานสิ่งนี้เข้ากับสื่อทางกายภาพที่ถูกทิ้งกระจัดกระจายอยู่รอบ ๆ ศูนย์พักพิง เราน่าจะทำการแปลภาษาเบื้องต้นได้สำเร็จ นอกจากนี้ ยังมีห้องอื่น ๆ ที่ต้องสำรวจตราบใดที่ศูนย์พักพิงไม่พังทลายลงมา"
 cstorms.120.a: "ดำเนินการด้วยความระมัดระวัง"
 cstorms.120.b: "เราสามารถเร่งงานได้"
 cstorms.120.c: "เร่งความพยายามของคุณซะ ทิ้งสิ่งอื่นทั้งหมดไป"
 cstorms.125.name: "การประกันรักษาสินทรัพย์"
 cstorms.125.desc: "ห้องและโถงที่อยู่ลึกลงไปด้านล่างไม่ได้ถูกทิ้งร้างเหมือนบริเวณทางเข้า กล่องสินค้าจำนวนมากเติมเต็มพื้นที่ตั้งแต่บนลงล่าง ทั้งหมดได้รับการบรรจุและซ้อนกันอย่างเป็นระเบียบ การแปลเบื้องต้นระบุถึงวัตถุดิบที่ยังไม่ผ่านกระบวนการแปรรูปและชิ้นส่วนอิเล็กทรอนิกส์ที่ยังไม่เสร็จสมบูรณ์ ซึ่งทั้งสองอย่างนี้ไม่จำเป็นต่อการเอาชีวิตรอด รายการยังแสดงรายละเอียดจำนวนสิ่งของ ณ สถานที่แห่งนี้ และคาดการณ์กำไรที่พวกมันจะสร้างได้บนสิ่งที่เรียกว่า เครือข่ายการค้าที่เท่าเทียมระหว่างกาแล็กซี หรือเรียกสั้น ๆ ว่า INET\n\nถ้อยคำรอบตัวแลกเปลี่ยนการค้าอันกว้างใหญ่นี้เกือบจะแสดงความปิติยินดีอย่างยิ่ง พร้อมบันทึกอย่างพิถีพิถันเกี่ยวกับธุรกรรมและดัชนีกำไรแยกตามรายการ แท้จริงแล้วดูเหมือนว่าอารยธรรมที่สาบสูญนี้ได้ตั้งชื่อตนเองตามเครือข่ายแลกเปลี่ยน โดยเรียกตัวเองว่าผู้ค้าอิเนเชียน(ผู้ค้าชาวเน็ต)\n\nศูนย์พักพิงแห่งนี้ไม่ได้สร้างขึ้นเพื่อปกป้องประชากรทั่วไป แต่เป็นเพียงคลังสินค้าสินค้าโภคภัณฑ์ที่หรูหราเท่านั้น สิ่งนี้ก่อให้เกิดคำถามว่า ทำไมศูนย์พักพิงของพวกเขาจึงไร้อุปกรณ์สำหรับรับมือพายุได้อย่างน่าอนาถเช่นนี้?\n\nการแปลเพิ่มเติมควรจะช่วยให้เราเข้าใจมากขึ้น แต่เวลาของเรามีจำกัด ดังที่เห็นได้จากเสียงเอี๊ยดอ๊าดอันน่าสะพรึงกลัวของโครงสร้างพื้นฐาน"
 cstorms.125.a: "ระวังข้างล่างด้วยนะ"
 cstorms.125.b: "ให้ความสำคัญกับการดึงข้อมูล"
 cstorms.125.c: "เราสามารถช่วยเหลือในการสืบค้นได้"
 cstorms.130.name: "กลอุบายในตลาดการค้า"
 cstorms.130.desc: "เสียง ฉีก ขาด และ การ แตก หัก ยิ่ง รุนแรง ขึ้น. อย่างไรก็ตาม การแปลยังคงดําเนินต่อไปภายในที่ซ่อนตัว[From.Planet.GetName]ขณะ ที่ สินค้า ที่ สะสม ไว้ ปรากฏ ว่า ไร้ ประโยชน์ ใน ฐานะ แหล่ง ที่ มา ของ การ สอบถาม แต่ สถาน ปฏิบัติ การ เผย ให้ เห็น มาก มาย.\n\nชุดของพิกัดรบกวนชี้ไปที่สถานที่ ของอุปกรณ์ของ 'พลังงานที่ดี' ตั้งอยู่บนดาวเคราะห์ใกล้เคียง จากที่เราเข้าใจได้ อุปกรณ์นี้มีความสามารถในการ \"ผูกพันธ์\"เสียงฉีกขาดและแตกหักดังรุนแรงขึ้นเรื่อย ๆ อย่างไรก็ตาม ความพยายามในการแปลภาษายังคงดำเนินต่อไปภายในศูนย์พักพิงบน [From.Planet.GetName] แม้ว่าสินค้าคงคลังที่กักตุนไว้จะไม่สามารถนำมาเป็นแหล่งข้อมูลวิจัยได้ แต่เทอร์มินัลที่ยังทำงานอยู่ได้เปิดเผยข้อมูลมากมาย\n\nพิกัดที่ถูกบิดเบือนชุดหนึ่งชี้ไปยังตำแหน่งของอุปกรณ์ที่มี 'อำนาจอันยิ่งใหญ่' ซึ่งตั้งอยู่บนดาวเคราะห์ใกล้เคียง จากที่เราสามารถเข้าใจได้ อุปกรณ์นี้มีความสามารถที่จะ "
 cstorms.130.a: "โอกาสดีเกินกว่าจะปล่อยให้ผ่านไป"

# Special Project Descramble the Coordinates
 INETIAN_PROJECTS_01: "ถอดรหัสพิกัด"
 INETIAN_PROJECTS_01_DESC: "พิกัดที่ถูกบิดเบือนชุดหนึ่งถูกกู้มาจาก [wm_storm_shelter_planet.GetName] ก่อนที่ศูนย์พักพิงจะถล่มลงมา เรามีเหตุผลให้เชื่อว่าหนึ่งในนั้นอาจนำไปสู่เครื่องจักรที่พวกผู้ค้าอิเนเชียนใช้ควบคุมพายุคอสมิก นี่อาจเป็นเทคโนโลยีที่คุ้มค่าแก่การตามหา"

# Special project completed
 cstorms.135.name: "ระบบดาวอันอุดมสมบูรณ์"
 cstorms.135.desc: "โชคดีที่ [Root.Owner.GetScientistPlural] ของเราหนีออกมาจากศูนย์พักพิงที่กำลังถล่มบน [wm_storm_shelter_planet.GetName] ได้พร้อมกับชุดพิกัดที่ถูกบิดเบือน ข้อมูลนี้ได้รับการกู้คืนตั้งแต่นั้นมา และส่งผลให้มีสถานที่สามแห่งให้เราได้สำรวจ:\n\n[wm_digsite_A.GetName], [wm_digsite_B.GetName] และ [wm_digsite_C.GetName] การวิเคราะห์เพิ่มเติมบ่งชี้ว่าดาวเคราะห์แต่ละดวงมีบทบาทสำคัญในเครือข่ายของผู้ค้าอิเนเชียน ซึ่งสำคัญพอที่จะได้รับการบันทึกไว้ในศูนย์พักพิงบน [wm_storm_shelter_planet.GetName]"

# Precursors Event Chain
 cs_inetian_chain_title: "ผู้บุกเบิก - ผู้ค้าอิเนเชียน"
 cs_inetian_chain_desc: "เราได้พบเศษซากของศูนย์พักพิงโบราณที่เป็นของอารยธรรมที่เคยรุ่งเรืองเมื่อหลายล้านปีก่อน - อารยธรรมที่ไม่ปรากฏในบันทึกอื่นใดของเรา ราวกับว่ามันถูกลบออกไปจากประวัติศาสตร์อย่างพิถีพิถัน หากเราตรวจสอบ เราอาจจะสามารถค้นพบว่าทำไม"

# Arcsite Coordinates A
 site_weathermanipulators_CoordinatesA_Residential_Planet: "พิกัด A:ดาวเคราะห์อาณานิคม"
 site_weathermanipulators_CoordinatesA_Residential_Planet_intro: "หนึ่งในสามชุดพิกัดที่พบในศูนย์พักพิงพายุโบราณนำเราไปสู่ [From.Planet.GetName] เมื่อพิจารณาจากขอบเขตของซากปรักหักพัง เห็นได้ชัดว่าดาวเคราะห์ดวงนี้เคยมีศูนย์กลางเมืองขนาดใหญ่แผ่ขยายออกไปมากมาย นี่อาจเป็นที่ที่พลเมืองของผู้ค้าอิเนเชียนเคยอาศัยอยู่เมื่อหลายพันล้านปีก่อน เหตุใดพิกัดเหล่านี้จึงถูกเก็บรักษาไว้อย่างแน่นหนาในศูนย์พักพิงพายุจำเป็นต้องได้รับการสำรวจ"
 cstorms.140.name: "ความตั้งใจทางศาสนา"
 cstorms.140.desc: "ไม่เหลืออะไรมากนักในเมืองต่าง ๆ บน [From.Planet.GetName] นอกเหนือจากการล่วงเลยของเวลาแล้ว โครงสร้างที่น่าทึ่งส่วนใหญ่ที่กระจายอยู่บนผืนดินต่างถูกทำลายโดยพายุ ลักษณะทางสถาปัตยกรรมที่หลงเหลืออยู่นั้นสอดคล้องกับที่เห็นบน [wm_storm_shelter_planet.GetName] นั่นคือการขาดการเตรียมพร้อมรับมือภัยพิบัติอย่างเห็นได้ชัด แม้ว่าจะมีหลักฐานมากมายเกี่ยวกับความรุนแรงของพายุก็ตาม การทำลายล้างที่ย่อยยับจะทำให้ยากต่อการค้นหาสิ่งที่เป็นประโยชน์ แต่หวังว่าจะไม่เป็นไปไม่ได้\n\n[Root.Owner.GetScientistPlural] ของเราได้กำหนดจุดที่น่าสนใจสามจุดใกล้กับสถานที่ลงจอด: โครงสร้างบริการสาธารณะที่ค่อนข้างสมบูรณ์ วิหารบางประเภท และจัตุรัสกลางขนาดใหญ่ สิ่งเหล่านี้น่าจะเป็นสถานที่ที่ดีในการขุดค้นความลับของผู้ค้าอิเนเชียนต่อไป"
 cstorms.145.name: "ศูนย์กลางเศรษฐกิจ"
 cstorms.145.desc: "หลายทีมแยกย้ายกันไปสำรวจจุดที่มีแนวโน้มดีที่สุดสามแห่ง แม้ว่าโครงสร้างการบริการและจัตุรัสสาธารณะจะน่าสนใจในฐานะตัวอย่างทางวัฒนธรรมและสถาปัตยกรรม แต่มีเพียงสถานที่สักการะบูชาเท่านั้นที่น่าจดจำเป็นพิเศษ\n\nซุ้มประตูที่พังทลายของมันซ่อนโถงทางเดินขนาดใหญ่เอาไว้ ภายในมีเทอร์มินัลคอมพิวเตอร์ 521 เครื่องที่จัดเรียงเป็นวงกลมร่วมศูนย์กลาง ซึ่งตรงใจกลางพอดีมีโมเดลระบบดาวนี้ที่น่าประทับใจและยังคงทำงานได้สมบูรณ์ตั้งอยู่ ชิ้นส่วนนาโนที่ละเอียดอ่อนภายในแบบจำลองได้รับการปรับแต่งให้เข้ากับสนามแม่เหล็กไฟฟ้าของดาวเคราะห์ แม้ว่าจะมีอายุเก่าแก่มาก แต่แบบจำลองนี้ยังคงแสดงภาพเทหวัตถุในระบบดาวนี้ได้อย่างถูกต้องแม่นยำ\n\nยิ่งไปกว่านั้น ตามแนวฐานทรงกลมยังมีส่วนต่อประสานที่มองเห็นได้จากทุกตำแหน่งเทอร์มินัล สิ่งที่ถูกเบิร์นลงบนหน้าจอของอินเตอร์เฟซนี้คือรายชื่อองค์กรธุรกิจและมูลค่าหุ้น นี่ไม่ใช่สถานที่สักการะทางศาสนา แต่เป็นศูนย์กลางการค้าและตลาดหลักทรัพย์ของ INET\n\nสมเหตุสมผลที่จะสรุปได้ว่าอาคารนี้เคยเป็นที่เก็บข้อมูลสำคัญ ซึ่งควรจะค้นหามันให้พบ"
 cstorms.145.a: "พลิกแผ่นดินหาให้ทั่ว"
 cstorms.150.name: "คู่มืออ้างอิง"
 cstorms.150.intro: "หลังจากตรวจสอบอย่างละเอียดถี่ถ้วนมากขึ้น ก็เห็นได้ชัดว่าศูนย์กลางการค้าบน [From.Planet.GetName] ถูกกวาดจนเกลี้ยง เทอร์มินัลใช้งานไม่ได้ และนอกจากรูปภาพที่เบิร์นอยู่บนอินเตอร์เฟซของแบบจำลองแล้ว ก็ไม่มีข้อมูลการค้าอื่นใดหลงเหลืออยู่อีก\n\nอย่างไรก็ตาม ตู้เก็บของที่ซ่อนอยู่ตรงมุมหนึ่งของห้องโถงมีสิ่งที่ดูเหมือนจะเป็นคู่มือผู้ใช้งาน ด้วยรหัสแปลภาษาพื้นฐานที่พัฒนาขึ้นระหว่างการขุดค้นของเราบน [wm_storm_shelter_planet.GetName] เราจึงแปลคู่มือเหล่านี้อย่างคร่าว ๆ ได้สำเร็จ\n\nมีคำแนะนำในการใช้งานเทอร์มินัล การปรับแต่งแบบจำลองระบบดาว และการขอความช่วยเหลือจากเครื่องจักรที่ขนานนามว่า อุปกรณ์ลดระดับการปั่นป่วนของพื้นที่(เสียงกดอากาศ)รายละเอียดเกี่ยวกับวิธีการใช้งาน การเล็งเป้าหมาย และการเปิดใช้งานเครื่องจักรนี้มีการระบุไว้อย่างชัดเจน\n\nนี่ต้องเป็นอุปกรณ์ที่กล่าวถึงในศูนย์พักพิงพายุโบราณ และอาจเป็นสิ่งที่เรากำลังมองหาอยู่พอดี"
 cstorms.150.outro: "เราเข้าใกล้ความเข้าใจในความเจตนาของผู้ค้าอิเนเชียนไปอีกก้าว และบางทีเราอาจควบคุมพลังของเครื่องจักรนี้เพื่อตัวเราเองได้"
 cstorms.150.desc.a: "$cstorms.150.intro$ นี่หมายความว่า $cstorms.150.outro$"
 cstorms.150.desc.b: "$cstorms.150.intro$ คู่มืออ้างถึงชิ้นส่วนหนึ่งที่เราพบบน [wm_digsite_B.GetName] และวิธีติดตั้งมัน นี่หมายความว่า $cstorms.150.outro$"
 cstorms.150.desc.c: "$cstorms.150.intro$ คู่มืออ้างถึงเครื่องจักรที่เราพบบน [wm_digsite_C.GetName] แต่เรายังคงขาดชิ้นส่วนสำคัญไป ถึงกระนั้น $cstorms.150.outro$"
 cstorms.150.desc.d: "$cstorms.150.intro$ คู่มืออ้างถึงเครื่องจักรที่เราพบบน [wm_digsite_C.GetName] และวิธีติดตั้งชิ้นส่วนจาก [wm_digsite_B.GetName] ขั้นตอนสุดท้ายคือการเปิดใช้งานอุปกรณ์ลดระดับการปั่นป่วนของพื้นที่เท่านั้น จากนั้นในที่สุดเราก็สามารถควบคุมพลังของมันเพื่อตัวเราเองได้!"
 cstorms.150.a: "ไปกันต่อ"

# Arcsite Coordinates B
 site_weathermanipulators_CoordinatesB_Industrial_Planet: "พิกัดบี:ดาวเคราะห์อุตสาหกรรม"
 site_weathermanipulators_CoordinatesB_Industrial_Planet_intro: "หนึ่งในสามพิกัดที่พบในศูนย์พักพิงพายุโบราณนำเรามาสู่ [From.Planet.GetName] โลกอุตสาหกรรมจากจักรวรรดิของผู้ค้าอิเนเชียน จากสถาปัตยกรรมที่มีอยู่ เห็นได้ชัดว่าดาวเคราะห์ดวงนี้ไม่ใช่ที่อยู่อาศัย อย่างไรก็ตาม ยังคงไม่แน่ชัดว่าศักยภาพทางอุตสาหกรรมของที่นี่มีขึ้นเพื่อผลิตสิ่งใดกันแน่"
 cstorms.155.name: "ประสิทธิภาพทางอุตสาหกรรม"
 cstorms.155.desc: "เป็นการยากที่จะมองเห็นพื้นผิวของ [From.Planet.GetName] ผ่านหมอกควันที่หนาทึบซึ่งยังคงวนเวียนอยู่เหนือโรงงาน พื้นผิวส่วนใหญ่ของดาวเคราะห์ดวงนี้ถูกทำลายโดยความเสียหายจากพายุคอสมิก เหลือทิ้งไว้ซึ่งรอยแยกขนาดใหญ่ในภูมิทัศน์อุตสาหกรรมที่เป็นเนื้อเดียวกัน หนึ่งในรอยแยกเหล่านี้ถือเป็นโอกาสในการลงจอดที่สมบูรณ์แบบสำหรับยานของเรา\n\nไม่มีร่องรอยว่ามีความพยายามจะรื้อถอนโรงงานผลิตเหล่านี้เลย พวกมันถูกทิ้งไว้เฉย ๆ และหลายแห่งยังคงมีวัตถุดิบในการผลิต การวิเคราะห์สิ่งนี้อาจทำให้เราเข้าใจว่าดาวเคราะห์ดวงนี้มีจุดประสงค์อะไรในโครงสร้างพื้นฐานทางการค้าของอารยธรรมโบราณ นอกจากนี้ยังอาจบอกเราเพิ่มเติมเกี่ยวกับเครื่องจักรชื่อดังที่ถูกอ้างถึงบน [wm_storm_shelter_planet.GetName]"
 cstorms.160.name: "ขนส่งสิ่งสำคัญ"
 cstorms.160.desc: "การ วิเคราะห์ วัสดุ อุตสาหกรรม ใน ยุค แรก ๆ[From.Planet.GetName]ระบุว่ามีการแต่งหน้าที่ผันผวนสูง ผลิตภัณฑ์เหล่านี้เป็นส่วนหนึ่งของกระบวนการที่มีขนาดใหญ่ขึ้น และไม่ใช้ในการใช้ด้วยตัวเอง ใน ที่ สุด สาร เหล่า นี้ ก็ ถูก ส่ง ผ่าน ระบบ ลําเลียง ไป ยัง คลัง เก็บ รวบ รวม ที่ อยู่ ใจ กลาง.\n\nจากรอยไหม้ที่อยู่รอบ ๆ ชัดเจนว่า คลังสินค้านี้ถูกใช้งานอย่างต่อเนื่อง โดยการขนส่งอวกาศ คําถามคือสินค้าถูกส่งมอบที่ไหน จากลักษณะระเบิดของสินค้า มันไม่น่าจะไกลนัก\n\nใกล้ ๆ นั้น เรา ได้ พบ กล่อง ส่ง สินค้า หลาย กล่อง. เห็น ได้ ชัด ว่า ความ เจ็บ ปวด ถูก นํา ไป เก็บ ไว้ อย่าง ปลอด ภัย เนื่อง จาก ส่วน ที่ เหลือ ของ ป้าย เตือน ภัย ยัง คง พิมพ์ อยู่ ข้าง ๆ. แค่คําเดียวก็ยังพอใช้ได้การวิเคราะห์เบื้องต้นเกี่ยวกับวัสดุอุตสาหกรรมที่ใช้งานบน [From.Planet.GetName] บ่งชี้ถึงองค์ประกอบที่ผันผวนสูง ผลิตภัณฑ์เหล่านี้เป็นส่วนหนึ่งของกระบวนการขนาดใหญ่ และไม่ควรใช้เดี่ยว ๆ ในที่สุด สารเหล่านี้ก็ถูกขนส่งผ่านระบบสายพานลำเลียงไปยังคลังเก็บรวบรวมส่วนกลาง\n\nจากรอยไหม้รอบด้าน เห็นได้ชัดว่าคลังสินค้าแห่งนี้ถูกใช้งานอย่างต่อเนื่องโดยการขนส่งระหว่างดาวเคราะห์ คำถามคือ ผลิตภัณฑ์ดังกล่าวถูกส่งไปที่ใดกันแน่? เมื่อพิจารณาจากลักษณะที่ระเบิดได้ของสินค้าคงคาดว่าคงอยู่ไม่ไกลนัก\n\nบริเวณใกล้เคียงเราพบลังขนส่งสินค้าหลายลัง เห็นได้ชัดว่ามีความอุตสาหะในการบรรจุเนื้อหาภายในอย่างปลอดภัย เนื่องจากมีเศษซากป้ายเตือนพิมพ์หลงเหลืออยู่ด้านข้าง มีเพียงคำเดียวเท่านั้นที่ยังอ่านออก: "
 cstorms.165.name: "ชิ้นส่วนที่ขาดหาย"
 cstorms.165.intro: "[Root.Owner.GetScientistPlural] ของเราได้รื้อลังบรรจุสินค้าที่วางอยู่อย่างล่อแหลมนั้นออกอย่างรวดเร็ว\n\nเมื่อเปิดลังแรก เสียงฟู่ที่รุนแรงบ่งบอกถึงการมีอยู่ของห้องควบคุมอุณหภูมิด้านใน ทำให้เกิดความตื่นตระหนกชั่วขณะว่าสิ่งของภายในอาจสลายตัว โชคดีที่พวกมันไม่ได้รับความเสียหาย\n\nการตรวจสอบอย่างใกล้ชิดเผยให้เห็นส่วนประกอบของเครื่องจักรที่ได้รับการประดิษฐ์ขึ้นอย่างงดงามและวางไว้อย่างระมัดระวัง ซึ่งภายในมีสารระเหยจำนวนหนึ่งที่ผลิตจากโรงงานแห่งนี้"
 cstorms.165.outro: "\n\nด้วยเหตุนี้ เราจึงจะนำชิ้นส่วนนี้ขึ้นยานเพื่อศึกษาเพิ่มเติม [Root.Owner.GetScientistPlural] ของเราไม่ควรใช้เวลาอยู่บนพื้นผิวอันโหดร้ายของ [From.Planet.GetName] เกินความจำเป็น"
 cstorms.165.desc.a: "$cstorms.165.intro$\n\nป้ายการจัดส่งที่อยู่ภายในลัง กล่าวถึงบางอย่างที่เรียกว่า \"เครื่องกดอากาศ\" ของเรา[Root.Owner.GetScientistPlural]ไม่ แน่ ใจ ว่า นั่น หมาย ความ ว่า อย่าง ไร แต่ เมื่อ ได้ รับ ตู้ เก็บ ของ หนัก และ ได้ รับ คํา เตือน ที่ ฉาบ ปูน ไว้ นอก ลัง คง ต้อง เป็น เรื่อง สําคัญ แน่ ๆ.$cstorms.165.outro$" # A & C sites not yet visited
 cstorms.165.desc.b: "$cstorms.165.intro$\n\nส่วนนั้นดูคุ้นตาทันที และลูกเรือก็ดึงคู่มือที่พบบน[wm_digsite_A.GetName]เพื่อเปรียบเทียบ วัตถุที่สร้างขึ้นอย่างซับซ้อนภายในลัง เป็นส่วนประกอบที่สําคัญในการกดอากาศ$cstorms.165.outro$" # A site visited & C site not visited
 cstorms.165.desc.c: "$cstorms.165.intro$\n\nรูปทรงที่ไม่ซ้ํากันและแกนของเหลวที่เปิดเผยนี้อาจเป็นส่วนหนึ่งที่แน่นอนที่จําเป็นเพื่อทําให้การติดตั้งบน[wm_digsite_C.GetName]สสารที่อยู่ภายในจะต้องถูกใช้ เพื่อพลังงานในการลดความเครียดส่วน อย่าง ไร ก็ ตาม ดู เหมือน ว่า จะ ต้อง มี ความ รู้ เฉพาะ เจาะจง เพื่อ ติด ตั้ง ไว้ อย่าง ปลอด ภัย.$cstorms.165.outro$" # A site not visited & C site visited
 cstorms.165.desc.d: "$cstorms.165.intro$\n\nส่วนนี้ดูเหมือนจะเป็นชิ้นส่วนที่หายไป จากส่วนลดความอึดอัดบน[wm_digsite_C.GetName]ด้วยคู่มือที่พบบน[wm_digsite_A.GetName]เราจะสามารถติดตั้งมันอย่างถูกต้อง และอาจจะเปิดใช้งานมันในที่สุด$cstorms.165.outro$" # A & C sites visited
 cstorms.165.a: "งานนี้ทำได้ดีมาก"

# Arcsite Coordinates C
 site_weathermanipulators_CoordinatesC_Barren_Planet: "พิกัดซี:ดาวเคราะห์ร้าง"
 site_weathermanipulators_CoordinatesC_Barren_Planet_intro: "หนึ่งในสามพิกัดที่พบในศูนย์พักพิงพายุโบราณนำเรามาสู่ [From.Planet.GetName] พื้นผิวไม่มีอะไรมากไปกว่าหิมะและฝุ่นละออง แต่ผลการสแกนเบื้องต้นพบว่าดาวเคราะห์ดวงนี้เคยอยู่อาศัยได้ มันสำคัญต่อพวกผู้ค้าอิเนเชียนก่อนหรือหลังความเสื่อมโทรมของมันกันแน่?"
 cstorms.170.name: "ไม่มีที่สิ้นสุดและไร้ความปราณี"
 cstorms.170.desc: "พายุหิมะที่ไม่สิ้นสุดพัดกระหน่ำพื้นผิวของ [From.Planet.GetName] ราวกับว่านั่นยังไม่ท้าทายพอ ภูมิทัศน์ที่ปกคลุมไปด้วยหิมะยังซ่อนความประหลาดใจอันน่าแปลกใจไว้\n\nฝุ่นละอองที่ทับถมกันชั้นแล้วชั้นเล่ารอเราอยู่เบื้องล่าง พบหลักฐานของสิ่งมีชีวิตที่เคยอาศัยอยู่ในโลกนี้ภายในนั้น ทั้งหมดถูกฝังไว้ในเวลาเดียวกัน บ่งชี้ถึงเหตุการณ์สูญพันธุ์ครั้งใหญ่ครั้งเดียว การล่มสลายของระบบนิเวศบน [From.Planet.GetName] ส่งผลให้ชั้นบรรยากาศเบาบางลงในเวลาต่อมา นำไปสู่ยุคน้ำแข็งที่ทำให้ดาวเคราะห์กลายเป็นดินแดนรกร้าง\n\nต้องมีอะไรมากกว่าทรายและแผ่นน้ำแข็งในสถานที่แห่งนี้อย่างแน่นอน แต่เห็นได้ชัดว่าบนพื้นผิวจะไม่ให้คำตอบเพิ่มเติมใด ๆ แก่เรา [Root.Owner.GetScientistPlural] ของเราแนะนำให้ค้นหาลึกลงไปอีก"
 cstorms.170.a: "เริ่มขุดค้นกันเลย"
 cstorms.171.name: "รากฐานแห่งชีวิต"
 cstorms.171.desc: "ด้วยการสวมอุปกรณ์ป้องกันและใช้เครื่องจักรกลหนักที่ทนทานต่อความเย็นจัด [Root.Owner.GetScientistPlural] ของเราได้จัดทำขั้นตอนการกำจัดหิมะและฝุ่นละอองที่น่าเบื่อหน่ายแต่เรียบง่ายอย่างรวดเร็ว ในไม่ช้าก็พบรูปแบบที่แปลกประหลาด นั่นคือแนวสนามเพลาะที่แพร่กระจายออกไปเป็นรูปแบบคล้ายรากไม้ครอบคลุมพื้นที่กว้างใหญ่\n\nภายในรอยแยกเหล่านั้น เราพบเศษซากแห้งกรังของสิ่งมีชีวิตทุกประเภท ทุกอย่างที่เครื่องนี้สามารถดึงมาจากพื้นผิวของดาวเคราะห์ ตั้งแต่พืชพรรณไปจนถึงสัตว์ป่าและทุกอย่างที่อยู่ระหว่างนั้น ทางใดทางหนึ่ง แนวสนามเพลาะได้บดเคี้ยวสารอินทรีย์โดยการบดพวกมันระหว่างกำแพงหิน สกัดสารอาหารที่เป็นประโยชน์และนำพวกมันไปยังจุดรวมตัวในกระบวนการที่คล้ายคลึงกับการย่อยอาหาร ฝุ่นที่พวกมันพ่นกลับออกมาในตอนนี้ปกคลุมพื้นที่ส่วนใหญ่ของภูมิทัศน์บน [From.Planet.GetName]\n\nสิ่งนี้ทำให้เกิดคำถามว่า รอยแยกเหล่านี้กำลังป้อนอาหารให้ใคร หรือสิ่งใด"
 cstorms.171.a: "ค้นหาต้นกำเนิด"
 cstorms.172.name: "เครื่องจักรแห่งอดีตกาล"
 cstorms.172.intro: "เครือข่ายสนามเพลาะใต้ดินนั้นกว้างขวาง ยิ่ง [Root.Owner.GetScientistPlural] ของเราเดินทางไปไกลเท่าใด ร่องน้ำเหล่านี้ก็ยิ่งกระจุกตัวกันมากขึ้นเท่านั้น ทั้งหมดมารวมกันที่ยอดเขาแห่งหนึ่งที่ยังหลงเหลืออยู่บน [From.Planet.GetName] บนยอดเขามีที่ราบสูงที่ดูผิดธรรมชาติอย่างเห็นได้ชัด โดยมีเครื่องจักรขนาดใหญ่สามเครื่องตั้งอยู่ในระยะห่างเท่า ๆ กัน เครื่องจักรเหล่านี้ดูเหมือนจะมีต้นกำเนิดมาจากอิเนเชียน โดยมีสัญลักษณ์ในภาษาของพวกเขาและมีการออกแบบที่สอดคล้องกับสังคมที่เรารู้จัก แม้ว่าพวกมันจะมีอายุยาวนานมากและมีลมแรงพัดผ่านที่ราบสูง แต่พวกมันก็ยังคงอยู่ในสภาพที่ดีเยี่ยม"
 cstorms.172.outro: "\n\nถึงกระนั้น เราก็พบสิ่งที่เรากำลังมองหาอยู่แล้ว เรายืนอยู่ ณ ปลายผาของการค้นพบครั้งสำคัญและน่าทึ่ง"
 cstorms.172.desc.a: "$cstorms.172.intro$มันต้องเป็นเครื่องจักรที่กล่าวถึง[wm_storm_shelter_planet.GetName]แต่โชคร้ายที่เราขาดความรู้ ที่จําเป็นในการเข้าใจ ไม่ เพียง เท่า นั้น แต่ แผง ควบคุม ซึ่ง ค้น พบ ที่ ฐาน ของ เครื่องจักร ชนิด หนึ่ง ก็ ยัง ขาด ส่วน ประกอบ สําคัญ อย่าง เห็น ได้ ชัด. ที่ถูกเคลือบด้วยแผ่นเล็กๆ คือคําว่า \"ผู้ลดความกดอากาศ\"\n\nถ้าเราสามารถเปิดใช้งานเครื่องจักร เราอาจจะค้นพบวัตถุประสงค์ของพวกเขาในที่สุด เพื่อทําเช่นนั้น เราจะต้องสํารวจ พิกัดที่เหลือ$cstorms.172.outro$" # A&B not visited
 cstorms.172.desc.b: "$cstorms.172.intro$ \n\nแผนผังที่เราสังเกตในคู่มือที่พบบน[wm_digsite_A.GetName]ดูเหมือนว่าจะตรงกับเครื่องมือที่อยู่ด้านหน้าของเรา ซึ่งต้องหมายความว่าเหล่านี้เป็นความกดอากาศทางประสาทและนี้เป็นการติดตั้งเครื่องที่กล่าวถึงในหลุมหลบพายุที่พบบน[wm_storm_shelter_planet.GetName].\n\nคู่มือ ระบุ ว่า เครื่องจักร เหล่า นี้ ต้อง ใช้ แผง ควบคุม เพื่อ ควบคุม การ ผ่าตัด. ของเรา[Root.Owner.GetScientistPlural]แต่ ดู เหมือน ว่า เครื่อง นั้น ขาด ส่วน สําคัญ ไป. อย่างไรก็ตาม เรายังมีพิกัดเหลือชุดเดียว ซึ่งสามารถถือวิธีการแก้สถานการณ์นี้ได้$cstorms.172.outro$" # A visited & B not visited
 cstorms.172.desc.c: "$cstorms.172.intro$ \n\nนี่ต้องเป็นเครื่องจักรที่กล่าวถึง[wm_storm_shelter_planet.GetName]ตั้งชื่อว่า ผู้คุมวิญญาณ มากไปกว่านั้น ส่วนของเครื่องจักรที่เราพบบน[wm_digsite_B.GetName]มี การ เจาะ เข้า ไป ใน แผง ควบคุม อย่าง ง่าย ดาย ที่ เท้า ของ เครื่องจักร เครื่อง หนึ่ง.\n\nอย่าง ไร ก็ ตาม ความ พยายาม ใด ๆ ที่ จะ ซ่อมแซม ต่อ ไป นั้น เสี่ยง ต่อ การ เกิด ความ ซับ ซ้อน และ อายุ ของ ส่วน ประกอบ. ของเรา[Root.Owner.GetScientistPlural]แนะนําการค้นหาข้อมูลเพิ่มเติม ก่อนที่จะดําเนินการ$cstorms.172.outro$" # A not visited & B visited
 cstorms.172.desc.d: "$cstorms.172.intro$ \n\nนี่เป็นเครื่องจักรที่กล่าวมา[wm_storm_shelter_planet.GetName]รวมทั้งเรื่องคู่มือจาก[wm_digsite_A.GetName]รู้จักกันในชื่อ ผู้คุมอาการ สิ่งที่เหลืออยู่คือติดตั้งส่วนที่เราพบบน[wm_digsite_B.GetName]และหวังว่าเครื่องจักรยังคงทํางาน แล้วในที่สุดเราจะค้นพบ วัตถุประสงค์ของพวกเขา$cstorms.172.outro$" # A&B visited
 cstorms.172.a: "ถึงเวลาดูว่าเครื่องจักรทําอะไรได้บ้าง" # Finished sites A and B
 cstorms.172.b: "ข้างหน้า" # Did not finish sites A and B

# Special Project 2
 INETIAN_PROJECTS_02: "ความหมายของเครื่องจักร"
 INETIAN_PROJECTS_02_DESC: "พิกัดทั้งสามจาก [wm_storm_shelter_planet.GetName] ได้เติมเต็มปริศนาโบราณในที่สุด สิ่งที่เหลืออยู่เพียงอย่างเดียวคือการเปิดใช้งานอุปกรณ์ลดระดับการปั่นป่วนของพื้นที่ ถึงเวลาแล้วที่จะค้นหาจุดประสงค์ของพวกมัน"
 cstorms.176.name: "ความหมายของเครื่องจักร"
 cstorms.176.desc: "เมื่อพบจิ๊กซอว์ชิ้นสุดท้าย [Root.Owner.GetScientistPlural] ของเราก็เริ่มลงมือ ชิ้นส่วนจาก [wm_digsite_B.GetName] ถูกเสียบเข้ากับแผงคอนโซลควบคุมอย่างเรียบร้อย คู่มือจาก [wm_digsite_A.GetName] ถูกนำมาใช้ในการติดตั้งอย่างถูกต้อง เมื่อเสร็จสิ้น เครื่องจักรทั้งสามเครื่องก็กลับมามีชีวิตอีกครั้ง\n\nแรงสั่นสะเทือนดังสนั่นหวั่นไหวพัดพาฝุ่นและหิมะให้ออกจากที่ราบสูง ด้วยเสียงเปรี๊ยะราวกับสายฟ้า [Root.Owner.GetScientist] ร่างสลายกลายเป็นไอทันที ฝุ่นละอองที่เคยเป็นร่างกายถูกดูดกลืนลงไปในสนามเพลาะตรงไปยังอุปกรณ์ลดระดับการปั่นป่วนของพื้นที่อย่างรวดเร็ว\n\nนี่คือกุญแจสำคัญสู่สิ่งที่เกิดขึ้นบน [wm_digsite_C.GetName]: สนามเพลาะที่นำไปสู่ฐานของเครื่องจักรคือท่อส่งเชื้อเพลิงที่ดูดกลืนมวลชีวภาพรอบตัว ผลลัพธ์ที่ได้คือร่องรอยแห่งการทำลายล้างทั่วดาวเคราะห์\n\nขณะนี้อุปกรณ์ลดระดับการปั่นป่วนของพื้นที่พร้อมใช้งานอย่างสมบูรณ์แล้ว มีเชื้อเพลิงเหลือเพียงพอสำหรับการใช้งานเพียงครั้งเดียว สิ่งที่เหลืออยู่ตอนนี้คือการกดปุ่มเท่านั้น"
 cstorms.176.a: "เปิดใช้งานเครื่องจักร"
 cstorms.176.b: "ห้ามกดปุ่มนั้นเด็ดขาด"

#Delayed Event 1
 cstorms.180.name: "เศษซากที่ค้นพบอีกครั้ง"
 cstorms.180.desc: "หลังจากเปิดเผยความลับของอุปกรณ์ลดระดับการปั่นป่วนของพื้นที่แล้ว เบาะแสเกี่ยวกับชะตากรรมของผู้ค้าอิเนเชียนก็เงียบหายไป อย่างไรก็ตาม การประเมินข้อมูลใหม่อย่างรอบด้านได้ช่วยให้เห็นข้อมูลเชิงลึกใหม่ ๆ\n\nบันทึกการค้าจาก [wm_digsite_A.GetName] แสดงให้เห็นว่าคนเหล่านี้มีความเชื่อในความเท่าเทียมอย่างแรงกล้า ข้อสรุปนี้ได้รับการสนับสนุนจากมาตรฐานการครองชีพที่สูงและสิ่งอำนวยความสะดวกที่หรูหรามากมายที่ยังคงหลงเหลืออยู่บนดาวเคราะห์ โดยมีความแตกต่างกันเพียงเล็กน้อยเท่านั้น พลเมืองทุกคนต่างได้รับความสะดวกสบายและโอกาสในส่วนแบ่งที่เท่าเทียมกัน ไม่ว่าพวกเขาจะมีอาชีพ ตำแหน่งทางสังคม หรือสายเลือดใดก็ตาม\n\nบน [wm_digsite_B.GetName] เราพบดัชนีระบุรายละเอียดการใช้งานของโรงงานแต่ละแห่ง สิ่งเหล่านี้เป็นส่วนหนึ่งของห่วงโซ่การผลิตขนาดใหญ่ ซึ่งจัดตั้งขึ้นเพื่อให้จักรวรรดิอันกว้างใหญ่มีปัจจัยที่จำเป็นในการรองรับวิถีชีวิตที่หรูหรา การแจกจ่ายผลประโยชน์ที่เท่าเทียมกันนี้จำเป็นต้องใช้วัตถุดิบและการบริโภคอาหารในปริมาณที่น่าตกใจอย่างแท้จริง ซึ่งต้องผลิตด้วยความเร็วสูงสุด\n\nอุปกรณ์ลดระดับการปั่นป่วนของพื้นที่ที่ได้รับการซ่อมแซมบน [wm_digsite_C.GetName] ช่วยให้ข้อมูลเพิ่มเติมก่อนที่จะถูกปิดใช้งานอย่างสมบูรณ์ แม้ว่าจุดประสงค์ที่แท้จริงของการทำงานยังคงเป็นปริศนา แต่เราก็กู้คืนสัญญาณข้อมูลที่สามารถติดตามได้สำเร็จ เครื่องจักรไม่ได้มุ่งเป้าไปที่สิ่งมีชีวิตที่เคลื่อนที่อย่างอิสระ\n\n[Root.Owner.GetScientistPlural] ของเราแนะนำให้ค้นหาภาคส่วนใกล้เคียงเพื่อหาสัญญาณที่ตอบรับตรงกับสัญญาณนี้"
 cstorms.180.a: "มาตามหาเอนทิตี้นี้กันเถอะ"

# Digsite 5
 site_weathermanipulators_storm_formation: "ต้นกำเนิดแห่งการแผ่ซ่าน"
 site_weathermanipulators_storm_formation_intro: "ภายในคอนโซลสั่งการของอุปกรณ์ลดระดับการปั่นป่วนของพื้นที่ มีการบันทึกสัญญาณข้อมูลเอาไว้ แม้จะยากลำบาก แต่เราสามารถโคลนรูปแบบของมันเพื่อค้นหาจุดที่ตรงกันทั่วกาแล็กซีได้ เบาะแสนำทางเราไปยังดาวเคราะห์ที่ไม่มีผู้คนอาศัยอยู่ ถึงเวลาค้นหาว่าผู้ค้าอิเนเชียนมุ่งเป้าไปที่อะไร และด้วยเหตุผลใด"
 cstorms.181.name: "ที่ราบไร้การตกแต่ง"
 cstorms.181.desc: "ในแวบแรก ดูเหมือนจะไม่มีอะไรผิดปกติบน [From.Planet.GetName] เป็นดาวเคราะห์ธรรมดาเหมือนกับดาวอื่น ๆ อีกหลายร้อยดวงที่พบได้ทั่วกาแล็กซี และไม่มีสัญญาณบ่งชี้ว่าสัญญาณนั้นมาจากที่ใดกันแน่ ไม่มีเครื่องส่งสัญญาณหรือชิ้นส่วนเทคโนโลยีใด ๆ ที่เห็นได้ชัดและทรงพลังพอที่จะส่งสัญญาณข้ามระบบดาวได้\n\nเรายังคงค้นหาต่อไป"
 cstorms.182.name: "ภัยพิบัติแบบกระจุกตัว"
 cstorms.182.desc: "หลังจากลงมาถึงพื้นผิว ในไม่ช้าเราก็พบว่าสัญญาณจะแรงขึ้นหรือเบาลงขึ้นอยู่กับตำแหน่งของเรา ตามรูปแบบการเปลี่ยนแปลงที่เรียบง่ายนี้ ในที่สุดก็นำทางเราไปยังทิวเขาที่ตั้งตระหง่านอยู่ฝั่งตรงข้ามของดาวเคราะห์\n\nเมื่อเราเข้าใกล้เทือกเขาที่ทอดยาว ภูมิทัศน์ก็ยิ่งถูกทำลาย รกร้าง และเสียหาย ราวกับว่ามีพลังทำลายล้างพัดผ่านพื้นที่ส่วนนี้ของโลก เมื่อพิจารณาจากลักษณะความเสียหาย เราเชื่อว่าสถานที่นี้เคยถูกทำลายโดยพายุฝุ่นคอสมิก อย่างไรก็ตาม หากเป็นเช่นนั้นจริง ก็สมเหตุสมผลที่จะสรุปได้ว่าทั้งดาวเคราะห์ควรจะได้รับผลกระทบด้วย เราไม่เคยเห็นการทำลายล้างแบบกระจุกตัวเช่นนี้จากพายุที่รุนแรงมาก่อน เพื่อเรียนรู้เพิ่มเติม จำเป็นต้องปีนขึ้นไปบนยอดเขาอันสูงชันเหล่านี้"
 cstorms.183.name: "พลังงานอันเลือนราง"
 cstorms.183.desc: "เทือกเขาที่ถูกทำลายประกอบด้วยยอดเขาและหุบเขาจำนวนมาก แต่มีหลุมอุกกาบาตรูปทรงประหลาดหลุมหนึ่งที่ดึงดูดความสนใจของเราตั้งแต่เนิ่น ๆ ผนังของหลุมนั้นเรียบเนียน และตรงกลางมีวงแหวนซ้อนกันหลายวงสลักอยู่บนพื้นดิน\n\nเมื่อเราเดินลึกลงไปในหลุม เราเริ่มรู้สึกถึงแรงดึงดูดของพลังอันน่าทึ่ง ซึ่งไม่อาจหลีกเลี่ยงได้และมาจากจุดเริ่มต้นของวงกลมอย่างแน่นอน เส้นสายของพลังงานที่ริบหรี่ลอยขึ้นมาจากวงแหวน บางส่วนลอยไปไกลจนหนีพ้นชั้นบรรยากาศของดาวเคราะห์ไปในที่สุด นี่คือแหล่งที่มาของสัญญาณ\n\n[Root.Owner.GetScientistPlural] ของเราแนะนำให้วิเคราะห์หลุมอุกกาบาตและการสั่นไหวของพลังงานเพื่อทำความเข้าใจสิ่งที่เกิดขึ้นที่นี่ให้ดียิ่งขึ้น"
 cstorms.184.name: "จุดเริ่มต้นที่ไม่แน่นอน"
 cstorms.184.desc: "จากข้อมูลสิ่งแวดล้อมและการจำลองรายละเอียด เราสามารถสรุปได้อย่างปลอดภัยว่ามีพายุฝุ่นคอสมิกพัดผ่านยอดเขาเหล่านี้จริง ๆ แท้จริงแล้วมันก่อตัวขึ้นในจุดนี้พอดี! ส่วนเหตุผลที่มันไม่กลืนกินดาวเคราะห์ทั้งดวงในกระบวนการนี้ เราคาดเดาว่ามันอาจเป็นเพราะขนาดของมันที่เล็กเกินไป - ผลวิเคราะห์ระบุว่าพายุมีขนาดเพียงเศษเสี้ยวของขนาดพายุทั่วไปเท่านั้น\n\nจากข้อเท็จจริงที่ว่าผู้ค้าอิเนเชียนอ้างถึงอุปกรณ์ลดระดับการปั่นป่วนของพื้นที่ว่าเป็น 'อุปกรณ์จัดการควบคุม' และการที่สัญญาณพลังงานของพายุเฉพาะนี้ถูกเก็บไว้ในฐานข้อมูลของพวกเขา จึงดูเหมือนว่าพวกเขากำลังพยายามควบคุมพายุคอสมิกดวงนี้ การคำนวณเส้นทางที่พายุใช้หลังจากออกจากที่นี่อาจช่วยให้เราได้เรียนรู้อะไรที่เป็นประโยชน์อย่างมาก"
 cstorms.184.a: "ให้เราดำเนินการต่อ"

# Special Project 3
 INETIAN_PROJECTS_03: "การตามรอยผู้ค้า"
 INETIAN_PROJECTS_03_DESC: "เราพบจุดก่อตัวของพายุฝุ่นคอสมิกโบราณ แต่หลักฐานบ่งชี้ว่ามันมีขนาดเล็กกว่าความปั่นป่วนทั่วไปมาก เมื่อพิจารณาจากขนาดของมัน ก็น่าแปลกใจที่ผู้ค้าอิเนเชียนรู้สึกว่าจำเป็นต้องควบคุมพายุด้วยอุปกรณ์ลดระดับการปั่นป่วนของพื้นที่\n\nหากเราติดตามเส้นทางของพายุ เราอาจจะสามารถค้นพบได้ว่าเหตุใดพวกเขาจึงทุ่มเทเวลาอย่างมากกับโครงการนี้"
 cstorms.186.name: "การตามรอยผู้ค้า"
 cstorms.186.desc: "การติดตามเส้นทางของพายุฝุ่นคอสมิกกลับไม่ง่ายดายอย่างที่คิด เพียงไม่กี่ระบบดาวจากจุดกำเนิด ก็เกิดเหตุการณ์รุนแรงที่ส่งผลต่อความแรง ขนาด และทิศทางของมัน [Root.Owner.GetScientistPlural] ของเราสงสัยว่าในจุดนี้เองที่พายุถูกยิงด้วยอุปกรณ์ลดระดับการปั่นป่วนของพื้นที่ แรงปะทะทำให้พายุเสียสมดุล และปนเปื้อนแกนกลางของพายุด้วยซากสัตว์ป่าที่ถูกดูดมาจากพื้นผิวของ [wm_digsite_C.GetName]\n\nขณะที่พายุยังคงเคลื่อนที่ผ่านกาแล็กซี มันได้กลืนกินระบบดาวหลายแห่งและทิ้งความเสียหายย่อยยับไว้ตามทาง\n\nทั้งหมดนี้ทำไปเพียงเพื่อเปลี่ยนเส้นทางของความปั่นป่วนเล็กน้อยให้ห่างจากระบบดาวที่เฉพาะเจาะจงแห่งหนึ่ง... เซ็นเซอร์ตรวจจับพบสถานีอวกาศที่ถูกละทิ้งในระบบดาวนั้น เพื่อที่จะปกป้องสถานที่แห่งนี้ ผู้ค้าอิเนเชียนได้ทิ้งเหตุการณ์สูญพันธุ์ครั้งใหญ่หลายครั้งไว้เบื้องหลัง\n\nสถานีแห่งนี้อาจไม่ใช่โลกเมืองหลวงที่เราคาดหวังไว้ แต่มันต้องมีความสำคัญในระดับเดียวกันถึงขั้นที่ต้องดำเนินมาตรการที่รุนแรงเช่นนี้"
 cstorms.186.a: "ตั้งเส้นทางเดินยาน"

# Digsite 6
 site_weathermanipulators_last_shelter: "ก่อนการล่มสลาย"
 site_weathermanipulators_last_shelter_intro: "ผู้ค้าอิเนเชียนพยายามปกป้องสถานีอวกาศในระบบดาวนี้จากพายุฝุ่นคอสมิกขนาดเล็ก ส่งผลให้เกิดผลลัพธ์ที่ไม่ได้คาดคิดคือ พายุขยายใหญ่ขึ้นจนระบบดาวอื่น ๆ ของพวกเขาพังทลายลงไปหลายแห่ง ทำไมพวกเขาถึงสิ้นหวังที่จะปกป้องสถานีนี้ขนาดนั้นกันแน่?"
 cstorms.190.name: "วงโคจรที่เสถียร"
 cstorms.190.desc: "สถานีอวกาศที่โคจรรอบ [From.Planet.GetName] มีขนาดใหญ่กว่าที่คาดการณ์ไว้แต่แรกมาก ดูเหมือนว่ามันจะไม่ใช่แค่สถานีธรรมดา โดยมีทั้งเครื่องมือวิจัย ระบบพยุงชีพที่ซับซ้อน และเซ็นเซอร์ตรวจจับอวกาศห้วงลึกที่ครอบคลุม สิ่งนี้อาจบ่งชี้ว่าสถานที่นี้ถูกใช้งานเป็นอาณานิคมระยะยาวมากกว่าที่จะเป็นเพียงจุดแวะพักเล็กน้อย\n\nอย่างไรก็ตาม มันอยู่ในสภาพที่ย่ำแย่มาก โครงสร้างยานถูกทำลาย โดยการสูญเสียความดันฉับพลันในระดับหายนะได้ระเบิดส่วนต่าง ๆ ออกไปทั้งหมด ยังไม่แน่ชัดว่าความเสียหายเกิดจากภายนอกหรือภายใน โชคดีที่การควบคุมวงโคจรและการปรับเสถียรภาพของแกนยังคงทำงานอยู่ ซึ่งอธิบายได้ว่าเหตุใดโครงสร้างจึงไม่ลอยเข้าไปในดาวฤกษ์หรือหมุนอย่างไร้การควบคุม\n\nการเข้าไปข้างในโดยไม่ทำให้สมดุลที่ได้รับการดูแลอย่างพิถีพิถันนี้เสียไปจะเป็นเรื่องที่ยากลำบาก"
 cstorms.191.name: "แรงดันอันน่าทึ่ง"
 cstorms.191.desc: "การเข้าสู่สถานีในระบบดาว [This.System.GetName] จำเป็นต้องงัดเปิดประตูแอร์ล็อกที่ไม่ได้รับความเสียหายโดยไม่ทำให้เกิดการระเบิดยุบตัวภายในเพิ่มเติม ภายในสถานีอวกาศยังคงมีแรงดันอยู่ สามารถจำลองชั้นบรรยากาศของดาวเคราะห์ได้อย่างประสบความสำเร็จแม้จะมีอายุเก่าแก่มากก็ตาม\n\nต้องใช้เวลาหลายวันในการสร้างรอยต่อที่สมบูรณ์แบบระหว่างยานของเรากับสถานี โดยปรับสมดุลแรงดันอากาศอย่างพิถีพิถัน ในที่สุดเราก็เปิดประตูได้อย่างปลอดภัย โชคร้ายที่เราต้องพบกับอุปสรรคอีกประการหนึ่งทันที: ทางเดินที่ถูกปิดกั้น ซึ่งอุดตันไปด้วยคานรับน้ำหนักที่บิดเบี้ยวและเศษซากจากการสูญเสียความดันบริเวณใกล้เคียง จะต้องใช้เวลาสักระยะก่อนที่เราจะดำเนินการต่อไปได้"
 cstorms.192.name: "สุสานภายใน"
 cstorms.192.desc: "หลังจากเคลียร์ทางไปต่อได้สำเร็จ เราก็เริ่มสำรวจสถานีเพื่อค้นหาคำตอบ\n\nการสำรวจอย่างถี่ถ้วนเผยให้เห็นว่าสถานีนี้ไม่ได้สร้างขึ้นเพื่อสังเกตการณ์จักรวาล แต่สร้างขึ้นเพื่อปกป้องบางสิ่งบางอย่าง โดยอุปกรณ์สแกนที่ซับซ้อนส่วนใหญ่พุ่งเป้าไปที่ภายในสถานี พบสิ่งของส่วนตัวที่เป็นของพลเมืองผู้ค้าอิเนเชียน รวมถึงบันทึกการใช้งานที่อธิบายถึงชีวิตบนสถานี พวกเขาพูดถึงสิ่งของสำคัญที่เก็บไว้ในห้องที่มีการคุ้มกันอย่างหนาแน่นที่ไหนสักแห่งในฐานทัพ แม้ว่าจะใช้เวลาไม่นานในการค้นหาตำแหน่ง แต่ห้องนั้นกลับกลายเป็นสุสาน\n\nร่างแห้งกรังจนเกือบเป็นมัมมี่ครอบครองพื้นที่นั้น ซึ่งแต่ละคนเป็นสมาชิกของจักรวรรดิผู้ค้าอิเนเชียน เมื่อพิจารณาจากตำแหน่งหน้าที่การงานที่แสนธรรมดาของพวกเขา ดูเหมือนว่าพวกเขาจะไม่ได้ต่อสู้ขัดขืน แต่เพียงแค่นั่งลงรอความตาย เกิดอะไรขึ้นที่นี่กันแน่?"
 cstorms.193.name: "ความยโสโอหัง"
 cstorms.193.desc: "สิ่งของสำคัญตามที่พลเมืองอธิบายไว้นั้นตั้งอยู่ตรงใจกลางห้องพอดี มันเป็นอุปกรณ์ชิ้นเดียวที่ดูเหมือนจะยังใหม่เอี่ยมและยังไม่เคยผ่านการใช้งาน มันเป็นของอิเนเชียนอย่างแน่นอน แต่มีความก้าวหน้ามากกว่าสิ่งที่เราเคยเห็นจากพวกเขามาก่อน\n\nเทอร์มินัลที่ขนาบข้างวัตถุนี้แสดงข้อความเดิมซ้ำไปซ้ำมาสองสามย่อหน้า การแปลเสร็จสิ้นอย่างรวดเร็ว:\n\n§Lผู้มาเยือนที่รัก หากท่านกำลังอ่านข้อความนี้ ท่านกำลังเป็นพยานถึงความยโสโอหังของเรา ในความพยายามอันสูงส่งเพื่อความเท่าเทียม เราลืมเลือนสิ่งสำคัญที่สร้างความเท่าเทียมอย่างแท้จริง นั่นคือการสร้างและการทำลายล้าง\n\nเพื่อปลดปล่อยเส้นทางการค้าของเราจากความเสียหายของพายุคอสมิก เราได้เข้าไปแทรกแซงธรรมชาติ สิ่งที่ครั้งหนึ่งเคยเป็นเพียงความปั่นป่วนเล็กน้อยกลับขยายใหญ่เกินจะควบคุม พายุคอสมิกได้ทำลายล้างโลกของเรา นี่ไม่ใช่เรื่องบังเอิญ แต่เป็นการแก้แค้น เราขังตัวเองไว้ในสถานีแห่งนี้ มันเป็นปราการด่านสุดท้ายของเรา แต่เราก็สายเกินไป แม้ว่าเราจะเลิกใช้อุปกรณ์ลดระดับแรงปั่นป่วนแล้ว แต่พายุลูกใหม่ก็ยังคงก่อตัวขึ้น มีความรุนแรงและป่าเถื่อนยิ่งขึ้น ภารกิจสุดท้ายของเรานั้นชัดเจน\n\nเราทำงานอย่างหนักเพื่อสร้างเครื่องจักรนี้ให้เสร็จสมบูรณ์ และมันถูกสร้างขึ้นเพื่อท่าน ผู้มาเยือน มันจะช่วยปกป้องท่านจากพายุคอสมิกโดยไม่ทำให้ธรรมชาติโกรธเคืองไปมากกว่านี้ ความพินาศของเราคือการไถ่บาปของเรา มันไม่จำเป็นต้องเป็นของท่านด้วย§!\n\nภายในห้องนี้ผู้ค้าอิเนเชียนได้กำหนดชะตากรรมของพวกเขา ความเอื้ออารีของพวกเขานั้นยิ่งใหญ่พอ ๆ กับความประมาทเลินเล่อ เมื่อออกจากสถานี เรากลับมาพร้อมกับของขวัญอำลาของพวกเขา"
 cstorms.193.a: "ปล่อยให้พวกเขาพักผ่อนอย่างสงบ"
 cstorms.193.b: "จุดจบที่เหมาะสมสำหรับกลุ่มคนที่โง่เขลา"

# Artifact action
 artifact_inetian_research: "ความลับของผู้ค้าอิเนเชียน"
 artifact_inetian_research_desc: "เจาะลึกความลับของผู้ค้าอิเนเชียน"
 artifact_inetian_research_completed: "$artifact_inetian_research$"
 artifact_inetian_research_completed_desc: "เราได้นำความรู้โบราณของผู้ค้าอิเนเชียนมาใช้ประโยชน์เพื่อตัวเราเอง"

 INETIAN_PROJECTS_04: "เจาะลึกความลับของผู้ค้าอิเนเชียน"
 INETIAN_PROJECTS_04_DESC: "หลังจากค้นพบที่พำนักสุดท้ายของผู้ค้าอิเนเชียนแล้ว ยังคงมีอีกหลายสิ่งให้เรียนรู้เกี่ยวกับจักรวรรดิอันกว้างใหญ่ของพวกเขา เราต้องการสำรวจพวกเขาอีกสักครั้ง"
 cstorms.195.name: "เจาะลึกความลับของผู้ค้าอิเนเชียน"
 cstorms.195.desc: "ที่พำนักสุดท้ายของผู้ค้าอิเนเชียนกลายเป็นสถานีอวกาศที่มีเทคโนโลยีสูงมาก พวกเขาจงใจสร้างมันขึ้นมาเพื่อเป็นแหล่งหลบภัยจากพายุคอสมิกอันเลวร้ายที่พวกเขาเป็นผู้ก่อขึ้นเอง แหล่งที่อยู่อาศัยอันเป็นเอกลักษณ์นี้คือจุดสูงสุดของเทคโนโลยีอิเนเชียนอย่างแท้จริง โดยมีระบบควบคุมการอยู่อาศัยและการปกป้องที่ยอดเยี่ยม แต่ถึงอย่างนั้นก็ไม่อาจช่วยพวกเขาได้ตลอดไป\n\nด้วยเหตุนี้ แม้ว่าสถานีจะไม่อยู่ในสภาพที่ปลอดภัยสำหรับอยู่อาศัยเนื่องจากการผุพังมานานหลายยุคสมัย แต่ [Root.Owner.GetScientistPlural] ของเราก็สามารถดึงข้อมูลความรู้อันมีค่าจากระบบของมันมาได้ ไม่เพียงเท่านั้น พวกเขังพบเส้นทางการค้าที่สำคัญที่สุดของผู้ค้าอิเนเชียนที่ถูกจัดเก็บไว้ในคลังข้อมูล รวมถึงต้นแบบเครื่องควบคุมสภาพภูมิอากาศที่มีประสิทธิภาพมากกว่าและทำลายดาวเคราะห์น้อยกว่า ซึ่งวางอยู่บนโต๊ะทำงานอย่างง่าย ๆ\n\nดูเหมือนว่าความพยายามอันแน่วแน่ของผู้ค้าอิเนเชียนบางส่วนยังคงหลงเหลืออยู่ และมันจะคอยช่วยเหลือเราผ่านพ้นพายุเหล่านี้ต่อไป"

 secrets_of_the_inetian_traders: "ความลับของผู้ค้าอิเนเชียน"
 secrets_of_the_inetian_traders_hive_mach: "ความลับของผู้ค้าอิเนเชียน"
 secrets_of_the_inetian_traders_desc: "ความรู้โบราณของผู้ค้าอิเนเชียนได้ช่วยเราอีกครั้งสำหรับการใช้งานของเราเอง ขณะนี้เราได้รับส่วนลดค่าธรรมเนียมการตลาดด้วยอิทธิพลของพวกเขา"
 secrets_of_the_inetian_traders_hive_mach_desc: "ข้อมูลที่เก็บรักษาไว้จากผู้ค้าอิเนเชียนได้ช่วยกลุ่มสติร่วมอีกครั้ง ขณะนี้มีผลลดค่าธรรมเนียมการตลาดแล้ว"

