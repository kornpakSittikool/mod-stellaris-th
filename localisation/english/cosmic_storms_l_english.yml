 astrometeorologist: "$job_astrometeorologist$"
 job_astrometeorologist: "นักอุตุนิยมวิทยาดาราศาสตร์"
 job_astrometeorologist_plural: "นักอุตุนิยมวิทยาดาราศาสตร์"
 job_astrometeorologist_desc: "$job_astrometeorologist_plural$ มีความเชี่ยวชาญด้านการวิจัยเกี่ยวกับผลกระทบต่อสิ่งแวดล้อมของจักรวาล"
