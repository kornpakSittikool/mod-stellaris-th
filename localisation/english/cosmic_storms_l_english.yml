### Collided Planet Event Chain
 collided_planets_category: "คอ ลี ดิดดาวเคราะห์"
 collided_planets_category_desc: "สองดาวชนกัน เมื่อพวกมันตาย โลกที่พิเศษที่สุดก็เกิดขึ้น"

 cs_collided_planet_chain_title: "การรักษาเสถียรภาพของดาวเคราะห์ที่ชนกันเป็นสิ่งจำเป็นหากเราต้องการป้องกันโลกดวงนี้จากการสลายตัว"
 cs_collided_planet_chain_desc: "ภัย พิบัติ คุกคาม เพื่อ ทําลาย ความ สมดุล อัน เปราะ บาง ของ ดาว เคราะห์ ดวง นี้."

 cstorms.1200.name: "ดาว เคราะห์ สอง ดวง"
 cstorms.1200.desc: "จากช่วงเวลาที่เราตรวจพบ[From.Planet.GetName]การดํารงอยู่ของมันเป็นเพียง แหล่งที่มาของความหลงใหล\n\nไม่ ใช่ การ ชน กัน ของ วัตถุ ใน ท้องฟ้า สอง อย่าง ที่ ผิด ปกติ เพราะ กาแล็กซี เป็น สถาน ที่ กว้าง ใหญ่ และ ยุ่งเหยิง. อย่าง ไร ก็ ตาม ใน ทุก กรณี ที่ รู้ จัก กัน ว่า มี ผล กระทบ เช่น นั้น มี หนึ่ง หรือ สอง ศพ ที่ ถูก สงสัย ถูก ทําลาย.\n\nการชนที่เกิดขึ้น[From.Planet.GetName]เมื่อหลายล้านปีก่อน สิ่งมีชีวิตสองโลกนี้ยังคงรักษาสมดุลที่แปลกประหลาด และได้ก่อตัวเป็นบรรยากาศแห่งชีวิต ในกระบวนการนี้"
 cstorms.1205.name: "ประสานการปะทะ"
 cstorms.1205.desc: "สถานการณ์บนสิ่งที่เรียกว่า \"ดาวเคราะห์ที่ปลอดโปร่ง\" กลับกลายเป็นว่า อันตรายมากกว่าที่คาด เกิด แผ่น ดิน ไหว หลาย ครั้ง เมื่อ ไม่ นาน มา นี้ ทํา ให้ เกิด รอยแผลเป็น เก่า ๆ รอบ บริเวณ ที่ มี แรง กระทบ ทํา ให้ แมก มา ระเบิด จาก พื้น ดิน ปริมาณ มหาศาล. ชีวภาพ ต่าง ๆ ของ ดาว เคราะห์ ต่าง ๆ กําลัง เริ่ม รับ ความ เสีย หาย จาก อุณหภูมิ ที่ สูง ขึ้น ทั่ว โลก และ เถ้า ภูเขา ไฟ ที่ แผ่ คลุม ท้องฟ้า.\n\nเพื่อให้เรื่องแย่ลง ถ้าดาวเคราะห์ร่วมกันไม่ได้คงที่ภายใน 50 ปีข้างหน้า การอ่านของเราคาดการณ์ว่ากิจกรรมทางโทรนิกส์[From.Planet.GetName]!"
 cstorms.1210.name: "การ เปลี่ยน แปลง"
 cstorms.1210.desc: "นักธรณีวิทยาชั้นนําของเรามาร่วมกันและสร้างสองแผนที่เป็นไปได้ที่จะบันทึก[From.Planet.GetName]จากการยอมแพ้ต่อการก่อการร้าย\n\nแผนแรกคือ ทําให้การชนคงที่ ในขณะที่ต้องใช้เวลาหลายร้อยศตวรรษ เพื่อรักษาบาดแผลจากภูเขาไฟรอบๆ บริเวณที่เกิดผลกระทบ โดยเพิ่มความไม่สงบของพื้นโลกอย่างระมัดระวัง ภูเขาไฟที่เหลือจะถูกนําไปใช้ เพื่อหล่อหลอมโลกให้กลายเป็นไบโอเมี่ยมที่เสถียร\n\nแผนที่สองยิ่งทะเยอทะยานมากขึ้น แทนที่จะลดความดันบนเปลือกโลก พลังงานและวัสดุที่ผลิตจากภูเขาไฟ\n\nวิธี นี้ ทํา ให้ เรา สามารถ สร้าง สิ่ง มี ชีวิต มาก มาย ที่ สามารถ ค้ําจุน สิ่ง มี ชีวิต ทุก ชนิด ได้ เปลี่ยน โลก ให้ เป็น อุทยาน. อย่างไรก็ตาม มันมีโอกาสอย่างมาก ที่กระบวนการนี้จะล้มเหลว และอาจนําไปสู่การทําลายล้าง"
 cstorms.1210.a: "เราจะทําให้การชนมีเสถียรภาพ"
 cstorms.1210.b: "ดำเนินแผนการอันทะเยอทะยานเพื่อประสานระบบนิเวศทางชีวภาพของดาวเคราะห์ที่ชนกัน เราจะสร้างโลกสำหรับทุกคนหรือทำลายมันลงในกระบวนการนี้"
 cstorms.1210.c: "ไม่ทําอะไรนอกจากสังเกต"

 collided_planet_collapsing: "การสลายตัวของดาวเคราะห์"
 collided_planet_collapsing_desc: "การทําลายกิจกรรมเทคโกนิคจะทําลายควอไลด์ดาวเคราะห์ใน ระหว่าง นั้น โลก ทั้ง สอง จะ แตก ต่าง กัน."
 collided_planet_collapsing_tt: "คงสภาพการปะทะ"

 project_cosmic_storms_collidedplanet_stabilize: "ทํา ให้ คอ ล ลิ ชั่น มี ความ มั่นคง"
 project_cosmic_storms_collidedplanet_stabilize_DESC: "ความมั่นคงของดาวเคราะห์ที่ชนกัน จําเป็นถ้าเราต้องการที่จะป้องกันไม่ให้โลกนี้ยุบ"
 project_cosmic_storms_collidedplanet_harmonize: "จง ลด คอ ล ลิ ชั่น"
 project_cosmic_storms_collidedplanet_harmonize_DESC: "ความพยายามรักษาเสถียรภาพของโลกที่ปะทะกันประสบความสำเร็จ! แรงสั่นสะเทือนที่เคยคุกคามการมีอยู่ของ [From.Planet.GetName] สงบลงแล้ว และผลผลิตจากภูเขาไฟกำลังลดลงอย่างรวดเร็ว ทำให้โลกกลับคืนสู่สมดุลอันเปราะบางของมัน\n\nคำถามสุดท้ายที่เหลืออยู่สำหรับการผลักดันการปรับสภาพดาวเคราะห์ขั้นสุดท้าย: [From.Planet.GetName] ควรกลายเป็นดาวเคราะห์ประเภทใด?"

 cstorms.1220.name: "คอลลิชั่นรักษาไว้"
 cstorms.1220.desc: "ความพยายามของเราที่จะรักษาความเสถียรโลกชน จ่ายเงินออก! การ สั่น สะเทือน ซึ่ง ก่อน หน้า นี้ เคย คุกคาม[From.Planet.GetName]การดํารงอยู่ได้ถูกทําให้เงียบลง และภูเขาไฟก็ลดลงอย่างรวดเร็ว ในขณะที่เราพูดกัน\n\nคําถามหนึ่งยังคงอยู่สําหรับแรงผลักดันสุดท้ายของเราการแทนที่:คลาสของดาวเคราะห์[From.Planet.GetName]กลายเป็น?"
 cstorms.1220.a: "รักษาระดับทวีปไว้"
 cstorms.1220.b: "ปรับปรุงสภาพดาวเคราะห์สะวันนา"
 cstorms.1220.c: "สร้างดาวเคราะห์แอลไพน์"
 cstorms.1225.name: "โลกสำหรับทุกคน"
 cstorms.1225.desc.stabalize: "เหลือเชื่อ! เราคิดว่าความพยายามของเราจะช่วยเพียงแค่ทำให้ [collided_planets.GetName] มีเสถียรภาพเท่านั้น แต่มันกลับกลายเป็นสิ่งที่ยิ่งใหญ่กว่านั้นมาก!\n\n$cstorms.1225.desc.def$"
 cstorms.1225.desc.def: "จงดูสิ ดินแดนสวรรค์ ดาวเคราะห์ที่สามารถค้ำจุนสิ่งมีชีวิตได้เกือบทุกรูปแบบเท่าที่จะจินตนาการได้\n\nการได้ช่วยชีวิตดาวเคราะห์ที่กำลังจะพินาศและปรับเปลี่ยนมันให้กลายเป็นสิ่งที่สร้างแรงบันดาลใจได้ขนาดนี้ — จะมีความสำเร็จใดที่ยิ่งใหญ่ไปกว่านี้อีกไหม? โชคชะตาเข้าข้างเราอย่างแน่นอน"
 cstorms.1230.name: "งานบูรณะปรับปรุง"
 cstorms.1230.desc: "แม้ตัวดาวเคราะห์จะรอดพ้นมาได้อย่างน่าโล่งใจ แต่ความพยายามของเราในการปรับปรุงสภาพดาวที่ชนกันนี้ให้กลายเป็นสวรรค์กลับล้มเหลว\n\nความพยายามในการปรับแต่งระบบนิเวศของเราต้องเผชิญกับอุปสรรคจากกิจกรรมแผ่นดินไหวที่รุนแรงของดาวเคราะห์ แม้ว่าช่วงเวลาที่เลวร้ายที่สุดของการสั่นคลอนดูเหมือนจะผ่านพ้นไปแล้วก็ตาม กิจกรรมภูเขาไฟได้กลับคืนสู่ระดับที่พบเห็นครั้งแรกก่อนการเปลี่ยนแปลงครั้งใหญ่เมื่อไม่นานมานี้ และแม้ว่าบริเวณที่เกิดการพุ่งชนจะยังคงปะทุอยู่ แต่มันก็ไม่น่าจะรุนแรงขึ้นในเร็ว ๆ นี้\n\nสิ่งเลวร้ายที่สุดดูเหมือนจะผ่านพ้นไปแล้ว ความท้าทายของเราในตอนนี้คือการฟื้นฟูโลกใบนี้ขึ้นมาใหม่"
 cstorms.1235.name: "บ้านที่แตกสลาย"
 cstorms.1235.desc: "ความพยายามของเราในการช่วยดาวเคราะห์ที่ชนกันจากความพินาศที่ใกล้เข้ามาล้มเหลวอย่างไม่เป็นท่า แม้ว่านักวิทยาศาสตร์ของเราจะใช้มาตรการป้องกันทุกอย่างที่เป็นไปได้แล้วก็ตาม แต่แบบจำลองของพวกเขาก็ไม่มีทางคำนึงถึงเหตุการณ์ที่ไม่คาดคิดได้ครบถ้วน\n\nในขณะที่เศษซากของโลกเหล่านี้ลอยห่างออกไปในความเวิ้งว้าง ทางกาแล็กซีต่างไว้อาลัยให้กับการสูญเสียปรากฏการณ์อันเป็นเอกลักษณ์นี้"
 cstorms.1240.name: "ชนและพังทลาย"
 cstorms.1240.desc: "การล่มสลายของดาวเคราะห์ที่ชนกันเป็นไปตามการคาดการณ์ช่วงเวลาของเราอย่างแม่นยำจนถึงทศนิยม จากที่ครั้งหนึ่งกาแล็กซีเคยได้รับความงดงามจากปรากฏการณ์อันเป็นเอกลักษณ์ บัดนี้ไม่มีสิ่งใดเหลือนอกจากก้อนหิน"
 collided_planets_destroyed_tt: "ดาวเคราะห์ [collided_planets.GetName] ถูกทำลาย"

### Crimson crawlers Event Chain
 cs_crimson_crawlers_chain_desc: "แมลงคลานสีชาด"
 cs_crimson_crawlers_chain_title: "เราพบดาวเคราะห์ที่ปกคลุมไปด้วยแมลงสีแดงหลายล้านล้านตัว ภัยพิบัติ หรือ โอกาส?"
 crimson_crawlers_category: "สิ่งปกคลุมสีชาด"
 crimson_crawlers_category_desc: "ดาวเคราะห์สีแดงก่ำได้รับการสำรวจในระบบ [From.GetStarName] ความเข้มข้นของสีนั้นน่าทึ่งมาก เราควรเข้าไปสืบสวน"
 cstorms.1255.name: "แมลงคลานสีชาด"
 cstorms.1255.desc: "จากระยะไกล [From.GetName] ส่องสว่างราวกับอัญมณีสีชาดอันล้ำค่า ดินเหนียวหรือดินชนิดอื่นที่ผสมโลหะหนักมักจะเป็นคำอธิบายทั่วไปสำหรับความผิดปกติทางภูมิศาสตร์เช่นนี้ แต่ความจริงนั้นแปลกประหลาดกว่ามาก\n\nแมลง แมลงหลายล้านล้านตัว พวกมันรุมล้อมอยู่บนพื้นผิวของ [From.GetName] ราวกับพรมชีวิตหลายขาที่ไม่มีวันขาดสาย\n\nพวกไม่มีกระดูกสันหลังเหล่านี้ได้รับฉายาอย่างรวดเร็วว่า 'แมลงคลานสีชาด' พวกมันมีวงจรการสืบพันธุ์ที่ตื่นตัวอย่างน่าทึ่ง แม้จะไม่เป็นอันตรายต่อสิ่งแวดล้อมดั้งเดิมของพวกมัน แต่ [From.GetName] ก็ไม่เหมาะสำหรับการตั้งอาณานิคมหากยังมีสิ่งมีชีวิตเหล่านี้คลานยั้วเยี้ยไปมา\n\nมีการเสนอวิธีจัดการกับแมลงเหล่านี้ที่ค่อนข้างแปลกใหม่ การสแกนเบื้องต้นพบว่าพวกมันกินได้ บางทีเราอาจพบแหล่งอาหารใหม่? เราแนะนำให้ลองตรวจสอบโอกาสนี้ดูเป็นอย่างน้อย"
 project_cosmic_storms_crimson_crawlers: "อาหารสมอง"
 project_cosmic_storms_crimson_crawlers_DESC: "[From.Planet.GetName] ถูกปกคลุมไปด้วยแมลงสีแดงที่แสนสงบเสงี่ยมอย่างสมบูรณ์ ดาวเคราะห์นี้อาจอาศัยอยู่ได้หากจัดการกับแมลงเหล่านี้ ในขณะเดียวกัน พวกมันดูเหมือนจะเป็นแหล่งอาหารที่ดี อาจมีหนทางก้าวหน้าต่อไปที่นี่"
 cstorms.1260.name: "เมนูพิสดาร"
 cstorms.1260.desc: "ความคิดเรื่องการกินแมลงคลานสีชาดอาจฟังดูไร้สาระในตอนแรก แต่เมื่อมีการนำตัวอย่างขึ้นมาบนยาน มันก็ดูน่ากินขึ้นมาก\n\nแมลงเหล่านี้เป็นสิ่งมีชีวิตที่น่าอัศจรรย์ มีระบบประสาทที่ก้าวหน้าอย่างยิ่งโดยไม่ต้องพึ่งพาอวัยวะประมวลผลส่วนกลาง ที่สำคัญกว่านั้นคือ เนื้อสีซีดของพวกมันนุ่มและฉ่ำน้ำอย่างน่าประหลาดใจ และแม้จะกินดิบ ๆ เปลือกนอกสีส้มแดงก็ยังกรุบกรอบและอร่อยมาก\n\nคำถามยังคงอยู่ว่าแมลงเหล่านี้จะทำหน้าที่เป็นวัตถุดิบวิจัยหรือเป็นแหล่งอาหารรสเลิศได้ดีกว่ากัน การปรุงอาหารพวกมันอาจให้รสชาติและความสนุกสนานมากกว่า แต่การกินพวกมันดิบ ๆ เลยจะเร็วกว่าและง่ายกว่า โดยเฉพาะอย่างยิ่งหากจับคู่กับเครื่องปรุงรสที่เหมาะสม"
 cstorms.1260.a: "ศึกษาพวกแมลงคลาน"
 cstorms.1260.b: "กินพวกมันดิบ ๆ เลย!"
 cstorms.1260.c: "เอาไปปรุงอาหาร!"

### Stormbound Event Chain
 cs_stormbound_chain_title: "ผู้ผูกพันกับพายุ"
 cs_stormbound_chain_desc: "ยานลึกลับน่าขนลุกปรากฏขึ้นบนเซ็นเซอร์ — แต่ปรากฏเฉพาะภายในพายุคอสมิกเท่านั้น เกิดอะไรขึ้นที่นี่กันแน่?"
 letters_of_the_manifold: "จดหมายจากระหว่างรอยพับมิติ"
 stormbound_event_ship_object: "$cs_stormbound_chain_title$"
 cstorms.1310.name: "ผู้ผูกพันกับพายุปรากฏกาย"
 cstorms.1310.desc: "เราได้รับรายงานที่แปลกประหลาดจากระบบ [This.GetName] ดูเหมือนว่าพายุคอสมิกครั้งล่าสุดที่โหมกระหน่ำในเซกเตอร์นั้นได้เผยให้เห็นยานที่ไม่ทราบที่มา มันไม่มีสัญญาณเรียกขาน แต่กลับแล่นผ่านมรสุมไปได้ราวกับไม่ได้รับผลกระทบใด ๆ จากความรุนแรงรอบตัวเลย\n\nมันไม่ตอบสนองต่อการติดต่อ และทันทีที่พายุสลายตัว ยานลำนั้นก็หายไปเช่นกัน เรื่องนี้อาจถูกปัดตกไปว่าเป็นเพียงสัญญาณรบกวนของเครื่องมือตรวจวัด แต่หลักฐานทางภาพนั้นชัดเจนในตัวเอง\n\nนี่อาจเป็นการแสดงเทคโนโลยีที่ก้าวหน้าอย่างยิ่ง หรือมีบางสิ่งที่น่ากลัวกว่านั้นแฝงอยู่? เราจะรายงานผลให้ทราบหากพบเห็นยานลึกลับนี้อีกครั้งอย่างแน่นอน"
 cstorms.1313.name: "การกลับมาของผู้ผูกพันกับพายุ"
 cstorms.1313.desc: "หนึ่งในสถานีวิจัยใน [This.GetName] ได้มารายงานเรื่องที่น่าตกใจแก่เรา: ในระหว่างพายุคอสมิกครั้งล่าสุด ยานประหลาดลำหนึ่งเกือบจะชนเข้ากับด่านหน้า รายงานทางภาพแสดงให้เห็นว่ามันคือยานลึกลับลำเดิมที่เคยได้รับรายงานเมื่อบางเวลาก่อน\n\nตามรายงานจากสถานีอวกาศ ตัวยานสร้างขึ้นจากการผสมผสานที่แปลกประหลาดของสารประกอบอินทรีย์ แร่ธาตุแคลเซียม และโลหะผสม\n\nไม่พบสัญญาณของสิ่งมีชีวิตอินทรีย์ ทำให้เราคาดเดาว่ายานลำนี้อาจทำงานโดยอัตโนมัติ หรือไม่ก็อาจเกิดความผิดปกติจนควบคุมไม่ได้\n\nอย่างไรก็ตาม เรื่องที่น่าสับสนที่สุดยังมาไม่ถึง: ส่วนใหญ่ของระบบขับเคลื่อนของมันถูกทำลายอย่างเห็นได้ชัดด้วยเศษขยะอวกาศ ยานลำนี้ควรจะดับสนิทอยู่ในอวกาศไปแล้ว\n\nหากเรามอบหมายให้ยานวิทยาศาสตร์เฝ้าสังเกตการณ์พายุคอสมิกครั้งต่อไป พวกเขาอาจจะสามารถค้นหาข้อมูลเพิ่มเติมเกี่ยวกับยานลึกลับลำนี้ได้"
 cstorms.1313.a: "เราไม่มีเวลาสำหรับเรื่องไร้สาระเช่นนี้"
 cstorms.1316.name: "เสียงกระซิบในมรสุม"
 cstorms.1316.desc: "จากระยะไกล [stormbound_science.GetName] ได้เห็นยานลึกลับปรากฏขึ้นระหว่างชั้นพายุ ขณะที่มันลอยผ่านไป เราตรวจพบสัญญาณที่แปรปรวนอย่างหนักแผ่ออกมาจากผืนผ้าคอสมิก\n\nในที่สุดเรื่องนี้ก็ให้คำตอบว่าทำไมเซ็นเซอร์ของเราถึงตรวจไม่พบยานลำนี้: การแสดงตนทางกายภาพของมันถูกยืดออกไปนอกมิติพหุคูณ ราวกับว่ามันได้ผ่านเข้าไปและไม่ได้ผ่านเข้าไปในรูหนอนพร้อม ๆ กัน น่าจะเป็นเพราะต้นกำเนิดหลายมิติของพายุคอสมิกที่ทำให้ยานลำนี้สามารถกลับมายังอวกาศของเราได้\n\nเมื่อรู้เช่นนี้แล้ว เราก็น่าจะตรวจจับการปรากฏตัวครั้งต่อไปได้ และบางทีอาจดึงยานลำนี้กลับคืนสู่ความเป็นจริงของเรา"
 cstorms.1317.name: "พบเห็นผู้ผูกพันกับพายุ"
 cstorms.1317.desc: "พบเห็นยานลึกลับใน §Y[this.GetName]§!แล้ว"
 cstorms.1320.name: "มุ่งหน้ากลับบ้าน"
 cstorms.1320.desc: "นั่นไง! ตําแหน่งตัวเองในด้านหน้าของ[Root.Fleet.GetName]เรือโชคร้ายต้อนรับเรา เครื่อง ยนต์ ที่ อยู่ ใน หน้ากาก ที่ มี ชีวิต ปรากฏ บน จอ. การระบุตัวเองเป็นขนาดบีเรื่องราวของเธอเป็นหนึ่งที่น่าสนใจ\n\nเธอ เคย เป็น เจ้า หน้าที่ ที่ มี ชื่อ เสียง ซึ่ง เป็น ตัว แทน แท้ ของ องค์การ ที่ รู้ จัก กัน ว่า อนุ สัญญา แห่ง เบน เนแฟ สส์. ขณะที่ลาดตระเวนเธอและลูกเรือของเธอ ถูกจับภายในพายุคอสมิก และในราคาที่กล้าหาญเพื่อความอยู่รอด เธอตัดสินใจมากกว่า เทคโนโลยีการทดลองนี้ไม่เคยถูกทดลอง และเรือและลูกเรือก็ติดอยู่ ในสนามไฮเปอร์มิติของพายุ\n\nเรื่อง ของ เธอ จบ ลง แล้ว มี การ ปล่อย ภาชนะ เล็ก ๆ จาก เรือ ที่ ถูก ทําลาย. ข้างในมีเอกสารสะสมอยู่ \"เอาพวกนี้กลับบ้าน\"นั่นไง! ยานลึกลับลำนั้นเข้ามาประจำตำแหน่งตรงหน้า [Root.Fleet.GetName] แล้วติดต่อเรามา เอนทิตีจักรกลที่สวมหน้ากากอันวิจิตรปรากฏขึ้นบนหน้าจอ เธอแนะนำตัวเองว่าเทียนและเรื่องราวของเธอก็น่าทึ่งมาก\n\nครั้งหนึ่งเธอเคยเป็นเจ้าหน้าที่ที่มีชื่อเสียง เป็นแบบอย่างที่แท้จริงขององค์กรที่รู้จักกันในชื่อคอนตินเจนซี ของ พวก เขาขณะลาดตระเวน เธอและลูกเรือติดอยู่ท่ามกลางพายุคอสมิก และด้วยความพยายามดิ้นรนเพื่อเอาชีวิตรอด เธอจึงตัดสินใจจ่ายไฟเกินพิกัดให้แก่\"บิ๊กไดรฟ์\"ของยาน เทคโนโลยีการทดลองนี้ยังไม่เคยผ่านการทดสอบมาก่อน ส่งผลให้ยานและลูกเรือถูกกักขังอยู่ในสนามพลังหลายมิติของพายุ\n\nเมื่อเรื่องราวของเธอสิ้นสุดลง ตู้คอนเทนเนอร์ขนาดเล็กตู้หนึ่งก็ถูกปล่อยออกมาจากยานที่ผุพัง ภายในเป็นเอกสารที่รวบรวมไว้จำนวนหนึ่ง"
 cstorms.1320.a: "เริ่มทำการแปลภาษา"
 cstorms.1321.name: "จดหมายจากมิติพหุคูณ"
 cstorms.1321.desc: "เนื้อหาในคอนเทนเนอร์แปลกประหลาดได้รับการถอดรหัสแล้ว เอกสารฉบับหนึ่งประกอบด้วยแผนผังของสิ่งที่เรียกว่าฮาร์ดไดรฟ์ของยาน แม้จะยังคงล้ำหน้ากว่าเทคโนโลยีของเราในปัจจุบัน แต่การศึกษาหลักการเบื้องหลังการสร้างอย่างละเอียดก็ได้ช่วยพัฒนาความเข้าใจเกี่ยวกับการเดินทางผ่านห้วงอวกาศไฮเปอร์สเปซของเราแล้ว\n\nสิ่งที่อาจมีประโยชน์น้อยกว่า แต่ส่งผลต่อจิตใจมากกว่า คือคำแปลของจดหมายส่วนตัว แต่ละฉบับส่งถึงคนที่รัก โดยพูดถึงความรัก ความหวัง และความเสียใจ\n\nดูเหมือนว่าความตั้งใจของเทียนคือการให้โอกาสลูกเรือของเธอได้ติดต่อหาคนรักเป็นครั้งสุดท้าย น่าเสียดายที่เราไม่มีทางรู้ว่าจะส่งจดหมายเหล่านี้ไปที่ใด การเปิดเผยจดหมายเหล่านี้แก่ประชาชนของเราอย่างน้อยก็น่าจะช่วยรักษามรดกที่แปลกประหลาดนี้ไว้ได้ หรืออีกทางหนึ่ง การทำลายพวกมันทิ้งเสียอาจเป็นเรื่องที่ฉลาดกว่า เพราะการรับรู้เรื่องยานประหลาดและจดหมายชวนขนลุกอาจสร้างความไม่สบายใจได้"
 cstorms.1321.a: "บันทึกจดหมายเหล่านี้ไว้เพื่อคนรุ่นหลัง"
 cstorms.1321.b: "กำจัดจดหมายเหล่านี้ทิ้งซะ"

 project_cosmic_storms_stormbound: "วิญญาณแห่งพายุ"
 project_cosmic_storms_stormbound_DESC: "เราตรวจพบว่ายานลึกลับจะปรากฏตัวขึ้นภายในพายุลูกนี้\n\nส่งยานวิทยาศาสตร์ไปล่อมันออกมาและเข้าสกัดกั้นทันที!"

### But They're Cute Event Chain
 cs_but_they_are_cute_chain_title: "แต่มันน่ารักนะ!"
 cs_but_they_are_cute_chain_desc: "หลังจากสำรวจ [From.Planet.GetName] ก็ได้พบสิ่งมีชีวิตประหลาดตัวหนึ่ง เราจะทำอย่างไรกับมันดี?"
 but_they_are_cute_category: "แต่มันน่ารักนะ!"
 but_they_are_cute_category_desc: "หลังจากสำรวจ [From.Planet.GetName] ก็ได้พบสิ่งมีชีวิตประหลาดตัวหนึ่ง แม้จะอยู่ร่วมกับเราเพียงช่วงเวลาสั้น ๆ แต่มันก็ปลุกเร้าความปรารถนาอย่างลึกซึ้งที่จะดูแลและปกป้องมันขึ้นมาแล้ว แนะนำให้ทำการศึกษาเพิ่มเติม"
 cstorms.1500.name: "แต่มันน่ารักนะ!"
 cstorms.1500.desc: "นับตั้งแต่วินาทีที่สิ่งมีชีวิตตัวนี้ถูกค้นพบ อิทธิพลของมันนั้นปฏิเสธไม่ได้เลย มันสร้างความรักความผูกพันในหมู่พวกเราได้เกือบจะในทันที ดวงตากลมโตทั้งสี่ดวงของมันแสดงถึงความไร้เดียงสาและเชิญชวนให้ทุกคนลูบไล้ขนที่นุ่มฟูดุจปุยเมฆ ดูเหมือนมันจะติด [Root.GetLeaderName] เป็นพิเศษ โดยใช้เวลาส่วนใหญ่อยู่บนตักของ [Leader.GetHisHer] เพื่อเพลิดเพลินกับความรักจาก [Leader.GetHisHer] และไม่แสดงอาการก้าวร้าวหรืออันตรายใด ๆ เลย ราวกับว่ามันถูกออกแบบมาอย่างสมบูรณ์แบบเพื่อไม่ให้เป็นพิษเป็นภัยที่สุดเท่าที่จะเป็นไปได้\n\nอย่างไรก็ตาม นักกังขาบางคนชี้ว่าการเก็บสิ่งมีชีวิตที่ไม่เคยพบมาก่อนไว้บนยานโดยไม่ได้รับอนุมัติล่วงหน้านั้นเป็นเรื่องที่ไม่รับผิดชอบอย่างยิ่ง [Root.GetLeaderName] รับรองว่ามันปลอดภัยอย่างแน่นอน (มั้ง) แต่ก็ตกลงที่จะขอให้มีการสืบสวนอย่างเป็นทางการ"
 cstorms.1500.a: "ค้นหาว่ามันคือตัวอะไร"
 cstorms.1500.b: "ปฏิเสธคำขอ กำจัดมันไปซะ"
 cstorms.1500.evopred: "ปฏิเสธคำขอ กินมันซะ"
 project_cosmic_storms_but_they_are_cute: "ความมหัศจรรย์ทางชีวภาพ"
 project_cosmic_storms_but_they_are_cute_DESC: "พบสัตว์ที่น่าสนใจและน่ารักอย่างยิ่งบนยานวิทยาศาสตร์ลำหนึ่งของเรา จำเป็นต้องมีการตรวจสอบคุณสมบัติทางชีวภาพของสิ่งมีชีวิตนี้ก่อนที่เราจะตัดสินใจว่าจะเก็บมันไว้หรือไม่"
 cstorms.1505.name: "ความมหัศจรรย์ทางชีวภาพ"
 cstorms.1505.desc: "สัตว์หกขาที่แสนเชื่องตัวนี้ไม่จำเป็นต้องใช้ยาสลบหรือบังคับให้ตรวจและสแกนเลย มันดูเหมือนจะให้ความร่วมมืออย่างน่าประหลาด ลูกเรือตั้งฉายาให้มันว่าเคอร์ตามเสียงครางเบา ๆ ที่มันทำเวลาถูกลูบหัว\n\nเราสรุปได้ว่าเคอร์เป็นสัตว์กินพืชและสัตว์ และขนของมันประกอบด้วยเส้นใยเคราตินที่คุ้นเคยและนุ่มมาก แต่ความมหัศจรรย์และความลึกลับที่แท้จริงเกิดขึ้นภายในตัวของสิ่งมีชีวิตที่น่ารักนี้: มันสามารถผลัดเซลล์ใหม่ทั้งหมดได้ภายในหนึ่งเดือน ซึ่งรวมถึงระบบประสาทของมันด้วย หมายความว่ามันสามารถงอกชิ้นส่วนร่างกายที่ทำงานได้สมบูรณ์ขึ้นมาใหม่ได้ภายในไม่กี่วัน\n\nดูเหมือนเป็นไปไม่ได้เลยที่สิ่งมีชีวิตที่มีโครงสร้างทางชีวภาพซับซ้อนขนาดนี้จะเป็นผลผลิตจากวิวัฒนาการตามธรรมชาติ เราไม่เคยเห็นอะไรแบบนี้มาก่อน และไม่สามารถแน่ใจในนิสัยใจคอของมันได้ แม้ว่าภายนอกมันจะดูเชื่อง แต่ก็อาจจะหันมาทำร้ายเราเมื่อไหร่ก็ได้ ถึงอย่างนั้น นับตั้งแต่การปรากฏตัวของมัน [Root.GetLeaderName] ก็ดูมีแรงบันดาลใจในการทำงานมากกว่าที่เคย\n\nเราจะทำอย่างไรกับเคอร์ดี? เราจะเก็บมันไว้ได้ไหม?"
 cstorms.1505.a: "ได้ ตราบใดที่คุณคอยทำความสะอาดตามหลังมัน"
 cstorms.1505.b: "กำจัดมันไปซะ"
 cstorms.1510.name: "เกอร์ผู้ช่วยเยียวยาจิตใจ"
 cstorms.1510.desc: "สิ่ง มี ชีวิต ที่ น่า รัก นี้ ได้ รับ อนุญาต ให้ อยู่ ใน เรือ วิทยาศาสตร์ และ ตั้ง แต่ นั้น มา ก็ ตั้ง ถิ่น ฐาน อย่าง ดี. มันสงบ[Root.GetLeaderName]ปลดปล่อยอารมณ์ที่ใดก็ตามที่มันวิ่ง และกําลังใจลูกเรือที่ตลอดเวลาสูง!\n\nหวังว่าความพิศวงของ \"ธรรมชาติ\"สิ่งมีชีวิตแสนน่ารักได้รับอนุญาตให้อยู่บนยานวิทยาศาสตร์ต่อไป และตั้งแต่นั้นมามันก็ปรับตัวเข้ากับชีวิตบนยานได้เป็นอย่างดี มันช่วยให้ [Root.GetLeaderName] สงบลง สร้างบรรยากาศที่สดใสในทุกที่ที่มันเดินผ่าน และขวัญกำลังใจของลูกเรือก็สูงเป็นประวัติการณ์!\n\nหวังว่าความมหัศจรรย์อันโดดเด่นนี้ของ "
 cstorms.1510.a: "ยอดเยี่ยมมาก!"
 cstorms.1515.name: "จุดจบของเกอร์"
 cstorms.1515.desc: "ด้วยร่างที่ผิดปกติและชัดเจน ว่าถูกดัดแปลงทางพันธุกรรม สัตว์ชนิดนี้ไม่สามารถอยู่บนยานวิทยาศาสตร์ได้ ความ เสี่ยง ต่อ การ ทํา เช่น นั้น ก่อ ผล เสีย หาย ต่อ ลูก เรือ หรือ เจ้า ของ ที่ ดู เหมือน หงุดหงิด ซึ่ง ดู เหมือน ต้องการ ให้ ลูก เรือ กลับ มา นั้น มาก เกิน ไป. การ กระทํา ดัง กล่าว ดําเนิน ไป อย่าง รวด เร็ว และ ด้วย ความ เมตตา. ในชั่วพริบตา มันอ่อนนุ่มเนื่องจากร่างกายที่ผิดปกติและผ่านการดัดแปลงพันธุกรรมอย่างชัดเจน สิ่งมีชีวิตตัวนี้จึงไม่สามารถอยู่บนยานวิทยาศาสตร์ต่อไปได้ ความเสี่ยงที่มันจะส่งผลกระทบในทางลบต่อลูกเรือ หรือเจ้าของที่ขุ่นเคืองปรากฏตัวขึ้นมาเพื่อทวงมันคืนนั้นมีมากเกินไป การลงมือทำอย่างรวดเร็วและมีเมตตา ในชั่วพริบตาเดียว ขนอันนุ่มนวลของมัน "
 cstorms.1515.a: "ไม่มีทางเลือกอื่นแล้ว"
 cstorms.1515.evopred: "มาเก็บตัวอย่างดีเอ็นเอกันเถอะ"
 cstorms.1520.name: "จุดจบของเกอร์?"
 cstorms.1520.desc: "การกำจัดสิ่งมีชีวิตแสนน่ารักนี้ควรจะเป็นจุดจบของมัน แต่คุณลักษณะการงอกใหม่ที่น่าทึ่งของมันดูเหมือนจะก้าวไกลเกินกว่าที่เราจะคาดเดาได้\n\nไม่นานหลังจากที่มันตาย สำเนาที่เหมือนกันทุกประการสองตัวของสิ่งมีชีวิตนี้ก็ได้ถือกำเนิดขึ้นมาจากเนื้อเยื่อที่ดูเหมือนไร้ชีวิตของมัน แม้เราจะตัดสินใจยุติชีวิตร่างต้นของมันไปแล้ว แต่สิ่งมีชีวิตที่เกิดมาใหม่เหล่านี้ก็ไม่ได้แสดงอาการก้าวร้าวใด ๆ เลย\n\nเราจะปล่อยมันไว้เท่านี้ ดีกว่าเสี่ยงสร้างกองทัพเกอร์ขึ้นมา [Root.GetLeaderName] และลูกเรือต่างแสดงความยินดีที่ได้รับอนุญาตให้เก็บทั้งคู่ไว้"
 cstorms.1520.a: "บทเรียนที่ได้รับ"

### The Imitator Event Chain
 cstorms.1550.name: "ผู้เลียนแบบ"
 cstorms.1550.desc: "กระสวยที่ถูกค้นพบใน [From.Planet.GetName] ถูกปล่อยทิ้งไว้ตามยถากรรมท่ามกลางมรสุม แม้ว่าลายนิ้วมือข้อมูลที่มันใช้จะดูเหมือนเป็นของเรา แต่กระสวยนั้นเป็นของเอเลี่ยนอย่างแน่นอน เราตอบรับคำขอสื่อสารอย่างระมัดระวัง แต่เรากลับพบกับความดีใจอย่างล้นพ้นจากผู้ที่อยู่ในกระสวยนั้น\n\n[event_target:the_imitator.GetHeSheCap] อธิบายว่า [event_target:the_imitator.GetHeShe] ถูกพายุมรสุมลากไปมาระยะหนึ่งแล้วและกำลังขอความช่วยเหลือ ระบบพยุงชีพของยานของ [event_target:the_imitator.GetHerHis] ใกล้จะล้มเหลวเต็มที\n\nเมื่อถูกถามให้ระบุตัวตน คนแปลกหน้าก็กล่าวอ้างอย่างแปลกประหลาดว่าตนเป็นหนึ่งในลูกเรือของเรา คำโกหกนั้นชัดเจนและน่าเจ็บปวด หากไม่มีเหตุผลอื่นใด ก็เป็นเพราะความจริงที่ว่าลูกเรือทุกคนบนยานของเราได้รับการยืนยันตัวตนครบถ้วนแล้ว"
 cstorms.1550.a: "เลิกเล่นเกมได้แล้ว ทำลายกระสวยซะ"
 cstorms.1550.b: "นำกระสวยขึ้นยาน"
 cstorms.1555.name: "ผู้เลียนแบบ"
 cstorms.1555.desc: "เรานำกระสวยอพยพขึ้นมาบนยานของเรา กลอุบายสิ้นสุดลงทันทีที่ตราประทับของกระสวยเปิดออก หลังจากนั้นเอเลี่ยนภายในก็อ้อนวอนอย่างสิ้นหวังทันที\n\nในระหว่างการตรวจสอบกระสวยอพยพตามปกติบนยานแม่ของ [event_target:the_imitator.GetHerHis] ตัวของ [event_target:the_imitator.GetHeShe] ติดอยู่ภายในและถูกดีดออกสู่อวกาศ น่าเศร้าที่ไม่มีใครบนยานของพวกเขาสังเกตเห็นว่า [event_target:the_imitator.GetHeShe] หายไป\n\nหลังจากติดอยู่เป็นเวลาหลายเดือน [event_target:the_imitator.GetHeShe] ได้ใช้เทคโนโลยีเพียงเล็กน้อยที่ [event_target:the_imitator.GetHeShe] พอจะหาได้บนกระสวยของ [event_target:the_imitator.GetHerHis] เพื่อเลียนแบบสัญญาณพลังงานของยานที่ผ่านไปมาเพื่อเป็นเหยื่อล่อ อย่างไรก็ตาม แม้แต่สิ่งนี้ก็ยังล้มเหลวในการดึงดูดความช่วยเหลือ ที่แย่ที่สุดคือ พายุคอสมิกได้พัดพากระสวยลำนี้ลอยไปไกลหลายปีแสงจากระบบบ้านเกิด ด้วยความโดดเดี่ยวและหวาดกลัวจนถึงขีดสุด [event_target:the_imitator.GetHeShe] จึงคิดแผนการที่จะสวมรอยเป็นลูกเรือที่หายไปของยานลำใดก็ตามที่ผ่านมา ผู้ที่อาศัยอยู่ในกระสวยกล่าวขอโทษสำหรับคำลวงนี้ แต่ก็ดีใจที่มีชีวิตรอดมาได้"
 cstorms.1555.a: "ความสามารถในการเอาตัวรอดเช่นนี้อาจมีประโยชน์"
 cstorms.1555.b: "จัดเตรียมการขนส่งไปยังดาวเคราะห์ที่มีผูอยู่อาศัยที่ใกล้ที่สุด"
 cstorms.1555.c: "ทิ้งพวกเขาไว้ นำกระสวยไป"
 the_imitator_category_desc: "พบกระสวยอพยพลำพังลำหนึ่งในระหว่างการสำรวจเมื่อเร็ว ๆ นี้ ที่แปลกคือ กระสวยได้ติดต่อเราโดยใช้สัญญาณข้อมูลที่ตรงกับของเราเอง ดูเหมือนว่ากระสวยจะถูกพัดพามาจากพายุคอสมิกที่พัดผ่านระบบไปเมื่อไม่นานมานี้ แนะนำให้ทำการสืบสวน"

# The Imitator Leader
 the_imitator_category: "ผู้เลียนแบบ"
 the_imitator_catch_phrase: "ฉันดีใจมากที่ได้มาอยู่ที่นี่!"
 the_imitator_leader_desc: "ถูกนำตัวขึ้นยานหลังจากถูกพายุคอสมิกพัดพาไปทั่ว อัจฉริยะที่เจ้าเล่ห์แต่แปลกประหลาดคนนี้รู้วิธีพลิกสถานการณ์ต่าง ๆ ให้กลับมาดีขึ้นได้เสมอ"

