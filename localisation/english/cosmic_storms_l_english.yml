 cstorms_tutorial.1.desc: "เราสามารถ §Sควบคุม§! §Sเส้นทาง§! ของ §Y$default_storm$§! เพื่อผลประโยชน์ของเราเองได้ ไม่ว่าจะเป็นการ §Sเบี่ยงเบน§! พวกมันออกไปจากระบบดาวของเรา หรือ §Sดึงดูด§! พวกมันเข้ามาเพื่อใช้ประโยชน์จากเอฟเฟกต์เชิงบวกของพวกมัน"

 TUTORIAL_STORM_FORECAST_MAP_MODE_TITLE: "บทช่วยสอน: การพยากรณ์อากาศ"
 TUTORIAL_STORM_FORECAST_MAP_MODE_DESC: "โหมดแผนที่นี้จะแสดงภาพ §Sพายุคอสมิก§! ในกาแล็กซี พร้อมข้อมูลเกี่ยวกับเอฟเฟกต์ของพวกมัน\n\n£storm_forecast_map£\n\nหากต้องการเข้าสู่โหมดแผนที่พยากรณ์อากาศ ให้คลิกไอคอนแผนที่ที่มุมขวาล่าง\n\nด้วยเทคโนโลยีขั้นสูง มันสามารถอัปเกรดเพื่อให้ทำนายได้แม่นยำยิ่งขึ้น ไม่เพียงแค่ตำแหน่งและทิศทางของ §S$default_storm$§! เท่านั้น แต่ยังรวมถึงประเภทของพายุที่คาดว่าจะเกิดขึ้นด้วย"
