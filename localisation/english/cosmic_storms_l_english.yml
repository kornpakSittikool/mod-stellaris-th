# Secrets of the adAkkaria Convention
 project_adakkaria_secrets_of: "ความลับของสหพันธ์อะดัชคาเรีย"
 project_adakkaria_secrets_of_DESC: "ยังคงมีสิ่งต่างๆ อีกมากมายที่พวกเราสามารถเรียนรู้ได้จากสถาบันการเฉลิมฉลอง(การเฉลิมฉลอง)พวกเราจะกล้าเข้าไปยุ่งเกี่ยวกับการทดลองของชาวภาษาอักขลาเหล่านี้ต่อไปอีกหรือไม่?"
 cstorms.2365.name: "ปลดปล่อยศักยภาพ"
 cstorms.2365.desc.start: "ในการวิจัยของ adAcgria ดูเหมือนว่านักวิทยาศาสตร์ของพวกเขา ไม่ได้มองไปยังมาตรฐานที่จดจําใด ๆ; วิธีการเป็นการระเบิดข้อสรุปเกือบไตรต์การ วิจัย อย่าง ระมัดระวัง และ ขยัน ขัน แข็ง ถูก ละ ทิ้ง; ความ เสื่อม ทราม รับ เอา ไว้. กระนั้น ยิ่ง คน ที่ อยู่ ภาย ใต้ การ ทดลอง ทารุณ โหด ร้าย มาก เท่า ไร ก็ ยิ่ง ได้ รับ คํา สรรเสริญ มาก เท่า นั้น จาก พระ บัญชา อัน สูง ส่ง.\n\nอย่างไรก็ตาม งานวิจัยในยุคแรกๆ ได้เล่าเรื่องราวที่ต่างไปมาก: เรื่องต่าง ๆ ได้รับการปฏิบัติอย่างดี และได้รับการยกย่องในการเดินทางของพวกเขาเมื่อเจาะลึกเข้าไปในงานวิจัยของสหพันธ์แอดิอะคาเรียดูเหมือนว่านักวิทยาศาสตร์ของพวกเขาไม่ได้ยึดมั่นในมาตรฐานที่เป็นที่ยอมรับใดๆ เลย วิธีการดำเนินงานนั้นหละหลวม และข้อสรุปก็เกือบจะตื้นเขิน งานวิจัยที่รอบคอบและขยันขันแข็งถูกละทิ้ง ความเสื่อมทรามถูกเปิดรับ ทว่า ยิ่งกลุ่มทดลองเผชิญกับความโหดร้ายทารุณมากเท่าไร เสียงชื่นชมจากคําสั่งที่สูงที่สุดก็ยิ่งสูงขึ้นเท่านั้น\n\nอย่างไรก็ตาม งานวิจัยในยุคแรกเริ่มกลับเล่าเรื่องราวที่แตกต่างออกไปอย่างสิ้นเชิง: กลุ่มทดลองได้รับการดูแลอย่างดีและได้รับความเคารพในเส้นทางการปลุก"
 cstorms.2365.desc.end.default: "ตอนนี้พวกเราเข้าใจหลักการทำงานแล้ว การเรียนรู้จากความผิดพลาดของสหพันธ์แอดิอะคาเรียทำให้เราสามารถส่งเสริมประชากรของเราเองให้ปลูกฝังพายุภายในตัวพวกเขา และเติมเต็มไปด้วยความแข็งแกร่งอันดุดันของพายุได้ อันตรายคือ บุคคลที่เป็น §G$Name_Storm_Fused$§! เหล่านี้บางคนอาจขานรับเสียงเรียกของพายุ และท้ายที่สุดก็นำพาพายุร้ายมาสู่ตนเอง"
 cstorms.2365.desc.end.gestalt: "กลุ่มจิตร่วมสำนึกของเราเข้าใจหลักการทำงานแล้ว การเรียนรู้จากความผิดพลาดของสหพันธ์แอดิอะคาเรียทำให้บางส่วนของเราสามารถปลูกฝังพายุภายในตัวพวกเขา และเติมเต็มไปด้วยความแข็งแกร่งอันดุดันของพายุได้ อันตรายคือ โหนดที่เป็น §G$Name_Storm_Fused$§! เหล่านี้อาจรู้สึกถึงเสียงเรียกของพายุรุนแรงเกินไป และท้ายที่สุดก็นำพาพายุร้ายมาสู่ตนเอง"
 cstorms.2365.desc.default: "$cstorms.2365.desc.start$\n\n$cstorms.2365.desc.end.default$"
 cstorms.2365.desc.gestalt: "$cstorms.2365.desc.start$\n\n$cstorms.2365.desc.end.gestalt$"
 cstorms.2365.a: "ประยุกต์ใช้ความรู้ใหม่นี้ อย่างเบามือที่สุด!"
 cstorms.2365.b: "ไม่ ปล่อยให้ความลับเหล่านี้หลับใหลต่อไปเถอะ"
 cstorms.2365.a.tt: "- โอกาสที่ §Y100§! £pop£ §Hป๊อป§! จะได้รับคุณลักษณะ $Name_Storm_Fused$ ในช่วงที่มีพายุจะเพิ่มขึ้นสี่เท่า\n - ทุกๆ 20 ปี มีโอกาสเล็กน้อยที่ §Y100§! £pop£ §Hป๊อป§! จะตายและกลายเป็นพายุ\n - บ่มเพาะศักยภาพ: ตัวดัดแปลงความสุขของจักรวรรดิ +5%"

