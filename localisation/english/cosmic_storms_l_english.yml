 cstorms.2295.a: "ปล่อยให้ [Root.GetLeaderName] ทำตามความต้องการ"
 cstorms.2295.b: "ห้ามไม่ให้ [Root.GetLeaderName] ดำดิ่งลงไป"
 cstorms.2295.a.psionic: "เหยื่อของพวกเขายังคงร้องไห้คร่ำครวญ"
 cstorms.2295.a.psionic_gestalt: "เสียงที่รวมกันเป็นหนึ่งของพวกเขายังคงคร่ำครวญด้วยความปวดร้าว"
 cstorms.2295.a.gestalt: "ความไม่ประสานสอดคล้องเป็นบ่อเกิดแห่งความโกลาหล"
 cstorms.2300.name: "และทุกอย่างก็ถูกเอ่ยออกมา"
 cstorms.2300.desc: "พวกเราได้ทำงานอย่างหนักเพื่อปลดล็อกส่วนสุดท้ายของ $building_adakkaria_patriotic_institute$ ในขณะเดียวกัน รายงานที่น่าฉงนสนเท่ห์ก็ได้ส่งมาถึงเราจากห้องปฏิบัติการส่วนล่าง นักวิทยาศาสตร์ของแอดิอะคาเรียอ้างว่าในทุกๆ สิ่งมีชีวิต หรือแม้กระทั่งในเครื่องจักรที่มีความตระหนักรู้ ต่างก็มีประกายไฟบางอย่างดำรงอยู่ ด้วยแรงบันดาลใจจากการก่อตัวของพายุคอสมิก พวกเขาเรียกพลังนี้ว่าอินเนอร์สตรอมพายุภายใน): กระแสคลื่นแห่งความปรารถนาและอานุภาพที่คอยขับเคลื่อนสิ่งมีชีวิตที่มีความรู้สึกนึกคิดทั้งหมด การนำพายุภายในนี้ไปเผชิญกับประสบการณ์ขั้นสุดขั้ว จะช่วยปลดปล่อยพลังอันยิ่งใหญ่ออกมาได้\n\nในช่วงเวลาที่เขาเป็นเชลยศึก §Sแอตตา แลนเดอร์§! เป็นคนแรกที่ค้นพบปรากฏการณ์นี้ ในฐานะนักวิทยาศาสตร์ เขาได้หว่านล้อมให้คําสั่งที่สูงที่สุดมอบทุนสนับสนุนการทดลองเพิ่มเติมบนเฉลิมแม้ว่าปูมบันทึกจะไม่ได้บอกเราว่าเกิดอะไรขึ้นกับ §Sแลนเดอร์§! แต่พวกเราก็รู้จากเหตุการณ์ในสุสานยานรบว่า จุดจบสุดท้ายของเขานั้นช่างน่าสลดใจยิ่งนัก\n\nรายงานถัดๆ มาอ้างถึงวิธีการปลดปล่อยพายุภายในที่มี 'ประสิทธิภาพมากกว่า' วิธีการที่ไม่จำเป็นต้องใช้ความโหดร้ายทารุณทางกายภาพอย่างสุดโต่ง แต่เปลี่ยนไปพึ่งพาการกระตุ้นความหวาดกลัวอันยากจะหลีกเลี่ยงและถึงแก่ชีวิตภายในตัวเหยื่อแทน เพื่อที่จะเริ่มกระตุ้นผลกระทบนี้ในระดับมหภาค สหพันธ์วางแผนที่จะส่งสัญญาณผ่านเครือข่ายสถานีชวนเชื่อที่แผ่ขยายออกไปของพวกเขา"
 cstorms.2300.desc.psionic: "พวกเราประสบความสำเร็จในการบันทึกเสียงกระซิบทางพลังจิตของชั้นดาดฟ้าสังเกตการณ์:\n\n§Lเอาฉันออกไปจากที่นี่ที ได้โปรด ฉันเคยเป็นพลเมืองดีเด่นนะ!\nความฝันของฉันตอนนี้ไม่มีอะไรนอกจากพายุที่ไม่มีวันสิ้นสุด มันกำลังเรียกหาฉัน\nฉันไม่เข้าใจ พวกเราทำหน้าที่ของเราได้อย่างดีเยี่ยม - ทำไมพวกเขาถึงทำแบบนี้กับเรา?\nข้างในตัวพวกเราทุกคนมีพลังแฝงอยู่ พวกเขาต้องการจะแสวงหาผลประโยชน์จากพลังนั้น พวกเราต้องไม่มอบมันให้พวกเขา\nไร้สาระน่า พวกเขาทำแบบนี้เพื่อช่วยอนุ สัญญา เบน ไว เล็นต์เราต้องปฏิบัติตาม\nดาวเทียมกำลังกระซิบกับฉัน ตอนนี้ฉันสามารถส่งกระแสจิตไปได้ทั่วทั้งกาแล็กซีแล้ว\nฉันเห็นพวกเขาออกแบบบางสิ่ง บางสิ่งที่จะทำแบบนี้กับใครก็ได้ ที่ไหนก็ได้\nพวกเราจะรอดชีวิต แค่ยอมมอบสิ่งที่ต้องการให้พวกเขาก็พอ!\nนายไม่เข้าใจหรอก ถ้าพวกเขาทำแบบนี้กับเรา พวกเขาก็จะทำแบบนี้กับทุกคน\nพวกเราอาจปลดปล่อยตัวเองได้\nแต่นั่นแปลว่าพวกเราจะ...\nพวกเขาก็จะฆ่าเราอยู่ดีแหละ เมื่อสิ่งนั้นพร้อมใช้งาน พวกเขาจะฆ่าเราทุกคน\nฉันกลัว ฉันไม่อยากตาย ฉันอยากมีชีวิตอยู่ ได้โปรด\nขั้น สุด ท้ายกำลังพูดกับฉัน พวกเขาอยากรู้ว่าพวกเราเห็นด้วยไหม§!"
 cstorms.2300.b: "พลังนี้ต้องตกเป็นของพวกเรา"
 cstorms.2300.a.psionic: "ช่างเป็นจุดจบที่น่าสลดใจยิ่งนัก"
 cstorms.2300.a.psionic_hive_robot: "ผลลัพธ์ที่น่าเศร้าใจ"
 cstorms.2300.b.psionic: "ไม่มีสิ่งใดจะสูงส่งไปกว่าการเสียสละอีกแล้ว"
 cstorms.2300.b.psionic_hive_robot: "การเสียสละอันทรงเกียรติ"
 cstorms.2305.name: "เครื่องอัญเชิญวาตภัย"
 cstorms.2305.desc.start: "พวกเราค้นพบโรงจอดขนาดมหึมา โครงข่ายสายไฟ ท่อ และอุปกรณ์อิเล็กทรอนิกส์ที่ซับซ้อนอย่างยิ่งครอบคลุมพื้นที่ทั้งหมด - ทุกสายมุ่งตรงไปยังไซโลขีปนาวุธขนาดใหญ่ทว่าว่างเปล่า จากรูปลักษณ์ทั้งหมด โครงข่ายนี้เคยเชื่อมต่อกับวัตถุที่มีขนาดใกล้เคียงกับยานคอร์เวต\n\nปูมบันทึกระบุว่าสถานที่นี้เคยถูกใช้เพื่อประกอบอุปกรณ์ที่เรียกว่า §lตัวแปลงเสียง§! และมันได้ถูกส่งไปใช้งานเป็นผลสำเร็จในระบบดาว adSul แม้ว่าการติดต่อกับตัวเพิ่มเสียงจะขาดหายไป แต่ §Gแหล่งพลังงานอินโวเซอร์§! ยังคงอยู่ในตำแหน่งเดิม"
 cstorms.2305.desc.end.default: "เมื่อได้อ่านชื่อนี้ ลูกเรือก็ถูกครอบงำด้วยความรู้สึกโกรธแค้นอย่างไม่มีเหตุผล และเริ่มกระชากสายไฟกับแผงควบคุมออก ต้องใช้มากกว่าคำสั่งธรรมดาๆ เพื่อให้พวกเขาสงบสติอารมณ์ลงได้ พวกเรากำลังขยับเข้าใกล้ความจริงไปอีกขั้น"
 cstorms.2305.desc.end.psionic: "เมื่อ [Root.GetLeaderName] เดินเข้าไปใกล้โครงสร้างที่ว่างเปล่า เสียงกระซิบทางจิตก็เริ่มขึ้นอีกครั้ง\n§Lเธอเห็นมันใช่ไหม? ตอนแรกพวกเราไม่รู้ว่าพวกเขากำลังสร้างอะไร พวกเราไม่รู้ว่าพวกเขาจะกำจัดพวกเราทิ้ง บางคนต้องการล้างแค้น บางคนในหมู่พวกเราอยากเป็นอิสระ บางคนรู้สึกได้ถึงเสียงเรียกของพายุ มันต้องจบลงเสียที เธอเข้าใจใช่ไหม พวกเราจำเป็นต้องทำ พวกเราไม่สามารถทนมันได้อีกต่อไปแล้ว§!"
 cstorms.2305.desc.end.gestalt: "เมื่อได้อ่านชื่อของอุปกรณ์นี้ [controller.GetIndividualNamePlural] ฝ่ายสำรวจของเราก็ได้ระบุว่า §lตัวเพิ่มเสียง§! ถูกเปิดใช้งานอย่างไร และสัญญาณของมันสะท้อนผ่านสถานีโฆษณาชวนเชื่อจำนวนมากจนกระทั่งไปถึงเป้าหมายในที่สุดได้อย่างไร\n\nและพวกเราเองก็มิได้มีภูมิคุ้มกันต่อโชคชะตานั้นเช่นกัน"
 cstorms.2305.desc.default: "$cstorms.2305.desc.start$\n\n$cstorms.2305.desc.end.default$"
 cstorms.2305.desc.psionic: "$cstorms.2305.desc.start$\n\n$cstorms.2305.desc.end.psionic$"
 cstorms.2305.desc.gestalt: "$cstorms.2305.desc.start$\n\n$cstorms.2305.desc.end.gestalt$"
 cstorms.2310.name: "เฟสสุดท้าย"
 cstorms.2310.desc.start: "ในที่สุดเฉลิมก็ได้เผยความลับสุดท้ายให้เราได้รู้: เฟสสุดท้าย\n\nภายในทางเดินเหล่านี้ ซากศพที่แห้งกรังของเจ้าหน้าที่แอดิอะคาเรียนอนระเกะระกะอยู่ตามพื้น พวกเขาถูกฉีกเป็นชิ้นๆ ด้วยเศษหิน โลหะ พลาสติก และขยะอื่นๆ บางสิ่งบางอย่างได้บ้าคลั่งอยู่ภายในทางเดินเหล่านี้ ทำลายล้างทุกสิ่งและทุกคนที่ขวางทางมัน\n\nทว่าความ"
 cstorms.2310.desc.piece.default: "สยดสยอง"
 cstorms.2310.desc.piece.authgen: "น่ายินดี"
 cstorms.2310.desc.end: "ที่แท้จริงนั้นยังมาไม่ถึง\nห้องขังอันคับแคบกักขังบุคคลเอาไว้ครึ่งโหล จอภาพระบุว่าพวกเขาคือ §Gแหล่งพลังงานอินโวเซอร์§! แต่เห็นได้ชัดว่าพวกเขาคือประชากรวัยเยาว์ของสหพันธ์ ร่างกายเล็กๆ ของพวกเขาถูกห้อยไว้ด้วยท่อและสายเคเบิลนับสิบเส้น ของเหลวภายในห้องขังคอยประคับประคองพวกเขาให้อยู่ในสถานะกึ่งเป็นกึ่งตาย ร่างกายของพวกเขาถูกโอบล้อมด้วยพลังงานที่คล้ายกับพลังงานภายในพายุที่ค้างคาอยู่ในระบบดาว adSul เท่านั้น\n\nหน้าจอที่เหลือไม่กี่จอเริ่มทำงาน แต่ละจอแสดงคำขอเพียงอย่างเดียว:\n§Lจดจำพวกเรา | เอ่ยชื่อพวกเรา | เอ่ยชื่อพวกเรา§!\n\nพวกเราได้บันทึกชื่อของคนหนุ่มสาวเหล่านี้ไว้ ทว่าชื่อสุดท้ายทำให้เราต้องหยุดคิด: §Sเอน ไร ดา§! บุคคลจากความ ถ่อม ใจผู้เคยใช้จิตทำให้ไฟสงบลงได้\n\nบัดนี้ เมื่อได้รับชื่อเหล่านี้แล้ว พวกเราน่าจะสามารถติดต่อกับพายุคอสมิกได้อีกครั้ง"
 cstorms.2310.desc.default: "$cstorms.2310.desc.start$ $cstorms.2310.desc.piece.default$ $cstorms.2310.desc.end$"
 cstorms.2310.desc.authgen: "$cstorms.2310.desc.start$ $cstorms.2310.desc.piece.authgen$ $cstorms.2310.desc.end$"
 cstorms.2310.a: "ยอดเยี่ยมมาก!"

# The Storm's Swansong
 cstorms.2320.name: "พายุ"
 cstorms.2320.desc: "เอ่ยชื่อพวกเรา\n\nเอ่ยชื่อพวกเรา\n\nเอ่ย | ชื่อ | พวกเรา"
 cstorms.2320.a: "พวกเราเห็นสิ่งที่สหพันธ์ทำกับพวกเธอแล้ว"
 cstorms.2320.b: "เกิดอะไรขึ้นกับสหพันธ์อดาคาเรีย?"
 cstorms.2320.c: "ตัวแปลงเสียงอยู่ที่ไหน?"
 cstorms.2320.d: "พวกเรามีชื่อของพวกเธอแล้ว"
 cstorms.2320.a.resp: "พวกเขาไม่ยอมหยุดมอบความ\n\nเจ็บปวดและความโกรธเกรี้ยวและความโศกเศร้าและความกลัว\n\nพวกเขาคือคมเขี้ยว พวกเขาคือขากรรไกร พวกเขากำลัง\nกัดกิน คายเราออกมา นำพามาซึ่ง\n\nเจ็บปวดและความโกรธเกรี้ยวและความโศกเศร้าและความกลัว\n\nพวกเราสลายไป พวกเราสิ้นสูญ พวกเรากลายเป็น\n\nเจ็บปวดและความโกรธเกรี้ยวและความโศกเศร้าและความกลัว"
 cstorms.2320.b.resp: "เสเพล ถือดี และไร้ความปรานี\nหยิ่งยโส | โหดร้าย | ถูกขับเคลื่อน\nนำความตาย นำความทุกข์ทรมานมาให้\n\nพวกเราต้อง ต้อง ต้อง ต้อง ต้อง ต้อง ต้อง ต้อง\nคงอยู่ | ไม่คงอยู่ | สลายตัว\n\nพวกเรา\nเดินทางไปกับคลื่นวิทยุ | บิดเบือนสัญญาณ | บิดเบือนจิตใจ\nกลายเป็นสีขาว | กลายเป็นสีเทา | กลายเป็นสีดำ | ยอมจำนนต่อความมืดมิด\nกระจัดกระจายไปตามดวงดาว และไม่มีใครได้ยินชื่ออีกเลย"
 cstorms.2320.c.resp: "พวกเรา\nคือโล่ | ปกป้องเธอ\n\nพวกเรา\nสร้างเปลเลี้ยงเด็ก | โอบอุ้มมันไว้\n\nและไกวมันไปสู่ความว่างเปล่า | หลับใหล หลับใหล หลับใหล ดับสูญ\n\n§lTEMPEST§! §Rเครื่อง ช่วย หายใจ§!\nและไม่มีวันตื่นขึ้นมาอีกเลย"
 cstorms.2325.desc: "เอ่ยชื่อพวกเรา | เอ่ยชื่อพวกเรา | เอ่ยชื่อพวกเรา\n\nตอนนี้ §g(ตอนนี้)§! ตอนนี้ §g(ตอนนี้)§!\n\nเอ่ยชื่อพวกเรา | เอ่ยชื่อพวกเรา | เอ่ยชื่อพวกเรา\n\nเอ่ย | ชื่อ | พวกเรา | เดี๋ยวนี้"
 cstorms.2325.d: "เอาล่ะ ชื่อของพวกเธอคือ..."
 cstorms.2330.desc: "§Lพวกเราท่องรายชื่อทั้งหมดที่พบในระหว่างการขุดค้น เมื่อเราเอ่ยชื่อสุดท้าย พายุก็เงียบสงบลง§!"
 cstorms.2330.a: "พวกเธอยังอยู่ที่นั่นไหม?"
 cstorms.2335.desc: "พวกเราสามารถคิดได้อีกครั้งแล้ว! §g(คิด คิด คิด)§!\nมีเสียงมากมายรอบตัวเรา! §g(คิด พูด ปรารถนา ฝัน)§!\nผู้คนที่มีเอกลักษณ์มากมายเหลือเกิน §g(เธอและฉันและพวกเขาและพวกหล่อน)§!\n\nเธอได้คืนสติให้กับพวกเราแล้ว §g(เดินทาง ถอดรหัส ค้นพบ)§!\nแต่การบอกชื่อของพวกเราทำให้เธอควบคุมพวกเราได้... §g(ไม่นะ ไม่เอาอีกแล้ว!)§!\nเธอต้องการอะไรจากพวกเรา? §g(ปล่อยเราไป ปล่อยเราไป ปล่อยเราไป ปล่อยเราไป)§!"
 cstorms.2335.a: "ถึงเวลาที่พวกเธอจะเป็นอิสระแล้ว"
 cstorms.2335.b: "ยอมจำนนซะ แล้วมอบตัวแปลงเสียงมาให้เรา"
 cstorms.2340.desc: "อิสระ\n\nเธออยากปล่อยพวกเราไปงั้นเหรอ? §g(อิสระ?)§!\n\nเป็นไปไม่ได้ §g(มันเป็นไปไม่ได้)§!\nเธอไม่ได้หมายความแบบนั้นแน่ๆ §g(แล้วตัวแปลงเสียงล่ะ?)§!"
 cstorms.2340.a: "พวกเราจะทำลายมันเอง"
 cstorms.2345.desc: "เจ็บปวดและโกรธเกรี้ยวและโศกเศร้าและกลัว §g( เจ็บปวด | โกรธเกรี้ยว | โศกเศร้า | กลัว )§!\n\nนั่นคือสิ่งเดียวที่พวกเราเคยทำได้ดี\n\nนั่นคือสิ่งเดียวที่พวกเราเคยทำได้ดี เจ็บปวด โกรธเกรี้ยว โศกเศร้า กลัว\n§gเจ็บปวด โกรธเกรี้ยว โศกเศร้า กลัว เจ็บปวด โกรธเกรี้ยว โศกเศร้า กลัว เจ็บปวด โกรธเกรี้ยว โศกเศร้า กลัว โกรธเกรี้ยว โศกเศร้า กลัว เจ็บปวด โกรธเกรี้ยว โศกเศร้า กลัว เจ็บปวด โกรธเกรี้ยว โศกเศร้า กลัว เจ็บปวด โศกเศร้า กลัว เจ็บปวด โกรธเกรี้ยว โศกเศร้า กลัว เจ็บปวด โกรธเกรี้ยว โศกเศร้า กลัว เจ็บปวด โกรธเกรี้ยว กลัว เจ็บปวด โกรธเกรี้ยว โศกเศร้า กลัว เจ็บปวด โกรธเกรี้ยว โศกเศร้า กลัว เจ็บปวด โกรธเกรี้ยว โศกเศร้า เจ็บปวด โกรธเกรี้ยว โศกเศร้า กลัว เจ็บปวด โกรธเกรี้ยว โศกเศร้า กลัว เจ็บปวด โกรธเกรี้ยว โศกเศร้า กลัว โกรธเกรี้ยว โศกเศร้า กลัว เจ็บปวด โกรธเกรี้ยว โศกเศร้า กลัว เจ็บปวด โกรธเกรี้ยว โศกเศร้า กลัว เจ็บปวด โศกเศร้า กลัว เจ็บปวด โกรธเกรี้ยว โศกเศร้า กลัว เจ็บปวด โกรธเกรี้ยว โศกเศร้า กลัว เจ็บปวด โกรธเกรี้ยว กลัว เจ็บปวด โกรธเกรี้ยว โศกเศร้า กลัว เจ็บปวด โกรธเกรี้ยว โศกเศร้า กลัว เจ็บปวด โกรธเกรี้ยว โศกเศร้า§!"
 cstorms.2345.a: "โวยวายไปเถอะตามที่ต้องการ ทาสรับใช้ชั่วนิรันดร์ของพวกเรา"
 cstorms.2350.name: "จะไม่มีพายุอีกต่อไป"
 cstorms.2350.desc: "พายุสร้างช่องว่างขึ้นภายในตัวมันเอง เผยให้เราเห็น §lตัวแปลงเสียง§! ช่างน่าแปลกที่อุปกรณ์ขนาดเล็กเช่นนี้กลับเป็นจุดมุ่งหมายของความปรารถนา การสู้รบ และการเสียสละมากมายขนาดนี้ การมีอยู่ของมันเพียงอย่างเดียวได้เริ่มต้นความล่มสลายของจักรวรรดิที่เคยรุ่งเรืองในอดีต\n\nด้วยคำสั่งง่ายๆ ชุดหนึ่ง พวกเราได้เปิดใช้งานระบบทำลายตัวเองของตัวแปลงเสียงเมื่อแสงการระเบิดจางลง และเศษซากกระจายไปทั่วระบบดาว พายุก็เริ่มสงบลง เมื่อมันสงบลง ม่านหมอกแปลกประหลาดที่ปกคลุมโลกบ้านเกิดของสหพันธ์แอดิอะคาเรียก็หายไปด้วยเช่นกัน\n\nฝันร้ายอันยาวนานของพวกเขาได้สิ้นสุดลงในที่สุด"
 cstorms.2350.a: "ขอให้ชื่อของพวกเธอได้รับการจดจำตลอดไป"
 cstorms.2355.name: "เจ็บปวด โกรธเกรี้ยว โศกเศร้า กลัว"
 cstorms.2355.desc: "พายุดิ้นรนและเดือดพล่านด้วยความโกรธเกรี้ยวอันไร้น้ำยา ทว่ามันไม่สามารถทำอันตรายใดๆ ต่อเราหรือ §lตัวแปลงเสียง§! ได้เลย\n\nพวกเราสั่งให้เสียงที่ติดอยู่ภายในหาทางพาพวกเราผ่านกระแสน้ำวน และเข้าครอบครองความสำเร็จที่ยิ่งใหญ่ที่สุดของสหพันธ์มาเป็นของพวกเราเอง\n\nอย่างไรก็ตาม โลกบ้านเกิดของแอดิอะคาเรียยังคงไม่สามารถเข้าถึงได้ เส้นทางใดๆ ที่จะมุ่งหน้าสู่ $building_adakkaria_patriotic_institute$ บัดนี้ได้ปิดตัวลงตลอดกาล แต่ถ้อยคำจากการคำรามของพายยังคงดังก้องอยู่ในใจของเรา\n\nความเจ็บปวด ความโกรธเกรี้ยว ความโศกเศร้า และความกลัว\nกาแล็กซีนี้จะได้เรียนรู้มันเช่นกัน"
 cstorms.2355.a: "การเสียสละเป็นเรื่องที่หลีกเลี่ยงไม่ได้"

