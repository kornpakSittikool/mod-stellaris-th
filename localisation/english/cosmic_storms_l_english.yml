# Storm Tech Insight events
 cstorms.505.name: "เผชิญหน้ากับพายุร้าย"
 cstorms.505.desc: "ภายหลังจากความเสียหายย่อยยับที่เกิดจาก §H[this.GetAffectedStormType]§! เราได้รับข้อมูลเชิงลึกอันเป็นเอกลักษณ์เกี่ยวกับปรากฏการณ์ในกาแล็กซีเหล่านี้\n\nด้วยการศึกษาอุตุนิยมวิทยาอวกาศ เราจะสามารถปกป้องตนเองได้ดียิ่งขึ้นในอนาคต สาขาวิจัยใหม่นี้อาจนำมาซึ่งแนวทางในการควบคุมพายุเหล่านี้ได้ในที่สุด"

# Storm Buildings
 building_storm_attraction_center: "ศูนย์ดึงดูดพายุ"
 building_storm_attraction_center_desc: "ด้วยการดัดแปลงควบคุมแรงโน้มถ่วงอย่างระมัดระวัง สถานที่เหล่านี้จะช่วยดึงดูดพายุคอสมิกที่อยู่ใกล้เคียงให้เข้ามาหา"

 building_advanced_storm_attraction_center: "ศูนย์การดึงดูดพายุขั้นสูง"
 building_advanced_storm_attraction_center_desc: "ข้อมูลเชิงลึกขั้นสูงเกี่ยวกับพลังงานมืดช่วยให้เราสามารถเพิ่มพลังของ $building_storm_attraction_center$แต่ละแห่งและดึงพายุคอสมิกเข้ามาได้อย่างมีประสิทธิภาพมากยิ่งขึ้น"

 building_storm_repellent_center: "ศูนย์ผลักดันพายุ"
 building_storm_repellent_center_desc: "ยิ่งพายุอยู่ห่างไกลออกไป ประชากรของเราก็ยิ่งปลอดภัยและสบายใจขึ้นเท่านั้น เครื่องมือทางอุตุนิยมวิทยาอวกาศที่ซับซ้อนของศูนย์เหล่านี้จะช่วยผลักดันพายุที่กำลังเคลื่อนใกล้เข้ามาให้ออกไป"
 building_advanced_storm_repellent_center: "ศูนย์ผลักดันพายุขั้นสูง"
 building_advanced_storm_repellent_center_desc: "การดัดแปลงควบคุมกาลอวกาศย่อมมีความชอบธรรมตราบใดที่มันช่วยให้โลกของเราพ้นจากพายุคอสมิก ศูนย์แห่งนี้ทำหน้าที่นั้นได้อย่างไร้ที่ติ"

 building_storm_resistant_production: "ศูนย์บรรเทาผลกระทบพายุ"
 building_storm_resistant_production_desc: "ศูนย์ช่วยเหลือแห่งนี้ช่วยประสานงานในท้องถิ่นเพื่อหักล้างผลกระทบของพายุคอสมิกที่มีต่อการผลิตบนดาวเคราะห์ ด้วยการประสานงานและการสื่อสารที่มีประสิทธิภาพ $building_storm_resistant_production$ ช่วยให้การส่งทีมกู้ภัยเป็นไปอย่างรวดเร็ว ตลอดจนปรับปรุงสภาวะการค้าทั่วทั้งดาวเคราะห์"
 building_storm_resistant_production_tt: "ผลกระทบเชิงลบจาก §Y$default_storm$§! ที่มีผลต่อการผลิตบนดาวเคราะห์จะลดลง §G30%§!\n\nในขณะที่มี §Y$default_storm$§! อยู่:$TABBED_NEW_LINE$$mod_planet_miners_minerals_produces_add$: §G+0.5§!$TABBED_NEW_LINE$$mod_planet_farmers_food_produces_add$: §G+0.5§!$TABBED_NEW_LINE$$mod_planet_technician_energy_produces_add$: §G+0.5§!\n\nเปิดให้ใช้งานการตัดสินใจบนดาวเคราะห์: §Y$decision_hunker_down$§!"

 building_advanced_storm_resistant_production: "ศูนย์ลดผลกระทบพายุขั้นสูง"
 building_advanced_storm_resistant_production_desc: "ด้วยการติดตั้งระบบควบคุมสภาพอากาศให้กับ $building_storm_resistant_production$ แต่ละแห่ง ผลกระทบเชิงลบของพายุคอสมิกจะลดลงอย่างมีนัยสำคัญ นอกจากนี้ยังสามารถส่งทีมกู้ภัยได้อย่างมีประสิทธิภาพมากยิ่งขึ้น และการค้าบนดาวเคราะห์ก็แทบไม่ได้รับผลกระทบจากสภาพอากาศในท้องถิ่นเลย"
 building_advanced_storm_resistant_production_tt: "ผลกระทบเชิงลบจาก §Y$default_storm$§! ที่มีผลต่อการผลิตบนดาวเคราะห์จะลดลง §G45%§!\n\nในขณะที่มี §Y$default_storm$§! อยู่:$TABBED_NEW_LINE$$mod_planet_miners_minerals_produces_add$: §G+1§!$TABBED_NEW_LINE$$mod_planet_farmers_food_produces_add$: §G+1§!$TABBED_NEW_LINE$$mod_planet_technician_energy_produces_add$: §G+1§!\n\nเปิดให้ใช้งานการตัดสินใจบนดาวเคราะห์: §Y$decision_hunker_down$§!"

 building_adakkaria_patriotic_institute: "สถาบันรักชาติแห่งการเฉลิมฉลอง"
 building_adakkaria_patriotic_institute_desc: "$building_adakkaria_patriotic_institute$ เป็นขุมทรัพย์ข้อมูลเชิงลึกขั้นสูงเกี่ยวกับสภาวะของผู้มีปัญญาความรู้สึกนึกคิด ณ ที่แห่งนี้ เรามอบอำนาจให้ผู้คนปลูกฝังพายุภายในของตนพร้อมๆ กับการหลีกเลี่ยงเสียงเพลงล่อลวงของความโหดร้ายของสภาคองเกรส"
 building_adakkaria_patriotic_institute_effect_desc: "หากพายุคอสมิกพัดผ่านระบบนี้ มีโอกาส 10% ที่ประชากร £pop£ §Hป๊อป§! จะได้รับคุณลักษณะ $Name_Storm_Fused$"
 building_adakkaria_patriotic_institute_effect_upgrade_desc: "หากพายุคอสมิกพัดผ่านระบบนี้ มีโอกาส 40% ที่ประชากร £pop£ §Hป๊อป§! จะได้รับคุณลักษณะ $Name_Storm_Fused$ นอกจากนี้ ยังมีโอกาส 20% ในทุกๆ 10 ปีที่ประชากร £pop£ §Hป๊อป§! จำนวน §Y100§! คนจะถูกเปลี่ยนสภาพกลายเป็นพายุคอสมิก"

 building_astrometeorology_observation_center: "หอสังเกตการณ์อุตุนิยมวิทยาดาราศาสตร์"
 building_astrometeorology_observation_center_desc: "ด้วยเซ็นเซอร์ที่ละเอียดอ่อน ศูนย์สังเกตการณ์แห่งนี้จึงทำหน้าที่ศึกษาสภาพแวดล้อมที่หลากหลายเพื่อช่วยให้เราเข้าใจจักรวาลธรรมชาติได้ดียิ่งขึ้น"
 concept_building_astrometeorology_observation_center: "$building_astrometeorology_observation_center$"

 building_storm_summoning_theater: "โรงละครอัญเชิญพายุ"
 building_storm_summoning_theater_desc: "ด้วยความรื่นรมย์ของศิลปะและเทคโนโลยี การเต้นระบำหมุนวนอันน่าตื่นตาตื่นใจของ $job_storm_dancer_plural$ ของเราช่วยดึงดูดพายุคอสมิกเข้ามาหา"

 building_storm_holo_theater: "สตอร์มโฮโลฮอลล์"
 building_storm_holo_theater_desc: "$building_storm_holo_theater$ ออกอากาศไปทั่วทั้งดาวเคราะห์และไกลออกไป ช่วยขยายอิทธิพลในการดึงดูดใจของ $job_storm_dancer_plural$ ที่น่าลุ่มหลงของเรา"

 building_storm_grand_theater: "โรงละครสตอร์มแกรนด์"
 building_storm_grand_theater_desc: "ด้วยการผสมผสานจุดสูงสุดของความสำเร็จด้านศิลปะและทางเทคโนโลยี โรงละครขนาดใหญ่เหล่านี้มอบพื้นที่จัดแสดงที่สมบูรณ์แบบสำหรับการระบำขั้นสุดยอด"

 sm_storm_attraction_computer: "แผงดึงดูดพายุ"
 sm_storm_attraction_computer_desc: "ส่วนประกอบนี้ช่วยให้เราสามารถดัดแปลงปรับเปลี่ยนแรงโน้มถ่วงในท้องถิ่นเพื่อดึงดูดพายุมาจากห้วงอวกาศอันลึกซึ้งได้"

 sm_storm_repelling_computer: "แผงผลักดันพายุ"
 sm_storm_repelling_computer_desc: "ระบบเลเซอร์อันทรงพลังนี้สามารถสร้างกลุ่มอนุภาคแม่เหล็กที่มีประจุสูงขึ้นมาได้ เพื่อสร้างแรงผลักดันตามธรรมชาติในการต้านทานพายุคอสมิก"

