 job_noble_researcher: "นักวิทยาศาสตร์ผู้สูงศักดิ์"
 job_noble_researcher_plural: "นักวิทยาศาสตร์ผู้สูงศักดิ์"
 job_noble_researcher_desc: "ทายาทที่เฉลียวฉลาดและสูงศักดิ์ที่สุดจะได้รับการศึกษาทั้งในเรื่องมารยาททางสังคมและระเบียบวิธีทางวิทยาศาสตร์ เพื่ออธิบายตำแหน่งแห่งความเหนือกว่าของพวกเขาได้ดียิ่งขึ้น"

 sacred_noble: "$job_sacred_noble$"
 job_sacred_noble: "ขุนนางศักดิ์สิทธิ์"
 job_sacred_noble_plural: "ขุนนางศักดิ์สิทธิ์"
 job_sacred_noble_desc: "ความเป็นพระเจ้าโดยการสืบทอดคือหนทาง การสืบทอดโดยความเป็นพระเจ้าคือแนวทาง ดังนั้นเราจึงได้รับพรด้วยความเป็นขุนนาง"

 augmentation_merchant: "$job_augmentation_merchant$"
 job_augmentation_merchant: "พ่อค้าสิ่งเพิ่มขยาย"
 job_augmentation_merchant_plural: "พ่อค้าสิ่งเพิ่มขยาย"
 job_augmentation_merchant_desc: "ใครจะสามารถนำทางจักรวรรดิของเราได้ดีไปกว่าผู้ที่เสนอการปรับปรุงตนเองในราคาที่เป็นมิตร พร้อมกับการขยายเวลาการรับประกันให้ด้วย"

 visionary: "$job_visionary$"
 job_visionary: "ผู้มีวิสัยทัศน์ด้านเทคโนโลยี"
 job_visionary_plural: "ผู้มีวิสัยทัศน์ด้านเทคโนโลยี"
 job_visionary_desc: "โดยปราศจากพันธนาการจากแบบแผนเดิมๆ และไม่ถูกเหนี่ยวรั้งด้วยความถ่อมตัว เหล่านักฝันแห่งวันพรุ่งนี้ได้แปรเปลี่ยนการคาดเดาอันอาจหาญให้กลายเป็นความจริงที่สามารถทำตลาดได้ สำหรับผู้มีวิสัยทัศน์ที่แท้จริง ความก้าวหน้าไม่ใช่แค่หลักการ แต่มันคือผลิตภัณฑ์"

 noble_merchant: "$job_noble_merchant$"
 job_noble_merchant: "แพทริเชียน"
 job_noble_merchant_plural: "แพทริเชียน"
 job_noble_merchant_desc: "สิทธิ์ในการปกครองไม่ได้ถูกกำหนดโดยการสืบทอดมรดก แต่กำหนดโดยการวัดคุณค่าของบุคคล และจะมีวิธีใดที่จะวัดคุณค่าของคุณได้ดีไปกว่าผลรวมทั้งหมดของงบแสดงฐานะการเงิน?"

