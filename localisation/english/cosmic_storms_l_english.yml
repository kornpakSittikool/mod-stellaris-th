# Civics
 civic_astrometeorology: "อุตุนิยมวิทยาดาราศาสตร์"
 civic_astrometeorology_desc: "ด้วยความเคารพอย่างลึกซึ้งต่อพลังแห่งธรรมชาติ เผ่าพันธุ์นี้ทำทุกวิถีทางเพื่อเปิดเผยการทำงานภายในของปรากฏการณ์สภาพแวดล้อม เมื่อพวกเขาก้าวออกไปสู่หมู่ดาว พวกเขานำความสนใจเป็นพิเศษในด้านอุตุนิยมวิทยาอวกาศติดตัวไปด้วย หัวใจสำคัญของความทะยานอยากของพวกเขาคือปรากฏการณ์ทางดาราศาสตร์ที่มหัศจรรย์และอาจทำลายล้างได้มากที่สุด นั่นก็คือตัวพายุคอสมิกเอง\n"
 civic_astrometeorology_effect_tooltip: "$t$- $AVAILABLE_BUILDINGS$ £building£ ['building:building_astrometeorology_observation_center']$TABBED_NEW_LINE$- $ADDITIONAL_BUILDINGS_STRING$ £building£ §Y$building_astrometeorology_observation_center$§!"

 civic_astrometeorology_hive: "สร้างแบบจำลองสภาพภูมิอากาศ"
 civic_astrometeorology_hive_desc: "เมื่อกลุ่มจิตร่วมรังเอื้อมมือไปสู่หมู่ดาว จิตสำนึกของพวกเขาก็ลุ่มหลงไปกับภาพปรากฏการณ์ทางอุตุนิยมวิทยาอวกาศ โดรนเหล่านี้ขยายขอบเขตบ้านเกิดของตนเพื่อเป้าหมายอันสูงส่ง: เพื่อศึกษาเอฟเฟกต์ของสภาพแวดล้อมและค้นหาความอัศจรรย์ในแม้กระทั่งตัวพายุคอสมิกเอง"
 civic_astrometeorology_hive_effect_tooltip: "$civic_astrometeorology_effect_tooltip$"

 civic_astrometeorology_machine: "สร้างแบบจำลองสภาพภูมิอากาศ"
 civic_astrometeorology_machine_desc: "ด้วยความเข้าใจว่าพลังแห่งธรรมชาติสามารถส่งผลกระทบอย่างลึกซึ้งต่อจักรวรรดิเครื่องจักรได้อย่างไร กลุ่มจิตร่วมศูนย์นี้จึงพยายามศึกษามันอย่างจริงจัง แบบจำลองของพวกเขารายละเอียดปรากฏการณ์ทางดาราศาสตร์ที่น่าค้นหาทุกอย่างในระดับที่เกือบจะศักดิ์สิทธิ์ หัวใจสำคัญของการมุ่งเน้นคือปรากฏการณ์ทางดาราศาสตร์ที่มหัศจรรย์และอาจทำลายล้างได้มากที่สุด นั่นก็คือตัวพายุคอสมิกเอง"
 civic_astrometeorology_machine_effect_tooltip: "$civic_astrometeorology_effect_tooltip$"

 civic_astrometeorology_megacorp: "การใช้ประโยชน์จากสภาพอากาศ"
 civic_astrometeorology_megacorp_desc: "เอฟเฟกต์สภาพแวดล้อมจะเป็นอะไรได้อีกหากไม่ใช่ทรัพยากรฟรีอีกชิ้นหนึ่งให้ตักตวงผลประโยชน์? เมกะคอร์ปแห่งนี้มีความเชี่ยวชาญพิเศษในการตักตวงความรู้จากปรากฏการณ์ทางอุตุนิยมวิทยาอวกาศให้ได้มากที่สุดเท่าที่จะทำได้ และนำมันไปขายให้แก่ผู้ที่ให้ราคาดีที่สุด"
 civic_astrometeorology_megacorp_effect_tooltip: "$civic_astrometeorology_effect_tooltip$ $TABBED_NEW_LINE$- สิ่งก่อสร้าง £building£ §Y$building_private_research_initiative$§! $megacorp_civic_branch_office_building_effect$"

 civic_storm_callers: "บูชาพายุ"
 civic_storm_callers_desc: "นับตั้งแต่ยุคโบราณกาล สังคมนี้สามารถดึงดูดพายุใหญ่เข้ามาหาผ่านพิธีกรรมของพวกเขา เมื่อเวลาผ่านไป พวกเขาได้รวมนวัตกรรมทางเทคนิคเพื่อเพิ่มประสิทธิภาพการทำงาน ด้วยรุ่งอรุณแห่งยุคอวกาศ บัดนี้พวกเขาพยายามที่จะนำความรู้นี้ก้าวไปสู่ดวงดาว"
 civic_storm_callers_effect_tooltip: "- $AVAILABLE_BUILDINGS$ £building£ ['building:building_storm_summoning_theater']\n- แทนที่ตำแหน่งงาน [entertainer.GetIcon] §H[entertainer.GetName]§! ด้วยตำแหน่งงาน £job_storm_dancer£ §H$job_storm_dancer$§!\n- คุณลักษณะของสายพันธุ์ $SPECIES_TRAITS$ ['trait:trait_storm_touched']"

 civic_storm_callers_megacorp: "นักดึงดูดพายุ"
 civic_storm_callers_megacorp_desc: "สิ่งที่เริ่มต้นจากการออกอากาศพิธีกรรมศักดิ์สิทธิ์แบบธรรมดาๆ บัดนี้ได้เบ่งบานกลายเป็นกลุ่มสื่อขนาดใหญ่ระดับยักษ์ใหญ่ ผู้หยั่งรู้และนักบวชถูกแทนที่ด้วยผู้ให้ความบันเทิงที่มีเสน่ห์ดึงดูด ซึ่งต่างแข่งขันกันเพื่อเรียกร้องความสนใจเพียงเล็กน้อยในขณะที่พวกเขาวิงวอนต่อพายุคอสมิกด้วยตนเอง"
 civic_storm_callers_megacorp_effect_tooltip: "$civic_storm_callers_effect_tooltip$\n- สิ่งก่อสร้างองค์กร £building£ §Y$building_amusement_megaplex$§! จะสร้างมูลค่าสำนักงานสาขา (§Yค่า ของ สํานักงาน สาขา§!) เพิ่มเติม และเพิ่มตำแหน่งงานพ่อค้า £job_merchant£ §Yพ่อค้า§! §G+50§! ตำแหน่งในดาวเมืองหลวงของเรา"

