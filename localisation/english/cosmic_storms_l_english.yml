# Magnetized Planetary Core
 pm_magnetized_planetary_core: "แกนดาวเคราะห์ที่มีพลังแม่เหล็กยวดยิ่ง"
 pm_magnetized_planetary_core_desc: "กิจกรรมแม่เหล็กไฟฟ้าในเนื้อโลกชั้นลึกช่วยให้สามารถทำเหมืองแม่เหล็กได้สำเร็จ ในขณะเดียวกันก็รบกวนโครงสร้างพื้นฐานทางเทคโนโลยีด้วย"
 cstorms.1705.name: "$pm_magnetized_planetary_core$"
 cstorms.1705.desc: "มีรายงานผลกระทบหลังเกิดเหตุการณ์ที่ไม่ปกติบน [this.GetName] ภายหลังเหตุการณ์ §Y$magnetic_storm$§! เมื่อเร็ว ๆ นี้ สนามพลังงานที่รุนแรงของพายุส่งผลให้เกิดความผันผวนของแม่เหล็กในแกนหลอมเหลวของดาวเคราะห์เพิ่มขึ้น ส่งผลให้โครงสร้างพื้นฐานทางเทคโนโลยีล้มเหลวเป็นวงกว้าง\n\nอย่างไรก็ตาม สถานการณ์นี้ก็มอบโอกาสในการสกัดทรัพยากรที่ไม่เหมือนใคร ลาวาที่อุดมไปด้วยโลหะซึ่งไหลอยู่ใต้เนื้อโลกบัดนี้มีประจุแม่เหล็กไฟฟ้าและสามารถเก็บเกี่ยวได้โดยใช้แม่เหล็กทำเหมือง"

# Electrified Oceans
 d_electrified_oceans: "มหาสมุทรประจุไฟฟ้า"
 d_electrified_oceans_desc: "กระแสไฟฟ้าไหลเวียนอย่างไม่มีสิ้นสุดทั่วทั้งมหาสมุทรกว้างใหญ่ของดาวเคราะห์"
 GLACIAL_OCEANS: "มหาสมุทรใต้ธารน้ำแข็ง"
 DEFAULT_OCEANS: "มหาสมุทร"
 cstorms.1715.name: "$d_electrified_oceans$"
 cstorms.1715.desc.common: "เกิดปรากฏการณ์ที่ผิดปกติขึ้นบน [this.GetName] ภายหลังเหตุการณ์ §Y$electric_storm$§! เมื่อเร็ว ๆ นี้ [GetOceansState] ของดาวเคราะห์มีกระแสไฟฟ้าไหลเวียนอย่างต่อเนื่องในแหล่งน้ำอันกว้างใหญ่นี้ ก่อให้เกิดอันตรายถึงชีวิตต่อสิ่งมีชีวิตในน้ำ"
 cstorms.1715.desc.aquatic: "นี่เป็นภัยคุกคามร้ายแรงต่อโอกาสในการอยู่รอดของอาณานิคมเรา และต้องได้รับการแก้ไขทันที"
 cstorms.1715.desc.non_aquatic: "ปรากฏการณ์นี้ไม่ได้ทำอันตรายต่อเราโดยตรง แต่เป็นความท้าทายสำหรับการพัฒนาในอนาคตของอาณานิคมเรา"
 cstorms.1715.a: "ปลดปล่อยกระแสไฟฟ้า"
 cstorms.1715.b: "อยู่กับมันต่อไป"

# Ghostly Apparitions
 d_ghostly_canyon: "หุบเขาวิญญาณหลอน"
 d_ghostly_canyon_desc: "ผู้ที่มาเยือนหุบเขาแห่งนี้จะได้พบเห็นร่างหลอนไร้รูปกาย"
 cstorms.1725.name: "การปรากฏตัวของวิญญาณหลอน"
 cstorms.1725.desc.common: "ภายหลังจากเหตุการณ์ §Y$shroud_storm$§! ใน [this.solar_system.GetName] เมื่อเร็ว ๆ นี้ [owner.GetColonistPlural] ได้รายงานการพบเห็นร่างหลอนไร้รูปกายในหุบเขาที่โดดเดี่ยว ร่างสีฟ้าคล้ายวิญญาณเหล่านี้ปรากฏตัวขึ้นชั่วครู่ โดยไม่สามารถหรือไม่เต็มใจที่จะปฏิสัมพันธ์กับ [owner.GetColonistPlural] ของเรา และเดินเตร็ดเตร่อย่างไร้จุดหมายก่อนจะสลายตัวไป"
 cstorms.1725.desc.psionic: "แม้ว่าสิ่งปรากฏเหล่านี้ดูเหมือนจะมีธรรมชาติทางไซโอนิก แต่เราก็ยังไม่สามารถสร้างการสื่อสารทางจิตในระดับใดได้เลยกับหน่วยชีวิตเหล่านี้ อย่างไรก็ตาม เราพบว่าการมีอยู่ของพวกเขาช่วยเสริมพลังความสามารถในการส่งกระแสจิตของเราอย่างเงียบ ๆ"
 cstorms.1725.desc.psionic_robot: "แม้ว่าสิ่งปรากฏเหล่านี้ดูเหมือนจะมีธรรมชาติทางไซโอนิก แต่เราก็ยังไม่สามารถสร้างการสื่อสารทางจิตในระดับใดได้เลยกับหน่วยชีวิตเหล่านี้ อย่างไรก็ตาม การตรวจสอบระบบได้ยืนยันว่าการมีอยู่ของพวกเขาช่วยเสริมพลังความสามารถในการส่งกระแสจิตของเราอย่างเงียบ ๆ"
 cstorms.1725.desc.spiritualist: "ปรากฏการณ์ที่น่าทึ่งนี้เป็นสิ่งเตือนใจที่ดีถึงความมหัศจรรย์ที่จับต้องไม่ได้ในชีวิตของเรา"
 cstorms.1725.desc.gestalt: "จนถึงขณะนี้ยังไม่มีรายงานการทำร้ายร่างกายหรือพฤติกรรมก้าวร้าวใด ๆ"
 cstorms.1725.desc.default: "จนถึงขณะนี้ยังไม่มีรายงานความเสียหายทางกายภาพหรือการทำร้ายร่างกาย อย่างไรก็ดี ปรากฏการณ์แปลกประหลาดนี้กำลังพิสูจน์ให้เห็นว่าเป็นสิ่งที่สร้างความปั่นป่วนและน่ากังวลใจ"
 cstorms.1725.a: "ถมหินดินลงไปในหุบเขา คนตายจะยังคงถูกฝังอยู่"

# Volcanic Inactivity
 cstorms.1735.name: "ภูเขาไฟดับสนิท"
 cstorms.1735.desc: "รังสีที่ตกค้างจาก §Y[this.GetAffectedStormType]§! เมื่อเร็ว ๆ นี้ได้นำไปสู่กิจกรรมทางธรณีวิทยาที่แปรปรวนทั่วทั้ง §H[this.GetName]§!\n\nที่โดดเด่นที่สุดคือ ผลกระทบจากพายุทำให้ภูเขาไฟที่ยังคุกรุ่นอยู่ดับลง โดยตัดมันออกจากจุดร้อนทางธรณีวิทยาและตัดการจ่ายแมกมา\n\nการเปลี่ยนแปลงเหล่านี้ทำให้เรามีโอกาสใหม่ ๆ ในการพัฒนาโลกดวงนี้ต่อไป เนื่องจากแมกมาที่เย็นลงได้เปิดดินแดนใหม่"

# Mountain in the Sky
 d_sky_mountain: "เทือกเขาเวหา"
 d_sky_mountain_desc: "เทือกเขาขนาดยักษ์ลอยคว้างอยู่ในชั้นบรรยากาศชั้นบนของดาวเคราะห์ เผยให้เห็นแหล่งแร่ใหม่"
 unlocks_zone_minerals_physics: "$t$ปลดล็อกความเชี่ยวชาญเฉพาะด้านของเขต: §Y$zone_minerals_physics$§!"
 cstorms.1745.name: "$d_sky_mountain$"
 cstorms.1745.desc: "§Y$gravity_storm$§! ที่รุนแรงได้ทำให้เกิดการเปลี่ยนแปลงภูมิทัศน์ของ §H[this.GetName]§! อย่างน่าอัศจรรย์ ความผันผวนของแรงโน้มถ่วงที่ทรงพลังของพายุได้ตัดเทือกเขาที่ใหญ่ที่สุดของดาวเคราะห์ออกจากแผ่นเปลือกโลกและยกลอยขึ้นในแนวตั้งเหนือพื้นดาว\n\nมันยังคงลอยตัวอยู่ในชั้นบรรยากาศชั้นบน โดยได้รับการพยุงไว้ด้วยผลกระทบแรงโน้มถ่วงที่หลงเหลืออยู่ของพายุ การยกตัวขึ้นอย่างน่าทึ่งนี้ทำให้เห็นปริมาณแร่สำรองที่ก่อนหน้านี้ไม่สามารถเข้าถึงได้ในหินฐานด้านล่าง ตลอดจนช่วยให้ [owner.GetResearchers] มีข้อมูลมากมายสำหรับการวิเคราะห์"

# Melting Glaciers
 cstorms.1755.name: "ธารน้ำแข็งละลาย"
 cstorms.1755.desc.common: "§Y[this.GetAffectedStormType]§! เมื่อเร็ว ๆ นี้ส่งผลกระทบที่คาดไม่ถึงต่อภูมิอากาศของ [this.GetName]"
 cstorms.1755.desc.electric: "ประจุไฟฟ้าในชั้นบรรยากาศที่เพิ่มขึ้นได้ทำให้เกิดการเปลี่ยนแปลงอุณหภูมิอย่างรุนแรงในแถบขั้วโลก $cstorms.1755.desc.common_2$"
 cstorms.1755.desc.particle: "ฤทธิ์กัดกร่อนจากอนุภาคของพายุส่งผลกระทบอย่างรุนแรงต่อแถบขั้วโลก $cstorms.1755.desc.common_2$"
 cstorms.1755.desc.gravity: "การเปลี่ยนแปลงของแรงโน้มถ่วงจากพายุได้ทำลายน้ำแข็งใต้พื้นน้ำหลายชั้น $cstorms.1755.desc.common_2$"
 cstorms.1755.desc.magnetic: "การรบกวนในสนามแม่เหล็กของดาวเคราะห์ทำให้เกิดการเปลี่ยนแปลงทางธรณีวิทยาที่รุนแรง $cstorms.1755.desc.common_2$"
 cstorms.1755.desc.solar: "ความร้อนที่รุนแรงจากพายุทำให้อุณหภูมิทั่วทั้งดาวเคราะห์สูงขึ้นตลอดช่วงเวลาที่มันเกิดขึ้น $cstorms.1755.desc.common_2$"
 cstorms.1755.desc.celestial: "ฝุ่นอวกาศที่มีความร้อนสูงและมีความเข้มข้นสูงส่งผลกระทบอย่างรุนแรงต่อแถบขั้วโลก $cstorms.1755.desc.common_2$"
 cstorms.1755.desc.common_2: "ส่งผลให้ทุนดราที่เยือกแข็งซึ่งก่อนหน้านี้ไม่สามารถเข้าถึงได้เกิดการละลาย\n\nบัดนี้เราสามารถพัฒนาที่ดินที่เพิ่งค้นพบใหม่นี้ได้แล้ว"

# Dusty Drink
 cstorms.1761.name: "การอุดตันของคอสมิก"
 cstorms.1761.desc.common: "[Owner.GetEngineerPlural] ของเราบน §H[this.GetName]§! รายงานว่า §Y$celestial_storm$§! กำลังส่งผลกระทบเชิงลบต่อระบบกรองน้ำ เมื่ออนุภาคต่าง ๆ ตกตะกอนในน้ำใต้ดินของดาวเคราะห์ น้ำโคลนแร่ที่เกิดขึ้นจึงเข้าไปอุดตันจุดโครงสร้างพื้นฐานที่สำคัญ"
 cstorms.1761.desc.default: "ความล้มเหลวของระบบไฮโดรโปนิกส์ส่งผลกระทบอย่างหนักต่อภาคการเกษตรของดาวเคราะห์ รวมทั้งทำให้เกิดการขาดแคลนน้ำดื่มที่ปลอดภัย\n\nปัญหานี้อาจมีผลกระทบระยะยาวต่อแหล่งน้ำของเราหากไม่ได้รับการแก้ไข โชคดีที่ [owner.GetEngineerPlural] ของเรามั่นใจว่าพวกเขาสามารถสร้างระบบกรองที่ทนทานยิ่งขึ้นเพื่อแก้ไขปัญหานี้ได้"
 cstorms.1761.desc.lithoid: "ในขณะที่ทำการตรวจสอบการอุดตันของระบบไฮโดรโปนิกส์ [Owner.GetColonistPlural] ของเราได้ค้นพบว่าเจ้าน้ำโคลนแร่นั้น อร่อยและมีคุณค่าทางโภชนาการสำหรับผู้ที่มีสรีรวิทยาแบบลิทอยด์อย่างน่าทึ่ง หลังจากทำการปรับเปลี่ยนระบบกรองของอาณานิคมเล็กน้อย พวกเขาก็ได้ผลิตเครื่องดื่มตามฤดูกาลชนิดใหม่จำนวนมากเพื่อรอให้พายุพ้นผ่านไป"
 cstorms.1761.a: "ดำเนินการต่อ"
 cstorms.1761.b: "ของว่างที่คาดไม่ถึง"

 pm_satured_filtration: "ระบบกรองอิ่มตัว"
 pm_satured_filtration_desc: "แหล่งน้ำในพื้นที่อิ่มตัวไปด้วยฝุ่นคอสมิกจากห้วงอวกาศ ส่งผลให้เกิดการอุดตันในเครือข่ายไฮโดรโปนิกส์"
 filtration_insight_modifier: "ความรู้แจ้งในการกรองไฮโดรโปนิกส์"

 CLEAR_DUSTY_PIPES_PROJECT: "ทำความสะอาดท่อส่งน้ำ"
 CLEAR_DUSTY_PIPES_PROJECT_DESC: "ผลกระทบจาก §Y$celestial_storm$§! บน §H[this.GetName]§! ทำให้ระบบกรองน้ำอุดตันด้วยตะกอนแร่ที่ไม่ละลายน้ำ เราต้องปรับปรุงและออกแบบระบบกรองที่ทนทานยิ่งขึ้นเพื่อแก้ไขปัญหานี้"

 cstorms.1765.name: "ขจัดสิ่งอุดตันในตัวกรองแล้ว"
 cstorms.1765.desc: "[Owner.GetEngineerPlural] ได้จัดการกับสิ่งอุดตันในระบบไฮโดรโปนิกส์และการขาดแคลนน้ำบน §H[this.GetName]§! เรียบร้อยแล้ว เครือข่ายระบบประปาของอาณานิคมได้รับการปรับปรุงและสามารถกรองสิ่งเจือปนที่ซับซ้อน เช่น สิ่งเจือปนที่มาจาก $celestial_storm$ ได้แล้ว\n\nการปรับปรุงโครงสร้างพื้นฐานด้านน้ำเหล่านี้สามารถนำไปประยุกต์ใช้เพื่อปรับปรุงการชลประทานทั่วทั้ง [Owner.GetName]"

# Flightless Fauna
 cstorms.1771.name: "สัตว์ป่าที่บินไม่ได้"
 cstorms.1771.desc.common: "[Owner.GetScientistPlural] บน [this.GetName] ได้สังเกตพบผลกระทบรุนแรงจาก §Y$gravity_storm$§! ต่อสัตว์ปีกในท้องถิ่น\n\nความผันผวนของแรงโน้มถ่วงที่เกิดจากพายุนำไปสู่สภาพบรรยากาศที่แปรปรวน ส่งผลให้สัตว์ปีกหลายชนิดไม่สามารถบินได้"
 cstorms.1771.desc.default: "สิ่งนี้ไม่เพียงป้องกันไม่ให้พวกมันล่าเหยื่อได้ตามปกติ แต่ยังทำให้พวกมันเสี่ยงต่อการถูกล่าโดยนักล่าด้วย\n\nมีความกังวลว่าสายพันธุ์ที่ได้รับผลกระทบอาจถูกล่าจนสูญพันธุ์หากเราไม่เข้าแทรกแซง"
 cstorms.1771.desc.swarm: "งานเลี้ยงที่แท้จริงรอเราอยู่"
 cstorms.1771.a: "เหยื่อที่ง่ายดาย"
 cstorms.1771.b: "ปล่อยให้เป็นไปตามธรรมชาติ"
 cstorms.1771.c: "จัดส่งสิ่งมีชีวิตเหล่านี้ไปยังเขตอนุรักษ์"
 cstorms.1771.evopred: "บันทึกดีเอ็นเอของพวกมันไว้ก่อนที่ทุกอย่างจะสายเกินไป"

 d_avian_reserve: "เขตอนุรักษ์สัตว์ปีก"
 d_avian_reserve_desc: "เขตอนุรักษ์ธรรมชาติที่แยกตัวออกไปซึ่งสร้างขึ้นเพื่อรองรับสัตว์ปีกสายพันธุ์ที่เปราะบาง"
 cstorms.1776.name: "เหินเวหาอีกครั้ง"
 cstorms.1776.desc: "ภายหลังจากที่ §Y$gravity_storm$§! ได้พ้นผ่านไป เหล่าสัตว์ปีกที่เคยบินไม่ได้ชั่วคราวบน [this.GetName] ก็ได้ขึ้นสู่ท้องฟ้าอีกครั้งหลังจากหลบภัยอยู่ในเขตอนุรักษ์สัตว์ปีกของเรา\n\nในขณะที่สัตว์หลายชนิดได้กลับคืนสู่ถิ่นที่อยู่เดิมของพวกมันแล้ว แต่จำนวนมากยังคงอยู่ในเขตอนุรักษ์ ดูเหมือนจะเพลิดเพลินกับความสะดวกสบายและการปกป้องที่ได้รับ\n\nนี่เป็นโอกาสพิเศษที่จะได้ศึกษาสัตว์ป่าประเภทปีกของดาวเคราะห์อย่างใกล้ชิด"
 cstorms.1776.a: "ข่าวดีเยี่ยม"

