 cs_adAkkaria_chain_title: "ผู้บุกเบิก - แอดอัคคาเรีย"
 cs_adAkkaria_chain_desc: "เพื่อทำความเข้าใจชะตากรรมของอารยธรรมที่แปลกประหลาดและเก่าแก่นี้ เราต้องติดตามร่องรอยของเบาะแส ไม่ว่ามันจะนำพาไปที่ใดก็ตาม"

# Anomaly: Ancient Signals
 STORMS_PREC_ONE: "สัญญาณโบราณ"
 STORMS_PREC_ONE_DESC: "เราตรวจพบสัญญาณอิเล็กทรอนิกส์ประหลาดหลายชุดภายในระบบดาวนี้ ข้อมูลเบื้องต้นชี้ว่าการส่งสัญญาณเหล่านี้น่าจะมีอายุนับพันปี ลูกเรือของเรากระตือรือร้นที่จะค้นหาต้นกำเนิดของมัน"
 cstorms.205.name: "สัญญาณแห่งความเมตตา"
 cstorms.205.desc: "สัญญาณประหลาดที่เราตรวจพบในระบบดาวนี้มาจากสถานีสื่อสารโบราณที่โคจรรอบ [FromFrom.GetName] ข้อความต่าง ๆ ดูเหมือนจะเป็นการออกอากาศเก่าจากอารยธรรมที่ถูกลืม\n\nส่งผลให้ [Root.Owner.GetScientistPlural] ของเรามีความยากลำบากในการถอดรหัสข้อความเหล่านั้น พวกเขาแนะนำให้ขึ้นไปบนสถานีเพื่อเชื่อมต่อกับระบบหลักส่งสัญญาณโดยตรง"

# Digsite: The Propaganda Station
 site_adakkaria_the_propaganda_station: "สถานีโฆษณาชวนเชื่อ"
 site_adakkaria_the_propaganda_station_intro: "สถานีสื่อสารโบราณแห่งนี้ยังคงทำงานอยู่ การขึ้นไปบนสถานที่และเชื่อมต่อกับระบบของมันโดยตรงอาจทำให้เราสามารถถอดรหัสการออกอากาศครั้งก่อน ๆ ได้"
 cstorms.215.name: "ส่วนเชื่อมต่อสู่อดีต"
 cstorms.215.desc: "การขึ้นไปบนสถานีสร้างปัญหาให้ไม่มากนัก ทว่าการนำทางภายในโครงสร้างเป็นเรื่องยาก แม้ว่าจะได้รับการเก็บรักษาไว้เป็นอย่างดีอย่างน่าประหลาดใจ ส่วนหนึ่งเป็นเพราะโครงสร้างเกราะป้องกันภายนอกที่ก้าวหน้า แต่ทางเดินที่แคบและเพดานที่ต่ำก็กลายเป็นความท้าทายสำหรับทีมของเรา\n\nภายในป้อมปราการแห่งนี้ให้เบาะแสเกี่ยวกับลักษณะของเจ้าของเดิมเพียงเล็กน้อย นอกเหนือจากแผ่นกระดาษกึ่งพลาสติกขนาดใหญ่ที่ตกแต่งอยู่บนผนัง โปสเตอร์เหล่านี้แสดงภาพวาดของสิ่งมีชีวิตออร์แกนิกที่ไม่รู้จัก ลักษณะของพวกเขามีความโดดเด่น ยืนตระหง่านและเด็ดเดี่ยวต่อเบื้องหลังของการพิชิตและการเฉลิมฉลอง ภาพเหล่านี้ได้รับการออกแบบอย่างชัดเจนเพื่อปลูกฝังความรู้สึกภาคภูมิใจและความผูกพัน\n\nส่วนระบบหลักส่งสัญญาณเองก็เป็นปริศนาไม่แพ้กัน ในตอนแรก [Root.Owner.GetEngineerPlural] ของเราเชื่อว่ามันเป็นระบบอนาล็อก คล้ายกับที่เราเคยเห็นใน [Root.Owner.GetPreFTLLowerPlural] อย่างไรก็ตาม ภายใต้ปุ่มและแป้นหมุนนั้นมีวงจรอิเล็กทรอนิกส์ที่จัดเรียงตัวกันอย่างซับซ้อน ซึ่งทำจากโลหะผสมที่เรายังไม่รู้จัก [Root.Owner.GetScientistPlural] ของเราสงสัยว่าอารยธรรมนี้อาจข้ามขั้นตอนการพัฒนาหลายขั้นในวิทยาการคอมพิวเตอร์ ซึ่งอธิบายถึงเทคโนโลยีที่ผสมผสานกันอย่างขัดกับยุคสมัย\n\nอย่างไรก็ดี หลังจากลองผิดลองถูกหลายครั้ง [Root.Owner.GetLinguists] ของเราก็สามารถถอดรหัสข้อความบันทึกการออกอากาศครั้งแรกจากทั้งหมดได้สำเร็จ"
 cstorms.220.name: "จากผู้นำผู้ทรงเกียรติ"
 cstorms.220.desc: "หลังจากเชื่อมต่อกับระบบหลักส่งสัญญาณโบราณสำเร็จ [Root.Owner.GetLinguists] ของเราได้จัดทำข้อความถอดเสียงของการออกอากาศครั้งแรกมาให้ ดังนี้:\n\n§Lประชาชนแห่งสมัชชาแอดอัคคาเรีย!\n\nข้าพเจ้าพูดกับทุกท่านไม่ใช่ในฐานะผู้นำ แต่ในฐานะเพื่อนและที่ปรึกษา\n\nเป็นเรื่องที่ไม่อาจมองข้ามได้ว่าวันเวลาเริ่มมืดมิดลงและท้องฟ้ากำลังเปลี่ยนเป็นขมขื่น แม้แต่ดวงดาวทั้งหลายเองก็เป็นปฏิปักษ์\n\nแต่ข้าพเจ้ามีความเชื่อมั่น เช่นเดียวกับที่ผู้มีพระคุณมีความเชื่อมั่นในตัวเรา ข้าพเจ้าเชื่อมั่นในเป้าหมายของเรา ข้าพเจ้าเชื่อมั่นในตัวพวกท่าน\n\nเป็นเวลาหลายศตวรรษที่ผู้คนของเราปกป้องดวงดาวจากอนารยชนกลุ่มร้ายที่เลวร้ายที่สุด เป็นโชคชะตาของเราที่จะต้องช่วยกาแล็กซีจากกองกำลังที่มุ่งร้ายเหล่านี้ และโชคชะตาจะไม่พังทลายลงด้วยอุปสรรคเพียงครั้งเดียว เราจะไม่ยอมให้กองทัพปีศาจที่สมคบคิดกันเพื่อทำลายเรามาทำให้เรามัวหมอง\n\nข้าพเจ้าเชื่อในภารกิจของเรา สมัชชาความเมตตาแห่งแอดอัคคาเรีย(อนุสรณ์เมืองเบเนโวเลนซ์)นำความจริงและอิสรภาพมาสู่ทุกอารยธรรม ภารกิจของเราคือสิ่งที่ปกป้องเราไว้ ชะตากรรมของเราคือสิ่งที่ทำให้เรามีชัยและเจริญรุ่งเรือง!\n\nดังนั้น เพื่อนร่วมทางของข้าพเจ้า ขออย่าให้เรายอมจำนนต่อความคลางแคลงใจ จงไว้อาลัยให้กับความสูญเสียของเรา ใช่แล้ว จงให้เกียรติผู้ล่วงลับ และจากนั้นให้เรามารวมตัวกันอย่างที่เราเคยทำเสมอมา เพื่อผู้มีพระคุณของเรา เพื่อสมัชชาแอดอัคคาเรีย เพื่อความเมตตา!§!"
 cstorms.225.name: "คำขาดของยูนิคอม"
 cstorms.225.desc: "การจัดระเบียบข้อมูลที่ค้นพบในสถานีโบราณกลายเป็นงานที่ยากลำบากสำหรับ [Root.Owner.GetLinguists] ของเรา อย่างไรก็ตาม การออกอากาศหลายครั้งได้รับการทำเครื่องหมายว่าเปิดเผยข้อมูลสำคัญ โดยบางรายการช่วยให้เห็นการสนทนาที่ถูกบันทึกไว้:\n\n§Sอิลแซปเซิน ทูร์ตีผู้ประกาศข่าว§!\n§L - - และเพื่อหารือเกี่ยวกับกรณีการแทรกแซงล่าสุดจากประชาคมจักรวาล(ชุมชนยูนิเวอร์)ต่อไปนี้คือท่านศาสตราจารย์ผู้ทรงเกียรติอัก มา นิ ซาน โดและด็อกเตอร์แห่งการรับรู้ทั้งมวลเอมีก อินนาท่านศาสตราจารย์ผู้ทรงเกียรติ ท่านมีความคิดเห็นอย่างไรเกี่ยวกับข้อเรียกร้องของยูนิคอมยูนิคอม?§!\n\n§Sอักมานี ซานโดศาสตราจารย์ผู้ทรงเกียรติ§!\n§Lข้อเรียกร้องช่างน่ารังเกียจสิ้นดี! ประชาคมจักรวาลยังคงปฏิบัติต่อโลกที่ด้อยอารยธรรมด้วยความเหยียดหยามอย่างที่สุด แต่ข้าพเจ้าขอถามเหล่าผู้ปกป้องศีลธรรมแห่งกาแล็กซีที่ตั้งตัวเองเหล่านี้หน่อยเถอะ: การเก็บงำเทคโนโลยีช่วยชีวิตไว้ไม่ผิดจริยธรรมยิ่งกว่าหรือ? การปกปิดอุดมการณ์ที่เป็นรากฐานของสังคมอันมีชัยของเราล่ะ? เราจะกลายเป็นคนเลวทรามเพียงใดหากเราปล่อยให้โลกใบหนึ่งมุ่งตรงสู่จุดจบของตนเองโดยไม่ยอมยื่นมือเข้าไปช่วยเหลือ?§!\n\n§Sอิลแซปเซิน ทูร์ตีผู้ประกาศข่าว§!\n§Lเป็นประเด็นที่ยอดเยี่ยมมาก! ท่านด็อกเตอร์แห่งการรับรู้ทั้งมวล ข้าพเจ้าคิดว่าท่านคงจะโกรธเคืองไม่แพ้กันที่ยูนิคอมเข้ามาแทรกแซงโชคชะตาของเรา§!\n\n§Sเอมิกุ อินา -ด็อกเตอร์แห่งการรับรู้ทั้งมวล§!\n§Lสิ่งที่ข้าพเจ้ากำลังจะพูดต่อไปนี้อาจทำให้ทุกท่านตกใจ แม้ว่าองค์กรจะมีความดื้อรั้น แต่ข้าพเจ้าคิดว่าเราควรจะพยายามศึกษาข้อกังวลของยูนิคอ-§!\n\n§Tดูเหมือนว่าการออกอากาศจะถูกตัดขาด ณ จุดนี้§!"
 cstorms.225.a: "พวกเขาเป็นกลุ่มคนที่ยึดติดกับลัทธิความเชื่อ"
 cstorms.225.a.hive: "เสียงที่มากเกินไปย่อมนำไปสู่ความโกลาหล"
 cstorms.225.a.machine: "ชีวิตเต็มไปด้วยการถกเถียงอย่างลึกซึ้ง"
 cstorms.230.name: "นักบุญและพลังจิต"
 cstorms.230.desc: "มีการทำเครื่องหมายการออกอากาศอีกครั้งหนึ่งว่าน่าสนใจ แม้ว่าจะเป็นงานแนวตลกดราม่าอย่างชัดเจน แต่มันก็ให้บริบทที่เป็นประโยชน์สำหรับการสืบสวนของเรา:

§SakTamian Riwan§!
§Lฉันทราบมาว่าคุณไปพบ enTulla Saman อีกแล้วเมื่อคืนนี้ ฉันคิดว่าคุณละทิ้งพวกเขาไปแล้วเพื่อความรักของเราเสียอีก?§!

§SinElka Utae§!
§Lฉันขอรับรองกับคุณว่า มันเป็นเพียงการไปเยี่ยมเยียนอย่างมีมารยาทเท่านั้น ขอให้รู้ไว้ว่าฉันมั่นคงต่อคุณและไม่มีใครอื่นเลย!§!

§SakTamian Riwan§!
§Lนั่นคือสิ่งที่ปากของคุณพูด แต่ในใจของคุณล่ะ! มันบอกฉันเป็นอย่างอื่น สิ่งที่แตกต่างออกไป§!

§SinElka Utae§!
§Lไม่นะ อย่าบอกนะว่าคุณก็ด้วย!§!

§SakTamian Riwan§!
§Lใช่ ฉันด้วย! ฉันเพิ่งค้นพบพรสวรรค์ด้านพลังจิตของฉันเมื่อคืนนี้เอง! และสิ่งที่ฉันจินตนาการว่าจะเป็นการสำรวจความรู้สึกที่ลึกซึ้งที่สุดของเราด้วยความยินดี กลับกลายเป็นความสิ้นหวัง! ความคิดทรยศที่อยู่ในหัวของคุณ!§!

§SinElka Utae§!
§Lคุณไม่เข้าใจหรอก! จิตใจของฉัน ฉันห้ามมันไม่ได้ ฉันอดไม่ได้ที่จะมองว่าเส้นทางนี้สมเหตุสมผล โอ้ Riwan หากเพียงแต่พรสวรรค์พลังจิตใหม่ของคุณจะช่วยให้คุณอ่านหัวใจของฉันได้แทนที่จะเป็นความคิดของฉัน!§!"
 cstorms.230.a: "ความสามารถด้านพลังจิตงั้นรึ? น่าสนใจดี"
 cstorms.230.b: "เรื่องไร้สาระที่ไม่มีประโยชน์!"
 cstorms.230.b.hive: "รูปแบบความบันเทิงแนวปัจเจกนิยมที่น่าแปลกใจ"
 cstorms.230.b.machine: "พวกสิ่งมีชีวิตอินทรีย์กับดราม่าของพวกเขา"
 dramatic_enthusiasm: "ผู้คลั่งไคล้ดราม่าของเอเลี่ยน"
 melodramatic_much: "ผู้เกลียดชังดราม่าของเอเลี่ยน"
 cstorms.235.name: "การออกอากาศโบราณ"
 cstorms.235.desc: "[Root.Owner.GetLinguists] ของเรายังได้แปลรายการข่าวหลายรายการ พวกเขาเชื่อว่าการออกอากาศนี้มีความสำคัญเป็นพิเศษที่ควรค่าแก่การใส่ใจ:

§Lรายงานที่ส่งมาจากระบบดาว Haliios แสดงให้เห็นภาพที่เลวร้ายลงเรื่อยๆ เจ้าหน้าที่ Solphani ที่ขลาดเขลาได้ลอบโจมตีกองกำลังเบิกเนตร (Enlightenment Forces) ที่กล้าหาญของเรา ณ พิกัด enYpsal! อย่างไรก็ตาม ผู้นำอันสูงส่งของเรากล่าวว่ากระบวนการนี้จะไม่ถูกขัดจังหวะ ดังคำพูดที่ว่า: 'ผู้อุปถัมภ์ของเราไม่ยอมแพ้ในตัวเรา และเราก็จะไม่ทิ้งอารยธรรมที่ด้อยพัฒนาใดๆ ไว้เบื้องหลังเช่นกัน'

นอกจากนี้ยังมีข่าวลือเกี่ยวกับความเป็นไปได้ในการร่วมมือกันระหว่างเจ้าหน้าที่ป่าเถื่อนที่ชั่วร้ายและตัวแทนของ UniCom อย่างไรก็ตาม เอกอัครราชทูตของ UniCom ปฏิเสธว่าประชาคมระหว่างดาวไม่ได้ติดต่อสื่อสารกับผู้กดขี่ที่ป่าเถื่อนคนใด และระบุว่านี่เป็นเพียงอีกกรณีหนึ่งของ 'ความหวาดระแวงที่เป็นประโยชน์' ของผู้นำอันสูงส่งของเรา

ทว่าไม่ว่าจะมีหรือไม่มีพันธมิตรที่ทรงพลัง กระบวนการเบิกเนตร Solphani ก็อยู่ในขั้นวิกฤต การจะกู้สถานการณ์นี้กลับคืนมาคงไม่ใช่เรื่องง่าย แต่-§!

§Tโชคร้ายที่ส่วนที่เหลือของการออกอากาศเสียหายเกินกว่าจะถอดรหัสได้ [Root.Owner.GetEngineerPlural] ของเราได้สร้างสำเนาฐานข้อมูลไว้แล้ว เมื่อเวลาผ่านไป เราหวังว่าจะสามารถกู้คืนข้อมูลเพิ่มเติมจากอารยธรรมที่ถูกลืมเลือนไปนานนี้ได้§!"
 cstorms.235.a: "เราจะรอผลการค้นพบของคุณในอนาคต"

# Event: A Site Barren and Bare
 cstorms.245.name: "โบราณสถานที่รกร้างและว่างเปล่า"
 cstorms.245.desc: "การพัดผ่านของพายุคอสมิกในระบบดาว [planet_windswept_fates.System.GetName] ได้เปิดเผยแหล่งโบราณคดีที่อาจมีความสำคัญบน [planet_windswept_fates.GetName]

การสแกนเบื้องต้นของ §Y[planet_windswept_fates.GetName]§! บ่งชี้ถึงชั้นบรรยากาศที่แปรปรวนอย่างรุนแรง ซึ่งมีพายุระดับดาวเคราะห์ขนาดใหญ่ครอบคลุมภูมิประเทศ [Root.Owner.GetScientistPlural] ของเราไม่เคยคาดคิดมาก่อนว่าจะพบร่องรอยของอารยธรรมบนโลกเช่นนี้ และเชื่อว่าเราสามารถเรียนรู้สิ่งต่างๆ ได้มากมายจากการสืบสวน"
 cstorms.245.a: "เตรียมทีมลงจอด!"

# Digsite: Windswept Fates
 site_adakarria_windswept_fates: "โชคชะตาที่ถูกพัดพา"
 site_adakarria_windswept_fates_intro: "แม้ว่าพายุคอสมิกจะสร้างความเสียหายได้มากเพียงใด แต่พายุลูกนี้ก็ได้เปิดเผยหลักฐานของอารยธรรมต่างดาว แม้ว่าชั้นบรรยากาศของดาวเคราะห์ดวงนี้จะไม่เสถียรอย่างยิ่ง แต่ทีมลงจอดอาจช่วยเปิดเผยชะตากรรมอันเลวร้ายใดๆ ก็ตามที่เกิดขึ้นกับวัฒนธรรมโบราณนี้"
 cstorms.2105.name: "สภาวะอันเกรี้ยวกราด"
 cstorms.2105.desc: "ทีมงานของเราเดินทางมาถึง [From.Planet.GetName] อย่างปลอดภัย และเริ่มทำการสำรวจสภาพแวดล้อมใหม่ในทันที

จากลักษณะที่เห็น พายุคอสมิกที่รุนแรงเมื่อเร็วๆ นี้ซึ่งพัดกระหน่ำระบบนี้ ยังได้ช่วยปัดเป่าชั้นฝุ่นและดินออกไปจนเผยให้เห็นร่องรอยของอารยธรรมโบราณ

ในขณะที่นักวิทยาศาสตร์ของเราทำการขุดค้นหลักฐานทางโบราณคดีเหล่านี้ต่อไป พวกเขาต้องประหลาดใจเมื่อพบว่าชั้นทรายที่ปกคลุมซากโบราณสถานนี้มีองค์ประกอบที่แตกต่างจากดินโดยรอบอย่างสิ้นเชิง ผลการสแกนดาวเคราะห์ระบุว่าตะกอนทรายเหล่านี้มาจากทะเลทรายที่อยู่ห่างออกไปหลายร้อยไมล์ และสามารถมาลงเอยที่นี่ได้ด้วยแรงพายุที่มหาศาลเท่านั้น เช่น พายุระดับดาวเคราะห์ที่แปรปรวนอย่างรุนแรงสุดขีด"
 cstorms.2105.a: "ดำเนินการต่อ"
 cstorms.2110.name: "สิ่งที่สูญหายไป"
 cstorms.2110.desc: "แม้จะมีสภาพอากาศที่แปลกประหลาดคอยรบกวนดาวเคราะห์ดวงนี้ แต่ [Root.Owner.GetScientistPlural] ของเราก็มีความก้าวหน้าอย่างมาก ทว่าในแต่ละวันที่ผ่านไป การค้นพบของพวกเขากลับยิ่งน่าพิศวงและน่าสะพรึงกลัวมากขึ้นเรื่อยๆ

มันเริ่มจากซากงานหินและวัสดุอินทรีย์ที่กลายเป็นถ่าน จากนั้นก็ตามด้วยเศษผ้าที่ขาดวิ่น เครื่องหนัง เสื้อกั๊กเคลือบโพลิเมอร์ และในที่สุดก็พบร่างของอดีตผู้อยู่อาศัยของดาวเคราะห์ดวงนี้

แหวกดินพบร่างแล้วร่างเล่า อวัยวะที่แห้งกรังของพวกเขาเต็มไปด้วยทราย และเล็บมือหลุดรุ่ยจากการดิ้นรน ศพแต่ละศพสวมยุทโธปกรณ์ทหารระดับ [Root.Owner.GetPreFTLLowerPlural] ขนาดหนักและติดอาวุธปืนขีปนาวุธ สิ่งที่เราคิดว่าเป็นเมืองร้างแท้จริงแล้วคือหลุมศพขนาดใหญ่

เป็นไปได้ว่าตัวอย่างเหล่านี้อาจมีอายุเก่าแก่หลายยุคหลายสมัย แต่เนื่องจากการถูกปิดกั้นจากรังสีอัลตราไวโอเลตและสารเคมีที่ทำปฏิกิริยาอย่างสมณ์ ทั้งร่างอินทรีย์และอุปกรณ์สวมใส่จึงได้รับการอนุรักษ์ไว้อย่างประณีต ส่วนเรื่องที่ว่าเกิดอะไรขึ้นกับพวกเขาที่นี่นั้นยังคงเป็นปริศนา"
 cstorms.2110.a: "ช่างเป็นการจากไปที่โหดร้ายเหลือเกิน"
 cstorms.2115.name: "ความรุนแรงจากเบื้องบน"
 cstorms.2115.desc: "การค้นพบบน [From.Planet.GetName] ยังคงสร้างความตื่นตระหนกอย่างต่อเนื่อง [Root.GetLeaderName] เชื่อว่าสถานที่แห่งนี้ไม่น่าจะเป็นสุสาน เนื่องจากเอเลี่ยนเหล่านี้ดูเหมือนจะมีสภาพร่างกายที่สมบูรณ์แข็งแรงดี จนกระทั่งพวกเขาขาดอากาศหายใจเพราะถูกทรายทับถม

ยิ่งไปกว่านั้น เรายังได้ค้นพบป้อมปืนติดตั้งอาวุธจำนวนหนึ่งซึ่งสามารถยิงกระสุนหนักได้ น่าแปลกที่พวกมันไม่ได้เล็งไปที่พื้นผิวโลก แต่กลับมุ่งเป้าไปยังห้วงอวกาศลึกแทน

ศัตรูใดก็ตามที่คนเหล่านี้เผชิญหน้าอยู่ น่าจะมาจากหมู่ดาว"
 cstorms.2120.name: "วาตภัยชั่วนิรันดร์"
 cstorms.2120.desc: "ทฤษฎีของเราเกี่ยวกับหลุมศพหมู่ที่แปลกประหลาดที่พบบน [From.Planet.GetName] ไม่ได้นำไปสู่ข้อสรุปที่เป็นประโยชน์ใดๆ เบาะแสเดียวที่เหลืออยู่เกี่ยวข้องกับแหล่งที่มาของทรายที่กลืนกินกองทัพนี้เข้าไปทั้งกองทัพ

หลังจากทำการคำนวณและจำลองสถานการณ์ที่มีความซับซ้อนอย่างยิ่งหลายครั้ง เราพบว่าพายุลูกเดียวกับที่นำทรายมาที่นี่ยังคงพัดกระหน่ำอยู่ในส่วนอื่นของดาวเคราะห์ กองกำลังสำรวจขนาดเล็กจึงถูกส่งออกไปสืบสวน

พายุหมุนอันรุนแรงได้ต้อนรับพวกเขา ลมที่เกรี้ยวกราดได้กัดเซาะจนเกิดเป็นแอ่งลึกในพื้นดิน หากมีคำตอบใดๆ ที่จะพบได้ที่นี่ มันจะต้องอยู่ในเหวลึกนี้อย่างแน่นอน ตรงจุดที่เป็นใจกลางพายุพอดี"
 cstorms.2120.a: "เตรียมมาตรการป้องกันทุกอย่างที่จำเป็น!"
 cstorms.2125.name: "ร่างนั้น"
 cstorms.2125.desc: "การเดินทางไปยังพื้นที่นั้นทำได้ยากลำบาก และต้องใช้ทักษะและความระมัดระวังสูงสุด อย่างไรก็ตาม ที่ใจกลางปล่องภูเขาไฟและท่ามกลางพายุที่โหมกระหน่ำ เราได้ค้นพบโครงกระดูกที่ผิดปกติอย่างมาก ซากศพนี้มีอายุเก่าแก่พอๆ กับซากในหลุมศพหมู่ ทว่าทั้งฟีโนไทป์และจีโนไทป์ของร่างนี้แตกต่างอย่างสิ้นเชิงกับศพที่เราพบที่นั่น

เครื่องแบบของโครงกระดูกนั้นได้รับการอนุรักษ์ไว้เป็นอย่างดีจนน่าแปลกใจ และมันก็แสดงให้เห็นความแตกต่างอย่างชัดเจนในการออกแบบเช่นกัน นอกจากนี้ยังมีสัญญาณว่าอวัยวะบางส่วนถูกจงใจตัดออก...

แต่ที่น่าแปลกที่สุดคือค่าที่อ่านได้จากเซ็นเซอร์ของเรา: เราตรวจพบความผันผวนของพลังงานรอบๆ ร่างกายและจากภายใน สัญญาณเหล่านี้มีความคล้ายคลึงกันอย่างน่าประหลาดกับสัญญาณภายในพายุยักษ์ลูกนี้ รวมถึงพายุคอสมิกที่เปิดเผยหลุมศพหมู่ในตอนแรก

ทฤษฎีหนึ่งเริ่มก่อตัวขึ้น: บุคคลนี้มีความเชื่อมโยงกับพายุที่เราเคยพบมาหรือไม่? พวกเขาอาจเป็นผู้รับผิดชอบต่อการฝังศพของกองทัพนั้นด้วยหรือเปล่า? มันรู้สึกแปลกประหลาดที่จะคิดเช่นนั้น แต่ข้อเท็จจริงกำลังนำทางเราไปในทิศทางนี้"
 cstorms.2130.name: "และกลับกลายเป็นเถ้าธุลีอีกครา"
 cstorms.2130.desc: "การเทียบโยงสัญลักษณ์บนเครื่องแบบกับฐานข้อมูลของเราได้ผลลัพธ์ที่น่าพิศวง: ร่างนี้เป็นของพลเมืองของสมาสัญญา adAkkaria (adAkkaria Convention)! อารยธรรมเดียวกันกับสถานีออกอากาศที่เราเพิ่งสำรวจไปเมื่อไม่นานมานี้ และที่น่าประหลาดใจยิ่งกว่านั้นคือ เครื่องแบบ อายุของร่างศพ และข้อมูลจากการออกอากาศได้ปะติดปะต่อภาพได้อย่างสอดคล้องกันอย่างยิ่ง ตอนนี้เราเชื่อว่านี่คือดาวโลกที่ถูกพูดถึงในการออกอากาศเหล่านั้น

ด้วยความรู้ทางภาษาศาสตร์จากสถานีชวนเชื่อในมือ [Root.GetLeaderName] ได้ถอดรหัสชื่อของเหยื่อรายนี้: §ShaToor Gailon§!

เพียงไม่กี่อึดใจต่อมา พายุโดยรอบก็ทวีขนาดและความรุนแรงขึ้นอย่างรวดเร็ว เนื่องจากสภาพอากาศที่คาดเดาไม่ได้อย่างยิ่ง มันจึงเป็นอันตรายเกินกว่าจะอยู่ต่อ และเราถูกบีบให้ต้องละทิ้งโลกนี้ไว้กับพายุหมุน ร่องรอยของสมาสัญญา adAkkaria ได้สูญหายไปอีกครั้งหนึ่งแล้ว"

#Storm to Signal
 cstorms.2140.name: "จากพายุสู่สัญญาณ"
 cstorms.2140.desc: "สัญญาณพลังงานของร่างเอเลี่ยนและพายุหมุนทำลายดาวเคราะห์บน §Y[planet_windswept_fates.GetName]§! ตรงกับพายุคอสมิกที่เป็นตัวเปิดโปงกองทัพที่ถูกฝัง บันทึกการสแกนเผยให้เห็นระบบดาวที่เคยได้รับการสำรวจมาก่อนหน้านี้ซึ่งมีความผันผวนที่สอดคล้องกัน สิ่งเหล่านี้เหมือนกับการออกอากาศของสมาสัญญา adAkkaria อย่างไม่มีผิดเพี้ยน!

ควรส่งยานสำรวจไปตรวจสอบ"

# Fleets of the Trice Damned
 site_adakkaria_fleets_of_the_thrice_damned: "กองเรือของผู้ถูกสาปสามครา"
 site_adakkaria_fleets_of_the_thrice_damned_intro: "ความผันผวนของพลังงานที่แปลกประหลาดในบริเวณนี้ได้บดบังสุสานกองเรือรบขนาดใหญ่ สุสานโพลีเมอร์และโลหะแห่งนี้อาจเป็นกุญแจสำคัญในการทำความเข้าใจสมาสัญญาแอดิอะคาเรีย"
 cstorms.2150.name: "เศษซากที่ฉีกขาด"
 cstorms.2150.desc: "ยานพาหนะทุกประเภทต่างถูกฝังอยู่ที่นี่ ตั้งแต่ยานไม้ทรงยาวไปจนถึงเรือโนอาห์คริสตัลแห่งคอสมิกและจิตวิญญาณ หลายลำมีความคล้ายคลึงกับภาพที่พบในระบบส่งสัญญาณและบันทึกของสถานีออกอากาศ adAkkaria

เราสงสัยว่ามีการปะทะกันเกิดขึ้นที่นี่ระหว่างกองเรือของสมาสัญญาและกองเรือของ Unicom ซึ่งเป็นกองกำลังรักษาสันติภาพแห่งกาแล็กซีเมื่อหลายสหัสวรรษก่อน

ทว่า แม้ยานเหล่านี้จะพังเกินกว่าจะซ่อมแซมได้ แต่พวกมันดูไม่ได้ถูกทำให้ติดเกาะด้วยอาวุธทั่วไป หรือจากการทำงานผิดพลาด หรือภัยพิบัติในลักษณะเดียวกัน ทว่าตัวยานและภายในกลับดูเหมือนถูกฉีกทึ้งออก ราวกับว่าถูกโจมตีด้วยเครื่องบดทำลายขนาดมหึมา"
 cstorms.2155.name: "ขีดจำกัดของหน้าที่"
 cstorms.2155.desc: "[Root.Owner.GetEngineerPlural] ของเราได้กู้คืนฐานข้อมูลจากยานในสุสานอย่างระมัดระวัง แม้ว่าส่วนใหญ่จะถูกทำลายไปตามกาลเวลา แต่มีฐานข้อมูล adAkkaria หนึ่งที่รอดชีวิตมาได้:

§L- เราถูกลอบโจมตี ย้ำอีกครั้ง เราถูกลอบโจมตี UniCom เรียกร้องให้เรายุติการยกระดับพวกคนป่าเถื่อน Rokukora มิฉะนั้นจะถูกกำจัด โปรดตอบกลับด้วย หากเราไม่ล่าถอย เราจะถูกทำลาย! อย่างน้อยโปรดส่งกำลังบำรุงมาด้วย!

- ปฏิเสธ การเสียสละของคุณจะได้รับการจารึกไว้§!"
 cstorms.2155.a: "พวกเขาเอาหน้าที่นำชีวิต!"
 cstorms.2160.name: "พบร่างที่หลงเหลือ"
 cstorms.2160.desc: "ในขณะที่ [Root.Owner.GetLinguists] ของเราแปลงอักษรการออกอากาศใหม่ เราก็ได้พบการค้นพบที่น่าตกตะลึงอีกประการหนึ่ง: ร่างที่ถูกแช่แข็งกำลังลอยอยู่ตรงใจกลางสุสาน!

แม้ว่าศพส่วนใหญ่จะเหี่ยวแห้งไปแล้ว แต่เครื่องแต่งกายของเขาก็เป็นของเจ้าหน้าที่สมาสัญญา

น่าประหลาดใจที่มีวงโคจรของเศษซากขนาดเล็กโคจรรอบๆ ร่างกาย ราวกับว่ามันมีแรงดึงดูดบางอย่างต่อวัตถุเหล่านี้ ร่างดังกล่าวได้รับการนำขึ้นยานเพื่อทำการวิเคราะห์เพิ่มเติม"
 cstorms.2165.name: "คนตายพูด"
 cstorms.2165.desc.intro: "การแปลป้ายชื่อของร่างที่ถูกแช่แข็งเผยให้เห็นว่าเขาเป็นสมาชิก adAkkaria นามว่า §SalAtta Landeer§! เช่นเดียวกับศพที่พบบน [planet_windswept_fates.GetName] อวัยวะบางส่วนของเขาถูกตัดออกด้วยการผ่าตัดก่อนเสียชีวิต อย่างไรก็ตาม ในกรณีนี้ ร่างกายยังมีรอยไหม้อย่างรุนแรง โดยเฉพาะบริเวณลำตัวที่แสดงร่องรอยความเสียหายจากความร้อนสูง รวมถึงการฟื้นตัวที่ช้าและเจ็บปวดอย่างแน่นอน

[Root.Owner.GetScientist] ของเราได้ข้อสรุปที่น่าเสียดายว่าบาดแผลเหล่านี้มีความคล้ายคลึงกันอย่างน่าตกใจกับวิธีการรีดข้อมูลของพวก [Root.Owner.GetPreFTLLowerPlural] จากผู้ที่ไม่ยินยอม เขาเป็นทหารผ่านศึก หรือมีบางสิ่งที่ร้ายแรงกว่านั้นเกิดขึ้นกับเขากันแน่?"
 cstorms.2165.desc.def: "$cstorms.2165.desc.intro$

ทันทีที่เราสามารถระบุลักษณะของบาดแผลเหล่านี้ได้ เครื่องมือของยานเราก็เกิดการกระชากของพลังงานอย่างรุนแรงและฉับพลัน และ [Root.GetLeaderName] ก็เริ่มกรีดร้องออกมา

หลังจากนั้นอีกนาน [Leader.GetHeShe] ได้อธิบายถึงประสบการณ์นั้นว่าเป็นความสว่างของแสงที่แผดเผา ตามมาด้วยระลอกคลื่นแห่งความเจ็บปวดอันแสนสาหัส ราวกับมีบางสิ่งกำลังพยายามจะเจาะสมอง [Leader.GetHerHis] ออกมา... จากข้างในสู่ข้างนอก"
 cstorms.2165.desc.psio: "$cstorms.2165.desc.intro$

ทันทีที่เราระบุลักษณะของบาดแผลเหล่านี้ได้ เครื่องมือของยานเราก็เกิดการกระชากของพลังงานอย่างรุนแรงและฉับพลัน และลูกเรือที่มีพลังจิตของเราก็เริ่มกรีดร้องออกมา

หลังจากนั้นอีกนาน พวกเขาได้รายงานถึงห้วงเวลาแห่งความกระจ่างแจ้งอันสูงสุด ตามมาด้วยระลอกคลื่นของความโกรธแค้นที่แผดเผาและหลอมละลายจิตใจ [Root.GetLeaderName] ระบุว่า ลึกลงไปใต้ความโกรธแค้นนั้นมีความประหลาดใจอันน่าสยดสยองและความรู้สึกทรยศอย่างลึกซึ้งถูกฝังอยู่ มีความคิดหนึ่งผุดขึ้นมาเด่นชัดว่า: §Lพวกเขาอัญเชิญฉันแล้ว!§!"
 cstorms.2165.desc.psio_robot: "$cstorms.2165.desc.intro$

ทันทีที่เราระบุลักษณะของบาดแผลเหล่านี้ได้ เครื่องมือของยานเราก็เกิดการกระชากของพลังงานอย่างรุนแรงและฉับพลัน และยูนิตที่ติดตั้งอุปกรณ์ของเราก็เกิดแรงดันไฟพุ่งสูงขึ้นภายใน

หลังจากนั้นอีกนาน พวกเขาได้รายงานถึงห้วงเวลาที่ตัวประมวลผลพลังจิตของพวกเขาจัดประเภทว่าเป็นความโกรธเกรี้ยวขั้นสุด [Root.GetLeaderName] ระบุว่าปฏิกิริยาตอบสนองทางอารมณ์นั้นมาพร้อมกับความคิดเดี่ยวๆ ที่ถูกถอดความไว้ว่า: §Lพวกเขาอัญเชิญฉันแล้ว!§!"
 cstorms.2165.desc.gestalt: "$cstorms.2165.desc.intro$

หลังจากการค้นพบนี้ ฐานข้อมูลของลูกเรือเราก็ถูกทำลายโดยพลังงานที่ไม่สามารถสืบหาที่มาได้ [controller.GetIndividualNamePlural] หลายคนจำได้ว่าเคยเผชิญกับพลังงานกระชากช่วงสั้นๆ ที่ทำให้อ่อนแรงลง ในขณะที่คนอื่นๆ ถูกป้อนด้วยภาพที่ยุ่งเหยิงและไม่ต่อเนื่อง ส่งผลให้เครื่องปรับเสียงของพวกเขาส่งเสียงแหลมสูงดังกว่า 120 เดซิเบล"
 cstorms.2165.a: "-- สัญญาณขาดหาย --"
 cstorms.2170.name: "มรดกของแลนเดอร์"
 cstorms.2170.desc.def: "ทันทีที่เราเชื่อมต่อการสื่อสารกับยานวิทยาศาสตร์ §Y[Root.GetFleetName]§! ได้สำเร็จ เราก็ต้องพบกับเสียงกรีดร้องคร่ำครวญของลูกเรือ หลังจากนั้นอีกนาน เมื่อความสงบกลับคืนมาในระดับหนึ่ง จึงพบว่าร่างเอเลี่ยนที่พวกเขานำขึ้นยานคือตัวการของเสียงคร่ำครวญนั้น

ศพดังกล่าวส่งพลังประหลาดบางอย่างต่อจิตใจของพวกเขา วัตถุขนาดเล็กลอยขึ้นไปในอากาศและเริ่มโคจรรอบร่างกาย ผนังภายในบางส่วนบิดเบี้ยวและฉีกขาดจากแรงกดดัน

§Y[Root.GetLeaderName]§! สามารถตื่นขึ้นมาจากอาการช็อกเกร็งได้ทันเวลาเพื่อทิ้งศพนั้นออกไปจากยาน และเป็นเพราะปฏิกิริยาที่รวดเร็วของ [Leader.GetHerHis] ที่ช่วยให้ยานวิทยาศาสตร์รอดพ้นจากพายุคอสมิกที่ก่อตัวขึ้นอย่างกะทันหัน หาก [Leader.GetHeShe] ทำไม่สำเร็จ สุสานแห่งนี้คงได้ต้อนรับยานลำใหม่เพิ่มอีกลำ

ขณะที่ [Root.GetLeaderName] เล่าถึงประสบการณ์ [Leader.GetHeShe] สังเกตเห็นสิ่งอื่นด้วย: แหล่งที่มาของพลังประหลาดของศพไม่ว่าจะเป็นอะไรก็ตาม มันยังทำให้เกิดรูปแบบเฉพาะบางอย่างขึ้นบนหน้าจอสั่งการของยาน นี่เป็นความพยายามที่จะสื่อสารหรือเปล่า? เสียงเพรียกจากต่างภพงั้นรึ?

สำหรับตอนนี้ เรายังไม่มีคำตอบ"
 cstorms.2170.desc.gestalt: "ภาพที่ปะปนยุ่งเหยิงซึ่งทำลายระบบของ [controller.GetIndividualNamePlural] ทีมสำรวจบางส่วนของเราได้รับการถอดรหัสแล้ว ภาพเหล่านั้นฉายให้เห็นสถานีอวกาศโบราณแห่งหนึ่ง [controller.GetScientistCapital] ต่างตื่นตระหนกกับภาพและเสียงของบุคคลหนึ่งที่กำลังถูกทารุณกรรมอย่างโหดร้ายยิ่งขึ้นเรื่อยๆ ร่างกายของเขาถูกเผา อวัยวะภายในถูกทำให้สุก

[controller.GetIndividualNamePlural] บางยูนิตสามารถหลบหนีจากการโจมตีทางโสตทัศน์นี้ได้ พวกเขาระบุว่าวัตถุขนาดเล็กหลายชิ้นเริ่มลอยรอบตัวร่างในระยะใกล้ ซากอินทรีย์นั้นสร้างสนามโน้มถ่วงของตัวเองขึ้นมาด้วยวิธีบางอย่าง

พลังงานลึกลับนี้แข็งแกร่งขึ้นเรื่อยๆ จนกระทั่งผนังภายในบางส่วนบิดเบี้ยวและฉีกขาดจากแรงกดดัน ในจังหวะนั้นเองระบบความปลอดภัยของเราก็กลับมาทำงานอีกครั้ง และร่างดังกล่าวก็ถูกขับออกสู่อวกาศ

หลังจากนั้นไม่นาน พายุคอสมิกก็ปะทุขึ้นในระบบดาว ยานของเราแทบจะหนีออกมาได้อย่างหวุดหวิด

สิ่งที่เกิดขึ้นที่นั่นทิ้งคำถามไว้มากกว่าคำตอบ"

# Special Project: Assembling the Past
 cstorms.2180.name: "การปะติดปะต่ออดีต"
 cstorms.2180.desc: "หลังจากประสบการณ์ของ [FromFrom.Leader.GetName] ในระบบดาว §Y[planet_assembling_the_past.System.GetName]§! นักวิทยาศาสตร์ของเราต่างยิ่งมีความมุ่งมั่นที่จะค้นหาว่าเกิดอะไรขึ้นกับสมาสัญญา adAkkaria ข้อมูลที่เรารวบรวมระหว่างการสำรวจ [planet_windswept_fates.GetName] และสุสานกองเรือ เผยให้เห็นว่ากาแล็กซีเต็มไปด้วยสถานีชวนเชื่อของ adAkkaria

ยิ่งไปกว่านั้น หลังจากการหารือกันอย่างยาวนาน พวกเขายังสงสัยว่ารูปแบบที่สังเกตพบในระบบขัดข้องของ [Root.GetName] คือชุดพิกัดนำทางไปยังระบบดาวที่ยังไม่เคยถูกค้นพบมาก่อน!

โครงการพิเศษได้รับการจัดตั้งขึ้นเพื่อตรวจสอบระบบดาวใหม่นี้"
 project_adakkaria_tracing_history: "แกะรอยประวัติศาสตร์"
 project_adakkaria_tracing_history_DESC: "พิกัดชี้ไปยังดาวเคราะห์ดวงหนึ่งในระบบดาว [planet_assembling_the_past.System.GetName] ควรส่งยานสำรวจไปสืบสวนว่าดาวเคราะห์ดวงนี้มีความเกี่ยวข้องอย่างไรกับสมาสัญญาแอดิอะคาเรีย"

 NAME_adSalivul: "adSalivul"
 NAME_Patriotic_Institute_of_Exalted_Benevolence: "Exalted Benevolence"

 cstorms.2185.name: "สถานีถิ่นฐานโบราณ"
 cstorms.2185.desc: "ในตอนแรกเราเกรงว่าการสืบสวนของเราในระบบดาว [From.solar_system.GetName] จะนำไปสู่ทางตัน พิกัดชี้ไปยังดาวเคราะห์ที่กำลังเผชิญกับสนามแม่เหล็กที่แปรปรวนอย่างรุนแรงจนภูมิประเทศพังพินาศไปเกือบหมด แทบจะเป็นไปไม่ได้เลยที่สิ่งมีค่าใดๆ จะรอดพ้นจากภัยพิบัตินี้ได้

อย่างไรก็ตาม มีสถานีถิ่นฐานโบราณโคจรอยู่รอบดาวเคราะห์ดวงนั้น ซึ่งมีสถาปัตยกรรมคล้ายคลึงอย่างมากกับสถานีออกอากาศ adAkkaria แม้ว่าสถานีจะถูกปิดผนึกอย่างหนาแน่นจากภายนอก แต่เราก็สามารถสร้างสัญญาณเปิดทางเข้าโดยอิงจากข้อมูลที่กู้คืนจากฐานข้อมูลของ adAkkaria ได้สำเร็จ

มันผ่านมาหลายยุคสมัยแล้วตั้งแต่มีคนขึ้นมาบนสถานีนี้ครั้งล่าสุด ไม่มีทางรู้เลยว่ามีอะไรรออยู่ข้างใน"
 cstorms.2185.a: "ปฏิบัติหน้าที่ด้วยความระมัดระวัง"

# The Patriotic Institute of Exalted Benevolence
 site_adakkaria_the_patriotic_institute: "สถาบันแห่งความเมตตาอันสูงส่ง"
 site_adakkaria_the_patriotic_institute_intro: "สถานีถิ่นฐานโบราณแห่งนี้โคจรอยู่รอบดาวเคราะห์ที่แห้งแล้ง สร้างขึ้นโดยสมาสัญญา adAkkaria วัสดุก่อสร้างคุณภาพสูงที่ใช้ทำให้ตัวสถานียังคงอยู่ในสภาพที่เกือบจะสมบูรณ์แบบ

เมื่อปรับจูนเข้ากับความถี่การส่งสัญญาณ เราได้รับข้อความเดี่ยวๆ ตามมาด้วยเสียงดนตรีประกอบที่หรูหรา: §Lยินดีต้อนรับสู่สถาบันรักชาติแห่งความเมตตาอันสูงส่ง§!"
 cstorms.2200.name: "เข้าสู่ความเมตตา"
 cstorms.2200.desc: "เมื่อผ่านประตูบานเกล็ดกักบรรยากาศ (airlock) เข้าไป ก็พบกับโครงข่ายอุโมงค์ขนาดเล็ก ในที่สุดเราก็หาทางไปยังพลาซ่าขนาดใหญ่ที่สว่างไสวด้วยแสงอาทิตย์เทียมได้สำเร็จ น่าแปลกที่สถาปัตยกรรมของถิ่นอาศัยนี้คล้ายคลึงกับย่านชานเมืองบนโลกที่อยู่อาศัยบางแห่งมากกว่าสถานีวิทยาศาสตร์ที่โดดเด่น ตัวถิ่นอาศัยถูกสร้างขึ้นเพื่อรองรับทั้งอพาร์ทเมนท์ ศูนย์การค้า และโรงเรียน รวมถึงสวนหย่อม สวนสาธารณะ และสิ่งอำนวยความสะดวกอื่นๆ นี่คือสถานที่ที่ได้รับการออกแบบมาเพื่อการใช้ชีวิตที่หรูหรา

ทว่าในปัจจุบันมันกลับถูกละทิ้งโดยสิ้นเชิง ตรวจไม่พบสิ่งมีชีวิตอินทรีย์แม้แต่ชีวิตเดียวทั่วทั้งถิ่นอาศัยนี้ และในขณะที่เราสำรวจต่อไป เราก็ต้องตกใจกับความรกร้างว่างเปล่าของสถานที่แห่งนี้และบรรยากาศอันน่าอึดอัด

แสงอาทิตย์เทียมเกิดการขัดข้องเป็นระยะๆ ทำให้สถานีตกอยู่ในความมืด และแม้ว่าอุปกรณ์อิเล็กทรอนิกส์อื่นๆ จะยังคงทำงานได้เป็นส่วนใหญ่ แต่พวกมันก็ได้รับผลกระทบจากการขัดข้องนี้เช่นกัน แต่ที่น่าแปลกที่สุดคือเครือข่ายอุปกรณ์สอดแนมที่พบในอพาร์ทเมนท์ของถิ่นอาศัย ดูเมื่อว่าพลเมืองทุกคนจะอยู่ภายใต้การเฝ้าระวังอย่างเข้มงวด การค้นหาสถานีรักษาความปลอดภัยบางแห่งอาจช่วยให้เข้าใจข้อมูลเชิงลึกได้มากขึ้น"
 cstorms.2205.name: "ขัดข้องถาวร"
 cstorms.2205.desc.intro: "ต้องใช้เวลาหลายวันในการสำรวจและระบุพิกัดเมืองบนสถานีและเปิดเผยอุปกรณ์สอดแนมของมัน สถานีรักษาความปลอดภัยกลับถูกแยกส่วนออกจากส่วนที่เหลือของถิ่นอาศัยอย่างสิ้นเชิง และต้องใช้รหัสผ่านคนละชุดกัน

ที่นี่เราพบหน้าจอมอนิเตอร์เรียงรายเป็นแถว ซึ่งยังคงเชื่อมต่อกับอุปกรณ์สอดแนมมวลชน จอที่ยังคงใช้งานได้แสดงให้เห็นทุกมุมของสถานี ทว่าพวกมันก็ได้รับผลกระทบจากไฟกระตุกเช่นกัน"
 cstorms.2205.desc.mach: "$cstorms.2205.desc.intro$

โดรนของเราแสดงความกังวลเมื่อได้เห็นความขัดข้องดังกล่าว เนื่องจากมันทำให้พวกเขานึกถึงการเผชิญหน้ากับสมาสัญญา adAkkaria ครั้งก่อนหน้านี้ที่สุสานทหารเรือโบราณ

$cstorms.2205.desc.outro$"
 cstorms.2205.desc.def: "$cstorms.2205.desc.intro$

[Root.GetLeaderName] รายงานว่ารู้สึกกระวนกระวายใจเมื่อได้เห็นความขัดข้องดังกล่าว เนื่องจากมันทำให้ [Leader.GetHerHis] นึกถึงการเผชิญหน้ากับสมาสัญญา adAkkaria ครั้งก่อนหน้านี้ที่สุสานทหารเรือ

$cstorms.2205.desc.outro$"
 cstorms.2205.desc.outro: "แต่ที่น่าตื่นตระหนกที่สุดคือการค้นพบศูนย์กลางความปลอดภัยส่วนกลางของเรา: ตามข้อความเตือนภัยที่แสดงบนหน้าจอ ถิ่นอาศัยนี้ถูกตั้งค่าให้ทำลายตัวเอง!

[Root.Owner.GetEngineerPlural] ของเราสันนิษฐานว่าการทำงานผิดพลาดใดๆ ก็ตามที่เกิดขึ้นในเมืองนี้ได้ขัดขวางไม่ให้คำสั่งทำงาน เราจึงรีบปิดระบบทำลายตัวเองในทันที และมอบหมายให้ [Root.Owner.GetLinguists] ถอดรหัสบันทึกข้อมูลที่เราสามารถกู้คืนได้ที่นี่ น่าแปลกที่รายงานของสถานีหยุดลงเกือบหนึ่งปีก่อนที่บันทึกข้อมูลล่าสุดจะถูกกู้คืนจากสถานีชวนเชื่อ"
 cstorms.2210.name: "การสอบสวนอันสูงส่ง"
 cstorms.2210.desc: "[Root.Owner.GetLinguists] ของเราใช้เวลาไม่นานก็ค้นพบวัตถุประสงค์ของถิ่นอาศัยที่โคจรรอบ [From.Planet.GetName]: บันทึกและข้อความจากพลเมืองและเจ้าหน้าที่ต่างอธิบายถึงการสืบสวนเกี่ยวกับพลังจิตที่เพิ่งตื่นขึ้นของพลเมือง adAkkaria ทุกคนที่อาศัยอยู่ที่นี่ได้รับคำเชิญจาก 'ผู้นำอันสูงส่ง' ของสมาสัญญาให้มาร่วมสนุกกับชีวิตที่หรูหราและการแสดงออกถึงตัวตนบนถิ่นอาศัยนี้ เพื่อเป็นการตอบแทน พวกเขาตกลงที่จะเข้าร่วมการทดลองที่กำลังดำเนินอยู่ของสถานี

พลเมืองส่วนใหญ่กระตือรือร้นที่จะเข้าร่วมโครงการ บันทึกความปลอดภัยแสดงให้เห็นว่าหลายคนเป็นทหารผ่านศึกที่พิการ พวกเขาได้รับคำสัญญาว่าจะได้รับการดูแล ความช่วยเหลือทางการเงิน และการอภัยโทษสำหรับคดีความทางกฎหมายที่ค้างอยู่

ยิ่งไปกว่านั้น รายชื่อบุคลากรของสถานียังปรากฏชื่อที่คุ้นเคยอย่างมาก: §SalAtta Landeer§! นักวิทยาศาสตร์และทหารผ่านศึกพิการ ซึ่งเป็นร่างที่ถูกตัดอวัยวะที่เรากู้คืนมาได้จากสุสานทหารเรือ"
 cstorms.2210.a: "มีความคืบหน้าเสียที"
 cstorms.2215.name: "ถ้อยคำจากกลุ่มตัวอย่างของเรา"
 cstorms.2215.desc: "เราได้ถอดรหัสหนึ่งในข้อความสุดท้ายที่ส่งมาจากถิ่นอาศัย:

§gข้อความ - วันที่ 02100363 - ผู้ส่ง: §SsiDani Itempeer§! - ผู้รับ: siZul Itempeer§!
§Lสวัสดี! ฉันยังมีชีวิตอยู่นะ! ขอโทษที่ล่าช้า ตั้งแต่ตอนนั้น... ถิ่นอาศัยทำตัวแปลกๆ การส่งข้อความเลยยากขึ้น พวกเขาบอกว่ามันไม่เกี่ยวอะไรกับเรื่องนั้น แต่พวกเราคิดว่าเขามีพรสวรรค์ทางพลังจิตจริงๆ นั่นแหละ ส่วนฉัน ฉันบอกเธอแล้วว่าการทดลองก่อนหน้านี้ไม่ค่อยก้าวหน้าเท่าไหร่... พวกเขาเลยเสนอให้ลองอะไรที่เด็ดขาดกว่านี้: ... พายุคอสมิก ฉันรู้ว่าเธอกำลังคิดอะไรอยู่ แต่มันก็แค่นิ้วเดียวเอง และบางทีมันอาจจะงอกกลับมาใหม่ก็ได้ แต่ความรู้สึกที่ฉันปลดล็อกได้ตอนที่... !
รัก, siDani
- สัญญาณส่งออก§! §Yเซ็นเซอร์ ( มีคำถาม? โปรดติดต่อหัวหน้างานของคุณ )§!

§gข้อความ - วันที่ 02100365 - ผู้ส่ง: §ShaToor Gailon§! - ผู้รับ: aeDal Asduur§!§L
ถึง aeDal ที่รัก,
ชีวิตช่วงนี้ค่อนข้างดีทีเดียว ฉันได้เจอทหารผ่านศึกคนอื่นๆ อีกสองสามคน เราไม่ได้คุยกัน แต่เราต่างเข้าใจกันดี มันดีเหมือนกันนะที่ไม่ต้องพูดคุยกัน
วันนี้ฉันแค่คิดจะยกถ้วยขึ้นมา แล้วมันก็ยกขึ้นจริงๆ ฉันยังคงคิดถึงแขนขวาที่เสียไป แต่บางทีชีวิตใหม่นี้อาจจะไม่แย่อย่างที่ฉันกลัว ฉันได้ยินพวกเขาคุยกันเรื่องจะส่งฉันไปที่... ดูเหมือนว่าฉันจะเป็นอัจฉริยะด้านพลังจิต... ฉัน... อยากถูกส่งไปปฏิบัติหน้าที่อีกครั้ง
ฉันหวังว่าจะได้กลับบ้านในวันรักชาติ ไว้เจอกันนะ
รัก, haToor
- สัญญาณส่งออก§! §Yเซ็นเซอร์ ( มีคำถาม? โปรดติดต่อหัวหน้างานของคุณ )§!

§gข้อความ - วันที่ 02100367 - ผู้ส่ง: §SenRida Direen§! - ผู้รับ: onRida Direen§!
§Lฉันหยุดไฟไหม้ด้วยพลังจิตได้แล้ว!!!!
กลุ่มตัวอย่างคนหนึ่งเกิดอาการประสาทเสียด้วยเหตุผลบางอย่างและทำไฟไหม้ในโรงอาหาร ทุกคนต่างตื่นตระหนกแต่เราหนีไปไหนไม่ได้! ฉันก็กลัวมากเหมือนกัน แต่แล้วก็มีบางอย่างเกิดขึ้นในตัวฉัน และฉันก็ทำให้มันดับลงไปได้!
ฉันช่วยทุกคนไว้ได้!! ฝากบอกพวกผู้อาวุโสด้วยนะว่าฉันไม่ใช่คนสิ้นหวังซะทีเดียว!
- สัญญาณส่งออก§! §Rระงับ ( รายงานตัวต่อหัวหน้างานของคุณทันที )§!

ที่น่าสังเกตคือการส่งสัญญาณที่สอง: ร่างของ §ShaToor Gailon§! ถูกค้นพบระหว่างภารกิจโบราณคดีของเราบนดาวของพวก [Root.Owner.GetPreFTLLowerPlural]"
 cstorms.2215.a: "ยอดเยี่ยมมาก!"
 cstorms.2220.name: "ผลลัพธ์จากการขัดข้อง"
 cstorms.2220.desc: "ข้อความเหล่านี้มีอายุไม่กี่วันก่อนการอพยพออกจากถิ่นอาศัย:

§gข้อความ - วันที่ 02100359 - ผู้ส่ง: แพทย์สูงสุด - ผู้รับ: พลเรือเอกผู้เคารพ§!
§Lข้อความล่าสุดของคุณสร้างความกังวลให้เราที่นี่ กรุณาช่วยอธิบายหน่อยได้ไหมว่าทำไมหลังจากสนับสนุนเรามาตลอดหลายปีโดยไม่มีข้อโต้แย้งใดๆ จู่ๆ คุณก็ขู่ว่าจะปิดตัวเราลง?
- สัญญาณส่งออก§! §Gส่งแล้ว§!

§gข้อความ - วันที่ 02100360 - ผู้ส่ง: พลเรือเอกผู้เคารพ - ผู้รับ: แพทย์สูงสุด§!
§Lคุณต้องล้อฉันเล่นแน่ๆ เราส่งคำเตือนให้คุณมาเป็นเดือนๆ แล้ว แต่ฉันเดาว่าการโคจรรอบโลกที่แปรปรวนคงทำให้ความจำเสื่อมกระทันหันไปเสียอย่างนั้น คุณรู้ใช่ไหมว่า Unicom กำลังคุกคามการดำรงอยู่ของเราอยู่จริงไหม? และสงครามนี้ก็กำลังปะทุขึ้น ฉันไม่สามารถป้องกันการใช้ทรัพยากรจำนวนมหาศาลเพื่อใหาสาสมัครของคุณจ้องมองฝูงปศุสัตว์ทั้งวันได้อีกต่อไป ฉันต้องการผลลัพธ์ที่เป็นรูปธรรมและใช้งานได้จริง เดี๋ยวนี้
- สัญญาณส่งออก§! §Gได้รับแล้ว§!

§gข้อความ - วันที่ 02100360 - ผู้ส่ง: แพทย์สูงสุด - ผู้รับ: พลเรือเอกผู้เคารพ§!
§Lโปรดอภัยให้เราด้วย เราไม่เคยได้รับข้อความก่อนหน้านี้ของคุณเลย สถานีของเราประสบปัญหาทางเทคนิค และมันคงส่งผลกระทบต่อระบบส่งสัญญาณของเราด้วยเช่นกัน อย่างไรก็ตาม เราต้องการเวลาเพิ่ม เรามีกระบวนการและระเบียบปฏิบัติอยู่ เราไม่สามารถทิ้งมันไปเฉยๆ ได้!
- สัญญาณส่งออก§! §Gส่งแล้ว§!

§gข้อความ - วันที่ 02100361 - ผู้ส่ง: พลเรือเอกผู้เคารพ - ผู้รับ: แพทย์สูงสุด§!
§Lคุณมีเวลาหนึ่งสัปดาห์ มิฉะนั้นเราจะดำเนินมาตรการปิดระบบทันที ไม่มีข้อแม้ ไม่มีองค์ประกอบใดๆ ไม่มีโอกาสครั้งที่สอง ขอผลลัพธ์!
- สัญญาณส่งออก§! §Gได้รับแล้ว§!

§gข้อความ - วันที่ 02100368 - ผู้ส่ง: แพทย์สูงสุด - ผู้รับ: พลเรือเอกผู้เคารพ§!
§Lสิ่งที่แนบมาด้วยคือรายงานความสำเร็จล่าสุดของเรา วิดีโอเหล่านี้พิสูจน์ให้เห็นว่าพายุคอสมิกสามารถได้รับอิทธิพลจากอาสาสมัครที่มีพลังจิตของเรา สิ่งนี้อาจนำไปสู่การประยุกต์ใช้ทางการทหารอย่างมีประสิทธิภาพ หากได้รับเวลาเพียงพอเราจะสามารถเพิ่มพลังการแสดงออกทางพลังจิตของพวกเขาได้โดยไม่ต้องทำให้ร่างกายและจิตใจของพวกเขาบอบช้ำ
- สัญญาณส่งออก§! §Rล้มเหลว (สาเหตุ: เมทริกซ์การส่งสัญญาณขัดข้อง)§!"
 cstorms.2220.a: "ข้อความสุดท้ายนั่นไม่เคยถูกส่งออกไป"
 cstorms.2225.name: "ชะตากรรมที่ยังไม่สมบูรณ์"
 cstorms.2225.desc: "นี่คือข้อความสุดท้ายที่กู้คืนได้:§L

เรียนเพื่อนร่วมงานทุกท่าน,

ฉันขอสื่อสารกับพวกคุณด้วยความหนักใจ กองบัญชาการสูงสุด (Exalted Command) ได้ตัดสินใจยุติการทำงานทั้งหมดในสถาบันรักชาติแห่งความเมตตาอันสูงส่ง

สิ่งนี้ไม่ควรคิดว่าเป็นการกล่าวโทษพวกคุณหรือการทำงานของเราที่นี่ ถือเป็นเกียรติอย่างยิ่งที่ได้ร่วมงานกับพวกคุณทุกคน ฉันรู้ดีว่าพวกคุณจะมีคำถามมากมาย แต่โดยสรุปแล้ว ความคาดหวังของกองบัญชาการสูงสุดไม่สอดคล้องกับเป้าหมายการวิจัยของเรา

สำหรับพลเมืองของเรา กองบัญชาการสูงสุดได้เชิญพวกเขาให้เข้าร่วมโครงการที่ $building_adakkaria_patriotic_institute$ บน adSul พวกคุณจะพบรายชื่อบุคลากรทั้งหมดแนบไว้ด้านล่าง โปรดแจ้งเรื่องนี้ให้ผู้ใต้บังคับบัญชาทราบตามความเหมาะสม

สำหรับคนอื่นๆ... น่าเสียดายที่เนื่องจากลักษณะงานวิจัยของเราเป็นความลับ หมายความว่าผู้เข้าร่วมวิจัยจะไม่ได้รับอนุญาตให้กลับเข้าสู่สังคม กองบัญชาการสูงสุดสัญญาว่าจะส่งหน่วยงานพิเศษมาดูแลพวกเขา พวกคุณไม่จำเป็นต้องจัดการเรื่องนี้ด้วยตัวเอง ซึ่งถือเป็นเรื่องที่ดีในรูปแบบหนึ่ง ญาติของพวกเขาจะได้รับการชดเชยอย่างเต็มที่

ลงนาม,
แพทย์สูงสุด, §!§SalAtta Landeer§!

รายชื่อที่แนบมาด้วยแม้จะเสียหายบางส่วน แต่ก็ปรากฏชื่อของกลุ่มตัวอย่าง §ShaToor Gailon§! และ §SenRida Direen§! ดูเหมือนว่าพวกเขาจะถูกส่งตัวไปยังเมืองหลวง adSul ของสมาสัญญา adAkkaria ตอนนี้พิกัดของดาวเคราะห์ดวงนี้อยู่ในมือของเราแล้ว"
 cstorms.2225.a: "กำหนดเส้นทางไปยังโลกบ้านเกิดของสมาสัญญา"

