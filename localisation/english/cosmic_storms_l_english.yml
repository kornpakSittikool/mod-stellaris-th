 nexus_opinion_first_hit: "ความวิตกกังวลเน็กซัส"
 nexus_opinion_first_hit_tt: "$every_empire_opinion_hit$ §R$@first_hit_opinion_change$§!"
 nexus_opinion_second_hit: "ความตระหนกเน็กซัส"
 nexus_opinion_second_hit_tt: "$every_empire_opinion_hit$ §R$@second_hit_opinion_change$§!"
 nexus_opinion_third_hit: "ความกลัวเน็กซัส"
 nexus_opinion_third_hit_tt: "$every_empire_opinion_hit$ §R$@third_hit_opinion_change$§!"
 nexus_opinion_summon_hit: "ความพิโรธเน็กซัส"
 nexus_opinion_summon_hit_tt: "$every_empire_opinion_hit$ §R$@nexus_hit_opinion_change$§!"
 nexus_opinion_the_code: "การประนีประนอมเน็กซัส"
 cs_stormfrenzy_chain_title: "พายุคลั่ง"
 cs_stormfrenzy_chain_desc: "เราผลักดันขีดจำกัดอยู่เสมอ ด้วยแรงบันดาลใจจากความสำเร็จของบรรพบุรุษ ตอนนี้เรามีโอกาสที่จะสร้างสรรค์พายุในฝันของเราขึ้นมาแล้ว"

 cstorms.3220.name: "ลัทธิความเชื่อของนักล่าพายุ"
 cstorms.3220.desc: "คนของเราจะไม่หยุดมองหาความตื่นเต้น ทุกวันเราค้นพบสถานการณ์ที่เหลือเชื่อ และเผชิญกับความท้าทายที่ยิ่งใหญ่กว่า แต่[ruler.GetRegnalName]คิดว่าเราสามารถไปไกลกว่านี้\n\n\"แกนหลักของพายุคอสมิกเป็นศักยภาพบริสุทธิ์; จริงขอบเลือด คมพอที่จะตัดสถานะและปลดปล่อยความเร่งรีบของชีวิต.\"ประชากรของเราจะไม่มีวันหยุดมองหาความตื่นเต้นเร้าใจ ในทุกๆ วันเราค้นพบสถานการณ์อันน่าทึ่งและเผชิญหน้ากับความท้าทายที่ยิ่งใหญ่ขึ้น แต่ [ruler.GetRegnalName] คิดว่าเราสามารถก้าวไปได้ไกลกว่านั้นอีก:\n\n"

 PROJECT_SOW_THE_BIG_ONE: "ล่อใจเดอะบิ๊กวัน"
 PROJECT_SOW_THE_BIG_ONE_DESC: "เรามีเทคโนโลยีพร้อมสรรพ แต่หากไม่มีพายุก่อตัวในบริเวณใกล้เคียง เราจำเป็นต้องสืบหาวิธีหว่านเมล็ดพันธุ์พายุที่เราสามารถควบคุมจัดแต่งได้"

 cstorms.3222.name: "การบ่มเพาะสสารมืด"
 cstorms.3222.desc: "คุณสมบัติที่ไม่ซ้ํากันของสสารมืด ทําให้เป็นสิ่งที่สมบูรณ์แบบ เพื่อปลุกปั่นบิ๊กวัน เราจะฉีดวัสดุที่หาได้ยากนี้ เข้าไปในโครงสร้างรอบ ๆ ระบบเงินทุนของเรา และรอคลื่นแรก ของพายุที่จะปรากฏ\n\nอย่าง ไร ก็ ตาม เรื่อง นี้ ดึงดูด ความ สนใจ ที่ ไม่ พึง ประสงค์ อยู่ แล้ว นั่น คือ เพื่อน บ้าน ของ เรา เริ่ม ประท้วง. \"ไม่ใช่ทุกคนหรอกที่จะขี่คลื่นนี้คุณสมบัติอันเป็นเอกลักษณ์ของสสารมืดทำให้มันเป็นสิ่งที่ดีเลิศในการกระตุ้นเดอะบิ๊กวัน เราจะฉีดสสารลึกลับนี้เข้าไปในโครงสร้างอวกาศรอบๆ ระบบเมืองหลวงของเรา และรอให้คลื่นระลอกแรกของพายุปรากฏขึ้น\n\nอย่างไรก็ตาม การกระทำนี้ได้ดึงดูดความสนใจที่ไม่พึงประสงค์บางประการ: เพื่อนบ้านของเราเริ่มประท้วงแล้ว"
 cstorms.3222.a: "ได้เวลาเริ่มต้นแล้ว"
 cstorms.3222.b: "เราจำเป็นต้องสะสมทรัพยากรเพิ่มอีกสักหน่อย"

 PROJECT_DARK_SEEDING: "ตัวล่อแปลกใหม่"
 PROJECT_DARK_SEEDING_DESC: "ด้วยการฉีดสสารมืดเข้าไปในโครงสร้างอวกาศอย่างระมัดระวัง พายุที่จัดแต่งทรงได้จะถูกปลุกขึ้นภายในระบบนี้"

 cstorms.3224.name: "การเริ่มต้นของเดอะบิ๊กวัน"
 cstorms.3224.desc: "เหลือเชื่อมาก! แรงสั่นสะเทือนแรกเริ่มของพายุที่กำลังจะมาถึงเริ่มสัมผัสได้แล้ว การทำงานของ [Root.Owner.GetScientistPlural] ของเรายังคงดำเนินต่อไป แต่ตอนนี้เราเข้าใกล้การอัญเชิญเดอะบิ๊กวันไปอีกขั้นแล้ว\n\nอย่างไรก็ตาม เพื่อนบ้านของเรากลับไม่ยินดีนัก พวกเขาอ้างว่าเรากำลังเข้าไปยุ่งเกี่ยวกับพลังอำนาจที่เราไม่อาจเข้าใจได้ และสิ่งนี้ได้ส่งผลกระทบต่อความสัมพันธ์ของเราแล้ว"
 cstorms.3224.a: "มันก็เป็นอย่างที่มันเป็นนั่นแหละ"

 cstorms.3225.name: "หล่อเลี้ยงเดอะบิ๊กวัน"
 cstorms.3225.desc: "ข้อมูลระบุอย่างชัดเจน: ไม่ว่าเราจะใส่อะไรเข้าไปในพายุนี้ สิ่งที่คล้ายกันก็จะกำเนิดออกมา ดังนั้น หากเราป้อนทรัพยากรที่ถูกต้องให้แก่มัน มันจะได้รับคุณสมบัติ—และขนาดอันอลังการ—ของพายุทุกๆ ประเภท\n\nผู้คนในกาแล็กซียังคงแสดงความกังวลอย่างต่อเนื่อง แต่เส้นทางแห่งศตวรรษกำลังรอที่จะถือกำเนิดขึ้นแล้ว มาป้อนสิ่งที่เรามีให้มันเถอะ!"
 cstorms.3225.a: "ป้อนอาหารให้พายุ!"
 cstorms.3225.b: "เราจะต้องใช้ทรัพยากรมากกว่านี้"

 cstorms.3226.name: "งานเลี้ยงขั้นสุดยอด"
 cstorms.3226.desc: "เราต้องจัดหาอาหารที่หลากหลายให้แก่พายุที่เพิ่งก่อตัว หากเราต้องการสร้างพายุขนาดมหึมา วีรกรรมอันน่าทึ่งนี้จำเป็นต้องใช้ตัวอย่างทรัพยากรเฉพาะที่เรามีอยู่"

 PROJECT_EVERY_ITEM_ON_THE_MENU: "เมนูนอกรายการ"
 PROJECT_EVERY_ITEM_ON_THE_MENU_DESC: "ตอนนี้เรารู้แล้วว่าพายุอวกาศสามารถควบคุมได้โดยการให้อาหารที่เหมาะสม ในการป้อนอาหารพายุลูกนี้ เราต้องใช้ทรัพยากรตัวอย่างบางส่วน"

 PROJECT_EVERY_ITEM_ON_THE_MENU_REPEAT: "ซ้ำ: $cstorms.3225.name$"
 PROJECT_EVERY_ITEM_ON_THE_MENU_REPEAT_DESC: "การสร้างพายุที่สมบูรณ์แบบจะต้องใช้วัตถุดิบทรัพยากรที่วัดสัดส่วนมาอย่างดี"

 cstorms.3227.name: "แรงผลักดันสุดท้าย"
 cstorms.3227.desc: "ความตื่นเต้นสัมผัสได้ชัดเจน เส้นทางข้างหน้าแจ่มชัดขึ้น: ผลักดันต่อไป ผลักดันให้หนักขึ้น ฝ่าฟันไปให้ได้ ขอให้เราเป็นหนึ่งเดียวกับความคุ้มคลั่งแห่งอวกาศ! ทุกสิ่งพร้อมแล้วสำหรับเดอะบิ๊กวัน เราแค่ต้องออกแรงผลักดันอีกเพียงเล็กน้อยเท่านั้น\n\nเพื่อนบ้านของเราโกรธแค้นจนแทบคลั่ง โดยกล่าวหาว่าสิ่งที่เราเรียกว่า'พายุหิมะ'จะสร้างความหายนะให้กับกาแล็กซี แต่เราจะยอมให้คนน่ารำคาญเหล่านี้มาล้มเลิกโครงการขนาดใหญ่ยักษ์เช่นนี้จริงๆ หรือ? เวลาสำหรับการเลือกมาถึงแล้ว"
 cstorms.3227.a: "เดอะบิ๊กวันคือโชคชะตาขั้นสุดยอดของเรา!"
 cstorms.3227.a.tt: "$nexus_storm$อีก 40 วันจะมาถึง\n$nexus_opinion_third_hit_tt$"
 cstorms.3227.b: "ไม่ เราดีกว่าเรื่องพรรค์นี้!"
 cstorms.3227.b.tt: "$nexus_storm$ยกเลิก\n§Y[global_event_country.GetGalCommunityOrGalImperium]§!ความคิดเห็นดีขึ้นใน 40 วัน"

 cstorms.3230.name: "กำเนิดเดอะบิ๊กวัน"
 cstorms.3230.desc: "ที่นี่คือที่ของเรา - บนปากเหวแห่งประสบการณ์ครั้งใหม่ เวลาแห่งมหันตภัยขั้นสุดยอดได้มาถึงแล้ว ไม่มีสิ่งใดที่นักล่าพายุของเราจะไม่เผชิญหน้า ไม่มีความท้าทายใดที่เราจะปฏิเสธ\n\nขอให้กาแล็กซีจงเป็นพยาน!"
 cstorms.3230.a: "ทำเลยตอนนี้"
 has_spawned_nexus_storm_tt: "$TRIGGER_FAIL$สร้าง §Y$nexus_storm$§! แล้ว"

 cstorms.3235.name: "บทส่งท้ายแห่งพายุ"
  cstorms.3235.desc: "เราได้เรียนรู้มากมาย ตอนนี้เราเข้าใจแล้วว่ากาแล็กซี่นั้น ไม่ใช่ของเล่นที่จะเล่นกับมัน แต่เป็นการผจญภัยที่จะมีประสบการณ์\n\n[ruler.GetRegnalName]พูดว่าดีที่สุด\"ในชีวิตแบบนี้ ไม่มีการขาดแคลนความตื่นเต้น เราจะไม่หยุดค้นหาความท้าทายครั้งถัดไป แต่เราต้องทําด้วยความเคารพ นี่คือสิ่งที่เราเลือก นี่คือตัวตนของเรา\"เราได้เรียนรู้อะไรมากมาย ตอนนี้เราเข้าใจแล้วว่ากาแล็กซีไม่ใช่ของเล่นที่จะนำมาเล่นสนุก แต่คือการผจญภัยที่ต้องออกไปสัมผัส\n\n[ruler.GetRegnalName] ได้กล่าวไว้ดีที่สุดว่า: \""
 cstorms.3235.a: "ชิวๆ เข้าไว้!"
 cstorms.3235.a.tt: "$every_empire_opinion_hit$ §G+$@the_code_total_change$§!"

# Storm Fever Challenges

 cs_stormfever_chain_title: "ไข้พายุ"
 cs_stormfever_chain_desc: "เพื่อก้าวสู่ความสูงครั้งใหม่ เพื่อสัมผัสความยินดี และเพื่อทดสอบขีดจำกัดของเรา ตอนนี้เรากำลังเริ่มดำเนินภารกิจชุดทดสอบความท้าทาย ขอให้ความสนุกเริ่มต้นขึ้น!"
 challenges_completed: "ความท้าทายที่สำเร็จแล้ว"

 MISSION_CS_STORM_FEVER_CHALLENGE_1: "เอาชนะกองยานภายในพายุ"
 MISSION_CS_STORM_FEVER_CHALLENGE_1_DESC: "ความร้อนระอุของการต่อสู้เป็นเวทีพิสูจน์ฝีมือมาโดยตลอด ลองจินตนาการถึงการสัมผัสมันจากภายในใจกลางที่โหมกระหน่ำของพายุอวกาศดูสิ! มาแสดงให้กาแล็กซีเห็นกันเถอะว่าพวกเรานั้นป่าเถื่อนเพียงใด\n\nความท้าทายในตอนนี้คือการเอาชนะกองยานศัตรูภายในพายุ"
 fleets_defeated_in_storm: "กองยานที่ถูกเอาชนะในพายุ"

 MISSION_CS_STORM_FEVER_CHALLENGE_2: "สำรวจสุดขอบกาแล็กซี"
 MISSION_CS_STORM_FEVER_CHALLENGE_2_DESC: "การออกไปนอกพรมแดนของเรา การรักษาสมดุลบนขอบดวงดาว การค้นหาส่วนที่ห่างไกลที่สุดของอวกาศ - มีอะไรที่น่าตื่นเต้นไปกว่านี้อีกไหม?\n\nเราจะต้องส่งยานวิทยาศาสตร์ไปยังระบบที่กำหนด - ด้วยวิธีใดก็ตามที่เราทำได้"
 far_edge_explored: "ขอบข่ายอันห่างไกลที่สำรวจแล้ว"

 MISSION_CS_STORM_FEVER_CHALLENGE_3: "โต้พายุ"
 MISSION_CS_STORM_FEVER_CHALLENGE_3_DESC: "ที่สุดของที่สุดล้วนโหยหาความตื่นเต้นเร้าใจของพายุ ปล่อยให้พวกเขาล่องเรือและเติบโตเถอะ!\n\nความท้าทายถัดไปของเราคือการช่วยเหลือให้นักล่าพายุสามารถทนทานพายุอวกาศได้นานกว่า 180 วัน"
 days_storm_rider_spend_in_storm: "จำนวนวันที่นักล่าพายุอยู่ในพายุ"

 MISSION_CS_STORM_FEVER_CHALLENGE_4: "ตรวจสอบสิ่งทีถูกขุดค้นพบ"
 MISSION_CS_STORM_FEVER_CHALLENGE_4_DESC: "กาแล็กซีที่เต็มไปด้วยขุมทรัพย์ที่ถูกฝังไว้และประวัติศาสตร์อันลึกลับโบราณ - และสายลมร้ายที่คอยปลุกพวกมันขึ้นมา! ออกไปดูข้างนอกกันเถอะว่าเราจะพบเจออะไรบ้าง\n\nมาท้าทายตัวเองด้วยการตรวจสอบความผิดปกติหรือโบราณสถานขุดค้นที่เผยออกมาโดยพายุ"
 storm_unraveled_event_investigated: "ความผิดปกติหรือแหล่งขุดค้นที่ตรวจสอบแล้ว"

 MISSION_CS_STORM_FEVER_CHALLENGE_5: "แบ่งปันความสุข"
 MISSION_CS_STORM_FEVER_CHALLENGE_5_DESC: "ทำไมพวกเราถึงได้สนุกกันอยู่ฝ่ายเดียวล่ะ? เมื่อเป็นเรื่องของการผจญภัย การแบ่งปันย่อมดีกว่าเสมอ\n\nเพื่อช่วยให้เพื่อนบ้านของเรารู้สึกมีส่วนร่วม ความท้าทายในตอนนี้คือการทำให้พายุอวกาศเปลี่ยนทิศทางเข้าไปในเขตแดนของพวกเขา"
 send_storm_to_other_empire: "พายุที่ถูกส่งไปยังอาณาจักรอื่น"

 MISSION_CS_STORM_FEVER_CHALLENGE_6: "ยอมจำนนต่อพายุร้าย"
 MISSION_CS_STORM_FEVER_CHALLENGE_6_DESC: "ไม่ใช่สไตล์ของเราที่จะแก่ชราและเลือนหายไป การจากไปด้วยกองเพลิงแห่งเกียรติยศนั้นดีกว่ามาก!\n\nความท้าทายต่อไปคือการช่วยให้นักล่าพายุเผชิญกับช่วงเวลาสุดท้ายของชีวิตภายในพายุอวกาศ"
 rider_died_in_storm: "นักล่าพายุที่เสียชีวิตหรือสูญหายในพายุ"

# Challenge completed intro
 challenge_completed_intro: "จุดสูงสุดใหม่ได้รับการบรรลุแล้วและขีดจำกัดถูกทลายลง! นี่เป็นสิ่งที่จะกระตุ้นอารมณ์ความรู้สึกให้ลุกโชน เราได้ทำภารกิจการทดสอบเสร็จสมบูรณ์แล้ว!"

# Challenge 1 completed
 challenge_completed: "ความท้าทายเสร็จสิ้น:"
 cstorms.305.name: "$challenge_completed$ $MISSION_CS_STORM_FEVER_CHALLENGE_1$"
 cstorms.305.desc: "$challenge_completed_intro$\n\nกองยานนั้นไม่มีโอกาสต่อสู้เลยแม้แต่น้อย ใครจะกล้ามาท้าทายเราเป็นรายต่อไป?"
 cstorms.305.a: "มันรู้สึกดีเหลือเกิน!"
# Challenge 2 completed
 cstorms.310.name: "$challenge_completed$ $MISSION_CS_STORM_FEVER_CHALLENGE_2$"
 cstorms.310.desc: "$challenge_completed_intro$\n\nกาแล็กซีมีสิ่งต่างๆ ให้ค้นหามากมายก่ายกอง! ไม่มีช่วงเวลาที่น่าเบื่อเลย และไม่มีเหตุผลที่จะต้องหยุดลงในตอนนี้ ลุยต่อเพื่อความท้าทายถัดไป!"
 cstorms.310.a: "ใช่เลย!"
# Challenge 3 completed
 cstorms.315.name: "$challenge_completed$ $MISSION_CS_STORM_FEVER_CHALLENGE_3$"
 cstorms.315.desc.normal: "$challenge_completed_intro$\n\nนักล่าพายุของเรารายงานกลับมาพร้อมกับเสียงเชียร์อันปีติยินดี พายุอวกาศถือเป็นความตื่นเต้นในระดับใหม่อย่างแท้จริง!"
 cstorms.315.desc.gestalt: "$challenge_completed_intro$\n\nเรารู้สึกเปี่ยมล้นไปด้วยความยินดีปรีดา พายุอวกาศนำความตื่นเต้นเร้าใจไปสู่อีกระดับที่แตกต่างออกไปโดยสิ้นเชิง"
 cstorms.315.a: "ไม่มีวินาทีไหนน่าเบื่อเลย!"
# Challenge 4 completed
 cstorms.320.name: "$challenge_completed$ $MISSION_CS_STORM_FEVER_CHALLENGE_4$"
 cstorms.320.desc: "$challenge_completed_intro$\n\nการขุดคุ้ยความลับโบราณและการค้นพบขุมทรัพย์ที่ถูกซ่อนไว้นั้นน่าตื่นเต้นเสมอ ใครจะรู้ว่ายังมีอะไรอยู่นอกนั่นอีกที่รอการค้นพบ?"
 cstorms.320.a: "ความเป็นไปได้ไม่มีสิ้นสุด!"
# Challenge 5 completed
 cstorms.325.name: "$challenge_completed$ $MISSION_CS_STORM_FEVER_CHALLENGE_5$"
 cstorms.325.desc: "$challenge_completed_intro$\n\nพายุลูกนั้นเคลื่อนตัวฝ่าเข้าไปในพื้นที่ของพวกเขาโดยตรง พร้อมกับสร้างความตื่นเต้นเร้าใจและความระส่ำระสายในสัดส่วนเท่าๆ กัน! เราสามารถนอนตาหลับได้อย่างสบายใจเมื่อรู้ว่าเราได้มอบประสบการณ์อันเหลือเชื่อเช่นนี้ให้แก่เพื่อนบ้านของเรา\n\nตอนนี้พวกเขาอาจจะยังไม่เห็นคุณค่า แต่ในท้ายที่สุดพวกเขาก็จะขอบคุณเราเอง"
 cstorms.325.a: "พวกเราเป็นผู้ให้!"
# Challenge 6 completed
 cstorms.330.name: "$challenge_completed$ $MISSION_CS_STORM_FEVER_CHALLENGE_6$"
 cstorms.330.desc.normal: "$challenge_completed_intro$\n\nพายุใหญ่ได้เอ่ยเรียกชื่อของพวกเขาและพวกเขาก็ตอบรับด้วยความปรีดา ขอสดุดีแด่นักล่าพายุผู้เป็นตำนานอย่างแท้จริง! ขอให้การเดินทางของท่านไปสู่ปรโลกนั้นยิ่งใหญ่เฉกเช่นการจากไปของท่าน"
 cstorms.330.desc.gestalt: "$challenge_completed_intro$\n\nพายุใหญ่ได้เรียกหาชิ้นส่วนหนึ่งของตัวเราให้เข้าร่วมในการนองเลือดอันแสนรื่นเริง การสูญเสียปมระบบไม่เคยรู้สึกมีความหมายและน่าตื่นเต้นขนาดนี้มาก่อน! ประสบการณ์อันยิ่งใหญ่นี้จะนิยามสายพันธุ์ของเราไปอีกหลายปี"
 cstorms.330.a: "ลุยต่อเลย!"
 cstorms.331.desc.normal: "$challenge_completed_intro$\n\nพายุใหญ่ได้เอ่ยเรียกชื่อของพวกเขาและพวกเขาก็ตอบรับด้วยความปรีดา ขอสดุดีแด่นักล่าพายุผู้เป็นตำนานอย่างแท้จริง!"
 cstorms.331.desc.gestalt: "$challenge_completed_intro$\n\nพายุใหญ่ได้เรียกหาชิ้นส่วนหนึ่งของตัวเราให้เข้าร่วมในการนองเลือดอันแสนรื่นเริง การเกือบสูญเสียปมระบบไม่เคยรู้สึกมีความหมายและน่าตื่นเต้นขนาดนี้มาก่อน! ประสบการณ์อันยิ่งใหญ่นี้จะนิยามสายพันธุ์ของเราไปอีกหลายปี"

 electric_storm_desc: "การปะทะกันของสนามแม่เหล็กไฟฟ้าทำให้พายุอวกาศลูกนี้มีระดับประจุไฟฟ้าใกล้ขั้นอันตราย เป็นอันตรายต่อเกราะป้องกัน แต่เป็นประโยชน์ต่อการผลิตของดาวเคราะห์"
 particle_storm_desc: "พายุเหล่านี้ดูเหมือนมีชีวิต เคลื่อนที่ทะลุผ่านและภายในโครงสร้างกาแล็กซี โดยไม่ได้ไล่ล่าหรือหลบเลี่ยงยานอวกาศใดๆ อันตรายและไม่เสถียร เพียงแค่การดำรงอยู่ของพวกมันก็เพียงพอที่จะหลอมรวมอารยธรรมให้เป็นหนึ่งเดียวเพื่อท้าทายธรรมชาติได้"
 gravity_storm_desc: "เมื่อวัตถุคอสมิกมวลมหาศาลปะทะกัน แรงกระแทกที่เกิดขึ้นจะส่งคลื่นความโน้มถ่วงไปทั่วทั้งกาแล็กซี และเมื่อคลื่นเหล่านี้ยุบตัวลง พายุแรงโน้มถ่วงก็ถือกำเนิดขึ้น ส่งผลเสียต่อระบบเล็งเป้าหมายของยานอวกาศ และแรงโน้มถ่วงที่ผันผวนทำให้เกือบทุกคนต้องถูกบังคับให้อยู่แต่ในบ้าน"
 magnetic_storm_desc: "เมื่อแถบดาวเคราะห์น้อยโลหะที่เคลื่อนที่ไปมามีปฏิสัมพันธ์กับแรงโน้มถ่วงอันทรงพลัง สนามแม่เหล็กจะก่อตัวขึ้นภายใน พายุประเภทนี้จะฉีกกระชากตัวยานและทำให้การก่อสร้างทางอุตสาหกรรมต้องหยุดชะงัก แต่ในขณะเดียวกันก็ช่วยดันแร่ธาตุที่มีค่าจากเปลือกโลกของดาวเคราะห์ขึ้นมาด้วย"
 solar_storm_desc: "$solar_storm$ สร้างการผันผวนเป็นประกายภายในโครงสร้างอวกาศ การปรากฏตัวของมันทำให้ดวงดาวเกิดการปะทุของเปลวสุริยะอย่างที่ไม่เคยมีมาก่อน รังสีที่เกิดขึ้นนั้นสร้างความเสียหายอย่างรุนแรง แต่จะช่วยเพิ่มผลผลิตของสถานีอวกาศอย่างมาก และทำให้ยานต่างๆ ซ่อนตัวได้ยากขึ้น"
 celestial_storm_desc: "ณ ช่วงเวลาใดเวลาหนึ่ง ฝุ่นละอองจากดาวเคราะห์นับล้านกำลังล่องลอยอย่างไร้จุดหมายผ่านกาแล็กซี บางครั้งละอองเหล่านี้รวมตัวกันในปริมาณที่มากพอจนทำให้เกิดพายุฝุ่น รบกวนการสื่อสารทั่วทั้งดาวเคราะห์ แต่ธาตุเคมีที่มันนำมาด้วยนั้นมีประโยชน์สำหรับการผลิตทรัพยากร วัตถุต่างๆ ที่อยู่ภายในพายุร้ายนี้แทบจะไม่ปรากฏบนเครื่องสแกนของเราเลย"
 shroud_storm_desc: "ในโอกาสที่หาได้ยากยิ่ง แดนชราวด์อาจกระซิบกระซาบผ่านโลกวัตถุ พายุหายากเหล่านี้จะเผยให้สิ่งมีชีวิตทรงภูมิปัญญาเห็นนิมิตทั้งที่งดงามตระการตาและแปลกประหลาดน่าเกลียดน่ากลัว ผู้ที่ได้ติดต่อสัมพันธ์กับแดนชราวด์ยังสามารถได้รับประโยชน์จากการประสานพลังที่เอาแน่เอานอนไม่ได้"
 nexus_storm_desc: "เมื่อดวงดาวเรียงตัวตรงกัน แม้แต่พายุอวกาศขนาดเล็กก็สามารถขยายตัวจนเกินขีดจำกัดทั่วไปได้ เหตุการณ์ที่หาได้ยากนี้จะปลด柔軟ความหวาดกลัวระดับวันสิ้นโลก ไม่มีทางที่จะเติบโตได้อย่างรุ่งเรืองภายในสิ่งชั่วร้ายนี้ ทางเลือกเดียวคือการเอาชีวิตรอด"

 FROM_STORM: "จากพายุ"

# Planetary modifiers
 hyper_ecosystem: "ระบบนิเวศระดับไฮเปอร์"
 hyper_ecosystem_desc: "ดินของดาวเคราะห์ดวงนี้มีปริมาณความเข้มข้นของไนโตรเจนและฟอสฟอรัสสูงเป็นพิเศษ ซึ่งดูดซับกลับคืนมาจากแร่ธาตุที่ก่อตัวขึ้นตามธรรมชาติในเปลือกโลก ส่งผลให้พืชพรรณเจริญเติบโตอย่างรวดเร็วเป็นพิเศษ ดีอย่างยิ่งสำหรับการเพาะปลูก แต่จะเป็นอุปสรรคต่อโครงการก่อสร้างต่างๆ"
 docile_fauna: "สัตว์ป่าที่เชื่อง"
 docile_fauna_desc: "สัตว์ป่าและการเติบโตของพืชพรรณบนดาวเคราะห์ดวงนี้ขาดศัตรูตามธรรมชาติไปหลายชนิด ทำให้พวกมันเชื่องผิดปกติ ส่งผลให้น่าอยู่อาศัยด้วย จำนวนประชากรจะถูกควบคุมโดยความเสียหายจากพายุมากกว่าการอยู่รอดของสิ่งมีชีวิตที่เหมาะสมที่สุด"
 obsidian_lakes: "ทะเลสาบออบซิเดียน"
 obsidian_lakes_desc: "กิจกรรมทางธรณีแปรสัณฐานทำให้ทะเลสาบแมกมาเย็นตัวลงจนกลายเป็นแผ่นหินออบซิเดียนขนาดมหึมา ส่งผลให้ทรัพยากรที่มีค่าถูกขยับขึ้นมาใกล้พื้นผิวโลกมากยิ่งขึ้น"
 obsidian_lakes_volcanic: "$obsidian_lakes$"
 obsidian_lakes_volcanic_desc: "$obsidian_lakes_desc$"
 crimson_crawlers: "แมลงคลานสีแดงก่ำ"
 crimson_crawlers_tt: "§R$COLONIZATION_IMPOSSIBLE_CRIMSON_CRAWLERS$§!"
 crimson_crawlers_desc: "พื้นผิวของดาวเคราะห์ถูกปูด้วยพรมสีแดงก่ำเนื่องจากการมีอยู่ของแมลงสีแดงตัวจิ๋วนับล้านล้านตัว แม้พวกมันจะมีจำนวนมหาศาล แต่ดูเหมือนว่าจะไม่มีอันตราย และสามารถรักษาสมดุลอันบอบบางภายในระบบนิเวศของดาวเคราะห์ไว้ได้"
 metal_planet: "ดาวเคราะห์โลหะ"
 metal_planet_desc: "ดาวเคราะห์ดวงนี้ปกคลุมไปด้วยโลหะดิบที่เกิดขึ้นตามธรรมชาติโดยสมบูรณ์ ขาดปัจจัยพื้นฐานที่จำเป็นต่อชีวิต เช่น น้ำ หรือชั้นบรรยากาศที่สามารถหายใจได้ แต่มีทรัพยากรที่นำมาใช้งานได้เป็นจำนวนมาก!"
 terraform_fail_is_metal_planet: "ดาวเคราะห์ดวงนี้ไม่สามารถปรับสภาพพื้นผิวได้เนื่องจากมีเปลือกเป็นโลหะ"
 previously_terraformed_planet: "ดาวเคราะห์ที่เคยปรับสภาพมาก่อน"
 previously_terraformed_planet_desc: "โลกหินที่มีชั้นบรรยากาศไนโตรเจน-ออกซิเจนและมหาสมุทรมากมาย มีหลักฐานว่าจักรวรรดิรุ่นเก่าเคยมาถึงและตั้งอาณานิคมบนดาวเคราะห์ดวงนี้มาก่อน แต่พวกเขาก็สูญหายไปแล้ว นี่หมายความว่ามีสิ่งต่างๆ มากมายให้ค้นหาและเปิดเผย และยังทำให้ดาวเคราะห์ดวงนี้เป็นตัวเลือกที่พร้อมสรรพสำหรับการตั้งอาณานิคมใหม่!"
 previously_terraformed_planet_tt: "ความพยายามในการปรับสภาพสภาพแวดล้อมครั้งก่อนทำให้การเปลี่ยนดาวเคราะห์ดวงนี้ให้กลายเป็นโลกไกอานั้นง่ายดายขึ้นอย่างมาก"
 has_patriotic_institute: "สถาบันรักชาติ $building_adakkaria_patriotic_institute$"
 has_patriotic_institut_desc: "ดาวเคราะห์ดวงนี้เคยเป็นรากฐานของสัญญาร่วมแอดอัคคาเรีย $building_adakkaria_patriotic_institute$ คือสิ่งเดียวที่หลงเหลืออยู่ของอารยธรรมที่เคยยิ่งใหญ่นี้"
 has_patriotic_institute_tt: "มีสิ่งปลูกสร้าง: $building_adakkaria_patriotic_institute$ ตั้งอาณานิคมบนดาวเคราะห์ดวงนี้เพื่อครอบครองสิทธิ์"
 adakkaria_patriotic_institute_desc.supercharged: "มีโอกาสในทุกๆ ปีที่พายุจะถูกกระตุ้นในระบบนี้ โดยแลกกับประชากร §Y100§! £pop£ §Hประชากร§!"

#Planet Modifiers
 crimson_crawlers_sashimi_style: "แมลงคลานสีแดงก่ำ: การบริโภคดิบ"
 crimson_crawlers_sashimi_style_desc: "พื้นผิวของดาวเคราะห์มีโทนสีแดงเข้มเนื่องจากการมีอยู่ของแมลงสีแดงขนาดเล็กจิ๋วนับล้านล้านตัว แม้จะบริโภคแบบดิบๆ พวกมันก็ยังเป็นแหล่งอาหารที่แสนอร่อย"
 crimson_crawlers_bbq_them: "ผู้คลานสีชาด: การบริโภคแบบปรุงสุก"
 crimson_crawlers_bbq_them_desc: "พื้นผิวของดาวเคราะห์ดวงนี้มีเฉดสีแดงก่ำเนื่องจากการมีอยู่ของแมลงสีแดงตัวจิ๋วหลายล้านล้านตัว พวกมันได้กลายเป็นความเพลิดเพลินของประชากรในการนำมาปิ้งย่างและบริโภค"

 COLONIZATION_IMPOSSIBLE_CRIMSON_CRAWLERS: "§Rดาวเคราะห์ดวงนี้ไม่สามารถตั้งอาณานิคมโดยจักรวรรดิเครื่องจักรหรือจักรวรรดิเทอร์ราวอร์ได้§!"

# New planet types modifiers
 collided_planet: "ดาวเคราะห์ปะทะกัน"
 collided_planet_desc: "ดาวเคราะห์สองดวงชนเข้าด้วยกัน และแทนที่จะทำลายล้างซึ่งกันและกัน พวกมันกลับพัวพันกันจนรวมเป็นหนึ่ง แม้ว่าจะมีพื้นที่พื้นผิวที่ใช้งานได้เพิ่มขึ้น แต่โลกดวงนี้ก็มาพร้อมกับความท้าทายในการอยู่อาศัยและการก่อสร้างที่ไม่เหมือนใคร"
 wooden_planet: "โลกพฤกษา"
 wooden_planet_desc: "ตลอดเวลาหลายพันปี เปลือกโลกของดาวเคราะห์ดวงนี้ได้กลายเป็นชั้นรากไม้ที่หนาแน่นหลายกิโลเมตร ทำให้มันเป็นสิ่งมีชีวิตขนาดยักษ์เพียงหนึ่งเดียว"
 wooden_planet_tt: "ที่อยู่อาศัยมีราคา $w_food$ ในการสร้างและบำรุงรักษา\nพื้นที่เกษตรกรรมมีราคา $w_food$ ในการสร้าง"

# Eruption Event
 recent_eruption: "เกิดการปะทุขึ้นเมื่อเร็ว ๆ นี้"
 eruption_report_tooltip: "\nรายงานจะมาถึงภายใน 30 วัน"
 colony_mod.31.name: "การปะทุ!"
 colony_mod.31.desc: "เหตุการณ์ทางธรณีแปรสัณฐานบน [Root.GetName] ได้ทำให้แผ่นหินออบซิเดียนบนแผ่นเปลือกโลกยักษ์แผ่นหนึ่งแตกเป็นเสี่ยง ๆ ลาวาไหลบ่าไปทั่วพื้นผิวส่งผลให้เกิดความเสียหายย่อยยับ รายงานจากอาณานิคมนั้นน่ากังวลอย่างยิ่ง"
 colony_mod.31.a: "มารับฟังรายงานเหล่านั้นกันเถอะ"
 colony_mod.32.name: "รายงานความเสียหายจากการปะทุ"
 colony_mod.32.desc: "การปะทุเมื่อเร็ว ๆ นี้ที่ทุ่งออบซิเดียนซึ่งสั่นสะเทือนอาณานิคมของเราบน [Root.GetName] ได้กลายเป็นภูเขาไฟที่ยังคุกรุ่นอยู่! ทุกสิ่งทุกอย่างที่เคยมีอยู่ที่นั่นบัดนี้ถูกฝังอยู่ใต้หินหลอมเหลวแล้ว"
 colony_mod.33.desc: "การปะทุเมื่อเร็ว ๆ นี้ที่ทุ่งออบซิเดียนซึ่งสั่นสะเทือนอาณานิคมของเราบน [Root.GetName] นั้นน่าปาฏิหาริย์ที่ไม่ได้สร้างความเสียหายใด ๆ เลย ยิ่งไปกว่านั้นในความโชคดีนี้ มันยังทำให้หินออบซิเดียนแตกออกเพื่อให้เก็บรวบรวมได้ง่ายขึ้นด้วย!"
 colony_mod.34.desc: "การปะทุเมื่อเร็ว ๆ นี้ที่ทุ่งออบซิเดียนซึ่งสั่นสะเทือนอาณานิคมของเราบน [Root.GetName] นั้นน่าปาฏิหาริย์ที่ไม่ได้สร้างความเสียหายใด ๆ เลย!"

#Aftermath modifiers
 STORM_AFTERMATH: "§Hผลที่ตามมา§!"
 STORM_AFTERMATH_DESC: "- ขึ้นอยู่กับความรุนแรงของพายุ อาณานิคมจะมีตัวปรับเปลี่ยนดังต่อไปนี้ใช้เป็นเวลา 3 ปี:"

 electric_storm_aftermath_modifier: "ชั้นบรรยากาศที่มีประจุไฟฟ้า"
 electric_storm_aftermath_modifier_tooltip: "$STORM_AFTERMATH_DESC$\n$t$- §H$electric_storm_aftermath_modifier$§!:\n$tt$- §R-25%§! ถึง §R-65%§! $MOD_PLANET_BUILDING_BUILD_SPEED_MULT$\n$tt$- §G+10%§! ถึง §G+30%§! $mod_planet_jobs_energy_produces_mult$"
 electric_storm_aftermath_modifier_severity_desc: "$electric_storm$ ได้ทิ้งกระแสไฟฟ้าที่พลุ่งพล่านไว้ในชั้นบรรยากาศ ส่งผลให้ผลผลิตจากเครื่องจักรขาดความเสถียร อย่างไรก็ตาม การผลิตพลังงานกลับพุ่งทะลุเป้าอย่างน่าทึ่ง!"
 electric_storm_aftermath_modifier_severity_1: "ผลที่ตามมา: $electric_storm_aftermath_modifier$"
 electric_storm_aftermath_modifier_severity_1_desc: "$electric_storm_aftermath_modifier_severity_desc$"
 electric_storm_aftermath_modifier_severity_2: "ผลที่ตามมา: §Hรุนแรง§! $electric_storm_aftermath_modifier$"
