 resolution_cosmic_storms_control_restrictions_desc: "กาแล็กซีเป็นระบบนิเวศอันกว้างใหญ่ที่เชื่อมต่อถึงกัน ซึ่งพายุคอสมิกมีบทบาทสำคัญอย่างยิ่ง การส่งอิทธิพลต่อพฤติกรรมของพวกมันจะต้องถูกกำหนดให้เป็นเรื่องผิดกฎหมาย"
