#Weather Manipulator
 r_weather_manipulator: "เครื่องยับยั้งความแปรปรวน"
 r_weather_manipulator_desc: "เครื่องจักรรุ่นก้าวหน้ายิ่งขึ้นที่กลุ่มผู้ค้าอิเนเชียนใช้ควบคุมพายุคอสมิก โดยทั่วไปอุปกรณ์นี้จะเพิ่มประสิทธิภาพของเทคโนโลยีที่เกี่ยวข้องกับพายุทั้งหมดของเรา แต่เมื่อนำมาใช้งานอย่างเหมาะสม มันยังสามารถขับไล่พายุทั้งหมดออกไปนอกชายแดนของเราได้อีกด้วย"
 storm_relic_repelling_field_modifier: "การเปิดใช้งานเครื่องยับยั้งความแปรปรวน"
 storm_relic_repelling_field_modifier_tt: "สร้างสนามขับไล่ §Y$default_storm$§! ขนาด §Mใหญ่พิเศษ§! รอบเมืองหลวงของจักรวรรดิเป็นเวลา 36 เดือน"

# Temporary effect used by the Inetian Precursor Digsite C
 storm_timed_repelling_field_modifier: "การเปิดใช้งานเครื่องลดความแปรปรวนระดับเขตการปกครอง"
 storm_timed_repelling_field_modifier_tt: "สร้างสนามขับไล่ §Y$default_storm$§! ขนาด §Hปานกลาง§! รอบเมืองหลวงของจักรวรรดิเป็นเวลา 18 เดือน"

#The Tempest Invocator
 r_the_tempest_invocator: "เครื่องอัญเชิญพายุคลั่ง"
 r_the_tempest_invocator_desc: "ศักยภาพที่รอการปลดปล่อยของอุปกรณ์นี้สัมผัสได้แม้ในขณะที่ปิดเครื่องอยู่ เราจะกล้าอัญเชิญพายุอันเกรี้ยวกราดเข้ามาในตัวตนของหนึ่งในผู้ที่ดีที่สุดและฉลาดที่สุดของเราหรือไม่? เพื่อเกียรติยศแห่งชาติ การเสียสละจำต้องเกิดขึ้น"
 r_the_tempest_invocator_active_effect_tt: "สร้าง ['concept_nexus_storm'] ในระบบสุริยะที่คุณเลือก\n$t$เมื่อเลือกระบบสุริยะแล้ว $scientist_with_icon$ จะถูก §Pสังเวย§!"
 r_the_tempest_invocator_requirement_fail_tt: "$TRIGGER_FAIL$§Rไม่มี $scientist_with_icon$ ที่สามารถสังเวยได้§!"
 r_the_tempest_invocator_started_placing_fail_tt: "$TRIGGER_FAIL$§Rระบบจัดวางพายุเปิดใช้งานอยู่ก่อนแล้ว§!"
 tempest_invocator_active_modifier: "การขับไล่พายุคลั่ง"

