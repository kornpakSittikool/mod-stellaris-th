 origin_storm_chasers: "นักไล่ล่าพายุ"
 origin_storm_chasers_desc: "ไม่มีความท้าทายใดที่พวกเขาจะไม่เผชิญ ไม่มีเบาะแสใดที่พวกเขาจะพลาดการไล่ล่า - และไม่มีพายุลูกใดที่พวกเขาจะเพิกเฉย\n\nหัวใจสำคัญของอารยธรรมนี้คือการแสวงหาความตื่นเต้น ซึ่งเป็นทั้งผลดีและผลเสียต่อพวกเขา"
 origin_tooltip_storm_chasers_effects: "- $LEADERS_TRAITS$ ['concept_storm_rider']\n- $mod_planet_jobs_unity_produces_mult$ ของดาวเคราะห์ต่อ §Yอาคารพายุ§!: §G+$@storm_chasers_storm_building_unity_produces_mult|%0$§!\n- อาคารเมืองหลวงจะมอบตัวดัดแปลงของ §Yที่หลบพายุ§! โดยอัตโนมัติเมื่อวิจัยเทคโนโลยีที่จำเป็นแล้ว\n- โอกาสการปรากฏตัวของ §Y$default_storm$§! ภายในพรมแดน: §G+100%§!\n- โอกาสได้รับตัวเลือกการวิจัย §Yเทคโนโลยีพายุคอสมิก§!: §G+175%§!\n- เข้าถึง ['concept_weather_forecasting_mode']\n- $ADDITIONAL_TECHNOLOGIES_STRING$แท็บ NW เงินสด£physics£ ['technology:tech_storm_prediction_1']"

 START_SCREEN_STORM_CHASERS: "ชีวิตที่ไม่มีความเร่งรีบคืออะไร เผาไหม้อย่างรวดเร็วและตายอย่างสมบูรณ์ - ที่มักจะเป็นวิธีการของเรา แต่ เมื่อ ทุก ทาง ถูก ไฟ ไหม้ และ แม้ แต่ ยอด เขา ที่ สูง ที่ สุด ก็ จะ สูง ขึ้น ต่อ จาก นั้น จะ เป็น อย่าง ไร?\n\nโลก ของ เรา เป็น เหมือน พายุ เสมอ มา มี แนว โน้ม ที่ จะ เกิด พายุ และ น้ํา ท่วม ทุก ชนิด. ถ้าเราพบวิธีการที่จะใช้เงื่อนไขเหล่านี้ที่ไม่ซ้ํากัน เรามีโอกาสที่จะเรียก พายุจักรวาลโกรธ\n\nบรรพชนในตํานานของเรา มานานนับตั้งแต่ที่ ชํานาญความท้าทายในโลกของเรา ถึงเวลาต้องระเบิด เสียงกรีดร้องสู่ความว่างเปล่าแล้ว มันจะไม่ง่าย แต่ตามที่คําโบราณกล่าวว่า \"เฉพาะตัวหนาสามารถไปถึงขอบฟ้า.\"ชีวิตที่ปราศจากความตื่นเต้นเร้าใจจะมีค่าอะไรล่ะ? ใช้ชีวิตให้สุดเหวี่ยงและตายอย่างสุดขั้ว - นั่นคือวิถีทางของเราเสมอมา แต่เมื่อทุกหนทางถูกบุกเบิกและแม้กระทั่งยอดเขาที่สูงที่สุดก็ถูกพิชิตลงได้แล้ว จะทำอย่างไรต่อไปดี?\n\nดาวเคราะห์ของเราเต็มไปด้วยพายุมาแต่ไหนแต่ไร มีแนวโน้มที่จะเผชิญกับพายุและอุทกภัยสารพัดรูปแบบ หากเราพบวิธีใช้ประโยชน์จากเงื่อนไขที่เป็นเอกลักษณ์เหล่านี้ เราอาจมีโอกาสอัญเชิญพายุคอสมิกที่บ้าคลั่งขึ้นมาได้\n\nบรรพบุรุษระดับตำนานของเราได้เชี่ยวชาญความท้าทายของโลกบ้านเกิดมานานแล้ว ถึงเวลาแล้วที่จะพุ่งตัวออกไปสู่ความว่างเปล่า มันอาจไม่ใช่เรื่องง่าย แต่ดังคำกล่าวโบราณที่ว่า "

# Storm Rider Trait
 leader_trait_storm_rider_desc: "พายุไรเดอร์ดื่มด่ำไปกับสารอะดรีนาลีนที่สูบฉีด ปลดล็อกศักยภาพที่แท้จริงของพวกเขาในกระแสธารของพายุคอสมิก ตำแหน่งสภาจะเปลี่ยนโบนัสภาคสนามของพวกเขาเป็นโบนัสสภาแทน"
 mod_trait_storm_rider: "\n$t$ผลของคุณลักษณะจะเพิ่มขึ้นในขณะที่ผู้นำนี้อาศัยอยู่ในพายุคอสมิก"
 leader_trait_storm_rider_name: "สตอร์มไรเดอร์"
