 cstorms.2000.name: "การเตรียมรับมือพายุ"
 cstorms.2000.desc_common_1: "ตอนนี้พวกเราเข้าประจำตำแหน่งในระบบ §H[target.solar_system.GetName]§! แล้ว และพร้อมที่จะเริ่มการเตรียมการที่จำเป็นเพื่อสร้างพายุ §Y$default_storm$§!\n\nการอัดประจุพลังงานเกินพิกัดให้แก่ [target.GetName] ชั่วคราว จะช่วยให้เราสามารถสร้างสภาวะที่เหมาะสมที่สุดในการกระตุ้นปฏิกิริยาทางดาราอุตุนิยมวิทยาตามที่ต้องการได้"
 cstorms.2000.desc_tech: "\nด้วยการใช้วิธีการควบคุมพลังงานขั้นสูง เราสามารถทำให้ [target.GetName] อิ่มตัวด้วยวัตถุดิบต่างๆ เพื่อสร้างพายุที่มีโครงสร้างซับซ้อนยิ่งขึ้นได้"
 cstorms.2000.desc_common_2: "\nนี่จะเป็นความพยายามที่ต้องใช้เวลา แต่ผลลัพธ์สุดท้ายจะเป็นความสำเร็จอันยิ่งใหญ่ของ [owner.GetName] ตัวดาวฤกษ์เองจะยังคงสภาพสมบูรณ์ทุกประการหลังจากเสร็จสิ้นการปฏิบัติการ"
 cstorms.2000.a: "อัดประจุพลังงานดาวฤกษ์เกินพิกัด"
 cstorms.2000.a.tt: "$approach_situation_initiate_storm_supercharge_tt$"
 cstorms.2000.b: "เติมสารอิ่มตัวยวดยิ่งให้ดาวฤกษ์"
 cstorms.2000.b.tt: "$approach_situation_initiate_storm_overfeed_tt$"
 cstorms.2000.b.tt.allow: "ต้องการข้อใดข้อหนึ่งต่อไปนี้$TABBED_NEW_LINE$สัญญาณ สัญญาณ$approach_situation_initiate_storm_agitate$บรรทัด$t$[สัญญา]มีเทคโนโลยี £physics£ §Y$tech_basic_science_lab_3$§!$TABBED_NEW_LINE$t$TRIGGER_FAIL$ต้อง กําหนดเสร็จแน่นอน$TABBED_NEW_LINE$สัญญาณ สัญญาณ$approach_situation_initiate_storm_destabilize$บรรทัด$t$[สัญญา]มีเทคโนโลยี £physics£ §Y$tech_mine_dark_matter$§!$TABBED_NEW_LINE$สัญญาณ สัญญาณ$approach_situation_initiate_storm_scramble$บรรทัด$t$[สัญญา]มีเทคโนโลยี £physics£ §Y$tech_hyper_drive_3$§!$TABBED_NEW_LINE$t$TRIGGER_FAIL$ต้อง กําหนดเสร็จ พิมพ์ซ้ํา"
 cstorms.2000.c: "ยกเลิกโครงการ"

 cstorms.2010.name: "การปรับเทียบพายุ"
 cstorms.2010.desc_irradiate_only: "การเตรียมการสำหรับพายุ $default_storm$ ในระบบ §H[target.solar_system.GetName]§! มาถึงขั้นสำคัญแล้ว การดำเนินการในขั้นถัดไปต้องอาศัยการมุ่งเน้นอย่างเข้มข้นและการจัดสรรทรัพยากรใหม่เพื่อสร้างพายุ §Y$solar_storm$§! โดยการควบคุมลมสุริยะของ §H[target.GetName]§!"
 cstorms.2010.desc_others: "การเตรียมการสำหรับพายุ $default_storm$ ในระบบ §H[target.solar_system.GetName]§! มาถึงจุดเปลี่ยนสำคัญแล้ว การดำเนินการขั้นต่อไปมีความสำคัญยิ่ง และต้องการการจัดสรรทรัพยากรที่มุ่งเป้าไปยังเป้าหมายนี้มากขึ้น"
 cstorms.2010.a: "เพิ่มความแรงของลมสุริยะ"
 cstorms.2010.a.tt: "$approach_situation_initiate_storm_irradiate_tt$\nค่าใช้จ่าย $@irradiate_alloy_upkeep|0$ $r_alloys$ ต่อเดือน, ความคืบหน้า $@default_monthly_progress$ ต่อเดือน"
 cstorms.2010.b: "ตัดสนามอิเล็กตรอน"
 cstorms.2010.b.tt: "$approach_situation_initiate_storm_sever_tt$\nค่าใช้จ่าย $@sever_energy_upkeep|0$ $r_energy$ ต่อเดือน, ความคืบหน้า $@default_monthly_progress$ ต่อเดือน"
 cstorms.2010.c: "สร้างอำนาจแม่เหล็กให้ไอออน"
 cstorms.2010.c.tt: "$approach_situation_initiate_storm_magnetize_tt$\nค่าใช้จ่าย $@magnetize_mineral_upkeep|0$ $r_minerals$ ต่อเดือน, ความคืบหน้า $@default_monthly_progress$ ต่อเดือน"
 cstorms.2010.d: "ละทิ้งโครงการ"

 cstorms.2015.name: "$cstorms.2010.name$"
 cstorms.2015.desc_one_tech_only: "การเตรียมการสำหรับพายุ $default_storm$ ในระบบ §H[target.solar_system.GetName]§! มาถึงขั้นสำคัญแล้ว การดำเนินการขั้นถัดไปของ [storm_researcher.GetName] ต้องอาศัยการมุ่งเน้นอย่างเข้มข้นและการจัดสรรทรัพยากรใหม่เพื่อใช้ประโยชน์จากสภาวะขยายตัวของ [target.GetName]"
 cstorms.2015.desc_others: "การเตรียมการสำหรับพายุ $default_storm$ ในระบบ §H[target.solar_system.GetName]§! มาถึงจุดเปลี่ยนสำคัญแล้ว การดำเนินการขั้นถัดไปของ [storm_researcher.GetName] มีความสำคัญยิ่ง และต้องการการจัดสรรทรัพยากรที่มุ่งเป้าไปยังเป้าหมายนี้มากขึ้น หากเราจะใช้ประโยชน์จากสภาวะขยายตัวของ [target.GetName] ได้อย่างเหมาะสม"
 cstorms.2015.a: "กระตุ้นอนุภาค"
 cstorms.2015.a.tt: "$approach_situation_initiate_storm_agitate_tt$\nค่าใช้จ่าย $@rare_resource_upkeep|0$ $r_volatile_motes$ ต่อเดือน, ความคืบหน้า $@default_monthly_progress$ ต่อเดือน"
 cstorms.2015.b: "ทำให้สนามแรงโน้มถ่วงขาดความเสถียร"
 cstorms.2015.b.tt: "$approach_situation_initiate_storm_destabilize_tt$\nค่าใช้จ่าย $@rare_resource_upkeep|0$ $r_dark_matter$ ต่อเดือน, ความคืบหน้า $@default_monthly_progress$ ต่อเดือน"
 cstorms.2015.c: "กวนฝุ่นสวรรค์"
 cstorms.2015.c.tt: "$approach_situation_initiate_storm_scramble_tt$\nค่าใช้จ่าย $@rare_resource_upkeep|0$ $r_rare_crystals$ ต่อเดือน, ความคืบหน้า $@default_monthly_progress$ ต่อเดือน"
 cstorms.2015.d: "$cstorms.2010.d$"

 cstorms.storm_gathered.final_word: "การควบคุมพลังของพายุ $default_storm$ ไม่ใช่เรื่องเล็กๆ เลย ในที่สุดเราก็สามารถเก็บเกี่ยวผลตอบแทนที่รอคอยมานานจากความพยายามของเราได้เสียที"
 cstorms.storm_gathered.a: "ผลงานยอดเยี่ยมมาก"
 cstorms.2020.name: "ปลดปล่อยพายุ"
 cstorms.2020.desc: "ลมสุริยะที่ทวีความรุนแรงขึ้นของ §H[target.GetName]§! มาถึงมวลวิกฤตแล้ว\n\nพวกเราอยู่บนขอบเหวของการปลดปล่อยพายุ §Y$solar_storm$§!\n\n$cstorms.storm_gathered.final_word$"
 cstorms.2025.name: "$cstorms.2020.name$"
 cstorms.2025.desc: "สนามอิเล็กตรอนของ §H[target.GetName]§! ถูกตัดขาดโดยสิ้นเชิงแล้ว\n\nพวกเราอยู่บนขอบเหวของการปลดปล่อยพายุ §Y$electric_storm$§!\n\n$cstorms.storm_gathered.final_word$"
 cstorms.2030.name: "$cstorms.2020.name$"
 cstorms.2030.desc: "ไอออนของ §H[target.GetName]§! ได้รับการสร้างอำนาจแม่เหล็กเป็นผลสำเร็จแล้ว\n\nพวกเราอยู่บนขอบเหวของการปลดปล่อยพายุ §Y$magnetic_storm$§!\n\n$cstorms.storm_gathered.final_word$"
 cstorms.2035.name: "$cstorms.2020.name$"
 cstorms.2035.desc: "อนุภาคอิ่มตัวของ §H[target.GetName]§! มาถึงจุดแตกหักแล้ว\n\nพวกเราอยู่บนขอบเหวของการปลดปล่อยพายุ §Y$particle_storm$§!\n\n$cstorms.storm_gathered.final_word$"
 cstorms.2040.name: "$cstorms.2020.name$"
 cstorms.2040.desc: "สนามแรงโน้มถ่วงของ §H[target.GetName]§! ได้รับการลดความเสถียรลงอย่างเพียงพอแล้ว\n\nพวกเราอยู่บนขอบเหวของการปลดปล่อยพายุ §Y$gravity_storm$§!\n\n$cstorms.storm_gathered.final_word$"
 cstorms.2045.name: "$cstorms.2020.name$"
 cstorms.2045.desc: "ฝุ่นสวรรค์ของ §H[target.GetName]§! ถูกกวนจนปั่นป่วนโดยสิ้นเชิงแล้ว\n\nพวกเราอยู่บนขอบเหวของการปลดปล่อยพายุ §Y$celestial_storm$§!\n\n$cstorms.storm_gathered.final_word$"


### Aftermath Deposits ###

 d_magnetic_storm_1_minerals: "แร่แม่เหล็ก"
 d_magnetic_storm_1_minerals_desc: "พายุคอสมิกที่เคลื่อนผ่านได้สร้างอำนาจแม่เหล็กให้แก่แหล่งแร่ที่ยังไม่เคยถูกนำมาใช้งานจำนวนมหาศาล ทำให้การดำเนินการทำเหมืองของเราเข้าถึงทรัพยากรใหม่เหล่านี้ได้อย่างง่ายดายอย่างยิ่ง"
 d_magnetic_storm_2_alloys: "โรงหล่อหลอมจากพายุ"
 d_magnetic_storm_2_alloys_desc: "พายุคอสมิกที่เคลื่อนผ่านและสร้างความเสียหายแก่ดาวเคราะห์ดวงนี้ ได้ทิ้งให้อุปกรณ์โรงหล่อจำนวนมากมีประจุไฟฟ้าอย่างน่าประหลาด แม้จะไม่เข้าใจกลไกอย่างถ่องแท้ แต่การผลิตโลหะผสมของเราก็ดีขึ้นอย่างมีนัยสำคัญ"
 d_magnetic_storm_3_mix: "แผ่นดินบนท้องฟ้า"
 d_magnetic_storm_3_mix_desc: "ด้วยอำนาจแม่เหล็กจากผลกระทบของแรงโน้มถ่วงของพายุคอสมิกที่เคลื่อนผ่าน ผืนดินลอยฟ้าอันยิ่งใหญ่จึงสามารถบังคับทิศทางให้มาอยู่เหนือกลุ่มอุตสาหกรรมที่มีอยู่ได้โดยตรง"

 cstorms.8000.title: "การเปลี่ยนแปลงคอสมิก"
 cstorms.8000.desc: "พายุคอสมิกที่เคลื่อนผ่านได้ทิ้งอะไรไว้มากกว่าแค่ความเสียหายในภายหลัง บน [Planet.GetName] มันได้สร้างภูมิประเทศรูปแบบใหม่ทั้งหมดขึ้นมา"
 cstorms.8000.a: "น่าทึ่งมาก"

 d_electric_storm_1_engineering: "ซากปรักหักพังที่ถูกฟ้าผ่า"
 d_electric_storm_1_engineering_desc: "พายุคอสมิกความรุนแรงมหาศาลที่เคลื่อนผ่านได้เปลี่ยนนิคมที่เคยรุ่งเรืองให้กลายเป็นซากปรักหักพังที่ถูกฟ้าผ่า แปรสภาพวัสดุก่อสร้างธรรมดาของเราให้กลายเป็นสารประกอบที่หายากและไม่ธรรมดา"
 d_electric_storm_2_unity: "รอยแยกบนดาวเคราะห์"
 d_electric_storm_2_unity_desc: "พายุคอสมิกที่เคลื่อนผ่านได้ปลดปล่อยความพินาศอย่างหนาแน่นลงบนดาวเคราะห์ดวงนี้ จนเกิดเป็นรอยแผลเป็นที่มองเห็นได้จากอวกาศ"
 d_electric_storm_3_physics: "ซากยานที่พังเสียหาย"
 d_electric_storm_3_physics_desc: "พายุคอสมิกที่เคลื่อนผ่านได้สร้างความเสียหายแก่ระบบนำทางของยานพลเรือนจำนวนนับไม่ถ้วน เปลี่ยนพื้นที่ที่ได้รับผลกระทบรุนแรงที่สุดให้กลายเป็นสุสานอันน่าขนลุกของซากเรือที่พังยับเยินและเครื่องจักรที่ถูกทำลาย"

 d_particle_storm_1_society: "เมืองที่ถูกทำลายจากพายุ"
 d_particle_storm_1_society_desc: "พายุคอสมิกได้เปลี่ยนชานเมืองบางส่วนของเราให้กลายเป็นซากปรักหักพัง ซึ่งเหมาะสำหรับใช้ศึกษาร่องรอยที่หลงเหลืออยู่เท่านั้น"
 d_particle_storm_2_unity: "หลุมขนาดใหญ่"
 d_particle_storm_2_unity_desc: "พายุคอสมิกได้ทิ้งหลุมอุกกาบาตขนาดมหึมาไว้บนโลกนี้ เป็นเครื่องเตือนใจอันโหดร้ายว่าจักรวาลนี้ไม่ได้ใส่ใจต่อการมีอยู่ของเราเลย"
 d_particle_storm_3_motes: "พื้นที่สมดุลไม่เสถียรขนาดใหญ่"
 d_particle_storm_3_motes_desc: "พายุคอสมิกได้เปลี่ยนที่ราบกว้างใหญ่หลายแห่งให้กลายเป็นพื้นที่ที่มีกิจกรรมทางธรณีแปรสัณฐานสูง ซึ่งในความอันตรายที่เพิ่มขึ้นนั้นบังเอิญมาพร้อมกับการเพิ่มขึ้นของละอองธุลีแปรปรวนด้วยเช่นกัน"

 particle_storm_aftermath_1_tt: "ความเร็วในการประกอบหุ่นยนต์: §R-40%§!\n£minerals£ §Yแร่§! จากงาน: §R-10%§!\n£volatile_motes£ §Yผงแร่ระเหย§! จากประชากร: §G+0.02§!"
 particle_storm_aftermath_2_tt: "ความเร็วในการประกอบหุ่นยนต์: §R-50%§!\n£minerals£ §Yแร่§! จากงาน: §R-20%§!\n£volatile_motes£ §Yผงแร่ระเหย§! จากประชากร: §G+0.04§!"
 particle_storm_aftermath_3_tt: "ความเร็วในการประกอบหุ่นยนต์: §R-60%§!\n£minerals£ §Yแร่§! จากงาน: §R-30%§!\n£volatile_motes£ §Yผงแร่ระเหย§! จากประชากร: §G+0.06§!"

 d_solar_storm_1_energy: "ชั้นโอโซนเสื่อมโทรม"
 d_solar_storm_1_energy_desc: "พายุคอสมิกได้ฉีกชั้นโอโซนในชั้นบรรยากาศของดาวเคราะห์ดวงนี้จนเป็นรู แม้ว่าจะส่งผลกระทบต่อคุณภาพชีวิตของเราอย่างรุนแรง แต่คุณภาพของการผลิตกลับเพิ่มสูงขึ้น"
 d_solar_storm_2_districts: "ที่ราบสูงที่แผ่รังสี"
 d_solar_storm_2_districts_desc: "พายุคอสมิกได้อาบพื้นที่สูงของโลกนี้ด้วยรังสี ทำให้เกิดพื้นที่ที่ยอดเยี่ยมสำหรับการผลิตพลังงานของเรา"
 d_solar_storm_3_output: "ทะเลทรายเรืองแสง"
 d_solar_storm_3_output_desc: "พายุคอสมิกได้ทิ้งให้ทะเลทรายทั้งผืนเรืองแสง ซึ่งเป็นภาพที่อันตรายถึงชีวิต แต่ด้วยมาตรการรักษาความปลอดภัยที่เพียงพอ มันสามารถถูกเปลี่ยนเป็นแหล่งท่องเที่ยวที่สร้างผลกำไรทางการเงินได้"

 d_celestial_storm_1_mines: "คริสตัลแหลมคม"
 d_celestial_storm_1_mines_desc: "แรงระเบิดทำลายล้างของพายุคอสมิกที่เคลื่อนผ่านได้ทิ้งภูมิทัศน์ของผลึกแหลมคมขรุขระเอาไว้ ก่อให้เกิดภูมิประเทศที่อันตรายแต่ก็อาจสร้างผลกำไรได้"
 d_celestial_storm_2_society: "ตะกอนประวัติศาสตร์"
 d_celestial_storm_2_society_desc: "พายุคอสมิกที่เคลื่อนผ่านได้พัดพาเอาตะกอนทั้งชั้นออกไป เผยให้เห็นร่องรอยของยุคสมัยเก่าแก่ที่เราไม่เคยสามารถศึกษาได้มาก่อน"
 d_celestial_storm_3_crystal: "สตาร์ดัสต์ ดูนส์"
 d_celestial_storm_3_crystal_desc: "พายุคอสมิกที่เคลื่อนผ่านพัดพาเหนือโลกนี้ราวกับคลื่นยักษ์ ทิ้งรอยแผลเป็นไว้เป็นภูมิทัศน์ชวนฝันของเนินทรายฝุ่นสวรรค์ระยิบระยับ"

 celestial_storm_aftermath_1_tt: "อาชญากรรมในดาวเคราะห์: §R+10%§!\n£food£ §Yอาหาร§! จากงาน: §R-10%§!\n£rare_crystals£ §Yผลึกหายาก§! จากประชากร: §G+0.02§!"
 celestial_storm_aftermath_2_tt: "อาชญากรรมในดาวเคราะห์: §R+20%§!\n£food£ §Yอาหาร§! จากงาน: §R-20%§!\n£rare_crystals£ §Yผลึกหายาก§! จากประชากร: §G+0.04§!"
 celestial_storm_aftermath_3_tt: "อาชญากรรมในดาวเคราะห์: §R+30%§!\n£food£ §Yอาหาร§! จากงาน: §R-30%§!\n£rare_crystals£ §Yผลึกหายาก§! จากประชากร: §G+0.06§!"

 d_gravity_storm_1_districts: "ที่ราบพื้นอัดแน่น"
 d_gravity_storm_1_districts_desc: "ผลกระทบจากแรงโน้มถ่วงอันบดขยี้ของพายุคอสมิกที่เคลื่อนผ่านได้บีบอัดพื้นที่หลายแห่งที่ก่อนหน้านี้ถือว่าไม่เสถียรเกินกว่าจะก่อสร้างได้ ช่วยให้เราได้อสังหาริมทรัพย์ฟรีอย่างมีประสิทธิภาพ"
 d_gravity_storm_2_unity: "อนุสาวรีย์ที่ถูกบดเป็นผง"
 d_gravity_storm_2_unity_desc: "พายุคอสมิกที่เคลื่อนผ่านได้ปลดปล่อยแรงกดดันมหาศาลต่ออนุสาวรีย์บางแห่งที่บอบบางกว่าของเรา จนทำให้กลายเป็นผงธุลีและเศษซาก ซึ่งเป็นเครื่องเตือนใจให้ถ่อมตนถึงพลังอันน่าสะพรึงกลัวที่รอเราอยู่ข้างนอกนั่น"
 d_gravity_storm_3_engineering: "ถ้ำแรงโน้มถ่วง"
 d_gravity_storm_3_engineering_desc: "พายุคอสมิกที่เคลื่อนผ่านได้เปลี่ยนกลุ่มเหมืองแร่บางส่วนของเราให้กลายเป็นปล่องเหมืองที่พังทลายจากวัสดุบีบอัดยวดยิ่ง แม้ว่าความพยายามของเราในการเปิดเหมืองเหล่านั้นขึ้นมาใหม่จะช่วยจุดประกายทฤษฎีใหม่ๆ ในการเจาะและวิศวกรรม แต่ก็แทบไม่มีความคืบหน้าในการฟื้นฟูเหมืองเหล่านั้นเลย"

 d_shroud_storm_1_society: "ปรสิตพลังจิต"
 d_shroud_storm_1_society_desc: "พายุคอสมิกที่เคลื่อนผ่านได้แพร่กระจายปรสิตในหมู่ปศุสัตว์ของเรา การเปลี่ยนเฟสไปมาระหว่างความเป็นจริงของเรากับเดอะชราวด์ ทำให้พวกมันได้รับการพิสูจน์แล้วว่ากินได้ ดีต่อสุขภาพ และอร่อยอย่างน่าประหลาดใจ"
 d_shroud_storm_2_zro: "ทุ่งแร่ Zro"
 d_shroud_storm_2_zro_desc: "จากการแปรสภาพโดยพายุคอสมิกที่เคลื่อนผ่าน ไบโอมที่เขียวชอุ่มที่สุดของดาวเคราะห์ดวงนี้ได้กลายเป็นทุ่งซีโร่ที่โบกสะบัด สิ่งเหล่านี้คือแหล่งสะสมที่บริสุทธิ์ที่สุดที่เราเคยพบเจอมา"
 d_shroud_storm_3_happy: "ตัวตนของทะเลสาบ"
 d_shroud_storm_3_happy_desc: "พายุคอสมิกที่เคลื่อนผ่านได้ทิ้งของขวัญที่แปลกประหลาดและยอดเยี่ยมไว้ให้เรา แหล่งน้ำที่ใหญ่ที่สุดบนดาวเคราะห์ดวงนี้เกิดระลอกคลื่นที่สร้างลวดลายและสัญลักษณ์ที่มีความสำคัญอย่างเห็นได้ชัด ซึ่งสามารถตอบคำถามต่างๆ ด้วยปัญญาอันน่าทึ่ง"

### Shroud Storm Events
 shroud_switched: "ถูกบดบังโดยเดอะชราวด์"
 shroud_switched_tt: "ม่านหมอกแห่งเดอะชราวด์ยังคงหลงเหลืออยู่บนวัตถุท้องฟ้านี้ การปรากฏตัวที่ผิดธรรมชาติของพวกมันบ่งบอกถึงการรั่วไหลอย่างรุนแรงหรือผลพวงของพายุชราวด์ที่หายนะ"

 cstorms.8510.title: "การสลับทางพลังจิต"
 cstorms.8510.desc: "ด้วยกิจกรรมพลังจิตที่พลุ่งพล่าน [from.GetName] ได้ถูกสลับตัวกับ [from.GetClassName] จากแหล่งที่ไม่รู้จัก"
 cstorms.8510.a: "โชคชะตาที่แปลกประหลาด"
 cstorms.8515.title: "การแปลงรูปมวลชน"
 cstorms.8515.desc: "พลังงานจิตที่พลุ่งพล่านได้พัดผ่าน [from.GetName] ทำให้ประชากรบางส่วนเปลี่ยนไปในทางที่ท้าทายกฎเกณฑ์ธรรมชาติ กลุ่มชนทั้งหมดถูกหล่อหลอมขึ้นใหม่ รูปลักษณ์ของพวกเขาในตอนนี้กลายเป็นสิ่งแปลกปลอมและไม่คุ้นเคย ราวกับมีบางสิ่งบางอย่างที่เกินกว่าความเข้าใจของเราได้เขียนแก่นแท้ของพวกเขาขึ้นมาใหม่"
 cstorms.8515.a: "พลังงานที่ไม่รู้จักเริ่มเคลื่อนไหว..."
 cstorms.8520.title: "การแปรธาตุดารา"
 cstorms.8520.desc: "พลังงานจิตที่พลุ่งพล่านได้สร้าง [from.GetName] ขึ้นใหม่ โดยเปลี่ยนให้กลายเป็นดาวฤกษ์ที่มีธรรมชาติใหม่ทั้งหมด ตอนนี้ [from.GetClassName] กำลังสาดส่องแสงประหลาดของมันไปยังระบบ [from.solar_system.GetName] ราวกับว่าความจริงนั้นถูกดัดแปลงไปเอง"
 cstorms.8520.a: "แม้แต่หมู่ดาวก็ไม่รอดพ้น..."

