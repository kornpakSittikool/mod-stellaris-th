 particle_storm_aftermath_modifier: "ลมกัดกร่อน"
 particle_storm_aftermath_modifier_tooltip: "$STORM_AFTERMATH_DESC$\n$t$- §H$particle_storm_aftermath_modifier$§!:\n$tt$- §R-40%§! ถึง §R-60%§! $MOD_PLANET_POP_ASSEMBLY_MULT$\n$tt$- §R-10%§! ถึง §R-30%§! $mod_planet_jobs_minerals_produces_mult$\n$tt$- §G+0.02§! ถึง §G+0.06§! $r_volatile_motes$ จากประชากร"
 particle_storm_aftermath_modifier_severity_desc: "$particle_storm$ บดขยี้ทุกสิ่งตั้งแต่โลหะไปจนถึงสิ่งมีชีวิตอินทรีย์ ก่อให้เกิดความเสียหายอย่างใหญ่หลวงต่อผลผลิตแร่ธาตุของเรา อย่างไรก็ตาม สารตกค้างนั้นมีสารที่มีคุณค่าอยู่"
