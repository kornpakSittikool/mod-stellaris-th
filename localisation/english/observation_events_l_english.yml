 #Refactored Observation Events

 observation.2011.name:2 "การพัฒนาเทคโนโลยี: อุปสรรคบน [pre_ftl_planet.GetName]"
 observation.2011.desc:1 "ที่ปรึกษาของเราบนดาว [pre_ftl_planet.GetName] ประสบปัญหาในการทำงานร่วมกับชาวพื้นเมืองในภารกิจเพื่อยกระดับเทคโนโลยีของพวกเขา ชาว [pre_ftl_planet.Owner.GetSpeciesNamePlural] หลายคนปฏิเสธที่จะมีส่วนเกี่ยวข้องกับเรา และแม้กระทั่งในกลุ่มผู้ที่กระตือรือร้นที่จะเรียนรู้มากที่สุดก็มองนักวิทยาศาสตร์ของเราด้วยความหวาดระแวงและรังเกียจ\n\nการเกลียดกลัวชาวต่างชาตินี้ทำให้ตารางเวลาของเราล่าช้า การสอนชาว [pre_ftl_planet.Owner.GetSpeciesNamePlural] จะใช้เวลานานกว่าที่คาดไว้"
 observation.2014.name:1 "การพัฒนาเทคโนโลยี: ความก้าวหน้าบน [pre_ftl_planet.GetName]"
 observation.2014.desc:1 "ผู้คนบนดาว [pre_ftl_planet.GetName] ยินดีอย่างมากกับเทคโนโลยีที่เราได้แบ่งปันให้กับพวกเขา พวกเขาหลั่งไหลมายังดินแดนส่วนแยกที่เราจัดตั้งขึ้นบนพื้นผิวโลกของพวกเขา คอยถามคำถามนักวิทยาศาสตร์ของเราเกี่ยวกับวัฒนธรรมและประวัติศาสตร์ของเราอย่างไม่ขาดสาย\n\nความกระตือรือร้นของชาว [pre_ftl_planet.Owner.GetSpeciesNamePlural] ในการเรียนรู้เพิ่มเติมเกี่ยวกับเราได้เร่งภารกิจเพื่อยกระดับความก้าวหน้าทางเทคโนโลยีของพวกเขา เราได้ทำการปรับปรุงเวลาประมาณการใหม่"
 observation.2014.tt:0 "§Y[pre_ftl_country.GetName]§!: ความก้าวหน้าทางเทคโนโลยี §G+20%§!"
 observation.2016.name:1 "การพัฒนาเทคโนโลยี: อุปสรรคบน [pre_ftl_planet.GetName]"
 observation.2016.desc:1 "ชาว [pre_ftl_species.GetName] บนดาว [pre_ftl_planet.GetName] กลับกลายเป็นผู้ที่สอนได้ยาก ที่ปรึกษาด้านวิทยาศาสตร์ของเรารายงานว่าสิ่งมีชีวิตต่างดาวเหล่านี้ละทิ้งวิถีชีวิตดั้งเดิมของตนอย่างช้าๆ และยิ่งช้าลงไปอีกในการยอมรับแนวคิดและไอเดียใหม่ๆ ดูเหมือนว่าภารกิจยกระดับทางความรู้ของเราอาจใช้เวลานานกว่าที่คาดไว้"
 observation.2016.tt:0 "§Y[pre_ftl_country.GetName]§!: ความก้าวหน้าทางเทคโนโลยี §R-20%§!"
 observation.2018.name:1 "การพัฒนาเทคโนโลยี: อุปสรรคบน [pre_ftl_planet.GetName]"
 observation.2018.desc:1 "เรากำลังประสบปัญหาในการค้นหาที่ปรึกษาด้านวิทยาศาสตร์ที่ยินดีเข้าร่วมภารกิจการพัฒนาเทคโนโลยีบนดาว [pre_ftl_planet.GetName] ด้วย... รูปลักษณ์และกลิ่นที่เป็นเอกลักษณ์ของชาว [pre_ftl_species.GetName] การอยู่ต่อหน้าพวกเขาถือเป็นความท้าทายอย่างมาก\n\nการมอบหมายงานให้ลงไปยังพื้นผิวของ [pre_ftl_planet.GetName] เริ่มถูกมองว่าเป็นบทลงโทษ สิ่งนี้ได้ทำให้ความคืบหน้าของภารกิจล่าช้าลงอย่างน่าเสียดาย"
 observation.2018.tt:0 "§Y[pre_ftl_country.GetName]§!: ความก้าวหน้าทางเทคโนโลยี §R-20%§!"
 observation.2020.desc:1 "ชาว [pre_ftl_species.GetNamePlural] แห่งดาว [pre_ftl_planet.GetName] แสดงให้เห็นถึงคุณลักษณะของการเป็นนักวิทยาศาสตร์ตามธรรมชาติ ที่ปรึกษาของเราที่ประจำการบนดาวของพวกเขาประทับใจกับความก้าวหน้าที่เกิดขึ้น รายงานของพวกเขาชี้ให้เห็นว่าภารกิจของเราเพื่อผลักดันอารยธรรม [pre_ftl_species.GetName] ไปสู่ยุคอวกาศอาจจะสำเร็จก่อนกำหนด"
 observation.2022.desc:0 "ภารกิจนำการพัฒนาเทคโนโลยีมาสู่ชาว [pre_ftl_species.GetNamePlural] บนดาว [pre_ftl_planet.GetName] ดำเนินไปก่อนกำหนด ส่วนใหญ่เป็นเพราะสติปัญญาที่โดดเด่นของพวกเขา แม้ว่าอารยธรรมของพวกเขาจะยังค่อนอย่างเยาว์วัย แต่ที่ปรึกษาทางวิทยาศาสตร์ของเราเห็นศักยภาพที่ยิ่งใหญ่ในตัวชาว [pre_ftl_species.GetName]"
 observation.2030.name:0 "การเปลี่ยนแปลงทางจริยธรรมบน [pre_ftl_planet.GetName]"
 observation.2030.desc:0 "การติดต่อกับที่ปรึกษาทางวิทยาศาสตร์ของเราเป็นเวลานานบนดาว [pre_ftl_planet.GetName] ดูเหมือนจะทำให้ชาวพื้นเมืองยอมรับสายพันธุ์และวัฒนธรรมอื่นได้มากขึ้น ชาว [pre_ftl_species.GetNamePlural] ไม่แสดงปฏิกิริยาต่อต้านด้วยความรังเกียจอย่างรวดเร็วอีกต่อไปเมื่อมองเห็นสิ่งที่แปลกแยกจากพวกเขา"
 observation.2031.desc:1 "หลังจากทำงานร่วมกับนักวิทยาศาสตร์และที่ปรึกษาของเราอย่างใกล้ชิดบนดาว [pre_ftl_planet.GetName] ชาว [pre_ftl_species.GetNamePlural] ดูเหมือนจะพัฒนาความสนใจอย่างลึกซึ้งต่อสิ่งต่างดาวทั้งหมด"
 observation.2031.tt:0 "ผู้คนบนดาว [pre_ftl_planet.GetName] จะยอมรับแนวคิดเปิดกว้างต่อต่างดาว(เสียงตกใจ)มากขึ้น"
 observation.social.intro:0 "ชาวพื้นเมืองบนดาว [pre_ftl_planet.GetName] ไม่เพียงแต่หลงใหลในเทคโนโลยีของเราเท่านั้น แต่ที่ปรึกษาของเรายังรายงานว่าพวกเขาเริ่มเลียนแบบวิถีชีวิตของเราด้วย"
 observation.2032.desc:0 "$observation.social.intro$\n\nพวกเขาดูเหมือนจะยอมรับปรัชญาแห่งสันติภาพและการไม่ใช้ความรุนแรง ตั้งแต่เรามาถึง ความขัดแย้งระหว่างกลุ่มวัฒนธรรม [pre_ftl_species.GetName] ต่างๆ ก็ได้ยุติลงเกือบทั้งหมด"
 observation.2032.tt:0 "ผู้คนบนดาว [pre_ftl_planet.GetName] จะหันมาหาวิถีรักสงบ (Pacifism)"
 observation.2033.desc:1 "$observation.social.intro$\n\nด้วยอาวุธชนิดใหม่ที่เราให้พวกเขาเข้าถึง ชาว [pre_ftl_species.GetNamePlural] ได้พัฒนาความซาบซึ้งใจครั้งใหม่ต่อศิลปะแห่งสงคราม สังคมของพวกเขาได้เข้าสู่การมีลักษณะทางทหารอย่างเด่นชัดตั้งแต่เรามาถึง"
 observation.2033.tt:0 "ผู้คนบนดาว [pre_ftl_planet.GetName] จะหันมาหาวิถีรักสงคราม(อภินิหาร)"
 observation.2034.desc:0 "$observation.social.intro$\n\nเราทำหน้าที่เป็นตัวอย่างที่ประสบความสำเร็จ สอนพวกเขากล่าวถึงคุณค่าของความเป็นผู้นำที่เข้มแข็งและเป็นเอกภาพ บัดนี้ชาว [pre_ftl_species.GetNamePlural] ตระหนักแล้วว่านี่คือหนทางเดียวที่จะบรรลุความยิ่งใหญ่ในฐานะอารยธรรม"
 observation.2034.tt:0 "ผู้คนบนดาว [pre_ftl_planet.GetName] จะหันมาหาวิถีอำนาจนิยม (Authoritarianism)"
 observation.2035.desc:1 "$observation.social.intro$\n\nได้รับแรงบันดาลใจจากสิ่งที่พวกเขาเห็นจากศิลปะและวัฒนธรรมของเรา สังคมของ [pre_ftl_species.GetName] ดูเหมือนจะพัฒนาสำนึกแห่งความเท่าเทียมทางสังคมครั้งใหม่ เสรีภาพส่วนบุคคลของพวกเขาเพิ่มขึ้นอย่างมากตั้งแต่เรามาถึง"
 observation.2035.tt:0 "ผู้คนบนดาว [pre_ftl_planet.GetName] จะหันมาหาวิถีความเท่าเทียม(สัญชาตินิยม)"
 observation.2036.desc:0 "$observation.social.intro$\n\nภารกิจสอนคุณค่าของวิทยาศาสตร์ให้แก่ชาว [pre_ftl_species.GetName] ได้ส่งผลกระทบอย่างลึกซึ้งต่อสังคมของพวกเขา ศาสนาที่มีโครงสร้างองค์กรกำลังอยู่ในช่วงขาลง และความเชื่อเรื่องงมงายหลายประการกำลังถูกละทิ้ง"
 observation.2036.tt:0 "ผู้คนบนดาว [pre_ftl_planet.GetName] จะหันมาหาวิถีวัตถุนิยม(มรณกรรม)"
 observation.2037.desc:1 "$observation.social.intro$\n\nหลังจากได้เห็นความเข้มแข็งในศรัทาของเรา ชาว [pre_ftl_species.GetNamePlural] หลายคนได้หลั่งไหลกลับไปหาศาสนาดั้งเดิมของอารยธรรมตนเอง พร้อมกับผนวกองค์ประกอบของความเชื่อของเราเข้ากับความเชื่อของพวกเขา"
 observation.2037.tt:0 "ผู้คนบนดาว [pre_ftl_planet.GetName] จะหันมาหาวิถีจิตนิยม (Spiritualist)"
 observation.2038.desc:0 "นักวิทยาศาสตร์บางคนที่ส่งไปเป็นที่ปรึกษาให้ชาว [pre_ftl_species.GetNamePlural] แห่งดาว [pre_ftl_planet.GetName] ได้ตั้งคำถามถึงความฉลาดของภารกิจของเราที่นั่น พวกเขารายงานว่าชาวพื้นเมืองสนใจเพียงการได้รับเทคโนโลยีอาวุธชนิดใหม่เท่านั้น\n\nความพยายามอันน่าเบื่อหน่ายของพวกเขาในการเปลี่ยนเทคโนโลยีสันติภาพที่เรามอบให้เป็นเครื่องมือสำหรับสงครามได้ทำให้ภารกิจของเราล่าช้าลงอย่างน่าเสียใจ"
 observation.2039.desc:1 "ภารกิจในการให้ความรู้แก่อารยธรรมพื้นเมืองบนดาว [pre_ftl_planet.GetName] ไม่ได้ดำเนินไปตามที่วางแผนไว้ นักวิทยาศาสตร์ชาว [pre_ftl_species.GetName] มักจะแสดงความตื่นตกใจเมื่อเราพยายามสอนพวกเขาเกี่ยวกับเทคโนโลยีอาวุธชนิดใหม่\n\nที่ปรึกษาด้านวิทยาศาสตร์ของเราต้องใช้เวลาหลายสัปดาห์เพื่อทำให้พวกเขาสงบลงหลังจากที่เราจำลองภาพแสดงผลของการจุดชนวนระเบิดฟิวชันเหนือเมืองที่มีประชากรหนาแน่น สิ่งนี้ได้ทำให้ความก้าวหน้าของเราล่าช้าลงอย่างน่าเสียใจ"
 observation.2040.desc:0 "เราประสบความขัดแย้งในการทำงานร่วมกับชาวดาว [pre_ftl_planet.GetName] ในภารกิจที่จะยกระดับอารยธรรมของพวกเขา ชาว [pre_ftl_species.GetNamePlural] แสดงให้เห็นถึงความเชื่องมงายที่เหนียวแน่น และที่ปรึกษาด้านวิทยาศาสตร์ของเรามักจะรู้สึกขัดใจกับประเพณีทางศาสนาที่ลึกลับและการปฏิเสธอย่างดื้อรั้นที่จะยอมรับการพิสูจน์เชิงวัตถุ\n\nโชคร้ายที่ดูเหมือนเวลาประมาณการในตอนแรกสำหรับภารกิจนี้จะมองในแง่ดีเกินไป"
 observation.2041.desc:1 "ความพยายามของเราในการยกระดับจิตวิญญาณแก่ชาว [pre_ftl_species.GetNamePlural] และนำทางพวกเขาไปสู่เส้นทางที่แท้จริงสู่หมู่ดาวต้องเผชิญกับความผิดหวัง ที่ปรึกษาด้านศาสนาและวิทยาศาสตร์ของเราบนดาว [pre_ftl_planet.GetName] รายงานถึงความกังวลเกี่ยวกับการขาดแคลนศรัทธาจากประชากรพื้นเมือง พวกเขายินยอมรับเทคโนโลยีของเราได้อย่างง่ายดาย แต่ไม่ใช่บทเรียนทางจิตวิญญาณที่จำเป็นสำหรับการนำไปใช้อย่างรับผิดชอบ\n\nสิ่งนี้ขัดขวางภารกิจนำทางชาว [pre_ftl_species.GetNamePlural] ไปสู่ปัญญาความรู้ มันจะใช้เวลานานกว่าที่สัญญาณศักดิ์สิทธิ์ได้ระบุไว้"
 observation.2042.desc:0 "สังคมเผด็จการทหารที่กดขี่บนดาว [pre_ftl_planet.GetName] ได้ขัดขวางความพยายามของเราในการยกระดับเทคโนโลยีของชาว [pre_ftl_species.GetNamePlural] ความคิดและการริเริ่มสร้างสรรค์ส่วนบุคคล - ซึ่งจำเป็นต่อความเจริญรุ่งเรืองทางวิทยาศาสตร์ - ได้ถูกขัดขวางในหมู่ชาว [pre_ftl_species.GetNamePlural]\n\nความเป็นเผด็จการที่แพร่หลายของพวกเขาได้ยับยั้งความก้าวหน้าของภารกิจ - ที่ปรึกษาด้านวิทยาศาสตร์ส่งรายงานระบุว่ามีแนวโน้มจะใช้เวลานานกว่าที่คาดคิด"
 observation.2043.desc:1 "อนาธิปไตยครองเมืองบนพื้นผิวของ [pre_ftl_planet.GetName] และที่ปรึกษาของเราประสบปัญหาอย่างมากในการสอนวิทยาศาสตร์ยุคใหม่ให้แก่ชาว [pre_ftl_species.GetNamePlural] ในบางครั้งดูเหมือนว่านักวิทยาศาสตร์ทุกคนจะมีวิสัยทัศน์ที่แตกต่างกันสำหรับโครงการนี้ โดยไม่สนใจความต้องการของทีมงานหรือประโยชน์ส่วนรวมเลย\n\nภารกิจให้ความรู้ของเรายังคงดำเนินต่อไป แม้จะเผชิญกับลัทธิความเท่าเทียมที่หลงทางซึ่งแสดงโดยประชากรท้องถิ่น แต่มันจะใช้เวลานานกว่าที่คาดคิด"

 ### New events which fire before nuclear war/apocalypse gatekeepers, giving the player a final chance to stop pre-FTLs from blowing themselves up! ###
 # This event appears prior to observation.107 (religious nuclear war) #
 observation.3205.name:0 "ความล่มสลายที่ใกล้เข้ามาบน [pre_ftl_planet.GetName]"
 observation.3205.desc:0 "หลังจากได้เห็นการรับตัวพระผู้ช่วยให้รอดของพวกเขาขึ้นสู่สรวงสวรรค์ พลเมืองของดาว [pre_ftl_planet.GetName] ก็ไม่ได้อยู่ในสภาพที่ดี สังคมกำลังแตกแยก และความตึงเครียดได้ทวีความรุนแรงขึ้นจนถึงระดับที่ไม่อาจยอมรับได้\n\nหากเราไม่ดำเนินการใดๆ พวกเขาจะใช้เทคโนโลยีของเราเพื่อทำลายล้างกันเองในสงครามศาสนาทั่วทั้งดวงดาว"
 observation.3205.a:0 "กู้คืนเทคโนโลยีของเรากลับมา"
 observation.3205.b:0 "เราต้องไม่เสี่ยงต่อการปนเปื้อนทางวัฒนธรรมเพิ่มเติม"
 # This event appears prior to observation.204 (nuclear war following downed shuttle and stolen tech) #
 observation.3210.name:0 "หายนะกำลังก่อตัวบน [pre_ftl_planet.GetName]"
 observation.3210.desc:0 "เทคโนโลยีที่ถูกค้นพบจากเศษกระสวยตกของเราบนดาว [pre_ftl_planet.GetName] ถือเป็นภัยคุกคามต่อสิ่งมีชีวิตทั้งหมดบนโลกดวงนั้น ด้วยการขาดแคลนความรู้ความเข้าใจทางวิทยาศาสตร์ของเรา พวกเขาอาจใช้เทคโนโลยีของเราเพื่อทำลายล้างตัวเองได้อย่างง่ายดาย\n\nหากเราไม่เข้าแทรกแซง สิ่งนี้จะเป็นหายนะอย่างแน่นอน"
 observation.3210.a:0 "สั่งการระเบิดทำลายตัวเองของกระสวย"
 observation.3210.b:0 "ความเสียหายได้รับการเกิดขึ้นไปเรียบร้อยแล้ว"
 # This event appears prior to observation.1400 (random nuclear war) #
 observation.3215.name:0 "สถานการณ์นิวเคลียร์ทวีความรุนแรงบน [pre_ftl_planet.GetName]"
 observation.3215.desc:0 "ความตึงเครียดกำลังปะทุขึ้นบนดาว [pre_ftl_planet.GetName] สงครามนิวเคลียร์กำลังใกล้เข้ามา หากเราไม่ทำอะไรเลย พวกเขาจะทำลายล้างตัวเอง\n\nเราคือความหวังเดียวของพวกเขา"
 observation.3215.a:0 "แทรกซึมอย่างลับๆ เพื่อคลี่คลายสถานการณ์"
 observation.3215.b:0 "ไม่มีความจำเป็นสำหรับการสืบราชการลับเพิ่มเติมแล้ว"

