 observation.209.name:1 "อาวุธชนิดใหม่บน [pre_ftl_planet.GetName]"
 observation.209.reg_pre_ftl.desc:0 "ประเทศบนดาว [pre_ftl_planet.GetName] ที่ยิงกระสวยของเราตกได้บังคับให้นักวิทยาศาสตร์ของเราที่ถูกจับกุมออกแบบอาวุธสงครามชนิดใหม่สำหรับกองทัพของพวกเขา ด้วยอุปกรณ์นี้ พวกเขาประสบความสำเร็จในการรุกรานประเทศเพื่อนบ้านหลายประเทศ และตอนนี้กำลังอยู่ในกระบวนการรวมดินแดนทั้งหมดของ [pre_ftl_planet.GetPlanetHabitat] ภายใต้การปกครองของพวกเขา"
 observation.209.hive_pre_ftl.desc:0 "จิตสำนึกร่วมบนดาว [pre_ftl_planet.GetName] ที่ยิงกระสวยของเราตกได้บังคับให้นักวิทยาศาสตร์ของเราที่ถูกจับกุมออกแบบอาวุธสงครามชนิดใหม่สำหรับกองทัพของพวกเขา ด้วยอุปกรณ์นี้ พวกเขาประสบความสำเร็จในการรุกรานรังเพื่อนบ้านหลายแห่ง และตอนนี้กำลังอยู่ในกระบวนการรวมดินแดนทั้งหมดของ [pre_ftl_planet.GetPlanetHabitat] ภายใต้การปกครองของพวกเขา"
 observation.209.reg_pre_ftl.desc.gestalt:0 "ประเทศบนดาว [pre_ftl_planet.GetName] ที่ยิงกระสวยของเราตกได้บังคับให้โดรนของเราที่ถูกจับกุมออกแบบอาวุธสงครามชนิดใหม่สำหรับกองทัพของพวกเขา ด้วยอุปกรณ์นี้ พวกเขาประสบความสำเร็จในการรุกรานประเทศเพื่อนบ้านหลายประเทศ และตอนนี้กำลังอยู่ในกระบวนการรวมดินแดนทั้งหมดของ [pre_ftl_planet.GetPlanetHabitat] ภายใต้การปกครองของพวกเขา"
 observation.209.hive_pre_ftl.desc.gestalt:0 "จิตสำนึกร่วมบนดาว [pre_ftl_planet.GetName] ที่ยิงกระสวยของเราตกได้บังคับให้หน่วยอิสระ [root.GetIndividualName] ของเราที่ถูกจับกุมออกแบบอาวุธสงครามชนิดใหม่สำหรับกองทัพของพวกเขา ด้วยอุปกรณ์นี้ พวกเขาประสบความสำเร็จในการรุกรานรังเพื่อนบ้านหลายแห่ง และตอนนี้กำลังอยู่ในกระบวนการรวมดินแดนทั้งหมดของ [pre_ftl_planet.GetPlanetHabitat] ภายใต้การปกครองของพวกเขา"
 observation.209.a:1 "นี่เป็นเรื่องที่ยอมรับไม่ได้!"

 observation.211.name:1 "ข้อตกลงตัวประกัน"
 observation.211.reg.start:0 "ประเทศบนดาว [pre_ftl_planet.GetName] ที่ยิงกระสวยของเราตกได้ส่งสัญญาณเปิดเข้ามาในอวกาศผ่านดาวเทียมดวงหนึ่งของพวกเขา ดูเหมือนว่าจะตั้งใจส่งถึงเรา"
 observation.211.hive_mind.start:0 "จิตสำนึกร่วมบนดาว [pre_ftl_planet.GetName] ที่ยิงกระสวยของเราตกได้ส่งสัญญาณเปิดเข้ามาในอวกาศผ่านดาวเทียมดวงหนึ่งของพวกเขา ดูเหมือนว่าจะตั้งใจส่งถึงเรา"
 observation.211.end:0 "พวกเขากำลังเรียกร้องให้เราแบ่งปันเทคโนโลยีขั้นสูงเพื่อแลกกับชีวิตของนักวิทยาศาสตร์ที่พวกเขาจับกุมได้ที่จุดตกกระสวย หากเราปฏิเสธ นักวิทยาศาสตร์ของเราจะถูกประหารชีวิตต่อสาธารณชนผ่านระบบแพร่ภาพโทรทัศน์ที่หยาบๆ ของพวกเขา"
 observation.211.gestalt.end:0 "พวกเขากำลังเรียกร้องให้เราแบ่งปันเทคโนโลยีขั้นสูงเพื่อแลกกับชีวิตของหน่วยอิสระ [GetIndividualNamePlural] ที่พวกเขาจับกุมได้ที่จุดตกกระสวย หากเราปฏิเสธ หน่วยอิสระของเราจะถูกประหารชีวิตต่อสาธารณชนผ่านระบบแพร่ภาพโทรทัศน์ที่หยาบๆ ของพวกเขา"

 observation.211.reg_pre_ftl.desc:0 "$observation.211.reg.start$\n\n$observation.211.end$"
 observation.211.hive_pre_ftl.desc:0 "$observation.211.hive_mind.start$\n\n$observation.211.end$"
 observation.211.reg_pre_ftl.desc.gestalt:0 "$observation.211.reg.start$\n\n$observation.211.gestalt.end$"
 observation.211.hive_pre_ftl.desc.gestalt:0 "$observation.211.hive_mind.start$\n\n$observation.211.gestalt.end$"
 observation.211.a:1 "ความปลอดภัยของประชาชนของเราต้องมาก่อน"
 observation.211.a.gestalt:1 "ความปลอดภัยของหน่วยประมวลผลอัตโนมัติของเราต้องมาก่อน"
 observation.211.b:1 "พวกเขายังไม่พร้อมอย่างเห็นได้ชัด"

 observation.212.name:1 "ตัวประกันถูกประหารชีวิต"
 observation.212.desc:1 "ในเหตุการณ์ที่อธิบายได้เพียงว่าเป็นเรื่องอุจาดตา นักวิทยาศาสตร์ที่ถูกจับกุมตัวบนดาว [pre_ftl_planet.GetName] ถูกนำมาเดินแห่ประจานหน้ากล้องในรายการโทรทัศน์สดในฐานะ \"ปีศาจต่างดาว\""
 observation.212.desc.mach:1 "ในเหตุการณ์ที่อธิบายได้เพียงว่าเป็นเรื่องอุจาดตา หน่วยวิทยาศาสตร์ที่ถูกจับกุมตัวบนดาว [pre_ftl_planet.GetName] ถูกนำมาเดินแห่ประจานหน้ากล้องในรายการโทรทัศน์สดในฐานะ \"ปีศาจจักรกลจากห้วงอวกาศ\""
 observation.212.a:1 "น่าชิงชังยิ่งนัก!"

# Smuggler Outpost
 observation.301.name:1 "ค่ายผู้ลักลอบขนสินค้าเถื่อน"
 observation.301.desc:1 "สถานีสังเกตการณ์ของเราเหนือดาว [pre_ftl_planet.GetName] ตรวจพบการตั้งถิ่นฐานที่ผิดกฎหมายบนพื้นผิวของ [pre_ftl_planet.GetPlanetHabitat] ดูเหมือนว่าจะเป็นค่ายพักบางประเภทที่จัดตั้งขึ้นโดยผู้ลักลอบค้าของเถื่อนเผ่าพันธุ์ [Root.GetSpeciesName] และองค์กรอาชญากรรมจากจักรวรรดิ [Root.GetName]\n\nมีเหตุการณ์ประปรายที่ผู้ลักลอบค้าของเถื่อนได้เข้ามาติดต่อกับชาว [GetPreFTLLowerPlural] พื้นเมือง - บางเหตุการณ์จบลงด้วยความรุนแรง เราต้องดำเนินการอย่างรวดเร็วเพื่อควบคุมสถานการณ์นี้และนำตัวอาชญากรออกไปก่อนที่พวกเขาจะสร้างความเสียหายเพิ่ม"
 observation.301.a:1 "กวาดล้างพวกมันให้หมด"
 observation.301.b:1 "ผู้ลักลอบขนของเถื่อนไม่กี่คนจะสร้างอันตรายอะไรได้?"
 observation.302.name:1 "การจู่โจมผู้ลักลอบ"
 observation.302.desc:1 "ในการจู่โจมอย่างสายฟ้าแลบ กองกำลังภาคพื้นดินของเราได้บุกเข้าโจมตีค่ายผู้ลักลอบขนสินค้าเถื่อนบนดาว [pre_ftl_planet.GetName] หลังจากปะทะกันช่วงสั้นๆ อาชญากรที่รอดชีวิตถูกจับกุมและส่งตัวขึ้นสู่วงโคจร อาคารเปล่าๆ ถูกทำลายด้วยการระเบิด\n\nเชื่อว่าการปนเปื้อนทางวัฒนธรรมมีน้อยมาก และกองกำลังของเรายังยึดสินค้าเถื่อนที่ผิดกฎหมายได้จำนวนมาก กำไรจากการยึดทรัพย์นี้ได้ถูกนำเข้าสู่คลังส่วนกลางของเราแล้ว"
 observation.302.a:1 "ชัยชนะครั้งสำคัญ"
 observation.303.name:1 "การค้าอาวุธเถื่อน"
 observation.303.desc:3 "เรามาสายเกินไป ผู้ลักลอบขนของเถื่อนบนดาว [pre_ftl_planet.GetName] ได้เริ่มค้าขายอาวุธยุคใหม่และสารกระตุ้นระบบประสาทให้แก่ชาว [GetPreFTLLowerPlural] ในท้องถิ่นเพื่อแลกกับโลหะมีค่าและทาส\n\nการต่อสู้ได้ปะทุขึ้นระหว่างกลุ่ม [GetPreFTLLower] ต่างๆ เนื่องด้วยอาวุธเทคโนโลยีสูงที่อยู่ในมือของพวกเขา ยอดผู้เสียชีวิตของทั้งสองฝ่ายจึงน่าสยดสยอง การปนเปื้อนทางวัฒนธรรมเป็นเรื่องที่ไม่อาจย้อนกลับได้ในจุดนี้"
 observation.303.a:1 "นี่คือหายนะ"

# Scientist Abduction
 observation.1001.name:0 "ข้อเสนอการลักพาตัว"
 observation.1001.desc:1 "เราได้ระบุนักวิทยาศาสตร์ใน[owner.GetPreFTLLower] [pre_ftl_country.GetSpeciesNamePlural]บน[pre_ftl_planet.GetName]ที่แสดงให้เห็นสัญญาที่ดี[abducted_scientist.GetHisHerCap]งานวิจัยที่ยอดเยี่ยมล้ําหน้า[abducted_scientist.GetHisHer]คน รุ่น เดียว กัน และ บาง ส่วน ของ โลก คือ การ ปฏิวัติ แม้ แต่ มาตรฐาน ของ เรา.\n\nถึงแม้ว่า[abducted_scientist.GetHisHer]งานได้เพิ่มความก้าวหน้าของเทคโนโลยี[pre_ftl_country.GetSpeciesNamePlural], [abducted_scientist.GetHisHer]ความเป็นไปได้จะสูญเปล่า[owner.GetPreFTLLower]อารยธรรมในห้องทดลองขั้นสูงของเรา [abducted_scientist.GetHeShe] จะมีโอกาสได้ทำวิทยาศาสตร์ที่แท้จริง"
 observation.1001.a:0 "ร่างแผนการลักพาตัวขึ้นมา"
 observation.1001.b:1 "[abducted_scientist.GetHeSheCap] ยังคงเป็นคนป่า ปล่อย [abducted_scientist.GetHimHer] ไว้กับประชาชนของเขาเถอะ"
 observation.1002.name:0 "ลักพาตัวสำเร็จ"
 observation.1002.desc:2 "สายลับของเราประสบความสำเร็จในการลักพาตัวนักวิทยาศาสตร์ชาวพื้นเมืองจาก [pre_ftl_country.GetName]! กระสวยภาคพื้นดินลำหนึ่งของเราสกัดกั้นรถยนต์ของ [abducted_scientist.GetHisHer] ขณะที่ [abducted_scientist.GetHeShe] กำลังเดินทางกลับบ้านจากที่ทำงานในเวลากลางคืน และทำให้รถคันนั้นหยุดทำงานด้วยคลื่นแม่เหล็กไฟฟ้า ESMP)\n\nนักวิทยาศาสตร์ถูกทำให้เป็นอัมพาตชั่วคราวและถูกนำตัวขึ้นกระสวย ในขณะที่ความทรงจำของทีมอารักขาความปลอดภัยของ [abducted_scientist.GetHisHer] ถูกลบทิ้งไป เรามั่นใจในความสามารถที่จะ \"โน้มน้าว\" ให้นักวิทยาศาสตร์คนนี้ยอมทำงานให้กับเรา"
 observation.1002.tt:0 "ได้รับ §Yนักวิทยาศาสตร์ระดับ 6 เผ่าพันธุ์ [pre_ftl_country.GetSpeciesName]§! พร้อมคุณลักษณะ §Y$leader_trait_spark_of_genius$§!"
 observation.1003.name:0 "ลักพาตัวล้มเหลว"
 observation.1003.desc:2 "โชคร้ายที่ความพยายามลักพาตัวนักวิทยาศาสตร์ชาวพื้นเมืองจาก [pre_ftl_country.GetName] ล้มเหลว กระสวยภาคพื้นดินของเราสกัดรถยนต์ของ [abducted_scientist.GetHisHer] ได้ แต่ในขณะที่ร่างของนักวิทยาศาสตร์ที่หมดสติกำลังถูกดึงขึ้นมาด้วยลำแสงพยุงตัว(เสียงไฟ)ยานรบในชั้นบรรยากาศของ [pre_ftl_country.GetSpeciesName] ก็มาถึงที่เกิดเหตุ\n\nกระสวยหลบหนีขึ้นสู่วงโคจรได้อย่างปลอดภัย แต่ลำแสงพยุงตัวถูกรบกวนและนักวิทยาศาสตร์คนนั้น... ตกลงมาจากที่สูง หวังว่าการเสียชีวิตของ [abducted_scientist.GetHisHer] จะถูกโยนความผิดไปให้อาณาจักรคู่แข่งของ [pre_ftl_country.GetSpeciesName]"
 observation.1004.name:0 "การค้นพบครั้งสำคัญบน [pre_ftl_planet.GetName]!"
 observation.1004.desc:0 "นักวิทยาศาสตร์ที่เราค้นพบคนแรกบนดาว [pre_ftl_planet.GetName] ได้พัฒนาทักษะจนกลายเป็นผู้มีพรสวรรค์ที่โดดเด่น งานวิจัยนอกกรอบและความคิดเชิงวิเคราะห์ที่เฉียบคมของ [abducted_scientist.GetHisHer] ได้ช่วยเร่งการพัฒนาทางเทคโนโลยีของ [pre_ftl_country.GetName] อย่างรวดเร็ว"
 observation.1004.a:0 "ยอดเยี่ยมมาก!"

# Defense Force
 observation.1101.name:1 "[pre_ftl_planet.GetName]: กองกำลังป้องกันต่างดาว"
 observation.1101.desc:1 "เพื่อเป็นการตอบโต้ปฏิบัติการของเราบนโลกพื้นเมืองของพวกเขา ประเทศต่างๆ ของ [pre_ftl_country.GetSpeciesName] บนดาว [pre_ftl_planet.GetName] ได้ละทิ้งความขัดแย้งชั่วคราวเพื่อร่วมมือกันจัดตั้งองค์กรทางทหารระดับเหนือชาติขึ้นมาใหม่\n\nตามรายงานของสื่อท้องถิ่น กองกำลังเฉพาะกิจนี้ได้รับมอบหมายให้ปกป้อง [pre_ftl_planet.GetPlanetHabitat] จาก \"กิจกรรมที่เป็นปรปักษ์ซึ่งกระทำโดยหน่วยงานต่างดาวที่ไม่รู้จักต่อเผ่าพันธุ์ [pre_ftl_country.GetSpeciesName] ทั้งหมด\""
# Interceptions
 observation.1102.name:1 "[pre_ftl_planet.GetName]: กิจกรรมของกองกำลังเฉพาะกิจ"
 observation.1102.desc:1 "ภาพถ่ายลาดตระเวนที่ถ่ายโดยสถานีสังเกตการณ์ของเราเหนือดาว [pre_ftl_planet.GetName] ยืนยันการก่อสร้างฐานทัพทหารและสถานีเรดาร์แห่งใหม่หลายแห่งบนพื้นผิวของ [pre_ftl_planet.GetPlanetHabitat] ทั้งหมดนี้อยู่ภายใต้การควบคุมของกองกำลังเฉพาะกิจต่อต้านต่างดาวระดับเหนือชาติที่จัดตั้งขึ้นใหม่โดยชาว [pre_ftl_country.GetSpeciesNamePlural]\n\nเรากำลังได้เห็นระดับความร่วมมือที่ไม่เคยมีมาก่อนระหว่างประเทศต่างๆ ของพวกเขา และกระสวยลักพาตัวของเรากำลังถูกสกัดกั้นเป็นประจำโดยเครื่องบินรบในชั้นบรรยากาศของกองกำลังนี้ แม้ว่าเราจะได้เปรียบทางเทคโนโลยี แต่จำนวนที่มหาศาลของพวกเขาก็ทำให้สามารถยิงกระสวยของเราตกไปหลายลำ!"
 observation.1102.a:0 "สิ่งนี้จะขัดขวางกิจกรรมการสังเกตการณ์เชิงรุกของเรา"
# Observation Post Lost
 observation.1103.name:1 "[pre_ftl_planet.GetName]: สูญเสียสถานีสังเกตการณ์"
 observation.1103.desc:1 "สถานีสังเกตการณ์ของเราเหนือดาว [pre_ftl_planet.GetName] ถูกทำลายแล้ว! ผู้ลงมือคือขีปนาวุธจากพื้นสู่อวกาศขนาดใหญ่ที่ยิงมาจากฐานทัพทหารที่ควบคุมโดยกองกำลังเฉพาะกิจร่วมของ [pre_ftl_country.GetSpeciesName]\n\nเรายังไม่แน่ใจว่าพวกเขาติดตามตำแหน่งของสถานีได้อย่างไร เนื่องจากเราได้ดำเนินมาตรการป้องกันอย่างกว้างขวางเพื่อซ่อนการมีอยู่ของมันจากชาว [pre_ftl_country.GetSpeciesNamePlural] ทฤษฎีหนึ่งคือชาวพื้นเมืองสามารถย้อนกระบวนการวิศวกรรมเทคโนโลยีที่ยึดได้จากกระสวยที่ตกของเรา"
 observation.1103.a:0 "นี่มันเป็นเรื่องที่ยอมรับไม่ได้!"
# Strike
 observation.1105.name:1 "[pre_ftl_planet.GetName]: การโจมตีศัลยกรรมเป้าหมาย"
 observation.1105.desc:1 "เจ้าหน้าที่ของสถานีสังเกตการณ์ที่โคจรรอบดาว [pre_ftl_planet.GetName] ได้ร้องขอความช่วยเหลือในการจัดการกับกองกำลังเฉพาะกิจต่อต้านต่างดาวที่จัดตั้งขึ้นเพื่อตอบโต้ปฏิบัติการของเรา แม้ว่าจะเป็นเรื่องล้าสมัยตามมาตรฐานของเรา แต่องค์กรนี้ได้พัฒนาทักษะในการรบกวนปฏิบัติการลักพาตัวของเรา\n\nฐานทัพหลักของพวกเขาถูกระบุตำแหน่งบนพื้นผิวของ [pre_ftl_planet.GetPlanetHabitat] ลึกลงไปใน [pre_ftl_planet.GetAMountainFeature] การระดมยิงโคจรจะไม่มีประสิทธิภาพ แต่การจู่โจมอย่างรวดเร็วโดยทีมโจมตีที่ติดอาวุธหนักน่าจะสามารถโจมตีฐานทัพนี้โดยไม่ให้ตั้งตัวได้ การทำลายล้างมันจะหมายถึงจุดจบของกองกำลังเฉพาะกิจ [pre_ftl_country.GetSpeciesName] ที่น่ารำคาญนี้อย่างแน่นอน"
 observation.1105.a:1 "ทำให้มันเกิดขึ้น"
 observation.1105.b:1 "ไม่ เราควรหลีกเลี่ยงการสร้างความเป็นปฏิปักษ์กับพวกเขาเพิ่มเติม..."
 observation.1106.name:2 "[pre_ftl_planet.GetName]: การโจมตีที่ประสบความสำเร็จ"
 observation.1106.desc:2 "ภารกิจในการทำลายฐานทัพหลักของกองกำลังเฉพาะกิจร่วม [pre_ftl_country.GetSpeciesName] ประสบความสำเร็จอย่างสมบูรณ์! ฐานทัพถูกแทรกซึมโดยทีมโจมตีของเรา ผู้ป้องกันและอาวุธที่จำกัดของพวกเขาไม่สามารถเทียบได้กับเจ้าหน้าที่ฝีมือดีของเราเลย\n\nหลังจากติดตั้งระเบิดลึกเข้าไปในแกนกลางของฐานทัพ ทีมโจมตีก็ได้รับการอพยพออกมาโดยกระสวยที่มารอรับ บัดนี้ไม่มีอะไรเหลืออยู่จากกองกำลังเฉพาะกิจ [pre_ftl_country.GetSpeciesName] ที่สร้างปัญหาอีกแล้ว"
 observation.1106.a:1 "ภารกิจสำเร็จ"
 observation.1107.name:3 "[pre_ftl_planet.GetName]: การโจมตีที่ล้มเหลว"
 observation.1107.desc:2 "ภารกิจในการทำลายฐานทัพหลักของกองกำลังเฉพาะกิจร่วม [pre_ftl_country.Owner.GetSpeciesName] ล้มเหลวอย่างไม่เป็นท่า! กระสวยหลายลำที่บรรทุกทีมโจมตีของเราถูกยิงตกโดยปืนต่อสู้อากาศยานที่ซ่อนอยู่ก่อนที่จะไปถึงฐานทัพด้วยซ^-^น หน่วยปฏิบัติการที่เหลือเผชิญกับการต่อต้านที่รุนแรงอย่างไม่คาดคิดเมื่อพวกเขาไปถึงทางเข้าฐานทัพ\n\nเมื่อพิจารณาถึงกำลังเสริมของ [pre_ftl_country.Owner.GetSpeciesName] ที่กำลังเข้ามาใกล้ ผู้บัญชาการทีมโจมตีจึงสั่งถอนกำลังในที่สุด โชคร้ายที่ในขณะที่กระสวยอพยพของเรากำลังเร่งเครื่องขึ้นสู่วงโคจร ฝูงบินรบในชั้นบรรยากาศขนาดใหญ่ก็ได้เข้าสกัดกั้น ความสูญเสียนั้นหนักหนาสาหัส"
 observation.1107.a:1 "นี่คือหายนะ!"
# Disbanded
 observation.1104.name:1 "[pre_ftl_planet.GetName]: กองกำลังเฉพาะกิจถูกยุบ"
 observation.1104.desc:1 "กองกำลังเฉพาะกิจระดับเหนือชาติที่ประเทศของ [pre_ftl_country.GetSpeciesName] จัดตั้งขึ้นเพื่อขัดขวางปฏิบัติการของเราบนดาว [pre_ftl_planet.GetName] ได้ถูกยุบแล้ว! แม้ว่าพวกเขาจะประสบความสำเร็จในชัยชนะสำคัญบางประการต่อกระสวยและทีมลักพาตัวของเรา แต่สมาชิกผู้ก่อตั้งหลายคนขององค์กรได้ตัดสินใจตัดงบประมาณและถอนตัวจากโครงการ\n\nข้อมูลกรองระบุว่าการเปลี่ยนแปลงที่ไม่คาดคิดนี้มีสาเหตุมาจากการต่อสู้แย่งชิงอำนาจภายในและการวางท่าทางการทูตระหว่างประเทศต่างๆ ของ [pre_ftl_country.GetSpeciesName]"
 observation.1104.a:1 "เป็นพัฒนาการที่น่ายินดี แม้ว่าจะไม่คาดคิดก็ตาม"

# Malfunctioning Implants
 observation.1201.name:1 "[pre_ftl_planet.GetName]: อุปกรณ์ฝังสมองทำงานผิดปกติ"
 observation.1201.desc:1 "ในฐานะส่วนหนึ่งของความพยายามในการสังเกตการณ์บนดาว [pre_ftl_planet.GetName] ทีมลักพาตัวได้ผ่าตัดติดตั้งอุปกรณ์ฝังสมองให้กับกลุ่มตัวอย่างชาว [pre_ftl_country.GetSpeciesName] เพื่อติดตามและตรวจสอบพฤติกรรมของพวกเขา โชคร้ายที่เนื่องจากข้อบกพร่องในการผลิต ทำให้อุปกรณ์ฝังสมองเหล่านี้ทำงานผิดปกติ และตอนนี้กำลังส่งผลกระทบ... ในทางลบต่อพฤติกรรมของกลุ่มตัวอย่าง\n\nมีการฆ่าตัวตายเกิดขึ้นหลายครั้ง และมีอย่างน้อยสามตอนที่เกิดอาการคุ้มคลั่งรุนแรง นักวิจัยบนสถานีสังเกตการณ์ของเราได้ขอความช่วยเหลือในการต้อนกลุ่มตัวอย่างที่เหลืออยู่และนำอุปกรณ์ฝังสมองออกก่อนที่จะเกิดเหตุการณ์เพิ่มขึ้น"
 observation.1201.a:0 "เราต้องลงมือทำความสะอาดเรื่องยุ่งเหยิงนี้"
 observation.1201.b:0 "มันไม่ใช่ปัญหาของเรา"
 observation.1202.name:3 "[pre_ftl_planet.GetName]: นำอุปกรณ์ฝังสมองออกแล้ว"
 observation.1202.desc:2 "ทีมลักพาตัวจากสถานีสังเกตการณ์เหนือดาว [pre_ftl_planet.GetName] ได้ทำงานร่วมกับลูกเรือของยาน [Root.GetName] เพื่อรวบรวมตัวอย่างชาว [pre_ftl_country.GetSpeciesName] ที่มีอุปกรณ์ฝังสมองที่ชำรุดอย่างรวดเร็ว\n\nเจ้าหน้าที่ศัลยกรรมของสถานีได้เปลี่ยนอุปกรณ์เหล่านั้นเป็นรุ่นที่ใช้งานได้ดี และกลุ่มตัวอย่างได้รับการส่งกลับไปยังพื้นผิวของ [pre_ftl_planet.GetPlanetHabitat] นอกจากนี้ เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ยังสามารถดึงข้อมูลจำนวนมากจากอุปกรณ์ที่ถูกถอดออก แม้ว่ามันจะมีข้อบกพร่องก็ตาม"
 observation.1202.a:0 "อย่างน้อยก็มีสิ่งที่ดีเกิดขึ้นจากเรื่องนี้"
 observation.1203.name:3 "[pre_ftl_planet.GetName]: อุปกรณ์ฝังสมองไม่ได้ถูกนำออก"
 observation.1203.desc:2 "กลุ่มตัวอย่างชาว [pre_ftl_country.GetSpeciesName] คนสุดท้ายบนดาว [pre_ftl_planet.GetName] ได้ยอมจำนนต่อผลกระทบของอุปกรณ์ฝังสมองที่ชำรุด หลายคนคลุ้มคลั่งอย่างสมบูรณ์ ตะโกนรหัสคำสั่งแบบสุ่มจากภาษาเขียนโปรแกรม [Root.GetSpeciesName] ที่ใช้ในอุปกรณ์ในขณะที่เข้าโจมตีทุกคนหรือทุกสิ่งรอบตัวอย่างดุร้าย"
 observation.1203.a:0 "เรื่องนี้เกิดขึ้นได้อย่างไร?"
 observation.1205.name:0 "[pre_ftl_planet.GetName]: ยอมรับจักรกลชีวะ"
 observation.1205.desc:1 "ชาว [pre_ftl_country.GetSpeciesName] บนดาว [pre_ftl_planet.GetName] ได้ทำการวิจัยของพวกเขาเองเกี่ยวกับอุปกรณ์ฝังสมองที่เราทิ้งไว้ นักวิจัยพื้นเมืองสามารถออกแบบวิศวกรรมไซเบอร์เนติกส์ที่เข้ากันได้กับชีววิทยาของ [pre_ftl_country.GetSpeciesName] ได้ดีกว่าที่เราทำได้เสียอีก"
 observation.1205.a:0 "ยอดเยี่ยมมาก!"
 observation.1205.tt:0 "ชาว [pre_ftl_country.GetSpeciesName] ได้เข้าสู่แนวทาง §Yไซเบอร์เนติกส์(ไซเบอเนติกส์)§!"

# Ethic Shifts
 observation.1301.name:1 "[pre_ftl_planet.GetName]: การเปลี่ยนแปลงทางจริยธรรม"
 observation.1301.xenophobe:0 "เราสังเกตเห็นการเปลี่ยนแปลงอย่างเด่นชัดในวิถีชีวิตของชาว [pre_ftl_country.GetSpeciesNamePlural] บนดาว [pre_ftl_planet.GetName] สังคมของพวกเขาหันเข้าหาตัวเองมากขึ้นและพวกเขายอมรับคนแปลกหน้าน้อยลงมาก\n\nการบินสังเกตการณ์เชิงรุกและการลักพาตัวทั่วทั้งดาว [pre_ftl_planet.GetPlanetHabitat] ดูเหมือนจะมีบทบาทในเรื่องนี้ ทำให้ชาว [pre_ftl_country.GetSpeciesNamePlural] หวาดระแวงสิ่งที่ไม่รู้จักมากขึ้น"
 observation.1301.xenophile:0 "เราสังเกตเห็นการเปลี่ยนแปลงอย่างเด่นชัดในวิถีชีวิตของชาว [pre_ftl_country.GetSpeciesNamePlural] บนดาว [pre_ftl_planet.GetName] สังคมของพวกเขาเปิดกว้างสู่ภายนอกมากขึ้นและพวกเขายอมรับคนแปลกหน้าได้ดีขึ้นมาก\n\nการบินสังเกตการณ์ของเราทั่วทั้งดาว [pre_ftl_planet.GetPlanetHabitat] ดูเหมือนจะมีบทบาทในเรื่องนี้ ทำให้ชาว [pre_ftl_country.GetSpeciesNamePlural] กระตือรือร้นที่จะเรียนรู้เพิ่มเติมเกี่ยวกับสิ่งที่ไม่รู้จัก"
 observation.1301.spiritualist:0 "ทีมลักพาตัวหลายทีมที่ประจำการบนสถานีสังเกตการณ์เหนือดาว [pre_ftl_planet.GetName] ได้ใช้เครื่องขับดันของกระสวยเพื่อเผาทำลายเป็นวงกลมขนาดใหญ่และลวดลายที่ซับซ้อนลงในทุ่งพืชผลของชาว [pre_ftl_country.GetSpeciesNamePlural]\n\nลูกเรือกระสวยได้รับการลงโทษอย่างรุนแรงสำหรับการเล่นแผลงๆ นี้ แต่ภาพวงกลมบนทุ่งพืชผลดูเหมือนจะมีความสำคัญทางจิตวิญญาณสำหรับชาวพื้นเมือง ศาสนาใหม่ได้ก่อตัวขึ้นบนพื้นฐานของลวดลายเหล่านี้ และมันกำลังได้รับความนิยมในหมู่ชาว [pre_ftl_country.GetSpeciesNamePlural] ในอัตราที่น่าตกใจ"
 observation.1301.materialist:0 "ทีมลักพาตัวหลายทีมที่ประจำการบนสถานีสังเกตการณ์เหนือดาว [pre_ftl_planet.GetName] ได้ใช้เครื่องขับดันของกระสวยเพื่อเผาทำลายเป็นวงกลมขนาดใหญ่และลวดลายที่ซับซ้อนลงในทุ่งพืชผลของชาว [pre_ftl_country.GetSpeciesNamePlural]\n\nลูกเรือกระสวยได้รับการลงโทษอย่างรุนแรงสำหรับการเล่นแผลงๆ นี้ แต่ชาวพื้นเมืองดูเหมือนจะเชื่อว่าวงกลมในทุ่งพืชผลมีความหมายทางคณิตศาสตร์ ขบวนการทางวิทยาศาสตร์ใหม่ได้ถือกำเนิดขึ้นเพื่อศึกษาลวดลายเหล่านั้น และมันกำลังได้รับความนิยมในหมู่ชาว [pre_ftl_country.GetSpeciesNamePlural] ในอัตราที่น่าตกใจ"

# Nuclear War, everyone dead, planet is a tomb world
 observation.1402.name:0 "[pre_ftl_planet.GetName] ก้าวเข้าสู่สงครามนิวเคลียร์"
 observation.1402.reg.start:0 "สงครามขนาดใหญ่เพิ่งจะปะทุขึ้นระหว่างประเทศที่ใหญ่ที่สุดหลายประเทศบนดาว [pre_ftl_planet.GetName]"
 observation.1402.hive_mind.start:0 "สงครามขนาดใหญ่เพิ่งจะปะทุขึ้นระหว่างจิตสำนึกร่วมหลายกลุ่มบนดาว [pre_ftl_planet.GetName]"
 observation.1402.end:0 "ในขณะที่นักวิจัยของเราเฝ้าสังเกตการณ์อย่างปลอดภัยจากวงโคจร ความขัดแย้งได้ทวีความรุนแรงขึ้นอย่างรวดเร็วจนกลายเป็นการแลกเปลี่ยนอาวุธนิวเคลียร์ทั่วโลก\n\nประชากรทั้งหมดของดาวเคราะห์เสียชีวิตในกองเพลิงนิวเคลียร์ และสิ่งแวดล้อมได้รับความเสียหายอย่างสาหัส"
 observation.1402.gestalt.end:0 "ในขณะที่หน่วยประมวลผล [root.GetIndividualNamePlural] ของเราเฝ้าสังเกตการณ์อย่างปลอดภัยจากวงโคจร ความขัดแย้งได้ทวีความรุนแรงขึ้นอย่างรวดเร็วจนกลายเป็นการแลกเปลี่ยนอาวุธนิวเคลียร์ทั่วโลก\n\nประชากรทั้งหมดของดาวเคราะห์เสียชีวิตในกองเพลิงนิวเคลียร์ และสิ่งแวดล้อมได้รับความเสียหายอย่างสาหัส"
 observation.1402.a:1 "บทเรียนที่น่าเศร้า"

# Nuclear War, everyone dead, planet is a toxic world
 observation.1404.name:0 "$observation.1402.name$"
 observation.1404.reg.start:0 "$observation.1402.reg.start$"
 observation.1404.hive_mind.start:0 "$observation.1402.hive_mind.start$"
 observation.1404.end:0 "ในขณะที่นักวิจัยของเราเฝ้าสังเกตการณ์อย่างปลอดภัยจากวงโคจร ความขัดแย้งได้ทวีความรุนแรงขึ้นอย่างรวดเร็วจนกลายเป็นการแลกเปลี่ยนอาวุธนิวเคลียร์ทั่วโลก\n\nสิ่งมีชีวิตทั้งหมดบนพื้นผิวโลกถูกกวาดล้าง และ [pre_ftl_planet.GetPlanetHabitat] ทั้งดวงไม่สามารถใช้อยู่อาศัยได้อีกต่อไป"
 observation.1404.gestalt.end:0 "ในขณะที่หน่วยประมวลผล [root.GetIndividualNamePlural] ของเราเฝ้าสังเกตการณ์อย่างปลอดภัยจากวงโคจร ความขัดแย้งได้ทวีความรุนแรงขึ้นอย่างรวดเร็วจนกลายเป็นการแลกเปลี่ยนอาวุธนิวเคลียร์ทั่วโลก\n\nสิ่งมีชีวิตทั้งหมดบนพื้นผิวโลกถูกกวาดล้าง และ [pre_ftl_planet.GetPlanetHabitat] ทั้งดวงไม่สามารถใช้อยู่อาศัยได้อีกต่อไป"
 observation.1404.a:1 "$observation.1402.a$"

# Nuclear War, pre-ftls regress to stone age, planet is a tomb world
 observation.1406.name:0 "$observation.1402.name$"
 observation.1406.reg.start:0 "$observation.1402.reg.start$"
 observation.1406.hive_mind.start:0 "$observation.1402.hive_mind.start$"
 observation.1406.end:0 "ในขณะที่นักวิจัยของเราเฝ้าสังเกตการณ์อย่างปลอดภัยจากวงโคจร ความขัดแย้งได้ทวีความรุนแรงขึ้นอย่างรวดเร็วจนกลายเป็นการแลกเปลี่ยนอาวุธนิวเคลียร์ทั่วโลก\n\nดาว [pre_ftl_planet.GetPlanetHabitat] ได้รับความเสียหายอย่างกว้างขวาง โดยเมืองใหญ่ทุกเมืองถูกทำลายและประชากรมากกว่า 90% เสียชีวิต ผู้รอดชีวิตกระจัดกระจายหลบอยู่ใต้ซากปรักหักพัง แต่นักวิจัยของเราคาดการณ์ว่าอารยธรรมของ [pre_ftl_planet.GetPlanetHabitat] จะถดถอยลงสู่สถานะที่พัฒนาน้อยกว่ามาก"
 observation.1406.gestalt.end:0 "ในขณะที่หน่วยประมวลผล [root.GetIndividualNamePlural] ของเราเฝ้าสังเกตการณ์อย่างปลอดภัยจากวงโคจร ความขัดแย้งได้ทวีความรุนแรงขึ้นอย่างรวดเร็วจนกลายเป็นการแลกเปลี่ยนอาวุธนิวเคลียร์ทั่วโลก\n\nดาว [pre_ftl_planet.GetPlanetHabitat] ได้รับความเสียหายอย่างกว้างขวาง โดยเมืองใหญ่ทุกเมืองถูกทำลายและประชากรมากกว่า 90% เสียชีวิต ผู้รอดชีวิตกระจัดกระจายหลบอยู่ใต้ซากปรักหักพัง แต่นักวิจัยของเราคาดการณ์ว่าอารยธรรมของ [pre_ftl_planet.GetPlanetHabitat] จะถดถอยลงสู่สถานะที่พัฒนาน้อยกว่ามาก"
 observation.1406.a:1 "$observation.1402.a$"

# Research Proposal
 observation.1501.name:1 "ข้อเสนอโครงการวิจัย"
 observation.1501.desc:2 "นักวิทยาศาสตร์ของเราบนสถานีสังเกตการณ์เหนือดาว [pre_ftl_planet.GetName] ได้ร้องขอยานวิทยาศาสตร์เพื่อช่วยพวกเขาเก็บรวบรวมตัวอย่างจากพื้นผิวของ [pre_ftl_planet.GetPlanetHabitat] เพื่อวัตถุประสงค์ในการวิจัย พวกเขาต้องการลักพาตัวชาว [GetPreFTLLowerPlural] อย่างลับๆ และทำการทดสอบกับพวกเขา จากนั้นจะส่งพวกเขากลับไปยังพื้นผิวอย่างปลอดภัยโดยลบความทรงจำออก"
 observation.1501.a:1 "มันจะช่วยให้เราเข้าใจพวกเขาได้ดีขึ้น"
 observation.1501.b:1 "ไม่ เราควรปล่อยพวกเขาไว้ตามลำพัง"
 observation.1501.b.tt:0 "§Y$mission_passive_observation$§! จะผลิต §G+2§! $r_unity$\n$t$§Rจะถูกล็อกไว้ที่ $mission_passive_observation$!§!"
 observation.1502.desc:2 "ยาน [Root.GetName] ได้เสร็จสิ้นภารกิจทางวิทยาศาสตร์บนดาว [pre_ftl_planet.GetName] แล้ว การบินโฉบต่ำเหนือพื้นดินในเวลากลางคืน กระสวยจากยานวิทยาศาสตร์ได้ใช้คลื่นแม่เหล็กไฟฟ้า ESMP)เพื่อทำให้ยานพาหนะเครื่องยนต์สันดาปที่ล้าสมัยของชาว [GetPreFTLLowerPlural] หยุดทำงาน พลเมืองบนยานถูกทำให้หมดสติและรวบรวมตัวอย่าง ในขณะที่ทีมภาคสนามอื่นๆ ได้เก็บตัวอย่างโดยการชำแหละปศุสัตว์ในท้องถิ่นบางส่วน\n\nภารกิจของเราดูเหมือนจะไม่มีใครสังเกตเห็นโดยประชากรของ [pre_ftl_planet.GetPlanetHabitat] แม้จะมีรายงานข่าวบ้างเกี่ยวกับ \"แสงไฟที่อธิบายไม่ได้\" และเหตุการณ์ที่ลูกเรือกระสวยบางคนจงใจใช้เครื่องขับดันเพื่อสร้างลวดลายวงกลมในทุ่งพืชผล พวกเขาได้รับการลงโทษเรียบร้อยแล้ว"
 observation.1502.a:0 "ทำงานได้ดีมาก"

# Special Projects for events above.
 EXTRACT_MISSING_SCIENTIST:1 "ช่วยเหลือนักวิทยาศาสตร์ที่สูญหาย"
 EXTRACT_MISSING_SCIENTIST_DESC:1 "นักวิทยาศาสตร์คนหนึ่งของเราได้ออกนอกแถวและได้รับการบูชาในฐานะพระผู้เป็นเจ้าโดยชาว [GetPreFTLLowerPlural] บนดาว [pre_ftl_planet.GetName] ต้องดำเนินการปฏิบัติการเพื่อนำตัว [missing_scientist.GetHimHer] ออกมา - โดยใช้กำลังหากจำเป็น"
 SHUTTLE_INTERCEPTED:1 "ช่วยชีวิตผู้รอดชีวิตจากกระสวยตก"
 SHUTTLE_INTERCEPTED_DESC:1 "กระสวยลำหนึ่งของเราถูกยิงตกโดยชาวพื้นเมืองบนดาว [pre_ftl_country.GetName] และเราจำเป็นต้องช่วยเหลือเจ้าหน้าที่ที่รอดชีวิตก่อนที่พวกเขาจะถูกจับกุมโดยกองกำลังท้องถิ่น"
 ABDUCT_SCIENTIST_PROJECT:1 "ลักพาตัวนักวิทยาศาสตร์ [GetPreFTLUpper]"
 ABDUCT_SCIENTIST_PROJECT_DESC:1 "นักวิทยาศาสตร์ที่ชาญฉลาดคนหนึ่งได้รับการระบุตัวตนท่ามกลางชาว [GetPreFTLLower] [pre_ftl_country.GetSpeciesNamePlural] บนดาว [pre_ftl_planet.GetName] ทักษะที่ยอดเยี่ยมของ [abducted_scientist.GetHisHerCap] สูญเปล่าเมื่ออยู่กับอารยธรรมพื้นเมืองของ [abducted_scientist.GetHisHer] แต่ [abducted_scientist.GetHeShe] จะมีประโยชน์อย่างมากต่อโครงการวิจัยของเรา แผนการได้รับการกำหนดเพื่อลักพาตัว [abducted_scientist.GetHisHer] และ \"โน้มน้าว\" ให้กลับมาทำงานกับเราแทน"
 DEFENSE_FORCE_STRIKE_PROJECT:1 "ทำลายกองกำลังป้องกันชาวพื้นเมือง"
 DEFENSE_FORCE_STRIKE_PROJECT_DESC:1 "ประเทศต่างๆ ของ [pre_ftl_country.GetSpeciesName] บนดาว [pre_ftl_planet.GetName] ได้ร่วมมือกันจัดตั้งกองกำลังเฉพาะกิจต่อต้านต่างดาวเพื่อขัดขวางปฏิบัติการของเราบนโลกบ้านเกิดของพวกเขา เรื่องนี้ไม่อาจยอมรับได้ เราต้องเปิดฉากโจมตีลงทัณฑ์ต่อฐานทัพหลักขององค์กรนี้"
 IMPLANT_MALFUNCTIONS_PROJECT:1 "ถอดอุปกรณ์ฝังสมองที่ชำรุดออก"
 IMPLANT_MALFUNCTIONS_PROJECT_DESC:1 "เรากำลังประสบปัญหากับอุปกรณ์ฝังสมองที่มอบให้กับกลุ่มตัวอย่างหลายคนในหมู่ชาว [GetPreFTLLowerPlural] [pre_ftl_country.GetSpeciesNamePlural] บนดาว [pre_ftl_planet.GetName] มีการทำงานผิดปกติเกิดขึ้นหลายครั้ง ส่งผลให้เกิดพฤติกรรมก้าวร้าวรุนแรง และในบางกรณีก็มีผู้เสียชีวิต เราต้องนำอุปกรณ์ฝังสมองเหล่านี้ออกก่อนที่จะก่อให้เกิดปัญหาเพิ่มเติม"
 PROBE_ALIENS_PROJECT:1 "ตรวจสอบสิ่งมีชีวิตต่างดาว"
 PROBE_ALIENS_PROJECT_DESC:1 "นักวิทยาศาสตร์ของเราต้องการเก็บรวบรวมกลุ่มตัวอย่างทดสอบจากอารยธรรมพื้นเมืองบนดาว [pre_ftl_planet.GetName] หลังจากเสร็จสิ้นการทดสอบ กลุ่มตัวอย่างจะได้รับการส่งกลับไปยังพื้นผิวของ [pre_ftl_planet.GetPlanetHabitat] โดยไม่มีความทรงจำเกี่ยวกับประสบการณ์นี้"

