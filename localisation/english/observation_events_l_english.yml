l_english:

# Observation Events from base game
# Refactored as part of the 3.7 "Canis Minor" update.

# Asteroid Sighted!
 observation.2.name:1 "อุกกาบาตกำลังมุ่งหน้าสู่ [pre_ftl_planet.GetName]"
 observation.2.desc:2 "ห้องปฏิบัติการวัดตำแหน่งดาวขนาดเล็กบนสถานีสังเกตการณ์ของเราในวงโคจรของ [pre_ftl_planet.GetName] ตรวจพบอุกกาบาตระดับ 4 กำลังพุ่งเข้ามา หากไม่ดำเนินการใดๆ มันจะพุ่งชนซีกโลก [GetRandomCompassDirection] ของ [pre_ftl_planet.GetPlanetHabitat] ด้วยแรงมหาศาลพอที่จะทำให้เกิดการสูญพันธุ์ครั้งใหญ่\n\nโดยปกติแล้วภารกิจสังเกตการณ์อย่างสันติจะห้ามไม่ให้เราเข้าไปแทรกแซง แต่นักวิทยาศาสตร์ของเราหลายคนโต้แย้งว่ากรณีนี้ควรเป็นข้อยกเว้น การนิ่งเฉยจะหมายถึงการปล่อยให้ [pre_ftl_country.GetName] บนดาว [pre_ftl_planet.GetName] เผชิญกับความตายอย่างแน่นอน"
 observation.2.a:1 "เป็นสถานการณ์ที่ยากลำบาก"
# Asteroid Impacts Pre-FTL planet.
 observation.4.name:1 "อุกกาบาตพุ่งชน [pre_ftl_planet.GetName]"
 observation.4.desc:1 "เป็นไปตามคาด อุกกาบาตที่มุ่งหน้าสู่ [pre_ftl_planet.GetName] ได้พุ่งชนพื้นผิวของ [pre_ftl_planet.GetPlanetHabitat] ส่งผลกระทบความเสียหายต่อระบบนิเวศอย่างไม่อาจแก้ไขได้ นักวิทยาศาสตร์บนสถานีสังเกตการณ์ทำได้เพียงเฝ้ามองอย่างเงียบงันในขณะที่อารยธรรม [GetPreFTLLower] ส่วนใหญ่ที่พวกเขาเคยศึกษาได้ดับสูญไปจากเบื้องล่าง"
 observation.4.a:1 "โศกนาฏกรรมที่น่าเศร้า แต่ไม่ใช่หน้าที่ของเราที่จะเข้าไปก้าวก่าย"
 observation.4.a.tt:0 "§Y[pre_ftl_country.GetName]§!: ถดถอยกลับไปสู่ §Yยุคหิน(ยุคหิน)§!."
# Asteroid Collides with Observation Post.
 observation.5.name:1 "สถานีสังเกตการณ์ถูกทำลาย"
 observation.5.desc:1 "นักวิจัยบนสถานีสังเกตการณ์เหนือ [pre_ftl_planet.GetName] ได้ใช้เครื่องขับดันวงโคจรของสถานีเพื่อบังคับให้มันพุ่งเข้าชนโดยตรงกับอุกกาบาตที่พุ่งเข้ามา การเสียสละของพวกเขาทำให้ทิศทางของอุกกาบาตเบี่ยงเบนไปจาก [pre_ftl_planet.GetPlanetHabitat] อย่างปลอดภัย แต่ไม่มีผู้รอดชีวิตบนสถานีสังเกตการณ์เลย\n\nเห็นได้ชัดว่าพวกเขาไม่สามารถทนดูการสูญพันธุ์ของอารยธรรมที่พวกเขาใช้เวลาทั้งอาชีพเพื่อศึกษาได้"
 observation.5.a:1 "ความสูญเสียครั้งใหญ่ของวงการวิทยาศาสตร์!"
# Observing Empire Destroys Asteroid
 observation.7.name:1 "อุกกาบาตถูกทำลายแล้ว"
 observation.7.desc:1 "อุกกาบาตที่มุ่งหน้าสู่ [pre_ftl_planet.GetName] ได้ถูกทำลายลงก่อนที่จะไปถึงพื้นผิวของ [pre_ftl_planet.GetPlanetHabitat] ชิ้นส่วนที่หลุดรอดเข้าสู่ชั้นบรรยากาศถูกเผาไหม้อย่างปลอดภัยก่อนที่จะก่อให้เกิดอันตรายใดๆ\n\nนอกเหนือจากกาารได้เห็นสิ่งที่น่าจะเป็นฝนดาวตกที่น่าตื่นตาตื่นใจแล้ว สิ่งมีชีวิตต่างดาว [GetPreFTLLower] แห่ง [pre_ftl_country.GetName] ก็ไม่มีทางรู้เลยว่าพวกเขาเกือบจะสูญพันธุ์ไปแล้ว..."
 observation.7.a:1 "และพวกเขาจะไม่มีวันรู้"
# Third Party Destroys Asteroid (Event for Third Party)
 observation.8.name:0 "$observation.7.name$"
 observation.8.desc:0 "$observation.7.desc$"
 observation.8.a:0 "$observation.7.a$"
# Third Party Destroys Asteroid (Event for Observing Empire)
 observation.9.name:0 "$observation.7.name$"
 observation.9.desc:0 "$observation.7.desc$"
 observation.9.a:0 "$observation.7.a$"
# Pre-FTL civilization Diverts Asteroid (Event for Observing Empire)
 observation.10.name:0 "อุกกาบาตถูกเบี่ยงเบนทิศทาง"
 observation.10.desc:0 "ด้วยความพยายามเฮือกสุดท้ายในการรักษาดาว [pre_ftl_planet.GetName] ทาง [pre_ftl_country.GetName] ได้ยิงขีปนาวุธนิวเคลียร์หลายลูกเข้าใส่อุกกาบาต แม้ว่าขีปนาวุธเหล่านี้จะไม่เพียงพอที่จะทำลายมันลงได้ แต่ด้วยการแสดงกลศาสตร์วงโคจรที่น่าทึ่ง ชาว [GetPreFTLLowerPlural] บนดาว [pre_ftl_planet.GetName] ก็ประสบความสำเร็จในการเบี่ยงเบนอุกกาบาตออกนอกเส้นทาง"
 observation.10.a:0 "ยอดเยี่ยมมาก!"
 observation.10.a.tt:0 "§Y[pre_ftl_country.GetName]§! ได้รับ: อัตราความก้าวหน้าทางเทคโนโลยี §G+25%§! เป็นเวลา 24 เดือน"

# Missing Scientist
 observation.101.name:1 "นักวิทยาศาสตร์สูญหาย"
 observation.101.desc:2 "นักวิทยาศาสตร์คนหนึ่งที่ปฏิบัติงานบนสถานีสังเกตการณ์ในวงโคจรของ [pre_ftl_planet.GetName] ได้รับรายงานว่าสูญหายไป [missing_scientist.GetHeSheCap] ได้มีส่วนร่วมในภารกิจลับเพื่อเก็บตัวอย่างพืชจากพื้นผิวของ [pre_ftl_planet.GetPlanetHabitat] แต่ไม่ได้กลับมาที่กระสวยพร้อมกับทีมงานที่เหลือ\n\nเราได้ทำการค้นหาในวงจำกัดเพื่อไม่ให้ชาว [GetPreFTLLowerPlural] แตกตื่น แต่จนถึงขณะนี้ยังไม่ประสบความสำเร็จ"
 observation.101.a:1 "ค้นหาต่อไป"
 observation.102.name:1 "พบนักวิทยาศาสตร์เสียชีวิต"
 observation.102.desc:1 "ในที่สุดเราก็กู้ร่างของนักวิทยาศาสตร์ที่สูญหายบนดาว [pre_ftl_planet.GetName] กลับคืนมาได้... หรืออย่างน้อยก็เป็นสิ่งที่หลงเหลืออยู่ ดูเหมือนว่า [missing_scientist.GetHeShe] จะตกเป็นเหยื่อของสัตว์นักล่าพื้นเมืองขนาดใหญ่ นับเป็นความสูญเสียที่โชคร้ายของทีมวิทยาศาสตร์ของเรา แต่อย่างน้อยพวก [GetPreFTLLowerPlural] ก็ยังไม่รู้ถึงการมีอยู่ของเรา"
 observation.102.a:1 "คำสั่งไม่ให้ก้าวก่ายได้รับการปฏิบัติตาม"
 observation.103.name:1 "รายงานแปลกประหลาดจาก [pre_ftl_planet.GetName]"
 observation.103.desc:1 "เรากำลังได้รับรายงานแปลกๆ จากผู้สังเกตการณ์ของเราเหนือดาว [pre_ftl_planet.GetName] หนึ่งในอาณาจักรพื้นเมืองได้รวมตัวกันภายใต้ผู้นำทางศาสนาที่ลึกลับ และเราได้เห็นหลักฐานที่พวกเขาใช้งานเทคโนโลยีขั้นสูงที่เกินกว่าระดับการพัฒนาในปัจจุบันของพวกเขาอย่างมาก เรื่องนี้จะเกี่ยวข้องกับนักวิทยาศาสตร์ที่สูญหายของเราหรือไม่?"
 observation.104.desc:1 "ยินดีต้อนรับเพื่อนพ้อง มันผ่านมานานแล้วนะ\n\nก่อนอื่น ข้าต้องขออภัยสำหรับความพยายามทั้งหมดที่พวกเจ้าได้ทำเพื่อตามหาข้า การหายตัวไปของข้าบนดาว [pre_ftl_planet.GetName] นั้นเป็นความตั้งใจทั้งหมด\n\nพวก [GetPreFTLLowerPlural] ที่นี่มองข้าเป็นเหมือนพระผู้เป็นเจ้า... และทำไมพวกเขาจะไม่มองอย่างนั้นล่ะ? หลังจากพิจารณาอย่างถี่ถ้วนแล้ว ข้าได้ตัดสินใจที่จะนำอารยธรรมที่แท้จริงมาสู่พวก [GetPreFTLLowerPlural] เหล่านี้"
 observation.104.a:1 "อะไรเข้าสิงเจ้ากัน?!"
 observation.104.a.response:1 "ข้าเหนื่อยแล้ว เหนื่อยกับข้อจำกัดทางจริยธรรมที่คับแคบ เหนื่อยกับการเยาะเย้ยถากถางที่ข้าได้รับจากเพื่อนร่วมงาน และที่สำคัญที่สุด ข้าเหนื่อยกับการสังเกตการณ์แบบ 'ไร้การแทรกแซง'\n\nไร้สาระสิ้นดี! มันเป็นหน้าที่ของเราต่างหากที่จะต้องแทรกแซงวัฒนธรรม [GetPreFTLLower] เหล่านี้ - เพื่อนำทางและหล่อหลอมพวกเขาตามเส้นทางที่เราเลือก การเฝ้ามองอย่างเงียบๆ จากวงนอกเป็นเพียงวิธีที่น่าละอายในการหลีกเลี่ยงความรับผิดชอบ"
 observation.104.b:1 "เจ้าต้องรายงานตัวเพื่อรับการอพยพด่วน!"
 observation.104.b.response:1 "มันสายเกินไปแล้ว ข้ากลัวว่าจะเป็นเช่นนั้น ข้าจะไม่รับคำสั่งจากผู้ที่อยู่ต่ำกว่าสถานะของข้าอีกต่อไป สติปัญญาของข้าเคยอยู่ในการควบคุมของพวกเจ้า แต่พวกเจ้ากลับเลือกที่จะละเลยมัน\n\nที่นี่ ข้าได้รับการปฏิบัติด้วยความเคารพที่ข้าคู่ควร ที่นี่คือบ้านของข้าในตอนนี้ ด้วยความรู้และแผนผังเทคโนโลยีที่ข้านำติดตัวมา ข้าจะกระตุ้นวัฒนธรรมนี้และนำทางพวกเขาไปสู่ยุคทอง"
 observation.104.c:1 "เจ้าเสียสติไปแล้ว"
 observation.104.c.response:1 "ตรงกันข้ามเลย! ข้าไม่เคยมีสติแจ่มใสเท่านี้มาก่อน! ความตายของ [Root.GetName] เป็นเรื่องที่หลีกเลี่ยงไม่ได้ เจ้าต้องตาบอดแน่ๆ ถึงไม่เห็นสัญญาณเหล่านั้น\n\nโอ้ มันอาจใช้เวลาตั้งแต่สิบปีไปจนถึงศตวรรษ แต่ความล่มสลายของพวกเจ้าจะมาถึงอย่างแน่นอน หลังจากที่พวกเจ้าทำลายตัวเองด้วยการไม่ลงมือทำอะไรเลย กาแล็กซีนี้จะตกเป็นของวัฒนธรรมคนรุ่นใหม่ที่สดใส เช่นเดียวกับสิ่งที่ข้ากำลังสร้างขึ้นในเวลานี้\n\nไม่มีอะไรจะพูดอีกแล้ว ข้าขอลา"
 observation.105.name:1 "นักวิทยาศาสตร์นอกแถวรวบรวมอำนาจ"
 observation.105.desc:2 "เราได้รับรายงานที่น่าตกใจจากพื้นผิวของ [pre_ftl_planet.GetName] ดูเหมือนว่านักวิทยาศาสตร์นอกแถวของเรากำลังรวบรวมอำนาจ - [missing_scientist.GetHeShe] [missing_scientist.GetHasHave] มอบอาวุธขั้นสูงให้แก่อาณาจักรศักดินาแห่งหนึ่ง และตอนนี้พวกเขากำลังอยู่ในกระบวนการพิชิตดินแดนส่วนที่เหลือของ [pre_ftl_planet.GetPlanetMoon] ในนามของ [missing_scientist.GetHisHer]\n\nมีการเสนอแผนการที่จะใช้กำลังนำตัว [missing_scientist.GetHimHer] ออกมา แต่จะต้องใช้กองกำลังภาคพื้นดินจำนวนมาก และไม่มีทางรู้เลยว่าสิ่งนี้จะส่งผลกระทบอย่างไรต่อประชากรพื้นเมือง เนื่องจากหลายคนหันมามอง [missing_scientist.GetHimHer] ในฐานะพระผู้เป็นเจ้า"
 observation.105.a:1 "ปฏิบัติการนี้เป็นไปเพื่อ ลบ[missing_scientist.GetHimHer]"
 observation.105.b:1 "มันมีแต่จะทำให้เรื่องแย่ลง..."
 observation.106.name:1 "การอพยพที่ประสบความสำเร็จ"
 observation.106.desc:1 "เราประสบความสำเร็จในการนำตัวนักวิทยาศาสตร์นอกแถวออกมาจาก [pre_ftl_planet.GetName]! ชาว [owner.GetPreFTLLowerPlural] หลายร้อยคนถูกยิงเสียชีวิตอย่างน่าเศร้าเมื่อพวกเขาเข้าโจมตีแบบฆ่าตัวตายต่อกองกำลังของเราในความพยายามที่ไร้ผลเพื่อปกป้อง 'พระผู้เป็นเจ้า' ของพวกเขา\n\nระบบกฎหมายของเราจะจัดการกับนักวิทยาศาสตร์คนนี้ต่อไป แต่ผลกระทบจากเหตุการณ์เหล่านี้ต่ออารยธรรมของ [pre_ftl_planet.GetPlanetHabitat] ต้องมีมหาศาลอย่างแน่นอน พวกเขายังคงครอบครองเทคโนโลยีบางส่วนของเรา และพระผู้เป็นเจ้าของพวกเขาเพิ่งถูกลักพาตัวไปโดยผู้รุกรานจากหมู่ดาว"
 observation.106.a:1 "อย่างน้อยปัญหาก็ได้รับการจัดการไปเรื่องหนึ่งแล้ว"
 observation.107.name:1 "ความขัดแย้งทางศาสนาบน [pre_ftl_planet.GetName]"
 observation.107.desc:1 "หลังจากการอพยพตัวนักวิทยาศาสตร์นอกแถวสำเร็จ ดาว [pre_ftl_planet.GetName] ก็ก้าวเข้าสู่ภาวะสงคราม จักรวรรดิที่ [missing_scientist.GetHeShe] สร้างขึ้นได้แตกออกเป็นหลายกลุ่มที่ขัดแย้งกัน แต่ละกลุ่มต่างมีทัศนะคำอธิบายในหลักคำสอนทางศาสนาของ [missing_scientist.GetHisHer] ที่แตกต่างกัน\n\nการสู้รบดำเนินไปอย่างรุนแรงเป็นพิเศษเนื่องจากอาวุธทำลายล้างสูงที่ชาวพื้นเมืองนำมาใช้ ระเบิดสกปรก(ระเบิดร้ายแรง)ทางรังสีหลายลูกถูกจุดชนวนโดยกลุ่มที่เป็นอริ และดูเหมือนว่าความขัดแย้งเพิ่งจะเริ่มต้นขึ้นเท่านั้น"
 observation.107.a:1 "เรื่องนี้จะจบลงไม่ดีแน่..."
 observation.108.name:1 "สถานการณ์คลี่คลายบน [pre_ftl_planet.GetName]"
 observation.108.desc:1 "สถานการณ์บนดาว [pre_ftl_planet.GetName] ดูเหมือนจะสงบลงเล็กน้อยตั้งแต่การนำตัวนักวิทยาศาสตร์นอกแถวออกมา หากไม่มี [missing_scientist.GetHimHer] คอยตีความข้อมูล แผนผังเทคโนโลยีที่ [missing_scientist.GetHeShe] นำติดตัวมาก็ไม่มีประโยชน์สำหรับผู้คนบนดาว [pre_ftl_planet.GetName] ชาว [GetPreFTLLowerPlural] กำลังค่อยๆ กลับไปสู่วิถีชีวิตดั้งเดิมของพวกเขา"
 observation.108.a:1 "ในที่สุดก็มีข่าวดีบ้าง"
 observation.109.name:1 "ขีปนาวุธโจมตีสถานีสังเกตการณ์!"
 observation.109.desc:1 "เมื่อช่วงเช้าที่ผ่านมา ขีปนาวุธจากพื้นสู่อวกาศจำนวนหนึ่งถูกยิงขึ้นมาจากพื้นผิวของ [pre_ftl_planet.GetName] เข้าใส่สถานีสังเกตการณ์ของเรา! สถานีถูกทำลายโดยไม่มีผู้รอดชีวิต\n\nไม่มีข้อสงสัยเลยว่าอารยธรรม [GetPreFTLLower] บนพื้นผิวของ [pre_ftl_planet.GetPlanetHabitat] ยังคงก้าวหน้าต่อไปในอัตราที่น่าเหลือเชื่อ - แม้ความจริงที่ว่าเราได้ถอนอิทธิพลของ 'พระผู้เป็นเจ้า' ของพวกเขาออกไปแล้ว เทคโนโลยีที่ [missing_scientist.GetHeShe] มอบให้พวกเขาต้องเป็นตัวจุดชนวนให้เกิดการปฏิวัติทางวิทยาศาสตร์ที่ยั่งยืนอย่างแน่นอน"
 observation.109.a:1 "นี่คือเหตุผลที่เรามีกฎระเบียบเรื่องการไม่เข้าแทรกแซง"
 observation.110.desc:1 "วิญญาณศักดิ์สิทธิ์ปกป้องข้าด้วย! เจ้าดูเหมือนพระผู้ช่วยให้รอดที่ศักดิ์สิทธิ์ของเรา ทว่าความแตกต่างนั้นเด่นชัด [missing_scientist.GetHeSheCap]พูดถึงปีศาจที่จะเลียนแบบ[missing_scientist.GetHimHerCap]ภายนอก และวันหนึ่ง อาจจะมีการขโมย[missing_scientist.GetHimHerCap]ออกไปคำทำนายเป็นจริงแล้ว และไม่มีข้อสงสัยในใจของข้าเลยว่ามันเป็นฝีมือของพวกเจ้า\n\nพระผู้ช่วยให้รอดศักดิ์สิทธิ์ของเราอยู่ที่ไหน สิ่งมีชีวิตที่ชั่วร้าย? ข้าเรียกร้องให้ปล่อยตัว [missing_scientist.GetHimHerCap] ทันที!"
 observation.110.a:1 "'พระผู้ช่วยให้รอด' ของเจ้าคือนักวิทยาศาสตร์ต่างดาวต่างหาก"
 observation.110.a.response:1 "หยุดลบหลู่ศาสนาเดี๋ยวนี้! การหมิ่นประมาทนามของพระผู้ช่วยให้รอดอันศักดิ์สิทธิ์เป็นบาปที่ไม่อาจให้อภัย และต้องโทษถึงตาย ด้วยเครื่องมือศักดิ์สิทธิ์ของ [missing_scientist.GetHisHerCap] เท่านั้น อารยธรรมของเราจึงประสบความสำเร็จทั้งหมดนี้ได้ ข้าจะยกโทษให้กับการล่วงล้ำของเจ้า ตราบใดที่เจ้าคืนพระผู้ช่วยให้รอดอันศักดิ์สิทธิ์มาให้เรา"
 observation.110.b:1 "[missing_scientist.GetHeSheCap] ถูกประหารชีวิตแล้วสำหรับความผิดที่ทำไว้กับประชากรของเจ้า"
 observation.110.b.response:1 "ฆาตกร เจ้าพวกปีศาจทรยศที่ชั่วร้าย\n\nจำคำของข้าไว้: อาชญากรรมนี้จะไม่ลอยนวล แม้ว่าต้องใช้เวลาพันปี ประชาชนของข้าจะบดขยี้จักรวรรดิปีศาจของเจ้าให้เป็นผุยผง"
 observation.110.c:1 "ตกลง [missing_scientist.GetHeSheCap] จะได้รับการปล่อยตัวกลับไปหาพวกเจ้า"
 observation.110.c.response:1 "ขอพระผู้ช่วยให้รอดศักดิ์สิทธิ์ทรงอภัยบาปของเจ้า เจ้าปีศาจ บางทีอาจจะยังพอมีความหวังสำหรับเจ้าอยู่บ้าง"
 observation.111.desc:1 "ข้าคิดว่าข้าควรขอบคุณที่พวกเจ้าส่งข้ากลับมาหาเหล่าสาวก แม้จะได้รับการปฏิบัติที่ไม่เป็นธรรม การกักขัง และการประเมินทางจิตวิทยาที่ไร้สาระ ข้ายินยอมที่จะปล่อยให้เรื่องที่ผ่านมาแล้วผ่านไป ตราบใดที่พวกเจ้าปล่อยข้าและประชาชนของข้าไว้ตามลำพัง เราสามารถหาทางอยู่ร่วมกันได้ ท้ายที่สุด อวกาศนี้ก็กว้างใหญ่มาก"
 observation.111.a:1 "แล้วเราจะได้เห็นกัน"
 observation.112.desc:1 "เมื่อช่วงเช้าที่ผ่านมา ขีปนาวุธจากพื้นสู่อวกาศจำนวนหนึ่งถูกยิงขึ้นมาจากพื้นผิวของ [pre_ftl_planet.GetName] เข้าใส่สถานีสังเกตการณ์ของเราในวงโคจรสูง! สถานีถูกทำลายโดยไม่มีผู้รอดชีวิต\n\nอารยธรรมบนพื้นผิวของ [pre_ftl_planet.GetPlanetHabitat] ได้ก้าวหน้าขึ้นในอัตราที่น่าเหลือเชื่อ - ไม่ต้องสงสัยเลยว่าต้องขอบคุณความพยายามของนักวิทยาศาสตร์นอกแถวของเรา บัดนี้เราต้องมองพวกเขาเป็นภัยคุกคามที่อาจเกิดขึ้น และโอกาสในการถอนตัวนักวิทยาศาสตร์ออกจากอำนาจได้ถูกปิดลงแล้ว"

# Shuttle Intercepted
 observation.201.name:1 "กระสวยตกบน [pre_ftl_planet.GetName]"
 observation.201.reg_pre_ftl.desc:0 "ระหว่างภารกิจลับสู่พื้นผิวของ[pre_ftl_planet.GetName] กระสวยลำหนึ่งของเราถูกสกัดกั้นโดยฝูงบินรบในชั้นบรรยากาศของประเทศท้องถิ่น ขีปนาวุธนำโชคทำให้เครื่องยนต์ของกระสวยหยุดทำงาน และมันได้ตกลงในพื้นที่ป่าห่างไกล\n\nเราต้องดำเนินการอย่างรวดเร็วเพื่ออพยพผู้รอดชีวิตก่อนที่ชาว [GetPreFTLLowerPlural] จะไปถึงจุดตก หลักฐานการมีอยู่ของเราทั้งหมดจะต้องถูกทำลาย!"
 observation.201.hive_pre_ftl.desc:0 "ระหว่างภารกิจลับสู่พื้นผิวของ [pre_ftl_planet.GetName] กระสวยลำหนึ่งของเราถูกสกัดกั้นโดยฝูงบินรบในชั้นบรรยากาศของจิตสำนึกร่วมที่ยังไม่ระบุตัวตน ขีปนาวุธนำโชคทำให้เครื่องยนต์ของกระสวยหยุดทำงาน และมันได้ตกลงในพื้นที่ป่าห่างไกล\n\nเราต้องดำเนินการอย่างรวดเร็วเพื่ออพยพผู้รอดชีวิตก่อนที่ชาว [GetPreFTLLowerPlural] จะไปถึงจุดตก หลักฐานการมีอยู่ของเราทั้งหมดจะต้องถูกทำลาย!"
 observation.201.reg_pre_ftl.desc.gestalt:0 "กระสวย XB-23-968H ที่มุ่งหน้าสู่ภารกิจสังเกตการณ์ลับวี 45- บีเอ็มบนดาว [pre_ftl_planet.GetName] ได้รายงานความล้มเหลวครั้งสำคัญหลังจากถูกฝูงบินรบในชั้นบรรยากาศของประเทศท้องถิ่นสกัดกั้น เราได้ติดตามตำแหน่งของมันไปยังภูมิภาคที่ไม่มีผู้อยู่อาศัย\n\nโดรนอัตโนมัติทั้งหมดต้องได้รับการอพยพ และหลักฐานการมีอยู่ของเราทั้งหมดต้องถูกทำลายก่อนที่ชาว [GetPreFTLLowerPlural] จะไปถึงจุดตก"
 observation.201.hive_pre_ftl.desc.gestalt:0 "กระสวยของเราที่มุ่งหน้าสู่ภารกิจสังเกตการณ์ลับบนดาว [pre_ftl_planet.GetName] ได้รายงานความล้มเหลวครั้งสำคัญหลังจากถูกฝูงบินรบในชั้นบรรยากาศสกัดกั้น เราได้ติดตามตำแหน่งของมันไปยังภูมิภาคที่ไม่มีผู้อยู่อาศัย\n\nหน่วยประมวลผลอิสระ [GetIndividualNamePlural] ทั้งหมดต้องได้รับการอพยพ และหลักฐานการมีอยู่ของเราทั้งหมดต้องถูกทำลายก่อนที่ชาว [GetPreFTLLowerPlural] จะไปถึงจุดตก"
 observation.201.a:1 "เวลามีน้อยแล้ว"

 observation.202.name:1 "ช่วยเหลือกองกำลังบน [pre_ftl_planet.GetName] สำเร็จ"
 observation.202.start:0 "กองกำลังจาก [Root.GetName] ประสบความสำเร็จในการอพยพผู้รอดชีวิตหลายคนจากกระสวยที่ตกบน [pre_ftl_planet.GetName] เศษซากที่เหลืออยู่ถูกทำลายด้วยการระเบิดที่ควบคุมไว้ ไม่เหลืออะไรเลยนอกจากหลุมอุกกาบาตขนาดเล็กให้ชาว [GetPreFTLLowerPlural] ค้นพบ"
 observation.202.gestalt.start:0 "กองกำลังจาก [Root.GetName] ประสบความสำเร็จในการอพยพหน่วยอิสระหลายหน่วยจากกระสวยที่ตกบน [pre_ftl_planet.GetName] เศษซากที่เหลือถูกทำลายด้วยการระเบิดที่ควบคุมไว้ ไม่เหลืออะไรเลยนอกจากหลุมอุกกาบาตขนาดเล็กให้ชาว [GetPreFTLLowerPlural] ค้นพบ"
 observation.202.reg.end:0 "ประเทศที่เกิดเหตุจะโทษประเทศเพื่อนบ้านว่าเป็นผู้ละเมิดพรมแดนอย่างแน่นอน แต่หวังว่าการรบกวนการพัฒนาตามธรรมชาติของพวกเขาจะเกิดขึ้นน้อยที่สุด"
 observation.202.hive_mind.end:0 "จิตสำนึกร่วมที่เกิดเหตุจะโทษประเทศเพื่อนบ้านว่าเป็นผู้ละเมิดพรมแดนอย่างแน่นอน แต่หวังว่าการรบกวนการพัฒนาตามธรรมชาติของพวกเขาจะเกิดขึ้นน้อยที่สุด"

