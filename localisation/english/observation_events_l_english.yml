 observation.203.name:1 "กองกำลังถูกจับกุมบน [pre_ftl_planet.GetName]"
 observation.203.start:0 "กองกำลังของ [GetPreFTLUpper] บนดาว [pre_ftl_planet.GetName] มาถึงจุดตกก่อนที่เราจะเข้าถึงทีมวิจัยที่ร่วงลงไป และผู้รอดชีวิตทั้งหมดถูกจับกุมตัวไว้"
 observation.203.gestalt.start:0 "กองกำลังของ [GetPreFTLUpper] บนดาว [pre_ftl_planet.GetName] มาถึงจุดตกก่อนที่เราจะเข้าถึงทีมวิจัยที่ร่วงลงไป และหน่วยปฏิบัติการอัตโนมัติทั้งหมดถูกจับกุมตัวไว้"
 observation.203.reg.end:0 "ชาว [GetPreFTLLowerPlural] ได้ตั้งแนวป้องกันรอบซากกระสวย และนักวิทยาศาสตร์ที่ดีที่สุดของพวกเขากำลังวิเคราะห์มันอยู่\n\nบัดนี้พวกเขามีหลักฐานที่ไม่อาจโต้แย้งได้ว่ามีสิ่งมีชีวิตอยู่นอกโลกของพวกเขา ผลกระทบต่อสังคมของพวกเขาจะเป็นอย่างไรนั้นยังคงต้องรอดูกันต่อไป..."
 observation.203.hive_mind.end:0 "ชาว [GetPreFTLLowerPlural] ได้ตั้งแนวป้องกันรอบซากกระสวย และพวกเขากำลังวิเคราะห์มันอยู่\n\nบัดนี้พวกเขามีหลักฐานที่ไม่อาจโต้แย้งได้ว่ามีสิ่งมีชีวิตอยู่นอกโลกของพวกเขา ผลกระทบต่อสังคมของพวกเขาจะเป็นอย่างไรนั้นยังคงต้องรอดูกันต่อไป..."

