# Nuclear War, everyone dead, planet is a tomb world
 observation.205.name:0 "[pre_ftl_planet.GetName] ก้าวเข้าสู่สงครามนิวเคลียร์"
 observation.205.reg.start:0 "ประเทศต่างๆ บนดาว [pre_ftl_planet.GetName] ได้รวมตัวกันต่อต้านประเทศที่ยิงกระสวยของเราตก หลังจากประเทศหลังปฏิเสธที่จะแบ่งปันเทคโนโลยีที่กู้คืนมาได้จากจุดตก"
 observation.205.hive_mind.start:0 "ในเหตุการณ์ที่ไม่เคยมีมาก่อน จิตสำนึกร่วมต่างๆ บนดาว [pre_ftl_planet.GetName] ได้รวมตัวกันต่อต้านจิตสำนึกร่วมที่ยิงกระสวยของเราตก หลังจากกลุ่มหลังปฏิเสธที่จะแบ่งปันเทคโนโลยีที่กู้คืนมาได้จากจุดตก"
 observation.205.end:0 "หลังสงครามตามแบบแผนในระยะเวลาสั้นๆ ทั้งสองฝ่ายต่างทำลายล้างซึ่งกันและกันด้วยการยิงขีปนาวุธนิวเคลียร์ขนานใหญ่ ซึ่งทำลายล้างพื้นที่ส่วนใหญ่ของ [pre_ftl_planet.GetPlanetHabitat]\n\nไม่มีผู้รอดชีวิตบนพื้นผิวเลย รวมถึงนักวิทยาศาสตร์ของเราที่ถูกจับกุม และสิ่งแวดล้อมได้รับความเสียหายอย่างสาหัส"
 observation.205.gestalt.end:0 "หลังสงครามตามแบบแผนในระยะเวลาสั้นๆ ทั้งสองฝ่ายต่างทำลายล้างซึ่งกันและกันด้วยการยิงขีปนาวุธนิวเคลียร์ขนานใหญ่ ซึ่งทำลายล้างพื้นที่ส่วนใหญ่ของ [pre_ftl_planet.GetPlanetHabitat]\n\nไม่มีผู้รอดชีวิตบนพื้นผิวเลย - รวมถึงหน่วยอิสระ [GetIndividualNamePlural] ของเราที่ถูกจับตัว - และสิ่งแวดล้อมได้รับความเสียหายอย่างสาหัส"

