# Nuclear War, pre-ftls regress to stone age, planet is a tomb world
 observation.207.name:0 "$observation.205.name$"
 observation.207.reg.start:0 "$observation.205.reg.start$"
 observation.207.hive_mind.start:0 "$observation.205.hive_mind.start$"
 observation.207.end:0 "หลังสงครามตามแบบแผนในระยะเวลาสั้นๆ ทั้งสองฝ่ายต่างทำลายล้างซึ่งกันและกันด้วยการยิงขีปนาวุธนิวเคลียร์ขนานใหญ่ ซึ่งทำลายล้างพื้นที่ส่วนใหญ่ของ [pre_ftl_planet.GetPlanetHabitat]\n\nดาว [pre_ftl_planet.GetPlanetHabitat] ได้รับความเสียหายอย่างกว้างขวาง โดยเมืองใหญ่ทุกเมืองถูกทำลายและประชากรมากกว่า 90% เสียชีวิต ผู้รอดชีวิตที่กระจัดกระจายโผล่ออกมาจากซากปรักหักพัง แต่นักวิจัยของเราคาดการณ์ว่าอารยธรรมของ [pre_ftl_planet.GetPlanetHabitat] จะถดถอยลงสู่สถานะที่พัฒนาน้อยกว่ามาก นักวิทยาศาสตร์ของเราที่ถูกจับกุมก็นับรวมอยู่ในกลุ่มคนตายจำนวนมากเช่นกัน"
 observation.207.gestalt.end:0 "หลังสงครามตามแบบแผนในระยะเวลาสั้นๆ ทั้งสองฝ่ายต่างทำลายล้างซึ่งกันและกันด้วยการยิงขีปนาวุธนิวเคลียร์ขนานใหญ่ ซึ่งทำลายล้างพื้นที่ส่วนใหญ่ของ [pre_ftl_planet.GetPlanetHabitat]\n\nดาว [pre_ftl_planet.GetPlanetHabitat] ได้รับความเสียหายอย่างกว้างขวาง โดยเมืองใหญ่ทุกเมืองถูกทำลายและประชากรมากกว่า 90% เสียชีวิต ผู้รอดชีวิตที่กระจัดกระจายโผล่ออกมาจากซากปรักหักพัง แต่นักวิจัยของเราคาดการณ์ว่าอารยธรรมของ [pre_ftl_planet.GetPlanetHabitat] จะถดถอยลงสู่สถานะที่พัฒนาน้อยกว่ามาก หน่วยอิสระ [root.GetIndividualNamePlural] ของเราก็นับรวมอยู่ในกลุ่มคนตายจำนวนมากเช่นกัน"

 observation.207.reg_pre_ftl.desc:0 "$observation.207.reg.start$\n\n$observation.207.end$"
 observation.207.hive_pre_ftl.desc:0 "$observation.207.hive_mind.start$\n\n$observation.207.end$"
