# Nuclear War, everyone dead, planet is a toxic world
 observation.206.name:0 "$observation.205.name$"
 observation.206.reg.start:0 "$observation.205.reg.start$"
 observation.206.hive_mind.start:0 "$observation.205.hive_mind.start$"
 observation.206.end:0 "หลังสงครามตามแบบแผนในระยะเวลาสั้นๆ ทั้งสองฝ่ายต่างทำลายล้างซึ่งกันและกันด้วยการยิงขีปนาวุธนิวเคลียร์ขนานใหญ่ ซึ่งทำลายล้างพื้นที่ส่วนใหญ่ของ [pre_ftl_planet.GetPlanetHabitat]\n\nประชากรบนพื้นผิวถูกกวาดล้างทั้งหมด และดาว [pre_ftl_planet.GetName] ไม่สามารถรองรับสิ่งมีชีวิตได้อีกต่อไป นักวิทยาศาสตร์ของเราที่ถูกจับกุมก็นับรวมอยู่ในยอดผู้เสียชีวิตหลายพันล้านคนด้วย"
 observation.206.gestalt.end:0 "หลังสงครามตามแบบแผนในระยะเวลาสั้นๆ ทั้งสองฝ่ายต่างทำลายล้างซึ่งกันและกันด้วยการยิงขีปนาวุธนิวเคลียร์ขนานใหญ่ ซึ่งทำลายล้างพื้นที่ส่วนใหญ่ของ [pre_ftl_planet.GetPlanetHabitat]\n\nประชากรบนพื้นผิวถูกกวาดล้างทั้งหมด และดาว [pre_ftl_planet.GetName] ไม่สามารถรองรับสิ่งมีชีวิตได้อีกต่อไป หน่วยอิสระ [GetIndividualNamePlural] ของเราที่ถูกจับกุมก็นับรวมอยู่ในยอดผู้เสียชีวิตหลายพันล้านคนด้วย"

