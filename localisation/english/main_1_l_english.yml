 pc_continental_tile:0 "เท อร์ ริน"
 pc_continental_tile_desc:0 "ภูมิ ประเทศ ที่ เขียว ขจี มี ภูมิ อากาศ ที่ อ่อน โยน."
 pc_desert_tile:0 "เท อร์ ริน ทะเล ทราย"
 pc_desert_tile_desc:0 "ภูมิ ประเทศ ที่ แห้ง แล้ง และ มี หิน ก้อน เล็ก ๆ เป็น ครั้ง คราว."
 pc_arid_tile:0 "แอริด เท รา ริน"
 pc_arid_tile_desc:0 "พื้น ที่ แห้ง แล้ง และ เต็ม ไป ด้วย หิน พร้อม ด้วย พืช พรรณ จืด ชืด."
 pc_tundra_tile:0 "ตูดรา เทรริน"
 pc_tundra_tile_desc:0 "เย็นและลมแรง สเตปที่มีพืชเจือจาง"
 pc_tropical_tile:0 "เขต ร้อน"
 pc_tropical_tile_desc:0 "ภูมิประเทศที่ปกคลุมด้วยพืช ที่มีอากาศอบอุ่นและชื้น"
 pc_ocean_tile:0 "เท อร์ ริน ใน มหาสมุทร"
 pc_ocean_tile_desc:0 "หมู่ เกาะ และ หมู่ เกาะ ต่าง ๆ ที่ อยู่ ห่าง ไกล อยู่ รอบ มหาสมุทร."
 pc_arctic_tile:0 "อาร์กติกเทรริน"
 pc_arctic_tile_desc:0 "ภูมิประเทศที่มีหิมะและน้ําแข็งปกคลุม"
 pc_savannah_tile:0 "ซา วาน นา"
 pc_savannah_tile_desc:0 "ภูมิ ประเทศ ที่ อบอุ่น และ แห้ง แล้ง ซึ่ง มี ต้น ไม้ และ พุ่ม ไม้ กว้าง ขวาง."
 pc_alpine_tile:0 "แอ ลป์ เท อร์ ริน"
 pc_alpine_tile_desc:0 "ภูมิ ประเทศ ที่ สูง ขึ้น ปก คลุม ด้วย หิมะ และ น้ํา แข็ง."
 pc_gaia_tile:0 "ไกอา เทรริน"
 pc_gaia_tile_desc:0 "ภูมิ ประเทศ ที่ มี ชีวภาพ ซึ่ง เหมาะ กับ รูป แบบ ชีวิต ส่วน ใหญ่ อย่าง เห็น ได้ ชัด."
 pc_nuked_tile:0 "เท อร์ ริน"
 pc_nuked_tile_desc:0 "เฮิร์ช ภูมิประเทศสงคราม ระดับรังสีต่ําพอจะช่วยชีวิตได้"
 pc_infested_tile:0 "เท อร์ ริน ที่ มี ชีวิต ชีวา"
 pc_infested_tile_desc:0 "รถไฟถูกปล้นโดยวงรอบก่อนของฝูง"
 pc_ringworld_habitable_tile:0 "ริงเวิร์น"
 pc_ringworld_habitable_tile_desc:0 "ภูมิประเทศพริสทีน รักษาอย่างดีโดยระบบภายในของเดอะริงเวิลด์"
 pc_machine_tile:0 "เท อร์ ริน"
 pc_machine_tile_desc:0 "ภูมิประเทศที่แข็งตัว ป้องกันการดูดฝุ่นตัวนํายิ่งยวด"
 pc_habitat_tile:0 "อิน เดีย น"
 pc_habitat_tile_desc:0 "บล็อกแผ่นแร่มากกว่าเครื่องกําเนิดแรงโน้มถ่วงเทียมทําหน้าที่เป็นฐานรากที่ทําไว้พร้อม สําหรับการสร้างเมืองและอุตสาหกรรม"

 ####################################
 # Tile Blockers
 ####################################

 d_mountain_range:0 "£blocker£ ภูเขาที่ผ่านไม่ได้"
 mountain_range_singular: "ภูเขา ที่ ไม่ อาจ พิชิต ได้" # used inside event texts
 d_mountain_range_desc:0 "ภูเขา ที่ สูง และ ไม่ อาจ ทอด ยาว ไป ทั่ว ภูมิภาค นี้."
 d_active_volcano:0 "£blocker£ ภูเขาไฟที่ยังมีพลัง"
 active_volcano_singular: "ภูเขา ไฟ ที่ กําลัง ทํา งาน" # used inside event texts
 d_active_volcano_desc:0 "มี ภูเขา ไฟ ลูก หนึ่ง ที่ กําลัง ก่อ ตัว อยู่ ใน ภูมิภาค นี้ ซึ่ง พ่น ลาวา และ ก๊าซ ภูเขา ไฟ ออก มา."
 d_dangerous_wildlife_blocker:0 "£blocker£ สัตว์ป่าอันตราย"
 wildlife_blocker_singular: "ถิ่น อาศัย ตาม ธรรมชาติ" # used inside event texts
 d_dangerous_wildlife_blocker_desc:0 "สัตว์ ป่า ใน แถบ นี้ เป็น อันตราย ถึง ชีวิต โดย เฉพาะ อย่าง ยิ่ง มี สัตว์ ล่า เหยื่อ และ พืช ที่ เป็น พิษ หลาย ชนิด."
 d_dense_jungle:0 "£blocker£ ป่าทึบ"
 dense_jungle_singular: "ป่าทึบ" # used inside event texts
 d_dense_jungle_desc:0 "พื้น ที่ ทั้ง หมด นี้ เต็ม ไป ด้วย ป่า ไม้ หนา ทึบ และ ไม่ อาจ พิชิต ได้."
 d_quicksand_basin:0 "£blocker£ แอ่งทรายดูด"
 quicksand_basin_singular: "แอ่งด่วน" # used inside event texts
 d_quicksand_basin_desc:0 "พื้น ที่ อัน กว้าง ใหญ่ ของ รถ ด่วน ครอบ คลุม พื้น ที่ แถบ นี้ ทํา ให้ การ ก่อ สร้าง เป็น ไป ไม่ ได้."
 d_noxious_swamp:0 "£blocker£ หนองน้ำมีพิษ"
 noxious_swamp_singular: "ที่ ลุ่ม ชื้น แฉะ" # used inside event texts
 d_noxious_swamp_desc:0 "ที่ ลุ่ม ชื้น แฉะ และ หมอก ที่ อยู่ รอบ ๆ ด้วย ก๊าซ เขม่า."
 d_massive_glacier:0 "£blocker£ ธารน้ำแข็งขนาดใหญ่"
 massive_glacier_singular: "ธาร น้ํา แข็ง" # used inside event texts
 d_massive_glacier_desc:0 "ก้อน น้ํา แข็ง หนา ทึบ จํานวน มหาศาล ครอบ คลุม พื้น ที่ นี้."
 d_toxic_kelp:0 "£blocker£ สาหร่ายทะเลมีพิษ"
 toxic_kelp_singular: "แผ่นเคลป์พิษ" # used inside event texts
 d_toxic_kelp_desc:0 "ป่า ไม้ หนา ทึบ แห่ง เคลป ซึ่ง เป็น พิษ ต่อ รูป แบบ ชีวิต ส่วน ใหญ่ ที่ ปก คลุม มหาสมุทร ใน ภูมิภาค นี้."
 d_deep_sinkhole:0 "£blocker£ หลุมลึก"
 deep_sinkhole_singular: "หลุม ลึก" # used inside event texts
 d_deep_sinkhole_desc:0 "หลุม ยุบ ใหญ่ ครอบ คลุม พื้น ที่ ส่วน ใหญ่ ของ ภูมิภาค นี้."
 d_city_ruins:0 "£blocker£ ซากปรักหักพังของเมือง"
 d_city_ruins_desc:0 "เมื่อเมืองที่ดีตอนนี้เพียงแค่ลานกระดูกโลหะยืดเท่าที่ ดวงตาสามารถมองเห็น"
 d_ancient_ruins:0 "£blocker£ ซากปรักหักพังโบราณ"
 d_ancient_ruins_desc:0 "§Lเมื่อเมืองใหญ่ที่สร้างด้วยเทคโนโลยีชั้นสูง ตอนนี้เพียงซากปรักหักพังและซากปรักหักพัง ที่ถูกทิ้งร้างมาหลายศตวรรษ§!"
 d_ancient_cryo_chambers:0 "£blocker£ห้อง ส ตา ซี ที่ พัง พินาศ"
 d_ancient_cryo_chambers_desc:0 "§Lความ ซับ ซ้อน ที่ แผ่ กว้าง ออก ไป ทํา ให้ บาง ส่วน เสีย หาย เนื่อง จาก มี ห้อง แช่ แข็ง หลาย ล้าน ห้อง. ความซับซ้อนนี้ไม่มีพลังงาน และมีเพียงเศษซากชีวภาพ ของผู้อาศัยในห้อง ที่ดูเหมือนจะมาจาก§!"
 d_tribal_settlement:0 "£blocker£การ ฟื้นฟู ชน พื้น เมือง"
 d_tribal_settlement_desc:1 "พื้นที่นี้ทั้งภูมิภาค ถูกแยกไว้เป็นเขตสงวน สําหรับประชากรพื้นเมือง ก่อนปีความเร็ว"
 d_xeno_preserve:0 "£blocker£ ที่อนุรักษ์พันธุ์ต่างดาว"
 d_xeno_preserve_desc:0 "พื้นที่ทั้งหมดนี้ถูกแยกไว้ เพื่อเป็นเขตสงวนสําหรับสัตว์ต่างดาวที่ใกล้สูญพันธุ์"
 d_wandering_forests:0 "£blocker£ป่า เร่ร่อน"
 d_wandering_forests_desc:0 "ป่าเคลื่อนที่ของโลกนี้มักจะอพยพ ไปยังภูมิภาคใหม่ ขัดขวางความพยายามในการสร้างถนน สายไฟฟ้า และโครงสร้างพื้นฐานอื่น ๆ"
 d_wandering_forest_reserve:0 "£blocker£เขต อนุรักษ์ ป่า เร่ร่อน"
 d_wandering_forest_reserve_desc:0 "§Yเพิ่ม£society£ การวิจัยไปยังกระเบื้องข้างเคียง§!\n\nเขต อนุรักษ์ ธรรมชาติ ซึ่ง ครอบ คลุม พื้น ที่ กว้าง ใหญ่ ไพศาล ซึ่ง มี ป่า ไม้ เร่ร่อน อยู่."
 d_sinkhole_subterraneans:0 "£blocker£ Subterranean Entrance"
 d_sinkhole_subterraneans_desc:0 "หลุม ใหญ่ ใน พื้น ดิน ซึ่ง นํา ไป สู่ เครือ ข่าย ถ้ํา อัน กว้าง ใหญ่ ซึ่ง ทอด ตัว อยู่ ใต้ ผิว โลก นี้."
 d_crater:0 "£blocker£ หลุมอุกกาบาต"
 d_crater_desc:0 "บางสิ่งบางอย่างชนกับพื้นผิว ของโลกนี้ ณ จุดใดจุดหนึ่ง"
 d_bomb_crater:0 "£blocker£ หลุมระเบิด"
 d_bomb_crater_desc:0 "ปล่อง ภูเขา ไฟ ขนาด มหึมา นี้ ถูก สร้าง ขึ้น โดย การ ระเบิด ลูก ระเบิด ไฮโดรเจน ที่ ก่อ ความ เสีย หาย เป็น พิเศษ."
 d_ruined_district:0 "£blocker£พื้นที่ที่ถูกทําลาย"
 d_ruined_district_desc:0 "บริเวณ นี้ ปก คลุม ด้วย ปล่อง ภูเขา ไฟ นับ ไม่ ถ้วน ซึ่ง เกิด จาก การ ระเบิด อย่าง ไม่ หยุด ยั้ง."
 d_radioactive_wasteland:0 "£blocker£ดินแดนร้างของวิทยุ"
 d_radioactive_wasteland_desc:0 "สิ่งมีชีวิตไม่กี่ชนิดสามารถอยู่รอดได้ ในพื้นที่รกร้างว่างเปล่านี้"
 d_failing_infrastructure_desc:0 "พื้น ที่ แถบ นี้ ถูก ปก คลุม ด้วย สิ่ง ก่อ สร้าง ทาง อุตสาหกรรม ที่ เสีย หาย และ ดิน ที่ เป็น พิษ; เด ท ริ ทุส จาก ยุค ที่ ผ่าน ไป แล้ว."
 d_failing_infrastructure:0 "£blocker£โรงงานร้าง"
 d_forgotten_civilization:0 "£blocker£อารยธรรมที่ถูกลืม"
 d_forgotten_civilization_desc:0 "ซากปรักหักพังของอารยธรรมที่ถูกลืม ที่อยู่ที่นี่ก่อนเรา"
 d_decrepit_dwellings:0 "£blocker£ลูก ตุ้ม ที่ เปราะ บาง"
 d_decrepit_dwellings_desc:0 "พื้น ที่ แถบ นี้ เต็ม ไป ด้วย เมือง อัน กว้าง ใหญ่ และ สลัม ที่ เต็ม ไป ด้วย คน ยาก จน และ ผู้ ถูก ขับ ไล่."
 d_decrepit_dwellings_custom_tooltip:0 "§G100§! £pop£ ประชากรถูกสร้าง"
 d_titanic_life_blocker:0 "£blocker£ รูปแบบสิ่งมีชีวิตขนาดใหญ่"
 d_titanic_life_blocker_desc:0 "เอเลี่ยนไททานิกจํานวนมาก ทําให้พื้นที่นี้เป็นบ้านของพวกเขา จะฉลาดที่จะหลีกเลี่ยงมัน"
 d_bombarded_land:0 "£blocker£พื้น ที่ ถูก ทิ้ง"
 d_bombarded_land_desc:0 "พื้นที่เสียหายจากการทิ้งระเบิดของออร์บิทัล"
 d_battlefield_debris:0 "£blocker£สนามรบ เดบริส"
 d_battlefield_debris_desc:0 "พื้น ที่ ได้ รับ ความ เสีย หาย อย่าง หนัก จาก การ สู้ รบ ที่ มี อยู่ ทั่ว ไป."
 d_tomb_world_ruins:0 "£blocker£ ซากปรักหักพัง"
 d_tomb_world_ruins_desc:0 "ประชากรที่กระจัดกระจายของสัตว์กินคน กําลังออกจากการดํารงอยู่ที่สิ้นหวัง ในซากปรักหักพังของเมืองนี้"
 d_tomb_world_wasteland:0 "£blocker£ เขตกัมมันตภาพรังสี"
 d_tomb_world_wasteland_desc:0 "พื้นที่ที่เป็นเป้าหมายของหัวรบนิวเคลียร์จํานวนมาก แม้ว่ารังสีในบริเวณนี้จะลดลง ตั้งแต่ผลกระทบแรก แต่ก็ยังคงไม่เหมาะสมสําหรับการตั้งถิ่นฐาน"
 d_machine_empire_ruins:0 "£blocker£เมืองยาว"
 d_machine_empire_ruins_desc:0 "ซากปรักหักพังของสิ่งที่น่าจะเคยเป็น ศูนย์กลางประชากรที่สําคัญบนโลกใบนี้ ไม่มีวี่แววของประชากรในอดีต"
 d_exterminators_ruins:0 "£blocker£อดีตเมืองออร์แกน"
 d_exterminators_ruins_desc:0 "ซาก ปรัก หัก พัง ของ สิ่ง ที่ เคย เป็น ศูนย์กลาง ใหญ่ ของ ประชากร อินทรีย์. ตึกที่ยังคงตั้งอยู่ ยังมีเพียงขี้เถ้า"
 d_assimilators_ruins:0 "£blocker£ซาก ปรัก หัก พัง ที่ เงียบ งัน"
 d_assimilators_ruins_desc:0 "การตั้งถิ่นฐานครั้งสําคัญนี้ ตอนนี้กลายเป็นซากปรักหักพัง ที่ถูกครอบครองโดยศพที่เน่าสลายของอินทรีย์เหล่านั้น"
 d_former_battlefield:0 "£blocker£สนาม รบ"
 d_former_battlefield_desc:0 "หลาย หมื่น คน เผา เครื่อง รบ และ ซาก กระดูก ที่ ผิด รูป ไป ของ ทหาร อินทรีย์ ทิ้ง พื้น ดิน ใน อดีต สมรภูมิ แห่ง นี้. การ แผ่ รังสี ใน ถุง ยาง อนามัย จะ เข้า ไป เกี่ยว ข้อง กับ อุปกรณ์ อิเล็กทรอนิกส์ ส่วน ใหญ่."
 d_strip_mine:0 "£blocker£ เหมืองเปิดหน้าดินร้าง"
 d_strip_mine_desc:0 "ใน อดีต บริเวณ นี้ เคย มี การ ทํา เหมือง กัน อย่าง หนัก โดย เครื่อง จําลอง ที่ เก่า แก่ และ ล้า สมัย กว่า ซึ่ง น่า เสียดาย ที่ ไม่ มี การ ตั้ง โปรแกรม ให้ ทํา การ พัฒนา ภูมิภาค นี้ ใน อนาคต."
 d_unsupervised_settlement:0 "£blocker£การปรับตั้งที่ควบคุมไม่ได้"
 d_unsupervised_settlement_desc:0 "ชิ้นส่วนของสังคมอินทรีย์ ในโลกนี้ ที่ยังคงอยู่ นอกการดูแลของเครื่องจักร ความรุนแรง โรคและความอดอยาก แพร่หลายไปทั่วภายในกําแพงของข้อตกลง ซึ่งประชากรได้ฟื้นฟูเทคโนโลยี โดยหลายร้อยปี"
 d_collapsed_burrows:0 "£blocker£เบอร์โรวส์ที่ถูกยุบ"
 d_collapsed_burrows_desc:0 "สถาน ที่ แห่ง นี้ เคย เป็น ที่ พัก อาศัย ของ ระบบ อุโมงค์ ใต้ ดิน ที่ มี คน อาศัย อยู่ มาก มาย โดย ทาง ไฮฟ์ แต่ ถูก ทิ้ง เนื่อง จาก การ ใช้ ทรัพยากร และ สัตว์ ป่า ใน ท้อง ถิ่น มาก เกิน ไป."
 d_ruined_building_blocker:1 "£blocker£ ซากปรักหักพัง"
 d_ruined_building_blocker_desc:0 "ซากปรักหักพังปิดกั้นทุกทางเข้า"
 d_hibernating_lithoids:0 "£blocker£ Lithoid Monoliths"
 d_hibernating_lithoids_desc:0 "มี แร่ ธาตุ มาก มาย มหาศาล อย่าง น่า ทึ่ง ซึ่ง ดู เหมือน ประกอบ ด้วย ไล ทอย ด์ ที่ เป็น โรค กลัว."
 d_big_nature_preserve_blocker:0 "$d_nature_preserve_blocker$"
 d_big_nature_preserve_blocker_desc:0 "ส่วนหนึ่งของโลกนี้ได้รับการประกาศว่าอนุรักษ์ธรรมชาติ และอาจจะไม่เคยถูกแก้ไขด้วย"
