 trait_ruler_industrialist_desc:2 "ผู้นําคนนี้มุ่งเน้นไปที่ การเพิ่มขึ้นของแร่ธาตุ"
 trait_ruler_eye_for_talent:0 "มุมมองแบบพิเศษ"
 trait_ruler_eye_for_talent_desc:1 "ผู้ นํา คน นี้ ได้ รับ การ ถือ ว่า เป็น คน มี ความ สังเกต เข้าใจ อย่าง ผิด ปกติ มี พรสวรรค์ ซึ่ง คน อื่น มอง เห็น แต่ ความ แปลก ประหลาด หรือ ไร้ ความ สามารถ."
 trait_ruler_deep_connections:0 "ความสัมพันธ์เชิงลึก"
 trait_ruler_deep_connections_desc:1 "ผู้นําคนนี้ฝังตัวอยู่ในเครือข่ายเขาวงกต ที่สร้างเครื่องการเมืองขึ้นมา"
 trait_ruler_deep_connections_2:0 "$trait_ruler_deep_connections$2"
 trait_ruler_deep_connections_2_desc:0 "$trait_ruler_deep_connections_desc$"
 trait_ruler_charismatic: "ไวยากรณ์"
 trait_ruler_charismatic_desc:1 "ผู้นําคนนี้มีเสน่ห์เป็นพิเศษ บังคับให้พวกเขาทําได้อย่างง่ายดาย"
 trait_ruler_champion_of_the_people:0 "แชมป์ของประชาชน"
 trait_ruler_champion_of_the_people_desc:1 "ผู้ นํา คน นี้ ดู เหมือน ห่วงใย จริง ๆ ต่อ ประชากร ของ ตน."
 trait_ruler_feedback_loop:0 "ลูปข้อเสนอแนะ"
 trait_ruler_feedback_loop_desc:1 "วงจรการสะท้อนกลับที่มีประสิทธิภาพ และการวิเคราะห์การกระทํา ทําให้หน่วยนี้คาดเดาผลลัพธ์ได้ดีขึ้น"
 trait_ruler_expansionist:0 "นักขยายเขตแดน"
 trait_ruler_expansionist_desc:3 "ผู้นําคนนี้มีจุดมุ่งหมายที่จะขยายอาณาเขต"
 trait_ruler_fertility_preacher:0 "ผู้สั่งสอนความอุดมสมบูรณ์"
 trait_ruler_fertility_preacher_desc:2 "ผู้ นํา คน นี้ มี ความ สามารถ ใน การ ได้ มา ซึ่ง ทรัพยากร อัน สําคัญ ยิ่ง สําหรับ ประชากร ที่ กําลัง เพิ่ม จํานวน ขึ้น."
 trait_ruler_investor:0 "นักลงทุน"
 trait_ruler_investor_desc:1 "ผู้นําคนนี้เป็นนักเศรษฐศาสตร์ที่ฉลาด สามารถขยายศักยภาพทางการเงินได้มากที่สุด"
 trait_ruler_investor_2:0 "$trait_ruler_investor$2"
 trait_ruler_investor_2_desc:0 "$trait_ruler_investor_desc$"
 trait_ruler_investor_3:0 "$trait_ruler_investor$3"
 trait_ruler_investor_3_desc:0 "$trait_ruler_investor_desc$"
 trait_ruler_space_miner:0 "นักขุดแร่อวกาศ"
 trait_ruler_space_miner_desc:1 "ผู้นําคนนี้ตระหนักว่าการแสวงหา ประโยชน์จากทรัพยากรจากโลกนี้ มีความสําคัญต่อชาติดาว"
 trait_ruler_explorer:2 "รักการเรียนรู้และการศึกษา"
 trait_ruler_explorer_desc:1 "ผู้นําคนนี้เป็นที่รู้จักจากการอยากรู้อยากเห็นอย่างไม่รู้จักกันของพวกเขา การสํารวจอวกาศที่แผ่ขยายเหนือสิ่งอื่นใดทั้งหมด"
 trait_ruler_explorer_2:0 "$trait_ruler_explorer$2"
 trait_ruler_explorer_2_desc:0 "$trait_ruler_explorer_desc$"

 # Machine
 leader_trait_ruler_machine_intelligence:0 "สติปัญญาจักรกล"
 leader_trait_ruler_machine_intelligence_desc:0 "ผู้นํานี้เป็นแกนปัญญา ที่ดูแลและกํากับทุกการกระทําในเครื่องจักรจักรวรรดิ."
 leader_trait_flexible_programming:0 "เขียนโปรแกรมคำสั่งยืดหยุ่น"
 leader_trait_flexible_programming_desc:0 "ผู้นําคนนี้มีการเขียนโปรแกรมที่ยืดหยุ่นได้ผิดปกติ และมีความสามารถในการปรับปรุงวิธีการใหม่อย่างรวดเร็ว"
 leader_trait_rigid_programming:0 "เขียนโปรแกรมคำสั่งไม่ยืดหยุ่น"
 leader_trait_rigid_programming_desc:0 "ผู้ นํา คน นี้ มี โปรแกรม ที่ เข้ม งวด เป็น พิเศษ ซึ่ง แทบ จะ ไม่ อนุญาต ให้ มี การ ปรับ เปลี่ยน พฤติกรรม แม้ แต่ เมื่อ การ เปลี่ยน แปลง เช่น นั้น จะ ทํา ให้ มี ประสิทธิภาพ ดี ขึ้น."
 leader_trait_newboot:0 "บูตใหม่"
 leader_trait_newboot_desc:0 "ผู้นํารายนี้เพิ่งถูกอัพเกรดเป็นรัฐอัตโนมัติ ที่อนุญาตให้เข้ารับตําแหน่งคําสั่ง"
 leader_trait_warbot_tinkerer:0 "นักประดิษฐ์บอทสงคราม"
 leader_trait_warbot_tinkerer_desc:0 "ผู้นําคนนี้สนใจการออกแบบวอร์บอทอย่างผิดปกติ และปรับปรุงและเล่นกับแบบจําลองที่มีอยู่อย่างต่อเนื่อง"
 leader_trait_ai_aided_design:0 "ใช้ AI ออกแบบ"
 leader_trait_ai_aided_design_desc:0 "ผู้นําคนนี้ยังคงดําเนินการ แบบจําลองทางทฤษฎีบนแกนหน่วยความจํารอง สําหรับวัตถุประสงค์ของการปรับปรุง ประสิทธิภาพในการสร้างดวงดาว"
 leader_trait_bulldozer:0 "นักเกลี่ยดิน"
 leader_trait_bulldozer_desc:0 "ผู้นําคนนี้เก่งด้านศิลปะ การเปลี่ยนภูมิประเทศ ของเอเลี่ยนอย่างมีประสิทธิภาพ ให้กลายเป็นที่จอดรถ"
 leader_trait_analytical:0 "นักวิเคราะห์"
 leader_trait_analytical_desc:0 "ผู้นํารายนี้อุทิศจํานวนเปอร์เซ็นต์ที่มากผิดปกติของโปรเซสเซอร์ เพื่อวิเคราะห์วิทยาศาสตร์ธรรมชาติ"
 leader_trait_parts_cannibalizer:0 "นักซ่อมที่นำชิ้นส่วนของอีกเครื่องยนต์หนึ่งมาใช้"
 leader_trait_parts_cannibalizer_desc:0 "ผู้นําคนนี้เก่งมาก ในการกินเนื้อคน จากสงครามที่ล้มเหลว หรือทําให้คนอื่นๆ วิ่งได้นานกว่า"
 leader_trait_demoralizer:0 "ทำให้หมดกำลังใจ"
 leader_trait_demoralizer_desc:0 "ผู้นําคนนี้หลงไหลในจิตใจที่เปราะบางของอินทรีย์ และวิธีการที่พวกเขาสามารถทําลายอย่างมีประสิทธิภาพได้มากที่สุด ผ่านการใช้กลยุทธ์อันสร้างสรรค์"
 leader_trait_erratic_morality_core:0 "โปรแกรมหลักศีลธรรมผิดพลาด"
 leader_trait_erratic_morality_core_desc:0 "ผู้นํารายนี้มักจะประสบ กับความละอายใจอย่างรุนแรง และความเสียใจต่อผู้บาดเจ็บจากศัตรู"
 leader_trait_maintenance_loop:0 "บำรุงรักษารองอย่างต่อเนื่อง"
 leader_trait_maintenance_loop_desc:0 "ผู้นํารายนี้ มีส่วนร่วมในวงจรการบํารุงรักษารองอย่างต่อเนื่อง ดูแลอย่างรอบคอบของเรือทุกลําในกองเรือ และลดค่าใช้จ่ายในการผลิตของพวกเขา"
 leader_trait_unstable_code_base:0 "โค้ดไม่เสถียร"
 leader_trait_unstable_code_base_desc:0 "ผู้นํารายนี้ทรมานจากรหัสที่ไม่เสถียร ส่งผลให้มีอาการกระตุก และบางครั้งพฤติกรรมที่ผิดปกติ"
 leader_trait_cataloger:0 "บรรณารักษ์ผู้ทำรายการ"
 leader_trait_cataloger_desc:0 "ผู้นําคนนี้ไม่สามารถคิด ของการเรียกร้องใด ๆ ที่มากขึ้นกว่า เพื่อทํารายการทั้งหมดของจักรวาล"

 # Event Special
 leader_trait_sentinel:0 "การฝึกเซนติเนล"
 leader_trait_sentinel_desc:0 "ผู้ บัญชา การ กอง เรือ เซนติเนล มี ความ รู้ ที่ ละเอียด เกี่ยว กับ กายวิภาค และ กลยุทธ์ ของ พรีธิน."
 leader_trait_hive_mind:0 "จิตสำนึกร่วม"
 leader_trait_hive_mind_desc:0 "สติสัมปชัญญะที่ควบคุม การปฏิบัติของกองเรือพรีธิน ได้พิสูจน์แล้ว"
 leader_trait_hive_affinity:0 "เพิ่มความสัมพันธ์"
 leader_trait_hive_affinity_desc:0 "สิ่งมีชีวิตพรีไทน์ ทํางานภายใต้จิตสํานึกของกองทัพเรือนี้ ได้จัดการบรรลุระดับที่ผิดปกติ ของความผูกพันกับอีกคนหนึ่ง การ ตี สอน ของ พวก เขา ดี ขึ้น มาก ทํา ให้ มี ไฟ มาก ขึ้น."
 leader_trait_void_swimmer:0 "สัญชาตญาณนักล่า"
 leader_trait_void_swimmer_desc:0 "สัญชาติญาณการล่าของยานลํานี้ ได้ผลักดันสิ่งมีชีวิตพรีไทน์ ภายใต้การปกครองของมัน ความ กระตือรือร้น ใน การ สู้ รบ กระตุ้น พวก เขา ให้ รุด หน้า ต่อ ไป."
 leader_trait_ethereal:0 "ไม่มีตัวตน"
 leader_trait_ethereal_desc:0 "เจ้า นาย บาง คน ใน กองทัพ เรือ ที่ มี ความ สามารถ พิเศษ ได้ เรียน รู้ ที่ จะ ใช้ เรือ ของ ตน เพื่อ เพิ่ม ความ สามารถ ใน การ ป้องกัน ตัว ใน การ ต่อ สู้."
 leader_trait_dimensional_stutter:0 "สเตอร์เตอร์ขนาด"
 leader_trait_dimensional_stutter_desc:0 "ด้วย เหตุ ผล ที่ ไม่ ทราบ ว่า ด้วย เหตุ ใด เรือ ที่ อยู่ ภาย ใต้ การ บัญชา ของ เจ้า นาย กอง เรือ เกิน มิติ นี้ ดู เหมือน จะ พูด ติด อ่าง อย่าง รวด เร็ว ทั้ง ใน และ นอก เหนือ จาก การ ดํารง อยู่ ของ เรือ ซึ่ง มี ผล ต่อ การ เพิ่ม อัตรา ความ เร็ว แสง ต่ํา ของ มัน."



