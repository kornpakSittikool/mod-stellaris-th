 ####################################
 # Leader Traits
 ####################################

 # All
 leader_trait_adaptable: "ปรับได้"
 leader_trait_adaptable_desc:3 "ผู้ นํา คน นี้ รีบ รับ เอา วิธี การ ใหม่ ๆ และ แนว คิด ใหม่ ๆ ที่ ปรากฏ ว่า เหนือ กว่า."
 leader_trait_stubborn: "สลาก"
 leader_trait_stubborn_desc:1 "ผู้นําคนนี้ดื้อและช้าในการยอมรับวิธีการและความคิดใหม่ๆ ถึงแม้ว่าพวกเขาจะพิสูจน์แล้วว่าเหนือกว่า"
 leader_trait_resilient: "ยืดหยุ่น"
 leader_trait_resilient_desc:2 "ผู้นําคนนี้มีความยืดหยุ่น และอยู่ในสภาวะทางกายภาพที่ยอดเยี่ยม เพิ่มอายุขัยของพวกเขา"
 leader_trait_substance_abuser:0 "ติดยา"
 leader_trait_substance_abuser_desc:2 "ผู้ นํา คน นี้ ตก เป็น เหยื่อ ของ การ ทํา ร้าย ร่าง กาย เพื่อ รับมือ กับ ความ เครียด ซึ่ง ก่อ ผล เสีย หาย ต่อ สุขภาพ ของ พวก เขา."
 leader_trait_eager: "ความกระสับกระส่าย"
 leader_trait_eager_desc:1 "ผู้นําคนนี้กระตือรือร้นอย่างยิ่ง ที่จะได้รับมอบหมายงาน"
 leader_trait_arrested_development:0 "เหนี่ยวรั้งการพัฒนา"
 leader_trait_arrested_development_desc:2 "การพัฒนาและทักษะส่วนบุคคลของผู้นํานี้ ดูจะเป็นที่พักผ่อน"
 leader_trait_intemporal: "ตัวพิมพ์เล็ก"
 leader_trait_intemporal_desc:0 "ผู้นําคนนี้ถูกรบกวนโดยเวลา และจะไม่ตายจากวัยชรา"

 # Admiral
 leader_trait_ex_fighter_pilot:0 "นักบินรบ"
 leader_trait_ex_fighter_pilot_desc:1 "อดีตเอซอวกาศ ผู้นําคนนี้เก่งกาจ ในการใช้ความเร็วและการเคลื่อนไหว ของฝูงบินจักรกล"
 leader_trait_trickster:0 "นักหลอกล่อ"
 leader_trait_trickster_desc:1 "ผู้นําคนนี้ต่อสู้อย่างเจ้าเล่ห์ พึ่งพาทางที่ผิดและแปลกใจที่จะได้รับที่ดีกว่าของศัตรู"
 leader_trait_fleet_logistician:0 "นักส่งกำลังบำรุงกองยาน"
 leader_trait_fleet_logistician_desc:1 "ผู้นําคนนี้เก่งด้านการใช้ไม้บรรทัด และรู้วิธีจัดการเสบียง"
 leader_trait_fleet_organizer:0 "นักจัดการกองยาน"
 leader_trait_fleet_organizer_desc:1 "ผู้นําคนนี้เป็นผู้เชี่ยวชาญในองค์กร มีทักษะการบํารุงรักษาระดับจุลภาคที่จําเป็น เพื่อควบคุมการก่อตัวของดวงดาวขนาดใหญ่"
 leader_trait_nervous: "กังวล"
 leader_trait_nervous_desc:2 "ผู้นํานี้มีประสาทและกังวลและถูกจมง่าย คําสั่งขนาดใหญ่ของตําแหน่งดาว"
 leader_trait_engineer:0 "วิศวกร"
 leader_trait_engineer_desc:1 "ผู้นําคนนี้เป็นวิศวกรธรรมชาติ มีความรู้และทักษะในการจัดการและดูแลการซ่อมแซมยานอวกาศ"
 leader_trait_aggressive: "ก้าวร้าว"
 leader_trait_aggressive_desc:2 "ผู้นํารายนี้มีความก้าวร้าวมาก ครอบงําศัตรูด้วยแรงกระแทกมากมายจากอาวุธของกองทัพเรือ"
 leader_trait_cautious: "หยาบคาย"
 leader_trait_cautious_desc:1 "ผู้นําคนนี้เป็นผู้บัญชาการที่ระมัดระวัง หลีกเลี่ยงความเสี่ยงที่ไม่จําเป็น และดูแลรักษาการก่อตัวอยู่เสมอ"
 leader_trait_unyielding:0 "ไม่ยอมใคร"
 leader_trait_unyielding_desc:2 "ผู้นําคนนี้อยากจะสู้ตาย มากกว่ายอมรับความพ่ายแพ้"
 leader_trait_gale_speed:0 "รวดเร็ว-ว่องไว"
 leader_trait_gale_speed_desc:1 "ผู้นําคนนี้เชื่อว่า ความเร็วและการเคลื่อนไหวอย่างรวดเร็ว เป็นกุญแจสู่ความสําเร็จ ในการหมั้นอวกาศใด ๆ"
