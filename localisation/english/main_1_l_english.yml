 FE_LOGISTICS_PLANET_DEFICIT_TOOLTIP: "§H$FE_LOGISTICS_PLANET_DEFICIT$§!\nนี้ควบคุม$r_trade$ค่า ใช้ จ่าย ใน การ จัด หา ดาว เคราะห์ ที่ มี ความ บกพร่อง ใน ท้อง ถิ่น. เพิ่มมากขึ้นนี้จะทําให้มันแพงขึ้น ที่จะมีดาวเคราะห์พิเศษมากๆ ที่มีความบกพร่องในท้องถิ่นขนาดใหญ่จักรวรรดิ."

