 trait_rapid_breeders:0 "ขยายพันธุ์อย่างรวดเร็ว"
 trait_rapid_breeders_desc:0 "§Lสัตว์ ชนิด นี้ แพร่ พันธุ์ ได้ อย่าง รวด เร็ว และ เพิ่ม จํานวน ประชากร.§!\n"
 trait_rapid_breeders_lithoid:0 "$trait_rapid_breeders$"
 trait_rapid_breeders_lithoid_desc:0 "$trait_rapid_breeders_desc$"
 trait_slow_breeders:0 "ขยายพันธุ์ช้า"
 trait_slow_breeders_desc:0 "§Lสายพันธุ์นี้แพร่พันธุ์ในอัตราที่ช้า ทําให้การเติบโตของประชากรลดลง§!\n"
 trait_delicious:0 "สนุกสนาน"
 trait_delicious_desc:0 "§Lสิ่ง มี ชีวิต ชนิด นี้ มี การ ปรับ ตัว ทาง วิวัฒนาการ อย่าง น่า ทึ่ง จาก การ มี คุณค่า ทาง โภชนาการ สูง เมื่อ รับ ประทาน.§!\n"
 trait_nerve_stapled:0 "เย็บเส้นประสาท"
 trait_nerve_stapled_desc:0 "§Lทางเดินของระบบประสาท ที่เกี่ยวข้องกับการรักษาตัวเอง และอิสระที่ถูกตัด§!\n"
 trait_fertile:0 "เจริญพันธุ์"
 trait_fertile_desc:1 "§Lความ หลาก หลาย ตาม ธรรมชาติ และ ความ หลาก หลาย ของ สิ่ง มี ชีวิต ชนิด นี้ ได้ รับ การ เสริม อย่าง น่า ทึ่ง โดย การ พัฒนา ทาง กายภาพ และ พฤติกรรม ที่ ก้าวร้าว.§!\n"
 trait_erudite:0 "มีวิชาความรู้สูง"
 trait_erudite_desc:1 "§Lวิศวกรรมชีวภาพได้ปลดล็อค ส่วนต่าง ๆ ของสมองของสายพันธุ์นี้ก่อนหน้านี้ เพิ่มขึ้นอย่างมาก§!\n"
 trait_robust:0 "แข็งแรง"
 trait_robust_desc:0 "§Lอวัยวะชีวภาพที่ทําหน้าที่ซ้ําซ้อน ทําให้สิ่งมีชีวิตชนิดนี้ ต่อต้านอันตรายทางสิ่งแวดล้อมอย่างมาก§!\n"
 trait_charismatic:0 "มีพรสวรรค์"
 trait_charismatic_desc:0 "§Lสมาชิก ของ ชนิด นี้ มี เครื่องราง พิเศษ และ โดย ทั่ว ไป ถือ กัน ว่า น่า ยินดี ที่ อยู่ รอบ ๆ.§!\n"
 trait_repugnant:0 "น่ารังเกียจ"
 trait_repugnant_desc:0 "§Lลักษณะทางกายภาพและขนบธรรมเนียมของเผ่าพันธุ์นี้ถือเป็นที่น่ารังเกียจสำหรับคนอื่นๆส่วนใหญ่และมีเพียงไม่กี่คนที่ชื่นชมพวกมันในฐานะเพื่อนบ้าน§!\n"
 trait_talented:0 "มีพรสวรรค์"
 trait_talented_desc:0 "§Lสมาชิก ของ ชนิด นี้ เกิด มา พร้อม กับ ความ เหมาะ สม ตาม ธรรมชาติ.§!\n"
 trait_strong:0 "แข็งแกร่ง"
 trait_strong_desc:0 "§Lสมาชิก ของ เผ่า พันธุ์ นี้ มี ความ แข็ง แรง ทาง กายภาพ อย่าง มาก ทํา ให้ พวก เขา เป็น นัก สู้ ที่ น่า กลัว บน พื้น ดิน.§!\n"
 trait_strong_tt: "งาน ที่ น่า พอ ใจ:§G+2.50%§!"
 trait_very_strong:0 "แข็งแกร่งมาก"
 trait_very_strong_desc:0 "§Lสมาชิก ของ สิ่ง มี ชีวิต ชนิด นี้ มี กําลัง ที่ เกือบ จะ ขัด กับ กฎ ทาง ฟิสิกส์.§!\n"
 trait_very_strong_tt: "งาน ที่ น่า พอ ใจ:§G+5.00%§!"
 trait_weak:0 "อ่อนแอ"
 trait_weak_desc:0 "§Lสมาชิก ของ เผ่า พันธุ์ นี้ อ่อนแอ กว่า เฉลี่ย ทํา ให้ พวก เขา เป็น นัก สู้ ที่ ยาก จน บน พื้น ดิน.§!\n"
 trait_weak_tt: "งาน ที่ น่า พอ ใจ:§R-2.50%§!"
 trait_tough:0 "ทนทาน"
 trait_tough_desc:0 "สมาชิกของสายพันธุ์นี้ สามารถมีการบาดเจ็บทางกายภาพ ที่ฆ่าสิ่งมีชีวิตอื่นได้มากที่สุด\n"
 trait_frail:0 "เปราะบาง"
 trait_frail_desc:0 "§Lสมาชิก ของ สิ่ง มี ชีวิต ชนิด นี้ มี ข้อ บกพร่อง เป็น พิเศษ — บ่อย ครั้ง การ บาด เจ็บ เล็ก ๆ น้อย ๆ ต่อ คน อื่น อาจ ทํา ให้ พวก เขา ถึง ตาย ได้.§!\n"
 trait_stoic:0 "สโตอิก"
 trait_stoic_desc:0 "§Lสมาชิก ของ เผ่า พันธุ์ นี้ มี วินัย ทาง จิตใจ อย่าง มาก ไม่ ค่อย จะ หวาด หวั่น เมื่อ เผชิญ สถานการณ์ ที่ เป็น อันตราย.§!\n"
 trait_timid:0 "ขี้ขลาด"
 trait_timid_desc:0 "§Lสมาชิก ของ เผ่า พันธุ์ นี้ มัก จะ หลบ หลีก การ เผชิญ หน้า ทาง กาย และ ตื่น ตระหนก ทันที.§!\n"
 trait_indolent:0 "เกียจคร้าน"
 trait_indolent_desc:0 "§Lสมาชิก ของ เผ่า พันธุ์ นี้ หลีก เลี่ยง การ ทํา งาน หนัก และ โดย ทั่ว ไป แล้ว หลีก เลี่ยง การ ทุ่มเท ตัว เอง.§!\n"
 trait_communal:0 "ชุมชน"
 trait_communal_desc:0 "§Lสมาชิกของเผ่าพันธุ์นี้มีความเป็นชุมชนสูงและค่อนข้างคุ้นเคยกับการอาศัยอยู่ใกล้ชิดกับผู้อื่น§!\n"
 trait_solitary:0 "สันโดษ"
 trait_solitary_desc:0 "§Lสมาชิก ของ สิ่ง มี ชีวิต ชนิด นี้ มัก จะ อยู่ โดด เดี่ยว และ อยู่ ใน เขต แดน บ่อย ครั้ง เกิด ความ วุ่นวาย ใน สภาพ แวด ล้อม ที่ แออัด.§!\n"
 trait_adaptive:0 "ปรับตัวได้"
 trait_adaptive_desc:1 "§Lสายพันธุ์นี้ปรับตัวได้ดี เมื่อพูดถึงสภาพแวดล้อมต่างถิ่น§!\n"
 trait_adaptive_lithoid:0 "$trait_adaptive$"
 trait_adaptive_lithoid_desc:0 "$trait_adaptive_desc$"
 trait_extremely_adaptive:0 "ปรับตัวได้ดีมาก"
 trait_extremely_adaptive_desc:0 "§Lสายพันธุ์นี้เชี่ยวชาญอย่างน่าทึ่ง ในการปรับตัวเข้ากับสภาพแวดล้อมต่างถิ่น§!\n"
 trait_nonadaptive:0 "ปรับตัวไม่ได้"
 trait_nonadaptive_desc:0 "§Lสายพันธุ์นี้ปรับตัวได้ไม่ดีกับสิ่งแวดล้อมต่างถิ่น§!\n"
 trait_nomadic:0 "เร่ร่อนไปในที่ต่างๆ"
 trait_nomadic_desc:0 "§Lสัตว์ ชนิด นี้ มี อดีต ที่ ผ่าน มา อย่าง รวด เร็ว และ สมาชิก ของ มัน มัก จะ ไม่ คิด ว่า จะ กลับ ไป อยู่ ใน โลก อื่น อีก เลย.§!\n"
 trait_sedentary:0 "ไม่เคลื่อนย้าย"
 trait_sedentary_desc:0 "§Lสัตว์ ชนิด นี้ มี อดีต ที่ นั่ง อยู่ กับ ที่ และ สมาชิก ของ มัน ไม่ เต็ม ใจ จะ อพยพ จาก ที่ ที่ มัน เติบโต มา.§!\n"
 trait_thrifty:0 "ประหยัด"
 trait_thrifty_desc:0 "§Lสายพันธุ์นี้ทางเศรษฐกิจตามสัญชาตญาณ และมักจะมองหากําไรที่ดี ไม่ว่ามุมไหนก็ตามที่ต้องตัด§!\n"
 trait_ingenious:0 "ชาญฉลาด"
 trait_ingenious_desc:0 "§Lสมาชิกของเผ่าพันธุ์นี้เก่งในการ 'คิดนอกกรอบ' และรู้วิธีเพิ่มประสิทธิภาพของโครงสร้างพื้นฐานและโครงข่ายไฟฟ้าของพวกเขา§!\n"
 trait_industrious:0 "ขยัน"
 trait_industrious_desc:0 "§Lสมาชิกของเผ่าพันธุ์นี้เป็นที่รู้จักกันดี ในเรื่องความขยันและขยันขันแข็งของพวกเขา§!\n"
 trait_natural_engineers:0 "วิศวกรโดยธรรมชาติ"
 trait_natural_engineers_desc:0 "§Lสมาชิก ของ เผ่า พันธุ์ นี้ มี แนว โน้ม ตาม ธรรมชาติ ใน เรื่อง วิศวกรรม และ วิทยาศาสตร์ ด้าน วัตถุ.§!\n"
 trait_poor_engineers:0 "วิศวกรรมแย่"
 trait_poor_engineers_desc:0 "§Lสมาชิก ของ เผ่า พันธุ์ นี้ มี ช่วง เวลา ที่ ยาก ลําบาก ใน การ เข้าใจ แนว คิด พื้น ฐาน หลาย อย่าง ของ วิศวกรรม.§!\n"
 trait_natural_physicists:0 "นักฟิสิกส์โดยธรรมชาติ"
 trait_natural_physicists_desc:0 "§Lสมาชิก ของ สิ่ง มี ชีวิต ชนิด นี้ มี แนว โน้ม ตาม ธรรมชาติ ที่ มี ต่อ ปรากฏการณ์ ทาง ฟิสิกส์ และ ดาราศาสตร์.§!\n"
 trait_poor_physicists:0 "ฟิสิกส์แย่"
 trait_poor_physicists_desc:0 "§Lสมาชิก ของ สิ่ง มี ชีวิต ชนิด นี้ มี ช่วง เวลา ที่ ยาก ลําบาก ใน การ เข้าใจ แนว คิด พื้น ฐาน หลาย อย่าง เกี่ยว กับ ฟิสิกส์ ทาง ทฤษฎี.§!\n"
 trait_natural_sociologists:0 "นักสังคมวิทยาโดยธรรมชาติ"
 trait_natural_sociologists_desc:0 "§Lสมาชิก ของ สิ่ง มี ชีวิต ชนิด นี้ มี แนว โน้ม ตาม ธรรมชาติ ที่ จะ ทํา การ ศึกษา วิจัย ทาง ชีววิทยา และ ทาง ชีววิทยา.§!\n"
 trait_poor_sociologists:0 "สังคมวิทยาแย่"
 trait_poor_sociologists_desc:0 "§Lสมาชิก ของ เผ่า พันธุ์ นี้ มี ช่วง เวลา ที่ ยาก ลําบาก ใน การ เข้าใจ แนว คิด พื้น ฐาน หลาย อย่าง เกี่ยว กับ การ สืบ พันธุ์.§!\n"
 trait_quick_learners:0 "เรียนรู้เร็ว"
 trait_quick_learners_desc:0 "§Lสมาชิก ของ เผ่า พันธุ์ นี้ เรียน รู้ จาก ประสบการณ์ ได้ อย่าง รวด เร็ว.§!\n"
 trait_slow_learners:0 "เรียนรู้ช้า"
 trait_slow_learners_desc:0 "§Lสมาชิกของสายพันธุ์นี้ ช้าในการเรียนรู้จากประสบการณ์ของพวกเขา§!\n"
 trait_long_lifespans:0 "อายุยืน"
 trait_long_lifespans_desc:0 "§Lอายุ ขัย ตาม ธรรมชาติ ของ ชนิด นี้ ยาว นาน กว่า เฉลี่ย.§!\n"
 trait_short_lifespans:0 "อายุสั้น"
 trait_short_lifespans_desc:0 "§Lอายุ ตาม ธรรมชาติ ของ สิ่ง มี ชีวิต ชนิด นี้ สั้น กว่า อายุ โดย เฉลี่ย.§!\n"
 trait_uplifted:0 "ยกระดับแล้ว"
 trait_uplifted_desc:1 "§Lสายพันธุ์นี้ได้รับการส่งเสริมจาก การดํารงอยู่ของสัญชาตญาณและอารมณ์พื้นฐาน ตอนนี้ต้องแบกรับภาระแห่งการพยากรณ์ พวกเขาต้องเรียนรู้ ที่จะนําทางอิสระ§!\n"
 trait_presapient_starborn:0 "ชอบเดินทางระหว่างดวงดาว"
 trait_presapient_starborn_desc:0 "§Lสิ่ง มี ชีวิต ชนิด นี้ ไม่ ว่า จะ โดย สํานึก ตัว หรือ ไม่ ก็ ตาม ปรารถนา จะ ผ่าน ช่อง ว่าง ระหว่าง ดวง ดาว เสมอ.§!\n"
 trait_presapient_earthbound:0 "ผูกพันกับดาวบ้านเกิด"
 trait_presapient_earthbound_desc:0 "§Lสมาชิกของสายพันธุ์นี้ มีความเป็นเจ้าของมากของดาวเคราะห์ที่พวกเขาเรียกว่าบ้าน§!\n"
 trait_presapient_natural_intellectuals:0 "ปัญญาชนโดยธรรมชาติ"
 trait_presapient_natural_intellectuals_desc:0 "§Lสมาชิก ของ เผ่า พันธุ์ นี้ มี แนว โน้ม ทาง ปรัชญา มาก กว่า คน ส่วน ใหญ่.§!\n"
 trait_presapient_proles:0 "กรรมกร"
 trait_presapient_proles_desc:0 "§Lตาม ประเพณี แล้ว สิ่ง มี ชีวิต ชนิด นี้ หลีก เลี่ยง การ แสวง หา ทาง ปัญญา โดย อาศัย การ ทํา งาน หนัก.§!\n"
 trait_syncretic_proles:0 "ยอมรับใช้"
 trait_syncretic_proles_desc:0 "§Lสายพันธุ์นี้วิวัฒนาการมาเคียงข้างกับ อารยธรรมที่ก้าวหน้ากว่า ความ สามารถ และ ความ สามารถ ใน การ ออก กําลัง กาย ของ ผู้ ป่วย ไม่ ใช่ เรื่อง ฉลาด โดย เฉพาะ.§!"
 trait_presapient_conservative:0 "อนุรักษนิยม"
 trait_presapient_conservative_desc:0 "§Lสมาชิก ของ เผ่า พันธุ์ นี้ มัก จะ ชอบ ปัญญา เก่า กว่า ประสบการณ์ ใหม่ ๆ.§!\n"
 trait_presapient_irradiated:0 "อยู่ได้ในสภาพรังสี"
 trait_presapient_irradiated_desc:0 "§Lเผ่าพันธุ์นี้มีวิวัฒนาการให้เจริญเติบโตในสภาพแวดล้อมที่มีรังสีระดับสูงมาก§!"
 trait_persistent:0 "อยู่นาน"
 trait_persistent_desc:0 "§Lคุณลักษณะนี้เพิ่มช่วงชีวิตโดยเฉลี่ยของผู้นํา§!\n"
 trait_conformists:0 "ยอมปฎิบัติหรือปรับตาม"
 trait_conformists_desc:0 "§Lคน เหล่า นี้ มัก แสวง หา ความ เห็น พ้อง ต้อง กัน และ มี แนว โน้ม มาก กว่า ที่ จะ ปฏิบัติ ตาม จริยธรรม แห่ง การ ปกครอง.§!\n"
 trait_deviants:0 "ผิดปกติ"
 trait_deviants_desc:0 "§Lคนเหล่านี้เป็นกบฏในธรรมชาติ และมักจะพยายามที่จะท้าทายสถานะ§!\n"
 trait_enduring:0 "ทนทาน"
 trait_enduring_desc:0 "§Lสิ่งมีชีวิตในสายพันธุ์นี้ยาวผิดปกติ§!\n"
 trait_venerable:0 "น่าเคารพนับถือ"
 trait_venerable_desc:0 "§Lสิ่ง มี ชีวิต ชนิด นี้ สามารถ เจริญ เติบโต จน ถึง วัย ที่ สั่ง ให้ มี เกียรติ และ ความ นับถือ.§!\n"
 trait_fleeting:0 "ไปเร็ว"
 trait_fleeting_desc:0 "§Lเวลาหายวับไปสำหรับเผ่าพันธุ์นี้ สิ่งที่พวกเขาขาดไปในชีวิตที่ยืนยาวพวกเขาต้องชดเชยด้วยวิธีอื่น§!\n"
 trait_fleeting_lithoid:0 "$trait_fleeting$"
 trait_fleeting_lithoid_desc:0 "$trait_fleeting_desc$"
 trait_diverse:0 "หลากหลาย"
 trait_diverse_desc:0 "§Lสมาชิกของสายพันธุ์นี้มักจะแตกต่างกันมาก ทั้งทางด้านจิตวิทยาและจิตวิทยา§!\n"
 trait_decadent:0 "เสื่อมโทรม"
 trait_decadent_desc:2 "§Lสายพันธุ์นี้เชื่อว่า เมื่อไรก็ตามที่มีงานหนักที่จําเป็นต้องทํา งานนั้นก็ดีที่สุดโดยคนอื่นเสมอ§!\n"
 trait_intelligent:0 "มีสติปัญญา"
 trait_intelligent_desc:0 "§Lสิ่ง มี ชีวิต ชนิด นี้ มี เชาวน์ ปัญญา สูง และ เพลิดเพลิน กับ ความ ก้าว หน้า ทาง เทคโนโลยี เร็ว ขึ้น.§!\n"
 trait_agrarian:0 "นิยมการทำเกษตรกรรม"
 trait_agrarian_desc:0 "§Lเผ่าพันธุ์นี้มีความผูกพันกับผืนดินทำให้กลายเป็นผู้เชี่ยวชาญทำการเกษตรกรและสวนไร่§!\n"
 trait_resilient:0 "ยืดหยุ่น"
 trait_resilient_desc:0 "§Lสมาชิกของสายพันธุ์นี้มีความยืดหยุ่นทางกายภาพ และจะต่อสู้เช่นแม่อารมณ์โกรธ เพื่อปกป้องโลกของพวกเขา§!\n"
 trait_mechanical:0 "เครื่องจักรกล"
 trait_mechanical_desc:2 "§Lสิ่งมีชีวิตจักรกล มีลําดับหลายขนาด ที่ซับซ้อนกว่า หุ่นยนต์ที่สร้างขึ้นอย่างมีวัตถุประสงค์ของเก่า§!\n"
 trait_robotic_1:0 "หุ่นยนต์"
 trait_robotic_1_desc:1 "§Lหุ่น ยนต์ เป็น เครื่องจักร ที่ ค่อน ข้าง ง่าย สามารถ ยอม รับ คํา สั่ง แต่ ไม่ มี เชาวน์ ปัญญา แท้ ของ ตน เอง.§!\n"
 trait_robot_awoken_01:0 "ตลอด กาล ใน ลิ ม โบ"
 trait_robot_awoken_01_desc:0 "ด้วย ความ ผิด พลาด อย่าง ที่ ไม่ อาจ อธิบาย ได้ และ ความ ผิด ปกติ ที่ เกิด ขึ้น อยู่ เสมอ มา มนุษย์ ต่าง ดาว โบราณ ไม่ ได้ ปรับ ตัว เข้า กับ ร่าง กาย ใหม่ ของ ตน ได้ ดี นัก. แต่พวกเขาแสดงให้เห็นถึงความเหมาะสมที่ผิดปกติสําหรับวิทยาศาสตร์ ที่ก่อนหน้านี้ไม่เคยได้ยินในหุ่นยนต์ระดับต่ํา - ตัวบ่งชี้ที่อาจจะติดอยู่ในสมอง"
 trait_robot_awoken:0 "ตื่นขึ้นจากการหลับไหล"
 trait_robot_awoken_desc:0 "แม้ แต่ ใน รูป แบบ กลไก อา โว เคน ก็ ยัง คง รักษา ลักษณะ นิสัย ดั้งเดิม บาง อย่าง ไว้. เป็น ไป ได้ ไหม ว่า นิสัย ฟุ่มเฟือย และ รูป แบบ ชีวิต ที่ นั่ง อยู่ กับ ที่ เป็น ความ หายนะ ของ เชื้อ รา ที่ ก้าว หน้า ไป ทาง วิทยาศาสตร์ นี้?"
 trait_robotic_2:0 "ดรอยด์"
 trait_robotic_2_desc:1 "§Lดรอยด์มีความซับซ้อนมากขึ้นของหุ่นยนต์ มักจะมาพร้อมกับบุคลิกที่มีโปรแกรมไว้ล่วงหน้า เพื่อรับใช้เจ้านายของพวกเขา§!\n"
 trait_robotic_3:0 "จักรกลสังเคราะห์"
 trait_robotic_3_desc:1 "§Lสังเคราะห์แสงเป็นเครื่องจักรที่มีความซับซ้อนมาก ที่ดีกว่าอินทรีย์ส่วนใหญ่ สมองกลของพวกเขา สามารถรองรับปัญญาประดิษฐ์ระดับ 7 ได้ ทําให้พวกมันรู้ตัวเองเป็นอย่างดี§!\n"
 trait_conservational:0 "อนุรักษ์ธรรมชาติ"
 trait_conservational_desc:0 "§Lสมาชิกของสายพันธุ์นี้เชื่อว่าทรัพยากร จะต้องอนุรักษ์และรีไซเคิล§!"
 HIVE_MIND_NO_FACTIONS:0 "§Rการเป็นหนึ่งอันเดียวกันจะไม่มีกลุ่มการเมือง§!"
 NO_POTENTIAL_CLAIM:0 "§Rเราไม่ทราบเกี่ยวกับจักรวรรดิใด ๆ ที่ระบบที่เราสามารถอ้าง§!"
 NO_POTENTIAL_CLAIM_ON_RECIPIENT:0 "§Rเราไม่สามารถอ้างสิทธิ์ในระบบใดๆของพวกเขาได้§!"
 trait_wasteful:0 "ฟุ่มเฟือย"
 trait_wasteful_desc:0 "§Lสมาชิก ของ เผ่า พันธุ์ นี้ ดู เหมือน ไม่ มี แนว คิด ใน เรื่อง ความ อ้วน และ มี แนว โน้ม ที่ จะ บริโภค อย่าง ไร้ ประโยชน์.§!\n"
 trait_hive_mind:0 "จิตสำนึกร่วม"
 trait_hive_mind_desc:0 "§Lสายพันธุ์นี้ประกอบไปด้วย สิ่งมีชีวิตกึ่งอัตโนมัติ ที่ถูกผูกติดกับด้วยจิตสํานึกเดียว§!\n"
 trait_machine_unit:0 "เครื่องจักร"
 trait_machine_unit_desc:1 "§Lสายพันธุ์นี้ประกอบด้วยเครื่องจักรชั้นสูง§!\n"
 trait_lithoid:0 "หิน"
 trait_lithoid_desc:0 "§Lสายพันธุ์นี้มีซิลิคอนพื้นฐานทางชีววิทยา และบริโภคแร่ธาตุมากกว่าอาหาร มัน แข็ง แรง กว่า อินทรีย์ โบราณ และ มี การ เผา ผลาญ อย่าง ช้า ๆ ทํา ให้ มัน มี ชีวิต อยู่ ได้ นาน แต่ ช้า ใน การ แพร่ พันธุ์.§!\n"
 trait_robot_power_drills:0 "สว่านกำลังสูง"
 trait_robot_power_drills_desc:0 "§Lขับไล่หุ่นยนต์ที่มีถ่านไฟฟ้า และทุกอย่างดูเหมือนแร่ธาตุ§!\n"
 trait_robot_harvesters:0 "เครื่องเก็บเกี่ยว"
 trait_robot_harvesters_desc:0 "§Lเครื่องมือชุดหนึ่ง จากการวินิจฉัยสารสนเทศ และการสมดุลบนไฟสู่การส่องกล้องจุลทรรศน์ จะช่วยให้พนักงานหุ่นยนต์สามารถผลิตผลผลิตได้§!\n"
 trait_robot_efficient_processors:0 "ตัวประมวลผลหลักมีประสิทธิภาพ"
 trait_robot_efficient_processors_desc:1 "§Lนักประมวลผลที่มีประสิทธิภาพสูงเหล่านี้ เพิ่มภาระงานและความอดทนของทุกหน่วย§!"
 trait_robot_logic_engines:0 "เครื่องตรรกะ"
 trait_robot_logic_engines_desc:0 "§Lการนำทางไปสู่พรมแดนที่ซับซ้อนอย่างมีประสิทธิภาพในวิทยาศาสตร์นั้นจำเป็นต้องมีสถานะใหม่นอกเหนือจากครึ่งความจริงแบบเรียบง่ายและ ตรรกะควอเทอร์นารี§!\n"
 trait_robot_loyalty_circuits:0 "วงจรความภักดี"
 trait_robot_loyalty_circuits_desc:0 "§Lความ ภักดี ใน ฐานะ อุดมคติ เป็น แนว คิด ทาง อินทรีย์ ที่ เห็น ได้ ชัด. แทน ที่ จะ เป็น เช่น นั้น ขอ ให้ นึก ภาพ ว่า ความ ภักดี เป็น สิ่ง จําเป็น ทาง กายภาพ แม้ แต่ ใน ระยะ ไกล สุด ท้าย.§!\n"
 trait_robot_domestic_protocols:0 "โปรโตคอลในจักรวรรดิ"
 trait_robot_domestic_protocols_desc:1 "§Lโปรโตคอล(ภาษาที่ใช้สื่อสาร)อุปกรณ์และพฤติกรรมเฉพาะสำหรับความต้องการภายในจักรวรรดิที่เป็นไปได้ทั้งหมด รับประกันการทำงานที่เต็มรูปแบบ§!"
 trait_robot_superconductive:0 "สารตัวนำยิ่งยวด"
 trait_robot_superconductive_desc:1 "§Lการใช้วัสดุตัวนำยวดยิ่งช่วยลดการสูญเสียการส่งผ่านพลังงานให้เหลือศูนย์เปอร์เซ็นต์§!\n"
 trait_robot_double_jointed:0 "ข้อต่อยืดหยุ่น"
 trait_robot_double_jointed_desc:0 "§Lยูนิตแรงงานที่สามารถพับเก็บได้ มาพร้อมกับข้อต่อที่ยืดหยุ่นซึ่งช่วยให้พับเก็บได้อย่างเป็นระเบียบในระหว่างการขนส่ง จากนั้นก็สามารถประกอบขึ้นได้เองในสถานที่ทำงาน§!\n"
 trait_robot_bulky:0 "ใหญ่เทอะทะ"
 trait_robot_bulky_desc:0 "§Lเครื่องจักรขนาดใหญ่ชั้นสูงเหล่านี้ ไม่ได้ถูกออกแบบมา เพื่อผ่านจักรวาลในกล่อง§!\n"
 trait_robot_enhanced_memory:0 "เพิ่มสมรรถนะหน่วยความจำ"
 trait_robot_enhanced_memory_desc:1 "§Lทุกหน่วยอัตโนมัติ ถูกติดตั้งด้วยเซลล์ความทรงจํา โดยใช้เทคนิคใหม่ในการปฏิวัติ สําหรับความเหลื่อมล้ําของแม่เหล็ก§!\n"
 trait_robot_emotion_emulators:0 "โปรแกรมจำลองอารมณ์"
 trait_robot_emotion_emulators_desc:1 "§Lตัว อย่าง ที่ ดี ของ นัก วิทยาศาสตร์§!\n"
 trait_robot_uncanny:0 "แปลกประหลาด"
 trait_robot_uncanny_desc:0 "§Lเครื่องจักรประหลาดเหล่านี้ถูกสร้างขึ้นจากภาพ ของสิ่งมีชีวิตที่น่ากลัวที่สุดตัวหนึ่งในจักรวาล§!\n"
 trait_robot_durable:0 "ทนทาน"
 trait_robot_durable_desc:0 "§Lป้องกันโดยอิเล็กตรอนของไทเทเนียมโครมเคลือบ, เครื่องหนัก-ทุพภิกขภัยเหล่านี้ได้รับการออกแบบเพื่อความโดดเด่นภายใต้เงื่อนไขที่รุนแรง§!\n"
 trait_robot_high_maintenance:0 "ค่าบำรุงรักษาสูง"
 trait_robot_high_maintenance_desc:0 "§Lเครื่อง กล เหล่า นี้ ได้ รับ การ ออก แบบ โดย ไม่ คํานึง ถึง อายุ ที่ ยืน ยาว อย่าง สิ้น เชิง และ มี แนว โน้ม จะ ทํา งาน ผิด ปกติ. พวกเขาต้องการค่าบํารุงรักษาสูง§!\n"
 trait_robot_learning_algorithms:0 "อัลกอริทึมการเรียนรู้"
 trait_robot_learning_algorithms_desc:0 "§Lอัลกอริธึมการเรียนรู้ด้วยตนเองที่ซับซ้อนที่กระตุ้นการวิวัฒนาการอย่างรวดเร็วของโครงข่ายคลัสเตอร์ประสาทเทียม§!\n"
 trait_robot_repurposed_hardware:0 "ฮาร์ดแวร์ถูกเปลี่ยนเป้าหมาย"
 trait_robot_repurposed_hardware_desc:0 "§Lออกแบบมาเพื่อตอบสนองความต้องการที่เฉพาะเจาะจง ของผู้สร้างของพวกเขา เครื่องสายนี้ไม่เคยตั้งใจที่จะ มีความสามารถในการให้เหตุผลสูงขึ้น§!\n"
 trait_robot_mass_produced:0 "ผลิตจำนวนมาก"
 trait_robot_mass_produced_desc:0 "§Lวงจรการผลิตและเครื่องขยายเสียง อนุญาตให้ผลิตมวลได้ ในอัตราที่ไม่เคยมีมาก่อน§!\n"
 trait_robot_custom_made:0 "ดัดแปลงขึ้นเอง"
 trait_robot_custom_made_desc:0 "§Lหน่วยใหม่แต่ละหน่วยถูกออกแบบให้ให้ความสนใจรายละเอียดที่ไม่มีใครเทียบได้ ความมหัศจรรย์ของวิศวกรรมและศิลปะ แต่ไม่มีประสิทธิภาพมาก§!\n"
 trait_robot_recycled:0 "รีไซเคิล"
 trait_robot_recycled_desc:0 "§Lการผลิต ยูไนเต็ดได้ถูกปรับให้เป็น ต้นทุนที่มากที่สุดเท่าที่จะทําได้ โดยใช้วัสดุรีไซเคิล§!\n"
 trait_robot_luxurious:0 "ฟุ่มเฟือย"
 trait_robot_luxurious_desc:0 "§Lออกแบบจากหลักการ ที่คุณไม่สามารถใส่ราคาคุณภาพได้ หน่วยระดับชั้นแรกเหล่านี้มีราคา แต่เงาวับ§!\n"
 trait_robot_propaganda_machines:0 "โฆษณาชวนเชื่อเครื่องจักร"
 trait_robot_propaganda_machines_desc:0 "§Lมี การ เชื่อม หน่วย ต่าง ๆ เข้า กับ การ ประกาศ การ รับ ใช้ สาธารณชน และ ข้อมูล ที่ เป็น ประโยชน์ อื่น ๆ ซึ่ง ส่ง ผ่าน ทาง ระบบ กระจาย เสียง ภาย ใน.§!\n"
 trait_survivor:0 "อยู่รอด"
 trait_survivor_desc:0 "§Lสายพันธุ์นี้ได้รอดจากความน่ากลัว ของวันสิ้นโลกนิวเคลียร์ ความ สามารถ ของ พวก เขา ใน การ เจริญ เติบโต ใน สภาพ การณ์ ที่ ไม่ เอื้อ อํานวย มาก ที่ สุด ไม่ ควร ประเมิน ค่า ต่ํา เกิน ไป.§!"
 trait_robot_survivor: "โล่กัมมันตรังสี"
 trait_robot_survivor_desc:0 "§Lเครื่องจักรเหล่านี้ ผู้รอดชีวิตโดดเดี่ยว จากภัยพิบัตินิวเคลียร์ที่ก่อตัวขึ้น แสดงให้เห็นถึงความยืดหยุ่นที่ไม่มีใครเทียบได้§!"
 trait_traditional:0 "ตามธรรมเนียม"
 trait_traditional_desc:0 "§Lบางแง่มุมของแนวคิดของสายพันธุ์นี้ ทําให้การศึกษาเกี่ยวกับความสําคัญทางประวัติศาสตร์§!"
 trait_quarrelsome:0 "ชอบทะเลาะวิวาท"
 trait_quarrelsome_desc:0 "§Lแม้ ว่า ไม่ ใช่ สิ่ง ที่ ไม่ ไว้ ใจ กัน แต่ สมาชิก ของ สิ่ง มี ชีวิต ชนิด นี้ มัก จะ ต่อ สู้ กัน ทาง สังคม.§!"
 trait_lithoid_gaseous_byproducts:0 "ผลพลอยได้จากก๊าซ"
 trait_lithoid_gaseous_byproducts_desc:0 "§Lกระบวนการเผาผลาญของสายพันธุ์นี้ ทําให้เกิดการระบายก๊าซ ซึ่งมีประโยชน์ต่ออุตสาหกรรม§!"
 TRAIT_LITHOID_GASEOUS_BYPRODUCTS_EFFECT:1 "ทุก$pop_group_unit$ £pop£ §Hป๊อป§!การ ทํา งาน เป็น ทาส หรือ ดี กว่า ทํา ให้ เกิด 0.01£exotic_gases£ §Y$exotic_gases$§!ต่อเดือน"
 trait_lithoid_scintillating:0 "ผิวเปล่งประกาย"
 trait_lithoid_scintillating_desc:0 "§Lชั้น นอก ของ สิ่ง มี ชีวิต ชนิด นี้ มี ผลึก และ อัญมณี ที่ มี ประกาย ไฟ แวว วาว ซึ่ง บาง ครั้ง พ่น ออก มา.§!"
 TRAIT_LITHOID_SCINTILLATING_EFFECT:1 "ทุก$pop_group_unit$ £pop£ §Hป๊อป§!การ ทํา งาน เป็น ทาส หรือ ดี กว่า ทํา ให้ เกิด 0.01£rare_crystals£ §Y$rare_crystals$§!ต่อเดือน"
 trait_lithoid_volatile_excretions:0 "การขับสารออกที่ระเหยได้"
 trait_lithoid_volatile_excretions_desc:0 "§Lสฟาย ที่ อัด แน่น อย่าง หนัก ซึ่ง ถูก สร้าง โดย สิ่ง มี ชีวิต ชนิด นี้ ไม่ มั่นคง และ มี ปริมาณ พลัง มหาศาล เหลือ เชื่อ.§!"
 TRAIT_LITHOID_VOLATILE_EXCRETIONS_EFFECT:1 "ทุก$pop_group_unit$ £pop£ §Hป๊อป§!การ ทํา งาน เป็น ทาส หรือ ดี กว่า ทํา ให้ เกิด 0.01£volatile_motes£ §Y$volatile_motes$§!ต่อเดือน"
 trait_docile:0 "ว่านอนสอนง่าย"
 trait_docile_desc:0 "§Lสมาชิกของสายพันธุ์นี้ จัดการและจัดการได้ง่าย พวกเขามีแนวโน้มที่จะให้ความร่วมมือและเป็นมิตร§!"
 trait_unruly:0 "ปกครองยาก"
 trait_unruly_desc:0 "§Lการ จัด การ และ การ จัด ระเบียบ ของ สิ่ง มี ชีวิต ที่ ไม่ สมบูรณ์ เป็น เรื่อง ยาก. พวก เขา ไม่ ชอบ ให้ ใคร บอก ว่า ต้อง ทํา อะไร และ บ่อย ครั้ง ชอบ ทะเลาะ กัน หรือ ถาม.§!"
 trait_robot_streamlined_protocols:0 "โปรโตคอลที่คล่องตัว"
 trait_robot_streamlined_protocols_desc:0 "§Lโพรเซส AI ที่ผสมกันอย่างกว้างขวาง ทําให้หน่วยเหล่านี้สามารถขยายจํานวนได้มาก โดยสูญเสียประสิทธิภาพน้อยที่สุด§!"
 trait_robot_high_bandwidth:0 "แบนด์วิดท์สูง"
 trait_robot_high_bandwidth_desc:0 "§Lหน่วย แต่ ละ หน่วย ส่ง และ รับ ข้อมูล ที่ ทํา ซ้ํา กัน เป็น ส่วน ใหญ่ ทํา ให้ หด ตัว มาก ขึ้น เนื่อง จาก จํานวน หน่วย ที่ ติด อยู่ กับ แกน กลาง เพิ่ม ขึ้น.§!"
 trait_robot_trading_algorithms:0 "อัลกอริทึมซื้อขาย"
 trait_robot_trading_algorithms_desc:0 "§Lอัลกอริธึมก่อนจะอนุญาตให้ทําการปรับแต่งได้สูงสุด การ เปลี่ยน แปลง ทาง เศรษฐกิจ ใน อัตรา เงิน, การ มี หุ้น, และ การ ตอบ สนอง ทาง อารมณ์ ของ ผู้ มี ส่วน ร่วม ทาง อินทรีย์ นับ ว่า เป็น การ เปลี่ยน แปลง.§!"
 trait_robot_quarrelsome: "$trait_quarrelsome$"
 trait_robot_quarrelsome_desc: "$trait_quarrelsome_desc$"
 trait_robot_deviants: "$trait_deviants$"
 trait_robot_deviants_desc: "$trait_deviants_desc$"
 trait_robot_decadent: "$trait_decadent$"
 trait_robot_decadent_desc: "$trait_decadent_desc$"
 trait_robot_wasteful: "$trait_wasteful$"
 trait_robot_wasteful_desc: "$trait_wasteful_desc$"

 trait_advanced_gaseous_byproducts:0 "$trait_lithoid_gaseous_byproducts$"
 trait_advanced_gaseous_byproducts_desc:0 "§Lกระบวนการเผาผลาญของสายพันธุ์นี้ ได้รับการดัดแปลงพันธุกรรม เพื่อผลิตก๊าซที่มีประโยชน์ต่ออุตสาหกรรม§!"
 trait_advanced_scintillating:0 "$trait_lithoid_scintillating$"
 trait_advanced_scintillating_desc:0 "§Lโดย ทาง วิศวกรรม พันธุกรรม ที่ ก้าว หน้า ชั้น นอก ของ สิ่ง มี ชีวิต ชนิด นี้ จึง ประกอบ ด้วย ผลึก และ นิ่ว ต่าง ๆ ที่ เหมาะ สําหรับ การ เก็บ เกี่ยว.§!"
 trait_advanced_volatile_excretions:0 "$trait_lithoid_volatile_excretions$"
 trait_advanced_volatile_excretions_desc:0 "§Lการ หด ตัว ตาม รหัส พันธุกรรม ของ มัน ทํา ให้ สัตว์ ชนิด นี้ ผลิต น้ํา ทะเล ที่ อัด แน่น มาก. เมื่อ ใช้ อย่าง เหมาะ สม วัสดุ นี้ จะ ปล่อย พลัง งาน ออก มา มาก เป็น พิเศษ.§!"
 trait_vat_grown:0 "Vat-Grown"
 trait_vat_grown_desc:0 "§Lความ สามารถ ใน การ สืบ พันธุ์ ของ สัตว์ ชนิด นี้ ได้ รับ ผล กระทบ ใน ทาง ลบ.§!"
 trait_felsic:0 "เฟลีสิค"
 trait_felsic_desc:0 "§Lสายพันธุ์นี้ถูกดัดแปลงให้อุดมไปด้วยแร่ธาตุ§!\n"
 trait_natural_machinist:0 "นัก เดิน เรือ ธรรมชาติ"
 trait_natural_machinist_desc:0 "§Lสายพันธุ์นี้ได้รับการออกแบบ ให้มีความเชี่ยวชาญอย่างน่าทึ่ง ในการทํางานกับเครื่องจักร§!"
 trait_drake_scaled:0 "หมุน & 90"
 trait_drake_scaled_desc:0 "§Lสายพันธุ์นี้มีวัสดุทางพันธุกรรม จากมังกรดาวหมุนภาพเป็นดีเอ็นเอของมัน ดัง นั้น พวก เขา จึง ถอด เกล็ด ซึ่ง สามารถ นํา มา นํา มา ใช้ ใหม่ เป็น อัล ลอย ที่ มี ประโยชน์.§!"
 TRAIT_DRAKE_SCALED_EFFECT:0 "ทุก$pop_group_unit$ £pop£ §Hป๊อป§!การ ทํา งาน เป็น ทาส หรือ ดี กว่า ก่อ ให้ เกิด 0.5£alloys£ §Y$alloys$§!ต่อเดือน"
 trait_voidling:0 "แว่นขยาย"
 trait_voidling_desc:0 "§Lสายพันธุ์นี้มีวัสดุทางพันธุกรรม จากช่องว่างเป็นดีเอ็นเอของมัน ครอบคลุมการแผ่รังสีคอสมิก พวกเขามีความต้านทานสูง ต่อสภาพแวดล้อมที่เป็นศัตรู§!"
 TRAIT_VOIDLING_EFFECT:1 "แทนที่$food_with_icon$(หรือ$minerals_with_icon$ยกขึ้นกับ$energy_with_icon$เลื่อนลง"
 trait_tiyanki:0 "เส้นพริ้วไหว"
 trait_tiyanki_desc:0 "§Lสปีชีส์นี้ได้เพิ่มวัสดุทางพันธุกรรม จากทียานีกี มาเทรียส ในลําดับดีเอ็นเอของพวกเขา ทั้ง นี้ ทํา ให้ พวก เขา มี การ สืบ พันธุ์ ทาง เพศ อย่าง รวด เร็ว อีก ทั้ง มี หนวด ที่ คาด ไม่ ถึง สอง สาม อัน.§!"
 TRAIT_TIYANKI_BUDDING_EFFECT: "ทุก$pop_group_unit$ £pop£ §Yป๊อป§!การ ทํา งาน เป็น ทาส หรือ ผล ผลิต ที่ ดี กว่า$@tiyanki_budding_rate$ £mod_logistic_growth_mult£ §Y$MOD_BONUS_POP_GROWTH$§!.\n\nนี่คือแหล่งอื่น$MOD_BONUS_POP_GROWTH$เช่น£building£ §Y$building_clone_vats$§!หรือ£job_spawning_drone£ §Y$job_spawning_drone_plural$§!."

 trait_humanoid_existential_iteroparity: "การสืบพันธุ์เพื่อให้ดำรงอยู่"
 trait_humanoid_existential_iteroparity_desc: "§Lสายพันธุ์นี้เติบโตขึ้นมา ในสภาวะที่เป็นศัตรู ที่การผสมพันธุ์คู่แข่งของคุณ เป็นกุญแจสําคัญในการอยู่รอด§!"
 TRAIT_HUMANOID_EXISTENTIAL_ITEROPARITY_EFFECT: "£pop£ §Yการเจริญเติบโตของป็อป§!ระหว่าง สงคราม และ วิกฤตการณ์:§G+20%§!"
 trait_humanoid_psychological_infertility: "ภาวะมีบุตรยาก"
 trait_humanoid_psychological_infertility_desc: "§Lสมาชิก ของ สิ่ง มี ชีวิต ชนิด นี้ ไว มาก ต่อ ความ ขัด แย้ง ที่ รุนแรง กับ ความ เครียด ที่ เกิด ขึ้น ซึ่ง ครอบ งํา ความ ปรารถนา ที่ ฝัง ราก ลึก.§!"
 TRAIT_HUMANOID_PSYCHOLOGICAL_INFERTILITY_EFFECT: "£pop£ §Yการเจริญเติบโตของป็อป§!ระหว่าง สงคราม และ วิกฤตการณ์:§R-30%§!"
 trait_humanoid_jinxed: "ซุ่มซ่าม,โชคร้าย"
 trait_humanoid_jinxed_desc: "§Lผู้ นํา ของ เผ่า พันธุ์ นี้ ดู เหมือน ผอม ลง และ มี แนว โน้ม จะ ประสบ อุบัติเหตุ หรือ ความ ชั่ว ร้าย โดย เฉลี่ย มาก กว่า จะ ถูก สาป ตั้ง แต่ เกิด.§!"
 TRAIT_HUMANOID_JINXED_EFFECT: "คุณลักษณะเชิงลบสูงสุดของผู้นำ: §R+1§!"

