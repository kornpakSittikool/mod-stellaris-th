 FE_GROWTH_SCALE_TOOLTIP:1 "§H$FE_GROWTH_SCALE$§!\nการเจริญเติบโตของเกล็ดนี้ ขึ้นอยู่กับจํานวนที่ปรากฏในจักรวรรดิ ยิ่งสูงยิ่งช้ายิ่งโตขึ้น\n\n§Rคําเตือน:§!การลดรอยหยักลงนี้อาจมีผลสําคัญและผลกระทบของดุลยภาพ และการลดลง§Y$FE_LOGISTIC_CEILING$§!มี การ เสนอ แนะ อย่าง เหมาะ สม."
