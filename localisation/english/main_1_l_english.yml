 ethic_authoritarian:1 "อำนาจเผด็จการ"
 ethic_authoritarian_desc:1 "§Lมือที่แข็งแรงและนําทางสําคัญต่อความสําเร็จของ อารยธรรมใด ๆ - ทางเลือกจะเป็นความวุ่นวายและความวุ่นวาย มันเป็นหน้าที่ของรัฐที่จะนําทางประชาชนสู่เส้นทางที่มีประสิทธิภาพมากที่สุด§!\n"
 ethic_fanatic_authoritarian:0 "อำนาจเผด็จการสุดโต่ง"
 ethic_fanatic_authoritarian_desc:1 "§Lเสียงเดียว บัลลังก์เดียว รัฐเดียว เป็น หน้า ที่ อัน สําคัญ ยิ่ง ของ ฝูง ชน ที่ จะ เชื่อ ฟัง คน กลุ่ม น้อย ที่ ได้ รับ ความ สว่าง ซึ่ง ได้ รับ มอบ หน้า ที่ รับ ผิด ชอบ ใหญ่ ใน การ นํา.§!\n"
 ethic_egalitarian:0 "ความเสมอภาค"
 ethic_egalitarian_desc:1 "§Lสังคมใด ๆ ที่ไม่ยอมรับความเท่าเทียมระหว่างสมาชิกของตน - ที่ใด ๆ ก็ตามที่สามารถก้าวเข้าสู่ตําแหน่งใด ๆ ที่มีงานหนักพอ -§!\n"
 ethic_fanatic_egalitarian:0 "ความเสมอภาคสุดโต่ง"
 ethic_fanatic_egalitarian_desc:1 "§Lจง ระวัง เสมอ คน เหล่า นั้น ซึ่ง จะ เป็น คน ทะเยอทะยาน ภาย ใต้ การ สันนิษฐาน ผิด ๆ ว่า ความ ปรารถนา และ ระเบียบ วาระ ของ ตน เป็น สิ่ง สําคัญ ยิ่ง กว่า ของ เพื่อน ๆ ใน ทาง ใด ทาง หนึ่ง. สังคมที่ไม่คํานึงถึงความต้องการและสิทธิ ของสมาชิกทั้งหมด ไม่ใช่สังคม มันเป็นอาชญากรรม§!\n"
 ethic_xenophobe:0 "เกลียดต่างดาว"
 ethic_xenophobe_desc:1 "§Lการ พนัน ไม่ อาจ สูง กว่า นี้ ได้ เมื่อ เรา ไป ถึง พื้น ที่ กว้าง ใหญ่ อัน ไม่ ประจักษ์ แก่ ตา ของ กาแล็กซี เพราะ เรา กําลัง เล่น การ พนัน ด้วย การ อยู่ รอด ของ เผ่า พันธุ์ ของ เรา! อย่า ไว้ ใจ คน ต่าง ด้าว; รอย ยิ้ม เท็จ ของ มัน ซ่อน จิตใจ ที่ ไม่ รู้ จัก...§!\n"
 ethic_fanatic_xenophobe:0 "เกลียดต่างดาวอย่างมาก"
 ethic_fanatic_xenophobe_desc:1 "§Lอิทธิพลของเอเลี่ยน จะต้องรุนแรง โดยรักษาความบริสุทธิ์ และจริงใจกับตัวเอง และกับดาวเคราะห์ที่ให้เรามีชีวิต แม้แต่อํานาจเหนือเอเลี่ยน อาจจะไม่เพียงพอ ที่จะรับประกันความปลอดภัยของเรา§!\n"
 ethic_xenophile:0 "ชอบต่างดาว"
 ethic_xenophile_desc:0 "§Lมีอยู่, ในพวกเราทุกคน, หลงใหลลึกสําหรับไม่รู้จัก น้ําใจ ที่ ชอบ ผจญ ภัย ซึ่ง ปฏิเสธ ความ คุ้น เคย และ ความ สวย งาม ใน คน ที่ ไม่ คุ้น เคย ไม่ ว่า จะ เป็น ใคร ก็ ตาม.§!\n"
 ethic_fanatic_xenophile:0 "ชอบต่างดาวอย่างมาก"
 ethic_fanatic_xenophile_desc:0 "§Lหากเคยมีเช่นสิ่งที่เป็น จําเป็นอย่างยิ่งทางศีลธรรมก็จะ สํารวจจักรวาลและโอบกอด ทั้งหมดภายในมัน เราไม่เคยเดินทางคนเดียว§!\n"
 ethic_militarist:0 "ชอบสงคราม"
 ethic_militarist_desc:1 "§Lคุณ ความ ดี แท้ เพียง อย่าง เดียว คือ ความ กล้า หาญ และ การ ตี สอน และ พวก เขา สามารถ เอา ชนะ อุปสรรค ใด ๆ ได้ อย่าง ถูก ต้อง. ใน นั้น มี พลัง จริง ๆ; พลัง ยับยั้ง, คํา สัญญา ที่ ให้ ไว้.§!\n"
 ethic_fanatic_militarist:0 "ชอบสงครามอย่างมาก"
 ethic_fanatic_militarist_desc:1 "§Lความ สามารถ ใน การ คิด สร้าง สรรค์ เป็น สิ่ง สําคัญ อันดับ แรก. ทางเดียวที่จะรักษาวิถีชีวิตของเราไว้ได้ คือทําให้แน่ใจว่าทุกคนจะแบ่งปันมัน§!\n"
 ethic_pacifist:0 "รักสงบ"
 ethic_pacifist_desc:0 "§Lความขัดแย้งเป็นวิธีการสิ้นสุดเป็นแนวคิดที่ไร้สาระ โดย การ ทําลาย ธรรมชาติ ทําลาย สิ่ง ที่ จะ ได้ มา หรือ ให้ ที่ อยู่ แก่ สิ่ง ที่ จะ ถูก ทําลาย.§!\n"
 ethic_fanatic_pacifist:0 "รักสงบอย่างมาก"
 ethic_fanatic_pacifist_desc:0 "§Lในฐานะผู้มีอารยธรรม จุดจบของความขัดแย้งทางอาวุธ ควรเป็นความกังวลหลักของเรา สงคราม เป็น จุด จบ ของ วิวัฒนาการ ที่ ไร้ ประโยชน์ เหมือน กับ ความ ฟุ่มเฟือย.§!\n"
 ethic_spiritualist:0 "จิตวิญญาณนิยม"
 ethic_spiritualist_desc:1 "§Lมีคนที่คิดว่ามันน่าจดจํา ว่าพวกเราตัวเล็กแค่ไหน ชีวิตของเราช่างไร้จุดหมาย ไร้สาระ! ความจริงเดียวที่เรารู้ได้ คือการดํารงอยู่ของเรา จักรวาลทั้งหมด ชัยชนะนั้นเป็นเพียงความฝันที่เราทั้งหมด แบ่งปัน§!\n"
 ethic_fanatic_spiritualist:0 "จิตวิญญาณนิยมสุดโต่ง"
 ethic_fanatic_spiritualist_desc:0 "§Lวิทยาศาสตร์ของเราได้พิสูจน์แล้วว่า ความมั่นคงทําให้เป็นจริง เรา ถือ ว่า ความ พยายาม ของ เด็ก ที่ จะ หลอก ตัว เอง นั้น เป็น อีก ทาง หนึ่ง เมื่อ เขา เล่น กับ บล็อก ของ เขา§!\"เรื่องยาก.\"§!\n"
 ethic_materialist:0 "วัตถุนิยม"
 ethic_materialist_desc:0 "§Lขณะ ที่ เรา ไป หา ดาว ต่าง ๆ เรา ต้อง กําจัด สิ่ง ที่ เป็น เด็ก; พระเจ้า, วิญญาณ, และ สัตว์ อื่น ๆ ที่ สมอง ทํา ให้ เกิด ขึ้น. ความเป็นจริงคือความโหดร้ายและไม่ให้อภัย แต่เรายังต้องเหล็กกล้าตัวเอง และรักษาความปลอดภัยของเผ่าพันธุ์ของเรา§!\n"
 ethic_fanatic_materialist:0 "วัตถุนิยมสุดโต่ง"
 ethic_fanatic_materialist_desc:0 "§Lถึงแม้ว่ามันจะเจ็บ เราต้องเติบโตขึ้น และเก็บความคิดที่ล้าสมัยเกี่ยวกับศีลธรรมไว้ ไม่มี§!\"รัศมี ของ พระเจ้า\" ให้คุณค่าพิเศษกับจิตใจที่มีชีวิต ไม่มีวัตถุใดที่มีคุณค่าภายใน นอกเหนือจากสิ่งที่เราเลือกที่จะให้ ขอ ให้ เรา รับ เอา เสรีภาพ ใน การ ดํารง อยู่ และ บรรลุ ประสิทธิภาพ สูง สุด ใน ทุก สิ่ง!§!\n"
 ethic_neutral:0 "เป็นกลาง"
 ethic_neutral_desc:0 "§Lจิตใจที่เป็นกลางเป็นเสรี เปิดให้ทุกความเป็นไปได้§!"
 ethic_gestalt_consciousness:0 "เป็นหนึ่งเดียวกัน"
 ethic_gestalt_consciousness_desc:0 "§Lเราเข้าสู่ช่องว่าง\nการแผ่กว้างกลายเป็นเรา§!"

 STORM_DEVASTATION: "พายุ"
 STORM_DEVASTATION_TOOLTIP: "§K$STORM_DEVASTATION$§!\nนี้ควบคุมปริมาณการทําลายล้างของ พายุคอสมิคบนดาวเคราะห์ในเส้นทางของพวกเขา"

 building_foundry_upkeep_1: "พืชออลลอยเรียกใหม่"
 building_foundry_upkeep_1_desc: "ศูนย์ที่อุทิศตัวเพื่อการกําจัดเศษชิ้นส่วน และทิ้งลงในอัลลอยที่มีค่า ผ่านเทคนิคขั้นสูง"
 building_factory_upkeep_1: "การเปลี่ยนชื่อศูนย์"
 building_factory_upkeep_1_desc: "ด้วยแคมเปญแลกเปลี่ยนใหม่ และการรวมตัวกันแบบมือสอง เราสามารถนําสินค้าผู้บริโภคมาใกล้ที่สุด"
 building_foundry_efficiency_1: "มวลการวิจัยแลป"
 building_foundry_efficiency_1_desc: "โดยการรวมทฤษฎีตัดขอบกับ การสร้างและการทดสอบเหล่านี้ เราสามารถเพิ่ม ประสิทธิภาพในการใช้งานอย่างมาก"
 building_factory_efficiency_1: "ศูนย์ออกแบบที่เลิกใช้"
 building_factory_efficiency_1_desc: "ความ พยายาม ใน การ ออก แบบ ที่ มี ส่วน ร่วม"

 building_research_upkeep_1: "การวิจัยเดพอตของอุปทาน"
 building_research_upkeep_1_desc: "จุดศูนย์กลางที่เป็นศูนย์กลาง ที่ไหลไปตามอุปทานและการกระจาย วัสดุวิจัย,"
 building_research_efficiency_1: "การนําเสนอข้อมูล"
 building_research_efficiency_1_desc: "ด้วยการสนับสนุนนักทฤษฎีของเรา ด้วยข้อมูลการทดลองมากมาย เราสามารถเพิ่มประสิทธิภาพงานวิจัยของเราได้อย่างมาก"

