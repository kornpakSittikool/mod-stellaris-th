 STARBASE_NAV_TOOLTIP_VIEW: "แสดง§Y$NAME$§!"
 GAMEVERSION: "สเตลาริส 4.4 เปกาซัส" # Stellaris patch names are Constellation names
 STARTUP_TEXT: "ไม่สร้างพรมแดน ไม่อ้างชื่อโลก\n\nThe Stelaris 4.4 'Pegasus'ได้มาถึงแล้ว การขยายตัวของรถลีมูซีน นําพาอารยธรรมที่เล่นได้ไปยังสเตลาริส\n\nณ ใจ กลาง จักรวรรดิ มอลตา ทุก แห่ง เป็น เมือง หลวง ที่ เคลื่อน ที่ เต็ม ที่ ซึ่ง เข้า มา แทน ที่ โลก ทั้ง สิ้น. แผนภูมิเวย์ไลน์ข้ามดาว เชื่อมโยงเส้นทางของคุณ เข้ากับเครือข่ายสิ่งมีชีวิตของการค้า อิทธิพล และโอกาส ความ เข้ม แข็ง ของ คุณ อยู่ ใน การ เคลื่อน ไหว, การ ปรากฏ ตัว, และ สัมพันธภาพ ที่ คุณ จะ สร้าง ขึ้น.\n\nการ ขยาย ตัว แบบ นอร์เวย์ ทํา ให้ มี การ แนะ นํา ให้ รู้ จัก แอมบิชัน ใหม่: ผู้ ปก ป้อง กาแล็กซี ได้ รับ การ ปรับ ปรุง ให้ เป็น คู่ แข่ง กับ ร่อง ทาง แห่ง วิกฤตการณ์ ของ ผู้ เล่น จาก การ ปล่อย ครั้ง ก่อน. กลายเป็นแชมป์ของกาแล็กซี่โดยการสร้างพันธมิตร คําสั่งการบํารุงรักษา และนําไปสู่การต่อสู้กับภัยคุกคามทางธรรมชาติ\n\nใน ฐานะ ส่วน หนึ่ง ของ ความ ก้าว หน้า อย่าง อิสระ จาก พวก คู ส โต เด เรียน เป กา ซุส รวม ไป ถึง การ ปรับ ปรุง ขนาน ใหญ่ ใน การ ทํา งาน ให้ ดี ขึ้น และ การ หา เหตุ ผล ทาง เศรษฐกิจ ของ เอไอ รวม ทั้ง การ ปรับ ปรุง คุณภาพ ชีวิต ให้ เหมาะ กับ ระบบ บันทึก สภาพ การณ์, ส ตาร์ เบส, หน่วย งาน อัตโนมัติ, คลัง ข้อมูล และ อื่น ๆ อีก มาก.\n\nการประชุมครั้งนี้ยังเป็นวันครบรอบครั้งที่ 10 ของเรา - เป็นส่วนหนึ่งของการเฉลิมฉลองการอนุรักษ์ของเรา เราได้เอายูโทเปีย, สุริยุปราคา, และมนุษยศาสตร์เผ่าพันธุ์แพ็ค DLCs และรวมมันเข้ากับเกมฐานของผู้เล่นทุกคน\n\nขอบคุณสําหรับช่วงเวลา 10 ปี ของการเล่นสเตราริส"
