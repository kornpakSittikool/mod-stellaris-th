 starting_weapons_lasers_desc:1 "อาวุธที่มุ่งเป้าไปที่เป้าหมาย อาวุธ เหล่า นี้ มี ประสิทธิภาพ ใน ระดับ กลาง จน ถึง ระยะ ใกล้ ส่วน ใหญ่ แล้ว เป็น การ ละเลย ยุทธภัณฑ์ ของ ศัตรู."
 starting_weapons_projectiles_desc:1 "ไดรเวอร์ขนาดใหญ่ที่ใช้เครื่องยิงแม่เหล็กไฟฟ้า เพื่อเร่งการยิงไปยังเป้าหมายที่ความเร็วในการมองไม่เห็น ใน ขณะ ที่ ค่อน ข้าง มี ขอบ เขต จํากัด พลังงาน ของ มัน ที่ สูง กว่า และ อัตรา ไฟ ที่ เคี้ยว ผ่าน โล่ ก็ ง่าย ขึ้น."
 starting_weapons_missiles_desc:0 "ขีปนาวุธอวกาศกับอวกาศ มีหัวรบนิวเคลียร์ ขีปนาวุธมีระยะที่ยอดเยี่ยม แต่พวกเขามีความเสี่ยงในการสกัดกั้น ด้วยระบบการป้องกันจุด"
 starting_ftl_warp:0 "การเดินทางโดยการวาร์ป"
 starting_ftl_hyperdrive:0 "การเดินทางแบบไฮเปอร์สเปซ"
 starting_ftl_wormhole:0 "การเดินทางโดยใช้รูหนอน"
 starting_ftl_warp_desc:0 "ไดรฟ์ที่โค้งสร้างฟองของสับสเปซ รอบเรือทําให้ความเร็วที่เร็วกว่าแสง ที่จะได้รับ นี่ ทํา ให้ สามารถ เดิน ทาง ได้ อย่าง อิสระ แต่ ค่อน ข้าง ช้า ระหว่าง ดวง ดาว โดย ระยะ ทาง ไกล มาก ที่ เกี่ยว ข้อง อยู่ ด้วย."
 starting_ftl_hyperdrive_desc:0 "ไฮเปอร์ไดรฟ์ทําให้ยานแตกได้ชั่วคราว การเดินทางระหว่างดวงดาวเป็นอย่างรวดเร็ว แต่ จํากัด กับเส้นทางที่มีอยู่ บนเครือข่ายไฮเปอร์เลน"
 starting_ftl_wormhole_desc:0 "เครื่องกําเนิดรูหนอน เจาะอุโมงค์ผ่านสับสเปซ และสร้างท่อระหว่างจุดสองจุด เครื่อง กําเนิด ไฟฟ้า ขนาด ใหญ่ มี ขนาด ใหญ่ เกิน กว่า จะ ติด ตั้ง บน เรือ ได้ ซึ่ง ต้อง ใช้ สถานี จุลชีพ พิเศษ เพื่อ ดําเนิน การ."
