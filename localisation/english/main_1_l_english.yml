 # Planet Classes
 ####################################

 pc_gas_giant:0 "ดาวแก๊สยักษ์"
 pc_gas_giant_desc:0 "ที่ประกอบด้วยไฮโดรเจนและฮีเลียม ล้อมรอบแกนหนาแน่น"
 pc_asteroid:0 "ดาวเคราะห์น้อย"
 pc_asteroid_desc:0 "ดาว เคราะห์ น้อย หรือ ดาว เคราะห์ น้อย ที่ ใหญ่ กว่า ยืน อยู่ ใน กระจุก ที่ หนา แน่น ของ ร่าง กาย ที่ เล็ก กว่า."
 pc_molten:0 "ดาวหลอมเหลว"
 pc_molten_desc:0 "โลกร็อคกี้ร้อนจัด บรรยากาศเป็นบางหรือไม่แข็งตัว และลาวาจากภายในไหลอย่างอิสระ ดาว เคราะห์ ชนิด นี้ ไม่ อาจ ค้ําจุน ชีวิต อินทรีย์ ได้."
 pc_frozen:0 "ดาวน้ำแข็ง"
 pc_frozen_desc:1 "โลกของร็อคกี้ปกคลุมไปด้วยชั้นหนา ของน้ําแข็งแช่แข็งอย่างถาวร อุณหภูมิต่ําและบรรยากาศที่บางมาก ปิดกั้นการดํารงอยู่ของชีวิตบนพื้นผิว"
 pc_broken:0 "ดาวแตก"
 pc_broken_desc:0 "ดาวได้รับความเสียหายจากเหตุการณ์ภัยพิบัติบางอย่าง คุณสมบัติอะไรก็ตามที่เคยมีมานั้นไม่สามารถมองเห็นได้อีกต่อไป"
 pc_barren:0 "ดาวแห้งแล้ง"
 pc_barren_desc:1 "โลกที่มีหินเป็นหิน มีบรรยากาศที่บางหรือไม่โดดเด่น พื้น ผิว โลก เต็ม ไป ด้วย อุกกาบาต กระทบ ปล่อง ภูเขา ไฟ และ ปราศจาก ชีวิต อย่าง สิ้น เชิง."
 pc_barren_cold:0 "ดาวแห้งแล้ง (หนาวเย็น)"
 pc_barren_cold_desc:1 "โลกที่มีหินเป็นหิน มีบรรยากาศที่บางหรือไม่โดดเด่น พื้น ผิว โลก เต็ม ไป ด้วย อุกกาบาต กระทบ ปล่อง ภูเขา ไฟ และ ปราศจาก ชีวิต อย่าง สิ้น เชิง."
 pc_desert:0 "ดาวทะเลทราย"
 pc_desert_desc:0 "โลกแห้ง, หินที่มีบรรยากาศไนโตรเจน-ออกซิเจน น้ํา จืด และ ร่าง กาย สําคัญ ๆ ของ ผิว น้ํา ค่อน ข้าง จะ หา ยาก. อุณหภูมิ ที่ สมดุล แตก ต่าง กัน ระหว่าง วัน กับ คืน. พืช พรรณ หา ยาก แต่ แม้ แต่ การ หมัก พอ ประมาณ ก็ อาจ ทํา ให้ ทะเล ทราย บาน ได้."
 pc_arid:0 "ดาวแห้งแล้งจัด"
 pc_arid_desc:0 "โลกแห้ง, หินที่มีบรรยากาศไนโตรเจน-ออกซิเจน ภูมิประเทศที่มีฝุ่นฝุ่นปกคลุมอยู่ ส่วนใหญ่เป็นเมซาสและหุบเขา ป่า ไม้ จะ พบ ได้ ใน แถบ ขั้ว โลก ร้อน กว่า แต่ พืช พรรณ หา ยาก ไม่."
 pc_tundra:0 "ดาวทุนดรา"
 pc_tundra_desc:0 "โลกเย็นและหินที่มีบรรยากาศไนโตรเจนออกซิเจน เกล็ด หิมะ คลุม พื้น ผิว ส่วน ใหญ่ ยก เว้น บริเวณ เส้น ศูนย์ สูตร ที่ ตรง พอ ดี กว่า. สิ่ง มี ชีวิต ที่ มั่นคง มี อยู่ แต่ ส่วน ใหญ่ แล้ว พืช พรรณ จํากัด อยู่ แค่ มอส และ ไล เคน."
 pc_continental:0 "ดาวแผ่นดินขนาดใหญ่"
 pc_continental_desc:0 "ดาวที่เต็มไปด้วยหิน มีบรรยากาศไนโตรเจน-ออกซิเจนและมีไฮโดรสเฟียร์ที่มีความเสถียร มวลพื้นดินขนาดใหญ่ถูกแยกออกจากกันโดยมหาสมุทรโดยมีการเปลี่ยนแปลงของสภาพอากาศมาก ขึ้นอยู่กับละติจูดและปริมาณฝน"
 pc_tropical:0 "ดาวร้อนชื้น"
 pc_tropical_desc:0 "ฮูลิดโลกหินที่มีบรรยากาศไนโตรเจน-ออกซิเจนหนา ฤดู กาล ที่ มี การ กําหนด ไว้ ล่วง หน้า ที่ สําคัญ จะ ถูก แลก เปลี่ยน กับ ช่วง ที่ แห้ง แล้ง. พื้น ดิน ส่วน ใหญ่ มี พืช พรรณ หนา ทึบ ปก คลุม อยู่."
 pc_ocean:0 "ดาวมหาสมุทร"
 pc_ocean_desc:0 "โลกร็อคกี้ที่มีบรรยากาศไนโตรเจนออกไซด์เจน และไฮโดรสเฟียร์ที่สําคัญ มหาสมุทรครอบคลุมมากกว่า§Y90%§!จากพื้นผิวของเกาะที่กระจัดกระจาย รวมกันเป็นเปอร์เซ็นต์ที่เหลือ"
 pc_arctic:0 "ดาวอาร์กติก"
 pc_arctic_desc:0 "โลกหินหินที่มีบรรยากาศไนโตรเจน-ออกซิเจน เสา นี้ มี ขนาด ใหญ่ และ อาจ พบ ว่า มี แหล่ง น้ํา ที่ มี ความ สําคัญ มาก อยู่ ใน น้ํา แข็ง อย่าง ถาวร เป็น น้ํา แข็ง ที่ แข็ง ตัว. อย่าง ไร ก็ ตาม ดาว เคราะห์ ดวง นี้ ประสบ กับ ความ หลาก หลาย ของ ฤดู กาล และ วง เส้น ศูนย์ สูตร มี พืช พรรณ ปก คลุม อยู่."
 pc_alpine:0 "ดาวอัลไพน์"
 pc_alpine_desc:1 "โลกภูเขาที่มีบรรยากาศไนโตรเจนออกซิเจน หิมะปกคลุมยอดเขา และทะเลสาบแช่แข็ง ในขณะที่ดาวเคราะห์ ประสบความแตกต่างเล็กน้อยของฤดูกาล น้ําที่ยังคงลื่นไหลใต้พื้นผิวของทะเลสาบแช่แข็ง"
 pc_savannah:0 "ดาวสะวันนา"
 pc_savannah_desc:1 "โลกร็อคกี้ถูกปกครองด้วยที่ราบแห้ง ปกคลุมไปด้วยบรรยากาศไนโตรเจน-ออกซิเจน มี การ ใช้ พืช พรรณ ชนิด นี้ ใน การ ผสม พันธุ์."
 pc_habitat:0 "ที่อยู่อาศัยวงโคจรดาว"
 pc_habitat_plural: "ลวดลายรอยแยกแอสทรัล"
 pc_habitat_desc:1 "โครงสร้างทางอวกาศเทียม ที่นําเสนอลักษณะคล้ายดาวเคราะห์ - หากเป็นสภาพการดํารงอยู่ของเมืองไฮโดรพิกและเทคโนโลยีการกรองขั้นสูง ทําให้มันใกล้การบํารุงรักษาตัวเอง และสถานที่ก่อสร้างบนสถานี สามารถระเบิดดาวเคราะห์ของสถานีสําหรับวัสดุดิบ"
 pc_toxic:0 "ดาวพิษ"
 pc_toxic_desc:0 "ดาว เคราะห์ ที่ มี หิน หนา ทึบ ซึ่ง ทํา ให้ ทุก สิ่ง ที่ รู้ จัก กัน ว่า มี ชีวิต อยู่ ใน รูป แบบ ที่ สูง กว่า เป็น อันตราย ถึง ชีวิต."
 pc_shrouded:0 "ดาวที่ถูกปกคลุมด้วยพลังบางอย่าง"
 pc_shrouded_desc:0 "เซ็นเซอร์ของเราไม่สามารถเจาะผ่านหมอกหนารอบดาวเคราะห์นี้ได้ ยานที่เข้าไปจะไม่สามารถกลับออกมาได้"
 pc_b_star:0 "ดาวห้องบี"
 pc_b_star_desc:0 "ดาวใหญ่รุ่นบีหลักเซกซี่มีมากสว่างและสีฟ้า แม้ ค่อน ข้าง จะ หา ได้ ยาก แต่ ความ สว่าง ของ ดวง ดาว เหล่า นี้ ทํา ให้ มัน อยู่ ใน กลุ่ม ดวง ดาว ที่ มอง เห็น ได้ ด้วย ตา เปล่า."
 pc_a_star:0 "ดาวคลาส A"
 pc_a_star_desc:0 "เหล่านี้น้อยหรือบลัชขาวหลัก- คอนตินเจนซีมักจะเป็นหนึ่งในที่มองเห็นได้มากที่สุด กับตาเปล่า มันมีขนาดใหญ่และหมุนเร็วมาก แต่ในที่สุดก็จะพัฒนาเป็นยักษ์สีแดงที่ช้าและเย็นกว่า"
 pc_f_star:0 "ดาวห้อง F"
 pc_f_star_desc:0 "ดาวชนิด F ใหญ่ค่อนข้าง และมักจะเรียกว่าคนแคระสีเหลืองขาว แม้ว่ามันมักจะปล่อยรังสียูวีปริมาณมหาศาล แต่พื้นที่ที่กว้างขวางสามารถอาศัยได้ ก็มีโอกาสที่ดีที่จะสนับสนุนโลกที่มีสิ่งมีชีวิต"
 pc_g_star:0 "ดาวคลาสก"
 pc_g_star_desc:0 "ส่วนใหญ่จะถูกเรียกว่า คนแคระสีเหลือง ดาวแบบกมีช่วงสีจากสีขาวเป็นสีเหลืองเล็กน้อย ไฮโดรเจน สําหรับประมาณ 10 พันล้านปี ก่อนที่จะขยายตัว และกลายเป็นยักษ์สีแดง แม้อายุขัยของพวกเขาจะสั้นกว่าดาวชนิด K แต่โลกภายในโซนที่อาศัยอยู่ ของดาวกมักจะมีสภาวะที่เหมาะสมสําหรับการพัฒนาของชีวิต"
 pc_k_star:0 "ดาวคลาส K"
 pc_k_star_desc:0 "ดาวฤกษ์ดวงหลัก ที่บางครั้งเรียกว่า คนแคระสีส้ม เป็นภาพที่ค่อนข้างทั่วไป พวกเขามีความเสถียรในหลักลําดับสําหรับถึง 30 พันล้านปี หมายความว่าโลกที่โคจรรอบดาว K ชนิด มีความยาวกว่าหน้าต่างเฉลี่ย"
 pc_m_star:0 "ดาวคลาส M"
 pc_m_star_desc:0 "ดาว แคระ แดง ความ อ่อน โยน ต่ํา ของ มัน หมาย ความ ว่า เป็น เรื่อง ยาก ที่ จะ สังเกต เห็น ด้วย ตา เปล่า จาก ที่ ห่าง ไกล. แม้ ว่า ตาม ปกติ มัน จะ มี อายุ ยืน มาก แต่ คนแคระ สี แดง แทบ จะ ไม่ ปล่อย แสง ยูวี ซึ่ง ยัง ผล ให้ เกิด สภาพ ที่ ไม่ เอื้อ อํานวย ต่อ รูป แบบ ชีวิต ส่วน ใหญ่."
 pc_t_star:0 "ดาว Class T (ดาวแคระน้ำตาล)"
 pc_t_star_desc:0 "คนแคระสีน้ําตาลเป็นวัตถุย่อย ที่ขาดมวลเพื่อคงไฮโดรเจนฟิวชั่น ขนาด ของ ก๊าซ ยักษ์ ใหญ่ พอ ๆ กัน มี ความ หนา แน่น มาก กว่า. ความ สว่าง ที่ ต่ํา และ ความ ร้อน ใน ชั่ว อายุ ที่ ค่อน ข้าง เล็ก ของ มัน หมาย ความ ว่า ดาว เคราะห์ ต่าง ๆ ที่ โคจร รอบ ตัว มัน ไม่ น่า จะ ค้ําจุน ชีวิต."
 pc_m_giant_star:0 "ดาว Class M (ดาวยักษ์แดง)"
 pc_m_giant_star_desc:0 "ด้วย รัศมี ขนาด ใหญ่ และ อุณหภูมิ ผิว ที่ ค่อน ข้าง ต่ํา ยักษ์ สี แดง เป็น ดาว ที่ มี มวล ขนาด พอ เหมาะ ใน ระยะ หลัง ๆ ของ วิวัฒนาการ ชั้น ยอด. บรรยากาศ อัน กว้าง ใหญ่ และ ความ สว่าง สูง ของ พวก เขา ทํา ให้ วง โคจร ใน เขต ที่ อยู่ ห่าง ไกล ได้."
 pc_black_hole:0 "หลุมดำ"
 pc_black_hole_desc:1 "โดย ทั่ว ไป แล้ว เกิด จาก การ ยุบ ตัว ของ ดาว ขนาด มหึมา เมื่อ สิ้น สุด วงจร ชีวิต หลุม ดํา มี สนาม ความ ถ่วง ที่ แข็ง แรง อย่าง ยิ่ง ซึ่ง ป้องกัน ไม่ ให้ สิ่ง ใด ๆ รวม ทั้ง แสง ซึ่ง เกิด จาก การ หลบ หนี เมื่อ ขอบ ฟ้า เหตุ การณ์ ถูก ข้าม ไป แล้ว. คลื่นแรงโน้มถ่วงที่ปล่อยออกมาโดยหลุมดํา แทรกแซงความเร็วของความเร็วทําให้เป็นเรื่องยากสําหรับเรือ ที่จะหนีจากการต่อสู้"
 pc_neutron_star:0 "ดาวนิวตรอน"
 pc_neutron_star_desc:2 "ดาวขนาดใหญ่ประสบการ ยุบอย่างรวดเร็ว และระเบิดในซูเปอร์โนวา แม้ว่าเส้นผ่านศูนย์กลางของพวกเขา โดยปกติจะเล็กถึงสิบกิโลเมตร แต่มวลของพวกเขามีมากเป็นหลายครั้ง คลื่นความโน้มถ่วงและรังสี ที่ปล่อยโดยดาวนิวตรอนจะต้อง ระมัดระวังการนําทางรอบ ชะลอความเร็วแสงย่อยของเรือ"
 pc_pulsar:0 "พัลซาร์"
 pc_pulsar_desc:1 "พัล ซาร์ เป็น ดาว นิวตรอน ที่ มี ความ แรง สูง ซึ่ง ปล่อย รังสี แม่เหล็กไฟฟ้า ออก มา. เมื่อดาวหมุน, ลําแสงจะมองเห็นได้เท่านั้น เมื่อมันชี้โดยตรงไปยังผู้สังเกตการณ์ นี่ ทํา ให้ มี การ วัด ช่วง เวลา ที่ แม่นยํา มาก ซึ่ง บาง ครั้ง ก็ แม่นยํา มาก จน สามารถ ใช้ วัด เวลา ที่ ผ่าน มา ได้ อย่าง แม่นยํา อย่าง ยิ่ง. การ แผ่ รังสี ที่ ออก มา โดย พายุ โขด หิน เข้า มา แทรกแซง เทคโนโลยี การ หักเห ทํา ให้ เรือ และ โล่ ของ สถานี ไม่ สามารถ เข้า ถึง ได้."
 pc_toxoid_star:0 "ตัวนําแสงแบบมีชีวิตชีวา"
 pc_toxoid_star_desc:0 "มิลลิเนียของการสัมผัสกับพิษของสารพิษ ก่อให้เกิดการเปลี่ยนแปลงในการแต่งหน้าของดาวนี้ แม้ว่าเมื่อมันเป็นดาว จี-ชนิดมาตรฐานค่อนข้าง ตอนนี้มันปล่อยหมอกสีเขียวน่ากลัว"
 pc_infested:0 "ดาวที่เต็มไปด้วยสัตว์ร้าย"
 pc_infested_desc:0 "พื้นผิวของโลกนี้ ถูกปกคลุมด้วยสารปนเปื้อนทางชีวภาพบางอย่าง"
 pc_gaia:0 "ดาวไกอา"
 pc_gaia_plural: "โลกา"
 pc_gaia_desc:0 "โลกในอุดมคติ ความอบอุ่น ที่มีบรรยากาศไนโตรเจน-ออกซิเจน และระบบนิเวศที่เสถียร สภาพ ที่ เป็น อันตราย สําหรับ ทุก ชีวิต ที่ รู้ จัก กัน ดี ใน รูป แบบ ต่าง ๆ กัน."
 pc_nuked:0 "ดาวแห่งความตาย"
 pc_nuked_plural: "โลกของหมึก"
 pc_nuked_desc:0 "โลกหินที่มีบรรยากาศไนโตรเจนออกไซด์เจน ปัจจุบัน องค์การ นี้ กําลัง ประสบ กับ ฤดู หนาว นิวเคลียร์ ซึ่ง มี ชั้น ของ ละออง เกสร ใน บรรยากาศ หนา แน่น. ระดับความสูงของรังสีผิว สัญญาณที่น้อยที่สุดของชีวิต"
 pc_ringworld_habitable:1 "วงแหวนเซ็กเมนต์"
 pc_ringworld_habitable_desc:1 "ส่วนหนึ่งของ ริงเวิลด์ วงดนตรีขนาดใหญ่ จัดเรียงดวงอาทิตย์ของระบบ\nที่สร้างขึ้นเพื่ออนุญาตให้มีพื้นที่อาศัยเทียมจํานวนมาก ตามแนวเขตภายในของ เป็นอิสระจากข้อจํากัด"
 pc_ringworld_tech:1 "$pc_ringworld_habitable$"
 pc_ringworld_tech_desc:1 "ส่วนหนึ่งของ ริงเวิลด์ วงดนตรีขนาดใหญ่ จัดเรียงดวงอาทิตย์ของระบบ\nที่สร้างขึ้นเพื่ออนุญาตให้มีพื้นที่อาศัยเทียมจํานวนมาก ตามแนวเขตภายในของ เป็นอิสระจากข้อจํากัด"
 pc_ringworld_seam:1 "$pc_ringworld_habitable$"
 pc_ringworld_seam_desc:1 "ส่วนหนึ่งของ ริงเวิลด์ วงดนตรีขนาดใหญ่ จัดเรียงดวงอาทิตย์ของระบบ\nที่สร้างขึ้นเพื่ออนุญาตให้มีพื้นที่อาศัยเทียมจํานวนมาก ตามแนวเขตภายในของ เป็นอิสระจากข้อจํากัด"
 pc_ringworld_habitable_damaged:1 "$pc_ringworld_habitable$ พังเสียหาย"
 pc_ringworld_habitable_damaged_desc:1 "ส่วนหนึ่งของ ริงเวิลด์ วงดนตรีขนาดใหญ่ จัดเรียงดวงอาทิตย์ของระบบ\nส่วนนี้ของโครงสร้างมหานคร ดูจะเป็นความเสียหายที่แก้ไขไม่ได้"
 pc_ringworld_tech_damaged:1 "$pc_ringworld_habitable_damaged$"
 pc_ringworld_tech_damaged_desc:1 "ส่วนหนึ่งของ ริงเวิลด์ วงดนตรีขนาดใหญ่ จัดเรียงดวงอาทิตย์ของระบบ\nส่วนนี้ของโครงสร้างมหานคร ดูจะเป็นความเสียหายที่แก้ไขไม่ได้"
 pc_ringworld_seam_damaged:1 "$pc_ringworld_habitable_damaged$"
 pc_ringworld_seam_damaged_desc:1 "ส่วนหนึ่งของ ริงเวิลด์ วงดนตรีขนาดใหญ่ จัดเรียงดวงอาทิตย์ของระบบ\nส่วนนี้ของโครงสร้างมหานคร ดูจะเป็นความเสียหายที่แก้ไขไม่ได้"
 pc_shielded:0 "ดาวที่มีโล่ป้องกัน"
 pc_shielded_desc:1 "[Root.GetShieldedPlanetDesc]"
 pc_shielded_desc_orig:0 "ทั้งโลกนี้ถูกบรรจุอยู่ใน การป้องกันพลังงานที่ปิดไม่ได้ มันบล็อกสแกนทั้งหมดของพื้นผิว"
 pc_ai:0 "ดาว AI"
 pc_ai_desc:0 "โลกของร็อคกี้เต็มไปด้วยสิ่งก่อสร้าง บรรยากาศ บาง อย่าง ประกอบ ด้วย มลพิษ ทาง อุตสาหกรรม ส่วน ใหญ่. มีการปล่อยพลังงานที่แข็งแกร่ง จากทั่วพื้นผิวทั้งหมด แต่ไม่มีสัญญาณสิ่งมีชีวิตอินทรีย์"
 pc_machine:0 "ดาวเครื่องจักร"
 pc_machine_desc:0 "โลกของร็อคกี้เต็มไปด้วยสิ่งก่อสร้าง บรรยากาศ บาง อย่าง ประกอบ ด้วย มลพิษ ทาง อุตสาหกรรม ส่วน ใหญ่ และ ไม่ สามารถ รอง รับ สิ่ง มี ชีวิต ทาง ชีววิทยา."
 pc_machine_broken:0 "โลก AI พัง"
 pc_machine_broken_desc:0 "$pc_ai_desc$"
 pc_hive:0 "ดาวที่เป็นรัง"
 pc_hive_desc:0 "โลกทั้งหมดนี้เป็นสิ่งมีชีวิตขนาดยักษ์ เชื่อมโยงกับจิตรังผึ้งที่หล่อหลอมมัน สิ่งมีชีวิตใด ๆ ที่ไม่เป็นส่วนหนึ่งของรังผึ้งที่ก้าวมาที่นี่ จะถูกโจมตีโดยภูมิประเทศของตัวเอง"
 pc_cybrex:0 "$pc_ringworld_habitable$"
 pc_cybrex_desc:0 "$pc_ringworld_habitable_desc$"
 pc_shattered:0 "ดาวที่แตกสลาย"
 pc_shattered_desc:0 "เศษซากที่แตกของสิ่งที่เคยเป็นดาวเคราะห์ การสั่นสะเทือนของพลังงานขนาดใหญ่ ได้ระเบิดแกนของโลก ทิ้งเพียงแผ่นหินลอย"
 pc_ice_asteroid:0 "ดาวเคราะห์น้อยน้ำแข็ง"
 pc_ice_asteroid_desc:0 "ดาวเคราะห์น้อยหรือดาวเคราะห์น้อยขนาดใหญ่ ประกอบด้วย H2O ที่แช่แข็ง"
 pc_rare_crystal_asteroid:0 "$pc_crystal_asteroid$"
 pc_rare_crystal_asteroid_desc:0 "$pc_crystal_asteroid_desc$"
 pc_shattered_ring_habitable:1 "วงแหวนเซ็กเมนต์ (พังเสียหาย)"
 pc_shattered_ring_habitable_desc:1 "ส่วนหนึ่งของ ริงเวิลด์ วงดนตรีขนาดใหญ่ จัดเรียงดวงอาทิตย์ของระบบ\nส่วนนี้ของโครงสร้างมหานครได้รับความเสียหาย -โดยเฉพาะกับบางส่วนของเขตที่สูงขึ้น แต่ก็ไม่ได้ปรากฏ"

