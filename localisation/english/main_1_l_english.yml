 FE_LOGISTICS_FLEET_UPKEEP_TOOLTIP: "§H$FE_LOGISTICS_FLEET_UPKEEP$§!\nนี้ควบคุม$r_trade$รักษา กอง เรือ ไว้ เมื่อ ถูก ยึด หรือ อยู่ ใน เขต ของ ศัตรู. การ เพิ่ม ขึ้น นี้ จะ ทํา ให้ มี ราคา แพง ขึ้น ใน การ รักษา กอง เรือ ใน สงคราม."
