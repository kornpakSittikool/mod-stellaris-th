 TOOLTIP_SETUP_TRAITS:1 "§H$TRAITS$§!\nเลือก ลักษณะ นิสัย ที่ คุณ ควร มี."
 TOOLTIP_SETUP_RULER:1 "§H$RULER$§!\nกําหนดเองผู้ปกครองเริ่มต้นของคุณ ขอ ให้ สังเกต ว่า บาง คน ใน รัฐบาล อาจ เปลี่ยน ผู้ ปกครอง บ่อย กว่า คน อื่น และ ผู้ ปกครอง อาจ ตาย ได้."
 TOOLTIP_SETUP_NAME_CLASS:1 "§H$NAME_AND_CLASS$§!\nเลือกคลาสดาวเคราะห์ของโลกของคุณ และปรับแต่งชื่อ คลาสดาวเคราะห์ที่คุณเลือก ยังจะเป็นชนิดหลักสําหรับสายพันธุ์ของคุณ\n\nคลาสอื่น ๆ ของดาวเคราะห์สามารถอาศัยอยู่ โดยสายพันธุ์ของคุณ ขึ้นอยู่กับวิธีการที่พวกเขา แตกต่างจากรุ่นดาวเคราะห์ของคุณ"
 TOOLTIP_SETUP_CITY_APPEARANCE:1 "§H$CITY_GRAPHICS$§!\nเลือกลักษณะของเมืองของคุณ สิ่งนี้ไม่มีผลต่อการเล่นเกม"
 TOOLTIP_SETUP_GOVERNMENT:1 "§H$ETHICS_AND_GOVERNMENT$§!\nเลือกชนิดจริยธรรมและรัฐบาล สําหรับจักรวรรดิของคุณ การคัดเลือกของจรรยาบรรณของคุณ กําหนดว่า ประเภทใดของรัฐบาลที่ใช้ได้สําหรับการคัดเลือก"
 TOOLTIP_SETUP_EMPIRE_ADVISOR:0 "§H$EMPIRE_ADVISOR$§!\nเลือกประเภทของเสียงสําหรับแจ้งเตือนและแจ้งเตือน"
 TOOLTIP_SETUP_EMPIRE_NAME:1 "§H$EMPIRE_NAME$§!\nทําตามชื่อ จักรวรรดิของคุณ"
 TOOLTIP_SETUP_FLAG:1 "§H$EMPIRE_FLAG$§!\nปรับแต่งธงของจักรวรรดิของคุณ"
 TOOLTIP_SETUP_EMPIRE_NAMELIST:1 "§H$CUSTOMIZE_NAME_LISTS$§!\nเลือกชื่อที่เรือ, ผู้นํา และดาวเคราะห์ของคุณจะเลือกเป็นชื่อ"
 TOOLTIP_SETUP_SPECIES_EMPIRE_NAMES: "§H$NAMES$§!\nปรับค่าชื่อของสายพันธุ์และจักรวรรดิของคุณ"
 TOOLTIP_SETUP_WEAPONS:1 "§H$STARTING_WEAPONS$§!\nเลือกอาวุธที่เริ่มใช้กับยานของจักรวรรดิ\n\nคุณจะสามารถเปลี่ยนส่วนประกอบอาวุธ ที่เรือของคุณติดตั้งระหว่างการเล่น เช็ค§Yโปรแกรมออกแบบเรือ§!ในเกมที่จะเปลี่ยนส่วนประกอบที่เรือของคุณจะติดตั้ง"
 TOOLTIP_SETUP_FTL:1 "§H$FTL_LABEL$§!\nเลือกวิธีการท่องเที่ยวที่จักรวรรดิของคุณจะใช้สําหรับการท่องเที่ยวระหว่างดวงดาว คุณจะไม่สามารถเปลี่ยนแปลงความเร็ว:ของคุณ จนกว่าคุณจะปลดล็อค บางเทคโนโลยีที่หายากมาก คุณจะไม่สามารถเปลี่ยนแปลง ระหว่างชนิดพื้นฐานของการเดินทางของความเร็วระหว่างการเล่น"
 TOOLTIP_SETUP_SHIP_APPEARANCE:1 "§H$SHIP_GRAPHICS$§!\nเลือกลักษณะของเรือในจักรวรรดิของคุณ"
 SECONDARY_SPECIES:0 "เผ่าพันธุ์ที่สอง"
 TOOLTIP_SETUP_SECONDARY_SPECIES_APPEARANCE:0 "§H$PORTRAIT$§!\nเลือกลักษณะของเผ่าพันธุ์รองของคุณ"
 TOOLTIP_SETUP_SECONDARY_SPECIES_NAME:0 "§H$SPECIES_NAME$§!\nเลือกชื่อลําดับที่สองของคุณเผ่าพันธุ์."
 TOOLTIP_SETUP_SECONDARY_SPECIES_NAMELIST:0 "§H$CUSTOMIZE_NAME_LISTS$§!\nเลือกชื่อจากรายการผู้นําลําดับที่สองของคุณเผ่าพันธุ์จะเลือกชื่อพวกเขา"
 TOOLTIP_SETUP_SECONDARY_SPECIES_TRAITS:0 "§H$TRAITS$§!\nเลือกคุณสมบัติต่าง ๆ ที่ตัวที่สองของคุณเผ่าพันธุ์น่าจะนะ"

