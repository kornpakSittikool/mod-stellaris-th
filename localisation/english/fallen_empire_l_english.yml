 job_fe_xeno_ward_desc:1 "ตัวอย่างสิ่งมีชีวิตต่างดาวเหล่านี้ถูกรวบรวมไว้ที่นี่ ในสภาพแวดล้อมที่จำลองเหมือนถิ่นที่อยู่ตามธรรมชาติของพวกมัน เพื่อให้แน่ใจว่าสายพันธุ์ของพวกมันจะได้รับการอนุรักษ์ในดาราจักรที่มักจะปั่นป่วนและเต็มไปด้วยการทำลายล้าง"
