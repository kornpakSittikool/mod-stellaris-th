 job_fe_protector_desc:3 "เพื่อให้คนส่วนใหญ่สามารถพักผ่อนอย่างสงบและเพลิดเพลินกับชีวิตอันฟุ่มเวยของพวกเขาได้ บุคคลที่แข็งแกร่งเหล่านี้จึงยืนหยัดพร้อมในยามค่ำคืนเพื่อมอบความรุนแรงให้แก่ผู้ที่จะมาทำร้ายพวกเขา"
