 ### FE Civics

 civic_antediluvian_mind: "จิตสำนึกโบราณกาล"
 civic_antediluvian_mind_desc: "กาลเวลาไม่ปรานีต่อจิตสำนึกเกสตัลต์นี้ การมีอยู่เป็นเวลานานในฟองสบู่กาลเวลาทำให้ความปรารถนาในการเอาชีวิตรอยที่เคยไร้ก้นบึ้งของมันนั้นทื่อลง"
 civic_sluggish_drones: "โดรนไร้ทิศทาง"
 civic_sluggish_drones_desc: "เนื่องจากจิตสำนึกส่วนกลางที่ผ่อนคลายออกแรงกดดันเพียงเล็กน้อย โดรนของจักรวรรดินี้จึงดูเหมือนจะเฉื่อยชาในขณะที่พวกมันค่อยๆ ปฏิบัติหน้าที่ของตน"

 ### FE Buildings
 building_fe: "สิ่งก่อสร้างของจักรวรรดิโบราณ"
 building_ancient_control_center:0 "ศูนย์ควบคุมโบราณ"
 building_ancient_control_center_desc:0 "ศูนย์ควบคุมโบราณของริงเวิลด์ได้รับการบำรุงรักษาอย่างยากลำบากด้วยความพยายามอย่างไม่เหน็ดเหนื่อยของกองทัพโดรนเครื่องจักร"
 building_ancient_palace:0 "พระราชวังโบราณ"
 building_ancient_palace_desc:0 "อาคารพระราชวังอันกว้างใหญ่แห่งนี้เป็นประจักษ์พยานถึงยุคสมัยที่ล่วงลับไปนาน แม้ว่าส่วนหน้าอาคารที่สว่างไสวจะปฏิเสธที่จะยอมจำนนต่อการผ่านไปของกาลเวลา แต่ปีกอาคารหลายส่วนก็ถูกทิ้งร้างและอยู่ในสภาพชำรุดทรุดโทรมในระดับต่างๆ"
 building_ancient_hive_capital: "แกนกลางอันน่าเคารพ"
 building_ancient_hive_capital_desc: "เน็กซัสโบราณแห่งอำนาจสูงสุดของไฮฟ์แห่งนี้คือจุดที่โดรนนับไม่ถ้วนหลายชั่วอายุคนได้ปฏิบัติหน้าที่ตามคำสั่งอย่างซื่อสัตย์"

 building_affluence_emporium: "ห้างสรรพสินค้าแห่งความมั่งคั่ง"
 building_affluence_emporium_desc: "ศูนย์กลางแห่งนี้คาดการณ์และตอบสนองความต้องการทางวัตถุโดยใช้อัลกอริทึมการจัดซื้อขั้นสูง มอบความพึงพอใจก่อนที่ประชากรจะรู้ตัวว่าต้องการเสียอีก"
 building_affluence_center:0 "ศูนย์การค้าแห่งความมั่งคั่ง"
 building_affluence_center_desc:0 "ศูนย์กลางแห่งนี้ทำให้ความปรารถนาที่แปลกประหลาดที่สุดกลายเป็นจริงได้อย่างง่ายดายในชั่วพริบตา"
 building_nourishment_complex: "อาหารบำรุงคอมเพล็กซ์"
 building_nourishment_complex_desc: "เทคโนโลยีการเลียนแบบจะเสกสร้างรสชาติใหม่ๆ ได้อย่างรวดเร็วตามคำสั่ง"
 building_nourishment_center:0 "ศูนย์อาหารบำรุง"
 building_nourishment_center_desc:0 "ทุกรสชาติที่เป็นไปได้สามารถเลียนแบบขึ้นมาได้ภายในกำแพงเหล่านี้"
 building_dimensional_replicator: "เครื่องจำลองมิติ"
 building_dimensional_replicator_desc: "เทคโนโลยีของเครื่องจำลองมิตินี้สามารถแปลงพลังงานเป็นสสารได้อย่างไม่มีที่ติ"
 building_dimensional_fabricator:0 "เครื่องสร้างมิติ"
 building_dimensional_fabricator_desc:0 "เครื่องสร้างมิติขั้นสูงนี้เจาะอุโมงค์ผ่านโครงสร้างของมิติอวกาศอย่างราบรื่นเพื่อสกัดทรัพยากรอันมีค่าออกมา"
 building_class_3_singularity: "ภาวะเอกฐาน คลาส-3"
 building_class_3_singularity_desc: "การดักจับพลังงานทั้งหมดจากภาวะเอกฐานนี้ถือเป็นความมหัศจรรย์ทางวิศวกรรม"
 building_class_4_singularity:0 "ภาวะเอกฐาน คลาส-4"
 building_class_4_singularity_desc:0 "ผลผลิตพลังงานของภาวะเอกฐานนี้ท้าทายกฎแห่งฟิสิกส์ แต่สนามกักกันยังคงทำงานอย่างมั่นคงไม่เปลี่ยนแปลง"
 building_micro_forge: "เครื่องหลอมไฮเปอร์"
 building_micro_forge_desc: "ความเร็วการผลิตของเครื่องหลอมนี้จำกัดเพียงแค่ปริมาณทรัพยากรที่ป้อนเข้าไปเท่านั้น"
 building_nano_forge:0 "เครื่องหลอมอัตโนมัติ"
 building_nano_forge_desc:1 "อู่เครื่องจำลองระดับนาโนที่กว้างขวางในเครื่องหลอมนี้ แปลงวัตถุดิบให้เป็นโลหะผสมขั้นสูงด้วยประสิทธิภาพอันน่าทึ่ง"
 building_fe_sky_dome: "สกายโดม"
 building_fe_sky_dome_desc: "เมืองลอยฟ้านี้ขับเคลื่อนด้วยเทคโนโลยีต่อต้านแรงโน้มถ่วงอันล้ำสมัย มอบแหล่งพักพิงที่สงบสุขให้แก่ผู้อยู่อาศัย"
 building_fe_dome: "เอมไพเรียนโดม"
 building_fe_dome_desc: "โดมเหล่านี้ลอยตัวด้วยการลบล้างสนามแรงโน้มถ่วง ก้าวข้ามขีดจำกัดทางกายภาพ ในขณะที่ระบบพยุงชีพขั้นสูงจะตอบสนองความต้องการของผู้อยู่อาศัยได้อย่างราบรื่น"
 building_fe_fortress: "ป้อมปราการแอสพิส"
 building_fe_fortress_desc: "ป้อมปราการป้องกันดาวเคราะห์ขนาดมหึมานี้มีคลังแสงและชั้นป้องกันเกราะจำนวนมาก มีเพียงกองกำลังล้อมโจมตีที่เชี่ยวชาญเป็นพิเศษเท่านั้นที่จะสามารถทะลวงแนวป้องกันนี้ได้"
 building_fe_stronghold: "เอจิส คอมเพล็กซ์"
 building_fe_stronghold_desc: "ศูนย์ป้องกันดาวเคราะห์ที่ยิ่งใหญ่แห่งนี้ปกป้องด้วยคลังแสงและระบบโล่ป้องกันจำนวนมาก ขุนเขาบนดวงดาวจะทลายลงก่อนที่การป้องกันของมันจะพังทลาย"

 building_master_archive:0 "หอจดหมายเหตุระดับสูง"
 building_master_archive_desc:0 "หอเก็บข้อมูลนี้รวบรวมความรู้จากยุคสมัยดาราจักรหลายยุคสมัย ทว่าความสามารถในการใช้งานระบบกู้ข้อมูลอันลึกลับนั้นได้สูญหายไปแล้ว เศษข้อมูลที่ดึงออกมาได้พิสูจน์แล้วว่ามีค่าอย่างประเมินไม่ได้"
 building_empyrean_shrine:0 "เทวสถานเอมไพเรียนสลับมิติ"
 building_empyrean_shrine_desc:0 "วิหารนี้ใช้สำหรับการติดต่อสื่อสารกับจิตวิญญาณแห่งชราวด์โดยเฉพาะ และจะปรากฏตัวเพียงบางส่วนในมิติของเราเท่านั้น"
 building_ancient_cryo_chamber:0 "ห้องแช่แข็งโบราณ"
 building_ancient_cryo_chamber_desc:2 "แคปซูลแช่แข็งเรียงรายเป็นแถวในโครงสร้างขนาดใหญ่นี้ บรรจุร่างที่หมดอายุขัยไปนานแล้วของสิ่งมีชีวิตต่างดาวหลายพันล้านตัวที่ถูกแช่แข็งไว้เมื่ออดีตกาล"

 building_fe_administration_1: "สำนักงานบริหารแบบรอบรู้"
 building_fe_administration_1_desc: "คอมเพล็กซ์ขนาดใหญ่นี้เชื่อมต่อกับเครือข่ายการบริหารที่กว้างขวาง โดยเป็นส่วนสำคัญของระบบราชการที่ครอบคลุมทั่วดาราจักร"
 building_fe_administration_2: "สำนักงานบริหารสัพพัญญู"
 building_fe_administration_2_desc: "คอมเพล็กซ์อันกว้างขวางที่เป็นแกนกลางของระบบราชการระดับดาราจักรแห่งนี้ ทำหน้าที่ประสานงานเครือข่ายการบริหารที่แข็งแกร่งและก้าวหน้า"
 building_fe_administration_hive_1: "คลัสเตอร์เอแฟปติก"
 building_fe_administration_hive_1_desc: "เครือข่ายโหนดเอแฟปติกนี้ได้รับการดูแลอย่างพิถีพิถันจากโดรนผู้เชี่ยวชาญพิเศษ คอยเสริมความแข็งแกร่งในการควบคุมอาณาเขตการรับรู้อันกว้างขวางของไฮฟ์"
 building_fe_administration_hive_2: "แอกซอนเอแฟปติก"
 building_fe_administration_hive_2_desc: "เครือข่ายโหนดเอแฟปติกขนาดใหญ่นี้ได้รับการดูแลอย่างพิถีพิถันจากโดรนผู้เชี่ยวชาญพิเศษ คอยเสริมความแข็งแกร่งในเจตจำนงของไฮฟ์ที่มีต่อทั่วดาราจักร"
 building_fe_administration_machine_1: "จุดประสานงานแฟร็กทัล"
 building_fe_administration_machine_1_desc: "ศูนย์กลางแฟร็กทัลขั้นสูงที่ประมวลผลและส่งสัญญาณหลายล้านล้านสัญญาณอย่างราบรื่นด้วยความแม่นยำแทบจะในทันที"
 building_fe_administration_machine_2: "จุดประสานงานควอนตัม"
 building_fe_administration_machine_2_desc: "ศูนย์กลางการพัวพันทางควอนตัมขั้นสูงที่ประมวลผลและส่งสัญญาณหลายพันล้านล้านสัญญาณอย่างแม่นยำในทันที"

 building_fe_temple_1: "เทวสถานซีเลสเชียล"
 building_fe_temple_1_desc: "ความก้าวหน้าอันล้ำสมัยในเทคโนโลยีอภิปรัชญาช่วยให้ผู้เลื่อมใสสามารถติดต่อสื่อสารกับจิตวิญญาณแห่งทวยเทพได้โดยตรง"
 building_fe_temple_2: "มหาวิหารซีเลสเชียล"
 building_fe_temple_2_desc: "การใช้เทคโนโลยีอภิปรัชญาสำหรับพิธีการแสดงธรรมทางจิตช่วยขยายเสียงสะท้อนทางจิตวิญญาณ คอมเพล็กซ์ขนาดใหญ่นี้ช่วยให้ผู้นมัสการเชื่อมต่อกับจิตวิญญาณแห่งทวยเทพได้อย่างใกล้ชิดในระยะครอบคลุมทั้งระบบดาว"

 building_fe_assembly_1: "ศูนย์ผลิตหุ่นยนต์"
 building_fe_assembly_1_desc: "คอมเพล็กซ์ประกอบหุ่นยนต์ล้ำสมัยที่ควบคุมโดยนักสร้างหุ่นยนต์ผู้เชี่ยวชาญ สถานที่นี้ก้าวข้ามขอบเขตแบบเดิมๆ โดยรังสรรค์นวัตกรรมหุ่นยนต์ที่ล้ำหน้าอย่างพิถีพิถัน"
 building_fe_assembly_2: "ศูนย์ผลิตหุ่นยนต์ควอนตัม"
 building_fe_assembly_2_desc: "สิ่งมหัศจรรย์ทางวิศวกรรม สายการผลิตหุ่นยนต์ควอนตัมของโรงงานแห่งนี้ใช้เครื่องแปลงการพัวพันเพื่อสร้างชิ้นส่วนเครื่องจักรอย่างละเอียดในระดับที่เล็กที่สุด ไม่มีอะตอมใดวางผิดตำแหน่งเลย"

 building_fe_clinic_1: "สถาบันฟื้นฟูโมเลกุล"
 building_fe_clinic_1_desc: "สถาบันฟื้นฟูโมเลกุลเจาะลึกเข้าไปในความซับซ้อนของเซลล์เพื่อเพิ่มประสิทธิภาพของการรักษาทางการแพทย์ ช่วยปรับปรุงคุณภาพและความยั่งยืนของสุขภาพของประชากรอย่างมีนัยสำคัญ"
 building_fe_clinic_2: "สถาบันฟื้นฟูทางชีวภาพ"
 building_fe_clinic_2_desc: "สถาบันฟื้นฟูทางชีวภาพอยู่ที่จุดสูงสุดของเทคโนโลยีการแพทย์ บุกเบิกการรักษาทางชีวภาพที่ล้ำสมัย คอยกำหนดนิยามใหม่ของขอบเขตในการยืดอายุขัยอย่างต่อเนื่อง"

 building_fe_security_1: "ศูนย์ยุติธรรมครบวงจร"
 building_fe_security_1_desc: "คอมเพล็กซ์ตุลาการขนาดใหญ่นี้เชื่อมโยงกระบวนการศาลและการบังคับใช้กฎหมายเข้าด้วยกันอย่างราบรื่น"
 building_fe_security_2: "ซิกกุรัตแห่งความยุติธรรม"
 building_fe_security_2_desc: "จุดสูงสุดของสถาบันทางกฎหมาย อาคารขนาดมหึมานี้เป็นอนุสรณ์แห่งความยุติธรรม ประกอบด้วยศาล สถานที่ควบคุมตัว และสถานพินิจที่จะช่วยไถ่บาปแม้กระทั่งอาชญากรที่ดื้อรั้นที่สุด"

 building_fe_market_1: "ฮับการค้ากาแล็กติก"
 building_fe_market_1_desc: "ยอดหอคอยสูงระฟ้าที่โดดเด่นสะดุดตา ทอดเงาข้ามเขตการค้าที่คึกคักเบื้องล่าง"
 building_fe_market_2: "ศูนย์รวมการค้าระหว่างดวงดาว"
 building_fe_market_2_desc: "ครองความเป็นใหญ่ในระบบเศรษฐกิจของดาราจักร หอคอยขนาดยักษ์ของเขตการค้าแห่งนี้สามารถมองเห็นได้จากวงโคจร"

 building_fe_silo_1: "คลังพัสดุแบบหดตัว"
 building_fe_silo_1_desc: "คลังสินค้าที่ส่งอิทธิพลต่อบางส่วนของซับสเปซเพื่อลดระยะห่างระหว่างโมเลกุลลง ทำให้สิ่งใดก็ตามที่จัดเก็บไว้ที่นั่นหดตัวลงได้อย่างมีประสิทธิภาพ ห้ามไม่ให้สิ่งมีชีวิตเข้าไปข้างในโดยเด็ดขาด"
 building_fe_silo_2: "คลังพัสดุต่างมิติ"
 building_fe_silo_2_desc: "ด้วยการสร้างมิติกระเป๋าขึ้นในพื้นที่เฉพาะ เราจึงสามารถจัดเก็บทรัพยากรได้อย่างแทบจะไม่มีที่สิ้นสุด"

 building_fe_entertainment_1: "พลาซ่าที่มีความสุขเสมือนจริง"
 building_fe_entertainment_1_desc: "เขตความบันเทิงขนาดใหญ่เหล่านี้อยู่ที่แถวหน้าของกิจกรรมนันทนาการและการพักผ่อน เครื่องอ่านคลื่นสมองช่วยให้สามารถพักผ่อนในโลกเสมือนจริงในแบบเฉพาะบุคคลได้ในทันที"
 building_fe_entertainment_2:"เน็กซัสแห่งความสุขสมบูรณ์"
 building_fe_entertainment_2_desc: "ที่สุดของความบันเทิงขนาดใหญ่ เน็กซัสนี้ก้าวข้ามขีดจำกัดแบบเดิมๆ โดยเนรมิตความฝันให้เป็นจริงก่อนที่ความปรารถนาจะเกิดขึ้นเสียอีก"

 building_fe_lab_1: "ศูนย์นวัตกรรมควอนตัม"
 building_fe_lab_1_desc: "เน็กซัสนี้มีอุปกรณ์ล้ำสมัยและขีดความสามารถในการรองรับบุคลากรอย่างที่ไม่เคยมีมาก่อน นำพาไปสู่ยุคที่ทฤษฎีควอนตัมไม่เพียงแต่ถูกสำรวจเท่านั้น แต่ยังถูกนำไปใช้ประโยชน์ในนวัตกรรมที่ล้ำสมัยอีกด้วย"
 building_fe_lab_2: "ศูนย์นวัตกรรมเหนือธรรมชาติ"
 building_fe_lab_2_desc: "อาคารแห่งนี้เป็นจุดสูงสุดของความก้าวหน้าทางวิทยาศาสตร์และพิสูจน์ให้เห็นว่านี่คือยุคแห่งนวัตกรรมที่ไร้ขอบเขต"

 building_fe_mine_1: "โรงงานขุดเจาะควอนตัม"
 building_fe_mine_1_desc: "โรงงานขุดเจาะนี้สามารถค้นหาแร่ธาตุได้ทุกที่ในชั้นเนื้อโลกของดาวเคราะห์ดวงนี้ โดยใช้เทคโนโลยีการเจาะอุโมงค์ควอนตัมเพื่อขุดผ่านวัตถุของแข็งโดยไม่ต้องสัมผัสทางกายภาพ"
 building_fe_mine_2: "ศูนย์กลางการขุดเจาะควอนตัม"
 building_fe_mine_2_desc: "ศูนย์กลางการขุดเจาะนี้สามารถสกัดแร่ธาตุได้ทุกที่ลึกลงไปถึงแก่นโลกชั้นนอกของดาวเคราะห์ โดยใช้เทคโนโลยีการเจาะอุโมงค์ควอนตัมเพื่อเจาะผ่านของแข็งหรือของเหลวโดยไม่ต้องสัมผัสทางกายภาพ"

