 tech_fe_administration_1: "กระบวนการบริหารจัดการแฟร็กทัล"
 tech_fe_administration_1_desc: "ความต้องการด้านการบริหารจัดการของเราจะขยายตัวขึ้นเช่นกันเมื่อความเชี่ยวชาญด้านเทคโนโลยีขั้นสูงของเราพัฒนาขึ้น เราต้องสนองต่อความต้องการของจักรวรรดิที่กำลังเติบโตอย่างเชี่ยวชาญ"
 tech_fe_administration_2: "กระบวนการบริหารเชิงปริมาณ"
 tech_fe_administration_2_desc: "เทคโนโลยีของเราในตอนนี้เหนือกว่าความต้องการด้านการบริหารจัดการใดๆ ความเชี่ยวชาญที่จำเป็นในการปกครองจักรวรรดิระดับดาราจักรอย่างราบรื่นนั้นอยู่ในมือของเราอย่างมั่นคงแล้ว"
