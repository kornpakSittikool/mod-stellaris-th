#Renowned Leaders
 tech_xeno_linguistics:0 "ภาษาศาสตร์-ต่างดาว"
 tech_xeno_linguistics_desc:0 "เมื่อพิจารณาจากการเผชิญหน้ากับเผ่าพันธุ์ทรงปัญญาเมื่อเร็ว ๆ นี้ การปรับปรุงความสามารถด้านภาษาศาสตร์ต่างดาวของเราจึงเป็นสิ่งจำเป็นอย่างยิ่ง"
 tech_xeno_linguistics_effect:1 "ได้รับ $r_influence$ จำนวนเล็กน้อย\nทำให้ §Hผู้นำที่มีชื่อเสียง§! ปรากฏตัว"
 paragon_2.2105.name:0 "บุคคลพิเศษ"
 paragon_2.2105.desc_01:0 "เราได้พิสูจน์แล้วโดยปราศจากข้อสงสัยใด ๆ ว่ากาแล็กซีนั้นเต็มไปด้วยชีวิตชีวา นอกเหนือจากเผ่าพันธุ์และอาณาจักรหลัก ๆ แล้ว ยังมีอีกหลายคนที่เดินทางข้ามดวงดาว จากเวลาสู่เวลา บุคคลพิเศษอาจเกิดขึ้นเพื่อสั่นคลอนรากฐานของอำนาจในกาแล็กซี\n\nหากเราสามารถใช้ประโยชน์จากความทะเยอทะยานของพวกเขาได้ ผู้นำที่มีชื่อเสียงเหล่านี้อาจยินดีเข้าร่วมกับอุดมการณ์ของเรา"
 paragon_2.2105.desc_02:0 "เราได้พิสูจน์แล้วโดยปราศจากข้อสงสัยใด ๆ ว่ากาแล็กซีนั้นเต็มไปด้วยชีวิตชีวา นอกเหนือจากเผ่าพันธุ์และอาณาจักรหลัก ๆ แล้ว ยังมีอีกหลายคนที่เดินทางข้ามดวงดาว จากเวลาสู่เวลา บุคคลพิเศษอาจเกิดขึ้นเพื่อสั่นคลอนรากฐานของอำนาจในกาแล็กซี\n\nแม้ว่าวิถีต่างดาวของพวกเขาอาจจะแปลกประหลาดหรือน่าขยะแขยง แต่การควบคุมพรสวรรค์ของ §Hผู้นําที่มีชื่อเสียง§! ดังกล่าวอาจเป็นประโยชน์ต่ออุดมการณ์ของเรา"
 paragon_2.2105.a:0 "ส่งสัญญาณเรียกตัว"
 paragon_2.2105.b:0 "พวกเขาอาจพิสูจน์ได้ว่ามีประโยชน์... ในช่วงเวลาหนึ่ง"
 paragon_2.2105.tt:0 "ตอนนี้ §Hผู้นำที่มีชื่อเสียง§! สามารถติดต่อเราได้แล้ว"
 sm_recruitment_office:0 "สำนักงานสรรหาและคัดเลือกระหว่างดวงดาว"
 sm_recruitment_office_desc:0 "นักภาษาศาสตร์ หัวหน้านักล่า นักสํารวจ พวกเขาร่วมมือกันค้นหาดาวที่รู้จักกัน เพื่อค้นหาพรสวรรค์ ที่นี่ผู้นําของชื่อเสียงสามารถถูกเกณฑ์เพื่อทําหน้าที่ของเรา\n\nจำกัดจำนวนต่อจักรวรรดิ: §Y1§!"
 sm_recruitment_office_tooltip:0 "ตัวปรับแต่งจักรวรรดิ\n$t$เงิน บัญชี§G+1§!\n$t$การได้รับประสบการณ์ของผู้นำ: §G+10%§!\n$t$เพิ่มโอกาสที่ §Hผู้รับ§! จะติดต่อเรา"

