 situation_paragon_skrand_sickness_type:0 "ความเจ็บป่วย"
 situation_paragon_skrand_sickness_desc:0 "โรคร้ายแรงที่รู้จักกันในชื่อ โรคขนเน่า ได้ส่งผลกระทบต่อลูกเรือส่วนใหญ่ของสแครนด์ การคาดการณ์ของเราทำนายผลลัพธ์ที่เลวร้ายมาก ในตอนนี้ เราทำได้เพียงจำกัดการแพร่กระจายของโรคโดยการให้การดูแลที่เหมาะสมและจัดการกับอาการป่วย"
