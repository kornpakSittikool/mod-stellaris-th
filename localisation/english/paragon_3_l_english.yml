 paragon.40620.name:0 "โครงการฟื้นฟูสมรรถภาพผู้ต้องขัง"
 paragon.40620.desc:1 "§Y[Root.GetName]§! ได้พัฒนาโครงการฟื้นฟูสมรรถภาพที่ซับซ้อนเพื่อปฏิรูปกลุ่มบุคคลที่เป็นปัญหาในสังคมให้กลายเป็นพลเมืองที่มีความขยันขันแข็ง การประเมินความเสี่ยงคาดการณ์ว่า 17.3% ของประชากรที่เป็นอาชญากรจะไม่สามารถฟื้นฟูได้ และควรได้รับการพิจารณาว่าเป็น 'ความสูญเสียที่ยอมรับได้'"
