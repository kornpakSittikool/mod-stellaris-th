 mod_leader_commanders_sr_zro_upkeep_add: "ภายใต้หน้ากากของเสรีภาพ เหล่าผู้ปลุกปั่นฝ่ายปฏิรูปกำลังพยายามทำลายประเทศชาติ! เมื่อความปะทะที่รุนแรงปะทุขึ้นทั่วดินแดนของเรา คำโกหกของพวกเขาได้โน้มน้าวผู้คนจำนวนมากของเราให้ต่อต้านเรา พวกเขาคิดว่า §Y[Owner.Ruler.GetTitle] [Owner.Ruler.GetRegnalName]§! อ่อนแอ โหดร้าย และไร้ความสามารถ แต่เราจะแสดงให้พวกเขาเห็นเอง!"
