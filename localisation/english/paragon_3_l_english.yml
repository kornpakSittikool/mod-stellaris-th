 situation_paragon_skrand_crisis_desc:0 "เรากำลังเผชิญกับกองกำลังที่ทรงพลังที่พยายามทำลายล้างชีวิตในกาแล็กซีอย่างที่เราคุ้นเคย สแครนด์ได้เสนอความเชี่ยวชาญของเขาและข้อมูลที่เกี่ยวข้องจากบันทึกของยานเทลอน แต่จะใช้เวลาอีกระยะหนึ่งก่อนที่เราจะทำการวิเคราะห์ที่ครอบคลุมได้สำเร็จ"
