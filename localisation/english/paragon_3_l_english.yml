 #UTILITY
 origin_legendary_leader:0 "ภายใต้กฎข้อเดียว"
 origin_legendary_leader_desc:1 "ท่ามกลางความรุนแรงและความยากลำบาก อารยธรรมนี้ได้ถูกรวบรวมให้เป็นหนึ่งเดียวโดยผู้นำเพียงคนเดียว การรวมอำนาจเข้าสู่ศูนย์กลางผ่านการปราบปรามกลุ่มที่อ่อนแอกว่า ตอนนี้พวกเขาได้กลายเป็นผู้สนับสนุนวิทยาศาสตร์และความก้าวหน้าทางเทคโนโลยีอย่างแข็งกร้าว ในเวลาต่อมา ความสงบสุขที่ไม่น่าไว้วางใจได้แผ่ขยายออกไป แต่ความสงบสุขนั้นไม่ค่อยจะคงอยู่ได้ยาวนานนัก"
 origin_tooltip_legendary_leader_effects:2 "- $SPECIES_TRAITS$ ['concept_perfected_genes'] $NEW_LINE$- คุณลักษณะผู้ปกครอง: ['concept_leader_trait_legendary_leader']"
 START_SCREEN_LEGENDARY_LEADER:1 "อารยธรรมของเรามักจะโน้มเอียงไปในทางความขัดแย้งเสมอมา จักรวรรดิและอาณาจักรต่างๆ ถือกำเนิดขึ้นแต่ก็ไม่เคยคงอยู่ได้ยาวนาน มักจะล่มสลายลงภายใต้แรงกดดันจากความขัดแย้งภายในเสมอ\n\nวัฒนธรรมการแบ่งฝักแบ่งฝ่ายนี้ได้มาถึงจุดสูงสุดเมื่อโลกของเราถูกสงครามกลืนกิน ท่ามกลางความโกลาหล ผู้นำคนหนึ่งได้ถือกำเนิดขึ้น [owner.Ruler.GetTitle] [owner.Ruler.GetName] สามารถรวบรวมกลุ่มผู้ติดตามที่ดึงดูดเข้ามาด้วยความไม่เห็นแก่ตัว เสน่ห์ และอำนาจของ [owner.Ruler.GetHisHer] ในที่สุดก็มีคนพร้อมที่จะรวบรวมพวกเราให้เป็นหนึ่งเดียว\n\nการรวมชาติเป็นกระบวนการที่ยาวนานและเจ็บปวด แต่ในที่สุด ฝ่ายที่ทำสงครามกันทีละฝ่ายก็ยอมจำนนและยอมทำตามข้อตกลง โดยถูกสยบด้วยคำสัญญาของ [owner.Ruler.GetTitle] เกี่ยวกับอนาคตในหมู่ดวงดาว เป็นครั้งแรกในรอบหลายศตวรรษที่เรามีความสงบสุข แต่ทว่าภายใต้พื้นผิวที่สงบนั้น บาดแผลของความเจ็บแค้นในอดีตยังคงฝังรากลึกอยู่"
