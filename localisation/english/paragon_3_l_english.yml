 aturion_forced_rehabilitation_programs_desc:1 "การละทิ้งนิสัยอาชญากรของตนต้องอาศัยการทำงาน และมักต้องการแรงผลักดันภายนอก ซึ่งแรงผลักดันดังกล่าวจะได้รับการจัดหาให้อย่างเหมาะสม"
 aturion_criminal_reformation_programs:0 "โครงการฟื้นฟูสมรรถภาพทางอาญา"
 aturion_criminal_reformation_programs_desc:0 "การพึ่งพาการศึกษาและการปรับปรุงพัฒนา แทนที่จะใช้มาตรการเชิงบังคับหรือมาตรการป้องกัน โครงการเหล่านี้มีส่วนช่วยให้ประชาชนมีความสุขมากขึ้น"

 # Jynn / egalitarian1
