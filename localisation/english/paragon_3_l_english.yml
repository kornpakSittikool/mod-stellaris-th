 paragon.40820.desc:1 "§Y[Root.GetName]§! ได้รับเลี้ยงสิ่งมีชีวิตต่างดาวตัวหนึ่งเพื่อมาอยู่เป็นเพื่อนกอร์กี้ ผู้ช่วยหุ่นยนต์ของ [Root.GetHisHer] มันคือหอยทากต่างดาวที่มีสีสันสดใส ซึ่งแม้จะยังไม่มีปัญญาพัฒนาสมบูรณ์ แต่กลับแสดงออกถึงสติปัญญาที่น่าทึ่งและตอบสนองต่อคำสั่งเสียงผิวปาก การแบกรับความรับผิดชอบในการดูแลสิ่งมีชีวิตตัวนี้ดูเหมือนจะทำให้บุคลิกของ [Root.GetHisHer] เปลี่ยนไป ทำให้ [Root.GetHimHer] มีความรับผิดชอบและสุขุมรอบคอบมากขึ้นอย่างเห็นได้ชัด"
