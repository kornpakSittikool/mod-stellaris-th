 commanding_presence:0 "อยู่ในที่ที่สามารถบังคับบัญชาได้"
 commanding_presence_desc:0 "ด้วยพลังแห่งเจตจำนงอันแรงกล้าของผู้นำของเรา เราสามารถขยายกำหนดการเดินทางของจักรวรรดิออกไปสู่อวกาศ และบังคับให้ผู้อื่นต้องยอมปฏิบัติตามคำสั่งของเราได้"
 paragon_origin_strengthened_government_i:0 "รัฐบาลที่เข้มแข็งขึ้นฉัน"
 paragon_origin_strengthened_government_i_desc:0 "จักรวรรดิของเราได้มุ่งเน้นไปที่การสร้างรัฐบาลที่มีการจัดการที่ดีขึ้นและมีความมั่นคงยิ่งขึ้น"
 paragon_origin_strengthened_government_ii:0 "$paragon_origin_strengthened_government_i$ฉัน"
 paragon_origin_strengthened_government_ii_desc:0 "$paragon_origin_strengthened_government_i_desc$ หลักสูตรพิเศษและการตรวจสอบประวัติล่วงหน้าสำหรับตำแหน่งในรัฐบาลถือเป็นเงื่อนไขสำคัญในการบรรลุเป้าหมายนี้"
 paragon_origin_strengthened_government_ii_tt:1 "แต่ละ [civilian.GetIcon] §Y[civilian.GetName]§! จะได้รับ $POLITICAL_POWER$ เพิ่มขึ้น §Y25%§!\n£unity£ $unity$ จาก [civilian.GetIcon] [civilian.GetNamePlural]: §G+0.5§!"
 paragon_origin_strengthened_government_iii:0 "$paragon_origin_strengthened_government_i$2"
 paragon_origin_strengthened_government_iii_desc:0 "$paragon_origin_strengthened_government_ii_desc$ เพื่อสร้างความเข้มแข็งเพิ่มเติมให้กับเจ้าหน้าที่ธุรการของเรา เราได้บังคับใช้กฎระเบียบใหม่ มีเพียงพลเมืองที่มีความซื่อสัตย์สุจริตและจงรักภักดีที่สุดเท่านั้นที่จะสามารถสมัครเข้าทำงานในตำแหน่งนี้ได้"
 paragon_origin_strengthened_government_iii_tt:1 "แต่ละ [civilian.GetIcon] §Y[civilian.GetName]§! จะได้รับ $POLITICAL_POWER$ เพิ่มขึ้น §Y50%§!\n£unity£ $unity$ จาก [civilian.GetIcon] [civilian.GetNamePlural]: §G+1§!\n£mod_country_edict_fund_add£ $MOD_COUNTRY_EDICT_FUND_ADD$ จาก [civilian.GetIcon] [civilian.GetNamePlural]: §G+1§!"
 paragon_origin_humble_monument:0 "อนุสาวรีย์อันสมถะ"
 paragon_origin_humble_monument_desc:0 "อนุสาวรีย์อันสมถะแห่งนี้เป็นเครื่องแสดงความเคารพต่อผู้นำอันรุ่งโรจน์ของเรา ผู้ซึ่งนำพาประเทศชาติของเราก้าวขึ้นสู่หมู่ดวงดาว"
 paragon_origin_rich_monument:0 "อนุสาวรีย์อันมั่งคั่ง"
 paragon_origin_rich_monument_desc:0 "อนุสาวรีย์อันมั่งคั่งนี้สร้างขึ้นเพื่อรำลึกถึงผู้ตั้งถิ่นฐานกลุ่มแรกที่ได้ร่วมมือกับผู้นำอันรุ่งโรจน์ของเราในการปราบดินแดนที่รกร้างและอุดมสมบูรณ์เหล่านี้"
 paragon_origin_residential_monument:0 "อนุสาวรีย์ที่อยู่อาศัย"
 paragon_origin_residential_monument_desc:0 "อนุสาวรีย์ที่อยู่อาศัยแห่งนี้แสดงให้เห็นถึงปรีชาญาณของผู้ปกครองอันเป็นที่รักของเรา มันเป็นทั้งงานศิลปะและสถานที่อยู่อาศัยที่แสนสะดวกสบาย"
 paragon_origin_pirates:0 "การปล้นสะดมของโจรสลัด"
 paragon_origin_pirates_desc:0 "กลุ่มโจรสลัดต่างๆ ได้รวมตัวกันเพื่อดำเนินปฏิบัติการลักลอบนำเข้าสินค้าบริเวณชายแดนของเรา สถานการณ์นี้สร้างความเสียหายและอันตรายอย่างยิ่งต่อเส้นทางเดินอวกาศของเรา"
 paragon_origin_prisoners:0 "นักโทษที่ได้รับการปล่อยตัว"
 paragon_origin_prisoners_desc:0 "กลุ่มปฏิรูปได้เรียกร้องให้มีการอภัยโทษนักโทษทั่วจักรวรรดิ แม้ว่าผู้ถูกคุมขังส่วนใหญ่จะเป็นผู้เห็นต่างทางการเมือง แต่ก็ไม่ต้องสงสัยเลยว่ามีบุคคลที่เป็นอันตรายบางส่วนได้รับการปล่อยตัวออกมาด้วยเช่นกัน"
 paragon_origin_comms_down:0 "อาร์เรย์การสื่อสารที่ชำรุด"
 paragon_origin_comms_down_desc:0 "แผงสายอากาศสื่อสารมาตรฐานของเราเกิดการชำรุด ทำให้ไม่สามารถเชื่อมต่อสื่อสารอย่างเหมาะสมกับอาณานิคมที่ห่างไกลบริเวณขอบชายแดนของเราได้อีกต่อไป\n\nดำเนินโครงการพิเศษให้เสร็จสิ้นเพื่อยกเลิกสถานะ $paragon_origin_comms_down$"
 paragon_origin_worker_strike:0 "การประท้วงหยุดงานของคนงาน"
 paragon_origin_worker_strike_desc:1 "คนงานต้องรับภาระหนักเกินไป ไม่มีความสุข และไม่สามารถทำงานได้ตามโควตาที่กำหนดไว้สูงเกินไป ความพยายามอย่างมหาศาลที่เรียกร้องจากพลเมืองของเรากำลังส่งผลกระทบอย่างเห็นได้ชัด\n\nดำเนินโครงการพิเศษให้เสร็จสิ้นเพื่อยกเลิกสถานะ $paragon_origin_worker_strike$"
 paragon_origin_military_dissidents:0 "ทหารผู้เห็นต่าง"
 paragon_origin_military_dissidents_desc:0 "ข่าวลือระบุว่ากลุ่มนายทหารระดับล่างเกิดความไม่พอใจกับแนวทางปัจจุบันของจักรวรรดิของเรา กลุ่มนี้กำลังพยายามรับสมัครพลเมืองเพิ่มขึ้นเพื่อเข้าร่วมอุดมการณ์ของพวกเขา\n\nดำเนินโครงการพิเศษให้เสร็จสิ้นเพื่อยกเลิกสถานะ $paragon_origin_military_dissidents$"

 paragon_origin_nepotism:0 "การเล่นพรรคเล่นพวกอย่างแพร่หลาย"
 paragon_origin_nepotism_desc:1 "จักรวรรดิของเรากำลังประสบปัญหากับการเล่นพรรคเล่นพวกอย่างแพร่หลาย ซึ่งขัดขวางการดำเนินงานของเรา ตำแหน่งต่างๆ ถูกเติมเต็มโดยเพื่อนฝูง สมาชิกในครอบครัว และผู้มีเส้นสาย ไม่ใช่โดยผู้ที่มีความรู้ความสามารถ\n\nดำเนินโครงการพิเศษให้เสร็จสิ้นเพื่อยกเลิกสถานะ $paragon_origin_nepotism$"
 paragon_origin_forgotten_deal:0 "เสรีภาพตามรัฐธรรมนูญ"
 paragon_origin_forgotten_deal_desc:0 "เราได้ทำข้อตกลงเพื่อลดความตึงเครียดกับศัตรูของเรา มีการยินยอมผ่อนปรนและมอบเสรีภาพบางประการให้แก่พวกเขา แต่เราต้องตรวจสอบให้แน่ใจว่าพวกเขาจะไม่ใช้ข้อตกลงนี้ไปในทางที่ผิด"
 paragon_origin_reformists_deal:0 "เสรีภาพตามรัฐธรรมนูญ"
 paragon_origin_reformists_deal_desc:0 "เราได้ทำข้อตกลงเพื่อลดความตึงเครียดกับศัตรูของเรา มีการยินยอมผ่อนปรนให้แก่พวกเขา รวมถึงมอบเสรีภาพในการดำเนินงานตามวาระส่วนใหญ่ของพวกเขา พวกเขาจะได้รับการคุ้มครองเป็นพิเศษและมีอิทธิพลต่อหน่วยงานนิติบัญญัติบางส่วนของเรา ในด้านบวก พลเมืองของเราจะได้รับประโยชน์บางส่วนและมีความสุขกับเสรีภาพที่เพิ่งค้นพบใหม่นี้"
 paragon_origin_reformists:0 "แนวโน้มประชาธิปไตย"
 paragon_origin_reformists_desc:0 "รายงานระบุว่าฝักฝ่ายประชาธิปไตยกำลังมีผู้สนับสนุนเพิ่มขึ้นอย่างรวดเร็ว กองกำลังความมั่นคงของเรากำลังเฝ้าสังเกตการณ์การเติบโตและพฤติกรรมของพวกเขาอยู่"
 paragon_origin_reformists_empire:0 "ฝักฝ่ายประชาธิปไตย"
 paragon_origin_reformists_empire_desc:0 "$paragon_origin_reformists_desc$"
 paragon_origin_broken_promise:0 "การประท้วงหยุดงานครั้งใหญ่!"
 paragon_origin_broken_promise_desc:0 "เนื่องจากเราผิดสัญญา พลเมืองทั่วไปจึงพากันประท้วงในดาวเคราะห์เกือบทุกดวงทั่วทั้งจักรวรรดิ"
 paragon_origin_saddening_grief:0 "ความสูญเสียครั้งยิ่งใหญ่"
 paragon_origin_saddening_grief_desc:0 "เดอะ ลูมินารี เสียชีวิตแล้ว! ข่าวนี้สร้างความสั่นสะเทือนให้แก่ประชาชน การขาดผู้นำอย่างกะทันหันทำให้สังคมระส่ำระสาย มีการเสนอปฏิรูปหลายด้าน และเหล่านักการเมืองต่างแย่งชิงอำนาจกัน"
 paragon_origin_rebel_player:0 "จิตวิญญาณแห่งการปฏิวัติ"
 paragon_origin_rebel_player_desc:0 "พวกเราคือผู้คนที่มีความตื่นตัวใหม่ในเรื่องความเท่าเทียมและความสามัคคี แข็งแกร่งยิ่งกว่าครั้งไหนๆ และเมื่อหลุดพ้นจากผู้ปกครองจอมกดขี่แล้ว เราจะปกครองด้วยตนเอง ไม่ว่าจะดีหรือร้ายก็ตาม"
 paragon_origin_rebel_militarist:0 "นักสู้เพื่อเสรีภาพ"
 paragon_origin_rebel_militarist_desc:0 "เรามองไปยังหมู่ดาวและห้วงอวกาศอันไกลโพ้นเพื่อยกระดับและปลดปล่อยผู้อื่น กองทัพเรือที่ปรับปรุงใหม่ของเราพร้อมที่จะนำความเท่าเทียมไปสู่มุมที่ไกลที่สุดของกาแล็กซี"
 paragon_origin_rebel_pacifist:0 "สังคมที่สมานฉันท์"
 paragon_origin_rebel_pacifist_desc:0 "การค้นหาความสงบภายในใจคือเป้าหมายของชุมชนเราเสมอมา และในที่สุดเราก็ทำได้สำเร็จ แม้ว่าเราจะต้องจ่ายราคาอย่างแพงเพื่อมัน แต่ตอนนี้ถึงเวลาเก็บเกี่ยวรางวัลแล้ว"
 paragon_origin_rebel_xenophobe:0 "สังคมปิด"
 paragon_origin_rebel_xenophobe_desc:0 "ความโกลาหลที่เกิดขึ้นเมื่อเร็วๆ นี้แสดงให้เห็นว่าการเปิดรับอำนาจภายนอกสามารถนำมาซึ่งความขัดแย้งและความทุกข์ยาก เราจำเป็นต้องปกป้องตนเองจากภัยคุกคามดังกล่าวในอนาคต"
 paragon_origin_rebel_xenophile:0 "สังคมเปิด"
 paragon_origin_rebel_xenophile_desc:0 "ความโกลาหลที่เกิดขึ้นเมื่อเร็วๆ นี้แสดงให้เห็นว่าการปิดกั้นจากพลังภายนอกสามารถนำไปสู่ความขัดแย้งและความทุกข์ยาก เราจำเป็นต้องเปิดใจรับเพื่อไม่ให้พลาดโอกาสที่คล้ายกันในอนาคต"
 paragon_origin_rebel_materialist:0 "มุ่งเน้นความก้าวหน้า"
 paragon_origin_rebel_materialist_desc:0 "สังคมใหม่ที่หล่อหลอมในกองเพลิงของสงครามกลางเมืองกาแล็กซี ตระหนักดีถึงคุณค่าของการทำงานของพวกเขา เราจะร่วมมือกันเพื่อบรรลุเป้าหมายทั้งหมดของเรา"
 paragon_origin_rebel_spiritualist:0 "แนวทางบำเพ็ญตบะ"
 paragon_origin_rebel_spiritualist_desc:0 "เราได้เรียนรู้บทเรียนด้วยวิธีที่ยากลำบาก สงครามกลางเมืองสอนให้เรารู้จักการยับยั้งชั่งใจและความสำคัญของความสงบภายใน ความเสื่อมโทรมและการทุจริตคอร์รัปชันจะต้องถูกต่อต้านในทุกๆ ก้าว"
 paragon_origin_fresh_start:0 "จักรวรรดิรวมเป็นหนึ่ง"
 paragon_origin_fresh_start_desc:0 "เป็นครั้งแรกนับตั้งแต่การรวมชาติ พลเมืองของเรายืนหยัดร่วมกันอย่างแท้จริง ด้วยการปฏิรูปเมื่อเร็วๆ นี้ จักรวรรดิของเราจึงแข็งแกร่งกว่าที่เคย"
 paragon_origin_one_system_war:1 "สงครามกลางเมือง"
 paragon_origin_one_system_war_desc:1 "หลังจากเผชิญความขัดแย้งภายในมายาวนาน ในที่สุดประชาชนก็รวมกันเป็นหนึ่ง ทว่าตอนนี้ เมื่อเราหันมองไปยังดวงดาว แหล่งความขัดแย้งใหม่ก็ปรากฏขึ้น เราถูกสงครามรุมเร้าอีกครั้ง และการต่อสู้เพื่อความเป็นใหญ่อยู่ตรงหน้าเราแล้ว"
 paragon_origin_united_through_war:1 "หล่อหลอมในกองเพลิง"
 paragon_origin_united_through_war_desc:1 "มันไม่เพียงพอที่จะรวมผู้คนเข้าด้วยกันในเป้าหมายร่วมกันในการตั้งถิ่นฐานในอวกาศ แม้ว่าประเทศชาติจะถูกรุมเร้าด้วยสงครามกลางเมือง แต่ผู้ภักดีก็ยังคงแน่วแน่ในการสนับสนุนราชบัลลังก์ ยืนหยัดอย่างแข็งแกร่งเมื่อเผชิญหน้ากับคนทรยศที่คุกคามวิถีชีวิตของพวกเขาและผู้ปกครองอันเป็นที่รักของเรา"
 council_in_tatter:1 "สภาที่ภาระล้นมือ"
 council_in_tatter_desc:0 "เนื่องจากความตึงเครียดด้านระบบราชการอย่างมหาศาลในช่วงไม่กี่ปีที่ผ่านมาเพื่อรองรับการเติบโตอย่างเหลือเชื่อ สภาจึงประสบปัญหาในการปรับตัวให้เข้ากับความรับผิดชอบที่เพิ่มขึ้น"
 d_arcane_device:0 "อุปกรณ์ลี้ลับ"
 d_arcane_device_desc:1 "เครื่องจักรโบราณนี้ซ่อนอยู่ลึกเข้าไปในห้องนิรภัยของรัฐบาลบนดาวเคราะห์ของเรา มันเป็นโบราณวัตถุแห่งความเฉลียวฉลาดของผู้ปกครองอันเป็นที่รัก เทคโนโลยีการจำลองสสารของมันยังคงไม่สามารถเข้าใจได้สำหรับเรา"
 sustaining_apparatus:0 "เครื่องช่วยพยุงชีพ"
 sustaining_apparatus_desc:0 "สิ่งประดิษฐ์ที่ไม่ธรรมดานี้ซ่อนอยู่ลึกเข้าไปในอาคารรัฐบาล มันเป็นโบราณวัตถุแห่งความเฉลียวฉลาดของผู้ปกครองอันเป็นที่รัก การทำงานภายในของมันดูราวกับเวทมนตร์สำหรับเรา มันช่วยให้เราประคองชีวิตของผู้ปกครองได้ แคปซูลนี้ถูกปรับแต่งให้เข้ากับลำดับดีเอ็นเอเฉพาะบุคคลเพียงคนเดียวเท่านั้น การสูญเสียหรือย้ายเมืองหลวงจะหมายถึงความตายอย่างแน่นอนสำหรับผู้ที่อยู่ในตู้พยุงชีพนี้"
 NAME_PARAGON_ORIGIN_CRUISER_FLEET:0 "National Spirit"
 NAME_MavenCruiser:0 "Pride of the Navy"
 maven_cruiser_01:0 "เรือลาดตระเวนทดลอง"
 maven_cruiser_01_plural:0 "เรือลาดตระเวนทดลอง"
 NAME_PARAGON_ORIGIN_CRUISER:0 "Anvil"

 #Starting Traits
 leader_trait_legendary_leader:0 "ผู้นำในตำนาน"
 leader_trait_legendary_leader_desc:2 "§Gเดอะ ลูมินารี จะมีพลังเพิ่มขึ้นเมื่อเวลาผ่านไป§!\n\nสงครามรวมชาติเป็นเรื่องที่โหดร้าย ในท้ายที่สุด [Root.GetName] ก็นำสันติภาพและเป้าหมายมาสู่พวกเราทุกคน ลูมินารีคือสัญลักษณ์ที่มีชีวิตของสิ่งที่เราเผ่าพันธุ์สามารถบรรลุได้ และเป็นแรงบันดาลใจให้แก่ทุกคน[This.Paragon_Origin_Ascension_Desc]"
 leader_trait_legendary_offspring:0 "สายเลือด $leader_trait_legendary_leader$"
 leader_trait_legendary_offspring_desc:1 "ทายาทของผู้เป็น $leader_trait_legendary_leader$ การสานต่อมรดกของผู้ดำรงตำแหน่งก่อนหน้านี้จะเป็นเรื่องท้าทาย แต่ผู้นำคนนี้ได้แสดงให้เห็นถึงแววอันยอดเยี่ยมแล้ว"
 trait_perfected_genes:0 "ยีนที่สมบูรณ์แบบ"
 trait_perfected_genes_desc:1 "§Lการทดลองทางพันธุกรรมและสงครามนับพันปีได้นำไปสู่การสร้างเผ่าพันธุ์ที่มีความยืดหยุ่นสูง§!"
 leader_trait_legendary_story:0 "ผลงานทางประวัติศาสตร์"
 leader_trait_legendary_story_desc:0 "ผู้นำคนนี้จะถูกจารึกไว้ในประวัติศาสตร์ในฐานะบุคคลผู้มีชื่อเสียงโด่งดังยิ่ง"

 paragon_origin_psionic_ascension:1 "\n\n§PPower Overflowing:§!\nAfter a psionic ritual, this leader became a conduit to the เดอะชราวด์. The psionic energy of our entire people is channeled into [Root.GetHimHer], making this leader a quasi-divine being. However, such power comes at a cost, and we must sacrifice other psionic individuals to maintain the conduit.\nDecennial Upkeep: §R[owner.paragon_origin_ascension]§! £pop£ $POPS$"
 paragon_origin_cybernetic_ascension:0 "\n\n§Pหัวใจหลัก:§!\nโครงสร้างจากแกนดาวเคราะห์ การฝังแบบไซเบอร์เนติกนี้ ที่ไม่ซ้ํากันนี้ ต้องการปริมาณที่คงที่£sr_dark_matter£ $sr_dark_matter$เพื่อรักษาประสิทธิภาพของมัน"
 paragon_origin_synthetic_ascension:0 "\n\n§Pยั่งยืน:§!\nโดยการสร้างสมองที่พิเศษและบรรจุมันภายในร่างกายโลหะที่มีชีวิต เราได้นํา$leader_trait_legendary_leader$กลับมามีชีวิตอีกครั้ง เพื่อคงทน[Root.GetHimHer]เราต้องการปริมาณคงที่£sr_living_metal£ $sr_living_metal$."
 paragon_origin_genetic_ascension:0 "\n\n§Pยีนที่เรียกคืนแล้ว:§!\nหลังจากที่พยายามหลายครั้งในการบิดดีเอ็นเอของ$leader_trait_legendary_leader$เป็น บุคคล ที่ มี ความ สามารถ คน อื่น ๆ มี คนไข้ คน เดียว ที่ รอด ชีวิต จาก ปฏิบัติการ และ พัฒนา ลักษณะ นิสัย ที่ เป็น ประโยชน์. อย่าง ไร ก็ ตาม ต้อง ฉีด สาร พันธุกรรม ชนิด ใหม่ ๆ เป็น ประจํา เพื่อ รักษา ความ มั่นคง ทาง พันธุกรรม.\nการเลื่อนบิต:§R[owner.paragon_origin_ascension]§! £pop£ $POPS$"
 paragon_origin_null_loc:0 " "

 #Ethic Traits
 leader_trait_legendary_origin_desc:1 "§Gคุณลักษณะผู้ปกครองลูมินารี§!"
 leader_trait_legendary_military_knowledge:0 "ผู้บัญชาการผู้สร้างแรงบันดาลใจ"
 leader_trait_legendary_military_knowledge_desc:0 "ผู้บัญชาการทหารที่ยอดเยี่ยม เป็นที่รักของเหล่าทหาร"
 leader_trait_legendary_foe_hammer:1 "ผู้รุกรานที่ไม่สั่นคลอน"
 leader_trait_legendary_foe_hammer_desc:1 "ผู้เชี่ยวชาญด้านระบบอาวุธยานอวกาศ ผู้นำคนนี้นำความรู้อันประเมินค่ามิได้มาสู่การทำสงครามกองยาน"
 leader_trait_legendary_great_teacher:0 "พี่เลี้ยงผู้ชาญฉลาด"
 leader_trait_legendary_great_teacher_desc:1 "ผู้นำคนนี้แสดงทักษะการศึกษาที่โดดเด่น และจะช่วยให้คนอื่นๆ เข้าถึงศักยภาพสูงสุดของตนเอง"
 leader_trait_legendary_pious_ascet:0 "ผู้บำเพ็ญตบะผู้ศรัทธา"
 leader_trait_legendary_pious_ascet_desc:0 "ผู้นำคนนี้เป็นแบบอย่างของการมีวินัยในตนเอง และเป็นแรงบันดาลใจให้แก่ทุกคน"
 leader_trait_legendary_commanding_presence:0 "อยู่ในที่ที่สามารถบังคับบัญชาได้"
 leader_trait_legendary_commanding_presence_desc:1 "อำนาจบารมีนั้นเกิดขึ้นตามธรรมชาติสำหรับผู้นำคนนี้ และน้อยคนนักที่จะกล้าคัดค้านการตัดสินใจของเขา"
 leader_trait_legendary_high_king:0 "ราชาเหนือราชา"
 leader_trait_legendary_high_king_desc:1 "ด้วยคุณความดีเพียงอย่างเดียว ผู้นำคนนี้ได้รับความเคารพและความจงรักภักดีจากตระกูลขุนนางอื่นๆ"
 leader_trait_legendary_gunboat_diplomacy:0 "นักการทูตเรือปืน"
 leader_trait_legendary_gunboat_diplomacy_desc:0 "ผู้นำคนนี้ชอบการแสดงแสนยานุภาพ การข่มขู่ที่ถูกจังหวะบางครั้งมีค่ามากกว่าคำพูดนับพันคำ"
 leader_trait_legendary_scientific_diplomacy:0 "ผู้ดึงดูดมันสมอง"
 leader_trait_legendary_scientific_diplomacy_desc:1 "ด้วยการเสนอสิ่งที่ดีที่สุด เราสามารถดึงดูดผู้มีสติปัญญาเฉียบแหลมที่สุดได้ ผู้นำคนนี้เชี่ยวชาญด้านการจัดหาบุคลากรที่มีคุณสมบัติเหมาะสม"
 leader_trait_legendary_scientific_diplomacy_tt:1 "§Yข้อตกลงการย้ายถิ่นฐาน§! ผลิตคะแนนการวิจัย £physics£ £society£ £engineering£ จำนวน §G$@scientific_diplomacy_1_amt$§!\n$t$- $leader_trait_legendary_origin_desc$"
 leader_trait_legendary_scientific_diplomacy_2_tt:0 "§Yข้อตกลงการย้ายถิ่นฐาน§! ผลิตคะแนนการวิจัย £physics£ £society£ £engineering£ จำนวน §G$@scientific_diplomacy_2_amt$§!\n$t$- $leader_trait_legendary_origin_desc$"
 leader_trait_legendary_scientific_diplomacy_3_tt:0 "§Yข้อตกลงการย้ายถิ่นฐาน§! ผลิตคะแนนการวิจัย £physics£ £society£ £engineering£ จำนวน §G$@scientific_diplomacy_3_amt$§!\n$t$- $leader_trait_legendary_origin_desc$"
 leader_trait_legendary_autarky:0 "ผู้นำพึ่งพาตนเอง"
 leader_trait_legendary_autarky_desc:1 "ผู้นำคนนี้จะพยายามทุกวิถีทางเพื่อให้แน่ใจว่าประเทศชาติจะสามารถพึ่งพาตนเองได้"
 leader_trait_legendary_natural_ruler:0 "ผู้ปกครองผู้มีปัญญาชน"
 leader_trait_legendary_natural_ruler_desc:1 "มีเสน่ห์ดึงดูด ใส่ใจ และไม่เห็นแก่ตัว ผู้นำคนนี้มุ่งหวังที่จะปรับปรุงคุณภาพชีวิตของทุกคน"
 leader_trait_legendary_industry_titan:0 "ยักษ์ใหญ่แห่งอุตสาหกรรม"
 leader_trait_legendary_industry_titan_desc:0 "ผู้นำคนนี้มองว่าเศรษฐกิจที่แข็งแกร่งคือรากฐานของชาติที่ยิ่งใหญ่ใดๆ"
 leader_trait_legendary_great_inventor:0 "นักประดิษฐ์ผู้ยิ่งใหญ่"
 leader_trait_legendary_great_inventor_desc:0 "ผู้นำคนนี้เป็นผู้บุกเบิกด้านวิทยาการหุ่นยนต์และเป็นนักวิจัยชั้นนำของเราในด้านระบบอัตโนมัติของพนักงาน"
 leader_trait_legendary_great_inventor_tt:1 "£amenities£ สิ่งอำนวยความสะดวกจาก £job_roboticist£ $job_roboticist_plural$: §G+1§!\n$t$- $leader_trait_legendary_origin_desc$"
 leader_trait_legendary_great_inventor_2_tt:0 "£amenities£ สิ่งอำนวยความสะดวกจาก £job_roboticist£ $job_roboticist_plural$: §G+2§!\n$t$- $leader_trait_legendary_origin_desc$"
 leader_trait_legendary_great_inventor_3_tt:0 "£amenities£ สิ่งอำนวยความสะดวกจาก £job_roboticist£ $job_roboticist_plural$: §G+3§!\n$t$- $leader_trait_legendary_origin_desc$"
 leader_trait_legendary_genetic_purist:0 "ศิลปินจีโนม"
 leader_trait_legendary_genetic_purist_desc:1 "ความสามารถของผู้นำคนนี้ในการดัดแปลงพันธุกรรมนั้นเป็นตำนาน"
 leader_trait_legendary_evervigilant:0 "ตื่นตัวอยู่เสมอ"
 leader_trait_legendary_evervigilant_desc:0 "ผู้นำคนนี้มีความเข้มงวดอย่างยิ่งต่อโปรโตคอลความปลอดภัยและการเข้ารหัส และควบคุมดูแลฝ่ายข่าวกรองของเราด้วยตนเอง"

 #Legendary Traits - bad
 leader_trait_legendary_unfriendly:0 "ขวานผ่าซาก"
 leader_trait_legendary_unfriendly_desc:0 "เย็นชาและตรงไปตรงมามาก ผู้นำคนนี้มักจะทำข้อผิดพลาดทางการทูตอยู่เป็นประจำ"
 leader_trait_legendary_warmonger:0 "ผู้กระหายสงคราม"
 leader_trait_legendary_warmonger_desc:0 "ยั่วยุและเป็นปฏิปักษ์ ผู้นำคนนี้สนุกสนานกับความขัดแย้ง ไม่ว่าจะเป็นทางสังคมหรือการทหาร"
 leader_trait_legendary_dreamlike:0 "ใจลอย"
 leader_trait_legendary_dreamlike_desc:1 "ผู้นำคนนี้ไขว้เขวได้ง่ายและมักจะลืมภารกิจที่ไม่สำคัญ"
 leader_trait_legendary_harsh_ruler:0 "โหดร้าย"
 leader_trait_legendary_harsh_ruler_desc:0 "คำตอบสำหรับปัญหาใดๆ ของผู้นำคนนี้คือการกดขี่อย่างโหดเหี้ยม ซึ่งสร้างความแตกแยกกับประชากรในท้องถิ่น"
 leader_trait_legendary_harsh_ruler_tt:1 "£job_enforcer£ §Y$job_enforcer_plural$§! และ £job_telepath£ §Y$job_telepath_plural$§! ลด £happiness£ ความสุขลง §Y$HAPPINESS$§! อีก §R2.5%§!"
 leader_trait_legendary_too_open:0 "ไร้เดียงสา"
 leader_trait_legendary_too_open_desc:1 "ผู้นำคนนี้เชื่อคนง่ายและให้อภัยมากเกินไป ผู้อื่นจึงฉวยโอกาสจากคุณสมบัติเหล่านี้ได้ง่าย"
 leader_trait_legendary_hoplofobia:0 "ขี้กลัว"
 leader_trait_legendary_hoplofobia_desc:1 "หวาดกลัวความเสี่ยง ผู้นำคนนี้จึงระมัดระวังตัวมากเกินไป และนำขั้นตอนการตรวจสอบและระบบซ้ำซ้อนมาใช้อย่างมากเกินจำเป็นในกระบวนการทำงาน"
 leader_trait_legendary_bad_meritocracy:0 "พวกคลั่งชนชั้นสูง"
 leader_trait_legendary_bad_meritocracy_desc:1 "ผู้นำคนนี้รังเกียจความดาดๆ ทั่วไป มักจะไล่คนที่มีความสามารถออกแม้เพียงเพราะความผิดพลาดเล็กน้อย"
 leader_trait_legendary_delusional:0 "ทรราชระแวงเกินเหตุ"
 leader_trait_legendary_delusional_desc:1 "ความหลงผิดจากความหวาดระแวงของผู้นำคนนี้กำลังผลักดัน [Root.GetHimHer] ไปสู่การโดดเดี่ยวตนเอง"
 leader_trait_legendary_delusional_effect:1 "เมื่อความหวาดระแวงของผู้นำคนนี้เพิ่มขึ้น การควบคุมผลผลิตของ §Yแรงงาน§! และ §Yผู้เชี่ยวชาญ§! ของเราจะแย่ลง และจะลดการผลิต §Yความสามัคคี§! ของเราลงด้วย"

#REUSED LOCS
 paragon.leader.growth.positive:0 "คุณลักษณะ §Yลูมินารี§! ของ §Y[owner.Ruler.GetTitle] [owner.Ruler.GetRegnalName]§! §Gพัฒนาขึ้น§!."
 paragon.leader.growth.negative:0 "คุณลักษณะ §Yลูมินารี§! ของ §Y[owner.Ruler.GetTitle] [owner.Ruler.GetRegnalName]§! §Rแย่ลง§!."
 paragon.leader.delusion.positive:1 "คุณลักษณะ §Y$leader_trait_legendary_delusional$§! ของ §Y[owner.Ruler.GetTitle] [owner.Ruler.GetRegnalName]§! §Gดีขึ้น§!."
 paragon.leader.delusion.negative:1 "คุณลักษณะ §Y$leader_trait_legendary_delusional$§! ของ §Y[owner.Ruler.GetTitle] [owner.Ruler.GetRegnalName]§! §Rแย่ลง§!."
 paragon.ending.speech:2 "§Hการถ่ายทอดสัญญาณสิ้นสุดลงและการนำเสนอข่าวตามปกติเริ่มต้นขึ้นอีกครั้ง§!"
 paragon.beginning.speech:2 "§H§Y[Root.Owner.Ruler.GetTitle] [Root.Owner.Ruler.GetRegnalName]§! ได้ปรากฏตัวบนทุกหน้าจอทั่วทั้งจักรวรรดิ ประชาชนของเรากำลังรอการแถลงการณ์เริ่มต้นขึ้น§!"
 paragon.origin.insight:0 "พวกเราเข้าใกล้เป้าหมายมากขึ้นแล้ว!"
 paragon_origin_upgrades_overload:0 "เราสามารถเลือกการอัปเกรดได้เพียง §G[ROOT.paragon_origin_ascension]ปรับรุ่น§! เท่านั้น มิฉะนั้นจะไม่มีโอกาสเลยที่ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! จะรอดชีวิตจากปฏิบัติการนี้"
 paragon.origin.grand.academy:0 "ปลดล็อกอาคาร §Gสถาบันการศึกษาระดับสูง§! £building£ มอบโบนัสให้กับผู้นำและจักรวรรดิของเรา"

#EMPIRE PROMISE
 paragon.5004.name:0 "สัญญา"
 paragon.5004.desc:1 "§Y[Owner.Ruler.GetTitle] [Owner.Ruler.GetRegnalName]§! ได้ยุติความขัดแย้งภายในของเราและนำไปสู่การรวมชาติ [Owner.Ruler.GetHeSheCap] ก้าวสู่อำนาจด้วยนโยบายความสามัคคีรักชาติและลัทธิจักรวรรดินิยม โดยให้สัญญาว่าจะนำทางเราไปสู่ดวงดาวและสร้างจักรวรรดิกาแล็กซีอันยิ่งใหญ่\n\nวันนี้ ผู้คนของเราเริ่มหมดความอดทน และมีเสียงผู้เห็นต่างตั้งคำถามถึงความสามารถในการนำของเรา สภาได้เตรียมแผนงาน 40 ปีไว้หลายโครงการเพื่อดับข้อสงสัยเหล่านี้ และขับเคลื่อนเราเข้าสู่ยุคถัดไปของเผ่าพันธุ์"
 paragon.5004.a:1 "มาเริ่มงานกันเลย!"
 paragon.5004.a.tt:0 "ปลดล็อกระเบียบวาระคำมั่นสัญญาการรวมเป็นหนึ่ง ซึ่งช่วยปรับปรุงระเบียบวาระตามหลักจริยธรรมตลอดระยะเวลาของสถานการณ์ §Yคำมั่นสัญญาการรวมเป็นหนึ่ง§!"

 paragon_origin_promise:0 "คำมั่นสัญญาการรวมเป็นหนึ่ง"
 paragon_origin_promise_type:0 "คำสัตย์ปฏิญาณโบราณ"
 paragon_origin_promise_desc:1 "ในช่วงระยะเวลาการรวมชาติ §Y[Owner.Ruler.GetTitle] [Owner.Ruler.GetRegnalName]§! ได้สาบานว่าวันหนึ่งคนของเราจะได้ไปตั้งถิ่นฐานบนดาวเคราะห์ดวงอื่น สำหรับหลายคน คำสาบานนั้นกลายเป็นคำมั่นสัญญาเสมือนคำพยากรณ์ ส่วนคนอื่นๆ สงสัยว่ามันจะเป็นจริงได้หรือไม่ เมื่อเร็วๆ นี้ แม้จะมีความก้าวหน้าในเทคโนโลยีความเร็วแต่บางคนก็เริ่มใช้คำสัญญาที่ยังไม่บรรลุผลนี้เพื่อบ่อนทำลายการปกครองของ §Y[Owner.Ruler.GetTitle] [Owner.Ruler.GetRegnalName]§!.\n\nวิธีที่แน่นอนที่สุดในการปิดปากผู้เห็นต่างเหล่านี้คือการพิสูจน์ว่าพวกเขาคิดผิด เราจะมุ่งสู่อวกาศ ตั้งถิ่นฐานในดาวดวงใหม่ และขยายพรมแดนของเราออกไปให้มากที่สุดเท่าที่จะทำได้"
 paragon_origin_promise_monthly_change_tooltip:0 "เรามีเวลา 40 ปีในการปฏิบัติตามคำสัญญา!"
 situation_origin_first_promise_expansion:0 "กิจการภายใน"
 situation_origin_first_promise_prospecting:0 "ทรัพยากรใหม่"
 situation_origin_first_promise_construction:1 "โครงการก่อสร้าง"
 situation_origin_first_promise_engineering:0 "เทคโนโลยีใหม่"
 approach_allow_tooltip_promise:1 "เสร็จสิ้นระเบียบวาระ §Y$council_agenda_origin_legendary_leader_name$§! เพื่อปลดล็อกแนวทางนี้"
 approach_situation_origin_promise_expansion_tt:0 "เราจะมุ่งเน้นไปที่กิจการภายใน"
 approach_situation_origin_promise_prospecting_tt:0 "เราจะมุ่งเน้นไปที่การค้นหาทรัพยากรใหม่"
 approach_situation_origin_promise_construction_tt:1 "เราจะมุ่งเน้นไปที่โครงการวิศวกรรม"
 approach_situation_origin_promise_engineering_tt:0 "เราจะเพิ่มความพยายามในการวิจัยให้เข้มข้นยิ่งขึ้น"
 situation_promise_outcome:0 "ฝ่ายค้านให้เวลาเรา 40 ปีในการทำตามสัญญา อีกไม่นานพวกเขาจะตระหนักว่าคิดผิดเพียงใดที่เคลือบแคลงสงสัยในตัวเรา"
 situation_insight_stages:0 "§Y[Owner.Ruler.GetTitle] [Owner.Ruler.GetRegnalName]§! กำลังดำเนินการเพื่อปฏิบัติตามสัญญาของ [Owner.Ruler.GetHisHer]"
 paragon_origin_promise_chain_title:0 "$paragon_origin_promise$"
 paragon_origin_promise_chain_desc:2 "เราต้องทำตามสัญญาที่ให้ไว้ พลเมืองของ [owner.GetName] กำลังหวังให้เราเติบโตเป็นจักรวรรดิที่ท่องอวกาศได้ในอีก 40 ปีข้างหน้า เราควรพยายามขยายประเทศด้วยการ §Gควบคุมระบบดาว§!, §Gตั้งอาณานิคมในดาวเคราะห์§! และถ้าเราพบจักรวรรดิอื่น ให้ §Gลงนามในสนธิสัญญาป้องกันร่วมกัน§!.\n\nเมื่อครบ §G40 ปี§! คุณลักษณะ §H$leader_trait_legendary_leader$§! ของผู้นำเราจะพัฒนาขึ้นสำหรับทุกๆ §G15 คะแนน§! ของความก้าวหน้าที่เราทำได้"
 promises_delivered:0 "ความคืบหน้าปัจจุบัน"
 council_agenda_origin_legendary_leader_name:0 "คำมั่นสัญญาการรวมเป็นหนึ่ง"
 council_agenda_origin_legendary_leader_desc:0 "แผนงาน 40 ปีมีความสำคัญอย่างยิ่งต่อความสำเร็จของจักรวรรดิเรา ด้วยการรวมความพยายามของเราเข้าด้วยกันภายใต้การนำทางของลูมินารี เราจะประสบความสำเร็จในสิ่งที่ยิ่งใหญ่กว่าการทำโดยลำพังมาก"
 council_agenda_origin_legendary_leader_effect:0 "เพิ่มแนวทางให้กับสถานการณ์ §Yคำมั่นสัญญาการรวมเป็นหนึ่ง§!\nมอบเอฟเฟกต์สติปัญญาลูมินารีแบบสุ่มหนึ่งอย่าง\nระเบียบวาระตามหลักจริยธรรมจะได้รับเอฟเฟกต์สติปัญญาลูมินารีตลอดระยะเวลาของสถานการณ์ §Yคำมั่นสัญญาการรวมเป็นหนึ่ง§!"
 origin_legendary_leader_finish:1 "$council_agenda_origin_legendary_leader_name$ $agenda_ref$"
 origin_legendary_leader_finish_desc:0 "$council_agenda_origin_legendary_leader_desc$"

 paragon.5005.name:0 "อ้างสิทธิ์ดินแดนใหม่สำเร็จ"
 paragon.5005.desc:1 "อาณานิคมใหม่นี้เป็นก้าวแรกสู่การทำตามสัญญาของ §Y[Root.Owner.Ruler.GetTitle]§!.\n\nยานอาณานิคมได้รับการดัดแปลงอย่างถาวรให้เป็นสำนักงานใหญ่ฝ่ายบริหารของนิคมใหม่ งานเริ่มต้นขึ้นในการเชื่อมต่อแกนเครื่องปฏิกรณ์ของมันเข้ากับโครงข่ายไฟฟ้าเพื่อจ่ายพลังงานให้กับอาณานิคมที่กำลังเติบโต.\n\nเมื่อผู้ตั้งถิ่นฐานหลั่งไหลลงจากยานในจำนวนมาก ที่พักอาศัยชั่วคราวและเพิงพักได้รับการสร้างขึ้นรอบตัวยานอวกาศขนาดมหึมาเดิม สิ่งเหล่านี้จะกลายเป็นรากฐานของเมืองแรกของเผ่าพันธุ์ [Root.Owner.GetSpeciesName] บนดาว [Root.GetName] ในอนาคต"

 paragon.5008.name:0 "คํา สัญญา เท็จ" #Fail situation
 paragon.5008.desc:1 "$paragon.beginning.speech$\n\nในข้อความถัดจากนี้ [Root.Owner.Ruler.GetName] ได้บอกให้เผ่าพันธุ์ [Root.Owner.GetSpeciesNamePlural] ละทิ้งความเคลือบแคลงสงสัยเดิมๆ และมองไปสู่อนาคต [Root.Owner.Ruler.GetSheHeCap] ชี้ให้เห็นถึงสิ่งยิ่งใหญ่ที่เราได้ทำร่วมกันสำเร็จ และความไม่สมเหตุสมผลในการปล่อยให้ความผิดพลาดในอดีตมาฉุดรั้งเราไว้จากความก้าวหน้า หากชาว [Root.Owner.GetName] ยืนหยัดร่วมกันเป็นหนึ่งเดียว ก็ไม่มีอะไรที่เราไม่สามารถผ่านพ้นไปได้!\n\n$paragon.ending.speech$"
 paragon.5008.a:0 "พวกเขาจะเข้าใจไหม?"
 paragon.5008.a.tt:1 "§Lแม้ว่าผู้คนจะยังคงสนับสนุน §Y[Root.Owner.Ruler.GetTitle]§! แต่จริงๆ แล้วเราไม่ได้ทำตามสัญญา และสิ่งนี้บ่อนทำลายรัฐบาลของเรา§!"
 paragon.5009.name:0 "สัญญาได้รับการส่งมอบ" #Win situation
 paragon.5009.desc:1 "$paragon.beginning.speech$\n\nในข้อความถัดจากนี้ [Root.Owner.Ruler.GetName] ได้ยกย่องเผ่าพันธุ์ [Root.Owner.GetSpeciesNamePlural] ด้วยการสรรเสริญและเล่าเรื่องราวความสำเร็จของบุคคลที่ได้รับเลือก รวมถึงตัวของ [Root.Owner.Ruler.GetHerHis] เองด้วย [Root.Owner.Ruler.GetSheHeCap] ยังคงดำเนินรายการความสำเร็จร่วมกันของเราต่อไป ทีละความสำเร็จอันรุ่งโรจน์ เพื่อปูทางไปสู่คำมั่นสัญญาสำหรับอนาคตที่ยิ่งใหญ่ยิ่งขึ้น\n\n$paragon.ending.speech$"
 paragon.5009.a:1 "สู่หมู่ดาวและชัยชนะ!"
 paragon.5009.a.tt:1 "§Lเราได้ทำตามทุกสัญญาและความคาดหวังของพลเมืองของเราสำเร็จแล้ว§!"

 paragon.5010.name:0 "การนำทาง"
 paragon.5010.desc:1 "เมืองใหม่ที่สร้างขึ้นบนดาว [Root.GetName] เป็นทัศนียภาพที่น่าทึ่ง ด้วยความกล้าหาญและความมุ่งมั่น ผู้ตั้งถิ่นฐานสามารถยืนหยัดและเติบโตบนโลกใบใหม่ได้สำเร็จ\n\nพลเมือง [Root.Owner.GetSpeciesName] บนดาว [Root.GetName] ตัดสินใจที่จะแสดงความจงรักภักดีด้วยการสร้างอนุสาวรีย์เพื่อเป็นเกียรติแก่ §Y[Root.Owner.Ruler.GetTitle] [Root.Owner.Ruler.GetRegnalName]§!."
 paragon.5010.a:0 "ให้พวกเขาทำมันต่อไป"
 paragon.5010.a_tt:0 "ผู้อยู่อาศัยบนดาว [Root.GetName] จะสร้างอนุสาวรีย์ที่อุทิศแด่ §Y[Root.Owner.Ruler.GetTitle]§!."
 paragon.5010.b:0 "มอบเงินทุนสนับสนุนเพิ่มเติมให้พวกเขา"
 paragon.5010.b_tt:0 "§Y[Root.Owner.Ruler.GetTitle] [Root.Owner.Ruler.GetRegnalName]§! จะช่วยเหลือกระบวนการก่อสร้างด้วยตนเอง"
 paragon.5010.c:0 "เน้นทำในสิ่งที่เป็นประโยชน์จริงดีกว่า"
 paragon.5010.c_tt:0 "ผู้อยู่อาศัยบนดาว [Root.GetName] จะใช้เงินทุนที่รวบรวมได้เพื่อทำโครงการอื่นแทน"

 paragon.5011.name:0 "ดาว [Root.GetName] เฉลิมฉลอง!"
 paragon.5011.desc:1 "§Hหน้าจอทุกเครื่องของรัฐใน [Root.Owner.GetName] ขัดจังหวะการออกอากาศปกติเพื่อถ่ายทอดสดสารอย่างเป็นทางการจากดาว [Root.GetName] โดยมี §Y[Root.Owner.Ruler.GetTitle] [Root.Owner.Ruler.GetRegnalName]§! ยืนอยู่หน้าอนุสาวรีย์ที่มีผ้าคลุมไว้§!\n\nวันนี้เราได้สร้างประวัติศาสตร์ เผ่าพันธุ์ของเราไม่เคยบรรลุผลงานที่ยิ่งใหญ่เช่นนี้มาก่อน ด้วยการชี้นำของข้าและด้วยการทำงานหนักของพวกท่าน จะไม่มีอุปสรรคใดขวางทางเราได้! ผู้ตั้งถิ่นฐานแห่ง [Root.GetName] ปรารถนาที่จะให้เกียรติข้า และข้าขอขอบคุณพวกเขา ขอความรุ่งโรจน์จงมีแด่ [Root.Owner.GetName]!"
 paragon.5011.a:0 "จงเจริญ!"
 paragon.5011.a.response:1 "§Hฝูงชนส่งเสียงเชียร์อย่างกึกก้องเมื่องานเปิดเผยอนุสาวรีย์ของ §Y[Root.Owner.Ruler.GetTitle] [Root.Owner.Ruler.GetRegnalName]§! เริ่มต้นขึ้น โดย §Y[Root.Owner.Ruler.GetTitle]§! ยืนตระหง่านอย่างภาคภูมิใจ มองไปยังขอบฟ้าและอนาคตอันรุ่งโรจน์ที่รอเราอยู่ เป็นครั้งแรกที่เราพิชิตดาวดวงใหม่ได้สำเร็จ!§!"

 paragon.5012.name:0 "[Root.Owner.GetName] เฉลิมฉลอง!"
 paragon.5012.desc:1 "§Hหน้าจอทุกเครื่องของรัฐใน [Root.Owner.GetName] ขัดจังหวะการออกอากาศปกติเพื่อถ่ายทอดสดสารอย่างเป็นทางการจากดาว [Root.GetName] โดยมี §Y[Root.Owner.Ruler.GetTitle] [Root.Owner.Ruler.GetRegnalName]§! ยืนอยู่หน้าอนุสาวรีย์ที่มีผ้าคลุมไว้§!\n\nวันนี้เราได้สร้างประวัติศาสตร์ เผ่าพันธุ์ของเราไม่เคยบรรลุผลงานที่ยิ่งใหญ่เช่นนี้มาก่อน ด้วยการชี้นำของข้าและด้วยการทำงานหนักของพวกท่าน จะไม่มีอุปสรรคใดขวางทางเราได้! ผู้ตั้งถิ่นฐานแห่ง [Root.GetName] ต้องการให้เกียรติข้า แต่ในวันนี้ ทุกคนได้รับเกียรติอย่างเท่าเทียมกัน เมื่อร่วมมือกันเราย่อมชนะ!"
 paragon.5012.a:0 "ร่วมเป็นหนึ่ง!"
 paragon.5012.a.response:1 "§Hฝูงชนส่งเสียงเชียร์อย่างกึกก้องเมื่องานเปิดเผยอนุสาวรีย์ของ §Y[Root.Owner.Ruler.GetTitle] [Root.Owner.Ruler.GetRegnalName]§! ที่ขนาบข้างด้วยรูปปั้นวีรบุรุษของ [Root.Owner.GetSpeciesNamePlural] คนอื่นๆ เริ่มต้นขึ้น พวกเขายืนเคียงข้างร่วมมือกัน ชาติที่มุ่งเน้นไปที่เป้าหมายเดียวกัน§!"

 paragon.5013.name:0 "การจัดงานรำลึกที่ดาว [Root.GetName]!"
 paragon.5013.desc:1 "§Hหน้าจอทุกเครื่องของรัฐใน [Root.Owner.GetName] ขัดจังหวะการออกอากาศปกติเพื่อถ่ายทอดสดสารอย่างเป็นทางการจากดาว [Root.GetName] โดยมี §Y[Root.Owner.Ruler.GetTitle] [Root.Owner.Ruler.GetRegnalName]§! ยืนอยู่หน้าอนุสาวรีย์ที่มีผ้าคลุมไว้§!\n\nวันนี้เราได้สร้างประวัติศาสตร์ เผ่าพันธุ์ของเราไม่เคยบรรลุผลงานที่ยิ่งใหญ่เช่นนี้มาก่อน ประชาชนแห่งดาว [Root.GetName] ต้องการให้เกียรติข้าในวันนี้ แต่พวกเขาต่างหากที่เป็นฮีโร่ที่แท้จริงของพวกเรา ข้าเป็นเพียงข้ารับใช้ของชาติของเรา ขอบคุณพวกท่านทุกคนที่ทำให้เราก้าวไปอีกก้าวสู่อนาคตที่สดใสขึ้น!"
 paragon.5013.a:0 "ช่างอ่อนน้อมถ่อมตนอย่างยิ่ง!"
 paragon.5013.a.response:1 "นี่คือเหตุผลที่ข้าปฏิเสธไม่ให้ผู้ตั้งถิ่นฐานที่น่าภาคภูมิใจเหล่านี้สร้างอนุสาวรีย์ในนามของข้า แต่ควรนำเงินทุนไปใช้เพื่อการสร้างเมืองแทน ความรุ่งเรืองกำลังรอคอยเราอยู่!\n\n$paragon.ending.speech$"

 paragon.5014.name:0 "สภาที่ทำงานหนักเกินไป"
 paragon.5014.desc:1 "สภากำลังรับภาระล้นมือ\n\nขณะที่พลังงานของ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! ดูเหมือนไม่มีขีดจำกัด แต่เหล่าสมาชิกสภากลับต้องทำงานหนักเกินไปจากความต้องการของจักรวรรดิระดับกาแล็กซี ประเด็นต่างๆ จึงถูกปล่อยไว้โดยไม่ได้รับการแก้ไข และจำเป็นต้องยื่นมือเข้ามาช่วยแบ่งเบาภาระนี้"
 paragon.5014.a:0 "เราจะผ่านพ้นความท้าทายนี้ไปได้"

 paragon.5110.name:0 "พบโจรสลัด"
 paragon.5110.desc:0 "เราได้รายงานมาหลายฉบับ เรื่องเส้นทางการค้าของเรา สภาได้ร้องขอการสนับสนุนทางทหาร เพื่อรับมือกับอันตรายนี้" #To call the system name use [paragon_origin_ships.GetName]
 paragon.5110.a:0 "ส่งกองทัพเรือไป"

 paragon.5120.name:0 "ระบบสื่อสารขัดข้อง"
 paragon.5120.desc:1 "ผู้ตั้งถิ่นฐานและทีมวิจัยอวกาศห้วงลึกบางส่วนกำลังวิพากษ์วิจารณ์ระบบสื่อสารของเรา เนื่องจากมีหลายวันที่พวกเขาไม่สามารถส่งข้อความใดๆ ผ่านได้เลย วิศวกรเสนอแนะให้สร้างสถานีทวนสัญญาณการสื่อสารในระบบดาวเมืองหลวงเพื่อเพิ่มความแรงของสัญญาณ"
 paragon.5120.a:0 "เริ่มการก่อสร้าง"

 paragon.5121.name:0 "เครื่องขยายสัญญาณ"
 paragon.5121.desc:1 "เครื่องขยายสัญญาณได้รับการเปิดใช้งานแล้ว การทดสอบครั้งแรกพิสูจน์ว่ามันน่าจะเพียงพอในการรับประกันการสื่อสารที่เสถียรทั่วเขตอวกาศของเรา\n\nขณะนี้ปรากฏว่าการขัดข้องก่อนหน้านี้เกิดจากการก่อวินาศกรรมโดยเจตนา แม้ว่าจะยังไม่ทราบตัวผู้กระทำความผิด แต่ระบบใหม่นี้น่าจะปกป้องเราจากการรบกวนเพิ่มเติมได้"
 paragon.5121.a:0 "เราได้ยินเสียงของเรากลับคืนมาแล้ว"

 paragon.5130.name:0 "การประท้วงหยุดงานของคนงาน"
 paragon.5130.desc:1 "คนงานในอวกาศห้วงลึกกำลังนัดหยุดงานเพื่อประท้วงเงื่อนไขการทำงานที่โหดร้าย พวกเขาเรียกร้องเวลาว่างเพิ่มขึ้นและระเบียบด้านความปลอดภัยที่มากขึ้น เพื่อเป็นการตอบสนอง เราได้เสนอมาตรการกำหนดวันหยุดงานและการสวนสนามครั้งใหญ่บนโลกเมืองหลวงของเราเพื่อจุดประกายความภาคภูมิใจในชาติขึ้นมาใหม่"
 paragon.5130.a:0 "ลงมือเลย!"

 paragon.5131.name:0 "การเดินสวนสนามครั้งยิ่งใหญ่"
 paragon.5131.desc:1 "การสวนสนามเป็นไปด้วยดีเกินคาด! ภาพของพลเมืองที่ส่งเสียงเชียร์ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! ได้รับการบันทึกและเผยแพร่ไปทั่ว [Owner.GetName] เพื่อแสดงการสนับสนุนแด่ [Root.Owner.Ruler.GetTitle] ผู้มีเมตตา แม้จะมีรายงานการจลาจลเล็กๆ น้อยๆ เกิดขึ้นทั่วเมืองหลวง แต่ความสงบก็กลับคืนมาอย่างรวดเร็ว ไม่มีผู้เสียชีวิต และสื่อของรัฐก็ยกย่อง §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! สำหรับการตอบสนองอย่างรวดเร็วของกองกำลังความมั่นคงของเรา"
 paragon.5131.a:1 "พวกผู้เห็นต่างที่น่าสาปแช่งเหล่านี้!"

 paragon.5140.name:0 "ผู้เห็นต่างในกองทัพ"
 paragon.5140.desc:1 "มีรายงานว่านายทหารชั้นผู้น้อยกำลังป้ายสีชื่อเสียงของ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! อย่างจริงจัง สิ่งนี้จะปล่อยไว้โดยไม่ถูกลงโทษไม่ได้ อย่างน้อยที่สุด ผู้ที่รับผิดชอบควรถูกปลดออกจากราชการ"
 paragon.5140.a:0 "เปิดการสืบสวน"

 paragon.5141.name:0 "จับกุมผู้เห็นต่าง"
 paragon.5141.desc:1 "นายทหารผู้เห็นต่างที่สมคบคิดต่อต้านเราได้รับการจับกุมแล้ว โชคดีที่พวกเขามีจำนวนน้อย แต่เหตุการณ์นี้ชี้ให้เห็นว่าแม้กระทั่งกองทัพของเราก็สามารถถูกแทรกซึมโดยคนทรยศได้ เราสามารถจับตัวผู้บงการหลักได้ แต่เราก็ไม่ควรตัดประเด็นความเชื่อมโยงกับกลุ่มนอกกองทัพทิ้งไป"
 paragon.5141.a:0 "เราต้องตื่นตัวอยู่เสมอ"

 paragon.5150.name:0 "การเล่นพรรคเล่นพวกอย่างแพร่หลาย"
 paragon.5150.desc:1 "สภาเพิ่งตกอยู่ภายใต้การตรวจสอบอย่างเข้มงวด การร้องเรียนโดยไม่ระบุตัวตนระบุถึงตำแหน่งสำคัญจำนวนมากอย่างน่าตกใจซึ่งถูกจัดสรรให้กับเพื่อนฝูงและครอบครัวของข้าราชการระดับสูง เราสัญญาว่าจะตรวจสอบเรื่องนี้และดำเนินการให้ดีขึ้น"
 paragon.5150.a:0 "เราต้องสะสางกำลังพลของเรา"

 paragon.5151.name:0 "การสะสางสภา"
 paragon.5151.desc:1 "คณะกรรมการพิเศษได้เข้าตรวจสอบระดับสูงของสภา. พบผู้ขาดคุณสมบัติหลายราย และส่วนใหญ่ถูกสั่งให้ออกจากตำแหน่งแล้ว ส่วนผู้มีความสามารถบางส่วนที่มีแววดีได้รับการส่งตัวไปเข้ารับการฝึกอบรมเพิ่มเติม"
 paragon.5151.a:0 "ดีขึ้นมาก"

#EMPIRE PROBLEMS
 PARAGON_ORIGIN_SPIRITUALIST_PROJECT:0 "สถานีทวนสัญญาณการสื่อสาร"
 PARAGON_ORIGIN_SPIRITUALIST_PROJECT_DESC:1 "การสร้างสถานีทวนสัญญาณในระบบดาวเมืองหลวงจะช่วยป้องกันการขัดข้องของการสื่อสารระยะไกล วิศวกรที่ดีที่สุดของเราพร้อมที่จะเริ่มทำงานแล้ว"
 PARAGON_ORIGIN_AUTHORITARIAN_PROJECT:0 "การเดินสวนสนามครั้งยิ่งใหญ่"
 PARAGON_ORIGIN_AUTHORITARIAN_PROJECT_DESC:1 "การเดินสวนสนามครั้งยิ่งใหญ่และวันหยุดราชการนั้นจำเป็นต้องมีการเตรียมการอย่างมาก ทุกอย่างต้องสมบูรณ์แบบหากเราต้องการจุดประกายความภาคภูมิใจในชาติขึ้นมาใหม่"
 PARAGON_ORIGIN_PACIFIST_PROJECT:0 "กวาดล้างนายทหารผู้เห็นต่าง"
 PARAGON_ORIGIN_PACIFIST_PROJECT_DESC:0 "กลุ่มผู้เห็นต่างเริ่มหยั่งรากฝังลึกในกองทัพของเรา คอยสบประมาท §Y[Root.Owner.Ruler.GetTitle] [Root.Owner.Ruler.GetRegnalName]§! และสมคบคิดต่อต้านเรา ต้องดำเนินการอย่างรวดเร็วและเด็ดขาด"
 PARAGON_ORIGIN_MATERIALIST_PROJECT:0 "ปลอดเส้นสาย"
 PARAGON_ORIGIN_MATERIALIST_PROJECT_DESC:0 "การยุติการเล่นพรรคเล่นพวกในสภาควรเป็นสิ่งสำคัญสูงสุดของเรา เนื่องจากมันขัดขวางการทำงานเกือบทุกอย่างของเรา อาจต้องใช้เวลาในการกวาดล้างการทุจริตทั้งหมดนี้ แต่ประชาชนกำลังคาดหวังในตัวเราอยู่"

 paragon.5020.name:0 "สิ่งที่จะเกิดขึ้นข้างหน้า"
 paragon.5020.desc:1 "แม้จะมีผลงานของ §Y[owner.Ruler.GetTitle] [owner.Ruler.GetRegnalName]§! แต่ก็ยังมีหลายสิ่งหลายอย่างที่ต้องทำ จักรวรรดิประกอบด้วยฝักฝ่ายที่ขัดแย้งกัน และประชาชนจะรวมกันเป็นหนึ่งได้ก็ต่อเมื่ออาศัยความพยายามอย่างต่อเนื่องของ [owner.Ruler.GetTitle] เท่านั้น\n\nแม้ว่า §Y[owner.Ruler.GetTitle] [owner.Ruler.GetRegnalName]§! จะไม่ต้องการเปลี่ยนรัฐบาลหลังการรวมชาติ แต่แนวทางใหม่ที่เป็นรูปธรรมและเข้าถึงโดยตรงมากกว่าก็น่าจะช่วยเยียวยาปัญหาบางประการเหล่านี้ได้ ทว่าในอีกมุมหนึ่ง การตัดสินใจเช่นนี้อาจเผชิญกับการคัดค้านอย่างหนัก"
 paragon.5020.a:0 "ประกาศการปกครองแบบจักรวรรดิ!"
 paragon.5020.a.tt:1 "§Lมีเพียงการมอบอำนาจอย่างไร้ขีดจำกัดแก่ [owner.Ruler.GetTitle] เท่านั้นที่เราจะหวังครองความเป็นใหญ่เหนือหมู่ดาวได้ จากนี้ไป [owner.Ruler.GetTitle] จะมีอำนาจเบ็ดเสร็จเหนือสภา ขอให้การปกครองของ [owner.Ruler.GetHisHer] ยาวนานและรุ่งเรือง!§!\nสิ่งนี้จะช่วยเสริมสร้างการปกครองของ §T[owner.Ruler.GetRegnalName]§! แต่ก็อาจจะเกิด §Rผลลัพธ์ที่ร้ายแรง§! ตามมาในอนาคต"
 paragon.5020.b:1 "คงสถานะเดิมไว้"
 paragon.5020.b.tt:1 "§Lประชาชนของเรามอบความไว้วางใจให้ [owner.Ruler.GetTitle] นำทางพวกเขาไปสู่หมู่ดาว แต่พวกเขาไม่เคยยอมรับราชทินนามหรือการปกครองในระบบจักรวรรดิ การยึดอำนาจเช่นนี้จะถือเป็นระบอบทรราชย์§! การรักษาเสถียรภาพสถานะเดิมไว้ควรจะช่วยสร้างความมั่นคงแก่ชาติได้"

 paragon.5021.name:0 "ประกาศสถาปนาจักรวรรดิ"
 paragon.5021.desc:1 "ข่าวดังกล่าวแพร่สะพัดไปอย่างรวดเร็ว หลังจากการลงนามอย่างเป็นทางการเพียงไม่กี่ครั้ง พิธีราชาภิเษกอันยิ่งใหญ่ก็ได้แพร่ภาพออกอากาศทั่วประเทศ ประชาชนส่วนใหญ่ของ [Owner.GetSpeciesNamePlural] ต่างมีความยินดีที่ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! จะได้ควบคุมการบริหารประเทศอย่างสมบูรณ์แบบจากนี้\n\nขณะที่บรรยากาศกำลังเฉลิมฉลอง คำถามที่ไม่ได้พูดออกไปและความไม่แน่นอนยังคงหลงเหลืออยู่ จักรวรรดิใหม่นี้จะมีลักษณะหน้าตาเป็นอย่างไร?"
 paragon.5021.a:1 "ทหารต้องมีบทบาทสําคัญ" #MILITARIST
 paragon.5021.b:1 "ศรัทธาจะค้ําจุนเรา" #SPIRITUALIST
 paragon.5021.c:1 "กฎหมาย และ ระเบียบ เป็น สิ่ง สําคัญ ที่ สุด." #AUTHORITARIAN
 paragon.5021.d:1 "ประเทศของเราเปิดรับทุกคน" #XENOPHILE
 paragon.5021.e:0 "สันติภาพจะทําให้เราร่ํารวยและความเจริญรุ่งเรือง" #PACIFIST
 paragon.5021.f:0 "ความก้าวหน้าจะนําเราไปสู่ความยิ่งใหญ่" #MATERIALIST
 paragon.5021.g:0 "เดอะจักรวรรดิจะเป็นเกราะป้องกันภัยคุกคามของซีโน" #XENOPHOBE
 paragon.5021.h:1 "รัฐบาลต้องเสถียร" #GOV
 paragon.5022.name:0 "การแถลงข่าวต่อหน้าประเทศ"
 paragon.5022.desc:1 "§Hได้เวลาแล้วที่ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! จะแถลงต่อรัฐบริวารผู้ภักดีของ [Ruler.GetHerHis] สื่อของรัฐกำลังถ่ายทอดสดสุนทรพจน์ของ [Ruler.GetHerHis]§!\n\nเพื่อนร่วมชาติ [Owner.GetSpeciesNamePlural] ทุกคน! พวกท่านได้มองมาที่ข้าเพื่อขอคำแนะนำในยามที่ยากลำบาก และข้าสัญญาว่าความไว้วางใจของพวกท่านจะได้รับการตอบแทนอย่างดี อำนาจที่มอบให้แก่ข้ามาพร้อมกับความรับผิดชอบอันยิ่งใหญ่ และข้าสาบานว่าจะรับใช้ชาติและพวกท่านซึ่งเป็นรัฐบริวารของข้าอย่างซื่อสัตย์ การดำเนินการครั้งแรกของข้าในฐานะจักรพรรดิคือการจัดตั้งสถาบันการเรียนรู้ที่จะฝึกฝนเยาวชนที่เก่งและฉลาดที่สุดเพื่อสร้างอนาคตที่เราทุกคนสามารถภาคภูมิใจร่วมกันได้ สู่หมู่ดาวและชัยชนะ!"
 paragon.5022.a:1 "สู่ดวงดาว!"

#DIPLOMATIC MILESTONES
 paragon.5023.name:0 "รวมเป็นสหพันธรัฐ"
 paragon.5023.desc:2 "$paragon.beginning.speech$\n\nข้อความของ [Root.Owner.Ruler.GetName] เน้นย้ำว่าช่างเป็นวันที่น่ายินดียิ่ง! การก่อตั้งสหพันธรัฐนี้เป็นสาเหตุสำหรับการเฉลิมฉลองอย่างแท้จริง [Root.Owner.Ruler.GetHeSheCap] กล่าวถึงความผูกพันที่เราสร้างร่วมกับพันธมิตรของเรา โดยระบุว่าความร่วมมือกับ [your_ally.GetName] จะนำพาเราเข้าสู่ยุคใหม่ ยุคทองแห่งความยิ่งใหญ่และความรุ่งเรือง!\n\n$paragon.ending.speech$"
 paragon.5023.a:1 "สหพันธรัฐจงเจริญ!"

 paragon.5025.name:0 "ราชาเหนือราชา"
 paragon.5025.desc:1 "$paragon.beginning.speech$\n\nการประกาศนี้พุ่งเป้าไปที่ [your_ally.GetName] ผู้ซึ่งยอมรับในความเหนือกว่าของเราและยอมรับการปกครองและการชี้นำของเรา! ปัญญาและความไว้วางใจของพวกเขาจะได้รับการตอบแทนอย่างเหมาะสม และเราหวังว่าชาติอื่นๆ จะเลือกทางที่ถูกต้องและยอมศิโรราบเช่นกัน\n\n$paragon.ending.speech$"
 paragon.5025.a:0 "พวกเราเกิดมาเพื่อปกครอง"
 paragon.5027.name:0 "ศัตรูถูกบดขยี้!"
 paragon.5027.desc:1 "$paragon.beginning.speech$\n\nประชาชนยินดีเมื่อข่าวการลงนามในสนธิสัญญาสันติภาพมาถึง รวมถึงการยอมผ่อนปรนอย่างมหาศาลที่ศัตรูของเราถูกบังคับให้ยอมรับ เราเป็นพยานในชัยชนะภายใต้การชี้นำของลูมินารี!\n\n$paragon.ending.speech$"
 paragon.5027.a:0 "ชัยชนะ!"

 paragon.5029.name:0 "ผลลัพธ์อันมืดมน"
 paragon.5029.desc:1 "$paragon.beginning.speech$\n\nวันนี้เป็นวันอันน่าเศร้าสำหรับชาว [Owner.GetName] ความโหดร้ายของผู้รุกรานปรากฏชัดเจนบนสื่อนำเสนอข่าวสาร ขณะที่ [Ruler.GetName] เน้นย้ำความจำเป็นในการร่วมมือกันในช่วงเวลาอันมืดมนนี้ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! ให้คำปฏิญาณอย่างจริงจังเพื่อให้แน่ใจว่าจะนำไปสู่ผลลัพธ์ที่ดีที่สุดเท่าที่จะทำได้ และจะไม่ปล่อยให้สิ่งนี้เกิดขึ้นอีกเด็ดขาด\n\n$paragon.ending.speech$"
 paragon.5029.a:0 "จะไม่มีวันเกิดขึ้นอีก!"

 paragon.5033.name:0 "ตกเป็นประเทศราช"
 paragon.5033.desc:1 "$paragon.beginning.speech$\n\n[Root.Owner.Ruler.GetName] นิ่งเงียบ สื่อนำเสนอข่าวแสดงภาพการลงนามในสัญญาการตกเป็นประเทศราชของ [Owner.GetName] แม้ว่าเราจะไว้วางใจในการปกครองของลูมินารี แต่ช่วงเวลานี้แสดงถึงความล้มเหลวครั้งใหญ่ที่ปฏิเสธไม่ได้สำหรับอารยธรรมของเรา\n\n$paragon.ending.speech$"
 paragon.5033.a:0 "พวกเราแค่ใช้ประโยชน์จากพวกมันเท่านั้น"

 paragon.5038.name:0 "ผู้ปกป้องกาแล็กซี"
 paragon.5038.desc:1 "$paragon.beginning.speech$\n\nวันนี้คือวันแห่งโชคชะตา [Root.Owner.Ruler.GetName] ยืนหยัดอย่างภาคภูมิใจเมื่อ [Root.Owner.Ruler.GetSheHe] ได้รับการแจ้งข่าว: ชุมชนกาแล็กซีได้เลือกเราให้ดำรงตำแหน่งผู้พิทักษ์สูงสุด พวกเขาตระหนักว่าเราเพียงผู้เดียวที่พร้อมจะรับรองความปลอดภัยของกาแล็กซีนี้ เราได้รับมอบหมายอำนาจที่ยิ่งใหญ่ และมันเป็นหน้าที่ของเราที่จะไม่เพียงแค่ตอบสนอง แต่ต้องทำให้เกินความคาดหมายทั้งหมด\n\n$paragon.ending.speech$"
 paragon.5038.a:0 "เพื่อกาแล็กซี!"

 paragon.5039.name:0 "เกียรติยศสูงสุด"
 paragon.5039.desc:1 "$paragon.beginning.speech$\n\nวันนี้คือวันแห่งชัยชนะของเรา! วุฒิสภากาแล็กซีได้แต่งตั้ง [Root.Owner.Ruler.GetTitle] [Root.Owner.Ruler.GetRegnalName] ให้เป็นจักรพรรดิแห่งสมาคมจักรวรรดิกาแล็กซี เพื่อแสดงความเคารพ [Root.Owner.Ruler.GetName] ขอปฏิญาณตนว่าจะนำทางกาแล็กซีที่รู้จักและผู้คนทั้งหมดเข้าสู่ยุคใหม่แห่งความเจริญรุ่งเรือง นับจากนี้ตราบชั่วนิรันดร์!\n\n$paragon.ending.speech$"
 paragon.5039.a:0 "จักรวรรดิจงสถิตชั่วนิรันดร์!"

# Forgotten
 paragon.5050.name:1 "การคัดค้านที่ทวีความรุนแรงขึ้น"
 paragon.5050.desc:1 "ฝ่ายตรงข้ามทางอุดมการณ์ของเราได้ก่อตั้งกลุ่มการเมืองที่ทรงพลังขึ้นมา พวกเขาได้เรียกร้องให้ผู้สนับสนุนมารวมตัวกันเพื่อประท้วงอย่างสงบต่อสิ่งที่พวกเขามองว่าเป็นการเปลี่ยนแปลงฝ่ายเดียวโดย §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§!\n\nพวกเขาอ้างว่าเราได้เบี่ยงเบนไปจากเส้นทางที่กำหนดไว้หลังการรวมชาติ และเรียกร้องให้ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! ยกเลิกการปฏิรูปบางประการ"
 paragon.5050.a:1 "พวกเขากล้าดียังไงมาตั้งคำถามกับ [Ruler.GetHimHer]?"

 paragon_origin_forgotten:1 "ความ ไม่ ลง รอย กัน ใน เรื่อง ความ รุ่งเรือง"
 paragon_origin_forgotten_type:1 "$paragon_origin_forgotten$"
 paragon_origin_forgotten_desc:2 "ผู้ชุมนุมกําลังชุมนุมกันหน้าอาคารรัฐบาล§Y[owner.Ruler.GetTitle] [owner.Ruler.GetRegnalName]§!ได้ยินความไม่พอใจของพวกเขา พวก เขา ส่วน ใหญ่ เป็น คน หนุ่ม แน่น แต่ ใน หมู่ ผู้ นํา ของ พวก เขา เป็น ทหาร ผ่าน ศึก ของ องค์การ. การ เพิก เฉย ต่อ ข้อ เรียก ร้อง ของ พวก เขา อาจ ไม่ ฉลาด."
 paragon_origin_forgotten_monthly_change_tooltip:1 "การ ประท้วง ไม่ ใช่ ความ พยายาม ที่ ประสาน กัน และ กลุ่ม ใหม่ ๆ เกิด ขึ้น เกือบ ทุก วัน. เราพยายามอย่างมาก ที่จะจําแนกผู้นําของพวกเขา"
 situation_origin_forgotten_propaganda:1 "ใช้การโฆษณาชวนเชื่อ"
 situation_origin_forgotten_balanced:1 "ค้นหาการประนีประนอม"
 situation_origin_forgotten_crackdown:1 "รอยแตกลง"
 approach_situation_origin_forgotten_propaganda_tt:1 "เราสามารถใช้การโฆษณาชวนเชื่อ เพื่อทําลายการสนับสนุนของฝ่ายค้าน นี่อาจทําให้ประชากรสับสน แต่เราควรรักษาความสงบไว้"
 approach_situation_origin_forgotten_balanced_tt:1 "โดยฟังและพูดคุยกับกลุ่มที่มีเหตุผลมากขึ้นในการต่อต้าน เราสามารถบรรเทาสื่อมวลชนในขณะที่เราจัดการกับ"
 approach_situation_origin_forgotten_crackdown_tt:1 "เราทนไม่ได้กับความไม่เป็นมิตร เราต้องขยี้ผู้ที่ทําลายเรา"

 paragon.forgotten.a:0 "จง หัก ล้าง ข้อ อ้าง เหล่า นี้."
 paragon.forgotten.b:0 "เพิ่มการใช้จ่ายรักษาความปลอดภัย"
 paragon.forgotten.c:0 "เงียบๆหน่อย"
 paragon.5054.name:0 "ข้อ กล่าว หา"
 paragon.5054.desc:1 "กลุ่มลับที่เรียกตัวเองว่า คนที่ถูกลืมถูกกล่าวหา§Y[Owner.Ruler.GetTitle] [Owner.Ruler.GetRegnalName]§!เผด็จการ พวกเขาอ้างว่ารัฐบาลของเรา ไม่ได้เป็นตัวแทนของความประสงค์ของประชาชนของเรา เพียงผลประโยชน์ของการเลือกน้อย พวกเขาเชื่อใจ[Owner.Ruler.GetRegnalName]ได้ลดลง และได้นําหลักฐาน ไปข้างหน้าของผู้ต่อต้าน ที่ได้หายไปอย่างกะทันหัน หลังจากที่วิพากษ์วิจารณ์การปกครองของเรา ข้อความซ้ําของพวกเขาเริ่ม หว่านความสงสัยในใจของเรา"
 paragon.5055.name:1 "ความเห็นต่างที่ทวีความรุนแรงขึ้น"
 paragon.5055.desc:1 "หลัง จาก ทบทวน หลัก ฐาน แล้ว ดู เหมือน ว่า§Y[Owner.Ruler.GetTitle] [Owner.Ruler.GetRegnalName]§!แน่นอนพวกเขาได้ปฏิเสธและปิดบังความจริงไว้ และได้เปิดเผยมันไว้อย่างชัดเจน[Owner.Ruler.GetHeShe]ได้เซ็นสัญญากับผู้ถือหุ้นผู้มีอิทธิพลมากมาย สัญญาไว้หลายอย่าง[Owner.Ruler.GetHeShe]ไม่สามารถส่งมอบตามความเป็นจริงเมื่อ\n\nทุก วัน นี้ ผู้ ที่ ถูก ลืม ทํา ตัว ให้ เป็น เสียง ของ ผู้ ที่ ถูก หลอก โดย[Owner.Ruler.GetTitle]และเรียกร้องให้รัฐบาลของเราโอนอํานาจกลับไปที่สภาและประชาชน"
 paragon.5056.name:1 "แอด โฮ มิม"
 paragon.5056.desc:1 "ในการพยายามป้ายสี§Y[Owner.Ruler.GetTitle] [Owner.Ruler.GetRegnalName]§!ชื่อเสียง เอกสารลับถูกเปิดเผย โดยบุคคลนิรนาม การก่อกบฏนี้ ได้เทน้ํามันลงบนไฟทางการเมือง ที่ได้คุกคามอยู่แล้ว ที่จะบริโภครัฐบาลของเรา คนที่ถูกลืม แม้จะเป็นผู้ต้องสงสัยคนสําคัญ เราก็ยังไม่พบหลักฐานว่า พวกเขามีส่วนเกี่ยวข้องด้วย"
 paragon.5057.name:1 "พอก็คือพอ"
 paragon.5057.desc:1 "ผู้ประท้วงกำลังรวมตัวกันที่หน้าอาคารรัฐบาลเพื่อเรียกร้องให้ §Y[owner.Ruler.GetTitle] [owner.Ruler.GetRegnalName]§! รับฟังปัญหาความเดือดร้อนของพวกเขา ส่วนใหญ่เป็นคนหนุ่มสาว แต่ในบรรดาผู้นำของพวกเขามีทหารผ่านศึกยุคการรวมชาติอยู่ด้วย การเพิกเฉยต่อความต้องการของพวกเขาอาจเป็นเรื่องที่ไม่ฉลาดนัก"
 paragon.5057.a:1 "จับพวกมัน!"
 paragon.5057.a.tt:1 "§Lเรารู้ว่าพวกมีปัญหาอยู่ที่ไหน เราสามารถล้อมพวกมัน และขังพวกมันได้§!"
 paragon.5057.b:1 "แสดงความยับยั้งชั่งใจ"
 paragon.5057.b.tt:1 "§Lโดย การ ไม่ ยอม น้อม ตัว อยู่ ใน ระดับ เดียว กับ พวก เขา เรา จะ แสดง ให้ ผู้ ไม่ เห็น ด้วย ทุก คน เห็น ว่า เรา กําลัง ทํา ทุก สิ่ง ที่ ทํา ได้ เพื่อ ผล ประโยชน์ ของ ประชาชน.§!"
 paragon.5057.c:1 "กําจัดคนทรยศ!"
 paragon.5057.c.tt:1 "§Lพวกแบ่งแยกเป็นภัยคุกคามต่อประเทศ ที่ต้องถูกกําจัด§!"
 paragon.5058.name:1 "รับบทนํา"
 paragon.5058.desc:1 "ภายใต้ความกดดันอย่างหนัก§Y[Owner.Ruler.GetTitle] [Owner.Ruler.GetRegnalName]§!ได้ พัฒนา วิธี ที่ ไม่ เหมือน ใคร ใน การ รับมือ กับ ความ เครียด. แม้ บาง คน อาจ มอง ว่า นี่ เป็น เรื่อง แปลก ๆ แต่ ก็ มี ผล กระทบ ต่อ ทั้ง สภา."
 paragon.5058.a:1 "เราจะเรียนรู้ที่จะอยู่กับมัน"
 paragon.5059.name:1 "ไดลิเจนต์ผู้นำ"
 paragon.5059.desc:2 "§Y[Owner.Ruler.GetTitle] [Owner.Ruler.GetRegnalName]§!ทํางานหนักมาก เพื่อที่จะเป็นผู้นําที่ดีขึ้น[Owner.Ruler.GetHisHerCap]การเพิ่มเติมข้อตกลง ได้รับการสังเกตเห็นโดยสภา"
 paragon.5059.a:1 "[Owner.Ruler.GetHisHerCap]สติ ปัญญา ไม่ มี ขีด จํากัด!"
 paragon.5060.name:1 "สั่งซื้อใหม่"
 paragon.5060.desc.imprisioned:2 "$paragon.beginning.speech$\n\nสังคมกําลังสูญเสียการควบคุม ความรุนแรง, ก่อกวน, โกหกไม่อาย... สิ่งเหล่านี้ทําให้เราลําบากมานาน ด้วยความภาคภูมิใจ ผมประกาศว่า จุดจบของยุคนี้! คน ที่ พยายาม บ่อน ทําลาย เรา ถูก จับ และ ผม สัญญา ว่า พวก เขา จะ เผชิญ กับ อํานาจ แห่ง ความ ยุติธรรม อย่าง เต็ม ที่. ไม่ นาน พวก เขา จะ กลับ ใจ เพราะ ความ เสีย หาย ที่ พวก เขา ก่อ ให้ เกิด แก่ คุณ!\n\n$paragon.ending.speech$"
 paragon.5060.desc.negotiated:1 "$paragon.beginning.speech$\n\nใน ยาม ที่ เกิด ความ ขัด แย้ง อาจ เป็น เรื่อง ง่าย ที่ จะ มอง ข้าม สิ่ง ที่ เรา ต่อ สู้ เพื่อ ที่ จะ มอง ว่า ศัตรู ทาง การ เมือง ของ เรา เป็น ศัตรู โดย ตรง. เรา ผ่าน ช่วง เวลา ที่ ยาก ลําบาก มา แล้ว แต่ วัน นี้ ผม ภูมิ ใจ ที่ จะ บอก คุณ ว่า เรา ได้ บรรลุ ผล ที่ สงบ สุข แล้ว. เสียงของคุณได้รับการได้ยิน คุณได้ไว้วางใจในตัวผม และผมทําให้คุณผิดหวัง\n\nไม่อีกแล้ว! เมื่อมีการปฏิรูปตามรัฐธรรมนูญที่กําลังจะเกิดขึ้น ผมเชื่อมั่นว่า เรากลับมาอยู่ในเส้นทางที่ถูกต้อง ด้วยคําสัญญาของข้า ข้าจะไม่ทําให้ท่านผิดหวังอีก\n\n$paragon.ending.speech$"
 paragon.5060.desc.destroyed:1 "$paragon.beginning.speech$\n\nทุก วัน นี้ ถือ ว่า เป็น ชัย ชนะ ครั้ง ใหญ่ แต่ ก็ ไม่ ได้ ถูก ซื้อ โดย ปราศจาก เครื่อง บูชา. ศัตรูของเราถูกทําลายแล้ว แต่ความเจ็บปวดของการทรยศของพวกเขา ทําให้หัวใจข้าเปื้อนเลือด ด้วย ความ เห็น แก่ ตัว พวก เขา พยายาม ทําลาย เรา ทุก คน แต่ ใน ที่ สุด พวก เขา ก็ ไม่ เหมาะ กับ กําลัง ของ เรา. ในไม่ช้าพวกเขาจะถูกตัดสิน สําหรับอาชญากรรมของพวกเขา เราชนะแล้ว!\n\n$paragon.ending.speech$"
 paragon.5060.a:1 "เราต้องการผู้นําที่แข็งแกร่ง!"
 paragon.5060.a.tt:1 "§Lเหตุ การณ์ เมื่อ เร็ว ๆ นี้ ได้ แสดง ให้ เห็น ว่า เฉพาะ กฎ ที่ สุขุม ของ§Y[Ruler.GetTitle] [Ruler.GetRegnalName]§!สามารถนําสันติภาพและความเจริญมาสู่สังคมของเรา เราต้องรวมอํานาจมากขึ้น ในมือของผู้นําของเรา§!"
 paragon.5060.b:0 "เราต้องการรัฐบาลที่มีประสิทธิภาพ!"
 paragon.5060.b.tt:0 "§Lเหตุ การณ์ เมื่อ ไม่ นาน มา นี้ ได้ แสดง ให้ เห็น ว่า จําเป็น ต้อง มี รัฐบาล ที่ เข้ม แข็ง เพื่อ จะ เอา ชนะ สภาพ กลืน ไม่ เข้า คาย ไม่ ออก ดัง กล่าว ใน อนาคต. เราต้องเพิ่มอํานาจให้กับสภา\n§!$paragon.leader.growth.negative$"

# Reformists and Mad Rule
 paragon.5061.name:1 "โศกนาฏกรรม จู่ โจม"
 paragon.5061.desc:1 "§Y[Owner.GetHeirTitle] [Owner.GetHeirName]§!ตายแล้ว เรายังระบุสาเหตุการตายไม่ได้ แต่รายงานเบื้องต้นบอกว่าสาเหตุตามธรรมชาติ[Ruler.GetRegnalName]ถูกทําร้ายอย่างหนัก จากการสูญเสีย[Ruler.GetHisHer]ลูกหลาน ระยะเวลาของการไว้ทุกข์แห่งชาติ ได้รับการออกพระราชกฤษฎีกา และเรารอคอยผลเต็มรูปแบบของการสืบสวน เพื่อก่อให้เกิดการเสียชีวิตของทายาท"

 paragon.5062.name:1 "ความ โศก เศร้า ที่ มอง ไม่ เห็น"
 paragon.5062.desc:1 "แม้จะมีหลักฐานที่ชี้ถึงความตายตามธรรมชาติ§Y[Ruler.GetTitle] [Ruler.GetRegnalName]§!ปฏิเสธที่จะยอมรับมัน ความตายของ[Ruler.GetHisHer]ทายาทมีผลกระทบอย่างมาก[Ruler.GetHimHer]และมีคําสั่งให้ข้ามดินแดนของเรา ผู้รับผิดชอบการลอบสังหารนี้จะต้องถูกพบ กองกําลังรักษาความปลอดภัยได้ดําเนินการ กวาดล้างเพื่อตัวราก\n\nระดับความรุนแรงที่มาพร้อมกับการจับกุมนี้ ทําให้ประชาชนจํานวนมากตกใจ ผู้ สนับสนุน การ ใช้ อํานาจ อย่าง ผิด ๆ และ เรียก ร้อง ให้ มี การ ปฏิรูป ใหม่ ๆ ของ รัฐบาล ได้ ปะทุ ขึ้น อีก. เป็นครั้งแรกในประวัติศาสตร์ของเรา ประชากรส่วนใหญ่ของดาวเคราะห์ ได้เพิ่มขึ้นต่อต้านกฎของ[Ruler.GetTitle]."
 paragon.5062.a:0 "หยาบคาย!"
 paragon.5062.a.tt:0 "เปิดใช้งาน$origin_delusional_tyrant_finish$"
 origin_egalitarian_refuse:0 "§Rพวกผู้แทนราษฎร[Root.GetSpeciesNamePlural]ปฏิเสธที่จะออกไป[Root.Planet.GetName]!§!\n\n"

 paragon.5063.name:0 "นัก ปฏิรูป ไม่ มี อีก ต่อ ไป"
 paragon.5063.death.desc:0 "หลัง§Y[Ruler.GetTitle] [Ruler.GetRegnalName]'§!ความ ตาย การ สนับสนุน นัก ปฏิรูป ได้ ลด ลง. เนื่อง จาก ไม่ เห็น ด้วย กับ ความ แตก ต่าง ทาง ด้าน จริยธรรม ตัว แทน จาก กลุ่ม นี้ จึง มี จุด มุ่ง หมาย ที่ จะ เข้า ร่วม พิธี ฝัง ศพ. แม้ว่าทุกวันนี้จะเสียหายจากความเศร้า แต่ก็เป็นช่วงเวลาแห่งความเป็นหนึ่งเช่นกัน เป็นเครื่องเตือนใจว่า[Root.Owner.GetName]ย่อมาจาก"
 paragon.5063.norebel.desc:0 "ไม่ ว่า เรา จะ ใช้ ทรัพยากร อย่าง ฉลาด สุขุม หรือ การ นํา เอา การ ลง โทษ มา ใช้ ดาว เคราะห์ ที่ กบฏ ก็ ไม่ เป็น ประเด็น อีก ต่อ ไป. อีก ครั้ง หนึ่ง เรา ยืน หยัด เป็น น้ํา หนึ่ง ใจ เดียว กัน โดย ที่ ประชาชน เพ่ง เล็ง ที่ การ เจริญ เติบโต แทน การ ต่อ สู้ กัน.§Y[Ruler.GetTitle] [Ruler.GetRegnalName]§!ได้มีคําสั่งให้วันนี้เป็นวันหยุดพิเศษที่ดําเนินต่อไป"
 paragon.5063.death.a:0 "เป็นหนึ่งเดียวกับความตาย"
 paragon.5063.norebel.b:0 "ยูไนเต็ดอีกครั้ง"

 paragon_origin_reformists_struggle:1 "นัก ปฏิรูป ต้องการ"
 paragon_origin_reformists_struggle_type:1 "$paragon_origin_reformists_struggle$"
 paragon_origin_reformists_struggle_desc:1 "ภายใต้ความเป็นอิสระ พวกนักปฏิรูปพยายามทําลายชาติ เมื่อ เกิด การ ปะทะ กัน อย่าง รุนแรง ทั่ว เขต ทํา งาน ของ เรา คํา โกหก ของ พวก เขา ทํา ให้ ประชาชน ของ เรา หลาย คน หัน มา หา เรา. พวกเขาคิดว่า§Y[Owner.Ruler.GetTitle] [Owner.Ruler.GetRegnalName]§!อ่อนแอ โหดร้าย ไร้ความสามารถ แต่เราจะแสดงให้พวกเขาเห็น"
 situation_paragon_origin_reformists_struggle_harsh:1 "รักษาการควบคุม"
 approach_situation_paragon_origin_reformists_struggle_harsh_tt:1 "ความโหดร้ายของนักปฏิรูปทั้งหลาย ควรจะฟื้นฟูความมั่นคงของชาติ\nเพื่อยุติสถานการณ์นี้§Y$council_agenda_origin_delusional_tyrant_name$§!อาคันด้า"
 situation_paragon_origin_reformists_struggle_accept: "เรียก ร้อง การ ติด ต่อ"
 approach_situation_paragon_origin_reformists_struggle_accept_tt: "การต่อสู้กับพลเรือนเป็นเรื่องที่ยอมรับไม่ได้ เราจะผลักดันต่อไปอย่างสันติ โดยการเรียกร้องให้มีการพักรบและเชิญกลุ่มปฏิรูปมาร่วมเจรจา หวังว่าสิ่งนี้จะช่วยจำกัดความจำเป็นในการใช้ความรุนแรง"
 approach_allow_tooltip_reformists_struggle_accept: "กลุ่มปฏิรูปไม่มีวันยอมเจรจากับทรราช"
 paragon_origin_hunt:1 "ความแข็งแกร่งของของกลุ่มปฏิรูป"
 paragon_origin_reformists_killed:0 "กลุ่มปฏิรูปกลุ่มแรกถูกกำจัดแล้ว"
 paragon_origin_reformists_alive:0 "กลุ่มปฏิรูปกลุ่มแรกเจรจาสำเร็จแล้ว"
 situation_reformists_struggle_1:0 "กลุ่มปฏิรูปกำลังบดขยี้ด่านนอกที่มีการป้องกันน้อยกว่าของเรา และกองกำลังฝ่ายจงรักภักดีกำลังดิ้นรนเพื่อสกัดกั้นพวกเขาไว้"
 situation_reformists_struggle_2:1 "กลุ่มปฏิรูปเริ่มได้เปรียบในการปะทะกันบางครั้ง แต่ส่วนแบ่งอำนาจยังคงอยู่ในมือของเราอย่างมั่นคง"
 situation_reformists_struggle_3:1 "เรามีความได้เปรียบเหนือกลุ่มปฏิรูปผู้ก่อกบฏเล็กน้อย แต่ดุลอำนาจก็สามารถเอนเอียงไปทางใดทางหนึ่งได้เสมอ"
 paragon_origin_reformists_struggle_monthly_change_tooltip:0 "กองกำลังติดอาวุธฝ่ายปฏิรูปคอยก่อกวนกองกำลังความมั่นคงฝ่ายจงรักภักดีอย่างต่อเนื่อง"
 situation_paragon_origin_reformists_struggle_complete:2 "ไม่ว่าจะอย่างไร ความขัดแย้งนี้ต้องสิ้นสุดลง การตัดสินใจของเราในตอนนี้จะส่งผลต่อรูปแบบการเจรจาที่จะเกิดขึ้นในอนาคต"
 decision_paragon_origin_subdue_reformists:1 "การกวาดล้างต่อต้านกลุ่มปฏิรูป"
 decision_paragon_origin_subdue_reformists_desc:1 "ประชาธิปไตยคือโรคร้ายที่จำเป็นต้องได้รับการเยียวยา เจ้าหน้าที่ความมั่นคงของเราจะบุกค้นแหล่งกบดานของกลุ่มปฏิรูปและยุติแผนการของพวกเขา อาจมีพลเรือนเสียชีวิตและบาดเจ็บเกิดขึ้นได้"
 decision_paragon_origin_subdue_reformists_tt:1 "สิ่งนี้จะลดความคืบหน้าลง §G4§! จากสถานการณ์ §Yข้อเรียกร้องของกลุ่มปฏิรูป§!\nมีโอกาส 50% ที่จะลบตัวปรับเปลี่ยน §Yแนวโน้มประชาธิปไตย§! ออกจากดาวเคราะห์ หากไม่มีประชากรฝ่ายเสมอภาคอยู่บนดาวเคราะห์\nสิ่งนี้จะทำให้ §Yคุณลักษณะผู้ชี้นำ§! ของ §Y[owner.Ruler.GetTitle] [owner.Ruler.GetRegnalName]§! §Rแย่ลง§!"
 council_agenda_origin_delusional_tyrant_name:0 "การปราบปรามขั้นเด็ดขาด"
 council_agenda_origin_delusional_tyrant_desc:0 "ด้วยการจับกุมตัวผู้นำของพวกเขาในการกวาดล้างทั่วทั้งจักรวรรดิ เราจะสามารถลดทอนกำลังของกลุ่มปฏิรูปและบังคับให้พวกเขาเข้าสู่โต๊ะเจรจาตามเงื่อนไขของเราได้"
 council_agenda_origin_delusional_tyrant_effect:0 "ยุติสถานการณ์ §Yข้อเรียกร้องของกลุ่มปฏิรูป§! โดยการจับกุมตัวผู้นำกลุ่มปฏิรูป"
 origin_delusional_tyrant_finish:0 "$council_agenda_origin_delusional_tyrant_name$ $agenda_ref$"
 origin_delusional_tyrant_finish_desc:0 "$council_agenda_origin_delusional_tyrant_desc$"

 paragon.5064.name:1 "กลิ่นอายแห่งการทรยศ"
 paragon.5064.desc:1 "§Y[Root.Owner.Ruler.GetTitle] [Root.Owner.Ruler.GetRegnalName]§! ค้นพบว่าผู้นำคนหนึ่งของเรากำลังคบคิดทรยศต่อรัฐบาล! วิธีการที่เหมาะสมที่สุดคือการประหารชีวิตผู้ทรยศรายนี้ แต่หลักฐานยังมีน้อยมาก"
 paragon.5064.a:1 "เราต้องการหลักฐานมากกว่านี้"
 paragon.5064.b:0 "ประหารชีวิตผู้ทรยศ!"
 paragon.5065.name:1 "รังผู้ก่อการร้าย"
 paragon.5065.desc:1 "§Y[Root.Owner.Ruler.GetTitle] [Root.Owner.Ruler.GetRegnalName]§! สั่งให้มีการกวาดล้างครั้งใหญ่บนดาวเคราะห์ดวงหนึ่งของเรา ดูเหมือนว่าจะมีแหล่งกบดานของกลุ่มปฏิรูปอยู่ที่นั่น แต่ยังไม่มีหลักฐานแน่ชัดปรากฏออกมาเลย เราจะยอมเสี่ยงชีวิตของพลเมืองผู้จงรักภักดีเพียงเพราะลางสังหรณ์จริงๆ หรือ?"
 paragon.5065.a:0 "ยกเลิกปฏิบัติการ"
 paragon.5065.b:0 "ดำเนินปฏิบัติการต่อไป"
 paragon.5070.name:0 "พบโจรสลัด"
 paragon.5070.desc:1 "หนึ่งในกลุ่มย่อยที่อ้างว่าเป็นฝ่ายปฏิรูปได้ร่วมมือกับกลุ่มโจรสลัดในท้องถิ่น แม้ว่าพวกเขาจะไม่ได้เป็นภัยคุกคามร้ายแรง แต่พวกเขาก็ยังสามารถขัดขวางปฏิบัติการและการค้าในเขตการปกครองนี้ได้"
 paragon.5071.name:0 "ความช่วยเหลือจากต่างแดน"
 paragon.5071.desc:1 "พลเมืองผู้มีชื่อเสียงจาก [event_target:friendly_nation] ปรารถนาที่จะช่วยเหลือเราในศึกภายในประเทศ ความหวังดีของพวกเขามาพร้อมกับการจัดส่งโลหะผสมผสมเพื่อช่วยเหลือเรา ดูเหมือนว่าพวกเขาต้องการปรับปรุงความสัมพันธ์ระหว่างเรา แต่ §Y[Root.Owner.Ruler.GetTitle] [Root.Owner.Ruler.GetRegnalName]§! สงสัยว่านี่อาจเป็นแผนลวงเพื่อเปิดเส้นทางส่งเสบียงให้กับขบวนการผู้เห็นต่าง"
 paragon.5071.a:0 "ส่งคำขอบคุณของเราไป"
 paragon.5071.b:0 "นี่คือแผนลวง!"
 paragon.5072.name:0 "จับกุมกลุ่มย่อยสำเร็จ"
 paragon.5072.desc:1 "หน่วยรักษาความมั่นคงของเราสามารถไล่ล่าและทลายกลุ่มย่อยแห่งหนึ่งของพวกปฏิรูปได้สำเร็จ ปฏิบัติการครั้งนี้ประสบความสำเร็จอย่างงดงาม โดยมีการสูญเสียชีวิตน้อยที่สุดและไม่มีพลเรือนบาดเจ็บล้มตายเลย"
 paragon.5073.name:1 "ที่ซ่อนถูกเปิดเผย"
 paragon.5073.desc:1 "หน่วยความมั่นคงของเราติดตามร่องรอยจนพบกลุ่มย่อยของพวกปฏิรูป แต่พวกมันได้ติดตั้งระเบิดไว้ทั่วทั้งตึก เมื่อเจ้าหน้าที่ของเราบุกเข้าไปในที่ซ่อน พวกมันก็เปิดชนวนระเบิดทันที คร่าชีวิตผู้คนไปเป็นจำนวนมาก"
 paragon.5074.name:1 "การยิงปะทะ"
 paragon.5074.desc:1 "พลเรือนจำนวนมากได้รับบาดเจ็บในการยิงปะทะกันอย่างดุเดือดหลายระลอกระหว่างกองกำลังของเรากับพวกปฏิรูป เราได้ส่งเจ้าหน้าที่กู้ชีพฉุกเฉินไปดูแลผู้บาดเจ็บแล้ว"
 paragon.5075.name:0 "การชุมนุมของฝ่ายจงรักภักดี"
 paragon.5075.desc:1 "ผู้สนับสนุนที่จงรักภักดีของเราได้รวมตัวชุมนุมกันเพื่อสนับสนุน §Y[Root.Owner.Ruler.GetTitle] [Root.Owner.Ruler.GetRegnalName]§!! ชัดเจนแล้วว่าเราได้รับการสนับสนุนจากประชาชนในการต่อสู้ครั้งนี้!"
 paragon.5090.name:1 "การชุมนุมของกลุ่มปฏิรูป"
 paragon.5090.desc:1 "นักโฆษณาชวนเชื่อฝ่ายปฏิรูปได้เริ่มแคมเปญบิดเบือนข้อมูลบนดาวเคราะห์ดวงหนึ่งของเรา กองกำลังฝ่ายจงรักภักดีกำลังเฝ้าระวังอย่างเต็มที่เพื่อควบคุมสถานการณ์ แต่กลุ่มผู้ประท้วงยังคงทวีความแข็งแกร่งขึ้นเรื่อยๆ"
 paragon.5095.name:0 "กลุ่มปฏิรูปถูกจับกุม"
 paragon.5095.desc:0 "ด้วยการทำงานอย่างหนักของสภา ผู้นำกลุ่มปฏิรูปจึงถูกจับกุมได้อย่างรวดเร็ว ตอนนี้ชะตากรรมของพวกเขาขึ้นอยู่กับความเมตตาของ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! แต่พวกเขามีผู้สนับสนุนมากมายในหมู่ประชากร และแนะนำว่าควรเจรจาเพื่อให้ได้ผลลัพธ์ที่เป็นประโยชน์ต่อทั้งสองฝ่าย แม้จะอยู่ภายใต้เงื่อนไขของเราก็ตาม"
 paragon.5095.a:0 "มาลองฟังข้อเสนอของพวกเขกัน"

 paragon.5200.name:1 "เตรียมการเจรจา"
 paragon.5200.desc:1 "หลังจากความขัดแย้งดำเนินมาหลายเดือน ถึงเวลาแล้วที่จะแก้ไขความแตกต่างของเราและพูดคุยกันว่าจะยุติการกบฏที่ไร้สาระนี้อย่างไร §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! ได้เรียกร้องให้มีการหยุดยิงเพื่อเจรจากับกลุ่มปฏิรูป การสู้รบทั้งหมดได้ยุติลง ขณะที่ทุกคนกำลังรอคอยผลลัพธ์ของการเจรจา"
 paragon.5201.name:1 "สุนทรพจน์"
 paragon.5201.desc:2 "$paragon.beginning.speech$\n\nเพื่อนพ้องชาว [Owner.GetSpeciesNamePlural] ทั้งหลาย! วันนี้ข้าอยากให้พวกท่านรู้ว่าข้าเปี่ยมไปด้วยความภาคภูมิใจ ในฐานะประชาชนคนหนึ่ง พวกเราได้มารวมตัวกัน และไม่ว่าจะมีความคิดเห็นที่แตกต่างกันอย่างไร เราก็ร่วมเผชิญหน้ากับดินแดนที่ไม่มีใครรู้จัก สร้างโลกใหม่ และก้าวขึ้นสู่ระดับความฉลาดล้ำเลิศจุดใหม่\n\nข้าต้องการจะรับรู้ถึงความเสียสละของพวกท่าน...\n\nข้าต้องการ...\n\n§H§Y[Root.Owner.Ruler.GetTitle] [Root.Owner.Ruler.GetRegnalName]§! จู่ๆ ก็เซถลาออกจากสายตาไปอย่างกะทันหัน§!"
 paragon.5201.a:1 "เกิดอะไรขึ้น?"
 paragon.5202.name:0 "การล้มลง"
 paragon.5202.regular:1 "ข่าวแพร่สะพัดไปท่ามกลางประชากรอย่างรวดเร็ว §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! กำลังจะเสียชีวิต แม้จะไม่ทราบสาเหตุของอาการป่วยปริศนานี้ แต่ก็ดูเหมือนว่าจะยังไม่ถึงแก่ชีวิตในทันที\n\nในตอนนี้ §Y[Ruler.GetRegnalName]§! ยังคงปฏิบัติหน้าที่ในตำแหน่งต่อไปได้ อย่างไรก็ตาม จำเป็นต้องใช้วิธีการที่ไม่ปกติเพื่อยืดชีวิตของผู้นำเราออกไปให้ได้นานที่สุด"
 paragon.5202.synth:1 "ข่าวแพร่สะพัดไปท่ามกลางประชากรอย่างรวดเร็ว โครงข่ายประสาทของ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! กำลังล้มเหลว แม้สาเหตุของข้อผิดพลาดปริศนานี้จะยังไม่ได้รับการชี้แจงจากผู้เชี่ยวชาญที่ดีที่สุดของเรา แต่มันก็ยังไม่ถึงขั้นหยุดทำงานในทันที\n\nในตอนนี้ §Y[Ruler.GetRegnalName]§! ยังคงปฏิบัติหน้าที่ในตำแหน่งต่อไปได้ อย่างไรก็ตาม จำเป็นต้องใช้วิธีการที่ไม่ปกติเพื่อซ่อมแซมและยืดอายุการทำงานของผู้นำเราออกไปให้ได้นานที่สุด"
 paragon.5202.a:2 "มันต้องมีอะไรบางอย่างที่เราทำได้"
 paragon.5202.a.tt:1 "§Lเราจะสำรวจทุกหนทางที่เป็นไปได้เพื่อช่วยชีวิต [Ruler.GetName]§!"
 paragon.5202.b:2 "ให้ [Ruler.GetTitle] ได้พักผ่อนอย่างที่สมควรได้รับ"
 paragon.5202.b.tooltip:1 "§Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! จะเสียชีวิต"

 paragon.5210.name:1 "ทางแยก"
 paragon.5210.desc:1 "ถึงเวลาที่ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! จะกลับมากุมบังเหียนรัฐอีกครั้ง ด้วยบารมีแห่งการสืบทอดสายเลือดของ $leader_trait_legendary_leader$ ทำให้ [Ruler.GetName] ยังคงเป็นบุคคลที่มีเสน่ห์ดึงดูดใจผู้คน ทว่า ด้วยอำนาจที่เพิ่มขึ้นของกลุ่มปฏิรูปและสงครามกลางเมืองเต็มรูปแบบที่กำลังปรากฏขึ้นที่ขอบฟ้า [Ruler.GetTitle] จึงได้ออกประกาศเรียกร้องการเจรจา\n\n[Ruler.GetName] รายงานว่าการเจรจาในช่วงแรกเป็นไปอย่างตึงเครียด ตัวแทนจากทุกมุมของ [Owner.GetName] ได้ยื่นข้อเรียกร้องของพวกเขาก่อนที่จะรับฟังคำแถลงอย่างเป็นทางการของ [Ruler.GetTitle] ของเรา ซึ่งระบุถึงข้อผ่อนปรนที่เราอาจจะยอมรับได้"
 paragon.5210.a:1 "เราจะให้สิ่งที่พวกเขาต้องการ"
 paragon.5210.b:1 "เราจะไม่ยอมอ่อนข้อใดๆ ทั้งสิ้น"
 paragon.5210.b.tt:1 "ดาวเคราะห์ที่มีตัวปรับเปลี่ยน §Yแนวโน้มประชาธิปไตย§! จะก่อกบฏ"
 paragon.5210.c:1 "พวกโง่เขลาที่ยอมเชื่อในการเจรจาเหล่านี้"
 paragon.5210.c.tt:0 "ประชากรทุกคนที่มีจริยธรรมแบบเสมอภาคจะถูกสังหาร!\n$paragon.leader.delusion.negative$"
 paragon.5210.d:0 "พอที! ผู้นำของเราล้มเหลวในการนำทางเราแล้ว!"
 paragon.5210.d.tt:2 "§Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! จะถูกลอบสังหาร\n§Rประเทศชาติจะแตกแยกและสงครามกลางเมืองจะเริ่มต้นขึ้น§!\n§Lประเทศชาติกำลังอยู่ในความระส่ำระสาย ประชาชนปรารถนาอย่างยิ่งที่จะจุดประกายไฟแห่งการปฏิวัติ เราได้ยินเสียงเรียกร้องของพวกเขาแล้ว ทรราชทุกคนต้องถูกปลดออกจากตำแหน่ง!§!"
 paragon.5210.e:0 "เราควรปกครองกาแล็กซีนี้เพียงผู้เดียว!"

 paragon.5211.name:0 "สู่ชัยชนะ!"
 paragon.5211.desc:1 "โซ่ตรวนของเราถูกทำลายแล้ว! ผู้กดขี่และทรราชทั้งหลายถูกโค่นล้มลงไปแล้ว เราอาจเป็นผู้จุดประกายให้เกิดสงครามครั้งนี้ แต่ทุกสิ่งที่เราทำล้วนเพื่อประโยชน์สุขของประชาชน เราจะต้องผ่านพ้นมันไปได้!"
 paragon.5211.a:0 "เราต่อสู้เพื่อรักษาหนทางของเราไว้!"
 paragon.5211.b:0 "เราต่อสู้เพื่อเปลี่ยนแปลงหนทางของเรา!"
 paragon.5213.name:0 "สงครามกลางเมืองสิ้นสุดลง"
 paragon.5213.desc:1 "เมื่อเถ้าถ่านแห่งความขัดแย้งภายในประเทศมอดดับลง สังคมใหม่กำลังก่อตัวขึ้นจากกองเถ้าถ่าน พร้อมที่จะนำพาประกายไฟแห่งการปฏิวัติไปสู่หมู่ดาว"
 paragon.5213.a:0 "เราจะฟื้นฟูสิ่งที่ถูกทำลายขึ้นมาใหม่"
 paragon.5213.b:0 "เราจำเป็นต้องปกป้องคุ้มครองสังคมของเรา!"
 paragon.5213.c:1 "สงครามกลางเมืองทำให้เราแข็งแกร่งและเด็ดเดี่ยวขึ้น"
 paragon.5213.d:1 "เราต้องให้ความสำคัญกับสันติภาพและความรุ่งเรืองเป็นอันดับแรก"
 paragon.5213.e:1 "จากความพินาศย่อยยับนี้ เราจะเติบโตขึ้น"
 paragon.5213.f:1 "เราต้องแสวงหาการตื่นรู้"

 psionic.trait.b:0 "\nประภาคารพลังจิต"
 psionic.trait.c:0 "\nการสื่อสารทางจิตข้ามดาว"
 psionic.trait.d:0 "\nเนตรสรรพทัศน์"
 psionic.trait.e:1 "\nการสะกดจิตด้วยเสียง"
 cybernetic.trait.b:0 "\nเครื่องส่งสัญญาณถาวร"
 cybernetic.trait.c:0 "\nเครื่องยับยั้งการนอนหลับ"
 cybernetic.trait.d:0 "\nระบบเชื่อมต่อยุทธวิธี"
 cybernetic.trait.e:0 "\nเครื่องวิเคราะห์การรับรู้"
 synthetic.trait.b:0 "\nเครือข่ายการเรียนรู้ร่วมกัน"
 synthetic.trait.c:0 "\nระบบคำนวณการรบ"
 synthetic.trait.d:0 "\nอัลกอริทึมการรีไซเคิล"
 synthetic.trait.e:0 "\nฐานข้อมูลวิศวกรรมขนาดใหญ่"
 genetic.trait.b:0 "\nการพัฒนาของสมอง"
 genetic.trait.c:0 "\nการตัดต่อยีน"
 genetic.trait.d:0 "\nเสน่ห์ดึงดูดที่เกินจะต้านทาน"
 genetic.trait.e:0 "\nการแบ่งความสนใจ"
 genetic.trait.a:1 "\nการฟื้นฟูดีเอ็นเอ"
 synthetic.trait.a:0 "\nอัลกอริทึมของผู้เผยพระวจนะ"
 cybernetic.trait.a:0 "\nเครื่องปรับแต่งความน่าจะเป็น"
 psionic.trait.a:0 "\nความเข้าใจในสิ่งที่ไม่รู้"
 paragon.have.utopia.ascensions:0 "\n§Gปลดล็อกข้อได้เปรียบการรุ่งโรจน์ของเผ่าพันธุ์แล้ว§!"

 paragon.5220.name:0 "การเจรจาสิ้นสุดลง"
 paragon.5220.desc.peace:1 "ในคืนก่อนการเจรจา เป็นที่ชัดเจนว่าทั้งสองฝ่ายต่างเหนื่อยหน่ายกับสงครามและต้องการที่จะตกลงกันมากกว่า เราไม่อาจล่วงรู้ผลกระทบระยะยาวที่จะตามมาได้ แต่ในขณะนี้พวกเราได้รวมกันเป็นหนึ่งเดียวแล้ว"
 paragon.5220.a:1 "เราได้ชัยชนะ"
 paragon.5220.a.tt:1 "§Lเราจะจัดการกับความเห็นที่แตกต่างด้วยกำลังหรือการเจรจา นับจากนี้ไป พวกเราได้รวมกันเป็นหนึ่งเดียวอย่างแท้จริงแล้ว§!"
 paragon.5221.name:0 "สงครามกลางเมือง"
 paragon.5220.desc.war:1 "ในคืนก่อนการเจรจา เป็นที่ชัดเจนว่าทั้งสองฝ่ายไม่มีวันหาข้อตกลงร่วมกันได้ แม้กระทั่งในตอนนี้ กองกำลังกบฏกำลังรวมตัวกัน และสงครามได้ถูกประกาศขึ้นแล้ว ประเทศชาติของเราต้องเผชิญกับความแตกแยกอีกครั้งหนึ่ง"
 paragon.5221.a:0 "พวกเขาจะยอมสยบแต่โดยดี"
 paragon.5221.a.tt:0 "ดาวเคราะห์ที่มีตัวปรับเปลี่ยน §Yแนวโน้มประชาธิปไตย§! จะกลายเป็นแกนกลางของจักรวรรดิกบฏ"
 paragon.5222.name:0 "การประหารชีวิต"
 paragon.5222.desc:0 "การเรียกร้องเจรจาเป็นกับดักที่สมบูรณ์แบบสำหรับผู้นำกลุ่มปฏิรูป เมื่อมารวมตัวกันในที่เดียว พวกเขาก็ถูกจับกุมตัวได้อย่างง่ายดาย เราไม่รีรอที่จะรีดข้อมูลเกี่ยวกับแหล่งกบดาน ผู้ติดตาม และทรัพย์สินของพวกเขา ฝ่ายต่อต้านที่เหลืออยู่ถูกจัดการอย่างรวดเร็ว โดยไม่ต้องมีการประนีประนอมหรือก่อสงครามกลางเมืองที่ต้องสูญเสียมูลค่ามหาศาล สมาชิกกลุ่มปฏิรูปทุกคนถูกตัดสินประหารชีวิตตามพระบรมราชโองการของ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§!"
 paragon.5222.a:0 "เราถอยกลับไม่ได้แล้ว ดำเนินการต่อเลย"
 paragon.5223.name:0 "การปกครองเดียว"
 paragon.5223.desc:0 "เมื่อเถ้าถ่านแห่งความขัดแย้งภายในประเทศมอดดับลง สังคมใหม่กำลังก่อตัวขึ้นจากกองเถ้าถ่าน พร้อมที่จะนำพาประกายไฟแห่งปัญญาของ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! ไปสู่หมู่ดาว"
 paragon.5223.a:0 "หนึ่งประเทศ หนึ่งผู้ชี้นำ หนึ่งอนาคต"
 paragon.5226.name:0 "ดาวเคราะห์ดินแดนแห่งจิต"
 paragon.5226.desc:1 "เมื่อระยะแรกเสร็จสิ้น พลังงานจิตที่หมุนวนได้เข้ากลืนกินดาวเคราะห์และทำลายล้างพื้นผิวของมัน แม้ว่าตอนนี้จะเป็นไปไม่ได้ที่จะมีชีวิตรอดอยู่ที่นั่น แต่นักพลังจิตที่แข็งแกร่งที่สุดของเราได้รวมตัวกันเพื่อสร้างเกราะป้องกันวิหารที่จะใช้เป็นสถานที่สำหรับพิธีกรรมในระยะต่อไป ตอนนี้สิ่งที่เหลืออยู่คือการนำส่งพลังจิตจากเหล่าอาสาสมัครเข้าสู่ตัวของ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! การทำเช่นนี้จะช่วยเสริมสร้างความสามารถทางจิตของ §Y[Ruler.GetTitle]§! ของเราอย่างมาก"
 paragon.5227.name:0 "พิธีกรรมพลังจิต"
 paragon.5227.desc:1 "เครื่องสังเวยเริ่มต้น: §Rพลเมืองจำนวน [ROOT.paragon_origin_ascension] คน§!\nเครื่องสังเวยประจำทศวรรษที่จำเป็น: §Rพลเมืองจำนวน [ROOT.paragon_origin_ascension] คน§!\nพลังจิตที่เลือก: §G[Paragon_Origin_Ascension_Focus] [Paragon_Origin_Ascension_Trait1] [Paragon_Origin_Ascension_Trait2] [Paragon_Origin_Ascension_Trait3] [Paragon_Origin_Ascension_Trait4]§!\n\nนักโทรจิตที่แข็งแกร่งที่สุดของเรากำลังสยบพลังงานบ้าคลั่งที่กลืนกินดาวเคราะห์ พวกเขาจะส่งผ่านพลังงานเหล่านี้ไปยังใจกลางของวิหารที่ซึ่งผู้สมัครเข้ารับการสังเวยกำลังยืนรออยู่ ในไม่ช้าพิธีจะเริ่มต้นขึ้น และพลังจิตของเหล่าอาสาสมัครผู้กล้าหาญจะถูกดึงออกมาและนำทางเข้าสู่ §Y[Ruler.GetTitle]§! ยิ่งผู้คนถูกสังเวยมากเท่าไหร่ พลังจิตก็จะยิ่งแข็งแกร่งขึ้นเท่านั้น แต่เราต้องระวังอย่าให้เกินกว่าที่ §Y[Ruler.GetTitle]§! จะควบคุมได้ มิฉะนั้นเราอาจเสี่ยงที่จะเผชิญกับภัยพิบัติครั้งใหญ่หลวง\n\nเมื่อพิธีกรรมเสร็จสิ้นลง เราจำเป็นต้องส่งอาสาสมัครอย่างต่อเนื่องเพื่อป้องกันไม่ให้พลังงานทำลายล้างร่างกายของ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§!"
 paragon.5227.a:0 "ความเข้าใจในสิ่งที่ไม่รู้"
 paragon.5227.a.tt:1 "§L§Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! น่าจะได้รับโอกาสในการมองเห็นมิติอื่นๆ หรือแม้แต่เส้นเวลาอื่น ซึ่งจะช่วยเปิดกว้างจิตใจของ [Ruler.GetHerHis]§!\n\nมอบ §Gคุณลักษณะผู้ปกครอง§! แบบสุ่ม"
 paragon.5227.b:0 "ประภาคารพลังจิต"
 paragon.5227.b.tt:0 "§Lพลังงานที่เข้มข้นไหลผ่านเส้นเลือดของ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! แต่มันแทบจะไม่สามารถควบคุมไว้ในร่างกายเนื้อได้ พลังงานเหล่านี้กลับพุ่งเข้าใส่เหล่าอาสาสมัครในบริเวณใกล้เคียง เสริมสร้างพลังของพวกเขาก่อนที่จะถูกแผดเผาในเปลวเพลิงพลังจิต§!\n\nลูกเรือพลังจิตของเราจะใช้ประภาคารพลังจิตเพื่อเชื่อมต่อกับ §Y[Ruler.GetTitle]§! และควบคุมพลังนี้ โดยจะเพิ่ม §G$MOD_SHIP_SHIELD_HP_ADD$§! และ §G$MOD_SHIP_SHIELD_REGEN_ADD_PERC$§! ให้กับยานทุกลำ"
 paragon.5227.c:0 "การสื่อสารทางจิตข้ามดาว"
 paragon.5227.c.tt:0 "§Lพลังงานที่เข้มข้นไหลผ่านเส้นเลือดของ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! ซึ่งช่วยเสริมสร้างความตระหนักรู้ได้อย่างยอดเยี่ยม§!\n\nต้นหนพลังจิตของเราจะใช้อุปกรณ์ส่งสัญญาณนำทางจิตเพื่อเชื่อมต่อกับ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! และดูดซับพลังนี้ โดยจะเพิ่ม §G$MOD_SHIP_SPEED_MULT$§! และ §G$MOD_SHIP_DISENGAGE_CHANCE_MULT$§! ให้กับยานทุกลำ"
 paragon.5227.d:0 "เนตรสรรพทัศน์"
 paragon.5227.d.tt:0 "§Lพลังงานที่เข้มข้นไหลผ่านเส้นเลือดของ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! ปรับเปลี่ยนและบิดเบือนคุณลักษณะพื้นฐานของร่างกาย [Ruler.GetHerHis] เมื่อใดก็ตามที่สายตาอันแหลมคมของ [Ruler.GetHerHisCap] จับจ้องไปยังผู้เข้าร่วมพิธีกรรม เป็นที่ชัดเจนว่าความคิดของพวกเขาจะไม่เป็นความลับอีกต่อไป§!\n\n§Y[Ruler.GetRegnalName]§! สามารถเรียนรู้ที่จะควบคุมพลังนี้ โดยจะเพิ่ม §Gการลด $MOD_PLANET_CRIME_MULT$§! และ §Gการเข้ารหัส§! ให้กับจักรวรรดิ"
 paragon.5227.e:1 "การสะกดจิตด้วยเสียง"
 paragon.5227.e.tt:0 "§Lพลังงานที่เข้มข้นไหลผ่านเส้นเลือดของ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! เสริมสร้างกล่องเสียงของ [Ruler.GetHerHis] ด้วยพลังจิต สำหรับเหล่าอาสาสมัครแล้ว เสียงของ [Ruler.GetHerHis] นั้นทั้งสร้างความทุกข์ทรมานและทรงพลังในการโน้มน้าวใจอย่างยิ่ง§!\n\n§Y[Ruler.GetRegnalName]§! สามารถเรียนรู้ที่จะควบคุมพลังนี้ โดยจะเพิ่ม §G$tile_resource_unity_add$§! และ §G$MOD_POP_GOVERNMENT_ETHIC_ATTRACTION$§! ให้กับจักรวรรดิ"
 paragon.5227.f:0 "เสร็จสิ้นพิธีกรรม!"
 paragon.5227.f.tt:0 "สิ่งนี้จะยุติพิธีกรรมพร้อมกับตัวเลือกที่เลือกไว้ $paragon.leader.delusion.positive$"
 paragon.5230.name:0 "พลังงานเอ่อล้น"
 paragon.5230.desc:1 "ความยากลำบากครั้งนี้พิสูจน์แล้วว่าประสบความสำเร็จอย่างยิ่งใหญ่ ด้วยความอดทนแต่กำเนิดของพวกเขาและศักยภาพทางจิตที่ยอดเยี่ยมของเรา §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! จึงได้ฟื้นคืนชีพขึ้นมา! ทว่าอาจต้องใช้เวลาอีกสองสามปีก่อนที่เราจะสามารถส่งมอบประเทศชาติคืนให้แก่ผู้ปกครองที่ชอบธรรมได้"
 paragon.5236.name:0 "หัวใจดาวเคราะห์"
 paragon.5236.desc:0 "เราได้สกัดแกนกลางของดาวเคราะห์ ประมวลผลมัน และบรรจุมันไว้ในโครงร่างที่ใช้สสารมืดเพื่อสร้างพลังงานมหาศาลเมื่อเทียบกับขนาดที่กะทัดรัด ตอนนี้เราสามารถผลิตชิ้นส่วนไซเบอร์เนติกส์ที่ยอดเยี่ยมเพื่อเสริมสมรรถภาพของ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! และอาจจะรักษาเนื้อตัวและจิตใจของเขาได้ โดยแลกกับค่าใช้จ่ายเล็กน้อยในการจัดส่ง §Yสสารมืด§! เพิ่มเติมเพื่อให้โครงข่ายทำงานได้ต่อ"
 paragon.5237.name:0 "หัวใจแห่ง $leader_trait_legendary_leader$"
 paragon.5237.desc:1 "ค่าบำรุงรักษาการอัปเกรด: §Rสสารมืดจำนวน [ROOT.paragon_origin_ascension] ชิ้นต่อเดือน§!\nการเพิ่มประสิทธิภาพไซเบอร์เนติกส์ที่เลือก: §G[ROOT.Paragon_Origin_Ascension_Focus][Paragon_Origin_Ascension_Trait1][Paragon_Origin_Ascension_Trait2][Paragon_Origin_Ascension_Trait3][Paragon_Origin_Ascension_Trait4]§!\n\nโรงงานแห่งหนึ่งได้รับการสร้างขึ้นอย่างชัดเจนเพื่อการนี้ ในไม่ช้ามันจะเริ่มผลิตระบบไซเบอร์เนติกส์ที่ล้ำสมัยที่สุดเท่าที่เคยมีมา ทั้งหมดนี้เพื่อเพิ่มพลังให้กับ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! อันเป็นที่รักยิ่งของเรา ยิ่งเราติดตั้งการอัปเกรดมากเท่าใด เราก็ยิ่งต้องใช้สสารมืดมากขึ้นในแต่ละเดือนเพื่อประคองให้หัวใจนี้ทำงานได้ แต่เราต้องระวังอย่าให้มากเกินไป มิฉะนั้นร่างกายอาจสลายไปเนื่องจากความตึงเครียดอันมหาศาล"
 paragon.5237.a:0 "เครื่องปรับแต่งความน่าจะเป็น"
 paragon.5237.a.tt:0 "§L§Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! จะได้รับเครื่องปรับแต่งความน่าจะเป็นเฉพาะตัว ซึ่งช่วยให้เข้าใจวิธีการนำพาจักรวรรดิได้ดียิ่งขึ้น§!\n\nมอบ §Gคุณลักษณะผู้ปกครอง§! แบบสุ่ม"
 paragon.5237.b:0 "เครื่องส่งสัญญาณถาวร"
 paragon.5237.b.tt:1 "§Lการติดตั้งเครื่องส่งสัญญาณถาวรให้กับ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! จะทำให้สามารถส่งคำสั่งและกล่าวสุนทรพจน์แก่ประชาชนได้ง่ายขึ้นอย่างมาก§!\n\n§Y[Ruler.GetRegnalName]§! จะสามารถสื่อสารกับไซบอร์กพลเมืองคนใดก็ได้ในทันที ซึ่งจะเพิ่ม §G$MOD_POP_HAPPINESS$§! และ §Gผลผลิตของไซบอร์ก§!"
 paragon.5237.c:0 "เครื่องยับยั้งการนอนหลับ"
 paragon.5237.c.tt:1 "§Lเครื่องยับยั้งการนอนหลับแบบพิเศษจะช่วยให้ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! ใช้เวลานอนพักผ่อนน้อยลงและมีเวลาปกครองมากขึ้น§!\n\n§Y[Ruler.GetRegnalName]§! จะจัดการการประกาศใช้นโยบายได้ง่ายขึ้น โดยเพิ่ม §G$MOD_COUNTRY_EDICT_FUND_ADD$§! และ §G$mod_edicts_upkeep_mult$§!"
 paragon.5237.d:0 "ระบบเชื่อมต่อยุทธวิธี"
 paragon.5237.d.tt:1 "§Lระบบเชื่อมต่อยุทธวิธีแบบพิเศษช่วยให้ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! สามารถสั่งการกองทัพที่อยู่ห่างออกไปหลายล้านปีแสงได้โดยไม่มีประสิทธิภาพลดลงเลย§!\n\n§Y[Ruler.GetRegnalName]§! จะให้คำปรึกษากับกองทัพบกและวางแผนปฏิบัติการภาคพื้นดินที่อาจเกิดขึ้นด้วยตนเอง ซึ่งจะเพิ่ม §G$MOD_ARMY_HEALTH$§! และ §G$MOD_ARMY_DAMAGE_MULT$§!"
 paragon.5237.e:0 "เครื่องวิเคราะห์การรับรู้"
 paragon.5237.e.tt:0 "§Lเครื่องวิเคราะห์การรับรู้แบบพิเศษที่ปรับแต่งสำหรับ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! จะช่วยให้สามารถควบคุมการรบในอวกาศที่ดำเนินการโดยนักบินที่มีอุปกรณ์ฝังตัวรับสัญญาณที่สอดคล้องกันได้ดียิ่งขึ้น§!\n\n§Y[Ruler.GetRegnalName]§! จะใช้ความเชี่ยวชาญอันกว้างขวางของเขาเพื่อช่วยเหลือทัพเรือในการปรับเทียบระหว่างการต่อสู้ โดยเพิ่ม §G$MOD_SHIP_ACCURACY_ADD$§! และ §G$MOD_SHIP_TRACKING_ADD$§! ให้กับยานทุกลำ"
 paragon.5237.f:0 "เสร็จสิ้นปฏิบัติการ!"
 paragon.5237.f.tt:0 "สิ่งนี้จะเสร็จสิ้นปฏิบัติการพร้อมกับตัวเลือกที่เลือกไว้ $paragon.leader.delusion.positive$"
 paragon.5240.name:0 "ฉลาดขึ้น เร็วขึ้น แข็งแกร่งขึ้น"
 paragon.5240.desc:1 "ปฏิบัติการของเราประสบความสำเร็จ! แหล่งพลังงานใหม่สำหรับการเสริมไซเบอร์เนติกส์ทั้งหมดได้รับการพิสูจน์แล้วว่ามีประสิทธิภาพและเสถียรภาพสูง ช่วยให้ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! กลับมาเดินเคียงข้างประชาชนได้อีกครั้ง"
 paragon.5246.name:0 "โครงร่างแห่งราชัน"
 paragon.5246.desc:0 "เราสามารถสร้างโครงร่างที่เหมาะสมรวมถึงสมองโพซิตรอนิกส์ที่ล้ำสมัยเพื่อรองรับจิตสำนึกของ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! ตอนนี้สิ่งที่เหลืออยู่คือการสแกนสมองของเขาและดำเนินการอัปโหลดและตั้งโปรแกรมใหม่"
 paragon.5247.name:0 "การตั้งโปรแกรมจิต"
 paragon.5247.desc:1 "ค่าบำรุงรักษาการอัปเกรด: §Rโลหะมีชีวิตจำนวน [ROOT.paragon_origin_ascension] ชิ้นต่อเดือน§!\nการอัปเกรดโปรแกรมที่เลือก: §G[ROOT.Paragon_Origin_Ascension_Focus][Paragon_Origin_Ascension_Trait1][Paragon_Origin_Ascension_Trait2][Paragon_Origin_Ascension_Trait3][Paragon_Origin_Ascension_Trait4]§!\n\nโรงงานแทบจะไม่มีคนงานที่มีชีวิตอยู่เลย มีเพียงแพลตฟอร์มที่มีชีวิตจิตใจไม่กี่ตัวที่คอยดูแลเครื่องจักรที่ละเอียดอ่อน จิตสำนึกของ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! ถูกจัดเก็บไว้ในเครือข่ายเรียบร้อยแล้ว พร้อมที่จะรับการอัปเกรดที่จำเป็น เราต้องระมัดระวังไม่ให้ตั้งโปรแกรมใหม่มากเกินไป มิฉะนั้นพลังประมวลผลที่จำเป็นจะสูงเกินไป แม้กระทั่งสำหรับยูนิตที่ทันสมัยที่สุดของเรา"
 paragon.5247.a:0 "อัลกอริทึมของผู้เผยพระวจนะ"
 paragon.5247.a.tt:1 "§Lเราจะติดตั้งอัลกอริทึมพิเศษของผู้เผยพระวจนะลงใน §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! ซึ่งช่วยให้เข้าใจเกี่ยวกับการเป็นผู้นำได้ดีขึ้น§!\n\nมอบ §Gคุณลักษณะผู้ปกครอง§! แบบสุ่ม"
 paragon.5247.b:0 "เครือข่ายการเรียนรู้ร่วมกัน"
 paragon.5247.b.tt:1 "§Lด้วยการนำเครือข่ายการเรียนรู้ร่วมกันมาใช้ทั่วทั้งจักรวรรดิ เรากำลังเปิดโอกาสให้ผู้นำคนอื่นๆ ได้รับประโยชน์จากความรู้อันกว้างขวางของ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§!§!\n\nสิ่งนี้จะช่วยเสริมสร้างความสามารถในการเรียนรู้ของผู้นำคนอื่นๆ โดยเพิ่ม §G$MOD_LEADER_SPECIES_EXP_GAIN$§! และ §Gค่าบำรุงรักษาผู้นำ§!"
 paragon.5247.c:0 "ระบบคำนวณการรบ"
 paragon.5247.c.tt:1 "§Lการคำนวณการรบที่เหมาะสมต้องใช้พลังประมวลผลมหาศาล แต่ด้วยสมองโพซิตรอนิกส์ที่ล้ำสมัยของ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! กองยานของเราจึงพร้อมสำหรับปฏิบัติการการรบแล้ว§!\n\nสิ่งนี้จะเพิ่มประสิทธิภาพให้กับกองยานทั้งหมดของเรา โดยเพิ่ม §G$MOD_SHIP_FIRE_RATE_MULT$§! และ §G$MOD_SHIP_WEAPON_DAMAGE$§! ให้กับยานทุกลำ"
 paragon.5247.d:0 "อัลกอริทึมการรีไซเคิล"
 paragon.5247.d.tt:1 "§Lการติดตั้งอัลกอริทึมการรีไซเคิลแบบพิเศษอาจช่วยเพิ่มขีดความสามารถของ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! ในการคิดหาวิธีการผลิตที่ยั่งยืนยิ่งขึ้น ช่วยลดปริมาณของเสียที่อาจเกิดขึ้นได้§!\n\nสิ่งนี้จะช่วยให้เราจ่ายค่าบำรุงรักษาเขตอุตสาหกรรมและสิ่งก่อสร้างน้อยลงอย่างมาก โดยลด §G$mod_planet_districts_upkeep_mult$§! และ §G$mod_planet_buildings_upkeep_mult$§!"
 paragon.5247.e:0 "ฐานข้อมูลวิศวกรรมขนาดใหญ่"
 paragon.5247.e.tt:1 "§Lด้วยการดาวน์โหลดฐานข้อมูลวิศวกรรมทั้งหมดของเราลงในสมองของ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! เราจะสามารถเพิ่มพูนความรู้ทางเทคนิคของเราได้อย่างมีนัยสำคัญ§!\n\n§Y[Ruler.GetRegnalName]§! จะคิดค้นเทคนิคที่มีประสิทธิภาพมากขึ้นอย่างมาก โดยเพิ่ม §G$mod_MACHINE_species_trait_points_add$§! และ §G$mod_MACHINE_species_trait_picks_add$§!"
 paragon.5247.f:0 "เสร็จสิ้นปฏิบัติการ!"
 paragon.5247.f.tt:0 "สิ่งนี้จะเสร็จสิ้นปฏิบัติการพร้อมกับตัวเลือกที่เลือกไว้ $paragon.leader.delusion.positive$"
 paragon.5250.name:0 "วิญญาณในจักรกล"
 paragon.5250.desc:1 "งานของเราเสร็จสิ้นแล้ว ด้วยร่างกายใหม่และพลังการรับรู้ที่ได้รับการเสริมพลังอย่างมหาศาล §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! พร้อมที่จะกลับมาปฏิบัติหน้าที่ของตนแล้ว"
 paragon.5256.name:0 "ความเข้ากันได้ของดีเอ็นเอ"
 paragon.5256.desc:1 "ทีมวิทยาศาสตร์ของเราได้ระบุตัวตนของผู้สมัครรับการคัดเลือกหลายรายที่มีรหัสพันธุกรรมที่สามารถใช้การได้เพื่อเสริมประสิทธิภาพให้แก่ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! เมื่อขั้นตอนเสร็จสิ้น §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! จะไม่ต้องแบกรับภาระแห่งความเสื่อมถอยของการร่วงโรยตามวัยอีกต่อไป การปรับแต่งเพิ่มเติมจะสามารถทำได้ในอนาคต แน่นอนว่าต้องใช้วัตถุดิบพันธุกรรมใหม่เพื่ออัปเกรดลำดับดีเอ็นเอของผู้นำ"
 paragon.5257.name:0 "การจัดการยีน"
 paragon.5257.desc:1 "เครื่องสังเวยเริ่มต้น: §Rบุคคลที่เข้ากันได้ทางพันธุกรรมจำนวน [ROOT.paragon_origin_ascension] คน§!\nเครื่องสังเวยประจำทศวรรษที่จำเป็น: §Rพลเมืองจำนวน [ROOT.paragon_origin_ascension] คน§!\nพลังพันธุกรรมที่เลือก: §G[Paragon_Origin_Ascension_Focus][Paragon_Origin_Ascension_Trait1][Paragon_Origin_Ascension_Trait2][Paragon_Origin_Ascension_Trait3][Paragon_Origin_Ascension_Trait4]§!\n\nถังปรับเปลี่ยนลำดับยีนแบบพิเศษได้รับการจัดเตรียมเรียบร้อยแล้ว และปัญญาชนที่เก่งที่สุดของเรากำลังควบคุมดูแลปฏิบัติการ\n\nผู้นำที่เข้ากันได้จะถูกสลายเพื่อกู้คืนวัสดุพันธุกรรม จากนั้นลำดับดีเอ็นเอบางส่วนของพวกเขาจะถูกฉีดเข้าสู่ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! เราสามารถใช้บุคคลที่เข้ากันได้เพิ่มเติมเพื่อเสริมกระบวนการนี้ ซึ่งจะทำให้เกิดการกลายพันธุ์ที่ควบคุมได้เพื่อช่วยให้ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! ฟื้นฟูสภาพร่างกายได้เร็วยิ่งขึ้นไปอีก แต่เราต้องระวังอย่าให้มากเกินไป"
 paragon.5257.a:0 "การฟื้นฟูดีเอ็นเอ"
 paragon.5257.a.tt:1 "§Lเราสามารถย้อนกระบวนการชราภาพได้ สมองที่หนุ่มสาวขึ้นสำหรับ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! จะช่วยเสริมสร้างความสามารถในการรับรู้ของพวกเขา ด้วยภูมิปัญญาจากประสบการณ์และความกระฉับกระเฉงของวัยหนุ่มสาว ทุกสิ่งก็เป็นไปได้ทั้งสิ้น§!\n\nมอบ §Gคุณลักษณะผู้ปกครอง§! แบบสุ่ม"
 paragon.5257.b:0 "การพัฒนาของสมอง"
 paragon.5257.b.tt:1 "§Lเมื่อพูดถึงศูนย์กลางการรับรู้ของสมอง ยิ่งใหญ่ก็ยิ่งดี เราสามารถกระตุ้นการเติบโตต่อไปในตัว §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! ได้§!\n\nด้วยพลังแห่งการจดจ่อและมีเหตุผลที่เพิ่มขึ้น §Y[Ruler.GetRegnalName]§! สามารถช่วยเหลือนักวิทยาศาสตร์ของเราในภารกิจศึกษาดินแดนที่ไม่รู้จัก โดยเพิ่ม §G$MOD_LEADER_SPECIES_EXP_GAIN$§! และ §G$MOD_COUNTRY_ALL_TECH_RESEARCH_SPEED$§! ของเรา"
 paragon.5257.c:0 "การตัดต่อยีน"
 paragon.5257.c.tt:1 "§Lด้วยเทคนิคการตัดต่อยีนขั้นสูงของเรา ตอนนี้เราสามารถสกัดลำดับเฉพาะจาก §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! เพื่อเรียนรู้ว่าอะไรทำให้ผู้ปกครองของเรามีความพิเศษ§!\n\nการนำความรู้นี้ไปปรับใช้กับพลเมืองทั่วไปน่าจะสร้างผลลัพธ์ที่คุ้มค่า โดยเพิ่ม §G$MOD_ARMY_HEALTH$§! และ §Gผลผลิตของแรงงาน§!"
 paragon.5257.d:0 "เสน่ห์ดึงดูดที่เกินจะต้านทาน"
 paragon.5257.d.tt:1 "§Lเราสามารถพัฒนาสารกระตุ้นฟีโรโมนและเสริมความงามเพื่อสร้างร่างกายที่สมบูรณ์แบบไร้สิ่งต้านทานให้กับ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§!§!\n\nสำหรับชาว §Y[Owner.GetSpeciesName]§! แล้ว การไม่เห็นด้วยกับ §Y[Ruler.GetRegnalName]§! จะแทบเป็นไปไม่ได้เลย ความเข้ากันได้ทางเคมีดังกล่าวระหว่างผู้ปกครองและรัฐบริวารจะเพิ่ม §G$MOD_COUNTRY_LEADER_CAP_ADD$§! และ §G$MOD_FACTION_APPROVAL$§! ให้กับจักรวรรดิ"
 paragon.5257.e:0 "การแบ่งความสนใจ"
 paragon.5257.e.tt:1 "§Lการจัดแบ่งส่วนของสมองและพับพวกมันแยกออกเป็นส่วนอิสระน่าจะช่วยให้ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! สามารถมุ่งเน้นไปที่เป้าหมายที่แตกต่างกันได้หลายประการในเวลาเดียวกัน§!\n\nเราสามารถนำกระบวนการนี้ไปปรับใช้กับนักบินและนักยุทธศาสตร์ของเรา โดยเพิ่ม §Gประสิทธิภาพการป้องกันจุดปะทะ§! และ §G$MOD_SHIP_EVASION_MULT$§! ให้กับยานทุกลำ"
 paragon.5257.f:0 "เสร็จสิ้นปฏิบัติการ!"
 paragon.5257.f.tt:0 "สิ่งนี้จะเสร็จสิ้นปฏิบัติการพร้อมกับตัวเลือกที่เลือกไว้ $paragon.leader.delusion.positive$"
 paragon.5260.name:0 "จุดสูงสุดของวิวัฒนาการ"
 paragon.5260.desc:1 "การทดลองของเราพิสูจน์แล้วว่าผลิดอกออกผล และบรรลุรูปลักษณ์ที่สมบูรณ์แบบของ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! แล้ว บัดนี้ เมื่อ [Ruler.GetTitle] ของเราได้กลับมาอยู่ท่ามกลางประชากรผู้จงรักภักดีของ [Ruler.GetHerHis] ดวงดาวทั้งหลายก็รอให้เราไปครอบครอง!"

 paragon.5265.name:0 "ขยายขอบเขตสติปัญญา"
 paragon.5265.desc:1 "ด้วยเครื่องสังเวยของเรา เราสามารถผลักดันขีดความสามารถของ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! ในการนำพาประเทศชาติให้ก้าวล้ำเกินขอบเขต คำถามคือ: คุณลักษณะใดที่สำคัญที่สุดสำหรับผู้นำที่ดี? และการเติบโตใหม่นี้ควรได้รับการชี้นำไปในทิศทางใด?"
 paragon.5265.a:0 "ความรู้"
 paragon.5265.a.tt:0 "§Lความรู้คือทรัพย์สมบัติอันล้ำค่าสูงสุด§!"
 paragon.5265.b:0 "ความบริสุทธิ์"
 paragon.5265.b.tt:1 "§Lท้ายที่สุดแล้ว เผ่าพันธุ์ที่สมบูรณ์แบบจะก่อให้เกิดประเทศชาติที่บริสุทธิ์§!"
 paragon.5265.c:0 "ความแข็งแกร่ง"
 paragon.5265.c.tt:0 "§Lมีเพียงแต่อำนาจเท่านั้นที่จะปกครองประเทศชาติอย่างเราได้§!"
 paragon.5265.d:0 "ภูมิปัญญา"
 paragon.5265.d.tt:0 "§Lหากปราศจากภูมิปัญญา ความรู้ทั้งหมดในโลกนี้ก็ไร้ความหมาย§!"
 paragon.5265.e:0 "ความน่าเกรงขาม"
 paragon.5265.e.tt:1 "§Lผู้ปกครองที่ไม่มีบารมี ย่อมไม่มีผู้สนับสนุนมากนัก§!"
 paragon.5265.f:0 "การเปิดกว้าง"
 paragon.5265.f.tt:0 "§Lการยอมรับผู้อื่นหมายถึงการมีพันธมิตรที่มากขึ้นเพื่อปกป้องประเทศชาติของเรา§!"
 paragon.5265.g:0 "ความยับยั้งชั่งใจ"
 paragon.5265.g.tt:0 "§Lความแข็งแกร่งที่แท้จริงคือการไม่ใช้อำนาจนั้น§!"

 paragon.5270.name:0 "จักรวรรดิจงเจริญ!"
 paragon.5270.desc:1 "$paragon.beginning.speech$\n\nเมื่อกลับมาจากขอบเหวแห่งความตาย สุนทรพจน์ของผู้ชี้นำของเราเต็มไปด้วยความหวังและความซาบซึ้ง หลังจากกล่าวขอบคุณพลเมืองและนักวิทยาศาสตร์ที่ช่วยให้ปฏิบัติการอันน่าเหลือเชื่อนี้สำเร็จลุล่วงได้ [Ruler.GetName] ก็ได้พูดถึงอนาคต: ว่า [Ruler.GetSheHe] นั้นแข็งแกร่งกว่าที่เคย พร้อมที่จะกลับมานำทางประเทศชาติอันรุ่งโรจน์ของเราอีกครั้ง พวกเราร่วมกันเอาชนะผู้ทรยศและกบฏ และพวกเราจะนำความรุ่งโรจน์และความมั่งคั่งมาสู่พลเมืองทุกคน บนโลกทุกใบ! ขอความรุ่งโรจน์จงมีแด่ [Owner.GetName]! ขอความรุ่งโรจน์จงมีแด่ [Owner.GetSpeciesNamePlural]!\n\nและขอความรุ่งโรจน์จงมีแด่ประมุขผู้ชี้นำ\n\n$paragon.ending.speech$"
 paragon.5270.a:0 "เพื่อความรุ่งโรจน์!"
 paragon.5270.a.tt:0 "§Lขอความรุ่งโรจน์จงมีแด่ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§!! ขอความรุ่งโรจน์จงมีแด่ §Y[Owner.GetName]§!! ขอความรุ่งโรจน์จงมีแด่ §Y[Owner.GetSpeciesName]§!!§!"
 paragon.5270.b:0 "ถึงเวลาแล้วที่ผู้ชี้นำจะกลับมากุมบังเหียน!"

#Ruler Insights
 paragon.5305.name:0 "ความเข้าใจการปรับสภาพดาว"
 paragon.5305.desc:0 "ปีที่ผ่านมาได้รับความรุ่งเรืองและเสถียรภาพอันไร้ที่ติ เนื่องจากนักวิทยาศาสตร์ที่มีพรสวรรค์ที่สุดของเรา ในการแสวงหาโลกใหม่เพื่อการเติบโตและพัฒนา พวกเขาทำสิ่งหนึ่งที่ภายใต้ความเข้าใจเกี่ยวกับชีววิทยาคนต่างด้าวในปัจจุบันของเราเชื่อว่าเป็นไปไม่ได้สำเร็จ: พวกเขาสามารถปลูกพืชและสัตว์พื้นเมืองของเราลงในดาวเคราะห์ต่างดาว และเปลี่ยนสภาพมันให้เหมาะสมกับประชากรของเราผ่านการปรับปรุงดินระดับใหญ่หลวง\n\nแม้ว่าการจำลองความสำเร็จนี้ขึ้นมาใหม่ในขณะนี้จะเป็นไปได้ยาก เนื่องจากดาวเคราะห์ที่เปลี่ยนไปนั้นค่อนข้างมีความเฉพาะตัวสูง แต่มันแสดงให้เห็นว่าเมื่อเวลาผ่านไป เราจะสามารถปรับปรุงและดัดแปลงกระบวนการนี้ให้เข้ากับโลกอื่นๆ ได้\n\nจนกว่าจะถึงตอนนั้น เราสามารถจัดสรรงบประมาณเพื่อสร้างความเติบโตแก่จักรวรรดิในด้านอื่นๆ ได้"
 paragon.5310.name:0 "ความเข้าใจการสร้างยาน"
 paragon.5310.desc:1 "กองทัพเรือของเราคือปราการหลักในการป้องกัน §Y[Root.Owner.Ruler.GetTitle]§! ได้ประกาศสร้างยานลำใหม่ที่ได้รับทุนสนับสนุนจากรัฐเพื่อเสริมกำลังรบของกองเรือเรา ยานธงลำนี้จะนำทางเราไปสู่ยุคสมัยอันรุ่งโรจน์ บดขยี้ทุกคนที่ขวางทางเรา! ในไม่ช้ายานลำนี้จะถูกปล่อยตัว และเราจะเฉลิมฉลองกัน\n\nตอนนี้เราสามารถจัดสรรงบประมาณเพื่อพัฒนาจักรวรรดิในด้านอื่นๆ ได้"
 paragon.5310.tt:0 "ยานลาดตระเวนทดลองได้เข้าร่วมกองเรือแล้ว!"
 paragon.5315.name:0 "ความก้าวหน้าทางวิทยาศาสตร์"
 paragon.5315.desc:1 "วิทยาศาสตร์คือกุญแจสู่อนาคตที่ดีและสดใสยิ่งขึ้น ด้วยแรงจูงใจใหม่ นักวิทยาศาสตร์ของเรากำลังสร้างสรรค์ผลงานที่ก้าวหน้ามากกว่าครั้งใดๆ ความคืบหน้านี้ได้รับการรับรองโดย §Y[Root.Owner.Ruler.GetTitle]§! พร้อมด้วยการมอบเหรียญเกียรติยศแก่ผู้มีผลงานดีเด่นแก่นักวิทยาศาสตร์ที่ได้รับเลือก\n\nบัดนี้เราสามารถหันไปมุ่งเน้นความพยายามในการขยายตัวด้านอื่นๆ ได้แล้ว"
 paragon.5320.name:0 "การนำด้วยแบบอย่าง"
 paragon.5320.desc:1 "§Y[Root.Owner.Ruler.GetTitle]§! คือแบบอย่างสำหรับทุกคน นำทางพวกเราไปท่ามกลางหมู่ดาว ด้วยผู้นำที่เข้มแข็งที่กุมบังเหียน เจ้าหน้าที่ของเราจึงภูมิใจที่ได้ปรนนิบัติและมุ่งมั่นสู่ความเป็นเลิศ\n\nบัดนี้เราสามารถหันไปมุ่งเน้นความพยายามในการขยายตัวด้านอื่นๆ ได้แล้ว"
 paragon.5325.name:0 "ฐานทัพอวกาศทดลอง"
 paragon.5325.desc:1 "รายงานเกี่ยวกับโครงการก่อสร้างใหม่กำลังส่งผลกระทบอย่างลึกซึ้งต่อขวัญและกำลังใจของสาธารณชน เมื่อผ่านพ้นค่าใช้จ่ายในการผลิตไปแล้ว เราตั้งตารอคอยที่จะได้เห็นความสำเร็จของผลงานวิศวกรรมอันน่าเหลือเชื่อนี้\n\nบัดนี้เราสามารถหันไปมุ่งเน้นความพยายามในการขยายตัวด้านอื่นๆ ได้แล้ว"
 paragon.5330.name:1 "โลหะมีชีวิต"
 paragon.5330.desc:1 "เราได้ค้นพบสิ่งต่างๆ มากมายผ่านความก้าวหน้าทางเทคโนโลยีและวิทยาศาสตร์ แต่เรายังคงมีเรื่องให้เรียนรู้อีกมาก ทีมสำรวจของเราพบสารพิเศษชนิดหนึ่งที่มีคุณสมบัติเป็นทั้งของเหลวและโลหะ ยิ่งไปกว่านั้น สารชนิดนี้ดูเหมือนจะมีชีวิต เรายังไม่รู้วิธีทำความเข้าใจหรือนำวัสดุนี้มาใช้ประโยชน์ แต่มันน่าสนใจอย่างยิ่ง\n\nจนกว่าเราจะรู้ข้อมูลเพิ่มเติม เราควรหันไปมุ่งเน้นความพยายามในการขยายตัวด้านอื่นๆ ก่อนจะดีกว่า"
 paragon.5335.name:0 "แหล่งพลังงาน"
 paragon.5335.desc:1 "ความก้าวหน้าทางเทคโนโลยีของเราก้าวไกลมามาก ทว่าจักรวาลยังคงมีความลับซ่อนอยู่อีกมากมาย ทีมสำรวจของเราได้ค้นพบสารที่มีความหนาแน่นสูงอย่างน่าเหลือเชื่อ เชื่อกันว่ามันเป็นรูปแบบหนึ่งของสสารมืด ในตอนนี้เรายังไม่สามารถค้นหาประโยชน์ที่อาจนำมาปรับใช้สำหรับวัสดุใหม่นี้ได้\n\nจนกว่าเราจะพบวิธี เราควรหันไปมุ่งเน้นความพยายามในการขยายตัวด้านอื่นๆ ก่อนจะดีกว่า"
 paragon.5340.name:0 "การปกครองที่ยอดเยี่ยม"
 paragon.5340.desc:1 "วันครบรอบการส่งกระสวยอวกาศลำแรกได้รวมประชากรเข้าไว้ด้วยกันในเป้าหมายร่วมกัน ด้วยแรงบันดาลใจและพละกำลังจากสุนทรพจน์ของ §Y[Root.Owner.Ruler.GetTitle]§! ทำให้ประชากร [Root.Owner.GetSpeciesName] ร่วมมือกันเพื่อทำให้เมืองหลวงของกาแล็กซีใหม่เป็นประภาคารแห่งความรุ่งเรืองในห้วงอวกาศอันหนาวเหน็บ\n\nตอนนี้เราสามารถมุ่งเน้นความพยายามของเราไปยังส่วนอื่นๆ ได้แล้ว"
 paragon.5340.tt:0 "ระดับการรุ่งโรจน์ของดาวเคราะห์เมืองหลวงเพิ่มขึ้น §G+1§!"
 paragon.5345.name:0 "อัจฉริยะนักประดิษฐ์"
 paragon.5345.desc:1 "ข่าวแพร่สะพัดเกี่ยวกับเครื่องจักรนวัตกรรมใหม่ที่สามารถกลั่นโลหะผสมผสมปริมาณมหาศาลจากวัสดุรีไซเคิลได้ อุปกรณ์ดังกล่าวมีประสิทธิภาพสูงมาก แต่ผู้สร้างได้เสียชีวิตลงไม่นานหลังจากนำเสนอต่อ §Y[Root.Owner.Ruler.GetTitle]§! ของเรา เนื่องจากวิศวกรคนอื่นๆ เห็นว่าเป็นไปไม่ได้ที่จะลอกเลียนแบบ เราจึงเก็บเครื่องจักรนี้ไว้ในโรงเรือนที่มีการคุ้มกันอย่างเข้มงวดเพื่อป้องกันความปลอดภัย และเพื่อประโยชน์ของประชาชนของเรา\n\nเราสามารถจัดสรรงบประมาณเพื่อพัฒนาในด้านอื่นๆ ได้"
 paragon.5360.name:0 "ความเข้าใจการหาแหล่งแร่"
 paragon.5360.desc:1 "นักสำรวจแร่ของเราพิสูจน์แล้วว่ามีประโยชน์อีกครั้ง พวกเขารายงานว่าพบแหล่งสะสมใต้ดินที่ซ่อนอยู่ของทรัพยากรที่ผิดปกติหลายชนิด ขณะที่เรากำลังดำเนินการเพื่อตรวจสอบคุณสมบัติและศักยภาพของทรัพยากรใหม่เหล่านี้ เราสามารถขยายตัวในด้านอื่นๆ ต่อไปได้"
 paragon.5370.name:0 "ความเข้าใจวงแหวนวงโคจร"
 paragon.5370.desc:1 "การวิจัยอย่างกว้างขวางในด้านการตั้งถิ่นฐานและการขนส่งในอวกาศส่วนลึกประสบความสำเร็จอย่างงดงาม นักวิทยาศาสตร์ที่เก่งที่สุดของเราได้ทำงานร่วมกับวิศวกรชั้นนำอย่างใกล้ชิด พวกเขาได้พัฒนาแนวคิดใหม่สำหรับวงแหวนวงโคจร ซึ่งเป็นสิ่งก่อสร้างอวกาศที่โอบล้อมดาวเคราะห์ด้วยวงแหวนขนาดยักษ์ที่สามารถรองรับสิ่งอำนวยความสะดวกในภาคอุตสาหกรรมหรือพลเรือนได้ ในตอนนี้เราอาจจะขาดขีดความสามารถทางอุตสาหกรรมในการสร้างวงแหวนวงโคจรดังกล่าว แต่เส้นทางข้างหน้านั้นชัดเจนแล้ว ในระหว่างนี้ เราสามารถหันไปมุ่งเน้นความพยายามในการขยายตัวด้านอื่นๆ ได้"
 paragon.5900.name:1 "ผู้ชี้นำจากไปแล้ว!"
 paragon.5900.desc:1 "ไม่มีใครอยู่ค้ำฟ้า ท้ายที่สุดแล้วเราทุกคนก็เท่าเทียมกันในความตาย วันนี้ $leader_trait_legendary_leader$ ได้หลอมรวมพวกเราทั้งหมดเข้าด้วยกันเป็นครั้งสุดท้าย เราไม่เคยจัดงานศพที่ยิ่งใหญ่ขนาดนี้มาก่อนเลย: ทั้งสุนทรพจน์อันทรงพลัง คำปฏิญาณอันสูงส่ง และขบวนแห่ที่ไม่มีวันสิ้นสุด ทั่วดินแดนของเรา ประชาชนต่างแสดงความขอบคุณสำหรับทุกสิ่งที่ $leader_trait_legendary_leader$ ได้ทำให้กับพวกเรา ไม่มีผู้ปกครองคนใดที่สมบูรณ์แบบ แต่ผู้ปกครองของเราทำงานอย่างไม่รู้จักเหน็ดเหนื่อยเพื่อสร้างอนาคตที่ดีกว่าสำหรับเราทุกคน\n\nแม้เราจะหวังว่าความปั่นป่วนที่อาจเกิดขึ้นจากเหตุการณ์ดังกล่าวจะบรรเทาลงได้ ทว่าดาวบ้านเกิดของเราก็ยังคงตกลงสู่ความระส่ำระสาย"
 paragon.5900.desc.50years:1 "ไม่มีใครอยู่ค้ำฟ้า ท้ายที่สุดแล้วเราทุกคนก็เท่าเทียมกันในความตาย วันนี้ $leader_trait_legendary_leader$ ได้หลอมรวมพวกเราทั้งหมดเข้าด้วยกันเป็นครั้งสุดท้าย เราไม่เคยจัดงานศพที่ยิ่งใหญ่ขนาดนี้มาก่อนเลย: ทั้งสุนทรพจน์อันทรงพลัง คำปฏิญาณอันสูงส่ง และขบวนแห่ที่ไม่มีวันสิ้นสุด ทั่วดินแดนของเรา ประชาชนต่างแสดงความขอบคุณสำหรับทุกสิ่งที่ $leader_trait_legendary_leader$ ได้ทำให้กับพวกเรา ไม่มีผู้ปกครองคนใดที่สมบูรณ์แบบ แต่ผู้ปกครองของเราทำงานอย่างไม่รู้จักเหน็ดเหนื่อยเพื่อสร้างอนาคตที่ดีกว่าสำหรับเราทุกคน\n\nแม้จะมีการเตรียมการเพื่อรับมือกับวิกฤตการณ์ไว้แล้ว ทว่าการจากไปของ $leader_trait_legendary_leader$ ก็ยังทำให้เราต้องเผชิญกับความยากลำบากและความโศกเศร้าอย่างสุดซึ้ง มันต้องใช้เวลาในการเอาชนะความสูญเสียครั้งนี้ แต่จากจุดนี้เราจะเติบโตขึ้นอย่างแข็งแกร่งกว่าเดิม"
 paragon.5900.desc.100years:1 "ไม่มีใครอยู่ค้ำฟ้า ท้ายที่สุดแล้วเราทุกคนก็เท่าเทียมกันในความตาย วันนี้ $leader_trait_legendary_leader$ ได้หลอมรวมพวกเราทั้งหมดเข้าด้วยกันเป็นครั้งสุดท้าย เราไม่เคยจัดงานศพที่ยิ่งใหญ่ขนาดนี้มาก่อนเลย: ทั้งสุนทรพจน์อันทรงพลัง คำปฏิญาณอันสูงส่ง และขบวนแห่ที่ไม่มีวันสิ้นสุด ทั่วดินแดนของเรา ประชาชนต่างแสดงความขอบคุณสำหรับทุกสิ่งที่ $leader_trait_legendary_leader$ ได้ทำให้กับพวกเรา ไม่มีผู้ปกครองคนใดที่สมบูรณ์แบบ แต่ผู้ปกครองของเราทำงานอย่างไม่รู้จักเหน็ดเหนื่อยเพื่อสร้างอนาคตที่ดีกว่าสำหรับเราทุกคน\n\nเนื่องจากการเตรียมการเพื่อรับมือกับวิกฤตดังกล่าวล่วงหน้า ทำให้เราสามารถยืนหยัดและฟื้นตัวได้ทันทีแม้จะสิ้นลมหายใจของ $leader_trait_legendary_leader$ ไปแล้วก็ตาม มันอาจต้องใช้เวลาบ้างในการเอาชนะความสูญเสียครั้งนี้ แต่จากจุดนี้เราจะเติบโตขึ้นอย่างแข็งแกร่งกว่าเดิม"
 paragon.5900.a:0 "เราจะทำอย่างไรกันดีตอนนี้?!"
 paragon.5900.a.50years:1 "วันอันเลวร้ายในประวัติศาสตร์ของเรา"
 paragon.5900.a.100years:1 "เราเตรียมตัวพร้อมแล้ว เราจะต้องผ่านพ้นสิ่งนี้ไปได้เช่นกัน"

 ###Events for Leader Rebirth
 paragon.6000.name:0 "โอกาสครั้งที่สอง"
 paragon.6000.desc:0 "เนื่องด้วยสุขภาพของ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! ทรุดโทรมลงอย่างรวดเร็ว ปัญญาชนทางการแพทย์ที่ดีที่สุดของเราได้คิดค้นทางออกที่ไม่ปกติขึ้นมา อุปกรณ์กลไกที่ซับซ้อนจะถูกสร้างขึ้นภายในห้องประชุมสภาโดยตรง ด้วยการอนุญาตให้เครื่องจักรนี้ควบคุมระบบการทำงานตามธรรมชาติหลายอย่างของ [Ruler.GetHerHis] เราจะสามารถรักษาชีวิตของ [Ruler.GetHimHer] ไว้ได้อย่างไม่มีกำหนด"
 paragon.6000.desc.ap_mind_over_matter: "$paragon.6000.desc$\n\n[GetPsychicNounPlural] ของเราก็ได้เสนอแผนการเช่นกัน ด้วยการใช้ประโยชน์จาก [GetSorrow] ร่วมกันของประชากรเรา พลังงานอันมหาศาลจากม่านหมอกแดนจิตจะสามารถถูกควบคุมเพื่อ [GetRejuvenate] ผู้นำของเราที่ล่วงลับไปแล้วได้ โดยมีราคาที่ต้องจ่าย §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! จะสามารถรักษาชีวิตไว้ได้อย่างไม่มีกำหนด"
 paragon.6000.desc.ap_the_flesh_is_weak:0 "$paragon.6000.desc$\n\nนักวิชาการไซเบอร์เนติกส์ของเราได้คิดค้นแผนการอันชาญฉลาด... ด้วยการใช้สิ่งอัปเกรดที่ทันสมัยที่สุดเท่านั้น เราสามารถทดแทนชิ้นส่วนชีวภาพที่ชำรุดเสียหายแต่ละชิ้นในร่างกายของผู้นำได้ เมื่อเสร็จสมบูรณ์ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! จะได้ปกครองสืบไปชั่วนิรันดร์"
 paragon.6000.desc.ap_synthetic_evolution:0 "นักพัฒนาหุ่นยนต์ของเรามีคำแนะนำเพื่อซ่อมแซม §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§!: แม้ว่าจะมีค่าใช้จ่ายสูง แต่เราสามารถย้ายจิตสำนึกของเขาเข้าไปในเครือข่ายโพซิตรอนิกส์ที่แก้ไขตัวเองได้ การสามารถเชื่อมโยงเครือข่ายกับประชากรทั้งหมดจะช่วยให้เราปรับปรุงทักษะความสามารถที่มีอยู่ดั้งเดิมของเขาได้อย่างมาก"
 paragon.6000.desc.ap_engineered_evolution:0 "$paragon.6000.desc$\n\nนอกจากนี้ นักพันธุศาสตร์ของเรายังได้คิดค้นทางเลือกอื่นขึ้นมา ร่างโคลนที่ไม่จำกัดจำนวน (แม้ว่าจะมีราคาแพง) สามารถสร้างขึ้นเพื่อรองรับจิตวิญญาณของ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! ซึ่งช่วยทำให้ [Ruler.GetHimHer] เป็นอมตะได้อย่างแท้จริง"
 paragon.6000.a:0 "สร้างอุปกรณ์ช่วยชีวิตนี้ขึ้นมา"
 paragon.6000.a.tooltip:0 "อุปกรณ์ช่วยชีวิตจะถูกสร้างขึ้นสำหรับ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! มอบความเป็นอมตะให้แก่ [Ruler.GetHimHer] โดยแลกกับการขัง [Ruler.GetHimHer] ไว้ภายในพระราชวัง"
 paragon.6000.b:0 "เตรียมการอัปเกรด"
 paragon.6000.b.tooltip:0 "ระบบไซเบอร์เนติกส์ของเราจะเตรียมชิ้นส่วนล้ำสมัยที่จะช่วยยืดอายุขัยของ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§!"
 paragon.6000.c.tooltip:0 "[GetPsychicNounPlural] ของเราจะทำพิธีกรรมเพื่อมอบความเป็นอมตะให้แก่ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§!"
 paragon.6000.c:0 "เตรียมสารซีโร่และการอัปเกรด"
 paragon.6000.d:0 "เตรียมสิ่งประดิษฐ์สังเคราะห์อันน่าทึ่งนี้"
 paragon.6000.d.tooltip:0 "นักพัฒนาหุ่นยนต์ของเราจะเตรียมร่างสังเคราะห์ที่ล้ำสมัยเพื่อยืดอายุขัยของ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§!"
 paragon.6000.e:0 "เตรียมถังเพาะโคลน"
 paragon.6000.e.tooltip:0 "นักพันธุศาสตร์ของเราจะสร้างร่างโคลนเพื่อยืดอายุขัยของ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§!"
 paragon.6000.f_common: "นี่มันมากเกินไป ปล่อยให้ [Ruler.GetHimHer]"
 paragon.6000.f.default: "$paragon.6000.f_common$ จากไปอย่างสงบ"
 paragon.6000.f.machine: "$paragon.6000.f_common$ ยุติการทำงาน"
 paragon.6000.f.common_tooltip: "ราคาที่ต้องจ่ายในการดัดแปลงผู้ชี้นำของเรานั้นสูงเกินไป แทนที่จะทำเช่นนั้น เราจะปล่อยให้ [Ruler.GetHimHer]"
 paragon.6000.f.tooltip.default: "$paragon.6000.f.common_tooltip$ เสียชีวิตอย่างมีเกียรติ"
 paragon.6000.f.tooltip.machine: "$paragon.6000.f.common_tooltip$ ปิดระบบทำงานลง"
 paragon.6005.name:0 "จักรวรรดิที่มีชีวิต"
 paragon.6005.desc:0 "ขั้นตอนการรักษานั้นยาวนานและยากลำบาก สำหรับ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! มันคงเป็นความเจ็บปวดอย่างแสนสาหัส ทว่าผลลัพธ์ที่ได้นั้นชัดเจนในตัวเอง: เมื่อติดตั้งเข้ากับอุปกรณ์ช่วยชีวิต ก็ไม่เหลือร่องรอยของโรคร้ายปริศนาของผู้นำอีกเลย\n\nแม้จะรู้สึกซาบซึ้งที่ได้รับการรักษา แต่ผู้ใกล้ชิดกับ [Ruler.GetHimHer] สังเกตเห็นว่าพฤติกรรมและอารมณ์ของ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! มีการเปลี่ยนแปลงไปเล็กน้อยอย่างลับๆ\n\nในเวลานี้ ผู้นำของเราต้องพำนักอยู่ภายในพระราชวัง แม้ว่าจะแผนการที่จะย้ายตัวอุปกรณ์ช่วยชีวิตนี้หากเมืองหลวงถูกศัตรูเข้ายึดครองก็ตาม"
 paragon.6005.a:0 "ยินดีต้อนรับกลับมา [Ruler.GetName]"
 paragon.6010.name:0 "อัปเกรดเสร็จสิ้น"
 paragon.6010.desc:0 "งานของเราประสบความสำเร็จแล้ว! §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! ได้รับการช่วยเหลือแล้ว\n\nอาจเป็นเพราะสัดส่วนที่สำคัญอย่างมากของร่างกาย [Ruler.GetHisHer] ได้รับผลกระทบจากขั้นตอนนี้ ทัศนคติของ [Ruler.GetHisHer] ที่มีต่อไซเบอร์เนติกส์จึงเปลี่ยนไป จากที่แต่ก่อนเทคโนโลยีนี้เป็นเพียงเครื่องมืออย่างหนึ่ง ตอนนี้ [Ruler.GetSheHe] กลับมองว่ามันเป็นหนทางสูงสุดสู่ความสมบูรณ์แบบ\n\nผู้นำของเราได้กลับคืนมาหาเราแล้ว ทว่าการเปลี่ยนแปลงที่เกิดขึ้นกับตัวเขาจะส่งผลอย่างไรนั้นยังคงเป็นคำถามที่ต้องรอคำตอบ"
 paragon.6010.a:0 "การอัปเกรดที่ไม่มีวันสิ้นสุดสำหรับ [Ruler.GetName]"
 paragon.6015.name:0 "การผสมผสานพลังจิต"
 paragon.6015.desc_1: "งานของเราประสบความสำเร็จด้วยดี ด้วยการอัญเชิญพลังแห่ง §Hม่านหมอกแดนจิต§! ทำให้ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! ได้รับการช่วยเหลือแล้ว ด้วยพลังงานจิตในระดับที่ไม่เคยมีมาก่อนไหลเวียนผ่านร่างของพวกเขา [Ruler.GetHeShe] จึงได้ก้าวสู่ความเป็นอมตะ"
 paragon.6015.desc_2.organic: "อย่างไรก็ตาม ความยากลำบากครั้งนี้ทำให้ [Ruler.GetHimHer] เปลี่ยนแปลงไปทีละน้อย... บรรดาผู้ใกล้ชิดกับ [Ruler.GetHimHer] ต่างกระซิบกระซาบว่ามีบุคลิกที่แตกต่างกันสองแบบกำลังขัดแย้งกันอยู่ภายในตัว ดูเหมือนว่าพลังงานจากแดนจิตกำลังช่วยให้ผู้ชี้นำมีชีวิตอยู่ได้โดยต้องแลกมาด้วยความเสื่อมสลายที่รุนแรงกว่าที่คาดการณ์ไว้ในตอนแรก"
 paragon.6015.desc_2.machine: "อย่างไรก็ตาม ความยากลำบากครั้งนี้ทำให้ [Ruler.GetHimHer] เปลี่ยนแปลงไปเกินกว่าค่าพารามิเตอร์ที่คาดการณ์ไว้ ผลการวิเคราะห์ตัวของ [Ruler.GetHimHer] แสดงให้เห็นการทำงานของตัวประมวลผลเชิงตรรกะที่ขัดแย้งกันภายในระบบย่อย ดูเหมือนว่าพลังงานของแดนจิตกำลังช่วยให้ผู้ชี้นำยังคงทำงานได้อยู่ แต่ระบบต่างๆ ต้องแบกรับภาระการเสื่อมสภาพที่รุนแรงกว่าที่คาดเดาไว้แต่แรก"
 paragon.6015.desc_3: "แต่เรื่องทั้งหมดนี้ไว้ก่อนเถอะ สำหรับตอนนี้ ปัญหาที่เร่งด่วนกว่าคือการรักษาปริมาณการจัดส่งสารซีโร่อย่างต่อเนื่อง หากเมื่อใดที่ทรัพยากรนี้หมดลง ผู้นำของเราจะเสียชีวิตทันที"
 paragon.6015.a:0 "ตื่นขึ้นมาอีกครั้ง [Ruler.GetName]"
 paragon.6020.name:0 "การขยายร่างสังเคราะห์"
 paragon.6020.desc:0 "สำเร็จแล้ว! จิตสำนึกของ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! ได้รับการถ่ายโอนไปยังโครงสร้างสังเคราะห์เรียบร้อยแล้ว การประมวลผลแบบควอนตัมช่วยให้ [Ruler.GetHimHer] สามารถเชื่อมต่อเครือข่ายกับยูนิตสังเคราะห์ทุกตัวได้ในทันที\n\nความตระหนักรู้อภิปัญญาอันทรงพลังนี้ได้เริ่มเปลี่ยนมุมมองของผู้นำเรา บัดนี้ [Ruler.GetSheHe] มุ่งเน้นไปที่รูปแบบการประมวลผลระดับมหภาค โดยมีจุดประสงค์เพื่อเพิ่มประสิทธิภาพโดยรวมของอารยธรรมของเรา"
 paragon.6020.a:0 "[Ruler.GetName] ออนไลน์เต็มรูปแบบแล้ว"
 paragon.6025.name:0 "ร่างกายที่สมบูรณ์แบบยิ่งขึ้น"
 paragon.6025.desc:0 "กระบวนการโคลนนิ่งและปฏิบัติการประสบความสำเร็จอย่างสมบูรณ์ ผู้นำของเราปลอดภัยแล้ว\n\nอย่างไรก็ตาม หลายคนได้แสดงความกังวลเกี่ยวกับการเปลี่ยนแปลงบางอย่างในทัศนคติของ [Ruler.GetHisHer] ที่ไม่มีใครคาดคิด ด้วยความลุ่มหลงในรูปลักษณ์ใหม่ของ [Ruler.GetHisHer] ทำให้ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! เริ่มหมกมุ่นอยู่กับขั้นต่อไปของวิวัฒนาการของประชากรเรา [Ruler.GetSheHe] ได้เบี่ยงเบนทรัพยากรจำนวนมหาศาลเพื่อปรับปรุงข้อมูลทางพันธุกรรมของมวลชนให้สมบูรณ์แบบ"
 paragon.6025.a:0 "บัดนี้ [Ruler.GetName] คือต้นแบบพันธุกรรมที่สมบูรณ์แบบแล้ว"
 paragon.6030.name:0 "สารซีโร่ไม่เพียงพอ"
 paragon.6030.desc_common: "คลังสำรองสารซีโร่ของเราหมดสิ้นแล้ว เว้นแต่ว่าเราจะสามารถเติมเสบียงได้อย่างรวดเร็ว"
 paragon.6030.desc.organic: "$paragon.6030.desc_common$ จิตวิญญาณของ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! จะสูญหายไปในม่านหมอกแดนจิตตลอดกาล"
 paragon.6030.desc.machine: "$paragon.6030.desc_common$ ตัวประมวลผลของ §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! จะทำงานหนักเกินไปและถูกทำลายโดยม่านหมอกแดนจิต"
 paragon.6030.a:0 "ติดต่อตลาดซื้อขายสารซีโร่"
 paragon.6030.b:0 "[Ruler.GetName] จะเสียชีวิต"

 paragon.6035.name: "ยุคสมัยใหม่"
 paragon.6035.desc: "ไม่นานหลังจากฟื้นตัวจากขั้นตอนการรักษา งานเฉลิมฉลองอันยิ่งใหญ่ได้ถูกจัดขึ้นบนดาว [capital_scope.GetName] โดย $leader_trait_legendary_leader$ ได้กล่าวสุนทรพจน์ขอบคุณพลเมืองและนักวิทยาศาสตร์ และ [Ruler.GetName] ได้พูดถึงอนาคตที่สดใสและรุ่งเรืองที่พวกเขาได้วางแผนไว้สำหรับ §Y[Owner.GetName]§!"
 paragon.6035.a: "$leader_trait_legendary_leader$ ผู้เหนือกาลเวลาจะนำทางพวกเรา"
 paragon.6035.b: "เราจะปฏิรูปการปกครองเพื่อประชาชน"
 paragon.6035.b.tt: "รัฐบาลจะได้รับการปฏิรูป $leader_trait_legendary_leader$ จะยังคงสนับสนุนและแนะนำเราต่อไป แต่จากนี้ไปประชาชนจะมีโอกาสเลือกผู้นำของตนเอง"

 ###Traits
 leader_trait_the_apparatus_luminary:0 "ยึดติดกับอุปกรณ์ช่วยชีวิต"
 leader_trait_the_apparatus_luminary_desc:0 "ความเป็นอมตะ ทว่าต้องแลกกับอะไรล่ะ? ผู้นำคนนี้ถูกผูกมัดกับอุปกรณ์พยุงชีพที่เทอะทะภายในห้องประชุมสภา"
 leader_trait_the_cybernetic_luminary:0 "อัปเกรดไม่รู้สิ้นสุด"
 leader_trait_the_cybernetic_luminary_desc:0 "ความเป็นอมตะนั้นเป็นไปได้ เนื่องจากการอัปเกรดขั้นสูงหลายประการ ผู้นำคนนี้สามารถซิงค์โดยตรงกับผู้บริหารไซเบอร์เนติกส์ระดับสูงทุกคนได้ ทว่าสิ่งนี้ได้จำกัดความสามารถในการเรียนรู้ด้วยตนเองของเขา"
 leader_trait_the_psionic_luminary:0 "ผู้สิงสู่"
 leader_trait_the_psionic_luminary_desc:0 "ราคาของความเป็นอมตะนั้นแสนแพง... สิ่งมีชีวิตแห่งจิตได้ทิ้งประตูทางผ่านไว้ในใจของผู้นำคนนี้ สิ่งมีชีวิตดังกล่าวได้ตั้งหลักมั่นในโลกแห่งความจริงของเรา และผู้นำต้องได้รับสารซีโร่อย่างต่อเนื่อง"
 leader_trait_the_synth_luminary:0 "ความตระหนักรู้ของสิ่งสังเคราะห์"
 leader_trait_the_synth_luminary_desc:0 "ร่างกายสังเคราะห์ของผู้นำคนนี้คือจุดสูงสุดของศิลปะแห่งวิศวกรรมหุ่นยนต์ การประมวลผลแบบควอนตัมช่วยให้เชื่อมต่อโดยตรงกับความตระหนักรู้ร่วมของประชากร แม้จะช่วยเพิ่มประสิทธิภาพ แต่ผลลัพธ์ที่ตามมาไม่ได้ส่งผลดีต่อผู้ที่ได้รับการดัดแปลงเท่าใดนัก"
 leader_trait_the_genetic_luminary:0 "ความสมบูรณ์แบบทางพันธุกรรม"
 leader_trait_the_genetic_luminary_desc:0 "ร่างโคลนที่ต่อเนื่องไม่สิ้นสุดช่วยให้ผู้นำคนนี้เป็นอมตะ หากร่างปัจจุบันได้รับความเสียหายหรือเสื่อมสภาพลง ก็มีร่างสำรองอีกนับสิบพร้อมเข้าทำหน้าที่แทน สิ่งนี้ส่งผลให้นำไปสู่ความหมกมุ่นในความสมบูรณ์แบบทางพันธุกรรม"

