 paragon.40520.name:0 "การทดลองที่มีอนาคตงั้นรึ?"
 paragon.40520.desc:1 "§Y[Root.GetName]§! ได้นำเสนอแผนงานวิจัยเพื่อประเมินความคืบหน้าของอุตสาหกรรมในอนาคต สิ่งนี้อาจเป็นประโยชน์ต่อเศรษฐกิจรวมถึงโครงการส่วนตัวของ [Root.GetHisHer] ด้วย [Root.GetHeSheCap] ได้เตรียมการทดลองหลายอย่างที่ดูมีแนวโน้มที่ดีมาก แต่คาดว่าน่าจะทำให้ผู้เข้าร่วมการทดลองส่วนใหญ่เสียชีวิต [Root.GetHeSheCap] รับรองกับเราว่าการเสียสละเล็ก ๆ น้อย ๆ เป็นสิ่งจำเป็นสำหรับประโยชน์ส่วนรวม"
