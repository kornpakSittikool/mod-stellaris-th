 XONDAR_VALUABLE_ALLOYS_DESC:1 "โลหะผสมล้ำค่าถูกค้นพบโดยพลเรือโท [event_target:renowned_materialist1.GetName] บนโลกที่แห้งแล้งดวงนี้"
 paragon.40921.name:0 "โลหะผสมที่พร้อมใช้งาน"
