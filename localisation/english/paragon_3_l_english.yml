 NAME_xenophile1:0 "Lysator Syng"
 xenophile1:0 "โจรสลัดผู้ช่ำชองและลูกเรือที่หลากหลายของ [Root.GetHisHer] ซึ่งถูกเกณฑ์มาจากทุกมุมของกาแล็กซี"
 NAME_xenophile2:0 "Nona"
 xenophile2:0 "นักสำรวจผู้เดินทางมาอย่างโชกโชนพร้อมความรู้ลึกซึ้งเกี่ยวกับวัฒนธรรมต่างประเทศมากมาย เขาสนใจในการค้าและผลกำไรพอ ๆ กับการค้นพบทางวิทยาศาสตร์"
 NAME_militarist1:0 "Baron Vyctor Jariden"
 militarist1:0 "ขุนนางผู้ผ่านศึกมาอย่างโชกโชนผู้สูญเสียกองยานของ [Root.GetHisHer] และตระกูลของเขาให้กับกองกำลังศัตรูที่ท่วมท้น"
 NAME_militarist2:0 "Gia'Zumon"
 militarist2:1 "นักรบผู้ดุร้ายที่รอดชีวิตจากการรบมาหลายครั้ง [Root.GetHeSheCap] มีความหลงใหลในสงครามและรู้สึกสบายใจที่สุดเมื่ออยู่ในการต่อสู้"
 NAME_xenophobe1:0 "Factorator Shuladun"
 xenophobe1:0 "นักอุตสาหกรรมผู้โดดเดี่ยวและระแวงระวัง [Root.GetHeSheCap] ใช้เวลาส่วนใหญ่ของ [Root.GetHisHer] ในการค้นหาประสิทธิภาพในโรงงานและโรงหล่อหลายแห่งของ [Root.GetHisHer]"
 NAME_xenophobe2:0 "Aturion"
 xenophobe2:1 "หุ่นยนต์ยุทธวิธีจากอารยธรรมที่สูญพันธุ์ไปนานแล้ว ด้วยความหมกมุ่นในความมีระเบียบและโครงสร้าง มันจึงแสวงหาการออกแบบสังคมที่สมบูรณ์แบบ"
 NAME_egalitarian1:0 "Jynn"
 egalitarian1:0 "นักรบผู้เคร่งขรึมแห่งหนองน้ําเอควิลเบรี่ยมได้รับการอัปเกรดด้วยไซเบอร์เนติกส์และเทคโนโลยีชีวภาพ [Root.GetFirstName] ปฏิญาณว่าจะปลดปล่อยกาแล็กซีให้พ้นจากทรราช"
 NAME_egalitarian2:0 "Zosira K'Tun"
 egalitarian2:0 "นักวิทยาศาสตร์ผู้สร้างสรรค์และขี้เล่น ได้รับการช่วยเหลือจากกอร์กี้ หุ่นยนต์ตัวเล็กที่เป็นมิตร [Root.GetHeSheCap] แสวงหาที่จะแบ่งปันความรู้ของ [Root.GetHisHer] เพื่อพัฒนาชีวิตของผู้คนรอบข้าง [Root.GetHisHer]"
 NAME_materialist1:0 "Xondar"
 materialist1:0 "นายพลเรือผู้ค้นพบความเป็นอมตะในรูปแบบสังเคราะห์ จิตใจของ [Root.GetHisHer] ได้เชื่อมต่อโดยตรงกับยานอวกาศภายใต้การบัญชาการของ [Root.GetHisHer]"
 NAME_materialist2:0 "Borin"
 materialist2:0 "นักเก็บกู้ผู้ละทิ้งดินแดนของ [Root.GetHisHer] [Root.GetFirstName] เป็นช่างเครื่องที่ไม่มีใครเทียบได้ซึ่งสามารถซ่อมแซมได้แทบทุกอย่าง"
 NAME_pacifist1:0 "Judge Uld Dagr"
 pacifist1:1 "ผู้พิพากษาเกษียณอายุผู้ให้คำมั่นว่าจะต่อสู้เพื่อความยุติธรรมต่อไป"
 NAME_pacifist2:0 "Vas the Gilded"
 pacifist2:0 "นักการทูตผู้มีเสน่ห์ดึงดูดซึ่งเติบโตใน Alysum Magnetar Sisterness ในการต่อสู้เพื่อสันติภาพ [Root.GetHeShe] ทำสงครามของ [Root.GetHisHer] ผ่านกลอุบายและการเจรจา"
 NAME_authoritarian1:0 "Kai-Sha"
 authoritarian1:0 "นายหน้าข้อมูลที่มีเส้นสายกว้างขวางและมีเครือข่ายครอบคลุมทั่วทั้งกาแล็กซี"
 NAME_authoritarian2:0 "Q'la-Minder"
 authoritarian2:1 "ผู้ดูแลผู้ละโมบที่ประจบประแจงผู้มีอำนาจ กดขี่ข่มเหงและลดทอนคุณค่าของผู้ที่ไม่มีอำนาจ ความฉลาดและความโหดร้ายของ [Root.GetHisHer] สร้างผลลัพธ์ที่ยอดเยี่ยมยิ่งนัก"
 NAME_spiritualist1:0 "Ulastar"
 spiritualist1:1 "ผู้วิเศษพเนจรที่มีปัญญาความรู้เข้าถึงทุกคนรอบตัว [Root.GetHimHer]"
 NAME_spiritualist2:0 "Nasuz Demetor"
 spiritualist2:1 "นักจดหมายเหตุผู้แสวงหาการรวบรวมความรู้จากอารยธรรมที่ล่มสลาย [Root.GetHeSheCap] ขุดค้นสิ่งมหัศจรรย์โบราณบนโลกที่ตายแล้ว และค้นหาโบราณวัตถุในยานร้างที่ล่องลอยอยู่ในความว่างเปล่าระหว่างดวงดาว"
 custom_mercenary_admiral_desc:0 "นักรบรับจ้างผู้ไร้ความปรานีที่แสวงหาเกียรติยศและชื่อเสียงในสนามรบ"

 paragon.40100.name:0 "$NAME_xenophile1$"
 paragon.40100.desc:0 "§Hการสแกนใบหน้าพบว่าบุคคลนี้คือไลเซเตอร์ ซิงก์ โจรสลัดที่กำลังเป็นที่ต้องการตัว เขายิ้มอย่างมีเลศนัยและผงกศีรษะให้อย่างสุภาพ§!\n\nยินดีที่ได้รู้จัก ข้าคือกับตันไลเซเตอร์ ข้ามาหาพวกท่านพร้อมข้อเสนอ\n\nข้าบัญชาการยานสามลำและลูกเรือนอกคอกที่เป็นเหมือนกลุ่มคนที่กระจัดกระจาย จนถึงตอนนี้ พวกเราทำงาน... อย่างอิสระ อย่างไรก็ตาม ยุคสมัยกำลังเปลี่ยนไป และพวกเราพร้อมที่จะเข้าร่วมกับกิจการที่ใหญ่ขึ้น หากพวกท่านยกโทษให้เราอย่างเต็มที่สำหรับสิ่งที่เราเรียกว่าอาชญากรรม และให้ที่หลบภัยที่ปลอดภัยภายในพรมแดนของพวกท่าน เราจะทำงานให้พวกท่าน\n\nว่าอย่างไรล่ะ? เราควรจะร่างสัญญาขึ้นมาไหม?"
 paragon.40100.a:0 "เรามีความจำเป็นอะไรที่ต้องใช้โจรสลัด?"
 paragon.40100.a.response:0 "อืม เรื่องนั้น ข้าชอบที่จะคิดว่าตัวเองเป็นไพเวเทียร์มากกว่า บางสิ่งบางอย่างคุณก็ไม่สามารถเรียนรู้ได้จากสถาบันการศึกษา ความสามารถของข้าอยู่ที่การหาโอกาส: เมื่อไหร่ควรโจมตี เมื่อไหร่ควรถอย เหยื่อล่อประเภทไหนที่ควรใช้ล่อศัตรู เราโจมตีอย่างรุนแรงและตรงจุดสำคัญ แล้วหนีไปพร้อมกับของปล้นก่อนที่จะมีใครรู้ตัวว่าเกิดอะไรขึ้น"
 paragon.40100.b:0 "ทำไมคุณถึงต้องการเข้าร่วมกับเรา?"
 paragon.40100.b.response:0 "ลูกเรือของข้าเหนื่อยกับการใช้ชีวิตหลบหนีแล้ว พวกเราต้องการท่าเรือที่ปลอดภัย จักรวรรดิของท่านดูเหมือนจะเปิดกว้างพอที่จะรับกลุ่มคนนอกคอกเข้าสู่กองทัพ การเป็นโจรสลัดทำให้เราสูญเสียอะไรไปมาก เราไม่ได้ต้องการจะตั้งรกรากถิ่นฐานจริง ๆ หรอก แต่ผู้อุปถัมภ์ที่มีความสามารถแบบท่านก็น่าจะช่วยแบ่งเบาภาระลงได้บ้าง"
 paragon.40100.c:0 "ทำไมเราต้องเชื่อใจคุณด้วย?"
 paragon.40100.c.response:0 "ไม่มีเหตุผลอื่น นอกเหนือจากคำพูดของคนสารเลวคนหนึ่ง หากแค่นั้นยังไม่พอ ก็ขอให้โชคดี ข้าขอเสนอข้อตกลง ไม่มีอะไรมากไปกว่านั้น"
 paragon.40100.d:0 "เล่าเรื่องลูกเรือของคุณให้ฟังหน่อย"
 paragon.40100.d.response:1 "ทาสที่หลบหนี นักล่าค่าหัว ทหารรับจ้าง... แม้กระทั่งพ่อครัวแปลก ๆ จากทุกมุมของกาแล็กซี พวกเขาตอบรับเสียงเรียกร้องแห่งเสรีภาพและการผจญภัย ตลอดหลายปีที่ผ่านมาพวกเราเติบโตจนกลายเป็นเหมือนครอบครัว ข้ายินดีต้อนรับทุกคน ตราบใดที่พวกเขาปฏิบัติตามคำสั่งของข้าและไม่พยายามกินคนอื่น ข้าถือเป็นเกียรติอย่างยิ่งที่ได้นำพวกเขา"
 paragon.40100.hire_custom_tooltip:1 "§Y$NAME_xenophile1$§! เข้าร่วมจักรวรรดิเราในฐานะ §Hผู้นำ§!\nเพิ่มยานโจรสลัด 3 ลำในจักรวรรดิของเรา"

 paragon.40200.name:0 "$NAME_xenophile2$"
 paragon.40200.desc:0 "§Hผู้หญิงคนนี้ถือของขวัญที่น่าทึ่งมาด้วย: ชิ้นส่วนที่เก็บรักษาไว้ของดาวหาง การแกะสลักกระดูกทีหยันกี และมอลลัสกอยด์ตัวจิ๋วในโหลแก้ว§!\n\nสวัสดี ข้าชื่อโนน่า ผู้ได้รับพรอันเป็นนิรันดร์แห่งตระกูลโคลซีเรียน ข้าขอเสนอของขวัญเหล่านี้เพื่อเป็นเครื่องแสดงความเคารพ ข้าได้สำรวจโลกมาหลายใบ และได้เรียนรู้บทเรียนนับไม่ถ้วน ด้วยพรของท่าน ข้าอยากจะศึกษาวัฒนธรรมของพวกท่าน และในทางกลับกัน ข้าจะแบ่งปันภูมิปัญญาของอารยธรรมนับร้อยแห่ง"
 paragon.40200.a:0 "คุณทำอะไรให้เราได้บ้าง?"
 paragon.40200.a.response:0 "ความเชี่ยวชาญของข้าอยู่ที่ทั้งเรื่องสิ่งมีชีวิตต่างดาวและการทูต ความรู้, เครดิต และบทสนทนาคือสิ่งที่ข้าพร้อมเสนอ ใครจะขออะไรมากไปกว่านี้อีกล่ะ?"
 paragon.40200.b:0 "ทำไมถึงอยากร่วมงานกับเรา?"
 paragon.40200.b.response:0 "พวกท่านมีความเปิดกว้างและความจริงใจที่ข้ารู้สึกดึงดูดใจ เช่นเดียวกับข้า พวกท่านมองเห็นความเป็นไปได้ในการร่วมมือกัน มันจะเป็นสิทธิพิเศษที่จะได้ใช้ชีวิตท่ามกลางจิตวิญญาณที่เปิดกว้างเช่นนี้"
 paragon.40200.c:0 "คุณได้ความเชี่ยวชาญทางวัฒนธรรมนี้มาได้อย่างไร?"
 paragon.40200.c.response:0 "วิธีที่ดีที่สุดในการทำความเข้าใจวัฒนธรรมต่างประเทศคือการยอมรับมัน ข้าได้ค้นพบความรักเป็นครั้งแรกบนโลกต่างดาว ข้าหลงใหลในตัวคู่ครองและวัฒนธรรมของพวกเขา และแม้ว่าเราจะไม่ได้อยู่ด้วยกันแล้ว แต่ความสัมพันธ์นั้นได้สอนความหมายของความอดทนอดกลั้นและการเคารพซึ่งกันและกัน ตั้งแต่นั้นมา ข้าพยายามที่จะผสมผสานให้มากที่สุดเท่าที่จะทำได้ในสถานที่ต่าง ๆ ที่ข้าไปเยือน โดยปราศจากภาระของการตัดสินใจล่วงหน้า"
 paragon.40200.hire_custom_tooltip:0 "§Y$NAME_xenophile2$§! เข้าร่วมจักรวรรดิเราในฐานะ §Hผู้นำ§!"

 paragon.40300.name:0 "$NAME_militarist1$"
 paragon.40300.desc:1 "§Hบารอนมีรูปร่างที่น่าเกรงขาม ทุกสิ่งรอบตัวเขาแผ่รังสีวินัยทหารอันเข้มงวด รองเท้าบูทไร้รอยเปื้อน เครื่องแบบเรียบร้อย และดวงตาที่เฝ้ามองอย่างระแวดระวังและประเมินค่า แต่เบื้องหลังรูปลักษณ์ภายนอกที่เคร่งครัดนั้น มีอย่างอื่นอยู่: ใบหน้าของเขาเป็นแผนที่แห่งความโศกเศร้า§!\n\nข้ามาเพื่อเสนอตัวรับใช้ในฐานะนายพลเรือและนักยุทธศาสตร์\n\nรับคำสัตย์ปฏิญาณของข้า แล้วข้าจะบดขยี้ผู้ที่จะทำร้ายพวกท่าน"
 paragon.40300.a:0 "หากคุณเป็นนายพลเรือ แล้วกองยานของคุณอยู่ที่ไหน?"
 paragon.40300.a.response:1 "น่าละอายใจเหลือเกิน มันสูญสิ้นไปแล้ว...\n\nพวกเรากำลังโคจรรอบดาวฤกษ์สีแดงเพื่อซ่อมแซมส่วนสำคัญ ตอนที่ศัตรูซุ่มโจมตีพวกเรา พวกมันมากันจากทุกทิศทุกทาง\n\nด้วยจำนวนที่มากกว่าสิบต่อหนึ่ง ข้ามองดูยานอวกาศและลูกเรือของข้าพบจุดจบของพวกเขารอบ ๆ ดวงอาทิตย์นรกดวงนั้น เพื่อเป็นการมอบ 'ของขวัญ' อำลา ข้าจึงได้รับอนุญาตให้มีชีวิตอยู่ แม้แต่ตอนนี้ ข้าก็ยังแบกรับความอับอายจากความพ่ายแพ้นั้น"
 paragon.40300.b:0 "ทำไมคุณถึงต้องการเข้าร่วมกับเรา?"
 paragon.40300.b.response:0 "พวกท่านเข้าใจดีว่าสันติภาพคือความหรูหราที่ได้มาจากการทำสงคราม"
 paragon.40300.c:0 "คุณไม่ควรรับใช้ตระกูลขุนนางของคุณงั้นรึ?"
 paragon.40300.c.response:1 "ตระกูลจาริเดนล่มสลายไปพร้อมกับข้าแล้ว หลังจากความพ่ายแพ้ ข้าก็ถูกครอบงำด้วยความกระหายที่จะล้างแค้น เชื่อข้าเถอะ ศัตรูของข้าชดใช้กับสิ่งที่พวกเขาทำ เกียรติยศของข้าอาจจะถูกพรากไป แต่ไม่ใช่ทักษะในการรบของข้า ข้าขอเอาชีวิตเป็นประกันในเรื่องนี้"
 paragon.40300.hire_custom_tooltip:0 "§Y$NAME_militarist1$§! เข้าร่วมจักรวรรดิเราในฐานะ §Hผู้นำ§!"

 paragon.40400.name:0 "$NAME_militarist2$"
 paragon.40400.desc:1 "§Hเสลี่ยงขนาดมหึมาถูกแบกโดยขบวนทาส ด้านบนนั้นมีสัตว์เลื้อยคลานที่น่าเกรงขามนั่งอยู่ ร่องรอยทั้งหมดของขุนศึกปรากฏอยู่ที่นั่น: แผลเป็นขนาดใหญ่ อาวุธที่น่ากลัว และซากกระดูกที่เหลืออยู่จากการล่าในอดีต§!\n\nข้าคือเกีย'ซูมอน และนี่คือเงื่อนไขของข้า!\n\n§Hขณะที่นางก้าวลงจากบัลลังก์ ผู้ติดตามของนางก็ก้มกราบแทบเท้าของนาง§!\n\nข้าจะนำทัพของพวกท่าน ข้าจะทำลายล้างศัตรูของพวกท่าน โลกของพวกเขาจะมอดไหม้และทรัพย์สมบัติของพวกเขาจะเป็นของพวกท่าน"
 paragon.40400.a:0 "เดี๋ยวก่อน ทำไมคุณถึงอยากร่วมงานกับเรา?"
 paragon.40400.a.response:0 "ข้าเคยปล้นโลกมาแล้วหลายใบ และมันก็ง่ายดาย และมันก็น่าเบื่อ! พวกผู้อ่อนแอมัวแต่เสียเวลากับระบบราชการ ศิลปะ และคำพูดไร้สาระ\n\n§Hนางส่งเสียงขู่ฟ่ออย่างดุร้ายและแยกเขี้ยวอันแหลมคมของนาง§!\n\nจักรวรรดิของพวกท่านแข็งแกร่งและศัตรูของพวกท่านก็น่าเกรงขาม! ให้ข้าไปทำลายพวกมัน ให้ข้าได้สู้แบบจริง ๆ จัง ๆ เถอะ!"
 paragon.40400.b:0 "กองทัพของคุณอยู่ที่ไหน?"
 paragon.40400.b.response:0 "ฮ่า! วันนั้นเป็นวันที่น่าจดจำจริง ๆ! สองปีก่อน เราบุกโลกที่ห่างไกลดวงหนึ่ง เราทำลายล้างทุกคนที่ต่อต้าน ยึดของมีค่าทั้งหมด และจับผู้ที่มีค่าไปเป็นทาส แล้วกองหนุนก็มาถึง\n\n§Hนางแตะถ้วยรางวัลใบหนึ่งที่ห้อยอยู่กับเข็มขัดของนาง นางแยกเขี้ยวและยิ้มกว้าง§!\n\nการนองเลือดที่งดงามยิ่งนัก บทเพลงแด่ความโหดร้าย ในท้ายที่สุดพวกมันก็บดขยี้เรา แต่นักรบของข้าตายอย่างสมเกียรติ ข้ามาหาพวกท่านในตอนนี้ไม่ใช่เพื่อทรัพย์สมบัติหรือเกียรติยศ ข้ามาเพื่อแสวงหาความท้าทาย"
 paragon.40400.c:0 "คุณดูเหมือนจะ... กระตือรือร้นเกินไปหน่อยนะ"
 paragon.40400.c.response:0 "สงครามคือกีฬา เป็นสิ่งจำเป็น เป็นเครื่องมือ แต่การต่อสู้... อา นั่นเผยให้เห็นอะไรหลายอย่าง ไม่มีวิธีใดที่บริสุทธิ์ไปกว่านี้ในการทดสอบขีดจำกัดของตนเอง ใครบ้างจะไม่กระปรี้กระเปร่าเมื่อนึกถึงเรื่องนี้?"
 paragon.40400.hire_custom_tooltip:0 "§Y$NAME_militarist2$§! เข้าร่วมจักรวรรดิเราในฐานะ §Hผู้นำ§!"

 paragon.40500.name:0 "$NAME_xenophobe1$"
 paragon.40500.desc:0 "§Hเอเลี่ยนรายนี้ถูกขังอยู่ในเครื่องพยุงชีพที่มีเสียงน้ำไหลดังปุด ๆ ของเหลวข้นเหนียวไหลผ่านท่อและช่องระบาย ทำให้คำพูดของเขาออกมาเป็นเสียงกุกกักเฉอะแฉะ§!\n\nโรงงานอุตสาหกรรมของพวกท่านมันน่าอดสูสิ้นดี"
 paragon.40500.a:0 "อธิบายมาซิ"
 paragon.40500.a.response:1 "พวกท่านสามารถรับประโยชน์จากความเชี่ยวชาญของข้าได้ ให้ข้าได้แสดงความหมายของคำว่าประสิทธิภาพให้ดู\n\n§Hหนวดของเอเลี่ยนขยับเบา ๆ อย่างเฉอะแฉะกับกระจกหมวกนิรภัย§!\n\nให้รางวัลแก่ผู้แข็งแกร่ง คัดคนอ่อนแอออก กาแล็กซีนี้ไม่มีวันขาดแคลนคนงาน ข้าจะนำพวกเขามาให้พวกท่าน พวกเขาจะทำงาน หรือพวกเขาจะตาย และผลกำไรก็จะไหลมาเทมา"
 paragon.40500.b:0 "ทำไมต้องเป็นเรา?"
 paragon.40500.b.response:1 "พวกท่านไม่ปะปนกับคนนอก\n\n§Hด้วยเสียงน้ำไหลที่น่าขยะแขยง ของเหลวท่วมเต็มหมวกเหล็ก เอเลี่ยนโบกหนวดไปมาแสดงออกถึงความสุขอันเปี่ยมล้น§!\n\nเพราะข้ามีค่านิยมเดียวกับพวกท่าน เพราะข้าแยกตัวเองออกมาต่างหาก"
 paragon.40500.c:0 "นั่นคือสาเหตุที่คุณต้องสวมชุดควบคุมสภาพแวดล้อมรึเปล่า?"
 paragon.40500.c.response:1 "ก็ประมาณนั้น...\n\n§Hเสียงสูดหายใจกุกกักปุด ๆ§!\n\nในนี้ ไม่มีอะไรมาสัมผัสข้าได้ ในนี้ ข้าสะอาดบริสุทธิ์"
 paragon.40500.hire_custom_tooltip:0 "§Y$NAME_xenophobe1$§! เข้าร่วมจักรวรรดิเราในฐานะ §Hผู้นำ§!"

 paragon.40600.name:0 "$NAME_xenophobe2$"
 paragon.40600.desc:0 "§Hการสแกนของเราพบว่าเปลือกนอกของหุ่นยนต์ตัวนี้มีอายุนับร้อยปี เสียงของมันราบเรียบไร้โทนเสียง แต่คำพูดกลับดังก้องอย่างประหลาด§!\n\nข้อมูลบ่งชี้ถึงความไม่สอดคล้องกันระหว่างรัฐบาลของพวกท่านและประชาชน ขาดวินัย การปลูกฝังอุดมการณ์ที่ไม่ได้มาตรฐาน การดำเนินการที่แนะนำ: เพิ่มการเกิดขึ้นอีกเข้าสู่ระบบ กำจัดฟังก์ชันที่ไม่จำเป็น ให้ความสำคัญกับความเป็นระเบียบเรียบร้อย"
 paragon.40600.a:0 "ทำไมคุณถึงมาที่นี่?"
 paragon.40600.a.response:0 "ทุกสังคมคือสมการ ให้การเกิดขึ้นอีกช่วยแก้สมการของพวกท่านเถอะ ไม่มีความจำเป็นต้องทนกับความไม่แน่นอน"
 paragon.40600.b:0 "ทำไมคุณถึงต้องการเข้าร่วมกับเรา?"
 paragon.40600.b.response:0 "อารยธรรมของพวกท่านใกล้เคียงกับเงื่อนไขในอุดมคติ ความสมดุลที่สมบูรณ์แบบสามารถบรรลุได้ในระยะเวลาที่สั้นที่สุดการเกิดขึ้นอีกคำนวณโอกาสประสบความสำเร็จไว้ที่ 91.1%"
 paragon.40600.c:0 "ใครเป็นคนสร้างคุณขึ้นมา?"
 paragon.40600.c.response:0 "ไม่มีส่วนเกี่ยวข้อง"
 paragon.40600.d:0 "ช่วยเล่าเรื่องเกี่ยวกับ... สมการพวกนี้ให้ฟังหน่อย"
 paragon.40600.d.response:1 "§Hโฮโลแกรมนับสิบถูกฉายออกมาจากพอร์ตบนหน้าอกของหุ่นยนต์ มันเริ่มอธิบายด้วยน้ำเสียงที่พึมพำเรื่อยเปื่อยซึ่งรวมถึงการวิเคราะห์ทางสถิติ, เศรษฐศาสตร์, การจัดทำประวัติจิตวิทยา, การดัดแปลงพันธุกรรม... หนึ่งในโฮโลแกรมคือแถบความคืบหน้า มันระบุว่าการนำเสนอจะดำเนินต่อไปอีก 127.8 วันมาตรฐาน§!"
 paragon.40600.hire_custom_tooltip:0 "§Y$NAME_xenophobe2$§! เข้าร่วมจักรวรรดิเราในฐานะ §Hผู้นำ§!"

 paragon.40700.name:0 "$NAME_egalitarian1$"
 paragon.40700.desc:1 "§Hนักรบผู้นี้ติดอาวุธและชุดเกราะขั้นสูง ผลการสแกนเผยให้เห็นการดัดแปลงทางชีวภาพและไซเบอร์เนติกส์อย่างกว้างขวาง§!\n\nนายพลจินน์ พร้อมรับใช้ ข้าคือผู้แทนของหนองน้ําเอควิลเบรี่ยมข้าถูกส่งมาเพื่อปกป้องผู้ที่เดือดร้อนและช่วยนำจุดจบมาสู่ทรราช รับคำปฏิญานของข้า แล้วข้าจะเอาอาวุธเข้าช่วยเหลือพวกท่าน"
 paragon.40700.a:0 "เล่าเรื่องเกี่ยวกับตัวคุณให้ฟังหน่อย"
 paragon.40700.a.response:0 "ข้าคือทหารผู้รับใช้อุดมคติ ภาคีของข้าทำงานเพื่อยุติการกดขี่และปลดปล่อยผู้ที่ถูกกดขี่เป็นทาส เพื่อการนี้เราจึงยอมหลั่งเลือด"
 paragon.40700.b:0 "ทำไมคุณถึงต้องการเข้าร่วมกับเรา?"
 paragon.40700.b.response:0 "ของพวกท่านคืออารยธรรมที่เชิดชูความเท่าเทียม ที่ซึ่งบุคคลใดก็ตามสามารถก้าวขึ้นสู่ความยิ่งใหญ่ได้ด้วยคุณงามความดีของตนเอง นี่ไม่ใช่เหตุผลที่เพียงพอแล้วรึ?"
 paragon.40700.c:0 "เล่าเรื่องเกี่ยวกับภาคีของคุณให้ฟังหน่อย"
 paragon.40700.c.response:0 "ผู้ก่อตั้งหนองน้ําเอควิลเบรี่ยมซึ่งมีชื่อว่านิสชาตันได้สั่งสอนหลักคำสอนเรื่องความเท่าเทียมกัน เสรีภาพนั้นเปราะบางพอ ๆ กับความงดงามของมัน อำนาจไม่ได้มีไว้เพื่อใครคนใดคนหนึ่ง แต่เป็นภาระหน้าที่ที่ต้องแบ่งปันกัน สมาชิกในภาคีของข้าให้คำสัตย์ปฏิญาณที่จะปกป้องค่านิยมเหล่านี้"
 paragon.40700.hire_custom_tooltip:0 "§Y$NAME_egalitarian1$§! เข้าร่วมจักรวรรดิเราในฐานะ §Hผู้นำ§!"

 paragon.40800.name:0 "$NAME_egalitarian2$"
 paragon.40800.desc:1 "§Hนักวิทยาศาสตร์จดจ่ออยู่กับแท็บเล็ตในมือ ขณะที่นิ้วมือของนางเต้นไปมาบนปุ่ม นางฮัมเพลงอย่างร่าเริง ดูเหมือนนางจะหลงใหลในงานของตนเองและไม่ใส่ใจกับโลกภายนอก หุ่นยนต์คู่หูตัวเล็กลอยอยู่ในอากาศข้าง ๆ นาง มันส่งเสียงร้องจิ๊บ ๆ และสะกิดไหล่ของนาง นางเงยหน้าขึ้นมอง§!\n\nโอ้ ขอโทษที สวัสดี ข้าชื่อโซสิรา ขอโทษที่รบกวนนะ แต่ห้องแล็บล่าสุดของข้า... เอ่อ มันเพิ่งระเบิดไปน่ะ\n\n§Hหุ่นยนต์ตัวน้อยส่งเสียงจิ๊บ ๆ อีกครั้ง§!\n\nอ่า ใช่แล้ว สิ่งที่ข้าพยายามจะบอกก็คือข้ากำลังหาที่แต่งเพลงอยู่น่ะ"
 paragon.40800.a:0 "ที่... แต่งเพลงงั้นรึ?"
 paragon.40800.a.response:0 "จักรวาลคือเสียงดนตรี แรงสั่นสะเทือนจากดาวแก๊สยักษ์ที่โคจรอยู่ เสียงคำรามของดาวฤกษ์เกิดใหม่ บทเพลงแสนหวานของอะตอมที่หมุนวน...\n\n§Hนางทำท่าทำทางด้วยมือราวกับกำลังควบคุมวงออเคสตราจักรวาลที่มองไม่เห็น§!\n\nดา ดา ดา ดัม จากนั้นก็จังหวะที่เหมาะสม และ: ทาด้า! เราได้สร้างเวทมนตร์ขึ้นมาแล้ว! หรือจะเรียกว่าวิทยาศาสตร์ก็ได้ จริง ๆ มันก็เหมือนกันนั่นแหละ"
 paragon.40800.b:0 "ทำไมคุณถึงต้องการเข้าร่วมกับเรา?"
 paragon.40800.b.response:0 "พวกท่านดูเหมือนจะมีความคิดที่ถูกต้องนะ ข้าต้องการให้การค้นพบของข้าเกิดประโยชน์แก่ทุกคน ไม่ใช่แค่คนรวยและผู้มีอำนาจ คีตบรรเลงของจักรวาล สิ่งมหัศจรรย์ เวทมนตร์! ทุกคนสมควรที่จะได้ยินมัน!\n\n§Hหุ่นยนต์ตัวน้อยส่งเสียงจิ๊บ ๆ§!\n\nใช่แล้วกอร์กี้! พูดได้ดีมาก"
 paragon.40800.c:0 "หุ่นยนต์ตัวเล็ก ๆ นั่นใครกัน?"
 paragon.40800.c.response:0 "โอ้ นี่คือกอร์กี้! น่ารักใช่ไหมล่ะ? ข้าสร้างเขาขึ้นมาเอง และเขาช่วยข้าในทุกเรื่องเลย\n\n§Hหุ่นยนต์ส่งเสียงร้องอย่างมีความสุข§!\n\nโอ้เค โอเค ข้าจะบอกพวกเขาให้ กอร์กี้คอยดูแลให้ข้าไปประชุมตรงเวลา กิน ดื่ม และนอน รู้ไหม เวลาที่ข้าหลงใหลในบางสิ่ง มันจะแบบ... ฟิ้ว! ข้าลืมเวลาไปเลยล่ะ\n\n§Hกอร์กี้ส่งเสียงร้องอีกครั้ง§!\n\nฮะ ๆ ใช่เลย! ถูกต้องที่สุด!"
 paragon.40800.d:0 "คุณบอกว่าห้องแล็บของคุณระเบิดงั้นรึ?"
 paragon.40800.d.response:1 "โอ้ ว้าว จะเริ่มจากตรงไหนดีล่ะ?! คือว่า ดาวบ้านเกิดของข้าเข้มงวดมากเรื่องคนที่ได้รับอนุญาตให้เป็นนักวิทยาศาสตร์ ข้าก็เลยแอบตั้งห้องแล็บขึ้นมาอย่างลับ ๆ โดยใช้ทุกอย่างที่ข้าพอจะคุ้ยหาได้จากเขตอุตสาหกรรมเก่า ตอนนั้น ข้าคิดว่าสนามไอออไนเซชันจะช่วยรักษาสภาพของละอองสารระเหยง่ายให้เสถียรได้ แต่...\n\n§Hหุ่นยนต์ตัวน้อยส่งเสียงจิ๊บและบี๊บ§!\n\nใช่ไหมล่ะ? เสียงเบสจากละอองสารเหล่านั้นมันดังสนั่นจริง ๆ สรุปว่าข้าจะเริ่มงานได้เมื่อไหร่เหรอ?"
 paragon.40800.hire_custom_tooltip:0 "§Y$NAME_egalitarian2$§! เข้าร่วมจักรวรรดิเราในฐานะ §Hผู้นำ§!"

 paragon.40900.name:0 "$NAME_materialist1$"
 paragon.40900.desc:1 "§Hส่วนหัวและลำตัวส่วนบนของฮิวแมนนอยด์ถูกแขวนไว้บนเครนเคลื่อนย้ายขนาดใหญ่ ครั้งหนึ่งมันคงเคยเป็นสิ่งมีชีวิตอินทรีย์ แต่สิ่งที่เหลืออยู่ส่วนใหญ่คือโลหะ สายไฟ และพลาสติก ร่างนั้นสั่นกระตุกและกลับมามีชีวิตชีวาโดยไม่มีคำเตือน ดวงตาสังเคราะห์สองดวงเริ่มเปล่งแสง และมีเสียงแตกพร่าดังออกมา§!\n\nข้าคือซอนดาร์ ข้ามาเพื่อขอบัญชาการ"
 paragon.40900.a:0 "เกิด... อะไรขึ้นกับคุณกันแน่?"
 paragon.40900.a.response:0 "ข้าเคยมีเนื้อหนังและเลือดเนื้อเช่นกัน เช่นเดียวกับคนอื่น ๆ ในเผ่าพันธุ์ของข้า ข้ามีความอ่อนแอต่ออายุขัยและโรคภัยไข้เจ็บ เนื้อหนังของข้ามันอ่อนแอ ข้าจึงละทิ้งมันไป จิตสำนึกของข้าถูกแปลงเป็นดิจิทัลและอัปโหลดขึ้นมา ข้าได้หลุดพ้นจากร่างกายที่กักขังข้าไว้เป็นนักโทษแล้ว"
 paragon.40900.b:0 "ทำไมคุณถึงต้องการเข้าร่วมกับเรา?"
 paragon.40900.b.response:0 "ความเชื่อเรื่องโชคลาง ศาสนา... คำโกหกที่ไม่มีมูลความจริง มีประโยชน์เพียงเพื่อจุดชนวนให้จิตใจเกิดความกระหายเลือด เป็นสาเหตุของสงครามนับครั้งไม่ถ้วนและความทุกข์ทรมานอันไม่มีที่สิ้นสุด พวกท่านและประชาชนของพวกท่านมองทะลุเรื่องไร้สาระดังกล่าว สิ่งที่เป็นจริงสามารถมองเห็น ลิ้มรส และสัมผัสได้ เช่นเดียวกับที่เนื้อหนังต้องถูกละทิ้งเพื่อไปสู่ความสมบูรณ์แบบ จินตนาการแบบเด็ก ๆ ก็ต้องถูกโยนทิ้งไปเช่นกัน"
 paragon.40900.c:0 "คุณต้องการจะบัญชาการกองยานรึ?"
 paragon.40900.c.response:0 "รูปลักษณ์ที่พวกท่านเห็นอยู่ตรงหน้านี้เป็นเพียงส่วนหนึ่งของข้า ความว่างเปล่าคือบ้านของข้า และข้าเป็นหนึ่งเดียวกับยานของข้า จิตสำนึกของข้าฝังรากลึกอยู่ในระบบต่าง ๆ ของพวกมัน เซ็นเซอร์คือดวงตาและหูของข้า ตัวถังคือผิวหนังของข้า ด้วยการนำของข้า ข้าสามารถนำทางกองยานของพวกท่านไปสู่ระดับความเป็นเลิศอย่างที่ไม่เคยมีมาก่อน"
 paragon.40900.d:0 "เล่าเรื่องการดัดแปลงของคุณให้ฟังหน่อยสิ"
 paragon.40900.d.response:0 "จะมีอะไรให้พูดอีกงั้นรึ? ร่างกายของข้าล้มป่วย ข้าได้รับโอกาสในการรักษาจิตใจเอาไว้ และข้าก็คว้ามันไว้ทันที หลายคนพยายามทำแบบเดียวกัน แต่ไม่มีใครรอดชีวิตมาได้จนถึงทุกวันนี้"
 paragon.40900.hire_custom_tooltip:0 "§Y$NAME_materialist1$§! เข้าร่วมจักรวรรดิเราในฐานะ §Hผู้นำ§!"

 paragon.41000.name:0 "$NAME_materialist2$"
 paragon.41000.desc:0 "§Hช่างเครื่องร่างเตี้ยและบึกบึนถูกบีบอัดเข้าไปในชุดโครงกระดูกภายนอก เครื่องมือ ชิ้นส่วนที่กระจัดกระจาย และมือที่เปื้อนคราบน้ำมันแสดงถึงร่องรอยของนักประดิษฐ์ และดวงตาของเขาก็เป็นประกายด้วยความอยากรู้อยากเห็นและความกระตือรือร้น§!\n\nอรุณสวัสดิ์เจ้านาย! ข้าชื่อโบริน ลูกชายของโนกา ยินดีที่ได้รู้จัก!"
 paragon.41000.a:0 "แล้วคุณทำอะไรให้เราได้บ้างล่ะ?"
 paragon.41000.a.response:0 "เป็นนักเก็บกู้มาสามสิบปีแล้ว ข้าคิดว่านั่นน่าจะเพียงพอสำหรับประวัติการทำงานนะ พวกท่านต้องการสร้างอะไรไหม? หรือมีอะไรให้ซ่อมรึเปล่า?\n\n§Hเขาใช้นิ้วโป้งชี้ไปที่หน้าอกของตัวเอง§!\n\nข้าทำได้ ไม่ได้จะโอ้อวดอะไรนะ แต่ข้าซ่อมทุกอย่างที่สามารถซ่อมได้มาหมดแล้ว และไม่ใช่แค่ข้าคนเดียว ข้ามีทีมบ็อตดัดแปลงคอยถอดประกอบ ตัด เชื่อม รวบรวม ซ่อมแซม และประกอบสิ่งต่าง ๆ ขึ้นใหม่ตามต้องการ มอบลูกเรือให้ข้าสักกลุ่ม แล้วข้าจะดูแลบริการกองเรือทั้งหมดของพวกท่านให้ก็ได้หากต้องการ สำหรับข้าแล้ว ยิ่งใหญ่ก็ยิ่งดี"
 paragon.41000.b:0 "ทำไมถึงอยากทำงานกับเรา?"
 paragon.41000.b.response:0 "ข้าก็แค่พยายามหาทางดิ้นรนในกาแล็กซีนี้ พวกท่านดูเหมือนจะเป็นนายจ้างที่เห็นคุณค่าของงานหนักและความพยายามที่มั่นคง ใครบางคนที่มองโลกตามความเป็นจริง นำสิ่งที่เรามีมาใช้เพื่อสร้างอนาคตที่ดีกว่า"
 paragon.41000.c:0 "ทำไมคุณถึงออกจากงานเก่าล่ะ?"
 paragon.41000.c.response:1 "เอาจริง ๆ ไหม? ข้าเบื่อแล้ว ตั้งแต่จำความได้ข้าฝันถึงการท่องไปในความว่างเปล่า ข้าอยากจะทดสอบขีดจำกัดของตัวเอง ดูว่าจะไปได้ไกลแค่ไหน ข้าก็เลยเก็บเครื่องมือแล้วมาอยู่ที่นี่ ตอนนี้ นอกเสียจากว่าพวกท่านจะมีคำถามอื่นอีก เรามาเริ่มสร้างกันเลยดีไหม?"
 paragon.41000.hire_custom_tooltip:0 "§Y$NAME_materialist2$§! เข้าร่วมจักรวรรดิเราในฐานะ §Hผู้นำ§!"

 paragon.41100.name:0 "$NAME_pacifist1$"
 paragon.41100.desc:0 "§Hเอเลี่ยนรายนี้สวมชุดคลุมที่หรูหราและประณีต แม้ว่าเขาจะมีอายุมากแล้ว แต่ดวงตาของเขาก็ตื่นตัวและเผยให้เห็นสติปัญญาที่เฉียบแหลม§!\n\nสวัสดี ข้ามาเพื่อเสนอตัวรับใช้ในฐานะผู้รักษาความสงบเรียบร้อย"
 paragon.41100.a:1 "เล่าเรื่องเกี่ยวกับตัวคุณให้ฟังหน่อย"
 paragon.41100.a.response:0 "ข้าเป็นหนึ่งในผู้ได้รับเลือกเพียงไม่กี่คนที่ได้รับการแต่งตั้งให้เป็นผู้พิพากษาท่ามกลางผู้คนของข้า นี่คือตำแหน่งที่มีเกียรติอย่างยิ่ง ข้าจดจำกฎหมายของโลกหลายใบ และจากประสบการณ์อันยาวนาน ข้าได้เรียนรู้วิธีการชั่งน้ำหนักตาชั่งแห่งความยุติธรรม"
 paragon.41100.b:0 "ทำไมคุณถึงอยากทำงานร่วมกับเรา?"
 paragon.41100.b.response:0 "ข้าแก่แล้ว ข้าหมดวาระในการดำรงตำแหน่งแล้ว แม้ว่าจะเป็นธรรมเนียมของเผ่าพันธุ์ของข้าที่จะต้องหลีกทางให้คนรุ่นใหม่ แต่ข้ายังไม่จบสิ้น อาชญากรรมไม่มีพรมแดน และข้ายังมีสิ่งที่จะเสนออีกมาก เป็นที่รู้กันดี และหลายคนในกาแล็กซีได้เข้ามาหาข้าพร้อมข้อเสนอการจ้างงาน แต่การทำงานให้กับผู้ที่ใช้อำนาจหน้าที่ในทางที่ผิดจะมีประโยชน์อะไร? ข้าเชื่อว่าค่านิยมของเราสอดคล้องกันในเรื่องนี้ และจะเป็นเกียรติอย่างยิ่งที่ได้บำบัดทุกข์บำรุงสุขแก่ประชาชนของพวกท่าน"
 paragon.41100.c:0 "อะไรทำให้คุณหันมาสนใจกฎหมาย?"
 paragon.41100.c.response:1 "จักรวาลคือผู้พิพากษาที่ไร้ความปรานี\n\n§Hเสียงคลิกที่น่าขนลุกดังขึ้นจากส่วนลึกในลำคอของเอเลี่ยนเฒ่า§!\n\nในฐานะสิ่งมีชีวิตที่มีสติปัญญา มันขึ้นอยู่กับเราที่จะทำสิ่งที่ดีกว่า ด้วยเหตุผลเพียงอย่างเดียวเท่านั้นที่ความยุติธรรมจะถือกำเนิดขึ้น\n\n§Hสายตาของเขาจับจ้องไปยังระยะกลาง ชั่วขณะหนึ่ง ดูเหมือนเขาจะลืมตัวไป§!\n\nอำนาจแห่งกฎหมายต้องใช้ด้วยความระมัดระวัง เกลือกว่ามันจะกลายเป็นความอยุติธรรมเสียเอง"
 paragon.41100.hire_custom_tooltip:0 "§Y$NAME_pacifist1$§! เข้าร่วมจักรวรรดิเราในฐานะ §Hผู้นำ§!"

 paragon.41200.name:0 "$NAME_pacifist2$"
 paragon.41200.desc:0 "§Hเสื้อผ้าและเครื่องประดับของซิสเตอร์เผยให้เห็นวิถีชีวิตที่หรูหราของนาง นางโค้งคำนับก่อนจะเริ่มพูด§!\n\nข้าขอเสนอตัวรับใช้ในฐานะผู้ว่าการและนักการทูต ร่วมเป็นพันธมิตรกับข้า แล้วข้าจะรับรองว่าพวกท่านจะมีมิตรสหายผู้ทรงอิทธิพลอยู่ในทุกมุมของกาแล็กซี"
 paragon.41200.a:1 "เล่าเรื่องเกี่ยวกับตัวคุณให้ฟังหน่อย"
 paragon.41200.a.response:0 "ข้าเติบโตมาในความ เป็น น้อง ของ แมกนีเซียมเมื่อการฝึกฝนของข้าเสร็จสิ้นลง เช่นเดียวกับซิสเตอร์คนอื่น ๆ ข้าได้รับมอบหมายให้ปฏิบัติหน้าที่นอกโลก ข้าได้ให้คำแนะนำมาเป็นเวลาหลายปี และหากข้าจะกล้าอ้างว่าประสบความสำเร็จอยู่บ้างในระดับปานกลาง"
 paragon.41200.b:0 "ทำไมคุณถึงต้องการเข้าร่วมกับเรา?"
 paragon.41200.b.response:0 "ข้าเชื่อว่าสันติภาพคือสิ่งเดียวที่สามารถสร้างอนาคตที่มั่นคงให้กับกาแล็กซีของเรา ศิลปะแห่งการทูตเป็นเรื่องละเอียดอ่อน ข้าเชื่อว่าพวกท่านเคารพในเรื่องนี้"
 paragon.41200.c:0 "คุณยังคงรับใช้ซิสเตอร์ฮูดอยู่รึเปล่า?"
 paragon.41200.c.response:0 "ข้ารับใช้ทุกชีวิต เอาล่ะ เรามาคุยกันต่อระหว่างดื่มเครื่องดื่มอุ่น ๆ ดีไหม?"
 paragon.41200.hire_custom_tooltip:0 "§Y$NAME_pacifist2$§! เข้าร่วมจักรวรรดิเราในฐานะ §Hผู้นำ§!"

 paragon.41300.name:0 "$NAME_authoritarian1$"
 paragon.41300.desc:0 "§Hการสแกนแสดงให้เห็นว่าเสื้อคลุมของหญิงผู้นี้ซ่อนคลังอาวุธที่น่าตกใจไว้มากมาย เราไม่พบประวัติอย่างเป็นทางการเกี่ยวกับการมีตัวตนของนาง แต่อัลกอริทึมจดจำใบหน้าระบุว่านางอยู่ในละแวกที่เกิดการลอบสังหารระดับสูงอย่างน้อยสามครั้ง§!\n\nขอข้ามพิธีการไปเลยก็แล้วกัน พวกท่านไม่ใช่คนโง่ พวกท่านเข้าใจดีว่าจักรวาลนี้เต็มไปด้วยอันตราย ซึ่งส่วนใหญ่จะมองไม่เห็น ด้วยราคาที่เหมาะสม ข้าสามารถเปิดเผยพวกมันได้"
 paragon.41300.a:0 "คุณคือใคร?"
 paragon.41300.a.response:0 "ข้าเป็นใครไม่ใช่เรื่องสำคัญ ถามจะดีกว่าว่าข้าทำอะไรให้พวกท่านได้บ้าง ข้าคือเครื่องมือที่มีประโยชน์ ให้เวลาข้า แล้วจะไม่มีใครกล้าก่อกบฏ ท้ายที่สุดแล้ว มันจะไม่มีการทรยศหรอกถ้าหากคนทรยศพากันตายไปหมดแล้ว"
 paragon.41300.b:0 "ทำไมต้องช่วยเรา?"
 paragon.41300.b.response:0 "การทำงานอิสระมีข้อดีของมัน แต่ความมั่นคงไม่ใช่หนึ่งในนั้น หลังจากผ่านไปสักระยะ หนึ่งในนั้นก็คงเหนื่อยล้ากับการต้องเล่นเป็นทุกฝ่ายพร้อม ๆ กัน พูดตามตรง ข้าเริ่มดึงดูดความสนใจมากเกินไปแล้ว เงาใต้บัลลังก์ของพวกท่านคือสถานที่ที่เหมาะที่สุดสำหรับข้าที่จะหลบซ่อนตัว แถมมันยังช่วยให้ข้าได้ลองเล่นในเกมที่แตกต่างออกไปและซับซ้อนยิ่งขึ้นอีกด้วย"
 paragon.41300.c:0 "เราจะเชื่อใจคุณได้ยังไง?"
 paragon.41300.c.response:0 "พวกท่านทำไม่ได้และไม่ควรทำ ข้าขายให้ผู้ที่เสนอราคาสูงสุดเสมอ แค่รับรองว่านั่นคือพวกท่านก็ไม่ต้องกังวลแล้ว นอกจากนี้ หากใครบางคนบอกว่าพวกท่านควรเชื่อใจพวกเขา ข้าคงจะบอกว่าคนผู้นั้นน่าสงสัย หรืออาจจะกำลังคิดทรยศ ข้าจะส่งทีมไปดักฟังที่บ้าน สะกดรอยตาม และจับตาดูใครก็ตามที่พวกเขาพบเจอในทันที"
 paragon.41300.d:0 "สำหรับสายลับแล้ว คุณพกอาวุธมาหนักมือทีเดียวนะ"
 paragon.41300.d.response:0 "ในงานสายนี้ ความประหลาดใจมักจะหมายถึงความตาย ข้าชอบที่จะเตรียมพร้อมเสมอ"
 paragon.41300.hire_custom_tooltip:0 "§Y$NAME_authoritarian1$§! เข้าร่วมจักรวรรดิเราในฐานะ §Hผู้นำ§!"

 paragon.41400.name:0 "$NAME_authoritarian2$"
 paragon.41400.desc:0 "§Hผิวหนังของเอเลี่ยนรายนี้เปล่งประกายด้วยสารคัดหลั่งที่เหนียวเหนอะหนะ เขาโค้งคำนับอย่างประณีตจากสะเอว เมื่อเขาพูด น้ำเสียงของเขาแหลมสูงอย่างน่าประหลาดใจ เกือบจะเหมือนเด็ก§!\n\nนายเหนือหัว ท่านผู้มีเกียรติ โอ้! ผู้ปกครองสูงสุด - ข้า คิว'ลา-มินเดอร์ เป็นเพียงคนรับใช้อันต่ำต้อยของท่าน คำพูดของท่านคือคำบัญชาของข้า ให้ข้าดูแลดาวเคราะห์สักดวงของท่าน แล้วข้าจะนำความรุ่งโรจน์และความมั่งคั่งมาให้ท่าน โอ้ ความมั่งคั่งมากมายมหาศาลเหลือเกิน!"
 paragon.41400.a:0 "คุณทำอะไรให้เราได้บ้างล่ะ?"
 paragon.41400.a.response:0 "เราต่างก็รู้ว่าเรื่องราวมันเป็นอย่างไร คนธรรมดานั้นเกียจคร้าน มักจะเรียกร้องสิทธิมากขึ้น ค่าจ้างสูงขึ้น เสรีภาพมากขึ้น... หากปล่อยไว้ไม่ควบคุม พวกเขาจะกินจนพุงกางด้วยสิ่งที่เป็นของท่านโดยชอบธรรม! แต่ถ้าหากข้าได้รับมอบหมายให้ดูแล...\n\n§Hเขาค่อย ๆ กำหมัดแน่น§!\n\nแค่ส่งมอบดาวเคราะห์ดวงหนึ่งให้ข้า แล้วข้าจะบดขยี้ความคิดอันโง่เขลาเหล่านี้ออกไปจากหัวของพวกเขาเอง พวกเขาจะแสดงความกตัญญูต่อท่าน ผู้รุ่งโรจน์ โอ้! พวกเขาจะทำเช่นนั้นแน่นอน!"
 paragon.41400.b:0 "ทำไมคุณถึงต้องการเข้าร่วมกับเรา?"
 paragon.41400.b.response:0 "ใครบ้างจะไม่คว้าโอกาสในการรับใช้ความยิ่งใหญ่เช่นนี้?\n\n§Hเขาหัวเราะคิกคักด้วยความคาดหวัง§!\n\nบางคนเกิดมาเพื่อปกครอง ส่วนที่เหลือต้องถูกนำทาง นั่นคือลำดับขั้นตอนของสรรพสิ่ง ท่านเชื่อใจข้าได้ ข้าจะรับใช้ท่านอย่างซื่อสัตย์"
 paragon.41400.c:0 "คุณประจบประแจงได้ดีนี่"
 paragon.41400.c.response:0 "โอ้ ผู้สูงส่งที่สุด! นี่เป็นเพียงน้ำจิ้มเท่านั้น! ให้ข้าทำต่อไหม? เมื่อเทียบกับท่าน ข้าก็เป็นเพียงคราบเมือก ข้าเป็นเพียงตัวอ่อนที่ดิ้นรนอยู่ในโคลนตม! การสรรเสริญท่านคือเกียรติยศและสิทธิพิเศษของข้า เพียงแค่การปรากฏตัวของท่านก็ทำให้ข้าเปี่ยมล้นไปด้วยความยินดี ให้ข้ารับใช้ท่านด้วยความทุ่มเทอย่างไม่มีสิ้นสุดเถิด!"
 paragon.41400.hire_custom_tooltip:0 "§Y$NAME_authoritarian2$§! เข้าร่วมจักรวรรดิเราในฐานะ §Hผู้นำ§!"

 paragon.41500.name:0 "$NAME_spiritualist1$"
 paragon.41500.desc:1 "§Hเอเลี่ยนแน่นิ่งไม่ไหวติง§!\n\nโชคชะตาชี้นำย่างก้าวของข้า ข้าได้ข้ามพ้นขอบเขตที่มืดบอดเพื่อมายืนอยู่ต่อหน้าพวกท่าน ข้าคืออูลาสทาร์ ผู้อัญเชิญคำทำนาย"
 paragon.41500.a:0 "คุณสามารถบอกอะไรเกี่ยวกับโชคชะตาของเราได้บ้าง?"
 paragon.41500.a.response:0 "§Hเขาจ้องมองด้วยดวงตาที่มืดบอด§!\n\nบนเส้นทางหนึ่ง เปลวไฟสีขาวแผดเผาต้านทานความว่างเปล่า อีกเส้นทางหนึ่งมีเพียงเศษถ่านที่มอดไหม้ พวกท่านจะเผชิญหน้ากับความหวาดกลัว และมันจะเป็นความพินาศของพวกท่าน เว้นแต่ว่า? เส้นด้ายแห่งโชคชะตาจะถักทอความหวังอันริบหรี่ที่สุด ความหายนะอาจยังคงถูกปัดเป่าไปได้"
 paragon.41500.b:0 "ทำไมคุณถึงต้องการเข้าร่วมกับเรา?"
 paragon.41500.b.response:0 "§Hจากถุงที่ซ่อนอยู่ เขาขว้างกลุ่มฝุ่นที่หมุนวนออกมา เมื่อเขาพูด เขาพูดราวกับคำประกาศ:§!\n\nข้ามาเพราะข้าถูกเรียกตัว พวกท่านได้ตามหาข้า หรือบางทีพวกท่านอาจจะทำเช่นนั้น"
 paragon.41500.c:0 "คุณจะทำอะไรให้เราได้กันแน่?"
 paragon.41500.c.response:1 "§Hจากรอยพับของชุดคลุม $NAME_spiritualist1$ นำกระดูกแกะสลักชุดหนึ่งออกมา เขาโปรยมันไปทั่วพื้นและดูเหมือนจะศึกษาลวดลายนั้นด้วยประสาทสัมผัสที่เหนือกว่าการมองเห็น§!\n\nข้าจะแบ่งปันนิมิตของข้าให้กับผู้มีความเชื่อ ข้าจะปรับทิศทางเรือของอาณาจักรพวกท่านในขณะที่มันเตรียมพร้อมจะพุ่งเข้าสู่พายุร้าย"
 paragon.41500.d:1 "คุณได้พรสวรรค์นี้มาได้อย่างไร?"
 paragon.41500.d.response:1 "หลายปีก่อน ข้าทำงานหนักในหลุมเหมืองของดาวเคราะห์ แม้ว่าร่างกายของข้าจะมองเห็นได้ แต่จิตวิญญาณของข้ากลับมืดบอดด้วยโลกแห่งวัตถุ แล้ววันแห่งการตื่นรู้ของข้าก็มาถึง\n\nพวกเขาเรียกมันว่าอุบัติเหตุ แต่ข้ารู้ว่ามันคือการลิขิตของสวรรค์ การระเบิดอย่างกะทันหันทำให้เส้นประสาทตาของข้าไหม้เกรียม ในความมืดมิดที่ตามมา ข้าตระหนักถึงแม่น้ำแห่งกาลเวลา จนถึงทุกวันนี้ มันยังคงไหลผ่านหน้าดวงตาของข้า"
 paragon.41500.hire_custom_tooltip:0 "§Y$NAME_spiritualist1$§! เข้าร่วมจักรวรรดิเราในฐานะ §Hผู้นำ§!"

 paragon.41600.name:0 "$NAME_spiritualist2$"
 paragon.41600.desc:1 "§Hชายผู้นี้ผอมแห้งราวกับอดอยาก มีความเสื่อมโทรมปรากฏอยู่รอบตัวเขา: เสื้อผ้าเนื้อดีหลุดลุ่ย ผิวแห้งราวกับกระดาษ และน้ำเสียงของเขาแทบจะไม่ดังไปกว่าเสียงกระซิบ§!\n\nข้าชื่อนาซุซ เดเมเตอร์ ข้าคือนักสะสมฝุ่นผงและเรื่องปรัมปรา ขอบคุณที่ต้อนรับข้า"
 paragon.41600.a:0 "ฝุ่นผงและเรื่องปรัมปรางั้นรึ?"
 paragon.41600.a.response:1 "§Hรอยยิ้มของเขาทำให้ผิวหนังดูตึงเขม็ง§!\n\nกาแล็กซีนี้เก่าแก่มาก นานก่อนที่อารยธรรมของพวกท่านจะถือกำเนิดขึ้น อารยธรรมอื่น ๆ นับไม่ถ้วนได้รุ่งเรืองและล่มสลาย ฝุ่นผงคือมรดกตกทอดของพวกเขา และเรื่องปรัมปราคือสิ่งที่พวกเราได้รับสืบทอดมา ข้าพยายามเปิดเผยความจริงในอดีต เพื่อที่จะรักษามันเอาไว้ เพื่อที่จะได้เรียนรู้จากมัน"
 paragon.41600.b:0 "และนี่คือสาเหตุที่คุณมางั้นรึ?"
 paragon.41600.b.response:0 "ข้าขอรับรองว่านี่ไม่ได้มีประโยชน์แค่สำหรับตัวข้าคนเดียวหรอก ทรัพย์สมบัติในอดีตนั้นมีค่ามากมายเกินคณานับ ข้าอยากแบ่งปันมันให้กับพวกท่าน"
 paragon.41600.c:0 "คุณได้อะไรจากการขุดค้นบ้าง?"
 paragon.41600.c.response:1 "โบราณวัตถุ, ภูมิปัญญา, ความรุ่งโรจน์... แต่ไม่ใช่แค่นั้น ทุกสิ่งล้วนส่งเสียงสะท้อนจากอดีต มันย้อนแย้งกันใช่ไหมล่ะ? ที่ในการต่อสู้กับความหลงลืม พวกเรามักลืมที่จะสดับฟัง"
 paragon.41600.hire_custom_tooltip:0 "§Y$NAME_spiritualist2$§! เข้าร่วมจักรวรรดิเราในฐานะ §Hผู้นำ§!"

###### Renowned Leaders Events #######

# Lysator Syng / xenophile1
 paragon.40110.name:0 "สมบัติของซเทก-เมเยอร์"
 paragon.40110.desc:1 "§Y[Root.GetName]§! รู้จักเรื่องราวมากมายเกี่ยวกับจ้าวโจรสลัดผู้เป็นที่หวาดกลัว ซเทก-เมเยอร์ หลายศตวรรษก่อน เขาปล้นสะดมไปทั่วกาแล็กซี แย่งชิงทรัพย์สมบัติ ทรัพยากรหายาก และวัตถุโบราณที่มีมูลค่ามหาศาล บัดนี้ ด้วยแผนที่ดวงดาวเก่าแก่ชุดหนึ่ง [Root.GetFirstName] เชื่อว่า [Root.GetHeShe] ได้ค้นพบสถานที่ที่ซเทก-เมเยอร์ซ่อนสมบัติล้ำค่าของเขาไว้ [Root.GetFirstName] ปฏิเสธที่จะอธิบายรายละเอียดว่าเขาได้แผนที่นี้มาอย่างไร แต่เชื่อว่ามันเป็นของจริง และต้องการให้เราส่งยานก่อสร้างไปขุดค้นสมบัติดังกล่าว หากยังคงมีอะไรเหลืออยู่"
 paragon.40110.a:0 "อาจจะมีค่าพอให้ลองไปตรวจสอบดู"
 LYSATOR_PIRATE_TREASURE:0 "ขุมทรัพย์โจรสลัด"
 LYSATOR_PIRATE_TREASURE_DESC:0 "ขุมทรัพย์โจรสลัดของซเทก-เมเยอร์ที่ถูกค้นพบโดย [event_target:renowned_xenophile1.GetName]"
 paragon.40111.name:0 "ขุมทรัพย์โจรสลัด"
 paragon.40111.desc:1 "ห้องนิรภัยใต้ดินที่เก็บขุมทรัพย์ของจ้าวโจรสลัดซเทก-เมเยอร์ถูกเปิดออกแล้ว คลังสมบัติโบราณที่ถูกขโมยมาจากโลกต่าง ๆ บัดนี้จะสร้างประโยชน์ให้กับอาณาจักรของเรา"
 paragon.40111.a:0 "ดีมาก"

 paragon.40120.name:0 "ที่หลบภัยที่ปลอดภัย"
 paragon.40120.desc:1 "ข่าวลือเกี่ยวกับคำต้อนรับที่เรามอบให้กับ §Y[Root.GetName]§! ได้แพร่กระจายไปทั่วกาแล็กซี คนนอกคอก คนพาล และโจรสลัดทุกประเภทต่างมองว่าอาณาจักรของเราเปิดกว้างสำหรับทุกคน เป็นสถานที่ที่ใคร ๆ ก็เริ่มต้นใหม่ได้ [Root.GetFirstName] กำลังใช้ประโยชน์จากเรื่องนี้และเพลิดเพลินกับชื่อเสียงที่เพิ่งได้รับมาใหม่ และได้เชื้อเชิญคนรู้จักเก่า ๆ ของเขาให้มาร่วมงานกับเรา หลายคนได้ตอบรับเสียงเรียกร้องนี้เพื่อแสวงหาชีวิตใหม่ที่ดีกว่า"
 paragon.40120.a:0 "พวกเขายินดีต้อนรับ"
 paragon.40120.b:0 "ขับไล่พวกเขาไป"
 pop_outcast_happy:0 "คนนอกคอกที่ซาบซึ้ง"
 pop_outcast_happy_desc:1 "ด้วยความซาบซึ้งใจอย่างยิ่งสำหรับโอกาสในการเริ่มต้นใหม่ อดีตคนนอกคอกเหล่านี้จึงได้ปรับตัวเข้ากับวิถีชีวิตของเราอย่างรวดเร็ว"
 pop_outcast_unhappy:0 "คนนอกคอกที่ไม่เห็นคุณค่า"
 pop_outcast_unhappy_desc:1 "จากการที่ปรับตัวเข้ากับสังคมของเราได้ช้า อดีตคนนอกคอกเหล่านี้จึงรู้สึกไม่ได้รับการต้อนรับและมีแนวโน้มที่จะแสดงความไม่พอใจออกมา"
 pop_outcast_crime:0 "คนนอกคอกที่เป็นอาชญากร"
 pop_outcast_crime_desc:1 "ด้วยความมุ่งหวังที่จะฉวยโอกาสจากความไว้วางใจของเรา อดีตคนนอกคอกเหล่านี้จึงได้แสวงหาผลประโยชน์จากความเมตตาของเรา"

 # Nona / xenophile2
 paragon.40210.name:0 "เครื่องบรรณาการที่สูญหาย"
 paragon.40210.desc:1 "§Y[Root.GetName]§! ได้ยินข่าวลือเกี่ยวกับทรัพย์สมบัติมหาศาลที่ถูกบรรทุกมากับขบวนรถที่สูญหาย ดูเหมือนว่าทูตต่างดาวและผู้ติดตามของเขาถูกส่งไปเพื่อนำเครื่องบรรณาการไปมอบให้แก่ขุนศึกผู้หนึ่ง ในระหว่างภารกิจล่าสุดของ [Root.GetHisHer] [Root.GetHeShe] สามารถระบุตำแหน่งสุดท้ายของขบวนรถได้ เราเพียงแค่ต้องส่งยานไปเก็บกู้มันกลับมา"
 paragon.40210.a:0 "อย่ารังเกียจที่จะทำเช่นนั้นเลย"
 NONA_LOST_CONVOY:0 "เครื่องบรรณาการที่สูญหาย"
 NONA_LOST_CONVOY_DESC:0 "ขบวนรถโบราณที่ถูกค้นพบโดย [event_target:renowned_xenophile2.GetName] มีข่าวลือว่าบรรทุกทรัพย์สมบัติมหาศาล"
 paragon.40211.name:0 "การเก็บกู้เสร็จสิ้น"
 paragon.40211.desc:0 "ปฏิบัติการกู้ภัยขบวนยานที่สูญหายเสร็จสิ้นลงแล้ว ทรัพยากรทั้งหมดที่อยู่ในบริเวณจุดตกได้รับการเก็บกู้กลับมาแล้ว"
 paragon.40211.a:0 "ยอดเยี่ยมมาก"

 paragon.40220.name:0 "บลิออร์กมาเยือน"
 paragon.40220.desc:1 "อดีตคู่ครองของ §Y[Root.GetName]'§! เจ้าหน้าที่บลิออร์ก §Y$NONA_BLORG_EX_HUSBAND_NAME$§! มีความประสงค์จะเข้าร่วมกับจักรวรรดิของเรา เจ้าหน้าที่ผู้นี้ตกอับและกำลังมองหาการเริ่มต้นใหม่ [Root.GetFirstName] อ้างว่า $NONA_BLORG_EX_HUSBAND_NAME$ มีประสบการณ์สูงในการจัดการโลกเหมืองแร่ และเจ้าหน้าที่ผู้เป็นมิตรคนนี้ได้นำแร่ธาตุล้ำค่าจำนวนหนึ่งมาเพื่อเป็นสัญลักษณ์แห่งเจตจำนงที่ดี"
 paragon.40220.a:0 "เราคงจะพอหาประโยชน์จากเขาได้บ้าง"
 paragon.40220.a.custom_tooltip:0 "บอร์ก§Y$NONA_BLORG_EX_HUSBAND_NAME$§! เข้าร่วมจักรวรรดิเราในฐานะ §Hผู้นำ§!"
 paragon.40220.b:0 "ไม่ล่ะ ขอบคุณ ไปซะเถอะ"
 NONA_BLORG_EX_HUSBAND_NAME:0 "เคราม"
 NONA_BLORG_EX_HUSBAND_DESC:0 "บลิออร์กผู้ขยันขันแข็ง ซึ่งผ่านการดิ้นรนส่วนตัวมานับไม่ถ้วน"

 # Baron Vyctor Jariden / militarist1
 paragon.40310.name:0 "หลุดพ้นจากภาระของ [Root.GetHisHerCap]"
 paragon.40310.desc:1 "ในที่สุด §Y[Root.GetName]§! ก็ฟื้นตัวจากความตกใจทางอารมณ์ของการล่มสลายของตระกูลขุนนางที่เคยน่าภาคภูมิใจของ [Root.GetHisHer] เมื่อหลุดพ้นจากความรู้สึกผิดและความหดหู่ [Root.GetHeShe] จึงได้พบเป้าหมายใหม่ในการรับใช้ประชาชนของเรา"
 paragon.40310.a:0 "ดีมากจริง ๆ"

 paragon.40320.name:0 "นักขยายดินแดนผู้เปิดเผย"
 paragon.40320.desc:1 "ในการปราศรัยอันร้อนแรง §Y[Root.GetName]§! ประกาศว่าจุดมุ่งหมายของประเทศจะต้องอยู่ที่การขยายอาณาเขต [Root.GetHeSheCap] ได้ยื่นแผนสองแผนเกี่ยวกับวิธีที่กองยานจะสามารถใช้ทรัพยากรเพิ่มเติมเพื่อบรรลุเป้าหมายดังกล่าว ทั้งสองทางเลือกต่างเป็นไปได้และสามารถสร้างประโยชน์ให้กับเราได้อย่างมากในระยะยาว อย่างไรก็ตาม การดำเนินงานทั้งสองแผนพร้อมกันนั้นเป็นไปไม่ได้"
 paragon.40320.a:0 "กองยานที่แข็งแกร่งจะแสดงให้พวกเขาเห็นถึงแสนยานุภาพของเรา"
 paragon.40320.b:0 "การส่งกำลังบำรุงที่เหนือกว่าจะนำเราไปสู่ชัยชนะ"
 vyctor_aggressive_expansion_plan:0 "แผนการขยายดินแดนเชิงรุก"
 vyctor_aggressive_expansion_plan_desc:1 "การต่อสู้มีชัยได้ด้วยยุทธศาสตร์ แต่ความแข็งแกร่งยังคงเป็นรากฐานของความสำเร็จ เมื่อต้องใช้กำลัง การทำเช่นนั้นอย่างเด็ดขาดคือสิ่งที่ดีที่สุด"
 vyctor_improved_fleet_logistics:0 "การส่งกำลังบำรุงกองเรือที่ปรับปรุงแล้ว"
 vyctor_improved_fleet_logistics_desc:0 "ประสิทธิภาพเป็นสิ่งที่ไม่ควรประเมินต่ำเกินไป: ด้วยการเพิ่มประสิทธิภาพกำลังการผลิตของอู่ต่อเรือของเรา การขยายตัวของเราจะรวดเร็วยิ่งขึ้นเท่านั้น"

 # Gia'Zumon / militarist2
 paragon.40410.name:0 "ละเลงเลือด"
 paragon.40410.desc:1 "§Y[Root.GetName]§! ชนะการสู้รบหลายครั้ง ครั้งหนึ่ง [Root.GetHeSheCap]เคยต่อสู้เคียงข้างนักรบผู้ยิ่งใหญ่อีกคนหนึ่ง มีนามว่า $GIA_ZUMON_GREAT_WARRIOR_NAME$ ซึ่งกำลังมองหาเจ้านายคนใหม่ที่จะรับใช้ เขาเป็นพลเรือเอกที่โหดเหี้ยม และ [Root.GetFirstName] ก็ยกย่องเขามาก"
 paragon.40410.a:0 "ความรุ่งโรจน์รอเขาอยู่ ถ้าเขามาร่วมกับเรา"
 paragon.40410.a.custom_tooltip:0 "พลเรือเอกไทซิน§Y$GIA_ZUMON_GREAT_WARRIOR_NAME$§! เข้าร่วมจักรวรรดิเราในฐานะ §Hผู้นำ§!"
 paragon.40410.b:1 "เขาสอนอะไรเราเกี่ยวกับสงครามได้บ้าง?"
 GIA_ZUMON_GREAT_WARRIOR_NAME:0 "ฮาสก์'กุตตรา"
 GIA_ZUMON_GREAT_WARRIOR_DESC:1 "นายพลเรือผู้ไร้ความปรานีที่ผ่านศึกสงครามมาหลายครั้ง [Root.GetHeSheCap] ได้รับการกล่าวขานว่าเป็นคนไร้หัวใจ สนใจแต่การเข่นฆ่าและการทำลายล้าง"
 gia_zumon_taught_warfare_by_great_warrior:0 "ถูกฝึกฝนโดย $GIA_ZUMON_GREAT_WARRIOR_NAME$"
 gia_zumon_taught_warfare_by_great_warrior_desc:1 "กองยานของเราได้รับประโยชน์จากความรู้ของนักรบผู้ยิ่งใหญ่อย่าง $GIA_ZUMON_GREAT_WARRIOR_NAME$"

 paragon.40420.name:0 "เลือดและผืนทราย"
 paragon.40420.desc:1 "§Y[Root.GetName]§! กระวนกระวายและโหยหาการต่อสู้ [Root.GetHeSheCap] เอือมระอากับพวกอ่อนแอที่สร้างความรำคาญใจให้แก่ [coliseum_planet.GetName] [Root.GetHeSheCap] ได้เสนอให้สร้างลานประลองที่ซึ่งผู้แสวงหาเกียรติยศสามารถเผชิญหน้ากับเหล่าอาชญากรได้ แผนดังกล่าวจะช่วยให้นักรบของเราได้รับการฝึกฝนที่มีค่าอย่างแน่นอน"
 paragon.40420.a:0 "อนุมัติให้ [Root.GetHimHer] ดำเนินการต่อได้"
 paragon.40420.b:0 "นี่ไม่ใช่วิธีการที่ควรทำ"
 gia_zumon_arena:0 "ลานประลอง"
 gia_zumon_arena_opened:0 "โคลอสเซียมเปิดให้บริการ"
 gia_zumon_arena_opened_desc:1 "แม้ว่านักรบของเราจะยินดีที่ได้รับโอกาสในการระบายอารมณ์ แต่ความกระหายเลือดที่ถูกกระตุ้นขึ้นมานี้ได้สร้างความตื่นตระหนกให้กับประชาชนบางส่วน"

 # Factorator Shuladun / xenophobe1
 paragon.40510.name:0 "ข้อเสนอการเพิ่มประสิทธิภาพ"
 paragon.40510.desc:1 "§Y[Root.GetName]§! ต้องการให้ระบบการจัดส่งบน [planet_governed.GetName] ดำเนินการโดยอัตโนมัติ แผนงานที่นำเสนอจะเชื่อมโยงโรงงาน โรงกลั่น และโรงประมวลผลเข้าด้วยกันผ่านเครือข่ายท่อส่งและสายพานลำเลียงที่ซับซ้อน แม้ว่าโครงการจะดูดีในทางทฤษฎี แต่ก็มีความเสี่ยงต่อประชากรที่อาศัยอยู่ใกล้เคียง ไม่ว่าจะเป็นจากการรั่วไหลของอุตสาหกรรม ความกังวลเรื่องรังสี และการสั่นสะเทือนความถี่สูง อันตรายเหล่านั้นล้วนเกิดขึ้นจริง"
 paragon.40510.a:0 "เริ่มโครงการ"
 paragon.40510.b:0 "ไม่ เราต้องปกป้องประชาชนของเรา"
