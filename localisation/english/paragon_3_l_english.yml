 approach_situation_paragon_skrand_cure_regular_tt:0 "ทีมวิจัยได้รับการจัดตั้งขึ้นโดยพิจารณาจากประสบการณ์ด้านโรคอุบัติใหม่และการดูแลสุขภาพ เป้าหมายของพวกเขาคือการค้นหาวิธีรักษาในขณะที่ยังให้ความสำคัญกับงานอื่นๆ ด้วย"
 situation_paragon_skrand_cure_generous:0 "การวิจัยเชิงลึก"
 approach_situation_paragon_skrand_cure_generous_tt:0 "ทีมวิจัยได้รับการจัดตั้งขึ้นโดยพิจารณาจากประสบการณ์ด้านโรคอุบัติใหม่และการดูแลสุขภาพ เราจะให้ความสำคัญเป็นอันดับแรกกับการค้นหาวิธีรักษามากกว่าการบรรเทาอาการหรือการจำกัดการแพร่ระบาดของโรค"
