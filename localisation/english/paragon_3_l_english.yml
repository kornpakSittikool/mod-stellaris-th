 # Borin / materialist2
 paragon.41010.name:0 "ข้าเกิดในปีแห่ง..."
 paragon.41010.desc:1 "§Y[Root.GetName]§! ใช้เวลาหลายเดือนในห้องส่วนตัวของ [Root.GetHisHer] เพื่อเขียนอัตชีวประวัติของตัวเอง ซึ่งไม่เพียงแต่มีเรื่องราวชีวิตและการเดินทางของ [Root.GetHisHer] เท่านั้น แต่ยังรวมถึงทุกสิ่งที่ [Root.GetHeShe] รู้เกี่ยวกับการวิจัยวิศวกรรม การก่อสร้าง และวัตถุดิบหายาก เมื่อทำการทบทวนงานของเขา นักวิทยาศาสตร์ของเราก็ได้พบการค้นพบที่น่าสนใจบางประการ"
