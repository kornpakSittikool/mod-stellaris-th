 talon_power:0 "การอัปเกรดยานเทลอน"
 tech_strike_craft_skrand:0 "ยานรบเดอะชราวด์"
 tech_strike_craft_skrand_desc:0 "จากการเรียนรู้ความเชี่ยวชาญในการออกแบบของสแครนด์และผู้คนของเขา ยานโจมตีชั้นยอดเหล่านี้สามารถเข้าปะทะได้อย่างยาวนานและใช้ยุทธวิธีที่ยืดหยุ่นสูง"
 STRIKE_CRAFT_SKRAND:0 "$tech_strike_craft_skrand$"
 STRIKE_CRAFT_SKRAND_DESC:0 "$tech_strike_craft_skrand_desc$"

 paragon.3010.name:0 "โรคขนเน่า"
 paragon.3010.desc:1 "ความตื่นตระหนกเข้าครอบงำลูกเรือของเฟิสต์เทลอนเนื่องจากโรคอุบัติใหม่กำลังแพร่กระจายไปทั่วทั้งยาน จากการวิเคราะห์เบื้องต้น มันเป็นสายพันธุ์ของไวรัสที่ค่อนข้างไร้พิษภัยซึ่งพบได้ทั่วไปในหมู่ประชากรของเรา อย่างไรก็ตาม สำหรับลูกเรือเผ่าพันธุ์ปักษีของยานเทลอน ผลกระทบของมันกลับรุนแรงและน่ากังวลใจอย่างยิ่ง โดยเริ่มแสดงอาการครั้งแรกที่แผงขน ไวรัสทำให้โคนขนเน่าเสีย ภายในเวลาไม่กี่วัน ความเน่าเปื่อยจะลุกลามเข้าสู่กระแสเลือด\n\nเมื่อเวลาผ่านไป มันมีแนวโน้มที่จะส่งผลให้ถึงแก่ชีวิต"
 paragon.3010.a:0 "ร่วมมือกันหาวิธีรักษา!"
 paragon.3011.name:0 "การจากไปของวีรบุรุษ"
 paragon.3011.desc:0 "แม้เราจะพยายามอย่างเต็มที่แล้ว แต่สแครนด์ก็ได้เสียชีวิตลงจากโรคขนเน่า ลูกเรือของเขากำลังเตรียมพิธีศพตามประเพณีดั้งเดิม"
 paragon.3012.name:0 "โรคร้ายแพร่กระจาย"
 paragon.3012.desc:0 "แม้เราจะพยายามกักกันโรคบนเฟิสต์เทลอนอย่างสุดความสามารถแล้ว แต่พลเรือเอกสแครนด์ก็ติดโรคขนเน่าขั้นรุนแรง เราประเมินว่าประมาณ 60% ของลูกเรือทั้งหมดล้มป่วยลงแล้ว"
 paragon.3013.name:0 "อาการป่วยแบบใหม่"
 paragon.3013.desc:0 "อาการเจ็บป่วยแบบที่ไม่เคยพบเห็นมาก่อนของโรคขนเน่าระบาดได้ปรากฏขึ้นในชั่วข้ามคืน ห้องพยาบาลของเฟิสต์เทลอนหนาแน่นไปด้วยผู้ป่วย และทางเดินของยานก็เต็มไปด้วยผู้เจ็บป่วยและผู้ที่กำลังจะตาย"
 paragon.3014.name:0 "สถานการณ์ที่ทรุดโทรมลง"
 paragon.3014.desc:0 "มีรายงานผู้เสียชีวิตรายแรกจากโรคระบาดขนเน่าแล้ว เผ่าพันธุ์ปักษียังคงไม่สามารถต้านทานการติดเชื้อได้ด้วยตนเอง และเว้นแต่ว่าเราจะพบวิธีรักษา เราประเมินว่าอัตราการเสียชีวิตจะสูงถึง 95%"
 paragon.3015.name:0 "ค้นพบยารรักษาแล้ว!"
 paragon.3015.desc:0 "หลังจากทำงานหนักมาหลายเดือน เราสามารถนำยารักษามาใช้กับลูกเรือของเฟิสต์เทลอนได้สำเร็จ ความพยายามในการเร่งผลิตยากำลังดำเนินอยู่ พลเรือเอกสแครนด์จะรู้สึกขอบคุณเป็นอย่างยิ่งสำหรับความช่วยเหลือของเราในเรื่องนี้อย่างแน่นอน"

 paragon.3020.name:0 "การแสดงความขอบคุณ"
 paragon.3020.desc:0 "บุคลากรของเราได้ทำงานอย่างหนักเพื่อกระชับความสัมพันธ์กับสแครนด์และลูกเรือของเขา ความพยายามในการแลกเปลี่ยนวัฒนธรรมต่างเผ่าพันธุ์นี้เริ่มเห็นผลแล้ว: สแครนด์เพิ่งตกลงที่จะส่งมอบแบบแปลนของยานโจมตีที่มีประสิทธิภาพสูงของพวกเขา ซึ่งอาจนำไปสู่การก้าวกระโดดครั้งใหญ่ในความเข้าใจเกี่ยวกับการรบในอวกาศของเรา"
 paragon.3020.a:0 "เรารู้สึกขอบคุณสำหรับของขวัญชิ้นนี้"
 paragon.3021.name:0 "การศึกษายานต่างดาว"
 paragon.3021.desc:0 "การศึกษาวิจัย การจัดทำบัญชี และการทดลองร่วมหลายเดือนในที่สุดก็ทำให้ได้ข้อมูลเชิงลึก คลังคอมพิวเตอร์ของยานต่างดาวประกอบด้วยยุทธวิธีที่ปรับเปลี่ยนได้ในการจัดกระบวนยานโจมตี ตอนนี้ เทคโนโลยีนี้เป็นของเราที่จะนำไปใช้งานแล้ว"
 paragon.3021.a:0 "เราสามารถนำสิ่งนี้ไปใช้งานได้"

 paragon.3030.c:0 "ให้พวกเขาหาทางแก้ปัญหาร่วมกัน"
 paragon.3031.name:0 "โครงสร้างแบบบูรณาการ"
 paragon.3031.desc:1 "นายทหารและผู้บัญชาการของเรากำลังทำงานอย่างใกล้ชิดกับสแครนด์ แต่พวกเขาก็ไม่ได้เห็นพ้องต้องกันกับเขาเสมอไป โครงสร้างการบัญชาการที่ต่างฝ่ายต่างชอบนั้นแตกต่างกัน ทำให้เกิดความตึงเครียดที่ไม่จำเป็น สิ่งนี้ทำให้เกิดความจำเป็นในการฝึกร่วมทางทหาร\n\nภารกิจนี้อาจจำกัดความสามารถในการบัญชาการกองยานของเรา แต่การเตรียมความพร้อมของทหารอย่างไม่เหมาะสมอาจนำไปสู่ผลลัพธ์ที่เลวร้ายได้"
 paragon.3031.a:0 "จัดทำโปรแกรมการฝึกอบรมฝ่ายบริหารนายพลเรือ"
 paragon.3031.b:0 "การซ้อมรบเช่นนี้ไม่มีความสำคัญ"
 paragon.3032.name:0 "เสร็จสิ้นการฝึกอบรม"
 paragon.3032.desc:0 "ด้วยความก้าวหน้าที่ยอดเยี่ยมจากทั้งสองฝ่าย เราถือว่าโครงการฝึกอบรมร่วมประสบความสำเร็จเป็นอย่างมาก เราได้เรียนรู้มากมายจากสแครนด์เกี่ยวกับการรบระยะประชิดในอวกาศ ขณะเดียวกันก็อัปเดตข้อมูลแนวทางการปฏิบัติด้านลอจิสติกส์ของเราให้เขารวมถึงเหล่านายทหารได้รับทราบ ความรู้สึกการมองโลกในแง่ดีและความเป็นมิตรภาพได้หยั่งรากลึกขึ้นใหม่"
 paragon.3033.name:0 "ข้อมูลเชิงลึกทางการทหาร"
 paragon.3033.desc:0 "ปัญหาหลักอยู่ที่วิธีการใช้ยุทธวิธียานโจมตีที่แตกต่างกันอย่างมาก สแครนด์จะจัดส่งทีมยานโจมตีขนาดใหญ่หลายทีมเพื่อทำลายห่วงโซ่การบังคับบัญชาของศัตรู พวกเขาปฏิบัติการร่วมกันด้วยวัตถุประสงค์ที่ชัดเจนจากยานแม่\n\nส่วนวิธีการของเราจะมีความยืดหยุ่นมากกว่า โดยมีบทบาทที่ถูกกำหนดขึ้นจากความตระหนักรู้ในสถานการณ์และการกระทำที่อาจมีความเสี่ยงสูงแต่ได้รับผลตอบแทนสูง แต่ทว่าเราขาดความสามัคคีแบบที่เห็นในตัวสแครนด์และนายทหารของเขา ในตอนนี้ เรายังคงพยายามค้นหาจุดร่วมเพื่อพัฒนาต่อ"
 paragon.3034.name:0 "ยุทธวิธีที่ถูกลืม"
 paragon.3034.desc:0 "การจำลองการรบแสดงให้เห็นว่ายุทธวิธีแบบมุ่งเน้นของสแครนด์นั้นมีประสิทธิภาพมากในช่วงแรก แต่จะพ่ายแพ้ให้กับกลยุทธ์ตอบโต้ได้อย่างรวดเร็ว ถึงกระนั้น ผลลัพธ์ที่ได้ก็ยังเหนือกว่าสิ่งที่เราคาดหวังได้จากตัวเราเอง\n\nการนำยุทธวิธีทั้งสองรูปแบบบางส่วนไปใช้ควบคู่กันทำให้เกิดความโกลาหล โชคดีที่ความล้มเหลวเหล่านั้นทำให้เกิดแนวคิดที่มีอนาคตซึ่งน่าจะช่วยลดปัญหาที่เป็นต้นตอลงได้"
 paragon.admiral_fight.name:0 "ปัญหาการบัญชาการ"
 paragon.admiral_fight.desc:1 "ดูเหมือนว่าสแครนด์จะมีเรื่องทะเลาะวิวาทกับ [leader_to_fire_skrand.GetName] หนึ่งในผู้บัญชาการของเราเอง ปัญหานี้เกี่ยวข้องกับเกียรติยศส่วนตัวของพลเรือเอกอย่างรุนแรง พูดสั้นๆ ก็คือ สแครนด์รู้สึกว่าถูกดูหมิ่น และได้แถลงว่าจะลาออกจากการรับใช้เราทันที เว้นแต่เราจะปลด [leader_to_fire_skrand.GetName] ออกจากหน้าที่"
 paragon.admiral_fight.a:0 "เลือกเข้าข้างสแครนด์"
 paragon.admiral_fight.b:0 "เลือกเข้าข้าง [leader_to_fire_skrand.GetName]"
 paragon.admiral_fight.c:0 "บางทีอาจจะมีทางประนีประนอมกันได้..."
 paragon.admiral_fight.a.tt:0 "§Lเราอาจต้องเผชิญกับกระแสต่อต้านมากขึ้น หากเราเลือกยอมข้อตกลงกับสแครนด์ในปัญหานี้§!"
 paragon.3036.name:0 "หน่วยนายพลเรือแตกสลาย"
 paragon.3036.a.tt:1 "§Lการดำเนินการนี้จะกำจัดผู้เห็นต่างทั้งหมดออกจากกลุ่มนายพลเรือ§!"

 paragon.3040.name:0 "การอัปเกรดที่เป็นไปได้"
 paragon.3040.desc:0 "การวิจัยร่วมกันเกี่ยวกับลาสต์เทลอนทำให้เราได้ข้อมูลเชิงลึกที่ไม่เหมือนใครเกี่ยวกับการทำงานภายในของสิ่งก่อสร้างขนาดยักษ์นี้ เราเชื่อว่าทีมวิศวกรของเรา ภายใต้ความร่วมมือกับทีมวิศวกรบนยานเทลอน มีโอกาสที่จะปรับปรุงพื้นผิวภายนอกของยานอวกาศเพิ่มเติม ทำให้สามารถทนทานต่อการโจมตีและการรั่วไหลของตัวยานได้ดียิ่งขึ้น\n\nเราได้รับอนุญาตจากสแครนด์เรียบร้อยแล้ว แต่โครงการนี้จำเป็นต้องใช้เงินทุนเพิ่มเติม"
 paragon.3040.a:0 "ดำเนินการอัปเกรดต่อไป"
 paragon.3040.b:0 "เราไม่มีทรัพยากรสำหรับสิ่งนี้"
 paragon.3041.name:0 "เทลอน 2.0"
 paragon.3041.desc:0 "แม้เราจะไม่ได้ผลลัพธ์ตามที่คาดหวังไว้ แต่เราก็สามารถปรับปรุงระบบเกราะของยานเทลอนได้สำเร็จ วิศวกรของเรายังค้นพบข้อมูลเชิงลึกที่มีค่าซึ่งสามารถนำไปปรับใช้เพื่อปรับปรุงยานของเราเองได้ด้วย"
 paragon.3042.name:0 "ความก้าวหน้าที่ล่าช้า"
 paragon.3042.desc:0 "เราได้พยายามหลายวิธีในการเพิ่มความทนทานของโครงสร้างยานเทลอนโดยไม่ส่งผลต่อความเร็วหรือความสามารถในการบังคับทิศทาง แต่ความคืบหน้าก็เป็นไปอย่างล่าช้า ความช่วยเหลือจากวิศวกรของสแครนด์ถือเป็นประโยชน์อย่างยิ่งสำหรับเรา แต่พวกเขายังลังเลที่จะยอมใช้แนวคิดของเราโดยปราศจากการดูแลอย่างใกล้ชิด อย่างไรก็ตาม งานก็ยังดำเนินต่อไป"
 paragon.3043.name:0 "วัสดุที่เข้ากันไม่ได้"
 paragon.3043.desc:0 "วัสดุบางชนิดของเทลอนมีความแตกต่างจากวัสดุที่เรามีอยู่ โลหะผสมของมันมีความยืดหยุ่นน้อยกว่ามาก ซึ่งทำให้ตัวยานแตกร้าวโดยไม่คาดคิดระหว่างการติดตั้งแผ่นเกราะเพิ่มเติม วิศวกรของยานคิดถูกแล้วที่เข้ามาควบคุมงานของเรา และเราโชคดีมากที่พวกเขาอยู่ใกล้ๆ\n\nเราต้องใช้วัสดุบางส่วนที่จัดสรรไว้สำหรับการปรับปรุงมาใช้ซ่อมแซมยาน ซึ่งส่งผลให้การดำเนินงานทั้งหมดล่าช้าออกไป"
 paragon.3043.a:0 "จัดสรรเงินทุนเพิ่มเติม"
 paragon.3043.b:0 "มันเปล่าประโยชน์ ยกเลิกโครงการนี้เสีย"

 paragon.3050.name:0 "เที่ยวบินสุดท้าย"
 paragon.3050.desc:0 "§Hหน้าจอสั่นไหวเมื่อสะพานเดินเรือของสแครนด์ปรากฏขึ้น ขนของพลเรือเอกยุ่งเหยิง ดวงตาที่เฉียบคมของเขาเปล่งประกาย§!\n\nพวก... คนนอกพวกนี้! พวกมันมาที่นี่เพียงเพื่อเข่นฆ่าและทำลายล้างเท่านั้น!\n\n§Hเขาส่งเสียงสั่นจะงอยปากอย่างโกรธจัดและพูดต่อ§!\n\nข้าขอร้อง-- ไม่สิ ข้าขอเรียกร้องให้เราประกาศสงคราม! เราจะยอมให้พวกมันทำลายล้างทุกสิ่งทุกอย่างอีกไม่ได้ ไม่ใช่อีกครั้ง! ข้า... ข้าเชื่อว่าเมื่อเราร่วมมือกัน เราจะสามารถป้องกันไม่ให้เกิดโศกนาฏกรรมซ้ำรอยเหมือนที่เคยเกิดขึ้นกับคนของข้าได้ ข้าพร้อมที่จะสอนทุกสิ่งทุกอย่างที่พวกเราได้เรียนรู้มาให้แก่พวกท่าน"
 paragon.3050.a:1 "ท่านเคยติดต่อหรือเผชิญหน้ากับภัยคุกคามนี้มาก่อนหรือไม่?"
 paragon.3050.a.response:1 "ไม่เชิงเสียทีเดียว แต่ข้าเคยเห็นเหตุการณ์แบบนี้เกิดขึ้นมาก่อน... รูปแบบมันช่างคุ้นเคยเหลือเกิน ภัยคุกคามคือสิ่งเดียวกัน หากเราไม่รีบดำเนินการโดยเร็ว เราจะพบกับจุดจบแบบเดียวกันกับที่คนของข้าเคยเผชิญ\n\n§Hเขาพองขนของเขา§!\n\nข้าไม่อยากให้ชะตากรรมเช่นนั้นเกิดขึ้นกับใครทั้งสิ้น"
 paragon.3050.b:1 "ข้อมูลอะไรบ้างที่ท่านสามารถแบ่งปันได้?"
 paragon.3050.b.response:1 "เราเรียกศัตรูของเราว่า เมเนซ (ภัยคุกคามร้ายแรง) พวกมันไม่เคยตอบสนองต่อการขอนัดสื่อสารใดๆ ไม่ต้องพูดถึงเรื่องการทูตเลย และทุกคนที่ขวางทางพวกมันก็จบลงด้วยความตาย\n\n§Hเขาส่งเสียงกรีดร้องแหลมสูงออกมารอบหนึ่ง§!\n\nพวกมันปรากฏตัวขึ้นมาจากความว่างเปล่า เข่นฆ่า ฉีกกระชาก และเผาทำลาย! พวกเราแทบไม่มีโอกาสตอบโต้เลย แต่เราก็ได้เรียนรู้ว่าการต่อสู้กับศัตรูประเภทนี้หมายถึงอะไร สงครามรูปแบบดั้งเดิมนั้นไม่เพียงพอ มันจะต้องทำสงครามล้างเผ่าพันธุ์อย่างเบ็ดเสร็จเท่านั้น ไม่อย่างนั้นก็ไม่มีอะไรเลย เราต้องทำลายพวกมันทั้งหมดให้หมดสิ้น ทุกตัวไม่ให้เหลือ มิฉะนั้นวันพรุ่งนี้จะไม่มีอยู่จริง"
 paragon.3050.c:0 "มาเริ่มกันเลย"
 paragon.3050.c.response:0 "เวลาเป็นสิ่งสำคัญยิ่ง เราต้องเร่งกระบวนการนี้ให้เร็วขึ้น เรากำลังเผชิญกับภัยคุกคามจากการทำลายล้างอย่างสิ้นซาก เราต้องขัดขวางเรื่องนี้ให้ได้!"
 paragon.3050.d:0 "เราไม่สามารถทุ่มเททรัพยากรไปกับเรื่องนี้ได้"
 paragon.3050.d.response:1 "§Hเสียงโหยหวน\n\nอะไรนะ? ไม่... คุณกําลังทําผิดพลาดอย่างร้ายแรง§!"
 paragon.3051.name:0 "วิเคราะห์วิกฤตเรียบร้อย"
 paragon.3051.desc:0 "ด้วยความเชี่ยวชาญของสแครนด์ในการทำสงครามกับพวกเมเนซ รวมถึงฐานข้อมูลขนาดใหญ่ที่เขาให้ไว้ ทำให้ตอนนี้เราพร้อมและมีอุปกรณ์ที่ดีกว่าเดิมมากในการรับมือกับวิกฤตที่กำลังเกิดขึ้น ที่เหลืออยู่คือการนำความรู้นี้ไปใช้ประโยชน์อย่างจริงจัง"
 paragon.3052.name:0 "ยุทธวิธีการรบในภาวะวิกฤต"
 paragon.3052.desc:0 "ฐานข้อมูลที่เราเข้าถึงได้ช่วยให้เราเห็นตัวอย่างวิธีที่พวกเมเนซต่อสู้ในช่วงยุคจักรวรรดิของสแครนด์ ดูเหมือนว่าพวกมันจะใช้ยุทธวิธีคล้ายกับสิ่งที่เรากำลังเผชิญอยู่ในปัจจุบัน พวกมันแทบจะไม่ใช้ระบบลอจิสติกส์มาตรฐานเลย และกองยานของพวกมันก็มักจะพึ่งพาตนเองได้\n\nที่สำคัญกว่านั้น เทคโนโลยีรบกวนสัญญาณสัญญาณจะไม่ค่อยมีประสิทธิภาพในการต่อต้านกองกำลังดังกล่าว ปฏิบัติการวินาศกรรมก็ไร้ผลเช่นเดียวกัน"
 paragon.3053.name:0 "รูปแบบการต่อสู้ของวิกฤต"
 paragon.3053.desc:1 "การเปรียบเทียบข้อมูลของเราเองกับข้อมูลของสแครนด์ทำให้เราได้ข้อสรุปที่น่าสนใจ ปรากฏว่าศัตรูนั้นค่อนข้างไม่มีความยืดหยุ่น: กองยานที่ใหญ่ที่สุดของพวกมันจะมุ่งความสนใจไปที่เป้าหมายเดียวในแต่ละครั้ง โดยไม่คำนึงถึงสิ่งอื่นๆ ทั้งสิ้น มันน่าจะเป็นไปได้ในการระบุเป้าหมายดังกล่าวและจัดตั้งการป้องกันอย่างเหมาะสม"

 paragon.3060.name:0 "การศึกษาเทลอน"
 paragon.3060.desc:0 "กลุ่มวิศวกรจากยานเทลอนได้นำคำสั่งจากตัวสแครนด์เองมาส่งมอบ พวกเขาขอความช่วยเหลือในการบำรุงรักษาโครงสร้างของเทลอนและเตรียมความพร้อมท่าเรืออวกาศของเราสำหรับการซ่อมแซมที่อาจเกิดขึ้น ดังที่ระบุไว้ แผนการเหล่านี้จะเป็นกระบวนการที่ต้องเสียค่าใช้จ่ายสูง และมีเงื่อนไขอยู่ข้อหนึ่ง: เมื่อพิจารณาจากลักษณะงานที่ละเอียดอ่อน สแครนด์จะต้องเข้ามาควบคุมดูแลโครงการนี้ด้วยตนเอง"
 paragon.3060.a:0 "เราจะช่วยเหลือ"
 paragon.3060.b:0 "เราไม่สามารถแบ่งทรัพยากรไปใช้ได้"
 paragon.3061.name:0 "เทคนิคที่ถูกลืม"
 paragon.3061.desc:1 "ด้วยความช่วยเหลือของเรา วิศวกรของเทลอนได้ดัดแปลงท่าเรืออวกาศของเราเพื่อศึกษาการทำงานภายในของเทลอน การใช้ประโยชน์จากการออกแบบเพื่อการทดลองของเราช่วยเพิ่มประสิทธิภาพของไดรฟ์ความเร็วของพวกเขา ซึ่งช่วยให้ยานสามารถกระโดดข้ามอวกาศได้แม้หลังจากตัวยานเสียหายขั้นวิกฤต แม้ว่าการใช้ไดรฟ์นี้จะส่งผลให้การเดินทางเกือบจะเสร็จสิ้นในทันทีทันใด แต่มันจะคร่าชีวิตทุกคนบนยานและอาจทำให้ยานไม่สามารถใช้งานได้เป็นเวลาหลายปี ในอีกด้านหนึ่ง หากยานถูกทำลายในการรบ เราสามารถพยายามเปิดใช้งานระบบและกู้คืนซากปรักหักพังได้"

 paragon.3071.name:0 "เทลอนโบยบินอีกครั้ง!"
 paragon.3071.desc:0 "ด้วยการสนับสนุนอย่างใกล้ชิดและการดูแลของทีมวิศวกรของเทลอน เราสามารถสร้างตัวยานขึ้นมาใหม่ได้สำเร็จ ยานเทลอนได้เริ่มบินขึ้นสู่อวกาศอีกครั้ง!"
 paragon.3072.name:0 "กู้คืนยานเทลอนที่สูญหายสำเร็จ"
 paragon.3072.desc:1 "ต้องขอบคุณระบบป้องกันความเสียหายเพิ่มเติมและโปรโตคอลฉุกเฉิน ยานธงของสแครนด์จึงสามารถเข้าสู่โหมดความเร็วฉุกเฉินได้แม้จะได้รับความเสียหายขั้นวิกฤตก็ตาม แม้ว่าสิ่งที่ปรากฏบนท้องฟ้าเหนือดาวเมืองหลวงของเราจะแทบไม่เหลือสภาพเป็นยานรบ แต่ตัวยานสามารถใช้เป็นฐานในการสร้างขึ้นใหม่ได้ ซากยานตอนนี้กำลังรอการซ่อมแซมอยู่ที่ท่าเรือ หรือมิฉะนั้น เราสามารถนำตัวยานไปแยกเป็นวัสดุได้ เมื่อพิจารณาจากสภาพของมัน แม้แต่สแครนด์ก็คงจะเข้าใจการตัดสินใจหากเราเห็นว่าซากปรักหักพังนี้เป็นไปไม่ได้ที่จะทำการซ่อมแซม"
 paragon.3072.a:0 "ซ่อมแซมยานเทลอน"
 paragon.3072.b:0 "แยกชิ้นส่วนมันซะ เราต้องการแร่โลหะผสม"

 paragon.3080.name:0 "ความหวังครั้งใหม่"
 paragon.3080.desc:0 "การพัฒนาล่าสุดในด้านวิศวกรรมพันธุศาสตร์อาจช่วยให้เราสามารถขยายพันธุ์ประชากรของพลเรือเอกสแครนด์กลับมาใหม่ได้ เราอาจขาดความหลากหลายทางพันธุกรรมที่จะทำให้พวกเขาสามารถสืบพันธุ์ได้อย่างสมบูรณ์ แต่การเติมเต็มช่องว่างด้วยยีนที่เข้ากันได้ก็น่าจะช่วยให้งานเสร็จลุล่วงได้ สิ่งที่ต้องใช้ในการเริ่มต้นมีเพียงเงินทุนที่เพียงพอเท่านั้น"
 paragon.3080.a:0 "สแครนด์รับใช้เราเป็นอย่างดี เขาสมควรได้รับสิ่งตอบแทนเช่นนี้"
 paragon.3080.b:0 "เราไม่มีเวลาสำหรับเรื่องนี้"
 paragon.3081.name:0 "สแครนด์ส"
 paragon.3081.desc:0 "ความพยายามในการถอดแบบดีเอ็นเอของสแครนด์นั้นประสบความสำเร็จในระดับหนึ่ง แม้ว่ารูปลักษณ์ภายนอกจะเหมือนกันทุกประการ แต่รหัสพันธุกรรมของโคลนเหล่านี้ก็แตกต่างจากของสแครนด์มากพอที่จะนับเป็นเผ่าพันธุ์ใหม่ได้ มีผู้แจ้งแก่เราว่าพวกเขาพากันเรียกขานตัวเองว่า เผ่าเทลอน"
 paragon.3081.tt:0 "§Lเผ่าเทลอนจะปรากฏตัวบนดาวบ้านเกิดของเรา§!"
 paragon.3082.name:0 "ความกังวลใจ"
 paragon.3082.desc:0 "ดีเอ็นเอของสแครนด์ซึ่งเป็นเผ่าพันธุ์ปักษีนั้นมีขีดจำกัดและแข็งตัวมากกว่าที่คาดไว้มาก จนทำให้จำเป็นต้องสไลซ์ยีนจากสัตว์ปีกสายพันธุ์อื่นเข้ามาทดแทน วิธีการนี้อาจไม่ได้อุดมคติ แต่ก็น่าจะช่วยให้งานนี้เสร็จสิ้นได้"
 paragon.3083.name:0 "ไม่เหมือนเดิม"
 paragon.3083.desc:0 "§Hเครื่องแบบของสแครนด์อยู่ในสภาพสมบูรณ์ ขนของเขาได้รับการดูแลเป็นอย่างดี§!\n\nข้าได้เห็นผลลัพธ์ของการทดลองทางพันธุกรรมเล็กๆ ของพวกท่านแล้ว โคลนเหล่านั้นยังห่างไกลจากความสมบูรณ์แบบมาก แต่ข้าก็รู้สึกซาบซึ้งใจในความพยายามของพวกท่าน"
 paragon.3083.a:0 "เราเสียใจด้วยที่ได้ยินเช่นนั้น"
 paragon.3083.a.response:1 "อย่ากังวลไปเลย โคลนเหล่านี้น่าจะช่วยให้เรามีหนทางที่จะได้มีชีวิตเหมือนอย่างในอดีตได้ ในอนาคต มันอาจจะเป็นไปได้ในการสร้างทายาทรุ่นต่อไปด้วยซ้ำ พวกท่านได้มอบความหวังให้กับพวกเรา ข้าขอขอบคุณสำหรับสิ่งนั้น ขอให้ขนของพวกท่านเปล่งประกายเงางาม"
 NAME_Skrand_Species:0 "Talon"
 NAME_Skrand_Species_P:0 "Talons"
 NAME_Skrand_Planet: "Skravird"

 paragon.3090.name:0 "การศึกษาประวัติศาสตร์"
 paragon.3090.desc:1 "เราได้รับคำร้องขอจากลูกเรือบางส่วนของยานเทลอน พวกเขาขอให้เราใช้ทรัพยากรของเราเพื่อวิจัยอดีตของคนของพวกเขา มีเรื่องราวเกิดขึ้นมากมายในขณะที่เทลอนอยู่ในภาวะที่ไม่มีใครทราบสถานะ พวกเขาขอให้มีการบันทึกเรื่องราวเหล่านี้ไว้สำหรับคนรุ่นหลัง"
 paragon.3090.a:0 "ไปยังหอจดหมายเหตุ!"
 paragon.3090.b:0 "เราขอผ่าน"
 paragon.3091.name:0 "การอพยพครั้งใหญ่"
 paragon.3091.desc:0 "เราได้รับรายงานฉบับแรกเกี่ยวกับประวัติศาสตร์ของสแครนด์และผู้คนของเขา:\n\nในยุคสมัยของพวกเขา กาแล็กซีช่างกว้างใหญ่และไม่มีใครรู้จัก ขอบด้านนอกของกาแล็กซีถูกมองว่าอันตรายเกินกว่าจะทำการสำรวจ\n\nรอบๆ ศูนย์กลางกาแล็กซี จักรวรรดิอันกว้างใหญ่ต่างแย่งชิงอำนาจกัน หนึ่งในนั้นคืออารยธรรมนก ในขณะที่ผู้อื่นมองเห็นแต่ความมืดมิด นักสำรวจผู้กล้าหาญเหล่านี้มองเห็นโอกาส และนั่นคือจุดเริ่มต้นของการอพยพครั้งใหญ่"
 paragon.3092.name:0 "รังนอนที่พังทลาย"
 paragon.3092.desc:0 "นี่คือรายงานอีกฉบับเกี่ยวกับประวัติศาสตร์ของสแครนด์และผู้คนของเขา:\n\nการอพยพสิ้นสุดลงนานแล้ว ด้วยความมั่นคงตามแนวขอบนอกของกาแล็กซี เหล่าญาติพี่น้องของสแครนด์ต่างมีสุขกับทั้งความสงบและความเจริญรุ่งเรือง แต่เนื่องจากการแลกความระมัดระวังไปกับความสะดวกสบาย พวกเขาจึงไม่ได้เตรียมตัวรับมือกับภัยคุกคามเมเนซที่กำลังจะมาถึง\n\nผู้โจมตีบุกมาโดยไม่มีสัญญาณเตือนล่วงหน้า ไม่มีปีกคู่ใดสยายออก ไม่มีกรงเล็บหรือจะงอยปากใดๆ ที่ได้แสดงฝีมือในการรบ ผู้รุกรานที่ไร้โฉมหน้าได้ระเบิดถล่มดาวเคราะห์ของเผ่าปักษีจากอวกาศ เบื้องหลังของพวกมันหลงเหลือไว้เพียงความตายเท่านั้น"
 paragon.3093.name:0 "เฟิสต์เทลอน"
 paragon.3093.desc:0 "เราได้รับรายงานอีกฉบับเกี่ยวกับประวัติศาสตร์ของสแครนด์และผู้คนของเขา:\n\nรัฐบาลของสแครเวิร์ดล่มสลาย เศรษฐกิจตกอยู่ในความพินาศย่อยยับ แต่ความกล้าหาญของประชาชนยังคงไม่ลดลง ห่างไกลจากแนวหน้า โครงการหนึ่งได้ถูกริเริ่มขึ้น\n\nยานอวกาศที่จะสร้างขึ้นมานั้นจะมีความพิเศษและไม่เหมือนสิ่งใดที่เคยมีมาก่อน ขนาดอันมหึมาของมันจะสร้างความหวาดกลัวให้กับศัตรู เมื่อเฟิสต์เทลอนพร้อม มันถูกมอบให้อยู่ภายใต้การบัญชาการของผู้บัญชาการคนสุดท้ายของสแครเวิร์ด สแครนด์ ชาร์ปบีค วัยเยาว์และยังไม่ผ่านการทดสอบ ได้ก้าวเข้าสู่สงคราม ในไม่ช้า ประชาชนก็พากันขนานนามเขาว่า ผู้พิชิตเมเนซ และกรงเล็บแห่งแรกของสแครเวิร์ด"
 paragon.3094.name:0 "เที่ยวบินสุดท้าย"
 paragon.3094.desc:0 "และนี่คือรายงานฉบับสุดท้ายเกี่ยวกับประวัติศาสตร์ของสแครนด์และผู้คนของเขา:\n\nเฟิสต์เทลอน ลำแรกและลำสุดท้ายของรุ่น ได้ตัดผ่านแนวรบของศัตรู ชัยชนะในการรบครั้งแล้วครั้งเล่าได้มาด้วยความเฉลียวฉลาดและความกล้าหาญของลูกเรือและผู้บัญชาการของพวกเขา แต่น่าเสียดายที่มันมีโอกาสโบยบินได้ไม่นานนัก: ไม่มียานลำใด แม้กระทั่งยานอย่างเทลอน ที่จะสามารถพลิกกระแสน้ำของสงครามได้ด้วยตัวมันเอง ด้วยความสิ้นหวัง สแครนด์และนายทหารของเขาจึงวางแผนที่จะสละชีวิตในการป้องกันด่านสุดท้ายของสแครเวิร์ด ในความพยายามอันอาจหาญเพื่ออ้อมขนาบข้างศัตรู สแครนด์ได้สั่งการให้นำยานเทลอนเข้าสู่เกตเวย์ที่ยังไม่ได้รับการทดสอบ จากนั้นมา ก็ไม่มีใครได้ยินข่าวคราวเกี่ยวกับเขาหรือยานเทลอนอีกเลย"
 paragon_is_not_keides:1 "§Rแหล่งอารยธรรมนี้จะต้องถูกขุดค้นโดย §Yคีเดส§! ด้วยตัวเองเท่านั้น§!"

