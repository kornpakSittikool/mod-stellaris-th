 paragon.40910.desc:1 "§Y[Root.GetName]§! อ้างว่าได้ 'ปรับปรุงพัฒนา' ร่างกายของ [Root.GetHisHer] ในหลาย ๆ ด้าน โดยไม่ได้รับอนุญาต [Root.GetHeShe] ได้ส่งข้อความไปทั่วทั้งกองยานเพื่อเฉลิมฉลองสถานะอันสมบูรณ์แบบของ [Root.GetHisHer] และได้เผยแพร่แถลงการณ์ที่อ้างว่าอนาคตเดียวที่เป็นไปได้สำหรับอารยธรรมคือการก้าวสู่สภาพสังเคราะห์: สิ่งมีชีวิตอินทรีย์ทั้งหมดนั้นเปราะบางและมีชะตากรรมที่ต้องดับสูญ"
