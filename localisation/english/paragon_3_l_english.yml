 paragon.40720.desc:1 "§Y[Root.GetName]§! ได้ร้องขอการสนับสนุนจากภาคีของ [Root.GetHisHer] ซึ่งก็คือหนองน้ําเอควิลเบรี่ยมเพื่อช่วยเหลือจักรวรรดิของเราในการต่อสู้กับทรราชและผู้กดขี่ ยานขนส่งสินค้าบรรทุกแร่โลหะผสมล้ำค่าเพื่อค้ำจุนเราได้เดินทางมาถึงจากกองบัญชาการลับของพวกเขาแล้ว"
