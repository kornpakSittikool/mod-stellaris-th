 situation_paragon_skrand_cure:0 "ความก้าวหน้าของการรักษา"
 situation_paragon_skrand_cure_type:0 "การรักษา"
 situation_paragon_skrand_cure_desc:0 "เช่นเดียวกับโรคใหม่ๆ งานในห้องปฏิบัติการมีความสำคัญที่สุดในการต่อสู้กับโรคขนเน่า ทีมวิจัยกำลังทำงานอย่างไม่รู้จักเหน็ดเหนื่อยเพื่อหาวิธีรักษา ในขณะที่บุคลากรทางการแพทย์ของเรากำลังต่อสู้เพื่อบรรเทาอาการและจำกัดการแพร่ระบาดของโรค"
