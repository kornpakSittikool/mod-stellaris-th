 building_paragon_origin_academy:0 "สถาบันการศึกษาใหญ่"
 building_paragon_origin_academy_desc:0 "สถาบันการศึกษาใหญ่เป็นบ้านของคนที่ดีที่สุดและเฉลียวฉลาดที่สุดของเรา การพัฒนาจิตใจของพวกเขาอย่างต่อเนื่องจะเป็นประโยชน์ต่อผู้นำคนใหม่ และช่วยให้เราสามารถให้การศึกษาแก่คนรุ่นหลังได้"

