 paragon.40810.desc:1 "§Y[Root.GetName]§! และกอร์กี้ หุ่นยนต์คู่ใจของ [Root.GetHisHer] ได้ใช้เวลาว่างส่วนใหญ่ในการทดลองส่วนตัว บางชิ้นงานให้ผลลัพธ์ที่น่าสนใจ และ [Root.GetHeShe] ก็ได้แบ่งปันสิ่งที่ค้นพบกับนักวิทยาศาสตร์ของจักรวรรดิเรา"
