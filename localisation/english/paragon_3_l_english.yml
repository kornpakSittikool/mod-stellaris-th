 # Aturion / xenophobe2
 paragon.40610.name:0 "โครงการควบคุมประชากร"
 paragon.40610.desc:1 "§Y[Root.GetName]§! ได้คิดค้นแผนการเพิ่มประสิทธิภาพประชากร ซึ่งจะต้องแลกมาด้วยการจำกัดเสรีภาพส่วนบุคคลบางประการ แต่จะเพิ่มผลผลิตได้ไม่ต่ำกว่า 6.98%"
 paragon.40610.a:0 "เริ่มโครงการ"
