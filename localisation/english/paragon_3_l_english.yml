 paragon.41020.a.custom_tooltip:0 "พลเรือเอกหุ่นยนต์ §Y$BORIN_ROBOT_COMPANION_NAME$§! เข้าร่วมจักรวรรดิเราในฐานะ §Hผู้นำ§!"
 paragon.41020.b:0 "เราสามารถใช้งานนางในสำนักงานบางแห่งได้..."
 BORIN_ROBOT_COMPANION_NAME:0 "เบริลเลีย"
 BORIN_ROBOT_COMPANION_DESC:0 "ผู้ช่วย AI ที่สร้างและฝึกฝนโดยนักเก็บกู้ [event_target:renowned_materialist2.GetName]"
 borin_administrator_beryllia:0 "ผู้บริหาร $BORIN_ROBOT_COMPANION_NAME$"
 borin_administrator_beryllia_desc:1 "หุ่นยนต์คู่หูของนักเก็บกู้ §Y$NAME_materialist2$§! ได้หันมาทำงานเอกสารและบริหาร ช่วยปรับปรุงขั้นตอนการทำงานของเราให้มีประสิทธิภาพยิ่งขึ้นโดยใช้ประโยชน์จากความสามารถในการเรียนรู้ด้วยตนเองของเธออย่างเต็มที่"

 # Judge Uld Dagr / pacifist1
 paragon.41110.name:0 "เปิดโปงเหล่าอาชญากร"
 paragon.41110.desc:1 "§Y[Root.GetName]§! ได้ทำการสืบสวนเครือข่ายอาชญากรรมที่เติบโตอย่างเงียบ ๆ ภายในพรมแดนของเรา [Root.GetHeSheCap] รวบรวมพยานหลักฐานที่เชื่อมโยงบรรดาเจ้าพ่อและโจรสลัดกับนักการเมืองและทหารกังฉิน [Root.GetName] ได้นำระบบใหม่มาใช้เพื่อเร่งรัดกระบวนการพิจารณาคดีทางศาลในกรณีเช่นนี้ โดยมีวัตถุประสงค์เพื่อจับกุมอาชญากรทุกคนก่อนที่พวกเขาจะมีโอกาสหลบหนีออกนอกเขตอำนาจศาลของเรา"
 paragon.41110.a:1 "สิ่งนี้จะเกิดประโยชน์ต่อพวกเราทุกคน"
 judge_improved_crime_fighting_laws:0 "การปราบปรามอาชญากรรมที่ปรับปรุงแล้ว"
 judge_improved_crime_fighting_laws_desc:0 "ชุดกฎหมายใหม่เพื่อต่อสู้กับการสมคบคิดทางอาญาขนาดใหญ่"

 paragon.41120.name:0 "ว่าด้วยเรื่องธรรมชาติของอาชญากรรม"
 paragon.41120.desc:1 "§Y[Root.GetName]§! ใช้เวลาชั่วชีวิตของ [Root.GetHisHer] ในการศึกษาธรรมชาติของอาชญากรรมและแรงจูงใจของผู้กระทำความผิดที่รุนแรง [Root.GetHeSheCap] ได้แสวงหาคำแนะนำจากผู้เชี่ยวชาญ ศึกษารากเหง้าวัฒนธรรมของจักรวรรดิอื่น ๆ ทั้งที่ยังมีชีวิตอยู่และล่มสลายไปแล้ว และใช้อัลกอริทึมขั้นสูงเพื่อจำลองภาพว่าสังคมอุดมคติจะมีลักษณะอย่างไร ผลงานชิ้นสำคัญในชีวิตของ [Root.GetHisHer] สำเร็จออกมาเป็นบทความสังคมวิทยาขนาดใหญ่ที่จะทำหน้าที่เป็นแนวทางสำหรับคนรุ่นต่อไปในอนาคต"
 paragon.41120.a:1 "เป็นประโยชน์อย่างยิ่งแก่พวกเราทุกคน"

 # Vas the Gilded / pacifist2
 paragon.41210.name:0 "สันติภาพและความเจริญรุ่งเรือง"
 paragon.41210.desc:1 "§Y[Root.GetName]§! ได้รับชื่อเสียงอย่างกว้างขวางในการจัดงานเลี้ยงที่หรูหรา การชุมนุมนี้เป็นที่รู้จักจากการแสดงที่น่าตื่นตาตื่นใจโดยสมาชิกของแมกนีเซียมอะไลซัมอาหารและเครื่องดื่มที่แปลกใหม่ ตลอดจนการอภิปรายทางปรัชญาและจริยธรรม ที่นี่มิตรภาพได้เริ่มต้นขึ้น ข้อตกลงทางธุรกิจได้รับการตกลง และความขุ่นเคืองในอดีตได้รับการอภัย ความสามารถของ [Root.GetHisHerCap] ในการรวมบุคคลที่แตกต่างกันเหล่านี้เข้าด้วยกันได้วางรากฐานที่มั่นคงสำหรับความเจริญรุ่งเรืองในอนาคตของเรา"
 paragon.41210.a:0 "พวกเราแข็งแกร่งขึ้นเมื่อร่วมมือกัน"
 vas_population_united:0 "ประชากรรวมเป็นหนึ่ง"
 vas_population_united_desc:1 "เนื่องจากความนิยมของ §Y$NAME_pacifist2$§! ในหมู่ประชาชนและความสามารถของเธอในการนำพวกเขามารวมกัน สังคมโดยรวมจึงมีความมั่นคงมากขึ้น"

 paragon.41220.name:0 "ในยามที่เราต้องการ"
 paragon.41220.desc:1 "§Y[Root.GetName]§! เป็นศิลปินที่แท้จริงในเรื่องของเสน่ห์และการโน้มน้าวใจ [Root.GetHeSheCap] ได้ใช้ผู้ติดต่อและอิทธิพลทางการเมืองของ [Root.GetHisHer] เพื่อรวบรวมข้อมูลสำคัญจากทั่วกาแล็กซี [Root.GetFirstName] ได้เก็บความรู้ทั้งหมดของ [Root.GetHisHer] ไว้ในมรดกตกทอดของครอบครัว: คริสตัลสีเขียวอ่อนที่ [Root.GetHeShe] มักจะสวมใส่ในงานเลี้ยงที่หรูหราของ [Root.GetHisHer] เมื่อส่องกับสเปกตรัมแสงเฉพาะ ความลับของมันจะถูกฉายออกมาเป็นวงรัศมีอันงดงาม ตอนนี้ [Root.GetHeShe] เชื่อว่าถึงเวลาแล้วที่จะใช้ความรู้นี้เพื่อประโยชน์ของสังคม"
 paragon.41220.a:0 "มันจะถูกนำไปใช้ประโยชน์อย่างดี"

 # Kai-Sha / authoritarian1
 paragon.41310.name:0 "ข้อมูลกรองที่รวบรวมได้"
 paragon.41310.desc:1 "§Y[Root.GetName]§! เสนอฐานข้อมูลที่มีข้อมูลอ่อนไหวซึ่งรวบรวมมาตลอดหลายปีจากเครือข่ายผู้ติดต่อที่กว้างขวางของ [Root.GetHisHer] คลังข้อมูลขนาดใหญ่ประกอบด้วยทุกอย่างตั้งแต่พิมพ์เขียวของสถานที่ปฏิบัติงานทางทหาร งานวิจัยลับ และการสกัดข้อมูลจากการสืบค้นทางจิต สิ่งที่เสนอให้นั้นมีค่า แต่การใช้ข้อมูลนี้อาจทำให้ความขัดแย้งทั้งภายในและภายนอกรุนแรงขึ้น"
 paragon.41310.a:0 "ใช้ข้อมูลนี้"
 paragon.41310.a.custom_tooltip:0 "มีโอกาส §Y25%§! ที่ความเห็นของจักรวรรดิอื่นที่มีต่อเราจะเปลี่ยนไป §R-25§!"
 paragon.41310.b:0 "ทำลายข้อมูล"
 opinion_has_sensitive_information_about_us:0 "มีข้อมูลที่ละเอียดอ่อนเกี่ยวกับเรา"

 paragon.41320.name:0 "ขยายเครือข่ายผู้ติดต่อ"
 paragon.41320.desc:1 "§Y[Root.GetName]§! ได้ขยายเครือข่ายผู้ติดต่อของ [Root.GetHisHer] ไปทั่วกาแล็กซี บางส่วนเป็นผู้ให้ข้อมูลด้วยความสมัครใจ ในขณะที่บางส่วนถูกแบล็กเมลหรือล้างสมอง ไม่ว่าจะกรณีใด ข้อมูลที่ [Root.GetHeShe] รวบรวมมาจะมีประโยชน์อย่างมหาศาล"
 paragon.41320.a:0 "ความรู้คือพลัง"
 paragon.41320.a.intel.custom_tooltip:0 "ข้อมูลกรองของจักรวรรดิอื่น: §G+$@paragon_41320_a_intel_amt$§!"

 # Q'la-Minder / authoritarian2
 paragon.41410.name:0 "วังแห่งความทระนง"
 paragon.41410.desc:1 "§Y[Root.GetName]§!, ข้าราชการผู้เสื่อมโทรม ได้สร้างวังอันหรูหราฟุ่มเฟือยเพื่อ [Root.GetHimselfHerself] บนดาว [planet_governed.GetName] วังแห่งนี้เป็นทั้งสัญลักษณ์แห่งอำนาจและความมั่งคั่งของ [Root.GetHisHer] เช่นเดียวกับความหยิ่งยโสและการคอรัปชั่นของ [Root.GetHisHer] เพื่อเฉลิมฉลองการสร้างเสร็จ [Root.GetHeShe] จะจัดงานเลี้ยงครั้งใหญ่ซึ่งผู้มีชื่อเสียงทุกคนจะได้รับเชิญ และในการแสดงความเอื้อเฟื้อเผื่อแผ่ที่หาได้ยาก [Root.GetHeShe] ยังได้แบ่งปันทรัพย์สินส่วนหนึ่งของ [Root.GetHisHer] ให้กับประชาชนด้วย"
 paragon.41410.a:0 "จะคาดหวังอะไรอย่างอื่นได้อีก?"
 qla_minder_vanity_palace:0 "วังแห่งความทระนง"
 qla_minder_vanity_palace_desc:0 "สิ่งก่อสร้างอันยิ่งใหญ่นี้ดูแปลกประหลาดพอๆ กับที่น่าหลงใหล"

 paragon.41420.name:0 "ผู้ยักยอกทรัพย์"
 paragon.41420.desc:1 "§Y[Root.GetName]§!, ข้าราชการผู้เสื่อมโทรม ถูกจับได้ว่ายักยอกทรัพย์ ซึ่งสิ่งนี้ดำเนินมาเป็นเวลานานแล้ว และ [Root.GetHeShe] ได้ซุกซ่อนความมั่งคั่งของ[Root.GetHisHer] ไม่เพียงแต่ในบัญชีธนาคารเท่านั้น แต่ยังรวมถึงในห้องนิรภัยใต้ดินและคลังเก็บของในอวกาศลึกทั่วกาแล็กซี เมื่อเผชิญหน้ากับข้อกล่าวหา [Root.GetHeShe] ได้หมอบราบลงกับพื้น พร้อมสาบานว่าสิ่งของเหล่านี้ตั้งใจจะใช้เป็นของขวัญสำหรับผู้ปกครอง"
 paragon.41420.a:0 "เจ้าหนอนตัวนั้น!"

 # Ulastar / spiritualist1
 paragon.41510.name:0 "คำทำนายอันยิ่งใหญ่"
 paragon.41510.desc:1 "เป็นเวลาหลายปีที่ §Y[Root.GetName]§! ผู้มีสัมผัสพิเศษได้ตีความสัญญาณและลางบอกเหตุที่เผยให้เห็นถึงโชคชะตาอันยิ่งใหญ่ ตอนนี้ [Root.GetSheHe] อ้างว่าได้เห็นภาพนิมิตของกาแล็กซีที่รวมเป็นหนึ่งภายใต้ธงผืนเดียว ซึ่งก็คือธงของเรานั่นเอง ความรุ่งโรจน์ที่แท้จริงยังมาไม่ถึง"
 paragon.41510.a:0 "เกียรติยศอันยิ่งใหญ่กำลังรออยู่"
 ulastar_prophesied_greater_destiny:0 "โชคชะตาอันยิ่งใหญ่ตามคำทำนาย"
 ulastar_prophesied_greater_destiny_desc:0 "การประกาศของ §Y$NAME_spiritualist1$§! เกี่ยวกับความรุ่งโรจน์ในอนาคตของเรากระตุ้นให้ประชาชนเกิดความเร่าร้อนและจุดมุ่งหมายขึ้นมาใหม่"

 paragon.41520.name:0 "ตอบรับเสียงเพรียก"
 paragon.41520.desc:1 "เป็นเวลาหลายปีที่ §Y[Root.GetName]§! ได้ส่งเสียงเรียกออกไปในความว่างเปล่าผ่านความฝันพลังจิตอันทรงพลัง ตอนนี้ ยานพลเรือนหลายลำที่บรรทุกสมาชิกของหลากหลายเผ่าพันธุ์ได้ปรากฏตัวขึ้นในวงโคจรรอบดาว [planet_governed.GetName] เพื่อแลกกับโอกาสที่จะได้อยู่ร่วมกับศาสดาของพวกเขา พวกเขายินดีที่จะรับใช้เรา"
 paragon.41520.a:0 "พวกเขาจะเป็นส่วนหนึ่งของฝูงชนของเรา"
 paragon.41520.a.custom_tooltip:0 "เพิ่มประชากรฝ่ายจิตนิยมที่มีพลังจิตจำนวน §Y300§! หน่วย ไปยังดาว [event_target:planet_governed.GetName]"
 paragon.41520.b:0 "พวกเขาไม่เป็นที่ต้อนรับ"

 # Nasuz Demetor / spiritualist2
 paragon.41610.name:0 "วัตถุโบราณจากอดีตกาล"
 paragon.41610.desc:1 "§Y[Root.GetName]§! นักจดบันทึกเอกสารสำคัญ ได้ค้นพบแหล่งเก็บวัตถุโบราณ [Root.GetHeSheCap] รวบรวมข้อมูลเกี่ยวกับตำแหน่งที่อยู่ของพวกมันจากตำนานเก่าแก่และบันทึกข้อมูลของเซนเซอร์ที่แลกเปลี่ยนมาจากกลุ่มโจรสลัดเร่ร่อน ต้นกำเนิดของวัตถุปริศนาเหล่านี้ยังคงไม่ชัดเจน แต่การดูดซับเสียงความถี่ต่ำทำให้พวกมันสร้างความบิดเบี้ยวทางเวลาเล็กน้อยเป็นครั้งคราว เทคโนโลยีนี้ควรจะมีประโยชน์ต่อเรา"
 paragon.41610.a:0 "เป็นการค้นพบที่มีค่าจริงๆ"

 paragon.41620.name:0 "เสียงในความว่างเปล่า"
 paragon.41620.desc:1 "§Y[Root.GetName]§! นักจดบันทึกเอกสารสำคัญ ได้ดักสัญญาณข้อความประหลาดที่ถูกบิดเบือนด้วยสัญญาณรบกวน ข้อความนี้สะท้อนไปมาระหว่างดวงดาวเป็นเวลาหลายพันปี มันประกอบด้วยคำทักทายจากอารยธรรมต่างดาว รวมถึงพิกัดที่แม่นยำของดาวบ้านเกิดของพวกเขา เผ่าพันธุ์ดังกล่าวได้สูญพันธุ์ไปนานแล้ว แต่ก็อาจยังมีสิ่งหลงเหลือที่สำคัญและความรู้โบราณที่สามารถเปิดเผยได้บนดาวบ้านเกิดของพวกเขา"
 paragon.41620.a:0 "ใครจะรู้ว่าเราอาจจะพบขุมทรัพย์อะไรบ้าง?"
 paragon.41620.a.custom_tooltip:0 "พบแหล่งโบราณคดีแห่งใหม่บนดาว §Y[event_target:nasuz_arcsite_planet.GetName]§!"

#Empire modifiers

 integrated_command:0 "การบัญชาการแบบบูรณาการ"
 integrated_command_desc:0 "กระบวนการบัญชาการแบบบูรณาการช่วยให้เราสามารถคิดค้นนวัตกรรมการใช้ยานโจมตีในการรบได้ นอกจากนี้เรายังจะพ้นจากปัญหาการทะเลาะเบาะแว้งของกลุ่มนายพลเรือที่น่ารำคาญอีกด้วย"
 crisis_studied:0 "ข้อมูลเชิงลึกเกี่ยวกับวิกฤตของสแครนด์"
 crisis_studied_desc:0 "ต้องขอบคุณข้อมูลเชิงลึกของสแครนด์ ทำให้เราสามารถคิดค้นวิธีที่มีประสิทธิภาพในการทำสงครามกับวิกฤตการณ์ได้"
 crisis_studied_damage_desc:0 "สร้างความเสียหายให้กับฝ่ายไครซิสตอนจบเกม: §G+20%§!"
 talon_armor:0 "การเสริมเกราะเป็นชั้น"
 talon_armor_desc:1 "การสืบสวนเกี่ยวกับโครงหุ้มภายนอกของเทลอนทำให้เราได้ข้อมูลเชิงลึกในการเพิ่มประสิทธิภาพของตัวยาน ซึ่งทำให้เราปรับปรุงเกราะของยานเราได้โดยไม่ต้องเพิ่มน้ำหนัก"
 talon_hull:0 "การเสริมความแข็งแกร่งของตัวยาน"
 talon_hull_desc:0 "จากการศึกษาโครงสร้างยานของเทลอน เราได้ปรับปรุงความเข้าใจเกี่ยวกับเฟรมของยานอวกาศ ซึ่งเป็นกระบวนการที่น่าจะนำมาประยุกต์ใช้ในการเสริมความแข็งแกร่งภายนอกของยานเราได้อย่างรวดเร็ว"
 skrand_story:0 "รวมกันในประวัติศาสตร์"
 skrand_story_desc:0 "ด้วยความประทับใจในคำให้การของสแครนด์ ประชาชนของเราจึงมองว่าเขาเป็นแบบอย่างของจริยธรรมทางการทหารและเป็นเครื่องเตือนใจที่สำคัญถึงความสำคัญของความระมัดระวัง"

#Gateway Admiral

 paragon.3000.desc:0 "เราได้ฟื้นฟูพลังงานให้กับเกตเวย์โบราณในระบบดาว [gateway_system.GetName] ได้สำเร็จ! แม้จะเก่าแก่ แต่อุปกรณ์นี้ได้สร้างท่อเชื่อมต่อซับสเปซที่เสถียรและสามารถข้ามผ่านได้ทั้งหมด\n\nนอกจากนี้เรายังตรวจพบค่าพลังงานที่ผิดปกติ คล้ายกับค่าที่เกิดขึ้นเมื่อยานเข้าหรือออกจากเกต แต่ไม่มีหลักฐานใดๆ เกี่ยวกับยานที่กำลังเดินทางผ่านเลย"
 paragon.3000.a:0 "เฝ้าระวังสถานการณ์"

 paragon.3001.name:0 "การมาถึง"
 paragon.3001.desc:0 "ยานขนาดมหึมาได้ปรากฏตัวออกมาจากเกต ขนาดของมันไม่เหมือนกับสิ่งใดที่เราเคยเห็นมาก่อน กองกำลังทหารได้รับการเตือนภัยระดับสูง\n\nยานที่ไม่รู้จักนี้ไม่ตอบสนองต่อการเรียกขานของเรา แต่เมื่อพิจารณาจากข้อเท็จจริงที่ว่ามันดูเหมือนจะใช้งานไม่ได้เลยในขณะนี้ เราจะไม่เข้าปะทะในตอนนี้ การสืบสวนและความพยายามในการเปิดการสื่อสารยังคงดำเนินต่อไป"
 paragon.3001.a:0 "มันใหญ่มาก!"
 paragon.3001.b:1 "เริ่มกระบวนการสแกน"

 paragon.3002.name:0 "ข้อมูลเชิงลึก"
 paragon.3002.desc:1 "การสืบสวนของเราเกี่ยวกับยานขนาดมหึมานั้นยังไม่ได้คำตอบมากนัก อย่างไรก็ตาม เราสามารถถอดรหัสข้อมูลบางส่วนที่เราได้รับเมื่อเกตเปิดออกเป็นครั้งแรกได้ ดูเหมือนว่ายานลำนี้จะติดอยู่ภายในเกตเป็นระยะเวลาที่ไม่ทราบแน่ชัด (และอาจยาวนานอย่างเหลือเชื่อ)\n\nเพื่อเรียนรู้เพิ่มเติม เราจะต้องขึ้นไปบนยานลำนี้ เนื่องจากมันเป็นยานรบทางทหาร แนะนำให้ส่งหน่วยปฏิบัติการพิเศษไปทำภารกิจ"
 paragon.3002.a:0 "เตรียมยานขนส่งทหาร"
 PARAGON_GATEWAY_DUDE_PROJECT:0 "ปฏิบัติการบุกขึ้นยาน"
 PARAGON_GATEWAY_DUDE_PROJECT_DESC:1 "เราต้องขึ้นไปบนยานต่างดาวลำนี้ สัญญาณพลังงานที่อ่อนจางอาจบ่งบอกถึงระบบพยุงชีพที่ยังทำงานอยู่ มีโอกาสที่ใครบางคนหรือบางสิ่งอาจกำลังซ่อนตัวอยู่บนยาน ทหารของเรากระตือรือร้นที่จะสืบหาความจริง"

 paragon.3003.name:1 "การต้อนรับที่ไม่น่าไว้ใจ"
 paragon.3003.desc:1 "ไม่นานหลังจากขึ้นไปบนยาน เราได้พบกับกลุ่มมนุษย์ต่างดาวในชุดเครื่องแบบ ด้วยความตื่นตระหนกจากการปรากฏตัวอย่างกะทันหันของเรา หลายคนจึงรีบชักอาวุธขึ้นมา โชคดีที่สามารถหลีกเลี่ยงการดวลปืนได้\n\nผู้บัญชาการต่างดาวได้ขอความสงบ และอธิบายว่ายานลำนี้ต้องการการซ่อมแซมฉุกเฉิน เมื่อระบบทั้งหมดกลับมาใช้งานได้ เขาและลูกเรือตั้งใจที่จะกลับไปยังดาวบ้านเกิดของพวกเขา สแครเวิร์ด\n\nการแต่งกายด้วยเครื่องแบบทหารเต็มยศทำให้เขาดูน่าประทับใจอย่างยิ่ง ลูกเรือพูดถึงเขาด้วยความเคารพยำเกรง และพลังแห่งบุคลิกภาพของเขาก็สามารถรับรู้ได้แม้กระทั่งคนของเรา เขาได้หยิบยกความเป็นไปได้ในการสถาปนาความสัมพันธ์ทางการทูตอย่างเป็นทางการขึ้นมาแล้ว"
 paragon.3003.desc_gestalt:0 "ภายในยาน เราได้ค้นพบกลุ่มมนุษย์ต่างดาวที่กำลังพยายามฟื้นฟูการทำงานของยาน เมื่อพวกเขามองว่าการปรากฏตัวอย่างกะทันหันของเราเป็นภัยคุกคาม หลายคนจึงรีบชักอาวุธขึ้นมา แม้จะหลีกเลี่ยงความรุนแรงได้ แต่ผู้บัญชาการต่างดาวก็มองว่าเราเป็นศัตรูอย่างชัดเจน\n\nเขาแต่งกายด้วยเครื่องแบบทหารเต็มยศและดูน่าเกรงขาม พลังแห่งบุคลิกภาพของเขาสามารถรับรู้ได้แม้กระทั่งเรา อย่างไรก็ตาม ในจุดนี้การเจรจาเพิ่มเติมดูเหมือนจะไม่น่าเป็นไปได้"
 paragon.3003.a:1 "ช่วยผู้บัญชาการคนนี้ซ่อมยานของเขา"
 paragon.3003.b:1 "ไม่ต้องสนใจเขา ยึดยานลำนี้แทน"
 PARAGON_GATEWAY_DUDE_REPAIR_PROJECT:1 "ซ่อมแซมยานต่างดาว"
 PARAGON_GATEWAY_DUDE_REPAIR_PROJECT_DESC:2 "ยานต่างดาวต้องการการบำรุงรักษาอย่างครอบคลุม เราตกลงที่จะช่วยเหลืองานซ่อมแซมนี้"

 paragon.3004.name:0 "พลเรือเอกที่ถูกลืม"
 paragon.3004.intro: "ทีมวิศวกรของเราได้ช่วยอำนวยความสะดวกแก่ลูกเรือต่างดาวเป็นอย่างดี ชื่อเรียกของยานแปลคร่าวๆ ได้ว่า 'เฟิสต์เทลอน' และผู้บัญชาการของพวกเขาได้แนะนำตัวว่าคือสแครนด์ ชาร์ปบีค พลเรือเอกผู้มีชื่อเสียง\n\nจากการเปรียบเทียบข้อมูลจากคลังข้อมูลของเฟิสต์เทลอนกับข้อมูลของเรา เราได้ยืนยันแล้วว่าสแครนด์และลูกเรือของเขาติดอยู่ภายในเกตเป็นเวลานานหลายพันปี สำหรับพวกเขา มันเป็นการเดินทางระยะสั้นๆ แต่สำหรับกาแล็กซีส่วนที่เหลือ เวลาได้ล่วงเลยผ่านไปหลายพันปีแล้ว"
 paragon.3004.a.desc: "$paragon.3004.intro$\n\nต้องขอบคุณการขุดค้นของเราบนดาวสแครเวิร์ด อย่างน้อยเราก็สามารถชี้ทางให้พลเรือเอกชาร์ปบีคไปยังดาวบ้านเกิดของเขาได้ แต่ทว่าทุกสิ่งทุกอย่างและทุกคนที่เขาเคยรักนั้นได้สูญสลายไปนานแล้ว"
 paragon.3004.b.desc: "$paragon.3004.intro$\n\nพวกเขาไม่มีบ้านให้กลับไปอีกแล้ว ทุกสิ่งทุกอย่างและทุกคนที่พวกเขาเคยรักได้สูญสลายไปนานแล้ว"
 paragon.3004.a:0 "ชะตากรรมที่น่าเศร้า"

 paragon.3005.name:0 "สแครนด์ ชาร์ปบีค"
 paragon.3005.desc:1 "§Hพลเรือเอกสแครนด์ ชาร์ปบีค แห่งเฟิสต์เทลอนติดต่อหาเรา เขาดูเหนื่อยล้าอย่างยิ่ง§!\n\nดาวสแครเวิร์ดล่มสลายไปแล้ว บ้านของข้าไม่มีอีกต่อไป ชีวิตหลายพันล้านชีวิต... หายไปสิ้น\n\nเฟิสต์เทลอนได้กลายเป็นเดอะลาสต์เทลอน และตัวข้ากลายเป็นทหารที่ไร้ซึ่งอุดมการณ์ สำหรับความช่วยเหลือของพวกท่าน และในนามของลูกเรือของข้า ข้าขอประกาศความภักดีต่อพวกท่าน"
 paragon.3005.a:0 "ขอบใจสำหรับข้อเสนอ แต่เรามีผู้บัญชาการที่มีความสามารถของเราเองอยู่แล้ว"
 paragon.3005.a.response:0 "§Hสแครนด์กะพริบตาและไอแห้งๆ§!\n\nไม่มีข้อสงสัยเลย แต่จงรู้ไว้เถิดว่าการรับใช้ของข้าไม่ได้เสนอให้ง่ายๆ เพื่อเป็นเครื่องหมายแห่งไมตรีจิต ข้าจะสั่งให้วิศวกรของข้าดูแลให้ยานเทลอนยังคงใช้งานได้ และจะสอนวิศวกรของพวกท่านถึงวิธีการบำรุงรักษามัน"
 paragon.3005.b:1 "มีอะไรมาห้ามไม่ให้เรายึดยานลำนี้ไปเองเลยล่ะ?"
 paragon.3005.b.response:1 "§Hชาร์ปบีคถอยหลังกรูด จะงอยปากของเขาส่งเสียงร้องแหลมอันน่ารังเกียจออกมาหลายครั้ง§!\n\nยานลำนี้คือความภาคภูมิใจของบ้านเกิดที่สาบสูญของข้า สร้างขึ้นด้วยกรงเล็บของคนงานที่สละชีวิตเพื่อโครงการนี้! มันเป็นชิ้นส่วนสุดท้ายของบ้านเรา เป็นสิ่งเดียวที่เหลืออยู่คอยเตือนใจถึงรังนอนวัยเยาว์ของเรา\n\n§Hเมื่อกลับมาทรงตัวได้อีกครั้ง สแครนด์ก็ลดการส่งเสียงสั่นเครือลง§!\n\nจะกล่าวก็คือ ข้าจะสู้ด้วยปากและกรงเล็บเพื่อขัดขวางพวกท่าน"
 paragon.3005.c:1 "แต่งตั้งผู้นำ"
 paragon.3005.c_custom_tooltip:0 "§Lตกลง เรายอมรับคำสาบานของท่าน จงรับใช้อย่างมีเกียรติ พลเรือเอก§!\n$SEPARATOR$\n"
 paragon.3005.c.response:0 "§Hชาร์ปบีคแผ่ขนของเขาออก§!\n\nข้าจะทำเช่นนั้น ลาสต์เทลอนจะโบยบินอีกครั้ง แม้จะเป็นภายใต้ธงสีใหม่ก็ตาม พวกท่านได้ฟื้นคืนเป้าหมายให้กับพวกเรา ข้าขอขอบคุณพวกท่าน"
 paragon.3005.d_custom_tooltip:0 "§Lคำพูดนั้นว่างเปล่า ลาก่อน พลเรือเอก§!"
 paragon.3005.d:1 "ยกเลิก"
 paragon.3005.d.response:0 "§Hสายตาของชาร์ปบีคนั้นจ้องมองอย่างเฉียบคม§!\n\nเอาล่ะ ลาสต์เทลอนจะโบยบินอย่างโดดเดี่ยว ลาก่อน"
 NAME_LastTalon:0 "Last Talon"

 paragon.3006.name:0 "ชัยชนะ!" #good xenophobe outcome
 paragon.3006.desc:1 "กองกำลังของเราสามารถเอาชนะลูกเรือบนยานได้อย่างง่ายดาย เราได้ทำลายระบบป้องกันของพวกเขาและกวาดล้างทหารศัตรูออกจากสะพานเดินเรือ ยานลำนี้ตกเป็นของเราแล้ว!"
 paragon.3006.a:0 "เราจะเรียนรู้ความลับของมัน"
 paragon.3007.name:0 "มาสแคร์!" #bad xenophobe outcome
 paragon.3007.desc:1 "กองกำลังของเราบนยานต่างดาวถูกสังหารเกือบทั้งหมด! ความดุร้ายของฝ่ายตั้งรับนั้นเหลือเชื่อมาก หลังจากการรบ พลังงานถูกส่งกลับคืนสู่ระบบยุทธวิธีของยาน จากการสแกนของเรา ไฮเปอร์ไดรฟ์ยังคงใช้งานไม่ได้ แต่ตัวยานเองกำลังท้าทายการควบคุมพื้นที่อวกาศของเราอย่างแข็งกร้าว"
 paragon.3007.a:0 "ส่งกองยานไป!"

 paragon.3902.name:0 "ยานขนาดมหึมา"
 paragon.3902.desc:0 "ระหว่างการสำรวจตามมาตรฐานของเรา เราพบยานขนาดมหึมาจอดเฝ้าอยู่ใกล้กับเกตที่เปิดใช้งาน ยานไม่ตอบสนองต่อการติดต่อของเรา และดูเหมือนว่าจะทำงานด้วยระดับพลังงานที่วิกฤตอย่างยิ่ง"
 paragon.3902.a:0 "พยายามเรียนรู้เพิ่มเติม"

 first_claw:0 "กรงเล็บ"
 first_claw_plural:0 "กรงเล็บ"
