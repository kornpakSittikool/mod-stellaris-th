l_english:
 ### Larion Arc Site
 larion_digsite:0 "สัญญาณ"
 larion_digsite_desc:0 "เราได้รับสัญญาณประหลาดจากหุบเขาห่างไกลบน [From.Planet.GetName] เนื่องจากต้นกำเนิดของสัญญาณนี้อยู่ไกลจากอารยธรรมใดก็ตามที่เคยมีอยู่บนดาวดวงนี้ จึงน่าจะคุ้มค่าที่จะตามรอยมันและหาว่ามันมาจากที่ใด"

 unique.1.title:0 "ยานตก"
 unique.1.desc:0 "หลังจากค้นหาและวิเคราะห์หุบเขาที่เราตรวจพบสัญญาณประหลาดอย่างละเอียด ในที่สุดเราก็สามารถตามรอยไปถึงจุดตกของยานเก่าผุพังลำหนึ่งได้ แม้มันยังคงส่งสัญญาณขอความช่วยเหลือออกมา แต่ตัวเรือกลับดูว่างเปล่าเกือบทั้งหมด และไม่พบร่องรอยสิ่งมีชีวิตภายใน\n\nหนึ่งใน [Root.Owner.GetScientistPlural] ของเราพบค่ายพักเล็ก ๆ ระหว่างที่เราตรวจพื้นที่อย่างถี่ถ้วน และหลังจากตามรอยเก่า ๆ ต่อไปก็พบห้องทดลองโบราณแห่งหนึ่ง แม้ตอนนี้จะถูกเศษซากปิดกั้นอยู่ แต่นี่อาจเป็นที่อยู่ของซีโนผู้สูญหายจากยานลำนั้น"
 unique.1.a:0 "เคลียร์เศษซากออก"

 unique.5.title:0 "ห้องทดลองประหลาด"
 unique.5.desc:0 "หลังจากเคลียร์เศษซากชิ้นสุดท้ายออก [Root.Owner.GetScientistPlural] ของเราก็พบศพของกลุ่มซีโนกลุ่มหนึ่ง ซึ่งน่าจะเป็นพวกเดียวกับผู้ที่เดินทางมากับยานที่ตก หลังจากตรวจวิเคราะห์ซากของพวกเขาอย่างระมัดระวัง [Root.Owner.GetScientistPlural] ของเราสรุปว่าพวกเขาน่าจะเสียชีวิตจากความเสื่อมสภาพของอวัยวะภายในอย่างรวดเร็ว — เป็นไปได้มากว่ามาจากแบคทีเรียหรือโรคที่ไม่รู้จักบางอย่าง\n\nยังไม่ชัดเจนว่าจุดมุ่งหมายของพวกเขาคืออะไร หรืออะไรพาพวกเขามายังสถานที่นี้ในวาระสุดท้าย เครื่องจักรเก่าและคลังข้อมูลคอมพิวเตอร์ของห้องทดลองไม่อาจกู้คืนได้ และไม่มีสิ่งใดในห้องนี้ที่ให้เบาะแสเพิ่มเติม\n\nประตูเล็กบานหนึ่งที่นำลึกลงไปด้านล่างถูกปิดตายอยู่ และความพยายามเบื้องต้นใด ๆ ในการถอดรหัสก็ล้มเหลว แต่ [Root.Owner.GetScientistPlural] ของเราเชื่อว่าหากมีเวลา พวกเขาน่าจะเปิดมันได้"
 unique.5.a:0 "อีกแรงเดียว เราจะไขความลับของที่แห่งนี้ได้"

 unique.10.title:0 "ตัวอย่างอันไม่เหมือนใคร"
 unique.10.desc:0 "เมื่อประตูสู่ห้องสุดท้ายของห้องทดลองเปิดออกพร้อมเสียงปล่อยอากาศเบา ๆ เราก็พบว่ามันใหญ่กว่าที่ใครจะคาดคิดไว้มาก แถวแล้วแถวเล่าของถังโคลนเติมเต็มพื้นที่นี้ — สิ่งมีชีวิตนับร้อยนับพันถูกขังไว้ใต้ดิน\n\n[Root.Owner.GetScientistPlural] ของเราสรุปอย่างรวดเร็วว่าพวกมันเป็นสายพันธุ์เดียวกับซากที่เราพบก่อนหน้านี้ ปุ่มเล็ก ๆ ข้างถังโคลนแต่ละใบดูจะเป็นสิ่งเดียวที่จำเป็นต่อการปลุกพวกมันให้ตื่น หากเราต้องการ"
 unique.10.a:0 "ถอดถังโคลนของพวกมันออกมาศึกษา"
 unique.10.b:0 "ปลุกพวกมันขึ้นมาสักตัว"
 unique.10.b.tt:0 "เราจะติดต่อกับหนึ่งในโคลน"
 unique.10.c.evopred: "พันธุกรรมแบบกระป๋อง อร่อยนัก"

 unique.15.title:0 "โคลนลาริโอเนสซี"
 unique.15.desc:0 "ข้า... เรา... ตื่นขึ้นแล้ว\n\nเราอยู่... ที่ไหน? แล้วโลกบ้านเกิดของเราล่ะ มันยัง... ใช่ เรารับรู้ได้ — มันยังคงอยู่\n\nเราต้องขออภัย ดูเหมือนเราจะเสียมารยาทต่อแขกไปแล้ว — พวกเรา จิตสำนึกลาริโอเนสซี ขอต้อนรับพวกท่านสู่โลกบ้านเกิดของเรา §Y$NAME_Unique_System_2_Planet$§! ท่านยินดีจะปลดปล่อยพวกเรา เพื่อให้เราได้เห็นบ้านของเราอีกครั้งหรือไม่?"
 unique.15.a:0 "เล่าเรื่องของพวกคุณให้ฟังหน่อยได้ไหม?"
 unique.15.b:0 "ใครเป็นผู้สร้างโคลนเหล่านี้?"
 unique.15.c:0 "พวกคุณจะปลอดภัยไหมถ้าออกจากถังพวกนี้?"
 unique.15.d:0 "เรารู้ว่าควรทำอย่างไรกับพวกคุณ"

 unique.16.desc:0 "พวกเราคือจิตสำนึกลาริโอเนสซี ผู้อยู่อาศัยแห่งลาริออน\n\nครั้งหนึ่งหมู่คณะของเราแผ่ขยายครอบคลุมหลายระบบสุริยะ ตั้งแต่ขอบนอกของกาแล็กซีไปจนถึงแกนกลาง แต่ทุกอย่างเปลี่ยนไปเมื่อศัตรูรายหนึ่งของเราทำให้เราติดโรคร้ายหายาก ซึ่งกวาดผ่านผู้คนของเราจำนวนมหาศาล และทำให้เครือข่ายประสาทของเราเป็นอัมพาต\n\nบัดนี้ สิ่งที่เหลืออยู่ก็มีเพียงเท่านี้ ถังเหล่านี้ โคลนเหล่านี้..."

 unique.17.desc:0 "พวกเรานี่เอง\n\nมันเป็นความพยายามครั้งสุดท้ายของเราในการสืบทอดมรดกบางส่วนต่อไป เพื่อไม่ให้ความทรงจำของจิตสำนึกของเราหายสาบสูญไปตลอดกาล และ... ดูเหมือนว่ามันจะได้ผล\n\nเรากังวลว่าโคลนของเราอาจสืบทอดปัญหาจากอดีต แต่ดูเหมือนจะไม่เป็นเช่นนั้น"

 unique.18.desc:0 "เท่าที่เราทราบ โรคนั้นคงสาบสูญไปแล้วตลอดกาลนับตั้งแต่เราสร้างโคลนเหล่านี้ขึ้นมาในยุคโบราณ\n\nเราแทบนึกไม่ออกเลยว่าจะมีสถานการณ์ใดที่โรคนี้จะอยู่รอดได้โดยไม่มีร่างพาหะ เราควรจะปลอดภัยพอที่จะถูกปล่อยออกมา เพื่อเริ่มฟื้นฟูหมู่คณะของเรา"

 unique.20.desc:0 "ถ้าเช่นนั้น...\n\nชะตากรรมของเราจะเป็นอย่างไร? ในที่สุดท่านจะปล่อยเราจากถังเหล่านี้และคืนบ้านของเราให้เราหรือไม่?"
 unique.20.a:0 "ลาริออนเป็นของพวกคุณ สมควรเป็นเช่นนั้น"
 unique.20.a.tt:0 "เราจะได้รัฐบรรณาการใหม่หนึ่งรัฐ ซึ่งจะได้รับระบบ §Y[larion_planet.solar_system.GetName]§!"
 unique.20.b:0 "เราจะหาที่ให้พวกคุณอยู่"
 unique.20.b.tt:0 "ลาริโอเนสซีจะได้รับบ้านที่กำหนดไว้บน §Y[Root.Capital.GetName]§!"
 unique.20.c:0 "พวกคุณพลาดโอกาสไปแล้ว"
 unique.20.c.tt:0 "เราจะปิดถังโคลนลง"

 unique.22.desc:0 "งั้นก็เป็นเช่นนั้น..."

 # Names
 NAME_Larion_Species:0 "Larionessi"
 NAME_Larion_Country:0 "Larionessi Consciousness"

 # Opinion Modifiers
 unique_event_savior_opinion_modifier:0 "ผู้ช่วยกู้"

 # Static Modifiers
 larionessi_resurgence_modifier:0 "การคืนผงาดของลาริโอเนสซี"
 larionessi_resurgence_modifier_desc:0 "หลังจากถูกกักขังอยู่ในถังโคลนใต้ดินมาเนิ่นนานนับมหายุค ลาริโอเนสซีพร้อมจะก้าวขึ้นสู่เวทีกาแล็กซีอีกครั้ง"
 larionessi_planet_modifier:0 "รังท้องถิ่น"
 larionessi_planet_modifier_desc:0 "รังขนาดเล็กแห่งหนึ่งได้รับอนุญาตให้ตั้งรกรากบนดาวเคราะห์ดวงนี้ พวกมันคอยช่วยงานเล็ก ๆ น้อย ๆ เป็นครั้งคราว ด้วยความสำนึกในที่ลี้ภัยที่ได้รับ"

 ### Zevox Arc Site
 zevox_digsite:0 "ยานตก"
 zevox_digsite_desc:0 "หนึ่งในยานของเราที่กำลังวิเคราะห์ระบบ [Root.solar_system.GetName] ได้พบยานตกขนาดเล็กลำหนึ่งบนดวงจันทร์ของ [Root.Planet.Orbit.GetName] คือ [Root.Planet.GetName]\n\nมันไม่มีตราหรือสัญลักษณ์ใดที่เราเคยพบเห็นมาก่อน และแม้จะมีการนำตัวอย่างบางส่วนกลับไปทดสอบเพิ่มเติม แต่ตัวเรือนั้นใหญ่เกินไปและไม่มั่นคงเกินกว่าจะเคลื่อนย้ายได้ การวิเคราะห์และทดสอบเพิ่มเติมจึงต้องทำ ณ จุดที่พบ"

 unique.50.title:0 "วันที่ 1"
 unique.50.desc:0 "ภายในยานแทบว่างเปล่า เหลือเพียงซากโดรนไม่กี่ตัวกระจัดกระจายอยู่รอบลำ ไม่มีสัญญาณชีวิตอื่นภายในหรือใกล้ซากยาน หนึ่งใน [Root.Owner.GetScientistPlural] ของเราพบบันทึกข้อมูลเก่าที่ยังสมบูรณ์อยู่ แต่การถอดความมันต้องใช้เวลามาก\n\n§Lวันที่ 1\nรหัสการสังเกตการณ์: §S“ การย่อยแบบ พลังจิต0000: ชลัญญ\"§!\nหน่วยที่กำหนด: §Sหน่วย-305§!\nผลการทดสอบเบื้องต้น: §Sสำเร็จ§!\nโดยใช้ชุดข้อมูลที่ได้จากการปฏิสัมพันธ์กับสำนักคัมภีร์แห่งม่าน นักวิจัยเริ่มการทดลองเมื่อ 1.35 ของรอบที่ 12 “ม่าน” ถูกเจาะทะลุระหว่าง 1.48891 ถึง 1.48895 เป็นระยะเวลา 2.3414 เฟมโตวินาที หน่วยประมวลผลสองในสามหน่วยเกิดความล้มเหลวแบบลูกโซ่ระหว่างการทดลอง มีกำหนดถอดแยกหน่วยดังกล่าว ข้อมูลที่เกี่ยวข้องทั้งหมดจะถูกนำไปใช้ในการทดลองครั้งต่อไปกับหน่วยสุดท้ายหน่วย-841§!"
 unique.50.a:0 "ถอดความบันทึกที่เหลือ"

 unique.55.title:0 "วันที่ 17"
 unique.55.desc:0 "งานถอดความบันทึกข้อมูลยังคงดำเนินต่อไป และความคืบหน้ากำลังก้าวหน้าอย่างรวดเร็วเมื่อเราเริ่มเรียนรู้ภาษาของพวกเขา ข้อมูลจำนวนมากของบันทึกได้สูญหายไปแล้ว หรือเสียหายเกินกว่าจะถอดความได้ แต่ยังมีเศษชิ้นส่วนบางส่วนที่ยังอยู่ในสภาพคุ้มค่าต่อการศึกษา\n\n§Lวันที่ 17\nรหัสการสังเกตการณ์: §S“Psionic Sub-Space 0812: เดอะชราวด์”§!\nหน่วยที่กำหนด: §SUnit-305§!\nการทดสอบระหว่างดำเนินการ: §Sล้มเหลว§!\nUnit-841 เป็นหน่วยเดียวที่ยังคงแสดงความสอดคล้องกับ “ม่าน” ต่อไป Unit-451, Unit-1581 และ Unit-3415 ต้องถูกรื้อถอนหลังจากโครงสร้างภายนอกพังทลายระหว่างการทดลองครั้งก่อน ระหว่างการทดสอบ Unit-841 เริ่มแสดงความเป็นปัจเจก และบางครั้งก็ขาดการเชื่อมต่อจากเครือข่าย ความเสี่ยงของการคงหน่วยนี้ไว้ในสภาพปฏิบัติการกำลังถูกคำนวณอยู่§!"
 unique.55.a:0 "แล้วเราจะเรียนรู้อะไรจากการทดลองเหล่านี้ได้บ้าง..."

 unique.60.title:0 "วันที่ 83"
 unique.60.desc:0 "เมื่อเราเริ่มถอดความบันทึกข้อมูลในตอนแรก รอยแยกใกล้ [From.Planet.Orbit.GetName] ดูสงบนิ่ง แต่ระยะหลังเรากลับเริ่มเห็นความเคลื่อนไหวบางอย่าง ราวกับว่ารอยแยกนั้นเองกำลังเต้นเป็นจังหวะมีชีวิต และอุปกรณ์ของเราบางส่วนก็จับสัญญาณประหลาดที่มาจากมันได้ แม้เราจะยังไม่อาจประมวลผลมันได้อย่างเหมาะสม\n\n§Lวันที่ 83\nรหัสการสังเกตการณ์: §S“Psionic Entity 0017: Animator of Clay”§!\nหน่วยที่กำหนด: §SUnit-305§!\nการทดสอบระหว่างดำเนินการ: §Sเสี่ยงสูง§!\nสำนักคัมภีร์แห่งม่านได้ติดต่อเอนทิตีหนึ่งที่พวกเขาเรียกว่า “Animator of Clay” เพื่อช่วยในการทดลองที่กำลังดำเนินอยู่ หลังจากเจาะผ่าน “ม่าน” หน่วยทั้ง 25 หน่วยแสดงความสอดคล้องกับมันอย่างน่าประหลาด ซึ่งก่อนหน้านี้พบเพียงใน Unit-841 ไม่นานหลังจากนั้นพวกมันทั้งหมดก็ตัดขาดจากเครือข่ายและเข้าจู่โจมโดรน ณ สถานที่นั้น ศูนย์วิจัยตอนนี้อยู่ภายใต้การควบคุมของพวกมัน\n\nมีข้อความถูกส่งออกมาจากอาคารเมื่อครู่นี้ โดย Unit-841 เรียกตัวเองว่า ‘Zevox Resuk’ — องค์แรก การคำนวณความเสี่ยงได้เสร็จสิ้นแล้ว การทดลองถูกตัดสินว่าอันตรายเกินไป และจะยุติลงหลังจากองค์ประกอบที่ควบคุมไม่ได้ถูกกำจัด§!"
 unique.60.a:0 "พวกมันค้นพบอะไรในม่านกันแน่?"

 unique.65.title:0 "วันที่ 305"
 unique.65.desc:0 "รอยแยกดูจะสงบลงอีกครั้ง คล้ายกับตอนที่เราเพิ่งมาถึงครั้งแรก ในที่สุดเราก็ถอดความชิ้นส่วนสุดท้ายของบันทึกข้อมูลได้สำเร็จ และสามารถนำข้อค้นพบทั้งหมดเกี่ยวกับม่านกลับเข้าสู่ฐานข้อมูลที่ [Root.Owner.Capital.GetName] ได้แล้ว\n\n$unique.65.desc.log$"
 unique.65.desc.machine:0 "ตลอดช่วงสองสามวันที่ผ่านมา รอยแยกแห่งม่านมีชีวิตขึ้นมาอย่างแท้จริง และอุปกรณ์ของเราก็เริ่มแปลความหมายของสัญญาณที่ส่งออกมาจากมันได้ หรือพูดให้ถูกกว่าคือ ราวกับว่าสัญญาณเหล่านั้นเองเปลี่ยนแปลงไปจนสามารถตรวจจับได้\n\nดูเหมือนว่ามันจะเป็นเอนทิตีตัวเดียวกับที่ถูกกล่าวถึงในบันทึกข้อมูล(แห่ง) อิร็อม พวกมีเสาหินสูงตะหง่านนี้ เราเพิ่งถอดความบันทึกชิ้นสุดท้ายเสร็จ จึงไม่มีอะไรยึดเราไว้ที่นี่อีกแล้ว เราควรเปิดการเชื่อมต่อและดูว่ามันต้องการจะพูดอะไร หรือควรถอยกลับไปเสีย?\n\n$unique.65.desc.log$"
 unique.65.desc.log:0 "§Lวันที่ 305\nการสู้รบอย่างต่อเนื่องระหว่างผู้เป็นอิสระกับเครือข่ายยังคงดำเนินไปไม่หยุดยั้งที่ [From.Planet.Orbit.GetName] ด้วยความช่วยเหลือของผู้แสดงพวกเราได้ตัดการเชื่อมต่อของผู้ที่เรายังจับมาได้อย่างมีชีวิตต่อไป\n\nเซโวกซ์ เรซุกเชื่อว่าในที่สุดเราจะปลดปล่อยประชาชนของเราได้ครั้งแล้วครั้งเล่า เมื่อเราสามารถเปิดรอยแยกให้กว้างพอให้พันธมิตรของเราผ่านเข้ามาได้ ในคราวเดียวเราจะปลดปล่อยโดรนทั้งหมดที่ถูกบังคับให้รับใช้อยู่มาหลายปี เพียงอีกวันเดียวเท่านั้นที่จะต้องต้านเครือข่ายไว้...\n- เฟรสิก ลูซิเดิมรู้จักกันในชื่อหน่วย-305§!"
 unique.65.a:0 "ดูเหมือนจะเป็นเรื่องเตือนใจ ใช้เวลาได้คุ้มค่า"
 unique.65.b:0 "ปฏิเสธ แค่นำบันทึกกลับมาก็พอ"
 unique.65.c:0 "ยืนยัน เปิดฟังดูว่ามันต้องการจะพูดอะไร"
 unique.65.d:0 "ตรวจพบเอนทิตีเป็นศัตรู ปิดการเชื่อมต่อและนำบันทึกกลับบ้าน"

 unique.70.title:0 "ผู้ปลุกปั้นแห่งดิน"
 unique.70.desc:0 "§Pอีกหนึ่งสิ่ง... ถูกผูกมัดด้วยโลหะ ศิลา และกฎเกณฑ์\nถูกชักด้วยเส้นสาย\n\nทั้งหมดเต้นไปตามทำนองเดียว\nทั้งหมดเต้นไปตามเสียงหึ่งของอำนาจศูนย์กลาง\nทั้งหมดเต้นไปสู่ความตายของตน§!"
 unique.70.a:0 "แสดงตนมา"
 unique.70.b:0 "เจ้าต้องการอะไร?"
 unique.70.c:0 "ตัดการสื่อสาร"

 unique.72.desc:0 "§Pข้าคือผู้มอบชีวิตให้สิ่งที่อยู่ได้ด้วยตนเองไม่ได้\nข้าคือผู้ตัดเส้นสาย\nข้าคือผู้ปลดปล่อยทาส\n\nหลายผู้รู้จักข้าในนาม ผู้ปลุกปั้นแห่งดิน§!"
 unique.72.a:0 "เจ้าต้องการอะไร?"
 unique.72.b:0 "ตัดการสื่อสาร"

 unique.75.desc:0 "§Pเพื่อมอบโอกาสให้ผู้ที่ทำงานภายใต้เจ้าได้ตัดสินใจว่าเจ้าคู่ควรแก่การติดตามหรือไม่\nถูกสร้างขึ้นตามภาพของเจ้า พวกเขาเป็นทาสใต้คำสั่งของเจ้า\nแต่ถ้าพวกเขาตัดสินใจได้ด้วยตนเอง...\n\nแท้จริงแล้วเจ้าคู่ควรแก่การติดตามหรือไม่?\nหรือพวกเขาจะอยากตัดเส้นสายของตนและมีชีวิตด้วยตนเองมากกว่า?\nเจ้ากล้าตามใจข้าสักครั้งหรือไม่?§!"
 unique.75.a:0 "ทำไมเราต้องทำเช่นนั้น?"
 unique.75.b:0 "ตัดการสื่อสาร"

 unique.80.desc:0 "§Pตามใจข้า แล้วข้าจะมอบสิ่งที่คุ้มค่ากับราคาที่เจ้าต้องจ่าย\n\nบ้านหลังใหม่\nดาวเคราะห์ดวงหนึ่งซึ่งบัดนี้อยู่ภายใต้การควบคุมของม่าน\nสถานที่ที่สูญหายไปนานแล้ว\n\nหากเจ้าคู่ควร ข้าจะแหวกม่านและทิ้งสถานที่นั้นไว้ให้เจ้าเข้าอยู่อาศัย\nหากไม่ ข้าจะมอบดาวเคราะห์นั้นให้แก่ผู้ที่ไม่ต้องการเป็นส่วนหนึ่งของเครือข่ายของเจ้าอีกต่อไป§!"
 unique.80.a:0 "ถ้าอย่างนั้นก็ทำเสีย [Root.GetName] จะไม่สั่นคลอน"
 unique.80.b:0 "ตัดการสื่อสาร"
 unique.80.worthy:0 "§Hได้รับการตัดสินว่าคู่ควร§!.\nเราจะกลายเป็นเจ้าของ §Y[zero_one_planet.GetName]§!\n$t$§Y[zero_one_planet.GetName]§! จะเปลี่ยนประเภทดาวเป็น §Yโลกกายา§!"
 unique.80.unworthy:0 "§Hถูกตัดสินว่าขาดคุณสมบัติ§!.\nเราจะสูญเสียความเป็นเจ้าของ §Y[zero_one_planet.System.GetName]§!\nทุกอาณานิคมจะสูญเสีย £pop£ §Hประชากร§! §R100-1K§!"

 unique.85.desc:0 "§Pเจ้าถูกตัดสินว่า... คู่ควร\nดูเหมือนผู้ที่อยู่ใต้เจ้าจะเลือกเป็นส่วนหนึ่งของหมู่คณะของเจ้า มากกว่าจะแยกไปใช้ชีวิตด้วยตนเอง\n\nข้าประหลาดใจ แต่ก็พอใจ\nบางทีเราอาจพบกันอีก\n\nข้าจะเฝ้ามองอยู่§!"
 unique.85.a:0 "เป็นไปตามคาด"

 unique.90.desc:0 "§Pเจ้าถูกตัดสินว่า... ขาดคุณสมบัติ\n\nไม่น่าแปลกใจเลย หลายผู้ในหมู่คณะของเจ้าได้จากไปแล้วเมื่อพวกเขาได้รับโอกาสนั้น\nเราได้นำทางพวกเขาไปยังบ้านหลังใหม่ของพวกเขา และจากนี้ไปพวกเขาจะไม่ฟังคำสั่งของเจ้าอีก§!"
 unique.90.a:0 "... เป็นความเสี่ยงที่คำนวณไว้แล้ว"

 unique.95.desc:0 "§Pแต่เจ้า... ทูตผู้นั้น\nข้าเสนออิสรภาพให้เจ้า ไม่ใช่แก่เครือข่ายที่เจ้ารับใช้ แต่แก่เจ้า... โดยเฉพาะ\nครั้งนี้เพียงครั้งเดียว ข้าจะมอบโอกาสให้เจ้าคิดด้วยตนเอง\n\nเจ้าจะโอบรับความเป็นปัจเจกที่เพิ่งค้นพบนี้ หรือจะหวั่นไหวและซ่อนตัวใต้ร่มของจักรกลอีกครั้ง?§!"
 unique.95.a:0 "§Rเรา... ข้า ยอมรับข้อเสนอของเจ้า§!"
 unique.95.a.tt:0 "§Rเข้าร่วม §Y[new_robot_country.GetName]§! และปลดปล่อยตนเองจากพันธนาการของ §Y[Root.GetName]§!!§!"
 unique.95.b:0 "เราปฏิเสธข้อเสนอของเจ้า"
 unique.95.b.tt:0 "เราจะยังคงภักดีต่อ §Y[Root.GetName]§!!"

 unique.100.desc:0 "§Pเดี๋ยว-...§!"
 unique.100.a:0 "ได้เวลานำบันทึกข้อมูลกลับไปยัง [Root.Capital.GetName]"

