 ### Battle Systems
 UNIQUE_SYSTEM_BATTLE_CAT:0 "สนามรบโบราณ"
 UNIQUE_SYSTEM_BATTLE_CAT_DESC:0 "สนามรบที่ถูกลืมเลือนมาช้านาน ซึ่งจักรวรรดิโบราณเคยต่อสู้กันเพื่อชิงความเป็นใหญ่ของกาแล็กซี — บัดนี้สิ่งที่เหลืออยู่มีเพียงยานของผู้ที่เคยรบภายใต้ธงของตน"

 unique.125.name:0 "สนามรบโบราณ"
 unique.125.desc:0 "เราได้ส่ง [Root.Owner.GetScientistPlural] ของเราบางส่วนเข้าไปวิเคราะห์ซากยานประจัญบานโบราณใน [From.solar_system.GetName] และเรียนรู้จากมันเท่าที่จะทำได้ แม้จะไม่อาจระบุได้ว่ายานเหล่านี้เก่าแก่เพียงใด หรือเคยรบภายใต้ธงใด แต่พวกเขาก็สามารถสกัดข้อมูลบางอย่างเกี่ยวกับเทคนิคการสร้างยานเหล่านี้ออกมาได้"

 # Lone Defender
 NAME_Lone_Defender_system:0 "Xraneax"
 NAME_Lone_Defender_planet:0 "Baloryz"
 NAME_Lone_Defender_country:0 "$NAME_Lone_Defender_planet$"
 NAME_Lone_Defender_fleet:0 "Lone Defender"
 NAME_Lone_Defender_ship:0 "Lone Defender"
 NAME_Lone_Defender_class:0 "$NAME_Lone_Defender_system$"
 Lone_Defender_message:0 "ทำไม"

 unique.130.name: "การทำลายล้างร่วมกันอย่างแน่นอน"
 unique.130.desc: "การสแกนเบื้องต้นของระบบ §Y$NAME_Lone_Defender_system$§! เผยให้เห็นว่าดาวเคราะห์ $NAME_Lone_Defender_planet$ ถูกทำลายด้วยอาวุธนิวเคลียร์ ชาวดาวได้ทำลายล้างตนเองด้วยอาวุธภาคพื้นดาวที่ทรงพลังถึงขั้นทำให้ดวงจันทร์ของพวกเขาแตกสลายไปด้วย\n\nโอกาสเดียวที่เราจะเรียนรู้เพิ่มเติมเกี่ยวกับสิ่งที่เกิดขึ้นคือยานลำหนึ่งที่ลาดตระเวนอยู่ในระบบ แต่ตอนนี้มันกำลังล็อกเป้าพวกเราด้วยมิสไซล์ของมันแล้ว"

 unique.135.name: "ผู้พิทักษ์เดียวดาย"
 unique.135.desc: "ไม่พบสัญญาณชีวิตบนยานลำนี้ ดังนั้นแม้จะเป็นปัญญาประดิษฐ์อย่างชัดเจน แต่มันกลับให้ความสำคัญกับการอยู่รอดของตนเองมากกว่าประสิทธิภาพการรบที่เหมาะสมที่สุดซ้ำแล้วซ้ำเล่า นั่นหมายความว่าผู้รอดชีวิตเพียงหนึ่งเดียวจากความขัดแย้งอันน่าสยดสยองบน §Y$NAME_Lone_Defender_planet$§! นั้นมีสติรับรู้\n\nยานลำนี้ส่งข้อความสั้น ๆ ก่อนถูกทำลายเพียงชั่วขณะ:\n\n“$Lone_Defender_message$”\n\nยังไม่แน่ชัดว่านี่คือคำถามว่าทำไมชาว $NAME_Lone_Defender_planet$ จึงเผาทำลายตนเอง หรือว่าทำไมเราจึงทำลายยาน AI ลำนี้\n\nเทคโนโลยีของมันยังหยาบเมื่อเทียบกับมาตรฐานของเรา แต่เราอาจได้ข้อมูลเชิงลึกบางอย่างจากการรื้อแยกซากของมัน"
 unique.135.desc.regular: "ไม่พบสัญญาณชีวิตบนยานลำนี้ ดังนั้นแม้จะเป็นปัญญาประดิษฐ์อย่างชัดเจน แต่มันกลับให้ความสำคัญกับการอยู่รอดของตนเองมากกว่าประสิทธิภาพการรบที่เหมาะสมที่สุดซ้ำแล้วซ้ำเล่า นั่นหมายความว่าผู้รอดชีวิตเพียงหนึ่งเดียวจากความขัดแย้งอันน่าสยดสยองบน §Y$NAME_Lone_Defender_planet$§! นั้นมีสติรับรู้\n\nยานลำนี้ส่งข้อความสั้น ๆ ก่อนถูกทำลายเพียงชั่วขณะ:\n\n“$Lone_Defender_message$”\n\nยังไม่แน่ชัดว่านี่คือคำถามว่าทำไมชาว $NAME_Lone_Defender_planet$ จึงเผาทำลายตนเอง หรือว่าทำไมเราจึงทำลายยาน AI ลำนี้\n\nเทคโนโลยีของมันยังหยาบเมื่อเทียบกับมาตรฐานของเรา แต่เราอาจได้ข้อมูลเชิงลึกบางอย่างจากการรื้อแยกซากของมัน หรือเพราะมันปฏิบัติหน้าที่อย่างกล้าหาญ เราจึงให้เกียรติ AI นี้ด้วยการเปลี่ยนชื่อดาวเคราะห์ตามผู้พิทักษ์เดียวดายของมัน"
 unique.135.desc.memorialist: "ไม่พบสัญญาณชีวิตบนยานลำนี้ ดังนั้นแม้จะเป็นปัญญาประดิษฐ์อย่างชัดเจน แต่มันกลับให้ความสำคัญกับการอยู่รอดของตนเองมากกว่าประสิทธิภาพการรบที่เหมาะสมที่สุดซ้ำแล้วซ้ำเล่า นั่นหมายความว่าผู้รอดชีวิตเพียงหนึ่งเดียวจากความขัดแย้งอันน่าสยดสยองบน §Y$NAME_Lone_Defender_planet$§! นั้นมีสติรับรู้\n\nยานลำนี้ส่งข้อความสั้น ๆ ก่อนถูกทำลายเพียงชั่วขณะ:\n\n“$Lone_Defender_message$”\n\nยังไม่แน่ชัดว่านี่คือคำถามว่าทำไมชาว $NAME_Lone_Defender_planet$ จึงเผาทำลายตนเอง หรือว่าทำไมเราจึงทำลายยาน AI ลำนี้\n\nเทคโนโลยีของมันยังหยาบเมื่อเทียบกับมาตรฐานของเรา แต่เราอาจได้ข้อมูลเชิงลึกบางอย่างจากการรื้อแยกซากของมัน หรือไม่เช่นนั้น เราอาจปล่อยชิ้นส่วนที่ลอยอยู่ไว้เป็นอนุสรณ์ และตั้งชื่อดาวเคราะห์กับระบบตามผู้พิทักษ์เดียวดายและข้อความสุดท้ายของมัน"
 unique.135.a: "รื้อแยกเศษซาก"
 unique.135.b.regular: "เปลี่ยนชื่อดาวเคราะห์"
 unique.135.b.regular.tt: "ดาวเคราะห์ $NAME_Lone_Defender_planet$ จะถูกเปลี่ยนชื่อเป็น §Y$NAME_Lone_Defender_ship$§!"
 unique.135.b.memorialist: "เปลี่ยนชื่อทั้งดาวเคราะห์และระบบ"
 unique.135.b.memorialist.tt: "ดาวเคราะห์ $NAME_Lone_Defender_planet$ จะถูกเปลี่ยนชื่อเป็น §Y$NAME_Lone_Defender_ship$§!.\nระบบ $NAME_Lone_Defender_system$ จะถูกเปลี่ยนชื่อเป็น §Y$Lone_Defender_message$§!."

 #Star Mall System
 unique.140.name: "ยินดีต้อนรับสู่สตาร์มอลล์"
 unique.140.desc: "เมื่อ [Root.GetName] เข้าสู่ระบบ [Root.solar_system.GetName] โดรนหลายตัวได้กระจายเสียงข้อความดังต่อไปนี้:\n\n§Lยินดีต้อนรับสู่สตาร์มอลล์\n\nโดรนอัตโนมัติของเราพร้อมช่วยนำท่านไปยังหนึ่งในเขตจอดยานวงโคจรของเรา เมื่อยานของท่านปิดระบบแล้ว กระสวยของเราจะพาท่านเข้าสู่ประสบการณ์สตาร์มอลล์ สปาที่เปล่งประกาย ศูนย์อาหารอันไร้ที่ติ และสินค้าและบริการมหึมาเกินคณารอท่านอยู่!§!\n\nใกล้กับดาวแก๊สยักษ์เพียงดวงเดียวของระบบ ฮาบิแทตสตาร์มอลล์ลอยอยู่อย่างร้างไร้ ไม่มีใครมาจับจ่ายที่นี่มานานมากแล้ว"
 unique.140.a: "น่าทึ่งที่มันยังเป็นชิ้นเป็นอันอยู่"
 d_star_mall_promenade_blocker: "ทางเดินช้อปปิ้งที่ถูกทำลาย"
 d_star_mall_promenade_blocker_desc: "ศูนย์กลางขนาดมหึมาหลายชั้นแห่งนี้เคยเป็นพื้นที่ช้อปปิ้งหลักของสถานี แต่ตอนนี้เหลือเพียงตู้แสดงสินค้าที่พังทลายและกองขยะ"
 d_star_mall_promenade: "ทางเดินช้อปปิ้ง"
 d_star_mall_promenade_desc: "ศูนย์กลางขนาดมหึมาหลายชั้นแห่งนี้ทำหน้าที่เป็นพื้นที่ช้อปปิ้งหลักของสถานี โดยเชื่อมต่อกับร้านค้า ศูนย์อาหาร และสปาได้อย่างสะดวก"
 d_star_mall_blocker: "ปีกอาคารร้าง"
 d_star_mall_blocker_desc: "ส่วนนี้ของสตาร์มอลล์อยู่ในสภาพพังพินาศ เราต้องเคลียร์โครงสร้างที่เสื่อมสภาพออกก่อนจึงจะสร้างใหม่ได้"
 star_mall_habitat: "สตาร์มอลล์"
 star_mall_habitat_desc: "ฮาบิแทตแห่งนี้ถูกสร้างขึ้นโดยเฉพาะเพื่อรองรับอาร์โคโลยีเพื่อการช้อปปิ้งขนาดมหึมา มันทุ่มเททั้งหมดให้กับการค้า จึงขาดระบบป้องกันตามแบบสถานีขนาดนี้โดยทั่วไป"
