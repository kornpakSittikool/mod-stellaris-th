 fractured_ambassadors_modifier: "ทูตที่เป็นเศษเสี้ยวอารยธรรม(ประกาศอิสรภาพ)"
 fractured_ambassadors_modifier_desc: "ตัวตนเงาสะท้อนแบบกลุ่มจักรวรรดิ(เสียงสะสม)ที่เราพบในอีกฟากหนึ่งของระนาบแอสทรัลนั้นมีความคิดที่แตกแยกกระจัดกระจาย แต่ได้เสนอที่จะช่วยเหลือเราในการเจรจากับสิ่งมีชีวิตอื่นที่มีความคล้ายคลึงกัน"
 fractured_ambassadors_modifier_tt: "ค่าโบนัสทัศนคติทางการทูต §G+20§! สำหรับจักรวรรดิที่ไม่ใช่เกสตัลต์(ไม่ปรากฏ)"
 triggered_opinion_fractured_ambassadors: "$fractured_ambassadors_modifier$"
