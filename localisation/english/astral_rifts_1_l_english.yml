l_english:

####################
# The Crystal Rift #
####################
 astral_rift_crystal: "รอยแยกผลึก(แก้วคริสตัล)"

 astral_rift.1000.name: "ความเข้าใจ"
 astral_rift.1000.desc: "บางสิ่งในอีกฟากหนึ่งของรอยแยกมิติได้ยึดการควบคุมยานทรงกลม(เสียงพูด)และปิดการใช้งานอุปกรณ์ดึงตัวสายโยงของเรา\n\nชุดข้อมูลพัสดุแรกๆ ที่เราได้รับนั้นอ่านไม่ออก แต่การส่งผ่านข้อมูลในเวลาต่อมาค่อยๆ ปะติดปะต่อข้อความเหล่านี้เข้าด้วยกัน เราคาดการณ์ว่ากระแสเวลาในอีกฟากหนึ่งของรอยแยกมิตินั้นไหลเร็วกว่ามาก และความจริงแล้วเรากำลังได้รับข้อความการสื่อสารตามเวลาจริงจากฝั่งตรงข้ามของจุดเชื่อมโยง\n\nผลลัพธ์ที่ได้คือการประมวลผลข้อความได้ประมาณวันละหนึ่งคำ รายงานต่อไปนี้คือสิ่งที่เราได้รับจนถึงขณะนี้:\n\n§E\"พวกเราเฝ้าสังเกต...\"§!\n\n§E\"การขออภัย... วิธีการ... ช่างไร้ความปรานี...\"§!\n\n§E\"เหตุฉุกเฉิน...\"§!\n\n§E\"โปรดเข้าใจ...\"§!\n\nข้อความสั้นๆ เหล่านี้ซ่อนอยู่ท่ามกลางสัญญาณรบกวนหนาแน่นและข้อมูลที่เข้าใจไม่ได้\n\nใครจะรู้ว่า [Explorer.GetCrew] ของยาน §Y$tech_rift_sphere$§! กำลังตกอยู่ในอันตรายรูปแบบใดอยู่\n\nมันอาจเป็นไปได้ที่จะกู้คืนการติดต่อสื่อสารและสิทธิ์ควบคุมกลับมาโดยการส่งคลื่นรังสีแม่เหล็กไฟฟ้า ESMP)ผ่านสายยึดเหนี่ยวเพื่อทำการรีเซ็ตระบบควบคุมของเราใหม่"
 astral_rift.1000.desc.gestalt: "$astral_rift.1000.desc$"
 astral_rift.1000.desc.default: "รายงานที่ได้รับจากยาน §Y$tech_rift_sphere$§! ของเราไม่มีบันทึกข้อมูลลายเซ็นพลังงาน [Leader.GetMechanicalBiological] ของ [Explorer.GetScientistPlural] ของเราเลย\n\n$astral_rift.1000.desc$"
 astral_rift.1000.a: "ใช้งานระบบปัญญาประดิษฐ์(เอไอ)เพื่อตรวจสอบลวดลายที่ซ่อนอยู่"
 astral_rift.1000.b: "ยิงคลื่นแม่เหล็กไฟฟ้า ESMP)ใส่สายยึดเหนี่ยว"

 astral_rift.1005.name: "บ้านเกิด"
 astral_rift.1005.desc.common: "ภาพจำลองดาราจักรของเราสามารถประกอบเข้าด้วยกันได้จากรูปภาพต่างๆ ร่วมกับภาพที่สองของระบบดาวที่เล็กกว่ามากทว่ามีความหนาแน่นสูงผิดปกติ ระหว่างทั้งสองระบบดาว มีรอยแยกเดอะชราวด์ทอดตัวเป็นสาย เราเข้าใจได้ว่านี่คือแผนที่นำทางจากมิติของเราไปยังมิติอื่น\n\nจุดแสงสว่างเล็กๆ จุดหนึ่งได้รับความโดดเด่นอย่างผิดปกติภายในภาพจำลองดาราจักรของเรา การวิเคราะห์ในภายหลังยืนยันว่านี่คือโลกบ้านเกิด [Explorer.GetHomeWorldName] ของเราที่กำลังส่องประกายสดใส และพบแสงสว่างที่คล้ายกันถูกทำเครื่องหมายไว้ในจักรวาลเพื่อนบ้าน\n\nพวกเขากำลังแสดงทิศทางให้เราเห็นว่าควรไปที่ใด\n\nเรากำลังได้รับข้อมูลมากเกินกว่าที่คอมพิวเตอร์ของเราจะจัดการได้อย่างสมเหตุสมผลก่อนที่มันจะเสียหายหรือสูญหายไป เราควรจัดลำดับความสำคัญของประเภทข้อมูลที่เราต้องการจะเก็บรักษาไว้"
 astral_rift.1005.desc: "คำสองคำถัดไปที่เราสามารถถอดรหัสได้คือ §E"บ้านเกิด"§! และ §E"ประจักษ์พยาน"§! น่าแปลกใจที่เมื่อความเข้าใจของเราเกี่ยวกับข้อมูลต่างดาวดีขึ้น เราก็พบการดำรงอยู่ของข้อมูลภาพที่ฝังอยู่ในสัญญาณรบกวนด้วยเช่นกัน\n\n$astral_rift.1005.desc.common$"
 astral_rift.1005.a: "อนุรักษ์รักษาอนุภาคไว้"
 astral_rift.1005.b: "อนุรักษ์รักษาข้อมูลการควบคุมสนามพลังไว้"

 astral_rift.1006.name: "$astral_rift.1005.name$"
 astral_rift.1006.desc: "ด้วยการสนับสนุนระบบประมวลผลพลังงานเพิ่มพิเศษ เราได้ประมวลผลข้อมูลที่พวกเขาส่งสัญญาณสตรีมข้อความมาหาเรา ความจริงแล้วมันคือการสื่อสาร ไม่ใช่การโจมตีรูปแบบใดๆ ข้อมูลที่เราได้รับกำลังบอกเล่าเรื่องราวแก่เราในรูปแบบของลำดับภาพเคลื่อนไหว\n\n$astral_rift.1005.desc.common$"
 astral_rift.1006.a: "$astral_rift.1005.a$"
 astral_rift.1006.b: "$astral_rift.1005.b$"

 astral_rift.1010.name: "การเข้าควบคุมยึดครอง"
 astral_rift.1010.desc.common.1: "คลื่นแม่เหล็กไฟฟ้า ESMP)ที่เราส่งผ่านสายยึดเหนี่ยวประสบความสำเร็จในการสะกดให้ยานทรงกลม(เสียงพูด)หลุดพ้นจากการควบคุมของสิ่งใดก็ตามที่เคยครอบงำมันอยู่"
 astral_rift.1010.desc.common.2: "เมื่อเซนเซอร์เปิดใช้งานได้เต็มที่ ลูกเรือสังเกตพบเอนทิตีสถานะก๊าซในบริเวณใกล้เคียงกับตำแหน่งของพวกเขา สันนิษฐานว่าสิ่งนี้คือสิ่งที่เข้ามาควบคุมยาน ดูเหมือนว่ากระแสพลังงานจะทำให้มันหมดสภาพ อย่างน้อยก็ในตอนนี้...\n\nยานทรงกลมถูกกักไว้ในมิติย่อยบางประเภท เราถูกล้อมรอบด้วยเมฆหมุนวนของเนบิวลาหนาแน่น เอนทิตีเดียวที่ตรวจพบคือสิ่งมีชีวิตที่อยู่ใกล้ๆ\n\nหลังจากฟื้นตัวจากอาการตื่นตกใจ มันก็เริ่มระดมส่งข้อความและสัญญาณสื่อสารอย่างรวดเร็วเข้าใส่ยานทรงกลม\n\nคอมพิวเตอร์และเซนเซอร์ของเราทำงานหนักเกินพิกัดด้วยข้อมูลจำนวนมาก ทำให้การเดินทางนำทางเป็นไปได้ยาก เราจะต้องการการสนับสนุนการคำนวณเพื่อเข้าใจสิ่งที่เรากำลังได้รับอยู่\n\nมันยังไม่ชัดเจนว่าเราได้รับการต้อนรับที่นี่หรือไม่"
 astral_rift.1010.desc.gestalt: "$astral_rift.1010.desc.common.1$\n\n$astral_rift.1010.desc.common.2$"
 astral_rift.1010.desc.default: "$astral_rift.1010.desc.common.1$\n\nลูกเรือปลอดภัยและสบายดี อย่างไรก็ตาม ไม่มีใครมีความทรงจำเกี่ยวกับการสูญเสียการควบคุมยานทรงกลมเลย\n\n$astral_rift.1010.desc.common.2$"
 astral_rift.1010.a: "ส่งมอบการสนับสนุนด้วยระบบปัญญาประดิษฐ์(เอไอ)"
 astral_rift.1010.b: "ออกไปจากที่นี่เร็ว! เราแค่สะกดมันให้มึนงงชั่วคราวเท่านั้น"

 astral_rift.1015.name: "การก้าวข้ามขีดจำกัด(เสียงปรบมือ)"
 astral_rift.1015.desc: "รูปภาพเพิ่มเติม...\n\nพงศาวดารประวัติศาสตร์ของโลกบ้านเกิดต่างดาวนี้ถูกแสดงให้เราเห็นในรายละเอียดที่ยิ่งใหญ่\n\nสิ่งมีชีวิตเหล่านี้ก่อตัวขึ้นเมื่อหลายพันปีก่อนโดยการผสมผสานของก๊าซและพลังงานที่สะสมอยู่ใกล้ๆ กับรอยแยกรอยแยกแอสทรัล ขนาดยักษ์โดยบังเอิญ พวกมันไหลเวียนเข้าและออกจากดาวเคราะห์ของตนได้อย่างอิสระราวกับเป็นส่วนหนึ่งของชั้นบรรยากาศ\n\nเมื่อสิ้นสุดวงจรชีวิตแต่ละครั้ง ตัวตนแก่นแท้ของพวกมันจะกระจายกลับคืนสู่ดาวเคราะห์และถือกำเนิดขึ้นใหม่ เมืองบนท้องฟ้าผุดขึ้น ล่มสลาย และรุ่งเรืองขึ้นอีกครั้ง อารยธรรมต่างๆ ก่อตัวขึ้นทับซ้อนกันบนอารยธรรมก่อนหน้าโดยมีความรู้ที่ได้รับการดูแลรักษาทางกายภาพโดยอนุภาคบรรพบุรุษเหล่านี้ ระยะเวลาของเวลาที่ผ่านไปได้รับการประเมินอย่างปลอดภัยว่ายิ่งใหญ่กว่าประวัติศาสตร์ของจักรวาลที่เราคุ้นเคยหลายเท่าตัว\n\nในท้ายที่สุด เราพบเห็นอารยธรรมของสิ่งมีชีวิตชั้นสูงที่ตื่นรู้แล้ว สรีรวิทยาของพวกมันเพียงอย่างเดียวนั้นมีความก้าวหน้าล้ำสมัยยิ่งกว่าเทคโนโลยีใดๆ ที่เราจะจินตนาการได้\n\nเราได้บันทึกสายพันธุ์ใหม่นี้ในฐานข้อมูลของเราในชื่อ \"ผู้ไร้รูปลักษณ์\"\" (ท่าไร้ท่า)\n\n§E\"ความเจริญรุ่งเรือง...\"§!\n\nอีกครั้งที่เรากำลังได้รับข้อมูลมากเกินกว่าที่คอมพิวเตอร์จะจัดการได้อย่างสมเหตุสมผลก่อนที่มันจะเสียหายหรือสูญหายไป เราควรจัดลำดับความสำคัญของประเภทข้อมูลที่เราต้องการจะเก็บรักษาไว้"
 astral_rift.1015.a: "เก็บรักษาข้อมูลฟิสิกส์"
 astral_rift.1015.b: "เก็บรักษาข้อมูลสังคมศาสตร์"

 astral_rift.1020.name: "การแตกสลาย"
 astral_rift.1020.desc: "โลกบ้านเกิดสภาพก๊าซของพวกเขาได้รับการเปิดเผยให้เราเห็นในรายละเอียดที่มากขึ้นเรื่อยๆ ครั้งนี้เราได้เห็นผู้อยู่อาศัยแต่ละคน สิ่งมีชีวิตแห่งแสง ก๊าซ และสารแอสทรัลที่รั่วไหลจากรอยแยกใกล้เคียงกำลังอาศัยอยู่ในดินแดนที่สามารถบรรยายได้ง่ายๆ ว่าเป็นยูโทเปีย\n\nในที่สุด โครงสร้างขนาดใหญ่ที่ยิ่งใหญ่ก็ได้ถูกสร้างขึ้น งานวิศวกรรมที่น่าทึ่งนี้ทอดตัวโดยตรงจากดาวเคราะห์ของพวกเขาเข้าสู่รอยแยกมิติ ช่วยให้พวกเขาเดินทางระหว่างมิตินี้และมิติต่างๆ ได้อย่างง่ายดาย ด้วยท่อส่งสัญญาณแอสทรัลที่ดำรงอยู่ระหว่างระนาบมิติเป็นเวลานาน พวกเขาจึงได้ปรับแต่งรอยแยกจำนวนมากเพื่อให้ตรงตามความต้องการเฉพาะของพวกเขา สังคมของพวกเขาแผ่ขยายไประหว่างมิติอันหลากหลาย ตั้งถิ่นฐานในจักรวาลทั้งหมดราวกับว่าเรากำลังตั้งอาณานิคมบนดาวเคราะห์ดวงใหม่\n\nอย่างไรก็ตาม ความสำเร็จที่ยิ่งใหญ่ที่สุดของพวกเขาก็คือภัยพิบัติที่ยิ่งใหญ่ที่สุดเช่นกัน จักรวรรดิของพวกเขาแผ่ขยายไปไกลเกินกว่าที่ท่อส่งสัญญาณแอสทรัลจะสามารถคงสภาพไว้ได้ โครงสร้างยักษ์นั้นสว่างไสวขึ้นเรื่อยๆ จนกระทั่งมองดูได้ยากหากไม่มีการบังสายตา จนกระทั่งในที่สุดมันก็ระเบิดออกอย่างรุนแรงในมิติที่สร้างความเสียหายไปทั่วจนทำให้อารยธรรมของพวกเขาแตกสลายลง\n\n§E"พี่น้องที่แตกสลาย..."§!\n\n§E"สงคราม..."§!\n\n§E"โปรดช่วยพวกเราด้วย..."§!\n\nยาน §Y$tech_rift_sphere$§! ของเราถูกขับออกอย่างรุนแรงจากรอยแยกมิติ ประตูมิติขนาดใหญ่กำลังเปิดขึ้นในระบบดาว [solar_system.GetName]"
 astral_rift.1020.a: "เราได้เปิดประตูทางผ่านแล้ว..."
 astral_rift.1020.b: "ปิดผนึกมันซะ! เร็วเข้า!"

 astral_rift.1025.name: "การหลบหนี"
 astral_rift.1025.desc: "เมื่อระบบของเราเปิดใช้งานได้อีกครั้ง เราได้ดึงสายยึดกลับและหลบหนีจากสิ่งมีชีวิตภายในเส้นทแยงสำเร็จ\n\nไม่ทราบว่าพลังในการควบคุมใดๆ อีกที่พวกมันจะใช้กับเรา และเป็นเรื่องดีที่สุดที่จะไม่ต้องรู้\n\nในมุมที่ดี คราบตกค้างที่มันทิ้งไว้บนตัวถังยานพาหนะของเรานั้นมีความหนาแน่นของสารแอสทรัลสูงมาก"

 astral_rift.1030.name: "ตราผนึกมิติ"
 astral_rift.1030.desc: "ประตูทางผ่านเกือบจะถูกสร้างขึ้นในระบบดาวเมืองหลวงของเรา ซึ่งทำให้ประชาชนของเราตกอยู่ในอันตรายครั้งใหญ่\n\nโชคร้ายที่ด้วยเทคโนโลยีที่เราได้รับจากการศึกษาเดอะชราวด์เราสามารถปิดผนึกภัยอันตรายนี้ได้อย่างถาวรสำเร็จ\n\nไม่ว่าสิ่งใดที่กำลังพยายามผ่านเข้ามา จะยังคงเป็นปริศนาต่อไป\n\nประชาชนของเราถือว่านี่เป็นชัยชนะครั้งยิ่งใหญ่เหนือศัตรูที่มีพลังอำนาจมหาศาลเกินจะหยั่งถึง"

###################
# Hatching Ground #
###################
 lonely_planet_propulsion_modifier: "ความเข้าใจในการแล่นใบเรือสุริยะ(โซลาร์)แล่นเรือสัมภาษณ์)"

 astral_rift_lonely_planet: "แหล่งฟักไข่(เสียงฮึดฮัด)"

 astral_rift.1100.name: "ไข่ยักษ์"
 astral_rift.1100.desc: "เครื่องยานสำรวจของเราค้นพบกลุ่มไข่ยักษ์ ซึ่งแต่ละฟองมีขนาดใหญ่เท่ากับยาน §Y$tech_rift_sphere$§! คาดว่าพวกมันจะฟักตัวออกมาในไม่ช้า และเมื่อถึงเวลานั้น ดาวเคราะห์ดวงนี้จะเต็มไปด้วยสิ่งมีชีวิตที่เราแทบไม่รู้อะไรเลยเกี่ยวกับพวกมัน เราตรวจไม่พบตัวอย่างสิ่งมีชีวิตอื่นใดบนดาวดวงนี้ ดังนั้นวัฏจักรการเติบโตของสายพันธุ์นี้จึงเป็นสิ่งที่เราไม่รู้จัก\n\nส่วนใหญ่รกร้าง ระบบนิเวศของดาวเคราะห์ดวงนี้ดูเหมือนจะไม่สามารถหล่อเลี้ยงประชากรให้รุ่งเรืองได้ ทฤษฎีหลักของเราคือสายพันธุ์นี้เป็นไปตามรูปแบบการอพยพข้ามระบบดาว ตัวเต็มวัยของสายพันธุ์จึงต้องอยู่ในนอกโลกในขณะนี้"

 astral_rift.1105.name: "ผู้กลืนกินแสงดารา(แก้วแก้ว)"
 astral_rift.1105.desc: "ไข่กำลังฟักตัวออกมา...\n\nสิ่งมีชีวิตมีปีกขนาดยักษ์กำลังโผล่ออกมาจากเปลือกไข่ พวกมันเกิดมาพร้อมความสามารถในการบิน บินว่อนบนท้องฟ้าเป็นฝูงใหญ่ ปีกมหึมาของมันทอดเงาพาดผ่านภูมิประเทศ พวกมันทะยานขึ้นสูงสู่ชั้นบรรยากาศ ราวกับว่าถูกดึงดูดด้วยแสงดาว\n\nเรายังไม่เห็นพวกมันดื่มกินอาหาร ซึ่งอาจบ่งชี้ว่าพวกมันดึงพลังงานผ่านการสังเคราะห์แสงในรูปแบบใดรูปแบบหนึ่ง สรีรวิทยาของพวกมันสร้างคำถามมากมาย"
 astral_rift.1105.a: "เข้าไปใกล้กว่านี้"
 astral_rift.1105.b: "รักษาระยะห่างที่ปลอดภัย"

 astral_rift.1110.name: "สัตว์แรกเกิดที่เป็นมิตร"
 astral_rift.1110.desc: "สิ่งมีชีวิตเหล่านี้ไม่แสดงความกลัวเมื่อเราเข้าใกล้ อาจเป็นเพราะไม่มีสัตว์นักล่าในแหล่งที่อยู่อาศัยที่โดดเดี่ยวของพวกมัน\n\nเราสามารถเก็บตัวอย่างจากสิ่งมีชีวิตและเศษซากเปลือกไข่ได้อย่างง่ายดายขณะที่พวกมันบินรอบตัวเราด้วยความอยากรู้อยากเห็น พวกมันมีเกล็ดแบบรับพลังงานแสงอาทิตย์(สเกลไฟฟ้า)ทำให้ได้รับอาหารที่จำเป็นทั้งหมดจากดาวฤกษ์ของตน ร่างกายของพวกมันยังทนทานต่อแรงกดดันสูง ซึ่งบ่งชี้ความสามารถในการทนต่อความว่างเปล่าของอวกาศเป็นเวลานาน มีความเป็นไปได้สูงมากที่สิ่งมีชีวิตเหล่านี้วิวัฒนาการมาเพื่อสามารถบินในอวกาศได้เป็นเวลานาน"
 astral_rift.1110.a: "น่าทึ่งมาก"
 astral_rift.1110.b.evopred: "ไม่ใช่ทั้งพวกนก(ชีวิตคน)หรือสัตว์ขาข้อ(Arhroboid)แปลกประหลาดมากจริงๆ"
 astral_rift.1110.c.bio: "พวกมันสามารถเปรียบเทียบได้กับยานอวกาศของเราเลย!"

 astral_rift.1115.name: "การแล่นใบเรือสุริยะ"
 astral_rift.1115.desc: "การเฝ้าสังเกตการณ์การบินครั้งแรกของสิ่งมีชีวิตแรกเกิดเหล่านี้เป็นสิ่งที่เปิดหูเปิดตา\n\nพวกมันขยับปีกราวกับเป็นใบเรือสุริยะ(ใบเรือโซลาร์)เร่งความเร็วขึ้นสู่ความเร็วสูงได้อย่างชำนาญ ร่อนและโฉบไปมาขณะเล่นสนุกร่วมกันในชั้นบรรยากาศระดับสูง\n\nพวกมันไม่ถูกผูกมัดด้วยแรงโน้มถ่วง สามารถข้ามอวกาศได้ในลักษณะเดียวกันกับการทะยานขึ้นผ่านชั้นบรรยากาศได้อย่างง่ายดาย"
 astral_rift.1115.a: "น่าประทับใจยิ่ง"

 astral_rift.1120.name: "การอพยพแห่งแอสทรัล(การอพยพ)"
 astral_rift.1120.desc: "ในขณะที่ดำเนินการวิจัยเพิ่มเติมเกี่ยวกับรูปแบบพฤติกรรมของตัวอ่อนแรกฟัก สิ่งมีชีวิตขนาดใหญ่กว่ายานรบประจัญบานก็ปรากฏตัวขึ้นอย่างกะทันหัน เหล่าสิ่งมีชีวิตต่างรุมล้อมรอบมัน แย่งชิงกันเพื่อเข้าไปใกล้ชิดกับยักษ์ใหญ่ ดูเหมือนว่านี่คือตัวเต็มวัยของสายพันธุ์เดียวกัน\n\nดาวเคราะห์ที่สันโดษแห่งนี้จึงทำหน้าที่เป็นรังที่ปลอดภัยสำหรับสิ่งมีชีวิตต่างมิติเหล่านี้ ขณะที่เราเฝ้าดู ตัวเต็มวัยได้ต้อนพวกตัวอ่อนไปยังรอยแยกมิติที่เพิ่งก่อตัวขึ้นในชั้นบรรยากาศชั้นบน\n\nการเดินทางผ่านของพวกมันทิ้งระลอกคลื่นความแปรปรวนของพื้นที่อวกาศไว้ เช่นเดียวกับความหนาแน่นของ $astral_threads$ ปริมาณมาก"
 astral_rift.1120.a: "ช่างเป็นรูปแบบสิ่งมีชีวิตที่น่าทึ่งมาก"

 astral_rift.1125.name: "การวางไข่แห่งแอสทรัล(เสียงสปอร์ต)"
 astral_rift.1125.desc: "$astral_rift.1120.desc$"
 astral_rift.1125.a: "$astral_rift.1120.a$"

##################
# The Microverse #
##################
 microverse_knownledge_modifier: "กำเนิดดวงดาว(ดาวเกิด)"

 astral_rift_microverse: "จักรวาลไมโครเวิร์ส(ไมโครบอล)"

 astral_rift.1200.name: "อัตราเร่งความเร็ว"
 astral_rift.1200.desc: "เมื่อยานทรงกลมของเราเดินทางผ่านรอยแยกมิติ เราพบกับอัตราเร่งที่รุนแรงปะทุขึ้นมาอย่างรวดเร็ว\n\nแรงโน้มถ่วงมหาศาลของจักรวาลนี้กำลังฉุดเราเข้าไป หลังจากเดินทางที่น่าอึดอัดและอันตราย ในที่สุดเราก็ลอยอยู่ภายในกลุ่มระบบดาวที่หนาแน่น ซึ่งทุกระบบดาวอยู่ในระยะเซนเซอร์จำกัดของยานทรงกลม เท่าที่เราสามารถบอกได้ ระบบดาวเหล่านี้ประกอบกันเป็นจักรวาลทั้งหมดนี้\n\nรายงานเบื้องต้นยังระบุระดับสสารมืดที่สูง และสิ่งที่มากกว่านั้นคือ มวลนี้กำลังเพิ่มขึ้นอย่างต่อเนื่อง ส่งผลให้แรงโน้มถ่วงมีความรุนแรงมากขึ้นตามกาลเวลา"

 astral_rift.1205.name: "อวกาศที่หดตัวลง"
 astral_rift.1205.desc: "จักรวาลนี้กำลังหดตัวลงเมื่อเวลาผ่านไป เราคาดการณ์ว่าในเวลาที่เหมาะสม มันจะยุบตัวลงเข้าสู่ตัวเองโดยสมบูรณ์\n\nปัญหาคือเราไม่สามารถคำนวณได้อย่างแม่นยำว่าสิ่งนี้จะเกิดขึ้นเมื่อใด ระบบของยานทรงกลมทำงานแปลกๆ ตั้งแต่เรามาถึง และจุดข้อมูลต่างๆ ได้หายไปจากแกนสมองกล ราวกับว่าข้อมูลถูกลบออกจากการจดจำ\n\nในที่อื่นๆ มีการสังเกตว่าพืชในกระถางต้นหนึ่งยกรากกลับขึ้นมาและย้อนกลับคืนสู่สภาพเมล็ดพันธุ์ กระแสเวลาของที่นี่มีความไม่เสถียรอย่างเห็นได้ชัด"

 astral_rift.1210.name: "รอยรั่วเวลา(Temporal Leak)"
 astral_rift.1210.desc.common: "ภายนอกยานทรงกลม ผลลัพธ์ที่ตามมานั้นรุนแรงยิ่งกว่า: เส้นทางการเคลื่อนที่ของอุกกาบาตย้อนกลับโดยสมบูรณ์ ดาวเคราะห์แตกตัวสลายลงเป็นฝุ่นและก๊าซ ทั้งระบบดาวบีบอัดตัวลงเป็นก้อนวัสดุที่ผันผวน เวลาไหลย้อนกลับอย่างเห็นได้ชัด และเราติดอยู่กึ่งกลางที่ใดสักแห่ง\n\nในที่สุด เวลาจะเข้าสู่จุด "ศูนย์" และจักรวาลนี้จะถูกย่นย่อเหลือขนาดเท่าปลายเข็ม\n\nแม้เราจะดูเหมือนถูกแยกออกจากการเปลี่ยนแปลงทางเวลาอยู่บ้าง แต่ยานทรงกลมนั้นก็มีความเปราะบาง โดยการประสานการทำงานระบบคอมพิวเตอร์ของเราเข้ากับ [Fleet.GetName] ภายนอกรอยแยก เราจะสามารถรักษาข้อมูลที่จางหายไปได้อย่างรวดเร็ว หรือวิธีการที่เฉียบขาดกว่านั้น เราสามารถใช้คุณสมบัติพิเศษเฉพาะตัวของเส้นใยแอสทรัลเพื่อปรับประจุขั้วของเกราะยานใหม่และปิดผนึกรอยรั่วเวลาได้"
 astral_rift.1210.desc.default: "พืชหดตัวลงและข้อมูลสูญหายเป็นเพียงจุดเริ่มต้นของปัญหา ปัญหาได้ลุกลามไปยังความทรงจำของลูกเรือ หลายคนดูเหมือนจะสับสน หลงลืมเรื่องงานที่กำลังทำ หรือแม้แต่ลืมว่าตนเองได้เข้ามาในรอยแยกมิติแห่งนี้เลย\n\n$astral_rift.1210.desc.common$"
 astral_rift.1210.desc.gestalt: "พืชหดตัวลงและข้อมูลสูญหายเป็นเพียงจุดเริ่มต้นของปัญหา เหล่า [explorer.GetIndividualNamePlural] ในอีกฝั่งหนึ่งของรอยแยกกำลังเผชิญกับสิ่งที่ไม่ปกติ ประสบการณ์ร่วมของเรากำลังสับสนปนเป และเราพบว่าการประสานข้อมูลร่วมกันเป็นเรื่องยากขึ้นเรื่อยๆ\n\n$astral_rift.1210.desc.common$"
 astral_rift.1210.a: "ประสานการทำงานกับ [Fleet.GetName]"
 astral_rift.1210.b: "ปรับประจุขั้วของเกราะยานใหม่(ย้ํา)"

 astral_rift.1215.name: "เหตุฉุกเฉินเร่งด่วน"
 astral_rift.1215.desc: "[fleet.ship.GetName] ตอบรับสัญญานอย่างรวดเร็ว บัดนี้เรากำลังส่งข้อมูลอัปเดตตามกำหนดเวลาที่สม่ำเสมอ สิ่งนี้ช่วยเก็บรักษาข้อมูลที่เราเก็บสะสมมาได้อย่างสำเร็จ\n\nโชคร้ายที่เรายังคงได้รับอิทธิพลจากกระแสเวลาที่ผิดปกติ และผลกระทบก็รุนแรงขึ้นเรื่อยๆ...\n\nด้วยร่องรอยของการย้อนอายุกลับของลูกเรือที่เพิ่มขึ้นอย่างรวดเร็วและเห็นได้ชัด เราจึงล่าถอยตามยุทธวิธีออกจากจักรวาลนี้ก่อนที่จะสายเกินไป"

 astral_rift.1220.name: "การย้อนกำเนิด(เกิด)"
 astral_rift.1220.desc: "ตัวเกราะยาน §Y$tech_rift_sphere$§! ได้รับการปรับประจุขั้วใหม่สำเร็จแล้ว บัดนี้เราได้รับการปกป้องจากผลกระทบที่รุนแรงที่สุดของการหดขยายเวลา(เวลาสลาย)รูปแบบความคิดของเรากลับคืนสู่ปกติและเราสามารถทำภารกิจต่อไปได้\n\nขณะนี้เราพร้อมแล้วที่จะศึกษาฟิสิกส์พิเศษเฉพาะตัวของจักรวาลนี้อย่างสมบูรณ์ยิ่งขึ้น\n\nเราสามารถนำทางเข้าใกล้ดาวฤกษ์ดวงหนึ่งเพื่อสังเกตการณ์ 'การย้อนกำเนิด' ของมันโดยตรง หรือในทางกลับกัน บริเวณขอบสุดของการดำรงอยู่นับเป็นจุดสังเกตการณ์ที่สมบูรณ์แบบในการรับชมการสิ้นสุดของห้วงเวลา"
 astral_rift.1220.a: "เข้าใกล้ระบบดาวฤกษ์ที่อยู่ใกล้ที่สุด"
 astral_rift.1220.b: "เฝ้าสังเกตการณ์จากขอบของจักรวาล"

 astral_rift.1225.name: "ฝุ่นละอองดวงดาว(ฝุ่นดาว)"
 astral_rift.1225.desc.common: "เราได้เข้าใกล้ดาวฤกษ์ระดับจี(คลาส จี)ซึ่งกำลังจางหายไปอย่างช้าๆ ก๊าซที่ปกติมันปล่อยออกมากลับหดตัวลงเมื่อแสงสว่างของมันอ่อนกำลังลง มันคงต้องใช้เวลาหลายล้านปีในการสังเกตพบสิ่งนี้ในจักรวาลของเรา นี่จึงนับเป็นโอกาสพิเศษที่จะได้ประจักษ์กับเหตุการณ์ดังกล่าวภายในช่วงเวลาที่สมเหตุสมผล"
 astral_rift.1225.desc.default: "$astral_rift.1225.desc.common$\n\nความตื่นเต้นของลูกเรือที่ได้ประจักษ์ต่อปรากฏการณ์ที่น่าทึ่งนี้สามารถสัมผัสได้อย่างชัดเจน"
 astral_rift.1225.desc.gestalt: "$astral_rift.1225.desc.common$"
 astral_rift.1225.a: "อาจไม่มีโอกาสเช่นนี้อีกแล้ว"

 astral_rift.1230.name: "จุดสิ้นสุดแห่งจุดเริ่มต้น"
 astral_rift.1230.desc: "เราเดินทางไปไกลกว่าขอบฟ้าของจักรวาล ซึ่งเป็นความสำเร็จที่โดยปกติแล้วเราเป็นไปไม่ได้ที่จะทำได้สำเร็จ\n\nที่ขอบของจักรวาลคือความว่างเปล่าอย่างสมบูรณ์แบบที่กว้างใหญ่ไพศาลเกินกว่าเหตุผลทั้งหมด\n\nเมื่อมองกลับไปที่ศูนย์กลาง เราได้ประจักษ์ถึงทุกสิ่งทุกอย่างที่ยุบตัวรวมเข้าหากันเป็นจุดจุดเดียวในอวกาศ ข้อมูลฟิสิกส์ที่เราเก็บรวบรวมมาได้จึงมีปริมาณมหาศาลอย่างมาก\n\nอย่างไรก็ตาม การประวิงเวลาต่อไปอาจเป็นความผิดพลาดที่ร้ายแรง และเราจะเดินทางกลับทันที"
 astral_rift.1230.a: "ช่างมหัศจรรย์ยิ่งนัก"

 astral_rift.1235.name: "จุดสิ้นสุดแห่งจุดเริ่มต้น"
 astral_rift.1235.desc: "ดาวฤกษ์ดวงนั้นไม่มีอีกต่อไปแล้ว\n\nเราสามารถบันทึกเกือบทุกช่วงเวลาแห่งการสร้างตัวของมัน ตั้งแต่จุดจบไปจนถึงจุดเริ่มต้น สิ่งที่ครั้งหนึ่งเคยเป็นแกนลุกไหม้บัดนี้กลายเป็นกลุ่มหมอกอะตอมที่หมุนวน องค์ความรู้ทางฟิสิกส์ที่เราได้รับช่างมีค่าประเมินไม่ได้\n\nอย่างไรก็ตาม การประวิงเวลาต่อไปอาจเป็นความผิดพลาดที่ร้ายแรง และเราจะเดินทางกลับทันที"
 astral_rift.1235.a: "ช่างมหัศจรรย์ยิ่งนัก"

#############
# The Fluid #
#############
 astral_rift_fluid: "ของเหลวเหลวไหล(ฟลอยด์)"

 astral_rift.1300.name: "ของเหลวเหลวไหล"
 astral_rift.1300.desc: "ยาน §Y$tech_rift_sphere$§! ของเราเดินทางมาถึงโดยจมอยู่ภายในของเหลวสีแดงที่มีความหนืด ทั่วรอบตัวเรามีก้อนสสารรูปร่างกลมคล้ายจานขนาดใหญ่ลอยอยู่รอบๆ แต่เราก็สามารถหลีกเลี่ยงการปะทะกับพวกมันได้จนถึงขณะนี้ กำแพงทึบของวัสดุกึ่งเจลาตินล้อมรอบเราทุกด้าน เราเลื่อนไหลไปตามระบบช่องทางได้อย่างง่ายดาย\n\nแรงขับจังหวะสม่ำเสมอที่เราสัมผัสได้จากภายในรอยแยกมิตินี้ ประสานสอดคล้องกับความถี่ฮาร์มอนิกของของเหลวรอบตัวเรา ทุกสามวินาทีเราจะถูกผลักไปข้างหน้าด้วยแรงดันที่พาเราจมดิ่งเข้าสู่ระบบท่อ การต้านทานกระแสไหลนี้ช่างยากลำบากอย่างยิ่งสำหรับเครื่องยนต์ของเรา\n\nนี่เป็นโอกาสอันดีในการเก็บรวบรวมชิ้นตัวอย่าง แต่อุปกรณ์เครื่องมือที่เหมาะสมอาจขัดขวางการนำทางของเราในอุโมงค์ที่คดเคี้ยวเหล่านี้"
 astral_rift.1300.a: "เปิดใช้งานเครื่องมือรวบรวมตัวอย่าง"
 astral_rift.1300.b: "เคลื่อนตัวไปข้างหน้าอย่างช้าๆ"

 astral_rift.1305.name: "ติดขัด"
 astral_rift.1305.desc.common: "หลังจากเข้ามาในรอยแยกมิติได้ระยะหนึ่ง ยานของเราก็หยุดกะทันหัน เนื่องจากอุปกรณ์รวบรวมตัวอย่างที่ลากตามหลังเราเข้าไปติดอยู่ในช่องแคบของระบบอุโมงค์\n\nเราพยายามช่วยตัวเองให้หลุดด้วยการเร่งความเร็วขับเป็นระยะๆ แต่ความแรงของกระแสน้ำทำให้เราไม่สามารถก้าวหน้าได้เลย"
 astral_rift.1305.desc.no_gases: "$astral_rift.1305.desc.common$\n\nเราไม่มีทางเลือกอื่นนอกจากต้องตัดอุปกรณ์รวบรวมตัวอย่างทิ้งและเดินทางต่อ"
 astral_rift.1305.desc.gases: "$astral_rift.1305.desc.common$\n\nทางเลือกที่ปลอดภัยที่สุดคือการตัดอุปกรณ์เก็บตัวอย่างทิ้งและเดินทางต่อ อย่างไรก็ตาม อาจมีความเป็นไปได้ที่จะเก็บรักษาตัวอย่างไว้ได้โดยการเสริมแรงขับเคลื่อนของยานด้วยถังจ่ายก๊าซแปลกประหลาด(แก๊สไฟฟ้า)"
 astral_rift.1305.a: "ตัดอุปกรณ์เก็บตัวอย่างทิ้ง ความเสี่ยงนี้ไม่คุ้มค่า"
 astral_rift.1305.b: "ใช้ถังก๊าซฉุกเฉิน"

 astral_rift.1310.name: "ห้องโถงกว้าง"
 astral_rift.1310.desc.common: "กระแสการไหลที่สม่ำเสมอไปตามผนังอุโมงค์ช่วยให้เราทรงตัวอยู่ตรงกลางของการเดินทางได้เป็นอย่างดี เวลาหลายวันผ่านไปโดยไม่มีเหตุการณ์ใดๆ สิ่งแปลกปลอมรูปทรงแผ่นจานรอบตัวเราก็ถูกพัดพาไปกับกระแสเช่นกัน พวกมันลอยและร่อนผ่านยานทรงกลมไปอย่างแผ่วเบา\n\nเราไม่พบร่องรอยของสิ่งมีชีวิตที่มีสติปัญญา อันที่จริง สมมติฐานที่ชัดเจนที่สุดของเรา ณ จุดนี้คือเรากำลังอยู่ภายในสิ่งมีชีวิตระดับอภิมหายักษ์(สิ่งมีชีวิตซูเปอร์)ที่ไม่รู้จัก หากการมีอยู่ของเราได้รับการสังเกตพบโดยระบบป้องกันภัยตามธรรมชาติ เราก็ยังไม่พบร่องรอยของมัน\n\nบัดนี้เราพบว่าตัวเองอยู่ในห้องโถงขนาดยักษ์ ผนังห้องเรียงรายไปด้วยส่วนที่ยื่นออกมาคล้ายเส้นเลือด ผนังของห้องขยายตัวและหดตัวเป็นจังหวะ บังคับให้ของเหลวหลายล้านลิตรไหลผ่านช่องทางออกช่องเดียว\n\nขณะที่เรารักษาระแหน่งเดิมไว้ เราได้ค้นพบช่องทางเข้าช่องที่สองเข้าสู่ห้องโถง มีรอยสสารผลึกจำนวนเล็กน้อยแขวนลอยอยู่ในของเหลวที่ไหลมาจากอุโมงค์นี้ ความดันของกระแสน้ำต่ำพอที่หากนำทางอย่างระมัดระวัง เราจะสามารถเข้าไปสำรวจช่องนี้ได้"
 astral_rift.1310.desc: "เราได้ตัดอุปกรณ์เก็บตัวอย่างทิ้งแล้ว เราสังเกตเห็นว่าพื้นที่รอบๆ ตัวอุปกรณ์ดูเหมือนจะค่อยๆ คล้ำลงและเกิดการบวมขึ้นเมื่อเวลาผ่านไป\n\n$astral_rift.1310.desc.common$"
 astral_rift.1310.a: "เดินทางตามกระแสไหลออกไปด้านนอก"
 astral_rift.1310.b: "สำรวจเข้าไปในช่องทางผลึกคริสตัล"

 astral_rift.1311.name: "$astral_rift.1310.name$"
 astral_rift.1311.desc: "โดยการเสริมแรงขับเคลื่อนของยานด้วยการอัดประจุก๊าซแปลกประหลาด เราสามารถดึงอุปกรณ์ให้หลุดพ้นจากผนังอุโมงค์ได้สำเร็จ นับตั้งแต่นั้นมาเราสามารถกู้คืนตัวอย่างที่มีค่ากลับมาได้\n\n$astral_rift.1310.desc.common$"
 astral_rift.1311.a: "$astral_rift.1310.a$"
 astral_rift.1311.b: "$astral_rift.1310.b$"

 astral_rift.1315.name: "สิ่งมีชีวิตทรงกลม(กระแอม)"
 astral_rift.1315.desc.common: "ทันใดนั้น สิ่งมีชีวิตทรงกลมไม่มีรูปทรงขนาดเท่ากับยานอวกาศก็ถูกสังเกตพบห่างออกไปสองสามร้อยเมตร ความพยายามในการเฝ้าสังเกตการณ์มันจากระยะไกลทำให้เราดึงดูดความสนใจจากมันโดยบังเอิญ\n\nยาน §Y$tech_rift_sphere$§! ถูกดูดกลืนผ่านเนื้อเยื่อของเอนทิตีอย่างรวดเร็ว ภายในของมันประกอบด้วยเอนไซม์ที่มีฤทธิ์กัดกร่อนเป็นส่วนใหญ่ เกราะตัวถังของยานทรงกลมกำลังถูกย่อยสลายในขณะที่เรากำลังพูดอยู่นี้"
 astral_rift.1315.desc_no_gestalt: "เจ้าหน้าที่ยุทธวิธีแนะนำให้อพยพทันที แต่นักชีววิทยาคาดว่าเราสามารถทำให้เอนไซม์มีฤทธิ์เป็นกลางได้โดยใช้ก๊าซและของเหลวที่เราพกมาด้วย"
 astral_rift.1315.desc_gestalt: "การอพยพอาจมีความเหมาะสม แต่เราคาดว่าเอนไซม์ของมันสามารถทำให้เป็นกลางได้โดยใช้ส่วนผสมของก๊าซและของเหลวที่เราพกมาด้วยอย่างเหมาะสม"

 astral_rift.1315.desc.default: "ในฝั่งตรงข้ามของช่องทางเข้า เราได้เข้าสู่โพรงอีกช่องหนึ่ง ห้องโถงนี้มีขนาดใหญ่กว่าห้องใดๆ ที่เราเคยพบเห็นมาจนถึงตอนนี้ ที่นี่มีระยางค์บางๆ ที่แตกแขนงอย่างละเอียดอ่อนยืดออกไปในทุกทิศทาง พวกมันถักทอประสานกันอย่างซับซ้อนจนการเดินทางไปต่อเป็นเรื่องยาก ของเหลวในสภาพแวดล้อมนี้อิ่มตัวไปด้วยก๊าซซึ่งเป็นเรื่องง่ายสำหรับเราในการรวบรวมสะสม\n\n$astral_rift.1315.desc.common$"
 astral_rift.1315.desc.gases.default: "$astral_rift.1315.desc.default$\n\n$astral_rift.1315.desc_no_gestalt$"
 astral_rift.1315.desc.gases.gestalt: "$astral_rift.1315.desc.default$\n\n$astral_rift.1315.desc_gestalt$"
 astral_rift.1315.a: "ดึงสายยึดเหนี่ยวกลับ เดินทางกลับทันที"
 astral_rift.1315.b: "ปั๊มก๊าซแปลกประหลาดเข้ากระแสเลือด สะกดสัตว์ร้ายให้หมดสภาพ"

 astral_rift.1316.name: "$astral_rift.1315.name$"
 astral_rift.1316.desc.default: "จากการฝ่าฟันกระแสพลังงาน เราสามารถเบียดตัวเข้าไปในอุโมงค์แยกจากห้องโถงก่อนหน้าได้สำเร็จ เรามาโผล่ที่ถ้ำผลึกคริสตัลที่สั่นไหว ผนังรอบตัวเราช่วยกรองของเหลวจากทุกทิศทาง ส่งผลให้มีคราบตกค้างที่เป็นผลึกคริสตัลทิ้งไว้เบื้องหลัง\n\n$astral_rift.1315.desc.common$"
 astral_rift.1316.desc.gases.default: "$astral_rift.1316.desc.default$\n\n$astral_rift.1315.desc_no_gestalt$"
 astral_rift.1316.desc.gases.gestalt: "$astral_rift.1316.desc.default$\n\n$astral_rift.1315.desc_gestalt$"
 astral_rift.1316.a: "$astral_rift.1315.a$"
 astral_rift.1316.b: "$astral_rift.1315.b$"

 astral_rift.1320.name: "การเก็บกู้ช่วยเหลือ"
 astral_rift.1320.desc.common: "แม้ว่าเอนไซม์ที่เป็นกรดของสัตว์ร้ายจะเป็นอันตรายต่อตัวถังยาน แต่เราก็มีเวลาเหลือเฟือที่จะเปิดใช้งานสายยึดเหนี่ยวฉุกเฉินและหลบหนีกลับผ่านรอยแยกมิติไปยังอีกฝั่งได้สำเร็จ"
 astral_rift.1320.desc.no_rig: "$astral_rift.1320.desc.common$\n\nอย่างไรก็ตาม การเดินทางของเราไม่ได้สูญเปล่าไปทั้งหมด พบสสารปริมาณมากจากตัวสัตว์ร้ายยังคงติดอยู่กับตัวถังยานของเรา นักชีววิทยาของเราต่างกระตือรือร้นที่จะสืบหาความลับที่มันอาจซ่อนเอาไว้"
 astral_rift.1320.desc.rig: "$astral_rift.1320.desc.common$\n\nอย่างไรก็ตาม การเดินทางของเราไม่ได้สูญเปล่าไปทั้งหมด สสารปริมาณมากจากตัวสัตว์ร้ายได้รับการกู้คืนด้วยอุปกรณ์เครื่องมือเก็บตัวอย่างของเรา นักชีววิทยาของเราต่างกระตือรือร้นที่จะสืบหาความลับที่มันอาจซ่อนเอาไว้"
 astral_rift.1320.b.evopred: "ทำกรดให้เป็นกลาง แล้วพวกเราจะดื่มกินมันลงไป"

 astral_rift.1325.name: "การหลอมละลายทำลายตัวตน"
 astral_rift.1325.desc.common.1: "แม้ว่าจะมีขนาดใหญ่โต แต่สัตว์ร้ายตัวนี้กลับมีระบบชีววิทยาที่เรียบง่ายอย่างเห็นได้ชัด\n\nหลังจากที่เราปล่อยก๊าซผสมพิเศษเฉพาะตัวออกไปได้ไม่นาน เนื้อเยื่อผนังเซลล์ของมันก็ละลายลง เมื่อไม่สามารถรักษาความสมบูรณ์ของเซลล์ได้อีกต่อไป อวัยวะภายในของมันจึงถูกพัดพาไปกับกระแสน้ำโดยรอบ จนกระทั่งเหลือเพียงแกนกลางขนาดมหึมาเท่านั้น\n\nเรามีความยินดีที่จะรายงานว่าเราสามารถเก็บกู้วัตถุดังกล่าวกลับมาได้สำเร็จ ซึ่งมีลักษณะไม่ต่างจากนิวเคลียสของสิ่งมีชีวิตเซลล์เดียวจำนวนมากจากมิติของเราเอง"
 astral_rift.1325.desc.common.2: "เราคาดการณ์ว่าสิ่งมีชีวิตนี้น่าจะเป็นแอนติบอดี(Antibody)ในระบบท่อและของเหลวขนาดมหึมานี้ และระบุว่าเราเป็นภัยคุกคามจากภายนอก ยานเราได้รับความเสียหายจากการเผชิญหน้า จึงเดินทางกลับพร้อมกับถ้วยรางวัลของเรา"
 astral_rift.1325.desc.no_rig: "$astral_rift.1325.desc.common.1$\n\n$astral_rift.1325.desc.common.2$"
 astral_rift.1325.desc.rig: "$astral_rift.1325.desc.common.1$\n\nนอกจากนี้ อุปกรณ์เก็บตัวอย่างที่เราสามารถรักษาไว้ได้ก่อนหน้านี้ยังสามารถกู้คืนสสารปริมาณมากจากตัวสัตว์ร้ายได้อีกด้วย นักชีววิทยาของเราต่างกระตือรือร้นที่จะสืบหาความลับที่มันอาจซ่อนเอาไว้\n\n$astral_rift.1325.desc.common.2$"

 astral_rift.1330.name: "ถูกย่อยสลาย"
 astral_rift.1330.desc.gestalt: "เราสูญเสียการติดต่อกับ [explorer.GetTeamMemberPlural] ของเราแล้ว\n\nตามขั้นตอนมาตรฐาน เราได้ดึงตัวสายยึดเหนี่ยวกลับและเก็บกู้ชิ้นส่วนที่เหลืออยู่ของยาน §Y$tech_rift_sphere$§!\n\nแม้ว่ายานจะถูกย่อยสลายไปเกือบทั้งหมด แต่ก็มีมวลชีวภาพที่มีความเข้มข้นสูงเคลือบอยู่บนชิ้นส่วนที่เหลืออยู่ทั้งหมด เรามั่นใจว่าสิ่งนี้จะนำไปสู่การพัฒนาความรู้ที่ยิ่งใหญ่ครั้งใหม่"
 astral_rift.1330.desc.default: "เราสูญเสียการติดต่อกับทีมวิทยาศาสตร์แล้ว\n\nตามขั้นตอนมาตรฐาน เราได้ดึงตัวสายยึดเหนี่ยวกลับและเก็บกู้ชิ้นส่วนที่เหลืออยู่ของยาน §Y$tech_rift_sphere$§!\n\nแม้ว่ายานจะถูกย่อยสลายไปเกือบทั้งหมด แต่ก็มีมวลชีวภาพที่มีความเข้มข้นสูงเคลือบอยู่บนชิ้นส่วนที่เหลืออยู่ทั้งหมด นักชีววิทยาของเรามั่นใจว่าสิ่งนี้จะนำไปสู่การพัฒนาความรู้ครั้งสำคัญยิ่งครั้งใหม่\n\nเราขอขอบพระคุณลูกเรือสำหรับความกล้าหาญของพวกเขา ชื่อของพวกเขาจะถูกจดจำตราบนานแสนนาน"

##############
# The Garden #
##############
 infinity_root_leader_desc: "§Y[Root.GetName]§! กำเนิดขึ้นมาจากเมล็ดพันธุ์ของ $r_infinity_root$ แม้ว่า[Root.GetSheHeCap]จะเพิ่งเข้ามาสู่โลกนี้ แต่มีความเฉลียวฉลาดที่น่าทึ่งมาก"
 garden_astral_rift_resurrected_leader_desc: "§Y[Root.GetName]§! เดินทางกลับมาหาเราอย่างปาฏิหาริย์จากคณะเดินทางที่ล้มเหลวเข้าสู่อาศัยรอยแยกรอยแยกแอสทรัล ที่อุดมด้วยพืชพรรณ แม้ว่า[Root.GetHeShe]จะไม่เหมือนกับตัวตนเดิมของ[Root.GetHisHer]อีกต่อไป ทว่าดูเหมือนว่า[Root.GetHeShe]จะยังมีคุณลักษณะที่คล้ายกัน"

 astral_rift_garden: "สวนป่า(สวน)"

 astral_rift.1400.name: "หนามแหลมคม"
 astral_rift.1400.desc: "เราเดินทางมาถึงห้องโถงที่เต็มไปด้วยเถาวัลย์สีเขียวบิดตัวไปมา\n\nหนามแหลมคมยื่นออกดักทุกจุดเลี้ยวโค้งของระบบเถาวัลย์\n\nเราตระหนักได้อย่างรวดเร็วว่าสิ่งมีชีวิตเหล่านี้มีเป้าหมายบางอย่าง หรืออย่างน้อยที่สุดก็มีสัญชาตญาณในการป้องกันตัว\n\nเราสังเกตพบปริมาณออกซิเจนในบรรยากาศที่สูงผิดปกติ เราคาดการณ์ว่าการเผาทำลายสิ่งกีดขวางเหล่านี้น่าจะเป็นงานที่ง่ายดาย\n\nในทางกลับกัน วิธีนี้จะทำลายตัวอย่างวัสดุทั้งหมดที่เราอาจจะเก็บรวบรวมได้ เราสังเกตเห็นผลไม้ที่มีขนดกจำนวนมากแขวนอยู่ตามกิ่งก้านซึ่งอาจให้ข้อมูลเชิงลึกเกี่ยวกับพืชพรรณนี้ได้เป็นอย่างดี"
 astral_rift.1400.a: "เผาวัชพืชทิ้ง"
 astral_rift.1400.b: "สกัดผลไม้ออกมา"

 astral_rift.1405.name: "ถูกเกี่ยวยึด"
 astral_rift.1405.desc: "เราถูกเกี่ยวยึดพันธนาการไว้\n\nแม้ว่าพื้นผิวเรียบเนียนของยาน §Y$tech_rift_sphere$§! จะทำให้พืชเกาะยึดได้ยาก แต่สายโยงยึดเหนี่ยวของเรากลับถูกพันรอบในทุกทิศทางด้วยเถาวัลย์เส้นใยหนาแน่น\n\nแม้จะมีอุปสรรคเหล่านี้ แต่ไม่มีมวลพืชชนิดใดต้านทานแรงดึงดึงกลับของเราได้หากเราต้องการกลับสู่ความปลอดภัยและออกไปจากรอยแยกมิติ มวลชีวภาพที่เราดึงกลับมาด้วยน่าจะมีประโยชน์อยู่บ้าง\n\nอย่างไรก็ตาม หากเราต้องการสืบหาการสำรวจไปข้างหน้าต่อ ทางเลือกเดียวที่ทำได้จริงคือการเผาทำลายเถาวัลย์นี้ เปลวเพลิงที่เกิดขึ้นจะมีความรุนแรงอย่างมาก ในระยะประชิดเช่นนี้ เรามีความเสี่ยงที่จะทำความเสียหายให้กับยานอวกาศของเรา"
 astral_rift.1405.a: "เผาทำลายเถาวัลย์ที่พันเกี่ยวอยู่"
 astral_rift.1405.b: "ดึงสายยึดกลับ หลบหนีออกจากพื้นที่"

 astral_rift.1410.name: "โพรงถ้ำอันกว้างใหญ่"
 astral_rift.1410.desc.common: "เมื่อจัดการกับภัยอันตรายเฉพาะหน้าแล้ว เราจึงสำรวจสภาพแวดล้อมรอบตัวอย่างละเอียดถี่ถ้วนยิ่งขึ้น\n\nเราอยู่ลึกเข้าไปภายในระบบถ้ำหลายแห่ง\n\nการส่งสัญญานสำรวจนำทางผ่านอุโมงค์ใกล้เคียงนำเราเข้าสู่โพรงถ้ำที่กว้างขวางยิ่งขึ้น โครงสร้างคล้ายรากไม้ห้อยย้อยลงมาจากเพดาน หยดของเหลวหนืดลงบนใบไม้ด้านล่าง ซึ่งจะถูกดูดซับโดยพืชพรรณพืชต่อไป มันเป็นระบบนิเวศที่เติบโตได้ด้วยตัวเอง การสร้างสภาพแวดล้อมที่มั่นคงเช่นนี้ต้องใช้เวลาหลายสหัสวรรษ\n\nเส้นเถาวัลย์ในบริเวณนี้หนาแน่นกว่าพื้นที่ตอนเรามาถึงเสียอีก"
 astral_rift.1410.desc.burn: "เป็นไปตามคาด ปริมาณออกซิเจนที่สูงในอากาศทำให้เกิดเปลวไฟปะทุขึ้นอย่างรวดเร็วและเผาไหม้พืชพรรณมีหนามเหล่านั้นจนหมดสิ้น\n\nเมื่อไร้สิ่งกีดขวาง เราจึงทำการสำรวจต่อไป เราสามารถเก็บกู้เถ้าถ่านจำนวนมากที่ผสมเข้ากับสารแอสทรัลจากขอบรอยแยกได้\n\n$astral_rift.1410.desc.common$"
 astral_rift.1410.desc.extract: "ขณะเราเดินทางอ้อมผ่านเถาวัลย์ เราสามารถตัดผลไม้บางส่วนออกจากกิ่งโดยใช้อุปกรณ์เก็บตัวอย่างของเรา ทุกครั้งที่เราเก็บผลออกมา ชิ้นส่วนที่เหลือของต้นไม้จะอ่อนกำลังร่วงลงด้านข้าง ในที่สุดเราก็รวบรวมได้เพียงพอที่จะสร้างขอบข่ายความปลอดภัยที่กว้างขวาง\n\n\"ผลไม้\" ของพืชเหล่านี้ แท้จริงแล้วเป็นเชื้อราแบบพึ่งพากันซึ่งมีอยู่ทั่วระบบรากทั้งหมด เราได้นำตัวอย่างขึ้นมาตรวจสอบเพิ่มเติม\n\nเราคาดว่าเชื้อรานี้น่าจะทำหน้าที่เสมือนกลุ่มประสาทสั่งการ(จมูกบวก)สำหรับต้นไม้ที่มันครอบครองอยู่\n\n$astral_rift.1410.desc.common$"
 astral_rift.1410.a: "เผาทำลายทุกสิ่งให้ราบคาบ"
 astral_rift.1410.b: "ศึกษาสถานที่แห่งนี้"

 astral_rift.1415.name: "อัคคีภัยครั้งใหญ่"
 astral_rift.1415.desc: "ช่างโชคร้ายที่เราสูญเสียการติดต่อกับทีมวิทยาศาสตร์บนยาน §Y$tech_rift_sphere$§!\n\nเมื่อทำการเก็บกู้กู้ชีพกลับมา ครึ่งหนึ่งของยานได้หลอมละลายกลายเป็นเศษซากโดยสมบูรณ์ ทุกคนบนยานได้สิ้นใจแล้ว\n\nเราได้ทำการติดตั้งยาน §Y$tech_rift_sphere$§! ลำใหม่เข้ากับยานวิทยาศาสตร์เพื่อการสำรวจในระนาบมิติแอสทรัลต่อไป"

 astral_rift.1420.name: "การหลบหนีออกจากพื้นที่"
 astral_rift.1420.desc: "อันตรายที่มีอยู่โดยธรรมชาติของสถานที่แห่งนี้ไม่คุ้มกับความเสี่ยง\n\nเราได้ดึงสายยึดกลับและพา [explorer.GetTeamMemberPlural] ของเรากลับสู่ความปลอดภัยแล้ว\n\nตัวอย่างที่เราเก็บกู้กลับมาได้มีคุณสมบัติที่น่าสนใจเฉพาะตัวอย่างยิ่ง"
 astral_rift.1420.b.evopred: "ทำสารบัญบันทึกสิ่งที่เราค้นพบ"

 astral_rift.1425.name: "สิ่งมีชีวิตลึกลับ"
 astral_rift.1425.desc.common.1: "เราได้เคลียร์พื้นที่ส่วนใหญ่ของห้องโถงนี้ด้วยเปลวไฟเรียบร้อยแล้ว"
 astral_rift.1425.desc.common.2: "เนื่องจากไม่มีพายุฝนฟ้าคะนองในแหล่งที่อยู่อาศัยนี้ สิ่งมีชีวิตเหล่านี้จึงปรับตัวให้เข้ากับสภาพแวดล้อมที่ไม่มีการจุดไฟเผาไหม้ได้โดยสมบูรณ์\n\nหลังจากเปลวไฟครั้งสุดท้ายดับลงไม่นาน สิ่งมีชีวิตรูปร่างแปลกประหลาดตัวหนึ่งก็โผล่ออกมาจากเถ้าถ่าน ด้วยขาจำนวนนับร้อยของมัน มันคลานไปตามกองถ่านที่คุด้วยความสับสน กรงเล็บคล้ายระยางค์คุ้ยเขี่ยเถ้าถ่านอย่างขะมักเขม้น เสียงทุ้มเบาดังออกมาจากเยื่อหุ้มหลายชิ้นที่เคลือบตามส่วนต่างๆ ของร่างกายมัน\n\nจากนั้นมันก็เบนความสนใจมาที่เรา หัวของมันเอียงไปด้านข้าง หนามสะเก็ดเกล็ดแผ่ออกมาจากคอของมัน สัตว์ร้ายที่เป็นประกายส่งเสียงที่ได้ยินมาทางเราด้วยจังหวะที่รวดเร็วสม่ำเสมอ"
 astral_rift.1425.desc.previousburn: "$astral_rift.1425.desc.common.1$\n\nเหมือนเช่นเคย พืชพรรณแตกตัวสลายไปในเปลวไฟปะทุขนาดใหญ่ เราสังเกตเพิ่มเติมว่าของเหลวที่เคลือบพืชเหล่านี้ทำหน้าที่เป็นสารเร่งการเผาไหม้ได้เป็นอย่างดี\n\n$astral_rift.1425.desc.common.2$"
 astral_rift.1425.desc.nopreviousburn: "$astral_rift.1425.desc.common.1$\n\nเป็นไปตามคาด ปริมาณออกซิเจนที่สูงในอากาศทำให้เกิดเปลวไฟระเบิดขึ้นที่กลืนกินพืชมีหนามอย่างรวดเร็ว\n\n$astral_rift.1425.desc.common.2$"
 astral_rift.1425.a: "หลบหนีออกจากพื้นที่"
 astral_rift.1425.b: "ไม่ต้องทำสิ่งใด"
 astral_rift.1425.c: "จุดไฟเผาสิ่งมีชีวิตดังกล่าว"

 astral_rift.1430.name: "สิ่งมีชีวิตลึกลับ"
 astral_rift.1430.desc: "แม้ว่าเราจะใช้ความพยายามอย่างรอบคอบที่สุดในการศึกษาห้องโถง แต่เราก็ถูกตรวจพบโดยสิ่งมีชีวิตที่อาจเป็นอันตราย\n\nเราพบเห็นมันเป็นครั้งแรกขณะคลานผ่านแนวหนามอย่างประณีตโดยใช้ขานับร้อยของมัน เสียงแหลมเบาดังออกมาจากเยื่อหุ้มหลายชิ้นที่หุ้มตามตัวของมัน ขณะที่มันดูแลและเก็บเกี่ยวผลไม้ที่พบบนต้นพืชทุกต้น\n\nโชคร้ายที่ตัวถังยานของเราไปปะทะรุนแรงเข้ากับกลุ่มใบไม้หนา เสียงดังกล่าวช่วยเตือนมันให้หันมาสนใจทางเราทันที หัวของมันเอียงไปด้านข้าง หนามสะเก็ดเกล็ดแผ่ออกมาจากคอของมัน สัตว์ร้ายที่เป็นประกายส่งเสียงที่ได้ยินมาทางเราด้วยจังหวะที่รวดเร็วสม่ำเสมอ"
 astral_rift.1430.a: "หลบหนีออกจากพื้นที่"
 astral_rift.1430.b: "จุดไฟเผาสิ่งมีชีวิตดังกล่าว"

 astral_rift.1435.name: "ถูกพบตัวแล้ว"
 astral_rift.1435.desc: "โชคร้ายที่เราดึงดูดความสนใจจากสิ่งมีชีวิตดังกล่าวเข้าให้แล้ว หัวของมันเอียงไปด้านข้าง หนามสะเก็ดเกล็ดแผ่ออกมาจากคอของมัน สัตว์ร้ายที่เป็นประกายส่งเสียงมาทางเราด้วยจังหวะที่รวดเร็วสม่ำเสมอ\n\nเราจะไม่สามารถศึกษามันต่อไปได้อีก\n\nเราคาดการณ์ว่ามันน่าจะเปราะบางต่อเปลวไฟที่รุนแรง เช่นเดียวกับสิ่งมีชีวิตอื่นๆ ส่วนใหญ่ในบริเวณนี้ อย่างไรก็ตาม อาจเป็นการดีที่สุดที่จะหลบหนีในตอนนี้เพื่อป้องกันความเสียหายดีกว่า"
 astral_rift.1435.a: "หลบหนีออกจากพื้นที่"
 astral_rift.1435.b: "จุดไฟเผาสิ่งมีชีวิตดังกล่าว"

 astral_rift.1440.name: "สิ่งมีชีวิตลึกลับ"
 astral_rift.1440.desc: "มีบางสิ่งแอบซ่อนอยู่ท่ามกลางใบไม้\n\nในขณะที่เราจัดตำแหน่งซ่อนตัวเพื่อศึกษาห้องโถงนี้ สิ่งมีชีวิตแปลกประหลาดตัวหนึ่งก็ปรากฏตัวออกมาจากพุ่มไม้ เราพบเห็นมันเป็นครั้งแรกขณะคลานผ่านแนวหนามอย่างประณีตโดยใช้ขานับร้อยของมัน เสียงแหลมเบาดังออกมาจากเยื่อหุ้มหลายชิ้นที่หุ้มตามตัวของมัน ขณะที่มันดูแลและเก็บเกี่ยวผลไม้ที่พบบนต้นพืชทุกต้น\n\nเราสังเกตการณ์มันมาระยะหนึ่งแล้ว และเชื่อว่าการศึกษาเพิ่มเติมจะเปิดโอกาสการวิจัยที่มีคุณค่าอย่างยิ่ง\n\nในทางกลับกัน เราคาดการณ์ว่ามันน่าจะเปราะบางต่อเปลวไฟที่รุนแรง เช่นเดียวกับสิ่งมีชีวิตอื่นๆ ส่วนใหญ่ในบริเวณนี้ มันอาจเป็นการดีที่สุดที่จะกำจัดทำลายล้างมันในขณะที่เรามีโอกาส"
 astral_rift.1440.a: "จุดไฟเผาสิ่งมีชีวิตดังกล่าว"
 astral_rift.1440.b: "ดำเนินการศึกษาวิจัยต่อ"

 astral_rift.1445.name: "วัสดุพืชพรรณไม้"
 astral_rift.1445.desc: "เราสูญเสียการติดต่อกับยาน §Y$tech_rift_sphere$§! แล้ว\n\nตามขั้นตอนมาตรฐาน เราได้ดึงตัวสายโยงกลับและกู้ยานกลับคืนมา\n\nไม่มีหลักฐานการหลงเหลืออยู่ของ [explorer.GetTeamMemberPlural] ของเราเลย อย่างไรก็ตาม สามารถตรวจพบพลังงานที่เป็นเอกลักษณ์ของพวกเขาได้ท่ามกลางระบบรากไม้ขนาดมหึมาที่เข้ายึดพื้นที่ภายในห้องโดยสารทั้งหมดในตอนนี้\n\nตัวยานทรงกลมได้ถูกขนส่งไปที่อื่นเพื่อการศึกษาเพิ่มเติม บางทีเราอาจจะเพาะปลูกมันไว้ที่ใดที่หนึ่ง"
 astral_rift.1445.b.evopred: "การสละชีพของพวกเขาไม่ได้สูญเปล่า ตอนนี้ได้เวลาทำการชำแหละแล้ว"

 astral_rift.1450.name: "รากไม้อนันต์(รากอินฟินิตี้)"
 astral_rift.1450.desc: "สิ่งมีชีวิตตัวนั้นไม่ได้แปลกแยกกับไฟเลย\n\nทันทีที่เราจุดประกายไฟครั้งแรกขึ้น มันก็วิ่งหนีไปด้วยความตระหนก พฤติกรรมที่รวดเร็วเช่นนั้นต้องเป็นสัญชาตญาณบางอย่างอย่างแน่นอน\n\nบางทีมันอาจรับรู้คุณสมบัติที่ติดไฟง่ายของสภาพแวดล้อมนี้ ไม่ว่าจะด้วยเหตุผลใดก็ตาม มันได้ล่าถอยไปไกลตามรอยแยกและซอกมุมของสถานที่แห่งนี้ จนเซนเซอร์ของเราตรวจไม่พบสัญญาณของมันในระยะทำการอีกเลย\n\nหลังจากมันจากไป เราได้เก็บกู้วัตถุชิ้นหนึ่งที่มันทำตกไว้ในระหว่างหลบหนี มันคงจะหนักเกินกว่าจะแบกไปด้วย\n\nการทดลองสั้นๆ ของเราแสดงให้เห็นว่าไม่ว่าจะวางวัตถุนี้ไว้ที่ใด มันจะเริ่มแผ่ระยางค์กล้องจุลทรรศน์ขนาดเล็กออกมาทันทีเพื่อค้นหาพื้นที่ใหม่ในการตั้งถิ่นฐานและเจริญเติบโต เมื่อตรวจพบความชื้นเพียงเล็กน้อย ระยางค์เหล่านั้นจะรวมตัวกันและเติบโตอย่างรวดเร็ว\n\nที่น่าตกใจคือ พืชที่เกิดขึ้นมานั้นแสดงสัญญาณแห่งสติปัญญาที่เป็นเอกลักษณ์เฉพาะตัว แม้จะยังเป็นเพียงต้นอ่อนแรกเริ่มก็ตาม\n\nเราผู้ต้องสงสัยมันจะสามารถนำมาเลี้ยงเพื่อเป็นสินทรัพย์ที่มีค่าสำหรับจักรวรรดิของเราได้"
 astral_rift.1450.b.evopred: "สมบูรณ์แบบมาก ไม่ว่าเราจะเก็บตัวอย่างไปมากเท่าใด มันก็สามารถสร้างตัวทดแทนขึ้นมาใหม่ได้เสมอ"

 astral_rift.1455.name: "การศึกษาวิจัยอย่างต่อเนื่อง"
 astral_rift.1455.desc.common: "เราได้เฝ้าสังเกตการณ์สิ่งมีชีวิตดังกล่าวอย่างเงียบเชียบในขณะที่มันทำหน้าที่ของมันในสวนที่สันโดษแห่งนี้ ไม่แน่นอนว่าเราจะสามารถอยู่ที่นี่โดยไม่ถูกตรวจพบได้นานแค่ไหน"
 astral_rift.1455.desc: "$astral_rift.1455.desc.common$\n\nแต่ละส่วนของร่างกายของสิ่งมีชีวิตดังกล่าวมีหนวดหนึ่งคู่ หนวดเหล่านี้ช่วยให้มันตรวจพบและกำจัดศัตรูพืชออกจากขนขนาดเล็กของผลไม้ที่มันเพาะปลูก โครงสร้างทางกายวิภาคของสิ่งเหล่านี้ช่วยเพิ่มพูนความเข้าใจของเราเกี่ยวกับสิ่งที่สิ่งมีชีวิตทางชีวภาพสามารถทำได้"
 astral_rift.1455.a: "ดำเนินการศึกษาวิจัยต่อ"

 astral_rift.1456.name: "การศึกษาวิจัยอย่างต่อเนื่อง"
 astral_rift.1456.desc: "$astral_rift.1455.desc.common$\n\nเราสังเกตเห็นมวลอินทรีย์ที่คล้ายกับ "ผลไม้" ถูกโอบกอดไว้แน่นกับอกของสิ่งมีชีวิตดังกล่าว โดยยึดไว้ด้วยขาหน้าคู่มหึมาของมัน หลายครั้งที่เราสังเกตเห็นก้ามหนีบปากของมันขุดเข้าไปในวัตถุนี้และทาบกิ่งส่วนเล็กๆ ของมันลงบนพืชพรรณใกล้เคียง มันกำลังขยายพันธุ์พืชเหล่านี้ด้วยวิธีประดิษฐ์ สิ่งนี้อธิบายถึงการไม่มีแมลงช่วยผสมเกสรหรือวิธีการสืบพันธุ์ที่สามารถระบุได้"

 astral_rift.1457.name: "รากไม้อนันต์(รากอินฟินิตี้)"
 astral_rift.1457.desc: "$astral_rift.1455.desc.common$\n\nสิ่งมีชีวิตดังกล่าวได้ขุดโพรงขนาดเล็กและวางวัตถุที่มันถือไว้ข้างใน ในขณะที่มันวิ่งหนีไป ขาหลายร้อยข้างของมันก็กลบวัตถุนั้นไว้ใต้ผืนดินตื้นๆ\n\nหลังจากแน่ใจว่าสิ่งมีชีวิตดังกล่าวจะไม่กลับมาในเร็วๆ นี้ เราก็สามารถเก็บกู้มันกลับมาได้ทั้งหมด\n\nการทดลองสั้นๆ ของเราแสดงให้เห็นว่าไม่ว่าจะวางวัตถุนี้ไว้ที่ใด สสารจะเริ่มส่งระยางค์กล้องจุลทรรศน์ขนาดเล็กออกไปเพื่อค้นหาพื้นที่ใหม่ในการตั้งถิ่นฐานและเจริญเติบโต ทันทีที่ตรวจพบความชื้นเพียงเล็กน้อย ระยางค์เหล่านั้นจะรวมตัวกันและเติบโตอย่างรวดเร็ว\n\nที่น่าตกใจคือ พืชที่เกิดขึ้นมานั้นแสดงสัญญาณแห่งสติปัญญาที่เป็นเอกลักษณ์เฉพาะตัว แม้จะยังเป็นเพียงต้นอ่อนแรกเริ่มก็ตาม\n\nเราสงสัยว่ามันจะสามารถนำมาเลี้ยงเพื่อเป็นสินทรัพย์ที่มีค่าสำหรับจักรวรรดิของเราได้"

 astral_rift.1465.name: "เมล็ดพันธุ์ที่หว่านลงไป"
 astral_rift.1465.desc: "เมื่อหลายปีก่อน §Y[from.GetName]§! ได้ถูกกลายสภาพเป็นรากและใบพืชในระหว่างคณะเดินทางที่ล้มเหลวเข้าสู่รอยแยกแอสทรัล ที่เต็มไปด้วยพืชพรรณ วันนี้เพื่อนร่วมงานของพวกเขาได้ประกาศการค้นพบที่น่าอัศจรรย์ พวกเขาได้ฟื้นฟูจิตใจของ §Y[from.GetName]§! แล้ว!\n\nแม้ว่า [From.GetHeShe] จะไม่หลงเหลือเค้าโครงเดิมของ [From.GetHisHer] อีกต่อไป ทว่า [From.GetHeShe] ดูเหมือนจะยังมีคุณลักษณะที่คล้ายคลึงกัน ชีวิตใหม่ทั้งหมดกำลังรอคอย [From.GetHimHer] อยู่เบื้องหน้า"
 astral_rift.1465.tt: "§Y[from.GetName]§! ได้เดินทางกลับมาปฏิบัติหน้าที่ให้เราแล้ว!"

################
# Desert Ruins #
################
 astral_rift_desert_ruins: "ซากโบราณสถานแห่งทะเลทราย(ซากปรักหักพัง)"

 astral_rift.1500.name: "แผงควบคุมประหลาด"
 astral_rift.1500.desc: "สิ่งปลูกสร้างที่ถูกละทิ้งกระจัดกระจายอย่างไร้ระเบียบไปทั่วผืนทราย\n\nจากภายในสิ่งปลูกสร้างที่ใหญ่ที่สุด ซึ่งเป็นโดมขนาดมหึมา มีแสงสีเหลืองสลัวส่องออกมา ผนังโค้งภายในตั้งแต่พื้นจรดเพดานถูกปกคลุมไปด้วยอักษรโบราณที่ไม่รู้จัก\n\nที่ใจกลางของห้องโถงหลักมีแผงควบคุมที่มีปุ่มขนาดใหญ่สองปุ่ม ปุ่มหนึ่งเป็นสีน้ำเงินเข้ม อีกปุ่มหนึ่งเป็นสีเขียวสดใส เราอยู่ในขั้นตอนการถอดรหัสข้อความบนผนังเพื่อดูว่ามันมีข้อบ่งชี้ว่าแผงควบคุมนี้ใช้สำหรับอะไรหรือไม่"

 astral_rift.1505.name: "ติดกับดักแห่งห้วงเวลา"
 astral_rift.1505.desc: "เวลาผ่านไปเนิ่นนานเกินไปตั้งแต่เราได้ยินข่าวจาก [Leader.GetName] ครั้งล่าสุด ไม่มีประโยชน์ที่จะรอคอยการกลับมาของพวกเขาอีกต่อไป\n\nเราได้ดึงสายยึดเหนี่ยวกลับและดึงยานทรงกลม(เสียงพูด)ที่ว่างเปล่ากลับคืนสู่มิติของเรา"
 astral_rift.1505.a: "โอกาสเกิดเรื่องเช่นนี้เป็นเท่าไหร่กันนะ?"

 astral_rift.1510.name: "ซากโบราณสถานรอบนอก"
 astral_rift.1510.desc.common: "...พื้นผิวภายในโดมส่องสว่างด้วยแสงสีเหลืองสลัว อักษรโบราณที่ไม่รู้จักปกคลุมผนังตั้งแต่บนลงล่าง\n\nที่ใจกลางของห้องโถงหลักมีแผงควบคุมที่มีปุ่มขนาดใหญ่สองปุ่ม ปุ่มหนึ่งเป็นสีน้ำเงินเข้ม อีกปุ่มหนึ่งเป็นสีเขียวสดใส เราอยู่ในขั้นตอนการถอดรหัสข้อความบนผนังเพื่อดูว่ามันมีข้อบ่งชี้ว่าแผงควบคุมนี้ใช้สำหรับอะไรหรือไม่"
 astral_rift.1510.desc.default: "$astral_rift.1510.desc.common$"
 astral_rift.1510.desc.psionic_or_latent: "$astral_rift.1510.desc.common$\n\n[Leader.GetName] รายงานถึงความไม่สบายใจตั้งแต่ก้าวเข้าไปในโดม มีบางอย่างผิดปกติที่นี่"
 astral_rift.1510.desc.psionic_or_latent_robot: "$astral_rift.1510.desc.common$\n\n[Leader.GetName] รายงานถึงความผิดปกติของเซนเซอร์ตั้งแต่เข้าไปในโดม แนะนำให้ใช้ความระมัดระวัง"
 astral_rift.1510.b.default: "มันเกิดอะไรขึ้นบน [Explorer.GetHomeWorldName] กันแน่? พวกเขาไม่ได้สูญหายไปแล้วหรือ?"
 astral_rift.1510.b.hive: "สิ่งนี้ขัดกับหลักตรรกะ พวกเขาไม่ได้สูญหายไปจากเราแล้วหรือ?"
 astral_rift.1510.b.robot: "ประมวลผลไม่ได้ พวกเขาสูญหายไปแล้ว อย่างไรก็ตาม รับทราบข้อมูลแล้ว"

 astral_rift.1515.name: "การขาดการติดต่อ"
 astral_rift.1515.desc.default: "เราเสียใจที่ต้องรายงานว่าเราสูญเสียการติดต่อกับทีมปฏิบัติการภายนอกแล้ว\n\nรายงานล่าสุดที่ได้รับคือบันทึกเสียงกรีดร้องที่ฟังไม่ได้ศัพท์ ตามมาด้วยความเงียบงันที่ไม่มีการขัดจังหวะ\n\nความพยายามที่จะกู้คืนการสื่อสารกลับคืนมาไม่ประสบความสำเร็จ\n\nเรายังไม่ได้ดึงตัวสายยึดเหนี่ยวฉุกเฉินกลับด้วยความหวังว่าทีมงานอาจจะเดินทางกลับมา ทว่าสถานการณ์ดูมืดมนอย่างยิ่ง"
 astral_rift.1515.desc.gestalt: "เราสูญเสียการติดต่อกับ [explorer.GetIndividualNamePlural] ของเราอย่างกะทันหัน เรายังไม่ได้ดึงสายยึดเหนี่ยวฉุกเฉินกลับด้วยความหวังว่าการขาดการติดต่อนนี้เป็นเพียงเรื่องชั่วคราว การไม่มีวิธีเข้าไปในรอยแยกมิตินั้นคิอทั้งหมดที่เราสามารถทำได้ในตอนนี้"
 astral_rift.1515.a: "ขอให้สิ่งที่ดีที่สุดเกิดขึ้น"

 astral_rift.1520.name: "ทางเลือก"
 astral_rift.1520.desc.default: "เราได้ประสานข้อมูลกับทีมวิทยาศาสตร์ที่กำลังสับสนอย่างหนักของเราแล้ว\n\nพวกเขาไม่มีความทรงจำเกี่ยวกับการส่งรายงานสองครั้ง หรือเหตุภัยพิบัติใดๆ เลย ประทับเวลาของรายงานที่ซ้ำกันนั้นตรงกันทุกประการ จะต้องมีความแปรปรวนในกระแสเวลาของที่นี่อย่างแน่นอน\n\nนักวิทยาศาสตร์ของเราติดอยู่ข้างใน โดมปิดผนึกสนิท และการเข้าถึงยาน §Y$tech_rift_sphere$§! ถูกจำกัดไว้เพียงการติดต่อทางวิทยุเท่านั้น\n\nการคำนวณเวลาระหว่างรายงานนี้กับรายงานก่อนหน้า ทีมปฏิบัติการภายนอกมีเวลาสัมพัทธ์ 3 ชั่วโมงก่อนที่เสียงกรีดร้องจะดังขึ้นซ้ำอีกครั้ง การแปลอักษรบนผนังภายในกรอบเวลานี้ไม่สามารถทำได้จริง ทางเลือกเดียวคือให้ทีมวิทยาศาสตร์กดปุ่มใดปุ่มหนึ่งบนแผงควบคุมและหวังว่ามันจะช่วยให้อะไรดีขึ้น\n\nไม่มีสิ่งบ่งชี้ถึงหน้าที่การทำงานของทั้งปุ่มสี§Bน้ำเงิน§! หรือปุ่มสี§Gเขียว§! เลย\n\nเราคงต้องฝากไว้กับโชคชะตา"
 astral_rift.1520.desc.gestalt: "เราได้ประสานข้อมูลใหม่กับ [explorer.GetIndividualNamePlural] ที่สูญหายของเราแล้ว\n\nมีความคลาดเคลื่อนเกิดขึ้น: พวกเขาไม่มีความทรงจำใดๆ เกี่ยวกับการส่งรายงานสองครั้ง และจำเหตุการณ์ที่ทำให้พวกเขาขาดการติดต่ออย่างกะทันหันไม่ได้เลย\n\nการคำนวณประทับเวลาระหว่างรายงานนี้กับรายงานก่อนหน้า [explorer.GetIndividualNamePlural] ของเรามีเวลาสัมพัทธ์ 3 ชั่วโมงก่อนที่การขาดการติดต่อจะเกิดขึ้นซ้ำอีกครั้ง การแปลอักษรบนผนังภายในกรอบเวลานี้ไม่สามารถทำได้จริง แม้จะไม่มีสิ่งบ่งชี้ถึงหน้าที่การทำงานของปุ่มสี§Bน้ำเงิน§! หรือปุ่มสี§Gเขียว§! เลยก็ตาม ทางเลือกเดียวคือต้องเลือกปุ่มใดปุ่มหนึ่งด้วยความหวังว่ามันจะช่วยให้อะไรดีขึ้น"
 astral_rift.1520.a: "กดปุ่มสี§Bน้ำเงิน§!"
 astral_rift.1520.b: "กดปุ่มสี§Gเขียว§!"

 astral_rift.1525.name: "ปุ่มสีน้ำเงิน"
 astral_rift.1525.desc.common: "ทีมวิทยาศาสตร์ของเราเดินทางกลับมาและเราได้กู้คืนการสื่อสารกลับคืนมาสำเร็จแล้ว ตามเวลาท้องถิ่นของพวกเขา มีเวลาเหลืออีก 2 ชั่วโมงในการช่วยเหลือพวกเขา\n\nจากการทดลองกดปุ่มสี§Gเขียว§!ในครั้งก่อนหน้า สิ่งเดียวที่เหลืออยู่คือการลองกดปุ่มสี§Bน้ำเงิน§!"
 astral_rift.1525.desc.default: "$astral_rift.1525.desc.common$"
 astral_rift.1525.desc.psionic_or_latent: "$astral_rift.1525.desc.common$\n\nก่อนที่เราจะออกคำสั่งนี้ [Leader.GetName] บอกกับเราว่า [Leader.GetHeShe] ถูกครอบงำด้วยความรู้สึกหวาดกลัวอย่างรุนแรงเมื่อ [Leader.GetHeShe] เหลือบมองไปยังปุ่มสี§Gเขียว§! [Leader.GetHeSheCap] แนะนำอย่างยิ่งให้ลองกดปุ่มสี§Bน้ำเงิน§!"
 astral_rift.1525.desc.psionic_or_latent_robot: "$astral_rift.1525.desc.common$\n\nระบบประมวลผลพลังจิตของ [Leader.GetName] คำนวณแล้วว่าวิธีที่ดีที่สุดคือการกดปุ่มสี§Bน้ำเงิน§!"
 astral_rift.1525.a: "$astral_rift.1520.a$"

 astral_rift.1530.name: "ห้องโถงที่สอง"
 astral_rift.1530.desc: "ทีมวิทยาศาสตร์ของเรารายงานว่าเมื่อพวกเขากดปุ่มสี§Bน้ำเงิน§! ห้องโถงก็สั่นสะเทือนด้วยเสียงครูดบดขนาดใหญ่ ประตูที่ซ่อนอยู่เปิดออก เผยให้เห็นห้องโถงที่สอง\n\nผนังของห้องโถงนั้นเรืองแสงสีม่วงสลัว ส่องสว่างรูปสัญลักษณ์ (Pictogram) จำนวนมากที่ปกคลุมทุกพื้นผิวที่มองเห็นได้\n\nมีแผงควบคุมชุดที่สอง เช่นเดียวกับชุดก่อนหน้านี้ มันมีปุ่มสองปุ่มอย่างพอดิบพอดี ครั้งนี้ปุ่มหนึ่งสลักรูปสามเหลี่ยมหน้าจั่ว และอีกปุ่มหนึ่งสลักรูปห้าเหลี่ยมปกติ\n\nได้เวลาเลือกทางเลือกอีกครั้งแล้ว"
 astral_rift.1530.a: "กดปุ่มรูปสามเหลี่ยม"
 astral_rift.1530.b: "กดปุ่มรูปห้าเหลี่ยม"

 astral_rift.1535.name: "ปุ่มที่ผิด"
 astral_rift.1535.desc.common: "มันจะต้องเป็นปุ่มที่ผิดอย่างแน่นอน\n\nอย่างไรก็ตาม มีความเป็นไปได้ว่าเวลาอาจวนลูปอีกครั้ง ทำให้ทีมปฏิบัติการภายนอกสามารถเลือกทางเลือกที่แตกต่างออกไปได้"
 astral_rift.1535.desc.default: "เราสูญเสียการติดต่อกับทีมปฏิบัติการภายนอกอีกครั้ง เสียงบันทึกสุดท้ายของพวกเขาคือเสียงกรีดร้องเพิ่มเติมและเสียงปะทุของเปลวไฟ\n\n$astral_rift.1535.desc.common$"
 astral_rift.1535.desc.gestalt: "[explorer.GetIndividualNamePlural] ของเราถูกเผาเป็นจุณ\n\n$astral_rift.1535.desc.common$"
 astral_rift.1535.a: "ปุ่มสี§Gเขียว§!คือทางเลือกที่ผิด..."

 astral_rift.1540.name: "ห้องโถงที่สอง"
 astral_rift.1540.desc.common: "ทีมวิทยาศาสตร์ของเราเดินทางกลับมาและเราได้กู้คืนการสื่อสารกลับคืนมาสำเร็จแล้ว ตามเวลาท้องถิ่นของพวกเขา มีเวลาเหลืออีก [This.freeze_time_left_1540] ชั่วโมงในการช่วยเหลือพวกเขา\n\nจากการนำบทเรียนที่ได้รับจากการวนลูปครั้งก่อนๆ มาปรับใช้ ทีมวิทยาศาสตร์สามารถผ่านห้องโถงแรกเข้าสู่ห้องโถงที่สองได้อย่างปลอดภัย บัดนี้พวกเขาพร้อมที่จะเลือกทางเลือกที่แตกต่างออกไปแล้ว"
 astral_rift.1540.desc.default: "$astral_rift.1540.desc.common$"
 astral_rift.1540.desc.psionic_or_latent: "[Leader.GetName] กล่าวว่าเราควรจะรู้ตัวให้ลองกดปุ่มรูปห้าเหลี่ยมตั้งแต่แรก สามเหลี่ยมเป็นลางร้ายมาโดยตลอด"
 astral_rift.1540.desc.psionic_or_latent_robot: "ระบบประมวลผลพลังจิตของ [Leader.GetName] ระบุว่าวิธีดำเนินการที่ดีที่สุดเมื่อเผชิญกับทางเลือกดังกล่าวคือปุ่มรูปห้าเหลี่ยมมาโดยตลอด ปุ่มรูปสามเหลี่ยมเป็นลวดลายที่น่าสนใจน้อยกว่าเมื่อเปรียบเทียบกัน"
 astral_rift.1540.b: "$astral_rift.1530.b$"

 astral_rift.1545.name: "ปุ่มที่ผิด"
 astral_rift.1545.desc.default: "ปุ่มที่ผิด\n\nทีมงานแทบไม่มีเวลาส่งรายงานสั้นๆ ก่อนการติดต่อจะถูกตัดขาด การกดปุ่มรูปสามเหลี่ยมทำให้ห้องโถงเต็มไปด้วยก๊าซที่มีฤทธิ์กัดกร่อน\n\nหากพวกเขาเดินทางย้อนเวลากลับไปสู่อดีตอีกครั้ง เราจะมีโอกาสได้ลองกดอีกปุ่มหนึ่ง"
 astral_rift.1545.desc.gestalt: "การเลือกรูปสามเหลี่ยมทำให้ห้องโถงเต็มไปด้วยก๊าซที่มีฤทธิ์กัดกร่อนซึ่งย่อยสลาย [explorer.GetIndividualNamePlural] ของเราอย่างรวดเร็ว\n\nหากพวกเขาเดินทางย้อนเวลากลับไปสู่อดีตอีกครั้ง เราจะมีโอกาสได้ลองกดอีกปุ่มหนึ่ง"
 astral_rift.1545.desc.toxoid: "การเลือกรูปสามเหลี่ยมทำให้ห้องโถงเต็มไปด้วยก๊าซที่มีฤทธิ์กัดกร่อน แม้ว่าอุปกรณ์ส่วนใหญ่ของเราจะได้รับความเสียหาย แต่ความแข็งแกร่งของสรีรวิทยาร่างกายของทีมวิทยาศาสตร์ช่วยให้พวกเขารอดชีวิตมาได้โดยไม่ได้รับอันตราย หลังจากยืนยันความปลอดภัยแล้ว พวกเขาได้ส่งข้อความแจ้งว่าพวกเขาจะลองกดปุ่มรูปห้าเหลี่ยมและจะรายงานกลับมา"
 astral_rift.1545.desc.toxoid_gestalt: "การเลือกรูปสามเหลี่ยมทำให้ห้องโถงเต็มไปด้วยก๊าซที่มีฤทธิ์กัดกร่อน แม้ว่าอุปกรณ์ส่วนใหญ่ของเราจะได้รับความเสียหาย แต่ความแข็งแกร่งของสรีรวิทยาร่างกายของ [explorer.GetScientistPlural] ช่วยให้พวกเขารอดชีวิตมาได้โดยไม่ได้รับอันตราย เมื่อก๊าซจางลงแล้ว พวกเขาจะลองกดอีกปุ่มหนึ่ง"
 astral_rift.1545.b: "โชคดีมาก"

 astral_rift.1550.name: "ห้องโถงที่สาม"
 astral_rift.1550.desc: "การกดปุ่มรูปห้าเหลี่ยมทำให้พื้นห้องโถงแยกออก เผยให้เห็นบันไดเวียนที่ทอดดิ่งลงลึกไปใต้ดิน\n\nที่ด้านล่างคือห้องโถงที่สาม ผนังห้องนั้นว่างเปล่าโดยสิ้นเชิงและสว่างด้วยแสงเรืองรองสีฟ้าอ่อน เช่นเดียวกับครั้งก่อน ห้องนี้ถูกครอบงำด้วยแผงควบคุมเดี่ยวที่มีปุ่มสองปุ่ม ปุ่มหนึ่งแสดงจุดสี่จุด ในขณะที่อีกปุ่มหนึ่งแสดงหกจุด\n\nได้เวลาเลือกทางเลือกอีกครั้งแล้ว"
 astral_rift.1550.a: "กดปุ่มที่มีจุดสี่จุด"
 astral_rift.1550.b: "กดปุ่มที่มีจุดหกจุด"

 astral_rift.1555.name: "ห้องโถงที่สาม"
 astral_rift.1555.desc.time_singular: "ทีมวิทยาศาสตร์ของเราเดินทางกลับมาและเราได้กู้คืนการสื่อสารกลับคืนมาสำเร็จแล้ว ตามเวลาท้องถิ่นของพวกเขา มีเวลาเหลืออีกหนึ่งชั่วโมงในการช่วยเหลือพวกเขา"
 astral_rift.1555.desc.time_plural: "ทีมวิทยาศาสตร์ของเราเดินทางกลับมาและเราได้กู้คืนการสื่อสารกลับคืนมาสำเร็จแล้ว ตามเวลาท้องถิ่นของพวกเขา มีเวลาเหลืออีก [This.freeze_time_left_1555] ชั่วโมงในการช่วยเหลือพวกเขา"
 astral_rift.1555.desc.default: "...จากการปฏิบัติตามทิศทางของการวนลูปครั้งก่อนๆ เราสามารถผ่านห้องโถงแรกและห้องโถงที่สองได้โดยไม่มีปัญหา หวังว่าปุ่มที่มีจุดหกจุดจะมีความเป็นอันตรายน้อยกว่าปุ่มที่มีจุดสี่จุด"
 astral_rift.1555.desc.robot: "...จากการปฏิบัติตามทิศทางของการวนลูปครั้งก่อนๆ เราสามารถผ่านห้องโถงแรกและห้องโถงที่สองได้โดยไม่มีปัญหา จากข้อมูลการพยากรณ์คาดการณ์ ปุ่มที่มีจุดหกจุดอาจมีสถิติอันตรายน้อยกว่าปุ่มที่มีจุดสี่จุด"
 astral_rift.1555.desc.psionic_or_latent: "[Leader.GetName] ได้นำทีมเดินกลับผ่านห้องโถงแรกและห้องโถงที่สองอย่างมั่นใจ พวกเขาเลือกปุ่มที่ถูกต้องได้เองโดยไม่จำเป็นต้องใช้คำสั่งจากเรา"
 astral_rift.1555.desc.psionic_or_latent_robot: "[Leader.GetName] ได้นำทีมเดินกลับผ่านห้องโถงแรกและห้องโถงที่สองอย่างมีประสิทธิภาพ ระบบประมวลผลพลังจิตของพวกเขานำทางพวกเขาไปสู่ผลลัพธ์ที่ถูกต้องได้โดยอิสระปราศจากคำสั่งของเรา"
 astral_rift.1555.desc.default_end: "เมื่อเข้าสู่ห้องโถงที่สาม พวกเขาขยับเพื่อกดปุ่มที่มีจุดหกจุด หวังว่าความมั่นใจของพวกเขาจะถูกต้อง"
 astral_rift.1555.desc.robot_end: "เมื่อเข้าสู่ห้องโถงที่สาม พวกเขาเคลื่อนเข้าไปกดปุ่มที่มีจุดหกจุด"
 astral_rift.1555.desc.default_singular: "$astral_rift.1555.desc.time_singular$\n\n$astral_rift.1555.desc.default$\n\n$astral_rift.1555.desc.default_end$"
 astral_rift.1555.desc.default_plural: "$astral_rift.1555.desc.time_plural$\n\n$astral_rift.1555.desc.default$\n\n$astral_rift.1555.desc.default_end$"
 astral_rift.1555.desc.robot_singular: "$astral_rift.1555.desc.time_singular$\n\n$astral_rift.1555.desc.robot$\n\n$astral_rift.1555.desc.robot_end$"
 astral_rift.1555.desc.robot_plural: "$astral_rift.1555.desc.time_plural$\n\n$astral_rift.1555.desc.robot$\n\n$astral_rift.1555.desc.robot_end$"
 astral_rift.1555.desc.psionic_or_latent_singular: "$astral_rift.1555.desc.time_singular$\n\n$astral_rift.1555.desc.psionic_or_latent$\n\n$astral_rift.1555.desc.default_end$"
 astral_rift.1555.desc.psionic_or_latent_plural: "$astral_rift.1555.desc.time_plural$\n\n$astral_rift.1555.desc.psionic_or_latent$\n\n$astral_rift.1555.desc.default_end$"
 astral_rift.1555.desc.psionic_or_latent_robot_singular: "$astral_rift.1555.desc.time_singular$\n\n$astral_rift.1555.desc.psionic_or_latent_robot$\n\n$astral_rift.1555.desc.robot_end$"
 astral_rift.1555.desc.psionic_or_latent_robot_plural: "$astral_rift.1555.desc.time_plural$\n\n$astral_rift.1555.desc.psionic_or_latent_robot$\n\n$astral_rift.1555.desc.robot_end$"
 astral_rift.1555.b: "$astral_rift.1550.b$"

 astral_rift.1560.name: "น้ำท่วมทะลัก"
 astral_rift.1560.desc.default: "ปุ่มที่ผิด\n\nบันทึกเสียงคำพูดสุดท้ายของ [Leader.GetName] ระบุว่าปุ่มที่มีจุดสี่จุดทำให้ห้องโถงเต็มไปด้วยน้ำที่ท่วมทะลักเข้ามาอย่างรุนแรง\n\nหากพวกเขาเดินทางย้อนเวลากลับไปสู่อดีตอีกครั้ง เราจะมีโอกาสได้ลองกดอีกปุ่มหนึ่ง"
 astral_rift.1560.desc.gestalt: "ปุ่มที่ผิด\n\nปุ่มที่มีจุดสี่จุดทำให้ห้องโถงเต็มไปด้วยน้ำที่ท่วมทะลักเข้ามาอย่างรุนแรง [explorer.GetIndividualNamePlural] ของเราไม่มีชีวิตอยู่อีกต่อไปแล้ว\n\nหากพวกเขาเดินทางย้อนเวลากลับไปสู่อดีตอีกครั้ง เราจะมีโอกาสได้ลองกดอีกปุ่มหนึ่ง"
 astral_rift.1560.desc.aquatic: "การกดปุ่มที่มีจุดสี่จุดทำให้ห้องโถงเต็มไปด้วยน้ำปริมาณมหาศาล โชคดีที่ด้วยสรีรวิทยาทางธรรมชาติของสิ่งมีชีวิตในน้ำของ [Leader.GetName] สิ่งนี้แทบไม่ได้สร้างความยุ่งยากใดๆ เลย พวกเขาตั้งใจที่จะกดอีกปุ่มหนึ่งทันทีที่น้ำได้รับการระบายออกจนหมดสิ้น"
 astral_rift.1560.desc.aquatic_gestalt: "$astral_rift.1560.desc.aquatic$"
 astral_rift.1560.b: "$astral_rift.1545.b$"

 astral_rift.1565.name: "ผลึกคริสตัลแห่งกาลเวลา(ไทม์คริสตัล)"
 astral_rift.1565.desc.common: "แท่นบูชาที่มีผลึกคริสตัลขนาดยักษ์ผุดขึ้นมาจากพื้นดิน ประตูทั้งหมดในหมู่อาคารเปิดออกแล้ว\n\nเครื่องวัดเวลาหมุนวนแกว่งไปมาอย่างรุนแรงระหว่างค่าสุดขั้วเมื่ออยู่ใกล้ชิดกับผลึกคริสตัลนี้ นี่จะต้องเป็นแหล่งกำเนิดของการวนลูปของเวลาอย่างแน่นอน และเป็นส่วนสำคัญของวัตถุประสงค์ของสิ่งปลูกสร้างนี้"
 astral_rift.1565.desc.default: "$astral_rift.1565.desc.common$\n\nทางเลือกภายในห้องโถงที่ท้าทายเหล่านี้ดูเหมือนจะเป็นเรื่องสุ่มและไร้เกณฑ์อย่างสิ้นเชิง บางทีพวกเขาอาจตั้งใจทดสอบความสามารถในการส่งต่อข้อมูลระหว่างการวนลูปเวลาหรือไม่?\n\nไม่ว่าจะอย่างไร การรอดชีวิตออกมาช่วยให้เราสามารถนำผลึกคริสตัลนี้กลับไปด้วย ความสามารถของมันในการส่งผลต่อกระแสเวลาอาจมีประโยชน์อย่างมหาศาล"
 astral_rift.1565.desc.latent_psionic: "$astral_rift.1555.desc.common$\n\nประสบการณ์นี้ได้เปลี่ยนแปลง [Leader.GetName] ดูเหมือนว่าประสบการณ์ของ [Leader.GetHisHer] ในระหว่างการวนลูปเวลาได้ช่วยปลุกศักยภาพพลังจิตที่ซ่อนเร้น(เสียงเบา)ของ [Leader.GetHisHer] ขึ้นมา!\n\nบางทีนี่อาจเป็นวัตถุประสงค์สุดท้ายของซากปรักหักพังแห่งนี้ ซึ่งก็คือชุดทางเลือกตามอำเภอใจที่สามารถนำทางผ่านได้ด้วยพลังที่ก้าวข้ามกาลเวลาเท่านั้น เช่น สัญชาตญาณพลังจิต\n\nไม่ว่าจะอย่างไร ตอนนี้เราสามารถเดินทางกลับพร้อมกับผลึกคริสตัลได้อย่างปลอดภัย ความสามารถของมันในการส่งผลต่อกระแสเวลาอาจมีประโยชน์อย่างมหาศาล"
 astral_rift.1565.desc.latent_psionic_robot: "$astral_rift.1555.desc.common$\n\nการเผชิญกับการวนลูปเวลาเหล่านี้ได้ช่วยปลุกหน่วยประมวลผลพลังจิตที่สงบนิ่งภายในตัว [Leader.GetName] ขึ้นมา สภาพแวดล้อมดังกล่าวเป็นเสมือนสนามทดสอบที่สมบูรณ์แบบในการทำให้พลังเหล่านี้เริ่มทำงานออนไลน์ได้สำเร็จ\n\nมันยังไม่แน่ชัดว่านี่คือวัตถุประสงค์ดั้งเดิมของซากปรักหักพังเหล่านี้หรือไม่ อย่างไรก็ตาม ตอนนี้เราสามารถเดินทางกลับพร้อมกับผลึกคริสตัลได้อย่างปลอดภัยเพื่อนำไปวิเคราะห์ลำดับเวลากาลต่อไป"
 astral_rift.1565.desc.psionic: "$astral_rift.1565.desc.common$\n\nตลอดระยะเวลาการวนลูปเหล่านี้ สัญชาตญาณของ [Leader.GetName] ช่วยนำทางให้ [Leader.GetHimHer] เลือกทางเลือกที่ถูกต้อง\n\nบางทีนี่อาจเป็นจุดสำคัญของห้องโถงเหล่านี้ ซึ่งเป็นชุดทางเลือกตามอำเภอใจที่ออกแบบมาเพื่อเปิดเผยศักยภาพพลังจิต\n\nไม่ว่าจะอย่างไร ตอนนี้เราสามารถเดินทางกลับพร้อมกับผลึกคริสตัลได้อย่างปลอดภัย ความสามารถของมันในการส่งผลต่อกระแสเวลาอาจมีประโยชน์อย่างมหาศาล"
 astral_rift.1565.desc.psionic_robot: "$astral_rift.1565.desc.common$\n\nตลอดระยะเวลาการวนลูปเหล่านี้ ระบบประมวลผลพลังจิตของ [Leader.GetName] ช่วยนำทางให้พวกเขาบรรลุผลลัพธ์ที่ดีที่สุด\n\nบางทีนี่อาจเป็นจุดสำคัญของห้องโถงเหล่านี้ ซึ่งเป็นชุดทางเลือกตามอำเภอใจที่ออกแบบมาเพื่อเปิดเผยศักยภาพพลังจิต\n\nอย่างไรก็ตาม ตอนนี้เราสามารถเดินทางกลับพร้อมกับผลึกคริสตัลได้อย่างปลอดภัยเพื่อนำไปวิเคราะห์ลำดับเวลากาลต่อไป"
 astral_rift.1565.a: "แหม มันช่างง่ายดายจริงๆ"

