 astral_rift.1600.name: "ผ่านกระจกเงา(ผ่านกระจก)"
 astral_rift.1600.desc.1: "ในอีกฟากหนึ่งของรอยแยกมิติเราค้นพบโครงสร้างที่คล้ายคลึงกับสถานีดาวฤกษ์ (ฐานดวงดาว) ของเราเอง ทันทีที่ยาน §Y$tech_rift_sphere$§! ของเราเคลื่อนเข้าไปใกล้ เราได้รับการติดต่อสัญญานเรียกหาในหลายภาษาและหลายย่านความถี่ น่าแปลกใจอย่างยิ่งที่หนึ่งในภาษาเหล่านั้นคือภาษาของเราเอง\n\nเจ้าบ้านของเราต่างก็ตกใจเช่นเดียวกับเราที่ได้พบกับเอเลี่ยนต่างดาวที่พูดจาด้วยภาษาของพวกเขาเอง แต่หลังจากแลกเปลี่ยนความสุภาพทักทายกันสั้นๆ เราก็ได้เรียนรู้ว่าภูมิภาคอวกาศนี้เป็นบ้านเกิดของอารยธรรมผู้บุกเบิกอวกาศที่มีความคล้ายคลึงกับเราเป็นอย่างมาก พวกเขาเรียกมันว่า [mirrored_empire.GetName]"
 astral_rift.1600.desc.2: "ผู้คนเหล่านี้เป็นการผสมผสานที่น่ากระวนกระวายใจระหว่างสิ่งที่คุ้นเคยและสิ่งแปลกประหลาด มันอาจจะมีความเป็นไปได้ที่จะร่วมงานกับพวกเขา แต่เราสามารถไว้วางใจผู้เลียนแบบเงาเหล่านี้(หัวเราะเบาๆ)ได้จริงหรือ?"
 astral_rift.1600.desc.authoritarian: "พวกเขามีอุดมคติร่วมกับเราในหลายด้าน ทว่าในขณะที่เราตระหนักดีว่าผลประโยชน์และสุขภาวะของสังคมโดยรวมนั้นมีความสำคัญมากกว่าความต้องการของปัจเจกบุคคล พวกเขากลับปล่อยให้ชนกลุ่มผู้เห็นแก่ประโยชน์ส่วนตนดำเนินไปตามวิถีความระส่ำระสาย\n\n$astral_rift.1600.desc.2$"
 astral_rift.1600.desc.egalitarian: "พวกเขามีอุดมคติร่วมกับเราในหลายด้าน ทว่าในขณะที่เรารู้ดีว่าความทัดเทียมในทางสังคมคือแกนกลางแห่งความรุ่งเรืองของบ้านเมือง พวกเขากลับให้อำนาจรัฐเข้าจัดระเบียบวิถีชีวิตผู้คน\n\n$astral_rift.1600.desc.2$"
 astral_rift.1600.desc.materialist: "พวกเขามีอุดมคติร่วมกับเราในหลายด้าน ทว่าในขณะที่เราลบล้างความเชื่อที่งมงายลงไปแล้ว พวกเขาก็ยังคงยึดติดในลัทธิศรัทธาที่ปราศจากเหตุผล\n\n$astral_rift.1600.desc.2$"
 astral_rift.1600.desc.spiritualist: "พวกเขามีอุดมคติร่วมกับเราในหลายด้าน ทว่าในขณะที่เราสามารถมองทะลุกฎเกณฑ์แห่งโลกวัตถุนี้ไปแล้ว พวกเขายังคงจมดิ่งอยู่ท่ามกลางสิ่งมายา\n\n$astral_rift.1600.desc.2$"
 astral_rift.1600.desc.militarist: "พวกเขามีอุดมคติร่วมกับเราในหลายด้าน ทว่าในขณะที่เราเล็งเห็นถึงคุณค่าในทางความกล้าหาญและความมีวินัย พวกเขากลับมองว่าจรรยาการสงครามคือเรื่องล้าสมัย\n\n$astral_rift.1600.desc.2$"
 astral_rift.1600.desc.pacifist: "พวกเขามีอุดมคติร่วมกับเราในหลายด้าน ทว่าในขณะที่เราลบล้างการก่อศึกสงครามไปแล้ว พวกเขายังคงฝักใฝ่กับกฎเกณฑ์การทำลายล้างของความเป็นใหญ่ทางการทหาร\n\n$astral_rift.1600.desc.2$"
 astral_rift.1600.desc.xenophile: "พวกเขามีอุดมคติร่วมกับเราในหลายด้าน ทว่าในขณะที่เรามุ่งหวังการประสานพันธมิตร พวกเขากลับปิดกั้นตนเองจากมวลอารยธรรมที่เหลือของดาราจักร\n\n$astral_rift.1600.desc.2$"
 astral_rift.1600.desc.xenophobe: "พวกเขามีอุดมคติร่วมกับเราในหลายด้าน ทว่าในขณะที่เราชูผลประโยชน์ผู้คนของเราเป็นหลัก พวกเขากลับต้อนรับสังคมต่างดาวด้วยความไร้เดียงสาอย่างน่าฉงน\n\n$astral_rift.1600.desc.2$"
 astral_rift.1600.desc.gestalt: "ทันทีที่ยาน §Y$tech_rift_sphere$§! ของเรามาถึงสถานีดาวฤกษ์ เราได้รับการติดต่อในหลายภาษาและหลายย่านความถี่\n\nเจ้าของสถานีสามารถถอดรหัสแปลภาษาของเราได้อย่างรวดเร็วอย่างน่าทึ่ง และต้อนรับเราเข้าสู่การแลกเปลี่ยนข้อมูล\n\nตั้งแต่นั้นมาเราค้นพบว่าภูมิภาคอวกาศนี้เป็นบ้านของอารยธรรมที่ประกอบด้วยประชากรเผ่าพันธุ์ [mirrored_empire.GetSpeciesNamePlural] เป็นหลัก ซึ่งเรียกตัวเองว่า [mirrored_empire.GetName]"
 astral_rift.1600.a: "ศึกษาประชากรของพวกเขา"
 astral_rift.1600.b: "ศึกษากองยานของพวกเขา"

 astral_rift.1605.name: "บทเรียนประวัติศาสตร์"
 astral_rift.1605.desc.1: "เราใช้เวลาในเดือนที่ผ่านมาทำการแลกเปลี่ยนวัฒนธรรมกับ [mirrored_empire.GetName]\nสังคมของพวกเขาสะท้อนอารยธรรมของเราเองจนกระทั่งช่วงสั้นๆ ก่อนจะมีการค้นพบเทคโนโลยีความเร็วเหนือแสง(FTL)เมื่อพวกเขาเผชิญหน้ากับยานต่างดาวที่ไม่รู้จักซึ่งมีพลังอำนาจมหาศาลเกินจินตนาการ ยานลำนั้นได้เดินทางจากไปโดยไม่มีใครค้นพบวัตถุประสงค์ของมันเลย ทว่าการเยือนช่วงสั้นๆ นั้นสร้างความตื่นตระหนกแก่สังคมของพวกเขาจนถึงแกนรากฐาน"
 astral_rift.1605.desc.2: "มันชัดเจนสำหรับเราว่าพวกเขาทำการเลือกตัวเลือกที่ผิดพลาด ทว่ามันก่อให้เกิดคำถามที่น่าสนใจ สังคมของเราจะดำเนินไปในเส้นทางที่ผิดพลาดเช่นกันหรือไม่หากเกิดเหตุการณ์แบบเดียวกันกับเราตั้งแต่เนิ่นๆ เช่นนั้น?\n\nช่างโชคร้ายสำหรับพวกเขาที่เหตุการณ์นี้เกิดขึ้นในช่วงเวลาก่อนยุคความเร็วที่อ่อนไหวต่ออิทธิพลในประวัติศาสตร์ของพวกเขา การเปลี่ยนจริยธรรมรากฐานของพวกเขาทำให้ความก้าวหน้าของจักรวรรดิช้าลงอย่างไม่ต้องสงสัย"
 astral_rift.1605.desc.gestalt: "$astral_rift.1605.desc.1$\n\n$astral_rift.1605.desc.2$"
 astral_rift.1605.desc.authoritarian: "$astral_rift.1605.desc.1$ การได้เห็นความไร้หนทางของพวกเขาต่อผู้เยือนที่มีเทคโนโลยีขั้นสูงเหล่านี้นำไปสู่การเปลี่ยนแปลงครั้งใหญ่ในอุดมการณ์ของพวกเขาและการเปลี่ยนผ่านไปสู่อุดมการณ์ความเสมอภาค(การแบ่งชนชั้น)\n\n$astral_rift.1605.desc.2$"
 astral_rift.1605.desc.egalitarian: "$astral_rift.1605.desc.1$ การได้เห็นความไร้หนทางของพวกเขาต่อยานลำนี้นำไปสู่การเปลี่ยนแปลงครั้งใหญ่ในอุดมการณ์ของพวกเขาและการเปลี่ยนผ่านไปสู่อุดมการณ์อำนาจนิยม(อํานาจการปกครอง)เนื่องจากพวกเขาพยายามเตรียมพร้อมสำหรับการเผชิญหน้าในอนาคต\n\n$astral_rift.1605.desc.2$"
 astral_rift.1605.desc.materialist: "$astral_rift.1605.desc.1$ การได้เห็นความไร้หนทางของพวกเขาต่อยานลำนี้นำไปสู่การเปลี่ยนแปลงครั้งใหญ่ในอุดมการณ์ของพวกเขาและการเปลี่ยนผ่านไปสู่อุดมการณ์จิตวิญญาณนิยม(วิญญาณ)\n\n$astral_rift.1605.desc.2$"
 astral_rift.1605.desc.spiritualist: "$astral_rift.1605.desc.1$ การได้เห็นความไร้หนทางของพวกเขาต่อยานลำนี้นำไปสู่การเปลี่ยนแปลงครั้งใหญ่ในอุดมการณ์ของพวกเขาและการเปลี่ยนผ่านไปสู่อุดมการณ์วัตถุนิยม(วัตถุ)\n\n$astral_rift.1605.desc.2$"
 astral_rift.1605.desc.militarist: "$astral_rift.1605.desc.1$ การได้เห็นความไร้หนทางของพวกเขาต่อยานลำนี้นำไปสู่การเปลี่ยนแปลงครั้งใหญ่ในอุดมการณ์ของพวกเขาและการเปลี่ยนผ่านไปสู่อุดมการณ์รักสงบ(อภิสิทธิ์)เนื่องจากพวกเขาแสวงหาแนวทางการแก้ไขอย่างสันติต่อการเผชิญหน้าในอนาคต\n\n$astral_rift.1605.desc.2$"
 astral_rift.1605.desc.pacifist: "$astral_rift.1605.desc.1$ การได้เห็นความไร้หนทางของพวกเขาต่อยานลำนี้นำไปสู่การเปลี่ยนแปลงครั้งใหญ่ในอุดมการณ์ของพวกเขาและการเปลี่ยนผ่านไปสู่อุดมการณ์ทหารนิยม(อภินิหาร)เนื่องจากพวกเขาพยายามเตรียมพร้อมสำหรับการเผชิญหน้าใดๆ ในอนาคต\n\n$astral_rift.1605.desc.2$"
 astral_rift.1605.desc.xenophile: "$astral_rift.1605.desc.1$ การได้เห็นความไร้หนทางของพวกเขาต่อยานลำนี้นำไปสู่การเปลี่ยนแปลงครั้งใหญ่ในอุดมการณ์ของพวกเขาและการเปลี่ยนผ่านไปสู่อุดมการณ์เกลียดกลัวคนนอก(เสียงตกใจ)เนื่องจากพวกเขาพยายามเตรียมพร้อมสำหรับการเผชิญหน้าใดๆ ในอนาคต\n\n$astral_rift.1605.desc.2$"
 astral_rift.1605.desc.xenophobe: "$astral_rift.1605.desc.1$ การได้เห็นความไร้หนทางของพวกเขาต่อยานลำนี้นำไปสู่การเปลี่ยนแปลงครั้งใหญ่ในอุดมการณ์ของพวกเขาและการเปลี่ยนผ่านไปสู่อุดมการณ์เป็นมิตรกับคนนอก(xenphilia)เนื่องจากพวกเขาแสวงหาแนวทางการแก้ไขอย่างสันติต่อการเผชิญหน้าในอนาคต\n\n$astral_rift.1605.desc.2$"
 astral_rift.1605.a: "ช่างเป็นเรื่องโชคร้ายสำหรับพวกเขาจริง ๆ"

 astral_rift.1610.name: "การศึกษากองยานของพวกเขา"
 astral_rift.1610.desc.common: "ในขณะที่ภายนอกเราแลกเปลี่ยนข้อมูลทางวัฒนธรรมกับ [mirrored_empire.GetName] ทว่าเบื้องหลังเราสืบหาข้อมูลแอบสำรวจความสามารถทางการทหารของพวกเขาอย่างเงียบๆ\n\nระบบคอมพิวเตอร์ของ [mirrored_empire.GetName] ใช้การเข้ารหัสที่ใกล้เคียงกับเรา ซึ่งทำให้การเข้าถึงฐานข้อมูลของพวกเขานั้นง่ายดายอย่างยิ่ง\n\nเทคโนโลยีทางการทหารของอารยธรรมนี้มีความใกล้เคียงกับเรา แต่ก็มีความแตกต่างกันมากพอที่แผนผังโครงสร้างของยานพาหนะของพวกเขาควรจะเป็นที่น่าสนใจแก่บรรดาวิศวกรของเรา"
 astral_rift.1610.desc.gestalt: "แม้ว่าเราจะมีความคล้ายคลึงกันหลายประการ ทว่าก็ยากที่จะไว้วางใจพวกเขา $astral_rift.1610.desc.common$"
 astral_rift.1610.desc.authoritarian: "แม้ว่าเราจะมีความคล้ายคลึงกันหลายประการ ทว่าก็ยากที่จะไว้วางใจผู้คนที่เปิดรับความเสมอภาคอย่างไร้เดียงสาเช่นนั้น $astral_rift.1610.desc.common$"
 astral_rift.1610.desc.egalitarian: "แม้ว่าเราจะมีความคล้ายคลึงกันหลายประการ ทว่าก็ยากที่จะไว้วางใจผู้คนที่โอบรับอุดมการณ์อำนาจนิยม $astral_rift.1610.desc.common$"
 astral_rift.1610.desc.materialist: "แม้ว่าเราจะมีความคล้ายคลึงกันหลายประการ ทว่าก็ยากที่จะไว้วางใจผู้คนที่โอบรับอุดมการณ์จิตวิญญาณนิยม $astral_rift.1610.desc.common$"
 astral_rift.1610.desc.spiritualist: "แม้ว่าเราจะมีความคล้ายคลึงกันหลายประการ ทว่าก็ยากที่จะไว้วางใจผู้คนที่โอบรับอุดมการณ์วัตถุนิยม $astral_rift.1610.desc.common$"
 astral_rift.1610.desc.militarist: "แม้ว่าเราจะมีความคล้ายคลึงกันหลายประการ ทว่าก็ยากที่จะไว้วางใจผู้คนที่รักสงบรักการปรองดอง $astral_rift.1610.desc.common$"
 astral_rift.1610.desc.pacifist: "แม้ว่าเราจะมีความคล้ายคลึงกันหลายประการ ทว่าก็ยากที่จะไว้วางใจผู้คนที่ฝักใฝ่ในกองทัพทหารนิยม $astral_rift.1610.desc.common$"
 astral_rift.1610.desc.xenophile: "แม้ว่าเราจะมีความคล้ายคลึงกันหลายประการ ทว่าก็ยากที่จะไว้วางใจผู้คนที่เกลียดกลัวและต่อต้านคนนอก $astral_rift.1610.desc.common$"
 astral_rift.1610.desc.xenophobe: "แม้ว่าเราจะมีความคล้ายคลึงกันหลายประการ ทว่าก็ยากที่จะไว้วางใจผู้คนที่เป็นมิตรและต้อนรับคนนอกอย่างเปิดเผย $astral_rift.1610.desc.common$"
 astral_rift.1610.a: "ยอดเยี่ยมมาก"

 astral_rift.1611.name: "จิตที่แตกสลาย(จิตใจมั่นคง)"
 astral_rift.1611.desc: "เราใช้เวลาในสัปดาห์ที่ผ่านมาทำการแลกเปลี่ยนวัฒนธรรมกับ [mirrored_empire.GetName]\n\nความสนใจของเราเปลี่ยนเป็นความตื่นตระหนกอย่างรวดเร็วเมื่อพบว่าสิ่งมีชีวิตเหล่านี้คือสิ่งที่หลงเหลืออยู่ของจิตสำนึกร่วม(สติ)ที่แตกสลาย ณ จุดใดจุดหนึ่งในการพัฒนาอารยธรรมของพวกเขา ความคิดร่วมของพวกเขาเริ่มถูกทำให้มีมลทินด้วยแนวคิดเรื่องปัจเจกบุคคล จากการจงใจแบ่งส่วนจิตใจของตนเองเมื่อเวลาผ่านไป ในที่สุดโดรนแต่ละตัวก็เริ่มไม่ได้ยินความคิดอื่นใดนอกจากความคิดของตนเอง"
 astral_rift.1615.name: "โอกาสทางการทูต"
 astral_rift.1615.desc.common: "ดูเหมือนว่าการรับรู้เกี่ยวกับการมีอยู่ของเราบนสถานีได้ส่งผ่านขึ้นไปยังสายงานบังคับบัญชาของพวกเขา ทูตของ [mirrored_empire.GetName] ได้รับมอบหมายให้มายังสถานีดาวฤกษ์เพื่อหารือเกี่ยวกับอนาคตของประชาชนของเรา"
 astral_rift.1615.desc.common.2: "เราปรารถนาที่จะตอบสนองอย่างไร?"
 astral_rift.1615.desc.xenophobe: "$astral_rift.1615.desc.common$\n\nแม้ว่าพวกเขาจะไม่ชอบเรา ทว่าพวกเขาก็เข้าใจเรา พวกเขาแย้งว่าข้อตกลงระหว่างประชาชนของเราจะก่อประโยชน์ให้แก่ทั้งสองฝ่าย\n\n$astral_rift.1615.desc.common.2$"
 astral_rift.1615.desc.common.gestalt: "$astral_rift.1615.desc.common$\n\nพวกเขาได้ให้ข้อโต้แย้งอย่างกระตือรือร้นว่าความคล้ายคลึงของเรานั้นมีน้ำหนักมากกว่าความแตกต่างมาก พวกเขาแย้งว่าข้อตกลงระหว่างประชาชนของเราจะก่อประโยชน์ให้แก่ทั้งสองฝ่าย"
 astral_rift.1615.desc.gestalt: "$astral_rift.1615.desc.common.gestalt$\n\nมันเป็นความจริงที่เราแบ่งปันมรดกทางวัฒนธรรมที่เป็นเอกลักษณ์เฉพาะตัวร่วมกัน $astral_rift.1615.desc.common.2$"
 astral_rift.1615.desc.common.default: "$astral_rift.1615.desc.common$\n\nพวกเขาได้ให้ข้อโต้แย้งอย่างกระตือรือร้นว่าพวกเราคือประชาชนกลุ่มเดียวกันในทุกด้านเว้นแต่ชื่อเรียก"
 astral_rift.1615.desc.default: "$astral_rift.1615.desc.common.default$ แน่นอนว่าในกาแล็กซีที่เต็มไปด้วยมหาอำนาจที่ไม่รู้จัก มิตรภาพระหว่างเราจะก่อให้เกิดประโยชน์แก่ทั้งสองฝ่าย\n\n$astral_rift.1615.desc.common.2$"
 astral_rift.1615.a: "ยินดีต้อนรับมิตรภาพระหว่างจักรวรรดิของเรา"
 astral_rift.1615.b: "ปฏิเสธข้อเสนอของพวกเขา"
 astral_rift.1615.c: "ยอมรับโอกาสนี้"
 astral_rift.1615.d: "สิ่งนี้ไม่ใช่เรื่องที่เราสนใจ"

 astral_rift.1616.name: "เพียงพอแล้ว"
 astral_rift.1616.desc.common: "เรื่องตลกขบขันไร้สาระนี้ดำเนินมานานเพียงพอแล้ว เราได้หยิบฉวยสิ่งที่เราสามารถนำไปจากพวกเขาได้และไม่มีความสนใจในการทูตข้ามมิติใดๆ อีกต่อไป"
 astral_rift.1616.desc.gestalt: "$astral_rift.1615.desc.common.gestalt$\n\n$astral_rift.1616.desc.common$"
 astral_rift.1616.desc.default: "$astral_rift.1615.desc.common.default$\n\n$astral_rift.1616.desc.common$"
 astral_rift.1616.a: "$astral_rift.1615.b$"

 astral_rift.1620.name: "มิตรภาพครั้งใหม่"
 astral_rift.1620.desc.common_1: "เราได้ให้การตอบรับในเชิงบวกแก่ทูตดังกล่าว\n\nกำลังดำเนินงานเพื่ออำนวยความสะดวกในช่องทางผ่านที่ถาวรยิ่งขึ้นระหว่างจักรวาลทั้งสองของเรา"
 astral_rift.1620.desc.common_2: "แม้ว่าจะยังไม่มีการตัดสินใจใดๆ ทว่าทูตระบุว่า [final_mirrored_empire.GetName] จะมีความสนใจในข้อตกลงทางการค้า"
 astral_rift.1620.desc.default: "$astral_rift.1620.desc.common_1$ $astral_rift.1620.desc.common_2$\n\nเราตั้งตารอที่จะทำงานร่วมกับประชาชนที่เราถือว่าเป็นญาติสนิทของเรา"
 astral_rift.1620.desc.xeno: "$astral_rift.1620.desc.common_1$ $astral_rift.1620.desc.common_2$"
 astral_rift.1620.desc.gestalt: "$astral_rift.1620.desc.common_1$ จิตใจที่ตัดขาดขาดสะบั้นออกจากกันของพวกเขา แม้จะมีประสิทธิภาพด้อยกว่า แต่ก็จะทำหน้าที่เป็นผู้ประสานงานระหว่างเรากับกลุ่มปัจเจกบุคคลอื่นได้อย่างเหมาะสม"

 astral_rift.1625.name: "ความเป็นปฏิปักษ์"
 astral_rift.1625.desc.common: "เราได้ปฏิเสธความเห็นในเชิงลบแก่ทูตดังกล่าว"
 astral_rift.1625.desc.default: "เราได้ปฏิเสธทูตดังกล่าว\n\nสำหรับการพูดคุยทั้งหมดเกี่ยวกับความคล้ายคลึงและอนาคตร่วมกัน [final_mirrored_empire.GetName] กลับหันหลังให้แก่อุดมการณ์รากฐานที่ทำให้อารยธรรมของเรายิ่งใหญ่\n\nหลังจากกล่าวจบแล้ว เราจึงเดินทางกลับสู่ยาน §Y$tech_rift_sphere$§! ของเราอย่างรวดเร็วก่อนที่พวกเขาจะตัดสินว่าเอกสิทธิ์และความคุ้มกันทางการทูตของเราถึงขีดจำกัด\n\nแม้ว่าเราจะไม่มีแผนที่จะคงการติดต่อสื่อสารกับผู้คนเหล่านี้ ทว่าการศึกษาวิจัยความแตกต่างระหว่างอารยธรรมนี้กับอารยธรรมของเราช่วยสอนอะไรหลายอย่างเกี่ยวกับตัวเราเอง"
 astral_rift.1625.desc.gestalt: "เราได้ปฏิเสธทูตดังกล่าว\n\nสำหรับการพูดคุยเกี่ยวกับความคล้ายคลึงเราไม่อาจคิดถึงสิ่งใดที่น่ารังเกียจไปกว่าการละทิ้งอุดมการณ์กลุ่มจิตวิญญาณร่วม\n\nหลังจากแสดงจุดยืนของเราอย่างชัดเจนแล้ว [explorer.GetIndividualNamePlural] ของเราเดินทางกลับสู่ยาน §Y$tech_rift_sphere$§! อย่างรวดเร็วก่อนที่สถานการณ์จะเข้าสู่ทิศทางที่อันตรายยิ่งขึ้น"
 astral_rift.1625.desc.common.homicidal: "พวกเขาโชคดีแล้วที่อารยธรรมของพวกเขานั้นอยู่ห่างไกลเกินเอื้อมถึง"
 astral_rift.1625.desc.gestalt.homicidal: "$astral_rift.1625.desc.gestalt$\n\n$astral_rift.1625.desc.common.homicidal$"
 astral_rift.1625.desc.default.homicidal: "$astral_rift.1625.desc.gestalt$\n\n$astral_rift.1625.desc.common.homicidal$"

###############
# Lone Object #
###############
 astral_rift_tomb: "วัตถุโดดเดี่ยว(วัตถุรูป)"

 lone_object_swarm_unleashed: "ฝูงหลุม ฝัง ศพถูกปลดปล่อยเข้าใส่เรา พวกมันติดตามเราผ่านรอยแยกมิติมาได้ด้วยเหตุผลบางอย่าง!"

 NAME_Grave_Guardian: "Grave Guardian"
 NAME_Grave_Guardians: "Grave Guardians"

 astral_rift.1700.name: "ปริศนาลอยน้ำ(ความพิศวง)"
 astral_rift.1700.desc: "ที่นี่ไม่มีดาวฤกษ์ ไม่มีวัตถุระบบดาวเคราะห์ใดๆ มีเพียงแสงสว่างกระจายจากแหล่งกำเนิดปริศนาที่ช่วยเผยให้เห็นวัตถุขนาดยักษ์ตระหง่านอยู่เบื้องหน้าเรา\n\nมีรูปทรงคล้ายสี่เหลี่ยมผืนผ้า วัตถุนี้หยุดนิ่งโดยสมบูรณ์ ไม่มีการตรวจพบระบบขับเคลื่อนหรือลายเซ็นพลังงานรูปแบบใด มีขนาดใกล้เคียงกับสถานีดาวฤกษ์ขนาดเล็ก และดูเหมือนจะดับสูญไปแล้ว มันลอยอยู่ในมิติย่อยที่สันโดษแห่งนี้มานานแค่ไหนแล้ว และมันมาจากไหนกันแน่?\n\nอักษรรูปภาพโบราณและสัญลักษณ์ตกแต่งจำนวนนับไม่ถ้วนถูกแกะสลักอย่างซับซ้อนบนพื้นผิวของมัน เราได้ตัดความเป็นไปได้ทั้งหมดที่สิ่งนี้จะเป็นปรากฏการณ์ทางธรรมชาติออกไป"
 astral_rift.1700.a: "พยายามแปลอักษรรูปภาพโบราณ"
 astral_rift.1700.b: "สแกนพื้นที่รอบนอกทั้งหมด"

 astral_rift.1705.name: "อักษรแกะสลักนับล้านตัว"
 astral_rift.1705.desc: "อักษรแกะสลักที่ปกคลุมวัตถุมหึมานี้ส่วนใหญ่เป็นสัญลักษณ์แสดงแทนด้วยรูปภาพ\n\nจากการตรวจหาอายุคาร์บอน (carbon dating) เราพบว่าการแกะสลักในยุคแรกเริ่มบางส่วนทำขึ้นเมื่อหลายสหัสวรรษก่อนยุคปัจจุบัน อักษรเหล่านี้แสดงรายละเอียดไว้ชัดเจนจนกระทั่งเราสามารถพัฒนาคำแปลคร่าวๆ ออกมาได้อย่างรวดเร็ว\n\nความจริงแล้ววัตถุนี้คือห้องสุสานฝังศพขนาดใหญ่ ใครก็ตามหรือสิ่งใดก็ตามที่ถูกฝังไว้ข้างในเคยปกครองกาแล็กซีทั้งหมด รูปภาพโบราณบางส่วนเผยให้เห็นกำเนิดของสิ่งมีชีวิตที่ทรงพลังนี้\n\nเติบโตขึ้นโดยเผ่าพันธุ์เลเวียธาน (Leviathans) ที่กำเนิดในอวกาศ ทั้งสองสายพันธุ์พัฒนาความสัมพันธ์แบบพึ่งพาอาศัยกัน (symbiosis) เป็นพิเศษ การสร้างพันธะพลังจิตที่ทรงอานุภาพช่วยให้พวกเขาพิชิตระบบดาวต่างๆ ร่วมกันนับไม่ถ้วน\n\nมีสัญลักษณ์อื่นๆ ที่อ้างถึง \"คำสาป\" การพยายามเปิดวัตถุนี้หรือแม้แต่การเข้าใกล้มากเกินไปอาจเป็นอันตรายได้"
 astral_rift.1705.a: "สแกนพื้นที่รอบนอกทั้งหมด"
 astral_rift.1705.b: "ระเบิดเปิดมันออก"

 astral_rift.1710.name: "ตราผนึกโบราณ"
 astral_rift.1710.desc: "เราได้โคจรครบรอบรอบวัตถุดังกล่าวแล้ว\n\nมันประกอบขึ้นจากวัตถุสองครึ่งเชื่อมปิดผนึกติดกัน ตราผนึกมีการกัดกร่อนอย่างรุนแรงในบางตำแหน่ง ซึ่งเป็นเรื่องน่าประหลาดใจเมื่อพิจารณาจากความว่างเปล่าของบรรยากาศโดยรอบ สิ่งนี้บ่งชี้ว่าแหล่งที่มาของการกัดกร่อนต้องมาจากภายในตัววัตถุเอง\n\nการกัดกร่อนรุนแรงมากจนมีรอยร้าวเกิดขึ้นในบางจุด ซึ่งใหญ่พอที่โดรนลำหนึ่งของเราจะสามารถเข้าไปข้างในได้\n\nในทางกลับกัน เราบรรทุกวัตถุระเบิดมามากพอที่จะทำลายรอยปิดผนึกนี้ได้"
 astral_rift.1710.a: "ส่งโดรนผ่านรอยร้าวเข้าไป"
 astral_rift.1710.b: "ระเบิดเปิดมันออก"

 astral_rift.1715.name: "ช่องทางเดินที่เต็มไปด้วยม่านฝุ่น"
 astral_rift.1715.desc: "โดรนของเราได้ส่งรายงานออกมาจากภายในวัตถุดังกล่าว\n\nช่างโชคร้ายที่ช่องแบ่งพื้นที่ส่วนใหญ่ภายในถูกบดบังด้วยม่านฝุ่นคาร์บอนหนาทึบและพิสูจน์แล้วว่าควบคุมหลบหลีกได้ยากลำบาก\n\nการวิเคราะห์เบื้องต้นเผยให้เห็นโครงสร้างใยแอสทรัล(ผ้ารองแก้ว)จำนวนมากพันประสานเข้ากับอนุภาคคาร์บอน มันน่าจะเป็นไปได้ในการเก็บเกี่ยววัสดุนี้หากเราสละเวลาดำเนินการ\n\nเมื่อมองลอดผ่านรอยร้าวที่ลึกลงไปในโครงสร้าง เราพบเห็นสัญญาณของห้องโถงชั้นใน การศึกษาค้นคว้าต่อต้องการการสำรวจในเชิงทำลายล้างที่รุนแรงกว่านี้"
 astral_rift.1715.a: "เก็บชิ้นส่วนตัวอย่างและเดินทางกลับ"
 astral_rift.1715.b: "เริ่มการสำรวจเชิงทำลายล้าง"

 astral_rift.1720.name: "การบุกรุกสุสาน(เสียงกลอง)"
 astral_rift.1720.desc.outside: "การใช้ระเบิดขุดเจาะมาตรฐานช่วยให้เราประสบความสำเร็จในการระเบิดเปิดรูขนาดใหญ่บนวัตถุดังกล่าว"
 astral_rift.1720.desc.drones: "การใช้ระเบิดขุดเจาะมาตรฐานช่วยให้เราประสบความสำเร็จในการระเบิดเปิดเส้นทางเดินภายในวัตถุดังกล่าว"
 astral_rift.1720.desc.common.1: "พื้นที่ภายในเต็มไปด้วยโบราณวัตถุที่มีค่า รูปปั้นประณีตทำจากโลหะผสมหายากได้รับการจัดวางในรูปแบบพิธีกรรม ใจกลางของห้องชั้นในเป็นโครงกระดูกผลึกคริสตัลขนาดยักษ์ บนหน้าผากของมันประดับประดาด้วยอัญมณีล้ำค่าอย่างงดงาม"
 astral_rift.1720.desc.no_glyphs: "มันปลอดภัยที่จะสันนิษฐานว่าโครงสร้างทั้งหมดนี้ถูกสร้างขึ้นมาเพื่อเป็นสุสานฝังศพ"
 astral_rift.1720.desc.glyphs: "ตามที่บันทึกไว้ในอักษรภาพแกะสลักบนด้านนอกของอนุสาวรีย์แห่งนี้ วัตถุทั้งหมดรอบโครงกระดูกถูกวางไว้ที่นี่เพื่อเป็นเครื่องบรรณาการ แม้จะเป็นผู้พิชิตที่ไร้ความปรานี ทว่าอารยธรรมที่พวกเขาละทิ้งไว้เบื้องหลังยังคงให้ความเคารพยกย่องสิ่งมีชีวิตนี้เป็นอย่างสูง"
 astral_rift.1720.desc.psionic: "อัญมณีแต่ละชิ้นที่ประดับบนหน้าผากของพวกมันส่งสัญญาณชีพจรด้วยความสั่นสะเทือนพลังจิตที่ซ่อนเร้น(เสียงสะท้อน)นี่ต้องเป็นวิธีที่ไททันผู้นี้ใช้ในการสื่อสารกับสิ่งมีชีวิตร่วมอาศัยของมันอย่างแน่นอน เราสามารถเรียนรู้อะไรได้อีกมากจากอุปกรณ์เหล่านี้"
 astral_rift.1720.desc.common.2: "แม้ว่าโครงกระดูกจะมีขนาดใหญ่โตเกินกว่าจะขนย้ายออกจากรอยแยกมิติ ทว่าเราจะนำโบราณวัตถุที่มีค่าที่สุดกลับไปด้วย"
 astral_rift.1720.desc.outside.no_glyphs: "$astral_rift.1720.desc.outside$\n\n$astral_rift.1720.desc.common.1$\n\n$astral_rift.1720.desc.no_glyphs$\n\n$astral_rift.1720.desc.common.2$"
 astral_rift.1720.desc.outside.glyphs: "$astral_rift.1720.desc.outside$\n\n$astral_rift.1720.desc.common.1$\n\n$astral_rift.1720.desc.glyphs$\n\n$astral_rift.1720.desc.common.2$"
 astral_rift.1720.desc.outside.glyphs.psionic: "$astral_rift.1720.desc.outside$\n\n$astral_rift.1720.desc.common.1$\n\n$astral_rift.1720.desc.glyphs$\n\n$astral_rift.1720.desc.psionic$\n\n$astral_rift.1720.desc.common.2$"
 astral_rift.1720.desc.drones.no_glyphs: "$astral_rift.1720.desc.drones$\n\n$astral_rift.1720.desc.common.1$\n\n$astral_rift.1720.desc.no_glyphs$\n\n$astral_rift.1720.desc.common.2$"
 astral_rift.1720.desc.drones.glyphs: "$astral_rift.1720.desc.drones$\n\n$astral_rift.1720.desc.common.1$\n\n$astral_rift.1720.desc.glyphs$\n\n$astral_rift.1720.desc.common.2$"
 astral_rift.1720.desc.drones.glyphs.psionic: "$astral_rift.1720.desc.drones$\n\n$astral_rift.1720.desc.common.1$\n\n$astral_rift.1720.desc.glyphs$\n\n$astral_rift.1720.desc.psionic$\n\n$astral_rift.1720.desc.common.2$"

 astral_rift.1725.name: "ผู้พิทักษ์สุสาน(Graver Guarders)"
 astral_rift.1725.desc: "การระเบิดควบคุมของเราได้เปิดทางไปสู่โพรงถ้ำที่ไม่เคยตรวจพบมาก่อน พื้นที่แห่งนี้ซ่อนอยู่เบื้องหลังตราผนึก และถูกออกแบบขึ้นอย่างชัดเจนเพื่อรับมือการบุกรุก มันถูกเติมเต็มจนเกลอไปด้วยสิ่งมีชีวิตที่เป็นปฏิปักษ์\n\nยานทรงกลม(เสียงพูด)ดึงตัวสายยึดเหนี่ยวกลับทันที ทว่ามีผู้พิทักษ์จำนวนมากเดินทางออกจากรอยแยกมิติตามหลังเรามาและกำลังไล่ตามเรามาอย่างใกล้ชิด"
 astral_rift.1725.a: "เรามีปัญหาสำคัญที่ต้องจัดการแก้ไขแล้ว"

#############
# Rockworms #
#############
 astral_rift_rockworms: "หนอนหิน(ไส้ศึก)"

 decision_breed_rockworm_hive: "รังหนอนหิน(หนอนร็อคมี)"
 decision_breed_rockworm_hive_desc: "หนอนหินวัยเยาว์ที่กู้ชีพเก็บกลับมาได้จากอีกฟากของรอยแยกแอสทรัล สามารถรับการฝึกฝนอย่างระมัดระวังเพื่อขุดเจาะอุโมงค์เหมืองแร่ที่กว้างขวาง มันจะเกิดอะไรผิดพลาดขึ้นได้หรือ?"
 d_rockworm_hive: "$decision_breed_rockworm_hive$"
 d_rockworm_hive_desc: "$decision_breed_rockworm_hive_desc$"
 can_breed_rockworm_hives_tt: "ปลดล็อกการตัดสินใจบนดาวเคราะห์(การตัดสินใจเรื่องอาหาร)รังหนอนหิน §Yหนึ่งชุด§!"

 astral_rift.1800.name: "ผืนหินไร้จุดสิ้นสุด"
 astral_rift.1800.desc: "ที่ราบกว้างใหญ่ของเศษหินและกรวดหินทอดยาวอยู่เบื้องหน้าเรา เหนือขึ้นไปเป็นท้องฟ้าสีซีดที่ว่างเปล่า\n\nไม่มีดาวเคราะห์หรือดาวฤกษ์ใดๆ ให้เห็นในที่นี่ สิ่งนี้ดูเหมือนไม่ใช่ส่วนหนึ่งของกาแล็กซีหรือระบบดาวใดๆ ที่รู้จัก เท่าที่เซนเซอร์ของเราสามารถตรวจพบ ภูมิประเทศนี้ยังคงทอดยาวออกไปอย่างไม่มีสิ้นสุดในทุกทิศทาง พื้นผิวมีหลุมรอยพรุนขนาดใหญ่เท่ากับดาวเคราะห์น้อยบางดวง\n\nทั่วเส้นขอบฟ้า สิ่งมีชีวิตลักษณะคล้ายหนอนขนาดยักษ์หลายสิบตัวกำลังผุดขึ้นมาจากพื้นดิน ครีบอันทรงพลังหนึ่งคู่ช่วยให้พวกมันร่อนผ่านชั้นบรรยากาศที่หนาแน่น พวกมันต้องมีอาณานิคมบางประเภทอยู่ใต้ดินอย่างแน่นอน"
 astral_rift.1800.a: "ดำเนินการเฝ้าสังเกตการณ์พื้นผิวต่อ"
 astral_rift.1800.b: "สำรวจระบบอุโมงค์"

 astral_rift.1805.name: "แพลงก์ตอนเวหา(Sky Plankton)"
 astral_rift.1805.desc: "มีสิ่งมีชีวิตอื่นอาศัยอยู่ที่นี่นอกเหนือจากหนอนยักษ์เหล่านั้น\n\nฝูงสิ่งมีชีวิตขนาดเล็กจิ๋วรวมตัวเป็นกลุ่มเมฆหมุนวนในชั้นบรรยากาศระดับล่าง การเคลื่อนตัวร่วมกันเป็นมวลเดียวสร้างลวดลายที่ซับซ้อนพาดผ่านท้องฟ้า\n\nขณะที่หนอนยักษ์ผุดขึ้นมาจากอุโมงค์ พวกมันจะร่อนไปในอากาศเพื่อเล็มกินกลุ่มเมฆสิ่งมีชีวิตเหล่านี้ เราได้สังเกตเห็นหนอนหลายตัวทำงานร่วมกันเพื่อต้อนฝูงสิ่งมีชีวิตเหล่านี้เข้าหากัน ระดับความร่วมมือนี้มีความซับซ้อนอย่างน่าประหลาดใจ"
 astral_rift.1805.a: "เก็บตัวอย่างสิ่งมีชีวิตขนาดเล็กจิ๋ว"
 astral_rift.1805.b: "สำรวจระบบอุโมงค์ของหนอนยักษ์"

 astral_rift.1810.name: "ระบบอุโมงค์"
 astral_rift.1810.desc: "ใต้ผืนผิวมีเครือข่ายห้องโถงกว้างใหญ่เชื่อมต่อกันด้วยอุโมงค์ที่ซับซ้อน หลายแห่งพังทลายลงบางส่วนและดูเหมือนจะไม่มีการใช้งานโดยหนอนยักษ์ เรานำทางยาน §Y$tech_rift_sphere$§! เข้าสู่อุโมงค์ที่เงียบสงบที่สุด\n\nผนังอุโมงค์ถูกปกคลุมไปด้วยสารคล้ายใยแมงมุมซึ่งช่วยยึดหินดินดานและกรวดหินที่หลุดร่วงให้เข้าที่ เราคาดการณ์ว่าสิ่งเหล่านี้คือสารคัดหลั่งจากหนอนยักษ์\n\nห้องโถงส่วนใหญ่ว่างเปล่า ทว่าบางห้องมีบ่อน้ำขุ่นข้น ภายในห้องหนึ่งเราพบรังดักแด้ขนาดใหญ่ที่มีแร่ธาตุเกาะตัวจมอยู่ครึ่งหนึ่งในของเหลว"
 astral_rift.1810.a: "เก็บเกี่ยวรังดักแด้"
 astral_rift.1810.b: "เดินทางมุ่งหน้าต่อไป"

 astral_rift.1815.name: "ถูกกลืนกิน"
 astral_rift.1815.desc.common.1: "สถานการณ์ปกติเป็นปกติดี\n\nอย่างไรก็ตาม เราถูกกินเข้าไปเสียแล้ว"
 astral_rift.1815.desc.common.2: "ยาน §Y$tech_rift_sphere$§! ของเราในตอนนี้ติดอยู่ภายในระบบย่อยอาหารของมัน เราไม่ทราบว่านี่เป็นการกระทำที่เป็นศัตรู หรือเพียงแค่หนอนยักษ์เล็มกินตามธรรมชาติ\n\nน้ำย่อยที่หลั่งจากตัวหนอนนั้นมีความเจือจาง ทว่าเราไม่สามารถอาศัยอยู่ได้ตลอดไป การดึงสายยึดเหนี่ยวกลับอาจช่วยให้เราดันตัวเองผ่านช่องว่างในปากของหนอนออกมาได้สำเร็จ"
 astral_rift.1815.desc.common.gas: "ในอีกทางเลือกหนึ่ง อวัยวะภายในของหนอนดูเหมือนจะนิ่มและควรจะเปราะบางต่อการจุดระเบิดได้ง่าย"

 astral_rift.1815.desc: "$astral_rift.1815.desc.common.1$\n\nในขณะที่เรากำลังยุ่งอยู่กับการเก็บตัวอย่างกลุ่มเมฆ หนึ่งในหนอนยักษ์เล็มกินพืชได้กลืนกินเราเข้าไปทั้งตัว\n\n$astral_rift.1815.desc.common.2$"
 astral_rift.1815.desc.gas: "$astral_rift.1815.desc$\n\n$astral_rift.1815.desc.common.gas$"
 astral_rift.1815.a: "ติดตั้งวัตถุระเบิด"
 astral_rift.1815.b: "ดึงสายยึดเหนี่ยวฉุกเฉินกลับ"

 astral_rift.1816.name: "$astral_rift.1815.name$"
 astral_rift.1816.desc.harvest: "$astral_rift.1815.desc.common.1$\n\nในขณะที่เรากำลังยุ่งอยู่กับการเก็บเกี่ยวรังดักแด้ หนึ่งในหนอนยักษ์ได้กลืนกินเราเข้าไปทั้งตัว\n\n$astral_rift.1815.desc.common.2$"
 astral_rift.1816.desc.harvest.gas: "$astral_rift.1816.desc.harvest$\n\n$astral_rift.1815.desc.common.gas$"
 astral_rift.1816.desc.capture: "$astral_rift.1815.desc.common.1$\n\nในขณะที่เรากำลังยุ่งอยู่กับการรวบรวมลูกหนอนยักษ์วัยอ่อน หนึ่งในหนอนยักษ์ได้กลืนกินเราเข้าไปทั้งตัว\n\n$astral_rift.1815.desc.common.2$"
 astral_rift.1816.desc.capture.gas: "$astral_rift.1816.desc.capture$\n\n$astral_rift.1815.desc.common.gas$"
 astral_rift.1816.a: "$astral_rift.1815.a$"
 astral_rift.1816.b: "$astral_rift.1815.b$"

 astral_rift.1820.name: "แหล่งเพาะเลี้ยงตัวอ่อน(โรงพยาบาล)"
 astral_rift.1820.desc: "เราได้ค้นพบทะเลสาบตื้นๆ ลึกลงไปในระบบอุโมงค์ใต้ดิน\n\nผนังอุโมงค์กำลังบิดตัวขยับขยาย ตัวอ่อนที่มีขนาดใหญ่โตเท่ายาน §Y$tech_rift_sphere$§! กำลังยุ่งอยู่กับการแทะสารคัดหลั่งที่กลายเป็นหินซึ่งยึดเหนี่ยวห้องโถงนี้ไว้ แม้ว่าจะมีขนาดเล็กกว่า ทว่าสิ่งเหล่านี้คือหนอนยักษ์ในวัยเยาว์ของตัวที่ร่อนอยู่บนพื้นผิวด้านบนอย่างแน่นอน\n\nนี่ต้องเป็นแหล่งอนุบาลเลี้ยงดูตัวอ่อนบางประเภท"
 astral_rift.1820.a: "จับตัวอย่างที่มีชีวิต"
 astral_rift.1820.b: "พวกเราเสี่ยงโชคมามากพอแล้ว เดินทางกลับทันที"
 astral_rift.1820.b.evopred: "รวบรวมชิ้นส่วนตัวอย่างและเดินทางกลับ"

 astral_rift.1825.name: "ถูกดึงตัวออกมาสำเร็จ"
 astral_rift.1825.desc: "สายยึดเหนี่ยวของเราพิสูจน์แล้วว่าเป็นเสมือนเส้นชีวิตการรอดตาย\n\nราวกับเหยื่อล่อบนเบ็ดตกปลา เราถูกกระชากช่วยดึงออกมาจากลำคอของหนอนหินได้สำเร็จ"

 astral_rift.1830.name: "ถูกย่อยสลายหมดสภาพ"
 astral_rift.1830.desc: "เราสูญเสียการติดต่อกับ [explorer.GetTeamMemberPlural] บนยาน §Y$tech_rift_sphere$§! แล้ว\n\nเมื่อดึงเก็บสายโยงยึดกลับมา ปลายสายมีเพียงโลหะที่ละลายไปบางส่วนเท่านั้น\n\nเรากำลังใช้โอกาสนี้ในการศึกษาคุณสมบัติพิเศษของของเหลวย่อยอาหารที่เคลือบอยู่ตามแนวสายโยง"

 astral_rift.1835.name: "การปะทุฉีกขาด"
 astral_rift.1835.desc.common: "การจุดชนวนระเบิดประสบความสำเร็จอย่างงดงาม\n\nเศษซากของหนอนยักษ์ร่วงหล่นลงเบื้องล่างในสภาพเนื้อและเครื่องในหินดินที่ฉีกขาดเป็นชิ้นๆ"
 astral_rift.1835.desc.recover: "$astral_rift.1835.desc.common$\n\nเราพบว่าตัวเองอยู่ในห้องโถงที่มีกลุ่มรังดักแด้แร่ธาตุขนาดยักษ์จมอยู่ครึ่งหนึ่งในของเหลว เราสามารถกู้คืนชิ้นกลุ่มไข่เหล่านี้ได้เป็นจำนวนมาก"
 astral_rift.1835.desc.capture: "$astral_rift.1835.desc.common$\n\nเมื่อเป็นอิสระจากข้อจำกัดทั้งปวง เราสามารถกักขังตัวอ่อนบางส่วนเพื่อนำส่งข้ามรอยแยกกลับมาได้สำเร็จ\n\nเราควรจะสามารถขนย้ายตัวอ่อนที่แข็งแกร่งทนทานเหล่านี้ไปยังดาวเคราะห์ที่เราเลือก บางทีตัวอ่อนรุ่นเยาว์นี้อาจได้รับการฝึกฝนให้ขุดอุโมงค์เหมืองแร่ให้เราได้"
 astral_rift.1835.desc.harvest: "$astral_rift.1835.desc.common$\n\nเมื่อเป็นอิสระจากข้อจำกัดทั้งปวง เราสามารถกู้คืนกลุ่มรังไข่จำนวนมากจากบ่อน้ำภายในห้องเหล่านี้\n\nจากการห่อหุ้มในเปลือกผลึกคริสตัล เราควรจะสามารถขนย้ายตัวอ่อนที่แข็งแกร่งทนทานเหล่านี้ไปยังดาวเคราะห์ที่เราเลือก บางทีตัวอ่อนรุ่นเยาว์นี้อาจได้รับการฝึกฝนให้ขุดอุโมงค์เหมืองแร่ให้เราได้"
 astral_rift.1835.a: "ฟังดูค่อนข้างเสี่ยง"
 astral_rift.1835.b.evopred: "กะเทาะเปลือกออกก่อน จากนั้นจึงค่อยเดินทางกลับ"

 astral_rift.1890.name: "จากท้องของสัตว์ร้าย"
 astral_rift.1890.desc: "[From.GetName] ได้รับการช่วยเหลือกลับมาจากอีกฟากของรอยแยกแอสทรัล ทว่าสภาพร่างกายของ [From.GetHeShe] ทรุดโทรมลงไปมาก\n\nหลังจากใช้เวลาปีหนึ่งในท้องของหนอนหิน ขีดความสามารถทางกายภาพของ [From.GetHisHer] ก็ถูกจำกัดลงอย่างรุนแรง อย่างไรก็ตาม เราได้ต้อนรับ [From.GetHimHer] กลับเข้าสู่กองทัพเพื่อปฏิบัติหน้าที่ให้แก่เราอีกครั้ง"
 astral_rift.1890.a: "ช่าง... โชคดีเหลือเกิน?"

##################
# Volcanic Plane #
##################
 restoring_the_balance_modifier: "การคืนสมดุลธรรมชาติ"
 restoring_the_balance_tt: "ประชากรจากดาวเคราะห์ดวงหนึ่งของเราจะถูกส่งกลับเข้าสู่รอยแยกมิติ $astral_rift_volcano$รอยแยกแอสทรัล ด้วยความพยายามที่จะฟื้นฟูสมดุลมิติที่เราสร้างความแปรปรวนไว้"
 obelisks_curse_modifier: "คำสาปของเสาโอเบลิสก์(คําสาปของโอเบลลิสก์)"
 obelisks_curse_machine_modifier: "$obelisks_curse_modifier$"
 leader_trait_obelisk_curse: "$obelisks_curse_modifier$"
 leader_trait_obelisk_curse_tt: "ตราบใดที่ผู้นำคนนี้ยังเป็นสมาชิกสภาบริหาร(เสียงม้า)พวกเขาจะสังเวยประชากรหนึ่งหน่วยให้แก่เสาโอเบลิสก์สีดำในทุกๆ ปี"
 leader_trait_obelisk_curse_desc: "ผู้รับใช้แห่งเสาโอเบลิสก์สีดำ ผู้นำคนนี้อ้างว่าแสวงหาแนวทางฟื้นฟูสมดุลที่เราสร้างความแปรปรวนไว้"

 astral_rift_volcano: "ดินแดนภูเขาไฟ(เครื่องบินวอลคานิก)"

 astral_rift.1900.name: "ภูมิประเทศแห่งเปลวเพลิง"
 astral_rift.1900.desc: "อุณหภูมิที่นี่สูงเป็นประวัติการณ์อย่างเหลือเชื่อ หากไม่ใช่เพราะเกราะกันความร้อนเพื่อป้องกันภัยล่วงหน้าที่เราติดตั้งไว้ก่อนหน้านี้ ยานเราคงถูกเผาเป็นจุณไปแล้ว\n\nตระหง่านอยู่ไกลๆ คือเสาโอเบลิสก์สีดำ ช่องทางเดินจำลองจำนวนหนึ่งมุ่งตรงมารวมกันที่อนุสาวรีย์ขนาดยักษ์แห่งนี้ ซึ่งแบ่งแกะสลักภูมิประเทศหินอย่างเป็นระเบียบ\n\nสิ่งมีชีวิตคล้ายทรงกลมเรืองแสงลอยอยู่อย่างเงียบสงบในท้องฟ้า ระยางค์เรืองแสงห้อยย้อยลงมาจากรูปร่างบอบบางของมัน จากระยะนี้เราไม่อาจบอกได้ว่าพวกมันเป็นมิตรหรือศัตรู ทว่าอย่างน้อยในขณะนี้ดูเหมือนพวกมันจะยังไม่สังเกตเห็นเรา\n\nเสาโอเบลิสก์ดูเหมือนจะเป็นสิ่งที่ต้องสืบสวนเร่งด่วนที่สุด ทว่าสิ่งมีชีวิตที่ลอยอยู่จำนวนมากกำลังบินเข้ามาใกล้จนน่าอึดอัดใจ บางทีมันอาจจะปลอดภัยกว่าหากเฝ้าสังเกตการณ์สภาพแวดล้อมรอบตัวก่อนจะเข้าไปใกล้เกินไป"
 astral_rift.1900.a: "สำรวจสภาพแวดล้อมโดยรอบ"
 astral_rift.1900.b: "บินตรงไปยังเสาโอเบลิสก์"

 astral_rift.1905.name: "ถูกไล่ตามอย่างใกล้ชิด"
 astral_rift.1905.desc: "มีภัยอันตรายที่นี่มากกว่าที่เราคิดไว้ในตอนแรก\n\nห้องโถงขนาดเล็กเรียงรายตามผนังของสถานที่แห่งนี้ พวกมันหนาแน่นไปด้วยสิ่งมีชีวิตหลากหลายประเภท เมื่อพวกมันเห็นเรา พวกมันเขย่าซี่กรงเหล็กที่กักขังพวกมันไว้และร่ำไห้ร้องในภาษาโบราณต่างๆ ที่ไม่รู้จัก บางครั้งเราเห็นสิ่งมีชีวิตลอยตัวอวบอ้วนเข้าไปในห้องเหล่านี้และปราบเหล่านักโทษด้วยพลังงานไฟฟ้าช็อตชีวภาพ\n\nโชคร้ายที่ทรงกลมลอยตัวลำหนึ่งหันมาสนใจเราและกำลังบินตรงมายังยาน §Y$tech_rift_sphere$§! ของเรา แม้เครื่องยนต์จะทำงานด้วยกำลังสูงสุด ทว่ามันก็ค่อยๆ ไล่ตามเรามาอย่างใกล้ชิด ระยางค์ยาวของมันลากตามหลังส่องประกายด้วยพลังงานไฟฟ้าประจุหนัก\n\nเบื้องล่างเรา แม่น้ำลาวากว้างใหญ่ท่วมท้นภูมิประเทศหินออบซิเดียน เกราะกันความร้อนที่เราเตรียมมาควรช่วยให้เรารอดชีวิตได้ในช่วงเวลาสั้นๆ ใต้ผืนผิวแม่น้ำนั้น"
 astral_rift.1905.a: "ดึงสายยึดเหนี่ยวฉุกเฉินกลับ"
 astral_rift.1905.b: "หลบซ่อนตัวในธารลาวา"

 astral_rift.1910.name: "ถูกจับกุมตัวไว้สำเร็จ"
 astral_rift.1910.desc: "ความพยายามของเราที่จะหลบเลี่ยงการตรวจจับไม่ประสบความสำเร็จ ขณะที่เราบินมุ่งหน้าไปยังเสาโอเบลิสก์ ฝูงสิ่งมีชีวิตลอยตัวแปลกประหลาดกลุ่มเล็กๆ ก็ไล่ตามเรามาอย่างรวดเร็ว\n\nบัดนี้เราถูกผูกมัดด้วยระยางค์เรืองแสงของพวกมัน และกำลังถูกลากจูงอย่างรุนแรง การติดต่อสื่อสารใดๆ ไม่ประสบความสำเร็จ\n\nพวกมันกำลังพาเราไปยังกรงที่ฝังอยู่ในผนังใกล้เคียง โซ่ตรวนและซี่กรงถูกดึงหลบออกเพื่อเปิดทางเดินให้เรา สิ่งมีชีวิตมีสติปัญญาหลากหลายรูปแบบถูกคุมขังในลักษณะที่คล้ายกันระหว่างทาง\n\nระยางค์ของสิ่งมีชีวิตเหล่านั้นโอบรัดรอบยานอวกาศของเราอย่างแน่นหนา ทว่าด้วยการเสริมกำลังเครื่องยนต์ของเราด้วยวัสดุแอสทรัล เราสามารถให้พลังขับเคลื่อนปะทุที่จะช่วยให้เราหลุดพ้นจากการจับกุมของพวกมันได้"
 astral_rift.1910.a: "พยายามดิ้นรนหลบหนี"
 astral_rift.1910.b: "นี่เป็นสถานการณ์อันตราย ดึงสายยึดเหนี่ยวฉุกเฉินกลับ"

 astral_rift.1915.name: "เสาโอเบลิสก์สีดำ"
 astral_rift.1915.desc.common: "จากการขับเคลื่อนยานไปอย่างเงียบสงบ ในที่สุดเราก็มาถึงบริเวณใกล้เคียงกับเสาโอเบลิสก์ขนาดยักษ์\n\nมีสีดำราวหินออบซิเดียน มันทอดยาวไปถึงเพดานของห้องโถงภูเขาไฟแห่งนี้ แม้ว่ามันจะเก่าแก่ ทว่ามันกลับปราศจากร่องรอยตำหนิ สิ่งที่ปรากฏในตอนแรกเป็นเครื่องตกแต่ง บัดนี้ได้รับการเปิดเผยว่าเป็นลวดลาย อักษรรูนหลอมเหลวที่หมุนวนไปตามพื้นผิวในรูปแบบการจัดวางที่ประณีต ทว่ายังถอดรหัสไม่ได้ การแปลความหมายจะเป็นไปได้หากมีเวลาเพียงพอ\n\nคอมพิวเตอร์ติดตามเป้าหมายของเราตรวจพบว่าสิ่งมีชีวิตที่ลาดตระเวนในพื้นที่นี้เคลื่อนที่เร็วขึ้นเมื่ออยู่ใกล้กับวัตถุนี้ เราได้คาดการณ์ว่าไม่ว่าโครงสร้างนี้จะเป็นอะไร สิ่งมีชีวิตเหล่านี้จะเชื่อมโยงผูกมัดกับมันในทางใดทางหนึ่ง การทำลายมันด้วยก๊าซอัดความดันควรขัดขวางขีดความสามารถการทำหน้าที่ของพวกมัน"
 astral_rift.1915.desc.lava_hide: "เพื่อหลบเลี่ยงการตรวจพบ เราได้จมยานลงในแม่น้ำลาวาหลอมเหลวด้านล่าง\n\nเกราะเคลือบป้องกันที่เราทาไว้เพื่อป้องกันล่วงหน้าช่วยให้เรารอดชีวิตได้นานพอที่จะโผล่ขึ้นมาในระยะห่างออกไป หลบซ่อนจากความสนใจของสิ่งมีชีวิตลอยตัวเหล่านั้นสำเร็จ\n\n$astral_rift.1915.desc.common$"
 astral_rift.1915.desc.lava_escape: "สิ่งมีชีวิตลอยตัวเหล่านั้นไม่ได้เตรียมพร้อมสำหรับการหลบหลีกอย่างกะทันหันของเรา\n\nการระเบิดพลังขับเคลื่อนของเครื่องยนต์ช่วยดึงเราให้หลุดพ้นจากระยางค์ของพวกมัน ส่งให้เราพุ่งลงสู่แม่น้ำลาวาหลอมเหลวด้านล่างอย่างรวดเร็ว ชัดเจนว่าพวกมันไม่คุ้นเคยกับเหยื่อที่แสดงพฤติกรรมในลักษณะนี้\n\nเกราะเคลือบป้องกันที่เราทาไว้เพื่อป้องกันล่วงหน้าช่วยให้เรารอดชีวิตได้นานพอที่จะโผล่ขึ้นมาในระยะห่างออกไป หลบซ่อนจากความสนใจของพวกมันสำเร็จ\n\n$astral_rift.1915.desc.common$"
 astral_rift.1915.a: "ถอดรหัสอักษรรูน"
 astral_rift.1915.b: "ทำลายเสาโอเบลิสก์ทิ้ง"

 astral_rift.1920.name: "การเก็บกู้เดินทางกลับ"
 astral_rift.1920.desc: "เราดึงตัวสายยึดเหนี่ยวกลับและหลบหนีออกมาจากภูมิประเทศที่เต็มไปด้วยอันตรายนี้\n\nสิ่งมีชีวิตลอยตัวจำนวนหนึ่งพยายามเกาะยึดยาน §Y$tech_rift_sphere$§! ของเราในขณะที่ยานถูกดึงกลับ ตัวหนึ่งในพวกมันถูกนำข้ามมิติกลับมาพร้อมกับเรา และสลายตัวลงกลายเป็นสารแอสทรัลบริสุทธิ์ในทันที\n\nเรากำลังทำการเก็บเกี่ยวเศษซากที่หลงเหลือของมันเพื่อการศึกษาเพิ่มเติมต่อไป"

 astral_rift.1925.name: "รายนาม"
 astral_rift.1925.desc: "มันคือรายนามรายชื่อ\n\nรายชื่อนับล้านล้านรายชื่อปกคลุมเสาโอเบลิสก์นี้ การจัดเรียงในรูปแบบคณิตศาสตร์ที่ซับซ้อนทำให้พวกมันสับเปลี่ยนและเปลี่ยนแปลงในขณะที่เราเฝ้าสังเกตการณ์\n\nเหลี่ยมมุมของเสาโอเบลิสก์อยู่ในแนวร่วมที่เป็นเอกลักษณ์ ทำให้แต่ละชื่อตรงกับช่องโค้งเว้าตามผนังได้อย่างแม่นยำ\n\nการสัมผัสชื่อใดชื่อหนึ่งด้วยเครื่องสำรวจจะส่งผลให้ห้องโถงที่ตรงกันส่องสว่างด้วยพลังงานปริมาณมหาศาลที่เป็นอันตรายและมีเสียงคร่ำครวญร้องไห้ที่น่าเวทนา\n\nโชคร้ายที่เมื่อทำเช่นนี้ เราก็ดึงดูดความสนใจจากสิ่งมีชีวิตลอยตัวเหล่านั้นอีกครั้ง"
 astral_rift.1925.a: "พอแล้ว ดึงสายยึดเหนี่ยวฉุกเฉินกลับ"
 astral_rift.1925.b: "ทำลายอุปกรณ์ชั่วร้ายนี้ทิ้งซะ"

 astral_rift.1930.name: "เสาโอเบลิสก์ที่พังยับเยิน"
 astral_rift.1930.desc: "การวางวัตถุระเบิดเชิงยุทธศาสตร์ของเราไปตามแนวรอยต่อของหอคอยหินออบซิเดียนประสบความสำเร็จในการตัดมันออกเป็นสองซีกอย่างสมบูรณ์\n\nเมื่อส่วนบนของเสาโอเบลิสก์เลื่อนหลุดออก ความมืดมิดที่รุนแรงก็เติมเต็มถ้ำ สิ่งมีชีวิตลอยตัวที่เราสังเกตเห็นก่อนหน้านี้สูญเสียแสงสว่างเรืองรองและร่วงลงสู่พื้นดินด้วยเสียงกระแทกเปียกชื้นที่หนักหน่วง\n\nประตูกักขังของห้องโถงต่างๆ ตามแนวผนังเปิดกว้างออก สิ่งมีชีวิตจำนวนนับไม่ถ้วนหลั่งไหลออกจากช่องเปิดเหล่านี้เข้าสู่ระบบอุโมงค์ที่อยู่ใกล้ที่สุด เราไม่ทราบว่าอุโมงค์เหล่านี้นำไปสู่ที่ใด ทว่าอย่างน้อยพวกมันก็เป็นอิสระแล้วในตอนนี้\n\nเศษสสารสลายตัวของเสาโอเบลิสก์มีคุณสมบัติที่น่าสนใจเฉพาะตัวเป็นพิเศษ เราได้นำมันขึ้นมาบนยานอวกาศให้ได้มากที่สุดเท่าที่จะทำได้เพื่อการวิจัยเพิ่มเติม"

 astral_rift.1935.name: "ความล้มเหลว"
 astral_rift.1935.desc: "เราสูญเสียการติดต่อกับ [Leader.GetName] แล้ว\n\nเมื่อดึงยาน §Y$tech_rift_sphere$§! กลับคืนมา เราพบว่ามันเต็มไปด้วยกลุ่มควันและเถ้าถ่าน ไม่พบร่างของ [Explorer.GetCrew] เลย\n\nมันเป็นไปได้สูงมากที่พวกเขาจะสูญหายไปตลอดกาลในอีกฟากหนึ่งของรอยแยกมิติ"

 astral_rift.1940.name: "ผู้มาเยือนที่เป็นลางร้าย"
 astral_rift.1940.desc: "สิ่งมีชีวิตกายหลอมเหลวกำลังขอเข้าพบเจรจากับเรา พวกเขาอ้างว่าเป็นเจ้าของเสาโอเบลิสก์สีดำที่เราทำลายทิ้งไปเมื่อหกปีที่แล้วพอดี"

 astral_rift.1941.desc: "พวกเจ้าไม่รู้เลยว่าพวกเจ้าทำอะไรลงไป\n\nพวกเจ้าเข้าใจผิดที่ปลดปล่อยเหล่านักโทษในความดูแลของเรา สมดุลมิติต้องได้รับการฟื้นฟู มิฉะนั้นจะเกิดผลกระทบที่รุนแรงตามมา\n\nในแต่ละปี เป็นเวลาหกปีติดต่อกัน พวกเจ้าจะต้องส่งมอบนักโทษทดแทนจากดาวเคราะห์ของพวกเจ้าให้แก่เรา เราจะเสนอการค้าขายที่เป็นธรรมตอบแทน\n\nหากพวกเจ้าปฏิเสธ เรายินดีที่จะทรมานประชาชนของพวกเจ้าไปเรื่อยๆ จนกว่าความทุกข์ทรมานจะเสร็จสมบูรณ์"
 astral_rift.1941.a: "ตกลงเป็นตามนั้น คืนสมดุลธรรมชาติ"
 astral_rift.1941.b: "จงไสหัวไปซะ"

 astral_rift.1950.name: "การเดินทางกลับของนักวิทยาศาสตร์ของเรา"
 astral_rift.1950.desc: "[from.GetName] เดินทางกลับมาจากรอยแยกมิติ $astral_rift_volcano$แอสตรัล ไรฟ์...ทว่าไม่เหมือนกับตอนที่เราจดจำพวกเขาได้เลย\n\nตัวอย่างคาร์บอนระบุว่าอายุของ [from.GetHisHer] ในตอนนี้มากกว่า 600 ปีแล้ว"
 astral_rift.1950.a: "เฝ้าติดตามตัวบุคคลนี้อย่างใกล้ชิด"

 astral_rift.1955.name: "การเสียสละสังเวย"
 astral_rift.1955.desc: "เราได้ค้นพบการพัฒนาที่น่าตระหนกใจ\n\n[from.GetName] ได้ลักลอบส่งสมาชิกประชากรของเรากลับข้ามรอยแยกมิติ $astral_rift_volcano$รอยแยกแอสทรัล อย่างลับๆ\n\nพวกเขากล่าวอ้างว่าทำไปเพื่อความพยายามในการ \"ฟื้นฟูสมดุลมิติ\""
 astral_rift.1955.a: "กำจัดจัดการกับ [from.GetHimHer] ซะ"
 astral_rift.1955.b: "อนุญาตให้ [from.GetHimHer] ดำเนินการต่อได้"

 MESSAGE_RESTORING_THE_BALANCE_SACRIFICE_TITLE: "$restoring_the_balance_modifier$"
 MESSAGE_RESTORING_THE_BALANCE_SACRIFICE_DESC: "ประชากรจาก [event_target:sacrificed_pop_planet.GetName] ถูกส่งข้ามรอยแยกมิติกลับเข้าไปในรอยแยก $astral_rift_volcano$รอยแยกแอสทรัล ด้วยความพยายามที่จะคืนสมดุลธรรมชาติที่เราทำลายลง"
 MESSAGE_RESTORING_THE_BALANCE_SACRIFICE_DESC_LEADER: "ประชากรจาก [event_target:sacrificed_pop_planet.GetName] ถูกส่งข้ามรอยแยกมิติกลับเข้าไปในรอยแยก $astral_rift_volcano$รอยแยกแอสทรัล โดย $LEADER|Y$ ด้วยความพยายามที่จะคืนสมดุลธรรมชาติ"
# Building a Rockworm Hive on a Volcanic planet gives 5 Magma Conduits instead of Mining Districts
d_rockworm_hive_volcanic: "$decision_breed_rockworm_hive$"
d_rockworm_hive_volcanic_desc: "$decision_breed_rockworm_hive_desc$"
