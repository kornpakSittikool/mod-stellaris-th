 building_pre_ftl_radio_telescope:0 "เครือข่ายกล้องโทรทรรศน์วิทยุ"
 building_pre_ftl_radio_telescope_desc:0 "เครือข่ายกล้องโทรทรรศน์วิทยุเพื่อเป้าหมายในการค้นพบสิ่งมีชีวิตต่างดาวที่มีสติปัญญา"
 awareness_gain_desc:0 "เพิ่มโอกาสที่อารยธรรมนี้จะได้รับ £awareness£ §Yความตระหนักรู้§! เมื่อเวลาผ่านไป"

 building_hive_crude_huts:0 "รังเรียบง่าย"
 building_hive_crude_huts_desc:0 "การใช้วัสดุที่ง่ายที่สุดและใช้แรงน้อยที่สุดที่มี รังเหล่านี้แทบจะไม่เพียงพอที่จะป้องกันไม่ให้โดรนหนาวตายในช่วงเวลากลางคืน"
 building_hive_primitive_dwellings:0 "อาณานิคมยุคแรกเริ่ม"
 building_hive_primitive_dwellings_desc:0 "เริ่มต้นการจัดการพื้นที่ว่างให้เหมาะสมที่สุด อาคารทรงหกเหลี่ยมเหล่านี้สามารถรองรับสิ่งที่เรียกได้ว่าเป็นอาณานิคมในระดับปานกลาง"
 building_hive_stone_palace:0 "รังหิน"
 building_hive_stone_palace_desc:0 "ในโลกที่คุณต้องแข่งขันกับเผ่าพันธุ์ของคุณเองเพื่อความอยู่รอด การมีกำแพงหินจึงเป็นข้อได้เปรียบ"
 building_hive_primitive_capital:0 "ศูนย์กลางทวีป"
 building_hive_primitive_capital_desc:0 "จุดศูนย์กลางทั่วไปของรังที่ครอบคลุมทั่วทั้งทวีปซึ่งแข่งขันกันเพื่อควบคุมโลกใบนี้"
 building_hive_urban_dwellings:0 "ที่เก็บโดรน"
 building_hive_urban_dwellings_desc:0 "วิธีแก้ปัญหาเชิงประโยชน์ใช้สอยสำหรับเป็นที่พักของโดรนเมื่อเข้าสู่รอบการพักผ่อน มีทางเข้าและทางออกแยกกันเพื่อเพิ่มประสิทธิภาพสูงสุดในการชาร์จพลังงานของรัง"
 building_hive_primitive_factory:0 "$building_primitive_factory$"
 building_hive_primitive_factory_desc:0 "$building_primitive_factory_desc$"
 building_hive_primitive_mine:0 "$building_primitive_mine$"
 building_hive_primitive_mine_desc:0 "$building_primitive_mine_desc$"
 building_hive_primitive_power_plant:0 "$building_primitive_power_plant$"
 building_hive_primitive_power_plant_desc:0 "$building_primitive_power_plant_desc$"
 building_hive_primitive_farm:0 "$building_primitive_farm$"
 building_hive_primitive_farm_desc:0 "$building_primitive_farm_desc$"
 building_hive_primitive_node: "โหนดไซแนปส์อย่างง่าย"
 building_hive_primitive_node_desc: "เจตจำนงของรังจะได้รับการเสริมความแข็งแกร่งผ่านโหนดไซแนปส์ยุคเริ่มแรกนี้"
 building_machine_primitive_node: "โหนดเชื่อมต่ออย่างง่าย"
 building_machine_primitive_node_desc: "โหนดเชื่อมต่อยุคเริ่มแรกที่ช่วยลดค่าความหน่วงของดาวเคราะห์"

 building_farming_districts_1: "ศูนย์พัฒนาพืชผล"
 building_farming_districts_1_desc: "ศูนย์ราชการขนาดเล็กที่มีหน้าที่สำรวจที่ดินทำกินและเริ่มขยายเกษตรกรรมบนดาวเคราะห์"
 building_farming_districts_2: "ศูนย์ฟื้นฟูดิน"
 building_farming_districts_2_desc: "ศูนย์นี้มุ่งเน้นการฟื้นฟูดินขอบเขตและปรับปรุงผลผลิต ช่วยให้เขตเกษตรกรรมเติบโตได้มากขึ้น"
 building_farming_districts_3: "ศูนย์เกษตรกรรมอัตโนมัติ"
 building_farming_districts_3_desc: "เครื่องเก็บเกี่ยวแบบกลไก ฝูงบินโดรน และพื้นที่ควบคุมสภาพภูมิอากาศช่วยผลักดันให้เขตเกษตรกรรมขยายตัวอย่างรวดเร็ว"
 building_farming_districts_4: "เครือข่ายการเพาะปลูกระดับดาวเคราะห์"
 building_farming_districts_4_desc: "ศูนย์รวมการดำเนินงานเกษตรกรรมความหนาแน่นสูงแบบบูรณาการขนาดใหญ่ ช่วยให้เขตเกษตรกรรมที่รองรับบนดาวเคราะห์มีจำนวนสูงสุด"
 building_mine_generic: "คลังเหมืองหินพื้นผิว"
 building_mine_generic_desc: "ด้วยการประสานงานการขุดค้นบนพื้นผิวระดับตื้นและการรวบรวมแร่ คลังแห่งนี้จะช่วยให้สามารถขยายเขตทำเหมืองแร่ในระยะแรกได้"
 building_mining_districts_1: "พื้นที่ทำเหมืองแร่อุตสาหกรรม"
 building_mining_districts_1_desc: "แท่นขุดเจาะ ระบบสายพานลำเลียง และระบบคัดแยกทำงานร่วมกันเพื่อรักษาผลผลิตที่น่าเชื่อถือและช่วยให้เริ่มขยายเขตทำเหมืองแร่ได้"
 building_mining_districts_2: "ระบบเจาะลึกแกนโลก"
 building_mining_districts_2_desc: "สิ่งอำนวยความสะดวกที่ช่วยผลักดันการทำเหมืองที่ลึกขึ้นด้วยหัวเจาะหนักและการเสริมแรงโครงสร้าง ช่วยปลดล็อกแหล่งแร่ธาตุเพิ่มเติม"
 building_mining_districts_3: "ลานขุดเจาะอุโมงค์คลื่นไหวสะเทือน"
 building_mining_districts_3_desc: "ศูนย์วิศวกรรมที่พร้อมสำหรับการเจาะอุโมงค์ประสิทธิภาพสูงและการปรับโครงสร้างใต้ดินให้เสถียร ช่วยขยายการเข้าถึงสายแร่ที่ปกติไม่สามารถเข้าถึงได้"
 building_mining_districts_4: "เครือข่ายสกัดแร่เปลือกโลกชั้นลึก"
 building_mining_districts_4_desc: "สิ่งอำนวยความสะดวกขนาดใหญ่ที่ดำเนินงาน ณ ความลึกสูงสุดของดาวเคราะห์ ศูนย์นี้จัดการโซนการสกัดแร่อุตสาหกรรมเต็มรูปแบบและรองรับการขยายเขตเหมืองแร่อยอย่างเต็มที่"
 building_generator_generic: "ลานผลิตพลังงานโวลตาอิก"
 building_generator_generic_desc: "อุทิศให้กับการผลิตพลังงานขนาดใหญ่ อาคารนี้เป็นที่เก็บเซลล์พลังงาน ท่อพลาสม่า และเครื่องกำเนิดพลังงานประสิทธิภาพสูง"
 building_generator_districts_1: "ศูนย์ปฏิบัติการนำไฟฟ้า"
 building_generator_districts_1_desc: "ศูนย์นี้รองรับการจัดตั้งเขตเครื่องกำเนิดพลังงานใหม่โดยการกระจายโครงสร้างพื้นฐานของระบบส่งไฟฟ้าพื้นฐานและระบบจัดการพลังงาน"
 building_generator_districts_2: "ศูนย์ส่งต่อสถานีย่อย"
 building_generator_districts_2_desc: "อำนวยความสะดวกให้กับการพัฒนาเขตเครื่องกำเนิดพลังงานในวงกว้าง สิ่งอำนวยความสะดวกนี้ขยายโครงสร้างพื้นฐานพลังงานบนดาวเคราะห์ผ่านการติดตั้งรีเลย์ความจุสูง ลานหม้อแปลงไฟฟ้า และโหนดรักษาความเสถียรของระบบส่งไฟฟ้า"
 building_generator_districts_3: "ระบบควบคุมพลาสม่า"
 building_generator_districts_3_desc: "ศูนย์ปฏิบัติการที่กระแสพลาสม่าที่เสถียรและการควบคุมการสั่นพ้องของวงจรช่วยให้สามารถเร่งพัฒนาเครื่องกำเนิดไฟฟ้าทั่วทั้งดาวเคราะห์ได้"
 building_generator_districts_4: "ศูนย์ประสานงานดาวเคราะห์"
 building_generator_districts_4_desc: "ศูนย์รวมพลังงานแบบบูรณาการนี้คอยประสานงานการดำเนินงานของเครื่องกำเนิดไฟฟ้าในระดับดาวเคราะห์ ช่วยให้สามารถขยายเขตเครื่องกำเนิดพลังงานได้สูงสุดเท่าที่จะทำได้"


