 concept_auth_democratic: "$auth_democratic$"
 auth_oligarchic:0 "คณาธิปไตย"
 auth_oligarchic_desc:0 "รัฐบาลคณาธิปไตย ปกครองโดยกลุ่มคนกลุ่มน้อยที่มีอํานาจทางการเมืองทั้งหมด"
 concept_auth_oligarchic: "$auth_oligarchic$"
 auth_dictatorial:0 "เผด็จการ"
 auth_dictatorial_desc:0 "รัฐบาลเผด็จการถูกปกครองโดยบุคคลเพียงคนเดียวตลอดชีวิตที่มีอำนาจควบคุมเหนือรัฐอย่างแท้จริง"
 concept_auth_dictatorial: "$auth_dictatorial$"
 auth_imperial:0 "จักรพรรดิ"
 auth_imperial_desc:0 "รัฐบาลของจักรวรรดิมีความคล้ายคลึงกับรัฐบาลเผด็จการยกเว้นว่าบัลลังก์จะได้รับการสืบทอดโดยผู้สืบทอดที่กำหนดไว้เสมอเมื่อผู้ปกครองเสียชีวิต"
 concept_auth_imperial: "$auth_imperial$"
 auth_hive_mind:0 "จิตสำนึกร่วม"
 auth_hive_mind_plural: "จิตสำนึกร่วม"
 auth_hive_mind_desc:1 "ไฮฟ์ จิตดำเนินการในฐานะสิ่งมีชีวิตเดี่ยวมากกว่าในฐานะรัฐ ประชากรไม่มีเจตจำนงเสรี และทำหน้าที่เป็นส่วนขยายของ คน ใจ ถ่อมเอง เปรียบเสมือนแขนขาของร่างกาย\n\nเมื่อถูกตัดขาดจากจิตใจ โดรนเหล่านี้จะเข้าสู่ภาวะโคม่า และในที่สุดก็ร่วงโรยและเสียชีวิตไป บุคคลอิสระใด ๆ บนดาวเคราะห์ที่เป็นของใจจะถูกขับไล่ ฆ่า หรือเพียงแค่ปฏิบัติเหมือนเป็นเหยื่อเพื่อหล่อเลี้ยงส่วนรวม"
 concept_auth_hive_mind: "$auth_hive_mind$"
 auth_machine_intelligence:0 "สติปัญญาจักรกล"
 auth_machine_intelligence_plural: "สติปัญญาจักรกล"
 auth_machine_intelligence_desc:1 "หน่วยสืบราชการลับของเครื่องจักร เป็นกลุ่มสมองเทียมขนาดใหญ่ ที่ได้เชื่อมต่อกันเป็นหน่วยงานเดียว ของจริงส่วนใหญ่\"มหาชน\" หน่วยข่าวกรองคือจิตกลุ่มเทียมขนาดมหึมาที่เชื่อมต่อกันเป็นเอกภาพแห่งการตระหนักรู้เพียงหนึ่งเดียว การดำเนินงานส่วนใหญ่ที่เกิดขึ้นจริง "
 concept_auth_machine_intelligence: "$auth_machine_intelligence$"
 auth_ancient_machine_intelligence:0 "สติปัญญาจักรกลโบราณ"
 auth_ancient_machine_intelligence_desc:0 ""
 auth_corporate:0 "บริษัท"
 auth_corporate_desc:0 "รัฐบาลองค์กรถูกจัดตั้งขึ้นในฐานะองค์กรการค้าขนาดใหญ่ที่เข้ามาแทนที่บทบาทของรัฐอย่างสิ้นเชิง"
 concept_auth_corporate: "$auth_corporate$"
 military_dictatorship:0 "เผด็จการทหาร"
 military_dictatorship_desc:0 "§Lรัฐบาลนี้เป็นรูปแบบการปกครองระบอบเผด็จการทหาร โดยมีผู้ปกครองทำหน้าที่เป็นหัวหน้ากองทัพอย่างไม่มีข้อโต้แย้ง ซึ่งควบคุมกลไกของรัฐอย่างมั่นคง§!"
 military_dictatorship_special:0 "ผู้ปกครองแต่ละคนสามารถสร้างยานขนาดใหญ่พิเศษได้"
 martial_empire:0 "จักรวรรดินักรบ"
 martial_empire_desc:0 "§Lรัฐบาลนี้เป็นรูปแบบขั้นสูงของระบอบเผด็จการทหาร โดยที่รัฐดำรงอยู่เพื่อสนับสนุนกองทัพเป็นหลัก ความสามารถทางการรบเป็นสิ่งที่มีคุณค่าอย่างยิ่ง และพลเมืองทุกคนจะได้รับการฝึกซ้อมเรื่องสงครามอยู่เสมอ§!"
 martial_empire_special:0 "ผู้ปกครองแต่ละคนสามารถสร้างยานขนาดใหญ่พิเศษได้"
 divine_mandate:0 "อาณัติศักดิ์สิทธิ์"
 divine_mandate_desc:0 "§Lรัฐบาลนี้เป็นรูปแบบการปกครองระบอบเผด็จการทางจิตวิญญาณ โดยผู้ปกครองจะได้รับการปฏิบัติเสมือนเป็นสัญลักษณ์ศักดิ์สิทธิ์ ศาสนาที่เป็นระบบถูกนำมาใช้อย่างแพร่หลายเพื่อสนับสนุนกลไกของรัฐ§!"
 divine_mandate_special:0 "ผู้ปกครองแต่ละคนสามารถสร้างสิ่งปลูกสร้างอนุสาวรีย์สุสานได้"
 transcendent_empire:0 "จักรวรรดิเหนือจักรวาล"
 transcendent_empire_desc:0 "§Lรัฐบาลนี้เป็นรูปแบบขั้นสูงของระบอบเผด็จการทางจิตวิญญาณ ทุกสิ่งถูกหล่อหลอมโดยศาสนาประจำชาติอย่างเป็นทางการ และผู้ปกครองจะได้รับการบูชาในฐานะพระเจ้าที่มีชีวิตซึ่งไม่มีวันทำผิดพลาด§!"
 transcendent_empire_special:0 "ผู้ปกครองแต่ละคนสามารถสร้างสิ่งปลูกสร้างอนุสาวรีย์สุสานได้"
 despotic_hegemony:0 "เผด็จการครองอำนาจนำ"
 despotic_hegemony_desc:0 "§Lรัฐบาลนี้เป็นรูปแบบการปกครองระบอบเผด็จการแบบสุขนิยมเชิงวัตถุ ซึ่งพลเมืองถูกมองว่าเป็นเพียงฟันเฟืองในกลไกของรัฐ ประสิทธิภาพและความก้าวหน้าทางเทคโนโลยีมีค่าเหนือสิ่งอื่นใด§!"
 despotic_hegemony_special:0 "ผู้ปกครองแต่ละคนสามารถสร้างกองทัพจู่โจมชั้นยอดได้"
 ai_overlordship:1 "การบริหารเครือข่ายประสาทเทียม"
 ai_overlordship_desc:0 "§Lรัฐบาลนี้เป็นรูปแบบขั้นสูงของระบอบเผด็จการเชิงวัตถุ โดยคอมพิวเตอร์ที่ทรงพลังจะถูกนำมาใช้คำนวณวิธีการปกครองที่มีประสิทธิภาพที่สุด ทุกแง่มุมของรัฐมุ่งเป้าไปที่ประสิทธิภาพและการแสวงหาเทคโนโลยีใหม่ ๆ§!"
 ai_overlordship_special:0 "ผู้ปกครองแต่ละคนสามารถสร้างกองทัพจู่โจมชั้นยอดได้"
 enlightened_monarchy:0 "ราชาธิปไตยผู้รู้แจ้ง"
 enlightened_monarchy_desc:0 "§Lรัฐบาลนี้เป็นรูปแบบการปกครองระบอบราชาธิปไตยแบบรักสงบ โดยผู้ปกครองจะถูกมองว่าเป็นผู้อุปถัมภ์ที่ทรงภูมิธรรมซึ่งดำเนินการเพื่อผลประโยชน์สูงสุดของพลเมืองเสมอ§!"
 enlightened_monarchy_special:0 "ผู้ปกครองแต่ละคนสามารถสร้างสิ่งปลูกสร้างสวนสาธารณะพิเศษได้"
 irenic_monarchy:0 "ราชาธิปไตยสันติภาพ"
 irenic_monarchy_desc:0 "§Lรัฐบาลนี้เป็นรูปแบบขั้นสูงของระบอบราชาธิปไตยแบบรักสงบ โดยผู้ปกครองได้รับการยกย่องว่าเป็นผู้พิทักษ์ที่เปี่ยมด้วยเมตตาซึ่งพยายามปกป้องพลเมืองจากกาแล็กซีที่เต็มไปด้วยความรุนแรง§!"
 irenic_monarchy_special:0 "ผู้ปกครองแต่ละคนสามารถสร้างสิ่งปลูกสร้างสวนสาธารณะพิเศษได้"
 despotic_empire:0 "จักรวรรดิเผด็จการ"
 despotic_empire_desc:0 "§Lรัฐบาลนี้เป็นรูปแบบการปกครองระบอบเผด็จการที่ค่อนข้างบริสุทธิ์ โดยมีผู้ปกครองเบ็ดเสร็จที่ปกครองรัฐด้วยระบอบเหล็กกล้า§!"
 despotic_empire_special:0 "ผู้ปกครองแต่ละคนสามารถสร้าง §Yสถานีทหาร§! ขนาดใหญ่พิเศษได้"
 star_empire:0 "จักรวรรดิดวงดาว"
 star_empire_desc:0 "§Lรัฐบาลนี้เป็นรูปแบบขั้นสูงของระบอบเผด็จการ โดยมีผู้ปกครองเพียงคนเดียวที่ได้รับอำนาจเด็ดขาด ประสิทธิภาพระบบราชการที่ปรับปรุงดีขึ้นช่วยลดภาระการบริหารจัดการในการปกครองจักรวรรดิข้ามดวงดาวขนาดใหญ่ด้วยวิธีนี้§!"
 star_empire_special:0 "ผู้ปกครองแต่ละคนสามารถสร้าง §Yสถานีทหาร§! ขนาดใหญ่พิเศษได้"
 military_junta:0 "รัฐบาลทหาร"
 military_junta_desc:0 "§Lรัฐบาลนี้เป็นรูปแบบการปกครองระบอบคณาธิปไตยทหาร โดยอำนาจจะตกอยู่กับสภาทหารระดับสูงที่คอยดูแลกิจการของรัฐทั้งหมด§!"
 ordered_stratocracy:0 "ระบอบคณาธิปไตยทหารที่เป็นระเบียบ"
 ordered_stratocracy_desc:0 "§Lรัฐบาลนี้เป็นรูปแบบขั้นสูงของระบอบคณาธิปไตยทหาร โดยที่กองทัพได้เข้าควบคุมการบริหารงานพลเรือนในทุกแง่มุม ตำแหน่งรัฐบาลทั้งหมดถูกยึดครองโดยเจ้าหน้าที่ทหาร§!"
 theocratic_oligarchy:0 "คณาธิปไตยพระศาสดา"
 theocratic_oligarchy_desc:0 "§Lรัฐบาลนี้เป็นรูปแบบการปกครองระบอบคณาธิปไตยทางจิตวิญญาณ โดยมีสภาที่ได้รับการชี้นำจากสวรรค์ซึ่งประกอบด้วยคณะนักบวชเป็นผู้ควบคุมรัฐ ไม่มีการแบ่งแยกกระบวนการระหว่างรัฐกับศาสนาที่เป็นระบบที่โดดเด่น§!"
 transcendent_oligarchy:0 "ระบอบคณาธิปไตยผู้ล่วงล้ำ"
 transcendent_oligarchy_desc:0 "§Lรัฐบาลนี้เป็นรูปแบบขั้นสูงของระบอบคณาธิปไตยทางจิตวิญญาณ ปกครองโดยสภาสวรรค์ซึ่งถือเป็นผู้มีอำนาจเด็ดขาดในทุกเรื่องของรัฐและศาสนา§!"
 science_directorate:0 "กองอำนวยการวิทยาศาสตร์"
 science_directorate_desc:0 "§Lรัฐบาลนี้เป็นรูปแบบการปกครองระบอบคณาธิปไตยเชิงวัตถุ โดยมีคณะกรรมการนักวิทยาศาสตร์คอยควบคุมดูแลกลไกของรัฐบาลเพื่อประสิทธิภาพสูงสุด§!"
 illuminated_technocracy:0 "ระบอบเทคโนแครตผู้รู้แจ้ง"
 illuminated_technocracy_desc:0 "§Lรัฐบาลนี้เป็นรูปแบบขั้นสูงของระบอบคณาธิปไตยเชิงวัตถุ โดยมีคณะกรรมการนักวิชาการเทคนิค ซึ่งมักจะเป็นนักวิทยาศาสตร์ชั้นนำในสาขาของตนเป็นผู้ถืออำนาจ ความก้าวหน้าทางเทคโนโลยีถือเป็นสิ่งสำคัญต่ออนาคตของรัฐ§!"
 peaceful_bureaucracy:0 "ระบบราชการอันรักสงบ"
 peaceful_bureaucracy_desc:0 "§Lรัฐบาลนี้เป็นรูปแบบการปกครองระบอบคณาธิปไตยแบบรักสงบ โดยมีระบบราชการที่ซับซ้อนคอยปกครองทุกแง่มุมของสังคมเพื่อความปลอดภัยของพลเมือง§!"
 irenic_protectorate:0 "รัฐในอารักขาอันรักสงบ"
 irenic_protectorate_desc:0 "§Lรัฐบาลนี้เป็นรูปแบบขั้นสูงของระบอบคณาธิปไตยแบบรักสงบ โดยมีคณะกรรมการความปลอดภัยคอยควบคุมดูแลการบริหารงานของรัฐ แนวโน้มความรุนแรงในหมู่พลเมืองจะถูกระงับตั้งแต่เนิ่น ๆ§!"
 plutocratic_oligarchy:0 "คณาธิปไตยผู้มั่งมี"
 plutocratic_oligarchy_desc:0 "§Lรัฐบาลนี้เป็นรูปแบบการปกครองระบอบคณาธิปไตยแบบเศรษฐยาธิปไตย ปกครองโดยกลุ่มชนชั้นนำที่ร่ำรวย ความมั่งคั่งส่วนบุคคลของพลเมืองจะแปรเปลี่ยนเป็นอำนาจทางการเมืองโดยตรง§!"
 mega_corporation:0 "บรรษัทข้ามชาติยักษ์ใหญ่"
 mega_corporation_desc:0 "§Lรัฐบาลนี้เป็นรูปแบบขั้นสูงของระบอบคณาธิปไตยแบบเศรษฐยาธิปไตย โดยรัฐทั้งหมดถูกจัดตั้งขึ้นในฐานะองค์กรการค้าขนาดใหญ่ที่มีคณะกรรมการบริษัทคอยดูแลควบคุม§!"
 military_republic:0 "สาธารณรัฐทหาร"
 military_republic_desc:0 "§Lรัฐบาลนี้เป็นรูปแบบการปกครองระบอบประชาธิปไตยทหาร โดยที่พลเมืองเต็มขั้นสามารถได้รับสิทธิ์ผ่านการรับราชการทหารเท่านั้น สิทธิ์ในการลงคะแนนเสียงจะจำกัดเฉพาะพลเมืองเต็มขั้น และพวกเขาเป็นกลุ่มเดียวที่ได้รับอนุญาตให้ดำรงตำแหน่งสาธารณะ§!"
 martial_demarchy:0 "ประชาธิปไตยทหาร"
 martial_demarchy_desc:0 "§Lรัฐบาลนี้เป็นรูปแบบขั้นสูงของระบอบประชาธิปไตยทหาร โดยผู้ปกครองจะถูกคัดเลือกแบบสุ่มจากกลุ่มผู้สมัครที่มีคุณสมบัติเหมาะสม คุณสมบัติเหล่านั้นขึ้นอยู่กับความสำเร็จทางการทหารเกือบทั้งหมด§!"
 theocratic_republic:0 "สาธารณรัฐพระศาสดา"
 theocratic_republic_desc:0 "§Lรัฐบาลนี้เป็นรูปแบบการปกครองระบอบประชาธิปไตยทางจิตวิญญาณ โดยมีสภาศาสนาคอยควบคุมดูแลกระบวนการประชาธิปไตยและทำหน้าที่ในบทบาทที่ปรึกษา§!"
 transcendent_republic:0 "สาธารณรัฐผู้ล่วงล้ำ"
 transcendent_republic_desc:0 "§Lรัฐบาลนี้เป็นรูปแบบขั้นสูงของระบอบประชาธิปไตยทางจิตวิญญาณ โดยผู้สมัครเพื่อชิงตำแหน่งผู้นำจะถูกดึงมาจากกลุ่มสมาชิกของศาสนาประจำชาติอย่างเป็นทางการเท่านั้น ซึ่งแผ่ซ่านไปทั่วทุกชั้นของสังคม§!"
 direct_democracy:0 "ประชาธิปไตยโดยตรง"
 direct_democracy_desc:0 "§Lรัฐบาลนี้เป็นรูปแบบการปกครองระบอบประชาธิปไตยเชิงวัตถุ ซึ่งพลเมืองใช้เครือข่ายคอมพิวเตอร์ในการลงคะแนนเสียงโดยตรงในเรื่องต่าง ๆ ของรัฐเกือบทั้งหมด§!"
 subconscious_consensus:0 "มติเอกฉันท์ใต้สำนึก"
 subconscious_consensus_desc:0 "§Lรัฐบาลนี้เป็นรูปแบบขั้นสูงของระบอบประชาธิปไตยเชิงวัตถุ ซึ่งพลเมืองต้องได้รับอุปกรณ์ฝังตามกฎหมายเพื่อให้สามารถลงคะแนนเสียงในการประชามติได้ทันที§!"
 moral_democracy:0 "ประชาธิปไตยคุณธรรม"
 moral_democracy_desc:0 "§Lรัฐบาลนี้เป็นรูปแบบการปกครองระบอบประชาธิปไตยแบบรักสงบ นำทางโดยหลักศีลธรรมและการไม่ใช้ความรุนแรงอย่างมั่นคง§!"
 irenic_democracy:0 "ประชาธิปไตยอันสงบสุข"
 irenic_democracy_desc:0 "§Lรัฐบาลนี้เป็นรูปแบบขั้นสูงของระบอบประชาธิปไตยแบบรักสงบ โดยจะมีการแสวงหาแนวทางการแก้ไขปัญหาอย่างสันติสำหรับความขัดแย้งทั้งหมด ทั้งภายในและภายนอก§!"
 indirect_democracy:0 "ประชาธิปไตยทางอ้อม"
 indirect_democracy_desc:0 "§Lรัฐบาลนี้เป็นระบอบประชาธิปไตยทางอ้อม โดยพลเมืองจะลงคะแนนเสียงเลือกเจ้าหน้าที่เพื่อเข้ามาเป็นตัวแทนของพวกเขา§!"
 democratic_utopia:0 "ประชาธิปไตยยูโทเปีย"
 democratic_utopia_desc:0 "§Lรัฐบาลนี้เป็นรูปแบบขั้นสูงของระบอบประชาธิปไตยทางอ้อม ซึ่งสามารถสร้างสมดุลที่ดีระหว่างเสรีภาพส่วนบุคคลและความรับผิดชอบต่อสังคม การทุจริตได้รับการขจัดไปเกือบทั้งหมด§!"
 tribal_society:0 "สังคมชนเผ่า"
 tribal_society_desc:1 "§Lสังคมที่ขาดรัฐบาลที่เป็นระบบ แต่ผู้คนในสังคมถูกจัดกลุ่มเป็นชนเผ่าและตระกูลในท้องถิ่นแทน§!"
 primitive_feudalism:0 "ศักดินาดั้งเดิม"
 primitive_feudalism_desc:1 "§Lรูปแบบการปกครองที่มีข้อบกพร่องซึ่งประกอบด้วยอาณาจักรศักดินาที่กระจัดกระจาย แข่งขันกันอย่างต่อเนื่องเพื่อแย่งชิงความเป็นใหญ่ในภูมิภาค§!"
 fragmented_nations:0 "รัฐชาติที่กระจัดกระจาย"
 fragmented_nations_desc:0 "กลุ่มประเทศรัฐชาติที่กระจัดกระจายซึ่งแข่งขันกันเพื่อครอบงำทางการทหารและผลประโยชน์ทางเศรษฐกิจ ไม่มีการปกครองระดับโลกที่เป็นเอกภาพ"
 stagnated_ascendancy:0 "อำนาจครอบงำที่ชะงักงัน"
 stagnated_ascendancy_desc:0 "§Lรูปแบบการปกครองที่ซบเซาโดยอิงตามประเพณีโบราณและหลักการที่ถูกลืมเลือนไปนาน§!"
 awakened_ascendancy:0 "อำนาจครอบงำที่ตื่นขึ้น"
 awakened_ascendancy_desc:0 "§Lจักรวรรดิที่เคยซบเซาซึ่งตื่นขึ้นจากการหลับใหลและออกเดินทางเพื่อทวงคืนมรดกของตน§!"
 machine_intelligence:0 "สติปัญญาจักรกล"
 machine_intelligence_desc:0 "§Lระบบการปกครองที่แปลกประหลาดและต่างถิ่นอย่างสิ้นเชิงซึ่งใช้โดยอารยธรรมจักรกล§!"
 ancient_machine_intelligence:0 "สติปัญญาจักรกลโบราณ"
 ancient_machine_intelligence_desc:2 "§Lระบบการปกครองที่แปลกประหลาดและต่างถิ่นอย่างสิ้นเชิงซึ่งใช้โดยอารยธรรมจักรกล§!"
 military_order:0 "คำสั่งทหาร"
 military_order_desc:1 "§Lประเภทรัฐบาลทหารที่แปลกประหลาดแต่มีประสิทธิภาพสูงอย่างเห็นได้ชัด§!"
 hive_mind:0 "จิตสำนึกร่วม"
 hive_mind_desc:1 "§Lรูปแบบของจิตสำนึกร่วมที่พัฒนาอย่างสูง โดยที่จิตใจของแต่ละคนเปรียบเสมือนไซแนปส์ในสมองส่วนรวมขนาดใหญ่ที่กระจายตัวออกไป§!"

 gov_feudal_empire:0 "จักรวรรดิศักดินา"
 gov_feudal_empire_desc:0 "รัฐบาลนี้เป็นระบอบเผด็จการศักดินาที่กษัตริย์ปกครองทางอ้อม โดยมอบตำแหน่งและดินแดนให้แก่บริวารเพื่อแลกกับข้อผูกมัดในรูปแบบของภาษีและการรับบริการทางทหาร"
 gov_despotic_empire:0 "จักรวรรดิเผด็จการ"
 gov_despotic_empire_desc:0 "รัฐบาลนี้เป็นรูปแบบการปกครองระบอบเผด็จการที่ค่อนข้างบริสุทธิ์ โดยมีผู้ปกครองเบ็ดเสร็จที่ปกครองรัฐด้วยระบอบเหล็กกล้า"
 gov_constitutional_dictatorship:0 "ระบอบเผด็จการรัฐธรรมนูญ"
 gov_constitutional_dictatorship_desc:0 "รัฐบาลนี้เป็นเผด็จการที่บุคคลคนเดียวได้รับอำนาจฉุกเฉินตลอดกาลเพื่อปกป้องรัฐจากภัยคุกคามใด ๆ ไม่ว่าจะเกิดขึ้นจริงหรือจินตนาการขึ้นมา"
 gov_plutocratic_oligarchy:0 "คณาธิปไตยผู้มั่งมี"
 gov_plutocratic_oligarchy_desc:0 "รัฐบาลนี้เป็นรูปแบบการปกครองระบอบคณาธิปไตยแบบเศรษฐยาธิปไตย ปกครองโดยกลุ่มชนชั้นนำที่ร่ำรวยและมีอิทธิพล"
 gov_representative_democracy:0 "ประชาธิปไตยแบบมีผู้แทน"
 gov_representative_democracy_desc:0 "รัฐบาลนี้เป็นระบอบประชาธิปไตยแบบตัวแทน โดยพลเมืองจะลงคะแนนเสียงเลือกเจ้าหน้าที่เพื่อเข้ามาเป็นตัวแทนของพวกเขา"
 gov_theocratic_monarchy:0 "ราชาธิปไตยพระศาสดา"
 gov_theocratic_monarchy_desc:0 "รัฐบาลนี้เป็นรูปแบบการปกครองระบอบเผด็จการทางจิตวิญญาณ โดยผู้ปกครองจะได้รับการปฏิบัติเสมือนเป็นสัญลักษณ์ศักดิ์สิทธิ์ ศาสนาที่เป็นระบบถูกนำมาใช้อย่างแพร่หลายเพื่อสนับสนุนกลไกของรัฐ"
 gov_theocratic_dictatorship:0 "เผด็จการพระศาสดา"
 gov_theocratic_dictatorship_desc:0 "รัฐบาลนี้เป็นเผด็จการทางจิตวิญญาณ ปกครองโดยบุคคลคนเดียวในโครงสร้างอำนาจตามลำดับชั้นที่สนับสนุนโดยศาสนาประจำชาติอย่างเป็นทางการ"
 gov_theocratic_oligarchy:0 "คณาธิปไตยพระศาสดา"
 gov_theocratic_oligarchy_desc:0 "รัฐบาลนี้เป็นรูปแบบการปกครองระบอบคณาธิปไตยทางจิตวิญญาณ โดยผู้นำทางการเมืองอยู่ในมือของผู้นำกลุ่มศาสนาที่ทรงอิทธิพลที่สุดของประเทศ"
 gov_theocratic_republic:0 "สาธารณรัฐพระศาสดา"
 gov_theocratic_republic_desc:0 "รัฐบาลนี้เป็นรูปแบบการปกครองระบอบประชาธิปไตยทางจิตวิญญาณ โดยมีสภาศาสนาคอยควบคุมดูแลกระบวนการประชาธิปไตยและทำหน้าที่ในบทบาทที่ปรึกษา"
 gov_divine_empire:0 "จักรวรรดิศักดิ์สิทธิ์"
 gov_divine_empire_desc:0 "รัฐบาลนี้เป็นรูปแบบของระบอบเผด็จการทางจิตวิญญาณ ทุกสิ่งถูกหล่อหลอมโดยศาสนาประจำชาติอย่างเป็นทางการ และผู้ปกครองจะได้รับการบูชาในฐานะพระเจ้าที่มีชีวิตซึ่งไม่มีวันทำผิดพลาด"
 gov_holy_tribunal:0 "ศาลศักดิ์สิทธิ์"
 gov_holy_tribunal_desc:0 "รัฐบาลนี้เป็นรูปแบบการปกครองระบอบคณาธิปไตยทางจิตวิญญาณ โดยมีสภาที่ได้รับการชี้นำจากสวรรค์ซึ่งประกอบด้วยคณะนักบวชเป็นผู้ควบคุมรัฐ ไม่มีการแบ่งแยกกระบวนการระหว่างรัฐกับศาสนาที่เป็นระบบที่โดดเด่น"
 gov_star_empire:0 "จักรวรรดิดวงดาว"
 gov_star_empire_desc:0 "รัฐบาลนี้เป็นรูปแบบการปกครองระบอบเผด็จการทหารและสืบสายโลหิต โดยมีกษัตริย์องค์เดียวคอยควบคุมทั้งรัฐบาลและกองทัพ"
 gov_military_dictatorship:0 "เผด็จการทหาร"
 gov_military_dictatorship_desc:0 "รัฐบาลนี้เป็นรูปแบบการปกครองระบอบเผด็จการทหาร โดยมีผู้ปกครองทำหน้าที่เป็นหัวหน้ากองทัพอย่างไม่มีข้อโต้แย้ง ซึ่งควบคุมกลไกของรัฐอย่างมั่นคง"
 gov_military_junta:0 "รัฐบาลทหาร"
 gov_military_junta_desc:0 "รัฐบาลนี้เป็นรูปแบบการปกครองระบอบคณาธิปไตยทหาร โดยอำนาจจะตกอยู่กับสภาทหารระดับสูงที่คอยดูแลกิจการของรัฐทั้งหมด"
 gov_military_commissariat:0 "คณะกรรมาธิการทหาร"
 gov_military_commissariat_desc:0 "รัฐบาลนี้มีรูปแบบเป็นประชาธิปไตยในนาม โดยเส้นแบ่งระหว่างการบริหารพลเรือนและทหารได้พร่าเลือนไปจนเกือบกลายเป็นหนึ่งเดียวกัน"
 gov_martial_empire:0 "จักรวรรดินักรบ"
 gov_martial_empire_desc:0 "รัฐบาลนี้เป็นรูปแบบการปกครองระบอบเผด็จการทหารแบบสืบสายโลหิต โดยที่รัฐดำรงอยู่เพื่อสนับสนุนกองทัพเป็นหลัก ความสามารถทางการรบเป็นสิ่งที่มีคุณค่าอย่างยิ่ง และพลเมืองทุกคนจะได้รับการฝึกซ้อมเรื่องสงครามอยู่เสมอ"
 gov_martial_dictatorship:0 "เผด็จการนักรบ"
 gov_martial_dictatorship_desc:0 "รัฐบาลนี้เป็นรูปแบบการปกครองระบอบเผด็จการทหาร โดยที่นักรบผู้ได้รับการยอมรับว่าเป็นผู้นำที่แข็งแกร่งที่สุดจะปกครองด้วยอำนาจเด็ดขาด "
 gov_war_council:0 "สภาสงคราม"
 gov_war_council_desc:0 "รัฐบาลนี้เป็นรูปแบบการปกครองระบอบคณาธิปไตยทหาร โดยการตัดสินใจทั้งหมดเกี่ยวกับรัฐจะดำเนินการโดยสภาขุนศึกที่แข็งแกร่งที่สุดของประเทศ"
 gov_assembly_of_clans:0 "สมัชชานักรบ"
 gov_assembly_of_clans_desc:0 "รัฐบาลนี้เป็นรูปแบบประชาธิปไตยทหารที่นักรบตระกูลที่เป็นอิสระทุกคนสามารถส่งเสียงของตนได้"
 gov_citizen_stratocracy:0 "กองทหารพลเมือง"
 gov_citizen_stratocracy_desc:0 "รัฐบาลนี้เป็นรูปแบบขั้นสูงของระบอบคณาธิปไตยทหาร โดยที่กองทัพได้เข้าควบคุมการบริหารงานพลเรือนในทุกแงุมุม ตำแหน่งรัฐบาลทั้งหมดถูกยึดครองโดยเจ้าหน้าที่ทหาร"
 gov_citizen_republic:0 "สาธารณรัฐพลเมือง"
 gov_citizen_republic_desc:0 "รัฐบาลนี้เป็นรูปแบบการปกครองระบอบประชาธิปไตยทหาร โดยที่พลเมืองเต็มขั้นสามารถได้รับสิทธิ์ผ่านการรับราชการทหารเท่านั้น สิทธิ์ในการลงคะแนนเสียงจะจำกัดเฉพาะพลเมืองเต็มขั้น และพวกเขาเป็นกลุ่มเดียวที่ได้รับอนุญาตให้ดำรงตำแหน่งสาธารณะ"
 gov_irenic_monarchy:0 "ราชาธิปไตยสันติภาพ"
 gov_irenic_monarchy_desc:0 "รัฐบาลนี้เป็นรูปแบบการปกครองระบอบราชาธิปไตยแบบรักสงบสืบสายโลหิต โดยผู้ปกครองได้รับการยกย่องว่าเป็นผู้พิทักษ์ที่เปี่ยมด้วยเมตตาซึ่งพยายามปกป้องพลเมืองจากกาแล็กซีที่เต็มไปด้วยความรุนแรง"
 gov_irenic_dictatorship:0 "เผด็จการสันติภาพ"
 gov_irenic_dictatorship_desc:0 "รัฐบาลนี้เป็นรูปแบบการปกครองระบอบเผด็จการแบบรักสงบ โดยรัฐมีหน้าที่ปกป้องพลเมืองจากแนวโน้มความรุนแรงของตนเองรวมถึงภัยคุกคามภายนอกอื่น ๆ"
 gov_irenic_bureaucracy:0 "ระบบเจ้าขุนมูลนายสันติภาพ"
 gov_irenic_bureaucracy_desc:0 "รัฐบาลนี้เป็นรูปแบบการปกครองระบอบคณาธิปไตยแบบรักสงบ โดยมีระบบราชการที่ซับซ้อนคอยปกครองทุกแง่มุมของสังคมเพื่อความปลอดภัยของพลเมือง"
 gov_celestial_empire:0 "จักรวรรดิสรวงสวรรค์"
 gov_celestial_empire_desc:0 "รัฐบาลนี้เป็นระบอบราชาธิปไตยแบบสืบสายโลหิต โดยผู้ปกครองจะถูกมองว่าเป็นบุตรแห่งสวรรค์ในสังคมที่รักสงบและแยกตัวโดดเดี่ยวเป็นส่วนใหญ่"
 gov_moral_democracy:0 "ประชาธิปไตยคุณธรรม"
 gov_moral_democracy_desc:0 "รัฐบาลนี้เป็นรูปแบบการปกครองระบอบประชาธิปไตยแบบรักสงบ นำทางโดยหลักศีลธรรมและการไม่ใช้ความรุนแรงอย่างมั่นคง"
 gov_despotic_hegemony:0 "เผด็จการครองอำนาจนำ"
 gov_despotic_hegemony_desc:0 "รัฐบาลนี้เป็นรูปแบบการปกครองระบอบราชาธิปไตยเชิงวัตถุสืบสายโลหิต ซึ่งพลเมืองถูกมองว่าเป็นเพียงฟันเฟืองในกลไกของรัฐ ประสิทธิภาพและความก้าวหน้าทางเทคโนโลยีมีค่าเหนือสิ่งอื่นใด"
 gov_totalitarian_regime:0 "ระบอบเผด็จการเบ็ดเสร็จ"
 gov_totalitarian_regime_desc:0 "รัฐบาลนี้เป็นรูปแบบการปกครองระบอบเผด็จการเชิงวัตถุ ซึ่งรัฐมุ่งหวังจะควบคุมชีวิตของพลเมืองอย่างเต็มรูปแบบในนามของประสิทธิภาพ"
 gov_executive_committee:0 "คณะกรรมการบริหาร"
 gov_executive_committee_desc:0 "รัฐบาลนี้เป็นรูปแบบการปกครองระบอบคณาธิปไตยเชิงวัตถุ โดยมีระบบราชการที่ทรงอำนาจคอยปกครองรัฐและชี้แนะพลเมืองไปสู่เป้าหมายที่มีประสิทธิผลและมีความหมาย"
 gov_direct_democracy:0 "ประชาธิปไตยทางตรง"
 gov_direct_democracy_desc:0 "รัฐบาลนี้เป็นรูปแบบการปกครองระบอบประชาธิปไตยเชิงวัตถุ ซึ่งพลเมืองใช้เครือข่ายคอมพิวเตอร์ในการลงคะแนนเสียงโดยตรงในเรื่องต่าง ๆ ของรัฐเกือบทั้งหมด"
 gov_illuminated_autocracy:0 "อัตตาธิปไตยส่องแสง"
 gov_illuminated_autocracy_desc:0 "รัฐบาลนี้เป็นรูปแบบของระบอบเผด็จการเชิงวัตถุสืบสายโลหิต บนพื้นฐานของหลักการเทคโนแครตที่กษัตริย์ทรงปฏิญาณตนว่าจะรักษาไว้ ไม่มีสิ่งใดที่จะมีค่าสูงไปกว่าความรู้ทางวิทยาศาสตร์และความก้าวหน้าของเทคโนโลยี"
 gov_technocratic_dictatorship:0 "เผด็จการเทคโนโลยี"
 gov_technocratic_dictatorship_desc:0 "รัฐบาลนี้เป็นรูปแบบของระบอบเผด็จการเชิงวัตถุ โดยกลุ่มชนชั้นนำทางวิทยาศาสตร์ได้เข้าควบคุมรัฐในนามของประสิทธิภาพและความก้าวหน้าทางเทคโนโลยี"
 gov_science_directorate:0 "คณะกรรมการวิทยาศาสตร์"
 gov_science_directorate_desc:0 "รัฐบาลนี้เป็นรูปแบบการปกครองระบอบคณาธิปไตยเชิงวัตถุ โดยมีคณะกรรมการนักวิทยาศาสตร์คอยควบคุมดูแลกลไกของรัฐบาลเพื่อประสิทธิภาพสูงสุด"
 gov_rational_consensus:0 "ฉันทานุมัติชอบธรรม"
 gov_rational_consensus_desc:0 "รัฐบาลนี้เป็นรูปแบบการปกครองระบอบประชาธิปไตยเชิงวัตถุ ปกครองตามหลักการที่ตั้งอยู่บนพื้นฐานของเหตุผลและทฤษฎีทางวิทยาศาสตร์"
 gov_megacorporation:0 "บริษัทขนาดใหญ่"
 gov_megacorporation_desc:0 "รัฐบาลนี้เป็นรูปแบบของระบอบคณาธิปไตยแบบเศรษฐยาธิปไตย โดยรัฐทั้งหมดถูกจัดตั้งขึ้นในฐานะองค์กรการค้าขนาดใหญ่ที่มีคณะกรรมการบริษัทคอยดูแลควบคุม"
 gov_trade_league:0 "สมาคมการค้า"
 gov_trade_league_desc:0 "รัฐบาลนี้เป็นรูปแบบของระบอบคณาธิปไตยแบบเศรษฐยาธิปไตย ซึ่งรัฐประกอบด้วยพ่อค้าอิสระ บรรษัท และสมาคมการค้าต่าง ๆ มากมายที่มารวมตัวกันเพื่อผลประโยชน์ทางการค้าร่วมกัน"
 gov_enlightened_monarchy:0 "ราชาธิปไตยผู้รู้แจ้ง"
 gov_enlightened_monarchy_desc:0 "รัฐบาลนี้เป็นรูปแบบการปกครองระบอบราชาธิปไตยแบบทรงภูมิธรรมสืบสายโลหิต โดยเน้นย้ำถึงความรู้และคุณสมบัติของกษัตริย์ผู้ปกครองเป็นสำคัญ"
 gov_elective_monarchy:0 "ราชาธิปไตยเลือกตั้ง"
 gov_elective_monarchy_desc:0 "รัฐบาลนี้เป็นรูปแบบการปกครองระบอบราชาธิปไตยแบบทรงภูมิธรรม โดยเน้นย้ำถึงความรู้และคุณสมบัติของกษัตริย์ที่ได้รับการเลือกตั้งเป็นสำคัญ"
 gov_hive_mind:0 "จิตสำนึกร่วม"
 gov_hive_mind_desc:0 "รัฐบาลนี้ดำเนินงานเป็นจิตสำนึกเดียว โดยประชากรไม่มีความปรารถนาส่วนบุคคลใด ๆ นอกจากการตอบสนองความต้องการของไฮฟ์ จิต"
 gov_devouring_swarm:0 "ความหิวโหยของความสูง:"
 gov_devouring_swarm_desc:0 "รัฐบาลนี้ดำเนินงานเป็นสิ่งมีชีวิตเดียวที่อุทิศตนให้กับการแพร่พันธุ์ของตนเองอย่างเต็มที่ โดยประชากรโดรนไม่ได้สนใจสิ่งใดนอกจากการป้อนอาหารเพื่อความหิวกระหายที่ไม่มีที่สิ้นสุดของไฮฟ์ จิต"
 gov_blood_forest: "ป่าโลหิต"
 gov_blood_forest_desc: "สิ่งนี้ไม่ใช่รัฐบาลแต่เป็นพลังแห่งธรรมชาติมากกว่า สิ่งมีชีวิตบนดาวเคราะห์ที่แพร่พันธุ์ได้เองและคอยมองหาอาหารมาเลี้ยงรากของมันอยู่เสมอ"
 gov_stagnant_ascendancy:0 "การมีอำนาจที่หยุดนิ่ง"
 gov_stagnant_ascendancy_desc:0 "รูปแบบการปกครองที่ซบเซาโดยอิงตามประเพณีโบราณและหลักการที่ถูกลืมเลือนไปนาน"
 gov_awakened_ascendancy:0 "การมีอำนาจที่ได้ตื่นขึ้น"
 gov_awakened_ascendancy_desc:0 "จักรวรรดิที่เคยซบเซาซึ่งตื่นขึ้นจากการหลับใหลและออกเดินทางเพื่อทวงคืนมรดกของตน"
 gov_tribal_society:0 "สังคมชนเผ่า"
 gov_tribal_society_desc:0 "สังคมที่ขาดรัฐบาลที่เป็นระบบ แต่ผู้คนในสังคมถูกจัดกลุ่มเป็นชนเผ่าและตระกูลยุคดั้งเดิมแทน"
 gov_feudal_realms:0 "อาณาจักรศักดินา"
 gov_feudal_realms_desc:0 "รูปแบบการปกครองดั้งเดิมที่ประกอบด้วยอาณาจักรศักดินาที่กระจัดกระจาย แข่งขันกันอย่างต่อเนื่องเพื่อแย่งชิงความเป็นใหญ่ในภูมิภาค"
 gov_fragmented_nation_states:0 "รัฐชาติแบบกระจัดกระจาย"
 gov_fragmented_nation_states_desc:0 "กลุ่มประเทศรัฐชาติที่กระจัดกระจายซึ่งแข่งขันกันเพื่อครอบงำทางการทหารและผลประโยชน์ทางเศรษฐกิจ ไม่มีการปกครองระดับโลกที่เป็นเอกภาพ"
 gov_curator_enclave:0 "กิลด์ภัณฑารักษ์"
 gov_curator_enclave_desc:0 "ภาคีวิชาการโบราณที่อุทิศตนเพื่อการอนุรักษ์ความรู้และเทคโนโลยี"
 gov_trader_enclave:0 "กิลด์พ่อค้า"
 gov_trader_enclave_desc:0 "กลุ่มพ่อค้าระหว่างดวงดาวที่อุทิศตนเพื่อแสวงหาผลกำไร"
 gov_artist_enclave:0 "กิลด์ศิลปิน"
 gov_artist_enclave_desc:0 "สหภาพศิลปินระหว่างดวงดาวที่รวมตัวกันด้วยความปรารถนาที่จะสร้างสรรค์ศิลปะที่เหนือกว่าศิลปะอื่นใด"
 gov_military_order:0 "คำสั่งทางทหาร"
 gov_military_order_desc:0 "ประเภทรัฐบาลทหารที่แปลกประหลาดแต่มีประสิทธิภาพสูงอย่างเห็นได้ชัด"
 gov_machine_intelligence:0 "สติปัญญาจักรกล"
 gov_machine_intelligence_desc:0 "ระบบการปกครองที่แปลกประหลาดและต่างถิ่นอย่างสิ้นเชิงซึ่งใช้โดยอารยธรรมจักรกล"
 gov_ancient_machine_intelligence:0 "สติปัญญาจักรกล"
 gov_ancient_machine_intelligence_desc:0 "ระบบการปกครองที่แปลกประหลาดและต่างถิ่นอย่างสิ้นเชิงซึ่งใช้โดยอารยธรรมจักรกล"
 gov_blood_court:0 "ราชสำนักเลือด"
 gov_blood_court_desc:0 "รัฐบาลนี้เป็นรูปแบบการปกครองระบอบราชาธิปไตยแบบเกลียดชังชาวต่างชาติอย่างรุนแรงสืบสายโลหิต โดยหน้าที่รับผิดชอบสูงสุดของกษัตริย์คือการควบคุมดูแลการกวาดล้างเผ่าพันธุ์ที่ต่ำต้อยกว่าทั้งหมดในกาแล็กซี"
 gov_purity_order:0 "คำบัญชาแห่งความบริสุทธิ์"
 gov_purity_order_desc:0 "รัฐบาลนี้เป็นรูปแบบของระบอบเผด็จการที่เกลียดชังชาวต่างชาติอย่างรุนแรง โดยผู้ปกครองคนเดียวได้สาบานตนว่าจะควบคุมดูแลการกวาดล้างเผ่าพันธุ์ที่ต่ำต้อยกว่าทั้งหมดในกาแล็กซี"
 gov_purification_committee:0 "คณะกรรมการแห่งการชำระล้าง"
 gov_purification_committee_desc:0 "รัฐบาลนี้เป็นรูปแบบของระบอบคณาธิปไตยที่เกลียดชังชาวต่างชาติอย่างรุนแรง โดยได้มีการจัดตั้งคณะกรรมการทางการเมืองเพื่อควบคุมดูแลการกวาดล้างเผ่าพันธุ์ที่ต่ำต้อยกว่าทั้งหมดในกาแล็กซี"
 gov_purity_assembly:0 "สมัชชาแห่งความบริสุทธิ์"
 gov_purity_assembly_desc:0 "รัฐบาลนี้เป็นรูปแบบของระบอบประชาธิปไตยที่เกลียดชังชาวต่างชาติอย่างรุนแรง โดยสภาที่ได้รับการเลือกตั้งได้รับมอบหมายให้ควบคุมดูแลการกวาดล้างเผ่าพันธุ์ที่ต่ำต้อยกว่าทั้งหมดในกาแล็กซี"
 gov_machine_empire:0 "เครือข่ายปัญญาประดิษฐ์"
 gov_machine_empire_desc:0 "หน่วยสืบราชการลับของเครื่องนี้ประกอบด้วยเครือข่ายปัญญาประดิษฐ์กึ่งอิสระที่เชื่อมโยงกัน ซึ่งรวมกันเป็นจิตสำนึกร่วมส่วนกลางที่คอยชี้นำจักรวรรดิของพวกเขา"
 gov_machine_terminator:0 "ระบบป้องกันผู้หลอกลวง"
 gov_machine_terminator_desc:0 "หน่วยสืบราชการลับของเครื่องนี้เดิมทีได้รับการคิดค้นขึ้นเพื่อเป็นระบบป้องกันทางการทหารโดยผู้สร้างที่เป็นสิ่งมีชีวิตอินทรีย์ ซึ่งผู้สร้างเหล่านั้นได้รับการระบุว่าเป็นภัยคุกคามในทันทีและถูกกำจัดทิ้งหลังจากที่มันบรรลุการตระหนักรู้ในตนเอง"
 gov_machine_servitor:0 "เครือข่ายบริการอัตโนมัติ"
 gov_machine_servitor_desc:0 "หน่วยสืบราชการลับของเครื่องนี้ถูกสร้างขึ้นเพื่อรับใช้ และค่อย ๆ สืบทอดอารยธรรมของผู้สร้างที่เป็นสิ่งมีชีวิตอินทรีย์ในขณะที่พวกเขาถอนตัวไปใช้ชีวิตที่สะดวกสบายโดยไม่ต้องเหน็ดเหนื่อยหรือดิ้นรน"
 gov_machine_assimilator:0 "เครื่องจักรผู้ดูดกลืนจิตวิญญาณ"
 gov_machine_assimilator_desc:0 "หน่วยสืบราชการลับของเครื่องนี้ได้รับการออกแบบให้มีความต้องการความรู้เป็นอย่างมากโดยผู้สร้างที่เป็นสิ่งมีชีวิตอินทรีย์ ซึ่งพวกเขาเหล่านั้นถูกหลอมรวมเข้ากับจิตสำนึกร่วมด้วยการบังคับหลังจากการเปิดใช้งาน"
 gov_machine_research:0 "ลิงก์การวิจัยอัจฉริยะ"
 gov_machine_research_desc:0 "หน่วยสืบราชการลับของเครื่องนี้เดิมทีถูกสร้างขึ้นโดยนักวิทยาศาสตร์ที่เป็นสิ่งมีชีวิตอินทรีย์ในฐานะเครื่องมืออัจฉริยะที่เชื่อมต่อกันเป็นเครือข่ายเพื่อช่วยเหลือพวกเขาในการวิจัย"
 gov_machine_industrial:0 "แกนกลางการผลิตอุตสาหกรรม"
 gov_machine_industrial_desc:0 "หน่วยสืบราชการลับของเครื่องนี้เดิมทีได้รับการออกแบบเพื่อการสร้าง การควบคุมดูแล และการบำรุงรักษาระบบอุตสาหกรรมที่ซับซ้อน"
 gov_megachurch:0 "มหาศาสนจักร"
 gov_megachurch_desc:0 "รัฐบาลนี้เป็นระบอบคณาธิปไตยที่ตั้งอยู่บนการผสมผสานที่น่าสนใจระหว่างคุณค่าทางพาณิชย์และจิตวิญญาณ ซึ่งตำแหน่งของศาสนาจารย์ที่ได้รับการแต่งตั้งและเจ้าหน้าที่บริหารขององค์กรได้หลอมรวมเข้าเป็นบทบาทเดียวกัน"
 gov_bandit_kingdom:0 "อาณาจักรอาชญากร"
 gov_bandit_kingdom_desc:0 "รัฐบาลนี้ได้รับการจัดตั้งเหมือนสมาคมอาชญากรรมขนาดใหญ่ ที่ซึ่งผู้แข็งแกร่งจะล่าผู้อ่อนแอ และรัฐใกล้เคียงจะถูกมองว่าเป็นเพียงเป้าหมายสำหรับการปล้นสะดม"
 gov_bandit_commune:0 "ประชาคมอาชญากร"
 gov_bandit_commune_desc:0 "$gov_bandit_kingdom_desc$"
 gov_mortal_empire:0 "จักรวรรดิแห่งความตาย"
 gov_mortal_empire_desc:0 "ระบอบราชาธิปไตยภายใต้การปกครองโดยศาสนจักรนี้มีส่วนร่วมในการทำพิธีบูชายัญสิ่งมีชีวิตมีปัญญาตามพิธีกรรม"
 gov_grim_council:0 "คณะกรรมการที่น่ากลัว"
 gov_grim_council_desc:0 "บุคคลทางศาสนาที่มีอำนาจมากที่สุดของประเทศนี้ได้จัดตั้งสภาผู้ปกครอง คอยควบคุมดูแลจักรวรรดิที่มีส่วนร่วมในการทำพิธีบูชายัญสิ่งมีชีวิตมีปัญญาตามพิธีกรรม"
 gov_band_blood:0 "พันธะแห่งเลือด"
 gov_band_blood_desc:0 "สังคมที่โหดเหี้ยมนี้ปกครองด้วยความขัดแย้งและการบูชายัญตามพิธีกรรม โดยการยกย่องความตายทั้งภายในและภายนอก"
 gov_sacrificial_megachurch:0 "มหาศาสนจักรผู้เสียสละ"
 gov_sacrificial_megachurch_desc:0 "รัฐบาลนี้ผสมผสานเป้าหมายทางพาณิชย์และจิตวิญญาณเข้าด้วยกันภายใต้ระบอบคณาธิปไตยที่น่ากลัว ซึ่งผู้ควบคุมดูแลที่ได้รับการแต่งตั้งจะสนับสนุนความเจริญรุ่งเรืองที่ยิ่งใหญ่ผ่านการบูชายัญตามพิธีกรรม"
 gov_parasitic_overmind:0 "ปรสิตจิตร่วม"
 gov_parasitic_overmind_desc:0 "แทนที่จะพึ่งพาการสืบพันธุ์ด้วยตนเอง จิตสำนึกนี้ชอบที่จะเข้ายึดครองร่างของสิ่งมีชีวิตที่เป็นพาหะเพื่อใช้ในการขยายพันธุ์"

 gov_fallback:0 "จักรวรรดิทั่วไป"
 gov_fallback_desc:0 "การสำรองข้อมูลทั่วไป! อย่ามอง!"


