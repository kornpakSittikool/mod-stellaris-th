 # Wonders
 ####################################
 building_xeno_zoo:1 "สวนสัตว์เอเลี่ยน"
 building_xeno_zoo_plural: "สวนสัตว์เอเลี่ยน"
 building_xeno_zoo_desc:1 "แหล่งอนุรักษ์ที่อุทิศให้กับการปกป้องและการศึกษาพืชพรรณและสัตว์ป่าในท้องถิ่น"
 building_fe_xeno_zoo:0 "ที่อนุรักษ์พันธุ์ต่างดาว (เมืองหลวง)"
 building_hab_capital:0 "ศูนย์บริหารและที่อยู่อาศัย (เมืองหลวง)"
 building_hab_capital_desc:0 "ศูนย์กลางการบริหารของอยู่อาศัยซึ่งทำหน้าที่เป็นเมืองหลวงและเป็นที่ตั้งของรัฐบาลท้องถิ่น"
 building_hab_capital_tooltip: "£mod_planet_max_districts_add£ ช่องเขตสูงสุดจากวัตถุท้องฟ้าหลัก: §G+0.25§!
"
 building_hab_solar_power_processor:0 "เครื่องประมวลผลพลังงานแสงอาทิตย์"
 building_hab_solar_power_processor_desc:0 "เครื่องประมวลผลพลังงานแสงอาทิตย์ช่วยกระจายพลังงานแสงอาทิตย์ที่จับได้จากแผงโซลาร์เซลล์จำนวนมากที่ติดตั้งอยู่บนตัวยานชั้นนอกของสถานีอยู่อาศัย(ฮาบิแทต)"
 building_hab_astro_mining_facility:0 "ที่ทำเหมืองแร่ในอวกาศ"
 building_hab_astro_mining_facility_desc:0 "เนื่องจากไม่มีทรัพยากรธรรมชาติเป็นของตัวเอง สถานีอยู่อาศัยจึงต้องพึ่งพาสิ่งอำนวยความสะดวกเหล่านี้ในการขุดและแปรรูปแร่ธาตุจากดาวเคราะห์น้อยและดาวเคราะห์แคระในบริเวณใกล้เคียง"
 building_hab_agri_bay:0 "โซนเกษตรกรรม"
 building_hab_agri_bay_desc:0 "ส่วนหนึ่งของสถานีอยู่อาศัยที่แยกไว้สำหรับการเพาะปลูกพืชและเลี้ยงสัตว์ต่างๆ ที่ประชากรท้องถิ่นต้องการ"
 building_hab_cultural_center:0 "เขตความบันเทิง"
 building_hab_cultural_center_desc:0 "ศูนย์รวมอาคารที่กว้างขวางแห่งนี้รองรับความต้องการทางวัฒนธรรมและสังคมของผู้อยู่อาศัยในสถานีอยู่อาศัย"
 building_hab_laboratory_module:0 "ห้องปฏิบัติการซับซ้อน"
 building_hab_laboratory_module_desc:0 "ส่วนหนึ่งของสถานีอยู่อาศัยที่อุทิศให้กับการแสวงหาความรู้ทางวิทยาศาสตร์โดยเฉพาะ"
 building_fe_xeno_zoo_desc:0 "การ อนุรักษ์ ที่ ซับ ซ้อน อย่าง ยิ่ง ซึ่ง รักษา ถิ่น อาศัย ตาม ธรรมชาติ ของ นก\"รับรอง\"แหล่งอนุรักษ์ที่มีความซับซ้อนและล้ำสมัยสูงซึ่งช่วยรักษาถิ่นที่อยู่ตามธรรมชาติของ"
 building_paradise_dome:0 "โดมพาราไดซ์"
 building_paradise_dome_desc:2 "โดมที่อยู่อาศัยแบบปิดมิดชิดที่มีระบบนิเวศในตัว สวรรค์ส่วนตัวที่แท้จริงสำหรับผู้ที่ร่ำรวยหรือโชคดีพอที่จะได้อาศัยอยู่ที่นั่น"
 building_monument:0 "อนุสาวรีย์"
 building_monument_desc:0 "อนุสาวรีย์เชิดชูเกียรติผู้ปกครองที่ยิ่งใหญ่"
 building_monument_proper:0 "อนุสาวรีย์ของ [GetRulerName]"
 building_monument_desc_proper:0 "อนุสาวรีย์ขนาดใหญ่เพื่อเชิดชูเกียรติแด่ [GetRulerName] ผู้ยิ่งใหญ่"
 building_grand_mausoleum:0 "สุสานหลวงขนาดใหญ่"
 building_grand_mausoleum_desc:0 "สุสานขนาดใหญ่ที่สร้างขึ้นเพื่อเป็นที่ประดิษฐานหลุมฝังศพของผู้ปกครองที่ยิ่งใหญ่"
 building_grand_mausoleum_proper:0 "สุสานหลวงขนาดใหญ่ของ [GetRulerName]"
 building_grand_mausoleum_desc_proper:0 "สุสานอันศักดิ์สิทธิ์ของ [GetRulerName] ผู้เป็นที่เคารพรัก"
 building_grand_mausoleum_allowed_tooltip:1 "ต้องมี §Yผู้ปกครอง§!"
ต้องมี
§Yการบริหารส่วนท้องถิ่นดาวเคราะห์§!,
§Yเมืองหลวงดาวเคราะห์§!, หรือ
§Yศูนย์กลางเมืองหลวงจักรวรรดิ§!
สร้างขึ้นบนดาวเคราะห์ดวงนี้"
 building_royal_gardens:0 "สวนหลวง"
 building_royal_gardens_desc:0 "สวนพักผ่อนขนาดใหญ่ที่ผู้คนจะมารวมตัวกันและชื่นชมยินดีเพื่อรำลึกถึงผู้ปกครองที่ยิ่งใหญ่"
 building_royal_gardens_proper:0 "สวนหลวงของ [GetRulerName]"
 building_royal_gardens_desc_proper:0 "สวนอันน่าทึ่งที่พัฒนาขึ้นโดย [GetRulerName] ผู้ยิ่งใหญ่"
 building_galactic_stock_exchange:0 "ตลาดหลักทรัพย์กาแล็กติก"
 building_galactic_stock_exchange_desc:0 "การเปิดการค้าเสรีของสินค้าและบริการช่วยให้เราสามารถสร้างเศรษฐกิจที่เชี่ยวชาญเฉพาะด้านได้มากขึ้น ที่ซึ่งแต่ละบุคคลสามารถสร้างความโดดเด่นในสาขาแคบๆ และทำการค้าเพื่อตอบสนองความต้องการของตนได้"
 building_ministry_production:0 "กระทรวงการผลิต"
 building_ministry_production_desc:0 "กระทรวงการผลิตทำงานอย่างไม่รู้จักเหน็ดเหนื่อยเพื่อจัดระเบียบและปรับปรุงสายการผลิตทั่วทั้งดาวเคราะห์"
 building_production_center:0 "ศูนย์แปรสภาพทรัพยากร"
 building_production_center_desc:1 "สิ่งอำนวยความสะดวกขนาดใหญ่ที่รวมศูนย์การจัดการทรัพยากรและการผลิตทั่วทั้งดาวเคราะห์"
 building_supercomputer:1 "ซูเปอร์คอมพิวเตอร์ดาวเคราะห์"
 building_supercomputer_desc:1 "ซูเปอร์คอมพิวเตอร์ขนาดใหญ่เพียงเครื่องเดียวที่สามารถทำการคำนวณที่ซับซ้อนอย่างยิ่งยวดได้ ช่วยปรับปรุงผลผลิตการวิจัยของดาวเคราะห์ทั้งดวง"
 building_hyper_entertainment_forum:1 "สภาความบันเทิงขั้นสูง"
 building_hyper_entertainment_forum_desc:1 "สถานบันเทิงขนาดใหญ่เหล่านี้เป็นสถานที่ที่ความฝันจะกลายเป็นจริง มีทั้งศูนย์การค้า ร้านอาหาร สวนสนุก ตู้เกมเสมือนจริง และอื่นๆ อีกมากมาย สิ่งที่คุณฝันไว้ - เราเป็นให้คุณได้!"
 building_institute:0 "สถาบันวิจัย"
 building_institute_desc:1 "สถาบันวิจัยเป็นศูนย์รวมขนาดใหญ่ที่รวบรวมวิทยาการล้ำหน้าของสาขาต่างๆ เข้ามารวมกันเพื่อสร้างการทำงานร่วมกันอย่างที่ไม่เคยมีมาก่อน ช่วยปรับปรุงผลผลิตการวิจัยของดาวเคราะห์ทั้งดวง"
 building_virtual_combat_arena:0 "สนามต่อสู้เสมือนจริง"
 building_virtual_combat_arena_desc:1 "สนามรบเสมือนจริงทำหน้าที่เป็นทั้งความบันเทิงและช่องทางในการส่งเสริมความสามัคคีในชุมชน กองทัพท้องถิ่นสามารถใช้สนามรบเสมือนจริงนี้ในการฝึกซ้อมเสมือนจริงได้เช่นกัน"
 building_monument_purity:0 "อนุสาวรีย์แห่งความบริสุทธิ์"
 building_monument_purity_desc:1 "$tech_purity_campaigns_desc$"
 building_orillium_factory:0 "โรงงานวัตถุระเบิดออริลเลียม"
 building_orillium_factory_desc:1 "คุณสมบัติเฉพาะของแร่ออริลเลียมช่วยให้มันสามารถนำไปแปรรูปเป็นวัตถุระเบิดที่ปรับแต่งได้ง่าย เหมาะอย่างยิ่งสำหรับการระเบิดที่ควบคุมได้ในการทำเหมืองแร่ชั้นลึก"
 building_pitharan_plant:0 "โรงงานปุ๋ยพิธารัน"
 building_pitharan_plant_desc:1 "โรงงานปุ๋ยพิธารันผลิตปุ๋ยโดยใช้ฝุ่นพิธารันเป็นสารเติมแต่ง ช่วยปรับปรุงผลผลิตพืชผล"
 building_military_academy:0 "โรงเรียนการทหาร"
 building_military_academy_desc:1 "โรงเรียนทหารช่วยปรับปรุงอัตราการรับสมัครในท้องถิ่นและมอบมาตรฐานการฝึกอบรมที่สูงขึ้น"
 building_symbol_unity:0 "สัญลักษณ์แห่งเอกภาพ"
 building_symbol_unity_desc:0 "$tech_symbol_unity_desc$"
 building_visitor_center:0 "ศูนย์บริการนักท่องเที่ยว"
 building_visitor_center_desc:0 "$tech_visitor_center_desc$"
 building_alien_sanctuary:0 "เขตรักษาพันธุ์เอเลี่ยน"
 building_alien_sanctuary_desc:0 "$tech_alien_sanctuary_desc$"
 building_psi_corps:0 "หน่วยทหารพลังจิต"
 building_psi_corps_desc:0 "จากทั่วทั้งจักรวรรดิของเรา [GetIndividualNamePlural] พลังจิตจะถูกนำตัวมาที่นี่เพื่อฝึกฝนความสามารถของพวกเขา"

