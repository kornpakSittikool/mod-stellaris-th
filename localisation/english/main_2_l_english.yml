 sm_refinery:0 "โรงงานสกัด"
 sm_synchronized_defenses:0 "การป้องกันแบบซิงโครไนซ์"
 sm_corvette_assembly_yards:0 "อู่ประกอบเรือคอร์เวต"
 sm_destroyer_assembly_yards:0 "อู่ประกอบเรือพิฆาต"
 sm_cruiser_assembly_yards:0 "อู่ประกอบเรือลาดตระเวน"
 sm_battleship_assembly_yards:0 "อู่ประกอบเรือประจัญบาน"
 sm_reinforced_hull_layers:0 "เลเยอร์เกราะตัวเรือเสริมแรง"
 sm_observatory:0 "หอสังเกตการณ์"
 sm_engineering_bay:0 "ที่ทำงานวิศวกรรม"
 sm_crew_quarters:0 "ห้องพักลูกเรือ"
 sm_crew_quarters_desc:0 "จัดหาที่พักและการสนับสนุนสำหรับลูกเรือของยานอวกาศ ช่วยลดภาระทางโลจิสติกส์ของกองยานที่เข้าจอดที่นี่\n"
 sm_crew_quarters_machine_intelligence:0 "ระบบช่วยซ่อม"
 sm_crew_quarters_desc_machine_intelligence:0 "สายเคเบิลบริการเชื่อมต่อกองยานที่เข้าจอดโดยตรงกับแกนปัญญาประดิษฐ์ของสถานี ช่วยให้สามารถช่วยเหลือในการซ่อมแซมและปรับปรุงยานได้\n"
 sm_crew_quarters_hive_mind:0 "ห้องกำเนิดโดรน"
 sm_crew_quarters_desc_hive_mind:0 "ความสามารถในการกำเนิดและฟักตัวโดรนลูกเรือในพื้นที่โดยตรง ถือเป็นประโยชน์อย่างยิ่งทางโลจิสติกส์ต่อกองยานในท้องถิ่น\n"
 sm_hydroponic_farms:0 "ฟาร์มไฮโดรโปนิกส์วงโคจร"
 sm_orbital_mind_control_laser:0 "เลเซอร์ควบคุมจิตใจ"
 sm_fallen_empire_weapon:0 "โมดูลป้องกันแทคิออนแลนซ์"
 sm_pioneering_terminal:0 "สถานีปลายทางบุกเบิก"
 sm_solar_panel_network:0 "เครือข่ายแผงโซลาร์เซลล์"
 sm_neutronium_fission_plant:0 "โรงไฟฟ้านิวเคลียร์ฟิชชันนิวโทรเนียม"
 sm_fleet_academy:0 "สถานศึกษากองยานรบ"
 sm_fleet_academy_machine_intelligence:0 "เครื่องจำลองการรบ"
 sm_fleet_academy_hive_mind:0 "$sm_fleet_academy_machine_intelligence$"
 sm_fleet_academy_desc:0 "เพื่อให้ลูกเรือที่รับสมัครใหม่ของเราพร้อมรบอย่างแท้จริง พวกเขาต้องมีนายทหารที่มีความสามารถคอยนำทาง สถาบันกองยานจะช่วยรับประกันว่านายทหารเหล่านั้นจะมีความรู้ที่ทันสมัยเกี่ยวกับหลักนิยมและการปฏิบัติของการทำสงครามระหว่างดวงดาว"
 sm_fleet_academy_desc_machine_intelligence:0 "การจำลองสถานการณ์การรบแบบต่าง ๆ ซ้ำ ๆ จะช่วยเตรียมความพร้อมโดรนรบประจำยานของเราสำหรับการรบจริงได้ดียิ่งขึ้น"
 sm_fleet_academy_desc_hive_mind:0 "$sm_fleet_academy_desc_machine_intelligence$"
 sm_navigator_guild:0 "สมาคมผู้นำร่อง"
 sm_living_metal_armory:0 "คลังแสงเก็บโลหะมีชีวิต"
 sm_dark_matter_factory:1 "เครื่องปฏิกรณ์สสารมืด (เครื่องกำเนิดพลังงาน)"
 sm_colossus_yards:1 "ลานประกอบขนาดมหึมา"
 sm_colossus_yards_desc:1 "ละทิ้งแนวคิดแบบเดิม ๆ ของอู่แห้ง ยานอวกาศขนาดมหึมาจะถูกประกอบขึ้นโดยแพลตฟอร์มก่อสร้างอิสระที่มีความคล่องตัวสูงจำนวนหนึ่ง\n"
 sm_colossus_yards_desc_modifier:0 "อู่ต่อยาน: §Yเปิดการก่อสร้างโคลอสซัส§!"
 sm_titan_yards:0 "ลานประกอบยานไททัน"
 sm_titan_yards_desc:0 "อู่แห้งเฉพาะทางที่สร้างขึ้นบนตัวสถานีอวกาศช่วยให้สามารถสร้างยานระดับไททันขนาดมหึมาได้\n"
 sm_titan_yards_desc_modifier:0 "อู่ต่อยาน: §Yเปิดการก่อสร้างไททัน§!"
 sm_dockyard:0 "อู่ต่อยาน"
 sm_shipyard:0 "อู่ต่อยาน"
 sm_shipyard_desc:0 "อู่ต่อเรือสามารถสร้างยานได้ครั้งละหนึ่งลำ ขนานไปกับอู่ต่อเรืออื่น ๆ\n"
 sm_gun_battery:0 "ป้อมปืน"
 sm_gun_battery_desc:0 "เพิ่มช่องติดตั้งอาวุธขนาดกลางสองช่องให้กับสถานีอวกาศ\n"
 sm_missile_battery:1 "ป้อมยิงตอร์ปิโด"
 sm_missile_battery_desc:2 "เพิ่มช่องติดตั้งอาวุธนำวิถีสองช่องให้กับสถานีอวกาศ\n"
 sm_mining_terminal:0 "สถานีปลายทางขุดเจาะ (ลบออก?)"
 sm_trading_hub:1 "ฮับการค้า"
 sm_trading_hub_plural: "ศูนย์กลางการค้า"
 sm_trading_hub_desc:0 "พื้นที่จอดเรือพลเรือนที่พ่อค้าและผู้ค้าสามารถดำเนินธุรกิจได้\n"
 sm_anchorage:0 "ที่จอดยาน"
 sm_anchorage_desc:0 "ที่ทอดสมอกองยานมีความจำเป็นเพื่อสนับสนุนการเติบโตของกองทัพเรือของเรา\n"
 sm_hangar_bay:0 "โรงเก็บเครื่องบิน"
 sm_hangar_bay_desc:1 "เพิ่มอู่เก็บเครื่องบินรบขนาดเล็กให้กับสถานีอวกาศ\n"
 sm_astromining_bay: "ที่ทำเหมืองแร่ในอวกาศ"
 sm_astromining_bay_desc: "อู่เก็บยานและคลังสินค้าเพื่อสนับสนุนการปฏิบัติการเก็บทรัพยากรในระบบดวงดาว"
 sm_ftl_inhibitor:0 "ตัวยับยั้งการขับเคลื่อนที่เร็วกว่าแสง"
 sm_ftl_inhibitor_desc:1 "ในขณะที่ฐานดวงดาวยังคงทำงานอยู่ตัวยับยั้ง FTL( ตัวเลข)การขับเคลื่อนที่เร็วกว่าแสง) ของมันจะป้องกันไม่ให้ยานรบศัตรูออกจากระบบไปตามไฮเปอร์เลนอื่นๆนอกเหนือจากเลนที่พวกเขาเข้ามา"
 sm_communications_jammer:0 "เครื่องรบกวนสัญญาณสื่อสาร"
 sm_communications_jammer_desc:1 "เครื่องรบกวนสัญญาณอันทรงพลังเหล่านี้จะรบกวนการสื่อสารระหว่างยานของศัตรู ทำให้ยากต่อการประสานงานการเคลื่อนทัพของกองยาน\n"
 sm_disruption_field:0 "เครื่องกำเนิดสนามพลังขัดขวาง"
 sm_disruption_field_desc:0 "สร้างสนามพลังเฉพาะที่ของอนุภาคต่ำกว่าอะตอมที่ถูกกระตุ้นรอบยานศัตรูในระบบ ซึ่งจะช่วยลดประสิทธิภาพของโล่ป้องกันของพวกมันลงอย่างมาก\n"
 sm_warp_fluctuator:0 "ระบบนำทางไฮเปอร์เลน"
 sm_warp_fluctuator_desc:2 "ช่วยเหลือยานฝ่ายเดียวกันในการเดินทางด้วยความเร็วเหนือแสง(FTL)ในระบบโดยระบุเงื่อนไขที่เหมาะสมที่สุดสำหรับการเข้าสู่ไฮเปอร์เลน และเพิ่มประสิทธิภาพเส้นทางการเดินทางที่คาดการณ์ไว้\n"
 warp_fluctuator_tt: "$trade_with_icon$ จาก [Root.GetTradingHubPluralType]: §G+2§!"
 sm_transit_hub:0 "ฮับการเดินทาง"
 sm_transit_hub_desc:0 "โครงสร้างพื้นฐานเฉพาะสำหรับยานที่ไม่ใช่ทหาร ช่วยให้เครือข่ายการเดินทางเป็นไปอย่างราบรื่นและสะดวกสบาย\n"
 sm_transit_hub_desc_modifier:0 "ประชากร §Yคนงาน§! และ §Yโดรน§! ที่ว่างงานจากระบบนี้จะ - เว้นแต่จะอยู่ภายใต้การควบคุมการอพยพอื่น ๆ - ทำการ §Yอพยพ§! ไปยังดาวเคราะห์ดวงอื่นที่มีความเหมาะสมในการอยู่อาศัยที่ดี มีที่อยู่อาศัยและงานว่างโดยอัตโนมัติ ในระบบที่มี §Yศูนย์กลางการเดินทาง§!\n\n"
 sm_transit_hub_migrate_effect_desc:0 "§Yการไปตั้งรกรากใหม่โดยอัตโนมัติ§! ไปยังอาณานิคมอื่นๆ สำหรับ §Y$SLAVES$§! ที่ว่างงานและหุ่นยนต์(ไม่คุ้นเคย)ในระบบดาวนี้"
 sm_command_center:0 "ศูนย์บัญชาการ"
 sm_command_center_desc:1 "ความพยายามในการป้องกันระบบทั้งหมดจะได้รับการประสานงานจากสิ่งอำนวยความสะดวกขนาดใหญ่นี้ ซึ่งฝังอยู่ลึกในตัวสถานีอวกาศ แผนที่สามมิติและการฉายภาพสามมิติจะติดตามการจราจรทางอวกาศทั้งหมดที่ผ่านระบบในช่วงเวลาใดเวลาหนึ่ง\n"
 sm_defense_grid:0 "ซูเปอร์คอมพิวเตอร์กริดป้องกัน"
 sm_defense_grid_desc:0 "ซูเปอร์คอมพิวเตอร์อันทรงพลังที่ประสานงานวงโคจรสัมพัทธ์และมุมยิงของแพลตฟอร์มป้องกันของสถานีอวกาศ เพิ่มจำนวนแพลตฟอร์มป้องกันที่สามารถรองรับได้\n"
 sm_science_division:0 "กองวิทยาศาสตร์"
 sm_science_division_desc:0 "ผลผลิตของ §Y$sm_spire$§! เพิ่มขึ้น §Y2£physics£ 2£society£ 2£engineering£ §!."
 sm_offworld_trading_company:0 "บริษัทการค้านอกโลก"
 sm_offworld_trading_company_desc:0 "สำนักงานขององค์กรนอกภาครัฐที่อุทิศตนเพื่อปรับปรุงเงื่อนไขของการค้าระหว่างดวงดาว\n"
 sm_offworld_trading_company_desc_modifier:3 "$trade_with_icon$ จาก [Root.GetTradingHubPluralType]: §G+4§!\n\n"
 sm_nebula_refinery:0 "โรงงานสกัดเนบิวลา"
 sm_nebula_refinery_desc:0 "ด้วยการประมวลผลกลุ่มเมฆฝุ่นของเนบิวลา เราสามารถกลั่นกรองและสกัดแร่ธาตุที่มีค่าออกมาได้\n"
 sm_listening_post:0 "เครื่องฟังคลื่นเสียงสะท้อน"
 sm_listening_post_desc:0 "สถานีรับฟังเป็นที่ตั้งของทีมเจ้าหน้าที่เฉพาะทางที่มีหน้าที่วิเคราะห์การสะท้อนกลับของไฮเปอร์เลน ซึ่งจะช่วยขยายระยะเซนเซอร์ของสถานีอวกาศตามการทำงานจริง\n"
 sm_naval_logistics_office:0 "สำนักงานส่งกำลังบำรุงกองยานรบ"
 sm_naval_logistics_office_desc:1 "ระบบราชการที่ทำงานน้อยที่สุดแต่ก็ยังมีอยู่นั้น ช่วยเพิ่มความจุทางทฤษฎีของที่ทอดสมอของสถานีอวกาศ\n"
 sm_naval_logistics_office_desc_modifier:2 "ที่ทอดสมอ: §G+3§! §Yขีดความสามารถของกองทัพเรือ§!"
 sm_black_hole_observatory:0 "หอสังเกตการณ์หลุมดำ"
 sm_black_hole_observatory_desc:0 "ด้วยการสร้างสิ่งอำนวยความสะดวกทางวิทยาศาสตร์เฉพาะทางเพื่อการศึกษาหลุมดำ จักรวรรดิของเราย่อมสามารถเห็นการปรับปรุงความเข้าใจด้านฟิสิกส์ของเราได้อย่างแน่นอน\n"
 sm_deep_space_black_site:0 "ฐานปฏิบัติการลับ"
 sm_deep_space_black_site_desc:1 "พื้นที่ส่วนใหญ่ของสถานีอวกาศนี้ถูกกันไว้สำหรับฐานลับเฉพาะ(นั่งสีดํา)ที่ไม่มีอยู่อย่างเป็นทางการ ทั้งระบบจะได้รับการเฝ้าติดตามอย่างใกล้ชิดจากที่นี่ ในขณะที่เจ้าหน้าที่ข่าวกรองจะแทรกแซงสื่อท้องถิ่นและกิจกรรมทางสังคมอย่างระมัดระวังตามความสามารถของพวกเขาอย่างดีที่สุด\n"
 sm_resource_silo:1 "$building_resource_silo$"
 sm_resource_silo_desc:2 "$building_resource_silo_desc$\n"
 building_resource_silo:0 "ไซโลเก็บทรัพยากร"
 building_resource_silo_desc:0 "ไซโลทรัพยากรและสิ่งอำนวยความสะดวกในการจัดเก็บขนาดใหญ่ ซึ่งสามารถเก็บรักษาทรัพยากรจำนวนมากได้อย่างปลอดภัย"
 sm_hydroponics_bay:0 "ที่ปลูกพืชโดยไม่ใช้ดิน"
 sm_hydroponics_bay_desc:0 "ด้วยการจัดสรรพื้นที่ส่วนหนึ่งของสถานีอวกาศนี้สำหรับการทำฟาร์มไฮโดรโปนิกส์ สถานีจะสามารถเลี้ยงตัวเองได้และยังสามารถส่งออกผลผลิตส่วนเกินไปยังระบบอื่น ๆ ได้อีกด้วย"
 sm_target_uplink_computer:0 "คอมพิวเตอร์เชื่อมสัญญาณเป้าหมาย"
 sm_target_uplink_computer_desc:1 "คอมพิวเตอร์เล็งเป้าหมายขั้นสูงที่รวบรวมและวิเคราะห์ข้อมูลจากแหล่งเซนเซอร์ฝ่ายเดียวกันทั้งหมดในระบบ ทำให้สถานีอวกาศสามารถประมวลผลการเล็งเป้าหมายได้ง่ายขึ้นอย่างมาก\n"
 sm_curator_think_tank:0 "ที่เก็บข้อมูลของผู้ดูแลพิพิธภัณฑ์"
 sm_curator_think_tank_desc:0 "ด้วยการสร้างสิ่งอำนวยความสะดวกด้านการวิจัยที่มุ่งเน้นไปที่การเรียนรู้และการร่วมมือกับพวกคิวเรเตอร์(เครื่องช่วยหายใจ)เราสามารถช่วยขับเคลื่อนความก้าวหน้าทางวิทยาศาสตร์ของเราได้อย่างมีนัยสำคัญ\n"
 sm_art_college:0 "วิทยาลัยศิลปะ"
 sm_art_college_desc:1 "This zero-g Art College, operated in conjunction with the nearby Artisan Enclave, celebrates the beauty of outer space in the works produced by its talented students.\n"
 sm_salvager_workshop:0 "โรงงานกู้ซาก"
 sm_salvager_workshop_desc:0 "This bustling annex equips our engineering teams with a cornucopia of tools and spare parts, facilitating closer collaboration with the nearby Salvager Enclave.\n"
 sm_shroud_beacon:0 "บีคอนชราวด์"
 sm_shroud_beacon_desc:2 "บีคอนพลังจิตที่ใช้เพื่อสร้างอุโมงค์ชราวด์ในระบบนี้ แม้ว่าบีคอนชราวด์อาจถูกรื้อถอน (หรือถูกทำลาย) ได้ แต่อุโมงค์เองนั้นไม่สามารถลบออกได้\n"
 sm_mercenary_garrison:0 "ค่ายทหารรับจ้าง"
 sm_mercenary_garrison_desc:0 "กลุ่มโรงนอนที่รองรับผู้รับเหมาทางทหาร เหล่าทหารผ่านศึกกรำศึกเหล่านี้จะจัดเตรียมการฝึกซ้อมอย่างสม่ำเสมอสำหรับลูกเรือที่เหลือ และพร้อมที่จะปกป้องสถานีตราบใดที่เราจ่ายเงินให้พวกเขา\n"
 sm_astromining_hub: "ฮับทำเหมืองแร่ในอวกาศ"
 sm_astromining_hub_desc: "สำนักงานและสิ่งอำนวยความสะดวกในการประมวลผลเหล่านี้เป็นที่อยู่ของวิศวกรและผู้ประสานงานสำหรับการปฏิบัติการรวบรวมทรัพยากรของเราในระบบ ด้วยการเพิ่มประสิทธิภาพอย่างระมัดระวังและกระบวนการจัดเก็บที่เหนือกว่า เราสามารถเก็บเกี่ยวแหล่งแร่ในท้องถิ่นได้อย่างมีประสิทธิภาพอย่างที่ไม่เคยมีมาก่อน\n"
