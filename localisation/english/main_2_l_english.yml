# Origin Events

 TIMELINE_EVENT_GALACTIC_DOORSTEP_TOOLTIP: "§H$origin.1050.name$§!
§Yเหตุการณ์กำเนิด§!

ขณะนี้ยานของเราสามารถข้ามไปยังประตูคู่แฝดของมันได้แล้ว และเพื่อเป็นของขวัญชิ้นสุดท้าย ผู้สร้างมันได้ส่งมอบความลับในการก่อสร้างมาให้เรา สิ่งที่เคยเป็นปริศนาในตอนนี้กระจ่างชัดแล้ว ในไม่ช้าเราจะสร้างเกตเวย์ของเราเอง ทำให้การเดินทางข้ามจักรวรรดิทำได้เกือบจะในพริบตา"
 TIMELINE_EVENT_GALACTIC_DOORSTEP: "มงกุฎทมิฬเปิดออก
§L[GetDate]§!"
 TIMELINE_EVENT_LOST_COLONY_TOOLTIP: "§Hค้นพบโลกมาตุภูมิ§!
§Yเหตุการณ์กำเนิด§!

เราได้ทำการติดต่อกับอารยธรรมที่ให้กำเนิดอาณานิคมที่สาบสูญของเราแล้ว แม้ว่าเวลาและระยะทางจะหล่อหลอมเราให้กลายเป็นสิ่งใหม่ แต่ต้นกำเนิดของเรานั้นชัดเจนแล้วในตอนนี้ เสียงสะท้อนจากอดีตที่ใช้ร่วมกันจะช่วยนำทางอนาคตของเรา"
 TIMELINE_EVENT_LOST_COLONY: "บ้านที่เคยสาบสูญ
§L[GetDate]§!"
 TIMELINE_EVENT_RESOURCE_CONSOLIDATION_TOOLTIP: "§Hสร้างโลกจักรกล§!
§Yเหตุการณ์กำเนิด§!

เราได้สร้างสรรค์โลกจักรกลที่แท้จริง ซึ่งปราศจากความไร้ประสิทธิภาพและความเสื่อมสลายของสารอินทรีย์ อนาคตจะถูกสร้างขึ้นด้วยเหล็กกล้าและควบคุมโดยอัลกอริทึม"
 TIMELINE_EVENT_RESOURCE_CONSOLIDATION: "โลกที่ถูกสร้างใหม่
§L[GetDate]§!"
 TIMELINE_EVENT_REMNANTS_TOOLTIP: "§Hฟื้นฟูอีคิวเมโนโพลิส§!
§Yเหตุการณ์กำเนิด§!

จักรวรรดิของเราได้ฟื้นฟูโลกมาตุภูมิให้กลับมารุ่งเรืองดังเดิม จากอารยธรรมที่เคยปรักหักพัง บัดนี้มันตั้งตระหง่านอีกครั้งในฐานะอีคิวเมโนโพลิสอันยิ่งใหญ่ ข้อพิสูจน์ถึงความมุ่งมั่นและความทะเยอทะยานของอารยธรรมเรา"
 TIMELINE_EVENT_REMNANTS: "โลกที่ถูกสร้างใหม่
§L[GetDate]§!"
 TIMELINE_EVENT_SHATTERED_RING_TOOLTIP: "§Hฟื้นฟูริงเวิลด์§!
