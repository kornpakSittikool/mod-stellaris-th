 TECH_UNLOCK_OUTPOST_CONSTRUCTION_DESC:1 "§Hด่านหน้า§!\nฐานดาราในระดับพื้นฐานที่สุด ด่านหน้าเป็นสถานีติดอาวุธเบาที่สร้างขึ้นในวงโคจรของระบบดาวเพื่อขยายขอบเขตดินแดน ด่านหน้าไม่สามารถรองรับอาคารหรือโมดูลใดๆ และจะไม่แสดงในเอาต์ไลน์เนอร์"
 TECH_UNLOCK_STARPORT_CONSTRUCTION_TITLE:0 "§Hปลดล็อกการอัปเกรดฐานดวงดาว:§! ฐานจอดยานอวกาศสตาร์พอร์ต"
 TECH_UNLOCK_STARPORT_CONSTRUCTION_DESC:0 "§Hท่าอวกาศ§!\nการอัปเกรดจากด่านหน้า ท่าอวกาศสามารถรองรับอาคารได้หนึ่งหลังและโมดูลสองชุด"
 TECH_UNLOCK_STARHOLD_CONSTRUCTION_TITLE:0 "§Hปลดล็อกการอัปเกรดฐานดวงดาว:§! ฐานที่มั่นอวกาศดวงดาว"
 TECH_UNLOCK_STARHOLD_CONSTRUCTION_DESC:0 "§Hฐานที่มั่นอวกาศดวงดาว§!\nการอัปเกรด ฐานจอดยานอวกาศสตาร์พอร์ตทำให้ ฐานที่มั่นอวกาศ สามารถมีสิ่งปลูกสร้างสองอย่างและรองรับสี่โมดูล"
 TECH_UNLOCK_STAR_FORTRESS_CONSTRUCTION_TITLE:0 "§Hปลดล็อกการอัปเกรดฐานดวงดาว:§! ป้อมดวงดาวป้อมดาว"
 TECH_UNLOCK_STAR_FORTRESS_CONSTRUCTION_DESC:0 "§Hป้อมปราการดารา§!\nการอัปเกรดจากสถานีดารา ป้อมปราการดาราสามารถรองรับอาคารได้สามหลังและโมดูลเต็มอัตราศึกหกชุด"
 TECH_UNLOCK_CITADEL_CONSTRUCTION_TITLE:0 "§Hปลดล็อกการอัปเกรดฐานดวงดาว:§! ป้อมปราการอวกาศสี่เหลี่ยม"
 TECH_UNLOCK_CITADEL_CONSTRUCTION_DESC:0 "§Hซิทาเดล§!\nการอัปเกรดจากป้อมปราการดารา ซิทาเดลคือฐานดาราประเภทที่ใหญ่ที่สุดและมีการป้องกันหนาแน่นที่สุด สามารถรองรับอาคารได้สี่หลังและโมดูลเต็มอัตราศึกหกชุด"
