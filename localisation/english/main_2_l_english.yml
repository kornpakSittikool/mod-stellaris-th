 building_zanaam_obelisk:0 "เสาโอเบลิสก์แห่งซานาม"
 building_zanaam_obelisk_desc:0 "เสาโอเบลิสก์ลึกลับที่ปกคลุมด้วยตัวอักษรของภาษาต่างดาวที่สาบสูญไปแล้ว มันส่งเสียงหึ่งของพลังงานออกมา และผู้ที่อยู่ใกล้เคียงจะเผชิญกับอาการปวดศีรษะ"
 building_great_pyramid:0 "มหาพีระมิด"
 building_great_pyramid_desc:1 "ปิรามิดที่สร้างขึ้นโดยประชากรในท้องถิ่นเพื่อเอาใจเทพเจ้าที่เสด็จลงมาจากฟากฟ้า"
 building_toy_factory:0 "โรงงานของเล่นเอเลี่ยน"
 building_toy_factory_desc:0 "เครื่องจักรที่ซับซ้อนหล่อพอลิเมอร์ที่ซับซ้อนเป็นของชิ้นเล็กๆ ที่มีรูปร่างหลากหลายและจุดประสงค์ที่ไม่อาจเข้าใจได้อย่างไม่หยุดยั้ง"

