 auth_democratic:0 "ประชาธิปไตย"
 auth_democratic_desc:0 "รัฐบาลประชาธิปไตยมีการเลือกตั้งตามปกติซึ่งประชาชนทุกคนสามารถลงคะแนนได้ว่าใครควรเป็นตัวแทนของพวกเขา"
