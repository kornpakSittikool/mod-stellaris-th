 TIMELINE_HEIRS_KHAN_ASCENDANT: "กลอง แห่ง สงคราม\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_GREAT_KHAN_TOOLTIP: "§Hแกรนด์ข่าน§!\n§Yวิกฤตการณ์§!\n\nขุนศึกใหม่ได้รวมกลุ่มกลุ่มโจรเข้าด้วยกัน ต้อนพวกมันให้กลายเป็นกองกําลังที่ทรหด ด้วยพลาสม่าและไฟเบอร์คาร์บอน แกรนด์ข่านกวาดไปทั่วกาแล็กซี่ ยึดครองอาณาจักรและพิทักษ์โลก เรือรบถูกทําลายก่อนที่อํานาจของพวกเขาเป็นอดีตนักบุกปล้นตอนนี้ชุมนุมด้วยวัตถุประสงค์ที่น่ากลัว ยุคของการปล้นจบลงแล้ว นี่คือชัยชนะ"
 TIMELINE_EVENT_CRISIS_GREAT_KHAN: "ฮ อร์เด ไม่ ได้ รับ การ ยกย่อง\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_GRAY_TEMPEST_TOOLTIP: "§Hระดับสีเทา§!\n§Yวิกฤตการณ์§!\n\nพวกแถบกํากับค่า L ได้เปิดฉาก ปลดปล่อยกองเรือสงครามโบราณของเดอะเกรย์เทมเปสต์ เรือของพวกเขาปูเส้นทางของการทําลาย ข้ามกาแล็กซี่ ทําให้เกิดความร้อนขึ้นทั้งหมดในทางของพวกเขา ไม่มีการทูต ไม่มีความเมตตา มีแต่การจําลอง ดาว เคราะห์ ต่าง ๆ เงียบ กริบ กอง เรือ ต่าง ๆ ถูก กวาด ล้าง จาก การ ดํารง อยู่ และ ความ หวาด กลัว ก็ แพร่ กระจาย ไป ทั่ว. อดีตกลับมาและมันดูเหมือนกัน"
 TIMELINE_EVENT_CRISIS_GRAY_TEMPEST: "การ ตื่น ตัว\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_FORMLESS_TOOLTIP: "§Hไร้รูปแบบ§!\n§Yวิกฤตการณ์§!\n\nน่าจะเป็นผู้อพยพที่ถูกบังคับให้ตอบโต้ พลังงานที่รู้จักกันในชื่อไร้ที่อยู่ได้พบว่ากาแล็กซี่ของเราเป็นอะไรก็ได้ยกเว้นที่หลบภัย พวกเขาจะจมจักรวาลของเราใน ผู้บุกรุกพิเศษหรือตายพยายาม"
 TIMELINE_EVENT_CRISIS_FORMLESS: "ความ โกรธ ที่ ไร้ ที่ พึ่ง\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_VOIDWORM_PLAGUE_TOOLTIP: "§Hโรค พยาธิ ใบ ไม้ เลือด§!\n§Yวิกฤตการณ์§!\n\nธรรมชาติของหนอนไวรอยด์เปลี่ยนไป เมื่อพวกเขาไปถึงปริมาณที่สําคัญ พวกเขาเข้าสู่ความบ้าคลั่งของสายพันธุ์ ไม่เติบโตด้วยอัตราที่ยั่งยืน ตอนนี้พวกเขามุ่งที่จะดับทุกชีวิตในกาแล็กซี่ ก่อนที่จะยุติวงจรของตัวเองโดยไม่ได้ตั้งใจ"
 TIMELINE_EVENT_CRISIS_VOIDWORM_PLAGUE: "ความ อดอยาก\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_UNBIDDEN_TOOLTIP: "§Hยังไม่ได้กําหนด§!\n§Yวิกฤตการณ์§!\n\nการละเมิดในโครงสร้างของการดํารงอยู่ ได้ก่อให้เกิดการบุกรุกของพลังงานบริสุทธิ์ พวกมันไม่สามารถต่อรองได้ และพวกมันก็ไม่สํานึกผิด ใช้ทั้งระบบเป็นเชื้อเพลิงในการขยายตัว สมอของมันทําให้รอยร้าวคงที่ ดึงพวกของมันเข้ามาในดินแดนของเรา ยานยูนิเดนมาถึงแล้ว"
 TIMELINE_EVENT_CRISIS_UNBIDDEN: "ช่อง ว่าง\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_KALEIDOSCOPE_TOOLTIP: "§Hกล้องส่องทางไกล§!\n§Yวิกฤตการณ์§!\n\nพลัง งาน ที่ หิว โหย ซึ่ง เป็น ที่ รู้ จัก กัน ว่า คา ลิ โด ส ตา โคป ได้ เข้า สู่ กาแล็กซี และ เริ่ม รับ ประทาน กับ ระบบ ที่ มี คน อาศัย อยู่. ความ หิว โหย ดู เหมือน ไม่ รู้ สิ้น สุด และ ดู เหมือน ทํา ให้ เขว ได้ ง่าย. มันจะยุบกลับไปเป็นฝุ่นดาวในไม่ช้า"
 TIMELINE_EVENT_CRISIS_KALEIDOSCOPE: "The Starved Spectrum\n§L[GetDate]§!"
 TIMELINE_EVENT_BECOME_THE_CRISIS_TOOLTIP: "§Hกลาย เป็น วิกฤตการณ์§!\n§Yวิกฤตการณ์§!\n\nกาแลคซีเป็นสถานที่มืด[EVENT_TARGET_0.GetName]ได้ละทิ้งการเสแสร้งของการทูตทั้งหมด และประกาศตัวเองเป็นภัยคุกคามที่ยิ่งใหญ่ที่สุด กอง เรือ ของ พวก เขา รวม ตัว กัน และ ผู้ สอดแนม ต่าง ก็ กระซิบ กัน ถึง แผนการ ขั้น สุด ท้าย และ การ วาง แผน ล่วง หน้า. ไม่ ใช่ เพียง จักรวรรดิ แต่ เป็น วิกฤตการณ์ อีก ต่อ ไป."
 TIMELINE_EVENT_BECOME_THE_CRISIS: "เน เม ซิส ของ กาแลกติก\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_PRETHORYN_SCOURGE_TOOLTIP: "§Hโรค ลม บ้าหมู§!\n§Yวิกฤตการณ์§!\n\nจากนอกขอบกาแล็กซี่ พรีธินมาแล้ว เรือ ชีวภาพ ของ พวก เขา เบียด เสียด กัน อยู่ ทั่ว ดาว ต่าง ๆ และ เหลือ แต่ โลก ที่ มืดมน เท่า นั้น เมื่อ ตื่น. จะ ไม่ มี ใคร ได้ ยิน คํา ร้อง ขอ ของ พวก เขา เพราะ พวก เขา พูด ป้อ ยอ."
 TIMELINE_EVENT_CRISIS_PRETHORYN_SCOURGE: "ข้าว สาลี ที่ ขาด แคลน\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_CONTINGENCY_TOOLTIP: "§Hคอนตินเจนซี§!\n§Yวิกฤตการณ์§!\n\nความ เย็น, การ คํานวณ, และ การ สั่น สะเทือน ของ สัญญาณ ที่ ไม่ อาจ หยุด ได้ ทั่ว กาแล็กซี. ระบบปัญญาประดิษฐ์ จิตใจที่สังเคราะห์ คอนตินเจนซีได้ตื่นขึ้น จากโลกของเครื่องจักรที่ซ่อนอยู่ รูปแบบการทําสงครามอย่างไม่หยุดยั้งปรากฏขึ้น ปฏิบัติตามคําสั่งสุดท้ายของพวกเขา : การกําจัดทั้งหมด"
 TIMELINE_EVENT_CRISIS_CONTINGENCY: "สัญญาณ ของ ผี\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_CETANA: "การ เสด็จ กลับ ของ พระ นาง\n§L[GetDate]§!"
 TIMELINE_EVENT_HATCH_BEHEMOTH_TOOLTIP: "§Hเบ เฮ โมท แฮทเชอร์§!\n§Yหิน§!\n\nเบ เฮ โมท ตัว แรก เกิด จาก การ วาง ไข่§L[GetDate]§!"
 TIMELINE_EVENT_HATCH_BEHEMOTH: "เบ เฮ โมท แฮทเชอร์\n§L[GetDate]§!"
 TIMELINE_EVENT_GALACTIC_MARKET_TOOLTIP: "§Hตลาด แกแล็กติก§!\n§Yเหตุการณ์ที่เกิดขึ้นในแกแล็กติก§!\n\nการค้าได้รวมดาว ตลาดกาแล็กติกได้รับการจัดตั้งอย่างเป็นทางการ กลายเป็นหัวใจของเศรษฐกิจของดาราจักร การค้าไหลอย่างอิสระ โชคชะตาถูกสร้างขึ้นและหายไปในพริบตา และชะตากรรมของจักรวรรดิทั้งหมด ตอนนี้ขึ้นอยู่กับอุปทานและอุปทาน"
 TIMELINE_EVENT_GALACTIC_MARKET: "ถอนการค้าขาย\n§L[GetDate]§!"
 TIMELINE_EVENT_GALACTIC_COMMUNITY_TOOLTIP: "§Hชุมชน กาแลกติก§!\n§Yเหตุการณ์ที่เกิดขึ้นในแกแล็กติก§!\n\nจักรวรรดิของกาแล็กซี่ ได้มารวมกัน ภายใต้ร่างการเมืองเดียว กลุ่มกาแล็กติกได้จัดตั้งขึ้น เป็นฟอรั่มที่ซึ่งการทูต การโต้วาที และการต่อกรและอํานาจ อิทธิพล ที่ แท้ จริง ของ มัน ยัง คง ต้อง เห็น ต่อ ไป."
