 # Civics
 ####################################

 civic_feudal_realm:0 "ระบบศักดินา"
 civic_feudal_realm_desc:0 "สังคมนี้ได้รับการจัดระเบียบในรูปแบบฟิวดัล โดยมีกษัตริย์ผู้ปกครองซึ่งต้องพึ่งพาประเทศราชอันทรงอำนาจในการปกครองดินแดนของตนด้วยอิสระในการตัดสินใจที่สูงมาก"
 civic_imperial_cult:0 "ลัทธิจักรพรรดิ"
 civic_imperial_cult_desc:0 "สังคมนี้มีศาสนาประจำชาติที่มีอิทธิพลครอบงำ ซึ่งผู้ปกครองจะได้รับการเคารพบูชาดั่งเทพเจ้าที่มีชีวิต"
 civic_imperial_cult_effects: "- §Yดาวบ้านเกิด§! ของผู้ปกครองจะเพิ่มงาน [GetPriestIcon] [GetPriest]"
 civic_corvee_system:0 "ระบบแรงงานเกณฑ์"
 civic_corvee_system_desc:0 "สังคมนี้ถือว่าเป็นสิทธิโดยสมบูรณ์ของรัฐในการตัดสินใจว่าพลเมืองของตนจะอยู่และทำงานที่ไหน"
 civic_corvee_system_effects:1 "$t$- ยกเว้นค่าใช้จ่าย $r_unity$ ทั้งหมดสำหรับ £pop£ §Yย้ายถิ่นฐานประชากร§!"
 civic_beacon_of_liberty:0 "ประภาคารแห่งเสรีภาพ"
 civic_beacon_of_liberty_desc:0 "สังคมนี้เป็นประทีปส่องสว่างในทะเลในยามมืดมิด เสรีภาพและอิสรภาพส่วนบุคคลถือเป็นเรื่องสูงสุดที่นี่"
 civic_exalted_priesthood:0 "ยกย่องความเป็นพระ"
 civic_exalted_priesthood_desc:0 "เพื่อป้องกันการนอกรีตสังคมนี้ถูกปกครองโดยสภาศาสนาซึ่งประกอบด้วยสมาชิกที่ฉลาดที่สุดและเคร่งศาสนาที่สุด"
 civic_philosopher_king:0 "กษัตริย์นักปราชญ์"
 civic_philosopher_king_desc:0 "เพียงแค่ปกครองนั้นยังไม่พอ นาวาแห่งรัฐจะต้องได้รับการนำทางโดยกษัตริย์ผู้เปี่ยมด้วยปัญญาและความรู้มากพอที่จะนำพามันไปในทิศทางที่ถูกต้อง"
 civic_meritocracy:0 "คุณธรรมนิยม"
 civic_meritocracy_desc:0 "ระบบสังคมที่เชื่อการสำเร็จด้วยตนเองไม่ใช้สิทธิพิเศษทางชนชั้น"
 civic_citizen_service:0 "บริการพลเมือง"
 civic_citizen_service_desc:0 "คุณทำในส่วนของคุณหรือไม่? สัญชาติเต็มรูปแบบและความรับผิดชอบทางการเมืองที่มาพร้อมกัน และจำกัดเฉพาะผู้ที่ปฏิบัติหน้าที่ในกองทัพเท่านั้น การบริการรับประกันความเป็นพลเมือง"
 civic_technocracy:0 "นิยมนักวิชาการ"
 civic_technocracy_desc:0 "เพื่อเพิ่มประสิทธิภาพสูงสุด สังคมนี้จึงถูกปกครองตามหลักวิทยาศาสตร์และความมีเหตุมีผล ความพึงพอใจส่วนตัวของชนชั้นนำทางการเมืองที่ไร้ความรู้และขาดคุณสมบัติอย่างเป็นอันตรายจะต้องไม่ได้รับอนุญาตให้เข้ามาแทรกแซง"
 civic_police_state:0 "รัฐตำรวจ"
 civic_police_state_desc:0 "เพื่อปราบปรามร่องรอยของการคัดค้านใดๆ ประชากรในสังคมที่ถูกกดขี่นี้จึงได้รับการเฝ้าติดตามและควบคุมอย่างใกล้ชิดโดยกองกำลังตำรวจภายในขนาดใหญ่"
 civic_idealistic_foundation:0 "รากฐานในอุดมคติ"
 civic_idealistic_foundation_desc:0 "สังคมนี้ก่อตั้งขึ้นบนค่านิยมอุดมคติที่แข็งแกร่ง ไม่ว่ารัฐบาลปัจจุบันจะยังคงซื่อสัตย์ต่อค่านิยมเหล่านั้นหรือไม่ แต่ประชาชนก็ยังไม่ลืมเลือน"
 civic_environmentalist:0 "นักสิ่งแวดล้อม"
 civic_environmentalist_desc:0 "สังคมนี้แสวงหาการอยู่ร่วมกันอย่างกลมกลืนกับธรรมชาติ มีการดูแลเอาใจใส่อย่างยิ่งเพื่ออนุรักษ์สิ่งแวดล้อมและจำกัดลัทธิบริโภคนิยมเท่าที่จะเป็นไปได้"
 civic_slaver_guilds:0 "สมาคมค้าทาส"
 civic_slaver_guilds_desc:0 "อำนาจทางการเมืองที่แท้จริงส่วนใหญ่ในสังคมนี้ขึ้นอยู่กับสมาคมผู้ค้าทาสที่ทรงอิทธิพลและโหดเหี้ยมจำนวนหนึ่ง พวกเขารู้วิธีการรีดเค้นประโยชน์สูงสุดออกมาจากทาส"
 civic_slaver_guilds_effect: "£pop_cat_worker£ §Y$pop_cat_worker_plural$§! จะได้รับการปฏิบัติเสมือนว่าพวกเขาถูกกดขี่เป็นทาส"
 civic_inwards_perfection:0 "ความสมบูรณ์แบบภายใน"
 civic_inwards_perfection_desc:1 "สังคมที่สงบสุขและรักสันติภาพนี้ไม่เห็นความจำเป็นของคนแปลกหน้าผู้ไม่เข้าใจวิถีชีวิตของพวกเขา เหนือสิ่งอื่นใด ประชาชนเหล่านี้ปรารถนาที่จะถูกปล่อยให้อยู่ตามลำพัง"
 civic_warrior_culture:0 "วัฒนธรรมนักรบ"
 civic_warrior_culture_desc:0 "สังคมนี้ได้พัฒนาไปสู่วัฒนธรรมนักรบที่ทรหด ความเก่งกล้าในเชิงยุทธ์มีค่าเหนือสิ่งอื่นใด และเกียรติยศที่แท้จริงสามารถพบได้ในสนามรบเท่านั้น"
 civic_distinguished_admiralty:0 "ทหารยานอวกาศโดดเด่น"
 civic_distinguished_admiralty_desc:0 "กองทัพเรือและกระทรวงทหารเรือมีบทบาทโดดเด่นอย่างผิดปกติในสังคมนี้ โดยมีอิทธิพลอย่างมากในแวดวงการเมือง พวกเขาสามารถเลือกผู้สมัครที่ดีที่สุดได้เมื่อต้องการรับสมัครทหารใหม่"
 civic_free_haven:0 "ดินแดนเสรี"
 civic_free_haven_desc:0 "สังคมนี้มีชื่อเสียงที่ได้รับในฐานะดินแดนเสรี ผู้คนที่เหนื่อยล้ายากไร้ผู้ยากไร้ที่เบียดเสียดโหยหาที่จะหายใจเป็นอิสระและยินดีต้อนรับทุกคนที่นี่โดยไม่คำนึงถึงเผ่าพันธุ์หรือที่มาของพวกเขา"
 civic_cutthroat_politics:0 "การเมืองโหดเหี้ยม"
 civic_cutthroat_politics_desc:0 "ระบบการเมืองในสังคมนี้ขึ้นชื่อเรื่องการแก่งแย่งชิงดี การต่อสู้เพื่อแย่งชิงอำนาจ ข้อตกลงลับในห้องมืด และแผนการลับๆ ล่อๆ เป็นเรื่องปกติ อย่างไรก็ตาม ผู้ที่รอดชีวิตยาวนานพอที่จะเรียนรู้เกมนี้ มักจะเรียนรู้มันได้เป็นอย่างดี"
 civic_corporate_dominion:0 "ปกครองโดยบริษัท"
 civic_corporate_dominion_desc:0 "สังคมนี้ถูกครอบงำโดยบริษัทขนาดใหญ่ที่เข้ามาแทนที่บทบาทของรัฐอย่างสิ้นเชิง"
 civic_agrarian_idyll:0 "ทำเกษตรกรรมตามธรรมชาติ"
 civic_agrarian_idyll_desc:0 "ชีวิตที่เรียบง่ายและสงบสุขมักจะเป็นชีวิตที่คุ้มค่าที่สุด สังคมเกษตรกรรมนี้สามารถหลีกเลี่ยงการขยายตัวของเมืองขนาดใหญ่ได้เป็นส่วนใหญ่"
 civic_shadow_council:0 "สภาเงา"
 civic_shadow_council_desc:0 "โดยที่พลเมืองไม่รู้ตัว สังคมนี้ถูกบงการจากเบื้องหลังโดยสภาเงาลึกลับ ภาพลักษณ์ภายนอกต้องรักษาไว้ แต่ในขณะเดียวกันก็ต้องระวังเผด็จการเสียงข้างมากด้วย เพราะท้ายที่สุดแล้ว จะเกิดอะไรขึ้นหากพวกคนโง่โหวตให้ผู้สมัครที่ผิด?"
 civic_mining_guilds:0 "สมาคมเหมืองแร่"
 civic_mining_guilds_desc:0 "สมาคมเหมืองแร่ขนาดใหญ่หลายแห่งมีสถานะที่ทรงอิทธิพลในสังคมนี้ รัฐบาลพึ่งพาการสนับสนุนของพวกเขาเป็นอย่างมาก"
 civic_parliamentary_system:0 "ระบบรัฐสภา"
 civic_parliamentary_system_desc:0 "ระบบรัฐสภาในสังคมนี้ส่งเสริมการอภิปรายที่เสรีและมีชีวิตชีวา การประจบเอาใจกลุ่มการเมืองที่มีอิทธิพลกลุ่มใดกลุ่มหนึ่งสามารถพิสูจน์ได้ว่ามีประโยชน์ทีเดียว"
 civic_efficient_bureaucracy:0 "ระบบราชการที่มีประสิทธิภาพ"
 civic_efficient_bureaucracy_desc:0 "สังคมนี้ขึ้นชื่อในเรื่องประสิทธิภาพ ไม่เพียงแต่รถไฟพลังงานแม่เหล็กจะวิ่งตรงเวลาเท่านั้น แต่กลไกราชการขนาดมหึมาที่จำเป็นในการขับเคลื่อนชาติระหว่างดวงดาวก็ได้รับการปรับปรุงให้มีประสิทธิภาพขึ้นอย่างมากเช่นกัน"
 civic_nationalistic_zeal:0 "คลั่งชาติ"
 civic_nationalistic_zeal_desc:0 "ความรู้สึกภาคภูมิใจในความเป็นชาตินิยมแทรกซึมอยู่ในทุกชนชั้นของสังคมนี้"
 civic_functional_architecture:0 "สถาปัตยกรรมตามหน้าที่"
 civic_functional_architecture_desc:1 "สังคมนี้มีชื่อเสียงในด้านสถาปัตยกรรมที่เรียบง่าย แต่ใช้งานได้จริง มีผู้ที่อ้างถึงรูปแบบอาคารนี้ว่าน่าเบื่อหรือหดหู่ แต่ในกรณีส่วนใหญ่นีโอคอนกรีตทำงานได้ดีเช่นเดียวกับวัสดุก่อสร้างอื่นๆ"
 civic_functional_architecture_effects: "- ยกเว้นความต้องการด้าน §Yเทคโนโลยี§! สำหรับ £zone£ พื้นฐาน ['concept_district_specializations']"
 civic_aristocratic_elite:0 "ขุนนางชนชั้นสูง"
 civic_aristocratic_elite_desc:0 "สังคมนี้มีชนชั้นสูงที่หยั่งรากลึกซึ่งครอบครองระดับบนสุดของสังคม"
 civic_mechanists:0 "ลัทธิวัตถุนิยม"
 civic_mechanists_desc:0 "สังคมนี้หมกมุ่นอยู่กับแนวคิดเรื่องหุ่นยนต์อัตโนมัติโลหะมาตั้งแต่ยุคไอน้ำตอนต้น แม้ว่าหลายคนจะบอกว่ามันเป็นไปไม่ได้ แต่หุ่นยนต์ตัวแรกที่แท้จริงก็ได้ออกจากสายการผลิตไปนานก่อนที่จะบรรลุการบินในอวกาศขั้นพื้นฐานเสียอีก"
 civic_syncretic_evolution:0 "วิวัฒนาการผสมผสาน"
 civic_syncretic_evolution_desc:0 "สิ่งมีชีวิตชนิดที่สองเป็นส่วนสำคัญของสังคมนี้ พวกเขาตัวใหญ่แข็งแรงและส่วนใหญ่จะมีความฉลาดเหมือนเด็กที่มีความบกพร่อง สงครามสมัยโบราณได้กำจัดสายพันธุ์ของพวกเขาที่มีแนวโน้มก้าวร้าวมากที่สุดออกไป"
 civic_syncretic_evolution_secondary_species:0 "เผ่าพันธุ์ผสมผสาน"
 civic_shared_burden:0 "ภาระร่วมกัน"
 civic_shared_burden_desc:0 "สังคมนี้เชื่อในการกระจายทรัพยากรอย่างเท่าเทียมกันทำให้ไม่มีความแตกต่างระหว่างความต้องการของผู้ปกครองและผู้ปกครอง ทั้งหมดทำงานร่วมกันเพื่อประโยชน์ของส่วนรวม"
 civic_fanatic_purifiers:0 "ผู้ชำระล้างที่บ้าคลั่ง"
 civic_fanatic_purifiers_desc:0 "สังคมนี้ดูเหมือนจะมุ่งมั่นที่จะกวาดล้างสิ่งมีชีวิตที่มีสติปัญญาอื่นๆ ทั้งหมดออกไปจากกาแล็กซี ไม่ว่าจะเกิดอะไรขึ้น พวกเขาจะไม่ยอมให้พวกเอเลี่ยนมีชีวิตอยู่"
