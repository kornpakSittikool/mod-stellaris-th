 TIMELINE_EVENT_GALACTIC_DOORSTEP_TOOLTIP: "§H$origin.1050.name$§!\n§Yเหตุการณ์ ที่ เกิด ขึ้น§!\n\nตอน นี้ เรือ ของ เรา สามารถ ข้าม ไป ถึง ฝาแฝด ของ มัน และ เป็น ของ ขวัญ ชิ้น สุด ท้าย ผู้ สร้าง เรือ สามารถ ถ่ายทอด ความ ลับ แห่ง การ ก่อ สร้าง. สิ่งที่ครั้งหนึ่งเคยลึกลับ ก็ชัดเจนแล้ว ในไม่ช้าเราจะสร้างประตูของเราเอง ทําให้การเดินทางผ่านจักรวรรดิของเราเกือบ"
 TIMELINE_EVENT_GALACTIC_DOORSTEP: "มงกุฎ ดํา เปิด\n§L[GetDate]§!"
 TIMELINE_EVENT_LOST_COLONY_TOOLTIP: "§Hการ ค้น พบ แผ่น ดิน โลก§!\n§Yเหตุการณ์ ที่ เกิด ขึ้น§!\n\nเราได้ติดต่อกับอารยธรรม ที่ให้กําเนิดอาณานิคมของเรา แม้ เวลา และ ระยะ ทาง จะ ทํา ให้ เรา เป็น สิ่ง ใหม่ ๆ แต่ ตอน นี้ ต้น กําเนิด ของ เรา ชัดเจน แล้ว. เสียงสะท้อนในอดีตของเรา จะนําทางอนาคตของเรา"
 TIMELINE_EVENT_LOST_COLONY: "บ้าน ที่ เคย สูญ เสีย\n§L[GetDate]§!"
 TIMELINE_EVENT_RESOURCE_CONSOLIDATION_TOOLTIP: "§Hสร้างโลกของเครื่องจักร§!\n§Yเหตุการณ์ ที่ เกิด ขึ้น§!\n\nเราได้หลอมสร้างโลกจักรกลที่แท้จริง กอบโกยความไม่เสมอภาคและการสลายตัวของอินทรีย์ อนาคตจะถูกสร้างขึ้นด้วยเหล็กกล้า และควบคุมด้วยอัลกอริทึม"
 TIMELINE_EVENT_RESOURCE_CONSOLIDATION: "โลก คืน สู่ สภาพ เดิม\n§L[GetDate]§!"
 TIMELINE_EVENT_REMNANTS_TOOLTIP: "§Hความสําคัญถูกเรียกคืน§!\n§Yเหตุการณ์ ที่ เกิด ขึ้น§!\n\nจักรวรรดิของเราได้ฟื้นฟูโลกของเรา ให้กลับมารุ่งเรืองอีกครั้ง เมื่อซากโบราณที่ถูกทําลาย มันตั้งขึ้นอีกครั้งเป็นแกรนด์เอคูโลโพลิส พินัยกรรมของอารยธรรมและความทะเยอทะยาน"
 TIMELINE_EVENT_REMNANTS: "โลก คืน สู่ สภาพ เดิม\n§L[GetDate]§!"
 TIMELINE_EVENT_SHATTERED_RING_TOOLTIP: "§Hริงเวิลด์กลับคืนมา§!\n§Yเหตุการณ์ ที่ เกิด ขึ้น§!\n\nซาก ปรัก หัก พัง ของ ระบบ บ้าน ของ เรา ได้ รับ การ ฟื้นฟู อย่าง เต็ม ที่. สิ่งที่ครั้งหนึ่งเคยเป็นสุสานที่สูญเสียความทะเยอทะยาน ตอนนี้ส่องแสงเป็นสัญลักษณ์ของอารยธรรม"
 TIMELINE_EVENT_SHATTERED_RING: "เส้นทแยง\n§L[GetDate]§!"
 TIMELINE_EVENT_LEGENDARY_LEADER_TOOLTIP: "§Hความ สําเร็จ เป็น จริง ของ ชะตา กรรม§!\n§Yเหตุการณ์ ที่ เกิด ขึ้น§!\n\nการเดินทางของลูมินารี่มาถึงขั้นสุดท้ายแล้ว การ ปกครอง ของ พวก เขา จะ ยืนยง อยู่ ตลอด กาล, นวด ปั้น จักรวรรดิ ตลอด กาล, หรือ เป็น เครื่องหมาย ของ รุ่ง อรุณ แห่ง ยุค ใหม่ — ที่ ซึ่ง มี การ แบ่ง ผู้ นํา กัน และ อนาคต ก็ ได้ รับ การ ฟื้นฟู ใหม่."
 TIMELINE_EVENT_LEGENDARY_LEADER: "ชะตา กรรม ขั้น สุด ท้าย\n§L[GetDate]§!"
 TIMELINE_EVENT_SHROUDWALKER_APPRENTICE_TOOLTIP: "§Hสร้างอุโมงค์§!\n§Yเหตุการณ์ ที่ เกิด ขึ้น§!\n\nผ้าคลุมกั้นระหว่างความเป็นจริงได้แยกออก และอุโมงค์โค้งแรก ตอนนี้เชื่อมอาณาจักรของเรากับดินแดนที่ไม่รู้จัก ผ่านรอยร้าวนี้ ระยะทางและเวลายุบ อนุมัติทางที่ครั้งหนึ่งมีเพียงความว่างเปล่า สิ่ง ลึกลับ หรือ อันตราย อะไร ที่ รอ อยู่ ข้าง หน้า ไม่ ให้ ใคร เห็น."
