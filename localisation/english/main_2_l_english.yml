 TECH_UNLOCK_DIPLOMATIC_ACTION_CREATE_VASSAL_DESC:1 "§Hการสยบประเทศราช§!\nอนุญาตให้เราสยบจักรวรรดิอื่นให้อยู่ภายใต้การคุ้มครองและกฎเกณฑ์ของเรา จักรวรรดิส่วนใหญ่จะอยู่ในฐานะประเทศราช แต่ประเทศที่ล้าหลังทางเทคโนโลยีจะอยู่ในฐานะรัฐอารักขา นอกจากนี้เรายังสามารถขอเป็นรัฐในปกครองของผู้อื่นได้เช่นกันหากเราต้องการความคุ้มครอง"
