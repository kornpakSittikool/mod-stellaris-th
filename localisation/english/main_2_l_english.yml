 bombardment_selective_desc:2 "การทิ้งระเบิดแบบ$bombardment_selective$เป็นการโจมตีเป้าหมายที่ระบุเฉพาะสถานที่ทางทหารเพื่อหลีกเลี่ยงการเสียชีวิตของพลเรือนโดยไม่จำเป็น\n- ทำความเสียหาย §Yปานกลาง§! กับ §Yทหาร§!\n- ทำความเสียหาย §Yปานกลาง§! กับ §Yดาวเคราะห์§!\n- ทำความเสียหาย §Eเบา§! กับ §Yประชากร§!\n- จะ §Rไม่§! ทิ้งระเบิดดาวเคราะห์ที่ไม่มีการป้องกัน\n- จะ §Rไม่§! สังหารประชากรถ้าประชากรเหลืออยู่ §Y$MIN_POPS$§!"
 bombardment_indiscriminate_desc:3 "การทิ้งระเบิดแบบ$bombardment_indiscriminate$เป็นการทิ้งระเบิดมีเป้าหมายที่โครงสร้างพื้นฐานทางทหารและดาวเคราะห์โดยไม่คำนึงถึงการบาดเจ็บล้มตายของพลเรือน\n- ทำความเสียหาย §Hหนัก§! กับ §Yทหาร§!\n- ทำความเสียหาย §Hหนัก§! กับ §Yดาวเคราะห์§!\n- ทำความเสียหาย §Yปานกลาง§! กับ §Yประชากร§!\n- สามารถทิ้งระเบิดดาวเคราะห์ที่ไม่มีการป้องกันได้เมื่อ §H$policy_orbital_bombardment_accept_surrender$§! §H$orbital_bombardment_surrender_forbidden$§! \n- จะ §Rไม่§! สังหารประชากรถ้าประชากรเหลืออยู่ §Y$MIN_POPS$§!"
 bombardment_armageddon_desc:3 "การทิ้งระเบิดแบบ$bombardment_armageddon$เป็นการทิ้งระเบิดที่มีเป้าหมายครอบคลุมทั้งดาวด้วยอาวุธหนักโดยมีจุดมุ่งหมายที่ชัดเจนในการเพิ่มจำนวนผู้เสียชีวิตให้มากที่สุด\n- ทำความเสียหาย §Rหนักมาก§! กับ §Yทหาร§!\n- ทำความเสียหาย §Rหนักมาก§! กับ §Yดาวเคราะห์§!\n- ทำความเสียหาย §Rหนักมาก§! กับ §Yประชากร§!\n- สามารถทิ้งระเบิดดาวเคราะห์ที่ไม่มีการป้องกันได้\n- สามารถเปลี่ยนดาวเคราะห์ให้เป็นดาวที่ไร้สิ่งมีชีวิต(ดาวแห่งความตาย)ได้"
