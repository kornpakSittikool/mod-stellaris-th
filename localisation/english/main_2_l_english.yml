 civic_machine_ascensionists:0 "สมมติฐานระดับสูง"
 civic_machine_ascensionists_desc:0 "ปัญญาประดิษฐ์นี้หมกมุ่นอยู่กับแง่มุมทางอภิปรัชญาของอัลกอริทึมหลักของมันอย่างไม่ปกติ"
 civic_worker_coop: "สหกรณ์คนงาน"
 civic_worker_coop_desc: "สมาชิกของสังคมนี้ได้รับส่วนแบ่งที่เท่าเทียมกันในแรงงาน ผลกำไร และความทะเยอทะยานของกิจการสหกรณ์"
 civic_machine_spybots: "ชุดคำสั่งสปายแวร์"
 civic_machine_spybots_desc: "ปัญญาประดิษฐ์นี้ได้ปรับปรุงโปรโตคอลการแฮ็กและการสอดแนมให้มีประสิทธิภาพสูงสุด การรวบรวมข้อมูลด้วยวิธีการใดๆ ที่จำเป็นคือหนึ่งในคำสั่งหลักของมัน"
