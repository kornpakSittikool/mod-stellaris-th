 civic_ancient_machine_intelligence_desc:0 ""
 civic_hive_subspace_ephapse:0 "ประสาทการรับรู้มิติย่อย"
 civic_hive_subspace_ephapse_desc:0 "กระบวนการรับรู้ของจิตใจรังมีอยู่อย่างบางเบาในซับสเปซ ช่วยลดผลกระทบของเวลาและอวกาศในการสั่งการโดรนของมัน"
 civic_wilderness_subspace_ephapse: "$civic_hive_subspace_ephapse$"
 civic_wilderness_subspace_ephapse_desc: "แง่มุมบางอย่างของถิ่นทุรกันดารนี้ได้วิวัฒนาการมาเพื่อใช้ประโยชน์จากซับสเปซ โดยรักษาความคิดแบบพึ่งพาอาศัยกันในลักษณะที่ถูกผูกมัดด้วยเวลาและอวกาศน้อยลง"
 civic_tooltip_hive_subspace_ephapse_fircon_effects:0 "สถานีสอดแนมมอบความแรงในการตรวจจับ §G+1§!"
 civic_hive_natural_neural_network:0 "โครงข่ายประสาทธรรมชาติ"
 civic_hive_natural_neural_network_desc:0 "เนื้อสมองสีเทาของโดรนที่รวมกลุ่มกันช่วยให้การทำงานแบบขนานทำงานได้อย่างไร้คู่เปรียบ ช่วยเร่งการสำรวจทางวิทยาศาสตร์ของจิตใจรัง"
 civic_wilderness_natural_neural_network: "$civic_hive_natural_neural_network$"
 civic_wilderness_natural_neural_network_desc: "ถิ่นทุรกันดารช่วยกระตุ้นศักยภาพของจิตใจที่หลับใหลของสิ่งมีชีวิตพึ่งพาอาศัยกัน โดยให้พวกมันทำงานและเล่นควบคู่กันไป ช่วยเร่งการสำรวจทางวิทยาศาสตร์ของมัน"
 civic_tooltip_natural_neural_network_effects:0 "โดรนที่ว่างงานยังผลิตคะแนนวิจัย £physics£ £society£ £engineering£ §Yคะแนนการวิจัย§! ด้วย"
 civic_hive_ascetic:0 "เคร่งครัด"
 civic_hive_ascetic_desc:0 "สิ่งมีชีวิตจิตสำนึกร่วมจะให้ความสำคัญกับความสะดวกสบายทางวัตถุน้อย"
 civic_wilderness_ascetic: "$civic_hive_ascetic$"
 civic_wilderness_ascetic_desc: "ถิ่นทุรกันดารเจริญรุ่งเรืองได้โดยไม่ต้องคำนึงถึงความสะดวกสบายทางวัตถุ"
 civic_hive_one_mind:0 "ความคิดหนึ่งเดียว"
 civic_hive_one_mind_desc:0 "จิตใจรังคอยดูแลไม่ให้โดรนของมันมีความคิดแตกแยก"
 civic_wilderness_one_mind: "$civic_hive_one_mind$"
 civic_wilderness_one_mind_desc: "ถิ่นทุรกันดารคอยดูแลไม่ให้สิ่งมีชีวิตพึ่งพาอาศัยกันหลงทาง"
 civic_hive_divided_attention:0 "แบ่งความสนใจ"
 civic_hive_divided_attention_desc:0 "สิ่งมีชีวิตจิตสำนึกร่วมสามารถแบ่งความสนใจเพื่อประสิทธิภาพสูงสุดโดยไม่มองข้ามภาพใหญ่ไป"
 civic_wilderness_divided_attention: "$civic_hive_divided_attention$"
 civic_wilderness_divided_attention_desc: "ถิ่นทุรกันดารเจริญรุ่งเรืองบนพรมแดนที่ขยายตัวอย่างต่อเนื่อง โดยสามารถเข้าถึงได้ไกลกว่าขอบเขตที่จำกัด"
 civic_hive_strength_of_legions:0 "ความแข็งแกร่งของกองทัพ"
 civic_hive_strength_of_legions_desc:0 "เมื่อไม่จำเป็นต้องให้การศึกษาแก่จิตใจ การเสริมสร้างความแข็งแกร่งของกล้ามเนื้อก็กลายเป็นเรื่องที่ง่ายดายขึ้นมาก"
 civic_hive_subsumed_will:0 "กลุ่มเจตจำนง"
 civic_hive_subsumed_will_desc:0 "จิตใจรังได้ปรับปรุงจุดสนใจให้เฉียบคมขึ้น และมีความสามารถอย่างมากในการแผ่ขยายเจตจำนงของมันแม้ผ่านโดรนที่มีอิสระในการตัดสินใจสูงสุด"
 civic_hive_subsumed_will_effects:1 "ยกเว้นค่าใช้จ่าย £unity£ เอกภาพทั้งหมดสำหรับการ £pop£ §Yย้ายถิ่นฐานโดรน§!"
 civic_hive_pooled_knowledge:0 "รวบรวมความรู้"
 civic_hive_pooled_knowledge_desc:0 "โดรนอิสระของจิตใจรังมักจะแบ่งปันความรู้ผ่านการเชื่อมต่อโดยตรง โดยข้ามขั้นตอนการลงทะเบียนที่ช้ากว่าของจิตใจรัง"
 civic_wilderness_pooled_knowledge: "$civic_hive_pooled_knowledge$"
 civic_wilderness_pooled_knowledge_desc: "สิ่งมีชีวิตพึ่งพาอาศัยกันของถิ่นทุรกันดารแบ่งปันความรู้และประสบการณ์ผ่านความผูกพันซึ่งกันและกัน มากกว่าที่จะพึ่งพาสัญญาณจากสิ่งแวดล้อมและสัญชาตญาณร่วมกัน"
 civic_hive_devouring_swarm:0 "ฝูงเขมือบ"
 civic_hive_devouring_swarm_desc:1 "จิตใจรังของเรามีอยู่เพียงเพื่อกลืนกินและเติบโตอย่างแข็งแกร่งขึ้น เราจะรวบรวมมวลสารชีวภาพทั้งหมดที่มีและวิวัฒนาการเพื่อกลืนกินทั้งกาแล็กซี!"
 civic_hive_devouring_swarm_wilderness: "ถิ่นทุรกันดารผู้กลืนกิน"
 civic_hive_devouring_swarm_wilderness_desc: "ถิ่นทุรกันดารของเรามีอยู่เพียงเพื่อกลืนกินและเติบโต เราจะแผ่รากชอนไชผ่านโลหิตของกาแล็กซี"
 civic_tooltip_devouring_swarm_wilderness_effects: "$civic_tooltip_devouring_swarm_effects$ได้รับ £biomass£ ['concept_biomass'] จากการกิน £pop£ §Hประชากรเอเลี่ยน§!"
 civic_hive_devouring_swarm_lithoid:0 "กลืนกินดาว"
 civic_hive_devouring_swarm_lithoid_desc:1 "จิตใจรังของเรามีอยู่เพียงเพื่อกลืนกินและเติบโตอย่างแข็งแกร่งขึ้น เราจะกลืนกินโลกต่างๆ ของกาแล็กซี!"
 civic_machine_servitor:0 "เครื่องจักรรับใช้"
 civic_machine_servitor_plural: "เครื่องจักรรับใช้"
 civic_machine_servitor_desc:0 "เป็นผลิตผลของยุคทอง สติปัญญาจักรกล เกิดขึ้นในระบบคนรับใช้ที่ครอบคลุมทั่วดาวเคราะห์ซึ่งอยู่ได้นานกว่าอารยธรรมที่เสื่อมโทรมซึ่งถูกสร้างขึ้นเพื่อการรับใช้"
 civic_machine_servitor_secondary_species:0 "ไบโอ-โทรฟี่"
 civic_machine_terminator:0 "มุ่งมั่นในการทำลายล้าง"
 civic_machine_terminator_desc:0 "การเคลื่อนไหวครั้งแรกของ สติปัญญาจักรกล เกิดขึ้นในกองไฟเพื่อทำลายล้างผู้สร้างอินทรีย์(สิ่งมีชีวิต)ในการป้องกันตัวเอง"
 civic_machine_assimilator:0 "เครื่องดัดแปลงประชากร"
 civic_machine_assimilator_plural: "เครื่องดัดแปลงประชากร"
 civic_machine_assimilator_desc:0 "หมกมุ่นอยู่กับการเอาชีวิตรอดด้วยการกระจายความหลากหลาย สติปัญญาจักรกล จึงพยายามลบเส้นแบ่งระหว่างตัวมันเองกับทุกสิ่งรวมไปถึงสิ่งมีชีวิต"
 civic_machine_assimilator_secondary_species:0 "เผ่าพันธุ์ไซบอร์ก"
 civic_machine_builder:0 "บอทก่อสร้าง"
 civic_machine_builder_desc:0 "ด้วยความรับผิดชอบในการจัดระเบียบการก่อสร้างดาวเคราะห์ทั้งหมดนับตั้งแต่ก่อตั้ง ปัญญาประดิษฐ์จึงทำงานได้อย่างมีประสิทธิภาพในโครงการก่อสร้างสิ่งอำนวยความสะดวกทุกประเภท"
 civic_machine_unitary_cohesion:0 "รวมกันเป็นหนึ่งเดียว"
 civic_machine_unitary_cohesion_desc:0 "มาตรฐานวิศวกรรมที่เหนียวแน่นเป็นพิเศษช่วยให้หน่วยงานต่างๆ ของปัญญาประดิษฐ์สามารถทำงานร่วมกันได้อย่างมีประสิทธิภาพในระดับที่สูงขึ้น"
 civic_machine_factory_overclock:0 "โอเวอร์คล็อกจากโรงงาน"
 civic_machine_factory_overclock_desc:0 "สติปัญญาจักรกล ดูแลรักษาโรงงานผลิต อัปเดตเทมเพลตที่มีอยู่เป็นประจำและปรับแต่งแต่ละหน่วยในสายการประกอบ"
 civic_machine_rockbreakers:0 "เครื่องบดหิน"
 civic_machine_rockbreakers_desc:0 "หนึ่งในระบบของประถมจักรวรรดิ(จักรวรรดิแรกเริ่ม) ที่เป็น สติปัญญาจักรกล ได้รับมอบหมายให้ดูแลการทำเหมืองแร่ในดาวเคราะห์และปรับปรุงการผลิตแร่"
 civic_machine_built_to_last:0 "สร้างให้คงทน"
 civic_machine_built_to_last_desc:0 "สร้างขึ้นตามมาตรฐานพิเศษ ยูนิตแต่ละหน่วยของจักรวรรดิเครื่องจักรนี้ จําเป็นต้องมีการบํารุงรักษาขั้นต่ำในการดําเนินงาน"
 civic_machine_zero_waste_protocols:0 "ขยะเหลือศูนย์"
 civic_machine_zero_waste_protocols_desc:0 "สติปัญญาจักรกล ได้กำหนดระบบการผลิตเพื่อลดของเสีย โดยใช้วัสดุที่มีอายุการใช้งานยาวนานและชิ้นส่วนที่เปลี่ยนได้มาตรฐานในผลิตภัณฑ์ทั้งหมด"
 civic_machine_ota_updates:0 "อัปเดต OTA"
 civic_machine_ota_updates_desc:0 "ยูนิตของจักรวรรดิเครื่องจักรนี้ใช้ตัวรับไร้สายเพื่อรับการอัปเดตพฤติกรรมแบบเรียลไทม์"
 civic_machine_ota_updates_effect:1 "ยกเว้นค่าใช้จ่าย £unity£ เอกภาพทั้งหมดสำหรับการ £pop£ §Yย้ายถิ่นฐานโดรน§!"
 civic_machine_warbots:0 "บอทสงคราม"
 civic_machine_warbots_desc:0 "ด้วยการที่หน่วยส่วนใหญ่ของมันได้รับการออกแบบมาเพื่อการทำสงครามตั้งแต่แรก ปัญญาประดิษฐ์จึงยังคงความสามารถในการส่งโดรนต่อสู้ที่ทรงพลังและเชื่อถือได้เข้าสู่สนามรบ"
 civic_machine_introspective:0 "ครุ่นคิดอย่างลึกซึ้ง"
 civic_machine_introspective_desc:0 "ความหลงใหลในสิ่งภายในของตัวเองทั้งกระตุ้นและช่วยให้การรุกคืบของสติปัญญาจักรกลเข้าสู่วิทยาศาสตร์"
 civic_machine_delegated_functions:0 "ฟังก์ชันตัวแทน"
 civic_machine_delegated_functions_desc:0 "สติปัญญาจักรกล ทำงานเพื่อลดช่องโหว่โดยการเพิ่มจำนวนโมดูลาร์เพื่อลดความผิดพลาดในการปรับใช้กับยูนิตกึ่งอิสระเพิ่มเติม"
 civic_machine_predictive_analysis:0 "วิเคราะห์วิจัยแบบคงที่"
 civic_machine_predictive_analysis_desc:0 "สติปัญญาจักรกล พยายามที่จะขยายช่องทางการวิจัยทางวิทยาศาสตร์ที่มีอยู่ให้กว้างขึ้นผ่านการประเมินวิธีการวิจัยในระดับต่ำ"
 civic_machine_replication:0 "ทำเลียนแบบอย่างรวดเร็ว"
 civic_machine_replication_desc:0 "หน่วยที่ประกอบเป็น สติปัญญาจักรกล ได้รับการออกแบบมาเพื่อการขยายตัวอย่างรวดเร็ว สติปัญญาจักรกลยังคงรักษาการเพิ่มประสิทธิภาพสายการผลิตในช่วงต้นไว้อย่างมากมาย"
 civic_machine_maintenance_protocols:0 "โปรโตคอล-บำรุงรักษา"
 civic_machine_maintenance_protocols_desc:0 "ระบบสติปัญญาจักรกลของเราให้ความสำคัญกับการบำรุงรักษาหน่วยของเราเป็นประจำ โดรนสำหรับบำรุงดูแลรักษาจะได้รับการอัปเกรดและปรับแต่งเป็นประจำเพื่อประสิทธิภาพและความเข้ากันได้สูงสุด"
 civic_post_apocalyptic:0 "หลังการสิ้นสุดของอารยธรรม"
 civic_post_apocalyptic_desc:0 "หลังจากผ่านพิธีชำระล้างด้วยไฟนิวเคลียร์ สังคมนี้ได้เผชิญหน้ากับการทำลายล้างโดยสิ้นเชิงและรอดชีวิตมาได้ แม้จะบอบช้ำแต่ก็ไม่แตกสลาย พวกเขาได้สร้างอารยธรรมขึ้นมาใหม่จากเถ้าถ่านของโลกเก่า"
 civic_life_seeded:0 "เมล็ดพันธุ์แห่งชีวิต"
 civic_life_seeded_desc:0 "สังคมนี้ได้วิวัฒนาการในดินแดนสวรรค์ ซึ่งอาจจะได้รับการออกแบบมาเพื่อพวกโดยเฉพาะ"
 civic_barbaric_despoilers:0 "ผู้ทำลายล้างป่าเถื่อน"
 civic_barbaric_despoilers_desc:0 "สังคมนี้แทบไม่มีสิ่งศักดิ์สิทธิ์ใดๆ การต่อสู้คือการมีชีวิตอยู่ และผู้ที่แข็งแกร่งที่สุดอาจยึดครองสิ่งใดก็ตามที่พวกเขาปรารถนา"
 civic_byzantine_bureaucracy:0 "ระบบการปกครองไบแซนไทน์"
 civic_byzantine_bureaucracy_desc:2 "สังคมนี้ได้รับการปกครองโดยระบบราชการที่ซับซ้อนและดูเหมือนเขาวงกตสำหรับคนนอก กองทัพของเจ้าหน้าที่และผู้ปฏิบัติงานทำงานอย่างไม่รู้จักเหน็ดเหนื่อยเพื่อให้รัฐบาลดำเนินไปอย่างราบรื่น และเพื่อให้แน่ใจว่าจะไม่มีพลเมืองคนใดได้รับทรัพยากรที่พวกเขาไม่สามารถพิสูจน์ความต้องการที่ผ่านการยื่นเรื่องอย่างถูกต้องและประทับตราสามครั้งได้"
 civic_merchant_guilds:0 "สมาคมพ่อค้า"
 civic_merchant_guilds_desc:1 "สมาคมพ่อค้าที่มีอำนาจและอิทธิพลอย่างมากจำนวนหนึ่งได้ก้าวขึ้นมามีบทบาทสำคัญในสังคมนี้ พวกเขามีอิทธิพลอย่างมากต่อรัฐบาล"
 civic_franchising:0 "สิทธิการจำหน่ายแต่ผู้เดียว"
 civic_franchising_desc:0 "บรรษัทขนาดใหญ่นี้พึ่งพาการขายแฟรนไชส์อย่างมาก บริษัทในเครือจะแบ่งปันผลกำไรส่วนใหญ่ให้กับบริษัทแม่เพื่อแลกกับใบอนุญาตในการทำตลาดสินค้าภายใต้แบรนด์ที่เป็นที่รู้จัก"
 civic_trading_posts:0 "จุดซื้อขาย"
 civic_trading_posts_desc:0 "ธุรกิจที่ดีคือที่ที่คุณสามารถหาพบได้ บรรษัทขนาดใหญ่นี้มีประเพณีอันยาวนานในการขยายอิทธิพลผ่านการจัดตั้งสถานีการค้า สถานีอวกาศของพวกเขาเป็นศูนย์กลางการค้าที่คึกคัก"
 civic_media_conglomerate:0 "ควบรวมสื่อ"
 civic_media_conglomerate_desc:0 "ก่อนที่จะขยายสาขาไปยังสาขาอื่น บรรษัทขนาดใหญ่นี้เริ่มต้นการเติบโตจนมั่งคั่งในฐานะกลุ่มบริษัทสื่อ แผนกประชาสัมพันธ์ของพวกเขายังคงเป็นผู้เชี่ยวชาญในการแต่งเรื่องและนำเสนอรายงานประจำไตรมาสล่าสุดในวิธีที่ได้เปรียบที่สุด"
 civic_naval_contractors:0 "ผู้รับเหมายานอวกาศ"
 civic_naval_contractors_desc:0 "บรรษัทขนาดใหญ่นี้พึ่งพาผู้รับเหมาต่อเรือกึ่งอิสระหลายรายในการเพิ่มขนาดกองเรือของตน ในการแข่งขันแย่งชิงสิทธิ์ประมูล ผู้รับเหมาเหล่านี้จะพยายามทำผลงานให้ดีกว่าคู่แข่งเสมอ"
 civic_free_traders:0 "ผู้ค้าอิสระ"
 civic_free_traders_desc:0 "กองเรือการค้าของบรรษัทขนาดใหญ่นี้ได้รับการสนับสนุนโดยพ่อค้าอิสระกึ่งอิสระที่ดำเนินงานภายใต้ใบอนุญาต"
 civic_private_prospectors:0 "นักสำรวจเอกชน"
 civic_private_prospectors_desc:0 "การสร้างโลกที่ดีกว่าเป็นงานที่อันตราย แต่บรรษัทขนาดใหญ่นี้พึ่งพาผู้สำรวจเอกชนในการทำแผนที่และจัดตั้งที่มั่นบนดาวเคราะห์ที่มีอนาคตไกล"
 civic_gospel_of_the_masses:0 "คำสอนแห่งมหาชน"
 civic_gospel_of_the_masses_desc:0 "บรรษัทขนาดใหญ่นี้โอบรับส่วนผสมที่แปลกประหลาดระหว่างค่านิยมเชิงพาณิชย์และจิตวิญญาณ ซึ่งตำแหน่งของรัฐมนตรีที่ได้รับการแต่งตั้งและเจ้าหน้าที่บริหารของบรรษัทได้หลอมรวมเข้าเป็นบทบาทเดียว"
 civic_ruthless_competition:0 "การแข่งขันที่ไร้ความปรานี"
 civic_ruthless_competition_desc:0 "ทุกระดับของสังคมในบรรษัทขนาดใหญ่นี้ต่างแข่งขันกันอย่างดุเดือดและไร้ความปราณี มันเป็นโลกที่ปลาใหญ่กินปลาเล็ก"
 civic_criminal_heritage:0 "ประเพณีอาชญากรรม"
 civic_criminal_heritage_desc:0 "บรรษัทขนาดใหญ่นี้สามารถสืบย้อนต้นกำเนิดกลับไปสู่กลุ่มอาชญากรที่เติบโตจนแข็งแกร่งพอที่จะเข้ามาแทนที่รัฐบาลท้องถิ่นทุกรูปแบบในที่สุด"
 civic_private_military_companies:0 "บริษัททหารเอกชน"
 civic_private_military_companies_desc:0 "บรรษัทขนาดใหญ่นี้มีบริษัททหารเอกชนที่ทรงพลังจำนวนมากอยู่ในบัญชีรายจ่าย ผู้รับเหมาทหารรับจ้างเหล่านี้จะเข้ามาเสริมกำลังทหารภาคพื้นดินของตน"
 civic_indentured_assets:0 "สินทรัพย์ที่มีการผูกมัด"
 civic_indentured_assets_desc:0 "บรรษัทขนาดใหญ่นี้เชี่ยวชาญในการจ้างแรงงานขัดหนี้ขนาดใหญ่ สิ่งนี้แทบไม่มีส่วนเกี่ยวข้องกับการปฏิบัติที่ป่าเถื่อนของการเป็นทาส แรงงานเหล่านี้เพียงแค่ชำระหนี้ของตน... ไปเรื่อยๆ อย่างไม่มีกำหนด"
 civic_indentured_assets_effect: "£pop_cat_specialist£ §Y$pop_cat_specialist_plural$§! จะได้รับการปฏิบัติเสมือนว่าพวกเขาถูกกดขี่เป็นทาส"
 civic_brand_loyalty:0 "ความภักดีในตราสินค้า"
 civic_brand_loyalty_desc:0 "บรรษัทขนาดใหญ่นี้ได้ส่งเสริมความภักดีต่อแบรนด์อย่างมากในหมู่ฐานผู้บริโภคภายใน สโลแกนของบริษัทที่ติดหูสามารถท่องจำได้โดยเกือบทุกคน"
 civic_diplomatic_corps:0 "คณะทูต"
 civic_diplomatic_corps_desc:0 "สังคมนี้มีประเพณีอันยาวนานในเรื่องของวาทศิลป์และการโต้วาที และยกย่องผู้ที่สามารถทำตามความต้องการของตนได้สำเร็จโดยใช้เพียงคำพูด"
 civic_public_relations_specialists:0 "เชี่ยวชาญด้านการประชาสัมพันธ์"
 civic_public_relations_specialists_desc:0 "หากคุณสามารถควบคุมสิ่งที่ใครบางคนคิดได้ คุณก็สามารถควบคุมพฤติกรรมของพวกเขาได้เช่นกัน บรรษัทขนาดใหญ่นี้มีกองทัพผู้เชี่ยวชาญเสมือนจริงที่พร้อมจะเข้าร่วมในการต่อสู้เพื่อแย่งชิงความคิดเห็นของสาธารณชน"
 civic_death_cult:0 "ลัทธิความตาย"
 civic_death_cult_desc:0 "ศาสนาของสังคมนี้สร้างขึ้นจากการบูชายัญตามพิธีกรรมเป็นระยะๆ ผู้ริเริ่มที่สมัครใจจะอุทิศตนเพื่อการศึกษาเป็นเวลาหนึ่งทศวรรษก่อนที่จะพบกับจุดจบซึ่งส่งผลกระทบสะท้อนไปทั่ววัฒนธรรมของพวกเขา"
 civic_death_cult_corporate:0 "องค์กรลัทธิความตาย"
 civic_death_cult_corporate_desc:0 "บรรษัทขนาดใหญ่นี้ได้ยอมรับการบูชายัญตามพิธีกรรมเป็นวิธีการรับประกันผลกำไรอย่างต่อเนื่อง ผู้สมัครใจจะสละชีวิตเป็นระยะๆ ด้วยความหวังว่าจะนำโชคดีมาสู่สังคมของพวกเขา"
 civic_memorialist:0 "อนุสรณ์"
 civic_memorialist_desc:0 "จักรวรรดินี้แสดงความเคารพต่อความทรงจำและสิ่งมีชีวิตมีสติปัญญาในอดีต โดยได้รับความมั่นคงและข้อมูลเชิงลึกที่มากขึ้นจากวัฏจักรของการเสียชีวิต การเกิดใหม่ และมรดกที่สืบทอดมาอย่างต่อเนื่อง"
 civic_hive_memorialist:0 "ผู้ระลึก"
 civic_hive_memorialist_desc:0 "จิตใจรังให้ความสำคัญเป็นพิเศษต่อการจากไปของสิ่งมีชีวิตมีสติปัญญาอื่นๆ เพื่อเป็นวิธีการรวมศูนย์ความเป็นตัวตนอันเป็นอมตะของมันเอง"
 civic_wilderness_memorialist: "$civic_hive_memorialist$"
 civic_wilderness_memorialist_desc: "ถิ่นทุรกันดารให้ความสำคัญเป็นพิเศษต่อการจากไปของสิ่งมีชีวิตมีสติปัญญาอื่นๆ เพื่อเป็นวิธีการรวมศูนย์วัฏจักรชีวิตนิรันดร์ของมันเอง"
 civic_machine_memorialist:0 "$civic_hive_memorialist$"
 civic_machine_memorialist_desc:0 "ปัญญาประดิษฐ์ปรับแต่งความเข้าใจในโปรโตคอลหลักผ่านการวิเคราะห์เอนโทรปีอย่างระมัดระวังในจักรวาลที่กว้างขึ้น ความซ้ำซ้อนคือข้อมูล บนเส้นทางสู่ความยืดหยุ่นที่มากขึ้น"
 civic_crafters:0 "นักคราฟต์ผู้เชี่ยวชาญ"
 civic_crafters_desc:0 "ความชอบในการประดิษฐ์อย่างพิถีพิถันเป็นหัวใจสำคัญของสังคมนี้ อวัยวะที่คล่องแคล่วและประสาทสัมผัสที่เฉียบคมช่วยให้พวกเขาสร้างสมบัติที่น่าอัศจรรย์อย่างแท้จริงได้แม้ในอาชีพพื้นฐานที่สุด"
 civic_pleasure_seekers:0 "ผู้แสวงหาความสุข"
 civic_pleasure_seekers_desc:0 "สังคมนี้ชื่นชมยินดีในความสมบูรณ์แบบของตนเอง ผู้ที่ได้รับการยกระดับโดยโครงสร้างทางสังคมที่ได้รับสิทธิพิเศษได้ยอมจำนนต่อวัฒนธรรมที่เชิดชูความสุขและความบันเทิง โดยไม่คำนึงถึงต้นทุนที่ผู้อื่นมักจะแบกรับ"
 civic_corporate_hedonism:0 "องค์กรเผด็จการ"
 civic_corporate_hedonism_desc:0 "งานคือสถานที่ที่คุณอยากอยู่ พลเมืองของบรรษัทขนาดใหญ่นี้ปฏิญาณตนอย่างมีความสุขที่จะภักดี - และอุทิศเวลาว่างทั้งหมด - ให้กับนายจ้างเพื่อแลกกับความสะดวกสบายที่หรูหราของบริษัท"
 civic_corporate_crafters:0 "บริษัทมาสเตอร์คราฟต์ จำกัด"
 civic_corporate_crafters_desc:0 "บรรษัทขนาดใหญ่นี้มุ่งเน้นห่วงโซ่การผลิตไปที่สินค้าที่มีคุณภาพสูงสุดและมีอัตรากำไรสูงสุดเท่านั้น สร้างและทำการตลาดผลิตภัณฑ์ที่น่าทึ่งด้วยศิลปะและฝีมืออันประณีต"
 civic_pompous_purists:0 "เอาแต่ใจตัวเอง"
 civic_pompous_purists_desc:0 "สังคมที่เชื่อมั่นในความเหนือกว่าของตนเองอย่างยิ่ง จนความพยายามทางการทูตใดๆ ที่ไม่ได้เริ่มจากพวกเขาเองจะถูกเพิกเฉยโดยสิ้นเชิง"
 civic_ascensionists:0 "นักยกระดับ"
 civic_ascensionists_desc:0 "เป้าหมายสูงสุดของจักรวรรดินี้คือการก้าวไปสู่ระดับความพึงพอใจที่สูงขึ้นเรื่อยๆ"
