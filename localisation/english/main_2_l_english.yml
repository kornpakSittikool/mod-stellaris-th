 SHIP_STAT_DESC_cost:0 "§Eราคาในการสร้างยานคือผลรวมของราคาส่วนประกอบและโมดูลต่าง ๆ ที่ติดตั้งอยู่ในปัจจุบัน ส่วนประกอบที่ใหญ่ขึ้นและโมดูลที่ก้าวหน้าขึ้นจะมีราคาที่สูงขึ้นตามไปด้วย§!"
 SHIP_STAT_DESC_build_time:0 "§Eเวลาที่ใช้ในการสร้างยานจะเพิ่มขึ้นตามส่วนประกอบและโมดูลที่ติดตั้ง§!"
 SHIP_STAT_DESC_energy_maintenance:1 "§E§Hค่าบำรุงรักษา§!ที่ต้องจ่ายเพื่อคงการใช้งานของยานคิดเป็นเปอร์เซ็นต์ของ§Hราคาสร้าง§!ทั้งหมด§!"
 SHIP_STAT_DESC_mineral_maintenance:1 "§E§Hค่าบำรุงรักษา§!ที่ต้องจ่ายเพื่อคงการใช้งานของยานคิดเป็นเปอร์เซ็นต์ของ§Hราคาสร้าง§!ทั้งหมด§!"
 SHIP_STAT_DESC_power:1 "§Eจำเป็นต้องใช้ §Hพลังงาน§! จำนวนเพียงพอเพื่อใช้งานระบบต่างๆของยานทำงาน สามารถเพิ่มพลังงานโดยการเพิ่มเครื่องปฏิกรณ์ให้เพียงพอกับการกินพลังงานของส่วนประกอบต่างๆของยาน การออกแบบยานที่มีค่า §Hพลังงาน§! ติดลบ(ขาดพลังงาน) จะไม่สามารถเซฟได้§!"
 SHIP_STAT_DESC_hitpoints:1 "§E§Hขนาดขนาดขนาด HP§! ของยานที่กำหนดว่าจะต้องรับความเสียหายเท่าใดก่อนที่ตัวยานจะถูกทำลาย§!"
 SHIP_STAT_DESC_armor:2 "§E§Hเกราะ§! ทำหน้าที่เป็นแนวป้องกันที่สอง โดยดูดซับความเสียหายที่เข้ามาก่อนที่จะสร้างความเสียหายให้กับตัวยาน การซ่อมเกราะจะต้องทำที่ §Hฐานดวงดาว§! เว้นแต่ว่ายานจะติดตั้งส่วนประกอบเกราะพิเศษที่สามารถสร้างเกราะใหม่ขึ้นมาแทนที่§!"
 SHIP_STAT_DESC_shields:1 "§E§Hโล่พลังงาน§! ทำหน้าที่เป็นแนวป้องกันแรก โดยดูดซับความเสียหายที่เข้ามาก่อนที่จะปะทะกับเกราะและตัวยาน อาวุธบางชนิดอาจสร้างความเสียหายเพิ่มเติมให้กับโล่พลังงานหรือทะลุทะลวงโล่พลังงานทั้งหมดก็ได้ เป็นที่รู้กันว่าพัลซาร์ทำให้โล่พลังงานใช้งานไม่ได้ โล่พลังงานจะค่อยๆสร้างขึ้นใหม่เมื่อไม่ได้ต่อสู้§!"
 SHIP_STAT_DESC_evasion:1 "§Eยานทุกลำสามารถหลบเลี่ยงการโจมตีได้ โดยหลีกเลี่ยงความเสียหายที่อาจเกิดขึ้นได้ โอกาส §Hหลบหลีก§! สามารถเพิ่มได้ด้วยตัวขับดัน(ทรัสเตอร์)และชิ้นส่วนอื่นๆ แต่ยานรบขนาดใหญ่จะได้รับประโยชน์นี้น้อยกว่า§!"
 SHIP_STAT_DESC_combat_speed:0 "§E§Hความเร็ว§! คือความเร็วการเคลื่อนที่ของยานแบบปกติที่ไม่ใช่การเดินทางที่เร็วกว่าแสง(FTL)และจะเพิ่มขึ้นตามชิ้นส่วนทรัสเตอร์(ตัวขับดัน)ที่ติดตั้งในยาน เมื่อเคลื่อนที่ในกองยาน ยานลำที่ช้าที่สุดจะจำกัดความเร็วสูงสุดของกองยาน§!"
 SHIP_STAT_DESC_speed:0 "$SHIP_STAT_DESC_combat_speed$"
 SHIP_STAT_DESC_damage:1 "§Eค่าความเสียหายรวมที่ทำโดยยานคือผลรวมของดาเมจของอาวุธทั้งหมดที่ติดตั้ง อาวุธแต่ละชิ้นจะโจมตีแยกกันในระหว่างการสู้รบ ดูส่วนประกอบแต่ละส่วนสำหรับข้อมูลโดยละเอียด เช่น ความเร็วการโจมตี ความพลังโจมตี และระยะโจมตีที่มีประสิทธิภาพ ตลอดจนการเจาะ §Hเกราะ§! และ §Hโล่พลังงาน§!§!"

