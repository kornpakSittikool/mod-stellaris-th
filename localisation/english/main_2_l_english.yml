 TECH_UNLOCK_TERRAFORMING_NUKED_CHANGE_DESC:3 "§Hการฟื้นฟูสภาพภูมิอากาศ§!\nช่วยให้เราสามารถปรับสภาพดาวที่ถูกทำลายทางระบบนิเวศได้"
 TECH_UNLOCK_SPACEPORT_CONSTRUCTION_TITLE:0 "§Hปลดล็อกสถานี:§! สถานีท่ายานอวกาศ"
 TECH_UNLOCK_SPACEPORT_CONSTRUCTION_DESC:0 "§Hท่าเรืออวกาศ§!\nท่าเรืออวกาศจำเป็นสำหรับการสร้างยานทุกประเภทที่สามารถเดินทางในอวกาศได้ สามารถอัปเกรดเพื่อเพิ่มฟังก์ชันการทำงานและติดตั้งการป้องกันขั้นพื้นฐานได้"
 TECH_UNLOCK_SCIENCE_SHIP_CONSTRUCTION_TITLE:0 "§H$UNLOCKS_SHIP_TYPE$:§! ยานวิทยาศาสตร์"
 TECH_UNLOCK_SCIENCE_SHIP_CONSTRUCTION_DESC:0 "§Hยานวิทยาศาสตร์§!\nยานวิทยาศาสตร์ถูกใช้เป็นฐานปฏิบัติการสำหรับนักวิทยาศาสตร์ชั้นนำที่พร้อมจะออกสำรวจห้วงอวกาศอันกว้างใหญ่"
 TECH_UNLOCK_CONSTRUCTION_SHIP_CONSTRUCTION_TITLE:0 "§H$UNLOCKS_SHIP_TYPE$:§! ยานก่อสร้าง"
 TECH_UNLOCK_CONSTRUCTION_SHIP_CONSTRUCTION_DESC:0 "§Hยานก่อสร้าง§!\nยานก่อสร้างช่วยให้สามารถประกอบสถานีอวกาศต่าง ๆ ได้ผ่านการใช้โดรนเชื่อมโลหะขั้นสูง"
 TECH_UNLOCK_COLONY_SHIP_CONSTRUCTION_TITLE:0 "§H$UNLOCKS_SHIP_TYPE$:§! ยานตั้งอาณานิคม"
 TECH_UNLOCK_COLONY_SHIP_CONSTRUCTION_DESC:0 "§Hยานตั้งอาณานิคม§!\nยานตั้งอาณานิคมคือยานประเภทใช้งานครั้งเดียวสำหรับตั้งถิ่นฐานบนดาวดวงอื่น เมื่อตั้งอาณานิคมสำเร็จ ยานจะถูกแยกชิ้นส่วนเพื่อนำไปดัดแปลงเป็นที่พักพิงและฐานที่มั่นบนดาวดวงนั้น"
 TECH_UNLOCK_CORVETTE_CONSTRUCTION_TITLE:0 "§H$UNLOCKS_SHIP_TYPE$:§! ยานคอร์เวต"
 TECH_UNLOCK_CORVETTE_CONSTRUCTION_DESC:0 "§Hยานคอร์เวต§!\nยานคอร์เวตเป็นยานรบประเภทพื้นฐานที่สุด มีความพร้อมในการติดอาวุธสำหรับรับมือกับผู้บุกรุกที่เป็นภัยคุกคาม"
 TECH_UNLOCK_DESTROYER_CONSTRUCTION_TITLE:0 "§H$UNLOCKS_SHIP_TYPE$:§! เรือพิฆาต"
 TECH_UNLOCK_DESTROYER_CONSTRUCTION_DESC:0 "§Hเรือพิฆาต§!\nด้วยการออกแบบสองส่วนที่มีขนาดใหญ่ขึ้น เรือพิฆาตมีตัวเลือกการติดตั้งอาวุธเชิงยุทธศาสตร์ที่หลากหลาย"
 TECH_UNLOCK_CRUISER_CONSTRUCTION_TITLE:0 "§H$UNLOCKS_SHIP_TYPE$:§! เรือลาดตระเวน"
 TECH_UNLOCK_CRUISER_CONSTRUCTION_DESC:0 "§Hเรือลาดตระเวน§!\nเรือลาดตระเวนเป็นการออกแบบสามส่วนประเภทแรก ช่วยให้สามารถกำหนดค่าโมดูลได้หลากหลายสำหรับผู้ที่พร้อมจ่าย"
 TECH_UNLOCK_BATTLESHIP_CONSTRUCTION_TITLE:0 "§H$UNLOCKS_SHIP_TYPE$:§! เรือประจัญบาน"
 TECH_UNLOCK_BATTLESHIP_CONSTRUCTION_DESC:1 "§Hเรือประจัญบาน§!\nการออกแบบตัวเรือปกติที่มีขนาดใหญ่ที่สุดเท่าที่มี เรือประจัญบานนำพลังอันมหาศาลเข้าสู่การรบด้วยค่าใช้จ่ายที่สูงยิ่งขึ้นและการหลบหลีกที่ลดลง"
 TECH_UNLOCK_TITAN_CONSTRUCTION_TITLE:0 "§H$UNLOCKS_SHIP_TYPE$:§! ไททัน"
 TECH_UNLOCK_TITAN_CONSTRUCTION_DESC:0 "§Hไททัน§!\nเรือรบขนาดมหึมาเหล่านี้คือความภาคภูมิใจของกองยาน พวกมันเต็มไปด้วยอาวุธและมักจะทำหน้าที่เป็นเรือธง"
 TECH_UNLOCK_JUGGERNAUT_CONSTRUCTION_TITLE:0 "§H$UNLOCKS_SHIP_TYPE$:§! จั๊กเกอร์นอท"
 TECH_UNLOCK_JUGGERNAUT_CONSTRUCTION_DESC:0 "§Hจั๊กเกอร์นอท§!\nสิ่งก่อสร้างขนาดใหญ่โตเหล่านี้เป็นทั้งสถานีอวกาศและยานอวกาศ จั๊กเกอร์นอทคือสถานีอวกาศเคลื่อนที่ขนาดมหึมาที่สามารถซ่อมแซมและสร้างยานอวกาศได้ ซึ่งหมายความว่ามันสามารถทำหน้าที่เป็นฐานปฏิบัติการส่วนหน้าในระหว่างการทัพเชิงรุก"
 TECH_UNLOCK_DEFENSE_PLATFORM_TITLE:0 "§Hปลดล็อกสถานี:§! แพลตฟอร์มป้องกัน"
