 TIMELINE_EVENT_OCEAN_PARADISE_TOOLTIP: "§Hรักษา ความ เป็น กลาง§!\n§Yเหตุการณ์ ที่ เกิด ขึ้น§!\n\nด้วยพลังแห่งความเชี่ยวชาญด้านไฮโดรเจน เราได้ปรับเปลี่ยนโลกของเราใหม่ ขยายมหาสมุทรกว้างใหญ่ เกินขีดจํากัดตามธรรมชาติของพวกเขา กระแสน้ําตอนนี้โค้งคํานับเพื่อความประสงค์ของเรา และเร็ว ๆ นี้ส่วนที่เหลือของกาแล็กซี่จะปฏิบัติตาม"
