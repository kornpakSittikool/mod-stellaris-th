 sm_missile_weapon:1 "โมดูลตอร์ปิโดป้องกัน"
 sm_missile_weapon_desc:2 "§E§Hท่าเรืออวกาศ§! ได้รับการติดตั้งอาวุธหนักประเภท §Hตอร์ปิโด§! เพื่อเป็นระบบป้องกันหลัก§!"
 sm_laser_weapon:0 "โมดูลเลเซอร์ป้องกัน"
 sm_laser_weapon_desc:1 "§E§Hท่าเรืออวกาศ§! ได้รับการติดตั้งอาวุธหนักประเภท §Hเลเซอร์§! เพื่อเป็นระบบป้องกันหลัก§!"
 sm_projectile_weapon:0 "โมดูลโพรเจกไทล์ป้องกัน"
