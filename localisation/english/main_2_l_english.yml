 TIMELINE_EVENT_VOID_DWELLERS_TOOLTIP: "§Hสร้าง นิสัย§!\n§Yเหตุการณ์ ที่ เกิด ขึ้น§!\n\nจากความว่างเปล่า เราได้สร้างใหม่ การก่อสร้างที่อยู่อาศัยเพิ่มเติมครั้งแรกของเรา เป็นเครื่องหมายของการขยายตัว ของดินแดนสวรรค์ของเรา"
