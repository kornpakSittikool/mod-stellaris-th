 building_slave_processing:0 "โรงงานผลิตทาส"
 building_slave_processing_desc:1 "สถานที่ขนาดใหญ่และโอ่อ่าแห่งนี้ใช้สำหรับคัดแยกแรงงานทาสและขจัดร่องรอยของเจตจำนงเสรีให้หมดสิ้นไป"
 building_slave_processing_migrate_effect_desc:1 "§Yตั้งรกรากใหม่โดยอัตโนมัติ§! ไปยังอาณานิคมอื่นๆ เปิดให้สำหรับ §Y$SLAVES$§! ที่ว่างงานในท้องถิ่น และหุ่นยนต์(ไม่คุ้นเคย)"
 building_slave_processing_slave_army_effect_desc:0 "อนุญาตให้มีการจัดหา §Y$slave_army_plural$§!\n\n"
 building_robotics_assembly_plant:0 "โรงงานประกอบหุ่นยนต์"
 building_robotics_assembly_plant_desc:0 "จำเป็นต้องมีโรงงานประกอบหุ่นยนต์เพื่อสร้างกองทัพหุ่นยนต์\nเพิ่มประชากร §H$ROBOT_POP_SPECIES_1$§! §Y100§! £pop£ ต่อปี\nค่าบำรุงรักษาประชากร: £energy£ §Y1§!"
 building_robotics_assembly_plant_2:1 "โรงงานประกอบดรอยด์"
 building_robotics_assembly_plant_2_desc:1 "จำเป็นต้องมีโรงงานประกอบดรอยด์เพื่อสร้างกองทัพหุ่นยนต์\nเพิ่มประชากร §H$ROBOT_POP_SPECIES_2$§! §Y100§! £pop£ ต่อปี\nอัปเกรดประชากร §H$ROBOT_POP_SPECIES_1$§! เป็น §H$ROBOT_POP_SPECIES_2$§!\nค่าบำรุงรักษาประชากร: £energy£ §Y2§!"
 building_robotics_assembly_plant_3:1 "โรงงานประกอบวัสดุสังเคราะห์"
 building_robotics_assembly_plant_3_desc:1 "จำเป็นต้องมีโรงงานประกอบซินเธติกเพื่อสร้างกองทัพหุ่นยนต์\nเพิ่มประชากร §H$ROBOT_POP_SPECIES_3$§! §Y100§! £pop£ ต่อปี\nอัปเกรดประชากร §H$ROBOT_POP_SPECIES_2$§! เป็น §H$ROBOT_POP_SPECIES_3$§!\nค่าบำรุงรักษาประชากร: £energy£ §Y5§!"
 building_colony_shelter:0 "ที่พักอาศัยจากยานประกอบ (เมืองหลวง)"
 building_colony_shelter_desc:0 "ซากของยานอาณานิคมที่ประกอบขึ้นใหม่เพื่อใช้เป็นที่อยู่บนดาวเคราะห์รวมไปถึงฟังก์ชันการทำงานด้วย"
 building_capital:0 "ศูนย์บริหารดาวเคราะห์ (เมืองหลวง)"
 building_capital_desc:0 "ศูนย์กลางอำนาจของชนชั้นปกครองท้องถิ่น"
 building_major_capital:0 "นครหลวงดาวเคราะห์"
