 building_uplink_node:0 "โหนดอัปลิงก์"
 building_uplink_node_plural: "โหนดอัปลิงก์"
 building_uplink_node_desc:0 "โหนดเชื่อมต่อที่ช่วยลดค่าความหน่วงของดาวเคราะห์"
 building_network_junction:0 "ชุมทางเครือข่าย"
 building_network_junction_desc:0 "เครื่องรับส่งสัญญาณอันทรงพลังนี้ช่วยเพิ่มแบนด์วิดท์ของสัญญาณที่ส่งอย่างต่อเนื่องระหว่างระบบต่างๆ มากมายที่ดำเนินงานอยู่ทั่วจักรวรรดิของเรา"
 building_system_conflux:0 "แหล่งรวมของระบบต่างๆ"
 building_system_conflux_desc:0 "สิ่งปลูกสร้างศูนย์กลางขนาดใหญ่ที่รับและส่งต่อสัญญาณข้ามระยะทางระหว่างดวงดาวจากระบบดาวต่าง ๆ หลายล้านระบบ"
 building_alpha_hub:0 "ฮับจุดเริ่ม"
 building_alpha_hub_desc:0 "ศูนย์รวมประสาทของการสื่อสารภายในทั้งหมดที่เกิดขึ้นระหว่างระบบกึ่งมีปัญญาจำนวนหลายล้านล้านล้านระบบที่คอยบริหารจัดการจักรวรรดิของเรา"
 building_machine_capital:0 "อาเรย์การบริหารจัดการ (เมืองหลวง)"
 building_machine_capital_desc:0 "เครือข่ายคอมพิวเตอร์กึ่งอิสระที่จัดการฟังก์ชันการดูแลระบบต่างๆบนดาว"
 building_machine_major_capital:0 "โปรเซสเซอร์ดาวเคราะห์ (เมืองหลวง)"
 building_machine_major_capital_desc:0 "คอมพิวเตอร์สำหรับการบริหารที่ทรงพลัง ได้รับการออกแบบมาเพื่อจัดการและดูแลการทำงานต่างๆของการตั้งถิ่นฐานของดาวเคราะห์ที่ซับซ้อน"
 building_machine_system_capital:0 "ส่วนเชื่อมต่อหลัก (เมืองหลวง)"
 building_machine_system_capital_desc:0 "การบริหารคือหัวใจของระบบ AI นับร้อยสามารถประมวลคำสั่งและจัดการในระยะเวลาอันสั้น แต่สิ่งสำคัญก็คือการดำเนินการที่เกี่ยวข้องกับอารยธรรมระหว่างดวงดาวอย่างมีประสิทธิภาพ"
 building_animal_evaluation_laboratory:0 "ห้องปฏิบัติการประเมินสัตว์"
 building_animal_evaluation_laboratory_desc:0 "ห้องปฏิบัติการนี้จะศึกษาคุณสมบัติของสายพันธุ์สัตว์เฉพาะตัวที่อาศัยอยู่ในภูมิภาคนี้ และวิธีที่พวกมันอาจจะถูกนำไปประยุกต์ใช้กับการออกแบบจักรกลในอนาคต"
 building_spare_parts_depot:0 "คลังอะไหล่"
 building_spare_parts_depot_desc:0 "คลังเก็บอะไหล่ขนาดใหญ่แบบรวมศูนย์ที่มีชิ้นส่วนอะไหล่สำหรับจักรกลทุกรุ่นที่กำลังทำงานอยู่ในจักรวรรดิของเรา"
 building_unit_assembly_plant:0 "โรงงานหน่วยประกอบ"
 building_unit_assembly_plant_desc:0 "โรงงานที่ควบคุมดูแลโดย AI นี้ช่วยเร่งกระบวนการประกอบยูนิตจักรกลใหม่บนโลกใบนี้ได้อย่างมาก"
 building_singularity_core:0 "แกนกลางภาวะเอกฐาน"
 building_singularity_core_desc:0 "หลุมดำขนาดจิ๋วที่มีเสถียรภาพซึ่งถูกกักไว้ในสิ่งปลูกสร้างกักกันขนาดใหญ่ ศักยภาพในการวิจัยนั้นแทบไม่มีขีดจำกัด"
 building_probability_engine:0 "เครื่องความน่าจะเป็น"
 building_probability_engine_desc:0 "โครงสร้าง AI ที่ทรงพลังอย่างยิ่งนี้รันการจำลองทางคณิตศาสตร์ขั้นสูงอย่างต่อเนื่องด้วยความพยายามอันสูญเปล่าที่จะคาดการณ์การกระทำในอนาคตของสังคมอินทรียวัตถุ อย่างไรก็ตาม มันได้รับการพิสูจน์แล้วว่ามีความเชี่ยวชาญในการคาดการณ์พัฒนาการของตลาดหุ้นของพวกเขา"
 building_organic_sanctuary:0 "เขตรักษาพันธุ์สิ่งมีชีวิต"
 building_organic_sanctuary_desc:2 "สถานคุ้มครองนี้จัดเตรียมสภาพแวดล้อมที่ปิดมิดชิดเพื่อให้สิ่งมีชีวิตอินทรีย์สามารถเติบโตได้อย่างปลอดภัยและอยู่ภายใต้การควบคุมเป็นสำคัญ สิ่งมีชีวิตอินทรีย์ภายในจะได้รับความต้องการด้านที่อยู่อาศัยอย่างครบถ้วนสมบูรณ์"
 building_organic_paradise:0 "สวรรค์ของสิ่งมีชีวิต"
 building_organic_paradise_desc:2 "สวรรค์เทียมที่ควบคุมโดย AI ซึ่งได้รับการออกแบบมาเพื่อตอบสนองทุกความต้องการที่สิ่งมีชีวิตอินทรีย์มีปัญญาอาจจะมี ตราบใดที่มันไม่แสดงความต้องการในการกำหนดชะตาชีวิตของตนเอง สิ่งมีชีวิตอินทรีย์ภายในจะได้รับความต้องการด้านที่อยู่อาศัยอย่างครบถ้วนสมบูรณ์"
 building_trophy_vault: "ห้องนิรภัยจัดแสดงความคิดสร้างสรรค์"
 building_trophy_vault_desc: "อัลกอริทึมจะคอยดูแลการผลัดเปลี่ยนการจัดแสดงผลงานสร้างสรรค์ของไบโอ-โทรฟีที่คัดสรรมา โดยเลือกจากความสะท้อนอารมณ์ที่มีนัยสำคัญทางสถิติ แม้ว่าในทางวัตถุวิสัยจะขาดคุณค่าทางเทคนิค แต่การแสดงออกเหล่านี้ก็ได้รับการอนุรักษ์ไว้เพื่อเป็นช่องทางในการตรวจสอบความถูกต้องทางสังคมและอารมณ์ และเพื่อสร้างภาพลวงตาของการกำหนดชะตาชีวิตด้วยตนเอง ดัชนีชี้วัดความพึงพอใจที่เพิ่มขึ้นส่งผลลัพธ์ไม่น้อยเลยทีเดียว"
 building_nutrient_paste_facility:0 "โรงงานผลิตสารอาหารเหลวข้น"
 building_nutrient_paste_facility_desc:0 "สิ่งปลูกสร้างนี้ใช้ผลพลอยได้ทางอุตสาหกรรมต่าง ๆ เพื่อสร้างสารอาหารเหลวข้นเหนียวซึ่งเป็นแหล่งสารอาหารชั้นยอดสำหรับสิ่งมีชีวิตอินทรีย์ ด้วยการเติมสารแต่งกลิ่นรสทางเคมี สารอาหารเหลวข้นนี้สามารถหล่อขึ้นรูปให้ใกล้เคียงกับส่วนประกอบของอาหารสำเร็จรูปส่วนใหญ่ได้ สิ่งมีชีวิตอินทรีย์เจ็ดในสิบรายไม่สามารถบอกความแตกต่างได้"
 building_neuro_electric_amplifier:0 "เครื่องขยายสัญญาณประสาทไฟฟ้า"
 building_neuro_electric_amplifier_desc:0 "สิ่งปลูกสร้างนี้จะขยายสัญญาณประสาทที่ถูกส่งผ่านระหว่างยูนิตไซเบอร์เนติกส์ภายใต้การควบคุมของเรา เพื่อเพิ่มผลผลิตของพวกเขา"
 building_neuro_electric_amplifier_triggered_effect:0 "ประชากรไซเบอร์เนติก:\n $minerals$: §G+15%§!\n $energy$: §G+15%§!"
 building_war_factory:0 "โรงงานสงคราม"
 building_war_factory_desc:0 "โรงงานหุ่นยนต์สงครามขนาดใหญ่ภายใต้การควบคุมของ AI ขั้นสูงพร้อมรูทีนการผลิตที่ปรับแต่งมาอย่างดีที่สุด"
 building_deployment_post:0 "ที่มั่นลงหลักปักฐาน (เมืองหลวง)"
 building_deployment_post_desc:0 "ที่มั่นเริ่มต้นที่เราจะขยายไปบนดาวนี้"


