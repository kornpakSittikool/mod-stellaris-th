 building_hive_synapse:0 "จุดประสานงานเครือข่ายรัง"
 building_hive_synapse_desc:0 "การเพิ่มสัญญาณของจิตสำนึกร่วมกลุ่มรังช่วยให้โดรนของเราเป็นคนงานที่มีประสิทธิภาพมากขึ้น"
 building_xenology_center:0 "ศูนย์ศึกษาเผ่าพันธุ์ต่างดาว"
 building_xenology_center_desc:0 "การรวบรวมสมาชิกของเผ่าพันธุ์ที่อ่อนแอกว่าไว้ในที่เดียวกันช่วยให้เราศึกษาวิจัยพวกมันและนำมาแสดงเป็นเครื่องพิสูจน์ถึงความเหนือกว่าของเราได้"
 building_symbol_purity:0 "สัญลักษณ์แห่งความบริสุทธิ์"
 building_symbol_purity_desc:0 "$tech_symbol_unity_desc$"
 building_control_center:0 "ศูนย์กลางการควบคุม"
 building_control_center_desc:0 "การสร้างศูนย์ประมวลผลที่มีประสิทธิภาพช่วยให้เราสามารถเพิ่มประสิทธิภาพการทำงานของโดรนได้สูงสุด"

