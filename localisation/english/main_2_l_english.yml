 civic_hive_ascensionists:0 "การพินิจพิเคราะห์ระดับสูง"
 civic_hive_ascensionists_desc:0 "จิตใจรังกังวลเป็นพิเศษเกี่ยวกับสุขภาพทางอภิปรัชญาของการดำรงอยู่ของมัน และแสวงหาวิธีการปรับปรุงตนเองอย่างต่อเนื่อง"
 civic_wilderness_ascensionists: "ความปรารถนาในการยกระดับ"
