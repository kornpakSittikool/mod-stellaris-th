 TECH_UNLOCK_MINING_STATION_DESC:0 "§Hสถานีทำเหมือง§!\nสถานีทำเหมืองสามารถสกัดแร่ธาตุและทรัพยากรล้ำค่าจากวงโคจรของดาวเคราะห์ได้"
 TECH_UNLOCK_RESEARCH_STATION_TITLE:0 "§Hปลดล็อกสถานี:§! สถานีวิจัย"
 TECH_UNLOCK_RESEARCH_STATION_DESC:0 "§Hสถานีวิจัย§!\nสถานีวิจัยสามารถศึกษาปรากฏการณ์ต่างๆ ของดาวเคราะห์จากวงโคจร เพื่อรวบรวมข้อมูลทางวิทยาศาสตร์ที่มีค่า"
 TECH_UNLOCK_AFTERBURNER_1_TITLE:0 "§Hปลดล็อกส่วนประกอบ:§! อาฟเตอร์เบิร์นเนอร์"
 TECH_UNLOCK_AFTERBURNER_1_DESC:0 "§Hอาฟเตอร์เบิร์นเนอร์§!\nคืออุปกรณ์สันดาปตอนท้าย เครื่องขับดันทรงพลังเหล่านี้ให้ความเร็วในการต่อสู้เพิ่มขึ้น แต่ใช้พลังมหาศาล"
 TECH_UNLOCK_AFTERBURNER_2_TITLE:0 "§Hปลดล็อกส่วนประกอบ:§! อาฟเตอร์เบิร์นเนอร์ขั้นสูง"
 TECH_UNLOCK_AFTERBURNER_2_DESC:0 "§Hอุปกรณ์จุดระเบิดท้ายขั้นก้าวหน้า§!\nอุปกรณ์จุดระเบิดท้ายรุ่นปรับปรุงนี้ช่วยเพิ่มความเร็วการรบของยานได้มากยิ่งขึ้น"
 TECH_UNLOCK_THRUSTER_1_TITLE:0 "§Hปลดล็อกส่วนประกอบ:§! ระบบขับดันเคมี"
 TECH_UNLOCK_THRUSTER_1_DESC:0 "§Hเครื่องขับดันเคมี§!\nเครื่องขับดันเคมีที่เรียบง่ายแต่มีประสิทธิภาพปานกลาง ซึ่งอาศัยเชื้อเพลิงขับดันที่เผาไหม้ได้ในการสร้างแรงขับ"
 TECH_UNLOCK_THRUSTER_2_TITLE:0 "§Hปลดล็อกส่วนประกอบ:§! ระบบขับดันไอออน"
 TECH_UNLOCK_THRUSTER_2_DESC:0 "§Hเครื่องขับดันไอออน§!\nเครื่องขับดันไฟฟ้าเหล่านี้ใช้ลำแสงไอออนเพื่อสร้างแรงขับโดยไม่ต้องใช้เชื้อเพลิงขับดัน"
 TECH_UNLOCK_THRUSTER_3_TITLE:0 "§Hปลดล็อกส่วนประกอบ:§! ระบบขับดันพลาสมา"
 TECH_UNLOCK_THRUSTER_3_DESC:0 "§Hเครื่องขับดันพลาสม่า§!\nการขับดันด้วยไฟฟ้าในรูปแบบที่ก้าวหน้า เครื่องขับดันพลาสม่าช่วยให้ยานมีความเร็วต่ำกว่าแสงและการหลบหลีกที่ดียิ่งขึ้น"
 TECH_UNLOCK_THRUSTER_4_TITLE:0 "§Hปลดล็อกส่วนประกอบ:§! ระบบขับดันแรงดล"
 TECH_UNLOCK_THRUSTER_4_DESC:0 "§Hเครื่องขับดันอิมพัลส์§!\nเครื่องขับดันพลังงานฟิวชันที่ก้าวหน้าอย่างมากเหล่านี้ช่วยให้ยานมีความเร็วต่ำกว่าแสงและการหลบหลีกที่ไม่มีใครเทียบได้"
