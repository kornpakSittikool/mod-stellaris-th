 TECH_UNLOCK_COMBAT_COMPUTERS_1_TITLE:0 "§Hปลดล็อกส่วนประกอบ:§!AI ช่วยรบขั้นพื้นฐาน"
 TECH_UNLOCK_COMBAT_COMPUTERS_1_DESC:0 "§HAI ช่วยรบขั้นพื้นฐาน§!\nความคืบหน้าล่าสุดในทฤษฎีพฤติกรรม AI ช่วยให้เราสามารถกำหนดบทบาทการต่อสู้เฉพาะสำหรับคอมพิวเตอร์บนยานของเราได้"
 TECH_UNLOCK_COMBAT_COMPUTERS_2_TITLE:0 "§Hปลดล็อกส่วนประกอบ:§!AI ช่วยรบขั้นสูง"
 TECH_UNLOCK_COMBAT_COMPUTERS_2_DESC:0 "§Hบทบาทการรบขั้นก้าวหน้า§!\nความก้าวหน้าเพิ่มเติมของอัลกอริทึมการรบแบบปรับตัวช่วยให้ AI ประจำยานทำหน้าที่ที่ได้รับมอบหมายได้อย่างมีประสิทธิภาพมากขึ้นอย่างมาก"
 TECH_UNLOCK_COMBAT_COMPUTERS_3_TITLE:0 "§Hปลดล็อกส่วนประกอบ:§!AI ช่วยรบฉลาด"
 TECH_UNLOCK_COMBAT_COMPUTERS_3_DESC:0 "§HAI การรบผู้มีปัญญา§!\nการใช้ประโยชน์จากสัญชาตญาณการเอาตัวรอดหรือความกลัวตายของ AI ที่มีสติปัญญาของเรา ควรช่วยเพิ่มการตอบสนองในการรบได้อย่างมาก"
 TECH_UNLOCK_COMBAT_COMPUTERS_AUTONOMOUS_TITLE:0 "§Hปลดล็อกส่วนประกอบ:§! สติปัญญาของยานที่ควบคุมได้ด้วยตัวเอง"
 TECH_UNLOCK_COMBAT_COMPUTERS_AUTONOMOUS_DESC:0 "§Hปัญญายานยนต์กึ่งอัตโนมัติ§!\nการมอบสติปัญญากึ่งอัตโนมัติให้กับยานยนต์ของเราจะช่วยเพิ่มการตอบสนองในการรบได้อย่างมาก"
