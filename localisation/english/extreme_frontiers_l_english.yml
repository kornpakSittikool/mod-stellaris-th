 extreme_frontiers.1540.title: "อุปกรณ์ที่ยังไม่จุดชนวน"
 extreme_frontiers.1540.desc.industrialist: "ด้วยการพัฒนาเทคโนโลยีที่จริงจัง เราได้ทำการวิศวกรรมย้อนกลับระบบเมทริกซ์การแพร่รังสีทางธรณีวิทยารุ่นเม. ย.ปรับปรุงวิธีการทำงานเพื่อสร้างผลกำไรสูงสุด"
 extreme_frontiers.1540.desc.default: "หลังจากการศึกษาอย่างกว้างขวาง เราประสบความสำเร็จในการวิศวกรรมย้อนกลับระบบเมทริกซ์การแพร่รังสีทางธรณีวิทยารุ่นเม. ย.เปิดล็อกศักยภาพของมันพร้อมกับการปรับปรุงกระบวนการเพิ่มเติม"
 extreme_frontiers.1540.desc.common: "ด้วยการผสานกระบวนการทำลายเสถียรภาพโมเลกุลด้วยกัมมันตรังสีเข้ากับอุปกรณ์ปรับปรุงสภาพดาวเคราะห์ของเรา เราจะสามารถกระตุ้นการเจริญเติบโตของทรัพยากรที่มีค่าได้"
 extreme_frontiers.1540.a: "ข่าวที่ยอดเยี่ยมมาก"
 tech_georadiation_terraforming: "การปรับปรุงสภาพดาวเคราะห์ด้วยการแพร่รังสี"
 tech_georadiation_terraforming_desc: "ด้วยการนำสิ่งแวดล้อมทางชีวภาพของดาวเคราะห์ไปสัมผัสกับการสลายตัวของรังสีระดับโมเลกุล เราจะส่งเสริมการเติบโตของทรัพยากรบางชนิดในขณะที่เปลี่ยนโลกให้กลายเป็นแดนร้างสารพิษ"
 tech_georadiation_terraforming_tt: "ปลดล็อกการตัดสินใจของดาวเคราะห์ §Y$decision_toxify_world$§!"
 extreme_frontiers.1545.title: "อุปกรณ์ถูกทำลาย"
 extreme_frontiers.1545.desc: "เราประสบความสำเร็จในการถอดชิ้นส่วนอุปกรณ์บนดาว §Y[from.GetName]§! กู้คืนวัสดุต่างๆ ที่สามารถนำกลับมาใช้ใหม่เพื่อประโยชน์ของเรา\n\nเมื่ออุปกรณ์นี้ถูกทำลายและอุปกรณ์รุ่นก่อนๆ อยู่ในสภาพปรักหักพัง ความลับของเทคโนโลยีทำลายล้างนี้จะสูญหายไปจากกาแล็กซีตลอดกาล"
 extreme_frontiers.1545.a.default: "ไปให้พ้นซะที"
 decision_toxify_world: "เปลี่ยนโลกเป็นพิษ"
 decision_toxify_world_desc: "ส่งเสริมการเติบโตของทรัพยากรเฉพาะโดยการนำสิ่งแวดล้อมทางชีวภาพของดาวเคราะห์ไปสัมผัสกับการสลายตัวของรังสีโมเลกุล ส่งผลให้มันกลายเป็นดินแดนร้างสารพิษในกระบวนการนี้"
 decision_toxify_world_tt: "เริ่มสถานการณ์: §Hเปลี่ยนโลกเป็นพิษ§!\n - จะเปลี่ยนดาวเคราะห์ดวงนี้เป็น §Yโลกสารพิษ§! ที่มีแหล่งสะสมแร่ [this.GetToxifiedResourcesText]"
