 #############
 # Anomalies #
 #############

 EXTREME_FRONTIERS_TITLE: "Extreme Frontiers" # Do not translate

 # PULSATING OBJECT
 PULSATING_OBJECT_TOXIC_CAT: "วัตถุเต้นเป็นจังหวะ"
 PULSATING_OBJECT_GAS_GIANT_CAT: "วัตถุเต้นเป็นจังหวะ"
 PULSATING_OBJECT_BARREN_CAT: "วัตถุเต้นเป็นจังหวะ"
 PULSATING_OBJECT_BARREN_COLD_CAT: "วัตถุเต้นเป็นจังหวะ"
 PULSATING_OBJECT_FROZEN_CAT: "วัตถุเต้นเป็นจังหวะ"
 PULSATING_OBJECT_MOLTEN_CAT: "วัตถุเต้นเป็นจังหวะ"
 anomaly_pulsating_object_desc: "ผลการสแกนเบื้องต้นของ §Y[this.GetName]§! ค้นพบวัตถุบินได้ที่แปลกประหลาดกำลังลอยผ่านชั้นโทรโพสเฟียร์ มันมีการหดและขยายขนาดขณะที่เปลี่ยนตำแหน่ง จำเป็นต้องมีการตรวจสอบเพิ่มเติมเพื่อจำแนกประเภทธรรมชาติของมัน"
 extreme_frontiers.100.title: "บอลลูนตรวจสภาพอากาศโบราณ"
 extreme_frontiers.100.desc: "§Y[Leader.GetName]§! ระบุว่าวัตถุลอยฟ้าลึกลับบน §Y[from.GetName]§! เป็นบอลลูนตรวจสภาพอากาศโบราณ เครื่องหมายใดๆ ที่สามารถระบุที่มาของมันได้นั้น ถูกสภาพชั้นบรรยากาศที่รุนแรงของดาวเคราะห์พัดหายไปนานแล้ว\n\nการหาอายุด้วยคาร์บอนกัมมันตรังสีบ่งชี้ว่ามันอยู่ในชั้นบรรยากาศของ [from.GetName] มานานกว่าศตวรรษ โดยมีขนาดที่เปลี่ยนไปมาขณะลอยอย่างไร้จุดหมายผ่านการเปลี่ยนแปลงความกดอากาศที่เป็นเอกลักษณ์เฉพาะตัวของดาวเคราะห์ดวงนี้\n\nอย่างอัศจรรย์ แผงพลังงานแสงอาทิตย์ยังคงทำงานอยู่ และอาร์เรย์เซนเซอร์ของมันตอนนี้ก็บันทึกข้อมูลชั้นบรรยากาศที่มีค่ากว่าหนึ่งศตวรรษไว้แล้ว ซึ่งน่าจะเป็นที่สนใจอย่างยิ่งต่อ [Root.Owner.GetResearchers] ของเรา"

 # MOLTEN METAL OCEAN
 MOLTEN_METAL_OCEAN_CAT: "กระแสความร้อนหลอมเหลวที่รุนแรง"
 anomaly_molten_metal_ocean_desc: "การสำรวจพื้นผิวของ §Y[from.GetName]'§! ในเบื้องต้นตรวจพบสึนามิของลาวาที่ร้อนจัดซึ่งมีความเข้มข้นของโลหะหนักสูงอยู่บ่อยครั้ง จำเป็นต้องวิเคราะห์เพิ่มเติมเพื่อทำความเข้าใจปรากฏการณ์นี้อย่างสมบูรณ์"
 extreme_frontiers.110.title: "สึนามิโลหะหลอมเหลว"
 extreme_frontiers.110.desc: "§Y[Leader.GetName]§! ยืนยันว่ามหาสมุทรลาวาบน §Y[from.GetName]§! ประกอบด้วยกึ่งโลหะหายากเกือบทุกชนิดที่รู้จักในบัญชีธาตุของเราในรูปแบบที่บริสุทธิ์เป็นพิเศษ\n\nการสะสมตัวของโลหะเหลวที่มีความหนาแน่นสูงนี้ ทำให้เกิดสนามแม่เหล็กไฟฟ้าที่มีความผันผวนสูง ซึ่งส่งผลให้เกิดการก่อตัวของสึนามิโลหะหลอมเหลวบ่อยครั้ง\n\nด้วยการใช้แบบจำลองคาดการณ์ เราได้ค้นพบช่วงเวลาที่คลื่นสงบลงในระยะสั้นแต่เกิดขึ้นอย่างสม่ำเสมอ ซึ่งสามารถใช้ในการเก็บเกี่ยวแหล่งแร่ที่อุดมสมบูรณ์เป็นพิเศษเหล่านี้ได้"

 # GREAT BLUE SPOTS
 GREAT_BLUE_SPOTS_CAT: "จุดสีน้ำเงินยักษ์"
 great_blue_spots_desc: "พื้นผิวของ §Y[from.GetName]§! มีจุดเปลี่ยนสีที่โดดเด่นสองจุด ซึ่งมีขนาดใหญ่พอที่จะมองเห็นได้จากอวกาศและกำลังเคลื่อนที่ตามกันไปด้วยความเร็วสูงมาก โครงสร้างสีน้ำเงินเหล่านี้มีความน่าสนใจเพียงพอที่จะนำไปศึกษาวิจัยเพิ่มเติม"
 extreme_frontiers.120.title: "พายุยักษ์แบบพึ่งพาอาศัย"
 extreme_frontiers.120.desc: "จุดสีน้ำเงินขนาดใหญ่บน §Y[from.GetName]§! คือคู่พายุยักษ์แบบพึ่งพาอาศัยกัน ซึ่งก็คือไซโคลนและแอนติไซโคลนที่เกื้อหนุนซึ่งกันและกันให้อยู่ในสถานะสมดุลที่สมบูรณ์แบบ\n\nพายุเหล่านี้มีขนาดมหึมาโดยมีความเร็วลมที่พัดผ่านกำแพงเสียงอยู่เป็นประจำ ทำให้เกิดโซนิกบูมที่ทรงพลัง มีฝุ่นโคบอลต์ปริมาณมหาศาลอยู่ภายใน ทำให้จุดเหล่านี้มีสีสันอันเป็นเอกลักษณ์เฉพาะตัว\n\n§Y[Leader.GetName]§! ประเมินว่าพวกมันพัดกระหน่ำอย่างต่อเนื่องที่นี่มานานกว่าศตวรรษแล้ว แร่ธาตุที่สะสมอยู่ในชั้นบรรยากาศระดับสูงน่าจะสามารถเก็บกู้ได้ง่ายด้วยสถานีขุดเจาะ"

 # FROZEN INFERNO
 FROZEN_INFERNO_CAT: "อุณหภูมิพุ่งสูงผิดปกติ"
 frozen_inferno_desc: "ผลสแกนเบื้องต้นของ §Y[from.GetName]§! แสดงให้เห็นการพุ่งสูงของความร้อนที่แปรปรวนอย่างยิ่งบนดาวเคราะห์ที่หนาวเหน็บดวงนี้ อุณหภูมิที่ผิดปกติเหล่านี้น่าจะนำไปสู่การสำรวจเพิ่มเติม"
 extreme_frontiers.130.title: "อเวจีน้ำแข็ง"
 extreme_frontiers.130.desc: "§Y[Leader.GetName]§! ได้ข้อสรุปจากการตรวจสอบการพุ่งสูงของความร้อนที่แปรปรวนบนโลกเยือกแข็งของ §Y[from.GetName]§! แล้ว\n\nสิ่งใต้ผืนดินทุนดราอันกว้างใหญ่ที่ไม่มีวันสิ้นสุดของพื้นผิวดาวเคราะห์ดวงนี้ คือแหล่งสะสมของสารกัมมันต์ติดไฟง่ายที่ว่องไวต่อปฏิกิริยาเคมีสูง ในตอนแรกสารเหล่านี้ยังคงอยู่ในสภาพเฉื่อยใต้ธารน้ำแข็งหนา แต่สารเหล่านี้จะค่อยๆ ถูกร่อนขึ้นมาเป็นระยะเมื่อแผ่นน้ำแข็งทวีปเคลื่อนตัวและแยกออกจากกัน\n\nเมื่อลอยขึ้นมาสู่พื้นผิวและละลาย แก๊สที่ไวต่อการติดไฟเป็นพิเศษเหล่านี้มีแนวโน้มที่จะลุกไหม้ขึ้นมาทันทีในชั้นบรรยากาศที่มีออกซิเจนสูงของ [from.GetName] ส่งผลให้เกิดไฟลุกไหม้ฉับพลันทั่วพื้นผิวของดาวเคราะห์อยู่บ่อยครั้ง\n\nด้วยการใช้อุปกรณ์พิเศษ สารติดไฟเฉพาะตัวเหล่านี้จะสามารถสกัดออกมาและนำไปใช้งานในที่อื่นๆ ได้"

 # POISONED ATMOSPHERE
 POISONED_ATMOSPHERE_CAT: "ชั้นบรรยากาศพิษ"
 poisoned_atmosphere_desc: "ตรวจพบโมเลกุลพิษอินทรีย์ที่มีความเข้มข้นสูงในชั้นบรรยากาศระดับบนของ §Y[from.GetName]§!"
 extreme_frontiers.140.title: "ชั้นบรรยากาศพิษ"
 extreme_frontiers.140.desc.hive_mind: "§Y[from.GetName]§! เป็นแหล่งอาศัยของไลเคนสายพันธุ์น่าทึ่ง ซึ่งปล่อยโมเลกุลที่เป็นพิษร้ายแรงเข้าไปในชั้นบรรยากาศเพื่อป้องกันตัวเองจากการถูกล่า\n\nการศึกษาบันทึกฟอสซิลบ่งชี้ว่า [from.GetName] เคยมีสัตว์ป่าหลากหลายสายพันธุ์มาก่อน แต่ไลเคนเหล่านี้ได้ทำลายพวกมันไปตามกาลเวลา โดยค่อยๆ เพิ่มระดับของสารหนูและแทลเลียมในบรรยากาศให้เร็วเกินกว่าที่สิ่งมีชีวิตส่วนใหญ่จะปรับตัวได้ทัน\n\n§Y[Leader.GetName]§! ค้นพบว่ามีสิ่งมีชีวิตเพียงชนิดเดียวเท่านั้น ซึ่งเป็นสัตว์เลื้อยคลานคล้ายมนุษย์ขนาดใหญ่ ที่สามารถอยู่รอดในสภาวะเช่นนี้ได้ ต้องขอบคุณต่อมล้างพิษภายในตัวที่มีประสิทธิภาพอย่างโดดเด่น\n\nการศึกษาเพิ่มเติมเกี่ยวกับอวัยวะที่น่าทึ่งนี้สามารถช่วยสร้างความเข้าใจอย่างลึกซึ้งเกี่ยวกับการบำบัดสารพิษในชั้นบรรยากาศได้"
 extreme_frontiers.140.desc.default: "$extreme_frontiers.140.desc.hive_mind$ การทดลองในเบื้องต้นยังระบุด้วยว่าสารประกอบเฉพาะตัวที่อยู่ในสารพิษเหล่านี้สามารถนำไปดัดแปลงเพื่อใช้ในอุตสาหกรรมเครื่องสำอางได้"
 extreme_frontiers.140.a: "ช่างเป็นศักยภาพที่น่าสนใจเหลือเกิน..."
 extreme_frontiers.140.b: "นำไปแปรรูปเป็นน้ำหอม"
 DETOXIFICATION_GLAND_PROJECT: "การวิจัยต่อมล้างพิษ"
 DETOXIFICATION_GLAND_PROJECT_DESC: "สัตว์เลื้อยคลานสายพันธุ์ที่น่าทึ่งกำลังเติบโตได้ดีในชั้นบรรยากาศที่เป็นพิษของ §Y[from.GetName]§! ด้วยการช่วยเหลือจากอวัยวะภายในพิเศษที่สลายสารพิษร้ายแรงให้กลายเป็นสารอาหารที่เป็นประโยชน์ การศึกษาสิ่งมีชีวิตนี้เพิ่มเติมถือเป็นความพยายามที่มีค่ามาก"
 extreme_frontiers.145.title: "ความเข้าใจเชิงลึกเกี่ยวกับการบำบัดพิษ"
 extreme_frontiers.145.desc: "จากการศึกษากลุ่มต่อมของสัตว์เลื้อยคลานบนดาว §Y[from.GetName]§! อย่างเข้มข้น §Y[Leader.GetName]§! ได้เปิดเผยความลับทางชีวภาพของความสามารถในการต้านทานความเป็นพิษที่โดดเด่นของดาวเคราะห์ดวงนี้\n\nอวัยวะที่ซับซ้อนนี้ผลิตสารประกอบที่ทำหน้าที่เป็นตัวสะเทินฤทธิ์กับชั้นบรรยากาศที่เป็นพิษ ป้องกันไม่ให้สารพิษถูกดูดซึมเข้าสู่ระบบหมุนเวียนโลหิตของสัตว์เลื้อยคลาน ต่อมที่ปรับตัวได้สูงนี้ยังสามารถลบล้างแม้กระทั่งยาพิษร้ายแรงที่สุดที่สร้างขึ้นในห้องแล็บของเราได้ด้วย\n\nการค้นพบที่ยอดเยี่ยมเหล่านี้จะช่วยเปลี่ยนวิธีการบำบัดสารพิษในชั้นบรรยากาศของเรา"

 # GLIMPSE OF THE CORE
 GLIMPSE_CORE_CAT: "การมองเห็นแกนกลางดาว"
 glimpse_the_core_desc: "ความเคลื่อนไหวที่แปลกประหลาดในชั้นแก๊สรอบนอกของ §Y[from.GetName]'§! กำลังทำให้เกิดช่องระบายที่ลึกเป็นพิเศษเปิดออก เผยให้เห็นแกนของแข็งของดาวเคราะห์ในระยะเวลาสั้นๆ ปรากฏการณ์ที่น่าทึ่งนี้น่าจะทำการศึกษาเพิ่มเติมอย่างยิ่ง"
 extreme_frontiers.150.title: "แกนกลางสิ่งมีชีวิต"
 extreme_frontiers.150.desc: "จากการส่งยานสำรวจลึกลงไปในช่องระบายชั่วคราวช่องหนึ่งบน §Y[from.GetName]§! §Y[Leader.GetName]§! ค้นพบว่าแกนของดาวเคราะห์ดวงนี้เป็นบ้านของสิ่งมีชีวิตเซลล์เดียวที่ไม่เหมือนอะไรที่เราเคยพบเห็นมาก่อน\n\nเซลล์ที่แข็งแกร่งเหล่านี้ดูเหมือนจะปรับตัวได้อย่างสมบูรณ์แบบเพื่อความอยู่รอดภายใต้ความกดดันมหาศาล โดยการสืบพันธุ์ตามฤดูกาลของพวกมันจะปล่อยไฮโดรเจนออกมาในปริมาณที่มากพอสมควร [Leader.GetName] สรุปว่านี่คือวิธีที่ชั้นแก๊สไฮโดรเจนของดาวเคราะห์ดวงนี้ถูกรักษาเอาไว้\n\nการกำจัดสิ่งมีชีวิตเหล่านี้จะช่วยทำให้ชั้นบรรยากาศรอบนอกสลายหายไป เหลือไว้แต่ดาวเคราะห์หินที่เหมาะสมต่อการตั้งถิ่นฐาน"
 extreme_frontiers.150.a: "กำจัดพวกมันทิ้งซะ"
 extreme_frontiers.150.b: "เป็นโอกาสในการสังเกตการณ์ที่หาได้ยาก"
 PURIFY_CORE_PROJECT: "ชำระล้างแกนดาว"
 PURIFY_CORE_PROJECT_DESC: "ชั้นแก๊สรอบนอกของ §Y[from.GetName]'§! ถูกรักษาไว้ด้วยชีวเคมีที่เป็นเอกลักษณ์ของสิ่งมีชีวิตเซลล์เดียวที่อาศัยอยู่ในแกนกลางของมัน การกำจัดพวกมันจะช่วยสลายแก๊สเหล่านี้ออกไป เหลือไว้เพียงดาวเคราะห์หินที่เราตั้งถิ่นฐานได้"
 extreme_frontiers.155.title: "โลกใหม่"
 extreme_frontiers.155.desc: "§Y[Leader.GetName]§! ส่งยานสปอร์ติดอาวุธเข้าไปในช่องเปิดช่องหนึ่งบนพื้นผิวของ §Y[from.From.GetName]'§! เมื่อไปถึงแกนกลาง ก็ทำการปล่อยอาวุธพิษ ติดเชื้อและกวาดล้างสิ่งมีชีวิตเซลล์เดียวดั้งเดิมของมัน\n\nเราเฝ้ามองชั้นแก๊สรอบนอกของ [from.From.GetName] ค่อยๆ สลายไปในความว่างเปล่า เหลือทิ้งไว้เพียงดาวเคราะห์หินดวงเล็กๆ"
 extreme_frontiers.155.a: "เป็นความสำเร็จที่น่าประทับใจ"

 # OPTICAL PHENOMENA
 OPTICAL_PHENOMENA_CAT: "พื้นผิวส่องประกาย"
 optical_phenomena_desc: "ผลสแกนภาพของเราบน §Y[from.GetName]§! ส่งกลับผลปรากฏการณ์ทางแสงที่สว่างไสวเป็นพิเศษทั่วพื้นผิวของดาวเคราะห์ แม้ว่าสาเหตุของรูปแบบสีสันเหล่านี้จะยังไม่ชัดเจนจากระยะวงโคจรก็ตาม"
 extreme_frontiers.160.title: "ลานน้ำแข็งสีรุ้ง"
 extreme_frontiers.160.desc.default: "การตรวจสอบพื้นผิวของ§Y[from.GetName]§!'อย่างใกล้ชิดเผยให้เห็นสาเหตุของปรากฏการณ์ทางแสงที่พบระหว่างการสำรวจในวงโคจร\n\nสภาพชั้นบรรยากาศได้ขัดผิวดินเยือกแข็งคงตัวขนาดใหญ่ของดาวเคราะห์ให้มีลักษณะใสจนเงา เผยให้เห็นโครงข่ายลึกของคริสตัลหลากสีที่ซ่อนอยู่ข้างใต้ ปรากฏการณ์ที่เกิดขึ้นตามธรรมชาตินี้ทำให้เกิดเอฟเฟกต์ภาพลวงตาคาไลโดสโคปเมื่อสังเกตจากระยะไกล"
 extreme_frontiers.160.desc.machine: "$extreme_frontiers.160.desc.default$\n\nแม้ว่าจะมีความสวยงามตามธรรมชาติ แต่แหล่งแร่อันอุดมสมบูรณ์ที่อยู่ภายในต่างหากที่เป็นเป้าหมายที่แท้จริงที่เราให้ความสนใจ"
 extreme_frontiers.160.tooltip: "ปลดล็อกการตัดสินใจของดาวเคราะห์ §Y$decision_prismatic_ice_exhibit$§! ซึ่งมีผลดังต่อไปนี้:\n£amenities£ $MOD_PLANET_AMENITIES_MULT$: §G+25%§!\n$mod_planet_jobs_unity_produces_mult$: §G+25%§!"
 decision_prismatic_ice_exhibit: "นิทรรศการน้ำแข็งปริซึม"
 decision_prismatic_ice_exhibit_desc: "แผ่นน้ำแข็งใสแจ๋วที่สกัดขึ้นมาซึ่งสามารถสร้างภาพสะท้อนแสงหลากสีที่สวยงามตระการตา สามารถนำไปจัดแสดงโชว์ได้ในช่วงเวลาจำกัด"
 prismatic_ice_max_3_times_pass: "สามารถประกาศใช้ได้สูงสุด §Y3§! ครั้ง"
 prismatic_ice_max_3_times_fail: "$TRIGGER_FAIL$สามารถประกาศใช้ได้สูงสุด §Y3§! ครั้ง"
 prismatic_ice_max_3_times_pass_with_var: "$TRIGGER_PASS$$prismatic_ice_max_3_times_pass$ (ปัจจุบัน: §Y[owner.prismatic_ice_exhibit_happened]§!)"
 exhibiting_prismatic_ice: "นิทรรศการน้ำแข็งปริซึม"
 exhibiting_prismatic_ice_desc: "แผ่นน้ำแข็งใสแจ๋วที่สกัดขึ้นมาซึ่งสามารถสร้างภาพสะท้อนแสงหลากสีที่สวยงามตระการตา สามารถนำไปจัดแสดงโชว์ได้ในช่วงเวลาจำกัด"

 # PLASMA VOLCANOES
 PLASMA_VOLCANO_CAT: "พลาสม่าจากวงโคจร"
 plasma_volcano_desc: "เรามีหลักฐานทางทัศนภาพยืนยันว่าพลาสมาที่ร้อนจัดและผันผวนสูงถูกยิงเข้าสู่ชั้นบรรยากาศระดับบนของ §Y[from.GetName]§!\n\nเถ้าภูเขาไฟที่หนาทึบในชั้นบรรยากาศเป็นอุปสรรคต่อการระบุแหล่งที่มาของวิถีเหล่านี้จากวงโคจร การศึกษาอย่างใกล้ชิดมีแนวโน้มที่จะเป็นอันตราย"
 extreme_frontiers.170.title: "ภูเขาไฟพลาสม่า"
 extreme_frontiers.170.desc: "§Y[Leader.GetName]§! ค้นพบสาเหตุของการปะทุของพลาสมาที่ร้อนจัดบน §Y[from.GetName]§! แล้ว\n\nสนามแม่เหล็กที่เป็นเอกลักษณ์เฉพาะตัวของดาวเคราะห์ช่วยส่งเสริมปฏิกิริยาระหว่างสารไอออนิกใต้เนื้อโลก ทำให้เกิดห้องภูเขาไฟที่มีพลาสม่าแรงดันสูงมาก\n\nเมื่อแผ่นเปลือกโลกที่ไม่เสถียรของดาวเกิดการเคลื่อนตัว พลาสมานี้จะระเบิดและพุ่งทะยานขึ้นสู่ด้านบนราวกับกระสุนปืนร้ายแรง โดยไปทำปฏิกิริยากับแก๊สในบรรยากาศทำให้เกิดการระเบิดซ้ำซ้อนครั้งที่สอง ผู้เชี่ยวชาญด้านอาวุธของเรากระตือรือร้นอย่างยิ่งที่จะนำหลักการเหล่านี้ไปใช้กับยุทโธปกรณ์ที่ใช้พลาสมาของเรา"
 extreme_frontiers.170.desc.negative: "โชคร้ายที่ความเสี่ยงอันตรายของงานวิจัยชิ้นนี้ทำให้ [Leader.GetName] ต้องเผชิญกับอาการ"
 extreme_frontiers.170.desc.traumatized: "$extreme_frontiers.170.desc.negative$ กระทบกระเทือนทางจิตใจอย่างรุนแรง"
 extreme_frontiers.170.desc.maimed: "$extreme_frontiers.170.desc.negative$ บาดเจ็บทางร่างกายสาหัส"

 # BLACK CLOUDS
 BLACK_CLOUDS_CAT: "เมฆดำทมิฬ"
 black_clouds_desc: "สังเกตเห็นเมฆสีดำหนาทึบในชั้นบรรยากาศของ §Y[from.GetName]'§! เคลื่อนตัวในรูปแบบที่ผิดปกติโดยไม่ขึ้นกับความเร็วลมหรือทิศทางลมของดาวเคราะห์ พวกมันจะปรากฏขึ้นเพียงชั่วครู่บนเครื่องสแกนภาพของเรา และจะปรากฏขึ้นที่จุดเวลาเดียวกันในวัฏจักรกลางวันและกลางคืนของดาวเคราะห์เสมอ"
 extreme_frontiers.180.title: "ฝูงแมลงอินเซกตอยด์"
 extreme_frontiers.180.desc: "เมฆดำที่ผิดปกติบน §Y[from.GetName]§! ความจริงแล้วเป็นฝูงแมลงกินเนื้อขนาดใหญ่ที่บินอยู่อย่างหนาแน่น\n\nนักล่ามีปีกเหล่านี้ทำรังในรอยแยกของหินและจะออกมาวันละครั้งเพื่อกัดกินสิ่งมีชีวิตอินทรีย์ที่มีอยู่อย่างเบาบางบนพื้นผิวโลก\n\nด้วยระบบเผาผลาญที่ทรงพลังซึ่งจะช่วยย้อนกลับการเสื่อมสลายของเซลล์เมื่อได้กินอาหาร สัตว์ขาปล้องเหล่านี้จึงสามารถยืดอายุขัยของตนเองออกไปได้เรื่อยๆ ตราบใดที่พวกมันได้รับสารอาหารอย่างสม่ำเสมอ"
 extreme_frontiers.180.desc.altered_metabolism: "ในระหว่างการวิเคราะห์ภาคสนาม [Leader.Species.GetHandName] ของ [Leader.GetName] โดนตัวอย่างชิ้นหนึ่งกัดเข้า ส่งผลให้เกิดการตอบสนองทางเมตาบอลิซึมที่น่าทึ่ง สิ่งมีชีวิตสายพันธุ์พิเศษนี้มีสิ่งที่น่าเรียนรู้อีกมากเกี่ยวกับความสามารถในการฟื้นฟูเซลล์อินทรีย์"
 extreme_frontiers.180.b: "ขุดพวกมันขึ้นมาและกลืนกินให้หมด"
 leader_trait_altered_metabolism: "ระบบเผาผลาญแปรเปลี่ยน"
 leader_trait_altered_metabolism_desc: "การสัมผัสกับสารภายนอกระหว่างการปฏิบัติงานภาคสนามส่งผลกระทบอย่างถาวรต่อผู้นำท่านนี้"

 # SUBGLACIAL VIBRATIONS
 SUBGLACIAL_VIBRATIONS_CAT: "แรงสั่นสะเทือนใต้ธารน้ำแข็ง"
 subglacial_vibrations_desc: "ภายใต้พื้นผิวที่กลายเป็นน้ำแข็งและไร้ชีวิตของ §Y[from.GetName]'§! คือมหาสมุทรใต้ธารน้ำแข็งอันกว้างใหญ่ ตรวจพบแรงสั่นสะเทือนที่ดังก้องลึกลงไปใต้ชั้นดินเยือกแข็งคงตัวซึ่งไม่ได้บันทึกว่าเป็นแผ่นดินไหวตามธรรมชาติ"
 extreme_frontiers.190.title: "สัตว์ตระกูลแมวน้ำยักษ์"
 extreme_frontiers.190.desc: "การผสมผสานระหว่างการสะท้อนข้อมูลคลื่นเสียงในทะเลลึกและการวัดการสั่นสะเทือนระยะไกลสามารถระบุแหล่งที่มาของแรงสั่นสะเทือนใต้ทะเลลึกบนดาว §Y[from.GetName]§! ได้แล้ว มหาสมุทรไนโตรเจนเหลวใต้ชั้นน้ำแข็งเป็นบ้านของฝูงสัตว์ตระกูลแมวน้ำขนาดใหญ่ที่ปรับตัวเข้ากับชีวิตในสภาพแวดล้อมที่โหดร้ายนี้ได้\n\nสิ่งมีชีวิตที่น่าทึ่งเหล่านี้มีขนาดและมวลเทียบเท่ากับยานขนส่งขนาดเล็ก ในการสื่อสารพวกมันจะปล่อยคลื่นเสียงความถี่ต่ำที่ทรงพลังซึ่งสามารถดังก้องสะท้อนไปทั่วทั้งดาวเคราะห์ ไขมันใต้ผิวหนังที่อุดมไปด้วยคอลลาเจนช่วยปกป้องพวกมันจากการโดนความเย็นจัดทำลายและแผลหิมะกัด ในขณะเดียวกันก็ช่วยขยายเสียงเรียกของพวกมันไปทั่วมหาสมุทร\n\nเนื่องจากไม่มีผู้ล่าตามธรรมชาติในระบบนิเวศที่แยกตัวโดดเดี่ยวนี้ สัตว์ขนาดใหญ่เหล่านี้จึงมีความอยากรู้อยากเห็น เชื่องมาก และสามารถล่อให้ขึ้นมาบนพื้นผิวได้ง่ายโดยการจำลองเสียงร้องอันมีเอกลักษณ์เฉพาะของพวกมัน"
 extreme_frontiers.190.a: "การค้นพบที่เป็นเอกลักษณ์"
 extreme_frontiers.190.a.tt: "ปลดล็อกอาคาร : ['building:building_pinniped_sanctuary']"
 extreme_frontiers.190.b: "เหยื่อที่เคี้ยวง่าย"
 building_pinniped_sanctuary: "เขตอนุรักษ์สัตว์ตระกูลแมวน้ำยักษ์"
 building_pinniped_sanctuary_desc: "เขตอนุรักษ์สำหรับสัตว์ตระกูลแมวน้ำยักษ์ที่จับได้ในมหาสมุทรไนโตรเจนเหลวของ [event_target:pinnipeds_home_planet.GetName]"

 # ELECTRIC WATERS
 ELECTRIC_WATERS_CAT: "ผืนน้ำไฟฟ้า"
 electric_waters_desc: "ผลการสแกนจากวงโคจรของ §Y[from.GetName]§! ตรวจพบสัญญาณไฟฟ้าที่แปรปรวนลึกลงไปในทะเลน้ำแข็งของดาวเคราะห์\n\nการศึกษาเพิ่มเติมเกี่ยวกับปรากฏการณ์ทางน้ำนี้จะช่วยเปิดเผยข้อมูลได้มากขึ้น"
 extreme_frontiers.200.title: "ปะการังแรงดันไฟสูง"
 extreme_frontiers.200.desc: "แหล่งที่มาของกระแสไฟฟ้าในทะเลลึกบนดาว §Y[from.GetName]§! ได้รับการระบุโดย §Y[Leader.GetName]§! แล้ว\n\nพื้นมหาสมุทรเป็นที่อยู่ของปะการังน้ำเย็นสายพันธุ์ซับซ้อนที่มีความสามารถในการสร้างกระแสไฟฟ้า สายพันธุ์นี้ใช้ออร์แกเนลล์เฉพาะในการสร้างกระแสไฟฟ้าเพื่อล่อจุลินทรีย์มาเป็นทั้งอาหารและการสื่อสาร\n\nยานสำรวจของเราทำหน้าที่เป็นตัวกระตุ้นปะการัง ซึ่งตอบสนองด้วยการเพิ่มกำลังการปล่อยกระแสไฟฟ้าเมื่อใดก็ตามที่เราเปลี่ยนความถี่ในการส่งสัญญาณ\n\nการปรับเปลี่ยนการปฏิสัมพันธ์ของเรากับปะการังน้ำลึกชนิดนี้อย่างรอบคอบจะทำให้เราสามารถเพิ่มการผลิตพลังงานของดาวเคราะห์ดวงนี้ได้โดยไม่ไปทำลายระบบนิเวศอันบอบบาง"

 # OBSIDIAN PLANET
 OBSIDIAN_PLANET_CAT: "ทิวทัศน์ระยิบระยับ"
 obsidian_planet_desc: "การสแกนภาพของ §Y[from.GetName]§! แสดงให้เห็นแผ่นดินทวีปหินออบซิเดียนที่เคลือบพื้นผิวรกร้างของดาวเคราะห์ดวงนี้ โดยมีร่องรอยของกำมะถันหนาแน่นตกค้างในชั้นบรรยากาศด้านบน\n\nการสำรวจทางธรณีวิทยาอย่างละเอียดและเจาะจงมากขึ้นจะช่วยบอกรายละเอียดแก่เราได้ดีกว่านี้"
 extreme_frontiers.210.title: "ดินแดนร้างออบซิเดียน"
 extreme_frontiers.210.desc: "จากการวิเคราะห์ตะกอนดินของ §Y[from.GetName]§! เราพบว่าโลกที่เคยเป็นภูเขาไฟดวงนี้เคยเผชิญกับปรากฏการณ์แข็งตัวฉับพลัน ทำให้ลาวาบนพื้นผิวเปลี่ยนสภาพเป็นแก้วภูเขาไฟที่ส่องประกายเงางาม\n\nหลุมอุกกาบาตจำนวนมากบนพื้นผิวของดาวเคราะห์บอกใบ้ว่าเหตุการณ์นี้น่าจะเกิดจากการชนของวัตถุอวกาศภายนอก เช่น พายุอุกกาบาต ภายในแนวออบซิเดียนเหล่านี้มีฟองแก๊สซัลฟิวริกขนาดใหญ่ที่ถูกดักจับจากช่องภูเขาไฟที่ถูกปิดผนึกไว้ด้วยการแข็งตัวเฉียบพลันนั้น\n\nด้วยวิธีการสกัดที่แม่นยำ เราจะสามารถนำทรัพยากรเหล่านี้มาใช้สำหรับความต้องการของเราได้"

 # SHEARING FORCE
 SHEARING_FORCE_CAT: "การสื่อสารขาดหาย"
 shearing_force_desc: "ยานสำรวจการสังเกตการณ์ที่ถูกส่งไปยังชั้นบรรยากาศของ §Y[from.GetName]§! ขาดการเชื่อมต่อลงทั้งหมด ขณะนี้ยังไม่ทราบตำแหน่งที่แน่นอนของเครื่องมือดังกล่าว\n\nจำเป็นต้องมีการสำรวจดาวเคราะห์ดวงนี้อย่างใกล้ชิดยิ่งขึ้นเพื่อกู้คืนข้อมูลกลับมา"
 extreme_frontiers.220.title: "แรงเฉือนปะทะ"
 extreme_frontiers.220.desc: "เราได้ระบุสาเหตุที่ยานสำรวจของเราหายไปบน §Y[from.GetName]§! แล้ว\n\nชั้นแก๊สต่างๆ ที่ประกอบเป็นชั้นบรรยากาศของดาวเคราะห์มีอุณหภูมิที่แตกต่างกันอย่างชัดเจน ความแตกต่างที่รุนแรงนี้ทำให้เกิดกระแสลมสวนทางอย่างรุนแรงเมื่อชั้นแก๊สเคลื่อนตัวปะทะกันในทิศทางตรงกันข้าม\n\nสิ่งนี้เมื่อประกอบกับความหนาแน่นที่แตกต่างกันของแก๊สแต่ละชนิด ก่อให้เกิดแรงเฉือนทำลายล้างที่ฉีกกระชากทุกสิ่งสะบั้นขณะผ่านรอยต่อระหว่างชั้นบรรยากาศเหล่านั้น\n\nตอนนี้เราทราบแล้วว่าต้องเผชิญกับอะไร อุปกรณ์ของเราสามารถนำมาปรับปรุงใหม่เพื่อให้ทนทานต่อสภาวะสุดขั้วเหล่านี้ได้ ทำให้เราสามารถใช้ประโยชน์จากพลังงานจลน์ของปรากฏการณ์ธรรมชาตินี้ได้"

 # MISSING MASS
 MISSING_MASS_CAT: "มวลที่ขาดหาย"
 missing_mass_desc: "ค่าการวัดมวลของ §Y[from.GetName]§! ต่ำกว่าช่วงค่าที่คาดการณ์ไว้สำหรับดาวเคราะห์หินขนาดนี้อย่างเห็นได้ชัด แนะนำให้ทำการตรวจสอบเพิ่มเติม"
 extreme_frontiers.230.title: "หนอนปล้องชั้นเนื้อโลก"
 extreme_frontiers.230.desc: "การตรวจสอบทางธรณีวิทยาของ §Y[from.GetName]'§! อย่างใกล้ชิดพบว่าชั้นเนื้อโลกที่เป็นซิลิเกตมีโครงข่ายอุโมงค์ใต้ดินขนาดใหญ่ที่ทอดตัวยาว\n\nยานสำรวจเผยให้เห็นว่าโพรงเหล่านี้เป็นที่อยู่อาศัยของสิ่งมีชีวิตประเภทหนอนปล้องในชั้นเนื้อโลกส่วนลึกซึ่งดำรงชีวิตอยู่ได้ด้วยการกินหินซิลิเกต ฝูงสิ่งมีชีวิตเหล่านี้กำลังกัดกินดาวเคราะห์จากข้างใน จากนั้นก็ขับของเสียที่ย่อยแล้วออกมาสู่วงโคจรของดาวเคราะห์ซึ่งจะถูกลมสุริยะพัดกระจายออกไป\n\nการกำจัดหนอนเหล่านี้จะช่วยให้ [controller.GetMinerPlural_lower] ของเราเข้าถึงแหล่งแร่ซิลิเกตปริมาณมหาศาลที่ขุดเจาะได้ง่ายขึ้น"
 extreme_frontiers.230.desc.terravore: "$extreme_frontiers.230.desc$ ความอยากอาหารของพวกมันช่างน่าประทับใจยิ่ง และไม่แตกต่างจากเรามากนัก"
 extreme_frontiers.230.a: "เดินเครื่องขุดเจาะได้"
 extreme_frontiers.230.b: "ศึกษาสิ่งมีชีวิตที่น่าหลงใหลเหล่านี้"

 # LIFE IN DARKNESS
 LIFE_IN_DARKNESS_CAT: "ชีวิตในความมืดมิด"
 life_in_darkness_desc: "§Y[from.GetName]§! ถูกล็อกด้วยแรงไทดัลโดยครึ่งหนึ่งของดาวเคราะห์อยู่ในสถานะมืดมิดถาวร ผลสแกนอินฟราเรดชี้ให้เห็นว่าพื้นที่ไร้แสงและขาดสารอาหารนี้เป็นที่อยู่ของระบบนิเวศอินทรีย์ที่ยังมีชีวิตชีวาอยู่"
 extreme_frontiers.240.title: "วิวัฒนาการโปร่งแสง"
 extreme_frontiers.240.desc: "ด้านที่มืดมิดถาวรของ §Y[from.GetName]§! ได้สร้างสภาพแวดล้อมทางวิวัฒนาการที่เป็นเอกลักษณ์สำหรับสิ่งมีชีวิตเพียงไม่กี่ชนิดที่สามารถเอาชีวิตรอดบนโลกที่โหดร้ายนี้ได้\n\nเนื่องจากการแปรผันของโครโมโซมที่พิเศษ สัตว์ป่าที่นี่จึงมีลักษณะโปร่งแสงทั้งหมด ไม่มีดวงตาสำหรับมองเห็น และใช้ระบบสะท้อนเสียงที่ซับซ้อนเพื่อความอยู่รอด"
 extreme_frontiers.240.desc.non_homicidal: "$extreme_frontiers.240.desc$ การปรับตัวที่โดดเด่นเหล่านี้เป็นที่สนใจอย่างมากของ [controller.GetResearcherPlural_lower] ของเรา"
 extreme_frontiers.240.a: "ช่างเปิดหูเปิดตา"
 extreme_frontiers.240.b: "พวกมันจะถูกกลืนกิน"
 extreme_frontiers.240.c: "กำจัดให้สิ้นซาก"

 # RAINBOW RIVERS
 RAINBOW_RIVERS_CAT: "แม่น้ำเรืองแสง"
 rainbow_rivers_desc: "ผลสแกนเบื้องต้นของ §Y[from.GetName]§! เผยให้เห็นแม่น้ำเรืองแสงไหลพาดผ่านพื้นผิวดาวเคราะห์ ซึ่งมีสีสันที่สลับสับเปลี่ยนไปเรื่อยๆ ตลอดสเปกตรัมแสง\n\nการศึกษาเพิ่มเติมจะให้รายละเอียดเกี่ยวกับปรากฏการณ์ที่แปลกประหลาดนี้มากขึ้น"
 extreme_frontiers.250.title: "การสังเคราะห์ทางเคมีหลากสีสัน"
 extreme_frontiers.250.desc: "การวิเคราะห์แม่น้ำเรืองแสงบน §Y[from.GetName]§! เผยให้เห็นว่าพวกมันเป็นบ้านของสิ่งมีชีวิตจุลชีพสายพันธุ์พิเศษ\n\nสิ่งมีชีวิตเหล่านี้ใช้กระบวนการสังเคราะห์ทางเคมีในการย่อยสลายสารที่เป็นอันตราย ส่งผลให้เกิดผลพลอยได้ที่ไวต่อปฏิกิริยาสูงซึ่งไปเปลี่ยนองค์ประกอบทางเคมีของแม่น้ำ ทำให้เกิดการเปลี่ยนสีสันอย่างรวดเร็ว\n\nโทนสีนีออนที่สว่างสดใสที่พวกมันสร้างขึ้นยังทำหน้าที่เป็นช่องทางการสื่อสารเพื่อส่งสัญญาณถึงความพร้อมในการสืบพันธุ์ เพื่อดึงดูดคู่ผสมพันธุ์ในขณะที่พวกมันเดินทางผ่านลำธารพิษของดาวเคราะห์\n\nการศึกษาต่อเนื่องของสิ่งมีชีวิตเหล่านี้และวัฏจักรชีวิตของพวกมันจะเป็นโอกาสวิจัยที่น่าหลงใหลสำหรับ [controller.GetResearcherPlural_lower] ของเรา"

 # GASEOUS METALS
 GASEOUS_METALS_CAT: "โลหะแก๊ส"
 gaseous_metals_desc: "ชั้นบรรยากาศของ §Y[from.GetName]§! ประกอบด้วยโลหะชนิดต่างๆ ในสถานะแก๊สเป็นหลัก ด้วยความเข้าใจที่ดีขึ้นเกี่ยวกับสภาวะที่โหดร้ายของดาวเคราะห์ดวงนี้ เราอาจสามารถสกัดสารประกอบที่มีค่าเหล่านี้ได้"
 extreme_frontiers.260.title: "เมฆชุบโลหะด้วยไฟฟ้า"
 extreme_frontiers.260.desc: "ชั้นบรรยากาศที่ผิดปกติของ §Y[from.GetName]'§! ได้ดักจับรังสีจากดวงอาทิตย์ไว้เป็นจำนวนมาก ทำให้เกิดปฏิกิริยาลูกโซ่ของภาวะโลกร้อนส่งผลให้โลหะอยู่ในสถานะแก๊สและมีความผันผวนสูงมาก\n\nสารประกอบเหล่านี้ทำปฏิกิริยาทันทีกับอุปกรณ์สำรวจที่เราติดตั้ง โดยเคลือบมันด้วยชั้นโลหะผสมที่บางแต่ทนทาน อย่างน่าประหลาดใจกระบวนการนี้ไม่ทำลายอุปกรณ์\n\n§Y[leader.GetName]§! เชื่อว่ากระบวนการชุบโลหะด้วยไฟฟ้าที่เกิดขึ้นตามธรรมชาตินี้สามารถนำมาใช้ปรับปรุงความต้านทานแรงดึงของตัวยานอวกาศทั่วทั้งจักรวรรดิ §Y[controller.GetName]§! ได้"
 ATMOSPHERIC_ELECTROPLATING: "การชุบโลหะด้วยไฟฟ้าในบรรยากาศ"
 ATMOSPHERIC_ELECTROPLATING_DESC: "การส่งวัตถุเข้าไปในชั้นบรรยากาศโลหะแก๊สของ §Y[from.GetName]§! ส่งผลให้เกิดรูปแบบการชุบโลหะด้วยไฟฟ้าตามธรรมชาติ\n\nกระบวนการที่เป็นเอกลักษณ์นี้มีประสิทธิภาพอย่างน่าทึ่ง และการศึกษาเพิ่มเติมสามารถนำไปจำลองเพื่อปรับปรุงความทนทานของตัวยานอวกาศทั่วทั้งจักรวรรดิ [Root.Owner.GetName] ได้"
 extreme_frontiers.265.title: "โลหะประสิทธิภาพสูง"
 extreme_frontiers.265.desc: "เราได้ค้นพบวิธีจำลองกระบวนการชุบโลหะด้วยไฟฟ้าที่ผิดปกติของชั้นบรรยากาศที่ผันผวนบนดาว §Y[from.From.GetName]'§! ในระดับอุตสาหกรรมแล้ว\n\nจากการนำความรู้ที่ได้เรียนรู้มาปรับใช้ [Root.Owner.GetEngineerPlural] ของเราในตอนนี้สามารถเพิ่มความทนทานของโลหะบางประเภทได้อย่างมากโดยไม่สูญเสียความยืดหยุ่นหรือเพิ่มน้ำหนัก\n\nวิธีการขั้นสูงเหล่านี้สามารถนำไปประยุกต์ใช้กับกระบวนการสร้างยานอวกาศของเราได้"

 # CARBON ALLOTROPES
 CARBON_ALLOTROPES_CAT: "อัญรูปคาร์บอน"
 carbon_allotropes_desc: "ข้อมูลสเปกโทรสโกปีจาก §Y[from.GetName]§! บ่งชี้ว่าองค์ประกอบของดาวเคราะห์อุดมไปด้วยอัญรูปคาร์บอนที่หายากและซับซ้อน จำเป็นต้องมีการตรวจสอบอย่างใกล้ชิดเพื่อการจัดประเภทที่ละเอียดขึ้น"
 extreme_frontiers.270.title: "แหล่งแร่กราฟีน"
 extreme_frontiers.270.desc: "พบแหล่งแร่กราฟีนที่อุดมสมบูรณ์บนดาว §Y[from.GetName]§! อัญรูปคาร์บอนที่หายากนี้มีความหนาเพียงโมเลกุลเดียวเท่านั้นแต่มีความแข็งแกร่งและการนำไฟฟ้าที่ไม่มีใครเทียบได้\n\nวัสดุนาโนที่มีค่านี้ก่อตัวขึ้นเองตามธรรมชาติบนพื้นผิวที่นี่ ต้องขอบคุณกระบวนการตกตะกอนของไอเคมีซึ่งเป็นคุณสมบัติเฉพาะของชั้นบรรยากาศที่ผิดปกติของ §Yโลกคาร์บอน(Carbon World)§! ดวงนี้"
 extreme_frontiers.270.a: "สกัดมันออกมา"

 # DIAMOND DUST
 DIAMOND_DUST_CAT: "มวลความเร็วสูง"
 diamond_dust_desc: "ผลสแกนมวลของ §Y[from.GetName]§! เผยให้เห็นการสะสมตัวของสสารทางกายภาพที่เคลื่อนที่อย่างรวดเร็วซึ่งตั้งอยู่ลึกลงไปในชั้นโทรโพสเฟียร์ตอนล่าง\n\nแหล่งที่มาของค่าที่ตรวจพบที่ผิดปกติเหล่านี้ยากที่จะตรวจสอบได้โดยไม่มีการสำรวจรายละเอียดเพิ่มเติม"
 extreme_frontiers.280.title: "พายุเพชร"
 extreme_frontiers.280.desc: "เราได้ระบุแหล่งที่มาของค่ามวลที่ผิดปกติบนดาว §Y[from.GetName]§! แล้ว\n\nชั้นบรรยากาศของดาวเคราะห์ประกอบด้วยแก๊สมีเทนที่อุดมด้วยคาร์บอนเป็นหลัก ซึ่งแข็งตัวเป็นโครงสร้างเพชรที่มีความหนาแน่นสูงเมื่อแรงกดดันจากแรงโน้มถ่วงเพิ่มขึ้น เนื่องจากวัฏจักรพายุที่รุนแรงของดาวเคราะห์ ปรากฏการณ์นี้ทำให้เกิดพายุเพชรที่เคลื่อนตัวอย่างรวดเร็ว\n\nแม้ว่าเพชรเหล่านี้จะสกัดได้ง่ายเพื่อนำมาใช้ประโยชน์ แต่อนาคต §Y[leader.GetName]§! ก็มั่นใจว่าการตรวจสอบความหนาแน่นและความบริสุทธิ์ของพวกมันอย่างละเอียดจะส่งผลลัพธ์ที่มีค่ามากขึ้นไปอีก"
 ATMOSPHERIC_DIAMONDS_PROJECT: "เพชรในชั้นบรรยากาศ"
 ATMOSPHERIC_DIAMONDS_PROJECT_DESC: "จากการศึกษาพายุเพชรที่มีความหนาแน่นสูงเป็นพิเศษบนดาว §Y[from.GetName]§! เรามั่นใจว่าคุณสมบัติพิเศษของพวกมันสามารถนำมาใช้พัฒนาเทคโนโลยีเลเซอร์ของเราได้"
 extreme_frontiers.285.title: "ความแม่นยำของเพชร"
 extreme_frontiers.285.desc: "การวิจัยของ §Y[leader.GetName]§! เกี่ยวกับเพชรที่มีความหนาแน่นสูงมากของดาว §Y[from.From.GetName]§! ได้ข้อสรุปแล้ว\n\nกระบวนการบีบอัดที่สร้างเพชรเหล่านี้ส่งผลให้เกิดโครงสร้างผลึกคริสตัลที่เฉพาะตัว สิ่งนี้ทำให้พวกมันมีประสิทธิภาพอย่างน่าทึ่งในการกักเก็บและขยายการสั่นสะเทือนของแสงความถี่สูง\n\nการค้นพบครั้งสำคัญนี้จะเป็นผลประโยชน์ที่ยอดเยี่ยมสำหรับจักรวรรดิของเรา"

 # ETREME GEOLOGICAL TENSION
 GEOLOGICAL_TENSION_CAT: "แรงตึงเครียดทางธรณีวิทยาที่รุนแรง"
 geological_tension_desc: "ผลสแกนทางธรณีวิทยาของ §Y[from.GetName]§! ชี้ให้เห็นว่าเปลือกดาวเคราะห์ของโลกหลอมเหลวดวงนี้อยู่ภายใต้แรงกดดันมหาศาลจากกองกำลังการเคลื่อนตัวของแผ่นเปลือกโลกที่สะสมอยู่ เหตุการณ์ทางธรณีวิทยาครั้งสำคัญอาจเกิดขึ้นในไม่ช้า"
 extreme_frontiers.290.title: "ซูเปอร์โวลคาโนที่ถูกปิดกั้น"
 extreme_frontiers.290.desc: "หลังจากศึกษาแรงตึงเครียดของแผ่นดินไหวที่รุนแรงเพิ่มเติมบนดาว §Y[from.GetName]§! เราพบว่าภูเขาไฟยักษ์ขนาดมหึมาถูกปิดกั้นจากการถล่มของกรวยภูเขาไฟส่วนบนบางส่วน\n\nแมกมาสำรองจำนวนมหาศาลไหลเข้าเต็มห้องใต้ดินที่มีอยู่ทั้งหมด และกำลังส่งแรงดันมหาศาลขึ้นไปปะทะกับสิ่งกีดขวางในช่องระบายหลัก วัสดุที่ถล่มลงมาปัจจุบันยังคงยึดแมกมาไว้ให้อยู่กับที่ แต่เป็นไปไม่ได้ที่จะคาดเดาว่าสมดุลที่บอบบางนี้จะคงอยู่ได้นานเพียงใด\n\nหินหลอมเหลวที่ถูกดักจับอยู่นั้นอุดมไปด้วยโลหะหายากและสารประกอบแร่อัญมณีที่ซับซ้อนอย่างยิ่ง §Y[leader.GetName]§! เชื่อว่าเราสามารถเก็บเกี่ยวทรัพยากรเหล่านี้ได้อย่างปลอดภัยโดยการกระตุ้นให้เกิดการปะทุภายใต้การควบคุม"
 extreme_frontiers.290.a: "ปลดล็อกช่องระบายภูเขาไฟ"
 extreme_frontiers.290.b: "นำกิจกรรมความร้อนใต้พิภพนี้ไปใช้ประโยชน์ให้ดี"
 CONTROLLED_ERUPTION_PROJECT: "การปะทุภายใต้การควบคุม"
 CONTROLLED_ERUPTION_PROJECT_DESC: "ซูเปอร์โวลคาโนที่ถูกปิดกั้นบนดาว §Y[from.GetName]§! กำลังกักเก็บแมกมาที่อุดมไปด้วยแร่ธาตุปริมาณมหาศาลไว้ใต้พื้นผิว การดำเนินการปะทุภายใต้การควบคุมจะช่วยให้เราเก็บเกี่ยวทรัพยากรที่ติดอยู่เหล่านี้ได้"
 extreme_frontiers.295.title: "มหาปะทุ"
 extreme_frontiers.295.desc: "จากการเจาะอุโมงค์เทียมหลายแห่งในจุดต่างๆ ของกรวยภูเขาไฟชั้นนอกของซูเปอร์โวลคาโนบนดาว §Y[from.From.GetName]'§! เราได้ทำให้โครงสร้างของมันอ่อนแอลงจนไม่สามารถรองรับแมกมาปริมาณมหาศาลที่สะสมอยู่ด้านล่างได้อีกต่อไป\n\nเมื่อถึงจุดเปลี่ยน ผลลัพธ์ที่ได้ช่างน่าตื่นตาตื่นใจ ส่วนบนของภูเขาไฟถูกทำลายจนหมดสิ้นในขณะที่หินหลอมเหลวที่มีแรงดันสูงระเบิดพุ่งขึ้นด้านบนอย่างรุนแรง\n\nเรานำทางลาวาที่เอ่อล้นไปยังช่องทางที่เตรียมไว้เป็นอย่างดี ซึ่งมันจะถูกเก็บเกี่ยวโดยอุปกรณ์ทำเหมืองเฉพาะทาง"
 extreme_frontiers.295.a.default: "ช่างน่าตื่นตาตื่นใจยิ่ง"
 extreme_frontiers.295.a.machine: "การปฏิบัติการประสบความสำเร็จ"

 # LAYERED ATMOSPHERE
 LAYERED_ATMOSPHERE_CAT: "ยักษ์ใหญ่ผู้ปะทุ"
 layered_atmosphere_desc: "ผลสแกนของ §Y[from.GetName]§! ตรวจพบการปะทุของแก๊สติดไฟง่ายกระจายอยู่ทั่วดาวเคราะห์ ซึ่งสร้างความท้าทายสำหรับการสำรวจระยะไกล\n\nจำเป็นต้องทำการสำรวจอย่างใกล้ชิดยิ่งขึ้น"
 extreme_frontiers.300.title: "ชั้นบรรยากาศแบ่งระดับ"
 extreme_frontiers.300.desc: "§Y[leader.GetName]§! ได้เปิดเผยแหล่งที่มาของการปะทุที่แปรปรวนบนดาว §Y[from.GetName]§! แล้ว\n\nชั้นบรรยากาศของดาวแก๊สยักษ์ดวงนี้ก่อตัวขึ้นในลักษณะที่ไฮโดรเจนเหลวในสถานะโลหะลอยตัวอยู่ระหว่างชั้นเมโซสเฟียร์และสตราโตสเฟียร์ที่เป็นแก๊ส องค์ประกอบที่หนาแน่นกว่าของแก๊สมีเทนในชั้นล่างช่วยพยุงของเหลวนี้ไว้\n\nเมื่อเวลาผ่านไป การปล่อยประจุไฟฟ้าจะสะสมตัวภายในโลหะไฮโดรเจนเหลว ส่งผลกระทบต่อชั้นล่าง หลังจากความกดดันสะสมตัวถึงจุดวิกฤต การปะทุของแก๊สจะพ่นของเหลวที่นำไฟฟ้าสูงออกสู่บรรยากาศส่วนบน และกระจายตัวไปทั่วทั้งดาวเคราะห์ก่อนที่จะตกลงมาอีกครั้ง\n\nระบบติดตามของเราสามารถเฝ้าสังเกตความผันผวนของแรงดันเหล่านี้ได้อย่างง่ายดาย ทำให้เราสามารถเก็บเกี่ยวทรัพยากรอันมีค่าเหล่านี้ได้"

 # SOLIDIFIED PLASMA TRAILS
 PLASMA_TRAILS_CAT: "คลื่นพลังงานแปรปรวน"
 plasma_trails_desc: "ตรวจพบคลื่นพลังงานที่ผันผวนตามแนวรอยเลื่อนของแผ่นเปลือกโลกบนดาว §Y[from.GetName]§!\n\nแหล่งกำเนิดของยอดคลื่นเหล่านี้ไม่สามารถตรวจยืนยันได้จากวงโคจร จำเป็นต้องศึกษาอย่างใกล้ชิดเพื่อระบุแหล่งที่มาของปรากฏการณ์นี้"
 extreme_frontiers.310.title: "เส้นทางพลาสม่าสะสมตัว"
 extreme_frontiers.310.desc: "การวิเคราะห์ทางธรณีวิทยาของ §Y[from.GetName]§! ระบุสาเหตุของการพุ่งสูงของพลังงานที่แปรปรวนซึ่งตรวจพบในระหว่างการสำรวจวงโคจรเบื้องต้นได้แล้ว\n\nกิจกรรมการเคลื่อนตัวของเปลือกโลกที่ปั่นป่วนของดาวเคราะห์ดวงนี้ทำให้เกิดการปล่อยประจุไฟฟ้าสถิตที่รุนแรงในพื้นที่ทุนดราเยือกแข็งที่ไม่เสถียร\n\nสายฟ้าภูเขาไฟนี้จะปะทุขึ้นสู่ท้องฟ้า เปลี่ยนอากาศโดยรอบให้กลายเป็นพลาสม่า ความร้อนที่รุนแรงเป็นพิเศษที่ถูกปล่อยออกมาจากเหตุการณ์นี้ก่อให้เกิดอุณหภูมิที่เปลี่ยนแปลงอย่างฉับพลันซึ่งจะแข็งตัวกลายเป็นโครงสร้างรูปสายฟ้า\n\nจากการนำสิ่งที่เราได้เรียนรู้มาวิเคราะห์ทางธรณีวิทยา เราจะสามารถคาดการณ์การปะทุของแผ่นดินไหวเหล่านี้ได้อย่างง่ายดาย และนำปรากฏการณ์นี้มาใช้ประโยชน์เพื่อวัตถุประสงค์ของเราเอง"

 # CRYSTALLINE PLAINS
 CRYSTALLINE_PLAINS_CAT: "กิจกรรมภูเขาไฟเยือกแข็ง"
 crystalline_plains_desc: "การวิเคราะห์เปลือกโลกของ §Y[from.GetName]§! แสดงให้เห็นกิจกรรมภูเขาไฟเยือกแข็งที่เกิดขึ้นอย่างมีนัยสำคัญทั่วทั้งดาวเคราะห์ในลักษณะที่ผิดปกติ"
 extreme_frontiers.320.title: "ทุ่งราบผลึกแก้ว"
 extreme_frontiers.320.desc: "การสำรวจทางธรณีวิทยาโดยละเอียดของ §Y[from.GetName]§! เผยให้เห็นแม่น้ำแอมโมเนียกึ่งเยือกแข็งที่ไหลอยู่ใต้เปลือกโลกที่หนาวเหน็บ แรงดันความร้อนใต้พิภพที่สูงขึ้นผลักดันให้สารนี้ไหลผ่านรอยแยกในพื้นผิวที่เปราะบาง\n\nการปะทุเหล่านี้จะพ่นส่วนผสมที่ระเหยง่ายของไอระเหยที่เป็นอันตรายและแอมโมเนียเหลวข้นแช่แข็งออกไปทั่วพื้นผิวดาวเคราะห์ เมื่อสัมผัสกับอุณหภูมิพื้นผิวที่เย็นจัด สารเหลวข้นนั้นจะแข็งตัวอีกครั้ง ก่อตัวเป็นทุ่งราบกว้างใหญ่ของผลึกแก้วที่มีค่าและเก็บเกี่ยวได้ง่าย"

 # SUPERMASSIVE GIANT
 SUPERMASSIVE_GIANT_CAT: "ดาวแก๊สยักษ์มวลยวดยิ่ง"
 supermassive_giant_desc: "§Y[from.GetName]§! เป็นดาวแก๊สยักษ์มวลยวดยิ่งซึ่งมีแรงดึงดูดที่รุนแรงจนดึงเอาวัตถุต่างๆ นับพันเข้าสู่วงโคจรของมัน การจัดหมวดหมู่วัตถุเหล่านี้น่าจะคุ้มค่าที่จะทำ"
 extreme_frontiers.330.title: "ขยะอวกาศ"
 extreme_frontiers.330.desc: "§Y[from.GetName]§! มีดาวบริวารขนาดเล็ก ดาวเคราะห์น้อย และขยะอวกาศจำนวนมากที่ติดอยู่ในวงโคจรของมัน การหาอายุด้วยไอโซโทปรังสีบ่งชี้ว่าพวกมันทั้งหมดถูกดึงดูดเข้ามาโดยแรงโน้มถ่วงของดาวเคราะห์ดวงนี้ขณะเคลื่อนผ่านระบบเมื่อหลายพันปีก่อน\n\nในระหว่างจัดหมวดหมู่วัตถุเหล่านี้ เราพบยานสำรวจในอดีตที่มีพื้นฐานมากๆ สองสามเครื่อง ซึ่งแสดงให้เห็นถึงอารยธรรมที่เพิ่งเริ่มก้าวแรกในการสำรวจอวกาศ\n\nคลังข้อมูลส่วนใหญ่ของพวกมันเสียหายหรือได้รับความเสียหายทางกายภาพจากการชนกับวัตถุอื่น แต่มีเครื่องหนึ่งที่มีภาพถ่ายพื้นผิวของ [from.GetName] เป็นชุดต่อเนื่องกันยาวนานนับร้อยปี"
 extreme_frontiers.330.a: "การค้นพบที่น่าทึ่ง"
 extreme_frontiers.330.b: "แยกชิ้นส่วนพวกมันเป็นเศษเหล็ก"

 # INVISIBLE PLANET
 INVISIBLE_PLANET_CAT: "ความผิดปกติของวงโคจร"
 invisible_planet_desc: "สังเกตพบการแกว่งตัวเล็กน้อยแต่เกิดขึ้นซ้ำๆ ในวิถีวงโคจรของ §Y[from.GetName]§! ซึ่งบ่งชี้ว่ามันตกอยู่ภายใต้แรงโน้มถ่วงขนาดใหญ่บางอย่างที่ไม่ทราบที่มาเป็นประจำ\n\nแนะนำให้ศึกษาอวกาศรอบข้างเพิ่มเติม"
 extreme_frontiers.340.title: "ดาวเคราะห์ล่องหน"
 extreme_frontiers.340.desc: "การวิเคราะห์เพิ่มเติมของระบบดาว §Y[from.solar_system.GetName]§! พบว่าวงโคจรของดาวเคราะห์ทั้งหมดในระบบนี้แสดงความผิดปกติในลักษณะเดียวกัน\n\nหลังจากคำนวณตำแหน่งจากแรงโน้มถ่วงที่ส่งผลกระทบต่อการเคลื่อนไหวที่ผิดปกติเหล่านี้ เราได้ค้นพบสาเหตุของมัน: ดาวเคราะห์ที่มองไม่เห็นมาก่อน ซึ่งตอนนี้เป็นที่รู้จักในชื่อ §Y[invisible_planet.GetName]§!\n\nโลกดวงนี้มีพื้นผิวที่เป็นเอกลักษณ์ซึ่งประกอบด้วยอนุภาคคาร์บอนสีดำสนิทที่ไม่สะท้อนแสงหรือคลื่นวิทยุใดๆ ทำให้เครื่องสแกนระยะไกลแทบจะตรวจจับไม่ได้เลย\n\nโพลิเมอร์ที่เกิดขึ้นตามธรรมชาตินี้มีความสามารถในการดูดซับอย่างโดดเด่น"
 extreme_frontiers.340.desc.default: "$extreme_frontiers.340.desc$ วัสดุเหล่านี้เปิดโอกาสพิเศษในการทำวิจัย"
 extreme_frontiers.340.desc.first_contact: "$extreme_frontiers.340.desc$ พวกมันจะถูกเก็บเกี่ยวและศึกษาเพื่อนำไปใช้ประโยชน์ในฐานะวัสดุพรางตัว"

 # SURVIVAL POD
 SURVIVAL_POD_WARM_CAT: "สถานีภาคสนามที่ถูกดัดแปลงใช้งานใหม่"
 SURVIVAL_POD_COLD_CAT: "สถานีภาคสนามที่ถูกดัดแปลงใช้งานใหม่"
 survival_pod_desc: "การสแกนพื้นที่ของพื้นผิวอันรกร้างบน §Y[from.GetName]'§! เผยให้เห็นสถานีภาคสนามที่ถูกเปลี่ยนวัตถุประสงค์การใช้งาน ซึ่งแต่เดิมเคยเป็นแล็บวิจัยชั่วคราวที่หมดอายุการใช้งานไปนานแล้ว รังสีความร้อนจางๆ บ่งบอกว่าส่วนหนึ่งของสิ่งปลูกสร้างยังคงทำงานอยู่"
 extreme_frontiers.350.title: "ผู้รอดชีวิตเพียงหนึ่งเดียว"
 extreme_frontiers.350.desc: "การเดินทางสำรวจพื้นผิวไปยัง §Y[from.GetName]§! พบสถานีภาคสนามดังกล่าวและผู้พำนักเพียงคนเดียว\n\nเธอระบุว่าตนเองเป็นนักวิทยาศาสตร์ที่ติดอยู่และอดทนต่อสู้ในโลกที่โหดร้ายนี้มานานหลายปี โดยเสนอจะใช้ความเชี่ยวชาญของเธอให้กับ [root.Owner.GetName] เพื่อแลกกับการช่วยเหลือ"
 extreme_frontiers.350.a: "ประสบการณ์ของเธอคือสิ่งมีค่า"
 extreme_frontiers.350.b: "มอบยานกระสวยและเสบียงให้แก่เธอ"
 extreme_frontiers.350.c: "ปล่อยเธอไว้ที่นั่นแล้วเฝ้าสังเกตการณ์"
 extreme_frontiers.350.d: "ช่างน่ารักจริง ทำลายที่พักของเธอซะ"
 extreme_frontiers.352.title: "$NAME_survivalist_scru$"
 extreme_frontiers.352.desc: "[scru_species.GetClass] ผอมแห้งเดินออกมาจากสถานีภาคสนามที่ดัดแปลงเป็นที่พักอาศัย เมื่อเธอพูดถึงความทุกข์ทรมานของเธอบนดาว §Y[from.From.GetName]§! เสียงจาก [scru_species.GetMouthName] ของเธอก็แผ่วพร่าและติดขัด คำพูดเอ่ยออกมาขาดๆ หายๆ\n\n"ยกโทษให้ฉันด้วย ฉันไม่ได้... พูดกับใครเลยมาหลายปีแล้ว...""
 extreme_frontiers.352.a: "อะไรที่ทำให้คุณต้องมาติดอยู่ที่นี่?"
 extreme_frontiers.352.a.response: "ฉันกำลังสำรวจ [from.From.GetName] จัดหมวดหมู่หินฐานที่ไม่ซ้ำใคร ลูกเรือของฉันบอกว่าพวกเขาจะไปลาดตระเวนสั้นๆ ด้วยยานสำรวจ ฉันเชื่อใจพวกเขา หลังจากกังวลอยู่สองสามวัน ฉันถึงเพิ่งตระหนักได้ว่าเกิดอะไรขึ้น พวกเขาบินหนีกลับบ้านไปแล้ว"
 extreme_frontiers.352.b: "คุณเอาชีวิตรอดที่นี่มานานขนาดนี้ได้อย่างไร?"
 extreme_frontiers.352.b.response: "โอ้ มันเป็นเรื่องมหัศจรรย์ทีเดียวที่คุณสามารถทำได้เมื่อปรับเปลี่ยนความสามารถในการซึมผ่านของเซลล์และการแสดงออกที่มากเกินไปของโปรตีนตอบสนองต่อความร้อน... หลังจากนั้น มันก็เป็นเรื่องง่ายที่จะกระตุ้นกระบวนการกินตัวเองของเซลล์บนเซลล์ที่ถูกดัดแปลงของฉัน และด้วยปริมาณโซเดียมในโลกนี้ ฉันจึงสามารถทำอาหารรสเลิศได้หลายมื้อ"
 extreme_frontiers.352.c: "คุณไม่อยากกลับไปพบเจอเพื่อนพ้องของคุณแล้วหรือ?"
 extreme_frontiers.352.c.response: "พวกเขาไม่คู่ควรกับการค้นพบครั้งสำคัญที่ฉันทำสำเร็จบนหินก้อนนี้ ฉันไม่สนใจหรอกว่าพวกเขามีเหตุผลหลอกลวงอะไรที่ทิ้งฉันไว้"
 extreme_frontiers.352.d: "คุณสามารถทำอะไรให้เราได้บ้าง?"
 extreme_frontiers.352.d.response: "ฉันเหนื่อยกับการทำงานในห้องแล็บชั่วคราวแล้ว ฉันอยากเห็นโลกใหม่ๆ... จากอวกาศ"
 extreme_frontiers.352.e: "เกณฑ์ $NAME_survivalist_scru$"
 extreme_frontiers.352.e.custom_tooltip: "§Y$NAME_survivalist_scru$§! เข้าร่วมจักรวรรดิของเราในฐานะ §Hผู้นำ§!"
 NAME_survivalist_scru: "Scru"
 survivalist_scru_desc: "นักวิทยาศาสตร์ผู้มีพรสวรรค์ที่มีทักษะการเอาชีวิตรอดซึ่งได้รับการฝึกฝนในสภาพแวดล้อมสุดขั้ว"
 leader_trait_hardened_survivalist: "ผู้เอาตัวรอดที่ผ่านศึกหนัก"
 leader_trait_hardened_survivalist_desc: "ผู้นำท่านนี้มีความรู้ที่ไม่มีใครเทียบได้เกี่ยวกับสภาพแวดล้อมที่อยู่อาศัยไม่ได้"

 # Infernal Tornadoes
 INFERNAL_TORNADOES_CAT: "อุณหภูมิสุดขั้ว"
 infernal_tornadoes_desc: "ผลสแกนของ §H[from.GetName]§! แสดงให้เห็นพื้นที่กว้างใหญ่ของพายุความกดอากาศสูงที่เคลื่อนที่อย่างรวดเร็ว\n\nพายุเหล่านี้กำลังปล่อยร่องรอยความร้อนที่ผันผวนสูงมาก จำเป็นต้องมีการวิจัยเฉพาะเจาะจงเพื่อเปิดเผยว่าสาเหตุนั้นเกิดจากธรรมชาติหรือสิ่งมีชีวิตรูปแบบใหม่ที่ไม่เคยรู้จักมาก่อน"
 extreme_frontiers.360.title: "ทอร์นาโดเพลิง"
 extreme_frontiers.360.desc: "แหล่งที่มาของร่องรอยความร้อนสุดขั้วบนดาว §H[from.GetName]§! ได้รับการค้นพบแล้ว\n\nทั่วดาวเคราะห์ดวงนี้ กีย์เซอร์กำลังพ่นแก๊สไฮโดรเจนที่ติดไฟได้ง่ายจากใต้ดินส่วนลึก เมื่อกีย์เซอร์เหล่านี้ปะทุขึ้น ความร้อนของดาวเคราะห์ก็จุดไฟเผาแก๊ส ส่งผลให้เสาเพลิงขนาดมหึมาพุ่งทะยานขึ้นสู่ท้องฟ้า\n\nเมื่อผสมผสานกับความกดอากาศ สิ่งนี้ทำให้เกิดกระแสลมแปรปรวนที่รุนแรง ส่งผลให้เปลวไฟหมุนวนพัดผ่านภูมิประเทศในรูปแบบของทอร์นาโดเพลิงขนาดใหญ่\n\nแม้ว่าจะเป็นปรากฏการณ์ธรรมชาติที่ทำลายล้าง แต่ [Root.Owner.GetResearcherPlural_lower] ของเราก็มั่นใจว่าทอร์นาโดเหล่านี้และพลังงานจลน์มหาศาลที่พวกมันสร้างขึ้น สามารถจำลองขึ้นมาเพื่อใช้งานจริงได้"
 INFERNAL_CATALYSTS_PROJECT: "ตัวเร่งปฏิกิริยาอเวจี"
 INFERNAL_CATALYSTS_PROJECT_DESC: "จากการศึกษาสภาวะเบื้องหลังพายุทอร์นาโดเพลิงของ §H[from.GetName]§! อย่างใกล้ชิดยิ่งขึ้น ผลประโยชน์ของปรากฏการณ์นี้จะสามารถสร้างขึ้นมาใหม่ได้ในสภาพแวดล้อมที่ควบคุม"
 extreme_frontiers.365.title: "เครื่องสะท้อนความร้อนภูเขาไฟ"
 extreme_frontiers.365.desc: "§Y[from.Leader.GetName]§! ประสบความสำเร็จในการค้นหาวิธีจำลองและใช้ประโยชน์จากทอร์นาโดเพลิงที่พบบน §Y[from.From.GetName]§! ในสภาพแวดล้อมที่มีการควบคุม\n\nด้วยการค้นพบที่ยิ่งใหญ่นี้ เราจะสามารถใช้ฐานทัพดาวของเราในการเพิ่มพลังงานที่ผลิตจากดาวเคราะห์หลอมเหลวที่พบในระบบดาวเดียวกันได้"
 extreme_frontiers.365.desc.has_furnace: "ทฤษฎีทางวิทยาศาสตร์นี้มีความคล้ายคลึงอย่างมากกับความเข้าใจที่มีอยู่ของเราเกี่ยวกับ §Hเตาหลอมอาร์ก(Arc Furnaces)§! ซึ่งเป็นการเปิดโอกาสใหม่ๆ สำหรับการก่อสร้างนอกโลก"
 extreme_frontiers.365.desc.default: "ทฤษฎีทางวิทยาศาสตร์เบื้องหลังการค้นพบนี้สามารถนำไปประยุกต์ใช้งานได้หลากหลายเพื่อพัฒนาเทคโนโลยี §Hเตาหลอมอาร์ก(Arc Furnace)§! โดย [Root.Owner.GetEngineerPlural] ของเราพร้อมที่จะเริ่มนำทฤษฎีนี้ไปใช้ในการพัฒนาภาคปฏิบัติแล้ว"
 tech_pyroclastic_resonation: "การสะท้อนความร้อนภูเขาไฟ"
 tech_pyroclastic_resonation_desc: "ด้วยการใช้พลังงานความร้อนที่รุนแรงมากซึ่งพบบนดาวเคราะห์หลอมเหลว ฐานทัพดาวของเราสามารถเพิ่มผลผลิตพลังงานในระบบดาวด้วยประสิทธิภาพที่ยอดเยี่ยม"
 sm_pyroclastic_resonator: "เครื่องสะท้อนความร้อนภูเขาไฟ"
 sm_pyroclastic_resonator_desc: "เครื่องสะท้อนความร้อนที่สามารถเพิ่มผลผลิตพลังงานของดาวเคราะห์หลอมเหลวใดๆ ในระบบดาว\nการผลิต $i_energy$ จะแปรผันตามจำนวนของ ['concept_pc_molten'] ในระบบ"

 # MAGMA MEGAFAUNA
 MAGMA_MEGAFAUNA_CAT: "ภูมิศาสตร์ที่ไม่เสถียร"
 magma_megafauna_desc: "ผลสแกนของ §Y[from.GetName]§! แสดงให้เห็นพื้นที่บางส่วนของพื้นผิวดาวเคราะห์หลอมเหลวที่มีการขยับตัวอย่างต่อเนื่องเป็นระยะทางกว้าง\n\nจำเป็นต้องศึกษารายละเอียดอย่างใกล้ชิดเพื่อทำความเข้าใจปรากฏการณ์ทางธรณีวิทยาที่ผิดปกตินี้"
 extreme_frontiers.370.title: "เมก้าฟอน่าหลอมเหลว"
 extreme_frontiers.370.desc: "การตรวจจับการเคลื่อนตัวของเปลือกโลกที่ผิดปกติบน §Y[from.GetName]§! ได้รับการระบุว่าเกิดจากการมีฝูงสัตว์ยักษ์อิงฐานซิลิคอนขนาดใหญ่เดินเตร่ไปมา\n\nการอพยพในระยะทางไกล สิ่งมีชีวิตขนาดมหึมาเหล่านี้จะดำดิ่งลงไปในทะเลสาบลาวาของดาวเคราะห์เป็นระยะเพื่อรวบรวมแหล่งอาหารโปรด: ตะกอนหินที่อุดมไปด้วย §Hธุลีระเหยง่าย(Volotile Motes)§! การติดตามรูปแบบการอพยพของพวกมันจะทำให้เราสามารถสกัดตะกอนเหล่านี้มาใช้เพื่อความต้องการของเราเองโดยส่งผลกระทบต่อระบบนิเวศของดาวเคราะห์น้อยที่สุด\n\nกระดองด้านนอกที่หนาของพวกมันสามารถทนต่ออุณหภูมิที่สุดขั้วได้ การศึกษาเกี่ยวกับวัฏจักรชีวิตของพวกมันอย่างละเอียดและลึกซึ้งยิ่งขึ้นจะช่วยให้ผลลัพธ์ที่น่าทึ่งได้"
 LAVA_DIVERS_PROJECT: "ผู้ดำดิ่งลาวา"
 LAVA_DIVERS_PROJECT_DESC: "สัตว์ยักษ์บน §Y[from.GetName]§! สามารถทนทานต่อสภาพแวดล้อมที่โหดร้ายของโลกหลอมเหลวของพวกมัน และสามารถดำลึกลงไปใต้พื้นผิวของบ่อแมกมาจำนวนมากของดาวเคราะห์\n\nการศึกษากระดองของสิ่งมีชีวิตเหล่านี้อาจช่วยให้เรามีความเข้าใจใหม่ในการรับมือกับความร้อนที่รุนแรงมากได้"
 extreme_frontiers.375.title: "เกราะหลอมแมกมา"
 extreme_frontiers.375.desc: "การศึกษาอย่างละเอียดเกี่ยวกับสิ่งมีชีวิตยักษ์ที่เป็นเอกลักษณ์เฉพาะตัวบน §Y[from.From.GetName]§! ได้เปิดเผยข้อมูลเชิงลึกด้านเทอร์โมไดนามิกส์ที่สามารถนำไปปรับใช้ในอู่ต่อเรือของเราได้\n\nอาหารที่ผสมธุลีระเหยง่ายของสิ่งมีชีวิตเหล่านี้ทำให้เกิดโครงสร้างอิงสารซิลิเกตที่มีน้ำหนักมาก ก่อตัวขึ้นทั่วกระดองชั้นนอกที่ทนทาน เสริมด้วยวัสดุทนไฟที่เกิดขึ้นตามธรรมชาติ\n\nหลังจากกู้คืนตัวอย่างกระดองด้านนอกที่พวกมันสลัดทิ้งจำนวนมาก [Root.Owner.GetEngineerPlural] ของเราในตอนนี้ก็สามารถเลียนแบบหลักการชีวกลศาสตร์ของพวกมันเพื่อพัฒนาแผ่นเกราะตัวยานของเราเองได้แล้ว"

 # PLANET THRUSTERS
 PLANET_THRUSTERS_CAT: "เครื่องจักรที่ลอยเคว้ง"
 planet_thrusters_desc: "สิ่งที่ลอยอยู่ในชั้นบรรยากาศส่วนบนของ§Y[from.GetName]§! คือชุดเครื่องจักรทรงกระบอกขนาดใหญ่ พวกมันดูเหมือนจะใช้งานไม่ได้และไม่มีลูกเรืออยู่เลย"
 extreme_frontiers.380.title: "ไอพ่นขับเคลื่อนดาวเคราะห์"
 extreme_frontiers.380.desc: "เครื่องจักรที่ถูกทิ้งร้างแต่ละเครื่องที่พบบน §Y[from.GetName]§! เป็นชิ้นส่วนของไอพ่นอิสระ รวมทั้งหมดแล้วมีอยู่มากกว่าหนึ่งพันเครื่องในชั้นบรรยากาศด้านบน\n\nสร้างขึ้นจากวัสดุที่ได้รับการออกแบบเป็นพิเศษ อุปกรณ์นิวเคลียร์ฟิวชันที่ซับซ้อนเหล่านี้ได้รับการออกแบบมาเพื่อดึงแก๊สไฮโดรเจนจากดาวเคราะห์ด้านล่างเพื่อใช้เป็นเชื้อเพลิงในการสร้างแรงขับมหาศาล ส่วนใหญ่แสดงสัญญาณความเสียหายจากการทำงานเกินพิกัด\n\nการวิเคราะห์ของเราเผยให้เห็นว่าเครื่องจักรทั้งหมดอยู่ในตำแหน่งที่แรงขับนี้จะส่งแรงปะทะกับดาวเคราะห์โดยตรง ซึ่งชี้ให้เห็นว่าฮาร์ดแวร์โบราณนี้เดิมทีถูกติดตั้งเพื่อพยายามปรับเปลี่ยนวงโคจรของดาวเคราะห์\n\nแม้ว่าจะไม่เหมาะสำหรับงานที่ยิ่งใหญ่ระดับนั้นอีกต่อไปแล้ว แต่เราอาจสามารถดัดแปลงโมเดลที่เสียหายไม่มากเพื่อเผาผลาญชั้นแก๊สของดาวเคราะห์ออกไปและเผยให้เห็นแกนกลางที่อุดมไปด้วยแร่ธาตุแทนได้"
 extreme_frontiers.380.a: "แยกชิ้นส่วนพวกมันให้หมด"
 extreme_frontiers.380.b: "ปรับเปลี่ยนวัตถุประสงค์การใช้งานอุปกรณ์เหล่านี้"
 REPURPOSE_THRUSTERS_PROJECT: "ไอพ่นขับเคลื่อนดาวเคราะห์ที่ปรับเปลี่ยนการใช้งาน"
 REPURPOSE_THRUSTERS_PROJECT_DESC: "ด้วยการปรับเปลี่ยนการทำงานของชุดไอพ่นดาวเคราะห์ที่ชำรุดบน §Y[from.GetName]§! เราสามารถเผาผลาญไฮโดรเจนของดาวแก๊สยักษ์ออกไป เหลือทิ้งไว้เพียงแกนที่เป็นของแข็งและสามารถใช้ประโยชน์ได้"
 extreme_frontiers.385.title: "แก๊สถูกสลาย"
 extreme_frontiers.385.desc: "เราสามารถซ่อมแซมไอพ่นดาวเคราะห์ที่ชำรุดบางส่วนของ §Y[from.From.GetName]'§! และปรับแต่งระบบให้พวกมันส่งแรงขับที่เท่ากันในทิศทางตรงกันข้าม\n\nเมื่อเปิดใช้งาน อุปกรณ์ฟิวชันที่ทรงพลังเหล่านี้จะดึงไฮโดรเจนขึ้นมาในอัตราการเติบแบบทวีคูณ เผาผลาญชั้นบรรยากาศแก๊สของดาวเคราะห์จนหมดสิ้น และเผยให้เห็นแกนกลางที่อุดมไปด้วยแร่ธาตุ แม้ว่าจะยังอยู่ในอุณหภูมิที่สูงมากเป็นพิเศษก็ตาม"
 extreme_frontiers.385.tt: "เพิ่มตัวปรับแต่ง §Y$chthonian_planet$§!"
 extreme_frontiers.385.a: "น่าประทับใจ"

 # BACKWARDS ORBIT
 BACKWARDS_ORBIT_CAT: "วงโคจรย้อนกลับ"
 backwards_orbit_desc: "§Y[from.GetName]§! โคจรรอบดาวฤกษ์ในทิศทางที่สวนทางกับดาวเคราะห์ดวงอื่นในระบบ บ่งชี้ว่ามันไม่ได้ก่อตัวขึ้นที่นี่พร้อมกันกับวัตถุท้องฟ้าดวงอื่นๆ ในระบบ\n\nจำเป็นต้องทำการสำรวจเพิ่มเติมเพื่อทำความเข้าใจเกี่ยวกับต้นกำเนิดของดาวเคราะห์ดวงนี้"
 extreme_frontiers.390.title: "ดาวเคราะห์พเนจร"
 extreme_frontiers.390.desc: "องค์ประกอบของ §Y[from.GetName]'§! ไม่ตรงกับดาวเคราะห์ดวงอื่นในบริเวณใกล้เคียง อย่างไรก็ตาม มันกลับสอดคล้องอย่างสมบูรณ์แบบกับวัตถุท้องฟ้าหลายดวงในระบบข้างเคียงอย่าง §Y[event_target:wandering_planet_origin.GetName]§! ซึ่งชี้ให้เห็นถึงแหล่งกำเนิดที่แท้จริงของมัน\n\nพื้นผิวของดาวเคราะห์มีรอยหลุมอุกกาบาตขนาดใหญ่เป็นพิเศษ นำไปสู่การสันนิษฐานว่ามันถูกพัดหลุดออกจากวงโคจรเดิมเนื่องจากการชนกับอุกกาบาตขนาดมหึมา ดาวเคราะห์พเนจรที่ลอยอยู่อย่างอิสระดวงนี้ต่อมาได้ถูกจับโดยแรงดึงดูดของ [from.System.Star.GetName] ซึ่งมันกลายมาเป็นวงโคจรย้อนกลับที่ผิดปกติ\n\nดาวเคราะห์ที่น่าทึ่งดวงนี้เคยอาศัยอยู่ในระบบที่แตกต่างกันสองระบบตั้งแต่ก่อตัวขึ้นมา ซึ่งเปิดโอกาสการศึกษาวิจัยอย่างอุดมสมบูรณ์"

 # VAPOR PLUMES
 VAPOR_PLUMES_CAT: "กลุ่มไอแก๊ส"
 vapor_plumes_desc: "สังเกตเห็นกลุ่มไอแก๊สที่ผิดปกตินับพันพวยพุ่งขึ้นมาจากพื้นผิวของ §Y[from.GetName]§! โดยแผ่ขยายออกไปจนถึงขอบเขตบนสุดของชั้นบรรยากาศอันเบาบางของมัน\n\nแนะนำให้ทำการตรวจสอบปรากฏการณ์นี้เพิ่มเติม"
 extreme_frontiers.400.title: "กีย์เซอร์ภูเขาไฟเยือกแข็ง"
 extreme_frontiers.400.desc: "กลุ่มไอแก๊สที่สังเกตพบบน §Y[from.GetName]§! มีสาเหตุมาจากกิจกรรมภูเขาไฟเยือกแข็งที่รุนแรงใต้เนื้อโลกส่วนลึก พ่นเสาแก๊สไนโตรเจนและแอมโมเนียขนาดใหญ่ออกมาด้านบน\n\nกลุ่มแก๊สลอยตัวขึ้นในแนวตั้งจนกระทั่งถึงขอบเขตของชั้นบรรยากาศดาวเคราะห์ ซึ่งกระแสลมสุริยะทำให้พวกมันราบเรียบลงอย่างกะทันหัน\n\nจากการศึกษาความแปรปรวนเล็กๆ น้อยๆ ของส่วนผสมทางเคมีในโครงสร้างควันไอที่เป็นเอกลักษณ์เหล่านี้ เราสามารถเรียนรู้เพิ่มเติมเกี่ยวกับกระบวนการทางธรณีวิทยาที่ซับซ้อนของแกนดาวเคราะห์ได้"

 # FIBROUS ATMOSPHERE
 FIBROUS_ATMOSPHERE_CAT: "ผลการสำรวจเสียหาย"
 fibrous_atmosphere_desc: "ผลสแกนเบื้องต้นของ §Y[from.GetName]§! ส่งกลับมาในลักษณะที่ข้อมูลเสียหายซึ่งเซนเซอร์ของเราไม่สามารถตีความได้อย่างชัดเจน แหล่งที่มาของการรบกวนนี้ยังคงคลุมเครือ จำเป็นต้องได้รับการตรวจสอบอย่างใกล้ชิดยิ่งขึ้น"
 extreme_frontiers.410.title: "ชั้นบรรยากาศเส้นใยแร่"
 extreme_frontiers.410.desc: "การตรวจสอบโดยละเอียดของ §Y[from.GetName]§! เผยให้เห็นแหล่งที่มาของข้อมูลที่เสียหายในการสแกนเบื้องต้นของเรา\n\nเมฆหนาทึบของเส้นใยแร่ธาตุประกอบกันเป็นชั้นบรรยากาศส่วนบนของดาวเคราะห์ เส้นใยที่ยาวและคดเคี้ยวเหล่านี้มีต้นกำเนิดมาจากชั้นล่างของดาวแก๊สยักษ์ โดยสภาพแวดล้อมที่มีแรงดันสูงทำให้พวกมันยืดตัวออกจนกลายเป็นเมฆแร่ธาตุที่นำไฟฟ้าได้สูง\n\nเมื่อพวกมันสะสมพลังงานไฟฟ้าสถิตขณะไหลเวียนผ่านชั้นบรรยากาศ เส้นใยเหล่านี้จะปล่อยประจุออกมาเป็นระยะๆ เราสามารถสกัดทรัพยากรเหล่านี้มาใช้ประโยชน์สำหรับตัวเราเองได้ง่ายดาย"

 # EXPLODING SKIES
 EXPLODING_SKIES_CAT: "คลื่นความร้อนรุนแรงจัด"
 exploding_skies_desc: "ผลสแกนของ §Y[from.GetName]§! กำลังติดตามปรากฏการณ์ทางอุตุนิยมวิทยาที่รุนแรงมาก โดยมีความร้อนพุ่งสูงขึ้นอย่างกะทันหันแต่รุนแรงกระจายอยู่ทั่วพื้นผิว\n\nสิ่งนี้น่าจะทำการศึกษาเพิ่มเติม"
 extreme_frontiers.420.title: "ขอบฟ้าปะทุเดือด"
 extreme_frontiers.420.desc: "การสังเกตการณ์โดยละเอียดของ §Y[from.GetName]§! เผยให้เห็นสาเหตุของความร้อนที่พุ่งสูงทางอุตุนิยมวิทยา\n\nช่องระบายความร้อนใต้พิภพและกีย์เซอร์ทั่วพื้นผิวกำลังพ่นแก๊สที่ไวต่อการติดไฟสูงซึ่งสะสมตัวอยู่ในบรรยากาศ จากนั้นการปล่อยประจุไฟฟ้าสถิตจะทำหน้าที่เป็นตัวเร่งการจุดระเบิด ก่อให้เกิดแนวรบสภาพอากาศที่ระเบิดได้พัดกระหน่ำไปทั่วท้องฟ้าของโลกใบนี้\n\nปฏิกิริยาเหล่านี้ทำให้ [Root.Owner.GetEngineerPlural] ของเรามีความเข้าใจใหม่เกี่ยวกับการลุกไหม้ทางอุณหพลศาสตร์เพื่อนำมาประยุกต์ใช้กับระบบขับเคลื่อนกองยานของเราเอง"
 extreme_frontiers.420.desc.traumatized: "โชคร้ายที่ความเสี่ยงอันตรายของงานวิจัยชิ้นนี้ทำให้ [leader.GetName] ต้องเผชิญกับอาการกระทบกระเทือนทางจิตใจอย่างรุนแรง"
 extreme_frontiers.420.desc.maimed: "โชคร้ายที่ความเสี่ยงอันตรายของงานวิจัยชิ้นนี้ทำให้ [leader.GetName] ได้รับบาดเจ็บทางร่างกายสาหัส"

 # CHTHONIAN PRESERVATION
 CHTHONIAN_PRESERVATION_CAT: "ชีวมวลของดาวคโทเนียน"
 chthonian_preservation_desc: "การสำรวจของ §Y[from.GetName]§! เผยให้เห็นว่ามันเป็นดาวเคราะห์คโทเนียน ซึ่งอดีตเคยเป็นดาวแก๊สยักษ์ที่ถูกรังสีรุนแรงของดาวฤกษ์ §Y[from.System.Star.GetName]§! พัดเอาชั้นบรรยากาศออกไปจนหมดสิ้น\n\nถึงกระนั้น ก็ยังตรวจพบร่องรอยของชีวมวลที่จางมากบนพื้นผิวของมัน ซึ่งนำไปสู่การสำรวจเพิ่มเติม"
 extreme_frontiers.430.title: "การอนุรักษ์คโทเนียน"
 extreme_frontiers.430.desc: "ค่าตรวจวัดชีวมวลบนดาว §Y[from.GetName]§! คือซากกลายเป็นหินของฝูงทิยานกิ\n\nดูเหมือนพวกมันจะอยู่ในดาวแก๊สยักษ์ระหว่างช่วงเวลาสำคัญที่ชั้นบรรยากาศกำลังสลายตัว ร่างกายของพวกมันจึงถูกหุ้มด้วยโลหะเหลวร้อนจัดที่ต่อมาแข็งตัวในที่สุด\n\nแม้ว่าจะมีสารอินทรีย์ทางชีวภาพเหลืออยู่ภายในปริมาณเล็กน้อย แต่การสัมผัสรังสีดาวฤกษ์ระดับดาวคโทเนียนเป็นเวลานานได้เปลี่ยนซากศพส่วนใหญ่ของพวกมันให้กลายเป็นโลหะผสมชีวภาพที่มีเอกลักษณ์เฉพาะตัว\n\n§Y[leader.GetName]§! เชื่อว่าด้วยการศึกษารายละเอียดฟอสซิลที่หายากเหล่านี้ เราจะสามารถค้นหาแนวทางใหม่ในการผลิตโลหะผสมจากแหล่งชีวภาพได้"
 CHTHONIAN_PETRIFICATION_PROJECT: "การกลายเป็นหินคโทเนียน"
 CHTHONIAN_PETRIFICATION_PROJECT_DESC: "จากการตรวจสอบซากกลายเป็นหินของฝูงทิยานกิบน §Y[from.GetName]§! [Root.Owner.GetScientistPlural] ของเรามีเป้าหมายที่จะทำความเข้าใจผลกระทบของรังสีระดับดาวคโทเนียนที่มีต่อสารอินทรีย์ เพื่อเปิดทางสู่การผลิตโลหะผสมขั้นสูงแบบใหม่"
 extreme_frontiers.435.title: "โลหะผสมชีวภาพ"
 extreme_frontiers.435.desc: "หลังจากการตรวจสอบอย่างระมัดระวังของซากทิยานกิที่กลายเป็นหินบน §Y[from.From.GetName]§! เราประสบความสำเร็จในการระบุวิธีการใหม่ในการผลิตโลหะผสมโดยการจำลองผลกระทบของการสัมผัสรังสีระดับดาวคโทเนียนในระยะยาว\n\nการค้นพบครั้งสำคัญนี้มอบวิธีการที่น่าทึ่งซึ่งใช้สารชีวภาพเป็นวัตถุดิบหลัก โดยให้ผลลัพธ์ที่เทียบเคียงกับวิธีการทั่วไป"
 tech_alloy_fossilization: "การทำโลหะผสมกลายเป็นหิน"
 tech_alloy_fossilization_desc: "ด้วยการนำสารชีวภาพไปสัมผัสกับรังสีจำลองระดับดาวคโทเนียน เราสามารถทำโครงสร้างเซลล์ให้กลายเป็นฟอสซิลโลหะผสมที่ใช้งานได้"
 tech_alloy_fossilization_tt: "§Hปลดล็อกอาคาร§!: ['building:building_bio_furnace']"
 building_bio_furnace: "เตาหลอมชีวภาพ"
 building_bio_furnace_desc: "ด้วยการใช้รังสีดาวฤกษ์จำลองในระดับที่สูงขึ้น อาคารนี้มีความสามารถในการเปลี่ยนสารชีวภาพให้กลายเป็นโลหะผสมได้"

 # ORBITAL RESONANCE
 ORBITAL_RESONANCE_CAT: "อัตราส่วนที่สมบูรณ์แบบ"
 orbital_resonance_desc: "รอบเวลาการโคจรในระบบดาว §Y[from.System.GetName]§! แสดงรูปแบบที่น่าทึ่ง ดาวเคราะห์แต่ละดวงโคจรรอบดาวฤกษ์โดยใช้เวลาเป็นสองเท่าของดวงที่อยู่ใกล้เคียงพอดี มีความแม่นยำสูงกว่าหนึ่งในพันวินาที\n\nอัตราส่วนที่สมบูรณ์แบบจนผิดปกตินี้น่าจะทำการสืบสวนต่อ"
 extreme_frontiers.440.title: "การสั่นพ้องของวงโคจร"
 extreme_frontiers.440.desc: "§Y[from.System.GetName]§! แสดงตัวอย่างการสั่นพ้องของวงโคจรที่สมบูรณ์แบบที่สุดเท่าที่เราเคยพบมา\n\nดาวเคราะห์แต่ละดวงจะส่งแรงโน้มถ่วงเป็นระยะๆ ไปยังเพื่อนบ้านเมื่อพวกมันอยู่ในจุดที่ใกล้กันที่สุด ส่งผลให้เกิดแรงเหวี่ยงเคลื่อนที่และโมเมนตัมที่พึ่งพาอาศัยซึ่งกันและกัน ความเสถียรที่ผิดปกติของการปฏิสัมพันธ์เหล่านี้ทำให้เกิดวงโคจรที่มีการประสานงานกันสูง\n\nระบบนี้มอบโอกาสที่ดีเยี่ยมในการศึกษาวิธีการที่แรงโน้มถ่วงของดาวเคราะห์ช่วยเร่งการเคลื่อนที่ของวัตถุที่บินผ่าน ซึ่งอาจนำไปประยุกต์ใช้กับการบังคับเลี้ยวยานอวกาศได้"
 GRAVITY_ASSIST_PROJECT: "การศึกษาแรงเหวี่ยงหนีศูนย์กลางแรงโน้มถ่วง"
 GRAVITY_ASSIST_PROJECT_DESC: "การศึกษาผลของการสั่นพ้องของวงโคจรที่สมบูรณ์แบบบนดาว §Y[from.GetName]§! จะช่วยปรับปรุงความเข้าใจของเราเกี่ยวกับวิถีแรงเหวี่ยงอวกาศของยานอวกาศ"
 extreme_frontiers.445.title: "ความก้าวหน้าด้านแรงเหวี่ยงอวกาศวงโคจร"
 extreme_frontiers.445.desc: "หลังจากศึกษาผลการสั่นพ้องของวงโคจรที่เป็นเอกลักษณ์ในระบบดาว §Y[from.From.System.GetName]§! เราได้ปรับปรุงวิธีการระบุเส้นทางบินที่เหมาะสมที่สุดของยานอวกาศอย่างมาก\n\nแบบจำลองใหม่นี้จะทำให้เราได้รับประโยชน์เพิ่มขึ้นจากแรงโน้มถ่วงของดาวเคราะห์ในการสร้างอัตราเร่งและชะลอตัวของยานในความเร็วต่ำกว่าแสง"
 tech_orbital_maneuvers: "การควบคุมวงโคจรขั้นสูง"
 tech_orbital_maneuvers_desc: "การเดินทางด้วยความเร็วต่ำกว่าแสงสามารถเพิ่มประสิทธิภาพได้อีกโดยการคำนวณขั้นสูงที่ดึงเอาประโยชน์ของบ่อแรงโน้มถ่วงของดาวเคราะห์มาใช้อย่างสูงสุด"

