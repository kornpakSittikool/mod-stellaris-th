 extreme_frontiers.2005.desc.common: "การเปิดใช้งานครั้งแรกของการ §Yปรับปรุงสภาพดาวเคราะห์ด้วยการแพร่รังสี§! บนดาว §Y[target.GetName]§! ได้ข้อสรุปแล้ว\n\nด้วยการเปลี่ยนพื้นผิวให้เป็นแดนร้างเป็นพิษที่ไม่สามารถอยู่อาศัยได้ เราได้เก็บเกี่ยวปริมาณวัสดุมหาศาลอย่างที่ไม่เคยมีมาก่อน ต้องขอบคุณการปรับปรุงโครงสร้างการออกแบบเมทริกซ์การแพร่รังสีของเรา"
 extreme_frontiers.2005.desc.industrialist: "เป้าหมายนี้ถือเป็นจุดเริ่มต้นของยุคใหม่แห่งการแสวงหาประโยชน์เชิงพาณิชย์และผลกำไรของจักรวรรดิเรา"
