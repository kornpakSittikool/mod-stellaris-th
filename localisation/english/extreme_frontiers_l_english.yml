 extreme_frontiers.1435.title: "การยื่นข้อเสนอประเทศราช"
 extreme_frontiers.1435.desc: "มันใช้เวลาหลายศตวรรษ... แต่สิ่งที่พงศาวดารเดนดรัสทำนายไว้ได้เกิดขึ้นจริงแล้ว ในที่สุดบนดาว §Yนิวบราทุลลา§! เราก็ได้หยั่งรากและเจริญรุ่งเรือง\n\nการที่เราดำรงอยู่ได้ที่นี่ต้องขอบคุณ §Y[Root.GetName]§! เราจะไม่ลืมสิ่งนี้เลย\n\nความกตัญญูของเราจะไม่แสดงออกเพียงคำพูดแต่จะอยู่ในรูปของการกระทำ เราขอยื่นข้อเสนอเป็นรัฐบรรณาการแก่คุณอย่างนอบน้อม"
 extreme_frontiers.1435.a: "การเป็นรัฐบรรณาการของคุณได้รับการยอมรับ"
 extreme_frontiers.1435.b: "เราต้องเฝ้ามองดูโชคชะตาของคุณคลี่คลาย"
 extreme_frontiers.1435.b.tt: "เล่นเป็น §Rหน่ออ่อนแห่งเดนดรัส§!"
 extreme_frontiers.1435.c: "ความรู้ของคุณก็เพียงพอแล้ว"
 extreme_frontiers.1435.c.tt: "ได้รับความรู้ด้าน §Yเทคโนโลยีชีวภาพ§! [Root.GetDendrusGivenBiotechAmount] £society£"

 # GEORADIATION TERRAFORMING
 georadiation_terraforming_chain_title: "การปรับปรุงสภาพดาวเคราะห์ด้วยการแพร่รังสี"
 georadiation_terraforming_chain_desc: "ซากของอุปกรณ์ปรับปรุงสภาพดาวเคราะห์ที่ทำลายล้างบนดาว §Y[from.Planet.GetName]§! ยังคงปล่อยสัญญาณไปยังหลายตำแหน่งทั่วกาแล็กซี การสำรวจสถานที่เหล่านี้จะช่วยเปิดเผยข้อมูลเพิ่มเติมเกี่ยวกับเทคโนโลยีอันตรายนี้"
 site_georadiation_terraforming: "โครงข่ายใต้ดิน"
 site_georadiation_terraforming_desc: "เซนเซอร์ของเราตรวจพบสัญญาณสื่อสารที่ผิดปกติพวยพุ่งมาจากใต้หลุมอุกกาบาตลึกบนดาว §Y[from.Planet.GetName]§!\n\nการสแกนโครงสร้างแผ่นดินไหวเผยให้เห็นโครงข่ายถ้ำใต้ดินที่มีทางเข้าถล่มลงมาที่ใจกลางของหลุมอุกกาบาต นอกจากนี้ อุปกรณ์รังสีของเรายังตรวจพบร่องรอยของรังสีแรงโน้มถ่วงจางๆ พวยพุ่งมาจากบริเวณดังกล่าว ก่อให้เกิดคำถามมากกว่าคำตอบ"
 extreme_frontiers.1500.title: "ซากปรักหักพังอาบรังสี"
 extreme_frontiers.1500.desc: "งานขุดค้นได้เผยให้เห็นเศษซากที่แตกเป็นชิ้นๆ ภายในหลุมอุกกาบาตบนดาว §Y[from.Planet.GetName]§! เศษชิ้นส่วนที่แตกหักเหล่านี้กำลังปล่อยร่องรอยรังสีแรงโน้มถ่วงที่รุนแรงซึ่งก่อนหน้านี้ตรวจพบได้จากวงโคจร\n\nเมื่อการเข้าถึงโครงข่ายถ้ำใต้ดินได้รับการคุ้มกันแล้ว §Y[leader.GetName]§! ก็พร้อมที่จะติดตามสัญญาณการสื่อสารไปยังแหล่งที่มาของมันแล้ว"
 extreme_frontiers.1500.a: "ติดตามสัญญาณไป"
 extreme_frontiers.1505.title: "อุปกรณ์ที่กัดกร่อน"
 extreme_frontiers.1505.desc: "เราได้ติดตามสัญญาณการสื่อสารบนดาว §Y[from.Planet.GetName]§! ไปยังแหล่งที่มาของมัน: สิ่งก่อสร้างขนาดใหญ่ที่โครงสร้างได้รับความเสียหายซึ่งปักลึกลงไปในเปลือกดาวเคราะห์\n\nจากการถูกกัดกร่อนเนื่องจากการสัมผัสกับกรด อาร์เรย์การสื่อสารของมันยังคงส่งสัญญาณในภาษาที่ไม่คุ้นเคย โดยพยายามติดต่อกับสิ่งที่มีตัวตนในระยะไกล\n\nตัวอุปกรณ์ยึดอยู่กับที่อย่างแน่นหนาด้วยแคลมป์ยึดแรงโน้มถ่วงแบบพิเศษในหินฐาน จำเป็นต้องมีการวิจัยเพิ่มเติมเพื่อยืนยันวัตถุประสงค์ที่แท้จริงของมัน"
 extreme_frontiers.1505.a: "ถอดรหัสสัญญาณของมัน"
 extreme_frontiers.1510.title: "การปรับปรุงสภาพดาวเคราะห์เพื่อการรื้อถอน"
 extreme_frontiers.1510.desc.common: "หลังจากการวิเคราะห์โดยละเอียด ตอนนี้เรามีความเข้าใจบางส่วนเกี่ยวกับการสร้างสิ่งก่อสร้างที่พบบนดาว §Y[from.Planet.GetName]§! เครื่องนี้เป็นอุปกรณ์ปรับปรุงสภาพดาวเคราะห์ที่หยาบและทำลายล้าง\n\nมันถูกออกแบบมาเพื่อแพร่รังสีให้สิ่งแวดล้อมทางชีวภาพดั้งเดิมผ่านการกระตุ้นการเติบโตของทรัพยากรเป้าหมายด้วยรังสี ซึ่งก่อให้เกิดเอฟเฟกต์แบบโดมิโนที่ทำลายล้างระบบนิเวศของดาวเคราะห์ในกระบวนการนี้ สิ่งนี้ช่วยให้ผู้ใช้ได้รับวัสดุจำนวนมากที่สกัดได้โดยต้องแลกกับการเพิ่มความเป็นพิษโดยทั่วไปทั่วทั้งดาวเคราะห์\n\nแม้ว่าจะยังเข้าใจวิธีการทำงานที่แน่นอนของกระบวนการนี้เพียงบางส่วน แต่เราก็ประสบความสำเร็จในการถอดรหัสความถี่การสื่อสารของอุปกรณ์ โดยระบุตำแหน่งเพิ่มเติมอีกสองแห่งที่กำลังส่งสัญญาณเดียวกันนี้อยู่"
 extreme_frontiers.1510.desc.default: "การสำรวจสถานที่เหล่านี้เพิ่มเติมอาจทำให้ได้ข้อมูลเชิงลึกเกี่ยวกับเทคโนโลยีนี้มากขึ้น"
 extreme_frontiers.1510.desc.industrialist: "ผู้บุกเบิกการเป็นผู้ประกอบการที่อยู่เบื้องหลังเทคโนโลยีนี้มีแรงจูงใจในการเพิ่มประสิทธิภาพผลกำไรอย่างชัดเจน เราสามารถเรียนรู้อะไรได้มากมายจากการไล่ตามการค้นพบนี้"
 extreme_frontiers.1510.a: "การค้นหาได้เริ่มต้นขึ้นแล้ว"
 GEORADIATION_SIGNAL_1_PROJECT: "การติดตามสัญญาณ: §Y[planet.GetName]§!"
 GEORADIATION_SIGNAL_1_PROJECT_DESC: "สัญญาณความถี่การสื่อสารแบบเดียวกันกับที่ปล่อยออกมาจากสิ่งก่อสร้างบน §Y[from.Planet.GetName]§! ได้รับการตรวจจับย้อนกลับมายังสถานที่แห่งนี้ ซึ่งพบอุปกรณ์ที่ชำรุดอีกเครื่องหนึ่ง การศึกษาอุปกรณ์นี้จะช่วยให้ข้อมูลเชิงลึกเพิ่มเติมเกี่ยวกับความสามารถในการปรับปรุงสภาพดาวเคราะห์ที่ทำลายล้างของพวกมัน"
 extreme_frontiers.1515.title: "เชื้อเพลิงแรงโน้มถ่วง"
 extreme_frontiers.1515.desc.common: "เราประสบความสำเร็จในการค้นพบอุปกรณ์ปรับปรุงสภาพดาวเคราะห์ที่ชำรุดอีกเครื่องหนึ่งบน §Y[from.GetName]§! แตกต่างจากสิ่งก่อสร้างก่อนหน้า เครื่องนี้ยังคงมีแหล่งเชื้อเพลิงบางส่วนหลงเหลืออยู่สำหรับการศึกษาวิจัย เผยให้เห็นว่า §Hสสารมืด(ลองดีเจ)§! คือขุมกำลังขับเคลื่อนการปล่อยรังสีของมัน\n\nอุปกรณ์นี้จะเร่งการเจริญเติบโตของทรัพยากรเป้าหมายโดยการแพร่กระจายตัวของพันธะโมเลกุลที่สำคัญ ซึ่งจะส่งเสริมการพัฒนาของพวกมันโดยต้องแลกกับความสมบูรณ์ของเซลล์ในสิ่งแวดล้อมทางชีวภาพรอบข้าง"
 extreme_frontiers.1515.desc.industrialist: "ความเพิกเฉยอย่างสิ้นเชิงที่อุปกรณ์นี้แสดงต่อความเสถียรภาพของดาวเคราะห์ในการรีดเค้นหาทรัพยากรนั้นช่างเป็นแรงบันดาลใจชั้นยอด"
 extreme_frontiers.1515.desc.signal_2_done: "ด้วยการส่งคลื่นรังสีผ่านชุดสะท้อนความร้อนที่เป็นผลึก เครื่องนี้สามารถปรับปรุงสภาพดาวเคราะห์ตามเป้าหมายโดยใช้การควบคุมโมเลกุลแรงโน้มถ่วงโดยไม่ทำให้แกนดาวเคราะห์ดวงนี้ถล่มยุบลงไปในตัวมันเอง\n\nบันทึกข้อมูลที่กู้คืนมาได้ระบุตำแหน่งของอุปกรณ์เครื่องที่สี่ซึ่งยังไม่จุดชนวนปะทุ"
 extreme_frontiers.1515.desc.signal_2_not_done: "แต่การที่อุปกรณ์นี้สามารถทำสิ่งนี้และป้องกันการล่มสลายจากแรงโน้มถ่วงในระดับดาวเคราะห์ได้อย่างไรนั้นยังคงไม่ชัดเจน คำตอบนี้อาจพบได้ในสถานที่สื่อสารที่เหลืออยู่"
 GEORADIATION_SIGNAL_2_PROJECT: "การติดตามสัญญาณ: §Y[planet.GetName]§!"
 GEORADIATION_SIGNAL_2_PROJECT_DESC: "สัญญาณความถี่การสื่อสารที่ปล่อยออกมาจากสิ่งก่อสร้างบน §Y[from.Planet.GetName]§! ได้รับการตรวจจับย้อนกลับมายังสถานที่แห่งนี้ด้วยเช่นกัน ซึ่งพบอุปกรณ์ที่ชำรุดอีกเครื่องหนึ่ง การศึกษาอุปกรณ์นี้จะช่วยให้ข้อมูลเชิงลึกเพิ่มเติมเกี่ยวกับความสามารถในการปรับปรุงสภาพดาวเคราะห์ที่ทำลายล้างของพวกมัน"
 extreme_frontiers.1520.title: "การกระตุ้นรังสี"
 extreme_frontiers.1520.desc.common: "เราประสบความสำเร็จในการค้นพบอุปกรณ์ปรับปรุงสภาพดาวเคราะห์ที่ชำรุดอีกเครื่องหนึ่งบน §Y[from.GetName]§! ซึ่งจมอยู่ในกลุ่มผลึกคริสตัลที่งอกขึ้นมาเนื่องจากการทำงานผิดพลาดของชุดสะท้อนแสงที่แตกหัก\n\nจากการสังเกตอุปกรณ์อย่างใกล้ชิด เราได้ระบุวิธีการที่ใช้สำหรับการเล็งเป้ารังสีที่เฉพาะเจาะจง ด้วยการใช้ลูปป้อนกลับแบบปรับคลื่นที่ควบคุมได้ สิ่งก่อสร้างนี้สามารถเล็งเป้าหมายโดยตรงเพื่อกระตุ้นการเจริญเติบโตของทรัพยากรที่กำหนดไว้ล่วงหน้าได้"
 extreme_frontiers.1520.desc.signal_1_done: "สิ่งนี้ทำให้สามารถปรับปรุงสภาพดาวเคราะห์ที่มีความเข้มข้นสูงได้ โดยปราศจากความเสี่ยงที่จะทำให้เกิดการล่มสลายจากแรงโน้มถ่วงระดับดาวเคราะห์อย่างสมบูรณ์\n\nบันทึกข้อมูลที่กู้คืนมาได้ระบุตำแหน่งของอุปกรณ์เครื่องที่สี่ซึ่งยังไม่จุดชนวนปะทุ"
 extreme_frontiers.1520.desc.signal_1_not_done: "อย่างไรก็ตาม สารที่แน่นอนที่ใช้ในการสร้างรังสีนี้ยังคงไม่ได้รับการระบุ เนื่องจากคลังเชื้อเพลิงของอุปกรณ์หมดลงแม้ว่าจะจุดระเบิดพลาดก็ตาม คำตอบนี้อาจพบได้ในสถานที่สื่อสารที่เหลืออยู่"
 UNDETONATED_GEORADIATION_PROJECT: "อุปกรณ์ที่ยังไม่จุดชนวน"
 UNDETONATED_GEORADIATION_PROJECT_DESC: "เราได้ระบุตำแหน่งอุปกรณ์ปรับปรุงสภาพดาวเคราะห์เครื่องที่สี่ซึ่งยังไม่ถูกจุดระเบิดบนดาว §Y[planet.GetName]§! การกู้คืนอุปกรณ์นี้จะช่วยเติมเต็มส่วนที่ขาดหายไปในความเข้าใจเทคโนโลยีนี้ของเรา"
 extreme_frontiers.1525.title: "อุปกรณ์ที่ยังไม่จุดชนวน"
 extreme_frontiers.1525.desc.common: "เราประสบความสำเร็จในการค้นหาอุปกรณ์เครื่องที่สี่ที่ยังคงอยู่ในสภาพสมบูรณ์และไม่มีการทำงานบนพื้นผิวของ §Y[from.GetName]§! การวิเคราะห์สถาปัตยกรรมการควบคุมของมันจะช่วยมอบความรู้สุดท้ายที่จำเป็นในการจำลองเทคโนโลยีนี้ขึ้นมา"
 extreme_frontiers.1525.desc.industrialist: "อัตรากำไรมหาศาลที่เราจะสามารถเก็บเกี่ยวได้จากกาแล็กซีเมื่อเราเข้าใจเทคโนโลยีนี้อย่างถ่องแท้ มีความสำคัญเหนือกว่าความกังวลด้านสิ่งแวดล้อมอันไร้สาระ นี่คือโอกาสทองสำหรับ [controller.GetName]"
 extreme_frontiers.1520.desc.default.common: "ผลกระทบที่อาจเกิดขึ้นจากการปรับใช้เทคโนโลยีดังกล่าวอย่างอิสระในระดับกาแล็กซี ก่อให้เกิดคำถามที่สำคัญมากมาย"
 extreme_frontiers.1525.desc.default.default: "บางทีมันอาจจะดีกว่าหากความเสี่ยงที่อาจเกิดขึ้นจากอุปกรณ์เหล่านี้ถูกลบออกไปจากกาแล็กซี"
 extreme_frontiers.1525.desc.default.homicidal: "บางทีมันอาจจะดีกว่าหากกำจัดภัยคุกคามนี้ออกจากกาแล็กซีก่อนที่มันจะถูกนำมาใช้กับเรา"
 extreme_frontiers.1525.a.default: "ศึกษารายละเอียดของอุปกรณ์"
 extreme_frontiers.1525.a.industrialist: "เรากำลังรออะไรอยู่ล่ะ? เริ่มการศึกษาวิจัยได้เลย!"
 extreme_frontiers.1525.b: "ความเสี่ยงมีมากกว่าผลตอบแทน ทำลายอุปกรณ์นี้ทิ้งซะ"
 extreme_frontiers.1530.title: "การละเมิดข้อตกลง"
 extreme_frontiers.1530.desc.common: "ในขณะที่ศึกษาอุปกรณ์บนดาว §Y[from.GetName]§! เราได้เผลอไปกระตุ้นระบบความปลอดภัยขัดข้องโดยไม่ได้ตั้งใจ ส่งผลให้สัญญาณไซเรนแจ้งเตือนทุกความถี่ดังขึ้น แม้จะมีการคาดการณ์เบื้องต้นว่าสิ่งนี้จะไม่มีการตอบรับ แต่โดรนอัตโนมัติก็เดินทางเข้ามาในดินแดนของเรา\n\nการติดต่อส่งสัญญาณทักทายของเราได้รับการตอบกลับแบบเดิมเสมอ:\n\n\"สวัสดีลูกค้าผู้มีอุปการคุณ บันทึกของเราแสดงให้เห็นว่าคุณกำลังพยายามสร้างรหัสเมทริกซ์การแพร่รังสีทางธรณีวิทยารุ่นเม. ย.ล่าสุดโดยไม่ได้รับอนุญาต ซึ่งเป็นการละเมิดข้อตกลงสิทธิ์การใช้งานสำหรับผู้ใช้ปลายทางของบริษัท $NAME_Geocorp$ อย่างชัดเจน\n\nขณะนี้เราจะบังคับใช้อำนาจทางกฎหมายของเราเพื่อระงับความพยายามของคุณด้วยมาตรการขั้นเด็ดขาด คำร้องเรียนใดๆ สามารถส่งตรงไปยังโดรนบริการลูกค้าของเราได้\""
 extreme_frontiers.1530.desc.industrialist: "ความขยันหมั่นเพียรของพวกมันน่าจะเป็นแรงบันดาลใจที่ดี หากไม่เป็นเพราะมันกำลังทำให้อภิมหางานของเราล่าช้าอยู่ในขณะนี้"
 extreme_frontiers.1530.a: "เปิดช่องทางสื่อสาร"
 extreme_frontiers.1530.b: "เราจะไม่เจรจากับ "ฝ่ายบริการลูกค้า""
 GEORADIATION_ANALYSIS_PROJECT: "การวิเคราะห์อุปกรณ์"
 GEORADIATION_ANALYSIS_PROJECT_DESC: "จากการวิเคราะห์สถาปัตยกรรมการควบคุมของอุปกรณ์ที่พบบนดาว §Y[planet.GetName]§! เราจะสามารถเลียนแบบเทคโนโลยีนี้เพื่อนำมาใช้ประโยชน์เองได้"
 NAME_Geocorp: "CoburnCorp"
 geocorp_corvette: "โดรนต่อสู้ของ $NAME_Geocorp$"
 geocorp_corvette_plural: "โดรนต่อสู้ของ $NAME_Geocorp$"
 NAME_Geocorp_Combat_Drone: "$geocorp_corvette$"
 extreme_frontiers.1531.title: "โดรนของ $NAME_Geocorp$"
 extreme_frontiers.1531.desc: "เมื่อการเชื่อมต่อเริ่มทำงาน ดนตรีโบราณก็บรรเลงขึ้นก่อนที่โดรนฝ่ายบริการช่วยเหลือลูกค้าอัตโนมัติจะออนไลน์\n\nสวัสดีลูกค้าผู้มีอุปการคุณ เราพบว่าคุณกำลังสร้างรหัสเมทริกซ์การแพร่รังสีทางธรณีวิทยารุ่นเม. ย.โดยไม่ได้รับอนุญาต วันนี้เราจะช่วยเหลืออะไรคุณได้บ้าง?"
 extreme_frontiers.1531.a: "คุณเดินทางมาจากที่ไหน?"
 extreme_frontiers.1531.a.reply: ""ทุกการซื้อจาก $NAME_Geocorp$ จะได้รับการติดตั้งดาวเทียมความพึงพอใจของลูกค้าในวงโคจรระยะไกล เพื่อรับรองการทำงานที่ถูกต้องและการรักษาฐานลูกค้าไว้ตลอดชีวิต คลังพลังงานภายในทำให้เราสามารถปฏิบัติงานได้นานหลายศตวรรษ""
 extreme_frontiers.1531.b: "เราขอคุยกับผู้ดูแลระบบของคุณได้ไหม?"
 extreme_frontiers.1531.b.reply: ""โชคร้ายที่ผู้ดูแลระบบที่มีชีวิตคนสุดท้ายได้เสียชีวิตลงแล้ว อย่างไรก็ตาม ความมุ่งมั่นในความพึงพอใจของลูกค้าของเราสามารถอยู่ได้ยาวนานกว่าอายุขัยทางชีวภาพหลายชั่วอายุคน""
 extreme_frontiers.1531.c: "เราคิดว่าเรากำลังกู้ซากปรักหักพังเสียอีก"
 extreme_frontiers.1531.c.reply: "\"ความไม่รู้ไม่ถือเป็นข้อแก้ตัวที่สมเหตุสมผล เงื่อนไขการใช้งานสำหรับเมทริกซ์การแพร่รังสีทางธรณีวิทยารุ่นเม. ย.ได้รับการอธิบายอย่างละเอียดแล้วในขณะที่ทำการซื้อ\""
 extreme_frontiers.1531.d: "เรายินดีที่จะต่ออายุการสมัครสมาชิกของเรา"
 extreme_frontiers.1531.d.reply: ""วิเศษมากที่ได้ยินเช่นนั้น เราจะจัดทำเอกสารข้อตกลงทันทีเมื่อเราได้รับค่าธรรมเนียมการจัดการจำนวน 3000 §Yหน่วยเครดิตพลังงาน§! เมื่อได้รับเงินทุนเหล่านี้ เราจะถือว่าเรื่องนี้ยุติลงและขอปลดการเชื่อมต่อ""
 extreme_frontiers.1531.e: "เราไม่ได้ซื้ออุปกรณ์ชิ้นนี้"
 extreme_frontiers.1531.e.reply: ""ถ้าเช่นนั้นคุณยอมรับว่าลักขโมยใช่หรือไม่? นั่นทำให้เรื่องนี้ง่ายขึ้นมาก โปรโตคอลป้องกันการโจรกรรมของเรานั้นค่อนข้างร้ายกาจถึงชีวิต เราหวังว่าคุณจะพิจารณาผลิตภัณฑ์งานศพของเราสำหรับความต้องการที่จะมาถึงของคุณ""
 extreme_frontiers.1531.f: "จ่ายค่าธรรมเนียม"
 extreme_frontiers.1531.f.reply: "\"ขอบคุณสำหรับการต่ออายุใบอนุญาตใช้งานเมทริกซ์การแพร่รังสีทางธรณีวิทยารุ่นเม. ย.ของคุณ เราหวังว่าคุณจะพบว่าอุปกรณ์นี้มีประโยชน์เหมือนที่เราพบว่ามันทำกำไรได้ดี\"\n\nเมื่อจ่ายค่าธรรมเนียมเสร็จสิ้น โดรนก็หายไปสู่กาแล็กซีอันกว้างใหญ่"
 extreme_frontiers.1531.g: "ขูดรีดกันชัดๆ เตรียมพร้อมสำหรับสงคราม"
 extreme_frontiers.1531.h: "ไปให้พ้นซะที"
 extreme_frontiers.1531.i: "เตรียมพร้อมสำหรับการต่อสู้"
 extreme_frontiers.1534.title: "โดรนของ $NAME_Geocorp$"
 extreme_frontiers.1534.desc: "เมื่อการต่อสู้สิ้นสุดลงในระบบดาว §Y[fromfrom.solar_system.GetName]§! ข้อความการสื่อสารใหม่จากโดรนบริการลูกค้าก็แสดงบนหน้าจอของเรา\n\n\"เราได้บันทึกการคัดค้านของคุณต่อความพยายามของเราในการบังคับใช้เงื่อนไขของข้อตกลงสิทธิ์การใช้งานสำหรับผู้ใช้ปลายทาง อันเป็นผลมาจากการแสดงแสนยานุภาพทางทหารที่ท่วมท้นของคุณ ขณะนี้เราจะขอยกเลิกการอ้างสิทธิ์ในทรัพย์สินทางปัญญาของระบบเมทริกซ์การแพร่รังสีทางธรณีวิทยารุ่นเม. ย.หวังว่าคุณจะสนุกกับเทคโนโลยีที่เพิ่งได้รับมาใหม่นี้\"\n\nโดรนระเบิดออก ส่งผลให้ลิงก์สื่อสารขาดหายไป"
 extreme_frontiers.1534.a: "ไปให้พ้นซะที"
 extreme_frontiers.1535.title: "ข้อกำหนดที่ได้รับการแก้ไข"
 extreme_frontiers.1535.desc: "เมื่อจัดการกับโดรนบริการลูกค้าเสร็จสิ้น ตอนนี้เราก็สามารถกลับไปวิศวกรรมย้อนกลับเมทริกซ์การแพร่รังสีทางธรณีวิทยาต่อได้แล้ว"
 extreme_frontiers.1535.a: "ศึกษาอุปกรณ์นี้ต่อ"
