 # CHRONICLES OF DENDRUS
 chronicles_of_dendrus_chain_title: "พงศาวดารแห่งเดนดรัส"
 chronicles_of_dendrus_chain_desc: "จากการศึกษา \"พงศาวดาร\" ซึ่งเป็นชุดการพิสูจน์ทางคณิตศาสตร์ที่ซับซ้อนที่กู้คืนมาจากซากยานอาร์กบนดาว §Y[from.Planet.GetName]§! เรามีเป้าหมายที่จะเรียนรู้เพิ่มเติมเกี่ยวกับดาวเคราะห์สวรรค์ที่ชาวเดนดริเชียนค้นหา นั่นคือดาว §Yนิวบราทุลลา (New Bratulla)§!"
 site_chronicles_of_dendrus: "$chronicles_of_dendrus_chain_title$"
 site_chronicles_of_dendrus_desc: "ผลสแกนของ §Y[from.Planet.GetName]§! เผยให้เห็นการมีอยู่ของซากยานอวกาศ ยานลำดังกล่าวดูเหมือนจะผ่านการลงจอดที่ควบคุมไม่ได้ที่นี่เมื่อหลายปีก่อน\n\nขนาดที่มหึมาของมันบ่งบอกว่าทรัพยากรจำนวนมหาศาลเคยถูกทุ่มเทให้กับการก่อสร้างมัน การสำรวจทางโบราณคดีจะช่วยให้เรายืนยันได้ว่ามันลงเอยที่นี่ได้อย่างไร"
 extreme_frontiers.1400.title: "ยานขนส่งมวลชนขนาดมหึมา"
 extreme_frontiers.1400.desc: "การวิเคราะห์ภายนอกของซากยานบนดาว §Y[from.Planet.GetName]§! ชี้ให้เห็นว่ามันเป็นยานขนส่งความจุสูง ระบบต่างๆ ของมันไม่มีการใช้งานและไม่ตอบสนอง โดยไม่มีสัญญาณชีพที่ตรวจพบได้ภายใน การวิเคราะห์ตะกอนดินบ่งชี้ว่ามันอยู่ที่นี่มาประมาณหนึ่งศตวรรษแล้ว ซึ่งถือว่าเพิ่งเกิดขึ้นไม่นานในมาตราส่วนเวลาของกาแล็กซี"
 extreme_frontiers.1400.a: "สำรวจภายในยาน"
 extreme_frontiers.1405.title: "ยานอาณานิคมที่เคราะห์ร้าย"
 extreme_frontiers.1405.desc: "ภายในซากยานบนดาว §Y[from.Planet.GetName]§! เราพบห้องปฏิบัติการที่ซับซ้อนสำหรับการเพาะปลูกพืชไฮโดรโปนิกส์ คลังเมล็ดพันธุ์และดินจำนวนมาก และช่องเก็บสินค้าที่เต็มไปด้วยเครื่องมือและวัสดุก่อสร้างที่ยังไม่ได้แตะต้อง คลังข้อมูลหลายเครื่องมีแผนสำหรับอาณานิคมใหม่ที่มีชื่อว่า "§Yนิวบราทุลลา§!"\n\nที่ดาดฟ้าชั้นล่าง ในแคปซูลจำศีลแช่แข็งหลายพันตู้ มีร่างไร้วิญญาณของผู้อยู่อาศัยเดิมในยานลำนี้"
 extreme_frontiers.1405.desc.phototrophic: "$extreme_frontiers.1405.desc$ เช่นเดียวกับเรา พวกเขาพึ่งพาการสังเคราะห์ด้วยแสงเพื่อการเติบโตและการฟื้นฟูเซลล์ ร่างกายที่เหี่ยวเฉาของพวกเขาบ่งชี้ว่าพวกเขาเสียชีวิต ณ จุดใดจุดหนึ่งระหว่างการจำศีลที่ยาวนาน"
 extreme_frontiers.1405.desc.default: "$extreme_frontiers.1405.desc$ ร่างที่เหี่ยวเฉาของสิ่งมีชีวิตอิงแสงแดดเหล่านี้บ่งชี้ว่าพวกมันเสียชีวิต ณ จุดใดจุดหนึ่งระหว่างการจำศีลที่ยาวนาน"
 extreme_frontiers.1405.a: "สำรวจต่อไป"
 extreme_frontiers.1405.b: "กลืนกินซากของพวกมันและดำเนินงานต่อ"
 extreme_frontiers.1410.title: "แท่นบูชาโลกเกิด"
 extreme_frontiers.1410.desc: "เราค้นพบห้องชั้นในของยานอาณานิคมที่อับปางบนดาว §Y[from.Planet.GetName]§! ซึ่งประดับประดาด้วยภาพประกอบอันวิจิตรของชีวิตบนดาวเคราะห์ที่ชื่อว่า "§Yบราทุลลา§!" บางภาพแสดงถึงโลกที่เขียวขจีพร้อมพืชพรรณที่อุดมสมบูรณ์ ในขณะที่ภาพอื่นแสดงรายละเอียดความเสื่อมโทรมของสิ่งแวดล้อมและการล้มตายจำนวนมาก ภาพที่ใหญ่ที่สุดแสดงให้เห็นยานลำนี้กำลังเดินทางออกจากดินแดนที่ไร้ชีวิตและรกร้าง\n\nเครื่องข้อมูลส่วนกลางบันทึกวิดีโอสั้นๆ จากลูกเรือในยาน หลังจากแปลภาษาอย่างละเอียดเราได้ข้อสรุปดังนี้\n\n§Sอาร์โบริกเซียม - ตู้ 9721\n\nการจากลาเป็นเรื่องที่เจ็บปวด แต่การหยั่งรากลึกบนดาวนิวบราทุลลาจะช่วยเยียวยาเรา\n\nดาร์ก พาม - ตู้ 21301\n\nเชื่อมั่นในพงศาวดารเถอะชาวเดนดริเชียน นิวบราทุลลาจะเป็นทางรอดของเรา§!\n\nเรายังคงค้นหาห้องสะพานเดินเรือของยานขนาดมหึมาลำนี้อยู่"
 extreme_frontiers.1410.a: "ค้นหาต่อไป"
 extreme_frontiers.1415.title: "ห้องสะพานเดินเรือ"
 extreme_frontiers.1415.desc: "หลังจากได้รับเข้าถึง ดาดฟ้าบังคับการของเรือ เราสกัดและแปลบันทึกเที่ยวบินสุดท้าย\n\n§Sอาร์เคนดรัสที่ 1โพรไฟล์อาเมอรี่ XZ-479-113. 5-AE.\n\nข้ากลัวว่าการที่เราไว้ใจ โค รนิ กา จะผิด เรามาถึงแต่นิวบราทูล่า ดาวสวรรค์ไม่ได้อยู่ที่นี่ ไม่มีอะไรที่นี่สามารถส่งเสริมชีวิตภาษาเดนดิริเชียน\n\nผู้โดยสารทุกคนหลับสนิท เราจะค้นหาต่อไป...§!\n\nการกู้ข้อมูลเพิ่มเติมได้ดําเนินการเพื่อรวบรวมเหล่านี้\"โค รนิ กา\"จากอาคารวิทยาศาสตร์ของดาดฟ้า เปิดเผยรอยขีดข่วนของ หลักฐานทางคณิตศาสตร์ที่ผิดปกติ สมการเหล่านี้ใช้รูปแบบแปลก ๆ ของคณิตศาสตร์ภาษาเดนดิริเชียนและสมมุติฐานตําแหน่งของดาวเคราะห์ที่อาศัยอยู่ไม่ซ้ําใคร§Yบรา ตู ลา ใหม่§!."
 extreme_frontiers.1415.a: "ศึกษา "พงศาวดาร" เหล่านี้"
 DENDRITIAN_CHRONICLES_PROJECT_DEFAULT: "ศึกษาพงศาวดารเดนดรัส"
 DENDRITIAN_CHRONICLES_PROJECT_MACHINE: "$DENDRITIAN_CHRONICLES_PROJECT_DEFAULT$"
 DENDRITIAN_CHRONICLES_PROJECT_DEFAULT_DESC: "จากการศึกษา "พงศาวดาร" ซึ่งเป็นชุดการพิสูจน์ทางคณิตศาสตร์ที่ซับซ้อนที่กู้คืนมาจากซากยานอาร์กบนดาว §Y[from.Planet.GetName]§! เรามีเป้าหมายที่จะเรียนรู้เพิ่มเติมเกี่ยวกับดาวเคราะห์สวรรค์ที่ชาวเดนดริเชียนค้นหา นั่นคือดาว §Yนิวบราทุลลา§!"
 DENDRITIAN_CHRONICLES_PROJECT_MACHINE_DESC: "$DENDRITIAN_CHRONICLES_PROJECT_DEFAULT_DESC$"
 extreme_frontiers.1420.title: "ค้นพบไฮเปอร์เลนที่เสื่อมสภาพ"
 extreme_frontiers.1420.desc: "พงศาวดารเดนดรัสประกอบด้วยชุดข้อตกลงและแนวคิดเชิงนามธรรมทางคณิตศาสตร์ที่ซับซ้อน ทฤษฎีที่น่าทึ่งเหล่านี้ชี้ให้เห็นว่าระบบดาว §Y[from.solar_system.GetName]§! มีไฮเปอร์เลนเพิ่มเติมอีกหนึ่งสายที่ไม่ได้บันทึกไว้ในแผนที่ก่อนหน้านี้ ซึ่งนำไปสู่ดาว §Yนิวบราทุลลา§!\n\nหลังจากสแกนระดับควอนตัมอย่างกว้างขวางในพื้นที่ ในที่สุดเราก็ระบุตำแหน่งจุดแยกของไฮเปอร์เลนที่สาบสูญนี้ได้ ซึ่งถูกบดบังและเสื่อมสภาพอย่างหนักเนื่องจากอยู่ใกล้กับหลุมดำของระบบดาวดวงนี้อย่างยิ่ง ด้วยการฟื้นฟูมันขึ้นมา เราจะเป็นผู้บุกเบิกกลุ่มแรกที่ค้นพบว่ามีอะไรอยู่เบื้องหลัง"
 extreme_frontiers.1420.a: "เราพบในสิ่งที่ชาวเดนดริเชียนไม่พบ"
 RESTORE_HYPERLANE_PROJECT: "ฟื้นฟูไฮเปอร์เลนที่เสื่อมสภาพ"
 RESTORE_HYPERLANE_PROJECT_DESC: "หากเราสามารถค้นหาวิธีฟื้นฟูไฮเปอร์เลนที่เสื่อมสภาพในระบบดาว §Y[from.solar_system.GetName]§! เราจะสามารถยืนยันการมีอยู่ของดาว §Yนิวบราทุลลา§! ดาวเคราะห์สวรรค์ที่ชาวเดนดริเชียนค้นหาได้"
 extreme_frontiers.1425.title: "ฟื้นฟูไฮเปอร์เลนสำเร็จ"
 extreme_frontiers.1425.desc: "จากการส่งผ่านพลังงานเข้าไปในหลุมดำในระบบดาว §Y[from.Planet.solar_system.GetName]§! เราได้ปรับแนวสนามแรงโน้มถ่วงใหม่เพื่อปลดปล่อยทางเข้าไฮเปอร์เลนที่เสื่อมสภาพก่อนหน้านี้\n\nการค้นพบในเบื้องต้นยืนยันการมีอยู่ของดาวเคราะห์เพียงดวงเดียวที่ปลายอีกด้านของไฮเปอร์เลน ซึ่งตรงกับลักษณะของดาว §Yนิวบราทุลลา§! ตามที่อธิบายไว้ในพงศาวดารเดนดรัส"
 extreme_frontiers.1425.a: "โลกใหม่ให้สำรวจ"
 NAME_new_bratulla: "New Bratulla"
 NAME_new_bratulla_star: "Kipos"
 extreme_frontiers.1430.title: "นิวบราทุลลา"
 extreme_frontiers.1430.desc.common: "เราได้ยืนยันการมีอยู่ของดาวนิวบราทุลลา ดาวเคราะห์ที่อธิบายไว้ในพงศาวดารเดนดรัส มันมีระบบนิเวศทางพฤกษศาสตร์ที่อุดมสมบูรณ์และหลากหลายเป็นพิเศษ โดยการสำรวจเบื้องต้นตรวจพบสายพันธุ์พื้นเมืองที่แตกต่างกันหลายล้านสายพันธุ์"
 extreme_frontiers.1430.desc.begin: "โลกที่น่าหลงใหลใบนี้เหมาะอย่างยิ่งสำหรับการรองรับสิ่งมีชีวิตอิงพืชที่มีพันธุกรรมคล้ายกับ"
 extreme_frontiers.1430.desc.end: "ดินของมันเป็นบ้านของแบคทีเรียที่แตกต่างกันหลายพันล้านชนิดซึ่งคอยบำรุง ปกป้อง และซ่อมแซมโครงสร้างรากอินทรีย์\n\nพืชดูเหมือนจะแบ่งปันสารอาหารตามความต้องการสูงสุด โดยพืชที่อุดมสมบูรณ์ชั่วคราวจะแบ่งปันสารอาหารส่วนเกินผ่านระบบรากที่เชื่อมต่อถึงกัน"
 extreme_frontiers.1430.desc.default: "$extreme_frontiers.1430.desc.begin$ ของชาวเดนดริเชียน $extreme_frontiers.1430.desc.end$"
 extreme_frontiers.1430.desc.phototrophic: "$extreme_frontiers.1430.desc.begin$ ของเรา $extreme_frontiers.1430.desc.end$"
 extreme_frontiers.1430.desc.respawn: "[Root.Owner.GetScientistPlural] ของเราเชื่อว่าอาจมีความเป็นไปได้ที่จะฟื้นฟูสายพันธุ์เดนดริเชียนที่นี่ โดยการย้ายปลูกตัวอย่างพันธุกรรมที่กู้คืนมาจากยานอาร์กไปยังดินที่แปลกประหลาดของดาวเคราะห์ดวงนี้"
 extreme_frontiers.1430.a: "ชาวเดนดริเชียนสมควรอยู่ที่นี่"
