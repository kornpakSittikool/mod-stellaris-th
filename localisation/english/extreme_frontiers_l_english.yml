 extreme_frontiers.1430.b.phototrophic: "โลกใบนี้สมบูรณ์แบบสำหรับเรา"
 extreme_frontiers.1430.b.megacorp: "โลกที่ยังไม่ได้รับการใช้ประโยชน์นี้เป็นของเราที่จะตักตวง"
