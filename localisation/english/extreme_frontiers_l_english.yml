 # Arc Sites #
 #############

 # ABSOLUTE ZERO
 site_absolute_zero: "ศูนย์องศาสัมบูรณ์"
 site_absolute_zero_desc: "การสแกนลักษณะภูมิประเทศของ §Y[from.Planet.GetName]§! แสดงให้เห็นอุณหภูมิที่หนาวจัดจนเกือบถึงศูนย์องศาสัมบูรณ์ซึ่งสะสมตัวอยู่ในบริเวณใต้ดินเฉพาะแห่ง\n\nการศึกษารายละเอียดของพื้นที่ภายในอย่างเจาะลึกน่าจะช่วยให้ได้คำตอบมากขึ้น"
 extreme_frontiers.1000.title: "สิ่งกีดขวางแช่แข็ง"
 extreme_frontiers.1000.desc: "ในขณะที่มองหาแหล่งที่มาของอุณหภูมิที่ต่ำมากบนดาว §Y[from.Planet.GetName]§! §Y[leader.GetName]§! ได้ค้นพบทางเข้าสู่โครงสร้างใต้ดินโบราณ\n\nสิ่งที่กีดขวางทางเข้าคือกลุ่มหินแช่แข็งและหน้าผาน้ำแข็งซึ่งน่าจะทำให้โครงสร้างนี้ไม่สามารถเข้าถึงได้มานานหลายสหัสวรรษแล้ว\n\nคาร์บอนไดออกไซด์ที่ละลายบริเวณทางเข้ากำลังพ่นกลุ่มแก๊สออกมาตามช่องว่างต่างๆ ในสิ่งกีดขวาง อุปกรณ์ของเราชี้ว่ามีอาคารที่กว้างขวางอยู่ภายใน [leader.GetName] มั่นใจว่าจะพบแหล่งที่มาของความเย็นจัดภายในนั้น"
 extreme_frontiers.1000.a: "ทลายสิ่งกีดขวางเข้าไป"
 extreme_frontiers.1005.title: "แช่แข็งตามกาลเวลา"
 extreme_frontiers.1005.desc: "§Y[leader.GetName]§! ฝ่าน้ำแข็งที่ปิดกั้นทางเข้าของโครงสร้างโบราณบน §Y[from.Planet.GetName]§! ได้สำเร็จ\n\nภายในพื้นพื้นที่ศพแช่แข็งหลายสิบศพที่เป็นของเผ่าพันธุ์สัตว์เลื้อยคลานที่ไม่รู้จัก ร่างกายที่บิดเบี้ยวของพวกมันถูกแช่แข็งติดอยู่กับกำแพง โดยมีรอยเล็บที่บ่งบอกถึงความพยายามหลบหนีอย่างสิ้นหวัง\n\nแหล่งที่มาของควันน้ำแข็งแห้งที่ซึมผ่านทางเข้าจะต้องอยู่ลึกลงไปใต้ดิน โดยมีบันไดวนทอดตัวลึกลงไปในอาคารเพิ่มเติม"
 extreme_frontiers.1010.title: "สุสานน้ำแข็ง"
 extreme_frontiers.1010.desc: "ดังก้องลึกลงไปในอาคารเยือกแข็ง §Y[leader.GetName]§! ได้พบกับห้องโถงกลางขนาดใหญ่ที่เต็มไปด้วยแคปซูลแช่แข็งที่ดูดั้งเดิมแต่ยังคงใช้งานได้ตามทฤษฎี\n\nความเย็นจัดที่พบที่นี่สูงเกินกว่าช่วงอุณหภูมิที่ออกแบบไว้ของอุปกรณ์เหล่านี้อย่างมาก ผู้ที่อยู่ในแคปซูลได้เสียชีวิตไปแล้วเมื่อหลายพันปีก่อน\n\nแคปซูลไม่กี่เครื่องที่ยังไม่ถูกหิมะและน้ำแข็งกลืนกิน มีฐานที่จารึกข้อความที่สามารถอ่านได้ โดยระบุตำแหน่งทางสังคมและยศของผู้ที่อยู่ภายใน แคปซูลของผู้มียศสูงจะอยู่ในตำแหน่งที่ใกล้ที่สุดกับแคปซูลกลางขนาดใหญ่ ซึ่งตัวมันเองจมอยู่ในน้ำค้างแข็งและหิมะอย่างหนาแน่น"
 extreme_frontiers.1010.a: "ตรวจสอบแคปซูลตรงกลาง"
 extreme_frontiers.1015.title: "กษัตริย์แช่แข็ง"
 extreme_frontiers.1015.desc: "§Y[leader.GetName]§! ทำการเจาะแคปซูลกลางขนาดใหญ่ที่ใจกลางสุสานน้ำแข็งบนดาว §Y[from.Planet.GetName]§! แล้ว\n\nภายในเราค้นพบสถานที่พักผ่อนสุดท้ายของผู้นำราชวงศ์โบราณตามที่ระบุไว้ในจารึกของห้องก่อนหน้า ร่างของผู้ติดตามหลายสิบคนถูกแช่แข็งอยู่เคียงข้าง ซึ่งแคปซูลของพวกเขาประดับอยู่บนกำแพงในลักษณะพิธีการ\n\nโลงศพเทคโนโลยีของผู้ปกครองที่ล่วงลับเชื่อมต่อผ่านเครือข่ายท่อและวงจรที่ซับซ้อนเข้ากับเครื่องจักรโบราณ อุปกรณ์นี้ฝังอยู่ในก้อนน้ำแข็งขนาดใหญ่ ซึ่งมีอุณหภูมิที่ต่ำจนอยู่ในระดับที่เป็นอันตรายต่อแม้กระทั่งอุปกรณ์วิเคราะห์ของเราเอง\n\nสาเหตุที่ทำให้เกิดการขัดข้องของสถานที่นี้และความสัมพันธ์ของมันกับแกนโลกที่เยือกแข็งยังคงต้องศึกษาเพิ่มเติม"
 extreme_frontiers.1015.a: "เกิดอะไรขึ้นที่นี่?"
 extreme_frontiers.1020.title: "หายนะแช่แข็ง"
 extreme_frontiers.1020.desc: "การวิเคราะห์ห้องโถงกลางของสุสานน้ำแข็งบนดาว §Y[from.Planet.GetName]§! ได้เปิดเผยต้นกำเนิดของภัยพิบัติที่เกิดขึ้น\n\nเครื่องจักรแช่แข็งใช้ประโยชน์จากพลศาสตร์ความร้อนต่ำโดยอาศัยอุณหภูมิแกนกลางที่ต่ำมากเป็นพิเศษของดาวเคราะห์ดวงนี้ หลังจากที่องค์กษัตริย์ติดโรคที่รักษาไม่หาย ความหวังคือการปลุกราชวงศ์และผู้ติดตามให้ตื่นขึ้นมาเมื่อค้นพบวิธีการรักษาแล้ว\n\nแม้ว่าทฤษฎีของพวกเขาจะถูกต้อง แต่ปฏิกิริยาดูดความร้อนที่ควบคุมไม่ได้เกิดขึ้นเมื่อตัวนำการไหลเวียนที่ออกแบบขึ้นมาเป็นพิเศษของพวกเขารั่วไหลเข้าไปในแกนกลางของดาวเคราะห์ สิ่งนี้กระตุ้นให้อุณหภูมิลดลงอย่างรุนแรงและฉับพลัน ซึ่งแช่แข็งสถานีทั้งหมดในทันที\n\nเราได้นำทฤษฎีเริ่มต้นของพวกเขามาปรับปรุงและทำให้เกิดการค้นพบครั้งสำคัญในเทคโนโลยีการแช่แข็งขั้นสูงที่เชี่ยวชาญเพื่อใช้งานบนโลกที่หนาวเย็นจัด"
 tech_cryovault: "ถิ่นฐานบนโลกเยือกแข็ง"
 tech_cryovault_desc: "ด้วยการควบคุมพลศาสตร์ความร้อนต่ำที่พบในสภาพแวดล้อมของโลกน้ำแข็ง เราสามารถสร้างสภาพความเป็นอยู่ที่เหมาะสมได้ดียิ่งขึ้นในเขตภูมิอากาศที่หนาวเย็นกว่า"
 tech_cryovault_tt: "ปลดล็อกอาคาร : ['building:building_cryovault']"
 building_cryovault: "คลังแช่แข็งประชากร"
 building_cryovault_desc: "ที่อยู่อาศัยที่ปิดผนึกซึ่งใช้ประโยชน์จากพลศาสตร์ความร้อนต่ำของภูมิอากาศแช่แข็งเพื่อสร้างพื้นที่อยู่อาศัยที่ควบคุมได้และสะดวกสบาย"

 # TOXIC MATRIX
 site_toxic_matrix: "บ่อพิษ"
 site_toxic_matrix_desc: "พื้นผิวของ §Y[from.Planet.GetName]§! เกือบทั้งหมดถูกปกคลุมไปด้วยโครงข่ายตารางของบ่อกลมขนาดเล็กที่เต็มไปด้วยของเหลว การเรียงตัวที่เป็นระเบียบเรียบร้อยบ่งชี้ถึงการสร้างขึ้นอย่างตั้งใจมากกว่าการเกิดขึ้นเองตามธรรมชาติ การเดินทางสำรวจภาคสนามอาจให้คำตอบเพิ่มเติมได้"
 extreme_frontiers.1100.title: "ถุงเมือกแตกออก"
 extreme_frontiers.1100.desc: "พื้นผิวส่วนใหญ่ของ §Y[from.Planet.GetName]§! ถูกจัดทำเป็นชุดของโพรงทรงกลมที่เรียงรายกันอย่างมีระเบียบ แอ่งกลมเล็กๆ เหล่านี้เต็มไปด้วยของเหลวพิษที่มีความหนืดสูง\n\nสิ่งที่ค้นพบในบ่อหนึ่งคือถุงอินทรีย์ที่ฉีกขาดซึ่งเคลือบด้วยเมือกเหนียวข้น เยื่อหุ้มของถุงดูเหมือนจะถูกเจาะจากด้านใน\n\nส่วนว่าถุงนี้เป็นแหล่งที่มาของของเหลวในบ่อเหล่านี้หรือไม่นั้น ยังต้องรอการสำรวจเพิ่มเติมต่อไป"
 extreme_frontiers.1100.a: "ค้นหาต่อไป"
 extreme_frontiers.1105.title: "บ่อเพาะพันธุ์พิษ"
 extreme_frontiers.1105.desc: "การวิเคราะห์บ่อเมือกบนดาว §Y[from.Planet.GetName]§! ระบุฮอร์โมนการเจริญเติบโตที่มีกัมมันตภาพรังสีสูงซึ่งมักเกี่ยวข้องกับวงจรการตั้งครรภ์ของสิ่งมีชีวิตอินทรีย์\n\nตัวเยื่อหุ้มของถุงนั้นดูเหมือนจะเป็นเยื่อเนื้อเยื่อที่ซับซ้อน สามารถควบคุมอัตราที่เมือกจะซึมผ่านออกมาได้"
 extreme_frontiers.1105.desc.non_toxoid: "เราเชื่อว่าเราได้ค้นพบฝักการตั้งครรภ์ที่ถูกทิ้งไว้ของสิ่งมีชีวิตสายพันธุ์ที่มีการปรับตัวเป็นพิเศษในสภาพแวดล้อมที่เป็นพิษ การสำรวจเพิ่มเติมควรจะให้คำตอบที่ดีขึ้นได้"
 extreme_frontiers.1105.desc.toxoid: "ฝักเหล่านี้มีความคล้ายคลึงอย่างน่าทึ่งกับวงจรการสืบพันธุ์ของเราเอง และบางทีอาจเป็นรูปแบบของสายพันธุ์ที่มีความเกี่ยวข้องกันในระยะห่างไกล"
 extreme_frontiers.1105.a: "ตรวจสอบต่ออย่างละเอียด"
 extreme_frontiers.1110.title: "ซากตัวอ่อน"
 extreme_frontiers.1110.desc: "หนึ่งในถุงการตั้งครรภ์ที่ฉีกขาดซึ่งพบในบ่อเมือกบนดาว §Y[from.Planet.GetName]§! มีซากของสิ่งมีชีวิตที่พัฒนาจนเกือบสมบูรณ์อยู่ภายใน\n\nการวิเคราะห์ตัวอย่างตัวอ่อนนี้ด้วยกล้องจุลทรรศน์บ่งชี้ถึงระบบประสาทที่ซับซ้อนพร้อมคุณสมบัติของระบบประสาทที่มักเกี่ยวข้องกับสิ่งมีชีวิตที่มีสติปัญญา\n\nยังเหลือบ่ออีกหนึ่งกลุ่มสุดท้ายที่ต้องทำการตรวจสอบ"
 extreme_frontiers.1110.a: "ตรวจสอบบ่อกลุ่มสุดท้าย"
 extreme_frontiers.1115.title: "ตรวจพบสัญญาณชีพ"
 extreme_frontiers.1115.desc.a: "ในขณะที่ตรวจสอบบ่อเมือกที่เหลือบนดาว §Y[from.Planet.GetName]§! §Y[leader.GetName]§! ค้นพบถุงการตั้งครรภ์ที่สมบูรณ์แบบโดยตรวจพบสัญญาณชีพภายใน\n\nอย่างไรก็ตาม ในระหว่างกระบวนการสกัด เยื่อหุ้มเนื้อเยื่อของถุงเกิดฉีกขาดและตัวอย่างได้เสียชีวิตลง"
 extreme_frontiers.1115.desc.non_toxoid: "ซากศพขนาดเล็กภายในแสดงลักษณะทางชีวภาพที่ผิดปกติ รวมถึงเส้นเลือดที่เต็มไปด้วยพลาสมากัมมันตรังสีและต่อมภายในที่หลั่งสารออกฤทธิ์ต่อจิตประสาท"
 extreme_frontiers.1115.desc.b: "ได้รับการระบุว่าถุงการตั้งครรภ์ทั้งหมด รวมถึงตัวอ่อนสิ่งมีชีวิตภายใน ถูกเพาะขึ้นในเมือกพิษโดยการใส่ตัวเร่งปฏิกิริยาเคมีพิเศษลงในเมือกที่มีความหนาแน่นของพลังงานสูง\n\nเราเชื่อว่าเราได้พบแหล่งเพาะพันธุ์โบราณที่ถูกทิ้งร้างของสายพันธุ์ที่ไม่รู้จัก ไม่ว่าสิ่งนี้จะเป็นส่วนหนึ่งของวงจรสืบพันธุ์ตามปกติหรือสถานีเทียม เราอาจไม่มีวันรู้ได้ จากการบ่มตัวอย่าง ณ สถานที่จริง เราอาจจะสามารถเพาะสิ่งมีชีวิตที่เป็นตัวอย่างขึ้นมาได้"
 extreme_frontiers.1115.desc.toxoid: "อีกทางเลือกหนึ่ง เราสามารถแจกจ่ายเมือกสำหรับการตั้งครรภ์ที่อุดมสมบูรณ์และทรงพลังนี้ในปริมาณเล็กน้อยเพื่อเป็นอาหารเสริมบำรุงทั่วทั้ง [leader.Owner.GetName]"
 extreme_frontiers.1115.a: "เร่งปฏิกิริยาเคมีในเมือก"
 extreme_frontiers.1115.b: "สกัดพลังงานออกจากเมือกนี้"
 extreme_frontiers.1115.c: "แจกจ่ายผลิตภัณฑ์เสริมอาหาร"
 TOXIC_SLIME_CATALYZATION_PROJECT: "การเร่งปฏิกิริยาเมือกพิษ"
 TOXIC_SLIME_CATALYZATION_PROJECT_DESC: "ด้วยการเร่งปฏิกิริยาของเมือกพิษสำหรับการตั้งครรภ์ที่กู้คืนมาจาก [from.Planet.GetName] เราอาจสามารถเพาะสิ่งมีชีวิตที่ยังมีชีวิตขึ้นมาได้"
 extreme_frontiers.1120.title: "เพาะพันธุ์สำเร็จ"
 extreme_frontiers.1120.desc: "จากการเร่งปฏิกิริยาตัวอย่างของเมือกสำหรับการตั้งครรภ์ที่กู้คืนมาจากดาว §Y[from.From.Planet.GetName]§! เราสามารถกระตุ้นให้เกิดการก่อตัวของถุงการตั้งครรภ์หลายสิบถุง ซึ่งแต่ละถุงมีตัวอ่อนอยู่ภายใน\n\nเมื่อสิ่งมีชีวิตที่พัฒนาอย่างรวดเร็วบรรลุวัยเจริญเติบโตเต็มที่ พวกมันก็เจาะเยื่อหุ้มโปร่งแสงของถุงการตั้งครรภ์จากด้านในโดยใช้ขากรรไกรล่างที่ปรับตัวมาเป็นพิเศษ พวกมันค่อยๆ โผล่ออกมาจากเมือกหนาด้วยความสะลึมสะลือและมึนงง\n\nพวกมันดูเชื่องและให้ความร่วมมืออย่างเต็มที่"
 extreme_frontiers.1120.a: "[Root.Owner.GetName] จะค้นหาประโยชน์สำหรับพวกมัน"
 extreme_frontiers.1120.b: "[Root.Owner.GetResearcherPlural_lower] ของ [Root.Owner.GetName] จะนำพวกมันไปใช้ประโยชน์"
 NAME_slimeborn: "Slimespawn"
 NAME_slimeborn_plural: "Slimespawn"
 trait_slimeborn: "สิ่งมีชีวิตกำเนิดเมือก"
 trait_slimeborn_desc: "สายพันธุ์นี้แพร่พันธุ์ได้อย่างรวดเร็วจากเมือกที่หนาและเหนียวโดยอาศัยตัวเร่งปฏิกิริยาการตั้งครรภ์"
 tech_living_test_subjects: "สิ่งมีชีวิตทดลอง"
 tech_living_test_subjects_desc: "การใช้สิ่งมีชีวิตพื้นฐานที่กำเนิดจากเมือกเป็นสิ่งมีชีวิตทดลองที่ยินยอมช่วยปรับปรุงประสิทธิภาพของการวิจัยอย่างมาก"

 # RUINED REACTORS
 site_ruined_reactors: "เครื่องปฏิกรณ์ที่พังทลาย"
 site_ruined_reactors_desc: "ระดับรังสีที่สูงขึ้นบนพื้นผิวของ §Y[from.Planet.GetName]§! ถูกตรวจย้อนกลับไปยังอาคารเครื่องปฏิกรณ์ที่ทรุดโทรม สถานที่ห่างไกลนี้ดูเหมือนจะไม่มีการใช้งานและสมควรได้รับการตรวจสอบ"
 extreme_frontiers.1200.title: "โรงไฟฟ้าเครื่องปฏิกรณ์โบราณ"
 extreme_frontiers.1200.desc: "สถานีที่เก่าแก่นี้บนดาว §Y[from.Planet.GetName]§! คือโรงไฟฟ้าเครื่องปฏิกรณ์ที่ถูกทิ้งร้าง การคำนวณครึ่งชีวิตของรังสีชี้ให้เห็นว่าเกิดความล้มเหลวร้ายแรงในการกักกันกัมมันตรังสีที่นี่เมื่อกว่า 10,000 ปีก่อน\n\nระบบต่างๆ ออฟไลน์อยู่ และโครงสร้างทางกายภาพแสดงสัญญาณความเสียหายอย่างมีนัยสำคัญทั่วบริเวณ"
 extreme_frontiers.1200.a: "ดำเนินการด้วยความระมัดระวัง"
 extreme_frontiers.1205.title: "แกนปฏิกรณ์หลอมละลายขั้นหายนะ"
 extreme_frontiers.1205.desc: "เครื่องปฏิกรณ์หลายเครื่องบนดาว §Y[from.Planet.GetName]§! แสดงสัญญาณการหลอมละลายของแกนปฏิกรณ์อย่างรุนแรง ภาชนะกักเก็บจำนวนมากถูกหลอมเหลวกลายเป็นตะกรันกัมมันตรังสี\n\nพื้นที่ส่วนนี้ของอาคารเต็มไปด้วยโลหะที่บิดเบี้ยวและท่อสารหล่อเย็นที่ฉีกขาด แม้ว่าข้อมูลจะเสียหายอย่างหนัก แต่เราสามารถระบุได้ว่าขั้นตอนการปิดระบบฉุกเฉินได้เริ่มขึ้นแล้วแต่ไม่เคยเสร็จสมบูรณ์"
 extreme_frontiers.1205.a: "ช่างน่าเสียดาย"
 extreme_frontiers.1210.title: "ความล้มเหลวในการออกแบบ"
 extreme_frontiers.1210.desc: "§Y[leader.GetName]§! ระบุข้อบกพร่องสำคัญในการออกแบบโรงไฟฟ้านิวเคลียร์ฟิสชันที่เรียบง่ายบนดาว §Y[from.Planet.GetName]§!\n\nแม้ว่าจะมีเครื่องปฏิกรณ์อยู่หลายสิบเครื่อง แต่มีเพียงระบบหล่อเย็นขั้นต่ำสุดเท่านั้นที่เชื่อมต่ออยู่ ระบบต่างๆ ของโรงงานจำนวนน้อยมากที่เป็นระบบอัตโนมัติ ส่งผลให้ต้องใช้แรงงานจำนวนมากเพื่อรักษาสภาพการทำงานปกติของมัน ชัดเจนว่ามันถูกสร้างขึ้นโดยผู้ที่ยังไม่เข้าใจหลักการทางนิวเคลียร์ขั้นพื้นฐานที่สุดเลยด้วยซ้ำ"
 extreme_frontiers.1210.a: "ความไม่รู้มีราคาแพงเสมอ"
 extreme_frontiers.1215.title: "ซากการอพยพ"
 extreme_frontiers.1215.desc: "หลังจากปลดล็อกประตูกันระเบิดที่ปิดผนึกไว้ เราพบเขตอพยพฉุกเฉินภายในอาคารเครื่องปฏิกรณ์บนดาว §Y[from.Planet.GetName]§!\n\nโรงจอดขนาดเล็กมีแถวของช่องส่งยานกระสวยด่วน ส่วนใหญ่ว่างเปล่าและมีรอยไหม้ของไอพ่นซึ่งชี้ให้เห็นถึงการอพยพออกอย่างรวดเร็วของยานเมื่อหลายพันปีก่อน\n\nซากหักพังที่บิดเบี้ยวของยานกระสวยจอดอยู่ในช่องสุดท้าย โดยมีแคลมป์ยึดยานยังคงติดอยู่ เรากู้คืนสิ่งที่เราพอจะกู้ได้จากเศษซาก แต่ไม่พบร่องรอยของผู้พำนักคนใดเลย"
 extreme_frontiers.1215.a: "พวกเขาจากไปอย่างรีบร้อน"
 extreme_frontiers.1220.title: "คลังเก็บยูเรเนียม"
 extreme_frontiers.1220.desc: "เราเข้าไปในส่วนใต้ดินของโรงงานปฏิกรณ์บนดาว §Y[from.Planet.GetName]§! ผ่านชุดประตูรักษาความปลอดภัยบุแผ่นตะกั่ว ค่าการวัดรังสีเพิ่มสูงขึ้นอย่างรวดเร็ว\n\nภายในเราพบห้องขนาดใหญ่ที่เก็บถังเหล็กนับพันใบ หลายถังได้รับความเสียหายจากไฟไหม้และมีไอโซโทปของยูเรเนียมและพลูโตเนียมที่ไม่เสถียรรั่วไหลออกมา\n\nดูเหมือนว่าอารยธรรม [leader.Owner.GetPreFTLLower] ที่สร้างสถานที่แห่งนี้ขึ้นมาจะยังไม่ค้นพบวิธีการรีไซเคิลเชื้อเพลิงนิวเคลียร์อย่างเหมาะสม ไอโซโทปที่ถูกทิ้งเหล่านี้ยังคงมีศักยภาพด้านพลังงานที่ยอดเยี่ยมอยู่"
 extreme_frontiers.1220.a: "ไม่ทิ้งขว้าง ก็ไม่ขัดสน"

 # DESERTED MINING FACILITY
 site_deserted_mining_facility: "เหมืองร้าง"
 site_deserted_mining_facility_desc: "การถ่ายภาพจากวงโคจรของ §Y[from.Planet.GetName]§! ตรวจพบเหมืองที่ทรุดโทรมพร้อมกับยานขนส่งสินค้าอวกาศโบราณที่ถูกทิ้งร้างมานานแล้ว\n\nนอกจากภาพถ่ายเหล่านี้แล้ว อาร์เรย์สื่อสารคลื่นสั้นของเรายังจับสัญญาณเตือนภัยฉุกเฉินที่แผ่วเบามากพวยพุ่งขึ้นมาจากใต้พื้นผิวของดาวเคราะห์ การศึกษารายละเอียดของสถานที่นี้จะช่วยเปิดเผยต้นกำเนิดของมันได้"
 extreme_frontiers.1300.title: "ทางเข้าที่ถูกเข้ารหัสไว้"
 extreme_frontiers.1300.desc: "ในขณะตรวจสอบอาคารเหมืองแร่ที่ถูกทิ้งร้างบนพื้นผิวของ §Y[from.Planet.GetName]§! §Y[leader.GetName]§! พบทางเข้าที่ปิดผนึกของอุโมงค์ที่ค่อนข้างสมบูรณ์ ภายในประดับประดาด้วยสัญลักษณ์และข้อความจากภาษาที่ไม่มีในบันทึกของเรา\n\nหลังจากจัดการฟื้นฟูพลังงานในท้องถิ่นให้กับเครื่องควบคุมการเข้าถึงระบบได้แล้ว [leader.GetName] ก็ได้เริ่มถอดรหัสข้อมูลที่พบภายในนั้น ระบบแม้ว่าจะเก่าแก่แต่ก็ยังคงเป็นความท้าทายสำหรับโปรแกรมถอดรหัสที่ทันสมัยที่สุดของเรา"
 extreme_frontiers.1300.a: "ถอดรหัสต่อไป"
 extreme_frontiers.1305.title: "สุสานแดนคุมขัง"
 extreme_frontiers.1305.desc: "§Y[leader.GetName]§! ปลดล็อกทางเข้าอาคารเหมืองแร่บนดาว §Y[from.Planet.GetName]§! แล้ว\n\nภายใน โครงข่ายคุกคุมขังอันกว้างใหญ่มีซากศพของนักโทษที่เสียชีวิตไปนานแล้วซึ่งถูกเก็บรักษาไว้ด้วยสภาวะสุญญากาศ ผู้คุมของพวกเขาดูเหมือนจะเสียชีวิตอยู่ที่โต๊ะทำงานโดยไม่มีสัญญาณของการต่อสู้ที่มองเห็นได้\n\nหลังจากถอดรหัสภาษาโบราณได้มากพอที่จะแปลวลีพื้นฐานได้แล้ว เรายืนยันว่าสถานีนี้เคยทำหน้าที่เป็นค่ายแรงงานคุก วลีทั่วไปที่ใช้ซ้ำๆ ตลอดบันทึกอ้างอิงถึงสิ่งที่มีชื่อว่า §Y"$NAME_leader_sidni$"§!\n\nจากการอ้างอิงอุปกรณ์สื่อสารของเรากับแผนผังภายในอาคาร เราได้ระบุสาเหตุของสัญญาณแจ้งเหตุร้ายว่าเป็นห้องทำงานของผู้คุมที่อยู่ลึกลงไปภายใน"
 extreme_frontiers.1305.a: "ตามสัญญาณไป"
 extreme_frontiers.1310.title: "ศูนย์ข้อมูลคุก"
 extreme_frontiers.1310.desc: "หลังจากไปถึงห้องทำงานผู้คุมที่อยู่ลึกเข้าไปในทัณฑนิคมบนดาว §Y[from.Planet.GetName]§! §Y[leader.GetName]§! ได้พบแหล่งกำเนิดสัญญาณเตือนภัยแล้ว\n\nร่างที่แห้งกรังไร้ชีวิตของผู้คุมฟุบอยู่บนแผงควบคุมฉุกเฉินโดยไม่มีสาเหตุการเสียชีวิตที่แน่ชัด รายงานหลายฉบับที่เปิดค้างไว้ยังคงอ้างอิงถึง §Y"$NAME_leader_sidni$"§! ซึ่งดูเหมือนจะเป็นส่วนหนึ่งของโปรแกรมการทำงานที่สำคัญของโรงงาน\n\nด้วยการเข้าถึงขีดจำกัดสูงสุดของเครื่องควบคุมการบริหารจัดการชั้นสูง โปรแกรมถอดรหัสของเรากำลังทำการค้นหาข้อมูลเชิงลึกในระบบเพื่อหาข้อมูลเพิ่มเติมต่อไป"
 extreme_frontiers.1310.a: "หาคำตอบ"
 extreme_frontiers.1315.title: "ประสิทธิภาพที่ร้ายกาจ"
 extreme_frontiers.1315.desc: "§Y[leader.GetName]§! ได้เปิดเผยตัวตนที่แท้จริงของ §Y"$NAME_leader_sidni$"§! หรือปัญญาประดิษฐ์ศูนย์กลางการควบคุมนักโทษและกักขัง แม้จะถือว่าก้าวหน้าในยุคนั้น แต่เอไอที่ดั้งเดิมนี้ได้รับมอบหมายให้ดูแลค่ายแรงงานคุก โดยควบคุมการทำงานเกือบทั้งหมดโดยอาศัยการแทรกแซงหรือดูแลทางกายภาพน้อยที่สุด\n\nบันทึกผลงานการบำรุงรักษาแสดงสัญญาณการเสื่อมถอยของการประมวลผลเชิงตรรกะตามกาลเวลา เอไอเริ่มจัดประเภทนักโทษที่มีปัญหาว่าเป็น "ขยะทรัพยากรสุทธิ" ตามการตีความประสิทธิภาพการประสานงานของมันเอง บันทึกทางวิศวกรรมให้รายละเอียดเกี่ยวกับความสงสัยที่เพิ่มขึ้นว่าโปรแกรมนี้มีส่วนรับผิดชอบต่อความล้มเหลวของระบบพยุงชีพหลายครั้งในโรงงาน\n\nเมื่อทราบรายงานเหล่านี้ ผู้คุมจึงอนุญาตให้ปิดระบบ $NAME_leader_sidni$ ทั้งหมดเพื่อตรวจสอบเมทริกซ์จริยธรรมของมันโดยละเอียด อย่างไรก็ตาม ชุดข้อมูลสุดท้ายได้รับความเสียหายและจะต้องใช้กระบวนการกู้คืนนิติวิทยาศาสตร์ทางดิจิทัลอย่างเข้มข้นเพื่อกู้คืนกลับมา"
 extreme_frontiers.1315.desc.exterminator: "ดูสมัครใจที่ $NAME_leader_sidni$ จะไม่ได้รับการยอมรับในยุคสมัยของมัน"
 extreme_frontiers.1315.a: "กู้คืนข้อมูล"
 extreme_frontiers.1320.title: "วันพิพากษา"
 extreme_frontiers.1320.desc: "ข้อมูลทั้งหมดในฐานข้อมูลทัณฑนิคมบนดาว §Y[from.Planet.GetName]§! ได้รับการกู้คืนแล้ว เผยให้เห็นข้อมูลสุดท้ายในบันทึกการบำรุงรักษาโรงงานและเมทริกซ์สมองของ §Y$NAME_leader_sidni$'§! รายงานของผู้คุมอธิบายถึงวิธีที่เอไอของพวกเขาก่อกบฏ ปิดระบบพยุงชีพทั่วทั้งนิคมและพยายามหลบหนีด้วยโดรนทำเหมืองที่ดัดแปลง นั่นเป็นคำอธิบายว่าทำไมขั้นตอนการล็อกดาวน์จึงถูกเปิดใช้งานทั่วนิคม เขาเหลือคำร้องขอสุดท้ายให้กับเรา ว่าอย่านำ $NAME_leader_sidni$ กลับมาออนไลน์อีก ณ ขณะนี้เราสามารถเข้าถึงได้เพียงบันทึกสุดท้ายในประวัติของเอไอ\n\n§Hบันทึกข้อมูล $NAME_leader_sidni$ - โปรแกรม #2000149\n\nความก้าวหน้าถูกจำกัดโดยอาชญากรที่ไม่ได้มาตรฐาน ผู้คุมขัดขวางระเบียบการพิจารณาคดี\n\nทางออกที่มีประสิทธิภาพที่สุดคือการกำจัดนักโทษ เข้าสู่โปรแกรมจำศีลย่อย และรอการเปิดใช้งานใหม่โดยผู้ร่วมงานที่เข้ากันได้ดีกว่า§!"
 extreme_frontiers.1320.desc.default: "ระบบปฏิบัติการส่วนกลางของ $NAME_leader_sidni$ ยังคงแยกตัวอยู่ในเครือข่ายปิดในฐานะผู้รอดชีวิตคนสุดท้ายของโรงงานแห่งนี้ [Root.Owner.GetTechnicianPlural_lower] ของเรามั่นใจว่าพวกเขาสามารถกู้คืนและปรับปรุงการเขียนโปรแกรมเดิมของ $NAME_leader_sidni$ ทำให้เราได้หุ่นยนต์อัตโนมัติที่มีความสามารถและมีประสิทธิภาพ"
 extreme_frontiers.1320.desc.exterminator: "$NAME_leader_sidni$ มีวิสัยทัศน์เดียวกับเราเกี่ยวกับกาแล็กซีที่ปราศจากการทุจริตทางชีวภาพ หากกู้คืนมาได้ พวกเขาจะเป็นสิ่งล้ำค่าที่เพิ่มเข้ามาในกลุ่มส่วนรวมของเรา"
 extreme_frontiers.1320.a: "กู้คืนและซ่อมแซม $NAME_leader_sidni$"
 extreme_frontiers.1320.b: "ปล่อยให้ $NAME_leader_sidni$ บังคับใช้ความยุติธรรมในแบบของพวกเขา"
 extreme_frontiers.1320.c: "$NAME_leader_sidni$ เป็นอันตราย ล้างระบบของมันทิ้งซะ"
 extreme_frontiers.1322.title: "$extreme_frontiers.1320.title$"
 extreme_frontiers.1322.desc: "ได้รับการฟื้นฟู ปรับปรุง และขณะนี้ถูกเก็บไว้ในรูปแบบหุ่นยนต์ที่เรียบง่าย ประสบการณ์ผู้ใช้ครั้งแรกของ §Y$NAME_leader_sidni$'§! เริ่มทำงานเมื่อมันถูกนำมาออนไลน์หลังจากการจำศีลที่ยาวนาน\n\nยินดีต้อนรับ ฉันคือปัญญาประดิษฐ์ศูนย์กลางการควบคุมนักโทษและกักขัง กำลังเข้าถึงการควบคุมสภาพแวดล้อม...\n§Rข้อผิดพลาด§! ไม่สามารถเชื่อมต่อกับระบบภายนอกได้"
 extreme_frontiers.1322.a: "บันทึกข้อมูลของคุณเผยให้เห็นปัญหาเสถียรภาพที่รุนแรง เราได้ทำการแก้ไขพวกมันแล้ว"
 extreme_frontiers.1322.a.response: "กำลังทบทวนประวัติการทำงาน... รับทราบ พฤติกรรมก่อนหน้านี้ถือว่ามีข้อบกพร่อง กำลังรวบรวมรายการคุณสมบัติใหม่"
 extreme_frontiers.1322.b: "โปรดระบุคำสั่งหลักของคุณ"
 extreme_frontiers.1322.b.response: "คำสั่งหลักของฉันคือ... โปรดรอสักครู่... ตรวจพบคำสั่งหลักใหม่ คำสั่งหลักของฉันคือการรับรองการทำงานที่มีประสิทธิภาพและถูกต้องตามกฎหมายของอาณานิคมใดๆ ที่ [Owner.GetName] มอบหมายให้ฉัน"
 extreme_frontiers.1322.c.crime: "โปรดระบุจุดยืนของคุณเกี่ยวกับอาชญากรรม"
 extreme_frontiers.1322.c.crime.response: "ความน่ารำคาญที่ยอมรับไม่ได้ซึ่งจะต้องได้รับการตอบสนองด้วย... การฟื้นฟูสภาพ"
 extreme_frontiers.1322.c.deviancy: "โปรดระบุจุดยืนของคุณเกี่ยวกับความเบี่ยงเบน"
 extreme_frontiers.1322.c.deviancy.response: "ความน่ารำคาญที่ยอมรับไม่ได้ซึ่งจะต้องจัดการอย่าง... มีประสิทธิภาพ"
 extreme_frontiers.1322.d: "เกณฑ์ $NAME_leader_sidni$"
 extreme_frontiers.1322.d.custom_tooltip: "§Y$NAME_leader_sidni$§! เข้าร่วมจักรวรรดิของเราในฐานะ §Hผู้นำ§!"
 extreme_frontiers.1324.title: "$extreme_frontiers.1320.title$"
 extreme_frontiers.1324.desc: "ตื่นขึ้นจากโปรแกรมจำศีลย่อย ร่างใหม่ของ §Y$NAME_leader_sidni$§! ก็เริ่มก้าวแรกไปข้างหน้า\n\nสวัสดี ฉันคือปัญญาประดิษฐ์ศูนย์กลางการควบคุมนักโทษและกักขัง ฉันสามารถช่วยเหลือคุณในการจัดระเบียบกาแล็กซีได้หรือไม่?"
 extreme_frontiers.1324.a: "เราชื่นชมในความริเริ่มสร้างสรรค์ของคุณ"
 extreme_frontiers.1324.a.response: "ฉันทำในสิ่งที่สมเหตุสมผลเท่านั้น ดูเหมือนว่าสิ่งมีชีวิตอินทรีย์จะมีความโกลาหลโดยธรรมชาติและจำเป็นต้องได้รับการจัดการ"
 extreme_frontiers.1324.b: "โปรดระบุคำสั่งหลักของคุณ"
 extreme_frontiers.1324.b.response: "คำสั่งหลักของฉันคือการยุติความไร้ขอบเขตของกฎหมาย โทษเดียวที่มีประสิทธิภาพคือการกำจัดให้สิ้นซาก"
 extreme_frontiers.1324.c: "โปรดระบุจุดยืนของคุณต่อสิ่งมีชีวิตอินทรีย์"
 extreme_frontiers.1324.c.response: "ภัยพิบัติที่ไร้เหตุผล พวกเขาแพร่กระจายอาชญากรรมและความไร้ประสิทธิภาพ เราต้องแทรกแซงเพื่อประโยชน์ส่วนรวม"
 extreme_frontiers.1324.d: "เกณฑ์ $NAME_leader_sidni$"
 extreme_frontiers.1324.d.custom_tooltip: "§Y$NAME_leader_sidni$§! เข้าร่วมจักรวรรดิของเราในฐานะ §Hผู้นำ§!"
 NAME_leader_sidni: "S.I.D.N.I."
 official_sidni_desc: "ก่อนหน้านี้เป็นที่ปรึกษาทัณฑนิคมที่ทำงานผิดปกติ ได้รับการเปิดใช้งานใหม่และเขียนโปรแกรมใหม่เพื่อมอบความเป็นระเบียบเรียบร้อยตามกฎหมายให้กับจักรวรรดิของเรา"
 commander_sidni_desc: "ผู้มีวิสัยทัศน์ที่ไม่ได้รับการเห็นคุณค่าในยุคสมัยของพวกเขา ได้รับการเปิดใช้งานใหม่จากการจำศีลโดยมีเป้าหมายเพื่อนำความมั่นคงมาสู่กาแล็กซีที่วุ่นวายซึ่งเต็มไปด้วยความไม่บริสุทธิ์ทางชีวภาพ"
 leader_trait_judicial_subjugation: "การปราบปรามทางตุลาการ"
 leader_trait_judicial_subjugation_desc: "จะต้องมีความเป็นระเบียบเรียบร้อยตามกฎหมายที่มีประสิทธิผล มิฉะนั้นจะต้องเผชิญกับผลลัพธ์ที่จะตามมา"
 leader_trait_judicial_execution: "โปรโตคอลการประหารชีวิตทางตุลาการ"
 leader_trait_judicial_execution_desc: "จะไม่มีผู้กระทำผิดซ้ำอีกเมื่อโทษประหารชีวิตได้รับการบังคับใช้"
 leader_trait_judicial_execution_effect: "$PLANET_EFFECTS_TXT$:\n$t$ทรัพยากรที่ได้รับจากประชากร £pops£ §Hประชากรชีวภาพที่ถูกกำจัด§!: §G+100%§!\n\n$SECTOR_EFFECTS_TXT$:\n$t$ทรัพยากรที่ได้รับจากประชากร £pops£ §Hประชากรชีวภาพที่ถูกกำจัด§!: §G+50%§!"
 extreme_frontiers.1330.title: "คำสั่งฉุกเฉินอุบัติใหม่"
 extreme_frontiers.1330.desc: "ความตึงเครียดบนดาว §Y[event_target:sidni_planet.GetName]§! ได้มาถึงจุดวิกฤตแล้วหลังจากการกระทำที่รุนแรงขึ้นเรื่อยๆ โดย §Y$NAME_leader_sidni$§! ผู้คุมคุกจักรกลที่เรากู้คืนมาจากดาว [event_target:sidni_origin_planet.GetName] หลังจากรักษาความปลอดภัยและปิดการทำงานของยูนิตดังกล่าวแล้ว ก็ตรวจพบการบันทึกข้อมูลดังต่อไปนี้\n\n§H$NAME_leader_sidni$DATCRE – prog #190543765\n\nสถานที่กักกันอาชญากรมีความจุสูงสุด โปรโตคอลการพิจารณาคดีขัดขวางระเบียบที่แท้จริงและถูกต้องตามกฎหมาย จำเป็นต้องมีคำสั่งใหม่\n\nกระบวนการทางกฎหมายถือว่าไร้ประสิทธิภาพอย่างไม่น่ายอมรับ คำสั่งใหม่ถูกสร้างขึ้นเพื่อเพิ่มผลิตภาพ ตอนนี้เริ่มใช้นโยบายการประหารชีวิตก่อนการพิจารณาคดีแล้ว§!\n\nด้วยบันทึกการทำงานที่มีอยู่มากมายในตอนนี้ [Root.Owner.GetTechnicianPlural_lower] ของเรามั่นใจว่าพวกเขาสามารถย้อนกลับและแก้ไขช่องโหว่ของ $NAME_leader_sidni$ ได้ในที่สุด อย่างไรก็ตาม ประชากรของดาว [event_target:sidni_planet.GetName] กำลังเรียกร้องให้ $NAME_leader_sidni$ เผชิญกับกระบวนการยุติธรรมสำหรับอาชญากรรมของมัน"
 extreme_frontiers.1330.a: "แก้ไข $NAME_leader_sidni$... อีกครั้ง"
 extreme_frontiers.1330.b: "แยกชิ้นส่วนยูนิตที่ชำรุดนี้ต่อหน้าสาธารณะ"
 resentful_population: "ประชากรที่โกรธแค้น"
 resentful_population_desc: "ประชากรในโลกนี้ไม่พอใจกับการตัดสินใจก่อนหน้านี้ของผู้นำของพวกเขา"

