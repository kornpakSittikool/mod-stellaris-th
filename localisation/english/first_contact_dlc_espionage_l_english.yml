 preftl_operation.1020.pacif.desc:0 "งานของเราใน §H[from.target.GetName]§! ดำเนินไปอย่างยอดเยี่ยม ด้วยการชักใยมีมทางวัฒนธรรมและจารีตสังคมอย่างระมัดระวัง เราได้กระตุ้นให้เกิดการเปลี่ยนแปลงทางวัฒนธรรมอย่างลึกซึ้ง จนแทบเชื่อได้ว่ามันเกิดขึ้นเองตามธรรมชาติ\n\nเจ้าหน้าที่คัดสรรของเรา ซึ่งต่างก็เป็นผู้ไกล่เกลี่ยที่มีทักษะสูง ได้คลุกคลีกับชุมชนอันหลากหลาย พร้อมแสดงให้เห็นคุณค่าของ [root.GetAdj] §Y$ethic_pacifist$§! ว่าเป็นทางออกของปัญหาสังคมมากมายในหมู่ [from.target.GetSpeciesAdj] อย่างน้อยสำหรับชุมชนเหล่านี้ ความรุนแรงไม่ใช่คำตอบแรกของพวกเขาอีกต่อไป"
 preftl_operation.1020.phile.desc:0 "งานของเราใน §H[from.target.GetName]§! ดำเนินไปอย่างยอดเยี่ยม ด้วยการชักใยมีมทางวัฒนธรรมและจารีตสังคมอย่างระมัดระวัง เราได้กระตุ้นให้เกิดการเปลี่ยนแปลงทางวัฒนธรรมอย่างลึกซึ้ง จนแทบเชื่อได้ว่ามันเกิดขึ้นเองตามธรรมชาติ\n\nเจ้าหน้าที่ของเราใช้แนวทางแบบองค์รวม ส่งเสริมความอยากรู้อยากเห็นและความชื่นชมต่อวัฒนธรรมอื่นให้มากขึ้นผ่านเรื่องเล่า ศิลปะ และกิจกรรมชุมชน เมื่อปฏิบัติการ [from.GetName] สิ้นสุดลง เจ้าหน้าที่ของเราจึงปล่อยให้ §Y$ethic_xenophile$§! ท้องถิ่นสานต่อบทสนทนาเหล่านี้ และเตรียม [from.target.GetName] ให้พร้อมยิ่งขึ้นสำหรับชีวิตในดาราจักรอันหลากหลาย"
 preftl_operation.1020.phobe.desc:0 "งานของเราใน §H[from.target.GetName]§! ดำเนินไปอย่างยอดเยี่ยม ด้วยการชักใยมีมทางวัฒนธรรมและจารีตสังคมอย่างระมัดระวัง เราได้กระตุ้นให้เกิดการเปลี่ยนแปลงทางวัฒนธรรมอย่างลึกซึ้ง จนแทบเชื่อได้ว่ามันเกิดขึ้นเองตามธรรมชาติ\n\nความกลัวและความไม่ไว้วางใจนั้นปลุกขึ้นได้ง่าย แต่ยากจะบังคับทิศทาง โดยเฉพาะในสังคมที่เข้าถึงสื่อมวลชน เจ้าหน้าที่ของเราใช้วิธีการอันละเอียดอ่อน ปลูกฝังคำปราศรัยและขบวนการวัฒนธรรมแบบ §Y$ethic_xenophobe$§! ที่เน้นแง่ดีของการปกป้องตนเอง ขณะเดียวกันก็สอนบทเรียนอันตรงไปตรงมาเกี่ยวกับอันตรายของอิทธิพลจากต่างดาว บทเรียนเหล่านี้ถูกรับช่วงต่อโดยผู้สนับสนุนและกลุ่มการเมืองพื้นถิ่นของ [from.target.GetSpeciesAdj] แล้ว"
 preftl_operation.1020.spiri.desc:0 "งานของเราใน §H[from.target.GetName]§! ดำเนินไปอย่างยอดเยี่ยม ด้วยการชักใยมีมทางวัฒนธรรมและจารีตสังคมอย่างระมัดระวัง เราได้กระตุ้นให้เกิดการเปลี่ยนแปลงทางวัฒนธรรมอย่างลึกซึ้ง จนแทบเชื่อได้ว่ามันเกิดขึ้นเองตามธรรมชาติ\n\nแนวทางสองทางของเราวางเจ้าหน้าที่ผู้มีเสน่ห์กลุ่มหนึ่งให้เป็นหัวหน้าลัทธิและนิกายที่อิงกับศรัทธาพื้นเมืองหลากหลายแบบ ขณะที่อีกกลุ่มหนึ่งทำงานปกป้องขบวนการที่กำลังเติบโตเหล่านี้จากการแทรกแซงและการเยาะเย้ยทางการเมือง ชุมชนที่รู้แจ้งเหล่านี้ของ [from.target.GetSpeciesAdj] ได้ยอมรับรูปแบบหนึ่งของ §Y$ethic_spiritualist$§! ซึ่งเป็นของวัฒนธรรมตนเอง พวกเขากำลังก้าวเดินบนหนทางของตนสู่สิ่งศักดิ์สิทธิ์"
 preftl_operation.1021.autho.desc:0 "งานของเราใน §H[from.target.GetName]§! ไม่ได้ราบรื่นไร้อุปสรรค แต่เราก็ประสบความสำเร็จ แม้ความพยายามของเราจะไม่ดึงดูดผู้สนับสนุนท้องถิ่นได้มากอย่างที่หวังไว้ในตอนแรก แต่เราก็ได้ผลลัพธ์เชิงบวกบางส่วน\n\nเจ้าหน้าที่ของเราใช้บทเรียนที่สืบทอดมาจากบรรพชนผู้รุ่งโรจน์ของเรา โดยสร้างแบบจำลองขนาดย่อมของ [root.GetAdj] §Y$ethic_authoritarian$§! บน [from.target.capital_scope.GetName] สถาบันบางแห่งถูกปรับโครงสร้างใหม่ จัดวาง [from.target.GetSpeciesNamePlural] จำนวนมากไว้ในลำดับชั้นที่ออกแบบอย่างพิถีพิถัน ไม่ใช่ทุกชุมชนจะยืนยาว แต่ความล้มเหลวของพวกมันจะเป็นบทเรียนอันมีค่า ซึ่งช่วยเสริมระเบียบสังคมโดยรวมของพวกเขา"
 preftl_operation.1021.egali.desc:0 "งานของเราใน §H[from.target.GetName]§! ไม่ได้ราบรื่นไร้อุปสรรค แต่เราก็ประสบความสำเร็จ แม้ความพยายามของเราจะไม่ดึงดูดผู้สนับสนุนท้องถิ่นได้มากอย่างที่หวังไว้ในตอนแรก แต่เราก็ได้ผลลัพธ์เชิงบวกบางส่วน\n\nเจ้าหน้าที่ของเราเดินทางไปไกลทั่วทุกแห่ง เข้าร่วมกับชุมชนและสถาบันท้องถิ่นในประเด็นอย่างความเสมอภาคและความเป็นธรรม วิชาการเมืองของ [from.target.GetSpeciesAdj] นั้นค่อนข้างพัฒนาแล้ว แต่เราได้จุดชนวนการรณรงค์หลายอย่างซึ่งกำลังกดดันให้เกิดการถกเถียงที่ครอบคลุมมากขึ้นและนโยบายแบบ §Y$ethic_egalitarian$§!"
 preftl_operation.1021.mater.desc:0 "งานของเราใน §H[from.target.GetName]§! ไม่ได้ราบรื่นไร้อุปสรรค แต่เราก็ประสบความสำเร็จ แม้ความพยายามของเราจะไม่ดึงดูดผู้สนับสนุนท้องถิ่นได้มากอย่างที่หวังไว้ในตอนแรก แต่เราก็ได้ผลลัพธ์เชิงบวกบางส่วน\n\nเจ้าหน้าที่คัดสรรของเรา ซึ่งล้วนชำนาญด้านการถกเถียงเชิงการศึกษา ได้ทำงานเพื่อจุดประกายความคิดให้กลุ่มชุมชนและสถาบันการศึกษาทั่ว [from.target.capital_scope.GetPlanetHabitat] ความพยายามของพวกเขานำไปสู่การก่อตั้งศูนย์วิจัย กองทุนการศึกษา และแม้แต่ขบวนการศิลปะแบบใหม่ เครื่องมือแห่ง §Y$ethic_materialist$§! เหล่านี้ได้ถูกส่งมอบแก่ [from.target.GetSpeciesNamePlural] แล้ว"
 preftl_operation.1021.milit.desc:0 "งานของเราใน §H[from.target.GetName]§! ไม่ได้ราบรื่นไร้อุปสรรค แต่เราก็ประสบความสำเร็จ แม้ความพยายามของเราจะไม่ดึงดูดผู้สนับสนุนท้องถิ่นได้มากอย่างที่หวังไว้ในตอนแรก แต่เราก็ได้ผลลัพธ์เชิงบวกบางส่วน\n\nเกียรติยศและความสามารถถูกยกย่องอย่างสูงในหลายวัฒนธรรมของ [from.target.GetSpeciesAdj] เจ้าหน้าที่ของเรา ซึ่งปลอมตัวเป็นทหารรับจ้าง กบฏ และผู้จัดหายุทโธปกรณ์ให้ฝ่ายทหาร ได้ทำให้คนท้องถิ่นตื่นตะลึงด้วยอาวุธพิธีการ แบบฝึกการรบอันวิจิตร และการปะทะที่จัดฉากขึ้นอย่างพิถีพิถันหลายครั้ง ทั้งหมดนี้ได้กลายเป็นแรงบันดาลใจให้ [from.target.GetName] มีความเป็น §Y$ethic_militarist$§! มากขึ้น"
 preftl_operation.1021.pacif.desc:0 "งานของเราใน §H[from.target.GetName]§! ไม่ได้ราบรื่นไร้อุปสรรค แต่เราก็ประสบความสำเร็จ แม้ความพยายามของเราจะไม่ดึงดูดผู้สนับสนุนท้องถิ่นได้มากอย่างที่หวังไว้ในตอนแรก แต่เราก็ได้ผลลัพธ์เชิงบวกบางส่วน\n\nเจ้าหน้าที่คัดสรรของเรา ซึ่งต่างก็เป็นผู้ไกล่เกลี่ยที่มีทักษะสูง ได้คลุกคลีกับชุมชนอันหลากหลาย พร้อมแสดงให้เห็นคุณค่าของ [root.GetAdj] §Y$ethic_pacifist$§! ว่าเป็นทางออกของปัญหาสังคมมากมายในหมู่ [from.target.GetSpeciesAdj] อย่างน้อยสำหรับชุมชนเหล่านี้ ความรุนแรงไม่ใช่คำตอบแรกของพวกเขาอีกต่อไป"
