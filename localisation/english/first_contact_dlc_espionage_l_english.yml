l_english:
 ### Pre-FTL Espionage Operations
 diplomacy_wrong_interference_policy:0 "$TRIGGER_FAIL$§R§Yนโยบาย$policy_interference$§! ของเราไม่อนุญาตให้เราทำการจารกรรมที่นี่§!"

 operation_requires_observation_outpost:0 "$TRIGGER_FAIL$§Rต้องมี §Yสถานีสังเกตการณ์§! โคจรรอบโลกแม่ของพวกเขา§!"
 operation_has_disguise:0 " " # Intentionally empty string
 operation_no_disguise_bio:0 "§Hการไม่มี §Y$tech_gene_tailoring$§! จะทำให้เจ้าหน้าที่ของเราปลอมตัวเป็นคนท้องถิ่นได้ยากขึ้น เพิ่มความเสี่ยงต่อเหตุการณ์ลบแบบสุ่ม§!"
 operation_no_disguise_machine:0 "§Hการไม่มี §Y$tech_robomodding$§! จะทำให้เจ้าหน้าที่ของเราปลอมตัวเป็นคนท้องถิ่นได้ยากขึ้น เพิ่มโอกาสเกิดเหตุการณ์ลบแบบสุ่ม§!"
 operation_wrong_tech_level:0 "$TRIGGER_FAIL$§Rระดับเทคโนโลยีของอารยธรรมนี้ยังไม่ก้าวหน้าพอที่จะเข้าร่วมจักรวรรดิของเรา§!\n\n"
 operation_is_gestalt:0 "$TRIGGER_FAIL$§Rพวกเขาเป็น §Yจิตสำนึกรวมหมู่§! จึงไม่สามารถผสานเข้ากับสังคมอื่นได้§!\n\n"
 operation_gestalt_cant_indoctrinate:0 "$TRIGGER_FAIL$§Rเราเป็น §Yจิตสำนึกรวมหมู่§! เราไม่สามารถชักนำพวกเขาได้§!\n\n"
 operation_gestalt_mismatched:0 "$TRIGGER_FAIL$§Rเราไม่สามารถแทรกซึมจักรวรรดิประเภทที่แตกต่างจากเราอย่างสุดขั้วเช่นนี้ได้§!\n\n"
 operation_wrong_interference_policy:0 "$TRIGGER_FAIL$§R§Yนโยบาย $policy_interference$§! ของเราไม่อนุญาตให้ทำปฏิบัติการนี้§!\n\n"
 operation_wrong_enlightenment_policy:0 "$TRIGGER_FAIL$§R§Yนโยบาย $policy_enlightenment$§! ของเราไม่อนุญาตให้ทำปฏิบัติการนี้§!\n\n"
 operation_same_ethos:0 "$TRIGGER_FAIL$§Rอารยธรรมนี้มีจริยธรรมแบบเดียวกับเราอยู่แล้ว§!\n\n"
 operation_failed_infiltration:0 "$TRIGGER_FAIL$§Rการกระทำล่าสุดของเราทำให้ชาวพื้นเมืองอยู่ในภาวะตื่นตัวสูงแล้ว§!\n\n"

 operation_awareness_risk:0 "\nฉันเพิ่มความเสี่ยงของ[from.target.GetName]ได้£awareness£ §Yความรู้§!ระหว่างปฏิบัติการความแหลม:" # event tooltip
 operation_random_event_resolved:0 "§Yปฏิบัติการ [from.GetName]§! จะกลับสู่กำหนดการเดิม"
 operation_random_event_resolved_poor:0 "§Yปฏิบัติการ [from.GetName]§! จะดำเนินต่อไปแม้จะเผชิญความถดถอย §Rเชิงลบ§! นี้"
 operation_random_event_resolved_good:0 "§Yปฏิบัติการ [from.GetName]§! จะดำเนินต่อไป โดยแนวโน้มผลลัพธ์จะ §Gเป็นบวก§! มากขึ้น"
 operation_random_event_resolved_excellent:0 "§Yปฏิบัติการ [from.GetName]§! จะดำเนินต่อไป พร้อมแนวโน้มสูงที่จะได้ผลลัพธ์ §Gเชิงบวก§!"

 operation_infiltrate_government:0 "แทรกซึมรัฐบาล"
 operation_infiltrate_government_desc:0 "เจ้าหน้าที่ที่ถูกส่งไปแทรกซึมสังคมของพวกเขาจะค่อยๆ เข้ามาแทนที่ผู้นำโลก เพื่อเตรียมดาวเคราะห์ให้พร้อมต่อการผนวก"
 operation_infiltrate_government_on_success:0 "$IF_SUCCESSFUL|E$\nผนวกดาวเคราะห์ และมอบโบนัสความสุขก้อนใหญ่แต่ชั่วคราวให้แก่ชาวพื้นเมือง\n\n[owner.GetDisguiseState]"

 operation_indoctrinate_society:0 "ชี้นำสังคม"
 operation_indoctrinate_society_desc:1 "ด้วยการมีอิทธิพลต่อกลุ่มประชากรย่อยภายใน [target.GetName] เจ้าหน้าที่ของเราจะสามารถโน้มน้าวทั้งสังคมให้หันมาสู่แนวคิดแบบเราได้"
 operation_indoctrinate_society_on_success:0 "$IF_SUCCESSFUL|E$\nเปลี่ยนจริยธรรมของประชากรให้โน้มเอียงเข้าหาเรา\n\n[owner.GetDisguiseState]"

 operation_plant_advanced_knowledge:0 "ปลูกฝังความรู้ขั้นสูง"
 operation_plant_advanced_knowledge_desc:0 "[target.GetName] อาจเป็นสังคมก่อนความเร็วแต่พวกเขามีศักยภาพพอจะก้าวสู่ดวงดาวได้ สิ่งที่พวกเขาต้องการก็แค่แรงผลักเล็กน้อย"
 operation_plant_advanced_knowledge_on_success:0 "$IF_SUCCESSFUL|E$\nเพิ่มความก้าวหน้าทางเทคโนโลยีของเป้าหมาย\n\n[owner.GetDisguiseState]"

 operation_increase_awareness:0 "เพิ่มการรับรู้"
 operation_increase_awareness_desc:0 "ถึงเวลาแล้วที่ [root.target.GetName] จะตระหนักว่าพวกเขาไม่ได้อยู่ลำพังในเอกภพ"
 operation_increase_awareness_on_success:0 "$IF_SUCCESSFUL|E$\nเพิ่มระดับการรับรู้ของ [root.target.GetName]\n\n[owner.GetDisguiseState]"

 operation_spread_disinformation:0 "เผยแพร่ข้อมูลเท็จ"
 operation_spread_disinformation_desc:0 "ความจริงนั้นอยู่ข้างนอก แต่ [root.target.GetName] ยังไม่พร้อมสำหรับมัน"
 operation_spread_disinformation_on_success:0 "$IF_SUCCESSFUL|E$\nลดระดับการรับรู้ของ [root.target.GetName]\n\n[owner.GetDisguiseState]"

 operation_infiltrate_hive:0 "แทรกซึมรัง"
 operation_infiltrate_hive_desc:0 "ด้วยการเข้ามาแทนที่โดรนแกนปมเชิงยุทธศาสตร์ จิตสำนึกของเราจะค่อยๆ กลืนรวมหน้าที่สำคัญของกลุ่มรังท้องถิ่น"
 operation_infiltrate_hive_on_success:0 "$IF_SUCCESSFUL|E$\nผนวกดาวเคราะห์พร้อมเพิ่มโดรนท้องถิ่นเข้าสู่จิตสำนึกของเรา\n\n[owner.GetDisguiseState]"

### Operation Events

 preftl_operation.1000.name:0 "[from.GetName]โอเปร่าพร้อม" # Operation name, i.e. 'Infiltrate Government'
 preftl_operation.1000.desc.okay:0 "ผู้นำ [target.GetSpeciesName] ที่มีความสำคัญทั้งหมดบน [target.capital_scope.GetName] ถูกแทนที่ด้วยสายลับของเราแล้ว ขณะนี้เซลล์แทรกซึมกำลังรวบรวมความพยายามของเราไว้บน [target.capital_scope.GetPlanetHabitat] ถึงเวลาลงมือแล้ว"
 preftl_operation.1000.desc.good:0 "เจ้าหน้าที่ลับของเราบน [target.capital_scope.GetName] มีจำนวนหลายพันคน และได้แทรกซึมเข้าไปในทุกภาคส่วนของ [root.target.capital_scope.GetPlanetHabitat] หลายคนได้ไต่ขึ้นสู่ตำแหน่งชั้นนำในลำดับชั้นท้องถิ่น และกำลังใช้อิทธิพลจากตำแหน่งของตนเพื่อเอื้อประโยชน์ให้เจ้าหน้าที่คนอื่นอยู่แล้ว"
 preftl_operation.1000.desc.poor:0 "แม้เจ้าหน้าที่ของเราบนพื้นผิว [target.capital_scope.GetName] จะมีจำนวนหลายพันคนแล้ว แต่ความคืบหน้ากลับเชื่องช้า ความพยายามโค่นล้มหนึ่งในชุมชนหลักที่ประกอบขึ้นเป็น [target.GetName] จบลงด้วยหายนะ และเจ้าหน้าที่ทุกคนที่เกี่ยวข้องเสียชีวิตหรือยุติตนเอง\n\nเป็นเพียงความพยายามอันกล้าหาญของเซลล์หลับเท่านั้นที่ป้องกันไม่ให้ทางการท้องถิ่นเก็บกู้ศพและเปิดโปงงานของเราบนดาวเคราะห์ได้"
 #preftl_operation.1001.name:1 "Shaping the Future"
 #preftl_operation.1001.desc:1 "Our operatives have successfully embedded themselves within the [infiltrated_country_species.GetAdj] political leadership. We now hold control over every world power, and can shape the future of [infiltrated_country_planet.GetName] to our will."
 #preftl_operation.1002.name:1 "Influencing Affairs"
 #preftl_operation.1002.desc:1 "Our operatives have covertly gained a foothold over the [infiltrated_country_species.GetAdj] political leadership. We are now in a position of great influence regarding the internal affairs of [infiltrated_country_planet.GetName]. The mission was a success."
 #preftl_operation.1003.name:1 "Minor Influence"
 #preftl_operation.1003.desc:1 "After a poor start, our operatives were able to infiltrate the governments of [infiltrated_country_planet.GetName]. We were unable to secure many high ranking roles within the political leadership, but we are now in a position to influence minor tactical decisions concerning the [infiltrated_country_species.GetName]."
#  observation.3008.desc:1 "While our agents have successfully replaced most of the local leaders on [root.target.GetSpeciesName], a stubborn few remain. A concerted effort is now underway to remove the last holdouts, but the date of our planned reveal will need to be pushed forward."
 preftl_operation.1005.name:0 "ขบวนต้อนรับ"
 preftl_operation.1005.desc:1 "หลังจากครอบงำผู้นำทางการเมืองของ [infiltrated_country_species.GetAdj] ได้อย่างสมบูรณ์ เซลล์แทรกซึมของเราก็ปูทางให้หน่วยติดต่อครั้งแรกอย่างเป็นทางการเดินทางมาถึง\n\nในพิธีการอันหรูหราที่จัดขึ้น ณ เมืองหลวงของดาวเคราะห์ ทูตการทูตของเรารับคำร้องที่ลงนามโดยผู้นำโลกทุกคนบน [infiltrated_country_planet.GetName] ด้วยความเมตตา เอกสารดังกล่าวเรียกร้องให้ผนวก [infiltrated_country_planet.GetPlanetHabitat] ของพวกเขาเข้าสู่ [root.GetName] โดยทันที บัดนี้ประชาชนผู้เปี่ยมความยินดีแน่นขนัดอยู่ตามท้องถนน ส่งเสียงโห่ร้องให้แก่ผู้มีพระคุณต่างดาวของตน"
 preftl_operation.1006.name:1 "การต้อนรับอย่างอบอุ่น"
 preftl_operation.1006.desc:1 "หลังจากตั้งหลักเหนือผู้นำทางการเมืองของ [infiltrated_country_species.GetAdj] ได้แล้ว เซลล์แทรกซึมของเราก็ปูทางให้หน่วยติดต่อครั้งแรกอย่างเป็นทางการเดินทางมาถึง ในพิธีอันเรียบง่ายที่เมืองหลวงของดาวเคราะห์ ทูตการทูตของเรารับคำร้องที่ลงนามโดยผู้นำโลกของ [infiltrated_country_planet.GetName] ด้วยความนอบน้อม เอกสารดังกล่าวระบุแผนการผนวก [infiltrated_country_planet.GetPlanetHabitat] ของพวกเขาเข้าสู่ [root.GetName] พลเมืองจำนวนมากยินดีต้อนรับผู้มีพระคุณต่างดาวกลุ่มใหม่ของพวกเขา"
 preftl_operation.1007.name:1 "การต้อนรับอันเย็นชา"
 preftl_operation.1007.desc:1 "หลังจากแทรกซึมผู้นำทางการเมืองของ [infiltrated_country_species.GetAdj] แล้ว เจ้าหน้าที่ของเราก็ได้วางรากฐานสำหรับการมาถึงของหน่วยติดต่อครั้งแรกอย่างเป็นทางการ จะไม่มีพิธีใดเพื่อฉลองการมาถึงของทูตการทูตของเรา อย่างไรก็ตาม เราได้บรรลุข้อตกลงกับผู้นำโลกของ [infiltrated_country_planet.GetName] แล้ว [infiltrated_country_planet.GetPlanetHabitat] ของพวกเขาจะถูกผนวกเข้าสู่ [root.GetName]"
 preftl_operation.1005.tt:0 "§Y[infiltrated_country_planet.GetName]§! และประชากรของมันเข้าร่วมกับ §Y[root.GetName]§!"
 preftl_operation.1008.name:0 "[From.GetName] ล้มเหลว"
 preftl_operation.1008.desc:0 "การแทรกซึมผู้นำทางการเมืองของ [infiltrated_country_species.GetAdj] ของเราไม่สมบูรณ์อย่างที่เราเคยเชื่อ หลังจากล้มเหลวในการแทรกซึมชาติหลักของพวกเขาในช่วงแรก เราจึงพยายามก่อรัฐประหารภายในอำนาจรองแห่งหนึ่ง แต่ถึงอย่างนั้น ประชาชนก็ไม่ต้องการเรา\n\nเราได้ถอนเจ้าหน้าที่ที่รอดชีวิตทั้งหมดออกจาก [infiltrated_country_planet.GetName] แล้ว ชาวพื้นเมืองจะต้องอยู่ในภาวะตื่นตัวไปอีกหลายปีแน่"
 preftl_operation.failed_annaxation.tt:0 "§Rเราจะไม่สามารถเริ่มภารกิจ §H[From.GetName]§! ใหม่ใดๆ ได้เป็นเวลา 5 ปี§!"
 attempted_infiltration:0 "ความพยายามแทรกซึม"

# Operation Indoctrinate Society
 preftl_operation.1015.name:1 "พร้อมเดินทาง[target.GetName]" # pre-FTL country name
 preftl_operation.1015.desc:1 "งานของเราในการมีอิทธิพลต่อผู้อยู่อาศัย [owner.GetPreFTLLower] บน [target.capital_scope.GetName] ได้มาถึงจุดสูงสุดแล้ว ขณะนี้เจ้าหน้าที่ของเราพร้อมจะนำค่านิยมทางวัฒนธรรมของเราไปมีอิทธิพลต่อสังคม [target.GetSpeciesAdj] แล้ว"

 preftl_operation.1016.name:1 "ชักจูงมวลชน"
 preftl_operation.1016.intro:0 "เวลาเพียงอย่างเดียวจะแสดงให้เห็นว่า ผลกระทบของเราอาจจะอยู่กับ§H[from.target.GetAdj]§!ไม่ว่าการคาดการณ์เริ่มต้นจะดูสัญญา[from.target.GetSpeciesNamePlural]ผู้ สนับสนุน ได้ รับ เอา แนว คิด ของ เรา ไว้ แล้ว ประหนึ่ง ว่า เป็น แนว คิด ของ ตน เอง." # used for both pre- and post-industrial societies
 preftl_operation.1016.intro.good:0 "งานของเราใน§H[from.target.GetName]§!สวยงาม ด้วยการจัดการอย่างรอบคอบของสตรีและสังคมมากขึ้น เราได้ส่งเสริมการเปลี่ยนแปลงทางวัฒนธรรมอย่างลึกซึ้ง" # used for both pre- and post-industrial societies
 preftl_operation.1016.intro.poor:0 "งานของเราใน§H[from.target.GetName]§!ไม่ ได้ ปราศจาก ข้อ ท้าทาย แต่ เรา ก็ ประสบ ผล สําเร็จ. แม้ ว่า ความ พยายาม ของ เรา ไม่ ได้ ดึงดูด ผู้ สนับสนุน ที่ เติบโต ใน บ้าน ตาม ที่ หวัง ไว้ เป็น ครั้ง แรก แต่ เรา ก็ ได้ รับ ผล ดี บาง อย่าง." # used for both pre- and post-industrial societies

 preftl_operation.1016.autho:0 "ผู้ดําเนินงานของเราอย่างไม่ลดละ บทเรียนของบรรพบุรุษอันรุ่งโรจน์ของเรา โดยการสร้างแบบจําลองดั้งเดิมของ[root.GetAdj] §Yเผด็จการ§!ชาวท้องถิ่นที่มีอิทธิพลจํานวนน้อย ที่ได้รับอํานาจให้ปกครองชุมชนเหล่านี้ - บางส่วนจะเจริญรุ่งเรือง ในขณะที่คนอื่นจะไม่ประสบความสําเร็จ ทุกคนจะทําหน้าที่เป็นบทเรียนที่น่าสนใจสําหรับ[from.target.GetSpeciesNamePlural]ในขณะที่พวกเขาพิจารณาการสั่งซื้อที่เหมาะสมทางสังคม" # pre-industrial societies only
 preftl_operation.1016.egali:0 "คนของเราเดินทางไกลและกว้างขวาง เข้าร่วมชุมชนท้องถิ่นในเรื่อง เช่น ความเสมอภาค และความยุติธรรม ถึงแม้ว่า[from.target.GetSpeciesAdj]ความ เข้าใจ ทาง การ เมือง ยัง คง อยู่ ใน วัย ทารก เรา ได้ ดล ใจ บาง คน ให้ รณรงค์ โต้ เถียง กัน มาก ขึ้น ใน หมู่ ประชาชน ของ ตน เอง. ด้วยปฏิบัติการ[from.GetName]ตอนนี้สรุป, เราปล่อยให้มันกับผู้สนับสนุนท้องถิ่นเช่นเหล่านี้เพื่อหาเส้นทางของตัวเองไปยัง§Yการ สืบ พันธุ์§!." # pre-industrial societies only
 preftl_operation.1016.mater:0 "กลุ่มปฏิบัติการของเรา - ทั้งหมดมีทักษะสูง ในศิลปะการโต้วาทีด้านการศึกษา - ทํางานเพื่อความกระจ่างของชุมชนทั่ว[from.target.capital_scope.GetPlanetHabitat]การ ปรับ เปลี่ยน บท เรียน แต่ ละ บท สําหรับ รูป แบบ ต่าง ๆ มาก มาย[from.target.GetSpeciesAdj]วัฒนธรรม ความ พยายาม ของ พวก เขา เกิด ผล ใน รูป ของ ร้าน เสริม สวย, งาน ศิลป์, และ สถาบัน การ ศึกษา. พวกนี้§Yนักวัสดุศาสตร์§!ตอนนี้เครื่องมือได้ถูกมอบให้[from.target.GetSpeciesNamePlural]." # pre-industrial societies only
 preftl_operation.1016.milit:0 "เกียรติยศ และ ความ สามารถ ได้ รับ การ ยกย่อง ใน หลาย แห่ง[from.target.GetSpeciesAdj]วัฒนธรรม เจ้าหน้าที่ของเรา - ปลอมตัวเป็นทหารรับจ้าง, กบฏ, และผู้จัดหาสินค้า ไปสู่สาเหตุทางทหาร - ประสบความสําเร็จในท้องถิ่นที่งดงาม ทั้งหมดตอนนี้ทําหน้าที่เป็นแรงบันดาลใจสําหรับมากขึ้น§Yการ ทหาร§! [from.target.GetName]." # used for both pre- and post-industrial societies
 preftl_operation.1016.pacif:0 "กลุ่มปฏิบัติการของเรา - ผู้เดินแบบที่มีฝีมือสูงทั้งหมด - ผสมกับชุมชนที่แตกต่างกัน แสดงถึงคุณค่าของ[root.GetAdj] §Yความไม่สงบ§!เป็นคําตอบสําหรับหลายๆคน[from.target.GetSpeciesAdj]ปัญหาสังคม อย่าง น้อย ที่ สุด สําหรับ การ ประชุม เหล่า นี้ ความ รุนแรง ไม่ ได้ เป็น ปฏิกิริยา แรก ของ พวก เขา อีก ต่อ ไป." # used for both pre- and post-industrial societies
 preftl_operation.1016.phile:0 "คนของเราใช้วิธีแบบโฮลีสติกส์ ส่งเสริมความอยากรู้อยากเห็น และแสดงความชื่นชมต่อวัฒนธรรมอื่น ในรูปแบบของเรื่องราว ศิลปะ และกิจกรรมของชุมชน ด้วยปฏิบัติการ[from.GetName]ตอนนี้สรุปแล้ว ลูกน้องของเราได้ทิ้งมันไว้ในท้องถิ่น§Yเซ โน ฟิ ลิส§!เพื่อให้การสนทนาเหล่านี้มีชีวิตอยู่ และดีกว่าเตรียม[from.target.GetName]สําหรับชีวิตในกาแล็กซี่ที่แตกต่างกัน" # used for both pre- and post-industrial societies
 preftl_operation.1016.phobe:0 "ขณะ ที่ มี แรง กระตุ้น ความ กลัว และ ความ ไม่ ไว้ วางใจ ก็ ได้ รับ การ สนับสนุน ง่าย ๆ แต่ ก็ ยาก ที่ จะ จัด การ. คนของเราระมัดระวังในการรับประกัน สุนทรพจน์และผลงานทางวัฒนธรรมของพวกเขา แสดงด้านบวกของการรักษาตัวเอง บทเรียนของพวกเขาตอนนี้ได้รับการดําเนินการขึ้นโดย[from.target.GetSpeciesAdj]แชมป์สําหรับ§Yความ กลัว§!ผลประโยชน์" # pre-industrial societies only
 preftl_operation.1016.spiri:0 "แนวทางสองแบบของเรา วางกลุ่มสายลับที่น่าหลงใหล กลุ่มหนึ่ง เป็นหัวหน้าของลัทธิและนิกายต่าง ๆ ที่ตั้งอยู่บนความเชื่อของชนพื้นเมือง ชุมชนเหล่านี้ของความสว่าง[from.target.GetSpeciesAdj]ตอนนี้ได้ยอมรับรูปแบบของ§Yลัทธิ วิญญาณ นิยม§!ซึ่งเป็นวัฒนธรรมของพวกเขา พวกเขาเดินเส้นทางของตัวเองไปยังพระเจ้า" # used for both pre- and post-industrial societies

 preftl_operation.1016.autho.desc:0 "มีเพียงเวลาเท่านั้นที่จะบอกได้ว่าอิทธิพลของเราต่อ §H[from.target.GetAdj]§! จะยั่งยืนเพียงใด แต่การคาดการณ์เบื้องต้นดูมีแนวโน้มดี ผู้สนับสนุนในหมู่ [from.target.GetSpeciesNamePlural] ได้นำแนวคิดของเราไปใช้อย่างกระตือรือร้นราวกับเป็นของตนเอง\n\nเจ้าหน้าที่ของเราใช้บทเรียนจากบรรพชนผู้ยิ่งใหญ่ของเราอย่างชำนาญ โดยสร้างแบบจำลองดั้งเดิมของ [root.GetAdj] §Y$ethic_authoritarian$§! ขึ้นมา คนท้องถิ่นผู้ทรงอิทธิพลเพียงไม่กี่คนได้รับอำนาจให้ปกครองชุมชนเหล่านี้ ซึ่งบางแห่งจะรุ่งเรือง ขณะที่บางแห่งจะไม่เป็นเช่นนั้น ทั้งหมดนี้จะเป็นบทเรียนอันทรงพลังแก่ [from.target.GetSpeciesNamePlural] ในขณะที่พวกเขาพิจารณาการจัดระเบียบสังคมที่เหมาะสม"
 preftl_operation.1016.egali.desc:0 "มีเพียงเวลาเท่านั้นที่จะบอกได้ว่าอิทธิพลของเราต่อ §H[from.target.GetAdj]§! จะยั่งยืนเพียงใด แต่การคาดการณ์เบื้องต้นดูมีแนวโน้มดี ผู้สนับสนุนในหมู่ [from.target.GetSpeciesNamePlural] ได้นำแนวคิดของเราไปใช้อย่างกระตือรือร้นราวกับเป็นของตนเอง\n\nเจ้าหน้าที่ของเราเดินทางไปไกลทั่วสารทิศ เข้าร่วมกับชุมชนท้องถิ่นในประเด็นอย่างความเท่าเทียมและความเป็นธรรม แม้ความเข้าใจทางการเมืองของ [from.target.GetSpeciesAdj] จะยังอยู่ในวัยเริ่มต้น แต่เราได้จุดประกายให้บางคนเริ่มรณรงค์เพื่อการถกเถียงเพิ่มเติมในหมู่ประชาชนของพวกเขาเอง เมื่อปฏิบัติการ [from.GetName] สิ้นสุดลง เราก็ปล่อยให้ผู้สนับสนุนท้องถิ่นเช่นนี้ค้นหาเส้นทางของตนเองสู่ §Y$ethic_egalitarian$§!"
 preftl_operation.1016.mater.desc:0 "มีเพียงเวลาเท่านั้นที่จะบอกได้ว่าอิทธิพลของเราต่อ §H[from.target.GetAdj]§! จะยั่งยืนเพียงใด แต่การคาดการณ์เบื้องต้นดูมีแนวโน้มดี ผู้สนับสนุนในหมู่ [from.target.GetSpeciesNamePlural] ได้นำแนวคิดของเราไปใช้อย่างกระตือรือร้นราวกับเป็นของตนเอง\n\nเจ้าหน้าที่คัดสรรของเรา ซึ่งล้วนมีทักษะสูงในการถกเถียงเชิงการศึกษา ได้ทำงานเพื่อจุดประกายความคิดให้กลุ่มชุมชนต่างๆ ทั่ว [from.target.capital_scope.GetPlanetHabitat] ด้วยการปรับบทเรียนแต่ละอย่างให้เข้ากับรูปแบบวัฒนธรรมอันหลากหลายของ [from.target.GetSpeciesAdj] ความพยายามของพวกเขาจึงออกผลเป็นงานเสวนา งานศิลป์ และสถาบันการศึกษา เครื่องมือแห่ง §Y$ethic_materialist$§! เหล่านี้ได้ถูกมอบแก่ [from.target.GetSpeciesNamePlural] แล้ว"
 preftl_operation.1016.milit.desc:0 "มีเพียงเวลาเท่านั้นที่จะบอกได้ว่าอิทธิพลของเราต่อ §H[from.target.GetAdj]§! จะยั่งยืนเพียงใด แต่การคาดการณ์เบื้องต้นดูมีแนวโน้มดี ผู้สนับสนุนในหมู่ [from.target.GetSpeciesNamePlural] ได้นำแนวคิดของเราไปใช้อย่างกระตือรือร้นราวกับเป็นของตนเอง\n\nเกียรติยศและความสามารถถูกยกย่องอย่างสูงในหลายวัฒนธรรมของ [from.target.GetSpeciesAdj] เจ้าหน้าที่ของเรา ซึ่งปลอมตัวเป็นทหารรับจ้าง กบฏ และผู้จัดหายุทโธปกรณ์ให้ฝ่ายทหาร ได้ทำให้คนท้องถิ่นตื่นตะลึงด้วยอาวุธพิธีการ แบบฝึกการรบอันวิจิตร และการปะทะที่จัดฉากขึ้นอย่างพิถีพิถันหลายครั้ง ทั้งหมดนี้ได้กลายเป็นแรงบันดาลใจให้ [from.target.GetName] มีความเป็น §Y$ethic_militarist$§! มากขึ้น"
 preftl_operation.1016.pacif.desc:0 "มีเพียงเวลาเท่านั้นที่จะบอกได้ว่าอิทธิพลของเราต่อ §H[from.target.GetAdj]§! จะยั่งยืนเพียงใด แต่การคาดการณ์เบื้องต้นดูมีแนวโน้มดี ผู้สนับสนุนในหมู่ [from.target.GetSpeciesNamePlural] ได้นำแนวคิดของเราไปใช้อย่างกระตือรือร้นราวกับเป็นของตนเอง\n\nเจ้าหน้าที่คัดสรรของเรา ซึ่งต่างก็เป็นผู้ไกล่เกลี่ยที่มีทักษะสูง ได้คลุกคลีกับชุมชนอันหลากหลาย พร้อมแสดงให้เห็นคุณค่าของ [root.GetAdj] §Y$ethic_pacifist$§! ว่าเป็นทางออกของปัญหาสังคมมากมายในหมู่ [from.target.GetSpeciesAdj] อย่างน้อยสำหรับชุมชนเหล่านี้ ความรุนแรงไม่ใช่คำตอบแรกของพวกเขาอีกต่อไป"
 preftl_operation.1016.phile.desc:0 "มีเพียงเวลาเท่านั้นที่จะบอกได้ว่าอิทธิพลของเราต่อ §H[from.target.GetAdj]§! จะยั่งยืนเพียงใด แต่การคาดการณ์เบื้องต้นดูมีแนวโน้มดี ผู้สนับสนุนในหมู่ [from.target.GetSpeciesNamePlural] ได้นำแนวคิดของเราไปใช้อย่างกระตือรือร้นราวกับเป็นของตนเอง\n\nเจ้าหน้าที่ของเราใช้แนวทางแบบองค์รวม ส่งเสริมความอยากรู้อยากเห็นและความชื่นชมต่อวัฒนธรรมอื่นให้มากขึ้นผ่านเรื่องเล่า ศิลปะ และกิจกรรมชุมชน เมื่อปฏิบัติการ [from.GetName] สิ้นสุดลง เจ้าหน้าที่ของเราจึงปล่อยให้ §Y$ethic_xenophile$§! ท้องถิ่นสานต่อบทสนทนาเหล่านี้ และเตรียม [from.target.GetName] ให้พร้อมยิ่งขึ้นสำหรับชีวิตในดาราจักรอันหลากหลาย"
 preftl_operation.1016.phobe.desc:0 "มีเพียงเวลาเท่านั้นที่จะบอกได้ว่าอิทธิพลของเราต่อ §H[from.target.GetAdj]§! จะยั่งยืนเพียงใด แต่การคาดการณ์เบื้องต้นดูมีแนวโน้มดี ผู้สนับสนุนในหมู่ [from.target.GetSpeciesNamePlural] ได้นำแนวคิดของเราไปใช้อย่างกระตือรือร้นราวกับเป็นของตนเอง\n\nความกลัวและความไม่ไว้วางใจเป็นแรงกระตุ้นที่ปลุกขึ้นได้ง่ายแต่ควบคุมได้ยาก เจ้าหน้าที่ของเราระมัดระวังอย่างยิ่งให้คำปราศรัยและงานวัฒนธรรมของพวกเขานำเสนอแง่ดีของการรักษาตัวเองไว้ เช่นเดียวกับที่สอนบทเรียนตรงไปตรงมาเกี่ยวกับอันตรายจากอิทธิพลของต่างดาว บทเรียนเหล่านี้ถูกรับช่วงต่อโดยผู้สนับสนุนผลประโยชน์แบบ §Y$ethic_xenophobe$§! ของ [from.target.GetSpeciesAdj] แล้ว"
 preftl_operation.1016.spiri.desc:0 "มีเพียงเวลาเท่านั้นที่จะบอกได้ว่าอิทธิพลของเราต่อ §H[from.target.GetAdj]§! จะยั่งยืนเพียงใด แต่การคาดการณ์เบื้องต้นดูมีแนวโน้มดี ผู้สนับสนุนในหมู่ [from.target.GetSpeciesNamePlural] ได้นำแนวคิดของเราไปใช้อย่างกระตือรือร้นราวกับเป็นของตนเอง\n\nแนวทางสองทางของเราวางเจ้าหน้าที่ผู้มีเสน่ห์กลุ่มหนึ่งให้เป็นหัวหน้าลัทธิและนิกายที่อิงกับศรัทธาพื้นเมืองหลากหลายแบบ ขณะที่อีกกลุ่มหนึ่งทำงานปกป้องขบวนการที่กำลังเติบโตเหล่านี้จากการแทรกแซงและการเยาะเย้ยทางการเมือง ชุมชนที่รู้แจ้งเหล่านี้ของ [from.target.GetSpeciesAdj] ได้ยอมรับรูปแบบหนึ่งของ §Y$ethic_spiritualist$§! ซึ่งเป็นของวัฒนธรรมตนเอง พวกเขากำลังก้าวเดินบนหนทางของตนสู่สิ่งศักดิ์สิทธิ์"
 preftl_operation.1017.autho.desc:0 "งานของเราใน §H[from.target.GetName]§! ดำเนินไปอย่างยอดเยี่ยม ด้วยการชักใยมีมทางวัฒนธรรมและจารีตสังคมอย่างระมัดระวัง เราได้กระตุ้นให้เกิดการเปลี่ยนแปลงทางวัฒนธรรมอย่างลึกซึ้ง จนแทบเชื่อได้ว่ามันเกิดขึ้นเองตามธรรมชาติ\n\nเจ้าหน้าที่ของเราใช้บทเรียนจากบรรพชนผู้ยิ่งใหญ่ของเราอย่างชำนาญ โดยสร้างแบบจำลองดั้งเดิมของ [root.GetAdj] §Y$ethic_authoritarian$§! ขึ้นมา คนท้องถิ่นผู้ทรงอิทธิพลเพียงไม่กี่คนได้รับอำนาจให้ปกครองชุมชนเหล่านี้ ซึ่งบางแห่งจะรุ่งเรือง ขณะที่บางแห่งจะไม่เป็นเช่นนั้น ทั้งหมดนี้จะเป็นบทเรียนอันทรงพลังแก่ [from.target.GetSpeciesNamePlural] ในขณะที่พวกเขาพิจารณาการจัดระเบียบสังคมที่เหมาะสม"
 preftl_operation.1017.egali.desc:0 "งานของเราใน §H[from.target.GetName]§! ดำเนินไปอย่างยอดเยี่ยม ด้วยการชักใยมีมทางวัฒนธรรมและจารีตสังคมอย่างระมัดระวัง เราได้กระตุ้นให้เกิดการเปลี่ยนแปลงทางวัฒนธรรมอย่างลึกซึ้ง จนแทบเชื่อได้ว่ามันเกิดขึ้นเองตามธรรมชาติ\n\nเจ้าหน้าที่ของเราเดินทางไปไกลทั่วสารทิศ เข้าร่วมกับชุมชนท้องถิ่นในประเด็นอย่างความเท่าเทียมและความเป็นธรรม แม้ความเข้าใจทางการเมืองของ [from.target.GetSpeciesAdj] จะยังอยู่ในวัยเริ่มต้น แต่เราได้จุดประกายให้บางคนเริ่มรณรงค์เพื่อการถกเถียงเพิ่มเติมในหมู่ประชาชนของพวกเขาเอง เมื่อปฏิบัติการ [from.GetName] สิ้นสุดลง เราก็ปล่อยให้ผู้สนับสนุนท้องถิ่นเช่นนี้ค้นหาเส้นทางของตนเองสู่ §Y$ethic_egalitarian$§!"
 preftl_operation.1017.mater.desc:0 "งานของเราใน §H[from.target.GetName]§! ดำเนินไปอย่างยอดเยี่ยม ด้วยการชักใยมีมทางวัฒนธรรมและจารีตสังคมอย่างระมัดระวัง เราได้กระตุ้นให้เกิดการเปลี่ยนแปลงทางวัฒนธรรมอย่างลึกซึ้ง จนแทบเชื่อได้ว่ามันเกิดขึ้นเองตามธรรมชาติ\n\nเจ้าหน้าที่คัดสรรของเรา ซึ่งล้วนมีทักษะสูงในการถกเถียงเชิงการศึกษา ได้ทำงานเพื่อจุดประกายความคิดให้กลุ่มชุมชนต่างๆ ทั่ว [from.target.capital_scope.GetPlanetHabitat] ด้วยการปรับบทเรียนแต่ละอย่างให้เข้ากับรูปแบบวัฒนธรรมอันหลากหลายของ [from.target.GetSpeciesAdj] ความพยายามของพวกเขาจึงออกผลเป็นงานเสวนา งานศิลป์ และสถาบันการศึกษา เครื่องมือแห่ง §Y$ethic_materialist$§! เหล่านี้ได้ถูกมอบแก่ [from.target.GetSpeciesNamePlural] แล้ว"
 preftl_operation.1017.milit.desc:0 "งานของเราใน §H[from.target.GetName]§! ดำเนินไปอย่างยอดเยี่ยม ด้วยการชักใยมีมทางวัฒนธรรมและจารีตสังคมอย่างระมัดระวัง เราได้กระตุ้นให้เกิดการเปลี่ยนแปลงทางวัฒนธรรมอย่างลึกซึ้ง จนแทบเชื่อได้ว่ามันเกิดขึ้นเองตามธรรมชาติ\n\nเกียรติยศและความสามารถถูกยกย่องอย่างสูงในหลายวัฒนธรรมของ [from.target.GetSpeciesAdj] เจ้าหน้าที่ของเรา ซึ่งปลอมตัวเป็นทหารรับจ้าง กบฏ และผู้จัดหายุทโธปกรณ์ให้ฝ่ายทหาร ได้ทำให้คนท้องถิ่นตื่นตะลึงด้วยอาวุธพิธีการ แบบฝึกการรบอันวิจิตร และการปะทะที่จัดฉากขึ้นอย่างพิถีพิถันหลายครั้ง ทั้งหมดนี้ได้กลายเป็นแรงบันดาลใจให้ [from.target.GetName] มีความเป็น §Y$ethic_militarist$§! มากขึ้น"
 preftl_operation.1017.pacif.desc:0 "งานของเราใน §H[from.target.GetName]§! ดำเนินไปอย่างยอดเยี่ยม ด้วยการชักใยมีมทางวัฒนธรรมและจารีตสังคมอย่างระมัดระวัง เราได้กระตุ้นให้เกิดการเปลี่ยนแปลงทางวัฒนธรรมอย่างลึกซึ้ง จนแทบเชื่อได้ว่ามันเกิดขึ้นเองตามธรรมชาติ\n\nเจ้าหน้าที่คัดสรรของเรา ซึ่งต่างก็เป็นผู้ไกล่เกลี่ยที่มีทักษะสูง ได้คลุกคลีกับชุมชนอันหลากหลาย พร้อมแสดงให้เห็นคุณค่าของ [root.GetAdj] §Y$ethic_pacifist$§! ว่าเป็นทางออกของปัญหาสังคมมากมายในหมู่ [from.target.GetSpeciesAdj] อย่างน้อยสำหรับชุมชนเหล่านี้ ความรุนแรงไม่ใช่คำตอบแรกของพวกเขาอีกต่อไป"
 preftl_operation.1017.phile.desc:0 "งานของเราใน §H[from.target.GetName]§! ดำเนินไปอย่างยอดเยี่ยม ด้วยการชักใยมีมทางวัฒนธรรมและจารีตสังคมอย่างระมัดระวัง เราได้กระตุ้นให้เกิดการเปลี่ยนแปลงทางวัฒนธรรมอย่างลึกซึ้ง จนแทบเชื่อได้ว่ามันเกิดขึ้นเองตามธรรมชาติ\n\nเจ้าหน้าที่ของเราใช้แนวทางแบบองค์รวม ส่งเสริมความอยากรู้อยากเห็นและความชื่นชมต่อวัฒนธรรมอื่นให้มากขึ้นผ่านเรื่องเล่า ศิลปะ และกิจกรรมชุมชน เมื่อปฏิบัติการ [from.GetName] สิ้นสุดลง เจ้าหน้าที่ของเราจึงปล่อยให้ §Y$ethic_xenophile$§! ท้องถิ่นสานต่อบทสนทนาเหล่านี้ และเตรียม [from.target.GetName] ให้พร้อมยิ่งขึ้นสำหรับชีวิตในดาราจักรอันหลากหลาย"
 preftl_operation.1017.phobe.desc:0 "งานของเราใน §H[from.target.GetName]§! ดำเนินไปอย่างยอดเยี่ยม ด้วยการชักใยมีมทางวัฒนธรรมและจารีตสังคมอย่างระมัดระวัง เราได้กระตุ้นให้เกิดการเปลี่ยนแปลงทางวัฒนธรรมอย่างลึกซึ้ง จนแทบเชื่อได้ว่ามันเกิดขึ้นเองตามธรรมชาติ\n\nความกลัวและความไม่ไว้วางใจเป็นแรงกระตุ้นที่ปลุกขึ้นได้ง่ายแต่ควบคุมได้ยาก เจ้าหน้าที่ของเราระมัดระวังอย่างยิ่งให้คำปราศรัยและงานวัฒนธรรมของพวกเขานำเสนอแง่ดีของการรักษาตัวเองไว้ เช่นเดียวกับที่สอนบทเรียนตรงไปตรงมาเกี่ยวกับอันตรายจากอิทธิพลของต่างดาว บทเรียนเหล่านี้ถูกรับช่วงต่อโดยผู้สนับสนุนผลประโยชน์แบบ §Y$ethic_xenophobe$§! ของ [from.target.GetSpeciesAdj] แล้ว"
 preftl_operation.1017.spiri.desc:0 "งานของเราใน §H[from.target.GetName]§! ดำเนินไปอย่างยอดเยี่ยม ด้วยการชักใยมีมทางวัฒนธรรมและจารีตสังคมอย่างระมัดระวัง เราได้กระตุ้นให้เกิดการเปลี่ยนแปลงทางวัฒนธรรมอย่างลึกซึ้ง จนแทบเชื่อได้ว่ามันเกิดขึ้นเองตามธรรมชาติ\n\nแนวทางสองทางของเราวางเจ้าหน้าที่ผู้มีเสน่ห์กลุ่มหนึ่งให้เป็นหัวหน้าลัทธิและนิกายที่อิงกับศรัทธาพื้นเมืองหลากหลายแบบ ขณะที่อีกกลุ่มหนึ่งทำงานปกป้องขบวนการที่กำลังเติบโตเหล่านี้จากการแทรกแซงและการเยาะเย้ยทางการเมือง ชุมชนที่รู้แจ้งเหล่านี้ของ [from.target.GetSpeciesAdj] ได้ยอมรับรูปแบบหนึ่งของ §Y$ethic_spiritualist$§! ซึ่งเป็นของวัฒนธรรมตนเอง พวกเขากำลังก้าวเดินบนหนทางของตนสู่สิ่งศักดิ์สิทธิ์"
 preftl_operation.1018.autho.desc:0 "งานของเราใน §H[from.target.GetName]§! ไม่ได้ราบรื่นไร้อุปสรรค แต่เราก็ประสบความสำเร็จ แม้ความพยายามของเราจะไม่ดึงดูดผู้สนับสนุนท้องถิ่นได้มากอย่างที่หวังไว้ในตอนแรก แต่เราก็ได้ผลลัพธ์เชิงบวกบางส่วน\n\nเจ้าหน้าที่ของเราใช้บทเรียนจากบรรพชนผู้ยิ่งใหญ่ของเราอย่างชำนาญ โดยสร้างแบบจำลองดั้งเดิมของ [root.GetAdj] §Y$ethic_authoritarian$§! ขึ้นมา คนท้องถิ่นผู้ทรงอิทธิพลเพียงไม่กี่คนได้รับอำนาจให้ปกครองชุมชนเหล่านี้ ซึ่งบางแห่งจะรุ่งเรือง ขณะที่บางแห่งจะไม่เป็นเช่นนั้น ทั้งหมดนี้จะเป็นบทเรียนอันทรงพลังแก่ [from.target.GetSpeciesNamePlural] ในขณะที่พวกเขาพิจารณาการจัดระเบียบสังคมที่เหมาะสม"
 preftl_operation.1018.egali.desc:0 "งานของเราใน §H[from.target.GetName]§! ไม่ได้ราบรื่นไร้อุปสรรค แต่เราก็ประสบความสำเร็จ แม้ความพยายามของเราจะไม่ดึงดูดผู้สนับสนุนท้องถิ่นได้มากอย่างที่หวังไว้ในตอนแรก แต่เราก็ได้ผลลัพธ์เชิงบวกบางส่วน\n\nเจ้าหน้าที่ของเราเดินทางไปไกลทั่วสารทิศ เข้าร่วมกับชุมชนท้องถิ่นในประเด็นอย่างความเท่าเทียมและความเป็นธรรม แม้ความเข้าใจทางการเมืองของ [from.target.GetSpeciesAdj] จะยังอยู่ในวัยเริ่มต้น แต่เราได้จุดประกายให้บางคนเริ่มรณรงค์เพื่อการถกเถียงเพิ่มเติมในหมู่ประชาชนของพวกเขาเอง เมื่อปฏิบัติการ [from.GetName] สิ้นสุดลง เราก็ปล่อยให้ผู้สนับสนุนท้องถิ่นเช่นนี้ค้นหาเส้นทางของตนเองสู่ §Y$ethic_egalitarian$§!"
 preftl_operation.1018.mater.desc:0 "งานของเราใน §H[from.target.GetName]§! ไม่ได้ราบรื่นไร้อุปสรรค แต่เราก็ประสบความสำเร็จ แม้ความพยายามของเราจะไม่ดึงดูดผู้สนับสนุนท้องถิ่นได้มากอย่างที่หวังไว้ในตอนแรก แต่เราก็ได้ผลลัพธ์เชิงบวกบางส่วน\n\nเจ้าหน้าที่คัดสรรของเรา ซึ่งล้วนมีทักษะสูงในการถกเถียงเชิงการศึกษา ได้ทำงานเพื่อจุดประกายความคิดให้กลุ่มชุมชนต่างๆ ทั่ว [from.target.capital_scope.GetPlanetHabitat] ด้วยการปรับบทเรียนแต่ละอย่างให้เข้ากับรูปแบบวัฒนธรรมอันหลากหลายของ [from.target.GetSpeciesAdj] ความพยายามของพวกเขาจึงออกผลเป็นงานเสวนา งานศิลป์ และสถาบันการศึกษา เครื่องมือแห่ง §Y$ethic_materialist$§! เหล่านี้ได้ถูกมอบแก่ [from.target.GetSpeciesNamePlural] แล้ว"
 preftl_operation.1018.milit.desc:0 "งานของเราใน §H[from.target.GetName]§! ไม่ได้ราบรื่นไร้อุปสรรค แต่เราก็ประสบความสำเร็จ แม้ความพยายามของเราจะไม่ดึงดูดผู้สนับสนุนท้องถิ่นได้มากอย่างที่หวังไว้ในตอนแรก แต่เราก็ได้ผลลัพธ์เชิงบวกบางส่วน\n\nเกียรติยศและความสามารถถูกยกย่องอย่างสูงในหลายวัฒนธรรมของ [from.target.GetSpeciesAdj] เจ้าหน้าที่ของเรา ซึ่งปลอมตัวเป็นทหารรับจ้าง กบฏ และผู้จัดหายุทโธปกรณ์ให้ฝ่ายทหาร ได้ทำให้คนท้องถิ่นตื่นตะลึงด้วยอาวุธพิธีการ แบบฝึกการรบอันวิจิตร และการปะทะที่จัดฉากขึ้นอย่างพิถีพิถันหลายครั้ง ทั้งหมดนี้ได้กลายเป็นแรงบันดาลใจให้ [from.target.GetName] มีความเป็น §Y$ethic_militarist$§! มากขึ้น"
 preftl_operation.1018.pacif.desc:0 "งานของเราใน §H[from.target.GetName]§! ไม่ได้ราบรื่นไร้อุปสรรค แต่เราก็ประสบความสำเร็จ แม้ความพยายามของเราจะไม่ดึงดูดผู้สนับสนุนท้องถิ่นได้มากอย่างที่หวังไว้ในตอนแรก แต่เราก็ได้ผลลัพธ์เชิงบวกบางส่วน\n\nเจ้าหน้าที่คัดสรรของเรา ซึ่งต่างก็เป็นผู้ไกล่เกลี่ยที่มีทักษะสูง ได้คลุกคลีกับชุมชนอันหลากหลาย พร้อมแสดงให้เห็นคุณค่าของ [root.GetAdj] §Y$ethic_pacifist$§! ว่าเป็นทางออกของปัญหาสังคมมากมายในหมู่ [from.target.GetSpeciesAdj] อย่างน้อยสำหรับชุมชนเหล่านี้ ความรุนแรงไม่ใช่คำตอบแรกของพวกเขาอีกต่อไป"
 preftl_operation.1018.phile.desc:0 "งานของเราใน §H[from.target.GetName]§! ไม่ได้ราบรื่นไร้อุปสรรค แต่เราก็ประสบความสำเร็จ แม้ความพยายามของเราจะไม่ดึงดูดผู้สนับสนุนท้องถิ่นได้มากอย่างที่หวังไว้ในตอนแรก แต่เราก็ได้ผลลัพธ์เชิงบวกบางส่วน\n\nเจ้าหน้าที่ของเราใช้แนวทางแบบองค์รวม ส่งเสริมความอยากรู้อยากเห็นและความชื่นชมต่อวัฒนธรรมอื่นให้มากขึ้นผ่านเรื่องเล่า ศิลปะ และกิจกรรมชุมชน เมื่อปฏิบัติการ [from.GetName] สิ้นสุดลง เจ้าหน้าที่ของเราจึงปล่อยให้ §Y$ethic_xenophile$§! ท้องถิ่นสานต่อบทสนทนาเหล่านี้ และเตรียม [from.target.GetName] ให้พร้อมยิ่งขึ้นสำหรับชีวิตในดาราจักรอันหลากหลาย"
 preftl_operation.1018.phobe.desc:0 "งานของเราใน §H[from.target.GetName]§! ไม่ได้ราบรื่นไร้อุปสรรค แต่เราก็ประสบความสำเร็จ แม้ความพยายามของเราจะไม่ดึงดูดผู้สนับสนุนท้องถิ่นได้มากอย่างที่หวังไว้ในตอนแรก แต่เราก็ได้ผลลัพธ์เชิงบวกบางส่วน\n\nความกลัวและความไม่ไว้วางใจเป็นแรงกระตุ้นที่ปลุกขึ้นได้ง่ายแต่ควบคุมได้ยาก เจ้าหน้าที่ของเราระมัดระวังอย่างยิ่งให้คำปราศรัยและงานวัฒนธรรมของพวกเขานำเสนอแง่ดีของการรักษาตัวเองไว้ เช่นเดียวกับที่สอนบทเรียนตรงไปตรงมาเกี่ยวกับอันตรายจากอิทธิพลของต่างดาว บทเรียนเหล่านี้ถูกรับช่วงต่อโดยผู้สนับสนุนผลประโยชน์แบบ §Y$ethic_xenophobe$§! ของ [from.target.GetSpeciesAdj] แล้ว"
 preftl_operation.1018.spiri.desc:0 "งานของเราใน §H[from.target.GetName]§! ไม่ได้ราบรื่นไร้อุปสรรค แต่เราก็ประสบความสำเร็จ แม้ความพยายามของเราจะไม่ดึงดูดผู้สนับสนุนท้องถิ่นได้มากอย่างที่หวังไว้ในตอนแรก แต่เราก็ได้ผลลัพธ์เชิงบวกบางส่วน\n\nแนวทางสองทางของเราวางเจ้าหน้าที่ผู้มีเสน่ห์กลุ่มหนึ่งให้เป็นหัวหน้าลัทธิและนิกายที่อิงกับศรัทธาพื้นเมืองหลากหลายแบบ ขณะที่อีกกลุ่มหนึ่งทำงานปกป้องขบวนการที่กำลังเติบโตเหล่านี้จากการแทรกแซงและการเยาะเย้ยทางการเมือง ชุมชนที่รู้แจ้งเหล่านี้ของ [from.target.GetSpeciesAdj] ได้ยอมรับรูปแบบหนึ่งของ §Y$ethic_spiritualist$§! ซึ่งเป็นของวัฒนธรรมตนเอง พวกเขากำลังก้าวเดินบนหนทางของตนสู่สิ่งศักดิ์สิทธิ์"

 preftl_operation.1019.name:0 "ชักจูงมวลชน"
 preftl_operation.1019.autho:0 "คนของเราใช้บทเรียนที่ส่งลงมาให้เราโดยอดีตที่รุ่งโรจน์ของเราสร้างแบบจําลองขนาดเล็กของ[root.GetAdj] §Yเผด็จการ§!บน[from.target.capital_scope.GetName]สถาบัน บาง แห่ง ได้ รับ การ ปรับ ปรุง ใหม่ จัด เตรียม หลาย อย่าง[from.target.GetSpeciesNamePlural]ออกแบบมาอย่างดี ชุมชน เหล่า นี้ ทั้ง หมด จะ ไม่ ยั่งยืน แต่ ความ ล้ม เหลว ของ พวก เขา จะ เป็น บท เรียน ที่ มี ค่า ทํา ให้ สังคม ของ พวก เขา มี ระเบียบ." # post-industrial societies only
 preftl_operation.1019.egali:0 "คนของเราเดินทางไกลและกว้างขวาง เข้าร่วมชุมชนและสถาบันต่างๆ ในเรื่องความเสมอภาคและความยุติธรรม[from.target.GetSpeciesAdj]วิทยาศาสตรวิทยาการการเมืองก็เป็นผู้ใหญ่แล้ว แต่เรามีการรณรงค์หลายครั้ง ซึ่งได้ผลักดันไปแล้วสําหรับการโต้แย้งแบบรวมและ§Yการแบ่งประเภท§!นโยบาย" # post-industrial societies only
 preftl_operation.1019.mater:0 "กลุ่มปฏิบัติการของเรา - ล้วนมีความเชี่ยวชาญสูงในศิลปะการโต้วาทีทางการศึกษา - ทํางานให้กับกลุ่มชุมชนและสถาบันการศึกษาต่างๆ[from.target.capital_scope.GetPlanetHabitat]ความ พยายาม ของ พวก เขา ได้ นํา ไป สู่ การ ก่อ ตั้ง ศูนย์ วิจัย, เงิน ทุน ทาง การ ศึกษา, และ แม้ แต่ ขบวนการ ศิลปะ ใหม่ ๆ. เครื่องมือเหล่านี้ของ§Yวัตถุนิยม§!ตอนนี้ได้รับมรดก[from.target.GetSpeciesNamePlural]." # post-industrial societies only
 preftl_operation.1019.phobe:0 "ความ กลัว และ ความ ไม่ ไว้ วางใจ ได้ รับ การ สนับสนุน อย่าง ง่าย ดาย แต่ เป็น เรื่อง ยาก ที่ จะ บังคับท้าย โดย เฉพาะ อย่าง ยิ่ง ใน สังคม ที่ มี สื่อมวลชน มาก มาย. คนของเราทํางานเล็กน้อย§Yความ กลัว§!สุนทรพจน์และการเคลื่อนไหวทางวัฒนธรรม ซึ่งแสดงด้านบวกของการรักษาตัวเอง มากเท่ากับที่พวกเขาสอนบทเรียน บทเรียนของพวกเขาตอนนี้ได้รับการดําเนินการขึ้นโดยบ้าน[from.target.GetSpeciesAdj]แชมป์และกลุ่มการเมือง" # post-industrial societies only

 preftl_operation.1019.autho.desc:0 "มีเพียงเวลาเท่านั้นที่จะบอกได้ว่าอิทธิพลของเราต่อ §H[from.target.GetAdj]§! จะยั่งยืนเพียงใด แต่การคาดการณ์เบื้องต้นดูมีแนวโน้มดี ผู้สนับสนุนในหมู่ [from.target.GetSpeciesNamePlural] ได้นำแนวคิดของเราไปใช้อย่างกระตือรือร้นราวกับเป็นของตนเอง\n\nเจ้าหน้าที่ของเราใช้บทเรียนที่สืบทอดมาจากบรรพชนผู้รุ่งโรจน์ของเรา โดยสร้างแบบจำลองขนาดย่อมของ [root.GetAdj] §Y$ethic_authoritarian$§! บน [from.target.capital_scope.GetName] สถาบันบางแห่งถูกปรับโครงสร้างใหม่ จัดวาง [from.target.GetSpeciesNamePlural] จำนวนมากไว้ในลำดับชั้นที่ออกแบบอย่างพิถีพิถัน ไม่ใช่ทุกชุมชนจะยืนยาว แต่ความล้มเหลวของพวกมันจะเป็นบทเรียนอันมีค่า ซึ่งช่วยเสริมระเบียบสังคมโดยรวมของพวกเขา"
 preftl_operation.1019.egali.desc:0 "มีเพียงเวลาเท่านั้นที่จะบอกได้ว่าอิทธิพลของเราต่อ §H[from.target.GetAdj]§! จะยั่งยืนเพียงใด แต่การคาดการณ์เบื้องต้นดูมีแนวโน้มดี ผู้สนับสนุนในหมู่ [from.target.GetSpeciesNamePlural] ได้นำแนวคิดของเราไปใช้อย่างกระตือรือร้นราวกับเป็นของตนเอง\n\nเจ้าหน้าที่ของเราเดินทางไปไกลทั่วทุกแห่ง เข้าร่วมกับชุมชนและสถาบันท้องถิ่นในประเด็นอย่างความเสมอภาคและความเป็นธรรม วิชาการเมืองของ [from.target.GetSpeciesAdj] นั้นค่อนข้างพัฒนาแล้ว แต่เราได้จุดชนวนการรณรงค์หลายอย่างซึ่งกำลังกดดันให้เกิดการถกเถียงที่ครอบคลุมมากขึ้นและนโยบายแบบ §Y$ethic_egalitarian$§!"
 preftl_operation.1019.mater.desc:0 "มีเพียงเวลาเท่านั้นที่จะบอกได้ว่าอิทธิพลของเราต่อ §H[from.target.GetAdj]§! จะยั่งยืนเพียงใด แต่การคาดการณ์เบื้องต้นดูมีแนวโน้มดี ผู้สนับสนุนในหมู่ [from.target.GetSpeciesNamePlural] ได้นำแนวคิดของเราไปใช้อย่างกระตือรือร้นราวกับเป็นของตนเอง\n\nเจ้าหน้าที่คัดสรรของเรา ซึ่งล้วนชำนาญด้านการถกเถียงเชิงการศึกษา ได้ทำงานเพื่อจุดประกายความคิดให้กลุ่มชุมชนและสถาบันการศึกษาทั่ว [from.target.capital_scope.GetPlanetHabitat] ความพยายามของพวกเขานำไปสู่การก่อตั้งศูนย์วิจัย กองทุนการศึกษา และแม้แต่ขบวนการศิลปะแบบใหม่ เครื่องมือแห่ง §Y$ethic_materialist$§! เหล่านี้ได้ถูกส่งมอบแก่ [from.target.GetSpeciesNamePlural] แล้ว"
 preftl_operation.1019.milit.desc:0 "มีเพียงเวลาเท่านั้นที่จะบอกได้ว่าอิทธิพลของเราต่อ §H[from.target.GetAdj]§! จะยั่งยืนเพียงใด แต่การคาดการณ์เบื้องต้นดูมีแนวโน้มดี ผู้สนับสนุนในหมู่ [from.target.GetSpeciesNamePlural] ได้นำแนวคิดของเราไปใช้อย่างกระตือรือร้นราวกับเป็นของตนเอง\n\nเกียรติยศและความสามารถถูกยกย่องอย่างสูงในหลายวัฒนธรรมของ [from.target.GetSpeciesAdj] เจ้าหน้าที่ของเรา ซึ่งปลอมตัวเป็นทหารรับจ้าง กบฏ และผู้จัดหายุทโธปกรณ์ให้ฝ่ายทหาร ได้ทำให้คนท้องถิ่นตื่นตะลึงด้วยอาวุธพิธีการ แบบฝึกการรบอันวิจิตร และการปะทะที่จัดฉากขึ้นอย่างพิถีพิถันหลายครั้ง ทั้งหมดนี้ได้กลายเป็นแรงบันดาลใจให้ [from.target.GetName] มีความเป็น §Y$ethic_militarist$§! มากขึ้น"
 preftl_operation.1019.pacif.desc:0 "มีเพียงเวลาเท่านั้นที่จะบอกได้ว่าอิทธิพลของเราต่อ §H[from.target.GetAdj]§! จะยั่งยืนเพียงใด แต่การคาดการณ์เบื้องต้นดูมีแนวโน้มดี ผู้สนับสนุนในหมู่ [from.target.GetSpeciesNamePlural] ได้นำแนวคิดของเราไปใช้อย่างกระตือรือร้นราวกับเป็นของตนเอง\n\nเจ้าหน้าที่คัดสรรของเรา ซึ่งต่างก็เป็นผู้ไกล่เกลี่ยที่มีทักษะสูง ได้คลุกคลีกับชุมชนอันหลากหลาย พร้อมแสดงให้เห็นคุณค่าของ [root.GetAdj] §Y$ethic_pacifist$§! ว่าเป็นทางออกของปัญหาสังคมมากมายในหมู่ [from.target.GetSpeciesAdj] อย่างน้อยสำหรับชุมชนเหล่านี้ ความรุนแรงไม่ใช่คำตอบแรกของพวกเขาอีกต่อไป"
 preftl_operation.1019.phile.desc:0 "มีเพียงเวลาเท่านั้นที่จะบอกได้ว่าอิทธิพลของเราต่อ §H[from.target.GetAdj]§! จะยั่งยืนเพียงใด แต่การคาดการณ์เบื้องต้นดูมีแนวโน้มดี ผู้สนับสนุนในหมู่ [from.target.GetSpeciesNamePlural] ได้นำแนวคิดของเราไปใช้อย่างกระตือรือร้นราวกับเป็นของตนเอง\n\nเจ้าหน้าที่ของเราใช้แนวทางแบบองค์รวม ส่งเสริมความอยากรู้อยากเห็นและความชื่นชมต่อวัฒนธรรมอื่นให้มากขึ้นผ่านเรื่องเล่า ศิลปะ และกิจกรรมชุมชน เมื่อปฏิบัติการ [from.GetName] สิ้นสุดลง เจ้าหน้าที่ของเราจึงปล่อยให้ §Y$ethic_xenophile$§! ท้องถิ่นสานต่อบทสนทนาเหล่านี้ และเตรียม [from.target.GetName] ให้พร้อมยิ่งขึ้นสำหรับชีวิตในดาราจักรอันหลากหลาย"
 preftl_operation.1019.phobe.desc:0 "มีเพียงเวลาเท่านั้นที่จะบอกได้ว่าอิทธิพลของเราต่อ §H[from.target.GetAdj]§! จะยั่งยืนเพียงใด แต่การคาดการณ์เบื้องต้นดูมีแนวโน้มดี ผู้สนับสนุนในหมู่ [from.target.GetSpeciesNamePlural] ได้นำแนวคิดของเราไปใช้อย่างกระตือรือร้นราวกับเป็นของตนเอง\n\nความกลัวและความไม่ไว้วางใจนั้นปลุกขึ้นได้ง่าย แต่ยากจะบังคับทิศทาง โดยเฉพาะในสังคมที่เข้าถึงสื่อมวลชน เจ้าหน้าที่ของเราใช้วิธีการอันละเอียดอ่อน ปลูกฝังคำปราศรัยและขบวนการวัฒนธรรมแบบ §Y$ethic_xenophobe$§! ที่เน้นแง่ดีของการปกป้องตนเอง ขณะเดียวกันก็สอนบทเรียนอันตรงไปตรงมาเกี่ยวกับอันตรายของอิทธิพลจากต่างดาว บทเรียนเหล่านี้ถูกรับช่วงต่อโดยผู้สนับสนุนและกลุ่มการเมืองพื้นถิ่นของ [from.target.GetSpeciesAdj] แล้ว"
 preftl_operation.1019.spiri.desc:0 "มีเพียงเวลาเท่านั้นที่จะบอกได้ว่าอิทธิพลของเราต่อ §H[from.target.GetAdj]§! จะยั่งยืนเพียงใด แต่การคาดการณ์เบื้องต้นดูมีแนวโน้มดี ผู้สนับสนุนในหมู่ [from.target.GetSpeciesNamePlural] ได้นำแนวคิดของเราไปใช้อย่างกระตือรือร้นราวกับเป็นของตนเอง\n\nแนวทางสองทางของเราวางเจ้าหน้าที่ผู้มีเสน่ห์กลุ่มหนึ่งให้เป็นหัวหน้าลัทธิและนิกายที่อิงกับศรัทธาพื้นเมืองหลากหลายแบบ ขณะที่อีกกลุ่มหนึ่งทำงานปกป้องขบวนการที่กำลังเติบโตเหล่านี้จากการแทรกแซงและการเยาะเย้ยทางการเมือง ชุมชนที่รู้แจ้งเหล่านี้ของ [from.target.GetSpeciesAdj] ได้ยอมรับรูปแบบหนึ่งของ §Y$ethic_spiritualist$§! ซึ่งเป็นของวัฒนธรรมตนเอง พวกเขากำลังก้าวเดินบนหนทางของตนสู่สิ่งศักดิ์สิทธิ์"
 preftl_operation.1020.autho.desc:0 "งานของเราใน §H[from.target.GetName]§! ดำเนินไปอย่างยอดเยี่ยม ด้วยการชักใยมีมทางวัฒนธรรมและจารีตสังคมอย่างระมัดระวัง เราได้กระตุ้นให้เกิดการเปลี่ยนแปลงทางวัฒนธรรมอย่างลึกซึ้ง จนแทบเชื่อได้ว่ามันเกิดขึ้นเองตามธรรมชาติ\n\nเจ้าหน้าที่ของเราใช้บทเรียนที่สืบทอดมาจากบรรพชนผู้รุ่งโรจน์ของเรา โดยสร้างแบบจำลองขนาดย่อมของ [root.GetAdj] §Y$ethic_authoritarian$§! บน [from.target.capital_scope.GetName] สถาบันบางแห่งถูกปรับโครงสร้างใหม่ จัดวาง [from.target.GetSpeciesNamePlural] จำนวนมากไว้ในลำดับชั้นที่ออกแบบอย่างพิถีพิถัน ไม่ใช่ทุกชุมชนจะยืนยาว แต่ความล้มเหลวของพวกมันจะเป็นบทเรียนอันมีค่า ซึ่งช่วยเสริมระเบียบสังคมโดยรวมของพวกเขา"
 preftl_operation.1020.egali.desc:0 "งานของเราใน §H[from.target.GetName]§! ดำเนินไปอย่างยอดเยี่ยม ด้วยการชักใยมีมทางวัฒนธรรมและจารีตสังคมอย่างระมัดระวัง เราได้กระตุ้นให้เกิดการเปลี่ยนแปลงทางวัฒนธรรมอย่างลึกซึ้ง จนแทบเชื่อได้ว่ามันเกิดขึ้นเองตามธรรมชาติ\n\nเจ้าหน้าที่ของเราเดินทางไปไกลทั่วทุกแห่ง เข้าร่วมกับชุมชนและสถาบันท้องถิ่นในประเด็นอย่างความเสมอภาคและความเป็นธรรม วิชาการเมืองของ [from.target.GetSpeciesAdj] นั้นค่อนข้างพัฒนาแล้ว แต่เราได้จุดชนวนการรณรงค์หลายอย่างซึ่งกำลังกดดันให้เกิดการถกเถียงที่ครอบคลุมมากขึ้นและนโยบายแบบ §Y$ethic_egalitarian$§!"
 preftl_operation.1020.mater.desc:0 "งานของเราใน §H[from.target.GetName]§! ดำเนินไปอย่างยอดเยี่ยม ด้วยการชักใยมีมทางวัฒนธรรมและจารีตสังคมอย่างระมัดระวัง เราได้กระตุ้นให้เกิดการเปลี่ยนแปลงทางวัฒนธรรมอย่างลึกซึ้ง จนแทบเชื่อได้ว่ามันเกิดขึ้นเองตามธรรมชาติ\n\nเจ้าหน้าที่คัดสรรของเรา ซึ่งล้วนชำนาญด้านการถกเถียงเชิงการศึกษา ได้ทำงานเพื่อจุดประกายความคิดให้กลุ่มชุมชนและสถาบันการศึกษาทั่ว [from.target.capital_scope.GetPlanetHabitat] ความพยายามของพวกเขานำไปสู่การก่อตั้งศูนย์วิจัย กองทุนการศึกษา และแม้แต่ขบวนการศิลปะแบบใหม่ เครื่องมือแห่ง §Y$ethic_materialist$§! เหล่านี้ได้ถูกส่งมอบแก่ [from.target.GetSpeciesNamePlural] แล้ว"
