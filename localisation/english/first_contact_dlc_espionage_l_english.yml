 espionage_pre_ftl_indoctrination_xenophile:0 "การเปลี่ยนแปลงทางสังคม"
 espionage_pre_ftl_indoctrination_xenophile_desc:0 "บางส่วนของสังคมนี้เพิ่งเปลี่ยนมุมมองทางการเมืองของตน และยอมรับแนวคิดใหม่ที่สำคัญ"
 espionage_pre_ftl_indoctrination_xenophobe:0 "การเปลี่ยนแปลงทางสังคม"
 espionage_pre_ftl_indoctrination_xenophobe_desc:0 "บางส่วนของสังคมนี้เพิ่งเปลี่ยนมุมมองทางการเมืองของตน และยอมรับแนวคิดใหม่ที่สำคัญ"

# Operation Increase Awareness
 preftl_operation.1025.name:1 "[this.GetName]พร้อมจะเปิดเผย" # Operation name, i.e. 'Increase Awareness'
 preftl_operation.1025.desc:1 "การเตรียมการของเราบน [target.capital_scope.GetName] เสร็จสิ้นแล้ว ขณะนี้เจ้าหน้าที่ของเราพร้อมจะพา [target.GetName] ก้าวขึ้นไปอีกขั้นสู่เวทีกาแล็กซี"
 preftl_operation.1026.name:0 "ข้างนอกนั่นมีชีวิตอยู่หรือไม่?"
 preftl_operation.1026.desc.intro:0 "ด้วยการกระทำของเจ้าหน้าที่ของเรา [this.GetSpeciesNamePlural] กำลังหันมามองท้องฟ้ายามค่ำคืนด้วยความสนใจครั้งใหม่"
 preftl_operation.1026.desc.low:1 "จากเรื่องเล่าที่เราเผยแพร่ [this.GetSpeciesNamePlural] กำลังหันสายตาขึ้นสู่ท้องฟ้า พวกเขาเริ่มตั้งคำถามว่าในเอกภพอาจมีสิ่งมีชีวิตทรงปัญญาอื่นอยู่ท่ามกลางแสงของดาวดวงอื่นหรือไม่"
 preftl_operation.1026.desc.medium:1 "$preftl_operation.1026.desc.intro$ พวกเขากระซิบเล่าเรื่องที่แทบไม่มีใครเชื่อ ว่ามีแสงลึกลับบนท้องฟ้าและผู้มาเยือนจากโลกที่อยู่นอกหมู่ดาว... เรื่องเล่าที่มีเค้าความจริงอยู่บ้าง"
 preftl_operation.1026.desc.high:1 "$preftl_operation.1026.desc.intro$ เมื่อพิจารณาจากข้อเท็จจริงที่วางอยู่เบื้องหน้า หลายคนเชื่อมั่นว่าพวกเขาไม่ได้อยู่ลำพังในเอกภพ พวกเขาเชื่อว่าหลักฐานอยู่แค่เอื้อม และการค้นพบมันเป็นเพียงเรื่องของเวลา"
 preftl_operation.1026.desc.full:1 "ด้วยความพยายามของเรา ผู้อยู่อาศัยบน [this.capital_scope.GetName] จึงรู้โดยปราศจากข้อสงสัยว่าพวกเขาไม่ได้อยู่ลำพังในเอกภพ พวกเขาพร้อมจะได้รับการติดต่อโดยไม่เสี่ยงต่อความตื่นตระหนกอย่างรุนแรงต่อวิถีชีวิตของตน"

 # Good and Great Outcomes
 preftl_operation.1027.name:0 "ข้างนอกนั่นมีชีวิต"
 preftl_operation.1027.desc.intro:0 "ด้วยผลงานอันชำนาญของเจ้าหน้าที่ของเรา [this.GetSpeciesNamePlural] กำลังมองสู่ท้องฟ้าด้วยความหลงใหลอย่างไม่รู้จักพอ"
 preftl_operation.1027.desc.low:0 "$preftl_operation.1027.desc.intro$\n\nด้วยแรงบันดาลใจและความยินดีจากเรื่องเล่าที่เจ้าหน้าที่ของเราเผยแพร่ [this.GetSpeciesNamePlural] กำลังหันมองท้องฟ้า พวกเขากำลังคาดเดาอย่างเปิดเผยถึงการมีอยู่ของสิ่งมีชีวิตทรงปัญญาอื่นในเอกภพ"
 preftl_operation.1027.desc.medium:0 "$preftl_operation.1027.desc.intro$\n\nพวกเขาแบ่งปันเรื่องราวอย่างตื่นเต้นเกี่ยวกับแสงลึกลับบนท้องฟ้าและผู้มาเยือนจากโลกที่อยู่นอกหมู่ดาว หลายคนเชื่ออย่างถูกต้องว่าเรื่องเหล่านั้นคือความจริง"
 preftl_operation.1027.desc.high:0 "$preftl_operation.1027.desc.intro$\n\nหลายคนมั่นใจแล้วว่าพวกเขาไม่ได้อยู่ลำพังในเอกภพ พวกเขารู้ว่าหลักฐานอยู่ใกล้เพียงเอื้อม และการค้นพบมันเป็นเพียงเรื่องของเวลา"
 preftl_operation.1027.desc.full:0 "$preftl_operation.1027.desc.intro$\n\nความพยายามอย่างกล้าหาญของเจ้าหน้าที่ในเครือข่ายสอดแนมของเราได้ช่วยให้ผู้อยู่อาศัยบน [this.capital_scope.GetName] เข้าใจว่าพวกเขาไม่ได้อยู่ลำพังในเอกภพ ตอนนี้พวกเขาพร้อมและเต็มใจที่จะได้รับการติดต่อ โดยไม่เสี่ยงต่อความตื่นตระหนกทางวัฒนธรรมระหว่างดวงดาว"

 # Poor Outcome
 preftl_operation.1028.name:0 "ข้างนอกนั่นไม่มีอะไร"
 preftl_operation.1028.desc.intro:0 "การกระทำของเจ้าหน้าที่ของเราทำให้ [this.GetSpeciesNamePlural] หวาดกลัวท้องฟ้ายามค่ำคืน"
 preftl_operation.1028.desc.low:0 "$preftl_operation.1028.desc.intro$\n\nด้วยความหวาดหวั่นจากเรื่องเล่าที่เจ้าหน้าที่ของเราเผยแพร่ [this.GetSpeciesNamePlural] จึงเงยหน้ามองขึ้นไปด้วยความหวาดระแวงอย่างยิ่ง พวกเขาเริ่มถามตนเองว่าในเอกภพอาจมีสิ่งมีชีวิตทรงปัญญาอื่นซ่อนตัวอยู่ในความมืดหรือไม่"
 preftl_operation.1028.desc.medium:0 "$preftl_operation.1028.desc.intro$\n\nพวกเขาเล่าเรื่องผีสางด้วยน้ำเสียงแผ่วเบาเกี่ยวกับแสงลึกลับบนท้องฟ้าและผู้รุกรานจากโลกที่อยู่นอกหมู่ดาว"
 preftl_operation.1028.desc.high:0 "$preftl_operation.1028.desc.intro$\n\nหลายคนเริ่มกังวลว่าพวกเขาไม่ได้อยู่ลำพังในเอกภพ พวกเขาเชื่อว่าความจริงนั้นอยู่ข้างนอก แต่ไม่ค่อยสนใจจะตามหามัน"
 preftl_operation.1028.desc.full:0 "$preftl_operation.1028.desc.intro$\n\nความพยายามของเจ้าหน้าที่ในเครือข่ายสอดแนมของเราได้ทำให้ผู้อยู่อาศัยบน [this.capital_scope.GetName] เข้าใจว่าพวกเขาไม่ได้อยู่ลำพังในเอกภพ ขณะนี้สามารถติดต่อพวกเขาได้โดยไม่เสี่ยงต่ออาการช็อกรุนแรง"

 preftl_operation.1035.name:0 "ข้างนอกนั่นมีชีวิตอยู่หรือไม่?"
 preftl_operation.1035.desc:0 "$role_spymaster$ [spynetwork.leader.GetName] ได้สรุปผลของปฏิบัติการปกปิดการมีอยู่ของชีวิตระหว่างดวงดาวบน [target.capital_scope.GetName] ให้เราแล้ว"

# Operation Spread Disinformation
 # Standard conclusion
 preftl_operation.1036.name:0 "เผยแพร่ข้อมูลเท็จบน [from.target.GetName]"
 preftl_operation.1036.desc.intro:0 "ความพยายามของเจ้าหน้าที่เราบน §H[this.capital_scope.GetName]§! ได้สร้างความคลางแคลงต่อหลักฐานการมีอยู่ของชีวิตต่างดาวที่พบจนถึงขณะนี้"
 preftl_operation.1036.desc.none:0 "$preftl_operation.1036.desc.intro$ เรื่องเล่าเกี่ยวกับผู้มาเยือนระหว่างดวงดาวกำลังถูกมองว่าเป็นภาพหลอนของชนกลุ่มน้อยผู้หวาดระแวง"
 preftl_operation.1036.desc.low:0 "$preftl_operation.1036.desc.intro$ [this.GetSpeciesNamePlural] ยังยังกระซิบเรื่องการมีอยู่ของต่างดาว แต่มีเพียงไม่กี่คนที่เชื่อเรื่องเหล่านี้จริงๆ"
 preftl_operation.1036.desc.medium:0 "$preftl_operation.1036.desc.intro$ แม้ผู้มีอำนาจบางคนอาจสงสัยถึงการมีอยู่ของเรา แต่ความลับนี้ยังคงถูกซ่อนจากสาธารณชน"
 # Great conclusion
 preftl_operation.1037.name:0 "ข้อมูลเท็จสำเร็จบน [from.target.GetName]"
 preftl_operation.1037.desc.intro:0 "เจ้าหน้าที่ผู้เชี่ยวชาญของเราบน §H[this.capital_scope.GetName]§! ได้ขจัดการคาดเดาเกี่ยวกับหลักฐานของอารยธรรมที่เดินทางในอวกาศแล้ว"
 preftl_operation.1037.desc.none:0 "$preftl_operation.1037.desc.intro$ การเล่าเรื่องต่างดาวในตอนนี้เป็นหนทางลัดสู่การถูกผลักไสว่าเป็นคนนอกผู้หลงเพ้อ"
 preftl_operation.1037.desc.low:0 "$preftl_operation.1037.desc.intro$ มี [this.GetSpeciesNamePlural] เพียงไม่กี่คนที่แม้แต่จะพิจารณาความเป็นไปได้ของสิ่งมีชีวิตจากดาวดวงอื่น"
 preftl_operation.1037.desc.medium:0 "$preftl_operation.1037.desc.intro$ แม้ผู้มีอำนาจบางคนอาจสงสัยถึงการมีอยู่ของเรา แต่พวกเขารู้ดีเกินกว่าจะพูดในที่สาธารณะถึงสิ่งที่คนทั่วไปจะมองว่าไร้สาระ"
 # Good conclusion
 preftl_operation.1038.name:0 "เผยแพร่ข้อมูลเท็จบน [from.target.GetName]"
 preftl_operation.1038.desc.intro:0 "เจ้าหน้าที่ของเราบน §H[this.capital_scope.GetName]§! ได้ลดการคาดเดาเกี่ยวกับหลักฐานของอารยธรรมที่เดินทางในอวกาศลงอย่างมาก"
 preftl_operation.1038.desc.none:0 "$preftl_operation.1038.desc.intro$ การเล่าเรื่องต่างดาวตอนนี้ถูกมองว่าเป็นความประหลาดที่น่ารังเกียจจนควรถูกหลีกเลี่ยง"
 preftl_operation.1038.desc.low:0 "$preftl_operation.1038.desc.intro$ มี [this.GetSpeciesNamePlural] เพียงไม่กี่คนที่ใส่ใจจะพิจารณาความเป็นไปได้ของชีวิตต่างดาว"
 preftl_operation.1038.desc.medium:0 "$preftl_operation.1038.desc.intro$ แม้ผู้มีอำนาจบางคนอาจสงสัยถึงการมีอยู่ของเรา แต่ก็น่าจะไม่พูดถึงเรื่องเช่นนั้นในที่สาธารณะ"
 # Poor conclusion
 preftl_operation.1039.name:1 "ความน่าผิดหวังของข้อมูลเท็จบน [from.target.GetName]"
 preftl_operation.1039.desc.intro:0 "เจ้าหน้าที่ของเราบน §H[this.capital_scope.GetName]§! ทำงานได้ไม่ดีนักในการเผยแพร่ความสงสัยเกี่ยวกับการมีอยู่ของชีวิตต่างดาว"
 preftl_operation.1039.desc.none:0 "$preftl_operation.1036.desc.intro$ ความนิยมของเรื่องเล่าเกี่ยวกับผู้มาเยือนระหว่างดวงดาวกำลังเพิ่มขึ้นอย่างรวดเร็ว"
 preftl_operation.1039.desc.low:0 "$preftl_operation.1036.desc.intro$ [this.GetSpeciesNamePlural] ยังคงพูดถึงการมีอยู่ของต่างดาวอย่างเปิดเผย และหลายคนเชื่อว่าเรื่องเหล่านี้เป็นความจริง"
 preftl_operation.1039.desc.medium:0 "$preftl_operation.1036.desc.intro$ ผู้มีอำนาจต่างพูดอย่างเปิดเผยถึงผู้มาเยือนจากหมู่ดาว พวกเขาแทบจะแน่ใจแล้วว่าเรามีอยู่จริง"

 preftl_operation.1041.name:0 "ขบวนต้อนรับ"
 preftl_operation.1041.desc:0 "เจ้าหน้าที่ของเรารายงานว่าความพยายามในการยกระดับเทคโนโลยีของ §H[root.target.GetName]§! กำลังดำเนินไปตามแผน"

 preftl_operation.1045.name:0 "[from.GetName]พร้อม" # Operation name, i.e. Plant Advanced Knowledge
 preftl_operation.1045.desc:0 "เจ้าหน้าที่ของเราได้ทำทุกอย่างที่ทำได้แล้ว โดยหว่านเมล็ดแห่งความก้าวหน้าทางเทคโนโลยีเล็กๆ น้อยๆ ลงในสังคม [from.target.GetSpeciesAdj] ตอนนี้ขึ้นอยู่กับคนท้องถิ่นแล้วว่าจะเชื่อมโยงจุดต่างๆ และประกอบขั้นเล็กเหล่านี้ให้กลายเป็นก้าวที่ใหญ่ขึ้น พวกเขาพร้อมที่สุดเท่าที่จะพร้อมได้แล้ว"

 preftl_operation.1046.name:0 "[from.target.GetName]: ก้าวกระโดดครั้งใหญ่"
 preftl_operation.1046.desc:0 "สำเร็จ! เทคโนโลยีและความรู้ที่เราหว่านลงในสังคม [from.target.GetSpeciesAdj] ได้เบ่งบาน ผลักดันอารยธรรมของพวกเขาให้ก้าวหน้าขึ้นอย่างมากจากภายใน มีเพียงเวลาเท่านั้นที่จะบอกได้ว่าผลกระทบระยะยาวจะเป็นอย่างไร แต่ในตอนนี้เจ้าหน้าที่ของเรารายงานว่ามีทั้งความปรารถนาดีและความรุ่งเรืองอย่างมากอยู่บน [from.target.capital_scope.GetName]"

 preftl_operation.1047.name:0 "[from.target.GetName]: ก้าวกระโดดที่สำคัญ"
 preftl_operation.1047.desc:0 "เจ้าหน้าที่ของเรารายงานผลลัพธ์อันดีบน [from.target.capital_scope.GetName]! เทคโนโลยีและความรู้ที่เราหว่านลงในสังคม [from.target.GetSpeciesAdj] ได้ออกผล ดันอารยธรรมของพวกเขาเข้าใกล้การมีส่วนร่วมในระดับดาราจักรมากขึ้น มีเพียงเวลาเท่านั้นที่จะบอกได้ว่าผลกระทบระยะยาวจะเป็นอย่างไร แต่ในตอนนี้เจ้าหน้าที่ของเรารายงานถึงความรุ่งเรืองที่เพิ่มขึ้นบนโลก [from.owner.GetPreFTLLower]"

 preftl_operation.1048.name:0 "[from.target.GetName]: ความก้าวหน้ามั่นคง"
 preftl_operation.1048.desc:0 "เจ้าหน้าที่ของเรารายงานว่าความพยายามของเราในการมอบความรู้แจ้งแก่ผู้อยู่อาศัยบน [from.target.capital_scope.GetName] ได้สิ้นสุดลงอย่างสำเร็จ เทคโนโลยีและความรู้ที่เราแนะนำเข้าสู่สังคม [from.target.GetSpeciesAdj] ได้หยั่งราก ทำให้อารยธรรมของพวกเขาเข้าใกล้การเอื้อมถึงดวงดาวมากขึ้นอีกเล็กน้อย"

 preftl_operation.1049.name:0 "[from.target.GetName]: ความถดถอย"
 preftl_operation.1049.desc:0 "เราประสบความสำเร็จเพียงบางส่วนในการมอบความรู้แจ้งแก่ผู้อยู่อาศัยบน [from.target.capital_scope.GetName] แม้จะมีอุปสรรคอยู่บ้าง แต่เราก็ยังสามารถส่งเสริมความก้าวหน้าทางเทคโนโลยีขั้นพื้นฐานได้ และมั่นใจว่าสังคม [from.target.GetSpeciesAdj] จะรุ่งเรืองในที่สุด อย่างไรก็ตาม อารยธรรมของพวกเขาอาจไม่สามารถไปถึงดวงดาวได้เร็วหรือราบรื่นอย่างที่เราหวังไว้ในตอนแรก"

 preftl_operation.1060.name:0 "[from.GetName]โหนดย่อย" # Operation name, i.e. 'Infiltrate Government'
 preftl_operation.1060.desc.okay:0 "เราได้ค่อยๆ กลืนรวมศูนย์ปมสำคัญหลายแห่งจาก [target.GetSpeciesNamePlural] ท้องถิ่นบน [target.capital_scope.GetName] เป้าหมายคือทำให้รังท้องถิ่นพึ่งพาเราในกิจกรรมประจำวันมากขึ้นเรื่อยๆ จนกว่าเราจะผนวกโลกของพวกเขาได้อย่างแนบเนียน ขณะนี้เซลล์แทรกซึมกำลังรวบรวมความพยายามของเราไว้บน [target.capital_scope.GetPlanetHabitat] ถึงเวลาลงมือแล้ว"
 preftl_operation.1060.desc.good:0 "การแทรกซึม [target.capital_scope.GetName] ของเราใกล้จะสมบูรณ์แล้ว เพราะเราได้กลืนรวมโหนดในทุกภาคส่วนทั่ว [root.target.capital_scope.GetPlanetHabitat] เราเข้าควบคุมกิจกรรมประจำวันจำนวนมากของโลกนี้แล้ว อีกไม่นานเราจะพร้อมผสานพวกเขาเข้ามาอย่างเต็มรูปแบบ"
 preftl_operation.1060.desc.poor:0 "แม้เราจะควบคุมศูนย์ปมจำนวนมากบนพื้นผิว [target.capital_scope.GetName] ได้แล้ว แต่ความคืบหน้ากลับเชื่องช้า ความพยายามที่จะกลืนรวมรังทวีปหลักแห่งหนึ่งอย่างสมบูรณ์ลงเอยด้วยหายนะ และเจ้าหน้าที่ภาคพื้นทั้งหมดของเราถูกขับไล่ออกไป\n\nเป็นเพราะแผนสำรองหลายชั้นของเราเท่านั้นที่โดรนรีไซเคิลไม่สามารถเก็บกู้ซากและเปิดโปงงานของเราบนดาวเคราะห์ได้"
 preftl_operation.1065.name:0 "เราคือหนึ่งเดียว"
 preftl_operation.1065.desc:0 "หลังจากครอบงำจิตใจของ [infiltrated_country_species.GetAdj] ได้อย่างสมบูรณ์ เราก็เร่งให้แน่ใจว่าไม่มีโดรนตัวใดถูกทิ้งไว้เบื้องหลัง\n\nจิตสำนึกของ [infiltrated_country_species.GetName] ไม่ได้หายไป แต่ถูกดูดกลืนรวม จิตของเราจะเอื้อมลึกออกไปในอวกาศยิ่งกว่าเดิม หนึ่งเดียว"
 preftl_operation.1066.name:0 "การควบคุมอย่างมั่นคง"
 preftl_operation.1066.desc:0 "หลังจากได้รับอิทธิพลระดับวิกฤตเหนือจิตของ [infiltrated_country_species.GetAdj] แล้ว ศูนย์ปมของเราก็เตรียมพร้อมให้เราเข้าควบคุมโดยตรง ด้วยปัญหาความเบี่ยงเบนเพียงเล็กน้อย ตอนนี้เราได้ผนวก [infiltrated_country_planet.GetPlanetHabitat] เข้าสู่ [root.GetName] อย่างสมบูรณ์แล้ว"
 preftl_operation.1067.name:0 "การผนวกโดยฝืนใจ"
 preftl_operation.1067.desc:0 "หลังจากแทรกซึมจิตรวมหมู่ของ [infiltrated_country_species.GetAdj] แล้ว ศูนย์ปมที่เรากลืนรวมไว้ก็พร้อมจะกลืน [infiltrated_country_planet.GetPlanetHabitat] ที่เหลือทั้งหมด ขณะที่เราเข้าควบคุม มีทวีปเล็กๆ แห่งหนึ่งต่อต้านอิทธิพลของเรา โดยเลือกยุติการดำรงอยู่แทนที่จะถูกรวมเข้าสู่จิตของเรา [infiltrated_country_planet.GetPlanetHabitat] ของพวกเขาจะถูกผนวกเข้าสู่ [root.GetName]"
 preftl_operation.1068.name:0 "[From.GetName] ล้มเหลว"
 preftl_operation.1068.desc:0 "จิตรวมหมู่ของ [infiltrated_country_species.GetAdj] ได้ค้นพบอิทธิพลของเราแล้ว พอดีกับที่เราพร้อมจะเปิดใช้งานศูนย์ปมที่เรากลืนรวมไว้ เรากลับถูกตัดขาดจากรังที่เหลือของพวกเขา หลังจากรื้อถอนภารกิจของเราอย่างรวดเร็ว เราจำต้องประกาศว่าปฏิบัติการ [from.GetName] ล้มเหลว ประชากรชนชั้น [infiltrated_country_species.GetClass] ตอนนี้อยู่ในภาวะตื่นตัวสูงต่อการแทรกแซงจากภายนอกทุกชนิด"

### Random event chains

# Sorcery!
 preftl_operation.3000.name:0 "เวทมนตร์!"
 preftl_operation.3000.desc:0 "ความพยายามของเราในการมีอิทธิพลต่อ [from.target.GetSpeciesNamePlural] บน [from.target.capital_scope.GetName] กำลังเผชิญกับความหวาดระแวงในวงกว้าง คนท้องถิ่นจำนวนมากพยายามทุกวิถีทางเพื่อหลีกเลี่ยงเจ้าหน้าที่ของเรา เพราะเชื่อว่าพวกเขาเป็นสิ่งมีชีวิตแห่งมนตราหรือไม่ก็วิญญาณชั่วร้าย การประท้วงอย่างเป็นศัตรูดูมีแนวโน้มสูงมาก"
 preftl_operation.3000.a:0 "ใช้ประโยชน์จากมัน"
 preftl_operation.3000.b:0 "ระวังตัว ย้ายไปพื้นที่อื่น"
 preftl_operation.3000.c:0 "ท้าทายความเชื่อของพวกเขา!"

 preftl_operation.3001.name:0 "เวทมนตร์: ปฏิเสธไม่ได้"
 preftl_operation.3001.desc:0 "เจ้าหน้าที่ของเราใช้ประโยชน์จากชื่อเสียงเหนือโลกของตน และทำให้ชัดเจนว่าใช่ พวกเขาเหนือกว่าคนท้องถิ่น ผลก็คือ [from.target.GetSpeciesNamePlural] ถูกโน้มน้าวให้ยอมรับเทคโนโลยีของเรา อย่างไรก็ตาม ตอนนี้พวกเขาตระหนักถึงการมีอยู่ของสิ่งมีชีวิตเหนือธรรมชาติเช่นเราเพิ่มมากขึ้น"

 preftl_operation.3002.name:0 "เวทมนตร์: ถูกโน้มน้าว"
 preftl_operation.3002.desc:0 "เจ้าหน้าที่ของเราประสบความสำเร็จในการท้าทายโครงสร้างความเชื่อใหม่อันงมงายของสังคม [from.target.GetSpeciesAdj] ด้วยข้อเท็จจริงและตรรกะที่หนักแน่น ผลลัพธ์คือคนท้องถิ่นไม่เพียงเริ่มยอมรับแผนการของเรา แต่ยังเริ่มมองโลกที่อยู่รอบตัวพวกเขาอย่างเป็นกลางมากขึ้นด้วย"

 preftl_operation.3003.name:0 "เวทมนตร์: ประหาร"
 preftl_operation.3003.desc:0 "โศกนาฏกรรมได้เกิดขึ้นบน [from.target.capital_scope.GetName] เมื่อฝูงชนที่โกรธแค้นจับตัวและสังหารเจ้าหน้าที่ของเราคนหนึ่ง ผู้นำท้องถิ่นและผู้อยู่อาศัยต่างเดือดดาลต่อสิ่งที่พวกเขามองว่าเป็นการบุกรุกโดยผู้ใช้มนตราเหนือธรรมชาติผู้มีเจตนาร้าย ภารกิจในการเตรียม [from.target.GetName] ให้พร้อมสำหรับยุคใหม่จึงยากขึ้นกว่าเดิม"

# Pariah
 preftl_operation.3010.name:1 "คนนอกคอก"
 preftl_operation.3010.desc:1 "เราเคยคิดว่าเราเข้าใจวัฒนธรรมของ [from.target.GetSpeciesAdj] ดีพอจนเจ้าหน้าที่ของเราจะกลมกลืนทางสังคมได้ แต่หลายคนกลับกำลังประสบปัญหา คนท้องถิ่นดูจะกันพวกเขาออกไป ไม่เชิญเจ้าหน้าที่ของเราเข้าสู่งานสังคม หรือแม้แต่กิจกรรมทางวัฒนธรรมในชีวิตประจำวันบางอย่าง\n\nยิ่งนานวันก็ยิ่งยากที่จะโน้มน้าวให้ใครสักคนยอมรับเรา ไม่ต้องพูดถึงการบรรลุเป้าหมายของปฏิบัติการ [from.GetName] ด้วยสมดุลทางสังคมอันเปราะบางที่กำลังเป็นเดิมพัน เราควรพิจารณาก้าวต่อไปอย่างรอบคอบ"
 preftl_operation.3010.a:1 "หรือพวกเขาจะตอบสนองต่อความมั่งคั่ง?"
 preftl_operation.3010.b:1 "ลองใช้วิธีที่แหวกแนวกว่านี้"
 preftl_operation.3010.c:1 "ทุ่มเวลาให้การศึกษาวัฒนธรรมของพวกเขามากขึ้น"

 preftl_operation.3011.name:0 "ไม่ใช่คนนอกอีกต่อไป"
 preftl_operation.3011.desc:0 "ผู้คนบน [from.target.capital_scope.GetName] ชื่นชอบเรา! หรือพูดให้ถูกคือ เจ้าหน้าที่ของเราไม่ต้องดิ้นรนเพื่อให้เข้ากับสังคมอีกต่อไป แต่กลับได้รับการต้อนรับอย่างอบอุ่นไม่ว่าพวกเขาจะไปที่ใด ดูเหมือนว่าเราเคยพลาดความขัดแย้งอันละเอียดอ่อนแต่สำคัญของวัฒนธรรม [from.target.GetSpeciesAdj] ไป แม้ว่าสังคมของพวกเขาจะส่งเสริมความสม่ำเสมออย่างเปิดเผย แต่ลึกๆ แล้วพวกเขากลับชื่นชมการแสดงออกแบบไม่ยอมอยู่ในกรอบที่เด่นชัด\n\nตอนนี้เจ้าหน้าที่ของเราถูกยกระดับเป็นผู้นำเทรนด์แล้ว เรายินดีจะรายงานว่าปฏิบัติการ [from.GetName] กำลังดำเนินไปอย่างราบรื่นกว่าที่เคย"

 preftl_operation.3012.name:0 "ผู้ถูกขับไล่"
 preftl_operation.3012.desc:0 "รายละเอียดอันละเอียดอ่อนของวัฒนธรรม [from.target.GetSpeciesAdj] ยังคงหลบเลี่ยงความเข้าใจของเรา และที่แย่กว่านั้นคือ ตอนนี้เจ้าหน้าที่ของเราบางคนถูกเนรเทศจากการล่วงละเมิดบรรทัดฐานทางสังคมล่าสุด [from.target.GetSpeciesNamePlural] กลายเป็นผู้คนที่อนุรักษนิยมและหวาดระแวงมากกว่าที่เราเคยคิดไว้ในตอนแรก\n\nความผิดพลาดทางสังคมเหล่านี้ทำให้ความคืบหน้าของเราในปฏิบัติการ [from.GetName] ล่าช้า อย่างน้อยเราก็ได้เรียนรู้ว่าอะไรที่ไม่ควรทำในอนาคต ตัวตนใหม่และระเบียบการฝึกฝนกำลังถูกจัดทำขึ้นแล้ว เจ้าหน้าที่ของเราจะไม่พลาดแบบเดิมซ้ำอีก"
 operation_pariahs:0 "คนนอกคอก"
 operation_pariahs_desc:0 "เจ้าหน้าที่ของเราหลายคนถูกผลักไสออกจากสังคมท้องถิ่น หลังทำพลาดกับบรรทัดฐานทางวัฒนธรรมบางอย่าง ทรัพยากรที่เหลือของเรากำลังตึงมือ"

## Distracted Agent
 preftl_operation.3020.name:0 "วอกแวก"
 preftl_operation.3020.desc:0 "หนึ่งในเจ้าหน้าที่หลักของเราที่ทำงานอยู่บน [from.target.capital_scope.GetName] ได้เกิด... หลงใหลในอารยธรรมท้องถิ่น และเริ่มปฏิเสธภารกิจที่ได้รับมอบหมายหลายอย่าง แทนที่จะทำงานตามคำสั่ง เจ้าหน้าที่ผู้เป็นตัวของตัวเองเกินไปคนนี้กลับหันไปศึกษาชาติพันธุ์วิทยาต่างดาวอย่างอิสระ และส่งคำร้องมากมายเพื่อให้ตำแหน่งนี้กลายเป็นหน้าที่อย่างเป็นทางการ\n\nแม้การกระทำเหล่านี้จะเสี่ยงทำให้ปฏิบัติการ [from.GetName] ล่าช้า แต่เราต้องยอมรับว่างานของเจ้าหน้าที่ผู้หัวแข็งผู้นี้ได้พิสูจน์แล้วว่ามีประโยชน์ต่อเราไม่น้อย หากปฏิเสธความพยายามนี้ ความคืบหน้าของเราจะช้าลง"
 preftl_operation.3020.a:0 "ระเบียบวินัยต้องถูกรักษาไว้"
 preftl_operation.3020.b:0 "ความริเริ่มเช่นนี้ควรได้รับคำชม!"
 operation_no_more_distractions:0 "ไม่มีสิ่งรบกวนอีก"
 operation_no_more_distractions_desc:0 "เราไม่ได้รับประโยชน์จากข้อมูลเชิงลึกด้านชาติพันธุ์วิทยาที่มอบให้โดยเจ้าหน้าที่ผู้เสียสมาธิและควบคุมยากอีกต่อไป"
 observation_distraction_insights:0 "การศึกษาลับอย่างอิสระ"
 observation_distraction_insights_desc:0 "อดีตสายลับคนหนึ่งได้นำข้อมูลเชิงลึกที่ลึกลับอย่างยิ่งมาใช้ในการศึกษาวัฒนธรรมนี้ของเรา"

## Mimicry
 preftl_operation.3030.name:0 "การเลียนแบบ"
 preftl_operation.3030.desc:0 "งานของเราบน [from.target.capital_scope.GetName] ได้พบกับภาวะแทรกซ้อนที่ไม่ปกติ: รังของ [from.target.GetSpeciesAdj] กำลังเลียนแบบพฤติกรรมของเรา ในตอนแรกเราคิดว่าโดรนท้องถิ่นเพียงแค่ทำตัวประหลาด แต่พฤติกรรมใหม่หลายอย่างกลับมีลักษณะของ [from.owner.GetSpeciesAdj] อย่างชัดเจนจนปฏิเสธไม่ได้\n\nสิ่งนี้ไม่เพียงชี้ว่าเรากำลังมีอิทธิพลต่อรังนอกเหนือจากขอบเขตที่วางแผนไว้อย่างรอบคอบของปฏิบัติการ [from.GetName] เท่านั้น แต่ความล้มเหลวของเราเองในการกลมกลืนยังสะท้อนกลับมาหาเราด้วย ยังไม่มีสัญญาณว่ารังจะรู้ถึงปฏิบัติการของเรา แต่ก็คงเป็นเพียงเรื่องของเวลา"
 preftl_operation.3030.a:0 "งั้นพวกมันก็ดูจะ... ถูกชักนำได้มากขึ้น?"
 preftl_operation.3030.b:0 "เราต้องระวังให้มากกว่านี้"
 preftl_operation.3030.b.tt:0 "จัดสรรทรัพยากรเพิ่มเพื่อควบคุมสัญชาตญาณและกิริยาท่าทางของเจ้าหน้าที่ของเราให้อยู่หมัด"
 preftl_operation.3030.c:0 "เรามุ่งมั่นจะไปให้สุดทาง"
 preftl_operation.3030.d:0 "ถอนตัวและยุติภารกิจ"
 spynetwork_hive_mimicry:0 "ผู้เลียนแบบที่ชักจูงได้"
 spynetwork_hive_mimicry_desc:0 "รังนี้เริ่มเลียนแบบพฤติกรรมของเราแล้ว และโดรนของมันได้สร้างความเข้ากันได้เชิงสัญชาตญาณกับเจ้าหน้าที่ของเรา"
 espionage_hive_mimicry:0 "เปิดโปงผ่านการเลียนแบบ"
 espionage_hive_mimicry_desc:0 "รังนี้ติดนิสัยเลียนแบบพฤติกรรมที่ปกติแล้วเป็นสิ่งแปลกปลอมต่อมัน มีความเสี่ยงว่าสิ่งนี้จะช่วยให้มันสังเกตอิทธิพลจากภายนอกได้ง่ายขึ้น"

## Academic Shenanigans (note only some of these strings refer to the intended event ID, preftl_operation.3040)
 preftl_operation.1100.name:0 "แสวงหาทางวิชาการ"
 preftl_operation.1100.desc:1 "ด้วยอาวุธคือองค์ความรู้ที่เหนือกว่าของเรา เจ้าหน้าที่ของเราบน [from.target.capital_scope.GetName] ได้แทรกซึมมหาวิทยาลัยท้องถิ่น สถาปนาตนเองเป็นนักคิดผู้ปราดเปรื่องที่มีชื่อเสียงจากทฤษฎีอันบุกเบิก แต่ความสำเร็จที่เพิ่มขึ้นของพวกเขากลับถูกนักวิชาการท้องถิ่นมองด้วยความสงสัย หลายคนปฏิเสธที่จะข้องเกี่ยวกับพวกเขา พร้อมกล่าวหาว่าเป็นพวกต้มตุ๋น\n\nการทะเลาะทางวิชาการที่ไม่รู้จบนี้ทำให้สายลับของเราเผยแพร่แนวคิดใหม่ได้ยาก $role_spymaster$ ของเรากำลังร้องขอคำสั่งเพิ่มเติม"
 preftl_operation.1100.a:0 "กำจัดคู่แข่ง"
 preftl_operation.1100.b:1 "ติดสินบนนักวิชาการพวกนี้ด้วยของหัวรุนแรงสักหน่อย: เงินทุน"
 preftl_operation.1100.c:0 "ปล่อยให้พวกเขาเถียงกันไป เรื่องนี้อาจน่าสนใจ"

 preftl_operation.1101.name:0 "อุบัติเหตุเกิดขึ้นได้..."
 preftl_operation.3041.desc:0 "$preftl_operation.3042.desc$\n\nน่าเสียดายที่กลอุบายของเราขาดความแนบเนียน และทำให้เกิดความสงสัยอย่างมากต่อเจ้าหน้าที่ของเรา คนส่วนใหญ่ถูกกีดกันออกจากวงวิชาการ [from.target.GetSpeciesAdj] และตำแหน่งว่างของพวกเขาก็ถูกเติมเต็มโดยนักคิดที่อนุรักษนิยมกว่าทันที"
 preftl_operation.3042.desc:0 "มีนักวิชาการหลายคนที่ต่อต้านทฤษฎีของเจ้าหน้าที่ของเรา ต้องออกจากตําแหน่งในสัปดาห์หลังๆนี้\"อุบัติเหตุ\"" # note this forms the first paragraph for preftl_operation.3041
 preftl_operation.3042.a:0 "ยอดเยี่ยม นั่นคือช่องทางของเรา"

 preftl_operation.1103.name:0 "ให้ทุนวิจัย"
 preftl_operation.3043.desc:0 "ความพยายามของเราในการติดสินบนบรรดานักวิชาการผู้คัดค้านบน [from.target.capital_scope.GetName] ถูกค้นพบและรายงานในทันที กระบวนการยุติธรรมท้องถิ่นตอบสนองอย่างรวดเร็ว เจ้าหน้าที่ของเราหลายคนถูกตัดออกจากวงวิชาการ และตำแหน่งว่างของพวกเขาก็ถูกแทนที่ด้วยนักคิด [from.target.GetSpeciesAdj] ที่อนุรักษนิยมกว่าทันที"
 operation_academic_bribery_caught:0 "ถูกตัดสินว่าติดสินบน"
 operation_academic_bribery_caught_desc:0 "ความคืบหน้าของปฏิบัติการจารกรรมนี้ชะลอตัวลงหลังจากเจ้าหน้าที่ของเราถูกจับได้และถูกตัดสินว่ามีความผิดฐานติดสินบน"
 preftl_operation.3044.desc:0 "ด้วยความเอื้อเฟื้อของผู้สนับสนุนที่ไม่เปิดเผยชื่อ นักวิชาการท้องถิ่นจึงสามารถหาเงินทุนสำหรับงานวิจัยของตนได้ เป็นโชคที่ไม่คาดคิดซึ่งทำให้แทบไม่มีเวลาเหลือสำหรับการแก่งแย่งเล็กๆ น้อยๆ\n\nความรุ่งเรืองครั้งใหม่นี้นำมาซึ่งตำแหน่งทางวิชาการใหม่ๆ ซึ่งถูกเติมเต็มอย่างรวดเร็วด้วยเจ้าหน้าที่ของเราเพิ่มมากขึ้น อิทธิพลของเราที่มีต่อวงวิชาการ [from.target.GetSpeciesAdj] จึงยิ่งแน่นแฟ้น และทำให้การเผยแพร่แนวคิดของเราง่ายขึ้นอีกเล็กน้อย"
 operation_academic_bribery:0 "ติดสินบนสำเร็จ"
 operation_academic_bribery_desc:0 "ความคืบหน้าของปฏิบัติการจารกรรมนี้ราบรื่นขึ้น หลังเราเงียบเสียงคู่แข่งทางวิชาการของเจ้าหน้าที่เราด้วยการสนับสนุนเงินทุนวิจัยให้พวกเขา"

 preftl_operation.1105.name:0 "การถกเถียงไม่รู้จบ"
 preftl_operation.3045.desc:0 "ความขัดแย้งทางวิชาการที่ดูจะไม่มีวันสิ้นสุดบน [from.target.capital_scope.GetName] กลับกลายเป็นอุปสรรคมากกว่าโอกาส เจ้าหน้าที่ของเราไม่สามารถตั้งหลักในสถาบันวัฒนธรรมหลักใดๆ ของ [from.target.capital_scope.GetPlanetHabitat] ได้เลย บางทีแนวคิดที่เราพยายามแนะนำอาจจะขัดแย้งเกินไปสำหรับช่วงเวลานี้"
 preftl_operation.3046.desc:0 "โอกาสอันเหมาะเจาะมาถึงเราแล้ว! ระหว่างการถกเถียงกับนักคิดท้องถิ่น เจ้าหน้าที่ของเราใน [from.target.GetName] กลับถูกผลักขึ้นสู่เวทีอันทรงเกียรติสูงส่งโดยคู่แข่งที่แข็งกร้าวที่สุดของพวกเขาเอง ผลก็คือ แนวคิดของเราถูกนำเสนอแล้วต่อหน้าตัวแทนของสถาบันการศึกษาที่ได้รับความเคารพสูงสุดบน [from.target.capital_scope.GetName]\n\nองค์กรเหล่านี้ไม่เพียงเข้าใจแนวคิดของเรา แต่ยังเริ่มขัดเกลามันต่อ กลายเป็นสิ่งที่ไม่คาดคิดอย่างยิ่ง: ข้อมูลเชิงลึกใหม่ ที่เกิดขึ้นได้จากการแลกเปลี่ยนความคิดอันสับสนวุ่นวาย"

## Spymaster Exposed / Blackmail
 preftl_operation.3050.name:0 "[from.spynetwork.leader.GetName] ถูกเปิดโปง"
 preftl_operation.3050.desc:0 "เกิดการรั่วไหลร้ายแรงขึ้น! $role_spymaster$ [from.spynetwork.leader.GetName] ถูกเปิดโปงระหว่างการเยือนพื้นผิว [from.target.capital_scope.GetName] อย่างลับๆ รายละเอียดบางอย่างยังไม่ชัดเจนในตอนนี้ แต่ [from.spynetwork.leader.GetHeShe] ได้สัมผัสโดยตรงกับชาวพื้นเมือง [from.target.GetSpeciesName] คนหนึ่งในช่วงเวลาสั้นๆ และอีกฝ่ายก็หนีไปในทันที เจ้าหน้าที่ของเราพยายามติดตามและจับกุมพยานรายนี้ แต่จนถึงตอนนี้ยังไม่สำเร็จ\n\nปฏิบัติการ [from.GetName] ยังคงดำเนินต่อไปในตอนนี้ แต่เราได้เปิดใช้มาตรการพิเศษจนกว่าจะควบคุมการรั่วไหลนี้ได้"
 preftl_operation.3050.a:0 "ดี คอยรายงานเราต่อไป"
 preftl_operation.3050.a.gestalt:0 "ติดตามต่อไป"
 preftl_operation.3050.b:0 "ตามล่า [from.target.GetSpeciesName] คนนั้นแล้วกำจัดเสีย"
 preftl_operation.3050.c:0 "เหลือเชื่อ! เราต้องยุติภารกิจ"
 preftl_operation.3050.d:0 "เราควรแจ้ง [global_event_country.GetGalCommunityOrGalImperium]"
 spynetwork_extra_containment:0 "มาตรการกักกันพิเศษ"
 spynetwork_extra_containment_desc:0 "กิจกรรมภายในเครือข่ายสอดแนมนี้ถูกล็อกดาวน์ หลังเกิดการเปิดโปงตัวตนครั้งร้ายแรงเมื่อไม่นานมานี้"

 preftl_operation.3051.name:0 "กำจัดพยานแล้ว"
 preftl_operation.3051.desc:0 "เจ้าหน้าที่ของเรารายงานว่ากำจัดเป้าหมายได้สำเร็จ นั่นคือพยานเพียงคนเดียวของการรั่วไหลล่าสุดของเราใน [from.target.GetName] บุคคลนี้ถูกตามรอยไปถึงที่อยู่อาศัยอันห่างไกลบริเวณชานชุมชนใหญ่แห่งหนึ่งของ [from.target.GetSpeciesAdj] พยานรายนี้ดูอยู่ในภาวะช็อกอย่างหนัก และไม่มีสัญญาณว่าเขาหรือเธอได้ติดต่อกับ [from.target.GetSpeciesNamePlural] คนอื่น เรามั่นใจว่าเรื่องนี้ถูกปิดไว้ได้แล้ว"

 preftl_operation.3055.name:0 "แบล็กเมล์"
 preftl_operation.3055.desc:0 "[from.target.GetSpeciesName] ผู้พบเห็นการรั่วไหลล่าสุดของเราใน [from.target.GetName] ไม่เพียงยังลอยนวลอยู่เท่านั้น แต่ยังส่งคำขาดอย่างหยาบคายมาถึงเรา พยานรายนี้ขู่ว่าจะเปิดโปง $role_spymaster$ ของเรา และโดยปริยายรวมถึง [from.owner.GetName] ด้วย ต่อการแทรกแซงกิจการของ [from.target.GetSpeciesAdj] ของเรา\n\nบุคคลผู้บังอาจคนนี้ยื้อเราไว้ด้วยการอยู่แต่ในพื้นที่ที่มีประชากรหนาแน่น ซึ่งทำให้เราไม่สามารถลงมือกับพวกเขาได้โดยไม่เสี่ยงต่อการเปิดโปงเพิ่มเติม เราอาจเลือกที่จะทำตามข้อเรียกร้องของเขาแทน"
 preftl_operation.3055.a:0 "ยอมรับไม่ได้ ยุติภารกิจแล้วถอยกลับ"
 preftl_operation.3055.b:0 "เราจะไม่เจรจา กำจัดพยานเสีย"
 preftl_operation.3055.c:0 "ราคาสูงทีเดียว แต่เราจะจ่าย"
 preftl_operation.3055.c.tt:1 "จะมอบหมายเจ้าหน้าที่ให้จับตาดูบุคคลนี้ตลอดเวลา เพื่อให้ความลับถูกปกปิดไว้อย่างสมบูรณ์\n§Rสิ่งนี้จะส่งผลลบต่อ§! §Y$MOD_SPY_NETWORK_DAILY_VALUE_ADD$§! ของเรา"
 spynetwork_blackmailed:0 "ถูกแบล็กเมล์"
 spynetwork_blackmailed_desc:0 "ขีดความสามารถของเครือข่ายสอดแนมนี้ลดลงเล็กน้อย นับตั้งแต่เรายอมจำนนต่อการขู่กรรโชกของคนท้องถิ่น เจ้าหน้าที่ถูกมอบหมายให้เฝ้าดูบุคคลนี้ตลอดเวลา"

## Stricken
 preftl_operation.3060.name:0 "บาดเจ็บสาหัส"
 preftl_operation.3060.desc:1 "เจ้าหน้าที่คนสำคัญสองคนของเราบน [from.target.capital_scope.GetName] ได้รับบาดเจ็บสาหัสจากภัยธรรมชาติที่ไม่คาดคิด ซึ่งคร่าชีวิต [from.target.GetSpeciesNamePlural] หลายคนไปด้วย ชาวพื้นเมืองรีบเข้าไปช่วยเหลือ ขณะนี้เจ้าหน้าที่ทั้งสองกำลังได้รับการดูแลขั้นพื้นฐาน\n\nแม้ [from.target.GetSpeciesNamePlural] จะยังไม่สามารถซักถามเจ้าหน้าที่ของเราได้ แต่บาดแผลของพวกเขา ถึงจะรุนแรง ก็ยังไม่เทียบกับสิ่งที่คร่าชีวิตผู้เห็นเหตุการณ์พื้นเมืองจำนวนมากไปได้ ไม่นานเกินรอ ปฏิบัติการ [from.GetName] ย่อมต้องถูกตรวจสอบเข้มงวดยิ่งขึ้น โดยเฉพาะเมื่อเจ้าหน้าที่คนสำคัญสองคนของเราหมดสภาพเช่นนี้"
 preftl_operation.3060.hive.desc:0 "เจ้าหน้าที่คนสำคัญสองคนของเราบน [from.target.capital_scope.GetName] ได้รับบาดเจ็บสาหัสจากภัยธรรมชาติที่ไม่คาดคิด ซึ่งยังทำลายโดรน [from.target.GetSpeciesAdj] หลายตัวด้วย ผู้ช่วยรีบเข้ามาให้ความช่วยเหลือ และพาเจ้าหน้าที่ผู้บาดเจ็บของเราไปยังหน่วยรักษาพยาบาลขั้นพื้นฐาน\n\nในตอนนี้ รัง [from.target.GetSpeciesAdj] กำลังหมกมุ่นอยู่กับการรักษาอาการบาดเจ็บที่รุนแรงกว่า อย่างไรก็ตาม อีกไม่นานปฏิบัติการ [from.GetName] ก็จะต้องถูกตรวจสอบอย่างเข้มงวดยิ่งขึ้น โดยเฉพาะเมื่อเจ้าหน้าที่คนสำคัญสองคนของเราหมดสภาพ เราเสี่ยงอย่างมากต่อการถูกเปิดโปง"
 preftl_operation.3060.a:0 "นำเจ้าหน้าที่ของเรากลับมาทันที"
 preftl_operation.3060.a.tt:0 "หากเราสำเร็จ §Yปฏิบัติการ [from.GetName]§! จะกลับมาดำเนินตามแผน มีโอกาสล้มเหลวเล็กน้อยพร้อมผลลัพธ์ที่อาจเลวร้ายมาก"
 preftl_operation.3060.b:0 "เราต้องเชื่อว่าการปกปิดตัวตนของพวกเขาจะยังคงอยู่"
 preftl_operation.3060.c:1 "เราเสี่ยงต่อการเปิดโปงแบบนี้ไม่ได้! ยุติภารกิจ"
 preftl_operation.3060.d:0 "ถึงเวลาเปิดเผยตัวเราแล้ว"
 preftl_operation.3060.d.negative.tt:0 "มอบหมายเจ้าหน้าที่ของเราให้แก่การรักษาพยาบาลของ [from.target.GetSpeciesAdj] อย่างเต็มที่ สิ่งนี้จะส่งผล §Rเชิงลบ§! ต่อ §Yปฏิบัติการ [from.GetName]§!"
 preftl_operation.3060.d.positive.tt:0 "มอบหมายเจ้าหน้าที่ของเราให้แก่การรักษาพยาบาลของ [from.target.GetSpeciesAdj] อย่างเต็มที่ สิ่งนี้จะส่งผล §Gเชิงบวก§! ต่อ §Yปฏิบัติการ [from.GetName]§!"
 operation_stricken_operatives:0 "เจ้าหน้าที่บาดเจ็บสาหัส"
 operation_stricken_operatives_desc:0 "เจ้าหน้าที่คนสำคัญของเราหลายคนได้รับบาดเจ็บ ทำให้เกิดความล่าช้าอย่างมีนัยสำคัญ"

 preftl_operation.3061.success.desc:1 "$role_spymaster$ [from.spynetwork.leader.GetName] รายงานว่าการดึงตัวเจ้าหน้าที่บาดเจ็บของเราออกจากสถานพยาบาลบน [from.target.capital_scope.GetName] ประสบความสำเร็จ สำหรับ [from.target.GetSpeciesNamePlural] แล้ว 'ผู้รอดชีวิต' เหล่านี้เสียชีวิตลงจากอาการบาดเจ็บแฝงอย่างรุนแรง ส่วนร่างจำลองของพวกเขากำลังถูกกำจัดทิ้งอยู่แล้ว"
 preftl_operation.3061.failure.desc:1 "$role_spymaster$ [from.spynetwork.leader.GetName] รายงานอย่างเร่งด่วนว่าเราไม่สามารถดึงตัวเจ้าหน้าที่บาดเจ็บของเราออกจากพื้นผิว [from.target.capital_scope.GetName] ได้สำเร็จ ชาว [from.target.GetSpeciesAdj] หลายคนเห็นสิ่งที่พวกเขามองว่าเป็นความพยายามลักพาตัว และเข้าขัดขวางอย่างดุเดือด พวกเขาไม่เพียงเพิ่มความปลอดภัยรอบตัวเจ้าหน้าที่บาดเจ็บของเรา แต่ยังจับสมาชิกทีมช่วยเหลือของเราไว้ด้วย!\n\nชาว [from.target.GetSpeciesName] ตอนนี้อยู่ในภาวะตื่นตัวสูง อย่างน้อยในระดับหนึ่ง ปฏิบัติการ [from.GetName] ถูกเปิดโปงแล้ว"
 preftl_operation.3061.a:0 "แจ้ง [global_event_country.GetGalCommunityOrGalImperium]"

 preftl_operation.3062.success.desc:0 "การปกปิดของเรายังคงอยู่ แม้วิธีที่เจ้าหน้าที่ของเรารอดจากบาดเจ็บถึงตายได้อย่างเกือบปาฏิหาริย์จะสร้างความสงสัยอยู่บ้าง แต่ [from.target.GetSpeciesNamePlural] ดูเหมือนจะตัดสินใจแล้วว่าเป็นเพียงโชคที่อยู่ข้างพวกเขา\n\nเจ้าหน้าที่ของเราคงต้องใช้เวลาอีกสักพักกว่าจะกลับไปปฏิบัติหน้าที่ได้ อย่างไรก็ตาม ตอนนี้พวกเขาได้รับการซักถามสรุปภารกิจแล้ว ปฏิบัติการ [from.GetName] อาจกลับสู่ตารางเดิมได้"
 preftl_operation.3062.failure.desc.intro:1 "$role_spymaster$ [from.spynetwork.leader.GetName] รายงานอย่างเร่งด่วนถึงความล้มเหลวของเราในการคงการปกปิดตัวตนไว้ใน [from.target.GetName] แม้จะผ่านการฝึกมาอย่างดีและเข้าถึงเทคโนโลยีลับที่ดีที่สุดที่เราจะมอบให้ได้ เจ้าหน้าที่ของเราก็ยังถูกเปิดโปงว่าไม่ใช่ [from.target.GetSpeciesNamePlural]"
 preftl_operation.3062.failure.unaware.desc:0 "$preftl_operation.3062.failure.desc.intro$\n\nการตระหนักรู้อันรุนแรงนี้ได้คร่าชีวิตเจ้าหน้าที่ของเรา พวกเขากำลังเข้ารับปฏิบัติการขั้นพื้นฐานอยู่พอดี เมื่อผู้ดูแล [from.target.GetSpeciesAdj] ค้นพบธรรมชาติที่แท้จริงของพวกเขาและตื่นตระหนก"
 preftl_operation.3062.failure.aware.desc:0 "$preftl_operation.3062.failure.desc.intro$\n\nโชคดีที่คนท้องถิ่นไม่ได้ตื่นตกใจ และเจ้าหน้าที่ของเรายังไม่เป็นอันตรายในเวลานี้ อย่างไรก็ตาม โอกาสที่เราจะปฏิเสธว่าไม่เกี่ยวข้องกับพวกเขาและการกระทำของพวกเขานั้นมีน้อยอย่างยิ่ง ดูเหมือนว่าเราคงต้องรับมือกับผลลัพธ์ที่อยู่ตรงหน้าตอนนี้เสียแล้ว"

## Mixed Signals
 preftl_operation.3100.name:0 "สัญญาณปะปน"
 preftl_operation.3100.desc:0 "โดรนของอาณานิคมใหญ่แห่งหนึ่งบน [from.target.capital_scope.GetName] ถูกปลุกให้เข้าสู่ภาวะต่อสู้โดยไม่คาดคิดในวันนี้ เจ้าหน้าที่ของเราใช้ฟีโรโมนผิดชนิดระหว่างพยายามปลอมตัวเป็นโดรนแรงงานท้องถิ่น ซึ่งนำไปสู่การแตกตื่น รัง [from.target.GetSpeciesAdj] ดูจะไวต่อฟีโรโมนที่เราเตรียมไว้เป็นพิเศษอย่างผิดปกติ หากเราจัดฉากปฏิสัมพันธ์ที่ปั่นป่วนระหว่างอาณานิคมท้องถิ่นเพิ่มเติม เราอาจเรียนรู้อะไรได้มากทีเดียว\n\nสิ่งที่ชัดเจนคือการมีอยู่ของเรากำลังทำให้ปฏิบัติการ [from.GetName] ตกอยู่ในอันตราย ไม่ว่าเราจะส่งสัญญาณใดต่อไป มันต้องเป็นสัญญาณที่ถูกต้อง"
 preftl_operation.3100.a:0 "ศึกษาปฏิกิริยาของพวกมันต่อการปล่อยฟีโรโมนแบบควบคุม"
 preftl_operation.3100.b:0 "ควบคุมฟีโรโมนไว้ให้แน่น"
 preftl_operation.3100.b.tt:0 "จัดสรรทรัพยากรเพิ่มเพื่อให้เจ้าหน้าที่ของเราทำภารกิจต่อได้ โดยไม่เสี่ยงต่อเหตุการณ์เช่นนี้อีก"
 spynetwork_hive_no_pheromones:0 "งดใช้ฟีโรโมน"
 spynetwork_hive_no_pheromones_desc:0 "เนื่องจากรังนี้เพิ่งสัมผัสฟีโรโมนเทียมมาไม่นาน เราจึงตัดสินใจจำกัดการใช้มันในปฏิบัติการต่อๆ ไป"

## Technological Contamination
 preftl_operation.3105.name:0 "การปนเปื้อนทางเทคโนโลยี"
 preftl_operation.3105.desc:0 "โดรนตัวหนึ่งบน [from.target.capital_scope.GetName] สามารถเอา [from.target.species.GetHandNamePlural] ของมันไปแตะอุปกรณ์วัดชิ้นหนึ่งของเราได้ มันเริ่มถอดแยกอุปกรณ์ของเราแล้ว เป็นเพียงเรื่องของเวลาก่อนที่ความเข้าใจนี้จะแพร่กระจายไปทั่วรังท้องถิ่น\n\nเราต้องลงมืออย่างรวดเร็วหากต้องการหลีกเลี่ยงการแทรกแซงพัฒนาการตามธรรมชาติของพวกเขา"
 preftl_operation.3105.a:0 "ปล่อยให้โดรนคุ้ยเขี่ยเศษของเรา"
 preftl_operation.3105.a.tt:0 "§Y[from.target.GetName]§!: §G+20%§! ความก้าวหน้าทางเทคโนโลยี"
 preftl_operation.3105.b:0 "ถ้าเราเปิดมันใช้งานล่ะ?"
 preftl_operation.3105.b.tt:0 "§Y[from.target.GetName]§! จะก้าวสู่ยุคเทคโนโลยีถัดไป"
 preftl_operation.3105.c:1 "จุดชนวนอุปกรณ์แทรกซึมท้องถิ่นทั้งหมดจากระยะไกล"
