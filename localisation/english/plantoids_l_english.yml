 civic_tooltip_idyllic_bloom_effects:2 "สามารถสร้างสิ่งก่อสร้าง £building£ §Y$building_gaiaseeders$§! บนดาวเคราะห์ของคุณและดาวเคราะห์บริวารที่เหมาะสมที่สุดกับเผ่าพันธุ์เริ่มต้นของคุณ\n$building_gaiaseeders_all_desc$\nเมื่อคุณปลดล็อกเทคโนโลยีปรับเปลี่ยนดาวเคราะห์ £society£ §Yการแปลงรูปแบบ§! ขั้นสูง จะสามารถสร้างสิ่งก่อสร้าง £building£ §Y$building_gaiaseeders$§! บนดาวเคราะห์ประเภทอื่นๆ เพิ่มเติมได้"

 disables_idyllic_bloom:0 "§Rการเลือกการยกระดับนี้จะปิดการใช้งานคุณสมบัติพลเมือง$civic_idyllic_bloom$§!"

