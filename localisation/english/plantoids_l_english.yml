 MESSAGE_FRUITFUL_SEED_PLANTED_TITLE: "ฝักเมล็ดพันธุ์ถูกนำไปปลูก"
 MESSAGE_FRUITFUL_SEED_PLANTED_OWNER: "สิ่งมีชีวิตในอวกาศได้นำฝักเมล็ดพันธุ์ของเราไปที่ดาว $PLANET|Y$ ในระบบดาว $SYSTEM|Y$ ซึ่งทำให้เกิดป่าไม้แห่งใหม่ขึ้นมา"
 MESSAGE_FRUITFUL_SEED_PLANTED_NO_OWNER: "สิ่งมีชีวิตในอวกาศได้นำฝักเมล็ดพันธุ์ของเราไปที่ดาว $PLANET|Y$ ในระบบดาว $SYSTEM|Y$ พวกมันจะนอนจำศีลจนกว่าเราจะพร้อมเปิดใช้งาน"

