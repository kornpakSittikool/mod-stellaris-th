 gaia_seeder_bloomed_pops_effect: "เมื่อเสร็จสิ้นการปรับสภาพของดาว [This.GetName] ให้กลายเป็น $pc_gaia$ แล้ว เครื่อง=ไดเรกทอรีจะทำการปรับประชากรของเราให้เหมาะสมกับโลกใบนี้ดีขึ้น\n\nเพิ่มผลลัพธ์ของคุณลักษณะประชากร §Y$trait_plantoid_bloomed$§! และ §Y$trait_plantoid_budding$§! ขึ้น §G+50%§!"
 gaia_seeder_bloom_timer_tooltip: "\nการเบ่งบานครั้งต่อไปบนดาว §Y[This.GetName]§! จะเกิดขึ้นในวันที่ §Y[This.gaia_seeder_bloom_timer]§!."
