 plant.100.name:0 "ความสมบูรณ์แบบตามอุดมคติ"
 plant.100.desc:1 "ด้วยการดัดแปลงพันธุกรรมขั้นสูง การลงทุนจำนวนมาก และแรงงานหนักหลายปี โครงการปรับเปลี่ยนดาวเคราะห์การปล่อยข้อมูลของเราบนดาว §Y[Root.GetName]§! ได้บรรลุผลสำเร็จเป็นที่เรียบร้อยแล้ว\n\nตั้งแต่วันนี้เป็นต้นไป ดาว §Y[Root.GetName]§! จะได้รับการยกย่องว่าเป็นอัญมณีที่แท้จริงในหมู่ดาวเคราะห์ ทั้งสำหรับการชื่นชมหรืออาจก่อให้เกิดความริษยา"
 plant.100.a:0 "เริ่มพิธีเฉลิมฉลองกันเลย!"
 plant.100.b:0 "เราทำได้ดีมาก ถึงเวลาไปเน้นงานด้านอื่นต่อแล้ว"

 plant.105.desc:0 "ด้วยการดัดแปลงพันธุกรรมขั้นสูง การลงทุนจำนวนมาก และแรงงานหนักหลายปี โครงการปรับเปลี่ยนดาวเคราะห์การปล่อยข้อมูลของเราบนดาว §Y[From.Planet.GetName]§! ได้บรรลุผลสำเร็จเป็นที่เรียบร้อยแล้ว\n\nตั้งแต่วันนี้เป็นต้นไป ดาว §Y[From.Planet.GetName]§! จะได้รับการยกย่องว่าเป็นอัญมณีที่แท้จริงในหมู่ดาวเคราะห์ ทั้งสำหรับการชื่นชมหรืออาจก่อให้เกิดความริษยา เรามั่นใจว่าบริวารของเราจะซาบซึ้งในความพยายามนี้"

 plant.110.desc:0 "ผู้ปกครองของเราได้ดำเนินโครงการที่แปลกประหลาดบนดาว §Y[from.from.planet.GetName]§! เสร็จสิ้นแล้ว โดยเปลี่ยนให้เป็นโลกสวรรค์โลกกายาด้วยเหตุนี้เราจึงสามารถใช้ประโยชน์จากสภาพภูมิอากาศในอุดมคติและพื้นที่กว้างใหญ่ของสวรรค์แห่งนี้ได้ดี"
 plant.110.desc.hydrocentric:0 "ผู้ปกครองของเราได้ดำเนินโครงการที่แปลกประหลาดบนดาว §Y[from.from.planet.GetName]§! เสร็จสิ้น โลกของเราถูกทำลายสิ้น! พวกเขาปูผืนมหาสมุทรด้วยที่ราบและเนินเขา อัญมณีแห่งความชื้นแฉะเปลี่ยนเป็นแห้งแล้งและเป็นทะเลทราย ยิ่งไปกว่านั้น เมื่อเราทักท้วง พวกเขาก็เพิกเฉยทิ้งคำร้องเรา! ผู้ปกครองกลับอ้างว่าพวกเขาช่วยทำให้โลกของเรา \"สวยงามยิ่งขึ้น\""

 plant.110.a:0 "พวกเขากล้าดียังไง!"
 plant.110.b:0 "ช่างรอบคอบจริงๆ!"
 plant.110.c:0 "ช่างเป็นการตัดสินใจที่แปลกประหลาดยิ่งนัก"

 celebrate_idyllic_bloom:0 "การฉลองการเปลี่ยนสภาพเป็นดินแดนในอุดมคติ"
 celebrate_idyllic_bloom_desc:0 "การเฉลิมฉลองทั่วทั้งดาวเคราะห์เกิดขึ้นหลังจากการเปลี่ยนสภาพโลกนี้ให้เป็นสวรรค์ในอุดมคติได้สำเร็จ"
 terraformed_our_ocean_world:0 "ปรับเปลี่ยนมหาสมุทรดาราของเรา"
 terraformed_our_ocean_world_desc:0 "ผู้ปกครองของเราได้เปลี่ยนโลกมหาสมุทรที่งดงามให้เป็นโลกไกอา รสนิยมช่างแย่จริงๆ"

 thankful_for_gaia:0 "ซาบซึ้งใจสำหรับโลกไกอา"
 thankful_for_gaia_desc:0 "ผู้ปกครองของเราได้เปลี่ยนดาวเคราะห์ดวงหนึ่งของเราให้กลายเป็นโลกไกอา ช่างมีเมตตาเสียจริง!"

 ### Traits by Byron Aytoun

 trait_plantoid_phototrophic:0 "สังเคราะห์แสง"
 trait_plantoid_phototrophic_desc:0 "§Lสายพันธุ์นี้ดำรงชีพด้วยการรวมกันของทั้งอาหารและแสงอาทิตย์§!\n"
 TRAIT_PLANTOID_PHOTOTROPHIC_EFFECT:0 "ทดแทนความต้องการอาหาร $food_with_icon$ (หรือเทียบเท่า) ในค่าบำรุงรักษา §Y50%§! ด้วยค่าบำรุงรักษาพลังงาน $energy_with_icon$"

 trait_plantoid_radiotrophic:0 "สังเคราะห์รังสี"
 trait_plantoid_radiotrophic_desc:0 "§Lสายพันธุ์นี้ดำรงชีพด้วยการรวมกันของอาหารและรังสีพลังงานต่ำ และด้วยเหตุนี้จึงสามารถเจริญเติบโตได้ดีในโลกที่เลวร้ายที่สุด§!"
 TRAIT_PLANTOID_RADIOTROPHIC_EFFECT:1 "$TRAIT_PLANTOID_PHOTOTROPHIC_EFFECT$\n$t$- ค่าบำรุงรักษาพลังงาน £energy£ นี้จะได้รับการยกเว้นสำหรับประชากรที่อาศัยอยู่บน §Yโลกสุสาน(ทรอมเวิลด์)§!.\n$t$- ความเร็วการเติบโตของประชากรบนโลกสุสาน §G+10%§!\n$t$- ความสามารถในการอยู่อาศัยบนโลกสุสาน: §G+10%§!"
 trait_harvested_radiotrophic:0 "$trait_plantoid_radiotrophic$"
 trait_harvested_radiotrophic_desc:0 "$trait_plantoid_radiotrophic_desc$"
 trait_lithoid_radiotrophic:0 "$trait_plantoid_radiotrophic$"
 trait_lithoid_radiotrophic_desc:0 "$trait_plantoid_radiotrophic_desc$"
 TRAIT_LITHOID_RADIOTROPHIC_EFFECT:1 "ทดแทนความต้องการแร่ธาตุพื้นฐาน £minerals£ ในค่าบำรุงรักษา §Y50%§! ด้วยค่าบำรุงรักษาพลังงาน £energy£\nค่าบำรุงรักษาพลังงาน £energy£ นี้จะได้รับการยกเว้นสำหรับประชากรที่อาศัยอยู่บน §Yโลกสุสาน(ทรอมเวิลด์)§!.\nความเร็วการเติบโตของประชากรบนโลกสุสาน §G+10%§!\nความสามารถในการอยู่อาศัยบนโลกสุสาน: §G+10%§!"

 trait_plantoid_budding:0 "แตกหน่อ"
 trait_plantoid_budding_desc:0 "§Lเผ่าพันธุ์นี้มีความสามารถในการขยายพันธุ์โดยการแตกหน่อ นอกเหนือจากการปฏิสนธิของเมล็ดหรือสปอร์ตามปกติ§!"
 trait_plantoid_budding_portrait_override_tt: "หรือสายพันธุ์ใดๆ ที่ขยายพันธุ์ผ่านการปักชำพืชพรรณ"
 trait_lithoid_budding:0 "การก่อผลึกแก้ว"
 trait_lithoid_budding_desc:0 "§Lด้วยการเจริญเติบโตของผลึกแก้ว สายพันธุ์นี้สามารถสร้างโครงข่ายจำลองตัวเองนอกเหนือจากการขยายพันธุ์ตามปกติ§!"
 TRAIT_PLANTOID_BUDDING_EFFECT: "ทุกๆ ประชากร £pop£ ในกลุ่มประชากร $pop_group_unit$ ที่ทำงานเป็นทาสหรือดีกว่า จะผลิตความเร็วการเติบโตแบบโลจิสติกส์ £mod_logistic_growth_mult£ §Y$MOD_BONUS_POP_GROWTH$§! จำนวน 0.02\n\nสิ่งนี้จะสะสมร่วมกับแหล่งกระตุ้นอื่นๆ เช่น อู่โคลนนิ่ง £building£ §Y$building_clone_vats$§! หรือโดรนวางไข่ £job_spawning_drone£ §Y$job_spawning_drone_plural$§!"
 TRAIT_LITHOID_BUDDING_EFFECT:0 "$TRAIT_PLANTOID_BUDDING_EFFECT$"

 trait_advanced_phototrophic:0 "$trait_plantoid_phototrophic$"
 trait_advanced_phototrophic_desc:0 "§Lด้วยวิศวกรรมพันธุศาสตร์ขั้นสูง เผ่าพันธุ์นี้ในเวลานี้สามารถดำรงชีพด้วยแสงแดดบางส่วน§!"
 TRAIT_ADVANCED_PHOTOTROPHIC_EFFECT:0 "ทดแทนความต้องการอาหาร £food£ หรือแร่ธาตุ £minerals£ พื้นฐานในค่าบำรุงรักษา §Y50%§! ด้วยค่าบำรุงรักษาพลังงาน £energy£"

 trait_advanced_radiotrophic:0 "$trait_plantoid_radiotrophic$"
 trait_advanced_radiotrophic_desc:0 "§Lด้วยวิศวกรรมพันธุศาสตร์ขั้นสูง เผ่าพันธุ์นี้ในเวลานี้สามารถดำรงชีพด้วยรังสีพลังงานต่ำ และด้วยเหตุนี้จึงสามารถเจริญเติบโตได้ดีในโลกที่เลวร้ายที่สุด§!"
 TRAIT_ADVANCED_RADIOTROPHIC_EFFECT:0 "$TRAIT_PLANTOID_PHOTOTROPHIC_EFFECT$\nค่าบำรุงรักษาพลังงาน £energy£ นี้จะได้รับการยกเว้นสำหรับประชากรที่อาศัยอยู่บน §Yโลกสุสาน(ทรอมเวิลด์)§!."

 trait_advanced_budding:0 "$trait_plantoid_budding$"
 trait_advanced_budding_desc:0 "§Lการปรับเปลี่ยนลำดับดีเอ็นเอช่วยให้สายพันธุ์นี้ขยายพันธุ์โดยการแตกหน่อเพิ่มเติมจากวิธีดั้งเดิม§!"

