 ### Fruitful Partnership Origin
 ## By Giada Zavarise

 feeding_station: "สวนผลไม้"
 feeding_station_plural: "สวนผลไม้"

 origin_fruitful: "หุ้นส่วนที่ออกดอกออกผล"
 origin_fruitful_desc: "เป็นอารยธรรมที่มีการร่วมทำงานกันกับสิ่งมีชีวิตในอวกาศทำให้เมล็ดพันธ์ที่ช่วยขยายอาณานิคมของพวกเขาได้"
 origin_tooltip_fruitful_effects: "- สัตว์อวกาศ: กระจาย ['concept_seed_pod', พ็อด] ไปทั่วทั้งกาแล็กซี \n- $AVAILABLE_STARBASE_BUILDINGS$ ['concept_sm_feeder', สวน สัตว์] \n- $AVAILABLE_BOMBARDMENT_STANCE$ ['concept_seed_bombing' ]\n- $HOME_SYSTEM$ ['concept_tiyanki' ] ในระบบดาวเพื่อนบ้าน"
 civic_tooltip_hive_xenophile_or_pacifist: "มีระดับดีกรีของจริยธรรม §Yชอบต่างดาว§!, §Yรักสันติ§!, หรือ §Yเป็นหนึ่งอันเดียวกัน§!"

 START_SCREEN_FRUITFUL_PLANTOID: "หากรากของคุณหยั่งรากฝังลึก ทว่าจิตวิญญาณของคุณเริ่มกระสับกระส่าย จงปล่อยให้ผู้อื่นแบกรับความเจ็บปวดของคุณไป ปล่อยให้สัตว์ต่างๆ ได้ดมกลิ่นดอกไม้ของคุณ เลี้ยงดูตัวเองด้วยผลไม้ของคุณ และอาบแสงเงาของใบไม้ของคุณ ปล่อยให้พวกมันพัดพาละอองเรณูและเมล็ดพันธุ์ไปยังดินแดนห่างไกล เพื่อให้ลูกหลานของคุณได้ฝังรากลึกลงบนผืนดินต่างถิ่น และเมื่อสายลมพัดพาสัญญาณเสียงใบไม้ไหวมาถึง คุณจะรู้ว่าลูกหลานของคุณได้พบรังนอนแห่งใหม่แล้ว\n\nตั้งแต่ยุคโบราณกาลมา เราได้ทำงานร่วมกับสัตว์ท้องถิ่นเพื่อกระจายเผ่าพันธุ์ของเราไปทั่วดาว [GetHomeWorldName] ดังนั้นเมื่อถึงเวลาที่เราต้องถอนรากถอนโคนตนเอง กิ่งก้านสาขาเอื้อมออกไปหาท้องฟ้า จึงเป็นเรื่องปกติที่เราจะเชื่อมโยงกับสิ่งมีชีวิตแห่งความว่างเปล่าด้วย พวกมันเคี้ยวผลไม้ของเรา แทะเล็มใบไม้ของเรา และพวกมันจะนำพาลูกหลานของเราไปยังโลกดาราที่ห่างไกล ที่ซึ่งพวกเขาจะเบ่งบานและได้รับการเลี้ยงดูจากดวงอาทิตย์ต่างถิ่น\n\nปล่อยให้เมล็ดพันธุ์ของเรากระจายออกไป ปล่อยให้ดาราจักรกลายเป็นสวนของเรา"
 START_SCREEN_FRUITFUL_FUNGOID: "หากไมซีเลียมของคุณหยั่งรากฝังลึก ทว่าจิตวิญญาณของคุณเริ่มกระสับกระส่าย จงปล่อยให้ผู้อื่นแบกรับความเจ็บปวดของคุณไป ปล่อยให้สัตว์ต่างๆ ได้ดมกลิ่นสปอร์ของคุณ เลี้ยงดูตัวเองด้วยก้านเห็ดของคุณ และอาบแสงเงาของหมวกเห็ดของคุณ ปล่อยให้พวกมันพัดพาสปอร์ไปยังดินแดนห่างไกล เพื่อให้ลูกหลานของคุณได้ฝังรากลึกลงบนผืนดินต่างถิ่น และเมื่อผืนดินนำพาความสั่นสะเทือนของเครือข่ายไมคอร์ไรซาใหม่มาถึง คุณจะรู้ว่าลูกหลานของคุณได้พบรังนอนแห่งใหม่แล้ว\n\nตั้งแต่ยุคโบราณกาลมา เราได้ทำงานร่วมกับสัตว์ท้องถิ่นเพื่อกระจายเผ่าพันธุ์ของเราไปทั่วดาว [GetHomeWorldName] ดังนั้นเมื่อถึงเวลาที่เราต้องถอนรากถอนโคนตนเอง ดอกเห็ดเอื้อมออกไปหาท้องฟ้า จึงเป็นเรื่องปกติที่เราจะเชื่อมโยงกับสิ่งมีชีวิตแห่งความว่างเปล่าด้วย พวกมันเคี้ยวส่วนออกผลของเรา แทะเล็มกลีบสปอร์ของเรา และพวกมันจะนำพาลูกหลานของเราไปยังโลกดาราที่ห่างไกล ที่ซึ่งพวกเขาจะเบ่งบานและได้รับการเลี้ยงดูจากดวงอาทิตย์ต่างถิ่น\n\nปล่อยให้สปอร์ของเรากระจายออกไป ปล่อยให้ดาราจักรกลายเป็นสวนเห็ดของเรา"

 ## Techs
 sm_feeder: "สวนเมล็ดดารา"
 sm_feeder_desc: "สวนในสภาวะสุญญากาศสำหรับสถานีดาราจักรของเรา เต็มไปด้วยพืชที่ได้รับการดัดแปลงพันธุกรรมเพื่อดึงดูดสิ่งมีชีวิตในอวกาศ"
 sm_feeder_tt: "ผลลัพธ์:\n$t$ดึงดูดสิ่งมีชีวิตในอวกาศมาแทะเล็มที่สถานีดาราจักร เพื่อรวบรวมฝักเมล็ดพันธุ์(ดูพอดส์)ไปกระจายพันธุ์ต่อ"
 sm_ring_feeder: "สวนวงโคจรดารา"
