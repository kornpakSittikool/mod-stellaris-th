 OPEN_SEED_PODS_PROJECT: "เปิดใช้งานฝักเมล็ดพันธุ์บน [this.GetName]"
 OPEN_SEED_PODS_PROJECT_DESC: "สิ่งมีชีวิตในอวกาศได้นำฝักเมล็ดพันธุ์ที่จำศีลของเรามายังดาว §H[this.GetName]§! การเล็งลำแสงพลังงานเข้มข้นไปยังดาวเคราะห์ดวงนี้จะสามารถกระตุ้นการเติบโตของพวกมัน เปลี่ยนหินที่ไม่มีผู้อยู่อาศัยให้กลายเป็นดาวอาณานิคมใหม่ที่เขียวชอุ่ม"

 WEEDS_ARMY_PROJECT: "สร้างกองทัพบน [this.GetName]"
 WEEDS_ARMY_PROJECT_DESC: "สิ่งมีชีวิตในอวกาศได้นำฝักเมล็ดพันธุ์ของเรามายังดาว §H[this.GetName]§! ซึ่งได้รับการเพาะปลูกและดูแลโดย §H[this.owner.GetName]§! การเล็งลำแสงพลังงานเข้มข้นไปยังดาวเคราะห์ดวงนี้จะกระตุ้นการเติบโต เปลี่ยนป่าไม้ให้กลายเป็น §Hกองทัพพืชต่างถิ่น(กองทัพซีโนฟโลรัน)§! ยิ่งระดับของ §Hพืชต่างถิ่นที่แพร่กระจาย§! บนดาวเคราะห์สูงเท่าใด กองทัพก็จะเกิดมามากขึ้นเท่านั้น"

 FRUITFUL_SEED_POD: "ฝักเมล็ดพันธุ์"

 fruitful_army: "กองทัพพืชต่างถิ่น"
 fruitful_army_desc: "สัญญาณที่เข้ารหัสปลุกพืชต่างถิ่นเหล่านี้ที่หลับใหลมานานให้ตื่นขึ้น เมื่อพวกมันถอนรากขึ้นมา พวกมันจะเดินทัพ โดยใช้รากของตัวเองเป็นอาวุธทุบตีอันน่าเกรงขาม"

 # Events
 origin.7100.name: "การกระจายพันธุ์ของเมล็ดพืช"
 origin.7100.desc: "สำหรับสัตว์อวกาศในดาราจักร เราได้สร้างสวนขึ้นมา เราเติมเต็มด้วยดอกไม้ ผลไม้ และฝักเมล็ดพืชที่เหนียวเหนอะหนะ พร้อมที่จะยึดเกาะกับผิวหนังของสิ่งมีชีวิตที่น่าอัศจรรย์เหล่านี้ ทว่าสิ่งมีชีวิตในอวกาศเหล่านี้จะประทับใจกับงานจัดเลี้ยงของเราหรือไม่? ทันทีที่พวกมันแทะผลแอปเปิลผลแรก ความวิตกกังวลของเราก็หายไปสิ้น\n\nตั้งแต่โบราณกาลมา เราได้เสนอผลไม้และร่มเงาให้แก่สัตว์ต่างๆ บนดาวเคราะห์ของเรา ในทางกลับกัน พวกมันก็นำพาเมล็ดพันธุ์ของเราไป บัดนี้ พันธสัญญาโบราณนี้ได้รับการจำลองในระดับดาราจักร: สัตว์อวกาศจะนำฝักเมล็ดพันธุ์ §Yพ็อด§! ของเราติดตัวไปด้วยเมื่อพวกมันออกเดินทาง ด้วยโชคเล็กน้อย เมล็ดพันธุ์ของเราจะตกลงบน §Hดาวเคราะห์ที่อาศัยอยู่ได้§! ที่ซึ่งพวกมันจะมีทุกสิ่งที่จำเป็นในการสร้างสวนแห่งใหม่สำหรับผู้คนของเรา เราเพียงแค่ต้องสั่งการเล็งลำแสงพลังงานเพื่อกระตุ้นการทำงานของมัน ช่วยให้เราเข้าอยู่อาศัยบนดาวเคราะห์ดวงใหม่ได้โดยไม่ต้องส่งยานตั้งอาณานิคมไป"
 origin.7100.tooltip: "เมื่อเข้าสู่ระบบดาวใหม่ สัตว์อวกาศจะมีโอกาสทิ้งฝักเมล็ดพันธุ์ §HSeed Pod§! ไว้บนดาวเคราะห์ที่สามารถอาศัยอยู่ได้ โปรดอดทนรออย่างใจเย็น"

 origin.7304.name: "ประสานงานการกระจายพันธุ์"
 origin.7304.desc: "แม้ว่าเราจะสามารถพึ่งพาสัตว์อวกาศตามธรรมชาติเพื่อกระจายฝักเมล็ดพันธุ์ §Yพ็อด§! ของเรา แต่เราก็สามารถทำได้เสถียรยิ่งขึ้นด้วยสิ่งมีชีวิตที่เพิ่งเข้าร่วมกองเรือของเรา\n\nสวนดาราเมล็ดพันธุ์ §Yสวน สัตว์§! ของเราจะแจกจ่ายเมล็ดพันธุ์ให้กับสิ่งมีชีวิตภายใต้การดูแลของเรา ซึ่งเราสามารถส่งไปยัง §Hดาวเคราะห์ที่อาศัยอยู่ได้§! โดยตรงเพื่อก่อตั้งสวนแห่งใหม่"

 origin.7321.name: "ความอดทนนำมาซึ่งผลลัพธ์"
 origin.7321.desc: "ฝักเมล็ดพันธุ์ §YSeed Pod§! ของเราบนดาว §H[from.GetName]§! ได้เปิดออกแล้ว และประชากร [root.GetSpeciesNamePlural] ที่เพิ่งเกิดมาได้เริ่มหยั่งรากสร้างรังแล้ว"

 origin.7326.name: "เมล็ดพันธุ์ปริศนา"
 origin.7326.desc.base: "พื้นดินของดาว [this.GetName] เต็มไปด้วยเมล็ดพันธุ์ที่ดูเหมือนจะไม่ได้เป็นส่วนหนึ่งของระบบนิเวศท้องถิ่น ด้วยปริมาณแสงและน้ำเพียงเล็กน้อย เมล็ดพืชก็เติบโตอย่างรวดเร็ว ครอบคลุมดาวเคราะห์ด้วยป่าไม้แห่งใหม่และช่วยส่งเสริมความพยายามในการจัดตั้งอาณานิคมของเรา"
 origin.7326.desc.knowowner: "$origin.7326.desc.base$\n\nตามการวิเคราะห์ทางพันธุกรรม เมล็ดพันธุ์ดัดแปลงพันธุกรรมที่เติบโตอย่างรวดเร็วเหล่านี้ได้รับการพัฒนาขึ้นโดย §Y[seeds_owner.GetName]§!"
 origin.7326.desc.notknowowner: "$origin.7326.desc.base$ นักวิทยาศาสตร์ของเราไม่สามารถระบุแหล่งที่มาของเมล็ดพันธุ์ได้ แต่สิ่งหนึ่งที่แน่นอนคือ พวกมันเป็นเมล็ดพันธุ์สังเคราะห์ที่ผ่านการดัดแปลงทางชีวภาพเพื่อหยั่งรากอย่างรวดเร็วในผืนดินต่างดาว"
 origin.7326.a.desc: "ปลดล็อกการตัดสินใจสั่งการ §Y$decision_uproot_weed$§! บนดาวเคราะห์ดวงนี้"

 origin.7327.name: "$origin.7326.name$"
 origin.7327.desc.base: "ขณะเดินทางผ่านระบบดาว [this.solar_system.GetName] ฝูงสัตว์อวกาศได้ปล่อยวัตถุที่ไม่สามารถระบุได้ตกลงสู่พื้นผิวของดาว [this.GetName] เราไปถึงหลุมอุกกาบาตจากการปะทะอย่างรวดเร็ว และพบว่ามันเต็มไปด้วยพันธุ์ไม้ที่ไม่คุ้นเคย วัตถุที่ตกลงมามีลักษณะคล้ายยานตั้งอาณานิคม: ฝักเมล็ดพันธุ์ที่บรรจุสิ่งจำเป็นทั้งหมดเพื่อเริ่มอาณานิคมใหม่ ตั้งแต่วัสดุที่จำเป็นไปจนถึงผู้ตั้งถิ่นฐานที่เพิ่งตื่นจากการหลับใหล"
 origin.7327.desc.knowowner: "$origin.7326.desc.base$\n\nตามการวิเคราะห์ทางพันธุกรรม เมล็ดพันธุ์ที่ผิดปกติเหล่านี้ได้รับการพัฒนาขึ้นโดย §Y[seeds_owner.GetName]§!"
 origin.7327.desc.notknowowner: "$origin.7326.desc.base$\n\nด้วยระบบการสื่อสารในฝักเมล็ดพันธุ์ เราจึงสามารถสร้างการติดต่อกับจักรวรรดิที่เมล็ดพันธุ์นี้แตกหน่อออกมาได้อย่างรวดเร็ว"
 origin.7327.desc.moreseeds: "พืชต่างถิ่นที่มีอยู่บนดาวเคราะห์ของเราเติบโตแข็งแกร่งยิ่งขึ้น"

 origin.7328.name: "$origin.7321.name$"
 origin.7328.desc: "ยานตั้งอาณานิคมของเราเพิ่งร่อนลงจอดบนดาว §H[from.GetName]§! แต่ผู้คนของเราอยู่ที่นั่นแล้ว นอนจำศีลอยู่ในผืนดิน ประชากร [root.owner.GetSpeciesNamePlural] และทรัพยากรเพิ่มเติมในฝักเมล็ดพันธุ์ §YSeed Pod§! จะช่วยให้ผู้ตั้งถิ่นฐานพัฒนาดาวเคราะห์ดวงนี้ได้\n\nขอให้รากของพวกเขาแผ่ขยายออกไปไกลแสนไกล"

 origin.7400.name: "จัดตั้งด่านหน้าพัฒนา!"
 origin.7400.desc: "ประชากรผู้ตั้งถิ่นฐานห่างไกลของเราบนดาว §Y[Root.GetName]§! ได้จัดตั้ง §Y$starbase_outpost$§! รอบดาวฤกษ์ ทำให้สามารถเข้าควบคุมระบบดาว §Y[Root.GetStarName]§! ได้สำเร็จ"

 origin.7500.name: "ความปลอดภัยสำหรับสัตว์อวกาศ"
 origin.7500.desc: "ความสัมพันธ์ของเรากับสิ่งมีชีวิตในอวกาศค่อนข้างมีเอกลักษณ์เฉพาะตัว แต่เราไม่ได้อยู่อย่างโดดเดี่ยวในการเคารพสิทธิ์การมีอยู่ของพวกมัน มติที่เพิ่งผ่านในประชาคมกาแล็กติกจะช่วยปกป้องชีวิตของสิ่งมีชีวิตที่น่ามหัศจรรย์เหล่านี้"

 origin.7510.name: "อันตรายสำหรับสัตว์อวกาศ"
 origin.7510.desc: "สิ่งมีชีวิตในอวกาศเป็นเพื่อนของเราเสมอมา แต่ไม่ใช่สมาชิกทุกคนในประชาคมกาแล็กติกจะแบ่งปันความรักเช่นเดียวกับเรา มติที่พวกเขาเพิ่งผ่านทำให้การดำรงชีวิตของเพื่อนเรา — และของเรา — ตกอยู่ในความเสี่ยง"

 origin.7600.name: "หว่านสิ่งใดได้สิ่งนั้น"
 origin.7600.desc: "ศัตรูของเราคิดว่าเราจะยอมจำนนต่อความแข็งแกร่งของพวกเขา ดั่งต้นอ้อที่ลู่ตามลม พวกเขาลืมไปว่าต้นไม้ก็มีหนาม\n\nทหารของเรานอนหลับอยู่ในผืนดินของพวกเขา หากมีความจำเป็นเกิดขึ้น เราสามารถเปลี่ยน §Hพืชต่างถิ่นที่แพร่กระจาย§! ให้กลายเป็นกองทัพ เพื่อปกป้องสิ่งที่เป็นของเราและบดขยี้สิ่งที่เป็นของพวกเขา เราเพียงแค่ต้องสั่งการเล็งลำแสงพลังงานไปยังดาวเคราะห์เป้าหมายเพื่อเริ่มการบุกโจมตีของเรา"

 origin.7710.name: "หว่านสิ่งใดได้สิ่งนั้น"
 origin.7710.desc: "§Hพืชต่างถิ่นที่แพร่กระจาย§! บนดาว §H[from.GetName]§! จู่ๆ ก็งอกกิ่งก้านแขนขาและเปลี่ยนสภาพเป็นกองทัพ ดาวเคราะห์กำลังถูกโจมตี!"

 MESSAGE_FRUITFUL_WEED_ARMY_TITLE: "กองทัพพืชงอกขึ้นมา"
 MESSAGE_FRUITFUL_WEED_ARMY: "เมล็ดพันธุ์บนดาว $PLANET|Y$ ได้เติบโตขึ้นจนกลายเป็นกองทัพ"

 opinion_nice_forests: "คนสวนที่เป็นมิตร"
 opinion_cut_our_forests: "ตัดแต่งสวนของเรา"

 opinion_voted_to_kill_tiyanki: "โหวตทำร้ายสัตว์อวกาศ"
 opinion_voted_to_help_tiyanki: "โหวตปกป้องสัตว์อวกาศ"

 fruitful_partnership_chain_title: "การกระจายพันธุ์ของเมล็ดพืช"
 fruitful_partnership_chain_desc: "สัตว์อวกาศจะนำฝักเมล็ดพันธุ์ §Yพ็อด§! ของเราไปยังดินแดนห่างไกล ด้วยสัมผัสของแสงดาว เมล็ดพันธุ์ของเราสามารถเบ่งบานกลายเป็นอาณานิคมใหม่ได้"

 fruitful_partnership_war_chain_title: "เมล็ดพันธุ์แห่งสงคราม"
 fruitful_partnership_war_chain_desc: "ในยามสงคราม ฝักเมล็ดพันธุ์ §Yพ็อด§! ของเราสามารถเติบโตเป็นกองทัพ พร้อมที่จะปกป้องดาวเคราะห์ของเราหรือบุกรุกเป้าหมายที่อยู่ห่างไกล"

 decision_uproot_weed: "ถอนพืชวัชพืชต่างถิ่นออก"
 decision_uproot_weed_desc: "กำจัดสถานะ $seeded_planet_2_modifier$ ออกจากดาวเคราะห์ดวงนี้"

 ## Seed Bombing
 bombardment_seed_bombing: "การระเบิดเมล็ดพันธุ์"
 bombardment_seed_bombing_desc: "การทิ้งระเบิดเมล็ดพันธุ์ ($bombardment_seed_bombing$) ปูพรมดาวเคราะห์ด้วยลูกเมล็ดพันธุ์ที่ผ่านการเสริมปุ๋ยเคมีขั้นสูง ทำให้เกิดการเติบโตอย่างระเบิดเร่งด่วน\n- §Eไม่สร้าง§! ความเสียหายต่อ §Yกองทัพ§!\n- สร้างความเสียหายระดับ §Hหนัก§! ต่อ §Yดาวเคราะห์§!\n- §Eไม่สร้าง§! ความเสียหายต่อ §Yประชากร (ประชากร)§!\n- จะระเบิดโจมตีดาวเคราะห์ที่ไม่มีการป้องกัน\n- ก่อให้เกิดสิ่งกีดขวางบนดาวเคราะห์"

 d_seed_bombing_plantoid_blocker: "การเติบโตของป่าไม้ป่าเถื่อนอย่างล้นหลาม"
 d_seed_bombing_plantoid_blocker_desc: "พื้นที่ส่วนนี้ของดาวเคราะห์ถูกครอบงำด้วยป่าไม้พืชต่างดาวที่เติบโตอย่างต่อเนื่องไม่หยุดยั้ง"

 d_seed_bombing_fungoid_blocker: "การเติบโตของเชื้อราอย่างระเบิดล้นหลาม"
 d_seed_bombing_fungoid_blocker_desc: "พื้นที่ส่วนนี้ของดาวเคราะห์ถูกครอบงำด้วยเห็ดราต่างดาวที่เติบโตอย่างต่อเนื่องไม่หยุดยั้ง"

 d_seed_bombing_blocker_custom_tooltip: "$d_decrepit_dwellings_custom_tooltip$\n"

 origin.7201.name: "การเติบโตอย่างรวดเร็วและระเบิดล้นหลาม"
 origin.7201.desc: "อาณานิคมของเราบนดาว §H[this.GetName]§! กำลังถูกถล่มด้วยลูกบอลเมล็ดพันธุ์ที่ได้รับการปฏิสนธิปุ๋ยขั้นสูง ป่าไม้ใหม่ๆ กำลังงอกเงยไปทั่ว พื้นดินแตกร้าว ทำลายอาคารบ้านเรือน และทำให้ [this.GetPlanetHabitat] เต็มไปด้วยพืชพรรณต่างดาวที่เติบโตอย่างรวดเร็ว"
 MESSAGE_FRUITFUL_SEED_BOMBING_TITLE: "การทิ้งระเบิดเมล็ดพันธุ์"
 MESSAGE_FRUITFUL_SEED_BOMBING: "การทิ้งระเบิดเมล็ดพันธุ์ทำให้เกิดสิ่งกีดขวางใหม่บนดาว $PLANET|Y$"

 ## Critters interactions

 # Amoebas
 story.101.desc.fruitful: "หากทำให้พวกมันสงบลงได้ พวกมันอาจเป็นพาหะนำพาฝักเมล็ดพันธุ์ของเราได้อย่างสมบูรณ์แบบที่สุด"
 story.107.fruitful.desc: "แม้ว่าพวกมันจะเป็นสัตว์กินเนื้อเป็นส่วนใหญ่ แต่ผลไม้เนื้อหนาที่เป็นทรงกลมที่เราพัฒนาขึ้นก็สามารถดึงดูดรสนิยมของพวกมันได้ดี"
 story.107.a.fruitful.tooltip: "สวนดาราเมล็ดพันธุ์ §H$sm_feeder$§! ของเราขณะนี้สามารถดึงดูดกองเรือ §Hสเปซอะมีบา§! ได้แล้ว"

 # Crystals
 story.201.desc.fruitful: "เราไม่แน่ใจว่าสิ่งมีชีวิตเหล่านี้สามารถกินอาหารได้หรือไม่ แต่หากทำได้ พวกมันอาจพิสูจน์ได้ว่าเป็นพาหะที่มีประโยชน์สำหรับเมล็ดพันธุ์ของเรา การทำให้พวกมันสงบลงจะช่วยให้เราทำการศึกษาเพิ่มเติมได้"
 story.207.fruitful.desc: "การพัฒนาผลไม้รสเลิศสำหรับสิ่งมีชีวิตเหล่านี้ถือเป็นความท้าทาย เราไม่แน่ใจว่าพวกมันกินผลไม้คล้ายแก้วที่เราสร้างขึ้น หรือพวกมันแค่ชอบพกพาพวกมันไปมาเนื่องจากหลงใหลในผิวสัมผัสที่เป็นเงางาม แต่แค่นั้นก็เพียงพอต่อความต้องการของเราแล้ว"
 story.207.a.fruitful.tooltip: "สวนดาราเมล็ดพันธุ์ §H$sm_feeder$§! ของเราขณะนี้สามารถดึงดูดกองเรือ §Hความจุแบบคริสตัล§! ได้แล้ว"

 # Study the Tyanki and get their tech
 origin.7000.name: "$story.501.name$"
 origin.7000.desc.common: "และเราได้เรียนรู้อะไรมากมายเกี่ยวกับสิ่งมีชีวิตที่เชื่องเหล่านี้แล้ว\n\nมีความสามารถในการเข้าถึงซับสเปซมิติที่ต่ำกว่า สิ่งมีชีวิตในอวกาศเหล่านี้จะเร่ร่อนจากระบบดาวหนึ่งไปยังอีกระบบดาวหนึ่งได้อย่างง่ายดายอย่างน่าทึ่ง พวกมันแทะเล็มก๊าซในชั้นบรรยากาศชั้นบนของดาวยักษ์ก๊าซหลายดวง แต่ก็ชอบผลไม้ของเราเป็นพิเศษ พวกมันจะไม่ค่อยเข้ามาโจมตีแม้ว่าจะถูกยั่วยุก็ตาม\n\nพาหะที่สมบูรณ์แบบสำหรับเมล็ดพันธุ์ของเรา: สงบ ไม่เป็นอันตราย และดูธรรมดา พวกมันมีความลับอะไรซ่อนอยู่หรือไม่?"
 origin.7000.desc.default: "§Yเทียนิกิ§! เป็นสิ่งมีชีวิตต่างดาวสายพันธุ์แรกที่เราเผชิญหน้า $origin.7000.desc.common$"
 origin.7000.desc.beastmasters: "§Yเทียนิกิ§! เป็นสิ่งมีชีวิตต่างดาวสายพันธุ์ใหม่ที่เราเผชิญหน้า $origin.7000.desc.common$"
 origin.7000.a: "อุทิศเวลาเพิ่มเติมเพื่อการศึกษาพวกมัน"
 origin.7000.b:"เรามีเรื่องอื่นที่สำคัญกว่าต้องทำ"

 TIYANKIS_PROJECT: "การเฝ้าสังเกตการณ์เทียนิกิ"
 TIYANKIS_PROJECT_DESC: "การอุทิศบุคลากรบางส่วนของสถานีอวกาศเพื่อศึกษาเทียนิกิจะมอบข้อมูลเชิงลึกเพิ่มเติมเกี่ยวกับชีวิตของสิ่งมีชีวิตในอวกาศที่รักสงบและลึกลับเหล่านี้"

 origin.7005.name: "$story.501.name$"
 origin.7005.desc: "ด้วยการศึกษาพฤติกรรมการกินอาหารของเพื่อนในอวกาศของเรา นักวิทยาศาสตร์ของเราได้ค้นพบทางวิศวกรรมที่ยิ่งใหญ่ $tech_space_whale_weapon_1_desc$ เทคโนโลยีนี้จะพิสูจน์ได้ว่ามีประโยชน์อย่างไม่ต้องสงสัย"

 ### Civics

 civic_idyllic_bloom:0 "ธรรมชาติบานสะพรั่ง"
 civic_idyllic_bloom_desc:0 "สังคมนี้อุทิศตนให้กับการดูแลรักษาสิ่งแวดล้อมและการปรับปรุงธรรมชาติมาเป็นเวลานาน เพื่อพยายามสร้างสวรรค์ที่แท้จริงให้แก่ผูอยู่อาศัย"
 civic_hive_idyllic_bloom:0 "ธรรมชาติในอุดมคติเกสตัลต์"
 civic_hive_idyllic_bloom_desc:0 "จิตสำนึกร่วม(หัวเราะ)คอยดูแลสิ่งแวดล้อม สรรสร้างสรวงสวรรค์เพื่อแสวงหาความสมบูรณ์แบบร่วมกัน"
