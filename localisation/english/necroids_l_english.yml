 necroids.202.name:0 "การเสียสละเสร็จสิ้น: ความเอื้ออารีเพื่อ [root.GetName]"
 necroids.202.desc:0 "ความรู้สึกผาสุกสามารถสัมผัสได้แล้วทั่วทั้ง [root.GetName] เมื่อผู้แสวงบุญมารวมตัวกันที่สถานที่สักการะบูชา บางครั้งพวกเขาก็นำสิ่งของมาถวาย หลายคนใช้ประโยชน์จากแผงลอยและพ่อค้าแม่ค้าข้างถนนจำนวนมากที่คอยให้บริการรอบสถานที่ศักดิ์สิทธิ์ของเรา\n\nพิธีกรรมต่างๆ ได้รับการปฏิบัติตามและมอบให้แก่ [mortal_initiate.GetNamePlural] ในรอบนี้ ซึ่งขบวนแห่ที่เงียบเชียบของพวกเขาได้รับการประดับประดาด้วยพวงมาลัยหลากชนิด $job_death_priest$ หลักที่ [capital_scope.GetName] ได้นำเทศนาที่สร้างแรงบันดาลใจ สัญญาถึงช่วงเวลาที่เอื้ออำนวยและสะดวกสบายสำหรับทุกคน\n\nเมื่อสิ้นสุดการเทศนา [mortal_initiate.GetName] แต่ละคนได้เข้าสู่ห้องบูชายัญเพื่อพบกับจุดสิ้นสุด ทิ้งมรดกไว้ในการศึกษาที่เปี่ยมเมตตา"
 necroids.202.tooltip.1:0 "$necroids.200.tooltip.base$ ผลผลิต §H£minerals£ แร่ธาตุ และ £energy£ พลังงาน +6%§!."
