 job_chronicle_drone_desc:0 "โดรนเฉพาะทางเหล่านี้มุ่งความสนใจไปที่เอนโทรปี โดยวิจัยการเน่าเปื่อยสลายตัวขั้นสุดท้ายเพื่อเป็นแนวทางตรงกันข้ามกับการดำรงอยู่ของเราต่อไป"
