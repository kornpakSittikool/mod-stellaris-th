 edict_sacrifice_bounty:0 "การเสียสละ: ความเอื้ออารี"
 edict_sacrifice_bounty_desc:0 "ผู้มีจิตศรัทธาที่สุดในหมู่พวกเราพร้อมเผชิญชะตากรรม หวังให้สังคมของเราอุดมสมบูรณ์ขึ้นด้วยการบวงสรวงครั้งสุดท้ายนี้ ให้ความตายชำระล้างเส้นทางสู่ชีวิตที่มีชีวิตชีวาและเปี่ยมความรุ่งโรจน์ในสารัตถะของมัน!"
 edict_sacrifice_bounty_tooltip:2 "§Rสังหาร [mortal_initiate.GetIcon] [mortal_initiate.GetNamePlural] ทั้งหมด§! แต่ละคนที่เสียสละจะเพิ่มโอกาสที่จะได้รับผลผลิตแร่ £minerals£ และพลังงาน £energy£ เพิ่มเติม $edict_sacrifice_unity_boost$"
