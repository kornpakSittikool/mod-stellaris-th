 necroids.201.name:0 "การเสียสละเสร็จสิ้น: ความสามัคคีปรองดองของ [root.GetAdj]"
 necroids.201.desc:0 "เสียงซุบซิบด้วยความตื่นเต้นดังไปทั่ว [root.GetName] ผู้แสวงบุญต่างเฝ้ารอที่สถานที่สักการะบูชาด้วยความตื่นเต้นซึ่งขัดกับความเหนื่อยล้าทางร่างกายที่พวกเขาอาจเผชิญ\n\nพิธีกรรมทางสังคมของเราได้รับการปฏิบัติตามและประดับประดาให้แก่ [mortal_initiate.GetNamePlural] ที่เพิ่งปรากฏตัว ซึ่งขบวนแห่ที่เงียบเชียบของพวกเขาได้รับการต้อนรับด้วยความขอบคุณอย่างสุภาพ $job_death_priest$ หลักที่ [capital_scope.GetName] ได้นำเทศนาที่สร้างพลัง เรียกร้องให้ผู้มีจิตศรัทธาไขว่คว้าความสุขในทุกช่วงเวลา เมื่อช่วงเวลาไคลแมกซ์มาถึง [mortal_initiate.GetName] แต่ละคนได้ก้าวเข้าสู่ห้องบูชายัญท่ามกลางเสียงปรบมืออย่างกึกก้อง บัดนี้แต่ละคนได้พบกับจุดสิ้นสุดแล้ว ทิ้งมรดกไว้ในการศึกษาที่เปี่ยมเมตตา"
 necroids.201.tooltip.1:0 "$necroids.200.tooltip.base$ ความสุขประชากร §H+10% £happiness£§!."
