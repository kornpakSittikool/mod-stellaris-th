 necroids.310.name:0 "แอนติไวรัส"
 necroids.310.desc:0 "พรีธอรีนพยายามแทรกซึมเข้าสู่ §Rพวกเรา§!!\n\nผู้บุกรุกนอกกาแล็กซีได้ยึดครอง [root.GetNecromancersLower] ของเราทันที จากจุดนั้น สิ่งมีชีวิตต่างดาวเริ่มรวบรวม [root.GetIndividualNamePlural] เพิ่มเติมจากบริเวณใกล้เคียง เราต้องทำลายฝักแทรกซึมทั้งหมดเพื่อรักษาความปลอดภัยของ [Root.GetName]"
 necroids.310.a:0 "พวกมันจำเป็นต้องได้รับการกำจัดทิ้ง"

 sm_cordyceptic_reanimation_facility:0 "โรงงานเพาะเชื้อราและฟื้นคืนชีพคอดดิเซติก"
 sm_cordyceptic_reanimation_facility_desc:0 "§Lโดยปกติเราต้องค้นหาร่างที่เพิ่งเสียชีวิตสำหรับการฟื้นคืนชีพศพของเรา แต่ด้วยระบบการสืบพันธุ์ เราสามารถแทรกซึมพวกมันได้ตั้งแต่ระยะแรกเริ่มและทำให้มีโฮสต์ที่พร้อมใช้งานอย่างต่อเนื่อง§!\n"
 requires_tiyanki_spawning_system:0 "§Rจำเป็นต้องสร้างขึ้นในระบบดาว §Yติ ยา นา เวก§!, §Yไทยอน ออร์ต§! หรือ §Yอะ มาร์ อัลเว โน§! เท่านั้น§!"
 sm_cordyceptic_reanimation_facility_desc_modifier:0 "จะผลิตกองยานฟื้นคืนชีพ §Yเรือรบที่ฟื้นฟูแล้ว§! ทุกๆ §G5 ปี§! เมื่อสร้างขึ้นในระบบดาวที่เต็มไปด้วยสิ่งมีชีวิตชีวภาพหนาแน่น"
