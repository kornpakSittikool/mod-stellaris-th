 galactic_features.385.reanimated:1 "ส่ง [Owner.GetNecromancersUpper] เข้าไป"
 distar.218.name:0 "คืนชีพอีกครั้ง"
 distar.218.desc.regular:0 "หลังจากทำพิธีกรรมอันยาวนาน §Yที ยัน คี มา ทริ ฟอร์ม§! ก็ได้ฟื้นคืนชีพกลับมาจากปรโลกและบัดนี้รับใช้เป้าหมายของเราแล้ว"
 distar.218.desc.hive:0 "การคืนชีพ §YTiyanki Matriarch§! นั้นยากเป็นพิเศษ แม้ว่าเราจะได้รับประสบการณ์มากมายในการเข้าควบคุมทายาทขนาดเล็กของมัน แต่ความสามารถในการฟื้นฟูของ Matriarch กลับสร้างภาระอย่างมากต่อโดรน Cordyceptic [root.GetNecromancersLower] ของเรา แต่ในท้ายที่สุดเราก็ได้รับชัยชนะ ไม่มีเนื้อเยื่อที่ตายแล้วชนิดใดจะสามารถปรับตัวได้เร็วกว่าเรา\n\nบัดนี้เมื่อเข้าควบคุม Matriarch แล้ว เราได้เคลื่อนไหวหนวดมหึมาของมัน"
 distar.218.desc.machine: "§Yที ยัน คี มา ทริ ฟอร์ม§! ได้รับการรีบูตและจัดสรรวัตถุประสงค์ใหม่ บัดนี้สิ่งมีชีวิตขนาดยักษ์นี้จะรับใช้เราในฐานะยูนิตอินทรีย์ เมื่อยกเลิกโปรโตคอลการควบคุมดั้งเดิม ลีไวอาธานนี้จะทำงานภายใต้การควบคุมของเรา"
 distar.5016.desc.regular:0 "นักฟื้นคืนชีพศพของเราได้นำร่างกลับคืนสู่ไข่ที่มันกำเนิดมา และฟักตัว §Yหมึก§! ขึ้นมาใหม่อีกครั้งเพื่อรับใช้เป้าหมายของเรา"
 distar.5016.desc.hive:1 "การส่งร่าง §Yหมึก§! กลับคืนสู่ไข่และฟักมันอีกครั้งได้รับการพิสูจน์แล้วว่ามีประสิทธิภาพอย่างยิ่ง ด้วยการใช้สารตั้งต้นโบราณที่ยังคงอยู่ภายในไข่ [root.GetNecromancersLower] ของเราปรับแต่งศพเพื่อให้รับใช้เราได้อย่างง่ายดาย\n\nเมื่อสิ่งมีชีวิตนี้อยู่ภายใต้การเชิดราวหุ่นกระบอก เราได้ควบคุมปีกของมันให้ขยับเขยื้อน"
 distar.5016.desc.machine: "ด้วยการใช้โปรโตคอลความเข้มสีเราสามารถชุบชีวิต §Yหมึก§! ที่ถูกกำจัดไปแล้ว ปีกทดแทนได้รับการหลอมขึ้นใหม่โดยใช้โลหะชีวภาพทดลอง"
 it_hungers:0 "มันหิวกระหาย"
 leviathans.675.desc.regular:0 "หลังจากทุ่มเทแรงกายแรงใจอย่างหนัก นักฟื้นคืนชีพศพของเราได้เติมพลังงานให้แก่ §Yเลื่อนหน้าต่างหมายเหตุ§! อีกครั้ง การรวมจิตสำนึกที่เกิดขึ้นนั้นสั่นคลอนและน่าขวัญผวา แต่เราจะถือว่านี่คือความสำเร็จตราบใดที่ลมหายใจอันร้อนระอุของมันยังคงทำงานอยู่"
 leviathans.675.desc.hive:0 "ชีววิทยาของ §Yเลื่อนหน้าต่างหมายเหตุ§! ในตอนแรกดูเหมือนจะทะลวงเข้าไปไม่ได้ แทนที่จะเจาะระบบประสาทส่วนกลางและควบคุมจากจุดนั้น เรากลับถูกบังคับให้เปลี่ยนเส้นประสาททุกเส้นของมันด้วยเส้นประสาทเทียม [root.GetIndividualName]\n\nมาดูกันว่าเราจะทำให้ร่างแห้งนี้คำรามได้หรือไม่"
 leviathans.675.desc.machine: "การคำนวณซากของ §Yเลื่อนหน้าต่างหมายเหตุ§! ระบุว่ามันเก่าแก่กว่า 922337203685477580-\n\n§Rการปลดปล่อย§!\n\nการศึกษาเพิ่มเติมจะสามารถเข้าถึงได้ง่ายขึ้น บัดนี้เราได้แทนที่โครงสร้างภายในของมันด้วยเครื่องปฏิกรณ์ทดลองขั้นสูงของเราแล้ว"
 ancrel.4026.desc.regular:0 "เธอบินได้อีกครั้ง §Yแผ่นใส§! ผู้เคยละโมบได้กลับมาเฝ้าดูระบบดาว [from.solar_system.GetName] แต่คราวนี้เธอจะปกป้องตัวถอดรหัสเพื่อพวกเรา!"
 ancrel.4026.desc.hive:0 "§Yแผ่นใส§! ผู้เคยมีความอยากได้ใคร่ดีและโดดเดี่ยวบัดนี้สงบนิ่งลงแล้ว เราได้ยึดร่างอันเฉื่อยชาของเธอและทำลายบุคลิกภาพรวมถึงศูนย์ควบคุมภาษาของเธอทิ้งไป เมื่อตัดระบบที่ไร้ประโยชน์เหล่านี้ออก ลมหายใจอันร้อนระอุของเธอก็พร้อมอยู่ใต้บัญชาของเราแล้ว"
 ancrel.4026.desc.machine: "เราได้เริ่มต้นโปรโตคอลความเข้มสีและคืนชีพสิ่งมีชีวิตชีวภาพที่ถูกระบุในรหัส §Yแผ่นใส§! พลส์ของประสาทไซแนปส์กำลังยิงสัญญาณภายในค่าตัวแปรที่คาดการณ์ไว้ มังกรขนาดยักษ์ได้รับการเปิดใช้งานอีกครั้งและบัดนี้จะตอบสนองต่อคำสั่งของเรา"
 distar.340.desc:0 "ข่าวการตายของ [Root.Fleet.GetName] แพร่สะพัดไปทั่ว [Root.Owner.GetName] อะมีบานี้เป็นสหายที่อยู่เคียงข้างชาติเรามาเป็นเวลานานมาก ทว่า นักฟื้นคืนชีพศพของเรากลับมีกิจกรรมอย่างผิดปกติหลังจากข่าวเศร้าสลดนี้ และบัดนี้พวกเขามีวิธีแก้ปัญหาให้แก่ประเทศที่กำลังโศกเศร้าของเรา พวกเขาไม่ได้อธิบายว่าอย่างไร แต่บอกว่าพวกเขาสามารถนำ [Root.Fleet.GetName] กลับคืนมาหาเราได้"
 distar.340.desc.science:0 "ข่าวการตายของ [Root.Fleet.GetName] แพร่สะพัดไปทั่ว [Root.Owner.GetName] ทว่าไม่มีใครได้รับผลกระทบมากเท่ากับเจ้าหน้าที่วิทยาศาสตร์ [amoeba_finding_scientist.GetName] เขาเป็นคนแรกที่ค้นพบสเปซอะมีบาในสภาพเด็กที่หลงทางและไร้ที่พึ่ง และเฝ้าดูสิ่งมีชีวิตนี้เติบโตจนโตเต็มที่ภายใต้การแนะนำอันอ่อนโยนของเขาเอง\n\nบัดนี้ หากปราศจากความเป็นสหายที่เงียบงันของ [Root.Fleet.GetName] เจ้าหน้าที่ [amoeba_finding_scientist.GetName] อาจไม่เหมือนเดิมอีกต่อไป"
 distar.340.a:0 "จงตื่นขึ้น [Root.Fleet.GetName] จงตื่นขึ้น!"
 distar.340.b:0 "ปล่อยให้อะมีบาที่หลับไหลได้พักผ่อนเถอะ"
 distar.59.desc:0 "§Y[reanimated_amoeba.Fleet.GetName]§! มีชีวิตอยู่รึ?! หรืออย่างน้อยเธอก็กำลังเคลื่อนไหว เราไม่เข้าใจจริงๆ ว่า [amoeba_finding_scientist.GetName] ทำอะไรลงไป แต่ด้วยความสิ้นหวังและความบ้าคลั่งทางวิทยาศาสตร์ อะมีบาที่รักของเราก็ได้โบยบินร่วมกับเราอีกครั้ง"
 distar.59.desc.science:0 "§Y[reanimated_amoeba.Fleet.GetName]§! มีชีวิตอยู่รึ?! หรืออย่างน้อยเธอก็กำลังเคลื่อนไหว เราไม่เข้าใจจริงๆ ว่านักฟื้นคืนชีพศพของเราทำอะไรลงไป แต่ด้วยความสิ้นหวังและความบ้าคลั่งทางวิทยาศาสตร์ อะมีบาที่รักของเราก็ได้โบยบินร่วมกับเราอีกครั้ง"

 REANIMATE_TIYANKI_MATRIARCH:0 "ชุบชีวิตที ยัน คี มา ทริ ฟอร์ม"
 REANIMATE_TIYANKI_MATRIARCH_DESC:2 "[Owner.GetNecromancersLower] ของเราได้วางแผนเพื่อนำที ยัน คี มา ทริ ฟอร์มกลับคืนมาจากความตาย เพื่อให้เธอรับใช้เราและต่อสู้เคียงบ่าเคียงไหล่กับกองยานของเรา"
 REANIMATE_VOIDSPAWN:0 "ชุบชีวิตหมึกผู้พ่ายแพ้"
 REANIMATE_VOIDSPAWN_DESC:2 "ผ่านวิธีการที่ไม่ควรพูดถึงเสียงดัง [Owner.GetNecromancersLower] ของเรายืนยันว่าพวกเขาสามารถชุบชีวิต §Yหมึก§! ให้มารับใช้เราและต่อสู้เคียงบ่าเคียงไหล่กับกองยานของเราได้"
 REANIMATE_ROCK_BRAIN:0 "ชุบชีวิตร็อคเบรน"
 REANIMATE_ROCK_BRAIN_DESC:0 "แม้ว่าสิ่งมีชีวิตโบราณนั้นอาจคิดอย่างไร จักรวาลก็ยังคงดำเนินต่อไปนอกเหนือจากร่างแห้งที่ตายแล้วของมัน การใช้ศาสตร์ต้องห้ามบวกกับวิทยาศาสตร์ยุคใหม่ นักฟื้นคืนชีพศพของเราเชื่อว่าสามารถลบล้างความเชื่อดั้งเดิมของมันและชุบชีวิตกลับมาได้"
 REANIMATE_GUARDIAN_DRAGON:0 "ชุบชีวิตมังกรเลื่อนหน้าต่างหมายเหตุ"
 REANIMATE_GUARDIAN_DRAGON_DESC:2 "[Owner.GetNecromancersLower] ของเราเชื่อว่าสามารถปลุกวิญญาณภายใน §Yเลื่อนหน้าต่างหมายเหตุ§! ได้ผ่านการผสมผสานของพิธีกรรมและวิทยาศาสตร์: การรวบรวมพลาสมาจากดาวฤกษ์ท้องถิ่น การติดตั้งเครื่องยนต์เชื้อราคอร์ไดเซปส์เข้ากับศพ และอื่นๆ"
 REANIMATE_SHARD_DRAGON:0 "ฟื้นคืนชีพมังกรแผ่นใส"
 REANIMATE_SHARD_DRAGON_DESC:2 "มังกร §Yแผ่นใส§! ผู้น่าสะพรึงกลัวและผู้พิทักษ์ตัวถอดรหัสบัดนี้เป็นเพียงซากศพโคจรรอบดาวฤกษ์ท้องถิ่น [Owner.GetNecromancersLower] ของเราเสนอว่า ในเมื่อมังกรร้ายเคยเฝ้าตัวถอดรหัสในยามมีชีวิต มันก็ควรรับใช้ผู้ปกครองคนใหม่ของตัวถอดรหัสในยามตายเช่นกัน"
 REANIMATE_LOST_AMOEBA:0 "ชุบชีวิตอะมีบาที่สูญเสียไป"
 REANIMATE_LOST_AMOEBA_DESC:0 "พวกเราไม่เข้าใจวิธีการนัก แต่นักฟื้นคืนชีพศพของเราได้เตรียมที่จะนำอะมีบาที่จากไปกลับคืนมา"
 REANIMATE_LOST_AMOEBA_DESC_SCIENCE:0 "พวกเราไม่เข้าใจวิธีการนัก แต่นำโดย [amoeba_finding_scientist.GetName] นักฟื้นคืนชีพศพของเราได้เตรียมที่จะนำอะมีบาที่จากไปกลับคืนมา"

 # Mechromancy AP event
 necroids.20.name: "ติดตั้งการอัปเกรดความเข้มสีแล้ว"
 necroids.20.desc: "การติดตั้งโปรโตคอลความเข้มสีได้สำเร็จจะช่วยให้เราสามารถชุบชีวิตลีไวอาธานบางตัวที่ตายไปแล้วได้ ส่วนประกอบอินทรีย์นั้นด้อยกว่าการอัปเกรดเชิงกล เราสามารถดัดแปลงเนื้อหนังและผลิตซ้ำสิ่งมีชีวิตอินทรีย์เทียมขึ้นมาได้"
 necroids.20.a: "เปิดใช้งานฟังก์ชันฟื้นคืนชีพแล้ว"

 ### Galactic Memorials (Memorialists) by Gemma Thomson

 building_galactic_memorial_1:0 "วิหารแห่งการพักผ่อนหลังความตาย"
 building_galactic_memorial_1_desc:0 "อนุสรณ์สถานอันสมถะนี้มุ่งเน้นความคิดและการศึกษาไปที่ธรรมชาติที่หลากหลายของความตายและจุดจบ"
 building_galactic_memorial_2:0 "เสาหลักแห่งการดับสูญ"
 building_galactic_memorial_2_desc:0 "สถานที่อันสง่างามที่อุทิศให้กับการใคร่ครวญถึงความตาย ซึ่งจุดจบมากมายอาจถูกบันทึกไว้ ณ ที่แห่งนี้"
 building_galactic_memorial_3:0 "อนุสรณ์สถานกาแล็กติก"
 building_galactic_memorial_3_desc:0 "หอสมุดขนาดใหญ่ที่รวบรวมทุกสิ่งที่อาจจะหรืออาจจะไม่เข้าใจเกี่ยวกับจุดจบ บันทึกไว้เพื่อส่งต่อไปยังอนาคตกาลอันยาวนาน"
 building_galactic_memorial_regular_tooltip: "§Hสถาน ที่ พัก ผ่อน หย่อน ใจ§! จะปรับปรุง §Hการ ประทับ ใจ จาก การ ปกครอง§! บนดาวสุสาน §Hโลกของหมึก§! และดาวรุ่งเรืองในอดีต §Hสร้างโลกใหม่§!"
 building_galactic_memorial_gestalt_tooltip: "§Hสถาน ที่ พัก ผ่อน หย่อน ใจ§! จะลดค่าความเบี่ยงเบน §Hความแหลม:§! บนดาวสุสาน §Hโลกของหมึก§! และดาวรุ่งเรืองในอดีต §Hสร้างโลกใหม่§!"
 job_death_chronicler:0 "นักประวัติศาสตร์ความตาย"
 job_death_chronicler_plural:0 "นักประวัติศาสตร์ความตาย"
 job_death_chronicler_desc:0 "เอนโทรปีคือขอบเขตการศึกษาของนักวิชาการเหล่านี้ ผู้เฝ้าสังเกตและบันทึกความตายและผลกระทบของมันในรูปแบบการแสดงออกอันหลากหลาย"
 job_death_chronicler_effect_desc: "£job_death_chronicler£ $job_death_chronicler_plural$ เปลี่ยน $r_consumer_goods$ เป็น $r_unity$, $r_stability$, และ:[GetCivilianSpiMatOutput][GetCivilianEgalAuthOutput][GetCivilianMilPacOutput][GetCivilianXenoOutput]\n\nผลลัพธ์ของ £job_death_chronicler£ $job_death_chronicler_plural$ จะแตกต่างกันไปตามอุดมการณ์ของจักรวรรดิ\n\n"
 job_death_chronicler_simple_effect_desc: "£job_death_chronicler£ $job_death_chronicler_plural$ เปลี่ยน $r_consumer_goods$ เป็น $r_unity$ และ $r_stability$ รวมถึงสืบทอดตัวแปรปรับปรุงผลลัพธ์ §Hใช้พื้นฐานพื้นฐาน§! จาก [civilian.GetIcon] [civilian.GetNamePlural]"
