 job_necromancer_plural:1 "เนโครแมนเซอร์"
 job_necromancer_plural_with_icon: "£job_necromancer£ $job_necromancer_plural$"
 job_necromancer_desc:0 "การปลุกศพขึ้นมาต่อสู้ในกองทัพของชาติเป็นงานหนัก มีเพียงผู้ฝึกฝนที่มีทักษะมากที่สุดเท่านั้นที่รู้ศาสตร์ลี้ลับที่จำเป็นในการบรรลุผลสำเร็จนี้!"
