 ### Permanent Employment by Victor Haeggman
 civic_permanent_employment:0 "การจ้างงานแบบถาวร"
 civic_permanent_employment_desc:0 "บรรษัทข้ามชาตินี้รับประกันว่าพนักงานจะไม่มีวันตกงาน ไม่มีวัน หลังจากหมดเวลาของชีวิตพนักงานแล้ว พวกเขาจะถูกปรับเปลี่ยนเป้าหมายหน้าที่สำหรับงานที่ง่ายขึ้น เพื่อให้พวกเขายังสามารถจุนเจือครอบครัวและชำระหนี้สินของตนได้ต่อไป"
 civic_tooltip_permanent_employment_effects:3 "สามารถสร้าง £building£ §Y$building_posthumous_employment_center$§!\n$job_reassigner_effect_desc$\n\nมอบการเข้าถึงยึดไว้ในดาวเมืองขึ้น £building£ §Y$holding_reemployment_center$§!\n\nลีไวอาธานสิ่งมีชีวิตอินทรีย์ที่พ่ายแพ้บางตัวสามารถฟื้นคืนชีพขึ้นมาได้"
 civic_tooltip_corporate_permanent_employment_effects:0 "$civic_tooltip_permanent_employment_effects$\n£building£ §Y$building_food_conglomerate$§! $megacorp_civic_branch_office_building_effect$"
 job_reassigner:0 "ผู้รับโอนสิทธิ์ใหม่"
 job_reassigner_desc:0 "ผู้รับโอนสิทธิ์ใหม่จะช่วยยืนยันว่าเมื่อพลเมืองของบรรษัทข้ามชาติล่วงลับไปแล้ว ร่างกายของพวกเขาจะยังคงทำงานต่อไปจนกว่าสัญญาจะสิ้นสุดลง"
 job_reassigner_plural:0 "ผู้รับโอนสิทธิ์ใหม่"
 job_reassigner_effect_desc: "£job_necromancer£ [reassigner.GetNamePlural] เปลี่ยน £consumer_goods£ §Y$consumer_goods$§! และ £food£ §Y$food$§! (หรือเทียบเท่า) เป็น £mod_logistic_growth_mult£ §Y$MOD_BONUS_POP_GROWTH$§! ประชากร £pop£ ที่ถูกสร้างทั้งหมดจะมีคุณลักษณะ §Y$trait_zombie$§!"
 planet_reassigners:0 "งาน ผู้รับโอนสิทธิ์ใหม่"
 mod_job_reassigner_add:0 "งาน [reassigner.GetName]"
 trait_zombie:0 "ซอมบี้"
 trait_zombie_desc:0 "§Lซากศพของสิ่งมีชีวิตที่เคยมีความภูมิใจ ร่างแห้งนี้ไม่เหมาะสมกับสิ่งใดมากไปกว่างานที่เรียบง่ายที่สุด§!"
 TRAIT_ZOMBIE_EFFECT:0 "$MOD_POP_BONUS_WORKFORCE_MULT$: §R-25%§!\n$t$- $civilian_and_maintenance_drone_cat_bonus_workforce_mult$: §R-50%§!\n$t$- ลดค่าบำรุงประชากรลง: §G100%§!\n$t$- ไม่สามารถสร้างผู้นำ §Yผู้นํา§! ได้\n$t$- ไม่สามารถจ้างงานในอาชีพ §Y$pop_cat_ruler$§! หรือ §Y$pop_cat_specialist$§! ได้"
 building_posthumous_employment_center:0 "ศูนย์จัดหางานไปรษณีย์"
 building_posthumous_employment_center_desc:0 "ที่ศูนย์จัดหางานไปรษณีย์ซากศพที่ปราศจากจิตสำนึกสามารถค้นพบจุดประสงค์ใหม่และโอกาสใหม่ในการชำระหนี้สินของพวกเขา"
 edict_sacrifice_bounty_zombie:0 "$edict_sacrifice_bounty$"
 edict_sacrifice_bounty_zombie_desc:0 "ผู้มีจิตศรัทธามากที่สุดในหมู่พวกเราพร้อมที่จะเผชิญหน้ากับโชคชะตา ยินดีที่จะสละชีวิตเพื่อสังคมที่ดีขึ้น ความตายของเราจะนำมาซึ่งคุณค่าทางธุรกิจที่เจริญรุ่งเรือง และร่างกายของเราจะรับใช้บรรษัทต่อไป"
 edict_sacrifice_bounty_zombie_tooltip: "$edict_sacrifice_bounty_tooltip$\nเพิ่ม §G+1§! £mod_logistic_growth_mult£ §Y$MOD_BONUS_POP_GROWTH$§! ให้กับงาน £job_necromancer£ [reassigner.GetNamePlural]"

 necroids.260.name:0 "ซอมบี้โดรนผู้ขยันขันแข็ง"
 necroids.260.desc:0 "คณะผู้บริหารระดับสูงของเราเพิ่งมารวมตัวกันในการประชุมโฮโลแกรมเพื่อหารือเกี่ยวกับการเติบโตของยอดขายผลิตภัณฑ์สุขอนามัยของซอมบี้ เมื่อผู้ช่วยของผู้บริหารฝ่ายสินทรัพย์ฟื้นคืนชีพคนหนึ่งพังประตูเข้ามาในห้องประชุม \"ซอมบี้ตัวหนึ่งบน §Y[debt_free_zombie.Planet.GetName]§! ชำระหนี้หมดแล้วครับ!\" พวกเขาโพล่งออกมาก่อนที่จะสังเกตว่าได้ขัดจังหวะการประชุม ความเงียบงันแผ่ซ่านก่อนที่ห้องประชุมจะแตกตื่น ผู้บริหารทุกคนต่างต้องการทราบว่าเรื่องนี้จะส่งผลกระทบต่อการจัดหาคนงานที่คืนชีพอย่างไร\n\nหลังจากวิเคราะห์เพิ่มเติม ปรากฏว่านี่เป็นเพียงกรณีที่หายากอย่างยิ่ง เฉพาะผู้เสียชีวิตที่ร่างคงอยู่นานถึงหนึ่งศตวรรษเท่านั้นที่ชำระหนี้หมด—ซึ่งเป็นจำนวนที่น้อยนิดมากในภาพรวม บรรษัทดาราจักรของเราแทบไม่สังเกตเห็นหากปล่อยให้พวกเขาได้พักผ่อนอย่างสงบ"
 necroids.260.a:0 "พวกเขาได้รับอิสรภาพแล้ว ปล่อยให้พวกเขาพักผ่อนเถอะ"
 necroids.260.b:0 "แค่เติมเลข 0 เพิ่มเติมเข้าไปในหนี้สินของพวกเขา"

 zombie_contract_manipulation:0 "การจัดการสัญญาซอมบี้"
 zombie_contract_manipulation_desc:0 "จักรวรรดินี้ได้ตกแต่งสัญญากับคนงานซอมบี้ของพวกเขา เพื่อทำให้เป็นไปไม่ได้เลยที่จะปลดหนี้สินพ้นตัว"

 ### Cordypectic Drones by Victor Haeggman
 civic_hive_cordyceptic_drones:0 "โดรนคอดดิเซติก"
 civic_hive_cordyceptic_drones_desc:0 "โดรนเฉพาะทางสูงที่มีความสามารถในการติดเชื้อในตัวโฮสต์ระดับต่ำและออกคำสั่งพื้นฐาน เป็นกระดูกสันหลังในการป้องกันความมั่นคงทางทหารในระบบดาราจักรของรังนี้"
 civic_tooltip_cordyceptic_drones:0 "- เริ่มเกมด้วย §Hอะ มา โอ บา§! จำนวน §G3§! ตัว\n- สัตว์อวกาศอินทรีย์ที่พ่ายแพ้จะฟื้นคืนชีพโดยอัตโนมัติ\n- ลีไวอาธานอินทรีย์บางตัวที่พ่ายแพ้สามารถฟื้นคืนชีพขึ้นมาได้\n- $reanimator_effect_desc$\n- ได้รับ £genetic_material£ ['concept_dna'] จากการล่าสัตว์อวกาศอินทรีย์\n"
 civic_wilderness_cordyceptic_drones: "สิ่งมีชีวิตพึ่งพาคอดดิเซติก"
 civic_wilderness_cordyceptic_drones_desc: "สิ่งมีชีวิตกลุ่มราบางประเภทที่มีการอยู่ร่วมกันแบบพึ่งพากันอย่างเฉพาะทางสูง ช่วยให้ป่าดงพงไพรนี้สามารถป้องกันตนเองได้โดยการติดเชื้อในตัวโฮสต์ระดับต่ำและออกคำสั่งพื้นฐาน"

