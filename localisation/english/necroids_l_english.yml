 # Synced from vanilla by Stellaris Thai Translator.
 # These keys were missing from the mod and should be translated on the next pass.
 START_SCREEN_NECROPHAGE_NOMADS: "ในอดีตอันไกลโพ้น เรือลําใหญ่ที่จะกลายเป็นของเรา สําหรับผู้ชมทุกคน พวกเขาดูเหมือนจะได้ปฏิบัติตาม หลักสูตรมาตรฐานการท่องเที่ยวของการพัฒนา กับช่วงเวลาที่รวดเร็วบางครั้งของนวัตกรรม อย่างไรก็ตาม พวกเขาไม่รู้จัก เรือของพวกเขามีสิ่งมีชีวิตที่ชาญฉลาดอย่างที่สอง\n\nสําหรับพันปี, เรา,[GetSpeciesNamePlural]ยังคงมองไม่เห็นในทางเดินที่ถูกลืมของเรือ และห้องที่ปิดตาย ข่าวลือที่คลุมเครือของความหวาดกลัวในความมืด เราเป็นนิทานบอกเพียง แต่พวกเขาคิดผิดที่ดูถูกเรา\n\nขณะ ที่ อัตรา ความ ก้าว หน้า ทาง เทคโนโลยี ของ พวก เขา เพิ่ม ขึ้น เรื่อย ๆ เรา ก็ เช่น กัน ได้ แทรกซึม เข้า มา ใน สังคม ของ พวก เขา.\n\nเมื่อ การ ล่ม สลาย ของ พวก เขา มา ถึง ก็ เร็ว และ เลือด ตก. เรายึดการควบคุมของเรืออย่างไร้ความปราณี, เครื่องราชอิสริยาภรณ์ของเราลดลงเป็น อนุเคราะห์และค่อยๆดูดซึมเข้าไปใน[GetSpeciesName]การแข่งขัน\n\nเรือเป็นของเราแล้ว หัวของเรือจะตั้ง เราพร้อมที่จะกําหนดเส้นทางของเราเอง ผ่านดาวและสร้างทุกสปีชีส์ ในภาพของเรา!"
