 MESSAGE_NECROPHAGE_POPS_NECROPHAGED:1 "เราได้แปลงสภาพ $VALUE|Y$ £pop£ §Hป๊อป§! มาเป็นเผ่าพันธุ์ของเราในพิธียกระดับบน $PLANET|Y$"

 START_SCREEN_NECROPHAGE_BASE:0 "ในอดีตที่ไม่ไกลนัก [GetHomeWorldName] ถูกครอบครองโดยเผ่าพันธุ์ที่ค่อนข้างธรรมดา สำหรับผู้สังเกตการณ์ภายนอก พวกเขาดูเหมือนจะพัฒนาไปตามปกติธรรมดา โดยมีช่วงเวลานวัตกรรมที่รวดเร็วสลับกับช่วงเวลาที่ยาวนานกว่าของอุปสรรคที่ดูเหมือนไม่มีทางผ่านไปได้ ทว่า โดยที่พวกเขาไม่รู้ตัว ดาวเคราะห์ของพวกเขายังเป็นบ้านของสิ่งมีชีวิตทรงภูมิปัญญาจำพวกที่สอง นั่นคือพวกเรา\n\nเป็นเวลาหลายพันปีที่พวกเรา—ชาว [GetSpeciesNamePlural]—ยังคงไม่ถูกตรวจพบโดยผู้ครอบครองดาวเคราะห์ดั้งเดิม พวกเราเป็นเพียงข่าวลืออันเลือนลางของความสยดสยองในยามค่ำคืน เป็นนิทานปรัมปราที่เล่าเพื่อทำให้เด็กๆ กลัว ทว่าพวกเขานั้นคิดผิดที่ละเลยพวกเรา\n\nเมื่ออัตราความก้าวหน้าทางเทคโนโลยีของพวกเขารวดเร็วขึ้น การแทรกซึมเข้าสู่สังคมของพวกเราก็รวดเร็วขึ้นตามไปด้วย"
 START_SCREEN_NECROPHAGE:1 "$START_SCREEN_NECROPHAGE_BASE$ เมื่อยามที่พวกเขาล่มสลายลง มันเกิดขึ้นอย่างรวดเร็วและนองเลือด พวกเราเข้าควบคุมดาวเคราะห์อย่างไร้ความปรานี—บรรพบุรุษผู้เบิกทางของเราถูกลดสถานะลงมาเป็นผู้รับใช้และค่อยๆ ถูกดูดซับเข้าสู่เผ่าพันธุ์ [GetSpeciesName]\n\nบัดนี้เมื่อมีเทคโนโลยีความเร็วที่เพิ่งค้นพบใหม่ เราก็พร้อมที่จะเดินทางสู่หมู่ดาวเพื่อสร้างเผ่าพันธุ์ทั้งหมดในกาแล็กซีใหม่ในแบบฉบับของเรา!"
 START_SCREEN_NECROPHAGE_PEACEFUL:0 "$START_SCREEN_NECROPHAGE_BASE$ ในท้ายที่สุด เราค่อยๆ สามารถเข้าควบคุมดาวเคราะห์ได้ โดยลดสถานะผู้ครอบครองเดิมให้กลายเป็นผู้รับใช้และค่อยๆ ถูกดูดซับเข้าสู่เผ่าพันธุ์ [GetSpeciesName]\n\nบัดนี้เมื่อมีเทคโนโลยีความเร็วที่เพิ่งค้นพบใหม่ เราก็พร้อมที่จะเอื้อมมือไปสู่ดวงดาวและยึดครองตำแหน่งท่ามกลางกลุ่มประเทศท่องอวกาศของกาแล็กซี!"
 START_SCREEN_NECROPHAGE_HIVE:0 "$START_SCREEN_NECROPHAGE_BASE$ ในท้ายที่สุด พวกเราก็พร้อมแล้ว ความเหนือกว่าของจิตสำนึกร่วมของเราปรากฏชัดเจนเมื่อเราเข้าควบคุมดาวเคราะห์อย่างไร้ความปรานี—บรรพบุรุษผู้เบิกทางของเราถูกลดสถานะลงเป็นผู้รับใช้และค่อยๆ ถูกดูดซับเข้าสู่จิตสำนึกร่วม [GetSpeciesName]\n\nบัดนี้เมื่อมีเทคโนโลยีความเร็วที่เพิ่งค้นพบใหม่ เราก็พร้อมที่จะเดินทางสู่หมู่ดาวเพื่อสร้างเผ่าพันธุ์ทั้งหมดในกาแล็กซีใหม่ในแบบฉบับของเรา!"
 necroids.2.name:0 "พิธียกระดับบน [Root.Capital.GetName]"
 necroids.2.desc:0 "นับตั้งแต่ชาว [Root.GetAdj] เข้ายึดครอง [Root.Capital.GetName] การเปลี่ยนสภาพของ [necrophage_species.GetNamePlural] ไปเป็น [Root.GetSpeciesNamePlural] ได้ถูกห่อหุ้มด้วยพิธีกรรม ทุกๆ สิบปี ซึ่งเป็นวันที่ใกล้เข้ามาอย่างรวดเร็ว เหล่า \"ผู้ฝึกหัด\" จะมารวมตัวกันในห้องยกระดับสำหรับพิธีพิเศษ สิ่งที่เกิดขึ้นกับพวกเขานั้นเป็นความลับที่ปกป้องอย่างเข้มงวดซึ่งมีเพียงไม่กี่คนเท่านั้นที่รู้ แต่เมื่อพวกเขาออกมา พวกเขาก็กลายเป็น [Root.GetSpeciesNamePlural]"
 necroids.2.desc.gestalt:0 "นับตั้งแต่ชาว [Root.GetAdj] เข้ายึดครอง [Root.Capital.GetName] การเปลี่ยนสภาพของ [necrophage_species.GetNamePlural] ไปเป็น [Root.GetSpeciesNamePlural] ได้ถูกห่อหุ้มด้วยพิธีกรรม ทุกๆ สิบปี ซึ่งเป็นวันที่ใกล้เข้ามาอย่างรวดเร็ว เหล่า \"ผู้ฝึกหัด\" จะมารวมตัวกันในห้องยกระดับสำหรับพิธีพิเศษ สิ่งที่เกิดขึ้นกับพวกเขานั้นเป็นความลับที่ปกป้องอย่างเข้มงวดโดยจิตสำนึกร่วมของเรา แต่เมื่อพวกเขาออกมา พวกเขาก็กลายเป็นโดรน [Root.GetSpeciesAdj]"
 necroids.2.A:0 "เริ่มการเตรียมการได้!"
 necroids.2.A.tooltip:1 "เมื่อสิ้นปีนี้ เหล่า §H[necro_apprentice.GetNamePlural]§! ทั้งหมดบน §H[Root.Capital.GetName]§! จะได้รับการเปลี่ยนสภาพเป็น §H[Root.GetSpeciesNamePlural]§!\n\nพิธีนี้จะจัดขึ้นทุกๆ §H10 ปี§! บนดาวเคราะห์ [Root.GetAdj] แต่ละดวงที่มี §Hห้อง ชั้น บน§!"

 ### Sacrificial Temple (Death Cult) by Gemma Thomson

 building_sacrificial_temple_1:0 "วิหารแห่งการบวงสรวง"
 building_sacrificial_temple_1_desc:0 "สถานที่ศักดิ์สิทธิ์ซึ่งเหล่านักบวชผู้เคร่งขรึมและศิษย์ผู้ทุ่มเทร่วมสวดอ้อนวอนและอุทิศตนเพื่อวงจรที่เจริญรุ่งเรืองทว่าเปื้อนเลือดในแต่ละรอบ"
 building_sacrificial_temple_2:0 "วิหารโฮโลที่น่ากลัว"
 building_sacrificial_temple_2_desc:0 "การปรับปรุงทางเทคโนโลยีในอาคารศักดิ์สิทธิ์นี้ช่วยให้สามารถศึกษาได้อย่างจริงจังยิ่งขึ้น และสร้างความรู้สึกศรัทธาอย่างชัดเจนต่อเป้าหมายที่อยู่เหนือผนังอันเปลี่ยนแปลงได้"
 building_sacrificial_temple_3:0 "วิหารแห่งการบวงสรวงอันยิ่งใหญ่"
 building_sacrificial_temple_3_desc:0 "สถานที่บวงสรวงอันสูงสุดที่ซึ่งระบบจำลองการรับรู้หลายทิศทางช่วยให้ผู้มีจิตศรัทธาสามารถยกย่องทุกการเสียสละของ [This.Owner.GetAdj] ทั้งในอดีต ปัจจุบัน และอนาคต"
