 sacrifice_togetherness_mod_overlord_desc:0 "ผู้ปกครองสูงสุดได้ทำพิธีกรรมที่แปลกประหลาดแต่ดึงดูดใจอย่างน่าประหลาดใจ ประชาชนของเราบางส่วนถูกสังเวยไป แต่พวกเรารู้สึกใกล้ชิดกันยิ่งขึ้นกว่าเดิม"

 edict_sacrifice_harmony:0 "การเสียสละ: ความสามัคคีปรองดอง"
 edict_sacrifice_harmony_desc:0 "ผู้มีจิตศรัทธาที่สุดในหมู่เราพร้อมเผชิญชะตากรรม การเสียสละครั้งสุดท้ายของพวกเขาคือช่วงเวลาแห่งการเฉลิมฉลองอันน่ายินดีในเป้าหมาย ให้ทุกๆ วันผ่านไปด้วยการให้เกียรติแก่ชีวิตที่ดี!"
 edict_sacrifice_harmony_tooltip:2 "§Rสังหาร [mortal_initiate.GetIcon] [mortal_initiate.GetNamePlural] ทั้งหมด§! แต่ละคนที่เสียสละจะเพิ่มโอกาสที่จะได้รับโบนัสความสุขประชากรเพิ่มเติม $edict_sacrifice_unity_boost$"
 sacrifice_harmony_mod:0 "การเสียสละเพิ่มเติม: ความสามัคคีปรองดอง"
 sacrifice_harmony_mod_desc:0 "ผู้มีจิตศรัทธามากที่สุดในหมู่พวกเราได้เผชิญชะตากรรมแล้ว การเสียสละของพวกเขาค้ำจุนการประกาศความสามัคคีของเรา ให้ทุกวันผ่านไปด้วยการให้เกียรติชีวิตที่ดี!"
