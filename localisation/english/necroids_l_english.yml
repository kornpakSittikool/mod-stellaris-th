 civic_reanimated_armies:1 "ผู้ฟื้นคืนชีพศพ"
 civic_reanimated_armies_desc:1 "ภายในสังคมนี้ ความตายไม่ใช่สิ่งกีดขวางการระดมพลสู่การศึก เจ้าแห่งศาสตร์เนโครแมนซีฟื้นคืนชีพศพเพื่อตั้งกองทัพและผู้พิทักษ์ที่น่าสะพรึงกลัว สร้างความหวาดกลัวเข้าสู่จิตใจของปุถุชนทั่วไป"
