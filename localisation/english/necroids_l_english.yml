 edict_sacrifice_unity_boost:0 "\n\nเพิ่มผลผลิต £unity£ ค่าความสามัคคีของ £job_death_priest£ $job_death_priest_plural$ ในขณะที่พระราชกฤษฎีกานี้มีผลบังคับใช้\n"

 edict_sacrifice_dummy:0 "การเสียสละ/การบวงสรวง"
 edict_sacrifice_dummy_desc:0 "ผู้มีจิตศรัทธามากที่สุดในหมู่พวกเราพร้อมที่จะเผชิญหน้ากับโชคชะตา ยินดีที่จะสละชีวิตเพื่อสังคมที่ดีขึ้น ด้วยการเสียสละด้าน §Hร่วมกัน§!, §Hโรมาลี§! และ §Hค่า§! พวกเขาไม่ต้องรออีกต่อไป"
 edict_sacrifice_dummy_tooltip:1 "§Rสังหาร [mortal_initiate.GetIcon] [mortal_initiate.GetNamePlural] ทั้งหมด§! แต่ละคนที่เสียสละจะมอบ £unity£ ความสามัคคี, ความสุขประชากร หรือผลผลิตแร่ £minerals£ และพลังงาน £energy£ เพิ่มเติม ขึ้นอยู่กับพิธีกรรมที่เลือก $edict_sacrifice_unity_boost$"

 sacrifice_death_priest_mod: "การบวงสรวงครั้งสำคัญ"
 sacrifice_death_priest_mod_desc: "ผู้มีจิตศรัทธาจำนวนมากได้เผชิญหน้ากับโชคชะตาของพวกเขา ทิ้งความประทับใจที่ยั่งยืนไว้ในคณะสงฆ์ของเรา"

 edict_sacrifice_togetherness:0 "การเสียสละ: การร่วมกัน"
 edict_sacrifice_togetherness_desc:0 "ผู้มีจิตศรัทธาที่สุดในหมู่เราพร้อมเผชิญชะตากรรม เพื่อให้แน่ใจว่าสังคมของเราจะใกล้ชิดกันยิ่งขึ้น ให้ความสามัคคีของเราฉายแสงออกไปในความมืดอันอ้างว้างของอวกาศ!"
 edict_sacrifice_togetherness_tooltip:2 "§Rสังหาร [mortal_initiate.GetIcon] [mortal_initiate.GetNamePlural] ทั้งหมด§! แต่ละคนที่เสียสละจะเพิ่มโอกาสที่จะได้รับโบนัสผลผลิต £unity£ ค่าความสามัคคีเพิ่มเติม $edict_sacrifice_unity_boost$"
 sacrifice_togetherness_mod:0 "การเสียสละเพิ่มเติม: การร่วมกัน"
 sacrifice_togetherness_mod_desc:0 "ผู้มีจิตศรัทธามากที่สุดในหมู่พวกเราได้เผชิญชะตากรรมแล้ว การเสียสละของพวกเขาค้ำจุนการประกาศความร่วมกันของเรา ให้ความสามัคคีของเราส่องสว่างในอวกาศอันอ้างว้าง!"
