 NECROIDS_TITLE: "Necroids Species Pack" # Do not translate
 DLC_NECROIDS_RECOMMENDATION_DESC:0 "§Sเนโครรอยด์§! คือแพ็กส่วนเสริมที่ช่วยให้คุณได้เล่นเป็นเผ่าพันธุ์ที่ยอมรับความตาย"
 DLC_NECROIDS_RECOMMENDATION_THEME_REC:0 "เราขอแนะนำ §Sเนโครรอยด์§! เนื่องจากลักษณะของจักรวรรดินี้เหมาะสมกับธีมเรื่องชีวิตและความตาย"
 DLC_NECROIDS_RECOMMENDATION_NECROPHAGE_REC:0 "เราขอแนะนำ §Sเนโครรอยด์§! เนื่องจากต้นกำเนิดและลักษณะการปกครองของมันได้นำมิติใหม่มาสู่รูปแบบการเล่นนี้"

 ### Necrophage Origin by Pierre du Plessis

 origin_necrophage:0 "ผีดิบเนโครเฟจ"
 origin_necrophage_desc:1 "อารยธรรมนี้วิวัฒนาการมาแบบปรสิต ซึ่งต้องอาศัยการกลืนกินสิ่งมีชีวิตทรงภูมิปัญญาอื่นๆ เพื่อค้ำจุนตนเอง เมื่อพวกเขามาถึงเวทีดาราจักร เผ่าพันธุ์อื่นอาจถูกดึงเข้ามาเป็นพวกเดียวกัน หรือไม่ก็กลายเป็นอาหารของพวกเขา สำหรับเนโครเฟจแล้ว ไม่มีหนทางอื่นอีก"
 origin_tooltip_necrophage_effects:3 "- $HOMEWORLD$ ['concept_necrophage_elevation_chamber'] $NEW_LINE$- $SPECIES_TRAITS$ ['concept_necrophage_trait'] $NEW_LINE$- £pop£ §Iป๊อป§! เผ่าพันธุ์ชั้นรองก่อนหน้า1. 1K$NEW_LINE$- ['concept_guaranteed_colonies']: ถูกแทนที่ด้วย ['concept_preftl_civilizations']"
 origin_tooltip_necrophage_negative_effects: "- เฉพาะ £pop£ §Iเนโครเฟจป็อป§! เท่านั้นที่จะสามารถเป็น £pop_cat_ruler£ §Iผู้ ปกครอง§! หรือได้รับการสรรหาเป็น §Iผู้นํา§! ได้"

 civic_necrophage_secondary_species:0 "เผ่าพันธุ์ชั้นรองก่อนที่จะกลายเป็นเนโครเฟจ"
 trait_necrophage:0 "เนโครเฟจ"
 trait_necrophage_desc:1 "§Lเผ่าพันธุ์ที่เกือบจะเป็นอมตะนี้แพร่พันธุ์โดยการกลืนกินประชากรของเผ่าพันธุ์อื่น§!"
 trait_necrophage_gestalt_tooltip:1 "§Pค่าโบนัสผลผลิตของประชากรเหล่านี้จะไม่มีผลกับประชากรที่มีจิตสำนึกร่วม(จิตใจ)ประชากร)§!"
 building_necrophage_elevation_chamber:0 "ที่พักยกระดับ"
 building_necrophage_elevation_chamber_desc:0 "ผู้ที่รอการเปลี่ยนสภาพจะใช้เวลาศึกษาแนวทางปฏิบัติและพิธีกรรมของ [This.Owner.GetSpeciesNamePlural] ภายใต้ความสะดวกสบายในห้องยกระดับ"
 building_necrophage_elevation_chamber_desc_hive:0 "ผู้ที่รอการเปลี่ยนสภาพจะใช้เวลาเตรียมพร้อมเพื่อหลอมรวมเป็นหนึ่งเดียวกับจิตสำนึกร่วม [This.Owner.GetAdj] ภายใต้ความสะดวกสบายในห้องยกระดับ"
 disables_necrophage_growth: "§P£building£ สิ่งก่อสร้างนี้จะปิดใช้งานการเติบโตของประชากรสำหรับเผ่าพันธุ์ §Yเนโครเฟจ§!§!"
 necrophage_elevation_timer_tooltip:0 "พิธียกระดับครั้งต่อไปบน §Y[This.GetName]§! จะจัดขึ้นในวันที่ §Y[This.necrophage_elevation_timer]§!.\n\n"
 building_necrophage_elevation_chamber_scaling_tooltip:0 "เพื่อให้มั่นใจว่าจะมีการป้อน [necro_apprentice.GetIcon] [necro_apprentice.GetNamePlural] อย่างสม่ำเสมอ จำนวนงานที่มอบให้จะปรับขึ้นลงระหว่าง §Y100§! ถึง §Y300§! ขึ้นอยู่กับ §Yการขยายภาพ§!.\n\n"
 building_necrophage_house_of_apotheosis:0 "บ้านของผู้บูชา"
 building_necrophage_house_of_apotheosis_desc:0 "บ้านที่มีความสง่างามอย่างยิ่งยวดที่ซึ่งผู้ที่รอการยกระดับขึ้นเป็น [This.Owner.GetSpeciesNamePlural] สามารถใช้ชีวิตในวาระสุดท้ายในร่างเดิมได้อย่างสะดวกสบาย"
 building_necrophage_house_of_apotheosis_desc_hive:0 "บ้านที่มีความสง่างามอย่างยิ่งยวดที่ซึ่งเราพยายามทุกวิถีทางเพื่อให้มั่นใจว่าผู้ที่รอการเปลี่ยนสภาพเป็นโดรนของ [This.Owner.GetAdj] สามารถใช้ชีวิตในวาระสุดท้ายภายนอกรังได้อย่างสะดวกสบาย"
 job_necro_apprentice_effect_desc_base:0 "ทุกๆ §Y10§! ปี [necro_apprentice.GetIcon] [necro_apprentice.GetNamePlural] จะได้รับการเปลี่ยนสภาพเป็น §Y[This.Owner.GetSpeciesNamePlural]§! ใน §Yพิธีการยกระดับ§!"
