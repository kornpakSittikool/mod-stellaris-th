 MESSAGE_REANIMATION_COMPLETE_TIYANKI_DESC:0 "ทีแยนกิฟื้นคืนชีพกลุ่มใหม่พร้อมใช้งานแล้วในระบบดาว $SYSTEM|Y$ กลุ่มถัดไปกำลังดำเนินการอยู่"
