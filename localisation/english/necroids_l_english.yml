 job_necro_apprentice_desc:1 "ด้วยความอุตสาหะหลายปีซึ่งสิ้นสุดลงด้วยความวิจิตรของ §Yพิธีการยกระดับ§! ผู้ที่โชคร้ายซึ่งไม่ได้เกิดมาในชนชั้นปกครองจะสามารถหลอมรวมเข้าสู่ชนชั้นดังกล่าวได้"
 job_necro_apprentice_desc_hive:0 "ด้วยความอุตสาหะหลายปี ผู้ที่โชคร้ายที่เกิดมาโดยไม่มีส่วนร่วมกับจิตสำนึกร่วมของเราจะสามารถเข้ารับพิธีแห่งความสามัคคีและหลอมรวมกับเรา กลายเป็นหนึ่งเดียวกับ [Owner.GetSpeciesAdj] [Owner.GetGovernmentName]"
