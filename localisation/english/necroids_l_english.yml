 MESSAGE_OVERLORD_SACRIFICE_DESC:0 "เหล่า §Yตัวเร่งการหมุน§! ที่ทำงานให้กับผู้ปกครองสูงสุดของเราใน §Y$holding_sacrificial_shrine$§! ได้ถูกสังเวยบูชายัญตามพิธีกรรมแล้ว"

 necroids.200.name:0 "การเสียสละเสร็จสิ้น: ความร่วมกันของ [root.GetAdj]"
 necroids.200.desc:0 "ความเงียบสงัดเข้าปกคลุมทั่วทั้ง [root.GetName] ผู้แสวงบุญได้เดินทางจากใกล้และไกลไปยังสถานที่สักการะบูชาที่ตนเลือก สร้างมิตรภาพใหม่ๆ และรื้อฟื้นมิตรภาพเก่าๆ ตลอดเส้นทาง\n\nพิธีกรรมทางสังคมของเราได้รับการปฏิบัติตามและประดับประดาให้แก่ [mortal_initiate.GetNamePlural] ที่เพิ่งปรากฏตัว ซึ่งการเดินขบวนอย่างเงียบเชียบของพวกเขาได้รับการกล่าวขานว่าเรียกทั้งรอยยิ้มและน้ำตา $job_death_priest$ หลักที่ [capital_scope.GetName] ได้นำเทศนาอย่างอบอุ่น เรียกร้องให้ผู้มีจิตศรัทธาเกื้อกูลและใส่ใจในความสัมพันธ์ของกันและกัน และเจริญรุ่งเรืองในความเป็นปึกแผ่นของเรา\n\nเมื่อ [mortal_initiate.GetName] แต่ละคนมุ่งหน้าไปยังห้องบูชายัญ เสียงถอนหายใจร่วมกันก็ดังขึ้น บัดนี้แต่ละคนได้พบกับจุดสิ้นสุดแล้ว ทิ้งมรดกไว้ในการศึกษาที่เปี่ยมเมตตา"
 necroids.200.tooltip.base:0 "การเสียสละของ [mortal_initiate.GetIcon] [mortal_initiate.GetNamePlural] นี้ได้มอบโบนัส§Hเพิ่มเติม§!"
