 civic_tooltip_reanimated_armies_effects: "- §Y$job_soldier_plural_with_icon$§! ถูกแทนที่ด้วย §Y$job_necromancer_plural_with_icon$§!\n- $AVAILABLE_BUILDINGS$ ['building:building_dread_encampment']\n- $AVAILABLE_HOLDINGS$ ['building:holding_dread_outpost']\n- กองทัพสิ่งมีชีวิตอินทรีย์ §Yโฮสต์ออแกนิก§! ที่พ่ายแพ้ บางครั้งจะฟื้นคืนชีพขึ้นมาเป็น §Yโฮสต์ที่ไม่ตาย§!\n- ลีไวอาธานสิ่งมีชีวิตอินทรีย์ §Yเลไวอาทัน§! ที่พ่ายแพ้ บางครั้งก็ฟื้นคืนชีพขึ้นมาได้\n- $reanimator_effect_desc$"

 building_dread_encampment:0 "ค่ายที่พักที่น่ากลัว"
 building_dread_encampment_desc:2 "การบดบังกิจกรรมของเหล่านักฟื้นคืนชีพศพจากสายตาของสาธารณชนเป็นสิ่งที่ดีที่สุด ในขณะที่พวกเขากำลังฟื้นคืนชีพฝูงผีดิบเพื่อสู้รบในกองทัพของเรา"
 job_necromancer_effect_desc: "£job_necromancer£ $job_necromancer_plural$ เปลี่ยน $r_consumer_goods$ เป็น $r_physics$, $r_society$ และ £mod_country_naval_cap_add£ §Y$MOD_COUNTRY_NAVAL_CAP_ADD$§! รวมถึงเรียกระดมพล £defense_army£ §Yกองทัพป้องกันที่ไม่ตาย§!"
 building_dread_encampment_tt: "- $undead_army_recruitment_tt$\n- $undead_defense_army_recruitment$"
 undead_army_recruitment_tt: "อนุญาตให้รับสมัคร §Y$undead_army_plural$§!"
 undead_army:0 "กองทัพผีดิบ"
 undead_army_desc:1 "ทหารผีดิบที่ฟื้นคืนชีพจากหลุมฝังศพโดยเหล่านักฟื้นคืนชีพศพ ปราศจากความกลัวต่อความตาย พวกเขาสร้างความสะพรึงกลัวเข้าสู่หัวใจของศัตรูด้วยท่วงท่าที่น่ารังเกียจและความดุร้ายในการต่อสู้!"
 undead_army_plural:0 "กองทัพผีดิบ"
 giant_undead_army:0 "กองทัพผีดิบร่างยักษ์"
 giant_undead_army_desc:0 "โครงกระดูกขนาดยักษ์ที่พร้อมจะสร้างความหายนะให้กับจักรวาล มันจะไม่ผ่อนปรนอย่างแน่นอนเมื่อเข้าบุกยึดดาวเคราะห์"
 giant_undead_army_plural:0 "กองทัพผีดิบร่างยักษ์"
 undead_defense_army_recruitment: "แทนที่ §Yดาว เคราะห์$defense_army_plural$§! ด้วย §Y$undead_defense_army_plural$§!"
 undead_defense_army:0 "กองทัพอันเดด (ป้องกัน)"
 undead_defense_army_plural:"กองทัพป้องกันอันเดด"
 undead_defense_army_desc:0 "ทหารผีดิบที่ฟื้นคืนชีพจากหลุมศพโดยเหล่านักฟื้นคืนชีพศพ นำพวกเขากลับมามีชีวิตอีกครั้งเพื่อปกป้องดาวเคราะห์ของเราจากทุกสิ่งที่อาจคุกคาม!"
 necromancer: "$job_necromancer$"
