# Objectives
 crisobj_own_volcanics_name: "ครอบครองโลกภูเขาไฟ"
 crisobj_own_volcanics_desc: "ความร้อนของระบบที่เพิ่มขึ้นช่วยกระตุ้นการปะทุของภูเขาไฟ เหมาะอย่างยิ่งสำหรับการผลักดันภารกิจอันร้อนแรงของเรา เราควรให้ความสำคัญกับการตั้งถิ่นฐานใน §Yโลกภูเขาไฟ(Volcanic Worlds)§! เพื่อรักษาความก้าวหน้า\n\nมอบรายได้แบบพาสซีฟจาก §Y$entropy_crystals$§! ในแต่ละปี โดยปรับขนาดตามจำนวนอาณานิคมบน §Y$pc_volcanic$§!."
 crisobj_create_volcanics_name: "สร้างโลกภูเขาไฟ"
 crisobj_create_volcanics_desc: "การแพร่กระจายของภูเขาไฟระดับดาวเคราะห์ทั่วกาแล็กซีจะช่วยเติมเชื้อเพลิงให้แก่ระบบเศรษฐกิจผลึกเอนโทรปีของเรา ด้วยเทคนิคการปรับปรุงสภาพดาวที่ถูกต้อง เราสามารถกระตุ้นกิจกรรมภูเขาไฟอย่างต่อเนื่องได้ทุกที่ที่เราต้องการ\n\nปรับสภาพดาวเคราะห์ให้กลายเป็น §Y$pc_volcanic$§!"
 crisobj_own_red_stars_name: "ครอบครองดาวสีแดง"
 crisobj_own_red_stars_desc: "เราควรให้ความสำคัญกับการตั้งถิ่นฐานในระบบดาวรอบดาวสีแดง พื้นผิวการแผ่รังสีขนาดใหญ่ของพวกมันเหมาะอย่างยิ่งสำหรับการเก็บเกี่ยวพลังงานความร้อน\n\nมอบรายได้แบบพาสซีฟจาก §Y$entropy_crystals$§! ในแต่ละเดือน ปรับขนาดตามแต่ละ §Y$pc_m_star$§! หรือ §Y$pc_m_giant_star$§! ภายในพรมแดนของเรา."
 crisobj_create_red_stars_name: "สร้างดาวสีแดง"
 crisobj_create_red_stars_desc: "ด้วยการส่งผ่านผลึกเอนโทรปี เราสามารถทำให้ดาวฤกษ์พองตัวเป็นดาวยักษ์แดง ช่วยจุดเชื้อเพลิงการเติบโตของจักรวรรดิเพลิงพิโรธของเรา\n\nดาวฤกษ์ที่ถูกแปลงสภาพโดย §Y$entropy_conduit_plural$§! จะกลายเป็น §Y$pc_m_giant_star$§!"
 crisobj_planet_firestorm_name: "การวางเพลิงระดับดาวเคราะห์"
 crisobj_planet_firestorm_desc: "ได้เวลาสอนให้คู่แข่งของเราเข้าใจความหมายที่แท้จริงของความเหนือกว่า ด้วยการระดมยิงพายุไฟที่จะเปลี่ยนโลกของพวกเขาให้กลายเป็นเถ้าถ่าน\n\nถล่มอาณานิคมด้วยระเบิดพายุเพลิง §Y$bombardment_firestorm$§! เพื่อสร้างความเสียหายแก่ดาวเคราะห์ §R100%§!."
 crisobj_lens_beam_impact_name: "ก่อกวนยานรบ"
 crisobj_lens_beam_impact_desc: "โลกที่หนาวเย็นและอบอุ่นไม่มีประโยชน์สำหรับเรา เราต้องเปลี่ยนโฉมพวกมันโดยการหลอมเหลวพื้นผิวให้กลายเป็นรูปแบบที่เหมาะสมกับความต้องการของเรา\n\nใช้อาวุธช่อง £ship_xl_slot£ §Y$LENS_FLARE_BEAM$§! ที่ติดตั้งบน §Y$entropy_conduit_plural$§! และ §Y$ember_battleship_plural$§! เพื่อถล่มโลกของศัตรู."
 crisobj_entropy_starbase_name: "ครอบครองเครื่องหมุนเหวี่ยงแรงโน้มถ่วง"
 crisobj_entropy_starbase_desc: "เครื่องหมุนเหวี่ยงแรงโน้มถ่วงจะช่วยให้เราสะสม $entropy_crystals$ ได้มากขึ้น. \n\nสร้างสิ่งปลูกสร้างสถานีอวกาศ §Y$sm_gravitational_centrifuge$§! ในระบบดาว §Yคู่ (binary)§!, §Yสามดวง (trinary)§! หรือระบบที่มี §Y$pc_black_hole$§!."

