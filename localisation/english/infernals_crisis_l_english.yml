 crisis_hyperthermia_lv2_req_tt: "£trigger_no£ สร้างสิ่งก่อสร้างยักษ์ใหญ่ §Y$galactic_crucible_0$§! และอัปเกรดเป็น §Y$galactic_crucible_1$§! แล้ว"
