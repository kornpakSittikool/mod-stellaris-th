 CAN_NOT_CRISIS_TERRAFORM_STAR_CLASS: "$TRIGGER_FAIL$คลาสของดาวฤกษ์ไม่ถูกต้องสำหรับการแปลงสภาพ."
 CAN_NOT_CRISIS_TERRAFORM_STAR_MEGASTRUCTURE: "$TRIGGER_FAIL$สิ่งก่อสร้างยักษ์ใหญ่ที่โคจรอยู่ขัดขวางการแปลงสภาพ."
