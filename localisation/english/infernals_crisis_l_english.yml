 crisis_hyperthermia_lv3_tt: "£trigger_yes£ อัปเกรดสิ่งก่อสร้างยักษ์ใหญ่ §Y$galactic_crucible_1$§! แล้ว"
 crisis_hyperthermia_lv3_req_tt: "£trigger_no£ อัปเกรดสิ่งก่อสร้างยักษ์ใหญ่ §Y$galactic_crucible_1$§! แล้ว"
 crisis_hyperthermia_level_4: "§Rมหันตภัย§!"
 crisis_hyperthermia_level_4_desc: "$crisis_level_4_desc$"
 crisis_hyperthermia_lv4_tt: "£trigger_yes£ อัปเกรดสิ่งก่อสร้างยักษ์ใหญ่ §Y$galactic_crucible_2$§! แล้ว"
 crisis_hyperthermia_lv4_req_tt: "£trigger_no£ อัปเกรดสิ่งก่อสร้างยักษ์ใหญ่ §Y$galactic_crucible_2$§! แล้ว"
 crisis_hyperthermia_dec_lv4_tt: "£trigger_yes£ เสร็จสิ้นโครงการพิเศษ §Y$INF_CRISIS_ENTROPY_EVIL$§!"
 crisis_hyperthermia_lv4_dec_req_tt: "£trigger_no£ เสร็จสิ้นโครงการพิเศษ §Y$INF_CRISIS_ENTROPY_EVIL$§!"
 crisis_hyperthermia_level_5: "§Rภัยคุกคามต่อการดำรงอยู่§!"
 crisis_hyperthermia_level_5_desc: "$crisis_level_5_desc$"
 crisis_hyperthermia_lv5_tt: "£trigger_yes£ อัปเกรดสิ่งก่อสร้างยักษ์ใหญ่ §Y$galactic_crucible_3$§! แล้ว"
 crisis_hyperthermia_lv5_req_tt: "£trigger_no£ อัปเกรดสิ่งก่อสร้างยักษ์ใหญ่ §Y$galactic_crucible_3$§! แล้ว"

# MPerks Level 1
 menp_hyperthermia_crystals: "$entropy_crystals$"
 menp_hyperthermia_crystals_desc: "§Y$entropy_crystals$§! แสดงถึงความก้าวหน้าในการควบคุมความไม่เสถียรของพลังงาน ด้วยทรัพยากรที่ผันผวนนี้ภายใต้การควบคุมของเรา เราสามารถเปลี่ยนโฉมระเบียบของดาราจักรได้"
 unlocks_entropy_objectives: "อนุญาตให้สะสม £entropy_crystals£ §Y$entropy_crystals$§! โดยการทำ §Hเป้าหมายวิกฤต(พระคริสตศักราช)§! ให้สำเร็จ"
 menp_hyperthermia_harnessing: "การควบคุมเอนโทรปี"
 menp_hyperthermia_harnessing_desc: "การผสมผสานการสังเคราะห์ §Y$entropy_crystals$§! เข้ากับอุตสาหกรรมของเราช่วยให้การใช้ทรัพยากรที่ผันผวนนี้มีประสิทธิภาพมากขึ้น สอดคล้องกับจุดเน้นทางเทคนิคของเราและเป้าหมายเชิงกลยุทธ์"
 unlocks_entropy_edict: "§Hปลดล็อกพระราชกฤษฎีกา:§! $edict_entropy_harnessing$"
 menp_hyperthermia_crucible: "เบ้าหลอมดาราจักร"
 menp_hyperthermia_crucible_desc: "เบ้าหลอมที่เสนอนี้จะทำหน้าที่เป็นเครื่องยนต์หลักในการควบคุมเอนโทรปีของดวงดาว ด้วยความสามารถในการตกผลึกและขนส่งมัน เบ้าหลอมนี้สามารถกลายเป็นประภาคารแห่งพลังไฟของเรา และแผ่ขยายมันออกไปทั่วห้วงดาราจักร"
 unlocks_galactic_crucible: "§Hปลดล็อกสิ่งก่อสร้างยักษ์ใหญ่:§! $galactic_crucible_0$"

# MPerks Level 2
 menp_hyperthermia_conc_entropy: "เอนโทรปีเข้มข้น"
 menp_hyperthermia_conc_entropy_desc: "$entropy_conduit_plural$ มีความสำคัญต่อการขยายอำนาจของเราในขั้นนี้ การเพิ่มผลผลิตของเบ้าหลอมจะช่วยเร่งการก้าวไปสู่อนาคตที่สดใสและลุกโชนของเรา"
 unlocks_conduit_spawn: "§H$UNLOCKS_SHIP_TYPE$:§! $entropy_conduit$ \n- §Y$entropy_conduit_plural$§! จะถูกสร้างขึ้นโดยอัตโนมัติโดย §Y$galactic_crucible_4$§! และจะเดินทางไปยังระบบดาวใกล้เคียง \n- อาณานิคมภายในระบบเป้าหมายจะได้รับโบนัส \n- ติดตั้งอาวุธ £ship_xl_slot£ §Y$LENS_FLARE_BEAM$§! ซึ่งจะปิดการใช้งานศัตรูเมื่อปะทะเป็นเวลาหลายวัน \n\n"
 menp_hyperthermia_radiant: "ความทะยานอยากอันเจิดจ้า"
 menp_hyperthermia_radiant_desc: "การเป็นจุดประกายที่จุดชนวนดาราจักรทำให้ไม่มีเวลาสำหรับการตั้งข้อสงสัยหรือระบบราชการ เราไม่สามารถเสียเวลาในการปรับเปลี่ยนระบบดวงดาวนับไม่ถ้วนได้ เพื่อให้บรรลุเป้าหมาย เราต้องเพิ่มขีดความสามารถในการก่อสร้างของเราอย่างมหาศาล"
 menp_hyperthermia_ignition: "การจุดชนวนโดยบังคับ"
 menp_hyperthermia_ignition_desc: "บางครั้ง การพยายามผลักดันให้หนักขึ้นก็ยังไม่เพียงพอ เราจำเป็นต้องนำเทคโนโลยีของเราไปสู่อีกระดับและใช้ประโยชน์จากศักยภาพสูงสุดของมัน ถึงเวลาลดระบบป้องกันภัยและเพิ่มผลผลิตสูงสุดแล้ว"
 unlocks_crucible_overclocking: "เปิดใช้งานการ 'โอเวอร์คล็อก' ของ §Y$galactic_crucible_1$§! §Hโครงสร้างเมกะ§!"

# MPerks Level 3
 menp_hyperthermia_cruiser: "$ember_cruiser$"
 menp_hyperthermia_cruiser_desc: "เรือเหล่านี้ติดตั้งเทคโนโลยีล้ำสมัย ทำหน้าที่แปลงกระแสความร้อนที่ผันผวนให้กลายเป็นการทำลายล้างแบบพุ่งเป้า ลดขนาดศัตรูของเราให้กลายเป็นเถ้าถ่านที่ไหม้เกรียม"
 unlocks_ember_cruiser: "§H$UNLOCKS_SHIP_TYPE$:§! $ember_cruiser$"
 menp_hyperthermia_flames: "เปลวเพลิงที่โหมกระหน่ำ"
 menp_hyperthermia_flames_desc: "ยูโทเปียที่เราจินตนาการไว้ไม่มีที่ว่างสำหรับการต่อต้านเป้าหมายของเรา ใครก็ตามที่พยายามหยุดยั้งเราจะได้เรียนรู้อย่างรวดเร็วว่าการต่อต้านจะถูกพบด้วยสายฝนแห่งไฟที่เทลงบนโลกบ้านเกิดของพวกเขา"
 unlocks_firestorm_stance: "§Hปลดล็อกการปรับปรุงสภาพดาว:§! $pc_volcanic$ \n§Hปลดล็อกท่าระดมยิง:§! $bombardment_firestorm$\n\n"
 menp_hyperthermia_coronal: "การระบายความร้อนโคโรนา"
 menp_hyperthermia_coronal_desc: "$entropy_conduit_plural$ ของเราในปัจจุบันต้องระบายความร้อนจำนวนมหาศาลเพื่อให้คงตัว การระบายความร้อนนั้นออกสู่พื้นที่รอบข้างจะทำให้ $entropy_conduit_plural$ กลายเป็นอาวุธทำลายล้างที่รุนแรงต่อศัตรูของเรา"
 unlocks_conduit_damage: "§Y$entropy_conduit_plural$§! สร้างความเสียหายแบบพาสซีฟแก่ยานและสถานีที่เป็นปฏิปักษ์ \n\n"

# MPerks Level 4
 menp_hyperthermia_reactors: "เครื่องปฏิกรณ์เฮลิโอฟิวชัน"
 menp_hyperthermia_reactors_desc: "การควบคุม §Y$entropy_crystals$§! ในเทคโนโลยีทางทหารช่วยปลดล็อกระบบขับเคลื่อนที่มีพลังงานสูงเป็นประวัติการณ์ ยานเรือของเราจะทะยานข้ามดวงดาวอย่างรวดเร็วอย่างที่ไม่เคยมีมาก่อน"
 menp_hyperthermia_solarflare: "พายุสุริยะประดิษฐ์"
 menp_hyperthermia_solarflare_desc: "เคยมีช่วงเวลาที่บางส่วนของดาราจักรอยู่นอกเหนือการเอื้อมถึงของเรา ภาพลวงตานั้นกำลังจะสิ้นสุดลง ในไม่ช้า ฝูงของ $entropy_conduit_plural$ จะเข้ามาเต็มระบบดาว นำพาความเสียหายที่ผ่านการคำนวณมาสู่ทุกคนที่ต่อต้านเรา"
 unlocks_conduit_borders: "§Y$entropy_conduit_plural$§! จะข้ามพรมแดนเข้าสู่ดินแดนศัตรูโดยอัตโนมัติ \n\n"
 menp_hyperthermia_armada: "กองเรือเพลิงพิโรธ"
 menp_hyperthermia_armada_desc: "เนื่องจากดาราจักรรวมตัวกันเพื่อต่อต้านเรา การระดมพลจึงเป็นเรื่องหลีกเลี่ยงไม่ได้ พลเมืองทุกคนต้องมีส่วนร่วมในการสนับสนุนแนวรบด้านพลังงาน โหมกระพือเปลวไฟแห่งความยิ่งใหญ่ของเรา"
 unlocks_blazing_navalcap: "§Y[GetAlloyProducerPlural]§! และ §Y[GetResearcherPlural]§! เพิ่มค่าพิกัดขนาดกองทัพเรือ £navy_size£ §Y$MOD_COUNTRY_NAVAL_CAP_ADD$§!.\n\n"

# MPerks Level 5
 menp_hyperthermia_battleship: "$ember_battleship$"
 menp_hyperthermia_battleship_desc: "ด้วยลำกล้องปืนที่ร้อนแรงราวกับพายุไฟที่กำลังจะครอบคลุมดาราจักร ยานรบขนาดใหญ่เหล่านี้จะประกอบกันเป็นกองกำลังป้องกันหลักรอบ ๆ เบ้าหลอม"
 unlocks_ember_battleship: "§H$UNLOCKS_SHIP_TYPE$:§! $ember_battleship$ \n- สามารถติดตั้งอาวุธ £ship_xl_slot£ §Y$LENS_FLARE_BEAM$§! ได้"
 menp_hyperthermia_critical_mass: "มวลวิกฤต"
 menp_hyperthermia_critical_mass_desc: "การเพิ่มกิจกรรมเอนโทรปีในเปลือกนอกของดาวฤกษ์ทำให้ดาวฤกษ์ปล่อยรังสีออกมาเป็นระลอก สิ่งนี้ทำให้ระบบดาวทั้งหมดร้อนขึ้นอย่างรวดเร็ว"
 unlocks_conduit_boost: "§Y$entropy_conduit_plural$§! จะแข็งแกร่งขึ้นตามจำนวนระบบดาวที่ถูกยึดครอง\n\n$hyperthermia_map_perc$\n\n"
 hyperthermia_map_perc: "§G20%§! ของดาราจักร: $TABBED_NEW_LINE$- $entropy_conduit_plural$ สร้างความเสียหายอย่างรุนแรงแก่รัฐบริวารและอาณานิคมใกล้เคียง $TABBED_NEW_LINE$- อาณานิคมที่ได้รับผลกระทบจะค่อย ๆ สูญเสียประชากร £pop£ $POPS$ $TABBED_NEW_LINE$- ส่งผลกระทบเฉพาะจักรวรรดิของสปีชีส์ที่ไม่ใช่ §Yเท อร์ โม ฟี เลีย§! $TABBED_NEW_LINE$- ระบบที่ต้องการ: §Y[root.hyperthermia_own_systems_var]§!/§Y[root.hyperthermia_systems_var]§!"
 menp_hyperthermia_ammunition: "กระสุนบรรจุพลังงาน"
 menp_hyperthermia_ammunition_desc: "การปรับปรุงการออกแบบกระสุนปืน: อาวุธยุทโธปกรณ์มาตรฐานได้รับการเสริมด้วยแกนเอนโทรปีขนาดเล็ก ปล่อยคลื่นความร้อนที่ไม่เสถียรเมื่อปะทะ ผลลัพธ์คือการทำลายล้างที่เพิ่มขึ้นอย่างชัดเจน"

# Misc
