# Conduit Starforming
 crisis_conduit_buff: "การควบคุมดูแลของดวงดาว"
 crisis_conduit_buff_desc: "ชั้นบรรมยากาศของดาวฤกษ์ในท้องถิ่นกำลังเผชิญกับการเปลี่ยนแปลงอย่างรวดเร็ว ก่อให้เกิดการปะทุของพายุสุริยะที่แผดเผาทั่วทั้งระบบ แม้ว่าสิ่งนี้จะเป็นภัยพิบัติสำหรับผู้อื่น แต่มันก็สมบูรณ์แบบสำหรับเราในการเจริญเติบโต"
 TERRAFORM_ORDER: "แปลงสภาพดาวฤกษ์"
 TERRAFORM_ORDER_DESC: "จะค่อย ๆ เปลี่ยนดาวฤกษ์เป้าหมายให้กลายเป็น §Y$pc_m_giant_star$§!."
 TERRAFORM_ORDER_RESEARCH: "การใช้ศักยภาพพลังงานที่เพิ่มขึ้นของเอนโทรปีผลึก ช่วยให้ดาวฤกษ์ขนาดเล็กสามารถขยายตัวเป็นดาวยักษ์แดงที่ยิ่งใหญ่ได้"
 FLEETORDER_TERRAFORM_BUTTON: "$TERRAFORM_ORDER$"
