 crisis_hyperthermia_already_ongoing: "จักรวรรดิอื่นกำลังเข้าควบคุมแกนกลางดาราจักรแล้ว"
 crisis_hyperthermia_already_happened: "จักรวรรดิอื่นได้ควบคุมแกนกลางดาราจักรและปรับเปลี่ยนดาราจักรเรียบร้อยแล้ว"
