l_english:

# Ascension Perk
 ap_galactic_hyperthermia: "ภาวะโลกร้อนระดับดาราจักร(Galactic Hypermia)"
 ap_galactic_hyperthermia_desc: "จักรวาลเริ่มต้นขึ้นในกองเพลิง แต่กลับหนาวเย็นลงจนกลายเป็นสถานที่ที่มืดมิดและโหดร้าย เพื่อที่จะเจริญรุ่งเรือง เราจำเป็นต้องเพิ่มความร้อนขึ้น แม้ว่าผู้อื่นจะต้องพินาศก็ตาม"
 must_be_infernals: "$TRIGGER_FAIL$ต้องการให้ประชากรของเราประกอบด้วยชาวเทอร์โมไฟล์(ผี)"

# UI
 entropy_crystals: "เอนโทรปีผลึก(Crystallized Entropy)"
 entropy_crystals_name: "$entropy_crystals$:"
 entropy_crystals_value: "£entropy_crystals£ $VAL|0$"
 entropy_crystals_gaining: "ทำ §Hเป้าหมายวิกฤต(พระคริสตศักราช)§! ให้สำเร็จเพื่อรับ £entropy_crystals£ §Y$entropy_crystals$§! เพิ่มเติม"
 entropy_crystals_desc: "โครงข่ายพลังงานดิบที่แหลมคมและแวววาวนี้มีเสถียรภาพในระดับหนึ่ง เพียงพอที่จะขนส่งเป็นเชื้อเพลิงหรือฝังเข้าไปในอุปกรณ์ได้"
 mod_country_base_entropy_crystals_produces_add: "ผลผลิต £entropy_crystals£ $entropy_crystals$ รายเดือน"
 entropy_crystals_crisis_objective: "$menace_crisis_objective$"
 entropy_crystals_crisis_objective_gained: "ได้รับ £entropy_crystals£"
 entropy_crystals_crisis_objective_reward: "$REWARD$"
 entropy_crystals_crisis_objective_progress: "เราได้กําไรแล้ว£entropy_crystals£ $AMOUNT$จากวิกฤตการณ์นี้"
 entropy_crystals_crisis_level_locked: "ต้องการปลดล็อคระดับนี้:\n" # remove?
 entropy_crystals_crisis_level_unlocked: "ที่$LEVEL$คุณจะได้รับรางวัล :\n"
 entropy_crystals_crisis_level_desc: "เพื่อให้ผ่านระดับวิกฤต สะสม$entropy_crystals$และสร้าง§Y$galactic_crucible_4$§!."
 entropy_crystals_crisis_level_unlock: "เคย£entropy_crystals£ §Y$CURRENCY$§! $entropy_crystals$"
 entropy_crystals_current_value: "ค่าปัจจุบัน:§Y$VALUE|0$§!"
 entropy_crystals_crisis_description_title: "$ap_galactic_hyperthermia$"
 entropy_crystals_crisis_description: "$menace_crisis_description_intro$\n\nวิธีการใหม่ในการควบคุมพลังงานจะช่วยให้เราเพิ่มพลังของเราได้อย่างมหาศาล เราจำเป็นต้องควบคุมไฟของดวงดาวเองเพื่อจุดชนวนยุคนี้"
 entropy_crystals_crisis_howto_title: "แหล่งพลังงาน"
 entropy_crystals_crisis_howto: "การทำเป้าหมายวิกฤต §Hวิกฤตวัตถุ§! จะสร้าง £entropy_crystals£ §H$entropy_crystals$§! ซึ่งสามารถนำมาใช้ในการอัปเกรด $galactic_crucible_4$ และปลดล็อกเลเวลวิกฤตถัดไปได้"

