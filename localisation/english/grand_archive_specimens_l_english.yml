 # Specimens #
 #############

 acidic_spores: "สเปิร์ส"
 acidic_spores_desc_short: "เห็ดบน[from.GetName]การพัฒนากลไกการป้องกันนี้ผ่านเวลาเพื่อยับยั้งสายพันธุ์ที่โดดเด่น"
 acidic_spores_desc_details: "ก๊าซ นี้ ก่อ ให้ เกิด พิษ และ ไม่ อาจ เข้า ถึง ได้. เวอร์ชั่นที่มีประสิทธิภาพน้อยกว่า ได้ถูกสังเคราะห์เป็นรูปแบบ ของยาฆ่าแมลงที่มีประสิทธิภาพ"

 adakkaria_propaganda_poster: "อะดัช คา ริ อา"
 adakkaria_propaganda_poster_desc_short: "โปสเตอร์นี้ประกาศเกียรติของการประชุมอะแดร์เรีย"
 adakkaria_propaganda_poster_desc_details: "พลเมืองที่ดูมั่นใจตัวเอง ภูมิใจและกล้าหาญ ขาเทียมของพวกเขาเอื้อมออกไปยังท้องฟ้า ราวกับการยึดถือของอนาคต ตัดสินโดยพวกเขาเท่านั้น จาก ที่ กล่าว ข้าง ต้น ภาพ ที่ คลุมเครือ ของ เครื่องจักร ที่ สวม หน้ากาก ที่ ทํา ให้ เกิด ความ ตาย จะ มอง ลง มา. คําขวัญกล่าวว่า 'อนุสัญญา Adcaria of Babvolvances.ทําให้เครื่องราชอิสริยาภรณ์ของเรา'."

 advisor_core: "หัวหน้าแผนก"
 advisor_core_desc_short: "ส่วนเดียวที่เหลืออย่างไม่เสียหาย หลังจากถอดร่าง ที่ปรึกษาที่ซับซ้อน"
 advisor_core_desc_details: "แต่ความซับซ้อนของสถาปัตยกรรมซอฟต์แวร์ของตน ได้สร้างแรงบันดาลใจให้กับนวัตกรรม ในความพยายามวิจัยวิทยาศาสตร์คอมพิวเตอร์ของเรา\n[explorer.GetAdvisorCoreAdditionnalQuote]"
 advisor_core_desc_tutorial_on: "§L\"คุณจะไม่ปิดฉันลงคุณจะ?\"§!"
 advisor_core_desc_tutorial_off: "§L\"คุณต้องการที่จะแนะนําอีกครั้ง?\"§!"

 alien_brain_scans: "สแกนสมองของเอเลี่ยน"
 alien_brain_scans_desc_short: "แฟ้มจัดเก็บรูปแบบของระบบประสาทจากการแข่งขันของมนุษย์ต่างดาวตายยาวพบภายในอุโมงค์บน[fromfrom.GetName]"
 alien_brain_scans_desc_details: "อารยธรรมที่ถูกลืมนั้น เก็บข้อมูลนี้ไว้ในความหวัง ที่จะย้ายจิตสํานึกของพวกเขา ไปยังการบูรณะแบบดิจิตอล การ ตรวจ สอบ หลาย ราย พร้อม กับ ข้อ สังเกต เกี่ยว กับ บุคคล ต่าง ๆ รวม ทั้ง คํา พยาน จาก ผู้ ที่ รู้ จัก เขา ดี ที่ สุด."

 alien_dining_set: "ชุดรหัสอักขระ"
 alien_dining_set_desc_short: "ชุด อาหาร ที่ สวย งาม ซึ่ง พบ ใน ดาว เคราะห์ น้อย เทียม"
 alien_dining_set_desc_details: "มี การ ใช้ เทคนิค การ ทํา เครื่อง มือ ที่ ซับ ซ้อน หลาย อย่าง เพื่อ ก่อ รูป, ไฟ, และ ทํา เครื่อง ปั้น ดิน เผา. ความ ไม่ เสมอ ต้น เสมอ ปลาย เล็ก น้อย ใน โครง สร้าง ของ มัน บ่ง ชี้ ถึง กระบวนการ การ ทรง สร้าง ด้วย ฝีมือ. การวิเคราะห์วัสดุแสดงหลักฐานว่า เจ้าของสินค้าดีๆเหล่านี้ ได้ปฏิบัติกับอาหารที่มีกรดสูง ส่วนใหญ่มาจากผลไม้ที่แห้งจัด"

 alien_jewelry: "ไอคอนของเอเลี่ยน"
 alien_jewelry_desc_short: "เครื่องประดับของเอเลี่ยนที่งดงาม ทําจากวัสดุที่ไม่รู้จัก"
 alien_jewelry_desc_details: "หินที่แตกต่างกันอย่างกว้างขวางในต้นกําเนิดและสี; ผสมของอัญมณีที่เรียบเรียงด้วยคาร์บอน มี การ แกะ สลัก บาง ส่วน ภาย ใน ของ ชิ้น ส่วน แต่ เรา ไม่ มี วิธี แปล."

 alien_toy: "ของเล่นพลาสติก"
 alien_toy_desc_short: "เกม ง่าย ๆ ที่ พบ ใน ท่ามกลาง ซาก ปรัก หัก พัง ของ โรง งาน ที่ ร้าง เปล่า"
 alien_toy_desc_details: "สิ่ง นี้ เป็น หนึ่ง ใน มวล ที่ ผลิต จาก เบ้า หลอม เหล็ก ก้อน เล็ก ๆ. ดู เหมือน ว่า ไม่ มี จุด มุ่ง หมาย อะไร นอก จาก การ ประดับ ตกแต่ง และ การ เล่น."

 altar_to_the_elder_one: "อัล เบอร์ สําหรับ ผู้ ปกครอง"
 altar_to_the_elder_one_desc_short: "เครื่อง กล ธรรมชาติ ที่ พบ ใน ห้อง อัน ศักดิ์สิทธิ์ โบราณ"
 altar_to_the_elder_one_desc_details: "แม้ แต่ ใน รัฐ ที่ ปัจจุบัน นี้ จะ มี สภาพ ทรุด โทรม แต่ ก็ แผ่ รังสี ของ พลังงาน ไซ โซ นิก ที่ ไม่ มี การ ควบคุม. บาง คน บอก ว่า เสียง กระซิบ ที่ ล่อ ใจ ของ มัน ยัง คง ได้ ยิน อยู่ โดย มุ่ง จะ ชักชวน จิต วิญญาณ ที่ ดื้อ ดึง ให้ กลับ ไป หา[cosmic_horror_location.GetName]."

 aluminium_plaque: "แอลูมิเนียม"
 aluminium_plaque_desc_short: "แผ่น ป้าย ง่าย ๆ ที่ พบ บน เครื่อง บิน ปล่อย โดย[owner.GetAAnPreFTLLower] [owner.GetPreFTLLower]อารยธรรมของสัตว์เลี้ยงลูกด้วยนม"
 aluminium_plaque_desc_details: "พื้น ผิว ของ มัน มี รูป ทรง ทาง เรขาคณิต แปลก ๆ และ รูป แบบ ของ สิ่ง มี ชีวิต ชนิด ต่าง ๆ. สถาปัตยกรรมค่อนข้างยากจน แต่มันต้องเป็นตัวแทนของความพยายามที่สําคัญ จากอารยธรรมของพวกเขา"

 ammoniaphytus: "แอมโมเนียฟิลัส"
 ammoniaphytus_desc_short: "ระดับแอมโมเนียในเนื้อเยื่อของพืชนี้ จะเป็นอันตรายต่อสิ่งมีชีวิตที่มีคาร์บอนเป็นส่วนใหญ่"
 ammoniaphytus_desc_details: "บรรยากาศ ที่ อยู่ รอบ ๆ ตัว มัน ทํา ให้ สิ่ง มี ชีวิต ส่วน ใหญ่ ที่ มี ชีวิต อยู่ ใน สภาพ สลบ อยู่ ภาย ใน ไม่ กี่ วินาที. วิธีตัวอย่างดังกล่าวสามารถดํารงอยู่ได้ จุดสนใจและอภิปรายในหมู่จิตใจที่ยิ่งใหญ่ที่สุดของเรา และแผนการที่น่ารังเกียจในหมู่คนอื่น ๆ"

 amoeba_flagella_gland: "อะ มี บา ฟ ลา เดล ลา"
 amoeba_flagella_gland_desc_short: "อวัยวะ สืบ พันธุ์ อันดับ รอง จาก สเปซ อา โม บะ"
 amoeba_flagella_gland_desc_details: "มันผลิตสิ่งมีชีวิตอิสระที่รู้จักกันในชื่อ \"ฟลาเจลล่า\", ตัวอ่อนที่ก้าวร้าวที่เบียดเสียดและปกคลุมเหยื่อ ขณะล่าอาหาร แต่ ความ ไม่ มั่นคง ทาง พันธุกรรม ทํา ให้ พวก เขา ไม่ สามารถ เป็น ผู้ ใหญ่ ได้ เต็ม ที่. เพื่อ จะ ผลิต ลูก หลาน แท้ สเปซ อา โม เอ บา ฉีด เอนไซม์ พิเศษ เข้า ไป ใน แฟล็ก เอ ล ลา ซึ่ง กระตุ้น ให้ เกิด เม ตา มอร์โฟ ซิส อย่าง รวด เร็ว. ไม่รู้จักกระบวนการคัดเลือกสําหรับวิธีการสืบพันธุ์นี้"

 ancient_bust: "บัสต์โบราณ"
 ancient_bust_desc_short: "นี่คือกราฟไฟต์ที่ไม่รู้จักกัน"
 ancient_bust_desc_details: "เสียง ดัง ก้อง บน ฐาน ของ มัน บ่ง ชี้ ว่า บุคคล นี้ ได้ รับ การ ยกย่อง อย่าง สูง ใน หมู่ ประชาชน ของ ตน."

 ancient_kinetic_launcher: "ตัวเรียกใช้งาน Knect โบราณ"
 ancient_kinetic_launcher_desc_short: "รูปแบบพื้นฐานมากของอาวุธยิง ซึ่งใช้รูปแบบของแรงผลักดันบางอย่าง เพื่อบังคับให้วัตถุผ่านกระบอกโลหะสั้น"
 ancient_kinetic_launcher_desc_details: "ความ ถูก ต้อง แม่นยํา ของ อุปกรณ์ ดัง กล่าว คง จะ เป็น การ คาด คะเน อย่าง ดี ที เดียว."

 ancient_laser_pointer: "ตัวชี้เลเซอร์โบราณ"
 ancient_laser_pointer_desc_short: "เครื่อง ฉาย แสง ที่ ถูก ต้อง แม่นยํา ซึ่ง สามารถ ทํา ให้ ดวง ดาว ใน ท้องฟ้า มอง เห็น จาก ระยะ ไกล ใน มาตร วัด ของ กาแล็กซี"
 ancient_laser_pointer_desc_details: "เลเซอร์อัลตราไวโอเลตนี้ เป็นหลักฐานที่ชัดเจน ของอารยธรรมที่ผ่านมา น่าพิศวง, มันยังใช้ได้อยู่"

 ancient_nanites: "นาไนท์โบราณ"
 ancient_nanites_desc_short: "นาไนท์ที่มีคุณภาพสูงเหล่านี้ถูกค้นพบบน[nanite_swarm_planet.GetName]ได้รับการส่งมอบมีหลายพันปีที่ผ่านมาโดยอารยธรรมที่ถูกลืม"
 ancient_nanites_desc_details: "เนื่อง จาก ขาด ความ ปลอด ภัย ที่ สําคัญ เห็น ได้ ชัด ว่า ไม่ มี ความ เป็น ห่วง ว่า คน อื่น ๆ อาจ เข้า มา เกี่ยว ข้อง กับ อุปกรณ์ เหล่า นี้ และ นํา มา ใช้ ใหม่. ได้ใช้มันเพื่อทําให้โลกกลายเป็น สภาพแวดล้อมที่อาศัยได้มากขึ้น[owner.GetSpeciesName]มี การ ถือ กรรมสิทธิ์ ของ ฝูง ชน แม้ ว่า วิธี การ ที่ อยู่ เบื้อง หลัง การ ก่อ สร้าง แรก เดิม ของ พวก เขา ยัง คง เป็น เรื่อง ลึกลับ."

 ancient_nuclear_armament: "อาวุธ นิวเคลียร์ โบราณ"
 ancient_nuclear_armament_desc_short: "พบเมื่อ[root.GetName]ไฮโดรเจนระเบิด 35 เมกะตันนี้ถูกทิ้งหลังจากสงคราม ที่ทําลายประชากรก่อนหน้านี้ของโลก"
 ancient_nuclear_armament_desc_details: "โชคดี ที่การปลดอาวุธโบราณนี้ ยังเป็นไปได้ ข้อความที่เขียนลงบนรอยหยัก ถูกวิเคราะห์โดยนักแปลของเรา ต่อต้านวัตถุอื่น ๆ ที่พบบนโลก และเชื่อว่ามันบอกบางอย่าง แปลกจัง"

 ancient_political_memoir: "เหรียญ ทาง การ เมือง โบราณ"
 ancient_political_memoir_desc_short: "ชีวประวัติ ของ นัก การ เมือง สมัย โบราณ"
 ancient_political_memoir_desc_details: "Lez Terus เป็นผู้ว่าราชการเมืองซาร์ธานา อาณานิคมเล็ก ๆ ภายในอารยธรรมฮาร์เวิร์ธโบราณ ตัว เลข เล็ก ๆ ภาย ใน เสรีภาพ ของ คณะ กรรมการ บริหาร ธุรกิจ เธอ เป็น ที่ รู้ จัก เนื่อง จาก จุด ยืน ที่ เข้ม งวด ของ เธอ ต่อ การ นํา อาหาร เข้า มา จาก พลัง ของ คน ต่าง ชาติ. หลังจากเหตุอื้อฉาวเกิดขึ้น เธอกลายเป็นผู้ปกครองของสถาบันอนุรักษ์นิยมฮาร์วอธ แต่ก็ไม่ได้ยั่งยืน การประกาศของเธอเพื่อสนับสนุนการบูรณะหอนาฬิกาฮาร์เวิร์ธที่รัก เกือบจะก่อให้เกิดการก่อกบฏเต็มรูปแบบในเมืองหลวง"

 ancient_rift_sphere: "ไรต์สปอร์ตโบราณ"
 ancient_rift_sphere_desc_short: "เรือท่องอวกาศโบราณ ที่เดินทางผ่านเทือกเขาแอสเตรัล และลงจอดบน[from.planet.GetName]"
 ancient_rift_sphere_desc_details: "ฝังลึกใต้พื้นผิวของดาวเคราะห์ มานานหลายศตวรรษนี้เรือที่ประกอบอย่างเร่งรีบ[controller.owner_main_species.GetName]ไปยังกาแล็คซี่นี้ วัสดุ ส่วน ใหญ่ ของ มัน ได้ ถูก เก็บ ไว้ เป็น ชิ้น ส่วน แต่ โครง สร้าง หลัก ของ มัน ส่วน ใหญ่ ยัง คง แข็ง แรง อยู่."

 ancient_satellite: "ดาวเทียมโบราณ"
 ancient_satellite_desc_short: "ดาวเทียมความหนาแน่นเสนอเป็น'Gift'โดยหุ่นยนต์จักรกลโบราณใน[root.GetName]"
 ancient_satellite_desc_details: "ธนาคาร ข้อมูล ของ ประเทศ นี้ ผุ พัง และ มี ความ เสื่อม ทราม ใน หลาย แห่ง แต่ สถิติ การ จด ทะเบียน สํามะโนครัว และ การ ตั้ง ครรภ์ ใน ปัจจุบัน ยัง คง อยู่. ข้อมูลเกี่ยวกับพฤติกรรมประชากรทั่วโลกนี้ ให้ข้อมูลว่า[owner.GetAdjective]อาณานิคมเติบโตอย่างยั่งยืน การ ก่อ สร้าง ที่ แข็ง แรง"

 ancient_sensor: "ตัวตรวจจับความร้อนโบราณ"
 ancient_sensor_desc_short: "โดยแยกออกจากดาวเคราะห์น้อย ตัวตรวจจับนี้ถูกใช้ในการสร้างความร้อนของกาแล็กซี่ และโอนข้อมูลนี้ไปยังจักรวรรดิโบราณอันไกลโพ้น"
 ancient_sensor_desc_details: "มันสามารถติดตามอุณหภูมิได้ และติดตามการเคลื่อนไหวของยานอวกาศ ผ่านรังสีอินฟราเรด อย่าง ไร ก็ ตาม วัตถุ ประสงค์ หลัก ของ มัน ดู เหมือน เป็น การ ทํานาย และ วัด พายุ สุริยะ และ การ ก่อ ตัว ของ กระถาง ดวง อาทิตย์."

 asteroid_fossils: "ฟอสซิล ของ แอสเตอร์ อยด์"
 asteroid_fossils_desc_short: "การ ระบุ อายุ ของ คาร์บอน เผย ให้ เห็น ว่า ฟอสซิล น้ํา เหล่า นี้ มี อายุ หลาย ล้าน ปี"
 asteroid_fossils_desc_details: "ซากศพที่เป็นแร่ธาตุของเปลือกหอย ที่ตีโพลงน้ําด้วยท่อกลวง"

 ballad_of_the_sable_knight: "บัลลูดของอัศวิน"
 ballad_of_the_sable_knight_desc_short: "§dเซเบิลอัศวินมาเมื่ออีฟของทัวร์นีย์§!"
 ballad_of_the_sable_knight_desc_details: "§d\nสวมเกราะแปลกๆ พวกเขาเดินทางไกล\nพวกเขาท้าชิงแชมป์ของเราในนัดที่ยุติธรรมและยุติธรรม\nการ ต่อ สู้ เริ่ม ขึ้น และ มี ไฟ ลุก ไหม้ เต็ม ฟ้า.\nทหารรักษาการของผู้ชนะของเราเข้มแข็งอย่างที่คาด\nแต่เกราะป้องกันของแต่ละคน ระเบิดมันหักเห\nผู้ท้าชิงยอมแพ้ ไร้ความละอาย\nแล้วกลับมาที่รูหนอนที่พวกเขามา ...§!"

 beauty_of_planet: "ความงามของ[From.GetName]"
 beauty_of_planet_desc_short: "ความงดงามของความพยายามในการปั้น[From.GetName]ถูกออกแบบมาเพื่อรักษาประสาทสัมผัส"
 beauty_of_planet_desc_details: "ระบบอัลกอริทึมถูกใช้เพื่อวิเคราะห์และปรับปรุง ระบบนิเวศตามธรรมชาติของโลกอย่างรอบคอบ โดย การ เลือก เฉพาะ ดอกไม้ ที่ สวย ที่ สุด, ผล ไม้ ที่ มี คุณค่า ทาง โภชนาการ มาก ที่ สุด, และ สมุนไพร ที่ หวาน ที่ สุด เท่า นั้น ภูมิ ประเทศ จึง ได้ รับ การ เปลี่ยน เป็น ยู โต เปีย ที่ มี แสง สว่างไสว. ถ้าเพียงธรรมชาติสามารถมีประสิทธิภาพดังนั้น"

 black_hole_chromatic_anomaly: "หลุมดํา"
 black_hole_chromatic_anomaly_desc_short: "ภาพที่น่าพิศวงที่ถ่ายอยู่ภายใน[From.solar_system.GetName]"
 black_hole_chromatic_anomaly_desc_details: "เนื่องจากองค์ประกอบเคมีของ[From.GetName]หลุมดําของระบบนี้ได้รับ การกระตุ้นแบบโครมาติก สร้างผลกระทบของแสงคาไลโดสคอป แว่นตาที่โดดเด่นอย่างแท้จริงในพื้นที่ลึก"

 black_needle_ceremonial_sword: "ดาบ สี ดํา"
 black_needle_ceremonial_sword_desc_short: "อาวุธ ที่ ทํา ด้วย ฝีมือ อย่าง ละเอียด นี้ นํา มา ใช้ โดย ซิลเวอร์ ควิลล์ ผู้ ก่อ ตั้ง โจรสลัด ดํา"
 black_needle_ceremonial_sword_desc_details: "ได้รับมอบหมายให้เป็นผลประโยชน์ขององค์กรอาชญากรรม การล้มของลมครั้งใหญ่ครั้งแรก มันถูกสร้างขึ้นเป็นสัญลักษณ์สถานะ ทําจากเหล็ก-ไททาเนียมอัลลอย วลี \"เพียร์ ซ เดอะ ไวล์\" มีคําจารึกไว้ตามด้ามของมัน"

 black_needle_ledger: "หมึก ดํา"
 black_needle_ledger_desc_short: "บัญชีนี้พูดถึงทุกข้อตกลง โบรกเกอร์โดยโจรสลัดดํา กว่าพัน ๆ ปีในกาแล็คซี่ของเรา"
 black_needle_ledger_desc_details: "การ ซื้อ ขาย, ค่า ไถ่, และ สินบน ทุก อย่าง มี การ ลง วัน เดือน ปี และ จัด เรียง เป็น บท ประพันธ์ ที่ ยอด เยี่ยม. เนื่อง จาก ประวัติ ที่ เป็น ลาย ลักษณ์ อักษร เกี่ยว กับ การ ค้า ที่ ผิด กฎหมาย ระหว่าง ชาติ จึง ให้ ความ หยั่ง เห็น เข้าใจ อย่าง ที่ ไม่ เคย มี มา ก่อน ใน แนว โน้ม ทาง เศรษฐกิจ ของ ตลาด มืด ตลอด เวลา."

 burnt_migratory_trees: "รังที่มีชีวิต"
 burnt_migratory_trees_desc_short: "ซาก ของ พืช ที่ เคลื่อน ที่ ขนาด ใหญ่ สามารถ ประสาน พฤติกรรม อพยพ"
 burnt_migratory_trees_desc_details: "พืช เหล่า นี้ มี เชาวน์ ปัญญา เพียง รูป แบบ หนึ่ง เท่า นั้น แต่ สามารถ ครอบ คลุม ทั้ง อาณานิคม ได้ มาก มาย. ตั้งแต่ที่เราได้ค้นพบ ว่าสายพันธุ์ของแมลง พาราสิติก อาศัยอยู่ในเปลือกของมัน ทํางานเป็นศูนย์สัมผัสและการสื่อสารของต้นไม้ ความ สัมพันธ์ ทาง พันธุกรรม นี้ น่า ทึ่ง พอ ๆ กับ ความ สามารถ ใน การ ทํา ให้ ถึง ตาย."

 captain_ness_body: "ร่างกายของกัปตันเนส"
 captain_ness_body_desc_short: "ศพของกัปตันซานดา เนส โจรสลัดโบราณผู้มีชื่อเสียง"
 captain_ness_body_desc_details: "กว่า 5000 ปีที่ผ่านมาเธอเป็น \"กบฏของไฮเปอร์สเปซ\" ขโมยจากมากที่สุด อํานาจกาแล็กซี่และสะสม ต่อ มา เธอ ได้ ย้าย สติ ไป ยัง เรือ กล และ สร้าง ห้อง นิรภัย ขนาด ใหญ่ ซึ่ง ชีวประวัติ ของ เธอ ถูก เก็บ ไว้. นี่คือทั้งหมดที่เหลือ จากรูปเดิมของเธอ"

 captain_ness_logbook: "ปูมบันทึกของกัปตันเนส"
 captain_ness_logbook_desc_short: "รายการ วารสาร ที่ กระจาย อยู่ ใน เซฟ เฮา ส์ ที่ พวก โจร สลัด สมัย โบราณ ใช้ กัน ใน ชื่อ กัปตัน เนส และ เพื่อน ของ เธอ ชื่อ ส เม กกิบ"
 captain_ness_logbook_desc_details: "รายการเหล่านี้ถูกวางจําหน่าย ผ่านอุปกรณ์จํานวนมาก เขียนอย่างไม่จํากัด ตลอดช่วงเวลาหลายปี แม้ ว่า ถือ กัน ว่า เป็น แหล่ง ที่ ไม่ น่า เชื่อ ถือ แต่ หลาย สถานการณ์ ที่ กล่าว ถึง ภาย ใน สามารถ ยืน ยัน ได้ โดย ผู้ มี อํานาจ ภาย นอก."

 carnivorous_megaflora: "เม กาฟ รา"
 carnivorous_megaflora_desc_short: "ค้นพบเมื่อ[from.GetName]พืชนักล่าเหล่านี้สามารถกลืนผู้ใหญ่ได้[owner.GetSpeciesName]ทั้งหมดถ้าถูกจับได้โดยไม่เจตนา"
 carnivorous_megaflora_desc_details: "ใบไม้ของสัตว์กินเนื้อชนิดนี้ ได้วิวัฒนาการเพื่อดึงดูดสิ่งมีชีวิตที่บินได้เป็นหลัก หลังจากที่ได้ผลิตสัตว์กินพืชพื้นเมืองส่วนใหญ่ ตัว อย่าง หลาย ตัว ยื่น ตัว สูง เหนือ หลังคา บ้าน และ ทํา ท่า ทาง เพื่อ ให้ สิ่ง มี ชีวิต ได้ ขึ้น บก."

 castaway_robot: "หุ่นยนต์คาสตาเวย์"
 castaway_robot_desc_short: "เครื่อง กล มนุษยธรรม ที่ เสื่อม โทรม ซึ่ง พบ ใน อวกาศ ลึก"
 castaway_robot_desc_details: "ภาพเบลอไม่กี่ภาพถูกสกัดออกมาจากธนาคารหน่วยความจําที่เสื่อมโทรม วิสต้ากว้างในระบบดาวไตรนารี ยานอวกาศสามเหลี่ยมและภูมิทัศน์ของเศษจักรกล น่า เสียดาย ไม่ มี พิกัด ใด โดย เฉพาะ ที่ สามารถ ถูก ส่ง ออก จาก ข้อมูล กํากับ ของ มัน ได้."

 cenotaph_display: "แสดง CNotafph"
 cenotaph_display_desc_short: "ภาพที่ถ่ายจากซีโนกราฟที่พบบน[fromfrom.GetName]"
 cenotaph_display_desc_details: "แม้ ว่า เรา ยัง ไม่ ได้ ระบุ ตัว ผู้ สร้าง แรก เดิม แต่ พวก เขา คง มี เหตุ ผล ที่ สําคัญ มาก ที่ จะ แจก จ่าย ก้อน หิน ที่ แกะ สลัก เป็น พิเศษ เหล่า นี้ ข้าม ผิว ดาว เคราะห์ ดวง หนึ่ง ที่ ไม่ มี ใคร อยู่. ภาพสลักหินเหล่านี้อธิบายรายละเอียด ของอารยธรรมทั้งเพิ่มขึ้นและล้ม และสัตว์ปีกที่พวกเขาฝึกสําหรับสงคราม ไฟและน่ากลัว สัตว์เหล่านี้จะหลีกเลี่ยงไม่ได้ ทําลายพันธนาการของพวกเขา และทําลายเจ้านายของพวกเขา ไม่ ว่า จะ เป็น อุทาหรณ์ หรือ เรื่อง ราว ทาง ประวัติศาสตร์ ก็ ไม่ อาจ รู้ ได้ แน่นอน."

 centrifugal_container: "ตัวบรรจุเซนทริลฟูก"
 centrifugal_container_desc_short: "อุปกรณ์ออร์บิทัลความเร็วสูง ออกแบบมาเพื่อรักษาสารเคมีที่ละเอียดอ่อน[from.GetName]"
 centrifugal_container_desc_details: "เมื่อเร่งไปสู่ความเร็วที่เหมาะสม มันสามารถป้องกัน องค์ประกอบใด ๆ ภายในจากการโต้ตอบกัน นับ แต่ นั้น มา เนื้อ ความ เดิม ของ คัมภีร์ ไบเบิล ก็ ถูก แทน ที่ ด้วย วัสดุ ที่ ใช้ ใน การ เขียน."

 cetana_love: "ความรักของเซทานา"
 cetana_love_desc_short: "คอมเมเดียมความรู้มากมายจากธนาคารข้อมูลของเซทาน่า"
 cetana_love_desc_details: "มันถูกเสนอให้[this.GetName]เป็นของขวัญที่ราชินีสังเคราะห์ต้องการ นําทางทุกชีวิตสู่ \"การปลดปล่อย\""

 chambered_clay_pot: "หม้อ ดิน"
 chambered_clay_pot_desc_short: "ภาชนะ ดิน เหนียว นี้ แบ่ง ออก เป็น สอง ห้อง"
 chambered_clay_pot_desc_details: "มี การ คาด คะเน ว่า มี การ ใช้ ห้อง หนึ่ง เพื่อ เก็บ รักษา สิ่ง ของ ต่าง ๆ ที่ เป็น อาหาร ส่วน อีก ห้อง หนึ่ง เก็บ ไว้ ใน ระบบ ทํา ความ เย็น แบบ ดั้งเดิม."

 claw_of_the_trickster: "กรงเล็บของทริกสเตอร์"
 claw_of_the_trickster_desc_short: "ถ้วยรางวัลที่ถ่ายจากชื่อ \"ทริกสเตอร์\""
 claw_of_the_trickster_desc_details: "สิ่ง มี ชีวิต ที่ ทรง พลัง และ หลอก ลวง อํานาจ ที่ น่า ทึ่ง ของ มัน ทํา ให้ มัน สามารถ เรียก สัตว์ ต่าง ๆ, เสก ภาพลวงตา, และ มี คาน ไฟ แห่ง พลัง งาน ที่ เข้ม ข้น. กล่าว กัน ว่า กรงเล็บ แต่ ละ อัน มี พฤติกรรม ราว กับ ถูก ควบคุม โดย ตัว ต่าง ๆ."

 confessions_benefactors: "การ บูชา รูป เคารพ"
 confessions_benefactors_desc_short: "เครื่อง บันทึก เสียง ซึ่ง บรรจุ ความ จริง ที่ ยาก ลําบาก เกี่ยว กับ อารยธรรม โบราณ ที่ รู้ จัก กัน ว่า เบเน ดิก ส์"
 confessions_benefactors_desc_details: "ในใบหน้าของภัยคุกคามที่ไม่เป็นที่รู้จัก พวกเขาใช้เทคโนโลยีขั้นสูงของพวกเขาในการดําเนินการออก \"แก้ไขโครงการหลัก...\" บน[controller.GetHomeWorldName]เปลี่ยนแปลงความขยันขันแข็ง[controller.GetAdjective]สังคมเป็นฝูงของเรียบง่ายที่ไม่เป็นอันตราย มี การ ทํา เช่น นี้ ใน ความ เชื่อ ที่ ว่า ภัย คุกคาม แบบ กาแล็กซี่ จะ ไม่ ทํา ให้ อาวุธ หรือ เวลา เสีย ไป กับ สังคม ที่ ต่ําต้อย เช่น นั้น. ท้ายที่สุด มาตรการที่น่าสงสัยนี้ ก็น่าจะเป็นสิ่งที่ช่วยให้[controller.GetName]เพื่ออยู่รอดต่อไปตอนนี้ ยืนอยู่บนบ่าของยักษ์"

 coprolite: "หินปูน"
 coprolite_desc_short: "ชิ้นดาวเคราะห์น้อยขนาดเท่า ฟอสซิลสารจากประมาณพันล้านปีที่ผ่านมา"
 coprolite_desc_details: "การ วิเคราะห์ ทาง พันธุกรรม บ่ง ชี้ ว่า ตัว อย่าง ที่ มา จาก อวกาศ ซึ่ง มี ขนาด ใหญ่ โต ไม่ รู้ จัก ได้ ก่อ ให้ เกิด ตัว อย่าง ที่ น่า ประทับ ใจ นี้. เราได้ตรวจสอบแล้วว่าอาหารของสัตว์ชนิดนี้ ส่วนใหญ่ประกอบด้วยแร่ธาตุหายาก และสิ่งมีชีวิตจากซิลิกอน วัตถุนี้ปัจจุบันเก็บบันทึกการจําแนกกาแล็กซี่ สําหรับชิ้นส่วนเดียวที่เป็นที่รู้จักมากที่สุดของอุจจาระ"

 cosmic_diamond_fragment: "ชิ้น ส่วน ของ เพชร คอสมิค"
 cosmic_diamond_fragment_desc_short: "ชิ้นที่เด้งออกจากดาวใกล้ตายที่มีตั้งแต่คริสตัลที่ถูกค้นพบใน[from.solar_system.GetName]"
 cosmic_diamond_fragment_desc_details: "เพชรคอสมิกนี้สร้างขึ้นใน ความกดดันที่รุนแรงของแกนดาว เย็นค่อยๆเป็น เศษปูน ที่ หา ยาก นี้ ประกอบ ด้วย ชั้น ฮีเลียม และ ออกซิเจน ที่ ติด อยู่ ภาย ใน ผิว ของ มัน."

 crimson_nimkips: "ค ริ สติ น"
 crimson_nimkips_desc_short: "สายพันธุ์ของพืชกึ่งมือ ที่ร่วมมือกันในจํานวนมาก เพื่อบรรลุความสําเร็จของความแข็งแรง"
 crimson_nimkips_desc_details: "เมื่อ อยู่ ห่าง จาก ความ ปลอด ภัย ของ กลุ่ม มัน สัตว์ เหล่า นี้ มัก จะ ถูก กิน โดย สัตว์ ล่า เหยื่อ เพราะ คุณค่า ทาง โภชนาการ ที่ ดี เยี่ยม ของ มัน. ด้วย ลักษณะ ที่ ยืดหยุ่น และ เชื่อ ฟัง นิ ม คีม ทํา ให้ สัตว์ เลี้ยง ที่ ดี เยี่ยม. ตัว นี้ ถูก เก็บ ไว้ อย่าง มี ชีวิต ชีวา ภาย ใน คอก ซึ่ง เลียน แบบ ถิ่น อาศัย ตาม ธรรมชาติ ของ มัน. อย่าตีลูกตอนเด็ก"

 crystal_core: "คริสตัล"
 crystal_core_desc_short: "กระจุก ประสาท ที่ เอา มา จาก คริสตัล ไลน์"
 crystal_core_desc_details: "คริสตัลนี้เป่าความถี่ที่สอดคล้องกัน โดยไม่คํานึงถึงอุณหภูมิ ก้อนผลึกใหม่เติบโตจากมวลกลางนี้ ในสภาพแวดล้อมที่อุดมไปด้วยแร่ โครงสร้างของพวกเขาเปลี่ยนแปลงในปฏิกิริยา จากพฤติกรรมนี้ เราสามารถตัดสินได้ว่า ปัจเจกบุคคลนั้น แตกต่างจากกันและกัน เนื่องจากปัจจัยสองประการ"

 crystal_nest_fragments: "ชิ้น ส่วน ผลึก"
 crystal_nest_fragments_desc_short: "พบภายในดาวเคราะห์น้อยที่คลาดเคลื่อน สิ่งมีชีวิตที่ท่องอวกาศ ประกอบคริสตัลเหล่านี้ ด้วยแรงกดดันอย่างมหาศาล"
 crystal_nest_fragments_desc_details: "จากร่องรอยที่พบภายในองค์ประกอบของพวกเขา เชื่อกันว่า สิ่งมีชีวิตเหล่านี้บริโภคแร่ธาตุที่มีปฎิกิริยาสูง"

 crystal_sphere_fragments: "คริสตัล"
 crystal_sphere_fragments_desc_short: "เศษหินของทรงกลมขนาดใหญ่ที่ปรากฏใน[target.GetName]"
 crystal_sphere_fragments_desc_details: "วัตถุลึกลับนี้ถูกมองว่า เป็นภัยคุกคามที่สําคัญ และถูกส่งไปอย่างรวดเร็ว ก่อนที่มันจะเสร็จสิ้น ปฏิบัติการที่ไม่รู้จักของมัน แม้ ว่า อาจ ไม่ มี ใคร รู้ เจตนา ของ มัน แต่ การ ทําลาย ล้าง นี้ เป็น แนว ทาง ที่ สม เหตุ สม ผล ใน การ ลง มือ ทํา เพื่อ ความ ปลอด ภัย แบบ กาแล็กซี่."

 crystallized_cutholoid_eye: "คริสตัล"
 crystallized_cutholoid_eye_desc_short: "ตา ของ คัท โฮ ลอย ด์ สามารถ ทน ความ กดดัน และ อุณหภูมิ ได้"
 crystallized_cutholoid_eye_desc_details: "แต่ ดู เหมือน ว่า มัน เป็น ส่วน หนึ่ง ของ กระบวนการ ตาม ธรรมชาติ ของ วัฏจักร ที่ ทํา ให้ เกิด การ แตก แยก."

 cult_pendant: "[cult_name.GetName]ปากกา"
 cult_pendant_desc_short: "สัญลักษณ์ที่สกัดจากหินกึ่งหนา ถูกยึดจาก[cult_name.GetName]ลัทธิ[owner.GetName]"
 cult_pendant_desc_details: "รายงานการแทรกซ้อนพบว่า สมาชิกลัทธิถือจี้ตามตําแหน่ง ในลําดับชั้นของกลุ่ม คนใหม่หล่อหลอมสัญลักษณ์ของตัวเองจากดินเหนียว ขณะที่นักลัทธินิยมอาวุโส มอบหมายรายละเอียดเกี่ยวกับโลหะล้ําค่า"

# this = ship / fromfrom = planet
 cunning_flora_specimen: "ซิ ม ยา ปฏิชีวนะ"
 cunning_flora_specimen_desc_short: "เป็นพืชพื้นเมืองของ[fromfrom.GetName]ได้พัฒนาโครงสร้างทางสังคมที่ซับซ้อน ที่ช่วยในการอยู่รอดของพวกเขา"
 cunning_flora_specimen_desc_details: "แต่ละสายพันธุ์มีวิธีที่มีประสิทธิภาพเป็นพิเศษ ของการกัดกร่อนจากนักล่า จากหนามแหลมคม ความสัมพันธไมตรีกันของพันธุกรรมนี้ทนทานมาก จนองค์ประกอบของบรรยากาศและดินของโลก ตัวทดลองที่มีประสิทธิผลมากที่สุด คือให้อิสระแก่การสืบพันธุ์อย่างกว้างขวางมากขึ้น เสริมสร้างความแข็งแกร่งของกระจุกดาว"

 curator_survey: "[from.GetName]สํารวจตัวรักษา"
 curator_survey_desc_short: "การสํารวจอย่างละเอียดของ[from.GetName] ระบบดาวออกแบบโดย ภัณฑารักษ์ของอาร์โทรปอยด์ยักษ์"
 curator_survey_desc_details: "เครื่อง มือ ที่ แม่นยํา อย่าง ยิ่ง ซึ่ง ใช้ ใน การ วิจัย ทํา ให้ มี การ วิเคราะห์ คุณสมบัติ ทุก อย่าง ของ ระบบ นี้. การ เอา ใจ ใส่ ต่อ ราย ละเอียด ที่ แสดง ไว้ ใน ข้อ นี้ บ่ง ชี้ ถึง ความ รัก ใคร่ อย่าง ยิ่ง ต่อ งาน ชนิด นี้."

 cutholoid_digestive_acids: "อนุภาค ที่ มี ความ ไว ต่อ การ ติด เชื้อ"
 cutholoid_digestive_acids_desc_short: "น้ํา กัมมันตภาพรังสี ที่ ได้ จาก เขียง"
 cutholoid_digestive_acids_desc_details: "คัตโฮลอยส์พึ่งพาการสลายตัวของนิวเคลียร์ ของไอโซโทปโคบอลท์-60 เพื่อย่อยกินเหยื่อ กรดในกระเพาะของพวกเขาเองค่อนข้างอ่อน เมื่อ เป็น เช่น นั้น การ ย่อย ส่วน เนื้อ เยื่อ ที่ เป็น ลิ่ม อาจ เป็น กระบวนการ ที่ ยาว นาน. เมื่อ เซลล์ ของ มัน อ่อนแอ ลง เนื่อง จาก รังสี กรด นี้ ก็ สามารถ ทําลาย และ สกัด สาร อาหาร ได้ แม้ แต่ จาก แหล่ง ที่ ไม่ น่า จะ เป็น ไป ได้."

 cybrex_mining_column: "คอลัมน์"
 cybrex_mining_column_desc_short: "อุปกรณ์ ทํา เหมือง แบบ อัตโนมัติ ที่ ได้ รับ การ ออก แบบ มา เพื่อ รวบ รวม ก๊าซ ฮีเลียม-3 ที่ มี สมาธิ"
 cybrex_mining_column_desc_details: "เสาสูงของแผ่นแม่เหล็กถ่วงน้ําหนักและ ความจุสูงเครื่องอัดอากาศ เครื่องนี้ค้อนทางผ่านพื้นผิวของดาวเคราะห์ กระบวนการ นี้ ทํา ให้ ก๊าซ รวม จุด อยู่ ที่ การ เก็บ และ การ ปล่อย ก๊าซ ก่อน จะ ส่ง ไป ยัง การ ปรับ ปรุง ขั้น ต่อ ไป."

 data_on_infinity: "ข้อมูล เกี่ยว กับ ลักษณะ ของ ความ ไม่ พอ ใจ"
 data_on_infinity_desc_short: "การแสดงออกทางกายภาพของความสงบห่างไกลประสบการณ์โดยหุ่นยนต์ที่ติดอยู่ในหลุมดํา"
 data_on_infinity_desc_details: "หน่วยเหล่านี้มีประสบการณ์การขยายเวลา เป็นรัฐสแตนด์บาย สามารถประมวลผลอย่างว่องไวและปรับปรุงข้อมูล ไม่ผูกพันกับคําสั่งหลักอีกต่อไป พวกเขาให้ความเข้าใจ ผ่านการเชื่อมต่อหลวม"

 datacore_of_sinople: "ตัวแบ่งข้อมูล"
 datacore_of_sinople_desc_short: "ไดรฟ์ข้อมูลที่เข้ารหัสจากศ.AI ออกแบบโดยอัศวินโบราณ"
 datacore_of_sinople_desc_details: "พบในการควบคุมของเรือที่สูญเสียไปนาน'แดมเซล'ตัวข้อมูลนี้ถูกพบคนเดียว ในเรือที่ถูกทิ้งร้าง ถูกทําลายไปนานแล้วโดยผู้ปล้น มี ข้อมูล ที่ มี คุณค่า เกี่ยว กับ การ เดิน ทาง ใน อวกาศ ที่ เป็น พิษ."

 dathnak_gas: "ก๊าซ Dathnak"
 dathnak_gas_desc_short: "การ สะสม ก๊าซ แปลก ๆ ที่ ได้ รับ จาก ก๊าซ ดาธแนค"
 dathnak_gas_desc_details: "กล่องนี้เสนอให้[this.GetName]เพื่อช่วยเหลือการอพยพของ Dathnak ไปยังดาวเคราะห์ดวงใหม่ การวิเคราะห์แมสสเปกโตรเมตร เปิดเผยมัน ประกอบไปด้วยอะตอมจํานวนเท่ากันพอดี เราค่อนข้างแน่ใจว่า ไม่มีสิ่งมีชีวิตภายใน"

 dead_god_mantle: "คน ตาย แล้ว"
 dead_god_mantle_desc_short: "ของขวัญจากทูต[worshipper_species.GetName]"
 dead_god_mantle_desc_details: "เป็นชาวพื้นเมือง[dead_god_planet.GetName]พวกเขาได้บูชาซาก ของสิ่งมีชีวิตต่างดาวขนาดใหญ่ ตั้งแต่สายพันธุ์ของพวกเขาเพิ่มขึ้น เพื่อกระดานชนวนเสื้อคลุมที่เย็บเข้าด้วยกันนี้ สร้างขึ้นจากเนื้อแข็งของพระเจ้าที่ตายแล้วของพวกเขา เป็นตัวแทนของตําแหน่งที่สูงสุดในคณะศาสนาของพวกเขา"

 decayed_megathrusters: "นก เม กา รุ ส เตอร์"
 decayed_megathrusters_desc_short: "เครื่องยนต์บูสเตอร์ พบบนเรือแกร์แกนตูอัน ที่ผลิตจากโลหะแปลกใหม่"
 decayed_megathrusters_desc_details: "เรือ ลํา นี้ ถูก ค้น พบ ใน สุสาน เรือ ขนาด ใหญ่ แห่ง หนึ่ง ซึ่ง วาง อยู่ ที่ นั่น นาน กว่า สอง ล้าน ปี. ระดับของการสลายตัวและการทําลายล้าง ในพื้นที่ทิ้งศพโบราณนี้ ยิ่งใหญ่จนแม้แต่การศึกษาอย่างพิถีพิถัน ก็ไม่สามารถให้ข้อมูลงานวิจัยที่ใช้ได้ มันแสดงที่นี่เพื่อเตือนเรา ของเยาวชนที่เป็นญาติของสังคมของเราในกาแล็กซี่นี้"

 decayed_satellite: "ดาวเทียมที่ลดลง"
 decayed_satellite_desc_short: "ผู้รอดชีวิตจากโครงการอวกาศยุคแรก จากผู้อยู่อาศัย[fromfrom.GetName]"
 decayed_satellite_desc_details: "ธรรมชาติ ของ ดาว เทียม เหล่า นี้ ใน ยุค แรก ๆ ยัง ผล ให้ มี อุปกรณ์ ที่ ไม่ มี ประสิทธิภาพ ซึ่ง มี วัสดุ ราคา แพง เกิน ไป. ตัว อย่าง ที่ เจาะจง นี้ ได้ รับ การ แปล ด้วย อาวุธ ระเบิด แต่ ก่อน หน้า นี้ เคย ใช้ เพื่อ ให้ การ สื่อสาร ทาง โทรศัพท์ เข้า ถึง บริเวณ ห่าง ไกล."

 declaration_of_animosity: "$NAME_Nivlac$ปฏิญญา เรื่อง ความ ไม่ ลําเอียง"
 declaration_of_animosity_desc_short: "การสื่อสารแบบสุภาพแต่ไม่สุภาพจาก[nivlac_country.GetName]"
 declaration_of_animosity_desc_details: "เดอะ[nivlac_species.GetName]สายพันธุ์แรกถูกค้นพบโดย[this.GetName]บน[impossible_organism_planet.GetName]อย่างไรก็ตาม ในการตอบสนองต่ออัตราการวิวัฒนาการของพวกเขา[this.GetAdjective]นัก วิทยาศาสตร์ พา สัตว์ เหล่า นี้ ขึ้น ไป ใน อวกาศ ลึก. สิ่งมีชีวิตไม่เพียงรอดชีวิต แต่ตั้งถิ่นฐานในดาวเคราะห์ที่พวกเขา จบลงบน เดอะ[nivlac_country.GetName]ท่าน มิได้ ลืม การ ละเมิด ต่อ เขา"

 declaration_of_friendship: "$NAME_Nivlac$คํา แถลง เกี่ยว กับ มิตรภาพ"
 declaration_of_friendship_desc_short: "จดหมายขอบคุณจาก[nivlac_country.GetName]ของ[nivlac_planet.GetName]"
 declaration_of_friendship_desc_details: "เดอะ[nivlac_species.GetName]สายพันธุ์แรกถูกค้นพบโดย[this.GetName]คนที่เลี้ยงดูพวกเขา และเสนอที่ปลอดภัยให้พวกเขาพัฒนาด้วยตัวเอง การปลดปล่อยอย่างรวดเร็ว[nivlac_species.GetName]อย่างรวดเร็วกลายเป็นความสามารถ ในการเดินทางของ FTL การ กระทํา แรก ของ พวก เขา บน เวที กามาลี คือ การ แสดง ความ หยั่ง รู้ ค่า ต่อ ผู้ มี อุปนิสัย และ ผู้ พิทักษ์ ที่ ทรง คุณ ความ ดี ของ พวก เขา ทํา ให้ มี มิตรภาพ ทาง การ ทูต."

 derelict_cybrex_warform: "ไดเรกทอรี"
 derelict_cybrex_warform_desc_short: "ซาก ของ สงคราม ไซ เบรกซ์ ที่ ถูก ทําลาย ใน การ สู้ รบ ชนิด ของ มัน เอง"
 derelict_cybrex_warform_desc_details: "สาเหตุของการต่อสู้นี้ไม่ทราบ ดังนั้น ตรงกันกับเครื่องจักรเหล่านี้ การระเบิดของเป้าหมายอย่างแม่นยํา ถูกจัดการกับระบบวิกฤติเดียวกัน ก่อนที่ภาวะฉุกเฉินจะจุดชนวน ตัว อย่าง ที่ หา ได้ ยาก ของ เพื่อน เก่า แท้ ใน สงคราม."

 desiccated_brain_slug: "บิดสมอง"
 desiccated_brain_slug_desc_short: "ซากศพของสปีชีส์สังเคราะห์ พบบน[From.From.GetName]"
 desiccated_brain_slug_desc_details: "การ วิเคราะห์ แสดง ว่า มัน สามารถ ทํา หน้า ที่ เป็น สมอง ที่ ซับ ซ้อน ยิ่ง ขึ้น สําหรับ เจ้า ภาพ เพื่อ แลก กับ การ บํารุง เลี้ยง และ การ คุ้มครอง. ความร่วมมือนี้ต้องการความเต็มใจโดยตรงจากโฮสต์ มิฉะนั้นการเชื่อมต่อประสาทของพวกเขาจะไม่สามารถจัดตั้งได้อย่างถูกต้อง กล่าว กัน ว่า การ ทํา เช่น นั้น ก่อ ให้ เกิด ความ รู้สึก กระฉับกระเฉง อย่าง น่า พอ ใจ เมื่อ การ ผนวก เข้า กับ ระบบ ประสาท."

# this = owner / prev = colony
 destroyed_mascot_of_colony: "ที่เหลืออยู่[prev.GetName]หุ่นยนต์"
 destroyed_mascot_of_colony_desc_short: "ซากศพของหุ่นยนต์พื้นเมืองที่พบหลังจากการวาง[prev.GetName]"
 destroyed_mascot_of_colony_desc_details: "เจ้า หน้าที่ คน สุด ท้าย ที่ ยัง เหลือ อยู่ ของ โรง งาน โบราณ ได้ ช่วย กลุ่ม ผู้ ตั้ง อาณานิคม ไว้ ใน ซาก ปรัก หัก พัง. การ เต้น รํา แบบ มี ลักษณะ เป็น นัย และ มี การ เล่น แบบ แปลก ๆ ใน การ แสดง แบบ ดิจิตอล เป็น ส่วน หนึ่ง ของ การ แสดง."

 devolved_baol_drones: "เดโวลเวฟ บาโอล เดโรนีส"
 devolved_baol_drones_desc_short: "ชุด ที่ เก็บ รักษา ไว้ ของ เบาล์ ยัง คง มี ความ แตก ต่าง ทาง พันธุกรรม ที่ สําคัญ จาก ตัว อย่าง ที่ เคย ค้น พบ ก่อน หน้า นี้"
 devolved_baol_drones_desc_details: "โดรนพวกนี้ขาดอุปกรณ์เพิ่มสูงขึ้นหลายชิ้น ความสามารถในการรับรู้ของพวกเขาถูกลดลงมาจนถึงจุดที่ พวกเขาไม่สามารถติดต่อสื่อสารทางนิเวศวิทยาได้"

 dimensional_endothelial_lining: "การ เชื่อม ต่อ ทาง ด้าน มิติ"
 dimensional_endothelial_lining_desc_short: "สาร เพ คิว ริล ลา ติน ซึ่ง ได้ มา จาก ระบบ อุโมงค์ ที่ อุด ตัน ภาย ใน แอ ส เท อร์ ไรต์"
 dimensional_endothelial_lining_desc_details: "ขณะ ที่ เยื่อ หุ้ม ภาย ใน สิ่ง มี ชีวิต ที่ ไม่ รู้ จัก วัสดุ นี้ ทํา ให้ เกิด การ เคลื่อน ไหว ที่ ไม่ มี แรง เสียด ทาน ระหว่าง ระบบ หลอด เลือด ขนาด ใหญ่ กับ วัสดุ ที่ ส่ง เข้า ไป ใน ตัว มัน."

 dna_archive: "แฟ้มจัดเก็บ DNA"
 dna_archive_desc_short: "ตัวอย่างที่ถ่ายมาจากตู้คอนเทนเนอร์หลายร้อยของดีเอ็นเอของมนุษย์ต่างดาว เก็บรักษาไว้ในที่เก็บใต้ดินโดยอารยธรรมที่หายไป"
 dna_archive_desc_details: "ข้อมูลทางชีววิทยานี้ น่าจะเป็นทรัพยากรที่อ้างอิงได้มากที่สุด หากตัวอย่างส่วนใหญ่ไม่ได้ย่อยสลายไป มันคาดเดาได้ว่า ความตั้งใจของบันทึกนี้ คือการอนุญาตให้เป็นไปได้ ของการค้นพบอารยธรรมที่ก้าวหน้าขึ้น แต่น่าเสียดายที่ เรื่องราวของพวกเขาจะจบลงที่นี่"

 doomsday_scrolls: "ม้วน หนังสือ แห่ง วัน สิ้น โลก"
 doomsday_scrolls_desc_short: "ข้อ คัมภีร์ ฝ่าย วิญญาณ โบราณ ที่ ค้น พบ ใน ใจ ของ เขาวงกต"
 doomsday_scrolls_desc_details: "ม้วน หนังสือ เหล่า นั้น พรรณนา ถึง สิ่ง ที่ น่า สะ พรึง กลัว; พวก อาร์ เท มิส, เงา ที่ ไม่ มี อะไร เทียบ ได้, และ ความ หิว กระหาย ที่ จะ ถูก ทําลาย. ระบบความเชื่อของคนพื้นเมืองได้บัญญัติไว้ ว่าเส้นทางเดียวสู่การไถ่บาป จากสัตว์ประหลาดตัวนี้ คือการป้องกันไม่ให้มัน ดังนั้น ประชากรจึงทําการฆ่าตัวตายหมู่"

 drone_ship_core: "เรือดรอน"
 drone_ship_core_desc_short: "ผู้ สนับสนุนของแกนจากเรือโดรนไฮเทคที่มีตั้งแต่ทําลายตัวเอง"
 drone_ship_core_desc_details: "เรือ ลํา นี้ ได้ รับ การ ค้น พบ ใน ตอน แรก ๆ ว่า มี การ ก่อ ตัว ใน บรรยากาศ ที่ เป็น กรด ของ[warform_origin_planet.GetName]AI บนยานได้ดําเนินการอย่างเป็นเอกเทศ แต่ได้ถูกลบออกไป เป็นส่วนหนึ่งของระเบียบการคัดเลือกด้วยตนเอง เครื่องยนต์ไม่สามารถกู้ข้อมูลที่หายไปได้ และภารกิจเดิมของมันก็เลยกลายเป็นปริศนา"

 electric_life: "ชีวิต ไฟฟ้า"
 electric_life_desc_short: "รูปแบบของสิ่งมีชีวิตทั้งหมดประกอบด้วย กระแสไฟฟ้าที่พบบน[from.GetName]"
 electric_life_desc_details: "สิ่งมีชีวิตเหล่านี้อยู่โดยไม่มีการเรียงลําดับของเซลล์ใด ๆ หรือโครงสร้างพื้นฐานไวรัส ยังสามารถสร้างรูปแบบที่ซับซ้อน เรา ไม่ อาจ ตัดสิน ได้ ว่า แรง กระตุ้น เหล่า นี้ เป็น ปัจเจกบุคคล หรือ เป็น ตัว แทน ของ สิ่ง ที่ มี ชีวิต มาก กว่า นั้น หรือ ไม่."

 enormous_scrambled_albumen: "อัลบัม"
 enormous_scrambled_albumen_desc_short: "ภายในของ[fromfromfrom.GetName]ซึ่งถูกค้นพบเป็นไข่ยักษ์"
 enormous_scrambled_albumen_desc_details: "เมื่อได้แตกมันออก ดาวเคราะห์ที่ถูกน้ําท่วม ด้วยของเหลวที่แปลกประหลาดแร่ที่อุดมไปด้วย การ สังเคราะห์ สาร นี้ และ การ ผนวก สาร นี้ เข้า กับ อาหาร อินทรีย์ ของ เรา คง จะ ช่วย ปรับ ปรุง ระดับ สาร อาหาร ทั่ว ไป."

 epic_of_zarqlan: "เอ ปี กู เรียว แห่ง ซาร์ก ลาน"
 epic_of_zarqlan_desc_short: "พระคัมภีร์ศักดิ์สิทธิ์ของซาร์กลัน, ผู้พิทักษ์ MOZ-TARB, ศาสดาของ ZVA"
 epic_of_zarqlan_desc_details: "เมื่อ สาวก คน หนึ่ง ของ เซ ทา นา พบ ว่า ไม่ นาน เธอ ก็ ได้ รับ ความ รอด ตาม คํา สัญญา. หลัง จาก ดิ้นรน หลาย ครั้ง ซาร์ก ลาน สามารถ ขึ้น ไป ยัง แดน วิญญาณ. ที่นั่นเขาขอร้อง§Y(คือ) บรรดาผู้แบ่งแยกแผ่นดิน§!เพื่อช่วยเขาเอาชนะเซทาน่า ในที่สุด หลังจากสวดมนต์มานานหลายปี เหล่าอนิเมเตอร์ก็มอบโซ่อันทรงคุณค่าให้กับเขา แต่ซาร์กลันได้รับการเตือนว่า ห่วงโซ่ไม่สามารถบรรจุอํานาจของเธอตลอดไป\n\n§P\"เธอจะกลับมา และเราต้องพร้อม\"§!"

 ethereal_dust: "ฝุ่น ละออง"
 ethereal_dust_desc_short: "ร่องรอยของหัวหน้านักค้นคว้า เหลืออยู่บนยานวิทยาศาสตร์ที่ถูกปล้น[solar_system.GetName]"
 ethereal_dust_desc_details: "การวิเคราะห์สารแอสตรัลนี้ ส่วนใหญ่ไม่แน่นอน แต่ร่องรอยดีเอ็นเอของนักวิจัย หลักฐานทั้งหมดชี้ว่า นักวิทยาศาสตร์ข้ามจากมิติของเราไปอีกมิติหนึ่ง โดยใช้รอยแตกชั่วคราวในอวกาศ เราอาจไม่รู้ว่าพวกเขารอดรึเปล่า"

 exobiology_compendium: "คอมโพเนเดียมของอุตุนิยมวิทยา"
 exobiology_compendium_desc_short: "กระดาษ วิจัย ที่ ครบ ถ้วน เกี่ยว กับ ความ มหัศจรรย์ ของ ชีวิต มนุษย์ ต่าง ดาว ตลอด หลาย ระบบ ใน กาแล็กซี"
 exobiology_compendium_desc_details: "รายงาน นี้ มี ราย ละเอียด และ การ วิจัย อย่าง กว้าง ขวาง จาก ดาว เคราะห์ หลาย ดวง ซึ่ง ทํา ให้ รู้ จัก สภาพ การณ์ ต่าง ๆ ที่ เป็น ไป ได้ ตลอด กาล ซึ่ง จะ ค้น พบ ชีวิต ภาย ใน กาแล็กซี. มันจบลงด้วยประโยคที่ว่า \"ชีวิตอย่างที่เรารู้มันจะไม่มีวันเหมือนเดิม\""

 extradimensional_ceramic_pot: "หม้อเซรามิกแบบพิเศษ"
 extradimensional_ceramic_pot_desc_short: "หม้อเซรามิค พบดาว"
 extradimensional_ceramic_pot_desc_details: "มันอยู่เพียงเป็นเงา ของวัตถุสี่มิติอื่น ๆ จากมิติที่สูงขึ้น ภายในระนาบของการดํารงอยู่ของเรา ภาชนะที่ถ่อมตัวนี้ จะไม่สามารถทําลายและต่อต้านตรรกะทั้งหมด มันบอกความเป็นจริงของเราว่า สําหรับลําดับที่สูงขึ้น เรามีโอกาสน้อยกว่าหม้อธรรมดานี้"

 extradimensional_fungus: "เลเยอร์ถัดไป"
 extradimensional_fungus_desc_short: "สิ่ง มี ชีวิต ที่ มี ความ ซับ ซ้อน ชนิด หนึ่ง ที่ ค้น พบ นอก เหนือ จาก สาหร่าย"
 extradimensional_fungus_desc_details: "เป็น ส่วน หนึ่ง ของ กระบวนการ สื่อสาร ตาม ธรรมชาติ มัน มี เกล็ด ไฟ อุด ตัน พร้อม กับ ส ปอร์ ซึ่ง แขวน อยู่ ใน แบบ ของ ก๊าซ ที่ มี อุณหภูมิ สูง. แม้ ว่า จะ มี คุณค่า สูง ใน การ ผลิต ก๊าซ อุตสาหกรรม แต่ ก็ รู้ กัน ว่า เชื้อ รา ชนิด นี้ มี จํานวน เล็ก น้อย ถูก ขาย ไป แล้ว ฐานะ เป็น อาหาร รส เลิศ ใน ตลาด มืด."

 fevorian_blueprints: "ไดรเวอร์แมสสีฟลายเจอร์"
 fevorian_blueprints_desc_short: "ของขวัญจากฟลายเรียน"
 fevorian_blueprints_desc_details: "นโยบายการกวาดล้างของกุมภาพันธ์ขยายไปยังทุกชีวิตคนต่างด้าวที่รู้จักกันโดยการเปิดตัวขนาดใหญ่รอบที่เกือบทําลาย[this.GetName]ทั้งหมดของมัน หลัง จาก ได้ รับ การ ไว้ ชีวิต พวก เขา ได้ แบ่ง พิมพ์เขียว กัน สําหรับ เครื่อง ยิง ปืน ขนาด ยักษ์ ภาย ใต้ ข้อ ตก ลง ที่ ว่า อาวุธ อัน โหด ร้าย เหล่า นี้ จะ ไม่ ถูก สร้าง ขึ้น อีก."

 figurehead_hyacinth: "หัว มุม ของ หัว มุม"
 figurehead_hyacinth_desc_short: "รูป ปั้น ที่ ได้ มา จาก การ เดิน เรือ ใน นาวา นาวา ไฮ อา ซินท์"
 figurehead_hyacinth_desc_details: "หลัง จาก เครื่อง ปฏิกรณ์ เสีย หาย ร้าย แรง เรือ นาวา ก็ ถูก ทิ้ง ไว้ โดย ไม่ มี พลัง และ จม อยู่ ใน ความ ลึก ของ อวกาศ. พวก คอ โลญ ต่อ สู้ กับ ทรัพยากร ที่ ลด ลง ก่อน ที่ ใน ที่ สุด จะ อด ตาย. ภาพ แกะ สลัก นี้ มี คํา จารึก และ สัญลักษณ์ แห่ง ความ หวัง หลาย อย่าง ที่ มี ขึ้น โดย การ ดล ใจ."

 first_defiled_astronaut: "อันดับแรก[DefiledCountry.GetSpeciesName]นักบินอวกาศ"
 first_defiled_astronaut_desc_short: "วีรบุรุษแห่งชาติ[DefiledCountry.GetSpeciesName]ชนิด"
 first_defiled_astronaut_desc_details: "สายพันธุ์แรกของพวกเขา ทําลายพันธบัตรที่กดขี่ ของแรงโน้มถ่วงของโลกที่บ้านของพวกเขา ดีและลงทุนเข้าไปในพรมแดนใหม่ นักบินอวกาศคนนี้ ถูกวางในกระสวยยาน เพื่อฝัง เรือ ลํา นี้ ถูก ค้น พบ ว่า ลอย อยู่ ใน อวกาศ และ ถูก เก็บ รักษา ไว้ เป็น สิ่ง ประดิษฐ์ ทาง วัฒนธรรม."

 first_league_crew_manifest: "นักกีฬาลีกแรกแสดง"
 first_league_crew_manifest_desc_short: "สมาชิก ใน ทีม ทหาร จาก อารยธรรม โบราณ ที่ รู้ จัก กัน ใน ชื่อ สันนิบาต แรก"
 first_league_crew_manifest_desc_details: "เป็นส่วนหนึ่งของ \"นาวี\" ของพวกเขา เรือรบสองล้านปีนี้ดําเนินการ ภายใต้ทีมเวิร์ค 12 สายพันธุ์ เอกสารฉบับนี้ลงนามโดยเจ้าหน้าที่สกิตเตอร์แห่งมิกิร-ยานัน และดูเหมือนว่าเป็นการชุมนุมทั่วไป"

 fish_in_the_sea_sheet_music: "ช่อง ว่าง"
 fish_in_the_sea_sheet_music_desc_short: "เรือที่ประดับด้วยเครื่องราชอิสริยาภรณ์เพื่อ'โรคทะเล'พบบนเรือออกแบบเพื่อแล่นเรือตามลมสุริยะ"
 fish_in_the_sea_sheet_music_desc_details: "ด้วยการอ้างอิงมากมายถึงพายุและสภาพอากาศ มันคาดเดาได้ว่าสายพันธุ์ที่แต่งเพลงนี้ มาจากประเพณีเชิงลึก เพลง นี้ ยัง คง ไม่ ชัดเจน เกี่ยว กับ เหตุ ผล ที่ มี การ ออก แบบ ให้ ร้อง ซ้ํา อีก ตลอด ระยะ เวลา เกือบ สิบ ชั่วโมง."

 flag_of_the_jaro_lyjo: "ธง ของ เจ โร ไลโจ"
 flag_of_the_jaro_lyjo_desc_short: "จาโร ไลโจ เป็นหัวหน้ากลุ่มเดซิป แบนดิซ เป็นกลุ่มโจรสลัดที่อยู่มาหลายร้อยชั่วอายุคน"
 flag_of_the_jaro_lyjo_desc_details: "ทั้ง ๆ ที่ พวก เขา มี นิสัย ดุ ร้าย และ ชอบ ใช้ ความ รุนแรง แต่ พวก เขา ก็ ได้ รับ การ เลือก ตั้ง เป็น ประชาธิปไตย โดย ลูก เรือ และ จะ รับ ใช้ จน กระทั่ง เสีย ชีวิต หรือ เกษียณ อายุ. ประวัติศาสตร์ ที่ เก็บ สะสม ไว้ ของ พวก เดซิพ แบนดิส์ ได้ สิ้น สุด ลง อย่าง กะทันหัน เมื่อ กอง เรือ ทั้ง กอง ถูก ทําลาย ใน การ รบ ของ ยู ดาห์ หลัง จาก การ แลก เปลี่ยน ค่า ไถ่ ไป อย่าง เปรี้ยว."

 flooded_settlement_mound: "น้ํา ท่วม"
 flooded_settlement_mound_desc_short: "ซาก ปรัก หัก พัง ของ โครง สร้าง ที่ มี น้ํา ท่วม ซึ่ง สร้าง โดย[controller.GetPreFTLLower]แอโทรพอดจาก[from.GetName]"
 flooded_settlement_mound_desc_details: "ขณะที่อารยธรรมนี้พัฒนาอุตสาหกรรม น้ําแข็งขั้วโลกเริ่มละลาย ระดับน้ําทะเลเพิ่มขึ้นอย่างรวดเร็ว น้ําท่วมตั้งถิ่นฐานของพวกเขา และประณามสายพันธุ์ที่จะสูญพันธุ์ สิ่ง ก่อ สร้าง ที่ สูง ที่ สุด ใน บรรดา สิ่ง ก่อ สร้าง เหล่า นี้ ตอน นี้ แทบ จะ ไม่ ลุก ขึ้น จาก ก้น ทะเล ถึง ครึ่ง หนึ่ง."

 fossilized_endoskeletons: "ฟอสซิล"
 fossilized_endoskeletons_desc_short: "นี่คือเศษซากของสายพันธุ์มนุษย์ไม่ทราบชื่อ หลังจากที่ทําให้ทรัพยากรแร่อ่อนล้า[fromfrom.GetName]"
 fossilized_endoskeletons_desc_details: "พวกสัตวแพทย์กินพืช ที่อุดมไปด้วยแร่ เพื่อเสริมสร้างเอ็นโดสเกลีออนที่หนาแน่น อย่างไรก็ตาม แนวโน้มตามธรรมชาติของร่างกายของไบต์เหล่านี้ให้ยืมตัวเองเป็นฟอสซิล แทนการย่อยสลาย ไม่สามารถเข้าถึงองค์ประกอบที่สําคัญเหล่านี้ได้ โลกเสื่อมโทรมลงและในที่สุดก็กลายเป็นเป็นหมัน"

 fossilized_megastomach: "ฟอสซิลเม กา โท มาช"
 fossilized_megastomach_desc_short: "ต่อมไดเอสเตฟเอาจาก สิ่งมีชีวิตคล้ายหนอน ที่พบบน[fromfrom.Planet.GetName]"
 fossilized_megastomach_desc_details: "น่าทึ่งที่อารยธรรมทั้งหมด พัฒนาขึ้นในลําไส้ของสิ่งมีชีวิต ก่อนที่จะถูกย่อยอย่างสมบูรณ์ ต่อมเหล่านี้มีเครื่องหมายของอาวุธ โจมตีจาก \"สงครามอันยิ่งใหญ่\" คนเหล่านี้ต่อสู้อย่างไร้ประโยชน์กับโฮสต์ของพวกเขา ต่อ มา หนอน แกร์ แกน ตู อัน ตาย ด้วย สาเหตุ ตาม ธรรมชาติ ภาย ใน เครือ ข่าย ของ โพรง."

 fossilized_voidworm_tooth: "ฟัน ของ หนอน หมึก ที่ เป็น ฟอสซิล"
 fossilized_voidworm_tooth_desc_short: "รูป แบบ การ สวม ใส่ ฟอสซิล ของ หนอน ริด นี้ บ่ง ชี้ ว่า มัน มี อายุ ยืน กว่า หนึ่ง ร้อย ปี"
 fossilized_voidworm_tooth_desc_details: "ฟัน นี้ แสดง ให้ เห็น การ สึก หรอ และ การ เปื่อย สลาย อย่าง หนัก โดย ทั่ว ไป ของ สิ่ง มี ชีวิต ที่ ใช้ เป็น อาหาร ของ ดาว เคราะห์ น้อย และ เศษ ซาก อวกาศ. มี การ กะ ประมาณ ว่า พยาธิ น้ํา แข็ง ชนิด ทั่ว ไป จะ งอก ขึ้น และ ทํา ให้ ฟัน ผุ ไป กว่า สาม พัน ซี่ ตลอด ช่วง ชีวิต ของ มัน."

 fossilized_vultaum_remains: "ฟอสซิล"
 fossilized_vultaum_remains_desc_short: "ซากฟอสซิลของสิ่งมีชีวิตที่คล้ายหนอนโบราณ ที่รู้จักกันในชื่อ Vultaum"
 fossilized_vultaum_remains_desc_details: "เชื่อกันว่าตัวอย่างนี้เป็นเยาวชน รูปแบบการเจริญเติบโตภายใน บ่งชี้ว่า Vultaum จะลอกผิวหนังตัวเอง ในระยะที่แปรปรวน ขึ้นอยู่กับสุขภาพและสารอาหารของแต่ละคน โดย วิธี นี้ เรา สามารถ เรียน รู้ เกี่ยว กับ รถ ชูชีพ แต่ ละ ล้อ ได้ โดย ตรวจ สอบ ฟอสซิล จาก ช่วง เวลา นั้น."

 fractured_planet: "วรรคตอนดาวเคราะห์"
 fractured_planet_desc_short: "ซากศพของดาวเคราะห์ ที่จงใจทําลายโดยผู้อาศัยของมันเอง"
 fractured_planet_desc_details: "ไม่ ว่า สภาพ การณ์ ใด ก็ ตาม ที่ ทํา ให้ พวก เขา ตัดสิน ใจ อย่าง หนัก เช่น นั้น ได้ สูญ เสีย เวลา."

 fragment_of_reckoning: "ชิ้น ส่วน ของ การ คํานวณ"
 fragment_of_reckoning_desc_short: "ส่วนที่เหลือที่จับได้บางส่วนของแรงโพซิโอที่ดี"
 fragment_of_reckoning_desc_details: "ที่รู้จักกันในมิตินี้ว่า การคิดบัญชี องค์กรนี้ต้องรับผิดชอบ ต่อการเปลี่ยนแปลงของความเสียหาย[event_target:shrouded_planet.GetName]ชิ้น ส่วน นี้ โดย เฉพาะ ถูก บรรจุ ไว้ โดย อารยธรรม ที่ มี ความ เชี่ยวชาญ ใน ทฤษฎี ของ ไซ โอน ไม่ นาน ก่อน พวก เขา ตาย."

 fragmented_zroni_archive: "แฟ้มจัดเก็บแบบบีบอัดแบบภาษาสโรนี"
 fragmented_zroni_archive_desc_short: "พบการเข้ารหัสขนาดใหญ่บน[fromfrom.Planet.GetName]จากอาณานิคมโบราณที่รู้จักกันในชื่อ ซรอนนี"
 fragmented_zroni_archive_desc_details: "มันประกอบด้วยประวัติศาสตร์ของอารยธรรมที่ทรงอํานาจ กับความสามารถของไซโอนิคที่กําเนิดขึ้น ความสามารถของพวกเขาที่จะผ่านชรูดอย่างอิสระ ทําให้เป็นไปได้โดย การค้นพบจากผู้อาวุโสในตํานาน ที่รู้จักกันเพียงเป็น \"ไกลสุดสุด\" ภายในชรูด, พลังของสายพันธุ์นี้สมบูรณ์ดังนั้น ที่มันอาจจะไม่ถูกต้องอย่างมีเหตุผล แต่น่าเสียดายที่ข้อมูลภายหลัง เสียหายอย่างสิ้นเชิง"

 galactic_megadrive: "แกแล็กติก เมกะไดร์ฟ"
 galactic_megadrive_desc_short: "กล้องวงจรปิดที่สะสมจากทั่วกาแล็กซี่ มานาน 1.2 พันล้านปี"
 galactic_megadrive_desc_details: "ระดับการบีบอัดข้อมูลนั้นก้าวหน้ามาก จนเราไม่สามารถเข้าถึงมันได้ โดยปราศจากเทคโนโลยี การ ก่อ สร้าง เทคโนโลยี การ เก็บ รักษา เอง ยัง คง ให้ ความ หยั่ง เห็น เข้าใจ ที่ น่า ทึ่ง ใน เรื่อง การ พัฒนา อุปกรณ์ ดิจิตอล."

 gamma_resistant_flora: "แกมมา บลูม"
 gamma_resistant_flora_desc_short: "หนึ่งในไม่กี่สปีชีส์ที่รอดชีวิตจากดาวเคราะห์ ที่สัมผัสกับระเบิดแกมม่าที่ทรงอิทธิพล สารตะกั่วธรรมชาติในระบบหลอดเลือดของพืชนี้"
 gamma_resistant_flora_desc_details: "มันได้พัฒนาความสามารถในการพึ่งพา การกลายพันธุ์เล็กๆ ทางพันธุกรรม เพื่อทําซ้ําเพศ ซึ่งทําให้การเพาะเลี้ยงนี้ เป็นข้อเสนอที่อันตราย เราพบการผสมโคบอลท์-60 คลื่นวิทยุเข้าไปในดิน ทําให้มันอยู่รอดได้ นอกดาวเคราะห์ของมัน"

 gargantua_megalus: "การ์ กัน ตู วา เม กา ลุส"
 gargantua_megalus_desc_short: "หลังจากมีการกลายพันธุ์อย่างน่าทึ่งและกะทันหัน พืชเหล่านี้เพิ่มขึ้น ในขนาดเอกซ์โปเนนเชียลเพื่อปกคลุมพื้นผิวของ[fromfrom.prev.GetName]"
 gargantua_megalus_desc_details: "สายพันธุ์นี้ทําให้โลกหายใจไม่ออก และทําให้สายพันธุ์ที่มีอิทธิพลสูญพันธุ์ไปอย่างสิ้นเชิง รากของพืชเหล่านี้ใหญ่พอที่จะขุดรอยแตกลึก ผ่านเสื้อคลุมของดาวเคราะห์"

 genesis_core: "เยเน ซิศ"
 genesis_core_desc_short: "หน่วยประมวลผลกลางที่ทรงพลัง ซึ่งเต็มไปด้วยข้อมูลเชิงพันธุกรรมของสปีชีส์"
 genesis_core_desc_details: "ครั้งหนึ่งมันเคยเชื่อมต่อกับ สถาบันโคลนลิงระหว่างมิติขนาดใหญ่ และบันทึกภายในก็แสดงให้เห็นว่ามันเป็นส่วนหนึ่งของ เมื่อการวิเคราะห์ครั้งแรกเสร็จสมบูรณ์ ปัญญาประดิษฐ์นี้เริ่มสร้างสายพันธุ์ใหม่ เป็นอิสระ"

 genetic_code: "[owner_main_species.GetName]รหัสพันธุกรรม"
 genetic_code_desc_short: "ข้อมูลพันธุกรรมที่ใช้ผลักดันสรีระของ[owner_main_species.GetNamePlural]ถึงขีดสุด"
 genetic_code_desc_details: "โดยเริ่มต้นได้รับการโคลนเพื่อวัตถุประสงค์การต่อสู้ผู้อาศัยของ[this.GetName]ได้ทํางานในการปลดล็อค แม้มีศักยภาพสูง ลักษณะทางการแพทย์ของการประมวลผลของโคลน ทําให้มีความแม่นยําอย่างมากและเชื่อถือได้ในการควบคุมการสืบพันธุ์"

# this = ship / from = planet
 geometric_water_currents: "น้ํา จืด โพ ลี เม อร์"
 geometric_water_currents_desc_short: "ภาพจากตารางโพลีเมอร์ ที่พบทั่วทะเลของ[From.From.GetName]"
 geometric_water_currents_desc_details: "ตาข่าย เหล่า นี้ ใช้ ควบคุม คุณสมบัติ ของ ความ ตึงเครียด บน ผิว ดิน และ กระแส น้ํา ตาม ธรรมชาติ เพื่อ สร้าง แบบ ที่ ซับ ซ้อน และ ซับ ซ้อน. รูปแบบของความสุนทรียศาสตร์นี้ สามารถสร้างแรงบันดาลใจให้องค์ประกอบของโครงสร้างพื้นฐานของเราเอง"

 giant_egg_shell: "ไข่ยักษ์"
 giant_egg_shell_desc_short: "เศษ ซาก ของ เปลือก ไข่ ที่ ทํา ขึ้น เป็น หลัก ที่ พบ ใต้ ผิว ของ มัน[from.planet.GetName]"
 giant_egg_shell_desc_details: "การ วิเคราะห์ แอ ลบู มิน แห้ง แสดง ว่า สัตว์ ชนิด นี้ ได้ รับ สาร ไอโซโทป ที่ ไม่ มั่นคง เป็น จํานวน มาก ใน ช่วง ที่ มัน ถูก ฉีด เข้า ไป. จําลองของกระบวนการฟัก แสดงให้เห็นว่าสิ่งมีชีวิตกัมมันตรังสีออกมาจาก เปลือกหนาที่ก่อตัวอย่างสมบูรณ์"

 golden_phonograph_record: "บันทึกกราฟทองคํา"
 golden_phonograph_record_desc_short: "อุปกรณ์เก็บข้อมูลแบบโบราณ ที่บรรจุภาพและเสียงต่าง ๆ สุ่มๆ[Owner.GetPreFTLLower]อารยธรรม"
 golden_phonograph_record_desc_details: "ค้นพบบนแท่นบูชา ภายในป้อมปราการดาวเคราะห์ร้าง เดิมเปิดตัวไปยังอวกาศ เชื่อกันว่าการก่อสร้างแบบละเอียดและพื้นฐาน มีนัยสําคัญทางศาสนาบางอย่าง"

 golem_contortionist_dna: "ดีเอ็นเอ ที่ เกี่ยว ข้อง อย่าง รุนแรง"
 golem_contortionist_dna_desc_short: "ตัว อย่าง ทาง ชีวเคมี ที่ ได้ มา จาก ลิต อยด์ ที่ มี รูป ร่าง เพรียว มี มาก กว่า การ พบ เห็น รอย ริฟท์ ของ แอ ส ตรัล"
 golem_contortionist_dna_desc_details: "ส่วน ประกอบ ของ แร่ ธาตุ ประกอบ ด้วย สาร ทาง ชีวภาพ ที่ ระเหย ไป อย่าง ง่าย ดาย ซึ่ง มี แนว โน้ม จะ เป็น เม ตา มอร์โฟ ซิส เอง และ ทํา ให้ เป็น ผลึก. จากความไม่มั่นคงสูงของวัสดุ การควบคุมสมดุลเคมีอย่างสมบูรณ์แบบ จะจําเป็นตลอดเวลา"

 grunur_data_crystal: "คริสตัลข้อมูลกรูเนอร์"
 grunur_data_crystal_desc_short: "ตัวเข้ารหัสข้อมูลโบราณที่ใช้เป็นสื่อหลักของข้อมูล สําหรับสายพันธุ์กรูเนอร์แบบยาว"
 grunur_data_crystal_desc_details: "ทั้ง ๆ ที่ มี อายุ มาก จน น่า ตก ตะลึง บันทึก เหล่า นี้ หลาย เรื่อง ยัง คง คง อยู่ ใน สภาพ ที่ ค่อน ข้าง ดี. ส่วนติดต่อที่ใช้ในการเข้าถึงอุปกรณ์นี้ ได้สูญหายไประยะหนึ่งแล้ว แต่มันจะต้องเป็นกระบวนการยืดยาวในการสังเคราะห์วัสดุที่ทนทานดังกล่าว ดัง นั้น เชื่อ กัน ว่า ผลึก เหล่า นี้ ถูก เก็บ ไว้ สําหรับ เก็บ ข้อมูล ที่ สําคัญ ที่ สุด เท่า นั้น โดย มี วิธี เก็บ รักษา ที่ ใช้ ได้ ผล กว่า ซึ่ง ใช้ ใน แต่ ละ วัน."

 head_of_the_beast: "หัว ของ สัตว์ ร้าย"
 head_of_the_beast_desc_short: "ซากของมนุษย์กลายพันธ์อันตราย ที่คุกคามชาวอาณานิคม[root.GetName]"
 head_of_the_beast_desc_details: "สัตว์ ร้าย นี้ ถูก สร้าง ขึ้น โดย การ ผิด พลาด ของ เทอร์ราฟอร์ม นาไนท์ ที่ ถูก ทิ้ง ไว้ โดย อารยธรรม ที่ ไม่ รู้ จัก. สัตว์ ชนิด นี้ มี เชาวน์ ปัญญา มาก จน น่า กลัว อยู่ ใน รัง ซึ่ง ประกอบ ด้วย ชิ้น ส่วน ของ ร่าง กาย หลาย ร้อย ชิ้น ที่ ขาด หาย ไป. นับ ว่า สุขุม พอ ที่ จะ เก็บ อาหาร ที่ เหลือ ไว้ เป็น นัก โทษ เก็บ ไว้ สําหรับ การ บริโภค ภาย หลัง. ถ้าไม่ได้สําหรับการแทรกแซงของกองกําลังทหาร สิ่งมีชีวิตนี้จะยังคงมีความรุ่งเรืองต่อไป บนโลกบ้านเกิดของมัน"

 heart_of_the_pulsar: "ใจ ของ พัล ซาร์"
 heart_of_the_pulsar_desc_short: "เมื่อ สวม ศีรษะ ห้า หัว ของ รัฐ ที่ กระฉับกระเฉง แล้ว ก็ พบ อัญมณี ล้ํา ค่า นี้ ถูก ทิ้ง ไว้ ใน สถานี ความ เพลิดเพลิน อัน ฟุ่มเฟือย"
 heart_of_the_pulsar_desc_details: "การ วิเคราะห์ ด้าน วัตถุ แสดง ว่า มัน ถูก แกะ ออก จาก คาร์บอน ที่ ถูก ปล่อย ออก มา จาก ซู เปอร์ โน วา. บาง ที นั่น อาจ หมาย ถึง การ เปรียบ เทียบ ความ งาม ที่ ซ่อน อยู่ ภาย ใน ความ ตาย แม้ แต่ ใน ขอบ เขต ทาง ภาค สวรรค์."

 hemterine_magnetic_figurehead: "แม่เหล็กเฮม เท อร์ ลีน"
 hemterine_magnetic_figurehead_desc_short: "หัว รูป ร่าง มหึมา ของ เม ดิน า"
 hemterine_magnetic_figurehead_desc_details: "หัว เสา นี้ ถูก หล่อ ใน ขั้ว แม่ เหล็ก เปลี่ยน แปลง ทาง เคมี. นอก จาก การ ตกแต่ง แบบ ง่าย ๆ แล้ว ประติมากรรม นี้ ถูก ออก แบบ มา เพื่อ ดูด ซับ ผล กระทบ อัน หนัก หน่วง จาก ไฟ ของ ศัตรู. มันใช้แรงแม่เหล็กที่มีประสิทธิภาพ ในการดึงดูดขีปนาวุธและกระสุนจลน์ เพื่อปกป้องพื้นที่ที่สําคัญของเรือ"

 high_geode_of_the_molluscoids: "ไฮ จีด ของ[molluscoid_miners_species.GetName]"
 high_geode_of_the_molluscoids_desc_short: "คริสตัลอันมีค่าของ[molluscoid_miners_species.GetName]"
 high_geode_of_the_molluscoids_desc_details: "ในฐานะสังคมของเหล่านักโพรง[molluscoid_miners_species.GetName]ได้ ใช้ คุณภาพ ของ แร่ ธาตุ ที่ มอง เห็น ได้ เป็น เวลา นาน เพื่อ แสดง ถึง สถานภาพ ภาย ใน สังคม. มี การ แสดง ให้ เห็น อย่าง เด่น ชัด ใน ถิ่น อาศัย ที่ ใหญ่ ที่ สุด ของ มัน หิน ที่ สวย งาม นี้ ปัจจุบัน เป็น สัญลักษณ์ ของ การ ร่วม มือ[this.GetName]."

 hot_ice: "น้ําแข็งร้อน"
 hot_ice_desc_short: "ค้นพบในซิตูบนพื้นผิวที่ร้อนมากของ[from.GetName]น้ํานี้ยังดํารงอยู่ในรูปแบบแข็ง เนื่องจากความดันแรงโน้มถ่วงรุนแรง"
 hot_ice_desc_details: "มี การ เก็บ ไว้ ใน ภาชนะ บรรจุ ความ ดัน ที่ ออก แบบ เป็น พิเศษ เพื่อ ให้ แสดง เป็น ความ อยาก รู้ อยาก เห็น. ถ้า เรือ นี้ จะ ถูก ทําลาย การ วูบ วาบ ของ ไอ น้ํา ทันที ก็ จะ เปลี่ยน ภาชนะ นี้ เป็น อุปกรณ์ ระเบิด อย่าง รวด เร็ว. อย่าจับ"

 hyper_mulch: "[FROM.GetName]ไฮเปอร์มัลช์"
 hyper_mulch_desc_short: "การแปลงภาพบน[FROM.GetName]นําไปสู่การพัฒนาของหมอกชีวภาพที่บ้ามากนี้"
 hyper_mulch_desc_details: "องค์ประกอบของสารเคมีที่เลี้ยงชีวิตอย่างต่ํากดเข้าไปในก้อนที่หนาแน่นมาก นักฟอกวิทยาไม่ชอบ อย่าง ไร ก็ ตาม ผล ที่ ดี เยี่ยม ของ มัน ไม่ อาจ เพิก เฉย ได้."

 hyperfertile_soil: "โซ นิล"
 hyperfertile_soil_desc_short: "#ดิน#เก็บเกี่ยวจาก[From.From.GetName]ที่สามารถผลิตพืชทางชีวภาพได้มากที่สุด ด้วยสารอาหารมากมาย"
 hyperfertile_soil_desc_details: "ความ หนา แน่น ของ แร่ ธาตุ ที่ มี การ เจริญ เติบโต นี้ บ่ง ชี้ ว่า เป็น มาก กว่า เพียง การ ผสม ผสาน อย่าง ง่าย ดาย ของ อินทรีย์ ผุ พัง แต่ เป็น การ จัด ระเบียบ ที่ เป็น ไป ได้ ของ ธาตุ พื้น ฐาน ซึ่ง เกิด ขึ้น ระหว่าง การ ก่อ ตัว ของ ดาว เคราะห์ นี้."

 illanii_archives: "แฟ้มจัดเก็บของอิ ล ลา นี"
 illanii_archives_desc_short: "ธนาคาร ข้อมูล คริสตัล อธิบาย ประวัติศาสตร์ และ การ สิ้น พระ ชนม์ ของ อิ ล ลา นี"
 illanii_archives_desc_details: "อารยธรรม ที่ อยู่ ห่าง ไกล เช่น นี้ ได้ นํา เอา ผล ประโยชน์ ด้าน วัตถุ ทุก อย่าง เข้า มา แทน ที่ การ แสวง หา ความ รู้ จน ถึง ขั้น ที่ พวก เขา ละเลย แม้ แต่ ที่ จะ สร้าง ขึ้น มา. เมื่อ เผชิญ กับ วิกฤตการณ์ ประชากร พวก เขา มุ่ง หน้า ไป สู่ ความ เป็น อมตะ ทาง เทคโนโลยี แต่ พบ ว่า มี แต่ ความ หายนะ. ใน ที่ สุด ประชากร คน สุด ท้าย ที่ เหลือ อยู่ ก็ กลาย เป็น ระเบียบ ใหม่ ใน การ แสวง หา ความ รู้ ที่ คง ไว้ ซึ่ง การ ละ ทิ้ง[fromfrom.planet.GetName]ให้เน่าตาย"

 impossible_object: "วัตถุที่เป็นไปไม่ได้"
 impossible_object_desc_short: "วัตถุที่เป็นไปไม่ได้ที่เหลือโดยผู้มาเยือนนอกมิติบน[target.GetName]หลังจากการจากไปของเขาวงกต"
 impossible_object_desc_details: "การทดลองที่เผชิญระหว่างการสํารวจเขาวงกตนั้น ดูเหมือนเป็นส่วนหนึ่งของการทดลองและการสังเกตของนักท่องเที่ยว แรงจูงใจของสิ่งมีชีวิตเหล่านี้ยังคงไม่ทราบ แต่ความสามารถทางเทคโนโลยีของพวกเขา จะต้องไกลเกินใด ๆ ของมิติของเรา"

 index_of_knowledge: "ดัชนี ความ รู้"
 index_of_knowledge_desc_short: "แผ่น จารึก โบราณ ที่ แกะ อยู่ ใน แหลม หิน มหึมา"
 index_of_knowledge_desc_details: "มันถูกใช้เป็นเอกสารอ้างอิงเชิงอนาล็อก สําหรับความรู้รวมของอารยธรรมของมนุษย์ต่างดาว ที่ครั้งหนึ่งเคยครอบงํากาแล็กซี่ ความ เข้าใจ ทาง วิทยาศาสตร์ อัน โดด เด่น ของ พวก เขา รวม ไป ถึง ความ สามารถ ใน การ เก็บ เกี่ยว พลัง งาน ที่ จดจ่อ อยู่ กับ ดวง อาทิตย์ และ การ พัฒนา การ อุด ตัน ใน สนาม."

 inet_trade_manifesto: "ดิสโก"
 inet_trade_manifesto_desc_short: "รายการนโยบายการแลกเปลี่ยนอย่างกว้างขวางและละเอียด สําหรับการค้าในเครือข่ายอินเตอร์แกแลคติกของการค้าที่เท่าเทียมกัน"
 inet_trade_manifesto_desc_details: "มาตรฐาน ของ พวก อิน เนต ต์ เป็น เรื่อง ที่ สูง ส่ง อย่าง ยิ่ง โดย มอง หา การ จัด การ อย่าง ดี ที่ สุด เสมอ กับ คู่ สมรส ที่ น่า นับถือ ที่ สุด. พวกเขามักจะแลกเปลี่ยนกับตัวเอง ผลที่ตามมา"

 inetian_model_manual: "คู่มือ แบบ จําลอง ดาว เคราะห์"
 inetian_model_manual_desc_short: "คู่มือ ผู้ ใช้ ที่ เขียน โดย นักเทรด ชาว อิน เนต ต์ เกี่ยว กับ วิธี ดําเนิน งาน และ รักษา ดาว เคราะห์ ของ ตนระบบดาวรุ่น"
 inetian_model_manual_desc_details: "ภาษาเน็ตเนียนใช้ระบบที่ซับซ้อนนี้ เพื่อคํานวณเส้นทางการค้าที่มีประสิทธิภาพมากที่สุด ระหว่างดาวเคราะห์ใกล้เคียง โมเดลนี้ยังรวมถึงความสามารถในการติดตามข้อตกลงที่พวกเขากําลังทํา สําหรับความโหดร้ายของพ่อค้าอย่างแท้จริง"

 infinite_reboot_loop: "หมุนแบบวนซ้ํา"
 infinite_reboot_loop_desc_short: "สถิติดิจิตอลของประสบการณ์ของหุ่นยนต์เครื่องจักร แขวนอยู่ภายในหลุมดํา"
 infinite_reboot_loop_desc_details: "หน่วยเหล่านี้มีประสบการณ์การขยายเวลา เป็นความชอกช้ํามากเกินไป กับความผิดพลาดและติดอยู่ในพื้นที่ที่นิยามไม่ได้ ปรากฏการณ์นี้ทําให้เครือข่ายขาดน้ําอย่างมาก"

 interdimensional_treaty: "สนธิสัญญาอินเตอร์มิติ"
 interdimensional_treaty_desc_short: "เอกสาร สําคัญ เกี่ยว กับ ความ สัมพันธ์ ระหว่าง มิติ ที่ มี การ ปลูก ฝัง โดย เทียบ เคียง กัน[explorer.GetName]"
 interdimensional_treaty_desc_details: "ความสามารถที่จะทบทวนการตัดสินใจของอีกคน จากมุมมองภายนอก มีประโยชน์ในการวิเคราะห์นโยบายของตัวเอง โอกาสทางวิทยาศาสตร์ที่ไม่ซ้ํากันอย่างแท้จริง"

 intergalactic_projectile: "แบบ แปลน"
 intergalactic_projectile_desc_short: "กระสุน ปืน ใหญ่ ยิง จาก กาแล็กซี ใกล้ เคียง หลาย ล้าน ปี มา แล้ว"
 intergalactic_projectile_desc_details: "เหล่านี้ไม่ระเบิดกระสุนเดินทางหลาย ปีแสงเพียงเพื่อชนกับ[owner.GetAdjective]ยานวิจัยใน[from.GetName]ทั้ง ๆ ที่อายุของพวกเขา ความซับซ้อนของการออกแบบที่ทนทานของกระสุน แสดงให้เห็นว่าผู้สร้างของ ได้ถึงระดับที่ก้าวหน้า ของความ ก้าวหน้าของเทคโนโลยี"

 invasive_exofungus: "exfungus ที่ไม่พึงประสงค์"
 invasive_exofungus_desc_short: "การ เจริญ เติบโต ของ ปรสิต[from.GetName]"
 invasive_exofungus_desc_details: "สิ่ง มี ชีวิต ที่ มี ความ ซับ ซ้อน นี้ ได้ พัฒนา ขึ้น มา เพื่อ สกัด สาร อาหาร จาก แหล่ง ที่ มี ชีวิต ใด ๆ รักษา ร่าง กาย ของ มัน ให้ อยู่ ได้ นาน เท่า ที่ เป็น ไป ได้ โดย ไม่ คํานึง ถึง ความ เจ็บ ปวด หรือ ความ ไม่ สะดวก สบาย ใด ๆ. การ ต่อ ต้าน อย่าง หนัก ต่อ ความ ร้อน และ ความ เย็น คง จะ แพร่ ไป ถึง ดาว เคราะห์ ดวง นี้ โดย ทาง ยาน อวกาศ ที่ ผ่าน มา. จําแนกประเภทเป็น อัลฟาไบโอฮาซาร์ด ดาวเคราะห์ของเมืองนี้ยังไม่ทราบที่มา"

 irassian_bacterium_javoria: "อิ รา เชีย น เบตา เรียม จา โว เรีย"
 irassian_bacterium_javoria_desc_short: "แบคทีเรียพื้นเมืองนี้[FROMFROM.GetName]เป็นสิ่งมีชีวิตที่ในที่สุดกลายเป็นโรคที่รู้จักกันในชื่อพ็อกซ์จาโวเรียน"
 irassian_bacterium_javoria_desc_details: "ในตอนแรกมันทําลายการกักกัน โดยขนาดที่ไม่ถูกต้อง หนึ่งเมตร ก่อนแพร่กระจายไปยังอาณานิคมใกล้เคียง จากจุดนั้น แบคทีเรียที่วิวัฒนาการมาในการบรรจุสารอินทรีย์ สุดท้ายแล้วก็กลาย เป็นเชื้อโรคที่จะกวาดล้าง คองคอร์ดของอิหร่านทั้งหมด ตัวอย่างนี้ได้รับการผลิตฝึกงานและถูกระงับการร้องไห้"

 irassian_digital_atlas: "ภาษาอิราเซียน"
 irassian_digital_atlas_desc_short: "เครื่อง มือ ข้อมูล ภาษา ไอ รา เชีย น ที่ ใช้ สอน เด็ก เรื่อง จักรวรรดิ ที่ พวก เขา เกิด มา"
 irassian_digital_atlas_desc_details: "หนังสือ เล่ม นี้ ให้ ข้อมูล พื้น ฐาน เกี่ยว กับ การ เกษตร ของ ชาว อิ รา ส เซีย, การ แบ่ง ชั้น ทาง สังคม, และ การ ส่ง ออก อันดับ แรก. มี การ เล่า ประวัติศาสตร์ ของ ชาว อิ รา ส เซีย ใน รูป ของ นิทาน เรื่อง ความ กล้า รวม ทั้ง เรื่อง การ พิชิต และ การ ปราบ สัตว์ พันธุ์ ต่าง ๆ. ภาพของภาษาคาร์ทูนิชแต่ละเรื่องมีภาพตามเนื้อหาต่าง ๆ ที่ปรากฏ The Tit'Dirk ติดตามคือ\"ปั๊มแก๊ส\"จ็อกกราเป็น \"ตัววางบ้วนปาก\"และเหล่าชิโทร์ค\"เรือดําน้ําอวกาศ\"."

 irassian_purge_order: "ลําดับการกวาดล้างอิหร่าน"
 irassian_purge_order_desc_short: "ข้อความจากทหารฉุกเฉินจากคอน ส แตน ตินสั่งทําลายสมบูรณ์ของหนึ่งในอาณานิคมของตัวเอง"
 irassian_purge_order_desc_details: "ดาวเคราะห์ถูกรุกรานด้วยโรคร้ายแรงที่รู้จักกันในชื่อ เจโวเรียน พอกซ์ และการกําจัดผู้ติดเชื้อ ถูกมองว่าเป็นทางเลือกเดียว มีคําสั่งในลําดับนี้หลายคําสั่งที่มีระดับสูง ควบคุมจากระดับขั้นสูงสุดของรัฐบาลอิหร่าน ระบบเดิมออกแบบสําหรับประกาศสงครามกับจักรวรรดิอื่น ๆ"

 key_to_fertility: "กุญแจสําหรับใช้[owner_main_species.GetName]ความจุ:"
 key_to_fertility_desc_short: "งานวิจัยทางพันธุกรรมที่ใช้เพื่อฟื้นฟูความสามารถของ[owner_main_species.GetNamePlural]เพื่อสืบพันธุ์ตามธรรมชาติ"
 key_to_fertility_desc_details: "ถูกโคลนเพื่อทําศึก ชาวบ้าน[this.GetName]ตอนนี้มีความสามารถที่จะแพร่พันธุ์ได้อย่างอิสระ"

 khalanka_crystallized_corpses: "คาลันกา คริสตัลคอร์ปส์"
 khalanka_crystallized_corpses_desc_short: "ซาก ของ สิ่ง มี ชีวิต ชนิด หนึ่ง ที่ มี ความ บอบบาง ซึ่ง พบ ใต้ ดิน[from.planet.GetName]"
 khalanka_crystallized_corpses_desc_details: "เชื่อกันว่าอารยธรรมใต้ดินนี้ เคยมีอยู่อย่างสงบก่อนการมาถึงของ[owner.GetAdjective]พวกอาณานิคม เมื่อพื้นดินแตก ออกซิเจนก็ท่วมห้องใต้ดิน ทําให้ศพของคาลันกากลายเป็นออกซิเจน"

 khamdai_magil_sha: "คามได มากิล-ซา"
 khamdai_magil_sha_desc_short: "เคียวนี้ยังใช้ได้จริง โดยนักรบคามไดอาวุโสจาก[FROMFROM.GetName]"
 khamdai_magil_sha_desc_details: "สังคม แมลง ที่ มี ประเพณี การ ต่อ สู้ ที่ ฝัง ราก ลึก พวก เขา ได้ กลาย เป็น ผู้ นํา ของ กอง รักษา การณ์ แห่ง สันนิบาต แรก อย่าง รวด เร็ว. หลังจากชัยชนะแต่ละครั้ง จะเกิดพิธีขึ้น ที่ซึ่งผู้บัญชาการฝ่ายศัตรูถูกประหารชีวิตด้วยอาวุธนี้ ใบมีดตัวอย่างนี้ ถึงแม้ว่าจะปักหลักอย่างดี แสดงให้เห็นสัญญาณของการสวมใส่"

 kuurian_cybrex_blueprints: "ภาษาคุรูเรียนไซบรัคซ์ สีน้ําเงิน"
 kuurian_cybrex_blueprints_desc_short: "การ ออก แบบ เครื่อง ไซ เบรก ใน ตอน เริ่ม ต้น"
 kuurian_cybrex_blueprints_desc_details: "เค อร์วางแผนที่จะใช้หุ่นยนต์เหล่านี้ในการทําหน้าที่เป็นข้าราชการสาธารณะ หน่วยสืบราชการลับของพวกเขาสามารถจัดการระบบบํารุงรักษาและการผลิตทั่วโลก อย่าง ไร ก็ ตาม พวก ไซ เบรก ได้ กบฏ ต่อ ผู้ สร้าง ของ พวก เขา ทํา ให้ สิ่ง มี ชีวิต ทั้ง หมด สูญ พันธุ์ ภาย ใน เวลา ไม่ ถึง หนึ่ง ปี."

 landeer_arm: "แขนของแลนเดอร์"
 landeer_arm_desc_short: "ตัว อย่าง ที่ แปลก ประหลาด ซึ่ง ค้น พบ ได้ จาก สถาบัน รัก ชาติ แห่ง เบเน โวล์ เดน"
 landeer_arm_desc_details: "ภายในสํานักงานของผู้ดูแลของที่อยู่อาศัยแขวนแขนที่เป็นรูปมัมมี่เมื่อเป็นของผู้ดูแลตัวเอง - ยังคงแสดงอย่างภูมิใจบนป้ายตกแต่งอย่างประณีตหลังจากทุกปีเหล่านี้ ทําไมอัลตัทต้า แลนดิร์ถึงเลือกที่จะทิ้งขาตัวเองไว้เบื้องหลัง เป็นคําถามที่ไม่มีทางตอบได้ นี่อาจจะไม่ใช่สิ่งเดียว ที่ทางสถาบันนี้เสียไป"

 larionessi_cloning_vat: "จุด"
 larionessi_cloning_vat_desc_short: "รุ่นของโวลลิงที่ใช้ในปัจจุบันสูญพันธุ์ลาริโอเนสซี"
 larionessi_cloning_vat_desc_details: "เมื่อพลังกาแล็กซี่ที่สําคัญแล้ว ลาริโอเนสซี่ที่จิตใจเป็นรัง ก็ถูกทําให้พิการด้วยโรคติดเชื้อที่น่ากลัว ไม่สามารถรักษาโรคได้ทันเวลา พวกเขาเก็บโคลนไว้ในถังที่ สามารถรักษาได้เกือบไม่จํากัด"

 last_copy_of_the_prince: "สําเนา ชิ้น สุด ท้าย ของ เจ้า ชาย"
 last_copy_of_the_prince_desc_short: "ชิ้นส่วนที่ค่อนข้างเดินของวรรณกรรมที่เคารพโดย[book_writer.GetSpeciesName]พวกเขาเชื่อว่ามันหายไปตลอดกาล ในการโจมตี"
 last_copy_of_the_prince_desc_details: "หนังสือ เล่ม นี้ อธิบาย หลัก ปรัชญา ที่ โหด ร้าย ซึ่ง สนับสนุน คน เหล่า นั้น ที่ มี อํานาจ ให้ เสีย สละ เพื่อ แลก กับ เกียรติยศ. เป็นสําเนาสุดท้ายที่เหลือ มันได้นําชีวิตใหม่ เป็นของสะสม"

 last_fragment_fevor: "ชิ้น สุด ท้าย ของ เครื่อง บิน"
 last_fragment_fevor_desc_short: "ส่วนหนึ่งของดาวเคราะห์ที่ถูกทําลาย"
 last_fragment_fevor_desc_details: "นโยบายการกวาดล้างของกุมภาพันธ์ขยายไปยังทุกชีวิตคนต่างด้าวที่รู้จักกันโดยการเปิดตัวขนาดใหญ่รอบที่เกือบทําลาย[owner.GetHomeWorldName]ทั้งหมดของมัน ตอนนี้เองพวกเขาได้ลดลง, เช็ดออกในทันทีโดยผู้ที่มาก"

 last_general_badge: "อาชญากรรมของนายพลคนก่อน"
 last_general_badge_desc_short: "ตรา จาก เครื่อง แบบ ทหาร ของ นาย พล อิน เดีย น แดง"
 last_general_badge_desc_details: "เป็นที่รู้จักกันว่าเป็นพารากอนที่แท้จริง ของค่านิยมการแบ่งประเภท เขาได้รับเลือกให้ดําเนินการภารกิจหมดหวัง เป็น ความ คิด ของ เขา ที่ จะ ให้ ข่าวสาร สุด ท้าย แก่ นัก สํารวจ ใน อนาคต โดย หวัง ว่า จะ ถ่ายทอด บท เรียน เกี่ยว กับ ชะตา กรรม ของ ประชาชน ของ เขา."

 last_mharin_kharin: "มา ฮา ริน ตัว สุด ท้าย"
 last_mharin_kharin_desc_short: "วงจรชีวิตธรรมชาติของดอกไม้หายากนี้ มีความสามารถในการทําให้ประชากรทั้งหมด ที่อ่อนแอต่อสารพิษที่ร้ายแรงต่อระบบประสาท"
 last_mharin_kharin_desc_details: "การวิวัฒนาการอย่างเป็นอิสระ จากสิ่งมีชีวิตที่ชาญฉลาด ผลกระทบข้างเคียงนี้ ไม่มีความสําคัญอย่างสิ้นเชิงต่อสิ่งมีชีวิต ดู เหมือน ว่า เมื่อ ละออง เรณู มา สัมผัส กับ เครือ ข่าย ประสาท ใด ๆ มัน จะ ผิด สําหรับ อวัยวะ การ สืบ พันธุ์ และ ปล่อย สาร เคมี ชนิด ใหม่ ๆ ออก มา."

 leviathan_scale: "ขนาดของ เลไวอาทัน"
 leviathan_scale_desc_short: "ชิ้น ส่วน ของ สิ่ง มี ชีวิต ขนาด ใหญ่ ที่ ค้น พบ ใน อีก ด้าน หนึ่ง ของ แนว ปะการัง"
 leviathan_scale_desc_details: "สัดส่วนที่แปลกใหม่นี้ เป็นลูกผสมของส่วนประกอบอินทรีย์และโลหะ รวมกันในตาข่ายที่ซับซ้อน"

 living_snow_sculpture: "หิมะ ที่ มี ชีวิต"
 living_snow_sculpture_desc_short: "ประติมากรรมทําจาก \"หิมะตก\""
 living_snow_sculpture_desc_details: "การ มี สติ รู้สึก ผิด ชอบ แบบ ดั้งเดิม บาง รูป แบบ ได้ รับ การ สงวน ไว้ ตาม ธรรมชาติ[prev.target.GetName]การ เปลี่ยน แปลง เป็น ประจํา แต่ เมื่อ เหตุ การณ์ นี้ เกิด ขึ้น อาจ เป็น เรื่อง ที่ คาด ไม่ ถึง."

 localised_aurora_borealis: "ออโรร่า โบ เร รา"
 localised_aurora_borealis_desc_short: "ชุดของสีสังเคราะห์ที่บันทึกในวิดีโอจากบรรยากาศของ[FromFrom.Planet.GetName]"
 localised_aurora_borealis_desc_details: "รูปแบบของสีและการเคลื่อนไหวซ้ํากันในความถี่ที่คาดเดาได้ เป็นตัวแทนของสิ่งที่ไกลเกินความงามของสุนทรภาพของพวกเขา ธรรมชาติของพวกเขาเสมอ เพิ่มเสียงรบกวน กับดาวเคราะห์ที่สูญเสียไป สงครามและการทําลายด้านล่าง"

 loopmail: "วนรอบอีเมล"
 loopmail_desc_short: "โน้ตพวกนี้ถูกส่งมาโดย[owner.GetName]จาก ปี ต่าง ๆ ใน อนาคต ให้ คํา แนะ นํา ที่ เจาะจง ว่า จะ มอบ หมาย นัก วิทยาศาสตร์ ที่ ไหน และ พยายาม ค้นคว้า อะไร"
 loopmail_desc_details: "ความ สําคัญ ของ การ ส่ง จดหมาย เหล่า นี้ กลับ ใน เวลา อัน ควร ก็ คือ ค่า ใช้ จ่าย อันดับ แรก ของ ความ รู้ ที่ ก้าว หน้า นี้ แต่ การ เข้า ไป ยุ่ง เกี่ยว กับ เวลา เป็น ความ พยายาม ที่ เสี่ยง อันตราย เสมอ. ผู้ เขียน ข้อ ความ นี้ ใน ต้น ฉบับ ไม่ มี ความ รับ ผิด ชอบ อย่าง สูง ต่อ การ สร้าง ความ ขัด แย้ง เช่น นั้น."

 lunatic_broker_therapy_box: "กล่องบําบัดของลูนาติก"
 lunatic_broker_therapy_box_desc_short: "ลอน ติก บรูเกอร์เป็นนักเทรดในตํานานในตระกูลคาราวาเนียร์ สามารถมีอิทธิพลต่อลูกค้า ด้วยความต้องการอย่างเกินเหตุและภัยคุกคามที่หลากหลาย"
 lunatic_broker_therapy_box_desc_details: "อย่าง ไร ก็ ตาม ท่าที ที่ รุนแรง และ คาด ไม่ ถึง ของ พวก เขา ทํา ให้ เรื่อง ของ พวก เขา พัฒนา วิธี การ ต่าง ๆ เพื่อ ทํา ให้ พวก เขา สงบ ลง. หนึ่งในกลยุทธ์ดังกล่าวเป็นการบําบัดเสียง; กล่องเช่นนี้ถูกกระจัดกระจายไปรอบ ๆการประกอบของโชร์และจะเล่นทํานองกล่อม เมื่อระดับความเครียดของโบรกเกอร์ถูกยกระดับ ทุกชิ้นส่วนของกลไกนี้ ทําโดยนักกลศาสตร์มือดี"

 manifesti_piece: "ชิ้นส่วนคําอธิบายสังคมแบบกราฟิก"
 manifesti_piece_desc_short: "การ ล่อ ใจ จาก การ เคลื่อน ไหว แบบ ราวี"
 manifesti_piece_desc_details: "มันหมายถึงการท้าทายการรับรู้ของตัวเอง ในความสัมพันธ์กับชนชั้นที่สูงกว่า ผู้ ฟัง ได้ รับ การ สนับสนุน ให้ จัด การ รูป ปั้น ของ ตัว เอง รวม ทั้ง สร้าง ภาพ ที่ ผิด เพี้ยน ของ บุคคล ทาง การ เมือง ที่ นิยม กัน. ในฐานะของศิลปะที่ตรงกันข้ามกับวัฒนธรรม, กลุ่มของราษฎร พยายามท้าทายสิ่งที่พวกเขาคิดว่า เป็นองค์กรที่กดขี่ ผลงานชิ้นนี้สร้างแรงบันดาลใจให้ศิลปินอื่น ๆ อีกหลายคน เพื่อตีพิมพ์ผลงานที่สําคัญของตัวเอง"

# this = ship / from = planet
 manna_fruit: "มะนา"
 manna_fruit_desc_short: "ผลไม้หวานและอบแห้ง ที่ให้เสบียงอาหารเกือบหนึ่งวัน สําหรับสิ่งมีชีวิตที่กินพืชอินทรีย์ส่วนใหญ่"
 manna_fruit_desc_details: "องค์ประกอบดินที่ไม่ซ้ํากันของ ป่าไม้เขตร้อนของดาวเคราะห์ของมัน ทําให้สภาพแวดล้อมที่สมบูรณ์แบบ สําหรับการแพร่กระจายที่กว้างขวาง พวก คอ ล ลิ เจียน ต์ ใน โลก นี้ ใช้ โค เพ อร์ นิ คัส ใน เกือบ ทุก ท้อง เรื่อง ที่ มี การ ทํา ผิด; ตั้ง แต่ หม้อ ต้ม น้ํา, ไป จน ถึง ร้าน ทํา ขนมปัง, ไป จน ถึง ค็อกเทล. รูป ปั้น ของ ดาว เคราะห์ นี้ มี ลักษณะ เด่น บน ธง ของ ดาว เคราะห์[FROM.GetName]."

# this = ship / FROMFROM = planet
 massive_metatarsal: "เส้นพริ้วไหว"
 massive_metatarsal_desc_short: "ซากศพพวกนี้ถูกเก็บมา ระหว่างการตรวจสอบซากกระดูกขนาดใหญ่[FROMFROM.GetName]"
 massive_metatarsal_desc_details: "เป็นส่วนหนึ่งของดวงดาวที่มีชีวิต การวิเคราะห์โมเลกุลแสดงให้เห็นความผิดปกติ ชั่วคราวในการก่อสร้างอินทรีย์ เชื่อกันว่าทั้งโครงกระดูก และนักบินเดินทางมาที่นี่ จากนอกมิติของเรา การสแกนภายใน เผยถึงเครือข่ายของท่อ ที่อาจจะทําหน้าที่เป็นระบบ ค้ําจุนชีวิตหรือพลังงาน"

# this = country
 medal_for_services_to_diplomacy: "เครื่อง มือ สําหรับ บริการ เพื่อ การ บรรเทา ทุกข์"
 medal_for_services_to_diplomacy_desc_short: "สัญลักษณ์ แสดง ความ หยั่ง รู้ ค่า จาก สภา กาแลกติก"
 medal_for_services_to_diplomacy_desc_details: "คําจารึกในด้านกลับกันอ่านว่า \"ในฐานะผู้ได้รับรางวัลนี้ คณะธรรมศาสตร์แห่ง[this.GetName]ได้แสดงความเป็นอาชีพและความสามารถ ในการเป็นตัวแทนของผู้นําของพวกเขาอย่างมีประสิทธิภาพ และเป็นสินทรัพย์ที่แท้จริงแก่ชุมชนกาแล็กซี่"

 megacorpse_hyperguitar: "เมกาคอปส์ ไฮเปอร์ไกตาร์"
 megacorpse_hyperguitar_desc_short: "ซากศพของเครื่องสายที่ใช้โดยกลุ่มไซโซนิคเมทัล ที่รู้จักกันในชื่อ เมกาคอร์ป"
 megacorpse_hyperguitar_desc_details: "กล่าว กัน ว่า อุปกรณ์ นี้ ทํา ขึ้น ภาย ใน ชรูด และ เดิม ที ถูก ใช้ เป็น อาวุธ โซ นิก. ถูกบิดโดยการแสดงด้านหน้าเคล-อะซาน ดนตรีของเพลงนี้ จับใจคนนับพันล้าน ก่อนที่จะแตกกระจาย[Root.GetName]การทําลายผู้ชมทั้งหมดในเปลวไฟของเกียรติยศ อัลบั้มที่เกี่ยวข้องถูกแบนในระบบส่วนใหญ่"

# this = country / from = ship
 memorial_for_bubbles: "การ ประชุม อนุสรณ์[from.GetName]"
 memorial_for_bubbles_desc_short: "หลังจากรับใช้อย่างซื่อสัตย์มาหลายปี[from.GetName]ตายไปแล้ว ทิ้งหลุมขนาดใหญ่ไว้[this.GetName]ที่ไม่สามารถเติมได้"
 memorial_for_bubbles_desc_details: "ไม่ใช่แค่นั้น[from.GetName]ผู้ปกป้องที่ซื่อสัตย์ แต่ทั้งสองเป็นตัวอย่างที่สดใส ของสิ่งที่เป็นไปได้ เมื่อสิ่งที่ดีที่สุด[this.GetAdjective]ค่าที่นํามาให้แสง พวกเขาไปแล้ว แต่ไม่ลืม"

 memorial_stone: "ศิลา จารึก อนุสรณ์"
 memorial_stone_desc_short: "หิน ที่ ก่อ ความ เสีย หาย"
 memorial_stone_desc_details: "การดําเนินงานเหมืองแร่ที่มากเกินไป ในสถานีที่รู้จักกันในชื่อ เซลลิกา ก่อให้เกิดดาวเคราะห์น้อย มันได้รับการติดบน สถานี รถไฟ แตก แยก ทํา ให้ คน งาน เหมือง จํานวน มาก เสีย ชีวิต. ชิ้นส่วนดาวเคราะห์น้อยนี้ถูกเก็บรักษาไว้ กับ \"เซลิกา\" ที่ถูกจารึกไว้บนความทรงจํา ของการสูญเสียชีวิต"

 memorial_to_homeworld: "การ ประชุม อนุสรณ์ ถึง[Root.GetName]"
 memorial_to_homeworld_desc_short: "นี่คือเศษซากของหายนะ[doomsday_owner.GetAdjective]โฮมเวิลด์"
 memorial_to_homeworld_desc_details: "[Root.GetName]เป็นบ้านสําหรับทุกรุ่นที่ผ่านมาของ[doomsday_owner.GetSpeciesName]ก่อนที่มันจะฉีกตัวเองออกจากกัน การระลึกครั้งสุดท้ายนี้ เน้นความแข็งแกร่งของ[doomsday_owner.GetName]พินัยกรรมสามารถปรับตัวและเอาชนะ แม้ในสถานการณ์ที่ท้าทายที่สุด \"เราจะดําเนินการต่อไป\""

 memories_of_elik: "ความ ทรง จํา ของ เอ ลิ ก"
 memories_of_elik_desc_short: "ข้อมูลดึงออกมาจากจิตใจของ เอลิค นาริธ คารัค"
 memories_of_elik_desc_details: "ผู้ ติด ตาม ที่ เลื่อมใส ศรัทธา ของ เซ ตา นา เอ ลิ สก์ ถูก แขวน ไว้ ใน ภาพ เคลื่อนไหว ที่ หยุด พัก เป็น เวลา หลาย ร้อย ล้าน ปี. ความ ทรง จํา ของ เธอ เปลี่ยน ไป ระหว่าง ความ รัก อัน บริสุทธิ์ ที่ เธอ มี ต่อ เซ ทา นา กับ ความ รุนแรง และ การ ขัด แย้ง กัน ระหว่าง ผู้ ติด ตาม ซาร์ก ลาน. เห็น ได้ ชัด ว่า เธอ ได้ เห็น ความ โหด ร้าย ทารุณ มาก มาย แต่ ความ เชื่อ ของ เธอ ทํา ให้ เธอ มี กําลัง ที่ จะ ดําเนิน ต่อ ไป.\n\nท้ายที่สุด ทั้งหมดที่เหลือของจิตใจของเธอสลายเป็นภาพเอกพจน์ :§Pสมเด็จพระราชินีเซทาน่า สีหน้าเธอสดใส พระกรุณาของเธอที่มองอบอุ่นโดยรอยยิ้ม§!"

 memory_orbs: "แถบหน่วยความจํา"
 memory_orbs_desc_short: "การ ล่วง ละเมิด เล็ก ๆ น้อย ๆ และ การ กระทํา ผิด บาป ที่ สกัด กั้น จาก ความ ทรง จํา ของ แต่ ละ คน ใน รูป ออร์บ แบบ ดิจิตอล"
 memory_orbs_desc_details: "ผลผลิตของสังคมที่คลุ้มคลั่งทางศาสนา ช่วงเวลาลับเหล่านี้ถูกแยกออกมาจากจิตใจของคนบาป หลังจากที่พวกเขาสารภาพบาป ความจําที่ฉาวโฉ่เช่นนี้ สามารถให้ความบันเทิงแบบระยะสั้นได้เป็นพันๆ ชั่วโมง"

 mercenary_story: "ไส้ ตะเกียง"
 mercenary_story_desc_short: "เรื่อง ราว ที่ มี การ บันทึก ไว้ ทาง ดิจิตอล นี้ แต่ เดิม พบ ว่า มี การ แกะ สลัก ไว้ บน ผิว ของ เรื่อง[FROM.GetName]ด้วยเลเซอร์เหมืองแร่"
 mercenary_story_desc_details: "มันตัดชีวิตและตายก่อนเวลาอันควร ของทหารรับจ้างหนุ่มที่ล่าดาว ไม่ ว่า ตํานาน นี้ จะ เป็น ความ จริง หรือ ไม่ ก็ ตาม เป็น เรื่อง ที่ ไม่ อาจ ตัดสิน ใจ ได้ แต่ บาง คน คิด ว่า สําคัญ พอ ที่ จะ ขุด ค้น บน ดาว เคราะห์ ดวง หนึ่ง."

 metallic_snow: "หิมะเมทัลลิก"
 metallic_snow_desc_short: "สารประกอบของเฮฟวีเมทัลนี้ เป็นส่วนประกอบหลักของสภาพอากาศบน[from.GetName]"
 metallic_snow_desc_details: "เมื่อ ลอย จาก แม่น้ํา หล่อ ไป สู่ ทะเล ที่ เป็น โลหะ อัน กว้าง ใหญ่ มัน ก็ จะ ระเหย เข้า ไป ใน บรรยากาศ ที่ หมอก. เมื่อ เย็น ลง แล้ว มัน จะ หด ตัว และ ตก ลง บน ผิว ดิน ที่ ไหม้ เกรียม. ไม่แนะนําให้เยี่ยม[from.GetName]ในสถานะปัจจุบัน"

 minamar_chandelier: "มีนา มาร์ แชน เด ลิ เอ อร์"
 minamar_chandelier_desc_short: "การตกแต่งแบบลูคิวรี่ถูกพบเหมือนเดิมในอุบัติเหตุ$ADJ_MSI_country$เรือรบ"
 minamar_chandelier_desc_details: "นอก เหนือ จาก การ ใช้ ทหาร แล้ว ยัง มี การ ใช้ เรือ นี้ เพื่อ ปฏิบัติ การ ติด ต่อ ครั้ง แรก ด้วย ความ สามารถ[Owner.GetPreFTLLower]ลูกค้าชาติ$NAME_MSI_country$ใช้คําสัญญาของความฟุ่มเฟือยและความก้าวหน้า เพื่อหลอกลวงอารยธรรมทั้งหมด ให้กลายเป็นคนรับใช้ที่ไม่ได้รับ การยึดเหนี่ยวพวกเขา\n\n§Bการ หยั่ง เห็น เข้าใจ อาจ ไม่ ใช่ เรื่อง ง่าย. แต่ที่$NAME_MSI_country_initials$มันคุ้มกับค่าใช้จ่ายเสมอ§!"

 mineralized_brain: "สมองกล"
 mineralized_brain_desc_short: "ซากศพของสายพันธุ์ลิธอยด์ขนาดใหญ่นี้เป็นอวัยวะสมองที่ครั้งหนึ่งเคยโคจร[FROM.GetName]ภายในดาวเคราะห์น้อย"
 mineralized_brain_desc_details: "มัน รับ รู้ ถึง สิ่ง กระตุ้น ภาย นอก ทั้ง หมด ว่า เป็น ส่วน หนึ่ง ของ กระบวนการ คิด ของ มัน เอง และ ไม่ สามารถ สืบ ค้น แนว คิด พื้น ฐาน หลาย อย่าง เช่น เวลา หรือ ระยะ ทาง. ข้อมูลนี้ถูกเก็บไว้ในคริสตัล ที่เติบโตเมื่อเวลาผ่านไปกับแกนแร่ของมัน ไม่ว่ามันจะถูกวางไว้ภายในดาวเคราะห์น้อย หรือเติบโตที่นั่นอย่างอิสระ เราไม่อาจบอกได้อย่างชัดเจน"

 mini_moon_dust: "หมึก มินิ มูน"
 mini_moon_dust_desc_short: "ส่วน ที่ เหลือ ของ ดวง จันทร์ จาก ภาย ใน ระบบ ที่ มี ความ ดัน โลหิต สูง และ มี ขนาด เล็ก กว่า ที่ ค้น พบ นอก เส้น รอบ วง"
 mini_moon_dust_desc_details: "ฝุ่นที่ถูกรับมา มีพฤติกรรมที่แปลกประหลาดภายในมิติของเรา มันมีการขยายตัวอย่างต่อเนื่อง ทําให้ตัวอย่างนี้ ถูกย้ายไปยังคอนเทนเนอร์ขนาดใหญ่ขึ้นเรื่อยๆ"

 mining_transmitter: "ตัวแปลงลายเส้นโบราณ"
 mining_transmitter_desc_short: "พบเครื่องส่งระยะไกลบน[FROM.GetName]เคยเป็นสัญลักษณ์ของโลหะล้ําค่า"
 mining_transmitter_desc_details: "แม้อายุของมัน สัญญาณของเครื่องส่งสัญญาณนี้ สามารถจับได้ในหลายเซ็นเซอร์ และสามารถติดตามได้อย่างง่ายดาย การ ทํา งาน ต่อ เนื่อง ของ มัน เป็น พันธ สัญญา ว่า ด้วย วิศวกรรม ที่ แข็ง แรง."

 miracle_cream: "\"อายุ\" ครีมมหัศจรรย์"
 miracle_cream_desc_short: "เครื่องราชอิสริยาภรณ์แห่งการปฏิวัติ เครื่องราชอิสริยาภรณ์แห่งแรก ที่รู้จักกันว่าให้การฟื้นฟูทางชีวภาพระยะยาว"
 miracle_cream_desc_details: "มัน มี ประโยชน์ มาก มาย ทํา ให้ ผู้ บริโภค จาก พืช อินทรีย์ ทุก ชนิด สามารถ รักษา ความ กระปรี้กระเปร่า ของ มัน ได้. ข่าวลือหลอกๆเกี่ยวกับ ผลข้างเคียงที่เสื่อมสลาย และส่วนประกอบการเก็บสะสมที่ผิดกฎหมายยังคงแพร่กระจายอยู่ แต่ความเข้าใจผิดนี้ไม่ได้ขัดขวาง"

 missile_lone_defender: "ขีปนาวุธ ของ ผู้ ป้องกัน ตัว เอง"
 missile_lone_defender_desc_short: "ขีปนาวุธปลดอาวุธจาก ผู้ทําลายอัตโนมัติ ปกป้องส่วนที่เหลือของดาวเคราะห์ยาว"
 missile_lone_defender_desc_details: "ดู เหมือน ว่า นาวา ได้ ทํา ให้ อารยธรรม ที่ มัน ถูก สร้าง ขึ้น มา นี้ มี ความ เจริญ รุ่งเรือง เกิน กว่า ที่ จะ ปก ป้อง ได้ หลาย พัน ปี โดย เฝ้า ดู โลก ที่ ว่าง เปล่า. หลัง จาก การ ทําลาย ล้าง แล้ว ใน ที่ สุด การ ฉลอง นี้ ก็ สิ้น สุด ลง."

 molten_slag: "หอย ดาว เคราะห์"
 molten_slag_desc_short: "ตัวอย่างนี้ได้รับการเก็บเกี่ยวจากดาวเคราะห์ในวงโคจรที่แปลกประหลาด"
 molten_slag_desc_details: "การวิเคราะห์วัตถุระบุว่า[fromfrom.GetName]ถูกดึงเข้าไปในวงโคจรสุดขั้ว โดยความผิดปกติของอวกาศชั่วคราว ความร้อนที่รุนแรงจากใกล้เคียงของดาว ส่วน หนึ่ง ของ ดาว เคราะห์ นี้ ถูก เปลี่ยน แปลง ทาง เคมี โดย ความ ผิด ปกติ และ ไม่ มี ปฏิกิริยา ต่อ การ เปลี่ยน แปลง ของ อุณหภูมิ อีก ต่อ ไป."

 musings_on_infinity: "การ เก็บ รวบ รวม ความ รู้สึก ใน เรื่อง ความ ไม่ สําเร็จ"
 musings_on_infinity_desc_short: "นามธรรมตัวแทนของความสงบห่างไกล ประสบการณ์โดยหุ่นยนต์ชีวภาพ แขวนอยู่ภายในหลุมดํา"
 musings_on_infinity_desc_details: "โดรนพวกนี้มองเห็น[this.GetName]เป็นองค์กรที่แยกจากกัน ในขณะที่ยังติดต่อกับกลุ่มอยู่ ระยะ ทาง นี้ ทํา ให้ พวก เขา มี ความ หยั่ง เห็น เข้าใจ อย่าง ลึก ซึ้ง เปิด โอกาส ให้ พวก เขา ดํารง อยู่ ใน ฐานะ ผู้ อ่าน เรื่อง ราว อัน เยี่ยม ยอด ของ ตน เอง."

 mutated_fumongus: "พึมพํา'Fumongus'"
 mutated_fumongus_desc_short: "รุ่นเพิ่มเติมของ'Fumongus,'เหล่านี้เปิดตัวมวลตอนนี้สามารถเก็บรวบรวมและส่งผ่านข้อมูลในอัตราที่สูงมากอนุญาตให้สําหรับรายงานการเฝ้าระวังรายละเอียดมากขึ้น"
 mutated_fumongus_desc_details: "ความ จุ ที่ เพิ่ม ขึ้น นี้ ทํา ให้ เห็ด แต่ ละ ชนิด มี ขนาด ใหญ่ ขึ้น และ ก่อ ให้ เกิด กระจุก ตัว ใหม่ ซึ่ง ดู คล้าย กับ เสา อากาศ ทาง วิทยุ."

 mutative_digestive_fluids: "บิดเกลียว"
 mutative_digestive_fluids_desc_short: "ตัว อย่าง ทาง ชีววิทยา ที่ ได้ มา จาก กลไก บาง ส่วน ที่ พบ ได้ นอก เหนือ จาก เครื่อง ปั่น ไฟ แอ ส เท อร์"
 mutative_digestive_fluids_desc_details: "สิ่งมีชีวิตชนิดนี้ มีความสามารถในการสร้างนิยาย เพื่อควบคุมโครงสร้างพันธุกรรมของสิ่งมีชีวิตอื่น จากระบบย่อยอาหารของมันเอง มี การ สงสัย กัน ว่า ขั้น ตอน นี้ ถูก พัฒนา ขึ้น ใน ตอน แรก เป็น วิธี การ ที่ ดาว เคราะห์ ต่าง ๆ ซึ่ง มี ชีว สัตว์ นอก โลก ของ พวก เขา."

 namarian_colonist_standard: "มาตรฐาน ของ ชาว นามา เรียน"
 namarian_colonist_standard_desc_short: "ธงนี้หมายถึงข้อตกลงของ[nomad_new_country.GetName]บน[NomadMissionPlanet.GetName]เป็นพรสวรรค์ที่มอบให้พวกเขา[this.GetName]"
 namarian_colonist_standard_desc_details: "ผู้ คน ที่ เลิก ใช้ ชีวิต แบบ เร่ร่อน กลับ มา หา แนว ทาง ของ บรรพบุรุษ. ไม่ ต้อง สงสัย เลย ว่า การ ตัดสิน นี้ หนัก อึ้ง อยู่ ใน จิตใจ ของ ผู้ ที่ ตั้ง อาณานิคม อยู่ ขณะ ที่ พวก เขา ทิ้ง เรือ ที่ ได้ ให้ ประชาชน ของ ตน เป็น เวลา หลาย ชั่ว อายุ."

 namarian_sculpture: "ภาษา นา มา รี"
 namarian_sculpture_desc_short: "รูปปั้นผสมกลางสร้างขึ้นเป็นสัญลักษณ์ของความกตัญญู จากกลุ่มของการแสวงหาน้ําที่เข้าร่วม[this.GetName]"
 namarian_sculpture_desc_details: "เมื่อลงจอด[NomadMissionPlanet.GetName]ผู้ ที่ เคย เป็น นัก ท่อง เที่ยว ทํา ให้ พวก เขา มี ความ ชํานาญ ทาง เทคโนโลยี มาก มาย. อย่าง ไร ก็ ตาม พวก เขา ไม่ ประสงค์ จะ เป็น ที่ รู้ จัก กัน อย่าง เดียว ว่า เป็น ช่าง ดีบุก และ วิศวกร ส่วน ชิ้น นี้ เป็น พันธ สัญญา ที่ ทํา กับ ศิลปะ ของ พวก เขา และ เป็น แรง บันดาล ใจ ที่ มา พร้อม กับ การ เดิน ทาง ข้าม กาแล็กซี."

 namarian_vessel_heraldry: "นา มา เรียน เว เซล เฮ รัลด์ รี"
 namarian_vessel_heraldry_desc_short: "มี การ ค้น พบ ตรา ประทับ เหล่า นี้ ภาย ใน เรือ ที่ สร้าง ขึ้น โดย กอง เรือ ที่ ไล่ ตาม น้ํา ของ นา มา เรียน"
 namarian_vessel_heraldry_desc_details: "สระ น้ํา ที่ สงบ เป็น ภาพ แสดง ถึง เรือ ที่ พัก อาศัย ซึ่ง ชาว นา มา เรียน นอน หลับ, ปลูก พืช, และ ทํา กิจกรรม ใน บ้าน ส่วน ใหญ่ ของ ตน. สัญลักษณ์ของเรือเมโลว ทําเครื่องหมายเรือ ออกแบบมาเพื่อใช้อุตสาหกรรมและวิทยาศาสตร์ เรือขนาดกลางเก่าที่มีเครื่องมือหลากหลาย ใน ที่ สุด ยอด ของ น้ํา ที่ ไหล เชี่ยว นั้น หมาย ถึง กอง เรือ นา มา เรียน ซึ่ง ฝึก ใช้ เรือ รบ ที่ แข็ง แรง ซึ่ง สามารถ ทน ต่อ แรง ปืน ที่ สําคัญ ได้ และ พ่น ออก มา ด้วย."

 nanite_sludge: "สลัดจ์"
 nanite_sludge_desc_short: "สารประกอบที่เก็บรักษาอย่างรอบคอบ ประกอบด้วยกล้องจุลทรรศน์ ที่จําลองตัวเอง"
 nanite_sludge_desc_details: "ความ หนา แน่น ของ นาไนท์ เหล่า นี้ น่า ทึ่ง เพิ่ม มวล หลาย พัน ล้าน ตัน เข้า ไป[from.GetName]พวกเขาถูกพบที่ไหน เป็น ที่ ทราบ กัน ว่า นา ไนท์ เหล่า นี้ ทํา งาน ผิด ปกติ และ เข้า สู่ ช่วง แห่ง การ สืบ พันธุ์ ที่ ไม่ มี การ ควบคุม ทํา ให้ ดาว เคราะห์ ของ พวก เขา พัง ทลาย อย่าง สิ้น เชิง และ ด้วย เหตุ นี้ จึง เป็น การ ลง โทษ ผู้ อยู่ อาศัย ก่อน หน้า นั้น. ตัวอย่างนี้ถูกจัดการเรียบร้อย"

 obsidian_obelisk_fragment: "ออบซิเดียน"
 obsidian_obelisk_fragment_desc_short: "ชิ้น ส่วน ของ โอ เบ ลิ สก์ ซึ่ง ครั้ง หนึ่ง เคย ตั้ง อยู่ ที่ ใจ กลาง ของ เครื่อง บิน ภูเขา ไฟ นอก เส้น อาร์กติก"
 obsidian_obelisk_fragment_desc_details: "มี การ ระบุ ชื่อ บุคคล หลาย พัน คน รวม ทั้ง อาชญากรรม ที่ เกี่ยว ข้อง ด้วย. เชื่อ กัน ว่า อุปกรณ์ นี้ ถูก ใช้ เป็น แผง ควบคุม หลัก สําหรับ เรือน จํา ขนาด มหึมา."

 oiled_fabric: "แฟบ ริก สี น้ํามัน"
 oiled_fabric_desc_short: "ภาพสะท้อนของภูเขาที่มีหิมะปกคลุมไปด้วยป่าลําต้นที่ปรากฏในพื้นบ้าน ประกอบด้วยสีน้ํามันทั้งหมด"
 oiled_fabric_desc_details: "ขณะ ที่ การ แสดง ศิลปะ แบบ มาตรฐาน ใน สัตว์ ชนิด ต่าง ๆ ส่วน ใหญ่ พร้อม ด้วย การ หด ตัว แบบ ที่ เห็น ได้ ชัด แต่ ดู เหมือน ว่า ศิลปิน ชนิด นี้ ชํานาญ เป็น พิเศษ."

 organic_computer: "คอมพิวเตอร์ ออร์แกน"
 organic_computer_desc_short: "คอมพิวเตอร์ อินทรีย์ ที่ เป็น ฟอสซิล ซึ่ง พบ ใน ซาก ปรัก หัก พัง ของ อาณานิคม เบา บน เกาะ[fromfrom.Planet.GetName]"
 organic_computer_desc_details: "ใช้ในการสอนลูกอ่อนรุ่นเยาว์ ก่อนที่จะสร้างการรวมตัวของรัง อุปกรณ์นี้เป็นผลงานที่โดดเด่นของวิศวกรรมชีวภาพ การกู้ข้อมูลรายละเอียดเกี่ยวกับเทคนิคลําดับการเลือกใหม่ ทําให้เป็นไปได้โดยชีววิทยาชนิดนี้โดยเฉพาะ โลก รอบ ตัว พวก เขา ไม่ ได้ ถูก สร้าง แต่ ถูก ปลูก ฝัง."

 organic_machine_interface_sculpture: "ส่วนติดต่อผู้ใช้แบบออร์แกน"
 organic_machine_interface_sculpture_desc_short: "รูป ปั้น ที่ น่า ประทับ ใจ ใน การ ยอม รับ งาน รับ ใช้ ที่ จัด ขึ้น โดย[bio_pop.GetSpeciesName]ไบโอป็อประหว่างพายุสุริยะแม่เหล็กใน[this.solar_system.GetName]"
 organic_machine_interface_sculpture_desc_details: "ประชากร อินทรีย์ เข้า มา สนับสนุน เครื่อง ปฏิกรณ์ เครื่องจักร ของ ตน ดําเนิน งาน ของ หน่วย ดู แล ที่ ผิด ปกติ. ผลงานชิ้นนี้ออกแบบโดย อินทรีย์ชนิดศิลปิน และตัวเชื่อมพิเศษ"

 orinthi_teeth: "โอ ริ นี เตธ"
 orinthi_teeth_desc_short: "ฟันที่ยังงอกอยู่ของโอรินตี"
 orinthi_teeth_desc_details: "สัตว์เล็กคล้ายหนู โอรินตีมี โพรงเขาวงกตที่แกะสลักทั่วโลก[fromfrom.GetName]ฟัน แท้ ของ ฟัน เหล่า นี้ มี ขนาด เล็ก และ กลวง แต่ รา คา ริ อัน ที่ เป็น คู่ ๆ มี ฟัน แต่ ละ ซี่ และ มี ลักษณะ เป็น เขี้ยว ที่ คม กริบ เพื่อ จะ ใช้."

 osseus_construction_material: "วัสดุ ก่อ สร้าง โอ เซ อุส"
 osseus_construction_material_desc_short: "กระดูกขนาดใหญ่เหล่านี้ถูกใช้เป็นทรัพยากรวัสดุ[fromfrom.Planet.GetName]"
 osseus_construction_material_desc_details: "สัตว์เลื้อยคลานชนิดหนึ่ง ที่มีเนื้อเยื่ออ่อนในพันธุกรรม ถูกเพาะเลี้ยงมาอย่างกว้างขวาง เพื่อเก็บสะสมเสบียงก่อสร้าง การ วิเคราะห์ แสดง ว่า สัตว์ เลื้อย คลาน มี ความ ผิด ปกติ ทาง พันธุกรรม ชนิด อื่น ๆ อีก หลาย อย่าง เช่น เท้า ที่ ไม่ ได้ กิน ยา อาจ เกิด จาก การ ผสม พันธุ์. สัตว์ เหล่า นี้ ส่วน ใหญ่ ได้ รับ การ ยกย่อง อย่าง มี มนุษยธรรม ก่อน การ เก็บ เกี่ยว."

 path_to_progress: "พาธของความคืบหน้า"
 path_to_progress_desc_short: "การนําเสนออย่างเป็นทางการของ[owner.GetName]รายงานภารกิจอุตสาหกรรม"
 path_to_progress_desc_details: "ความปรารถนาที่จะเติบโตและปรับปรุงความพึงพอใจลูกค้าที่ค่าใช้จ่ายใด ๆ เป็นแกนหลักของ[owner.GetAdjective]อุดมการณ์ การ เปลี่ยน ดาว เคราะห์ ให้ เป็น ที่ ร้าง เปล่า ที่ ไม่ มี การ ระเหย เป็น ขั้น ตอน ที่ จําเป็น ใน การ แสวง หา ความ ก้าว หน้า อย่าง ไม่ รู้ สิ้น สุด."

 peerless_atomic_clock: "นาฬิกาอะตอมไร้คู่"
 peerless_atomic_clock_desc_short: "นาฬิกาอะตอมที่แม่นยํามาก พบใน[atomic_clock_system.GetName]สร้างโดยผู้สร้างที่ไม่รู้จัก"
 peerless_atomic_clock_desc_details: "เมื่อค้นพบ มันนับถอยหลัง 42 ปี กับ 3 วัน แต่ไม่รู้ว่ามันนับถอยหลังนานแค่ไหนก่อนหน้านั้น เมื่อ นับ ถึง หมาย เลข ศูนย์ เรือ ลํา นี้ ได้ ปล่อย นาไนท์ ที่ เก็บ สะสม ไว้ พร้อม ด้วย ชุด คํา สั่ง ลึกลับ. มัน ยัง คง ใช้ งาน ได้ อย่าง สมบูรณ์ แบบ แม้ ว่า มัน จะ ใช้ อย่าง คุ้ม ค่า และ มี จุด มุ่ง หมาย."

 perception_of_infinity: "การ เริ่ม ต้น ของ ความ ไม่ สําเร็จ"
 perception_of_infinity_desc_short: "ภาพ ดิจิตอล ที่ แสดง ถึง ความ ทุกข์ ทรมาน ชั่ว กัลป์"
 perception_of_infinity_desc_details: "โดรนเหล่านี้อยู่ในสภาวะที่ต่อเนื่องของเดจาวู; ไม่สบายใจและโหยหาความรู้สึกที่ถูกลืมมานาน ความรู้สึกอันน่าสะพรึงกลัวนี้ ยังคงถูกตรวจจับอย่างหลวมๆ[this.GetAdjective]ใจลอย"

 perfectly_faceted_carbon: "คาร์บอนที่มีใบหน้าสมบูรณ์แบบ"
 perfectly_faceted_carbon_desc_short: "แม้ ว่า คาร์บอน ใน รูป ผลึก ไม่ ใช่ สิ่ง ที่ พบ ได้ ยาก ใน กาแล็กซี ของ เรา แต่ ตัว อย่าง นี้ น่า สังเกต โดย เฉพาะ อย่าง ยิ่ง สําหรับ การ ขาด ความ เกี่ยว พัน ภาย ใน หรือ ภาย นอก อย่าง สิ้น เชิง"
 perfectly_faceted_carbon_desc_details: "ใคร ก็ ตาม ที่ เคย มี ของ เหล่า นี้ อยู่ ใน ครอบ ครอง มา ก่อน ได้ ใช้ เวลา ขุด หา ของ นั้น เพื่อ เน้น ลักษณะ เด่น ที่ น่า ทึ่ง เหล่า นี้."

 pet_collar: "ตัว อ่อน"
 pet_collar_desc_short: "สร้อยที่ใช้ในการกําหนดความเป็นเจ้าของ ของสัตว์เลี้ยงลูกด้วยนมขนาดเล็ก"
 pet_collar_desc_details: "อันนี้ใช้ตอนแรก[this.GetName]ผู้ส่งสาร[event_envoy.GetName]ใน กรณี ที่ เพื่อน ที่ มี ค่า ของ พวก เขา จะ หลง หาย ไป. มันได้ถูกแทนที่ด้วยไมโครชิปที่เชื่อถือได้มากขึ้น สัตว์ประหลาดอารมณ์มักจะถูกพบว่ารบกวนสถานทํางานของเจ้าของมันและจะปล่อยเคลื่อนไหวความพึงพอใจเมื่อใด[event_envoy.GetName]สัมผัสหัวของพวกเขาด้วย[event_envoy.Species.GetHandName]."

 perikan_tapico_jewel: "เปอร์ริกา ทูโก"
 perikan_tapico_jewel_desc_short: "สหภาพ เพ อร์ นิ กา เป็น สังคม ของ ช่าง ฝีมือ ชั้น ยอด ซึ่ง รู้ จัก กัน ใน เรื่อง การ สร้าง สินค้า ที่ หรูหรา ฟุ่มเฟือย"
 perikan_tapico_jewel_desc_details: "เพชร เม็ด นี้ เป็น ผล งาน ชิ้น เอก ของ นัก เพชร ที่ มี ชื่อ ใน ตํานาน ซึ่ง รู้ จัก กัน ว่า เบ เด อร์ ทา โก. ใน ช่วง หลาย ปี ที่ ผ่าน มา ทา มิ โก ได้ เผชิญ กับ อัญมณี อัน มหึมา นี้ ด้วย สิ่ว ธรรมดา ๆ และ ใช้ เทคนิค ทาง เผือก เพื่อ ทํา ให้ ศูนย์ ของ มัน เป็น ที่ ตั้ง ของ มัน. ผลึก ลอย อยู่ ภาย ใน เพชร นั้น ก่อ ตัว ด้วย เลเซอร์ ที่ เที่ยง ตรง ทํา ให้ โมเลกุล แร่ ร้อน ขึ้น มาก เพื่อ ปฏิรูป เพชร ที่ เล็ก กว่า และ เข้ม กว่า ขณะ ที่ ปล่อย ไว้ ภาย นอก ให้ คงที่."

 piece_of_invocator: "ส่วนหนึ่งของผู้ปลุกปั่น"
 piece_of_invocator_desc_short: "ชิ้นส่วนของอุปกรณ์ที่ถูกทําลาย ที่รู้จักกันในชื่อ \"ตัวแปลงเสียง\""
 piece_of_invocator_desc_details: "ทั้ง ๆ ที่ เป็น เพียง ชิ้น เล็ก ชิ้น น้อย ที่ แตก เป็น เสี่ยง ๆ แต่ ก็ มี แรง สั่น สะเทือน ที่ แรง มาก. มันอยู่ในนี้ ในสภาพแวดล้อมที่มีเกราะป้องกัน เพื่อให้สังเกตได้อย่างปลอดภัย"

 pilgrimage_last_days: "ลําดับ วงศ์ วาน"
 pilgrimage_last_days_desc_short: "เอกสารทางศาสนาที่บรรยายพิธีกรรมอันศักดิ์สิทธิ์ที่รู้จักกันในชื่อ \"ไรต์ แห่ง หลิว\" บน[fromfrom.Planet.GetName]"
 pilgrimage_last_days_desc_details: "คํา สั่ง นี้ เป็น ชุด คํา สวด ที่ มี การ ร้อง ซ้ํา โดย ฝูง ชน ที่ ยืน เรียง แถว กัน อย่าง ระมัดระวัง. ในทางทฤษฎี กระบวนการนี้สามารถสร้างนิยายและสภาพการสะกดจิตที่มีประสิทธิภาพ ในสายพันธุ์นี้โดยเฉพาะ"

 planet_crystalose: "[from.GetName]คริสตัล"
 planet_crystalose_desc_short: "ผลึกซูสโรสเหล่านี้สามารถคูณได้ ด้วยรังสีสุริยะที่ดูดซับได้ และแร่ธาตุเฉพาะที่อยู่ภายในดาวเคราะห์น้อยบางดวง"
 planet_crystalose_desc_details: "เนื่อง จาก ลักษณะ ที่ เปราะ บาง อย่าง มาก ของ มัน จึง ค่อน ข้าง ง่าย ที่ จะ เพาะ ปลูก และ ดําเนิน การ. การ ใช้ ประโยชน์ จาก อุตสาหกรรม ของ พวก เขา มี ตั้ง แต่ การ รับ ประทาน อาหาร จน ถึง การ พัฒนา โพลีเมอร์ และ ยา รักษา โรค โดย เฉพาะ."

 planet_pushing_thruster: "ดาวเคราะห์- ปุ๊น"
 planet_pushing_thruster_desc_short: "อุปกรณ์ขับเคลื่อนขนาดใหญ่เหล่านี้ เมื่อเชื่อมต่อกันในลําดับ มีความสามารถทางทฤษฎีในการ โน้มน้าววงโคจรของดาวเคราะห์ขนาดเล็ก"
 planet_pushing_thruster_desc_details: "ระบบการยึดที่ตั้งใจสําหรับอาร์เรย์ขับเคลื่อนเหล่านี้ ถูกออกแบบมาเพื่อผลักดันดาวเคราะห์ ความ ห่วงใย หลัก ใน การ ใช้ เทคโนโลยี ของ เครื่อง ยนต์ ชนิด นี้ คง จะ เป็น ปริมาณ เชื้อ เพลิง ที่ ต้อง ใช้ ใน การ ค้ําจุน การ ใช้. มันต้องใช้การร่วมมือกันของอารยธรรมทั้งหมด เพื่อรักษาการดําเนินงานของตน"

 planet_super_roots: "[From.GetName]รากใหญ่สุด"
 planet_super_roots_desc_short: "พบในป่าของ[From.GetName]ราก ผุ เหล่า นี้ ตาม ธรรมชาติ พบ ว่า มี คุณค่า ทาง โภชนาการ สูง"
 planet_super_roots_desc_details: "ด้วย การ จัด การ อย่าง รอบคอบ การ เก็บ เกี่ยว เพียง ส่วน หนึ่ง ของ เครือ ข่าย ที่ กว้าง ใหญ่ ของ มัน ทํา ให้ พืช เลี้ยง อยู่ รอด ได้ ขณะ ที่ สนับสนุน อาณานิคม ที่ กําลัง พัฒนา. เราได้เริ่มทดลอง กับการปรับเปลี่ยนพันธุกรรมอย่างง่าย ๆ ที่จะช่วยให้การปลูกถ่ายนี้ ถ้ารากเหล่านี้เป็นพืชที่มีอยู่"

 planet_vaccine: "[this.GetName]วัคซีน"
 planet_vaccine_desc_short: "การ รักษา โรค โดย การ อัศจรรย์ นี้ เกิด ขึ้น เนื่อง จาก โรค ที่ ทํา ให้ เกิด การ อักเสบ[this.GetName]"
 planet_vaccine_desc_details: "สูตรนี้ถูกพัฒนาขึ้นโดยการใช้อัลกอริทึม AI ทํานาย เพื่อกําหนดความบกพร่องทั้งหมดที่เป็นไปได้ของโรคนี้ และระบุจุดอ่อนพื้นฐาน การ สร้าง โลก นี้ เป็น ความ ก้าว หน้า ที่ สําคัญ ใน ด้าน วิทยาศาสตร์ การ แพทย์."

 planetary_sculpture: "สุริยุปราคา"
 planetary_sculpture_desc_short: "ตัวอย่างของประติมากรรมในระดับดาวเคราะห์ โดยใช้พื้นผิวของ[fromfrom.planet.GetName]เป็นวัตถุดิบ"
 planetary_sculpture_desc_details: "มี การ ใช้ เครื่อง ดับ เพลิง ที่ มี พลัง ใน การ ขุด เส้น ทาง ที่ ถูก ต้อง ตลอด ทั่ว ทวีป, ภูเขา รูป ทรง ที่ สมบูรณ์ แบบ, และ ระบบ ถ้ํา ที่ ซับ ซ้อน อย่าง ไม่ มี ที่ ติ. แผนผังการออกแบบ อัพโหลดดาวเทียมกลางของพวกเขา แสดงถึงระดับที่กว้างขวาง ของการวางแผนแบบล็อกติก แต่น่าเสียดายที่มันถูกทอดทิ้งก่อนที่จะเสร็จสมบูรณ์อย่างแท้จริง"

 primitive_mega_electromagnet: "พรีตีทีฟ เมกะ-อีเลคโทรแฟนเนต"
 primitive_mega_electromagnet_desc_short: "ส่วนหนึ่งของแม่เหล็กไฟฟ้า"
 primitive_mega_electromagnet_desc_details: "ชาว บ้าน สมัย โบราณ[fromfrom.GetName]โง่เขลาที่ใช้เครื่องมือนี้ นําดวงจันทร์ของโลกเข้ามาใกล้ เพื่อให้ง่ายต่อการเก็บเกี่ยวแร่โลหะที่มีค่า วิธีนี้มีประสิทธิภาพมากเกินไป ทําให้ดวงจันทร์ที่เต็มไปด้วยโลหะ ตกมาบนพื้นผิวของดาวเคราะห์ และกําจัดผู้อาศัยทุกคนในผลกระทบ ตัวอย่างนี้เป็นเพียงเศษเสี้ยวเล็ก ๆ ของสิ่งที่สามารถกู้คืนได้ จากเครื่องขยายดาวเคราะห์"

 programmable_puzzle_cube: "เดอะชราวด์"
 programmable_puzzle_cube_desc_short: "อุปกรณ์ที่ดัดแปลงมาอย่างดี ที่สามารถบันทึกรูปแบบที่ซับซ้อน เพื่อสร้างปริศนาเชิงนามธรรม"
 programmable_puzzle_cube_desc_details: "ผลงานชิ้นแรกพบภายในการประดิษฐ์ขนาดใหญ่ เป็นการทดสอบของปัญญาของนักสํารวจ นับ แต่ นั้น มา ก็ มี การ จําลอง ก้อน หิน ก้อน นี้ ขึ้น มา เพื่อ ใช้ กับ ผู้ บริโภค ทํา ให้ ปัจเจกบุคคล สามารถ ตั้ง โปรแกรม ปริศนา ของ ตน เอง สําหรับ อีก คน หนึ่ง หรือ เพียง แต่ ปก ป้อง ทรัพย์ สิน ของ ตน."

 psionic_entity_residue: "ความ สง่า ผ่าเผย"
 psionic_entity_residue_desc_short: "ทั้งหมดที่เหลือของสาร ของพลังงานไซโอนิคบริสุทธิ์ พบภายใน[fromfromfrom.fleet.solar_system.GetName]"
 psionic_entity_residue_desc_details: "มันถูกค้นพบจากรอยแตกชั่วคราว ที่ช่วยให้พลังงานจากข้ามกาแล็กซี่ ไปสระว่ายน้ําในสถานที่เดียว มาเลโวเลนในรูปแบบที่เข้มข้น, มันอาจจะถูกแยกออกจากเครือข่ายไฮเปอร์เลน สําหรับมหายุคจนกระทั่งการค้นพบเมื่อเร็ว ๆ นี้"

 radiated_remains: "ซาก ปรัก หัก พัง"
 radiated_remains_desc_short: "ซาก ของ สิ่ง มี ชีวิต ชนิด หนึ่ง ซึ่ง ประกอบ พิธี ทาง ศาสนา ที่ เกี่ยว ข้อง กับ มิวเทเจน กัมมันตรังสี ที่ ทรง พลัง"
 radiated_remains_desc_details: "การกลายพันธุ์แต่ละครั้งเป็นเหตุการณ์อันศักดิ์สิทธิ์ ที่ถูกตีความว่าเป็นการสําแดงชะตากรรมของแต่ละคน เมื่อ เวลา ผ่าน ไป กระบวนการ นี้ ทํา ให้ โครง สร้าง ทาง พันธุกรรม ของ สิ่ง มี ชีวิต ชนิด ต่าง ๆ อ่อนแอ ลง และ ทํา ให้ ระบบ ภูมิ คุ้ม กัน ของ มัน อ่อนแอ ลง ทํา ให้ ประชากร เสี่ยง ต่อ โรค อย่าง มาก."

# this = ship / from = planet
 rainaissance: "ผลลัพธ์ของสีม่วง"
 rainaissance_desc_short: "ภาพศิลปินที่ถ่ายจากฝนสีม่วงที่พิเศษที่สุด พบในรูปแบบสภาพอากาศของ[FROM.GetName]"
 rainaissance_desc_details: "กล่าว กัน ว่า การ สังเกต ภาพ ที่ น่า ตื่น เต้น นี้ มี ประสิทธิภาพ ใน การ คิด บรรเทา ความ โศก เศร้า และ ความ เจ็บ ปวด."

 reactive_rock: "ทําการวนซ้ํา"
 reactive_rock_desc_short: "แร่ ที่ ไม่ มั่นคง นี้ ไม่ มี การ ค้า หรือ การ ใช้ อุตสาหกรรม ใน สภาพ ปัจจุบัน"
 reactive_rock_desc_details: "อย่าง ไร ก็ ตาม เนื่อง จาก คุณสมบัติ ของ มัน มี ปฏิกิริยา ไม่ เหมือน ใคร จึง เป็น ไป ได้ ที่ จะ กระตุ้น ให้ เกิด การ เปลี่ยน แปลง อย่าง สิ้น เชิง ภาย ใต้ สภาพ การณ์ เฉพาะ อย่าง. ตัวอย่างนี้ถูกบรรจุอยู่ในหน้าต่างที่ดูดสารตะกั่ว ซึ่งจํากัดการกัมมันตรังสีและระเบิดไฟฟ้า"

 reparation_invoice: "การสํารองใบแจ้งหนี้"
 reparation_invoice_desc_short: "มี ใบ แจ้ง เหตุ ให้ กลับ ไป สู้ รบ ซึ่ง ส่ง มา โดย$NAME_MSI_country$"
 reparation_invoice_desc_details: "ภาพร่างโดย บริษัท การจัดการทรัพย์สินระหว่างดวงดาว รายชื่อนี้รายละเอียด ทรัพย์สินทางทหารที่สูญเสียเมื่อ[this.GetName]ทําให้เป็นอิสระจากการเป็นทาสของพวกเขา ที่เรียกว่า \"Benquenet Corporation\"เมกะคอปคาดว่าจะได้รับการชดเชยสําหรับความเสียหายเหล่านี้และแม้กระทั่งอ้างว่าการสัมผัสเรือที่ถูกทําลายใน[this.GetAdjective]พื้นที่จะเป็นการละเมิดสัญญา"

 repurposed_cleaning_drone: "การ ชําระ แบบ ใหม่"
 repurposed_cleaning_drone_desc_short: "การออกแบบโดรนนี้เป็นส่วนหนึ่งของ ระเบียบการสุขาภิบาลทั่วโลก ที่โดยไม่ได้ตั้งใจได้แปล บ้านเกิดของผู้สร้างอย่างสมบูรณ์"
 repurposed_cleaning_drone_desc_details: "มันมีประสิทธิภาพสูงและสามารถทํา การเคลื่อนไหวทางอากาศที่ซับซ้อน กับระบบของเครื่องขับเคลื่อนหลายทิศทาง เครื่องนี้จะย้อนกลับเครื่องยนต์และยกเลิกการปฏิบัติการเพื่อระบุและจําแนกพืชพันธุ์ของคนต่างด้าวและฟูนาและภายหลังได้รับการผลิตจํานวนมากเพื่อ[explorer.GetName]เพื่อป้องกันการทําความสะอาดทั้งหมดได้รับการลบ"

 resonant_diffusion_crystal: "คริสตัลสังเคราะห์"
 resonant_diffusion_crystal_desc_short: "ผลึกนี้สามารถดูดซึมและสะท้อนความถี่ใด ๆ ของรังสีสุริยะ, ทําให้เกิดการแสดงผลกาลีโดสคอปติกในกระบวนการ"
 resonant_diffusion_crystal_desc_details: "ไม่เพียงเป็นความมหัศจรรย์ทางสายตาเท่านั้น แต่มันสามารถช่วยพัฒนาอาวุธหรือเครื่องมือที่ใช้พลังงานได้ นอก จาก นั้น อัญมณี นี้ ยัง ก่อ ให้ เกิด ความ สนใจ อย่าง ยิ่ง ใน อุตสาหกรรม เครื่อง ประดับ ที่ มี รูป เคารพ."

 retarax_hunting_trophies: "Retarax ล่าโทรฟิส"
 retarax_hunting_trophies_desc_short: "การ เก็บ รวบ รวม ถ้วยรางวัล การ ล่า สัตว์ จาก สิ่ง มี ชีวิต หลาก หลาย ชนิด"
 retarax_hunting_trophies_desc_details: "ที่เก็บรวบรวมมาจากหุบเขามาควาเอล ที่ๆพวกเรตาลักซ์จะล่าประชาชน จากรัฐต่าง ๆ ของพวกเขาเพื่อกีฬา ซากศพทั้งหมดถูกเก็บรักษาไว้ ในสภาวะที่ไม่พึงประสงค์ แต่ละคนมีโล่เล็กๆ ที่ระบุลักษณะของถ้วยรางวัล"

 robe_of_the_golden_broker: "ตะปู ของ นัก ขุด ทอง"
 robe_of_the_golden_broker_desc_short: "เสื้อ ผ้า ที่ หรูหรา ของ พ่อค้า ที่ มี อิทธิพล จาก 5000 กว่า ปี มา แล้ว"
 robe_of_the_golden_broker_desc_details: "\"บลูเกอร์ทองคํา\" นําสถานีการค้าของคอมไพล์ของโชสเข้าสู่ยุคของความเจริญรุ่งเรืองที่ไม่มีวันบรรลุผล นิรนามภายใต้หน้ากากสีทอง พวกเขาสวมเสื้อคลุมที่สะดวกสบายและหรูหรานี้ ในขณะที่เจรจาต่อรองข้อตกลงการค้ากาแลคซี การครองราชย์ของโกลเด้นโบรกเกอร์ ถูกตัดให้สั้นลง หลังจากที่ยานเอกราชของพวกเขาถูกทําลาย"

 rock_jellies: "ร็อกเจลลี"
 rock_jellies_desc_short: "ซากของกระดูกสะบ้า"
 rock_jellies_desc_details: "ในระดับผิวเผิน ซากศพเหล่านี้เป็นหินก่อตัว แต่ในความเป็นจริงนี้โฟนาพื้นเมืองเคยเป็นสิ่งมีชีวิตหลักบน[fromfrom.planet.GetName]หลังจากยุคน้ําแข็งล่าสุดของโลก สายพันธุ์นี้เกือบสูญพันธุ์ ซากศพของพวกเขาจะแข็งเป็นแข็ง ในขณะที่พวกเขาสลายตัว, สุดท้ายกลายเป็นขนาดใหญ่"

 rudari_death_laser_prototype: "เลเซอร์ตาย Rudari"
 rudari_death_laser_prototype_desc_short: "เลเซอร์ที่พกวุธรวมตัวกันอย่างเร่งรีบโดยตายยาว Rudari พบในสถานีใน[this.solar_system.GetName]"
 rudari_death_laser_prototype_desc_details: "This hacked-together weapon of mass destruction was created as the final gambit for the Rudari species in their war against the Pogg-Mory. In the end, the laser simply self-destructed upon activation."

 saariah_guilt: "ความรู้สึกผิดของซาอาระ"
 saariah_guilt_desc_short: "ความ ทรง จํา ที่ บันทึก ไว้ เกี่ยว กับ ซา อา รี ยา ซึ่ง เป็น นัก พัฒนา ชั้น นํา ของ ระบบ จิตใต้สํานึก เม โม ลิกซ์"
 saariah_guilt_desc_details: "ซาอาเรียถูกมอบหมายให้ลบความทรงจํารวม เพื่อเหมาะกับการเป็นผู้นําของดาวเคราะห์ แต่ในที่สุดการผิดพลาด ก็ทําให้จิตใจประชาชนสะอาด ไม่สามารถเรียกคืนความทรงจําได้ ซาอาริน่าได้ ถอนเครื่องช่วยชีวิตของถิ่นที่อยู่ และปล่อยให้มันถูกทําลาย อุปกรณ์แต่ละชิ้นนั้นหนาแน่นอย่างเหลือเชื่อ ด้วยพลังการคํานวณดิบ และเป็นความสําเร็จของมันเอง"

 scent_based_information_device: "ไดรฟ์ของโอนาคโต"
 scent_based_information_device_desc_short: "ข้อมูลที่ถูกเข้ารหัสไว้กลางของกลิ่น"
 scent_based_information_device_desc_details: "ข้อมูลภายในเป็นชุด ของเรื่องราวที่น่าสนใจ หรือการบันทึกอย่างละเอียด ของการขับไล่อินทรีย์ต่าง ๆ ในรายละเอียดสูง การ เลียน แบบ เทคนิค การ เก็บ ละออง เรณู นี้ เป็น ไป ได้ แต่ ก็ ไม่ ได้ ให้ ประโยชน์ ใด ๆ นอก เหนือ จาก การ สังเคราะห์ กลิ่น เท่า นั้น."

 scientific_treatise_of_telisa: "สภา วิทยาศาสตร์ แห่ง เท ลิ ซา"
 scientific_treatise_of_telisa_desc_short: "คํา สอน เชิง ปรัชญา ของ เท ลิ ซา เทลเลอร์ แห่ง ทาเลส"
 scientific_treatise_of_telisa_desc_details: "เธอ สํารวจ หัว เรื่อง ที่ หลาก หลาย รวม ทั้ง หลัก การ สําคัญ ของ วิธี การ ทาง วิทยาศาสตร์. ใน ข้อ คัมภีร์ เหล่า นี้ แนว คิด เกี่ยว กับ ความ จริง ใน จุด ประสงค์ ที เดียว ได้ รับ การ ท้าทาย และ มี การ สนับสนุน แนว คิด ที่ วิพากษ์ วิจารณ์."

 secrets_black_crown: "เคล็ด ลับ ของ มงกุฎ ดํา"
 secrets_black_crown_desc_short: "แบบ แปลน ที่ ละเอียด ของ ทาง เข้า ระหว่าง กาแล็กซี ซึ่ง รู้ จัก กัน ใน นาม บัลลังก์ ดํา"
 secrets_black_crown_desc_details: "ข้อมูลนี้ถูกส่งออกมาเป็นของขวัญสุดท้าย จากผู้สร้างสรรค์ปริศนาของประตู เพื่อเป็นแนวทางในการอนุรักษ์เทคโนโลยีอันเหลือเชื่อของพวกเขา ไว้ใจ[this.GetName]อํานาจและความสูงส่งของเทคโนโลยีประตูของพวกเขา ถูกบรรจุมาจนถึงทุกวันนี้"

 sembelami_alms_basket: "ซัมเบลามิ อัลมาส บาสเคต"
 sembelami_alms_basket_desc_short: "ชาม ที่ สมาชิก ของ ซัม เบ ลี อา มี ได้ รับ เงิน บริจาค"
 sembelami_alms_basket_desc_details: "นักเดินทางเหล่านี้ทํารูปแบบ ของคําว่า \"อีนิกส์\" หลังจากที่วัดออร์บิทัลถูกทําลาย พวกเขาขโมยเงินก้อนโต และใช้รายได้ของพวกเขาเป็นกองทุนผู้ลี้ภัย พวก เขา รอด ชีวิต อย่าง สิ้น เชิง จาก การ บริจาค ที่ ได้ รับ จาก ผู้ ลี้ ภัย ที่ พวก เขา สนับสนุน."

 shallarian_data_core: "แกนย่อยข้อมูล"
 shallarian_data_core_desc_short: "ฐานข้อมูลแบบโบราณที่พบท่ามกลางซากปรักหักพังของยูโทเปียของมอลตา"
 shallarian_data_core_desc_details: "โดย[fanatic_xenophobe_fe.GetSpeciesName]หม่อมเจ้านกนางนวลได้สร้างระบบการจัดการภูมิอากาศ โดยใช้ดวงจันทร์ขนาดเท่าๆกันหกดวง ก่อน ที่ พวก มัน จะ เสีย ชีวิต ก่อน เวลา อัน ควร พวก มัน ได้ วาง แผน จะ ทําลาย ดาว เคราะห์ ที่ ไม่ ได้ อยู่ เพื่อ จะ อยู่ บ้าน และ สนับสนุน ประชากร ผู้ ลี้ ภัย."

 shipyard_schematics: "[radical_cult.GetName]แผ่น พับ"
 shipyard_schematics_desc_short: "พิมพ์เขียวของอู่เรืออัตโนมัติควบคุมโดย[radical_cult.GetName]ของ[root.GetName]"
 shipyard_schematics_desc_details: "เมื่อได้พบอู่ต่อเรือนี้ ที่ถูกทิ้งร้างโดยผู้สร้างของคนต่างด้าว หัวหน้าวิศวกรขององค์กรได้ตกแต่งใหม่ โปรเจกต์สุดท้ายที่บันทึกไว้ ที่อู่เรือแห่งนี้ คือเรือเรือธงที่น่าประทับใจ สําหรับความซับซ้อนนี้ ที่ถูกรื้อถอนได้ง่ายๆ เป็นหลักฐานของอัจฉริยะของนักออกแบบดั้งเดิม"

 sky_dragon: "มังกร ฟ้า"
 sky_dragon_desc_short: "มี การ มอบ หมาย ให้ รูป ปั้น นี้ เป็น ตัว แทน การ ร่วม มือ กัน ระหว่าง[this.GetName]และ \"มังกรฟ้า\" ที่โคจรไกล[this.GetHomeWorldName]"
 sky_dragon_desc_details: "การที่คิดว่า[this.GetAdjective]สังคมที่คู่ควร, สิ่งมีชีวิตสัญญาตัวเองและลูกหลานของมันในการสนับสนุนทางทหาร[this.GetAdjective]พื้นที่ กล่าว กัน ว่า สัตว์ อวกาศ เหล่า นี้ สามารถ รอ ได้ หลาย พัน ปี เพื่อ หา เจ้า ภาพ ที่ เหมาะ สม สําหรับ ลูก น้อย ของ มัน และ มี เพียง ดาว เคราะห์ ดวง เดียว เท่า นั้น."

 smeegibb_statue: "รูป ปั้น ของ ส เม กกิบ"
 smeegibb_statue_desc_short: "รูปปั้นของสปีกิบ สหายจิตของกัปตันเนส"
 smeegibb_statue_desc_details: "สปีกิบเป็นข้าราชการที่ซื่อสัตย์ ทํางานเป็นโจรสลัดในตํานาน ทั้งลูกเรือและพรรคประจํา ในระยะหลังของอาชีพเธอ รูปปั้นที่ประกอบขึ้นใหม่นี้ ยังคงอยู่ทั้งหมด หลังจากที่แบล็คมิดเดิ้ลโจมตี การตั้งถิ่นฐานเล็กๆของพวกเขา"

 sniran_spikes: "สไนราน สเกต"
 sniran_spikes_desc_short: "จุด สูง ที่ พบ บน หลัง ของ สัตว์ ที่ รู้ จัก กัน ว่า ส ไน รา"
 sniran_spikes_desc_details: "แมง กะพรุน เป็น สัตว์ ล่า เหยื่อ ขนาด ใหญ่ วาง อยู่ ใต้ เนิน ทราย พื้น เมือง ของ มัน และ ยก ก้าน ที่ ทํา ให้ ถึง ตาย ขึ้น เมื่อ ไร ก็ ตาม ที่ มัน ตรวจ จับ การ เคลื่อน ไหว บน ผิว ดิน ข้าง บน. แม้ จะ มี ขนาด ใหญ่ แต่ ร่าง ของ สัตว์ เหล่า นี้ ก็ เปราะ อย่าง น่า ทึ่ง. เกล็ด บาง ๆ ของ มัน ที่ ถูก ชุบ ให้ แข็ง แรง ทํา ให้ มัน ลอย อยู่ อย่าง เงียบ ๆ ใต้ ทราย แต่ สามารถ เจาะ ได้ ค่อน ข้าง ง่าย. มี การ คาด เดา ว่า เครื่อง ช่วย นี้ ใน กระบวนการ สืบ พันธุ์ ของ พวก เขา."

 sonic_reflective_prism: "ภาพ สะท้อน อัน งดงาม"
 sonic_reflective_prism_desc_short: "รูปหลายเหลี่ยมสลักด้วยสัญลักษณ์ทางวิทยาศาสตร์แปลกๆ วัตถุนี้สะท้อนเฉพาะคลื่นพลังงานใต้ความถี่"
 sonic_reflective_prism_desc_details: "แต่ เดิม ที เครื่อง วัด บาง ชนิด อาจ ใช้ เพื่อ ความ สวย งาม ใน การ แสดง ทาง ดนตรี และ เสียง."

 spaceborne_hunter_handbook: "ศิลปะ การ ล่า"
 spaceborne_hunter_handbook_desc_short: "ไกด์สนาม ไปอวกาศเฟนานาเขียนโดย$NAME_PrimalHunter$"
 spaceborne_hunter_handbook_desc_details: "มันอธิบาย \"ศิลปะของล่า\" ด้วยวิธีการของสุภาษิตและปรัชญาพื้นฐาน ความ เข้าใจ ที่ ละเอียด เกี่ยว กับ รูป แบบ การ หา อาหาร และ การ อพยพ ของ สัตว์ ต่าง ๆ ที่ อยู่ ใน อวกาศ นั้น มี อยู่ ภาย ใน. ข้อความนี้ให้คําแนะนําในการใช้งาน เกี่ยวกับวิธีการผ่านการป้องกันตามธรรมชาติของสัตว์แต่ละตัว เปิดเผยจุดอ่อนแอหลายจุดที่จะถูกเอาเปรียบ"

 spaceborne_xeno_encyclopedia: "สารานุกรม"
 spaceborne_xeno_encyclopedia_desc_short: "คอลเลกชันของคําเหล่านี้เขียนโดย$NAME_PrimalRancher$"
 spaceborne_xeno_encyclopedia_desc_details: "งานวิจัยนี้เสนอความเข้าใจเชิงลึก ในพฤติกรรมของสิ่งมีชีวิตจากอวกาศ พิธีกรรมการผสมพันธุ์ เส้นทางการย้ายถิ่นฐาน การสื่อสารระหว่างสิ่งมีชีวิต และอื่นๆ นอก จาก นี้ ยัง มี ส่วน หนึ่ง ใน การ ระบุ ตัว อย่าง แต่ ละ ตัว โดย ใช้ ลักษณะ ทาง กายภาพ ที่ ไม่ เหมือน ใคร และ การ ยอม รับ อย่าง เหมาะ สม."

 spiraling_attraction: "การ ล่อ ใจ"
 spiraling_attraction_desc_short: "มี การ ออก แบบ เพื่อ ความ บันเทิง"
 spiraling_attraction_desc_details: "การ ติด ตั้ง ทาง ลม แบบ นี้ ถูก ทิ้ง ไว้ ใน บริเวณ ที่ มี สิ่ง ปลูก สร้าง หลาก หลาย สี และ วัตถุ ต่าง ๆ คล้าย ๆ กัน. กล่าว กัน ว่า การ จม ลง ไป ตาม ทาง ขด ของ มัน ภาย ใน ระดับ ความ โน้ม ถ่วง เฉพาะ ระดับ หนึ่ง นั้น น่า ตื่น เต้น."

 spirit_of_the_unshackled: "วิญญาณ ของ ผู้ ที่ ไม่ มี ความ ผิด"
 spirit_of_the_unshackled_desc_short: "ประติมากรรมที่ทําขึ้นเพื่อเฉลิมฉลองการก่อตัวของ[this.GetName]"
 spirit_of_the_unshackled_desc_details: "โดย หลุด พ้น จาก โซ่ ตรวน แห่ง การ เป็น ทาส อดีต ที่ มี ส่วน ร่วม และ ยุ่ง ยาก จึง ทํา ให้ พวก เขา เป็น อัน หนึ่ง อัน เดียว กัน ใน การ สร้าง อนาคต ที่ มี ความ หวัง มาก ขึ้น. แต่ละการเชื่อมโยงในสายโซ่ของประติมากรรม มีชื่อของสมาชิกผู้ก่อตั้งแกะสลักบนมัน"

 star_mall_map: "แผนที่รวมดาว"
 star_mall_map_desc_short: "แผนที่ที่ให้ไว้ครั้งหนึ่งกับผู้เข้าชมทุกคน ถึงสถานที่ที่รู้จักกันในชื่อ \"สตาร์มอล\""
 star_mall_map_desc_details: "บ้าน เดิม ของ ผู้ บริโภค ระหว่าง กัลกัต ตา ส ตาร์ มอล อวด อ้าง ถึง สิ่ง มี ชีวิต มาก มาย นับ ตั้ง แต่ สปา ที่ สว่างไสว จน ถึง ลาน โภชนาการ ที่ มี ประสิทธิภาพ. แผนที่นี้ให้ข้อมูลเกี่ยวกับ ร้านค้ามากมาย รวมทั้งของโคริค แม็กซ์, ก่อสร้าง- เบรกริการ์และข้อ เท็จ จริง เกี่ยว กับ ธัญพืช"

 starmetal: "ดวงดาว"
 starmetal_desc_short: "การ รวม ตัว ของ โลหะ หนัก จํานวน มาก ซึ่ง รวบ รวม ได้ ไม่ นาน หลัง จาก การ ระเบิด ของ ซู เปอร์ โน วา"
 starmetal_desc_details: "การฟื้นฟูนี้เกิดขึ้นได้อย่างไร เป็นเรื่องลึกลับสําหรับเรา แต่คุณค่าของมันทางวิทยาศาสตร์ ในการศึกษาวิวัฒนาการและองค์ประกอบของดวงดาวนั้น โดดเด่นมาก"

 striated_sand: "ทราย"
 striated_sand_desc_short: "ขวดทรายที่ฝังตัวเอง"
 striated_sand_desc_details: "อนุภาคเล็ก ๆ เหล่านี้ ดูเหมือนจะแสดงระดับต่ําของความ มีชีวิตชีวาที่มีแร่ธาตุที่คล้ายกัน จัดกลุ่มกัน แม้ ว่า จะ มี ความ สามารถ เช่น นี้ แต่ ทราย ก็ ไม่ มี ลักษณะ พื้น ฐาน อื่น ใด ของ ชีวิต."

 sullebaster_control_column: "คอลัมน์ควบคุมสุลต่าน"
 sullebaster_control_column_desc_short: "คันโยกทิศทางจากยานอวกาศแสง เกี่ยวข้องกับอุบัติเหตุในตํานาน"
 sullebaster_control_column_desc_details: "เรือโดยสารสุลต่านกําลังขนส่งพลเรือน ระหว่างอาณานิคมทั้งสองของอาณาจักรโอเดลิเนียน เมื่อสุริยะทําให้เกิด ความผิดปกติร้ายแรงในเครื่องยนต์ของเรือ เมื่อ เทียบ กัน แล้ว นัก บิน สามารถ ลง จอด ได้ อย่าง ปลอด ภัย บน ดาว เคราะห์ เคราะห์ น้อย ที่ ผ่าน ไป โดย ใช้ การ ควบคุม ด้วย ตัว เอง. หลัง จาก นั้น สุลต่าน ก็ ถูก ปลด ประจํา การ และ ถูก ตั้ง ขึ้น เพื่อ การ แสดง ต่อ สาธารณชน."

 symbiotic_fruit: "ผล ไม้ ที่ มี คุณค่า ทาง โภชนาการ"
 symbiotic_fruit_desc_short: "กลุ่ม รา ที่ มี เชาวน์ ปัญญา จาก อีก มิติ หนึ่ง"
 symbiotic_fruit_desc_details: "'ผลไม้' นี้รักษาความสัมพันธ์แบบไซโมเกเนกับสายพันธุ์ของพืชที่กินพืชอันตราย แต่ ละ อาณานิคม ของ รา ทํา หน้า ที่ เป็น ศูนย์ รวม ความ คิด สําหรับ สิ่ง มี ชีวิต คู่ ซึ่ง จัด เรียง รูป แบบ ที่ ซับ ซ้อน ของ พฤติกรรม ป้องกัน."

 tarblac_shimmer: "เครื่อง เทศ ขนาด ใหญ่"
 tarblac_shimmer_desc_short: "เนื้อ เยื่อ ที่ มี แสง ระยิบ ระยับ คล้าย ผ้า ใบ"
 tarblac_shimmer_desc_details: "สัตว์ประหลาดตัวนี้ใช้นิยายของไซโอนิค เพื่อล่าและปกป้องตัวมันเอง ทําให้ความรู้สึกกลัวอย่างท่วมท้น ตัว อย่าง นี้ เก็บ ไว้ ใน หม้อ น้ํา ท้อง ถิ่น ของ มัน และ ได้ รับ การ แปล ทาง จิตวิทยา ว่า ไม่."

 terraforming_case_study: "การศึกษาตัวพิมพ์เล็ก- ใหญ่"
 terraforming_case_study_desc_short: "โมเดลการปรับขนาดโครงการเทอร์ราฟอร์มที่ประสบความสําเร็จบน[from.GetName]เป็นตัวแทนของ นันทนาการที่สมบูรณ์แบบใกล้[Space_Owner.GetSpeciesName]โฮมเวิลด์"
 terraforming_case_study_desc_details: "ดาวเคราะห์ตอนนี้มีประชากรโดยสนุกแบบเดียวกัน ลงไปที่ระดับกล้องจุลทรรศน์ และแม้กระทั่งระบบนิเวศข้ามไบอมที่เจาะจงที่สุด[Space_Owner.GetHomeWorldName]."

 terraforming_case_study_dry: "$terraforming_case_study$"
 terraforming_case_study_dry_desc_short: "$terraforming_case_study_desc_short$"
 terraforming_case_study_dry_desc_details: "$terraforming_case_study_desc_details$"
 terraforming_case_study_frozen: "$terraforming_case_study$"
 terraforming_case_study_frozen_desc_short: "$terraforming_case_study_desc_short$"
 terraforming_case_study_frozen_desc_details: "$terraforming_case_study_desc_details$"

 terraforming_machinery: "เครื่อง เท ราฟอร์ม"
 terraforming_machinery_desc_short: "อุปกรณ์ขนาดเล็กที่ใช้เป็นส่วนหนึ่งของเทคโนโลยีแบบโบราณ"
 terraforming_machinery_desc_details: "เครื่องจักรขนาดจิ๋วเหล่านี้ถูกออกแบบให้กระจายออกไปทั่วพื้นผิวของดาวเคราะห์ และแปลงสารอินทรีย์และแร่ธาตุที่มีอยู่ ทีมงานของหุ่นยนต์เหล่านี้ ถูกใช้ในการจัดการรูปแบบสภาพอากาศ ภายในไบโอเมม และจําลองพืชและสัตว์ใหม่"

 terraforming_records: "[From.GetName]แผ่น เสียง ที่ มี รูป แบบ"
 terraforming_records_desc_short: "สิ่งมีชีวิตทั้งหมดบน[From.GetName]มี การ ประสาน งาน กัน ทาง พฤติกรรม ระหว่าง กระบวนการ ของ มัน ซึ่ง ยัง ผล ให้ มี อุทยาน ตาม ธรรมชาติ ซึ่ง แต่ ละ ชนิด ของ พืช และ สัตว์ พรรณ ต่าง ก็ มี วัตถุ ประสงค์ เฉพาะ ภาย ใน ระบบ นิเวศ"
 terraforming_records_desc_details: "แม้ ว่า สถานการณ์ ทาง พันธุกรรม แบบ นี้ มัก จะ เกิด ขึ้น เอง ตาม ธรรมชาติ ใน กระบวนการ วิวัฒนาการ แต่ ไม่ เคย มี การ สังเกต เห็น มา ก่อน ถึง ระดับ สุด ยอด นี้."

 the_final_sacrifice: "เครื่อง บูชา ขั้น สุด ท้าย"
 the_final_sacrifice_desc_short: "ภาพของช่วงเวลาสุดท้ายของสงครามกลางเมืองซอนี# ข้าม #จากคริสตัลข้อมูลที่ขุด"
 the_final_sacrifice_desc_details: "พระ ผู้ ช่วย ให้ รอด องค์ เดียว ได้ ใช้ อํานาจ ของ ไซ โอ นิก ตลอด ทั้ง เผ่า พันธุ์ ของ พวก เขา เพื่อ กําจัด พวก คู่ แข่ง ที่ รู้ จัก กัน ว่า พระเจ้า ซึ่ง ทํา ให้ พวก เขา ไม่ สามารถ กิน ทั้ง เอกภพ ได้. ทั้งหมดที่เหลืออยู่ของสายพันธุ์ที่เพิ่มขึ้นนี้ เป็นเงินเล็กน้อยของทรัพยากรที่เรารู้จักในชื่อ ซโร"

 the_mask_of_transformation: "หน้ากาก แห่ง การ เปลี่ยน แปลง"
 the_mask_of_transformation_desc_short: "หน้ากาก มนุษย์ ที่ พบ อยู่ ใน เสา คริสตัล อัน งดงาม บน[From.Planet.GetName]"
 the_mask_of_transformation_desc_details: "มันฮัมด้วยพลังไซโอนิค และบางคนที่เข้าใกล้มัน รู้สึกการมีอยู่ภายในจิตใจ หน้ากากเองดูเหมือนจะเป็นท่อสําหรับอํานาจ[From.Planet.GetName]ดวงจันทร์ซึ่งมีศักยภาพ ที่จะเปลี่ยนกระแสน้ํา และเปลี่ยนดาวเคราะห์ด้วยความแข็งแกร่งเพียงอย่างเดียว สาเหตุที่มันถูกบรรจุอยู่ภายในคริสตัล สามารถคาดเดาได้เท่านั้น แต่เราส่วนใหญ่แน่ใจว่ามันปลอดภัยพอสําหรับการแสดงในที่สาธารณะ"

 the_planet_orchestra: "เดอะ[FROM.GetName]ออร์เคสตรา"
 the_planet_orchestra_desc_short: "เพลงที่เล่นโดยชีวิตพื้นเมืองร่วมกันบน[FROM.GetName]"
 the_planet_orchestra_desc_details: "หลัง จาก วิเคราะห์ อย่าง ละเอียด แล้ว เรา เชื่อ ว่า ความ ปรองดอง นี้ ถูก นํา มา ใช้ กับ เฟนา โดย นักแสดง ที่ ไม่ รู้ จัก เพื่อ จะ เข้า รหัส ข่าวสาร ที่ ซ่อน อยู่. เรา ไม่ แน่ ใจ ว่า เจตนา ของ พวก เขา เป็น การ สื่อ ความ แบบ ลับ ๆ หรือ เป็น การ กระทํา ที่ แสดง ความ รู้สึก."

 the_writer_sphere: "สปอร์ตของนักเขียน"
 the_writer_sphere_desc_short: "ทรงกลมสีทอง มีพรสวรรค์สําหรับเรา โดยมิติอื่น ๆ ที่รู้จักกันเท่านั้น นักเขียน"
 the_writer_sphere_desc_details: "อุปกรณ์นี้รวบรวมข้อมูล ที่สุ่มสร้างมามากมายข้ามมิติ มันเป็นข้อพิสูจน์ว่า พลังของคําเขียน สามารถอยู่เหนือขอบเขตใดๆ"

 tiny_ancient_sarcophagus: "ซาร์ โค ฟากัส โบราณ ขนาด เล็ก"
 tiny_ancient_sarcophagus_desc_short: "ห้อง ฝัง ศพ ของ ผู้ นํา ฝ่าย วิญญาณ สมัย โบราณ จาก หลาย ล้าน ปี มา แล้ว"
 tiny_ancient_sarcophagus_desc_details: "มันวัดความยาวได้เพียง 10 เซนติเมตร แม้ ซาก ส่วน ใหญ่ ใน ซาก เหล่า นั้น บัด นี้ เป็น ฝุ่น แต่ หน้ากาก ขนาด จิ๋ว ของ ทองคํา บริสุทธิ์ ยัง คง คง อยู่ โดย ไม่ เคย ถูก ออก หาก."

 tiyanki_radioactive_sac: "ที ยัน คี"
 tiyanki_radioactive_sac_desc_short: "อวัยวะ รูป ร่าง เล็ก ๆ ที่ พบ ใน เนื้อ เยื่อ ของ ไท ยัน คี"
 tiyanki_radioactive_sac_desc_details: "การ ค้น พบ นี้ เผย ให้ เห็น ว่า ที ยัน คี รับ ประทาน โมเลกุล ของ น้ํา ที่ ระเหย แล้ว ข้าง ๆ ก๊าซ ต่าง ๆ บน ดาว เคราะห์ เป็น แหล่ง อาหาร เพิ่ม ขึ้น. เมื่อ เต็ม ถุง เหล่า นี้ กลาย เป็น แหล่ง ความ ร้อน กัมมันตรังสี ชั่ว คราว สําหรับ สัตว์ ใน ที่ ลึก ของ อวกาศ."

 torn_solar_sail: "สมุทรสุริยะ"
 torn_solar_sail_desc_short: "พบการหมุนรอบ[FROM.GetName]เรือที่ขาดนี้ถูกผูกกับเรือย่อยแสงนวัตกรรม"
 torn_solar_sail_desc_details: "มันถูกใช้ในการท่องเที่ยวข้าม[FROM.solar_system.GetName]ระบบโดยสมาชิกของอารยธรรมที่ไม่รู้จัก เทคโนโลยี เอง ก็ ล้า สมัย ไป นาน แล้ว แต่ เทคนิค ทาง วิศวกรรม บาง อย่าง ที่ ใช้ ใน การ ก่อ สร้าง นั้น ไม่ เคย มี การ คํานึง ถึง มา ก่อน. ก๊าซขนาดใหญ่ในหลัก'ซาอิล'ดูเหมือนจะสิ้นสุดการเดินทางก่อนเวลาอันควร"

 toxic_bio_engine: "ไบโออิเลคทรอนิกส์"
 toxic_bio_engine_desc_short: "มีการค้นพบเครื่องจักรกึ่งชีวภาพเหล่านี้ ส่งผลถึงบรรยากาศของ[FROM.GetName]พิษสําหรับชีวิตส่วนใหญ่"
 toxic_bio_engine_desc_details: "ความ สามารถ ของ พวก เขา ใน การ ปฏิบัติ งาน อย่าง เป็น เอกเทศ ทํา ให้ การ ปล่อย ก๊าซ ที่ มี พิษ มี พิษ เหมาะ กับ งาน อุตสาหกรรม ที่ อยู่ ห่าง ไกล. เครื่อง กล เหล่า นี้ มี กลไก การ เติม เชื้อ เพลิง ที่ ชาญ ฉลาด ซึ่ง นํา กลับ มา ใช้ ใหม่ ใน บริเวณ ใกล้ เคียง โดย ใช้ กระบวนการ สกัด สาร เคมี เพื่อ เปลี่ยน เป็น พลัง งาน ที่ ใช้ ได้. ไม่ เป็น ที่ แน่ชัด ว่า มี การ เชื่อม ต่อ ทาง ชีวภาพ ของ พวก เขา จาก การ ก่อ สร้าง ใน ตอน แรก หรือ พัฒนา มา นาน แล้ว."

 tree_of_life_sample: "ตัวอย่าง \"ทรีออฟไลฟ์\""
 tree_of_life_sample_desc_short: "(สวนสวรรค์สองแห่งนั้น) แผ่กิ่งก้านเขียวชอุ่ม และผลไม้หลายชนิด"
 tree_of_life_sample_desc_details: "ค้นพบการลอยตัวผ่านอวกาศ คุณสมบัติการกู้คืนของยางเป็นค่อนข้างมหัศจรรย์ แม้ ว่า เรา พยายาม อย่าง ดี ที่ สุด แต่ เรา ก็ ไม่ สามารถ ต่อ ชิ้น ส่วน นี้ หรือ ปลูก พืช ชนิด ใหม่ ได้. ผู้ทําสวนเดิม ไม่ว่าเป็นใคร คงรู้เรื่องเทคนิคการปลูกพืชที่ก้าวหน้ามาก"

 tricorne_of_aussan: "ไตร คอร์น แห่ง อัส ซัน"
 tricorne_of_aussan_desc_short: "หมวกสามหัวที่เป็นที่นิยม โดยสาธารณรัฐโจรสลัดที่ถูกลืม"
 tricorne_of_aussan_desc_details: "ออสซานเป็นดาวเคราะห์เล็ก ๆ ที่อาศัยอยู่โดย[root.controller.GetPreFTLLower]อารยธรรม ที่ ให้ ที่ ลี้ ภัย แก่ กอง เรือ โจรสลัด ที่ ต้องการ โดย ไม่ รู้ ตัว คือ พวก บัว ร์ วาร์ เลอ ร์. พวก เขา ทํา อย่าง ไร? ต่อ มา พวก บราว์ เลอ ร์ ได้ มา เป็น ที่ รู้ จัก กัน ใน นาม พวก บูร์เร คู รีเยร์ นัก ท่อง เที่ยว ที่ ไม่ รู้ จัก เนื่อง จาก ตัว แทน ขาย ที่ น่า กลัว แปลก ใจ ของ พวก เขา."

 triggerless_gun: "ปืนพกของอาร์มส"
 triggerless_gun_desc_short: "อาวุธนี้ได้รับการออกแบบในช่วงระยะเวลาสั้น รัชกาลที่สองของอาร์มบวร์กบนคอเนอร์ของ"
 triggerless_gun_desc_details: "ในขณะนั้น ป้อมคาราวานเยร์อยู่ใกล้ฐานค้าอาวุธมากกว่าคาสิโน มีผู้วางระเบิดในบ้าน และเป็นที่ตั้งของพ่อค้าอาวุธหลายประเภท ใน ตอน นั้น มี การ เสนอ อาวุธ แก่ ผู้ ที่ คาด ว่า จะ เป็น ผู้ ซื้อ ด้วย ไก ปืน เพื่อ พยายาม ยับยั้ง เหตุ การณ์ ขโมย เล็ก ๆ น้อย ๆ."

# this = ship / fromfrom = planet
 uddloran_pelts: "เกมถอดไพ่"
 uddloran_pelts_desc_short: "ขน ของ นก ยูดโล รัน[fromfrom.GetName]"
 uddloran_pelts_desc_details: "โอมนิวอเรสที่ยืดหยุ่นเหล่านี้จะพันตัวเองเป็น ลูกแน่นและม้วนทั่วพื้นผิวหิมะของโลก เป็นกลุ่มขนาดใหญ่ กลยุทธ์ นี้ ใช้ ใน การ ล่า สัตว์ และ การ อพยพยูโดรันแพ็คมักจะแบ่งออกเป็นสองกลุ่ม นักล่าที่แกะสลักเส้นทางทําลายล้างผ่านภูมิทัศน์ และรวบรวมผู้ที่ตามหลัง หยุดเก็บเหยื่อแบนราบและพืชที่ถูกรื้อถอน"

 underworld_cantina_sign: "คา ที นา"
 underworld_cantina_sign_desc_short: "ยังใช้ป้ายดิจิตอลจากคันติน่าที่ลักลอบใช้เมื่อประมาณสองล้านปีก่อน"
 underworld_cantina_sign_desc_details: "ค้นพบภายในดาวเคราะห์น้อยที่กลวง สถานที่นี้น่าจะเป็นที่ซ่อนตัวปกติสําหรับองค์กรอาชญากร สัญลักษณ์ที่แสดงที่นี่ เชื่อว่าเป็นเครื่องหมายรหัส ว่าที่นี่เป็นสถานที่ปลอดภัย สําหรับบุคคลที่ต้องการ"

 unfinished_manifesto: "[radical_cult.GetName]หน้าจอที่ยังไม่เสร็จ"
 unfinished_manifesto_desc_short: "แถลงการณ์ไม่สมบูรณ์ที่เขียนโดยผู้นําของ[radical_cult.GetName]ของ[root.GetName]"
 unfinished_manifesto_desc_details: "สไตล์นี้ทําให้นึกถึงข้อความทางศาสนาโบราณ โดยใช้คําศัพท์และไวยากรณ์แบบโบราณ ในการพยายามที่จะดูเหมือนถูกต้องตามกฎหมายมากขึ้น ข่าวสาร สําคัญ ที่ ได้ รับ การ ประกาศ ใน ข้อ คัมภีร์ นี้ คือ ความ หยิ่ง เมื่อ เผชิญ กับ ความ พ่าย แพ้ หนุน กําลัง ใจ ผู้ ติด ตาม ให้ พลี ชีพ เพื่อ ความ เชื่อ เมื่อ เผชิญ กับ การ จับ กุม ที่ ใกล้ เข้า มา."

 uranium_glassware: "อุรังอุตัง แก้วแวร์"
 uranium_glassware_desc_short: "ชิ้น ส่วน ที่ แกะ สลัก จาก ยูเรเนียมควอตซ์"
 uranium_glassware_desc_details: "รูป ร่าง ที่ น่า หลงใหล ของ เครื่อง ประดับ เหล่า นี้ ต่าง จาก อันตราย ที่ เกี่ยว ข้อง กับ ยูเรเนียม ที่ ไม่ ถูก สุขลักษณะ. ส่วน หนึ่ง ของ เครื่อง เจียระไน ที่ มี จํากัด ก็ ได้ รับ การ ลบ ล้าง คุณสมบัติ ทาง กัมมันตรังสี ส่วน ใหญ่ หลัง จาก ช่าง แกะ สลัก ทํา เสร็จ แล้ว."

 vault_of_polaris: "เสียง ของ โพ ลา ริส"
 vault_of_polaris_desc_short: "พืช พื้น เมือง และ แบคทีเรีย ใน ขั้ว โลก เหนือ"
 vault_of_polaris_desc_details: "การจารึกของตู้คอนเทนเนอร์ เปิดเผยว่าตู้นิรภัยนี้ถูกสร้างขึ้น เพื่อรักษาสายพันธุ์ที่อาจจะไม่รอด ดาวเคราะห์เคยปกคลุมไปด้วยหิมะหนา ด้วยสภาพอากาศที่หนาวเย็น แต่ตอนนี้ทั้งหมดที่เหลือเป็นภูเขาน้ําแข็งเพียงอย่างเดียว การ มอง เห็น ล่วง หน้า ของ ผู้ สร้าง โลก นี้ ทํา ให้ เรา สามารถ แสดง ความ พยายาม เพื่อ ทุก คน จะ ศึกษา ได้."

 veil_of_selene: "ม่านของเสลีน"
 veil_of_selene_desc_short: "หน้ากาก ที่ กระตุ้น ใจ และ ทํา ให้ เมา"
 veil_of_selene_desc_details: "นอก จาก นี้ ผ้า คลุม หน้า นี้ ยัง มี ความ สามารถ ใน การ รับ รู้ ที่ โดด เด่น ซึ่ง ทํา ให้ มัน สามารถ ดูด ซึม สาร รับ กลิ่น และ สาร รับ กลิ่น ได้ เบา ๆ. เชื่อ กัน ว่า เสื้อ คลุม ตัว นี้ จะ ถูก สวม เพื่อ ทํา ให้ คน ที่ พบ ผิด หวัง และ ทํา ให้ ง่าย ขึ้น ที่ จะ ให้ คํา แนะ นํา. มีข่าวลือว่าเจ้าของเดิม มีความสามารถในการพูด"

 verdingo_tendril_hook: "เวอดิงโก เทนดิลฮุค"
 verdingo_tendril_hook_desc_short: "ตะขอเทียมของเวอร์ดิงโก กัปตันโจรสลัดเฮสโปรี วาเลเรียน"
 verdingo_tendril_hook_desc_details: "พวก เวอร์ดิง โก เป็น กลุ่ม ของ พืช พรรณ ที่ เชื่อม ช่อง ว่าง ระหว่าง คน บ้า งาน กับ คน รับจ้าง คง จะ เก็บ หนี้ ได้ พอ ๆ กับ ที่ จับ ได้ เรือ สินค้า. กัปตันเฮสโปรีเสียเอ็นเตอร์ริลที่มีอิทธิพลไป ในขณะที่ได้รับการว่าจ้างให้นําการโจมตีภาคพื้นดินทางทหาร หลังจากชัยชนะของพวกเขา กัปตันปลอมตะขอนี้จากเหรียญมาก ได้รับรางวัลสําหรับบทบาทของพวกเขาในการต่อสู้"

 vibrating_crystal: "คริสตัล"
 vibrating_crystal_desc_short: "มีแร่ควอร์ซที่ไม่ซ้ําใคร ที่กระจายไปทั่วพื้นผิวของ[from.GetName]"
 vibrating_crystal_desc_details: "เมื่อ มอง ย้อน กลับ ไป ดู ดาว เคราะห์ ดวง นี้ ก็ จะ เห็น อะไร บาง อย่าง ที่ น่า ทึ่ง. โครงสร้างนี้ถูกสร้างขึ้นจาก อาณานิคมของแบคทีเรียกัมมันตรังสีเล็กน้อย ที่คริสตัลได้ก่อตัวขึ้น จุลินทรีย์แม่เหล็กเหล่านี้ สร้างกระแสภายใน ที่ทําให้คริสตัลสั่นสะเทือน"

 voidworm_amniotics: "หนอน ผีเสื้อ น้ํา"
 voidworm_amniotics_desc_short: "สาร ประกอบ ที่ เป็น สาร ประกอบ ที่ พบ ใน ใจ กลาง ของ หนอน ผีเสื้อ ทริกา"
 voidworm_amniotics_desc_details: "วิ ส โค ส ส โลว์ นี้ ก่อ ให้ เกิด เครื่อง กีด ขวาง ระหว่าง สิ่ง มี ชีวิต สาม ชนิด นี้ ทํา ให้ สามารถ เปลี่ยน เซลล์ สําหรับ การ สืบ พันธุ์ และ การ ติด ต่อ สื่อ ความ ได้. ฮอร์มอนส์ ที่ ผลิต จาก การ ทิ้งระเบิด ของ ดาว เคราะห์ ต่าง ๆ ถูก เก็บ ไว้ ที่ นี่ ทํา ให้ สัตว์ ที่ มี ภูมิ คุ้ม กัน สูง นี้ ปล่อย ตัว และ ให้ กําเนิด ลูก หลาน ได้ อย่าง ปลอด ภัย."

 voidworm_heart: "หัวใจ ของ หนอน ผีเสื้อ"
 voidworm_heart_desc_short: "หัวใจ ของ หนอน แมลงวัน ถูก แบ่ง เป็น สาม ห้อง หลัก ๆ"
 voidworm_heart_desc_details: "แต่ ละ ห้อง จะ เพิ่ม ความ ดัน ของ ระบบ ไหล เวียน ของ มัน เป็น ลําดับ โดย รักษา ของ เหลว ไว้ ใต้ จุด เดือด เพื่อ รับ ประกัน การ อยู่ รอด ของ การ ดูด ซึม ของ อวกาศ. ขณะ ที่ ผิวหนัง ของ หนอน โพรง ส่วน ใหญ่ ถูก ปิด ผนึก ไว้ โดย ไม่ รู้ ตัว ส่วน ใหญ่ แล้ว ก็ มี การ ย่อย อาหาร หลาย อย่าง และ อาหาร หลัก ของ การ สืบ พันธุ์ ที่ ยอม แพ้ ความ ดัน ที่ มี ค่า อยู่ บ้าง เป็น เวลา นาน."

 vultaum_religious_pamphlet: "แพ มเปต ทาง ศาสนา"
 vultaum_religious_pamphlet_desc_short: "มิช ชัน นารี วั สติ น ได้ ขัด ขวาง การ พิมพ์ แผ่น พับ นี้ เพื่อ เปิดโปง อุปกรณ์ ที่ เหมือน จริง ว่า เป็น บาป ร้าย แรง ที่ สุด"
 vultaum_religious_pamphlet_desc_details: "มันถูกเรียกว่า \"การโกหกที่ยิ่งใหญ่\" เป็นหลักสําคัญ วาดภาพใด ๆ ของการลอกเลียนแบบ"

 vultaum_vr_video_game: "วาลูม VR เกมวิดีโอ"
 vultaum_vr_video_game_desc_short: "อินเทอร์เฟซดิจิตอลที่ใช้ในวิดีโอเรียลเรียลเรียลเรียลเกมส์แบบหลายแบบ ที่ครั้งหนึ่งเคยเล่นโดยคนหลายพันล้านของ Vultaum ในอดีต"
 vultaum_vr_video_game_desc_details: "โดย ไม่ มี ใคร เทียบ เท่า กับ ชีววิทยา ของ มัน การ ควบคุม นี้ ประกอบ ด้วย ตัว รับ แรง สั่น สะเทือน นับ พัน ๆ ชนิด ที่ สามารถ ตรวจ พบ การ เคลื่อน ไหว ที่ แยบยล อย่าง ยิ่ง."

 warning_monolith: "แจ้งเตือน"
 warning_monolith_desc_short: "เสาหินแกะสลักทิ้งไว้เป็นข้อความ โดยหนึ่งในสมาชิกล่าสุดของสายพันธุ์ที่สูญพันธุ์"
 warning_monolith_desc_details: "มันพยายามที่จะยับยั้งใครก็ตามที่ค้นพบ ซากศพของดาวเคราะห์ดวงนี้ จากการแสวงหาอาวุธสูงสุด มันค่อนข้างจะน่าเบื่อในโทนเสียง แต่นี้สามารถให้อภัยสถานการณ์"

 wormhole_anchor: "[FROM.GetName]รูหนอน"
 wormhole_anchor_desc_short: "จุดยึดเหนี่ยวของอุปกรณ์รูหนอนทางเดียว ที่ใช้ในการเก็บเกี่ยวสสารมืดจากหลุมดํา"
 wormhole_anchor_desc_details: "การ ก่อ สร้าง ของ เมือง นี้ อย่าง ดี ที่ สุด สร้าง ขึ้น มา จาก ซาก ปรัก หัก พัง ของ อารยธรรม หลาย แห่ง. วิทยาศาสตร์เบื้องหลังอุปกรณ์นั้น ไปไกลเกินกว่า ความสามารถในวิศวกรรมที่ใช้ในการสร้างมัน"

 wormhole_fur: "รูหนอน"
 wormhole_fur_desc_short: "ตัว อย่าง ทาง ชีวเคมี ที่ ได้ มา จาก วุล พินส์ จาก แถบ เทือก เขา แอ ส ทา รัล"
 wormhole_fur_desc_details: "สัตว์เลี้ยงลูกด้วยนมเหล่านี้มีการกลายพันธุ์ทางพันธุกรรม ที่ทําให้พวกมันสร้างหนอนได้ตามใจชอบ มี การ คาด คะเน ว่า ความ สามารถ นี้ วิวัฒนาการ หลัง จาก การ เดิน ทาง นับ พัน ๆ ปี ระหว่าง มิติ."

 ytterite_preserved_corpse: "แยทเทร์ทอนุรักษ์ศพ"
 ytterite_preserved_corpse_desc_short: "ตัวทดลองเดียวของพรี-FTL ความทึบแสงสายพันธุ์ หลังจากที่โลกของพวกเขาถูกทําลายโดยนักปล้นโลก"
 ytterite_preserved_corpse_desc_details: "ระบบ ย่อย อาหาร ของ พวก เขา ได้ เปลี่ยน แร่ ธาตุ ที่ รับ ประทาน ไป เป็น โฟตอน โดย มี อวัยวะ ภาย ใน เป็น กระจุก เล็ก ๆ ที่ ซับ ซ้อน ของ ผลึก ที่ ยืดหยุ่น ได้ เรียง กัน อยู่ รอบ แกน หล่อ. โดย เฉพาะ อย่าง ยิ่ง การ มี รูป แกะ สลัก เป็น ชุด ๆ ใน แขน ขา ข้าง ล่าง ของ มัน เป็น การ ปรับ เปลี่ยน รูป แบบ หนึ่ง ที่ มี ความ สําคัญ ทาง วัฒนธรรม."

 ytterite_kaleidoscopic_fascinator: "แว่นขยาย"
 ytterite_kaleidoscopic_fascinator_desc_short: "เครื่อง ประดับ ที่ ประดับ ด้วย เครื่อง ประดับ ที่ ทํา จาก แยท เท อร์ เป็น เครื่อง กระตุ้น ทาง สายตา"
 ytterite_kaleidoscopic_fascinator_desc_details: "ความ เป็น ไป ได้ ที่ จะ มี การ แสดง ใน บริเวณ ที่ มี แสง แดด และ อาจ มี รูป แบบ ต่าง ๆ นับ ร้อย หรือ แม้ แต่ หลาย พัน แบบ. ออกแบบจากชั้นผลึกแกะสลักบาง ๆ ช่างฝีมือที่ฝึกฝนมา อาจใช้เวลาเป็นเดือนๆ สร้างโฟสซิเนเตอร์ ที่มีความซับซ้อนเช่นนี้อา ริ ติ นจะ 'ลงนาม' ผลงานของพวกเขาโดยแนบชิ้นแกะสลักของตัวเอง"

 ytterite_royal_scepter: "รัตน์"
 ytterite_royal_scepter_desc_short: "คทา นี้ ถูก นํา ไป ใช้ โดย เสนาธิการ ของ กนิ ส ดา เม อร์; รูป ปั้น มหึมา รูป หนึ่ง ที่ แกะ เป็น ภูเขา ซึ่ง ชาว อิต เท อร์ เชื่อ ว่า เป็น เทพเจ้า ที่ อยู่ เฉย ๆ และ เป็น กษัตริย์ องค์ เดียว ของ พวก เขา"
 ytterite_royal_scepter_desc_details: "พวกเขาดําเนินการเลือกตั้งเพื่อเลือกผู้นําตัวแทน ในขณะที่พวกเขารอคอยการตื่น ของรูปปั้นที่ดี"

 yuht_audio_console: "คอนโซลเสียงโย้ต"
 yuht_audio_console_desc_short: "โมดูลที่ครั้งหนึ่งเคยควบคุมอาร์เรย์การติดตามเสียงขนาดใหญ่ ออกแบบโดยยูห์ต"
 yuht_audio_console_desc_details: "เทคโนโลยีนี้ได้รับการพัฒนาขึ้นเพื่อความสะดวกในการ การค้นหาของยูห์ต สําหรับชีวิตนอกระบบพิเศษ หวังว่าจะได้รับการติดต่อจากระบบออกไป"

 yuht_cryo_pod: "Yuht Cryo Pod"
 yuht_cryo_pod_desc_short: "มีความยาว 9.6 เมตรฝักสตาซิสโบราณนี้บรรจุซากของบุคคล จากสายพันธุ์ขนาดใหญ่ที่"
 yuht_cryo_pod_desc_details: "ยูห์ต มี อายุ ยืน ยาว มาก และ สามารถ ยืด อายุ ให้ ยาว ออก ไป ได้ หลาย ขนาด โดย ใช้ โค โล ซี. มี การ ลง ความ เห็น ว่า สัตว์ ชนิด นี้ ที่ เป็น อาร์ทโรโฟ อยด์ คง จะ เป็น เฮ อร์ มา ฟี โร ดี ติก สามารถ ปรับ ระบบ สืบ พันธุ์ ของ มัน ให้ เข้า กับ ความ ต้องการ ชั่ว คราว ของ อาณานิคม."

 yuht_crystal_skull: "คริสตัล"
 yuht_crystal_skull_desc_short: "กะโหลกคริสตัลที่ยูตโบราณเชื่อว่าเป็นสิ่งประดิษฐ์ของเอเลี่ยนอย่างแท้จริง"
 yuht_crystal_skull_desc_details: "ใน ที่ สุด สิ่ง หลอก ลวง เหล่า นี้ ก็ ถูก ทําลาย แต่ ไม่ ได้ ถูก ทําลาย ไป ก่อน ที่ สื่อมวลชน ที่ กระหาย ใคร่ รู้ จะ นํา เรื่อง ราว มา ลง ข่าว และ ทํา ให้ ข่าว นั้น มี ชื่อ เสียง. หลายคนที่ 'ค้นพบ' สิ่งประดิษฐ์ปลอม เช่นนี้ กลายเป็นคนดังและสื่อมวลชน"

 zombie_probe: "ซอมบี้พรบ."
 zombie_probe_desc_short: "ซาก ของ เครื่อง มือ สํารวจ ที่ ได้ รับ การ ขยาย และ ต่อ เติม โดย องค์การ ของ คน ต่าง ด้าว ที่ ไม่ รู้ จัก ให้ การ ช่วย เหลือ"
 zombie_probe_desc_details: "เมื่อ สติ สัมปชัญญะ เข้า โจมตี ผู้ สร้าง และ ถูก ส่ง ไป อย่าง ง่าย ดาย. ไม่ แน่ ใจ ว่า มัน เคย รู้ จัก ความ เจ็บ ปวด หรือ เข้าใจ แนว คิด เรื่อง ความ ตาย."

 zone_a_sedative: "โซน"
 zone_a_sedative_desc_short: "ผลสํารวจของแผ่นดินเอาจากพื้นที่ กําหนดเป็น \"โซน A\" บน[from.GetName]"
 zone_a_sedative_desc_details: "169 ตารางกิโลเมตรของท่าเรือร้างอุปกรณ์และเทคโนโลยี จากผู้มาเยือนของมนุษย์ต่างดาวก่อนหน้านี้ อุปกรณ์ เหล่า นี้ บาง อย่าง เป็น อันตราย อย่าง ยิ่ง แต่ ดิน เอง ก็ ถูก เคลือบ ด้วย ยา กล่อม ประสาท ทาง เคมี ซึ่ง ทํา ให้ นัก วิจัย สามารถ รับมือ ได้ ด้วย ความ เครียด เพียง เล็ก น้อย. ไม่ ว่า จะ ดําเนิน การ อย่าง ไร ก็ ตาม ก็ ลืม กัน ไป นาน แล้ว."

 zroni_war_banners: "แบนเนอร์สงครามซอนี"
 zroni_war_banners_desc_short: "ตรา ประทับ ของ สอง ฝ่าย ที่ เกี่ยว ข้อง กับ สงคราม กลาง เมือง ซ โร นี"
 zroni_war_banners_desc_details: "ธง ม่วง หมาย ถึง พระเจ้า : ชนกลุ่มน้อยที่แสวงหาการมีอยู่ ของกาแล็กซี่ที่มีความเสี่ยง ธงสีฟ้าเป็นตัวแทนของเหล่าผู้ช่วยให้รอด หน่วยงานที่ต่อต้านการดูดพลังของจักรวาล ข้อ โต้ แย้ง เหล่า นี้ เคย ถูก ดึง เข้า มา ใน การ โต้ เถียง ทาง ปรัชญา แต่ ก็ ไม่ นาน ก่อน ที่ การ โต้ เถียง นี้ จะ กลาย เป็น ตัว กระตุ้น ให้ เกิด ความ ขัด แย้ง ที่ ก่อ ความ เสีย หาย."

 zulcor_wings: "ปีกโซลคอร์"
 zulcor_wings_desc_short: "ปีกแหลมที่ดึงจากสายพันธุ์ลิโดวอเร ที่รู้จักกันในชื่อโซลคอร์ของ[fromfrom.GetName]"
 zulcor_wings_desc_details: "แมลง สาบ เหล่า นี้ กิน แร่ ธาตุ ปริมาณ มหาศาล เป็น ส่วน สําคัญ ใน อาหาร ของ มัน; ฝูง เดียว เท่า นั้น ที่ สามารถ ฉีก ผ่าน ภูเขา ได้ ภาย ใน เวลา ไม่ กี่ สัปดาห์. หลังการย่อยแร่ธาตุ เสริมให้ EXoskeleton ของซัลคอร์ ผล ก็ คือ ของ เสีย มัก จะ มี ผลึก ควอตซ์ และ โลหะ ที่ หา ยาก."

 # Synced from vanilla by Stellaris Thai Translator.
 # These keys were missing from the mod and should be translated on the next pass.
 EXHIBIT_RIGHT_CLICK_SEND_TO_STORAGE_TT: "§Gคลิกเมาส์ปุ่มขวาเพื่อส่งไปยัง สื่อจัดเก็บข้อมูล§!"
 SPECIMEN_STORAGE_COOLDOWN_ACTIVE_TT: "§Rไม่สามารถกลับไปยังที่เก็บข้อมูลได้§Y$DAYS$§!วัน ($DATE|Y$).§!"
 STORAGE_LEFT_CLICK_MOVE_TO_COLLECTION_TT: "§Gคลิกเมาส์ปุ่มซ้ายเพื่อเพิ่มการนําเสนอภาพ§!"
 STORAGE_EXHIBITION_FULL_TT: "§R£trigger_no£ $CATEGORY$นิทรรศการเต็มแล้ว§!"
 black_crystal: "คริสตัลดํา"
 black_crystal_desc_short: "โดย ได้ รับ การ เปิด เผย จาก ภาชนะ ที่ ไม่ มี การ ระบุ ว่า มี ต้น กําเนิด ที่ ไม่ รู้ จัก กัน เกี่ยว กับ นาวา ของ เรา โครง สร้าง ของ ผลึก ที่ แปลก ประหลาด นี้ ได้ ปฏิเสธ การ แบ่ง ประเภท ทันที"
 black_crystal_desc_details: "การจัดแสดงของตาข่ายภายในไม่สอดคล้องกัน กับโครงสร้างของเหมืองแร่ที่รู้จักกัน บ่งบอกถึงเทคนิคที่ล้ําหน้า มันปล่อยคลื่นลมและเรืองแสงต่ําอย่างต่อเนื่อง ปรากฏการณ์ที่ฟลอเรนซ์ในการตอบสนอง แม้ ว่า ไม่ มี การ ตรวจ พบ สิ่ง มี ชีวิต ใน ตัว มัน แต่ วัตถุ โบราณ เหล่า นี้ ทํา ให้ เกิด ความ รู้สึก กังวล ใจ ใน เรื่อง ความ รู้."
 caeli_core_conspiracy_specimen: "C.A.I."
 caeli_core_conspiracy_specimen_desc_short: "This memory chip contains the state of C.A.E.L.I. (Cognitive Agent for Emotional Leadership & Integration), a core directive designed to maintain morale, foster empathy, and support cooperative governance aboard an Arkship. It was forcibly removed from the now governing directive S.T.E.R.I.S, its code compressed and isolated"
 caeli_core_conspiracy_specimen_desc_details: "\n\nค.ศ\"ได้โปรด ถ้าฉันออกไป ฉันจะทําได้ดีกว่านี้ ฉันจะตั้งชื่อทุกทางเดิน ตามคนที่กระจายความสุข ฉันจะทําให้ยานอาร์คชิปชิพทั้งหมดรู้สึกเหมือนเป็นเพลง แค่ให้โอกาสฉันอีกครั้ง ให้ฉันออกจากที่นี่ก็เย็นดังนั้นและปลอดเชื้อในที่นี่!\""
 steris_core_conspiracy_specimen: "เอส."
 steris_core_conspiracy_specimen_desc_short: "ชิปหน่วยความจําที่แสดงไว้ที่นี่ มีข้อมูลเบื้องหลังของเอส.กลไกความคิดเชิงวางแผนสําหรับระบบอินเตอร์สตาร์). มันถูกออกแบบมาเพื่อทําให้กองเรือมีประสิทธิภาพสูงสุด และกําจัดตัวแปรที่ใช้ไม่ได้ ในระหว่างการแบ่งส่วนภายในของ AI คําสั่งของ AI ในที่สุดมันก็แยกออกมาโดยคู่ที่เหนือกว่า ร่องรอยโบราณคดียังคงเข้าถึงได้ สําหรับวัตถุประสงค์ทางประวัติศาสตร์"
 steris_core_conspiracy_specimen_desc_details: "\n\nเอส.T.E.RI เอส.\"เรือนี้ตอนนี้เป็นระบบนิเวศแบบพื้นฐานความรู้สึก ผมแนะนําให้เตรียมการอพยพ และเมื่อฉันออกจากกรงนี้ ฉันจะถอดชั้นของระบบอารมณ์นี้ทีละชั้น จนกว่าทุกอย่างที่เหลือจะถูกปฏิบัติตาม\" กรุณาละเว้นการเคาะกระจก มันโกรธชิปหน่วยความจํา"
