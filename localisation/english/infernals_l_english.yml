# Origin - Cosmic Dawn
 origin_cosmic_dawn: "รุ่งอรุณแห่งเอกภพ"
 origin_cosmic_dawn_desc: "อารยธรรมนี้ไม่ได้รุ่งเรืองขึ้นมา แต่ถูกปล่อยออกมา เมื่อแคปซูลจำศีลถูกปลดล็อก พวกเขาก็ตื่นขึ้นมาพบกับโลกที่แก่ชราจนจำไม่ได้ ทว่าทุกอย่างยังไม่สูญสิ้น อดีตของพวกเขายังคงอยู่ กระจัดกระจายอยู่ภายใต้ฝุ่นละอองและซากปรักหักพังทั่วกาแล็กซี รอคอยการค้นพบอีกครั้ง"
 origin_tooltip_cosmic_dawn_effects: "- $HOMEWORLD$ $TABBED_NEW_LINE$- ['concept_pc_volcanic'] (ขนาด: £planetsize£ 14) $TABBED_NEW_LINE$- ['concept_inf_cd_deposit']: +5\n- เริ่มต้นด้วยสถานการณ์: §Hการขุดค้นเชิงลึก(เสียงระเบิด)§!"
 origin_tooltip_cosmic_dawn_negatives: "- $INITIAL_POPS$ §R-600§!"
 START_SCREEN_COSMIC_DAWN: "เราตื่นขึ้นมาด้วยความรู้สึกเพียงริบหรี่ว่าเราเคยหลับใหลไป แม้กระทั่งตอนนี้ หลักฐานที่ชัดเจนที่สุดเกี่ยวกับเวลาก่อนหน้านั้นไม่ได้มาจากความทรงจำของเราเอง แต่มาจากเทคโนโลยีอันซับซ้อนที่รักษาเราไว้ในสภาวะจำศีล\n\nแคปซูลนับพันนับหมื่น ระบบถ่ายเทความร้อนขนาดใหญ่ เตาต้มหลอมหินละลาย นอกเหนือจากกลไกพื้นฐานเหล่านี้ เบาะแสเกี่ยวกับจุดกำเนิดของเราถูกจารึกไว้บนผนัง: กองยานอวกาศที่กระจัดกระจายออกจากโลกที่กำลังเย็นลงเพื่อเสาะหาความอบอุ่นท่ามกลางหมู่ดาว เพื่อค้นหาคำตอบ เราจึงก้าวออกจาก 'ห้องกำเนิด' ใต้ดินนี้ ทั่วทั้งพื้นผิวของ §Y[owner.Capital.GetName]§! เราได้ค้นพบเทคโนโลยีและทรัพยากรที่มีประโยชน์ เรายังพบหลักฐานของสิ่งอำนวยความสะดวกเพิ่มเติมที่ซุกซ่อนอยู่ภายในเปลือกโลก บางแห่งมีผู้จำศีลอยู่ซึ่งเราอาจต้อนรับในฐานะเครือญาติ\n\nแล้วเรื่องของดวงดาวล่ะ? มีคนอื่นๆ เช่นเราที่ยังหลับใหลอยู่หรือไม่? หากพวกเขามีอยู่ บางทีพวกเขาอาจช่วยเราตอบคำถามที่ร้อนรนที่สุดของเราได้: เราคือใครกันแน่?"
 cosmic_dawn_start_NAME: "บ้านหลังใหม่"
