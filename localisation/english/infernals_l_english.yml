 d_ash_storms: "£blocker£ พายุเถ้าภูเขาไฟ"
 d_ash_storms_desc: "ภูมิภาคนี้ถูกห้อมล้อมไปด้วยกลุ่มเมฆเถ้าถ่านที่หายใจไม่ออก"
 d_charged_atmosphere: "£blocker£ ชั้นบรรยากาศที่มีประจุไฟฟ้า"
 d_charged_atmosphere_desc: "อากาศในบริเวณนี้เกิดประกายไฟที่มีพลังงานอันตรายและกระตุ้นการทำงาน"
 d_lava_flooding: "£blocker£ อุทกภัยลาวาตามฤดูกาล"
 d_lava_flooding_desc: "ภูมิภาคนี้แสดงให้เห็นปรากฏการณ์ลาวาหลากท่วมท้นตามฤดูกาล"
 d_toxic_atmosphere: "£blocker£ ชั้นบรรยากาศเป็นพิษ"
 d_toxic_atmosphere_desc: "ชั้นบรรยากาศของภูมิภาคนี้แทบไม่สามารถหายใจได้ มีเพียงผู้ที่แข็งแกร่งที่สุดเท่านั้นที่จะรอดชีวิต"
 d_raging_lavafalls: "£blocker£ น้ำตกลาวาอันเชี่ยวกราก"
 d_raging_lavafalls_desc: "น้ำตกไหลหลั่งของลาวาหลอมละลายเหล่านี้เป็นภาพที่น่าตื่นตาตื่นใจขณะไหลผ่านแนวโขดหินภูมิประเทศ"
 d_rugged_landscape: "£blocker£ ภูมิประเทศทุรกันดาร"
