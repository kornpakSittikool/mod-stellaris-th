 d_stasis_pods_desc: "แคปซูลจำศีลเหล่านี้เป็นอุปกรณ์โบราณจากเครือญาติที่สาบสูญของเรา โดยใช้เทคโนโลยีแช่แข็งขั้นสูงเพื่อรักษาปัจเจกบุคคลไว้ในสภาวะระงับการทำงาน ด้วยเทคโนโลยีที่ถูกต้อง เราอาจสามารถปลุกพวกเขาให้ตื่นขึ้นได้"
