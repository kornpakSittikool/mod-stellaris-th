 councilor_corporate_thermal_engineer_desc: "ด้วยการจ่ายค่าตอบแทนที่เหมาะสม ผู้ดำรงตำแหน่ง $TITLE$ จะสามารถแก้ปัญหาความท้าทายทางเทคนิคที่พบระหว่างสร้างโครงสร้างพื้นฐานในสภาพแวดล้อมที่ร้อนจัดอย่างยิ่ง"
 councilor_pyromanic_priest: "นักบวชคลั่งอัคคี"
 councilor_pyromanic_priest_desc: "ผู้ดำรงตำแหน่ง $TITLE$ ปลูกฝังความรักในความยากลำบาก ส่งผลให้ลดการบริโภคฟุ่มเฟือยฟุ้งเฟ้อ"
 councilor_imbuement_officer: "ผู้ควบคุมการจำแลง"
 councilor_imbuement_officer_desc: "ผู้ดำรงตำแหน่ง $TITLE$ ใช้ความเชี่ยวชาญด้านของแข็งแปรผันในการสนับสนุนการวิจัยทางฟิสิกส์และวิศวกรรม"
 councilor_synth_imbuement_officer: "เมนเฟรมจำลองรูปร่าง"
