 d_volcanic_tunnels: "อุโมงค์แยกตัว"
 d_volcanic_tunnels_desc: "อุโมงค์ยาวกลวงที่คดเคี้ยวผ่านภูเขา ผนังของมันถูกเผาไหม้และขัดเกลาจนเรียบโดยธารแมกมาโบราณ"

