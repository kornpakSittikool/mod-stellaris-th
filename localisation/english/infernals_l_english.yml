 INFERNALS_TITLE: "Infernals Species Pack" # Do not translate

 vo_infernal_voice: "เธอร์โมไฟล์"
# Traits
 trait_pc_volcanic_preference: "ความชอบดาวภูเขาไฟ"
 trait_pc_volcanic_preference_short: "ภูเขาไฟ"
 trait_pc_volcanic_preference_desc: "$trait_pc_savannah_preference_desc$"
 trait_volcanic_planet_preference: "$trait_pc_volcanic_preference$" #robotic
 trait_volcanic_planet_preference_desc: "$trait_dry_planet_preference_desc$" #robotic
 trait_infernal: "เธอร์โมไฟล์"
 trait_infernal_plural: "เธอร์โมไฟล์"
 trait_infernal_desc: "เผ่าพันธุ์นี้มีวิวัฒนาการเนื้อเยื่อที่เป็นโลหะผสมเพื่อให้เติบโตและเจริญเติบโตบนดาวเคราะห์ที่ร้อนระอุ ซึ่งสิ่งมีชีวิตอินทรีย์ทั่วไปจะถูกแผดเผาจนสุก เซลล์ผสมโลหะเหล่านี้เสื่อมสภาพช้ากว่าและไม่ค่อยมีการเปลี่ยนทดแทนบ่อยนัก ช่วยชะลอการเกิดโรคที่เกี่ยวข้องกับอายุ พวกมันยังนำความเย็น ซึ่งอาจเป็นอันตรายต่อสุขภาพในสภาพภูมิอากาศที่หนาวเย็นกว่า"
 TRAIT_INFERNAL_EFFECT: "ค่าบำรุงรักษา $r_alloys$ ต่อ $pop_group_unit$ ประชากร £pop£: §R+$@living_standard_alloys_normal$§!$TABBED_NEW_LINE$- $pc_volcanic$ $HABITABILITY$: §G+20%§! $TABBED_NEW_LINE$- $HABITABILITY$ ขั้นต่ำ (§H$pc_volcanic$§!): §Y+50%§! $TABBED_NEW_LINE$- $HABITABILITY$ บนโลก§Yหนาวเย็น§!: §R-30%§! $TABBED_NEW_LINE$- อายุขัยผู้นำ: §G+10 ปี§!"

 trait_unbreakable_resolve: "ปณิธานแกร่งกล้า"
 trait_unbreakable_resolve_desc: "ด้วยความผูกพันผ่านเครือข่ายใยประสาทเงาสะท้อน(เซลล์ประสาทหัวใจ)ที่ซับซ้อน ปัจเจกบุคคลเหล่านี้มีความสามารถตามธรรมชาติในการประสานเจตจำนงของตนเข้าด้วยกัน หน้าที่จึงไม่ใช่ภาระ แต่เป็นเป้าหมายร่วมกัน และความยากลำบากก็เผชิญได้ด้วยความสามัคคีอันแน่วแน่"
 trait_unbreakable_resolve_tooltip: "ทุกๆ $pop_group_unit$ £pop£ §Hประชากร§! บนดาวเคราะห์ที่มีคุณลักษณะนี้จะช่วยเพิ่ม §G+0.2§! £stability£ $PLANET_STABILITY_TITLE$ (สูงสุด: §G+15§!) \n- §Rไม่รวมทาสหรือชนชั้นประชากรระดับล่าง§!"

 trait_shell_slag: "เปลือกตะกรัน"
 trait_shell_slag_desc: "การพึ่งพาอาศัยกันอย่างซับซ้อนกับ $r_living_metal$ ช่วยให้เผ่าพันธุ์นี้เติบโตไม่ใช่ในความหมายดั้งเดิม แต่ผ่านการพอกพูนและการประกอบตัวเองของโครงสร้างเหล็กชีวภาพ(บิโอ-เฟอร์รู)"
 trait_shell_slag_tooltip: "ทุกๆ $pop_group_unit$ £pop£ §Hประชากร§! ที่มีคุณลักษณะนี้ซึ่งทำงานเป็นทาสหรือสูงกว่า จะผลิต §G$@shell_slag_trait_resource_production|3$§! §Y$r_living_metal$§! ต่อเดือน"
 trait_robot_assembly_slag: "ตะกรันประกอบชิ้นส่วน"
 trait_robot_assembly_slag_desc: "การบูรณาการที่ซับซ้อนของ $r_living_metal$ ช่วยให้เผ่าพันธุ์จักรกลนี้ขยายขนาดขึ้นไม่ใช่ผ่านการสร้างแบบดั้งเดิม แต่ผ่านการพอกพูนและการประกอบตัวเองของโครงข่ายเหล็กอัตโนมัติ(เสียงอัตโนมัติ)"

 trait_pyroclastic: "การชี้นำพลังงานไพโรคลาสติก"
 trait_pyroclastic_desc: "ด้วยการหล่อหลอมจากความพิโรธอย่างไม่ลดละของโลกภูเขาไฟ เผ่าพันธุ์นี้ไม่เกรงกลัวต่อพลังงานไพโรคลาสติก - พวกมันชี้นำและจัดการกับมัน เปลี่ยนแปลงความพินาศให้กลายเป็นแหล่งหล่อเลี้ยงและพลังงานที่สำคัญ"
 trait_pyroclastic_tooltip: "$MOD_LOGISTIC_GROWTH_MULT$ บน $pc_volcanic_plural$: §G+10%§!"

 trait_crucible_community: "ชุมชนเบ้าหลอม"
 trait_crucible_community_desc: "ด้วยการบ่มเพาะจากความยากลำบากและผูกพันด้วยการดิ้นรนร่วมกัน เผ่าพันธุ์นี้ได้รับการตีเหล็กจนกลายเป็นหนึ่งเดียวที่ไม่มีวันแตกสลาย เจตจำนงร่วมกันของพวกเขากระตุ้นการปกครอง โดยสมาชิกแต่ละคนเป็นข้อต่อที่สำคัญในโซ่แห่งความสามัคคี"
 trait_crucible_community_tooltip: "ทุกๆ $pop_group_unit$ £pop£ §Hประชากร§! ที่มีคุณลักษณะนี้จะเพิ่ม §G+0.25§! §Y$MOD_COUNTRY_EDICT_FUND_ADD$§!"

 trait_ductile: "ดัดเหนียว"
 trait_ductile_desc: "§Lเผ่าพันธุ์นี้ได้รับการดัดแปลงพันธุกรรมเพื่อให้เจริญเติบโตสารประกอบโลหะผสมที่นำกลับมาใช้ใหม่ได้§!\n"

# Volcanic World
 pc_volcanic: "โลกภูเขาไฟ"
