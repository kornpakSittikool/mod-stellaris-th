 councilor_corporate_imbuement_officer: "เจ้าหน้าที่ดูแลจำลองรูปร่าง"
 councilor_corporate_imbuement_officer_desc: "ผู้ดำรงตำแหน่ง $TITLE$ ประสานงานระหว่างผู้มีส่วนได้ส่วนเสียเพื่ออำนวยความสะดวกในการวิจัยทางฟิสิกส์และวิศวกรรม"

# Bombardment Stances
 bombardment_firestorm: "พายุเพลิง"
 bombardment_firestorm_desc: "การระดมยิงแบบพายุเพลิงจุดไฟเผาส่วนต่างๆ ของดาวเคราะห์ ทำหน้าที่เสมือนกองไฟอันเกรียงไกรที่ตอกย้ำความตั้งใจและสร้างความเป็นหนึ่งเดียวให้แก่สังคมเรา"
 bombardment_seismic_bombing: "การระดมทิ้งระเบิดปูพรมแผ่นดินไหว"
