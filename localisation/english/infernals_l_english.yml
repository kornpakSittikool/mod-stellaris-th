# Origin - Red Giant
 origin_red_giant: "ดาวยักษ์แดง"
 origin_red_giant_desc: "อารยธรรมนี้กำลังมาถึงทางแยก: ดาวยักษ์แดง ณ ใจกลางระบบกำลังทำให้ดาวเคราะห์ของพวกเขาร้อนขึ้นเรื่อยๆ จนเกรงว่าจะแผดเผาพวกเขาจนสุกทั้งเป็น\n\nพวกเขาจะสามารถปรับตัวได้จนกว่าจะพบสาเหตุและแก้ไขมัน หรือพวกเขาจะตัดสินใจยอมรับความร้อน และใช้ประโยชน์จากความเปลี่ยนแปลงอันแปลกประหลาดและดูเหมือนผิดธรรมชาตินี้?"
 origin_tooltip_red_giant_effects: "- $HOMEWORLD$ ['concept_pc_volcanic'] (ขนาด: £planetsize£ 20)"
 START_SCREEN_RED_GIANT: "ความจริงเผยออกมาอย่างช้าๆ แล้วก็เกิดขึ้นอย่างกะทันหันในคราวเดียว\n\nดาวฤกษ์ของเรากำลังเข้าสู่ช่วงวิวัฒนาการที่รวดเร็วและผิดปกติ พลังงานที่ปล่อยออกมาเพิ่มขึ้นเกินกว่าพารามิเตอร์ที่คาดการณ์ไว้ทั้งหมด การเปลี่ยนแถบสเปกตรัมบ่งบอกถึงรูปแบบการหมุนเวียนที่ผิดปกติ และอัตราการฟิวชันดูเหมือนจะเพิ่มขึ้นโดยไม่มีการสูญเสียมวลที่สอดคล้องกัน\n\nจนถึงปัจจุบัน เราได้วิวัฒนาการไปพร้อมกับการอุ่นเครื่องนี้ แต่การวิวัฒนาการทางชีวภาพขั้นพื้นฐานนั้นมีขีดจำกัด\n\nหากการเปลี่ยนแปลงที่กำลังดำเนินอยู่ภายใน [capital_star.GetName] ยังคงดำเนินต่อไป โลกที่เราเรียกว่าบ้านจะมอดไหม้ มันไม่ใช่คำถามที่ว่า จะเกิดหรือไม่ อีกต่อไป แต่เป็น เมื่อไหร่ ต่างหาก"
 red_giant_start_NAME: "ระบบดาวยักษ์แดง"
 red_giant_start_DESC: "นี่คือระบบเริ่มต้นที่รับประกันสำหรับอาณาจักรที่ใช้จุดกำเนิด §Y$origin_red_giant$§!"

 tech_starfire_cannon: "$starfire_cannon$"
 tech_starfire_cannon_desc: "เช่นเดียวกับภัยอันตรายที่อาจเกิดขึ้น รังสีที่เป็นอันตรายจากการแปรสภาพของดาวฤกษ์ของเราก็สามารถถูกควบคุมมาเป็นเครื่องมือที่เป็นประโยชน์ได้เช่นกัน การนำรังสีนั้นมาทำเป็นอาวุธลำแสงจะช่วยให้เราสามารถทำให้ยานของศัตรูร้อนจัดและใช้การไม่ได้ \n\nปลดล็อกคำตัดสินของดาวเคราะห์เพื่อสร้าง §Y$starfire_cannon$§! ในวงโคจร"
