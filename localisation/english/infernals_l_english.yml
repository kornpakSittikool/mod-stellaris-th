 d_seismic_bombing_crater: "£blocker£ ปล่องภูเขาไฟ"
 d_seismic_bombing_crater_desc: "ภูมิภาคนี้ถูกฉีกเปิดออกเป็นภูเขาไฟที่กำลังคุกรุ่นด้วยผลจากการระดมทิ้งระเบิดปูพรมแผ่นดินไหว"
