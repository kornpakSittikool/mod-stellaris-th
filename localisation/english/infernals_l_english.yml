 d_galvanic_living_metal: "ตะกอน $sr_living_metal$"
 d_galvanic_living_metal_desc: "ดาวเคราะห์ดวงนี้มีแหล่งแร่ $r_living_metal$ ตามธรรมชาติ เผ่าพันธุ์ของมันได้วิวัฒนาการโดยสัมผัสกับทรัพยากรที่น่าทึ่งนี้อย่างต่อเนื่อง ส่งผลให้พวกเขามีทิศทางทางชีวภาพและวิทยาศาสตร์ที่เป็นเอกลักษณ์เฉพาะตัว"

# Civic - Scorched World Heralds
 civic_scorched_earth: "ผู้นำสารแห่งโลกที่มอดไหม้"
 civic_scorched_earth_desc: "ความร้อนแทรกซึมอยู่ในทุกแง่มุมของวัฒนธรรมในสังคมนี้ ตั้งแต่ประเพณีและพิธีกรรมไปจนถึงตัวเทคโนโลยีเอง พวกเขามองว่าตนเองเป็นผู้มีอำนาจเหนือกว่าด้วยไฟอันชอบธรรมในกาแล็กซี และมองเผ่าพันธุ์ที่อ่อนแอกว่าว่าเป็นเพียงอุปสรรคบนเส้นทางสู่จักรวาลในอุดมคติ ซึ่งเหมาะสมสำหรับสิ่งมีชีวิตเทอร์โมไฟล์เท่านั้น"
 civic_scorched_earth_effects: "- ไม่สามารถทำ §Yการทูต(ภาษาไทย)§! ได้ ยกเว้นกับ §Y$trait_infernal_plural$§!.\n- ไม่สามารถเข้าถึง §Yตลาดกาแล็กซี(ตลาดกาแล็กซี่)§! ได้.\n- มอบสาเหตุแห่งสงคราม(คาซัส เบลลี)§Y'$casus_belli_cb_blaze$'§! ต่อเผ่าพันธุ์อื่น.\n- ได้รับ £unity£ §Y$unity$§! เมื่อทำการทิ้งระเบิดด้วยรูปแบบ §Y$bombardment_firestorm$§!.\n- สร้างสิ่งกีดขวางพิเศษด้วยรูปแบบการทิ้งระเบิด §Y$bombardment_seismic_bombing$§! บนดาวเคราะห์เบื้องล่าง. \n- เผ่าพันธุ์ที่ไม่ใช่ ['trait:trait_infernal'] จะถูกจำกัดไว้ที่ §Yการเป็นทาส(คร่ําครวญ)§! หรือแย่กว่านั้น."
 SCORCHED_HERALDS_ONLY_INF: "$TRIGGER_FAIL$§Y$civic_scorched_earth$§! ยอมรับเฉพาะประชากร £pop£ $POPS$ ที่เป็น ['trait:trait_infernal'] เท่านั้นในสังคมของพวกเขา."

 civic_hive_scorched_earth: "สัญชาตญาณคลั่งไฟ"
 civic_hive_scorched_earth_desc: "โลกที่มอดไหม้ของเราคือจุดสูงสุดของวิวัฒนาการดาวเคราะห์ เราจะจุดไฟเผากาแล็กซีและเจริญเติบโตในกองเพลิง!"

