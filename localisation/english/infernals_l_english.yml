 d_volcanic_ore_caverns_desc: "$d_ore_rich_caverns_desc$"
 d_volcanic_mineral_layers: "ชั้นแร่ภูเขาไฟ"
 d_volcanic_mineral_layers_desc: "กิจกรรมทางธรณีวิทยาโบราณได้ทิ้งชั้นแร่อันอุดมสมบูรณ์นี้ฝังลึกอยู่ใต้พื้นผิว"
 d_volcanic_weak_crust: "เปลือกโลกเปราะบาง"
 d_volcanic_weak_crust_desc: "แผ่นเปลือกโลกเบื้องล่างถูกบดขยี้จากการปะทุในอดีต ทำให้เจาะลึกเข้าไปยังสายแร่ที่อุดมสมบูรณ์ได้ง่ายขึ้นมาก"
