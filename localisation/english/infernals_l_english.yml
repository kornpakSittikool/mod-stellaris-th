 volcanic_asteroid_belt_desc: "$asteroid_belt_desc$"
 volcanic_crystal_lake: "ทะเลสาบคริสตัล"
 volcanic_crystal_lake_desc: "คริสตัลขนาดมหึมาที่สั่นสะเทือนด้วยความร้อนและแสงสว่างอันอบอุ่น ค่อยๆ ลอยตัวขึ้นจากบ่อลาวานี้"
 volcanic_hollow_planet: "ดาวเคราะห์กลวง"
 volcanic_hollow_planet_desc: "ภายใต้พื้นผิว ถ้ำขนาดใหญ่มหึมายังคงอยู่ เสียงสะท้อนของโลกที่หล่อหลอมด้วยเปลวไฟ"
 volcanic_lavafall: "น้ำตกลาวา"
 volcanic_lavafall_desc: "ลาวาไหลอย่างอิสระที่นี่ หลั่งไหลข้ามทางลาดชันในการแสดงแสงไฟตามธรรมชาติ"
 volcanic_oasis: "โอเอซิสโลกันตร์"
 volcanic_oasis_desc: "ทวีปสีเขียวขนาดเล็กที่ได้รับการปกป้องโดยทิวเขาสูงจากนรกอเวจีที่บ้าคลั่งภายนอก พืชและสัตว์ที่เป็นเอกลักษณ์ยืนเด่นตัดกับความอ้างว้างอันแห้งแล้งที่ตั้งอยู่เลยพ้นภูเขาไปอย่างสิ้นเชิง"

 fractalized_entropy_category: "เอนโทรปีแฟรกทัล"
 fractalized_entropy_category_desc: "เซ็นเซอร์จับวัตถุประหลาดลอยผ่านแถบดาวเคราะห์น้อยได้ ไม่ทราบที่มาของมัน แต่เส้นทางการเดินเครื่องมีความมั่นคง แสดงว่าเราสามารถสกัดและตรวจสอบได้"
 infernals.3205.name: "เอนโทรปีแฟรกทัล"
 infernals.3205.desc: "[Leader.GetName] รายงานการค้นพบสิ่งก่อสร้างที่มีมุมเป็นเหลี่ยมแข็ง ลอยตัวอยู่ในวงโคจรดาวฤกษ์ที่เสถียร มันประกอบด้วยวัสดุที่ไม่รู้จักและโดดเด่นด้วยพื้นผิวเหลี่ยมที่ชวนให้นึกถึงโครงสร้างคริสตัล วัตถุดังกล่าวต้านทานการวิเคราะห์ส่วนประกอบทั้งหมด มันยังคงล็อกอยู่ในแนวที่แน่นอน โดยหันหน้าเข้าหาดาวฤกษ์หลักอยู่ตลอดเวลา และทนทานต่อความพยายามทั้งหมดในการควบคุมหรือหมุน\n\nในระหว่างการทดลองที่มีการควบคุม ยานสำรวจได้ส่งชีพจรพลังงานความเข้มข้นสูงไปยังวัตถุ สิ่งก่อสร้างแตกออกอย่างสะอาด แยกออกเป็นสองซีกที่สมมาตรกัน ซึ่งแต่ละส่วนปรับเปลี่ยนเป็นพิมพ์เขียวจำลองขนาดเล็กของโครงสร้างเดิม ชีพจรต่อมาก็ให้ผลลัพธ์แบบเดียวกัน: การแบ่งตัว การทำซ้ำ และการย่อขนาดลงอย่างต่อเนื่อง\n\nในที่สุด กลุ่มหมอกที่ฟุ้งกระจายของสิ่งก่อสร้างย่อส่วนก็ทรงตัวในวงโคจร เศษเสี้ยวแต่ละชิ้นยังคงรักษาแนวและรูปทรงเรขาคณิตที่แม่นยำของผู้ให้กำเนิด และฝูงบินโดยรวมก็สะท้อนถึงโครงร่างโครงสร้างดั้งเดิม\n\nปรากฏการณ์นี้ยังคงไม่มีแบบอย่างหรือคำอธิบายใดๆ เทเลเมทรีที่รวบรวมได้ทั้งหมดได้รับการจัดเก็บเพื่อวิเคราะห์เพิ่มเติม"
 infernals.3205.a: "อนุรักษ์และเฝ้าติดตามเศษเสี้ยวเหล่านั้น"

# Archaeological Sites
 from_the_ashes_site: "จากกองเถ้าถ่าน"
 from_the_ashes_site_desc: "พื้นผิวของ [Planet.GetName] ร้อนระอุและเป็นอันตรายต่อสิ่งมีชีวิตทางชีวภาพ ภาพของซากปรักหักพังที่เห็นชัดว่าเป็นฝีมือสิ่งมีชีวิตจึงดึงดูดความสนใจของ [GetScientistPlural] การสำรวจทางโบราณคดีอาจเผยให้เห็นว่าใครเคยอยู่ที่นี่ และเกิดอะไรขึ้นกับพวกเขา"
 infernals.2700.name: "จักรวรรดิที่ถูกลืมเลือน"
 infernals.2700.desc: "แม้ว่าซากปรักหักพังบน [From.Planet.GetName] ในช่วงแรกจะดูเหมือนสร้างขึ้นจากหิน แต่การขุดค้นและวิเคราะห์ชี้ว่าโครงสร้างหลายส่วนในเมืองที่สูญหายนี้ทำจากสารอินทรีย์ที่กลายเป็นหินซึ่งคล้ายกับไม้ ไม่มีแหล่งกำเนิดของวัสดุดังกล่าวบนดาวเคราะห์ดวงนี้ในปัจจุบัน สิ่งประดิษฐ์ขนาดเล็กทำจากโลหะดิบ แก้ว และสารอินทรีย์กลายเป็นหินในลักษณะเดียวกัน และ [GetScientistPlural] ยังได้พบฟอสซิลของสิ่งมีชีวิตพื้นเมืองที่ไม่มีอยู่แล้วอีกด้วย \n\nดูเหมือนว่าอารยธรรมที่เป็นปัญหาเคยอาศัยอยู่บนดาวเคราะห์ดวงนี้ในตอนที่ภูมิอากาศมีความอบอุ่นพอเหมาะมากกว่านี้ พวกเขาหายตัวไปนานก่อนที่ดาวเคราะห์จะกลายเป็นสภาพปัจจุบัน หรือพวกเขาเป็นพยานในการเปลี่ยนผ่านอันรุนแรงในขวบปีสุดท้ายของพวกเขา?"
 infernals.2705.name: "พยานแห่งความดับสูญ"
 infernals.2705.desc: "การขุดค้นเมืองร้างบน [From.Planet.GetName] ได้เปิดเผยสถานที่สำคัญทางวัฒนธรรม ตกแต่งด้วยลวดลายสลับซับซ้อนที่อาจเป็นภาษาเขียน ที่น่าตื่นเต้นที่สุดคือ ทีมขุดพบห้องใต้ดินที่เต็มไปด้วยชั้นวางของ แต่ละชั้นบรรจุแผ่นบรอนซ์บางๆ ที่จารึกด้วยอักษรเรียงแน่น แม้ว่าบรอนซ์จะเป็นสื่อบันทึกข้อมูลที่ไร้ประสิทธิภาพ แต่ก็ดูเหมือนว่านี่เป็นจดหมายเหตุส่วนกลางของชุมชน \n\nความพยายามแปลความหมายได้เริ่มต้นขึ้นแล้วในขณะที่ทีมโบราณคดียังคงกระจายกำลังออกไปทั่วเมือง คำถามเรื่องชะตากรรมสุดท้ายของคนเหล่านี้นั้นยังคงเปิดกว้างอยู่"
 infernals.2710.name: "หายนะที่คืบคลานเข้ามา"
 infernals.2710.desc: "ทีมงานบน [From.Planet.GetName] ได้เผชิญกับสุสานใต้ดินอันแสนหดหู่ มันประกอบไปด้วยเครือข่ายสนามเพลาะที่ขุดลึกลงไป โดยมีร่างมัมมี่ของเอเลี่ยนวางพักอยู่ในช่องว่างในกำแพง เรียงซ้อนกันสูงสามถึงสี่ร่าง สิ่งของที่ฝังร่วมกับศพช่วยให้เรามองเห็นการพัฒนาทางเทคโนโลยีของพวกเขา เช่น ปืนคาบศิลาโบราณ กล้องโทรทรรศน์แก้วแบบง่าย และงานปักผ้าที่ซับซ้อน \n\nทางแยกหลายแห่งในสุสานมีรูปปั้นของสัตว์พื้นเมืองที่สูญพันธุ์คอยปกปักษ์รักษา สัตว์เหล่านี้มีกระดองกลมโค้ง ขาสี่ข้างที่สั้นป้อม และหัวทู่ขนาดเล็ก ในชิ้นงานที่ได้รับการเก็บรักษาดีกว่า พวกมันถูกวาดในลักษณะหมอบตัวลง ใช้กระดองเพื่อป้องกันตัวเองจากลวดลายแกะสลักคล้ายเปลวไฟบนวัสดุด้านบนของพวกมัน \n\nความหมายที่แท้จริงของงานศิลปะนี้อาจสาบสูญไปตามกาลเวลา แต่มันอาจแสดงถึงการตระหนักรู้ของสังคมนี้เกี่ยวกับหายนะจากไฟที่กำลังจะเกิดขึ้น การขุดค้นซากปรักหักพังเพิ่มเติมอาจช่วยชี้แจงสิ่งที่พวกเขาเคยเผชิญ"
 infernals.2715.name: "การล่มสลายจากเพลิงพิบัติ"
 infernals.2715.desc: "การสำรวจเมืองที่ถูกทำลายล้างบน [From.Planet.GetName] อย่างละเอียด พิสูจน์ให้เห็นว่าอารยธรรมนี้เคยผ่านช่วงเวลาการพังทลายของระบบนิเวศ และรู้ดีว่าวันสุดท้ายที่เต็มไปด้วยไฟกำลังคืบคลานเข้ามา บันทึกแบบกระดาษเคยมีอยู่ก่อนที่พายุฝุ่นเเถ้าภูเขาไฟที่ร้อนจัดจะบีบให้พวกเขาย้ายมาใช้แผ่นบรอนซ์แทน และภาพวาดเชิงศิลปะของสัตว์ต่างๆ ที่หลบภัยจากเปลวไฟแสดงถึงความพยายามของพวกเขาที่จะรับมือกับบั้นปลายชีวิตของตนเอง \n\nการขุดค้นยังพบตัวอย่างรูปปั้นผู้พิทักษ์สุสานที่เกือบจะสมบูรณ์แบบ เปลวไฟที่แกะสลักด้านบนของมันมีแสงเรืองรองอยู่ภายใน ทำให้งานศิลปะนี้น่าตื่นตาและคู่ควรแก่การอนุรักษ์ \n\nเรายังพบหลักฐานของความพยายามที่จะหยุดการปะทุของภูเขาไฟ ถนนหนทางและรถเกวียนที่พังลงแสดงให้เห็นว่าชาวเมืองขนย้ายเศษหินไปยังปล่องภูเขาไฟที่ใกล้ที่สุดและเทลงไปเพื่อหวังจะอุดภูเขาไฟ น่าเสียดายที่พวกเขาไม่สามารถขัดขวางโชคชะตาได้ ปัจจุบันดาวเคราะห์ดวงนี้ไร้ซึ่งสิ่งมีชีวิตหลายเซลล์ \n\nประวัติศาสตร์นี้ย้ำเตือนเราถึงความล่อแหลมเปราะบางของอารยธรรมใดๆ ก็ตาม หากมันเผชิญหน้ากับปัญหาที่ทรงพลังเกินกว่าเครื่องมือที่พวกเขามีอยู่ในการแก้ปัญหา"
 infernals.2715.a: "จุดจบที่น่าสลดใจ"
 infernals.2715.b: "เราควรเรียนรู้จากความผิดพลาดของพวกเขา"

 inferno_temple_site: "วิหารโลกันตร์"
 inferno_temple_site_desc: "ห่างไกลจากศูนย์กลางประชากรของ [Planet.GetName] ในทิวเขาภูเขาไฟที่ยังคุกรุ่น วิหารโบราณแห่งหนึ่งตกอยู่ในสภาพปรักหักพังและขาดการดูแลรักษา การทำความเข้าใจประวัติศาสตร์ของมันอาจช่วยให้เราได้รับข้อมูลเชิงลึกเพิ่มเติมเกี่ยวกับวัฒนธรรมท้องถิ่นของดาวดวงนี้"
 infernals.2720.name: "เครื่องหมายโบราณ"
 infernals.2720.desc: "ตัววิหารมีร่องรอยของสงคราม และมีเศษซากโบราณของสิ่งมีชีวิตมีปัญญาท้องถิ่นในหน้าดิน ดูเหมือนว่าวิหารจะถูกเผาทำลายและปล่อยร้างไว้ ทีมรักษาความปลอดภัยสังเกตว่าคนท้องถิ่นหลีกเลี่ยงพื้นที่นี้ทั้งหมด เพราะเชื่อว่ามันต้องคำสาป \n\nผนังวิหารอัคคีปกป้องวัตถุด้านใน รวมถึงภาพจิตรกรรมฝาผนังและงานแกะสลักที่ซับซ้อนหลายชิ้น งานศิลปะเหล่านี้มีรูปแบบซ้ำๆ ของวงกลมไฟที่บิดเบี้ยว โดยมีรอยฉีกขาดสีดำตรงกลาง ในภาพวาดหนึ่ง ร่างสองขาควักตาข้างหนึ่งในสี่ดวงดังกล่าวออกมาแล้วโยนลงมาบนโลก ก่อเกิดเป็นลวดลายแกะสลักนี้ เราขอเรียกสิ่งนี้ว่า ดวงตาอัคคี(ตาลึก)\n\nการขุดค้นเพิ่มเติมจะเปิดเผยว่าความเชื่อใดบ้างที่รายล้อมภาพรูปปั้นประหลาดนี้"
 infernals.2725.name: "เครื่องสังเวยรูปดวงตา"
 infernals.2725.desc: "การขุดค้นวิหารแห่งดวงตาอัคคีแสดงหลักฐานของการบูชายัญมากมาย หลุมกลมขนาดใหญ่ที่มีแท่นตรงกลางซึ่งเลียนแบบดวงตาอัคคีและรูม่านตา เต็มไปด้วยชั้นของเถ้าถ่านและถ่านไม้ การวิเคราะห์ทางโมเลกุลเผยว่าเถ้าและถ่านเหล่านี้มาจากเนื้อเยื่อสัตว์ \n\nไม่สามารถระบุได้ว่าการบูชายัญเหล่านี้เป็นของสัตว์ป่าหรือสัตว์เลี้ยง หรืออันที่จริงเป็นคนท้องถิ่นเอง \n\nสายลับถูกส่งไปยังศูนย์กลางประชากรในปัจจุบันเพื่อค้นหาหลักฐานเชื่อมโยง ในขณะที่นักขุดของเราค้นหาคำตอบเพิ่มเติม"
 infernals.2725.a: "เป็นความลึกลับที่รอการไขข้อข้องใจ!"
 infernals.2725.b: "ส่งโดรนไปแก้ไขความลึกลับนั้น"
 infernals.2730.name: "พิธีกรรมอันมืดมน"
 infernals.2730.desc: "ประตูหินหนาทึบถูกค้นพบปิดกั้นส่วนลึกที่สุดของวิหาร หลังจากพังเข้าไป นักขุดพบห้องทรงกลมที่มีหลุมตรงกลางเปิดกว้างเหนืออ่างเก็บแมกมาใต้ดินตามธรรมชาติ แสงสีส้มของแมกมาอาบผนังด้วยแสงสีแดง ส่องสว่างให้เห็นจารึกที่วนรอบห้องแปลกตา ด้านบนของกำแพงล้อมรอบประดับด้วยดวงตาที่ลุกเป็นไฟสว่างไสว\n\nที่ขอบด้านหนึ่งของหลุมนี้มีซากแห้งกรังของคนท้องถิ่นคนหนึ่ง ถูกฉีกร่างออกบนแท่นบูชารูปดวงตาอัคคี ปรากฏว่าแท้จริงแล้วพวกเขากำลังบูชายัญพวกเดียวกันเองเพื่อพยายามเอาใจดวงตาอัคคี\n\nข้อความบนฝาผนังเหล่านี้น่าจะสำคัญอย่างยิ่งต่อการทำเข้าใจบทบาททางวัฒนธรรมของวิหารนี้ และควรได้รับการแปลในทันที"
 infernals.2735.name: "คำทำนายอันสั่นสะท้าน"
 infernals.2735.desc: "การศึกษาขั้นสุดท้ายของคัมภีร์ในห้องชั้นในสุดของวิหารเผยให้เห็นคำทำนายชุดหนึ่งเกี่ยวกับการกลับมาของดวงตาอัคคี มันพูดถึงดวงตาอัคคีที่โกรธเกรี้ยวต่อความดื้อรั้นของสาวก เพื่อเป็นการตอบสนอง ดวงตาคาดว่าจะทำให้ท้องฟ้ามืดมน ทำให้ภูเขาไฟศักดิ์สิทธิ์ลูกหนึ่งระเบิด ทำให้พืชผลเหี่ยวเฉาบนเถา และอื่นๆ คำทำนายนำเสนอสิ่งนี้ว่าเป็นจุดจบของอารยธรรม โดยระบุว่าหลังจากเหตุการณ์เหล่านี้ มีเพียงผู้ที่ยอมจำนนต่อดวงตาอัคคีเท่านั้นที่จะรอดชีวิต \n\nสายลับของเราในหมู่ประชากรท้องถิ่นได้มองหาความเชื่อมโยงทางวัฒนธรรม และพบว่าข้อความทำนายนี้เป็นที่มาของคำพังเพยและวลีมากมายในวัฒนธรรมของดาวดวงนี้ ตลอดจนเป็นข้อความต้นฉบับสำหรับเรื่องราวและตำนานในยุคหลังๆ พวกเขายังเชื่อว่าความลี้ลับที่ปฏิบัติโดยวิหารสมัยใหม่ของพวกเขานั้นรวมถึงการเปลี่ยนแปลงและการต่อต้านคำทำนายโบราณนี้ด้วย \n\nเหตุการณ์ที่พยากรณ์ไว้ทั้งหมดนี้สามารถจัดฉากขึ้นใหม่ได้ด้วยเทคโนโลยีของเรา หรือแกล้งทำขึ้นมาด้วยความสมจริงในระดับที่พวกเขาจะไม่สามารถตรวจจับได้ หากเรานำเสนอตัวเองในฐานะดวงตาอัคคีที่กลับมาเกิดใหม่ โดยแสดงให้เห็นว่าคำทำนายดั้งเดิมนั้นถูกต้องมาโดยตลอด เราอาจสามารถดึงเอาข้อผ่อนปรนและความจงรักภักดีจากพวกเขาได้ สิ่งนี้จะทำให้ดูดซับพวกเขาในระยะยาวได้ง่ายขึ้น"
 infernals.2735.a: "จัดฉากทำตามคำทำนาย"
 infernals.2735.a.tt: "สังคมยุคแรกเริ่มของ §Y[From.Planet.GetName]§! จะเรียนรู้ที่จะปรับรับจริยธรรมของเรา"
 infernals.2735.a.fail: "ไม่ได้เลือกนโยบาย §Y$interference_not_allowed$§!"
 infernals.2735.b: "ไม่เข้าแทรกแซง"
 infernals.2735.c: "ประวัติศาสตร์ของพวกเขาได้สูญหายไปตลอดกาล"
 infernal_figurine: "หุ่นรูปจำลองอัคคี"
 infernal_figurine_desc_short: "สิ่งมีชีวิตอวบอ้วนที่มีกระดองโค้งกลมและขาสี่ข้างที่สั้นป้อม หมอบอยู่ใต้ประติมากรรมจำลองของเปลวไฟ"
 infernal_figurine_desc_details: "เปลวไฟถูกแกะสลักจากแร่ธาตุที่ไม่รู้จักซึ่งส่องแสงสีแดงเข้ม สิ่งประดิษฐ์นี้ถูกขุดพบจากสุสานใต้ดินของสังคมที่สูญพันธุ์ไปแล้ว และอาจเป็นตัวแทนของความหวังอันริบหรี่ในการเอาชีวิตรอดจากการทำลายล้างของภูเขาไฟในชีวมณฑลของพวกเขา"

