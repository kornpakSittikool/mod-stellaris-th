# Thermotechnic District Deposits
 d_volcanic_stable_plateaus: "ที่ราบสูงมั่นคง"
 d_volcanic_stable_plateaus_desc: "ที่ราบสูงเหล่านี้มีความมั่นคงทางธรณีวิทยาเมื่อเทียบกับบริเวณโดยรอบ"
 d_volcanic_tranquil_flatlands: "ที่ราบเงียบสงบ"
 d_volcanic_tranquil_flatlands_desc: "ที่ราบที่เป็นเนินเขาเตี้ยๆ เหล่านี้แทบจะไม่ได้รับผลกระทบจากความโกลาหลทั่วทั้งดาวเคราะห์"
 d_volcanic_intraplate: "แผ่นเปลือกโลกด้านในที่แข็งแกร่ง"
 d_volcanic_intraplate_desc: "ห่างไกลจากแนวรอยเลื่อน ภูมิภาคนี้จึงปลอดภัยจากความเสียหายทางธรณีวิทยา"
 d_volcanic_basalt_plains: "ที่ราบหินบะซอลต์"
