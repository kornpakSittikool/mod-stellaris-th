# Civic - Fire Cult
 civic_pyrolatry: "ลัทธิบูชาไฟ"
 civic_pyrolatry_desc: "ด้วยการหล่อหลอมจากความยากลำบากแสนสาหัสหลายชั่วอายุคน สังคมนี้เชื่อในการอยู่รอดผ่านความสามัคคี และความสามัคคีผ่านการอยู่รอด มีเพียงการดิ้นรนที่เกิดจากไฟเท่านั้นที่จะผูกมัดพวกเขาให้แน่นแฟ้นพอที่จะอดทนต่อกาแล็กซีที่หนาวเหน็บและไม่ใส่ใจนี้ได้"
 civic_pyrolatry_effects: "- ผลผลิตจากงาน £unity£ §Y$unity$§! เพิ่มขึ้นตามสัดส่วนของ $HABITABILITY$ ที่ต่ำลง (สูงสุด §G500%§!).\n- ฝ่าย ['concept_fire_cult'] จะก่อตัวขึ้นไม่นานหลังจากเริ่มเกม.\n- เปลี่ยนงาน £job_priest£ §Y$job_priest_plural$§! เป็น £job_fire_dancer£ ['concept_inf_fire_dancers'].\n- เปลี่ยนงาน £job_politician£ §Y$job_politician_plural$§! เป็น £job_fire_oracle£ ['concept_inf_fire_oracles'] บนดาวเคราะห์ที่มี $HABITABILITY$ ต่ำกว่า §R50%§!.\n- อนุญาตให้เกณฑ์กองทัพ §Y$ember_legion$§! บนดาวเคราะห์ที่มี $HABITABILITY$ ต่ำกว่า §R20%§!.\n- อนุญาตให้เข้าถึงคำตัดสินดาวเคราะห์ §Y$decision_blazing_scourge$§! ซึ่งสร้างสิ่งกีดขวาง £blocker£ ['concept_dec_blazing_scourge'].\n- เสริมฤทธิ์ร่วมกับระบบพลเมือง (Civics): $civic_superstitious_beliefs$, $civic_exalted_priesthood$, $civic_death_cult$, $civic_aristocratic_elite$, และ $civic_merchant_guilds$."
