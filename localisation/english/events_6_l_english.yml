 ## Event: The Return
 anomaly.7120.name:0 "การกลับมา"
 anomaly.7120.desc.regular:0 "การสแกนระยะไกลตรวจพบยานลำหนึ่งกำลังเคลื่อนเข้ามาใกล้ [Root.Capital.GetName] เมื่อมันเคลื่อนใกล้เข้ามาเรื่อย ๆ ก็เห็นได้ชัดว่าการออกแบบของยานมีลักษณะตรงกันกับการออกแบบของเราจากศตวรรษที่แล้ว\n\nหลังจากเปิดช่องการสื่อสาร เราพบว่ายานลำนี้ขับโดย [intemporal_explorer.GetName] นักวิทยาศาสตร์ที่หลุดออกจากกระแสกาลเวลาโดยลูกทรงกลมพลังงานสีฟ้า\n\n[intemporal_explorer.GetHeSheCap] ได้พูดพล่ามถึงดาวนิวตรอนที่กำลังชนกันและบ่อแรงโน้มถ่วงแบบย้อนเวลากลับ ก่อนจะบังคับยานกลับเข้าสู่ความมืดมิดอีกครั้ง ที่น่าประหลาดใจคือนักฟิสิกส์ของเรายืนยันว่าข้อมูลส่วนใหญ่นี้ไม่เพียงตรวจสอบได้จริง แต่เป็นข้อมูลที่สะเทือนวงการอย่างยิ่ง\n\n[intemporal_explorer.GetName] มีรูปลักษณ์ทางกายภาพที่ไม่เปลี่ยนแปลงตามการผ่านไปของเวลา ทว่าแม้แต่เทคโนโลยีปัจจุบันของเราก็ไม่สามารถอธิบายการทำงานของลูกทรงกลมนี้ได้ ยกเว้นแต่ตัวพวกเขาเองจะเผชิญกับภัยพิบัติทำลายล้างจนถึงแก่ชีวิต [intemporal_explorer.GetHeShe] จะยังคงออกสำรวจจักรวาลต่อไปจนกว่าจะถึงจุดสิ้นสุดของกาลเวลา"
 anomaly.7120.desc.hive:0 "การสแกนระยะไกลตรวจพบยานลำหนึ่งกำลังเคลื่อนเข้ามาใกล้ [Root.Capital.GetName] เมื่อมันเคลื่อนใกล้เข้ามาเรื่อย ๆ ก็เห็นได้ชัดว่าการออกแบบของยานมีลักษณะตรงกันกับการออกแบบของเราจากศตวรรษที่แล้ว เราพบว่ายานลำนี้ขับโดย [intemporal_explorer.GetName] นักวิทยาศาสตร์ที่หลุดออกจากกระแสกาลเวลาโดยลูกทรงกลมพลังงานสีฟ้า\n\nความรู้ไหลจากนักวิทยาศาสตร์กลับเข้าสู่จิตรวมกลุ่มอีกครั้ง: สัญญารมณ์แห่งดาวนิวตรอนที่กำลังชนกันและบ่อแรงโน้มถ่วงแบบย้อนเวลากลับ เมื่อกระบวนการถ่ายโอนเสร็จสิ้น ยานก็เดินทางต่อไปในความมืดมิด ที่น่าประหลาดใจคือนักฟิสิกส์ของเรายืนยันว่าข้อมูลส่วนใหญ่นี้ไม่เพียงตรวจสอบได้จริง แต่เป็นข้อมูลที่สะเทือนวงการอย่างยิ่ง\n\n[intemporal_explorer.GetName] มีรูปลักษณ์ทางกายภาพที่ไม่เปลี่ยนแปลงตามการผ่านไปของเวลา ทว่าแม้แต่เทคโนโลยีปัจจุบันของเราก็ไม่สามารถอธิบายการทำงานของลูกทรงกลมนี้ได้ ยกเว้นแต่ตัวพวกเขาเองจะเผชิญกับภัยพิบัติทำลายล้างจนถึงแก่ชีวิต [intemporal_explorer.GetHeShe] จะยังคงออกสำรวจจักรวาลต่อไปจนกว่าจะถึงจุดสิ้นสุดของกาลเวลา"

 DATA_DIAMOND_CAT:0 "แผ่นน้ำแข็งที่บางเฉียบ"
 DATA_DIAMOND_CAT_DESC:0 "ชั้นน้ำแข็งบาง ๆ บนพื้นผิวของ [From.GetName] ปกคลุมแหล่งแร่คริสตัลขนาดใหญ่ผิดปกติ นอกจากนี้เรายังตรวจพบสัญญาณอ่อน ๆ บางอย่างอีกด้วย"
 DATA_DIAMOND_PROJECT:0 "การศึกษาแหล่งแร่คริสตัลบน [From.GetName]"
 DATA_DIAMOND_PROJECT_DESC:0 "สัญญาณที่ทำให้เกิดความสับสนซึ่งแผ่ออกมาจากคริสตัลบน [From.GetName] นั้นน่าแปลกใจอย่างยิ่ง แนะนำให้ทำการศึกษาเพิ่มเติม"
 anomaly.3145.name:0 "ภาพหลอนจากการขุดเจาะ"
 anomaly.3145.desc:0 "หลังจากจัดเตรียมการเจาะเข้าไปในชั้นน้ำแข็งบน [From.GetName] [Root.GetLeaderName] ได้เผชิญกับความรู้สึกรุนแรง แม้จะไม่ได้รับบาดเจ็บทางกายภาพ แต่พวกเขารายงานว่าในตอนแรกถูกครอบงำด้วยภาพหลอนและกลิ่นหลอนที่ปะติดปะต่อไม่ได้ซึ่งแสดงถึงสิ่งมีชีวิตต่างดาวที่ไม่รู้จัก\n\nมีการเตรียมโครงการพิเศษเพื่อตรวจสอบแหล่งคริสตัลที่แปลกประหลาดนี้เพิ่มเติม"
 anomaly.3145.a:0 "น่ากระวนกระวายใจ"
 anomaly.3150.name:0 "เพชรข้อมูล"
 anomaly.3150.desc:0 "ภายใต้ผืนน้ำแข็ง ตัวคริสตัลเองประกอบเป็นมวลส่วนใหญ่ของดาวเคราะห์ ตัวอย่างบ่งชี้ว่ามีการใช้โครงผลึกหนาแน่นเทียมในการจัดเก็บข้อมูล ประมาณการชี้ว่าปริมาณความรู้ที่บันทึกไว้นั้นมีปริมาณมากกว่าทุกสิ่งในฐานข้อมูลรวมของเราหลายเท่า\n\nมีความเป็นไปได้ว่าผู้สร้างคริสตัลนี้ใช้การสั่นพ้องทางพลังงานจิต (Psionic) เพื่อจารึกข้อมูล [Root.GetLeaderName] รู้สึกสนใจเป็นอย่างมากจนร้องขออนุญาตเพื่อควบคุมการจัดตั้งสถานีวิจัยอัตโนมัติบนพื้นผิวโลก"
 anomaly.3150.a:0 "ศึกษาจากวงโคจรก็เพียงพอแล้ว"
 anomaly.3150.b:0 "ขอให้โชคดีข้างล่างนั้น [Root.GetLeaderName]"
 anomaly.3150.c:0 "ทำเหมืองคริสตัลเพื่อเก็บเกี่ยวทรัพยากร"
 anomaly.3165.name:0 "สิ่งล้ำค่าที่น่าเสียดายหากสูญเปล่า"
 anomaly.3165.desc:0 "เมื่อใกล้จะเสร็จสิ้นการสร้างสถานีวิจัยอัตโนมัติ จู่ ๆ ก็เกิดกิจกรรมพุ่งสูงขึ้นอย่างกะทันหันจากคริสตัล ส่งผลให้ [Root.GetLeaderName] เสียชีวิต หลังจากนั้นไม่นาน เราก็ได้รับแถลงการณ์อัตโนมัติที่อ้างว่าส่งมาจากตัว [leader.GetHimHer] เอง\n\nแม้ระบบประสาทในร่างกายของพวกเขาจะเสียหายจนไม่สามารถซ่อมแซมได้ แต่จิตใจของพวกเขากลับถูกกักขังไว้ในคริสตัล เพื่อใช้ประโยชน์สูงสุดจากสถานการณ์ใหม่นี้ [leader.GetSheHe] จึงเสนอที่จะช่วยเหลือเกี่ยวกับการวิจัยฐานข้อมูลคริสตัลในอนาคต"
 anomaly.3165.a:0 "ผลลัพธ์ที่เป็นทั้งสุขและเศร้า"
 anomaly.3150.a.tooltip:0 "จะมีการเพิ่มแหล่งวิจัยขนาดเล็กไปยัง [FromFromFrom.GetName]"
 anomaly.3150.b.tooltip:0 "จะมีการเพิ่มแหล่งวิจัยขนาดใหญ่ไปยัง [FromFromFrom.GetName] แต่มันอาจเป็นอันตรายต่อ [Root.GetLeaderName]"
 anomaly.3150.c.tooltip:0 "จะมีการเพิ่มแหล่งแร่คริสตัลหายากไปยัง [FromFromFrom.GetName] เราจะสามารถทำเหมืองมันได้หากมีเทคโนโลยีที่เหมาะสม"

 ###Event: Holding Pattern

 #Modifiers
 reassured_tracking: "การติดตามเพื่อความอุ่นใจ"
 reassured_tracking_desc: "ระบบติดตามส่วนกลางกำลังเฝ้าระวังประชากร แม้ความวิตกกังวลโดยรวมยังคงอยู่ แต่การรับรู้ว่ามีการดำเนินการบางอย่างเพื่อแก้ไขปัญหาช่วยทำให้สถานะอาณานิคมมั่นคง"
 collective_autophobia: "โรคกลัวการสูญหายโดยรวม"
 collective_autophobia_desc: "ความกลัวว่าจะหายตัวไปโดยรวมได้เข้าเกาะกุมอาณานิคมนี้ ความอยากที่จะอยู่ใกล้ชิดกันและกันส่งผลให้การดำเนินงานในแต่ละวันล่าช้าลง"
 freed_stasis_criminals: "อาชญากรคุกจำศีลที่ได้รับอิสรภาพ"
 freed_stasis_criminals_desc: "นักโทษส่วนใหญ่ที่ได้รับการปล่อยตัวเป็นอาชญากรตัวร้าย ความตื่นตระหนกทางวัฒนธรรมที่พวกเขากำลังเผชิญอยู่ในขณะนี้ทำให้การปรับตัวเข้ากับสังคมทำได้ยากขึ้น และทำให้อัตราการเกิดอาชญากรรมพุ่งสูงขึ้น"
 freed_stasis_dissidents: "กลุ่มผู้เห็นต่างคุกจำศีลที่ได้รับอิสรภาพ"
 freed_stasis_dissidents_desc: "นักโทษส่วนใหญ่เป็นผู้เห็นต่างทางการเมือง พวกเขากำลังแบ่งปันศิลปะและวัฒนธรรมของพวกเขากับอาณานิคมด้วยความกระตือรือร้น"

 #Events
 colony.9900.name: "ไม่ได้เช็กอินยามเช้า"
 colony.9900.desc: "เมื่อเร็ว ๆ นี้ มี [Owner.GetColonistPlural] จำนวนมากหายตัวไปบน [Root.GetName] รูปแบบเดียวที่ตรวจพบคือทุกคนอยู่เพียงลำพังในตอนที่หายตัวไป เมื่อข่าวเริ่มแพร่สะพัด ความกลัวโดยรวมที่จะเดินไปไหนมาไหนโดยไม่มีผู้ดูแลก็เข้าเกาะกุมอาณานิคม สภาวะความระส่ำระสายนี้กำลังสร้างปัญหาอย่างมากให้กับการดำเนินงานในแต่ละวันของเรา"
 colony.9900.a: "เริ่มดำเนินกระบวนการติดตาม"
 colony.9900.a.tooltip: "ประชากร £pop£ §Hป๊อป§! จำนวน §Y100§! รายหายตัวไปจาก [Root.GetName] จะมีการใช้ระบบติดตามที่มีราคาแพงเพื่อช่วยเราไขปริศนานี้"
 colony.9900.b: "ไม่มีความจำเป็นที่จะต้องตื่นตระหนก"
 colony.9900.b.tooltip: "ประชากร £pop£ §Hป๊อป§! จำนวน §Y100§! รายได้หายตัวไปจาก [Root.GetName]"
 colony.9905.name: "การสแกนนำโชค"
 colony.9905.desc.a: "เนื่องจากการปรับใช้ระบบติดตามบน [Root.GetName] ทำให้เราได้เบาะแสที่สำคัญ\n\nเมื่อ [Owner.GetColonistPlural] รายล่าสุดของเราหายตัวไป เราก็ติดตามผลอย่างรวดเร็วด้วยการสแกนสัญญาณตำแหน่งสุดท้ายของพวกเขา ตรวจพบสารตกค้างที่สลายตัวของอนุภาคที่มีประจุในแต่ละกรณี\n\nเราได้ตั้งโครงการพิเศษขึ้นเพื่อระบุธรรมชาติที่แท้จริงของอนุภาคเหล่านี้และความเกี่ยวข้องกับการหายตัวไปของ [Owner.GetColonistPlural]"
 colony.9905.desc.b: "เราได้รับโชคช่วยบน [Root.GetName]! เราค้นพบตำแหน่งของ [Owner.GetColonistPlural] ล่าสุดที่หายตัวไป การสแกนพื้นที่โดยละเอียดเผยให้เห็นถึงสารตกค้างที่สลายตัวของอนุภาคที่มีประจุ\n\nเราได้ตั้งโครงการพิเศษขึ้นเพื่อระบุธรรมชาติที่แท้จริงของอนุภาคเหล่านี้และความเกี่ยวข้องกับการหายตัวไปของ[Owner.GetColonistPlural]"
 colony.9905.a: "สืบหาสาเหตุที่แท้จริงของเรื่องนี้"
 colony.9905.a.tooltip: "ประชากรอีกรายได้หายตัวไปจาก [Root.GetName]"
 colony.9910.name: "วิถีโคจรรอคอย"
 colony.9910.desc: "จากการใช้สารตกค้างเป็นข้อมูลอ้างอิง การสแกนทั่วระบบดาวพบหลักฐานของอนุภาคภายในดวงจันทร์ของ [Root.GetName]\n\nการค้นหาพื้นผิวดวงจันทร์เผยให้เห็นช่องแอร์ล็อคขนาดเล็กสองสามช่องที่ฝังอยู่ใต้ฝุ่นนานนับศตวรรษ ภายในเป็นคอมเพล็กซ์ที่ถูกทิ้งร้างของสำนักงานบริหาร อุปกรณ์เคลื่อนย้ายมวลสารระยะไกล และระบบควบคุมสนามพลังที่เชื่อมต่อกับเครือข่ายของพ็อดจำศีลที่ก้าวหน้าอย่างยิ่ง\n\nผู้คนจำนวนมากถูกแช่แข็งอยู่ในพ็อดเหล่านั้น รวมถึงชาวอาณานิคมที่หายตัวไปของเราด้วย มีข้อสงสัยเพียงเล็กน้อยว่าสถานที่นี้ทำหน้าที่เป็นเรือนจำ เรายังต้องระบุสาเหตุที่พวกเขาถูกนำตัวมาที่นี่และวิธีที่เราจะช่วยเหลือพวกเขาออกไป"
 colony.9910.a: "ยอดเยี่ยมมาก"
 colony.9915.name: "หลบหนีออกจากดวงจันทร์"
 colony.9915.desc: "ห่างไกลจากทฤษฎีสมคบคิด [Owner.GetColonistPlural] ที่หายตัวไปของเราถูกคุมขังเนื่องจากข้อผิดพลาดของระบบ(หัวเราะ)\n\nข้อผิดพลาดทางคอมพิวเตอร์ทำให้ระบบเคลื่อนย้ายมวลสารที่เก่าแก่ของเรือนจำกลับมาทำงานอีกครั้ง และสุ่มระบุว่า [Owner.GetColonistPlural] ของเรามีความผิด สถาปนิกของสถานประกอบการใช้พ็อดเพื่อทั้งกักขังนักโทษและอบรมสั่งสอนใหม่ การช่วยเหลือคนของเรานั้นทำได้ค่อนข้างง่าย แต่นักโทษดั้งเดิมหลายคนยังคงติดอยู่ในสนามพลังจำศีล มันน่าจะเป็นไปได้ที่จะปล่อยตัวพวกเขา แม้ว่าการขาดบันทึกของเรือนจำจะทำให้เราไม่สามารถรู้ถึงประวัติอาชญากรรมทั้งหมดของพวกเขาได้\n\nหรืออีกทางเลือกหนึ่งคือเราสามารถฟื้นฟูเรือนจำขึ้นมาใหม่ โดยมอบหมายให้พัศดีพิเศษคอยควบคุมระบบเคลื่อนย้ายมวลสารของที่นี่"
 colony.9915.a: "อุปกรณ์ที่มีประโยชน์สำหรับ [Owner.GetColonistPlural] ที่เกเร"
 colony.9915.a.tooltip: "ชาวอาณานิคม [Owner.GetColonistPlural] ที่หายตัวไปจะกลับคืนมา เราจะได้รับเรือนจำจำศีลที่พร้อมใช้งาน"
 colony.9915.b: "ไม่มีใครควรต้องมาอยู่ในคุกแบบนี้"
 colony.9915.b.tooltip: "ชาวอาณานิคม [Owner.GetColonistPlural] ที่หายตัวไปจะกลับคืนมาและเราจะปิดการใช้งานคุกนี้ นักโทษที่เหลือทั้งหมดจะได้รับการปล่อยตัว ซึ่งอาจส่งผลเสียต่ออาณานิคม"
 colony.9915.c: "จัดตั้งโครงการปล่อยตัวอย่างเป็นขั้นตอน"
 colony.9915.c.tooltip: "เราจะคัดกรองและให้การสนับสนุนผู้ที่ก้าวออกจากเรือนจำ เพื่อช่วยให้การเปลี่ยนผ่านของอาณานิคมราบรื่นยิ่งขึ้น"
 colony.9915.d: "อาหารสำเร็จรูปบรรจุเสร็จงั้นรึ? เยี่ยมเลย"
 colony.9915.d.tooltip: "ชาวอาณานิคม [Owner.GetColonistPlural] ที่หายตัวไปจะกลับคืนมา เราจะปรับเปลี่ยนเรือนจำเป็นโรงงานอาหาร เปิดโอกาสให้รวงรังจัดงานเลี้ยงกินเหล่านักโทษในเครื่องจำศีล"
 colony.9920.name: "เพื่อนบ้านที่ไม่ดี"
 colony.9920.desc: "นักโทษที่ถูกปล่อยตัวส่วนใหญ่บน [Root.GetName] เป็นอาชญากรตัวฉกาจ การที่พวกเขากลุ่มใหญ่นี้ถูกปล่อยตัวออกมากระทันหันได้สร้างปัญหาให้กับอาณานิคม"
 colony.9920.a: "ช่างโชคร้ายนัก"
 colony.9925.name: "ผลลัพธ์คละกัน"
 colony.9925.desc: "นักโทษที่ได้รับการปล่อยตัวบน [Root.GetName] มีทั้งอาชญากรตัวร้ายและผู้เห็นต่างทางการเมืองคละเคล้ากันไป: ศิลปิน นักเขียน และนักดนตรี\n\nในขณะที่นักโทษทางวัฒนธรรมยินดีที่จะแบ่งปันความรู้ของพวกเขากับเรา แต่อาชญากรหลายคนกลับขาดทางเลือกอื่นและหวนกลับไปใช้ชีวิตในรูปแบบเดิมของตน"
 colony.9925.a: "รับทราบ"
 colony.9930.name: "เพื่อนบ้านที่ดี"
 colony.9930.desc: "นักโทษเกือบทั้งหมดที่ได้รับการปล่อยตัวบน [Root.GetName] เป็นผู้เห็นต่างทางการเมือง: ศิลปิน นักเขียน และนักดนตรี\n\nตอนนี้พวกเขาได้รับอิสรภาพแล้ว จึงแบ่งปันวัฒนธรรมและความรู้ของพวกเขากับเราอย่างมีความสุข"
 colony.9930.a: "ยอดเยี่ยม"

