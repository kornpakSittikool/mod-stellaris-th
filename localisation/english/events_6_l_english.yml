 boosted_melting: "ผลกระทบแบบหิมะถล่ม"
 boosted_melting_desc: "เราได้เพิ่มปริมาณการปล่อยก๊าซจากอุตสาหกรรมเพื่อเร่งการละลายของน้ำแข็งขั้วโลกของดาวเคราะห์"
 halted_production: "ระงับการผลิต"
 halted_production_desc: "เราได้จำกัดผลกระทบจากอุตสาหกรรมเพื่อพยายามปกป้องสิ่งแวดล้อมที่เปราะบางของดาวเคราะห์ดวงนี้"
 ecological_emergency: "ภาวะฉุกเฉินทางนิเวศวิทยา"
 ecological_emergency_desc: "ดาวเคราะห์ดวงนี้ได้ระงับการผลิตทั้งหมดโดยสมบูรณ์จนกว่าการวิจัยด้านสิ่งแวดล้อมจะเสร็จสิ้น"
 ancient_plague: "ไวรัสโบราณ"
 ancient_plague_desc: "โลกใบนี้ได้ตกเป็นเหยื่อของเชื้อก่อโรคโบราณที่ตื่นขึ้นมาจากดินเยือกแข็งคงตัวที่ละลายตัวลง"
 cruel_actions: "มาตรการป้องกันที่โหดเหี้ยม"
