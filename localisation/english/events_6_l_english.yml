 mod_job_alien_hunter_per_pop: "§G+1§! งาน $job_alien_hunter$ ต่อ $VALUE$ ประชากร"
 mod_job_alien_hunter_per_pop_short: "\n§G+1§! £job_alien_hunter£ ต่อ $VALUE$ £pop£"

 d_desertling_infestation: "สัตว์สายพันธุ์ผู้รุกราน"
 d_desertling_infestation_desc: "สัตว์เลี้ยงลูกด้วยนมต่างดาวที่เป็นสิ่งมีชีวิตต่างถิ่นที่รุกราน"
 d_red_desert: "ทะเลทรายสีแดง"
 d_red_desert_desc: "ทะเลทรายอันกว้างใหญ่ที่ย้อมไปด้วยสีแดงจากการสังเวยอันนองเลือดที่เกิดขึ้นที่นี่"
 d_alien_sanctuary: "ซาฟารีสิ่งมีชีวิตต่างดาว"
 d_alien_sanctuary_desc: "เขตอนุรักษ์ที่สร้างขึ้นสำหรับสัตว์ป่าต่างดาวซึ่งนักท่องเที่ยวสามารถมีปฏิสัมพันธ์กับสายพันธุ์ที่น่าทึ่งได้"

 rodent_war: "การกำจัดขั้นรุนแรง"
 rodent_war_desc: "เราได้มอบหมายให้กองทัพทำลายล้างสัตว์ป่าต่างดาวผู้รุกรานที่ขุดรูฝังตัวอยู่บนโลกใบนี้"
 alien_infestation: "การระบาดของสิ่งมีชีวิตต่างดาว"
 alien_infestation_desc: "โลกใบนี้ถูกรุกรานโดยสัตว์ป่าต่างดาวที่แพร่กระจายตัวอย่างรวดเร็ว"
 adopted_aliens: "การทำให้สัตว์ต่างดาวเชื่อง"
 adopted_aliens_desc: "โลกดวงนี้ได้เข้าร่วมโครงการรับเลี้ยงสัตว์เลี้ยงต่างดาวในความพยายามร่วมกันเพื่อให้พวกมันเชื่อง"
 national_pets: "ความผูกพันที่ไม่น่าเชื่อ"
 national_pets_desc: "ฝูงการละทิ้งที่เราตัดสินใจรับเลี้ยงได้รับการประกาศว่าเชื่องโดยสมบูรณ์แล้ว และเป็นที่รักของประชาชนทั่วทั้งประเทศของเรา"

 trait_presapient_unintelligent: "ไร้ปัญญา"
 trait_presapient_unintelligent_desc: "§Hเผ่าพันธุ์นี้ไม่สามารถทำงานที่ง่ายที่สุดได้ ทักษะเดียวของพวกมันคือความเร็วที่เหลือเชื่อในการสืบพันธุ์§!"

 rapid_desertification_species: "ทะเลทราย"

# Closing Aperture
 BREACHSEALER_CAT: "ตรวจพบรอยฉีกขาดของจักรวาล"
 BREACHSEALER_CAT_DESC: "ระบบดาว& ขาวที่สลัวมัวเป็นที่ตั้งของรอยฉีกขาดในโครงสร้างของจักรวาล สิ่งที่แปลกประหลาดยิ่งกว่านั้นคือ รอยฉีกขาดนั้นกำลังค่อย ๆ หดตัวลง ราวกับมีบางสิ่งหรือบางคนกำลังทำงานเพื่อซ่อมแซมมัน"
 anomaly.7200.name: "ช่องเปิดที่กำลังปิดตัว"
 anomaly.7200.desc: "& ขาวเป็นภาพที่น่าขนลุก ดาวเคราะห์ที่หมุนวนถูกห้อมล้อมไปด้วยความมืดมิด ในบริเวณใกล้เคียงคือรอยฉีกขาดในโครงสร้างของจักรวาลเรา ซึ่งเปรียบเสมือนปากของห้วงอวกาศที่กัดกินรัศมีของดาวฤกษ์ในระบบดาวนี้\n\nแม้การจัดเรียงของดาวเคราะห์น้อยจะดูเป็นธรรมชาติ ทว่าการวิเคราะห์เพิ่มเติมเผยให้เห็นว่าพวกมันถูกจัดวางด้วยความแม่นยำทางคณิตศาสตร์ เมื่อหลายพันปีก่อน พลังงานอันน่าเหลือเชื่อบางอย่างได้ประสานเทหวัตถุในวงโคจรของระบบดาวนี้ให้อยู่ในรูปแบบเฉพาะ ซึ่งไม่เพียงแต่ช่วยบรรเทาผลกระทบจากรอยฉีกขาดเท่านั้น แต่ยังป้องกันไม่ให้มันแผ่ขยายออกไปในกาแล็กซีที่กว้างขึ้นด้วย\n\nเรามาถึงที่นี่ในเวลาที่เป็นมงคลยิ่ง - ผลงานอันยิ่งใหญ่ใกล้จะเสร็จสมบูรณ์แล้ว การฟื้นฟูของระบบดาวนี้กำลังจะเกิดขึ้นในไม่ช้า"
 anomaly.7200.a: "ขอบคุณสำหรับการซ่อมแซมกาแล็กซีของเรา"

# Geocentric Experiment
 NAME_Orrery_Site: "Celestial Orrery Site"
 GEOCENTRIC_EXPERIMENT_CAT: "ดวง อาทิตย์ ยาม ค่ํา คืน"
 GEOCENTRIC_EXPERIMENT_CAT_DESC: "ตรวจพบค่าแรงโน้มถ่วงที่แปลกประหลาดทั่วทั้งระบบดาว [from.Solar_System.GetName] โดยส่งสัญญาณเป็นจังหวะจากแถบดาวเคราะห์น้อยชั้นในไปยังดาวเคราะห์ที่รกร้างที่ใจกลางระบบดาว"
 anomaly.8000.name: "$GEOCENTRIC_EXPERIMENT_CAT$"
 anomaly.8000.desc: "เสถียรภาพทางแรงโน้มถ่วงของระบบดาว [from.Solar_System.GetName] ได้รับการรักษาไว้โดยเครื่องปล่อยสัญญาณ §Y$sr_dark_matter$§! ที่ติดตั้งอยู่ภายในแถบดาวเคราะห์น้อย เครื่องปล่อยสัญญาณเหล่านี้ควบคุมโดยซูเปอร์คอมพิวเตอร์ที่ตั้งอยู่บนดาวเคราะห์ส่วนกลาง บันทึกจากคอมพิวเตอร์ส่วนกลางชี้ว่าระบบดาวทั้งหมดเคยเป็นสถานที่ทดลองสำหรับการควบคุมแรงโน้มถ่วง ซึ่งจัดตั้งขึ้นโดยอารยธรรมโบราณ"
 anomaly.8000.tt: "เพิ่ม §Y$d_physics_1$§! และ §Y$d_dark_matter_deposit_1$§! ไปยังดาวเคราะห์น้อย §Y$GRAVITY_STABILIZER$§! ทุกดวง"

