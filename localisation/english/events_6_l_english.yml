 ## Event: Junkyard Orbit
 colony.9310.name: "วงโคจรขยะ"
 colony.9310.desc: "รายงานล่าสุดจาก [planet.GetName] แจ้งให้เราทราบว่าเราได้คำนวณความสามารถในการจัดการของเสียของดาวเคราะห์ดวงนี้ผิดพลาด พื้นที่ทิ้งขยะขนาดใหญ่ได้หลอมรวมกันเป็นดินแดนรกร้างขนาดใหญ่เพียงแห่งเดียวที่ไม่สามารถข้ามผ่านได้ ซึ่งทอดยาวไปถึงขอบศูนย์กลางประชากรของดาวเคราะห์\n\nคนในพื้นที่เริ่มจัดส่งขยะจำนวนมากออกสู่วงโคจร แต่เป็นเพียง 'มาตรการชั่วคราว' เท่านั้น"
 colony.9310.a: "น่าตกใจอย่างยิ่ง"
 colony.9310.a.tooltip: "ทำความสะอาดความรกของพวกเขา ทันที"
 colony.9315.name: "ม่านเศษซาก"
 colony.9315.desc: "เกิดอุบัติเหตุขึ้น\n\nเนื่องจากข้อผิดพลาดที่สำคัญ พ็อดขยะจำนวนมากที่โคจรอยู่รอบ [planet.GetName] ได้เกิดการชนกัน ส่งผลให้เศษขยะปริมาณมากเข้าสู่ชั้นบรรยากาศชั้นล่าง สิ่งนี้ได้จำกัดความสามารถในการเดินทางสู่อวกาศของดาวเคราะห์ไปแล้ว และตามการคาดการณ์ สถานการณ์อาจเลวร้ายลงอีกเมื่อขยะอวกาศยังคงสลายตัว อย่างไรก็ดี ปฏิบัติการเก็บกวาดเศษซากนี้อาจจะใช้เวลานานและมีค่าใช้จ่ายสูง"
 colony.9315.a: "ทำความสะอาดวงโคจร"
 colony.9315.a.tooltip: "สั่งการใช้งานยูนิตพิเศษ"
 colony.9315.b: "อวกาศนั้นกว้างใหญ่นัก ขยะเพียงเล็กน้อยไม่ใช่เรื่องน่ากังวล"
 colony.9315.b.tooltip: "ยังมีปัญหาที่เร่งด่วนกว่านี้ในกาแล็กซี"
 colony.9315.c: "ประกาศภาวะวิกฤต"
 colony.9315.c.tooltip: "เราต้องทำทุกอย่างในอำนาจเพื่อเก็บกวาดเศษซากให้หมด"
 colony.9320.name: "เสร็จสิ้นภารกิจทำความสะอาดวงโคจร"
 colony.9320.desc: "ช่างเป็นวันที่สำคัญยิ่งบน [planet.GetName] ที่พนักงานเก็บขยะอวกาศได้ทำงานกะสุดท้ายเสร็จสิ้นลง ณ วันนี้ วงแหวนขยะที่ล้อมรอบ [planet.GetName] ได้ลดลงไปในระดับที่พวกมันไม่เป็นภัยคุกคามสำคัญต่อยานอวกาศที่แล่นผ่านอีกต่อไป\n\nในวันข้างหน้า งานจะยังคงดำเนินต่อไปในระดับที่เล็กลง มันอาจจะเป็นไปไม่ได้ที่จะทำความสะอาดวงโคจรให้เกลี้ยงเกลาทั้งหมด แต่อย่างน้อยส่วนที่เลวร้ายที่สุดก็ได้ผ่านพ้นไปแล้ว"
 colony.9320.a: "ในที่สุดทุกสิ่งก็สามารถกลับคืนสู่สภาวะปกติได้แล้ว"
 colony.9325.name: "ถูกปิดกั้นพื้นที่ภาคพื้น"
 colony.9325.desc: "หลังจากปฏิเสธความกังวลเรื่องขยะอวกาศที่หลุดการควบคุมในวงโคจรรอบ [Planet.GetName] สถานการณ์ก็ได้ทวีความรุนแรงขึ้นอย่างรวดเร็ว\n\nตามที่นักวิทยาศาสตร์อาณานิคมคาดไว้ เศษขยะอวกาศแต่ละชิ้นได้ชนกันและทำให้เกิดวงแหวนเศษขยะขนาดเล็ก(พูดตะกุกตะกัก)รอบดาวเคราะห์ สิ่งนี้ทำให้การขนส่งทรัพยากรและผู้คนเข้าหรือออกจากอาณานิคมทำได้ยากยิ่ง โดยเสี่ยงต่อความเสียหายข้างเคียงอย่างมาก"
 colony.9325.a: "อุ๊ย"
 colony.9330.name: "ดาวตก"
 colony.9330.desc: "หลังจากปฏิเสธความกังวลเรื่องขยะอวกาศที่หลุดการควบคุมในวงโคจรรอบ [Planet.GetName] ดูเหมือนว่าปัญหาจะคลี่คลายไปได้เอง\n\n'ดาวตก' นับพันดวงเริ่มตกลงมาเป็นจำนวนมาก เนื่องจากแรงดึงดูดที่รุนแรงของดาวเคราะห์ดวงนี้ดึงขยะเข้ามาใกล้มากพอที่จะเผาไหม้ในชั้นบรรยากาศ การชุมนุมยามค่ำคืนกลายเป็นเรื่องปกติเมื่อผู้คนพากันมาชมการแสดงที่ไม่เหมือนใครนี้"
 colony.9330.a: "ได้เวลาชมดาวเพื่อพักผ่อนหย่อนใจแล้ว"
 colony.9335.name: "ท้องฟ้าสดใส"
 colony.9335.desc: "การเฉลิมฉลองครั้งประวัติศาสตร์ปะทุขึ้นบน [planet.GetName] เมื่อกะสุดท้ายของเจ้าหน้าที่เก็บขยะอวกาศสิ้นสุดลง\n\nณ วันนี้ วงแหวนขยะที่เคยล้อมรอบดาวเคราะห์ตรวจจับไม่ได้อีกต่อไป เนื่องจากความสำเร็จนี้ บรรดาคนเก็บขยะจึงได้รับแรงสนับสนุนอย่างล้นหลามเพื่อให้ดำเนินงานต่อ เพื่อรับประกันว่าท้องฟ้าจะสดใสสำหรับคนรุ่นหลังสืบไป"
 colony.9335.a: "วันที่สำคัญยิ่ง"
 orbital_cleanup: "การทำความสะอาดวงโคจร"
 orbital_cleanup_DESC: "วงโคจรของ [Root.GetName] เต็มไปด้วยเศษซากอวกาศหลังจากการชนกันในชั้นบรรยากาศชั้นล่าง จะต้องทำความสะอาดมันก่อนที่จะเกิดผลกระทบลูกโซ่ทำให้ไม่สามารถเข้าถึงดาวเคราะห์ดวงนี้ได้"
 orbital_cleanup_intense: "การทำความสะอาดวงโคจรอย่างเข้มข้น"
 orbital_cleanup_intense_DESC: "วงโคจรของ [Root.GetName] เต็มไปด้วยเศษซากอวกาศหลังจากการชนกันในชั้นบรรยากาศชั้นล่าง จะต้องทำความสะอาดอย่างทั่วถึงเพื่อรับประกันอนาคตที่ปลอดภัยสำหรับผู้อยู่อาศัย โดยไม่คำนึงถึงค่าใช้จ่าย"
 job_astrogarbage_collector: "นักเก็บขยะอวกาศ"
 job_astrogarbage_collector_plural: "นักเก็บขยะอวกาศ"
 job_astrogarbage_collector_desc: "หน่วยงานพิเศษที่มีหน้าที่รับผิดชอบในการเก็บรวบรวมเศษขยะอวกาศจากวงโคจรของดาวเคราะห์"
