 colony.9840.b.phobe:0 "สิ่งมีชีวิตเหล่านี้เชื่อใจไม่ได้"
 colony.9840.b.swarm:0 "มีสิ่งต่างๆ ให้ฝูงสัตว์เลขาณรื่นเริงเพิ่มขึ้น!"
 colony.9840.b.exterminator:0 "ทุกสิ่งล้วนจำเป็นต้องถูกกวาดล้าง แม้กระทั่งพวกเขาเอง"
 colony.9840.b.tooltip:0 "คนโง่เขลาเหล่านี้ปล่อยตัวเองให้ปราศจากการป้องกัน!"
 colony.9840.c:0 "ช่วยเหลือให้ได้มากที่สุดเท่าที่เป็นไปได้"
 colony.9840.c.phobe:0 "พวกเขาไม่ใช่สิ่งมีชีวิตต่างดาวแปลกหน้า ปล่อยให้พวกเขาเข้ามา!"
