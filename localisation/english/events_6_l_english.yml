 #Deposit
 d_stasis_prison:0 "เรือนจำจำศีล"
 d_stasis_prison_desc:0 "ภายในดวงจันทร์ของดาวเคราะห์ดวงนี้ คอมเพล็กซ์เรือนจำที่ถูกทิ้งร้างเชื่อมต่อกับเครือข่ายของพ็อดจำศีลที่ก้าวหน้าอย่างยิ่ง นักโทษที่ถูกแช่แข็งอยู่ภายในไม่สามารถหลบหนีได้"
 d_prisoner_intergration: "การบูรณาการอย่างมีระบบ"
 d_prisoner_intergration_desc: "การปล่อยตัวนักโทษในคุกจำศีลทั้งหมดในคราวเดียวอาจเป็นความผิดพลาด การพิจารณาพวกเขาเป็นรายกรณีจะช่วยรับประกันว่าแต่ละคนจะปรับตัวเข้ากับสังคมของเราได้อย่างสมบูรณ์"
 d_meals_in_pods: "มื้ออาหารในพ็อด"
 d_meals_in_pods_desc: "ผู้ที่ถูกแช่แข็งในตู้นอนจำศีลเหมาะสำหรับนำมาทำเป็นอาหารสำเร็จรูปสำเร็จรูปเป็นอย่างยิ่ง"

 #Special Project
 STASIS_PRISON_PROJECT: "ปริศนาของอนุภาค"
 STASIS_PRISON_PROJECT_DESC: "ชาวอาณานิคม [Owner.GetColonistPluralCap] บน [Root.GetName] ได้หายตัวไปอย่างลึกลับ เบาะแสในคดีชี้ให้เห็นการมีอยู่ของสารตกค้างอนุภาคที่มีประจุไฟฟ้าเฉพาะตัว เราจะใช้ข้อมูลทั้งหมดที่มีเพื่อค้นหาตำแหน่งของ [Owner.GetColonistPlural] ที่สูญหาย"

