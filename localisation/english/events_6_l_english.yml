 INTEMPORAL_ORB_CAT:0 "ลูกทรงกลมปริศนา"
 INTEMPORAL_ORB_CAT_DESC:0 "เราได้ค้นพบพลังงานที่ควบแน่นอย่างเข้มข้นในรูปแบบของทรงกลม แนะนำให้เข้าทำการสำรวจ"

 ## Event: Concentrated Energy
 anomaly.7105.name:0 "พลังงานควบแน่น"
 anomaly.7105.desc:0 "แหล่งที่มาของค่าตรวจวัดพลังงานที่ผิดปกติซึ่งพบได้บน [From.GetName] ได้รับการยืนยันแล้วว่าเป็นลูกทรงกลมสีฟ้าขนาดเล็ก คณะ [Owner.GetScientistPlural] รายงานว่าเซ็นเซอร์สามารถจับแทคีออนที่มีขั้วตรงกันข้ามได้\n\nสัญลักษณ์ถูกจารึกไว้บนพื้นดินรอบวัตถุดังกล่าว อาจจะสร้างขึ้นโดยอารยธรรมโบราณ ทั้งนี้ยังไม่ชัดเจนว่าสัญลักษณ์เหล่านั้นเป็นคำแนะนำหรือคำเตือนกันแน่\n\nคำจารึกแบบเต็มรูปแบบยังห่างไกลจากการถอดรหัสได้สำเร็จ แต่สัญลักษณ์แต่ละตัวดูเหมือนจะเกี่ยวข้องกับการวัดเวลาและตำแหน่งสัมพัทธ์ของวัตถุท้องฟ้าในระบบดาว [Solar_System.GetName]"
 anomaly.7105.a.standard:0 "ศึกษาลูกทรงกลม"
 anomaly.7105.a.devouring:0 "กินลูกทรงกลม"
 anomaly.7105.b:0 "อันตรายเกินไป ปล่อยมันไว้!"

 ## Event: Local Time Reversal
 anomaly.7110.name:0 "การย้อนเวลาระดับท้องถิ่น"
 anomaly.7110.desc:0 "ลูกทรงกลมพลังงานสีฟ้าที่ตรวจพบครั้งแรกบน [FromFrom.GetName] ได้หายไปแล้ว การสแกนพื้นที่ไม่พบร่องรอยของทรงกลมที่แปลกประหลาดนี้เลย สิ่งที่น่าพิศวงยิ่งกว่านั้นคือการลบเลือนของเครื่องหมายบนพื้นดิน: ราวกับว่าพวกมันไม่เคยอยู่ที่นั่นมาก่อนเลย\n\nเมื่อพิจารณาจากค่าแทคีออนที่ผิดปกติซึ่งเราตรวจพบ ณ ไซต์งาน คณะ [Owner.GetScientistPlural] ของเราได้ตั้งสมมติฐานว่าทั้งลูกทรงกลมและการจารึกอักษรต่างกำลังเคลื่อนที่ย้อนกลับผ่านกาลเวลา"

 ## Event: Timeless
 anomaly.7115.name:0 "เวลาไหลดั่งสายน้ำ"
 ### Regular empires are non-gestalt empires with a non-robot scientist
 anomaly.7115.desc.regular:0 "ขณะปฏิบัติงานในพื้นที่บน [FromFrom.GetName] [Root.GetLeaderName] ได้เผลอไปสัมผัสกับลูกทรงกลมสีฟ้าเข้า\n\nภายหลัง [leader.GetHeSheCap] ได้บอกเล่าถึงภาพนิมิตเกี่ยวกับกาลเวลาที่ทอดยาวราวกับแม่น้ำสู่อดีตและอนาคตอันไม่มีที่สิ้นสุด เบื้องหน้าของ [leader.GetHimHer] พลังงานสีฟ้าโค้งตัวพวยพุ่งออกมาจากกระแสกาลเวลาและถูกดูดซับเข้าสู่ร่างกายของ [leader.GetHimHer] แม้ว่าเหตุการณ์ดังกล่าวจะวัดระยะเวลาได้อย่างเที่ยงตรงโดย [Owner.GetScientistPlural] ท่านอื่นว่ายาวนานไม่ถึงหนึ่งวินาที ทว่า [leader.GetHeShe] กลับสัมผัสถึงมันเป็นเวลานานกว่าหนึ่งชั่วโมง\n\nหลังจากภาพนิมิตสิ้นสุดลง [Root.GetLeaderName] ก็แน่ใจว่าเวลาจะไม่ส่งผลกระทบต่อ [leader.GetHimHer] อีกต่อไป ด้วยชีวิตที่เป็นนิรันดร์ข้างหน้า [leader.GetHeShe] ต้องการจะใช้ช่วงเวลาอันไม่มีที่สิ้นสุดนี้เพื่อออกเดินทางสำรวจจักรวาลด้วยตัวของ [leader.GetHimHer] เอง"
 ### Scientist is already immortal
 anomaly.7115.desc.immortal:0 "ขณะปฏิบัติงานในพื้นที่บน [FromFrom.GetName] นักวิทยาศาสตร์รุ่นเยาว์ [intemporal_leader.GetName] ได้เผลอไปสัมผัสกับลูกทรงกลมสีฟ้าเข้า\n\nภายหลัง [intemporal_leader.GetHeSheCap] ได้บอกเล่าถึงภาพนิมิตเกี่ยวกับกาลเวลาที่ทอดยาวราวกับแม่น้ำสู่อดีตและอนาคตอันไม่มีที่สิ้นสุด เบื้องหน้าของ [intemporal_leader.GetHimHer] พลังงานสีฟ้าโค้งตัวพวยพุ่งออกมาจากกระแสกาลเวลาและถูกดูดซับเข้าสู่ร่างกายของ [intemporal_leader.GetHimHer] แม้ว่าเหตุการณ์ดังกล่าวจะวัดระยะเวลาได้อย่างเที่ยงตรงโดย [Owner.GetScientistPlural] ท่านอื่นว่ายาวนานไม่ถึงหนึ่งวินาที ทว่า [intemporal_leader.GetHeShe] กลับสัมผัสถึงมันเป็นเวลานานกว่าหนึ่งชั่วโมง\n\nหลังจากภาพนิมิตสิ้นสุดลง [intemporal_leader.GetName] ก็แน่ใจว่าเวลาจะไม่ส่งผลกระทบต่อ [intemporal_leader.GetHimHer] อีกต่อไป ด้วยชีวิตที่เป็นนิรันดร์ข้างหน้า [intemporal_leader.GetHeShe] ต้องการจะใช้ช่วงเวลาอันไม่มีที่สิ้นสุดนี้เพื่อออกเดินทางสำรวจจักรวาลด้วยตัวของ [intemporal_leader.GetHimHer] เอง"
 ### Empire is a gestalt consciousness (hive or machine intelligence)
 anomaly.7115.desc.hive:0 "ขณะปฏิบัติงานในพื้นที่บน [FromFrom.GetName] [Root.GetLeaderName] ได้เผลอไปสัมผัสกับลูกทรงกลมสีฟ้าเข้า\n\n[leader.GetHeSheCap] ได้รับภาพนิมิตเกี่ยวกับกาลเวลาที่ทอดยาวราวกับแม่น้ำสู่อดีตและอนาคตอันไม่มีที่สิ้นสุด เบื้องหน้าของ [leader.GetHimHer] พลังงานสีฟ้าโค้งตัวพวยพุ่งออกมาจากกระแสกาลเวลาและถูกดูดซับเข้าสู่ร่างกายของ [leader.GetHimHer] แม้ว่าเหตุการณ์ดังกล่าวจะวัดระยะเวลาได้อย่างเที่ยงตรงโดย [Owner.GetScientistPlural] ท่านอื่นว่ายาวนานไม่ถึงหนึ่งวินาที ทว่า [leader.GetHeShe] กลับสัมผัสถึงมันเป็นเวลานานกว่าหนึ่งชั่วโมง\n\nหลังจากภาพนิมิตสิ้นสุดลง พวกเรามั่นใจว่าเวลาจะไม่ส่งผลกระทบต่อ [Root.GetLeaderName] อีกต่อไป ด้วยชีวิตที่เป็นนิรันดร์ข้างหน้า พวกเราสามารถใช้ช่วงเวลาอันไม่มีที่สิ้นสุดนี้เพื่อออกเดินทางสำรวจจักรวาลด้วยตัวของ [leader.GetHimHer] เอง"
 ### Empire is devouring swarm
 anomaly.7115.desc.devouring:0 "[Root.GetLeaderName] กินลูกทรงกลมสีฟ้าบน [FromFrom.GetName]\n\n[leader.GetHeSheCap] ได้รับภาพนิมิตเกี่ยวกับกาลเวลาที่ทอดยาวราวกับแม่น้ำสู่อดีตและอนาคตอันไม่มีที่สิ้นสุด เบื้องหน้าของ [leader.GetHimHer] พลังงานสีฟ้าโค้งตัวพวยพุ่งออกมาจากกระแสกาลเวลาและถูกดูดซับเข้าสู่ร่างกายของ [leader.GetHimHer] แม้ว่าเหตุการณ์ดังกล่าวจะวัดระยะเวลาได้อย่างเที่ยงตรงโดย [Owner.GetScientistPlural] ท่านอื่นว่ายาวนานไม่ถึงหนึ่งวินาที ทว่า [leader.GetHeShe] กลับสัมผัสถึงมันเป็นเวลานานกว่าหนึ่งชั่วโมง\n\nหลังจากภาพนิมิตสิ้นสุดลง พวกเรามั่นใจว่าเวลาจะไม่ส่งผลกระทบต่อ [Root.GetLeaderName] อีกต่อไป ด้วยชีวิตที่เป็นนิรันดร์ข้างหน้า พวกเราสามารถใช้ช่วงเวลาอันไม่มีที่สิ้นสุดนี้เพื่อออกเดินทางสำรวจจักรวาลด้วยตัวของ [leader.GetHimHer] เอง"

 anomaly.7115.a:0 "ใช่แล้ว เดินทางปลอดภัย!"
