 job_myrmeku_power_farmer_plural: "ผู้ทำฟาร์มพลังงานเมียร์เมกู"
 job_myrmeku_power_farmer_desc: "ช่างเทคนิคที่คอยเก็บเกี่ยวพลังงานจากอาณานิคมเมียร์เมกู"
