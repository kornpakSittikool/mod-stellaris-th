 mod_job_astrogarbage_collector_gestalt_per_pop: "§G+1§! อาชีพ $job_astrogarbage_collector_gestalt$ ต่อ $VALUE$ ประชากร"
 mod_job_astrogarbage_collector_gestalt_per_pop_short: "\n§G+1§! £job_astrogarbage_collector_gestalt£ ต่อ $VALUE$ £pop£"
 d_astrogarbage_collector: "ยูนิตเก็บขยะอวกาศ"
 d_astrogarbage_collector_desc: "ด้วยการลดปริมาณเศษขยะในวงโคจร โลกดวงนี้หวังที่จะรักษาความสามารถในการเดินทางสู่อวกาศไว้"
 d_sprawling_landfill_blocker: "หลุมฝังกลบขยะที่แผ่ขยาย"
 d_sprawling_landfill_blocker_desc: "เนินขยะที่ไม่มีวันสิ้นสุด แผ่ขยายขอบเขตอย่างรวดเร็วออกจากโซนที่กำหนดไว้"
 trash_rings: "วงแหวนขยะ"
 trash_rings_desc: "ดาวเคราะห์ดวงนี้ถูกห้อมล้อมไปด้วยวงแหวนหลวม ๆ ของเศษซากอวกาศเทียม"
 ground_locked: "ถูกปิดกั้นการเดินทางภาคพื้น"
 ground_locked_desc: "หลังการชนกันอย่างรุนแรงของขยะอวกาศในวงโคจรต่ำของดาวเคราะห์ ยานพาหนะใด ๆ จะไม่สามารถแล่นผ่านไปได้จนกว่าจะมีประกาศแจ้งให้ทราบ"
 clear_skies: "ท้องฟ้าปลอดโปร่ง"
 clear_skies_desc: "ท้องฟ้าของโลกใบนี้เพิ่งจะได้รับการเคลียร์ขยะอวกาศที่เป็นอันตรายออกไป ช่วยให้ผู้คนเดินทางเข้าออกได้ตามใจชอบ"
 shooting_stars: "ดาวตกพวยพุ่ง"
 shooting_stars_desc: "โลกใบนี้เผชิญกับพายุดาวตกเป็นระยะ ๆ เนื่องจากเศษขยะอวกาศเกิดการเผาไหม้ในวงโคจร"

 ### MYRMEKU
