 job_stasis_warden_drone_desc:0 "โดรนพัศดีคอยดูแลรักษาคุกจำศีล ควบคู่ไปกับการทำเครื่องหมายพวกเบี่ยงเบนเพื่อทำการทำให้หายตัวไป"
