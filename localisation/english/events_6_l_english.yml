 fungal_emitters_category:0 "การปล่อยสัญญาณแปลกประหลาด"
 fungal_emitters_category_desc:0 "สัญญาณที่ไม่คาดคิดกำลังถูกส่งออกมาจากถ้ำใต้ดินบน [From.GetName] นี่อาจจะเป็นสัญญาณรูปแบบใดรูปแบบหนึ่งงั้นหรือ?"

 anomaly.6755.name:0 "ผู้ปล่อยสปอร์เชื้อรา"
 anomaly.6755.desc:0 "ใต้พื้นผิวของ [From.GetName] มีสิ่งมีชีวิตที่แปลกประหลาดมากอาศัยอยู่ ผลการสแกนและตัวอย่างแสดงให้เห็นว่ามันคือเส้นใยรา(โลหะ)ที่เต็มไปด้วยสปอร์ เมื่อเปรียบเทียบกับขนาดของสปอร์ทั่วไปบนดาวบ้านเกิดของเรา สปอร์เหล่านี้มีขนาดมหึมามาก พื้นผิวของมันระยิบระยับเหมือนกล้องคาไลโดสโคป และเฉดสีดูเหมือนจะเปลี่ยนไปตามสภาพแวดล้อมโดยรอบ\n\nสิ่งที่แปลกประหลาดที่สุดเกี่ยวกับพวกมันคือดูเหมือนว่าจะสร้างเครือข่ายที่สามารถผลิตสิ่งที่ลูกเรือวิทยาศาสตร์เชื่อว่าอาจเป็นสัญญาณได้ การปล่อยก๊าซในปัจจุบันอ่อนมาก แต่หากใช้ความพยายามเพียงเล็กน้อย ก็อาจเป็นไปได้ที่จะสืบหาเบาะแสว่าพวกมันนำทางไปที่ใด"
 anomaly.6755.a:0 "เราจะพยายามระบุทิศทางปลายทางของสัญญาณ"
 anomaly.6755.b:0 "นำพวกมันกลับมาเพื่อจำหน่าย"
 anomaly.6755.c:0 "เราไม่มีเวลาสำหรับเรื่องนี้"
 anomaly.6760.intro:0 "ใต้พื้นผิวของ [From.GetName] มีสิ่งมีชีวิตที่คุ้นเคยอาศัยอยู่ ผลการสแกนและตัวอย่างแสดงให้เห็นว่ามันคือเส้นใยรา(โลหะ)บางชนิด ที่เต็มไปด้วยสปอร์ขนาดมหึมาและมีความเกี่ยวข้องโดยตรงกับ'Fumongus'อย่างไรก็ตาม สปอร์ของมันดูเหมือนจะเกิดการกลายพันธุ์และเติบโตเป็นเม็ดกลมขนาดเล็ก พื้นผิวหลากสีสันที่เปลี่ยนแปลงอยู่ตลอดเวลาของมันเป็นภาพที่น่าตื่นตาตื่นใจอย่างยิ่ง แต่ที่สำคัญกว่านั้นคือ พวกมันดูเหมือนจะสร้างสัญญาณที่แรงกว่าสปอร์ปกติ"
 anomaly.6760.desc:0 "$anomaly.6760.intro$\n\nนักวิทยาศาสตร์ของเราตั้งสมมติฐานว่าเราอาจจะสามารถสร้างความแข็งแกร่งให้กับเครือข่ายปัจจุบันได้โดยการนำสปอร์บางส่วนเหล่านี้กลับไปที่'Fumongus'"
 anomaly.6760.a:0 "เตรียมโครงการเพื่อดำเนินการดังกล่าว"
 anomaly.6760.b:0 "แค่นำข้อมูลกลับมาก็พอ"
 anomaly.6765.desc:0 "$anomaly.6760.intro$\n\nเนื่องจากเราได้แยกส่วนทำลายเครือข่ายไปแล้ว เราจึงไม่มีประโยชน์ในทางปฏิบัติสำหรับข้อมูลนี้จริงๆ"
 anomaly.6770.name:0 "ติดตามเชื้อรา"
 anomaly.6770.intro:0 "การติดตามสัญญาณที่ปล่อยออกมาจากเส้นใยราได้รับการพิสูจน์แล้วว่าเป็นงานที่ยุ่งยากซับซ้อน"
 anomaly.6770.desc:0 "$anomaly.6770.intro$ นักวิทยาศาสตร์ผู้สับสนของเราในที่สุดก็ทำได้สำเร็จโดย 'การใช้เห็ดเพื่อมองเข้าไปในมิติเพิ่มเติม' รายละเอียดเกี่ยวกับเรื่องนี้นั้นมีอยู่น้อยมาก แต่ไม่ว่าในกรณีใด: ปฏิบัติการนี้ประสบความสำเร็จและชี้ทิศทางให้เราไปยังจุดหมายปลายทาง"
 anomaly.6770.a:0 "กำหนดพิกัดนำทาง!"
 anomaly.6780.desc:0 "$anomaly.6770.intro$ แม้ว่า [Root.GetLeaderName] จะพยายามอย่างเต็มความสามารถแล้ว แต่ก็ไม่สามารถระบุจุดหมายปลายทางของสัญญาณได้ และเส้นใยราส่วนใหญ่ยังคงเป็นปริศนา อย่างไรก็ตาม เราสามารถเรียนรู้สิ่งต่างๆ ได้มากมายในระหว่างกระบวนการ และข้อมูลกำลังถูกส่งกลับมาในขณะที่เราพูดคุยกัน"
 anomaly.6785.name:0 "การขยายเครือข่ายเห็ด"
 anomaly.6785.desc:0 "การทาบกิ่งสปอร์ที่กลายพันธุ์เข้ากับเห็ดที่มีอยู่เดิมนั้นถือเป็นความสำเร็จของวิศวกรรมชีวภาพ ด้วยความช่วยเหลือจากบันทึกจดหมายเหตุที่ระบุรายละเอียดเกี่ยวกับการดัดแปลงพันธุกรรมที่ทำไปแล้วกับ'Fumongus'นักวิทยาศาสตร์ของเราจัดการดัดแปลงมันเพิ่มเติมโดยไม่ลดทอนประสิทธิภาพของมัน ผลลัพธ์ที่ได้นั้นน่าทึ่งมาก และในเวลาเพียงไม่กี่เดือน เห็ดก็เติบโตขึ้นถึงสิบเท่า สิ่งนี้ส่งผลให้ความต้องการน้ำเพื่อหล่อเลี้ยงพวกมันเพิ่มขึ้นตามไปด้วย แต่ดาวเคราะห์น้อยเยือกแข็งในบริเวณใกล้เคียงมีน้ำเพียงพอที่จะทำให้พวกมันชุ่มชื้นได้เป็นเวลาหลายศตวรรษ หรืออาจเป็นพันปีเลยทีเดียว\n\nเมื่อเห็ดมีขนาดใหญ่ขึ้น เครือข่ายก็ดีขึ้นด้วย และหลังจากการอัปเกรดอุปกรณ์คำนวณบางส่วน บัดนี้เราพร้อมอีกครั้งที่จะรับฟังสิ่งที่สปอร์ต้องการจะบอกเล่า"

 FOLLOWING_FUNGI_PROJECT:0 "เส้นทางเชื้อรา"
 FOLLOWING_FUNGI_PROJECT_DESC:0 "ความผิดปกติบน [From.GetName] เผยให้เห็นการมีอยู่ของกลุ่มเชื้อราประหลาดที่กำลังส่งสัญญาณไป... ที่ไหนสักแห่ง ด้วยการขยายสัญญาณที่แหล่งกำเนิด นักวิทยาศาสตร์ของเราเชื่อว่าเราจะสามารถค้นพบจุดหมายปลายทางของสัญญาณนั้นและเข้าใจเกี่ยวกับเส้นใยรานี้มากขึ้น"
 MUSHROOMING_NETWORK_PROJECT:0 "การทาบกิ่งสปอร์"
 MUSHROOMING_NETWORK_PROJECT_DESC:0 "การค้นพบสปอร์ที่กลายพันธุ์เป็นโอกาสอันเป็นเอกลักษณ์ในการพัฒนาเครื่องรับฟังสัญญาณผ่านเส้นใยรา(เสียงร้องเพลง)สปอร์เหล่านี้มีขนาดใหญ่ขึ้น ส่งสัญญาณที่แรงขึ้น และสามารถช่วยเราส่งเสริมการพัฒนาของ'Fumongus'ได้"

 fumongus_chain_title:0 "$FOLLOWING_FUNGI_PROJECT$"
 fumongus_chain_desc:0 "$anomaly.6770.desc$"
 fumongus_poi_1:0 "$FOLLOWING_FUNGI_PROJECT$"
 fumongus_1_desc:0 "$anomaly.6770.desc$"

 ### Fumongus Colony Events
 #Events

 colony.2060.name:0 "การเก็บเห็ด"
 colony.2060.desc:0 "การศึกษาเชิงนิเวศวิทยาตามปกติของอาณานิคมของเราบน [Root.GetName] ได้บังเอิญพบกับสิ่งมีชีวิตประเภทเชื้อราที่แปลกประหลาด ทีมวิทยาศาสตร์รายงานว่าพื้นผิวของเส้นใยรานั้นระยิบระยับและมีสีสัน แต่สิ่งที่ทำให้พวกเขาสนใจมากที่สุดคือข้อเท็จจริงที่ว่ากลุ่มที่แยกจากกันดูเหมือนจะสื่อสารกันได้ทุกเมื่อที่มีเหตุการณ์เกิดขึ้นภายในรัศมีกว้าง\n\nยิ่งไปกว่านั้น ชีววิทยาของสิ่งมีชีวิตชนิดนี้ดูเหมือนจะเป็นสิ่งแปลกปลอมอย่างชัดเจนต่อระบบนิเวศของอาณานิคม ทีมวิทยาศาสตร์ในพื้นที่ที่กำลังสับสนจึงร้องขอความช่วยเหลือจากผู้เชี่ยวชาญเฉพาะทาง เนื่องจากเราอาจกำลังรับมือกับสายพันธุ์ที่มีสติปัญญา"
 colony.2060.a:0 "กำจัดพวกมันทิ้งเสีย"
 colony.2060.b:0 "เข้าไปตรวจสอบอย่างใกล้ชิด"
 colony.2060.c:0 "... พวกมันมีความเกี่ยวข้องกับฟูมงุส!"
 colony.2065.name:0 "สปอร์มีหู"
 colony.2065.desc:0 "เราได้รับรายงานที่น่ากังวลจาก [Root.GetName] จากการตรวจสอบเพิ่มเติม ดูเหมือนว่าเชื้อราต่างดาวที่เราพบกำลังปล่อยสัญญาณไปยังตำแหน่งในกาแล็กซีที่เรายังไม่สามารถระบุได้จนถึงปัจจุบัน การวิเคราะห์ทางไกลและข้อมูลความปลอดภัยบ่งชี้ว่ามีความเป็นไปได้โดยสิ้นเชิงที่เส้นใยรานี้จะเป็นสิ่งมีชีวิตสอดแนมขั้นสูงบางประเภท\n\nอย่างไรก็ตาม เป็นเรื่องสำคัญที่ต้องตระหนักว่าสิ่งมีชีวิตนี้มีอายุเก่าแก่มาก มีโอกาสสูงที่ใครก็ตามที่สร้างเห็ดสอดแนมเหล่านี้ขึ้นมาอาจจะไม่มีชีวิตอยู่แล้ว แต่ถ้าพวกเขาสยังอยู่ มันอาจจะดีที่สุดที่จะไม่ไปแหย่ผู้ล่าที่กำลังหลับใหลอยู่"
 colony.2065.a:0 "เราจำเป็นต้องรู้มากกว่านี้"
 colony.2065.b:0 "นี่มันเสี่ยงเกินไป ทำลายพวกมันทิ้งเสีย"
 colony.2070.intro:0 "การวิเคราะห์อย่างระมัดระวังเกี่ยวกับเส้นใยราและสัญญาณแสดงให้เห็นว่ามันน่าจะเป็นส่วนหนึ่งของเครือข่ายสิ่งมีชีวิตที่คล้ายคลึงกัน ซึ่งอาจครอบคลุมไปทั่วทั้งกาแล็กซี และอาจไกลกว่านั้น แม้ว่าเราจะยังไม่รู้อะไรมากนัก แต่เราก็พบว่าในฐานะที่เป็นส่วนหนึ่งของเครือข่าย เส้นใยรานี้ยังได้รับสัญญาณจากสถานที่อื่นๆ อีกด้วย"
 colony.2070.name:0 "มีคนกำลังฟังอยู่"
 colony.2070.desc:0 "$colony.2070.intro$\n\nเราไม่สามารถแน่ใจได้ แต่เมื่อพิจารณาจากปัจจัยหลายประการ รวมถึงปริมาณข้อมูลที่ส่งผ่าน เราเชื่อว่ามีใครบางคนกำลังใช้งานเครือข่ายและรวบรวมข้อมูลจากมันอย่างจริงจัง บัดนี้เรากำลังดำเนินการตามแผนการปล่อยข่าวกรองลวงเพื่อต่อต้าน และมาตรการรักษาความปลอดภัยกำลังได้รับการอัปเดตทั่วทั้งจักรวรรดิเพื่อรับมือกับวิธีการจารกรรมรูปแบบนี้"
 colony.2070.a:0 "เริ่มปฏิบัติการข่าวกรองลวงได้!"
 colony.2075.name:0 "ไม่มีใครกำลังฟังอยู่"
 colony.2075.desc:0 "$colony.2070.intro$\n\nเมื่อพิจารณาจากปัจจัยหลายประการ รวมถึงปริมาณข้อมูลที่ส่งผ่าน เราไม่คิดว่าเครือข่ายนี้ยังคงมีการใช้งานอยู่ ข้อเท็จจริงที่ว่ามันยังคงเปิดทำงานอยู่บางส่วนแสดงให้เห็นว่ามันอาจจะแค่หลับใหลอยู่และยังไม่ถูกทำลาย"
 colony.2075.a:0 "เราสามารถเรียนรู้อะไรจากมันได้บ้าง?"
 colony.2080.name:0 "การเชื่อมต่อของสปอร์"
 colony.2080.desc:0 "ความคลางแคลงใจใดๆ ที่เรามีเกี่ยวกับการเชื่อมต่อของเชื้อรานี้เข้ากับเครื่องรับฟังสัญญาณผ่านเส้นใยราได้รับการขจัดไปอย่างรวดเร็วหลังจากการเปรียบเทียบสั้นๆ นี่คือหนึ่งในลูกหลานจำนวนมากที่สื่อสารกับฟูมงุสและนี่อาจเป็นโอกาสที่จะทำให้เราเข้าใจเกี่ยวกับสิ่งมีชีวิตชนิดนี้ได้ลึกซึ้งยิ่งขึ้น"
 colony.2080.a:0 "ลองดูว่าเราจะสามารถเสริมความแข็งแกร่งให้แก่เครือข่ายได้หรือไม่"
 colony.2080.b:0 "ใช้มันเพื่อจับตาดูอาณานิคมอย่างใกล้ชิดยิ่งขึ้น"
 colony.2080.c:0 "เราได้รื้อถอนเครือข่ายไปแล้ว แต่เรายังสามารถศึกษามันได้อยู่"
 colony.2085.name:0 "ความไม่สงบใน [Root.GetName]"
 colony.2085.desc:0 "ข่าวเกี่ยวกับโครงการของเราในการใช้เส้นใยราท้องถิ่นเพื่อเฝ้าติดตามอาณานิคมอย่างใกล้ชิดได้แพร่สะพัดออกไป และมันไม่ได้รับการยอมรับที่ดีนัก แม้ว่าเราจะพยายามอย่างเต็มที่เพื่อคลี่คลายสถานการณ์ แต่ประชากรในพื้นที่ต่างพิจารณาว่านี่เป็นการผิดสัญญาความไว้วางใจ และเรียกร้องให้เรายุติโครงการนี้ในทันที\n\nสถานการณ์กำลังทวีความรุนแรงอย่างรวดเร็ว และเจ้าหน้าที่บังคับใช้กฎหมายในพื้นที่ของเรากำลังรับมือไม่ไหว พวกเขาต้องการความช่วยเหลือในการรักษาการควบคุมอาณานิคมหากเราเลือกที่จะดำเนินโครงการต่อไป"
 colony.2085.a:0 "ประชากรพูดถูก ยกเลิกโครงการ"
 colony.2085.b:0 "ถ้าพวกเขาไม่มีอะไรต้องปิดบัง ก็ไม่มีอะไรต้องกลัว"
 colony.2090.name:0 "สปอร์คือหูของเรา"
 colony.2090.desc:0 "เราได้เพาะเลี้ยงเส้นใยราบน [Root.GetName] และปรับแต่งอุปกรณ์คำนวณในพื้นที่เพื่อคัดกรองสัญญาณรบกวน ทีมงานที่รับผิดชอบรายงานว่าบัดนี้เครือข่ายกำลังเฝ้าติดตามชาวอาณานิคมอย่างใกล้ชิด อาชญากรลหุโทษจำนวนหนึ่งได้รับการลงโทษอย่างเหมาะสมแล้วในขณะนี้\n\nน่าเสียดายที่ความพยายามในการจำลองการติดตั้งในสถานที่อื่นๆ ประสบความล้มเหลว มีความเป็นไปได้สูงว่ามีปัจจัยที่ไม่ทราบแน่ชัดบางประการที่ส่งผลอยู่ที่นี่"
 colony.2095.name:0 "เชื้อราล้มเหลว"
 colony.2095.desc:0 "ความพยายามของเราในการกระตุ้นการแพร่กระจายของเส้นใยราบน [Root.GetName] ส่งผลให้เกิดการเจริญเติบโตของเห็ดแบบ 'ดั้งเดิม' มากขึ้น เหตุการณ์ประจวบเหมาะกับชาวอาณานิคมบางคนได้แสดงให้เห็นว่าพวกมันสามารถรับประทานได้ เหตุการณ์นี้ทำให้เครือข่ายทั้งหมดเสียสมดุลไปชั่วขณะ แต่บัดนี้ดูเหมือนจะกลับมาเสถียรและใช้งานได้แล้ว อย่างไรก็ตาม ไม่พบการปรับปรุงที่สำคัญใดๆ ในภาพรวม ดูเหมือนว่าเห็ดเหล่านี้เป็นเพียงแหล่งเก็บสะสมน้ำเท่านั้น พวกมันไม่ได้มีส่วนร่วมในเครือข่ายและการทำลายพวกมันก็ไม่ได้ส่งผลกระทบใดๆ เช่นกัน"
 colony.2095.a:0 "เก็บเกี่ยวพวกมัน"
 colony.2095.b:0 "ศึกษาวิเคราะห์พวกมัน"

 terra.15.name:0 "อุปกรณ์ปรับสภาพดาวเคราะห์ส่วนเกิน"
 terra.15.desc:0 "หลังจากเสร็จสิ้นกระบวนการปรับสภาพดาวเคราะห์(รูปร่าง)ของ §Y[From.GetName]§! แล้ว [Owner.GetTerraformerPlural] ของเราได้สังเกตเห็นโอกาสทอง อุปกรณ์ปรับสภาพดาวเคราะห์ที่เหลืออยู่อาจสามารถนำกลับมาใช้ประโยชน์ใหม่เป็นโครงสร้างพื้นฐานสำหรับดาวเคราะห์ดวงนี้ได้"
 terra.15.a:0 "เราต้องการที่อยู่อาศัยเพิ่มขึ้น"
 terra.15.b:0 "สร้างโรงหล่อโลหะบางส่วน"
 terra.15.c:0 "ขยายขีดความสามารถด้านพลังงานของโลกใบนี้"
 terra.15.c.tooltip:0 "เพิ่ม §G2§! §Y$district_generator_plural$§! ให้แก่ดาวเคราะห์"
 terra.15.d:0 "เรามีเหมืองแร่มากเกินไปไม่ได้หรอก"
 terra.15.d.tooltip:0 "เพิ่ม §G2§! §Y$district_mining_plural$§! ให้แก่ดาวเคราะห์"
 terra.15.e:0 "เพิ่มฟาร์มเกษตรกรรมให้แก่ [From.GetName]"
 terra.15.e.tooltip:0 "เพิ่ม §G2§! §Y$district_farming_plural$§! ให้แก่ดาวเคราะห์"
 terra.15.f:0 "แค่แยกชิ้นส่วนอุปกรณ์เก็บเป็นเศษเหล็กก็พอ"
 terra.20.name:0 "ความงามที่ผ่านการตกแต่งวิศวกรรม"
 terra.20.desc:0 "การปรับสภาพดาวเคราะห์บน §Y[From.GetName]§! เสร็จสิ้นเร็วกว่าที่คาดไว้ในตอนแรก ส่งผลให้ [Root.GetTerraformerPlural] ของเรามีเวลาเหลือในการทดลอง และผลลัพธ์ที่ได้ก็น่าทึ่งมาก คุณลักษณะทางธรรมชาติของดาวเคราะห์ได้รับการยกระดับให้ทั้งสวยงามทางสุนทรียภาพและมีประโยชน์ใช้สอยที่ยอดเยี่ยม"
 terra.20.a:0 "มหัศจรรย์ยิ่งนัก!"
 terra.20.b:0 "มันจำเป็นต้องดูประดิษฐ์ขึ้นมากขนาดนี้เลยหรือ?"
 terra.25.name:0 "อุปสรรคของการปรับสภาพดาวเคราะห์"
 terra.25.desc:0 "โครงการระยะยาวของเราบน §Y[From.GetName]§! ลงเอยด้วยความล้มเหลวบางส่วนอย่างน่าผิดหวัง ในขณะที่หุบเขาสุดท้ายกำลังอยู่ระหว่างการปรับสภาพดาวเคราะห์ เกิดการทำงานผิดปกติขึ้นในเครื่องจัดตำแหน่งมวลชีวภาพ(กระแอม)ส่งผลให้เกิดพื้นที่ขนาดใหญ่ของ §Yกากสารตกค้างจากการปรับสภาพดาวเคราะห์(การตกแต่ง)§! แม้จะไม่เป็นอันตรายต่อชาวอาณานิคมของเรา แต่มันหมายความว่าดาวเคราะห์จะแออัดขึ้นเล็กน้อยในขณะนี้"
 terra.25.a:0 "อย่าปล่อยให้เหตุการณ์เช่นนี้เกิดขึ้นอีก"
 terra.30.name:0 "เรียนรู้จากความผิดพลาด"
 terra.30.desc:0 "[Owner.GetTerraformerPlural] ของเราได้ทำความสะอาด §Yกากสารตกค้างจากการปรับสภาพดาวเคราะห์(การตกแต่ง)§! ชิ้นสุดท้ายบน §Y[Root.GetName]§! เสร็จสิ้นแล้ว แม้ว่ากระบวนการเก็บกวาดจะยากลำบากและเหนียวเหนอะหนะเป็นอย่างยิ่ง แต่มันก็ไม่ได้สูญเปล่า การวิเคราะห์สาเหตุของปัญหานี้และผลกระทบที่ตามมาช่วยนำไปสู่การพัฒนาความเข้าใจในศาสตร์การปรับสภาพเปลือกดาว(เสียงรบกวน)ของเรา"
 terra.30.a:0 "อย่างน้อยที่สุดก็ยังมีเรื่องดีๆ เกิดขึ้นบ้าง"
 terra.35.name:0 "[Root.GetHomeWorldName]2"
 terra.35.desc:0 "เราไม่เพียงแต่ประสบความสำเร็จในการปรับสภาพดาวเคราะห์ §Y[From.GetName]§! เท่านั้น แต่เรายังทำสิ่งที่ดีกว่านั้นอีกด้วย ในช่วงท้ายของกระบวนการ [Root.GetTerraformerPlural] ของเราจัดการสร้างดาวดวงนี้ให้เป็นบ้านที่สมบูรณ์แบบสำหรับสัตว์ป่าในท้องถิ่นของเรา สร้าง [From.GetPlanetMoon] ที่คล้ายคลึงกับ [Root.GetHomeWorldName] อย่างน่าขนลุก พืชพรรณท้องถิ่นทั้งหมดของเราอยู่ที่นั่น แต่ไม่มีภูมิประเทศที่คุ้นเคยเลย"
 terra.35.a:0 "[From.GetPlanetMoon] ดวงนี้จะต้องเป็นที่รู้จักในนาม [Root.GetHomeWorldName]2"
 terra.35.a.tooltip:0 "ตั้งชื่อของ §Y[From.GetName]§! เป็น §Y$terra.35.name$§!"
 terra.35.b:0 "การพัฒนาที่โชคดีเป็นอย่างยิ่ง"
 terra.40.name:0 "การเดิมพันระดับดวงดาว"
 terra.40.desc:0 "สถานการณ์พิเศษที่ไม่เหมือนใครได้เกิดขึ้นบน §Y[From.GetName]§! ในขณะที่ความพยายามในการปรับสภาพดาวเคราะห์กำลังจะสิ้นสุดลง [Root.GetTerraformerPlural] ของเราได้ค้นพบว่ามีความเป็นไปได้ที่จะทำให้ [From.GetPlanetMoon] ถูกล็อกด้วยแรงไทดัล(ล็อคประตู)การเกิดขึ้นตามธรรมชาติตี้อาจเป็นผลเสียอย่างมากต่ออาณานิคม อย่างไรก็ตาม การทำสิ่งนี้ในระหว่างกระบวนการปรับสภาพดาวเคราะห์จะช่วยให้เราสามารถใช้ประโยชน์จากชั่วโมงรับแสงสุริยะที่ไม่มีสิ้นสุดบนซีกดาวฝั่งกลางวัน และผลิตพลังงานจำนวนมหาศาลได้ เรายังคงต้องทุ่มเทความพยายามอย่างเป็นเอกภาพในการจัดตั้งอุตสาหกรรมและที่อยู่อาศัยที่เหลืออยู่ของเราบนซีกดาวฝั่งพลบค่ำและฝั่งกลางคืน"
 terra.40.a:0 "ทำให้ [From.GetPlanetMoon] กลับมาหมุนรอบตัวเองอีกครั้ง ความเสี่ยงนั้นสูงเกินไป"
 terra.40.b:0 "ลงมือทำเลย"
 terra.40.b.tooltip:0 "ปลดล็อก §Yการตัดสินใจบนดาวเคราะห์(การตัดสินใจเรื่องบรรยากาศ)§! พิเศษเพื่อปลดปล่อยศักยภาพสูงสุดของ [From.GetPlanetMoon] นี้"
 terra.45.name:0 "ทรัพยากรส่วนเกินสู่ความสำเร็จ"
 terra.45.desc:0 "ในขณะที่การปรับสภาพดาวเคราะห์ของ §Y[From.GetName]§! กำลังเสร็จสิ้นลง เราพบว่าโครงการนี้ทำให้เราอยู่ในสถานการณ์ที่คาดไม่ถึง เราไม่จำเป็นต้องใช้ทรัพยากรมากเท่ากับที่เราตั้งไว้ในตอนแรกเพื่อดำเนินโครงการนี้จนเสร็จสิ้น และบัดนี้เรามีโอกาสที่จะเพิ่มคุณลักษณะพิเศษเข้าไปอีกหนึ่งประการใน [From.GetPlanetMoon] [Root.GetTerraformerPlural] ของเราเสนอสามทางเลือกที่แตกต่างกันแก่เรา"
 terra.45.a:0 "เราต้องการเขต $district_generator_plural$ เพิ่มเติม"
 terra.45.b:0 "ดูว่าเราจะสามารถพัฒนาพื้นที่สำหรับเขต $district_mining_plural$ เพิ่มขึ้นได้หรือไม่"
 terra.45.c:0 "โลกใบนี้ควรมีเขต $district_farming_plural$ เพิ่มขึ้น"
 terra.50.name:0 "ความเป็นหนึ่งเดียว"
 terra.50.desc:0 "ในขณะที่กำลังเปลี่ยนสภาพ §Y[From.GetName]§! ให้เป็นโลก [This.GetClassAdj] [This.GetAAnPlanetClass] เหล่า [Root.GetTerraformerPlural] จัดการเชื่อมโยงไม่เพียงแค่สัตว์ป่าในท้องถิ่นเข้ากับจิตสำนึกร่วมเท่านั้น แต่ด้วยการกลายพันธุ์ที่ผิดปกติเมื่อสัมผัสกับก๊าซปรับสภาพดาวเคราะห์ ยังทำให้จิตสำนึกร่วมเชื่อมโยงเข้ากับโลกใบนี้โดยตรงด้วย บัดนี้กลุ่มจิตร่วมมีโอกาสที่จะกลายเป็นหนึ่งเดียวในความหมายที่แท้จริงยิ่งกว่าเดิม"
 terra.50.a:0 "ใช่ จิตร่วมต้องการเช่นนั้น"
 terra.50.b:0 "ไม่ นี่ไม่ใช่เจตจำนงสำหรับโลกใบนี้"
 terra.55.name:0 "การจัดระเบียบอันสมบูรณ์แบบ"
 terra.55.desc:0 "การก้าวข้ามธรรมชาติไม่ใช่เรื่องใหม่สำหรับจิตร่วมกลุ่มนี้ ในระหว่างกระบวนการปรับสภาพดาวเคราะห์ของ §Y[From.GetName]§! เนินเขาทุกแห่งได้รับการพิจารณา และสัตว์ป่าทุกตัวได้รับการจัดวางอย่างมีกลยุทธ์ บัดนี้ [From.GetPlanetMoon] ลงเอยด้วยการเป็นสรวงสวรรค์ด้านโลจิสติกส์ที่จัดระเบียบอย่างสมบูรณ์แบบสำหรับ [Root.GetUnitDronePlural] ของเราในการผลิตสิ่งต่างๆ เพื่อผลประโยชน์ของจิตร่วมกลุ่ม"
 terra.60.name:1 "การขุดพบ [GetPreFTLUpperPlural]"
 terra.60.desc:1 "ในขณะที่ปรับปรุงดินและเพิ่มชั้นบรรยากาศให้แก่ §Y[From.GetName]§! [Root.GetTerraformerPlural] ของเราได้ทำการค้นพบที่คาดไม่ถึง ภายใต้พื้นผิวของ [From.GetName] มีอารยธรรมของสิ่งมีชีวิตต่างดาวใต้ดินอาศัยอยู่ อาจเป็นเพราะความหนาแน่นของแร่ธาตุใน [From.GetPlanetMoon] ทำให้เครื่องสแกนของเราตรวจไม่พบพวกเขาในตอนแรก\nดูเหมือนว่า [GetPreFTLLowerPlural] จะไม่รู้ตัวเลยว่าพื้นผิวโลกเบื้องบนเปลี่ยนไปแล้ว ทำให้เรามีโอกาสเลือกที่จะดำเนินการใดๆ กับพวกเขาตามต้องการ"
 terra.60.a:0 "แปลกตาดีแท้"
 terra.60.b:0 "สรุปคือพวกตัวก่อกวนวิ่งพล่านอยู่ใต้ดินในตอนนี้สินะ"
 terra.60.c:0 "มันเป็นเรื่องดีที่ได้เห็นว่าจักรวาลนี้ไม่ได้ปราศจากสิ่งมีชีวิตทรงภูมิปัญญา"
 terra.55.a:0 "น่ายินดียิ่งนัก"
 terra.65.name:0 "จุดตำหนิที่เป็นประโยชน์"
 terra.65.desc:0 "สิ่งที่ [Root.GetTerraformerPlural] ของเราคาดการณ์ไว้ในตอนแรกว่าเป็นแหล่งกักเก็บก๊าซพิษที่เป็นอันตรายบน §Y[From.GetName]§! กลับกลายเป็นพรประเสริฐ! ไอระเหยเป็นพิษที่มันกำลังปล่อยออกมาเป็นรูปแบบดิบของ §Yก๊าซพิศดาร(แก๊สไฟฟ้า)§! ด้วยทรัพยากรธรรมชาติใหม่นี้ พลังงานที่ต้องใช้ในการสร้างชั้นบรรยากาศให้แก่ [From.GetPlanetMoon] จึงลดลงอย่างมหาศาล และเราสามารถเก็บเกี่ยวผลประโยชน์จากก๊าซนี้ไปได้อีกหลายปีข้างหน้า!"
 terra.65.a:0 "ยอดเยี่ยมมาก"
 terra.70.name:0 "การกลายพันธุ์ที่คาดไม่ถึง"
 terra.70.desc:0 "[Root.GetTerraformerPlural] ของเรามีทั้งข่าวดีและข่าวร้ายสำหรับเราเกี่ยวกับ §Y[From.GetName]§! ข่าวดีคือกระบวนการปรับสภาพดาวเคราะห์ดำเนินไปอย่างราบรื่นมาก และตอนนี้เราได้โลกไกอา(Geea World)ที่สวยงาม ส่วนข่าวร้ายคือทุกคนที่อาศัยอยู่บน [From.GetPlanetMoon] สัมผัสกับก๊าซปรับสภาพดาวเคราะห์และไม่สามารถไปดำรงชีวิตอยู่บนโลกที่ไม่ใช่ไกอาได้อีกต่อไป ที่น่าประหลาดใจคือผู้อยู่อาศัยที่ถูกกักไว้บนโลกไกอาเหล่านี้แสดงผลผลิตที่เพิ่มขึ้นในขณะที่อยู่บนโลกไกอา ซึ่งทำงานได้ดีกว่าคนงานที่ไม่ได้ผลกระทบจากก๊าซที่อพยพย้ายถิ่นฐานมาอยู่ที่นั่นในภายหลังมาก"
 terra.70.a:0 "อย่างน้อยที่สุดพวกเขาก็ดูเหมือนจะไม่ได้อึดอัดทรมานอะไร"
 terra.75.name:0 "สรวงสวรรค์มีอยู่จริงบน [From.GetName]"
 terra.75.desc_regular:0 "ในหมู่ [Root.GetTerraformerPlural] ของเราที่ได้รับมอบหมายให้ประจำอยู่บน §Y[From.GetName]§! ดูเหมือนจะมีกลุ่มผู้เลื่อมใสในนิกายโบราณจาก [Root.GetHomeWorldName] รวมอยู่ด้วย ชาว [Root.GetSpeciesNamePlural] เหล่านี้เชื่อว่ามีดินแดนสวรรค์สำหรับคนของเรา และแทนที่จะเฝ้าค้นหา บัดนี้พวกเขาได้สร้างมันขึ้นมาแล้ว [From.GetName] ได้รับการดัดแปลงให้เป็น [From.GetPlanetMoon] แห่งผู้ได้รับพร ดูราวกับเป็นภาพวาดประกอบที่หลุดออกมาจากหน้าหนังสือประวัติศาสตร์โบราณของเรา"
 terra.75.desc_spirit:0 "นักปรับสภาพดาวเคราะห์ของเราได้สร้างผลงานที่ยอดเยี่ยมเหนือกว่าสิ่งใดที่เคยทำมาในอดีต! ตลอดประวัติศาสตร์ของ [Root.GetName] มีตำนานและเรื่องเล่าเกี่ยวกับดินแดนศักดิ์สิทธิ์สำหรับคนของเรา ซึ่งก็คือสรวงสวรรค์ เมื่อเราออกเดินทางสู่ดวงดาวและไม่พบดินแดนแห่งความสุขอันแท้จริง โครงการที่ทำให้มันเป็นจริงขึ้นมาจึงถูกริเริ่มโดย [Root.GetTerraformerPlural] ของเรา บัดนี้เส้นขอบฟ้าอันน่าเกรงขามของ §Y[From.GetName]§! ทอดยาวอยู่ตรงหน้าเรา และเรารู้แล้วว่าเราได้สร้างสรวงสวรรค์ของพวกเราขึ้นมาเอง"
 terra.75.a:0 "มันช่างงดงามเหลือเกิน"
 terra.75.b:0 "มันก็แค่โลกไกอาธรรมดาๆ หรือเปล่า?"
 terra.80.name:0 "พืชพรรณดูดซับรังสี"
 terra.80.desc:0 "ในขณะที่กำลังขจัดกัมมันตภาพรังสีในชั้นบรรยากาศและดินของ §Y[From.GetName]§! [Root.GetTerraformerPlural] ของเราต้องเรียกตัวนักชีววิทยาต่างดาวเข้ามาช่วยเหลือ พวกเขาได้พบสิ่งมีชีวิตสายพันธุ์หนึ่งที่ดูเหมือนจะเจริญเติบโตได้ดีจากรังสีแต่ตอนนี้กำลังเหี่ยวเฉาลง ที่น่าสนใจไปกว่านั้นคือ ดูเหมือนสิ่งมีชีวิตสายพันธุ์นี้จะเป็นสัตว์ยุคก่อนภูมิปัญญา(เตรียมใจ)และกำลังเข้าใกล้ช่วงของการรับรู้สติปัญญา บัดนี้เมื่ออุปกรณ์ชำระล้างหน้าดินขั้นตอนสุดท้ายกำลังใกล้เข้ามา เราจึงต้องตัดสินใจว่าจะทำอย่างไรกับชีวิตใหม่นี้"
 terra.80.a:0 "เราได้ทำลายถิ่นที่อยู่อาศัยของพวกมันแล้ว ตอนนี้เราต้องอนุรักษ์พวกมันไว้"
 terra.80.a.tooltip:0 "ประชากรยุคก่อนภูมิปัญญา £pop£ §Hป๊อปของรังสีดาราศาสตร์§! จำนวน 400 หน่วยจะถูกเพิ่มเข้าไปใน [This.GetName]"
 terra.80.b:0 "ทำไมไม่เปิดโอกาสให้พวกเขาเข้าร่วมกับพวกเราล่ะ?"
 terra.80.c.indifferent:0 "เก็บเกี่ยววัตถุดิบทางพันธุกรรมของพวกมัน"
 terra.80.c.xenophile:0 "ศึกษาวิเคราะห์ชีววิทยาของพวกมัน"
 terra.80.c.cantuse:0 "แม้ว่าจะนำมาใช้กับเราไม่ได้โดยตรง แต่ข้อมูลพันธุกรรมของพวกมันก็น่าจะมีประโยชน์"
 terra.80.c.tooltip:0 "ปลดล็อกคุณลักษณะ §Y$trait_plantoid_radiotrophic$§! สำหรับการดัดแปลงพันธุกรรม"
 terra.80.d:0 "เราจะไปใส่ใจอะไรกับวัชพืชพวกนี้ ดำเนินการปรับสภาพดาวเคราะห์ให้เสร็จสิ้นเสีย"
 terra.85.name:0 "การต้อนรับที่แผ่รังสี"
 terra.85.desc:0 "หลังจากใช้เวลาหลายปีในการปรับสภาพและตกแต่งสายพันธุ์พืชดูดซับรังสีที่ค้นพบใน §Y[FromFromFrom.GetName]§! บัดนี้เราพร้อมที่จะรับพวกเขาเข้าสู่สังคมของเราแล้ว แม้จะเป็นสายพันธุ์ที่ใหม่มากแต่พวกเขากลับมีความสามารถอันโดดเด่นในการเก็บเกี่ยวพลังงาน"
 terra.85.a:0 "ยินดีต้อนรับ!"
 terra.85.a.tooltip:0 "ประชากร §Hป๊อปของรังสีดาราศาสตร์§! จำนวน §G600§! £pop£ จะถูกเพิ่มเข้าสู่จักรวรรดิของเรา"
 terra.90.name:0 "แหล่งเก็บซ่อนอาวุธ"
 terra.90.desc:0 "การฟื้นฟูโลกสุสาน(ทรอมเวิลด์)มักเป็นงานที่ยากและซ้ำซากจำเจอยู่เสมอ: แบ่งเขตพื้นที่ เคลียร์เศษซาก ปรับปรุงสภาพดิน บำบัดน้ำที่หลงเหลืออยู่ และเพิ่มสัตว์ป่าชนิดใหม่ ในขณะที่กระบวนการปรับสภาพดาวเคราะห์บน §Y[From.GetName]§! ใกล้จะสิ้นสุดลง [Root.GetTerraformerPlural] ของเราได้ค้นพบตู้คอนเทนเนอร์โลหะขนาดใหญ่ใต้ดิน และพิจารณาจากเกราะป้องกันของมัน คาดว่านี่น่าจะเป็นแหล่งเก็บซ่อนอาวุธ"
 terra.90.a:0 "น่าสนใจยิ่งนัก"
 terra.95.name:0 "นำพาอดีตมาสู่แสงสว่าง"
 terra.95.desc:0 "การขุดค้นแหล่งซ่อนบน [From.Planet.GetName] ไม่ใช่เรื่องง่าย เนื่องจากมันถูกฝังอยู่ลึกลงไปใต้ซากปรักหักพังของเมืองที่ค้นพบมัน ความพยายามในการขุดค้นยังล่าช้าลงเนื่องจากความระมัดระวังที่จำเป็นเพื่อหลีกเลี่ยงการกระตุ้นให้สิ่งที่ถูกจัดเก็บไว้ในตู้นั้นทำงาน บัดนี้โครงสร้างดังกล่าวตั้งอยู่ตรงหน้าเราและพร้อมสำหรับการตรวจสอบแล้ว ตัวอักษรต่างดาวที่ซับซ้อนได้รับการแกะสลักไว้ที่ด้านข้างของแหล่งเก็บซ่อนซึ่งอาจจะบอกใบ้ถึงเนื้อหาภายใน"
 terra.100.name:0 "คลังสรรพาวุธ"
 terra.100.desc:0 "[Owner.GetLinguists] ของเราได้ดำเนินการแปลจารึกต่างดาวเสร็จสิ้นแล้ว และค้นพบคำเตือนที่สลักไว้บนตู้เก็บซ่อน §Y§!"ไม่ว่าในสถานการณ์ใดก็ตาม ห้ามรัฐบาลใดเข้าถึงคลังสรรพาวุธนี้ในช่วงเวลาสงครามอย่างเด็ดขาด!"§!\n\nไม่ว่าจะเป็นอาวุธชนิดใดที่จัดเก็บไว้ที่นี่ มันรุนแรงและทำลายล้างมากเกินไปแม้กระทั่งสำหรับอารยธรรมที่เคยนำพาตัวเองไปสู่เถ้าถ่าน สิ่งเดียวที่เหลืออยู่คือการเปิดคลังสรรพาวุธอย่างระมัดระวังและอ้างสิทธิ์ในรางวัลของเรา"
 terra.105.name:0 "การแปลความหมายที่ผิดพลาด"
 terra.105.desc.generic:0 "ดูเหมือนว่า [Owner.GetLinguists] ของเราแปลคำว่า 'ห้องสมุด' (เสียงร้องไห้)ผิดเป็นคำว่า 'คลังอาวุธ' (เสียงดัง)เราได้สันนิษฐานความหมายที่ผิดพลาดว่าเป็น 'แหล่งที่มาของอำนาจ' ซึ่งชัดเจนขึ้นหลังจากที่เราเปิดตู้เก็บและพบกับข้อความต่างดาวเพิ่มเติม §Y§!\"หากคุณกำลังอ่านข้อความนี้ นั่นหมายความว่าเรามีชีวิตรอดจากสงครามและบัดนี้พร้อมที่จะสร้างใหม่แล้ว ฉันใช้เวลาหลายเดือนในการสร้างห้องสมุดนี้ในขณะที่สถานการณ์บนโลกของเราเลวร้ายลง โดยมีเพื่อนและคู่หูที่ซื่อสัตย์คอยเคียงข้าง แต่เนื่องจากคุณกำลังอ่านข้อความนี้ นั่นหมายความว่ามีคนรอดชีวิตอยู่จริง ดังนั้นโปรดมีส่วนร่วมในมรดกทางวัฒนธรรมของคุณ ผลงานทางวัฒนธรรมทั้งหมดของคนของเราที่เพื่อนของฉันและฉันสามารถรวบรวมได้นั้นถูกรวบรวมไว้ที่นี่ และขอให้สิ่งแรกที่คุณเห็นคือตัวแทนของเพื่อนรักที่สุดของฉัน\"§!\n\nซากกระดูกของสัตว์เลี้ยงลูกด้วยนมสองเท้าและรูปปั้นโลหะของสัตว์สี่เท้าจมูกยาวตั้งอยู่ใต้ป้ายแผ่นนั้น"
 terra.105.desc.earth:0 "ดูเหมือนว่า [Owner.GetLinguists] ของเราแปลคำว่า 'ห้องสมุด' (เสียงร้องไห้)ผิดเป็นคำว่า 'คลังอาวุธ' (เสียงดัง)เราได้สันนิษฐานความหมายที่ผิดพลาดว่าเป็น 'แหล่งที่มาของอำนาจ' ซึ่งชัดเจนขึ้นหลังจากที่เราเปิดตู้เก็บและพบกับข้อความต่างดาวเพิ่มเติม §Y§!\"หากคุณกำลังอ่านข้อความนี้ นั่นหมายความว่าเรามีชีวิตรอดจากสงครามและบัดนี้พร้อมที่จะสร้างใหม่แล้ว ฉันใช้เวลาหลายเดือนในการสร้างห้องสมุดนี้ในขณะที่สถานการณ์บนโลกของเราเลวร้ายลง โดยมีเพื่อนและคู่หูที่ซื่อสัตย์อย่างวอลเตอร์คอยเคียงข้าง แต่เนื่องจากคุณกำลังอ่านข้อความนี้ นั่นหมายความว่ามีคนรอดชีวิตอยู่จริง ดังนั้นโปรดมีส่วนร่วมในมรดกทางวัฒนธรรมของคุณ ผลงานทางวัฒนธรรมทั้งหมดของคนของเราที่วอลเตอร์และฉันสามารถรวบรวมได้นั้นถูกรวบรวมไว้ที่นี่ และขอให้สิ่งแรกที่คุณเห็นคือตัวแทนของเพื่อนรักที่สุดของฉัน\"§!\n\nซากกระดูกของสัตว์เลี้ยงลูกด้วยนมสองเท้าและรูปปั้นโลหะของสัตว์สี่เท้าจมูกยาวตั้งอยู่ใต้ป้ายแผ่นนั้น"
 terra.105.a:0 "ลูบรูปปั้น"
 terra.105.b:0 "จัดหมวดหมู่สื่อต่างดาว"
 terra.105.c:0 "เราได้รับคำสัญญาว่าจะได้อาวุธ หลอมห้องสมุดและรูปรูปปั้นนี้ไปทำเป็นขีปนาวุธเสีย"

 #Deposit

 d_fungal_study_zone:0 "เขตวิจัยเชื้อรา"
 d_fungal_study_zone_desc:0 "เห็ด 'สอดแนม' ที่ค้นพบที่นี่เป็นแหล่งข้อมูลที่ไม่สิ้นสุดเกี่ยวกับชีววิทยาอันลึกลับของพวกมันและความเชื่อมโยงเข้าหากัน"
 d_terraforming_blocker:0 "£blocker£ กากสารตกค้างจากการปรับสภาพดาว"
 d_terraforming_blocker_desc:0 "ผลลัพธ์ของโครงการปรับสภาพดาวเคราะห์ที่ประสบความสำเร็จเพียงบางส่วนได้สร้างพื้นที่ของสิ่งมีชีวิตที่น่ารังเกียจและผิดธรรมชาติขึ้น"
 d_dayside_farm:0 "ฟาร์มโซลาร์เซลล์ซีกกลางวัน"
 d_dayside_farm_desc:1 "โลกใบนี้มีระบบพลังงานแสงอาทิตย์ทั้งหมดติดตั้งอยู่บนซีกกลางวันของดาวเคราะห์ที่ถูกล็อกด้วยแรงไทดัล ทำให้สามารถเข้าถึงชั่วโมงรับแสงอาทิตย์ได้ไม่สิ้นสุด"
 d_radiotrophic_preserve:0 "เขตอนุรักษ์พืชดูดซับรังสี"
 d_radiotrophic_preserve_desc:0 "พื้นที่แยกต่างหากที่เต็มไปด้วยความกดอากาศต่ำและชั้นบรรยากาศที่มีกัมมันตภาพรังสีสูงช่วยรักษาชีวิตของสิ่งมีชีวิตพื้นเมืองบนดาวดวงนี้ไว้"

 #Modifier

 fumongus_monitor_pops:0 "เครือข่ายเส้นใยราในท้องถิ่น"
 fumongus_monitor_pops_desc:0 "เราจัดการควบคุมเครือข่ายเชื้อราท้องถิ่นเพื่อเฝ้าติดตามชาวอาณานิคมของเราบนดาวเคราะห์ดวงนี้"
