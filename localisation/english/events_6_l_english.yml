 # Planet Modifiers
 planet_myrmeku_attacks: "การโจมตีจากเมียร์เมกู"
 planet_myrmeku_attacks_desc: "[Owner.GetColonistPluralCapital] ได้รับการโจมตีจากแมลงตัวจิ๋ว"
 planet_myrmeku_seal_colony: "$planet_myrmeku_attacks$"
 planet_myrmeku_seal_colony_desc: "มีการดูแลเป็นพิเศษในการปิดผนึกอาคารทั้งหมดจากสัตว์ท้องถิ่น"
 planet_myrmeku_upgrade_robots: "$planet_myrmeku_attacks$"
 planet_myrmeku_upgrade_robots_desc: "[Owner.GetColonistPluralCapital] ได้รับการออกแบบให้มีเกราะป้องกันพิเศษสำหรับกลไกภายในของพวกเขา"
 planet_myrmeku_pest_control: "$planet_myrmeku_attacks$"
 planet_myrmeku_pest_control_desc: "การทำลายล้างอาณานิคมของแมลงบนพื้นผิวโลกได้รับความสำคัญเป็นอันดับแรก"
 planet_myrmeku_lured: "การเบี่ยงเบนทรัพยากร"
 planet_myrmeku_lured_desc: "วัสดุฉนวนชิปความจำได้รับการเผยแพร่กระจายไปทั่วภูมิประเทศ"
 # Special Project
 MYRMEKU_STUDY_PROJECT: "การศึกษาเมียร์เมกู"
 MYRMEKU_STUDY_PROJECT_DESC: "การศึกษาเมียร์เมกูบน [myrmeku_planet.GetName] เพื่อระบุว่ากิจกรรมอันแข็งขันของพวกมันจะสามารถนำมาแปลงเป็นสิ่งที่มีประโยชน์ได้หรือไม่"

 # Events
 colony.9350.name: "กิจกรรมของเมียร์เมกู"
 colony.9350.desc: "ตั้งแต่เข้ามาตั้งถิ่นฐานบน §Y[Root.GetName]§! เราสังเกตเห็นกิจกรรมของสัตว์ขาปล้องที่เพิ่มมากขึ้น โดยเฉพาะอย่างยิ่ง แมลงสร้างรังขนาดจิ๋วที่เรียกว่า\"เมอร์เมกู\"มีความสามารถในการผลิตสูงขึ้นอย่างไม่คาดคิด\n\nรังใต้ดินของพวกมันแผ่กระจายไปทั่วทั้งทวีปเป็นจำนวนมาก แต่จนถึงขณะนี้พวกมันก็ไม่เคยสร้างปัญหาใด ๆ ยังไม่เป็นที่ทราบแน่ชัดว่าพวกมันกำลังค้นหาบางสิ่งบนพื้นดิน หรือกำลังหลบหนีจากบางสิ่งใต้พื้นพิภพกันแน่"
 colony.9350.a.mem_vault: "อัปเดตข้อมูล\"เมอร์เมกู\"ในคลังความรู้" # Civic Vaults of Knowledge
 colony.9350.a.exp_prot: "เผ่าพันธุ์ที่น่าดึงดูดใจอย่างยิ่ง" # Civic Exploration Protocols

 colony.9355.name: "[Owner.GetColonistPluralCapital] ถูกโจมตี"
 colony.9355.desc: "[Owner.GetColonistPlural] ของเราบน §Y[Root.GetName]§! ถูกโจมตีอย่างรุนแรง! เนื่องจากเดินเข้าไปใกล้รังของเมียร์เมกูมากเกินไป พวกเขาจึงถูกรุมล้อม เมื่อแมลงตัวจิ๋วไต่เข้าไปในช่องเปิดบนร่างกายของ [Owner.GetColonistPlural] เหยื่อก็พ่ายแพ้ไปอย่างรวดเร็ว\n\n[Owner.GetColonistPlural] ที่ร่วงหล่นลงมาถูกแยกชิ้นส่วนในทันที แต่ไม่มีข้อมูลที่สรุปได้ชัดเจนเกี่ยวกับเป้าหมายของแมลงเหล่านั้น พื้นผิวขรุขระของเปลือกนอกที่เป็นแม่เหล็กของเมียร์เมกูทำให้วงจรภายในของเราเสียหาย และเมื่อเมียร์เมกูสองตัวสัมผัสกัน พวกมันจะทำให้เกิดประกายไฟไฟฟ้าขนาดเล็ก ซึ่งทั้งสองอย่างนี้อาจทำให้เกิดความล้มเหลวร้ายแรง\n\nการสูญเสีย [Owner.GetColonistPlural] ด้วยวิธีนี้ทำให้การพัฒนาของ [Root.GetPlanetMoon] ช้าลง จะต้องดำเนินการบางอย่างเพื่อแก้ไขปัญหานี้"
 colony.9355.a: "หาทางออก"

 colony.9360.name: "ตัวกินความทรงจำ"
 colony.9360.desc: "ด้วยความเร็วที่น่าอัศจรรย์เมียร์เมกูได้สร้างโครงสร้างที่แผ่ขยายออกไปหลายแห่งใกล้กับชุมชนของเรา การโจมตีของพวกมันไม่ได้จำกัดอยู่แค่บริเวณรอบนอกอีกต่อไป แต่ได้เริ่มต้นขึ้นภายในโครงสร้างอาคารที่พักอาศัยแล้ว\n\nร่างกายจำนวนมากที่มีให้ทำการชันสูตรได้เปิดเผยเหตุผลที่น่ากังวลว่าทำไมเมียร์เมกูจึงสนใจในตัวเรา: แมลงเหล่านี้กัดกินวัสดุฉนวนของ §Yชิปความจำ(มันฝรั่งทอด)§! ของเรา\n\nสิ่งนี้ส่งผลร้ายแรงต่อเหยื่อในระยะสั้นเท่านั้น เนื่องจากวงจรความจำสามารถเปลี่ยนใหม่ได้และสามารถกู้คืนข้อมูลสำรองกลับมาได้ ทว่าการเปลี่ยนชิ้นส่วนเหล่านี้หมายถึงความล่าช้าในการสร้าง [Owner.GetColonistPlural] ใหม่"
 colony.9360.a: "ปิดผนึกอาณานิคมของเรา"
 colony.9360.a.tt: "มุ่งเน้นไปที่การรักษาความปลอดภัยของอาคาร\n\nตัวปรับเปลี่ยน §Y$planet_myrmeku_attacks$§! ได้รับการอัปเดตเป็น\nความเร็วการประกอบประชากรเครื่องจักร: §R-10%§!\nความเร็วในการสร้างโครงสร้างพื้นฐานดาวเคราะห์: §R-10%§!"
 colony.9360.b: "อัปเกรดร่างกายของเรา"
 colony.9360.b.tt: "มุ่งเน้นไปที่การรักษาความปลอดภัยของ [Owner.GetColonistPlural]\n\nตัวปรับเปลี่ยน §Y$planet_myrmeku_attacks$§! ได้รับการอัปเดตเป็น\nความเร็วการประกอบประชากรเครื่องจักร: §R-10%§!\nค่าบำรุงรักษาหุ่นยนต์: §R+10%§!"
 colony.9360.c: "ทำลายล้างอาณานิคมเมียร์เมกู"
 colony.9360.c.tt: "การป้องกันที่ดีที่สุดคือการโจมตีที่ดี\n\nตัวปรับเปลี่ยน §Y$planet_myrmeku_attacks$§! ได้รับการอัปเดตเป็น\nความเร็วการประกอบประชากรเครื่องจักร: §R-30%§!\n\n"
 colony.9360.d.org_repro: "เก็บเกี่ยวผลผลิตจากแมลง" # Civic Organic Reprocessing
 colony.9360.d.tt: "เราหาประโยชน์ได้จากชีวิตอินทรีย์ทั้งหมด\n\nตัวปรับเปลี่ยน §Y$planet_myrmeku_attacks$§! ได้รับการอัปเดตเป็น\nความเร็วการประกอบประชากรเครื่องจักร: §R-30%§!\n\n"
 colony.9360.e.purifier: "กวาดล้างสิ่งมีชีวิตทั้งหมดบนดาวเคราะห์ดวงนี้" # Civic Determined Exterminator
 colony.9360.e.tt: "สิ่งนี้จะทำลายล้างพวกเมียร์เมกูลง"

 colony.9365.desc: "การกำจัดแมลงศัตรูพืช"
 colony.9365.desc.seal_colony: "อาคารอาณานิคมบน §Y[Root.GetName]§! ถูกปิดผนึกอย่างสมบูรณ์เพื่อป้องกันไม่ให้แมลงเมียร์เมกูเข้ามาได้\n\nทางเข้าของอาคารใหม่และอาคารที่มีอยู่เดิมได้รับการติดตั้งแถบโลหะที่สามารถเหนี่ยวนำแม่เหล็กเพื่อดักจับเมียร์เมกูทว่า [Owner.GetColonistPlural] ก็ยังคงสูญหายไปจากการโจมตีในภาคสนามอยู่ดี"
 colony.9365.desc.upgrade_robots: "ชุดอุปกรณ์อัปเกรดเพื่อจัดเก็บชิปความจำของเราไว้ในเปลือกป้องกันพิเศษได้รับการพัฒนาและทดสอบในภาคสนามแล้ว\n\nน่าเสียดายที่ก้ามหนีบของเมียร์เมกูนั้นแข็งแกร่งพอที่จะกัดกินผ่านวัสดุใด ๆ ที่มีอยู่ได้ หากได้รับเวลาและจำนวนที่เพียงพอ"
 colony.9365.desc.pest_control: "เพื่อทำลายล้างพวกเมียร์เมกูได้มีการส่งหน่วยตรวจตราไปสแกนหาตัวรัง การทำลายโครงสร้างเหนือพื้นดินด้วยไฟและระเบิดนั้นเป็นเรื่องง่าย ทว่าอาณานิคมใต้ดินนั้นฝังตัวลึกเกินกว่าจะถอนรากถอนโคนออกไปได้ทั้งหมด\n\nเราสูญเสีย [Owner.GetColonistPlural] มากยิ่งขึ้นไปอีกในระหว่างปฏิบัติการนี้"
 colony.9365.desc.harvest: "เพื่อควบคุมพวกเมียร์เมกูได้มีการจัดตั้งเครื่องเก็บเกี่ยวชีวภาพใกล้กับอาณานิคมของพวกมัน โครงสร้างที่อยู่เหนือพื้นดินสามารถเก็บเกี่ยวได้ง่าย ทว่าอาณานิคมใต้ดินนั้นฝังตัวลึกเกินกว่าจะเก็บเกี่ยวหรือกำจัดออกไปได้ทั้งหมด\n\nเราสูญเสีย [Owner.GetColonistPlural] มากยิ่งขึ้นไปอีกในระหว่างปฏิบัติการนี้"
 colony.9365.a: "จำเป็นต้องมีทางออกที่ดีกว่านี้"

 colony.9370.name: "ทางเลือกนิวเคลียร์"
 colony.9370.desc: "ทุกสิ่งได้รับการจัดเตรียมสำหรับการกวาดล้างสิ่งมีชีวิตทางชีวภาพบน §Y[Root.GetName]§! แล้ว\n\nการเฝ้าสังเกตการณ์ [Root.GetPlanetMoon] จากวงโคจรในระหว่างเหตุการณ์จะทำให้เรามีโอกาสชื่นชมความซับถ้วนของสิ่งมีชีวิตอินทรีย์บนพื้นผิวที่ลดน้อยลงไป"
 colony.9370.a: "งดงามและประณีตยิ่ง"

 colony.9375.name: "ข้อเสนอรูทีนย่อยสำหรับการวิเคราะห์"
 colony.9375.desc: "ความพยายามจนถึงขณะนี้ยังไม่สามารถแก้ไขปัญหาเมียร์เมกูได้อย่างเบ็ดเสร็จ แมลงเหล่านี้ยังคงคลานไปทั่ว [Root.GetName] เป็นจำนวนมหาศาล ทำให้การเดินทางและการปฏิบัติงานนอกอาณานิคมทำได้ยากลำบาก รูทีนย่อยในการวิเคราะห์ของเราสรุปแบบจำลองสถานการณ์อนาคตที่เป็นไปได้โดยเสนอแนวทางดังต่อไปนี้\n\nแนวทาง A:เบี่ยงเบนความสนใจของเมียร์เมกูโดยการโปรยวัสดุฉนวนความจำทางอากาศให้ห่างไกลจากอาณานิคมของเรา และรีไซเคิล [Owner.GetColonistPlural] ที่ร่วงหล่น\n\nแนวทางบี:ศึกษาเมียร์เมกูเพื่อดูว่าเราจะสามารถหาหนทางที่จะเปลี่ยนกิจกรรมอันแข็งขันของพวกมันให้เป็นสิ่งที่มีประโยชน์ได้หรือไม่"
 colony.9375.a: "เบี่ยงเบนความสนใจของพวกมัน"
 colony.9375.a.tt: "ตัวปรับเปลี่ยน §Y$planet_myrmeku_attacks$§! ได้รับการอัปเดตเป็น\nค่าบำรุงรักษาหุ่นยนต์: §R+5%§!\n\n"
 colony.9375.b: "ศึกษาพวกมัน"

 colony.9380.name: "ผลลัพธ์อันทรงพลัง"
 colony.9380.desc: "การศึกษาเมียร์เมกูของเราได้ข้อสรุปแล้ว เมื่อนำแม่เหล็กที่ปรับเทียบแล้วไปวางไว้รอบ ๆ ทางเข้ารังของพวกมัน สนามแม่เหล็กในเปลือกนอกของแมลงจะผลิตกระแสไฟฟ้าที่เราสามารถนำไปใช้ประโยชน์ได้\n\nการศึกษายังพบว่าพวกเมียร์เมกูเคลื่อนที่ตามสนามแม่เหล็กในท้องถิ่น ดังนั้นการติดตั้งเปลือกป้องกันที่ล้างแม่เหล็กออกแล้วรอบชิปความจำของเราก็ควรจะเพียงพอสำหรับการปกป้องพวกมันแล้ว"
 colony.9380.a: "ยอดเยี่ยมมาก"

## Event: Glacial Crisis
 colony.7230.name: "วิกฤตธารน้ำแข็ง"
 colony.7230.desc: "รายงานสภาพอากาศล่าสุดจาก [planet.GetName] นำไปสู่ข้อสรุปที่น่ากังวล โดยที่ไม่อาจอธิบายได้ อุณหภูมิพื้นผิวบนดาวเคราะห์เยือกแข็งดวงนี้ได้เพิ่มสูงขึ้นในอัตราที่น่าตกใจ\n\nหากเราล้มเหลวในการระบุสาเหตุของการเสื่อมโทรมอย่างรวดเร็วของระบบนิเวศ สถานการณ์นี้อาจนำไปสู่การละลายครั้งใหญ่ที่เป็นภัยพิบัติของธารน้ำแข็งอันกว้างใหญ่บนดาวเคราะห์ดวงนี้"
 colony.7230.a: "ค้นหาเหตุผลว่าทำไมดาวเคราะห์จึงร้อนขึ้น"
 colony.7230.a.tooltip: "อะไรคือสาเหตุที่เป็นไปได้?"
 colony.7230.b: "ไม่มีอะไรต้องเป็นห่วง"
 colony.7235.name: "รอยร้าวในน้ำแข็ง"
 colony.7235.desc: "การเพิ่มสูงขึ้นของอุณหภูมิบน [flooding_planet.GetName] กำลังเร่งตัวขึ้นอย่างรวดเร็ว ส่งผลให้เกิดรอยแตกร้าวขนาดใหญ่ภายในชั้นน้ำแข็งบนพื้นผิว และเผยให้เห็นมหาสมุทรใต้ดินอันกว้างใหญ่\n\nโชคดีที่การสืบสวนของเราได้ระบุถึงสาเหตุที่เป็นไปได้ของปรากฏการณ์นี้ เนื่องจากการมีอยู่ของเรา เกราะป้องกันชั้นบรรยากาศที่เป็นเอกลักษณ์ซึ่งคอยปกป้องดาวเคราะห์ดวงนี้ได้เริ่มแสดงให้เห็นถึงความเปราะบางในขั้นวิกฤตและอาจพังทลายลงได้ การดำเนินมาตรการที่เข้มงวดเพื่อควบคุมการผลิตของเราจะช่วยลดผลกระทบต่อสิ่งแวดล้อม ซึ่งอาจจะเพียงพอสำหรับการแก้ไขปัญหานี้"
 colony.7235.a: "ทบทวนเป้าหมายการผลิตของเราใหม่"
 colony.7235.b: "ถึงเวลาแล้วที่ยุคน้ำแข็งควรจะสิ้นสุดลง"
 colony.7235.b.tooltip: "เร่งเครื่องยนต์ผลิตให้เต็มกำลัง!"
 colony.7240.name: "การหลอมละลายของแกนโลก"
 colony.7240.desc: "ความพยายามของเราในการจำกัดการปล่อยก๊าซบน [flooding_planet.GetName] ไม่ได้ส่งผลลัพธ์ที่น่าพึงใจนัก เราประสบความสำเร็จเพียงเล็กน้อยในการจัดการวิกฤตนิเวศวิทยาที่กำลังดำเนินอยู่ และพื้นที่ลุ่มต่ำทางภูมิศาสตร์กำลังถูกคุกคามเนื่องจากระดับน้ำทะเลที่สูงขึ้น\n\nในปัจจุบัน ศูนย์กลางประชากรของเรายังได้รับการปกป้องจากผลกระทบโดยตรง ทว่าค่อนข้างแน่นอนแล้วว่าการหลอมละลายทั่วทั้งดาวเคราะห์จะไม่สามารถหลีกเลี่ยงได้"
 colony.7240.a: "พยายามบรรเทาความเสียหาย"
 colony.7240.b: "ประกาศสถานการณ์ฉุกเฉิน!"
 colony.7240.b.tooltip: "ระงับการผลิตทั้งหมดจนกว่าจะพบทางออก"
 colony.7245.name: "ที่ราบลุ่มน้ำท่วมขังอันกว้างใหญ่"
 colony.7245.desc: "อันเป็นผลจากความละเลยของเราในการแก้ไขปัญหาสภาพนิเวศวิทยาที่เสื่อมโทรมลงอย่างรวดเร็วของ [flooding_planet.GetName] สถานการณ์ได้บานปลายกลายเป็นภัยพิบัติร้ายแรงอย่างที่ไม่เคยมีมาก่อน\n\nการแตกสลายของแผ่นน้ำแข็งอันกว้างใหญ่ทำให้เกิดมหาสมุทรที่แผ่ขยายวงกว้าง ทิ้งไว้ซึ่งความเสียหายอย่างใหญ่หลวงและการเปลี่ยนแปลงครั้งใหญ่ การสร้างเขื่อนกั้นน้ำท่วมจะช่วยให้เราปกป้องเมืองที่เหลืออยู่ได้ ทว่าผลกระทบที่คาดเดาไม่ได้มากกว่านั้นยังคงรออยู่บนขอบฟ้า"
 colony.7245.a: "ดาวเคราะห์ดวงนี้กำลังจะถูกน้ำท่วม!"
 colony.7247.name: "ความลับของดินเยือกแข็งคงตัว"
 colony.7247.desc: "ในขณะที่การหลอมละลายของดาวเคราะห์ [flooding_planet.GetName] ยังคงดำเนินต่อไป มีการค้นพบที่น่าทึ่งภายใต้ดินเยือกแข็งคงตัว(เสียงม้า)แหล่งกักเก็บแร่ธาตุและทรัพยากรหายากในขั้วโลกที่อุดมสมบูรณ์อย่างน่าตกใจกำลังรอคอยอยู่ และเรียกร้องเราด้วยความมั่งคั่งและศักยภาพที่ยังไม่ได้นำออกมาใช้งาน"
 colony.7247.a: "โชคก้อนใหญ่แล้ว เริ่มการเจาะได้!"
 colony.7247.b: "ดินเยือกแข็งคงตัวได้รับความเสียหายมามากพอแล้ว"
 colony.7247.b.tooltip: "เราเสี่ยงให้สถานการณ์ย่ำแย่ลงไปกว่านี้ไม่ได้"
 colony.7250.name: "เชื้อก่อโรคที่หลุดจากความเย็น"
 colony.7250.desc: "เกิดเหตุการณ์ที่น่ากังวลขึ้นที่สถานีขุดเจาะขั้วโลกบน [flooding_planet.GetName] คนงานจู่ ๆ ก็ล้มหมดสติไปโดยไม่ทราบสาเหตุ ทำให้จำเป็นต้องกำหนดเขตห้ามผ่านอย่างเข้มงวดเพื่อความปลอดภัยของพวกเขา\n\nการสืบสวนในเบื้องต้นระบุถึงการกำเนิดของไวรัสแฝงตัว ซึ่งตื่นขึ้นจากการที่เขตจำกัดเยือกแข็งถูกรบกวน ธรรมชาติและลักษณะที่แท้จริงของเชื้อก่อโรคที่ตื่นขึ้นนี้ยังคงไม่แน่นอน ทำให้เราต้องเผชิญกับคำถามมากมายที่ไร้คำตอบ ความสามารถในการแพร่เชื้อและอันตรายที่อาจเกิดขึ้นกับผู้คนยังไม่สามารถระบุได้ในตอนนี้"
 colony.7250.a: "ไม่ปล่อยให้มีความเสี่ยงใด ๆ ทำการฆ่าเชื้อพื้นที่ดังกล่าว"
 colony.7250.b: "รักษาระดับการกักกันโรคต่อไป"
 colony.7255.name: "ความมั่งคั่งในขั้วโลก"
 colony.7255.desc: "ในส่วนลึกของภูมิภาคขั้วโลกบน [flooding_planet.GetName] ทีมขุดเจาะได้ค้นพบสิ่งสำคัญขนาดมหึมา ภายใต้ชั้นน้ำแข็งและหิมะที่ปกคลุม มีการพบรูปผลึกขนาดมหึมาที่ชวนให้นึกถึงธารน้ำแข็งอันตระการตา\n\nโครงสร้างที่ยอดเยี่ยมเหล่านี้ถูกหลอมขึ้นภายใต้ความกดดันมหาศาลตลอดเวลาอันยาวนานที่นับไม่ถ้วน ยืนหยัดเป็นเครื่องพิสูจน์ถึงศักยภาพที่ไร้ขีดจำกัดที่เรายังไม่ได้เปิดเผย"
 colony.7255.a: "ช่างเป็นการค้นพบที่เหลือเชื่อจริง ๆ"
 colony.7260.name: "สภาพภูมิอากาศที่มีเสถียรภาพ"
 colony.7260.desc: "เราประสบความสำเร็จครั้งสำคัญในการฟื้นฟูสภาพแวดล้อม\n\nผลพลอยได้ที่ดูเหมือนไม่มีอันตรายซึ่งเกิดจากการเผาไหม้เชื้อเพลิงของเราได้ก่อให้เกิดผลข้างเคียงที่เป็นภัยแฝงเมื่อสัมผัสกับกลุ่มเมฆแบคทีเรียของ [flooding_planet.GetName] ตอนนี้เรารู้แล้วว่ากลุ่มเมฆเหล่านี้มีบทบาทสำคัญในการรักษาจังหวะชีวิตตามธรรมชาติของดาวเคราะห์ด้วยการทำงานเป็นเกราะป้องกันแสงอาทิตย์ เมื่อแบคทีเรียเริ่มลดลงอย่างช้า ๆ เราจึงทำให้ผลกระทบของการปล่อยก๊าซของเราแย่ลงโดยไม่ตั้งใจ\n\nด้วยความรู้ใหม่นี้ มาตรการที่เด็ดขาดได้รับการบังคับใช้ในทันทีเพื่อฟื้นฟูความสมดุลกลับคืนมา"
 colony.7260.a: "ในที่สุด สภาพอากาศก็กลับมามีเสถียรภาพอีกครั้ง"
 colony.7265.name: "จุดสิ้นสุดของยุคน้ำแข็ง"
 colony.7265.desc: "ยุคภูมิอากาศใหม่ได้เริ่มต้นขึ้นเมื่อร่องรอยสุดท้ายของธารน้ำแข็งบน [flooding_planet.GetName] จมหายลงสู่มหาสมุทร การหายไปของดินเยือกแข็งคงตัวได้เปิดเผยดินแดนใต้น้ำอันกว้างใหญ่ที่เต็มไปด้วยทรัพยากรที่ยังไม่ได้นำมาใช้งาน"
 colony.7265.a: "ได้เวลาพักผ่อนที่ชายหาดแล้ว"
 PLANET_MELTDOWN_PROJECT: "วิกฤตสภาพภูมิอากาศ"
 PLANET_MELTDOWN_PROJECT_DESC: "สภาพภูมิอากาศบน [flooding_planet.GetName] กำลังเสื่อมโทรมลงอย่างรวดเร็ว หวังว่าเราจะสามารถหาสาเหตุได้ก่อนที่จะสายเกินกว่าจะย้อนกลับกระบวนการนี้ได้"
 MELTING_RESEARCH_PROJECT: "พื้นผิวที่กำลังละลาย"
 MELTING_RESEARCH_PROJECT_DESC: "อุณหภูมิบน [flooding_planet.GetName] ได้เพิ่มสูงขึ้นในอัตราที่น่าตกใจ คณะ [Root.GetScientistPlural] ของเราจำเป็นต้องขยายขอบเขตการศึกษาเพื่อรับมือกับประเด็นปัญหาใหม่ ๆ ที่เกิดจากสถานการณ์ปัจจุบัน"

 active_melting: "ระดับน้ำที่สูงขึ้น"
