 # Deposit and Job
 d_myrmeku_power_farms: "ฟาร์มพลังงานเมียร์เมกู"
 d_myrmeku_power_farms_desc: "แมลงตัวจิ๋วเหล่านี้ผลิตพลังงานให้เรานำไปใช้งาน"
