 negative_mass_desc: "มวลลบเพิ่งจะปรากฏตัวขึ้นรอบ ๆ โลกบ้านเกิดของเรา ปรากฏการณ์ที่แปลกประหลาดนี้คงจะไม่ใช่สิ่งนำทางไปสู่สิ่งที่สั่นคลอนถึงแก่นแท้ของสังคมเราหรอกนะ"

 # Singing Planet

 SINGING_PLANET_CAT:0 "ค่าที่ตรวจวัดได้ที่แปลกประหลาด"
 SINGING_PLANET_CAT_DESC:0 "ดาวเคราะห์ดวงนี้ปล่อยคลื่นแม่เหล็กไฟฟ้าที่แปลกประหลาด แตกต่างอย่างสิ้นเชิงกับสิ่งที่เราเคยเห็นมาจนถึงตอนนี้ ราวกับว่ามันพยายามจะติดต่อกับเรา จึงเป็นเรื่องสมเหตุสมผลที่จะตรวจสอบปรากฏการณ์ที่ไม่ธรรมดานี้ - เราอาจเพิ่งค้นพบตัวอย่างชีวิตที่น่ามหัศจรรย์ในระดับดาวเคราะห์"

 anomaly.7101.name:0 "ดาวเคราะห์ผู้ขับขาน"
 anomaly.7101.standard.desc:0 "สิ่งที่เราสันนิษฐานในตอนแรกว่าเป็นความพยายามตั้งใจที่จะสื่อสาร กลับกลายเป็นปรากฏการณ์ทางธรรมชาติที่ผิดปกติ คลื่นแม่เหล็กไฟฟ้าที่ดาวเคราะห์ดวงนี้ปล่อยออกมา หากผ่านการปรับแต่งแก้ไขที่เหมาะสม อาจฟังดูคล้ายกับการพูดหรือแม้กระทั่งการร้องเพลง แต่สิ่งเหล่านั้นไม่ได้ถูกสร้างขึ้นโดยสิ่งมีชีวิตที่มีความคิดอ่านแต่อย่างใด อย่างไรก็ตาม นักวิทยาศาสตร์บางส่วนของเราพบว่ามันไพเราะน่าฟังและติดหูมาก\n\nมันอาจจะมีความเป็นไปได้ที่จะใช้ประโยชน์จากปรากฏการณ์นี้ เช่น การต้อนรับศิลปินหรือบุคคลสำคัญ ณ สถานีอวกาศที่สร้างขึ้นเพื่อรับสัญญาณเหล่านี้และเปิดเสียงเป็นดนตรีผ่อนคลาย"
 anomaly.7101.a:0 "น่าทึ่งมาก"
 anomaly.7101.machines.desc:0 "ดาวเคราะห์ดวงนี้กำลังปล่อยสัญญาณชุดหนึ่งที่โดรนสำรวจของเราคาดการณ์ว่าอาจมีต้นกำเนิดจากสิ่งประดิษฐ์ เมื่อตรวจสอบอย่างใกล้ชิด พบว่าสัญญาณดังกล่าวเป็นเพียงปรากฏการณ์ทางธรรมชาติที่เกิดจากคลื่นแม่เหล็กไฟฟ้าที่ผิดปกติแต่ไม่มีอันตราย การค้นพบนี้ไม่ได้สร้างผลประโยชน์ในทันทีให้แก่กลุ่ม แต่เมื่อคำนึงถึงความแปลกใหม่ การศึกษาสัญญาณเหล่านี้อาจทำให้เราได้รับข้อมูลการวิจัยในระยะยาว"
 anomaly.7101.b:0 "ลงบันทึกรายการไว้"
 anomaly.7101.hive.desc:0 "ดาวเคราะห์ดวงนี้กำลังปล่อยสัญญาณชุดหนึ่งที่โดรนสำรวจของเราคาดการณ์ว่าอาจมีต้นกำเนิดจากสิ่งประดิษฐ์ เมื่อตรวจสอบอย่างใกล้ชิด พบว่าสัญญาณเหล่านั้นไม่มีอะไรมากไปกว่าปรากฏการณ์ทางธรรมชาติ แต่มีคุณสมบัติที่พิเศษในการเสริมสร้างการเชื่อมต่อของโดรนต่าง ๆ เข้ากับจิตสำนึกร่วม ดูเหมือนว่าโดรนที่สัมผัสกับคลื่นแม่เหล็กของดาวเคราะห์ดวงนี้จะตอบสนองต่อเจตจำนงของรวงรังได้ดียิ่งขึ้น"
 anomaly.7101.c:0 "ทุกสิ่งเพื่อรวงรัง"
 anomaly.7101.c.desc:0 "รวงรังสามารถลอกเลียนแบบคลื่นแม่เหล็กเหล่านี้และนำมาใช้เพื่อเพิ่มความแข็งแกร่งให้กับเจตจำนงของตนได้"

 # Ancient Manufactorium

 colony.9200.name:0 "ห้องนิรภัยที่ซ่อนอยู่" #starting the event
 colony.9200.desc:0 "ในระหว่างการลาดตระเวนตามมาตรฐานของ [Root.GetName] ยูนิตสำรวจดาวเคราะห์ได้บังเอิญไปพบกับประตูขนาดมหึมาที่นำไปสู่ใจกลางของทิวเขา ดูเหมือนว่าสนามแม่เหล็กที่รุนแรงซึ่งสร้างขึ้นโดยอุปกรณ์พรางตาบางชนิดได้บดบังมันจากเซ็นเซอร์ของยานเรา ทำให้ทางเข้าที่ได้รับการพรางตานี้มองไม่เห็นสำหรับโพรบวิจัยอัตโนมัติที่ทำแผนที่พื้นผิว\n\nในทางกลับกัน การทดสอบเฉพาะทางเพิ่มเติมพบว่าการป้อนกระแสพลังงานอย่างสม่ำเสมอจะช่วยให้ประตูนี้กลับมาทำงานได้อีกครั้ง ซึ่งจะทำให้เราสามารถเปิดมันและดูสิ่งที่อยู่ภายในได้ในที่สุด"
 colony.9200.a:0 "ส่งมอบพลังงาน" #go on with chain
 colony.9200.a.desc:0 "การสร้างโครงข่ายพลังงานอาจต้องใช้เวลา และจะยังคงดึงพลังงานไปใช้อย่างต่อเนื่องในระหว่างการสำรวจห้องนิรภัย"

 colony.9201.name:0 "ความมืดมิดที่รออยู่" #entered the vault
 colony.9201.desc:0 "เมื่อพลังงานไหลผ่านวงจร ทางเข้าก็กลับมาทำงาน และด้วยการปรับแต่งเพิ่มเติม เราก็ค้นพบวิธีการทำงานของประตูได้อย่างรวดเร็ว การวิจัยด้านภูมิประเทศเพิ่มเติมเผยให้เห็นว่าภายในเป็นห้องนิรภัยใต้ดินขนาดใหญ่ โครงสร้างพื้นฐานของเอเลี่ยนครอบคลุมพื้นที่ทุกตารางเซนติเมตรของกำแพง - แม้กระทั่งเสาขนาดมหึมาที่ค้ำยันเพดานอยู่ก็ยังแสดงสัญญาณพลังงานจาง ๆ เมื่อพิจารณาจากค่าพลังงานและความคล้ายคลึงกับเทคโนโลยีของเรา ดูเหมือนว่าที่นี่จะเป็นโรงงานผลิตใต้ดิน"
 colony.9201.a:0 "เราจะเรียนรู้ความลับของมัน" #go forward
 colony.9201.a.desc:0 "เมื่อพิจารณาจากขนาดของปฏิบัติการนี้ มันจะต้องใช้ทรัพยากร แรงงาน และเวลาจำนวนหนึ่งที่ไม่สามารถระบุได้แน่ชัดในการศึกษามันอย่างถ่องแท้ การอัปเดตและรายงานผลงานของพวกเขาอย่างสม่ำเสมอจึงเป็นสิ่งที่คาดหมายได้ล่วงหน้า"
 colony.9201.b:0 "เราเสี่ยงไม่ได้ ให้ติดตั้งระเบิด" #opt out
 colony.9201.b.desc:0 "เราจะปิดผนึกทางเข้าและทำลายสถานที่แห่งนี้ ใครจะรู้ว่าอาจมีอะไรซ่อนอยู่ในห้องนิรภัยนี้"

 colony.9202.name:0 "ระเบิดภูเขา!" #opted out - explosion and crater
 colony.9202.desc:0 "ผู้ที่อยู่ห่างไกลจากห้องนิรภัยสามารถรู้สึกได้ถึงการสั่นสะเทือนของพื้นดิน ส่วนผู้ที่อยู่ใกล้เคียงสามารถเห็นเศษภูเขาขนาดใหญ่ปลิวลอยขึ้นไปบนอากาศ ทำให้เกิดหลุมอุกกาบาตขนาดใหญ่ที่เต็มไปด้วยหิน เศษซาก และเครื่องจักรที่บิดเบี้ยว การคาดเดาอย่างรวดเร็วถึงสาเหตุที่ผิดพลาดนำไปสู่ข้อสรุปว่าเกิดปฏิกิริยาลูกโซ่ขึ้นภายในห้องนิภัยเมื่อการระเบิดครั้งแรกทำลายประตู\n\nอย่างไรก็ตาม ตอนนี้มีเพียงหลุมยุบที่ยังคงมีควันพวยพุ่งเท่านั้นที่เหลืออยู่จากห้องนิรภัยใต้ดิน"
 colony.9202.a:0 "แบบนี้ปลอดภัยกว่า"

 colony.9210.name:0 "การหายตัวไป!" #first problem
 colony.9210.desc:0 "ขั้นตอนแรกของการวิจัยบน [Root.GetName] มุ่งเน้นไปที่การทำแผนที่ทางเข้า ห้องแรกภายในห้องนิรภัยคือโถงขนาดใหญ่ที่ทอดยาวลึกเข้าไปในภูเขา พร้อมกับระเบียงทางเดินที่แยกสาขาออกไปอีกหลายทางลึกเข้าไปในเบื้องล่าง แผ่นป้ายตกแต่งที่สวยงามประดับประดาเสาหินที่แกะสลัก โดยแต่ละแผ่นแสดงถึงเผ่าพันธุ์เอเลี่ยนที่คาดว่าเป็นผู้สร้างสถานที่แห่งนี้ เราไม่สามารถถอดรหัสภาษาของพวกเขาได้ แต่เรื่องราวที่เล่าโดยงานศิลปะเหล่านั้นมุ่งเน้นไปที่การทำสงคราม การดิ้นรน และโครงการอันยิ่งใหญ่\n\nที่น่าหนักใจกว่านั้นคือการสูญเสียหน่วยก่อสร้างไปทั้งหน่วย หลังจากรายงานว่าได้ยินเสียงแปลก ๆ ในความมืด ยูนิตดังกล่าวก็อันตรธานหายไปอย่างไร้ร่องรอย สถานการณ์นี้ตกอยู่ในอันตรายที่จะหลุดจากการควบคุมและต้องการการดำเนินการที่เด็ดขาดยิ่งขึ้น"
 colony.9210.a:0 "เพิ่มกำลังรักษาความปลอดภัยเป็นสองเท่าแล้วค้นหาพวกเขา" #casual
 colony.9210.a.desc:0 "เราจะจัดตั้งทีมค้นหา ทว่าพลเมืองจำนวนมากเริ่มคาดการณ์ถึงสิ่งเลวร้ายที่สุดแล้ว นอกจากนี้เราจะเพิ่มยามเป็นสองเท่าเพื่อป้องกันเหตุการณ์เพิ่มเติม"
 colony.9210.b:0 "ส่งทุกคนเข้าไป ค้นหาพวกเขาให้พบ!" #egalitarian
 colony.9210.b.desc:0 "เราจะปล่อยให้พวกเขาตายไม่ได้! เราจะจัดตั้งหน่วยอาสาสมัครเพื่อออกตามหาผู้สูญหาย!"
 colony.9210.c:0 "ตั้งทีมค้นหา และส่งคนที่เหลือกลับไปทำงาน" #authoritarian
 colony.9210.c.desc:0 "เป็นเรื่องที่คาดหมายได้อยู่แล้วว่าเหตุการณ์เช่นนี้อาจเกิดขึ้น เราจะพยายามค้นหาคนงานที่สูญหาย แต่เราไม่สามารถเลื่อนการดำเนินงานของเราออกไปได้ - เราพร้อมที่จะจ่ายค่าตอบแทนสำหรับเรื่องนี้"
 colony.9210.d:0 "น่ากังวล ส่งโดรนคุ้มกันเพิ่มเติม" #gestalt
 colony.9210.d.desc:0 "ยูนิตที่หายไปจะถูกทดแทนด้วยยูนิตใหม่ การวิจัยจะต้องดำเนินต่อไป"

 colony.9211.name:0 "พบตัวคนงานแล้ว" #casual - pop dies and negative modifier
 colony.9211.desc:0 "ทีมรักษาความปลอดภัยทีมหนึ่งรายงานว่าพบตัวคนงานที่หายไปแล้ว ปรากฏว่าห้องนิรภัยแห่งนี้ยังมีกับดักและอุปกรณ์ที่ใช้งานได้อยู่ ซึ่งถูกโปรแกรมไว้เพื่อดักจับผู้บุกรุกที่ไม่พึงประสงค์ภายใน "กล่อง" ที่ประกอบด้วยกำแพงที่ขยับและเคลื่อนที่ได้\n\nคนงานที่โชคร้ายทั้งหมดเสียชีวิตอยู่ภายในกับดัก พลเมืองของเราโกรธแค้นกับผลลัพธ์ที่เกิดขึ้น แต่อย่างน้อยตอนนี้เราก็รู้แล้วว่าต้องระวังอะไรบ้าง"
 colony.9211.a:0 "นั่นเป็นเรื่องที่แย่มาก"

 colony.9212.name:0 "ช่วยเหลือคนงานสำเร็จ" #egalitarian - pop survives, negative modifier only
 colony.9212.desc:0 "เนื่องจากทีมค้นหาที่มีขนาดใหญ่มาก จึงใช้เวลาไม่นานในการค้นหาคนงานที่สูญหาย คนสุดท้ายในพวกเขานั้นถูกพบว่าติดอยู่ในโครงสร้างคล้ายคุกสี่เหลี่ยมที่ทำจากกำแพงที่เชื่อมต่อกันและเคลื่อนที่ได้เอง ดูเหมือนว่าระบบความปลอดภัยภายในห้องนิรภัยยังคงทำงานอยู่ ด้วยเหตุนี้ เราจะมีความพร้อมมากขึ้นในการรับมือกับกลไกดังกล่าวในอนาคต อย่างไรก็ดี ประชากรต่างไม่พอใจที่คนงานไม่ได้รับการดูแลด้านความปลอดภัยอย่างเหมาะสมตั้งแต่แรก"
 colony.9212.a:0 "เราโชคดีมาก"

 colony.9213.name:0 "พบตัวคนงานแล้ว" #authoritarian - pop dies, no negative modifier
 colony.9213.desc:0 "พบคนงานที่สูญหายอยู่ในกลไกที่น่าเกลียดน่ากลัวซึ่งขังพวกเขาไว้ระหว่างกำแพงเคลื่อนที่สี่ด้าน น่าเสียดายที่บุคคลเหล่านี้ไม่สามารถทำประโยชน์ใด ๆ ให้กับอาณาจักรได้อีกต่อไป แต่อย่างน้อยการเสียสละของพวกเขาก็ทำให้เราได้รู้ถึงการมีอยู่ของกับดักนี้ ตอนนี้การทำงานดำเนินต่อไปโดยไม่มีอะไรมารบกวน และประชากรที่ทำงานอยู่ในพื้นที่ก็รู้สึกผ่อนคลายขึ้นบ้างเมื่อรู้ว่าพวกเขาควรจะปลอดภัย - ในตอนนี้"
 colony.9213.a:0 "พวกเขารู้อันตรายดีอยู่แล้ว"

 colony.9214.name:0 "พบโดรนแล้ว" #gestalt - pop dies
 colony.9214.desc:0 "โดรนที่หายไปถูกพบอยู่ในกลไกอันชาญฉลาดของกำแพงเคลื่อนที่ที่เชื่อมต่อกันเพื่อสร้างพื้นที่คุกที่ปิดมิดชิด น่าเสียดายที่โดรนทั้งหมดของเราเสียหายจนเกินกว่าจะใช้งานได้ จากนี้ไป โดรนสำรวจของเราจะใช้ความรู้นี้เพื่อปลดชนวนกับดักประเภทนี้ การทำงานดำเนินต่อไปโดยไม่มีการรบกวนเพิ่มเติมใด ๆ"
 colony.9214.a:0 "น่าเสียดาย ดำเนินการต่อ"

 colony.9220.name:0 "ห้องโถงรำลึก" #first opportunity
 colony.9220.desc:0 "เราขุดค้นลึกเข้าไปในระเบียงทางเดินที่ [Root.GetName] และได้พบกับโถงขนาดใหญ่ ซึ่งปราศจากเครื่องจักรท่อแบบเดียวกับที่ครอบคลุมทางเดินและกำแพงอื่น ๆ อย่างประหลาด ดูเหมือนว่าใครก็ตามที่สร้างสถานที่นี้จะใส่ใจมันเป็นพิเศษ - มีรูปปั้นจำนวนมากในสภาพที่ดีเยี่ยม แสดงถึงบุคคลที่เดินสองขา แม้จะมีร่องรอยรายละเอียดที่เหลืออยู่แต่พวกเขาก็มีรูปลักษณ์ที่ค่อนข้างคล้ายคลึงกัน น่าเสียดายที่ไม่มีหลักฐานว่าโถงนี้เคยเป็นอะไร นอกเหนือไปจากการอุทิศเพื่อรำลึกถึงบุคคลสำคัญทางประวัติศาสตร์"
 colony.9220.a:0 "บันทึกสิ่งที่ค้นพบ" #casual
 colony.9220.a.desc:0 "มันเป็นแค่ชิ้นงานศิลปะเก่า ๆ ที่ไร้ประโยชน์ ไม่มีมูลค่าที่แท้จริง"
 colony.9220.b:0 "นี่คืองานฝีมืออันประณีต" #master crafters
 colony.9220.b.desc:0 "ช่างฝีมือบางส่วนของเราประหลาดใจกับผลงานที่สร้างขึ้นโดยพวกเอเลี่ยนเหล่านั้น พวกเขาพบร่องรอยของความงามและความกลมกลืนในศิลปะโบราณนั้น"
 colony.9220.c:0 "ช่างเป็นงานแกะสลักหินที่งดงามยิ่งนัก" #sub dwellers
 colony.9220.c.desc:0 "คนของเราพบว่างานแกะสลักหินนั้นมีคุณภาพที่ยอดเยี่ยมอย่างยิ่ง ซึ่งเป็นเรื่องที่น่ายินดีอย่างมากที่ได้พบในสถานที่ที่ไม่คุ้นเคยเช่นนี้"
 colony.9220.d:0 "พวกมันช่างงดงามเหลือเกิน!" #dwarf
 colony.9220.d.desc:0 "สถานที่นี้ดูราวกับเป็นผลงานที่สร้างขึ้นโดยช่างหินและช่างศิลป์ที่ยิ่งใหญ่ที่สุดของเรา นี่เป็นเพียงเรื่องบังเอิญอย่างนั้นหรือ?"

 colony.9230.name:0 "แผ่นดินไหวที่กำลังจะมาถึง!" #earthquake
 colony.9230.desc:0 "เครื่องวัดแผ่นดินไหวของเราตรวจพบแผ่นดินไหวที่กำลังจะเกิดขึ้นบน [Root.GetName] คนงานส่วนใหญ่ปลอดภัยแล้ว แต่มีกลุ่มหนึ่งอยู่ในห้องโถงที่ห่างไกลซึ่งอาจเสี่ยงต่อการพังทลาย พวกเขารายงานว่าพบเครื่องจักรโบราณสองเครื่องที่แตกต่างกันอย่างสิ้นเชิงที่นั่น เครื่องหนึ่งเป็นสิ่งประดิษฐ์ขนาดใหญ่ที่เชื่อมต่อกับพื้นดิน และอีกเครื่องหนึ่งติดตั้งอยู่กับผนังผ่านชุดท่อจำนวนมาก เราไม่สามารถบอกได้ว่าพวกมันมีความสำคัญอะไรกับสิ่งอำนวยความสะดวกนี้หรือไม่ คนงานประเมินว่าอาจจะสามารถใช้เครื่องจักรเครื่องใดเครื่องหนึ่งเหล่านั้นในการเสริมความแข็งแกร่งให้กับเพดานและผนังเพื่อต้านทานแผ่นดินไหวได้"
 colony.9230.a:0 "ใช้ระบบท่อติดผนัง" #casual 1
 colony.9230.b:0 "ใช้เครื่องจักรขนาดใหญ่" #casual 2
 colony.9230.c:0 "อาศัยความเชี่ยวชาญของพวกเขา" #builders
 colony.9230.d:0 "รวงรังจะค้นหาทางออกเอง" #hive divided attention

 colony.9231.name:0 "ปลอดภัยและสมบูรณ์ดี" #casual 1 more upkeep
 colony.9231.desc:0 "คนงานของเราจัดการถอดชิ้นส่วนเครื่องจักรและเสริมความแข็งแกร่งให้กับเสาค้ำและเพดานได้สำเร็จ อย่างไรก็ดี ความพยายามนี้ทำให้ท่อจำนวนมากในผนังเผยออกมา ซึ่งมีเสียงฟู่ดังเล็ดลอดออกมา ในตอนนี้ จึงยังไม่สามารถประเมินความสูญเสียที่อาจเกิดขึ้นได้"
 colony.9231.a:0 "สำเร็จ"

 colony.9232.name:0 "ความปลอดภัยที่เหมาะสม" #casual 2 less produce
 colony.9232.desc:0 "คนงานของเราถอดแยกชิ้นส่วนเครื่องจักรและนำมาใช้เสริมความแข็งแกร่งให้กับเสาค้ำยันและเพดานเก่าได้สำเร็จ - แต่ต้องแลกกับอะไรบ้างล่ะ? การรื้อถอนเครื่องจักรขนาดใหญ่นั้นทำให้เกิดรูโหว่บนพื้นดินซึ่งนำทางลงไปลึกขึ้นในระบบเครื่องจักร ความสูญเสียที่เป็นไปได้สำหรับการกระทำนี้ ในตอนนี้ ยังไม่เป็นที่ทราบแน่ชัด"
 colony.9232.a:0 "สำเร็จ"

 colony.9233.name:0 "การก่อสร้างอย่างเร่งรีบ" #builders - bad thing averted
 colony.9233.desc:0 "คนงานของเราสามารถประเมินสถานการณ์ได้อย่างเหมาะสม และจัดการซ่อมแซมรวมถึงเสริมความแข็งแกร่งให้กับเสาค้ำยันโดยไม่ต้องทำลายเครื่องจักรโบราณ"
 colony.9233.a:0 "ดีมาก"

 colony.9234.name:0 "แนวทางใหม่" #divided attention - bad thing averted
 colony.9234.desc:0 "จากการรวบรวมการรับรู้ความรู้สึกของโดรนต่าง ๆ พบทางออกที่ดีกว่า: โถงได้รับการเสริมความแข็งแกร่งให้อยู่ในระดับที่ปลอดภัยโดยแลกกับโดรนระดับล่างเพียงไม่กี่ตัว"
 colony.9234.a:0 "เรียนรู้ ปรับตัว เอาชนะ"

 colony.9240.name:0 "การเข้าใจอย่างถ่องแท้" #guardians
 colony.9240.desc:0 "การสำรวจของเราบน [Root.GetName] ได้รับความเข้าใจที่ถ่องแท้ในที่สุด การประเมินครั้งแรกของเราได้รับการยืนยันว่าถูกต้อง ห้องนิรภัยแห่งนี้แท้จริงแล้วคือโรงหล่อขนาดใหญ่ การวิเคราะห์ภาษาของเอเลี่ยนเพิ่มเติมเผยให้เห็นว่ามันถูกเรียกว่าเป็น King-forge อย่างไรก็ตาม โรงหล่อแห่งนี้ไม่เคยเปิดใช้งานเลย - ดูเหมือนว่าผู้สร้างจะขาดเทคโนโลยีในการทำให้โครงการสำเร็จลุล่วง\n\nมันน่าจะเป็นไปได้ที่เราจะทำงานของพวกเขาให้เสร็จสิ้น ตราบใดที่เราสามารถเข้าไปถึงหัวใจของโรงหล่อได้ แม้ว่าเส้นทางจะถูกปิดกั้นด้วยประตูที่หนาหนัก แต่วิศวกรของเรายืนยันว่าสามารถก้าวข้ามสิ่งกีดขวางเหล่านั้นได้ อย่างไรก็ตาม เนื่องจากประตูไม่มีกลไกการล็อกหรือเปิดที่ชัดเจน จึงจำเป็นต้องใช้กำลังบางส่วนก่อนที่เราจะดำเนินการต่อไปได้"
 colony.9240.a:0 "เปิดประตูอย่างเบามือ" #casual 1
 colony.9240.a.desc:0 "เราจะพยายามงัดประตูเปิดด้วยเครื่องมือไฟฟ้าและเครื่องจักรหนัก ด้วยความโชคดี เราจะสามารถเข้าไปด้านในได้โดยไม่มีปัญหาเพิ่มเติมใด ๆ"
 colony.9240.b:0 "ระเบิดทำลายประตู" #casual 2
 colony.9240.b.desc:0 "บางครั้งวิธีการที่รุนแรงก็คือทางเลือกที่ดีที่สุด ติดตั้งระเบิดแล้วสะสางให้จบไป"
 colony.9240.c:0 "ตรวจสอบประตูเพิ่มเติม" #spiritualist
 colony.9240.c.desc:0 "อย่าได้รีบร้อนเลย เราเคยเผชิญหน้ากับกับดักหลายรูปแบบมาก่อน บางครั้งการไม่รีบร้อนใช้ทางออกที่เห็นเด่นชัดอาจจะดีกว่า"
 colony.9240.d:0 "มองหาเส้นทางอื่น" #meritocracy
 colony.9240.d.desc:0 "เรามีความเชี่ยวชาญในการเอาชนะปัญหาด้วยวิธีการที่แปลกใหม่ ดังนั้นเราอาจจะสามารถหาเส้นทางอื่นเพื่อเข้าสู่ด้านในได้"
 colony.9240.e:0 "เจาะผ่านประตู" #gestalt
 colony.9240.e.desc:0 "โดรนของเราจะเจาะตัดผ่านประตูเหล่านั้นได้อย่างง่ายดาย มันจะใช้เวลาสักระยะ แต่เรามีเวลาทั้งหมดในจักรวาลนี้อยู่แล้ว"

 colony.9241.name:0 "แก๊ส!" #casual 1 pop dies
 colony.9241.desc:0 "หลังจากบังคับเปิดประตู เครื่องจักรที่ปกคลุมผนังก็เริ่มรั่วไหลแก๊สอันตราย น่าเสียดายที่สิ่งนี้เกิดขึ้นเร็วเกินไป ส่งผลให้มีผู้เสียชีวิตเพิ่มขึ้น จำเป็นต้องอพยพผู้คนออกจากสิ่งอำนวยความสะดวกทั้งหมด และจะต้องทิ้งไว้ระยะหนึ่งก่อนที่เราจะสามารถเข้าไปใหม่ได้อย่างปลอดภัย"

 colony.9242.name:0 "การระเบิด!" #casual 2 lowered production
 colony.9242.desc:0 "การเปิดประตูด้วยระเบิดนั้นทำได้ง่าย แต่สิ่งที่เราไม่ได้คาดคิดไว้คือแก๊สที่พวยพุ่งเข้ามาในโถงทางเดินหลังจากการระเบิด ปรากฏว่าแก๊สนั้นติดไฟได้ง่ายมากและได้ทำลายเครื่องจักรบางส่วนที่ติดตั้งอยู่โดยรอบ โชคดีที่ไม่มีใครอยู่ในโซนแรงระเบิด จึงไม่มีผู้ได้รับบาดเจ็บหรือเสียชีวิต"

 colony.9243.name:0 "การทำสมาธิ" #spiritualist bad thing averted
 colony.9243.desc:0 "ไม่ว่าจะด้วยความโชคดีหรือการแทรกแซงจากสวรรค์ ประตูบานเดียวกับที่ปิดกั้นเส้นทางไปข้างหน้าได้ตอบสนองต่อพิธีกรรมยามเช้าของเรา: ตรวจพบการสั่นพ้องประสานที่แผ่วเบา ซึ่งเราสามารถปรับแต่งควบคุมได้ในที่สุด ท่าทางที่ถูกต้องซึ่งแสดงต่อหน้าเครื่องหมายเล็ก ๆ ที่ซ่อนเลนส์กล้องไว้ ช่วยให้เราเข้าสู่ด้านในได้โดยไม่มีสิ่งใดกีดขวาง"
 colony.9243.a:0 "ของขวัญจากสวรรค์"

 colony.9244.name:0 "หนทางที่สาม" #meritocracy bad thing averted
 colony.9244.desc:0 "หลังจากทำการวิจัยเพิ่มเติม เราก็ตระหนักได้อย่างรวดเร็วว่ามีบางสิ่งในประตูที่ทำหน้าที่เป็นกล้องรักษาความปลอดภัยหรือเครื่องสแกน การแฮ็กระบบเข้าไปนั้นเป็นงานที่ยากกว่ามาก แต่เราสามารถถอดรหัสการเขียนโปรแกรมและฟังก์ชันพื้นฐานของมันได้ - ส่งผลให้เข้าถึงประตูได้โดยไม่มีความยุ่งยากเพิ่มเติมใด ๆ"
 colony.9244.a:0 "ทำได้ดีมาก"

 colony.9245.name:0 "แก๊ส" #gestalt bad thing averted
 colony.9245.desc:0 "ดูเหมือนว่าในการเจาะผ่านประตู โดรนของเราได้เปิดใช้งานกลไกป้องกันบางอย่างที่ปล่อยแก๊สอาวุธเคมีออกมาภายในทางเดิน โชคดีที่รวงรังส่วนรวมสามารถดำเนินมาตรการป้องกันที่เหมาะสมได้ และในไม่ช้าแก๊สก็จางหายไป ตอนนี้พวกโดรนได้กลับไปทำงานแล้ว"
 colony.9245.a:0 "ดำเนินการต่อ"

 colony.9250.name:0 "หัวใจของโรงหล่อ" #starting the project
 colony.9250.desc:1 "หัวใจของโรงหล่อบน [Root.GetName] คือเครือข่ายท่อ สายพานลำเลียง และสิ่งที่ดูเหมือนจะเป็นสถานีงานที่คดเคี้ยวไปมา การสำรวจอย่างรวดเร็วเผยให้เห็นว่าขาดพลังงาน การบำรุงรักษา และระบบสำคัญต่าง ๆ นอกจากนี้ยังมีเหตุผลให้เชื่อว่าการสำรวจห้องนิรภัยของเราส่งผลกระทบต่อการทำงานภายในของโรงหล่อ เราสามารถพยายามซ่อมแซมมันได้ แม้ว่ามันจะต้องใช้เวลานานก็ตาม หรืออีกทางเลือกหนึ่งคือเราสามารถจัดตั้งสุสานเศษเหล็กเพื่อรื้อถอนเครื่องจักรทั้งหมดได้เสมอ"
 colony.9250.a:0 "ซ่อมแซมมัน" #casual
 colony.9250.a.desc:0 "เราจะเชื่อมต่อเครื่องจักรเข้ากับโครงข่ายไฟฟ้าของดาวเคราะห์และซ่อมแซมมัน"
 colony.9250.b:0 "ซ่อมแซมและเรียนรู้" #technocracy + 1 engineering output
 colony.9250.b.desc:0 "เพียงแค่ซ่อมแซมเครื่องจักรนั้นยังไม่พอ - เราต้องเรียนรู้วิธีการทำงานของมันด้วย"
 colony.9250.c:0 "การซ่อมแซมมันคือหน้าที่ของเรา" #philosopher king + 1 society output
 colony.9250.c.desc:0 "โรงหล่อแห่งนี้จะรับใช้อาณาจักรและมอบความรู้ที่เป็นไปได้เกี่ยวกับผู้อยู่อาศัยดั้งเดิมให้แก่เรา"
 colony.9250.d:0 "มันจะรับใช้รวงรัง" #natural neural network + 1 society output
 colony.9250.d.desc:0 "โรงหล่อแห่งนี้จะรับใช้รวงรังและมอบความรู้ที่เป็นไปได้เกี่ยวกับผู้อยู่อาศัยดั้งเดิมให้แก่เรา"
 colony.9250.e:0 "ซ่อมแซมและเรียนรู้" #introspective + 1 engineering output
 colony.9250.e.desc:0 "เพียงแค่ซ่อมแซมเครื่องจักรนั้นยังไม่พอ - เราต้องเรียนรู้วิธีการทำงานของมันด้วย"
 colony.9250.f:0 "รื้อถอน" #opting out - creation of salvage yards
 colony.9250.f.desc:0 "สุสานเศษเหล็กจะเริ่มกระบวนการที่เชื่องช้าในการรื้อถอนเครื่องจักร"

 colony.9251.name:0 "เปิดเครื่องทำงาน" #special project finished
 colony.9251.desc:0 "พลังงานไหลผ่านเครื่องจักรที่หิวโหยบน [Root.GetName] ด้วยเสียงคำรามที่ดังกึกก้อง ท่อต่าง ๆ เริ่มลำเลียงแร่เหลว เพิ่มความสว่างและความร้อนให้กับสถานที่ทั้งหมด วัตถุดิบถูกส่งไปยังสถานีงานซึ่งผู้ปฏิบัติงานสามารถหลอมมันให้เป็นโลหะผสม (โลหะผสม) ตามรูปร่างและความหนาแน่นที่ต้องการได้ ดูเหมือนว่าทุกส่วนของโรงหล่อจะถูกสร้างขึ้นมาเพื่อวัตถุประสงค์เดียวนี้เท่านั้น แม้แต่เสาก็ค้ำยันอะไรได้มากกว่าแค่เพดาน"
 colony.9251.a:0 "ดำเนินการต่อ"

 colony.9260.name:0 "สภาพการทำงาน" #working conditions
 colony.9260.desc:0 "มีความกังวลบางประการว่าแก๊สพิษกำลังสะสมอยู่ในห้องหลักของห้องนิรภัย [Root.GetName] แม้แก๊สนี้จะไม่เป็นอันตรายถึงชีวิต แต่มันสามารถเป็นอันตรายต่อสิ่งใดก็ตามที่ปฏิบัติงานในสถานีงานได้ หากเราต้องการใช้ประโยชน์จากสถานที่นี้อย่างเต็มที่ เราควรจัดทำมาตรการความปลอดภัยบางประการ"
 colony.9260.a:0 "แค่สลับสับเปลี่ยนตัวผู้ปฏิบัติงาน" #casual 1 - lowered happiness for working pops
 colony.9260.a.desc:0 "เราจะสลับสับเปลี่ยนผู้ปฏิบัติงานก่อนที่พวกเขาจะป่วย อาจมีอาการปวดหัวเกิดขึ้นบ้างในบางครั้ง"
 colony.9260.b:0 "ควบคุมเวลาทำงาน" #casual 2 - lowered production
 colony.9260.b.desc:0 "เราจะกำหนดเวลาพักเพื่อปล่อยให้แก๊สจางหายไปเพื่อสถานที่ทำงานที่ปลอดภัยยิ่งขึ้น"
 colony.9260.c:0 "ใช้พวกทาส" #slaver guilds - bad outcome averted
 colony.9260.c.desc:0 "ใครจะไปสนใจทาสกันล่ะ? เราสามารถมอบเสื้อผ้าที่ดีกว่าให้พวกเขาได้เสมอ และพวกเขาจะยินดีที่จะเสี่ยงต่อสุขภาพของตัวเอง"
 colony.9260.d:0 "ออกข้อกำหนดการทำงานที่เข้มงวด" #shared burdens - bad outcome averted
 colony.9260.d.desc:1 "การสลับกะคนงาน ข้อบังคับเรื่องเวลา และการป้องกันในพื้นที่ - เราต้องลดทอนอันตรายลงโดยไม่ให้กระทบต่อผลผลิตของเรา"
 colony.9260.e:0 "สลับหมุนเวียนโดรน" #gestalt - bad outcome averted
 colony.9260.e.desc:0 "โดรนทุกตัวจะทำงานเพื่อจิตสำนึกร่วมจนกว่าจะบรรลุเป้าหมายของมัน"

 colony.9270.name:0 "ศูนย์รีไซเคิล" #recycling
 colony.9270.desc:0 "โรงหล่อ [Root.GetName] มีห้องประมวลผลวัสดุรีไซเคิลโดยเฉพาะ ซึ่งจะนำของเสียหลังกระบวนการผลิตมาช่วยเพิ่มประสิทธิภาพในการผลิต การทำให้มันกลับมาทำงานได้อีกครั้งอาจเป็นประโยชน์ต่อเรา"
 colony.9270.a:0 "ทำให้เปิดใช้งานได้" #casual
 colony.9270.a.desc:0 "เราจะเปิดใช้งานศูนย์รีไซเคิลออนไลน์"
 colony.9270.b:0 "ใช้การออกแบบของเราเอง" #environmentalist/zerowaste/ascetic - lower upkeep
 colony.9270.b.desc:0 "รูปแบบการรีไซเคิลของเรานั้นเหนือกว่ามาก เราสามารถนำมันไปปรับใช้กับระบบเครื่องจักรนี้ได้"
 colony.9270.c:0 "ยกระดับการผลิตโลหะผสม" #barbaric despoilers and purifiers - increased production
 colony.9270.c.desc:0 "เราสามารถปรับเปลี่ยนห้องรีไซเคิลให้กลายเป็นศูนย์ทำบริสุทธิ์แร่ มันจะช่วยยกระดับการผลิตของเรา"

 colony.9280.name:0 "มากหรือน้อย?" #increase production and upkeep
 colony.9280.desc:0 "งานในโรงหล่อ [Root.GetName] ใกล้จะเสร็จสมบูรณ์แล้ว แต่ยังมีจุดที่เราสามารถปรับปรุงการออกแบบและการทำงานดั้งเดิมได้ คาดว่าการเพิ่มปริมาณแร่ที่นำเข้าจะช่วยให้เราสามารถเพิ่มการผลิตโลหะผสมได้"
 colony.9280.a:0 "อย่าให้เครื่องจักรของเอเลี่ยนทำงานหนักเกินไป" #casual - don't use the opportunity
 colony.9280.a.desc:0 "เราจะไม่ใช้โอกาสนี้"
 colony.9280.b:0 "ดำเนินการเลย" #casual - use the opportunity, upkeep and production up
 colony.9280.b.desc:0 "เราจะเพิ่มการผลิต แต่ค่าบำรุงรักษาแร่ก็จะเพิ่มขึ้นด้วย"
 colony.9280.c:0 "เราใช้อินทรียวัตถุแทนได้ไหม?" #catalytic processing - change some minerals upkeep to food upkeep
 colony.9280.c.desc:0 "เราสามารถทดแทนการป้อนแร่บางส่วนด้วยอินทรียวัตถุได้ ทว่ามันจะเป็นไปไม่ได้ที่จะนำมาใช้อย่างสมบูรณ์"
 colony.9280.d:0 "มันเหมือนกับเทคโนโลยีเก่าของเรา" #remnants - better ratio for increasing the production vs upkeep
 colony.9280.d.desc:0 "ครั้งหนึ่งเราเคยปกครองจักรวรรดิอันกว้างใหญ่และมีเทคโนโลยีที่ไม่มีใครเทียบได้ เทคโนโลยีบางอย่างที่เพิ่งถูกค้นพบอีกครั้งอาจช่วยให้เราปรับปรุงขีดความสามารถในการผลิตของโรงหล่อได้"

 colony.9290.name:0 "พิธีเปิดอันยิ่งใหญ่" #ending, final touches
 colony.9290.desc:0 "เสร็จสิ้นแล้ว! โรงหล่อบน [Root.GetName] เปิดใช้งานได้อย่างเต็มระบบ แม้อาจจะไม่เหมือนกับที่ผู้สร้างดั้งเดิมออกแบบไว้ แต่มันยังคงเป็นภาพที่น่าตื่นตาตื่นใจ และเป็นวิธีผลิตโลหะผสม (โลหะผสม) ที่มีประสิทธิภาพเกินคาด ที่เหลือก็แค่เก็บเกี่ยวผลตอบแทนจากความมุ่งมั่นและความชาญฉลาดของเรา"
 colony.9290.a:0 "ช่างเป็นวันที่ดีเยี่ยม!" #casual, some happiness empirewide for 2 years
 colony.9290.b:0 "แล้วผู้สร้างล่ะ?" #memorialists - add chronicler job
 colony.9290.b.desc:0 "เราไม่เคยรู้แน่ชัดเลยว่าเกิดอะไรขึ้นกับผู้สร้างดั้งเดิม ดูเหมือนว่าพวกเขาเพียงแค่อันตรธานหายไปเฉย ๆ โดยทิ้งข้อมูลอันคลุมเครือเกี่ยวกับตัวเองไว้เท่านั้น เราจำเป็นต้องรวบรวมทุกสิ่งที่เราทำได้และบันทึกมันไว้ - เพื่อรักษามันสืบไป"
 colony.9290.c:0 "เราต้องการผู้ดูแล" #aristocratic elite - appoint noble job to oversee the factory
 colony.9290.c.desc:0 "เป็นธรรมเนียมที่ชนชั้นนำของเราจะต้องดูแลกิจการดังกล่าว - เราควรแต่งตั้งขุนนางที่โดดเด่นมาดูแลโรงหล่อใหม่ของเรา"
 colony.9290.d:0 "แต่งตั้งผู้บริหาร" #megacorp - appoint executive job to oversee the factory
 colony.9290.d.desc:1 "เป็นเรื่องสมเหตุสมผลที่ผู้จัดการของเราจะเป็นผู้ดูแลกิจการดังกล่าว - เราควรแต่งตั้ง $job_executive_with_icon$ มาดูแลโรงหล่อใหม่ของเรา" # appoint an Executive to take care of...
 colony.9290.e:0 "ดีมาก" #gestalt - nothing, just start working

 colony.9295.name:0 "แอ่งน้ำโลหะ"
 colony.9295.desc:0 "หลังจากฝนตกเมื่อเร็ว ๆ นี้ พลเมืองผู้ตั้งถิ่นฐานสังเกตเห็นแอ่งน้ำที่เป็นโลหะปรากฏขึ้นบนพื้นผิวของ [Root.GetName] แอ่งน้ำเหล่านี้มีความหนืดข้น คล้ายโลหะเหลว"
 colony.9295.a:0 "ปล่อยพวกมันไว้เฉย ๆ พวกมันอาจจะมีพิษก็ได้!"
 colony.9295.b:0 "สืบสวนเพิ่มเติม!"
 colony.9296.name:0 "สไลม์สีเงิน"
 colony.9296.desc:0 "แอ่งน้ำโลหะที่มีความหนืดบน [Root.GetName] กำลังขยายขนาดขึ้น พื้นที่ขนาดใหญ่มากในตอนนี้ถูกปกคลุมไปด้วยสไลม์สีเงิน ดูเหมือนว่าพวกมันจะเติบโตขึ้นหลังฝนตกหนัก"
 colony.9296.a:0 "สวมชุดป้องกันแล้วออกไปสำรวจ!"
 colony.9299.name:0 "ความ หลาก หลาย ทาง ชีวภาพ"
 colony.9299.desc:0 "ความหนืดที่คลุมเครือ"
 colony.9299.a:0 "แอ่งน้ำโลหะหนืดบน [Root.GetName] กำลังท้าทายเหล่านักวิทยาศาสตร์ในอาณานิคม จนถึงตอนนี้ยังไม่สามารถระบุต้นกำเนิดของมันได้ และพวกมันทนทานต่อการสำรวจเจาะลึกของเรา เครื่องมือของเรากำลังประสบปัญหาในการถอดรหัสส่วนประกอบทางเคมีของพวกมัน เรามีแบบทดสอบที่ต้องดำเนินการเพิ่มเติมหากต้องการคำตอบ"
 colony.9297.name:0 "แอ่งน้ำที่หายไป"
 colony.9297.desc:0 "พวกมันหายไปแล้ว! แอ่งน้ำโลหะหนืดบน [Root.GetName] ได้สูญสลายไป ราวกับว่าพวกมันเพิ่งระเหยไปเฉย ๆ เราไม่รู้เลยว่าพวกมันจะกลับมาอีกหรือไม่หรือเมื่อไหร่..."
 colony.9297.a:0 "บางครั้งสิ่งเหล่านี้ก็คลี่คลายไปได้เอง..."
 colony.9298.name:0 "การกลับมาของสไลม์สีเงิน"
 colony.9298.desc:0 "พวกมันกลับมาแล้ว! แอ่งน้ำโลหะหนืดบน [Root.GetName] ได้ปรากฏขึ้นอีกครั้ง ธรรมชาติของพวกมันยังคงคลุมเครือสำหรับผู้ตั้งถิ่นฐานบน [Root.GetName] เราได้รับโอกาสอีกครั้งแล้ว เราควรจะสำรวจพวกมันในตอนที่ยังทำได้"
 colony.9298.a:0 "โอกาสครั้งที่สอง..."
 colony.9300.name:0 "เรื่องพื้น ๆ ครับ ท่านผู้นำ!"
 colony.9300.desc:0 "มีการค้นพบธาตุใหม่บน [Root.GetName]! หลังจากการค้นพบครั้งสำคัญในคดีของแอ่งน้ำโลหะที่มีความหนืด เราพบว่าแอ่งน้ำเหล่านั้นประกอบด้วยธาตุเคมีที่มีเอกลักษณ์เฉพาะ ธาตุนี้ ซึ่งเราขอตั้งชื่อว่า [Root.GetName]โอเนียมจะล่องลอยอยู่ในอากาศบน [Root.GetName] แต่เมื่อเจอกับหยาดน้ำฟ้า (ฝนตก) ในระดับสูง จะแปรสภาพกลายเป็นสารมีความหนืดตามที่เราเห็นบนพื้นผิวโลก ปรากฏการณ์นี้เกิดขึ้นเป็นวัฏจักร คล้ายกับแอ่งน้ำที่เกิดจากไดไฮโดรเจนมอนอกไซด์ (น้ำ)\n\nช่างเป็นการค้นพบที่น่าทึ่งมาก ความเข้าใจของเราเกี่ยวกับธาตุต่าง ๆ ยังคงเติบโตต่อไป" #This string contains a linguistic joke of appending 'onium' to the end of a planet name to create a new chemical element, e.g. 'Earthonium'. I think it's amusing in English, but I'm unsure how it will be read in other languages.

 colony.9300.a:0 "เรายังคงมีอะไรให้เรียนรู้อีกมาก"
 FASCINATING_METEOROLOGY_PROJECT:0 "อุตุนิยมวิทยาที่น่าทึ่ง"
