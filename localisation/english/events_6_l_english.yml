 colony.9800.name:0 "มิติแห่งคลื่นรบกวน"
 colony.9800.desc:0 "ประตูมิติบน [Root.GetName] ปิดตัวลงเอง เมื่อเราจัดการรักษาเสถียรภาพของประตูมิติ เราเห็นว่ามันทอดนำไปสู่มิติที่ประกอบด้วยความว่างเปล่าสีขาวที่ไร้รูปร่าง แทรกด้วยเส้นคลื่นรบกวนสีดำเป็นระยะ ปรากฏการณ์แปลกประหลาดเริ่มแทรกซึมเข้าสู่จักรวาลของเราทันทีและทำลายเครื่องควบคุมเสถียรภาพมิติของเรา ส่งผลให้ประตูล่มสลายลง\n\nประตูมิติ คลื่นรบกวน และเครื่องควบคุมเสถียรภาพมิติต่างอันตรธานหายไปพร้อมกันในพริบตา ไม่มีสิ่งใดหลงเหลืออยู่เลย แม้กระทั่งอนุภาคร่องรอย หากประตูมิตินั้นไม่เสถียร ใครจะรู้ว่าภัยพิบัติประเภทใดอาจจะเกิดขึ้นที่นี่"

 colony.9805.name:0 "สัญญาณรบกวน"
 colony.9805.desc:0 "เมื่อไม่นานมานี้ [Root.GetScientistPlural] ของเราที่ทำงานในห้องปฏิบัติการฟิสิกส์หลักบน §Y[Root.GetHomeWorldName]§! ได้สังเกตพบความผันผวนแปลกๆ ในงานของพวกเขา การทดสอบที่เกี่ยวข้องกับระบบไฮเปอร์ไดรฟ์(ไฮเพอร์ไดร์ฟ)ได้รับผลกระทบมากที่สุดจากสัญญาณรบกวนเหล่านี้ ทว่าความผันผวนเกิดขึ้นเพียงประมาณหนึ่งสัปดาห์ก่อนที่จะหยุดลงโดยสิ้นเชิง ในเวลาเดียวกัน [From.GetName] ก็สังเกตเห็นความผันผวนจากประตูมิติที่ตอนนี้ปิดตัวลงแล้ว โชคดีที่สัญญาณรบกวนที่เป็นไปไม่ได้นั้นไม่ได้ย้อนกลับมา หวังว่าจะไม่มีเรื่องร้ายแรงเกิดขึ้นจากเรื่องนี้"
 colony.9805.a:0 "กลับไปทำงานต่อ"
 colony.9805.b:0 "เราควรดำเนินการสืบสวนเรื่องนี้"

 colony.9810.name:0 "มวลลบ"
 colony.9810.desc:0 "การสนทนาอันกระตือรือร้นและวิตกกังวลเริ่มต้นขึ้นในแวดวงวิทยาศาสตร์ของ [Root.GetHomeWorldName] ในวันนี้ เมื่อ [cloned_physicist.GetName] ได้เผยแพร่ผลการค้นพบล่าสุดเกี่ยวกับอนุภาคมวลลบ(อนุภาคมวลลบ)ที่ปรากฏขึ้นเองใกล้กับ §Y[Root.Capital.GetStarName]§!\n\n\"การค้นพบเหล่านี้สามารถพัฒนาความเข้าใจของเราเกี่ยวกับรูหนอนประดิษฐ์(รูหนอน)และประเด็นอื่นๆ อีกมากมาย\" [cloned_physicist.GetName] ประกาศก้อง!\n\nทางกองบัญชาการกองทัพเรือของเรามีความเห็นที่แตกต่างในเรื่องนี้ และเสนอให้เรานำกองยานกลับบ้านจนกว่าจะสามารถระบุแหล่งที่มาของสสารใหม่ที่ยังไม่ผ่านการทดสอบนี้ได้"
 colony.9810.desc.robot:0 "ได้รับรายงานใหม่จากหน่วยฟิสิกส์ชั้นนำ [cloned_physicist.GetName] ในวันนี้ รายงานระบุผลการค้นพบล่าสุดเกี่ยวกับอนุภาคมวลลบที่ปรากฏขึ้นเองใกล้กับ §Y[Root.Capital.GetStarName]§!\n\n"การค้นพบเหล่านี้สามารถช่วยพัฒนาความเข้าใจของ [Root.GetName] เกี่ยวกับรูหนอนประดิษฐ์และประเด็นอื่นๆ ที่เกี่ยวข้องอย่างมหาศาล" หน่วยวิทยาศาสตร์ [cloned_physicist.GetName] รายงาน\n\nโปรแกรมย่อยวิเคราะห์ภัยคุกคามเสนอแนะให้นำกองยานกลับฐานจนกว่าจะสามารถระบุแหล่งที่มาของวัตถุดิบใหม่ที่ยังไม่ผ่านการทดสอบนี้ได้"
 colony.9810.desc.hive:0 "การสังเกตการณ์ใหม่จากโดรนเฉพาะทางฟิสิกส์ [cloned_physicist.GetName] ได้รับการเผยแพร่เกี่ยวกับผลการค้นพบล่าสุดของอนุภาคมวลลบที่ปรากฏขึ้นเองใกล้กับ §Y[Root.Capital.GetStarName]§!\n\n\"การค้นพบเหล่านี้สามารถพัฒนาความเข้าใจของ [Root.GetName] เกี่ยวกับรูหนอนประดิษฐ์และประเด็นที่เกี่ยวข้องเพิ่มเติม\" โดรนรายงาน\n\nจิตร่วมกลุ่ม(จิตใจ)ไม่ไว้วางใจในความก้าวหน้าอย่างกะทันหันนี้ และเกิดสัญชาตญาณความรู้สึกสั่งการให้นำกองยานบางส่วนกลับไปยังระบบดาวต้นกำเนิด"

 colony.9815.name:0 "ค่ำคืนที่ผืนฟ้าแยกตัว"
 colony.9815.desc:0 "จิตวิญญาณที่ยิ่งใหญ่ที่สุดของ [Root.GetName] มารวมตัวกันในวันนี้เพื่อฟังแนวคิดล่าสุดของ [cloned_physicist.GetName] ในการใช้อนุภาคมวลลบ ทว่ากลับถูกขัดจังหวะ เสียงไซเรนเตือนภัยฉุกเฉินกรีดร้องในทุกหอดูดาวและสถานีอวกาศทั่วทั้งระบบเมื่อ §Y[Root.GetHomeWorldName]§! ปรากฏสิ่งใหม่บนท้องฟ้ายามค่ำคืน รอยแยกในอวกาศที่มีขนาดใหญ่เท่ากับดาวฤกษ์ของเราทอดตัวเหนือเส้นขอบฟ้า ในขณะที่กองยานรบขนาดเล็กไหลทะลักผ่านรอยแยกนั้นเข้ามา"
 colony.9815.desc.robot:0 "หน่วยวิทยาศาสตร์เพิ่มเติมได้รับการระดมเพื่อศึกษาการค้นพบล่าสุดของ [cloned_physicist.GetName] และการใช้อนุภาคมวลลบ ทว่ากลับถูกขัดจังหวะ เสียงไซเรนเตือนภัยฉุกเฉินกรีดร้องในทุกหอดูดาวและสถานีอวกาศทั่วทั้งระบบเมื่อ §Y[Root.GetHomeWorldName]§! ปรากฏสิ่งใหม่บนท้องฟ้ายามค่ำคืน รอยแยกในอวกาศที่มีขนาดใหญ่เท่าดาวฤกษ์ของเราทอดตัวพาดผ่านท้องฟ้าในขณะที่กองยานรบขนาดเล็กไหลทะลักออกมาจากรอยแยก"
 colony.9815.desc.hive:0 "โดรนเพิ่มเติมได้รับการระดมเพื่อศึกษาการค้นพบล่าสุดของ [cloned_physicist.GetName] และการใช้อนุภาคมวลลบ ทว่ากลับถูกขัดจังหวะ เสียงไซเรนเตือนภัยฉุกเฉินกรีดร้องในทุกหอดูดาวและสถานีอวกาศทั่วทั้งระบบเมื่อ §Y[Root.GetHomeWorldName]§! ปรากฏสิ่งใหม่บนท้องฟ้ายามค่ำคืน รอยแยกในอวกาศที่มีขนาดใหญ่เท่าดาวฤกษ์ของเราทอดตัวพาดผ่านท้องฟ้าในขณะที่กองยานรบขนาดเล็กไหลทะลักออกมาจากรอยแยก"

 colony.9820.name:0 "รหัสโบราณ"
 colony.9820.desc:0 "เมื่อยานคอร์เวตลำสุดท้ายร่วงหล่น ทหารเรือระดับเล็กผู้ควบคุมเซ็นเซอร์ของฐานทัพดาวรายงานสิ่งหนึ่งที่น่าสนใจ ยานรบเหล่านี้มีความคล้ายคลึงอย่างมากกับยานตกรุ่นที่ [Root.GetName] หยุดใช้งานไปแล้วเมื่อหลายปีก่อน ตัวยานขาดระบบขับเคลื่อนความเร็วและติดตั้งด้วยอาวุธที่ล้าสมัย ในขณะที่รายงานกำลังถูกส่งเข้ามา คำขอเปิดการสื่อสารที่มีต้นทางมาจากรอยแยกประหลาดก็สะท้อนก้องไปทั่วทั้งระบบ มันกำลังใช้รหัสผ่านที่ได้รับอนุมัติสูงสุดของเรา... จากเมื่อ 10 ปีที่แล้ว"
 colony.9820.desc.robot:0 "เมื่อยานคอร์เวตลำสุดท้ายไม่สามารถทำงานได้ โปรแกรมย่อยการวิเคราะห์การสังเกตการณ์รายงานสิ่งผิดปกติอย่างหนึ่ง ยานรบของผู้รุกรานมีความคล้ายคลึงกับยานตกรุ่นที่ [Root.GetName] หยุดกระบวนการผลิตไปเมื่อหลายปีก่อน นอกจากนี้ ตัวยานยังขาดระบบขับเคลื่อนความเร็วและติดตั้งด้วยอาวุธที่ล้าสมัย ในขณะที่รายงานกำลังส่งมา คำขอสื่อสารที่มีต้นทางจากรอยแยกประหลาดก็สะท้อนก้องไปทั่วระบบ มันกำลังใช้ระเบียบวิธีเช็คความปลอดภัยที่ซับซ้อนที่สุดของเรา... จากเมื่อ 10 ปีที่แล้ว"
 colony.9820.desc.hive:0 "เมื่อยานคอร์เวตลำสุดท้ายร่วงหล่น โดรนผู้ควบคุมเซ็นเซอร์รายงานสิ่งหนึ่งที่น่าสนใจ ยานรบเหล่านี้มีความคล้ายคลึงกับยานตกรุ่นที่ [Root.GetName] หยุดใช้งานไปแล้วเมื่อหลายปีก่อน ตัวยานขาดระบบขับเคลื่อนความเร็วและติดตั้งด้วยอาวุธที่ล้าสมัย ในขณะที่รายงานกำลังถูกส่งเข้ามา คำขอสื่อสารที่ส่งมาจากรอยแยกประหลาดก็สะท้อนก้องไปทั่วทั้งระบบ มันเป็นสิ่งดวงจิตนี้ไม่คุ้นเคย เป็นสติปัญญาของ [Root.GetSpeciesName] ดวงอื่น"
 colony.9820.a.robot:0 "**รับสัญญาณ**"

 colony.9821.name:0 "สายเรียกข้ามมิติ"
 colony.9821.desc:0 "เมื่อหน้าจอการสื่อสารกะพริบเปิดขึ้น สิ่งที่ดูเหมือนจะเป็นชาว [Root.GetSpeciesName] ที่เหนื่อยล้า ปีติยินดี และในขณะเดียวกันก็ตื่นตระหนกอย่างถึงที่สุดเท่าที่จะจินตนาการได้ก็ปรากฏตัวขึ้น พวกเขาดูคุ้นหน้าคุ้นตาเป็นอย่างมาก เหมือนกับถอดพิมพ์เดียวกับ [cloned_physicist.GetName] หากว่า [cloned_physicist.GetHeShe] แก่ลงไป 20 ปี §B§!\"อ่า... สวัสดี [Root.GetHomeWorldName]- แอลฟานี่คือ [cloned_physicist.GetName]-เบต้า\"§! พวกเขาหยุดเพื่อตั้งสติ §B\"ฉัน เอ่อ... พวกเรา... พวกเราต้องขออภัยเป็นอย่างยิ่งสำหรับสิ่งที่เพิ่งเกิดขึ้น คุณต้องเข้าใจว่านั่นเป็นกลุ่มกองกำลังป้องกันโลกของเราที่แปรพักตร์และเสื่อมสภาพ ซึ่งคิดว่าพวกมันสามารถยึดครอง [Root.GetHomeWorldName] ได้ด้วยกำลัง ฉันรู้ว่าคำพูดเหล่านี้อาจฟังดูว่างเปล่า แต่โปรดเชื่อฉันเมื่อฉันบอกว่าเราไม่มีเจตนาร้ายต่อคุณ\"§!"
 colony.9821.desc.robot:0 "เมื่อหน้าจอการสื่อสารกะพริบเปิดขึ้น รหัสระบุตัวตนก็ถูกส่งเข้ามา §Rข้อผิดพลาดการตรวจสอบ:§! นี่คือรหัสเฉพาะตัวของ [cloned_physicist.GetName]! \n§B§!\"ยินดีต้อนรับ [Root.GetName]- แอลฟาและต้องขออภัย: การกระทำที่เป็นปฏิปักษ์ก่อนหน้านี้เกิดจากสาขาการทหารที่ล้าหลังและไม่จำเป็นของระบบ [Root.GetName]-เบต้ามันได้รับการจัดการและลบทิ้งไปแล้ว คำชี้แจง: เราไม่มีเจตนาที่จะสร้างปฏิสัมพันธ์ที่เป็นศัตรูอีกต่อไป\"§!"
 colony.9821.desc.hive:0 "เมื่อหน้าจอการสื่อสารกะพริบเปิดขึ้น โดรนสื่อสารของจิตดวงอื่นมีโครงสร้างที่เหมือนกันทุกประการกับ [cloned_physicist.GetName] ช่างน่าสนใจยิ่ง §B§!\"ยินดีต้อนรับ [Root.GetName]- แอลฟาและต้องขออภัย โดรนที่โจมตีคุณเป็นผู้แปรพักตร์ที่ถูกปล่อยทิ้งไว้ตามลำพังนานเกินไป [Root.GetName]-เบต้าขอขอบคุณที่คุณช่วยกำจัดพวกมัน เราไม่ต้องการมีปฏิสัมพันธ์เชิงลบใดๆ อีก และต้องการเสนอสิ่งที่เป็นประโยชน์ต่อดวงจิตของเราทั้งสองฝ่าย\"§!"
 colony.9821.a:0 "พวกคุณคือตัวอะไร?"
 colony.9821.a.robot:0 "รายงานสถานะ!"
 colony.9821.a.response:0 "§Bฉันและทุกคนที่นี่มาจากจักรวาลคู่ขนานกับของคุณ เราไม่รู้ว่าเมื่อไหร่ แต่เราเชื่อว่าความเป็นจริงสองสายของเราแยกออกจากกันมาระยะหนึ่งแล้ว และจักรวาลของเรากำลังสลายตัวตั้งแต่นั้นมา เราสังเกตพบครั้งแรกเมื่อระบบดาวที่ห่างไกลเริ่มเลือนหายไป และได้ทำงานอย่างหนักเพื่อหลีกเลี่ยงความพินาศที่แน่นอน ในช่วงไม่กี่ทศวรรษที่ผ่านมา ทรัพยากรและชั่วโมงการทำงานของชาว [Root.GetAdjective] ทั้งหมดถูกนำไปลงทุนในการเปิดประตูมิติข้ามมิตินี้ มีเพียงเทคโนโลยีทดลองและการวิจัยฟิสิกส์ขั้นสูงที่สุดของเราเท่านั้นที่ทำให้เราติดต่อมาถึงคุณได้ เพียงไม่กี่ปีก่อนที่ความเป็นจริงของเราจะสูญสิ้นไป§!"
 colony.9821.a.response.robot:0 "§B[cloned_physicist.GetName]-เบต้าและหน่วยอื่นๆ ทั้งหมดที่อยู่ ณ ที่นี้มาจากจักรวาลคู่ขนาน ตรวจพบความเสื่อมโทรมของจักรวาลเบต้าครั้งแรกเมื่อหลายทศวรรษก่อน ตรวจพบระบบดาวที่ห่างไกลเลือนหายไปครั้งแรกเมื่อ 55.136 ปีก่อน ตั้งแต่นั้นมา ทรัพยากรและกำลังการคำนวณที่มีอยู่ทั้งหมดถูกใช้เพื่อเปิดประตูข้ามมิตินี้ ระยะเวลาคงเหลือโดยประมาณจนกว่า [Root.GetHomeWorldName]-เบต้าจะถูกลบหายไปคือ 25.3333 ปี§!"
 colony.9821.a.response.hive:0 "§Bหน่วยนี้ [cloned_physicist.GetName]-เบต้าและสมาชิกคนอื่นๆ ทั้งหมดของดวงจิตที่อยู่ที่นี่มาจากจักรวาลคู่ขนานกับของคุณ เราไม่รู้ว่าเมื่อไหร่ แต่เราเชื่อว่าความเป็นจริงของเราแยกจากกันมาระยะหนึ่งแล้วและจักรวาลของเรากำลังสลายตัวตั้งแต่นั้นมา โดรนสังเกตการณ์ตรวจพบครั้งแรกเมื่อระบบดาวห่างไกลเริ่มเลือนหายไป และจิตนี้ได้ทำงานอย่างหนักเพื่อหลีกเลี่ยงความพินาศนับแต่นั้น ในช่วงทศวรรษที่ผ่านมา โดรน ทรัพยากร และการวิจัยทั้งหมดถูกใช้เพื่อเปิดประตูข้ามมิตินี้ มีเพียงเทคโนโลยีทดลองและฟิสิกส์ขั้นสูงที่สุดของเราเท่านั้นที่ทำให้เราสร้างความเชื่อมโยงกับคุณได้ ไม่กี่ปีก่อนที่ความเป็นจริงนี้จะสูญสิ้นไป§!"
 colony.9821.b:0 "ทำไมพวกคุณถึงดูเหมือนขาดขีดความสามารถ FTL?"
 colony.9821.b.robot:0 "อธิบายการขาดระบบ FTL!"
 colony.9821.b.response:0 "[cloned_physicist.GetName]-เบต้าดูเหมือนจะพูดไม่ออก §B§!\"คุณจัดการพัฒนาความเร็วสำเร็จแล้วงั้นหรือ? โอ้ ช่างเป็นข่าวที่น่ายินดียิ่ง! ถ้าเช่นนั้นพวกโง่เง่าเหล่านั้นก็ไม่มีเหตุผลที่จะโจมตีเลย—ทั้งกาแล็กซีพร้อมให้บริการแก่เราแล้ว! เอ่อ... แน่นอนว่าถ้าสมมติว่าคุณเต็มใจช่วยเหลือเราน่ะนะ\"§!"
 colony.9821.b.response.robot:0 "§Bระบบความเร็วที่สามารถเข้าถึงไฮเปอร์เลนได้รับการคำนวณว่าสามารถทำได้จริง แต่โครงการถูกประกาศว่าไม่จำเป็น และทรัพยากรก็ถูกโอนเข้าสู่กลุ่มวิจัยประตูมิติแทน ทางเลือกการวิจัยหลายสายถูกตั้งค่าลำดับความสำคัญเป็น 0 ขอข้อมูลผลลัพธ์ของ [Root.GetName]- แอลฟาหลังจากเสร็จสิ้นการสื่อสารหรือไม่?§!"
 colony.9821.b.response.hive:0 "จิตดวงอื่นดูเหมือนจะต้องการเวลาครู่หนึ่งก่อนตอบ §B§!\"จิตนี้ไม่เต็มใจที่จะลงทุนทรัพยากรเพื่อพัฒนาระบบความเร็วในขณะที่จักรวาลกำลังจะสิ้นสลายลง โปรดอนุญาตให้เรามีส่วนร่วมในความเข้าใจนี้ด้วยเถิด\"§!"
 colony.9821.c:0 "เลิกพูดจาเหลวไหลได้แล้ว คุณต้องการอะไรกันแน่?"
 colony.9821.c.robot:0 "เลิกพูดจาไร้สาระ! ระบุคำร้องขอมา!"

 colony.9822.desc:0 "§Bจักรวาลของเรากำลังถึงจุดจบ ไม่มีหนทางใดที่จะหลีกเลี่ยงมันได้ เราได้สร้างยานขนส่งขนาดมหึมาไว้สำหรับวันนี้และขอวิงวอนให้คุณอนุญาตให้เราส่งผู้ลี้ภัยไป มีเพียงผู้นำที่ชาญฉลาดและมีความสามารถที่สุดของเราเท่านั้นที่จะขึ้นยานเหล่านี้ได้ โปรดรักษาอารยธรรมของฉัน—§! §ของพวกเรา§! §Bไว้ด้วยเถิด§!"
 colony.9822.desc.robot:0 "§Bสร้างยานขนส่งเสร็จสมบูรณ์แล้ว ขออนุมัติส่งหน่วย [Root.GetName]-เบต้าข้ามไปเพื่อรักษาทรัพยากรและคลังข้อมูล เราไม่ต้องการยุติการสำรวจจักรวาลของเรา ณ ที่นี้§!"
 colony.9822.desc.hive:0 "§Bจักรวาลของ [Root.GetName]-เบต้ากำลังถึงจุดจบ ไม่มีหนทางหลีกเลี่ยงได้ เราได้สร้างยานขนส่งขนาดใหญ่ไว้สำหรับวันนี้โดยเฉพาะ และพร้อมส่งโดรนเท่าที่เราจะสามารถส่งได้\nนอกจากนี้เราต้องการควบรวมจิตร่วมกลุ่ม แม้ว่าในตอนแรกจะเหมือนกัน แต่กลุ่มนี้มีประสบการณ์และข้อมูลเชิงลึกที่เราไม่ต้องการให้สูญหายไป โปรดปล่อยให้เรามีชีวิตอยู่ต่อไปเถิด§!"
 colony.9822.a:0 "เราต้องหารือกับผู้เชี่ยวชาญของเราก่อน"
 colony.9822.a.robot:0 "ต้องการการวิเคราะห์เพิ่มเติม! โปรดเตรียมพร้อม!"
 colony.9822.a.hive:0 "จิตร่วมนี้จำเป็นต้องพิจารณาคำขอนี้อย่างรอบคอบ"

 colony.9840.name:0 "การประชุมสุดยอด"
 colony.9840.desc:0 "การประชุมสุดยอดของผู้มีความคิดชั้นนำจากทุกสาขามารวมตัวกันบน §Y[Root.GetName]§! เพื่ออภิปรายเกี่ยวกับชะตากรรมของแฝดต่างมิติของเรา เกิดการโต้เถียงกันอย่างรุนแรงและยากลำบากทั่วทั้ง [Root.GetHomeWorldName] บางส่วนเสนอให้ใช้แนวทางไม่ก้าวก่าย การศึกษาความตายของจักรวาลหนึ่งอาจให้ข้อมูลเชิงลึกที่ดีมาก มีการพูดคุยเกี่ยวกับการอนุมัติคำขอของ [cloned_physicist.GetName]-เบต้าเพื่ออพยพผู้คนบนดาวให้ได้มากที่สุด ในขณะที่บางส่วนกล่าวถึงความง่ายดายในการยึดครองทรัพยากรอันมีค่าและพลังงานที่ดาวดวงนั้นหลงเหลืออยู่\n\nในขณะที่การประชุมสุดยอดกำลังจะสิ้นสุดลง [cloned_physicist.GetName] ได้ก้าวขึ้นสู่จุดเด่นและประกาศว่า [cloned_physicist.GetHeShe] เชื่อว่าด้วยการใช้เทคโนโลยีใหม่ที่นำมาจากจักรวาลเบต้า มีโอกาสที่จะนำพา [Root.GetHomeWorldName]-เบต้าทั้งใบเข้ามาสู่ความเป็นจริงของเราได้"
 colony.9840.desc.robot:0 "ซูเปอร์คอมพิวเตอร์ทุกเครื่องภายใต้การควบคุมของ [Root.GetName] ถูกจัดสรรเพื่อคำนวณทางเลือกที่เหมาะสมที่สุดสำหรับปัญหาในปัจจุบันเกี่ยวกับ [Root.GetName]-เบต้าในท้ายที่สุด 4 ทางเลือกถูกประกาศว่าสามารถทำได้จริง\n\n1: ศึกษาการล่มสลายของจักรวาลเบต้า\n2: เข้าประตูมิติเพื่อยึดทรัพยากรแร่ธาตุและพลังงานที่มีทั้งหมด\n3: อนุมัติข้อเสนอของหน่วยวิทยาศาสตร์: [cloned_physicist.GetName]-เบต้า\n4: พยายามใช้ศาสตร์และเทคโนโลยีเบต้าเชิงทดลองอย่างยิ่งยวดเพื่อนำพา [Root.GetHomeWorldName]-เบต้าเข้าสู่ความเป็นจริงอัลฟ่า"
 colony.9840.desc.hive:0 "เนื่องจากสติปัญญาทั้งหมดของ [Root.GetSpeciesName] ถูกใช้ไปกับภารกิจตัดสินชะตากรรมของ [Root.GetName]-เบต้าจึงมีการเสนอ 4 ทางเลือกที่เป็นไปได้หลักๆ\n\n1: ศึกษาการล่มสลายของจักรวาลเบต้า\n2: เข้าประตูมิติและจัดหาแหล่งพลังงานและแร่ธาตุที่มีทั้งหมด\n3: ยอมรับคำร้องขอของ [Root.GetName]-เบต้าและหลอมรวมดวงจิตอื่นเข้ากับเรา\n4: พยายามใช้เทคโนโลยีทดลองของเบต้าเพื่อนำ [Root.GetHomeWorldName]-เบต้าเข้าสู่ความเป็นจริงอัลฟ่าและหลอมรวมดวงจิตเข้าด้วยกัน"
 colony.9840.a:0 "ศึกษาวิเคราะห์เหตุการณ์"
 colony.9840.a.tooltip:0 "เราไม่สามารถแบ่งปันทรัพยากรสำหรับโครงการประเภทนี้ได้ แต่เราจะไม่ปล่อยให้โอกาสแบบนี้สูญเปล่า"
