 stratovent_world_chain_title: "ช่องพ่นแก๊สสตราโตสเฟียร์"
 stratovent_world_chain_desc: "เรามีโอกาสเข้าถึงทรัพยากรที่มีศักยภาพในการทำกำไรบนอาณานิคมแห่งหนึ่งของเรา ซึ่งเป็นช่องพ่นแก๊สที่เกิดขึ้นตามธรรมชาติซึ่งปล่อยก๊าซที่มีค่าขึ้นสู่อวกาศ บัดนี้เราจำเป็นต้องตัดสินใจว่าจะดำเนินการอย่างไรกับพวกมัน"

 # Arc Sites
 broken_world_digsite:0 "ประตูที่แตกสลาย"
 broken_world_digsite_desc:0 "เราตรวจพบสัญญาณที่แปลกประหลาดส่งมาจากโดมที่พังทลายบน [From.Planet.GetName]"
 site_tombworld_weapon_cache:0 "แหล่งเก็บซ่อนอาวุธ"
 site_tombworld_weapon_cache_desc:0 "พบแหล่งเก็บซ่อนอาวุธเสริมความแข็งแกร่งขนาดใหญ่ใต้พื้นดินที่แตกร้าวของ [From.Planet.GetName] มันอยู่ในสภาพสมบูรณ์อย่างน่าประหลาดใจเมื่อพิจารณาจากจำนวนปีที่มันถูกฝังอยู่ใต้ดินแดนรกร้างปนเปื้อนกัมมันตภาพรังสี"
 # Messages

 MESSAGE_HYPERDRIVE_SECURED_TITLE:0 "กู้คืนระบบไฮเปอร์ไดรฟ์สำเร็จ"
 MESSAGE_HYPERDRIVE_SECURED:0 "ทีมงานภาคพื้นดินของเราสามารถทำให้สัตว์มีข้อต่างดาวสงบลงได้สำเร็จ และหลบหนีออกมาพร้อมกับข้อมูลผลงานวิจัย"

 # Modifiers
 the_lonely_bot_welcome:0 "ยื่นมือเข้าช่วยเหลือ"
 the_lonely_bot_welcome_desc:0 "หุ่นยนต์ตัวน้อยที่อาศัยอยู่บนดาวเคราะห์ดวงนี้ทุ่มเทแรงกายแรงใจอย่างยิ่งยวดเพื่อช่วยให้ชาวอาณานิคมของเราลงหลักปักฐานและก่อร่างสร้างตัวได้สำเร็จ"

 eldritch_horror_mod:0 "ความรู้จากสิ่งที่น่ากลัว"
 eldritch_horror_mod_desc:0 "ความรู้ที่เผ่าพันธุ์ปริศนาจากต่างมิติ(เสียงแตก)มอบให้แก่จักรวรรดิ เพื่อเป็นการตอบแทน มันขอเพียงประชากรส่วนเล็กน้อยของเราเท่านั้น"

 crystalline_architecture_mod:0 "สิ่งก่อสร้างคริสตัลลีน"
 crystalline_architecture_mod_desc:0 "การปรับปรุงผังการออกแบบช่วยเปิดพื้นที่เพิ่มเติมให้แก่ผู้อยู่อาศัยบนแหล่งที่อยู่อาศัย(หัวเราะ)"

 nanite_swarm_modifier:0 "ฝูงนาไนต์"
 nanite_swarm_modifier_desc:0 "ดาวเคราะห์ดวงนี้เต็มไปด้วยฝูงนาโนแมชชีนต่างดาวที่รุมล้อมคุกคาม โดยเข้าโจมตีสิ่งใดก็ตามที่ผ่านเข้าสู่ชั้นบรรยากาศ—ไม่ว่าจะเป็นสิ่งมีชีวิตทางชีวภาพหรือจักรกล"
 tamed_nanite_swarm_modifier:0 "ฝูงนาไนต์ที่เชื่องแล้ว"
 tamed_nanite_swarm_modifier_desc:0 "ฝูงนาไนต์ที่วิวัฒนาการด้วยตนเองได้รับการทำให้เชื่องบนดาวเคราะห์ดวงนี้ และบัดนี้ทำหน้าที่ช่วยเหลือชาวอาณานิคมในชีวิตประจำวัน"

 new_resonance_music_art:0 "ดนตรีและศิลปะกำทอน"
 new_resonance_study:0 "การศึกษาการกำทอนแบบใหม่"

 turtle_world_modifier:0 "เกาะลอยเคลื่อนที่"
 turtle_world_modifier_desc:0 "เกาะที่ในตอนแรกคิดว่าเป็นผืนแผ่นดินปกติบนดาวเคราะห์ดวงนี้ กลับกลายเป็นหลังของสัตว์เลื้อยคลานที่มีชีวิตขนาดมหึมา เรื่องนี้บีบบังคับให้ผู้อยู่อาศัยต้องใช้ความอุตสาหะอย่างมากในการจัดแบ่งพื้นที่อยู่อาศัย"
 turtle_world_modifier_alone:0 "บนหลังของเนมมา"
 turtle_world_modifier_alone_desc:0 "$turtle_world_modifier_desc$ ผู้อยู่อาศัยได้ตัดสินใจที่จะปล่อยพวกมันอยู่ตามลำพัง"
 turtle_world_slaves_modifier:0 "เนมมาที่ถูกกดขี่"
 turtle_world_slaves_modifier_desc:0 "โลกใบนี้ได้บังคับให้เนมมายักษ์ในท้องถิ่นกลายเป็นทาส ซึ่งช่วยเพิ่มประสิทธิภาพในการใช้ดาวเคราะห์ของพวกเขา"
 embraced_turtle_slavery_modifier:0 "บังคับกดขี่เนมมา"
 embraced_turtle_slavery_modifier_desc:0 "การยอมรับระบบทาสเนมมาบนโลกใบนี้ส่งผลให้สนับสนุนความเชื่อถือในการกดขี่ระบบทาสอย่างกว้างขวางมากขึ้น"

 asteroid_relay_stations:0 "สถานีทวนสัญญาณบนดาวเคราะห์น้อย"
 asteroid_relay_stations_desc:0 "จักรวรรดินี้เริ่มติดตั้งเซ็นเซอร์ไว้ในดาวเคราะห์น้อยของระบบดาวโดยรอบ ช่วยเพิ่มระยะการทำงานของระบบสแกนเซ็นเซอร์"
 asteroid_encryption:0 "ระบบการเข้ารหัสบนดาวเคราะห์น้อย"
 asteroid_encryption_desc:0 "ด้วยการใช้ระบบเข้ารหัสโบราณที่ค้นพบภายในสถานีทวนสัญญาณร้าง จักรวรรดินี้ช่วยปกป้องความลับของตนได้สำเร็จ"
 # Names

 gas_cascade_sad:0 "การล้างเผ่าพันธุ์โดยไม่ได้ตั้งใจ"
 gas_cascade_sad_desc:0 "จักรวรรดินี้กำลังอยู่ในช่วงไว้ทุกข์หลังจากความบังเอิญก่อให้เกิดเหตุสูญพันธุ์ครั้งใหญ่ของระบบนิเวศทั้งหมด"
 gas_cascade_happy:0 "การบรรเทาทุกข์อันประเสริฐ"
 gas_cascade_happy_desc:0 "หลังจากก่อให้เกิดการสูญพันธุ์ครั้งใหญ่ จักรวรรดินี้สามารถจัดการแก้ไขทุกอย่างให้ถูกต้องแล้ว ช่วงเวลาไว้ทุกข์ได้แปรเปลี่ยนเป็นความรื่นเริงฉลองชัย"

 unexplained_insights:0 "ความรู้ความเข้าใจอันอธิบายไม่ได้"
 unexplained_insights_desc:0 "จักรวรรดินี้ได้รับคำชี้แนะถึงวิธีการและเป้าหมายการวิจัยที่พวกเขาควรทำการศึกษา"
 closed_loop:0 "ปิดวงจร"
 closed_loop_desc:1 "จักรวรรดินี้ได้ปิดวงจรกาลเวลาเรียบร้อยแล้วและรู้สึกโล่งใจเป็นอย่างยิ่ง"

 asteroid_thrusters:0 "ระบบขับเคลื่อนบนดาวเคราะห์น้อย"
 asteroid_thrusters_desc:0 "ด้วยการใช้ไอพ่นขับเคลื่อนโบราณที่สร้างขึ้นสำหรับดาวเคราะห์น้อย บัดนี้จักรวรรดินี้สามารถเคลื่อนที่ได้รวดเร็วยิ่งขึ้น"

