## Event Chain: Rapid Desertification
 RAPID_DESERTIFICATION_CAT: "การกลายสภาพเป็นทะเลทรายอย่างรวดเร็ว"
 RAPID_DESERTIFICATION_CAT_DESC: "ภาพถ่ายทางอากาศที่ถ่ายพืชพรรณที่ลดจำนวนลงอย่างรวดเร็วของ [From.Planet.GetName] อาจบ่งชี้ถึงการมีอยู่ของสิ่งมีชีวิตที่ไม่ระบุชื่อซึ่งอาศัยอยู่บนพื้นผิวโลก"
 anomaly.7135.name: "การระบุสิ่งมีชีวิตต่างดาวสำเร็จ"
 anomaly.7135.desc: "เราพบสิ่งมีชีวิตบน [desertling_planet.GetName] ฝูงสัตว์เลี้ยงลูกด้วยนมขนาดเล็กที่ไม่มีความนึกคิด(ไม่คุ้นเคย)ร่อนเร่ไปทั่วทั้งพื้นผิวของดาวเคราะห์ดวงนี้\n\nประชากรของพวกมัน ซึ่งนักวิทยาศาสตร์ของเราตั้งฉายาว่า'ดอกบัว'กำลังเพิ่มจำนวนขึ้นในอัตราที่น่าตกใจ ตอนนี้ดาวเคราะห์แบกรับน้ำหนักเกินขีดความสามารถแล้ว และระบบนิเวศก็กำลังเสื่อมโทรมลงอย่างรวดเร็ว"
 anomaly.7135.a: "สืบสวนสาเหตุว่าทำไมสิ่งนี้จึงเกิดขึ้นในเวลานี้"
 anomaly.7135.b: "การไม่เข้าแทรกแซงน่าจะดีที่สุด"
 anomaly.7135.b.tooltip: "เราจะเฝ้าติดตามสถานการณ์จากระยะไกล"
 RAPID_DESERTIFICATION_PROJECT: "ระบบนิเวศที่รับภาระหนักหน่วง"
 RAPID_DESERTIFICATION_PROJECT_DESC: "ดาวเคราะห์ [desertling_planet.Planet.GetName] มีประชากรล้นหลามไปด้วยฝูงสัตว์เลี้ยงลูกด้วยนมที่แพร่กระจายตัวอย่างรวดเร็ว ด้วยทรัพยากรที่เหมาะสม คณะนักวิทยาศาสตร์ของเราจะสามารถรวบรวมข้อมูลเชิงลึกเกี่ยวกับต้นกำเนิดและความสามารถของสิ่งมีชีวิตที่ไม่มีความนึกคิดชนิดนี้ได้เพิ่มเติม"
 anomaly.7140.name: "เผ่าพันธุ์รุกราน"
 anomaly.7140.desc: "ในระหว่างการศึกษาฝูงการละทิ้งบน [desertling_planet.GetName] คณะนักวิทยาศาสตร์ของเราได้สังเกตเห็นประเด็นสำคัญบางประการ ทั้งที่สิ่งมีชีวิตสายพันธุ์นี้มีอยู่แพร่หลายทั่วไป แต่กลับไม่มีบันทึกทางฟอสซิลที่สอดคล้องกันอย่างน่าประหลาดใจ ผู้บุกรุกระบบนิเวศเหล่านี้สร้างความเสียหายต่อสิ่งแวดล้อมอย่างรุนแรงในช่วงเวลาที่ค่อนข้างสั้น และมีแนวโน้มสูงมากที่จะถูกนำส่งมาที่นี่โดยผู้กระทำการภายนอกบางคน\n\nความจำเป็นเร่งด่วนในการเข้าแทรกแซงมีความชัดเจนอย่างยิ่ง หากไม่มีการดำเนินการใด ๆ สิ่งมีชีวิตเหล่านี้จะทำลายระบบนิเวศธรรมชาติที่หลงเหลืออยู่ของดาวเคราะห์ดวงนี้ไปจนหมด"
 anomaly.7140.a: "เราจะรับเลี้ยงสัตว์เล็กเหล่านี้ให้ได้มากที่สุดเท่าที่จะทำได้"
 anomaly.7140.a.tooltip: "เราจะต้องรับผิดชอบต่อการกระทำของพวกมัน"
 anomaly.7140.b: "ดำเนินมาตรการควบคุมประชากรสัตว์"
 anomaly.7140.b.tooltip: "สามารถใช้การปรับเปลี่ยนพันธุกรรมบางประการเพื่อยับยั้งการเจริญเติบโต..."
 anomaly.7140.c: "กำจัดสัตว์ร้ายเหล่านั้นทิ้ง"
 anomaly.7140.c.tooltip: "ดาวเคราะห์ดวงนี้จะต้องได้รับการปกป้องโดยไม่เสียดายค่าใช้จ่ายใด ๆ"
 anomaly.7140.d: "เราจะนำสัตว์บางส่วนมาทำเป็นปศุสัตว์"
 anomaly.7140.d.tooltip: "เราจะรับทาสสองรายสำหรับดาวเคราะห์แต่ละดวง"
 POPULATION_CONTROL_PROJECT: "การควบคุมประชากร"
 POPULATION_CONTROL_PROJECT_DESC: "เพื่อปกป้องรักษาสภาพนิเวศวิทยาของ [desertling_planet.GetName] การเพิ่มจำนวนประชากรแบบทวีคูณของสัตว์สายพันธุ์ผู้บุกรุกจะต้องถูกควบคุม คณะนักวิทยาศาสตร์ของเราต้องการเวลาและทรัพยากรเพื่อค้นหาทางออกที่นำไปปฏิบัติได้จริง"
 anomaly.7145.name: "เหตุการณ์สูญพันธุ์"
 anomaly.7145.base: "ได้ยอมจำนนต่อการระบาดของสัตว์เลี้ยงลูกด้วยนมที่ขยายพันธุ์แบบทวีคูณ ความเงียบงันลึกซึ้งโอบคลุมภูมิประเทศอันแห้งแล้ง ซึ่งพืชพรรณทั้งหมดถูกกัดกินลึกลงไปถึงรากของพวกมัน\n\nส่วนสัตว์เลี้ยงลูกด้วยนมกินพืชและเนื้อเหล่านั้นก็นอนนิ่งสนิท บ้างก็เสียชีวิตจากความหิวโหย หรือไม่ก็ถูกญาติร่วมฝูงจับกินเมื่อความทุพภิกขภัยทวีความรุนแรงขึ้น"
 anomaly.7145.desc: "เราได้รับข่าวว่า [desertling_planet.GetName], $anomaly.7145.base$"
 anomaly.7145.b.desc: "เราได้รับข่าวว่า [desertling_planet.GetName] $anomaly.7145.base$"
 anomaly.7145.a: "อย่างน้อยความทุกข์ทรมานตอนนี้ก็จบสิ้นแล้ว"
 anomaly.7145.b: "อาณานิคมของเราถูกทำลายล้างลงแล้ว"
 anomaly.7150.name: "การเกิดใหม่ของธรรมชาติ"
 anomaly.7150.desc: "หลังจากความพยายามอย่างตรากตรำในการทำหมันและดัดแปลงพันธุกรรมของฝูงการละทิ้งบน [desertling_planet.GetName] ในที่สุดประชากรของพวกมันก็ลดลงมาอยู่ในระดับที่ยั่งยืน\n\nเมื่อไม่มีฝูงสัตว์กินพืชจำนวนมากเกินไป ความสมดุลที่เปราะบางจึงบังเกิดขึ้น ธรรมชาติกำลังฟื้นฟูตัวเองอย่างรวดเร็ว โดยมีหญ้าเขียวขจีเริ่มแตกหน่อขึ้นมาใหม่ปกคลุมทะเลทรายที่เคยแห้งแล้ง"
 anomaly.7150.a: "สวรรค์ที่ซ่อนเร้น"
 anomaly.7155.name: "ทะเลทรายสีแดง"
 anomaly.7155.desc: "ในที่สุด สัตว์ฟันแทะตัวสุดท้ายก็ได้ตายลงบน [desertling_planet.GetName] ตัวผืนทรายเองถูกย้อมไปด้วยสีแดงจากการใช้ความพยายามอย่างมหาศาลเพื่อช่วยดาวเคราะห์ดวงนี้จากการระบาด ทว่าตอนนี้เริ่มมีหน่อสีเขียวใหม่ผลิขึ้นมาแล้ว เราดำเนินการได้ทันเวลาพอดี"
 anomaly.7155.a: "มันเป็นเรื่องที่จำเป็นต้องทำ"
 colony.7160.name: "สมบัติของชาติ"
 colony.7160.desc: "เมื่อเราเปิดรับฝูงการละทิ้งเข้ามาในดาวเคราะห์ของเรา ไม่มีใครคาดการณ์ถึงผลลัพธ์ที่จะตามมาได้เลย สัตว์เล็กเหล่านี้ปรับตัวเข้ากับวิถีชีวิตของเราได้อย่างราบรื่น กลายเป็นเพื่อนคู่ใจที่เป็นที่รักในครัวเรือนต่าง ๆ ทั่วดินแดนของเรา\n\nการรวมตัวเข้ากับเราอย่างรวดเร็วของพวกมันทำให้เกิดการคาดเดาว่าพวกมันอาจจะเคยเป็นสัตว์เลี้ยงมาก่อนในอดีต ไม่ว่าจะด้วยเหตุผลใดก็ตามที่ทำให้พวกมันมีความเป็นมิตรโดยธรรมชาติ ข่าวลือนี้มีแต่จะช่วยเพิ่มความน่าดึงดูดรอบตัวของสิ่งมีชีวิตที่พิเศษเหล่านี้ขึ้นไปอีก"
 colony.7160.a: "ในแง่หนึ่ง พวกมันช่วยชีวิตพวกเราไว้"
 colony.7165.name: "สิ่งมีชีวิตที่สร้างปัญหา"
 colony.7165.desc: "มีข่าวร้ายแจ้งมาถึงเรา ฝูงการละทิ้งสองสามตัวได้เล็ดลอดหลบหนีไปในระหว่างการขนส่ง และจัดตั้งกลุ่มสังคมที่ขยายตัวอย่างรวดเร็วในธรรมชาติ ปัญหานี้จะต้องได้รับการแก้ไขโดยเร็วเพื่อหลีกเลี่ยงการพังทลายของสิ่งแวดล้อม"
 colony.7165.a: "ออกล่าและกำจัดสิ่งมีชีวิตเหล่านี้ทิ้ง!"
 colony.7165.b: "สร้างเขตรักษาพันธุ์สัตว์ป่าที่มีกำแพงกั้น"
 colony.7170.name: "ประชากรสัตว์เลี้ยงลูกด้วยนมมีเสถียรภาพแล้ว"
 colony.7170.desc: "เราประสบความสำเร็จในระดับปานกลางในการระงับการระบาดอย่างรุนแรงของฝูงการละทิ้งแต่น่าเสียดายที่เราไม่สามารถกำจัดสัตว์เล็กที่หลบเลี่ยงได้ง่ายเหล่านี้ให้หมดสิ้นไปได้ สิ่งสำคัญคือต้องคอยติดตามสถานการณ์ต่อไป เนื่องจากมันอาจถึงจุดเปลี่ยนได้ทุกเมื่อ"
 colony.7170.a: "การล่าดำเนินต่อไป"
 colony.7175.name: "การระบาดที่ควบคุมไม่ได้"
 colony.7175.desc: "ความพยายามของเราในการควบคุมการระบาดของการละทิ้งกลายเป็นเรื่องไร้ผล สัตว์ที่ตะกละตะกลามเหล่านี้ได้ขุดรูฝังตัวลึก ขยายอาณานิคมขนาดใหญ่ของพวกมันได้เร็วกว่าที่เราจะกำจัดพวกมันได้ สงครามครั้งนี้จะพ่ายแพ้ เว้นแต่เราจะอนุญาตให้กองทัพใช้คลังอาวุธระเบิดและแก๊สพิษจำนวนมหาศาล ซึ่งเป็นแนวทางปฏิบัติที่จะเสี่ยงต่อสวัสดิภาพของทุกคนบนพื้นผิว"
 colony.7175.a: "สัตว์พวกนี้คงจะอยู่ที่นี่ไปอีกนาน..."
 colony.7175.b: "เราจะไม่ยอมแพ้สงครามให้กับสัตว์ฟันแทะเพียงอย่างเดียวเด็ดขาด"
 colony.7175.b.tooltip: "เราจะทำลายล้างดาวเคราะห์ทั้งดวงเลยก็ได้ถ้าจำเป็น"

 job_alien_hunter: "นักล่าสิ่งมีชีวิตต่างดาว"
 job_alien_hunter_plural: "นักล่าสิ่งมีชีวิตต่างดาว"
 job_alien_hunter_desc: "กองกำลังเฉพาะกิจพิเศษที่ได้รับมอบหมายให้ออกล่าสัตว์ป่าต่างดาว"
