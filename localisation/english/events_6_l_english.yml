 d_floodplains: "ที่ราบลุ่มน้ำท่วมถึงที่กำลังขยายตัว"
 d_floodplains_desc: "พื้นที่ส่วนใหญ่ของโลกใบนี้ถูกน้ำท่วมเนื่องจากระดับน้ำทะเลที่สูงขึ้นอย่างรวดเร็ว"
 d_crystalline_glacier: "ทุ่งน้ำแข็งคริสตัล"
 d_crystalline_glacier_desc: "คริสตัลสีฟ้าเยือกแข็งเหล่านี้ครั้งหนึ่งเคยเป็นหัวใจของธารน้ำแข็งยุคดึกดำบรรพ์"
 d_mineral_seabed: "พื้นทะเลที่อุดมสมบูรณ์"
 d_mineral_seabed_desc: "พื้นทะเลเต็มไปด้วยแร่ธาตุคุณภาพสูงกระจัดกระจายอยู่ทั่วไป"

