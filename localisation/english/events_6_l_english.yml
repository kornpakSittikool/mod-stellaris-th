 harvesting_negative_mass:0 "การเก็บเกี่ยวมวลลบ"
 harvesting_negative_mass_desc:0 "การเก็บเกี่ยวอนุภาคมวลลบช่วยสนับสนุนการวิจัยทางฟิสิกส์ของเรา"
 appeased_populace:0 "ประชากรที่ได้รับการผ่อนปรน"
 appeased_populace_desc:0 "การยอมรับข้อเรียกร้องเรื่องการอพยพข้ามมิติได้ช่วยบรรเทาความไม่พอใจของประชากรบนโลกนี้"
 angered_populace:0 "ประชากรที่โกรธเกรี้ยว"
 angered_populace_desc:0 "หลังจากปฏิเสธโอกาสในการอพยพข้ามมิติ ประชากรบนดาวเคราะห์ดวงนี้เริ่มเกิดความระส่ำระสาย"
 stolen_great_work:0 "ผลงานชิ้นเอกที่ถูกโจรกรรม"
 stolen_great_work_desc:0 "ผลงานชิ้นเอกที่ถูกโจรกรรมมาจากมิติกระจกเงา ถูกนำมาจัดแสดงอย่างภาคภูมิใจเคียงข้างกับฉับบสำเนาที่เหมือนกันทุกประการบนโลกนี้"
 multiple_stolen_great_works:0 "ผลงานชิ้นเอกที่ถูกโจรกรรมมาหลายชิ้น"
 multiple_stolen_great_works_desc:0 "ผลงานชิ้นเอกหลายชิ้นที่ถูกโจรกรรมมาจากจักรวาลเบต้า ประดับประดาอยู่บนกำแพงของโลกนี้"
 offloaded_optimization:0 "การเพิ่มประสิทธิภาพด้วยการส่งต่อภาระงาน"
 offloaded_optimization_desc:0 "การส่งต่อภาระการคำนวณแบบวันต่อวันไปยังโลกเบต้าช่วยเพิ่มขีดความสามารถในการผลิตของเราได้อย่างมหาศาล"

 b_world_saved:0 "ได้รับการช่วยเหลือ"
 b_world_saved_desc:0 "ดาวเคราะห์ดวงนี้รู้สึกซาบซึ้งใจที่ได้รับการช่วยเหลือ"

