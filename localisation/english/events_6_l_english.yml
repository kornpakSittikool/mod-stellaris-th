 # Synced from vanilla by Stellaris Thai Translator.
 # These keys were missing from the mod and should be translated on the next pass.
THE_JUDGE_CAT: "เดอะชราวด์"
THE_JUDGE_CAT_DESC: "มี การ ตรวจ พบ จุด ที่ สําคัญ ของ รังสี ใน บริเวณ นั้น ของ[From.GetName]ดําเนินการอย่างระมัดระวังเมื่อตรวจสอบ"
anomaly.9000.name: "เรือ ลึกลับ"
anomaly.9000.desc: "การศึกษาของเรา[From.GetName]ได้ให้ผลที่น่าสนใจ ภายในแกนของดาวเคราะห์น้อย เป็นพื้นที่ลบ ของทรงกลมที่สมบูรณ์แบบ ผนังเรียบจนถูกแกะสลักด้วยความแม่นยําของอะตอม และที่อยู่ตรงกลางเป็นเรือขนาดเล็ก ดูเหมือนกําลังฉลอง[Root.GetName]ความจริงมันเป็นเพียงเสียงก้อนครั้งเดียวเท่านั้น[Root.GetLeaderName]."
anomaly.9000.a: "ใส่ที่ผู้ชมหลัก"
anomaly.9001.name: "ผู้ พิพากษา"
anomaly.9001.desc: "คุณ ผลาญ เงิน ไป 63% ของ ศักยภาพ ทาง สถิติ ที่ คุณ ได้ รับ.\nทําให้การดํารงอยู่ของคุณ ใน 47 วินาทีข้างหน้า หรือยกเว้นส่วนที่ตัด"
anomaly.9001.a: "คุณเป็นใคร? คุณต้องการอะไร?"
anomaly.9001.a.response: "ฉันคือผู้พิพากษา โอกาส ที่ จะ มี ชีวิต อยู่ เป็น ของ ขวัญ ล้ํา ค่า ที่ มี ไม่ กี่ คน ได้ รับ และ คุณ ได้ เสีย ของ คุณ ไป.\n\n38 วินาที..."
anomaly.9001.b: "หมายความว่ายังไง \"ขยาย\"?"
anomaly.9001.b.response: "ฉันจะให้สถานที่ ที่นายเก็บไว้ในไทม์ไลน์นี้ กับคนที่อาจคู่ควรกับมัน คนที่ไม่มีโอกาสได้เป็น คุณจะเป็นมากกว่าลืม การมีชีวิตอยู่อย่างไร้ค่าของคุณจะไม่มีวันเกิดขึ้น"
anomaly.9001.c: "คุณเป็นใครถึงมาตัดสิน คุณมีสิทธิ์อะไร"
anomaly.9001.c.response: "ฉันตัดสินโดยการทํา ฉันมีสิทธิ์รับ\n\nคุณ กิน ลม หายใจ, พื้น ที่, และ แบนด์วิธ แต่ ก็ ไม่ มี ส่วน สนับสนุน อะไร นอก จาก เอนโทรปี. ลิขสิทธิ์ไม่ได้โศกเศร้า สูญเสียบัลลาสต์\n\n0 วินาที..."
anomaly.9002.name: "ชีพจรของรังสี"
anomaly.9002.desc: "การศึกษาของเรา[From.GetName]ได้ให้ผลที่น่าสนใจ ดาวเคราะห์น้อยมีแก่นของสารกัมมันตรังสี ที่ปล่อยคลื่นความถี่ของธาตุ เมื่อมันเสื่อมสภาพ ในขณะที่นักวิทยาศาสตร์ของเรา[Root.GetLeaderName]อาจไม่เคยฟื้นตัวจากรังสีแกมม่าปริมาณมาก การอุดตันนั้นคาดเดาได้ และก่อให้เกิดความเสี่ยงต่อนักวิจัยในอนาคต"
anomaly.9002.a: "โทษที[Root.GetLeaderName]."
