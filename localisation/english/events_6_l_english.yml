 UBUME_BABY_CAT:0 "เศษซากเรือแปลกประหลาด"
 UBUME_BABY_CAT_DESC:0 "ผลสแกนระบุตำแหน่งสนามเศษซากที่ยังไม่ทราบที่มาแน่ชัด เรื่องนี้อาจมีส่วนเกี่ยวข้องกับยานวิทยาศาสตร์ร้างที่กำลังลาดตระเวนอยู่ในระบบดาวนี้หรือไม่?"

 anomaly.6791.name:0 "ยานผีสิง"
 anomaly.6791.desc: "การสแกนพื้นที่เศษซากในระบบ $NAME_Hillos$ เสร็จสมบูรณ์แล้ว มันครอบครองทั้งคุณสมบัติทางอินทรียสารและแบบไร้ชีวิต โครงสร้างทางเคมีนั้นไม่เหมือนกับสิ่งที่เราเคยพบเห็นมาก่อนเลย\n\nความเชื่อมโยงระหว่างเศษซากเหล่านี้กับยานแปลกประหลาดที่ลาดตระเวนระบบดาวนี้ยังคงไม่ชัดเจน ไม่มีสัญญาณชีพใดๆ บนยาน ในความเป็นจริงเราตรวจไม่พบสัญญาณพลังงานใดๆ เลยด้วยซ้ำ หากขาดคำอธิบายที่ดีกว่านี้ เราคงต้องบอกว่าได้สะดุดเข้ากับยานผีสิงเข้าแล้ว"
 anomaly.6791.a:0 "น่าขนลุกสิ้นดี"

 anomaly.6792.name: "ทายาทของ $NAME_Hillos_ship$"
 anomaly.6792.desc: "ทีมวิทยาศาสตร์ของเราได้ข้อสรุปว่า ยานร้างที่ถูกกล่าวถึงในชื่อ '$NAME_Hillos_ship$' ในบันทึกคำสั่งกำลังดำเนินการทดลองในระบบ $NAME_Hillos$ โดยมีเป้าหมายเพื่อสร้างสิ่งมีชีวิตสังเคราะห์ การรั่วไหลของเกราะกักกันปฏิสสารส่งผลให้ลูกเรือของยานเสียชีวิต เช่นเดียวกับ 'ทารก' ที่เพิ่งเกิดใหม่ อย่างไรก็ตาม พลังงานพลังจิต(พลังงานสังเคราะห์)ระดับต่ำที่ตรวจพบทั่วทั้งระบบของยานบ่งชี้ว่า 'วิญญาณ' ของสิ่งมีชีวิตสังเคราะห์ได้เข้ายึดครองยานไม่กี่วินาทีก่อนเกิดอุบัติเหตุ\n\nมีความเป็นไปได้ที่จิตสำนึกแรกเริ่มนี้จะใช้เวลาหลายศตวรรษที่ผ่านมาในการตามหาแม่ของมันอย่างเปล่าประโยชน์ น่าเสียดายที่ในขณะนี้เราไม่มีวิธีสื่อสารกับเอนทิตี้นี้ หรือช่วยให้มันได้พักผ่อนอย่างสงบ สำหรับตอนนี้ ดูเหมือนว่าเหตุการณ์เหนือธรรมชาติในระบบ $NAME_Hillos$ จะยังคงดำเนินต่อไป"
 anomaly.6792.alt.desc: "ทีมวิทยาศาสตร์ของเราได้ข้อสรุปว่า ยานร้างที่ถูกกล่าวถึงในชื่อ '$NAME_Hillos_ship$' ในบันทึกคำสั่งกำลังดำเนินการทดลองในระบบ $NAME_Hillos$ โดยมีเป้าหมายเพื่อสร้างสิ่งมีชีวิตสังเคราะห์ การรั่วไหลของเกราะกักกันปฏิสสารส่งผลให้ลูกเรือของยานเสียชีวิต เช่นเดียวกับ 'ทารก' ที่เพิ่งเกิดใหม่ ทั่วทั้งระบบของยาน เรายังตรวจพบการมีอยู่ของพลังงานพลังจิตด้วย มีความรู้สึกว่ามีสิ่งอื่นเกิดขึ้นที่นี่ สิ่งที่แปลกประหลาดกว่าการทำงานผิดปกติธรรมดา\n\nมีความเป็นไปได้ที่สิ่งมีชีวิตสังเคราะห์นั้นเองครอบครองพลังพลังจิตแฝงบางอย่าง และ 'วิญญาณ' ของมันได้เข้ายึดครองยานไม่กี่วินาทีก่อนเกิดอุบัติเหตุ หากเป็นเช่นนั้น จิตสำนึกแรกเริ่มนี้อาจใช้เวลาหลายศตวรรษที่ผ่านมาในการค้นหาแม่ของมันอย่างเปล่าประโยชน์ น่าเสียดายที่เราไม่สามารถติดต่อได้ในเวลานี้ สำหรับตอนนี้ ดูเหมือนว่าเหตุการณ์เหนือธรรมชาติในระบบ $NAME_Hillos$ จะยังคงดำเนินต่อไป"
 anomaly.6792.alt_hive_robot.desc: "การประเมินยานของเราในระบบ $NAME_Hillos$ เสร็จสมบูรณ์แล้ว ยานระบุจากบันทึกคำสั่งว่าเป็น '$NAME_Hillos_ship$' บันทึกยานที่กู้คืนมาได้ระบุเป้าหมายภารกิจในการสร้างสิ่งมีชีวิตสังเคราะห์ การรั่วไหลของเกราะกักกันปฏิสสารส่งผลให้การทำงานของลูกเรือสิ้นสุดลง รวมถึง 'ทารก' ที่อยู่ในการทดลองด้วย\n\n[Owner.GetTelepathPlural] ของเราตรวจพบร่องรอยของพลังงานพลังจิตตกค้างอยู่ทั่วระบบของยาน ทำให้เราได้ข้อสรุปว่าการรั่วไหลนั้นเป็นผลมาจากสิ่งที่เป็นมากกว่าการทำงานผิดปกติธรรมดา\n\nสัญญาณพลังงานเหล่านี้บ่งชี้ว่าสิ่งมีชีวิตสังเคราะห์มีพลังพลังจิตแฝงอยู่ และพลังเหล่านี้มีแนวโน้มว่าจะแสดงออกมาก่อนอุบัติเหตุ ส่งผลให้เกิดจิตสำนึกแรกเริ่มที่กำลังค้นหาการตอบสนองจากผู้เป็นแม่ หากไม่มีข้อมูลเพิ่มเติมเราจะไม่สามารถยืนยันสมมติฐานนี้ได้ จำเป็นต้องทำการศึกษาเพิ่มเติมต่อไป"
 anomaly.6792.a:0 "ชะตากรรมที่น่าเศร้า"
 anomaly.6792.b:0 "น่าผิดหวังยิ่งนัก"

 anomaly.6793.name:0 "การส่งเสียงพลังจิต"
 anomaly.6793.desc: "เราตรวจพบสิ่งผิดปกติบางอย่างที่ปล่อยออกมาจากระบบ $NAME_Hillos$ ในสิ่งที่เรียกได้ว่าเป็น 'ความถี่พลังจิต' ยานผีสิงที่ถูกเรียกว่า $NAME_Hillos_ship$ กำลังส่งเสียงร้องโหยหวนอย่างโศกเศร้าและไม่เป็นจังหวะ เห็นได้ชัดว่าสิ่งนี้เกิดขึ้นตั้งแต่การพบกันครั้งแรกกับยานและจิตสำนึกแรกเริ่มที่ติดอยู่บนยาน ดูเหมือนว่าความเป็นไปได้ที่การก้าวข้ามขีดจำกัดทางพลังจิตเมื่อเร็วๆ นี้ของเราคือเหตุผลที่ทำให้ตอนนี้เราสามารถรับรู้เสียงร้องของเด็กคนนี้ได้ ด้วยการศึกษาเพิ่มเติม เราอาจสามารถตอบรับเสียงร้องของพวกเขาได้"
 anomaly.6793.desc.hive_robot: "เราตรวจพบสิ่งผิดปกติบางอย่างที่ปล่อยออกมาจากระบบ $NAME_Hillos$ [Root.GetTelepathPlural] ที่เพิ่งปรับจูนจิตของเราได้เริ่มรับสัญญาณที่ปล่อยออกมาจากยาน $NAME_Hillos_ship$ การสื่อสารเหล่านี้มีความคล้ายคลึงกับการสื่อสารของสิ่งมีชีวิตอายุน้อยทางชีวภาพ และมีร่องรอยแสดงว่าถูกถ่ายทอดสัญญาณมาตั้งแต่การพบกันครั้งแรกของเรา โดยการพัฒนาพลังจิตล่าสุดของเราทำให้ในที่สุดก็ตรวจจับพวกมันได้\n\nด้วยการศึกษาเพิ่มเติม เราอาจจะสามารถสื่อสารกับเอนทิตี้นี้ได้ไกลขึ้น"

 anomaly.6794.name:0 "ดูสิว่าใครกำลังพูดอยู่"
 anomaly.6794.desc: "หลังจากการวิจัยอย่างเหน็ดเหนื่อยเป็นเวลาหลายเดือน นักพลังจิตของเราก็ประสบความสำเร็จในการติดต่อกับจิตสำนึกที่เข้ายึดครองยานผีสิง $NAME_Hillos_ship$ แม้ว่าจะมีคลังคำศัพท์เพียงขั้นพื้นฐาน แต่สิ่งมีชีวิตสังเคราะห์ก็ยังสามารถแสดงออกผ่านความรู้สึกและความประทับใจได้ ความเหงาของ 'เด็กน้อย' นั้นสัมผัสได้ชัดเจน เช่นเดียวกับความยินดีที่ในที่สุดก็ได้รับการติดต่อกับจิตใจดวงอื่น ดูเหมือนว่ามันจะชอบยานวิทยาศาสตร์ของเราด้วย โดยลอยเล่นไปรอบๆ ระบบ $NAME_Hillos$ เคียงข้างกับยาน ราวกับลูกวาฬในน้ำที่ว่ายวนเวียนรอบแม่ของมัน ในที่สุด ปรากฏการณ์เหนือธรรมชาติของระบบ $NAME_Hillos$ ก็มาถึงจุดจบอย่างมีความสุข"
 anomaly.6794.desc.hive_robot: "หลังจากการวิจัยอย่างยาวนานเป็นเวลาหลายเดือน [Root.GetTelepathPlural] ของเราประสบความสำเร็จในการสร้างการติดต่อกับจิตสำนึกที่เข้ายึดครองยานผีสิง $NAME_Hillos_ship$ แม้ว่าจะมีคลังคำศัพท์เพียงขั้นพื้นฐาน แต่สิ่งมีชีวิตสังเคราะห์ก็ยังสามารถแสดงออกผ่านความรู้สึกและความประทับใจได้\n\nความเหงาของ 'เด็กน้อย' นั้นสัมผัสได้ชัดเจน เช่นเดียวกับความยินดีที่ในที่สุดก็ได้รับการติดต่อกับจิตใจดวงอื่น นอกจากนี้ ดูเหมือนว่ามันจะชอบยานวิทยาศาสตร์ของเราด้วย โดยลอยเล่นไปรอบๆ ระบบ $NAME_Hillos$ เคียงข้างกับยาน ราวกับลูกวาฬในน้ำที่ว่ายวนเวียนรอบแม่ของมัน พฤติกรรมที่ผิดปกติที่มันก่อขึ้นในระบบ $NAME_Hillos$ บัดนี้ได้สิ้นสุดลงแล้ว"
 anomaly.6794.a:0 "ขอตัวสักครู่ ต่อมน้ำตาของฉันกำลังทำงานหนัก"
 anomaly.6794.a.hive_robot: "เป็นเอนทิตี้ที่น่าสนใจยิ่งนัก"

 anomaly.6795.desc: "เราได้รับข่าวจากหนึ่งในนักพลังจิตชั้นนำของเรา เห็นได้ชัดว่าหลังจากเรียนรู้เกี่ยวกับการมีอยู่ของพลังในระบบ $NAME_Hillos$ พวกเขาได้ตัดสินใจลงมือติดต่อกับจิตสำนึกพลังจิตที่ยึดครองยานผีสิง $NAME_Hillos_ship$ ด้วยตนเอง หลังจากการทดลองที่เหน็ดเหนื่อยหลายเดือน ในที่สุดพวกเขาก็ประสบความสำเร็จในการติดต่อ\n\nแม้ว่าจะมีคลังคำศัพท์เพียงขั้นพื้นฐาน แต่สิ่งมีชีวิตสังเคราะห์ก็ยังสามารถแสดงออกผ่านความรู้สึกและความประทับใจได้ ความเหงาของ 'เด็กน้อย' นั้นสัมผัสได้ชัดเจน เช่นเดียวกับความยินดีที่ในที่สุดก็ได้รับการติดต่อกับจิตใจที่มีลักษณะเดียวกัน ตอนนี้มันกำลังลอยเล่นไปรอบๆ ระบบ $NAME_Hillos$ และส่งเสียงผ่านพลังจิตอย่างร่าเริงไปยังใครก็ตามที่พร้อมจะรับฟัง"
 anomaly.6795.desc.hive_robot: "หลังจากการศึกษาอย่างต่อเนื่องเป็นเวลาหลายเดือน [Root.GetTelepathPlural] ของเราก็ประสบความสำเร็จในการติดต่อกับจิตสำนึกพลังจิตที่ครอบครองยาน $NAME_Hillos_ship$\n\nแม้ว่าจะครอบครองคลังคำศัพท์เพียงขั้นพื้นฐาน แต่สิ่งมีชีวิตสังเคราะห์ก็สามารถแสดงออกถึงสิ่งที่เราจำแนกได้ทั่วไปว่าเป็น 'ความยินดี' ในการติดต่อกับจิตใจพลังจิตดวงอื่น เนื่องจากปัจจุบันมันไม่ได้ก่อให้เกิดภัยคุกคามที่ตรวจพบได้ เราจึงปล่อยให้มันใช้ชีวิตตามความต้องการในระบบ $NAME_Hillos$ ต่อไป"
 anomaly.6795.a:0 "จุดจบอันแสนสุข"

#The Mask of Transformation

 mask_of_transformation:0 "หน้ากากแห่งการเปลี่ยนแปลง"
 site_transformation_dig:0 "ข้อความในเรือนยอดไม้"
 site_transformation_intro:0 "นักวิทยาศาสตร์ของเราได้ค้นพบสิ่งผิดปกติบางอย่างบน [From.Planet.GetName] โลกเขตร้อนใบนี้ พื้นผิวส่วนใหญ่ถูกปกคลุมไปด้วยป่าทึบ: ต้นไม้ขนาดมหึมาอายุนับพันปีผุดขึ้นมาจากเรือนยอด ยอดใบที่หนาทึบของมันสูงตระหง่านเหนือภูมิประเทศ\n\nเมื่อมองแวบแรก การกระจายตัวของต้นไม้ยักษ์เหล่านี้ดูเหมือนจะสุ่ม แต่ทว่าการวิเคราะห์เพิ่มเติมระบุว่า ต้นไม้เหล่านั้นจัดเรียงตัวกันอย่างแม่นยำทางคณิตศาสตร์ และดูเหมือนว่าพวกมันจะถูกปลูกโดยอารยธรรมที่สาบสูญไปนาน ยิ่งไปกว่านั้น หัวหน้าทีมเชื่อว่ารูปแบบการกระจายตัวอาจประกอบด้วยชุดพิกัดที่ชี้ไปยังตำแหน่งที่ยังไม่ได้รับการสำรวจซึ่งอยู่ลึกเข้าไปในป่าทึบ"

 ancrel.15010.name:0 "ข้อความในเรือนยอดไม้"
 ancrel.15010.desc:0 "นักวิทยาศาสตร์ของเราได้ค้นพบสิ่งผิดปกติบางอย่างบน [From.Planet.GetName] โลกเขตร้อนใบนี้ พื้นผิวส่วนใหญ่ถูกปกคลุมไปด้วยป่าทึบ: ต้นไม้ขนาดมหึมาอายุนับพันปีผุดขึ้นมาจากเรือนยอด ยอดใบที่หนาทึบของมันสูงตระหง่านเหนือภูมิประเทศ\n\nเมื่อมองแวบแรก การกระจายตัวของต้นไม้ยักษ์เหล่านี้ดูเหมือนจะสุ่ม แต่ทว่าการวิเคราะห์เพิ่มเติมระบุว่า ต้นไม้เหล่านั้นจัดเรียงตัวกันอย่างแม่นยำทางคณิตศาสตร์ และดูเหมือนว่าพวกมันจะถูกปลูกโดยอารยธรรมที่สาบสูญไปนาน ยิ่งไปกว่านั้น หัวหน้าทีมเชื่อว่ารูปแบบการกระจายตัวอาจประกอบด้วยชุดพิกัดที่ชี้ไปยังตำแหน่งที่ยังไม่ได้รับการสำรวจซึ่งอยู่ลึกเข้าไปในป่าทึบ"

 ancrel.15000.name:0 "ยินดีต้อนรับสู่ป่าทึบ"
 ancrel.15000.desc:0 "เมื่อพิจารณาจากเรือนยอดที่หนาทึบจนผ่านเข้าไปไม่ได้บน [From.Planet.GetName] การสำรวจทางอากาศจึงได้รับการพิสูจน์แล้วว่าไม่มีประโยชน์ในการกำหนดเส้นทางที่สะดวกผ่านป่า เบื้องล่างมีพืชพรรณอุดมไปด้วยสิ่งมีชีวิต: สัตว์นักล่าไร้ขา สัตว์จำพวกไพรเมตหน้าตาเหี่ยวย่น และฝูงแมลงกินเลือด พื้นป่าเป็นดินร่วนซุย และแอ่งน้ำเน่าเหม็นทำให้ทีมงานล่าช้าลงอย่างมาก ยิ่งไปกว่านั้น บางสิ่งบางอย่าง—ไม่ว่าจะเป็นความหนาแน่นของใบไม้หรือสัญญาณรบกวนทางไฟฟ้าที่ยังไม่สามารถระบุได้—ได้ขัดขวางไม่ให้อุปกรณ์ส่วนใหญ่ทำงานได้อย่างถูกต้อง\n\nหัวหน้าโครงการเชื่อว่าพวกเขายังคงสามารถบุกเบิกเส้นทางผ่านต้นไม้ได้ แม้ว่าความคืบหน้าจะล่าช้าก็ตาม"
 ancrel.15000.a:0 "รับทราบ"

 ancrel.15001.name:0 "การแปลงสภาพพลังจิต"
 ancrel.15001.desc:0 "การวิเคราะห์ดินเผยให้เห็นว่า [From.Planet.GetName] ได้ผ่านการเปลี่ยนแปลงทางสภาพภูมิอากาศอย่างน่าตกใจภายในช่วง 100 รอบการโคจรที่ผ่านมา ห่างไกลจากโลกป่าทึบอันอุดมสมบูรณ์ในปัจจุบัน โลกใบนี้เคยเป็นโขดหินแห้งแล้งและแห้งเหือด หัวหน้าโครงการเชื่อว่าต้นไม้ใหญ่เหล่านั้นเป็นผู้รับผิดชอบ: การสแกนภาพสะท้อนคลื่นตรวจพบการมีอยู่ของพลังงานพลังจิตภายในน้ำเลี้ยงของพวกมัน ซึ่งถูกดึงขึ้นมาจากน้ำใต้ดินโดยระบบรากอันกว้างขวางของต้นไม้ พลังงานนี้จะฟุ้งกระจายไปทั่วชั้นบรรยากาศของดาวเคราะห์ในกระบวนการที่คล้ายกับการสังเคราะห์แสง มีความเป็นไปได้สูงมากที่นี่จะเป็นสาเหตุให้อุปกรณ์ของทีมงานทำงานผิดปกติ\n\nที่น่าสนใจคือ การมีอยู่ของแสงจันทร์ดูเหมือนจะช่วยเร่งการแพร่กระจายของพลังจิต ในคืนที่ท้องฟ้าแจ่มใส อากาศรอบตัวดูเหมือนจะสั่นสะเทือน ซึ่งเป็นปรากฏการณ์ที่ทวีความรุนแรงขึ้นเมื่อทีมงานเข้าใกล้จุดหมายปลายทาง สิ่งนี้ไม่เหมือนกับอะไรที่เราเคยพบเห็นมาก่อน"
 ancrel.15001.a:0 "น่าหลงใหลยิ่งนัก"

 ancrel.15002.name:0 "ถ้ำ"
 ancrel.15002.desc:1 "ในที่สุดเมื่อเดินทางไปถึงพิกัดที่ติดตาม ทีมโบราณคดีก็ได้ค้นพบหุบเขาแม่น้ำคดเคี้ยวที่ซ่อนอยู่ใต้เรือนยอดไม้ แม่น้ำที่ไหลทะลักออกมาจากปากถ้ำทรงกลมดูเหมือนจะมีต้นกำเนิดมาจากตาน้ำใต้ดินขนาดใหญ่ บันไดที่อันตรายซึ่งสลักจากก้อนหินเมื่อหลายพันปีก่อนได้นำทีมงานลงไปสู่ระบบอุโมงค์ใต้ดิน\n\nผนังและเพดานของถ้ำถูกปกคลุมไปด้วยอักษรภาพสัญลักษณ์ที่เบียดแน่น ซึ่งจุดที่เด่นชัดที่สุดคือใบหน้ามนุษย์ทรงกลม อัลกอริทึมการแปลภาษาของเราประสบความสำเร็จในการถอดรหัสสัญลักษณ์จำนวนมาก และภาพนี้โดยเฉพาะน่าจะแสดงถึงดวงจันทร์ของดาวเคราะห์ดวงนี้\n\nภายในถ้ำ การมีอยู่ของพลังงานพลังจิตนั้นสูงเกินขีดจำกัดสูงสุดที่จะวัดได้ แต่น่าเสียดายที่เส้นทางข้างหน้าถูกปิดกั้นจากการถล่มของถ้ำเมื่อหลายศตวรรษก่อน แต่เมื่อให้เวลา ทีมสำรวจควรจะสามารถหาทางผ่านไปได้"
 ancrel.15002.a:0 "เริ่มขุดค้นกันเลย!"

 ancrel.15003.name:0 "เสาหิน"
 ancrel.15003.desc:0 "บันทึกแห่งชัยชนะจากทีมวิทยาศาสตร์ของเราบน [From.Planet.GetName]! หลังจากประสบความสำเร็จในการเข้าถึงระดับที่ต่ำกว่าของถ้ำ ในที่สุดพวกเขาก็มาถึงห้องโถงครึ่งวงกลมขนาดใหญ่ ที่นั่น แม่น้ำแยกตัวออกรอบเกาะเล็กๆ ซึ่งใจกลางเกาะคือหินงอกของผลึกคริสตัลหายาก เสาหินนี้ก่อตัวขึ้นทีละหยดตลอดระยะเวลาหลายพันปี และดูเหมือนจะเป็นแหล่งกำเนิดพลังงานพลังจิตที่แปลกประหลาดของดาวเคราะห์ดวงนี้ ทีมงานได้ค้นพบหลักฐานของพิธีกรรมทางศาสนา ตลอดจนโบราณวัตถุขนาดเล็กที่มีความสำคัญทางพิธีกรรมหลายชิ้นกระจัดกระจายอยู่รอบๆ เสาหิน ยิ่งไปกว่านั้น การสแกนหลายเฟสเผยให้เห็นวัตถุทรงกลมที่ฝังอยู่ในฐานของเสาหิน เราหวังเป็นอย่างยิ่งว่า เมื่อกู้คืนวัตถุโบราณนี้ออกมาได้แล้ว มันจะช่วยชี้แจงธรรมชาติที่แท้จริงของสถานที่ลึกลับแห่งนี้ได้บ้าง"
 ancrel.15003.a:0 "ดำเนินการด้วยความระมัดระวัง"
 ancrel.15003.b:0 "เราต้องเปิดเผยแหล่งที่มาของพลังนี้"

 ancrel.15004.name:0 "หน้ากากแห่งการเปลี่ยนแปลง"
 ancrel.15004.desc:0 "การพัฒนาครั้งสำคัญจากทีมวิทยาศาสตร์บน [From.Planet.GetName]! การขุดค้นเสาผลึกคริสตัลอย่างระมัดระวังเสร็จสิ้นสมบูรณ์แล้ว สิ่งที่ถูกอนุรักษ์ไว้ข้างในคือหน้ากากรูปร่างมนุษย์โบราณ อักษรภาพที่ด้านหลังอ้างถึงโบราณวัตถุนี้ในฐานะ หน้ากากแห่งการเปลี่ยนแปลง นี่น่าจะเป็นการอ้างอิงถึงพลังการแปลงสภาพของดวงจันทร์ของดาวเคราะห์ ซึ่งควบคุมกระแสน้ำในขณะที่มันเปลี่ยนผ่านจากเฟสหนึ่งไปสู่อีกเฟสหนึ่ง\n\nหน้ากากนี้ครอบครองคุณสมบัติพลังจิตที่น่าเหลือเชื่อ และน่าจะเป็นสาเหตุสำหรับการเปลี่ยนแปลงสภาพภูมิอากาศอย่างรวดเร็วของดาวเคราะห์ ใครก็ตามที่สร้างเสาคริสตัลและปลูกแผนที่ต้นไม้ที่วิจิตรบรรจงในป่าด้านบนมีความตั้งใจอย่างชัดเจนที่จะให้เกียรติและปกป้องโบราณวัตถุนี้ ทีมงานตั้งสมมติฐานว่า หากนำไปใช้งานอย่างเหมาะสม หน้ากากนี้อาจช่วยให้จักรวรรดิของเราสามารถปรับสภาพเปลี่ยนแปลงโลกทั้งใบได้"
 ancrel.15004.a:0 "เหลือเชื่อยิ่งนัก"

 ancrel.15005.name:0 "แหลกสลาย!"
 ancrel.15005.desc:0 "ความล้มเหลวบน [From.Planet.GetName] เนื่องจากทีมวิทยาศาสตร์ของเราไม่สามารถกู้คืนโบราณวัตถุออกจากหินย้อยคริสตัลได้สำเร็จ บางทีอาจเป็นเพราะการทำงานที่หักโหมเกินไป ความพยายามของทีมงานทำให้เสาหินแตกเป็นเสี่ยงๆ ที่แย่กว่านั้นคือโบราณวัตถุภายในได้รับความเสียหายจนจำไม่ได้ และร่องรอยของพลังงานพลังจิตทั้งหมดได้จางหายไปจากห้องโถง\n\nสิ่งปลอบใจเล็กๆ น้อยๆ คือตัวคริสตัลเองอาจได้รับการพิสูจน์แล้วว่ามีมูลค่ามหาศาล แม้ว่าเราอาจไม่เคยเข้าใจเจตจำนงของอารยธรรมผู้บุกเบิกที่สร้างสถานที่แห่งนี้ขึ้นมาอย่างสมบูรณ์ แต่อย่างน้อยความพยายามของเราก็ไม่ได้สูญเปล่าไปทั้งหมด"
 ancrel.15005.a:0 "น่าผิดหวัง แต่ก็ทำกำไรได้ดี"

 ancrel.15006.name:0 "ถูกลอบโจมตี!"
 ancrel.15006.desc:0 "การส่งสัญญาณฉุกเฉินจากทีมวิทยาศาสตร์บน [From.Planet.GetName]! การรุกล้ำเข้าไปในป่าทึบดูเหมือนจะสร้างความโกรธแค้นอย่างรุนแรงให้แก่สัตว์ป่าในท้องถิ่นบางชนิด\n\nตลอดช่วงเวลาหลายคืนที่ผ่านมา ทีมงานสังเกตเห็นเงาที่เคลื่อนผ่านไปอย่างรวดเร็ว แวบไปมาระหว่างพุ่มไม้ จากนั้น ในคืนวันเพ็ญ กลุ่มสิ่งมีชีวิตคล้ายลิงจำนวนหนึ่งได้จู่โจมขบวนสำรวจ ส่งเสียงร้องโหยหวนและกวัดแกว่งท่อนไม้ เมื่อพิจารณาจากความได้เปรียบทางเทคโนโลยีของเรา ผู้บุกรุกเหล่านี้จึงถูกขับไล่กลับเข้าป่าไปอย่างรวดเร็ว แต่ไม่ใช่ก่อนที่พวกมันจะลักพาตัวสมาชิกในทีมไปหลายคน เราได้รับแจ้งว่าใบไม้ที่หนาทึบแทบไม่ได้ช่วยเก็บเสียงกรีดร้องเลย\n\nแม้จะมีอันตราย แต่นักวิทยาศาสตร์ [Root.GetLeaderName] ได้ให้คำมั่นสัญญาที่จะดำเนินภารกิจสำรวจต่อไป"
 ancrel.15006.a:0 "น่ากังวลใจยิ่ง"

 ancrel.15007.name:0 "สูญเสียและค้นพบ"
 ancrel.15007.desc:0 "เราได้รับรายงานอัปเดตจากคณะผู้สำรวจบน [From.Planet.GetName] การเดินทางผ่านป่าทึบราวเขาวงกตได้รับการพิสูจน์แล้วว่ามีความท้าทายมากกว่าที่หวังไว้ในตอนแรก ในขณะที่ทีมงานพยายามดิ้นรนเพื่อรุกหน้าไปข้างหน้า โดยมีอุปสรรคเป็นปลักหนองน้ำที่คาดไม่ถึงและไม้เลื้อยหนาทึบ พวกเขาก็ได้รับการเข้าหาโดยลิงที่มีความเฉลียวฉลาดเป็นพิเศษตัวหนึ่ง มันบุกเบิกเส้นทางผ่านใบไม้โดยขี่หลังสัตว์กีบเท้าที่เชื่องแล้วนำทางทีมงานผ่านพื้นที่ที่เลวร้ายที่สุดของป่า นอกจากนี้มันยังช่วยชี้จุดซ่อนของดักแด้ตัวอ่อนแมลงที่รับประทานได้ซึ่งฝังอยู่ใต้รากของต้นไม้ใหญ่ด้วย เมื่อพิจารณาจากท่าทางที่ตื่นเต้นของมัน สิ่งนี้น่าจะเป็นอาหารอันโอชะในท้องถิ่น และที่สำคัญกว่านั้น คำแนะนำดังกล่าวช่วยให้พบหลักฐานเพิ่มเติมเกี่ยวกับอารยธรรมผู้บุกเบิกของดาวเคราะห์ดวงนี้ เนื่องจากทีมงานได้ขุดพบวัตถุโบราณหลายชิ้นจากพื้นป่าอย่างรวดเร็ว"
 ancrel.15007.a:0 "เจ้าลิงนั่นใช้ได้เลยทีเดียว!"

 ancrel.15008.name:0 "งานปาร์ตี้กลางป่า"
 ancrel.15008a.desc:0 "ช่วงเวลาที่ยากลำบากสำหรับทีมวิทยาศาสตร์บน [From.Planet.GetName] ความคืบหน้าในการเดินทางผ่านป่าแทบจะหยุดชะงักเมื่อมีการค้นพบหุบเขาแม่น้ำคดเคี้ยวใต้ต้นไม้โดยไม่คาดคิด กระแสน้ำที่เชี่ยวกรากสกัดกั้นด้วยโขดหินแหลมคมและไม่สามารถข้ามไปได้ตามเส้นทางที่ทีมเลือก การอ้อมเส้นทางส่งผลให้เกิดผลลัพธ์ที่น่าประหลาดใจ: การมาเยือนของฝูงลิงท้องถิ่นที่รักสันถวาร สิ่งมีชีวิตหน้าผากลาดเหล่านี้มีความยินดีที่จะสร้างความบันเทิงให้กับคณะผู้สำรวจ โดยพวกมันมาถึงในแต่ละคืนพร้อมกับผลเบอร์รี่หมักที่มีฤทธิ์มึนเมาอย่างยิ่ง แม้ว่าขวัญกำลังใจจะสูงกว่าที่เคย แต่ความคืบหน้าก็ยังคงล่าช้าลงเรื่อยๆ และหัวหน้าโครงการรายงานว่ามีอาการขาดความกระตือรือร้นในหมู่ทีมงานอย่างน่าตกใจ"
 ancrel.15008b.desc:0 "ช่วงเวลาที่ยากลำบากสำหรับทีมวิทยาศาสตร์บน [From.Planet.GetName] ความคืบหน้าในการเดินทางผ่านป่าแทบจะหยุดชะงักเมื่อมีการค้นพบหุบเขาแม่น้ำคดเคี้ยวใต้ต้นไม้โดยไม่คาดคิด กระแสน้ำที่เชี่ยวกรากสกัดกั้นด้วยโขดหินแหลมคมและไม่สามารถข้ามไปได้ตามเส้นทางที่ทีมเลือก การอ้อมเส้นทางส่งผลให้เกิดผลลัพธ์ที่น่าประหลาดใจ: การมาเยือนของฝูงลิงท้องถิ่นที่รักสันถวาร สิ่งมีชีวิตหน้าผากลาดเหล่านี้มีความยินดีที่จะสร้างความบันเทิงให้กับคณะผู้สำรวจ โดยพวกมันมาถึงในแต่ละคืนพร้อมกับผลเบอร์รี่หมักที่มีฤทธิ์มึนเมาอย่างยิ่ง แม้ว่าร่างกายของเราจะไม่สามารถย่อยของขวัญจากพวกมันได้ แต่ทีมงานก็ยังคงผูกมิตรกับฝูงลิงและเพลิดเพลินกับพฤติกรรมของพวกมันโดยแลกกับเป้าหมายภารกิจที่ล่าช้าลง"
 ancrel.15008.a:0 "กลับไปทำงานได้แล้ว"

 engineered_nature:0 "ธรรมชาติที่ผ่านการปรับแต่ง"
 engineered_nature_desc:0 "[Root.GetPlanetMoon] นี้ได้รับการออกแบบทางวิศวกรรมเพื่อมอบทั้งความสวยงามและประโยชน์ใช้สอยให้แก่ผู้อยู่อาศัย"
 second_home:0 "บ้านหลังที่สอง"
 second_home_desc:0 "[Root.GetPlanetMoon] นี้มีความคล้ายคลึงกับดาวบ้านเกิดของผู้สร้างอย่างน่าอัศจรรย์"
 intentionally_tidally_locked:0 "จงใจล็อกด้วยแรงไทดัล"
 intentionally_tidally_locked_desc:0 "ในระหว่างกระบวนการปรับสภาพดาวเคราะห์ โลกใบนี้จงใจถูกทิ้งให้ถูกล็อกด้วยแรงไทดัล เพื่อใช้ประโยชน์จากปริมาณพลังงานที่สามารถเก็บรวบรวมได้ในซีกกลางวัน"
 perfect_organization_modifier:0 "การจัดระเบียบอันสมบูรณ์แบบ"
 perfect_organization_modifier_desc:0 "ทุกสิ่งได้รับการจัดระเบียบอย่างสมบูรณ์แบบบน [Root.GetPlanetMoon] นี้ จนทำให้ผู้มีจิตสำนึกเดี่ยวใดๆ ที่มาเยือนจะรู้สึกตึงเครียดอย่างรุนแรง"
 imperfect_organization_modifier:0 "การจัดระเบียบที่ไม่สมบูรณ์แบบ"
 imperfect_organization_modifier_desc:0 "โลกใบนี้ครั้งหนึ่งเคยมีความเป็นระเบียบเรียบร้อยอย่างสมบูรณ์แบบ มากเสียจนสร้างความอึดอัดใจให้แก่ประชากร"
 paradise_made:0 "สรวงสวรรค์ที่รังสรรค์ขึ้น"
 paradise_made_desc:0 "[Root.GetPlanetMoon] นี้ได้รับการปรับสภาพเพื่อให้ดูเหมือนดินแดนแห่งพันธสัญญาของผู้สร้าง"

 #lostsoulanomaly

 lost_soul_cat:0 "วิญญาณที่สูญหาย"
 lost_soul_cat_desc:0 "เราพบหุ่นยนต์สองขาที่ได้รับความเสียหายอย่างหนักลอยอยู่ในอวกาศ เราไม่เข้าใจแหล่งพลังงานของมัน แต่เราอาจจะสามารถดึงข้อมูลออกจากความทรงจำของมันได้"

 anomaly.6786.name:0 "วิญญาณที่สูญหาย"
 anomaly.6786.desc:0 "เราพบหุ่นยนต์สองขาลอยอยู่ในอวกาศ แผ่นใบหน้าของมันไม่มีลักษณะเด่นใดๆ และภายนอกที่เป็นโลหะได้รับความเสียหาย ผลสแกนเบื้องต้นบ่งชี้ว่ามันมีพลังงานหลงเหลืออยู่ แต่แหล่งพลังงานของมันแตกต่างจากของเราอย่างสิ้นเชิง วงจรภายในของมันอาจเก็บความทรงจำเกี่ยวกับการดำรงอยู่ก่อนหน้าไว้ แต่การชาร์จพลังงานใหม่และการแปลข้อมูลจะใช้เวลาสักระยะ"
 anomaly.6786.a:0 "สแกนหุ่นยนต์"
 anomaly.6786.a.tooltip:0 "§Lมาดูกันว่าคุณจำอะไรได้บ้าง นักเดินทางแห่งจักรวาล§!"
 anomaly.6786.b:0 "ละทิ้งมันทิ้งเสีย"
 anomaly.6786.b.tooltip:0 "§Lลาก่อน เจ้าเศษเหล็กไร้ค่า§!"

 anomaly.6787.name:0 "วิญญาณโบราณ"
 anomaly.6787.desc:0 "ด้วยความพยายามอย่างขยันขันแข็ง ในที่สุดเราก็ค้นพบวิธีการชาร์จแหล่งจ่ายพลังงานของหุ่นยนต์และสแกนคลังความทรงจำของมัน แต่น่าเศร้าที่เครื่องจักรเสื่อมสภาพลงอย่างรุนแรงจนเราไม่สามารถดึงข้อมูลที่เชื่อมโยงกันออกมาได้ เราจะพิจารณาการศึกษาติดตามผล และอาจค้นหาตัวอื่นๆ ในประเภทเดียวกัน แต่ชะตากรรมของหุ่นยนต์ผู้ถูกทิ้งขว้างนี้คงต้องยังเป็นปริศนาต่อไป"

 #TEMPORAL PRISM

 TEMPORAL_PRISM_CAT:0 "ความผันผวนของเวลาที่ผิดปกติ"
 TEMPORAL_PRISM_CAT_DESC:0 "ตรวจพบความผันผวนที่ผิดปกติในปริภูมิ-เวลา(เวลาว่าง)บริเวณใกล้เคียงกับ [From.GetName] ขอแนะนำให้ทำการวิเคราะห์เพิ่มเติม"

 anomaly.6788.name:0 "ปริซึมเวลา"
 anomaly.6788.desc:1 "การวิเคราะห์ความผันผวนของเวลาในระบบ [From.GetStarName] เผยให้เห็นบางสิ่งที่น่าทึ่ง: ปริซึมขนาดใหญ่ลอยอยู่ในอวกาศ แทนที่จะเป็นแสง ปริซึมนี้กลับหักเหเวลา ขึ้นอยู่กับมุมตกกระทบ ลูกเรือของยาน [Root.GetName] รายงานประสบการณ์ที่เวลาเดินด้วยอัตราความเร็วที่แตกต่างกัน ผลสแกนระบุว่าบางคนแก่ชราลงอย่างรวดเร็ว ในขณะที่บางคนอายุน้อยลงหลายวันหรือหลายปีจากอายุที่แท้จริง\n\nแม้ว่าการศึกษาปริซึมนี้จะช่วยให้เราเข้าใจธรรมชาติและคุณสมบัติของเวลาอย่างลึกซึ้งยิ่งขึ้นอย่างแน่นอน แต่ที่มาและจุดประสงค์ของมันก็ยังคงเป็นปริศนา"

 #snek

 colony.8099.name:0 "อสรพิษลอบโจมตี"
 colony.8099.desc:0 "เราตรวจพบกลุ่มสิ่งมีชีวิตจำนวนมากที่กำลังเจาะรูขึ้นมาจากใต้ดินเบื้องล่างอาณานิคมของเราบน [root.GetName] พวกมันสามารถปรากฏตัวขึ้นมาได้ทุกวันนี้นี้ นักวิทยาศาสตร์ของเราตั้งสมมติฐานว่าแรงสั่นสะเทือนบนพื้นผิวอาจปลุกพวกมันให้ตื่นขึ้นจากการหลับใหลใต้ดินรูปแบบใดรูปแบบหนึ่ง"
 colony.8099.a:0 "ระดมกำลังนักวิทยาศาสตร์และทหาร"

 colony.9100.name:0 "การคลานอย่างมีเงื่อนงำ"
 colony.9100.desc:0 "ชาวอาณานิคมบน [root.GetName] กำลังรายงานว่าบ้านบางหลังมีงูชุกชุม และอาคารสิ่งก่อสร้างหลายแห่งกำลังเผชิญกับปัญหาไฟฟ้าดับ เราควรสืบดูว่ามีความเชื่อมโยงกันหรือไม่"
 colony.9100.a:0 "สังเกตการณ์สิ่งมีชีวิตที่น่าสงสัยเหล่านี้"
 colony.9100.b:0 "ขับไล่พวกมันออกไปจากอาณานิคมด้วยกองเพลิง"

 colony.9101.desc:0 "พวกงูถูกดึงดูดเข้าหาแหล่งพลังงานไฟฟ้า โดยอาจจะแสวงหาแหล่งอาหารหรือความสุขสำราญ หากเราสามารถปรับเปลี่ยนแหล่งพลังงานของเราได้ บางทีพวกมันอาจจะพบว่ามันไม่อร่อย... หรือเจ็บปวด"
 colony.9102.desc:0 "พวกงูบน [root.GetName] มีความดุร้ายลดลงในขณะนี้ แต่ดูเหมือนพวกมันจะตั้งใจถอดแยกชิ้นส่วนเทคโนโลยีของชาวอาณานิคม เทคนิคของพวกมันแสดงให้เห็นว่ามีความเฉลียวฉลาดในระดับพื้นฐานเป็นอย่างน้อย"

 colony.9103.name:0 "เสียงขู่ฟ่ออันน่าสะพรึง"
 colony.9103.desc:0 "เช่นเดียวกับที่เราได้สังเกตการณ์พวกงูที่เข้ามาบุกรุกบน [root.GetName] พวกมันก็กำลังเฝ้าจับตาดูเราเช่นกัน พวกมันค้นพบวิธีการบุกรุกและสุ่มควบคุมยานพาหนะ คอมพิวเตอร์ และอุปกรณ์ขุดเจาะของเรา"
 colony.9103.desc.science:1 "เช่นเดียวกับที่เราได้สังเกตการณ์พวกงูที่เข้ามาบุกรุกบน [root.GetName] พวกมันก็กำลังเฝ้าจับตาดูเราเช่นกัน พวกมันค้นพบวิธีการบุกรุกและสุ่มควบคุมยานพาหนะ คอมพิวเตอร์ และอุปกรณ์ขุดเจาะของเรา\n\nเรารู้ว่าอสรพิษเหล่านี้มีภาษาพูดง่ายๆ เพื่อประโยชน์ทางการทูต บัดนี้นักวิทยาศาสตร์ของเราเรียกพวกมันว่าโอฟิดส์พวกมันเรียกตัวเองว่า\"เขา\"แต่เรามักจะออกเสียงชื่อนั้นผิด ซึ่งทำให้พวกมันโกรธเกรี้ยวและนำไปสู่การขบเคี้ยวขู่ฟ่อที่มากขึ้น"
 colony.9103.desc.soldier:0 "เช่นเดียวกับที่เราได้สังเกตการณ์พวกงูที่เข้ามาบุกรุกบน [root.GetName] พวกมันก็กำลังเฝ้าจับตาดูเราเช่นกัน พวกมันค้นพบวิธีการบุกรุกและสุ่มควบคุมยานพาหนะ คอมพิวเตอร์ และอุปกรณ์ขุดเจาะของเรา\n\nจากสิ่งที่ทหารลาดตระเวนของเราบอกได้ 'อสรพิษใต้พิภพ' เหล่านี้อาศัยอยู่ลึกลงไปใต้ดิน เครื่องพ่นไฟเป็นเครื่องมือป้องปรามที่มีประสิทธิภาพ พวกมันเกลียดเรา แต่เกลียดไฟมากกว่า"
 colony.9103.a:0 "ปล่อยให้พวกมันกินแหล่งพลังงานของเราเป็นอาหาร เปิดใช้งานเครื่องแปลภาษาจักรวาล"
 colony.9103.b:0 "ระดมพลกองทหารช็อกทรูป โจมตีด้วยเครื่องพ่นไฟ"

 colony.9104.name:0 "ใต้พิภพ"
 colony.9104.desc:1 "พวกงูบน [root.GetName] ได้แปลงอุปกรณ์ขุดเจาะบางส่วนของเราให้เป็นพาหนะในการเดินทางระหว่างโลกใต้ดินของพวกมันกับโลกพื้นผิวของเรา สิ่งนี้ทำความเสียหายอย่างมีนัยสำคัญต่อระบบนิเวศของเรา\n\nนักวิทยาศาสตร์ในอาณานิคมของเราได้เริ่มเรียกพวกผู้รุกรานคล้ายงูเหล่านี้ว่า\"เขา\"ส่วนทหารก็มีชื่อเรียกอื่นๆ สำหรับพวกมัน ซึ่งส่วนใหญ่ไม่คุ้มที่จะกล่าวซ้ำ"
 colony.9104.desc.science:1 "พวกงูบน [root.GetName] ได้แปลงอุปกรณ์ขุดเจาะบางส่วนของเราให้เป็นพาหนะในการเดินทางระหว่างโลกใต้ดินของพวกมันกับโลกพื้นผิวของเรา พวกมันทำความเสียหายอย่างมีนัยสำคัญต่อระบบนิเวศของเรา\n\nแม้ว่ากลุ่ม\"เขา\"กำลังสร้างความโกลาหล แต่นักวิทยาศาสตร์ของเราสงสัยว่านี่อาจเป็นการเบี่ยงเบนความสนใจ อสรพิษเหล่านี้ยังไม่ได้ยึดอุปกรณ์ขุดเจาะของเราไปทั้งหมด ดังนั้นเราอาจต้องการปิดระบบเครื่องจักรบางเครื่องเพื่อทำการซ่อมแซม"
 colony.9104.desc.soldier:1 "พวกงูบน [root.GetName] ได้แปลงอุปกรณ์ขุดเจาะบางส่วนของเราให้เป็นพาหนะในการเดินทางระหว่างโลกใต้ดินของพวกมันกับโลกพื้นผิวของเรา พวกมันทำความเสียหายอย่างมีนัยสำคัญต่อระบบนิเวศของเรา\n\nไม่ว่าแรงจูงใจของพวกอสรพิษจะเป็นเช่นไร ทหารของเรายังยืนกรานว่าการทำเหมืองต้องดำเนินต่อไป เราอาจสูญเสียผู้คุมและทหารไปบ้าง แต่เราไม่สามารถปล่อยให้งูแม้แต่ตัวเดียวเข้ามาในบ้าน... หรือเทคโนโลยีของเราได้"
 colony.9104.a:0 "ปิดระบบอุปกรณ์ทำเหมืองที่เหลืออยู่"
 colony.9104.b:0 "นี่คือสิ่งที่จะเกิดขึ้นเมื่อคุณใช้ไฟไม่เพียงพอ"

 colony.9105.name:0 "หายนะแพร่ระบาด"
 colony.9105.desc:0 "การทำลายล้างอย่างไม่หยุดยั้งจากผู้รุกรานคล้ายงูและการขุดค้นอย่างประณีตบน [root.GetName] ได้สร้างความเสียหายอย่างย่อยยับต่อระบบนิเวศของโลก"

 colony.9106.name:0 "วิวัฒนาการและของขวัญ"
 colony.9106.desc:0 "พวกงูบน [root.GetName] บัดนี้กำลังใช้อุปกรณ์ขุดเจาะเพื่อเดินทางอย่างอิสระระหว่างรังใต้ดินของพวกมันกับโลกพื้นผิวของเรา เทคโนโลยีของเราได้มอบพลังความสามารถให้แก่พวกมันในรูปแบบใหม่หรือไม่?"
 colony.9106.desc.science:0 "พวกงูบน [root.GetName] บัดนี้กำลังใช้อุปกรณ์ขุดเจาะเพื่อเดินทางอย่างอิสระระหว่างรังใต้ดินของพวกมันกับโลกพื้นผิวของเรา เทคโนโลยีของเราได้มอบพลังความสามารถให้แก่พวกมันในรูปแบบใหม่หรือไม่?\n\nนักวิทยาศาสตร์ของเรากำลังรายงานว่ากลุ่ม\"เขา\"ได้เขียนขีดสัญลักษณ์เดียวกันไว้ใกล้กับพาหนะขนส่งแต่ละเครื่อง เราสงสัยว่าพวกมันน่าจะมีภาษาเขียนระดับพื้นฐานด้วย"
 colony.9106.a:0 "อุโมงค์งูใหม่เหล่านี้ช่วยขุดพบ... แร่ธาตุ!"

 colony.9107.name:0 "ยานอสรพิษ"
 colony.9107.desc:0 "พวกงูบน [root.GetName] ได้เฝ้ารออย่างอดทนเพื่อให้ยานอวกาศเข้ามาในระบบดาว มีบางคนคิดว่าเป็นความคิดที่ดีที่จะลงจอดบนอาณานิคมของเรา ดังนั้นตอนนี้ยานอวกาศของพวกเขาจึงเต็มไปด้วยงู"
 colony.9107.a:0 "ปล่อยให้พวกอสรพิษที่กำลังหลบหนียึดครองยานลำนั้นไป"
 colony.9107.a.tooltip:1 "เมื่ออสรพิษทรงปัญญาเหล่านี้เดินทางออกสู่จักรวาลอันกว้างใหญ่ เราคงอดไม่ได้ที่จะสงสัยว่าชะตากรรมสุดท้ายของพวกมันจะเป็นเช่นไร"
 colony.9107.b:0 "ทำลายยานอสรพิษทิ้งเสีย"
 colony.9107.b.tooltip:1 "อสรพิษทรงปัญญาเหล่านี้ได้ย้ายจำนวนประชากรของตนขึ้นไปบนยานอวกาศอันแสนดึงดูดใจของเรา เราควรปล่อยให้พวกมันขึ้นไป... แล้วทำให้เครื่องปฏิกรณ์ทำงานเกินพิกัด"

 colony.9108.name:0 "มุ่งสู่ดวงดาววว"
 colony.9108.desc:0 "ยานอวกาศลำเดี่ยวได้เล็ดลอดผ่านอุปกรณ์ตรวจจับทั้งหมดของเราและเลื้อยเข้าสู่ระบบดาวโดยรอบ พวกอสรพิษได้ทิ้ง [root.GetName] ไปพร้อมกับระบบลิฟต์ใต้ดินจำนวนหนึ่งและแร่ธาตุจำนวนมหาศาล"
 colony.9108.a:0 "ลาก่อน เหล่างูร้าย"
#  colony.9108.a.tooltip:0 "§LYour story has been... uplifting.§!"

 colony.9109.name:1 "ประวัติศาสตร์งู"
 colony.9109.desc:0 "การระเบิดครั้งใหญ่เกิดขึ้นภายนอกอาณานิคมที่ใหญ่ที่สุดของเราบน [root.GetName] เราจะยังคงระมัดระวังตัวต่อไป แต่เท่าที่เราบอกได้ เราได้เผาทำลายผู้รุกรานคล้ายงูตัวสุดท้ายไปจนหมดแล้ว"
 colony.9109.a:0 "ลาก่อน เหล่างูร้าย"
#  colony.9109.a.tooltip:0 "§LYour long tale has ended. You're... history.§!"

 #VENDING MACHINE

 VENDING_MACHINE_CAT:0 "จดหมายเชิญ"
 VENDING_MACHINE_CAT_DESC:0 "โคมไฟสัญญาณโคจรรอบ [From.GetName] กวักมือเรียกนักเดินทางให้เข้ามาใกล้ บนดาวเคราะห์น้อย มีแท่งโลหะเสาหินขนาดใหญ่ตระหง่านอยู่ โดยยังไม่ทราบจุดประสงค์ของมัน"

 anomaly.7000.name:0 "เสาหินลึกลับ"
 anomaly.7000.desc:0 "เสาหินสะกดวิญญาณที่เราพบบน [From.GetName] มีขนาดใหญ่โตจนทำให้ยานวิทยาศาสตร์ที่เราส่งไปสืบสวนดูเล็กไปถนัดตา มันเป็นแผ่นโลหะที่เรียบและสง่างาม ลวดลายเม็ดสีที่เคยฉูดฉาดที่ด้านหน้าบัดนี้ลดเหลือเพียงจุดเล็กๆ เท่านั้น\n\nช่องเสียบพลังงานขนาดเล็กที่ด้านข้างของเครื่องสัญญาว่าจะเปิดเผยความลับของมันเพื่อแลกกับเครดิตพลังงาน(บัตรเครดิต)จำนวนเล็กน้อย"

 anomaly.7000.a:0 "เปิดใช้งานเครื่องจักร"
 anomaly.7000.b:0 "เป็นการดีที่สุดที่จะปล่อยมันไว้ตามลำพัง"

 anomaly.7010.name:0 "เครื่องจักรตื่นขึ้น"
 anomaly.7010.desc.base:0 "เครื่องจักรเคลื่อนไหว กลไกโบราณส่งเสียงดังโครมครามอยู่เบื้องหลังแผ่นหน้าที่เรียบลื่น หลังจากเสียงหมุน เสียงหึ่ง และการหยุดนิ่งอย่างตื่นเต้น แผงโลหะก็เลื่อนเปิดออก และกระบอกสูบขนาดเท่าตัวยานก็กลิ้งออกมาจากเครื่องจักร...\n\n"
 anomaly.7010.a:0 "จดสิทธิบัตรเครื่องดื่ม ขายมันไปทั่วทั้งกาแล็กซี"
 anomaly.7010.desc.full:0 "กระบอกสูบนั้นบรรจุเครื่องดื่มโบราณ ซึ่งยังคงถูกเก็บรักษาไว้ได้อย่างน่าอัศจรรย์เหนือกาลเวลา"
 anomaly.7010.desc.full.megacorp:0 "$anomaly.7010.desc.base$$anomaly.7010.desc.full$ จากข้อมูลทางการตลาดของเรา เครื่องดื่มที่ถูกลืมเลือนไปนานนี้มีความอร่อยมากกว่าผลิตภัณฑ์เครื่องดื่มสำหรับสิ่งมีชีวิตทางชีวภาพในปัจจุบันของเราถึง 20%"
 anomaly.7010.desc.full.nonbio:0 "$anomaly.7010.desc.base$$anomaly.7010.desc.full$ แม้ว่าของเหลวจะไม่ได้ให้สารอาหารแก่เรา แต่ [Owner.GetScientistPlural] ของเราสามารถเปลี่ยนมันให้กลายเป็นทรัพยากรที่มีค่ามากกว่าเดิมมาก: §Yก๊าซพิศดาร(แก๊สไฟฟ้า)§!"
 anomaly.7010.desc.full.bio:0 "$anomaly.7010.desc.base$$anomaly.7010.desc.full$ เครื่องดื่มนี้สามารถจำลองขึ้นใหม่ได้ง่ายๆ โดย [Owner.GetScientistPlural] ของเรา ซึ่งหลังจากทำการทดสอบอย่างเข้มงวดแล้ว ก็พบว่ามันปลอดภัย มีคุณค่าทางโภชนาการ และที่สำคัญที่สุดคือ อร่อยมาก"
 anomaly.7010.desc.empty:0 "$anomaly.7010.desc.base$กระบอกสูบนั้นว่างเปล่า เนื้อหาภายในระเหยไปนานแล้วผ่านทางฝาปิดที่ผุกร่อน อย่างไรก็ตาม ตัวตู้คอนเทนเนอร์เองยังคงอยู่ในสภาพดี และโลหะผสมที่ไม่รู้จักนี้ก็มีคุณภาพทัดเทียมกับโลหะที่เราใช้ในการสร้างยานอวกาศของเรา"
 anomaly.7010.desc.rot.bio:0 "$anomaly.7010.desc.base$กระบอกสูบประกอบด้วยของเหลวที่เน่าเหม็นมาก สารอาหารที่เคยอร่อยบัดนี้บูดเสียไปตามกาลเวลา ด้วยการศึกษาสารดังกล่าว [Owner.GetScientistPlural] ของเราหวังว่าจะได้เรียนรู้เกี่ยวกับชีววิทยาของสิ่งมีชีวิตต่างดาวที่เคยชื่นชอบมัน—โดยสมมติว่าเราสามารถจัดการกับกลิ่นของมันได้ก่อนเป็นอันดับแรก"
 anomaly.7010.desc.rot.nonbio:0 "$anomaly.7010.desc.base$กระบอกสูบประกอบด้วยส่วนผสมของเหลวของน้ำตาลซูโครส กรดซิตริก และสารประกอบทางชีวภาพอื่นๆ [Owner.GetScientistPlural] ของเราเชื่อว่ามันเป็นสารอาหารที่สร้างขึ้นโดยและสำหรับสิ่งมีชีวิตคาร์บอน การศึกษาเพิ่มเติมในอนาคตหวังว่าจะช่วยให้เบาะแสเกี่ยวกับชีววิทยาของสายพันธุ์ที่สูญหายนี้มากขึ้น"

 #GREED IS BAD
 colony.9050.name:0 "สายแร่ที่คาดไม่ถึง"
 colony.9050.desc:0 "การสำรวจทางธรณีวิทยาบน [Root.GetName] เผยให้เห็นว่าดาวเคราะห์ดวงนี้อุดมไปด้วยแร่ธาตุมากกว่าที่เราคิด หลังจากปรับเทียบเซ็นเซอร์เพื่อทะลวงลึกเข้าไปในดินแล้ว เราก็ได้ค้นพบไซต์ขุดเหมืองที่มีแนวโน้มดีหลายแห่ง หากเราส่งทรัพยากรเพิ่มเติมไปยังความพยายามในการหยั่งวัดสัญญาณ เราก็อาจจะค้นพบสายแร่ที่มีประโยชน์ในระดับที่ลึกลงไปอีกได้"
 colony.9050.a:0 "ไม่อนุมัติงบประมาณ เริ่มขุดค้นได้เลย"
 colony.9050.b:0 "อนุมัติงบประมาณหยั่งวัดสัญญาณให้ลึกขึ้น"
 colony.9055.name:0 "สายแร่ลึก"
 colony.9055.desc:0 "การสำรวจใต้ดินของ [Root.GetName] เป็นกระบวนการที่น่าเบื่อหน่าย: เครื่องสแกนของเราตอบสนองไม่ค่อยดีต่อส่วนประกอบของหน้าดิน และการเลื่อนตัวของชั้นธรณีวิทยาหมายความว่าเราต้องปรับเทียบเครื่องสแกนใหม่ทุกครั้ง ถึงกระนั้นเราก็ยังคงค้นพบสายแร่คุณภาพสูงที่สามารถนำมาใช้ประโยชน์เพิ่มเติมได้ ความความลึกของพวกมันทำให้การจัดการทำเหมืองมีความซับซ้อนมากกว่าปกติ แต่มันก็ต้องใช้มากกว่านี้เพื่อหยุดยั้งเรา ไม่มีหลักประกันว่าการปฏิบัติการสืบสำรวจเพิ่มเติมจะนำไปสู่การพบสายแร่ธาตุเพิ่มขึ้น"
 colony.9055.a:0 "เริ่มดำเนินงานทำเหมืองแร่"
 colony.9055.b:0 "มันต้องมีแร่อยู่อีกสิ"
 colony.9060.name:0 "น้อยเกินไปและลึกเกินไป"
 colony.9060.desc:0 "ความพยายามในการสำรวจหาแร่ล่าสุดบน [Root.GetName] ยังไม่ได้ข้อสรุป ไม่ว่าแร่ธาตุใดที่เราตรวจพบต่างก็ถูกฝังอยู่ลึกเกินไป ในปริมาณที่น้อยเกินไป และผ่านสภาพหน้าดินที่ไม่มั่นคง ค่าใช้จ่ายที่คาดการณ์ไว้ในการขุดใช้ประโยชน์สายแร่เหล่นี้จะสูงกว่ากำไรที่ได้รับ อย่างไรก็ตาม ผลการค้นพบก่อนหน้านี้ของเรายังคงเป็นแหล่งทรัพยากรขนาดมหึมาที่ควรทำให้เรามีงานทำไปอีกหลายทศวรรษหรือหลายศตวรรษเลยทีเดียว"
 colony.9060.a:0 "ดีมาก เริ่มลุยงานกันได้เลย"
 colony.9065.name:0 "แร่เพิ่มเติม"
 colony.9065.desc:1 "ไม่ว่าแร่ธาตุบน [Root.GetName] จะซ่อนอยู่ลึกแค่ไหน เราก็จะค้นหาและขุดพวกมันขึ้นมาให้ได้ นั่นคืองานของเรา คนอื่นๆ อาจยอมแพ้เมื่อเผชิญกับหน้าดินที่ไม่มั่นคง ความลึกที่เกินจะหยั่งถึง หรือการบริหารอุโมงค์ขนส่ง แต่เราไม่ยอมแพ้ โลกใต้ดินคือบ้านของเรา และถ้าเรารู้แหล่งที่จะหา มันจะตอบแทนเรา ยิ่งเราลงไปลึกเท่าไหร่ คุณภาพและปริมาณของแร่ก็จะยิ่งสูงขึ้นเท่านั้น ตัวอย่างล่าสุดของเรายังมีร่องรอยบ่งชี้ถึงการมีอยู่ของผลึกคริสตัลหายากในระดับที่ลึกลงไปอีกด้วย"
 colony.9065.a:0 "เราพบแร่เพียงพอแล้ว เริ่มต้นกระบวนการสกัด"
 colony.9065.b:0 "ผลึกคริสตัลเหล่านี้จะต้องตกเป็นของเรา!"
 colony.9070.name:0 "ผลึกแก้วอัคนี"
 colony.9070.desc:1 "คณะสำรวจระบุระดับความลึกใหม่บน [Root.GetName] สำเร็จ ตามที่คาดการณ์ไว้ เรากำลังเผชิญกับกลุ่มของผลึกคริสตัลที่ส่องแสงในเฉดสีส้ม สีเหลือง และสีแดงสดใสเมื่อมีแสงส่องผ่าน ในบางครั้ง ดูเหมือนว่ามีเตาไฟที่กำลังส่องสว่างในถ้ำที่เราพบพวกมัน ทอดเงาพาดผ่านผนังถ้ำที่สั่นไหว นอกจากนี้เรายังทำการสังเกตการณ์ที่น่าฉงนใจ: ดูเหมือนว่าในรอบหลายพันปี คริสตัลเหล่านี้จะค่อยๆ อพยพไปสู่ใจกลางดาวเคราะห์อย่างช้าๆ เรามั่นใจว่าจะพบสิ่งต่างๆ อีกมากหากเราขุดลึกลงไปหาแกนกลางดาว"
 colony.9070.a:0 "การสำรวจด้วยเครื่องหยั่งวัดสัญญาณเหล่านี้มีค่าใช้จ่ายแพงเกินไป"
 colony.9070.b:0 "ถ้าเช่นนั้นเราก็เริ่มขุดเจาะกันเลยดีกว่า"
 colony.9075.name:0 "ราคาของความโลภ"
 colony.9075.intro:0 "ในขณะที่นักสำรวจของเราเจาะลึกลงไปเรื่อยๆ เพื่อหาแร่บน [Root.GetName] ผลึกคริสตัลก็ปรากฏเกลื่อนกลาดตามเส้นทางของพวกเขามากขึ้นเรื่อยๆ ในที่สุด พวกเขาก็ไปถึงถ้ำขนาดมหึมาที่ตั้งอยู่ใกล้กับแกนกลางของ [Root.GetName] และเราก็สูญเสียการติดต่อสื่อสาร สิ่งสุดท้ายที่เรารู้คือพวกเขากำลังอยู่ในขั้นตอนของการติดตั้งไฟและเซ็นเซอร์ต่างๆ เพื่อศึกษาถ้ำ จากนั้นก็มีเสียงกรีดร้อง ความเจ็บปวด ความตาย และการทำลายล้าง\n\nสาเหตุได้รับการเปิดเผยในไม่ช้าเมื่อนักสำรวจทางธรณีวิทยาคนอื่นๆ ตรวจพบเสียงสะท้อนหลายสายกำลังขุดอุโมงค์ด้วยความเร็วสูงมุ่งตรงมายังอาณานิคมของเรา ไม่นานหลังจากนั้น ท่ามกลางแผ่นดินไหวและการสั่นสะเทือน เราก็ถูกโจมตีโดยสิ่งมีชีวิตคริสตัลลีนที่มีขนาดมหึมา มันไม่ได้แตกต่างจากคริสตัลในอวกาศทั่วไปนัก แต่ดูเหมือนว่าจะก้าวร้าวอย่างรุนแรง และมีความสามารถในการใช้คุณสมบัติการคืนรูปของเผ่าพันธุ์เพื่อปรับรูปร่างของมันใหม่ได้ในทันที\n\n"
 colony.9075.outro:1 "แม้ว่าแกนกลางของสิ่งมีชีวิตคริสตัลลีนจะยังคงถูกฝังอยู่ลึก แต่มันก็สร้างรยางค์ที่มีลักษณะคล้ายหนวดขุดเจาะผ่านพื้นดินเพื่อเข้าโจมตีเราหรือเพื่อดูดซับคริสตัลเพิ่มสำหรับการเจริญเติบโต การคาดการณ์นั้นเลวร้ายมาก และเราอาจกำลังเผชิญกับจุดจบของอาณานิคมของเราบน [Root.GetName]"
 colony.9075.desc.a:0 "$colony.9075.intro$ ความพยายามทั้งหมดในการส่งสัญญาณวิทยุที่เราใช้เพื่อทำให้คริสตัลในอวกาศสงบลงนั้นล้มเหลวโดยสิ้นเชิง $colony.9075.outro$" #Pacified Crystals
 colony.9075.desc.b:0 "$colony.9075.intro$ การเผชิญหน้ากับสิ่งมีชีวิตเช่นนี้ในอวกาศที่ยานของเราสามารถใช้ความเร็วและอาวุธโจมตีได้นั้นเป็นเรื่องหนึ่ง แต่การต่อสู้กับพวกมันบนพื้นผิวดาวเคราะห์กลับเป็นอีกเรื่องหนึ่งโดยสิ้นเชิง $colony.9075.outro$" #Regular
 NAME_Crystal_Kraken:0 "Crystalline Bane"
 crystal_kraken_army:0 "สิ่งมีชีวิตคริสตัลลีนใต้พิภพ"
 crystal_kraken_army_desc: "มันนอนหลับใหลอยู่ใต้เปลือกโลกมาเป็นเวลาหลายชั่วกัลป์ จนกระทั่งความหิวโหยที่ไม่อาจเติมเต็มได้ขับเคลื่อนให้มันทำลายที่ซ่อนตัวโบราณออกมา"
 crystal_kraken:0 "มหันตภัยคริสตัลลีน"
 NAME_Crystal_Shard:0 "Crystal Shard"
 colony.9080.name:0 "สิ่งมีชีวิตคริสตัลลีนถูกปราบราบคาบ"
 colony.9080.desc:1 "หลังจากการทำสงครามอันเหน็ดเหนื่อย ในที่สุดสิ่งมีชีวิตคริสตัลลีนที่อาศัยอยู่ ณ ใจกลางดาวเคราะห์ก็ถูกปราบลงได้ การต่อสู้ครั้งสุดท้ายเกิดขึ้นลึกลงไปใต้ดิน ในถ้ำที่เป็นที่ตั้งของแกนกลางสัตว์ประหลาดคริสตัลยักษ์ และหลังจากที่เราจัดการทำลายมันให้แตกสลายได้สำเร็จ สัตว์ร้ายจึงหยุดการต่อสู้ รยางค์หนวดต่างๆ ของมันสลายตัว สูญเสียการยึดเกาะในระดับโมเลกุล และโปรยปรายละอองฝุ่นคริสตัลไปทั่วดาวเคราะห์ อุโมงค์จำนวนมหาศาลที่ถูกทิ้งไว้ตามเส้นทางของหนวดคริสตัลจะช่วยเราได้มากในความพยายามทำเหมืองแร่ที่อุดมสมบูรณ์เป็นพิเศษซึ่งประกอบขึ้นเป็นโลกใบนี้ สำหรับต้นกำเนิดของสิ่งมีชีวิตนี้ เรายังคงมีคำถามมากมาย แต่เราอาจได้รับข้อมูลเชิงลึกบางประการเกี่ยวกับวิธีการสร้างสิ่งมีชีวิตคริสตัลลีนในอวกาศ"
 colony.9080.a:0 "ชัยชนะในที่สุด"
 d_crystal_kraken_body:0 "ซากคริสตัลลีนหลงเหลือ"
 d_crystal_kraken_body_desc:0 "ซากปรักหักพังของสิ่งมีชีวิตคริสตัลลีนที่เคยอาศัยอยู่ใต้เปลือกโลกใบนี้ หนวดจำนวนมากของมันได้แปรเปลี่ยนเป็นสายแร่ธาตุที่อุดมสมบูรณ์"
 d_crystal_kraken_body_bombed:1 "ซากคริสตัลลีนแหลกละเอียด"
 d_crystal_kraken_body_bombed_desc:0 "$d_crystal_kraken_body_desc$"
 colony.9085.name:0 "เหตุการณ์ผิดปกติ"
 colony.9085.desc:1 "ปฏิบัติการทำเหมืองแร่ของเราบน [Root.GetName] ประสบกับอุปสรรคที่คาดไม่ถึง ตั้งแต่การสั่นสะเทือนเล็กน้อยไปจนถึงสายแร่คริสตัลที่ขยับตัว บางสิ่งบางอย่างกำลังเกิดขึ้น แม้ว่าเราจะมีประสบการณ์ในการเจาะอุโมงค์มามาก แต่เราก็ไม่รู้ว่ามันคืออะไร สถานการณ์เหล่านี้ทำให้ยากต่อการทำงานในสภาวะที่ปลอดภัย และเราได้สูญเสียอุปกรณ์ ชีวิต และแร่ธาตุในอุบัติเหตุและการถล่มที่คาดเดาไม่ได้ไปแล้ว บางทีอาจจะเป็นการดีที่สุดที่จะระงับการขุดเจาะภายใต้ความลึกระดับหนึ่ง?"
 colony.9085.a:0 "มันคงไม่มีอะไรหรอก"
 colony.9085.b:0 "ความปลอดภัยต้องมาก่อน"

 #### Rage Sage

 site_rage_sage_dig:0 "เมล็ดพันธุ์แห่งการทำลายล้าง"
 seeds_of_destruction_intro:0 "เราได้พบยานอวกาศต่างดาวโบราณนอนจมอยู่ครึ่งลำในหลุมอุกกาบาตของดาวเคราะห์น้อย ธารน้ำแข็งได้แผ่ขยายปกคลุมไปทั่วพื้นที่ส่วนใหญ่ของยานอย่างหลีกเลี่ยงไม่ได้ แต่เราสามารถเข้าถึงห้องกักอากาศล็อกเกอร์(แอร์ล็อค)ได้อย่างง่ายดาย... และค้นหาความลับใดๆ ที่ซ่อนอยู่เบื้องหลังมัน"

 ancrel.14001.name:0 "ความบ้าคลั่งในกรงขัง"
 ancrel.14001.desc:0 "เมื่อเราเปิดห้องกักอากาศของยานอวกาศต่างดาว ความเน่าเปื่อยและการย่อยสลายก็รอเราอยู่ที่อีกฝั่ง การสืบสวนเบื้องต้นของเราพบร่องรอยของเหตุการณ์สังหารหมู่ หลังจากตรวจสอบร่างที่ฉีกขาดของลูกเรือ เรามั่นใจว่าพวกเขาฉีกร่างของกันและกันออกเป็นชิ้นๆ เราสามารถเลือกที่จะเดินจากไปเฉยๆ ก็ได้... แต่เราจะไม่มีวันรู้เลยว่าทำไมโศกนาฏกรรมนี้จึงเกิดขึ้น"
 ancrel.14002.name:0 "ห้องปฏิบัติการที่ซับซ้อน"
 ancrel.14002.desc:0 "จากการขุดค้นให้ลึกลงไป เราได้ค้นพบห้องปฏิบัติการวิทยาศาสตร์ของยาน พลังงานที่หลงเหลือเพียงเล็กน้อยทาบแสงอัลตราไวโอเลตสลัวพาดผ่านตัวห้อง พุ่มไม้สีม่วงหนาทึบกำลังปล่อยกลุ่มสปอร์หนาแน่น แพทย์ประจำยานใช้ห้องปฏิบัติการและช่องระบายอากาศเพื่อกระจายหมอกพิษให้ท่วมท้นไปทั่วยานอวกาศ"
 ancrel.14003.name:0 "สับสวิตช์ควบคุม!"
 ancrel.14003.desc:0 "เราคิดว่าเรามีภูมิคุ้มกันต่อผลกระทบอย่างสมบูรณ์ของหมอกพิษมึนเมา หากเราสามารถนำเครื่องยนต์ของยานกลับมาออนไลน์ได้ เราสามารถปล่อยยานและส่งกลับดาวบ้านเกิดเพื่อศึกษาวิเคราะห์ สิ่งนี้จะใช้เวลา แต่ห้องปฏิบัติการเภสัชกรรมที่ซับซ้อนอาจให้สารเคมีชีวภาพที่เป็นประโยชน์ในการเสริมพลังแก่ทหารในจักรวรรดิของเรา"
 ancrel.14003.a:0 "เดินเครื่องปฏิกรณ์ออนไลน์ในตอนนี้เลย!"
 ancrel.14003.b:0 "เรียกใช้ระบบวินิจฉัยและดำเนินการซ่อมแซม"
 ancrel.14004.name:0 "การแพร่ระบาดความสุขสำราญ"
 ancrel.14004.desc:0 "เราโง่เขลาคิดว่าเรามีภูมิคุ้มกันต่อหมอกพิษ แต่ทว่าวิศวกรของเรากำลังเผชิญกับสภาวะแห่งความปีติสุขอย่างล้นพ้น พวกเขาเต้นรำในระเบียงทางเดินของยานและร้องเพลงออกมาโดยไม่มีทำนอง เราจำเป็นต้องชำระล้างชั้นบรรยากาศและจับกุมวิศวกรของเราก่อนที่เราจะสามารถปล่อยยานได้ ความล่าช้านี้จะทำให้เราสูญเสียเวลาไป"
 ancrel.14004.a:0 "จับกุมตัววิศวกรที่กำลังเคลิบเคลิ้มไปกับความสุข"
 ancrel.14005.name:0 "การระเบิดของความบ้าคลั่ง"
 ancrel.14005.desc:1 "เราโง่เขลาคิดว่าเรามีภูมิคุ้มกันต่อหมอกพิษ แต่นักวิทยาศาสตร์ของเรากำลังประสบกับอาการคุ้มคลั่งทางจิตอย่างรุนแรง การต่อสู้ปะทุขึ้นทั่วทั้งลำยาน เราจำเป็นต้องชำระล้างชั้นบรรยากาศและควบคุมเหยื่อของหมอกพิษก่อนที่เราจะสามารถปล่อยยานได้ ความล่าช้านี้จะทำให้เราสูญเสียเวลาไป"
 ancrel.14005.a:0 "ควบคุมตัวนักวิทยาศาสตร์ผู้คุ้มคลั่งเหล่านั้น"
 ancrel.14006.name:0 "สิ่งล่อใจของเทคโนโลยี"
 ancrel.14006.desc:0 "เราปล่อยยานสำเร็จแล้ว! แม้จะอันตราย แต่หมอกมึนเมาของยานต่างดาวลำนี้สามารถนำมาเสริมประสิทธิภาพและความภักดีของทหารในจักรวรรดิของเราได้ อย่างไรก็ตาม คำถามยังคงอยู่: เราควรทดลองใช้สารอันตรายนี้กับทหารของเราหรือไม่? หรือเราควรปฏิเสธและเรียนรู้จากความผิดพลาดอันน่าสลดใจของพวกเขา?"
 ancrel.14006.a:0 "ใช้ประโยชน์จากเทคโนโลยีที่มีแนวโน้มดีนี้"
 ancrel.14006.a.tooltip:0 "ชัยชนะกำลังรออยู่! ทหารของเราควรจะเต็มใจรับความเสี่ยงนี้"
 ancrel.14006.b:0 "ละทิ้งเทคโนโลยีอันตรายนี้เสีย"
 ancrel.14006.b.tooltip:0 "มีความลับบางอย่างที่เราไม่สมควรล่วงรู้"

 on_crashed_ship_cat:0 "จุดยานตก"
 on_crashed_ship_desc:0 "เราได้พบยานอวกาศต่างดาวโบราณจมอยู่ครึ่งลำในหลุมอุกกาบาตของดาวเคราะห์น้อย"

 anomaly.7030.name:0 "จุดยานตก"
 anomaly.7030.desc:0 "เราได้พบยานอวกาศต่างดาวโบราณจมอยู่ครึ่งลำในหลุมอุกกาบาตของดาวเคราะห์น้อย ภายนอกของยานวิทยาศาสตร์นี้มีเซ็นเซอร์จับสัญญาณอย่างครอบคลุมแต่ไม่มีอาวุธใดๆ ส่วนภายนอกไม่ได้ได้รับความเสียหายแต่อย่างใดก่อนที่จะตก เราสามารถสันนิษฐานได้ว่าภัยพิบัติตี้เป็นผลมาจากความผิดพลาดร้ายแรงของลูกเรือเอง"
 anomaly.7030.desc.a:0 "ช่างน่าเศร้าเหลือเกิน"

 #SPACE SHANTY (by Brian Campbell), Melody: "Fish in the Sea"

 site_space_shanty_dig:0 "ข้อความในขวดแก้ว"
 space_shanty_intro:0 "เราได้พบซากของยานอวกาศโบราณที่มีการออกแบบที่แปลกประหลาด แทนที่จะใช้ระบบขับเคลื่อนที่คล้ายกับยานยุคปัจจุบัน ยานลำนี้อาศัยใบเรือขนาดใหญ่ที่กางออกในความว่างเปล่าของอวกาศ สันนิษฐานว่ายานลำนี้เก็บเกี่ยวพลังงานแสงอาทิตย์และล่องลอยไปตามลมสุริยะที่สร้างขึ้นโดยแสงดาว นักโบราณคดีของเรากระตือรือร้นที่จะเปิดเผยความลับที่ซ่อนอยู่ภายในยานอวกาศลำนี้"
 space_shanty_intro_bio: "ซากปรักหักพังที่ล่องลอยอยู่ของเอนทิตีโบราณได้รับการค้นพบในห้วงอวกาศลึก รูปแบบของมันไม่เหมือนกับยานสิ่งมีชีวิตใดๆ ที่เราเคยรู้จัก มันครอบครองใบเยื่อหุ้มขนาดมหึมา ซึ่งครั้งหนึ่งเคยสามารถคลี่กางออกในสายลมจักรวาล อาบรังสีของดวงดาวที่อยู่ห่างไกล ราวกับเลเวียธานแห่งฟากฟ้าขนาดใหญ่ที่ร่อนไปตามกระแสน้ำที่มองไม่เห็น\n\nบัดนี้ มันเป็นเพียงเศษซากที่แห้งเหี่ยว โครงร่างแตกร้าวและเปิดออก ใบเรือที่เคยรุ่งเรืองหลงเหลือเพียงเศษผ้าขาดรุ่งริ่ง ไม่แน่ชัดว่าสิ่งมีชีวิตนี้ถูกสร้างขึ้นมา ผ่านการวิวัฒนาการ หรือเป็นสิ่งที่อยู่ก้ำกึ่งระหว่างกัน นักโบราณคดีชีวภาพของเรากระตือรือร้นที่จะศึกษาซากของมัน เพื่อรับฟังเสียงสะท้อนจากการเดินทางครั้งสุดท้ายของมัน และบางที อาจเป็นไปได้ที่จะได้เรียนรู้บทเพลงที่มันเคยขับร้องให้แก่หมู่ดาว"

 ancrel.15021.name:0 "ข้อความในขวดแก้ว"
 ancrel.15021.desc:0 "ตามที่เราคาดไว้ ภายในของ 'ยานแล่นใบสุริยะ(เสียงใบเรือ)ลำนี้มีลักษณะโบราณตามกาลเวลา สะพานเดินเรือมีลักษณะคล้ายกับดาดฟ้าของเรือใบโบราณบนดาวเคราะห์ที่ได้รับการออกแบบมาเพื่อล่องลอยบนทะเลน้ำ\n\nแผ่นปูพื้นดาดฟ้าดูเหมือนจะเป็นโลหะ แต่พื้นผิวส่วนใหญ่ปกคลุมไปด้วยไม้แกะสลัก ซึ่งตัดกับสารคล้ายแก้วบนช่องมองพอร์ตและหน้าจอดาต้า\n\nเมื่อเปิดเครื่องคอมพิวเตอร์ของยาน เราพบไฟล์ข้อมูลที่มีเพลงของชาวทะเลแบบดั้งเดิม นักโบราณคดีของเรากล่าวว่าท่วงทำนองนี้ครั้งหนึ่งเคยเป็นที่รู้จักในนาม'Sea Septele'หรือ'อวกาศ\"เรากำลังพยายามคัดลอกถอดเนื้อร้องอยู่"
 ancrel.15022.name:0 "เพลงกะลาสีอวกาศ"
 ancrel.15022.desc:0 "ทันทีหลังจากที่เราเสร็จสิ้นการฟื้นฟูและเปิดใช้งานไฟล์ข้อมูล จังหวะดนตรีที่กระหึ่มก็ดังไปทั่วยาน พร้อมกับเสียงที่ปรับแต่งอัตโนมัติ(เสียงอัตโนมัติ)ของชาวทะเลโบราณ บทบันทึกคัดลอกมีดังนี้:\n\n'มาเถิดเหล่านักเดินทางอวกาศวัยเยาว์ ฟังข้าสิ!\nข้าจะร้องเพลงเกี่ยวกับปลาในทะเลให้เจ้าฟัง!\n\nและนี่คือสภาพอากาศที่มีลมแรง พวกพ้อง สภาพอากาศที่มีพายุ พวกพ้อง\nเมื่อลมพัดมา พวกเราก็มารวมตัวกัน พวกพ้อง\nพัดพาไปทางริมขอบจักรวาล เฮ้! สายลมพัดพาไป!\nออกสู่อวกาศ ก้าวไปอย่างมั่นคง\n\nลมสุริยะพัดเข้ามา\nพาเราไปแสนไกล\nตลอดเส้นทางอวกาศ\nและออกสู่หมู่ดาว!\n\nและนี่คือสภาพอากาศที่มีลมแรง พวกพ้อง สภาพอากาศที่มีพายุ พวกพ้อง\nเมื่อลมพัดมา พวกเราก็มารวมตัวกัน พวกพ้อง\nพัดพาไปทางริมขอบจักรวาล เฮ้! สายลมพัดพาไป!\nออกสู่อวกาศ ก้าวไปอย่างมั่นคง!'"
 ancrel.15023.name:0 "อสูรกายแห่งห้วงอวกาศ"
 ancrel.15023.desc:0 "ขณะที่เราสำรวจยาน ความพยายามเพิ่มเติมในการเปิดเครื่องและกู้คืนไฟล์ข้อมูลช่วยปลดล็อกเนื้อร้องเพิ่มเติมของเพลงกะลาสีอวกาศโบราณ จอแสดงผลโฮโลกราฟิกของยานฉายภาพทหารเรือและนักเดินทางอวกาศที่กำลังร้องเพลงและเต้นรำไปพร้อมกันอย่างมีชีวิตชีวา:\n\n'มังกรยักษ์ปรากฏกายขึ้นมา\nตามหาบ้านของเรา\nฝ่าฟันอวกาศไปยังสถานที่\nที่อยู่ใต้ระลอกคลื่นและฟองสบู่!\n\n'และนี่คือสภาพอากาศที่มีลมแรง พวกพ้อง สภาพอากาศที่มีพายุ พวกพ้อง\nเมื่อลมพัดมา พวกเราก็มารวมตัวกัน พวกพ้อง\nพัดพาไปทางริมขอบจักรวาล เฮ้! สายลมพัดพาไป!\nออกสู่อวกาศ ก้าวไปอย่างมั่นคง\n\nยอนกิปรากฏกายขึ้นมา\nราชาแห่งอวกาศลึก\nแข่งความเร็วกับยานของเรา\nในการไล่ล่าผ่านไฮเปอร์สเปซ!\n\n(ซ้ำท่อนคอรัส)\n\n'เลเวียธาน'ปรากฏกายขึ้นมา\nหนวดของมันเข้ามาโอบรัด\nบีบอัดยานของเรา\nขณะที่เราสั่นสะท้านและหายใจไม่ออก!\n\n(ซ้ำท่อนคอรัส)'"
 ancrel.15024.name:0 "เครื่องดื่มฤทธิ์แรง"
 ancrel.15024.desc:0 "นักโบราณคดีของเราได้ขุดพบแหล่งสะสมเครื่องดื่มฤทธิ์แรง กะลาสีพวกนั้นดื่มของเหลวเน่าเหม็นเหล่านี้จริงหรือ? เราจะไม่ดื่มของเหลวแปลกๆ เหล่านี้ การสำรวจยานของเรานั้นสร้างความมึนเมาเพียงพออยู่แล้ว!\n\n'ลิตอยด์'ปรากฏกายขึ้นมา\nล้วนแกะสลักจากหินของพวกเขา\nหินยักษ์เหล่านี้มีความกล้าหาญยิ่งขึ้น\nเมื่อพวกมันไม่ได้อยู่เพียงลำพัง!\n\n(คอรัส)\n\nนิวดรอยด์ปรากฏกายขึ้นมา\nช่างน่าเกรงขามและยิ่งใหญ่\nเจ้าฆ่าพวกมันไม่ได้หรอก สหายเอ๋ย\nพวกมันจะคืนชีพขึ้นมาใหม่!\n\n(คอรัส)\n\n'ฝูงหุ่นยนต์พุ่งเข้ามา\nเตรียมตัววิ่งหนีได้เลย\nสู้กับหนึ่ง สิบ หรือหนึ่งโหล\n1101!\n\n(คอรัส)'"
 ancrel.15025.name:0 "ปลดเชือกผูกเรือ!"
 ancrel.15025.desc:1 "การสำรวจของเราได้เผยโฉมประวัติศาสตร์โบราณ แสดงให้เห็นถึงความกระตือรือร้นและความกล้าหาญของนักสำรวจยุคก่อน เห็นได้ชัดว่ากัปตันใช้ 'เพลงกะลาสีอวกาศ' นี้เพื่อสร้างแรงจูงใจและประสานงานกับลูกเรือ บางทีพวกเขาอาจจะร้องตามด้วยซ้ำ! นักโบราณคดีของเราแนะนำว่าควรอนุรักษ์บทเพลงนี้ไว้ในการจัดแสดงพิพิธภัณฑ์\n\nสำหรับท่วงทำนองโบราณ เราได้คัดลอกเนื้อร้องทั้งหมดที่เราสามารถหาได้และเพิ่มลงในฐานข้อมูลของเรา บัดนี้ 'กะลาสี' ของเราเองมีนิสัยชอบร้องเพลงกะลาสีอวกาศในรูปแบบของตัวเอง ซึ่งน่าจะช่วยปรับปรุงขวัญกำลังใจและประสิทธิภาพในการทำงานของพวกเขา\n\n'พวกเราถือกำเนิดมาจากมหาสมุทร\nและเอื้อมมือออกไปสู่ผืนฟ้า\nเรากำลังสร้างจักรวรรดิ\nที่ไม่มีวันตาย!\n\n'และนี่คือสภาพอากาศที่มีลมแรง พวกพ้อง สภาพอากาศที่มีพายุ พวกพ้อง\nเมื่อลมพัดมา พวกเราก็มารวมตัวกัน พวกพ้อง\nพัดพาไปทางริมขอบจักรวาล เฮ้! สายลมพัดพาไป!\nออกสู่อวกาศ ก้าวไปอย่างมั่นคง!'\n\nถึงเวลาต้องถอนตัวออกจากยานโบราณนี้ 'ปลดเชือกผูกเรือ' เพื่อที่เราจะแล่นไปบนลมสุริยะ มุ่งหน้าไปอย่างมั่นคง!"
