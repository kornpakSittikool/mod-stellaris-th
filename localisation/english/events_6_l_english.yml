 job_astrogarbage_collector_gestalt_plural: "โดรนเก็บขยะอวกาศ"
 job_astrogarbage_collector_gestalt_desc: "ยูนิตโดรนพิเศษที่มีหน้าที่รับผิดชอบในการเก็บรวบรวมเศษขยะอวกาศจากวงโคจรของดาวเคราะห์"
