l_english:

 # Anomaly Category
 the_lonely_bot_category:0 "สัญญาณของชีวิตโบราณ"
 the_lonely_bot_category_desc:0 "[Root.GetName] แสดงสัญญาณว่าเคยเป็นบ้านของอารยธรรมโบราณมาก่อน"
 NANO_SWARM_CAT:0 "ทะเลทรายร้างผู้คน"
 NANO_SWARM_CAT_DESC:0 "[Root.GetName] มีแหล่งน้ำขนาดใหญ่ แต่ทว่าผืนแผ่นดินกลับเป็นทะเลทรายที่ไร้สิ่งมีชีวิต ควรค่าแก่การศึกษาเพิ่มเติม"
 STAR_RESONANCE_CAT:0 "การกำทอนที่แปลกประหลาด"
 STAR_RESONANCE_DESC:0 "นักวิทยาศาสตร์ของเราพบสิ่งที่ในตอนแรกดูเหมือนจะเป็นการทำงานผิดปกติของเซ็นเซอร์ใกล้กับโคโรนาของ [root.GetName] อย่างไรก็ตาม มันยังคงอยู่หลังจากรีบูตระบบแล้ว ควรทำการตรวจสอบอย่างใกล้ชิด"
 ALPHA_CENTAURI_CAT:0 "ภาวะชะงักงัน"
 ALPHA_CENTAURI_CAT_DESC:0 "วงโคจรที่แปลกประหลาดของ [From.GetName] รอบดาวแคระแดงทำให้ดาวเคราะห์ดวงนี้ถูกล็อกด้วยแรงไทดัล(ล็อคอย่างแน่นหนา)และอาจคุ้มค่าแก่การสืบสวนเพิ่มเติม"
 FROZEN_SPRINGS_CAT:0 "ความร้อนอันลึกลับ"
 FROZEN_SPRINGS_CAT_desc:0 "ในขณะที่ทำการสำรวจ [From.GetName] ทีมวิทยาศาสตร์ตรวจพบสัญญาณความร้อนที่ผิดปกติซึ่งมาจากใต้พื้นผิวน้ำแข็งของดาวเคราะห์"

 # Deposits
 d_hab_lonely_bot_deposit:0 "หุ่นยนต์ปริศนา"
 d_hab_lonely_bot_deposit_desc:0 "หุ่นยนต์ตัวน้อยโบราณผู้ลึกลับ ซึ่งดูแลโรงงานที่มีอายุย้อนไปถึงอารยธรรมก่อนหน้า"
 d_hab_lonely_bot_deposit_2:0 "$d_hab_lonely_bot_deposit$"
 d_hab_lonely_bot_deposit_2_desc:0 "$d_hab_lonely_bot_deposit_desc$"
 d_hab_lonely_bot_deposit_3:0 "$d_hab_lonely_bot_deposit$"
 d_hab_lonely_bot_deposit_3_desc:0 "$d_hab_lonely_bot_deposit_desc$"

 d_house_turtle:0 "เนมมาวัยเยาว์"
 d_house_turtle_desc:0 "เนมมาวัยหนุ่มสาวที่เราได้เพาะพันธุ์ขึ้นมา และตอนนี้มันมีขนาดใหญ่พอที่จะสามารถรองรับอุตสาหกรรมบางส่วนของเราได้"
 d_turtle_miner:0 "ปฏิบัติการทำเหมืองเนมมา"
 d_turtle_miner_desc:0 "การรักษาสมดุลอย่างระมัดระวังของยาระงับประสาทและยาแก้ปวดช่วยให้เราสามารถเจาะเข้าไปในตัวเนมมาได้ในขณะที่ยังอาศัยอยู่บนตัวมัน"
 d_turtle_corpse:0 "ซากศพเนมมา"
 d_turtle_corpse_desc:0 "ซากศพที่ลอยอยู่ของเนมมาขนาดยักษ์ที่เคยอาศัยอยู่ที่นี่สามารถมองเห็นได้จากวงโคจร สัตว์เลื้อยคลานครึ่งบกครึ่งน้ำตัวนี้บัดนี้ไม่เหลืออะไรนอกจากเกาะลอยน้ำ"

 d_nano_corpses:0 "ซากฝูงนาไนต์"
 d_nano_corpses_desc:0 "ผงละเอียดคือทั้งหมดที่เหลืออยู่ของฝูงนาไนต์ขนาดมหึมาที่วิวัฒนาการขึ้นบน—และเคยปกคลุม-พาวุสที่ 3"
 # Jobs
 job_robot_caretaker:0 "หุ่นยนต์ผู้ดูแล"
 job_robot_caretaker_plural:0 "หุ่นยนต์ผู้ดูแล"
 job_robot_caretaker_desc:0 "ผู้ดูแลมีหน้าที่บำรุงรักษาหุ่นยนต์ซึ่งได้กลายมาเป็นตัวนำโชคของดาวเคราะห์ดวงนี้"
 mod_job_robot_caretaker_add:0 "ตำแหน่งงาน $job_robot_caretaker$"
 turtle_miner: "$job_turtle_miner$"
 job_turtle_miner:0 "คนเหมืองเนมมา"
 job_turtle_miner_plural:0 "คนเหมืองเนมมา"
 job_turtle_miner_desc:0 "ด้วยการใช้สว่านอันทรงพลัง เราสามารถเก็บเกี่ยวได้ทั้งเปลือกแร่ธาตุและอวัยวะภายในทางชีวภาพของเนมมาขนาดยักษ์ในท้องถิ่น"
 job_turtle_miner_gestalt:0 "โดรนเหมืองเนมมา"
 job_turtle_miner_gestalt_plural:0 "โดรนเหมืองเนมมา"
 job_turtle_miner_gestalt_desc:0 "ด้วยการใช้สว่านอันทรงพลัง เราสามารถเก็บเกี่ยวได้ทั้งเปลือกแร่ธาตุและอวัยวะภายในทางชีวภาพของเนมมาขนาดยักษ์ในท้องถิ่น"
 miner_is_turtle_miner_tt: "$job_miner_plural_with_icon$ จะถูกเปลี่ยนเป็น [miner.GetIcon] $job_turtle_miner_plural$"
 mod_job_turtle_miner_add:0 "ตำแหน่งงาน $job_turtle_miner$"
 mod_job_turtle_miner_gestalt_add:0 "ตำแหน่งงาน $job_turtle_miner_gestalt$"
 mod_job_turtle_miner_per_pop:1 "§G+1§! งาน $job_turtle_miner$ ต่อ $VALUE$ ประชากร"
 mod_job_turtle_miner_per_pop_short:0 "\n§G+1§! £job_turtle_miner£ ต่อ $VALUE$ £pop£"
 mod_job_turtle_miner_gestalt_per_pop:0 "§G+1§! งาน $job_turtle_miner_gestalt$ ต่อ $VALUE$ ประชากร"
 mod_job_turtle_miner_gestalt_per_pop_short:0 "\n§G+1§! £job_turtle_miner_gestalt£ ต่อ $VALUE$ £pop£"

 # Projects
 LONELY_BOT_PROJECT:0 "การบูรณะโรงงาน"
 LONELY_BOT_PROJECT_DESC:0 "โรงงานบน [Root.GetName] ทรุดโทรมมาเป็นเวลาหลายศตวรรษแล้ว และกำลังถึงจุดที่อาจพังทลายลงได้ทุกเมื่อ เนื่องจากมันมีบทบาทสำคัญในการวางรากฐานของอาณานิคมบนดาวเคราะห์ดวงนี้ ชาวอาณานิคมของเราจึงได้ติดต่อเข้ามาและขอให้เรายื่นมือเข้าไปช่วยบูรณะอาคารให้กลับมารุ่งเรืองดังเดิม\n\nรางวัล: £alloys£ §Gโลหะผสม (โลหะผสม)§!"

 LONELY_BOT_MISSING_PROJECT:0 "หุ่นยนต์ที่หายสาบสูญ"
 LONELY_BOT_MISSING_PROJECT_DESC:0 "หุ่นยนต์ที่อาศัยอยู่บนดาวเคราะห์ดวงนี้เพิ่งหายตัวไป—รวมถึงชาวอาณานิคมของเราจำนวนมากเช่นกัน วิศวกรของเรากำลังสืบหาเบาะแสโดยติดตามสัญญาณควบคุมระยะไกลกลับไปยังแหล่งที่มา เพื่อดูว่าเราจะสามารถค้นหาชาวอาณานิคมและหุ่นยนต์ตัวนั้นพบหรือไม่"

 breed_turtle_world_project:0 "เริ่มต้นโครงการเพาะพันธุ์เนมมา"
 breed_turtle_world_project_DESC:0 "จากการศึกษาเนมมาก่อนเป็นอันดับแรก จากนั้นจึงนำความเชี่ยวชาญด้านสัตววิทยาของเรามาประยุกต์ใช้ เราสามารถส่งเสริมให้สายพันธุ์ที่เชื่องและเชื่อฟังขยายพันธุ์ได้อย่างเจริญรุ่งเรืองภายใต้ขีดความสามารถในการรองรับของถิ่นที่อยู่อาศัยของพวกมัน"
 enslave_turtle_world_project:0 "เริ่มการกดขี่เนมมา"
 enslave_turtle_world_project_DESC:0 "ยาระงับประสาทขั้นสูงและอุปกรณ์ฝังระบบไซเบอร์เนติกส์จะทำให้เนมมาเชื่องและเชื่อฟังมากขึ้น ในเวลาต่อมาพวกมันจะกลายเป็นสัตว์ลากเลื่อนขนาดยักษ์"
 mine_turtle_world_project:0 "เริ่มปฏิบัติการทำเหมืองเนมมา"
 mine_turtle_world_project_DESC:1 "หลังจากศึกษากายวิภาคของเนมมาอย่างรอบคอบแล้ว เหล่า [Root.owner.GetScientistPlural] ของเราจะสามารถเก็บเกี่ยวแร่ธาตุที่มีประโยชน์จากกระดองของสัตว์เลื้อยคลานขนาดยักษ์เหล่านี้ได้สำเร็จ"
 kill_turtle_world_project:0 "สังหารหมู่เนมมา"
 kill_turtle_world_project_DESC:0 "เราจะกำจัดภัยคุกคามเนมมาจากดาวเคราะห์ดวงนี้ด้วยวิธีการใดก็ตามที่จำเป็น"
 study_turtle_world_project:0 "ศึกษาเนมมา"
 study_turtle_world_project_DESC:0 "เราจะมอบหมายให้ชะตากรรมของเนมมาอยู่ในความดูแลของ [Owner.GetScientistPlural] ที่เก่งที่สุดของเรา และรอดูว่าจะมีแนวทางแก้ไขปัญหารูปแบบใดบ้าง"

 STUDY_NANITE_SWARM:0 "ศึกษาฝูงนาไนต์"
 STUDY_NANITE_SWARM_DESC:0 "ฝูงนาไนต์บน [nanite_swarm_planet.GetName] เป็นทั้งสิ่งมหัศจรรย์ทางเทคโนโลยีและภัยอันตราย การกำหนดแผนภูมิที่มาของนาไนต์รวมถึงความสัมพันธ์กับระบบนิเวศที่เป็นเอกลักษณ์ของดาวเคราะห์ถือเป็นความท้าทัยที่น่าตื่นเต้นสำหรับ [Root.Owner.GetScientistPlural] ของเรา ในขณะเดียวกันก็อาจช่วยเพิ่มความเข้าใจเกี่ยวกับปัญญาประดิษฐ์เชิงเครื่องจักร(ปัญญาเครื่อง)ได้อีกด้วย"
 DESTROY_SWARM:0 "ทำลายล้างฝูงนาไนต์"
 DESTROY_SWARM_DESC:0 "สั่งการระเบิดปูพรมจากวงโคจรใส่ฝูงนาไนต์ หากมีความลับใดๆ ที่คุ้มค่าแก่การค้นพบ เราจะเก็บเกี่ยวพวกมันจากซากส่วนนอกของแมลงเม่าเหล่านี้"

 TAME_THE_SWARM:0 "ทำให้ฝูงนาไนต์เชื่อง"
 TAME_THE_SWARM_DESC:0 "ความรู้ขั้นสูงของเราเกี่ยวกับปัญญาประดิษฐ์สามารถนำมาใช้ในการเขียนโปรแกรมใหม่และทำให้พวกนาไนต์เชื่องได้ พวกมันอาจเป็นทรัพยากรที่ยอดเยี่ยมในการสร้างสิ่งปลูกสร้างบนดาวเคราะห์ดวงนี้—และด้วยความเชื่อมโยงของพวกมันกับระบบนิเวศของดาวเคราะห์ เราควรจะสามารถสั่งให้นาไนต์สร้างดาวบ้านเกิดดวงที่สองขึ้นมาได้"
 TAME_THE_SWARM_DESC_ARTIFICIAL:0 "ความรู้ขั้นสูงของเราเกี่ยวกับปัญญาประดิษฐ์สามารถนำมาใช้ในการเขียนโปรแกรมใหม่และทำให้พวกนาไนต์เชื่องได้ พวกมันอาจเป็นทรัพยากรที่ยอดเยี่ยมในการสร้างสิ่งปลูกสร้างบนดาวเคราะห์ดวงนี้—และด้วยความเชื่อมโยงของพวกมันกับระบบนิเวศของดาวเคราะห์ เราควรจะสามารถสั่งให้นาไนต์สร้างสรวงสวรรค์ขึ้นมาได้"

 ENLIGHTEN_RADIO:0 "พัฒนาสติปัญญาสิ่งมีชีวิตดูดซับรังสี"
 ENLIGHTEN_RADIO_DESC:0 "พืชเหล่านี้ที่สามารถดำรงชีวิตและเจริญเติบโตได้บนโลกที่มีกัมมันตภาพรังสีมากกว่าชั้นบรรยากาศอาจเป็นส่วนเสริมที่ยอดเยี่ยมให้กับจักรวรรดิของเรา แต่ก่อนหน้านั้น เราจำเป็นต้องพัฒนาจิตใจของพวกมันและสอนกระบวนการพัฒนาหลายพันปีให้แก่พวกมันภายในเวลาไม่กี่เดือน"

 GAS_RESTORATION:0 "โครงการฟื้นฟู [From.GetName]"
 GAS_RESTORATION_DESC:0 "การชดใช้ความผิดพลาดของคุณเป็นสิทธิพิเศษสำหรับผู้มีอำนาจ และในสถานการณ์นี้ เราต้องชดใช้อย่างสาสม ภัยพิบัติบน [From.GetName] นั้นน่าสยดสยองอย่างยิ่ง และความหวังเดียวของเราคือความสามารถของนักวิทยาศาสตร์ในการกลับขั้วของเครื่องสแกนส่วนลึก และอาจจุดประกายชีวิตขึ้นมาใหม่ภายในดาวก๊าซยักษ์ดวงนี้"

 RESCUE_STORM:0 "ปลดปล่อย [Root.GetName]"
 RESCUE_STORM_DESC:0 "ยาน [Root.GetName] ติดอยู่ในพายุบน [FromFrom.GetName] ความหวังเดียวของพวกเขาอาจขึ้นอยู่กับการที่เราส่งยานลำใหม่ไปที่นั่น และปรับความถี่โล่ป้องกันของพวกเขาจากระยะไกล"

 STUDY_SLEEPING_CRYSTAL:0 "ศึกษาดาวเคราะห์น้อยที่แปลกประหลาด"
 STUDY_SLEEPING_CRYSTAL_DESC:0 "[From.GetName] เป็นดาวเคราะห์น้อยที่แปลกประหลาดซึ่งดูเหมือนว่าจะสามารถหมุนตัวและหลบหลีกสถานีขุดเจาะของเราได้ด้วยวิธีการที่ไม่ทราบแน่ชัด เราควรส่งยานวิทยาศาสตร์ไปสืบสวนหาคำตอบ"

 CRACK_THE_EGG:0 "กะเทาะเปลือกไข่"
 CRACK_THE_EGG_DESC:0 "ไข่ใบใหญ่ยักษ์ที่เราค้นพบใน [Solar_System.GetName] กำลังร้องขอการชำแหละ นี่เป็นโอกาสอันน่าเหลือเชื่อที่จะได้ศึกษารอบวัฏจักรการสืบพันธุ์ของสิ่งมีชีวิตขนาดมหึมาอย่างใกล้ชิดเช่นนี้"
 # Decisions
 decision_crystalline_refugees:0 "ตั้งถิ่นฐานผู้ลี้ภัยคริสตัลลีน"
 decision_crystalline_refugees_desc:0 "จัดหาบ้านใหม่ให้กับผู้ลี้ภัยสายพันธุ์ $NAME_Central_Crystal_Species$ ที่ถูกเนรเทศออกไปจากบ้านเกิดเมืองนอนของตนใน $NAME_Central_Crystal_Country$"
 decision_crystalling_refugees_effect_tt:0 "§G500§! £pop£ §H$NAME_Central_Crystal_Species$ป๊อป§! จะย้ายถิ่นฐานไปยัง §Y[Root.GetName]§!"

 decision_crystalline_architecture:0 "สิ่งก่อสร้างคริสตัลลีน"
 decision_crystalline_architecture_desc:0 "ทีมวิศวกรที่ส่งมาจาก $NAME_Central_Crystal_Country$ จะช่วยปรับปรุงผังของแหล่งที่อยู่อาศัย(หัวเราะ)"

 decision_expand_dayside:0 "ขยายโครงสร้างพื้นฐานด้านกลางวัน"
 decision_expand_dayside_desc:0 "ด้วยการใช้ประโยชน์จากสถานการณ์ที่เป็นเอกลักษณ์ของ [Root.GetName] เราสามารถติดตั้งแผงโซลาร์เซลล์ทั่วพื้นที่ซีกกลางวันของดาวเคราะห์ดวงนี้ เพื่อเพิ่มกำลังการผลิตพลังงานของเราได้อย่างมหาศาล"

 decision_introduce_chaos:0 "สร้างความโกลาหล"
 decision_introduce_chaos_desc:0 "ดาวเคราะห์ดวงนี้สมบูรณ์แบบเกินไปสำหรับพวกเรา—ชาวอาณานิคมของเรากำลังเผชิญกับอาการสติแตกตามท้องถนน ทางเลือกเดียวที่สมเหตุสมผลของเราคือการนำความบกพร่องบางอย่างเข้ามา"

 # Enigmatic Robot

 anomaly.2080.name:0 "หุ่นยนต์ปริศนา"
 anomaly.2580.desc:0 "ขณะที่นักวิทยาศาสตร์ของเรากำลังสืบค้นเกี่ยวกับอารยธรรมยุคก่อนบน [From.GetName] พวกเขาพบหุ่นยนต์ลึกลับขนาดเล็กตัวหนึ่งพยายามหลบซ่อนตัวจากพวกเขา หลังจากผ่านการผูกมิตรและพยายามเข้าหาเจ้าสิ่งนั้นอยู่หลายสัปดาห์ ในที่สุดมันก็นำทางพวกเขากลับไปยังโรงงานที่ยังคงใช้งานได้ซึ่งมันเป็นผู้ดูแลนับตั้งแต่การล่มสลายของผู้สร้าง\n\nหลังจากได้รับการนำทางมายังสิ่งปลูกสร้างนี้ คนของเราก็ได้รับทรัพยากรจำนวนมากที่สามารถนำกลับไปที่ยานได้ แม้ว่าการสื่อสารจะดูแปลกประหลาดและยากลำบาก แต่หุ่นยนต์ตัวน้อยนี้ดูเหมือนจะนับถือนักวิทยาศาสตร์ของเราเป็นเพื่อน"

# The Inhabitants of Parvus III

 anomaly.6700.name:0 "หลบหนีอย่างหวุดหวิด"
 anomaly.6700.desc:0 "ขณะที่ลูกเรือของ [Root.GetName] สำรวจเนินทรายที่แห้งแล้งของ §H[nanite_swarm_planet.GetName]§! รายงานฉบับแรกเป็นไปตามที่คาดไว้: นี่คือดินแดนรกร้างที่ผิดธรรมชาติและไม่มีวี่แววของสิ่งมีชีวิตเหนือผิวน้ำ ทว่าสิ่งมีชีวิตในน้ำของดาวดวงนี้กลับวิวัฒนาการไปไกลเกินกว่าที่เราคาดการณ์ไว้ว่าบางสายพันธุ์จะขึ้นมาบนผืนดินแห้ง\n\nนอกจากนี้ ลูกเรือยังได้ค้นพบสิ่งปลูกสร้างที่ปกคลุมด้วยทรายซึ่งมีลักษณะคล้ายอารยธรรมโบราณ หลังจากที่พวกเขาเริ่มทำการขุดค้นอาคารเหล่านั้น ฝูงนาไนต์ขนาดเล็กก็ปรากฏตัวขึ้นและเริ่มคุกคามเหล่านักวิจัย ดูเหมือนว่าสิ่งก่อสร้างเหล่านี้ไม่ได้สร้างขึ้นจากทราย แต่สร้างขึ้นจากนาโนแมชชีนขนาดจิ๋วหลายพันล้านตัว!\n\nเมื่อถูกระดมกำลัง ฝูงนาไนต์เหล่านี้ก็ทวีจำนวนขึ้นอย่างรวดเร็ว ปลุกส่วนที่เหลือที่หลับใหลให้ตื่นขึ้นมา [Root.GetLeaderName] สั่งให้อพยพออกจากดาวเคราะห์ดวงนี้ในทันที ทำให้ยาน [Root.GetName] มีเวลาเพียงพอที่จะหนีออกสู่ชั้นบรรยากาศโดยมีพายุฝูงนาไนต์ไล่ล่ามาอย่างกระชั้นชิด ฝูงนาไนต์ที่หลงเหลืออยู่ในขณะนี้ดูเหมือนจะกระสับกระส่ายและไม่มีท่าทีจะสงบลงเลย"
 anomaly.6700.a:0 "ค้นหาสิ่งที่เกิดขึ้นที่นี่"

 anomaly.6705.name:0 "ว่าด้วยที่มาของนาไนต์"
 anomaly.6705.desc.start:0 "ยาน [root.GetName] ได้เสร็จสิ้นการศึกษาเกี่ยวกับนาไนต์ในท้องถิ่นของ §H[nanite_swarm_planet.GetName]§! แล้ว และผลลัพธ์ที่ได้ก็น่าทึ่งอย่างยิ่ง หลายพันปีมาแล้ว ยานอวกาศที่มาจากอารยธรรมขั้นสูงได้ตกลงที่นี่ ภายในยานลำนั้นประกอบด้วยหุ่นยนต์ที่มีการออกแบบที่แตกต่างกันหลายสิบรูปแบบ"
 anomaly.6705.desc.L:0 "น่าแปลกที่เครื่องจักรเหล่านี้ดูเหมือนจะเป็นเครื่องมือของผู้สร้างประตู(ช่างก่อสร้าง)ที่ลึกลับ ทว่าพวกมันกลับมีอายุเก่าแก่กว่าประตูช่อง L ใดๆ ที่เราเคยค้นพบ"
 anomaly.6705.desc.noL:0 "ใครก็ตามที่สร้างเครื่องจักรเหล่านี้ขึ้นมาล้วนครอบครองเทคโนโลยีที่ล้ำหน้าอย่างแท้จริง ก่อนหน้ายุคสมัยของเรานานนัก"
 anomaly.6705.desc.end:0 "\nพวกหุ่นยนต์ทำงานโดยอัตโนมัติและพยายามควบคุมดูแลความปลอดภัยของดาวเคราะห์ตามการเขียนโปรแกรมของพวกมัน เมื่อปราศจากผู้สร้างคอยควบคุม การสู้รบระหว่างเครื่องจักรก็ปะทุขึ้นในไม่ช้า\n\nผู้ชนะการปะทะกันครั้งนี้คือระบบนาไนต์ที่ปรับตัวได้ดีเยี่ยมและจำลองตัวเองได้ซึ่งวิวัฒนาการอย่างรวดเร็วเพื่อให้เข้ากับชีวมณฑลของดาวเคราะห์ เครื่องจักรนี้สถาปนาตนเองขึ้นเป็นเจ้านายของโลกพื้นผิว ย่อยสลายทุกสิ่งตั้งแต่พืชพันธุ์ท้องถิ่นไปจนถึงหุ่นยนต์คู่ปรับในอดีต\n\nพวกเรากำลังเป็นสักขีพยานของควันหลงหลังสงครามครั้งใหญ่: ดาวเคราะห์ที่ไม่ได้ว่างเปล่าจากชีวิต แต่ทว่าค้ำจุนผู้ล่าสูงสุดที่ผ่านวิวัฒนาการมาแล้ว"
 anomaly.6705.a:0 "ทำให้ฝูงนาไนต์เชื่อง"
 anomaly.6705.b:0 "ศึกษาฝูงนาไนต์เพิ่มเติม"
 anomaly.6705.b.tooltip:0 "มอบหมายให้ [Root.Owner.GetScientistPlural] ของเราสืบค้นความลับของนาไนต์ที่วิวัฒนาการแล้วบน [nanite_swarm_planet.GetName]"
 anomaly.6705.c:0 "ทำลายล้างฝูงนาไนต์"

 anomaly.6710.name:0 "ระบบภูมิคุ้มกันประดิษฐ์"
 anomaly.6710.desc.start:0 "ผู้อยู่อาศัยใน §H[nanite_swarm_planet.GetName]§! ยังคงสร้างความประทับใจให้แก่เรา โพรบสำรวจลำใดก็ตามที่เราส่งลงสู่ชั้นบรรยากาศจะถูกวิเคราะห์และแยกชิ้นส่วนอย่างรวดเร็วโดยฝูงนาไนต์ และหลังจากนั้นไม่นาน ส่วนที่เหลือของรังก็เรียนรู้วิธีการบริโภคโดรนของเราได้ดีที่สุดเช่นกัน—แม้กระทั่งบนพื้นที่ซีกตรงข้ามของดาวเคราะห์ ฝูงนาไนต์แสดงให้เห็นถึงการทำความเข้าใจเทคโนโลยีของเราอย่างเห็นได้ชัด"
 anomaly.6710.desc.normal:0 "นักวิทยาศาสตร์ [Root.Owner.GetScientistPlural] บางส่วนเสนอว่าพฤติกรรมนี้เป็นหลักฐานว่าฝูงนาไนต์คือสิ่งมีชีวิตมีสติปัญญา—หรือกลุ่มสิ่งมีชีวิต—และอาจถือได้ว่ามีชีวิตด้วยซ้ำ\n\nถึงเวลาต้องตัดสินใจแล้ว: เราจะปล่อยให้พวกมันอยู่รอดต่อไป ทำลายพวกมัน หรือพยายามควบคุมสิ่งเหล่านี้เพื่อใช้ประโยชน์สำหรับเราดี?"
 anomaly.6710.desc.gestalt:0 "นี่คือพฤติกรรมของจิตร่วมกลุ่ม(หัวเราะ)ที่เพิ่งเริ่มต้น และหากปล่อยไว้โดยไม่เข้าไปแทรกแซง ฝูงนาไนต์อาจจะพัฒนาไปจนถึงการมีสติปัญญาได้ เราจะปล่อยมันไว้ในสถานะนี้ หรือเราจะทำลายมันก่อนที่มันจะกลายมาเป็นภัยคุกคาม? เราจะสามารถควบคุมเอนทิตี้นี้เพื่อผลประโยชน์ของเราด้วยวิธีใดวิธีหนึ่งได้หรือไม่?"

 anomaly.6710.a:0 "ทำให้ฝูงนาไนต์เชื่อง"
 anomaly.6710.b:0 "ทำลายล้างฝูงนาไนต์"
 anomaly.6710.c:0 "สิ่งเหล่านี้ไม่ใช่แค่หุ่นยนต์กลไกธรรมดา แต่เป็นสิ่งมีชีวิตมีวิญญาณ!"

 anomaly.6715.name:0 "การปฏิสนธินาไนต์"
 anomaly.6715.desc:0 "แม้ว่าฝูงนาไนต์บน §H[nanite_swarm_planet.GetName]§! จะน่าประถับใจในระดับจิตรวมกลุ่ม แต่ในระดับตัวเดี่ยวพวกมันบอบบางมาก เราสกัดนาไนต์ออกมาบางส่วนจากชั้นบรรยากาศของดาวดวงนี้ และใช้เทคโนโลยี AI ขั้นสูงของเราในการปรับแต่งโปรแกรมระบบสื่อสารของเครื่องจักรเหล่านั้นใหม่ จากนั้นเมื่อเรานำนาไนต์ที่ถูกตั้งค่าการทำงานใหม่กลับเข้าไปในฝูง การปรับแต่งนี้ก็แพร่กระจายไปทั่วดาวเคราะห์ในชั่วพริบตา\n\nเมื่อสามารถควบคุมเครือข่ายได้ คำสั่งแรกของเราคือการฟื้นฟูชีวมณฑลที่เสถียรบน §H[nanite_swarm_planet.GetName]§!—ซึ่งได้รับการปรับปรุงให้เหมาะสมสำหรับชาว [Root.Owner.GetSpeciesNamePlural] บัดนี้ดาวเคราะห์พร้อมและรอคอยพวกเราแล้ว และฝูงนาไนต์ก็พร้อมที่จะช่วยเหลือภารกิจใดๆ ที่ชาวอาณานิคมของเรามอบหมายให้"
 anomaly.6715.a:0 "เริ่มเดินเครื่องยนต์ยานอาณานิคม!"

 anomaly.6720.name:0 "ไม่มีใครรอดพ้นจากการระเบิดปูพรมจากวงโคจร"
 anomaly.6720.desc:0 "ฝุ่นผงกำลังจางหายไปหลังจากที่กองยาน [root.fleet.GetName] เสร็จสิ้นการระเบิดปูพรมจากวงโคจรใส่ §H[nanite_swarm_planet.GetName]§! แม้จะใช้ทั้งวัตถุระเบิดอานุภาพสูงและอาวุธคลื่นแม่เหล็กไฟฟ้า ESMP)ต้นแบบร่วมกัน แต่กระบวนการนี้ก็ใช้เวลานาน—แต่ในที่สุด ตอนนี้ไม่เหลือร่องรอยของสิ่งมีชีวิตประเภทเครื่องจักรอยู่ข้างล่างนั่นเลย\n\nชาวอาณานิคมในอนาคตของเราจะสามารถเข้าถึงซากเศษชิ้นส่วนของแมลงรำคาญเหล่านี้ได้ และหวังว่าจะสามารถเก็บเกี่ยวสิ่งมีค่าจากมันได้"

 anomaly.6725.name:0 "การเตรียมพร้อมที่ไม่เพียงพอ"
 anomaly.6725.desc:0 "มาตรการป้องกันและอุปกรณ์พิเศษของเรายังไม่เพียงพอ หลังจากจัดตั้งอาณานิคมบน §H[nanite_swarm_planet.GetName]§! ได้ไม่นาน เราก็สูญเสียการติดต่อกับทีมงานภาคพื้นดิน การสื่อสารครั้งล่าสุดที่เราได้รับจากนิคมแสดงภาพท้องฟ้าที่มืดครึ้มด้วยวัตถุสีดำขนาดเล็กจำนวนนับไม่ถ้วนที่บินว่อนเข้ามารุมล้อมค่ายที่มั่น"
 anomaly.6725.a:0 "บัดซบเอ๊ย เจ้าพวกนาไนต์!"

 parvus_III_chain_title: "ผู้อยู่อาศัยบนพาร์วูสที่ 3"
 parvus_III_chain_desc: "พาร์วูสที่ 3ว่างเปล่าจากชีวิตอินทรีย์ แต่ยังมีกิจกรรมต่างๆ ดำเนินอยู่มากมาย สิ่งมีชีวิตเหล่านี้คืออะไร และสามารถเจรจาพูดคุยเพื่อหาข้อตกลงได้หรือไม่?"

# Color of Science

 anomaly.6740.name:0 "สีสันแห่งวิทยาศาสตร์"
 anomaly.6740.desc:0 "สาเหตุของการเกิดการกำทอนของรังสีคอสมิกที่ตรวจพบรอบโคโรนาของ §Y[From.GetName]§! แท้จริงแล้วเกิดจากโครงสร้างผลึกที่ผิดปกติซึ่งสามารถต้านทานความร้อนได้!\n\nหลังจากนำผลึกนั้นขึ้นมาบนยาน [Root.Owner.GetScientistPlural] ของเราก็ต้องประหลาดใจเมื่อพบว่าการกำทอนที่แปลกประหลาดนั้นสามารถจำลองขึ้นใหม่ได้ ขั้นแรกพวกเขาปล่อยรังสีสุริยะชนิดเดียวกับจาก [From.GetName] ใส่ผลึก ทำให้เกิดผลลัพธ์แบบเดียวกับปรากฏการณ์ที่เคยบันทึกไว้ในตอนแรก นอกจากนี้มันดูเหมือนจะสร้างความถี่กำทอนกับคลื่นพลังงานทุกรูปแบบที่เราส่งผ่านตัวมัน ทำให้เกิดสีสันและเสียงแบบใหม่ที่ไม่เคยถูกสังเกตการณ์มาก่อนโดยชาว [Owner.GetSpeciesNamePlural]!\n\nความถี่เช่นนี้สามารถเปลี่ยนแปลงมุมมองที่เรามีต่อจักรวาลได้ หรืออีกทางเลือกหนึ่งคือเราสามารถพัฒนาการประยุกต์ใช้เพื่อการวิจัยกับโครงสร้างผลึกที่ทนทานต่อความร้อนจัดของดาวฤกษ์ได้"
 anomaly.6740.a:0 "ส่งความถี่แบบใหม่นี้กลับไปให้กับศิลปินของเรา"
 anomaly.6740.a.gestalt:0 "รวบรวมข้อมูลความถี่ใหม่เหล่านี้เพื่อนำไปวิเคราะห์เพิ่มเติม"
 anomaly.6740.b:0 "เก็บเกี่ยวผลึกเพื่อนำไปเป็นฉนวนหุ้มอาวุธพลังงานของเรา"

# Alpha Centauri Anomaly

 anomaly.6745.name:0 "[From.GetName]"
 anomaly.6745.desc:0 "ตราบเท่าที่ชาว [Root.Owner.GetSpeciesNamePlural] ของเรามีความสามารถในการมองออกไปยังหมู่ดาวเพื่อค้นหาบ้านใหม่ [From.GetName] คือความฝันที่ไร้เดียงสา: สถานที่ที่เรามองดูด้วยความหวังว่าจะเป็นบ้านหลังใหม่ แต่น่าเศร้าที่เมื่อกล้องโทรทรรศน์ของเราได้รับการพัฒนาขึ้น เราก็ตระหนักได้ว่าดาวเคราะห์ดวงนี้เป็นดาวเคราะห์เยือกแข็งที่ถูกล็อกด้วยแรงไทดัล(ประตู)ทฤษฎีที่เราได้รับการยืนยันแล้วในวันนี้\n\nอย่างไรก็ตาม ยังพอมีความหวังอยู่บ้าง ดาวดวงนี้มีองค์ประกอบพื้นฐานทั้งหมดที่จำเป็นสำหรับดาวเคราะห์ที่เอื้ออำนวยต่อการอยู่อาศัย มันอาจต้องการแรงผลักดันเพียงเล็กน้อยเท่านั้น..."
 anomaly.6745.a:0 "ขอบคุณที่เป็นแรงบันดาลใจให้เรา [From.GetName]"
 anomaly.6745.b:0 "ดาวเคราะห์นอกระบบสุริยะอีกดวงถูกเพิ่มเข้าไปในรายการที่กำลังเติบโตของเรา"
 anomaly.6750.name:0 "[From.GetName]"
 anomaly.6750.desc:0 "ดาวเคราะห์ที่ถูกล็อกด้วยแรงไทดัลดวงนี้ดูเหมือนจะมีส่วนประกอบพื้นฐานทั้งหมดสำหรับดาวเคราะห์ที่เอื้อต่อการอยู่อาศัย บางทีอาจมีสิ่งใดที่สามารถสร้างขึ้นได้ที่นี่"

# Target Practice Anomaly

 anomaly.6800.name:0 "ซ้อมเป้านิ่ง"
 anomaly.6800.desc:0 "เซ็นเซอร์ของเราตรวจพบว่าซากยานอวกาศบน [From.GetName] มาตกอยู่ที่นี่ในลักษณะที่แปลกประหลาด ยานเหล่านั้นดูเหมือนจะถูกขับพุ่งชนเข้ากับดาวเคราะห์น้อยโดยเจตนา อาจจะขับตรงมาจากระยะทางไกลหลายปีแสง เพื่อทดสอบความแม่นยำของไอพ่นจากผู้ออกแบบ ในขณะที่เราสแกนซากเหล่านี้อย่างละเอียด เราพบยานลำหนึ่งเป็นพิเศษซึ่งดูเหมือนว่าระบบขับเคลื่อนจะยังคงสภาพสมบูรณ์ดี"
 anomaly.6800.a:0 "เก็บกู้ระบบขับเคลื่อนนั้นขึ้นมา!"
 anomaly.6800.b:1 "เราจะไม่ปล่อยให้โลหะผสมเหล่านี้สูญเปล่า"

# ASR: Asteroid Sensor Relay

 anomaly.6805.name:0 "เครื่องทวนสัญญาณเซ็นเซอร์บนดาวเคราะห์น้อย"
 anomaly.6805.desc:0 "ด้วยความหวังที่จะค้นหาทรัพยากรหายากภายใน [From.GetName] เหล่า [Owner.GetScientistPlural] ของเราได้บังเอิญพบสิ่งที่ผิดปกติอย่างมาก สิ่งที่ในตอนแรกดูเหมือนจะเป็นดาวเคราะห์น้อยธรรมดา แท้จริงแล้วเป็นสถานีทวนสัญญาณที่หลับใหลมานาน ซึ่งมีระบบอิเล็กทรอนิกส์ที่ซับซ้อนและเซ็นเซอร์ขั้นสูงที่ติดตั้งไว้เพื่อส่งสัญญาณกลับไปยังจักรวรรดิโบราณ การพุ่งชนส่งผลให้โครงสร้างภายในของดาวเคราะห์น้อยบางส่วนได้รับความเสียหาย และเราสามารถสกัดระบบการทำงานออกมาจากมันได้เพียงระบบเดียวเท่านั้น"
 anomaly.6805.a:0 "เก็บกู้เซ็นเซอร์"
 anomaly.6805.b:0 "ถอดรหัสซอฟต์แวร์เข้ารหัสของพวกมัน"

 anomaly.6810.name:0 "ภัยแพร่ระบาด"
 anomaly.6810.desc:0 "เราคิดผิดไป สถานีที่โคจรรอบ [From.GetName] ไม่ได้ว่างเปล่าจากผู้คน แต่ทว่ามันเต็มไปด้วยสัตว์มีข้อต่างดาวขนาดยักษ์(เสียชีวิต)คลานอยู่เต็มไปหมด! โพรบสำรวจที่เราส่งเข้าไปในสถานีส่งกลับมาเพียงภาพเงาที่วิ่งพาดผ่านและก้ามฟันขนาดใหญ่ก่อนที่สัญญาณจะขาดหายไป การสแกนสถานีส่วนลึกยังเผยให้เห็นคลังข้อมูลที่เราคาดว่าเป็นระบบจัดเก็บข้อมูลที่ซับซ้อนอย่างยิ่ง การจะเข้าถึงคลังข้อมูลนี้ได้ เราจำเป็นต้องฝ่ากองกำลังผู้พิทักษ์หลายขาเหล่านั้นไปให้ได้"
 anomaly.6810.a:0 "ส่งกองกำลังภาคสนามไป สัตว์มีข้อต่างดาวขนาดยักษ์ไม่ใช่เรื่องตลก!"
 anomaly.6810.b:0 "มันคงจะดีที่สุดที่เราจะปล่อยให้พวกเขาอยู่ตามลำพัง"
 anomaly.6810.c:0 "§Bพยายามติดต่อเพื่อนร่วมสายพันธุ์สัตว์มีข้อของเรา§!"
 anomaly.6810.d:0 "§Bระบายอากาศออกสู่สุญญากาศ§!"
 anomaly.6810.d.tooltip:0 "ใช้ความรู้ขั้นสูงของเราเกี่ยวกับแหล่งที่อยู่อาศัยเพื่อทำลายชั้นบรรยากาศของสถานี"
 anomaly.6810.e.evopred: "§Bเก็บเกี่ยวจีโนมของพวกมัน!§!"
 anomaly.6815.name:0 "สัตว์มีข้อต่างดาวขนาดยักษ์"
 anomaly.6815.desc:0 "โอ้ สวัสดีที่นั่น! ขออภัยด้วยที่ทำลายโพรบสำรวจของคุณในตอนแรก เป็นเพียงเพราะว่าเรากำลังดำเนินการทดลองที่ละเอียดอ่อนมากที่นี่ และเรากังวลว่าการแทรกแซงจากภายนอกอาจส่งผลต่อผลลัพธ์การทดลองได้—ฉันมั่นใจว่าคุณคงจะเข้าใจ เอาล่ะ มีอะไรให้เราช่วยคุณบ้าง?"
 anomaly.6815.a:0 "เดี๋ยวนะ สรุปคือพวกคุณไม่ใช่การแพร่ระบาดที่เป็นอันตรายงั้นหรือ?"
 anomaly.6820.desc:1 "อะไรกันที่ทำให้คุณคิดแบบนั้น? พวกเราคือหน่วยคัดแยกของพวกภัณฑารักษ์(เครื่องช่วยหายใจ)ที่ส่งมาศึกษาวิเคราะห์คุณสมบัติพิเศษของระบบนี้ หากคุณต้องการมีส่วนร่วมในการให้บริการปกติของนิกายเรา ฉันขอแนะนำให้ติดต่อห้องปฏิบัติการวิจัยหลัก ฉันสามารถแบ่งปันสำเนาผลการค้นพบของเราจนถึงตอนนี้ให้แก่คุณได้"
 anomaly.6820.a:0 "ขอให้โชคดีกับการทดลองของคุณ"

# Crystal Growths Anomaly

 anomaly.6825.name:0 "การเติบโตของผลึก"
 anomaly.6825.desc.start:0 "สิ่งมีชีวิตที่อาศัยอยู่บน [From.GetName] ไม่เหมือนสิ่งที่เราคาดการณ์ไว้เลย รายงานจาก [owner.GetScientistPlural] ของเราระบุว่าดาวเคราะห์น้อยมีการเจริญเติบโตของผลึกคริสตัล การเจริญเติบโตนี้กลายเป็นกระบวนการที่สามารถพึ่งพาตนเองได้ โดยเกิดจากการที่คริสตัลดูดซับกัมมันตภาพรังสีรอบตัวของ [From.System.GetName] และผสมผสานกับองค์ประกอบแร่ธาตุของดาวเคราะห์น้อย"
 anomaly.6825.desc.nofood:0 "คริสตัลเหล่านั้นทำมาจากน้ำตาลซูโครสเป็นหลักและค่อนข้างเปราะบางมาก"
 anomaly.6825.desc.food:0 "คริสตัลเหล่านั้นทำมาจากน้ำตาลซูโครสเป็นหลักและอาจสามารถรับประทานได้ด้วยซ้ำ"
 anomaly.6825.b:0 "คุณบอกว่ารับประทานได้งั้นหรือ?"
 anomaly.6835.name:0 "คำขอร้องหาผลึกคริสตัล"
 anomaly.6835.desc:0 "หลังจากที่ได้รับประทานน้ำตาลคริสตัลจากอวกาศมาเป็นเวลาสองสามปีแล้ว บัดนี้เห็นได้ชัดว่าประชาชนของเราต้องการให้มันพร้อมใช้งานได้อย่างแพร่หลายมากขึ้น [Root.GetScientistPlural] ของเราได้จัดทำรายการของเป้าหมายที่มีศักยภาพซึ่งเราสามารถสร้างฟาร์มคริสตัลเพิ่มเติมได้"
 anomaly.6835.a:0 "ค้นหาดาวเคราะห์น้อยเพิ่มเติมเพื่อขยายฟาร์มคริสตัล"
 anomaly.6835.a.tooltip:0 "ดาวเคราะห์น้อยแบบสุ่มสูงสุด §Y3§! ดวงจะผลิตอาหาร £food£ §G3§! หน่วย"
 anomaly.6835.b:0 "อย่าเพิ่งขยายฟาร์มคริสตัลเลยจะดีกว่า"

# Too Few Sheep Asteroid Anomaly

 anomaly.6840.name:0 "ฝูงแกะที่น้อยเกินไป"
 anomaly.6840.desc:0 "[From.GetName] เป็นดาวก๊าซยักษ์ที่แปลกประหลาด ความรู้ทางฟิสิกส์ดาราศาสตร์ของเราบอกว่าดาวเคราะห์ดวงนี้ควรจะมีวงแหวนรอบดาว แต่ทว่ากลับไม่มี สาเหตุของเรื่องนี้เริ่มชัดเจนขึ้นหลังจากที่ยานวิทยาศาสตร์ของเราเข้าไปตรวจสอบดวงจันทร์ที่น่าสนใจอย่างใกล้ชิด ดาวเคราะห์ดวงนี้ถูกล้อมรอบด้วยดวงจันทร์เลี้ยงแกะ(พระจันทร์)ซึ่งทั้งหมดอุดมไปด้วยแร่ธาตุอย่างเหลือเชื่อและสะสมปริมาณมากขึ้นทุกปี เราสามารถระเบิดดวงจันทร์เหล่านั้นด้วยการระเบิดที่แม่นยำและควบคุมได้เพื่อเก็บเกี่ยวพวกมัน หรือรักษาพวกมันให้อยู่ในเขตวงแหวนและเก็บเศษอวกาศที่พวกมันดึงดูดไว้แทน"
 anomaly.6840.a:0 "เราต้องการแร่ธาตุเหล่านั้นในตอนนี้"
 anomaly.6840.b:0 "สิ่งดีๆ มักจะมาหาผู้ที่รู้จักรอคอย"

# Cascading Catastrophe

 anomaly.6845.name:0 "มหันตภัยลูกโซ่"
 anomaly.6845.desc:0 "เราได้ค้นพบสิ่งมีชีวิตบน [From.GetName] จริง แต่ทว่าการกระทำของเรากลับทำให้พวกมันต้องสูญพันธุ์ไปจนสิ้น จุลชีพที่อาศัยอยู่บริเวณขอบนอกของชั้นบรรยากาศของดาวก๊าซยักษ์ดวงนี้มีปฏิกิริยาตอบสนองในทางที่ไม่ดีต่อการสแกนส่วนลึกของเรา ความถี่เหล่านั้นทำให้โครงสร้างเซลล์ของสิ่งมีชีวิตแต่ละตัวสั่นสะเทือน—ส่งผลกระทบต่อเนื่องเป็นลูกโซ่จากตัวหนึ่งไปยังอีกตัวหนึ่ง และทำให้พวกมันแน่นิ่งไปในไม่ช้า\n\nบัดนี้เรากำลังโคจรอยู่เหนือสุสานที่ใหญ่ที่สุดในจักรวาล"
 anomaly.6845.a:0 "พอจะทำอะไรได้บ้างไหม?"
 anomaly.6850.name:0 "กลับขั้วการสแกนส่วนลึก"
 anomaly.6850.desc:0 "สำเร็จแล้ว! น่าอัศจรรย์ยิ่งนัก เมื่อ [Owner.GetScientistPlural] ของเราติดตั้งการปรับปรุงที่เหมาะสมบนยานลำนี้ พวกเขาก็สามารถสร้างผลกระทบต่อเป็นลูกโซ่จำลองขึ้นมาใหม่ได้สำเร็จ แต่ทว่าครั้งนี้ผลลัพธ์แตกต่างออกไป และชีวิตเริ่มอุบัติขึ้นมาใหม่อีกครั้งทั่วทั้ง [FromFromFrom.GetName] เป็นคลื่นระลอกใหญ่"
 anomaly.6850.desc.valuesothers:0 "กระบวนการนี้ช่วยสอนเรื่องราวต่างๆ เกี่ยวกับจักรวาลให้แก่เรามากมาย แต่ที่มากไปกว่านั้นคือการเรียนรู้เกี่ยวกับตัวเราเอง"
 anomaly.6850.desc.novaluesothers:0 "ในอนาคตเราคงต้องระมัดระวังมากขึ้นในการกำหนดพิกัดเป้าหมายการสแกน"
 anomaly.6850.a:0 "ข่าวที่ยอดเยี่ยมมาก!"

# Caught in the Eye

 anomaly.6855.name:0 "ติดอยู่ใจกลางพายุ"
 anomaly.6855.desc.regular:0 "สัญญาณสุดท้ายที่ได้รับจาก [Root.GetName] ไม่มีอะไรมากไปกว่าเสียงคลื่นรบกวนที่จับใจความไม่ได้ พวกเขาได้กำลังศึกษาพายุเฉพาะถิ่นที่แปลกประหลาดบน [From.GetName] และได้ส่งรายงานเบื้องต้นที่น่าเหลือเชื่อกลับมา พายุมีปฏิกิริยาต่อโพรบสำรวจที่ส่งเข้าไป โดยสร้างช่องว่างสุญญากาศเพื่อหลบหลีกพวกมัน จากนั้นจึงค่อยๆ เคลื่อนกลับเข้ามาล้อมรอบโดรนสำรวจ ยาน [Root.GetName] มีแผนที่จะทดสอบความถี่สแกนที่หลากหลายกับพายุก่อนที่เราจะขาดการติดต่อ ยานวิทยาศาสตร์ดูเหมือนจะจมลงไปในดาวก๊าซยักษ์และอยู่ในสถานะแน่นิ่ง"
 anomaly.6855.desc.gestalt:0 "สัญญาณจาก [Root.GetName] ขาดหายไปจากระบบจิตสำนึกอย่างกะทันหัน เหล่า [Owner.GetScientistPlural] ดูเหมือนจะยังไม่เสียชีวิต เพียงแค่ไม่สามารถติดต่อสื่อสารกับเราได้ พวกเขาได้ทำการศึกษาพายุเฉพาะถิ่นที่แปลกประหลาดบน [From.GetName] และได้ส่งรายงานเบื้องต้นที่น่าเหลือเชื่อกลับมา พายุมีปฏิกิริยาตอบรับต่อโพรบสำรวจที่ส่งเข้าไป โดยสร้างช่องว่างสุญญากาศเพื่อหลบหลีกพวกมัน จากนั้นจึงค่อยๆ เคลื่อนกลับเข้ามาล้อมรอบโดรนสำรวจ แผนการเดิมของ [Root.GetName] คือการทดสอบความถี่สแกนที่หลากหลายกับพายุก่อนที่การติดต่อจะถูกตัดขาด ยานวิทยาศาสตร์ดูเหมือนจะจมลงไปในดาวก๊าซยักษ์และบัดนี้อยู่ในสถานะแน่นิ่ง"
 anomaly.6855.a:0 "เราจำเป็นต้องไปช่วยยาน [Root.GetName]!"
 anomaly.6855.b:0 "ช้าก่อน [From.GetName] ดูน่าสนใจขึ้นมามากกว่าเดิมอีกในตอนนี้"
 anomaly.6855.b.tooltip:0 "ละทิ้ง [Root.GetName] และศึกษาปฏิกิริยาตอบสนองแทน"
 anomaly.6860.name:0 "ความถี่โล่ป้องกันที่ผันผวน"
 anomaly.6860.desc:0 "หลังจากทำงานมาหลายเดือน ในที่สุด [Owner.GetScientistPlural] ของเราก็สามารถสลับค่าระบบโล่ป้องกันของ [FromFrom.GetName] ในลักษณะที่ทำให้พายุของ [FromFromFrom.GetName] ยอมปล่อยยานที่ติดอยู่ได้สำเร็จ การติดต่อสื่อสารกับ [trapped_in_storm.GetName] ได้รับการกู้คืนอย่างรวดเร็ว และน่าเหลือเชื่อที่ไม่มีสมาชิกลูกเรือคนใดบนยาน [FromFrom.GetName] จำเหตุการณ์ช่วงที่ติดอยู่ในพายุได้เลย"
 anomaly.6860.a:0 "กลับไปทำงานกันต่อ"

# Express Mail

 anomaly.6865.name:0 "จดหมายด่วน"
 anomaly.6865.desc:1 "เมื่อยาน [Root.GetName] เข้าใกล้พอที่จะสแกนกระสวยสินค้าได้ ในตอนแรกเราคาดว่าเซ็นเซอร์อาจจะทำงานผิดปกติ ตัวกระสวยสร้างขึ้นจาก [Owner.GetBioAlloy] ชนิดเดียวกับที่เราใช้สำหรับสิ่งก่อสร้างในอวกาศ ความเป็นไปได้ที่สิ่งมีชีวิตต่างดาวบางกลุ่มจะคิดค้นสูตรผสมนี้ขึ้นมาเหมือนกันนั้นแทบจะเป็นไปไม่ได้เลย แต่ทว่าหลังจากปรับเทียบเซ็นเซอร์ใหม่แล้ว ผลลัพธ์ที่ได้ก็ยังคงเหมือนเดิม\n\nเมื่อเปิดกระสวยออก สิ่งเดียวที่พบภายในคือเอกสารชุดหนึ่งที่ระบุรายละเอียดอย่างแม่นยำว่าเราควรส่ง [Owner.GetScientistPlural] แต่ละคนไปที่ใดและควรให้ศึกษาเรื่องอะไร คำแนะนำเหล่านั้นสิ้นสุดลงในวันที่ระบุไว้ซึ่งตรงกับกำหนดการอีก 10 ปีต่อจากนี้พอดี"
 anomaly.6865.a:0 "ส่งเอกสารบันทึกเหล่านั้นกลับไปยัง [Owner.Capital.GetName]"
 anomaly.6865.b:1 "เรื่องนี้ทำให้พวกเราตื่นตระหนก"
 anomaly.6870.name:0 "ปิดวงจร"
 anomaly.6870.desc:1 "หลังจากกระบวนการพัฒนาอันน่ากระวนกระวายใจมานานหลายปี บัดนี้เกิดรอยแยกในมิติอวกาศขึ้นเหนือดาว [Root.Capital.GetName] สิ่งที่ทำให้ตื่นตระหนกคือในวันนี้เป็นวันที่ตรงกับที่ระบุไว้ในเอกสารคำแนะนำปริศนาเมื่อทศวรรษก่อนพอดี มีสิ่งเดียวที่ต้องทำ: ส่งเอกสารที่เราเคยได้รับกลับเข้าไปในรอยแยกและปิดวงจรแห่งกาลเวลานี้เสีย"
 anomaly.6870.a:0 "ปล่อยให้ตัวตนของเราในอดีตเป็นผู้จัดการเรื่องนี้"

# Convenient Mining

 anomaly.6875.name:0 "เหมืองแร่แสนสะดวก"
 anomaly.6875.desc:0 "ดาวเคราะห์น้อยรอบ [From.GetName] มีวงโคจรที่เสถียรอย่างสมบูรณ์แบบจนเป็นเรื่องง่ายที่จะเข้าใจว่าเหตุใด [Owner.GetScientistPlural] ของเราจึงคิดว่ามันถูกนำมาวางไว้ที่นี่โดยฝีมือของใครบางคน อย่างไรก็ตาม ไม่มีร่องรอยที่ชัดเจนของระบบไอพ่นขับเคลื่อนหรือการปรับแต่งเทียมใดๆ เลย ข้อสรุปทางธรรมชาติเพียงอย่างเดียวคือ ด้วยโอกาสที่เป็นไปได้ยากอย่างยิ่ง ดาวเคราะห์น้อยดวงนี้ได้ถูกดึงดูดเข้ามาติดอยู่ในสนามแรงโน้มถ่วงของ [From.GetName] นอกจากนี้เรายังตรวจพบผลึกคริสตัลหายากบนพื้นผิวของดาวเคราะห์น้อยอีกด้วย"
 anomaly.6875.a:0 "ช่างใส่ใจดีเหลือเกิน"
 anomaly.6880.name:0 "การหมุนที่อธิบายไม่ได้"
 anomaly.6880.desc:0 "เพียงแค่วันเดียวหลังจากที่เราสร้างสถานีขุดเจาะบนดาวเคราะห์น้อยดวงนั้นเสร็จสิ้น หินอวกาศก็ได้เกิดการหมุนตัวอย่างกะทันหัน ทำลายสถานีขุดเจาะจนพังยับเยิน ในกระบวนการหมุนตัวครั้งนี้ แหล่งสะสมของผลึกคริสตัลหายากเพิ่มเติมจำนวนมากขึ้นก็ถูกเปิดเผยให้เซ็นเซอร์ของเราตรวจจับได้!"
 anomaly.6880.a:0 "สร้างมันขึ้นมาใหม่อีกครั้ง!"
 anomaly.6880.b:0 "ทำไมมันถึงทำแบบนั้นกันนะ?"
 anomaly.6885.name:0 "ผลึกคริสตัลที่โกรธเกรี้ยว"
 anomaly.6885.desc:0 "เสียงสัญญาณเตือนภัยดังระงมไปทั่ว [Solar_System.GetName] เมื่อสัตว์ร้ายผลึกคริสตัลขนาดมหึมาได้ละทิ้งแหล่งพักพิงบนดาวเคราะห์น้อยที่เราขุดเจาะเพื่อสกัดคริสตัลออกมา ดูเหมือนว่ามันจะกำลัง§Rโกรธเกรี้ยว§!"
 anomaly.6890.name:0 "รังผลึกคริสตัลที่หลับใหล"
 anomaly.6890.desc:0 "ดาวเคราะห์น้อยที่ติดอยู่นั้น แท้จริงแล้วคือรังของสิ่งมีชีวิตผลึกคริสตัล เป็นการดีแล้วที่เราไม่ได้ทำการขุดเจาะต่อไป เพราะดูเหมือนว่าเราจะไปรบกวนสิ่งมีชีวิตที่กำลังจำศีลอยู่ภายใน หากเราปล่อยมันไว้เฉยๆ สักระยะและศึกษาจากระยะไกล มันก็น่าจะสงบลง"
 anomaly.6890.a:0 "เราสามารถเรียนรู้อะไรจากมันได้บ้าง?"

# Toxic Biological Industry

 anomaly.6895.name:0 "อุตสาหกรรมชีวภาพที่เป็นพิษ"
 anomaly.6895.desc.catano:0 "สัญญาณชีวิตที่ตรวจพบภายในชั้นบรรยากาศที่เป็นพิษของ [From.GetName] คือเครื่องจักรกลกึ่งอินทรีย์ขนาดยักษ์! อุตสาหกรรมต่างดาวนี้ดูเหมือนจะเป็นสาเหตุของชั้นบรรยากาศที่เป็นพิษของดาวเคราะห์ดวงนี้ แต่ทว่ามันยังคงทำงานอยู่ ไม่มีสัญญาณชีวิตอื่นหลงเหลืออยู่บนโลกใบนี้เลย และผู้สร้างเครื่องจักรเหล่านี้ต้องละทิ้งพวกมันไว้ให้ทำงานต่อไป เรายังไม่สามารถยืนยันวัตถุประสงค์ของพวกมันได้แน่ชัด แต่โครงสร้างของพวกมันสามารถช่วยเพิ่มความเข้าใจในด้านวิศวกรรมของเราได้อย่างแน่นอน"
 anomaly.6895.desc.catayes:0 "สัญญาณชีวิตที่ตรวจพบภายในชั้นบรรยากาศที่เป็นพิษของ [From.GetName] คือเครื่องจักรกลกึ่งอินทรีย์ขนาดยักษ์! เช่นเดียวกับเรา ดูเหมือนว่าผู้สร้างสถานที่แห่งนี้ชื่นชมการผสานรวมกันระหว่างองค์ประกอบทางชีวภาพและจักรกล อุตสาหกรรมต่างดาวนี้ดูเหมือนจะเป็นสาเหตุของชั้นบรรยากาศที่เป็นพิษของดาวเคราะห์ดวงนี้ แต่ทว่ามันยังคงทำงานอยู่ ไม่มีสัญญาณชีวิตอื่นหลงเหลืออยู่บนโลกใบนี้เลย และผู้สร้างเครื่องจักรเหล่านี้ต้องละทิ้งพวกมันไว้ให้ทำงานต่อไป เรายังไม่สามารถยืนยันวัตถุประสงค์ของพวกมันได้แน่ชัด แต่โครงสร้างของพวกมันสามารถช่วยเพิ่มความเข้าใจในด้านวิศวกรรมของเราได้อย่างแน่นอน"
 anomaly.6895.b:0 "เก็บเกี่ยวชิ้นส่วนชิ้นที่เราสามารถทำได้"
 anomaly.6895.c:0 "เก็บเกี่ยวทุกสิ่งทุกอย่าง"
 anomaly.6895.d:0 "ปล่อยให้เจ้าพวกคนเขลาที่หลับใหลอยู่อย่างสงบดีกว่า"

# Cool Thoughts

 anomaly.6900.name:0 "ความคิดที่สุขุม"
 anomaly.6900.desc:0 "เราไม่ได้ตรวจพบสิ่งมีชีวิตอยู่ใต้พื้นผิวเท่านั้น แต่เราพบพวกมันทั่วทั้งดวงดาวเลย! ดาวเคราะห์เยือกแข็งดวงนี้มีท่อขนาดจิ๋วเชื่อมโยงกันเหมือนระบบคอมพิวเตอร์พื้นฐาน แม้ว่าโครงสร้างจะดั้งเดิม แต่ขนาดมหึมาของมันทำให้มันสามารถแข่งขันกับซูเปอร์คอมพิวเตอร์บางเครื่องของดาว [Owner.Capital.GetName] ในแง่ประสิทธิภาพได้เลย แม้กระทั่งตอนนี้ คอมพิวเตอร์ดูเหมือนจะยังคงทำงานอยู่—[Owner.GetScientistPlural] ของเราสามารถเชื่อมต่อกับมันได้ แต่เนื่องจากมันทำงานช้ามาก เราจึงสามารถถามคำถามกับมันได้เพียงข้อเดียวเท่านั้น"
 anomaly.6900.a:0 "คุณช่วยคำนวณโจทย์เหล่านี้ให้หน่อยได้ไหม?"
 anomaly.6900.a.tooltip:0 "ใช้ดาวเคราะห์ดวงนี้ช่วยในการคำนวณปัญหาฟิสิกส์ดาราศาสตร์ในปัจจุบันของเรา"
 anomaly.6900.b:0 "ใครเป็นคนสร้างคุณขึ้นมา?"
 anomaly.6900.c:0 "ใครกันที่มาก่อนพวกเรา?"
 anomaly.6900.d:0 "พวกเราคือตัวอะไรกันแน่?"
 anomaly.6900.evopred: "อะไรที่อร่อยที่สุด?"
 anomaly.6900.e:0 "การเฝ้าสังเกตการณ์มันจากระยะไกลคงดีที่สุด"

# Don't Count Your Planets

 anomaly.6905.name:0 "อย่าเพิ่งรีบนับจำนวนดาวเคราะห์"
 anomaly.6905.desc:0 "[Owner.GetScientistPlural] ของเราได้ค้นพบสิ่งที่เป็นภัยคุกคามขนาดยักษ์ เทือกเขาที่พวกเขาสแกนก่อนหน้านี้ แท้จริงแล้วคือเปลือกนอกของไข่ขนาดมหึมา ไม่แน่ชัดว่าอสูรกายชนิดใดจะสามารถวางไข่ขนาดนี้ได้ และความสยดสยองแบบใดจะฟักออกมาจากมัน"
 anomaly.6905.a:0 "ศึกษาเฝ้าสังเกตการณ์มันจากระยะไกล"
 anomaly.6905.b:0 "กะเทาะเปลือกมันออกมา!"
 anomaly.6905.c:0 "ลิ้มลองอาหารจานยักษ"
 anomaly.6910.name:0 "ไข่เจียวกาแล็กซี"
 anomaly.6910.desc.start:0 "ภายในของ [FromFromFrom.GetName] ไม่ใช่สิ่งที่เราคาดคิดไว้ แทนที่จะพบกับสิ่งมีชีวิตขนาดยักษ์วัยเยาว์ เรากลับพบเพียงเศษอินทรียสารพันธุกรรมที่เหลวปนเปกันไปหมด ดาวเคราะห์ทั้งดวงเต็มไปด้วยสารพันธุกรรมและทรัพยากร วัสดุทั้งหมดนี้จะกลายเป็นสิ่งใดนั้นไม่แน่ชัด แต่กาแล็กซีของเราคงจะปลอดภัยกว่าหากไม่ได้รับรู้"
 anomaly.6910.desc.hatchling:0 "แม้จะคล้ายคลึงกับสัตว์อสูรแห่งความว่างเปล่า(ไม่มีเสียงร้อง)ที่อารยธรรมของเราเคยเผชิญมาก่อน แต่ทว่าไข่ใบนี้สามารถสร้างสิ่งที่ยิ่งใหญ่กว่านั้นมาก"
 anomaly.6910.b.evopred: "ลิ้มรสไข่แดงแสนอร่อย!"
 anomaly.6915.name:0 "ความซาบซึ้งใจ"
 anomaly.6915.desc.regular:0 "§R§!"มันมีชีวิต! มันกลับมามีชีวิตอีกครั้ง! พวกเราเป็นเพียงเศษผงที่ไร้ค่าเมื่อเปรียบเทียบกับสิ่งมีชีวิตเช่นนี้ การทะเลาะเบาะแว้งอันชั่วคราวระหว่างจักรวรรดิจะมีความหมายอะไรเมื่อเผชิญหน้ากับความยิ่งใหญ่—"§!\n\nการสื่อสารครั้งสุดท้ายของยาน [Root.GetName] ขาดหายไปตรงนั้น และเมื่อเราใช้โพรบสำรวจเพื่อสแกนซากที่เหลือของ [FromFromFrom.GetName] เรากลับพบเพียงเปลือกที่ว่างเปล่า ดูเหมือนว่าสิ่งมีชีวิตดังกล่าวจะไม่มีความซาบซึ้งใจที่จะแสดงต่อผู้ปลดปล่อยมันเลย"
 anomaly.6915.desc.gestalt:0 "เหล่า [Owner.GetScientistPlural] ของเราที่ส่งไปยังระบบ [Solar_System.GetName] ต่างตื่นตระหนกไม่นานก่อนที่จะสูญเสียการติดต่อกับระบบสมองส่วนกลาง [Owner.GetBrainName] โดยแจ้งข้อมูลเพียงว่า §R§!"มันหลุดออกมาแล้ว"§! สัญญาณสุดท้ายจากยาน [Root.GetName] ถูกตัดขาดเมื่อไข่เริ่มแตกออก และเมื่อเราใช้โพรบสำรวจสแกนซากที่หลงเหลือของ [FromFromFrom.GetName] เราก็พบเพียงเปลือกที่ว่างเปล่า ดูเหมือนว่าสิ่งมีชีวิตดังกล่าวจะไม่มีความซาบซึ้งใจต่อผู้ปลดปล่อยมันเลย"
 anomaly.6915.b.evopred: "รวบรวมสิ่งใดก็ตามที่เหลืออยู่"

# Heat from Below

 anomaly.3140.name:0 "ความร้อนจากเบื้องล่าง"
 anomaly.3140.desc:0 "หลังจากทำการสำรวจใต้พื้นผิว เราได้ข้อสรุปว่าสัญญาณความร้อนที่ผิดปกติบน [From.GetName] เกิดจากน้ำพุร้อนใต้ทะเล ดูเหมือนว่าดาวเคราะห์ดวงนี้จะมีอะไรมากกว่าที่ตาเห็น..."
 anomaly.3140.a:0 "น่าประทับใจยิ่งนัก แต่เราไม่จำเป็นต้องเสียทรัพยากรเพิ่มเติมกับเรื่องนี้อีกต่อไป"
 anomaly.3141.name:0 "ความลึกของชีวิตต่างดาว"
 anomaly.3141.desc:0 "การสำรวจอย่างต่อเนื่องโดยลูกเรือของ [From.GetName] เผยให้เห็นว่าน้ำร้อนที่มาจากส่วนลึกใต้เปลือกโลกนั้นเต็มไปด้วยสิ่งมีชีวิตขนาดเล็กจิ๋ว! สิ่งที่เราเคยคิดว่าเป็นดาวเคราะห์ว่างเปล่าที่หนาวเหน็บ แท้จริงแล้วกลับมีชีวมณฑลใต้ท้องทะเลที่เจริญรุ่งเรืองอย่างยิ่ง!"

 colony.5000.name:0 "เพื่อนที่คาดไม่ถึง"
 colony.5000.desc:0 "สิ่งมีชีวิตลึกลับบน [Root.GetName] ให้การต้อนรับชาวอาณานิคมของเราเป็นอย่างดีหลังจากที่พวกเขาตั้งถิ่นฐานบนดาวเคราะห์ ในตอนแรกชาวอาณานิคมจำนวนมากไม่ไว้วางใจหุ่นยนต์ตัวน้อยนี้ แต่มันได้แสดงให้เห็นว่ามีประโยชน์อย่างยิ่งและมีบทบาทสำคัญในการจัดตั้งอาณานิคม\n\nหลังจากช่วงปีแรกๆ ของการตั้งนิคม หุ่นยนต์ตัวน้อยนี้ได้กลายเป็นสัตว์เลี้ยงจำลองในเมืองยุคแรกๆ บน [Root.GetName] และเป็นตัวนำโชคของดาวเคราะห์ดวงนี้ทั้งหมด"
 colony.5000.a:0 "ช่างดีเหลือเกินที่สิ่งมีชีวิตตัวน้อยนี้เข้ามาช่วยเหลือเรา"

 colony.5005.name:0 "โรงงานโบราณ"
 colony.5005.desc:0 "โรงงานที่ดูแลโดยหุ่นยนต์ตัวน้อยบน [Root.GetName] มีบทบาทสำคัญอย่างยิ่งต่ออาณานิคมในช่วงปีแรกๆ เมื่อบัดนี้ชาวอาณานิคมมีเวลาทำความรู้จักกับตัวนำโชคของพวกเขาและทำความเข้าใจพฤติกรรมที่ไม่ธรรมดาของมัน พวกเขาก็เรียนรู้ว่าอาคารโบราณที่มันดูแลมานานหลายศตวรรษกำลังทรุดโทรมและต้องการความช่วยเหลือมากกว่าที่สิ่งมีชีวิตนี้จะทำได้ด้วยตนเอง\n\nแม้ว่าวิศวกรรมและเครื่องจักรโบราณของมันจะยังไม่เป็นที่คุ้นเคยสำหรับเรา แต่วิศวกรของเราเชื่อว่าพวกเขาน่าจะสามารถซ่อมแซมมันได้หากมีเวลาเพียงพอ"
 colony.5005.a:0 "งั้นเราลองมาดูซิว่าเราจะสามารถช่วยมันได้หรือไม่"

 colony.5006.name:0 "โรงงานพังทลาย"
 colony.5006.desc:0 "หลังจากเสื่อมโทรมลงอย่างช้าๆ มาหลายปี ในที่สุดโรงงานขนาดใหญ่บน [Root.GetName] ก็ได้พังทลายลง หลังจากเคลียร์เศษซากปรักหักพังของอาคารหลังเก่าออกไป ชาวอาณานิคมของเราก็พบกับกองโลหะขนาดใหญ่ที่ซ่อนอยู่ภายในห้องใต้ดินของอาคารในอดีต ท่ามกลางซากปรักหักพังเหล่านั้นมีร่างของหุ่นยนต์ที่เคยต้อนรับผู้ตั้งถิ่นฐานของเราอย่างเป็นสุข ถูกทับโดยโรงงานที่มันเป็นผู้รับผิดชอบดูแล"
 colony.5006.a:0 "บัดนี้ไม่มีตัวนำโชคอีกต่อไปแล้วสินะ"

 colony.5010.name:0 "โรงงานได้รับการบูรณะเสร็จสิ้น"
 colony.5010.desc:0 "วิศวกรของเรามั่นใจว่าพวกเขาคงจะล้มเหลวในการซ่อมแซมโรงงานโบราณบน [Root.GetName] ตามรายงานของพวกเขา เมื่อจู่ๆ ทุกอย่างก็หยุดนิ่งลง พวกเขาเริ่มเก็บเครื่องมือและเดินออกจากอาคารด้วยความไม่แน่ใจว่าล้มเหลวได้อย่างไร ทันใดนั้น เครื่องยนต์ก็ส่งเสียงคำรามและเริ่มทำงานขึ้นมาอีกครั้ง\n\nไม่เพียงแต่เครื่องยนต์จะกลับมาทำงานได้อีกครั้ง แต่วิศวกรของเราดูเหมือนจะสามารถซ่อมแซมส่วนอื่นๆ ของโรงงานได้สำเร็จโดยบังเอิญ—แม้ว่าจะยังไม่ชัดเจนว่าเกิดขึ้นได้อย่างไร รายงานของพวกเขาสิ้นสุดลงด้วยคำอธิบายสั้นๆ เกี่ยวกับการเต้นอันแปลกประหลาดที่หุ่นยนต์ตัวน้อยทำขึ้นเมื่อมันเห็นโรงงานกลับมาทำงานได้อีกครั้ง"
 colony.5010.a:0 "เรื่องใดที่จบลงด้วยดีก็ย่อมเป็นเรื่องที่ดี"
 colony.5010.tt:0 "คุณลักษณะพิเศษของดาวเคราะห์ §Y$d_hab_lonely_bot_deposit$§! บัดนี้จะผลิตอาหาร £volatile_motes£ §Yโมต§! จำนวน §G1§! หน่วย และ £exotic_gases£ §Yก๊าซอาชีวเคมี§! จำนวน §G1§! หน่วย เพิ่มเติมด้วย"

 colony.5015.name:0 "หุ่นยนต์ที่สูญหาย"
 colony.5015.desc:0 "เราได้รับรายงานจากประชาชนบน [Root.GetName] ดูเหมือนว่าพวกเขากำลังเผชิญปัญหากับหุ่นยนต์ลึกลับบนดาวเคราะห์อีกครั้ง ล่าสุดหุ่นยนต์ดังกล่าวได้หายตัวไป และการหายตัวไปนี้ตรงกับรายงานการสูญหายของชาวอาณานิคมหลายคนจากเมืองแห่งหนึ่งบนดาวเคราะห์พอดี\n\nแม้ว่าในตอนแรกจะคิดว่าเรื่องเหล่านี้ไม่เกี่ยวข้องกัน แต่ประชาชนเริ่มกล่าวหาว่าสิ่งมีชีวิตดังกล่าวเป็นตัวการที่ทำให้เพื่อนและครอบครัวของพวกเขาหายตัวไป วิศวกรของเรากำลังสืบค้นโดยสแกนสัญญาณต่างๆ ที่โรงงานของหุ่นยนต์ได้รับตั้งแต่เกิดเหตุการณ์ เพื่อดูว่าจะสามารถนำทางกลับไปยังตัวหุ่นยนต์ได้หรือไม่"
 colony.5015.a:0 "หวังว่าเราจะสามารถคลี่คลายเรื่องนี้ได้โดยเร็วที่สุด"

 colony.5020.name:0 "ซากเศษที่เหลือ"
 colony.5020.desc:0 "หลังจากใช้เวลาหลายสัปดาห์ในการติดตามสัญญาณจากหุ่นยนต์บน [Root.GetName] ในที่สุดวิศวกรของเราก็พบปล่องโบราณที่นำทางลึกลงไปใต้ดิน ลึกลงไปข้างใต้พวกเขาพบสิ่งปลูกสร้างโบราณที่มีผู้สูญหายส่วนใหญ่ถูกขังอยู่ในสถานะแช่แข็ง(เสียงแก้ว)รวมถึงซากชิ้นส่วนของหุ่นยนต์ตัวน้อยด้วย\n\nหลังจากปลุกชาวอาณานิคมให้ตื่นขึ้น เราได้เรียนรู้ว่าพวกเขาทั้งหมดเป็นส่วนหนึ่งของลัทธิบางอย่างที่บังเอิญเดินทางเข้าไปในโบราณสถานแห่งนี้ และสิ่งปลูกสร้างกำลังจะถล่มลงมาทับพวกเขาในตอนที่หุ่นยนต์ตัวน้อยเข้าช่วยเหลือ ชัดเจนว่าทั้งวิศวกรและผู้คนเองยังไม่เข้าใจแน่ชัดว่าพวกเขาเข้าไปอยู่ในตู้แช่แข็งได้อย่างไร หรือหุ่นยนต์ตัวนั้นทำอย่างไรเพื่อหยุดการพังทลายของอาคาร\n\nวิศวกรของเราสนใจที่จะสำรวจเครื่องจักรปริศนานี้ในขณะที่มันไม่สามารถใช้งานได้อีกต่อไป เพื่อดูว่าเราจะสามารถเรียนรู้อะไรจากมันได้บ้าง ในขณะที่ประชาชนบน [Root.GetName] กำลังขอร้องให้เราซ่อมแซมหุ่นยนต์ตัวน้อยนี้ให้กลับคืนสู่สภาพเดิม"
 colony.5020.a:0 "งั้นก็คืนตัวนำโชคตัวน้อยให้แก่ประชาชนเถิด"
 colony.5020.tt:0 "คุณลักษณะพิเศษของดาวเคราะห์ §Y$d_hab_lonely_bot_deposit$§! บัดนี้จะมีตำแหน่งงาน £job_robot_caretaker£ §Yโปรแกรมคาร์เตอร์หุ่นยนต์§!งาน"
 colony.5020.b:0 "ให้วิศวกรชำแหละแยกชิ้นส่วนของมันออกเพื่อดูว่ามีความลับใดซ่อนอยู่"

 ancrel.11000.name:0 "ชั้นแรก"
 ancrel.11000.desc:0 "ซากปรักหักพังนี้ดูเหมือนจะมีอายุหลายศตวรรษหรืออาจถึงหลายพันปี ในตอนแรกดูเหมือนจะเป็นเพียงโดมเปิดโล่งขนาดใหญ่ แต่ในขณะที่เราทำการขุดค้นส่วนนอกสุด เราก็พบว่าตนเองอยู่ในพื้นที่ที่ดูเหมือนจะเป็นสลัมเสื่อมโทรมของเมือง เนื่องจากมีประตูขนาดใหญ่ขวางทางไม่ให้เราเข้าไปลึกกว่าเดิม นักวิทยาศาสตร์ของเราคาดการณ์ว่าเมืองนี้ถูกแบ่งโครงสร้างชั้นทางสังคม โดยแต่ละชั้นจะมีกลุ่มชนชั้นที่แตกต่างกันออกไป\n\nใช้เวลาไม่นานนักวิทยาศาสตร์คนหนึ่งของเราก็พบซากศพต่างดาวในซากปรักหักพังใต้ดินใต้พื้นคอนกรีตที่พังทลาย หลังจากพบศพแรกแล้ว เราก็เริ่มพบซากศพจำนวนมากกระจายอยู่ทั่วสลัม ไม่ว่าจะเป็นตามท้องถนน ในบ้านเรือนในอดีต หรือห้อยย้อยลงมาจากส่วนที่ห่างไกลที่สุดของเพดาน ไม่แน่ชัดว่าอะไรพรากชีวิตพวกเขาไป แต่มันเป็นภาพที่สยดสยองอย่างยิ่ง"
 ancrel.11000.a:0 "ชั้นอื่นจะมีอะไรรอคอยเราอยู่กันนะ?"

 ancrel.11005.name:0 "ชั้นที่สอง"
 ancrel.11005.desc:0 "ในขณะที่ชั้นแรกดูเหมือนจะประกอบด้วยที่อยู่อาศัยอันซอมซ่อของผู้ที่ถูกทอดทิ้งและยากไร้ ชั้นที่สองนี้มีความสอดคล้องกับแนวคิดการวางผังเมืองที่เหมาะสมของชาว [Root.GetAdj] มากกว่า\n\nเราพบจัตุรัสเปิดโล่งหลายแห่งที่นักวิทยาศาสตร์ของเราคาดว่าเป็นตลาดในอดีต แม้ว่าทุกสิ่งจากยุคนั้นจะย่อยสลายไปนานจนเป็นไปไม่ได้ที่จะระบุว่าเคยเป็นสิ่งใดมาก่อน\n\nใช้เวลาไม่นานเราก็เริ่มพบซากศพที่ผิดปกติในส่วนนี้ของโดมเช่นกัน ดูเหมือนว่าพวกเขาจะเสียชีวิตในลักษณะเดียวกันกับเพื่อนบ้านที่ยากจนในชั้นล่าง และเราพบศพผู้เสียชีวิตกระจัดกระจายอยู่ทั่วบริเวณ"
 ancrel.11005.a:0 "เป็นอีกภาพฉากหนึ่งที่โหดร้ายทารุณ"

 ancrel.11010.name:0 "ชั้นที่สาม"
 ancrel.11010.desc:0 "เมื่อประตูสู่ชั้นที่สามเปิดออกในที่สุด เหล่านักวิทยาศาสตร์—ด้วยความอยากรู้ว่าจะได้พบสิ่งใดต่อไป—ก็พากันหลั่งไหลเข้าไปในส่วนที่ได้รับการระบุในไม่ช้าว่าเป็นย่านที่ร่ำรวยกว่าของโดมเก่า บัดนี้เราสามารถคาดการณ์ได้อย่างมั่นใจเกี่ยวกับสิ่งที่จะได้เผชิญจากเมืองนี้\n\nไม่นานหลังจากที่เราเข้าไปในชั้นนี้ คนของเราคนหนึ่งจู่ๆ ก็หันกลับมาและโจมตีเพื่อนร่วมงานอย่างดุร้าย เหยื่อเสียชีวิตทันทีบนพื้นก่อนที่ผู้บุกรุกที่ไม่คาดคิดจะถูกระงับเหตุ ในเหตุการณ์หลังจากนั้นเราไม่สามารถได้ข้อมูลที่เป็นประโยชน์ใดๆ จากนักวิทยาศาสตร์ที่สติแตกคนนั้นเลย และไม่สามารถเข้าใจเพิ่มขึ้นว่าเกิดอะไรขึ้นกับเขา\n\nชั้นนี้มีขนาดเล็กกว่าสองชั้นแรกอย่างเห็นได้ชัด และมีความเป็นไปได้สูงว่าจะเป็นชั้นสุดท้ายก่อนที่เราจะเข้าสู่ใจกลางของโดม ตอนนี้เหลือประตูอีกบานเดียวเท่านั้น"
 ancrel.11010.a:0 "นักวิทยาศาสตร์ของเราพร้อมที่จะเข้าไปสืบหาข้อมูลในชั้นสุดท้ายแล้ว"

 ancrel.11015.name:0 "ชั้นสุดท้าย"
 ancrel.11015.desc:0 "ทันทีที่ประตูด้านในสุดเปิดออก คลื่นพลังงานไซโอนิก (psionic) อันเข้มข้นก็ถาโถมใส่นักวิทยาศาสตร์ของเรา ส่วนใหญ่หมดสติลงด้วยความเจ็บปวดอย่างรุนแรง เหลือเพียงไม่กี่คนเท่านั้นที่สามารถเดินทางเข้าสู่ภายในชั้นนี้ได้จริง\n\nดูเหมือนว่ามันจะเป็นมหาวิหารขนาดใหญ่ที่มีแท่นหรือแท่นบูชาขนาดใหญ่อยู่ตรงกลาง บนผนังทั้งหมดมีแผนภูมิขนาดใหญ่ของระบบดาวต่างๆ และมีแผนภูมิที่ซ้ำกันซึ่งดูเหมือนจะเน้นไปที่ระบบ [Root.System.GetName] เอง\n\nเมื่อเดินเข้าไปใกล้ตรงกลาง นักวิทยาศาสตร์ไม่กี่คนที่เหลืออยู่พบว่าแท้จริงแล้วมันคือเครื่องจักรอันโอ่อ่าที่สร้างขึ้นในรูปทรงของแท่นบูชาโบราณ"
 ancrel.11015.a:0 "ให้เราลองปรับแต่งเครื่องจักรเครื่องนี้ดูเพื่อดูว่าเราจะพบสิ่งใดบ้าง"

 ancrel.11020.name:0 "ผู้อาวุโส"
 ancrel.11020.desc:1 "เมื่อพวกเขาเริ่มทำการปรับแต่งเครื่องจักร จู่ๆ พวกเขาก็ต้องเผชิญกับอาการประสาทหลอนทางเสียงร่วมกัน—เป็นเสียงกรีดร้องสั่งให้บางสิ่งถูกขุดค้นขึ้นมาและปลดพันธนาการ ภาพนิมิตของสิ่งมีชีวิตที่กำลังฉีกกระชากระบบดาว [From.System.GetName] เล่นซ้ำๆ ในหัวของพวกเขาเมื่อความต้องการของสิ่งมีชีวิตนั้นทวีความแหลมคมมากขึ้น นักวิทยาศาสตร์หลายคนหมดสติลงโดยไม่อาจต้านทานความเจ็บปวดอันรุนแรงอย่างไม่หยุดยั้งที่ครอบงำร่างกายของพวกเขาได้"
 ancrel.11020.a:0 "รื้อทำลายเครื่องจักรนี้เสียก่อนที่มันจะก่อภัยอันตรายมากกว่านี้!"
 ancrel.11020.b:0 "ปล่อยมันออกมา!"
 ancrel.11020.tt:1 "§Y$NAME_Eldritch_Horror$§! จะถูกปลดปล่อยออกมาในระบบดาว §Y[eldritch_location.GetName]§!"


 ancrel.11025.desc:0 "ในที่สุด...\n\nจงกราบกรานมนุษย์ผู้โง่เขลา คลานเข่าเข้ามาเบื้องหน้าเรา แล้วเราจะมอบการปกป้องและปัญญาญาณให้แก่พวกเจ้า\n\nแต่หากคิดจะขัดขวางข้า ข้าจะเป็นจุดจบของพวกเจ้าเอง!"
 ancrel.11025.a:0 "โอ้ ท่านผู้ยิ่งใหญ่! โปรดโอบอุ้มฝูงสัตว์ที่พลัดหลงของท่านด้วยเถิด!"
 ancrel.11025.a.tt:0 "§Y[Root.GetName]§! จะสร้างฐานทัพดารา(เสียงดาว)ขึ้นมาใหม่ในระบบดาว §Y[eldritch_location.GetName]§!"
 ancrel.11025.b:0 "มันเป็นความผิดพลาดที่ปล่อยคุณออกมา"
 ancrel.11025.b.tt:0 "§Y[Root.GetName]§! จะกลายสถานะเป็นศัตรูกับ §Y$NAME_Eldritch_Horror$§!"

 ancrel.11027.desc:0 "งั้นพวกเจ้าได้เลือกวิถีแห่งปัญญาแล้วสินะ\nทุกสิ่งทุกอย่างเป็นไปตามที่ควรจะเป็น"
 ancrel.11027.a:0 "มันจะเป็นไปตามประสงค์ของท่าน ท่านผู้ยิ่งใหญ่"

 ancrel.11030.desc:0 "งั้นพวกเจ้าได้เลือกความตายสินะ"
 ancrel.11030.a:0 "ตัดสัญญาณการสื่อสาร"

 ancrel.11035.name:0 "กองยานที่สูญหายใน [eldritch_location.GetName]"
 ancrel.11035.desc:0 "เราสูญเสียการติดต่อกับกองยานทั้งหมดในขณะที่พวกเขากำลังเดินทางผ่านระบบดาว [eldritch_location.GetName] หลังจากนั้นไม่นาน เราก็ได้รับข่าวเกี่ยวกับการยุบตัวของดาวฤกษ์และการทำลายล้างทุกสิ่งรอบตัวมัน"
 ancrel.11035.a:0 "ช่างเป็นเรื่องน่าเศร้าสลด"

 central.5.name:0 "สัญญาณจากใจกลางกาแล็กซี"
 central.5.desc:0 "สัญญาณอันทรงพลังสะท้อนผ่านกาแล็กซีมาจากบริเวณใจกลาง ซึ่งเป็นสถานที่ที่มักถูกมองว่าว่างเปล่าปราศจากชีวิต หลังจากนั้นไม่นานเราก็ได้รับการติดต่อสื่อสารจากตำแหน่งเดียวกันนั้นพอดี"
 central.5.a:0 "เชื่อมต่อสัญญาณเข้ามา"

 central.10.desc:0 "ขอทักทายพวกเจ้าที่ยังอ่อนเยาว์และเพิ่งเข้ามาสู่กาแล็กซีนี้\n\nพวกเราผู้มาจากดินแดนสวรรค์ใจกลางได้ออกจากแหล่งพักพิงอันศักดิ์สิทธิ์อีกครั้งเพื่อดูว่าพวกเจ้าผู้อาศัยอยู่ในขอบนอกจะมีสิ่งใดมาเสนอให้ หวังว่าเจ้าจะไม่พยายามนำพาความตื่นตระหนกมาสู่จักรวรรดิเหมือนกลุ่มคนที่มาก่อนหน้าพวกเจ้า"
 central.10.a:0 "สวัสดีพวกคุ—"

 central.15.desc:0 "..........."
 central.15.a:0 "พวกเขาตัดการเชื่อมต่อสัญญาณไปแล้วงั้นหรือ?"

 central.20.name:0 "$NAME_Central_Crystal_Country$"
 central.20.1.desc:0 "มีเรื่องอื่นใดที่คุณต้องการสนทนากับเราเพิ่มเติมหรือไม่?"
 central.20.2.desc:0 "บัดนี้คุณกำลังยืนอยู่เบื้องหน้าผู้บัญชาการกองทัพเรือขอบนอกของจักรวรรดิคริสตัลลีน ผู้พิทักษ์ดินแดนชั้นใน มีเรื่องใดที่คุณประสงค์จะหารือร่วมกับเรา?"
 central.20.a:0 "คุณช่วยเล่ารายละเอียดเพิ่มเติมเกี่ยวกับบ้านเกิดเมืองนอนของคุณให้เราฟังได้ไหม?"
 central.20.a.response:0 "บ้านเกิดของเราเปรียบเสมือนความฝัน และหากเราเล่ารายละเอียดมากไปกว่านี้ เรื่องราวนั้นก็คงจะจบลงเพียงเท่านี้ เผ่าพันธุ์ที่อ่อนเยาว์กว่าเช่นพวกคุณยังคงต้องเรียนรู้อีกมากก่อนที่จะได้รับอนุญาตให้เข้าสู่สถานที่ศักดิ์สิทธิ์\n\nวันหนึ่ง หากคุณพิสูจน์แล้วว่าคู่ควร เราจะสามารถแสดงความจริงของสรรพสิ่งให้คุณได้ประจักษ์"
 central.20.b:0 "ทำไมคุณถึงเดินทางมาถึงที่นี่ในตอนนี้?"
 central.20.b.response:0 "พวกเราเฝ้าจับตาดูเผ่าพันธุ์อื่นๆ ในกาแล็กซีมาเป็นเวลานาน และเรามองเห็นศักยภาพในประเทศเพื่อนบ้านปัจจุบันของเรา เมื่อผู้ส่งสารเดินทางมาถึงพร้อมข่าวว่าหนึ่งในเผ่าพันธุ์รุ่นเยาว์คือผู้ที่เราเฝ้ารอคอย เราก็เตรียมพร้อมในการสะกดรอยตามตัวในทันที\n\nพวกเรายังไม่มั่นใจแน่ชัดว่าเผ่าพันธุ์รุ่นเยาว์เผ่าพันธุ์ใดคือผู้ที่เรากำลังตามหา แต่เราเชื่อว่าพวกคุณทั้งหมดจะสามารถสร้างประโยชน์ให้กับเราได้ หวังว่าคุณจะสามารถตอบสนองความคาดหวังที่เรามีต่อคุณ และเราจะสามารถหาข้อตกลงที่ทั้งสองฝ่ายพึงพอใจร่วมกันได้"
 central.20.c:0 "มีสิ่งใดที่คุณกำลังตามหา หรือต้องการความช่วยเหลือจากเราหรือไม่?"
 central.20.c.response:0 "ไม่ เวลาสำหรับเรื่องนั้นยังมาไม่ถึงในตอนนี้ โปรดกลับมาใหม่ในภายหลัง และหวังว่าเราจะสามารถแบ่งปันข่าวสารเพิ่มเติมให้แก่คุณได้"
 central.20.d:0 "นั่นคือทั้งหมดแล้ว"

 central.21.desc:0 "จงออกไปเสีย เจ้าพวกผู้ก่อการร้าย เราไม่มีสิ่งใดจะสนทนากับคุณอีกต่อไป"
 central.21.a:0 "..."

 central.50.desc:0 "กลุ่มผู้ไม่สงบหลายกลุ่มในสังคมของเรากำลังสนับสนุนให้มีการผ่อนปรนข้อจำกัดในการเข้าสู่บ้านเกิดเมืองนอนของเรา ซึ่งก่อความวุ่นวายอย่างมากในเมืองหลวง ท่านผู้ยิ่งใหญ่จึงกำลังมองหาการย้ายกลุ่มคนเหล่านี้ไปยังดินแดนต่างชาติ เพื่อไม่ให้พวกเขากลายมาเป็นภัยคุกคามต่อพรมแดนหรือความสามัคคีของประชาชนของเราอีกต่อไป\n\nหากคุณเสนอที่ลี้ภัยสำหรับผู้พลัดถิ่นเหล่านั้น มันจะเป็นประโยชน์อย่างยิ่งสำหรับเรา"
 central.50.a:0 "เราจะพยายามจัดหาสถานที่พักพิงให้แก่พวกเขา"
 central.50.a.tt:0 "ในอีก §Y10 ปี§! ข้างหน้า เราจะสามารถเปิดใช้งานการตัดสินใจ §Y$decision_crystalline_refugees$§! บนแหล่งที่อยู่อาศัย §Yตาราง§! ได้"
 central.50.b:0 "ไม่มีพื้นที่ว่างในดินแดนของเราอีกแล้ว"

 central.quest.transmission.end:0 "มีเรื่องอื่นใดที่คุณประสงค์จะหารือร่วมกันอีกหรือไม่?"
 crystalline_hostility_trigger_tt:0 "£trigger_no£ §Y$NAME_Central_Crystal_Country$§! มีสถานะเป็นศัตรูกับเรา"

 central.51.desc:0 "ยินดีที่ได้ยินเช่นนั้น เราหวังว่าพวกเขาจะเจริญรุ่งเรืองในดินแดนของคุณ และเป็นความเจริญรุ่งเรืองให้กับจักรวรรดิของคุณด้วยเช่นกัน\n\n$central.quest.transmission.end$"
 central.51.a:0 "ใช่ มีเรื่องอื่นที่เราคิดไว้อยู่"
 central.51.b:0 "ไม่ นั่นคือทั้งหมดแล้ว"

 central.52.desc:0 "เราเสียใจที่ได้ยินเช่นนั้น ถ้าอย่างนั้นเราจะมองหาพื้นที่อื่นให้แก่คนของเราต่อไป\n\n$central.quest.transmission.end$"

 central.60.desc:0 "เมื่อไม่นานมานี้เราเพิ่งประสบกับภัยพิบัติขนาดย่อมขึ้นในเมืองที่ใหญ่ที่สุดแห่งหนึ่งของเรา ก่อให้เกิดความเสียหายย่อยยับตามมา เพื่อบูรณะมันให้กลับมารุ่งเรืองดังเดิม เรากำลังมองหาผู้ที่เต็มใจจะส่งวัตถุดิบชิ้นส่วนต่างๆ มาให้เราเพื่อที่เราจะเริ่มกระบวนการบูรณะใหม่\n\nแน่นอนว่าเราจะจ่ายผลตอบแทนให้อย่างงามแก่ใครก็ตามที่เต็มใจช่วยเหลือเรา นอกเหนือจากนั้น เราสามารถส่งทีมวิศวกรไปแบ่งปันข้อมูลความลับบางอย่างของเรากับคนของคุณได้"
 central.60.a:1 "เราจะจัดสรรวัตถุดิบส่วนหนึ่งไว้ให้กับคนของคุณ"
 central.60.a.tt:0 "ในอีก §Y10 ปี§! ข้างหน้า เราจะสามารถเปิดใช้งานการตัดสินใจ §Y$decision_crystalline_architecture$§! บนแหล่งที่อยู่อาศัย §Yตาราง§! ได้"
 central.60.b:0 "เราไม่มีวัตถุดิบเหลือพอจะแบ่งปันได้"

 central.61.desc:0 "เรายินดีเป็นอย่างยิ่งที่ได้ยินว่าคุณเต็มใจช่วยเหลือเรา ของขวัญของคุณจะช่วยชีวิตชาว $NAME_Central_Crystal_Species$ ที่พลัดหลงหลายล้านชีวิต\n\n$central.quest.transmission.end$"

 central.62.desc:0 "เราเสียใจที่ได้ยินว่าคุณไม่ต้องการจะช่วยเหลือเรา ถ้าเช่นนั้นเราจะมองหาความช่วยเหลือจากที่อื่นต่อไป\n\n$central.quest.transmission.end$"

 central.70.desc:0 "นักวิทยาศาสตร์ชั้นนำคนหนึ่งของเราได้แสดงความสนใจเป็นพิเศษในจักรวรรดิของคุณ แม้ว่าจะบอกได้ยากว่าคุณมีสิ่งใดที่จะเสนอให้เราที่จักรวรรดิของเราไม่มีก็ตาม อย่างไรก็ตาม พวกเขาประสงค์ที่จะย้ายไปยังประเทศของคุณและเรียนรู้จากผู้ที่เก่งที่สุดของคุณ"
 central.70.a:0 "เรามีตำแหน่งงานเตรียมไว้ต้อนรับพวกเขาแล้ว"
 central.70.a.tt:0 "นักวิทยาศาสตร์สายพันธุ์ §H$NAME_Central_Crystal_Species$§! จะย้ายไปยัง §Y[Root.GetName]§!"
 central.70.b:0 "ไม่มีตำแหน่งงานว่างสำหรับพวกเขาในขณะนี้"

 central.71.desc:0 "ข่าวดีอย่างยิ่ง หวังว่าพวกเขาจะสร้างประโยชน์ให้กับจักรวรรดิของคุณได้มากกว่าที่ทำกับจักรวรรดิของเรา\n\n$central.quest.transmission.end$"

 central.72.desc:0 "ถ้าเช่นนั้นพวกเขาก็แค่ต้องหาเรื่องอื่นมาดึงดูดความสนใจของตนเองแทน\n\n$central.quest.transmission.end$"

 colony.9000.name:0 "พื้นดินที่ไม่มั่นคง"
 colony.9000.desc:0 "อาณานิคมของเราบน [Root.GetName] ได้พบกับสถานการณ์ที่แปลกประหลาด: เห็นได้ชัดว่าเราได้ตั้งถิ่นฐานอยู่บนหลังของสัตว์เลื้อยคลานครึ่งบกครึ่งน้ำขนาดยักษ์ ซึ่งเปลือกกระดูกภายนอกของมันถูกสร้างขึ้นด้วยแร่ธาตุแปลกใหม่ที่หลากหลาย พื้นที่ส่วนใหญ่ที่เราคิดว่าเป็นเกาะในท้องถิ่นกลับกลายเป็นสิ่งมีชีวิตเหล่านี้ ชาวอาณานิคมของเราเริ่มเรียกพวกมันว่า '§Yเนมาส§!'\n\nพวกมันดูเป็นมิตรพอสมควร และตราบใดที่เราไม่ได้ทำการขุดเจาะลึกเข้าไปในเปลือกกระดองของพวกมัน พวกมันก็คงแทบไม่ทันสังเกตเห็นตัวเราเลย"
 colony.9000.a:0 "ดำเนินงานต่อไป"
 colony.9000.a.turtle:0 "พวกมันดู... คุ้นเคยจัง"

 colony.9005.name:0 "การค้นพบที่ท้าทายความตาย"
 colony.9005.desc:0 "ในขณะที่อาณานิคมของเราบน [Root.GetName] กำลังเจริญรุ่งเรือง กลุ่มวัยรุ่นบนโลกใหม่แห่งนี้ก็เริ่มมองหาความบันเทิงสำหรับตนเอง—ตามประสาวัยคะนอง บางกลุ่มได้ตั้งกิจกรรมท้าทายด้วยการแอบลอบเข้าไปใกล้หัวของเนมมาในท้องถิ่นให้ได้มากที่สุดเท่าที่จะกล้า\n\nแต่โชคร้ายที่กิจกรรมที่เสี่ยงอันตรายนี้นำมาซึ่งโศกนาฏกรรม: หลังจากทำให้สัตว์ประหลาดตกใจ ชาว [Root.Owner.GetSpeciesNamePlural] วัยเยาว์หลายคนได้ตกลงมาจากคอของสิ่งมีชีวิตขนาดยักษ์ ส่งผลให้ได้รับบาดเจ็บและมีผู้เสียชีวิตหนึ่งราย\n\nชาวอาณานิคมที่เศร้าโศกเสียใจกำลังร้องขอให้จัดการกับ "อสูรกายที่ดุร้าย" เหล่านี้"
 colony.9005.desc.gestalt:0 "ในขณะที่อาณานิคม [Root.GetName] ของเรากำลังเจริญรุ่งเรืองขึ้น เห็นได้ชัดว่าเนมมามีความเกลียดชังอย่างรุนแรงต่อการที่โดรนของเราเข้าไปใกล้บริเวณหัวของพวกมัน เรื่องนี้ชัดเจนขึ้นเมื่อสัตว์ประหลาดตัวหนึ่งตกใจสะดุ้งตัวและเหวี่ยงชาว [Root.Owner.GetSpeciesNamePlural] หลายคนลงมาจากคอของมัน ก่อให้เกิดความเสียหายอย่างรุนแรง\n\nความก้าวหน้าของเราจะถูกจำกัดหากเราไม่ดำเนินการอย่างใดอย่างหนึ่งเพื่อรับมือกับอสูรกายขนาดยักษ์เหล่านี้"
 colony.9005.a:0 "เราต้องลงมือทำอะไรสักอย่างแล้ว"
 colony.9005.b:0 "ปล่อยให้กลุ่มวัยรุ่นได้สนุกสนานกันต่อไป"
 colony.9005.b.gestalt:0 "เราจะหลีกเลี่ยงการไปรบกวนให้สิ่งมีชีวิตเหล่านี้ตกใจเพิ่มเติม"

 colony.9010.name:0 "หน่วยเฉพาะกิจเนมมา"
 colony.9010.desc:0 "หลังจากมอบหมายให้นักชีววิทยาและวิศวกรที่เก่งที่สุดของเราคิดค้นแนวทางการแก้ไขปัญหาสำหรับเรื่องเนมมาบน [Root.GetName] บัดนี้ข้อเสนอหลายโครงการพร้อมที่จะนำเสนอแล้ว\n\nเราได้พิจารณาทุกวิถีทางตั้งแต่วิธีที่สมเหตุสมผลที่สุดไปจนถึงแนวคิดที่รุนแรงที่สุด ความเร่งด่วนของสถานการณ์นี้เรียกร้องให้เราต้องข้ามตรงไปสู่กระบวนการทดสอบภาคสนามจริงในทันที"
 colony.9010.a:0 "เพาะพันธุ์เนมมาเพิ่มเติมและคุ้มครองพวกมันเพื่อขยายพื้นที่อยู่อาศัย"
 colony.9010.b:0 "กดขี่เนมมาเพื่อให้พวกมันยอมจำนนและเชื่อฟัง"
 colony.9010.c:0 "พอที! วางยาสลบเนมมา และเริ่มเจาะกระดองของพวกมัน"
 colony.9010.d:0 "ทำลายล้างพวกขยะสิ่งปฏิกูลเหล่านี้เสีย"

 colony.9015.name:0 "ขยายพื้นที่เกาะ"
 colony.9015.desc:0 "หลังจากการทดสอบเบื้องต้นกับตัวอย่างเนมมาที่โตเต็มวัย นักสัตววิทยาของเราได้จัดทำระบบเพาะพันธุ์เนมมาขึ้นบน [Root.GetName] ด้วยความหวังที่จะเพิ่มจำนวนเนมมายักษ์ให้แก่ห้วงมหาสมุทรของเรา นักเพาะพันธุ์เตือนว่านี่ไม่สามารถดำเนินไปอย่างไม่สิ้นสุด และดาวเคราะห์ดวงนี้สามารถค้ำจุนเนมมาได้เพิ่มอีกเพียงสามหรือสี่ตัวเท่านั้น เวลาโดยประเมินจนกว่าเราจะได้เนมมาตัวถัดไปจะอยู่ที่ประมาณ §Yสิบปี§!"
 colony.9015.a:0 "งั้นเราเริ่มการเพาะพันธุ์กันเลยจะดีกว่า!"

 colony.9020.name:0 "ปาฏิหาริย์แห่งชีวิต"
 colony.9020.desc:0 "โครงการเพาะพันธุ์ของเราบน [Root.GetName] ผลิดอกออกผลเมื่อเราได้สมาชิกเนมมาเพิ่มอีกหนึ่งตัว! เนมมาวัยเยาว์ตัวนี้ได้ปรับตัวเข้ากับเราอย่างรวดเร็ว และเราได้จัดหาถิ่นที่อยู่อาศัยที่เสถียรให้แก่มัน บัดนี้เนมมาพร้อมที่จะรองรับอุตสาหกรรมของเราแล้ว"
 colony.9020.desc.full:0 "$colony.9020.desc$\n\nแต่อย่างไรก็ตาม นี่จะเป็นเนมมาตัวสุดท้ายที่สามารถเพิ่มเข้าไปในโลกใบนี้ได้ เนื่องจากแหล่งที่อยู่อาศัยของพวกมันมีจำนวนจำกัดแล้ว ผู้ดูแลเนมมาของเราจะต้องมุ่งเน้นความพยายามไม่ใช่ในการเพาะพันธุ์เพิ่ม แต่เป็นการรักษาดูแลเนมมาดวงที่มีอยู่แล้วแทน"
 colony.9020.a:0 "วิเศษมาก! เริ่มการเพาะพันธุ์ตัวถัดไปเลย!"
 colony.9020.b:0 "ทำได้ดีมากทุกคน"
 colony.9020.b.gestalt:0 "นี่คือข้อสรุปที่น่าพึงพอใจสำหรับโครงการนี้"

 colony.9025.name:0 "จำนวนประชากรที่มากเกินไป"
 colony.9025.desc:0 "น่าเสียดายที่ความพยายามล่าสุดในการเพิ่มเนมมาอีกตัวบน [Root.GetName] ล้มเหลวลง เราไม่พบถิ่นที่อยู่อาศัยที่กว้างใหญ่พอที่จะให้สัตว์ร้ายขนาดยักษ์เช่นนี้เติบโตได้ อย่างไรก็ตาม เหล่า [Root.Owner.GetScientistPlural] ไม่ได้ย่อท้อ และสัญญาว่าจะให้ผลลัพธ์ที่ดีขึ้นในอนาคต"
 colony.9025.a:0 "ลองพยายามใหม่อีกครั้ง"

 colony.9030.name:0 "บังคับใช้ความเชื่อฟัง"
 colony.9030.desc:0 "เหล่า [Root.Owner.GetScientistPlural] วิศวกรรมชีวภาพต่างดาวของเราได้จำกัดภัยคุกคามเนมมาสำเร็จแล้ว! ด้วยความพยายามอย่างยิ่งยวดของเรา บัดนี้สิ่งมีชีวิตเหล่านี้ยอมจำนนต่อเราแล้ว\n\nเนมมาได้รับจุดประสงค์ใหม่ในฐานะสัตว์ลากเลื่อนที่ยอดเยี่ยม ขนาดร่างกายที่ใหญ่โตของพวกมันช่วยให้แบกรับวัสดุสิ่งของจำนวนมหาศาลได้ โดยได้รับการนำทางไปตามเส้นทางที่เหมาะสมผ่านเครื่องฝังระบบไซเบอร์เนติกส์ โครงการตั้งอาณานิคมของเราก็เร่งความเร็วตามไปด้วย"
 colony.9030.a:0 "ผลงานที่ยอดเยี่ยม บัดนี้ภารกิจที่แท้จริงของเราสามารถเริ่มต้นขึ้นได้แล้ว"

 colony.9035.name:0 "ผู้อนุรักษ์เนมมา"
 colony.9035.desc:0 "ในวันนี้เกิดเหตุการณ์จลาจลปะทุขึ้นบน [Root.GetName] เมื่อประชากรบางส่วนรวมตัวกันประท้วงต่อต้านวิธีที่เราปฏิบัติกับเนมมา ผู้ประท้วงรวมกลุ่มล้อมรอบบริเวณหัวของเนมมาซึ่งเป็นที่ตั้งของเมืองหลวงอาณานิคม ผู้ประท้วงเรียกร้องให้เราปล่อยเนมมาทั้งหมดให้เป็นอิสระทันที โดยมุ่งเน้นการอนุรักษ์สายพันธุ์ของพวกมันมากกว่าการกดขี่เป็นทาส\n\nการเคลื่อนไหวนี้แพร่กระจายอย่างรวดเร็วไปยังพื้นที่รอบๆ เนมมาตัวอื่นๆ อย่างไรก็ตาม กลุ่มผู้ประท้วงตอบโต้ได้รวมตัวกันเพื่อสนับสนุนโครงการที่มีอยู่เดิมของเรา ซึ่งทำให้ความตึงเครียดในสังคมทวีความรุนแรงยิ่งขึ้นและอาจนำไปสู่เหตุรุนแรงได้"
 colony.9035.a:0 "เปลี่ยนมาเริ่มต้นโครงการเพาะพันธุ์แทน"
 colony.9035.b:0 "จับกุมแกนนำผู้ก่อความไม่สงบและลงโทษให้ไปปฏิบัติหน้าที่จัดการขยะ"

 colony.9040.name:0 "การแสวงหาประโยชน์จากกระดอง"
 colony.9040.desc:0 "วิศวกรและนักชีวเคมีของเราสร้างผลงานได้อย่างยอดเยี่ยม ยาระงับประสาทที่พัฒนาขึ้นมาใหม่และสว่านที่มีความแม่นยำสูงช่วยให้เราสามารถเก็บเกี่ยวแร่ธาตุโดยการเจาะลึกลงไปในกระดองคริสตัลที่แข็งแกร่งของเนมมา รวมถึงช่วยให้เก็บอินทรียสารจากภายใต้กระดองได้โดยไม่ส่งผลกระทบต่อโครงสร้างพื้นฐานของเรา หากเพียงแค่อาณานิคมทั้งหมดของเราสามารถให้ผลผลิตที่อุดมสมบูรณ์เช่นนี้ได้"

 colony.9045.name:0 "ทำลายล้างสัตว์เลื้อยคลานโบราณ"
 colony.9045.desc:0 "การกำจัดเนมมาเสร็จสิ้นลงแล้ว—ทั้งหมดได้รับการดำเนินการอย่างเป็นระบบ เพื่อไม่ให้ส่งผลเสียต่อมหาสมุทรหรือเป็นภัยต่อโครงสร้างพื้นฐานของเรา ในไม่ช้าเราสามารถมุ่งความสนใจไปที่ภารกิจการเก็บเกี่ยวซากของพวกมัน และสร้างอาณานิคมที่มั่นคงถาวรขึ้นบน [Root.GetName] อย่างไรก็ตาม ขั้นแรกเราต้องจัดเก็บซากชิ้นส่วนที่เหลือทั้งหมดก่อน"
 colony.9045.a:0 "เป็นหนทางเดียวที่จะรับมือกับสัตว์เดรัจฉานที่ไร้ปัญญาเช่นนี้"

 colony.9950.name: "ช่องพ่นแก๊สสตราโตสเฟียร์"
 colony.9950.desc: "เมื่อโครงการตั้งอาณานิคมที่สำคัญบน §Y[planet.GetName]§! เสร็จสิ้นแล้ว เหล่า [Owner.GetScientistPlural] ของ [Root.Owner.GetName] ก็หันมาสนใจยอดหินที่สูงตระหง่านของดาวดวงนี้\n\nโครงสร้างแร่ธาตุเหล่านี้ดูเหมือนจะกลวงทั้งหมด โดยทำหน้าที่ลำเลียงก๊าซจากใต้เปลือกโลกขึ้นไปจนถึงชั้นเทอร์โมสเฟียร์ ด้วยเหตุผลที่ยังไม่ทราบแน่ชัด ก๊าซเหล่านี้ยังดึงดูดปลาวาฬอวกาศ(Tianki)และสัตว์อวกาศอื่นๆ ให้เดินทางเป็นระยะทางไกลมายังดาวเคราะห์ดวงนี้\n\nโครงการวิจัยที่ละเอียดรอบคอบมากขึ้นจะช่วยให้เราสามารถศึกษาสิ่งมหัศจรรย์ของดาวเคราะห์นี้และเพิ่มพูนความเข้าใจเกี่ยวกับสิ่งมีชีวิตที่น่าเหลือเชื่อเหล่านี้ หรืออาจช่วยให้เราคิดค้นวิธีการกักเก็บก๊าซที่มีค่าเหล่านี้มาใช้ประโยชน์เอง"
 colony.9950.a: "ศึกษาช่องพ่นแก๊ส"
 colony.9950.b: "ไม่มีเวลาสำหรับเรื่องนี้"

 colony.9955.name: "ผลการศึกษาช่องพ่นแก๊สสตราโตสเฟียร์"
 colony.9955.desc: "เราพบว่าช่องพ่นแก๊สบน §Y[planet.GetName]§! ก่อตัวขึ้นนานหลายล้านปีเมื่อก๊าซที่มีความร้อนสูงยิ่งยวดและตะกอนเย็นตัวลงและแข็งตัว ไอระเหยที่เหลืออยู่ในชั้นเทอร์โมสเฟียร์ส่วนล่างก่อตัวเป็นกลุ่มเมฆที่ปลาวาฬอวกาศ(Tianki)ใช้เป็นอาหาร โดยแหวกว่ายผ่านไปด้วยความสง่างามอย่างน่าประหลาด\n\nนี่เป็นโอกาสอันดีที่เราจะได้สังเกตการณ์สิ่งมีชีวิตเหล่านี้ในระยะใกล้ และยังช่วยดึงดูดนักท่องเที่ยวต่างดาวมายังอาณานิคมอีกด้วย หรืออีกทางเลือกหนึ่งคือเราสามารถใช้ประโยชน์จากช่องพ่นแก๊สเหล่านี้สำหรับการกลั่นก๊าซพิศดาร(แก๊สไฟฟ้า)ซึ่งต้องแลกกับการขับไล่สัตว์ป่าอวกาศออกไปจากแหล่งอาหารโบราณของพวกมัน"
 colony.9955.a: "ใช้ประโยชน์เพื่อการท่องเที่ยวและการวิจัย"
 colony.9955.b: "เปลี่ยนเป้าหมายเพื่อนำไปกลั่นแก๊ส"

 colony.9960.name: "แท่นรับชมช่องพ่นแก๊สสตราโตสเฟียร์"
 colony.9960.desc: "โอกาสการท่องเที่ยวที่เป็นเอกลักษณ์บน §Y[planet.GetName]§! สามารถปรับปรุงให้ดียิ่งขึ้นได้โดยการสร้างแท่นชมวิวสุดหรูใกล้กับช่องพ่นแก๊สที่คึกคักที่สุด ช่วยให้ผู้เข้าชมได้ใกล้ชิดและสัมผัสกับปลาวาฬอวกาศ(Tianki)โดยมีนักวิจัยในพื้นที่นำทางพวกเขาผ่านประสบการณ์พิเศษที่ไม่เหมือนใครนี้\n\nลูกค้าที่ร่ำรวยกว่าสามารถเข้าร่วมการเดินทางเก็บตัวอย่างทางวิทยาศาสตร์ หรือสัมผัสความตื่นเต้นในการก้าวเท้าลงบนตัวของปลาวาฬอวกาศที่ยังมีชีวิตอยู่!"
 colony.9960.a: "สร้างแท่นชมวิว"
 colony.9960.b: "ต้องการทรัพยากรเหล่านี้สำหรับพื้นที่อื่น"

 colony.9965.name: "การขยายขนาดช่องพ่นแก๊สสตราโตสเฟียร์"
 colony.9965.desc: "วิศวกรของเราเสนอว่า แหล่งกักเก็บก๊าซใต้ดินบน §Y[Planet.GetName]§! สามารถนำมาใช้ประโยชน์ได้อย่างเต็มที่โดยการขยายช่องพ่นด้วยวัตถุระเบิดสำหรับการทำเหมือง ความเสี่ยงที่ช่องพ่นจะถล่มนั้นถือว่าต่ำมาก แต่ควรแจ้งให้ประชาชนในท้องถิ่นทราบไว้ล่วงหน้าเพื่อความปลอดภัย"
 colony.9965.a: "ติดตั้งระเบิด!"
 colony.9965.b: "ไม่คุ้มค่าความเสี่ยง"
 colony.9965.c: "กิลด์(เสียงกระโชก)จะเป็นผู้จัดการเรื่องนี้เอง"

 colony.9970.name: "การขยายช่องพ่นแก๊สสำเร็จ"
 colony.9970.desc: "โครงการขยายช่องพ่นแก๊สประสบความสำเร็จอย่างงดงาม และวิศวกรของเรากำลังรายงานว่ากำลังการผลิตก๊าซเพิ่มขึ้นทั่วทั้งดาวเคราะห์ ผลข้างเคียงที่โชคร้ายคือช่องพ่นบางจุดที่บอบบางเกิดการพังทลายลง ก่อให้เกิดความเสียหายเล็กน้อยต่อสิ่งอำนวยความสะดวกของเรา\n\nแม้จะมีอุปสรรคเล็กน้อยนี้ แต่เราก็สามารถใช้ประโยชน์จากสภาวะที่เป็นเอกลักษณ์ของ §Y[planet.GetName]§! ได้อย่างดีเยี่ยม"

 colony.9975.name: "การขยายช่องพ่นแก๊สล้มเหลว"
 colony.9975.desc: "การคำนวณที่ผิดพลาดเกี่ยวกับวัตถุระเบิดส่งผลให้ช่องพ่นหลายแห่งเกิดรอยร้าวและพังทลายลงสู่พื้นในที่สุด ก่อให้เกิดความเสียหายอย่างมากต่อสิ่งอำนวยความสะดวกของเรา แม้ว่าโรงกลั่นบางแห่งจะสามารถผลิตก๊าซได้มากกว่าเดิม แต่ผลผลิตโดยรวมกลับลดลง ข้อดีคือโครงสร้างที่พังถล่มลงมาช่วยเปิดเผยแหล่งแร่ธาตุที่คาดไม่ถึง\n\nเหตุการณ์เหล่านี้เป็นสิ่งย้ำเตือนว่า อารยธรรมที่ครอบคลุมกาแล็กซีไม่สามารถสร้างขึ้นได้โดยปราศจากการกะเทาะช่องพ่นแก๊สสักสองสามแห่ง"

 nemma_world_chain_title: "โลกแห่งเนมมา"
 nemma_world_chain_desc: "เนมมาขนาดยักษ์อาศัยอยู่บนดาวเคราะห์ดวงหนึ่งของเรา และเราได้วางรากฐานของอาณานิคมไว้บนหลังของพวกมันแล้ว เราจำเป็นต้องตัดสินใจว่าจะดำเนินการอย่างไรกับพวกมันต่อไป"

 stratovent_researcher: "$job_stratovent_researcher$"
 job_stratovent_researcher: "นักวิจัยช่องพ่นแก๊ส"
 job_stratovent_researcher_with_icon: "£job_xeno_zoo_keeper£ $job_stratovent_researcher$"
 job_stratovent_researcher_plural: "นักวิจัยช่องพ่นแก๊ส"
 job_stratovent_researcher_plural_with_icon: "£job_xeno_zoo_keeper£ $job_stratovent_researcher_plural$"
 job_stratovent_researcher_desc: "นักวิจัยที่เชี่ยวชาญในการศึกษาชีวิตสัตว์ป่าในอวกาศและนำทางนักเดินทางเข้าเยี่ยมชม"
 biologist_is_vent_researcher_tt: "$job_biologist_plural_with_icon$ จะถูกแปลงเป็น $job_stratovent_researcher_plural_with_icon$"
 job_stratovent_refiner: "คนกลั่นแก๊สช่องพ่น"
 job_stratovent_refiner_plural: "คนกลั่นแก๊สช่องพ่น"
 job_stratovent_refiner_desc: "คนงานที่เชี่ยวชาญในการเก็บรวบรวมและกลั่นก๊าซมีค่าจากช่องพ่นแก๊สสตราโตสเฟียร์"
 job_stratovent_refiner_upg: "คนกลั่นแก๊สช่องพ่นขยายตัว"
 job_stratovent_refiner_upg_plural: "คนกลั่นแก๊สช่องพ่นขยายตัว"
 job_stratovent_refiner_upg_desc: "นักวิจัยที่เชี่ยวชาญในการศึกษาชีวิตสัตว์ป่าในอวกาศและให้ความรู้แก่นักเดินทางเกี่ยวกับพฤติกรรมของพวกมัน"
 job_stratovent_refiner_minerals: "คนกลั่นแก๊สช่องพ่นชำรุด"
 job_stratovent_refiner_minerals_plural: "คนกลั่นแก๊สช่องพ่นชำรุด"
 job_stratovent_refiner_minerals_desc: "คนงานที่เชี่ยวชาญในการเก็บรวบรวมและกลั่นก๊าซมีค่าจากช่องพ่นแก๊สสตราโตสเฟียร์"

