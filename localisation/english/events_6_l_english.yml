 colony.9840.c.swarm:0 "โดรนเพิ่มเติมเพื่อเข้ารับใช้"
 colony.9840.c.tooltip:0 "เพิ่มประชากร [Root.Species.GetNamePlural]-เบต้าจำนวน 6 หน่วยลงบน [Root.GetHomeWorldName]"
 colony.9840.d:0 "พยายามนำพา [Root.GetHomeWorldName]-เบต้ามาหาเรา"
 colony.9840.d.tooltip:0 "เริ่มต้นโครงการอันยากลำบากเพื่อช่วยเหลือ [Root.GetHomeWorldName]-เบต้า"

 colony.9850.name:0 "ความปีติยินดี!"
 colony.9850.desc:0 "คลื่นรบกวนไร้รูปร่างปกคลุมท้องฟ้าส่วนใหญ่ของ §B[Root.GetHomeWorldName]-เบต้า§! และกำลังบีบตัวเข้ามาอย่างรวดเร็ว ในขณะที่ [cloned_physicist.GetName]- แอลฟาและเบตาซึ่งกำลังทำงานเคียงข้างกันเสร็จสิ้นภารกิจอันเหน็ดเหนื่อยของพวกเขา เครื่องควบคุมมวลลบทำงาน และรอยแยกของโลกเคลื่อนตัวทับเหนือ [Root.GetHomeWorldName]-เบต้าทันทีที่คลื่นรบกวนจะบดบังมัน รอยแยกปิดตัวลงในไม่กี่อึดใจถัดมา และมวลลบก็หยุดปรากฏ ณ ที่เดิม\n\nเป็นอันเสร็จสิ้น หลังจากศึกษาและวิจัยเกี่ยวกับระบบแรงโน้มถ่วงใหม่และเขตอาศัยได้มาหลายเดือน บัดนี้ [Root.Capital.GetStarName] ก็มีดาวเคราะห์ที่มีประชากรดวงใหม่โคจรรอบมันแล้ว"
 colony.9850.desc.robot:0 "คลื่นรบกวนไร้รูปร่างปกคลุมท้องฟ้าส่วนใหญ่ของ §B[Root.GetHomeWorldName]-เบต้า§! และกำลังบีบตัวเข้ามาอย่างรวดเร็ว ในขณะที่ [cloned_physicist.GetName]- แอลฟา เบต้าและหน่วยวิทยาศาสตร์อื่นๆ ที่มีทั้งหมดทำงานเคียงข้างกัน เครื่องควบคุมมวลลบทำงาน และรอยแยกของโลกเคลื่อนตัวทับเหนือ [Root.GetHomeWorldName]-เบต้าทันทีที่คลื่นรบกวนจะบดบังมัน รอยแยกปิดตัวลงในไม่กี่อึดใจถัดมา และมวลลบก็หยุดผลิต ณ ที่เดิม\n\nเป็นอันเสร็จสิ้น หลังจากศึกษาและวิจัยเกี่ยวกับระบบแรงโน้มถ่วงใหม่และเขตอาศัยได้มาหลายเดือน บัดนี้ [Root.Capital.GetStarName] ก็มีดาวเคราะห์ที่มีประชากรดวงใหม่โคจรรอบมันแล้ว"
 colony.9850.desc.hive:0 "คลื่นรบกวนไร้รูปร่างปกคลุมท้องฟ้าส่วนใหญ่ของ §B[Root.GetHomeWorldName]-เบต้า§! และกำลังบีบตัวเข้ามาอย่างรวดเร็ว ในขณะที่ [cloned_physicist.GetName]- แอลฟา เบต้าและโดรนอื่นๆ ที่มีทั้งหมดทำงานเคียงข้างกัน เครื่องควบคุมมวลลบทำงาน และรอยแยกของโลกเคลื่อนตัวทับเหนือ [Root.GetHomeWorldName]-เบต้าทันทีที่คลื่นรบกวนจะบดบังมัน รอยแยกปิดตัวลงในไม่กี่อึดใจถัดมา และมวลลบก็หยุดผลิต ณ ที่เดิม\n\nเป็นอันเสร็จสิ้น มุมมองและจิตใจใหม่ที่เข้ามาร่วมกับ [Root.GetName] ส่งกระแสคลื่นผ่านจิตรวมกลุ่ม หลังจากศึกษาและวิจัยเกี่ยวกับระบบแรงโน้มถ่วงใหม่และเขตอาศัยได้มาหลายเดือน บัดนี้ [Root.Capital.GetStarName] ก็มีดาวเคราะห์ที่มีประชากรดวงใหม่โคจรรอบมันแล้ว"
 colony.9850.a:0 "แค่ครั้งนี้ครั้งเดียวเท่านั้น ทุกคนรอดชีวิต!"

 colony.9851.name:0 "คลื่นรบกวน"
 colony.9851.desc:0 "โพรบสำรวจที่ทิ้งไว้ในจักรวาลเบต้าบันทึกช่วงเวลาสุดท้ายของความเป็นจริง ขณะที่กำแพงคลื่นรบกวนไร้รูปร่างกลืนกิน [Root.Capital.GetStarName]-เบต้าและจากนั้นก็กลืนกิน §B[Root.GetHomeWorldName]-เบต้า§! สัญญาณถูกตัดลงทันทีก่อนที่รอยแยกจะพังทลายหายไปจากการดำรงอยู่ทำนองเดียวกันกับอนุภาคมวลลบที่มันผลิตขึ้นก็หายไปเช่นกัน\n\nใครก็ตามที่ถูกทิ้งไว้ข้างหลังฝั่งนั้นไม่มีอยู่อีกต่อไปแล้ว"
 colony.9851.a:0 "นั่นอาจเป็นพวกเราก็ได้"

 colony.9855.name:0 "การข้ามพรมแดนมิติ"
 colony.9855.desc:0 "ปัญหาทั่วไปเริ่มเกิดขึ้นนับตั้งแต่รอยแยกปรากฏขึ้น ครอบครัวในมิติของเรากำลังติดต่อแฝดต่างมิติเบต้าและลักลอบพาพวกเขาเข้ามาในจักรวาลที่มั่นคงของเรา เรื่องนี้มักทำโดยยามเฝ้าชายแดนที่ได้รับมอบหมายให้ดูแลให้จักรวาลทั้งสองแยกจากกัน เนื่องจากโดยพื้นฐานแล้วทุกคนใน [Owner.GetName] มีครอบครัวอยู่ที่อีกฝั่ง การกระทำของบางกลุ่มอาจไม่ส่งผลกระทบนัก แต่เราจะเจอกับความโกลาหลอย่างรวดเร็วหากแนวทางนี้แพร่หลาย หาก §B[Owner.GetHomeWorldName]-เบต้า§! สูญเสียประชากรมากเกินไป โครงสร้างพื้นฐานของพวกเขาจะล่มสลาย และมันจะยิ่งยากขึ้นในการกู้โลกใบนั้นข้ามฝั่งมา"
 colony.9855.a:0 "อนุญาตให้พวกเขาผ่านเข้ามา"
 colony.9855.b:0 "พวกเขาควรจะอยู่ในฝั่งของตัวเอง"
 colony.9855.c:0 "จัดชั่วโมงเยี่ยมชม"

 colony.9860.name:0 "ภารกิจ: ข้ามมิติ"
 colony.9860.desc:0 "ข้อดีประการหนึ่งของการมีโลกกระจกเงาอยู่ใกล้เคียงคือ เสาหลักทางวัฒนธรรมของ [Owner.GetSpeciesName] ที่อาจถูกทำลายหรือสูญหายไปในช่วงไม่กี่ปีที่ผ่านมาอาจยังคงมีอยู่บนดาวเคราะห์อีกดวงหนึ่ง เพื่อให้ทุกคนสามารถเพลิดเพลินกับมันได้อีกครั้ง ทว่ากลุ่มคนที่ไม่ประสงค์ดีได้ใช้โอกาสนี้ในการแทรกซึมเข้าไปใน §B[Target.GetName]-เบต้า§! และยึดครองผลงานชิ้นเอกเหล่านี้มาเป็นของตนเอง ตอนนี้เราไม่ได้มีเพียงหนึ่ง แต่มีผลงานชิ้นเอกสองชิ้นที่สร้างขึ้นโดยนักประดิษฐ์ผู้ยิ่งใหญ่จากอดีตของเรา รัฐบาลของ [Target.GetName]-เบต้าได้ส่งคำขอที่เป็นทางการแต่แฝงไปด้วยความโกรธเกรี้ยวให้เราคืนทรัพย์สินที่ปล้นไป"
 colony.9860.a:0 "คืนผลงานชิ้นเอกและขออภัยอย่างสุดซึ้ง"
 colony.9860.b:0 "สอง §Hย่อม§! ดีกว่าหนึ่ง..."
 colony.9860.c: "สาม §Hย่อม§! ดีกว่าสอง..."

 colony.9870.name:0 "คำอ้อนวอนครั้งสุดท้าย"
 colony.9870.desc.helped:0 "สถานการณ์ในจักรวาลเบต้านั้นเลวร้ายมาก และมีแต่จะแย่ลงเรื่อย ๆ เสียงร้องขอความช่วยเหลือที่เป็นหนึ่งเดียวดังออกมาจากประตูมิติเมื่อเช้าตรู่วันนี้ แม้ว่าเราจะพยายามอย่างเต็มที่แล้ว แต่ดูเหมือนว่าญาติพี่น้องของเรากำลังจะกลายเป็นหนึ่งเดียวกับความว่างเปล่าที่คอยหลอกหลอนจักรวาลของพวกเขา หากเราต้องการช่วยตัวตนอีกคนของเรา เวลาคือตอนนี้แล้ว"
 colony.9870.desc.ignored:0 "เสียงร้องขอความช่วยเหลือที่น่าเวทนาดังมาจากประตูมิติของจักรวาลเบต้าในวันนี้ เสียงคร่ำครวญครั้งสุดท้ายเพื่อการไถ่บาป เราได้รับประโยชน์จากสถานการณ์ของพวกเขามาสักระยะหนึ่งแล้ว แต่พวกเขายังคงร้องเรียกหาเราเพราะไม่มีใครให้พูดคุยด้วยในจักรวาลอันโดดเดี่ยวของพวกเขา เรากำลังเข้าใกล้จุดที่ไม่อาจย้อนกลับได้ ในไม่ช้าเบต้า[Owner.GetSpeciesNamePlural] จะไม่มีอีกต่อไป"
 colony.9870.a:0 "เพิ่มความพยายามของเราเป็นสองเท่า เราจะปล่อยให้มันจบลงตรงนี้ไม่ได้"
 colony.9870.a.tooltip:0 "แนวทาง §Y$approach_save_b_world$§! จะต้องใช้นักวิทยาศาสตร์ของเรามากยิ่งขึ้น ส่งผลให้ความเร็วในการวิจัยของเราลดลงรวมเป็น §R-30%§!"
 colony.9870.b:0 "ทุกอย่างเป็นไปตามแผน"
 colony.9870.c:0 "พวกเขาก็เป็น [Owner.GetSpeciesNamePlural] เหมือนกัน เราจะปล่อยให้มันจบลงแบบนี้ไม่ได้!"

 colony.9875.name:0 "การเพิ่มประสิทธิภาพด้วยการส่งต่อภาระงาน"
 colony.9875.desc:0 "การมี [Owner.GetGovernmentName] แห่งที่สองที่คล้ายคลึงกันมาก ทำให้เราได้รับโอกาสอย่างที่ไม่เคยมีมาก่อน การคำนวณที่จำเป็นในการจัดระเบียบจิตสำนึกของเราในแต่ละวันนั้นต้องใช้ [Owner.GetTeamMemberPlural] จำนวนมาก แต่ตอนนี้ภารกิจนี้สามารถส่งต่อให้กับ [Root.GetName] แห่งที่สองได้ คุณค่าของสิ่งนี้เป็นที่ประจักษ์ และในขณะที่มันอาจทำให้ความพยายามในการฟื้นฟูของ §B[Target.GetName]-เบต้า§! ช้าลง แต่เรามั่นใจว่าเราจะยังคงรับมือได้"
 colony.9875.a.machine:0 "นี่เป็นสิ่งที่มีเหตุผล"
 colony.9875.a.hive:0 "การดำเนินการนี้ให้สำเร็จเป็นประโยชน์ต่อเราทุกคน"
 colony.9875.b:0 "พวกเขาต้องการ [Owner.GetTeamMemberPlural] ทั้งหมดที่พวกเขาสามารถหาได้"

 colony.9880.name:0 "โดรนที่สิ้นหวัง"
 colony.9880.desc:0 "ในความทุกข์ยากที่ดำเนินไปอย่างต่อเนื่อง [Owner.GetGovernmentName] อีกฝั่งได้ระเบิดอารมณ์และเข้าควบคุม [Owner.GetSoldierPlural] บน [Target.GetName] อย่างบ้าคลั่ง! เราต้องจัดตั้งโดรนป้องกันของเราก่อนที่จะถูกบดขยี้"
 colony.9880.a.machine:0 "ระเบียบการฉุกเฉิน: ป้องกัน [Target.GetName]"
 colony.9880.a.hive:0 "ปราบปรามความเบี่ยงเบน สะกดโลกเบต้า"
 colony.9880.a.tt:0 "ได้รับกองทัพป้องกัน §Y400§! กองทัพ โดยแลกกับประชากร £pop£ §Hป๊อป§! จำนวน §R100§!"
 colony.9880.b:0 "วิเคราะห์เหตุผลที่จักรวาลเบต้าตอบสนองเช่นนี้"

 colony.9885.desc.hive:0 "โดรนเบี่ยงเบนตัวสุดท้ายถูกกำจัดแล้ว โดรนสื่อสารของเราตรวจพบการมีอยู่ของจิตเหนือสำนึกอื่นอีกครั้ง แต่ครั้งนี้มันแสดงท่าทีศิโรราบอย่างมาก คอยให้เราเป็นฝ่ายเริ่มการสื่อสารก่อน\n\n\"§Bจิตนี้ขออภัย - ปฏิกิริยาตอบสนองตามสัญชาตญาณเริ่มควบคุมได้ยากขึ้นเมื่อ §Rฟัน ปลอม§! เข้าใกล้ เราจะทำให้มั่นใจว่าเราจะเหนี่ยวรั้งตนเองไว้ในอนาคต§!\""
 colony.9885.desc.machine:0 "ยูนิตป้องกันที่ก่อกบฏถูกกำจัดแล้ว รูทีนย่อยการวิเคราะห์การสังเกตการณ์ของเราตรวจพบการมีอยู่ของยูนิตสื่อสารของ [FromFrom.GetName]-เบต้าอีกครั้ง พวกเขาได้ทิ้งข้อความง่าย ๆ ไว้ให้เรา\n\n\"§Bอีกครั้งที่ยูนิตป้องกันส่วนเกินได้ดำเนินการในลักษณะที่ต่ำกว่าประสิทธิภาพสูงสุด เมื่อ §Rฟัน ปลอม§! ใกล้เข้ามา พวกมันสามารถเล็ดลอดผ่านความพยายามในการกักกันของเราได้ กระบวนการเหล่านั้นถูกลบไปแล้วและไม่ควรดำเนินการใด ๆ เพิ่มเติมอีก§!\""
 colony.9885.a.hive:0 "เราจะทำให้มั่นใจว่าพวกเจ้าทำเช่นนั้น"
 colony.9885.a.hive.tooltip:0 "สะกดการมีอยู่ของจิตรวมกลุ่มของโลกเบต้าด้วยจำนวนที่เหนือกว่าของเรา"
 colony.9885.b.hive:0 "พวกเราเข้าใจ ไม่ต้องกลัว"
 colony.9885.a.machine:0 "เพิกถอนการเข้าถึง [FromFrom.GetName]- แอลฟาโดยเสรีแล้ว"
 colony.9885.a.machine.tooltip:0 "ตรวจสอบให้แน่ใจว่ามิติอื่นจะไม่มีการเชื่อมต่อที่ไม่ปลอดภัยไปยัง [FromFrom.GetName] อีกต่อไป"
 colony.9885.b.machine:0 "เข้าใจได้ AI ต่อสู้มีความคิดขบถโดยธรรมชาติอยู่แล้ว"

 colony.9890.name:0 "ข้อเรียกร้อง"
 colony.9890.desc:0 "[FromFrom.GetName] ได้สูญเสียให้กับตัวแปรเบต้าของเราแล้ว ตอนนี้พวกเขากำลังเรียกร้องให้โอนย้ายโดรนบางส่วนของพวกเขาทันที รวมถึงจัดตั้งจิตสำนึกย่อยบนโลกของเรา เพื่อรับประกันความอยู่รอดของความรู้และการมีอยู่ของพวกเขา"
 colony.9890.a:0 "หายนะสิ้นดี"

