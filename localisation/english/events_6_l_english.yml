 d_geocentric_experiment: "ซูเปอร์คอมพิวเตอร์ดวง อาทิตย์ ยาม ค่ํา คืน"
 d_geocentric_experiment_desc: "ซูเปอร์คอมพิวเตอร์ที่คอยปกป้องดวง อาทิตย์ ยาม ค่ํา คืนจากการพังทลายของแรงโน้มถ่วง"

 # Mysterious Rocks Formation
 MYSTERIOUS_ROCK_CAT: "การก่อตัวของหินลึกลับ"
 MYSTERIOUS_ROCK_CAT_DESC: "ในขณะที่กำลังสำรวจ [From.GetName] เราได้ค้นพบกลุ่มหินที่น่าเกลียดน่ากลัวจากสิ่งที่เคยคิดว่าเป็นเพียงดาวเคราะห์ที่รกร้างว่างเปล่า"
 anomaly.2000.name: "หินที่น่าเกลียดน่ากลัว"
 anomaly.2000.start.desc: "การสำรวจอย่างต่อเนื่องของ [From.GetName] ได้สร้างคำถามมากกว่าคำตอบ พื้นผิวเต็มไปด้วยรูปปั้นที่ดูสมจริงอย่างน่าขนลุก การแสดงออกของพวกมันกลายเป็นหินในความทุกข์ทรมานที่เงียบงัน"
 anomaly.2000.default.desc: "$anomaly.2000.start.desc$\n\nนักวิทยาศาสตร์ของเรามีความคิดเห็นที่แตกแยก บางคนเชื่อว่าร่างเหล่านี้เคยเป็นสิ่งมีชีวิต ซึ่งถูกทำให้กลายเป็นหินโดยพลังงานที่ไม่รู้จัก บางคนเสนอว่าพวกมันเป็นตัวแทนของเทพเจ้าที่บูชาโดยอารยธรรมที่ถูกลืมเลือนไปนานแล้ว ส่วนผู้ที่ระมัดระวังมากกว่าสองสามคนเชื่อว่ารูปปั้นเหล่านี้ไม่ใช่เครื่องบรรณาการ แต่เป็นคำเตือน: ข้อความที่น่ากลัวถึงใครก็ตามที่กล้าเข้ามารบกวนดาวเคราะห์ดวงนี้"
 anomaly.2000.hive.desc: "$anomaly.2000.start.desc$\n\nความคิดที่หลากหลายหลั่งไหลเข้าสู่จิตสำนึกร่วมของเรา บางร่างเหล่านี้อาจจะเคยเป็นสิ่งมีชีวิต ซึ่งถูกทำให้กลายเป็นหินโดยพลังงานที่ไม่รู้จัก หรือบางทีพวกมันอาจเป็นตัวแทนของเทพเจ้าที่บูชาโดยอารยธรรมที่ถูกลืมเลือนไปนานแล้ว บางทีรูปปั้นเหล่านี้ไม่ใช่เครื่องบรรณาการ แต่เป็นคำเตือน: ข้อความที่น่ากลัวถึงใครก็ตามที่กล้าเข้ามารบกวนดาวเคราะห์ดวงนี้"
 anomaly.2000.a: "ดำเนินการวิจัยต่อไป"
 anomaly.2000.b: "ระงับการสืบสวนนี้"
 anomaly.2005.desc: "การสืบสวนเพิ่มเติมโดยคณะลูกเรือของ [From.GetName] ระบุว่ารูปปั้นเหล่านั้นเป็นเศษซากของสายพันธุ์โบราณที่มีความคล้ายคลึงกับลิธอยด์อย่างมาก ไม่ว่าสาระสำคัญใดที่เคยยึดร่างของพวกมันเข้าไว้ด้วยกันต่างเสื่อมสลายไปนานแล้ว ตอนนี้เมื่อสัมผัสกับสภาพอากาศ พวกมันก็ค่อย ๆ สึกกร่อนกลายเป็นฝุ่นละเอียด กระจัดกระจายเศษซากประวัติศาสตร์ของมันไปตามสายลมที่ไม่หยุดหย่อนของ [From.GetName]"
 anomaly.2005.a: "น่าทึ่งมาก"
 anomaly.2006.desc: "ความพยายามเพิ่มเติมโดยคณะลูกเรือของ [From.GetName] ถูกหยุดลงอย่างกระทันหันเมื่อมีลมกระโชกแรงพัดผ่านไซต์วิจัย รูปแกะสลักหินที่เปราะบางแตกสลายกลายเป็นฝุ่น ลบเลือนร่องรอยของปริศนาที่พวกมันเคยแสดงไว้ เมื่อไม่มีหลักฐานหลงเหลือให้วิเคราะห์และไม่มีข้อสรุปที่ชัดเจนให้ดึงออกมาได้ เราจึงไม่มีทางเลือกอื่นนอกจากต้องยุติการสืบสวนลง"
 anomaly.2006.a: "ช่างน่าเสียดายนัก"
 GROTESQUE_ROCK_PROJECT: "สำรวจการก่อตัวของกลุ่มหินที่น่าเกลียดน่ากลัว"
 GROTESQUE_ROCK_PROJECT_DESC: "เราได้บังเอิญไปพบกับกลุ่มหินที่น่าเกลียดน่ากลัวบนพื้นผิวของ [From.GetName] จำเป็นต้องมีการศึกษาเพิ่มเติมเพื่อระบุว่าเหตุใดมันจึงคงอยู่บนดาวเคราะห์ที่รกร้างว่างเปล่าดวงนี้"

## Icy Flowers
 ICY_FLOWERS_CAT: "การค้นพบในความเย็นเยือก"
 ICY_FLOWERS_CAT_DESC: "ความพยายามซ้ำแล้วซ้ำเล่าในการสแกนชั้นธารน้ำแข็งหนาทึบที่ปกคลุม [From.GetName] ส่งผลให้เกิดข้อมูลที่ผิดพลาดและรูปแบบการรบกวนที่คาดไม่ถึง บางสิ่งใต้ผืนน้ำแข็งยังคงรบกวนอุปกรณ์ของเราอย่างต่อเนื่อง แนะนำให้ทำการสืบสวนเพิ่มเติม"
 anomaly.2010.name: "สวรรค์แห่งพฤกษศาสตร์"
 anomaly.2010.desc: "การขุดค้นใต้เปลือกน้ำแข็งของ [From.GetName] เผยให้เห็นถ้ำใต้ดินขนาดใหญ่ที่น่าทึ่งมาก เรือนกระจกที่ซ่อนอยู่แห่งนี้คือระบบนิเวศที่เจริญรุ่งเรือง พืชพรรณและสัตว์ป่าที่อุดมสมบูรณ์เติบโตในสภาพแยกตัว ได้รับการปกป้องโดยน้ำแข็งจากสภาพแวดล้อมที่เป็นอันตรายบนพื้นผิวของดาวเคราะห์ ถ้ำรักษาสภาพอากาศย่อยที่มั่นคง ซึ่งน่าจะได้รับการค้ำจุนโดยช่องระบายความร้อนใต้พิภพ"
 anomaly.2010.a: "มีสิ่งให้สำรวจเพิ่มเติมที่นี่"
 anomaly.2010.b: "ละทิ้งโครงการนี้"
 anomaly.2015.name: "ท้าทายทุกความน่าจะเป็น"
 anomaly.2015.desc: "ลึกเข้าไปในถ้ำ เราได้เผชิญกับทุ่งดอกไม้ที่แผ่ขยายกว้างขวาง ทันทีที่การสังเกตการณ์เริ่มต้นขึ้น ทุ่งดอกไม้ทั้งหมดก็เบ่งบานสะพรั่งพร้อมกัน ท่วมท้นห้องโถงด้วยแสงเรืองแสงชีวภาพ(เด็กอ่อน)การวิเคราะห์ทางพฤกษศาสตร์ชี้ว่าสายพันธุ์นี้เบ่งบานเพียงครั้งเดียวในทุก ๆ 100 ล้านปี โดยถูกกระตุ้นโดยการเรียงตัวที่แม่นยำของปัจจัยทางสภาพแวดล้อม\n\nการที่การเดินทางมาถึงของเราประจวบเหมาะกับเหตุการณ์ดังกล่าวท้าทายทุกความน่าจะเป็น แต่ไม่ว่าจะเป็นเพียงเรื่องบังเอิญหรือบางสิ่งมากกว่านั้น มันช่างเป็นประสบการณ์ที่ยอดเยี่ยมอย่างแน่นอน"
 anomaly.2015.a: "การค้นพบที่น่าทึ่งอย่างยิ่ง"
 anomaly.2020.name: "ความลับที่ไม่อาจสำรวจได้"
 anomaly.2020.desc: "เมื่อเดินทางลงลึกเข้าไปในถ้ำ กิจกรรมแผ่นดินไหวจู่ ๆ ก็ทำให้โครงสร้างขาดเสถียรภาพ การสั่นสะเทือนทางธรณีแปรสัณฐานอย่างกะทันหันส่งผ่านผนังถ้ำ คุกคามว่าจะทำให้เกิดการถล่มลงมาในไม่ช้า เมื่อเผชิญกับสภาพการณ์ที่ย่ำแย่ลงอย่างรวดเร็ว เราจึงเริ่มดำเนินการตามระเบียบการอพยพทันที ความลับภายในถ้ำจึงยังคงไม่อาจสำรวจได้"
 anomaly.2020.a: "น่าเสียดาย"
 BOTANICAL_GARDEN_PROJECT: "สำรวจสวรรค์แห่งพฤกษศาสตร์"
 BOTANICAL_GARDEN_PROJECT_DESC: "มีถ้ำใต้ดินขนาดใหญ่อยู่ใต้เปลือกน้ำแข็งของ [From.GetName] เราต้องการส่งคณะสำรวจไปศึกษาการวิจัยสภาพแวดล้อมที่พิเศษนี้เพิ่มเติม"

## A Court of Blossoms
colony.10000.name: "รอยเท้าแปลกประหลาด"
colony.10000.desc: "มีรายงานส่งเข้ามาจากสถานีเกษตรกรรมรอบนอกของเราบน [Root.GetName] ชาวนา [Owner.GetFarmerPlural] หลายรายหายตัวไปอย่างไร้ร่องรอย บ้านเรือนของพวกเขาไม่ได้รับความเสียหายอย่างน่าขนลุก ยกเว้นการปรากฏของรอยเท้าขนาดใหญ่บนดินโดยรอบ\n\nรอยเท้านี้ไม่เหมือนกับสิ่งใด ๆ ที่เคยผ่านการตรวจสอบในการสำรวจดาวเคราะห์ เดินสี่ขา นิ้วเท้ากว้างมีกรงเล็บ และลึกพอที่จะชี้ว่าเป็นสิ่งมีชีวิตที่มีมวลมหาศาล ชาวอาณานิคมกังวลว่าเราอาจกำลังเผชิญหน้ากับนักล่าที่ไม่รู้จัก"

colony.10000.a: "สืบสวนเพิ่มเติม!"
colony.10000.b: "การคาดเดาที่ไร้สาระ กลับไปทำงานได้"

colony.10005.name: "สัตว์ร้ายที่ตายแล้ว"
colony.10005.desc: "การสำรวจป่าพิสูจน์แล้วว่ามีความยากลำบาก ทว่าในที่สุดก็ได้รับผลตอบแทนที่ดี หลังจากหลายวันของการติดตามร่องรอยของสิ่งมีชีวิต ทีมงานของเราได้มาถึงไซต์ที่เต็มไปด้วยความพินาศ: ซากศพของสัตว์ร้ายแสดงให้เห็นถึงเปลือกนอกที่มีสารไคตินหนา สันกระดูกสันหลังที่มีหนาม และหางที่เป็นปล้องลงท้ายด้วยเหล็กในโค้งอันเดียว ร่างกายมีรูพรุนจากการเจาะหลายจุด\n\nถัดจากนั้นไป ซ่อนตัวอยู่ใต้เกราะพรางตัวที่มีประสิทธิภาพสูงของเถาวัลย์เรืองแสงชีวภาพ เครื่องมือของเราตรวจพบสวนโบราณ เสาหินอ่อนพันด้วยไม้เลื้อย ทางเดินหินออบซิเดียนที่ราบเรียบ ทีมงานของเราเข้าใกล้อย่างระมัดระวังจนกระทั่งเราได้เห็นผู้ดูแลสวน: เผ่าพันธุ์มนุษย์โบราณที่มีท่าทางสง่างาม ผิวของพวกเขาเรืองแสงจาง ๆ แม้จะมีรูปลักษณ์ที่กลมกลืนกัน แต่ดอกไม้และเถาวัลย์ก็สร้างม่านบังตาที่มีประสิทธิภาพ เราจำเป็นต้องทะลวงผ่านแผ่นพรางตานี้เพื่อเข้าใกล้ผู้ที่อาศัยอยู่ด้านหลัง"

colony.10005.a: "พยายามทะลวงผ่านระบบพรางตา"

colony.10010.name: "การหายตัวไปอย่างต่อเนื่อง"
colony.10010.desc: "ความถี่ของเหตุการณ์ทวีความรุนแรงมากขึ้น ครั้งนี้รอยเท้าไม่ได้เพียงแค่ผ่านหน้าบ้านเรือนเท่านั้น พวกมันทำลายล้างทะลวงตรงผ่านเข้าไปเลย โครงสร้างอาคารทั้งหมดถูกฉีกออกด้วยพลังที่น่าตกใจ ร่องรอยของการต่อสู้ชี้ว่าเหยื่อถูกนำตัวไปในขณะที่ยังมีชีวิตอยู่และไม่ได้ไปโดยสงบ\n\nชาวอาณานิคมไม่เพียงแค่รู้สึกระส่ำระสายเท่านั้น พวกเขากำลังหวาดกลัวอย่างยิ่ง หลายครอบครัวได้ละทิ้งที่ดินของตนและอพยพเข้าสู่ศูนย์กลางอาณานิคมแล้ว"

colony.10010.a: "ถึงเวลาที่จะต้องหาตัวผู้กระทำความผิดแล้ว"
colony.10010.b: "ความรุนแรงเป็นส่วนหนึ่งของชีวิต"

colony.10015.name: "ศาลแห่งมวลดอกไม้"
colony.10015.desc: "ข้าขอยินดีต้อนรับพวกท่านเหล่านักเดินทาง ในนามของศาลแห่งมวลดอกไม้ ข้าคือราชาพารามิเตอร์หรือที่ญาติมิตรของข้าเรียกข้าว่า 'ผู้มีหัวใจทองคำ' ผู้มีอำนาจเหนือแผ่นดินไม่ใช่ด้วยการใช้กำลังบังคับ แต่ด้วยมรดกและพิธีกรรม ข้าทำหน้าที่เป็นผู้ดูแลโลกใบนี้และผู้นำทางผู้คนของข้า ชาวภาษาอะนาตาริพวกท่านตกใจที่ได้ยินภาษาของตนเองอย่างนั้นรึ? อย่าได้กลัวไปเลย เราได้ศึกษาพวกท่านมาโดยตลอดตั้งแต่วันที่ท่านตัดสินใจเรียก [Root.GetName] ว่าเป็นบ้านของท่าน พวกท่านต้องเป็นผู้คนที่มีพลังอำนาจมากอย่างแน่นอน หากสามารถทะลวงผ่านระบบพรางตาของเราเข้ามาได้ เรารู้สึกเป็นเกียรติอย่างยิ่งที่ได้พบท่าน"

colony.10015.a.question: "ศาลแห่งมวลดอกไม้คืออะไร?"
colony.10015.a.answer: "เราคือศาลแห่งการเบ่งบานอันเป็นนิรันดร์และความรุ่งเรือง วัฒนธรรมของเราภาคภูมิใจในตัวเองโดยไม่ได้นิยามด้วยอาวุธหรือการครอบงำ หากแต่ด้วยความกลมกลืน ซึ่งบรรลุผลผ่านความเข้าใจร่วมกันและความมีเมตตากรุณาภายในตัวตนของพวกเราทุกคน ในศาลแห่งมวลดอกไม้ ประเพณีไม่ใช่สิ่งตกค้าง แต่เป็นกฎหมายของเรา การแบ่งปันเรื่องราว บทเพลง และพืชผลร่วมกับเรา คือการได้สัมผัสวิถีชีวิตของเราในการแลกเปลี่ยนความเข้าใจซึ่งกันและกัน"

colony.10015.b.question: "ท่านสามารถบอกอะไรเราเกี่ยวกับอสูรกายตัวนั้นได้บ้าง?"
colony.10015.b.answer: "สิ่งมีชีวิตที่ท่านเผชิญหน้า ซึ่งเป็นผู้พิทักษ์ที่ยิ่งใหญ่ ครั้งหนึ่งเคยเป็นผู้ปกป้องเรา แต่เมื่อเวลาผ่านไป มันถูกกัดกินโดยความเสื่อมโทรมจากภายใน ซึ่งเกิดจากเชื้อราซอมบี้(จมูก)ที่ฝังตัวอยู่ภายในสมองของมัน กัดเซาะจิตใจและบิดเบือนเป้าหมายของมัน เรายุติความทุกข์ทรมานของมันไม่ใช่ด้วยความโกรธแค้น แต่ด้วยความโศกเศร้า มันไม่ใช่สัตว์ป่าต่างดาว แต่เป็นส่วนหนึ่งของเรา"

colony.10015.c.question: "ท่านต้องการอะไรจากเรา?"
colony.10015.c.answer: "พวกท่านอาจจะพบว่าวิถีทางของเรานั้นแปลกประหลาด พิธีกรรม งานเฉลิมฉลอง บทสวด การพึ่งพากันกับพืชพรรณที่มีความคิดฝัน แต่ขอโปรดเข้าใจสิ่งนี้: การอยู่ร่วมกับเราไม่ได้รับมาโดยง่ายโดยไม่มีข้อผูกมัด ผู้ที่ปฏิเสธที่จะเรียนรู้จะได้รับผลกระทบตามมา นี่คือข้อเสนอของเรา มันไม่ใช่ทั้งการยอมจำนนหรือการควบคุม หากแต่เป็นความเข้าใจร่วมกันและการยอมรับ การเฉลิมฉลอง หากท่านต้องการเช่นนั้น มันคือแก่นแท้ที่บริสุทธิ์ที่สุดของสิ่งที่เรานิยามว่าเป็นความกลมกลืนในหมู่ประชากรของเรา หากท่านเดินบนเส้นทางนั้นร่วมกับเรา ท่านจะไม่ต้องเดินเพียงลำพัง"

colony.10015.a: "เรามาที่นี่เพื่อเรียนรู้"
colony.10015.b: "เรามาที่นี่เพื่อจัดตั้งอาณานิคม"

colony.10016.name: "$colony.10015.name$"
colony.10016.desc: "ในนามของศาลแห่งมวลดอกไม้ทั้งหมด ข้าขอแสดงความขอบคุณอย่างจริงใจสำหรับความร่วมมือของท่าน ขอให้มั่นใจได้เลยว่าผู้ที่ท่านส่งมาหาเราจะได้รับการต้อนรับเสมือนเป็นพวกเดียวกับเรา และจะไม่มีสิ่งใดที่พวกเขาต้องการแล้วไม่ได้"
colony.10016.a: "ดีมาก"

colony.10017.name: "$colony.10015.name$"
colony.10017.desc: "ให้มันเป็นไปตามนั้น การตัดสินใจของท่านเสร็จสิ้นแล้ว และการตัดสินใจของเราก็เช่นกัน ข้าได้เสนอคำแนะนำของข้าไปแล้ว แต่ตอนนี้ท่านต้องแบกรับผลของการเลือกของท่านเอง"
colony.10017.a: "เราจะเตรียมตัวสำหรับสิ่งที่จะเกิดขึ้นตามมา"

colony.10020.name: "การโจมตีอย่างรวดเร็ว"
colony.10020.desc: "ไม่มีการเตือนล่วงหน้า ราชาพารามิเตอร์ปรากฏตัวขึ้นจากใจกลางสวน สวมชุดเกราะพิธีกรรมที่ทอขึ้นจากเถาวัลย์ที่มีชีวิตและดอกไม้เรืองแสงชีวภาพ ด้วยย่างก้าวที่จงใจเดินเลียบขอบอาณานิคม โลกใบนี้เองก็พลันตื่นขึ้น เถาวัลย์เลื้อยขึ้นมาจากดิน ขณะที่กลีบดอกไม้คลี่บานออกราวกับใบมีด อากาศเริ่มหนาแน่นไปด้วยละอองเรณูสีทอง ละเอียดและส่องสว่าง มันเล็ดลอดเข้าสู่ช่องระบายอากาศและปอด ภายในเวลาไม่กี่ชั่วโมง มันได้คร่าชีวิตผู้คนจำนวนมาก ก่อให้เกิดอาการชัก ความบ้าคลั่ง และในที่สุดคือความตาย\n\nการแทรกแซงของระบบป้องกันอาณานิคมอัตโนมัติเท่านั้นที่สามารถกำราบเขาลงได้ในที่สุด ราชาพารามิเตอร์ล้มลงโดยไม่มีคำพูดใด ๆ ผู้เห็นเหตุการณ์กล่าวว่าสายตาสุดท้ายของเขาไม่ได้มีความโกรธแค้น แต่เป็นความผิดหวังที่ลึกซึ้งและเคร่งขรึม\n\nในจุดที่เคยเป็นศาลแห่งมวลดอกไม้ หน่วยลาดตระเวนของเราพบเพียงผืนป่า ราวกับว่าอาณาจักรได้พับเก็บตัวเองกลับคืนสู่ผืนดิน นำเอาความลับและความโศกเศร้าของมันกลับไปด้วย"

colony.10020.a: "บทจบอันขมขื่น"

colony.10025.name: "หนึ่งในพวกเขา"
colony.10025.desc: "เราได้จมดิ่งเข้าสู่วิถีทางของชาวภาษาอะนาตาริเมื่อเราเข้าร่วมในพิธีกรรมทางศาสนาและปรับตัวเข้ากับพิธีกรรมที่แปลกประหลาดของพวกเขา รูปแบบต่าง ๆ ก็เริ่มปรากฏขึ้นขณะที่ความหมายหยั่งรากลึก\n\nในระหว่างพิธีกรรมร่วมกันยามค่ำคืนที่มุ่งเน้นไปที่วงจรชีวิตที่ยืนยาวและความอุดมสมบูรณ์ ชาวภาษาอะนาตาริเริ่มเปิดเผยเศษเสี้ยวของประวัติศาสตร์ที่ถูกลบเลือน ประชาชนพูดถึงความเสื่อมโทรมโบราณที่คงอยู่ยาวนานซึ่งครั้งหนึ่งเคยปกคลุมดาวเคราะห์ดวงนี้ และยังคงควบคุมเหนือชาวภาษาอะนาตาริในปัจจุบัน"

colony.10025.a: "มีเรื่องให้พูดคุยกันอีกมาก"

colony.10026.name: "ราชาพารามิเตอร์"
colony.10026.desc: "เคยมีช่วงเวลาหนึ่ง นานก่อนที่พวกท่านจะก้าวเท้าลงบนดินผืนนี้ เมื่อเรา ชาวภาษาอะนาตาริทำหน้าที่เป็นผู้ดูแลที่มีเกียรติ เราหล่อหลอมโลกนี้ให้สอดรับกับจังหวะลมหายใจของมัน นำทางระบบนิเวศ ปรับสมดุลกระแสน้ำ ดูแลโลกที่มีชีวิตเสมือนการดูแลสวนด้วยความอดทนอันไม่มีที่สิ้นสุด ทว่าความสมดุลไม่อาจคงอยู่โดยปราศจากการท้าทายได้ยาวนานนัก"

colony.10026.a.question: "ใครหรือสิ่งใดที่ทำลายสมดุลนี้?"
colony.10026.a.answer: "จากเบื้องล่างรากฐานของประวัติศาสตร์ สิ่งมีชีวิตที่เราเรียกว่า 'อมตะทมิฬ'(ความเป็นอมตะ)'ได้ถือกำเนิดขึ้น พลังงานที่ไม่ได้เกิดมาหรือมีขอบเขตจำกัด ในตอนแรกเราเชื่อว่ามันมาอย่างสันติ ดังนั้นเราจึงเปิดประตูต้อนรับมัน เชิญชวนเข้ามาเพื่อการแลกเปลี่ยนร่วมกัน แต่เมื่อเข้ามาในพรมแดนของเราแล้ว มันก็ปลดปล่อยพลังทั้งหมดของมันใส่เรา ทำให้เราตกเป็นทาสในทันที ตอนนี้เรากำลังเน่าเปื่อยจากภายใน เรากำลังค่อย ๆ เหี่ยวเฉาไปทีละน้อย"

colony.10026.b.question: "เรามีบทบาทอย่างไรในเรื่องนี้?"
colony.10026.b.answer: "พวกท่าน [Owner.GetSpeciesNamePlural] แบกรับความแข็งแกร่งที่เราได้สูญเสียไปนานแล้ว พลังชีวิตที่ไม่ผูกมัดกับประวัติศาสตร์ของเรา ดังนั้นข้าจึงไม่ได้ถามในฐานะกษัตริย์ผู้ปกครอง แต่ในฐานะเศษซากที่เหลืออยู่ของทุกสิ่งในอดีต ท่านจะช่วยเหลือเราได้หรือไม่? แหล่งที่มาของการมีอยู่นี้เติบโตขึ้นในแต่ละวงจรที่ผ่านไป และข้าไม่แน่ใจว่าชาวภาษาอะนาตาริจะยังทนต่อความเสื่อมโทรมนี้ได้นานเพียงใด"

colony.10026.c.question: "ท่านต้องการให้เราทำอะไร?"
colony.10026.c.answer: "จะต้องเผชิญหน้ากับอมตะทมิฬ นานมาแล้ว วีรบุรุษผู้ยิ่งใหญ่คนหนึ่งได้พยายามและเสียชีวิตลง ทว่าในการเสียชีวิตนั้น นางได้ฉีกเอาเศษเสี้ยวแก่นแท้ของมันออกมา บางทีพวกท่านอาจจะสามารถถอดรหัสและระบุตำแหน่งของสิ่งที่สอดคล้องกันที่อื่นบน [Root.GetName] เทคโนโลยีของพวกท่านอาจแข็งแกร่งพอที่จะทำลายระบบพรางตาของมันได้\n\nการรวมพลังกันเท่านั้นคือความหวังในการรอดชีวิตของเรา โปรดรับรู้ไว้ว่า: ความล้มเหลวหมายถึงสิ่งอื่นที่มากกว่าการล่มสลายของภาษาอะนาตาริหรือจุดจบของอาณานิคมของท่าน หากปล่อยไว้โดยไม่ควบคุม การมีอยู่นี้อาจกัดกินตัวดาวเคราะห์เองทั้งหมด"

colony.10026.a: "เราต้องหยุดยั้งอมตะทมิฬผู้นี้ลงให้ได้"
colony.10026.b: "เราไม่สามารถเชื่อใจกษัตริย์ที่อ้างตัวคนนี้ได้"

colony.10027.name: "หน่ออ่อนแห่งความคลางแคลงใจ"
colony.10027.desc: "สิ่งที่เริ่มต้นจากการแลกเปลี่ยนอย่างสันติได้แปรเปลี่ยนไปในแง่มุมที่ซ่อนเร้นและน่ากังวลยิ่งขึ้น การเข้าร่วมในพิธีกรรมของภาษาอะนาตาริส่งผลให้รายงานเกิดความล่าช้า ความทรงจำแตกกระจาย และความฝันแปรปรวน ราชาพารามิเตอร์ยังคงมีอัธยาศัยดี แต่ทวีการหลบเลี่ยงมากขึ้นเมื่อถูกถามถึงเป้าหมายที่แท้จริงของพิธีกรรมเหล่านี้ คำอธิบายของเขาแม้จะไพเราะ แต่บ่อยครั้งมักเบี่ยงเบนความสนใจจากการถามโดยตรง แม้แต่สมญานาม 'ผู้มีหัวใจทองคำ' ของเขาก็ไม่ปรากฏในหลักคำสอนใด ๆ ของภาษาอะนาตาริบางคนชี้ว่าพิธีกรรมเหล่านี้ไม่ได้ทำหน้าที่เพียงแค่ประสานวัฒนธรรมร่วมกัน แต่เป็นเครื่องมือปรับเทียบจิตวิทยา\n\nไม่ว่าจะใช้วิธีการใด ผลลัพธ์ที่ได้นั้นชัดเจน: เรากำลังถูกดึงเข้าข้างเดียวกับพารามิเตอร์และพวกพ้องของเขา เมื่อเขาพูดถึงอมตะทมิฬ มันให้ความรู้สึกเหมือนหน้าที่ศักดิ์สิทธิ์ในการช่วยเหลือพันธมิตรที่รักที่สุดของเราอย่างชาวภาษาอะนาตาริมากกว่าการร้องขอจากคนนอก"

colony.10027.a: "แน่นอนว่าพวกเรากำลังจะช่วยเหลือท่าน"
colony.10027.b: "พอทีกับเรื่องไร้สาระพวกนี้!"

colony.10030.name: "สิ่งที่มีอยู่เหนือความตาย"
colony.10030.desc: "ปฏิบัติการของเราเป็นไปอย่างรวดเร็ว กองกำลังติดอาวุธแทรกซึมเข้าไปในศาลแห่งมวลดอกไม้ ราชาพารามิเตอร์กำลังทำสมาธิอยู่ในสวนเมื่อเราเข้าโจมตี แต่กษัตริย์ไม่ได้ล้มลงโดยง่าย ผู้เห็นเหตุการณ์บรรยายถึงการปลดปล่อยความโกรธเกรี้ยวของพฤกษชาติที่น่ากลัว เถาวัลย์พุ่งทะลุจากหิน โครงสร้างดอกไม้กรงเล็บกรีดผ่านเหล็กกล้า ในตอนที่กษัตริย์ถูกกำราบ สวนก็ชุ่มไปด้วยเลือดเรืองแสงและเถ้าถ่าน\n\nสิ่งที่หลงเหลืออยู่ใต้สวนสร้างความประหลาดใจให้เราอย่างยิ่ง เนื่องจากเป็นห้องนิรภัยของขุมทรัพย์ทางชีวภาพ: ความรู้โบราณ วิศวกรรมพฤกษศาสตร์ และคลังข้อมูลพันธุกรรมจากวงจรการเก็บเกี่ยวที่นับไม่ถ้วน ผืนดินซึ่งในตอนนี้หลุดพ้นจากผู้ดูแลโบราณแล้ว มีความอุดมสมบูรณ์มากกว่าผืนดินใด ๆ ที่เคยพบบนดาวเคราะห์ดวงนี้ เราอาจจะกำลังเข้าสู่ยุคทองแห่งความอุดมสมบูรณ์"

colony.10030.a: "มันเป็นหนทางเดียวที่มี"

A_CRYPTIC_ESSENCE_PROJECT: "การวิจัยแก่นแท้"
A_CRYPTIC_ESSENCE_PROJECT_DESC: "ราชาพารามิเตอร์ได้มอบหมายเศษเสี้ยวแก่นแท้ของอมตะทมิฬให้แก่เรา การศึกษาแก่นแท้ของมันจะช่วยให้เราสามารถเปิดเผยตำแหน่งรังของมันและหาวิธีทำลายการยึดครองเหนือชาวภาษาอะนาตาริได้"

THE_CRYPTIC_ESSENCE_PROJECT: "$A_CRYPTIC_ESSENCE_PROJECT$"
THE_CRYPTIC_ESSENCE_PROJECT_DESC: "$A_CRYPTIC_ESSENCE_PROJECT_DESC$"

colony.10035.name: "อมตะทมิฬ"
colony.10035.desc: "คณะนักวิทยาศาสตร์ถอดรหัสแก่นแท้ได้สำเร็จและระบุตำแหน่งของอมตะทมิฬได้ที่ยอดเขาอันรกร้างแห่งหนึ่ง หลังจากนั้นไม่นาน ทีมสำรวจได้เดินทางไปถึงที่ราบสูงของภูเขา และพบว่าสถานที่นั้นถูกยึดครองอยู่\n\nณ จุดศูนย์กลาง มีร่างของผู้สร้างการทดสอบตระหง่านอยู่: อมตะทมิฬ สิ่งมีชีวิตที่มีต้นกำเนิดที่ไม่อาจเข้าใจได้ รูปร่างของมันคือการหลอมรวมที่ไร้เสถียรภาพของพลาสมา ควัน กระดูก และสสารที่ออกฤทธิ์ทางพลังจิต (psionically active) เสียงของมันข้ามผ่านเสียงสะท้อนปกติ โดยมาปรากฏโดยตรงในโครงสร้างระบบประสาทของสมาชิกในทีมทุกคนที่อยู่ที่นั่น\n\n'พวกเจ้ามาเพื่อยอมจำนนอย่างนั้นรึ เจ้า [Owner.GetSpeciesNamePluralInsult] ตัวน้อย?' มันเอ่ยออกมาอย่างช้า ๆ น้ำเสียงทางความคิดเจือไปด้วยการล้อเลียน 'ชาว Anathari คือสมบัติล้ำค่าที่สุดของข้า แต่ข้าเสนอโอกาสให้พวกเจ้า จงเข้าร่วมการทดสอบและพิสูจน์ตัวเองว่าคู่ควรกับการยอมรับของข้า'"

colony.10035.a: "เรายอมรับคำท้าของท่าน"
colony.10035.a.tt: "เริ่มการทดสอบความกล้าหาญ"
colony.10035.b: "เราปฏิเสธคำท้า เข้าโจมตีทันที"

colony.10040.name: "การทดสอบความกล้าหาญ"
colony.10040.desc: "ชาวอาณานิคมคนหนึ่งถูกส่งตัวไปยังถ้ำที่ลึกเข้าไปในภูเขา โดยมีอมตะทมิฬนำทาง สัตว์ร้ายขนาดใหญ่รอคอยอยู่ในมุมที่มืดที่สุด สิ่งมีชีวิตดังกล่าวคล้ายกับสัตว์จำพวกครัสเตเชียน (ปู/กุ้ง) ที่มีขนาดใหญ่โตอย่างเป็นไปไม่ได้ เปลือกของมันแวววาวไปด้วยแร่ธาตุแปลกประหลาดและโลหะผสมโบราณ มันแสดงท่าทีราวกับกำลังปกป้องอาณาเขตของตน เคลื่อนไหวด้วยการประสานงานที่น่าขนลุกซึ่งบ่งบอกถึงสติปัญญาในระดับที่น่าประหลาดใจ"

colony.10040.a: "พยายามสังหารสัตว์ร้ายตัวนั้น"
colony.10040.a.militarist: "เผามันให้วอดวาย"
colony.10040.b: "พยายามหลอกล่อสัตว์ร้าย"

colony.10045.name: "ผ่านการทดสอบความกล้าหาญสำเร็จ"
colony.10045.desc: "เหล็กกล้าปะทะเปลือกหอยในถ้ำที่มืดมิดในขณะที่ชาวอาณานิคมผู้ถูกเลือกพุ่งตัวเข้าสู่หุบเหวลึก\n\nสัตว์จำพวกครัสเตเชียนขนาดยักษ์ตอบสนองทันที กรงเล็บของมันกรีดผ่านหิน ร่างกายอันใหญ่โตสั่นคลอนขุนเขา ทว่าชาวอาณานิคมพร้อมอยู่แล้ว การล่อมันเข้าสู่ทางเดินที่แคบลง ช่วยให้ล่อทิศทางการเคลื่อนไหวของมันได้ โดยโจมตีไปที่ข้อต่อและจุดประสานประสาทสัมผัสที่ได้รับการระบุไว้ล่วงหน้า\n\nเมื่อฝุ่นผงจางลง สิ่งมีชีวิตนั้นก็นอนนิ่ง การสั่นสะเทือนครั้งสุดท้ายสะท้อนผ่านภูเขาดั่งเสียงฟ้าร้อง ชาวอาณานิคมก้าวออกมา มีร่างกายที่เปรอะเปื้อนไปด้วยเลือดและฝุ่นผง แต่ยังมีชีวิตรอด\n\nอมตะทมิฬพยักหน้าช้า ๆ ราวกับจะแสดงการยอมรับในการกระทำที่เสี่ยงอันตรายของชาวอาณานิคม การทดสอบความกล้าหาญเสร็จสิ้นลงแล้ว"

colony.10045.a: "ให้เราดำเนินการต่อ..."
colony.10045.a.tt: "เริ่มการทดสอบปัญญา"

colony.10046.name: "$colony.10045.name$"
colony.10046.desc: "การต่อสู้ไม่เคยเป็นกลยุทธ์ที่ใช้ได้จริง ชาวอาณานิคมสังเกตทิศทางการเคลื่อนไหวของสัตว์จำพวกครัสเตเชียน การเกลียดแสง ความไวต่อการสั่นสะเทือนเป็นพิเศษ และที่สำคัญที่สุดคือความตาบอดของมัน มันตอบสนองต่อเสียงเท่านั้น ทุกการเคลื่อนไหวเป็นการตอบสนองต่อเสียงสะท้อนและการโจมตี ชาวอาณานิคมจึงกำหนดแผนการที่ไม่ใช่การปะทะ แต่เป็นการลวงทิศทาง\n\nชาวอาณานิคมขว้างก้อนหินหลายก้อนใส่เสากลางของห้อง เมื่อเสียงดังก้องกังวาน สัตว์ร้ายก็ตอบสนองทันที พุ่งเข้าใส่จุดกำเนิดเสียง\n\nเสากลางแตกละเอียด ส่งผลให้เพดานของห้องพังทลายลงมา ชาวอาณานิคมพบที่หลบภัยในช่องแคบ ๆ ซึ่งช่วยปกป้องจากหินที่ร่วงหล่นลงมาบางส่วน สัตว์จำพวกครัสเตเชียนถูกฝังอยู่ใต้หินหลายตัน ถูกกักขังและเงียบเสียงลง\n\nอมตะทมิฬดูเหมือนจะชื่นชมความฉลาดและไหวพริบของชาวอาณานิคม การทดสอบความกล้าหาญเสร็จสิ้นลงด้วยความสำเร็จ"

colony.10047.name: "สอบตกการทดสอบความกล้าหาญ"
colony.10047.desc: "กรงเล็บของสัตว์ร้ายนั้นรวดเร็วดั่งสายฟ้าและส่งเสียงครางเบา ๆ ในความมืดของถ้ำ ทุกย่างก้าวพร่าเลือน ทุกการโจมตีมาพร้อมกับชีพจรความถี่ต่ำที่ทำให้หินสั่นไหว\n\nชาวอาณานิคมเคลื่อนไหวอย่างระมัดระวัง พิจารณาทางเลือกของพวกเขา การแกล้งทำ ล่อลวง พยายามฟัน หรืออาจเป็นการเบี่ยงเบนความสนใจ ทว่าสิ่งมีชีวิตนั้นปรับตัวได้เร็วกว่าที่คาด การโจมตีครั้งต่อมาของมันบรรลุผล และถ้ำก็สว่างขึ้นด้วยการระเบิดของความโกรธเกรี้ยวที่เรืองแสงชีวภาพ\n\nเมื่อฝุ่นจางลง ชาวอาณานิคมก็นอนสิ้นใจ เราล้มเหลวในการทดสอบแล้ว"

colony.10047.a: "ความพยายามที่อาจหาญยิ่ง"

colony.10050.name: "การทดสอบปัญญา"
colony.10050.desc: "เสียงหนึ่ง ตอนแรกสั่นสะท้านและไม่แน่นอน เริ่มก่อตัวขึ้นภายในห้องโถง ในไม่ช้า ก็ราวกับว่าตัวก้อนหินเองกำลังพูดอยู่:\n\n§H'ข้าถูกหล่อหลอมในความเงียบงัน ไม่ใช่การพิชิตหรือรหัสข้อบังคับ,\nสัญญาที่ไม่ได้เอ่ยคำ ที่คอยกัดเซาะความแค้นแต่หนหลัง\nไม่มีเครื่องยนต์ใดขับเคลื่อนข้า ไม่มีจิตใจใดสั่งการ,\nทว่าข้าช่วยให้ดวงดารามั่นคงด้วยมือที่มองไม่เห็น\nน้อยคนนักจะเห็นข้ามา แต่ทุกคนล้วนสัมผัสถึงความเปลี่ยนแปลง\nความสงบนิ่ง ณ จุดที่ความโกลาหลเคยครองอาณาเขต'§!"

colony.10050.a: "คำตอบคือ 'การขึ้นสู่เบื้องบน(เสียงปรบมือ)"
colony.10050.b: "คำตอบคือ 'ความกลมกลืนแห่งกาแล็กซี(Galactic Harmony)'."

colony.10055.name: "สอบตกการทดสอบปัญญา"
colony.10055.desc: "เมื่อสิ้นเสียงคำพูดจาก [Owner.Species.GetMouthName] ของชาวอาณานิคม แสงสว่างก็หรี่มัวลง เสียงของอมตะทมิฬดังทำลายความสงบนิ่งขึ้นว่า: 'เจ้าพวก [Owner.GetSpeciesNameInsult]' มันกล่าว 'ไม่ใช่ทุกอย่างจะหาคำตอบได้ด้วยความกระหายในอำนาจอย่างบ้าคลั่งหรอกนะ'\n\nในชั่วพริบตานั้น ชาวอาณานิคมก็ถูกโจมตี ไม่มีอาวุธหรือเปลวไฟใด ๆ เข้าแผดเผาพวกเขา มีเพียงความกดดันและความเงียบงัน พวกเขาล้มลงโดยไม่มีเสียงใด ๆ และห้องโถงก็กลืนกินร่างนั้นเข้าไปทั้งร่าง เราล้มเหลวในการทดสอบแล้ว"

colony.10060.name: "ผ่านการทดสอบปัญญาสำเร็จ"
colony.10060.desc: "ชาวอาณานิคมชะงักไปหลังจากเอ่ยคำพูดออกไป โดยหวังว่าจะได้เสนอคำตอบที่ถูกต้อง ห้องโถงส่งเสียงคำรามแสดงการยอมรับ และอมตะทมิฬดูเหมือนจะพึงพอใจเป็นอย่างยิ่ง\n\n'เจ้าเข้าใจแล้ว' ข้อความของมันดังขึ้น 'การทดสอบทั้งหมดไม่ใช่แค่เรื่องของกำลังหรืออำนาจ บางอย่างต้องการเพียงแค่ความกล้าหาญที่จะเปิดใจของตนเอง'\n\nแสงสว่างที่อ่อนโยนส่องประกายทั่วห้องขณะที่ปริศนาจางหายไป การทดสอบประสบความสำเร็จ และเส้นทางไปข้างหน้ากำลังรออยู่"

colony.10060.a: "เราต้องก้าวต่อไป..."
colony.10060.a.tt: "เริ่มการทดสอบการเสียสละ"

colony.10065.name: "การทดสอบการเสียสละ"
colony.10065.desc: "ชาวอาณานิคมคนหนึ่งก้าวออกไปเพื่อเผชิญหน้ากับการทดสอบ และถูกพัดพาขึ้นไปยืนบนแท่นยกพื้นสีเข้มขนาดใหญ่ ณ ใจกลาง: เก้าอี้หินออบซิเดียนสองตัวและโต๊ะเตี้ยตัวยาว มีอาวุธชิ้นหนึ่งวางอยู่บนนั้น ดาบโค้งที่งดงามประณีต เมื่อชาวอาณานิคมหยิบมันขึ้นมาด้วย [Owner.Species.GetHandName] ข้างหนึ่ง มันก็ส่งเสียงครางเบา ๆ ด้วยพลังงาน\n\nเก้าอี้ตัวหนึ่งมีราชาพารามิเตอร์นั่งอยู่ ถูกมัดไว้ไม่ใช่ด้วยเชือก แต่ด้วยสายใยแสงของพลังงานธาตุ สีหน้าของเขาอ่านไม่ออก ไม่แสดงทั้งความกลัวหรือความสงบ มีเพียงความนิ่งเฉย ส่วนเก้าอี้อีกตัวว่างเปล่า\n\nจากนั้นมีเสียงพูดเข้ามาในจิตใจของชาวอาณานิคมอีกครั้ง\n\n'ดาบเล่มนี้เคยลิ้มรสของทั้งราชาและคนขลาดเขลามาแล้วเช่นกัน' อมตะทมิฬกระซิบ 'เพื่อที่จะผ่านการทดสอบนี้ จะต้องมีหนึ่งชีวิตที่ถูกพรากไป จงปลิดหัวใจของผู้นำภาษาอะนาตาริหรือจะสังเวยชีวิตตัวเอง ทางเลือกเป็นของเจ้า หากเลือกผิด... การทดสอบนี้จะจบลง'"

colony.10065.a: "ลาก่อน องค์ราชา"
colony.10065.b: "พวกเราจะเป็นฝ่ายเสียสละเอง"

colony.10070.name: "ผ่านการทดสอบการเสียสละสำเร็จ"
colony.10070.desc: "ชาวอาณานิคมยืนอยู่ต่อหน้าร่างที่ถูกพันธนาการของราชาพารามิเตอร์เงียบงัน ไม่เคลื่อนไหว ดาบวางรออยู่บนโต๊ะหินออบซิเดียน อมตะทมิฬไม่ได้ให้คำแนะนำใด ๆ\n\nชาวอาณานิคมหยิบดาบขึ้นมาแล้วแทงตรงเข้าไปที่หน้าอกของพารามิเตอร์อย่างรวดเร็วและเด็ดขาด เขาไม่ได้ร้องออกมาเลย มีเพียงเสียงระฆังโลหะแผ่วเบา คล้ายเสียงระฆังดังมาจากแดนไกล\n\nราชาพารามิเตอร์เงยหน้าขึ้น ดวงตาสงบนิ่ง ตัวดาบที่จมมิดด้ามไม่ได้ทิ่มแทงเนื้อหนัง ทว่ากลับเป็นสิ่งอื่นอย่างสิ้นเชิง หน้าอกของเขาเปล่งประกายจาง ๆ เต้นเป็นจังหวะด้วยแสงสีทอง สมกับเป็นราชาพารามิเตอร์ผู้มี 'หัวใจทองคำ' จริง ๆ...\n\nพันธนาการรอบตัวราชาละลายหายไปและแท่นยกพื้นก็เลือนหาย อมตะทมิฬพูดเข้ามาในใจของเราอีกครั้ง: 'เจ้าผ่านไปได้'"

colony.10070.a: "ช่างเป็นผลลัพธ์ที่น่าอัศจรรย์ใจยิ่งนัก"

colony.10075.name: "สอบตกการทดสอบการเสียสละ"
colony.10075.desc: "ชาวอาณานิคมมองไปที่ราชาพารามิเตอร์ดาบอยู่ในมือ ราชาพารามิเตอร์นั่งนิ่ง สายตาที่อ่อนโยนของเขาไม่ได้แสดงการอ้อนวอนหรือการอนุญาตใด ๆ ชาวอาณานิคมลังเล จากนั้นจึงหันปลายดาบเข้าหาตัวเอง\n\nเสียงสูดหายใจเข้าอย่างแรง และชาวอาณานิคมก็ล้มลง ดาบส่งเสียงกระทบพื้นหินออบซิเดียน ทางเลือกนั้นชัดเจน: เพื่อละเว้นชีวิตผู้นำภาษาอะนาตาริและแบกรับภาระไว้เพียงลำพัง\n\nทว่าคำพูดของอมตะทมิฬส่งมาถึงโดยไม่มีทั้งความโกรธแค้นหรือความยินดี: 'ความเมตตาไม่ใช่การล้างบาป ดาบนี้ไม่ได้มีไว้สำหรับตนเองตั้งแต่แรกแล้ว'\n\nหยดน้ำตาที่เงียบงันไหลรินลงบนใบหน้าของราชาพารามิเตอร์ด้วยเจตนาที่ดีที่สุด เรากลับกำหนดชะตากรรมของประชาชนของเขาไว้แล้ว...\nการทดสอบสิ้นสุดลงไม่ใช่ด้วยความรุ่งโรจน์ แต่เป็นความโศกเศร้า ชาวอาณานิคมเสียชีวิต และเส้นทางไปข้างหน้าถูกปิดผนึกอย่างถาวร"

colony.10080.name: "ความปรารถนาส่วนลึกที่สุด"
colony.10080.desc: "อมตะทมิฬยืนอยู่ต่อหน้าเรา ไม่เปลี่ยนแปลง ไม่อาจรู้จักได้ รูปร่างของมันเป็นโครงเงาตัดกับแผ่นหิน ขนาดมหึมาแต่ไม่ชัดเจน ราวกับว่ามันเป็นของมิติความจริงที่เหลื่อมซ้อนกับเราเพียงครึ่งเดียว มันไม่ส่งเสียงใด ๆ แทนที่จะเป็นเช่นนั้น การมีอยู่ของมันผลิบานขึ้นภายในใจของเรา ความคิดแต่ละอย่างไม่ได้ส่งผ่านมาเป็นคำพูด แต่เป็นสิ่งที่ไม่อาจหลีกเลี่ยงได้\n\nท่ามกลางความเงียบงัน อมตะทมิฬส่งผ่านความคิด แผ่วเบาและเกือบจะแสดงความพึงพอใจ: 'เจ้าได้รับการยอมรับจากข้าแล้ว เจ้า [Owner.GetSpeciesNamePlural] ตัวน้อย เจ้าทำให้ข้าประทับใจ ตอนนี้จงเอ่ยมา ความปรารถนาของพวกเจ้าคือสิ่งใด?'"

colony.10080.a: "ออกจากดาวเคราะห์ดวงนี้ ไปตลอดกาล"
colony.10080.b: "ทำลายล้างชาวภาษาอะนาตาริให้สิ้นซาก"

colony.10081.name: "ความสำเร็จอันยิ่งใหญ่"
colony.10081.desc: "มีการหยุดชะงักไปชั่วครู่ ความเงียบงันที่ทอดยาวผ่านความคิดและกาลเวลา แต่แล้วก็มีความเห็นพ้องที่เงียบเชียบ 'ชาวภาษาอะนาตาริไม่ใช่ผู้ที่ข้าต้องเฝ้าดูอีกต่อไป' อมตะทมิฬกล่าว 'พวกเจ้าผูกพันกันแล้วในตอนนี้' เมื่อสิ้นเสียงนั้น มันก็อันตรธานหายไป ไม่มีแสงหรือเสียง มีเพียงการเปลี่ยนแปลงของอากาศ และความรู้สึกว่าสิ่งขนาดยิ่งใหญ่บางอย่างได้จากไปแล้ว\n\nในวงจรชีวิตที่ตามมาหลังจากการปฏิสัมพันธ์ครั้งแรก การผสานข้ามสายพันธุ์ระหว่างชาวอาณานิคมและชาวภาษาอะนาตาริทวีความเข้มข้นขึ้น พืชผลเจริญเติบโตงอกงามอย่างกว้างขวาง และเมืองต่าง ๆ ถูกสร้างขึ้นอย่างกลมกลืนกับผืนแผ่นดิน พืชพรรณและเทคโนโลยีก้าวเดินเคียงข้างกัน เป็นครั้งแรกในรอบหลายศตวรรษที่ [Root.GetName] เจริญรุ่งเรือง บรรยากาศไม่ได้แบกรับความขัดแย้งอีกต่อไป แต่ได้รับการปรับเทียบใหม่เพื่อสันติภาพ"

colony.10081.a: "ความสำเร็จอันยิ่งใหญ่"

colony.10082.name: "สายฝนแห่งกลีบดอกไม้สีทอง"
colony.10082.desc: "'ตามที่เจ้าปรารถนา'\n\nอมตะทมิฬถอนตัวออกจากความคิดของเรา และพร้อมกับสิ่งนั้น บางสิ่งที่เป็นแก่นแท้ก็พลันแปรเปลี่ยน ชาวอาณานิคมรู้สึกสั่นสะท้านอย่างลึกซึ้งและปั่นป่วนในกระดูกสันหลัง ทั่วทั้งดาวเคราะห์ ชาวภาษาอะนาตาริเริ่มล้มลง ไม่มีรายงานเสียงกรีดร้อง ไม่มีการดิ้นรน มีเพียงเสียงสบัดแผ่วเบาของเสื้อคลุมที่พับตัวกลายเป็นฝุ่นผง ราวกับกลีบดอกไม้ที่ร่วงหล่นท่ามกลางเสียงกระซิบของสายลม\n\nภายในห้องโถง ราชาพารามิเตอร์รั้งอยู่ต่ออีกชั่วขณะหนึ่ง ดวงตาของเขาเบิกกว้างด้วยความรู้สึกถูกหักหลังและผิดหวังอย่างที่สุดต่อเผ่าพันธุ์ [Owner.GetSpeciesNamePlural] เขาไม่ได้ยกมือขึ้น ไม่เอ่ยคำอ้อนวอนใด ๆ ดอกไม้สีทองดอกเดี่ยวร่วงหล่นจากแขนเสื้อของเขาลงสู่พื้นถ้ำ และแล้วเขาก็อันตรธานหายไปด้วยเช่นกัน ไม่มีการไว้ทุกข์ หรือการโล่งใจ มีเพียงความว่างเปล่าของสิ่งที่เคยมีอยู่ ประชาชน บทเพลง อารยธรรม ถูกกวาดล้างไปจาก [Root.GetName]\n\nอมตะทมิฬดูเหมือนจะพึงพอใจ"

colony.10082.a: "เราไม่เคยต้องการพวกเขาอยู่แล้ว"

colony.10085.name: "ความล้มเหลวอันยิ่งใหญ่"
colony.10085.desc: "ชาวอาณานิคมได้เดินตามเส้นทางสู่ภาษาอะนาตาริทว่าในท้ายที่สุด มันยังไม่เพียงพอ การทดสอบล้มเหลว อมตะทมิฬยังคงอยู่ การมีอยู่ของมันตระหง่านครอบคลุมทั่วแผ่นดินเสมือนความเสื่อมโทรมโบราณ\n\nราชาพารามิเตอร์จำต้องกลับคืนสู่ศาลแห่งมวลดอกไม้ ไม่ใช่ในฐานะมิตร แต่เป็นข้ารับใช้ของอมตะทมิฬอีกครั้ง ราชาที่แตกสลายในอาณาจักรที่ผุพัง ชาวอาณานิคมของเราจะได้รับอนุญาตให้อยู่บนดาวเคราะห์นี้ต่อไป ได้รับการยอมรับให้อยู่ร่วม แต่จะไม่ได้รับความไว้วางใจอีกเลย\n\n'พวกเจ้าปรารถนาจะปลดปล่อยพวกเขา เจ้า [Owner.GetSpeciesNamePluralInsult]' อมตะทมิฬส่งเสียงก้องในหัวของเรา 'ทว่าพวกเจ้าไม่คู่ควร'"

colony.10085.a: "ไม่มีอะไรเหลือให้เสียแล้ว เตรียมพร้อมการโจมตีของเรา"
colony.10085.b: "ทำลายล้างชาวภาษาอะนาตาริเราจะกลายเป็นข้ารับใช้ที่ภักดีของท่านเอง"
colony.10085.c: "ถอยทัพกลับไปยังอาณานิคม"

colony.10086.name: "สงครามคือคำตอบเดียว"
colony.10086.desc: "พวกเรารู้ว่าพลังอำนาจของอมตะทมิฬนั้นยิ่งใหญ่มาก การจู่โจมของเราเกิดขึ้นในทันทีและรุนแรง ถ้ำสั่นสะเทือนเมื่ออมตะทมิฬแผดเสียงกรีดร้องก้องกังวาน\n\nแม้ว่ากองกำลังของเราจะได้รับความเสียหายอย่างหนัก แต่เราก็สามารถสะกดอมตะทมิฬไว้ได้ ถ้ำส่งเสียงโหยหวน และอากาศก็แตกออกราวกับกระดูกที่ปริแยก จากนั้นอมตะทมิฬก็หายไป\n\nหลังจากนั้น ราชาพารามิเตอร์เข้าพบผู้รอดชีวิต เขาเดินเข้ามาหาชาวอาณานิคมและโค้งคำนับอย่างลึกซึ้ง สำหรับทุกสิ่งที่สูญเสียไป ฝันร้ายได้สิ้นสุดลงแล้ว"

colony.10086.a: "ท้ายที่สุดเราก็ช่วยดาวเคราะห์ดวงนี้ไว้ได้สำเร็จ"

colony.10087.name: "วิถีแห่งข้ารับใช้"
colony.10087.desc: "ทั่วทั้งดาวเคราะห์ ชาวภาษาอะนาตาริเริ่มอ่อนกำลังลง เนื้อหนัง กระดูก ความทรงจำ: ทุกอย่างที่พวกเขาเคยเป็นเริ่มเลือนหายไป ราชาพารามิเตอร์เป็นคนสุดท้าย เมื่อถึงเวลาของเขา เขาไม่ได้พูดอะไร ชาวอาณานิคมรายงานการสิ้นสุดของเขาว่าเป็นแสงวาบและวงแหวนแห่งกลีบดอกไม้สีทอง\n\nสิ่งเดียวที่เหลืออยู่คืออมตะทมิฬ เรารู้สึกว่ามันเข้ามาตั้งถิ่นฐานในพื้นที่ว่างเปล่าภายในจิตใจของเรา บางสิ่งที่มืดมนและโบราณได้ชอนไชเข้ามาในตัวเรา การถ่ายโอนข้อมูลที่เชื่องช้าและสมบูรณ์ จากอมตะทมิฬสู่พวกเรา จากสิ่งที่เคยมีอยู่สู่สิ่งที่เป็นอยู่ ณ ตอนนี้\n\nชาวอาณานิคมของเราไม่ได้เป็นเพียงแค่ [Owner.GetSpeciesNamePlural] อีกต่อไป แต่กลายเป็นสิ่งอื่นในตอนนี้ บางสิ่ง... ที่แปลกใหม่"

colony.10087.a: "เรายอมรับชะตากรรมของเรา"

colony.10090.name: "ชีวิตทั้งหมดต้องสิ้นสุดลง"
colony.10090.desc: "สิ่งมีชีวิตขนาดมหึมาปรากฏตัวออกมาจากเงามืด ไม่ใช่ทั้งสัตว์ร้ายหรือเครื่องจักร แต่เป็นสิ่งที่แปลกประหลาดกว่านั้น รูปร่างของมันเปลี่ยนแปลงไประหว่างเรขาคณิตที่หลอมละลายและเงาที่คุกรุ่น มันไม่ได้พยายามที่จะสื่อสาร มันเพียงแค่กัดกินทำลายล้าง\n\nอาคารต่าง ๆ ถล่มลงสู่พื้นดิน ชาวอาณานิคมถูกฉีกออกเป็นชิ้น ๆ สูญหายไปในอากาศหรือถูกบดขยี้ภายใต้ความดันที่มองไม่เห็น ภายในเวลาไม่กี่ชั่วโมง ไม่มีอะไรเหลือนอกจากเสียงครางต่ำ ๆ สะท้อนไปทั่วที่ราบที่ปรักหักพัง\n\nจากนั้น ทันทีที่มันมา สัตว์ร้ายก็อันตรธานหายไป ทิ้งไว้ซึ่งร่องรอยแห่งความตายและความพินาศบนดาวเคราะห์ที่ไหม้เกรียม"

colony.10090.a: "ช่างเป็นพลังที่น่าสะพรึงกลัวยิ่งนัก..."
colony.10090.a.tt: "ประชากร 50% บน [Root.GetName] ได้เสียชีวิตลง และอีกครึ่งหนึ่งได้รับความเสียหายอย่างหนัก"

colony.10095.name: "เรื่องบังเอิญหรือโชคชะตา?"
colony.10095.desc: "หน่วยลาดตระเวนรายงานว่าพบร่างที่น่าเกลียดน่ากลัวในป่ารอบ ๆ [Root.GetName] ผิวหนังเกรียม กระดูกเป็นสีดำ และการแสดงออกที่แข็งทื่อด้วยความตื่นตระหนกอย่างรุนแรง ไม่พบอาวุธใด ๆ และไม่มีร่องรอยของความขัดแย้ง พืชพรรณในบริเวณใกล้เคียงแสดงหลักฐานการสัมผัสกับความร้อนสูงและมีความผิดปกติทางแรงโน้มถ่วงในท้องถิ่นช่วงสั้น ๆ\n\nทว่าอะไรก็ตามที่เคยล่าอยู่ที่นั่นได้จากไปแล้ว และดาวเคราะห์กำลังตอบสนอง พืชพรรณที่เคยเหี่ยวเฉากลับเบ่งบานสะพรั่งอย่างอุดมสมบูรณ์ และสัตว์ป่าในท้องถิ่นได้กลับคืนมาด้วยความกลมกลืนอย่างระมัดระวัง ผืนดินที่อุดมสมบูรณ์ดูเหมือนจะพร้อมสำหรับการเก็บเกี่ยวผลผลิตที่แตกต่างจากสิ่งใด ๆ ที่เคยเห็นมาก่อน\n\nสำหรับตอนนี้ อาณานิคมปลอดภัยแล้ว"

colony.10095.a: "ผลลัพธ์ที่น่ายินดี"

