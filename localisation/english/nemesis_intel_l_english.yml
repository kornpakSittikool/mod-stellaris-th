 preventive_war_economy_desc:1 "เราได้โยกย้ายทรัพยากรของเราไปสู่การผลิตยานรบเพื่อเผชิญหน้ากับภัยคุกคามที่อาจเกิดขึ้นจากอารยธรรมต่างดาวที่เป็นปฏิปักษ์ที่ไม่รู้จัก"
 alien_friendship_society:0 "สมาคมมิตรภาพต่างดาว"
 alien_friendship_society_desc:0 "จักรวรรดิของเรามุ่งมั่นที่จะสร้างมิตรภาพกับผู้ที่เราพบบนเวทีกาแล็กซี"
 robot_appreciation:0 "ความมหัศจรรย์แห่งหุ่นยนต์"
 robot_appreciation_desc:0 "การพบกับอารยธรรมแห่งหุ่นยนต์ทำให้หลายคนประหลาดใจกับความเป็นไปได้ที่ความก้าวหน้าในเทคโนโลยี AI ของเราเองจะสามารถปลดล็อกได้"
 alien_appreciation:0 "ความชื่นชมในต่างดาว"
 alien_appreciation_desc:0 "การเผชิญหน้ากับเผ่าพันธุ์ต่างดาวที่มีเสน่ห์ดึงดูดใจเป็นพิเศษส่งผลให้มีอาสาสมัครสำหรับแผนกสำรวจดาราจักรเพิ่มขึ้นอย่างมาก"
 robot_revulsion:0 "หุ่นยนต์ที่น่ารังเกียจ"
 robot_revulsion_desc:0 "การพบกับอารยธรรมหุ่นยนต์ทำให้หลายคนเกิดความสงสัยเกี่ยวกับอิทธิพลของระบบอัตโนมัติต่อสังคมของเรา"
 alien_revulsion:0 "มนุษย์ต่างดาวที่น่ารังเกียจ"
 alien_revulsion_desc:0 "การพบกับเผ่าพันธุ์ต่างดาวที่น่าเกลียดน่ากลัวเป็นพิเศษทำให้หลายคนเลือกที่จะหันมาใส่ใจภายในพวกเรากันเองมากกว่าที่จะมองออกไปยังผู้อื่น"
 repulsive_robot_contact:0 "อดทนกับหุ่นยนต์ที่น่ารังเกียจ"
 repulsive_alien_contact:0 "อดทนกับมนุษย์ต่างดาวที่น่ารังเกียจ"
 repulsive_aliens_uncondemned:0 "อดทนกับมนุษย์ต่างดาวที่น่ารังเกียจ"
 repulsive_aliens_uncondemned_desc:0 "การที่เราไม่แสดงออกถึงการต่อต้านภัยคุกคามใหม่ที่น่ากังวลใจที่เราได้พบนั้น ได้จุดชนวนให้เกิดกระแสต่อต้านขึ้นในหมู่ประชากรของเรา"
 first_contact_challenge_not_returned:0 "คำท้าที่ไม่ได้รับการตอบรับ"
 first_contact_challenge_not_returned_desc:0 "ความมุ่งมั่นอันแน่วแน่ของเราในการจัดการกับปฐมสัมผัสด้วยวิธีการที่เป็นเหตุเป็นผลและเป็นวิทยาศาสตร์ส่งผลดีอย่างมากต่อแผนกสำรวจของเรา แม้ว่าบางคนจะกังวลว่าเราอาจกำลังทำให้ตัวเองตกอยู่ในความเสี่ยงจากการไม่ดำเนินการเชิงป้องกันเพื่อหลีกเลี่ยงความขัดแย้งกับอารยธรรมที่เป็นปฏิปักษ์อย่างเห็นได้ชัด"
 first_contact_defeated_dadaism:0 "เอาชนะคตินิยมบ้าบอ"
 first_contact_defeated_dadaism_desc:0 "การสนทนาปฐมสัมผัสที่น่าจดจำอย่างยิ่งครั้งหนึ่งทำให้เราต้องรับมือกับการตอบสนองที่ไร้สาระ ตอนนี้ไม่มีความท้าทายใดที่ยากเกินไปสำหรับนักภาษาศาสตร์ของเราในการถอดรหัส"
 first_contact_war_preparations:0 "เตรียมทำสงคราม"
 first_contact_war_preparations_desc:0 "การเผชิญหน้าของเรากับอารยธรรมที่ดูเหมือนจะเป็นศัตรูได้จุดชนวนให้เกิดการเตรียมความพร้อมสำหรับการทำสงครามอย่างกว้างขวาง"
 first_contact_warlike_warriors_recognised:0 "ความเก่งกาจในการศึกได้รับการยอมรับ"
 first_contact_warlike_warriors_recognised_desc:0 "อารยธรรมที่เราเพิ่งเผชิญหน้ารู้สึกประทับใจในความเก่งกาจของเราในฐานะนักรบมากจนพวกเขาประกาศให้เราเป็นหนึ่งในกลุ่มนักสู้ที่ยอดเยี่ยมที่สุดในกาแล็กซี สิ่งนี้ไม่ได้ส่งผลเสียใด ๆ ต่อชื่อเสียงของเราเลย"
 first_contact_warlike_warriors_presumed:0 "ความเก่งกาจในการศึกถูกคาดเดา"
 first_contact_warlike_warriors_presumed_desc:0 "อารยธรรมที่เราเพิ่งเผชิญหน้าเข้าใจผิดคิดว่าเราเป็นสังคมของนักรบที่แข็งแกร่งและกล้าหาญ แม้ว่าเราจะไม่ได้เป็นเช่นนั้นเลย แต่เราก็สามารถได้รับประโยชน์จากความเข้าใจผิดนี้ได้ชั่วระยะเวลาหนึ่ง"
 first_contact_warlike_warriors_recognised_2:0 "การแข่งขันระหว่างนักรบ"
 first_contact_warlike_warriors_recognised_2_desc:0 "อารยธรรมที่เราเพิ่งเผชิญหน้ารู้สึกประทับใจในความเก่งกาจของเราในฐานะนักรบมากจนพวกเขาปฏิญาณว่าจะพยายามเทียบเคียงความกล้าหาญของเรา โดยประกาศให้เราเป็นคู่แข่งของพวกเขาบนเวทีกาแล็กซี สิ่งนี้ไม่ได้ส่งผลเสียใด ๆ ต่อชื่อเสียงของเราเลย"
 first_contact_warlike_warriors_presumed_2:0 "การแข่งขันระหว่างนักรบ (ที่ถูกคาดเดา)"
 first_contact_warlike_warriors_presumed_2_desc:0 "อารยธรรมที่เราเพิ่งเผชิญหน้าเข้าใจผิดคิดว่าเราเป็นสังคมของนักรบที่แข็งแกร่งและกล้าหาญ โชคร้ายที่พวกเขาอ้างว่าจะพยายามเทียบเคียงความกล้าหาญของเรา โดยประกาศให้เราเป็นคู่แข่งของพวกเขาบนเวทีกาแล็กซี อีกทั้งเรายังไม่ได้เป็นอะไรทำนองนั้นเลย... แต่อย่างน้อยเราก็สามารถได้รับประโยชน์จากความเข้าใจผิดนี้ได้ชั่วระยะเวลาหนึ่ง"
 first_contact_level_headedness:0 "รับมือสถานการณ์คับขันได้ดี"
 first_contact_level_headedness_desc:0 "ความสุขุมเยือกเย็นของเราเมื่อเผชิญกับอุปสรรคได้รับการชื่นชมอย่างกว้างขวางบนเวทีกาแล็กซี"
 first_comms_hostility_preparations:0 "การเตรียมพร้อมสำหรับการกระทำอันเป็นปฏิปักษ์"
 first_comms_defensive:0 "การต่อต้านการจารกรรมที่เฝ้าระวัง"
 first_comms_defensive_desc:0 "เป้าหมายการจารกรรมของเรามองเราด้วยความสงสัยอย่างมาก เนื่องจากเพิ่งเคยพบกันเป็นครั้งแรกไม่นานมานี้"
 first_contact_speak_like_us_spynetwork:0 "พูดเหมือนเรา"
 first_contact_speak_like_us_country:0 "ถอดรหัสปริศนาแล้ว"
 first_contact_speak_like_us_country_desc:0 "ประสบการณ์ของเราในการถอดรหัสปริศนาที่ส่งมาจากอารยธรรมที่สร้างความสับสนเป็นพิเศษ ช่วยให้เราสามารถเสริมความแข็งแกร่งให้กับโพรโทคอลสำหรับการเผชิญหน้าครั้งแรกได้"
 universal_translator:0 "เครื่องแปลภาษาจักรวาล"
 universal_translator_desc:0 "ถึงแม้ว่าจะเรียกว่า\"นักแปลยูนิเวอร์ชัน\"แม้ว่าสิ่งที่เรียกว่า "
 space_lights_insights:0 "การทำนายการไหลระหว่างดวงดาว"
 space_lights_insights_desc:0 "ความเข้าใจของเราเกี่ยวกับการเดินทางผ่านไฮเปอร์เลนก้าวหน้าไปหลายปีแสง หลังจากความจริงปรากฏว่าเผ่าพันธุ์ที่เราพบมีกุญแจสำคัญสู่ความรู้ใหม่ในรูปแบบลวดลายบนผิวหนังของพวกเขา"
 first_contact_hive_drones_study:0 "การศึกษาโดรนรังสมองร่วม"
 first_contact_hive_drones_study_desc:0 "เรากำลังศึกษาวิธีการที่รังสมองร่วมใช้ควบคุมโดรน เพื่อค้นหาวิธีการที่เราจะสามารถนำมาใช้เพื่อเพิ่มประสิทธิภาพของคนงานของเราเอง"

