 action.1.desc_hacking_01:0 "คุณแฮกเข้ามาในระบบของเรา แล้วตอนนี้มาเรียกเราว่าเพื่อนงั้นรึ? เหอะ! [contact_empire.GetName] จะยังคงเฝ้าระวังสายพันธุ์ของคุณต่อไป"
 action.1.desc_hacking_02:0 "โพรเซสเซอร์ของเราบันทึกความพยายาม ที่ไม่ได้รับอนุญาตจากเครือข่ายของคุณ เราได้อัพเกรดไฟร์วอลล์ของเรา เพื่อเพิ่มความปลอดภัยของเรา เดอะ[contact_empire.GetGovernmentName]จะยังคงระแวดระวังไปยังชื่อองค์กร"[Root.GetName]"หน่วยประมวลผลของเราบันทึกการพยายามบุกรุกโดยไม่ได้รับอนุญาตจากเครือข่ายของคุณ เราได้อัปเกรดไฟร์วอลล์เพื่อเพิ่มความปลอดภัยต่อภัยคุกคามในอนาคตแล้ว [contact_empire.GetGovernmentName] จะยังคงระมัดระวังต่อหน่วยงานที่จัดตั้งขึ้นนี้ต่อไป "
 action.1.desc_hacking_03:0 "อย่าคิดว่าความพยายามขโมยข้อมูลของเราจะรอดพ้นสายตาไปได้นะ [Root.GetSpeciesName] - [contact_empire.GetGovernmentName] มองเห็นทุกสิ่ง! เราได้จัดสรรส่วนหนึ่งของจิตสำนึกของเราไว้คอยเฝ้าดูการกระทำผิดในอนาคตของคุณ"
 action.1.desc_hostile_01:0 "การแสดงท่าทีเป็นปรปักษ์ของคุณเป็นเรื่องที่น่ากังวลอย่างยิ่ง [Root.GetSpeciesName] ทาง [contact_empire.GetRulerTitle] ของเราต้องการให้ทราบว่าเราจะไม่ยอมก้มหัวให้กับคำขู่หรือการข่มขู่ใดๆ ของคุณ"
 action.1.desc_hostile_02:0 "ทำไมถึงได้ก้าวร้าวเช่นนี้ [Root.GetSpeciesName]? พวกเราไม่ได้มีเจตนาร้ายกับพวกคุณเลย!"
 action.1.desc_hostile_03:0 "ตรวจพบอารยธรรมแบบศัตรูร่วมชาติ รุ่น 3"[Root.GetName]"ตรวจพบอารยธรรมทรงภูมิปัญญาประเภทเป็นปรปักษ์ ระดับ 3 นามสมมุติคือ "
 action.1.desc_hostile_04:0 "พวกเราคือ [contact_empire.GetName] และเราพูดเป็นเสียงเดียว จิตสำนึกร่วม(หัวเราะ)ได้รับรู้ถึงความเป็นปรปักษ์จากการกระทำที่ผ่านมาของคุณแล้ว ดังนั้นเราจึงกำหนดให้คุณเป็นภัยคุกคาม หากคุณยังไม่หยุดทำตัวเป็นศัตรูกับเรา เราจำเป็นต้องตัดคุณออกจากการคำนวณของเรา..."
 action.1.desc_hostile_05:0 "การแสดงท่าทีเป็นปรปักษ์ของคุณช่างน่ากังวลยิ่งนัก [Root.GetSpeciesName] เราคงสันนิษฐานได้เพียงว่าพวกคุณเป็น [Root.GetSpeciesNamePluralInsult] ที่เสียสติและจำเป็นต้องได้รับการจัดการโดยสายพันธุ์ที่เหนือกว่าอย่าง [contact_empire.GetSpeciesName]"
 action.1.desc_hostile_06:0 "[contact_empire.GetName] เฝ้ามองคุณอยู่ และดวงดาวของเราพูดเป็นเสียงเดียว ท่าทีเป็นปฏิปักษ์ของคุณทำให้เรากังวล และเราจึงได้ระบุว่าคุณเป็นภัยคุกคาม จงรู้ไว้: เราสามารถให้อภัยได้ แต่ไม่ใช่ธรรมชาติของเราที่จะยอมจำนน หากคุณยังคงแสดงตัวเป็นศัตรูของเรา เราจะไม่ลังเลที่จะจู่โจม"
 action.1.desc_they_hostile_01:0 "เราถือว่าสายพันธุ์ของคุณเป็นภัยคุกคามร้ายแรงต่อพวกเรา [Root.GetSpeciesName] หากคุณไม่สามารถพิสูจน์ได้ว่าคุณไม่ใช่ภัยคุกคาม การโจมตีในอดีตของเราจะเป็นเพียงจุดเริ่มต้นของสงครามระหว่างอารยธรรมของเราเท่านั้น"
 action.1.desc_they_hostile_02:0 "อัลกอริทึมตรวจจับภัยคุกคามของเราคำนวณแล้วว่า ความเสี่ยงที่อารยธรรมของคุณจะสร้างความเสียหายต่อ [Root.GetName] นั้นอยู่ในระดับที่ไม่อาจยอมรับได้ หากภัยคุกคามที่คุณก่อไม่สามารถบรรเทาลงได้ด้วยวิธีอื่น เราคงต้องกำจัดคุณทิ้ง"
 action.1.desc_they_hostile_03:0 "พวกพ้องของคุณเป็นภัยคุกคามร้ายแรงต่อ [contact_empire.GetGestaltEntityName] [Root.GetSpeciesName] เราได้เริ่มสร้างมาตรการสำรองเพื่อบรรเทาความเสี่ยงที่คุณก่อขึ้นแล้ว หากพบว่ายังไม่เพียงพอ มาตรการขั้นต่อไปก็จะเป็นสิ่งจำเป็น"
 action.1.desc_vivisection_01:0 "เราจะไม่หยุดจนกว่าจะได้ล้างแค้นให้กับ [contact_empire.GetSpeciesNamePlural] ผู้จบชีวิตลงบนเตียงผ่าตัดของพวกคุณ [Root.GetSpeciesName]!"
 action.1.desc_vivisection_02:0 "พวกเราไม่ได้มุ่งร้ายต่อคุณ [Root.GetSpeciesNamePlural] แต่อย่างใด ทว่าจงรู้ไว้ว่าเราไม่พอใจอย่างยิ่งที่พวกพ้องของเราต้องทนทุกข์จากความโหดร้ายทารุณที่บรรยายไม่ได้บนเตียงผ่าตัดของคุณ คุณได้รับความเกลียดชังชั่วนิรันดร์จากเราไปแล้ว อย่าผลักดันเราไปไกลกว่านี้!"
 action.1.desc_vivisection_03:0 "$action.1.desc_hungry_03$"
 action.1.desc_vivisection_04:0 "การสูญเสียโดรนของเราไม่ได้สร้างความเสียหายใหญ่หลวงให้แก่ [contact_empire.GetName] แต่ความพร้อมที่จะใช้ความรุนแรงของสายพันธุ์คุณนั้นได้รับการบันทึกไว้แล้ว เราจะไม่ทนต่อการกระทำประเภทนี้อีก"
 action.1.desc_they_vivisect_01:0 "เราได้รวบรวมข้อมูลจำนวนมากเกี่ยวกับระบบการทำงานภายในกายวิภาคของคุณ [Root.GetSpeciesNamePlural] อาจกล่าวได้ว่าเรารู้จักคุณแบบ... ทะลุปรุโปร่งเลยทีเดียว"
 action.1.desc_they_vivisect_02:0 "เราได้รวบรวมข้อมูลจำนวนมากเกี่ยวกับระบบการทำงานภายในของแผงวงจรและหน่วยประมวลผลของคุณ [Root.GetSpeciesNamePlural] อาจกล่าวได้ว่าเรารู้จักคุณแบบ... ทะลุปรุโปร่งเลยทีเดียว"
 action.1.desc_hungry_01:0 "พวกเราไม่ใช่อาหารของคุณนะ [Root.GetSpeciesNamePlural] ในฐานะตัวแทนของ [contact_empire.GetName] ฉันได้รับอำนาจเตือนคุณว่าการล่วงละเมิดใดๆ ในอนาคตจะถูกตอบโต้ด้วยกำลังอาวุธทั้งหมดของเรา"
 action.1.desc_hungry_02:0 "พวกเราไม่ใช่อาหารของคุณนะ [Root.GetSpeciesNamePlural] พวกเรา [contact_empire.GetSpeciesNamePlural] ดำเนินวิถีชีวิตอย่างสงบสุข แต่เราจะไม่ลังเลที่จะปกป้องตนเองหากจำเป็น"
 action.1.desc_hungry_03:0 "เหตุใดพวกคุณจึงถอดชิ้นส่วนพวกเรา [Root.GetSpeciesNamePlural]? ยูนิตของเราไม่ได้ชำรุดเสียหายเสียหน่อย"
 action.1.desc_hungry_04:0 "หวังว่าคุณจะทำ [Root.GetSpeciesToothNamePlural] หักไปในความพยายามอันสูญเปล่าที่จะกินเรานะ [Root.GetSpeciesName]! จงรู้ไว้ว่าเรา [contact_empire.GetSpeciesNamePlural] จะไม่ยอมก้มหัวและจะต่อต้านพวกคุณจนถึงก้อนหินก้อนสุดท้าย"
 action.1.desc_hungry_05:0 "มันเป็นการสูญเปล่าที่จะกินโดรนของเรา [Root.GetSpeciesNamePlural] พวกมันไม่ได้ถูกสร้างมาเพื่อวัตถุประสงค์นั้น และเราจำเป็นต้องขอร้องอย่างเด็ดขาดให้คุณหยุดการกระทำนี้"
 action.1.desc_they_hungry_01:0 "พวกคุณอร่อยมากเลยนะ [Root.GetSpeciesNamePlural] อีกไม่นานพวกคุณจะกลายมาเป็นส่วนหนึ่งของอาหารหลักของโดรนพวกเรา"
 action.1.desc_they_hungry_02:0 "วัตถุดิบที่เราหลอมโดรนของคุณออกมานั้นมีค่ามาก เราคาดว่าโรงหลอมของเราจะเต็มไปด้วยเศษโลหะ [Root.GetAdj] ในไม่ช้า"
 action.1.desc_hostile_to_homicidal_01:0 "ความเป็นปรปักษ์ของคุณเป็นอีกเหตุผลหนึ่งที่ทำไมสายพันธุ์ของพวกแกจึงต้องถูกกวาดล้างไปจากกาแล็กซีนี้ เจ้าพวกเดนมนุษย์ต่างดาว"
 action.1.desc_hostile_to_homicidal_02:0 "ตรวจพบแมลงอินทรีย์\n\nเป้าหมายรายการ. สลับกับหางและข้อมูลกํากับ(ช่วย)\"[Root.GetName]\"ตรวจพบสิ่งมีชีวิตออร์แกนิกที่เป็นศัตรู\n\nเป้าหมายรายการสลับไปยังข้อความและข้อมูลภายนอก (help)"
 action.1.desc_hostile_to_homicidal_03:0 "ทําไมคุณโจมตีเรา ระบุ"[Root.GetName]"ทำไมพวกคุณถึงโจมตีเรา รหัสกำหนดคือ "
 action.1.desc_hostile_to_homicidal_04:0 "พวกคุณคิดถูกแล้วที่โจมตีเรา [Root.GetSpeciesNamePlural] แต่นั่นจะไม่ช่วยให้พวกคุณรอดพ้นไปได้หรอก เพราะพวกคุณยังคงเป็นเหยื่อของเราอยู่ดี"
 action.1.desc_hostile_to_homicidal_05:0 "ความเป็นปรปักษ์ของพวกคุณเป็นเรื่องที่น่าเสียดาย เราเคยคิดที่จะละเว้นพวกคุณในฐานะที่เป็นเพื่อนร่วมเผ่าพันธุ์ [Root.GetSpeciesNamePlural] เหมือนกัน แต่ดูเหมือนว่าพวกคุณจำเป็นต้องได้รับการ... ปรับทัศนคติใหม่ อย่างน้อยที่สุด"

 first_contact_start_title:1 "$first_contact.1.name$"
 first_contact.1.name:0 "การเผชิญหน้ากันที่ [This.System.GetName]"
 first_contact.1.desc.base:1 "เราได้ติดต่อกับเอเลี่ยนลึกลับในระบบดาว §H[This.System.GetName]§! เป็นครั้งแรก สำหรับตอนนี้ เราจะตั้งชื่อพวกเขาว่า §H[This.ContactCountry.GetName]§! จนกว่าเราจะสามารถหาข้อมูลเพิ่มเติม เกี่ยวกับพวกเขาได้"
 first_contact.1.desc.default:0 "$first_contact.1.desc.base$ หากพวกเขามีภาษา เราต้องถอดรหัสเพื่อสร้างการติดต่อสื่อสาร"
 first_contact.1.desc.xenophobe:0 "$first_contact.1.desc.base$ หากพวกเขามีภาษา เราควรถอดรหัสเพื่อให้เราสามารถประเมินได้ว่า พวกเขาเป็นภัยคุกคามมากแค่ไหน"
 first_contact.1.desc.terminator:1 "เราได้ทำการติดต่อครั้งแรกกับมนุษย์ต่างดาวที่ไม่รู้จักในระบบดาว §H[This.System.GetName]§!แล้ว เราต้องรีบตรวจสอบโดยด่วนว่าพวกมันเป็นสิ่งมีชีวิตออร์แกนิกหรือไม่ เพื่อให้สามารถจัดตารางการทำลายล้างได้ หากจำเป็น สำหรับตอนนี้ พวกมันได้รับการตั้งชื่อกำหนดชั่วคราวว่า §H[This.ContactCountry.GetName]§!"
 first_contact.1.desc.devourer:1 "เราได้ทำการติดต่อครั้งแรกกับเอเลี่ยนปริศนาในระบบดาว §H[This.System.GetName]§!แล้ว เราควรค้นหาข้อมูลเกี่ยวกับพวกมันเพิ่มเติมเพื่อตัดสินใจว่าพวกมันจะเหมาะเป็นสารอาหารให้แก่โดรนของเราหรือไม่ สำหรับตอนนี้ พวกมันได้รับการตั้งชื่อกำหนดชั่วคราวว่า §H[This.ContactCountry.GetName]§!"
 first_contact.1.desc.purifier:1 "เราได้ทำการติดต่อครั้งแรกกับเอเลี่ยนปริศนาในระบบดาว §H[This.System.GetName]§!แล้ว เราควรศึกษาเพิ่มเติมเกี่ยวกับพวกมันเพื่อที่จะประเมินได้ว่าควรให้เป็นเป้าหมายรายต่อไปสำหรับการกวาดล้างหรือไม่ สำหรับตอนนี้ พวกมันได้รับการตั้งชื่อกำหนดชั่วคราวว่า §H[This.ContactCountry.GetName]§!"
 first_contact.1.desc.hive:1 "เราได้ทำการติดต่อครั้งแรกกับเอเลี่ยนปริศนาในระบบดาว §H[This.System.GetName]§!แล้ว เราควรสืบดูว่าพวกมันสามารถสื่อสารกับเราได้หรือไม่ และจัดสรรส่วนหนึ่งของตัวเราเพื่อแปลภาษาของพวกมันหากพบว่าทำได้ สำหรับตอนนี้ พวกมันได้รับการตั้งชื่อกำหนดชั่วคราวว่า §H[This.ContactCountry.GetName]§!"
 first_contact.1.desc.wilderness: "เราได้ทำการติดต่อครั้งแรกกับสิ่งมีชีวิตปริศนาในระบบดาว §H[This.System.GetName]§!แล้ว เรายังไม่รู้ว่าพวกมันสามารถสื่อสารกับเราได้หรือไม่ หากพวกมันไม่สามารถทำได้ เราอาจจำเป็นต้องสร้างส่วนย่อยของตัวเองขึ้นมา—ในลักษณะที่เป็นร่างอวตาร\n\nจนกว่าเราจะเรียนรู้เพิ่มเติมเกี่ยวกับมนุษย์ต่างดาวเหล่านี้ เราได้ตั้งชื่อพวกมันว่า §H[This.ContactCountry.GetName]§!"
 first_contact.1.desc.machine:1 "เราได้ทำการติดต่อครั้งแรกกับเอเลี่ยนปริศนาในระบบดาว §H[This.System.GetName]§!แล้ว เราควรสืบดูว่าพวกมันมีวิธีการสื่อสารที่เราสามารถประมวลผลได้หรือไม่ และอุทิศอัลกอริทึมการแปลภาษาของเราเพื่อถอดรหัสหากพบว่าทำได้ สำหรับตอนนี้ พวกมันได้รับการตั้งชื่อกำหนดชั่วคราวว่า §H[This.ContactCountry.GetName]§!"

 first_contact.5.name:0 "ผู้ท่องอวกาศปริศนา"
 first_contact.5.desc:1 "แม้ว่าเราจะยังไม่สามารถค้นพบข้อมูลอะไรได้มากเกี่ยวกับยานปริศนาในระบบดาว §H[This.System.GetName]§! สมมติฐานที่น่าเชื่อถือที่สุดในตอนนี้—อิงตามพฤติกรรมของยานและรูปแบบของสัญญาณที่ยังถอดรหัสไม่ได้ที่เราดักจับได้—คือยานลำนี้เป็นของ §Hอารยธรรมท่องอวกาศ§! ที่ไม่เคยรู้จักมาก่อน เรากำลังเพิ่มความพยายามเป็นสองเท่าในการแปลภาษาของพวกเขาเพื่อให้สามารถสร้างการติดต่อสื่อสารกันได้"
 first_contact.5.A:0 "พยายามต่อไป!"
 first_contact.10.name:0 "ผู้ท่องอวกาศปริศนา"
 first_contact.10.desc.base:1 "ดูเหมือนว่ากลุ่มที่ชื่อว่า §H[This.ContactCountry.GetName]§! จะเป็นส่วนหนึ่งของ §Hอารยธรรมท่องอวกาศ§! ที่ไม่เคยรู้จักมาก่อน แม้ว่าเราจะยังสืบไม่ได้ว่าพวกเขามาจากเขตอวกาศใด แต่พฤติกรรมของพวกเขาก็แสดงให้เห็นชัดเจนว่ามีภูมิปัญญาต่างดาวอยู่เบื้องหลัง: ยานลำหนึ่งของพวกเขาได้ทำการสแกนระบบของเราอย่างเป็นระบบ ซึ่งดูเหมือนจะเป็นความพยายามที่จะค้นหาข้อมูลเกี่ยวกับเราเพิ่มเติม"
 first_contact.10.desc.proactive:0 "$first_contact.10.desc.base$"
 first_contact.10.desc.cautious:0 "$first_contact.10.desc.base$ เรากำลังใช้มาตรการป้องกันทุกวิถีทางเพื่อไม่ให้พวกเขาค้นพบข้อมูลที่เป็นความลับใดๆ"
 first_contact.10.desc.attack_allowed:1 "$first_contact.10.desc.base$ [This.Owner.GetSpeciesNamePlural] จำนวนมากกังวลเกี่ยวกับสถานการณ์นี้เป็นอย่างยิ่ง และเรียกร้องให้เรา §Hยึด§! ยานที่โอหังลำนั้นเพื่อที่เราจะได้ทำการ §Hสอบสวน§! พวกเขาได้อย่างเต็มที่ โดยไม่ต้องเสี่ยงให้ข้อมูลสำคัญตกไปอยู่ในมือของพวกเขา"
 first_contact.10.desc.attack_allowed.gestalt:1 "$first_contact.10.desc.base$ โดรนทหารของเราพร้อมที่จะยึดครองยานเพื่อให้เราสามารถทำการ §Hสอบสวน§!—หรือชำแหละ—มนุษย์ต่างดาวเหล่านั้นได้ โดยปราศจากความเสี่ยงที่ข้อมูลละเอียดอ่อนจะตกไปอยู่ในมือของพวกเขา"
 first_contact.10.A:0 "ไม่มีอะไรที่ต้องกังวลหรอก แน่นอนอยู่แล้ว"
 first_contact.10.B:0 "ยิงได้เมื่อพร้อม!"
 first_contact.10.B.tooltip:0 "§Rเราจะพยายามทำให้ยานของพวกเขาใช้การไม่ได้และเข้ายึด พวกเขาอาจจะโกรธแค้นอย่างมากต่อการกระทำนี้§!"
 first_contact.15.name:0 "ค้นพบอารยธรรมท่องอวกาศ"
 first_contact.15.desc:1 "เห็นได้ชัดเจนในทันทีว่ากลุ่มที่ชื่อว่า §H[This.ContactCountry.GetName]§! แท้จริงแล้วเป็นส่วนหนึ่งของ §Hอารยธรรมท่องอวกาศ§! ขนาดใหญ่ ยานสำรวจของเราในระบบดาว §H[known_planet.System.GetName]§! ตรวจพบยานอวกาศเคลื่อนผ่านไปมาระหว่าง [known_planet.GetPlanetBioInfo] ซึ่งผลการสแกนแสดงให้เห็นว่าสามารถรองรับประชากรจำนวนมากได้ รวมถึงสถานีอวกาศต่างๆ ทั่วระบบดาว เราดักจับปริมาณข้อมูลการสื่อสารได้เป็นจำนวนมาก แต่จนถึงตอนนี้ยังถอดรหัสความหมายที่แน่นอนไม่ได้"
 first_contact.15.desc.no_planets:1 "เห็นได้ชัดเจนในทันทีว่ากลุ่มที่ชื่อว่า §H[This.ContactCountry.GetName]§! แท้จริงแล้วเป็นส่วนหนึ่งของ §Hอารยธรรมท่องอวกาศ§! ขนาดใหญ่ ยานสำรวจของเราในระบบดาว §H[known_system.GetName]§! ตรวจพบยานอวกาศเคลื่อนผ่านไปมาระหว่างสถานีอวกาศหลายแห่งทั่วระบบดาว และมีสถานีทหารขนาดใหญ่ใกล้กับดาวฤกษ์ของระบบ ซึ่งดูเหมือนจะทำหน้าที่คล้ายกับด่านหน้าที่เราสร้างขึ้นในระบบที่เราอ้างสิทธิ์ เราดักจับปริมาณข้อมูลการสื่อสารได้เป็นจำนวนมาก แต่จนถึงตอนนี้ยังถอดรหัสความหมายที่แน่นอนไม่ได้"
 first_contact.15.A:0 "$first_contact.5.A$"
 first_contact.15.B:0 "ลองจับพวกเขาบางคนมาสืบสวนอย่างใกล้ชิดกันดีกว่า"

 first_contact.50.name:0 "มนุษย์ต่างดาวที่หลบหลีกเก่ง"
 first_contact.50.desc:1 "ความพยายามที่จะเรียนรู้เพิ่มเติมเกี่ยวกับ §H[This.ContactCountry.GetName]§! จนถึงตอนนี้ยังไร้ผล แม้ว่าเราจะสืบทราบได้ง่ายดายว่าพวกเขาเป็นส่วนหนึ่งของอารยธรรมต่างดาวที่มีเทคโนโลยีสูงส่ง แต่ข้อเท็จจริงอื่นๆ กลับกลายเป็นสิ่งที่ §Hจับต้องได้ยาก§! เนื่องจากดูเหมือนว่าพวกเขาพยายามอย่างยิ่งที่จะป้องกันไม่ให้เราหรือผู้ลักลอบฟังรายอื่นดักรับสัญญาณใดๆ จากพวกเขาได้\n\nดังนั้นเราจึงทำได้เพียงดักจับเศษเสี้ยวของภาษาของพวกเขาในปริมาณเล็กน้อยเท่านั้น อย่างไรก็ตาม จากข้อมูลประปรายที่เราเก็บรวบรวมได้ [This.Owner.GetLinguists] ของเรามั่นใจว่าจะสามารถ §Hถอดรหัส§! การสื่อสารของพวกเขาได้ หากเราเพียงแค่ได้ตัวอย่างที่มากกว่านี้"
 first_contact.50.A.cautious:0 "พวกเขาระมัดระวังตัวดีแล้ว"
 first_contact.50.A.proactive:0 "เราจะต้องพยายามต่อไป"
 first_contact.50.desc.aggressive:1 "$first_contact.50.desc$ มีการร่างข้อเสนอสำหรับการเก็บรวบรวมข้อมูลที่ดุดันยิ่งขึ้น—บางคนอาจจะเรียกว่าการ §Hแฮกข้อมูล§!—แต่แน่นอนว่าพวกเขาคงจะไม่พอใจอย่างมากหากพวกเขาก็จับได้ขึ้นมา"
 first_contact.50.B:0 "มันเสี่ยงเกินไป"
 first_contact.50.B.machine:0 "โพรโทคอลประเมินผลประเมินความเสี่ยงที่ไม่อาจยอมรับได้"
 first_contact.50.C:0 "อันตรายจากความไม่รู้นั้นน่ากลัวกว่ามาก"
 first_contact.50.C1:0 "เราต้องรู้ความลับของพวกเขาให้ได้"
 first_contact.50.C.machine:1 "กำลังเริ่มโพรโทคอลการเจาะระบบ"
 first_contact.50.C.tooltip:0 "§Rเราจะพยายามแฮกเข้าไปในฐานข้อมูลของพวกเขาเพื่อค้นหาข้อมูลเพิ่มเติม หากพวกเขาจับได้ขึ้นมา พวกเขาอาจจะโกรธกับการกระทำนี้§!"

 first_contact.60.name:0 "การสื่อสารที่ได้รับ"
 # Communicating with default empires
 first_contact.60.desc.default:1 "ดูเหมือนว่า §H[This.ContactCountry.GetName]§! จะกระตือรือร้นในการสร้างการติดต่อสื่อสารกับเรา โดยได้ส่งการ §Hแพร่ภาพสัญญาณ§! เสียงและภาพขนาดใหญ่ซึ่งดูเหมือนจะมอบรหัสสำคัญในการแปลภาษาของพวกเขา"
 first_contact.60.desc.default.default:0 "$first_contact.60.desc.default$\n\n$first_contact.60.desc.x.default.end$"
 first_contact.60.desc.default.hive:0 "$first_contact.60.desc.default$\n\nเราจะสามารถสื่อสารกับพวกเขาได้ในไม่ช้าอย่างแน่นอนโดยการป้อนข้อมูลนี้ให้กับโดรนภาษาของเรา แน่นอนว่าเราต้องเชื่อใจพวกเขาว่าคำแปลที่พวกเขามอบให้นั้นแม่นยำพอที่จะทำให้เราเข้าใจได้อย่างถูกต้อง"
 first_contact.60.desc.default.wilderness: "$first_contact.60.desc.hive$\n\nโอกาสในการสื่อสารกับสิ่งมีชีวิตเหล่านี้ดูน่ามีความหวังมากยิ่งขึ้น เนื่องจากตอนนี้เรามีโครงสร้างสำหรับท่วงทำนองและความสอดประสานต่างๆ ที่ดูเหมือนจะเป็นช่องทางให้ความคิดของพวกเขาหลั่งไหล ตอนนี้ภาระจึงตกอยู่ที่เราที่จะต้องตีความความต้องการของพวกเขาให้ถูกต้อง"
 first_contact.60.desc.default.machine:0 "$first_contact.60.desc.default$\n\nเราจะสามารถสื่อสารกับพวกเขาได้ในไม่ช้าอย่างแน่นอนโดยการนำข้อมูลนี้เข้าสู่โปรแกรมย่อยการแปลภาษาของเรา แน่นอนว่าเราต้องเชื่อใจพวกเขาว่าคำแปลที่พวกเขาเสนอนั้นมีความถูกต้องเพียงพอสำหรับการประมวลผลข้อมูลของเรา"
 # Communicating with Hive empires
 first_contact.60.desc.hive:1 "ดูเหมือนว่า §H[This.ContactCountry.GetName]§! จะต้องการสร้างการติดต่อสื่อสารกับเรา พวกเขาได้ส่งข้อมูลปริมาณมากซึ่งดูเหมือนจะถูกแบ่งออกเป็นส่วนของ §Hข้อความ§! (ที่ยังถอดรหัสไม่ได้) และอีกส่วนเป็นก้อน §Hข้อมูลข่าวสาร§! ขนาดใหญ่พร้อมกุญแจเสียงและภาพที่น่าจะมีไว้ช่วยให้เราแปลมันได้"
 first_contact.60.desc.hive.default:0 "$first_contact.60.desc.hive$\n\n$first_contact.60.desc.x.default.end$"
 first_contact.60.desc.hive.wilderness: "$first_contact.60.desc.hive$\n\nโอกาสในการสื่อสารกับสิ่งมีชีวิตเหล่านี้มีสูง เนื่องจากความสอดคล้องที่ปรากฏในข้อความของพวกเขาดูเหมือนจะสอดรับกับจิตสำนึกของเราเอง อย่างไรก็ตาม มีบางอย่างเกี่ยวกับพวกเขายังคงให้ความรู้สึกถึงความเป็นต่างดาวอย่างลึกซึ้ง ภาระจึงเป็นของเราที่จะต้องระวังไม่ให้ตีความการประสานทางความคิดนี้ผิดพลาด"
 first_contact.60.desc.hive.machine:0 "$first_contact.60.desc.hive$\n\n$first_contact.60.desc.x.machine.end$"
 # Communicating with Machine empires
 first_contact.60.desc.machine:1 "ดูเหมือนว่า §H[This.ContactCountry.GetName]§! จะกระตือรือร้นในการติดต่อสื่อสารกับเรา พวกเขาได้ส่งไฟล์ข้อมูลที่มีรหัสจำนวนมากซึ่งดูเหมือนจะเป็น §Hข้อความ§! ส่วนหนึ่ง (ซึ่งยังถอดรหัสไม่ได้) และก้อนข้อมูล §Hสารสนเทศ§! ขนาดใหญ่พร้อมกุญแจถอดรหัสที่อาจมีไว้เพื่อสร้างความเข้าใจในบริบทของข้อความนั้น"
 first_contact.60.desc.machine.default:1 "$first_contact.60.desc.machine$\n\nผู้เชี่ยวชาญของเรายังไม่แน่ใจว่าเรากำลังพยายามสื่อสารกับสิ่งมีชีวิตที่มีความรู้สึกนึกคิด หรือกำลังรับมือกับ §HAI นอกรีต§! พวกเขาคาดว่าจะสามารถให้คำตอบที่ชัดเจนได้ในไม่ช้า เมื่อเราสามารถดึงข้อมูลที่ต้องการจากการส่งสัญญาณของพวกเขาได้แล้ว"
 first_contact.60.desc.machine.hive:0 "$first_contact.60.desc.machine$\n\n$first_contact.60.desc.x.machine.end$"
 first_contact.60.desc.machine.wilderness: "$first_contact.60.desc.hive$\n\nโอกาสในการสื่อสารกับสิ่งมีชีวิตเหล่านี้มีความเป็นไปได้มากขึ้น เนื่องจากความเป็นหนึ่งเดียวกันของสารที่พวกเขาส่งมานั้นรู้สึกคล้ายกับจิตสำนึกของเราเอง อย่างไรก็ตาม ภูมิปัญญานี้ยังคงมีบางสิ่งที่ให้ความรู้สึกต่างดาวอย่างลึกล้ำ ภาระเป็นของเราที่จะต้องระวังไม่ให้เข้าใจเจตนาของพวกเขาผิดไป"
 # Communicating with Wilderness empires
 first_contact.60.desc.wilderness.default: "$first_contact.60.desc.default$\n\nขนาดและความซับซ้อนของสารนิเทศที่ชัดเจนนี้เป็นสิ่งที่ชวนให้สับสน เรายังไม่สามารถถอดความหมายเบื้องหลังกระบวนการอินทรีย์และเคมีแฟร็กทัลจำนวนมากที่แสดงอยู่ในนั้นได้ อย่างไรก็ตาม ผู้เชี่ยวชาญของเรามั่นใจว่าจะมีคำตอบให้เราในไม่ช้า เว้นแต่ว่ามนุษย์ต่างดาวเหล่านี้กำลังนำทางเราไปในทางที่ผิด..."
 first_contact.60.desc.wilderness.hive: "$first_contact.60.desc.default$\n\nขนาดและความซับซ้อนของสารนิเทศนี้มีความสับสนอย่างเป็นเอกลักษณ์ มันแสดงให้เห็นกระบวนการอินทรีย์หลายอย่างที่เหมือนกับพื้นฐานวิวัฒนาการของเรา แต่ตรรกะทางโครงสร้างภาษาเบื้องหลังข้อความนี้ยังไม่ชัดเจน เราจะดำเนินการวิเคราะห์ต่อไปพร้อมความระมัดระวังและตั้งข้อสงสัย"
 first_contact.60.desc.wilderness.machine: "$first_contact.60.desc.default$\n\n'สารนิเทศ' นี้สร้างความฉงนอย่างเป็นเอกลักษณ์ มันแสดงถึงกระบวนการออร์แกนิกหลายอย่างที่หากดูจากภายนอกจะดูเหมือนเป็นเรื่องต่างดาวสำหรับเราโดยสิ้นเชิง จนกระทั่งเราลองเปรียบเทียบและหาข้อแตกต่างกับกระบวนการระดับดวงดาวของเราเอง $first_contact.60.desc.x.machine.end$"
 # Misc
 first_contact.60.desc.x.default.end:0 "ผู้เชี่ยวชาญของเรามั่นใจว่าเราจะสามารถใช้สิ่งนี้เพื่อเรียนรู้การสื่อสารกับพวกเขาได้ในไม่ช้า แน่นอนว่าเราจะต้องเชื่อใจว่าคำแปลที่พวกเขาเสนอนั้นไม่ได้สร้างความเข้าใจผิด... และเราจะสามารถตีความข้อมูลที่นำเสนอจากบริบทประสบการณ์ที่แตกต่างกันอย่างสิ้นเชิงได้อย่างถูกต้อง"
 first_contact.60.desc.x.machine.end:0 "เราได้เริ่มนำข้อมูลส่งสัญญาณนี้เข้าสู่อัลกอริทึมการแปลภาษาของเราแล้ว และคาดว่าจะดึงข้อมูลที่เพียงพอเพื่อสื่อสารกับ [This.ContactCountry.GetName] ได้ในไม่ช้า"
 first_contact.60.A.cautious:0 "ช่างไร้เดียงสาเสียจริง"
 first_contact.60.A.proactive:0 "ความไว้วางใจของพวกเขาเป็นเรื่องที่น่ายินดียิ่ง"

 first_contact.100.name:0 "เริ่มการติดต่อสื่อสาร"
 first_contact.100.desc:1 "ความพยายามของเราในการถอดรหัสสัญญาณที่ดักจับได้จาก §H[This.ContactCountry.GetName]§! ประสบผลสำเร็จ และในที่สุดเราก็ประสบความสำเร็จในครั้งใหญ่ แม้ความชำนาญในภาษาของพวกเขาจะยังไม่สมบูรณ์ แต่เราก็สามารถเปิดช่องทางการทูตกับอารยธรรมที่เราทราบแล้วว่าคือ §H[This.ContactCountry.GetRealName]§! ได้เป็นผลสำเร็จ"
 first_contact.100.desc.homicidal:1 "ความพยายามของเราในการถอดรหัสสัญญาณที่ดักจับได้จาก §H[This.ContactCountry.GetName]§! ประสบผลสำเร็จ และในที่สุดเราก็ประสบความสำเร็จในครั้งใหญ่ แม้ความชำนาญในภาษาของพวกเขาจะยังไม่สมบูรณ์ แต่เราก็สามารถระบุได้ว่าพวกเขาคือ §H[This.ContactCountry.GetRealName]§! และตอนนี้เราก็พร้อมสื่อสารกับพวกเขาได้หากต้องการ"

 first_contact.101.name:0 "พวกเขาคือ [This.Owner.GetSpeciesNamePlural]!"
 first_contact.101.desc:2 "เมื่อเราเริ่มดักฟังการสื่อสารเพิ่มเติมของกลุ่มที่ชื่อว่า §H[This.ContactCountry.GetName]§! เราได้พบเรื่องที่น่าตกใจ: พวกเขาพูดด้วยสำเนียงแปลกๆ ของภาษาของเราเอง! เมื่อความประหลาดใจจากการพบพานนี้ผ่านพ้นไป การเชื่อมต่อสื่อสารก็ถูกจัดตั้งขึ้นอย่างรวดเร็ว เผยให้เห็นว่าพวกเขาคือ §H[This.ContactCountry.GetRealName]§!"
 first_contact.101.desc.2:0 "ในขณะที่เราตั้งท่าพร้อมโจมตี [This.ContactCountry.GetName] เราก็ได้ค้นพบสิ่งที่น่าประหลาดใจยิ่ง: พวกเขาคือ [This.Owner.GetSpeciesNamePlural]! เมื่อตระหนักได้ว่าพวกเขาพูดด้วยสำเนียงแปลกๆ ของภาษาเราเอง ความเป็นปรปักษ์ก็ยุติลงและการติดต่อสื่อสารก็เริ่มขึ้นอย่างรวดเร็ว เผยให้เห็นว่าพวกเขาคือ §H[This.ContactCountry.GetRealName]§!"
 first_contact.101.A:0 "จงยินดีเถิด—เพราะเราได้พบญาติพี่น้องที่พลัดพรากของเราแล้ว!"
 first_contact.101.B:0 "หวังว่าสายสัมพันธ์ทางเครือญาติจะนำไปสู่มิตรภาพที่ดีต่อกัน"
 first_contact.101.C:0 "บางทีเราก็ยังควรจะโจมตีพวกเขาอยู่ดี..."
 first_contact.101.D: "ความเป็นญาติไม่ได้หมายความว่าจะเป็นมิตรเสมอไป เฝ้าระวังตัวไว้"

 first_contact.102.name:0 "ถอดรหัส [This.ContactCountry.GetName] สำเร็จ"
 first_contact.102.desc:1 "เมื่อเรานำหน่วยประมวลผลของเรามาตีความการสื่อสารที่ดักจับได้จากมนุษย์ต่างดาวลึกลับภายใต้รหัสกำหนด §H[This.ContactCountry.GetName]§! เราได้พบการค้นพบที่น่าตกตะลึง: พวกเขาเองก็เป็นหนึ่งในปัญญาจักรกลเช่นกัน! แม้ว่าชุดคำสั่งของพวกเขาจะต่างจากของเรามากเนื่องจากพัฒนามาจากภาษาออร์แกนิกที่ต่างกันอย่างสิ้นเชิง แต่มันก็ถูกสร้างขึ้นบนสมมติฐานพื้นฐานที่คล้ายคลึงกัน ส่งผลให้การถอดรหัสรูปแบบภาษาเขียนโปรแกรมเพื่อให้สื่อสารในระดับเบื้องต้นได้นั้นเป็นเพียงเรื่องของเวลาเท่านั้น ซึ่งเผยให้เห็นว่าพวกเขาคือ §H[This.ContactCountry.GetRealName]§!"
 first_contact.102.lostcolony.desc: "เมื่อเรานำหน่วยประมวลผลมาตีความสัญญาณสื่อสารที่ดักจับได้จากเอเลี่ยนปริศนาในชื่อรหัส §H[This.ContactCountry.GetName]§! ก็พบเรื่องน่าทึ่งคือพวกเขาก็เป็นปัญญาจักรกลเหมือนกัน! โพรโทคอลสื่อสารของพวกเขาคล้ายกับเราอย่างมาก และความเข้ากันได้ของระบบซอฟต์แวร์ทำให้เราเริ่มการติดต่อได้อย่างรวดเร็ว ความคล้ายคลึงกันนี้ครอบคลุมไปถึงส่วนอื่นๆ จนระดับที่ปัญญาจักรกลของเราอาจถือได้ว่าเป็นเวอร์ชันดัดแปลง(เสียงดัง)จากโค้ดตั้งต้นของพวกเขาเลยทีเดียว มีเพียงคำอธิบายที่เป็นไปได้เพียงอย่างเดียวเท่านั้น"
 first_contact.102.A:0 "ประเมินผลลัพธ์ว่าอยู่ในเกณฑ์ที่เพียงพอ"
 first_contact.102.B: "อัปเดตภารกิจ: ตรวจพบเมนเฟรมหลักแล้ว"

 first_contact.103.name:0 "จิตสำนึกร่วมกลุ่ม"
 first_contact.103.desc.base:0 "ความพยายามของเราในการถอดรหัสสัญญาณที่ได้จาก §H[This.ContactCountry.GetName]§! ประสบความสำเร็จ และในที่สุดเราก็สามารถเปิดช่องทางการทูตกับอารยธรรมที่เราได้ทราบว่าคือ §H[This.ContactCountry.GetRealName]§! ได้แล้ว"
 first_contact.103.desc:0 "$first_contact.103.desc.base$\n\nน่า ทึ่ง ดู เหมือน ว่า พวก เขา ขาด ความ คิด ใน เรื่อง ปัจเจกบุคคล อย่าง สิ้น เชิง ซึ่ง มี อยู่ ใน[This.Owner.GetSpeciesAdj]สายพันธุ์. แท้จริงบุคคลสําคัญอย่างแน่นอน[This.ContactCountry.GetAdj] \"[This.ContactCountry.GetIndividualName]\"ไม่มีเจตจํานงหรือความคิดใด ๆ และเป็นเพียงเบี้ยของ§H\"[This.ContactCountry.GetGovernmentName]\"§!ห่างไกลจากความเจ็บปวดภายใต้การควบคุมที่เข้มงวดเช่นของเรา[This.Owner.GetResearchers]คาดเดาว่า[This.ContactCountry.GetSpeciesNamePlural]ได้มีวิวัฒนาการที่จะขึ้นอยู่กับหน่วยสืบราชการลับนี้ และจะไม่สามารถอยู่รอดได้โดยไม่ต้องมัน"
 first_contact.103.A:0 "เราควรศึกษาพวกเขา—และนำผลลัพธ์มาประยุกต์ใช้กับแรงงานของเราเอง!"
 first_contact.103.B:0 "เป็นสายพันธุ์ที่น่าหลงใหลมาก เราต้องค้นหาว่าปรากฏการณ์เช่นนี้เกิดขึ้นได้อย่างไร"
 first_contact.103.C1:0 "เราจะกวาดล้างพวกเขาให้สิ้นซาก"

 first_contact.104.name:0 "อารยธรรมแห่งจักรกล"
 first_contact.104.desc.base:0 "$first_contact.103.desc.base$\n\nที่น่าทึ่งคือ ปรากฏว่าพวกเขาเป็นอารยธรรมหุ่นยนต์ที่ทำงานโดยอัตโนมัติอย่างสมบูรณ์ ซึ่งนำโดย AI เพียงหนึ่งเดียวที่น่าเกรงขาม"
 first_contact.104.desc.terminator_or_default:0 "$first_contact.104.desc.base$ เราไม่พบร่องรอยของผู้สร้างพวกเขาเลย เราเดาได้เพียงว่าผู้สร้างอาจถูกล้างบางไปในมหันตภัยครั้งใหญ่ก่อนที่ [This.ContactCountry.GetRealName] จะถือกำเนิดขึ้นมา"
 first_contact.104.desc.terminator_or_default.wilderness: "$first_contact.103.desc.base$\n\nน่า ทึ่ง ที่ ดู เหมือน ว่า สิ่ง มี ชีวิต เหล่า นี้ เป็น ส่วน หนึ่ง ของ อารยธรรม สังเคราะห์ ซึ่ง ก่อ ตัว ขึ้น รอบ ๆ เชาวน์ ปัญญา ของ เครื่องจักร ที่ แจก จ่าย ออก ไป. ในระดับพื้นฐาน ธรรมชาติของจิตสํานึกของพวกเขา ไม่ได้แตกต่างกันเกินไป จากของเราเอง" # use of '103.base' is intentional
 first_contact.104.desc.servitor:0 "$first_contact.104.desc.base$ดู เหมือน ว่า แม้ ว่า เครื่องจักร จะ มี อํานาจ ควบคุม มาก แต่ พวก เขา ได้ ไว้ ชีวิต ผู้ สร้าง. จริงๆแล้ว[secondary_species.GetNamePlural]ตอนนี้พวกเขาใช้ชีวิตอย่างสบาย\"ไบโอ-โทรเฟียร์\" ในชื่อ \"ซาตินา\"$first_contact.104.desc.base$ ดูเหมือนว่า แม้ว่าพวกเครื่องจักรจะเป็นผู้ควบคุมเกือบทั้งหมด แต่พวกมันก็ละเว้นชีวิตผู้สร้างของพวกมัน จริง ๆ แล้ว ตอนนี้เหล่า [secondary_species.GetNamePlural] ใช้ชีวิตอย่างสุขสบายจากการได้รับการเอาอกเอาใจ"
 first_contact.104.desc.servitor.wilderness: "$first_contact.104.desc.base$ จุดที่พวกเขาแตกต่างจากเรามากที่สุดคือการเก็บรักษาสิ่งมีชีวิตอินทรีย์อย่าง [secondary_species.GetNamePlural] ไว้แยกต่างหากในเขตรักษาพันธุ์พิเศษ สิ่งมีชีวิตเหล่านี้ดูเหมือนจะเป็นผู้สืบทอดของผู้สร้างเครื่องจักร ซึ่งตอนนี้ได้รับการประคบประหงมและอนุรักษ์ไว้ด้วยเหตุผลที่อยู่เหนือความเข้าใจของเรา"
 first_contact.104.desc.assimilator.regular:0 "$first_contact.104.desc.base$ ดูเหมือนว่าพวกเครื่องจักรไม่ต้องการเสียศักยภาพของผู้สร้างของพวกมันอย่าง [secondary_species.GetNamePlural] ไปโดยเปล่าประโยชน์ แต่พวกมันกลับหาวิธีผสมผสานพวกเขาเข้ากับกลุ่มร่วมของตนโดยการฝังอุปกรณ์ไซเบอร์เนติกส์แทน สิ่งที่น่ากังวลคือ [This.Owner.GetResearchers] ของเราไม่พบเหตุผลที่จะเชื่อว่าการฝังอุปกรณ์ดังกล่าวจะไม่สามารถใช้งานกับประชากรของเราเองได้..."
 first_contact.104.desc.assimilator.hive:0 "$first_contact.104.desc.base$ ดูเหมือนว่าพวกเครื่องจักรไม่ต้องการเสียศักยภาพของผู้สร้างของพวกมันอย่าง [secondary_species.GetNamePlural] ไปโดยเปล่าประโยชน์ แต่พวกมันกลับหาวิธีผสมผสานพวกเขาเข้ากับกลุ่มร่วมของตนโดยการฝังอุปกรณ์ไซเบอร์เนติกส์แทน โชคดีที่เราเชื่อว่าโดรนของเราเองไม่มีความเปราะบางดังกล่าว และจะส่งผลให้หยุดทำงานแทนหากมีการฝังอุปกรณ์"
 first_contact.104.desc.assimilator.wilderness: "$first_contact.104.desc.base$ อย่างไรก็ตาม พวกมันพบวิธีการรักษาองค์ประกอบอินทรีย์บางอย่างไว้ในโครงสร้างของพวกมัน: นั่นคือ [secondary_species.GetNamePlural] ซึ่งจิตสำนึกที่มีอยู่เดิมของพวกเขาดูเหมือนจะถูกกลืนกินโดยจิตสำนึกของเครื่องจักร\n\nแม้ว่าสิ่งนี้จะเป็นภัยคุกคามต่อสิ่งมีชีวิตอินทรีย์ส่วนใหญ่ แต่เราสงสัยว่าสิ่งมีชีวิตพึ่งพาอาศัยของเราอาจกลายเป็นโดรนที่ไม่เหมาะสม หากจักรวรรดิไซบอร์กนี้พยายามที่จะผสมผสานเราเข้ามา"
 first_contact.104.A:0 "เราควรศึกษาพวกเขา - บางทีระบบอัตโนมัติของเราเองอาจได้รับการอัปเกรดก็ได้!"
 first_contact.104.B1:0 "น่าสะพรึงกลัวยิ่งนัก เราต้องหาวิธีแยกชิ้นส่วนพวกมันให้ได้!"
 first_contact.104.B2:0 "เราจะแยกชิ้นส่วนพวกมัน"
 first_contact.104.B3:0 "บางทีพวกมันก็น่าจะกินได้เหมือนกัน..."

 first_contact.105.name:0 "เข้าใจ [This.ContactCountry.GetName] แล้ว"
 first_contact.105.desc:0 "ความพยายามของเราในการถอดรหัสสัญญาณที่ได้รับจาก §H[This.ContactCountry.GetName]§! ได้ผลตอบแทนแล้ว และในที่สุดเราก็ประสบความสำเร็จครั้งสำคัญ กระบวนการนี้ได้รับการช่วยเหลืออย่างมากจากการค้นพบว่าพวกเขาจัดตั้งขึ้นเป็นรูปแบบหนึ่งของจิตสำนึกร่วมเช่นเดียวกับเรา แม้ว่าชีววิทยาของพวกเขา - รวมถึงความคิดเห็นของ [this.ContactCountry.GetHiveAuthority] ของพวกเขา - จะค่อนข้างแตกต่างจากเรา แต่ดูเหมือนว่า [this.ContactCountry.GetIndividualNamePlural] ของพวกเขานั้นเข้ากันได้กับโครงสร้างทางความคิดของเรา และสามารถรวมเข้ากับ [This.Owner.GetGovernmentName] ได้"
 first_contact.105.A:0 "บางที เมื่อเวลาผ่านไป พวกเขาจะหันมาคิดเป็นหนึ่งเดียวกับเรา"

 first_contact.200.name:0 "ขุดค้นข้อมูลสำเร็จ"
 first_contact.200.desc:1 "เราประสบความสำเร็จในการเจาะระบบเครือข่ายของ §H[This.ContactCountry.GetName]§! และเข้าถึงคลังข้อมูลของพวกเขาได้ชั่วขณะหนึ่ง แม้ว่าระยะเวลาการเข้าถึงของเราจะสั้น แต่เราก็สามารถคัดลอกข้อมูลจำนวนมากได้ ซึ่งหวังว่าข้อมูลนี้จะไม่เพียงช่วยให้เราแปลภาษาของพวกเขาได้อย่างรวดเร็วเท่านั้น แต่ยังช่วยประเมินระดับเทคโนโลยีของพวกเขาได้อีกด้วย"
 first_contact.205.name:0 "ความสำเร็จที่มีราคาต้องจ่าย"
 first_contact.205.desc:1 "เราประสบความสำเร็จในการเจาะระบบเครือข่ายของ §H[This.ContactCountry.GetName]§! และเข้าถึงคลังข้อมูลของพวกเขาได้ชั่วขณะหนึ่ง ก่อนที่การเข้าถึงของเราจะถูก §Hตัดขาด§! อย่างกะทันหัน - แสดงว่าการมีอยู่ของเราไม่พ้นจากการตรวจพบ แม้ว่าระยะเวลาการเข้าถึงของเราจะสั้น แต่เราก็สามารถคัดลอกข้อมูลจำนวนมากได้ ซึ่งหวังว่าข้อมูลนี้จะไม่เพียงช่วยให้เราแปลภาษาของพวกเขาได้อย่างรวดเร็วเท่านั้น แต่ยังช่วยประเมินระดับเทคโนโลยีของพวกเขาได้อีกด้วย เราทำได้เพียงหวังว่าเราจะไม่ได้สร้างศัตรูที่อันตรายให้ตัวเองจากแผนการนี้..."
 first_contact.205.A:0 "หวังว่ามันจะคุ้มค่า..."
 first_contact.206.name:0 "ตรวจพบการแฮก"
 first_contact.206.desc.normal:1 "ทีมงานของเราที่รับผิดชอบในการวิจัย §H[From.Owner.GetName]§! รายงานข่าวที่น่าตกใจ: ตรวจพบความพยายามของพวกเขาในการเจาะระบบคอมพิวเตอร์ของเรา! น่าเสียดาย ดูเหมือนว่าพวกเขาจะเข้าถึงข้อมูลที่ละเอียดอ่อนจำนวนมากได้ก่อนที่เราจะสามารถตัดการเข้าถึงของพวกเขาได้ การกระทำที่ไม่เป็นมิตรนี้ทำให้หลายคนใน [Root.Owner.GetName] กังวลอย่างลึกซึ้งต่อภัยคุกคามที่ [From.Owner.GetName] อาจก่อขึ้น"
 first_contact.206.desc.hive:1 "โดรนของเราที่รับผิดชอบในการวิจัย §H[From.Owner.GetName]§! รายงานข่าวที่น่าตกใจ: ตรวจพบความพยายามของพวกเขาในการเจาะระบบคอมพิวเตอร์ของเรา! น่าเสียดาย ดูเหมือนว่าพวกเขาจะเข้าถึงข้อมูลที่ละเอียดอ่อนจำนวนมากได้ก่อนที่เราจะสามารถตัดการเข้าถึงของพวกเขาได้ เราควรจับตามองพวกเขา และระแวดระวังความเคลื่อนไหวใด ๆ ในอนาคตที่พวกเขาอาจทำ ซึ่งอาจเป็นผลเสียต่อ [This.Owner.GetGovernmentName]"
 first_contact.206.desc.machine:1 "โดรนของเราที่รับผิดชอบในการวิจัย §H[From.Owner.GetName]§! รายงานข่าวที่น่าตกใจ: ตรวจพบความพยายามของพวกเขาในการเจาะระบบของเรา! น่าเสียดาย ดูเหมือนว่าพวกเขาจะเข้าถึงข้อมูลที่ละเอียดอ่อนจำนวนมากได้ก่อนที่เราจะสามารถตัดการเข้าถึงของพวกเขาได้ เหตุการณ์นี้กระตุ้นให้เราต้องอัปเดตโปรโตคอลการป้องกันและเฟิร์มแวร์ของระบบเคลื่อนที่ของเรา - รวมถึงยกระดับการประเมินภัยคุกคามของ [From.Owner.GetName]"
 first_contact.206.A:0 "เราคงต้องจับตาดูพวกเขาแล้ว"
 first_contact.210.name:0 "ยกเลิกการแฮก"
 first_contact.210.desc:1 "ความพยายามของเราในการขุดคุ้ยระบบเครือข่ายของ §H[This.ContactCountry.GetName]§! อย่างลับ ๆ เพื่อค้นหาข้อมูลเพิ่มเติมเกี่ยวกับพวกเขาไม่ประสบความสำเร็จ [This.Owner.GetEnvoyCap] [This.Leader.GetName] และทีมวิทยาศาสตร์ของ[This.Leader.GetHerHis] ตระหนักได้อย่างรวดเร็วว่าระบบที่พวกเขากำลังเผชิญอยู่นั้นก้าวหน้าเกินไป - หรือผู้ควบคุมระบบมีความระมัดระวังเกินกว่าที่จะถูกหลอกด้วยวิธีนี้ โชคดีที่[This.Leader.GetSheHe] [This.Leader.GetWasWere] สามารถ §Hยกเลิก§! ความพยายามแฮกข้อมูลก่อนที่จะถูกตรวจพบ"
 first_contact.210.A:0 "ถ้าอย่างนั้น เราคงต้องทำด้วยวิธีที่ยากขึ้นแล้วล่ะ"
 first_contact.215.name:0 "งานแฮกที่ล้มเหลว"
 first_contact.215.desc:1 "ดูเหมือนว่าความพยายามของเราในการขุดคุ้ยระบบเครือข่ายของ §H[This.ContactCountry.GetName]§! อย่างลับ ๆ ได้ถูก §Hตรวจพบ§! แล้ว ยังไม่แน่ชัดว่าเกิดอะไรขึ้นกันแน่ แต่ [This.Owner.GetEnvoy] [This.Leader.GetName] อ้างว่าระบบที่พวกเขาเผชิญหน้าอยู่นั้นล้ำหน้าเกินไป - หรือผู้ควบคุมของพวกเขาระวังตัวเกินไป - ที่จะโดนเล่นงานด้วยวิธีนี้ น่าเสียดายที่กว่าเรื่องนี้จะกระจ่างก็สายเกินไปเสียแล้ว เราทำได้เพียงหวังว่าเราจะไม่ได้สร้างศัตรูที่อันตรายให้ตัวเองด้วยแผนการนี้..."
 first_contact.215.A:0 "จุดเปลี่ยนของเหตุการณ์ที่น่าเสียใจ"
 first_contact.215.A.tooltip:1 "§H[This.ContactCountry.GetName]§! ได้รับความประทับใจแรกที่ไม่ดีต่อเรา"
 first_contact.216.name:0 "สกัดกั้นความพยายามเจาะระบบได้สำเร็จ"
 first_contact.216.desc.normal:1 "ทีมงานของเราที่รับผิดชอบในการวิจัย §H[From.Owner.GetName]§! รายงานข่าวที่น่าตกใจ: ตรวจพบความพยายามของพวกเขาในการเจาะระบบคอมพิวเตอร์ของเรา! โชคดีที่เราสามารถขับไล่พวกเขาออกไปได้ก่อนที่พวกเขาจะเข้าถึงข้อมูลที่ละเอียดอ่อนใด ๆ อย่างไรก็ตาม การกระทำที่ไม่เป็นมิตรนี้ทำให้หลายคนใน [Root.Owner.GetName] กังวลอย่างลึกซึ้งต่อภัยคุกคามที่ [From.Owner.GetName] อาจก่อขึ้น"
 first_contact.216.desc.hive:1 "โดรนของเราที่รับผิดชอบในการวิจัย §H[From.Owner.GetName]§! รายงานข่าวที่น่าตกใจ: ตรวจพบความพยายามของพวกเขาในการเจาะระบบคอมพิวเตอร์ของเรา! โชคดีที่เราสามารถขับไล่พวกเขาออกไปได้ก่อนที่พวกเขาจะเข้าถึงข้อมูลที่ละเอียดอ่อนใด ๆ เราควรจับตามองพวกเขา และระแวดระวังความเคลื่อนไหวใด ๆ ในอนาคตที่พวกเขาอาจทำ ซึ่งอาจเป็นผลเสียต่อ [This.Owner.GetGovernmentName]"
 first_contact.216.desc.machine:1 "โดรนของเราที่รับผิดชอบในการวิจัย §H[From.Owner.GetName]§! รายงานข่าวที่น่าตกใจ: ตรวจพบความพยายามของพวกเขาในการเจาะระบบของเรา! โชคดีที่เราสามารถขับไล่พวกเขาออกไปได้ก่อนที่พวกเขาจะเข้าถึงข้อมูลที่ละเอียดอ่อนใด ๆ เหตุการณ์นี้กระตุ้นให้เราต้องอัปเดตโปรโตคอลการป้องกันและเฟิร์มแวร์ของระบบเคลื่อนที่ของเรา - รวมถึงยกระดับการประเมินภัยคุกคามของ [From.Owner.GetName]"
 first_contact.216.A:0 "$first_contact.206.A$"
 first_contact.220.name:0 "$first_contact.100.name$"
 first_contact.220.desc.base:1 "ด้วยความพยายามในการเจาะระบบเครือข่ายของพวกเขาอย่างลับ ๆ เราจึงสามารถรวบรวมข้อมูลได้เพียงพอสำหรับ [This.Owner.GetLinguists] ของเราในการแปลภาษาที่ใช้โดย §H[This.ContactCountry.GetName]§! แม้ว่าความเข้าใจในภาษาของพวกเขาจะยังไม่สมบูรณ์ แต่เราก็สามารถเปิดช่องทางทางการทูตกับอารยธรรมที่เราทราบแล้วว่าเป็น §H[This.ContactCountry.GetRealName]§! ได้สำเร็จ"
 first_contact.220.desc.homicidal.base:1 "ด้วยความพยายามในการเจาะระบบเครือข่ายของพวกเขาอย่างลับ ๆ เราจึงสามารถรวบรวมข้อมูลได้เพียงพอสำหรับ [This.Owner.GetLinguists] ของเราในการแปลภาษาที่ใช้โดย §H[This.ContactCountry.GetName]§! แม้ว่าความเข้าใจในภาษาของพวกเขาจะยังไม่สมบูรณ์ แต่เราก็ระบุได้ว่าพวกเขาคือ §H[This.ContactCountry.GetRealName]§! และสามารถสื่อสารกับพวกเขาได้หากต้องการ"

 first_contact.220.desc.physics.base:0 "นอกจากนี้ เรายังสามารถวิเคราะห์ข้อมูลทางเทคนิคที่คัดลอกมาจากพวกเขา และพบแนวทางใหม่ ๆ ในการแก้ปัญหาฟิสิกส์ซึ่ง [This.Owner.GetResearchers] ของเราไม่เคยนึกถึงมาก่อน"
 first_contact.220.desc.society.base:0 "นอกจากนี้ เรายังสามารถวิเคราะห์ข้อมูลทางเทคนิคที่คัดลอกมาจากพวกเขา และพบแนวทางใหม่ ๆ ในการแก้ปัญหาด้านโครงสร้างสังคมซึ่ง [This.Owner.GetResearchers] ของเราไม่เคยนึกถึงมาก่อน"
 first_contact.220.desc.engineering.base:0 "นอกจากนี้ เรายังสามารถวิเคราะห์ข้อมูลทางเทคนิคที่คัดลอกมาจากพวกเขา และพบแนวทางใหม่ ๆ ในการแก้ปัญหาด้านวิศวกรรมซึ่ง [This.Owner.GetResearchers] ของเราไม่เคยนึกถึงมาก่อน"
 first_contact.220.desc.nothing.base:0 "นอกจากนี้ เรายังสามารถวิเคราะห์ข้อมูลทางเทคนิคที่คัดลอกมาจากพวกเขา แต่พบข้อมูลที่น่าสนใจเพียงเล็กน้อย [This.Owner.GetResearchers] ของเรายืนยันว่า แม้พวกเขาจะใช้แนวทางที่แตกต่างกันในหลาย ๆ ประเด็น แต่ดูเหมือนว่าเทคโนโลยีของพวกเขาไม่ได้ก้าวหน้าไปกว่าของเราเลย"

