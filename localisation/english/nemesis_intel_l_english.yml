 first_contact.250.name:0 "ยึดยานต่างดาวได้แล้ว!"
 first_contact.250.desc:0 "หลังจากการปะทะกันสั้น ๆ ซึ่งเราสูญเสียกำลังพลเพียงเล็กน้อย ลูกเรือของยานสำรวจของ §H[This.ContactCountry.GetName]§! - ซึ่งตอนนี้เราทราบแล้วว่าเป็นเผ่าพันธุ์ [This.ContactCountry.Species.GetAAnSpeciesClass] §H[This.ContactCountry.Species.GetClass]§! - ได้ยอมจำนนต่อกองกำลังบุกยึดของเรา ตอนนี้เราควบคุมทั้งยานและลูกเรือส่วนใหญ่ของพวกเขาไว้เป็นตัวประกัน และสามารถเริ่มทำการ §Hสอบปากคำ§! พวกเขา รวมถึงศึกษาเทคโนโลยีของพวกเขาได้แล้ว"
 first_contact.250.desc.multispecies:0 "หลังจากการปะทะกันสั้น ๆ ซึ่งเราสูญเสียกำลังพลเพียงเล็กน้อย ลูกเรือของยานสำรวจจาก §H[This.ContactCountry.GetName]§! ได้ยอมจำนนต่อกองกำลังบุกยึดของเรา มีเผ่าพันธุ์ต่างดาวที่แตกต่างกันหลายเผ่าพันธุ์บนยาน แต่ส่วนใหญ่ดูเหมือนจะเป็น §H[This.ContactCountry.Species.GetClassPlural]§! ตอนนี้เราควบคุมทั้งยานและลูกเรือส่วนใหญ่ของพวกเขาไว้เป็นตัวประกัน และสามารถเริ่มทำการ §Hสอบปากคำ§! พวกเขา รวมถึงศึกษาเทคโนโลยีของพวกเขาได้แล้ว"
 first_contact.250.desc.machine_victim:0 "เมื่อเราบุกขึ้นยานสำรวจของ §H[This.ContactCountry.GetName]§! เราก็ได้พบกับการค้นพบที่น่าประหลาดใจ - ลูกเรือทั้งหมดประกอบด้วยโดรนจักรกลที่ดูเหมือนจะถูกควบคุมโดย §Hปัญญาประดิษฐ์นอกรีต!§! หลังจากการต่อสู้ช่วงสั้น ๆ เราสามารถหยุดการทำงานของพวกมันได้มากพอจนส่วนที่เหลือหยุดการต้านทาน น่าแปลกที่พวกมันไม่ได้เริ่มขั้นตอนการทำลายตัวเอง - เราทำได้เพียงสันนิษฐานว่าเราโชคดีพอที่จะตัดสัญญาณของปัญญาประดิษฐ์ที่ควบคุมพวกมันก่อนที่จะมีการสั่งการ\n\nตอนนี้เราควบคุมทั้งยานและซากลูกเรือของพวกเขาไว้เป็น §Hตัวประกัน§! เราสามารถเริ่มศึกษาเทคโนโลยีของพวกเขา และดูว่าโดรนเหล่านี้จะให้ข้อมูลที่เป็นประโยชน์ใด ๆ หรือไม่"
 first_contact.250.desc.hive_victim:0 "หลังจากการปะทะกันสั้น ๆ ซึ่งเราสูญเสียกำลังพลเพียงเล็กน้อย เราได้เอาชนะลูกเรือของยานสำรวจของ §H[This.ContactCountry.GetName]§! และบังคับให้พวกเขายอมจำนน เอเลี่ยน §H[This.ContactCountry.Species.GetClass]§! ต่อสู้ด้วยการประสานงานที่ยอดเยี่ยม - ราวกับถูกชี้นำโดยจิตสำนึกเดียว - จนกระทั่งจู่ ๆ พวกมันก็หยุดต่อต้านพร้อมกัน ตั้งแต่นั้นมา พวกมันก็ดูไร้จุดหมายและสับสน เราทำได้เพียงสันนิษฐานว่าพวกมันเป็นโดรนของจิตสำนึกร่วมบางประเภท\n\nตอนนี้เราควบคุมทั้งยานและซากลูกเรือของพวกเขาไว้เป็น §Hตัวประกัน§! เราสามารถเริ่มศึกษาเทคโนโลยีของพวกเขา และดูว่าวิธีการสอบสวนใด ๆ จะให้ข้อมูลที่เป็นประโยชน์ได้หรือไม่"
 first_contact.250.desc.wilderness_victim: "หลังจากการปะทะกันสั้น ๆ ซึ่งเราสูญเสียกำลังพลเพียงเล็กน้อย เราได้เอาชนะลูกเรือของยานสำรวจจาก §H[This.ContactCountry.GetName]§! และบังคับให้ยอมจำนน ในตอนแรก เอเลี่ยน §H[This.ContactCountry.Species.GetClass]§! ต่อสู้ด้วยการประสานงานที่ยอดเยี่ยมกว่าที่เราคาดไว้มาก - ราวกับกระทำด้วยความคิดเดียว - จนกระทั่งจู่ ๆ พวกมันก็หยุดต้านทาน ในจุดนั้น ลูกเรือแต่ละคนสูญเสียการประสานงานทั้งหมด และกลับไปสู่พฤติกรรมดิบเถื่อนดั้งเดิมแทน\n\nเราทำได้เพียงสันนิษฐานว่าสิ่งมีชีวิตที่แทบไม่มีสติปัญญาเหล่านี้เคยทำงานในฐานะรูปแบบหนึ่งของจิตสำนึกร่วม ตอนนี้เราควบคุมทั้งพวกเขาและยานไว้เป็น §Hตัวประกัน§! เราสามารถเริ่มการสอบปากคำลูกเรือแปลก ๆ นี้ และศึกษาเทคโนโลยีที่เป็นเอกลักษณ์ของพวกเขาได้"
 first_contact.250.A:0 "พวกเขาจะต้องถูกสอบปากคำ"
 first_contact.250.B:0 "เริ่มการชำแหละได้เลย!"
 first_contact.250.B.machine:0 "มาแยกชิ้นส่วนเครื่องจักรเหล่านี้กัน!"
 first_contact.250.B.tooltip:0 "เราน่าจะค้นพบข้อมูลเพิ่มเติมจากแนวทางนี้ แต่ §H[This.ContactCountry.GetName]§! จะ §Rไม่พอใจเป็นอย่างยิ่ง§! เมื่อพวกเขารู้เรื่องนี้"
 first_contact.250.C:0 "เราไม่ต้องการผู้รอดชีวิต"
 first_contact.250.C.devourers:0 "มาดูกันว่ารสชาติของพวกเขาเป็นอย่างไร..."
 first_contact.250.C.homicidal_tooltip:0 "เราจะสืบสวนยานของพวกเขาเพื่อหาเบาะแสเพิ่มเติมด้วย\n"
 first_contact.260.name:0 "$first_contact.250.name$"
 first_contact.260.desc:0 "เราสามารถทำลายความสามารถในการเคลื่อนที่ของยานสำรวจของ §H[This.ContactCountry.GetName]§! ได้ แต่ก็หลังจากเกิดการยิงปะทะกันอย่างนองเลือดซึ่งดำเนินไปอย่างต่อเนื่องแม้กระทั่งตอนที่เราบุกขึ้นยาน การต่อสู้ดุเดือดมากจนไม่มีผู้รอดชีวิตที่เหลืออยู่เลย - ดูเหมือนว่าผู้ต่อสู้ที่ได้รับบาดเจ็บเลือกที่จะ §Hฆ่าตัวตาย§! แทนที่จะยอมให้ตัวเองถูกจับกุม\n\n$first_contact.260.desc.end$"
 first_contact.260.desc.machine_victim:1 "เราสามารถทำลายความสามารถในการเคลื่อนที่ของยานสำรวจของ §H[This.ContactCountry.GetName]§! ได้ แต่ก็หลังจากเกิดการยิงปะทะกันอย่างดุเดือดซึ่งดำเนินไปอย่างต่อเนื่องแม้กระทั่งตอนที่เราบุกขึ้นยาน ดูเหมือนว่าฝ่ายตรงข้ามของเราจะเป็นโดรนจักรกลที่ควบคุมโดย §Hปัญญาประดิษฐ์นอกรีต§! ซึ่งเห็นได้ชัดว่าออกคำสั่งให้ §Hทำลายตัวเอง§! ทันทีที่พบว่าไม่มีทางชนะ\n\n$first_contact.260.desc.end$"
 first_contact.260.desc.hive_victim:0 "เราสามารถทำลายความสามารถในการเคลื่อนที่ของยานสำรวจของ §H[This.ContactCountry.GetName]§! ได้ แต่ก็หลังจากเกิดการยิงปะทะกันอย่างนองเลือดซึ่งดำเนินไปอย่างต่อเนื่องแม้กระทั่งตอนที่เราบุกขึ้นยาน ลูกเรือของยานเคลื่อนไหวด้วยการประสานงานที่น่าทึ่ง - ราวกับถูกควบคุมโดยจิตสำนึกเดียว - และต่อสู้อย่างดุเดือดโดยไม่ยอมถอย และในที่สุดก็ §Hปลิดชีพตนเอง§! แทนที่จะปล่อยให้ถูกจับ\n\n$first_contact.260.desc.end$"
 first_contact.260.desc.wilderness_victim: "เราจัดการทำลายความสามารถในการเคลื่อนที่ของยานสำรวจจาก §H[This.ContactCountry.GetName]§! ได้ แต่ก็หลังจากเกิดการปะทะกันที่ทวีความรุนแรงและอันตรายยิ่งขึ้นเมื่อเราบุกขึ้นยาน ในตอนแรกเอเลี่ยน §H[This.ContactCountry.Species.GetClass]§! ต่อสู้ด้วยการประสานงานที่ยอดเยี่ยมกว่าที่เราคาดไว้มาก ราวกับกระทำด้วยความคิดเดียว อย่างไรก็ตาม เมื่อเราใช้ความได้เปรียบทางทหารกดดัน สิ่งมีชีวิตเหล่านั้นก็สูญเสียการประสานงานทั้งหมดไปทันที จากจุดนั้น พฤติกรรมของพวกมันก็กลับไปสู่สิ่งที่ดิบเถื่อน เหมือนสัตว์ป่า และไม่มีการประสานงานใด ๆ เลย จุดจบของพวกมันมาถึงอย่างรวดเร็ว\n\nเราทำได้เพียงสันนิษฐานว่าสิ่งมีชีวิตที่แทบไม่มีสติปัญญาเหล่านี้เคยทำงานเป็นส่วนหนึ่งของจิตสำนึกร่วม ไม่ว่าเอนทิตีใดที่คอยชี้นำพวกมันดูเหมือนจะเลือกการทำลายตัวเองมากกว่าการถูกจับกุม มันไม่เหลืออะไรทิ้งไว้ให้เราเลยนอกจากโครงยานที่ยังกู้คืนได้ซึ่งเต็มไปด้วยสัตว์ร้ายที่หิวโหยและพืชพรรณที่กระตุกเกร็ง"
 first_contact.260.desc.end:0 "แม้ว่าพวกเขาจะรีบร้อนในนาทีสุดท้ายเพื่อล้างระบบคอมพิวเตอร์และวางระเบิดยาน แต่ยานของพวกเขาก็ยังคงอยู่ในสภาพดี และ [This.Owner.GetResearchers] ของเราก็พร้อมที่จะดูว่าพวกเขาจะค้นพบอะไรจากมันได้บ้าง"
 first_contact.260.A:0 "ยานลำนี้จะเผยความลับของพวกเขาอย่างแน่นอน"
 first_contact.270.name:0 "ซากเปลือกที่ว่างเปล่า"
 first_contact.270.desc:0 "ความพยายามของเราในการยึดยานสำรวจของ §H[This.ContactCountry.GetName]§! ลงเอยด้วยภัยพิบัติ น่าเสียดายที่พวกเขาต้านทานอย่างรุนแรงกว่าที่คาดไว้ และเมื่อเห็นได้ชัดว่าการต่อสู้สิ้นหวัง พวกเขาก็ตั้งค่าให้ยาน §Hทำลายตัวเอง§! ตอนนี้เหลือซากยานเพียงเล็กน้อยนอกจากเศษขยะอวกาศ เราทำได้เพียงหวังว่ายานสำรวจของพวกเขาจะไม่ถูกติดตามด้วยยานรบที่มุ่งมั่นจะแก้แค้น!"
 first_contact.270.desc2:0 "ความพยายามของเราในการยึดยานสำรวจของ §H[This.ContactCountry.GetName]§! ลงเอยด้วยภัยพิบัติ น่าเสียดายที่พวกเขาต้านทานอย่างรุนแรงกว่าที่คาดไว้ และในระหว่างการยิงปะทะ ยานของพวกเขาได้รับ §Hความเสียหายวิกฤต§! ตอนนี้เหลือซากยานเพียงเล็กน้อยนอกจากเศษขยะอวกาศ เราทำได้เพียงหวังว่ายานสำรวจของพวกเขาจะไม่ถูกติดตามด้วยยานรบที่มุ่งมั่นจะแก้แค้น!"
 first_contact.270.A:0 "เราต้องทวีความพยายามในการแปลภาษาของพวกเขาเป็นสองเท่า"
 first_contact.270.B:0 "ลองทำแบบนี้อีกครั้งกันเถอะ..."
 first_contact.270.B.tooltip:0 "$first_contact.280.B.tooltip$\nอย่างไรก็ตาม พวกเขาจะระมัดระวังตัวมากขึ้น\n\n"
 first_contact.280.name:0 "ล้มเหลว"
 first_contact.280.desc.just_left:0 "ความพยายามของเราในการยึดยานสำรวจของ §H[This.ContactCountry.GetName]§! ลงเอยด้วยความล้มเหลว น่าเสียดายที่เราคลาดสายตากับยานของพวกเขาก่อนที่เราจะสามารถพยายามยึดมันได้"
 first_contact.280.desc.failed:0 "ความพยายามของเราในการยึดยานสำรวจของ §H[This.ContactCountry.GetName]§! ลงเอยด้วยความล้มเหลว น่าเสียดายที่พวกเขาสามารถหลบเลี่ยงความพยายามจับกุมของเราและ §Hหลบหนี§! ออกจากระบบดาวไปได้ก่อนที่เราจะสามารถทำให้ยานของพวกเขาหยุดทำงาน สิ่งนี้เป็นสัญญาณที่ไม่ดีสำหรับอนาคต - ไม่เพียงแต่เราต้องเผชิญกับความยากลำบากอย่างยิ่งในการค้นหาข้อมูลเพิ่มเติมเกี่ยวกับพวกเขา แต่พวกเขาจะถือว่านี่เป็นการกระทำที่เป็นปฏิปักษ์จากฝ่ายเราอย่างแน่นอน"
 first_contact.280.A:0 "$first_contact.270.A$"
 first_contact.280.B:0 "$first_contact.270.B$"
 first_contact.280.B.tooltip:0 "เนื่องจากเราทราบตำแหน่งระบบดาวบ้านเกิดของพวกเขาแล้ว เราอาจพยายาม §Hลักพาตัว§! ตัวอย่างสิ่งมีชีวิตจากที่นั่น\n\n"

 first_contact.252.name:0 "ยานถูกยึด"
 first_contact.252.desc.normal.start:1 "นักสำรวจของเราทราบดีว่าการเผชิญหน้าครั้งแรกเป็นเรื่องที่อันตราย แต่ไม่มีใครคาดคิดว่ามันจะเป็นความจริงขนาดนี้ ในการโจมตีอย่างรุนแรง [From.Owner.GetName] ได้ยึดยานของเรา โดยส่งกองกำลังบุกยึดขึ้นยานก่อนที่ระบบความเร็วฉุกเฉินจะทำงาน"
 first_contact.252.desc.normal.end:0 "ภาพสัญญาณสุดท้ายที่เราได้รับก่อนที่สัญญาณทั้งหมดจะถูกตัดขาดแสดงให้เห็นว่าศัตรูได้จับกุมลูกเรือส่วนใหญ่ไว้ในสภาพที่มีชีวิตอยู่ และตั้งใจที่จะสอบปากคำพวกเขา ซึ่งอาจมีจุดประสงค์เพื่อค้นหาข้อมูลเพิ่มเติมเกี่ยวกับเราเพื่อเตรียมพร้อมสำหรับการสู้รบเพิ่มเติม..."
 first_contact.252.desc.machine.start:1 "เป็นเรื่องชัดเจนสำหรับหน่วยประมวลผลของเราตั้งแต่แรกแล้วว่าการเผชิญหน้ากับอารยธรรมต่างดาวนั้นมีความเสี่ยง คำทำนายของเราได้รับการพิสูจน์ว่าเป็นจริงในกรณีของหนึ่งในยานสำรวจของเรา ซึ่งถูกโจมตีและบุกยึดโดย [From.Owner.GetName] ก่อนที่ระบบความเร็วฉุกเฉินจะทำงาน"
 first_contact.252.desc.hive.start:1 "ส่วนหนึ่งของเราที่ทำหน้าที่ประเมินภัยคุกคามมั่นใจตั้งแต่แรกว่าการเผชิญหน้ากับอารยธรรมต่างดาวนั้นมีความเสี่ยง สิ่งนี้ได้รับการพิสูจน์ว่าถูกต้องในกรณีของหนึ่งในยานสำรวจของเรา ซึ่งถูกโจมตีและบุกยึดโดย [From.Owner.GetName] ก่อนที่ระบบความเร็วฉุกเฉินจะทำงาน"
 first_contact.252.desc.hive.end:0 "อย่างไรก็ตาม หากปราศจากเราคอยสั่งการ พวกมันก็คงจะไม่สามารถให้ข้อมูลที่มีมูลค่ามากนัก - แม้ว่าพวกเขาจะสามารถเรียนรู้เทคโนโลยีของเราได้มากมายจากยานที่ถูกยึดไปก็ตาม การประเมินถึงภัยอันตรายที่เกิดจากพวกเขาจึงได้เพิ่มสูงขึ้นตามไปด้วย"
 first_contact.252.desc.normal:0 "$first_contact.252.desc.normal.start$ แม้ลูกเรือของเราจะพยายามอย่างกล้าหาญ แต่ผู้โจมตี - เผ่าพันธุ์ต่างดาว [From.Owner.Species.GetAAnSpeciesClass] [From.Owner.Species.GetClass] - ก็สามารถเอาชนะการป้องกันของเราได้\n\n$first_contact.252.desc.normal.end$"
 first_contact.252.desc.hive:0 "$first_contact.252.desc.hive.start$\n\nผู้โจมตีของเรา ซึ่งเป็นกลุ่มเอเลี่ยน [From.Owner.Species.GetClass] สามารถจับกุมโดรนรับใช้ของเราได้หลายตัว; $first_contact.252.desc.hive.end$"
 first_contact.252.desc.machine:0 "$first_contact.252.desc.machine.start$\n\nผู้โจมตีของเรา ซึ่งเป็นกลุ่มสิ่งมีชีวิตอินทรีย์ [From.Owner.Species.GetClass] สามารถจับกุมโดรนของเราได้หลายตัว; อย่างไรก็ตาม หากปราศจากเราคอยสั่งการ พวกมันก็คงจะไม่สามารถให้ข้อมูลที่มีมูลค่ามากนัก - แม้ว่าพวกเขาจะสามารถเรียนรู้เทคโนโลยีของเราได้มากมายจากยานที่ถูกยึดไปก็ตาม การประเมินถึงภัยอันตรายที่เกิดจากพวกเขาจึงได้เพิ่มสูงขึ้นตามไปด้วย"
 first_contact.252.desc.machine_enemy.normal:1 "$first_contact.252.desc.normal.start$ แม้ลูกเรือของเราจะพยายามอย่างกล้าหาญ แต่ผู้โจมตี - โดรนจักรกลที่ดูเหมือนจะถูกควบคุมโดยปัญญาประดิษฐ์นอกรีต - ก็สามารถเอาชนะการป้องกันของเราได้\n\n$first_contact.252.desc.normal.end$"
 first_contact.252.desc.machine_enemy.hive:0 "$first_contact.252.desc.hive.start$\n\nผู้โจมตีของเรา ซึ่งเป็นกลุ่มโดรนจักรกลที่ดูเหมือนจะถูกควบคุมโดยปัญญาประดิษฐ์นอกรีต สามารถจับกุมโดรนรับใช้ของเราได้หลายตัว; $first_contact.252.desc.hive.end$"
 first_contact.252.desc.machine_enemy.machine:0 "$first_contact.252.desc.machine.start$\n\nผู้โจมตีของเรา - กลุ่มของเครื่องจักรที่คล้ายกับเรามาก - สามารถจับโดรนของเราได้หลายตัว อย่างไรก็ตาม หากปราศจากเราคอยสั่งการ พวกมันก็คงจะไม่สามารถให้ข้อมูลที่มีมูลค่ามากนัก - แม้ว่าพวกเขาจะสามารถเรียนรู้เทคโนโลยีของเราได้มากมายจากยานที่ถูกยึดไปก็ตาม การประเมินถึงภัยอันตรายที่เกิดจากพวกเขาจึงได้เพิ่มสูงขึ้นตามไปด้วย"
 first_contact.252.desc.hive_enemy.normal:1 "$first_contact.252.desc.normal.start$ แม้ลูกเรือของเราจะพยายามอย่างกล้าหาญ แต่ผู้โจมตี - เอเลี่ยน [From.Owner.Species.GetClass] ที่เคลื่อนไหวด้วยการประสานงานที่น่ากลัว - ก็สามารถเอาชนะการป้องกันของเราได้\n\n$first_contact.252.desc.normal.end$"
 first_contact.252.desc.hive_enemy.machine:0 "$first_contact.252.desc.machine.start$\n\nผู้โจมตีของเรา - กลุ่มสิ่งมีชีวิตอินทรีย์ [From.Owner.Species.GetClass] ที่เคลื่อนไหวด้วยการประสานงานที่บ่งบอกถึงจิตสำนึกร่วมที่คล้ายกับเรา - สามารถจับโดรนของเราได้หลายตัว อย่างไรก็ตาม หากปราศจากเราคอยสั่งการ พวกมันก็คงจะไม่สามารถให้ข้อมูลที่มีมูลค่ามากนัก แม้ว่าพวกเขาจะสามารถเรียนรู้เทคโนโลยีของเราได้มากมายจากยานที่ถูกยึดไปก็ตาม การประเมินถึงภัยอันตรายที่เกิดจากพวกเขาจึงได้เพิ่มสูงขึ้นตามไปด้วย"
 first_contact.252.desc.hive_enemy.hive:0 "$first_contact.252.desc.hive.start$\n\nผู้โจมตีของเรา - กลุ่มเอเลี่ยน [From.Owner.Species.GetClass] ที่เคลื่อนไหวด้วยการประสานงานที่ส่งสัญญาณถึงจิตสำนึกร่วมที่เหมือนกับของพวกเรา - สามารถจับกุมโดรนรับใช้ของเราได้หลายตัว; $first_contact.252.desc.hive.end$"
 first_contact.252.desc.wilderness.start: "เราสงสัยมานานแล้วว่าหากมีสิ่งมีชีวิตอื่นอยู่ในกาแล็กซี มันอาจเป็นภัยคุกคามต่อเรา ที่ทั้งป่าเถื่อนและเป็นอันตรายถึงชีวิตไม่ต่างจากเอกภาวะนอกรีตหรือรังสีของดวงดาว แต่ตอนนี้ ข้อสงสัยของเราได้รับการพิสูจน์ว่าเป็นจริงแล้ว หนึ่งในยานสำรวจของเราถูกโจมตีและบุกยึดโดย [from.owner.GetName] พวกเขาเปิดการโจมตีอย่างรวดเร็วก่อนที่สิ่งมีชีวิตพึ่งพาอาศัยในยานของเราจะสามารถหลบหนีได้"
 first_contact.252.desc.wilderness: "$first_contact.252.desc.wilderness.start$\n\nผู้โจมตีของเรา ซึ่งเป็นกลุ่มเอเลี่ยน [from.owner.species.GetClass] ได้จับกุมองค์ประกอบ [root.GetSpeciesAdj] ของเราที่ตอนนี้นอนเคว้งคว้างอยู่บนยานไว้หลายส่วน เนื่องจากสิ่งมีชีวิตพึ่งพาอาศัยเหล่านี้ไม่ได้เป็นส่วนหนึ่งของเสียงประสานของเราอีกต่อไป เราจึงสงสัยว่าผู้จับกุมจะได้รับข้อมูลที่มีมูลค่าทางยุทธศาสตร์มากนัก อย่างไรก็ตาม การสูญเสียพวกเขาก็ยังคงทำให้เราอ่อนแอลง เรามีสิทธิ์ที่จะรู้สึกขุ่นเคืองใจ แต่ในขณะเดียวกันเราก็ควรภูมิใจที่ได้เปิดเผยและระบุภัยคุกคามใหม่ในความว่างเปล่าที่เต็มไปด้วยปริศนานี้"
 first_contact.252.A:0 "น่ากังวล น่ากังวลอย่างยิ่ง"

 first_contact.253.name:0 "ความโหดร้ายของ [From.Owner.GetName]"
 first_contact.253.desc.normal.end:0 "ภาพของเราจากภายในเรือตอนนี้ได้ตัดออก แต่ไม่ได้ก่อนที่จะแสดงให้เราเห็นความโหดร้ายที่ไม่สามารถบรรยาย เรา ต้อง คิด เอา เอง ว่า ความ เป็น ปฏิปักษ์ เป็น สิ่ง ที่ เลี่ยง ไม่ ได้ เมื่อ เผชิญ กับ อารยธรรม ที่ จะ ปฏิบัติ อย่าง นั้น."
 first_contact.253.desc.hive.end:0 "สามารถจับกุมโดรนรับใช้ของเราได้หลายตัวและเริ่มชำแหละพวกมันโดยไม่คำนึงถึงทรัพยากรที่สูญเสียไป ดูเหมือนว่าจะพยายามหาวิธีที่จะใช้ชีววิทยาของเรากลับมาเล่นงานเราเอง สิ่งนี้ ประกอบกับการที่พวกเขายึดยานของเราและเทคโนโลยีทั้งหมดที่ใช้อยู่ที่นั่น ทำให้เราประเมินระดับภัยอันตรายที่เกิดจากพวกเขาเพิ่มขึ้นอย่างมีนัยสำคัญ"
 first_contact.253.desc.machine.end:0 "สามารถจับกุมโดรนของเราได้หลายตัวและเริ่มแยกชิ้นส่วนพวกมันเพื่อดูการประกอบโครงสร้างของหน่วยเรา - เห็นได้ชัดว่ากำลังตรวจหาจุดอ่อนทั้งในซอฟต์แวร์และฮาร์ดแวร์ของพวกมัน สิ่งนี้ ประกอบกับการที่พวกเขายึดยานของเราและเทคโนโลยีทั้งหมดที่ใช้อยู่ที่นั่น ทำให้เราต้องเพิ่มการประเมินภัยคุกคามของพวกเขาอย่างมาก"
 first_contact.253.desc.normal:0 "$first_contact.252.desc.normal.start$ แม้ลูกเรือของเราจะพยายามอย่างกล้าหาญ แต่ผู้โจมตี - เผ่าพันธุ์ต่างดาว [From.Owner.Species.GetAAnSpeciesClass] [From.Owner.Species.GetClass] - ก็สามารถเอาชนะการป้องกันของเราได้\n\n$first_contact.253.desc.normal.end$"
 first_contact.253.desc.hive:0 "$first_contact.252.desc.hive.start$\n\nผู้โจมตีของเรา ซึ่งเป็นกลุ่มเอเลี่ยน [From.Owner.Species.GetClass] $first_contact.253.desc.hive.end$"
 first_contact.253.desc.machine:0 "$first_contact.252.desc.machine.start$\n\nผู้โจมตีของเรา ซึ่งเป็นกลุ่มสิ่งมีชีวิตอินทรีย์ [From.Owner.Species.GetClass] $first_contact.253.desc.machine.end$"
 first_contact.253.desc.machine_enemy.normal:0 "$first_contact.252.desc.normal.start$ แม้ลูกเรือของเราจะพยายามอย่างกล้าหาญ แต่ผู้โจมตี - โดรนจักรกลที่ดูเหมือนจะถูกควบคุมโดยปัญญาประดิษฐ์นอกรีต - ก็สามารถเอาชนะการป้องกันของเราได้\n\n$first_contact.253.desc.normal.end$"
 first_contact.253.desc.machine_enemy.hive:0 "$first_contact.252.desc.hive.start$\n\nผู้โจมตีของเรา ซึ่งเป็นกลุ่มโดรนจักรกลที่ดูเหมือนจะถูกควบคุมโดยปัญญาประดิษฐ์นอกรีต $first_contact.253.desc.hive.end$"
 first_contact.253.desc.machine_enemy.machine:0 "$first_contact.252.desc.machine.start$\n\nผู้โจมตีของเรา - กลุ่มโดรนจักรกลที่คล้ายกับเรามาก - $first_contact.253.desc.machine.end$"
 first_contact.253.desc.hive_enemy.normal:0 "$first_contact.252.desc.normal.start$ แม้ลูกเรือของเราจะพยายามอย่างกล้าหาญ แต่ผู้โจมตี - เอเลี่ยน [From.Owner.Species.GetClass] ที่เคลื่อนไหวด้วยการประสานงานที่น่ากลัว - ก็สามารถเอาชนะการป้องกันของเราได้\n\n$first_contact.253.desc.normal.end$"
 first_contact.253.desc.hive_enemy.machine:0 "$first_contact.252.desc.machine.start$\n\nผู้โจมตีของเรา - กลุ่มสิ่งมีชีวิตอินทรีย์ [From.Owner.Species.GetClass] ที่เคลื่อนไหวด้วยการประสานงานที่บ่งบอกถึงจิตสำนึกร่วมที่เหมือนกับของพวกเรา - $first_contact.253.desc.machine.end$"
 first_contact.253.desc.hive_enemy.hive:0 "$first_contact.252.desc.hive.start$\n\nผู้โจมตีของเรา - กลุ่มเอเลี่ยน [From.Owner.Species.GetClass] ที่เคลื่อนไหวด้วยการประสานงานที่บ่งบอกถึงจิตสำนึกร่วมที่เหมือนกับของพวกเรา - $first_contact.253.desc.hive.end$"
 first_contact.253.desc.wilderness: "$first_contact.252.desc.wilderness.start$\n\nผู้โจมตีของเรา ซึ่งเป็นกลุ่มเอเลี่ยน [from.owner.species.GetClass] ได้เริ่มทำการชำแหละและเชือดเฉือนส่วนต่างๆ ของเราที่พวกเขาจำแนกว่าเป็นสิ่งมีชีวิตบนยาน ส่วนต่างๆ ในหมู่พวกเราที่ไม่ได้เป็นสิ่งมีชีวิตพึ่งพาอาศัยขนาดใหญ่ที่เคลื่อนที่ได้ ดูเหมือนจะเผชิญกับชะตากรรมที่เบากว่า โดยเพียงแค่ถูกกำจัดหรือกวาดล้างไปเท่านั้น ไม่มีสิ่งใดบนยานเหลืออยู่ในเสียงประสานของเราอีกต่อไป แม้ว่าเราจะรู้สึกถึงความสูญเสียตลอดเวลาก็ตาม\n\nการกระทำที่เป็นการทรมานได้รับการยัดเยียดให้กับเรา แต่อย่างน้อยที่สุด: ตอนนี้เรามีความรู้เพิ่มเติมเกี่ยวกับภัยคุกคามประเภทต่างๆ ที่เราต้องเผชิญภายนอกนี้"
 first_contact.253.B.devourer:0 "อีกไม่นานเราคงจะได้รู้ว่าพวกเขามีรสชาติอร่อยหรือไม่"

 first_contact.254.name:0 "$first_contact.253.name$"
 first_contact.254.desc.normal.end:0 "ภาพสัญญาณจากภายในยานของเราได้ถูกตัดขาดไปแล้ว แต่ก่อนที่จะตัดไป มันได้แสดงให้เห็นถึงพวกต่างดาวประหารชีวิตตัวประกันทั้งหมดที่พวกมันจับไป โดยไม่แสดงความคำนึงใด ๆ ต่อชีวิตของ [This.Owner.GetSpeciesAdj] เลย เราต้องสันนิษฐานว่าการเปิดศึกสงครามเป็นเรื่องที่หลีกเลี่ยงไม่ได้เมื่อต้องเผชิญหน้ากับอารยธรรมที่กระทำการเช่นนี้"
 first_contact.254.desc.hive.end:0 "สามารถจับกุมโดรนรับใช้ของเราได้หลายตัวและเข่นฆ่าพวกมันอย่างไร้เหตุผลที่สุด โดยไม่ใส่ใจต่อการสูญเสียทรัพยากร สิ่งนี้ ประกอบกับการที่พวกเขายึดยานของเราและเทคโนโลยีทั้งหมดที่ใช้อยู่ที่นั่น ทำให้เราประเมินระดับภัยอันตรายที่เกิดจากพวกเขาเพิ่มขึ้นอย่างมีนัยสำคัญ"
 first_contact.254.desc.machine.end:0 "สามารถจับกุมโดรนของเราได้หลายตัวและแยกชิ้นส่วนพวกมันอย่างรุนแรงและไร้เหตุผลที่สุด สิ่งนี้ ประกอบกับการที่พวกเขายึดยานของเราและเทคโนโลยีทั้งหมดที่ใช้อยู่ที่นั่น ทำให้เราต้องเพิ่มการประเมินภัยคุกคามของพวกเขาอย่างมาก"
 first_contact.254.desc.normal:0 "$first_contact.252.desc.normal.start$ แม้ลูกเรือของเราจะพยายามอย่างกล้าหาญ แต่ผู้โจมตี - เผ่าพันธุ์ต่างดาว [From.Owner.Species.GetAAnSpeciesClass] [From.Owner.Species.GetClass] - ก็สามารถเอาชนะการป้องกันของเราได้\n\n$first_contact.254.desc.normal.end$"
 first_contact.254.desc.hive:0 "$first_contact.252.desc.hive.start$\n\nผู้โจมตีของเรา ซึ่งเป็นกลุ่มเอเลี่ยน [From.Owner.Species.GetClass] $first_contact.254.desc.hive.end$"
 first_contact.254.desc.machine:0 "$first_contact.252.desc.machine.start$\n\nผู้โจมตีของเรา ซึ่งเป็นกลุ่มสิ่งมีชีวิตอินทรีย์ [From.Owner.Species.GetClass] $first_contact.254.desc.machine.end$"
 first_contact.254.desc.machine_enemy.normal:0 "$first_contact.252.desc.normal.start$ แม้ลูกเรือของเราจะพยายามอย่างกล้าหาญ แต่ผู้โจมตี - โดรนจักรกลที่ดูเหมือนจะถูกควบคุมโดยปัญญาประดิษฐ์นอกรีต - ก็สามารถเอาชนะการป้องกันของเราได้\n\n$first_contact.254.desc.normal.end$"
 first_contact.254.desc.machine_enemy.hive:0 "$first_contact.252.desc.hive.start$\n\nผู้โจมตีของเรา ซึ่งเป็นกลุ่มโดรนจักรกลที่ดูเหมือนจะถูกควบคุมโดยปัญญาประดิษฐ์นอกรีต $first_contact.254.desc.hive.end$"
