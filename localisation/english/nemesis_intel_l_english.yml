 first_contact.20.desc.base: "มันปรากฏว่าสิ่งที่เรียกกันว่า§H[This.ContactCountry.GetName]§!เป็นส่วนหนึ่งของการไม่รู้จักก่อนหน้านี้§Hอารยธรรมต่าง ๆ§!แทน ที่ จะ ตั้ง หลัก แหล่ง อยู่ บน โลก ใด ๆ อย่าง พวก เขา เช่น พวก เรา เดิน ทาง โดย ทาง อวกาศ บน เรือ รบ ขนาด ใหญ่ อย่าง น้อย เรือ ลํา หนึ่ง ซึ่ง สามารถ มอง เห็น ได้ ภาย ใน ระยะ ห่าง ของ เรา. จนถึงตอนนี้ การสื่อสารของพวกเขา ได้ต่อต้านทุกความพยายามในการแปล"
 first_contact.20.desc.proactive: "$first_contact.20.desc.base$"
 first_contact.20.desc.cautious: "$first_contact.20.desc.base$เรา ระวัง ที่ จะ ไม่ เปิด เผย ข้อมูล ที่ ละเอียด อ่อน ขณะ ที่ เรา ทํา งาน เพื่อ สร้าง การ สื่อ ความ."
