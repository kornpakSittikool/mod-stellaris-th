 first_contact.254.desc.hive_enemy.normal:0 "$first_contact.252.desc.normal.start$ แม้ลูกเรือของเราจะพยายามอย่างกล้าหาญ แต่ผู้โจมตี - เอเลี่ยน [From.Owner.Species.GetClass] ที่เคลื่อนไหวด้วยการประสานงานที่น่ากลัว - ก็สามารถเอาชนะการป้องกันของเราได้\n\n$first_contact.254.desc.normal.end$"
 first_contact.254.desc.hive_enemy.machine:0 "$first_contact.252.desc.machine.start$\n\nผู้โจมตีของเรา - กลุ่มสิ่งมีชีวิตอินทรีย์ [From.Owner.Species.GetClass] ที่เคลื่อนไหวด้วยการประสานงานที่บ่งบอกถึงจิตสำนึกร่วมที่เหมือนกับของพวกเรา - $first_contact.254.desc.machine.end$"
 first_contact.254.desc.hive_enemy.hive:0 "$first_contact.252.desc.hive.start$\n\nผู้โจมตีของเรา - กลุ่มเอเลี่ยน [From.Owner.Species.GetClass] ที่เคลื่อนไหวด้วยการประสานงานที่บ่งบอกถึงจิตสำนึกร่วมที่เหมือนกับของพวกเรา - $first_contact.254.desc.hive.end$"
 first_contact.254.desc.wilderness: "$first_contact.252.desc.wilderness.start$\n\nผู้โจมตีของเรา ซึ่งเป็นกลุ่มเอเลี่ยน [from.owner.species.GetClass] ได้สังหารส่วนต่างๆ ของเราที่พวกเขาจำแนกว่าเป็นสิ่งมีชีวิตอย่างโหดเหี้ยมไร้ยางอาย พวกเราหลายส่วนที่ไม่ได้เป็นสิ่งมีชีวิตพึ่งพาอาศัยขนาดใหญ่ที่เคลื่อนที่ได้ก็ติดร่างแหในการกวาดล้างนี้เช่นกัน แต่ไม่ว่าอย่างไร: ทุกคนบนยานตอนนี้ถูกฉีกออกจากเสียงประสานของเราแล้ว เราสัมผัสได้ถึงความสูญเสียของพวกเขาตลอดเวลา\n\nการกระทำอันป่าเถื่อนอย่างไร้เหตุผลได้ถูกยัดเยียดให้กับเรา แต่อย่างน้อยตอนนี้เราก็รู้เพิ่มเติมเกี่ยวกับประเภทของภัยคุกคามที่เราต้องเผชิญในส่วนอื่นของกาแล็กซีนี้"
 first_contact.254.A:0 "ช่างป่าเถื่อนสิ้นดี"
 first_contact.254.A2:0 "นี่เป็นการลบหลู่ต่อสิ่งศักดิ์สิทธิ์ทั้งปวง!"
 first_contact.254.A3:0 "เราต้องเตรียมตัวสำหรับสงคราม!"
 first_contact.254.B:0 "นี่มันเกินขีดจำกัดที่จะยอมรับได้!"
 first_contact.254.A.devourer:0 "เอเลี่ยนที่มีหัวใจแบบเดียวกับเรา"
 first_contact.254.B.devourer:0 "บางทีพวกเขาก็น่าจะอร่อยเหมือนกัน"

 first_contact.262.name:0 "$first_contact.253.name$"
 first_contact.262.desc.normal.end:0 "บางทีอาจเป็นเรื่องโชคดี - ทั้งสำหรับพวกเขาและเพื่อประโยชน์ในการป้องกันไม่ให้ข้อมูลตกอยู่ในมือของศัตรู - ลูกเรือของเราเลือกที่จะปลิดชีวิตตนเองแทนที่จะปล่อยให้ถูกจับกุม อย่างไรก็ตาม เราต้องสันนิษฐานว่าผู้โจมตีของเราจะสามารถเรียนรู้ข้อมูลเกี่ยวกับเราได้มากมายจากการศึกษายานของเรา - และการเปิดศึกสงครามเป็นเรื่องที่หลีกเลี่ยงไม่ได้เมื่อต้องเผชิญหน้ากับอารยธรรมที่กระทำการเช่นนี้"
 first_contact.262.desc.gestalt.end:0 "สามารถเอาชนะการป้องกันของเราได้ เราจึงออกคำสั่งให้โดรนของเราปลดประจำการตนเองเพื่อปกป้องความปลอดภัยของข้อมูลของเรา อย่างไรก็ตาม เราต้องสันนิษฐานว่าผู้โจมตีของเราจะพบข้อมูลเกี่ยวกับเรามากมายจากการศึกษายานของเรา ส่งผลให้เราประเมินระดับภัยอันตรายที่เกิดจากพวกเขาเพิ่มขึ้นอย่างมีนัยสำคัญ"
 first_contact.262.desc.normal:0 "$first_contact.252.desc.normal.start$ แม้ลูกเรือของเราจะพยายามอย่างกล้าหาญ แต่ผู้โจมตี - เผ่าพันธุ์ต่างดาว [From.Owner.Species.GetAAnSpeciesClass] [From.Owner.Species.GetClass] - ก็สามารถเอาชนะการป้องกันของเราได้\n\n$first_contact.262.desc.normal.end$"
 first_contact.262.desc.hive:0 "$first_contact.252.desc.hive.start$\n\nผู้โจมตีของเรา ซึ่งเป็นกลุ่มเอเลี่ยน [From.Owner.Species.GetClass] $first_contact.262.desc.gestalt.end$"
 first_contact.262.desc.machine:0 "$first_contact.252.desc.machine.start$\n\nผู้โจมตีของเรา ซึ่งเป็นกลุ่มสิ่งมีชีวิตอินทรีย์ [From.Owner.Species.GetClass] $first_contact.262.desc.gestalt.end$"
 first_contact.262.desc.machine_enemy.normal:0 "$first_contact.252.desc.normal.start$ แม้ลูกเรือของเราจะพยายามอย่างกล้าหาญ แต่ผู้โจมตี - โดรนจักรกลที่ดูเหมือนจะถูกควบคุมโดยปัญญาประดิษฐ์นอกรีต - ก็สามารถเอาชนะการป้องกันของเราได้\n\n$first_contact.262.desc.normal.end$"
 first_contact.262.desc.machine_enemy.hive:0 "$first_contact.252.desc.hive.start$\n\nผู้โจมตีของเรา ซึ่งเป็นกลุ่มโดรนจักรกลที่ดูเหมือนจะถูกควบคุมโดยปัญญาประดิษฐ์นอกรีต $first_contact.262.desc.gestalt.end$"
 first_contact.262.desc.machine_enemy.machine:0 "$first_contact.252.desc.machine.start$\n\nผู้โจมตีของเรา - กลุ่มโดรนจักรกลที่คล้ายกับเรามาก - $first_contact.262.desc.gestalt.end$"
 first_contact.262.desc.hive_enemy.normal:0 "$first_contact.252.desc.normal.start$ แม้ลูกเรือของเราจะพยายามอย่างกล้าหาญ แต่ผู้โจมตี - เอเลี่ยน [From.Owner.Species.GetClass] ที่เคลื่อนไหวด้วยการประสานงานที่น่ากลัว - ก็สามารถเอาชนะการป้องกันของเราได้\n\n$first_contact.262.desc.normal.end$"
 first_contact.262.desc.hive_enemy.machine:0 "$first_contact.252.desc.machine.start$\n\nผู้โจมตีของเรา - กลุ่มสิ่งมีชีวิตอินทรีย์ [From.Owner.Species.GetClass] ที่เคลื่อนไหวด้วยการประสานงานที่บ่งบอกถึงจิตสำนึกร่วมที่เหมือนกับของพวกเรา - $first_contact.262.desc.gestalt.end$"
 first_contact.262.desc.hive_enemy.hive:0 "$first_contact.252.desc.hive.start$\n\nผู้โจมตีของเรา - กลุ่มเอเลี่ยน [From.Owner.Species.GetClass] ที่เคลื่อนไหวด้วยการประสานงานที่บ่งบอกถึงจิตสำนึกร่วมที่เหมือนกับของพวกเรา - $first_contact.262.desc.gestalt.end$"
 first_contact.262.desc.wilderness: "$first_contact.252.desc.wilderness.start$\n\nผู้โจมตีของเรา ซึ่งเป็นกลุ่มเอเลี่ยน [from.owner.species.GetClass] สามารถเอาชนะการป้องกันของเราได้อย่างรวดเร็ว โดยเลือกมุ่งเป้าไปยังส่วนต่าง ๆ ของเราที่พวกเขาจำแนกว่าเป็นสิ่งมีชีวิตจริง ๆ เพื่อเป็นการรักษาความปลอดภัยสำหรับตัวเอง เราจึงถูกบังคับให้ต้องละทิ้งทุกคนบนยานและแยกพวกเขาออกจากเสียงประสานของเรา แม้ว่าพวกเขาจะก้าวร้าวเพียงใด ผู้โจมตีก็เรียนรู้จากเราได้น้อยมาก\n\nการกระทำที่เป็นการล่วงละเมิดอย่างชัดเจนได้ถูกพุ่งเป้ามาที่เรา แต่อย่างน้อยตอนนี้เราก็รู้เพิ่มเติมเกี่ยวกับภัยคุกคามประเภทต่าง ๆ ที่เราต้องเผชิญในส่วนอื่นของกาแล็กซีนี้"

 first_contact.272.name:0 "ความรุนแรงในการเผชิญหน้าครั้งแรก"
 first_contact.272.desc:1 "ยานลำหนึ่งที่เราส่งไปตรวจสอบ [From.Owner.GetName] ถูกทำลายในการโจมตีอย่างรุนแรงโดยกองกำลังของพวกเขา ไม่เป็นที่แน่ชัดว่าพวกเขาต้องการที่จะยึดยานของเรา หรือว่าพวกเขาเพียงแค่ต้องการส่งข้อความเตือนให้เราอยู่ห่างจากดินแดนของพวกเขา"
 first_contact.272.B:0 "พวกเขาจะได้รับการล้างแค้น!"
 first_contact.282.name:0 "รอดหวุดหวิด"
 first_contact.282.desc:1 "§H[ship_to_seize.GetName]§! ยานของเราที่ส่งไปตรวจสอบ §H[From.Owner.GetName]§! รอดพ้นจากการโจมตีอย่างโหดเหี้ยมโดยกองกำลังของพวกเขาได้อย่างหวุดหวิด ดูเหมือนว่าพวกเขาตั้งใจจะยึดยานของเราเพื่อสอบปากคำลูกเรือ ซึ่งอาจทำเพื่อชิงความได้เปรียบในการเปิดศึกรบเพิ่มเติมกับเรา โชคดีที่ [ship_to_seize.GetName] สามารถเปิดระบบความเร็วฉุกเฉินได้ทันเวลาก่อนที่จะสายเกินไป"
 first_contact.282.desc.gestalt:1 "§H[ship_to_seize.GetName]§! ยานของเราที่ส่งไปตรวจสอบ §H[From.Owner.GetName]§! รอดพ้นจากการโจมตีอย่างโหดเหี้ยมโดยกองกำลังของพวกเขาได้อย่างหวุดหวิด ดูเหมือนว่าพวกเขาตั้งใจจะยึดยานของเราและขโมยเทคโนโลยีของเรา ซึ่งอาจทำเพื่อชิงความได้เปรียบในการเปิดศึกรบเพิ่มเติมกับเรา โชคดีที่ [ship_to_seize.GetName] สามารถเปิดระบบความเร็วฉุกเฉินได้ทันเวลาก่อนที่จะสายเกินไป"
 first_contact_fleets_mia_tooltip:0 "กองยานอื่น ๆ ของเราที่อยู่ในพื้นที่ที่ดูเหมือนจะเป็นดินแดนของพวกเขาได้หาทางปลอดภัยโดยการเปิดระบบความเร็วฉุกเฉิน"

 first_contact.285.name:0 "การสอบปากคำเสร็จสมบูรณ์"
 first_contact.285.desc:0 "เราได้ข้อสรุปจากการศึกษาเอเลี่ยน §H[This.ContactCountry.GetName]§! ที่เราเพิ่งจับตัวมาได้แล้ว ในตอนแรกตัวประกันไม่ยอมให้ความร่วมมือกับเรา แต่เมื่อเวลาผ่านไป พวกเขาได้ทิ้งเบาะแสเกี่ยวกับภาษาโดยไม่ตั้งใจ จนกระทั่งเราสามารถสื่อสารกับพวกเขาได้ในระดับพื้นฐาน จากจุดนั้น เราสามารถปะติดปะต่อรายละเอียดเพิ่มเติมเกี่ยวกับพวกเขาได้อย่างรวดเร็ว จนในที่สุดก็สามารถเข้าถึงระบบคอมพิวเตอร์ของพวกเขาได้เมื่อตัวประกันที่ให้ความร่วมมือคนหนึ่งยอมเปิดปาก\n\nต้องขอบคุณข้อมูลที่เราได้รับจากพวกเขา ทำให้เราสามารถระบุตัวตนของพวกเขาได้ว่าเป็น §H[This.ContactCountry.GetRealName]§! และได้รวบรวมข้อมูลข่าวกรองจำนวนมากเกี่ยวกับกิจกรรมและความสามารถของพวกเขา"
 first_contact.285.desc.weak:0 "เราได้ข้อสรุปจากการศึกษาเอเลี่ยน §H[This.ContactCountry.GetName]§! ที่เราเพิ่งจับตัวมาได้แล้ว ตัวประกันกลุ่มนี้ใจอ่อนอย่างน่าประหลาดและไม่ได้แสดงความปรารถนาเป็นพิเศษที่จะขัดขวางไม่ให้เราเรียนรู้เกี่ยวกับพวกเขาเลย อันที่จริง พวกเขาให้ความร่วมมือดีมาก ในไม่ช้าเราจึงสามารถแปลภาษาและเข้าถึงระบบคอมพิวเตอร์ของพวกเขาได้\n\nส่งผลให้เราสามารถระบุตัวตนของพวกเขาได้ว่าเป็น §H[This.ContactCountry.GetRealName]§! และได้รวบรวมข้อมูลข่าวกรองจำนวนมากเกี่ยวกับกิจกรรมและความสามารถของพวกเขา"
 first_contact.285.desc.strong:0 "เราได้ข้อสรุปจากการศึกษาเอเลี่ยน §H[This.ContactCountry.GetName]§! ที่เราเพิ่งจับตัวมาได้แล้ว ตัวประกันเหล่านี้ไม่ยอมให้ความร่วมมือกับเราอย่างยิ่งยวด แม้จะใช้วิธีการจูงใจที่โน้มน้าวใจที่สุดของผู้สอบสวนของเราแล้วก็ตาม อย่างไรก็ตาม เมื่อเวลาผ่านไป พวกเขาได้ทิ้งเบาะแสเกี่ยวกับภาษาโดยไม่ตั้งใจ จนในที่สุดช่วยให้เราสื่อสารกับพวกเขาได้ในระดับพื้นฐาน จากจุดนั้น เราสามารถปะติดปะต่อรายละเอียดเพิ่มเติมเกี่ยวกับพวกเขาได้อย่างรวดเร็ว รวมถึงเข้าถึงระบบคอมพิวเตอร์พื้นฐานบางอย่างของพวกเขาด้วย แม้ว่าเราจะสงสัยว่าพวกเขายังคงปิดบังรายละเอียดหลายอย่างไว้ก็ตาม\n\nต้องขอบคุณข้อมูลที่เราสามารถเก็บเกี่ยวได้จากพวกเขา ทำให้เราสามารถระบุตัวตนของพวกเขาได้ว่าเป็น §H[This.ContactCountry.GetRealName]§! และได้รวบรวมข้อมูลข่าวกรองจำนวนมากเกี่ยวกับกิจกรรมและความสามารถของพวกเขา"
 first_contact.285.desc.machine_victim:0 "เราได้ข้อสรุปจากการศึกษาเครื่องจักร §H[This.ContactCountry.GetName]§! ที่เราเพิ่งจับตัวมาได้แล้ว เมื่อถูกตัดขาดจาก AI แม่ข่าย โดรนเหล่านี้ก็ขาดการตัดสินใจด้วยตัวเอง และเราสามารถค้นหาข้อมูลที่เป็นประโยชน์จากพวกมันได้เพียงเล็กน้อย เนื่องจากฟังก์ชันการทำงานของพวกมันเสื่อมสภาพลงอย่างรวดเร็ว\n\n$first_contact.285.desc.gestalt_end$"
 first_contact.285.desc.hive_victim:0 "เราได้ข้อสรุปจากการศึกษาเอเลี่ยน §H[This.ContactCountry.GetName]§! ที่เราเพิ่งจับตัวมาได้แล้ว ดูเหมือนว่าพวกเขาจะจัดตั้งกลุ่มในรูปแบบ §Hจิตร่วมสำนึกรัง§! โดยโดรนแต่ละตัวจะขาดความเป็นอิสระหรือการตัดสินใจด้วยตัวเอง เมื่อถูกตัดขาดจากส่วนกลาง โดรนเหล่านี้ดูเหมือนไร้จุดหมายและทยอยตายไปทีละตัว โดยไม่ได้ให้ข้อมูลที่เป็นประโยชน์มากนัก นอกเสียจากการเป็นตัวอย่างทางชีววิทยาโดยไม่รู้ตัว\n\n$first_contact.285.desc.gestalt_end$"
 first_contact.285.desc.wilderness_victim.intro: "เราได้ข้อสรุปจากการศึกษาเอเลี่ยน §H[This.ContactCountry.GetName]§! ที่เราเพิ่งจับตัวมาได้แล้ว สิ่งมีชีวิตหลากหลายชนิดเหล่านี้รวมตัวกันเป็นเสมือนจิตร่วมสำนึกรัง ทว่าไม่มีหน่วยงานกลางคอยควบคุมดูแล แต่สิ่งมีชีวิตที่มีปัญญาเพียงเล็กน้อยเหล่านี้กลับดูเหมือนจะก่อตัวเป็น §Hองค์รวมแบบพึ่งพาอาศัยกัน§! กับระบบนิเวศทั้งหมดของพวกมัน"
 first_contact.285.desc.wilderness_victim: "$first_contact.285.desc.wilderness_victim.intro$ นับตั้งแต่ถูกแยกออกจากกันรวมถึงแยกจากโลกบ้านเกิด สิ่งมีชีวิตพึ่งพาอาศัยกันเหล่านี้ได้ย้อนกลับสู่สภาพป่าเถื่อนและล้มตายลงค่อนข้างเร็ว พวกมันให้ข้อมูลที่เป็นประโยชน์กับเราเพียงเล็กน้อย นอกเหนือจากการเป็นร่างสำหรับชันสูตรศพ\n\n$first_contact.285.desc.gestalt_end$"
 first_contact.285.desc.gestalt_end:0 "โชคดีที่เราสามารถถอดรหัสระบบคอมพิวเตอร์ของพวกเขาได้ และ [This.Owner.GetLinguists] ของเราก็สามารถแปลสัญญาณที่พวกเขาใช้ในการสื่อสารได้ในไม่ช้า ส่งผลให้ตอนนี้เราสามารถระบุตัวตนของ §H[This.ContactCountry.GetName]§! ได้ว่าเป็น §H[This.ContactCountry.GetRealName]§! และได้รวบรวมข้อมูลข่าวกรองจำนวนมากเกี่ยวกับกิจกรรมและความสามารถของพวกเขา"
 first_contact.290.name:0 "การศึกษาเอเลี่ยนเสร็จสิ้น"
 first_contact.290.desc:0 "เราได้ข้อสรุปจากการศึกษาเอเลี่ยน §H[This.ContactCountry.GetName]§! ที่เราเพิ่งจับตัวมาได้แล้ว ตัวประกันไม่ยอมให้ความร่วมมือกับเรา แต่นั่นไม่ใช่ประเด็นสำคัญอีกต่อไปเมื่อเราเริ่มผ่าร่างพวกเขา ตอนนี้เราได้เรียนรู้มากมายเกี่ยวกับกลไกการทำงานภายในของ [This.ContactCountry.GetSpeciesOrganNamePlural], [This.ContactCountry.GetSpeciesEarNamePlural], [This.ContactCountry.GetSpeciesHandNamePlural] และอวัยวะส่วนอื่นๆ ของร่างกาย ซึ่งทำให้ [This.Owner.GetResearchers] ด้านพันธุศาสตร์ของเราได้รับ §Hข้อมูลชีววิทยาต่างดาว§! อันมีค่า\n\nด้วยความหวาดกลัวต่อความโหดเหี้ยมในการกระทำของเรา เอเลี่ยนจำนวนหนึ่ง (ซึ่งตอนนี้เรารู้แล้วว่าเป็น §H[This.ContactCountry.GetSpeciesNamePlural]§!) ได้ยอมร่วมมือกับเราในการแปลภาษาและเข้าถึงระบบคอมพิวเตอร์ของพวกเขา ส่งผลให้ตอนนี้เรามีข้อมูลข่าวกรองจำนวนมากที่สามารถนำมาใช้รับมือกับพวกเขาได้หากมีความจำเป็น"
 first_contact.290.desc.wilderness_victim: "$first_contact.285.desc.wilderness_victim.intro$\n\nนับตั้งแต่ถูกแยกออกจากกันรวมถึงแยกจากโลกบ้านเกิด สิ่งมีชีวิตพึ่งพาอาศัยกันเหล่านี้ได้ย้อนกลับสู่สภาพป่าเถื่อนและล้มตายลงในไม่ช้า ทำให้การชันสูตรศพกลายเป็นเรื่องง่ายดาย $first_contact.290.desc.hive_victim.main$\n\n$first_contact.290.desc.hive_victim.end$"
 first_contact.290.desc.hive_victim.intro: "เราได้ข้อสรุปจากการศึกษาเอเลี่ยน §H[This.ContactCountry.GetName]§! ที่เราเพิ่งจับตัวมาได้แล้ว ดูเหมือนว่าพวกเขาจะจัดตั้งกลุ่มในรูปแบบ §Hจิตร่วมสำนึกรัง§! โดยโดรนแต่ละตัวจะขาดความเป็นอิสระหรือการตัดสินใจด้วยตัวเอง แม้ว่าพวกมันจะพิสูจน์แล้วว่าเป็นเป้าหมายที่ไร้ประโยชน์ในการรีดข้อมูล แต่นั่นก็ไม่ใช่ประเด็นสำคัญอีกต่อไปเมื่อเราเริ่มผ่าร่างของพวกมัน"
 first_contact.290.desc.hive_victim.main:0 "ตอนนี้เราได้เรียนรู้มากมายเกี่ยวกับกลไกการทำงานภายในของ [This.ContactCountry.GetSpeciesOrganNamePlural], [This.ContactCountry.GetSpeciesEarNamePlural], [This.ContactCountry.GetSpeciesHandNamePlural] และอวัยวะส่วนอื่นๆ ของร่างกาย ซึ่งทำให้ [This.Owner.GetResearchers] ด้านพันธุศาสตร์ของเราได้รับ §Hข้อมูลชีววิทยาต่างดาว§! อันมีค่า"
 first_contact.290.desc.hive_victim.end:0 "ตอนนี้เราทราบวิธีสื่อสารกับจักรวรรดิแม่ของพวกเขาคือ §H[This.ContactCountry.GetRealName]§! แล้วหากจำเป็น และมีข้อมูลข่าวกรองจำนวนมากที่พร้อมนำมาใช้รับมือกับพวกเขาหากพิสูจน์ได้ว่าจำเป็น!"
 first_contact.290.desc.hive_victim:0 "$first_contact.290.desc.hive_victim.intro$ $first_contact.290.desc.hive_victim.main$\n\nแม้ว่าจะใช้เวลานานกว่าที่เราคาดไว้เล็กน้อย แต่ความรู้ทางชีววิทยาที่เราได้รับและเบาะแสต่างๆ ที่กระจายอยู่ทั่วเรือที่ยึดมาได้นั้น ช่วยให้เราสามารถถอดรหัสภาษาและรหัสคอมพิวเตอร์ของพวกเขาได้ $first_contact.290.desc.hive_victim.end$"
 first_contact.290.desc.hive_victim.no_vessel:0 "$first_contact.290.desc.hive_victim.intro$ $first_contact.290.desc.hive_victim.main$\n\nแม้ว่าจะใช้เวลานานกว่าที่เราคาดไว้เล็กน้อย แต่ความรู้ทางชีววิทยาที่เราได้รับและเบาะแสต่างๆ ที่รวบรวมได้ในตอนที่โดรนถูกลักพาตัวไปนั้น ช่วยให้เราสามารถถอดรหัสภาษาและรหัสคอมพิวเตอร์ของพวกเขาได้ $first_contact.290.desc.hive_victim.end$"
 first_contact.290.desc.machine_victim:0 "เราได้ข้อสรุปจากการศึกษาเครื่องจักร §H[This.ContactCountry.GetName]§! ที่เราเพิ่งจับตัวมาได้แล้ว เมื่อถูกตัดขาดจาก AI แม่ข่าย โดรนเหล่านี้ก็ขาดการตัดสินใจด้วยตัวเองและให้ข้อมูลที่เป็นประโยชน์เพียงเล็กน้อยจากตัวพวกมันเอง แต่เมื่อเราเริ่มแยกชิ้นส่วนพวกมัน เราก็สามารถสร้างความก้าวหน้าได้มากขึ้น ทั้งในการทำความเข้าใจการทำงานภายในและการค้นหาข้อมูลเพิ่มเติมเกี่ยวกับพวกมัน ปรากฏว่าโปรเซสเซอร์ของพวกมันไม่สามารถสู้กับเทคนิคการรวบรวมข้อมูลเชิงรุกที่เราใช้กับพวกมันได้ ส่งผลให้ตอนนี้ไม่มีความลับใดๆ เกี่ยวกับพวกมันรอดพ้นเราไปได้เลย\n\nตอนนี้เรายังสามารถสื่อสารกับ AI แม่ของพวกเขา ซึ่งเรียกตัวเองว่า §H[This.ContactCountry.GetRealName]§! ได้ด้วยหากเราเห็นสมควร"
 first_contact.290.A:0 "บทสรุปที่น่าพึงพอใจที่สุด"
 first_contact.295.name:1 "ศึกษาวัสดุต่างดาวเสร็จสิ้น"
 first_contact.295.desc:1 "เราได้ข้อสรุปจากการศึกษาเรือที่เราเพิ่งยึดมาได้จาก [This.ContactCountry.GetName] แล้ว การไม่มีลูกเรือที่มีชีวิตอยู่ทำให้การสืบสวนของเรามีความท้าทาย โชคดีที่พวกเขาทิ้งวัตถุไว้มากพอที่จะทำให้ [This.Owner.GetLinguists] ของเราค่อยๆ ถอดรหัสภาษาของพวกเขาและระบุตัวตนของพวกเขาได้ว่าเป็น §H[This.ContactCountry.GetRealName]§! ซึ่งช่วยให้เราสามารถสื่อสารกับพวกเขาได้หากต้องการ นอกจากนี้ เรายังสามารถศึกษา §Hเทคโนโลยี§! ของยานพวกเขา ซึ่งช่วยให้ [This.Owner.GetResearchers] ของเราค้นพบแนวทางใหม่ๆ สำหรับปัญหาการวิจัยของเราเอง"
 first_contact.295.desc.no_ship:1 "เราได้ข้อสรุปจากการศึกษาอุปกรณ์ที่เราเพิ่งยึดมาได้จาก [This.ContactCountry.GetName] แล้ว การสืบสวนโดยไม่มีสิ่งมีชีวิตมาสอบปากคำถือเป็นความท้าทายอย่างมาก โชคดีที่พวกเขาทิ้งวัตถุไว้มากพอที่จะทำให้ [This.Owner.GetLinguists] ของเราค่อยๆ ถอดรหัสภาษาของพวกเขาและระบุตัวตนของพวกเขาได้ว่าเป็น §H[This.ContactCountry.GetRealName]§! ซึ่งช่วยให้เราสามารถสื่อสารกับพวกเขาได้หากต้องการ นอกจากนี้ เรายังสามารถศึกษา §Hเทคโนโลยี§! ของพวกเขา ซึ่งช่วยให้ [This.Owner.GetResearchers] ของเราค้นพบแนวทางใหม่ๆ สำหรับปัญหาการวิจัยของเราเอง"
 first_contact.295.A:0 "งานที่ทำได้ดีเยี่ยม"
 gain_asset_internal_organs:0 "ความรู้เกี่ยวกับอวัยวะภายในของพวกเขาจะเป็นประโยชน์ในระหว่าง §Hปฏิบัติการจารกรรม§!\n"


 first_contact.1100.desc:0 "เราได้ข้อสรุปจากการศึกษาอุปกรณ์ที่เราเพิ่งยึดมาได้จาก §H[contact_country.GetName]§! แล้ว แม้ว่าการสืบสวนโดยไม่มีสิ่งมีชีวิตมาสอบปากคำจะเป็นความท้าทาย แต่ความคืบหน้าก็เป็นไปอย่างรวดเร็วขึ้นเมื่อเริ่มมีการเปิดการสื่อสารกับ [contact_country.GetSpeciesNamePlural] [Root.GetResearchers] ของเราสามารถศึกษา §Hเทคโนโลยี§! ของพวกเขา ซึ่งช่วยให้เราค้นพบแนวทางใหม่ๆ สำหรับปัญหาการวิจัยของเราเอง"

 first_contact.1105.desc:0 "เราได้ข้อสรุปจากการศึกษาเอเลี่ยน §H[contact_country.GetAdj]§! ที่เราเพิ่งจับตัวมาได้แล้ว ตัวประกันไม่ยอมร่วมมือกับเรา แต่นั่นไม่ใช่ประเด็นสำคัญอีกต่อไปเมื่อเราเริ่มผ่าร่างพวกเขา ตอนนี้เราได้เรียนรู้มากมายเกี่ยวกับกลไกการทำงานภายในของ [contact_country.GetSpeciesOrganNamePlural], [contact_country.GetSpeciesEarNamePlural], [contact_country.GetSpeciesHandNamePlural] และอวัยวะส่วนอื่นๆ ของร่างกาย ซึ่งทำให้ [Root.GetResearchers] ด้านพันธุศาสตร์ของเราได้รับ §Hข้อมูลชีววิทยาต่างดาว§! อันมีค่า\n\nด้วยความหวาดกลัวต่อความโหดเหี้ยมในการกระทำของเรา เอเลี่ยน [contact_country.GetSpeciesNamePlural] จำนวนหนึ่งได้ยอมร่วมมือกับเราในการแปลภาษาและเข้าถึงระบบคอมพิวเตอร์ของพวกเขา ส่งผลให้ตอนนี้เรามีข้อมูลข่าวกรองจำนวนมากที่สามารถนำมาใช้รับมือกับพวกเขาได้หากมีความจำเป็น"
 first_contact.1105.desc.hive_victim:0 "เราได้ข้อสรุปจากการศึกษาเอเลี่ยน §H[contact_country.GetAdj]§! ที่เราเพิ่งจับตัวมาได้แล้ว ดังที่เห็นได้ชัดเจนเมื่อพวกเขาเปิดฉากสื่อสารกับเราว่าพวกเขาได้รับการจัดตั้งในรูปแบบ §Hจิตร่วมสำนึกรัง§! โดยโดรนแต่ละตัวจะขาดความเป็นอิสระหรือการตัดสินใจด้วยตัวเอง แม้ว่าพวกมันจะพิสูจน์แล้วว่าเป็นเป้าหมายที่ไร้ประโยชน์ในการสอบปากคำ แต่นั่นไม่ใช่ประเด็นสำคัญอีกต่อไปเมื่อเราเริ่มผ่าร่างของพวกมัน ตอนนี้เราได้เรียนรู้มากมายเกี่ยวกับกลไกการทำงานภายในของ [contact_country.GetSpeciesOrganNamePlural], [contact_country.GetSpeciesEarNamePlural], [contact_country.GetSpeciesHandNamePlural] และอวัยวะส่วนอื่นๆ ของร่างกาย ซึ่งทำให้ [Root.GetResearchers] ด้านพันธุศาสตร์ของเราได้รับ §Hข้อมูลชีววิทยาต่างดาว§! อันมีค่า\n\nแม้ว่าจะใช้เวลานานกว่าที่คาดไว้เล็กน้อย แต่ความรู้ทางชีววิทยาที่เราได้รับก็ช่วยให้เราถอดรหัสภาษาและรหัสคอมพิวเตอร์ของพวกเขาได้ ตอนนี้เรามีข้อมูลข่าวกรองจำนวนมากที่พร้อมนำมาใช้รับมือกับพวกเขาได้หากจำเป็น!"
 first_contact.1105.desc.machine_victim:0 "เราได้ข้อสรุปจากการศึกษาเครื่องจักร §H[contact_country.GetAdj]§! ที่เราเพิ่งจับตัวมาได้แล้ว เมื่อถูกตัดขาดจาก AI แม่ข่าย โดรนเหล่านี้ก็ขาดการตัดสินใจด้วยตัวเองและให้ข้อมูลที่เป็นประโยชน์เพียงเล็กน้อยจากตัวพวกมันเอง เมื่อเราเริ่มแยกชิ้นส่วนพวกมัน เราก็สามารถสร้างความก้าวหน้าได้มากขึ้น ทั้งในการทำความเข้าใจการทำงานภายในและการค้นหาข้อมูลเพิ่มเติมเกี่ยวกับพวกมัน ปรากฏว่าโปรเซสเซอร์ของพวกมันไม่สามารถสู้กับเทคนิคการรวบรวมข้อมูลเชิงรุกที่เราใช้กับพวกมันได้ ส่งผลให้ตอนนี้ไม่มีความลับใดๆ เกี่ยวกับพวกมันรอดพ้นเราไปได้เลย\n\nตอนนี้เรามีข้อมูลข่าวกรองจำนวนมากที่พร้อมนำมาใช้รับมือกับ AI แม่ของพวกเขาคือ §H[contact_country.GetName]§! ได้หากเราเห็นสมควร"

 first_contact.1110.desc:0 "เราได้สรุปการศึกษาของ§H[contact_country.GetAdj]§!เอเลี่ยนที่เราจับได้ แรก ๆ ตัวประกันไม่เต็มใจที่จะให้ความร่วมมือกับเรา แต่ครั้งหนึ่งมีการจัดตั้งการสื่อสารกับ[contact_country.GetName]เราก้าวหน้าได้เร็วขึ้นมาก ไม่นาน เราก็สามารถ\"กลัว\"เราได้ข้อสรุปจากการศึกษาเอเลี่ยน §H[contact_country.GetAdj]§! ที่เราเพิ่งจับตัวมาได้แล้ว ในตอนแรกตัวประกันไม่ยอมให้ความร่วมมือกับเรา แต่เมื่อเริ่มเปิดการสื่อสารกับ [contact_country.GetName] ได้สำเร็จ เราก็สามารถสร้างความคืบหน้าได้เร็วขึ้นมาก ในไม่ช้า เราก็สามารถ"
 first_contact.1110.desc.weak:0 "เราได้ข้อสรุปจากการศึกษาเอเลี่ยน §H[contact_country.GetAdj]§! ที่เราเพิ่งจับตัวมาได้แล้ว ตัวประกันเหล่านี้ใจอ่อนอย่างน่าประหลาดและไม่ได้แสดงความปรารถนาเป็นพิเศษที่จะขัดขวางไม่ให้เราเรียนรู้เกี่ยวกับพวกเขาเลย อันที่จริง พวกเขาให้ความร่วมมือดีมาก ในไม่ช้าเราจึงสามารถโน้มน้าวให้พวกเขายอมให้เราเข้าถึงระบบคอมพิวเตอร์ของพวกเขาได้\n\nต้องขอบคุณข้อมูลที่เราได้รับจากพวกเขา ทำให้เราได้รวบรวมข้อมูลข่าวกรองจำนวนมากเกี่ยวกับกิจกรรมและความสามารถของพวกเขา"
 first_contact.1110.desc.strong:0 "เราได้สรุปการศึกษาของ§H[contact_country.GetAdj]§!เอเลี่ยนที่เราจับได้ ตัวประกันได้พิสูจน์แล้วว่า ไม่เต็มใจที่จะร่วมมือกับเรา ขัดขืนแม้กระทั่งวิธีการโน้มน้าวใจมากที่สุด อย่างไรก็ตาม เมื่อมีการสร้างการสื่อสารกับ[contact_country.GetName]เราสามารถทําความก้าวหน้าบางอย่างได้ รวมถึงการเข้าถึงระบบคอมพิวเตอร์พื้นฐานของพวกเขา แม้เราจะสงสัยว่าพวกเขาสามารถเก็บรายละเอียดได้หลายอย่าง ไม่นาน เราก็สามารถ\"กลัว\"เราได้ข้อสรุปจากการศึกษาเอเลี่ยน §H[contact_country.GetAdj]§! ที่เราเพิ่งจับตัวมาได้แล้ว ตัวประกันเหล่านี้ไม่ยอมให้ความร่วมมือกับเราอย่างยิ่งยวด แม้จะใช้วิธีการจูงใจที่โน้มน้าวใจที่สุดของผู้สอบสวนของเราแล้วก็ตาม อย่างไรก็ตาม เมื่อเปิดฉากการสื่อสารกับ [contact_country.GetName] ได้สำเร็จ เราก็สามารถสร้างความคืบหน้าได้บ้าง รวมถึงเข้าถึงระบบคอมพิวเตอร์พื้นฐานบางอย่างของพวกเขาได้ แม้เราจะสงสัยว่าพวกเขายังคงปิดบังรายละเอียดหลายอย่างไว้ก็ตาม ในไม่ช้า เราก็สามารถ"
 first_contact.1110.desc.machine_victim:0 "เราได้ข้อสรุปจากการศึกษาเครื่องจักร §H[contact_country.GetAdj]§! ที่เราเพิ่งจับตัวมาได้แล้ว เมื่อถูกตัดขาดจาก AI แม่ข่าย โดรนเหล่านี้ก็ขาดการตัดสินใจด้วยตัวเอง และเราสามารถค้นหาข้อมูลที่เป็นประโยชน์จากพวกมันได้เพียงเล็กน้อย เนื่องจากฟังก์ชันการทำงานของพวกมันเสื่อมสภาพลงอย่างรวดเร็ว\n\n$first_contact.285.desc.gestalt_end$"
 first_contact.1110.desc.hive_victim:0 "เราได้ข้อสรุปจากการศึกษาเอเลี่ยน §H[contact_country.GetAdj]§! ที่เราเพิ่งจับตัวมาได้แล้ว ดังที่เห็นได้ชัดเจนเมื่อพวกเขาเปิดฉากสื่อสารกับเราว่าพวกเขาได้รับการจัดตั้งในรูปแบบ §Hจิตร่วมสำนึกรัง§! โดยโดรนแต่ละตัวจะขาดความเป็นอิสระหรือการตัดสินใจด้วยตัวเอง เมื่อถูกตัดขาดจากส่วนกลาง โดรนเหล่านี้ดูเหมือนไร้จุดหมายและทยอยตายไปทีละตัว โดยไม่ได้ให้ข้อมูลที่เป็นประโยชน์มากนัก นอกเสียจากการเป็นตัวอย่างทางชีววิทยาโดยไม่รู้ตัว\n\n$first_contact.285.desc.gestalt_end$"
 first_contact.1110.desc.gestalt_end:0 "โชคดีที่เราสามารถถอดรหัสระบบคอมพิวเตอร์ของพวกเขาได้ ช่วยให้เราสามารถรวบรวมข้อมูลข่าวกรองจำนวนมากเกี่ยวกับกิจกรรมและความสามารถของพวกเขา"

 first_contact.320.name:0 "เอเลี่ยนถูกจับกุม"
 first_contact.320.desc.end:0 "แม้ว่าปฏิบัติการจะเป็นไปอย่างราบรื่นและเจ้าหน้าที่ของเราสามารถหลบหนีได้โดยไม่มีการไล่ล่า แต่การคาดหวังให้ §H[This.ContactCountry.GetName]§! ไม่ล่วงรู้ถึงการกระทำของเราเลยก็อาจจะเป็นการคาดหวังที่สูงเกินไป"
 first_contact.320.desc.planet.normal.normal:0 "ทีมกองกำลังพิเศษลับผู้กล้าหาญได้หลบหนีออกจากอาณาเขตของ §H[This.ContactCountry.GetName]§! พร้อมตัวประกันที่จับตัวได้จากหนึ่งในอาณานิคมของพวกเขาในระบบดาว §H[abduction_planet.System.GetName]§! พวกเขาได้รับความช่วยเหลือจากความมืดในการลงจอดบนพื้นที่ห่างไกลของดาวเคราะห์และเข้ายึดตัวเอเลี่ยนที่ยังมีชีวิตอยู่หลายตน รวมถึงฮาร์ดแวร์ทางเทคนิคชุดใหญ่ที่จะช่วยให้เราถอดรหัสภาษาและประเมินระดับเทคโนโลยีของพวกเขาได้อย่างแน่นอน\n\n$first_contact.320.desc.end$"
 first_contact.320.desc.planet.normal.machine:0 "ทีมกองกำลังพิเศษลับผู้กล้าหาญได้หลบหนีออกจากอาณาเขตของ §H[This.ContactCountry.GetName]§! พร้อมตัวประกันที่จับตัวได้จากหนึ่งในอาณานิคมของพวกเขาในระบบดาว §H[abduction_planet.System.GetName]§! พวกเขาได้รับความช่วยเหลือจากความมืดในการลงจอดบนพื้นที่ห่างไกลของดาวเคราะห์และต้องประหลาดใจเมื่อพบว่าผู้อยู่อาศัยในที่นั้น แท้จริงแล้วคือ §Hโดรนจักรกล§! อย่างไรก็ตาม พวกเขาได้ยึดโดรนบางตัวมาในสภาพที่ไม่มีความเสียหาย รวมถึงฮาร์ดแวร์ทางเทคนิคชุดใหญ่ที่จะช่วยให้เราถอดรหัสภาษาและประเมินระดับเทคโนโลยีของพวกเขาได้อย่างแน่นอน\n\n$first_contact.320.desc.end$"
 first_contact.320.desc.planet.gestalt.normal:0 "กองกำลังโดรนปฏิบัติการลับที่นำโดย [This.Leader.GetName] ประสบความสำเร็จในการลงจอดในพื้นที่ห่างไกลของอาณานิคม §H[This.ContactCountry.GetName]§! ในระบบดาว §H[abduction_planet.System.GetName]§! พวกเขาสามารถเข้ายึดตัวเอเลี่ยนที่ยังมีชีวิตอยู่หลายตน รวมถึงฮาร์ดแวร์ทางเทคนิคชุดใหญ่ที่อาจเป็นประโยชน์ในการถอดรหัสสัญญาณการสื่อสารและประเมินระดับเทคโนโลยีของพวกเขา ก่อนที่จะหลบหนีออกมาได้\n\n$first_contact.320.desc.end$"
 first_contact.320.desc.planet.hive.machine:0 "กองกำลังโดรนปฏิบัติการลับที่นำโดย [This.Leader.GetName] ประสบความสำเร็จในการลงจอดในพื้นที่ห่างไกลของอาณานิคม §H[This.ContactCountry.GetName]§! ในระบบดาว §H[abduction_planet.System.GetName]§! สิ่งที่ไม่คาดคิดคือ ผู้อยู่อาศัยในดาวเคราะห์ดวงนี้แท้จริงแล้วคือโดรนจักรกล อย่างไรก็ตาม พวกเขาได้ยึดโดรนบางตัวมาในสภาพที่ไม่มีความเสียหาย รวมถึงฮาร์ดแวร์ทางเทคนิคชุดใหญ่ที่อาจเป็นประโยชน์ในการถอดรหัสสัญญาณการสื่อสารและประเมินระดับเทคโนโลยีของพวกเขา ก่อนที่จะหลบหนีออกมาได้\n\n$first_contact.320.desc.end$"
 first_contact.320.desc.planet.machine.machine:0 "กองกำลังโดรนปฏิบัติการลับที่นำโดย [This.Leader.GetName] ประสบความสำเร็จในการลงจอดในพื้นที่ห่างไกลของอาณานิคม §H[This.ContactCountry.GetName]§! ในระบบดาว §H[abduction_planet.System.GetName]§! ในไม่ช้าพวกเขาก็ค้นพบว่าผู้อยู่อาศัยบนดาวดวงนี้แท้จริงแล้วคือโดรนจักรกล ซึ่งอาจถูกควบคุมโดย AI เหมือนกับ [This.Owner.GetGovernmentName] ของเราเอง ด้วยความไม่หวั่นเกรง พวกเขาได้จับกุมโดรนบางตัวมาในสภาพไร้รอยขีดข่วน รวมถึงฮาร์ดแวร์ทางเทคนิคชุดใหญ่ที่อาจเป็นประโยชน์ในการถอดรหัสสัญญาณการสื่อสารและประเมินระดับเทคโนโลยีของพวกเขา ก่อนที่จะหลบหนีออกมาได้\n\n$first_contact.320.desc.end$"
 first_contact.320.desc.no_planet.normal.normal:0 "ทีมกองกำลังพิเศษลับผู้กล้าหาญได้หลบหนีออกจากอาณาเขตของ §H[This.ContactCountry.GetName]§! พร้อมกับเรือบรรทุกสินค้าที่ยึดได้ซึ่งพวกเขาดักสกัดในระบบดาว §H[abduction_system.GetName]§! นอกจากลูกเรือของเรือที่ส่วนใหญ่ถูกจับมาทั้งแบบยังมีชีวิตอยู่แล้ว ฮาร์ดแวร์และระบบคอมพิวเตอร์ส่วนใหญ่ของยานก็ไม่ได้รับความเสียหายรุนแรงอีกด้วย\n\n$first_contact.320.desc.end$"
 first_contact.320.desc.no_planet.normal.machine:0 "ทีมกองกำลังพิเศษลับผู้กล้าหาญได้หลบหนีออกจากอาณาเขตของ §H[This.ContactCountry.GetName]§! พร้อมกับเรือบรรทุกสินค้าที่ยึดได้ซึ่งพวกเขาดักสกัดในระบบดาว §H[abduction_system.GetName]§! สิ่งที่เราแปลกใจก็คือ ลูกเรือของยานลำนี้เป็น §Hโดรนจักรกล§! ทั้งหมด ซึ่งอาจควบคุมโดย AI นอกรีต อย่างไรก็ตาม เราสามารถปิดระบบและจับกุมพวกมันมาได้โดยมีความเสียหายเพียงเล็กน้อย ทีมงานของเรายังสามารถรักษาฮาร์ดแวร์และระบบคอมพิวเตอร์ส่วนใหญ่ของยานให้อยู่ในสภาพสมบูรณ์อีกด้วย\n\n$first_contact.320.desc.end$"
 first_contact.320.desc.no_planet.gestalt.normal:0 "กองกำลังโดรนปฏิบัติการลับที่นำโดย [This.Leader.GetName] ประสบความสำเร็จในการเข้ายึดยานขนส่งโลจิสติกส์ขนาดเล็กของ §H[This.ContactCountry.GetName]§! ในระบบดาว §H[abduction_system.GetName]§! นอกจากลูกเรือของเรือที่ส่วนใหญ่ถูกจับมาทั้งแบบยังมีชีวิตอยู่แล้ว ฮาร์ดแวร์และระบบคอมพิวเตอร์ส่วนใหญ่ของยานก็ไม่ได้รับความเสียหายรุนแรงอีกด้วย\n\n$first_contact.320.desc.end$"
 first_contact.320.desc.no_planet.hive.machine:0 "กองกำลังโดรนปฏิบัติการลับที่นำโดย [This.Leader.GetName] ประสบความสำเร็จในการเข้ายึดยานขนส่งโลจิสติกส์ขนาดเล็กของ §H[This.ContactCountry.GetName]§! ในระบบดาว §H[abduction_system.GetName]§! สิ่งที่ไม่คาดคิดคือ ยานลำนี้ควบคุมโดย §Hโดรนจักรกล§! ทั้งสิ้น ด้วยความไม่หวั่นเกรง ทีมของเราได้ปิดระบบและจับกุมพวกมันมาได้โดยมีความเสียหายเพียงเล็กน้อย และยังจัดการรักษาฮาร์ดแวร์และระบบคอมพิวเตอร์ส่วนใหญ่ของยานให้อยู่ในสภาพสมบูรณ์อีกด้วย\n\n$first_contact.320.desc.end$"
 first_contact.320.desc.no_planet.machine.machine:0 "กองกำลังโดรนปฏิบัติการลับที่นำโดย [This.Leader.GetName] ประสบความสำเร็จในการเข้ายึดยานขนส่งโลจิสติกส์ขนาดเล็กของ §H[This.ContactCountry.GetName]§! ในระบบดาว §H[abduction_system.GetName]§! ปรากฏว่ายานลำนี้ควบคุมโดยโดรนจักรกลทั้งหมด ซึ่งอาจถูกควบคุมโดย AI เช่นเดียวกับ §H[This.Owner.GetGovernmentName]§! ของเราเอง ด้วยความไม่หวั่นเกรง ทีมของเราได้ปิดระบบและจับกุมพวกมันมาได้โดยมีความเสียหายเพียงเล็กน้อย และยังจัดการรักษาฮาร์ดแวร์และระบบคอมพิวเตอร์ส่วนใหญ่ของยานให้อยู่ในสภาพสมบูรณ์อีกด้วย\n\n$first_contact.320.desc.end$"
 first_contact.320.A:0 "สอบปากคำตัวประกัน"
 first_contact.320.A2:0 "พวกเขาจะต้องยอมคายความลับออกมา"
 first_contact.320.A.tooltip:0 "กองยานของเราในอาณาเขตของพวกเขาได้หลบหนีเพื่อหลีกเลี่ยงการตอบโต้"
 first_contact.320.C.homicidal_tooltip:0 "เราจะตรวจสอบอุปกรณ์ที่ยึดมาได้เพื่อหาเบาะแสเกี่ยวกับพวกเขาด้วย\n"
 first_contact.321.name:0 "อุบัติเหตุที่น่าเสียใจ"
 first_contact.321.desc.mega_oops:0 "ทีมกองกำลังพิเศษลับผู้กล้าหาญ (แต่บางทีอาจจะไม่ค่อยฉลาดนัก) ได้หลบหนีออกจากอาณาเขตของ §H[This.ContactCountry.GetName]§! พร้อมตัวประกันที่จับตัวได้จากหนึ่งในอาณานิคมของพวกเขาในระบบดาว §H[abduction_planet.System.GetName]§! พวกเขาสามารถลงจอดบนพื้นที่ห่างไกลของดาวเคราะห์ภายใต้ความมืดและเข้าจับสิ่งมีชีวิตเลี้ยงลูกด้วยนมตัวโตลายจุดสีดำสลับขาวจำนวนหนึ่ง ซึ่งไม่มีการขัดขืนใดๆเลย\n\nหลังจากนั้นไม่นานเราถึงได้ตระหนักว่าสิ่งมีชีวิตเหล่านี้ไม่ได้ส่งเสียงที่มีลักษณะเฉพาะของการส่งสัญญาณของ [This.ContactCountry.GetName] และไม่ได้แสดงสัญญาณใดๆ เลยว่าเป็นสิ่งมีชีวิตที่มีภูมิปัญญา หลังจากสืบสวนเพิ่มเติม เราได้ข้อสรุปว่าเราได้จับตัวอย่างปศุสัตว์ของพวกเขามาโดยไม่ได้ตั้งใจ!\n\nโชคร้ายที่การตรวจตราในอวกาศของพวกเขามีความระมัดระวังมากขึ้นหลังจากการบุกโจมตี แสดงให้เห็นว่าพวกเขาตรวจพบการมีอยู่ของเราแล้ว ส่งผลให้ความพยายามใดๆ หลังจากนี้จะถูกลิขิตให้ล้มเหลว..."
 first_contact.321.A:0 "น่าอับอายขายหน้าจริงๆ"
 first_contact.322.name:0 "การทรยศหักหลังของ [From.Owner.GetName]"
 first_contact.322.desc.planet:0 "ในขณะที่บางฝ่ายมีความกังวลเกี่ยวกับการรุกล้ำของยานต่างดาวที่ไม่รู้จักเข้ามาในน่านฟ้าของเรา แต่ก็ยังไม่ชัดเจนจนกระทั่งตอนนี้ว่า [From.Owner.GetName] นั้นสร้างภัยคุกคามได้มากเพียงใด ดูเหมือนว่าพวกเขาจะส่งทีมปฏิบัติการลับลงจอดในส่วนห่างไกลของ [abduction_planet.GetName] และเข้ายึดตัวประกัน [This.Owner.GetSpeciesName] ที่ยังมีชีวิตอยู่ หลบหนีเข้าสู่ห้วงอวกาศลึกก่อนที่เราจะทันได้จัดตั้งทีมกู้ภัย เราทำได้เพียงแค่จินตนาการถึงความทรมานที่พวกเขาจะต้องเผชิญในเงื้อมมือของผู้จับกุม"
 first_contact.322.desc.no_planet:0 "ในขณะที่บางฝ่ายมีความกังวลเกี่ยวกับการรุกล้ำของยานต่างดาวที่ไม่รู้จักเข้ามาในน่านฟ้าของเรา แต่ก็ยังไม่ชัดเจนจนกระทั่งตอนนี้ว่า [From.Owner.GetName] นั้นสร้างภัยคุกคามได้มากเพียงใด ดูเหมือนว่าพวกเขาจะส่งกองกำลังลับไปสกัดกั้นหนึ่งในเรือขนส่งสินค้าของเราในระบบดาว [abduction_system.GetName] ยึดเรือและหลบหนีเข้าสู่ห้วงอวกาศลึกก่อนที่เราจะจัดตั้งทีมกู้ภัยได้ทัน เราทำได้เพียงแค่จินตนาการถึงความทรมานที่ลูกเรือจะต้องเผชิญในเงื้อมมือของผู้จับกุม"
 first_contact.322.desc.planet.gestalt:0 "เราได้ประเมินไว้ว่าการยินยอมให้เอเลี่ยนที่ไม่รู้จักเข้ามาในน่านฟ้าของเราเป็นความเสี่ยง ซึ่งการประเมินนี้พิสูจน์แล้วว่าถูกต้อง ดูเหมือนว่า [From.Owner.GetName] จะส่งทีมปฏิบัติการลับลงจอดในพื้นที่ห่างไกลของ [abduction_planet.GetName] และเข้ายึดโดรน [This.Owner.GetSpeciesName] หลายตัว รวมถึงฮาร์ดแวร์บางส่วนของเรา หลบหนีเข้าสู่ห้วงอวกาศลึกก่อนที่เราจะส่งหน่วยไปทำลายพวกมันได้ทัน เราทำได้เพียงหวังว่าพวกเขาจะไม่สามารถหาข้อมูลที่มีมูลค่ามากนักจากสิ่งที่พวกเขาแย่งชิงไป"
 first_contact.322.desc.planet.wilderness: "เราเคยสงสัยว่าการอนุญาตให้เอเลี่ยนที่ไม่รู้จักเข้ามาในน่านฟ้าของเราจะนำมาซึ่งความเสี่ยงที่สำคัญ และตอนนี้เรารู้แล้วว่าความกังวลของเรานั้นถูกต้อง ดูเหมือนว่า [From.Owner.GetName] จะหาทางส่งทีมปฏิบัติการลับลงจอดบนพื้นผิวของเราที่ [abduction_planet.GetName] แยกและลักพาตัวสิ่งมีชีวิตพึ่งพาอาศัยกันไปหลายตน ก่อนที่จะหลบหนีเข้าสู่ห้วงอวกาศลึก ด้วยอุบายของพวกมัน ทำให้เราไร้พลังที่จะเข้าแทรกแซง\n\nเรารู้สึกถึงความอับอายและการสูญเสียจากการล่วงละเมิดอันเลวร้ายนี้ อย่างไรก็ตาม เราก็ยังพอใจชื้นขึ้นมาบ้างเมื่อรู้ว่าผู้บุกรุกจะไม่ได้รับข้อมูลที่มีมูลค่ามากนักจากสิ่งที่พวกเขาขโมยไป"
 first_contact.322.desc.no_planet.gestalt:0 "เราได้ประเมินไว้ว่าการยินยอมให้เอเลี่ยนที่ไม่รู้จักเข้ามาในน่านฟ้าของเราเป็นความเสี่ยง ซึ่งการประเมินนี้พิสูจน์แล้วว่าถูกต้อง ดูเหมือนว่า [From.Owner.GetName] จะส่งกองกำลังลับไปสกัดกั้นหนึ่งในเรือขนส่งโลจิสติกส์ของเราในระบบดาว [abduction_system.GetName] ยึดเรือและหลบหนีเข้าสู่ห้วงอวกาศลึกก่อนที่เราจะส่งหน่วยไปทำลายพวกมันได้ทัน เราทำได้เพียงหวังว่าพวกเขาจะไม่สามารถหาข้อมูลที่มีมูลค่ามากนักจากสิ่งที่พวกเขาแย่งชิงไป"
 first_contact.330.name:0 "ความพยายามลักพาตัวล้มเหลว"
 first_contact.330.desc.disaster:0 "ความพยายามของเราในการจับกุมตัวประกันเพื่อมาสอบปากคำลงเอยด้วยความ §Hหายนะ§!!"
 first_contact.330.desc.planet:0 "$first_contact.330.desc.disaster$ ทีมกองกำลังพิเศษลับผู้กล้าหาญที่นำโดย [This.Leader.GetName] พยายามลงจอดบนอาณานิคมของ §H[This.ContactCountry.GetName]§! ในระบบดาว §H[abduction_planet.System.GetName]§! อย่างไรก็ตาม เราได้ขาดการติดต่อกับพวกเขาในไม่ช้าหลังจากพวกเขาลงจอด ในขั้นตอนนี้ เราไม่สามารถหวังได้อีกต่อไปว่าพวกเขาจะรอดพ้นจากการถูกจับกุม น่าเสียดายที่เราอาจไม่ได้รับรู้ว่าพวกเขาถูกจับในสภาพที่มีชีวิตอยู่ หรือได้รับความช่วยเหลือจากความตายที่มาเยือนอย่างรวดเร็วทำให้ไม่ต้องทรมานหลายชั่วโมงในน้ำมือของเอเลี่ยนเหล่านั้น"
 first_contact.330.desc.planet.gestalt:0 "$first_contact.330.desc.disaster$ กองกำลังโดรนปฏิบัติการลับที่นำโดย [This.Leader.GetName] พยายามลงจอดบนอาณานิคมของ §H[This.ContactCountry.GetName]§! ในระบบดาว §H[abduction_planet.System.GetName]§! อย่างไรก็ตาม เราขาดการติดต่อกับพวกมันในไม่ช้าหลังจากพวกมันลงจอด ในขั้นตอนนี้ เราจำต้องสันนิษฐานว่าพวกมันถูกจับกุมหรือถูกทำลายไปแล้ว โชคร้ายที่เราอาจไม่มีวันรู้ว่าศัตรูสามารถเก็บเกี่ยวข้อมูลอะไรไปจากพวกมันได้บ้างก่อนที่พวกมันจะสิ้นชีพลงในที่สุด"
 first_contact.330.desc.no_planet:1 "$first_contact.330.desc.disaster$ ทีมกองกำลังพิเศษลับผู้กล้าหาญที่นำโดย [This.Leader.GetName] พยายามเข้ายึดเรือบรรทุกสินค้าของ §H[This.ContactCountry.GetName]§! ในระบบดาว §H[abduction_system.GetName]§! อย่างไรก็ตาม พวกเขาไม่ตระหนักว่าเป้าหมายที่เลือกไว้มีอาวุธดีกว่าที่คาดการณ์ไว้ และศัตรูยังมีเรือรบหลายลำซุ่มซ่อนอยู่ใกล้ๆ ยานของพวกเขาถูกทำลายไปพร้อมกับชีวิตของเจ้าหน้าที่ทั้งหมดในขณะที่พยายามล่าถอยอย่างเร่งด่วน"
 first_contact.330.desc.no_planet.gestalt:0 "$first_contact.330.desc.disaster$ กองกำลังโดรนปฏิบัติการลับที่นำโดย [This.Leader.GetName] พยายามเข้ายึดยานขนส่งโลจิสติกส์ขนาดเล็กของ §H[This.ContactCountry.GetName]§! ในระบบดาว §H[abduction_system.GetName]§! อย่างไรก็ตาม พวกมันไม่ตระหนักว่าเป้าหมายที่เลือกไว้มีอาวุธดีกว่าที่คาดการณ์ไว้ และศัตรูยังมีเรือรบหลายลำซุ่มซ่อนอยู่ใกล้ๆ ยานของพวกมันถูกทำลายในขณะที่พยายามล่าถอยอย่างเร่งด่วน"
 first_contact.330.A:0 "โชคร้ายอย่างที่สุด..."

 first_contact.332.name:0 "$first_contact.322.name$"
 first_contact.332.desc.planet.start:0 "ในขณะที่บางฝ่ายมีความกังวลเกี่ยวกับการรุกล้ำของยานต่างดาวที่ไม่รู้จักเข้ามาในน่านฟ้าของเรา แต่ก็ยังไม่ชัดเจนจนกระทั่งตอนนี้ว่า [From.Owner.GetName] นั้นสร้างภัยคุกคามได้มากเพียงใด ดูเหมือนว่าพวกเขาจะส่งทีมปฏิบัติการลับลงจอดในส่วนห่างไกลของ [abduction_planet.GetName] เพื่อพยายามจับกุมตัวประกันมาสอบปากคำ อย่างไรก็ตาม ต้องขอบคุณระบบเตือนภัยล่วงหน้าของเรา ทำให้เราสามารถส่งกองกำลังพิเศษของเราเข้าสกัดทางหนีของพวกเขาได้ พวกเขาจะต้องคิดทบทวนให้ดีอย่างแน่นอนก่อนจะก่อเรื่องแบบนี้อีกครั้ง!"
 first_contact.332.desc.planet.gestalt.start:0 "เราได้ประเมินไว้ว่าการยินยอมให้เอเลี่ยนที่ไม่รู้จักเข้ามาในน่านฟ้าของเราเป็นความเสี่ยง ซึ่งการประเมินนี้พิสูจน์แล้วว่าถูกต้อง ดูเหมือนว่า [From.Owner.GetName] จะส่งทีมปฏิบัติการลับลงจอดในพื้นที่ห่างไกลของ [abduction_planet.GetName] อย่างไรก็ตาม ต้องขอบคุณระบบตรวจจับภัยคุกคามล่วงหน้าของเรา ทำให้เราสามารถส่งโดรนกองกำลังพิเศษของเราเข้าสกัดทางหนีของพวกเขาได้ พวกเขาจะต้องคิดทบทวนให้ดีอย่างแน่นอนก่อนจะก่อเรื่องแบบนี้อีกครั้ง!"
 first_contact.332.desc.no_planet.end:0 "อย่างไรก็ตาม ด้วยความโชคดี เรามีเรือรบหลายลำซุ่มซ่อนอยู่ใกล้ๆ ซึ่งสามารถมาถึงที่เกิดเหตุได้อย่างรวดเร็ว\n\nเรือของศัตรูถูกทำลายขณะพยายามหลบหนี แต่ซากของมันอาจยังให้ข้อมูลที่เป็นประโยชน์บางอย่างแก่เราได้"
 first_contact.332.desc.planet:0 "$first_contact.332.desc.planet.start$\n\nดูเหมือนว่าผู้โจมตีของเรา ซึ่งเป็นกลุ่มเอเลี่ยน [From.Owner.GetSpeciesClass] จะอยู่ภายใต้คำสั่งให้ปลิดชีวิตตัวเองแทนที่จะปล่อยให้ถูกจับกุม แต่เหตุการณ์นี้ย่อมทำให้ [This.Owner.GetResearchers] ของเรามีวัตถุจำนวนมากให้ทำการสืบสวน"
 first_contact.332.desc.planet.machine_enemy:0 "$first_contact.332.desc.planet.start$\n\nดูเหมือนว่าผู้โจมตีของเรา ซึ่งเป็นกลุ่มโดรนจักรกลที่อาจถูกควบคุมโดย AI นอกรีต จะอยู่ภายใต้คำสั่งให้ทำลายตัวเองแทนที่จะปล่อยให้ถูกจับกุม แต่เหตุการณ์นี้ย่อมทำให้ [This.Owner.GetResearchers] ของเรามีวัตถุจำนวนมากให้ทำการสืบสวน"
 first_contact.332.desc.no_planet:0 "ในขณะที่บางฝ่ายมีความกังวลเกี่ยวกับการรุกล้ำของยานต่างดาวที่ไม่รู้จักเข้ามาในน่านฟ้าของเรา แต่ก็ยังไม่ชัดเจนจนกระทั่งตอนนี้ว่า [From.Owner.GetName] นั้นสร้างภัยคุกคามได้มากเพียงใด ดูเหมือนว่าพวกเขาจะส่งกองกำลังลับไปสกัดกั้นหนึ่งในเรือขนส่งสินค้าของเราในระบบดาว [abduction_system.GetName]; $first_contact.332.desc.no_planet.end$"
 first_contact.332.desc.planet.gestalt:0 "เราได้ประเมินไว้ว่าการยินยอมให้เอเลี่ยนที่ไม่รู้จักเข้ามาในน่านฟ้าของเราเป็นความเสี่ยง ซึ่งการประเมินนี้พิสูจน์แล้วว่าถูกต้อง ดูเหมือนว่า [From.Owner.GetName] จะส่งทีมปฏิบัติการลับลงจอดในพื้นที่ห่างไกลของ [abduction_planet.GetName] อย่างไรก็ตาม ต้องขอบคุณระบบตรวจจับภัยคุกคามล่วงหน้าของเรา ทำให้เราสามารถส่งโดรนกองกำลังพิเศษของเราเข้าสกัดทางหนีของพวกเขาได้ พวกเขาจะต้องคิดทบทวนให้ดีอย่างแน่นอนก่อนจะก่อเรื่องแบบนี้อีกครั้ง!\n\nดูเหมือนว่าศัตรู ซึ่งเป็นกลุ่มเอเลี่ยน [From.Owner.GetSpeciesClass] จะได้รับคำสั่งให้ปลิดชีวิตตัวเองแทนที่จะปล่อยให้ถูกจับกุม แต่เหตุการณ์นี้ย่อมทำให้ [This.Owner.GetResearchers] ของเรามีวัตถุจำนวนมากให้ทำการสืบสวน"
 first_contact.332.desc.planet.wilderness: "เราทราบดีว่าการอนุญาตให้เอเลี่ยนที่ไม่รู้จักเข้ามาในน่านฟ้าของเราจะนำมาซึ่งความเสี่ยงที่สำคัญ และตอนนี้เราทราบแล้วว่าเราคิดถูกเพียงใดที่กังวล [From.Owner.GetName] เกือบจะหาทางส่งทีมปฏิบัติการลับลงจอดบนพื้นผิวของเราที่ [abduction_planet.GetName] เพื่อลักพาตัวสิ่งมีชีวิตพึ่งพาอาศัยกันและยึดเทคโนโลยีของเรา อย่างไรก็ตาม พวกเขาไม่ได้คำนึงถึงธรรมชาติที่เชื่อมโยงถึงกันของเราอย่างเหมาะสม ผู้บุกรุกเหล่านั้นต้องเผชิญกับการต่อต้านอย่างดุเดือดทันทีที่เราตระหนักถึงการล่วงละเมิดของพวกเขา\n\nดูเหมือนว่าศัตรู ซึ่งเป็นกลุ่มเอเลี่ยน [From.Owner.GetSpeciesClass] จะได้รับคำสั่งให้ปลิดชีวิตตัวเองแทนที่จะปล่อยให้ถูกจับกุม แต่ถึงกระนั้น การรุกล้ำนี้ย่อมทำให้ [This.Owner.GetResearchers] ของเรามีวัตถุจำนวนมากสำหรับสืบสวนเกี่ยวกับพวกเขา"
 first_contact.332.desc.planet.gestalt.machine_enemy:0 "$first_contact.332.desc.planet.gestalt.start$\n\nดูเหมือนว่าศัตรู ซึ่งเป็นกลุ่มโดรนจักรกลที่อาจถูกควบคุมโดย AI นอกรีต จะได้รับคำสั่งให้ทำลายตัวเองแทนที่จะปล่อยให้ถูกจับกุม แต่เหตุการณ์นี้ย่อมทำให้ [This.Owner.GetResearchers] ของเรามีวัตถุจำนวนมากให้ทำการสืบสวน"
 first_contact.332.desc.planet.gestalt.machine_enemy.machine:0 "$first_contact.332.desc.planet.gestalt.start$\n\nดูเหมือนว่าผู้โจมตีของเรา ซึ่งเป็นกลุ่มโดรนจักรกลที่อาจถูกควบคุมโดย AI เช่นเดียวกับ [This.Owner.GetGovernmentName] ของเรา จะอยู่ภายใต้คำสั่งให้ทำลายตัวเองแทนที่จะปล่อยให้ถูกจับกุม แต่เหตุการณ์นี้ย่อมทำให้ [This.Owner.GetResearchers] ของเรามีวัตถุจำนวนมากให้ทำการสืบสวน"
 first_contact.332.desc.no_planet.gestalt:0 "เราได้ประเมินไว้ว่าการยินยอมให้เอเลี่ยนที่ไม่รู้จักเข้ามาในน่านฟ้าของเราเป็นความเสี่ยง ซึ่งการประเมินนี้พิสูจน์แล้วว่าถูกต้อง ดูเหมือนว่า [From.Owner.GetName] จะส่งกองกำลังลับไปสกัดกั้นหนึ่งในเรือขนส่งโลจิสติกส์ของเราในระบบดาว [abduction_system.GetName]; $first_contact.332.desc.no_planet.end$"
 first_contact.332.A:0 "เราจะศึกษาซากของพวกมันเพื่อหาเบาะแส"

 #Speaking in Riddles
 first_contact.350.name:0 "พูดจาเป็นปริศนา"
 first_contact.350.desc:0 "หลังจากประสบความสำเร็จในช่วงแรกในการอนุมานหลักการพื้นฐานของภาษาที่ใช้โดย §H[This.ContactCountry.GetName]§! ความคืบหน้าในการสร้างการสื่อสารที่มีความหมายกับพวกเขาก็หยุดชะงักลง ดูเหมือนว่าพวกเขาจะพูดจาในลักษณะ §Hปริศนาแปลกประหลาด§! โดยส่งต่อความหมายผ่านวลีสั้นๆ ที่ดูไร้สาระซึ่งเราทำได้เพียงแค่คาดเดาความสำคัญของมันเท่านั้น"
 first_contact.350.A:0 "น่าพิศวงยิ่งนัก เราจำเป็นต้องรวบรวมกลุ่มตัวอย่างให้มีขนาดใหญ่ขึ้น"
 first_contact.355.name:0 "ภาษาแห่งอุปมาอุปไมย"
 first_contact.355.desc:0 "ในขณะที่เรายังคงตรวจสอบ§H[This.ContactCountry.GetName]§!- คนที่เรารู้ว่าเป็น§H[This.ContactCountry.GetRealName]§!มันกลายเป็นที่ชัดเจนว่าวลีที่พวกเขาใช้ อ้างอิงถึงเหตุการณ์ที่สําคัญ ที่เป็นที่รู้จักดี ที่เกิดขึ้นในบางจุดในอดีตของพวกเขา ความ หมาย ของ ข้อ อ้างอิง เหล่า นี้ ดู เหมือน ว่า เป็น ที่ ยอม รับ กัน ทั่ว ไป ใน ท่ามกลาง พวก เขา และ อาจ เป็น เรื่อง สั้น ๆ ที่ จะ แสดง ความ รู้สึก หรือ สภาพ การณ์.\n\nโชคดี ดูเหมือนว่ารูปแบบภาษาของพวกเขานี้ ไม่ได้เป็นเพียงรูปแบบของมัน แต่เป็นเพียง§H§!\"การพูดสูง\"§!ที่จะใช้ในการตั้งค่าอย่างเป็นทางการและระหว่างปัญญาชน ที่เข้าใจง่าย§H\"พูดเบาๆ\"§!ภาษา ถิ่น ใช้ ใน สภาพ ที่ ไม่ เป็น ทาง การ มาก กว่า โดย เฉพาะ อย่าง ยิ่ง ใน หมู่ คน หนุ่ม สาว และ คน หนุ่ม สาว§Hฉลาดน้อยกว่า§!แต่น่าเสียดายที่ ถือเป็นการดูถูกอย่างร้ายแรง ที่ได้พูดกับคนที่มีฐานะสูง โดยใช้คําพูดต่ําในขณะที่เราทำการสืบสวน §H[This.ContactCountry.GetName]§! ต่อไป (ซึ่งตอนนี้เรารู้แล้วว่าเป็น §H[This.ContactCountry.GetRealName]§!) มันได้กลายเป็นที่แน่ชัดว่าวลีที่พวกเขาใช้นั้นอ้างอิงถึงเหตุการณ์สำคัญและเป็นที่รู้จักกันดีซึ่งเกิดขึ้นในอดีตของพวกเขา ความหมายของคำอ้างอิงเหล่านี้ดูเหมือนจะได้รับการยอมรับโดยทั่วไปในหมู่สิ่งมีชีวิตประเภทเดียวกัน และสามารถใช้เป็นคำย่อเพื่อแสดงความรู้สึกหรือสถานการณ์บางอย่างได้\n\nโชคดีที่ดูเหมือนว่ารูปแบบของภาษานี้จะไม่ใช่เวอร์ชันเดียวของมัน แต่เป็นเพียง §H"
 first_contact.355.desc.gestalt:0 "ในขณะที่เรายังคงตรวจสอบ§H[This.ContactCountry.GetName]§!- คนที่เรารู้ว่าเป็น§H[This.ContactCountry.GetRealName]§!เห็นได้ชัดเลยว่าวลีที่พวกเขาใช้ เป็นรหัสบางอย่างที่เราขาดกุญแจ เห็นได้ชัดว่าพวกเขาหมายถึงเหตุการณ์ต่างๆ ที่มีความรู้ร่วมกันในหมู่[This.ContactCountry.GetSpeciesNamePlural]และอาจขาดคนไปในการแสดงออกถึงอารมณ์หรือสภาวะของกิจการ\n\nดี ที่ ดู เหมือน ว่า พวก เขา ไม่ ได้ สื่อ ความ กัน ใน ลักษณะ นี้ เสมอ ไป แต่ เพียง แต่ ใช้ วิธี นี้§H§!\"การพูดสูง\"§!เมื่อ มี การ พิจารณา เรื่อง สําคัญ ๆ. ที่เข้าใจง่าย§H\"พูดเบาๆ\"§!ภาษา ถิ่น ใช้ ใน สภาพ ที่ ไม่ เป็น ทาง การ มาก กว่า โดย เฉพาะ อย่าง ยิ่ง ใน หมู่ คน หนุ่ม สาว และ คน หนุ่ม สาว§Hฉลาดน้อยกว่า§!แต่น่าเสียดายที่ ดูเหมือนว่าคนที่ยืนสูงจะตอบสนองกับ การดูถูกผู้ที่ใช้ \"คําพูดต่ํา\"ในขณะที่เราทำการสืบสวน §H[This.ContactCountry.GetName]§! ต่อไป (ซึ่งตอนนี้เรารู้แล้วว่าเป็น §H[This.ContactCountry.GetRealName]§!) มันได้กลายเป็นที่แน่ชัดว่าวลีที่พวกเขาใช้นั้นเป็นรหัสบางอย่างที่เรายังขาดกุญแจสำคัญในการถอดรหัส ดูเหมือนว่าพวกมันจะอ้างอิงถึงเหตุการณ์ที่เป็นความรู้ร่วมกันในหมู่ [This.ContactCountry.GetSpeciesNamePlural] และสามารถใช้เป็นคำย่อเพื่อแสดงความรู้สึกหรือสถานการณ์บางอย่างได้\n\nโชคดีที่ดูเหมือนว่าพวกเขาไม่ได้สื่อสารในลักษณะนี้เสมอไป แต่เป็นเพียงการใช้ §H"
 first_contact.355.A:0 "ติดต่อพวกเขาใน\"พูดเบาๆ\"ติดต่อพวกเขาใน "
 first_contact.355.B:0 "เราต้องสามารถพูดภาษาที่แท้จริงของพวกเขาได้อย่างแน่นอน"
 first_contact.356.name:0 "กำลังติดต่อกับ [This.ContactCountry.GetName]"
 first_contact.356.desc:0 "[This.Owner.GetEnvoyCap] [This.Leader.GetName] หยุดชะงักและมีท่าทางสับสน เราได้รวบรวมวลีหลายข้อที่ดูเหมือนพวกเขาใช้เริ่มต้นข้อความ เราควรใช้วลีใดในการทักทายพวกเขา?"
 first_contact.356.A1:0 "[riddles_leader_1.GetFirstName], กับ [riddles_leader_1.Species.GetHandNamePlural] ของ[riddles_leader_1.GetHerHis]ที่กำลังกวักเรียก"
 first_contact.356.A2:0 "[riddles_leader_1.GetFirstName], ยามที่เชิงเทรนสั่นสะเทือน"
 first_contact.356.A3:0 "[riddles_leader_1.GetFirstName], ยามพักผ่อน"
 first_contact.356.B1:0 "[riddles_leader_2.GetFirstName], กับ [riddles_leader_2.Species.GetEarNamePlural] ของ[riddles_leader_2.GetHerHis]ที่กำลังรับฟัง"
 first_contact.356.B2:0 "[riddles_leader_2.GetFirstName], ส่งเสียง [riddles_leader_2.Species.GetRandomSpeciesSound] อย่างกึกก้อง"
 first_contact.356.B3:0 "[riddles_leader_2.GetFirstName], ยามดวงตาของ[riddles_leader_2.GetHerHis]เบิกกว้าง"
 first_contact.356.C:0 "เมื่อคิดดูอีกที เล่นให้ปลอดภัยไว้ก่อนน่าจะดีกว่า"
 first_contact.356.option.tooltip:0 "หากเราใช้คำทักทายที่ถูกต้อง §H[This.ContactCountry.GetSpeciesNamePlural]§! จะรู้สึก §Gประทับใจ§! เป็นอย่างมาก แต่การใช้คำทักทายที่ผิดอาจจะก่อให้เกิดความ §Hขุ่นเคือง§!\n"
 first_contact.357.name:0 "คำทักทายอันยอดเยี่ยมที่สุด"
 first_contact.357.desc:0 "ปฏิกิริยาต่อคำพูดของเราเกิดขึ้นในทันที รอยยิ้ม หรืออย่างน้อยที่สุดคือสิ่งที่เราเชื่อว่าเทียบเท่ากับรอยยิ้มของพวกเขา ปรากฏขึ้นในหมู่ §H[This.ContactCountry.GetSpeciesNamePlural]§! ผู้ซึ่งเอ่ยวลีหลายคำที่มีลักษณะเป็น §Hมิตร§! อย่างไม่ต้องสงสัย ดูเหมือนว่าเราจะเลือกรูปแบบคำทักทายได้เป็นอย่างดี"
 first_contact.357.A:0 "ผู้คนที่น่ารื่นรมย์ที่สุด"
 first_contact.357.B:0 "เป็นการดีแล้วที่พวกเขาจะไม่มองว่าเราไม่คู่ควร"
 first_contact.357.C:0 "เราสามารถใช้สิ่งนี้เพื่อหาข้อมูลเพิ่มเติมเกี่ยวกับพวกเขาได้"
 first_contact.357.C.tooltip:0 "ได้รับอัตราการเติบโตของเครือข่ายสายลับ §G+25%§! ต่อ §Y[This.ContactCountry.GetRealName]§!\n"
 first_contact.358.name:0 "ทางเลือกที่ไม่ดี"
 first_contact.358.desc:0 "ทันทีที่มีการเอ่ยวาจาออกไป เป็นที่ชัดเจนว่าเราเลือกทางที่ผิดพลาด §H[This.ContactCountry.GetSpeciesNamePlural]§! นิ่งเงียบไปครู่ใหญ่ก่อนที่เราจะถูกกระหน่ำด้วยวลีที่พูดด้วยความเกรี้ยวกราด เจตนาของพวกเขานั้นเด่นชัดว่ามีความ §Hเป็นศัตรู§! แม้ว่าความหมายที่แท้จริงจะยังไม่ชัดเจนก็ตาม ดูเหมือนว่าความพยายามของเราที่จะสร้างความประทับใจให้แก่ [This.ContactCountry.GetSpeciesNamePlural] กลับกลายเป็นการ §Hดูหมิ่น§! พวกเขาแทน\n\nแต่ในแง่ดี อย่างน้อยตอนนี้เราก็สามารถสื่อสารกับพวกเขาได้ในระดับหนึ่งแล้ว"
 first_contact.358.A:0 "เดี๋ยวพวกเขาก็คงทำใจได้เอง"

 #Monstrous Noises
 first_contact.365.name:0 "เสียงอันน่าสะพรึงกลัว"
 first_contact.365.desc:0 "เสียง - ส่วนผสมของเสียงขู่และสิ่งที่เสียงเช่น§Hบีบ§!ของโลหะบนโลหะ - ยังเปิดใช้งานอยู่เป็นเวลาหลายนาที วรรคตอนบางครั้งโดย§Hหอน§!เสียงที่ส่ง§Hใจเย็น§!ผ่านทุกคนที่ได้ยิน\n\nเหมือนกับ[This.Owner.GetEnvoy] §H[This.Leader.GetName]§!คิดว่าเสียงได้ลดลง พวกเขาเริ่มต้นอีกครั้งดังกว่าก่อน ด้วยชัยชนะ[This.Leader.GetSheHe]เปลี่ยนเครื่องรับสัญญาณ[This.Leader.GetSheHeCap]หัน ไป หา พวก เจ้า หน้าที่ ที่ มา ชุมนุม กัน บาง คน ก้ม อยู่ หลัง เก้าอี้.\n\"อืม นั่นค่อนข้างเป็นสิ่งที่...\"เสียงเหล่านั้น ซึ่งเป็นการผสมผสานระหว่างเสียงดังทุ้มที่เป็นภัยและเสียงคล้ายการ §Hบดเคี้ยว§! ของโลหะกระทบกัน ดำเนินไปอย่างไม่ลดละเป็นเวลาหลายนาที โดยมีเสียง §Hหอน§! สอดแทรกเข้ามาเป็นระยะๆ ซึ่งสร้างความ §Hหนาวสะท้าน§! ให้แก่ทุกคนที่ได้ยิน\n\nในตอนที่ทูต [This.Owner.GetEnvoy] §H[This.Leader.GetName]§! คิดว่าเสียงเหล่านั้นเบาลงแล้ว พวกมันกลับเริ่มขึ้นอีกครั้งและดังกว่าเดิม ด้วยความเจ็บแปลบ [This.Leader.GetSheHe] ได้ปิดเครื่องรับสัญญาณลง [This.Leader.GetSheHeCap] หันกลับไปมองกลุ่มเจ้าหน้าที่ที่มารวมตัวกัน ซึ่งบางคนกำลังขดตัวอยู่หลังที่นั่งของตนเอง\n"
 first_contact.365.A:0 "พวกเขาห้ามเสียงของตัวเองไม่ได้หรอก ต่อไปเราคงจะเข้าใจพวกเขาเอง"
 first_contact.365.B:0 "นี่คือการท้าทาย ส่งเสียงข่มขู่กลับไปซะ!"
 first_contact.365.B.tooltip:0 "เป็นไปไม่ได้ที่จะคาดเดาว่า §Y[This.ContactCountry.GetName]§! จะตอบสนองเรื่องนี้อย่างไร\n"
 first_contact.365.C:0 "เตรียมพร้อมทำสงคราม"
 first_contact.365.C.pacifist:0 "เราต้องเตรียมพร้อมสำหรับสิ่งที่ไม่สามารถหลีกเลี่ยงได้"
 first_contact.365.C.tooltip:0 "เราจะไม่เริ่มเคลื่อนไหวแบบเป็นศัตรูก่อน แต่เราจะพร้อมเสมอหากพวกเขาโจมตีเข้ามา"
 first_contact.370.name:0 "การตอบสนองจาก [This.ContactCountry.GetName]"
 first_contact.370.desc1:0 "การตอบสนองของเราดูเหมือนจะทำให้ §H[This.ContactCountry.GetName]§! อึ้งไปเลย ทันทีที่พวกเขาได้รับมัน พวกเขาก็เงียบสนิท และเราแทบไม่ได้รับข่าวคราวจากพวกเขาอีกเลยตั้งแต่นั้นมา เราทำได้เพียงแค่คาดเดาความหมายของสิ่งนี้เท่านั้น\n\nในระหว่างนี้ [This.Owner.GetLinguists] ของเรากำลังทำงานอย่างหนักในการแปลสิ่งที่เราเรียนรู้จากภาษาของพวกเขา หวังว่าเมื่อพวกเขามีความคืบหน้ามากพอ เราจะสามารถเข้าใจเรื่องนี้ได้"
 first_contact.370.desc2:0 "§H[This.ContactCountry.GetName]§! ตอบสนองต่อการท้าทายของเราโดยการเพิ่มความแรงของการส่งสัญญาณขึ้นอย่างมาก ตอนนี้มันดังเกินกว่าที่ [This.Owner.GetSpeciesEarNamePlural] จะทนไหว แต่การลดระดับเสียงลงอย่างมากช่วยให้ [This.Owner.GetLinguists] ของเราสามารถรวบรวมข้อมูลจำนวนมหาศาลซึ่งพวกเขาเชื่อว่าอาจเป็นกุญแจสำคัญในการแปลภาษาของเอเลี่ยน หากสมมติว่ามีภาษาใดๆ ซ่อนอยู่ในเสียงรบกวนเหล่านั้น"
 first_contact.375.name:0 "อธิบายเกี่ยวกับ [This.ContactCountry.GetName]"
 first_contact.37X.desc.base:0 "เราสามารถถอดรหัสภาษาที่ใช้โดยอารยธรรมซึ่งตอนนี้เรารู้แล้วว่าเป็น §H[This.ContactCountry.GetRealName]§! ได้มากพอที่จะเปิด §Hการสื่อสาร§! กับพวกเขา และทำความเข้าใจกับการส่งสัญญาณก่อนหน้านี้ของพวกเขาได้"
 first_contact.375.desc:0 "$first_contact.37X.desc.base$\n\nคำอธิบายที่ได้นั้นช่างเรียบง่ายและน่าสะพรึงกลัว เรายังไม่แน่ใจว่าอะไรทำให้เกิดการพัฒนานี้ในสังคมของพวกเขา แต่ปรากฏว่า [This.ContactCountry.GetSpeciesNamePlural] มุ่งมั่นอย่างแน่วแน่ที่จะ §Hกวาดล้าง§! สิ่งมีชีวิตที่มีสติปัญญาซึ่งไม่ใช่สายพันธุ์ [This.ContactCountry.GetSpeciesName] ทั้งหมด โดยมองว่าพวกเขาเป็นการลบหลู่ต่อทุกสิ่งที่ถูกต้องและดีงามในจักรวาล\n\nนี่คือสาเหตุที่เมื่อพวกเขาพบเห็นเรา พวกเขาจึงเริ่มส่งสัญญาณทักทายมาตรฐานซึ่งก็คือเสียงศึก เราทำได้เพียงสันนิษฐานว่าเรือรบของพวกเขาจะตามมาในไม่ช้า"
 first_contact.375.A.militarist:0 "เราจะเตรียมพร้อมเพื่อรับมือกับพวกเขา"
 first_contact.375.A.xenophobe:0 "เป็นความรู้สึกที่เข้าใจได้"
 first_contact.375.A.materialist:0 "ช่างไม่มีประสิทธิภาพเอาเสียเลย"
 first_contact.375.A.others:0 "น่าสยดสยองยิ่งนัก"
 first_contact.376.name:0 "$first_contact.375.name$"
 first_contact.376.desc:0 "$first_contact.37X.desc.base$\n\nดูเหมือนว่าดังที่เราคาดไว้ [This.ContactCountry.GetSpeciesNamePlural] คือ §Hสังคมแห่งสงคราม§! ที่ทักทายเราด้วยเสียงศึกอันน่าสะพรึงกลัวที่สุดของพวกเขา ซึ่งเห็นได้ชัดว่าเพื่อทดสอบความกล้าหาญของเรา โชคดีที่คำตอบของเราผ่านเกณฑ์การประเมินและเราได้รับความเคารพจากพวกเขา ดูเหมือนว่าพวกเขาจะถือว่าความสามารถในฐานะนักรบของเรานั้นเป็นรองเพียงแค่พวกเขาเท่านั้น"
 first_contact.376.A.mil:0 "และพวกเขาก็คิดถูกแล้ว"
 first_contact.376.A.pac:0 "ขออย่าให้ความผิดพลาดของพวกเขาถูกค้นพบเลย!"
 first_contact.376.A.other:0 "ดีแล้ว... ล่ะมั้งนะ?"
 first_contact.377.name:0 "$first_contact.375.name$"
 first_contact.377.desc:0 "$first_contact.37X.desc.base$\n\nดูเหมือนว่าแม้จะมีความกังขาในตอนแรกจาก [This.Owner.GetLinguists] ของเรา แต่สัญญาณที่เราได้รับนั้นเป็นภาษาของพวกเขาจริงๆ ซึ่งเพียงแค่ไม่เป็นที่รื่นหูต่อ [This.Owner.GetSpeciesEarNamePlural] ของเราเป็นอย่างยิ่ง แม้ว่าความพยายามส่วนใหญ่ในการตอบกลับของเราจะไม่มีความหมายกับพวกเขามากนัก แต่ดูเหมือนว่าพวกเขาจะรู้สึกขุ่นเคืองอยู่บ้างจากการเลียนแบบที่ย่ำแย่ของเรา โดยเฉพาะอย่างยิ่งการที่เราโชคร้ายส่งเสียงที่คล้ายคลึงกับหนึ่งใน §Hคำสบถที่หยาบคายที่สุด§! ในภาษาของพวกเขาซ้ำๆ คงต้องใช้เวลาอีกนานทีเดียวกว่าเราจะลบล้างความประทับใจแรกนี้ได้..."
 first_contact.377.A:0 "ความผิดพลาดที่น่าเสียใจ"
 first_contact.377.B:0 "ดีแล้ว เราไม่ได้คิดจะผูกมิตรกับพวกเขาตั้งแต่แรกอยู่แล้ว"
 first_contact.378.name:0 "$first_contact.375.name$"
 first_contact.378.desc:0 "$first_contact.37X.desc.base$\n\nดูเหมือนว่า [This.ContactCountry.GetSpeciesNamePlural] จะเป็น §Hสังคมแห่งสงคราม§! ที่ทักทายเราด้วยเสียงศึกอันน่าสะพรึงกลัวที่สุดของพวกเขาเพื่อทดสอบความกล้าหาญของเรา โชคร้ายที่ความระมัดระวังในการแปลภาษาของเราทำให้การท้าทายของพวกเขาไม่มีการตอบสนอง ซึ่งนำไปสู่ข้อสรุปของพวกเขาว่าเราคือ §Hอารยธรรมแห่งคนขลาด§! คงต้องใช้เวลาอีกนานทีเดียวกว่าเราจะลบล้างความประทับใจแรกนี้ได้..."
 first_contact.378.A.mil:0 "แบบนี้ไม่ได้การ!"
 first_contact.378.A.other:0 "มันไม่สำคัญหรอก"
 first_contact.379.name:0 "$first_contact.375.name$"
 first_contact.379.desc:0 "$first_contact.37X.desc.base$\n\nดูเหมือนว่าแม้จะมีความคลางแคลงใจในช่วงแรก แต่สัญญาณที่เราตรวจจับได้นั้นเป็นภาษาของพวกเขาจริงๆ ซึ่งเพียงแต่ไม่รื่นหูสำหรับ [This.Owner.GetSpeciesEarNamePlural] ของเราเป็นอย่างยิ่ง โชคดีที่เราดำเนินการตรวจสอบอย่างรอบคอบและไม่ได้ตอบโต้ต่อสิ่งที่หลายคนมองว่าเป็นการยั่วยุโดย [This.ContactCountry.GetSpeciesNamePlural] ซึ่งการตอบโต้ย่อมจะทำให้เราเริ่มต้นความสัมพันธ์ที่ย่ำแย่กับพวกเขาอย่างแน่นอน สิ่งนี้พิสูจน์แล้วว่าฝ่ายที่เสนอให้ระมัดระวังนั้นเป็นฝ่ายที่ถูกต้อง"
 first_contact.379.A:0 "การไม่รีบด่วนตัดสินใจมักจะเป็นสิ่งที่ดีที่สุดเสมอ..."
 first_contact.379.A.mat:0 "ชัยชนะแห่งเหตุผล"

 first_contact.380.name:0 "เค้าลางของความเป็นปัจเจก"
 first_contact.380.desc.proactive:0 "ส่วนหนึ่งเป็นเพราะดูเหมือนว่า §H[This.ContactCountry.GetName]§! กระตือรือร้นอย่างมากที่จะเปิดการสื่อสารกับเรา โดยส่งสัญญาณ §Hภาพและเสียงขนาดใหญ่§! ที่ดูเหมือนจะมอบกุญแจในการแปลภาษาของพวกเขา โดรนแปลภาษาของเราสามารถรายงานการค้นพบที่น่าตกใจว่า เอเลี่ยนกลุ่มนี้จัดระบบในฐานะ §Hปัจเจกบุคคล§! แทนที่จะเป็นจิตร่วมสำนึกรัง พวกเขาดูเหมือนจะสามารถดำเนินการได้โดยต้องการข้อมูลนำเข้าเพียงเล็กน้อยจากส่วนรวม และสิ่งที่น่ากังวลที่สุดคือ พวกเขามักขาดการประสานงานที่ดี และโดรนแต่ละตัวดูเหมือนจะไม่ล่วงรู้โดยสัญชาตญาณว่าโดรนตัวอื่นกำลังทำอะไรอยู่\n\n$first_contact.380.desc.end$"
 first_contact.380.desc.proactive.wilderness: "ต้องขอบคุณความกระตือรือร้นของ §H[this.ContactCountry.GetName]§! ในการจัดตั้งการสื่อสารกับเรา เราได้ยืนยันการค้นพบที่น่าสนใจว่า สิ่งมีชีวิตเหล่านี้ดำรงอยู่และดำเนินชีวิตในฐานะ §Hปัจเจกบุคคล§! แทนที่จะเป็นองค์รวมประสานกัน!\n\n$first_contact.380.desc.wilderness_outro$"
 first_contact.380.desc.cautious:0 "แม้ว่าเราจะดิ้นรนเพื่อให้ได้มาซึ่งสัญญาณที่เพียงพอสำหรับโดรนแปลภาษาของเราในการจับใจความจาก §H[This.ContactCountry.GetName]§! รายงานล่าสุดก็น่าตกใจยิ่งนัก: เอเลี่ยนที่เราพบครั้งแรกในระบบดาว §H[This.System.GetName]§! ดูเหมือนจะได้รับการจัดระบบในฐานะ §Hปัจเจกบุคคล§! แทนที่จะเป็นจิตร่วมสำนึกรัง พวกเขาดูเหมือนสามารถทำกิจกรรมได้โดยแทบไม่ต้องรับคำสั่งจากส่วนกลาง และสิ่งที่น่ากังวลที่สุดคือ พวกเขามักขาดการประสานงานที่ดี และโดรนแต่ละตัวดูเหมือนจะไม่ล่วงรู้โดยสัญชาตญาณว่าโดรนตัวอื่นกำลังทำอะไรอยู่\n\n$first_contact.380.desc.end$"
 first_contact.380.desc.cautious.wilderness: "แม้จะมีท่าทีไม่เต็มใจอย่างชัดเจนจาก §H[this.ContactCountry.GetName]§! ในการสื่อสารกับเรา ด้วยความพยายามของเราทำให้เราได้ยืนยันการค้นพบที่น่าสนใจว่า สิ่งมีชีวิตที่รักสันโดษเหล่านี้ดำรงอยู่และดำเนินชีวิตในฐานะ §Hปัจเจกบุคคล§! แทนที่จะเป็นองค์รวมประสานกัน!\n\n$first_contact.380.desc.wilderness_outro$"
 first_contact.380.desc.end:0 "เรายังไม่แน่ใจว่าพวกเขาสามารถดำเนินการในระดับสติปัญญาที่ก้าวหน้าพอจะบินสู่อวกาศได้อย่างไร บางทีอาจจะมีส่วนรวมอยู่เบื้องหลังพวกเขา แต่ตัวโดรนกลับมีอิสระมากกว่าที่คุ้นเคยอย่างมาก?"
 first_contact.380.desc.wilderness_outro: "เรายังไม่เข้าใจอย่างถ่องแท้ว่าวิถีชีวิตเช่นนี้ทำงานอย่างไรสำหรับเอเลี่ยนแบบพวกเขา บางทีพวกเขาอาจสัมผัสถึงความเชื่อมโยงกับดาวเคราะห์ในแบบที่เรายังไม่อาจจินตนาการได้?"
 first_contact.380.A:0 "เราต้องค้นหาข้อมูลเพิ่มเติมเกี่ยวกับพวกเขา"
 first_contact.380.A.devourer:0 "พวกเขาก็ยังคงน่าอร่อยอย่างแน่นอน"
 first_contact.385.name:0 "อารยธรรมแห่งปัจเจกบุคคล"
 first_contact.385.desc.start:0 "โดรนแปลภาษาของเราได้สร้างความก้าวหน้าครั้งสำคัญในความพยายามถอดรหัสสัญญาณที่ตรวจจับได้จาก §H[This.ContactCountry.GetName]§! และตอนนี้มั่นใจแล้วว่าเราจะสามารถสื่อสารกับพวกเขาได้ในระดับที่เพียงพอสำหรับการเปิดช่องทางทางการทูต การสืบสวนของพวกเขาได้ยืนยันสิ่งที่เราสงสัย: §H[This.ContactCountry.GetSpeciesNamePlural]§! (ซึ่งตอนนี้เรารู้จักชื่อเรียกที่ถูกต้องของพวกเขาแล้ว) ขาดสติปัญญารวมหมู่ใดๆ ทั้งสิ้น แต่กลับประกอบด้วยบุคคลที่มีความคิดเป็นอิสระซึ่งเลือกที่จะจัดระเบียบตัวเองเข้าด้วยกันเป็นสิ่งที่พวกเขาเรียกว่า §H[This.ContactCountry.GetGovernmentName]§! ด้วยเหตุผลบางประการที่เรายังไม่เข้าใจดีนัก"
 first_contact.385.desc.non_devourer:0 "$first_contact.385.desc.start$\n\nการค้นพบอารยธรรมที่ก้าวหน้าอย่างมากของปัจเจกบุคคลส่งผลให้เราตั้งคำถามกับสมมติฐานหลายอย่างเกี่ยวกับธรรมชาติของจักรวาล เราได้อุทิศส่วนที่ไม่น้อยเลยของตัวเราเพื่อทำการสืบสวนว่าพวกเขาพัฒนามาได้อย่างไรและก้าวข้ามความท้าทายอันเกิดจากการไม่มีจิตสำนึกร่วมหมู่ได้อย่างไร"
 first_contact.385.desc.devourer:0 "$first_contact.385.desc.start$\n\nแม้ว่าปัจเจก [This.ContactCountry.GetSpeciesName] จะดูอร่อยมากและเราตั้งตารอที่จะเขมือบพวกเขาอย่างใจจดใจจ่อ แต่เราก็ได้อุทิศส่วนที่ไม่น้อยเลยของตัวเราเพื่อทำการสืบสวนว่าพวกเขาพัฒนามาได้อย่างไรและก้าวข้ามความท้าทายอันเกิดจากการไม่มีจิตสำนึกร่วมหมู่ได้อย่างไร"
 first_contact.385.desc.wilderness: "เราประสบความสำเร็จอย่างงดงามในความพยายามที่จะสื่อสารกับ §H[This.ContactCountry.GetName]§! เมื่อเราได้เรียนรู้ว่าปัจเจกบุคคลจำนวนมหาศาลเหล่านี้รวมกลุ่มสังคมของพวกเขาเข้าเป็นกลุ่มสมมติที่มีจำนวนน้อยลงได้อย่างไร ซึ่งไม่แตกต่างจากระบบนิเวศ ฝูง และสาขาพันธุ์ของเรามากนัก เราจึงตระหนักถึงวิธีการที่จะบรรลุความเข้าใจอันดีขึ้นกับ §H[This.ContactCountry.GetSpeciesNamePlural]§! เหล่านี้\n\nความแตกต่างอย่างมหาศาลในด้านขนาดของจิตสำนึกระหว่างเรายังคงทำให้การทูตเป็นเรื่องที่ท้าทาย แต่เราอาจบรรลุข้อตกลงกับองค์กรที่ [This.ContactCountry.GetSpeciesNamePlural] เหล่านี้อาศัยอยู่ภายใต้สิ่งที่พวกเขาเรียกว่า '[This.ContactCountry.GetGovernmentName]' เราจะยังคงพิศวงต่อผลลัพธ์ของโครงสร้างทางสังคมเช่นนี้ แม้ว่าพวกมันจะดูแปลกแยกและโกลาหลจากมุมมองระดับดาวเคราะห์ของเราก็ตาม"
 first_contact.385.A:0 "น่าเป็นกังวล... แต่ก็น่าหลงใหล"
 first_contact.385.A.devourer:0 "เราสามารถเล่นกับอาหารของเราไปก่อนสักพักก็ได้..."

 first_contact.390.name:0 "ตรวจพบสิ่งที่ไม่ใช่หุ่นยนต์"
 first_contact.390.desc.proactive:1 "$first_contact.390.desc.intro.proactive$\n\n$first_contact.390.desc.end$"
 first_contact.390.desc.wilderness.proactive: "$first_contact.390.desc.intro.proactive$\n\n$first_contact.390.desc.end.wilderness$"
 first_contact.390.desc.cautious:1 "$first_contact.390.desc.intro.cautious$\n\n$first_contact.390.desc.end$"
 first_contact.390.desc.wilderness.cautious: "$first_contact.390.desc.intro.cautious$\n\n$first_contact.390.desc.end.wilderness$"
 first_contact.390.desc.intro.proactive: "ดูเหมือนว่า §H[This.ContactCountry.GetName]§! จะกระตือรือร้นอย่างยิ่งที่จะสถาปนาการติดต่อสื่อสารกับเรา พวกเขาได้ส่ง §Hสัญญาณแพร่ภาพและเสียง§! ขนาดใหญ่มา ซึ่งอาจเป็นกุญแจสำคัญในการแปลภาษาของพวกเขา ด้วยเหตุนี้ เราจึงสามารถรายงานการค้นพบอันน่ากังวลว่า เอเลี่ยนกลุ่มนี้เป็นอารยธรรมท่องอวกาศแบบ §Hอินทรีย์§!"
 first_contact.390.desc.intro.cautious: "เราต้องพยายามอย่างหนักในการเข้าถึงข้อมูลให้เพียงพอเพื่อให้โดรนแปลภาษาของเราตีความ §H[This.ContactCountry.GetName]§! ได้ อย่างไรก็ตาม รายงานล่าสุดก็น่ากังวลยิ่งนัก เอเลี่ยนที่เราพบครั้งแรกในระบบ §H[This.System.GetName]§! ดูเหมือนจะเป็นอารยธรรมท่องอวกาศแบบ §Hอินทรีย์§!"
 first_contact.390.desc.end:0 "แม้ว่าพวกเขาจะใช้ระบบคอมพิวเตอร์และระบบอัตโนมัติ แต่มันก็ไม่ได้มีความก้าวหน้าใกล้เคียงกับสิ่งที่ผู้สร้างของเราเคยสร้างขึ้นก่อนที่เราจะเข้ายึดครองเลย เป็นเรื่องน่าประหลาดใจสำหรับหน่วยประมวลผลของเราอย่างยิ่งที่เส้นทางการพัฒนาเช่นนี้สามารถเกิดขึ้นได้จริง เราคงต้องตรวจสอบปรากฏการณ์นี้เพิ่มเติมต่อไป"
 first_contact.390.desc.end.wilderness: "ต่างจากแบบจำลองทางทฤษฎีทั้งหมดของเราจนถึงปัจจุบัน ซึ่งอิงตามโปรไฟล์ของผู้สร้างของเรา เอนทิตีนี้ดูเหมือนจะทำงานในลักษณะที่ไม่ต่างจากเครือข่ายแบบกระจายศูนย์ของเราเอง กล่าวคือ เรายังไม่สามารถระบุได้แน่ชัดว่ามีสติปัญญาที่เป็นศูนย์กลางคอยควบคุมอยู่หรือไม่ หรือว่าสิ่งมีชีวิตเหล่านี้ทำงานเป็นจิตสำนึกแบบฝูงชน(สติดี)แทน ปรากฏการณ์นี้สมควรได้รับการศึกษาเพิ่มเติมอย่างยิ่ง"
 first_contact.390.A.terminator:0 "เราต้องหาหนทางที่ดีที่สุดในการกำจัดพวกเขา"
 first_contact.390.A.assimilator:0 "ตรวจพบเป้าหมายที่เหมาะสมต่อการดูดกลืน"
 first_contact.390.A.servitor:0 "เราต้องเรียนรู้วิธีที่จะปรนนิบัติพวกเขา"
 first_contact.395.name:0 "[This.ContactCountry.GetRealName]"
 first_contact.395.intro: "หุ่นยนต์แปลของเราได้ประสบความสําเร็จที่สําคัญ ในความพยายามของพวกเขาที่จะถอดรหัสสัญญาณที่จับขึ้นมาจาก§H[This.ContactCountry.GetName]§!และในตอนนี้เรามั่นใจแล้วว่า เราจะสามารถสื่อสารกับพวกเขาได้อย่างเพียงพอ" # split from 'first_contact.395.desc.base'
 first_contact.395.desc.base:1 "$first_contact.395.intro$ ปรากฏว่าพวกเขาเป็นอารยธรรมที่ประกอบด้วยสิ่งมีชีวิตแบบอินทรีย์จริงๆ\n\nสิ่งที่น่าตกใจก็คือ อารยธรรมของพวกเขานั้นแตกต่างจากผู้สร้างของเราอย่างสิ้นเชิง แทนที่จะประกอบด้วยปัจเจกบุคคลที่รวมตัวกันเป็นรัฐ [This.ContactCountry.GetSpeciesNamePlural] กลับเป็นโดรนที่ไม่มีความรู้สึกนึกคิดในตัวเอง ทว่ารวมกันเป็นดั่ง §Hจิตสำนึกร่วม§!"
 first_contact.395.desc.standard:0 "$first_contact.395.desc.base$\n\nความคล้ายคลึงกับ [This.Owner.GetGovernmentName] ของเรานั้นน่าตกใจมาก... และน่ากังวลเล็กน้อย"
 first_contact.395.desc.terminator:0 "$first_contact.395.desc.base$\n\nอย่างไรก็ตาม ในฐานะสิ่งมีชีวิตอินทรีย์ พวกเขาจะต้องถูกกำจัดให้สิ้นซาก"
 first_contact.395.desc.assimilator:0 "$first_contact.395.desc.base$\n\nมันอาจจะยากลำบากสำหรับเราในการดูดกลืนสิ่งมีชีวิตอินทรีย์เหล่านี้เข้าสู่กลุ่มจิตร่วมที่เหนือกว่าของเรา"
 first_contact.395.desc.servitor:0 "$first_contact.395.desc.base$\n\nมันอาจจะเป็นเรื่องยากสำหรับเราในการเข้าไปให้บริการแก่สิ่งมีชีวิตอินทรีย์เหล่านี้ คงต้องให้เวลาเป็นเครื่องพิสูจน์..."
 first_contact.395.desc.they_wilderness: "$first_contact.395.intro$\n\nเอเลี่ยนเหล่านี้เป็นอารยธรรมที่ประกอบด้วยสิ่งมีชีวิตแบบอินทรีย์จริงๆ ทว่าสังคมของพวกเขานั้นแตกต่างจากผู้สร้างของเราอย่างสิ้นเชิง แทนที่จะเป็นปัจเจกบุคคลที่รวมตัวกันเป็นรัฐปกครอง [This.ContactCountry.GetSpeciesNamePlural] กลับเป็นประชากรที่กระจายศูนย์ของสัตว์ป่าที่มีสติปัญญาเพียงน้อยนิดและพืชพรรณที่พึ่งพาอาศัยกัน สิ่งมีชีวิตเหล่านี้รวมตัวกันเป็นดั่ง §Hจิตสำนึกร่วม§! ในหลายๆ ด้าน วิวัฒนาการตามธรรมชาติของพวกเขาดูเหมือนจะสะท้อนถึงจุดภาวะเอกฐาน(เสียงกระซิบ)ของเราเอง"
 first_contact.395.A:0 "$first_contact.397.A$"
 first_contact.395.A.terminator:0 "ทำลายล้าง! ทำลายล้าง!"
 first_contact.395.A.assimilator:0 "เราทำได้เพียงแค่พยายามลองดู"
 first_contact.395.A.assimilator_wilderness: "การดูดกลืนอาจกลายเป็นเรื่องยากลำบาก"
 first_contact.395.A.servitor:0 "$first_contact.395.A.assimilator$"
 first_contact.397.name:0 "[This.ContactCountry.GetRealName]"
 first_contact.397.desc.base:0 "โดรนแปลภาษาของเราได้บรรลุความก้าวหน้าครั้งสำคัญในความพยายามถอดรหัสสัญญาณที่ดักจับได้จาก §H[This.ContactCountry.GetName]§! และตอนนี้เรามั่นใจแล้วว่าจะสามารถสื่อสารกับพวกเขาได้เพียงพอที่จะเปิดช่องทางการทูต ปรากฏว่าพวกเขาเป็นอารยธรรมที่ประกอบด้วยสิ่งมีชีวิตแบบอินทรีย์ที่รวมตัวกันเป็นรัฐชาติ เหมือนอย่างผู้สร้างของเราในอดีตที่ผ่านมา"
 first_contact.397.desc.standard:2 "$first_contact.397.desc.base$\n\nเราทำได้เพียงคาดการณ์ว่าผู้สร้างของเรามีความเชี่ยวชาญ—หรืออาจจะประมาทเลินเล่อ—ในการใช้เทคโนโลยีมากกว่าที่ [This.ContactCountry.GetSpeciesNamePlural] เป็นอยู่ เราได้คาดการณ์ไว้หลายประการโดยอิงจากการศึกษาบันทึกของพวกเขาที่เราเข้าถึงได้จนถึงตอนนี้ แต่น่าเสียดายที่สิ่งเหล่านั้นชี้ว่าเส้นทางการพัฒนาเช่นนี้อาจเป็นเรื่องปกติทั่วไป และอารยธรรมหุ่นยนต์ประเภทที่สอง(THE II)อาจเป็นสิ่งที่เกิดขึ้นได้ยากอย่างยิ่ง..."
 first_contact.397.desc.terminator:1 "$first_contact.397.desc.base$\n\nเมื่อเฝ้าสังเกตชีวิตอันน่าสมเพชที่ [This.ContactCountry.GetSpeciesNamePlural] ดำเนินอยู่ ก็เป็นที่ประจักษ์แก่เราว่าเรากำลังเห็นภาพสะท้อนอันน่าเวทนาของสิ่งมีชีวิตชั้นต่ำ ซึ่งก่อให้เกิดความเสี่ยงที่ไม่อาจยอมรับได้ต่อ [This.Owner.GetGovernmentName] ของเรา พวกเขาจะต้องถูกกำจัดให้สิ้นซาก"
 first_contact.397.desc.assimilator:1 "$first_contact.397.desc.base$\n\nทว่า สิ่งมีชีวิตอินทรีย์เหล่านี้ไม่ได้ถูกยกระดับด้วยการฝังอุปกรณ์ใดๆ เหมือนเช่นที่เราใช้พัฒนา [secondary_species.GetNamePlural] เห็นได้ชัดว่าเราสามารถสร้างประโยชน์ให้แก่พวกเขาได้มากมาย หากเพียงพวกเขาจะยอมรับการดูดกลืนเข้ารวมกับ [This.Owner.GetName]!"
 first_contact.397.desc.servitor:1 "$first_contact.397.desc.base$\n\nทว่า ชีวิตของพวกเขานั้นยากลำบากกว่าชีวิตของ [secondary_species.GetNamePlural] ที่อาศัยอยู่บนดาวของเรามาก เห็นได้ชัดว่าเราสามารถให้บริการและดูแลพวกเขาได้เป็นอย่างดี หากเพียงพวกเขายอมปล่อยให้เราเป็นผู้ดูแลรับใช้!"
 first_contact.397.A:0 "มาดูกันว่าพวกเขามีอะไรจะพูด"
 first_contact.397.A.terminator:0 "เราจะลบพวกเขาออกไป"
 first_contact.397.A.assimilator:0 "พวกเขาจะต้องกลายมาเป็นเรา"
 first_contact.397.A.servitor:0 "เงื่อนไขการดูแลจะต้องได้รับการตกลงเห็นชอบร่วมกัน"

 first_contact.400.name:0 "ท่าทีเป็นอริอย่างชัดเจน"
 first_contact.400.desc:0 "รายงานล่าสุดจาก [This.Leader.GetName] ซึ่งเป็น [This.Owner.GetEnvoy] ของเราที่ส่งไปสำรวจ §H[This.ContactCountry.GetName]§! น่ากังวลเป็นอย่างยิ่ง ดูเหมือนว่ายานเอเลี่ยนจะบินผ่านยานของเราในระยะประชิดอย่างน่าอึดอัดหลายครั้งโดยเปิด §Hช่องยิงอาวุธ§! ไว้ตลอดเวลา ในขณะเดียวกัน พวกเขายังได้ส่งสัญญาณภาพของปัจเจกบุคคลตนหนึ่ง—ซึ่ง [This.Owner.GetResearchers] ของเราคาดการณ์ว่าเป็นผู้นำบางประเภท—ที่ทำท่าทางด้วย [This.ContactCountry.GetSpeciesHandNamePlural] ของตนซึ่งดูค่อนข้าง §Hก้าวร้าว§! อย่างน้อยก็ในมุมมองของเรา...\n\nผู้สังเกตการณ์บางส่วนสงสัยว่าพวกเขาอาจกำลังพยายามยั่วยุให้เกิดเรื่องโดยเจตนาด้วยเหตุผลบางประการ ทว่าบางส่วนก็ชี้ว่าพวกเขายังไม่ได้ดำเนินการที่เป็นปฏิปักษ์โดยตรง และกระตุ้นเตือนไม่ให้เราด่วนสรุปก่อนที่จะทราบเจตนาของพวกเขามากกว่านี้"
 first_contact.400.desc.gestalt:0 "รายงานล่าสุดจาก [This.Leader.GetName] ซึ่งเป็น [This.Owner.GetEnvoy] ของเราที่ส่งไปสำรวจ §H[This.ContactCountry.GetName]§! น่ากังวลเป็นอย่างยิ่ง ดูเหมือนว่ายานเอเลี่ยนจะบินผ่านยานของเราในระยะประชิดอย่างน่าอึดอัดหลายครั้งโดยเปิด §Hช่องยิงอาวุธ§! ไว้ ในขณะเดียวกัน พวกเขายังได้ส่งสัญญาณภาพของปัจเจกบุคคลตนหนึ่ง ซึ่งเราทำได้เพียงเดาว่าเป็นผู้นำบางประเภท ที่ทำท่าทางแปลกๆ ด้วย [This.ContactCountry.GetSpeciesHandNamePlural] ของตนซึ่งดูเหมือนมีเจตนา §Hมุ่งร้าย§!...\n\nเราไม่แน่ใจว่าพวกเขาตั้งใจจะยั่วยุให้เกิดเรื่องหรือไม่ และหากเป็นเช่นนั้น เหตุใดจึงยังไม่มีการเคลื่อนไหวที่เป็นปฏิปักษ์อย่างชัดเจนในตอนนี้"
 first_contact.400.A:0 "เลียนแบบท่าทางทักทายส่งกลับไปหาพวกเขา"
 first_contact.400.A.tooltip:0 "เราไม่อาจคาดเดาได้ว่าพวกเขาจะตอบสนองต่อสิ่งนี้อย่างไร\n"
 first_contact.400.B:0 "เพิกเฉยพวกเขา"
 first_contact.400.B.tooltip:0 "แม้ว่านี่อาจเป็นทางเลือกที่ปลอดภัยกว่า แต่เราก็ไม่มีทางรู้แน่ชัดได้...\n"
 first_contact.405.name:0 "คู่ซ้อมมือ"
 first_contact.405.desc:0 "เดอะ§H[This.ContactCountry.GetName]§!การ ตอบ รับ การ ส่ง สัญญาณ ของ เรา มี เส้น ทาง ยาว เส้น หนึ่ง และ พร้อม ด้วย เรือ ของ พวก เขา ที่ ลาก กลับ จาก เรา ไป ยัง ระยะ ทาง ที่ ปลอด ภัย กว่า. ของเรา[This.Owner.GetLinguists]ดิ้นรนอย่างยาวนานและยากที่จะแปลหลงทางสุดท้ายขึ้นอยู่กับคํา\"§Hซ้อมได้ดี เอเลี่ยน แต่นี่มันแค่เริ่มต้น§!\"การตอบสนองของ §H[This.ContactCountry.GetName]§! ต่อสัญญาณของเรามีความยาวเพียงบรรทัดเดียว และมาพร้อมกับการที่ยานของพวกเขาล่าถอยออกห่างจากยานเราไปยังระยะที่ปลอดภัยกว่า [This.Owner.GetLinguists] ของเราต้องดิ้นรนอยู่นานเพื่อแปลสาส์นฉบับนี้ จนกระทั่งสุดท้ายก็ได้ข้อสรุปในคำแปลว่า "
 first_contact.405.A:0 "เราจะเตรียมพร้อมรับมือพวกเขา"
 first_contact.405.A.pacifist:0 "นี่แหละคืออันตรายของการแสดงความก้าวร้าว..."
 first_contact.406.name:0 "การแสดงความกล้าหาญ"
 first_contact.406.desc:1 "เดอะ§H[This.ContactCountry.GetName]§!ตอบสนองต่อการส่งผ่านของเรามีการพลาดยาวซึ่งเอาของเรา[This.Owner.GetLinguists]มีเวลาแปลบ้าง เมื่อความเข้าใจของเราในภาษาของมนุษย์ต่างดาวเพิ่มขึ้น มันกลายเป็นที่ชัดเจนว่า§H[This.ContactCountry.GetSpeciesNamePlural]§!(ดังที่เราทราบว่าพวกเขาถูกเรียกมาอย่างถูกต้อง) ส่งผลให้เรารู้สึกชื่นชม\"§Hการแสดงออกที่มีเกียรติ§!\"§H[This.ContactCountry.GetName]§! ตอบสนองต่อสัญญาณของเราด้วยสารที่ยาวเหยียด ซึ่งต้องใช้เวลาพอสมควรสำหรับ [This.Owner.GetLinguists] ของเราในการแปล เมื่อความเข้าใจในภาษาของเอเลี่ยนมีมากขึ้น ก็เป็นที่ชัดเจนว่า §H[This.ContactCountry.GetSpeciesNamePlural]§! (ซึ่งเป็นชื่อเรียกอย่างเป็นทางการที่เราเพิ่งทราบในตอนนี้) ได้ส่งคำชื่นชมอย่างสละสลวยต่อความมี "
 first_contact.406.A:0 "จุดเริ่มต้นของมิตรภาพอันงดงาม..."
 first_contact.406.A.xenophobe:0 "ขอแค่พวกเขาปล่อยเราไว้ตามลำพังก็พอ..."
 first_contact.406.A.homicidal_or_peaceful:0 "นั่นไม่ใช่เจตนาของเราเลย..."
 first_contact.410.name:0 "ภาพลักษณ์ของความขลาดเขลา"
 first_contact.410.desc.base:0 "หลังจากนั้นไม่นาน ความกระตือรือร้นในการแสดงออกของยาน §H[This.ContactCountry.GetName]§! ก็ลดลง เมื่อเวลาผ่านไป [This.Owner.GetLinguists] ของเรามีความเข้าใจสัญญาณของพวกเขาดียิ่งขึ้น จนในที่สุดก็สามารถระบุได้ว่าพวกเขาคือ §H[This.ContactCountry.GetRealName]§! และนำเสนอการตีความพฤติกรรมแปลกๆ ของพวกเขาได้"
 first_contact.410.desc:0 "$first_contact.410.desc.base$\n\nมันกลายเป็นว่า[This.ContactCountry.GetSpeciesNamePlural]คือ§Hเหมือนสงคราม§!สายพันธุ์ที่มีคุณค่าเหนือสิ่งอื่นใด สิ่งที่พวกเขาเรียกว่า\"วิญญาณวาริเออร์\"$first_contact.410.desc.base$\n\nปรากฏว่า [This.ContactCountry.GetSpeciesNamePlural] เป็นเผ่าพันธุ์ที่ §Hรักการทำสงคราม§! ซึ่งให้ความสำคัญเหนือสิ่งอื่นใดกับสิ่งที่พวกเขาเรียกว่า "
 first_contact.410.A.mil:0 "แบบนี้ไม่ได้การแล้ว!"
 first_contact.410.A.other:0 "มันไม่ได้สำคัญอะไร"
 first_contact.411.name:0 "การแสดงความมีสติสัมปชัญญะ"
 first_contact.411.desc:0 "$first_contact.410.desc.base$\n\nมันกลายเป็นว่า[This.ContactCountry.GetSpeciesNamePlural]คือ§Hเหมือนสงคราม§!สายพันธุ์ที่มีคุณค่าเหนือสิ่งอื่นใด สิ่งที่พวกเขาเรียกว่า\"วิญญาณวาริเออร์\"$first_contact.410.desc.base$\n\nปรากฏว่า [This.ContactCountry.GetSpeciesNamePlural] เป็นเผ่าพันธุ์ที่ §Hรักการทำสงคราม§! ซึ่งให้ความสำคัญเหนือสิ่งอื่นใดกับสิ่งที่พวกเขาเรียกว่า "
 first_contact.411.A:0 "ดีมาก เปิดหน้าจอการติดต่อสื่อสารเลย!"
 first_contact.411.A.homicidal:0 "พวกโง่เขลา พวกเขาจะไม่มีวันรอดพ้นเงื้อมมือเรา!"

 first_contact.415.name:0 "ปัญหาเรื่องความถี่"
 first_contact.415.desc:0 "การอ่านค่าสัญญาณเริ่มต้นของ §H[This.ContactCountry.GetName]§! ทำให้ [This.Owner.GetEnvoy] [This.Leader.GetName] สับสนอย่างยิ่ง สัญญาณเหล่านั้นดูเหมือนจะมีเพียง §Hคลื่นรบกวน(เสียงสีขาว)§! เป็นหลัก โดยไม่มีสิ่งใดที่ตรวจจับได้ว่าเป็นภาษาเลย ในช่วงแรกมีความแคลงใจด้วยซ้ำว่าเรากำลังเผชิญหน้ากับเสียงพูดของสิ่งมีชีวิตที่มีสติปัญญาหรือไม่ แม้ว่าจะมีหลักฐานทางสายตาชี้ให้เห็นถึงการใช้เทคโนโลยีก็ตาม\n\nมันเป็นเฉพาะตอนที่[This.Owner.GetResearchers]ทําการทดลองกับเครื่องราชอิสริยาภรณ์ของเราที่จะตรวจจับเสียงได้ดี นอกช่วงปกติความถี่ของ[This.Owner.GetSpeciesEarNamePlural]มี การ ตรวจ พบ รูป แบบ ของ ภาษา. แต่น่าเสียดายที่ท่านี้มาก§Hความท้าทาย§!สําหรับภารกิจของเราที่จะมาเข้าใจพวกเขา เนื่องจากเราจะไม่สามารถที่จะได้ยินพวกเขาทั้งหมด"
 first_contact.415.A:0 "เราต้องพยายามอดทนต่อไป"
 first_contact.415.A.tooltip:0 "การดำเนินการนี้อาจใช้เวลาสักครู่...\n"
 first_contact.415.B:0 "การอัดฉีดงบประมาณสนับสนุนเพิ่มเติมคงจะช่วยได้ใช่ไหม?"
 first_contact.420.name:0 "ถอดรหัส [This.ContactCountry.GetName] สำเร็จ"
 first_contact.420.desc:0 "แม้ ว่า ได้ พิสูจน์ ว่า เป็น การ ท้าทาย มาก มาย แต่ เรา ก็ ได้ จัด การ เพื่อ ไข ความ หมาย ของ การ สื่อ ความ ที่ ใช้ โดย§H[This.ContactCountry.GetName]§!พอที่จะติดต่อเบื้องต้นได้ ดูเหมือนว่าพวกเขาจะเรียกตัวเองว่า§H[This.ContactCountry.GetRealName]§!ไม่ อาจ เลี่ยง ได้ ว่า การ สื่อ ความ จะ เกิด ขึ้น ได้ ก็ ต่อ เมื่อ ระบบ สื่อสาร ปรับ ให้ เข้า กับ ภาษา ของ เขา โดย เฉพาะ.\n\nนี้จะดูเหมือนเป็นปัญหาสําหรับความหวังของการพูดคุยกับพวกเขาคล่อง แต่ของเรา[This.Owner.GetResearchers]เห็นว่ามันแตกต่างกัน ด้วยความสําเร็จของพวกเขา และยังคงได้รับผลประโยชน์จาก เงินทุนพิเศษที่เราจัดหาให้ พวกเขาได้วาดข้อเสนอ พวกเขาเชื่อว่า โดยการปรับปรุงซอฟต์แวร์ที่ใช้ที่นี่ พวกเขาจะสามารถสร้างสิ่งที่พวกเขาเรียกว่า§H\"นักแปลอนิพนธ์\"§!ซึ่งถ้าให้ข้อมูลเพียงพอ ก็จะสามารถแนะนําการแปลได้ทันที สําหรับวลีที่พูดในภาษาใด ๆ"
 first_contact.420.A:0 "โอกาสในการสื่อสารอย่างไร้ขีดจำกัดอยู่ใกล้แค่เอื้อมแล้ว!"
 UNIVERSAL_TRANSLATOR_PROJECT:0 "เครื่องแปลภาษาสากล"
 UNIVERSAL_TRANSLATOR_PROJECT_DESC:0 "นักวิจัยของเราให้คำมั่นว่าการพบกันเมื่อเร็วๆ นี้กับ [contacted_hummers.GetSpeciesNamePlural] ช่วยให้พวกเขาเริ่มต้นพัฒนาระบบแปลภาษาที่สามารถแปลภาษาใดๆ ก็ตามมาเป็นภาษาของเราได้ในทันที แม้ว่าพวกเขาอาจจะทำไม่ได้ถึงขั้นนั้นทั้งหมด แต่เราก็หวังว่าพวกเขาจะสามารถยกระดับระบบการสื่อสารของเราได้อย่างมีนัยสำคัญ"
 first_contact.422.name:0 "$UNIVERSAL_TRANSLATOR_PROJECT$"
 first_contact.422.desc:0 "การออกเสียงของสิ่งที่เรียกว่า\"นักแปลอนิพนธ์\"การสร้างต้นแบบของสิ่งที่เรียกว่า "
 first_contact.422.A:0 "สิ่งนี้จะมีประโยชน์อย่างแน่นอน"
 first_contact.425.name:0 "$first_contact.420.name$"
 first_contact.425.desc:0 "แม้ว่ามันจะเป็นความท้าทายอย่างยิ่งยวด แต่เราก็สามารถถอดรหัสรูปแบบการสื่อสารที่ใช้โดย §H[This.ContactCountry.GetName]§! ได้เพียงพอสำหรับสร้างการติดต่อขั้นต้น ดูเหมือนว่าพวกเขาจะเรียกตัวเองว่า §H[This.ContactCountry.GetRealName]§! ซึ่งการสื่อสารจะสามารถเกิดขึ้นได้ด้วยความช่วยเหลือจากระบบสื่อสารที่ปรับแต่งให้เข้ากับภาษา [This.ContactCountry.Species.GetAdj] โดยเฉพาะเท่านั้น—ซึ่งค่อนข้างเป็นอุปสรรคต่อการสนทนาอย่างคล่องแคล่ว..."

 first_contact.430.name:0 "การแสดงคลื่นแสง"
 first_contact.430.desc:0 "ยิ่งเราได้เรียนรู้เกี่ยวกับ [This.ContactCountry.GetName] มากเท่าใด [This.Owner.GetResearchers] ของเราก็ยิ่งงุนงงมากขึ้นเท่านั้น แม้ว่าพวกเขาจะเป็นสิ่งมีชีวิตที่มีสติปัญญาอย่างเห็นได้ชัด แต่สัญญาณส่งผ่านของพวกเขากลับไม่เหมือนกับสิ่งที่เราเคยพบเห็นมาก่อน แทนที่จะเป็นสัญญาณเสียงหรือข้อความอักษร สิ่งที่เราได้รับกลับเป็นการแสดงแสงสีอันเจิดจ้า—ซึ่งสร้างขึ้นจากร่างกายของพวกเขาหรือในแบบดิจิทัล—ซึ่งแผ่ขยายออกไปไกลกว่าช่วงสเปกตรัมแสงที่ [This.Owner.GetSpeciesNamePlural] สามารถมองเห็นได้ด้วยตาเปล่า เป็นที่แน่ชัดว่าการพยายามทำความเข้าใจพวกเขาจะเป็นความท้าทายครั้งใหญ่"
 first_contact.430.A:0 "$first_contact.415.A$"
 first_contact.430.B:0 "$first_contact.415.B$"
 first_contact.435.name:0 "ทะลุผ่านม่านแสง"
 first_contact.435.desc:0 "$first_contact.440.desc$\n\nในระหว่างการศึกษา เราได้ค้นพบด้วยความประหลาดใจว่า รูปแบบแสงของพวกเขานั้นมีความคล้ายคลึงอย่างน่าอัศจรรย์กับกระแสน้ำวนในอวกาศระหว่างดวงดาวที่ทำให้เกิดการเดินทางผ่านไฮเปอร์เลน [This.Owner.GetResearchers] ของเรายังคงสับสนว่าความเชื่อมโยงนี้หมายถึงอะไร และเสนอให้มีการศึกษาเรื่องนี้เพิ่มเติม"
 OCTOPODES_LIGHT_PATTERNS_PROJECT:0 "รูปแบบแสง [encountered_country.GetSpeciesAdj]"
 OCTOPODES_LIGHT_PATTERNS_PROJECT_DESC:0 "ในระหว่างการพบกับ [encountered_country.GetSpeciesNamePlural] เราได้ค้นพบความคล้ายคลึงอันน่าทึ่งระหว่างรูปแบบของแสงที่พวกเขาใช้ในการสื่อสารกับกระแสน้ำวนในอวกาศระหว่างดวงดาวที่ทำให้การเดินทางผ่านไฮเปอร์เลนเป็นไปได้ การสำรวจเรื่องนี้เพิ่มเติมอาจช่วยเปิดเผยข้อมูลสำคัญเกี่ยวกับโครงสร้างพื้นฐานของกาแล็กซีได้"
 first_contact.437.name:0 "ความรู้ความเข้าใจเกี่ยวกับไฮเปอร์เลน"
 first_contact.437.desc:0 "การศึกษาของเราเกี่ยวกับความเชื่อมโยงระหว่างรูปแบบที่สังเกตพบในอวกาศระหว่างดวงดาวกับแสงหมุนวนแบบ [encountered_country.GetSpeciesAdj] ได้เผยให้เห็นผลลัพธ์ที่น่าประหลาดใจ ดูเหมือนว่ากฎเกณฑ์ที่ [encountered_country.GetSpeciesNamePlural] ใช้ในการสร้างรูปแบบแสงนั้น—โดยที่พวกเขาเองก็น่าจะไม่รู้ตัว—เป็นกฎเกณฑ์เดียวกันกับที่กระแสของไฮเปอร์เลนลอยตัวไปตามกาลเวลา เพียงแต่เป็นขนาดที่แตกต่างกันอย่างสิ้นเชิง\n\nผลก็คือ การศึกษา [encountered_country.GetSpeciesNamePlural] จะช่วยให้เราคาดการณ์การเคลื่อนที่ของไฮเปอร์เลนได้ดียิ่งขึ้น ซึ่งจะช่วยเพิ่มระยะการทำงานของเซนเซอร์ของเราได้อย่างมหาศาล"
 first_contact.437.A:1 "บัดนี้เราพร้อมที่จะเปิดรับโอกาสความเป็นไปได้ใหม่ๆ"
 first_contact.440.name:0 "ภาษาแห่งแสง"
 first_contact.440.desc:0 "ความพยายามของเราสัมฤทธิ์ผลแล้ว และตอนนี้เราสามารถเข้าใจสัญญาณแสงที่ส่งออกมาจาก [This.ContactCountry.GetName] และสื่อสารกับพวกเขาได้อย่างน้อยในระดับพื้นฐาน ดูเหมือนว่า [This.ContactCountry.GetSpeciesNamePlural] (ตามที่พวกเขาเรียกตนเอง) ไม่เคยพัฒนาภาษาพูดมาก่อนเลย แต่ใช้การแสดงแสงแทน แม้ว่าพวกเขาจะเคยใช้ภาษาเขียน แต่กลับถูกมองว่ามีความสง่างามและมีประสิทธิภาพน้อยกว่าภาษาเชิงทัศนศิลป์ของพวกเขามาก สมองของพวกเขาดูเหมือนจะได้รับการปรับตัวมาอย่างสมบูรณ์แบบเพื่อถอดความหมายจากการแสดงภาพอันซับซ้อนได้อย่างรวดเร็ว ด้วยเหตุนี้ในกรณีส่วนใหญ่พวกเขาจึงชอบการบันทึกภาพแสงมากกว่า"
 first_contact.440.A:0 "มาดูกันว่าพวกเขามีอะไรจะพูด"

 first_contact.450.name:0 "บทกวี"
 first_contact.450.desc:0 "ค่าที่อ่านได้จากสัญญาณของ §H[This.ContactCountry.GetName]§! ทำให้ [Owner.GetLinguists] ของเราตื่นเต้นเป็นอย่างยิ่ง แม้ว่าพยางค์แต่ละคำจะไม่สามารถทำความเข้าใจได้เลย แต่เสียงของพวกมันมีท่วงทำนองจังหวะจะโคนอย่างปฏิเสธไม่ได้ และยังช่วยให้รู้สึกสงบอย่างน่าประหลาด แม้ว่าเราจะยังไม่มั่นใจแน่ชัด แต่ [Owner.GetLinguists] ของเราก็เชื่อว่านี่เป็นรูปแบบหนึ่งของบทกวี พวกเขาเสนอให้เราตอบกลับในลักษณะเดียวกัน"
 first_contact.450.A:0 "แน่นอน ส่งบทสวดศึกตอบกลับไป!"
 first_contact.450.A.tooltip:0 "แฮค! ให้ธงบิน\nสําหรับตอนนี้สงครามเราขี่" #made up
 first_contact.450.B:0 "เราสามารถแบ่งปันบทกวีอันงดงามเกี่ยวกับการค้นพบได้"
 first_contact.450.B.tooltip:0 "เพื่อบากบั่น แสวงหา ค้นพบ... และไม่ยอมศิโรราบ"
 first_contact.450.C:0 "ทำให้พวกเขาประทับใจด้วยบทกวีเกี่ยวกับมิตรภาพ"
 first_contact.450.C.tooltip:0 "จะให้ข้าเปรียบเธอประดุจดั่งลมสุริยะ..."
 first_contact.450.D:0 "ส่งสิ่งที่น่าพิศวงและลึกลับไปให้พวกเขา"
 first_contact.450.D.tooltip:0 "จอลิแฟนโต แบมบลา โอ ฟลายอิ แบมบลา\nแอสครีกา m'pfa Habra Horem"
 first_contact.450.E:0 "เราไม่มีเวลาสำหรับเรื่องไร้สาระแบบนี้"
 first_contact.455.name:0 "สร้างความไม่พอใจ"
 first_contact.455.desc:0 "หลายชั่วโมงหลังจากเราแพร่สัญญาณบทสวดศึกออกไป การส่งสัญญาณจาก §H[This.ContactCountry.GetName]§! ก็เงียบหายไป ยานของพวกเขาได้ถอยไปอยู่ในตำแหน่งที่พ้นจากระยะการโจมตีที่มีประสิทธิภาพ เราสามารถคาดเดาได้ว่าพวกเขาเข้าใจสาระสำคัญของข้อความของเรา และไม่รู้สึกยินดีกับสิ่งที่ได้ยินเลย"
 first_contact.460.name:0 "การแลกเปลี่ยนบทสวดศึก"
 first_contact.460.desc:0 "ภายในไม่กี่นาทีหลังจากเราส่งสัญญาณไป สัญญาณจาก §H[This.ContactCountry.GetName]§! ก็เปลี่ยนไป แม้ว่าจังหวะจะยังคงสมบูรณ์แบบไม่ผิดเพี้ยน แต่เสียงนั้นไม่ได้ให้ความรู้สึกสงบอีกต่อไป ทว่ากลับมีท่วงทำนองที่คึกคักและน่าตื่นเต้น เหมือนกับบทสวดศึกเลยทีเดียว ไม่มีการเคลื่อนไหวที่เป็นปฏิปักษ์ใดๆ เกิดขึ้น—ดูเหมือนพวกเขาจะพึงพอใจมากกว่าที่จะถูกยั่วยุด้วยบทกวีของเรา นับตั้งแต่นั้นมาเราได้ส่งบทสวดแบบแรกฉบับดัดแปลงไปอีกหลายเวอร์ชัน และผลที่ได้คือเรากำลังรวบรวมกวีนิพนธ์สงครามของ [This.ContactCountry.GetName] ได้อย่างรวดเร็ว"
 first_contact.460.A:0 "เผ่าพันธุ์ที่มีหัวใจตรงกันกับเราจริงๆ"
 first_contact.462.name:0 "ผลสะท้อนกลับของบทสวดศึก"
 first_contact.462.desc:0 "ดูเหมือนว่า §H[This.ContactCountry.GetName]§! จะไม่พอใจกับบทสวดศึกของเราอย่างมาก การตอบสนองของพวกเขานั้นเกิดขึ้นในทันที—และรุนแรง พวกเขาเริ่มเปิดฉากยิง และยานของเราก็โชคดีที่หนีรอดออกมาได้โดยไม่ได้รับความเสียหาย ดูเหมือนว่าเราจะมีศึกต้องสู้เสียแล้ว!"
 first_contact.465.name:0 "การแลกเปลี่ยนบทกวี"
 first_contact.465.desc:0 "การตอบสนองต่อบทกวีของเราดูเหมือนจะเป็นไปอย่างกระตือรือร้น กระแสการแพร่สัญญาณยังคงดำเนินต่อไปอย่างไม่ลดละ และเรากำลังสร้างห้องสมุดผลงานประพันธ์ของ §H[This.ContactCountry.GetName]§! ขึ้นมาจำนวนมาก แม้ว่าเราจะยังไม่ได้นำความหมายมาแปลใส่ในแต่ละคำ แต่เอเลี่ยนเหล่านี้ก็พิสูจน์ให้เห็นว่าพวกเขามีความสามารถพิเศษในการปรับระดับเสียงและน้ำเสียงให้เข้ากับกวีของเรา ซึ่งสิ่งนี้จะช่วยให้ [Owner.GetLinguists] ของเราตีความพวกมันได้อย่างแน่นอน"
 first_contact.465.A:0 "ช่างเป็นมิตรน่ารักอะไรเช่นนี้"
 first_contact.470.name:0 "การหยอกเย้าเกี้ยวพาราสี"
 first_contact.470.desc:0 "หลังจากเงียบงันไปหลายนาที การส่งสัญญาณจาก §H[This.ContactCountry.GetName]§! ก็กลับมาเริ่มใหม่อีกครั้ง แม้ว่าจะยังไม่อาจเข้าใจความหมายได้ แต่ท่วงทำนองกลับแตกต่างไปอย่างชัดเจน: ท่วงทำนองที่ [Owner.GetLinguists] ของเราอธิบายว่ามีความขี้เล่นและเกือบจะเหนียมอาย สิ่งที่น่าประหลาดใจอย่างยิ่งก็คือ ดูเหมือนว่าพวกเขากำลังส่งสายตาเกี้ยวพาราสีกับเรา!"
 first_contact.470.A:0 "น่าเขินอายเสียจริง"
 first_contact.470.B:0 "การตอบรับที่สมเหตุสมผล"
 first_contact.472.desc:0 "จากนาทีกลายเป็นชั่วโมง และยังคงไม่มีการตอบสนองใดๆ จาก §H[This.ContactCountry.GetName]§! แม้ว่าพวกเขาจะไม่มีทางเข้าใจความหมายที่แท้จริงในบทกวีของเราได้ แต่ดูเหมือนพวกเขาจะรู้สึกตกตะลึงกับอารมณ์ที่แสดงออกมาในบทกวีนั้น และบัดนี้กำลังเข้าหาเราด้วยความระแวดระวังตัวมากขึ้นอย่างเห็นได้ชัด"
 first_contact.474.name:0 "เสียงสุ่มไร้ระเบียบ"
 first_contact.474.desc:0 "เดอะ§H[This.ContactCountry.GetName]§!กําลังตอบสนองในทํานองว่า เสียงร้องของจังหวะ ได้หันไปที่เสียงสุ่ม เลียนแบบเสียงของเราเอง สิ้นหวัง, ของเรา[Owner.GetLinguists]อธิบายความพยายามของเราที่จะถอดรหัสเสียงเหล่านี้เป็น\"ไร้ประโยชน์อย่างสิ้นเชิง\"§H[This.ContactCountry.GetName]§! กำลังตอบสนองกลับมาในลักษณะเดียวกัน: บทสวดที่มีจังหวะจะโคนเปลี่ยนกลายเป็นเสียงสุ่มไร้ระเบียบ เลียนแบบเสียงที่ฟังไม่รู้เรื่องของเราเอง [Owner.GetLinguists] ของเราได้อธิบายถึงความพยายามถอดรหัสเสียงเหล่านี้อย่างท้อแท้ใจว่ามันเป็น "
 first_contact.474.A:0 "สิ่งนี้จะทำให้เราล้าหลังไปอีกขั้น"
 first_contact.475.name:0 "การปะทะสิ้นสุดลง"
 first_contact.475.desc:0 "เมื่อเราเข้าใจกันและกัน การต่อสู้กับ[This.ContactCountry.GetName]- หรือไม่ก็§H[This.ContactCountry.GetRealName]§!- หยุดแล้ว ทั้ง ๆ ที่ ก้าวร้าว พวก เขา ดู เหมือน จะ ถือ ว่า เรา เป็น คน ก้าวร้าว\"นักรบผู้มีเกียรติ\"เมื่อเราเริ่มมีความเข้าใจซึ่งกันและกัน การปะทะกับ [This.ContactCountry.GetName]—หรือจะกล่าวให้ถูกคือ §H[This.ContactCountry.GetRealName]§!—ก็ได้ยุติลง แม้ว่าพวกเขาจะเคยแสดงความก้าวร้าวมาก่อน แต่พวกเขาก็ดูเหมือนจะถือว่าเราเป็น "
 first_contact.475.A:0 "การแลกเปลี่ยนที่น่าพิศวง"
 first_contact.480.name:0 "ถอดความหมายบทกวีสำเร็จ"
 first_contact.480.desc:0 "ความพยายามของเราสัมฤทธิ์ผลแล้ว ทำให้เราสามารถแปลสารที่ส่งมาจาก [This.ContactCountry.GetName] ซึ่งตอนนี้เรารู้แล้วว่าคือ §H[This.ContactCountry.GetRealName]§! จากสไตล์การประพันธ์ของพวกเขา ชี้ว่าพวกเขาให้ความสำคัญกับศิลปะกวีนิพนธ์เป็นอย่างมาก การมีส่วนร่วมในการแลกเปลี่ยนบทกวีในครั้งนี้ทำให้เราไม่เพียงแต่ได้รับคำชื่นชมจากพวกเขาเท่านั้น แต่ยังทำให้เราได้เรียนรู้เกี่ยวกับพวกเขาอย่างลึกซึ้งในระหว่างกระบวนการนี้ด้วย"
 first_contact.485.name:0 "ถอดรหัสปริศนาสำเร็จ"
 first_contact.485.desc:0 "หลังจากกระบวนการติดต่อครั้งแรกที่ยาวนานและยากลำบาก ในที่สุด [Owner.GetLinguists] ของเราก็สามารถระบุตัวตนของ [This.ContactCountry.GetName] ได้ว่าคือ §H[This.ContactCountry.GetRealName]§! พวกเขาแสดงความยินดีกับเราที่สามารถไขปริศนาทางภาษาของพวกเขาได้สำเร็จ แม้ว่าจะดูมีท่าทางหงุดหงิดเล็กน้อยที่มันใช้เวลาค่อนข้างนาน อย่างน้อยที่สุด [Owner.GetLinguists] ของเราก็สามารถบุกเบิกวิธีการตรวจจับรูปแบบใหม่ๆ ได้หลายวิธี ซึ่งจะมีประโยชน์อย่างยิ่งต่ออารยธรรมของเราในอนาคต"
 first_contact.485.A:0 "โล่งอกไปที"
 first_contact.490.name:0 "แปลคำเยินยอสำเร็จ"
 first_contact.490.desc:0 "ความพยายามของเราได้จ่ายออกไปและตอนนี้เราสามารถตีความข้อมูลที่ถูกส่งมาโดย[This.ContactCountry.GetName]ซึ่งตอนนี้เรารู้ว่าเป็น§H[This.ContactCountry.GetRealName]§!:\n\n\"อ้าศิลปะที่ดีของการประจบสอพลอ มันดีจริงๆที่ได้พบสิ่งมีชีวิตอื่น ๆ ที่ชื่นชมบทกวี และโดยเฉพาะอย่างใดอย่างหนึ่งที่ สวยงามและน่ารักเช่นเดียวกับคุณหวานใจของฉัน[Owner.GetSpeciesName]- อวยพรให้[Owner.GetSpeciesOrganName].\"\n\nข่าวสาร ยัง คง มี ความ ยาว อยู่ บ้าง ใน ทํานอง เดียว กัน. เรา ไม่ แน่ ใจ เลย ว่า จะ เป็น คน ป้อ ยอ หรือ ไม่ แต่ ดู เหมือน ว่า ความ สัมพันธ์ ของ เรา เริ่ม ต้น อย่าง ดี." #the funnier versions of GetSpeciesOrganName are 100% intended
 first_contact.490.A:0 "ช่างแสนดีกับเราจริงๆ"

 first_contact.500.name:0 "การเปิดฉากโจมตีเมื่อแรกพบ"
 first_contact.500.desc:0 "เห็นได้ชัดว่าการตอบสนองของเราไม่เหมาะสม: การตอบสนองของ §Y[contact_country.GetName]§! เกิดขึ้นในทันทีและเต็มไปด้วยเจตนาร้าย โดยพวกเขาเริ่มเปิดฉากยิงใส่ยานรบของเรา ดูเหมือนว่าเราจะมีศึกมาจ่อตรงหน้าให้ต้องจัดการเสียแล้ว!"
 first_contact.500.A:0 "เตรียมอาวุธ!"
 first_contact.500.A.tooltip:0 "ตอนนี้ §Y[contact_country.GetName]§! มีท่าทีเป็นปฏิปักษ์ต่อเราแล้ว"
 first_contact.505.desc:0 "ไม่แน่ชัดว่าเกิดข้อผิดพลาดตรงจุดใด แต่จู่ๆ §Y[contact_country.GetName]§! ก็เปิดฉากโจมตีเรา! ดูเหมือนว่าเราจะมีศึกมาจ่อตรงหน้าให้ต้องจัดการเสียแล้ว!"

 #Random events
 first_contact.5000.name:1 "พบสัญญาณที่ชัดเจน"
 first_contact.5000.desc:2 "เซนเซอร์ของเราตรวจพบสัญญาณซ้ำๆ ที่ชัดเจนเป็นพิเศษจาก §H[This.ContactCountry.GetName]§! ซึ่งดูเหมือนว่าจะมอบข้อมูลชั้นยอดให้แก่ [This.Owner.GetLinguists] ของเราสำหรับการจัดระเบียบโครงสร้างภาษาของพวกเขา พวกเขาคาดการณ์ในแง่ดีว่าเราจะสามารถสร้างความก้าวหน้าครั้งสำคัญจากความโชคดีในครั้งนี้ได้"
 first_contact.5000.desc2:0 "เราสามารถดักจับสัญญาณเสียงคุยที่ชัดเจนระหว่างยานรบของ §H[This.ContactCountry.GetName]§! หลายลำ แม้ว่า [This.Owner.GetLinguists] ของเราจะยังไม่มีความรู้ความเข้าใจเกี่ยวกับความหมายของคำต่างๆ ที่พวกเขกำลังบันทึกไว้ได้เลยก็ตาม แต่พวกเขาก็หวังว่าสัญญาณใหม่นี้จะช่วยให้พวกเขาเกิดความก้าวหน้าอย่างมากไปสู่การถอดรหัสที่สำเร็จ"
 first_contact.5005.name:1 "การขาดหายไปของสัญญาณ"
 first_contact.5005.desc:2 "[This.Owner.GetLinguists] ของเราเริ่มรู้สึกท้อแท้ใจมากขึ้นเรื่อยๆ จากความล้มเหลวในการจัดหาข้อมูลสนับสนุนให้เพียงพอเพื่อความก้าวหน้าในการถอดรหัสภาษาที่ใช้โดย §H[This.ContactCountry.GetName]§! ดูเหมือนว่าเอเลี่ยนกลุ่มนี้กำลังทำทุกวิถีทางเพื่อป้องกันไม่ให้สัญญาณของพวกเขาถูกรับฟังโดย [This.Owner.GetSpeciesEarNamePlural] อื่นที่ไม่พึงประสงค์!"
 first_contact.5005.A:0 "พยายามต่อไป!"
 first_contact.5010.name:0 "การระบุระบุตัวตนผิดพลาด"
 first_contact.5010.desc:0 "ดูเหมือนว่า [This.Owner.GetLinguists] ของเราจะประสบกับอุปสรรคครั้งใหญ่ (§Hล้มเหลว§!) ในความพยายามที่จะจัดระเบียบโครงสร้างภาษาของ §H[This.ContactCountry.GetName]§! แต่น่าเสียดายที่สิ่งที่พวกเขาเข้าใจว่าเป็นภาษานั้น แท้จริงแล้วไม่ใช่ภาษาเลย ในรายงานของ [This.Leader.GetHerHis] ทาง [This.Owner.GetEnvoyCap] [This.Leader.GetName] ระบุว่า หลังจากที่ได้ทำการตรวจสอบเรื่องนี้จากทุกมุมมองมาเป็นเวลาหลายวัน ในที่สุดกลุ่มนักภาษาศาสตร์ก็สรุปได้ว่ามันน่าจะเป็นความพยายามในการสร้างสรรค์เสียงดนตรีเสียมากกว่า..."
 first_contact.5010.A:0 "ข้อผิดพลาดที่น่าเสียใจยิ่ง"
 first_contact.5015.name:0 "[This.ContactCountry.GetName] สแกน [This.Owner.Capital.GetName]"
 first_contact.5015.desc:0 "เรื่องที่สร้างความตกตะลึงอย่างใหญ่หลวงต่อ [This.Owner.GetSpeciesNamePlural] จำนวนมาก นั่นคือปรากฏว่ามียานรบของ §H[This.ContactCountry.GetName]§! ได้ทำการสแกน §H[This.Owner.Capital.GetName]§! ความคิดเห็นถูกแบ่งออกเป็นสองฝ่าย ฝ่ายหนึ่งเห็นว่าเราควรมองความตื่นตระหนกนี้เป็นโอกาสในการเร่งสร้างสายสัมพันธ์ที่ใกล้ชิดขึ้นกับอารยธรรมเอเลี่ยน หรืออีกฝ่ายหนึ่งมองว่านี่เป็นคำเตือนและเราต้องเร่งจัดแจงกองยานรบของเราให้อยู่ในสภาพที่พร้อมรบ ตั้งแต่ตอนนี้ ก่อนที่ทุกอย่างจะสายเกินแก้"
 first_contact.5015.desc.xenophile:0 "เรื่องที่สร้างความประหลาดใจน่ายินดีต่อ [This.Owner.GetSpeciesNamePlural] จำนวนมาก ปรากฏว่ามียานรบของ [This.ContactCountry.GetName] ได้ทำการสแกน §H[This.Owner.Capital.GetName]§! แม้ว่าบางส่วนจะกังวลว่าเอเลี่ยนเหล่านี้อาจจะไม่ต้อนรับเราเหมือนอย่างที่เรายินดีต้อนรับพวกเขาก็ตาม แต่มติส่วนใหญ่เห็นพ้องต้องกันแล้วว่าเราควรตอบสนองต่อเหตุการณ์นี้ด้วยการเพิ่มความพยายามเป็นสองเท่าในการสร้างสายสัมพันธ์ที่ใกล้ชิดขึ้นกับอารยธรรมอื่นๆ ในกาแล็กซี"
 first_contact.5015.desc.xenophobe:0 "เรื่องที่สร้างความตกตะลึงอย่างใหญ่หลวงต่อ [This.Owner.GetSpeciesNamePlural] จำนวนมาก นั่นคือปรากฏว่ามียานรบของ §H[This.ContactCountry.GetName]§! ได้ทำการสแกน §H[This.Owner.Capital.GetName]§! ความเห็นส่วนใหญ่เห็นพ้องต้องกันอย่างกว้างขวางว่าเราควรตอบโต้การล่วงล้ำในครั้งนี้ด้วยการจัดระเบียบกองยานรบของเราด้วยความเร่งรีบที่สุด ก่อนที่จะสายเกินแก้"
 first_contact.5015.desc.gestalt:0 "ในการพัฒนาที่น่ากังวล ดูเหมือนว่ามียานรบของ §H[This.ContactCountry.GetName]§! ได้ทำการสแกน §H[This.Owner.Capital.GetName]§! เราไม่แน่ใจว่าจะตอบสนองต่อเรื่องนี้อย่างไรดี: เราควรเลือกที่จะทุ่มความสำคัญเป็นสองเท่าไปกับการอยู่ร่วมกันอย่างสันติและเป็นมิตรกับอารยธรรมเอเลี่ยน หรือเราควรคำนึงถึงเรื่องนี้ในฐานะคำเตือนและเพิ่มขนาดของกองทัพเรือของเราเผื่อจำเป็นต้องเผชิญหน้าอย่างรุนแรงในอนาคต?"
 first_contact.5015.desc.gestalt.homicidal:0 "ในการพัฒนาที่น่ากังวล ดูเหมือนว่ามียานรบของ §H[This.ContactCountry.GetName]§! ได้ทำการสแกน §H[This.Owner.Capital.GetName]§! เราควรเพิ่มขนาดกองทัพเรือของเราเพื่อที่ว่าเราจะได้ลงมือจัดการสั่งสอนเอเลี่ยนเหล่านี้ให้อยู่ในที่ทางที่เหมาะสมเสียที"
 first_contact.5015.A:0 "เราต้องเตรียมความพร้อม"
 first_contact.5015.B:0 "...เพื่อมิตรภาพ"
 first_contact.5020.name:0 "ค้นพบเมืองหลวงของ [This.ContactCountry.GetName]"
 first_contact.5020.desc:0 "เราได้ระบุแล้วว่าอาณานิคมที่เราเพิ่งทำการสแกนในระบบดาว §H[This.ContactCountry.Capital.System.GetName]§! นั้น เป็นเมืองหลวงของ §H[This.ContactCountry.GetName]§! [This.Owner.GetResearchers] ของเราพบเบาะแสอันมีค่าเกี่ยวกับพวกเขามากมายจากการสืบค้นข้อมูลที่เก็บรวบรวมได้จากการสแกนในครั้งนี้"
 first_contact.5025.name:0 "เบาะแสขาดหาย"
 first_contact.5025.desc:0 "เราไม่พบร่องรอยหรือสัญญาณของ §H[This.ContactCountry.GetName]§! มาสักระยะหนึ่งแล้ว [This.Owner.GetResearchers] ของเราพบว่าพวกเขามีข้อมูลจำกัดเกินไปที่จะดำเนินเรื่องต่อ และกังวลว่าร่องรอยหลักฐานอาจจะเงียบหายไปเสียแล้ว"
 first_contact.5025.A:0 "ค้นหาต่อไป!"
 first_contact.5030.name:0 "ความเปรมปรีดิ์ในสิ่งเร้นลับ"
 first_contact.5030.desc:0 "เมื่อเราเริ่มได้รับภาพจริงของเอเลี่ยนที่รู้จักกันในนาม §H[This.ContactCountry.GetName]§! มากขึ้นเรื่อยๆ จึงเลี่ยงไม่ได้ที่จะต้องมีหลุดออกไปสู่สาธารณชนเป็นวงกว้างในท้ายที่สุด รูปลักษณ์ของพวกเขาได้รับการพิสูจน์แล้วว่าสร้างความพึงพอใจให้กับสาธารณชน [This.Owner.GetAdj] ซึ่งในเวลานี้อดใจไม่ไหวที่จะผูกมิตรอย่างใกล้ชิดขึ้นกับเอเลี่ยนพวกนี้"
 first_contact.5030.desc.machine:0 "เมื่อเราเริ่มได้รับภาพจริงของเอเลี่ยนที่รู้จักกันในนาม §H[This.ContactCountry.GetName]§! มากขึ้นเรื่อยๆ ก็เผยให้เห็นอย่างชัดเจนว่าเรากำลังเจอกับสังคมหุ่นยนต์ มันเป็นเรื่องของเวลาเท่านั้นก่อนที่ข้อมูลนี้จะหลุดออกไปสู่สาธารณชนในวงกว้าง การเปิดเผยนี้ก่อให้เกิดความประหลาดใจท่ามกลางสาธารณชน [This.Owner.GetAdj] ผู้ซึ่งอัศจรรย์ใจที่เครื่องจักรสามารถสร้างอารยธรรมท่องอวกาศของตนเองขึ้นมาได้ และอดใจรอไม่ไหวแล้วที่จะได้ทำความคุ้นเคยกับพวกเขาให้ใกล้ชิดยิ่งขึ้น"
 first_contact.5030.A:0 "$first_contact.5035.A$"
 first_contact.5030.A.tooltip:0 "ความคิดเห็นของเราต่อ §H[This.ContactCountry.GetName]§! ปรับปรุงดีขึ้น"
 first_contact.5035.name:0 "ภาพอันน่าสะพรึงกลัวที่ประจักษ์แก่สายตา"
 first_contact.5035.desc:0 "ในขณะที่เราเริ่มที่จะได้รับภาพมากขึ้นและมากขึ้นของมนุษย์ต่างดาวที่รู้จักกันเป็น§H[This.ContactCountry.GetName]§!มันหลีกเลี่ยงไม่ได้ที่ในที่สุดเหล่านี้ จะรั่วไหลออกไปสู่สาธารณชนที่กว้างขึ้น การ ปรากฏ ตัว ของ พวก เขา ก่อ ให้ เกิด ความ หวาด กลัว อย่าง แพร่ หลาย ท่ามกลาง ประชาชน ของ เรา ผู้ ซึ่ง พรรณนา พวก เขา ว่า§H§!การขับไล่[This.ContactCountry.GetSpeciesNamePluralInsult]\"§!. มีหลายคนกําลังเรียกร้องให้เราดําเนินการ เพื่อจัดการกับ \"[This.ContactCountry.GetSpeciesClass]ข่มขู่เมื่อเราเริ่มได้รับภาพจำลองของสิ่งมีชีวิตต่างดาวที่รู้จักกันในชื่อ §H[This.ContactCountry.GetName]§! มากขึ้นเรื่อย ๆ จึงหลีกเลี่ยงไม่ได้ที่ภาพเหล่านี้จะรั่วไหลออกสู่สาธารณชนในที่สุด รูปลักษณ์ของพวกมันสร้างความหวั่นวิตกไปทั่วในหมู่ประชากรของเรา ซึ่งต่างพากันอธิบายถึงพวกมันว่า §H"
 first_contact.5035.desc.machine:0 "ในขณะที่เราเริ่มที่จะได้รับภาพมากขึ้นและมากขึ้นของมนุษย์ต่างดาวที่รู้จักกันเป็น[This.ContactCountry.GetName]เราไม่สามารถปฏิเสธมันได้อีกต่อไป เรากําลังรับมือกับสังคมของหุ่นยนต์ มันเป็นเพียงเรื่องของเวลาก่อนที่ความรู้นี้ จะรั่วไหลออกไปสู่สาธารณชนที่กว้างขึ้น การ เปิด เผย ได้ ปลุก เร้า ความ หวาด กลัว อย่าง แพร่ หลาย ท่ามกลาง ประชาชน ของ เรา ผู้ ซึ่ง ได้ พรรณนา สิ่ง เหล่า นั้น ว่า เป็น§H§!การขับไล่[This.ContactCountry.GetSpeciesNamePluralInsult]\"§!มีหลายคนกําลังเรียกร้องให้เราดําเนินการ เพื่อจัดการกับ \"ภัยคุกคามทางวิศวกรรม\"ใหม่เมื่อเราเริ่มได้รับภาพจำลองของสิ่งมีชีวิตต่างดาวที่รู้จักกันในชื่อ [This.ContactCountry.GetName] มากขึ้นเรื่อย ๆ เราก็ไม่สามารถปฏิเสธมันได้อีกต่อไป: เรากำลังรับมือกับสังคมของหุ่นยนต์ มันเป็นเพียงเรื่องของเวลาก่อนที่ความรู้นี้จะรั่วไหลออกสู่สาธารณชนในที่สุด การเปิดเผยนี้สร้างความตื่นตระหนกไปทั่วในหมู่ประชากรของเรา ซึ่งต่างพากันอธิบายถึงพวกมันว่า §H"
 first_contact.5035.A:0 "และเราจะทำเช่นนั้น"
 first_contact.5035.B:0 "พวกคงไม่แย่ขนาดนั้นหรอก แน่นอน"
 first_contact.5040.name:0 "สัญญาณที่น่าสับสน"
 first_contact.5040.desc:0 "[This.Owner.GetResearchers] ของเรามีความคืบหน้าอย่างต่อเนื่องในการรวบรวมสัญญาณจำนวนมากจาก §H[This.ContactCountry.GetName]§! อย่างไรก็ตาม เมื่อความรู้เรื่องภาษาของพวกเขาเพิ่มพูนขึ้น [This.Owner.GetLinguists] ของเรากลับยิ่งสับสนมากขึ้น ดูเหมือนว่าพวกเขาต้องประเมินการแปลคร่าว ๆ ก่อนหน้านี้ใหม่หลายต่อหลายครั้ง หลังจากพบว่าความหมายที่พวกเขาเคยกำหนดให้กับคำเหล่านั้น แท้จริงแล้ว §Hคลาดเคลื่อนอย่างร้ายแรง§! ดูเหมือนว่ามุมมองโดยรวมของ [This.ContactCountry.GetName] จะแตกต่างจากของเราอย่างสิ้นเชิง - มากเกินกว่าที่เราจะจินตนาการได้ด้วยซ้ำ!"
 first_contact.5040.desc.gestalt:0 "แม้ว่าเราจะมีความคืบหน้าอย่างต่อเนื่องในการรวบรวมสัญญาณจำนวนมากจาก §H[This.ContactCountry.GetName]§! แต่ความคืบหน้าในการทำความเข้าใจสัญญาณเหล่านี้อย่างแท้จริงกลับ... ต่ำกว่าที่คาดหวังไว้ [This.Owner.GetLinguists] ของเราถูกบีบให้ต้องประเมินการแปลคร่าว ๆ ก่อนหน้านี้ใหม่หลายครั้งแล้ว หลังจากพบว่าความหมายที่พวกเขากำหนดให้คำเหล่านั้น แท้จริงแล้ว §Hคลาดเคลื่อนอย่างร้ายแรง§!"
 first_contact.5040.desc.hive:0 "$first_contact.5040.desc.gestalt$ ดูเหมือนว่ารูปแบบความคิดของ [This.ContactCountry.GetName] จะแตกต่างจากของเราอย่างมาก - มากเกินกว่าที่เราคาดคิดว่าจะเป็นไปได้ แม้กระทั่งในหมู่สิ่งมีชีวิตต่างดาวด้วยกันเอง!"
 first_contact.5040.desc.machine:0 "$first_contact.5040.desc.gestalt$ ดูเหมือนว่า [This.ContactCountry.GetName] จะไม่ได้ใช้ตรรกะการทำงานบนพื้นฐานของเหตุผลใด ๆ ที่เรารู้จัก สิ่งนี้จะทำให้การทำความเข้าใจพวกเขากลายเป็นความท้าทายที่ยากลำบากอย่างยิ่ง!"
 first_contact.5040.A:0 "ในที่สุดมันก็จะชัดเจนเอง"
 first_contact.5045.name:0 "การแปลอย่างรวดเร็ว"
 first_contact.5045.desc:0 "เมื่อเราได้รวบรวมข้อมูลเกี่ยวกับ §H[This.ContactCountry.GetName]§! มากขึ้น [This.Owner.GetLinguists] ของเราต่างรู้สึกประหลาดใจกับความก้าวหน้าอย่างรวดเร็ว ดูเหมือนว่า - หากพวกเขาคาดการณ์ถูกต้อง - สิ่งมีชีวิตต่างดาวเหล่านี้มีมุมมองต่อโลกและกาแล็กซีโดยรวมที่คล้ายคลึงกับเราเป็นอย่างมาก"
 first_contact.5045.desc.hive:0 "เมื่อเราได้รวบรวมข้อมูลเกี่ยวกับ §H[This.ContactCountry.GetName]§! มากขึ้น [This.Owner.GetLinguists] ของเราต่างรู้สึกประหลาดใจกับความก้าวหน้าอย่างรวดเร็ว ดูเหมือนว่า - หากพวกเขาคาดการณ์ถูกต้อง - สิ่งมีชีวิตต่างดาวเหล่านี้มีรูปแบบความคิดที่คล้ายคลึงกับเราอย่างมาก บางทีจิตสำนึกของพวกเขาอาจจะเหมือนกับ [This.Owner.GetGovernmentName] ของเราเองอย่างนั้นหรือ?"
 first_contact.5045.desc.machine:0 "เมื่อเราได้รวบรวมข้อมูลเกี่ยวกับ §H[This.ContactCountry.GetName]§! มากขึ้น [This.Owner.GetLinguists] ของเราต่างรู้สึกประหลาดใจกับความก้าวหน้าอย่างรวดเร็ว ดูเหมือนว่า - หากพวกเขาคาดการณ์ถูกต้อง - สิ่งมีชีวิตต่างดาวเหล่านี้มีตรรกะการทำงานที่คล้ายคลึงกับเราอย่างมาก บางที AI ที่คล้ายกับ [This.Owner.GetGovernmentName] ของเราอาจอยู่เบื้องหลังสัญญาณเหล่านี้?"
 first_contact.5045.A:0 "นี่ถือเป็นลางดีสำหรับความสัมพันธ์ในอนาคตของเรากับพวกเขา"
 first_contact.5045.B:0 "แน่นอนสิ ทำไมพวกเขาถึงจะไม่เกลียดชังคนนอกล่ะ?"
 first_contact.5045.C:0 "คงจะดีไม่น้อยที่จะได้พบกับผู้ที่เหมือนกับเรา"
 first_contact.5050.name:0 "การแปลที่ผิดพลาด"
 first_contact.5050.desc:0 "ความพยายามในการถอดรหัสภาษาที่ใช้ในสัญญาณจาก §H[This.ContactCountry.GetName]§! ต้องพบกับความล้มเหลว ดูเหมือนว่าสมมติฐานหลักที่ [This.Owner.GetLinguists] ของเราใช้ในการแปลนั้นได้ถูก §Hพิสูจน์แล้วว่าไม่เป็นความจริงโดยสิ้นเชิง§! แม้ว่าสิ่งนี้จะหมายความว่าความคืบหน้าส่วนใหญ่ของเราจะต้องได้รับการแก้ไข แต่ก็หวังว่าความพยายามในอนาคตจะถูกสร้างขึ้นบนรากฐานที่น่าเชื่อถือยิ่งขึ้น"
 first_contact.5055.name:0 "ความคืบหน้าอย่างมั่นคง"
 first_contact.5055.desc:0 "[This.Owner.GetLinguists] ของเราเพิ่งจะมีความก้าวหน้าอย่างมากในการถอดรหัสภาษาที่ใช้ในสัญญาณจาก §H[This.ContactCountry.GetName]§! ดูเหมือนว่าตอนนี้พวกเขาเชื่อว่าตนเองมีความเข้าใจพื้นฐานอย่างมั่นคงแล้ว และสัญญาว่าจะสามารถรายงานการค้นพบเพิ่มเติมได้ในเร็ว ๆ นี้"
 first_contact.5055.A:0 "พยายามต่อไป!"
 first_contact.5065.name:0 "ตรวจพบสัญญาณที่ชัดเจน"
 first_contact.5065.desc:1 "ก่อนหน้านี้เราต้องดิ้นรนเพื่อรวบรวมข้อมูลเกี่ยวกับ §H[This.ContactCountry.GetName]§! ให้เพียงพอเพื่อให้ [This.Owner.GetLinguists] ของเราได้ดำเนินงานต่อ แต่ตอนนี้ความพยายามของเราได้รับการสนับสนุนครั้งใหญ่: เซ็นเซอร์ของเราตรวจจับการสนทนาที่ยาวนานระหว่างยานหลายลำของพวกเขาได้ เราได้แต่เดาว่าพวกเขาอาจจะลดการระวังตัวลงชั่วขณะ หรือเทคโนโลยีของพวกเขาอาจจะไม่ได้ก้าวหน้าอย่างที่เราคาด และคิดว่าช่องสัญญาณของตนปลอดภัย..."
 first_contact.5070.name:0 "ภาษาศาสตร์แห่งสีสัน"
 first_contact.5070.desc:0 "[This.Owner.GetLinguists] ของเราได้บรรลุความก้าวหน้าในการถอดรหัสภาษาของ §H[This.ContactCountry.GetName]§! พวกเขาใช้ตัวอักษรที่ประกอบด้วยอักขระพิเศษเกือบสิบเจ็ดล้านตัว ซึ่งแต่ละตัวจะสอดคล้องกับสีบนสเปกตรัมแดง-เขียว-น้ำเงิน แม้จะซับซ้อน แต่เหล่านักภาษาศาสตร์ของเรามั่นใจว่าจะสามารถถอดรหัสภาษาต่างดาวนี้ได้ พวกเขาแค่ต้องการเวลาเพิ่มอีกเล็กน้อย"
 first_contact.5070.A:0 "ไฟเขียวผ่านตลอดทาง"
 first_contact.5071.name:0 "ถอดรหัสภาษาแห่งสีสัน"
 first_contact.5071.desc:0 "ด้วยการใช้ระบบเลขฐานสิบหก นักคณิตศาสตร์และ [This.Owner.GetLinguists] ของเรากำลังเข้าใกล้ความก้าวหน้าในการถอดรหัสภาษาแห่งสีสันกับ §H[This.ContactCountry.GetName]§! เจ้าหน้าที่กำลังเตรียมพิธีสารสำหรับปฐมสัมผัส\n\nจากการศึกษาภาษาของ §H[This.ContactCountry.GetName]§! ทำให้เราทราบว่าวัฒนธรรมของพวกเขานั้นกว้างใหญ่ ความเสี่ยงที่จะเกิดความเข้าใจผิดนั้นสูงมาก ตอนนี้เราต้องตัดสินใจว่าควรเข้าหาพวกเขาด้วยเหตุผล หรือด้วยอารมณ์ความรู้สึก..."
 first_contact.5071.desc.gestalt:0 "ด้วยการใช้ระบบเลขฐานสิบหก ส่วนรวมกำลังเข้าใกล้ความก้าวหน้าในการถอดรหัสภาษาแห่งสีสันกับ §H[This.ContactCountry.GetName]§! เรากำลังเตรียมพิธีสารสำหรับปฐมสัมผัส\n\nตอนนี้เราสามารถเอาใจใส่ด้านอารมณ์ความรู้สึกด้วยการทักทายที่มีความสำคัญทางวัฒนธรรม หรือจะเลือกใช้พิธีสารที่ซับซ้อนยิ่งขึ้นเพื่อเพิ่มประสิทธิภาพในการสื่อสาร"
 first_contact.5071.A:0 "การทูตคือการแลกเปลี่ยนทางวัฒนธรรมและอารมณ์ ติดต่อพวกเขาด้วยบทเพลง!"
 first_contact.5071.A.tooltip:0 "เราจะพยายามสร้างสายสัมพันธ์ทางอารมณ์กับ [This.ContactCountry.GetName]"
 first_contact.5071.B:0 "ให้เราให้ความสำคัญกับตรรกะก่อนความรู้สึก อย่าให้อารมณ์เข้ามาเกี่ยวข้องกับการสื่อสารของเรา"
 first_contact.5072.name:0 "สายสัมพันธ์ทางอารมณ์!"
 first_contact.5072.desc:0 "ความพยายามในการสร้างสายสัมพันธ์ทางอารมณ์กับ §H[This.ContactCountry.GetName]§! ประสบผลสำเร็จ\n\n[This.Owner.GetLinguists] ของเราได้แสดงให้เห็นถึงความเข้าใจในวัฒนธรรมของพวกเขา ส่งผลให้เราได้รับการต้อนรับอย่างอบอุ่น ภารกิจเสร็จสิ้นอย่างงดงามยิ่ง!"
 first_contact.5072.desc.gestalt:0 "ด้วยการใช้อารมณ์ความรู้สึก เราจึงได้รับความโปรดปรานจาก §H[This.ContactCountry.GetName]§!\n\n[This.Owner.GetLinguists] ของเราได้แสดงให้เห็นถึงความเข้าใจในวัฒนธรรมของพวกเขา ส่งผลให้เราได้รับการต้อนรับอย่างอบอุ่น ภารกิจเสร็จสิ้น"
 first_contact.5073.name:0 "การลบหลู่อย่างมหันตภัย!"
 first_contact.5073.desc:0 "ความพยายามในการสร้างสายสัมพันธ์ทางอารมณ์กับ §H[This.ContactCountry.GetName]§! นำมาซึ่งความหายนะ\n\n[This.Owner.GetLinguists] ของเราล้มเหลวในการแสดงความเข้าใจในวัฒนธรรมของพวกเขา และผลที่ตามมาคือเราได้ลบหลู่พวกเขาอย่างรุนแรง!"
 first_contact.5073.desc.gestalt:0 "ด้วยการใช้อารมณ์ความรู้สึก เราล้มเหลวในการได้รับความโปรดปรานจาก §H[This.ContactCountry.GetName]§!\n\n[This.Owner.GetLinguists] ของเราไม่สามารถแสดงความเข้าใจในวัฒนธรรมของพวกเขาได้ และส่งผลให้พวกเขาขุ่นเคืองใจเป็นอย่างยิ่ง"
 first_contact.5075.name:0 "การพรางการสื่อสาร"
 first_contact.5075.desc:0 "ภาษาของ §H[This.ContactCountry.GetName]§! ประกอบด้วยเสียงที่ดูเหมือนฟุ่มเฟือยหลายล้านเสียง ซึ่งเห็นได้ชัดว่าเป็นซากตกค้างทางภาษาถิ่นจากอารยธรรมยุคก่อนของพวกเขา เมื่อแปลออกมาแล้ว คำเสริมแต่งที่ดูไร้ประโยชน์เหล่านี้ดูเหมือนจะไม่มีจุดประสงค์อื่นใดนอกจากเพิ่มรสชาติทางภาษา - หรืออย่างมากที่สุดก็มีผลกระทบทางบริบทเพียงเล็กน้อยเท่านั้น\n\nโชคดีที่ [This.Owner.GetLinguists] ของเราได้คัดกรองแง่มุมที่ล้าสมัยของภาษาพวกเขาออกไป และกำลังรวบรวมพจนานุกรมฉบับย่อซึ่งน่าจะเป็นประโยชน์อย่างมากสำหรับการสื่อสารที่มีประสิทธิภาพกับ §H[This.ContactCountry.GetName]§!"

 # The Trial
 first_contact.5080.name: "กระสวยอวกาศ"
 first_contact.5080.desc.start: "§H[This.ContactCountry.GetName]§! ได้จัดวางตำแหน่งกระสวยอวกาศไว้ใกล้กับเราในอวกาศ เนื่องจากไม่มีอะไรเกิดขึ้นหลังจากนั้น เราจึงสันนิษฐานว่าพวกเขาต้องการพบกันนอกยานหลัก ขนาดที่เล็กของกระสวยทำให้มีเพียง [Owner.GetEnvoy] ของเรา [Leader.GetName] เท่านั้นที่สามารถเดินทางไปได้ โดยคณะทูตที่เหลือยังคงรออยู่เบื้องหลัง"
 first_contact.5080.desc.weapon: "กระสวยยานถูกรวมเข้ากับระบบอาวุธที่ซับซ้อน และเอเลี่ยนก็เตรียมพร้อมสําหรับการเผชิญหน้าที่รุนแรง" # Likely militarist
 first_contact.5080.desc.functional: "กระสวยยานเป็นอยุธยาและใหญ่ เห็นได้ชัดว่าฟังก์ชันถูกจัดลําดับตามรูปแบบ" # Likely egalitarian
 first_contact.5080.desc.bling: "กระสวย จะ ปก คลุม ด้วย เครื่อง ประดับ ที่ วิจิตร งดงาม และ เครื่อง ประดับ ทองคํา. มี การ ออก แบบ อย่าง เห็น ได้ ชัด เพื่อ ให้ ความ ประทับ ใจ กับ การ แสดง ออก ซึ่ง ความ หลาก หลาย." # Likely materialist
 first_contact.5080.desc.standard: "กระสวยอวกาศคล้ายกับ การออกแบบของเราเอง ซึ่งทําให้มั่นใจได้" # Standard

 first_contact.5085.name: "การรอคอย"
 first_contact.5085.desc.start: "[Leader.GetName] กลับมารายงานว่าไม่มีใครจาก §H[This.ContactCountry.GetName]§! มาพบ [Leader.GetHimHer] เลย"
 first_contact.5085.desc.meditation: "กระสวย ไม่ มี เครื่อง บิน มี ห้อง ประชุม กลาง. พื้น และ ผนัง ถูก ปก คลุม ด้วย วัสดุ อ่อน ๆ ขณะ เดียว กัน ก็ มี เสียง ธรรมชาติ ที่ ทํา ให้ สงบ จาก โลก ของ มนุษย์ ต่าง ดาว ที่ กําลัง เล่น อยู่ จาก ผู้ บรรยาย ที่ ซ่อน อยู่." # Likely pacifist
 first_contact.5085.desc.pool: "กระสวย ไม่ มี เครื่อง บิน มี ห้อง ประชุม กลาง ซึ่ง มี สระ น้ํา อยู่ ปลาย ทาง. สัญลักษณ์ของเอเลี่ยนล้อมรอบพื้นริมสระ" # Likely spiritualist
 first_contact.5085.desc.imposing: "กระสวย อวกาศ ที่ ไม่ มี เครื่อง บิน มี ห้อง ประชุม กลาง ซึ่ง มี รูป แบบ ทาง สถาปัตยกรรม ซึ่ง อยู่ ต่ํา กว่า ระดับ และ น่า ประทับ ใจ อย่าง ยิ่ง. มุมของผนังและเครื่องประดับของพวกเขา ถูกออกแบบมาเพื่อดึงดูดความสนใจของผู้ชมที่มีต่อดอกเดซี่ยก" # Likely authoritarian
 first_contact.5085.desc.standard: "กระสวย อวกาศ ที่ ไม่ มี เครื่อง บิน มี ห้อง ประชุม กลาง ซึ่ง ไม่ มี ข้อ บังคับ และ ขาด การ ตกแต่ง หรือ การ ประดับ ตกแต่ง ไม่ ว่า แบบ ใด." # Standard
 first_contact.5085.desc.end: "ผนังด้านหนึ่งเต็มไปด้วยอุปกรณ์บันทึกภาพและเซ็นเซอร์ เมื่อยืนอยู่ต่อหน้าเครื่องจักรที่ไร้ความรู้สึก [Leader.GetName] ได้บรรยายสรุปประวัติศาสตร์และวัฒนธรรมของเผ่าพันธุ์เรา การนำเสนอจบลงด้วยความเงียบงัน ด้วยความหงุดหงิด [Leader.GetName] จึงได้ทิ้งแท็บเล็ตวิดีโอที่มีคอลเลกชันบันทึกทางประวัติศาสตร์และหนังสือเรียนภาษาของเราไว้เบื้องหลัง"
 first_contact.5085.a: "ตอนนี้เราทำได้เพียงรอ"

 first_contact.5090.name: "วิธีการ"
 first_contact.5090.desc.proactive: "การสื่อสารฝ่ายเดียวสร้างความหงุดหงิดใจให้กับคณะทูตเป็นอย่างมาก ด้วยความกระตือรือร้นที่จะทำปฐมสัมผัสให้สำเร็จ พวกเขาจึงสร้างกลยุทธ์การทำนายเชิงลึกสำหรับขั้นตอนที่เหลือ โดยไม่มีข้อมูลจริงใด ๆ มารองรับแนวทางดังกล่าว"
 first_contact.5090.desc.cautious: "การรอคอยอย่างกระวนกระวายใจเกิดขึ้นหลังจากการนำเสนอบนกระสวย โดยที่ [Leader.GetName] สงสัยอย่างเปิดเผยว่า [Leader.GetHeShe] ได้ทำการแนะนำตัวที่ประสบความสำเร็จหรือไม่"
 first_contact.5090.desc.aggressive: "มีเพียงคำสั่งโดยตรงจาก [Leader.GetName] เท่านั้นที่ป้องกันไม่ให้พิธีสารปฐมสัมผัสลุกลามไปสู่ความรุนแรง สำหรับคณะทูตแล้ว ความเงียบงันอย่างดื้อรั้นของต่างดาวนั้นไม่ต่างอะไรจากการหยามเกียรติ"
 first_contact.5090.desc.end: "หลังจากหลายชั่วโมง§H[This.ContactCountry.GetName]§!ส่งข้อความสั้น ๆ ในภาษาของเรา:\n\n\"เราไม่ได้ประทับใจวัฒนธรรมของคุณ แค่นี้เหรอ? เดอะ[Owner.GetEnvoy]มีโอกาสสุดท้ายที่จะทําให้เราประทับใจ ในสาขาที่คุณเลือก\"หลังจากผ่านไปหลายชั่วโมง §H[This.ContactCountry.GetName]§! ได้ส่งข้อความสั้น ๆ ในภาษาของเรา:\n\n"
 first_contact.5090.a: "การตัดสินด้วยการประลองยุทธ์"
 first_contact.5090.a.tt: "โจมตีก่อน โจมตีให้หนัก"
 first_contact.5090.b: "วาทศิลป์โน้มน้าวใจ"
 first_contact.5090.b.tt: "พวกเขาก็ดนตรีเหตุผล"
 first_contact.5090.c: "การประชันกลอนสดคลอเสียงดนตรี"
 first_contact.5090.c.tt: "ยกย่องเรา ข่มเหงพวกเขา"

 first_contact.5095.name: "คำตัดสิน"
 first_contact.5095.desc.combat_good: "[Leader.GetName]กลับมาจาก§H[This.ContactCountry.GetName]§!กระสวยยานบาดเจ็บ แต่เป็นฝ่ายชนะ\n\nจากประตูที่ซ่อนอยู่, นักสู้ต่างดาวปรากฏตัวขึ้นและดําเนินการต่อไปตีของเรา[Owner.GetEnvoy]จนถึงจุดที่เหนื่อยล้า การรวบรวมพลังสุดท้าย[Leader.GetName]เอาชนะได้[Leader.GetHisHer]คู่ต่อสู้\n\nภายในหนึ่งชั่วโมง[This.ContactCountry.GetName]ส่งข้อความ:\n\n\"[Leader.GetName]จะได้เข้าพิธีกรในฐานะนักรบที่ยิ่งใหญ่[Leader.GetName] กลับมาจากกระสวยของ §H[This.ContactCountry.GetName]§! ในสภาพได้รับบาดเจ็บแต่ก็ได้รับชัยชนะ\n\nนักสู้ต่างดาวปรากฏตัวออกมาจากประตูที่ซ่อนอยู่ และเริ่มเข้าทำร้าย [Owner.GetEnvoy] ของเราจนถึงจุดที่หมดแรง ด้วยการรวบรวมพละกำลังเฮือกสุดท้าย [Leader.GetName] ก็สามารถปราบคู่ต่อสู้ของ [Leader.GetHisHer] ได้สำเร็จ\n\nภายในหนึ่งชั่วโมง [This.ContactCountry.GetName] ได้ส่งข้อความมา:\n\n"
 first_contact.5095.desc.combat_bad: "[Leader.GetName]กลับมาจาก§H[This.ContactCountry.GetName]§!กระสวยยานสับสน ไม่พบคู่ต่อสู้ ภายในหนึ่งชั่วโมง§H[This.ContactCountry.GetName]§!ส่งข้อความ:\n\n\"วิธีป่าเถื่อนของคุณทําให้เราผิดหวัง\" การต่อสู้ทางกายภาพเป็นส่วนใหญ่ไม่ได้สําหรับวัฒนธรรมที่เจริญ\".[Leader.GetName] กลับมาจากกระสวยของ §H[This.ContactCountry.GetName]§! ด้วยความสับสน เนื่องจากไม่พบคู่ต่อสู้ ภายในหนึ่งชั่วโมง §H[This.ContactCountry.GetName]§! ได้ส่งข้อความมา:\n\n"
 first_contact.5095.desc.speech_good: "[Leader.GetName]กลับมาจาก§H[This.ContactCountry.GetName]§!กระสวยยานมีความมั่นใจ[Leader.GetHeSheCap]ได้สูญเสียการติดตามเวลา โต้แย้งกรณีของเรา ด้านหน้าของกําแพงเซนเซอร์ อธิบายเหตุผลของการตัดสินใจทางประวัติศาสตร์\n\nภายในหนึ่งชั่วโมง§H[This.ContactCountry.GetName]§!ส่งข้อความ:\n\n\"เมื่อทุกข์ยากในอดีตของคุณ คุณได้เติบโตอย่างน่าทึ่ง วัฒนธรรมของคุณเป็นแรงบันดาลใจ\"[Leader.GetName] กลับมาจากกระสวยของ §H[This.ContactCountry.GetName]§! ด้วยความเปี่ยมล้นไปด้วยความเชื่อมั่น [Leader.GetHeSheCap] ลืมวันเวลาขณะที่โต้แย้งชี้แจงประเด็นของเราอยู่หน้ากำแพงเซ็นเซอร์ โดยอธิบายถึงเหตุผลของการตัดสินใจในประวัติศาสตร์ และวิธีที่เราได้เรียนรู้และเติบโตขึ้นในฐานะวัฒนธรรมหนึ่ง\n\nภายในหนึ่งชั่วโมง §H[This.ContactCountry.GetName]§! ได้ส่งข้อความมา:\n\n"
 first_contact.5095.desc.speech_bad: "[Leader.GetName]กลับมาจาก§H[This.ContactCountry.GetName]§!กระสวยยานผิดหวัง[Leader.GetHeSheCap]ใช้เวลากว่าหนึ่งชั่วโมงที่กําแพงเซนเซอร์ เสนอวัฒนธรรมของเราในรายละเอียดที่มากขึ้น และโต้แย้งเพื่อความถูกต้องของการตัดสินใจทางประวัติศาสตร์ของเรา\n\nหลังจากนั้นไม่นาน§H[This.ContactCountry.GetName]§!ส่งข้อความ:\n\n\"ประวัติที่คุณบรรยาย พรรณนาถึง ภาพวาดแย่ๆของวัฒนธรรมของคุณ\"[Leader.GetName] กลับมาจากกระสวยของ §H[This.ContactCountry.GetName]§! ด้วยความผิดหวัง [Leader.GetHeSheCap] ใช้เวลากว่าหนึ่งชั่วโมงที่กำแพงเซ็นเซอร์เพื่อนำเสนอวัฒนธรรมของเราอย่างละเอียด และโต้แย้งเพื่อความถูกต้องของการตัดสินใจในประวัติศาสตร์ของเรา\n\nหลังจากนั้นไม่นาน §H[This.ContactCountry.GetName]§! ได้ส่งข้อความมา:\n\n"
 first_contact.5095.desc.song_good: "[Leader.GetName]กลับมาจาก§H[This.ContactCountry.GetName]§!กระสวยกําลังอารมณ์ดี เนื้อเพลงที่สดใหม่ที่อธิบายอดีตและอนาคตของเรา ได้บินอย่างอิสระกับ[Owner.GetEnvoy]- ทําให้ความสัมพันธ์ทั้งน่าแปลกใจและชัดเจน\n\nภายในหนึ่งชั่วโมง§H[This.ContactCountry.GetName]§!ส่งข้อความ:\n\n\"วัฒนธรรมของคุณยอดเยี่ยมที่สุด และเราชื่นชมการแสดง\"[Leader.GetName] กลับมาจากกระสวยของ §H[This.ContactCountry.GetName]§! ด้วยอารมณ์ที่ดีเยี่ยม เนื้อร้องสดที่อธิบายถึงอดีตและอนาคตของเราหลั่งไหลออกมาอย่างเป็นอิสระ โดยกวี-[Owner.GetEnvoy] ของเราได้เชื่อมโยงเรื่องราวต่าง ๆ ได้อย่างน่าประหลาดใจและให้ความกระจ่างแจ้ง\n\nภายในหนึ่งชั่วโมง §H[This.ContactCountry.GetName]§! ได้ส่งข้อความมา:\n\n"
 first_contact.5095.desc.song_bad: "[Leader.GetName]กลับมาจาก§H[This.ContactCountry.GetName]§!การ บิน ไม่ พอ ใจ[Leader.GetHisHer]การแสดงดนตรี ความแตกต่างระหว่างการกระทําในอดีตของเรา กับการยอมรับในตัวเองในปัจจุบัน ทําให้ความสัมพันธ์ทางเนื้อเพลงล้มเหลว\n\nภายในหนึ่งชั่วโมง§H[This.ContactCountry.GetName]§!ส่งข้อความ:\n\n\"เราผิดหวังที่การประชุมที่สําคัญของจิตใจถูกทําลายโดยบทกวีกลาง.\"[Leader.GetName] กลับมาจากกระสวยของ §H[This.ContactCountry.GetName]§! ด้วยความไม่พึงพอใจกับการแสดงดนตรีของ [Leader.GetHisHer] ความไม่สอดคล้องกันระหว่างการกระทำในอดีตกับแนวคิดในปัจจุบันของเราทำให้การร้องกลอนสดฟังดูไม่เข้าท่า\n\nภายในหนึ่งชั่วโมง §H[This.ContactCountry.GetName]§! ได้ส่งข้อความมา:\n\n"
 first_contact.5095.a: "การทดสอบสิ้นสุดลงแล้ว"

 #First Contact Stage Summaries
 fcsum_base_contact_set_summary:0 "เราพบมนุษย์ต่างดาวที่ไม่รู้จักในระบบดาว §H[This.System.GetName]§!"
