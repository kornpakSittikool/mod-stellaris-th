 first_contact.nomadic_escorts.attack_allowed.gestalt.end: "ยานอาร์คชิปของพวกเขา มาพร้อมกับเรือสนับสนุนขนาดเล็ก ภายในระยะเซ็นเซอร์ของเรา ทรัพย์สินทางทหารของเราพร้อมแล้ว ที่จะสกัดกั้นและจับยานคุ้มกัน ในขณะที่พวกมันยังคงเข้าถึงได้"
