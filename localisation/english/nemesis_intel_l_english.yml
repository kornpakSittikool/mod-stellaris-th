 #Misc
 first_contact.1060.name:0 "ภาษาที่ใช้ในการติดต่อครั้งแรก"
 first_contact.1060.desc.base:0 "การเผชิญหน้ากับสิ่งมีชีวิตต่างดาวครั้งล่าสุดของเราได้เกิดขึ้นอีกครั้ง - การถกเถียงกันในสมัยก่อนว่าเราควรจะติดต่อกับอารยธรรมต่างดาวที่ชาญฉลาดได้หรือไม่อย่างไร"
 first_contact.1060.desc.payback.base:0 "ปฐมสัมผัสของเรากับสิ่งมีชีวิตต่างดาวทำให้เราต้องระแวดระวังผู้อื่น มีชีวิตอยู่ที่นั่น และในขณะที่สำรวจกาแล็กซี เราจะพบสิ่งมีชีวิตที่มีสติปัญญาอีกอย่างไม่ต้องสงสัย แต่วิธีการทักทายของเรายังคงเป็นเรื่องที่ต้องถกเถียงกันอยู่"
 first_contact.1060.desc:0 "$first_contact.1060.desc.base$\n\nในขณะที่มีผู้สนับสนุนบางส่วนมุ่งเน้นไปที่การสร้างความสัมพันธ์กับพวกเขาโดยเร็วที่สุดโดยด้วยข้อความสันติภาพ แต่คนอื่นๆเตือนให้ระมัดระวัง โดยชี้ว่า เราไม่สามารถรู้ได้ว่ามนุษย์ต่างดาวมีเจตนาร้ายต่อเราหรือไม่และเป็นการไม่ฉลาดที่จะบอกให้พวกเขาทราบ การมีอยู่ของเราโดยไม่จำเป็น\n\nส่วนกลุ่มที่หัวรุนแรงต้องการให้จัดการกับพวกเขาเสีย ก่อนที่จะเป็นภัยต่อเรา: "[This.GetSpeciesNamePlural]ตกอยู่ในความเสี่ยง" พวกเขากล่าวว่า "เราไม่ลังเลที่จะดำเนินมาตรการใดๆที่จำเป็นเพื่อกำจัดภัยคุกคามจากพวกต่างดาว""
 first_contact.1060.desc.payback:0 "$first_contact.1060.desc.payback.base$\n\nขณะ ที่ ผู้ สนับสนุน บาง คน ก่อ ให้ เกิด ความ สัมพันธ์ อย่าง เป็น มิตร โดย เร็ว เท่า ที่ เป็น ไป ได้ คน อื่น ๆ ให้ คํา แนะ นํา โดย ชี้ ว่า นิสัย ที่ เป็น มิตร ของ เรา เป็น สิ่ง ที่ นํา เรา ไป สู่ การ จํา คุก และ การ ทรยศ.\n\nกลุ่มที่สาม หัวรุนแรงมากขึ้น ผลักดันสําหรับการกระทําก่อนการว่าง\"วิธีที่ดีที่สุดในการหลีกเลี่ยงการรุกรานครั้งที่สอง คือการตีพวกเขาก่อน\" พวกเขากล่าว \"เราจะไม่น้อมกับประสงค์ของตัวเลขอีก!\"$first_contact.1060.desc.payback.base$\n\nในขณะที่บางคนสนับสนุนให้สร้างความสัมพันธ์ฉันมิตรโดยเร็วที่สุด คนอื่น ๆ แนะนำให้ระมัดระวัง โดยชี้ให้เห็นว่าธรรมชาติที่เป็นมิตรของเรานั่นเองที่นำเราไปสู่การจองจำและการทรยศ\n\nกลุ่มที่สามที่เป็นพวกหัวรุนแรงกว่า ผลักดันให้มีการดำเนินการเชิงป้องกันล่วงหน้า: "
 first_contact.1060.desc.xenophile:0 "$first_contact.1060.desc.base$\n\nในขณะที่มีผู้สนับสนุนบางส่วนมุ่งเน้นไปที่การสร้างความสัมพันธ์กับพวกเขาโดยเร็วที่สุดโดยด้วยข้อความสันติภาพ แต่คนอื่นๆเตือนให้ระมัดระวัง โดยชี้ว่า เราไม่สามารถรู้ได้ว่ามนุษย์ต่างดาวมีเจตนาร้ายต่อเราหรือไม่และเป็นการไม่ฉลาดที่จะบอกให้พวกเขาทราบ การมีอยู่ของเราโดยไม่จำเป็น"
 first_contact.1060.desc.payback.xenophile:0 "$first_contact.1060.desc.base.payback$\n\nในขณะที่พวกเราส่วนใหญ่ต้องการเชื่อว่ามีอารยธรรมที่มีเมตตาอยู่ที่นั่น คนอื่น ๆ แนะนำให้ระมัดระวัง โดยชี้ให้เห็นว่าธรรมชาติที่เป็นมิตรของเรานั่นเองที่นำเราไปสู่การจองจำและการทรยศ"
 first_contact.1060.desc.xenophobe:0 "$first_contact.1060.desc.base$\n\nในขณะที่ผู้สนับสนุนบางส่วนพูดถึงเรื่องการจัดการกับพวกเขาเสียก่อนที่จะเป็นภัยต่อเรา แต่คนอื่นๆ แนะนำให้ระมัดระวัง โดยชี้ให้เห็นว่าควรเรียนรู้เพิ่มเติมเกี่ยวกับความสามารถของมนุษย์ต่างดาว ก่อนที่เราจะเสี่ยงที่จะเป็นศัตรูกันในอนาคต"
 first_contact.1060.desc.payback.xenophobe:0 "$first_contact.1060.desc.payback.base$\n\nการตอบรับเป็นไปในเอกฉันท์: วิธีที่ดีที่สุดในการหลีกเลี่ยงการรุกรานครั้งที่สองคือการแสดงอำนาจเหนือผู้อื่นก่อนที่พวกเขาจะสามารถทำร้ายเราได้ เราจะไม่ยอมก้มหัวให้ความต้องการของคนนอกอีกต่อไป!"
 first_contact.1060.desc.gestalt:0 "การเผชิญหน้ากับสิ่งมีชีวิตต่างดาวเมื่อเร็วๆนี้ทำให้เราจำเป็นต้องตัดสินใจว่าเราควรปฏิบัติอย่างไรต่ออารยธรรมต่างดาวที่ชาญฉลาดที่เราอาจพบเจอ\n\nความเป็นไปได้อย่างหนึ่งคือเราต้องพยายามติดต่ออย่างสันติกับพวกเขาโดยเร็วที่สุดโดยการส่งข้อมูลที่จำเป็นเพื่อให้พวกเขาแปลการสื่อสารของเราได้ อย่างไรก็ตามสิ่งนี้อาจเป็นความผิดพลาดหากพวกเขามีเจตนาเป็นศัตรูกับเรา\n\nทางเลือกที่ปลอดภัยที่สุดคือดำเนินการด้วยความระมัดระวังและพยายามสื่อสารกับพวกเขาโดยไม่ให้ข้อมูลเกี่ยวกับเรามากเกินไป ในทางกลับกัน เราสามารถเคลื่อนไหวเชิงรุกมากขึ้นเพื่อค้นหาข้อมูลเพิ่มเติมเกี่ยวกับพวกเขาและขับไล่พวกเขาออกจากดินแดนของเรา อย่างไรก็ตามสิ่งนี้แน่นอนว่าจะทำให้พวกเขาเป็นปรปักษ์กับเรา"
 first_contact.1060.A:0 "เราจะทักทายต่างดาวโดยการอ้าแขนรับ"
 first_contact.1060.A.machine:0 "เราจะทักทายต่างดาวโดยการอ้าแขนรับ"
