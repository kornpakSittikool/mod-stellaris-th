 first_contact.25.name: "ตรวจพบเรือชูชีพ"
 first_contact.25.desc.base: "มันปรากฏว่าสิ่งที่เรียกกันว่า§H[This.ContactCountry.GetName]§!เป็นส่วนหนึ่งของการไม่รู้จักก่อนหน้านี้§Hอารยธรรมในอวกาศ§!ในขณะเดียวกัน พวกเขาดูเหมือนจะไม่มีโลกที่คงที่แทนการอาศัยอยู่และเดินทางทั้งหมด§Hเรือ รบ§!อย่างน้อยหนึ่งเรือดังกล่าวจะมองเห็นได้ ภายในระยะเซ็นเซอร์ของเรา การติดต่อของพวกเขายังคงยังไม่ตัดสิน แต่ของเรา[This.Owner.GetLinguists]กําลังพยายามเปลี่ยนแปลงมัน"
 first_contact.25.desc.proactive: "$first_contact.25.desc.base$"
 first_contact.25.desc.cautious: "$first_contact.25.desc.base$เรา ใช้ มาตรการ ป้องกัน ทุก อย่าง เพื่อ ป้องกัน พวก เขา ไว้ จาก การ เรียน รู้ สิ่ง ใด ๆ ที่ ละเอียด อ่อน เกี่ยว กับ ตัว เรา ขณะ ที่ เรา ทํา งาน เพื่อ สร้าง การ สื่อ ความ."
 first_contact.25.desc.attack_allowed: "$first_contact.25.desc.base$ $first_contact.nomadic_escorts.attack_allowed.end$"
 first_contact.25.desc.attack_allowed.gestalt: "$first_contact.25.desc.base$ $first_contact.nomadic_escorts.attack_allowed.gestalt.end$"
 first_contact.25.A: "วิเศษจริงๆ"
 first_contact_critters.1.desc.cfl: "เราได้อ่านธรรมชาติที่ไม่รู้จัก สัญญาณดูเหมือนจะเป็นไปตามชนิดของการซ้ําไวยากรณ์ ซึ่งอาจบ่งบอกที่มาของการคิด มันน่าจะถูกตรวจสอบเพิ่มเติม เรือ เหล่า นี้ ดู เหมือน จะ มุ่ง ความ สนใจ ไป รอบ ๆ เรือ ขนาด ใหญ่ ลํา หนึ่ง แม้ ว่า จะ ไม่ ชัดเจน ว่า ส่วน นี้ จะ เป็น ส่วน ของ อารยธรรม ที่ ใหญ่ กว่า ใน อวกาศ หรือ ไม่."
 first_contact_critters.70.desc.nomadic.base: "ตรวจพบเส้นเลือดใน[This.System.GetName]ระบบดูเหมือนจะอยู่ในบางรูปแบบ ของการเดินทางข้ามกาแล็กซี่, วิถีของชีวิต พวก เขา ไม่ ได้ ทํา ท่า ทาง ที่ เป็น ปฏิปักษ์ โดย ส่ง สัญญาณ ซ้ํา ๆ ตาม ทิศ ทาง ของ เรา แทน."
 first_contact_critters.70.desc.nomadic: "$first_contact_critters.70.desc.nomadic.base$\n\nมีบางสิ่งบางอย่างเกือบคุ้นเคย เกี่ยวกับสายตาของคนที่ทําบ้านของพวกเขาในหมู่ดาว ของเรา[This.Owner.GetEnvoy], [This.Leader.GetName]กระตือรือร้น ที่ จะ เรียน รู้ มาก ขึ้น เกี่ยว กับ เพื่อน นัก เดิน ทาง เหล่า นี้."
 first_contact_critters.70.desc.nomadic.unfriendly: "$first_contact_critters.70.desc.nomadic.base$\n\nพวก มัน ไม่ ต่าง กับ ตัว เรา เอง แม้ ว่า การ เปรียบ เทียบ เป็น สิ่ง ที่ ไม่ พึง ปรารถนา. ของเรา[This.Owner.GetEnvoy], [This.Leader.GetName]แต่จะได้ยินสิ่งที่พวกเขาจะพูด"
 first_contact_critters.70.E: "พวกเขาอ้างเส้นทางของภูมิภาคนี้แล้วหรือยัง"
