 #Space Fauna First Contacts
 # Enclaves
 first_contact_critters.1.name:0 "สัญญาณที่มีโครงสร้าง"
 first_contact_critters.1.desc:1 "เราตรวจพบการวัดค่าที่มีลักษณะไม่ทราบที่มา ดูเหมือนว่าสัญญาณจะดำเนินตามรูปแบบไวยากรณ์ซ้ำ ๆ ซึ่งอาจบ่งชี้ถึงต้นกำเนิดที่มีภูมิปัญญา ควรทำการสำรวจเรื่องนี้เพิ่มเติม ดูเหมือนว่าสัญญาณจะกระจุกตัวอยู่รอบ ๆ สถานีอวกาศแห่งเดียว ทว่ายังไม่แน่ชัดว่านี่เป็นส่วนหนึ่งของอารยธรรมท่องอวกาศขนาดใหญ่หรือไม่"
 first_contact_critters.1.A:0 "ดำเนินการต่อ"
 first_contact_critters.5.name:0 "$leviathans.99.name$"
 first_contact_critters.5.desc:1 "หลังจากประสบความสำเร็จในการแปลภาษาของพวกเขา เราได้จัดทำช่องทางการสื่อสารกับสถานีอวกาศอิสระของ §H[This.ContactCountry.GetRealName]§!"
 first_contact_critters.5.A:0 "ลองดูว่าพวกเขาต้องการพูดคุยหรือไม่"
 # Tiyanki
 first_contact_critters.10.name:0 "กลุ่มความร้อนแปลกประหลาด"
 first_contact_critters.10.desc:0 "เครื่องสแกนระยะไกลตรวจพบค่าในระบบดาว [This.System.GetName] ซึ่งอธิบายได้ดีที่สุดว่าเป็นกลุ่มความร้อนขนาดยักษ์ มันคุ้มค่าที่จะสำรวจดู"
 first_contact_critters.10.A:0 "ดำเนินการเลย"
 first_contact_critters.15.name:0 "$story.501.name$"
 first_contact_critters.15.desc:1 "สิ่งมีชีวิตจากอวกาศ ซึ่ง[Owner.GetSpeciesAdj]หัวหน้าสมาคมการวิจัยได้มาหมายถึง\"§Hเทียนิกิ§!\"สิ่งมีชีวิตในอวกาศ - ซึ่งหัวหน้าฝ่ายวิจัยสังคมของ [Owner.GetSpeciesAdj] เรียกพวกมันว่า "
 first_contact_critters.15.desc.gesta:0 "$story.501.desc.gesta$"
 first_contact_critters.15.A:0 "น่าหลงใหลอย่างยิ่ง"
 # Amoebas
 first_contact_critters.20.name:0 "ทั้งใหญ่และขี้หงุดหงิด"
 first_contact_critters.20.desc:0 "เมื่อเข้าสู่ระบบ [This.System.GetName] เซนเซอร์ของเราได้ตรวจพบค่าที่แปลกประหลาด ในตอนแรกคิดว่าเป็นเพียงแค่ดาวเคราะห์น้อยทั่วไป แต่สิ่งต่าง ๆ เปลี่ยนไปอย่างรวดเร็วเมื่อพบว่าสิ่งมีชีวิตเหล่านี้ตอบสนองอย่างก้าวร้าวต่อการเคลื่อนไหวในอวกาศ - แม้จะอยู่ในระยะไกลก็ตาม!\n\nขอแนะนำให้สังเกตการณ์สิ่งเหล่านี้ โดยควรทำจากระยะที่ปลอดภัย"
 first_contact_critters.20.A:0 "มองดูจากระยะไกลจะดีที่สุด ทำต่อไป"
 first_contact_critters.25.name:0 "$story.101.name$"
 first_contact_critters.25.desc:1 "หน่วยงานที่ได้พบโดยกองเรือของเรา นานมาแล้ว เป็นสิ่งมีชีวิตในอวกาศใหม่\n\nชื่อเล่นแบบเร็ว§H\"สเปน อมีบา\"§!หลังจากอ่านผิดพลาดอย่างร้ายแรงของตัวตรวจจับแรก ๆ สิ่งมีชีวิตที่มีขนาดใหญ่กว่าค่าเฉลี่ย[Owner.GetSpeciesAdj]คอร์เวทท์"
 first_contact_critters.25.A:0 "เข้าใจแล้ว"
 # Crystals
 first_contact_critters.30.name:0 "คริสตัลมีชีวิต?"
 first_contact_critters.30.desc:0 "สิ่งผิดปกติที่เรากำหนดให้เป็น §H[This.ContactCountry.GetName]§! ดูเหมือนจะทำมาจากวัสดุผลึกบางชนิด น่าแปลกที่ดูเหมือนว่ามันจะสามารถขับเคลื่อนตัวเองข้ามความเวิ้งว้างและปกป้องตนเองได้เมื่อจำเป็น ซึ่งบ่งชี้ว่ามันอาจจะมีชีวิตอยู่ เหล่า [This.Owner.GetResearchers] ของเรากำลังทำงานอย่างหนักเพื่อค้นหาข้อมูลเพิ่มเติม"
 first_contact_critters.30.A:0 "พยายามต่อไป"
 # Drones
 first_contact_critters.40.name:0 "จักรกลอวกาศอัตโนมัติ"
 first_contact_critters.40.desc:0 "เราได้ค้นพบสิ่งมีชีวิตแบบใหม่[This.System.GetName]ถึงแม้ว่ามันจะเรียกว่า\"สิ่งมีชีวิต\"เราได้ค้นพบสิ่งมีชีวิตชนิดใหม่ในระบบ [This.System.GetName] แม้ว่าการจะเรียกมันว่า "
 first_contact_critters.40.A:0 "ค้นหาต่อไป แต่จงระมัดระวังด้วย"
 first_contact_critters.45.name:0 "$story.301.name$"
 first_contact_critters.45.desc:0 "รายงานเกี่ยวกับโดรนในอวกาศห้วงลึกที่พบก่อนหน้านี้ได้รับการตรวจสอบอย่างใกล้ชิดขึ้น โดรนเหล่านี้ดูเหมือนจะเป็นคนงานและผู้ดูแลการทำเหมืองวงโคจรอิสระ ซึ่งจัดตั้งขึ้นเมื่อหลายสหัสวรรษก่อน และในไม่ช้าก็ถูกทอดทิ้งโดยทุกคนยกเว้นตัวโดรนเอง เมื่อประเมินจากสภาพของอุปกรณ์แปรรูป\n\nโดรนเหล่านี้มีเลเซอร์ขุดเจาะที่ทรงพลัง และมีการแสดงออกที่เป็นภัยคุกคามอย่างชัดเจน หรืออาจเป็นศัตรูโดยตรงต่อยานของ [Owner.GetSpeciesAdj] เมื่อเข้าไปใกล้ พวกมันอาจเป็นเพียงโดรนเก่า ๆ แต่ก็ควรอยู่ภายใต้การเฝ้าระวังอย่างใกล้ชิดโดย [Owner.GetName]"
 first_contact_critters.45.A:0 "เข้าใจแล้ว"
 # Marauders
 first_contact_critters.50.name:0 "สัญญาณแห่งความป่าเถื่อน"
 first_contact_critters.50.desc:0 "แม้ว่าที่อยู่อาศัยของพวกเขาบนสถานีที่อยู่อาศัยจะบ่งบอกถึงสังคมที่ก้าวหน้า แต่ [This.Owner.GetEnvoy] [This.Leader.GetName] ก็ไม่แน่ใจว่าเรากำลังเผชิญหน้ากับสิ่งมีชีวิตที่มีสติปัญญาจริงหรือไม่: พวกเขาดูเหมือนจะเป็นศัตรูอย่างไม่ลดละ จนดูเหมือนว่าสังคมที่มั่นคงนั้นแทบจะเป็นไปไม่ได้เลย: แม้กระทั่งในช่วงเวลาสั้น ๆ ของการตรวจสอบ เราได้สังเกตเห็นการแสดงออกของความป่าเถื่อนอย่างแท้จริงหลายครั้ง\n\nดูเหมือนว่าพวกเขาจะมีภาษา แต่เหล่า [This.Owner.GetLinguists] ของเรายังคงทำงานถอดรหัสเพื่อให้เราเข้าใจการแสดงออกนี้"
 first_contact_critters.50.A:0 "น่ากังวลใจยิ่ง เราต้องคอยเฝ้าระวัง"
 first_contact_critters.60.name:0 "ยานของศัตรู"
 first_contact_critters.60.desc:0 "ยานพาหนะที่เราเผชิญหน้าในระบบ [This.System.GetName] ดูเหมือนจะล้าสมัยไปบ้าง แต่ก็ยังมีอาวุธครบมือ ดูเหมือนว่าจะมีลูกเรือที่มีความรู้สึกนึกคิดคอยควบคุม แต่กลับตอบสนองด้วยความเป็นปฏิปักษ์ต่อการเข้าใกล้ใด ๆ เราจะต้องปฏิบัติต่อพวกเขาด้วยความระมัดระวัง"
 first_contact_critters.65.desc:0 "แม้ว่าเราจะไม่สามารถสถาปนาการติดต่อสื่อสารกับพวกเขาได้ - สาเหตุหลักมาจากพวกเขาไม่เต็มใจที่จะสื่อสารกับเรา - แต่เราสามารถระบุได้ว่า §H[This.ContactCountry.GetName]§! เป็นโจรสลัด ตัวบ่งชี้ทางสายตาชี้ให้เห็นว่าวัฒนธรรมของพวกเขาส่วนใหญ่เป็นแบบใช้ชีวิตในอวกาศ และลักษณะปรากฏบางอย่างที่พบในกลุ่มพวกเขาไม่ตรงกับอารยธรรมที่อาศัยอยู่บนดาวเคราะห์ดวงใดที่รู้จักเลย\n\nโชคร้ายที่ลูกเรือของพวกเขาไม่สนใจในการเจรจาอย่างสันติเลยแม้แต่น้อย ข้อมูลอันน้อยนิดที่เราเก็บเกี่ยวได้จากการดักฟังการสื่อสารภายในกองยานระบุว่าพวกเขาเลี้ยงชีพด้วยการปล้นสะดมเป็นหลัก และในบางครั้งก็รับสมัครกลุ่มนอกรีตจากอารยธรรมท่องอวกาศต่าง ๆ มาร่วมอุดมการณ์ของพวกเขา"
 first_contact_critters.70.name:0 "ยานที่ไม่รู้จัก"
 first_contact_critters.70.desc:0 "ยานพาหนะที่ตรวจพบในระบบ [This.System.GetName] ดูเหมือนจะเป็นส่วนหนึ่งของการเดินทางสำรวจทั่วกาแล็กซีโดยไม่ทราบวัตถุประสงค์ พวกเขาไม่ได้เคลื่อนไหวในลักษณะที่เป็นศัตรู ทั้งไม่มีหลักฐานการติดตั้งอาวุธหนัก - ในทางตรงกันข้าม ดูเหมือนว่าพวกเขากำลังถ่ายทอดสัญญาณที่ซ้ำซากแต่ไม่มีเนื้อหาเป็นพิเศษมาในทิศทางทั่วไปของเรา [This.Owner.GetEnvoy] [This.Leader.GetName] ของเรารู้สึกสับสน แต่หวังว่าสัญญาณการออกอากาศจะช่วยให้เหล่า [This.Owner.GetLinguists] ของเราสามารถแปลภาษาของพวกเขาได้"
 first_contact_critters.70.desc.home:0 "ระบบ [This.System.GetName] ดูเหมือนจะเป็นที่ตั้งของสังคมที่ก้าวหน้าซึ่งไม่ทราบต้นกำเนิด อาศัยอยู่ในกลุ่มสถานีอวกาศทั่วทั้งระบบ [This.Owner.GetEnvoy] [This.Leader.GetName] ได้สังเกตเห็นยานหลายลำเคลื่อนที่ไปมาระหว่างสถานี รวมถึงการเดินทางสำรวจขนาดใหญ่หลายครั้งที่เดินทางออกจากระบบเพื่อวัตถุประสงค์ที่ไม่ทราบแน่ชัด ดูเหมือนว่าพวกเขากำลังส่งสัญญาณที่ซ้ำซากแต่ไม่มีเนื้อหาข้อมูลเป็นพิเศษมาทางเรา ซึ่งเป็นพัฒนาการที่สร้างความสับสนให้กับเหล่า [This.Owner.GetLinguists] ของเรา แต่อาจช่วยให้พวกเขาสามารถแปลภาษาของกลุ่มนี้ได้"
 first_contact_critters.70.A:0 "น่าแปลกใจ"
 first_contact_critters.70.B:0 "หนักใจ"
 first_contact_critters.70.C:0 "การกระทำของผู้ที่อยู่นอกรังนั้นแปลกประหลาดอย่างแท้จริง"
 first_contact_critters.70.D:0 "เราจะหยั่งรู้หนทางของสิ่งมีชีวิตอินทรีย์ได้อย่างไร?"
 first_contact_critters.75.name:0 "กองคาราวานอวกาศ"
 first_contact_critters.75.desc:0 "เราสามารถถอดรหัสข้อความที่ซ้ำซากและน่าสับสนที่ §H[This.ContactCountry.GetName]§! ส่งมาให้เราได้แล้ว และปรากฏว่าข้อความเหล่านั้นคือ... โฆษณาเชิงพาณิชย์! ดูเหมือนว่าพวกเขาจะเรียกตัวเองว่า §H[This.ContactCountry.GetRealName]§! และเป็นส่วนหนึ่งของกลุ่มพ่อค้าท่องอวกาศที่ทำมาหากินด้วยการเสนอข้อตกลงที่ดีที่สุด - หรือสิ่งที่พวกเขาอ้างว่าเป็นข้อตกลงที่ดีที่สุด - ให้กับอารยธรรมใดก็ตามที่พวกเขาเดินทางไปเยือนในขณะนั้น ตามรูปแบบของพวกเขา ดูเหมือนว่าพวกเขากำลังพยายามติดต่อเรา"
 first_contact_critters.75.desc.home:1 "เราสามารถถอดรหัสข้อความที่ซ้ำซากและน่าสับสนที่ §H[This.ContactCountry.GetName]§! ส่งมาให้เราได้แล้ว และปรากฏว่าข้อความเหล่านั้นคือ... โฆษณาเชิงพาณิชย์! ดูเหมือนว่าระบบ [This.System.GetName] จะเป็นระบบบ้านเกิดของกลุ่มพ่อค้าท่องอวกาศที่เรียกตัวเองว่า §H[This.ContactCountry.GetRealName]§! พวกเขาทำมาหากินด้วยการเสนอข้อตกลงที่ดีที่สุด - หรือสิ่งที่พวกเขาอ้างว่าเป็นข้อตกลงที่ดีที่สุด - ให้กับอารยธรรมใดก็ตามที่พวกเขากำลังไปเยือนในขณะนั้น"
 first_contact_critters.75.B:0 "เข้าใจแล้ว"
 first_contact_critters.75.B.tooltip:0 "ตอนนี้เราจะสามารถซื้อขายกับกองยานคาราวานได้ในครั้งต่อไปที่พวกเขาเข้ามาในน่านน้ำของเรา"
 first_contact_critters.80.name:0 "เศษซากอวกาศมีชีวิต?"
 first_contact_critters.80.desc:1 "[This.Owner.GetEnvoyCap] [This.Leader.GetName] ยังคงทำงานเพื่อยืนยันสมมติฐานที่ว่าสิ่งผิดปกติที่เรากำหนดไว้เป็น §H[This.ContactCountry.GetName]§! แท้จริงแล้วเป็นสิ่งมีชีวิต แม้ดูเหมือนจะประกอบขึ้นจากกลุ่มฝุ่นดาวแบบสุ่ม แต่มันก็สามารถพิสูบได้ว่าขับเคลื่อนตัวเองข้ามความเวิ้งว้างและแสดงสัญญาณพื้นฐานของการตัดสินใจด้วยตนเองอย่างเป็นอิสระ เหล่า [This.Owner.GetResearchers] ของเราต่างงุนงงกับปรากฏการณ์นี้ และกำลังทำงานอย่างหนักเพื่อตรวจสอบการวัดค่าของเรา"
 first_contact_critters.80.A:0 "เราต้องพลาดอะไรบางอย่างไปแน่ ๆ..."
 first_contact_critters.90.name:0 "$first_contact_critters.70.name$"
 first_contact_critters.90.desc:0 "ยานพาหนะที่ตรวจพบในระบบ [This.System.GetName] ดูเหมือนจะเป็นส่วนหนึ่งของการเดินทางสำรวจทั่วกาแล็กซีโดยไม่ทราบวัตถุประสงค์ พวกเขาไม่ได้เคลื่อนไหวในลักษณะที่เป็นศัตรู ทั้งไม่มีหลักฐานการติดตั้งอาวุธหนัก อย่างไรก็ตาม พวกเขาค่อนข้างสงวนท่าที และเราไม่สามารถรับสัญญาณจากพวกเขาได้มากนัก เหล่า [This.Owner.GetLinguists] ของเรามั่นใจว่าจะสามารถแปลภาษาของพวกเขาได้ในที่สุดจากเศษข้อมูลที่เรารวบรวมได้ ทว่าเรื่องนี้อาจใช้เวลาค่อนข้างนาน"
 first_contact_critters.95.name:0 "ชนเผ่าเร่ร่อน"
 first_contact_critters.95.desc:0 "เราได้จัดการถอดรหัสภาษาของความลึกลับ§H[This.ContactCountry.GetName]§!ของเรา[This.Owner.GetLinguists]ยังคงงอสําหรับค่อนข้างเวลาและ ความสําเร็จได้ทําเพียงเมื่อพวกเขาเริ่มออกอากาศ สิ่งที่ปรากฏออกมาเป็นข้อความต้อนรับระบุพวกเขาเป็น§H\"นามาเรียน\"§!ในทิศทั่วไป ดู เหมือน ว่า ตอน นี้ พวก เขา อยาก คุย กับ เรา มาก ขึ้น."
 first_contact_critters.100.desc:0 "กองยานที่เราเผชิญหน้าในระบบ [This.System.GetName] นั้นแตกต่างจากที่เราเคยเห็นในอวกาศแถบนี้มาก่อน มันดูเหมือนจะไม่ก้าวร้าว แต่เราทำได้เพียงคาดเดาถึงต้นกำเนิดหรือวัตถุประสงค์ที่นี่ การคาดเดาที่ดีที่สุดของเราคือ กองยานนี้เป็นตัวแทนของกลุ่มที่ไม่มีความสัมพันธ์อย่างเป็นทางการกับหน่วยงานท้องถิ่นหรืออารยธรรมใด ๆ"
 first_contact_critters.100.a:0 "ดำเนินการด้วยความระมัดระวัง"
 first_contact_critters.105.name:0 "กองยานที่เป็นกลาง"
 first_contact_critters.105.desc:0 "เราได้ถึงความไม่สงบกับกองทัพเรือ ระบุตัวเองเป็น§H[This.ContactCountry.GetRealName]§!การปรากฏตัวที่ผิดปกตินี้ ไม่สนใจส่วนใหญ่ของการทูตของเรา\n\nเราสงสัยว่าถ้าเรือมีเจ้าของใด ๆ ในความหมายปกติ มันจะต้องใช้มาตรการพิเศษที่จะเข้าถึงพวกเขา เมื่อ คํานึง ถึง เรื่อง นี้ เรา ได้ สรุป การ ค้น พบ ของ เรา สําหรับ ทีม ต่อ ไป ของ[this.owner.GetScientistPlural]เพื่อใช้ - ในกรณีที่โอกาสดังกล่าวเกิดขึ้น" # though we use a country tag here, the value it returns could be e.g. 'Unscrupulous Salvagers' OR 'Modified Probe', i.e. not a true country

