 tr_domination_trust_officers:0 "เจ้าหน้าที่น่าเชื่อถือ"
 tr_domination_trust_officers_desc:3 "§Yคําสั่งปลดล็อค:§! $edict_enhanced_surveillance$\n£unity£ §Yเอกภาพ§!ต่อ 100[enforcer.GetIcon] §Y[enforcer.GetNamePlural]§!: §G+1§! "
 tr_domination_trust_officers_delayed:0 "งาน สําคัญ ที่ ทํา โดย เจ้า หน้าที่ ตํารวจ จะ ประสบ ผล สําเร็จ ได้ ก็ ต่อ เมื่อ พวก เขา ร่วม มือ กับ สาธารณชน. การสร้างกลุ่มเจ้าหน้าที่ของรัฐ ที่ทํางานกับประชากรโดยตรง จะช่วยให้มั่นใจได้ว่าความร่วมมือนี้"
 tr_domination_judgment_corps:0 "คณะผู้พิพากษา"
 tr_domination_judgment_corps_desc:3 "§Yคําสั่งปลดล็อค:§! $edict_enhanced_surveillance$"
 tr_domination_judgment_corps_delayed:1 "ทั้ง เมือง ที่ แออัด และ ที่ ทํา เหมือง ที่ ห่าง ไกล ต่าง ก็ มี ข้อ ท้าทาย ที่ ไม่ เหมือน ใคร ซึ่ง เกี่ยว ข้อง กับ การ ป้องกัน อาชญากรรม. เพื่อเร่งให้มีการบังคับใช้กฎหมาย เราได้ทําให้กระบวนการยุติธรรมมีประสิทธิภาพมากขึ้น โดยการรวมบทบาทของผู้พิพากษา คณะลูกขุนและผู้บังคับ"
 tr_domination_deviancy_protocols:0 "วิธีการจัดการความเบี่ยงเบน"
 tr_domination_deviancy_protocols_desc:2 "§Y$MOD_PLANET_CRIME_NO_HAPPINESS_ADD$§! ลดลง §G10§! ในดาวเคราะห์ทั้งหมดของเรา"
 tr_domination_deviancy_protocols_delayed:1 "ความอ่อนแอและคอรัปชั่นจะต้องถูกป้องกันจากทุกระดับ ที่มีการตอบโต้ที่มีประสิทธิภาพ[GetIndividualNamePlural]ผู้ ที่ ถูก สงสัย เกี่ยว กับ กิจกรรม ที่ ผิด ปกติ อาจ เลิก ได้ อย่าง รวด เร็ว ก่อน ที่ พวก เขา จะ แพร่ กระจาย การ ทุจริต ไป อีก."
 tr_domination_divergence_supression:0 "การปราบปรามความแตกต่าง"
 tr_domination_divergence_supression_desc:1 "$tr_domination_deviancy_protocols_desc$"
 tr_domination_divergence_supression_delayed:0 "บางครั้งเอกภาพของเรา ก็ถูกรบกวนโดยพวกขี้โกง[GetIndividualName]ภัยคุกคามนี้เพิ่มขึ้น เมื่อเราแพร่กระจายออกไปตามดาว การขนและรีไซเคิลหน่วยเหล่านี้ ให้โอกาสพวกเขามีส่วน[GetGestaltEntityName]กับการตายของพวกเขา ในแบบที่พวกเขาไม่สามารถด้วยชีวิตของพวกเขา"

