 tr_domination_modular_depot_delayed:2 "เพื่อเพิ่มจํานวนของ[GetIndividualNamePlural]ที่สามารถขยายอาคารของเรา ที่เป็นเขตของเรา จะต้องมีประสิทธิภาพมากขึ้น การ ออก แบบ แบบ แบบ ที่ สลับ ซับ ซ้อน กว่า มาก."

 tr_domination_workplace_motivators:0 "แรงจูงใจในสถานที่ทำงาน"
