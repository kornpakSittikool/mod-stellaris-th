 ap_organo_machine_interfacing:0 "เชื่อมต่อของอวัยวะสิ่งมีชีวิตและเครื่องจักร"
 ap_organo_machine_interfacing_desc:0 "$ap_the_flesh_is_weak_desc$"
 organo_machine_interfacing_tooltip:1 "- เข้าถึง§Y$tradition_cybernetics$§!ต้นไม้ตามประเพณี$TABBED_NEW_LINE$- $REQUIRES_TRADITION_SLOT$\n- $UNLOCKS_AGENDA$ $council_agenda_agenda_organo_machine_interfacing_name$ซึ่งให้เทคโนโลยีไซเบอร์เนติกเป็นการวิจัยทางเลือก"
