 tr_unyielding_bulwark_of_harmony_desc:2 "ขณะอยู่ในสงคราม(ป้องกัน)กับจักรวรรดิอื่น §Y$MOD_STARBASE_SHIPYARD_BUILD_SPEED_MULT$§! เพิ่มขึ้น §G+33%§! นอกจากนี้ §Y$MOD_SHIP_FIRE_RATE_MULT$§! เพิ่มขึ้น §G+15%§! สำหรับยานภายในอาณาเขตของคุณ"
 tr_unyielding_bulwark_of_harmony_delayed:0 "สิ่ง มี ชีวิต ทุก ชนิด ไม่ ว่า สมบูรณ์ เพียง ไร ต้อง อาศัย ระบบ ภูมิ คุ้ม กัน เพื่อ ป้องกัน การ คุกคาม ของ โรค ภาย นอก. สังคมของเราไม่ต่างกัน"
 tr_unyielding_bulwark_of_harmony_hive_delayed:0 "สิ่ง มี ชีวิต ทุก ชนิด ไม่ ว่า สมบูรณ์ เพียง ไร ต้อง อาศัย ระบบ ภูมิ คุ้ม กัน เพื่อ ป้องกัน การ คุกคาม ของ โรค ภาย นอก. เดอะ[This.GetName]ไม่ต่างกัน"
 tr_unyielding_bulwark_of_harmony_machine_delayed:0 "ทุกสิ่งมีชีวิต ไม่ว่าสมบูรณ์แบบแค่ไหน ต้องพึ่งพาระบบการป้องกันภายใน เพื่อป้องกันภัยคุกคามภายนอก เดอะ[This.GetName]ไม่ต่างกัน"

 tr_unyielding_defensive_zeal:1 "แนวตั้งรับแรง กล้า"
 tr_unyielding_defensive_zeal_delayed:1 "เมื่อ พูด ถึง การ ปก ป้อง ดิน แดน และ การ ดํารง อยู่ ของ เรา ความ กระตือรือร้น ของ เรา จะ ได้ รับ ความ รู้สึก จาก ศัตรู อย่าง แน่นอน."
 tr_unyielding_defensive_zeal_desc:0 "§Yฐานดวงดาว§! และ §Yแพลตฟอร์มป้องกัน§! มี §Yขนาดขนาดขนาด HP§! และ §Yพลังโจมตี§! เพิ่มขึ้น §G33%§!"

 tr_unyielding_fortress_doctrine:0 "การป้องกันตนเอง"
 tr_unyielding_fortress_doctrine_delayed:1 "ระวังตัวตลอดเวลา ฝังอยู่ใน[This.GetAdj]มีสติ ตราบ ใด ที่ ยาม ของ เรา ยัง ไม่ ล้ม ลง ศัตรู ของ เรา ก็ จะ ไม่ สามารถ ทํา ให้ เรา ประหลาด ใจ ได้."
