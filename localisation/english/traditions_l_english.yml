 tr_unyielding_never_surrender_delayed:0 "เราจะต่อสู้บนดินของเรา เราจะต่อสู้ในสวรรค์ เราจะต่อสู้ในเข็มขัดดาวเคราะห์น้อย และในไฮเปอร์เลนและในเนบิวลา เราจะต่อสู้ด้วยความมั่นใจมากขึ้น และเพิ่มความแข็งแรงในหมู่ดาว เราจะไม่มีวันยอมแพ้"
 tr_unyielding_never_surrender_gestalt_delayed:0 "เรา จะ ไม่ ยอม แพ้ แก่ คน ด้อย กว่า. ให้พวกเขาโยนตัวเองกับการป้องกันที่ไม่สามารถทําลายของเรา! อีกพันปีจากนี้ พวกเขาจะเป็นแค่ เชิงอรรถ ในเรื่องราวของการขึ้นสู่สวรรค์ของเรา"

