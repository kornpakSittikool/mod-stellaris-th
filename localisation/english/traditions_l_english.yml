 ################################################################
 # EXPANSION
 ################################################################

 tradition_expansion:0 "การขยายอาณาเขต"
 #tradition_expansion_desc: "We must spread our civilization to new systems and planets if we are to survive. As other empires emerge on the galactic scene, competition will be fierce. The faster we can establish new colonies, the better."
 tradition_expansion_desc:0 "เราต้องขยายอารยธรรมของเราไปยังระบบและดาวเคราะห์ใหม่หรือจะเสี่ยงต่อการสูญพันธุ์ในที่สุด"
 tradition_expansion_machine_desc:0 "การคาดการณ์การเติบโตบ่งชี้ว่าอีกไม่นานเราจะเกินความจุสูงสุดของระบบในบ้านของเราแล้ว เราต้องขยายหรือหยุดนิ่ง"
 tradition_expansion_hive_desc:0 "มีเพียงสองรัฐที่เป็นไปได้สําหรับ[GetGestaltEntityName]การเติบโต หรือความตาย"
 tradition_expansion_void_desc:0 "เราต้องขยายอารยธรรมของเรา ไปยังระบบใหม่และถิ่นอาศัย หรือความเสี่ยงที่จะสูญพันธุ์"
 tr_expansion_adopt:0 "วัฒนธรรมการขยายอาณาเขต"

 tr_expansion_colonization_fever:0 "ความตื่นเต้นในการตั้งอาณานิคม"
 tr_expansion_colonization_fever_desc:1 "อาณานิคมใหม่เริ่มต้นด้วย§G100§!เพิ่มเติม£pop£ §Hป๊อป§!."
 tr_expansion_colonization_fever_delayed:0 "ไข้โคเลสเตอรอล ดูเหมือนจะกระตุ้นประชาชน ความ กระตือรือร้น และ ความ รัก ชาติ ของ พวก เขา ทํา ให้ มี ประชากร เพิ่ม ขึ้น ใน อาณานิคม แห่ง ใหม่."
 tr_expansion_colonization_fever_machine:1 "หน่วยตั้งอาณานิคมอัตโนมัติ"
 tr_expansion_colonization_fever_machine_delayed:1 "การผลิตของหน่วยการตั้งอาณานิคม ที่พิเศษอย่างยิ่ง โดยมีพฤติกรรมที่แคบแต่ลึก"
 tr_expansion_colonization_fever_hive:0 "ความคิดหนึ่งเดียว"
 tr_expansion_colonization_fever_hive_delayed:0 "โอเวอร์มิ้นท์เป็นคอรัสของความคิด ที่แม้ความว่างเปล่าเย็นของพื้นที่ ไม่สามารถเงียบ"

 tr_expansion_a_new_life:0 "ชีวิตใหม่"
 tr_expansion_a_new_life_desc: "£pop£ §Y$MOD_LOGISTIC_GROWTH_MULT$§!เพิ่มโดย§G+10%§!."
 tr_expansion_a_new_life_delayed:0 "ชีวิตใหม่รอพลเมืองของเรา อยู่ในอาณานิคมนอกโลก โอกาสที่จะเริ่มต้นอีกครั้ง ในดินแดนทองของโอกาสและการผจญภัย! ด้วยความช่วยเหลือจากการรณรงค์ทางการตลาดที่ก้าวร้าว องค์ประกอบที่โชคดีน้อยกว่า ของสังคมของเรา"
 tr_expansion_a_new_life_machine:1 "โปรโตคอลจับคู่แบบร้อน"
 tr_expansion_a_new_life_machine_desc:0 "£pop£ §Y$MOD_POP_ASSEMBLY_SPEED$§!เพิ่มโดย§G+10%§!."
 tr_expansion_a_new_life_machine_delayed:2 "ขั้น ตอน ใน การ รวบ รวม พ่อ ใหม่ อาจ ถูก เร่ง ให้ เร็ว ขึ้น โดย นํา คํา สั่ง ปฏิบัติ การ ของ พวก เขา ไป ใส่ ใน ขณะ ที่ พวก เขา ยัง คง ก่อ สร้าง อยู่."
 tr_expansion_a_new_life_hive:0 "วางไข่อย่างบ้าคลั่ง"
 tr_expansion_a_new_life_hive_desc:0 "$tr_expansion_a_new_life_desc$"
 tr_expansion_a_new_life_hive_delayed:0 "เมื่อ อ้าง ว่า มี รัง ใหม่ ฝัก พันธุ์ นี้ มี แรง กระตุ้น ที่ มี พลัง มาก ต่อ การ วาง ไข่ ใน อัตรา ที่ ไม่ เหมือน ใคร. โดยปกติพวกเขาจะตายจากสายพันธุ์ แต่กําเนิดของจํานวนความเร็วหุ่นยนต์สด การประมวลผลของโลกใหม่"

 tr_expansion_courier_network:0 "เครือข่ายขนส่ง"
 tr_expansion_courier_network_desc:5 "§Y$EMPIRE_SIZE$§! จาก §Yระบบ§! และ §Yอาณานิคม§! ลดลง §G25%§!"
 tr_expansion_courier_network_delayed:0 "เครือข่ายของเรือส่งของขนาดเล็ก เป็นทางเลือกที่เชื่อถือได้ สําหรับการจัดส่ง VIP หรือการส่งข้อความ นี่จะเชื่อมอาณานิคมของเราให้ชิดกันมากขึ้น"
 tr_expansion_courier_network_machine:0 "ซอฟต์แวร์ที่สามารถขยายได้"
 tr_expansion_courier_network_machine_delayed:0 "โดยการสร้างเครือข่ายซินแนปติกของเรา ที่มีการขยายตัวในอนาคต กับโลกอื่น ๆ ในความคิด เราสามารถลดการสูญเสียสัญญาณ"
 tr_expansion_courier_network_hive:2 "การควบคุมที่จำกัด"
 tr_expansion_courier_network_hive_delayed:1 "ไฮฟ์ ทุก คน ไม่ จําเป็น ต้อง ได้ รับ การ ควบคุม โดย อัตโนมัติ จาก โอเวอร์ มิ นด์ ตลอด เวลา แทน ที่ จะ เป็น เช่น นั้น พวก เขา สามารถ ได้ รับ คํา สั่ง พื้น ฐาน และ ทํา ตาม คํา แนะ นํา เหล่า นี้ โดย อัตโนมัติ จน กว่า จะ มี การ เรียก ร้อง ทิศ ทาง ใหม่."

 tr_expansion_reach_for_the_stars:0 "เข้าถึงดวงดาว"
 tr_expansion_reach_for_the_stars_desc:4 "§Y$MOD_COUNTRY_STARBASE_INFLUENCE_COST_MULT$§! ลดลง §G10%§!"
 tr_expansion_reach_for_the_stars_delayed:0 "อาณาเขตของชาติดาวของเรา ถูกผลักดันไปข้างหน้า ในไม่ช้า จะไม่มีอะไรในกาแล็กซี่นี้ ที่อยู่นอกเหนือความเข้าใจของเรา"
 tr_expansion_reach_for_the_stars_machine:0 "สถานีถ่ายทอดสัญญาณ"
 tr_expansion_reach_for_the_stars_machine_delayed:0 "ระยะ ทาง อัน กว้าง ใหญ่ ที่ มี อยู่ ใน การ สํารวจ อวกาศ ทํา ให้ เกิด ความ เสีย หาย ครั้ง ใหญ่ ระหว่าง ระบบ แกน กลาง กับ ระบบ รอบ นอก. สัญญาณที่เพิ่มสัญญาณ จะทําให้แน่ใจว่าคําสั่งจากแกน จะได้รับไม่สนใจ"
 tr_expansion_reach_for_the_stars_hive:0 "ไซแน็ปส์อะมีบา"
 tr_expansion_reach_for_the_stars_hive_delayed:0 "บรรจุไซแนปในเปลือกไฮเปอร์ไดรฟ์ขนาดเล็ก, แข็งสําหรับการต่อสู้ในอวกาศและใช้มันเพื่อผ่านในคําสั่งจาก[GetGestaltEntityName]ทําให้เราสามารถพิชิตดวงดาวได้"

 tr_expansion_galactic_ambition:0 "ความทะเยอทะยานกาแล็กติก"
 tr_expansion_galactic_ambition_desc:7 "§Y$mod_starbases_upkeep_mult$§! ลดลง §G20%§!"
 tr_expansion_galactic_ambition_delayed:0 "สักวันหนึ่ง ธงของจักรวรรดิอันยิ่งใหญ่ของเรา จะเป็นสามัญเช่นไฮโดรเจนทั่วกาแล็กซี่"
 tr_expansion_galactic_ambition_machine:0 "ความฝันในเครื่องจักร"
 tr_expansion_galactic_ambition_machine_delayed:0 "ทุกทรัพยากรดาว และไฮเปอร์เลน ที่ถูกควบคุมโดยเรา นําจักรวาลเข้าใกล้ความสมบูรณ์แบบ"
 tr_expansion_galactic_ambition_hive:0 "ลบล้างดวงดาว"
 tr_expansion_galactic_ambition_hive_delayed:0 "ความน่าสะพรึงกลัวจากเรื่องแรก มาสู่ความมืด ห่างจากรังของพวกเรา เฉพาะ แต่ โดย การ เอา ชนะ ความ กลัว นี้ และ ผสม พันธุ์ เท่า นั้น เรา จึง จะ เติบโต ต่อ ไป. โดรนเป็นล้านจะตาย เพื่อให้รังนี้มีชีวิต"

 tr_expansion_finish:0 "วัฒนธรรมการขยายอาณาเขตเสร็จแล้ว"
 tr_expansion_finish_machine:0 "วัฒนธรรมการขยายอาณาเขตเสร็จแล้ว"
 tr_expansion_finish_void_tooltip: "$MOD_PLANET_MAX_DISTRICTS_ADD$ บนที่อยู่อาศัยในอวกาศ: §G+1§!\nปลดล็อกการยกระดับ: §G+1§!"

 ################################################################
 # DOMINATION
 ################################################################

 tradition_domination:0 "การมีอำนาจเหนือกว่า"
 tradition_domination_desc:0 "หากเราไม่บังคับคนอื่น พวกเขาก็จะบังคับเราอย่างหลีกเลี่ยงไม่ได้"
 tradition_domination_machine_desc:0 "เราแสวงหาการทำงานที่มีความสามัคคีปรองดองกันทั่วทั้งกาแล็กซี่ สิ่งมีชีวิตที่อื่นๆต่อต้านสิ่งนี้เนื่องจากความต้องการส่วนตัวตามอำเภอใจที่ไร้ประสิทธิภาพ เราจะลบความผิดปกติของพวกเขาออกไปเช่นส่วนที่ทำงานผิดปกติ"
 tradition_domination_hive_desc:0 "ทุกสิ่งที่ไม่ใช่เราจะต้องรับใช้เรา หรือไม่ก็เป็นอาหารของเรา"
 tr_domination_adopt:0 "วัฒนธรรมการมีอำนาจเหนือกว่า"

 tr_domination_colonial_viceroys:0 "อุปราชอาณานิคม"
 #tr_domination_colonial_viceroys_desc:0 "§Y$MOD_LEADER_GOVERNOR_SKILL_LEVELS$§! increased by §Y2§!."
 tr_domination_colonial_viceroys_delayed:0 "การ ที่ เรา ควบคุม อาณานิคม นี้ ขึ้น อยู่ กับ การ ที่ เรา พบ บุคคล ที่ มี ความ สามารถ และ ภักดี ซึ่ง สามารถ ไว้ วางใจ ได้ ว่า จะ บังคับ ใช้ เจตจํานง ของ รัฐบาล."
 tr_domination_colonial_viceroys_machine:0 "AI ควบคุมตนเองอิสระ"
 tr_domination_colonial_viceroys_machine_delayed:0 "AI ที่ถูกปลดปล่อยจากตัวยับยั้งพฤติกรรมส่วนใหญ่ อาจจะมีแนวโน้มมากกว่า ที่จะดําเนินการอย่างไม่แน่นอน และอุบัติเหตุอย่างสุ่ม"
 tr_domination_colonial_viceroys_hive:0 "การชุมนุมของความคิด"
 tr_domination_colonial_viceroys_hive_delayed:0 "เราจะต้องมีมากขึ้นอัตโนมัติ[GetIndividualNamePlural]เพื่อบังคับความสามัคคีของเรา[GetGestaltEntityName]ขนาดโตขึ้น"

 tr_domination_grand_council:1 "คณะองคมนตรี"
 #tr_domination_grand_council_desc:0 "§Y$MOD_LEADER_RULER_SKILL_LEVELS$§! increased by §Y2§!."
 tr_domination_grand_council_delayed:2 "ที่ดีที่สุดและฉลาดที่สุด การแข่งขันเพื่อโอกาส ที่จะกระซิบคําแนะนํา ในเครื่องรับเสียงของผู้ปกครองที่มีชื่อเสียงของเรา"
 tr_domination_multi_thread:0 "ฟังก์ชันหลักแบบมัลติเทรด"
 tr_domination_multi_thread_delayed:1 "เมื่อฟังก์ชั่นหลักทั้งหมดได้รับการหลายเล่ม ไม่มีแกนตัวประมวลผลหลักจะเหลือให้นอนเปล่า"
 tr_domination_synaptic_network:0 "เครือข่ายระบบประสาท"
 tr_domination_synaptic_network_delayed:1 "จิตใจเท่านั้นที่สามารถทําหน้าที่อย่างรวดเร็วเท่าที่จะได้รับข้อมูลและข้อมูลจาก[GetIndividualNamePlural]ภายใต้การควบคุมของมัน ด้วยเครือข่ายซินแนปติกที่เร็วและมีประสิทธิภาพมากขึ้น การล่าช้าในการตอบสนองจะเป็นอดีต"

 tr_domination_imperious_architecture:0 "สถาปัตยกรรมที่ครอบงำ"
