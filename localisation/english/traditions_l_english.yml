 tr_supremacy_natural_preeminence_delayed:0 "มันเป็นความจริงที่ไม่สามารถถามได้ ว่าตามธรรมชาติแล้ว เรานั้นดีกว่าสายพันธุ์อื่น เรา ควร ทํา ให้ แน่ ใจ ว่า ความ จริง ข้อ นี้ เป็น ที่ รู้ จัก กัน ทั่ว ไป สําหรับ ทุก คน เพื่อ ว่า ประชาชน ของ เรา จะ ชื่นชม ยินดี ใน ความ ดี เลิศ ของ ตน และ เพื่อ คน อื่น จะ สามารถ ยอม รับ ชะตา กรรม ที่ เรา เลือก อย่าง ถูก ต้อง เพื่อ พวก เขา."

