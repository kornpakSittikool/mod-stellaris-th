 tradition_expansion_nomad_desc: "โดยการสร้างยานอาร์คชิปใหม่ และขยายเส้นทางของเรา อารยธรรมของเราจะโคจรรอบดาวตลอดไป"
 tr_expansion_colonization_fever_nomad: "เรือ รบ อาร์ม า ดา"
