 BIOGENESIS_02: "ยานเปลือกแข็ง"

 graphical_culture_tooltip_not_biological: "ไม่มีชุดเซตยาน ['concept_biological_ship', ชีวภาพ]"
 graphical_culture_tooltip_biological: "ต้องมีชุดเรือ ['concept_biological_ship', ชีวภาพ]"
 concept_biological_ship: "เรือชีวภาพ"
 concept_biological_ships: "เรือชีวภาพ"
 concept_biological_ship_desc: "- เรือชีวภาพใช้คลาสเรือรบเฉพาะทาง มีบทบาทชัดเจนและเติบโตได้สามระยะ$NEW_LINE$- ค่าก่อสร้างใช้ $i_food$ เป็นหลักแทน $i_alloys$$NEW_LINE$- ค่าบำรุงรักษาใช้ $i_food$ เป็นหลักแทน $i_energy$$NEW_LINE$- พึ่งพาเทคโนโลยี §Y£society£ชีววิทยา§! แทน §Y£engineering£ยานอวกาศ§!$NEW_LINE$$h_line$§Lยานมีชีวิตขนาดมหึมาที่เกิดจากกล้ามเนื้อ ชีวแสง และอวัยวะขับเคลื่อนเฉพาะทาง สามารถเติบโต ปรับตัว และออกรบได้เหมือนระบบนิเวศหนึ่งเดียว§!"

 default_ship: "เรือจักรกล"
 bio_ship: "เรือชีวภาพ"

 #Shipset Descriptions
 biogenesis_01_shipset_desc: "§Hชนิดชุดเรือ: ['concept_biological_ship', ชีวภาพ]§!\nเกิดขึ้นมากพอ ๆ กับถูกสร้างขึ้น เรือรบมีชีวิตเหล่านี้สะท้อนสัญชาตญาณนักล่าขั้นสูง ชีวมวลกึ่งมีสติของพวกมันปรับตัว ไล่ล่า และโจมตีอย่างไม่รู้จักอิ่ม"
 biogenesis_02_shipset_desc: "§Hชนิดชุดเรือ: ['concept_biological_ship', ชีวภาพ]§!\nเพาะพันธุ์มาเพื่อผู้กล้า ยานเปลือกแข็งเหล่านี้ไม่ได้แค่รับใช้ แต่เติบโตและทนทานไปพร้อมกับนักสำรวจที่ยึดพวกมันเป็นบ้าน"
 humanoid_01_shipset_desc: "แข็งแรงและมั่นคง ยานเหล่านี้สร้างมาเพื่อฝ่าบททดสอบของห้วงอวกาศ พวกมันบรรทุกความหวังของผู้สร้างไปจนถึงดวงดาวที่ไกลที่สุด"
 synthetics_01_shipset_desc: "ดีไซน์เหล่านี้สะท้อนความแม่นยำของจิตสำนึกจักรกล แผงระบายความร้อนและวงจรซ้ำซ้อนช่วยให้ระบบทำงานไร้ที่ติ"
 mammalian_01_shipset_desc: "สร้างมาเพื่อความทนทาน โครงเรือหนาแน่นและระบบสำรองหลายชั้นสะท้อนความอดทนของผู้สร้างในสภาพแวดล้อมอวกาศอันโหดร้าย"
 reptilian_01_shipset_desc: "รูปทรงเหลี่ยมและเน้นประโยชน์ใช้สอย สื่อถึงความทรหดของนักล่าเลือดเย็นที่เอาตัวรอดได้ในทุกสนามรบ"
 avian_01_shipset_desc: "สง่างามและเพรียวลม เส้นโค้งของยานเหล่านี้สะท้อนสายพันธุ์ที่มองอวกาศเป็นส่วนต่อของท้องฟ้า"
 arthropoid_01_shipset_desc: "ไม่ว่าจะเป็นไคตินหรือโลหะ โครงสร้างแบบชั้นซ้อนของยานเหล่านี้ให้ความสำคัญกับการอยู่รอดเหนือความงดงาม"
 molluscoid_01_shipset_desc: "ทั้งสง่างามและทนทาน ยานเปลือกแข็งเหล่านี้เป็นได้ทั้งที่พักพิงและหอกนำรบ พร้อมระบบภายในที่ควบคุมพลังงานอย่างเงียบเชียบ"
 fungoid_01_shipset_desc: "ยานทรงปุ่มนูนเหล่านี้ชวนให้นึกถึงการผลิบานของเชื้อรา ระบบภายในแตกแขนงเหมือนเส้นใยไมซีเลียมเพื่อความพึ่งพาตนเอง"
 plantoid_01_shipset_desc: "ยานสีเขียวเหล่านี้ไม่ได้แค่เดินทางท่ามกลางดวงดาว แต่หยั่งรากอยู่กับมัน ส่วนขับเคลื่อนสังเคราะห์แสงช่วยรักษาสมดุลของชีวนิเวศบนยาน"
 lithoid_01_shipset_desc: "หล่อหลอมจากเวลาและแรงกดดัน ยานคล้ายหินเหล่านี้ใช้โครงผลึกซิลิคอนค้ำจุนระบบหลักอย่างมั่นคง"
 necroid_01_shipset_desc: "มืดหม่นและน่าเกรงขาม มหาวิหารลอยฟ้าเหล่านี้เป็นอนุสาวรีย์แห่งความตาย การเกิดใหม่ และอำนาจจากห้วงว่าง"
 nemesis_01_shipset_desc: "ใหญ่โตและกดข่ม โครงสร้างเสริมแรงของยานเหล่านี้ฉายภาพอำนาจเหนือชั้นและการบังคับให้ยอมจำนน"
 aquatic_01_shipset_desc: "ไหลลื่นแต่ทรงพลัง ยานเหล่านี้ถ่ายทอดพลังแห่งมหาสมุทรผ่านโครงร่างอุทกพลศาสตร์และภายในที่เปี่ยมด้วยของเหลว"
 toxoid_01_shipset_desc: "ยานเหล่านี้รั่วไอพิษ สั่นสะเทือน และท้าทายทุกกฎความปลอดภัย แต่ก็ยังทำงานได้ด้วยของเสียและความดื้อดึงของวิศวกรรม"
 cybernetics_01_shipset_desc: "โครเมียมแวววาว วงจรคำราม และการเชื่อมต่อประสาทตรงทำให้ยานเหล่านี้ตอบสนองได้แทบไร้ความหน่วง"

