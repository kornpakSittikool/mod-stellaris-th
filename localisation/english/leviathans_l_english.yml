 SHIP_GRAPHICS_SPACE_AMOEBA_DESC: "สิ่งมีชีวิตเรืองแสง ที่เต้นช้า ส่องแสง การ เคลื่อน ไหว ของ มัน บ่ง ชี้ ถึง เชาวน์ ปัญญา ที่ แปลก และ จงใจ แม้ ว่า วัตถุ ประสงค์ ของ มัน ยัง คง เป็น เรื่อง ลึกลับ."
 SHIP_GRAPHICS_SPACE_AMOEBA_MOTHER_DESC: "ตัว ที่ ใหญ่ กว่า และ เก่า กว่า ชนิด อื่น ๆ ของ มัน นี้ ทํา ให้ เกิด ความ โน้ม ถ่วง ที่ เงียบ สงบ. บางคนเชื่อว่ามันนําทางให้รูปร่างที่เล็กกว่า ผ่านสัญชาตญาณหรือบางสิ่งที่ลึก"
 SHIP_GRAPHICS_SPACE_WHALE_1_DESC: "มี การ ค้น พบ ซาก ปรัก หัก พัง ของ ดาว เปราะ เหล่า นี้."
 SHIP_GRAPHICS_SPACE_WHALE_2_DESC: "ขนาดใหญ่และช้าการเคลื่อนไหวนี้สัตว์ที่มีเครื่องหมายของอายุผู้คุมวิญญาณแผลเป็นและกําลังถอดรหัสสิ่งมีชีวิตผูกติดอยู่กับการซ่อนที่กว้างใหญ่"
 SHIP_GRAPHICS_SPACE_WHALE_3_DESC: "สเปกตรัมและสเปกตรัม ตัวอย่างนี้เดินทางคนเดียว ผ่านพายุไอออนและเนบิวลา บาง คน บอก ว่า เส้น ทาง ที่ สว่างไสว ของ มัน เป็น รูป แบบ ของ การ สื่อ ความ."
 SHIP_GRAPHICS_SPACE_WHALE_4_DESC: "หนวดยาวลอยอยู่เบื้องหลังนี้ สัตว์เดินทางอวกาศ ส่องแสงเหมือนผีในแสงดาว ดูเหมือนว่ามันจะดึงดูดให้เข้าสู่ภูมิภาคที่มีความรุนแรงมาก ด้วยเหตุผลที่ไม่ทราบ"
 SHIP_GRAPHICS_SPACE_WHALE_5_DESC: "ที่ยากและยาก ชนิดนี้ปล่อยคลื่นความถี่ต่ํา ที่มีลักษณะแปลกกับเรื่องท้องถิ่น หลาย คน ที่ เห็น เหตุ การณ์ นั้น รายงาน ถึง ความ รู้สึก เกรง ขาม..."
 SHIP_GRAPHICS_VOIDWORMS_SMALL_DESC: "ลูก ศร เหล่า นี้ มี บาป ร้าย แรง และ รวด เร็ว ผ่าน อวกาศ เช่น การ สะท้อน เสียง ของ ภาษา ที่ ถูก ลืม. รูป ร่าง ของ มัน ดู เหมือน เป็น เพียง ส่วน หนึ่ง ที่ ยึด ติด กับ เครื่อง บิน วัตถุ."
 SHIP_GRAPHICS_VOIDWORMS_MEDIUM_DESC: "หนอนอวกาศขนาดใหญ่บิดผ่านจักรวาล ด้วยพระคุณที่ไม่แน่นอน พื้น ผิว ของ มัน เป็น ประกาย ด้วย รูป แบบ ที่ ไม่ อาจ อธิบาย ได้ ทํา ให้ ทั้ง ความ งาม และ ความ ไม่ หมด หวัง."
 SHIP_GRAPHICS_VOIDWORMS_LARGE_DESC: "แมลง สาบ ตัว นี้ บิน ได้ อย่าง ปลอด ภัย. ผู้ สังเกตการณ์ รายงาน ถึง ความ ผิด ปกติ ทาง การ แพทย์ และ การ มอง เห็น แวบ เดียว เมื่อ อยู่ ใกล้ ๆ."
 SHIP_GRAPHICS_CUTHOLOIDS_DESC: "สิ่ง มี ชีวิต โบราณ และ มี หนวด เหล่า นี้ ลอย อยู่ ใน ความ เงียบ มอง ด้วย สายตา ที่ มอง ไม่ เห็น. การ ที่ พวก เขา อยู่ ที่ นั่น ทํา ให้ เครื่อง มือ ต่าง ๆ ชะงัก งัน และ ความ คิด ต่าง ๆ ของ พวก เขา ชะงัก งัน."
 SHIP_GRAPHICS_CUTHOLOIDS_HATCHLING_DESC: "ตัว อย่าง หนุ่ม ๆ ยัง คง เติบโต เป็น ตัว ที่ ไม่ อาจ เข้าใจ ได้. ทั้ง ๆ ที่ มี ขนาด เท่า นั้น มัน ก็ ยัง เผย ให้ เห็น ความ สงบ อัน ลึกลับ ซึ่ง ทํา ให้ จิตใจ เปราะ บาง."
 SHIP_GRAPHICS_CUTHOLOIDS_JUVENILE_DESC: "ไม่ใช่การฟักตัวแล้ว แต่ยังไม่โตเป็นผู้ใหญ่ ตัวนี้แสดงรูปแบบการเคลื่อนไหวและแสงที่ไม่ปกติ บางคนบอกว่าฝันมันดัง, ในความถี่ที่เราไม่เข้าใจ"
 SHIP_GRAPHICS_VOIDWORMS_TITAN_DESC: "พวก มัน จะ ออก มา จาก รัง ของ มัน เพื่อ หา อาหาร กิน."
 SHIP_GRAPHICS_CRYSTAL_SHIP_SMALL_BLUE_DESC: "และเดินทางผ่านอวกาศ ด้วยแรงขับเคลื่อนที่จํากัด คน ส่วน ใหญ่ จะ สูญ เสีย ความ ว่าง เปล่า ตลอด กาล."
 SHIP_GRAPHICS_CRYSTAL_SHIP_MEDIUM_BLUE_DESC: "คริสตัลชาร์ดมาจากสฮาร์ดลิงส์ โชคดีพอที่จะโจมตีดาวเคราะห์น้อยขนาดใหญ่พอ ปัจจุบัน กําลัง ใกล้ จะ ถึง เรือ ผลึก ขนาด ใหญ่ เหล่า นี้ ใน ที่ สุด ก็ จะ ออก ไป เสาะ หา ดาว เคราะห์ ลอย ด์ เพื่อ จะ งอก ขึ้น อีก."
 SHIP_GRAPHICS_CRYSTAL_SHIP_LARGE_BLUE_DESC: "คริสตัลไลน์ ควอนเตสเซนซ์เติบโตเต็มที่ และพื้นผิวของมันจับแสงได้ แม้ จะ ไม่ ใช่ กลุ่ม ชน แต่ ก็ ยัง มี การ สังเกต ว่า องค์กร เหล่า นี้ ยัง ใช้ มวล ของ มัน เพื่อ นํา ลูก สลอท ไป ยัง ดาว เคราะห์ น้อย."
