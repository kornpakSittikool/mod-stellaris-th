 leviathans.141:0 "[From.GetName]ถูกทําลาย" #trader enclave country
 leviathans.141.desc:1 "ทรัพย์สินของกองทัพเรือของเรา ได้ทําลาย[From.GetName]สํานักงานใหญ่ ความ พยายาม จะ กู้ สิ่ง มี ค่า ให้ มาก ที่ สุด เท่า ที่ เป็น ไป ได้ จาก ซาก ปรัก หัก พัง ของ ฐาน ดาว ของ มัน. เราได้ทรัพยากรมากมาย"

 leviathans.142.a.desc:0 "$leviathans.142.desc.first$ $leviathans.142.desc.known$ $leviathans.142.desc.second$"
 leviathans.142.b.desc:0 "$leviathans.142.desc.first$ $leviathans.142.desc.unknown$ $leviathans.142.desc.second$"
 leviathans.142.c.desc:0 "$leviathans.142.desc.first$ $leviathans.142.desc.known$ $leviathans.142.desc.second$\n\n$leviathans.142.desc.trade$"
 leviathans.142.d.desc:0 "$leviathans.142.desc.first$ $leviathans.142.desc.unknown$ $leviathans.142.desc.second$\n\n$leviathans.142.desc.trade$"
 leviathans.142.desc.first:1 "สํานักงานใหญ่ของบริษัท§YXuraCorp§!ใน[trader_system.GetName]ระบบเพิ่งถูกทําลาย"
 leviathans.142.desc.known:1 "รายงานระบุว่ากองกําลังจู่โจมเป็นของ[trader_destroyer.GetName]!"
 leviathans.142.desc.unknown:1 "ตามข้อมูลของเรา การกระทํานี้ถูกกระทําโดยกองกําลัง ที่ยังไม่ทราบมาก่อน"
 leviathans.142.desc.second:0 "สมาชิกคณะกรรมการที่รอดชีวิตไม่กี่คนได้ประกาศล้มละลาย และทรัพย์สินที่เหลือของบรรษัทถูกชําระบัญชี"
 leviathans.142.desc.trade:1 "แต่โชคร้ายที่โรงงานผลิตแก๊สเอ็กซ์เซติก ถูกทําลายไปพร้อมกับ Xurorp HQ"
 leviathans.142.a:0 "การทําลายการค้าเสรี"
 leviathans.142.b:1 "เราจ่ายเงินจํานวนมากสําหรับก๊าซที่!"

 leviathans.143.a.desc:0 "$leviathans.143.desc.first$ $leviathans.143.desc.known$"
 leviathans.143.b.desc:0 "$leviathans.143.desc.first$ $leviathans.143.desc.unknown$"
 leviathans.143.c.desc:0 "$leviathans.143.desc.first$ $leviathans.143.desc.known$\n\n$leviathans.143.desc.trade$"
 leviathans.143.d.desc:0 "$leviathans.143.desc.first$ $leviathans.143.desc.unknown$\n\n$leviathans.143.desc.trade$"
 leviathans.143.desc.first:1 "ฐานดาวเป็นของ§Yแลกเปลี่ยนสินค้าแบบแท่ง§!ถูกทําลายใน[trader_system.GetName]ระบบ ด่านฟรีนี้ได้มีความสะดวกในการค้าขายระหว่างอารยธรรม ระหว่างดวงดาวกว่า สหัสวรรษ แต่ไม่ได้อีกต่อไป"
 leviathans.143.desc.known:0 "พลังของ[trader_destroyer.GetName]ทําให้แน่ใจว่าอย่างนั้น"
 leviathans.143.desc.unknown:0 "กองกําลังจากผู้รุกรานที่ไม่ทราบชื่อ ได้ทําให้มั่นใจ"
 leviathans.143.desc.trade:1 "แต่น่าเสียดายที่นี้ยังได้กําจัดแหล่งของจุดโวลตาลี เราจะไม่มีการเข้าถึง ช่องทรัพยากรเชิงยุทธศาสตร์นี้"
 leviathans.143.a:0 "การพัฒนาที่น่ากลัว"
 leviathans.143.b:0 "เรา จ่าย เงิน เต็ม จํานวน สําหรับ เครื่อง เทศ นั้น!"

 leviathans.144.a.desc:0 "$leviathans.144.desc.first$ $leviathans.144.desc.known$ $leviathans.144.desc.second$"
 leviathans.144.b.desc:0 "$leviathans.144.desc.first$ $leviathans.144.desc.unknown$ $leviathans.144.desc.second$"
 leviathans.144.c.desc:0 "$leviathans.144.desc.first$ $leviathans.144.desc.known$ $leviathans.144.desc.second$\n\n$leviathans.144.desc.trade$"
 leviathans.144.d.desc:0 "$leviathans.144.desc.first$ $leviathans.144.desc.unknown$ $leviathans.144.desc.second$\n\n$leviathans.144.desc.trade$"
 leviathans.144.desc.first:1 "รายงานเข้ามาว่าสํานักงานใหญ่§Yสัญญาอนุญาตสิทธิ์§!ใน[trader_system.GetName]ระบบได้ถูกรื้อถอน"
 leviathans.144.desc.known:1 "พลังของ[trader_destroyer.GetName]ดูเหมือนอยู่เบื้องหลังการโจมตีครั้งนี้"
 leviathans.144.desc.unknown:1 "ผู้โจมตีดูเหมือนจะมาจากจักรวรรดิ ซึ่งเรายังไม่รู้"
 leviathans.144.desc.second:1 "มี พ่อค้า ไม่ กี่ คน ที่ รอด ชีวิต มา ได้ ซึ่ง เป็น ผู้ บังคับ บัญชา ได้ กระจาย กัน ไป ทั่ว กาแล็กซี."
 leviathans.144.desc.trade:2 "แต่ น่า เสียดาย นี่ หมาย ถึง การ ยุติ การ ผลิต คริสตัล ราเร ที่ มี เกียรติ. เราจะไม่มีการเข้าถึง ช่องทรัพยากรเชิงยุทธศาสตร์นี้"
 leviathans.144.a:0 "การเจรจาต่อรองที่สําคัญ"
 leviathans.144.b:0 "คริสตัลของเรา! นี้จะต้องไม่ได้รับคําตอบ!"

 leviathans.150.desc:1 "ลูกค้าที่รัก เราเสียใจที่ต้องแจ้งคุณ ว่าข้อตกลงการค้าที่เราต่อรอง เพื่อส่งออกก๊าซ เอ็กซ์เซติก[Root.GetName]ได้ดําเนินการหลักสูตรของ เรายินดีที่จะขยายข้อตกลงไปอีก 10 ปี ถ้าคุณมีหน่วยกิตพลังงาน..."
 leviathans.150.a:0 "ดีมาก เราต้องการต่อสัญญาข้อตกลงก่อนหน้านี้"
 leviathans.150.b:1 "เราจำเป็นไม่ต้องใช้แก๊สของคุณในตอนนี้"
 leviathans.150.c:0 "เราไม่สามารถทำข้อตกลงนี้ต่อได้"
 leviathans.151.desc:1 "เราได้บรรลุข้อตกลงแล้ว[Root.GetSpeciesName]เราส่งภูเขาไฟกากบาทไปยังโลกของคุณเป็นเวลาสิบปี เราควรต่อเติมอีก 10 หรือเจ้าต้องการยุติข้อตกลงนี้"
 leviathans.151.a:1 "ขอ ให้ เรา ทํา ต่อ ไป. กากบาทต้องไหล"
 leviathans.151.b:0 "เราไม่ต้องการเครื่องเทศสําหรับตอนนี้"
 leviathans.152.desc:1 "หลายปีผ่านไป[Root.GetSpeciesName]? มันผ่านมาสิบปีแล้ว ตั้งแต่เราเจรจาซื้อขายกับเร คริสตัล คุณอยากขยายข้อตกลงไปอีกสิบปีไหม"
 leviathans.152.a:0 "ใช่ ให้เราดําเนินการต่อ"
 leviathans.152.b:0 "เราจะผ่านในคริสตัลของคุณสําหรับตอนนี้"

 leviathans.156.desc:0 "การโจมตีอย่างประมาทของคุณ ทําให้ทรัพย์สินของ Xurorp และพนักงานที่มีความเสี่ยง เราไม่มีทางเลือก นอกจากยุติข้อตกลงการค้าในปัจจุบัน จะไม่มีการคืนเงิน"
 leviathans.156.desc.notrade:0 "การโจมตีโดยไม่ยั้งคิดของคุณ เป็นอันตรายต่อทรัพย์สินของ Xurorp และพนักงานเหมือนกัน คุณควรจะจําไว้ว่า ความสัมพันธ์ระหว่างลูกค้าที่ดีทั้งสองทาง"
 leviathans.156.a:0 "ยุติการติดต่อสื่อสาร"
 leviathans.157a.desc:0 "ฉันเกรงว่ามันขัดกับนโยบายของบริษัท ที่จะทําธุรกิจกับโจรสลัด"
 leviathans.157b.desc:0 "คุณไม่ใช่ลูกค้าที่ยอมรับได้"
 leviathans.157c.desc:0 "เราไม่มีอะไรต้องคุยกับคุณ"
 leviathans.159.desc:1 "การโจมตีของคุณกับสถานีของเราเป็นต่อเนื่อง!คุณถูกตัด คุณเข้าใจมั้ย คุณอาจพิจารณาข้อตกลงการค้าของเรา เป็นโมฆะ"
 leviathans.159.desc.notrade:0 "การโจมตีครั้งนี้ไม่มีสาเหตุ และไม่ได้รับคําขอร้อง! เราจะไม่สู้เพื่อมัน คิดเสียว่าตัดตัวเองออก" #addressing the player empire as a whole
 leviathans.160a.desc:0 "เจ้าเป็นชนชาติที่มีโจรและอาชญากร เราจะไม่เกี่ยวอะไรกับคุณ"
 leviathans.160b.desc:0 "โจรสลัดสวะ"
 leviathans.160c.desc:0 "การจู่โจมของคุณ ให้อภัยไม่ได้"
 leviathans.162.desc:2 "อาดังนั้นโจรสลัดแสดงสีที่แท้จริงของพวกเขา! ลืมข้อตกลงการค้าของเราซะ ไม่มีมูทาแกนจะทําธุรกิจกับ[Root.GetName]อีกครั้ง"
 leviathans.162.desc.notrade:0 "เจ้ากล้าโจมตีเราหรือ รู้ไว้นะ โจรสลัด เราไม่ยืนหยัดเพื่อลัทธิป่าเถื่อน"
 leviathans.163a.desc:0 "คุณเป็นผู้ก่อการร้าย! อย่าคิดว่าเราจะลืมความก้าวร้าวของคุณที่มีต่อคนของเรา"
 leviathans.163b.desc:0 "คุณจะพบว่ามุทาแกนมีความทรงจําที่ยาวนาน[Root.GetSpeciesName]เราไม่เคยลืมเล็กน้อย"
 leviathans.163c.desc:0 "เราจะไม่มีวันเชื่อ[Root.GetName]อีกครั้ง"

##################
# ARTISAN ENCLAVE
##################

 ENCLAVE_DIPLOMACY_TITLE: "อิน ค รีฟ ดิ ปา ตี"

 leviathans.295.desc:0 "ผู้มาเยือน! นี่ เป็น โอกาส ที่ น่า ยินดี จริง ๆ! โอ้ ยกโทษให้มารยาทฉันด้วย ผมเชื่อว่ามีการแนะนําตัวตามลําดับ เราคืออาร์ติซาน โทรเป้\n\nสมาชิกของเราได้อุทิศชีวิตของพวกเขา เพื่อแสวงหาศิลปะ ดนตรี วัฒนธรรม และสิ่งอื่น ๆ กรุณาถ้าคุณต้องการที่จะมีส่วนร่วมในความ มหัศจรรย์ของการสร้างของเรา อย่าลังเลที่จะติดต่อกับเรา!"

 leviathans.300.name:0 "§Yอองครีฟ:§!อาร์ ที เชีย น"
 leviathans.300.desc:3 "สวัสดี! ฉันอาจารย์ใหญ่ของอา ริ ซิ ทานขอให้คุณวันสร้างสรรค์\n\nจะให้เราทําอะไร บาง ที คุณ อาจ ผลิต ผล งาน ศิลปะ ให้ คุณ เพลิดเพลิน? หรือคุณอาจต้องการที่จะสนับสนุนเรา ในการสร้างความงามของโลกอื่นได้หรือไม่" #'do you for' phrasing is intentional, humorous
 leviathans.300a.desc:0 "หืม? โอ้ ยกโทษให้ฉันด้วยนะ บางครั้งแรงบันดาลใจของฉันก็... มีอะไรให้เรารับใช้อีกไหม"
 leviathans.300b.desc:0 "คุณเคยหยุดสงสัยถึงความยิ่งใหญ่อลังการของสิ่งทั้งหมดนี้หรือไม่? นี่ไง เรามาแล้ว และนั่นไง โอกาสที่เหลือเชื่อ! ฉันรู้สึกว่าบทเพลงกำลังจะมา"
 leviathans.300c.desc:0 "ครับ? ฮัลโหล? อา นั่นคุณ! ยกโทษให้ฉัน; ฉันติดอยู่ไล่ซิงซาที่หายากโดยเฉพาะอย่างยิ่ง ผมจะช่วยอะไรได้บ้าง?"
 leviathans.300.a:1 "เราอยากจ้างให้สร้าง §Yงานศิลปะชิ้นหนึ่ง§!"
 leviathans.300.a.reply:0 "น่าเศร้าที่เราไม่สามารถนําเสนอใด ๆ เพิ่มเติม กลัวว่าเราจะมาเชื่อว่า คุณไม่ได้ชื่นชมคนที่คุณซื้ออยู่แล้ว เรามีความซื่อสัตย์ที่จะคิดเกี่ยวกับคุณจะเห็น"
 leviathans.300.b:1 "เราหวังว่าจะได้เป็น §Yผู้อุปถัมภ์§! ของคุณ"
 leviathans.300.b.stop:1 "เราต้องการ §Yยกเลิกการอุปถัมภ์§!"
 leviathans.300.b.stop.tooltip:0 "§Rหยุด§! การเพิ่มขึ้นของ £opinion£ ทัศนคติ ต่อเดือน\n\n"
 leviathans.300.b.reply:2 "อ๋อ เข้าใจแล้ว นั่นคือโชคร้าย[root.GetSpeciesAdj]แต่เราขอขอบคุณ สําหรับการสนับสนุนเริ่มต้นของคุณ\n\nลาก่อน"
 leviathans.300.c:1 "จัดงาน §Yเทศกาล§! ทั่วทั้งดาวเรา"
 leviathans.300.c.allow:0 "ต้องการ §Yคณะศิลปินอาร์ติซาน§! ให้มี:\n£opinion£ ทัศนคติ +50"
 leviathans.300.c.outofstock:2 "เราอาจจัดงาน §Yเทศกาล แห่ง โลก§! ได้เพียงครั้งเดียวในทุก 20 ปี"
 leviathans.300.d:1 "§Yบอกเราเพิ่มเติม§! เกี่ยวกับคณะของคุณ"
 leviathans.300.d.reply:1 "เราคืออาร์ติซาน โทรเป้เดอะชราวด์ประกอบไปด้วยหลายสถานีที่อาศัยอยู่โดยสร้างสรรค์ จากหลายโลก ทั้งหมดรวมกันอยู่ในความ ปรารถนาในการสร้างความงามใหม่ในที่หลบภัยเหล่านี้ พวกเขานําความคิดและวิธีการของพวกเขาจากทุกกาแล็กซี และร่วมกันเราค้นพบการแสดงออกสูงสุดของตัวเอง!\n\nเราจัดหาบริการมากมายให้กับคนที่อยากสนุกกับศิลปะ ถ้าคุณช่วยสนับสนุนงานของเรา เราอาจจะยินดีที่จะจัดการงานใหญ่ให้คนของคุณ"
 leviathans.300.e:0 "คุณสามารถทำอะไรอีกได้บ้าง?"
 leviathans.300.f:1 "เราอยากลงทุนใน §Yกระทรวงวัฒนธรรม§!"

 leviathans.301.name:0 "เดอะ[from.GetName]" #country - may return as an unknown name
 leviathans.301.desc:0 "ชาว อา ริ ส โต เติลจะไม่ตอบสนองต่อลูกเห็บของเรา"
 leviathans.301.desc.unknown:1 "นอกจากการแปล เมื่อเราแลกเปลี่ยนข้อมูลกับ[From.GetName]พวกเขาปิดทุกช่องและปฏิเสธที่จะพูดคุยกับเรา"
 leviathans.301.a:0 "พวกเขากล้าดียังไง"

 leviathans.304a.desc:0 "ขอบคุณมากครับอ้าเช่นการกระทําเกียรติมันคือการช่วย นําศิลปะมากขึ้นในจักรวาล เรามั่นใจว่าคุณจะพอใจ"
 leviathans.304b.desc:0 "ดวงดาวที่ส่องแสงที่บิตสดใสมากขึ้นโดยการกระทําของคุณที่นี่ในวันนี้!"
 leviathans.304c.desc:0 "เรารู้ว่ามีบางอย่างพิเศษเกี่ยวกับคุณ[root.GetSpeciesAdj]แท้จริงแล้ว ท่านเป็นสิ่งมีชีวิตที่ลิ้มรสดี"

 leviathans.305.desc:2 "สุดยอด! เรายินดีที่จะไว้วางใจคุณ กับหนึ่งในการสร้างของเรา เป็น การ แน่นอน ที่ จะ นํา ความ ยินดี มา สู่ ประชาชน แห่ง จักรวรรดิ ของ คุณ."
 leviathans.305.a.tooltip:3 "สามารถใช้ §Yการตัดสินใจ§! §S£decision£ $decision_art_monument$§! ได้ ซึ่งสามารถทำได้บนดาวดวงหนึ่งและมีผลดังต่อไปนี้:\n£amenities£ $MOD_PLANET_AMENITIES_MULT$ §G+15%§!\n$MOD_PLANET_IMMIGRATION_PULL_MULT$: §G+50%§!"
 leviathans.305.a.reply:1 "เยี่ยม! ชิ้นส่วนจะถูกส่งไป ที่โกดังเก็บของของคุณ แค่ขอให้คณะบริหารโลกของคุณ ทําการ§Yการตัดสินใจ§!บนดาวดวงไหนก็ได้ที่คุณต้องการ\n\nเราขอขอบคุณสําหรับการอุปถัมภ์ของคุณ"

 leviathans.330.desc:2 "การจัดเทศกาลในระดับนั้น ทําให้ศิลปินของเราทุกคน ต้องนําพรสวรรค์ของพวกเขามา ไม่ใช่งานง่ายๆ หรืองานถูกๆ"
 leviathans.330.a.reply:0 "เยี่ยม! เรา จะ ชื่นชม ยินดี ที่ จะ สร้าง เทศกาล แห่ง โลก อัน ยอด เยี่ยม นี้!"

 leviathans.310.desc:2 "นั่นน่าจะเป็นประโยชน์มาก ช่วยให้เราได้ลองความคิดใหม่ๆ และเสี่ยงต่อกระบวนการสร้างสรรค์มากขึ้น เรามี§Y10 ปี§!โปรแกรมที่มีค่าใช้จ่ายขึ้นหน้าหนึ่งครั้ง"
 leviathans.310.a.tooltip:0 "เพิ่มจุด§G£opinion£มุม:§!กับ§Yอา ริ ซิ ทาน§!แต่ละเดือน\n\n"
 leviathans.310.a.reply:0 "ขอบคุณมากครับ! ตอนนี้ ด้วยความช่วยเหลืออย่างใจกว้างของคุณ เราจะสามารถขยายแนวคิดของศิลปะได้ เราจะส่งจดหมายถึงผู้อุปถัมภ์ทุกคน"
 leviathans.307.desc:1 "เศรษฐกิจของเราไม่สามารถรองรับ การเป็นผู้อุปถัมภ์ของอา ริ ซิ ทานอีกต่อไป พวกเขาจะไม่ได้รับทุนจากจักรวรรดิของเรา การ ทํา เช่น นี้ จะ ทํา ให้ สัมพันธภาพ ระหว่าง เรา กับ เจ้า บ่าว เปรี้ยว ลง อย่าง แน่นอน."
 leviathans.307.a.tooltip:0 "§Rลบ§!จักรวรรดิ ถูก แบ่ง แยก§Y$enclave_artist_patron$§!"

 leviathans.335.name:0 "ผู้ ออก หาก"
 leviathans.335.desc:1 "เดอะ§Yเทศกาล แห่ง โลก§!กํากับโดยอา ริ ซิ ทานมีอยู่ระยะหนึ่ง นําความสุขให้กับประชาชนของ[Root.GetName]อนิจจาก็ไม่ได้หมายความว่าสุดท้าย\nเปิด[this_planet.GetName]การ ฉลอง เทศกาล ทํา ให้ ฝูง ชน มาก มาย สั่น สะท้าน และ สังหาร พลเมือง หลาย พัน คน. มันไม่ชัดเจนว่าสถานการณ์ นําไปสู่การสูญเสียชีวิตที่น่าสลดใจนี้ แต่ขณะนี้มีความไม่พอใจมากขึ้น ต่อการบริหารงานของเรา"
 leviathans.335.b:0 "ดึงความสนใจของสื่อ"
 leviathans.336.name:0 "ความ ยินดี"
 leviathans.336.desc:1 "เนื่องจากความอุดมสมบูรณ์ของความสุข ถูกแพร่กระจายโดย§Yเทศกาล แห่ง โลก§!ผู้จัดงานบางคนเริ่มตกหลุมรัก กับวิถีชีวิตของเรา พวกเขาอ้างว่าพวกเขาต้องการที่จะอยู่ที่นี่ที่จะปักหลักลงและกลายเป็นส่วนหนึ่งของจักรวรรดิของเรา"
 leviathans.336.a:0 "ปล่อยให้พวกเขาอยู่"
 leviathans.336.b:0 "พวกเขาควรไปซะ"
 leviathans.337.name:0 "การ ทรยศ"
 leviathans.337.desc:1 "เดอะ§Yเทศกาล แห่ง โลก§!ได้หยุดทันทีชาว อา ริ ส โต เติลได้แพ็คกระเป๋าของพวกเขาและออกจากโดยไม่ต้องพูดอะไรเกี่ยวกับว่าทําไม\n\nการ ค้น หา อย่าง ถี่ถ้วน เกี่ยว กับ ค่าย และ สนาม กีฬา ของ พวก เขา เผย ให้ เห็น เพียง ว่า ทรัพยากร จํานวน มาก มาย สูญ หาย ไป."
 leviathans.337.a:0 "ขโมย!"
 leviathans.337.a.tooltip:0 "ชาว อา ริ ส โต เติลจะปฏิเสธการสื่อสารใดๆ เป็นเวลา 10 ปี"
 leviathans.337.b:0 "ทั้งหมดเป็นส่วนหนึ่งของความสนุก"
 leviathans.337.b.tooltip:0 "แทรป ของ อา ริ ติ นให้อภัยในการละเมิดของพวกเขา"
 leviathans.337.c:0 "รักษาแคมป์ของพวกเขา"
 tent_heist: "การ ปล้น พลับพลา"
 cultural_clemency: "การจัดอันดับวัฒนธรรม"
 leviathans.315.desc:1 "เอ ส เต ม[Root.GetRulerTitle] [Root.GetRulerName]สิบปีก่อน[Root.GetName]สัญญาว่าจะสนับสนุนอาร์ติซาน โทรปู้ และคุณก็มี\n\nเวลาของผู้อุปถัมภ์ของคุณใกล้จะหมดลงแล้ว แต่มันคงไม่เหมาะสมที่จะถามว่า คุณสนใจต่อการสมัครสมาชิกใหม่"

 leviathans.321.name:0 "ตัวเขียนข่าวของโครงการ"
 leviathans.321.desc:0 "ต่อไปนี้เป็นข่าวล่าสุดสําหรับผู้อุปถัมภ์ของเราทั้งหมด\n\n"
 leviathans.321.desc.a:1 "น่า เศร้า ไม่ มี การ ผลิต อะไร มาก มาย ใน สวน สัตว์. ศิลปินส่วนใหญ่ตกที่นั่งลําบาก จากที่ๆไม่มีแรงบันดาลใจ อารมณ์เลวร้าย แต่มีความหวัง การสร้างสรรค์ต้องใช้เวลามาก\n\nการ บริจาค ใด ๆ ที่ อาจ ช่วย ให้ กลุ่ม นี้ ฟื้น ความ สนใจ ขึ้น มา อีก ใน เครื่อง บิน วัตถุ จะ ช่วย ได้ มาก ที เดียว."
 leviathans.321.desc.b:1 "ผู้ติดตามงานยุ่งมาก ในช่วง 2-3 เดือนที่ผ่านมา ห้องโถงของเราเต็มไปด้วย เทคโนโลยีชนิดใหม่ ที่คิดค้นโดยผู้อยู่อาศัย เครื่องจักรอันน่าทึ่งนี้ จะเปลี่ยนแปลงทุกอย่างอย่างแน่นอน\n\nเพื่อที่จะพัฒนาแนวคิดนี้ต่อไป เราต้องการการบริจาคมากขึ้น"
 leviathans.321.desc.c:1 "ช่องสัญญาณมีอารมณ์หงุดหงิด การสร้างเซนติลุส ไรฟต์ ทําให้ศิลปินหลายคน เปลี่ยนจุดสนใจหลักของพวกเขา เพื่อสร้างประสบการณ์ใหม่ๆ จน ถึง บัด นี้ สิ่ง ที่ น่า สังเกต ที่ สุด ซึ่ง ออก มา จาก ความ พยายาม นี้ ก็ คือ ชิ้น ส่วน วง ออร์ เคส ตรา ที่ ส่ง ผ่าน กลิ่น.\n\nงาน ของ เรา ดําเนิน ต่อ ไป และ การ บริจาค ใด ๆ ก็ ตาม จะ ได้ รับ การ ตอบ รับ ด้วย ความ ยินดี."
 leviathans.321.desc.d:0 "เราเลิกพยายามสร้างสื่อที่มีกลิ่นหอมแล้ว มันเป็นความคิดที่โง่เขลาและได้นําอะไร แต่เสียเวลาและกลิ่นที่ ไม่พึงประสงค์\n\nเพื่อที่จะหาทางกลับไปอีกครั้ง เราต้องการเงินบริจาค จากผู้อุปถัมภ์ที่ไว้ใจของเรา ขอบคุณสําหรับการสนับสนุนของคุณ!"
 leviathans.321.a:0 "เราอยากบริจาค"
#  leviathans.321.a.reply:0 "We joyously accept your donation and promise that it will be used in the most creative of endeavors!"
 leviathans.321.c:0 "เราไม่สามารถบริจาคได้ตอนนี้"
 leviathans.321.b:1 "เราอยากจะยกเลิกการรับจดหมาย"
 leviathans.322.name:0 "ผู้ เลี้ยง ที่ มี ประโยชน์"
 leviathans.322.desc:3 "สวัสดี ผู้อุปถัมภ์[Root.GetRulerName]เราได้มาพร้อมกับรูปแบบใหม่ที่สวยงามของสถาปัตยกรรม ปรับให้ชัดเจนขึ้นของฝูงชน เข้าใจซึ่งกันและกัน -§Yกระทรวงวัฒนธรรม§!ทํางานกับการผสมผสานของอคติของพลเมือง ต่อกันและกันและศิลปะ\n\nคุณอยากซื้อตึกนี้ไหม มันจะมีประโยชน์อย่างแน่นอน ที่จะเชื่อมอาณาจักรของคุณเข้าด้วยกัน มันเป็นข้อต่อรอง ถ้าผมจะพูดด้วยตัวเอง"
 leviathans.322.a.tooltip:3 "เข้าถึง§S£building£ ['building:building_artist_patron']§!"
 leviathans.322.a.tooltip.hive:0 "$leviathans.322.a.tooltip$"
 leviathans.322.a.tooltip.machine:0 "$leviathans.322.a.tooltip$"
 leviathans.323.name:0 "อัปเดตแบบไร้คุณภาพ"
 leviathans.323.desc:1 "เราขออภัย ท่านผู้อุปถัมภ์[Root.GetRulerName]เราได้มาถึงบางอย่าง ของการปิดกั้นความคิดสร้างสรรค์ เครื่องราชอิสริยาภรณ์ถูกถอดออกจากตําแหน่ง และเราไม่มีอะไรจะเสนอในตอนนี้ เราขอขอบคุณสําหรับความอุปถัมภ์ของคุณ เสมอ"
 leviathans.323.a:0 "เราหวังว่าสถานการณ์จะดีขึ้น"
#  leviathans.323.a.reply:0 "We humbly thank you for your kind words, and will send them along to the rest of the troupe."
 leviathans.323.b:0 "เราต้องการเงินคืน!"
#  leviathans.323.b.reply:0 "We understand. We wish it were not so, but we will respect your wish and return your resources.\n\nGoodbye, patron."
 leviathans.324.name:0 "ศิลปินที่แตก"
 leviathans.324.desc:1 "สวัสดี ผู้อุปถัมภ์[Root.GetRulerName]เมื่อเร็วๆนี้ เราถูกบังคับให้ทําลายอุปกรณ์เทคนิคส่วนใหญ่ วัสดุและเศษอาหาร จะมีประโยชน์อะไรกับคุณไหม?"
 leviathans.324.a:0 "เราจะกู้วัสดุ"
#  leviathans.324.a.reply:0 "That is good, then it won't go to waste."
 leviathans.324.b:0 "เราจะซ่อมมันให้คุณ"
#  leviathans.324.b.reply:0 "Oh, thank you kindly, patron [Root.GetRulerName]! This will save us a tremendous amount of time and resources. We are in your debt."
 leviathans.325.desc:0 "พวกเราเสียใจที่ได้ยินเช่นนั้น โอ ผู้อุปถัมภ์ ถ้าไม่มีจดหมายข่าว เราจะไม่สามารถ ให้คุณได้ทันความสําเร็จล่าสุดของเรา"

 leviathans.345.name:0 "กระทรวง วัฒนธรรม"
 leviathans.345.desc:2 "อา...§Yกระทรวงวัฒนธรรม§!... มันถูกออกแบบมาเพื่อท้าทายแนวคิดที่หลากหลาย และส่งเสริมความสามัคคีมากขึ้น ทั่วจักรวรรดิของคุณ ผ่านสื่อศิลปะ ผลงานชิ้นเอกที่แท้จริง ถ้าฉันจะพูดด้วยตัวเอง"
 leviathans.345.a.reply:0 "เยี่ยม! ชิ้นส่วนจะถูกส่งไปยังห้องเก็บของของคุณทันที แค่ขอให้คนสร้างของคุณ สร้างบนดาวดวงไหนก็ได้ที่คุณต้องการ\nเราขอขอบคุณสําหรับการอุปถัมภ์ของคุณ"

 leviathans.352.desc:0 "เราได้รับการติดต่อจากอาร์ติซาน โทรพี หนึ่งในสถานีของพวกเขาถูกทําลาย!"
 leviathans.353.desc:0 "เราได้รับสัญญาณขอความช่วยเหลือจากอาจารย์ใหญ่ของอาร์ติซาน โทรปุป สถานีสุดท้ายและเขตวัฒนธรรมของพวกเขาถูกทําลาย มี ผู้ รอด ชีวิต เพียง ไม่ กี่ คน และ โดย พื้น ฐาน แล้ว เทรุ ป ก็ ไม่ มี อีก ต่อ ไป."
 leviathans.354.desc:0 "หลังจากทําลายสถานีของอาร์ติซาน โทรปูเป้ เราพบทรัพยากรมากมาย เพื่อกู้จากซากปรักหักพัง การ บริจาค, ของ ประทาน และ สิ่ง ทรง สร้าง ที่ เรียง ราย กัน อยู่ ใน หอ ประชุม ของ ตน บัด นี้ ลอย อยู่ ใน อวกาศ พร้อม สําหรับ การ รับ."
 leviathans.354.desc.unknown:1 "หลังจากที่ทําลายสถานีลอยอยู่ใน[station_system.GetName]ระบบ เราพบทรัพยากรที่มีคุณค่ามากมาย ท่ามกลางซากของมัน"

##################
# CURATOR ENCLAVE
##################

 leviathans.500.name:0 "ผู้ดูแลพิพิธภัณฑ์"
 leviathans.500a.desc:0 "บางทีคุณอาจกําลังสงสัยถึงนัยสําคัญ ของรูปทรงที่คุณเห็นในมรกตข้างหลังผม นั่น เป็น คํา ถาม ที่ ดี ด้วย คํา ตอบ ที่ น่า สนใจ จริง ๆ! ค่าใช้จ่ายสําหรับข้อมูลนี้ คือหน่วยกิตพลังงานจํานวน 15 ล้านบาท"
 leviathans.500b.desc:0 "คุณติดต่อผู้รักษาการได้ จะให้เราช่วยอะไร?"
 leviathans.500c.desc:0 "คุณทราบหรือไม่ว่า การสนทนาครั้งนี้ถูกจับตามองอย่างใกล้ชิด โดยหน่วยงานจากเจ็ดดินแดนของสับสเปซ อนิจจาฉันกลัวเทคโนโลยี ที่จะสื่อสารกับพวกเขา มันไกลเกินความสามารถในปัจจุบัน ของอารยธรรมของคุณ"
 leviathans.500d.desc:0 "ไม่ต้องกลัว เราได้อัปเดตเอกสารของเราด้วยข้อมูล[Root.GetName]สําหรับคนรุ่นใหม่ในอนาคต คุณจะเป็นที่จดจําได้นานหลังจาก การล่มสลายอย่างหลีกเลี่ยงไม่ได้ของชาติดาวของคุณ"
 leviathans.500e.desc:0 "มีหลายอย่างที่ผมอยากจะบอกคุณ แต่ผมทําไม่ได้ฟรีๆ สถานีอวกาศนี้ต้องใช้พลังงานจํานวนมากในการดําเนินงาน เราต้องพิจารณาค่าใช้จ่ายของเรา"
 leviathans.500f.desc:0 "สวัสดี ในนามของคณะรัฐมนตรี มีอะไรที่คุณต้องการไหม?"
 leviathans.500g.desc:0 "เช่นเคย เป็นเกียรติที่ได้ทําธุรกิจกับรัฐบาลของคุณ เราสนใจเทคโนโลยีบางอย่างได้ไหม"
 leviathans.500h.desc:0 "ดีใจที่ได้เจอคุณ ฉันมั่นใจว่าเราสามารถ ทําข้อตกลงที่มีประโยชน์ร่วมกัน ก่อนที่วันนี้จะจบ"
 leviathans.500i.desc:0 "ความ รู้ เกี่ยว กับ การ สืบ ค้น อย่าง ผิด ๆ อาจ เป็น อันตราย แต่ เรา จะ ทํา อย่าง ไร? เราต้องการพลังงานเพื่อให้ไฟเปิดอยู่"
 leviathans.500j.desc:0 "มีหลายอย่างที่เจ้ายังไม่รู้[Root.GetSpeciesName]ได้โปรด ให้เราสอนคุณเกี่ยวกับจักรวาล"
 leviathans.500k.desc:0 "เรามีชาร์ตดาวที่มีรายละเอียด ของทั้งกาแล็กซี่ รวบรวมโดยนักสํารวจ จากหลายร้อยเชื้อชาติที่แตกต่างกัน บางทีพวกเขาอาจสนใจคุณ"
 leviathans.500l.desc:0 "ความรู้คือทุกอย่าง มันจะต้องถูกเก็บรักษาไว้"

 leviathans.502.name:1 "ที่อยู่ติดต่อครั้งแรกกับ[curator_enclave_country.GetName]"
 leviathans.502a.desc:0 "สวัสดี นักเดินทางดาว เราคือผู้ดูแล\n\nคําสั่งโบราณของเราได้ถูกจัดตั้งขึ้น โดยอํานาจต่าง ๆ ในความรุ่งเรืองในขณะนั้น เราอุทิศให้กับการอนุรักษ์ความรู้ทั้งหมด ในความพยายามในการป้องกันกาแล็กซี่ จากการลงสู่ยุคมืด\n\nเราล้มเหลว\n\nเรา เหลือ อยู่ เพียง ไม่ กี่ คน ใน ทุก วัน นี้ แต่ เรา ไม่ มี พันธะ ที่ จะ ทํา งาน มอบ หมาย อัน ศักดิ์สิทธิ์ น้อย กว่า ที่ พวก เรา แต่ ก่อน เคย ทํา. เรายินดีที่จะแบ่งปันความรู้บางส่วนของเรา กับคุณ ... สําหรับราคา"
 leviathans.502b.desc:1 "รู้จักกันดี นักสํารวจ คุณกําลังพูดกับ[curator_enclave_country.GetName]บางทีเจ้าอาจจะคุ้นเคยกับ หลักการโบราณของเราแล้ว เช่น เดียว กับ เพื่อน ร่วม งาน ที่ ได้ รับ การ ยกย่อง ใน ห้อง ปฏิบัติ การ อื่น ๆ เรา เต็ม ใจ จะ แลก เงิน ที่ คุณ จะ ได้ รับ."
 leviathans.502.a:0 "ยินดีที่พบ"

 leviathans.500.a:1 "เรามีความสนใจในการหาแผนที่§Yดาวดวงใหม่§!"
 leviathans.500.b:1 "คุณสามารถช่วยใน§Yการวิจัย§!ของเราได้หรือไม่?"
 leviathans.500.b.alreadyaided:0 "ภัณฑารักษ์พัฒนาความสามารถการวิจัยของเราแล้ว"
 leviathans.500.c:1 "บอกเราเกี่ยวกับ§Yความลึกลับ§!ของจักรวาล"
 leviathans.500.d:1 "เราสามารถจ้าง§Yนักวิทยาศาสตร์§!ของคุณได้ไหม?"
 leviathans.500.d.alreadyrecruited:0 "เราจ้างนักวิทยาศาสตร์ผู้รักษาการแล้ว"
 leviathans.500.d.opinion:0 "ต้องการ §Yผู้ดูแลพิพิธภัณฑ์§! ให้มี:\n£opinion£ ทัศนคติ +50"
 leviathans.500.e:0 "คุณ จะ แบ่ง ปัน หลัก การ พื้น ฐาน ของ ความ รู้ ได้ ไหม?"
 leviathans.500.e.alreadyshared:0 "พวกเราได้แบ่งปันหลักการของผู้ดูแลไปแล้ว"
 leviathans.500.e.opinion:0 "$leviathans.500.d.opinion$"
 leviathans.500.h:1 "คุณช่วยบอกเราเกี่ยวกับ §Yลูกค้าคนอื่นๆของคุณ§!?"
 leviathans.500.i:0 "คุณรู้อะไรเกี่ยวกับ §Y$lgates$§!?"
 leviathans.500.i.tooltip.noclue:2 "มันเอา[curator_enclave_country.GetName]ประมาณหนึ่งทศวรรษเพื่อระบุตัวตนใหม่§Y$clue$§!."
 leviathans.500.j: "คุณช่วยเราขยาย§Yดึงข้อมูล§!?"
 leviathans.500.j.opinion: "ต้องการ§Yเคอร์เนล§!เพื่อ :\n£opinion£อนุพันธ์ + 80"
 leviathans.500.k: "คุณช่วยเราได้ไหม§Yคลังสื่อ§!?"
 leviathans.500.k.reply.reward_unavailable: "เราขอโทษ แต่เราไม่มีอะไรจะเสนอให้ตอนนี้ ลองเก็บและแสดงเพิ่มเติม$specimens$บางทีเราสามารถแบ่งปัน ความเชี่ยวชาญของเรา"
 leviathans.500.k.reply.over: "เราขออภัย แต่เราไม่มีอะไรเหลือให้คุณ คอลเลคชั่นของคุณ สวยงามจริงๆ เรารู้สึกเป็นเกียรติที่มีคุณ เป็นหุ้นส่วนในกาแล็กซี่ของเรา\n\nคุณ เป็น สิ่ง มี ค่า ใน การ เก็บ รักษา ความ รู้."

 leviathans.504a.desc:0 "คําสั่งของเรา ขอบคุณ ลูกค้าที่น่านับถือ"
 leviathans.504b.desc:0 "ขอบคุณ[root.GetSpeciesAdj]ความบริสุทธิ์และความอยากรู้อยากเห็นอยู่กับคุณ"
 leviathans.504c.desc:0 "ยินดีที่ได้ทําธุรกิจกับคุณ วิธีการที่อื่น ๆ ของเราอย่างเฉียบคม และบันทึกที่ไร้สาระเป็น การให้บริการสําหรับคุณ?"

