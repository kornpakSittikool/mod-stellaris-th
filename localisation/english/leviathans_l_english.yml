 leviathans.131.desc:3 "เดอะ§Yโมต§!เป็นเครื่องปรุงอาหารอันมีเกียรติ มัน เป็น ที่ รู้ จัก กัน ทั่ว กาแล็กซี เนื่อง จาก มี รสชาติ หลาก หลาย ซึ่ง ไม่ เหมือน ชนิด อื่น ใด และ เป็น การ ระเบิด ซึ่ง ก็ ไม่ เหมือน ชนิด อื่น ๆ ด้วย. เราขายเฉพาะหุ้นส่วนค้าที่มีค่าที่สุดของเรา ที่เรานับ[Root.GetName].\n\nถ้าคุณสามารถตอบสนองราคาที่ถ่อมตัวของเรา เรายินดีที่จะส่งออกโมสปริมาตรสําหรับคุณ สําหรับระยะเวลา 10 มาตรฐาน"
 leviathans.131.a.reply:1 "คุณจะไม่เสียใจ เว้นแต่ว่าคุณกินเครื่องเทศมากไป ถ้า เช่น นั้น ก็ มี โอกาส เล็ก ๆ น้อย ๆ ที่ คุณ จะ หวี ตัว เอง. มีโอกาสน้อยมากที่จะแน่ใจ"

 leviathans.130.desc:4 "นี่คือผลิตภัณฑ์ที่เราแสดงที่ Xurorp ภูมิใจอย่างยิ่ง หน่วยงานการแพทย์ของเรา ได้เริ่มล้างก๊าซ ที่มีคุณสมบัติที่พิเศษ ซึ่งจะง่ายขึ้นอย่างมาก ไม่ มี ทาง ที่ จะ เข้า กัน ได้ กับ มนุษย์ ต่าง ดาว!\n\nเรายินดีที่จะส่งออก§Yก๊าซอาชีวเคมี§!สําหรับคุณเป็นเวลา 10 ปีมาตรฐานหลังจากนั้นสัญญาที่จะได้รับการชําระคืน"
 leviathans.130.a.reply:1 "นั่นคือวิธี Xurorp!เรือของเราจะเริ่มส่งของทันที\n\n§Lโดยการซื้อผลิตภัณฑ์นี้ คุณเห็นด้วยว่า XuraCorp ไม่สามารถรับผิดชอบต่อผลกระทบที่ร้ายแรงใด ๆ ที่อาจเป็นผลมาจากการใช้งานของมัน รวมถึงการระคายเคืองผิวหนัง การสลายตัวของโรคทางจิต การสลายตัวของสีภายนอก การกลายพันธุ์ที่ก้าวร้าว อัตราการเกิดการเกิดการกลายพันธุ์ของอาณานิคมเพิ่มขึ้น§!"

 leviathans.132.desc:2 "ชิคุ-ดู-หรือ§Yชื่อ=คริสตัลชื่อ§!อย่างที่รู้จักกันดี สําหรับคนที่ไม่ได้เป็นสายพันธุ์ของเรา ได้มาเพื่อเป็นสัญลักษณ์ของอารยธรรมทั้งหมดของเรา เมื่อเหล่านี้\"ร้องเพลง\" คริสตัลสั่น พวกเขาปล่อยเสียงดนตรีที่ไม่ซ้ํากันออกมา ซึ่งมีผลกระทบที่สงบกับเสียงส่วนใหญ่\n\nถึงแม้ว่าเราจะไม่แบ่งปันความมหัศจรรย์ ของพระศิรินทร์-ดู กับคนนอก, เรายินดีที่จะยกเว้นกรณีของคุณ ถ้าคุณสามารถจ่ายได้ เรายินดีที่จะส่งออก คริสตัลของเราให้คุณ สําหรับระยะเวลา 10 ปี"
 leviathans.132.a.reply:1 "เยี่ยม พ่อค้าของเราจะเริ่มส่งคริสตัล ไปยังดาวเคราะห์ของคุณในทันที ขอให้ชิราคาตดูร้องเพลงให้คุณฟัง"

