 leviathans.125.desc.z1:1 "เรามีผู้บริหารที่มีความสามารถยืนอยู่โดยพร้อมที่จะย้ายไปยัง[Root.GetName]และได้รับส่วนใด ๆ ของคุณ กลับมาออกจากสีแดง จงเชื่อใจ$r_trade$ให้ผู้เชี่ยวชาญ!"
 leviathans.125.desc.z1.gestalt:0 "เรามีผู้บริหารที่มีพรสวรรค์ พร้อมที่จะ... อืม แน่ใจนะ?\n\n'เบียร์'ระวัง' เป็นทั้งหมดที่ดีและดี แต่ยังคง : ฉันรู้สึกจําเป็นต้องบอกคุณ ว่าที่ปรึกษาของเราจริง ๆ เท่านั้นที่เชี่ยวชาญใน$r_trade$ผมไม่แน่ใจว่าพวกเขาจะเหมาะกับคุณ"
 leviathans.125.z1:0 "ตกลง"
 leviathans.125.z1.gestalt:0 "เราเข้าใจ และปรารถนาที่จะดําเนินการต่อไป"
 leviathans.126.desc:0 "เยี่ยม! เรายินดีที่จะแบ่งปันทักษะของเรา[Root.GetName]."
 leviathans.126.desc.alt: "เยี่ยม! ขอประโยชน์จากกันและกัน... ."

