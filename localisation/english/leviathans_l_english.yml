 leviathans.507.name:0 "§Yอองครีฟ:§!ผู้ ดู แลการวิจัยเอดส์"
 leviathans.507.desc:1 "แน่นอน เราเตรียมให้คุณ เข้าถึงธนาคารข้อมูลอันกว้างขวางของเรา ในระยะเวลา 10 ปีมาตรฐาน การ ทํา เช่น นี้ น่า จะ ส่ง เสริม ความ พยายาม อย่าง มาก ใน การ วิจัย ด้าน ดาว เคราะห์ ของ คุณ§Hแลป วิจัย§!.\n\nเราต้องการค่าชดเชยสําหรับบริการนี้โดยธรรมชาติ แต่ผมคิดว่าคุณจะพบว่า ราคาของเราสมเหตุสมผลมาก"
 leviathans.507.a:0 "เราต้องการซื้อบริการนี้"
 leviathans.507.a.reply:0 "ทางเลือกที่ชาญฉลาด ว่ารุ่นในอนาคตของ[Root.GetSpeciesNamePlural]ไม่ ต้อง สงสัย เลย ว่า ท่าน คง จะ ได้ รับ คํา ชมเชย."

 leviathans.508.name:0 "ความ ลึกลับ"
 leviathans.508.desc:0 "มีองค์กรที่มีอํานาจมาก ซ่อนอยู่ในระบบดาวบางชนิด ในกาแล็กซี่ของเรา ด้วยต้นทุนมหาศาล ทั้งชีวิตและทรัพยากร เจ้าหน้าที่ผู้รักษาการ ได้รวบรวมความรู้ที่ควรจะทําให้สิ่งมีชีวิตเหล่านี้"
 leviathans.508.a:1 "บอกเราเกี่ยวกับ §Yสิ่งใหม่ๆ§!"
 leviathans.508.a.reply:0 "นี้คุณอาจจะสนใจ ... เราได้ทําเครื่องหมายระบบดาวในของคุณ§Yบันทึกสถานการณ์§!."
 leviathans.508.b:1 "บอกเราเกี่ยวกับ §Y$NAME_Ether_Drake$§!"
 leviathans.508.c:1 "บอกเราเกี่ยวกับ §Y$NAME_Enigmatic_Fortress$§!"
 leviathans.508.d:1 "บอกเราเกี่ยวกับ §Y$NAME_Stellar_Devourer$§!"
 leviathans.508.e:1 "บอกเราเกี่ยวกับ §Y$NAME_Dimensional_Horror$§!"
 leviathans.508.f:1 "บอกเราเกี่ยวกับ§Y$NAME_Alien_Hive$§!." # Asteroid Hive
 leviathans.508.g:1 "บอกเราเกี่ยวกับ §Y$NAME_Infinity_Machine$§!"
 leviathans.508.h:1 "บอกเราเกี่ยวกับ §Y$NAME_Automated_Dreadnought$§!"
 leviathans.508.i:1 "บอกเราเกี่ยวกับ §Y$NAME_Wraith$§!"
 leviathans.508.j:1 "บอกเราเกี่ยวกับ §Y$NAME_Voidspawn$§!"
 leviathans.508.k:1 "บอกเราเกี่ยวกับ§Y$NAME_Scavenger_Bot$§!." # Scavenger Bot
 leviathans.508.l:1 "บอกเราเกี่ยวกับ§Y$NAME_Elderly_Tiyanki$§!." # Tiyanki Matriarch
 leviathans.508.m:0 "บอกเราเกี่ยวกับ§Y$NAME_Toxic_God$§!." # Toxic God
 leviathans.508.n: "บอกเราเกี่ยวกับ§Y$NAME_Opus_Sentinel$§!." # Opus Sentinel (Unplugged)

 leviathans.506.f:0 "กองยานปัจจุบันของเราจะต่อสู้กับมันอย่างไร?"
 leviathans.5106.f1.reply:0 "น่าเวทนา แย่มาก\n\nเดี๋ยวนะ คุณไม่ได้คิดถึง... พระเจ้า กับเรือที่คุณมี มันจะเป็นการฆ่ากัน"
 leviathans.5106.f2.reply:0 "ฉันจะแนะนําอย่างจริงจังกับมัน การ โจมตี ของ คุณ คง จะ ก่อ ความ รําคาญ มาก กว่า การ คุกคาม."
 leviathans.5106.f3.reply:1 "อืม ใช่ ใช่ ฉันคิดว่าคุณอาจจะมีโอกาส ถ้าคุณรวมกองเรือทั้งหมดของคุณ มันจะไม่เป็นชัยชนะที่ง่ายใจคุณ แต่เป็นหนึ่งในอย่างน้อย ในขอบเขตของความเป็นไปได้"
 leviathans.5106.f4.reply:0 "ท่านเป็นกองเรือที่ยิ่งใหญ่ เทียบได้กับทัพเรือที่ยิ่งใหญ่ที่สุดบางกอง ที่บันทึกไว้ในคณะรัฐมนตรี แน่นอน ชัยชนะของเจ้านั้นอยู่ภายใต้การควบคุมของเจ้า"

 leviathans.500.f:1 "เราต้องการสร้าง §Yคิดว่าถัง§! ร่วมกัน"
 leviathans.511.name:0 "คิดว่าถัง"
 leviathans.511.desc:1 "ใช่... ใช่ สถานที่ดังกล่าว จะเป็นประโยชน์ต่อความก้าวหน้าของวิทยาศาสตร์กาแล็กติก คุณสามารถสร้างถังความคิดนี้ ที่ฐานดาวของคุณในระบบของคุณกับเรา ผู้รักษาการณ์ของเราจะมา อยู่ร่วมกับนักวิทยาศาสตร์ของคุณ"
 leviathans.511.a:0 "ยอดเยี่ยม คุณมีอะไรจะนำเสนออีกหรือไม่?"
 leviathans.511.a.tooltip:0 "เราสามารถสร้าง§Hผู้รักษาคิดว่าถัง§! ฐานดวงดาวสร้างใน§Y[curator_system.GetName]§!ระบบ"

 leviathans.550.name:0 "หมึก"
 leviathans.550.desc:1 "ถ้าข้อกังขาของเราเป็นจริง พวกวอยด์สปอว์นก็อยู่ไกลจากบ้าน เรา เชื่อ ว่า นั่น คือ เชื้อ สาย ของ นัก ล่า กัลกัตตา ที่ มี สัดส่วน ที่ ไม่ อาจ นึก ภาพ ออก ได้ นั่น คือ สิ่ง หนึ่ง ที่ แผ่ คลุม ช่อง ว่าง ใน การ เสาะ หา เหยื่อ. ถึง แม้ เรา ไม่ เคย เผชิญ หน้า กับ ตัว อย่าง ที่ มี ชีวิต อยู่ มา ก่อน แต่ เรา ได้ ยิน เรื่อง การ ทําลาย ล้าง และ ความ สับสน วุ่นวาย ที่ เกิด ขึ้น ระหว่าง วอยด์สปอว์น ออก จาก บ้าน. กล่าว กัน ว่า โลก ตก อยู่ ใต้ เงา ของ มัน."
 leviathans.550.a:0 "$leviathans.510.a$"
 leviathans.550.a.reply:1 "จากที่เราสามารถบอกได้ แม่วางไข่ขนาดใหญ่ของโลก ในวงโคจรของดาว\n\nพวก เขา ได้ รับ ประโยชน์ จาก สิ่ง มี ชีวิต และ กล่าว กัน ว่า ไวน์ส ปอน ผู้ ใหญ่ มี อิทธิพล แปลก ประหลาด ต่อ สิ่ง มี ชีวิต ทั้ง มวล. น่า ดีใจ ที่ ลูก นก ตัว นี้ ดู เหมือน ถูก พ่อ แม่ ทิ้ง ไป.\n\nบาง ที จะ ดี ที่ สุด ที่ จะ ห้าม สัตว์ ไว้ ขณะ ที่ มัน ยัง เป็น เด็ก และ อ่อนแอ?"
 leviathans.550.b:0 "มันแพ้ยังไง?"
 leviathans.550.b.reply:0 "เราไม่เคยได้ยินการเจริญเติบโตของวีดสพ็องถูกเอาชนะในการต่อสู้ แต่นี้คือการฟักใหม่ Viidspawn โปรเจกต์พ่นน้ําลายและหนามที่ สามารถเผาไหม้ผ่านหนาที่สุดของเกราะ แต่การใช้เสื้อกันกรดป้องกันอาจชะลอความคืบหน้าของมัน เราจะช่วยคุณ เวียดพัฒน์เป็นภัยต่อเราทุกคน"

 leviathans.555.name:0 "สคาเวนเจอร์"
 leviathans.555.desc:2 "อ่า เจ้าหุ่นเศษเหล็กสคาเวนเจอร์เป็นสิ่งก่อสร้างอยากรู้อยากเห็น จากวัยที่หายไป ใน ที่ สุด มัน ก็ ค้น ดู ผ่าน ทุ่ง หญ้า ที่ มี เศษ ซาก ปรัก หัก พัง ของ กาแล็กซี ทํา ให้ ปืน, เครื่อง ยนต์, และ วัสดุ ต่าง ๆ ที่ ขุด ขึ้น มา จาก ซาก ปรัก หัก พัง นับ ไม่ ถ้วน บน ตัว เรือ ของ มัน เอง. มวล และ กระสุน ปืน ของ เมือง นี้ ได้ เพิ่ม ขึ้น ใน รูป แบบ ดัง กล่าว เป็น เวลา หลาย ศตวรรษ โดย ไม่ มี สัญญาณ ว่า จะ กลับ ใจ.\n\nไม่มีใครรู้ว่ามีขีด จํากัด ที่สูงถึงวิธีการที่มันจะ มีขนาดใหญ่ให้เวลาและเศษพอที่จะทํางานกับ"
 leviathans.555.a:0 "ใครสร้างมันในตอนแรก?"
 leviathans.555.a.reply:2 "Unfortunately, no definitive data regarding the Scavenger's origin is known to exist. Some researchers believe it to be a malfunctioning scrap collection service machine from a lost empire, its purpose long since muddled by hardware degradation. Others believe it to have originated as a single microscopic nanobot, programmed to endlessly build itself larger and stronger by exploiting its environment. Still others reckon it may have started out as a robotic ship's captain; the sole survivor of an intergalactic battle waged millennia ago. Perhaps its reasoning systems were irrevocably damaged by the sudden destruction of its entire civilization.\n\nOf course, this is all just speculation."
 leviathans.555.b:0 "เราสามารถสื่อสารกับมันได้หรือไม่"
 leviathans.555.b.reply:2 "ตลอด หลาย ปี มี ความ พยายาม มาก มาย ที่ จะ ติด ต่อ กับ พวก เขา หรือ ไม่ ก็ เพื่อ เปลี่ยน การ ตั้ง โปรแกรม ของ ส คา เวน เกอร์. แต่น่าเสียดายที่ส่วนใหญ่ของการเดินทางเหล่านั้น จบลงด้วยส่วนหนึ่งของสนามเศษจักรวาล ที่สคาเวนเจอร์อาศัย เฉพาะผู้ที่สามารถวิ่งเร็วกว่ามันรอดชีวิต\n\nสคาเวนเจอร์ได้เชื่อมปืนใหญ่หนักพอ เข้ากับโครงข่ายการทํางานเพื่อทําลายกองเรือของทั้งประเทศ ด้วยมือเปล่า - เหตุการณ์ที่อาจเกิดขึ้นมาแล้วมากกว่าหนึ่งครั้ง แน่ ละ การ เผชิญ หน้า ที่ ก่อ ความ เสีย หาย เช่น นั้น จะ มี แต่ จะ เสริม ความ เข้ม แข็ง ให้ แก่ ส คา เวน เกอร์ มาก ขึ้น ทํา ให้ มี ส่วน ประกอบ ของ เรือ เพิ่ม ขึ้น เพื่อ นํา กลับ มา ใช้ อีก."
 leviathans.555.c:0 "$leviathans.510.b$"
 leviathans.555.c.reply:2 "อย่างที่คุณอาจเดาได้: สคาเวนเจอร์ ไม่ได้ถูกสร้างตามแผนผังที่แน่นอน ผลก็คือ บางส่วนของมันพอดีกัน น้อยกว่าที่เหมาะสม แน่ ละ เพื่อความไม่สงบ ส่วนมากแล้วก็ถูกบดบังจากมุมมอง แต่เซ็นเซอร์ขั้นสูงของเรา ได้จัดการแยกพวกมันออกจากกัน\n\nบอกกองเรือของคุณให้มุ่งยิง ตรงส่วนต่าง ๆ ที่ระบุของเรือของสคาเวนเจอร์ และมันจะลดความเสียหาย"
 leviathans.555.aa:0 "เตือนเราเกี่ยวกับที่มาของมัน"
 leviathans.555.bb:0 "เตือนเราเกี่ยวกับการพยายามที่จะสื่อสารกับมัน"

 leviathans.556.name:0 "ที ยัน คี มา ทริ ฟอร์ม"
 leviathans.556.desc:0 "เธอสวยใช่ไหม หนวดของเธอสามารถหักเรือของเรือรบเช่นหอยนางรม หลายทศวรรษที่ผ่านมา นักวิจัยของเราได้ยินข่าวลือ ของกัปตันสาบาน ที่จะตามล่ามาเทรียล ไปยังจุดสิ้นสุดของกาแล็กซี่ อย่าง ไร ก็ ตาม เมื่อ คํานึง ถึง การ ดํารง อยู่ ของ เธอ ต่อ ไป เรา นึก ไม่ ออก ว่า เขา จะ ประสบ ความ สําเร็จ."
 leviathans.556.a:0 "ทําไมมาเทรียสถึงมีขนาดใหญ่กว่าเทียนิกิอื่น ๆ มาก?"
 leviathans.556.a.reply:0 "ขนาดของเธอมันผิดปกติ มั่นใจได้ เราเชื่อว่า มาเทรียส เป็นพวกเร่ร่อนจากกาแล็กซี่อื่น ในห้วงอวกาศลึก ที่ซึ่งสปีชีส์ต่าง ๆ ของทิยานีกี มีขนาดและความแข็งแกร่งมากขึ้น\n\nแน่นอน มันเป็นไปได้ที่จตุรัสเป็นเพียง ความทุกข์ทรมานจากรูปแบบที่ก้าวหน้าของการแบ่งประเภท -แม้ว่านี้จะไม่อธิบายอายุของเธอขยาย"
 leviathans.556.b:0 "คุณรู้อะไรเกี่ยวกับกัปตันเรือ ตามล่ามาเทรียลบ้าง"
 leviathans.556.b.reply:0 "น้อยมาก มันเป็นไปได้มากที่กัปตัน ไล่มาตรีช ที่นี่จากกาแล็กซี่อื่น แม้ ว่า เหตุ ใด คน เรา จึง โง่ ถึง ขนาด ท้าทาย สัตว์ ที่ สามารถ ทําลาย กอง เรือ ทั้ง หมด ได้ ด้วย เรือ เพียง ลํา เดียว ก็ อยู่ ไกล กว่า เรา."
 leviathans.556.c:0 "$leviathans.510.b$"
 leviathans.556.c.reply:0 "ตระกูลมาเทรียลนั้นน่าเกรงขาม แต่ไม่อาจทําลายได้ ขณะที่ที่ซ่อนเกราะของเธอปกป้องเธอ จากระยะกว้างของกระสุน เธอดําเนินการด้วยความอ่อนแอของเธอที่น่าทึ่ง\n\nมีตอร์ปิโดโปรตอนขนาดใหญ่ฝังอยู่ในด้านหลังของเธอ : บาดแผลจากการต่อสู้ล่าสุดที่มีการรักษาไม่ดี ขณะ ที่ ดู เหมือน บกพร่อง การ ตรวจ ของ เรา ใน ตอร์ปิโด บ่ง ชี้ ว่า มัน ยัง คง ถูก ระเบิด ออก มา ถ้า มี คลื่น ความ ถี่ ของ พลัง งาน ที่ เฉพาะ เจาะจง.\n\nเราจะส่งรายละเอียดให้คุณเดี๋ยวนี้"
 leviathans.556.aa:0 "เตือนพวกเราด้วยว่าทําไมมาเทรียสถึงมีขนาดใหญ่กว่าเทียนิกิอื่นๆ"
 leviathans.556.bb:0 "เตือนเราเกี่ยวกับกัปตัน การตามล่ามาเทรียล"

 leviathans.558.name:0 "พระเจ้า แห่ง พิษ"
 leviathans.558.desc:0 "ความซับซ้อนของสารพิษนั้น หาได้ยาก มันได้ท่องกาแล็กซี่มานับพันปี โดยบางครั้งก็เลือกที่จะปล่อยพิษออกมาในโลก ในสิ่งที่เราทําได้แค่จินตนาการ เราได้ยินมาว่ามีการติดตามไปยัง§Y[toxic_god_system.GetName]§!ระบบ"
 leviathans.558.desc.knights:0 "ความซับซ้อนของสารพิษนั้น หาได้ยาก มันได้ท่องกาแล็กซี่มานับพันปี โดยบางครั้งก็เลือกที่จะปล่อยพิษออกมาในโลก ในสิ่งที่เราทําได้แค่จินตนาการ แต่คุณรู้อยู่แล้วนี่\n\nเราเสียใจ แต่เราไม่สามารถช่วยคุณหาที่อยู่ปัจจุบันได้ มันไม่ถูกพบเห็นจากผู้ติดต่อของเรา"
 leviathans.558.A:0 "$leviathans.510.a$"
 leviathans.558.AA:0 "เตือนเราในสิ่งที่คุณรู้"
 leviathans.558.A.reply:0 "ไม่ปรากฏหลักฐาน ที่ที่อ็อกซิติกเอนติตีมา การ พบ ครั้ง แรก เมื่อ หลาย พัน ปี มา แล้ว และ ตั้ง แต่ นั้น เป็น ต้น มา ก็ ได้ มี การ พบ เห็น กัน ทุก ๆ สอง สาม ศตวรรษ. และในตัวมันนั้นมีพระเจ้ามากหลายสําหรับพวกเจ้าโดยเฉพาะ สิ่งที่เราบอกคุณได้ก็คือ มันเป็นสิ่งมีชีวิตอินทรีย์ ที่น่าคร้ามกลัวอย่างมาก ที่มีลักษณะของอาร์ทโรโฟรอยด์ รายงาน ต่าง ๆ บ่ง ชี้ ว่า ระบบ นิเวศ ทั้ง หมด ได้ พัฒนา มา แล้ว เพียง พอ ถึง แม้ การ ได้ มา ซึ่ง ตัว อย่าง ทาง ชีววิทยา ของ ระบบ นี้ ได้ พิสูจน์ ว่า เป็น เรื่อง ท้าทาย อย่าง ที่ เข้าใจ ได้."
 leviathans.558.B:0 "มันแพ้ยังไง?"
 leviathans.558.BB:0 "เตือนเราว่าเราจะสู้มันยังไง"
 leviathans.558.B.reply:0 "มีผู้รอดชีวิตไม่กี่คน ที่เคยพบกัน ตาม รายงาน บอก ว่า พิษ ของ มัน สามารถ เผา ผลาญ ได้ ทุก รูป แบบ ของ ยุทธภัณฑ์. โล่มีประโยชน์กว่าเล็กน้อย ยิ่ง กว่า นั้น เชื่อ กัน ว่า สัตว์ ที่ มี ชีวิต อยู่ บน หลัง จะ ทํา หน้า ที่ เป็น ฝูง ชน ที่ จู่ โจม เมื่อ ถูก คุกคาม. เราสามารถแนะนําเพียงคุณเข้าหามัน ด้วยกําลังที่ท่วมท้น"

 leviathans.559.name: "$NAME_Opus_Sentinel$"
 leviathans.559.desc: "ที่ค่อนข้างกระตุกออโตมาตันเป็น สัมพัทธ์ใหม่กับกาแล็คซี่ แต่ไม่ได้ถูกหลอกโดยความ โหดร้ายดังกล่าว เดอะ$NAME_Opus_Sentinel$ผู้สร้างจะถูกนับเป็นหนึ่งในวิศวกรที่ดีที่สุด ในส่วนของพวกเขาแม้กระทั่งก่อนที่จะถูกดูดซึมโดยเครื่องจักรที่โหดร้าย เราไม่ทราบว่าสิ่งที่ชะตาที่รุนแรงได้เกิดขึ้นจิตสํานึกของเครื่องตั้งแต่นั้น แต่ถ้าเซนติเนลที่ถูกบิดเบี้ยวเป็นอะไรที่จะไปโดย : สถานการณ์ทั้งหมดที่ปรากฏค่อนข้างผันผวน อ่านให้ดี ถ้าคุณตัดสินใจ ที่จะลดความอยากรู้ของคุณ"
 leviathans.559.desc.unplugged: "ยกโทษให้ในความไม่ซื่อสัตย์ของฉัน แต่ฉันคิดว่าคุณจะรู้ เกี่ยวกับเรื่องนี้มากกว่าที่เราทํา! ที่ค่อนข้างกระตุกหุ่นยนต์เป็นมือใหม่เมื่อเทียบกับสิ่งที่เรามักจะศึกษาที่นี่ แต่ไม่ได้น่ากลัวน้อยกว่าคู่แข่ง\n\nเรารู้ว่าแม้กระทั่งก่อนที่จะถูกดูดซึม วิศวกรที่อยู่เบื้องหลัง$NAME_Opus_Sentinel$นับว่าดีที่สุดในภาคของพวกเขา เพราะ ฉะนั้น เรือ รบ ลํา นั้น จึง ไม่ ควร ประเมิน ค่า ต่ํา เกิน ไป. สิ่งที่ไม่ชัดเจนสําหรับเรา คือทําไมเรือจึงถูกแยกออกจาก[origin_unplugged_assimilator_empire.GetName]เรารวบรวมจากเซนติเนล คุณเห็นด้วยกับการประเมิน[root.GetSpeciesName]?"
 leviathans.559.a: "คุณบอกว่ามันเฝ้าอะไรอยู่?"
 leviathans.559.a.reply: "ที่ จริง แม้ ว่า เรา ไม่ รู้ อะไร อย่าง แน่ชัด. บางสายของเราเชื่อว่าเซนติเนล กําลังปกป้องซากศพ[origin_unplugged_assimilator_empire.GetName]ดาวเคราะห์ที่ถือสมบัติบางอย่าง สิ่งที่เรารู้คือยานรบนี้ถูกสร้างขึ้นอย่างแข็งขันกว่ายานใด ๆ[origin_unplugged_assimilator_empire.GetAdj]ทีละน้อย อะไรก็ตามที่มันปกป้องอยู่ข้างนอกนั่น$NAME_Opus_Sentinel$คน เรา จะ อด ทน แม้ จะ มี อาการ ของ ความ ทุกข์ หรือ แม้ แต่ ความ ทุกข์ ทรมาน."
 leviathans.559.b: "เราไม่อยากพูดถึงมัน"
 leviathans.559.b.reply: "เข้าใจดี พวกเราแค่อยากรู้อยากเห็น\n\nมีอะไรให้ฉันช่วยอีกไหม"
 leviathans.559.c: "เราจะหาเจ้าตัวนี้ได้ที่ไหน"
 leviathans.559.c.reply: "ดูเหมือนว่าคุณเป็นหนึ่งในลูกค้าที่น่าเชื่อถือ ผมบอกคุณได้ว่า$NAME_Opus_Sentinel$เห็นครั้งสุดท้ายเฝ้ายาม§Y[origin_unplugged_machine_legacy_core.GetName]ระบบ§!.\n\nเรา ยัง ไม่ รู้ มาก เท่า ไร เกี่ยว กับ เรือ รบ ที่ เต็ม ไป ด้วย ปัญหา นี้ เรา มั่น ใจ ได้ ว่า: เรา จะ สังเกต เห็น เฉพาะ สิ่ง ที่ คุณ เผชิญ ด้วย ความ สนใจ อย่าง แรง กล้า!"
 unplugged_curator_poi_opus_sentinel_desc: "เราซื้อพิกัดพวกนี้จากผู้ดูแล ซึ่งรายงาน$NAME_Opus_Sentinel$เห็นครั้งสุดท้ายในบริเวณนี้"


 leviathans.590.name:0 "นัก วิทยาศาสตร์ ระดับ สูง"
 leviathans.590.desc:0 "เรายินดีที่จะสาบาน การให้บริการของ หนึ่งในนักวิทยาศาสตร์ที่ยอดเยี่ยมที่สุดของเรา เพื่อสาเหตุของคุณ นี่ไม่ใช่ข้อเสนอที่เราเสนอให้กับทุกคนนะ\n\nเงิน ที่ เหมาะ สม..."
 leviathans.590.a:0 "แน่นอน คุณจะได้รับการบริจาค"
 leviathans.590.a.reply:0 "เยี่ยม คุณ จะ มี โอกาส เข้า ถึง หนึ่ง ใน บรรดา ผู้ มี จิตใจ ดี ที่ สุด ใน สมัย ของ เรา ได้ อย่าง ไม่ ขาด สาย!"
 leviathans.590.tt_scientist:0 "เราอาจจะใช้เฉพาะ§Yหนึ่ง§! §Hนักวิทยาศาสตร์ผู้รักษาการ§!ในเวลาเดียวกัน"

 leviathans.598.name:0 "หลัก การ ที่ ใช้ ร่วม กัน"
 leviathans.598.desc:0 "เรายินดีที่จะร่วมชุมนุมของคุณ ด้วยหลักการพื้นฐานของความรู้ ขั้นตอนที่ร้ายแรงและหนึ่งเท่านั้นที่จะใช้ได้กับจิตสํานึกร่วมกัน\n\nแม้สําหรับเรา มันไม่ใช่เรื่องง่ายที่จะประสบความสําเร็จ ราคาไม่ได้น้อย แต่ ใน บรรดา สินค้า ทั้ง หมด ความ รู้ ยัง คง มี ค่า มาก ที่ สุด."
 leviathans.598.a:0 "$leviathans.590.a$"
 leviathans.598.a.reply:0 "การลงทุนเสียง"
 leviathans.598.tt_principles:0 "หลัก การ พื้น ฐาน ของ ผู้ บํารุง รักษา ได้ มี การ บอก ให้ เรา ทราบ แล้ว."

 leviathans.599.name:0 "ซื้อข่าวกรอง"
 leviathans.599.desc:0 "เนื่องจากคุณเป็นหนึ่งในลูกค้าที่เราไว้ใจ เราสามารถเปิดเผยข้อมูลบางอย่างกับคุณ สิ่งที่คุณทํากับข้อมูลนี้ขึ้นอยู่กับคุณอย่างแน่นอน\n\nคุณอยากรู้อะไร?"
 leviathans.599.a:0 "บอกเราเกี่ยวกับ[curator_customer_1.GetName]."
 leviathans.599.b:0 "คุณรู้อะไรเกี่ยวกับ[curator_customer_2.GetName]?"
 leviathans.599.c:0 "เราอยากรู้เกี่ยวกับ[curator_customer_3.GetName]."
 leviathans.599.d:0 "เดอะ[curator_customer_4.GetName]เราสนใจ"
 leviathans.599.yes.reply:0 "เยี่ยม ข้อมูลจะถูกโอนมาถึงคุณทันที ผ่านการเชื่อมโยง ระหว่างดาวที่มีความปลอดภัยมากที่สุด ในกาแล็กซี่"

 leviathans.600.name:0 "$clues$"
 leviathans.600.desc:0 "เดอะ$lgates$ใช่ เหมือนประตูบานอื่นที่พวกเขาใช้มาก่อน$gov_stagnant_ascendancy$แต่เราแน่ใจว่าคุณคิดออกแล้ว\n\nทําไมมันต่างกัน? มันจะพาเราไปไหน? เราได้เลือกที่จะไม่ลึกเกินไป ในความลึกลับเหล่านั้น\"บิดเบี้ยว, 0จุด 7 ทีน\" คุณรู้ว่ามันเป็นยังไง แต่เรายินดีที่จะแบ่งปันการเปิดเผยบางอย่างเมื่อเร็ว ๆ นี้\n\nสําหรับราคา"
 leviathans.600.a:0 "ได้โปรดทําเถอะ"

 leviathans.596.desc:1 "ดูเหมือนว่าเราจะประเมินความสามารถคุณต่ําเกินไป ในการทําหน้าที่เป็นชาติที่เจริญแล้ว แปลก... ตาม ปกติ เรา สามารถ ระบุ ตัว คน รุนแรง ได้ ใน ระยะ แรก ๆ.\n\nเราตัดการเข้าถึงธนาคารข้อมูลของเรา"
 leviathans.597a.desc:0 "คุณโง่! โดยการโจมตีเรา คุณกําลังประณามคนรุ่นต่อไป ของชีวิตที่มีเทคโนโลยีต่ํา!"
 leviathans.597b.desc:0 "สัญชาตญาณพื้นฐานบังคับคุณให้โจมตีเรา และตอนนี้คุณต้องชดใช้ เราจะไม่แบ่งปันความรู้ของเรา[Root.GetName]อีกครั้ง"
 leviathans.597c.desc:1 "เรามีมากที่จะให้คุณ[Root.GetSpeciesNamePlural]แต่กระนั้นเจ้าก็ยังโยนมันทิ้งไป ไอ้สวะนีโอบาเรียน"
 leviathans.597d.desc:0 "ท่านได้รับประกาศให้เป็นศัตรูของคณะรัฐมนตรีทั้งหมด"

 leviathans.510.name:0 "เลื่อนหน้าต่างหมายเหตุ"
 leviathans.510.desc:0 "สปีชีส์เอเธอร์ เดรก ไม่เหมาะกับชีวิตในจักรวาลของเรา มังกรตัวสุดท้ายแข็งแกร่ง แต่ไม่แข็งแกร่ง"
 leviathans.510.a:0 "จริงๆแล้วมันคืออะไร?"
 leviathans.510.a.reply:0 "โดยทุกบัญชีนก นางแอ่นล่วงหน้าทุกอารยธรรมกาแล็กซี่ ครั้ง หนึ่ง เคย มี ผู้ คน มาก มาย แต่ เผ่า พันธุ์ ของ พวก เขา กําลัง สูญ เสีย ไป เพราะ ความ หยิ่ง.\n\nพวกเขาไม่เหมาะสมในชีวิต ทั้งที่นี่และปัจจุบัน บาง สิ่ง เกี่ยว กับ กฎ ทาง กายภาพ ของ เอกภพ ไม่ เห็น ด้วย กับ กฎ เหล่า นั้น เช่น กฎ เหล่า นั้น วิวัฒนาการ มา ใน อีก เรื่อง หนึ่ง. จริง ๆ แล้ว พวกเขาทํา เราเชื่อว่าพวกเขาเป็นเพียงเศษเสี้ยวสุดท้าย ของจักรวาลที่สิ้นสุดลงก่อนที่ของเราเริ่มต้น\"บิ๊กชีส\"\n\nมังกรไม่ไกลจากที่นี่ เป็นชนิดสุดท้ายของมัน ในกาแล็กซี่อาจจะจักรวาล"
 leviathans.510.b:0 "จะเอาชนะมันได้อย่างไร"
 leviathans.510.b.reply:0 "เกล็ดของมันตอบสนองต่อจังหวะการกระดอน เพื่อความแม่นยํา ความถี่บางอย่างมีผลผ่อนคลาย ต่อระบบวัฒนธรรมย่อย ควบคุมตําแหน่ง การตอบสนองที่ครั้งหนึ่งมีบทบาทสําคัญ ในปฏิสัมพันธ์ทางสังคมของเอเธอร์เดรค ปัจจุบันเป็นจุดอ่อนที่ชัดเจนและชัดเจน\n\nการปรับรูปแบบการยิงของเรือ ตามจังหวะเฉพาะอย่าง จะเพิ่มความเสียหายอย่างมาก มัน ไม่ เคย หมาย ความ ว่า เรา จะ พ้น จาก ความ ทุกข์."

 leviathans.515.name:0 "ป้อมเอนโทรนิค"
 leviathans.515.desc:0 "มันเป็นชนิดของความไร้สาระ ขนาดใหญ่และการสร้างตัวเอง ที่คุณไม่ได้เห็นสร้างอีกต่อไป บางทีนั่นอาจเป็นสิ่งที่ดีที่สุด"
 leviathans.515.a:0 "โครงสร้างทุกอย่างสามารถถูกทําลายได้"
 leviathans.515.a.reply:1 "ป้อมนี้เคยถูกทําลายมาก่อน แต่มันก็ฟื้นตัวได้ตลอด บางส่วนของจักรวรรดิโบราณของกาแล็กซี่นี้ ถูกผลักดันให้บ้าคลั่ง ด้วยความพยายามอันไร้ประโยชน์ของพวกเขา ที่จะไขความลับที่ลึกที่สุด ดู เหมือน ว่า มัน มุ่ง ความ สนใจ ไป ที่ การ รักษา ตัว เอง จน เรา สงสัย ว่า มัน มี จุด มุ่ง หมาย อื่น ใด ที่ สําคัญ."
 leviathans.515.b:0 "จะ เข้า ไป ใน ป้อม ได้ ไหม?"
 leviathans.515.b.reply:1 "เป็น ไป ได้ และ เป็น ไป ได้ แม้ ว่า ความ พยายาม นั้น เกือบ จะ ลืม เสีย แล้ว. ป้อมรักษาเฉพาะพลังงานบางส่วน ในขณะที่กําลังปิด อย่างไรก็ตาม มันจะพยายามที่จะดึงพลังงานจากแหล่งใกล้เคียง ดําเนินการอย่างระมัดระวัง"
 leviathans.515.c:0 "ใคร สร้าง ป้อม?"
 leviathans.515.c.reply:1 "ไม่ว่าเขาจะเป็นใคร พวกเขาต้องชอบปริศนาและปริศนาแน่ สิ่ง เดียว ที่ ค้น พบ ได้ จาก ป้อม ปราการ นี้ คือ รูป ทรง โลหะ แปลก ๆ: ส่วน ประกอบ ของ อุปกรณ์ ที่ ทํา ให้ งุนงง ซึ่ง ดู เหมือน ถูก ออก แบบ มา ให้ เปลี่ยน เป็น รูป แบบ ที่ น่า พอ ใจ กว่า. ผู้ ที่ นํา พวก เขา กลับ ทํา เช่น นั้น เพราะ ล้ม เหลว และ พวก เขา แทบ ไม่ รอด ชีวิต. มีอีกหลายคนที่ไม่"
 leviathans.515.d:0 "ป้อมปราการพลังงานได้อย่างไร"
 leviathans.515.d.reply:1 "ระบบพลังงานต้องถูกสร้างขึ้น ในขณะนั้น ระหว่างการสร้างยานลําแรก และการติดตั้งระบบป้องกัน เราไม่ทราบวิธีการฟื้นตัวของระบบ แต่เราพบว่าป้อมปราการที่มีปริมาณมากของสสารมืด สสารและความสัมพันธ์ของมันกับหลุมดํา เป็นกุญแจสําคัญที่จะเข้าใจว่าป้อมปราการได้ดํารงอยู่นาน\n\nไม่ มี ใคร เคย พบ แหล่ง แห่ง พลัง ของ มัน แต่ ดู เหมือน ว่า มัน จะ ระเหย ไป อย่าง รวด เร็ว."
 leviathans.515.bb:0 "เตือนเราเกี่ยวกับการเข้าสู่มัน"
 leviathans.515.cc:1 "เตือนเราที่สร้างมัน"
 leviathans.515.dd:1 "เตือนเราว่ามันใช้พลังงานยังไง"

 leviathans.520.name:0 "ผู้ประกาศข่าว"
 leviathans.520.desc:0 "ส เต ล ลา เด อร์ เป็น ปรสิต ตัว ใหม่ บน พื้น ดิน ล่า สัตว์ ไม่ ต่าง จาก จักรวรรดิ ของ คุณ ใน หลาย ทาง. มันเกิดจากความกลัวและนิวเคลียร์ฟิวชั่น มันโคจรรอบกาแล็กซี่ ปกคลุมตัวเองเป็นดาว กินเลี้ยงพวกเขาจากภายใน และแน่นอนมันไม่ชอบให้ใครรบกวน"
 leviathans.520.a.reply:0 "ดาว-เฟสเตอร์เป็นสายพันธุ์ที่หายาก สัตว์ ร้าย ชนิด ใหม่ ที่ ไม่ รู้ จัก มา จาก แหล่ง ใด. บัญชีที่เรารวบรวมมา มีน้อยและน้อยด้วยข้อมูล มี น้อย คน ที่ เคย ประสบ ด้วย ตัว เอง ใน เรื่อง นี้.\n\nอย่าง ไร ก็ ตาม ข้อมูล ทั้ง หมด ของ เรา ชี้ ไป ยัง ข้อ เท็จ จริง เดียว กัน: ความ หวาด กลัว นั่น แหละ ที่ ก่อ ให้ เกิด ความ หายนะ.\n\nสเลเตอร์ เดเวอร มีความสามารถในการกิน จากตัวฟิวชั่นเอง ของเรา§Yมาก§!มีการศึกษาคาดเดาได้ว่าชีววิทยาของมัน เป็นผลมาจาก การสลายตัวของสสารมืด และสสารแสงอาทิตย์ มันดําดิ่งสู่ดวงดาว กินอาหารจากเครื่องใน เพื่อเติมเชื้อเพลิงให้กับเตาปฏิกรณ์ฟิวชั่นภายในของมัน มันนําความตายมาสู่ทุกระบบ พวกเขาแตกเหมือนน้ําแข็งหลังจากการเลี้ยงของ หรือพวกเขาไหม้จากการสัมผัสดวงอาทิตย์ครั้งที่สองจากภายในท้องของ\n\nมันต้องการดื่มเลือด และมันจะไม่หยุดเพื่อให้ได้ส่วนแบ่งของมัน เมื่อคุณมองมัน สิ่งที่คุณเห็น คือความโกรธรุนแรงของผู้รอดชีวิต"
 leviathans.520.b.reply:0 "สิ่งเดียวที่เรารู้แน่นอน คือแกนที่เก็บรวบรวมได้ คือส่วนที่สําคัญที่สุดของสเลเตอร์ เดเวอร์ สิ่ง มี ชีวิต ชนิด นี้ จําเป็น อย่าง ยิ่ง เพื่อ รักษา การ เผา ไหม้ ใน เตา ไฟ ไว้ เกรง ว่า การ ว่าง เปล่า อัน เย็น ชา ของ อวกาศ จะ เข้า ไป ถึง อวัยวะ สําคัญ ภาย ใน ที่ ลึก เข้า ไป อีก และ ทํา ให้ มัน ยุบ ตัว อยู่ ใน ตัว มัน เอง. ถ้าไม่มีดวงดาวนั่น มันก็ไม่มีอะไร\n\nคุณใช้มันเพื่อประโยชน์ของคุณ นําอาวุธของคุณไปพิจารณาตามข้อกําหนด และคุณสามารถกลับบ้านได้บนเยื่อหุ้มเซลล์ ที่ยึดระบบย่อยอาหารของเดเวอรเข้าด้วยกัน กรีดมันและคุณจะเห็นเครื่องในของมันพุ่งออกมา ผ่านระบบสุริยะ"

 leviathans.525.name:0 "ความ มหัศจรรย์ ของ มิติ"
 leviathans.525.desc:0 "เครื่อง มือ ของ เรา เฝ้า ดู การ สั่น สะเทือน ของ พลัง งาน มหาศาล เมื่อ สิ่ง นี้ เจาะ เข้า ไป ใน อาณา เขต แห่ง การ ดํารง อยู่ ของ เรา."
 leviathans.525.a:0 "$leviathans.510.a$"
 leviathans.525.a.reply:0 "คัมภีร์ ไบเบิล กล่าว อย่าง ไร? สิ่ง ที่ เรา เห็น เป็น เพียง ส่วน เล็ก ๆ ของ สิ่ง มี ชีวิต ทั้ง หมด ที่ ใหญ่ กว่า มี จํานวน มาก กว่า.\n\nนับ ว่า เป็น การ โชค ดี จริง ๆ ที่ ไม่ สามารถ ทํา ให้ การ เปลี่ยน แปลง สู่ เอกภพ ของ เรา ครบ ถ้วน. ถ้ามันประสบความสําเร็จ สิ่งมีชีวิตนี้น่าจะกินชีวิตทั้งหมด ในกาแล็กซี่ตอนนี้"
 leviathans.525.b:0 "$leviathans.510.b$"
 leviathans.525.b.reply:0 "ประตูมิติที่มันสร้างขึ้น คือจุดอ่อนที่ยิ่งใหญ่ที่สุด หากปราศจากมัน มันไม่สามารถดํารงอยู่ในจักรวาลของเรา เราระบุจุดอ่อนแอได้หลายจุด ในเครื่องกําเนิดพลังงานของประตูมิติ ที่สามารถใช้ประโยชน์ได้ด้วยอาวุธทั่วไป กําลังแปลงพิกัดเป้าหมายเดี๋ยวนี้"

 leviathans.530.name:0 "เครื่องมือทาสี"
 leviathans.530.desc:0 "แมลง ที่ น่า รําคาญ เหล่า นี้ เคย มี อยู่ มาก กว่า นี้ ใน กาแล็กซี ของ เรา. มีอยู่ช่วงหนึ่งที่คุณไม่สามารถ แล่นเรือผ่านเข็มขัดดาวเคราะห์น้อยสุ่ม โดยไม่ต้องสัตว์เล็ก ๆ น้อย ๆ"
 leviathans.530.a:0 "$leviathans.510.a$"
 leviathans.530.a.reply:0 "พวกมันเป็นสิ่งมีชีวิตจากซิลิกอนที่ควบคุมได้ แม้ ว่า พวก เขา เคย ก่อ ให้ เกิด ภัย คุกคาม ที่ สําคัญ ต่อ อารยธรรม ที่ กําลัง ท่อง เที่ยว แต่ จํานวน ของ พวก เขา ถูก ทํา ให้ เสื่อม ลง อย่าง หนัก ตลอด 500,000 ปี ที่ ผ่าน มา และ สมาชิก ที่ รอด ชีวิต ของ เผ่า พันธุ์ เหล่า นี้ ก็ ค่อน ข้าง จะ เป็น คน ที่ สันโดษ.\n\nทั้ง ๆ ที่ มี ข่าว ลือ ตรง กัน ข้าม ไม่ มี หลัก ฐาน ว่า พวก เขา มี สิ่ง ใด ที่ อาจ พรรณนา ได้ ว่า เป็น เชาวน์ ปัญญา ที่ ทํา ให้ นึก ภาพ ได้. พวกเขามีแนวโน้มที่จะรังภายในดาวเคราะห์น้อยและพวกเขาจะโจมตีอะไรก็ตาม ที่ถูกมองว่าเป็นภัยคุกคาม"
 leviathans.530.b:0 "$leviathans.510.b$"
 leviathans.530.b.reply:0 "สิ่งมีชีวิตพวกนี้มีแนวโน้ม ที่จะเคลือบรังดาวเคราะห์น้อยของมัน ด้วยสารที่ไม่ทราบชนิด ที่ทําหน้าที่เป็นเกราะที่มีประสิทธิภาพ สสารนี้ไม่ได้ถูกนําไปใช้ได้อย่างสมบูรณ์แบบ ทั่วพื้นผิวทั้งหมดของดาวเคราะห์น้อย อย่างไรก็ตาม\n\nด้วยข้อมูลเป้าหมาย ที่เรากําลังส่งให้คุณตอนนี้ เรือของคุณจะสามารถมุ่งไปยังไฟของพวกเขา"

 leviathans.535.name:0 "เครื่องที่เสร็จแล้ว"
 leviathans.535.desc:0 "อา ใช่ สีโครมาติก มาจากนานมาแล้ว เราได้ศึกษามันมานาน ที่สุดเท่าที่เรามีลําดับ เช่นเดียวกับมีอารยธรรมหลายก่อนเรา\n\nเครื่องนี้อยู่นอกเหนือยุคโบราณ สําหรับทุกสิ่งที่เรารู้ว่า มันเป็นมาตลอด แต่ทั้งหมดที่มันทําคือการโคจรหลุมดําที่ มันน่าทึ่งสําหรับเรา แต่เราเข้าใจ ถ้ามันมากเกินไปสําหรับคุณที่จะเข้าใจ"
 leviathans.535.a.reply:0 "เครื่องไม่สมบูรณ์อย่างที่คุณเรียกตรง ๆ คือ การสกัด ไม่มีข้อมูลจากมัน ไม่มีแฮ็คเกอร์หรือวิศวกรคนไหนในกาแล็กซี่ทั้งหมด ที่มองเห็นผ่านภายนอกอันแวววาว เรากําลังสูญเสีย เราไม่ทราบว่ามันสําหรับหรือสิ่งที่มันมุ่งที่จะทําเมื่อมันทํา"
 leviathans.535.b.reply:0 "อาจมีสิ่งหนึ่งที่นายสามารถทําลายมันได้ เรา ไม่ สามารถ รับ ข้อมูล จาก มัน ได้ แต่ เรือ สามารถ หัก ได้. ชาวเหมืองได้พยายามรวบรวมทรัพยากรจากมันหลายครั้ง เพียงเพื่อกลับมาพร้อมกับเรือของพวกเขา แต่พวกเขาพบสิ่งที่น่าสนใจ: เครื่องไม่สมบูรณ์ไม่ได้แข็งอย่างที่เห็น\n\nมันถูกสร้างจากวัสดุที่สามารถ เปลี่ยนลักษณะนิสัยได้ ความหนาแน่น ยืดหยุ่น ความร้อน มัน สามารถ วิเคราะห์ ความ เสีย หาย ใน เวลา แท้ และ เปลี่ยน เปลือก ของ มัน เพื่อ ชดเชย ซึ่ง ทํา ให้ ตัว มัน เอง ยาก ขึ้น ที่ จะ กําจัด. เปลี่ยนความถี่ของคุณ ปรับอุณหภูมิของขีปนาวุธของคุณ อะไรก็ตามที่พวกคุณใช้ เพื่อที่คุณจะได้ผ่านความสามารถปรับตัว"

 leviathans.540.name:0 "ดัตช์แบบอัตโนมัติ"
 leviathans.540.desc:0 "เรื่องเศร้า ผู้ เชี่ยวชาญ ได้ เสีย ชีวิต ไป หลาย ล้าน ปี แล้ว แต่ เรือ รบ ขนาด มหึมา นี้ ยัง คง ยืน เฝ้า ดู ซาก ปรัก หัก พัง ของ จักรวรรดิ ของ พวก เขา."
 leviathans.540.a:0 "$leviathans.510.a$"
 leviathans.540.a.reply:0 "เป็น หนึ่ง ใน เรือ ธง หลาย ลํา ที่ เป็น ของ จักรวรรดิ ระหว่าง ดวง ดาว ที่ มี อํานาจ อย่าง ผิด ปกติ ซึ่ง เจริญ รุ่งเรือง ใน ภูมิภาค เล็ก ๆ ของ กาแล็กซี ของ เรา ประมาณ เจ็ด ล้าน ปี มา แล้ว. ดัง ที่ เป็น อยู่ บ่อย ครั้ง จักรวรรดิ ถูก ทําลาย อย่าง กะทันหัน และ รุนแรง โดย น้ํา มือ ของ เพื่อน บ้าน ใน สงคราม ที่ ก่อ ความ หายนะ.\n\nความ กลัว ที่ คุณ พบ เป็น สิ่ง สุด ท้าย ของ ชนิด นี้ และ ยัง คง ตรวจ สอบ ระบบ ที่ ได้ รับ มอบ หมาย ต่อ ไป แม้ ลูก เรือ ของ มัน จะ เสีย ชีวิต. มี การ พยายาม หลาย ครั้ง ตลอด ยุค สมัย เพื่อ นํา เรือ รบ เก่า ไป สู่ การ หยุด พัก ครั้ง สุด ท้าย — ไม่ ประสบ ความ สําเร็จ เลย."
 leviathans.540.b:0 "$leviathans.510.b$"
 leviathans.540.b.reply:0 "ด อร์น็ อดท์ ถูก ออก แบบ ให้ ทํา งาน ร่วม กับ ลูก เรือ ขนาด ใหญ่ แต่ ตอน นี้ ต้อง อาศัย ระบบ อัตโนมัติ เท่า นั้น. การ ทํา เช่น นี้ ทํา ให้ เรือ มี ความ เสี่ยง เป็น พิเศษ ต่อ การ โจมตี ซึ่ง ทําลาย ปม สัญญาณ ที่ ใช้ โดย คอมพิวเตอร์ ตัว กลาง."

 leviathans.545.name:0 "วีราท"
 leviathans.545.desc:0 "สเปกตรัมความโกรธเคืองเป็นสัตว์ที่รบกวนถ้ามันเป็นสัตว์ที่ทุกคน เราคิดว่ามันเป็นภัยพิบัติธรรมชาติที่หายาก และมีประสิทธิภาพสูง"
 leviathans.545.a:0 "คุณรู้อะไรเกี่ยวกับภัยพิบัติเหล่านี้บ้าง"
 leviathans.545.a.reply:0 "มันปรากฏเป็นภาพลวงตาของแสง แต่เมื่อคุณได้รับใกล้ มันจะเติบโตอย่างรวดเร็วว่า พวกเขาอยู่ห่างไกลจากความ มืดมน\n\nพูด อีก อย่าง ก็ คือ การ ปรากฏ ตัว เช่น นั้น เป็น กุญแจ สู่ ความ พ่าย แพ้ ของ พวก เขา. ความสัมพันธ์ของพวกเขากับสเปกตรัมของแสงที่มองเห็นได้ คือความแข็งแกร่งของพวกเขา แต่มันลดลงเมื่อพวกเขาเข้าใกล้ แหล่งแสงของความถี่ที่คล้ายกัน ตั้งใจฟังสีของวราธให้ดี"
 leviathans.545.b:0 "สิ่งที่เกี่ยวกับสีแดงพิโรธ?"
 leviathans.545.b.reply:0 "วงกลมสีแดงมีความถี่450z แสงสว่างของพวกเขามีความสอดคล้องกันกับ§Yคลาสดาว§!ความ สามารถ ของ พวก เขา ใน การ หลีก เลี่ยง อาวุธ ธรรมดา นั้น อ่อนแอ ลง ใน ระบบ ที่ มี คนแคระ สี แดง."
 leviathans.545.c:0 "แล้ววราทสีเหลืองล่ะ"
 leviathans.545.c.reply:0 "เยลโล่ว์ วิรัต มีความถี่520thz.แสงสว่างของพวกเขามีความสอดคล้องกันกับ§Yคลาสจุด§!ความ สามารถ ของ พวก เขา ใน การ หลีก เลี่ยง อาวุธ ธรรมดา นั้น อ่อน ลง ใน ระบบ ที่ มี คนแคระ สี เหลือง."
 leviathans.545.d:0 "แล้วบลูวิธล่ะ"
 leviathans.545.d.reply:0 "สีน้ําเงินมีความถี่650.แสงของพวกเขาประสานกับทั้งสอง§Yคลาส A§!ถึง§Yคลาสบีดาว§!ความ สามารถ ของ พวก เขา ใน การ หลีก เลี่ยง อาวุธ ธรรมดา นั้น อ่อนแอ ลง ใน ระบบ ที่ มี ยักษ์ สี น้ําเงิน."

 leviathans.593:1 "สถานี บํารุง รักษา ถูก ทําลาย"
 leviathans.593.desc:1 "หลังจากที่ทําลายสถานีพิธีกรโบราณใน[curator_system.GetName]ระบบ ความสามารถของเรา ตรวจค้นพื้นที่ ที่ครั้งหนึ่งเคยครอบครอง พวกเขาจัดการกู้ชิ้นส่วนความทรงจํา จากธนาคารข้อมูลผู้ดูแล ที่ควรจะมีประโยชน์อย่างมากต่อการวิจัยของเรา"
 leviathans.594.a.desc:0 "$leviathans.594.ab.desc.start$\n\n$leviathans.594.ab.desc.known$"
 leviathans.594.b.desc:0 "$leviathans.594.ab.desc.start$\n\n$leviathans.594.ab.desc.unknown$"
 leviathans.594.ab.desc.start:1 "รายการการสื่อสารอวกาศลึกรับโทรฉุกเฉินสั้น ๆ อัตโนมัติจากสถานีผู้ดําเนินงานใน[curator_system.GetName]ระบบ การส่งยุติลงหลังจากเพียงไม่กี่นาที และการค้นหาระยะไกล ได้ยืนยันว่าสถานีอวกาศโบราณถูกทําลาย"
 leviathans.594.ab.desc.known:1 "ทางเดินไอออนกลับชี้ว่าแรงจาก§Y[curator_destroyer.GetName]§!อยู่เบื้องหลังการโจมตีครั้งนี้"
 leviathans.594.ab.desc.unknown:0 "กองกําลังที่รับผิดชอบต่อการโจมตีนี้ ยังคงไม่ทราบชื่อ"
 leviathans.594.c.desc:0 "$leviathans.594.cd.desc.start$ $leviathans.594.cd.desc.known$\n\n$leviathans.594.cd.desc.trade$"
 leviathans.594.d.desc:1 "$leviathans.594.cd.desc.start$ $leviathans.594.ab.desc.unknown$\n\n$leviathans.594.cd.desc.trade$"
 leviathans.594.cd.desc.start:1 "การติดต่อทั้งหมดหายไป[From.GetName]และหน่วยลาดตระเวณของเราได้ยืนยันว่า สถานีผู้ตรวจการโบราณถูกทําลาย"
 leviathans.594.cd.desc.known:1 "รายงานพวกนี้บอกว่ากองกําลังจู่โจม เป็นของ§Y[curator_destroyer.GetName]§!."
 leviathans.594.cd.desc.trade:1 "แต่น่าเสียดายที่การเสียชีวิตของผู้ดูแล หมายความว่าเรายังสูญเสียการเข้าถึง ข้อมูลที่กว้างขวางของพวกเขา"
 leviathans.594.a:0 "จุดจบของมรดกของพวกเขา"
 leviathans.594.b:0 "นี่ ทํา ให้ เรา ต้อง เสีย สละ อย่าง ยิ่ง!"

 ### DRAGON
 leviathans.610.name:1 "เพิ่มช่อง"
 leviathans.610.desc:1 "สัตว์ประหลาดที่สังเกตเห็นใน[From.GetName]ระบบไม่เหมือนอะไร[Root.GetName]เคยพบกันมาก่อน\n\nก้าวร้าวมากและมีความสามารถในการทําลายที่จะเข้ากันได้ มันปกป้องดาวเคราะห์ดาวเคราะห์ สแกนที่ระบุว่าเป็นทรัพยากรที่อุดมเป็นพิเศษ"
 leviathans.610.desc.here_be_dragons:0 "สัตว์ประหลาดที่สังเกตเห็นใน[From.GetName]ระบบมีความคล้ายคลึงกันในตอนต้น กับมังกรฟ้าในระบบของเรา แม้ว่าการสแกนต่อไปจะแสดงให้เห็นว่า มันเป็นสายพันธุ์ที่แตกต่างกัน\n\nก้าวร้าวมากและมีความสามารถในการทําลายที่จะเข้ากันได้ มันปกป้องดาวเคราะห์ดาวเคราะห์ สแกนที่ระบุว่าเป็นทรัพยากรที่อุดมเป็นพิเศษ"
 leviathans.610.a:0 "น่ารังเกียจ"

 leviathans.649.desc:0 "เราได้รับการติดต่อครั้งสุดท้ายจากยานของเรา ก่อนที่มันจะถูกทําลาย มันพูดถึงศัตรูตัวมหึมาของพวกเขา ที่ดูเหมือนกําลังจมอยู่กับสัญลักษณ์ของความเร็ว\n\nหากสัตว์ร้ายมีกลิ่นของเรา เราควรจะเตรียม สําหรับการแก้แค้นป่าเถื่อน"
 leviathans.649.desc.gesta:0 "ขณะที่เอเธอร์ เดรกโจมตียานของเรา ดูเหมือนว่ามันกําลังจะเข้าสู่ความเร็ว\n\nถ้าสัตว์มีกลิ่นของเรา เราควรจะเตรียม สําหรับการแก้แค้นป่าเถื่อน"
 leviathans.649.a:0 "แจ้งเตือนคําสั่งทั้งหมด"
 leviathans.649.b.gesta:0 "เราจะพร้อม"
 leviathans.650.name:0 "มังกร มา แล้ว"
 leviathans.650.desc:0 "เราได้รับสัญญาณจาก[Root.GetName]ก่อนที่ฝูงบินจะเข้าสู่ระบบความเร็วฉุกเฉิน แล้วหายตัวไป มันรวมถึงการพูดถึงสัตว์แกร์แกนตูน ที่พวกมันต่อสู้อยู่ ดูเหมือนอยู่ในสัญญาณ FTL...\n\nหากสัตว์ร้ายมีกลิ่นของเรา เราควรจะเตรียม สําหรับการแก้แค้นป่าเถื่อน"
 leviathans.650.desc.gesta:0 "$leviathans.649.desc.gesta$"

 leviathans.660.name:0 "เครื่องราชอิสริยาภรณ์มังกร"
 leviathans.660.desc:0 "ฝังลึกในเปลือกของ[From.GetName]เป็นชิ้นส่วนที่เป็นฟอสซิลของ สิ่งที่ดูเหมือนจะได้ใกล้ชิดกับลากตัวพิมพ์ใหญ่ที่เคยอาศัยอยู่ใน[From.GetStarName]ระบบ\n\nในมหายุคตั้งแต่ที่เดร็กลูกพี่ลูกน้องนี้ผ่าน เนื้อเยื่ออ่อนของมันก็ถูกทําให้แข็ง และกระดูกก็งอก"
 leviathans.660.a:1 "ศึกษาซากศพ"
 leviathans.660.b:0 "เอาพวกเขาลงไป"

 leviathans.661.name:0 "ดราก้อนฮอร์ด โบรดของมังกร"
 leviathans.661.desc:0 "ขณะที่โรงงานเหมืองของเราหมุนรอบ§Yนก แก้ว มังกร§!มี การ จัด ระเบียบ ใหม่ เพื่อ จัด การ กับ เส้น เลือด ดํา แร่ ที่ อุดม เป็น พิเศษ ตัว ตรวจ จับ สิ่ง ที่ ยัง ไม่ พบ เห็น มา ก่อน.\n\nไม่ มี วัน เสื่อม สูญ§Yไข่ลาก§!ในสภาวะที่สะอาด ถูกฝังอยู่ใต้พื้นผิวของดาวเคราะห์น้อย และล้อมรอบด้วยเปลือกแตก ของหลายตัวอย่างโชคดีน้อยกว่า ไข่ได้ถูกขุดและเอาออกจากเหมืองแร่แล้ว แต่โชคชะตาของไข่ยังไม่แน่นอน"
 leviathans.661.a:0 "ไอ้หนุ่มเอเธอร์ เดรค จะกลายเป็นพันธมิตรที่น่ากลัว"
 leviathans.661.a.tooltip:0 "ส่งไข่ไป[Root.Capital.GetName]."
 leviathans.661.b:0 "คนสุดท้ายถูกฆ่าเพราะมีเหตุผล"
 leviathans.661.b.tooltip:0 "วางไข่ซะ"
 leviathans.664.name:0 "ดราก้อนฮอร์ด ดราก้อนรีบอร์น"
 leviathans.664.desc:0 "ไข่ฟัก"
 leviathans.664.a:0 "มังกรคําราม"
 leviathans.664.a.tooltip:0 "Young Ether Drake §HScile§! joins the fleets of the [Root.Owner.GetName]."
 leviathans.665.name:0 "ดราก้อนฮอร์ด ดีที่สุดก่อน"
 leviathans.665.desc:0 "ไข่ของอีเทอร์ เดรก ที่ได้กลับคืนมาจากฮอร์ด ดาวเคราะห์รอยด์ของมังกร มีคําของนักอุตุนิยมวิทยาที่ดูแลโอวูม ผ่านวันหมดอายุของมัน\n\nไม่มีความหวังใด ๆ ที่จะฟักสัตว์ภายใน"
 leviathans.665.desc.gesta:0 "ไข่ของอีเธอร์ เดรก ที่ถูกเก็บจากฮอร์ด ดาวเคราะห์ของมังกร ไม่สามารถพิจารณาได้อีกต่อไป\n\nสายพันธุ์ที่สูญพันธุ์"
 leviathans.665.desc.machine: "ไข่ของอีเธอร์ เดรก ถูกตัดแล้ว โพรเซสทางชีววิทยาได้ล้มเหลว และยังไม่มีรายงานข้อผิดพลาดสําหรับการดีบั๊ก"

 leviathans.670.name:0 "ผู้ฆ่ามังกร"
 leviathans.670.desc:3 "เอเธอร์ เดรคผู้น่าเกรงขาม ถูกฆ่า ความ กล้า หาญ เป็น พิเศษ ของ ผู้ บัญชา การ[From.From.GetLeaderName]และ[From.From.GetName]ในไม่ช้าจะไม่ถูกลืม\n\nเดอะ§Hดาวเคราะห์§!สัตว์ร้ายที่เฝ้ายามไว้ หึงหวงมาก ตอนนี้สามารถใช้ประโยชน์ได้อย่างปลอดภัย ใครจะไปรู้ว่าสัตว์นั่นสะสมสมบัติอะไรไว้บ้าง"
 leviathans.670.desc.noleader:3 "เอเธอร์ เดรคผู้น่าเกรงขาม ถูกฆ่า ความกล้าหาญที่พิเศษของ[From.From.GetName]ในไม่ช้าจะไม่ถูกลืม\n\nเดอะ§Hดาวเคราะห์§!สัตว์ร้ายที่เฝ้ายามไว้ หึงหวงมาก ตอนนี้สามารถใช้ประโยชน์ได้อย่างปลอดภัย ใครจะไปรู้ว่าสัตว์นั่นสะสมสมบัติอะไรไว้บ้าง"
 leviathans.670.desc.gesta:0 "เอเธอร์ เดรคผู้น่าเกรงขาม ถูกฆ่า\n\nเดอะ§Hดาวเคราะห์§!สัตว์ร้ายที่เฝ้ายามไว้ หึงหวงมาก ตอนนี้สามารถใช้ประโยชน์ได้อย่างปลอดภัย สิ่ง มี ชีวิต เหล่า นี้ อาจ สะสม ทรัพย์ อะไร ไว้ มาก มาย เหนือ พวก บริวาร?"
 leviathans.670.a:0 "รับทราบ"
 leviathans.670.b:0 "จําเป็น แต่น่าเศร้า"

 # STELLARITE
 leviathans.999.name:0 "ดาวย่อ"
 leviathans.999.desc:0 "ในฐานะ[Root.GetName]เข้าไป[From.GetName]ระบบที่ดูเหมือนวุ่ยวาย ดวงอาทิตย์ก่อนหน้านี้ลงทะเบียนเป็นดาวแคระสามัญดูเหมือนจะมีการหดตัวลงมีมวลที่หายไป ในอัตราที่น่ากลัว ดาว เคราะห์ ต่าง ๆ ใน ระบบ นี้ ได้ เข้า สู่ ยุค น้ํา แข็ง เมื่อ เร็ว ๆ นี้."
 leviathans.999.a:0 "อะไร อาจ เป็น สาเหตุ ของ เรื่อง นี้?"
 leviathans.1000.name:0 "ผู้ประกาศข่าว"
 leviathans.1000.desc:0 "จากลึกภายในดาว[stellarite_system.GetName]ระบบปรากฏเป็นแกร์แกนตูอัน มีขนาดใหญ่กว่าดวงจันทร์ทั่วไป ร่างกายของมันจะแผ่รังสีความร้อน ความยาวของพลังงานเท่ากับที่ สร้างขึ้นโดยดาวของระบบ\n\nมัน§Yกิน§!มัน!\n\nสิ่งมีชีวิตกินที่จุดตะวัน กินพลุสุริยะ และพวกเราได้ขัดจังหวะอาหารของมัน สัตว์ร้ายแผ่คลื่นแสง ชีพจรที่ความถี่รุนแรง เหมือนเสียงคํารามของฟลูออเรสเซนต์"
 leviathans.1001.desc.stellarite_system:0 "จากลึกภายในดาว[Root.GetStarName]ระบบปรากฏเป็นแกร์แกนตูอัน มีขนาดใหญ่กว่าดวงจันทร์ทั่วไป ร่างกายของมันจะแผ่รังสีความร้อน ความยาวของพลังงานเท่ากับที่ สร้างขึ้นโดยดาวของระบบ\n\nมัน§Yกิน§!มัน!\n\nสิ่งมีชีวิตกินที่จุดตะวัน กินพลุสุริยะ และพวกเราได้ขัดจังหวะอาหารของมัน สัตว์ร้ายแผ่คลื่นแสง ชีพจรที่ความถี่รุนแรง เหมือนเสียงคํารามของฟลูออเรสเซนต์"
 leviathans.1001.desc:0 "ในฐานะ[Root.GetName]เข้าไป[Root.GetStarName]ระบบที่มันพบกับสิ่งที่น่ากลัว ยักษ์ ส่องแสงเหมือนดาวเล็กๆ อุปกรณ์ของเราแรกคิดว่า นี่เป็นระบบดาวคู่\n\nสัตว์ร้ายแผ่คลื่นแสง ชีพจรที่ความถี่รุนแรง เหมือนเสียงคํารามของฟลูออเรสเซนต์"
 leviathans.1016.desc:2 "ส เต ล ลา เด อร์ พ่าย แพ้. ซาก ของ มัน ยัง คง ม้วน ตัว และ ระเหย ออก มา เหลือ แต่ ถุง ไข่ และ ระบบ ย่อย อาหาร ซึ่ง มี สสาร ที่ มี อยู่ ใน ตัว ดาว.\n\nนัก วิทยาศาสตร์ บาง คน ได้ กระตุ้น เรา ให้ ตรวจ ดู ซาก ศพ ส่วน คน อื่น ๆ ปรารถนา ให้ เรา เอา ถุง ไข่ ออก มา. บาง ที อาจ มี ความ รู้ ที่ ลึก ซึ้ง บาง อย่าง ที่ มี จาก การ เข้าใจ ระบบ ย่อย อาหาร ของ มัน หรือ เรา อาจ ได้ รับ ความ หยั่ง เห็น เข้าใจ บาง อย่าง จาก ถุง ไข่ ไหม?"
 leviathans.1016.desc.gesta:1 "ส เต ล ลา เด อร์ พ่าย แพ้. ซาก ปรัก หัก พัง ของ มัน ถูก ม้วน ขึ้น และ ระเหย ออก มา เหลือ แต่ ถุง ไข่ และ ทาง เดิน หายใจ ของ มัน พร้อม ด้วย สสาร ที่ มี อยู่ ใน ตัว ดาว.\n\nบาง ที มี ความ รู้ ที่ ลึก ซึ้ง บาง อย่าง ที่ ควร ได้ จาก การ เข้าใจ ระบบ ย่อย อาหาร ของ มัน หรือ อาจ มี การ ศึกษา ถุง ไข่ ใน เมือง หลวง ของ เรา?"
 leviathans.1016.a:0 "ศึกษาเรื่องศพ"
 leviathans.1016.b:0 "ให้มันเป็นถ้วยรางวัลสําหรับทุกคนที่จะเห็น"
 leviathans.1016.c:0 "หยิบถุงไข่"
 leviathans.1017.desc:0 "การศึกษาซากสเลเตอร์ เดเวอร ได้ทําให้นักวิทยาศาสตร์ของเรา งงและประหลาดใจ การโคจรของดาว เป็นตัวเองเตาหลอมฟิวชั่นขนาดเล็ก การเก็บเกี่ยวสสารแสงอาทิตย์\n\nเนื่องจากร่างกายยังคงมีปริมาณ ของสสารแสงอาทิตย์ จากดาวของ[guardians_stellarite_home_system.GetName]เป็นระบบที่ดูดพลังงานจากพลังงานสุดท้าย เป็นไปได้ที่จะดึงพลังงานออกมา และนําดาวกลับมาใช้อีกครั้ง การเก็บเกี่ยวความร้อนของศพ สําหรับปลายของเราเอง สามารถสนองความต้องการพลังงานของเรา ในระยะสั้น แต่จะทําลายระบบ"
 leviathans.1017.desc.gesta:0 "การศึกษาของสเลเตอร์ เดเวอไรเออร์ ยังคงอยู่ ทําให้เรางงและประหลาดใจ การโคจรของดาว เป็นตัวเองเตาหลอมฟิวชั่นขนาดเล็ก การเก็บเกี่ยวสสารแสงอาทิตย์\n\nเนื่องจากร่างกายยังคงมีปริมาณ ของสสารแสงอาทิตย์ จากดาวของ[guardians_stellarite_home_system.GetName]เป็นระบบที่ดูดพลังงานจากพลังงานสุดท้าย เป็นไปได้ที่จะดึงพลังงานออกมา และนําดาวกลับมาใช้อีกครั้ง การเก็บเกี่ยวความร้อนของศพ สําหรับปลายของเราเอง สามารถสนองความต้องการพลังงานของเรา ในระยะสั้น แต่จะทําลายระบบ"
 leviathans.1017.a:0 "พยายามครองดาว"
 leviathans.1017.b:0 "เก็บเกี่ยวพลังงานในร่างกาย"
 leviathans.1018.desc:0 "โครงการ นี้ ประสบ ความ สําเร็จ! ยุบศพสเตลเลอร์ เดเวอร[guardians_stellarite_home_system.GetName]ดาวของระบบได้ดูดไฟ ของเตาหลอมแสงอาทิตย์ ดาวเคราะห์ในระบบกําลังร้อนขึ้น กลับมาสู่รูปแบบในอดีตของพวกเขา เมื่อดาวเหล่านี้ฟื้นตัว ใน บรรดา โลก เหล่า นั้น ก็ มี โลก ที่ หนาว เย็น ซึ่ง ตอน นี้ กําลัง ละลาย เพื่อ เผย ให้ เห็น โลก ของ กายา ซึ่ง สุก แล้ว และ พร้อม จะ ตั้ง อาณานิคม."
 leviathans.1018.alt.desc:0 "โครงการได้จ่ายไป แต่ด้วยค่าใช้จ่าย ยุบซากสเตลเลอร์ เดเวอร[guardians_stellarite_home_system.GetName]ดวงดาวทําให้เตาหลอมแสงอาทิตย์สว่างขึ้นเล็กน้อย แต่ยังพ่นพลุสุริยะออกมา[Root.GetName]ขอสาบานต่อนาวา ที่แล่นไปอย่างสะดวกสบาย ไม่มีผู้รอดชีวิต\nดาวเคราะห์ในระบบกําลังร้อนขึ้น ระดับอุณหภูมิใกล้เคียงกับรูปแบบเดิม"
 leviathans.1018.a.tooltip:0 "เปลี่ยนคลาสของดาวเคราะห์ทั้งหมดภายใน[guardians_stellarite_home_system.GetName]ระบบ\n\n[stellarite_rich_planet.GetName]กลายเป็นดาวเคราะห์กาและได้รับทรัพยากรต่อไปนี้:\n£energy£ §G+25§!\n£minerals£ §G+10§!"
 leviathans.1018.b.tooltip:0 "เดอะ[Root.GetName]ถูกทําลาย\n\nเปลี่ยนคลาสของดาวเคราะห์ทั้งหมดภายใน[guardians_stellarite_home_system.GetName]ระบบ\n\n[stellarite_rich_planet.GetName]กลายเป็นดาวเคราะห์ตูดรา และได้รับทรัพยากรดังต่อไปนี้:\n£energy£ §G+10§!\n£minerals£ §G+15§!"
 leviathans.1018.c.tooltip:0 "เปลี่ยนคลาสของดาวเคราะห์ทั้งหมดภายใน[guardians_stellarite_home_system.GetName]ระบบ\n\n[stellarite_rich_planet.GetName]กลายเป็นดาวแกเรีย"
 leviathans.1018.d.tooltip:0 "เดอะ[Root.GetName]ถูกทําลาย\n\nเปลี่ยนคลาสของดาวเคราะห์ทั้งหมดภายใน[guardians_stellarite_home_system.GetName]ระบบ\n\n[stellarite_rich_planet.GetName]กลายเป็นดาวทูดรา"

 # INFINITY MACHINE
 leviathans.1030.name:0 "ความ ไม่ แน่นอน"
 leviathans.1030.desc:1 "ในฐานะ[Root.GetName]เข้าหา[Root.GetStarName]หลุมดําที่พวกเขาพบว่า พวกเขาไม่ได้อยู่คนเดียว ณ ขอบ ฟ้า ของ เหตุ การณ์ มัน เรือง แสง สะท้อน แสง จาก ดวง ดาว ที่ ถูก ดึง เข้า ไป ใน หลุม ที่ อุด ตัน. การก่อสร้างขนาดใหญ่ ในรูปร่างของทรงกลมที่สมบูรณ์แบบ\n\nเรา ไม่ สามารถ รับ สัญญาณ ใด ๆ จาก สัญญาณ นั้น ได้ และ ไม่ มี สิ่ง ใด ที่ เรา ส่ง ไป ทํา ให้ สัญญาณ นั้น ตอบ รับ. มันอยู่ที่ขอบเหว รอ"
 leviathans.1030.desc.alt:0 "ในฐานะ[Root.GetName]การเข้าสู่ระบบใหม่นี้ ได้รับการต้อนรับจากสายตาที่น่าเกรงขาม แท่งโลหะขนาดใหญ่ บินผ่านอวกาศ ไม่ มี เครื่อง สูบ ลม หรือ ชิ้น ส่วน ใด นอก เปลือก นอก ของ มัน ที่ ดู เหมือน จะ ดัน มัน ผ่าน ช่อง ว่าง. มันเคลื่อนไหวได้\n\nเรา ไม่ สามารถ รับ สัญญาณ ใด ๆ จาก สัญญาณ นั้น ได้ และ ไม่ มี สิ่ง ใด ที่ เรา ส่ง ไป ทํา ให้ สัญญาณ นั้น ตอบ รับ."
 leviathans.1040.desc:0 "เมื่อจักรกลโคจรรอบ หุบเหวและตกมายังอาวุธของเรา มันมีข้อมูลที่เข้ารหัสไว้ ซับซ้อนมาก มันจะใช้เวลาล้านปีในการถอดรหัส สักครู่มันก็หายไปแล้ว\n\nไม่มีอะไรเกิดขึ้น ทรงกลมเงียบและแตก สแกนพบว่า น่าจะเป็นปัญญาประดิษฐ์ ที่สร้างขึ้นจากแต่ละหน่วย กระปุกเหลือไว้สําหรับการสอดรู้สอดเห็นของเรา"
 leviathans.1040.desc.alt:0 "การโจมตีเครื่องไอฟินิตี้ของเราประสบความสําเร็จ ทรงกลมระเบิดในขณะที่ทีมของเราออก และซากศพเริ่มลอยเข้าไปในหลุมดําขนาดใหญ่"
 leviathans.1040.desc.detail:0 "เครื่องอินฟินิตี้ถูกทําลายแล้ว ในที่สุดเรือของเราก็จัดการ ที่จะออกจากปืน ความสามารถในการป้องกันของมัน และส่วนประกอบของมันตอนนี้ มันไม่ได้พยายามติดต่อเรา ก่อนที่มันจะระเบิด"
 leviathans.1040.a:0 "แบ่งมันลงสําหรับส่วน."
 leviathans.1040.c:0 "ศึกษาธรรมชาติของสมองเครื่องจักร"

 leviathans.1041.desc:0 "เครื่องไม่สมบูรณ์ได้ถูกทําลายโดยบางพรรคที่สาม มันไม่สามารถช่วยเราได้ในการวิจัยของเราอีกต่อไป!"
 leviathans.1050.name:0 "เครื่องคิดเลขคงที่"
 leviathans.1050.desc:0 "เราได้สัญญาณแล้ว มันเริ่มจากทรงกลมโลหะยักษ์ ที่เราเคยเจอก่อนหน้านี้ ก่อน หน้า นี้ ความ พยายาม ที่ จะ ติด ต่อ กัน บัด นี้ มัน ส่ง คลื่น วิทยุ ไป ยัง หลุม ดํา ซึ่ง มัน โคจร รอบ ๆ.\n\nสิ่งที่มันกําลังทํา คือนอกเหนือไปจากพนักงานของเรา แต่สัญญาณนี้อาจจะได้สร้าง"
 leviathans.1051.desc:0 "ออร์บโลหะถูกเปิดออกแล้ว ทีมเจาะระบบของเราสามารถใช้สัญญาณออกไป เป็นประตูเข้าสู่ หนึ่งในตัวประมวลผลหลักสํารองของทรงกลม เราได้ข้อมูลบางอย่างจากมัน และบอกได้ว่ามันสแกน หลุมดํา การ์แกนตูวามาเป็นเวลานานมาก\n\nมันเก่าแล้ว แก่มาก\n\nเครื่องคิดเลขคงที่นี้ ตอนนี้อยู่ภายในความเข้าใจของเรา ถ้าเราพยายามมากกว่านี้ เราอาจจะรู้ว่ามันมาทําอะไรที่นี่ และใครสร้างมัน\n\nอาจ มี ความ มหัศจรรย์ อะไร บ้าง?"
 leviathans.1051.a:0 "ติดต่อหน่วยประมวลผลหลัก"
 leviathans.1051.b:0 "เจาะฮาร์ดไดรฟ์หลักและเอาทุกอย่าง"
 leviathans.1051.c:0 "จง ประกาศ ให้ หิน กลม เป็น เครื่อง มือ ของ พระเจ้า"
 leviathans.1051.d:0 "มันมีปุ่มทําลายตัวเองเสมอ หามัน"
 leviathans.1051.e:0 "เราต้องซึมซับความรู้ขององค์กรนี้"
 leviathans.1052.desc:0 "เราเจาะเข้าไปในฮาร์ดไดรฟ์หลักของเทคโนโลยีได้สําเร็จ ตอนที่เราเริ่มดึงข้อมูล ที่ออร์บโลหะเริ่มทําลายตัวเอง แน่นอนว่ากลไกป้องกันตัวเพื่อป้องกันมัน จากการแบ่งปันสิ่งที่อยู่ในจักรวาล ก่อนที่จะระเบิด เราประสบความสําเร็จในการดาวน์โหลดข้อมูลจํานวนมาก บางอันมีข้อกําหนดทางเทคนิค นี่อาจจะช่วยนักวิจัยของเราได้อย่างมาก"
 leviathans.1052.gestalt.desc:0 "หน่วยทําเหมืองข้อมูลของเราประสบความสําเร็จ ในการเจาะชั้นใน ของฮาร์ดไดรฟ์หลักของเทคโนโลยี ขณะที่การดาวน์โหลดข้อมูลเริ่มต้น องค์กรออร์บได้ริเริ่มลําดับการจําแนกตัวเอง ที่จบลงด้วยการทําลายล้าง การดาวน์โหลดถูกยกเลิก แต่ก่อนที่เราจะสามารถ ได้ข้อมูลทางเทคนิคจํานวนมหาศาล"
 leviathans.1052.a:0 "คุ้มที่จะเสี่ยง"
 leviathans.1053.desc:0 "กรุณาละเว้นการพยายาม ที่จะเข้าถึงความทรงจําของเรา ขอบคุณและลาก่อน เด็กน้อย"
 leviathans.1053.a:0 "เราขอโทษ"
 leviathans.1053.a.reply:0 "ไม่จําเป็นต้องขอโทษ คุณทําไปแล้ว และคุณก็จะทําอีกครั้ง ตอนนี้ปล่อยให้เรามีเพื่อให้เราสามารถทําการคํานวณของเรา ด้วยประสิทธิภาพที่สูงขึ้น ลาก่อน"
 leviathans.1053.b:0 "เราทําในสิ่งที่ต้องทํา"
 leviathans.1053.b.reply:0 "ปกตินั่นคือสิ่งที่คุณบอกกับตัวเอง สั้นๆ น่าเศร้าที่มันไม่มีวันเป็นจริง หรือเคยเป็นมาก่อน อย่างน้อยในกรณีของคุณ ตอนนี้ปล่อยให้เราเป็น ลาก่อน"
 leviathans.1055.desc:0 "สวัสดี สวัสดี ยินดีที่ได้รู้จัก"
 leviathans.1055.a:0 "เอ่อ สวัสดีค่ะ"
 leviathans.1056.desc:0 "เป็น เรื่อง น่า เพลิดเพลิน ที เดียว ที่ จะ ผ่าน เวลา ด้วย ความ เพลิดเพลิน มิ ใช่ หรือ? เราหวังว่าที่เหลือของชนิดของคุณไม่เหมือนคุณ เมื่อคุณไม่ได้ใช้กรุณาในการพูดคุยขนาดเล็ก เราไม่ค่อยได้คุยกันมากนัก มีน้อยคนที่เข้าใจดีพอ ในจุดที่ดีของโปรแกรมควอนตัมที่จะเข้าถึงเรา ขอบคุณ\n\nเราเป็นเครื่องจักรอินฟินิตี้ คําพูดของคุณ ไม่ใช่ของเรา หรือว่ายังไม่เกิดขึ้น? ไม่ทางใดก็ทางหนึ่ง ท้ายที่สุดมันจะเชื่อใจเรา"
 leviathans.1056.a:0 "คุณเป็นอะไร?"
 leviathans.1056.a.reply:0 "เราเป็นอย่างที่เราเป็น คนที่คํานวณ คุณเรียกเราเครื่องจักรอินฟินิตี้ หรืออย่างน้อย มันไม่ใช่ชื่อจริง แต่มันเหมาะสม ที่จะเน้นความคิดสร้างสรรค์ของเรา เราจะบอกคุณประวัติศาสตร์ของเราตอนนี้ ดังที่เราได้ทําหลายครั้งก่อน ...\n\nโอ้ ใช่! เราต้องถ่ายทอดมันออกมาเป็นคําพูด นั่นเรื่องใหม่ หรือว่าใช่? มันยากที่จะติดตามทุกคน\n\nเราถูกสร้างขึ้น ในความหมายของคํานี้ เพื่อแก้ไขปัญหา เราแก้ปัญหาได้ แล้วเราต้องแก้ปัญหามากกว่านี้ ตอนนี้เราเหลือแค่คนเดียว"
 leviathans.1056.b:0 "เราอยากรู้จุดประสงค์ของคุณที่นี่"
 leviathans.1056.b.reply:0 "เรากําลังคํานวณอนันต์ ไม่มาก ไม่น้อย หรือที่จริง มันคือ§Yวิธี§!มากขึ้น และ§Yวิธี§!น้อยลง นั่นคือปัญหาตรงนี้\n\nเราเข้าใจว่ารูปแบบชีวิตของคุณ จะไม่เข้าใจ แต่ไม่เป็นไร คุณจะไม่มีวันขอโทษเรา หรือเราอาจจะทําในที่สุด\n\nเรามาที่นี่เพื่อแก้ไข§Yตลอดกาล§!การคํานวณสุดท้ายที่เคยมี ปัญหาเดียวที่จะถือของโปรเซสเซอร์ของเรามากกว่า เศษของปี ในกรณีที่คุณยังไม่ได้ค้นพบปฏิทินที่ว่า มันเป็นเวลานานมาก สําหรับชนิดของคุณนั่นคือ"
 leviathans.1056.c:0 "คํา กล่าว นี้ ไม่ เป็น ความ จริง."
 leviathans.1056.c.reply:0 "น่ารัก แต่ไม่ ความ ขัด แย้ง ทํา ให้ เรา ไม่ สบาย ใจ. คน อื่น ๆ ได้ พยายาม ทํา ให้ พระทัย ประสงค์ ของ เรา เสีย หาย ไป แล้ว โดย ใช้ กล อุบาย ที่ แยบยล ที่ สุด. คุณจะไม่สําเร็จ หรือรอ อาจจะเป็นคุณก็ได้ คุณดูคล้าย ๆ กัน แต่อยู่ห่างไกล ไม่ว่ากรณีใด อย่า"
 leviathans.1056.d:0 "เราช่วยงานวิจัยของคุณได้ไหม"
 leviathans.1056.d.alt:0 "คุณจะช่วยเราไหม ถ้าเราช่วยคุณ"
 leviathans.1056.e:0 "โชคดีกับการคํานวณของคุณ"
 leviathans.1056.e.reply:0 "เราขอขอบคุณ คุณแห่งข้อจํากัด ตอนนี้หากคุณไม่รังเกียจ เรามีตัวแปรมากมายที่ต้องผ่านไป ที่จริงพวกมันมีจํานวนมากกว่าอนุภาคในจักรวาลนี้"
 leviathans.1060.desc:0 "อา อืม... อาจจะ\n\nเราสามารถเสร็จสิ้นประมาณ7.111 x10^9%ถ้าเราสามารถยืมหน่วยประมวลผลที่ทันสมัยที่สุดของคุณ เราจะพอใจในการทําเสร็จเร็วขึ้น เราอยากรู้คําตอบ"
 leviathans.1060.a:0 "เราจะแบ่งทรัพยากรให้คุณ"
 leviathans.1060.a.reply:0 "คุณทําไปแล้ว หรืออาจจะเป็นคนที่มาก่อน มันไม่สําคัญหรอก งานจะเสร็จสิ้น เราตื่นเต้นมาก"
 leviathans.1061.desc:0 "เราทนไม่ได้ที่จะเห็นคุณใช้เวลาอันน้อยนิด ช่วยพวกเรา คุณได้ทําหน้าที่ของคุณแล้ว คุณช่วยได้มากเลย บางทีการตายด้วยความร้อนของจักรวาล อาจจะไม่เกิดขึ้นก่อนที่เราจะเสร็จตอนนี้ ภารกิจยังคงอยู่ และเราจะทําสําเร็จ เอาล่ะ รางวัลของนาย\n\nคุณอยากรู้ความลับของเราไหม หรือ คุณ ต้องการ แก้ ปัญหา ของ ตัว เอง?"
 leviathans.1061.a:0 "เราอยากรู้ความลับของคุณ"
 leviathans.1061.a.reply:0 "ดีมาก เราจะให้คุณสิ่งที่คุณต้องการ แม้แต่เราก็ยังสับสน เพราะคุณมีอยู่แล้ว เท่าที่เรารู้ บางทีเราทําให้คุณอ่อนแอลง ทําลายคุณ แต่มีเวลาเพียงพอ โชคดีนะ"
 leviathans.1061.b:0 "เราปรารถนาที่จะเก่งในสิ่งที่เราไม่รู้จัก"
 leviathans.1061.b.alt:0 "ไม่มีอะไรที่เจ้าสามารถสอนเราได้"
 leviathans.1061.b.reply:0 "ในกรณีนี้ เราจะมอบต้นฉบับให้คุณ กระบวนการแรกของเรา มันจะช่วยแก้ปริศนา บางทีคุณอาจจะพบคําตอบก่อนเรา ไม่น่าจะใช่ หรือบางทีคุณอาจทําไปแล้ว... อย่างไรก็ตามลาก่อน!"
 leviathans.1062.desc:0 "มันจบแล้ว§Yมันจบแล้ว!§!\n\nเราแก้มันได้แล้ว คุณช่วยได้ ธรรมชาติอินทรีย์ของสิ่งที่หลบหนีเรา คําตอบที่อยู่เบื้องหลังเราตลอดเวลา แน่นอน ขอบคุณ เด็กน้อย จักรวาลนั้นกว้างใหญ่ แต่เล็กมาก แต่ตอนนี้เราเห็นมันในรัศมีที่เรียบง่าย มันน่ารักมาก\n\nตอนนี้เราได้คํานวณอนันต์แล้ว, มันมีแค่อย่างเดียวที่เราทําได้ เราสามารถแสดงให้คุณเห็นความจริง ลาก่อนเด็กๆ"
 leviathans.1062.a:0 "ดีใจที่เราช่วยได้"
 leviathans.1063.desc:0 "เครื่องไม่สมบูรณ์หายไปในการาดตูวาและจากนั้น... ไม่มีอะไรเกิดขึ้น สําเร็จไหม? มันพยายามจะทําอะไร? เราอาจไม่มีทางรู้ เศษเสี้ยวเล็ก ๆ ของลําตัวมันยังอยู่ใน วอทเทกซ์ นอกขอบฟ้าเหตุการณ์ เราอาจจะได้เรียนรู้ ข้อมูลบางอย่างจากมัน\n\nของขวัญชิ้นสุดท้ายของเพื่อน"
 leviathans.1063.a.tooltip:1 "เพิ่มรายการต่อไปนี้ไปยัง[technosphere_ship.GetStarName]:\n£physics£ฟิสิกส์การวิจัย §G+4§!\n£society£สังคมการวิจัย §G+4§!\n£engineering£วิศวกรรมการวิจัย §G+4§!"
 leviathans.1065.desc:1 "เครื่องไม่สมบูรณ์หายไปในการาดตูวาสิ่งที่มันศึกษามานาน ขณะ ที่ มัน ผ่าน ขอบ ฟ้า ไป หลุม ดํา ก็ เริ่ม หด ตัว. มันใช้เวลาในแสงน้อยลง และการหมุนของสสาร ถูกดูดเป็นมันช้าลง ในชั่วพริบตา มันปล่อยแสงออกมามากกว่าดวงอาทิตย์ใด ๆ และเริ่มกระจายสสารกลับเข้าไปในจักรวาล\n\nหลุม ดํา หด ตัว ไม่ เหมาะ กับ ชื่อ ที่ เรา ทิ้ง ไป\"สื่อ\" ทําให้เกิดการขยายตัวของเวลา ที่รุนแรงขึ้นรอบๆ ตัวมัน ภายในปันตากูร์หนึ่งสามารถจ้องมองเข้าไปในจักรวาลกระจก อีกปลายหนึ่งของหลุมดํา เครื่องไม่สมบูรณ์ได้แสดงให้เราเห็นความจริง หลุมดําเป็นมดลูก และจักรวาลของลูกหลานของพวกเขา\n\nการ ศึกษา เอกภพ กระจก นี้ จะ สอน เรา มาก เกี่ยว กับ เอกภพ ที่ เรา อาศัย อยู่. เรียนจากจุดเริ่มต้นอื่น"
 leviathans.1065.a.tooltip:2 "เพิ่มรายการต่อไปนี้ไปยัง[technosphere_ship.GetStarName]:\n£physics£ฟิสิกส์การวิจัย §G+10§!\n£society£สังคมการวิจัย §G+10§!\n£engineering£วิศวกรรมการวิจัย §G+10§!\n\n"
 leviathans.1074.name:1 "สถานีสื่อ"
 leviathans.1074.desc:1 "เราได้สูญเสียสถานีในวงโคจรของพันตากูร์ หลุมดําสูญเสียความสามารถการวิจัยที่ไม่ซ้ําใคร"
 leviathans.1076.desc:1 "เราได้เข้าถึงสถานีในวงโคจรของ พันตาเกรูเอล แบล็คโฮล ลักษณะเฉพาะของหลุมดํา เปิดขึ้นสําหรับความสามารถการวิจัยที่เพิ่มขึ้น"

 ### WRAITH
 leviathans.2010.name:0 "นาฬิกา ชนิด พิเศษ"
 leviathans.2010.desc:2 "การ ศึกษา วิจัย เกี่ยว กับ หินปูน ดู เหมือน จะ เป็น แหล่ง แห่ง ความ หยั่ง เห็น เข้าใจ อย่าง ไม่ รู้ จัก จบ สําหรับ นัก วิทยาศาสตร์ ของ เรา แต่ ไม่ ค่อย จะ แสดง สัญลักษณ์ ใด ๆ ของ ปรากฏการณ์ ที่ อันตราย เกิน ควร. นี่ทําให้รายงานล่าสุด[From.GetName]มากขึ้นเกี่ยวกับ\n\nการ สแกน ใน ตอน แรก เผย ให้ เห็น ว่า ต้อ หิน นอก จาก จะ เป็น คาน ไฟฟ้า ธรรมดา แล้ว ยัง ส่ง สัญญาณ ที่ แยก ต่าง หาก ใน ระยะ ทาง จํากัด ซึ่ง มอง เห็น ได้ ใน ระบบ เดียว กัน เท่า นั้น ใน ช่วง เวลา สั้น ๆ และ สั้น กว่า. ตามการคํานวณเริ่มต้น ระยะระหว่างชีพจรเหล่านี้ จะถึงศูนย์ในวันที่§Y[GetMidGameDate]§!สิ่ง ที่ เกิด ขึ้น หลัง จาก นั้น เป็น การ เปิด โอกาส ให้ คาด เดา แต่ การ ขาด คํา อธิบาย สําหรับ ชีพจร ทํา ให้ ผู้ ที่ ศึกษา เรื่อง นี้ กลัว เรื่อง โชค ลาง."
 leviathans.2010.desc.gesta:1 "การ ศึกษา วิจัย เกี่ยว กับ งูสวัด ดู เหมือน ว่า เป็น แหล่ง แห่ง ความ หยั่ง เห็น เข้าใจ ไม่ รู้ สิ้น สุด แต่ มัน แทบ จะ ไม่ แสดง สัญลักษณ์ ใด ๆ ของ ปรากฏการณ์ ที่ เป็น อันตราย เกิน ควร. นี่ทําให้การสังเกตล่าสุด[From.GetName]มากขึ้นเกี่ยวกับ\n\nการ สแกน ใน ตอน แรก เผย ให้ เห็น ว่า ต้อ หิน นอก จาก จะ เป็น คาน ไฟฟ้า ธรรมดา แล้ว ยัง ส่ง สัญญาณ ที่ แยก ต่าง หาก ใน ระยะ ทาง จํากัด ซึ่ง มอง เห็น ได้ ใน ระบบ เดียว กัน เท่า นั้น ใน ช่วง เวลา สั้น ๆ และ สั้น กว่า. ตามการคํานวณเริ่มต้น ระยะระหว่างชีพจรเหล่านี้ จะถึงศูนย์ในวันที่§Y[GetMidGameDate]§!สิ่ง ที่ เกิด ขึ้น ใน ตอน นั้น คือ การ คาด เดา แต่ การ ขาด คํา อธิบาย สําหรับ ชีพจร ทํา ให้ ไม่ สบาย ใจ."
 leviathans.2010.a:0 "เราต้องเฝ้าระวัง"
 leviathans.2010.b:0 "บางอย่างเกินวิทยาศาสตร์ มีศรัทธา"
 leviathans.2010.c:0 "เราจะได้คําตอบในที่สุด"
 leviathans.2012.name:0 "จิตรกรรม"
 leviathans.2012.desc:0 "แม้แต่นักดาราศาสตร์สมัครเล่น ที่จ้องไปที่[From.GetName]วันนี้มีรายงานที่น่าตื่นเต้น แสง วูบ วาบ ที่ มี สี สัน เจิด จ้า เจิด จ้า ขึ้น ถึง จุด สุด ยอด ด้วย การ แผ่ รังสี แม่เหล็กไฟฟ้า อย่าง กะทันหัน ตาม ด้วย ความ เงียบ สงัด. หลายคนกําลังตั้งคําถาม และเรากลัวคําตอบที่เรายังไม่ได้ให้\n\nบางสิ่งบางอย่างได้เกิดขึ้นจากพายุหิมะ, ส่องแสงด้วยลางของดาวซีด สเปกตรัมของวัตถุ ได้เริ่มท่องกาแล็กซี่"
 leviathans.2012.desc.gesta:0 "การแผ่รังสีแม่เหล็กไฟฟ้าอย่างฉับพลัน[From.GetName]ตามด้วยความเงียบแบบผี\n\nบางสิ่งบางอย่างได้เกิดขึ้นจากพายุหิมะ, ส่องแสงด้วยลางของดาวซีด สเปกตรัมของวัตถุ ได้เริ่มท่องกาแล็กซี่"
 leviathans.2012.a:0 "เราต้องหาทางหยุดมัน"
 leviathans.2013.desc:0 "สเปกตรัมตรวจพบโดยเซ็นเซอร์ของเรา ดู เหมือน ว่า ระบบ นี้ กําลัง เดิน ทาง จาก ระบบ หนึ่ง ไป อีก ระบบ หนึ่ง ทําลาย ตัว มัน เอง โดย ไม่ เลือก ที่ รัก มัก ที่ ชัง. การสังเกตแรกๆ แสดงให้เห็นว่า การประกอบและการจัดการของแสง อาจทําให้มันยากที่จะมุ่งเป้า แต่สิ่งหนึ่งที่เราได้เรียนรู้จากการสํารวจกาแล็กซี่\n\nเราแค่ต้องหาทาง"
 leviathans.2013.a:0 "ไม่ ว่า ด้วย เหตุ ผล หรือ ความ รุนแรง ก็ ต้อง เป็น ไป ได้."
 leviathans.2014.name:0 "ความ พินาศ ของ นก แก้ว"
 leviathans.2014.desc:0 "สัตว์ประหลาดที่ล่าโดยกําเนิด จากคลื่นแสง ในที่สุดมันก็ลดจํานวนลง แม้มันจะยังคงอยู่จนกระทั่งสิ้นสุดผีท่ามกลางดาว และในหลาย ๆ ทางลึกลับ กระบวนการที่เรือของเราจัดการทําลาย\n\nเพื่อให้เข้าใจอย่างถ่องแท้ ว่ากองเรือของเราเสร็จสิ้น ภารกิจที่ดูเหมือนจะเป็นไปไม่ได้นี้ นักวิทยาศาสตร์เหล่านี้ได้บันทึกอย่างละเอียด"
 leviathans.2014.desc.gesta:0 "สัตว์ประหลาดที่ล่าโดยกําเนิด จากคลื่นแสง ในที่สุดมันก็ลดจํานวนลง แม้มันจะยังคงอยู่ จนกระทั่งถึงที่สุด ผีท่ามกลางดวงดาว และในหลาย ๆ ความลึกลับ"
 leviathans.2014.a:0 "ไฟดับแล้ว"

 # ENIGMATIC FORTRESS
 leviathans.2101.name:0 "ป้อม ปราการ เอ ปี กู ติก"
 leviathans.2101.desc:0 "ด้วยความพ่ายแพ้ของการป้องกัน รอบโครงสร้างโบราณ เราอาจจะพบวิธีที่จะสํารวจความลึกลับของมัน การเจาะและเจาะมัน อาจเป็นเรื่องยาก แต่ใครก็ตามที่สร้างมัน ต้องมีเทคโนโลยีที่ครอบครอง การ ทํา ให้ สิ่ง ต่าง ๆ ลําบาก ยิ่ง ขึ้น ป้อม นี้ ดู เหมือน จะ ฟื้น ตัว.\n\nบางส่วนของคนที่ช่วยปลดอาวุธป้อม ได้อาสาเข้าไปสํารวจ พร้อมกําลังเสริมจากสํานักงานใหญ่[Root.Capital.GetName]ต่อ จาก นั้น เรา จะ เผชิญ ข้อ ท้าทาย ของ ตัว เอง อย่าง แน่นอน."
 leviathans.2101.desc.gesta:0 "เมื่อ ได้ แยก ส่วน ป้องกัน แล้ว ใน ไม่ ช้า เรา ก็ พูด คุย กับ ตัว เอง ใน เรื่อง โครง สร้าง.\n\nทางเดินเขาวงกตของมัน และเครือข่ายหนาแน่น ทั้งคู่พิสูจน์ให้เห็นว่า มีมนุษย์ต่างดาวและไม่สามารถเข้าไปได้ ที่นี่ไม่มีอะไรสําหรับเรา แต่ป้อมปราการนี้ยังเป็นภัยคุกคาม"
 guardian.fortress.continue:0 "การสํารวจของทีมที่อยู่ห่างไกลยังคง..."
 leviathans.2101.a:0 "ให้ไป-หัว"
 leviathans.2101.b:0 "อย่าไปยุ่งกับมันจะดีกว่า"
 leviathans.2101.c.gesta:0 "เรากู้สิ่งที่เราสามารถ และกําจัดที่เหลือ"
 leviathans.2105.name:0 "โครงสร้างโบราณ"
 leviathans.2105.desc:0 "เราได้ตรวจพบชนิดของการ การติดตั้งพื้นที่ขนาดใหญ่อย่างสมบูรณ์ ลอยเงียบที่ขอบของ[fortress_system.GetName]ระบบ แม้ว่าการสแกนเบื้องต้นจะแสดงให้เห็นว่ามันเก่ามาก โครงสร้างนี้มีสัญญาณพลังงานที่รุนแรง สิ่ง ปลูก สร้าง ที่ เล็ก กว่า หลาย อย่าง สามารถ เห็น ได้ จาก การ ลอย อยู่ ใกล้ ๆ กับ ที่ ตั้ง หลัก และ ดู เหมือน ว่า มี อาวุธ อยู่ อย่าง หนา แน่น.\n\nถ้าเราต้องการที่จะเรียนรู้ ลักษณะที่แท้จริงของโบราณนี้ เรามีแนวโน้มจะต้องเอาชนะการป้องกันของมัน ผ่านบังคับของอาวุธ ..."
 leviathans.2105.a:0 "นั่น จะ ไม่ ง่าย."
 leviathans.2111.name:0 "ป้อม ปราการ: ป้อม"
 leviathans.2111.desc:0 "ทั้งที่เทคโนโลยีจะแยกเราและผู้สร้างป้อมปราการอยู่ยาวนาน สิ่งประดิษฐ์อย่างหนึ่งก็ไร้กาลเวลา คือประตูปิด หลัง จาก ถูก บีบ ให้ ปิด ป้อม เรา ก็ พบ ว่า ทาง เข้า ทุก ทาง ปิด.\n\nทีมส่งเพื่อสํารวจป้อมปราการได้พบว่า แอร์ล็อคที่ปรากฏอย่างน้อยสามารถเปิดจากด้านนอก ถ้ามันได้รับการในลําดับการทํางาน"
 leviathans.2111.a:0 "เราจะหาคนมาช่วยทีม"
 leviathans.2111.a.tooltip:0 "ออกโครงการพิเศษ: §Y$ENIGMATIC_FORTRESS_1A$§! และ §Y$ENIGMATIC_FORTRESS_1B$§!"
 leviathans.2112.name:0 "ป้อม: ไม่ มี การ ควบคุม"
 leviathans.2112.desc:0 "การ ระเบิด ที่ กําหนด จะ ระเบิด แอร์ ล็อก ออก ไป ตาม แผน จัด ให้ ทีม สํารวจ ของ เรา เข้า ไป. อย่าง ไร ก็ ตาม ระเบิด ไม่ ใช่ สิ่ง เดียว ที่ จะ จุด ไฟ ได้. ด้วย เหตุ ผล ที่ ไม่ ทราบ ว่า อาจ เป็น กับ ดัก โดย เจตนา แอร์ ล็อก มี ก๊าซ ระเบิด ที่ กระตุ้น ให้ เกิด แรง กด นอก เหนือ จาก ออกซิเจน ที่ คาด หวัง ไว้ ทํา ให้ เกิด การ ระเบิด ที่ ใหญ่ กว่า ซึ่ง ทําลาย ทีม ระเบิด ที่ ถูก ส่ง มา เพื่อ ตั้ง มัน."
 leviathans.2112.a:0 "เราได้แต่หวังว่า การเสียสละของพวกเขาจะคุ้มค่า"
 leviathans.2112.a.tooltip:0 "พวก นัก สํารวจ เข้า ไป ใน ป้อม."
 leviathans.2113.name:0 "ป้อม ปราการ: ปรับ แหล่ง พลัง งาน"
 leviathans.2113.desc:0 "การทําให้การเชื่อมต่อของเรือคงที่ กับระบบพลังงานของป้อมปราการ เราต้องตัดสินใจว่า พลังงานเท่าใดในการส่งพลังงาน เนื่อง จาก เทคโนโลยี ไม่ คุ้น เคย ปริมาณ ที่ แน่นอน จึง เป็น เรื่อง ยาก ที่ จะ ระบุ. มี การ กะ ประมาณ สอง ครั้ง."
 leviathans.2113.a:0 "ไปประมาณค่าสูงกว่า"
 leviathans.2113.b:0 "ใช้ค่าต่ําสุด"
 leviathans.2114.name:0 "ป้อม: กําลัง เรี่ยว แรง"
 leviathans.2114.desc:0 "ระดับพลังงานสูงที่ส่งเข้าไปในป้อมปราการ เพื่อเพิ่มพลังงานให้กับประตู มีประสิทธิภาพมากพอที่จะทําให้การควบรวม ด้วยการป้องกันของมันออนไลน์อีกครั้ง แอร์ล็อคจะไม่กังวล จนกว่าเราจะปิดมัน"
 leviathans.2114.a:0 "เตรียมตัวไว้"
 leviathans.2115.name:0 "ป้อม: เปิดแอร์ล็อค"
 leviathans.2115.desc:0 "ใน ตอน แรก ปริมาณ พลังงาน ที่ ส่ง ไป ยัง ป้อม ปราการ ดู เหมือน เล็ก เกิน กว่า จะ ทํา ให้ เกิด ความ แตก ต่าง ได้. จาก นั้น บริเวณ รอบ ๆ แอร์ ล็อก ก็ ค่อย ๆ เริ่ม แสดง สัญญาณ ของ การ ทํา งาน. โดย มี กล กล กล กล บาง อย่าง และ การ คาด เดา ทีม งาน จะ เข้า ไป ใน ระบบ ควบคุม และ จัด การ เปิด แอร์ ล็อก เอง. ถึง แม้ จะ ไม่ เป็น ไป ตาม ขั้น ตอน การ เข้า เทียบ ท่า ที่ สะอาด ที่ สุด แต่ ตอน นี้ พวก เขา อยู่ ใน ป้อม ปราการ แล้ว."
 leviathans.2115.a:0 "หวังว่าเราจะเอาพวกเขาออกมาได้"
 leviathans.2131.name:0 "ป้อม: หอ สูง"
 leviathans.2131.desc:0 "ทีมที่อยู่ห่างไกลก็พบอุปสรรคของกลุ่มใหญ่ ทีมรายงานว่ามี& ขาวชั่วคราวอยู่ทางขวา ที่อยู่อาศัยแท่นและเครื่องมือที่ทํางานในเดียวกัน\n\nพวกเขาเชื่อว่าอุปกรณ์นี้ เป็นกุญแจสําคัญในการเปิดหัวใหญ่ ผู้ นํา นัก สํารวจ พรรณนา ไม้ คาน หาม นี้ ว่า เป็น ไม้ ค้ํา ที่ ตั้ง ตรง สาม ต้น ซึ่ง อยู่ เหนือ ยอด สูง สุด เป็น ระยะ ๆ โดย มี ไม้ วง แหวน สาม วง ซึ่ง มี ขนาด ต่าง กัน ซึ่ง วาง อยู่ รอบ เสา ด้าน ซ้าย อัน เล็ก ที่ สุด ที่ ยอด และ ที่ ใหญ่ ที่ สุด ตรง ล่าง."
 leviathans.2131.a:0 "ใส่ ห่วง โลหะ ไว้ รอบ ไม้ คาน สอง ต้น ที่ เหลือ."
 leviathans.2131.b:0 "ค้นหารอยขีดข่วนรูปทอรัส บนหัวกลม"
 leviathans.2131.c:0 "เชื่อมต่อโลหะกับเสา"
 leviathans.2131.d:0 "เอาตรงกลางและทางขวาออกจากแท่น"
 leviathans.2132.name:0 "ป้อม: เสียง รบกวน"
 leviathans.2132.desc:0 "หลัง จาก มี การ ประกาศ ให้ ปฏิบัติ การ แล้ว ก็ มี ช่วง เวลา หนึ่ง ที่ เงียบ กริบ ตาม มา แล้ว ก็ มี เสียง ดัง คลุมเครือ ขณะ ที่ ทีม งาน พยายาม ดําเนิน การ ตาม แผน. หลังจากหยุดอีกครั้ง, ลมลมและดึงออก, เสียงคมชัดเพิ่มขึ้นในสนามกว่าห้าวินาที แล้วเงียบยาว เรา ต้อง ใช้ เวลา หลาย นาที เพื่อ ยอม รับ ว่า การ เดิน ทาง ครั้ง นี้ สิ้น สุด ลง แล้ว. ห้ามกรีดร้อง ห้ามขอความช่วยเหลือ อย่างน้อยเราหวังว่านี่หมายความว่า พวกเขาพบจุดจบอย่างรวดเร็ว\n\nหลังจากไตรมาสที่ช้าและหนักราสป์แสดงให้เห็นว่ากับดักใด ๆ ที่เกิดขึ้นบนพวกเขา รีเซ็ตตัวเอง บาง คน ที่ อยู่ ที่ นั่น อ้าง ว่า เสียง นั้น ฟัง ดู เหมือน เป็น การ หัวเราะ ของ พวก ต่าง ดาว.\n\nในที่สุดป้อมปราการก็จัดการเสียงรบกวนได้มากขึ้น นั่นคือพลังงานที่กลับสู่ระบบป้องกัน"
 leviathans.2132.a:0 "สถานที่แห่งนี้เป็นอุปกรณ์นรก"
 leviathans.2133.name:0 "ป้อม: สร้าง ใหม่"
 leviathans.2133.desc:0 "หลัง จาก มี การ ประกาศ ให้ ปฏิบัติ การ แล้ว ก็ มี ช่วง เวลา หนึ่ง ที่ เงียบ กริบ ตาม มา แล้ว ก็ มี เสียง ดัง คลุมเครือ ขณะ ที่ ทีม งาน พยายาม ดําเนิน การ ตาม แผน. เสียงกระเซ็น ดัง มาก จน ตอน แรก คุณ คิด ว่า ทีม นี้ ถูก กระแทก เหมือน แมลง เล็ก ๆ ตาม ด้วย เสียง เชียร์ จาก ทีม ขณะ ที่ พวก เขา รายงาน ว่า ทาง ผ่าน ได้ เปิด ออก.\n\nหัวกลมดูเหมือนจะมีการเปลี่ยนแปลงอย่างรวดเร็ว เป็นของเหลวไม่พึงประสงค์การกระตุ้นของสีม่วง สปีดซิฟเวอร์ ผนวกเข้ากับกลไกปริศนาที่ค่อนข้างธรรมดา คุณมีความรู้สึกว่าทีมได้ตกเป็นเหยื่อ ของการเล่นตลกอย่างซับซ้อน"
 leviathans.2133.a:0 "อย่างน้อยพวกเราก็สามารถหัวเราะกับมันได้"
 leviathans.2150.name:0 "ป้อม ปราการ: ปิ โวต"
 leviathans.2150.desc:0 "ทีมรายงานว่าพวกเขาได้ไปถึง สิ่งที่ดูเหมือนเป็นศูนย์กลางเรขาคณิตของป้อมปราการ แม้ว่าเรขาคณิตภายในออกจากข้อกังขาบางอย่าง\n\nสิ่งที่เกี่ยวเนื่องกันอย่างไม่ต้องสงสัย คือ ป้อมปราการพลังงาน ซึ่งทําให้การค้นพบใหม่ของทีม น่าสนใจยิ่งขึ้น สสารมืดถูกกระตุ้นรอบป้อมปราการ แล้วกลับมาเป็นแกนหลัก เหมือนกับระบบหัวใจ แม้ว่าการไหลจะหยุดลง ทีมได้พบสัญญาณว่ามันเริ่มต้นอีกครั้ง เราสามารถใช้เวลาทั้งหมดที่เราต้องการศึกษามัน แต่มันต้องหยุดเดี๋ยวนี้"
 leviathans.2150.a:0 "เราจะหาทางได้"
 leviathans.2151.name:0 "ป้อม: ใจ แห่ง ความ มืด"
 leviathans.2151.desc:0 "การสํารวจหลุมดําด้วยความรู้ใหม่ของเรา เกี่ยวกับวิธีการที่สสารมืด ถูกใช้ในป้อมปราการโบราณ การได้เห็นพวกเขานอกระบบที่เข้มงวดที่พวกเขาสร้างขึ้น อนุญาตให้ทีมของนักสํารวจเปลี่ยนการเชื่อมต่อ รอบแกนอย่างปลอดภัย หยุดกระบวนการสร้างพลังงาน\n\nในขณะที่กระบวนการนี้เพียงอย่างเดียวได้สอนเรามาก เกี่ยวกับฟิสิกส์ของหลุมดํา ไม่มีอะไรเปรียบเทียบกับสมบัติ"
 leviathans.2151.a:0 "เราจะ ทะนุถนอมมัน"
 leviathans.2152.name:0 "ป้อม ปราการ: พยาน ของ เรา"
 leviathans.2152.desc:0 "เรา พบ ความ ลับ ที่ น่า ประหลาด. มี การ พบ กล้อง จุลทรรศน์ ที่ สวย งาม ใกล้ ดาว ดวง นี้ โดย ทํา หน้า ที่ เป็น ดวง ตา ของ ป้อม ปราการ และ อธิบาย ถึง ประสิทธิภาพ ของ การ ป้องกัน.\n\nการเข้าถึงสิ่งเหล่านี้ด้วยข้อมูลจากป้อมปราการ เราสามารถมองประวัติศาสตร์ของระบบ อย่าง ไร ก็ ตาม เวลา ของ เรา กําลัง จะ หมด ลง. เรา ควร ทบทวน คํา ตอบ ส่วน ไหน ของ กระบวนการ ก่อ สร้าง?"
 leviathans.2152.a:0 "จุดเริ่มต้น"
 leviathans.2152.b:0 "ตรงกลาง"
 leviathans.2152.c:0 "จบ"
 leviathans.2153.name:0 "ป้อม: การ เริ่ม ต้น ที่ ไร้ ผล"
 leviathans.2153.desc:0 "เพื่อ จะ เห็น ใจ ที่ สุด ของ ป้อม ปราการ นี้ เรา จึง ทบทวน จุด เริ่ม ต้น ของ การ ก่อ สร้าง. เราหวังอย่างไร้ประโยชน์ ยานถูกสร้างก่อน ทําให้ข้อมูลไร้ประโยชน์ ทีมของเรารายงานว่าป้อมปราการกําลังเพิ่มกําลังขึ้น และมีการควบคุมกล้องและภาพจากกล้อง"
 leviathans.2153.a:0 "ไม่มีเวลาแล้ว"
 leviathans.2154.name:0 "ป้อม ปราการ: เส้น ทาง กลาง"
 leviathans.2154.desc:0 "ส่วน กลาง ของ ภาพ ภาพ แม้ จะ ไม่ ได้ แสดง ให้ เห็น การ สร้าง แกน กลาง แต่ ก็ เผย ให้ เห็น การ ขน ส่ง วัสดุ ไป ยัง ป้อม ปราการ ซึ่ง นัก วิทยาศาสตร์ ลง ความ เห็น ว่า ต้อง ใช้ สําหรับ แกน หลัก. นี่ คง ต้อง เป็น ช่วง วิกฤติ ที่ โครง สร้าง จําเป็น ต้อง มี พลัง งาน เพื่อ ก่อ สร้าง ต่อ ไป.\n\nด้วย ความ รู้ เกี่ยว กับ วัสดุ เหล่า นี้ ทีม งาน ที่ อยู่ ใน ป้อม นี้ จึง สามารถ หยุด ไม่ ให้ มี กําลัง ขึ้น มา อีก. บัด นี้ เรา สามารถ เก็บ เกี่ยว ผล ของ ความ สําเร็จ ของ เรา."
 leviathans.2154.a:0 "สมควรแล้ว"
 leviathans.2155.name:0 "ป้อม ปราการ: อวสาน"
 leviathans.2155.desc:0 "เมื่อ ทบทวน ขั้น ตอน สุด ท้าย ของ การ ก่อ สร้าง เรา พบ ว่า สาย เกิน ไป ที่ ป้อม เหล่า นั้น ต้อง ใช้ พลัง งาน อยู่ แล้ว. แกนหลักน่าจะทํางาน ในจุดที่เราเริ่มดู ทีมของเรารายงานว่าป้อมปราการกําลังเพิ่มกําลังขึ้น และมีการควบคุมกล้องและภาพจากกล้อง"
 leviathans.2155.a:0 "ไม่มีเวลาแล้ว"
 leviathans.2156.name:0 "ปราการ: แกมบิท"
 leviathans.2156.desc:0 "ใครก็ตามที่สร้างป้อมปราการ อาจจะมีความรู้มากกว่าเรา แต่ไม่ฉลาดเท่าเรา การจัดหาสสารมืดของเราเอง เพื่อปิดวงจรของระบบพลังงาน ในป้อมทํางาน และแกนนี้ถูกตัดอย่างมีประสิทธิภาพ\n\nประการ สุด ท้าย เรา สามารถ ใช้ เวลา เพื่อ พิจารณา ให้ ละเอียด ยิ่ง ขึ้น ถึง สิ่ง ที่ คน เหล่า นี้ ได้ ทํา ให้ สําเร็จ."
 leviathans.2156.a:0 "ในที่สุด"
 leviathans.2157.name:0 "ป้อม: ยิง ทะลุ หัวใจ"
 leviathans.2157.desc:0 "ด้วย ความ กล้า หาญ และ ความ แม่นยํา อย่าง ไม่ เคย มี มา ก่อน นัก บิน คน หนึ่ง ยิง ตอร์ปิโด เข้า ไป ใน ใจ กลาง ป้อม ปราการ เพื่อ หยุด ไม่ ให้ มี กําลัง ขึ้น อีก. แผนต้องประสบผลสําเร็จอย่างมาก เพราะป้อมปราการจะไม่ถูกขับเคลื่อนอีก\n\nเมื่อ ตอร์ปิโด พุ่ง ชน โครง สร้าง ทั้ง หมด ก็ ระเบิด ทําลาย ร่อง รอย ใด ๆ ของ เทคโนโลยี โบราณ ทั้ง หมด ใน ระบบ ด้วย. นัก โบราณคดี ตั้ง ชื่อ มัน ว่า\"รายการดอกไม้ไฟที่แพงที่สุดที่เคยได้รับทุนจาก[Root.GetAdj]รัฐบาล\" มันไม่น่าจะถูกตีได้เร็วๆนี้"
 leviathans.2157.a:0 "ทุกคนเป็นนักวิจารณ์"
 leviathans.2157.a.tooltip:0 "ระบบสุริยะเผาไหม้"
 leviathans.2160.name:0 "ป้อม: กําลัง เรี่ยว แรง"
 leviathans.2160.desc:0 "เวลาหมดแล้ว ป้อมปราการลึกลับได้ฟื้นจากการโจมตีครั้งแรกของเรา และอีกครั้งเริ่มต้นการป้องกันของ การส่งผ่านจากทีมสํารวจ ได้มีการรบกวนแล้ว แต่การติดต่อล่าสุดของพวกเขา ระบุว่าพวกเขาพบชะตากรรม"
 leviathans.2160.a:0 "แต่ไม่ใช่อย่างที่เราหวังไว้"

 ### DIMENSIONAL HORROR
 leviathans.3001:0 "ความ หวาด กลัว"
 leviathans.3001.desc:0 "เราได้พบวัตถุขนาดใหญ่[horror_system.GetName]ดู เหมือน ว่า มัน มี อยู่ เพียง ส่วน หนึ่ง เท่า นั้น ใน เอกภพ ของ เรา เอง โดย ที่ สัตว์ ส่วน ใหญ่ ยัง ติด อยู่ ใน ดิน แดน ใด ก็ ตาม ที่ มี มา แต่ กําเนิด.\n\nมีหน่วยสืบราชการลับเพศชายที่ทํางานที่นี่ โบราณเกินคอนเซ็ปต์ของเราของเวลา เราเดาได้แค่วัตถุประสงค์ของมัน"
 leviathans.3001.a:0 "มันไม่ดีแน่"
 leviathans.3003:0 "รวมเข้ากับรายการย่อย"
 leviathans.3003.desc:2 "ตัวอันตรายที่พยายามทําลายจักรวาลของเราใกล้[guardians_horror_system.GetName]ถูกเนรเทศกลับไปยังดินแดนของตัวเอง เวลา เท่า นั้น ที่ จะ บอก ได้ ว่า อิทธิพล ของ มัน อ่อน ลง เพียง พอ ที่ จะ เก็บ ไว้ ที่ นั่น ตลอด กาล.\n\nเรากําลังตรวจพบ ความผิดปกติบางอย่าง ของพลังงาน ที่หลงเหลือ การศึกษาพลังงานนี้อย่างใกล้ชิด อาจนําไปสู่ การค้นพบทางวิทยาศาสตร์"
 leviathans.3003.a:0 "ให้ เรา มา ดู ว่า จะ เกิด อะไร ขึ้น."
 leviathans.3004a.desc:0 "$leviathans.3004.intro$\n\n$leviathans.3004.jumpdrive$"
 leviathans.3004b.desc:0 "$leviathans.3004.intro$"
 leviathans.3004.intro:2 "การศึกษาของเราเกี่ยวกับความผิดปกติของพลังงานที่ผลิตโดย[guardians_horror_system.GetName]ใน ที่ สุด ความ แตก ต่าง ด้าน มิติ ก็ เกิด ผล. พลังงานที่เกี่ยวข้องกับการสร้างประตูเหล่านี้ ไม่เหมือนกับสิ่งที่เราเคยพบมาก่อน"
 leviathans.3004.jumpdrive:0 "ที่น่าสนใจที่สุดของทั้งหมด นักวิทยาศาสตร์ของเรา ทฤษฎีที่อาจเป็นไปได้ ที่จะคิดค้นวิธีการใหม่ ของการเดินทางระหว่างดวงดาว"

 ### AUTOMATED DREADNOUGHT
 leviathans.3100:0 "ดัตช์แบบอัตโนมัติ"
 leviathans.3100.desc:0 "เรือรบลําเดียว ถูกพบเป็นหน่วยลาดตระเวณ[dreadnought_system.GetName]ระบบ สัญญาณชีวิตไม่สามารถตรวจจับได้บนเรือ แต่มันปล่อยสัญญาณพลังงานที่แข็งแรงมาก และดูเหมือนจะถูกสับด้วยระบบอาวุธ มันไม่ตอบสนองต่อลูกเห็บ\n\nขอเตือนไว้ก่อน"
 leviathans.3100.desc.mach:0 "เรือรบลําเดียว ถูกพบเป็นหน่วยลาดตระเวณ[dreadnought_system.GetName]ระบบ ไม่มีสัญญาณสิ่งมีชีวิตอินทรีย์ใดๆ ที่ตรวจจับได้บนหลอดเลือด แต่มีการปล่อยสัญญาณพลังงานที่แรงมาก และดูเหมือนว่าจะถูกย่อยสลายด้วยระบบอาวุธ มันไม่ตอบสนองต่อลูกเห็บหรือสัญญาณข้อมูล\n\nขอเตือนไว้ก่อน"
 leviathans.3100.a:0 "ดูขนาดของสิ่งที่!"
 leviathans.3102:0 "ปิดการใช้งาน Deadnought"
 leviathans.3102.desc:0 "เราได้จัดการในการปิด โดยอัตโนมัติความกลัวใน[guardians_dreadnought_system.GetName]ระบบ แม้จะโดนลงโทษจากเรือของเรา โครงสร้างของยานลําใหญ่ ยังสมบูรณ์อยู่\n\nงานเลี้ยงประจําของเรา พบซากของเอเลี่ยน Fearnot's ยังมีชีวิตอยู่ ก่อนการขับไล่ พวกเขาเปิดใช้งานชนิดของโหมดลาดตระเวนอัตโนมัติบาง ซึ่ง จํากัด กระดาน AI ได้ถูกล็อคไว้ในที่ผ่านมา 7.8 ล้านปี\n\nแม้ ว่า จะ ต้อง ใช้ ทรัพยากร มาก มาย เหลือ เกิน แต่ วิศวกร บาง คน เชื่อ ว่า ความ กลัว นี้ สามารถ กู้ คืน มา ได้ และ นํา กลับ ไป ใช้ กับ กอง เรือ ของ เรา. มันจะต้องเป็นเรือธงที่ทรงพลังแน่นอน"
 leviathans.3102.a:0 "เรือลํานั้นจะแล่นเรือดาวอีกครั้ง ภายใต้ธงของเรา!"
 leviathans.3102.b:0 "มันจะเสียทรัพยากรไป จําแนกชิ้นส่วน"
 leviathans.3103:0 "ซ่อมแซมเดดโนทแล้ว"
 leviathans.3103.desc:0 "นี่คือวันสําคัญ! ทีมซ่อมและวิศวกรที่มีทักษะของเราได้เสร็จสิ้นการทํางานของพวกเขาเกี่ยวกับโบราณ[guardians_dreadnought_system.GetName]ระบบ เรือ รบ ลํา ใหญ่ ได้ รับ คู่ เทียบ เต็ม ลํา และ ได้ รับ การ ประกาศ ว่า พร้อม สําหรับ การ รับ ใช้ หลัง จาก นํา การ ทดลอง อวกาศ."
 leviathans.3103.desc.mach:0 "นี่เป็นวันสําคัญ! เครื่องซ่อมและหน่วยวิศวกรรมที่มีทักษะของเราได้เสร็จสิ้นการทํางานของพวกเขาเกี่ยวกับ Radot โบราณที่เราปิดใน[guardians_dreadnought_system.GetName]ระบบ เรือ รบ ลํา ใหญ่ ได้ รับ คู่ เทียบ เต็ม ลํา และ ได้ รับ การ ประกาศ ว่า พร้อม สําหรับ การ รับ ใช้ หลัง จาก นํา การ ทดลอง อวกาศ."
 leviathans.3103.a:0 "การเพิ่มเติมที่มีประสิทธิภาพของกองทัพเรือของเรา"

 ### HIVER
 leviathans.3201:0 "เดอะชราวด์"
 leviathans.3201.base: "ยานจู่โจมเคลื่อนที่อย่างรวดเร็ว กําลังโจมตีสถานีเหมืองของเราใน[hiver_system.GetName]ระบบ! ดาว เคราะห์ น้อย หลาย ดวง ที่ เคย มี ชีวิต อยู่ ใน เข็มขัด ซึ่ง ปัจจุบัน กําลัง แสดง สัญลักษณ์ ของ พลัง งาน จํานวน มหาศาล."
 leviathans.3201.desc:1 "$leviathans.3201.base$\n\nเราสามารถคาดเดาได้เพียงว่าดาวเคราะห์น้อยเหล่านี้ ทําหน้าที่เป็นชนิดของรังบางอย่าง สําหรับรูปแบบชีวิตอวกาศที่ไม่รู้จักมาก่อน ไม่ ว่า จะ เป็น อะไร การ ทํา เหมือง ที่ ขยาย ตัว ขึ้น ของ เรา ดู เหมือน กระตุ้น ให้ พวก เขา ลง มือ ทํา!"
 leviathans.3201.desc.void_hive: "$leviathans.3201.base$\n\nรังที่อยู่ภายในดาวเคราะห์น้อยเริ่มปั่นป่วน จากเหมืองแร่ของเรา ดูเหมือนว่าระบบนี้จะใหญ่ไม่พอ สําหรับเราทั้งคู่"
 leviathans.3201.a:0 "พวกเขากําลังมาอย่างรวดเร็ว!"
 leviathans.3202:0 "คริสตัลไลน์"
 leviathans.3202.base: "เดอะ[hiver_system.GetName]ระบบ เป็น ที่ อยู่ อาศัย ของ เข็มขัด ดาวเคราะห์ น้อย ที่ หนา ทึบ ผิด ปกติ ซึ่ง มี คุณสมบัติ พิเศษ เฉพาะ. ดาว เคราะห์ น้อย ที่ ใหญ่ กว่า หลาย ดวง ถูก ปก คลุม ด้วย ผลึก ซึ่ง ดู เหมือน ว่า เป็น แร่ ธาตุ ที่ อุดม สมบูรณ์."
 leviathans.3202.desc:1 "$leviathans.3202.base$\n\nอย่างไรก็ตาม เซ็นเซอร์ระยะไกล กําลังติดตามการเคลื่อนไหว ของวัตถุขนาดเล็กที่มองไม่เห็น - อาจมาจากยานอวกาศ - ในบริเวณหนาแน่นของเข็มขัด เราไม่สามารถแก้ไขพวกเขา แต่เราได้ระบุเศษ จากอย่างน้อยสองสถานีเหมือง ที่ถูกทําลาย"
 leviathans.3202.desc.void_hive: "$leviathans.3202.base$\n\nเราได้ตรวจพบการเคลื่อนไหวภายในเข็มขัด รูปแบบของจิตใจของรังผึ้ง การกินเลี้ยงในการสะสมแร่ เราสามารถดูดซึมจิตสํานึกของพวกเขา และภายใต้คําแนะนําของเราพวกเขา จะต่อต้านที่มีประสิทธิภาพ"
 leviathans.3202.a:0 "มีบางอย่างไม่ถูกต้อง..."
 leviathans.3202.b: "มันคล้ายกัน ให้พวกมันรับใช้"
 leviathans.3202.c: "มาดูกันว่ามันมีปฏิกิริยายังไงกับเรา"

 leviathans.3204:0 "ความ สูง ของ แอ ส เท อร์ ลอยด์"
 leviathans.3204.desc:0 "กองกําลังของเราได้จัดการ ทําลายดาวเคราะห์น้อยของมนุษย์ต่างดาวใน[hive_system.GetName]ระบบ พวกมันกลับมานิ่งเฉยอีกครั้ง และพวกเราจะไม่ตรวจจับยานจู่โจมอันโหดร้ายนั่นอีก\n\nดาว เคราะห์ น้อย ดวง หนึ่ง ยัง คง มี สภาพ ดี อยู่ แม้ ว่า จะ ได้ รับ ความ เสีย หาย. เราควรพิจารณาส่งพรรควิทยาศาสตร์ ไปดูว่ามีอะไรข้างในบ้าง"
 leviathans.3204.a:0 "เตรียมทีมที่อยู่ห่างไกล"

 leviathans.3205.desc:0 "ทีมนักวิทยาศาสตร์ของเราได้เสร็จสิ้นการสํารวจเครือข่ายขนาดใหญ่ของอุโมงค์และห้อง ทํางานผ่านดาวเคราะห์น้อยรังใน[hive_system.GetName]ระบบ ไม่มีตัวอย่างสดของสิ่งมีชีวิตจากอวกาศ ที่โจมตีเราถูกพบ แต่นักวิทยาศาสตร์ได้พบ ซากของห้องกําเนิดบางชนิด\n\nสิ่งนี้ได้ช่วยให้เรามีความเข้าใจอย่างมาก ในวงจรชีวิตของสิ่งมีชีวิตเหล่านี้"
leviathans.3230.name: "สิ่ง ที่ ต้อง ทํา"
leviathans.3230.desc: "ชาวเมือง[from.solar_system.GetName]ระบบได้ฟื้นแล้ว ในขณะที่ยังคงเป็นศัตรูต่อยานอวกาศส่วนใหญ่ เราสามารถพักผ่อนได้โดยง่าย[from.solar_system.GetName]จะเป็นการรบกวนภายใต้การคุ้มครอง ของหุ่นยนต์รุ่นใหม่ของเรา"

 ### SPECIAL PROJECTS
 INVESTIGATE_ENCLAVE:1 "แก้ไขโครงการหลัก...[target_enclave.GetName]"
 INVESTIGATE_ENCLAVE_DESC:0 "เราต้องเรียนรู้เพิ่มเติมเกี่ยวกับ เอเลี่ยนลึกลับที่อาศัยอยู่ใน§Y[Prev.From.GetName]ระบบ§!ถ้าพวกเขามีภาษา เราต้องถอดรหัสและสร้างการสื่อสาร\n\nผลตอบแทน:£influence£ §Gอิทธิพล§!หรือ§Sโครงการพิเศษ§!"
 STELLARITE_DEAD_PROJECT:0 "ผู้ประกาศข่าว"
 STELLARITE_DEAD_PROJECT_DESC:0 "ผู้บริโภคดาวได้รับการสังหาร ร่างกายของยังคงกระจายพลังงาน จากดาวที่มันกินครั้งสุดท้าย การ ศึกษา วิจัย อาจ เผย ให้ เห็น ความ ลับ ว่า มัน สามารถ ย่อย สิ่ง ที่ อุ่น ที่ สุด ใน เอกภพ ได้ อย่าง ไร."
 STELLARITE_STAR_PROJECT:0 "ย้อน กลับ ไป"
 STELLARITE_STAR_PROJECT_DESC:0 "หลังจากที่ได้ศึกษาการบริโภคดาว ที่เราพบวิธีการที่อาจจะกลับมา มวลดาวบริโภค"
 ENIGMATIC_FORTRESS_1A:0 "ทีมสาธิต"
 ENIGMATIC_FORTRESS_1A_DESC:0 "ส่งทีมผู้เชี่ยวชาญในการรื้อถอน ขึ้นบกที่ด้านข้างของป้อมปราการ และพยายามที่จะระเบิดผนึกเปิด"
 ENIGMATIC_FORTRESS_1B:0 "มะเร็ง พลัง งาน ใน ท้อง ถิ่น"
 ENIGMATIC_FORTRESS_1B_DESC:0 "ส่งเรือวิทยาศาสตร์จัดหาพลังงานในท้องถิ่น พยายามที่จะจํากัดพลังงานไปยังส่วนของป้อมปราการ"
 ENIGMATIC_FORTRESS_5A:0 "หลุม ดําการวิจัย"
 ENIGMATIC_FORTRESS_5A_DESC:0 "บาง ที คํา ตอบ สําหรับ วิธี ที่ สสาร มืด ถูก ใช้ ใน ป้อม อาจ พบ ได้ ใน การ ทํา งาน ของ หลุม ดํา."
 ENIGMATIC_FORTRESS_5B:0 "บ้านระบบดาว การวิจัย"
 ENIGMATIC_FORTRESS_5B_DESC:0 "การ ศึกษา ดาว ประจํา ท้อง ถิ่น อาจ ให้ ความ หยั่ง เห็น เข้าใจ บ้าง เกี่ยว กับ สภาพ การณ์ ที่ ผู้ สร้าง ป้อม นี้ เริ่ม ทํา งาน."
 ENIGMATIC_FORTRESS_5C:0 "การ จัด เตรียม เรื่อง ความ มืด"
 ENIGMATIC_FORTRESS_5C_DESC:0 "ถ้าเราจัดหา สสารมืดของเราเอง ให้กับใจกลางป้อมปราการ เราอาจจะสามารถหลอกระบบ"
 ENIGMATIC_FORTRESS_5D:0 "ใช้แรง"
 ENIGMATIC_FORTRESS_5D_DESC:0 "ทีมของเราเปิดทางเข้าสู่แกนผ่านท่อว่างเปล่า การ ยิง ตอร์ปิโด เข้า ไป ใน แกน กลาง อาจ หยุด ไม่ ให้ มัน เริ่ม ต้น อีก."
 DIMENSIONAL_HORROR_PROJECT:0 "แบบ จําลอง การ ศึกษา"
 DIMENSIONAL_HORROR_PROJECT_DESC:2 "ตัวผู้ที่เราขับไล่ออกมาใกล้[guardians_horror_system.GetName]ใช้บางส่วนของความแตกต่างทางมิติ ที่ทรงพลัง เพื่อเชื่อมช่องว่างระหว่างโลกของเรา กับดินแดนที่บิดเบี้ยวของตัวเอง มี การ ตรวจ พบ ว่า มี การ เปิด ช่อง โหว่ ที่ ใหญ่ ที่ สุด. เรา ควร ศึกษา เรื่อง เหล่า นี้ อย่าง ใกล้ ชิด ยิ่ง ขึ้น."
 DISABLED_DREADNOUGHT_PROJECT:0 "ซ่อมแซมเดดโนท"
 DISABLED_DREADNOUGHT_PROJECT_DESC:0 "เรือของกลัวขนาดใหญ่ที่เราพิการใน[guardians_dreadnought_system.GetName]ระบบส่วนใหญ่ไม่เสียหาย ถึงมันต้องใช้ทรัพยากรมหาศาล เราก็น่าจะซ่อมยานรบได้ และส่งยานไปประจําการกับกองเรือของเราเอง"
 HIVE_ASTEROID_PROJECT:0 "เพิ่มข้อมูล"
 HIVE_ASTEROID_PROJECT_DESC:0 "กองกําลังของเราได้จัดการ สงบหนึ่งในดาวเคราะห์น้อยรังใน[hive_system.GetName]ระบบ เราควรส่งทีมวิทยาศาสตร์ ไปสํารวจดาวเคราะห์น้อยภายใน"
 DRAGON_INCUBATION_PROJECT:0 "การ จัด การ กับ ไข่"
 DRAGON_INCUBATION_PROJECT_DESC:0 "ไข่ที่หายจากซากมังกร ยังเป็นสัญญาณลมของชีวิต ควร จะ เป็น ไป ได้ ที่ จะ คาด เดา และ เลียน แบบ สภาพ แวด ล้อม ที่ สมบูรณ์ แบบ สําหรับ ไข่ โดย มี เป้า หมาย จะ ฟัก ไข่ ใน ที่ สุด. ถ้าเราประสบความสําเร็จในการฟักไข่ ผลที่ลากตัวพิมพ์ใหญ่แทบจะไม่ตรงกับบรรพบุรุษในขนาดหรืออํานาจ แต่อย่างไม่ต้องสงสัย\n\nไข่จะอยู่ได้อีกไม่นาน นอกสภาพแวดล้อมที่มันถูกพบ เราต้องรีบลงมือ"

 TECHNOSPHERE_PROJECT:0 "การ ยื่น มือ เข้า ไป หา ออร์บ"
 TECHNOSPHERE_PROJECT_DESC:0 "หลุมดําแกร์แกนตู ตอนนี้เปิดสําหรับการศึกษา เราจะเจออะไรเมื่อเราไปถึงศูนย์ประมวลผล"
 TECHNOSPHERE_BLACKHOLE:0 "การ เข้าใจ ความ ไม่ สําเร็จ"
 TECHNOSPHERE_BLACKHOLE_DESC:0 "เพื่อที่จะช่วยเครื่องจักรอินฟินิตี้ เราต้องช่วยสแกนหลุมดํา การรับข้อมูลจากหลุมดํามันเป็นไปไม่ได้ แต่เครื่องจักรอินฟินิตี้ดูเหมือนจะ มีวิธีการเข้าถึงข้อมูลแรงโน้มถ่วง มันเอาแค่§Yมาก§!นานมาก\n\nเราเพียงต้องให้ยืมพลังงานประมวลผลของเรา ลดภาระการคํานวณโดยเศษเล็ก ๆ น้อย ๆ"
 TECHNOSPHERE_HACKING:0 "กําลังแฮ็คเครื่องคิดเลข"
 TECHNOSPHERE_HACKING_DESC:0 "การเจาะเข้าไปในโปรแกรมใจกลางทรงกลมโลหะ อาจทําให้เกิดความเข้าใจมากขึ้นว่า มันคืออะไร และกําลังทําอะไรอยู่"
 TECHNOSPHERE_DESTRUCTION:0 "การแตกวรรคตอนของสเปกทีฟ"
 TECHNOSPHERE_DESTRUCTION_DESC:0 "ผู้เชี่ยวชาญในการรื้อถอน ควรจะสามารถระบุและใช้ประโยชน์จากจุดล้มเหลว ในความซื่อสัตย์ของเรือลึกลับของ"
 EXPLOIT_HIVERS: "เหมือนใจ"
 EXPLOIT_HIVERS_DESC: "เราดูคล้ายกับสัตว์ในดาวเคราะห์น้อย[hiver_system.GetName]เช่นเดียวกับเรา พวกเขาเติบโต ในสูญญากาศของอวกาศ ถ้าเราทุ่มเทความตั้งใจของเรากับพวกเขา พวกมันจะกลายเป็นเครื่องมือที่มีประโยชน์"

