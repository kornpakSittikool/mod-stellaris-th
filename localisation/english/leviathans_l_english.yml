##################
# TRADER ENCLAVES
##################

 leviathans.102.name:0 "ที่อยู่ติดต่อแรก กับ[From.GetName]"
 leviathans.102a.desc:2 "ยินดีต้อนรับสู่ซิรา คอร์ป!\n\nเราเป็นองค์กรธุรกิจนอก[trader_system.GetName]ระบบที่เชี่ยวชาญในการค้า - บล็อกก่อสร้างของอารยธรรม ดังที่เราชอบพูดที่นี่ที่ Xurorp\n\nได้โปรด อย่าลังเลที่จะติดต่อเรา ถ้าคุณสนใจจะทําข้อตกลงที่ดี"
 leviathans.102b.desc:2 "ข้าพูดในนามของการแลกเปลี่ยนสินค้าริแกน เราได้อํานวยความสะดวกการเจรจาการค้าระหว่างพรรคที่สนใจในสถานีของเราใน[trader_system.GetName]ระบบกว่าพันปีของคุณ\n\nถ้าคุณบังเอิญมีทรัพยากรมากกว่าที่คุณต้องการ เรายินดีจะถอดมันออกจากมือคุณ คุณจะได้รับการชดเชยอย่างแน่นอน"
 leviathans.102c.desc:2 "ดีที่ได้พบเพื่อน! ผมเป็นตัวแทนของเรือบรรทุกสินค้ามูเตแกน และให้ฉันเป็นคนแรกที่ต้อนรับคุณ[trader_system.GetName]ระบบ องค์กรของเราประกอบด้วย ผู้บังคับการพาณิชย์อิสระชาวมุติกันหลายร้อยคน ที่กล้าบุกอวกาศ เพื่อค้นหาสินค้าชิ้นต่อไป\n\nที่โรงงานของเรา คุณจะสามารถ แลกเปลี่ยนทรัพยากรที่มากเกินไปของคุณ โปรด ติด ต่อ เรา หาก คุณ สนใจ ใน การ จัด เตรียม ดัง กล่าว."

 leviathans.100.a:0 "เราต้องการที่จะแลกเปลี่ยน"
 leviathans.100.b:0 "เปิดจอ"

 leviathans.100.name:0 "XuraCorp"
 leviathans.100a.desc:0 "เราไม่ได้แบ่งแยกผู้ซื้อที่นี่ เราเป็นใครถึงตัดสินศีลธรรม ของชาติดาวของคุณ"
 leviathans.100b.desc:0 "บาง ที คุณ อาจ ต้องการ แร่ ธาตุ เพื่อ สร้าง เรือ รบ. บางทีเจ้าอาจต้องใช้มันเพื่อสร้างสถานเลี้ยงเด็กกําพร้า ที่นี่ที่องค์กร Xura เราทําให้มันเป็นธุรกิจของเราไม่ดูแล!"
 leviathans.100c.desc:0 "ไม่ มี คํา ถาม ใด ๆ ที่ มี คํา ถาม คือ ทรัพยากร เพียง พอ พร้อม จะ สูบ เข้า ไป ใน หลอด เลือด แดง ของ อุตสาหกรรม ของ คุณ!"
 leviathans.100d.desc:1 "เกรงว่าคงไม่คืนเงิน นโยบายของบริษัท... มันออกจากฉัน[xuracorp_country.species.GetHandNamePlural]."
 leviathans.100e.desc:1 "เราสนใจอุปกรณ์กลั่นแบบนอกกรอบได้ไหม ไม่เหรอ? แล้วเครื่องตรวจจับอนุภาคล่ะ"
 leviathans.100f.desc:0 "คุณถึง Xurorp แล้ว เราจะช่วยคุณได้ยังไง?"

 leviathans.103.name:0 "แลกเปลี่ยนสินค้าแบบแท่ง"
 leviathans.103a.desc:0 "ลูกค้าของเราทุกคนยังคงไม่ระบุชื่อ"
 leviathans.103b.desc:1 "ทรัพยากรของเรามาจากไหน? เชื่อฉัน... มันดีที่สุดสําหรับทุกคนที่เกี่ยวข้อง - รวมถึง[Root.GetName]ถ้าเราเก็บข้อมูลเล็กๆ ไว้กับตัวเอง"
 leviathans.103c.desc:0 "เราไม่จัดการกับทาส โทษที ไม่มีข้อยกเว้น"
 leviathans.103d.desc:0 "แลกเปลี่ยนสินค้าริแกนทักทายคุณ"
 leviathans.103e.desc:0 "พันปีเรายังทําธุรกิจกันอยู่ ถ้ามันไม่ได้พูดกับความน่าเชื่อถือของเรา ผมไม่ทราบว่าสิ่งที่จะ"
 leviathans.103f.desc:0 "หลายพรรคในฐานดาวของเราได้แสดงความสนใจในการจัดการกับ[Root.GetName]เราจะเจรจาต่อรองกันดีไหม"

 leviathans.104.name:0 "สัญญาอนุญาตสิทธิ์"
 leviathans.104a.desc:0 "หลาย พัน ปี มา แล้ว ชาว มุ ตตา กันจักรวรรดิเป็นส่วนที่ดีของกาแล็กซี่ เราทุกคนที่เหลืออยู่"
 leviathans.104b.desc:1 "มี การ กล่าว กัน ว่า มู เท อรัน สามารถ ได้ กลิ่น ที่ ดี จาก ระยะ ห่าง สิบ สอง รอบ. นี่เป็นการพูดเกินจริง... ตาม จริง แล้ว ระยะ ทาง มี เพียง แปด โปร เซส เท่า นั้น."
 leviathans.104c.desc:0 "พ่อค้ามูเตแกน ยินดีต้อนรับ คุณอยากจะทําข้อตกลงไหม"
 leviathans.104d.desc:1 "มูทาแกนกับริซิเดียนเดินเข้าไปในบาร์... อย่า ลืม ว่า นี่ ไม่ ได้ ทํา ให้ มี การ สนทนา ที่ เหมาะ สม. ข้าขออภัยด้วย"
 leviathans.104e.desc:0 "สวัสดี[Root.GetSpeciesName]เจ้ามาเพื่อค้าขายกับเราใช่ไหม"
 leviathans.104f.desc:0 "คํานั้น\"บัญชี\" ถือเป็นคําหยาบในหมู่คนของผม โปรด จํา เรื่อง นี้ ไว้ เมื่อ สนทนา กับ เรา."

