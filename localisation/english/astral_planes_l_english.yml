 job_munitions_decommissioner_desc: "นักวิจัยภาคปฏิบัติการเหล่านี้จะทำการตรวจสอบและวิศวกรรมย้อนกลับอาวุธโบราณเพื่อให้เหมาะสมกับข้อกำหนดที่ทันสมัยของเรา"
