 councilor_hyperspace_specialty: "ผู้ดูแลไฮเปอร์เลน"
 councilor_hyperspace_specialty_female: "$councilor_hyperspace_specialty$"
 councilor_hyperspace_specialty_desc: "$TITLE$ ช่วยรับประกันความปลอดภัยและความมั่นคงของเครือข่ายโลจิสติกส์ระหว่างดวงดาวของเรา"
 councilor_hyperspace_specialty_custom_modifier_desc: "สิ่งปลูกสร้างสถานีอวกาศ §Y$sm_warp_fluctuator$§!แต่ละแห่งยังมอบ £stability£ ค่าความมั่นคง(ทนได้)เพิ่มเติม §G+$@councilor_hyperspace_specialty_warp_fluctuator_stability$§!"
