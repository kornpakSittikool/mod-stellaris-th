 finisher_effects_study: "เราไม่แน่ใจว่าอุปกรณ์นี้มีความลับอะไรซ่อนอยู่...\n\nเรามองโลกในแง่ดีอย่างระมัดระวังว่าเราจะสามารถพัฒนาสังคมของเราให้ก้าวไกลยิ่งขึ้นได้หลังจากตรวจสอบโครงสร้างการสร้างของมัน"

 situation_the_seal: "การปิดผนึกมิติ"
 situation_the_seal_type: "การปิดผนึกมิติ"
 situation_the_seal_desc: "จากการถูกโจมตีโดยกองกำลังที่ไม่รู้จัก เอนทิตีที่อาศัยอยู่ ณ ใจกลางกาแล็กซีในปัจจุบันได้ร้องขอความช่วยเหลือจากเรา หากพวกเขาพ่ายแพ้ลง เราก็มิอาจล่วงรู้โชคชะตาของเราเองได้เลย"
 situation_the_seal_monthly_change_tooltip: "$situation_monthly_change_tooltip_approaches_dependent$"
