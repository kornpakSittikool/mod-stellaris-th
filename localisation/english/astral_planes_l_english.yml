# Tutorials #
#############

 TUTORIAL_ASTRAL_ACTIONS_VIEW_TITLE: "แนะนำการเล่น: ปฏิบัติการแอสทรัล"
 TUTORIAL_ASTRAL_ACTIONS_VIEW_DESC: "หน้าต่างปฏิบัติการแอสทรัล(การกระทํากลาง)ช่วยให้เราสามารถใช้จ่าย $ASTRAL_THREADS_ICON$ ของเราไปกับเอฟเฟกต์ทั่วทั้งจักรวรรดิรูปแบบต่างๆ ได้ ยิ่งเราสำรวจ §Sเดอะชราวด์§! ได้มากเท่าใด ปฏิบัติการที่เราปลดล็อกก็จะยิ่งมากขึ้นเท่านั้น ปฏิบัติการบางอย่างสามารถทำซ้ำได้ตามเวลา ในขณะที่บางอย่างสามารถเปิดใช้งานได้เพียงครั้งเดียวเพื่อปลดล็อกขีดความสามารถหรือเทคโนโลยีใหม่ๆ"

 TUTORIAL_ASTRAL_RIFT_VIEW_TITLE: "แนะนำการเล่น: หน้าต่างรอยแยกแอสทรัล"
 TUTORIAL_ASTRAL_RIFT_VIEW_DESC: "หน้าต่างรอยแยกแอสทรัล จะแสดงรายละเอียดของ §Sรอยแยกแอสทรัล§! ที่กำลังเลือกอยู่ในปัจจุบัน ในแต่ละช่วงของความคืบหน้า คุณอาจได้รับการแจ้งเตือนเพื่อให้คำสั่งแก่เหล่านักวิทยาศาสตร์ของเรา ซึ่งจะนำไปสู่ผลลัพธ์ที่แตกต่างกัน และในบางครั้งก็นึกไม่ถึงด้วย การเดินทางสำรวจนอกเหนือห้วงรอยแยกแอสทรัล ส่วนใหญ่จะมีเส้นทางให้เลือกเดินได้หลายสาย...\n\nในการเปิดเผยความล้ำลึกของรอยแยก นักวิทยาศาสตร์ต้องทำการค้นพบครั้งสำคัญ (§Sทําลาย§!) เพื่อพัฒนาผ่านรอยแยกในแต่ละช่วง นักวิทยาศาสตร์ที่มีคุณลักษณะ (§Sสินค้า§!) ที่เกี่ยวข้องและระดับทักษะ (§Sทักษะ§!) ที่สูงขึ้นจะช่วยเร่งความเร็วในการผ่านเข้าสู่ช่วงถัดไป ในขณะที่ระดับความยากที่สูงขึ้นของทางเลือกที่เลือกเดินจะทำให้มันช้าลงไป นักวิทยาศาสตร์คนใดก็ตามที่ทำการสืบสวนรอยแยกเป็นเวลานานเพียงพอจะสั่งสมเบาะแส (§Sคํา บอก ใบ้§!) ซึ่งจะช่วยให้การเปิดค้นพบครั้งสำคัญมีโอกาสเกิดได้มากยิ่งขึ้น\n\nในขณะออกเดินทางสำรวจ §Sรอยแยกแอสทรัล§! นักวิทยาศาสตร์จะถูกผูกยึดโยงไว้กับอีกมิติหนึ่งและไม่สามารถถูกนำตัวออกมาได้จนกว่าการสำรวจจะเสร็จสิ้น และจากผลของการติดอยู่ระหว่างกาลเวลาและอวกาศในลักษณะนี้ พวกเขาจะไม่สามารถเสียชีวิตลงด้วยโรคชราได้"

#Mercedes Romero Lives!

astral_planes.6100.name: "ผู้หลงหนีคนสุดท้าย"
astral_planes.6100.desc: "การปรากฏตัวออกมาจากรอยแยกแอสทรัล ควบคู่กับยานกลมรอยแยก(Rift Sphere)ของ [FromFromFrom.GetName] มีสิ่งแปลกปลูกสายตาสะดุดความสนใจของเรา: กระสวยหลบภัยที่ปิดการทำงานชั่วคราวถูกลากตามหลังมาในแนวของยานกลม ในไม่ช้า เราได้รับสัญญาณแจ้งขอความช่วยเหลือแบบธรรมดา ส่งผ่านพร้อมกับภาพวิดีโอสดในขณะนั้น"
astral_planes.6100.b: "นี่ไม่ใช่ธุระกงการอะไรของเรา"
astral_planes.6100.c: "ใช้มันเป็นเป้าซ้อมยิงอาวุธเสีย"

NAME_Mercedes: "Mercedes Romero"
Mercedes_DESC: "ผู้มีอายุครบหนึ่งร้อยปีที่มีความหลงใหลในวัฒนธรรมของสิ่งมีชีวิตต่างดาว โดยเฉพาะอย่างยิ่งมนุษย์ ชาวบลอร์ก(บอร์ก)ผู้อารมณ์ดีคนนี้หาญกล้าบุกผ่ารอยแยกแอสทรัล มาถึงที่นี่ ภารกิจของพวกเขาคือ: การหาเพื่อนใหม่"
mercedes_catch_phrase: "เรามาร่วมเป็นเพื่อนกันได้ไหม?"
astral_planes.6105.desc.reg: "§Hสิ่งมีชีวิตต่างดาวที่น่ารังเกียจยืนนิ่งงันอยู่ต่อหน้าเราด้วยความมึนงง การเคลื่อนไหวเดียวของมันคือส่วนหมวกของมันที่กระเพื่อมเป็นจังหวะเหมือนเกลียวคลื่น พลันได้สติคืนมาอย่างรวดเร็ว ด้วยการโบกสั่นหนวดเคราจำนวนมาก สิ่งมีชีวิตตนนี้ก็เริ่มแนะนำตัวมันเอง:§!\n\nอะไรกัน- ที่ไห- ฉันอยู่ที่ไหน? ขออภัยด้วย ฉันชื่อเมอร์เซเดส โรเมโร นักสำรวจและนักการทูตแห่งสมาคมบลอร์ก(อังกฤษ)ท่านรู้จักมนุษย์หรือไม่?"
astral_planes.6105.desc.human: "§Hสิ่งมีชีวิตต่างดาวที่น่ารังเกียจยืนนิ่งงันอยู่ต่อหน้าเราด้วยความมึนงง การเคลื่อนไหวเดียวของมันคือส่วนหมวกที่กระเพื่อมเป็นจังหวะเหมือนเกลียวคลื่น ทันทีที่มันสังเกตเห็นเรา มันทำท่าจะพุ่งตัวเข้ามาหาก่อนจะฝืนยับยั้งตัวเองไว้ได้ทัน§!\n\nพ- พวกคุณ- พวกคุณคือมนุษย์อย่างนั้นเหรอ!? §H*กรี๊ดสลบ*§! ฉ- ฉันขอโทษที ฉันหลงใหลในวัฒนธรรมของพวกคุณมาตั้งแต่ฉันยังเป็นสปอร์ตัวน้อยๆ แล้วล่ะ!\n\n§Hเอเลี่ยนตัวนั้นยื่นหนวดของมันออกมาในความพยายามอย่างเงอะงะที่จะเลียนแบบการจับมือทักทาย§!\n\nฉันชื่อเมอร์เซเดส โรเมโร และเป็นเกียรติอย่างยิ่งที่ได้พบกับพวกคุณ"
astral_planes.6105.a: "ท่านจำความอะไรได้บ้าง?"
astral_planes.6105.a.response: "ความทรงจำสุดท้ายของฉันคือที่ระบบดาวแอนทาเรส(แอนตาร์ระบบดาว) ฉันกำลังเข้าร่วมทำสงครามกองยานร่วมกับกลุ่มเพื่อนๆ จากนั้นฉันก็เห็นแสงสว่างจ้าขึ้นมา หลังจากนั้นก็จำความอะไรไม่ได้อีกเลย ฉันลอยมาถึงที่นี่ในกระสวยหลบภัยนี้คนเดียว ปราศจากเพื่อนใดๆ"
astral_planes.6105.b: "เหตุใดท่านถึงได้หลงใหลในตัวมนุษย์ขนาดนี้?"
astral_planes.6105.b.response: "โอ้ มนุษย์คือสิ่งมีชีวิตที่มหัศจรรย์ที่สุด พวกเราชาวบลอร์กเฝ้าสังเกตการณ์พวกมาเป็นเวลาหลายศตวรรษแล้ว อันที่จริง วัฒนธรรมส่วนใหญ่ของเรามีพื้นฐานมาจากสิ่งที่เราสังเกตเห็นจากวิถีชีวิตของมนุษย์ สีสัน! บทละคร! มิตรภาพ! พวกเขาได้สอนให้เราเรียนรู้ว่าชีวิตเป็นมากกว่าแค่การเอาตัวรอดไปวันๆ แต่คุณยังสามารถสร้างเพื่อนพ้องได้ด้วย! ช่างเป็นแนวคิดที่ยอดเยี่ยมอะไรอย่างนี้ ช่างเป็นสิ่งที่น่าอัศจรรย์เหลือเกิน!"
astral_planes.6105.c: "ท่านสามารถช่วยเหลืออะไรเราได้บ้าง?"
astral_planes.6105.c.response: "ไม่ใช่คำถามที่เป็นมิตรเท่าไรนัก แต่ถ้าต้องการให้รับใช้ ฉันก็พร้อมเสมอ! แน่นอนว่าฉันมีประสบการณ์หลายศตวรรษในการเป็นกัปตันเรือรบวิจัย แต่ความหลงใหลที่แท้จริงของฉันคือความสัมพันธ์ระหว่างกาแล็กซี การได้เป็นเพื่อนของพวกคุณจะช่วยให้ฉันช่วยสร้างเพื่อนคนอื่นๆ ในระหว่างทางได้ด้วยเช่นกัน ได้โปรดเถอะ หากพวกคุณจะยอมรับฉัน ให้ฉันได้ทำหน้าที่เป็นตัวแทนผลประโยชน์ทางการทูตของพวกคุณด้วยเถอะ!"
astral_planes.6105.hire_custom_tooltip:0 "§Y$NAME_Mercedes$§! เข้าร่วมจักรวรรดิของเราในฐานะ §Hหัวหน้า§!"
leader_trait_blorg_insight: "ข้อมูลเชิงลึกบลอร์ก"
leader_trait_blorg_insight_desc: "หลายศตวรรษในการศึกษาการถ่ายทอดสัญญาณและวัฒนธรรมของสัตว์เลี้ยงลูกด้วยนมที่เดินตัวตรงประเภทหนึ่ง ทำให้บุคคลนี้กระตือรือร้นที่จะเอาอกเอาใจเป็นพิเศษ บางคนอาจพูดว่า น่ารำคาญใจทีเดียว"
blorg_insight_effect: "$t$§R-25§! ค่าความเห็น(โอปินี)กับจักรวรรดิ §Yมนุษย์§!"
triggered_opinion_blorg_insight: "ข้อมูลเชิงลึกบลอร์ก"

