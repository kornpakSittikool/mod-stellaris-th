 situation_the_seal_weave_astral_fabric: "ถักทอผ้าผืนแอสทรัล"
 approach_situation_the_seal_weave_astral_fabric_tt: "§G+50%§! ค่าความทนทานของโล่(เสียงกระแทก)สำหรับยานฝ่ายพันธมิตรทั้งหมดในระบบดาว §H$NAME_Formless_System$§!"
 situation_the_seal_pump_exotic_gases: "ปั๊มแก๊สแปลกถิ่น"
 approach_situation_the_seal_pump_exotic_gases_tt: "§G+10%§! ความเสียหายของอาวุธพลังงาน(ระเบิดร้ายแรง)สำหรับยานฝ่ายพันธมิตรทั้งหมดในระบบดาว §H$NAME_Formless_System$§!"
 finisher_effects_the_seal: "เราไม่แน่ใจว่าจะเกิดผลลัพธ์เช่นไรขึ้น หากเราเลือกที่จะช่วยชีวิตสิ่งมีชีวิตเหล่านี้"
 the_seal_do_nothing_method: "เราจะปล่อยให้ความขัดแย้งนี้ดำเนินต่อไปโดยไม่เข้าไปแทรกแซง"
 the_seal_weave_method: "หากเรานำเส้นใยแอสทรัลที่เรากู้มาได้ไปมอบให้กับสิ่งมีชีวิตเหล่านี้ พวกเขาก็จะสามารถนำไปใช้เพื่อเสริมความแข็งแกร่งให้กับโล่ป้องกันของพวกเขาได้"
 the_seal_pump_method: "แก๊สแปลกถิ่นมีผลการขยายพลังอย่างมากในฟองสบู่แห่งการดำรงอยู่ดั้งเดิมอันแปลกประหลาดนี้ เราสามารถใช้มันเพื่อเพิ่มประสิทธิภาพให้กับคลังอาวุธของเราได้"
 the_seal_weave_astral_fabric_modifiers: "หากเราส่งมอบเส้นใยแอสทรัลที่เรากู้คืนมาได้ให้แก่สิ่งมีชีวิตเหล่านี้ พวกเขาจะสามารถใช้ความรู้ความเข้าใจอย่างลึกซึ้งในคุณสมบัติของมันเพื่อเสริมความแข็งแกร่งให้กับเกราะป้องกันของตนได้"
 the_seal_pump_exotic_gases_modifier: "แก๊สแปลกถิ่นมีผลการขยายพลังอย่างมากในฟองสบู่แห่งการดำรงอยู่ดั้งเดิมอันแปลกประหลาดนี้ เราสามารถใช้มันเพื่อเพิ่มประสิทธิภาพให้กับคลังอาวุธของเราได้"
 destroy_sphere_modifier: "ความสงบสุขในมิตินี้"
 aberrant_fleet_spawn_countdown: "กองยานเอเบอร์แรนต์(เสียชีวิตแล้ว)กองยาน) ถัดไปจะปรากฏตัวใน [this.days_before_spawn]"

 astral_situation.1.name: "ทรงกลมคริสตัลถูกทำลายแล้ว"
 astral_situation.1.desc: "เสร็จสิ้นแล้ว...\n\nทรงกลมคริสตัลได้รับการแตกละเอียดออกเป็นเม็ดระยิบระยับนับไม่ถ้วน\n\nเราเก็บเกี่ยวทรัพยากรวัสดุอันมีค่าทันที องค์ประกอบพื้นฐานของมันไม่เหมือนกับสิ่งที่เราเคยพบเห็นมาก่อนเลย\n\nประชาชนของเรากำลังเฉลิมฉลองการตัดสินใจที่กล้าหาญเพื่อรักษาความปลอดภัยและความมั่นคงของบ้านเรา การปล่อยให้อุปกรณ์เช่นนี้คงอยู่ในพรมแดนของเราต่อไปถือเป็นการกระทำที่ขาดความรับผิดชอบอย่างยิ่ง"

 astral_situation.5.name: "สิ้นสุดการศึกษา"
 astral_situation.5.desc: "มันคือข้อความหนึ่ง...\n\nรหัสที่ถอดได้ภายในเครือข่ายคริสตัลที่เป็นไปไม่ได้ มีคำแนะนำชุดหนึ่งระบุไว้\n\nเมื่อปฏิบัติตามนั้นอย่างเคร่งครัด เราสามารถจำลองสภาพแวดล้อมที่สลักไว้รอบทรงกลมคริสตัลได้ การจัดเรียงแก๊สและเส้นใยแอสทรัลอย่างแม่นยำได้ส่งผลในการ 'เปิดใช้งาน' ทรงกลม\n\nหลังจากนั้นไม่นาน มันก็อันตรธานหายไปเฉยๆ โดยมีรอยแยกแอสทรัล แบบที่ไม่เคยพบเห็นที่ใดมาก่อนก่อตัวขึ้นมาแทนที่ในสายตา\n\nการมีอยู่ของมันดึงดูดให้เราต้องออกไปสำรวจ"

 astral_planes.15.name: "ทรงกลมคริสตัล"
 astral_planes.15.desc.default: "วัตถุแปลกประหลาดได้โคจรมาถึงในระนาบวงโคจรของดาว [Root.GetHomeWorldName]...\n\nทรงกลมคริสตัลที่ทำให้นึกถึงเทคโนโลยี §Y$tech_rift_sphere$§! ของเรา ปรากฏขึ้นโดยไม่มีคำเตือนตามเส้นทางวิถีที่ไม่รู้จัก\n\nด้วยความใกล้ชิดขนาดนี้กับดาว [Root.GetHomeWorldName] ทรงกลมอาจก่อให้เกิดอันตรายร้ายแรงต่อผู้คนของเราได้\n\nในทางกลับกัน มันก็มีโอกาสสูงมากที่จะเก็บกักข้อมูลเชิงลึกอันมีค่าเกี่ยวกับธรรมชาติของการเดินทางข้ามมิติไว้เช่นกัน"
 astral_planes.15.desc.win: "เราได้เข้าควบคุมวัตถุแปลกประหลาดในวงโคจรของระบบดาว [crystal_sphere_system.GetName]...\n\nมันคือวัตถุทรงกลมคริสตัลที่คล้ายคลึงอย่างมากกับเทคโนโลยี §Y$tech_rift_sphere$§! ที่เราพัฒนาขึ้นเพื่อช่วยสำรวจมิติอื่นๆ\n\nมันอาจก่ออันตรายร้ายแรงที่ไม่รู้จักให้แก่จักรวรรดิของเราได้\n\nในทางกลับกัน เราเชื่อว่ามันอาจมีข้อมูลเชิงลึกอันล้ำค่าเกี่ยวกับการเดินทางข้ามมิติ"
 astral_planes.15.desc.win_delayed: "จากการวิจัยล่าสุดของเราเกี่ยวกับรอยแยกแอสทรัล เราค้นพบว่าวัตถุทรงกลมคริสตัลในระบบดาว [crystal_sphere_system.GetName] มีความคล้ายคลึงกันหลายประการกับเทคโนโลยี §Y$tech_rift_sphere$§! ที่เราพัฒนาขึ้น...\n\nมันอาจก่ออันตรายร้ายแรงที่ไม่รู้จักให้แก่จักรวรรดิของเราได้\n\nในทางกลับกัน เราเชื่อว่ามันอาจมีข้อมูลเชิงลึกอันล้ำค่าเกี่ยวกับการเดินทางข้ามมิติ"
 astral_planes.15.a: "ศึกษาเรียนรู้มัน"
 astral_planes.15.b: "ทำลายมันทิ้งเสีย"

 astral_planes.30.name: "ทรงกลมแปลกประหลาด"
 astral_planes.30.desc: "เราได้ควบคุมวัตถุแปลกประหลาดในวงโคจรของระบบดาว [crystal_sphere_system.GetName]...\n\nเราไม่แน่ใจในวัตถุประสงค์หรือต้นกำเนิดของมัน บางทีหากทำการวิจัยในอนาคต เราจะสามารถได้รับข้อมูลเชิงลึกเกี่ยวกับวิธีดำเนินการกับมันได้"
 astral_planes.30.a: "เราจะจับตาดูมันไว้"

