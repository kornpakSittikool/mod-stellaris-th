 council_agenda_agenda_dark_matter_breakthrough_name: "การพัฒนาครั้งสำคัญด้านสสารมืด"
 council_agenda_agenda_dark_matter_breakthrough_desc: "มีแอปพลิเคชันทรงพลังที่เรายังไม่ได้สำรวจอย่างเต็มที่เกี่ยวกับการควบคุมจัดการสสารมืด"
 council_agenda_agenda_dark_matter_breakthrough_init_effect_desc: "§Rล็อกคุณสมบัติลัทธิ §Y$civic_dark_consortium$§! เพื่อป้องกันไม่ให้ได้รับการปฏิรูปอีก§!"
 council_agenda_agenda_dark_matter_breakthrough_effect_desc: "ปลดล็อกตัวเลือกการวิจัยสุ่มสำหรับเทคโนโลยีสสารมืด £sr_dark_matter£ หนึ่งเทคโนโลยี"
 agenda_dark_matter_breakthrough_techs_obsolete: "$TRIGGER_FAIL$สสารมืดได้รับการเปิดเผยความลับทั้งหมดของมันเรียบร้อยแล้ว"
