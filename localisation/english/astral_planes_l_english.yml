 councilor_dark_consortium: "ผู้ทอเงา"
 councilor_dark_consortium_female: "$councilor_dark_consortium$"
 councilor_dark_consortium_desc: "หน้าที่ของ $TITLE$ คือการตรวจสอบและทำบัญชีทรัพยากรสสารมืดทุกหน่วย เพื่อให้แน่ใจว่าจะไม่มีอนุภาคใดสูญเปล่าไปแม้แต่ชิ้นเดียว"
 councilor_dark_consortium_corporate: "นายหน้าเงา"
 councilor_dark_consortium_corporate_female: "$councilor_dark_consortium_corporate$"
 councilor_dark_consortium_corporate_desc: "$councilor_dark_consortium_desc$"

 councilor_sovereign_guardianship: "ป้อมปราการเอก"
 councilor_sovereign_guardianship_female: "$councilor_sovereign_guardianship$"
 councilor_sovereign_guardianship_desc: "ผู้เชี่ยวชาญที่ได้รับการยกย่องอย่างสูงในการปกป้องบ้านเกิดของเรา $TITLE$ มีหน้าที่รับผิดชอบในความปลอดภัยและการบำรุงรักษาป้อมปราการดาวเคราะห์ทั้งหมดของเรา"
 councilor_sovereign_guardianship_corporate: "เลขาธิการฝ่ายป้องกันภัย"
 councilor_sovereign_guardianship_corporate_female: "$councilor_sovereign_guardianship_corporate$"
 councilor_sovereign_guardianship_corporate_desc: "ผู้เชี่ยวชาญที่ได้รับการยกย่องอย่างสูงในการปกป้องมาตุภูมิ $TITLE$ มีหน้าที่รับผิดชอบด้านบัญชีและโลจิสติกส์สำหรับป้อมปราการดาวเคราะห์ทั้งหมดของเรา"

