 approach_situation_study_crystal_sphere_observe_tt: "อุปกรณ์ชิ้นนี้ดูเหมือนกำลังค่อยๆ ปรับประสานตัวเองอย่างช้าๆ เราเชื่อว่าเมื่อเวลาผ่านไป มันจะทำหน้าที่ตามที่ได้รับการออกแบบไว้ได้สำเร็จ"
 situation_study_crystal_sphere_mundane: "วิธีการทางวิทยาศาสตร์ทั่วไป"
 approach_situation_study_crystal_sphere_mundane_tt: "หากเราทุ่มเทการค้นคว้าวิจัยทางวิทยาศาสตร์มากพอในการปลดล็อกศักยภาพของอุปกรณ์นี้ เราเชื่อว่าเราสามารถเร่งการเปิดใช้งานมันได้"
