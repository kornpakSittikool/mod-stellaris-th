 sm_dimensional_shrine: "ศาลเจ้ามิติ"
 sm_dimensional_shrine_desc: "ภายนอกจักรวาลที่เรารู้จักมีเส้นทางสู่มิติอื่น และสถานที่ที่ความเชื่อมโยงเหล่านั้นถักทอเข้าด้วยกันอย่างเบาบาง นี่คือสถานที่ที่เราสร้างวิหารอันศักดิ์สิทธิ์ที่สุดของเรา\n"
 sm_reloading_bay: "รีโหลดเบย์"
 sm_reloading_bay_desc: "สำรองพื้นที่ส่วนสำคัญของสถานีอวกาศ (ฐานดวงดาว) เพื่อโหลดส่วนประกอบอาวุธของเรา และจัดเตรียมแพลตฟอร์มป้องกันเพิ่มเติม\n"
 requires_dimensional_space_object: "§Rต้องการ §Y$WORMHOLE$§!, §Y$pc_rift_star$§!, §Y$ASTRAL_RIFT$§!, §Y$LGATE_GALACTIC$§! หรือ §Y$SHROUD_TUNNEL_GALACTIC$§!§!"

 civic_hyperspace_specialty: "ชำนาญการไฮเปอร์สเปซ"
 civic_hyperspace_specialty_desc: "สังคมนี้โอบรับความเร็วมาโดยตลอด การควบคุมจัดการไฮเปอร์สเปซเป็นเพียงแค่อีกช่องทางหนึ่ง และผู้ที่มีความถนัดในสาขานี้จะได้รับการยกระดับขึ้นสู่วรรณะสูงสุด"
 civic_hyperspace_specialty_effects: "£physics£ §Y$tech_hyper_drive_2$§! เป็นตัวเลือกการวิจัยที่รับประกันอย่างแน่นอน\nมีระดับการข่าวกรองต่ำ(ข้อมูลต่ํา)ในทุกระบบดาวภายในระยะทาง 3 ไฮเปอร์เลนจากระบบดาวเริ่มต้นของคุณ"
 civic_hive_hyperspace_specialty: "ความสอดคล้องแห่งไฮเปอร์สเปซ"
 civic_hive_hyperspace_specialty_desc: "จิตสำนึกร่วมกลุ่มนี้แสวงหาความเร็ว วิธีการควบคุมจัดการไฮเปอร์สเปซฝังลึกอยู่ทั่วทั้งกลุ่มจิตสำนึก ทำให้เกิดความเข้าใจก้าวหน้าเกี่ยวกับหลักการพื้นฐานของระยะทางเทียบกับเวลา"
 civic_hive_hyperspace_specialty_effects: "$civic_hyperspace_specialty_effects$"
 civic_machine_hyperspace_specialty: "การคำนวณไฮเปอร์สเปซ"
 civic_machine_hyperspace_specialty_desc: "จิตสำนึกจักรกลร่วมกลุ่มนี้แสวงหาความเร็ว ทฤษฎีการควบคุมจัดการไฮเปอร์สเปซถูกตั้งโปรแกรมติดตั้งลงในหน่วยประมวลผลของโดรนทุกตัว มอบความเข้าใจที่ก้าวหน้าในหลักการพื้นฐานของระยะทางเทียบกับเวลาให้กับกลุ่ม"
 civic_machine_hyperspace_specialty_effects: "$civic_hyperspace_specialty_effects$"
 civic_corporate_hyperspace_specialty: "การค้าไฮเปอร์สเปซ"
 civic_corporate_hyperspace_specialty_desc: "เวลาคือเงินตรา และบรรษัทขนาดยักษ์(เสียงรถราง)แห่งนี้ให้คุณค่ากับความเร็ว การลงทุนจำนวนมหาศาลในการวิจัยและพัฒนาได้รับผลตอบแทนงดงาม มอบสิทธิ์การเข้าถึงที่เป็นกรรมสิทธิ์ของบรรษัทต่อเทคนิคการจัดการไฮเปอร์สเปซที่ล้ำสมัย"
