l_english:

 ASTRAL_PLANES_TITLE: "Astral Planes" # Do not translate
 DLC_ASTRAL_PLANES_RECOMMENDATION_DESC: "§S$ASTRAL_PLANES_TITLE$§! เป็นส่วนเสริมเนื้อเรื่องที่เข้มข้นซึ่งจะช่วยให้คุณได้สำรวจมิติทางเลือกและบิดเบือนความจริงได้ตามใจปรารถนา"
 DLC_ASTRAL_PLANES_RECOMMENDATION_REC_1: "เราขอแนะนำ §Sระนาบแอสทรัล§! เพราะเข้ากันได้ดีกับ DLC §Sเจ้าเหนือหัว§! ซึ่งช่วยเพิ่มความยืดหยุ่นในการใช้งานไฮเปอร์รีเลย์และเครื่องยิงควอนตัม"
 DLC_ASTRAL_PLANES_RECOMMENDATION_REC_2: "เราขอแนะนำ §Sระนาบแอสทรัล§! เนื่องจากมันมอบโอกาสใหม่ๆ ในการสำรวจผู้บุกเบิกที่พบใน §SAncient Relics§!"

