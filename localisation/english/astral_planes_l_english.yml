 councilor_dimensional_worship: "รัฐมนตรีแอสทรอล"
 councilor_dimensional_worship_female: "$councilor_dimensional_worship$"
 councilor_dimensional_worship_desc: "$TITLE$ รวมคณะสงฆ์ของเราให้อยู่ภายใต้วิสัยทัศน์ชี้นำเดียวเพื่อบริการประชาชนของเราได้ดีขึ้น"
