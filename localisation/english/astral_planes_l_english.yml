 job_astral_drone_desc: "เส้นใยแห่งกาลอวกาศประกอบไปด้วยความลับของทุกๆ มิติ รวมถึงมิติของเราเอง โดรนเหล่านี้ได้รับมอบหมายให้ถอดรหัสความหมายของพวกมันในขณะที่ป้องกันการเกิดปฏิทรรศน์ดวงดาว(สเปน)ให้เหลือน้อยที่สุด"
