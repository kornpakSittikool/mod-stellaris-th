########################
# Anomalies & Projects #
########################

 ASTRAL_SCAR_CAT: "$pc_astral_scar$"
 anomaly_astral_scar_desc: "เราได้พบรอยแยกที่ผิดปกติในอวกาศและเวลา ยิ่งเราเข้าใกล้เท่าไร กฎทางฟิสิกส์สัมพัทธภาพที่เคยรู้จักก็ยิ่งใช้งานได้น้อยลงเท่านั้น...\n\nการศึกษาปรากฏการณ์นี้อาจผลักดันความเข้าใจทางวิทยาศาสตร์ของเราเกี่ยวกับกลไกของจักรวาลไปสู่ระดับที่สูงขึ้นได้อย่างมาก"
 astral_planes.6000.name: "$pc_astral_scar$"
 astral_planes.6000.desc: "เราได้เสร็จสิ้นการวิเคราะห์ความผิดปกติของ §Y$pc_astral_scar$§! ในระบบดาว §Y[FromFrom.System.GetName]§! แล้ว...\n\nมันกำลังมีสารวัตถุรั่วไหลเข้ามาในจักรวาลของเราจาก... สถานที่อื่น สสารรอบๆ รอยแยกนี้ไม่ได้ถูกอนุรักษ์ไว้ อย่างน้อยก็ไม่ใช่ในแบบที่เราจะวัดได้ แม้จะเกิดขึ้นในมาตราส่วนที่ค่อนข้างเล็กน้อย แต่รอยแยกกำลังเพิ่มมวลโดยรวมของจักรวาลเราขึ้นอย่างน่าประหลาด\n\nการวิจัยปรากฏการณ์นี้จะช่วยให้เราเข้าใจแหล่งพลังงานที่ไม่เคยได้รับการบันทึกที่มานี้ได้ดีขึ้น"
 ASTRAL_SCAR_PROJECT: "$pc_astral_scar$"
 ASTRAL_SCAR_PROJECT_DESC: "เราค้นพบรอยแยกที่ผิดปกติในมิติอวกาศและเวลา การศึกษาค้นคว้าคุณสมบัติเฉพาะตัวของมันจะช่วยมอบข้อมูลเชิงลึกทางวิทยาศาสตร์อันล้ำค่าให้แก่เรา"
 astral_planes.6001.name: "$pc_astral_scar$"
 astral_planes.6001.desc: "เราได้รับการยืนยันการมีอยู่ของจักรวาลอื่นที่อยู่ไกลออกไปนอกจักรวาลของเราในระบบดาว §Y[FromFromFrom.System.GetName]§!...\n\nรอยแยกนี้ทำให้มิติทางกายภาพของมันสร้างแรงกดดันอย่างมหาศาลต่อจักรวาลของเรา ส่งผลให้มีสารวัตถุไหลเข้ามาอย่างช้าๆ แต่สม่ำเสมอ แม้ผลกระทบในระยะยาวจะยังไม่เป็นที่เข้าใจ แต่ในตอนนี้เราควรวิเคราะห์การหลั่งไหลของจักรวาลนี้ต่อไป"
 astral_planes.6001.a: "มีสิ่งมหัศจรรย์อะไรบ้างที่รอคอยอยู่หลังรอยแยกนั้นกันนะ?"

 ASTRAL_SCAR_INSTABILITY: "$pc_astral_scar$ ขาดความเสถียร"
 ASTRAL_SCAR_INSTABILITY_DESC: "ความผิดปกติของแรงโน้มถ่วงที่ไม่เสถียรกำลังรั่วไหลออกจาก §Y$pc_astral_scar$§! ในระบบดาว [From.System.GetName] ซึ่งปรากฏเป็นซิงกูลาริตีที่เคลื่อนตัวช้าๆ เดินทางผ่านพื้นที่ใกล้เคียงก่อนจะยุบตัวลงอย่างรุนแรง ยานอวกาศที่แล่นผ่านระบบดาวนี้สามารถหลีกเลี่ยงพวกมันได้ แต่จำเป็นต้องเดินทางด้วยความระมัดระวังมากขึ้น...\n\nการสืบสวนสถานการณ์นี้เพิ่มเติมอาจเผยวิธีการปรับเสถียรภาพของรอยเปิดมิตินี้อีกครั้ง"
 instable_astral_scar_modifier: "$ASTRAL_SCAR_INSTABILITY$"
 astral_planes.6006.name: "การร้อยตะเข็บกาลเวลา (และอวกาศ)"
 astral_planes.6006.desc: "หลังจากการวิเคราะห์อย่างถี่ถ้วน เราได้รับการยืนยันว่า §Y$pc_astral_scar$§! ในระบบดาว [From.System.GetName] นั้นไม่มีเสถียรภาพในระดับที่เป็นอันตราย และจำเป็นต้องได้รับการดำเนินการในทันทีเพื่อป้องกันไม่ให้เกิดซิงกูลาริตีแรงโน้มถ่วงเพิ่มขึ้นในระบบนี้...\n\nการขับออกอย่างทรงพลังของ §Y$astral_threads$§! สามารถนำมาเปลี่ยนทิศทางและดัดแปลงวัตถุประสงค์เพื่อ 'เย็บ' รอยแผลเป็นนั้นให้ปิดลงได้ วิธีนี้จะช่วยซ่อมรอยฉีกขาดในมิติกาลอวกาศและน่าจะทิ้งสารแอสทรัลปริมาณมากไว้ข้างหลัง\n\nอีกทางเลือกหนึ่งคือเราอาจส่งอาวุธระเบิดน้ำหนักบรรทุกสูงเข้าไปเพื่อพยายามขยายรอยแผลเป็นให้กว้างขึ้น เราคาดเดาว่าวิธีนี้จะช่วยให้สามารถออกสำรวจเพิ่มเติมเกี่ยวกับสิ่งที่อาจรออยู่หลังรอยแยกได้เช่นกัน"
 astral_planes.6006.a: "เย็บรอยแผลให้ปิดลง"
 astral_planes.6006.b: "ระเบิดมันให้เปิดออก"
 astral_planes.6007.name: "บาดแผลแห่งห้วงอวกาศ"
 astral_planes.6007.desc: "หลังจากการดัดแปลงโครงสร้างที่ฉีกขาดของมันอย่างระมัดระวัง เราได้ทำการปิดผนึก §Y$pc_astral_scar$§! ในระบบดาว [From.System.GetName] อย่างสมบูรณ์ ความผิดปกติของแรงโน้มถ่วงได้หยุดลงแล้ว และเราได้เก็บกู้ทรัพยากร §Y$astral_threads$§! ปริมาณมากในระหว่างกระบวนการนี้...\n\nไม่ว่าความเป็นจริงที่อยู่อีกฟากหนึ่งจะเป็นอย่างไร มันจะไม่สามารถสร้างอันตรายให้แก่โลกความเป็นจริงของเราได้อีกต่อไป"
 astral_planes.6008.name: "$astral_planes.6007.name$"
 astral_planes.6008.desc: "อาวุธระเบิดที่เราส่งเข้าไปยังแกนกลางของ §Y$pc_astral_scar$§! ในระบบดาว [From.System.GetName] ได้ขยายช่องพับในอวกาศและเวลาให้กว้างขึ้น จากจุดที่เคยเป็นรอยฉีกขาดเล็กๆ บนโครงสร้างอวกาศ ปัจจุบันได้กลายเป็นรอยแยกขนาดใหญ่ขึ้นซึ่งเราสามารถเข้าไปสำรวจได้แล้ว...\n\nความมั่นคงที่เกิดขึ้นทำให้ความผิดปกติของแรงโน้มถ่วงลดลง และเราพร้อมแล้วที่จะค้นหาว่ามีอะไรรออยู่เบื้องหน้า"
 astral_planes.6009.name: "การพังทลายของแอสทรัล"
 astral_planes.6009.desc: "§Y$pc_astral_scar$§! ในระบบดาว [FromFromFromFrom.System.GetName] ได้ยุบตัวเข้าด้านใน และขับ §Y$astral_threads$§! ปริมาณมากเข้าสู่ระบบใกล้เคียง จากจุดที่เคยเป็นรอยฉีกขาดเล็กๆ บนโครงสร้างอวกาศ ปัจจุบันเหลือเพียงอวกาศที่ว่างเปล่า...\n\nไม่ว่าความเป็นจริงที่อยู่อีกฟากหนึ่งจะเป็นอย่างไร มันจะไม่สามารถสร้างอันตรายให้แก่โลกความเป็นจริงของเราได้อีกต่อไป"

 GREATEST_SHOW_CAT: "ตรวจพบวัตถุเรืองแสง"
 anomaly_greatest_show_desc: "มีการตรวจพบวัตถุเรืองแสงสว่างจ้าบนดาวเคราะห์น้อยในระบบดาว §Y[from.System.GetName]§!...\n\nสร้างขึ้นจากวัสดุขั้นสูง มันกำลังกระจายเสียงคลื่นวิทยุอย่างสม่ำเสมอในทุกความถี่ เครื่องสแกนของเราบ่งชี้ว่าไม่มีวัตถุระเบิดหรือสารเคมีที่ผันผวนอยู่ภายใน ดูเหมือนว่าจะปลอดภัยเพียงพอที่จะเข้าใกล้และศึกษาเพิ่มเติม"
 astral_planes.6010.name: "การแสดงที่ยิ่งใหญ่ที่สุดในพหุภพ(การแสดงอันยิ่งใหญ่ในลิขสิทธิ์)"
 astral_planes.6010.desc: "วัตถุเรืองแสงที่เราพบบนดาวเคราะห์น้อยนี้คือโฆษณาชิ้นหนึ่ง...\n\nจอแสดงผลขนาดใหญ่ยักษ์นี้ได้รับการสนับสนุนจากโครงสร้างพื้นฐานเชิงกลไกที่ติดตั้งอยู่ภายในตัวดาวเคราะห์น้อย ตัวดาวเคราะห์น้อยเองลอยตัวอยู่อย่างผิดปกติ ณ จุดหนึ่งในอวกาศโดยไม่ได้รับผลกระทบจากแรงดึงดูดของวัตถุใกล้เคียงใดๆ เลย\n\nตัวโฆษณาเป็นการอ้างอิงถึงสิ่งที่เรียกว่า \"การแสดงที่ยิ่งใหญ่ที่สุดในพหุภพ\" มีเครื่องรับชำระเงินที่รับพลังงานเครดิต (เครดิตพลังงาน) เพื่อการเดินทางตรงไปยังสถานที่จัดแสดงนั้น"
 astral_planes.6010.a: "จ่ายค่าธรรมเนียม"
 astral_planes.6010.b: "ปรับเปลี่ยนวัตถุประสงค์ของป้ายเพื่อใช้ประโยชน์ส่วนตัวของเรา"
 astral_planes.6010.c: "แยกชิ้นส่วนมันเพื่อนำวัตถุดิบไปรีไซเคิล"
 astral_planes.6011.name: "รอยแยกปรากฏขึ้น"
 astral_planes.6011.desc: "หลังจากระบบประมวลผลการชำระเงินเสร็จสิ้น เครื่องจักรภายในดาวเคราะห์น้อยก็เริ่มทำงานทันที ลำแสงสีน้ำเงินเจิดจ้าพุ่งออกมา ค่อยๆ แยกโครงสร้างของอวกาศและเวลาออกจากกันอย่างพิถีพิถัน เมื่อกระบวนการเสร็จสิ้น ตัวดาวเคราะห์น้อยก็อันตรธานหายไป และมีรอยแยกแอสทรัล ปรากฏขึ้นมาแทนที่ในตำแหน่งนั้น"
 astral_planes.6011.a: "น่าประทับใจยิ่งนัก"
 astral_planes.6012.name: "การโฆษณาที่มีประสิทธิภาพ"
 astral_planes.6012.desc: "เราได้เปลี่ยนป้ายโฆษณาที่ผิดปกตินั้นให้กลายเป็นป้ายสนับสนุนธุรกิจท้องถิ่นของเราที่ดาว [fromfrom.GetName] แล้ว ตัวเครื่องชำระเงินได้รับการถอดแยกชิ้นส่วนอย่างระมัดระวัง เผยให้เห็นกล่องพลังงานเครดิตจำนวนหนึ่งที่เก็บไว้ข้างใน"
 astral_planes.6012.a: "ช่างคิดแผนการค้าได้ดีจริงๆ"
 astral_planes.6013.name: "ป้ายสัญญาณที่ซับซ้อน"
 astral_planes.6013.desc: "เทคโนโลยีภายในกลไกดาวเคราะห์น้อยมีความซับซ้อนล้ำหน้ากว่าที่เราประเมินไว้แต่แรก ดังนั้นการเก็บกู้ซากของมันจึงให้รางวัลแก่เราเป็นทรัพยากรล้ำค่าจำนวนมาก เราได้ค้นพบวัสดุหายากหลากหลายประเภท รวมถึง §Y$astral_threads$§! ในปริมาณที่ผิดปกติ ดาวเคราะห์น้อยที่ถูกเจาะจนกลวงนี้จะต้องได้รับการออกแบบมาเพื่อควบคุมอวกาศและเวลาในลักษณะบางอย่างอย่างแน่นอน"
 astral_planes.6013.a: "เราจะนำสิ่งเหล่านี้ไปใช้ประโยชน์อย่างดี"

 BLACK_HOLE_INSTABLE_CAT: "หลุมดำ $sc_black_hole$ ขาดเสถียรภาพ"
 anomaly_black_hole_instable_desc: "เครื่องสแกนของเราตรวจพบการเบี่ยงเบนอย่างมีนัยสำคัญจากคุณสมบัติทางฟิสิกส์ที่คาดเดาไว้ของหลุมดำในระบบดาว [from.System.GetName] แรงโน้มถ่วงของมันคาดเดาไม่ได้ ส่งผลให้เกิดความไม่สอดคล้องกันของเวลาอย่างเห็นได้ชัดจากจุดหนึ่งในอวกาศไปยังอีกจุดหนึ่ง"
 astral_planes.6020.name: "หลุมดำขาดความเสถียร"
 astral_planes.6020.desc: "อนุภาคบางส่วนที่ถูกปล่อยออกมาจากหลุมดำในระบบดาว [from.System.GetName] แท้จริงแล้วคือ §Y$astral_threads$§! ซึ่งหมายความว่า ณ เวลาใดเวลาหนึ่งในอดีต รอยแผลเป็นแอสทรัล(รอยแผลเป็นแอสตรัล)ได้ถูกดึงเข้าไปในซิงกูลาริตีของมันและกำลังถูกดันออกมาอย่างช้าๆ ในปัจจุบัน เหตุการณ์ลักษณะนี้เคยถูกคิดว่าเป็นไปไม่ได้มาก่อน...\n\nอาจมีวิธีขับรอยแผลเป็นนั้นออกมาและปรับระดับความมั่นคงของอวกาศในระบบนี้ใหม่โดยการพ่นกระแส §Y$astral_threads$§! ที่มีความหนาแน่นสูงตรงไปยังซิงกูลาริตี\n\nอย่างไรก็ตาม การไม่ดำเนินการใดๆ เพิ่มเติมจะช่วยให้เราสามารถเก็บเกี่ยวผลผลิตสิ่งทอจักรวาลนี้ต่อไปได้จากระยะห่างที่ปลอดภัย"
 astral_planes.6020.a: "ยิงสารวัตถุแอสทรัลเข้าไปในซิงกูลาริตี"
 astral_planes.6020.b: "เก็บกู้เส้นใยจากระยะห่างที่ปลอดภัย"
 astral_planes.6021.name: "รอยแยกปรากฏขึ้น"
 astral_planes.6021.desc: "การยิง §Y$astral_threads$§! เข้าไปในซิงกูลาริตีทำให้เกิดปฏิกิริยาที่รุนแรงในทันที เมื่ออนุภาคต่างมิติจำนวนมหาศาลพรั่งพรูออกมาจากแรงดึงดูดของหลุมดำ อนุภาคเหล่านี้ได้รวมตัวกันกลายเป็น $astral_rift$ ซึ่งขณะนี้ลอยตัวอยู่ในบ่อแรงโน้มถ่วงของมัน...\n\nวิธีที่ความผิดปกติของท้องฟ้านี้ถูกดูดเข้าไปในซิงกูลาริตีตั้งแต่แรกนั้นยังคงไม่มีใครรู้ แต่อย่างน้อยตอนนี้เราก็สามารถเข้าไปตรวจสอบได้แล้วว่ามีอะไรอยู่บนอีกฟากหนึ่ง"
 astral_planes.6022.name: "กำเนิดรอยแผลเป็น"
 astral_planes.6022.desc: "หลุมดำในระบบดาว [from.System.GetName] ได้ดันเอา $pc_astral_scar$ ที่เคยถูกดูดซับไว้ในซิงกูลาริตีชั่วคราวออกมา พร้อมกับสารแอสทรัลปริมาณมากที่เคยถูกกักไว้...\n\nหลังจากนั้นแรงโน้มถ่วงของหลุมดำก็กลับเข้าสู่สภาวะปกติ"

 astral_planes.6030.name: "ความมหัศจรรย์แห่งดาราศาสตร์แอสทรัล"
 astralnomical_interest_modifier: "ความสนใจในดาราศาสตร์แอสทรัล"
 astralnomical_interest_tt: "ประชากรอินทรีย์ §Hป๊อปออร์แกน§! ที่ไม่ใช่ทาสแต่ละหน่วย £pop£ จะผลิตงานวิจัยฟิสิกส์ 1 £physics_research£ §Yการ วิจัย ทาง ฟิสิกส์§! ต่อเดือน"
 astral_planes.6030.desc.common_1: "ชาวอาณานิคมบนดาว [this.GetName] ได้พัฒนาความหลงใหลใน"
 astral_planes.6030.desc.common_2: "ที่ปรากฏให้เห็นบนท้องฟ้าจากซีกโลกใต้ของดาวเคราะห์ดวงนี้ เกิดการคาดเดาไปต่างๆ นานาเกี่ยวกับต้นกำเนิดของมัน รวมถึงอันตรายหรือโอกาสที่มันอาจนำมาเสนอ...\n\nเหล่านักดาราศาสตร์สมัครเล่นจากทั่วจักรวรรดิ [owner.GetName] ต่างพากันเดินทางมายังดาวดวงนี้เพื่อรับชมมันด้วยตาตนเอง"
 astral_planes.6030.desc.rift: "$astral_planes.6030.desc.common_1$ $astral_rift$ $astral_planes.6030.desc.common_2$"
 astral_planes.6030.desc.scar: "$astral_planes.6030.desc.common_1$ $pc_astral_scar$ $astral_planes.6030.desc.common_2$"

 astral_planes.6035.name: "นิมิตที่ขัดแย้งกัน"
 astral_planes.6035.tt: "อาณานิคมสูญเสียค่าความมั่นคง ($r_stability$) 5 หน่วย"
 conflicting_visions: "$astral_planes.6035.name$"
 astral_planes.6035.desc.common_1: "ความหลงใหลในรอยแยก"
 astral_planes.6035.desc.common_2: "ในท้องถิ่นบนดาว [this.GetName] ได้กลายมาเป็นลัทธิคลั่งไคล้ หลายคนรายงานว่าได้รับนิมิตถึงโลกอื่นนอกเหนือจากโลกความเป็นจริงของเรา...\n\nกลุ่มหนึ่งอ้างว่า"
 astral_planes.6035.desc.common_3: "จะนำไปสู่ใจกลางกาแล็กซีจักรกลฟันเฟือง ที่ซึ่งเทพเจ้ากลไกคอยไขลานนาฬิกาเพื่อรักษาสมดุลข้ามโลกคู่ขนานนับอนันต์...\n\nในทางตรงกันข้าม คนอื่นๆ กล่าวว่านิมิตของพวกเขาได้เผยให้เห็นดาราจรัสแสงสีดำ(ดาวสีดํา)ที่กุมกุญแจสำคัญสู่การรู้แจ้งสัจธรรม"
 astral_planes.6035.desc.rift: "$astral_planes.6035.desc.common_1$ $astral_rift$ $astral_planes.6035.desc.common_2$หมุน & 90$astral_planes.6035.desc.common_3$"
 astral_planes.6035.desc.scar: "$astral_planes.6035.desc.common_1$ $pc_astral_scar$ $astral_planes.6035.desc.common_2$แผลเป็น$astral_planes.6035.desc.common_3$"

 astral_planes.6040.name: "ความแตกแยกที่กว้างขึ้น"
 astral_planes.6040.tt: "อาณานิคมสูญเสียค่าความมั่นคง ($r_stability$) ระหว่าง 5 ถึง 10 หน่วย"
 widening_divide_1: "$astral_planes.6040.name$"
 widening_divide_2: "$widening_divide_1$"
 widening_divide_3: "$widening_divide_1$"
 widening_divide_4: "$widening_divide_1$"
 widening_divide_5: "$widening_divide_1$"
 widening_divide_6: "$widening_divide_1$"
 astral_planes.6040.desc.common: "ความแตกแยกในหมู่ประชากรบนดาว [this.GetName] กำลังทวีความรุนแรงยิ่งขึ้น นิมิตประหลาดที่รายงานโดยชาวอาณานิคมทำให้เกิดการโต้วาทีอย่างดุเดือดจนนำไปสู่ความรุนแรงในที่สุด ผู้นำท้องถิ่นเรียกร้องให้มีคำประกาศอย่างเป็นทางการ...\n\nแม้ว่ามันอาจจะดูแปลกประหลาด แต่เราได้รับการร้องขอให้สนับสนุนความน่าเชื่อถือของการมีอยู่ของเทพเจ้ากลไก หรือดาราจรัสแสงสีดำที่อยู่เหนือช่องทาง"
 astral_planes.6040.desc.rift: "$astral_planes.6040.desc.common$ $astral_rift$"
 astral_planes.6040.desc.scar: "$astral_planes.6040.desc.common$ $pc_astral_scar$"
 astral_planes.6040.a: "เทพเจ้าจักรกลจงเจริญ"
 astral_planes.6040.b: "ให้พวกเขาแหงนมองไปยังดาราจรัสแสงสีดำเถิด"
 astral_planes.6040.c: "นิมิตทั้งสองไม่มีคุณค่าใดๆ ทั้งสิ้น"

 astral_planes.6045.name: "ความขัดแย้งหลังทฤษฎี"
 astral_planes.6045.desc: "ภัยพิบัติบนดาว [this.GetName]!\n\nนิมิตที่ขัดแย้งกันอย่างสุดขั้วในหมู่ประชาชนทำให้เกิดความไม่สงบในวงกว้าง กลุ่มที่แข่งขันกันได้จับอาวุธขึ้นสู้รบกัน โดยการปะทะกันในระดับท้องถิ่นได้นำไปสู่ความรุนแรงทั่วทั้งดวงดาว...\n\nเราไม่สามารถปล่อยให้สถานการณ์นี้ดำเนินต่อไปได้"
 astral_planes.6045.a: "หยุดยั้งความบ้าคลั่งนี้เสีย"

 astral_planes.6050.name: "ความคลั่งไคล้แอสทรัล(ใจแรงกล้า)"
 astral_zeal_modifier: "ความคลั่งไคล้แอสทรัล"
 astral_zeal_modifier_tt: "ได้รับค่าความสามัคคี ($r_unity$) จำนวนเล็กน้อยเมื่อสำรวจ §Y$astral_rift$§! เสร็จสิ้น"
 astral_planes.6050.desc.common_1: "ด้วยความเชื่อถือในนิมิตของ"
 astral_planes.6050.desc.common_2: "ได้รับการยอมรับ การโต้เถียงเกี่ยวกับ"
 astral_planes.6050.desc.common_3: "ก็ได้ลดลงอย่างมีนัยสำคัญ ในขณะเดียวกัน ความกระตือรือร้นของสาธารณชนในการศึกษาค้นคว้าก็พุ่งสูงขึ้นอย่างที่ไม่เคยมีมาก่อน"
 astral_planes.6050.desc.mechgod: "เทพเจ้าจักรกลฟันเฟือง"
 astral_planes.6050.desc.blackstar: "ดาราจรัสแสงสีดำผู้เปิดกว้างทางจิตใจ"
 astral_planes.6050.desc.rift_mechgod: "$astral_planes.6050.desc.common_1$ $astral_planes.6050.desc.mechgod$ $astral_planes.6050.desc.common_2$ $astral_rift$ $astral_planes.6050.desc.common_3$"
 astral_planes.6050.desc.rift_blackstar: "$astral_planes.6050.desc.common_1$ $astral_planes.6050.desc.blackstar$ $astral_planes.6050.desc.common_2$ $astral_rift$ $astral_planes.6050.desc.common_3$"
 astral_planes.6050.desc.scar_mechgod: "$astral_planes.6050.desc.common_1$ $astral_planes.6050.desc.mechgod$ $astral_planes.6050.desc.common_2$ $pc_astral_scar$ $astral_planes.6050.desc.common_3$"
 astral_planes.6050.desc.scar_blackstar: "$astral_planes.6050.desc.common_1$ $astral_planes.6050.desc.blackstar$ $astral_planes.6050.desc.common_2$ $pc_astral_scar$ $astral_planes.6050.desc.common_3$"

 astral_planes.6055.name: "จำกัดขอบเขตการโต้วาที"
 astral_aficionados_modifier: "ผู้หลงรักแอสทรัล Awaral Afionos)"
 astral_planes.6055.desc.common: "การอภิปรายสาธารณะทั้งหมดเกี่ยวกับนิมิตประหลาดบนดาว [this.GetName] ได้ถูกสั่งห้ามแล้ว บทลงโทษที่รุนแรงสำหรับใครก็ตามที่หยิบยกหัวข้อที่ต้องห้ามนี้ขึ้นมาช่วยป้องกันความขัดแย้งในที่สาธารณะ...\n\nชาวอาณานิคมจำนวนมากได้หันไปสนใจสิ่งอื่นแล้ว แต่กลุ่มหลักของนักดาราศาสตร์สมัครเล่นยังคงเพลิดเพลินกับความงดงามอลังการของ"
 astral_planes.6055.desc.rift: "$astral_planes.6055.desc.common$ $astral_rift$"
 astral_planes.6055.desc.scar: "$astral_planes.6055.desc.common$ $pc_astral_scar$"
 astral_planes.6055.a: "เป็นมาตรการที่เหมาะสมแล้ว"

 SPONTANEOUS_EXPLOSIONS_CAT: "การระเบิดตามธรรมชาติแบบฉับพลัน"
 COLONIZATION_IMPOSSIBLE_UNDER_INVESTIGATION: "$TRIGGER_FAIL$§Rดาวเคราะห์ดวงนี้กำลังอยู่ในระหว่างการสำรวจวิจัย§!"
 anomaly_spontaneous_explosions_desc: "เราตรวจพบการระเบิดตามธรรมชาติแบบฉับพลันบนพื้นผิวของ §Y[this.GetName]§! โดยที่ไม่มีเรือรบโคจรอยู่หรือสัญญาณสิ่งมีชีวิตบนพื้นผิวที่ตรวจจับได้ สาเหตุของแรงระเบิดขนาดใหญ่เหล่านี้ยังคงไม่ทราบแน่ชัด"
 astral_planes.6060.name: "ยุทโธปกรณ์ผันผวน"
 astral_planes.6060.desc: "พื้นผิวของ §Y[from.GetName]§! เต็มไปด้วยยุทโธปกรณ์ที่ชำรุด โดยแต่ละลูกจะทำลายบางส่วนของดาวเคราะห์ออกไปเมื่อเกิดการระเบิด...\n\nตัวอาวุธเองนั้นแปลกตาและมีความผันผวนสูงมาก ยิ่งไปกว่านั้น รูปแบบของการปล่อยระเบิดบ่งชี้ว่ามีเครือข่ายของฐานยิงที่ฝังอยู่ทั่วทั้งดวงดาว"
 astral_planes.6060.a: "ตรวจสอบศึกษาเพิ่มเติม"

 SPONTANEOUS_EXPLOSIONS: "$astral_planes.6060.name$"
 SPONTANEOUS_EXPLOSIONS_DESC: "$astral_planes.6060.desc$"
 astral_planes.6065.name: "$SPONTANEOUS_EXPLOSIONS$"
 astral_planes.6065.desc: "การวิเคราะห์เพิ่มเติมบ่งชี้ว่าดาวเคราะห์ดวงนี้เคยถูกใช้เป็นคลังแสงเก็บอาวุธขนาดมหึมา หลังจากถูกปล่อยทิ้งไว้เป็นเวลาหลายพันปี อาวุธแต่ละชิ้นเริ่มทำงานผิดปกติ ส่งผลให้ดาวเคราะห์ทั้งดวงกลายเป็นสนามรบที่ไม่เสถียร...\n\nเรามีความสามารถที่จะกระตุ้นยุทโธปกรณ์ที่เหลือทั้งหมดให้ระเบิดในลักษณะที่ควบคุมได้ หรืออีกวิธีหนึ่งคือเราอาจพยายามถอนอาวุธบางส่วนออกมาและปิดการทำงานของมันก่อนที่มันจะระเบิด"
 astral_planes.6065.a: "ระเบิดมันทิ้งไปเลย"
 astral_planes.6065.b: "พยายามเก็บกู้วัตถุระเบิดโบราณเหล่านั้นกลับคืนมา"
 astral_planes.6065.c: "ปล่อยให้สถานการณ์คลี่คลายไปตามธรรมชาติเถิด"

 astral_planes.6070.name: "รอยแยกปรากฏขึ้น"
 astral_planes.6070.desc.common_1: "หลังจากวางทุ่นระเบิดที่ได้รับการออกแบบมาอย่างพิถีพิถันรอบดาว [from.GetName] เราได้จุดชนวนปฏิกิริยาลูกโซ่ที่ทำลายล้างดาวเคราะห์ดวงนี้ลงอย่างสิ้นเชิง"
 astral_planes.6070.desc.common_2: "เราตั้งทฤษฎีว่าการเปิดขึ้นของรอยแยกมิตินี้เกิดจากระเบิดสร้างซิงกูลาริตีอันทรงพลังเป็นพิเศษซึ่งเก็บรักษาอยู่ในคลังเก็บอาวุธแห่งใดแห่งหนึ่งจากหลายๆ แห่ง"
 astral_planes.6070.desc.no_rift: "$astral_planes.6070.desc.common_1$\n\nแรงระเบิดที่เกิดขึ้นนั้นรุนแรงมากจนไม่เพียงแต่ทำลายดาวเคราะห์ลงเท่านั้น แต่ยังฉีกกระชากโครงสร้างของกาลอวกาศ ก่อให้เกิดสิ่งที่เราเรียกว่า §Y$astral_rift$§! ขึ้นมาด้วย\n\n$astral_planes.6070.desc.common_2$"
 astral_planes.6070.desc.rift: "$astral_planes.6070.desc.common_1$\n\nแรงระเบิดที่เกิดขึ้นรุนแรงมากจนไม่เพียงทำลายล้างดาวเคราะห์ดวงนี้ แต่ส่งผลให้เกิดการก่อตัวของ §Y$astral_rift$§! แห่งใหม่ขึ้นด้วย\n\n$astral_planes.6070.desc.common_2$"

 astral_planes.6075.name: "กู้คืนอาวุธสำเร็จ"
 astral_planes.6075.desc: "เราสามารถสร้างท่อส่งลำเลียงกู้คืนเพื่อความปลอดภัยสำหรับอาวุธที่เก็บสะสมอยู่ใต้พื้นผิวดาวเคราะห์ดวงนี้ ทำให้ยุทโธปกรณ์ที่ยังทำงานอยู่หมดสภาพก่อนที่จะเตรียมเก็บรวบรวมและวิเคราะห์วิจัยต่อไป...\n\nการจัดตั้งอาณานิคมถาวรบนดาวเคราะห์ดวงนี้จะช่วยให้เราใช้ประโยชน์จากคลังแสงที่เหลืออยู่ได้อย่างมีประสิทธิภาพมากขึ้น"

 astral_planes.6076.name: "ค้นพบยุทโธปกรณ์ซิงกูลาริตี"
 astral_planes.6076.desc: "นักวิจัยที่ศึกษาดาว [from.GetName] ได้ค้นพบขีปนาวุธสร้างซิงกูลาริตีที่ได้รับความเสียหายภายในคลังอาวุธที่ถูกทิ้งร้างของดาวเคราะห์ อาวุธนี้ดูเหมือนจะได้รับการออกแบบมาเพื่อสร้างการยุบตัวของแรงโน้มถ่วงที่รุนแรง ซึ่งมีศักยภาพในการฉีกรอยแยกในมิติกาลอวกาศเองเลยด้วยซ้ำ...\n\nน่าเสียดายที่ยุทโธปกรณ์นี้เสียหายเกินกว่าจะซ่อมแซมได้และอยู่นอกเหนือขีดความสามารถของเราในการลอกเลียนแบบ อย่างไรก็ตาม เราอาจสามารถดัดแปลงมันเพื่อใช้ประโยชน์เป็นส่วนหนึ่งของการวิจัยเกี่ยวกับอาวุธระเบิดที่คล้ายคลึงกันของเราได้"
 astral_planes.6076.a: "เข้าใจแล้ว"

 astral_planes.6080.name: "ระเบิดขัดข้อง"
 astral_planes.6080.desc.common_1: "ขณะพยายามสร้างท่อกู้คืนอาวุธที่ถูกทิ้งร้างบนดาว [from.GetName] ยาน [this.GetName] ได้ถูกทำลายลงโดยวัตถุระเบิดที่ทำงานผิดพลาด ทุกคนบนยานสูญหายไปทั้งหมด รวมถึง [leader.GetName] ด้วย...\n\nการระเบิดของยานได้กระตุ้นให้เกิดปฏิกิริยาลูกโซ่ที่รุนแรงขึ้นทั่วทั้งเครือข่ายคลังอาวุธ"
 astral_planes.6080.desc.common_2: "$astral_planes.6070.desc.common_2$"
 astral_planes.6080.desc.no_rift: "$astral_planes.6070.desc.common_1$\n\nผลกระทบปฏิกิริยาที่ตามมานั้นรุนแรงมากจนไม่เพียงทำลายล้างดาวเคราะห์ลงเท่านั้น แต่ยังฉีกกระชากโครงสร้างของกาลอวกาศ ส่งผลให้เกิดการก่อตัวของสิ่งที่เราเรียกว่า §Y$astral_rift$§! ขึ้นมาด้วย\n\n$astral_planes.6070.desc.common_2$"
 astral_planes.6080.desc.rift: "$astral_planes.6070.desc.common_1$\n\nผลกระทบปฏิกิริยาที่ตามมานั้นรุนแรงมากจนไม่เพียงทำลายโลกนี้ลง แต่ยังส่งผลให้เกิดการก่อตัวของ §Y$astral_rift$§! แห่งใหม่ขึ้นมาอีกด้วย\n\n$astral_planes.6070.desc.common_2$"

 astral_planes.6085.name: "ปฏิกิริยาลูกโซ่"
 astral_planes.6085.desc: "การระเบิดตามธรรมชาติแบบฉบับพลันของอาวุธที่ไม่มีความเสถียรบนดาว [from.GetName] ได้สิ้นสุดลงด้วยปฏิกิริยาลูกโซ่ที่ทำให้ดาวเคราะห์ดวงนี้แตกสลายออกเป็นเสี่ยงๆ อย่างสิ้นเชิง...\n\nท่ามกลางเศษซากดวงดาว เราตรวจพบเศษฝุ่นผงผันผวน (§Y$volatile_motes$§!) ในความเข้มข้นที่สูงมาก ทรัพยากรธรรมชาตินี้ต้องเคยเป็นองค์ประกอบหลักของอาวุธที่เก็บซ่อนไว้ใต้พื้นผิวอย่างแน่นอน"

 d_weapon_extraction_facility: "สถานีกู้คืนอาวุธ"
 d_weapon_extraction_facility_desc: "สิ่งปลูกสร้างนี้ประมวลผลอาวุธโบราณจากคลังอาวุธที่หลงเหลือไว้โดยอารยธรรมที่สูญหายไป"

