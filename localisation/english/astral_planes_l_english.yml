 civic_dimensional_worship_desc: "สังคมนี้เชื่อว่าการดำรงอยู่ของสัจธรรมอันศักดิ์สิทธิ์อยู่เหนือรอยพับในอวกาศและเวลา ระบบดาวที่ความไม่เสถียรอยู่ในระดับสูงสุดมีความหมายอันศักดิ์สิทธิ์สำหรับพวกเขาในฐานะที่เป็นทั้งสถานที่แสวงบุญและสถานที่ทำวิจัย"
