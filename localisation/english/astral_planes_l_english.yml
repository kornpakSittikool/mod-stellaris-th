 eternal_throne_conditions: "$MODIFIER$"
 not_allowed_for_luminarium: "$TRIGGER_FAIL$ไม่อนุญาตให้ใช้กับการตั้งค่าตั้งค่าสำหรับ §Y$preset_luminarium$§!"

