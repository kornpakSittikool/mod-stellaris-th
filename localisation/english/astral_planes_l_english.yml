 ##########
 # Traits #
 ##########

 leader_trait_rift_warped: "ร่างบิดเบี้ยวจากรอยแยก"
 leader_trait_rift_warped_desc: "ผู้นำคนนี้ได้ก้าวข้ามระนาบแอสทรัลมาแล้ว ผลกระทบจากการเดินทางดังกล่าวนั้นมีทั้งความคงทนและลึกซึ้งยิ่งนัก"
 leader_trait_partially_digested: "ถูกย่อยบางส่วน"
 leader_trait_partially_digested_desc: "ผู้นำคนนี้เคยมีประสบการณ์ที่ไม่น่าอภิรมย์กับหนอนยักษ์จากต่างมิติ แม้ว่าร่างกายจะไม่สมบูรณ์ครบถ้วนอีกต่อไป แต่พวกเขาก็ได้รับข้อมูลเชิงลึกเฉพาะตัวเกี่ยวกับชีววิทยาระดับโมเลกุลมาทดแทน"
 leader_trait_planar_theorist: "นักทฤษฎีระนาบมิติ"
 leader_trait_planar_theorist_desc: "ผู้นำคนนี้มีความเชี่ยวชาญด้านการศึกษารอยแยกแอสทรัลและพฤติกรรมของมิติต่างๆ ภายนอกมิติของเราเอง"

 leader_trait_spacebender: "ผู้บิดกาลอวกาศ"
 leader_trait_spacebender_desc: "ด้วยความสอดประสานอย่างลึกซึ้งกับช่องว่างระหว่างห้วงอวกาศ ผู้นำคนนี้สามารถเล็ดลอดข้ามกาแล็กซีต่างๆ ได้อย่างง่ายดาย"
 leader_trait_spacebender_effect: "$THIS_LEADER_TXT$:\n$t$ไม่มีค่าบำรุงรักษา"
 leader_trait_energy_weapon_specialist: "ผู้เชี่ยวชาญอาวุธพลังงาน"
 leader_trait_energy_weapon_specialist_desc: "การคำนวณและการเพ่งจุดอย่างแม่นยำเพื่อปรับเทียบอาวุธพลังงานอย่างเหมาะสมนั้นอาจต้องใช้เวลาอย่างมหาศาล แต่ทักษะดังกล่าวถือเป็นเรื่องธรรมดาสำหรับผู้บัญชาการคนนี้"

 trait_plasmic: "พลาสมิก"
 trait_plasmic_desc: "เยื่อหุ้มภายนอกและร่างกายที่ไม่มีรูปทรงแน่นอนของสิ่งมีชีวิตสายพันธุ์นี้ช่วยให้พวกเขสามารถปรับตัวเข้ากับสภาพแวดล้อมใดๆ ก็ได้ และทำให้มีภูมิคุ้มกันต่อโรคภัยไข้เจ็บต่างๆ ได้อย่างหลากหลาย"

 trait_exd: "สิ่งมีชีวิตต่างมิติ"
 trait_exd_desc: "สิ่งมีชีวิตสายพันธุ์นี้มีต้นกำเนิดมาจากอีกมิติหนึ่ง และจำเป็นต้องใช้พลังงานจำนวนมากเพื่อการเอาชีวิตรอดในจักรวาลของเรา"
 TRAIT_EXD_EFFECT: "- ค่าบำรุงรักษา $energy_with_icon$ ต่อหน่วยประชากร $pop_group_unit$ £pop£: §R+$@living_standard_energy_normal|*0$§!\n$t$- ประชากร §Hป๊อป§! ทุกๆ $pop_group_unit$ £pop£ ที่ทำงานในฐานะทาสขึ้นไป จะผลิตงานวิจัยฟิสิกส์ 0.5 £physics_research£ §Yการ วิจัย ทาง ฟิสิกส์§! ต่อเดือน"

 ######################
 # Origin - Riftworld #
 ######################

 origin_riftworld: "ริฟต์เวิลด์ (โลกแห่งรอยแยก)"
 origin_riftworld_desc: "เป็นอารยธรรมที่มีรอยแยกมิติอวกาศและกาลเวลาใกล้ดาวบ้านเกิด ทำให้มีการศึกษาปรากฏการณ์มาอย่างช้านานจนมีเทคโนโลยีที่สามารถใช้สำรวจและค้นหาความลับในรอยแยกเหล่านี้ได้"
 origin_tooltip_riftworld_effects: "- ดาวบ้านเกิด $HOMEWORLD$: ['concept_riftworld_digsite'] ['concept_archaeology_site']$NEW_LINE$- ดาวเคราะห์อาณานิคมในระบบดาวที่มี ['concept_astral_rift',$ASTRAL_RIFTS$]: ['modifier:riftworld_affinity']$NEW_LINE$- โอกาสที่ §Y$ASTRAL_RIFTS$§! จะปรากฏขึ้นในระบบดาวที่คุณควบคุม: §G+100%§!"
 START_SCREEN_RIFTWORLD: "เท่าที่เราจำความได้ รอยแยกอันยิ่งใหญ่(ลมแรงดี)ได้พาดผ่านท้องฟ้าเหนือดาว [GetHomeWorldName] เสมอมา ตำนานกล่าวไว้ว่าอดีตของเรานั้นมีความเชื่อมโยงอย่างใกล้ชิดกับแผลเป็นลึกลับบนท้องฟ้านี้และจุดตกกระทบโบราณที่อยู่ใกล้กับเมืองหลวงของเรา...\n\nหลายชั่วอายุคน จุดตกกระทบนี้ได้รับความเคารพบูชา แต่ผู้คนกลับมีความเข้าใจในตัวมันน้อยมาก อย่างไรก็ตาม กิจกรรมแผ่นดินไหวเมื่อเร็วๆ นี้ได้เปิดเผยความผิดปกติใต้พื้นผิวในปากปล่องภูเขาไฟ ขณะนี้การเตรียมการเพื่อขุดเจาะเข้าไปถึงแกนกลางของมันกำลังดำเนินอยู่ ความคิดเห็นยังคงแตกแยกกันเกี่ยวกับสิ่งที่เราอาจจะค้นพบที่นั่น$START_SCREEN_RIFTWORLD_END$"
 START_SCREEN_RIFTWORLD_MACHINE: "เท่าที่คลังข้อมูลของเราสามารถย้อนกลับไปได้ รอยแยกอันยิ่งใหญ่(ลมแรงดี)ได้พาดผ่านท้องฟ้าเหนือดาว [GetHomeWorldName] เสมอมา นาฬิกาภายในของเราซิงค์กับความถี่ของแผลเป็นลึกลับบนท้องฟ้านี้ และบันทึกยุคแรกๆ ของเราอธิบายถึงจุดตกกระทบโบราณที่อยู่ใกล้กับเมืองหลวงของเรา...\n\nหลายรอบการวนซ้ำก่อนหน้านี้ พื้นที่นี้ถูกปล่อยทิ้งไว้โดยไม่มีความเข้าใจมากนัก อย่างไรก็ตาม กิจกรรมแผ่นดินไหวเมื่อเร็วๆ นี้ได้เผยให้เห็นความผิดปกติใต้พื้นผิวในปากปล่องภูเขาไฟ ขณะนี้การเตรียมการเพื่อขุดเจาะเข้าไปถึงแกนกลางของมันกำลังดำเนินอยู่$START_SCREEN_RIFTWORLD_END$"
 START_SCREEN_RIFTWORLD_END: "\n\nเป็นเรื่องบังเอิญอย่างง่ายๆ หรือไม่ที่เหตุการณ์นี้เกิดขึ้นพร้อมกับการถือกำเนิดของเทคโนโลยีไฮเปอร์ไดรฟ์? ในขณะที่เรากำลังเอื้อมมือไปสู่สรวงสวรรค์ ความสนใจของเรากลับถูกดึงกลับลงมาสู่พื้นดิน บางทีสิ่งที่มีอยู่อยู่ใต้พื้นผิวโลกนี้อาจมีเป้าหมายเพื่อช่วยเหลือเราในการเดินทางสู่หมู่ดาว หรือบางทีมันอาจเตรียมเราให้พร้อมสำหรับสิ่งใดก็ตามที่รออยู่หลังรอยแยกมิติ"

 riftworld_affinity: "ความสอดคล้องแห่งรอยแยก"
 riftworld_affinity_desc: "การพัฒนาสังคมของเราภายใต้อิทธิพลของกองกำลังข้ามมิติช่วยกระตุ้นความกระตือรือร้นในการวิจัยเพิ่มเติม"

 astral_planes.2105.name: "สัญญาณส่งผ่านแปลกประหลาด"
 astral_planes.2105.desc: "ภายหลังการสำรวจรอยแยกแอสทรัล ในระบบดาว §H[From.solar_system.GetName]§! เราได้รับสัญญาณส่งผ่านปริศนาลำหนึ่ง...\n\nเหล่านักวิทยาศาสตร์ [GetScientistPlural] ของเราได้ระบุว่าแหล่งที่มาของมันมาจากฟากตรงข้ามของรอยแยก และสามารถถอดรหัสคำศัพท์ออกมาได้เพียงไม่กี่คำเท่านั้น"

 astral_planes.2110.name: "$astral_planes.2105.name$"
 astral_planes.2110.desc: "...ปรับประสาน... กับระนาบ... เราจะค้นหาคุณ..."

 astral_planes.2120.name: "ตรวจพบความผิดปกติของแผ่นดินไหว"
 astral_planes.2120.desc: "กิจกรรมแผ่นดินไหวเมื่อเร็วๆ นี้ได้เปิดเผยลักษณะที่ไม่คาดคิดของจุดตกกระทบโบราณที่อยู่ใกล้เมืองหลวงของเรา...\n\nปากปล่องภูเขาไฟจำเพาะนี้มีความเชื่อมโยงอย่างใกล้ชิดกับต้นกำเนิดของพวกเราในฐานะ [Owner.GetSpeciesNamePlural]"

 riftworld_digsite: "หลุมอุกกาบาตโบราณ"
 riftworld_digsite_desc: "เราตรวจพบกิจกรรมแผ่นดินไหวที่ผิดปกติจากส่วนลึกในหลุมอุกกาบาตโบราณบนพื้นผิวของ [Planet.GetName] โซนาร์ใต้ดินได้แสดงให้เห็นโพรงอวกาศที่ไม่เคยรู้จักมาก่อน"
 astral_planes.2125.name: "แรงกระทบความเร็วสูง"
 astral_planes.2125.desc: "การขุดค้นเบื้องต้นที่ฐานของหลุมอุกกาบาตเผยให้เห็นแท่งหินอิมแพกไทต์ทรงกระบอกที่ก่อตัวเต็มรูปทรงซึ่งฝังลึกอยู่ใต้พิภพ...\n\nสายแร่นี้ต้องมีจุดกำเนิดมาจากผลกระทบของอุกกาบาตที่มีความเร็วสูงเป็นพิเศษ ผลการคำนวณขั้นต้นแสดงให้เห็นว่าวัตถุดังกล่าวต้องเดินทางมาถึงด้วยความเร็วที่เป็นสัดส่วนวัดได้เมื่อเทียบกับความเร็วแสง เป็นเรื่องน่าอัศจรรย์มากที่มันยังสามารถผ่านเข้ามาถึงพื้นผิวโลกได้"
 astral_planes.2125.a: "ดำเนินการขุดค้นต่อไป"
 astral_planes.2130.name: "ถ้ำใต้พิภพ"
 astral_planes.2130.desc: "ณ จุดสิ้นสุดของสายหินอิมแพกไทต์ เราได้พบระบบถ้ำที่แผ่ขยายกว้างขวาง...\n\nแอ่งน้ำใต้ดินหล่อเลี้ยงพืชพรรณสีซีดจางเป็นแนวยาวไปตามผนังถ้ำ ที่ก้นแอ่งน้ำแห่งหนึ่งมีซากวัตถุทรงกลมที่ผิดปกติจมอยู่ มันไม่ใช่สิ่งที่เกิดขึ้นตามธรรมชาติ และดูเหมือนว่าจะเป็นต้นตอของจุดตกกระทบแห่งนี้"
 astral_planes.2130.a: "กู้คืนวัตถุดังกล่าว"
 astral_planes.2135.name: "ทรงกลมโบราณ"
 astral_planes.2135.desc: "เราได้เก็บกู้ทรงกลมนั้นขึ้นมาจากทะเลสาบใต้ดินแล้ว...\n\nแม้ว่าจะปกคลุมไปด้วยวัชพืช แต่ส่วนใหญ่ยังคงอยู่ในสภาพที่สมบูรณ์ โครงสร้างการสร้างของมันเป็นการผสมผสานอย่างประหลาดระหว่างการออกแบบที่ซับซ้อนอย่างสูงกับการประกอบที่หยาบ แผ่นโลหะที่เรียบเนียนสนิทปกคลุมส่วนหน้าของยาน ซึ่งน่าจะช่วยลดแรงเสียดทานได้อย่างมีนัยสำคัญเมื่อเข้าสู่ชั้นบรรยากาศ\n\nเส้นทางวิถีการตกของจุดที่มันนอนนิ่งอยู่นั้นสอดรับกับแนวสายหินอิมแพกไทต์ ซึ่งยืนยันว่าทรงกลมนี้คือแหล่งที่มาของหินแปรสภาพที่นำเรามายังที่นี่ ยิ่งไปกว่านั้น ยังมีร่องรอยที่บ่งชี้ว่ายานลำนี้เคยมีผู้โดยสารเดินทางมาด้วย"
 astral_planes.2140.name: "บรรพบุรุษ"
 astral_planes.2140.desc.common: "เราได้กู้คืนคลังเอกสารจากภายในทรงกลมโบราณ ซึ่งแต่ละฉบับเขียนด้วยภาษาของเราในเวอร์ชันโบราณ หลายฉบับอ้างถึงชื่อที่เกี่ยวข้องกับตำนานอันศักดิ์สิทธิ์ที่สุดของเรา...\n\nเครือข่ายบันไดที่ซับซ้อนเลื้อยขึ้นไปจากจุดตกกระทบสู่ระบบอุโมงค์ขนาดใหญ่ จากข้อมูลอายุที่แตกต่างกันของเส้นใยเชือก ถ้ำเหล่านี้ต้องเคยมีผู้คนอาศัยอยู่หลายชั่วอายุคนในขณะที่ผู้รอดชีวิตจากยานตกพยายามดิ้นรนขึ้นสู่พื้นผิว\n\nอย่างไรก็ตาม ไม่มีสิ่งใดที่เราค้นพบก่อนหน้านี้จะเตรียมเราให้พร้อมสำหรับความจริงขั้นสุดท้ายได้: หนึ่งในห้องชั้นบนสุดมีสุสานฝังศพอยู่ ผลการตรวจวิเคราะห์ดีเอ็นเอที่ดำเนินการกับซากโครงกระดูกภายในเผยให้เห็นความจริงที่น่าตกใจ: คนเหล่านี้คือบรรพบุรุษของเรา\n\nพวกเขามาจากที่ใดกันแน่ หรือทำไมสถานที่แห่งนี้จึงถูกลืมเลือนไปนั้นยังไม่มีใครทราบ เอกสารที่เก็บกู้มาได้อยู่ในสภาพที่เสียหายหนักมาก แต่เราได้กู้คืนบันทึกข้อมูลดั้งเดิมจากทรงกลม มันแสดงให้เห็นอย่างชัดเจนว่ายานลำนี้เดินทางมาถึงระบบดาวของเราโดยผ่านทางรอยแยกแอสทรัล ที่อยู่ใกล้กับ [from.planet.GetName]"
 astral_planes.2140.desc.has_rift_sphere: "$astral_planes.2140.desc.common$\n\nแม้ว่าจะล้าสมัยกว่าเทคโนโลยีของเราในปัจจุบันอย่างเห็นได้ชัด แต่ทรงกลมนี้เป็นข้อพิสูจน์ถึงความสิ้นหวังและความเฉลียวฉลาดของผู้สร้าง นี่คือความพยายามครั้งสุดท้ายในการหลบหนีจากสิ่งที่เป็นโชคชะตาอันโหดร้ายในอีกฟากหนึ่งของรอยแยกมิติ"
 astral_planes.2140.desc.default: "$astral_planes.2140.desc.common$\n\nหากผ่านการศึกษา ค้นคว้าเพิ่มเติม เราน่าจะสามารถเลียนแบบและพัฒนาต่อยอดเทคโนโลยีที่จำเป็นในการสร้างยานที่มีขีดความสามารถในการข้ามมิติเช่นนี้ได้"
 astral_planes.2140.desc.machine.common: "เราได้เก็บกู้คลังข้อมูลดิจิทัลจากภายในทรงกลมโบราณ ซึ่งได้รับการเข้ารหัสในระบบไฟล์รุ่นเก่าดั้งเดิมของเรา...\n\nเครือข่ายบันไดที่ซับซ้อนเลื้อยขึ้นไปจากจุดตกกระทบสู่ระบบอุโมงค์ขนาดใหญ่ จากข้อมูลอายุที่แตกต่างกันของเส้นใยเชือก ถ้ำเหล่านี้ต้องเคยมีผู้รอดชีวิตพำนักอยู่หลายรอบการทำงานในขณะที่ผู้รอดจากยานตกพยายามดิ้นรนขึ้นสู่พื้นผิว\n\nหนึ่งในพื้นที่ด้านบนประกอบด้วยชิ้นส่วนที่ทำให้นึกถึงส่วนที่ใช้โดยโมเดลยุคแรกๆ ของเรา ผู้รอดชีวิตเหล่านี้คือผู้สร้างรุ่นก่อนของเรา\n\nพวกเขามาจากที่ใดกันแน่ หรือทำไมตำแหน่งนี้จึงสูญหายไปนั้นยังคงไม่มีผู้ใดทราบ บันทึกข้อมูลดั้งเดิมที่เรากู้มาจากทรงกลมแสดงให้เห็นอย่างชัดเจนว่ายานลำนี้เดินทางมาถึงระบบดาวของเราโดยผ่านทางรอยแยกแอสทรัล ที่อยู่ใกล้กับ [from.planet.GetName]"
 astral_planes.2140.desc.machine.has_rift_sphere: "$astral_planes.2140.desc.machine.common$\n\nแม้ว่าจะล้าสมัยกว่าเทคโนโลยีของเราในปัจจุบันอย่างเห็นได้ชัด แต่ทรงกลมนี้เป็นข้อพิสูจน์ถึงความสิ้นหวังและความเฉลียวฉลาดของผู้สร้าง นี่คือความพยายามครั้งสุดท้ายในการหลบหนีจากสิ่งที่เป็นโชคชะตาอันโหดร้ายในอีกฟากหนึ่งของรอยแยกมิติ"
 astral_planes.2140.desc.machine: "$astral_planes.2140.desc.machine.common$\n\nหากผ่านการศึกษา ค้นคว้าเพิ่มเติม เราน่าจะสามารถเลียนแบบและพัฒนาต่อยอดเทคโนโลยีที่จำเป็นในการสร้างยานที่มีขีดความสามารถในการข้ามมิติเช่นนี้ได้"
 astral_planes.2140.a: "เราได้พบสถานที่เกิดของเราแล้ว"
 astral_planes.2140.a.synthetic: "เราได้พบเบ้าหลอมกำเนิดของเราแล้ว"

