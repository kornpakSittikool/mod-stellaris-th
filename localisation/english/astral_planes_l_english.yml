 START_SCREEN_RIFTWORLD_NOMADS: "ตราบ เท่า ที่ เรา จํา ได้ ว่า เรือ ไรต์ ใหญ่ อยู่ ตรง หน้า เรา ใน ที่ ว่าง เปล่า ซึ่ง อยู่ เหนือ ขอบ เขต ของ การ เดิน ทาง ของ เรา เป็น ที่ รู้ จัก คุ้น เคย พอ ๆ กับ ที่ เรา ไม่ รู้ จัก. ตํานานเสนอว่าอดีตของเรา ถูกผูกพันธ์อย่างแนบแน่นด้วย รอยแผลเป็นสวรรค์อันลึกลับนี้\n\nเป็น เวลา หลาย ชั่ว อายุ สถาน ที่ แห่ง นี้ ได้ รับ การ ยกย่อง แต่ ก็ เข้าใจ ยาก. อย่างไรก็ตาม ระบบหลักของเรือได้ดึงดูดความสนใจไปยังห้องที่ถูกผนึกไว้ การเตรียมการกําลังดําเนินการอยู่ ความ เห็น ที่ แตก ต่าง กัน ใน เรื่อง ที่ เรา อาจ พบ เห็น ที่ นั่น.\n\nมันเป็นเรื่องบังเอิญที่มันเกิดขึ้น ที่เกิดเทคโนโลยีไฮเปอร์ไดรฟ์หรือเปล่า เมื่อ เรา ไป ถึง ดาว ต่าง ๆ ความ สนใจ ของ เรา จะ ถูก ดึง กลับ มา ยัง เรือ ของ เรา เอง. บาง ที สิ่ง ที่ ถูก ปิด ผนึก ไว้ ภาย ใน เรือ ของ เรา อาจ หมาย ถึง เพื่อ ช่วย เรา เดิน ทาง. บางทีมันอาจจะเตรียมเราสําหรับอะไรก็ตาม ที่อยู่นอกเหนือเส้นรุ้ง"
