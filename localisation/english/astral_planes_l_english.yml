 astral_planes.100.name: "$situation_a_rift_in_space$"
 astral_planes.100.desc.split: "รอยแผลเป็นทางมิติในระบบดาว [From.solar_system.GetName] ขาดความเสถียร ส่งผลให้เกิดรอยแยกมิติไปสู่สถานที่และเวลาอื่น...\n\nเราควรเข้าหาด้วยความระมัดระวัง"
 astral_planes.100.desc.default: "เราค้นพบรอยแยกในอวกาศและกาลเวลาที่พิเศษสุดในระบบดาว [from.solar_system.GetName] บางทีหากเราใช้เวลาศึกษาคุณสมบัติของมัน เราอาจจะหาวิธีสำรวจเพิ่มเติมได้"
 astral_planes.100.a: "เหลือเชื่อจริงๆ"
 astral_planes.101.name: "การยื่นมือเข้าสู่รอยแยก"
 astral_planes.101.desc: "ในที่สุดผู้คนของเราก็เอื้อมมือไปได้ไกลพอที่จะสัมผัสรอยแผลเป็นบนท้องฟ้าของเราได้แล้ว...\n\nบางทีหากเราใช้เวลาศึกษาคุณสมบัติของมัน เราอาจพบวิธีที่จะสำรวจมันให้ลึกขึ้น เราไม่มีทางรู้เลยว่าอาจมีอะไรอยู่บนอีกฟากหนึ่ง"
 astral_planes.101.a: "เราได้ทำในสิ่งที่บรรพบุรุษของเราไม่สามารถทำได้แล้ว"
 astral_planes.110.name: "ปฏิบัติการแอสทรัล"
 astral_planes.110.desc: "เราได้ปลดล็อกความลับในการเก็บรวบรวมและกักเก็บเส้นใยวัตถุแอสทรัลที่ผันผวน ซึ่งก่อตัวเป็นแนวเขตแดนของจักรวาลนี้...\n\nทรัพยากรล้ำค่าและหายากนี้สามารถนำไปใช้ในทางต่างๆ ที่จะให้ประโยชน์แก่เราอย่างมหาศาล"
 astral_planes.120.name: "$situation_a_rift_in_space$"
 astral_planes.120.desc: "เราสูญเสียการควบคุมระบบดาว [FromFrom.GetName] รวมถึงรอยแยกแห่งมิติอวกาศและเวลาที่อยู่ภายในนั้นไปแล้ว...\n\nความพยายามของเราในการเอื้อมออกไปข้างนอกนั้นต้องถูกละทิ้งไปก่อนในตอนนี้"

 approach_situation_speed_tooltip: "\nแนวทางปฏิบัติการนี้จะช่วยเร่งความเร็วในการวิจัยของเราได้อย่างมหาศาล"

 situation_a_rift_in_space: "รอยแยกในมิติอวกาศ"
 situation_a_rift_in_space_riftworld: "การยื่นมือเข้าสู่รอยแยก"
 situation_a_rift_in_space_type: "$situation_a_rift_in_space$"
 situation_a_rift_in_space_riftworld_type: "$situation_a_rift_in_space_riftworld$"
 situation_a_rift_in_space_monthly_change_tooltip: "$situation_monthly_change_tooltip_approaches_dependent$"
 situation_a_rift_in_space_desc: "เราค้นพบรอยแยกในอวกาศและกาลเวลาที่พิเศษสุด บางทีหากเราใช้เวลาศึกษาคุณสมบัติของมัน เราอาจจะหาวิธีสำรวจเพิ่มเติมได้ เราไม่มีทางรู้เลยว่าอาจมีอะไรอยู่บนอีกฟากหนึ่ง"
 situation_a_rift_in_space_desc_riftworld_origin: "ในที่สุดผู้คนของเราก็เอื้อมมือไปได้ไกลพอที่จะสัมผัสรอยแผลเป็นบนท้องฟ้าของเราได้แล้ว...\n\nบางทีหากเราใช้เวลาศึกษาคุณสมบัติของมัน เราอาจพบวิธีที่จะสำรวจมันให้ลึกขึ้น เราไม่มีทางรู้เลยว่าอาจมีอะไรอยู่บนอีกฟากหนึ่ง"
 situation_a_rift_in_space_standard: "ศึกษาอย่างสงบ"
 approach_situation_a_rift_in_space_standard_tt: "เราไม่อยู่ในสถานะที่จะใช้ทรัพยากรล้ำค่าเหล่านั้นได้ ให้เราสังเกตการณ์ปรากฏการณ์นี้จากระยะไกลดีกว่า"
 situation_a_rift_in_space_devote_research: "ทุ่มเทการวิจัย"
 approach_situation_a_rift_in_space_devote_research_tt: "เราสามารถอุทิศการค้นคว้าวิจัยจำนวนมากจากนักวิทยาศาสตร์ของเราเพื่อปลดล็อกความลับของรอยแยกในอวกาศและเวลานี้ได้"
 situation_a_rift_in_space_send_probes: "ส่งยานสำรวจ"
 approach_situation_a_rift_in_space_send_probes_tt: "ยานสำรวจแต่ละลำที่เราส่งเข้าไปในรอยแยกจะช่วยเพิ่มความเข้าใจในการทะลวงผ่านขอบเขตของมัน เราสามารถอุทิศการผลิตแร่โลหะผสม(อัลลอย)ส่วนหนึ่งเพื่อจุดประสงค์นี้ได้"
 situation_a_rift_in_space_finisher_effect: "ปลดล็อกเทคโนโลยี §Y$tech_rift_sphere$§!"
 NAME_Astral_Entity: "Astral Entity"
 NAME_Planet_Rift_In_Space: "Astral Planet"

 astral_rift_discovery_event_title: "กาลอวกาศที่ไม่เสถียร"
 astral_rift_discovery_event_text: "ในระหว่างการศึกษารอยแยกแอสทรัล ในระบบดาว §Y[target.solar_system.GetName]§! เราได้ทำลายความเสถียรของความผิดปกติทางมิติไปโดยไม่เจตนา สิ่งนี้กำลังก่อให้เกิดการบิดเบือนอย่างรุนแรงในอวกาศและเวลา ซึ่งส่งผลให้ความเป็นจริงที่อยู่ใกล้เคียงบิดเบี้ยวไปในทางที่คาดเดาไม่ได้"
 astral_situation.55.name: "$astral_rift_discovery_event_title$"
 astral_situation.55.desc: "$astral_rift_discovery_event_text$\n\nดาวเคราะห์ปริศนาซึ่งเราตั้งชื่อว่า §Y[planet_rift_in_space.GetName]§! ได้ปรากฏขึ้นในจุดที่เคยว่างเปล่ามาก่อน เราไม่มีการบันทึกประวัติการมีอยู่ของมันบนแผนที่ดาราศาสตร์ใดๆ ของเราเลย\n\nดาวดวงนี้มีอารยธรรม [GetPreFTLLower] อาศัยอยู่\n\nการคาดเดาที่ดีที่สุดของเราคือมันอาจจะเดินทางมาจากภายนอกจักรวาลของเราด้วยวิธีบางอย่าง"
 astral_situation.60.name: "$astral_rift_discovery_event_title$"
 astral_situation.60.desc: "$astral_rift_discovery_event_text$\n\nสายพันธุ์มีสติปัญญาใหม่ได้ปรากฏตัวขึ้นบน §Y[rift_temporary_species_planet.GetName]§! โดยกระจัดกระจายไปตามประชากรเดิมของเราอย่างเท่าๆ กัน\n\nชาว [rift_temporary_species.GetName] ไม่มีความทรงจำว่าพวกเขามาจากไหนและดูเหมือนว่าจะไม่เป็นมิตรต่อเรา\n\nไม่ว่าจุดกำเนิดของพวกเขาจะเป็นที่ใด ก็เป็นไปได้ยากที่เราจะช่วยเหลือให้พวกเขากลับคืนสู่ที่เดิมได้"
 astral_situation.65.name: "$astral_rift_discovery_event_title$"
 astral_situation.65.desc: "$astral_rift_discovery_event_text$\n\nการบิดเบือนของเวลาอย่างมีนัยสำคัญบน §Y[rift_temporary_planet.GetName]§! กำลังส่งผลให้เวลาผ่านไปรวดเร็วกว่าปกติถึงสองเท่า เราควรเฝ้าระวังสถานการณ์อย่างใกล้ชิดและตรวจสอบให้แน่ใจว่าได้ส่งเสบียงให้พวกเขาเพิ่มเป็นสองเท่าแล้ว"

 rift_in_space_time_acceleration_modifier: "การบิดเบือนของเวลา"
 rift_in_space_time_acceleration_modifier_desc: "เวลาในโลกนี้ไหลผ่านไปรวดเร็วกว่าปกติสองเท่า"

 astral_situation.20.name: "แรงเสียดทานคือปัญหาหลัก"
 astral_situation.20.desc: "เราค้นพบว่าการจะผ่านช่องพับในอวกาศและเวลาได้นั้นต้องอาศัยยานพาหนะที่มีพื้นผิวเรียบเนียนอย่างสมบูรณ์แบบ\n\nเรามั่นใจว่าเราจะสามารถพัฒนาอุปกรณ์ดังกล่าวได้ ซึ่งเราอาจจะตั้งชื่อมันชั่วคราวว่า "§Y$tech_rift_sphere$§!" หากเราทุ่มเทการวิจัยและเวลามากพอ เมื่อนั้นเราก็จะได้ค้นพบว่ามีอะไรอยู่เหนือความผิดปกติของห้วงอวกาศนี้เสียที"

 astral_planes.2005.name: "พัฒนาเทคโนโลยี $tech_rift_sphere$ สำเร็จแล้ว"
 astral_planes.2005.desc: "เราได้พัฒนาเทคโนโลยีที่ช่วยให้เราเล็ดลอดผ่านช่องพับของรอยแยกแอสทรัล ได้แล้ว นั่นคือ §Y$tech_rift_sphere_plural$§!\n\nด้วยการสร้างขึ้นจากวัสดุนาโนขั้นสูงที่เรียบเนียนอย่างไร้ที่ติ ยานทรงกลมนี้สามารถแล่นผ่านบริเวณที่ปั่นป่วนของอวกาศและเวลาได้อย่างไร้แรงเสียดทาน\n\nเนื่องจากเราไม่แน่ใจว่าจะไปโผล่ที่ใด ยาน §Y$tech_rift_sphere$§! แต่ละลำจึงติดตั้งเคเบิลยึดเหนี่ยวเพื่อดึงเรากลับมาในกรณีฉุกเฉิน โดยเคเบิลนี้จะผูกโยงไว้กับยานวิทยาศาสตร์ในจักรวาลของเรา"
 astral_planes.2005.a: "มาดูกันดีกว่าว่าเราจะพบอะไร..."

 ASTRAL_RIFT_IN_SYSTEM: "ระบบดาวนี้ประกอบด้วยรอยแยกแอสทรัล อย่างน้อยหนึ่งแห่ง"
 CRYSTAL_RIFT_IN_SYSTEM: "ระบบดาวนี้ประกอบด้วย §Yเส้นทแยง§! ที่ไม่เหมือนใครและผิดปกติ"

 tech_rift_sphere: "ทรงกลมริฟ"
 tech_rift_sphere_plural: "ทรงกลมริฟ"
 tech_rift_sphere_desc: "ดูเหมือนว่าอวกาศและเวลาจะรวมตัวกันเป็นชั้นๆ ซ้อนทับกันอยู่ เคล็ดลับก็คือจะเล็ดลอดผ่านรอยพับเหล่านั้นได้อย่างไร"

 tech_astral_harvesting: "การเก็บเกี่ยวเส้นใยแอสทรอล"
 tech_astral_harvesting_desc: "การเก็บเกี่ยวเศษซากแอสทรัลที่ฉีกขาดตามรอยแผลของรอยแยกในอวกาศและเวลานั้นเป็นไปได้ด้วยการดัดแปลงอุปกรณ์อย่างละเอียดอ่อนที่สถานีวิจัยของเรา"

