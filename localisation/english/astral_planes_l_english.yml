 job_astral_unit_desc: "เส้นใยแห่งกาลอวกาศเก็บซ่อนความลับของทุกๆ มิติ รวมถึงมิติของเราเอง หน่วยทำงานเหล่านี้พยายามถอดรหัสเพื่อหาความสำคัญของพวกมันในขณะที่พยายามหลีกเลี่ยงการเกิดปฏิทรรศน์ดวงดาว(สเปน)ให้จงได้ในทุกกรณี"
