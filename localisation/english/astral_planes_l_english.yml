 STRANGE_WORMHOLE_DESC: "ระบบดาวนี้ประกอบด้วย §Y$STRANGE_WORMHOLE$§! เชื่อมต่ออยู่กับระบบดาว $DEST|Y$"
 STRANGE_WORMHOLE_DESC_UNEXPLORED: "ระบบดาวนี้ประกอบด้วย §Y$STRANGE_WORMHOLE$§! ที่§Rยังไม่ได้สำรวจ§!"
 STRANGE_WORMHOLE_ACCESS_DENIED: "$TRIGGER_FAIL$§Rมีพลังภายนอกบางอย่างที่ขัดขวางการเดินทางเข้าสู่ภายในของเรา§!"
 BYPASS_STRANGE_WORMHOLE: "$STRANGE_WORMHOLE$"
 BYPASS_NAME_STRANGE_WORMHOLE: "$SYSTEM$ $STRANGE_WORMHOLE$"
 BYPASS_DESC_STRANGE_WORMHOLE: "เราไม่เคยพบรูหนอนลักษณะนี้มาก่อน"
 BYPASS_DESC_UNKNOWN_STRANGE_WORMHOLE: "$BYPASS_DESC_STRANGE_WORMHOLE$"
 ENTRY_BYPASS_STARLIT_STRANGE_WORMHOLE: "$BYPASS_TYPE$"
 EXIT_BYPASS_STARLIT_STRANGE_WORMHOLE: "$BYPASS_TYPE$"

 astral_planes.45.name: "$STRANGE_WORMHOLE$"
 astral_planes.45.desc.event_chain_owner: "รูหนอนที่ผิดปกติได้ปรากฏตัวขึ้นใกล้กับ §Hเส้นทแยง§! ในระบบดาว §H[From.GetName]§!...\n\nเราคาดเดาได้เพียงว่านี่เป็นประตูมิติที่เปิดขึ้นโดยกลุ่มไร้รูปทรง(ไร้จุดหมาย)เพื่อนำกำลังเสริมมาช่วยเหลือพวกเขา เราตรวจพบระบบดาวในอีกฟากหนึ่งซึ่งถูกดึงเข้าสู่มิติของเราจากสถานที่อื่น...\n\nเราควรเตรียมกองยานที่แข็งแกร่งที่สุดหากเลือกจะเข้าไปในสถานที่แห่งนี้"
 astral_planes.45.desc.locked: "เราค้นพบรูหนอนที่ผิดปกติ ไม่ว่ายานของเราจะพยายามเข้าใกล้เพียงใดก็ตาม เรากำลังถูกขับไล่โดยพลังงานที่ไม่รู้จัก มีบางสิ่งที่แปลกประหลาดมากกำลังเกิดขึ้นในระบบดาว §H[From.GetName]§!"
 astral_planes.45.desc.unlocked: "เราค้นพบรูหนอนที่ผิดปกติในระบบดาว §H[From.GetName]§! เซ็นเซอร์ตรวจจับได้ว่ามันเป็นเส้นทางเดินตรงไปยังศูนย์กลางของกาแล็กซี เป็นไปได้อย่างไรกัน?"

 astral_planes.50.name: "$STRANGE_WORMHOLE$"
 astral_planes.50.desc: "รูหนอนที่ผิดปกติซึ่งเราค้นพบในระบบดาว §H[crystal_sphere_system.GetName]§! กำลังผันผวนอย่างรุนแรง เซ็นเซอร์ตรวจจับได้ว่ามันเป็นเส้นทางเดินตรงไปยังศูนย์กลางของกาแล็กซี...\n\nเป็นไปได้อย่างไรกัน?"

 astral_planes.3000: "เราอยู่ที่ไหนกัน?"
 astral_planes.3000.desc: "อีกฝั่งของรูหนอนนี้ดูเหมือนจะพาเรามายัง... จุดศูนย์กลางของกาแล็กซีรึ?\n\nไม่น่าจะเป็นไปได้ที่เราจะสามารถดำรงอยู่ได้ที่นี่ นับประสาอะไรกับระบบดาวทั้งระบบ หรือบางทีอาจมีการควบคุมจัดการเรื่องมิติเกิดขึ้นอยู่กันแน่?\n\nเรามีเวลาวิเคราะห์ค่อนข้างน้อย เนื่องจากขณะนี้กำลังได้รับสัญญาณส่งผ่านจากเอนทิตีที่ไม่รู้จัก"

 astral_planes.3005.desc: "นี่มันอะไรกัน... เจ้าพาไอ้คนโง่หน้าไหนมาช่วยเจ้ากัน ชาดากอน? หรือว่า... เจ้าเสนออาหารให้กับพวกเรากันแน่..."
 astral_planes.3005.a: "เราโดนล่อลวงมาเป็นเหยื่ออย่างนั้นรึ?"

 astral_planes.3015: "ผู้ส่งสาร"
 astral_planes.3015.desc: "กองยานของเราสามารถเอาชนะยานแปลกประหลาดที่คอยคุ้มกันรอยแยกนี้ได้แล้ว แต่ดูเหมือนพวกมันจะไม่ได้อยู่เพียงลำพัง...\n\nเราได้รับสัญญาณส่งผ่านจากสิ่งมีชีวิตที่อาศัยอยู่ในโครงสร้างใกล้กับดาวเคราะห์เดี่ยวในระบบดาวนี้"

 astral_planes.3020.desc: "พวกมันกำลังมาเพิ่มอีก... เราต้องปิดผนึกรอยแยกนี้... พวกเราคือผู้ที่เหลือรอดทั้งหมด..."
 astral_planes.3020.a: "พวกมันกำลังมาเพิ่มอีกรึ?"

 astral_planes.3050.desc: "พวกเราคือสิ่งสุดท้ายที่หลงเหลืออยู่... เราต้องบูรณะใหม่... เราต้องการเวลา..."
 astral_planes.3050.a: "พวกท่านจะสามารถใช้ประโยชน์จาก §Yสิ่งนี้§! ได้หรือไม่?"
 astral_planes.3050.a.tt: "หากเราส่งมอบเส้นใยแอสทรัลจำนวนมาก สิ่งมีชีวิตเหล่านี้ย่อมสามารถปรับปรุงการป้องกันของพวกเขาได้อย่างแน่นอน"
 number_formless_fleet_max_reached: "กลุ่มไร้รูปทรงไม่มีกองยานหลงเหลืออยู่แล้ว"
 astral_planes.3050.b: "ช่างมันเถอะ"

 astral_planes.3070.desc: "ในที่สุด... การสละราชย์... โซ่ตรวนของพวกเราได้ถูกทำลายลงแล้ว... จงเป็นพยานการยอมรับความรุ่งโรจน์ของเรา... เราจะค้นหาสิ่งที่พวกเขาซ่อนมันไว้..."
 astral_planes.3070.a: "พวกเราต้องไปจากที่นี่แล้ว"
 astral_planes.3070.a.tt: "สิ่งมีชีวิตที่รู้จักกันในนามกลุ่มไร้รูปทรง(ไร้จุดหมาย)ถูกทำลายลงโดยผู้บุกรุกจากต่างมิติ ประตูมิติเข้าสู่ระบบดาว $NAME_Formless_System$ ถูกปิดผนึกแน่นหนาลงแล้ว"

 astral_planes.3100.desc: "§Hร่างของเอนทิตีนี้อยู่ในสถานะแปรปรวนอย่างต่อเนื่อง โดยสลับไปมาระหว่างความจริงนี้กับความจริงมิติอื่น เสียงของพวกเขาก้องสะท้อนในรูปแบบของเสียงประสานราวกับกำลังพูดในนามของสิ่งมีชีวิตหลายตนพร้อมๆ กัน§!\n\n...เสร็จสิ้นแล้ว... ตราประทับได้รับการตั้งขึ้น... ลูกหลานของเราจะไม่มีวันค้นพบสถานที่แห่งนี้อีกเป็นแน่..."
 astral_planes.3100.a: "พวกท่านคือตัวอะไรกันแน่?"
 astral_planes.3100.a.desc: "เจ้ารู้จักพวกเรา... เราอยู่เหนือรอยแยก... และเป็นส่วนหนึ่งของรอยแยก... เจ้าได้เห็นมันแล้ว..."
 astral_planes.3100.b: "เหตุใดพวกท่านถึงมาอยู่ที่นี่?"
 astral_planes.3100.b.desc: "ลูกหลานของเรา... ลูกหลานผู้แตกสลาย... ตามล่าพวกเรา... พวกเขาแสวงหาบัลลังก์... เราซ่อนมันไว้..."
 astral_planes.3100.c: ""บัลลังก์" ที่พูดถึงนี้คืออะไร?"
 astral_planes.3100.c.desc: "ความคงอยู่ชั่วนิรันดร์ของเรา... ความทรงจำของเรา... หากเราคือหยาดโลหิต... มันก็คือหัวใจ... ปลอดภัยแล้วในตอนนี้... เราขอขอบคุณเจ้า..."
 astral_planes.3100.d: "§Yจงรับใช้ภายใต้การปกครองของเรา แล้วพวกท่านอาจจะมีชีวิตรอดต่อไปได้§!"
 formless_subjugation_path_success_tt: "§Y$NAME_Formless$§! จะกลายเป็นประเทศราชภายใต้การปกครองของ §Y[This.GetName]§! ในฐานะ §Y$preset_luminarium$§!"
 astral_planes.3100.e: "§Rจงส่งมอบ "บัลลังก์" ที่ท่านกำลังพูดถึงให้แก่เราเสีย§!"
 astral_planes.3100.f: "เรามาร่วมมือกันเถอะ"
 astral_planes.3101.desc: "สิ่งนี้ได้รับการทำนายไว้แล้ว... เราจะรับใช้เจ้า... นี่คือชะตากรรมของเรา..."
 astral_planes.3102.desc.fail: "เราได้ประเมินเจ้าผิดไป... ความเศร้าโศกอันยิ่งใหญ่... ขอให้มันดำเนินไป..."
 astral_planes.3102.desc: "บัลลังก์นิรันดร์... ไม่ใช่สิ่งที่จะยกให้เจ้าเอาไปได้ง่ายๆ...\n$astral_planes.3102.desc.fail$"
 astral_planes.3102.a: "ก็ย่อมได้"

 astral_planes.3110.desc: "ความกตัญญู... ความปลอดภัย... รางวัล..."
 astral_planes.3110.a: "เราต้องการ §Yพลังอำนาจ§! ของพวกท่าน"
 astral_planes.3110.a.tt: "มอบกองยานกลุ่มไร้รูปทรงให้อยู่ภายใต้การควบคุมของคุณ"
 astral_planes.3110.b: "เราต้องการ §Yองค์ความรู้§! ของพวกท่าน"
 astral_planes.3110.b.tt: "มอบเทคโนโลยีฟิสิกส์แบบสุ่มหนึ่งเทคโนโลยี"
 astral_planes.3110.c: "เราต้องการ §Yเส้นใย§! ของพวกท่าน"
 astral_planes.3110.d: "พวกท่านส่งใครมาให้เรา?"
 astral_planes.3110.d.desc: "§Y$NAME_Formless_leader$§!... สถาปนิกผู้สร้างบัลลังก์นิรันดร์...\n\nผู้นั้นนั่นเองที่ใช้เวลาเป็นพันปีในการสร้างสรรค์มันขึ้นมา...\n\nอุปกรณ์ที่จะหลอมรวมพวกเราเข้าด้วยกัน... อย่างบอบบางและชั่วนิรันดร์...\n\nผู้นั้นเหมาะสมที่สุดที่จะรับใช้เจ้า...\n\nไม่มีผู้ใดหลงเหลือที่ชาญฉลาดไปกว่านี้อีกแล้ว..."
 astral_planes.3110.e: "\"ผู้ไม่ได้รับเชิญ\" (ผู้ไม่เปิดเผย)คือใคร?"
 astral_planes.3110.f: "\"ผู้ผิดเพี้ยน\"(The Aberrant)คือใคร?"
 astral_planes.3110.g: "\"ผู้เกรี้ยวกราด\" (เครื่องปรุง)คือใคร?"
 astral_planes.3110.h: "§Y$NAME_Formless_leader$§! ล้มลงแล้ว"
 astral_planes.3110.h.desc: "เสียใจ...\n\nแต่ได้เห็นไว้แล้ว...\n\nโชคชะตา...\n\nอย่าได้โศกเศร้า..."

 astral_planes.3114.desc.unbidden: "ชาบานาช... พี่น้องร่วมสายโลหิตผู้แตกสลาย... หิวโหยอยู่เสมอ...\n\nความโลภของเรา... ถูกขยายใหญ่ขึ้น...\n\nบาปกรรมถูกเผยออกสู่แสงสว่าง...\n\nความอัปยศครั้งใหญ่..."
 astral_planes.3114.desc.aberrant: "ดากาอัล... ไร้สติ... เปี่ยมด้วยความโกรธเกรี้ยว...\n\nความพิโรธของเรา... ปรากฏชัดเจน...\n\nความขัดแย้งของพวกเขาไม่มีวันสิ้นสุด..."
 astral_planes.3114.desc.vehement: "ออนไซ... ผู้แสวงหาบัลลังก์...\n\nความริษยาอันยิ่งใหญ่...\n\nแนวคิดของเราที่ถูกลืมเลือนไป..."
 astral_planes.3114.a: "พวกเขามีจุดอ่อนหรือไม่?"
 astral_planes.3114.b: "เราอยากจะถามเรื่องอื่นเพิ่มเติม"

 astral_planes.3115.desc.common: "เรารู้วิธีการอยู่... มันเป็นเรื่องของ... คลื่นความถี่...?\n\nภาษาของเจ้าไม่มีคำศัพท์สำหรับสิ่งนี้...\n\nเราต้องการ... วัตถุธาตุแอสทรัล..."
 astral_planes.3115.desc.unbidden: "ความโลภของพวกเขาคือความพินาศของตนเอง...\n\n$astral_planes.3115.desc.common$"
 astral_planes.3115.desc.aberrant: "ความพิโรธของพวกเขานั้นไร้เป้าหมาย...\n\n$astral_planes.3115.desc.common$"
 astral_planes.3115.desc.vehement: "ความปรารถนาของพวกเขาคือความเขลา...\n\n$astral_planes.3115.desc.common$"
 astral_planes.3115.a: "เราสามารถจัดหาให้ได้"

 astral_planes.3116.desc: "เสร็จสิ้นแล้ว... การปรับประสานของเจ้าสมบูรณ์แล้ว..."

 secret_of_the_unbidden_modifier: "ความลับของผู้ไม่ได้รับเชิญ(ความลับของ Unbids)"
 pacification_of_the_aberrant_modifier: "การปราบผู้ผิดเพี้ยนให้สงบ(เสียงเครื่องราชอิสริยาภรณ์)"
 folly_of_the_vehement_modifier: "ความเขลาของผู้เกรี้ยวกราด (Folly of the Vehement)"

 astral_planes.3121.desc: "§Y$NAME_Formless_leader$§! แห่งชาดากอน... เจ้ามาอยู่ที่นี่ได้อย่างไร...\n\nเจ้าจะได้เป็นงานเลี้ยงอันยิ่งใหญ่...\n\nจงเข้ามาและแตกสลายต่อหน้าพวกเรา..."
 astral_planes.3122.desc: "เรายังไม่จบธุระกับเจ้า... §Y$NAME_Formless_leader$§! แห่งชาดากอน...\n\nเจ้าช่วยพวกพ้องของเจ้าได้ แต่กลับไล่ตามความโอหังอย่างโง่เขลา...\n\nจงร่วมเป็นพยานต่อความเดือดดาล... จากนั้นคือความสูญสิ้น..."
 astral_planes.3123.desc: "สถาปนิก... §Y$NAME_Formless_leader$§! แห่งชาดากอน...\n\nเราจะกลืนกินเจ้า... รวมจิตใจของเจ้าเข้าไว้...\n\nความลับของบัลลังก์... ช่างเป็นของขวัญชิ้นใหญ่ที่เจ้าเสนอให้...\n\nมาร่วมกับเราตอนนี้... เราจะให้เกียรติเจ้า..."

 alert_formless_reward_available_title: "ของขวัญจากกลุ่มไร้รูปทรง"
 alert_formless_reward_available_instant: "กลุ่มไร้รูปทรงได้เสนอรางวัลให้แก่เรา"
 ALERT_FORMLESS_REWARD_AVAILABLE_DETAIL: "สิ่งมีชีวิต ณ ใจกลางกาแล็กซีรู้สึกขอบคุณสำหรับความช่วยเหลือของเรา และสัญญาว่าจะส่งของขวัญมาให้เราเป็นครั้งคราว"

 NAME_Formless_leader: "zadigal"
 formless_leader_desc: "หนึ่งในผู้นำคนสุดท้ายของกลุ่มไร้รูปทรง เอนทิตีต่างมิติตนนี้ได้บัญชาการกองยานมายาวนานยิ่งกว่าอายุขัยของสิ่งมีชีวิตสายพันธุ์ส่วนใหญ่เสียอีก"
 formless_leader_catch_phrase: "ความขอบคุณ... การยอมรับ..."

 astral_planes.3155.name: "สงครามกับกลุ่มไร้รูปทรง"
 astral_planes.3155.desc: "ยุทธการอันดุเดือดของเราต่อกลุ่มไร้รูปทรงทำให้ [this.GetName] ละทิ้งกองยานที่ได้รับมอบหมายและกลับไปเข้าร่วมกลุ่มของตน"
 astral_planes.3155.a: "เข้าใจแล้ว"

 astral_planes.3165.name: "กลุ่มไร้รูปทรงถูกทำลายลงแล้ว"
 astral_planes.3165.desc: "เราได้กำจัดกลุ่มไร้รูปทรงที่หลงเหลืออยู่คนสุดท้ายในระบบดาว [event_target:formless_system.GetName] สำเร็จเป็นที่เรียบร้อยแล้ว...\n\nสิ่งเดียวที่ยังคงเหลืออยู่คืออุปกรณ์ลึกลับชิ้นหนึ่ง เพียงแค่วาง [this.species.GetHandNamePlural] ลงไปก็สามารถเปิดใช้งานคุณสมบัติการฟื้นฟูอันน่าอัศจรรย์ของมันได้ อุปกรณ์ชิ้นนี้ทำหน้าที่เสมือนท่อเชื่อมต่อไปยังระนาบแอสทรัล โดยมีสารต่างมิติปริมาณมหาศาลไหลเวียนผ่านมันอย่างอิสระ"

 astral_planes.3170.desc: "แม้ว่าเราจะรู้จักเจ้า...\nแต่มันยังไม่ใช่เวลาที่เราจะได้พบกัน..."

 pm_formless_haven: "สวรรค์ของกลุ่มไร้รูปทรง(Formless Haven)"
 pm_formless_haven_desc: "ปราการด่านสุดท้ายของสิ่งมีชีวิตที่รู้จักกันในชื่อกลุ่มไร้รูปทรง สายพันธุ์ต่างมิติจะเข้ามาตั้งถิ่นฐานที่นี่เป็นครั้งคราวภายใต้การคุ้มครองของพวกเขา"
 pm_formless_haven_tt: "สร้างประชากร §Y500§! £pop£ §Hป๊อป§! ของสายพันธุ์อื่นขึ้นบนดาวเคราะห์ดวงนี้"

 preset_luminarium: "ลูมินาเรียม(มกราคม)"
 preset_luminarium_desc: "ลูมินาเรียม(มกราคม)คือประเภทของประเทศราชที่สร้างขึ้นโดยผู้ครอบครองบัลลังก์นิรันดร์ ผู้ที่อ้างสิทธิ์ในที่นั่งนี้จะมีอิทธิพลเหนือกลุ่มไร้รูปทรง ซึ่งจักรวรรดิข้ามมิติของพวกเขาได้ล่มสลายลงสู่ความเสื่อมโทรมไปแล้ว"
 preset_luminarium_flavor_desc: "$preset_luminarium_desc$"
