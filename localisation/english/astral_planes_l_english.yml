 job_munitions_decommissioning_drone_desc: "โดรนเหล่านี้ช่วยถอดแยกชิ้นส่วนอาวุธโบราณอย่างมีประสิทธิภาพเพื่อให้เข้ากับข้อกำหนดสมัยใหม่ของเรา"
