 civic_sovereign_guardianship: "ผู้พิทักษ์อธิปไตย"
 civic_sovereign_guardianship_desc: "กลุ่มชนเผ่าที่เคยทำสงครามกันกลุ่มนี้ได้พัฒนาความชอบทางประวัติศาสตร์ในด้านการตั้งมั่นในดินแดนและการตั้งรับการป้องกันอย่างมั่นคง เมื่อมารวมกันเป็นหนึ่งเดียว พวกเขาพร้อมที่จะนำปรัชญานี้ไปสู่หมู่ดาว โดยมีเป้าหมายเพื่อรักษาพรมแดนให้มั่นคงและรักษาความตึงเครียดให้ต่ำ"
 civic_sovereign_guardianship_effects: "ปลดล็อก §Y$fanatic_guardian_plural$§! เป็นกองทัพป้องกัน\n$civic_sovereign_guardianship_effects_common$"
 civic_hive_sovereign_guardianship: "กระจุกผู้พิทักษ์(ระวัง คลูสเตอร์)"
 civic_hive_sovereign_guardianship_desc: "จิตสำนึกร่วมกลุ่มนี้ได้พัฒนาความชอบทางประวัติศาสตร์ในด้านการตั้งมั่นในดินแดนและการตั้งรับการป้องกันอย่างมั่นคง พวกเขาพร้อมที่จะนำปรัชญานี้ไปสู่หมู่ดาว โดยมีเป้าหมายเพื่อรักษาพรมแดนให้มั่นคงและรักษาความตึงเครียดให้ต่ำ"
 civic_hive_sovereign_guardianship_effects: "ปลดล็อก §Y$machine_fanatic_guardian_plural$§! เป็นกองทัพป้องกัน\n$civic_sovereign_guardianship_effects_common$"
 civic_machine_sovereign_guardianship: "เมทริกซ์ผู้พิทักษ์(ระวังเมทริกซ์)"
 civic_machine_sovereign_guardianship_desc: "กลุ่มจิตสำนึกร่วมจักรกลนี้ได้พัฒนาความชอบเชิงกระบวนการในด้านการตั้งมั่นในดินแดนและการตั้งรับการป้องกัน พวกเขาพร้อมที่จะนำยุทธศาสตร์ที่มีประสิทธิภาพนี้ไปสู่หมู่ดาว โดยมีเป้าหมายเพื่อรักษาพรมแดนให้มั่นคงและรักษาความตึงเครียดให้ต่ำ"
 civic_machine_sovereign_guardianship_effects: "ปลดล็อก §Y$machine_fanatic_guardian_plural$§! เป็นกองทัพป้องกัน\n$civic_sovereign_guardianship_effects_common$"
 civic_corporate_sovereign_guardianship: "เขตอารักขาองค์กร(ผู้ปกป้องสังคม)"
 civic_corporate_sovereign_guardianship_desc: "สังคมของอุตสาหกรรมที่แข่งขันกันแห่งนี้ได้เรียนรู้ว่าการคุ้มครองการลงทุนที่ดีที่สุดคือการตั้งรับเพื่อการป้องกันที่แข็งแกร่ง เมื่อมารวมกันเป็นหนึ่งเดียว พวกเขาพร้อมที่จะนำปรัชญานี้ไปสู่หมู่ดาว โดยมีเป้าหมายเพื่อรักษาพรมแดนให้มั่นคงและรักษาความตึงเครียดให้ต่ำ"
 civic_corporate_sovereign_guardianship_effects: "$civic_sovereign_guardianship_effects$"
 civic_sovereign_guardianship_effects_common: "อนุญาตให้สร้าง §Y$sm_reloading_bay$§! ในสถานีอวกาศได้\nเปิดใช้งานคำสั่งรัฐ §Y$edict_inner_focus$§! (§Hเอกสาร§!) ซึ่งจะแปลงค่า £influence£ §Yอิทธิพล§! เป็น £unity£ §Yเอกภาพ§!"

 civic_tooltip_not_guardian: "ไม่มีพลเมือง ['concept_guardian_civics']"
 concept_guardian_civics: "ลัทธิพิทักษ์อธิปไตยผู้พิทักษ์ผู้กล้าหาญ"
 concept_guardian_civics_desc: "คุณสมบัติพลเมือง $concept_guardian_civics$ ประกอบด้วย\n- ['civic:civic_sovereign_guardianship']$NEW_LINE$- ['civic:civic_corporate_sovereign_guardianship']$NEW_LINE$- ['civic:civic_hive_sovereign_guardianship']$NEW_LINE$- ['civic:civic_machine_sovereign_guardianship']"

 fanatic_guardian: "ทหารผู้พิทักษ์สุดขั้ว"
 fanatic_guardian_plural: "ทหารผู้พิทักษ์สุดขั้ว"
 fanatic_guardian_desc: "ผู้พิทักษ์มาตุภูมิอันแน่วแน่ ทหารผู้ไม่สั่นคลอนเหล่านี้จะมีประสิทธิภาพสูงสุดเมื่อปกป้องผู้ที่มีความสัมพันธ์ใกล้ชิดกับพวกเขา"

 machine_fanatic_guardian: "หน่วยเมทริกซ์"
 machine_fanatic_guardian_plural: "หน่วยเมทริกซ์"
 machine_fanatic_guardian_desc: "โดรนป้องกันที่มีอานุภาพทำลายล้างสูงเหล่านี้จะมีประสิทธิภาพสูงสุดเมื่ออยู่ใกล้ชิดกับโหนดเชิงยุทธศาสตร์อื่นๆ ทั้งหมด"

 ##########
 # Edicts #
 ##########

 edict_shadow_matrix: "เมทริกซ์เงา"
 edict_shadow_matrix_desc: "ความคลุมเครือทางอิเล็กทรอนิกส์ที่ได้จากหน่วยประมวลผลสสารมืดสร้างซอฟต์แวร์ที่แม้แต่นักถอดรหัสที่ดีที่สุดก็ยังต้องดิ้นรน"

 edict_obsidian_veil: "ม่านออบซิเดียน"
 edict_obsidian_veil_desc: "การจะซ่อนตัวในป่า เราควรสวมใส่พื้นดิน การจะซ่อนตัวในอวกาศ เราควรสวมใส่ความว่างเปล่า"

 edict_dark_matter_forging: "การหล่อด้วยสสารมืด"
 edict_dark_matter_forging_desc: "คุณสมบัติการยึดเกาะที่เป็นเอกลักษณ์ของสสารมืดในฐานะฟลักซ์ในโรงหล่อของเราช่วยเพิ่มผลผลิตได้ในปริมาณที่เห็นได้ชัดเจน"

 edict_dark_matter_unravelling: "การคลายตัวของสสารมืด"
 edict_dark_matter_unravelling_desc: "พลังงานที่บรรจุอยู่ภายในพันธะที่ก่อตัวขึ้นจากสสารมืดสามารถคลี่คลายออกมาเป็นผลผลิตล้ำค่าได้"

 edict_inner_focus: "การมุ่งเน้นภายใน"
 edict_inner_focus_desc: "การขยายอาณาเขตมากเกินไปทำให้เกิดความเสี่ยงหลากหลายรูปแบบ การทำความเข้าใจตนเองเป็นความพยายามที่น่าเชื่อถือและได้ผลดีมากกว่า"

 edict_baryonic_insight: "ความเข้าใจเชิงบาริออน"
 edict_baryonic_insight_desc: "เพื่อความเข้าใจที่ลึกซึ้งยิ่งขึ้นเกี่ยวกับโครงสร้างของจักรวาล เราต้องมองไปไกลกว่าแนวคิดเรื่องอะตอม"

