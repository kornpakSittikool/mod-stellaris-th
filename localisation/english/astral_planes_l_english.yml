##########

 r_infinity_root: "รากอนันต์(รากอินฟินิตี้)"
 r_infinity_root_desc: "กระจุกอินทรียสารที่แพร่กระจายอย่างรวดเร็วและรุนแรงในทุกที่ที่มันถูกจัดวางไว้"
 infinity_root_active_effect_tt: "ฟูมฟักผู้นำคนใหม่ พวกเขาจะไม่มีค่าบำรุงรักษาและไม่ถูกนับรวมในขีดจำกัดจำนวนผู้นำรวมของคุณ"

 r_time_crystal: "ผลึกกาลเวลา(ไทม์คริสตัล)"
 r_time_crystal_desc: "ห้องผลึกปิดผนึกที่เก็บกักบ่วงเวลาที่ถูกตัดขาดเอาไว้"

 r_daedalus_seal: "ตราประทับดาเดลัส(ผนึกเดดาลัส)"
 r_daedalus_seal_desc: "อุปกรณ์ขั้นสูงนี้สามารถสั่นสะเทือนด้วยความถี่ที่สอดรับกับแนวรอยพับใกล้เคียงในอวกาศและเวลา ช่วยปิดผนึกพวกมันเป็นการชั่วคราวได้"
 daedalus_seal_active_effect_tt: "วางระบบล็อกไว้บนรูหนอนและแอลเกตทั้งหมดภายในพรมแดนของคุณเป็นเวลา §Y5§! ปี"
 daedalus_seal_acquisition_tt: "ระยะเวลาระบบล็อกมิติ: §G+25%§!"
 daedalus_seal_no_bypasses_fail: "$TRIGGER_FAIL$ไม่มีรูหนอนหรือแอลเกตตั้งอยู่ภายในพรมแดนของคุณ"
 MOD_DIMENSIONAL_LOCK_DURATION_MULT: "ระยะเวลาของระบบล็อกมิติ"

 r_ever_spinning_top: "ลูกข่างหมุนไม่รู้จบ(Ever splay Top)"
 r_ever_spinning_top_desc: "ลูกข่างหมุนต่างมิติ การเคลื่อนไหวของมันราบรื่น ไร้รอยต่อ สะกดจิต เป็นการหมุนที่สมบูรณ์แบบชั่วนิรันดร์"
 ever_spinning_top_modifier: "การเคลื่อนไหวตลอดกาล(เสียงหึ่ง)"

 r_celestial_tear: "หยาดน้ำตาแห่งสรวงสวรรค์(เสียงสวรรค์)"
 r_celestial_tear_desc: "ตัวอย่างหยาดน้ำตาแอสทรัลจากดวงดาวที่กำลังโศกเศร้า ยิ่งวางไว้ใกล้กับดวงอาทิตย์ที่ยังคุกรุ่น มันก็ยิ่งส่องแสงสว่างเจิดจ้าขึ้น"
 celestial_tear_modifier: "$r_celestial_tear$"
 celestial_tear_acquisition_tt: "ความเหมาะสมในการอยู่อาศัย(น่าอยู่)ของดาวเคราะห์ภายในพรมแดนของคุณที่โคจรรอบดาวฤกษ์คลาส §YA§!, §Yบี§!, §YF§!, และ §Yก§!: §G+5%§!"

 r_plasmic_core: "แกนพลาสมิก(ม้า)"
 r_plasmic_core_desc: "นิวเคลียสของเซลล์ยักษ์จากมิติต่างดาว เครื่องเตือนใจถึงความหลากหลายอันเป็นอนันต์ของสิ่งมีชีวิตอินทรีย์"
 machine_plasmic_core_effect: "มอบโบนัสคุณลักษณะเชิงบวกแบบสุ่ม 3 อย่างให้กับผู้นำที่ถูกเลือกแบบสุ่ม"
 plasmic_core_effect: "ประชากรทุกหน่วยบนดาวเคราะห์แบบสุ่มจะได้รับคุณลักษณะ §Y$trait_plasmic$§!"
 plasmic_core_no_suitable_planet: "$TRIGGER_FAIL$§Rไม่มีดาวเคราะห์ที่มีประชากรที่ยังไม่มีคุณลักษณะ §Y$trait_plasmic$§!§!"
 plasmic_core_effect_evopred: "มอบความก้าวหน้า §G50%§! ให้กับสถานการณ์ §Y$evolutionary_predators_situation$§! นอกจากนี้อาจได้รับคุณลักษณะ §Y$trait_plasmic$§! เมื่อเสร็จสิ้นสถานการณ์"

 effect_random_bypass: "ทางผ่านสุ่ม"
 effect_every_bypass: "ทางผ่านทั้งหมด"
 any_bypass_trigger: "ทางผ่านใดๆ"
 count_bypass_trigger: "จำนวนทางผ่าน$CONDITIONS$ $IS_NOT$ $COMPARATOR$ $NUM|Y$"
 count_bypass_all_trigger: "ทางผ่านทั้งหมด $IS_ALL_NOT$ ตรงตามเงื่อนไขต่อไปนี้"

 effect_random_astral_rift: "รอยแยกแอสทรัล สุ่ม"
 effect_every_astral_rift: "รอยแยกแอสทรัล ทั้งหมด"
 any_astral_rift_trigger: "รอยแยกแอสทรัล ใดๆ"
 count_astral_rift_trigger: "จำนวนรอยแยกแอสทรัล$CONDITIONS$ $IS_NOT$ $COMPARATOR$ $NUM|Y$"
 count_astral_rift_all_trigger: "รอยแยกแอสทรัล ทั้งหมด $IS_ALL_NOT$ ตรงตามเงื่อนไขต่อไปนี้"

 r_continuum: "เดอะคอนทินูอัม(เสียงดัง)"
 r_continuum_desc: "แกนสีทองของกลไกจับเวลาต่างมิติ อุปกรณ์ที่น่าทึ่งนี้มีความสามารถในการควบคุมเวลาเสมือนว่ามันเป็นเพียงฟันเฟืองอีกชิ้นหนึ่งของมัน"

 r_eternal_throne: "บัลลังก์นิรันดร์(บัลลังก์บัลลังก์)"
 r_eternal_throne_desc: "ท่าเรือต่างมิติที่สามารถมอบชีวิตอันเป็นนิรันดร์ได้ ผู้ที่สัมผัสกับอิทธิพลของมันจะดำรงอยู่ในความเป็นจริงที่ปราศจากความกลัว ความสงสัย หรือจุดสิ้นสุด"
 eternal_throne_active_effect_tt: "ผู้นำทั้งหมดกลายเป็นอมตะ"
 eternal_throne_modifier: "ความสอดประสานแอสทรัล(สถานภาพ)"

