 # Astral Actions #
 ##################

 ASTRAL_ACTIONS: "ปฏิบัติการแอสทรัล"
 ASTRAL_ACTIONS_TAB_DISABLED: "สามารถใช้งานได้ด้วยเทคโนโลยี £physics£ §Y$tech_astral_harvesting$§!"
 ASTRAL_ACTION_REMAINING_USAGES: "($LEFT|0$/$TOTAL|0$)"
 ASTRAL_ACTION_REMAINING_USAGES_DESC: "ปฏิบัติการนี้จำกัดการใช้งานทั้งหมดไว้ที่ $TOTAL|0$ ครั้ง คุณเหลือการใช้งานอีก $LEFT|0$ ครั้ง"
 ASTRAL_ACTION_UNIQUE_USAGE_DESC: "ปฏิบัติการนี้สามารถใช้ได้เพียงครั้งเดียวเท่านั้น"
 ASTRAL_ACTION_UNIQUE_USAGE_DESC_FLEET_ABILITY: "ปฏิบัติการนี้สามารถใช้ได้เพียงครั้งเดียวเท่านั้น และหลังจากนั้นจะเพิ่มฟังก์ชันการทำงานใหม่ให้กับกองยานของคุณ"
 ASTRAL_ACTION_RIFT_REQUIREMENT_DESC: "คุณต้องสำรวจรอยแยกแอสทรัล สำเร็จ §Y1§! แห่งเพื่อปลดล็อกปฏิบัติการนี้"
 ASTRAL_ACTION_RIFT_REQUIREMENT_DESC_PLURAL: "คุณต้องสำรวจรอยแยกแอสทรัล สำเร็จ $NUM_RIFTS|Y$ แห่งเพื่อปลดล็อกปฏิบัติการนี้"
 ASTRAL_ACTION_COOLDOWN_VALUE: "£time£ $VALUE|0$"
 ASTRAL_ACTION_COOLDOWN_TOOLTIP: "คูลดาวน์ปฏิบัติการแอสทรัล: £time£ §Y$VALUE|0$§!"
 ASTRAL_ACTION_COOLDOWN_ACTIVE: "$TRIGGER_FAIL$ §Rปฏิบัติการนี้อยู่ในระหว่างคูลดาวน์อีก $VALUE|Y$ วัน§!"

 MESSAGE_ASTRAL_ACTION_UNLOCKED_TITLE: "มีปฏิบัติการแอสทรัลใหม่ให้ใช้งานแล้ว"
 alert_astral_action_available_title: "$ASTRAL_ACTIONS$"
 alert_astral_action_available_instant: "มีปฏิบัติการแอสทรัลอย่างน้อยหนึ่งอย่างพร้อมใช้งานแล้ว"
 alert_astral_action_available_instruction: "§Gคลิกเพื่อเปิดหน้าต่างปฏิบัติการแอสทรัล§!"
 ALERT_ASTRAL_ACTION_AVAILABLE_DETAIL: "$ACTION_NAME$ พร้อมใช้งานแล้ว"

 action_astral_boost: "แอสทรัลบูสต์"
 action_astral_boost_desc: "เสริมประสิทธิภาพเครื่องยนต์ของยานเราด้วย $ASTRAL_THREADS_ICON$ เพื่อเพิ่มความคล่องตัวในการหลบหลีก"

 action_hyper_relay_insight: "รับข้อมูลเชิงลึกเกี่ยวกับรีเลย์ไฮเปอร์"
 action_hyper_relay_insight_desc: "คุณสมบัติพิเศษของ $ASTRAL_THREADS_ICON$ น่าจะช่วยให้เราเข้าใจวิธีพับมิติอวกาศเข้าหากันได้ดียิ่งขึ้น"

 action_quantum_catapult_insight: "รับข้อมูลเชิงลึกเกี่ยวกับเครื่องยิงควอนตัม"
 action_quantum_catapult_insight_desc: "คุณสมบัติพิเศษของ $ASTRAL_THREADS_ICON$ น่าจะช่วยให้เราก้าวข้ามขีดจำกัดของการเดินทางความเร็วเหนือแสง(FTL)ไปได้อีกขั้น"
 action_quantum_catapult_insight_2: "การปรับเทียบแอสทรัล"
 action_quantum_catapult_insight_2_desc: "ด้วยการใช้ขีดความสามารถของ $ASTRAL_THREADS_ICON$ เพิ่มขึ้นไปอีกขั้น เราน่าจะสามารถเพิ่มความแม่นยำของเครื่องยิงควอนตัมของเราได้"
 action_quantum_catapult_insight_2_requirement_tooltip: "$TRIGGER_FAIL$§Rต้องครอบครอง §Yเครื่องยิงควอนตัม§!§!"

 action_summon_dimensional_fleet: "อัญเชิญกองยานมิติ"
 action_summon_dimensional_fleet_desc: "ความสอดประสานของเรากับระนาบแอสทรัลได้หยั่งลึกขึ้น ตอนนี้เราสามารถเรียกเหล่านักรบต่างมิติมาสนับสนุนเป้าหมายของเราได้แล้ว แต่ว่าพวกเขามาจากไหน หรือทำไมพวกเขาถึงมานั้น เราไม่สามารถแน่ใจได้เลย"
 action_summon_dimensional_fleet_tooltip: "อัญเชิญกองยานทรงอานุภาพจากสถานที่และเวลาที่ไม่รู้จัก พวกเขาสามารถคงอยู่ในมิติของเราได้นานสูงสุด 10 ปี"
 NAME_Astral_Avatar: "Astral Avatar"
 NAME_Astral_Avatar_Small: "Small $NAME_Astral_Avatar$"
 NAME_Dimensional_Fleet: "Dimensional Fleet"
 MESSAGE_DIMENSIONAL_FLEET_DESTROYED_TITLE: "กองยานมิติเดินทางกลับแล้ว"
 MESSAGE_DIMENSIONAL_FLEET_DESTROYED_DESC: "กองยานมิติที่เราอัญเชิญมาได้เดินทางกลับไปยังระนาบการดำรงอยู่เดิมของพวกเขาแล้ว ไม่มีร่องรอยใดๆ หลงเหลืออยู่เลย"

 action_astral_splitting: "การแยกสลายแอสทรัล"
 action_astral_splitting_desc: "ด้วยการถักทอเส้นใย $ASTRAL_THREADS_ICON$ เพิ่มเติมเข้าสู่โครงสร้างที่ละเอียดอ่อนของอวกาศ เราน่าจะสร้างรอยฉีกขาดเทียมในความเป็นจริงได้ การทำเช่นนี้บ่อยเกินไปอาจทำให้กาแล็กซีตกอยู่ในอันตรายจากการพังทลายอย่างสิ้นเชิง"
 action_astral_splitting_no_rift_spawning_location: "$TRIGGER_FAIL$§Rไม่มีระบบดาวที่ใช้งานได้ซึ่งเราจะสามารถแยกเปิดหมุน & 90แห่งใหม่ได้§!"
 action_astral_splitting_tooltip: "สร้าง $ASTRAL_RIFT$ ขึ้นในระบบดาวที่ควบคุมอยู่แบบสุ่ม\nต้องควบคุมระบบดาวที่ไม่มี $ASTRAL_RIFTS$ อยู่ติดกัน"
 action_astral_splitting_too_many_rifts: "$TRIGGER_FAIL$§Rเราได้ผลักดันขีดความสามารถในการบังคับเปิดรอยแยกแห่งใหม่ในอวกาศและเวลาจนถึงขีดจำกัดแล้ว§!"
 action_astral_splitting_no_rift_spawning_location_tt: "§Rไม่มีระบบดาวที่ใช้งานได้ซึ่งเราจะสามารถแยกเปิดหมุน & 90แห่งใหม่ได้§!"

 action_gain_physics_insight: "รับข้อมูลเชิงลึกด้านฟิสิกส์"
 action_gain_physics_insight_desc: "อนุญาตให้เหล่านักวิทยาศาสตร์ของเราขอเบิก $ASTRAL_THREADS_ICON$ เพื่อนำไปพัฒนาความเข้าใจในวิชาฟิสิกส์ของเราต่อไป"

 action_lateral_artifacting: "การจัดการอาร์ติแฟกต์คู่ขนาน"
 action_lateral_artifacting_desc: "เราสามารถควบคุมการไหลของเวลาเพื่อเปิดใช้งานอาร์ติแฟกต์อันทรงพลังสองชิ้นพร้อมกันได้"
 action_lateral_artifacting_tooltip: "ช่วยให้คุณสามารถเปิดใช้งานเรลิกชิ้นที่สองได้โดยไม่ต้องรอให้ช่วงเวลาแห่งชัย ชนะปัจจุบันสิ้นสุดลง"
 action_lateral_artifacting_not_same_relic: "$TRIGGER_FAIL$§Rเรลิกชิ้นนี้เปิดใช้งานอยู่แล้ว§!"

 astral_jump: "แอสทรัลจัมป์"

 gain_physics_insight_modifier: "$action_gain_physics_insight$"
 astral_boost_modifier: "$action_astral_boost$"
 quantum_catapult_insight_2_modifier: "$action_quantum_catapult_insight_2$"
 quantum_catapult_insight_2_modifier_tt: "$quantic_ambush$ $MOD_SHIP_FIRE_RATE_MULT$: §G+[GetQuantumCatapulInsight2QuanticAmbush]%§!\nระยะเวลาตัวปรับแต่ง $quantic_ambush$: §G+100%§!"
 fold_hyperspace_modifier: "$artifact_fold_hyperspace$"

 action_remaining_astral_actions_locked: "$artifact_action_locked$"
 action_remaining_astral_actions_locked_desc: "เหล่านักวิทยาศาสตร์ของเรามั่นใจว่าปฏิบัติการเกี่ยวเนื่องกับ $ASTRAL_THREADS_ICON$ เพิ่มเติมจะสามารถปลดล็อกได้ผ่านการค้นพบเทคโนโลยีใหม่ๆ"
 action_astral_action_locked_failtext: "ปลดล็อกปฏิบัติการแอสทรัลใหม่"

 action_flash_forge_hyper_relay: "การตีสร้างด่วนรีเลย์ไฮเปอร์"
 action_flash_forge_hyper_relay_desc: "แม้ว่าเส้นทางไฮเปอร์เลนจะมีคุณสมบัติทางควอนตัมที่น่าสนใจอยู่แล้ว แต่เมื่อเราถักทอเส้นใยแอสทรัลเข้าไปในปริมาณที่เหมาะสม เราก็ได้ผลลัพธ์ที่น่าอัศจรรย์ ด้วยการเจาะทะลวงไปยังมิติอื่น ตอนนี้เราสามารถเข้าถึงรีเลย์ไฮเปอร์ที่มีอยู่แล้ว (หรือจะมีอยู่ในอนาคต) ได้ทันที เราค่อนข้างมั่นใจว่าเราเป็นพวกเดียวที่ 'หยิบยืม' มันมาใช้ในลักษณะนี้"
 action_flash_forge_hyper_relay_tooltip: "อนุญาตให้ยานก่อสร้างของเราสร้างรีเลย์ไฮเปอร์หนึ่งแห่งในระบบดาวได้ทันทีโดยไม่มีค่าใช้จ่าย"
 action_flash_forge_hyper_relay_available_tooltip: "$TRIGGER_FAIL$§Rเราได้จัดเตรียมพื้นที่สำหรับให้ยานก่อสร้างทำเช่นนี้ไว้เรียบร้อยแล้ว§!"
 action_flash_forge_hyper_relay_executing_tooltip: "$TRIGGER_FAIL$§Rหนึ่งในยานก่อสร้างของเรากำลังเดินทางไปดำเนินการนี้§!"
 FLASH_FORGE_MEGASTRUCTURE: "ตีสร้างด่วน $MEGASTRUCTURE|H$"

 action_dimensional_shifting: "การเลื่อนสลับมิติ"
 action_dimensional_shifting_desc: "ด้วยการควบคุมโครงสร้างระหว่างมิตินี้กับอีกมิติหนึ่งอย่างชาญฉลาด เราสามารถพับมันเข้าหากันเพื่อให้ได้ผลลัพธ์อันน่าทึ่ง"
 action_dimensional_shifting_tooltip: "ปลดล็อกคำสั่งกองยาน §Yระยะเยื้อง§! ซึ่งช่วยให้กองยานของคุณเฟสตัวออกไปอยู่อย่างปลอดภัยในอีกมิติหนึ่งเป็นเวลา §Y180§! วัน\n\nเมื่อกองยานเดินทางกลับมาจะได้รับการซ่อมแซมจนเสร็จสมบูรณ์"

 action_folding_hyperspace: "การพับไฮเปอร์สเปซ"
 action_folding_hyperspace_desc: "ด้วยการควบคุมระนาบระหว่างมิติอย่างชาญฉลาด เราสามารถพับพื้นที่อวกาศเข้าหากันเพื่อสร้างผลลัพธ์อันน่าทึ่งได้"
 action_folding_hyperspace_tooltip: "ปลดล็อกคำสั่งกองยาน §Yกระโดดแอสตรัล§! ซึ่งช่วยให้ยานของคุณสามารถกระโดดข้ามมิติไปยังระบบดาวใดก็ได้ภายในอาณาเขตของคุณทันที"

 action_astral_siphon: "เครื่องดูดแอสทรัล"
 action_astral_siphon_desc: "มีวิธีที่จะคลี่โครงสร้างระหว่างอวกาศและเวลาออก ด้วยการสร้างอุปกรณ์สกัดที่ปรับเทียบอย่างพิถีพิถัน เราจะสามารถผลิต $astral_threads$ ได้อย่างสม่ำเสมอ"
 action_astral_siphon_unlock_tooltip_common: "เพิ่มความจุในการจัดเก็บ $ASTRAL_THREADS_ICON$ และมอบตำแหน่งงาน §Y[GetAstralResearcherJobWithIcon]§!\n[GetAstralResearcherEffect]"
 action_astral_siphon_unlock_tooltip_lvl1: "ปลดล็อกสิ่งปลูกสร้างบนดาวเคราะห์ §Y$building_astral_siphon_1$§!\n§Y$building_astral_siphon_1$§! $action_astral_siphon_unlock_tooltip_common$"
 action_astral_siphon_unlock_tooltip_lvl2: "อนุญาตให้อัปเกรด §Y$building_astral_siphon_1$§! เป็น §Y$building_astral_siphon_2$§!\n§Y$building_astral_siphon_2$§! $action_astral_siphon_unlock_tooltip_common$"
 action_astral_siphon_unlock_tooltip_lvl3: "อนุญาตให้อัปเกรด §Y$building_astral_siphon_2$§! เป็น §Y$building_astral_siphon_3$§!\n§Y$building_astral_siphon_3$§! $action_astral_siphon_unlock_tooltip_common$"
 building_astral_siphon_1: "เครื่องดูดแอสทรัล"
 building_astral_siphon_1_desc: "การปอกเส้นใยแอสทรัลออกจากโครงสร้างของความเป็นจริงเป็นกระบวนการที่ละเอียดอ่อน โครงสร้างเหล่านี้ช่วยป้องกันไม่ให้ขอบเขตระหว่างมิติต่างๆ พังทลายลง"
 building_astral_siphon_2: "กรวยดึงแอสทรัล"
 building_astral_siphon_2_desc: "$building_astral_siphon_1_desc$"
 building_astral_siphon_3: "เน็กซัสแอสทรัล"
 building_astral_siphon_3_desc: "$building_astral_siphon_1_desc$"

 astral_siphon_modifier_1: "$action_astral_siphon$"
 astral_siphon_modifier_2: "$action_astral_siphon$"
 astral_siphon_modifier_3: "$action_astral_siphon$"

 action_planar_mastery: "ความเชี่ยวชาญแห่งระนาบมิติ"
 action_planar_mastery_desc: "การเดินทางเข้าสู่ระนาบแอสทรัลช่วยให้เราเข้าใจโครงสร้างที่ยึดโยงจักรวาลต่างๆ เข้าด้วยกันได้ดีขึ้น เราสามารถถักทอเส้นใยเหล่านี้ในแบบที่น้อยคนนักจะเข้าใจได้"
 edict_astral_binding: "การพันธนาการแอสทรัล"
 edict_astral_binding_desc: "เราได้เรียนรู้วิธีถักทอเส้นใยแอสทรัลเข้ากับวัสดุอื่นๆ ในจักรวาล มันเป็นเหมือนโครงสร้างหลักของมิติเองเลยทีเดียว"
 edict_astral_binding_effects: "เพิ่มการผลิตทรัพยากรวัสดุอื่นๆ ทั้งหมดขึ้น §Y10%§!"
 edict_astral_shielding: "เกราะป้องกันแอสทรัล"
 edict_astral_shielding_desc: "ไม่มีเกราะป้องกันใดแข็งแกร่งไปกว่าโครงข่ายที่ถักทอขึ้นอย่างแน่นหนาจากเส้นใยแอสทรัล"
 edict_dimensional_artificing: "ประติมากรรมข้ามมิติ"
 edict_dimensional_artificing_desc: "การสร้างวัตถุที่มีความสำคัญทางวัฒนธรรมจากมิติอื่นสามารถทำได้ภายใต้สถานการณ์ที่เหมาะสม แต่เราไม่สามารถบอกได้ว่าการกระทำของเราจะถูกสังเกตเห็นในมิติอื่นหรือไม่"
 edict_dimensional_artificing_tooltip: "§G+5§! £minor_artifacts£ $MINOR_ARTIFACTS$ ต่อเดือน"
