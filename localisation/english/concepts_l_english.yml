l_english:

### CONCEPTS
#
# Above each concept definition are instructions on usage, including an icon where one exists.
#   Note that between the icon and the term there's a non-breaking space. When you copy the usage example, it will keep the non-breaking space.
#   This is important to not get a line break between the icon and the concept.
# Use a concept link with icon the first time a new concept is mentioned, then use §H without an icon for repeated uses.
# Use §H with an icon the first time a concept is used withing its own description.
# Use §H without an icon if the concept is used more than once.

 GAME_CONCEPT_FORMAT: "§C$TEXT$§!"

 DATABANK_FILTER_DESC: "หมวดหมู่ที่เลือก"

 databank_colony: "อาณานิคม"
 databank_conquest: "การพิชิต"
 databank_development: "การพัฒนา"
 databank_empire: "จักรวรรดิ"
 databank_exploration: "การสำรวจ"
 databank_interface: "อินเตอร์เฟส"
 databank_resource: "ทรัพยากร"

 dlc_requirement_string: "\n\n§Pต้องมี DLC:§!"
 requires_leviathans: "$dlc_requirement_string$ §Iเลไวอาทัน§!"
 requires_apoc: "$dlc_requirement_string$ §Iอะ พอ คา ลิ ปส์§!"
 requires_syn_dawn: "$dlc_requirement_string$ §Iรุ่งอรุณสังเคราะห์แสง§!"
 requires_megacorp: "$dlc_requirement_string$ §Iเมกะคอป§!"
 requires_dis_stars: "$dlc_requirement_string$ §Yแพ็ครายการ Stars Story§!"

 tt_gain: "\n\nในการเพิ่ม:\n"
 tt_use: "\n\nใช้:\n"
 tt_market: "ซื้อจาก £market£ ['concept_market']"
 tt_no_need_hive: "§R$auth_hive_mind_plural$ ไม่ใช้ทรัพยากรนี้§!"
 tt_some_need_machine: "§Rโดยทั่วไปแล้ว $auth_machine_intelligence_plural$ จะไม่ใช้ทรัพยากรนี้§!"
 tt_some_need_infernal: "§Rโดยทั่วไปแล้ว $trait_infernal_plural$ จะไม่ใช้ทรัพยากรนี้§!"

 concept_advanced_empire: "จักรวรรดิ AI ขั้นสูง"
 concept_advanced_empires: "จักรวรรดิ AI ขั้นสูง"
 concept_advanced_empires_desc: "เริ่มต้นด้วยความได้เปรียบในด้านทรัพยากร เทคโนโลยีและจำนวนประชากร พวกเขาไม่ได้รับโบนัสเพิ่มเติมใดๆ นอกจากตำแหน่งเริ่มต้นที่ดีกว่า"

 concept_alien_zoo: "$building_xeno_zoo$"
 concept_alien_zoo_desc: "£mod_job_entertainer_add£ งาน [entertainer.GetName]: §G+100§!\n£mod_job_xeno_zoo_keeper_add£ งาน $job_xeno_zoo_keeper$: §G+100§!\n£mod_job_livestock_zoo_animal_add£ งาน $job_livestock_zoo_animal$: §G+300§!\n\n£job_xeno_zoo_keeper£ $job_xeno_zoo_keeper_plural$ เปลี่ยน $r_consumer_goods$ เป็น £society£ §Yจุดวิจัย§! และ $r_amenities$\n$t$$r_amenities$ ที่ผลิตได้ตามจำนวนงาน £job_livestock_zoo_animal£ $job_livestock_zoo_animal$\n$job_entertainer_effect_desc$\n$job_livestock_zoo_animal_effect_desc$\n\n§L$building_xeno_zoo_desc$§!"

 # Singular: ['concept_ascension_perk'] or §H$concept_ascension_perk$§!
 # Plural: ['concept_ascension_perks'] or §H$concept_ascension_perks$§!
 concept_ascension_perk: "การยกระดับ"
 concept_ascension_perks: "การยกระดับ"
 concept_ascension_perks_desc: "§H$concept_ascension_perks$§! (สิทธิพิเศษการเลื่อนส่ง) จะมอบคุณประโยชน์อันทรงพลังทั่วทั้งจักรวรรดิ ซึ่งสามารถกำหนดทิศทางการพัฒนาของอารยธรรม เปิดเส้นทางสู่ความแข็งแกร่ง ความยืดหยุ่น หรือการก้าวข้ามขีดจำกัดที่ยิ่งใหญ่กว่า\n\nสามารถเลือกและจัดการได้ในแท็บ §H$traditions$§! ของอินเตอร์เฟส £interface£ ['concept_society_management_view']"

 # Singular: -
 # Plural: £alloys£ ['concept_alloys'] or £alloys£ §H$concept_alloys$§!
 concept_alloys: "โลหะผสม"
 concept_alloys_desc: "£alloys£ §H$concept_alloys$§! (โลหะผสม) เป็นทรัพยากรขั้นสูงที่มีการนำไปใช้ในทางทหารอย่างมีนัยสำคัญ\n\nโลหะผสมถูกนำไปใช้ในการสร้าง ['concept_civilian_ships'], ['concept_military_ships'], ['concept_starbases'] และ ['concept_megastructures'] รวมถึงสิ่งอื่นๆ ด้วย$tt_gain$- สร้างเขต £zone£ §H$zone_industrial_plural$§! หรือ £zone£ §H$zone_foundry_plural$§!\n- สร้างสิ่งปลูกสร้าง £building£ ['building:building_foundry_1']\n- $tt_market$"

 # Singular: £trade_value£ ['concept_trade'] or §H$concept_trade$§!
 # Plural: -
 concept_trade: "การค้า"
 concept_trade_desc: "$r_trade$ (มูลค่าการค้า) แสดงถึงกิจกรรมทางเศรษฐกิจในแต่ละวัน กระแสการค้า และความสามารถในการขนส่งภายใน ['concept_empire']\n\nมูลค่าการค้าถูกนำไปใช้สำหรับ ['concept_ship_upkeep'], ['concept_colony_upkeep'] และเพื่อซื้อทรัพยากรอื่นๆ$tt_gain$- สร้างสิ่งปลูกสร้าง £building£ ['concept_buildings'] ที่มีตำแหน่งงาน £job£ ['concept_jobs'] ซึ่งผลิต $r_trade$\n- สร้างสถานีขุดเจาะ £mining_station£ ['concept_mining_stations'] บนแหล่งทรัพยากรการค้าระหว่างดวงดาว\n- ขายทรัพยากรในตลาด £market£ ['concept_market']"

 # Singular: £building£ ['concept_building'] or £building£ §H$concept_building$§!
 # Plural: £building£ ['concept_buildings'] or £building£ §H$concept_buildings$§!
 concept_building: "$buildable_building$"
 concept_buildings: "$planet_buildings$"
 concept_building_desc: "สิ่งปลูกสร้าง £building£ §H$concept_buildings$§! จะช่วยเพิ่มความเชี่ยวชาญให้กับผลผลิตของอาณานิคม £colony£ ['concept_colonies'] ตัวอย่างเช่น ['building:building_foundry_1'] และ ['building:building_research_lab_1']\n\nต้องใช้ช่องสิ่งปลูกสร้าง(สล็อตก่อสร้าง)ที่ว่างอยู่เพื่อสร้าง §H$concept_building$§! ซึ่งอาจต้องเลือกความเชี่ยวชาญเฉพาะด้านเขตการปกครอง £zone£ ['concept_district_specialization']$tt_gain$- สร้าง §H$concept_buildings$§! เพิ่มเติมในอินเตอร์เฟส £interface£ ['concept_colony_view']"

 # Singular: £mining_station£ £science_ship£ £shipclass_observation_station£ ['concept_civilian_space_station'] or £mining_station£ £science_ship£ £shipclass_observation_station£ §H$concept_civilian_space_station$§!
 # Plural: £mining_station£ £science_ship£ ['concept_civilian_space_stations'] or £mining_station£ §H$mining_station$§! £science_ship£ £shipclass_observation_station£ §H$concept_civilian_space_stations$§!
 concept_civilian_space_station: "สถานีอวกาศพลเรือน $spacestation_1$"
 concept_civilian_space_stations: "สถานีอวกาศพลเรือน $spacestation_1_plural$"
 concept_civilian_space_station_desc: "สถานีขุดเจาะ £mining_station£ §H$mining_station_plural$§! และสถานีวิจัย £science_ship£ §H$research_station_plural$§! เป็นสิ่งก่อสร้างในวงโคจรที่สร้างขึ้นรอบๆ เทหวัตถุบนท้องฟ้าเพื่อสกัดทรัพยากรหรือทำการวิจัยทางวิทยาศาสตร์ โดย $mining_station$ จะเก็บเกี่ยวแร่ £minerals£ ['concept_minerals'], พลังงาน £energy£ ['concept_energy'] และวัตถุดิบเชิงกลยุทธ์อื่นๆ ในขณะที่ $research_station$ จะสร้างคะแนนการวิจัยทางด้านฟิสิกส์ £physics£ สังคม £society£ วิศวกรรม £engineering£ ['concept_research'] เพื่อขับเคลื่อนความก้าวหน้าทางวิทยาศาสตร์\n\nสถานีเหล่านี้มีความสำคัญอย่างยิ่งต่อการขยายตัวทางเศรษฐกิจและการพัฒนาทางเทคโนโลยี โดยจำเป็นต้องใช้ยานก่อสร้าง £construction_ship£ ['concept_construction_ship'] ในการสร้าง"

 # Singular: £colony£ ['concept_colony'] or £colony£ §H$concept_colony$§!
 # Plural: £colony£ ['concept_colonies'] or £colony£ §H$concept_colonies$§!
 concept_colony: "$COLONY$"
 concept_colonies: "$COLONIES$"
 concept_colony_desc: "อาณานิคม £colony£ §H$concept_colony$§! คือสถานที่ใดก็ตามที่มีประชากร £pop£ ['concept_pops'] อาศัยและทำงานอยู่ในเขตการปกครอง £district£ ['concept_districts'], ความเชี่ยวชาญเฉพาะด้านเขตการปกครอง £zone£ ['concept_district_specializations'] และสิ่งปลูกสร้าง £building£ ['concept_buildings']\n\nตัวอย่างได้แก่ โลกบ้านเกิด(โฮมเวิลด์)เริ่มต้น, ดาวเคราะห์ £planet£ ['concept_planets'] ที่ถูกบุกเบิกตั้งถิ่นฐานโดยยานอพยพ £colony_ship£ ['concept_colony_ships'] หรือสถานีอวกาศที่อยู่อาศัยประดิษฐ์ ['concept_habitats'] ที่สร้างขึ้นมา\n\n§H$concept_colonies$§! จะถูกจัดการในอินเตอร์เฟส £interface£ ['concept_colony_view']"

 # Singular: £colony_ship£ ['concept_colony_ship'] or £colony_ship£ §H$concept_colony_ship$§!
 # Plural: £colony_ship£ ['concept_colony_ships'] or £colony_ship£ §H$concept_colony_ships$§!
 concept_colony_ship: "$colonizer$"
 concept_colony_ships: "$colonizer_plural$"
 concept_colony_ship_desc: "ยานอพยพ £colony_ship£ §H$concept_colony_ships$§! จะถูกส่งไปยังดาวเคราะห์ £planet£ ['concept_planets'] เพื่อเปลี่ยนให้เป็นอาณานิคม £colony£ ['concept_colonies']\n\n§H$concept_colony_ship$§! จะถูกสร้างขึ้นโดยอัตโนมัติเมื่อเริ่มกระบวนการตั้งถิ่นฐานจากอินเตอร์เฟส £interface£ ['concept_colony_view'] หรืออินเตอร์เฟส £interface£ ['concept_expansion_planner'] นอกจากนี้ยังสามารถสร้างได้ในอู่ต่อยาน ['concept_shipyard']"

 # Singular: £construction_ship£ ['concept_construction_ship'] or £construction_ship£ §H$concept_construction_ship$§!
 # Plural: £construction_ship£ ['concept_construction_ships']
 concept_construction_ship: "$constructor$"
 concept_construction_ships: "$constructor_plural$"
 concept_construction_ship_desc: "ยานก่อสร้าง £construction_ship£ §H$concept_construction_ship$§! ช่วยให้สามารถประกอบสถานีอวกาศต่างๆ ได้$tt_use$- สร้างฐานดวงดาวภายนอก ['concept_outposts'] ในระบบดาว £system£ ['concept_systems'] ที่ไม่มีผู้ครอบครองเพื่อขยายพรมแดนของ ['concept_empire']\n- สร้างสถานีขุดเจาะ £mining_station£ ['concept_mining_stations'] และสถานีวิจัย £science_ship£ ['concept_research_stations'] รอบๆ ดาวเคราะห์ £planet£ ['concept_planets'] และดาวฤกษ์ ['concept_stars'] ที่ผ่านการสำรวจแล้ว\n- สร้างสิ่งก่อสร้างขนาดยักษ์ ['concept_megastructures']\n- วิจัยโครงการพิเศษ ['concept_special_projects'] บางโครงการ$tt_gain$- สร้าง §H$concept_construction_ships$§! ในอู่ต่อยาน ['concept_shipyard']"

 # Singular: £science_ship£ ['concept_science_ship'] or £science_ship£ §H$concept_science_ship$§!
 # Plural: £science_ship£ ['concept_science_ships'] or £science_ship£ §H$concept_science_ships$§!
 concept_science_ship: "$science$"
 concept_science_ships: "$science_plural$"
 concept_science_ship_desc: "ยานสำรวจวิจัย £science_ship£ §H$concept_science_ships$§! เป็นยานเฉพาะทางที่ออกแบบมาสำหรับการสำรวจ รวบรวมข้อมูล และการดำเนินการวิจัย โดยมีนักวิทยาศาสตร์ £scientist£ ['concept_scientist'] ควบคุมยาน พวกเขาสามารถสำรวจระบบดาวที่ยังไม่มีแผนที่ วิเคราะห์ความผิดปกติ £anomaly£ ['concept_anomalies'] และสืบสวนโบราณสถาน £archaeology£ ['concept_archaeology_sites']\n\nวิทยาการของยานเหล่านี้จะถูกติดตั้งด้วยชิ้นส่วนส่วนประกอบ ['concept_components'] ที่ทันสมัยที่สุดที่มีอยู่โดยอัตโนมัติ และมีความจำเป็นอย่างยิ่งสำหรับการขยายตัวและการค้นพบในช่วงแรก\n\n§H$concept_science_ships$§! ยังสามารถใช้เพื่อสำรวจปรากฏการณ์กาแล็กซี เช่น รูหนอน ['concept_wormholes'], ค้นคว้าซากปรักหักพัง ['concept_debris'] ของยาน หรือเพื่อช่วยเหลือในโครงการพิเศษ ['concept_special_projects'] ที่ต้องการการวิเคราะห์อย่างละเอียด"

 # Singular: -
 # Plural: £consumer_goods£ ['concept_consumer_goods'] or £consumer_goods£ §H$concept_consumer_goods$§!
 concept_consumer_goods: "สินค้าอุปโภคบริโภค"
 concept_consumer_goods_desc: "[GetConceptConsumerGoods]"
 concept_consumer_goods_desc_start: "£consumer_goods£ §H$concept_consumer_goods$§! (สินค้าอุปโภคบริโภค) เป็นทรัพยากรขั้นสูงที่รวมถึงอุปกรณ์ต่างๆ สิ่งฟุ่มเฟือย และเครื่องมือที่จำเป็นเพื่อให้ประชากร £pop£ ['concept_pops'] มีชีวิตที่ดี"
 concept_consumer_goods_desc_end: "$tt_gain$- สร้าง £zone£ §H$zone_industrial_plural$§! หรือ £zone£ §H$zone_factory_plural$§!\n- สร้าง £building£ ['building:building_factory_1']\n- $tt_market$"
 concept_consumer_goods_desc_regular: "$concept_consumer_goods_desc_start$\n\nตำแหน่งงาน £job£ ['concept_jobs'] บางประเภทจำเป็นต้องใช้สิ่งเหล่านี้ในการปฏิบัติงาน เช่น £job_researcher£ ['concept_researcher'] หรือ £job_priest£ ['concept_priest']$concept_consumer_goods_desc_end$"
 concept_consumer_goods_desc_hive: "$tt_no_need_hive$\n\n$concept_consumer_goods_desc_regular$"
 concept_consumer_goods_desc_machine: "$tt_some_need_machine$\n\n$concept_consumer_goods_desc_start$\n\n['concept_auth_machine_intelligence', $auth_machine_intelligence_plural$] ที่มีแนวคิดสังคม §H$civic_machine_obsessional_directive$§! จะผลิต £consumer_goods£ §H$concept_consumer_goods$§! เช่นเดียวกับ §H$civic_machine_servitor_plural$§! ที่ผลิตให้กับประชากรของตนอย่าง £pop£ §Hประชากร $citizenship_organic_trophy$§!$concept_consumer_goods_desc_end$"

# Singular: -
 # Plural: £biomass£ ['concept_biomass'] or £biomass£ §H$biomass$§!
 concept_biomass: "ชีวมวล(ไบมาส)"
 concept_biomass_desc: "£biomass£ §Hไบโอมาส§! (ชีวมวล) คือศักยภาพทางอินทรียวัตถุดิบดิบที่สร้างขึ้นจากกิจกรรมทางชีวภาพทั่วโลกของระบบดาวที่ครอบครอง ['concept_owned_systems']\n\nชีวมวลถูกนำไปใช้สำหรับการสร้างสิ่งปลูกสร้างในดาวเคราะห์ £building£ ['concept_buildings'] และปรับเปลี่ยนสภาพดาวเคราะห์ ['concept_terraforming'] เป็นอาณานิคมใหม่ ['concept_colonies']$tt_gain$- เพิ่มจำนวนประชากร £pop£ ['concept_pops']\n- สร้างสิ่งปลูกสร้าง £building£ ['building:building_cradle_of_rebirth']"

 # Singular: £genetic_material£ ['concept_dna'] or £genetic_material£ §H$concept_dna$§!
 # Plural: -
 concept_dna: "$genetic_material$"
 concept_dna_desc: "£genetic_material£ §H$concept_dna$§! (ข้อมูลทางพันธุกรรม) ช่วยให้เราโคลนสิ่งมีชีวิตในอวกาศเพื่อใช้เป็นกองเรือทหารได้ ข้อมูลทางพันธุกรรมเกรดที่สูงขึ้นจะปลดล็อกการโคลนนิ่งสัตว์อวกาศ (§Yขอบเขตพื้นที่§!) เกรดที่สูงขึ้นที่สถานีเพาะพันธุ์ ['concept_hatchery',แฮทเชอร์ส์]\n\nข้อมูลทางพันธุกรรมสามารถเก็บรวบรวมได้จากธรรมชาติโดยใช้เทคโนโลยีด้านฟิสิกส์ £physics£ ['technology:tech_gravity_wells'] และการขยายพันธุ์ในห้องทดลองสัตว์อวกาศ ['concept_vivarium']"

 # Singular: £district£ ['concept_district'] or £district£ §H$concept_district$§!
 # Plural: £district£ ['concept_districts'] or £district£ §H$concept_districts$§!
 concept_district: "$DISTRICT$"
 concept_districts: "$DISTRICTS$"
 concept_district_desc: "เขตการปกครอง £district£ §H$concept_districts$§! เป็นพื้นที่เฉพาะด้านของอาณานิคม £colony£ ['concept_colony'] ตัวอย่างได้แก่ ['concept_generator_districts'] (เขตพลังงาน), ['concept_mining_districts'] (เขตเหมืองแร่) หรือ ['concept_farming_districts'] (เขตเกษตรกรรม)\n\nโดยทั่วไปเขตการปกครองจะมอบทั้งที่อยู่อาศัย £housing£ ['concept_housing'] และตำแหน่งงาน £job£ ['concept_jobs']$tt_gain$- สร้าง §H$concept_districts$§! เพิ่มเติมในอินเตอร์เฟส £interface£ ['concept_colony_view']"

 # Singular: ['concept_edict'] or §H$concept_edict$§!
 # Plural: ['concept_edicts'] or §H$concept_edicts$§!
 concept_edict: "ประกาศคำสั่ง"
 concept_edicts: "ประกาศคำสั่ง"
 concept_edicts_desc: "พระราชกฤษฎีกา §H$concept_edicts$§! คือการตัดสินใจทั่วทั้งจักรวรรดิที่ประกาศใช้โดยการใช้ทรัพยากรหรือการจ่ายค่าบำรุงรักษาเป็นรายเดือน\n\nส่วนใหญ่จะต้องการ $i_unity$ หรือจ่ายผ่านกองทุนพระราชกฤษฎีกา ['concept_edict_fund'] แม้ว่า §H$concept_edicts$§! บางฉบับอาจต้องจ่ายด้วยทรัพยากรอื่นก็ตาม\n\n§H$concept_edicts$§! จะถูกจัดการในแถบพระราชกฤษฎีกาและนโยบาย §H$government_view_tab_policies_and_edicts$§! ของอินเตอร์เฟส £interface£ ['concept_government_view']"

 # Singular: ['concept_edict_fund'] or §H$concept_edict_fund$§!
 # Plural: -
 concept_edict_fund: "กองทุนสำหรับประกาศคำสั่ง"
 concept_edict_fund_desc: "กองทุนพระราชกฤษฎีกา §H$concept_edict_fund$§! คือจำนวนรวมคงที่ของคะแนนความสามัคคี £unity£ ['concept_unity'] ที่ใช้สำหรับค่าบำรุงรักษาพระราชกฤษฎีกา ['concept_edict'] หากค่าบำรุงรักษาสูงเกินขีดความสามารถของ §H$concept_edict_fund$§! ก็จะใช้คะแนนความสามัคคี §H$concept_unity$§! เพิ่มเติม"

 # Singular: -
 # Plural: £energy£ ['concept_energy'] or £energy£ §H$concept_energy$§!
 concept_energy: "เครดิตพลังงาน"
 concept_energy_desc: "£energy£ §Hแหล่ง พลังงาน§! (พลังงานสำรอง) คือพลังงานที่เก็บไว้ซึ่งสามารถโอนย้ายได้และมีความสำคัญต่อจักรวรรดิอวกาศ ['concept_empires'] ทั้งหมด\n\nพลังงานสำรองถูกใช้สำหรับค่าบำรุงรักษาของ ['concept_ships'] และ ['concept_buildings'] เพื่อขจัดสิ่งกีดขวางบนดาวเคราะห์ £blocker£ ['concept_blockers'] และเมื่อทำข้อตกลงแลกเปลี่ยนกับผู้อื่น$tt_gain$- สร้างเขตพลังงาน £district£ ['concept_generator_districts']\n- สร้างสถานีขุดเจาะ £mining_station£ ['concept_mining_stations'] บนเทหวัตถุบนท้องฟ้าที่มีพลังงานหนาแน่น ['concept_celestial_objects']\n- $tt_market$"

 # Singular: ['concept_authority'] or §H$concept_authority$§!
 # Plural: ['concept_authorities'] or §H$concept_authorities$§!
 concept_authority: "อำนาจการปกครอง(ความจุ)"
 concept_authorities: "อำนาจการปกครอง(อรรถประโยชน์)"
 concept_authority_desc: "ระบบระเบียบการปกครอง §H$concept_authority$§! จะเป็นตัวกำหนดวิธีที่จักรวรรดิใช้เลือกผู้นำและปกครองประชากรของตน ระบบประชาธิปไตยและคณาธิปไตยจะมีการจัดการเลือกตั้งตามรอบเวลา ['concept_democratic_election'] ในขณะที่ระบบเผด็จการและระบบจักรวรรดิจะรวมศูนย์อำนาจไว้ในมือของผู้นำเพียงคนเดียว\n\nการเลือก §H$concept_authority$§! จะส่งผลต่อความพึงพอใจและการสนับสนุนของกลุ่มการเมืองต่างๆ ['concept_factions'], การสืบทอดตำแหน่งผู้นำ, แนวคิดสังคมที่มีให้เลือก ['concept_civics'] และความสัมพันธ์ทางการทูต\n\nระบบระเบียบการปกครองของจักรวรรดิจะถูกจัดตั้งขึ้นระหว่างการสร้างจักรวรรดิ แต่สามารถเปลี่ยนแปลงได้ในภายหลังผ่านการปฏิรูป หากเป็นไปตามเงื่อนไขที่กำหนดไว้"

 # Singular: ['concept_ethic'] or §H$concept_ethic$§!
 # Plural: ['concept_ethics'] or §H$concept_ethics$§!
 concept_ethic: "จริยธรรม (Ethic)"
 concept_ethics: "จริยธรรม (Ethics)"
 concept_ethic_desc: "จริยธรรมของจักรวรรดิ §H$concept_ethics$§! เป็นตัวแทนของความเชื่อทางอุดมการณ์หลักของจักรวรรดิ ซึ่งจะกำหนดนโยบาย โครงสร้างทางสังคม และท่าทีทางการทูต สิ่งเหล่านี้จำกัดความว่าผู้คนให้คุณค่ากับเสรีภาพหรือการควบคุมแบบอำนาจนิยม การพิชิตทางทหารหรือการร่วมมืออย่างสันติ\n\nจริยธรรมของจักรวรรดิจะส่งผลต่อแนวคิดสังคม ['concept_civics'], ระบบระเบียบการปกครอง ['concept_authorities'] และความสัมพันธ์กับจักรวรรดิอื่น แม้ว่าจริยธรรมจะถูกเลือกตอนสร้างจักรวรรดิ แต่ก็สามารถเปลี่ยนแปลงได้ตามกาลเวลาเนื่องจากแรงกดดันภายใน อิทธิพลของกลุ่มการเมือง หรือการปฏิรูปโดยเจตนาผ่านกลไกการเปลี่ยนจริยธรรม"

 # Singular: ['concept_faction'] or §H$concept_faction$§!
 # Plural: ['concept_factions'] or §H$concept_factions$§!
 concept_faction: "กลุ่มการเมือง"
 concept_factions: "กลุ่มการเมือง"
 concept_faction_desc: "กลุ่มการเมือง §H$concept_factions$§! คือกลุ่มประชากร £pop£ ['concept_pops'] ที่มีความต้องการร่วมกันเกี่ยวกับการปกครองของจักรวรรดิ ['concept_empire']\n\nความพึงพอใจของกลุ่มการเมือง ['concept_approval'] สะท้อนถึงความพึงพอใจของ §H$concept_faction$§! ต่อสถานะที่เป็นอยู่ ซึ่งส่งผลต่อความสุข £happiness£ ['concept_happiness'] ของประชากรในกลุ่มนั้น §H$concept_pops$§!\n\nความพึงพอใจของกลุ่มการเมือง §H$concept_approval$§! และคะแนนการสนับสนุน ['concept_support'] ที่สูงขึ้น จะช่วยมอบคะแนนความสามัคคี £unity£ ['concept_unity'] จากกลุ่มการเมือง §H$concept_faction$§! นั้นๆ ได้มากขึ้น"

 # Singular: ['concept_approval'] or §H$concept_approval$§!
 # Plural: -
 concept_approval: "ความพึงพอใจ (Approval)"
 concept_approval_desc: "ความพึงพอใจ §H$concept_approval$§! ของกลุ่มการเมือง ['concept_faction'] แสดงถึงความพอใจต่อสถานะที่เป็นอยู่ในปัจจุบัน และอาจส่งผลต่อความสุข £happiness£ ['concept_happiness'] ของประชากร £pop£ ['concept_pops'] ของกลุ่มการเมืองนั้น\n\nยิ่งความพึงพอใจ §H$concept_approval$§! และคะแนนสนับสนุน ['concept_support'] ของกลุ่มการเมืองสูงขึ้นเท่าใด ก็จะยิ่งได้รับคะแนนความสามัคคี £unity£ ['concept_unity'] จากกลุ่มการเมืองนั้นมากขึ้นเท่านั้น"

 # Singular: ['concept_support'] or §H$concept_support$§!
 # Plural: -
 concept_support: "คะแนนสนับสนุน(ชู๊ต)"
 concept_support_desc: "คะแนนสนับสนุน §H$concept_support$§! เป็นตัวแทนของความแข็งแกร่งทางการเมืองของกลุ่มการเมือง ['concept_faction'] คะแนนสนับสนุนจะเพิ่มขึ้นตามจำนวนประชากร £pop£ ['concept_pops'] ที่อยู่ในกลุ่มการเมือง §H$concept_faction$§! นั้น\n\nประชากร §H$concept_pops$§! ที่ได้รับสถานะสัญชาติเต็มขั้น(เสียงประชาชน)จะช่วยมอบการสนับสนุนได้มากกว่าประชากรที่ไม่มีสถานะสัญชาติมาก"

 # Singular: ['concept_endgame_crisis'] or §H$concept_endgame_crisis$§!
 # Plural: ['concept_endgame_crises'] or §H$concept_endgame_crises$§!
 concept_endgame_crisis: "ไครซิสตอนจบเกม"
 concept_endgame_crises: "ไครซิสตอนจบเกม"
 concept_endgame_crisis_desc: "เมื่อเกมสเตลาริสมาถึงช่วงท้ายเกม วิกฤตกาแล็กติกจะปรากฏขึ้น ไครซิสตอนจบเกมเหล่านี้อาจมีความท้าทายอย่างมากสำหรับผู้เล่นที่มีประสบการณ์\n\nไครซิสตอนจบเกม ตามปกติจะเกิดขึ้นหลังจากผ่าน §Iปีที่กำหนดให้จบเกม§!"

 # Singular: ['concept_fallen_empire'] or §H$concept_fallen_empire$§!
 # Plural: ['concept_fallen_empires'] or §H$concept_fallen_empires$§!
 concept_fallen_empire: "จักรวรรดิฟอลเล็น"
 concept_fallen_empires: "จักรวรรดิฟอลเล็น"
 concept_fallen_empires_desc: "จักรวรรดิฟอลเล็นเป็นอารยธรรมแรกเริ่มโบราณที่เริ่มต้นด้วยเทคโนโลยีขั้นสูงและกองยานที่ทรงพลัง โดยทั่วไปแล้วจะไม่โต้ตอบกับจักรวรรดิอื่นใด ในบางครั้งพวกเขาอาจเรียกร้องหรือเสนองานให้กับจักรวรรดิที่ด้อยกว่า\n\nการยั่วยุจักรวรรดิฟอลเล็นนั้นมีความเสี่ยงอย่างมาก เว้นแต่คุณจะมั่นใจในความสามารถของคุณที่จะเอาชนะได้พวกเขาได้"

 # Singular: ['concept_awakened_empire'] or §H$concept_awakened_empire$§!
 # Plural: ['concept_awakened_empires'] or §H$concept_awakened_empires$§!
 concept_fallen_empire_awakening: "จักรวรรดิฟอลเล็นที่ตื่นขึ้น"
 concept_awaken: "ตื่นขึ้น"
 concept_awakened_empire: "$COUNTRY_AWAKENED_FALLEN_EMPIRE$"
 concept_awakened_empires: "จักรวรรดิฟอลเล็นที่ตื่นขึ้น"
 concept_awakened_empires_desc: "$COUNTRY_AWAKENED_FALLEN_EMPIRE_DESC$"

 # Singular: £food£ ['concept_food'] or £food£ §H$concept_food$§!
 # Plural: -
 concept_food: "อาหาร"
 concept_food_desc: "[GetConceptFood]"
 concept_food_desc_end: "$tt_gain$§Y-§! สร้าง £district£ ['concept_farming_districts']\n- $tt_market$"
 concept_food_desc_regular: "£food£ §H$concept_food$§! (อาหาร) หมายถึงสารอาหารต่างๆ ที่จำเป็นต่อการดำรงชีวิตและการเติบโตของประชากร £pop£ ['concept_pops']$concept_food_desc_end$"
 concept_food_desc_machine: "$tt_some_need_machine$\n\n£food£ §H$food$§! เป็นแหล่งสารอาหารทางชีวภาพที่สิ่งมีชีวิตอินทรีย์ต้องการเพื่อหล่อเลี้ยงร่างกายอันอ่อนแอของตน\n\n§H$civic_machine_assimilator_plural$§! จะผลิตอาหาร £food£ §H$concept_food$§! ให้แก่ประชากรไซบอร์กของตน £pop£ §Hป๊อป ไซบอร์ก§! และ §H$civic_machine_servitor_plural$§! จะผลิตให้กับประชากรของตนอย่าง £pop£ §Hประชากร $citizenship_organic_trophy$§!$concept_food_desc_end$"
 concept_food_desc_infernal: "$tt_some_need_infernal$\n\n£food£ §H$food$§! เป็นสารอาหารทางชีวภาพที่สิ่งมีชีวิตอินทรีย์ที่เป็นประชากร £pop£ ['concept_pops'] จากเผ่าพันธุ์ต่างดาวต้องการเพื่อประทังร่างกายอันไร้ชีวิตชีวาของพวกเขา$concept_food_desc_end$"

 concept_flexible_traditions: "ธรรมเนียมปฏิบัติที่ยืดหยุ่น(ตามประเพณี)"
 concept_flexible_tradition: "ธรรมเนียมปฏิบัติที่ยืดหยุ่น(ตามธรรมเนียม)"
 concept_flexible_traditions_desc: "ธรรมเนียมปฏิบัติที่ยืดหยุ่นคือการเลือกสายธรรมเนียม ['concept_traditions'] ที่ถูกกำหนดตามทางเลือกต่างๆ ที่เกิดขึ้นระหว่างการเล่นเกม"

 # Singular: ['concept_gateway'] or §H$concept_gateway$§!
 # Plural: ['concept_gateways'] or §H$concept_gateways$§!
 concept_gateway: "เกตเวย์"
 concept_gateways: "เกตเวย์"
 concept_gateways_desc: "เกตเวย์เป็นโครงสร้างขนาดใหญ่ที่สร้างเป็นทางลัดในอวกาศ ทำให้สามารถเดินทางไปยังเกตเวย์อื่นๆในเครือข่ายได้แทบจะทันที"

 # Singular: ['concept_great_khan'] or §H$concept_great_khan$§!
 # Plural: -
 concept_great_khan: "ข่านผู้ยิ่งใหญ่"
 concept_great_khan_desc: "ข่านผู้ยิ่งใหญ่เป็นอีเวนต์เชนช่วงกลางเกมที่เผ่าต่างๆของ['concept_marauder_empires', $concept_marauder_empire$]รวมเป็นหนึ่งโดยผู้นำที่ทรงพลังคือจอมโจรข่าน พวกเขาจะหาทางพิชิตจักรวรรดิอื่นและบังคับให้ยอมจำนน$requires_apoc$"

 # Singular: ['concept_grand_admiral'] or §H$concept_grand_admiral$§!
 # Plural: -
 concept_grand_admiral: "$DIFFICULTY_GRAND_ADMIRAL$"
 concept_grand_admiral_desc: "$DIFFICULTY_GRAND_ADMIRAL_DESC$"

 # Singular: ['concept_guaranteed_colonies'] or §H$concept_guaranteed_colonies$§!
 # Plural: -
 concept_guaranteed_colonies: "$FE_GUARANTEED_COLONIES$"
 concept_guaranteed_colonies_desc: "ส่วนนี้จะควบคุมจำนวนของดาวเคราะห์ที่อาศัยอยู่ได้ที่เป็นประเภทเดียวกับดาวบ้านเกิดของคุณ ซึ่งรับประกันว่าจะเกิดใกล้กับระบบดาวเริ่มต้นของคุณ หากปิดตัวเลือกนี้ อาจส่งผลให้คุณไม่พบดาวเคราะห์ที่สามารถอยู่อาศัยได้เลยในบริเวณใกล้เคียงกับดาวบ้านเกิดของคุณ"

 # Singular: ['concept_hatchery'] or §H$concept_hatchery$§!
 # Plural: -
 concept_hatchery: "$sm_hatchery$"
 concept_hatchery_desc: "สถานีเพาะพันธุ์ §Yแฮทเชอร์ส์§! ช่วยให้เราฟักไข่ข้อมูลทางพันธุกรรม £genetic_material£ ['concept_dna'] ที่เก็บรวบรวมมาได้เพื่อทำการโคลนนิ่งสัตว์อวกาศ §Yขอบเขตพื้นที่§! ไปใช้เป็นกองเรือทหาร"

 # Singular: ['concept_hyperlane'] or §H$concept_hyperlane$§!
 # Plural: ['concept_hyperlanes'] or §H$concept_hyperlanes$§!
 concept_hyperlane: "ไฮเปอร์เลน"
 concept_hyperlanes: "ไฮเปอร์เลน"
 concept_hyperlanes_desc: "เส้นทางไฮเปอร์เลน §H$concept_hyperlanes$§! คือช่องทางซับสเปซที่เกิดขึ้นตามธรรมชาติระหว่างแรงดึงดูดของดวงดาว การใช้ไฮเปอร์ไดรฟ์เพื่อเดินทางไปตาม §H$concept_hyperlanes$§! เป็นวิธีการเดินทางระหว่างดวงดาวหลักในอวกาศ"

 # Singular: £job£ ['concept_job'] or §H$concept_job$§!
 # Plural: £job£ ['concept_jobs'] or §H$concept_jobs$§!
 concept_job: "ตำแหน่งงาน"
 concept_jobs: "งาน/อาชีพ"
 concept_job_desc: "ตำแหน่งงาน £job£ §H$concept_jobs$§! เป็นบทบาทและวิชาชีพที่ประชากร £pop£ ['concept_pops'] ทำภายในจักรวรรดิ ซึ่งจะเป็นตัวกำหนดการผลิตทรัพยากร ผลผลิตงานวิจัย และหน้าที่ทางสังคม\n\nงานจะจัดหาให้โดยเขตการปกครอง £district£ ['concept_districts'], ความเชี่ยวชาญเฉพาะด้านเขตการปกครอง £zone£ ['concept_district_specializations'], สิ่งปลูกสร้าง £building£ ['concept_buildings'] และลักษณะเด่นอื่นๆ บนดาวเคราะห์ โดยแต่ละประเภทจะตอบสนองความต้องการเฉพาะด้านเศรษฐกิจ วิทยาศาสตร์ หรือการทหาร\n\nการจัดสรรตำแหน่งงาน §H$concept_jobs$§! ส่งผลโดยตรงต่อความมั่นคงทางเศรษฐกิจ พลวัตทางการเมือง และประสิทธิภาพโดยรวมของจักรวรรดิ\n\n§H$concept_jobs$§! จะถูกจัดการในอินเตอร์เฟส £interface£ ['concept_colony_view']"

 # Singular: £job£ ['concept_job'] or §H$concept_job$§!
 # -
 concept_unemployment: "การว่างงาน"
 concept_unemployment_desc: "ประชากรที่ว่างงาน £pop£ §Hป๊อปที่ไม่ได้ใช้§! จะไม่มีตำแหน่งงาน £job£ ['concept_job'] ให้ปฏิบัติงาน พวกเขาจะไม่ผลิตทรัพยากรใดๆ และอาจลดความมั่นคง £stability£ ['concept_stability'] ของอาณานิคม £colony£ ['concept_colony'] ได้"

 # Singular: ['concept_l_gate'] or §H$concept_l_gate$§!
 # Plural: ['concept_l_gates'] or §H$concept_l_gates$§!
 concept_l_gate: "แอล-เกต(L-Gate)"
 concept_l_gates: "แอล-เกต(L-Gates)"
 concept_l_gates_desc: "เครือข่ายลึกลับของเกตเวย์ที่เชื่อมต่อกับเครือข่ายย่อยที่แยกจากกัน ดูเหมือนว่าพวกมันจะถูกปิดใช้งานโดยเจตนา"

 # Singular: ['concept_machine_uprising'] or §H$concept_machine_uprising$§!
 # Plural: -
 concept_machine_uprising: "ปฎิวัติเครื่องจักร"
 concept_machine_uprising_desc: "เหตุการณ์เครื่องจักรลุกฮือ(คราง)คือเหตุการณ์ต่อเนื่องในช่วงกลางเกมที่คนรับใช้หุ่นยนต์ที่มีปัญญาประดิษฐ์(ไอ)พยายามกบฏต่อจักรวรรดิผู้สร้างของตน สิ่งนี้อาจนำไปสู่การจัดตั้งหน่วยงานปกครองเครื่องจักรแบบใหม่ ['authority:auth_machine_intelligence'] ขึ้นในกาแล็กซี$requires_syn_dawn$"

 # Singular: ['concept_marauder_empire'] or §H$concept_marauder_empire$§!
 # Plural: ['concept_marauder_empires'] or §H$concept_marauder_empires$§!
 concept_marauder_empire: "จักรวรรดิจอมโจร"
 concept_marauder_empires: "จักรวรรดิจอมโจร"
 concept_marauder_empires_desc: "จักรวรรดิจอมโจรเป็นอารยธรรมในอวกาศที่ใช้เวลาส่วนใหญ่ไปกับการต่อสู้กันเองและโจมตีเพื่อนบ้าน บางครั้งพวกเขาอาจเรียกเก็บ ส่วย(ค่าคุ้มครอง) จากจักรวรรดิอื่น"

 # Singular: £market£ ['concept_market'] or £market£ §H$concept_market$§!
 # Plural: -
 concept_market: "$MARKET_VIEW$"
 concept_market_desc: "ตลาดกลาง §H$concept_market$§! ช่วยให้จักรวรรดิต่างๆ ซื้อและขายทรัพยากร เพื่อปรับเปลี่ยนเศรษฐกิจให้ตรงกับความต้องการในขณะนั้นหรือกลยุทธ์ระยะยาว การแลกเปลี่ยนสามารถทำเป็นแบบรายครั้งหรือตั้งค่าเป็นข้อตกลงมูลค่าการค้า £trade_value£ ['concept_trade'] รายเดือนเพื่อรับรองว่าจะมีทรัพยากรจำเป็นส่งเข้ามาอย่างต่อเนื่อง\n\nราคาจะมีความผันผวนตามอุปสงค์และอุปทานทั่วทั้งระบบเศรษฐกิจกาแล็กซี โดยการซื้อขายที่เกิดขึ้นบ่อยครั้งจะส่งผลต่อราคากลางในตลาด จักรวรรดิที่มีธรรมเนียมการค้า ['tradition_category:tradition_mercantile'] หรือโครงสร้างองค์กรธุรกิจอาจได้รับประโยชน์เพิ่มเติมเมื่อมีส่วนร่วมในการค้า"

 # Singular: £megastructure£ ['concept_megastructure'] or £megastructure£ §H$concept_megastructure$§!
 # Plural: £megastructure£ ['concept_megastructures'] or £megastructure£ §H$concept_megastructures$§!
 concept_megastructure: "$MEGASTRUCTURE$"
 concept_megastructures: "$megastructures$"
 concept_megastructure_desc: "สิ่งก่อสร้างยักษ์ £megastructure£ §H$concept_megastructures$§! เป็นโครงการวิศวกรรมขนาดมหึมาที่แสดงถึงศักยภาพทางเทคโนโลยีและเศรษฐกิจอันรุ่งเรืองของจักรวรรดิที่ก้าวหน้า มักถูกสร้างขึ้นเป็นขั้นตอนต่างๆ เพื่อรับใช้วัตถุประสงค์ด้านกลยุทธ์ วิทยาศาสตร์ หรือเศรษฐกิจ\n\nการสร้าง §H$concept_megastructure$§! ต้องใช้การลงทุนอย่างมหาศาล การวิจัยขั้นสูง และรากฐานการขนส่งโลจิสติกส์ที่มั่นคง โดยเริ่มต้นสร้างด้วยยานก่อสร้าง £construction_ship£ ['concept_construction_ship'] มักเป็นที่จุดพิกัดดาวที่กำหนดไว้ในอวกาศ\n\nเมื่อเสร็จสิ้น สิ่งก่อสร้างขนาดยักษ์เหล่านี้จะปรับเปลี่ยนแผนที่ของกาแล็กซี และตั้งตระหง่านเป็นอนุสาวรีย์แห่งความทะเยอทะยานบนมาตราส่วนจักรวาล"

 # Singular: -
 # Plural: £minerals£ ['concept_minerals'] or £minerals£ §H$concept_minerals$§!
 concept_minerals: "แร่"
 concept_minerals_desc: "[GetConceptMinerals]"
 concept_minerals_desc_start: "แร่ธาตุ £minerals£ §Hเหมือง§! ครอบคลุมถึงทรัพยากรพื้นฐานที่ใช้ในการก่อสร้าง\n\nแร่ธาตุถูกใช้ในการสร้างสิ่งปลูกสร้างในดาวเคราะห์ £building£ ['concept_buildings'] และสถานีอวกาศพลเรือน £mining_station£ £science_ship£ ['concept_civilian_space_stations'] นอกจากนี้ยังสามารถนำไปถลุงให้เป็นโลหะผสม £alloys£ ['concept_alloys']"
 concept_minerals_desc_end: "$tt_gain$- สร้างเขตเหมืองแร่ £district£ ['concept_mining_districts']\n- สร้างสถานีขุดเจาะ £mining_station£ ['concept_mining_stations'] บนเทหวัตถุบนท้องฟ้าที่อุดมไปด้วยแร่ธาตุ ['concept_celestial_objects']\n- $tt_market$"
 concept_minerals_desc_regular: "$concept_minerals_desc_start$ หรือสินค้าอุปโภคบริโภค £consumer_goods£ ['concept_consumer_goods']$concept_minerals_desc_end$"
 concept_minerals_desc_hive: "$concept_minerals_desc_start$$concept_minerals_desc_end$"

 # Singular: £mining_station£ ['concept_mining_station'] or £mining_station£ §H$concept_mining_station$§!
 # Plural: £mining_station£ ['concept_mining_stations'] or £mining_station£ §H$concept_mining_stations$§!
 concept_mining_station: "$mining_station$"
 concept_mining_stations: "$mining_station_plural$"
 concept_mining_station_desc: "สถานีขุดเจาะ £mining_station£ §H$concept_mining_station$§! เป็นสิ่งก่อสร้างในวงโคจรที่สกัดทรัพยากรที่มีค่าจากเทหวัตถุบนท้องฟ้า ตัวอย่างเช่น พลังงาน £energy£ ['concept_energy'], แร่ธาตุ £minerals£ ['concept_minerals'] หรือโลหะผสม £alloys£ ['concept_alloys']$tt_gain$- ใช้ยานก่อสร้าง £construction_ship£ ['concept_construction_ships'] เพื่อสร้างสถานีขุดเจาะ §H$concept_mining_stations$§! รอบๆ เทหวัตถุบนท้องฟ้าที่อุดมไปด้วยทรัพยากร ['concept_celestial_objects']"

 # Reusable snippets
 tt_build_research_stations: "ใช้ยานก่อสร้าง £construction_ship£ ['concept_construction_ships'] เพื่อสร้างสถานีวิจัย £science_ship£ ['concept_research_stations'] รอบๆ เทหวัตถุบนท้องฟ้าที่อุดมไปด้วยข้อมูลการวิจัย ['concept_celestial_objects']"
 tt_research_gain: "$tt_gain$- ใช้ประโยชน์จากตำแหน่งงาน £job£ ['concept_jobs'] บางประเภท เช่น จากสิ่งปลูกสร้าง £building£ ['building:building_research_lab_1']\n- $tt_build_research_stations$"
 concept_research_shared: "\n\nคะแนนการวิจัยที่สะสมไว้ §Hงานวิจัยที่เก็บไว้§! จะได้รับจากเหตุการณ์บางอย่างหรือเมื่อไม่มีการวิจัยที่เลือกไว้ ในแต่ละเดือน คะแนนวิจัยสะสมจะถูกนำไปใช้เท่ากับจำนวนคะแนนการวิจัยที่ผลิตได้ต่อเดือน เพื่อช่วยเร่งความเร็วในการวิจัย$tt_research_gain$"

 # Singular: £physics£ ['concept_physics_research'] or £physics£ §H$concept_physics_research$§!
 # Plural: -
 concept_physics_research: "การวิจัยฟิสิกส์"
 concept_physics_research_desc: "การวิจัยด้านฟิสิกส์ £physics£ §H$concept_physics_research$§! เป็นหนึ่งในสามสาขาของการศึกษาวิจัย โดยรวบรวมเทคโนโลยีในด้านต่างๆ เช่น การคำนวณคอมพิวเตอร์ (§Hการคอมไพล์§!), การควบคุมสนามแรงโน้มถ่วง (§Hแบบอักษร:§!) และฟิสิกส์อนุภาค (§Hอนุภาค§!) $concept_research_shared$"

 # Singular: £society£ ['concept_society_research'] or £society£ §H$concept_society_research$§!
 # Plural: -
 concept_society_research: "การวิจัยสังคม"
 concept_society_research_desc: "การวิจัยด้านสังคม £society£ §H$concept_society_research$§! เป็นหนึ่งในสามสาขาของการศึกษาวิจัย โดยรวบรวมเทคโนโลยีในด้านต่างๆ เช่น ชีววิทยา (§Hชีววิทยา§!), รัฐศาสตร์ศาสตร์แห่งการปกครอง (§Hหัตถกรรม§!) และโลกใบใหม่ (§Hโลก ใหม่§!) $concept_research_shared$"

 # Singular: £engineering£ ['concept_engineering_research'] or £engineering£ §H$concept_engineering_research$§!
 # Plural: -
 concept_engineering_research: "การวิจัยวิศวกรรม"
 concept_engineering_research_desc: "การวิจัยด้านวิศวกรรม £engineering£ §H$concept_engineering_research$§! เป็นหนึ่งในสามสาขาของการศึกษาวิจัย โดยรวบรวมเทคโนโลยีในด้านต่างๆ เช่น อุตสาหกรรม (§Hอัตราเร็ว:§!), ระบบขับเคลื่อนยานอวกาศ (§Hการ ขับ ดัน§!) และยานอวกาศ (§Hนามบัตรเสมือน§!) $concept_research_shared$"

 # Singular: ['concept_policy'] or §H$concept_policy$§!
 # Plural: ['concept_policies'] or §H$concept_policies$§!
 concept_policies: "นโยบาย"
 concept_policy: "นโยบาย"
 concept_policies_desc: "นโยบาย §H$concept_policies$§! จะระบุท่าทีของจักรวรรดิ ['concept_empire'] ที่มีต่อจักรวรรดิอื่น วิธีการปฏิบัติรักษาประชากร £pop£ ['concept_pops'] และรูปแบบพฤทีุกรรมที่ยอมรับได้\n\n§H$concept_policies$§! จะถูกจัดการในแถบพระราชกฤษฎีกาและนโยบาย §H$government_view_tab_policies_and_edicts$§! ของอินเตอร์เฟส £interface£ ['concept_government_view']"

 # Singular: £pop£ ['concept_pop'] or £pop£ §H$concept_pop$§!
 # Plural: £pop£ ['concept_pops'] or £pop£ §H$concept_pops$§!
 concept_pop: "ประชากร(พ็อป)"
 concept_pops: "ประชากร (ประชากร)"
 concept_pop_desc: "ประชากร £pop£ §H$concept_pop$§! คือกลุ่มของสิ่งมีชีวิตที่มีความรู้สึกนึกคิดในเผ่าพันธุ์เดียวกัน ['concept_species'] ที่ทำตำแหน่งงานเดียวกัน £job£ ['concept_job'] และมีความเห็นพ้องจริยธรรมเดียวกัน ['concept_ethic']$tt_gain$- เติบโตประชากรอินทรีย์ £pop£ §Hชีวภาพ Pops§! และประกอบประชากรเครื่องจักรกล £pop£ §HMechanical Pops§!\n- ซื้อประชากร §H$concept_pops$§! ในตลาดทาส £market£ §HSlave Market§!\n- ได้รับประชากร §H$concept_pops$§! จากเหตุการณ์บางอย่าง"

 # Singular: -
 # Plural: ['concept_preftl_civilizations'] or §H$concept_preftl_civilizations$§!
 concept_preftl_civilizations: "อารยธรรมก่อน FL"
 concept_preftl_civilizations_desc: "อารยธรรมพรี-เอฟทีแอลเป็นอารยธรรมที่ยังไม่ประสบความสำเร็จในการเดินทางในอวกาศที่เร็วกว่าแสง พวกเขามีเทคโนโลยีในช่วงตั้งแต่ยุคหินไปจนถึงยุคอวกาศตอนต้นและโดยทั่วไปไม่รู้ว่ามีสิ่งมีชีวิตต่างดาวอยู่"

