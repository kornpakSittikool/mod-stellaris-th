 concept_civilian_ship: "ยานพลเรือน"
 concept_civilian_ships: "ยานพลเรือน"
 concept_civilian_ship_desc: "ยานพลเรือน §H$concept_civilian_ships$§! จะถูกสร้างขึ้นที่สถานีอวกาศหลัก ['concept_starbases'] เพื่อใช้สร้างสิ่งก่อสร้างในอวกาศ สำรวจสิ่งที่ไม่รู้จัก และตั้งถิ่นฐานโลกใหม่\n\nตัวอย่างได้แก่ ยานก่อสร้าง £construction_ship£ ['concept_construction_ships'], ยานสำรวจวิจัย £science_ship£ ['concept_science_ships'] และยานอพยพ £colony_ship£ ['concept_colony_ships']"

 # Singular: ['concept_military_ship'] or §H$concept_military_ship$§!
 # Plural: ['concept_military_ships'] or §H$concept_military_ships$§!
 concept_military_ship: "ยานรบทางทหาร(เรือเอก)"
 concept_military_ships: "ยานรบทางทหาร(เรือเอก)"
 concept_military_ship_desc: "ยานรบทางทหาร §H$concept_military_ships$§! ถูกสร้างขึ้นที่สถานีอวกาศหลัก ['concept_starbases'] เพื่อต่อสู้ในการรบในอวกาศกับจักรวรรดิที่เป็นคู่ปรับ ['concept_empires'] และสัตว์อวกาศที่เป็นภัยคุกคาม ['concept_space_fauna']\n\nโดยจัดโครงสร้างเข้าเป็นกองเรือรบ ['concept_fleets'] ซึ่งมียานหลายขนาด แต่ละขนาดจะมอบคุณสมบัติจุดเด่นเฉพาะตัวและข้อได้เปรียบทางกลยุทธ์ให้กับกองเรือ §H$concept_fleet$§!\n\nยานรบทางทหาร §H$concept_military_ships$§! จะถูกออกแบบในแผงนักออกแบบยาน §H$SHIP_DESIGNER$§! ของอินเตอร์เฟส £interface£ ['concept_fleet_management_view']"

 # Singular: ['concept_fleet'] or §H$concept_fleet$§!
 # Plural: ['concept_fleets'] or §H$concept_fleets$§!
 concept_fleet: "กองเรือรบ (กองยาน)"
 concept_fleets: "กองเรือรบ(ฟลีท)"
 concept_fleet_desc: "กองเรือรบ §H$concept_fleets$§! เป็นกลุ่มของยานรบทางทหาร ['concept_military_ships'] ที่ทำงานร่วมกัน โดยขนาดรวมของยานอวกาศ §H$concept_ships$§! จะประกอบกันขึ้นเป็นขนาดของกองเรือรบ ['concept_fleet_size']\n\nกองเรือรบ §H$concept_fleet$§! ที่นำโดยผู้บัญชาการทหาร £commander£ ['concept_commander'] อาจได้รับโบนัสหรือผลลดหย่อนประสิทธิภาพตามคุณลักษณะผู้นำ ['concept_leader_traits'] ของพวกเขา\n\nกองเรือรบ §H$concept_fleets$§! จะได้รับการบริหารจัดโครงสร้างในแถบผู้จัดการกองเรือ §H$FLEET_MANAGER_VIEW$§! ของอินเตอร์เฟส £interface£ ['concept_fleet_management_view']"

 # Singular: ['concept_fleet_size'] or §H$concept_fleet_size$§!
 # Plural: -
 concept_fleet_size: "ขนาดกองเรือรบ (กองยานขนาด)"
 concept_fleet_size_desc: "ขนาดกองเรือรบ §H$concept_fleet_size$§! คือผลรวมของขนาดยานรบทางทหาร ['concept_military_ship'] ทั้งหมดในกองเรือ ['concept_fleet']\n\nขีดความสามารถการรวมขนาดกองเรือรบ §H$concept_fleet_size$§! ที่สามารถควบคุมได้ต่อหนึ่งกองเรือรบ §H$concept_fleet$§! จะถูกกำหนดโดยขีดจำกัดการบังคับบัญชา ['concept_command_limit']\n\nขนาดกองเรือรบโดยรวม §H$concept_fleet_size$§! ของกองเรือรบทั้งหมด §H$concept_fleets$§! ที่จักรวรรดิ ['concept_empire'] จะรองรับบำรุงรักษาได้อย่างมีประสิทธิภาพจะถูกควบคุมโดยขีดความสามารถของกองเรือทหารเรือ ['concept_naval_capacity']"

 # Singular: ['concept_command_limit'] or §H$concept_command_limit$§!
 # Plural: -
 concept_command_limit: "ขีดจำกัดการบังคับบัญชา(จํากัดความ)"
 concept_command_limit_desc: "ขีดจำกัดการบังคับบัญชา §H$concept_command_limit$§! จะกำหนดขนาดยานรบทางทหารรวมสูงสุด ['concept_military_ship'] ที่สามารถควบคุมได้ในฐานะกองเรือรบเดี่ยว ['concept_fleet']\n\nตัวอย่างเช่น ขีดจำกัดการบังคับบัญชา §H$concept_command_limit$§! สามารถเพิ่มขึ้นได้โดยการวิจัยเทคโนโลยีวิทยาการ ['concept_technologies'], ธรรมเนียมปฏิบัติ ['concept_traditions'] บางอย่าง หรือแนวคิดสังคมจักรวรรดิ ['concept_civics']"

 # Singular: ['concept_ship_upkeep'] or §H$concept_ship_upkeep$§!
 # Singular: ['concept_logistics_upkeep'] or §H$concept_logistics_upkeep$§!
 # Plural: -
 concept_ship_upkeep: "ค่าบำรุงรักษายาน(โบกยก)"
 concept_logistics_upkeep: "ค่าบำรุงรักษาการขนส่งกำลังบำรุง (Logistics Upkeep)"
 concept_ship_upkeep_desc: "ค่าบำรุงรักษายาน §H$concept_ship_upkeep$§! คือต้นทุนทรัพยากรที่ต้องจ่ายอย่างต่อเนื่องเพื่อบำรุงรักษายานอวกาศที่ปฏิบัติงานอยู่ ซึ่งรวมถึงยานอวกาศพลเรือนและทหารเรือ\n\nยานอวกาศส่วนใหญ่ต้องการทรัพยากรหลายอย่างผสมกันในการบำรุงรักษา และต้นทุนจะถูกกำหนดโดยคลาสประเภทของยานและอุปกรณ์ชิ้นส่วนที่ติดตั้งอยู่ อย่างไรก็ตาม การมียานอวกาศเกินจำนวนขีดความสามารถของกองเรือทหารเรือของจักรวรรดิ ['concept_naval_capacity'] จะทำให้ต้นทุนค่าบำรุงรักษายานอวกาศทั้งหมดเพิ่มขึ้นอย่างมหาศาล"

 # Singular: ['concept_colony_upkeep'] or §H$concept_colony_upkeep$§!
 # Plural: -
 concept_colony_upkeep: "ค่าบำรุงรักษาอาณานิคม(โค้ชยกขา)"
 concept_colony_upkeep_desc: "ค่าบำรุงรักษาอาณานิคม §H$concept_colony_upkeep$§! หมายถึงต้นทุนทรัพยากรที่ต้องใช้จ่ายอย่างต่อเนื่องเพื่อรักษาสาธารณูปโภคขั้นพื้นฐานและประชากรของอาณานิคม £colony£ ['concept_colony'] ซึ่งรวมถึงค่าบำรุงรักษาเขตการปกครอง £district£ ['concept_districts'], สิ่งปลูกสร้าง £building£ ['concept_buildings'] และตำแหน่งงาน £job£ ['concept_jobs'] เช่นเดียวกับความต้องการพื้นฐานในแต่ละวันของประชากรในอาณานิคม\n\nการจัดการค่าบำรุงรักษาอย่างมีประสิทธิภาพเป็นสิ่งจำเป็นเพื่อให้แน่ใจในความมั่นคง ป้องกันการขาดแคลนทรัพยากร และรักษาประสิทธิภาพทางเศรษฐกิจทั่วทั้งจักรวรรดิ ค่าบำรุงรักษาของอาณานิคมสามารถตรวจสอบได้ในแถบสรุปดาวเคราะห์ $colony_view_tab_planet_summary$ ของอินเตอร์เฟส £interface£ ['concept_colony_view']"

 # Singular: ['concept_species'] or §H$concept_species$§!
 # Plural: ['concept_species'] or §H$concept_species$§!
 concept_species: "เผ่าพันธุ์ (เผ่าพันธุ์)"
 concept_species_desc: "§H$concept_species$§! (เผ่าพันธุ์) คือกลุ่มของสิ่งมีชีวิตทางชีวภาพหรือสิ่งประดิษฐ์ทางเครื่องจักรกลที่มีความจำเพาะ โดยมีลักษณะเด่นของเผ่าพันธุ์ร่วมกัน ['concept_species_traits'], จุดกำเนิด หรือการปรับตัวทางกายภาพ\n\nการวิจัยเทคโนโลยีขั้นสูง ['concept_technologies']หรือเฉพาะเจาะจงนโยบายบางอย่าง ['concept_policies'] อาจช่วยให้จักรวรรดิสามารถดัดแปลงพันธุกรรมของเผ่าพันธุ์ตนเพื่อความเชี่ยวชาญเฉพาะด้านหรือเพื่อปฏิรูปรูปร่างลักษณะไปอย่างสิ้นเชิงเมื่อเวลาผ่านไป เผ่าพันธุ์ทั้งหมดในจักรวรรดิจะถูกจัดการในอินเตอร์เฟส £interface£ ['concept_species_view']"

 # Singular: ['concept_species_class'] or §H$concept_species_class$§!
 # Plural: -
 concept_species_class: "คลาส/ประเภทของเผ่าพันธุ์"
 concept_species_class_desc: "คลาสเผ่าพันธุ์ (เผ่าพันธุ์คลาส)จะอธิบายหมวดหมู่กว้างๆ ของประเภท §Iชนิด§! ตัวอย่างเช่น สัตว์ปีก(ชีวิตคน)สัตว์เลื้อยคลาน(เกษตร)พืชจำพวกเห็ดรา(ฟังลอย)เป็นต้น"


 # Singular: ['concept_species_trait'] or §H$concept_species_trait$§!
 # Plural: ['concept_species_traits'] or §H$concept_species_traits$§!
 concept_species_trait: "ลักษณะเด่นของเผ่าพันธุ์ (เผ่าพันธุ์ทริท)"
 concept_species_traits: "ลักษณะเด่นของเผ่าพันธุ์ (เผ่าพันธุ์โปร่งแสง)"
 concept_species_trait_desc: "ลักษณะเด่นของเผ่าพันธุ์ §H$concept_species_traits$§! จะระบุลักษณะเฉพาะทางชีวภาพหรือทางกลไกที่มีมาแต่กำเนิดของ ['concept_species'] ซึ่งส่งผลต่อพฤติกรรม ขีดความสามารถ และความเหมาะสมกับสภาพแวดล้อมและหน้าที่การงานต่างๆ\n\nลักษณะเด่นสามารถถูกดัดแปลงได้ผ่านการดัดแปลงพันธุกรรมหรือการใช้วิทยาการขั้นสูงอื่นๆ ['concept_technologies']"

 # Singular 1: ['concept_starbase'] or §H$concept_starbase$§!
 # Plural 1: ['concept_starbases'] or §H$concept_starbases$§!
 # Singular 2: ['concept_military_space_station'] or §H$concept_military_space_station$§!
 # Plural 2: ['concept_military_space_stations'] or §H$concept_military_space_stations$§!
 concept_starbase: "$station_generic_01$"
 concept_starbases: "$station_generic_01_plural$"
 concept_military_space_station: "สถานีอวกาศรบทางทหาร(สถานีอวกาศมิลิตา)"
 concept_military_space_stations: "สถานีอวกาศรบทางทหาร(สถานีอวกาศมิลิตา)"
 concept_starbase_desc: "สถานีอวกาศหลัก §H$concept_starbases$§! เป็นสิ่งก่อสร้างทางทหารที่สามารถอัปเกรดได้ ซึ่งทำหน้าที่จัดตั้งและรักษาความเป็นเจ้าของเหนือระบบดาว\n\nเมื่ออัปเกรดจากฐานดวงดาวภายนอก ['concept_outposts'] พวกมันจะสามารถติดตั้งมอดูล (§Hมอดูล§!) และสิ่งปลูกสร้าง (§Hอาคาร§!) เพื่อเชี่ยวชาญในบทบาทต่างๆ ตัวอย่างเช่น การติดตั้งมอดูลอู่ต่อยาน ['concept_shipyard'] เพื่อสร้างยานอวกาศ ['concept_ships']\n\nป้อมปราการป้องกัน ['concept_defense_platforms'] จะช่วยเสริมขีดความสามารถในการป้องกันผู้รุกราน และสถานีอวกาศหลักยังทำหน้าที่เป็นศูนย์กลางหลักสำหรับการเกณฑ์กองทัพทหารบก ['concept_armies'] อีกด้วย\n\nจำนวนของสถานีอวกาศหลัก §H$concept_starbases$§! ที่ได้รับการอัปเกรดแล้วซึ่งจักรวรรดิสามารถรองรับได้จะถูกจำกัดโดยขีดความสามารถของสถานีอวกาศหลัก ['concept_starbase_capacity']\n\n§H$concept_starbases$§! จะถูกจัดการผ่านอินเตอร์เฟส £interface£ ['concept_starbase_view']"

 # Singular: ['concept_technology'] or §H$concept_technology$§!
 # Plural: ['concept_technologies'] or §H$concept_technologies$§!
 concept_technology: "เทคโนโลยี"
 concept_technologies: "เทคโนโลยี"
 concept_technology_desc: "เทคโนโลยีที่ปลดล็อกผ่านการวิจัยเป็นหนึ่งในวิธีหลักในการเพิ่มความแข็งแกร่งให้กับจักรวรรดิ\n\nเทคโนโลยีแบ่งออกเป็นสามสาขาการศึกษา:\n$t$£physics£ การวิจัยฟิสิกส์ ['concept_physics_research']\n$t$£society£ การวิจัยสังคม ['concept_society_research']\n$t$£engineering£ การวิจัยวิศวกรรม ['concept_engineering_research']"

 # Singular: ['concept_tradition'] or §H$concept_tradition$§!
 # Plural: ['concept_traditions'] or §H$concept_traditions$§!
 concept_tradition: "วัฒนธรรม"
 concept_traditions: "วัฒนธรรม"
 concept_traditions_desc: "ธรรมเนียมปฏิบัติ §H$concept_traditions$§! จะมอบคุณประโยชน์โบนัสทั่วทั้งจักรวรรดิซึ่งจัดกลุ่มอยู่ในแผนผังธรรมเนียมปฏิบัติ (§Hต้น ไม้ ตาม ประเพณี§!)\n\nสามารถเลือกธรรมเนียมปฏิบัติ §H$concept_tradition$§! ได้ทุกเมื่อที่จักรวรรดิ ['concept_empire'] มีคะแนนความสามัคคีสะสม £unity£ ['concept_unity'] เพียงพอ การทำแผนผังธรรมเนียมปฏิบัติให้เสร็จสมบูรณ์จะช่วยปลดล็อกสิทธิพิเศษการเลื่อนส่ง ['concept_ascension_perks']\n\n§H$concept_traditions$§! จะถูกจัดการในแท็บธรรมเนียมปฏิบัติ §H$traditions$§! ของอินเตอร์เฟส £interface£ ['concept_society_management_view']"

 # Singular: ['concept_vivarium'] or §H$concept_vivarium$§!
 # Plural: -
 concept_vivarium: "$vivarium$"
 concept_vivarium_desc: "ห้องเลี้ยงและศึกษาสิ่งมีชีวิตอวกาศ §Y$vivarium$§! ช่วยให้เราสามารถรับดูสัตว์อวกาศ (§Yขอบเขตพื้นที่§!) ที่จับกุมไว้ได้ สิ่งมีชีวิตในความดูแลสามารถถูกผ่าแยกส่วนเพื่อการศึกษาและทรัพยากร หรืออนุญาตให้ผสมพันธุ์เพื่อผลิตสิ่งมีชีวิตใหม่ๆ"

 # Singular: ['concept_war_in_heaven'] or §H$concept_war_in_heaven$§!
 # Plural: -
 concept_war_in_heaven: "สงครามมหาเทพ"
 concept_war_in_heaven_desc: "สอง['concept_fallen_empires']ที่เป็นศัตรูกันในสมัยโบราณอาจ['concept_awaken']และต่อสู้กันเพื่ออำนาจสูงสุดเหนือกาแล็กซี$requires_leviathans$"

 # Singular: ['concept_wormhole'] or §H$concept_wormhole$§!
 # Plural: ['concept_wormholes'] or §H$concept_wormholes$§!
 concept_wormhole_pairs: "คู่รูหนอน"
 concept_wormhole: "รูหนอน"
 concept_wormholes: "รูหนอน"
 concept_wormholes_desc: "รูหนอนเป็นรอยแยกที่เกิดขึ้นตามธรรมชาติในกาลอวกาศ เมื่อรูหนอนเสถียรแล้ว เราสามารถใช้รูหนอนเป็นทางลัดเชื่อมไปยังตำแหน่งที่แน่นอนในอวกาศได้"

 # Singular: ['concept_xeno_compatibility'] or §H$concept_xeno_compatibility$§!
 # Plural: -
 concept_xeno_compatibility: "$ap_xeno_compatibility$"
 concept_xeno_compatibility_desc: "$allow_crossbreeding$\n\n§L$ap_xeno_compatibility_desc$§!"

 # Singular: -
 # Plural: ['concept_cutholoids'] or §H$concept_cutholoids$§!
 concept_cutholoids: "$cutholoids_plural$"
 concept_cutholoids_desc: "$cutholoid_desc$"

 # Singular: -
 # Plural: ['concept_voidworms'] or §H$concept_voidworms$§!
 concept_voidworms: "$voidworms_plural$"
 concept_voidworms_desc: "$voidworm_desc$"

 # Singular: £influence£ ['concept_influence'] or £influence£ §H$concept_influence$§!
 # Plural: -
 concept_influence: "อิทธิพล"
 concept_influence_desc: "[GetConceptInfluence]"
 concept_influence_desc_shared: "อิทธิพลถูกนำไปใช้สำหรับการดำเนินการเชิงกลยุทธ์ ตัวอย่างเช่น การสร้างฐานดวงดาวภายนอก ['concept_outposts'], การอ้างสิทธิ์ดินแดน ['concept_claims'] และการรักษาสนธิสัญญาทางการทูต ['concept_diplomatic_pacts'] อัตราการสร้างอิทธิพล §H$concept_influence$§! ค่อนข้างคงที่ แต่สามารถปรับปรุงให้ดีขึ้นได้$tt_gain$- ประกาศให้จักรวรรดิอื่นเป็นคู่อริ ['concept_rivals']\n- เสริมสร้างการแสดงแสนยานุภาพ ['concept_power_projection'] โดยการรักษากองเรือทหารเรือที่มีขนาดใหญ่ ['concept_navy_size'] เมื่อเทียบกับขนาดของจักรวรรดิ £empire_sprawl£ ['concept_empire_size']"
 concept_influence_desc_regular: "£influence£ §H$concept_influence$§! (อิทธิพล) แสดงถึงอำนาจบารมีทางการเมือง\n\n$concept_influence_desc_shared$"
 concept_influence_desc_hive: "£influence£ §H$concept_influence$§! (อิทธิพล) แสดงถึงความสามารถของจิตสำนึกร่วมฝูง ['authority:auth_hive_mind'] ในการควบคุมกาแล็กซีในวงกว้าง\n\n$concept_influence_desc_shared$"
 concept_influence_desc_machine: "£influence£ §H$concept_influence$§! (อิทธิพล) แสดงถึงความสามารถของปัญญาประดิษฐ์เครื่องจักรกลหลัก ['authority:auth_machine_intelligence'] ในการแบ่งปันพลังประมวลผลเพื่อเข้าควบคุมโดยตรงเหนือกาแล็กซีในวงกว้าง\n\n$concept_influence_desc_shared$"

 # Singular: ['concept_outpost'] or §H$concept_outpost$§!
 # Plural: ['concept_outposts'] or §H$concept_outposts$§!
 concept_outpost: "$starbase_outpost$"
 concept_outposts: "$starbase_outpost_plural$"
 concept_outpost_desc: "ฐานดวงดาวภายนอก §H$concept_outposts$§! เป็นสถานีอวกาศหลัก ['concept_starbases'] ขนาดเล็กที่สร้างขึ้นเพื่อขยายพรมแดนของจักรวรรดิ ['concept_empire'] เข้าไปยังระบบดาว £system£ ['concept_systems'] ที่ยังไม่มีใครครอบครอง\n\nจำนวนของฐานดวงดาวภายนอก §H$concept_outposts$§! จะไม่ถูกจำกัดโดยขีดความสามารถของสถานีอวกาศหลักของจักรวรรดิ ['concept_starbase_capacity']\n\nอินเตอร์เฟส £interface£ ['concept_starbase_view'] จะมีคำสั่งในการอัปเกรดฐานดวงดาวภายนอก §H$concept_outpost$§! ให้เป็นสถานีอวกาศหลัก §H$concept_starbase$§! ที่มีประสิทธิภาพสูงขึ้น"

 # Singular: ['concept_claim'] or §H$concept_claim$§!
 # Plural: ['concept_claims'] or §H$concept_claims$§!
 concept_claim: "อ้าง"
 concept_claims: "อ้าง"
 concept_claim_desc: "การอ้างสิทธิ์ดินแดน §H$concept_claims$§! แสดงถึงการประกาศอธิปไตยเหนือระบบดาวที่อยู่ภายใต้การควบคุมของต่างชาติ การอ้างสิทธิ์จะถูกใช้เพื่อสร้างความชอบธรรมให้กับการทำสงคราม ['concept_wars'] เพื่อพิชิตดินแดน ช่วยให้จักรวรรดิสามารถยึดครองระบบดาวที่มีการพิพาทกันเมื่อได้รับชัยชนะ\n\nการอ้างสิทธิ์ทำได้โดยการใช้อิทธิพล £influence£ ['concept_influence'] โดยต้นทุนจะเพิ่มขึ้นตามระยะทางของระบบดาว, มูลค่าเชิงกลยุทธ์ และการอ้างสิทธิ์ดินแดน §H$concept_claims$§! ที่มีอยู่เดิมโดยจักรวรรดิอื่น การอ้างสิทธิ์ระบบดาวจะมีราคาแพงกว่าในช่วงระหว่างสงครามรุกราน ดังนั้นจักรวรรดิที่ชาญฉลาดจะทำการอ้างสิทธิ์ไว้ล่วงหน้า\n\nการอ้างสิทธิ์จะถูกจัดการในอินเตอร์เฟส £interface£ ['concept_claims_view']"

 # Singular: ['concept_research_agreement'] or §H$concept_research_agreement$§!
 # Plural: ['concept_research_agreements'] or §H$concept_research_agreements$§!
 concept_research_agreement: "ข้อตกลงความร่วมมือด้านการวิจัย (การวิจัยข้อตกลง)"
 concept_research_agreements: "ข้อตกลงความร่วมมือด้านการวิจัย (การวิจัยข้อตกลง)"
 concept_research_agreement_desc: "ข้อตกลงความร่วมมือด้านการวิจัย §H$concept_research_agreements$§! คือสนธิสัญญาทางการทูตที่มอบโบนัสคะแนนวิจัยฟิสิกส์ £physics£ สังคม £society£ วิศวกรรม £engineering£ ['concept_research'] แก่จักรวรรดิที่เข้าร่วมสำหรับเทคโนโลยีวิทยาการ ['concept_technologies'] ที่อีกฝ่ายมีอยู่แล้ว ทำให้มันมีค่าอย่างยิ่งในการเร่งความเร็วความก้าวหน้าทางวิทยาศาสตร์\n\nข้อตกลงความร่วมมือด้านการวิจัย §H$concept_research_agreements$§! สามารถจัดตั้งขึ้นได้ผ่านการทูต และมักจะรวมอยู่ในพันธมิตรความร่วมมือที่กว้างขึ้นหรือข้อตกลงสหพันธ์ ['concept_federation'] ข้อเสนอเหล่านี้สามารถยื่นได้ในแถบรายชื่อผู้ติดต่อ $contacts_view_tab_contacts$ ของอินเตอร์เฟส £interface£ ['concept_contacts_view']"

 # Singular: ['concept_rival'] or §H$concept_rival$§!
 # Plural: ['concept_rivals'] or §H$concept_rivals$§!
 concept_rival: "คู่แข่ง"
 concept_rivals: "คู่แข่ง"
 concept_rival_desc: "คู่ปรับอย่างเป็นทางการ §H$concept_rivals$§! คืออริศัตรูทางการเมืองและกลยุทธ์ที่ระบุไว้อย่างเป็นทางการ การประกาศให้เป็นคู่ปรับ §H$concept_rival$§! จะเพิ่มการผลิตอิทธิพล £influence£ ['concept_influence'] และสามารถปรับปรุงความสัมพันธ์กับจักรวรรดิอื่นที่มีศัตรูร่วมกันได้ อย่างไรก็ตาม มันจะทำให้ความสัมพันธ์ทางการทูตกับคู่ปรับแย่ลงและอาจยกระดับความตึงเครียดไปสู่ความขัดแย้งแบบเปิดเผย\n\nความเป็นคู่ปรับสามารถประกาศได้กับจักรวรรดิที่มีแสนยานุภาพใกล้เคียงกันเท่านั้น และเป็นเครื่องมือสำคัญในการแสดงความเหนือกว่า การกำหนดพันธมิตร และการสร้างความชอบธรรมในการเป็นศัตรู โดยประกาศคู่ปรับได้ในแถบรายชื่อผู้ติดต่อ $contacts_view_tab_contacts$ ของอินเตอร์เฟส £interface£ ['concept_contacts_view']"

 # Singular: ['concept_power_projection'] or §H$concept_power_projection$§!
 # Plural: -
 concept_power_projection: "การแสดงแสนยานุภาพ(โครงการพลัง)"
 concept_power_projection_desc: "การแสดงแสนยานุภาพ §H$concept_power_projection$§! จะวัดว่าแสนยานุภาพทางทหารของจักรวรรดิช่วยส่งเสริมสถานะทางการเมืองอย่างไร มันสะท้อนถึงขนาดและค่าบำรุงรักษากองเรือ ['concept_fleets'] ของตน ซึ่งทำหน้าที่เป็นตัวบ่งชี้ความสำคัญเชิงกลยุทธ์ที่เห็นได้ชัดบนเวทีระดับกาแล็กซี\n\nการรักษากองทัพเรือให้อยู่ใกล้เคียง หรือเกินกว่าขีดความสามารถของกองเรือทหารเรือของจักรวรรดิ §H$concept_naval_capacity$§! จะช่วยเพิ่มการแสดงแสนยานุภาพ ซึ่งช่วยส่งเสริมการสร้างอิทธิพล £influence£ ['concept_influence']"

 # Singular: ['concept_navy_size'] or §H$concept_navy_size$§!
 # Plural: -
 concept_navy_size: "ขนาดกองทัพเรือ(ขนาดนาวี)"
 concept_navy_size_desc: "ขนาดกองทัพเรือ §H$concept_navy_size$§! แสดงถึงจำนวนรวมของยานรบทางทหาร ['concept_military_ships'] ทั้งหมดภายในกองเรือของจักรวรรดิ แม้ว่าจะไม่มีการจำกัดขนาดของกองทัพเรืออย่างเคร่งครัด แต่การมีจำนวนยานเกินขีดความสามารถของกองเรือทหารเรือ ['concept_naval_capacity'] จะทำให้ค่าบำรุงรักษายานอวกาศเพิ่มขึ้น ['concept_ship_upkeep']\n\nการรักษากองทัพเรือที่มีความสมดุลเป็นสิ่งสำคัญในการปกป้องอาณาเขตที่ครอบครองและแสดงแสนยานุภาพไปทั่วทั้งกาแล็กซี"

 # Singular: £empire_sprawl£ ['concept_empire_size'] or £empire_sprawl£ §H$concept_empire_size$§!
 # Plural: -
 concept_empire_size: "ขนาดจักรวรรดิ"
 concept_empire_size_desc: "ขนาดของจักรวรรดิ £empire_sprawl£ §H$concept_empire_size$§! คือการวัดขนาดการขยายตัวทางอาณาเขตในรูปแบบของการควบคุมเขตการปกครอง £district£ ['concept_districts'], ระบบดาว £system£ ['concept_systems'], อาณานิคม £colony£ ['concept_colonies'] และประชากร £pop£ ['concept_pops']\n\nขนาดของจักรวรรดิ §H$concept_empire_size$§! ที่สูงจะสร้างภาระให้กับขีดความสามารถในการบริหารจัดการ และจะเพิ่มต้นทุนความต้องการคะแนนในการวิจัยเทคโนโลยีวิทยาการ ['concept_technologies'], ธรรมเนียมปฏิบัติ ['concept_traditions'] และพระราชกฤษฎีกา ['concept_edicts']\n\nนอกจากนี้ ['concept_empire'] จะตกเป็นเป้าหมายที่แทรกซึมได้ง่ายขึ้นสำหรับการดำเนินการจารกรรมสายลับ"

 # Singular: £unity£ ['concept_unity'] or £unity£ §H$concept_unity$§!
 # Plural: -
 concept_unity: "เอกภาพ"
 concept_unity_desc: "[GetConceptUnity]"
 concept_unity_desc_regular: "£unity£ §H$concept_unity$§! (ความสามัคคี) สะท้อนถึงปณิธานร่วมกันและความเข้มแข็งทางอุดมการณ์ของสังคม มันเป็นตัวแทนของจุดมุ่งหมายร่วมกันที่ผูกมัดผู้คนไว้ด้วยกัน คอยนำทางสถาบันต่างๆ และการปกครองของพวกเขา$concept_unity_desc_end$\n- ปรับปรุงความพึงพอใจ ['concept_approval'] และคะแนนสนับสนุน ['concept_support'] ของกลุ่มการเมืองต่างๆ ['concept_factions']\n- เลือกรับธรรมเนียมปฏิบัติการค้า ['tradition_category:tradition_mercantile'] ในหัวข้อ ['tradition:tr_mercantile_adaptive_economic_policies'] และเปลี่ยนนโยบายการค้า ['concept_policy', $policy_trade_policy$]"
 concept_unity_desc_hive: "£unity£ §H$concept_unity$§! (ความสามัคคี) สะท้อนถึงปณิธานและจุดมุ่งหมายที่เป็นหนึ่งเดียวของจิตสำนึกร่วมฝูง ['authority:auth_hive_mind'] มันเป็นตัวแทนของเจตจำนงร่วมกันที่ชี้นำรัง คอยควบคุมยูนิตส่วนหน้าและโดรนแรงงานต่างๆ$concept_unity_desc_end$"
 concept_unity_desc_machine: "£unity£ §H$concept_unity$§! (ความสามัคคี) สะท้อนถึงปณิธานและความสอดคล้องกันในการประมวลผลของปัญญาประดิษฐ์เครื่องจักรกล ['authority:auth_machine_intelligence'] มันเป็นตัวแทนของจุดประสงค์ที่ได้รับการคำนวณซึ่งชี้นำเครื่องจักร คอยควบคุมยูนิตส่วนหน้าและโดรนคนงานต่างๆ$concept_unity_desc_end$"
 concept_unity_desc_end: "\n\nมีความสำคัญอย่างยิ่งต่อกิจการภายในจักรวรรดิ ตัวอย่างเช่น เพื่อปลดล็อกธรรมเนียมปฏิบัติใหม่ ['concept_traditions'], เกณฑ์ผู้นำ ['concept_leaders'], ยกระดับฐานะอาณานิคม £colony£ ['concept_colonies'], ประกาศใช้พระราชกฤษฎีกา ['concept_edicts'] และจัดการย้ายถิ่นฐานของประชากร ['concept_resettlement']$tt_gain$- สร้างสิ่งปลูกสร้าง £building£ ['concept_buildings'] ที่มีตำแหน่งงาน £job£ ['concept_jobs'] ผลิตคะแนนความสามัคคี §H$concept_unity$§!"

 # Singular: ['concept_leader'] or §H$concept_leader$§!
 # Plural: ['concept_leaders'] or §H$concept_leaders$§!
 concept_leader: "ผู้นำ (ผู้นำ)"
 concept_leaders: "ผู้นำ(เลียด)"
 concept_leader_desc: "§H$concept_leaders$§! (ผู้นำ) อาจถูกแต่งตั้งให้เป็นผู้ว่าราชการ ['concept_governors'] หรือได้รับมอบหมายให้บัญชาการกองเรือรบ ['concept_fleets'] และดำเนินการวิจัย ['concept_research']\n\n§H$concept_leaders$§! จะได้รับแต้มประสบการณ์ตามกาลเวลา ซึ่งจะช่วยปรับปรุงประสิทธิภาพและปลดล็อกลักษณะเด่นของผู้นำที่เป็นประโยชน์ ['concept_leader_traits'] อย่างไรก็ตาม พวกเขาก็มีอายุขัยและในที่สุดอาจเกษียณอายุหรือเสียชีวิตลงได้\n\nผู้นำสามารถว่าจ้างและปลดออกได้ในอินเตอร์เฟส £interface£ ['concept_leaders_view']"

 # Singular: ['concept_leader_trait'] or §H$concept_leader_trait$§!
 # Plural: ['concept_leader_traits'] or §H$concept_leader_traits$§!
 concept_leader_trait: "ลักษณะเด่นของผู้นำ (ผู้นำทริท)"
 concept_leader_traits: "ลักษณะเด่นของผู้นำ (ผู้นำโปร่งแสง)"
 concept_leader_trait_desc: "ลักษณะเด่นของผู้นำ §H$concept_leader_traits$§! คือคุณลักษณะพิเศษที่ระบุจุดเด่น จุดอ่อน และสาขาความเชี่ยวชาญของ ['concept_leader'] ลักษณะเด่นเหล่านี้ส่งผลต่อประสิทธิภาพของผู้นำในบทบาทหน้าที่ของตน โดยมอบโบนัสให้กับการวิจัย ['concept_research'], การทำงานในฐานะผู้ว่าราชการ ['concept_governor'] หรือการบัญชาการกองเรือรบ ['concept_fleets']\n\nลักษณะเด่นบางอย่างสามารถใช้ประโยชน์ได้ก็ต่อเมื่อผู้นำผู้นั้นดำรงตำแหน่งในสภา ['concept_council'] ลักษณะเด่นบางอย่างจะเป็นเชิงบวกที่ช่วยเพิ่มประสิทธิภาพ ในขณะที่ลักษณะเด่นบางอย่างอาจบั่นทอนความสามารถในการทำงาน ทำให้การเลือกสรรและพัฒนาผู้นำอย่างระมัดระวังเป็นแง่มุมที่สำคัญยิ่งในการจัดการจักรวรรดิ"

 # Singular: ['concept_leader_class'] or §H$concept_leader_class$§!
 # Plural: -
 concept_leader_class: "คลาสประเภทผู้นำ (ผู้นำคลาส)"
 concept_leader_class_desc: "คลาสประเภทของผู้นำ §H$concept_leader_class$§! จะกำหนดบทบาทหน้าที่ของ ['concept_leader']:\n\n- เจ้าหน้าที่ฝ่ายปกครอง £official£ ['concept_official']\n- ผู้บัญชาการทหาร £commander£ ['concept_commander']\n- นักวิทยาศาสตร์ £scientist£ ['concept_scientist']"

 # Singular: £official£ ['concept_official'] or £official£ §H$concept_official$§!
 # Plural: £official£ ['concept_officials'] or £official£ §H$concept_officials$§!
 concept_official: "$official$"
 concept_officials: "$official_plural$"
 concept_official_desc: "เจ้าหน้าที่ฝ่ายปกครอง £official£ §H$concept_officials$§! คือผู้นำสายงานบริหารจัดการ ['concept_leaders'] ผู้ดูแลการปกครองและการปฏิบัติตามนโยบายภายในจักรวรรดิ พวกเขามีบทบาทสำคัญในการรักษาความมั่นคง £stability£ ['concept_stability'], บังคับใช้กฎหมาย และช่วยจัดการอาณานิคม £colony£ ['concept_colony'] หรือเซกเตอร์ระบบดาว £sector£ ['concept_sector'] ให้มีประสิทธิภาพสูงสุดในฐานะผู้ว่าราชการ ['concept_governor'] นอกจากนี้พวกเขาอาจทำงานเพื่อเพิ่มความสามัคคีกลมเกลียวในสหพันธ์ระหว่างดวงดาว ['concept_federation']\n\nประสิทธิภาพของเจ้าหน้าที่ฝ่ายปกครอง §H$concept_officials$§! อาจได้รับอิทธิพลจากลักษณะเด่นของผู้นำ ['concept_leader_traits'] หรือปัจจัยอื่นๆ ทำให้การจัดการผู้นำเหล่านี้เป็นปัจจัยสำคัญในการรักษาระบบการบริหารงานที่ดี"

 # Singular: £commander£ ['concept_commander'] or £commander£ $concept_commander$§!
 # Plural: £commander£ ['concept_commanders'] or £commander£ $concept_commanders$§!
 concept_commander: "$commander$"
 concept_commanders: "$commander_plural$"
 concept_commander_desc: "ผู้บัญชาการทหาร £commander£ §H$concept_commanders$§! คือผู้นำทางการทหาร ['concept_leaders'] ที่มีหน้าที่ควบคุมกองเรือรบ ['concept_fleets'] และดูแลปฏิบัติการกองเรือรบ พวกเขามีบทบาทสำคัญในการรบในอวกาศและการวางแผนเชิงกลยุทธ์\n\nประสิทธิภาพของผู้บัญชาการทหาร §H$concept_commander$§! อาจได้รับอิทธิพลจากลักษณะเด่นของผู้นำ ['concept_leader_traits'] หรือปัจจัยอื่นๆ การมอบหมายและการจัดการผู้บัญชาการทหารอย่างเหมาะสมจะช่วยส่งเสริมประสิทธิภาพของกองเรือและแสนยานุภาพทางทหารได้อย่างมาก และในฐานะผู้ว่าราชการ ['concept_governor'] พวกเขายังสามารถส่งเสริมงานบริหารระบบการจัดการดาวเคราะห์ได้อีกด้วย"

 # Singular: £scientist£ ['concept_scientist'] or £scientist£ $concept_scientist$§!
 # Plural: £scientist£ ['concept_scientists'] or £scientist£ $concept_scientists$§!
 concept_scientist: "$scientist$"
 concept_scientists: "$scientist_plural$"
 concept_scientist_desc: "นักวิทยาศาสตร์ £scientist£ §H$concept_scientists$§! คือผู้นำที่มุ่งเน้นการวิจัย ['concept_leaders'] ผู้ขับเคลื่อนความก้าวหน้าทางวิทยาศาสตร์ การสำรวจ และนวัตกรรมทางเทคโนโลยีภายในจักรวรรดิ พวกเขาเป็นผู้นำความพยายามในการวิจัย ['concept_research'], บัญชาการยานสำรวจวิจัย £science_ship£ ['concept_science_ships'] และวิเคราะห์ความผิดปกติ £anomaly£ ['concept_anomalies'] หรือโบราณสถาน £archaeology£ ['concept_archaeology_site'] ทั่วทั้งกาแล็กซี\n\nประสิทธิภาพของนักวิทยาศาสตร์ §H$concept_scientist$§! อาจได้รับอิทธิพลจากลักษณะเด่นของผู้นำ ['concept_leader_traits'], ระดับประสบการณ์ และสาขาความเชี่ยวชาญ การมอบหมายนักวิทยาศาสตร์ที่มีทักษะไปปฏิบัติภารกิจสำรวจสามารถเร่งรัดความก้าวหน้าได้ และในฐานะผู้ว่าราชการ ['concept_governor'] พวกเขายังสามารถช่วยส่งเสริมงานบริหารระบบจัดการดาวเคราะห์ได้อีกด้วย"

 # Singular: ['concept_star'] or §H$concept_star$§!
 # Plural: ['concept_stars'] or §H$concept_stars$§!
 concept_star: "ดาวฤกษ์(สตาร์)"
 concept_stars: "ดาวฤกษ์(สตาร์)"
 concept_star_desc: "ดาวฤกษ์ §H$concept_star$§! คือเทหวัตถุอวกาศมวลสารขนาดมหึมาและโดยทั่วไปเป็นแก๊สซึ่งตั้งอยู่กึ่งกลางของระบบดาว £system£ ['concept_system']\n\nดาวฤกษ์ §H$concept_star$§! อาจมีดาวเคราะห์ £planet£ ['concept_planets'] โคจรอยู่รอบๆ หรือมีกลุ่มดาวเคราะห์น้อยที่สกัดประโยชน์ได้ ทรัพยากรใดๆ ที่เกี่ยวข้องกับตัวดาวฤกษ์เองสามารถเก็บเกี่ยวได้โดยการสร้างสถานีขุดเจาะ £mining_station£ ['concept_mining_station'] หรือสถานีวิจัย £science_ship£ ['concept_research_station']"

 # Singular: £planet£ ['concept_planet'] or £planet£ §H$concept_planet$§!
 # Plural: £planet£ ['concept_planets'] or £planet£ §H$concept_planets$§!
 concept_planet: "ดาวเคราะห์ (ดาวเคราะห์)"
 concept_planets: "ดาวเคราะห์(พลาเน็ต)"
 concept_planet_desc: "ดาวเคราะห์ £planet£ §H$concept_planet$§! คือวัตถุทรงกลมขนาดใหญ่โคจรรอบดาวฤกษ์ ['concept_star'] และอาจมีดวงจันทร์บริวารโคจรรอบตัวเอง\n\nมีดาวเคราะห์ที่อาศัยอยู่ได้ 9 ประเภทพื้นฐานที่สามารถเปลี่ยนเป็นอาณานิคม £colony£ ['concept_colonies'] ได้\n\nดาวเคราะห์บางส่วนที่อยู่อาศัยไม่ได้อาจถูกทำสัญลักษณ์เป็นดาวเคราะห์เป้าหมายสำหรับการปรับปรุงสภาพดาว ['concept_terraforming'] หรืออาจเป็นแหล่งทรัพยากรที่เก็บเกี่ยวได้ด้วยสถานีขุดเจาะ £mining_station£ ['concept_mining_station'] หรือสถานีวิจัย £science_ship£ ['concept_research_station']"

 # Singular: £sector£ ['concept_sector'] or £sector£ §H$concept_sector$§!
 # Plural: £sector£ ['concept_sectors'] or £sector£ §H$concept_sectors$§!
 concept_sector: "เซกเตอร์ระบบดาว(หมอ)"
 concept_sectors: "เซกเตอร์ระบบดาว(เสียงเครื่อง)"
 concept_sector_desc: "เซกเตอร์ระบบดาว §H$concept_sectors$§! เป็นภูมิภาคการปกครองบริหารภายในจักรวรรดิ โดยรวมกลุ่มอาณานิคม £colony£ ['concept_colonies'] หลายแห่งเข้าด้วยกันภายใต้โครงสร้างการปกครองส่วนกลาง เซกเตอร์ช่วยจัดการการพัฒนาดาวเคราะห์ การกระจายทรัพยากร และการทำงานอัตโนมัติของเศรษฐกิจท้องถิ่น\n\nแต่ละเซกเตอร์สามารถมีผู้ว่าราชการ ['concept_governor'] ดูแลอยู่ ซึ่งทักษะและลักษณะเด่นของผู้นำ ['concept_leader_traits'] จะส่งผลต่อประสิทธิภาพในการทำงาน การจัดการเซกเตอร์ที่มีประสิทธิภาพจะทำให้เศรษฐกิจมั่นคงและช่วยลดภาระการบริหารจัดการในขณะที่จักรวรรดิขยายตัวมากขึ้น"

 # Singular: ['concept_resettlement'] or §H$concept_resettlement$§!
 # Plural: -
 concept_resettlement: "การย้ายถิ่นฐาน(เสียงกระแทก)"
 concept_resettlement_desc: "การย้ายถิ่นฐานประชากร §H$concept_resettlement$§! คือกระบวนการโยกย้ายประชากร £pop£ ['concept_pops'] จากอาณานิคมหนึ่ง £colony£ ['concept_colony'] ไปยังอีกแห่งหนึ่ง ช่วยให้จักรวรรดิสามารถจัดสรรกองกำลังแรงงานและจัดการการเติบโตของประชากรได้อย่างมีประสิทธิภาพมากขึ้น\n\nการย้ายถิ่นฐานนี้สามารถทำได้ด้วยตนเองหรือผ่านนโยบายระบบอัตโนมัติที่จะย้ายประชากรตามปัจจัยที่พักอาศัย ความพร้อมของตำแหน่งงาน หรือเกณฑ์อื่นๆ เช่น ระดับความสามารถในการอยู่อาศัย\n\nการย้ายถิ่นฐานมีต้นทุนค่าพลังงานสำรอง £energy£ ['concept_energy'] และอาจถูกจำกัดโดยจริยธรรมของจักรวรรดิ ['concept_ethics'], นโยบายรัฐ ['concept_policies'], แนวคิดสังคม ['concept_civics'] หรือข้อจำกัดด้านสิทธิเผ่าพันธุ์"

 # Singular: ['concept_diplomatic_pact'] or §H$concept_diplomatic_pact$§!
 # Plural: ['concept_diplomatic_pacts'] or §H$concept_diplomatic_pacts$§!
 concept_diplomatic_pact: "กติกาสนธิสัญญาทางการทูต(เสียงสัญญาณ)"
 concept_diplomatic_pacts: "กติกาสนธิสัญญาทางการทูต(ระเบิด)"
 concept_diplomatic_pact_desc: "กติกาสนธิสัญญาทางการทูต §H$concept_diplomatic_pacts$§! คือข้อตกลงอย่างเป็นทางการระหว่างจักรวรรดิต่างๆ ที่จะช่วยกำหนดทิศทางความสัมพันธ์ทางการทูตและการปฏิสัมพันธ์เชิงกลยุทธ์ ตัวอย่างเช่น สนธิสัญญาเหล่านี้อาจผูกมัดผู้ลงนามให้ช่วยเหลือกันป้องกันประเทศ หรือช่วยเร่งความก้าวหน้าทางเทคโนโลยีผ่านการแบ่งปันความรู้\n\nสนธิสัญญาทางการทูต §H$concept_diplomatic_pacts$§! สามารถใช้เป็นบันไดนำไปสู่ความเป็นพันธมิตรที่แน่นแฟ้นยิ่งขึ้นหรือการจัดตั้งสหพันธ์ ['concept_federation'] แต่การละเมิดสนธิสัญญาอาจทำลายความไว้วางใจและนำไปสู่ผลกระทบทางการทูตตามมา ข้อเสนอเหล่านี้เสนอได้ในแถบรายชื่อผู้ติดต่อ $contacts_view_tab_contacts$ ของอินเตอร์เฟส £interface£ ['concept_contacts_view']"

 # Singular: £science_ship£ ['concept_research_station'] or £science_ship£ §H$concept_research_station$§!
 # Plural: £science_ship£ ['concept_research_stations'] or £science_ship£ §H$concept_research_stations$§!
 concept_research_station: "$research_station$"
 concept_research_stations: "$research_station_plural$"
 concept_research_station_desc: "สถานีวิจัย £science_ship£ §H$concept_research_station$§! คืออาคารสถานีอวกาศในวงโคจรที่เก็บรวบรวมคะแนนการวิจัยฟิสิกส์ £physics£ สังคม £society£ วิศวกรรม £engineering£ §Hจุดวิจัย§! จากตำแหน่งดาวที่โดดเด่นทั่วกาแล็กซี$tt_gain$- $tt_build_research_stations$"

 # Singular: £system£ ['concept_system'] or £system£ §H$concept_system$§!
 # Plural: £system£ ['concept_systems'] or £system£ §H$concept_systems$§!
 concept_system: "ระบบดาว (ระบบดาว)"
 concept_systems: "ระบบดาว(Systems)"
 concept_system_desc: "ระบบดาว £system£ §H$concept_systems$§! ยึดโยงอยู่กับเทหวัตถุอวกาศที่เป็นศูนย์กลางและมีมวลสูง ซึ่งมักจะเป็นดาวฤกษ์ ['concept_star'] โดยมีดาวเคราะห์ £planet£ ['concept_planet'], วัตถุอวกาศ ['concept_celestial_objects'] และปรากฏการณ์จักรวาลอื่นๆ โคจรอยู่โดยรอบ ระบบดาวจะได้รับการสำรวจโดยยานสำรวจวิจัย £science_ship£ ['concept_science_ships'] และควบคุมดูแลโดยฐานดวงดาวภายนอก ['concept_outposts']\n\nบางระบบดาวมีดาวโลกที่อาศัยอยู่ได้ซึ่งเหมาะสำหรับเป็นอาณานิคม £colony£ ['concept_colonies'] ในขณะที่ระบบอื่นอาจเป็นจุดช่องแคบยุทธศาสตร์, แหล่งแร่มีค่า หรือมีภัยอันตรายที่ซ่อนเร้น การควบคุมระบบดาวหลักมีความสำคัญต่อการขยายตัวทางอาณาเขต การป้องกัน และการเติบโตทางเศรษฐกิจ"

 # Singular: ['concept_envoy'] or §H$concept_envoy$§!
 # Plural: ['concept_envoys'] or §H$concept_envoys$§!
 concept_envoy: "ผู้แทนทูต(หัวเราะ)"
 concept_envoys: "ผู้แทนทูต(หัวเราะ)"
 concept_envoy_desc: "ผู้แทนทูต §Hซองจิน§! จะดูแลการติดต่อครั้งแรก ['concept_first_contact'] กับต่างดาวที่ไม่รู้จัก, จัดการเครือข่ายสายลับ และเข้าร่วมการทูตสัมพันธ์ ['concept_diplomacy'] กับจักรวรรดิอื่นๆ ['concept_empires']$tt_gain$- สร้างสิ่งก่อสร้างยักษ์สมัชชาระหว่างดวงดาว(การชุมนุมดวงดาว)£megastructure£ ['concept_megastructure']\n- ใช้ประโยชน์จากสิ่งปลูกสร้าง £building£ ['concept_buildings'], ลักษณะเด่นของผู้นำ ['concept_leader_traits'] และแนวคิดสังคมจักรวรรดิ ['concept_civics'] บางประเภท\n- ปลดล็อกสิทธิประโยชน์ของสหพันธ์ ['concept_federation'] ในข้อจำเพาะ §H$extra_envoy_1$§!"

 # Singular: ['concept_civic'] or §H$concept_civic$§!
 # Plural: ['concept_civics'] or §H$concept_civics$§!
 concept_civic: "แนวคิดสังคม (Civic)"
 concept_civics: "แนวคิดสังคม(Civics)"
 concept_civic_desc: "แนวคิดสังคมจักรวรรดิ §H$concept_civics$§! เป็นตัวแทนของหลักการพื้นฐานและโครงสร้างทางสังคมที่จำกัดความลักษณะเด่นของจักรวรรดิ สิ่งเหล่านี้มอบคุณประโยชน์โบนัสเฉพาะตัว กำหนดทิศทางนโยบายภายใน และส่งผลต่อความสัมพันธ์ทางการทูตกับอารยธรรมอื่น\n\nแนวคิดสังคมสามารถปรับเปลี่ยนได้ผ่านการปฏิรูปการปกครองในอินเตอร์เฟส £interface£ ['concept_empire_view'] แม้ว่าบางแนวคิดจะถูกจำกัดสิทธิ์โดยระบบระเบียบการปกครอง ['concept_authority'] หรือจริยธรรมของจักรวรรดิ ['concept_ethics']"

 # Singular: ['concept_starbase_capacity'] or §H$concept_starbase_capacity$§!
 # Plural: -
 concept_starbase_capacity: "ความจุของสถานีอวกาศหลัก (ฐานดวงดาวความจุ)"
 concept_starbase_capacity_desc: "ความจุของสถานีอวกาศหลัก §H$concept_starbase_capacity$§! แสดงจำนวนสถานีอวกาศหลัก ['concept_starbases'] ที่ได้รับการอัปเกรดแล้วซึ่งสามารถรองรับได้อย่างมีประสิทธิภาพ โดยไม่นับฐานดวงดาวภายนอก ['concept_outposts']\n\nหากมีจำนวนเกินความจุ §H$concept_starbase_capacity$§! จะเพิ่มต้นทุนค่าบำรุงรักษาสถานีอวกาศหลัก ['concept_starbase_upkeep']$tt_gain$- ครอบครองระบบดาว ['concept_owned_systems'] เพิ่มมากขึ้น\n- ใช้ประโยชน์จากวิทยาการเทคโนโลยี ['concept_technologies'] และธรรมเนียมปฏิบัติ ['concept_traditions'] บางอย่าง"

 # Singular: ['concept_starbase_upkeep'] or §H$concept_starbase_upkeep$§!
 # Plural: -
 concept_starbase_upkeep: "ค่าบำรุงรักษาสถานีอวกาศหลัก (ฐานดวงดาวยกขึ้น)"
 concept_starbase_upkeep_desc: "ค่าบำรุงรักษาสถานีอวกาศหลัก §H$concept_starbase_upkeep$§! คือต้นทุนทรัพยากรที่ต้องจ่ายอย่างต่อเนื่องเพื่อรักษาสถานีอวกาศหลักให้อยู่ในสภาพใช้งานได้ ค่าบำรุงรักษานี้หลักๆ ประกอบไปด้วยพลังงานสำรอง £energy£ ['concept_energy'] พร้อมมีต้นทุนเพิ่มเติมเมื่อมีการติดตั้งมอดูล (§Hมอดูล§!) หรือสิ่งปลูกสร้าง (§Hอาคาร§!) ขั้นสูง\n\nต้นทุนค่าบำรุงรักษาจะขยายตัวตามขนาดและบทบาทของสถานีอวกาศหลัก เนื่องจากการอัปเกรดเป็นระดับที่สูงขึ้นจะเพิ่มความต้องการในการบำรุงรักษา"

 # Singular: ['concept_owned_system'] or §H$concept_owned_system$§!
 # Plural: ['concept_owned_systems'] or §H$concept_owned_systems$§!
 concept_owned_system: "ระบบดาวที่ครอบครอง(ถูกสกัด)ระบบดาว)"
 concept_owned_systems: "ระบบดาวที่ครอบครอง(ระบบที่ทํางานอยู่)"
 concept_owned_system_desc: "ระบบดาวที่ครอบครอง §H$concept_owned_systems$§! คือระบบดาวฤกษ์ £system£ ['concept_systems'] ที่ตกอยู่ภายใต้การควบคุมของจักรวรรดิ ไม่ว่าจะผ่านการขยายดินแดนโดยตรงหรือการพิชิตชัย ความเป็นเจ้าของช่วยให้จักรวรรดิสามารถสร้างสถานีอวกาศหลัก ['concept_starbases'], สกัดทรัพยากร และจัดตั้งอาณานิคม £colony£ ['concept_colonies'] ภายในระบบดาวได้\n\nการรักษาการควบคุมระบบดาวจะมีผลต่อขนาดของจักรวรรดิ £empire_sprawl£ ['concept_empire_size'] โดยจำนวนระบบดาวที่ครอบครองจะส่งผลต่อประสิทธิภาพในการบริหารจัดการและค่าใช้จ่ายด้านธุรการจัดการ"

 # Singular: ['concept_naval_capacity'] or §H$concept_naval_capacity$§!
 # Plural: -
 concept_naval_capacity: "ความจุของยานรบ"
 concept_naval_capacity_desc: "ขีดความสามารถของกองเรือทหารเรือ §H$concept_naval_capacity$§! แสดงขนาดของกองเรือรบรวม ['concept_fleet_size'] ที่สามารถบำรุงรักษาได้อย่างมีประสิทธิภาพ\n\nหากมียานเกินขีดความสามารถ §H$concept_naval_capacity$§! จะทำให้ค่าบำรุงรักษายานอวกาศเพิ่มขึ้น ['concept_ship_upkeep']$tt_gain$- สร้างมอดูลตำบลทอดสมอ (§Hตัวยึด§!) บนสถานีอวกาศหลัก ['concept_starbases']\n- ใช้ประโยชน์จากตำแหน่งงาน £job£ ['concept_jobs'] บางประเภท เช่น จากสิ่งปลูกสร้าง £building£ ['building:building_stronghold'] (ที่มั่นทหาร)\n- ใช้ประโยชน์จากวิทยาการเทคโนโลยี ['concept_technologies'] และธรรมเนียมปฏิบัติ ['concept_traditions'] บางอย่าง"

 # Singular: ['concept_governor'] or §H$concept_governor$§!
 # Plural: ['concept_governors'] or §H$concept_governors$§!
 concept_governor: "$governor$"
 concept_governors: "$governor_plural$"
 concept_governor_desc: "ผู้ว่าราชการ §H$concept_governor$§! คือผู้นำ ['concept_leader'] ผู้ดูแลอาณานิคม £colony£ ['concept_colony'] หรือเซกเตอร์ระบบดาว £sector£ ['concept_sector'] ผู้นำ §H$concept_leader$§! ที่ได้รับมอบหมายให้ดูแลเมืองหลวงของเซกเตอร์จะทำหน้าที่เป็นผู้ว่าราชการเซกเตอร์ §H$concept_governor$§! ด้วยเช่นกัน\n\nคลาสประเภทผู้นำ ['concept_leader_class'] และลักษณะเด่นของผู้นำ ['concept_leader_traits'] ของพวกเขาจะเป็นตัวกำหนดโบนัสและผลลดหย่อนที่จะได้รับ\n\n§H$concept_governors$§! จะถูกมอบหมายในอินเตอร์เฟส £interface£ ['concept_colony_view'] หรืออินเตอร์เฟส £interface£ ['concept_planets_and_sector_view']"

 # Singular: ['concept_decision'] or §H$concept_decision$§!
 # Plural: ['concept_decisions'] or §H$concept_decisions$§!
 concept_decision: "การตัดสินใจดาวเคราะห์(ตัดสิน)"
 concept_decisions: "การตัดสินใจดาวเคราะห์(คําวิจารณ์)"
 concept_decision_desc: "การตัดสินใจของดาวเคราะห์ §H$concept_decision$§! คือการดำเนินการบนดาวเคราะห์ที่ใช้เพื่อตอบสนองความต้องการเฉพาะของอาณานิคม £colony£ ['concept_colony'] มันสามารถเพิ่มเขตการปกครอง £district£ ['concept_districts'], ขจัดสิ่งกีดขวาง £blocker£ ['concept_blockers'] หรือปรับเปลี่ยนคุณลักษณะของดาวเคราะห์\n\nบางการดำเนินการต้องใช้ต้นทุนในการประกาศใช้หรือต้องผ่านเงื่อนไขเฉพาะเจาะจง\n\n§H$concept_decisions$§! จะถูกจัดการในอินเตอร์เฟส £interface£ ['concept_colony_view']"

 # Singular: ['concept_planetary_ascension'] or §H$concept_planetary_ascension$§!
 # -
 concept_planetary_ascension: "การยกระดับอาณานิคม"
 concept_planetary_ascension_desc: "ระดับขั้นการยกระดับอาณานิคม §Hต้น ยาง โค โลนี§! ของอาณานิคม £colony£ ['concept_colony'] จะเพิ่มประสิทธิภาพของหน้าที่ดาวเคราะห์ ['concept_designation'] และลดการส่งผลต่อขนาดของจักรวรรดิ £empire_sprawl£ ['concept_empire_size']\n\nอาณานิคมสามารถยกระดับได้หลายครั้งตามจำนวนสิทธิพิเศษการเลื่อนส่ง ['concept_ascension_perks'] ที่ปลดล็อก และจะเพิ่มขึ้นในต้นทุนการใช้คะแนนความสามัคคี £unity£ ['concept_unity'] ตามจำนวนสะสมของระดับขั้นการยกระดับ §Hยาง รถยนต์§! ในจักรวรรดิ ['concept_empire']\n\nการปลดล็อกสิทธิพิเศษการเลื่อนส่ง §H$concept_ascension_perks$§! ทั้งหมดจะเพิ่มขีดจำกัดการยกระดับอาณานิคมขึ้นอีก §G$COMPLETION_BONUS$§!"

 # Singular: ['concept_designation'] or §H$concept_designation$§!
 # Plural: -
 concept_designation: "การกำหนดประเภทของเขตต่างๆ"
 concept_designation_desc: "หน้าที่ของอาณานิคม §H$concept_designation$§! ของอาณานิคม £colony£ ['concept_colony'] จะเป็นตัวกำหนดบทบาทหลักของอาณานิคม ตัวอย่างเช่น การเร่งความเร็วในการสร้างเขตการปกครองบางประเภทหรือเพิ่มผลผลิตของตำแหน่งงานเฉพาะเจาะจง\n\nหากหน้าที่ §H$concept_designation$§! ไม่ได้ถูกตั้งค่าด้วยตนเอง มันจะถูกกำหนดให้โดยอัตโนมัติตามเขตการปกครองหรือสิ่งปลูกสร้างที่มีอยู่"

 # Singular: ['concept_planet_automation'] or §H$concept_planet_automation$§!
 # Plural: -
 concept_planet_automation: "ระบบบริหารดาวเคราะห์อัตโนมัติ"
 concept_planet_automation_desc: "§H$concept_planet_automation$§! อนุญาตให้ £colony£ ['concept_colony'] พัฒนาโดยอัตโนมัติตามที่ได้เลือกไว้ใน $COLONY_AUTOMATION_SETTINGS$ "

 # Singular: ['concept_devastation'] or §H$concept_devastation$§!
 # Plural: -
 concept_devastation: "ความเสียหายจากการทำลายล้าง(ช่อง)"
 concept_devastation_desc: "ความเสียหายจากการทำลายล้าง §H$concept_devastation$§! คือปริมาณความเสียหายที่อาณานิคม £colony£ ['concept_colony'] ได้รับ ซึ่งมักเกิดจากการระดมยิงวงโคจร (§Hระเบิดออร์บิทัล§!) การเผชิญกับความเสียหายจากการทำลายล้าง §H$concept_devastation$§! มากเกินไปจะส่งผลเสียต่อหลายแง่มุม เช่น ที่อยู่อาศัย £housing£ ['concept_housing'], สิ่งอำนวยความสะดวก £amenities£ ['concept_amenities'] และการผลิตงานในตำแหน่งงาน £job£ ['concept_job']\n\nความเสียหายจากการทำลายล้าง §H$concept_devastation$§! จะค่อยๆ ลดลงตามกาลเวลาเมื่ออาณานิคม £colony£ §H$concept_colony$§! ได้รับการฟื้นฟูซ่อมแซม\n\nอินเตอร์เฟส £interface£ ['concept_colony_view'] จะแสดงระดับความเสียหายจากการทำลายล้าง §H$concept_devastation$§! ปัจจุบัน"

 # Singular: ['concept_shipyard'] or §H$concept_shipyard$§!
 # Plural: ['concept_shipyards'] or §H$concept_shipyards$§!
 concept_shipyard: "อู่ต่อยาน(เสียงบิด)"
 concept_shipyards: "อู่ต่อยาน(เสียงบิด)"
 concept_shipyard_desc: "อู่ต่อยาน §H$concept_shipyard$§! คือสถานีอวกาศหลัก ['concept_starbase'] ที่ติดตั้งมอดูลอู่ต่อยาน §H$concept_shipyard$§! ซึ่งทำให้มันสามารถผลิตยานได้ทั้งยานพลเรือน ['concept_civilian_ships'] และยานรบทางทหาร ['concept_military_ships']\n\nการสร้างยานอวกาศจะได้รับการจัดการในอินเตอร์เฟส £interface£ ['concept_starbase_view']"

 # Singular: £anomaly£ ['concept_anomaly'] or £anomaly£ §H$concept_anomaly$§!
 # Plural: £anomaly£ ['concept_anomalies'] or £anomaly£ §H$concept_anomalies$§!
 concept_anomaly: "ความผิดปกติ(ความผิดปกติ)"
 concept_anomalies: "ความผิดปกติ(สัตว์ปีก)"
 concept_anomaly_desc: "ความผิดปกติ £anomaly£ §H$concept_anomaly$§! คือการค้นพบที่ลึกลับซึ่งพบโดยยานสำรวจวิจัย £science_ship£ ['concept_science_ships'] ระหว่างการสำรวจระบบดาว £system£ ['concept_systems'] การสืบสวนความผิดปกติอาจมอบรางวัลหรือเผยให้เห็นอันตรายที่รออยู่\n\nความผิดปกติ §H$concept_anomalies$§! จะถูกศึกษาโดยการมอบหมายนักวิทยาศาสตร์ £scientist£ §H$concept_scientist$§! ให้ไปสำรวจ โดยเวลาในการสำรวจจะขึ้นอยู่กับระดับทักษะของพวกเขาและความยากของความผิดปกติ §H$concept_anomaly$§!\n\nความผิดปกติจะปรากฏบนอินเตอร์เฟส £interface£ ['concept_galaxy_map'] เมื่อเลือกยานวิจัย §H$concept_science_ship$§! และจะมีรายชื่ออยู่ในแท็บบันทึกเหตุการณ์ $situation_log_view_tab_situation_log$ ของอินเตอร์เฟส £interface£ ['concept_situation_log_view']"

 # Singular: £archaeology£ ['concept_archaeology_site'] or £archaeology£ §H$concept_archaeology_site$§!
 # Plural: £archaeology£ ['concept_archaeology_site'] or £archaeology£ §H$concept_archaeology_site$§!
 concept_archaeology_site: "แหล่งโบราณคดี"
 concept_archaeology_sites: "แหล่งโบราณคดี(เสียงหายใจ)"
 concept_archaeology_site_desc: "แหล่งโบราณคดี £archaeology£ §H$concept_archaeology_site$§! เป็นเศษซากของอารยธรรมโบราณ ซากการรบปรักหักพัง หรือจุดที่น่าสนใจอื่นๆ ยานสำรวจวิจัยที่มีลูกเรือควบคุม £science_ship£ ['concept_science_ships'] สามารถเข้าไปขุดค้นเพื่อเปิดเผยความลับที่ซ่อนอยู่ได้"

 # Singular: ['concept_empire'] or §H$concept_empire$§!
 # Plural: ['concept_empires'] or §H$concept_empires$§!
 concept_empire: "จักรวรรดิ (จักรวรรดิ)"
 concept_empires: "จักรวรรดิ(หายใจ)"
 concept_empire_desc: "จักรวรรดิ §H$concept_empire$§! คือขั้วอำนาจในกาแล็กซีที่ควบคุมอย่างน้อยหนึ่งระบบดาว £system£ ['concept_system'] และโดยทั่วไปพยายามขยายอิทธิพลของตนไปทั่วดวงดาว จริยธรรมของจักรวรรดิ ['concept_ethics'], ระบบระเบียบการปกครอง ['concept_authority'] และแนวคิดสังคมจักรวรรดิ ['concept_civics'] จะเป็นตัวกำหนดทิศทางนโยบายและพฤติกรรมของพวกเขา\n\nการปฏิสัมพันธ์กันระหว่างจักรวรรดิ §H$concept_empires$§! จะเกิดขึ้นผ่านการทูต การค้า หรือความขัดแย้ง\n\nการขยายตัวของจักรวรรดิ §H$concept_empires$§! สามารถเห็นได้ชัดในอินเตอร์เฟส £interface£ ['concept_galaxy_map']\n\nสามารถติดต่อกับพวกเขาได้ผ่านทางธงของจักรวรรดิหรือแท็บรายชื่อผู้ติดต่อ $contacts_view_tab_contacts$ ของอินเตอร์เฟส £interface£ ['concept_contacts_view']"

 # Singular: ['concept_defense_platform'] or §H$concept_defense_platform$§!
 # Plural: ['concept_defense_platforms'] or §H$concept_defense_platforms$§!
 concept_defense_platform: "$military_station_small$"
 concept_defense_platforms: "$military_station_small_plural$"
 concept_defense_platform_desc: "ป้อมปราการป้องกัน §H$concept_defense_platforms$§! คือสิ่งก่อสร้างในห้วงอวกาศลึกที่ปกป้องสถานีอวกาศหลัก ['concept_starbases'] มักทำหน้าที่ถ่วงเวลาผู้จู่โจมจนกว่ากองเรือรบป้องกัน ['concept_fleet'] จะเดินทางมาถึง\n\nป้อมปราการป้องกัน §H$concept_defense_platforms$§! ขนาดใหญ่ที่สุดเป็นโครงสร้างที่กว้างขวาง เป็นที่อยู่อาศัยของประชากรหลายพันคนและติดตั้งอาวุธที่มีอำนาจการยิงเทียบเท่ากับกองเรือหนึ่งกอง พวกมันจะถูกออกแบบในแผงนักออกแบบยาน §H$SHIP_DESIGNER$§! ของอินเตอร์เฟส £interface£ ['concept_fleet_management_view']"

 # Singular: ['concept_army'] or §H$concept_army$§!
 # Plural: ['concept_armies'] or §H$concept_armies$§!
 concept_army: "กองทัพทหารบก(อาร์มี่)"
 concept_armies: "กองทัพทหารบก (Armies)"
 concept_army_desc: "§H$concept_armies$§! (กองทัพทหารบก) คือกองกำลังภาคพื้นดินที่ได้รับมอบหมายให้ปกป้องอาณานิคม £colony£ ['concept_colonies'] หรือบุกโจมตีดาวเคราะห์ศัตรู £planet£ ['concept_planets']\n\nกองทัพทหารบก §H$concept_army$§! ที่นำโดยผู้บัญชาการทหาร £commander£ ['concept_commander'] อาจได้รับโบนัสหรือผลลดหย่อนประสิทธิภาพขึ้นอยู่กับลักษณะเด่นของผู้นำ ['concept_leader_traits'] ของพวกเขา\n\n§H$concept_armies$§! สามารถเกณฑ์ขึ้นได้ในหน้าต่างการก่อสร้างขนาดใหญ่ §H$MACRO_BUILDER_TAB$§! ของสถานีอวกาศหลัก ['concept_starbases'] หรือในแถบการรบภาคพื้นดิน §H$GROUND_COMBAT_TAB$§! ของอาณานิคม §H$concept_colonies$§!"

 # Singular: ['concept_component'] or §H$concept_component$§!
 # Plural: ['concept_components'] or §H$concept_components$§!
 concept_component: "ส่วนประกอบ(ยินดี)"
 concept_components: "ส่วนประกอบ(ความร่วมมือ)"
 concept_component_desc: "ส่วนประกอบ §H$concept_components$§! คือระบบและมอดูลแต่ละชิ้นที่ระบุขีดความสามารถของยานอวกาศ ['concept_ship'] ซึ่งรวมถึงอาวุธ, อุปกรณ์ป้องกัน, ไฮเปอร์ไดรฟ์ และระบบอรรถประโยชน์ต่างๆ\n\nส่วนประกอบจะปลดล็อกได้โดยการวิจัยเทคโนโลยีวิทยาการใหม่ๆ ['concept_technologies'] และติดตั้งในแถบนักออกแบบยาน §H$SHIP_DESIGNER$§! ของอินเตอร์เฟส £interface£ ['concept_fleet_management_view']\n\nยานสำรวจวิจัย £science_ship£ ['concept_science_ships'] จะติดตั้งส่วนประกอบ §H$concept_components$§! ที่ทันสมัยที่สุดที่มีอยู่โดยอัตโนมัติ"

 # Singular: ['concept_habitat'] or §H$concept_habitat$§!
 # Plural: ['concept_habitats'] or §H$concept_habitats$§!
 concept_habitat: "ที่อยู่อาศัยประดิษฐ์(ฮาบิแทต)"
 concept_habitats: "ที่อยู่อาศัยประดิษฐ์(ฮาบิตาต)"
 concept_habitat_desc: "ที่อยู่อาศัยประดิษฐ์ §H$concept_habitats$§! คือสิ่งก่อสร้างอาณานิคมจำลองขนาดใหญ่ในห้วงอวกาศลึก\n\nสิ่งเหล่านี้ถูกสร้างขึ้นในฐานะสิ่งก่อสร้างยักษ์ ['concept_megastructures'] โดยใช้ยานก่อสร้าง £construction_ship£ ['concept_construction_ship'] หลังจากสร้างเสร็จจึงจะสามารถเปลี่ยนสภาพให้เป็นอาณานิคม £colony£ ['concept_colonies'] ได้\n\nประเภทของเขตการปกครอง £district£ ['concept_districts'] ที่มีให้สร้างจะถูกกำหนดตามแหล่งทรัพยากรธรรมชาติ(ถอนกําลัง)ภายในระบบดาว £system£ ['concept_system']"

 # Singular: £housing£ ['concept_housing'] or £housing£ §H$concept_housing$§!
 # Plural: -
 concept_housing: "ที่พักอาศัย(โห่ร้อง)"
 concept_housing_desc: "ที่พักอาศัย £housing£ §H$concept_housing$§! คือระบบสาธารณูปโภคขั้นพื้นฐานที่รองรับจำนวนประชากรของอาณานิคม £colony£ ['concept_colony'] การมีที่พักอาศัย §H$concept_housing$§! ไม่เพียงพอจะส่งผลลดหย่อนความมั่นคง £stability£ ['concept_stability'] และอาจกระตุ้นให้เกิดการอพยพออก (§Hการ อพยพ§!)\n\nสามารถเพิ่มที่พักอาศัย §H$concept_housing$§! ได้ด้วยการสร้างเขตการปกครอง £district£ ['concept_districts'] และสิ่งปลูกสร้าง £building£ ['concept_buildings'] บางประเภท การมีที่พักอาศัยที่สูงขึ้นจะปรับปรุงความจุของดาวเคราะห์ ['concept_planet_capacity'] ซึ่งส่งผลต่ออัตราการเติบโตของประชากรทางชีวภาพ\n\nความเชี่ยวชาญเฉพาะด้านเขตการปกครอง £zone£ ['concept_district_specializations'] บางหัวข้อสำหรับเขตเมืองใหญ่ §H$district_city_plural$§! อาจส่งผลลดจำนวนที่พักอาศัย §H$concept_housing$§! ที่ได้รับจากแต่ละเขตเมือง §H$district_city$§! ลงได้"

 # Singular: ['concept_planet_size'] or §H$concept_planet_size$§!
 # Plural: -
 concept_planet_size: "ขนาดของดาวเคราะห์ (ดาวเคราะห์ขนาด)"
 concept_planet_size_desc: "ขนาดของดาวเคราะห์ §H$concept_planet_size$§! จะกำหนดจำนวนเขตการปกครอง £district£ ['concept_districts'] ที่อาณานิคม £colony£ ['concept_colony'] จะสามารถรองรับได้ ดาวเคราะห์ที่มีขนาดใหญ่จะรองรับเขตการปกครอง £district£ ['concept_districts'] ได้มากกว่า ซึ่งสามารถสร้างและเพิ่มความเชี่ยวชาญเพื่อมอบตำแหน่งงาน £job£ ['concept_jobs'] ได้เพิ่มขึ้น"

 # Singular: ['concept_planet_capacity'] or §H$concept_planet_capacity$§!
 # Plural: -
 concept_planet_capacity: "ความจุของดาวเคราะห์ (ดาวเคราะห์ความจุ)"
 concept_planet_capacity_desc: "ความจุของดาวเคราะห์ §H$concept_planet_capacity$§! จะถูกกำหนดโดยที่พักอาศัย £housing£ ['concept_housing'] และพื้นที่เพิ่มเติมจากเขตการปกครอง £district£ ['concept_districts'] ที่ยังไม่ได้รับการพัฒนาก่อสร้าง ซึ่งแปรผันตามระดับความสามารถในการอยู่อาศัยของดาวเคราะห์ £planet£ ['concept_planet'] การเคลียร์สิ่งกีดขวาง £blocker£ ['concept_blockers'] จะช่วยเพิ่มความจุได้มากขึ้น\n\nประชากรทางชีวภาพ £pop£ §Hป๊อป ชีวเคมี§! จะเติบโตเร็วที่สุดเมื่อความจุอยู่ระดับกึ่งกลาง โดยได้รับประโยชน์จากโบนัสการเติบโต แต่จะเผชิญกับผลลดหย่อนความเร็วเมื่ออาณานิคม £colony£ ['concept_colony'] เข้าใกล้ขีดจำกัดสูงสุด"

 # Singular: £stability£ ['concept_stability'] or £stability£ §H$concept_stability$§!
 # Plural: -
 concept_stability: "ความมั่นคง(ทนได้)"
 concept_stability_desc: "ความมั่นคง £stability£ §H$concept_stability$§! สะท้อนถึงเสถียรภาพทางการเมืองของอาณานิคม £colony£ ['concept_colony'] ซึ่งส่วนใหญ่ได้รับอิทธิพลจากระดับความสุขความพึงพอใจ £happiness£ ['concept_pop_approval_rating'] ของประชากร\n\nความมั่นคง §H$concept_stability$§! ที่ต่ำอาจเกิดจากปัญหาต่างๆ เช่น ที่พักอาศัย £housing£ ['concept_housing'] ไม่เพียงพอ, สิ่งอำนวยความสะดวก £amenities£ ['concept_amenities'] ต่ำ หรือระดับการเกิดอาชญากรรม £crime£ ['concept_crime'] สูง ปัญหาเหล่านี้จะจำกัดประสิทธิภาพและเพิ่มความเสี่ยงต่อการเกิดเหตุการณ์เชิงลบหรือการก่อจลาจล (§Hเปิดใช้งานใหม่§!)\n\nความมั่นคงที่สูงขึ้นจะช่วยเพิ่มผลผลิตทรัพยากร"

 # Singular: -
 # Plural 1: £amenities£ ['concept_amenities'] or £amenities£ §H$concept_amenities$§!
 # Plural 2: £amenities_no_happiness£ ['concept_amenities_gestalt'] or £amenities_no_happiness£ §H$concept_amenities_gestalt$§!
 concept_amenities: "สิ่งอำนวยความสะดวก(คําค้น)"
 concept_amenities_desc: "[GetConceptAmenities]"
 concept_amenities_desc_regular: "สิ่งอำนวยความสะดวก £amenities£ §H$concept_amenities$§! แสดงถึงระบบสาธารณูปโภคและตำแหน่งงานต่างๆ ที่ตอบสนองความต้องการในชีวิตประจำวันของประชากร\n\nอาณานิคม £colony£ ['concept_colony'] ที่ขาดแคลนสิ่งอำนวยความสะดวก §H$concept_amenities$§! อย่างเพียงพอจะเผชิญกับผลลดหย่อนความสุข £happiness£ ['concept_happiness'] สามารถเพิ่มสิ่งอำนวยความสะดวก §H$concept_amenities$§! ได้ด้วยการบรรจุประชากร £pop£ ['concept_pops'] ลงในตำแหน่งงาน £job£ ['concept_jobs'] เช่น ตำแหน่งงานผู้สร้างความบันเทิง £job_entertainer£ §H$job_entertainer_plural$§!"
 concept_amenities_desc_gestalt: "สิ่งอำนวยความสะดวก £amenities_no_happiness£ §H$concept_amenities$§! แสดงถึงระบบสาธารณูปโภคและตำแหน่งงานต่างๆ ที่ตอบสนองความต้องการขั้นพื้นฐานของประชากรโดรน\n\nการมีสิ่งอำนวยความสะดวก §H$concept_amenities$§! ไม่เพียงพอจะลดระดับความมั่นคง £stability£ ['concept_stability'] สามารถเพิ่มจำนวนได้ด้วยการมอบหมายประชากร £pop£ ['concept_pops'] ลงในตำแหน่งงาน £job£ ['concept_jobs'] เช่น โดรนซ่อมบำรุง £job_maintenance_drone£ §H$job_maintenance_drone_plural$§!"

 # Singular: £crime£ ['concept_crime'] or £crime£ §H$concept_crime$§!
 # Plural: -
 concept_crime: "อาชญากรรม(Crime)"
 concept_crime_desc: "อาชญากรรม £crime£ §H$concept_crime$§! สะท้อนระดับกิจกรรมการก่ออาชญากรรมและความไร้ขอบเขตของกฎหมายในอาณานิคม £colony£ ['concept_colony']\n\nระดับอาชญากรรม §H$concept_crime$§! ที่สูงสามารถกระตุ้นให้เกิดเหตุการณ์เชิงลบและลดความมั่นคง £stability£ ['concept_stability'] ได้\n\nอาชญากรรม §H$concept_crime$§! มักได้รับอิทธิพลจากขนาดประชากรที่ใหญ่ สามารถลดระดับลงได้โดยการเพิ่มความสุขความพึงพอใจ £happiness£ ['concept_happiness'] หรือโดยการมอบหมายประชากร £pop£ ['concept_pops'] ลงในตำแหน่งงาน £job£ ['concept_jobs'] เช่น เจ้าหน้าที่รักษาความสงบ £job_enforcer£ §H$job_enforcer_plural$§!"

 # Singular: £happiness£ ['concept_happiness'] or £happiness£ §H$concept_happiness$§!
 # Plural: -
 concept_happiness: "ความสุข"
 concept_happiness_desc: "ความสุขความพึงพอใจ £happiness£ §H$concept_happiness$§! คือการวัดความพึงพอใจโดยรวมของประชากร £pop£ ['concept_pops'] ซึ่งได้รับอิทธิพลจากปัจจัยต่างๆ เช่น มาตรฐานความเป็นอยู่ ['concept_living_standards'], พระราชกฤษฎีกา ['concept_edicts'] และตัวดัดแปลงดาวเคราะห์ต่างๆ ['concept_planet_modifiers']\n\nระดับความสุข §H$concept_happiness$§! ที่สูงจะเพิ่มระดับความมั่นคง £stability£ ['concept_stability'] ซึ่งจะช่วยเพิ่มผลผลิตของตำแหน่งงาน £job£ ['concept_job'] ในทางกลับกัน ระดับความสุขที่ต่ำจะลดความมั่นคง §H$concept_stability$§!\n\nเมื่อนำไปคำนวณร่วมกับอำนาจทางการเมือง £political_power£ ['concept_political_power'] ระดับความสุข §H$concept_happiness$§! จะเป็นตัวกำหนดอัตราการเห็นชอบของประชากร £happiness£ ['concept_pop_approval_rating']\n\nประชากร §H$concept_pops$§! ที่ไม่มีระบบวัดความสุขจะถือว่ามีระดับความสุขคงที่อยู่ที่ §Y50%§! §H$concept_happiness$§!"

 # Singular: £happiness£ ['concept_pop_approval_rating'] or £happiness£ §H$concept_pop_approval_rating$§!
 # Plural: -
 concept_pop_approval_rating: "อัตราความเห็นชอบของประชากร(คะแนนนิยม ประชากรเหมาะสม)"
 concept_pop_approval_rating_desc: "อัตราความเห็นชอบของประชากร £happiness£ §H$concept_pop_approval_rating$§! แสดงถึงระดับความสุขเฉลี่ย £happiness£ ['concept_happiness'] ของประชากรทั้งหมด £pop£ ['concept_pops'] ในอาณานิคม £colony£ ['concept_colony'] โดยถ่วงน้ำหนักด้วยปริมาณอำนาจทางการเมือง £political_power£ ['concept_political_power'] ของพวกเขา\n\nประชากร §H$concept_pops$§! ที่มีอำนาจทางการเมือง §H$concept_political_power$§! สูงกว่า เช่น ชนชั้นปกครอง £pop_cat_ruler£ §H$pop_cat_ruler_plural$§! ภายใต้มาตรฐานความเป็นอยู่ส่วนใหญ่ จะส่งผลต่ออัตราการเห็นชอบนี้มากกว่าอย่างชัดเจน\n\nอัตราความเห็นชอบของประชากร §H$concept_pop_approval_rating$§! ที่ต่ำจะลดระดับความมั่นคง £stability£ ['concept_stability'] และนำไปสู่ระดับอาชญากรรม £crime£ ['concept_crime'] ที่สูงขึ้นได้"

 # Singular: £political_power£ ['concept_political_power'] or £political_power£ §H$concept_political_power$§!
 # Plural: -
 concept_political_power: "อำนาจทางการเมือง"
 concept_political_power_desc: "อำนาจทางการเมือง £political_power£ §H$concept_political_power$§! แสดงถึงอิทธิพลที่แต่ละประชากร £pop£ ['concept_pops'] มีภายในจักรวรรดิ อำนาจทางการเมืองของประชากร §H$concept_political_power$§! สามารถแปรผันตามชนชั้นระดับชั้นสังคมและตำแหน่งงาน £job£ ['concept_job']\n\nระดับอำนาจทางการเมือง §H$concept_political_power$§! ที่สูงขึ้นจะได้รับน้ำหนักผลการเลือกตั้งที่เป็นประชาธิปไตย ['concept_democratic_election'] และอิทธิพลกลุ่มการเมือง ['concept_faction'] ที่มากกว่า ทำให้ประชากรบางกลุ่มมีบทบาทสำคัญในการกำหนดนโยบายรัฐ จักรวรรดิแบบอำนาจนิยมมักรวมศูนย์อำนาจทางการเมืองไว้ในกลุ่มชนชั้นปกครอง ในขณะที่สังคมประชาธิปไตยและสังคมความเท่าเทียมจะกระจายอำนาจนี้อย่างทั่วถึงให้กับประชากรของตน"

 # Singular: ['concept_terraforming'] or §H$concept_terraforming$§!
 # Plural: -
 concept_terraforming: "การปรับปรุงสภาพดาวเคราะห์(บรรยาย)"
 concept_terraforming_desc: "การปรับปรุงสภาพดาวเคราะห์ §H$concept_terraforming$§! คือกระบวนการปรับเปลี่ยนสภาพดาวเคราะห์ £planet£ ['concept_planet'] ภายในพรมแดนของจักรวรรดิ ['concept_empire'] ให้เหมาะสมกับอยู่อาศัยมากขึ้น\n\nการดำเนินงานนี้โดยทั่วไปต้องการความรู้ทางวิทยาการวิทยาศาสตร์เทคโนโลยี ['concept_technologies'] และการลงทุนด้วยพลังงานสำรอง £energy£ ['concept_energy'] ปริมาณมหาศาล\n\nด้วยการใช้เทคโนโลยีวิทยาการปรับปรุงสภาพดาวขั้นสูง แม้แต่ดาวเคราะห์ที่มีประชากรตั้งถิ่นฐานอยู่อาศัยแล้วก็สามารถรับการปรับปรุงสภาพเพื่อให้สอดรับกับภูมิอากาศที่ชื่นชอบของเผ่าพันธุ์ประชากร ['concept_species'] ที่อาศัยอยู่ที่นั่นได้ดีขึ้น"

 # Singular: ['concept_space_fauna'] or §H$concept_space_fauna$§!
 # Plural: -
 concept_space_fauna: "สัตว์อวกาศ(สเปน ฟานา)"
 concept_space_fauna_desc: "สัตว์อวกาศ §H$concept_space_fauna$§! คือสิ่งมีชีวิตและกลุ่มพลังงานที่พบเจอในอวกาศซึ่งไม่ได้จัดตั้งเป็นจักรวรรดิ\n\nบางชนิดมีนิสัยรักสงบเว้นแต่จะถูกยั่วยุ ในขณะที่บางชนิดเป็นภัยคุกคามโดยธรรมชาติ"

 # Singular: £blocker£ ['concept_blocker'] or £blocker£ §H$concept_blocker$§!
 # Plural: £blocker£ ['concept_blockers'] or £blocker£ §H$concept_blockers$§!
 concept_blocker: "สิ่งกีดขวาง(ล็อค)"
 concept_blockers: "สิ่งกีดขวาง(กลอน)"
 concept_blocker_desc: "สิ่งกีดขวาง £blocker£ §H$concept_blocker$§! คือลักษณะทางภูมิศาสตร์ของดาวเคราะห์ที่ขัดขวางลักษณะเด่นอื่นๆ หรือขัดขวางการก่อสร้างเขตการปกครองบางประเภท £district£ ['concept_districts'] บนอาณานิคม £colony£ ['concept_colony']\n\nสิ่งกีดขวาง §H$concept_blockers$§! บางอย่างสามารถเคลียร์ออกได้โดยการใช้ทรัพยากร ซึ่งมักต้องใช้เทคโนโลยีวิจัยเฉพาะด้าน ['concept_technologies'] สิ่งกีดขวางเหล่านี้สามารถจัดการได้ในอินเตอร์เฟส £interface£ ['concept_colony_view']"

 # Singular: ['concept_event_chain'] or §H$concept_event_chain$§!
 # Plural: ['concept_event_chains'] or §H$concept_event_chains$§!
 concept_event_chain: "เหตุการณ์ต่อเนื่อง(ถึงแก่กรรม)"
 concept_event_chains: "เหตุการณ์ต่อเนื่อง(เพลงคู่)"
 concept_event_chain_desc: "เหตุการณ์ต่อเนื่อง §H$concept_event_chains$§! คือการเรียงลำดับเชื่อมโยงกันของเหตุการณ์ที่จะเปิดเผยตามกาลเวลา ซึ่งมักถูกกระตุ้นโดยการสำรวจ, การค้นพบความผิดปกติ £anomaly£ ['concept_anomalies'] หรือการตัดสินใจของจักรวรรดิ\n\nเหตุการณ์ต่อเนื่องอาจเกี่ยวข้องกับการค้นพบทางวิทยาศาสตร์, แผนการลับทางการเมือง หรือความลึกลับของกาแล็กซี ซึ่งบางครั้งนำไปสู่ผลตอบแทนที่ทรงพลังหรือภัยคุกคามที่เป็นอันตราย การตัดสินใจอย่างรอบคอบเป็นสิ่งจำเป็น เนื่องจากตัวเลือกแต่ละอย่างอาจส่งผลกระทบที่ยาวนานต่ออนาคตของจักรวรรดิ เหตุการณ์ต่อเนื่องจะมีรายชื่อแสดงอยู่ในแถบบันทึกเหตุการณ์ $situation_log_view_tab_situation_log$ ของอินเตอร์เฟส £interface£ ['concept_situation_log_view']"

 # Singular: ['concept_special_project'] or §H$concept_special_project$§!
 # Plural: ['concept_special_projects'] or §H$concept_special_projects$§!
 concept_special_project: "โครงการพิเศษ(โครงการพิเศษ)"
 concept_special_projects: "โครงการพิเศษ(โครงการพิเศษ)"
 concept_special_project_desc: "โครงการพิเศษ §H$concept_special_projects$§! คือโครงการความพยายามวิจัยเฉพาะทาง ['concept_research'] ที่จำเป็นต้องใช้ความพยายามอย่างทุ่มเทเพื่อให้เสร็จสมบูรณ์ ซึ่งจะขัดจังหวะความก้าวหน้าการวิจัยในสาขาวิทยาศาสตร์ที่เกี่ยวข้องชั่วคราว\n\nการทำโครงการพิเศษ §H$concept_special_projects$§! สำเร็จจะช่วยมอบคุณประโยชน์โบนัสที่ยอดเยี่ยม ทำให้มันเป็นส่วนประกอบหลักในการสำรวจและขยายดินแดน"

 # Singular: ['concept_milestone'] or §H$concept_milestone$§!
 # Plural: ['concept_milestones'] or §H$concept_milestones$§!
 concept_milestone: "หมุดหมายสำคัญ(นิ่ว)"
 concept_milestones: "หมุดหมายสำคัญ(นิ่ว)"
 concept_milestone_desc: "หมุดหมายสำคัญ §H$concept_milestones$§! คือเหตุการณ์สำคัญและความสำเร็จที่เป็นสัญลักษณ์ของช่วงเวลาสำคัญในการเดินทางของจักรวรรดิ โดยทำหน้าที่บันทึกประวัติตามเวลาเกี่ยวกับการขยายอาณาเขต การค้นพบ และข้อพิพาทความขัดแย้ง\n\nการติดตามหมุดหมายสำคัญ §H$concept_milestones$§! จะให้ข้อมูลเชิงลึกเกี่ยวกับการเติบโตของจักรวรรดิและการตัดสินใจเชิงกลยุทธ์ หมุดหมายสำคัญจะสามารถดูได้ในส่วนประวัติตามเวลา (§Hเส้นเวลา§!) ในแถบประวัติตามเวลา $situation_log_view_tab_timeline$ ของอินเตอร์เฟส £interface£ ['concept_situation_log_view']"

 # Singular: ['concept_empire_focus'] or §H$concept_empire_focus$§!
 # Plural: ['concept_empire_focuses'] or §H$concept_empire_focuses$§!
 concept_empire_focus: "โฟกัสของจักรวรรดิ"
 concept_empire_focuses: "โฟกัสของจักรวรรดิ"
 concept_empire_focus_desc: "เป้าหมายหลักของจักรวรรดิ §H$concept_empire_focuses$§! แสดงถึงลำดับความสำคัญเชิงกลยุทธ์ระดับสูงที่ชี้นำการพัฒนาและการตัดสินใจของจักรวรรดิ\n\nจักรวรรดิสามารถเลือกดำเนินเป้าหมายหลักที่แตกต่างกัน เช่น การสำรวจ (§Hการสํารวจ§!) เพื่อความก้าวหน้าทางวิทยาศาสตร์และการค้นพบ, การพิชิตดินแดน (§Hถาม§!) เพื่อการครองอำนาจทางการทหาร และการพัฒนา (§Hพัฒนาการ§!) เพื่อการเติบโตทางเศรษฐกิจและการทูต การทำภารกิจเป้าหมายสำเร็จจะดำเนินความคืบหน้าของเป้าหมายหลักที่เกี่ยวข้องและนำไปสู่เทคโนโลยีวิทยาการใหม่ที่รับประกันว่าจะได้รับ ['concept_technologies']\n\nภารกิจและเป้าหมายหลักจะสามารถดูได้ในแถบประวัติตามเวลา $situation_log_view_tab_timeline$ ของอินเตอร์เฟส £interface£ ['concept_situation_log_view']"

 # Singular: ['concept_scoreboard'] or §H$concept_scoreboard$§!
 # Plural: -
 concept_scoreboard: "ตารางคะแนนวัดอันดับ(กระดานเล่น)"
 concept_scoreboard_desc: "ตารางคะแนนวัดอันดับ §H$concept_scoreboard$§! จะประเมินตำแหน่งของจักรวรรดิในระดับกว้างๆ ภายในเกมแห่งดวงดาวอันยิ่งใหญ่ โดยสะท้อนถึงความสำเร็จในด้านวิทยาศาสตร์, เศรษฐกิจ, แสนยานุภาพทางทหาร และอิทธิพลทางการทูต\n\nแม้ว่าจะไม่ใช่ตัวตัดสินอย่างสมบูรณ์แบบ แต่มันทำหน้าที่เป็นสมุดบันทึกความทะเยอทะยานระหว่างดวงดาว เป็นหนทางในการเหลือบมองดูว่าใครที่เจริญรุ่งเรือง ใครที่ยืนหยัด และใครที่ทำได้เพียงแค่เอาชีวิตรอดไปวันๆ ในทางเดินที่เงียบสงบของอำนาจ การเปรียบเทียบเช่นนี้ไม่เคยเกิดขึ้นโดยไม่มีผลตามมา"

 # Singular: ['concept_living_standard'] or §H$concept_living_standard$§!
 # Plural: ['concept_living_standards'] or §H$concept_living_standards$§!
 concept_living_standard: "มาตรฐานความเป็นอยู่(เสียงมาตรฐาน)"
 concept_living_standards: "มาตรฐานความเป็นอยู่"
 concept_living_standard_desc: "มาตรฐานความเป็นอยู่ §H$concept_living_standards$§! กำหนดคุณภาพชีวิตที่ประชากรแต่ละกลุ่ม £pop£ ['concept_pops'] จะได้รับภายในจักรวรรดิ ซึ่งจะส่งผลต่อระดับความสุขความพึงพอใจ £happiness£ ['concept_happiness'] และอำนาจทางการเมืองโดยรวม £political_power£ ['concept_political_power'] มาตรฐานความเป็นอยู่จะถูกกำหนดโดยนโยบายรัฐบาล ['concept_policies'] และสามารถแปรผันตามการจัดประเภทเผ่าพันธุ์ ['concept_species'], จริยธรรมของจักรวรรดิ ['concept_ethics'] และเป้าหมายความสำคัญทางเศรษฐกิจ\n\nมาตรฐานความเป็นอยู่ที่สูงขึ้นต้องการการลงทุนด้วยทรัพยากรที่มากกว่า ในขณะที่มาตรฐานความเป็นอยู่ที่ต่ำลงจะลดค่าบำรุงรักษาโดยต้องแลกกับระดับความมั่นคง £stability£ ['concept_stability'] และความพอใจของแรงงานคนงาน สามารถตั้งค่าได้ในอินเตอร์เฟส £interface£ ['concept_species_view']"

 # Singular: ['concept_celestial_object'] or §H$concept_celestial_object$§!
 # Plural: ['concept_celestial_objects'] or §H$concept_celestial_objects$§!
 concept_celestial_object: "เทหวัตถุอวกาศ(วัตถุสวรรค์)"
 concept_celestial_objects: "เทหวัตถุอวกาศ(วัตถุสวรรค์)"
 concept_celestial_object_desc: "เทหวัตถุอวกาศ §H$concept_celestial_objects$§! คือวัตถุขนาดใหญ่ภายในระบบดาว £system£ ['concept_systems'] ซึ่งรวมถึงดาวฤกษ์ ['concept_stars'], ดาวเคราะห์ £planet£ ['concept_planets'], ดวงจันทร์ และดาวเคราะห์น้อย"

 # Singular: £district£ ['concept_city_district'] or £district£ §H$concept_city_district$§!
