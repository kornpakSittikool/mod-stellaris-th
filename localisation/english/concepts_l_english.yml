 concept_generator_district_desc: "- £housing£ ['concept_housing']: §G+200§!\n- £mod_job_technician_add£ ตำแหน่งงาน ['concept_technicians'] (ช่างเทคนิค): §G+200§!\n\n§L$district_generator_desc$§!"

 # Singular: £district£ ['concept_mining_district'] or £district£ §H$concept_mining_district$§!
