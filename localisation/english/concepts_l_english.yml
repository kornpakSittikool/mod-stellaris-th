 concept_presapient_species: "เผ่าพันธุ์ พรี-เซเปียนส์"
 concept_presapient_species_desc: "เผ่าพันธุ์พรี-เซเปียนส์เป็นสิ่งมีชีวิตที่มีไหวพริบแต่ขาดเพียงความฉลาดปราดเปรื่อง ด้วยเทคโนโลยีที่เหมาะสมจาก ['concept_society_research', £society£ $concept_society_research$] สามารถยกระดับความฉลาดหรืออนุรักษ์ไว้ใน ['concept_alien_zoo',£building£ สวนสัตว์เอเลี่ยน] ได้"

 # Singular: ['concept_galaxy_shape'] or §H$concept_galaxy_shape$§!
 # Plural: -
 concept_shape: "รูปร่าง"
 concept_galaxy_shape: "รูปร่างกาแล็กซี"
 concept_galaxy_shape_desc: "- §I$elliptical$:§! กาแล็กซีทรงกลมเรียบง่ายที่มีดาวฤกษ์กระจายอย่างสม่ำเสมอ\n- §I$ring$:§! กาแล็กซีทรงกลมที่มีพื้นที่รอบแกนกาแล็กซีมากขึ้น\n- §I$spiral$:§! กาแล็กซีเหล่านี้มีแขนสองถึงหกแขนที่โค้งออกจากแกนกลางของกาแล็กซี\n- §I$bar$:§! กาแล็กซีถูกแบ่งออกเป็นแขนเกลียวหนาสองแขน โดยมีจุดเชื่อมต่อเพียงเล็กน้อย\n- §I$starburst$:§! แขนคู่ขนานหลายแขนหมุนวนออกจากแกนกาแล็กซี\n- §I$cartwheel$:§! มีแขนบางๆจำนวนมากสร้างลูกผสมระหว่างดาราจักรชนิดก้นหอยและวงแหวน\n- §I$spoked$:§! กาแล็กซีนี้แบ่งออกเป็น 'ส่วน' ซึ่งส่วนใหญ่แยกออกจากกัน"

