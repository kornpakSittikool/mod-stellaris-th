 concept_ship_desc: "ยานอวกาศ §H$concept_ships$§! เป็นยานเดินทางในอวกาศที่รับใช้บทบาทที่หลากหลาย ตั้งแต่การสำรวจไปจนถึงการทำสงคราม ซึ่งรวมถึงยานพลเรือน ['concept_civilian_ships'] และยานรบทางทหาร ['concept_military_ships']"

