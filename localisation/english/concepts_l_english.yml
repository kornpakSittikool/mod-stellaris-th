 concept_farming_district: "$district_farming$"
 concept_farming_districts: "$district_farming_plural$"
 concept_farming_district_desc: "- £housing£ ['concept_housing']: §G+200§!\n- £mod_job_farmer_add£ ตำแหน่งงาน ['concept_farmer'] (ชาวเกษตร): §G+200§!\n\n§L$district_farming_desc$§!"

 # Singular: ['concept_debris'] or §H$concept_debris$§!
 # Plural: -
 concept_debris: "ซากปรักหักพังยานอวกาศ(หายใจ)"
 concept_debris_desc: "ซากเรือที่ลอยละล่องและลำตัวยานที่แตกละเอียด เสียงสะท้อนอันเงียบงันของความขัดแย้งในอวกาศ ซากปรักหักพังยานอวกาศ §H$concept_debris$§! ที่หลงเหลือจากการรบในอวกาศจะได้รับการติดตามเป็นโครงการพิเศษ ['concept_special_project'] ที่กำหนดเวลาไว้\n\nการมอบหมายยานสำรวจวิจัย £science_ship£ ['concept_science_ship'] ให้ไปตรวจสอบซากปรักหักพัง §H$concept_debris$§! สามารถนำไปสู่ความรู้ความเข้าใจเพื่อวิจัยเทคโนโลยีใหม่ๆ ['concept_technologies'] ได้"

 # Singular: ['concept_council'] or §H$concept_council$§!
 # Plural: -
 concept_council: "สภาผู้นำ(เงียบ)"
 concept_council_desc: "สภาผู้นำ §H$concept_council$§! ทำหน้าที่เป็นผู้ปกครองระดับสูงของจักรวรรดิ ['concept_empire'] ซึ่งประกอบด้วยผู้ปกครองประมุข (§Hไม้บรรทัด§!) และสมาชิกสภาผู้แทนเพิ่มเติมได้สูงสุด 5 คน ตำแหน่งงานในสภาแต่ละตำแหน่งสามารถบรรจุแต่งตั้งโดยผู้นำ ['concept_leader'] ซึ่งจะมีลักษณะเด่นของผู้นำ ['concept_leader_traits'] บางอย่างที่ช่วยมอบประโยชน์ทั่วทั้งจักรวรรดิ\n\nสภาผู้นำ §H$concept_council$§! ยังรับผิดชอบในการประกาศใช้วาระการดำเนินนโยบาย ['concept_agendas'] อีกด้วย\n\nการจัดการสภาและการแต่งตั้งสมาชิกจะได้รับการจัดการในแท็บสภาผู้นำ (§Hสภา§!) ของอินเตอร์เฟส £interface£ ['concept_government_view']"

 # Singular: ['concept_agenda'] or §H$concept_agenda$§!
 # Plural: ['concept_agendas'] or §H$concept_agendas$§!
 concept_agenda: "อายุ"
 concept_agendas: "ภาษาแอนตาร์ก"
 concept_agenda_desc: "วาระนโยบาย §H$concept_agenda$§! แสดงถึงเป้าหมายเชิงกลยุทธ์ในปัจจุบันของสภาผู้นำ ['concept_council'] ซึ่งจะช่วยกำหนดทิศทางลำดับความสำคัญของจักรวรรดิและเป้าหมายระยะยาว วาระนโยบายจะมอบคุณประโยชน์บางส่วนระหว่างการตระเตรียมการ และจะมอบโบนัสที่ทรงพลังมากยิ่งขึ้นเมื่อวาระถูกประกาศใช้จริง\n\nวาระนโยบายที่มีให้เลือกใช้ §H$concept_agendas$§! และผลลัพธ์ประสิทธิภาพจะแปรผันตามระบบระเบียบการปกครองที่เป็นฝ่ายปกครองอยู่ ['concept_authority'], ธรรมเนียมปฏิบัติที่นำมาใช้ ['concept_traditions'] และปัจจัยอื่นๆ\n\nวาระนโยบาย §H$concept_agendas$§! จะถูกจัดการในแท็บสภาผู้นำ (§Hสภา§!) ของอินเตอร์เฟส £interface£ ['concept_government_view']"

 # Singular: £research£ ['concept_research'] or £research£ §H$concept_research$§!
 # Plural: -
 concept_research: "การวิจัย (การวิจัย)"
 concept_research_desc: "การวิจัย £research£ §H$concept_research$§! คือกระบวนการผลักดันความก้าวหน้าทางวิทยาการวิทยาศาสตร์ในสามสาขาวิจัยหลัก ได้แก่ ด้านฟิสิกส์ £physics£ ['concept_physics_research'], ด้านสังคม £society£ ['concept_society_research'] และด้านวิศวกรรม £engineering£ ['concept_engineering_research'] แต่ละสาขาจะพัฒนาแยกกันและผลิตเทคโนโลยีวิทยาการใหม่ๆ ['concept_technologies']\n\nอัตราความเร็วการวิจัยอาจได้รับอิทธิพลจากเงื่อนไขสภาพแวดล้อมทั่วทั้งจักรวรรดิ, ลักษณะเด่นของผู้นำ ['concept_leader_traits'] หรือปัจจัยภายนอก เช่น สนธิสัญญาทางการทูต ['concept_diplomatic_pacts', $concept_research_agreements$]"
 concept_research_tooltip: "$concept_research_desc$\n\n§Gคลิกที่ ['concept_research'] เพื่อเปิดคลังข้อมูลธนาคารข้อมูล\nคลิก £research£ ในเมนูเพื่อขยายแสดงรายการ§!"

 # Singular 1: ['concept_modifier'] or §H$concept_modifier$§!
 # Plural 1: ['concept_modifiers'] or §H$concept_modifiers$§!
 # Singular 2: ['concept_empire_modifier'] or §H$concept_empire_modifier$§!
 # Plural 2: ['concept_empire_modifiers'] or §H$concept_empire_modifiers$§!
 # Singular 3: ['concept_planet_modifier'] or §H$concept_planet_modifier$§!
 # Plural 3: ['concept_planet_modifiers'] or §H$concept_planet_modifiers$§!
 concept_modifier: "ตัวดัดแปลงประสิทธิภาพ(เครื่องช่วยหายใจ)"
 concept_modifiers: "ตัวดัดแปลงประสิทธิภาพ(ระเบิด)"
 concept_empire_modifier: "ตัวดัดแปลงทั่วทั้งจักรวรรดิ (จักรวรรดิเครื่องช่วยหายใจ)"
 concept_empire_modifiers: "ตัวดัดแปลงทั่วทั้งจักรวรรดิ (จักรวรรดิโมดิฟิเลอร์)"
 concept_planet_modifier: "ตัวดัดแปลงดาวเคราะห์ (ดาวเคราะห์เครื่องช่วยหายใจ)"
 concept_planet_modifiers: "ตัวดัดแปลงดาวเคราะห์ (ดาวเคราะห์โมดิฟิเลอร์)"
 concept_modifier_desc: "ตัวดัดแปลงประสิทธิภาพ §H$concept_modifiers$§! คือโบนัสหรือผลลดหย่อนความสามารถซึ่งมักเป็นผลจากการตัดสินใจระหว่างการวิจัยความผิดปกติ £anomaly£ ['concept_anomalies'] หรือเหตุการณ์ต่อเนื่อง ['concept_event_chains']\n\nสิ่งเหล่านี้สามารถเกิดขึ้นแบบชั่วคราวหรือถาวร และอาจส่งผลครอบคลุมทั่วทั้งจักรวรรดิหรือเฉพาะเจาะจงบางพื้นที่ เช่น ดาวเคราะห์\n\nตัวดัดแปลงประสิทธิภาพ §H$concept_modifiers$§! ที่ส่งผลทั่วทั้งจักรวรรดิจะถูกแสดงในหน้าต่างจักรวรรดิ §H$empire_view_tab_empire$§! ของอินเตอร์เฟส £interface£ ['concept_empire_view'] ในขณะที่ตัวดัดแปลงเฉพาะดวงดาวจะปรากฏในอินเตอร์เฟส £interface£ ['concept_colony_view']"

 # Singular: ['concept_diplomacy'] or §H$concept_diplomacy$§!
 # Plural: -
 concept_diplomacy: "การทูตสัมพันธ์(ภาษาไทย)"
 concept_diplomacy_desc: "การทูตสัมพันธ์ §H$concept_diplomacy$§! จะควบคุมวิธีที่จักรวรรดิต่างๆ ปฏิสัมพันธ์ร่วมกัน ซึ่งครอบคลุมตั้งแต่ข้อตกลงทางการค้าและสัญญาพันธมิตร ไปจนถึงการประกาศให้เป็นคู่ปรับ ['concept_rivals'] และการทำสงคราม ['concept_wars'] การดำเนินการทางการทูตจะได้รับอิทธิพลจากปัจจัยต่างๆ เช่น จริยธรรมของจักรวรรดิ ['concept_ethics'], นโยบายการปกครอง ['concept_authorities'], แสนยานุภาพที่เปรียบเทียบกันได้ และประโยชน์ร่วมกัน\n\nจักรวรรดิต่างๆ สามารถปรับปรุงระดับความสัมพันธ์ได้โดยการส่งทูต ['concept_envoys'], การจัดทำสนธิสัญญาทางการทูต ['concept_diplomatic_pacts'] หรือมีส่วนร่วมในการเมืองระดับกาแล็กซีผ่านสหพันธ์ ['concept_federation'] และสภากาแล็กซี ['concept_galactic_community']"

 # Singular: ['concept_subject_agreement'] or §H$concept_subject_agreement$§!
 # Plural: ['concept_subject_agreements'] or §H$concept_subject_agreements$§!
 concept_subject_agreement: "ข้อตกลงรัฐบริวาร(สัญญา)"
 concept_subject_agreements: "ข้อตกลงรัฐบริวาร(สัญญา)"
 concept_subject_agreement_desc: "ข้อตกลงรัฐบริวาร §H$concept_subject_agreements$§! จะระบุข้อกำหนดในการขึ้นตรงต่อจักรวรรดิระหว่างจักรวรรดิผู้ปกครองเหนือหัวและประเทศบริวารของตน โดยกำหนดระดับเอกราชปกครองตนเอง การจ่ายส่วยทรัพยากร และภาระหน้าที่ทางทหาร ข้อตกลงเหล่านี้สามารถปรับเปลี่ยนได้ตามต้องการ ตั้งแต่การเป็นรัฐบริวารที่ถูกควบคุมอย่างเข้มงวดไปจนถึงพันธมิตรที่กึ่งอิสระ\n\nข้อตกลงรัฐบริวาร §H$concept_subject_agreements$§! สามารถเจรจาตกลงได้ในแถบข้อตกลง $contacts_view_tab_agreements$ ของอินเตอร์เฟส £interface£ ['concept_contacts_view']"

 # Singular: ['concept_relic'] or §H$concept_relic$§!
 # Plural: ['concept_relics'] or §H$concept_relics$§!
 concept_relic: "วัตถุโบราณทรงพลัง(ย้ํา)"
 concept_relics: "วัตถุโบราณทรงพลัง(ย้ํา)"
 concept_relic_desc: "วัตถุโบราณทรงพลัง §H$concept_relics$§! คือสิ่งของประดิษฐ์ที่เปี่ยมพลังจากอารยธรรมโบราณ ซึ่งจะมอบคุณประโยชน์ที่ยอดเยี่ยมเฉพาะตัวแก่ผู้ที่ครอบครอง\n\nวัตถุเหล่านี้สามารถค้นพบได้จากพิกัดโบราณคดี £archaeology£ ['concept_archaeology_site'], ได้รับจากการทำเหตุการณ์ต่อเนื่องครั้งสำคัญสำเร็จ ['concept_event_chains'] หรือยึดชิงมาจากจักรวรรดิที่พ่ายแพ้ซึ่งครอบครองพวกมันอยู่ก่อนแล้ว\n\nวัตถุโบราณทรงพลัง §H$concept_relics$§! จะช่วยมอบเอฟเฟกต์ติดตัวอย่างถาวร และสามารถกดยืนยันใช้งานเพื่อรับผลกระทบที่มีประสิทธิภาพสูงขึ้นแบบจำกัดเวลาได้ วัตถุเหล่านี้สามารถจัดการได้ในแถบวัตถุโบราณ $discoveries_view_tab_relics$ ของอินเตอร์เฟส £interface£ ['concept_discoveries_view']"

 # Singular: ['concept_astral_action'] or §H$concept_astral_action$§!
 # Plural: ['concept_astral_actions'] or §H$concept_astral_actions$§!
 concept_astral_action: "การดำเนินการแอสทรัล(ปฏิบัติการกลาง)"
 concept_astral_actions: "การดำเนินการแอสทรัล(การกระทํากลาง)"
 concept_astral_action_desc: "การดำเนินการแอสทรัล §H$concept_astral_actions$§! คือความสามารถเฉพาะทางที่ช่วยให้จักรวรรดิสามารถปฏิสัมพันธ์กับโครงสร้างของอวกาศในรูปแบบเฉพาะตัว โดยมักใช้ประโยชน์จากปรากฏการณ์แอสทรัลเพื่อความได้เปรียบเชิงกลยุทธ์\n\nการดำเนินการแอสทรัล §H$concept_astral_actions$§! มักจะปลดล็อกได้โดยการสำรวจรอยแยกแอสทรัล ['concept_astral_rifts']"

 # Singular: ['concept_minor_artifact'] or §H$concept_minor_artifact$§!
 # Plural: ['concept_minor_artifacts'] or §H$concept_minor_artifacts$§!
 concept_minor_artifact: "วัตถุโบราณชิ้นเล็ก(Minoro Artifact)"
 concept_minor_artifacts: "วัตถุโบราณชิ้นเล็ก(มณี)"
 concept_minor_artifact_desc: "วัตถุโบราณชิ้นเล็ก §H$concept_minor_artifacts$§! เป็นเศษซากประวัติศาสตร์ของอารยธรรมโบราณ ซึ่งโดยทั่วไปกู้คืนได้จากการขุดค้นแหล่งโบราณคดี £archaeology£ ['concept_archaeology_site'] แม้ว่าส่วนตัวแล้วจะเปี่ยมพลังน้อยกว่าวัตถุโบราณชิ้นใหญ่ §H$concept_relics$§! แต่ก็สามารถนำไปใช้งานได้หลากหลายวิธี เช่น การเปิดใช้งานโบนัสพิเศษของจักรวรรดิ หรือการแลกเปลี่ยนเพื่อทรัพยากรมีค่าอื่นๆ\n\nประโยชน์ใช้งานของวัตถุโบราณชิ้นเล็กจะขึ้นอยู่กับความก้าวหน้าทางเทคโนโลยีและนโยบายของจักรวรรดิ โดยทางเลือกบางสายจะอนุญาตให้ใช้พวกมันไปส่งเสริมด้านวัฒนธรรม, ความก้าวหน้าทางวิทยาศาสตร์ หรือแม้กระทั่งการนำไปใช้ในทางการทหาร วัตถุเหล่านี้สามารถจัดการได้ในอินเตอร์เฟส £interface£ ['concept_discoveries_view']"

 # Singular: ['concept_crisis'] or §H$concept_crisis$§!
 # Plural: -
 concept_crisis: "มหันตภัยวิกฤตกาแล็กซี(คริสซิส)"
 concept_crisis_desc: "มหันตภัยวิกฤตกาแล็กซี §H$concept_crisis$§! แสดงถึงการผงาดของจักรวรรดิขึ้นมาเป็นภัยคุกคามที่มีขนาดใหญ่ล้ำจักรวรรดิอื่นใด เป็นมหาอำนาจแห่งการล่มสลายที่ได้รับพลังขับเคลื่อนจากพลังต้องห้ามและเทคโนโลยีวันสิ้นโลก\n\nบรรดาผู้ที่ก้าวเข้าสู่เส้นทางนี้จะกระตุ้นการรวมพลังต่อต้านร่วมกันจากทั่วทั้งกาแล็กซี เพราะหนทางของพวกเขาคือจุดเริ่มต้นของการชำระแค้นที่หลีกเลี่ยงไม่ได้"

 # Singular: ['concept_overlord_holding'] or §H$concept_overlord_holding$§!
 # Plural: ['concept_overlord_holdings'] or §H$concept_overlord_holdings$§!
 concept_overlord_holding: "ฐานสิ่งปลูกสร้างผู้ปกครองนายใหญ่ถือ)"
 concept_overlord_holdings: "ฐานสิ่งปลูกสร้างผู้ปกครองนายใหญ่ถือ)"
 concept_overlord_holding_desc: "ฐานสิ่งปลูกสร้างของผู้ปกครอง §H$concept_overlord_holdings$§! คือสถานสถานที่ติดตั้งพิเศษที่สร้างขึ้นโดยจักรวรรดิผู้ปกครองเหนือหัวบนโลกของรัฐบริวาร สิ่งก่อสร้างเหล่านี้ช่วยแสดงอิทธิพล, การสกัดทรัพยากร หรือการให้บริการต่างๆ ซึ่งแต่ละอย่างจะช่วยสนับสนุนอำนาจของผู้ปกครองในรูปแบบที่แตกต่างกัน\n\nประเภทและจำนวนของสิ่งปลูกสร้าง §H$concept_overlord_holdings$§! จะถูกกำหนดตามเงื่อนไขของข้อตกลงรัฐบริวาร ['concept_subject_agreement'] และผลกระทบจะแปรผันตามแนวคิดสังคมจักรวรรดิ ['concept_civics'], จริยธรรม ['concept_ethics'] และการกำหนดเป้าหมายเชิงกลยุทธ์ของผู้ปกครอง แม้ว่าจะมีประโยชน์ต่อผู้ปกครอง แต่สิ่งปลูกสร้างเหล่านี้อาจกระตุ้นให้เกิดความไม่พอใจในหมู่รัฐบริวาร โดยเฉพาะอย่างยิ่งเมื่อถูกมองว่าเป็นการกดขี่หรือแทรกแซง"

  # Singular: ['concept_branch_office'] or §H$concept_branch_office$§!
 # Plural: ['concept_branch_offices'] or §H$concept_branch_offices$§!
 concept_branch_office: "$BRANCH_OFFICE$"
 concept_branch_offices: "$BRANCH_OFFICES$"
 concept_branch_office_desc: "สำนักงานสาขา §H$BRANCH_OFFICES$§! จะมอบเปอร์เซ็นต์ส่วนแบ่งมูลค่าการค้า £trade_value£ ['concept_trade'] ของโลกเป้าหมายในรูปแบบพลังงานสำรอง £energy£ ['concept_energy'] ให้แก่บริษัทผู้เป็นเจ้าของ\n\nสามารถสร้างอาคารสำนักงานสาขาได้สูงสุด §Y4§! แห่งในอินเตอร์เฟส £interface£ ['concept_colony_view'] ของโลกเป้าหมาย โดยช่องสิ่งปลูกสร้างเพิ่มเติมจะปลดล็อกเมื่ออัปเกรดอาคารศูนย์กลางการปกครองเมืองหลวง"

 # Singular 1: ['concept_war'] or §H$concept_war$§!
 # Plural 1: ['concept_wars'] or §H$concept_wars$§!
 # Singular 2: ['concept_subjugation_war'] or §H$concept_subjugation_war$§!
 # Plural 2: -
 # Singular 3: ['concept_total_war'] or §H$concept_total_war$§!
 # Plural 3: -
 concept_war: "สงคราม(สงคราม)"
 concept_wars: "สงคราม(สงคราม)"
 concept_subjugation_war: "สงครามรบเพื่อสยบรัฐบริวาร(สงครามปลดปล่อย)"
 concept_total_war: "สงครามเบ็ดเสร็จ(สงครามกลางเมือง)"
 concept_war_desc: "สงคราม §H$concept_war$§! คือสถานะของความขัดแย้งด้วยอาวุธอย่างเป็นทางการระหว่างจักรวรรดิต่างๆ เพื่อมุ่งหวังเป้าหมายเฉพาะเจาะจง ไม่ว่าจะเป็นการอ้างสิทธิ์ดินแดน ['concept_claims'], เรียกร้องความเป็นธรรม หรือปรับเปลี่ยนระเบียบของกาแล็กซี สงครามจะสร้างความชอบธรรมผ่านเงื่อนไขการประกาศสงคราม (§Hคาซัส เบลี§!) ซึ่งเป็นตัวกำหนดจุดประสงค์ของสงครามและผลลัพธ์ที่เป็นไปได้\n\nสงครามจะสิ้นสุดลงด้วยการยอมจำนนซึ่งฝ่ายหนึ่งยอมรับข้อเสนอของอีกฝ่าย หรือผ่านทางสถานะเดิมที่เป็นอยู่ (§Hสถานะ Quo§!) ของความสงบศึก ['concept_peace'] ซึ่งข้อได้เปรียบจะจำกัดอยู่เฉพาะระบบดาวที่ยึดครองได้ ณ เวลาที่ตกลงกัน เมื่อความขัดแย้งดำเนินต่อไป ความเหนื่อยล้าจากสงคราม (§Hสงคราม§!) จะสะสมขึ้นเรื่อยๆ เพิ่มความกดดันให้ยุติการสู้รบ แม้ว่าจะมีต้นทุนสูง แต่สงครามยังคงเป็นเครื่องมือที่เฉียบขาดในการกำหนดชะตากรรมของจักรวรรดิ"

 # Singular: ['concept_peace'] or §H$concept_peace$§!
 # Plural: -
 concept_peace: "ความสงบศึก(สันติภาพ)"
 concept_peace_desc: "ความสงบศึก §H$concept_peace$§! คือการยุติความเป็นศัตรูอย่างเป็นทางการระหว่างจักรวรรดิต่างๆ โดยทั่วไปจะส่งผลให้เป้าหมายสงครามมีผลบังคับใช้, เกิดการแลกเปลี่ยนดินแดน หรือการจัดระเบียบทางการเมืองแบบใหม่ ความสงบศึกสามารถเกิดขึ้นผ่านการยอมจำนนหรือเกิดขึ้นเนื่องจากความเหนื่อยล้าจากสงครามร่วมกันทั้งสองฝ่าย\n\nเงื่อนไขของความสงบศึกจะเป็นตัวกำหนดระเบียบหลังสงคราม การจัดตั้งเขตพรมแดน การสยบสยบจักรวรรดิรัฐบริวาร หรือเป็นการหว่านเมล็ดพันธุ์สำหรับความขัดแย้งในอนาคต"

 # Singular: ['concept_galactic_community'] or §H$concept_galactic_community$§!
 # Plural: -
 concept_galactic_community: "สภากาแล็กซี(ชุมชนกาแล็กซี่)"
 concept_galactic_community_desc: "สภากาแล็กซี §H$concept_galactic_community$§! คือหน่วยงานนิติบัญญัติร่วมทั่วทั้งกาแล็กซีที่จัดตั้งขึ้นโดยจักรวรรดิสมาชิกเพื่อส่งเสริมความร่วมมือ, กำหนดมาตรฐานระเบียบระหว่างดวงดาว และจัดการภัยคุกคามร่วมกัน ผ่านการนำเสนอและการผ่านมติที่ประชุม สภากาแล็กซีสามารถใช้อำนาจโน้มนำแบบอ่อน(อํานาจสูงสุด)เหนือสมาชิกของตน ควบคุมกฎเกณฑ์การทำสงคราม ['concept_war'], การค้า และคุณค่าทางสังคมในระดับกาแล็กซี\n\nจักรวรรดิต่างๆ สามารถเพิ่มบทบาทอิทธิพลภายในสภาได้โดยการส่งทูต ['concept_envoys'] และสะสมน้ำหนักเสียงทางการทูต ['concept_diplomatic_weight'] แม้ว่าโดยเปลือกนอกแล้วจะเป็นเวทีเพื่อความสามัคคี แต่สภามักจะเป็นสถานที่สำหรับการแก่งแย่งชิงดี การเจรจาลับหลัง และการแสวงหาผลประโยชน์ของผู้กุมอำนาจภายใต้หน้ากากของการปกครองร่วมกัน"

 # Singular: ['concept_galactic_council'] or §H$concept_galactic_council$§!
 # Plural: -
 concept_galactic_council: "สภาบริหารกาแล็กซี(สภากาแล็กซี่)"
 concept_galactic_council_desc: "สภาบริหารกาแล็กซี §H$concept_galactic_council$§! คือคณะผู้ปกครองระดับสูงภายในสภากาแล็กซี ['concept_galactic_community'] ประกอบด้วยจักรวรรดิสมาชิกที่มีอำนาจมากที่สุดตามคะแนนน้ำหนักทางการทูต ['concept_diplomatic_weight'] สมาชิกสภาบริหารมีสิทธิพิเศษเฉพาะตัว ซึ่งรวมถึงความสามารถในการยื่นเรื่องมาตรการฉุกเฉิน ยับยั้ง(เสียงพูด)มติที่ประชุม และชี้นำวาระกาแล็กซี\n\nที่นั่งในสภาบริหารมีจำกัดและอาจเปลี่ยนแปลงได้ โดยการเป็นสมาชิกจะขึ้นอยู่กับแสนยานุภาพทางการทูตที่เปรียบเทียบกัน แม้ว่าจะมีเป้าหมายเพื่อปกป้องระเบียบของกาแล็กซี แต่สภาบริหารมักจะกลายเป็นสนามทดสอบความทะเยอทะยาน ที่ซึ่งผู้แข็งแกร่งจะปักหลักรักษาความเหนือกว่าของตนและผู้อ่อนแอจะสมคบคิดเพื่อทำลายมันลง"

 # Singular: ['concept_favor'] or §H$concept_favor$§!
 # Plural: ['concept_favors'] or §H$concept_favors$§!
 concept_favor: "บุญคุณความโปรดปราน(รอยเท้า)"
 concept_favors: "บุญคุณความโปรดปราน(รอยเท้า)"
 concept_favor_desc: "บุญคุณความโปรดปราน §H$concept_favors$§! คือเครื่องมือทางการทูตที่เป็นตัวแทนของการติดค้างอิทธิพลระหว่างจักรวรรดิ ซึ่งมักได้รับจากการมีส่วนร่วมในเหตุการณ์ของกาแล็กซี สิ่งเหล่านี้ทำหน้าที่เป็นเงินตราทางการเมืองประเภทหนึ่งภายในสภากาแล็กซี §H$concept_galactic_community$§! และบริบททางการทูตในมุมกว้าง\n\nบุญคุณความโปรดปรานสามารถใช้จ่ายเพื่อจูงใจการลงคะแนนเสียง ปรับปรุงข้อเสนอทางการทูต หรือใช้สร้างความได้เปรียบในการเจรจาต่อรอง"

 # Singular: ['concept_diplomatic_weight'] or §H$concept_diplomatic_weight$§!
 # Plural: -
 concept_diplomatic_weight: "น้ำหนักเสียงทางการทูต(เสียงเบา)"
 concept_diplomatic_weight_desc: "น้ำหนักเสียงทางการทูต §H$concept_diplomatic_weight$§! จะวัดอิทธิพลของจักรวรรดิภายในสภากาแล็กซี ['concept_galactic_community'] โดยกำหนดความแข็งแกร่งของการลงคะแนนเสียงมติต่างๆ และการมีคุณสมบัติเหมาะสมสำหรับสมาชิกสภาบริหารกาแล็กซี ['concept_galactic_council'] น้ำหนักนี้คำนวณมาจากพลังทางเศรษฐกิจ เทคโนโลยี และแสนยานุภาพทางการทหารของจักรวรรดิ ตลอดจนจำนวนผู้แทนทูต ['concept_envoys'] ที่ส่งไปร่วมสภากาแล็กซี\n\nน้ำหนักทางการทูตสามารถขึ้นๆ ลงๆ ได้ตามเวลา ทำให้มันเป็นทั้งภาพสะท้อนสถานะของจักรวรรดิและเป็นเครื่องมือในการผลักดันเป้าหมายผลประโยชน์ของตน"

 # Singular: ['concept_first_contact'] or §H$concept_first_contact$§!
 # Plural: ['concept_first_contacts'] or §H$concept_first_contacts$§!
 concept_first_contact: "การติดต่อสัมผัสแรก(ติดต่อแรก)"
 concept_first_contacts: "การติดต่อสัมผัสแรก(ติดต่อแรก)"
 concept_first_contact_desc: "การติดต่อสัมผัสแรก §H$concept_first_contact$§! แสดงถึงการพบเจอกันครั้งแรกระหว่างอารยธรรมที่ไม่เคยรู้จักกันมาก่อน ช่วงเวลาของการเปิดเผยนี้สามารถนำไปสู่ความร่วมมือทางการทูต ['concept_diplomacy'], ความคลางแคลงใจ หรือความขัดแย้ง ขึ้นอยู่กับธรรมชาติและเจตนารมณ์ของอารยธรรมที่เกี่ยวข้อง\n\nกระบวนการติดต่อสัมผัสแรก §H$concept_first_contact$§! จะเกี่ยวข้องกับการถอดรหัสสัญญาณการสื่อสารของต่างดาว การจัดการเหตุการณ์ที่อาจเกิดขึ้น และการกำหนดท่าทีของจักรวรรดิต่อสิ่งที่ไม่รู้จัก"

# Singular: ['concept_workforce'] or §H$concept_workforce$§!
 # Plural: -
 concept_workforce: "กำลังแรงงาน(แรงงาน)"
 concept_workforce_desc: "กำลังแรงงาน §H$concept_workforce$§! แสดงถึงความจุขีดความสามารถแรงงานร่วมของอาณานิคม £colony£ ['concept_colony'] สะท้อนจำนวนบุคคลที่มีความพร้อมในการปฏิบัติงานต่างๆ ที่จำเป็นต่อการดำเนินงานของจักรวรรดิ\n\nประชากร £pop£ ['concept_pops'] จะจัดกลุ่มตามลักษณะเด่นร่วมกัน เช่น เผ่าพันธุ์ ['concept_species'], ระดับชั้นในสังคม และจริยธรรม ['concept_ethics'] แต่ละกลุ่มจะมีส่วนร่วมในกำลังแรงงานของดาวเคราะห์ §H$concept_workforce$§! ซึ่งจะได้รับการจัดสรรเพื่อบรรจุในตำแหน่งงานที่เปิดอยู่ £job£ ['concept_jobs']"

 # Singular: £zone£ ['concept_district_specialization'] or £zone£ §H$concept_district_specialization$§!
 # Plural: £zone£ ['concept_district_specializations'] or £zone£ §H$concept_district_specializations$§!
 concept_district_specialization: "$planet_zone$"
 concept_district_specializations: "$planet_zones$"
 concept_district_specialization_desc: "ความเชี่ยวชาญเฉพาะด้านเขตการปกครอง(การจํากัดความพิเศษ)จะกำหนดตำแหน่งงาน £job£ ['concept_jobs'] ที่ได้รับจากเขตการปกครองแต่ละเขต £district£ ['concept_district'] และส่วนใหญ่จะเพิ่มพื้นที่สำหรับสิ่งปลูกสร้างเพิ่มเติม £building£ ['concept_buildings']"
 concept_district_specializations_desc: "$concept_district_specialization_desc$"

 # Singular: -
# Plural: £strategic_resource£ ['concept_strategic_resources'] or £strategic_resource£ §H$concept_strategic_resources$§!
 concept_strategic_resources: "ทรัพยากรเชิงยุทธศาสตร์"
 concept_strategic_resources_desc: "£strategic_resource£ §H$concept_strategic_resources$§! (ทรัพยากรเชิงกลยุทธ์) เป็นสสารดิบที่หายากและเปี่ยมพลังซึ่งมีความสำคัญต่อวิทยาการเทคโนโลยีขั้นสูง โครงสร้างพื้นฐาน และระบบยานอวกาศ\n\nตัวอย่างได้แก่ แร่จุดเดือดต่ำ £volatile_motes£ §H$volatile_motes$§!, แก๊สต่างมิติ £exotic_gases£ §H$exotic_gases$§! และคริสตัลหายาก £rare_crystals£ §H$rare_crystals$§!\n\nทรัพยากรหายาก (§Hทรัพยากรเพลง§!) คือสารดิบที่มีมูลค่ามากกว่าและเป็นสารที่มีความเฉพาะตัวพร้อมกับการใช้งานที่ก้าวหน้าอย่างยิ่ง เหนือสิ่งอื่นใด ทรพัยากรหายากและเชิงกลยุทธ์ถูกใช้ในการสร้างยานพลเรือน ['concept_civilian_ships'], ยานรบทางทหาร ['concept_military_ships'], สถานีอวกาศหลัก ['concept_starbases'] และสิ่งก่อสร้างยักษ์ ['concept_megastructures']$tt_gain$- สร้างเขต £zone£ §H$zone_industrial_plural$§! หรือ £zone£ §H$zone_foundry_plural$§!\n- สร้างสิ่งปลูกสร้างที่เกี่ยวข้อง\n- $tt_market$"
 concept_strategic_resources_tooltip: "$concept_strategic_resources_desc$\n\n§Gคลิกที่ ['concept_strategic_resources'] เพื่อเปิดคลังข้อมูลธนาคารข้อมูล\nคลิก £strategic_resource£ ในเมนูเพื่อขยายแสดงรายการ§!"

 POLICY_OPTION_CONCEPT_BODY: "- ['policy:$POLICY$:$OPTION$',$OPTION_NAME$]"

 # Synced from vanilla by Stellaris Thai Translator.
 # These keys were missing from the mod and should be translated on the next pass.
 concept_habitable_world: "โลก ที่ มี นิสัย ดี"
 concept_habitable_worlds: "โลก ที่ มี นิสัย ดี"
 concept_habitable_world_desc: "§H$concept_habitable_worlds$§!เป็นร่างกายที่สามารถรองรับ£pop£ ['concept_pops']และพัฒนาเป็น£colony£ ['concept_colonies']นี่รวมถึงการเกิดขึ้นตามธรรมชาติ£planet£ ['concept_planets']สร้างเอง['concept_habitats']และ§Hโลกวงแหวน§!.\n\nธรรมชาติ§H$concept_planets$§!มาในเก้าชนิดสภาพภูมิอากาศพื้นฐาน\n\nบางโลกในปัจจุบันที่ไม่สามารถอาศัยได้ อาจกลายเป็นที่อยู่ได้โดย['concept_terraforming']."
 concept_starbase_capacity_desc_settled: "§H$concept_starbase_capacity$§!แสดงจํานวนของการปรับรุ่น['concept_starbases']ที่สามารถรองรับได้อย่างมีประสิทธิภาพ ไม่นับ['concept_outposts'].\n\nการไล่ระดับสี§H$concept_starbase_capacity$§!เพิ่ม['concept_starbase_upkeep'].$tt_gain$- เอาอีก['concept_owned_systems']\n- จํากัดความแน่นอน['concept_technologies']ถึง['concept_traditions']"
 concept_starbase_capacity_desc_nomadic: "§H$concept_starbase_capacity$§!แสดงจํานวนของ£waystation£ ['concept_waystations']ที่ได้รับการสนับสนุนอย่างมีประสิทธิภาพจาก£nomad£ ['concept_nomadic_empire'].\n\nการไล่ระดับสี§H$concept_starbase_capacity$§!เพิ่ม['concept_starbase_upkeep'].$tt_gain$- จํากัดความแน่นอน['concept_technologies']ถึง['concept_traditions']"
 concept_situation: "สถานการณ์"
 concept_situations: "สถานการณ์"
 concept_situation_desc: "§H$concept_situations$§!มีสถานการณ์หลายชั้นเกิดขึ้น ที่จักรวรรดิอาจพบตัวเองใน\n\nโดย การ รับ เอา วิธี การ หลาย อย่าง พวก เขา อาจ ได้ รับ ผล ตอบ แทน มาก มาย หรือ เพียง แค่ ทํา ให้ เกิด ความ หายนะ.§Hสถานการณ์§!ในรายการ$situation_log_view_tab_situation_log$แท็บของ£interface£ ['concept_situation_log_view']."
 concept_subject: "เรื่อง"
 concept_subjects: "เรื่อง"
 concept_subject_desc: "§H$concept_subjects$§!เป็นอาณาจักรที่อยู่ภายใต้อํานาจ ของจักรวรรดิเหนือพระเจ้า ขณะที่ประชาชนยังรักษารัฐบาลและกองเรือของตนไว้ การกระทําของพวกเขาถูกจํากัดโดย['concept_subject_agreement']เห็นด้วยกับเจ้านายของพวกเขา"
