 concept_industrial_district_desc: "- £housing£ ['concept_housing']: §G+200§!\n- £mod_job_artisan_add£ ตำแหน่งงาน ['concept_artisan'] (ช่างฝีมือ): §G+100§!\n- £mod_job_foundry_add£ ตำแหน่งงาน ['concept_metallurgist'] (ช่างถลุงโลหะ): §G+100§!\n\n§L$district_industrial_desc$§!"

