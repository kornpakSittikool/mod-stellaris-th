 leviathans.171.desc:1 "เนื่องจากพลังงานสำรองของเราหมดลง เราจึงไม่สามารถรักษาข้อตกลงทางการค้าที่ขึ้นอยู่กับทรัพยากรนี้ได้อีกต่อไป ข้อตกลงทั้งหมดกับเอ็นเคลฟของพ่อค้า(Trader Enclaves)ได้ถูกยกเลิกแล้ว"
