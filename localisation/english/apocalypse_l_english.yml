 action.82.name:0 "[From.GetName] ถูกปูพรมทิ้งระเบิด"
 action.82.desc:0 "กองยานที่สังกัด §H[From.From.GetName]§! ได้สังหารหมู่ประชากรของ §H[From.GetName]§!! หลังจากการโจมตีทิ้งระเบิดจากวงโคจรอย่างต่อเนื่องและหนักหน่วง ศูนย์กลางประชากรทั้งหมดบนพื้นผิวได้รับการกวาดล้างอย่างเป็นระบบ ทำให้ [From.GetPlanetMoon] กลายเป็นดินแดนรกร้างปนเปื้อนกัมมันตภาพรังสีซึ่งแทบจะไม่สามารถรองรับสิ่งมีชีวิตใด ๆ ได้อีกต่อไป"
 action.82.a:0 "ความโหดร้ายนี้ต้องได้รับการชำระแค้น!"
 action.83.desc:0 "กองกำลังของเราได้รับรายงานว่าได้ปูพรมทิ้งระเบิดจากวงโคจรของ §H[From.GetName]§! เสร็จสิ้นแล้ว ศูนย์กลางประชากรทั้งหมดได้รับการทำลายล้างอย่างเป็นระบบ และ [From.GetPlanetMoon] ที่มีสารรังสีเจือปนนี้จะสามารถรองรับชีวิตได้เพียงเล็กน้อยเท่านั้น"
 bombed_to_tomb_world:0 "§Y[From.GetName] ได้กลายเป็นโลกสุสานร้าง(ทรอมเวิลด์)ไร้ผู้คนแล้ว§!"

