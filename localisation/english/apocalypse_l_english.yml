 apoc.120.part.milit:0 "แม้ว่าโคโลสซัสลำแรกจะยังไม่ได้ถูกสร้างขึ้นมา แต่ช่วงเวลานี้คือจุดหมุนสำคัญที่ประวัติศาสตร์ของ [Root.GetName] จะเปลี่ยนไปตลอดกาล"
