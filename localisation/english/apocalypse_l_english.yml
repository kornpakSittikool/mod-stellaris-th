 leviathans.105.e.response:0 "ตกลง เราจะส่งคำสั่งไปยังเรือบรรทุกสินค้าของเราในทันทีเพื่อให้ยุติการปฏิบัติการและกลับสู่ฐานทัพ\n\nโปรดแจ้งให้เราทราบหากท่านเปลี่ยนใจ!"
