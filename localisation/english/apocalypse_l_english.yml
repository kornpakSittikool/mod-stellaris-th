 apoc.120.desc.hive:0 "โครงสร้างของโคโลสซัสก่อตัวขึ้นอย่างสมบูรณ์ในใจของเราแล้ว พร้อมที่จะรับการประกอบขึ้น และด้วยความไม่สบายใจบางประการ เราตระหนักว่าฝันร้ายของ §R[Root.Get1stPlanetKiller]§! ก็สามารถสร้างให้เป็นจริงได้เช่นกัน"
