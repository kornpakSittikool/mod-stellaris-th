 vultaum_homeworld:0 "ดาวบ้านเกิด Vultaum"
 vultaum_homeworld_desc:0 "อดีตดาวบ้านเกิดโบราณของ Vultaum แม้ว่าดาวเคราะห์จะแตกละเอียดและไม่สามารถหล่อเลี้ยงชีวิตได้อีกต่อไป แต่ก็ยังพบร่องรอยของมหานครขนาดใหญ่บนพื้นผิว"
 vultaum_minerals:0 "ซากสิ่งอำนวยความสะดวกในวงโคจร"
 vultaum_minerals_desc:0 "สถานีโคจรอันมหาศาลบางชนิดของ Vultaum ตกลงบนดาวเคราะห์ดวงนี้เมื่อหลายยุคสมัยก่อน พื้นผิวเกลื่อนกลาดไปด้วยซากชิ้นส่วน"
 vultaum_energy:0 "เครือข่ายเหมืองแร่แอโรสแตท"
 vultaum_energy_desc:0 "ดาวแก๊สยักษ์ดวงนี้เคยรองรับเครือข่ายขนาดใหญ่ของสิ่งอำนวยความสะดวกการขุดเจาะแร่ประเภทออโรสตาตซึ่งถูกใช้งานโดย Vultaum เพื่อสกัดฮีเลียม-3"
 yuht_homeworld:0 "ดาวบ้านเกิดยี้"
 yuht_homeworld_desc:0 "ชาวยี้โบราณมีต้นกำเนิดบนดาวดวงนี้ การยิงถล่มทิ้งระเบิดจากวงโคจรได้บดขยี้โครงสร้างสิ่งก่อสร้างส่วนใหญ่บนพื้นผิวให้กลายเป็นผุยผง แต่ก็ยังเหลือพื้นที่ที่อยู่อาศัยใต้ดินร้างบางแห่งที่สามารถทำการศึกษาเพิ่มเติมได้"
 yuht_minerals:0 "แถบดาวเคราะห์น้อยที่อุดมสมบูรณ์"
 yuht_minerals_desc:0 "แถบดาวเคราะห์น้อยที่อุดมสมบูรณ์นี้เคยถูกขุดเจาะอย่างกว้างขวางโดยยี้และแร่ธาตุที่พบที่นี่ได้สนับสนุนการขยายจักรวรรดิระหว่างดวงดาวที่เชื่องช้าแต่มั่นคงของพวกเขา"
 yuht_energy:0 "แผงรวบรวมพลังงานแสงอาทิตย์"
 yuht_energy_desc:0 "แผงรวบรวมพลังงานแสงอาทิตย์โบราณหลายแผงถูกติดตั้งในวงโคจรรอบดาวแก๊สยักษ์ดวงนี้โดยยี้น่าเหลือเชื่อที่บางแผงยังสามารถทำงานได้จนถึงทุกวันนี้"
 first_league_homeworld:0 "เมืองหลวงลีกแรก"
 first_league_homeworld_desc:0 "สุสานขนาดใหญ่แห่งดาวเคราะห์นี้เคยเป็นศูนย์กลางการบริหารจัดการอันรุ่งโรจน์ของลีกแรกปัจจุบันมันไม่สามารถหล่อเลี้ยงชีวิตได้อีกต่อไป แต่เศษซากของเมืองที่เคยทอดยาวครอบคลุมพื้นผิวทั้งหมดสามารถพบเห็นได้ทั่วไปทุกหนทุกแห่ง"
 first_league_minerals:0 "เหมืองแร่ที่ถูกละทิ้ง"
 first_league_minerals_desc:0 "แถบดาวเคราะห์น้อยนี้เคยมีประชากรอาศัยอยู่อย่างหนาแน่นในยุครุ่งเรืองของลีกแรกสามารถพบสิ่งอำนวยความสะดวกการทำเหมืองแร่ที่ถูกละทิ้งบนดาวเคราะห์น้อยหลายพันดวง"
 first_league_energy:0 "แท่นบำรุงรักษา"
 first_league_energy_desc:0 "ดาวแก๊สยักษ์ดวงนี้เคยเป็นบ้านของแท่นบำรุงรักษาขนาดใหญ่หลายแท่นซึ่งให้บริการแก่ขบวนเรือขนส่งสินค้าของกองเรือพาณิชย์ลีกแรกนับแสนลำ อุปกรณ์ถ่ายโอนพลังงานบางชิ้นยังคงทำงานได้"
 irassian_homeworld:0 "ดาวบ้านเกิดอิหร่าน"
 irassian_homeworld_desc:0 "แม้จะมีความพยายามกวาดล้างสิ่งมีชีวิตบนพื้นผิวผ่านการยิงระเบิดจากวงโคจรในภายหลัง ดาวบ้านเกิดโบราณของชาวอิหร่านก็ยังเป็นแหล่งสะสมโบราณวัตถุจำนวนมหาศาลจากอารยธรรมขั้นสูงของพวกเขา"
 irassian_minerals:0 "อดีตจุดทอดสมอกองเรือ"
 irassian_minerals_desc:0 "เคยเป็นจุดทอดสมอหลักของกองเรือรบอิหร่านอู่ต่อเรือผุพังที่เกลื่อนกลาดอยู่ในวงโคจรของดาวเคราะห์ดวงนี้ได้ตกลงมากองทับถมส่งผลให้พื้นผิวอุดมไปด้วยแร่ธาตุทรัพยากรมหาศาล"
 irassian_energy:0 "แหล่งผลิตพลังงาน"
 irassian_energy_desc:0 "ดาวแก๊สยักษ์ดวงนี้ทำหน้าที่เป็นแหล่งผลิตพลังงานหลักของคองคอร์ดในช่วงเริ่มต้นของการขยายดินแดนระหว่างดวงดาว เครือข่ายสถานีพลังงานโคจรโบราณที่หนาแน่นยังคงหมุนล้อมรอบดาวเคราะห์ดวงนี้"

