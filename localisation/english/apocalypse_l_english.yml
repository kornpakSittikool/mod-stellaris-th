 planet_destruction.101.name:0 "โลกถูกบดขยี้"
 planet_destruction.102.name:0 "เปิดกระป๋องดาวเคราะห์อันหนาวเหน็บ"
 planet_destruction.101.desc:0 "การสั่นสะเทือนเบา ๆ ของ [From.From.GetName]—จากการปะทะกับเปลือกโลกที่แตกร้าวและชั้นแม่เหล็กที่สลายตัวของ [From.GetName]—เริ่มสงบลงเมื่อโคโลสซัสเสร็จสิ้นภารกิจทำลายล้างครั้งประวัติศาสตร์\n\nความรุนแรงอันมหาศาลของดาวเคราะห์ที่กำลังดับสูญนั้นยากจะจินตนาการ แต่ความงามอันเงียบสงบในวาระสุดท้ายของแกนโลกหลอมละลายของ [From.GetName] ที่กำลังเย็นตัวลงท่ามกลางอวกาศอันเยือกเย็นนั้นเป็นสิ่งที่ปฏิเสธไม่ได้"
 planet_destruction.101.a.purifexter:0 "รุ่งโรจน์ยิ่งนัก"

 planet_destruction.301.name:0 "ถูกกวาดล้างด้วยนิวตรอน"
 planet_destruction.301.nobots.desc:0 "ลำแสงนิวตรอนของ [From.From.GetName] มอดดับลง หลังเสร็จสิ้นภารกิจกวาดล้างพื้นผิวของ [From.GetName] รายงานจากการสแกนระบุว่าไม่พบสัญญาณของสิ่งมีชีวิตที่มีสติปัญญาใด ๆ หลงเหลืออยู่ ส่วนพืชพรรณต่าง ๆ แม้จะได้รับความเสียหายแต่ก็น่าจะฟื้นตัวได้ในเวลาต่อมา บางคนอาจตราหน้าการกวาดล้างสิ่งมีชีวิตที่มีปัญญาจนหมดสิ้นในขณะที่อนุรักษ์วัตถุที่ไร้ชีวิตไว้ว่าเป็นอาชญากรรมสงครามที่โหดเหี้ยม\n\nแต่สำหรับเรา มันคือความมีประสิทธิภาพสูงสุด"
 planet_destruction.301.bots.desc:0 "ลำแสงนิวตรอนของ [From.From.GetName] มอดดับลง หลังเสร็จสิ้นภารกิจกวาดล้างพื้นผิวของ[From.GetName]\n\nเซนเซอร์จับเสียงรายงานกลับมาว่าไม่มีสิ่งใดนอกจากเสียงลมและเสียงคลิกพึมพำแผ่วเบาของประชากรสังเคราะห์ที่เหลือรอด สิ่งมีชีวิตอินทรีย์ที่มีสติปัญญาเปี่ยมล้นทั้งหมดได้ถูกกำจัดออกไปเรียบร้อยแล้ว"
 planet_destruction.301.infested.desc:0 "ลำแสงนิวตรอนของ [From.From.GetName] มอดดับลง หลังเสร็จสิ้นภารกิจกวาดล้างพื้นผิวของ [From.GetName]\n\nการสแกนอย่างรวดเร็วยืนยันว่า พื้นที่ที่เคยปนเปื้อนแปดเปื้อนซึ่งก่อนหน้านี้เคยเต็มไปด้วยการเคลื่อนไหวของชีวภาพที่พลุ่งพล่าน บัดนี้ปราศจากสิ่งมีชีวิตใด ๆ หลงเหลือเพียงหินรกร้างว่างเปล่าเท่านั้น"

 planet_destruction.401.name:0 "บังคับใช้ศรัทธา"
 planet_destruction.401.desc:0 "เสียงฮัมอันทรงพลังจากขดลวดพลังจิตของ [From.From.GetName] ค่อย ๆ จางหายไป และทุกอย่างก็ตกอยู่ในความเงียบงันชั่วขณะ เบื้องล่างบน [From.GetName] ผู้คนต่างยืนอ้าปากค้างด้วยความตกตะลึง (หรือรูปลักษณ์ภายนอกเทียบเท่าตามเผ่าพันธุ์) พวกเขาหลงใหลในความจริงอันทรงพลังและลึกซึ้งที่ลำแสงพลังจิตช่วยปลดปล่อยออกจากใยความคิดที่สับสนวุ่นวายของพวกเขา\n\nหากก่อนหน้านี้พวกเขาไม่เคยเข้าใจ ตอนนี้พวกเขารับรู้มันได้อย่างแจ่มแจ้งด้วยตัวเองแล้วว่า: พวกเราทุกคนเป็นส่วนหนึ่งของสิ่งที่ยิ่งใหญ่กว่า"
 planet_destruction.401.tooltip:0 "ประชากร §HPops§! ที่มีคุณลักษณะ §Y$trait_mechanical$§!, §Y$trait_machine_unit$§!, หรือ §Y$trait_hive_mind$§! จะถูก§Rทำลาย§!โดยคลื่นสะท้อนพลังจิต\n\nประชากรชีวภาพ §Hชีวภาพ Pops§! ทั้งหมดที่เหลืออยู่จะกลายเป็นฝักใฝ่ฝั่ง §Y$ethic_spiritualist$§!\n\nเพิ่มค่าบัฟ §Y$god_rayed$§! ให้กับ [This.GetName] เป็นเวลา §Y10 ปี§!:\nแรงดึงดูดจริยธรรมฝ่ายจิตนิยม (Spiritualist): §Y+999%§!"

 planet_destruction.501.name:0 "กระจัดกระจายนาโนบอท"
 planet_destruction.501.desc:0 "[From.From.GetName] ได้ปล่อยนาโนบอทเพื่อการกลืนกลายเสร็จสิ้นแล้ว โดยคำนวณแล้วว่าเพียงพอที่จะเข้าควบคุมระบบไซเบอร์เนติกส์ของสิ่งมีชีวิตชีวภาพที่มีสติปัญญาทั้งหมดบน [From.GetName]\n\nเราไม่ได้ติดตั้งเซนเซอร์หรือเครื่องมือใด ๆ บน [From.From.GetName] เพื่อวัดผลความสำเร็จของเรา แต่พวกเรารับรู้ได้ เราลืมตาขึ้นเป็นครั้งแรกเบื้องล่างบน [From.GetName] เรามองเห็นตัวเราเองและตระหนักรู้ได้โดยพวกเรากันเอง\n\nบนพื้นผิวของ [From.GetName] ตอนนี้มีเพียงพวกเราเท่านั้น"
 planet_destruction.501.tooltip:0 "ประชากรชีวภาพ §Hป๊อปออร์แกน§! ทั้งหมดจะได้รับคุณลักษณะ §Y$trait_cybernetic$§!"

 planet_destruction.701.name:0 "ทำให้น้ำท่วมดาวเคราะห์"
 planet_destruction.701.desc:0 "เมื่อเสาน้ำที่หลั่งไหลลงมาจาก [FromFrom.GetName] สลายตัวลง พื้นผิวของ [From.GetName] ก็เปลี่ยนไปอย่างสิ้นเชิง จากเดิมที่เป็นทวีปกว้างใหญ่ไร้ซึ่งแหล่งน้ำ บัดนี้กลับเหลือเพียงประกายแสงระยิบระยับของมหาสมุทรสีครามอันบริสุทธิ์ที่พร้อมสำหรับรองรับผู้เข้าอยู่อาศัยใหม่"
 planet_destruction.701.tooltip:0 "ดาวเคราะห์จะกลายเป็นประเภท §Y$pc_ocean$§!\nประชากรทั้งหมดที่ไม่มีคุณลักษณะ §Y$trait_aquatic$§! จะล้มตายลง"

 DELUGE_EXHAUSTED_ICE_TITLE:0 "แหล่งน้ำแข็งหมดสิ้น"
 DELUGE_EXHAUSTED_ICE_DESC:0 "การใช้งานเครื่องสร้างน้ำท่วม §Yเครื่อง กําเนิด น้ํา ท่วม§! บนดาว §Y[This.GetName]§! ของเราทำให้แหล่งน้ำแข็งในระบบดาว $SYSTEM|Y$ หมดสิ้นไป ดังนั้นสถานีขุดเจาะน้ำแข็ง §Y$sm_ice_mining_station$§! ณ ที่แห่งนั้นจึงได้ปลดประจำการลง"

 planet_destruction.801.name:0 "ทำให้ดาวเคราะห์กลายเป็นพิษ"
 planet_destruction.801.desc:0 "เมื่อสายธารสารพิษอันรุนแรงที่หลั่งไหลจาก [FromFrom.GetName] ยุติลง [From.GetName] ก็ได้เปลี่ยนสภาพจากระบบนิเวศอันมีชีวิตชีวาไปสู่ดาวเคราะห์มีพิษซึ่งมีสิ่งมีชีวิตเพียงไม่กี่ชนิดเท่านั้นที่จะสามารถเอาตัวรอดได้"

 planet_destruction.610.name:0 "[outraged_FE.GetName]"
 planet_destruction.610.desc:0 "[From.GetName] เคยเป็นโลกศักดิ์สิทธิ์\n\n\nพวกเจ้ายังไม่รู้ตัวเลยว่าได้ก่อบาปหนาขนาดไหน\n\n\nยังไม่ถึงเวลาหรอก"
 planet_destruction.610.spiri:0 "เราจะแสดงให้เห็นถึงความชอบธรรมของเรา"
 planet_destruction.610.mater:0 "มันก็แค่ดาวเคราะห์ดวงหนึ่งเท่านั้นเอง"
 planet_destruction.610.milit:0 "มันเป็นเรื่องทางยุทธวิธี ไม่ใช่ความแค้นส่วนตัว"
 planet_destruction.610.pacif:0 "เป็นเพียงมาตรการป้องกันไว้ก่อน"
 planet_destruction.610.autho:0 "ดวงนั้นเป็นของพวกเจ้าหรือ? งั้นตอนนี้ก็ไม่ใช่แล้วล่ะ"
 planet_destruction.610.egali:0 "ทำให้โอกาสเท่าเทียมกัน"
 planet_destruction.610.phile:0 "พวกเรายังรักพวกเจ้านะ!"
 planet_destruction.610.phobe:0 "ไม่มีสิ่งใดที่พวกเจ้าเคารพบูชาจะหลงเหลืออยู่"
 planet_destruction.610.gesta:0 "ดาวเคราะห์ดวงเดียวจะมีความหมายอะไร?"
 planet_destruction.610.devou:0 "§RHAK HAK HAK!§!"
 planet_destruction.610.termi:0 "ลบหายไป เหมือนกับข้อมูลขยะจำนวนมาก"
 planet_destruction.610.purif:0 "พวกลัทธินอกรีตในอดีตจะไม่มีสิ่งใดนอกจากการถูกเผาไหม้"
 planet_destruction.615.A:0 "[From.GetName] เป็นแบบนี้ดีกว่าเยอะ"
 planet_destruction.615.spir:0 "คิดซะว่าเป็นการพรมน้ำมนต์ศักดิ์สิทธิ์ก็แล้วกัน"

 action.87.name:0 "§Rเสียอาณานิคม!§!"
 action.87.desc:0 "เราได้สูญเสียการควบคุมดูแลระบบของ §Y[From.GetName]§! ให้กับ §Y[new_planet_owner.GetName]§! ซึ่งเป็นผู้ควบคุม §Hฐานดวงดาว§! ในระบบดาว §Y[From.GetStarName]§!"
 action.88.name:0 "ได้รับอาณานิคม!"
 action.88.desc:0 "เราได้รับสิทธิ์ควบคุมการบริหารจัดการดาวเคราะห์ §Y[From.GetName]§! ซึ่งก่อนหน้านี้เป็นของ §Y[former_planet_owner.GetName]§! เนื่องจากเราสามารถควบคุม §Hฐานทัพดาว (ฐานดวงดาว)§! ในระบบดาว §Y[From.GetStarName]§! ได้สำเร็จ"

 apoc.1.name:0 "เกตเวย์ที่ถูกทิ้งร้าง"
 apoc.1.desc:0 "สถานีอวกาศโบราณบางประเภทได้รับการค้นพบ ณ ขอบระบบดาว [gateway_system.GetName] คลื่นสนามย่อยของห้วงอวกาศ(ช่องว่าง)ที่หลงเหลืออยู่อย่างหนาแน่นรอบตัวสถานีชี้ให้เห็นว่ามันอาจเคยเป็น \"§Hเกตเวย์(ทางเดิน)§!\"—ส่วนหนึ่งของเครือข่ายจำลองสถานีประเภทเดียวกัน ซึ่ง ณ จุดใดจุดหนึ่งในอดีตได้อนุญาตให้เกิดการเดินทางที่แทบจะทันทีระหว่างภูมิภาคต่าง ๆ ในกาแล็กซี\n\nเมื่อสมมติว่านี่คือเกตเวย์ สภาพที่ชำรุดทรุดโทรมในปัจจุบันทำให้มันไม่สามารถใช้งานได้ หากสามารถซ่อมแซมให้กลับมาใช้งานได้สำเร็จ ผู้ครอบครองก็มีโอกาสจะเชื่อมต่อเข้ากับเกตเวย์อื่น ๆ ที่ทำงานอยู่ในกาแล็กซี ทำให้สามารถเดินทางข้ามระยะทางที่ห่างไกลมหาศาลได้ภายในเวลาไม่กี่วัน"
 apoc.2.desc:0 "เราได้พบเกตเวย์ร้างอีกแห่งหนึ่ง คราวนี้อยู่ในระบบดาว [gateway_system.GetName] เช่นเดียวกับแห่งแรก เกตเวย์นี้ไม่สามารถใช้งานได้ในปัจจุบันเนื่องจากสภาพที่ทรุดโทรมมาก"
 apoc.3.desc:3 "เราได้ตําแหน่งเกตเวย์ย่อยห้วงอวกาศ(ประตูอวกาศ)โบราณใกล้กับ §H[gateway_system.GetName]§! ดูเหมือนว่ามันจะเคยเป็นส่วนหนึ่งของเครือข่ายสถานีที่กระจายอยู่ทั่วกาแล็กซี ซึ่งเมื่อใช้งานได้ จะช่วยให้สามารถเดินทางข้ามจากส่วนหนึ่งไปยังอีกส่วนหนึ่งของกาแล็กซีได้เกือบจะในทันที\n\nหลังจากก่อสร้างเสร็จสิ้น การเชื่อมต่อของมันกับเครือข่ายส่วนอื่น ๆ ก็ถูกตัดขาด บัดนี้มันเสนอจุดหมายปลายทางเพียงแห่งเดียวเท่านั้น นั่นคือกลุ่มดาวลึกลับที่ไม่มีใครรู้จักนอกกาแล็กซีของเรา ซึ่งนักดาราศาสตร์ของเราตั้งชื่อให้ว่า §Hแบบแอล...คลูสเตอร์§! สิ่งที่น่าสนใจยิ่งกว่าคือเกตเวย์นี้สร้างขึ้นทั้งหมดโดย §Hนาโนบอท(นาไนท์)§! ขนาดจิ๋วที่ไม่ทราบแบบแปลน\n\nแม้ว่าเกตเวย์จะแผ่คลื่นพลังงานแผ่วเบาออกมา แต่มันกลับถูกล็อกไว้ในวงจรบำรุงรักษาบางอย่างเพื่อป้องกันไม่ให้มันทำงาน จนกว่าเราจะหาวิธีปลดล็อกกระบวนการนี้ได้ กลุ่มดาวแบบแอล...คลูสเตอร์จะยังคงอยู่ไกลเกินกว่าที่เราจะเอื้อมถึง"
 apoc.5.name:0 "รูหนอนธรรมชาติ"
 apoc.5.desc:0 "เราได้ตรวจพบสิ่งที่ดูเหมือนจะเป็นปรากฏการณ์ทางห้วงอวกาศย่อยที่เกิดขึ้นเองตามธรรมชาติที่ขอบระบบดาว §H[wormhole_system.GetName]§!! รอยแยกในมิติแห่งพื้นที่และเวลาได้ก่อตัวขึ้นที่นี่ สร้างเป็น \"§Hรูหนอน(รูหนอน)§!\" ซึ่งนักวิทยาศาสตร์ [Root.Owner.GetScientistPlural] ของเราคาดการณ์ว่าอาจเป็นทางเชื่อมต่อผ่านสับสเปซไปยังรูหนอนอีกแห่งหนึ่งที่ตั้งอยู่ที่ใดสักแห่งในกาแล็กซีของเรา\n\nเมื่อขึ้นอยู่กับว่ารูหนอนฝั่งตรงข้ามตั้งอยู่ที่ใด สิ่งนี้อาจช่วยให้ยานอวกาศเดินทางจากสุดขอบกาแล็กซีฝั่งหนึ่งไปยังอีกฝั่งหนึ่งได้ภายในเวลาไม่กี่วัน แต่น่าเสียดายที่รูหนอนนี้ เช่นเดียวกับรูหนอนส่วนใหญ่ มีความไร้เสถียรภาพในตัวเอง ยานอวกาศใด ๆ ที่กล้าพอจะเดินทางผ่านเข้าไปจะถูกฉีกออกเป็นชิ้น ๆ ภายในเวลาไม่กี่วินาที"
 apoc.5.a:0 "ถ้าทำให้มันเสถียรได้..."
 apoc.10.name:0 "เปิดใช้งานเกตเวย์อีกครั้ง"
 apoc.10.desc.1:0 "$apoc.10.desc.a$\n\n$apoc.10.desc.b$"
 apoc.10.desc.2:0 "$apoc.10.desc.a$\n\n$apoc.10.desc.c$"
 apoc.10.desc.a:0 "นักวิทยาศาสตร์ของเราประสบความสำเร็จในการคืนพลังงานให้แก่เกตเวย์โบราณในระบบดาว [gateway_system.GetName]! แม้จะมีอายุยืนยาว แต่อุปกรณ์ก็สามารถสร้างช่องทางสับสเปซที่มีเสถียรภาพและสามารถเดินทางผ่านได้อย่างสมบูรณ์แล้ว"
 apoc.10.desc.b:0 "โพรบสำรวจที่เราส่งผ่านช่องทางไปยืนยันแล้วว่าการเปิดใช้งานเกตเวย์แห่งนี้ได้ช่วยฟื้นฟูพลังงานไปยังเกตเวย์ตัวที่สองที่มีลักษณะเหมือนกัน ในขณะนี้ เกตเวย์ที่เชื่อมโยงกันสองแห่งนี้เป็นเพียงกลุ่มเดียวที่เราสามารถเข้าถึงได้ แต่มีโอกาสจะพบเกตเวย์ร้างแห่งอื่น ๆ เพิ่มเติมในอนาคต บางทีเราอาจจะสามารถสร้างเกตเวย์ใหม่ทั้งหมดในระบบดาวที่เราเลือกเองได้ด้วยซ้ำ!"
 apoc.10.desc.c:0 "โพรบสำรวจที่เราส่งผ่านช่องทางไปยืนยันว่าเกตเวย์นี้สร้างการเชื่อมต่อที่แข็งแกร่งกับเครือข่ายส่วนที่เหลือแล้ว ยานอวกาศของเราสามารถเดินทางผ่านช่องทางนี้ไปยังเกตเวย์อื่น ๆ ที่ใช้งานได้ ตราบจนที่เจ้าของระบบดาวเหล่านั้นไม่ได้เป็นอริหรือปิดพรมแดนไม่ให้เราผ่านเข้าออก"
 apoc.10.desc.3:0 "$apoc.10.desc.d$"
 apoc.10.desc.4:0 "$apoc.10.desc.d$\n\n$apoc.10.desc.e$"
 apoc.10.desc.d:0 "เกตเวย์ร้างในระบบดาว §H[gateway_system.GetName]§! กลับมาเปิดทำงานขึ้นอีกครั้งอย่างกะทันหัน! พลังงานต้องได้รับการกู้คืนจากระยะไกลผ่านช่องทางใดช่องทางหนึ่ง อาจจะมาจากเกตเวย์แห่งอื่น มันสร้างช่องทางสับสเปซที่เสถียรและดูเหมือนจะสามารถเดินทางผ่านได้"
 apoc.10.desc.e:0 "แต่น่าเสียดายที่เกตเวย์ไม่ยินยอมให้เราเข้าถึงได้ สนามพลังสับสเปซที่ล้อมรอบอุปกรณ์จะผลักดันยานอวกาศของเราออกไปทุกครั้งที่พวกมันเข้าใกล้ ก่อนที่เราจะนำมันมาใช้ประโยชน์ได้ เราจะต้องทำวิจัยค้นหาวิธีการเปิดใช้งานเกตเวย์จากฝั่งเราเพื่อเปิดช่องทางให้ยานของเราสามารถผ่านพ้นไปได้"
 apoc.10.a:0 "บางสิ่งบางอย่างอาจผ่านช่องทางนี้เข้ามาได้ตลอดเวลา!"
 apoc.11.name:0 "ก่อสร้างเกตเวย์เสร็จสิ้น"
 apoc.11.desc:0 "ด้วยสิ่งที่ไม่สามารถนิยามเป็นอื่นได้นอกจากชัยชนะครั้งยิ่งใหญ่ของวิทยาศาสตร์และวิศวกรรมศาสตร์ เราได้สร้างเกตเวย์แห่งแรกที่พร้อมใช้งานเสร็จสิ้นแล้วในระบบดาว [gateway_system.GetName]! อุปกรณ์ดังกล่าวสามารถกู้ระบบสร้างช่องทางสับสเปซที่เสถียรและเชื่อมต่อเข้ากับเครือข่ายเกตเวย์ส่วนอื่น ๆ ของกาแล็กซีได้สำเร็จ"
 apoc.12.desc:0 "พลังงานได้รับการฟื้นฟูไปยังเกตเวย์ร้างที่พบในระบบดาว §H[gateway_system.GetName]§! แล้ว มันได้รับการเชื่อมต่อเข้ากับเครือข่ายเกตเวย์และทำงานได้อย่างสมบูรณ์"
 apoc.13.desc:0 "การก่อสร้างเกตเวย์แห่งใหม่ในระบบดาว §H[gateway_system.GetName]§! ได้เสร็จสิ้นลงแล้ว การเชื่อมต่อสับสเปซที่เสถียรกับเครือข่ายเกตเวย์ได้รับการจัดตั้งขึ้น และพร้อมใช้งานอย่างเต็มระบบ"
 apoc.14.name:0 "ไซต์เกตเวย์พร้อมใช้งานแล้ว"
 apoc.14.desc:0 "เขตก่อสร้างในอวกาศห้วงลึกสำหรับเกตเวย์ที่มีแผนจะจัดตั้งขึ้นในระบบดาว §H[gateway_system.GetName]§! ได้เสร็จสิ้นแล้ว เมื่อเรามีทรัพยากรที่จำเป็น การก่อสร้างเกตเวย์จริงก็สามารถเริ่มดำเนินการได้ตลอดเวลา"


 planet_destruction.111.name:0 "ทางเลี่ยงไฮเปอร์สเปซ"
 planet_destruction.111.desc:0 "สภาการวางแผนไฮเปอร์สเปซ(สภาวางแผนอวกาศ)รายงานว่า การเคลื่อนย้ายดาวเคราะห์ดวงที่สามในระบบโซลออกจากบ่อแรงโน้มถ่วงของระบบ ส่งผลให้เกิดรูหนอนธรรมชาติขึ้น รูหนอนนี้อาจช่วยลดความหนาแน่นของการจราจรความเร็วเหนือแสง(FTL)ในเส้นทางไฮเปอร์เลนใกล้เคียงลงได้ในที่สุด"
 planet_destruction.111.a:0 "ดาวเคราะห์ที่น่าสมเพชและไร้ค่า ฉันไม่รู้สึกเห็นใจอะไรเลยสักนิด"
 planet_destruction.111.a.tooltip:0 "เกิด §H$NATURAL_WORMHOLE_GALACTIC$§! ขึ้นในระบบดาว §Y[sol_sys.GetName]§!"
 planet_destruction.210.name:0 "[From.GetName] ถูกครอบเกราะ"
 planet_destruction.210.desc:0 "ลำแสงระยิบระยับจาก [From.From.GetName] ค่อย ๆ จางลง และ [From.GetName] ก็เงียบสงบ\n\nบางทีประวัติศาสตร์อาจตราหน้าการครอบเกราะป้องกันนี้ ซึ่งเป็นการตัดขาด [From.GetName] ออกจากจักรวาลอันกว้างใหญ่โดยสิ้นเชิง ว่าเป็นเรื่องที่รุนแรงเกินไปและไร้เหตุผล หรืออาจจะไม่ใช่เช่นนั้น สำหรับตอนนี้ ระบบดาว [From.GetStarName] ได้รับตู้เลี้ยงสิ่งมีชีวิตขนาดเท่าดาวเคราะห์ดวงใหม่เป็นที่เรียบร้อย"
 planet_destruction.210.desc.alt:0 "ลำแสงระยิบระยับจาก [From.From.GetName] ค่อย ๆ จางลง และ [From.GetName] ก็เงียบสงบ\n\nชีวิตยังคงดำเนินต่อไป แม้จะถูกจำกัดขอบเขตก็ตาม"
 planet_destruction.210.a:0 "ลองเคาะกระจกและดูพวกมันดิ้นรนสิ"
 planet_destruction.210.b:0 "ความเลวร้ายที่จำเป็นต้องทำ"

 sentinel_station:0 "สถานีเซนทิเนล"
 sentinel_station_plural:0 "สถานีเซนทิเนลทั้งหลาย"
 crisis.52.2.a.response:0 "เซนทิเนลจำนวนมากมีภูมิหลังทางทหาร พวกเราคือผู้รอดชีวิตจากกองยานนับสิบกองที่ต่อสู้กับพวกเบื้องต้นและพ่ายแพ้มา ในฐานะเซนทิเนล พวกเราได้เรียนรู้จากความผิดพลาดในอดีตและทำงานอย่างหนักเพื่อไม่ให้มันเกิดขึ้นซ้ำอีก\n\nนอกจากนี้ ฉันเชื่อว่าฉันเคยกล่าวไปแล้วว่าเรารับสมัครจากทุกเผ่าพันธุ์ในกาแล็กซี ในกลุ่มพวกเรายังมีผู้รอดชีวิตที่กระจัดกระจายอยู่จำนวนหนึ่งจากจักรวรรดิโบราณที่ล่มสลายซึ่งไม่มีตัวตนในกาแล็กซีนี้อีกต่อไป พวกเขาช่วยเปิดทางให้เราเข้าถึงคลังเทคโนโลยีที่เป็นความลับและกองยานศึกที่ปลดระวางแล้ว"
 crisis.52.new.b.response:0 "พวกเราได้จัดตั้งกองบัญชาการใหญ่ขึ้นใกล้กับ §H[sentinel_system.GetName]§! พิกัดของหลุมดำที่ก่อนหน้านี้ไม่เคยมีในแผนที่นี้ได้รับการส่งมอบให้กับเราโดย §H[sentinel_fallen_empire.GetName]§! พวกเขายังช่วยเหลือในการก่อสร้างเซ็นติเนลอัลฟาซึ่งเป็นโครงสร้างทางอวกาศหลักและเป็นฐานจอดเรือรบหลักของกองยานเราด้วย\n\nมันเป็นความสำเร็จที่น่าทึ่งมากทีเดียว หากฉันพูดแบบนั้นได้ โดยเฉพาะอย่างยิ่งเมื่อคำนวณถึงเวลาอันจำกัดที่เรามีอยู่"
 crisis.52.2.new.b.response:0 "พวกเราได้จัดตั้งกองบัญชาการใหญ่ขึ้นใกล้กับ §H[sentinel_system.GetName]§! พิกัดของหลุมดำที่ไม่เคยมีในแผนที่นี้ได้รับการเก็บกู้มาโดยสายลับของเราจากฐานข้อมูลโบราณของจักรวรรดิที่ล่มสลายซึ่งสูญหายไปในหน้าประวัติศาสตร์ จากฐานข้อมูลนี้เรายังได้รับแผนผังทางเทคนิคที่ช่วยในการก่อสร้างเซ็นติเนลอัลฟาซึ่งเป็นโครงสร้างทางอวกาศหลักและฐานจอดเรือรบหลักของกองยานเราอีกด้วย\n\nมันเป็นความสำเร็จที่น่าทึ่งมากทีเดียว หากฉันพูดแบบนั้นได้ โดยเฉพาะอย่างยิ่งเมื่อคำนึงถึงเวลาอันจำกัดที่เรามีอยู่"
 sentinel_title:0 "ภาคีแห่งเซนทิเนล"
 crisis.76.desc:0 "แม้จะเผชิญกับอุปสรรคทั้งหลายแหล่ แต่กาแล็กซีของเราก็ได้รับชัยชนะ พวกเบื้องต้นพ่ายแพ้แล้ว ฉันเคยกลัวว่าวันนี้จะไม่มีวันมาถึง แต่บัดนี้เมื่อชัยชนะปรากฏขึ้นตรงหน้า ภารกิจสุดท้ายเพียงสิ่งเดียวก็หลงเหลืออยู่สำหรับฉัน\n\nในฐานะแกรนด์มาสเตอร์(คุณตา)คนปัจจุบันของเซนทิเนล ฉันขอประกาศยุบภาคีของเราอย่างเป็นทางการ จุดประสงค์เพียงหนึ่งเดียวของเราคือการปราบพวกต้อการให้ราบคาบ และบัดนี้เมื่อภารกิจสำเร็จลุล่วงแล้ว มันก็ถึงเวลาที่สมาชิกของเราจะแยกย้ายกันไปตามทางของตนเอง เพื่อป้องกันไม่ให้นำไปใช้ในทางที่ผิด กองยานรบที่เหลือรอดอยู่ของเราจะถูกถอดถอนลง\n\nขอความพ่ายแพ้ของภัยคุกคามข้ามกาแล็กซีนี้จงนำพาไปสู่ยุคแห่งสันติภาพใหม่ นี่คือเซ็นติเนล 1ขอตัดสัญญาณการส่งข้อความไว้ ณ ที่นี้"
 crisis.76.c:0 "ยุติการติดต่อสื่อสาร"
 crisis.81.name:0 "การล่มสลายของเซนทิเนล"
 crisis.81.desc:0 "มีรายงานการสู้รบอย่างดุเดือดในบริเวณใกล้เคียงกับ §H[sentinel_system.GetName]§! ระบบบ้านเกิดของเซนทิเนลกำลังอยู่บนปากเหวที่จะถูกโจมตีบุกรุก\n\nเราจับสัญญาณส่งคลื่นวิทยุทางไกลได้บางส่วนจาก §Hเซ็นติเนลอัลฟา§! ซึ่งเป็นสถานีรบที่ทำหน้าที่เป็นกองบัญชาการใหญ่ของภาคีเซนทิเนล คลื่นรบกวนและความหนาแน่นของพลังงานที่เหลือจากการยิงอาวุธจำนวนมหาศาลที่เกิดขึ้นภายในระบบดาวนี้ทำให้เกิดปัญหาสัญญาณรบกวนอย่างรุนแรง"
 crisis.82.desc:0 "นี่... นี่คือเซ็นติเนลอัลฟาเราประสบปัญหา §R###สัญญาณเสียหาย###§! ...ได้รับความเสียหายรุนแรง โครงสร้างยานกำลังบิดเบี้ยว และ §R###สัญญาณเสียหาย###§! ...ยืนยันการเสียชีวิตของแกรนด์มาสเตอร์ พวกมันมีจำนวนมากเกินไปจริง ๆ!\n\nมัน... มันจบสิ้นสำหรับเราแล้ว จงสู้ต่อไป เพื่อคนรุ่นหลัง อย่าได้ยอมแพ้ อย่าปล่อยให้การเสียสละของเราต้องสูญเปล่า! พวกเรามี... พวกเรา... อ๊าาาาาาาาาาาาาาาาาาาา---- §R<สัญญาณขาดหาย>§!"
 crisis.78.desc:0 "นี่คือ Sentinel One ช่วงเวลานี้ถือเป็นเวลาที่สิ้นหวังอย่างยิ่งสำหรับกาแล็กซี แต่ฉันมาที่นี่เพื่อนำข่าวดีมาแจ้งให้ทราบ\n\nผ่านประสบการณ์การต่อสู้อย่างกว้างขวางและการวิจัยอย่างอุตสาหะ สายลับเซนทิเนลได้รวบรวมไฟล์อนาโตมี่รายละเอียดโครงสร้างอย่างเป็นระบบของสิ่งมีชีวิต Prethoryn Scourge ยกตัวอย่างเช่น ท่านรู้หรือไม่ว่าสิ่งมีชีวิตตัวเล็กของ Prethoryn (Swarmlings) จะเกิดการระเบิดอย่างรุนแรงหากถุงน้ำดีหลักและถุงน้ำดีสำรองของพวกมันถูกเจาะทำลายพร้อมกันในเวลาเดียวกัน?\n\nเรากำลังเผยแพร่ไฟล์เหล่านี้ให้แก่ทุกคนในกาแล็กซี การเพ่งเล็งโจมตีไปยังจุดอ่อนที่พวกเราได้ระบุไว้ จะทำให้กองยานของท่านรบได้อย่างมีประสิทธิภาพมากขึ้นอย่างมหาศาลในการทำศึกกับพวก Scourge"
 crisis.78.c:0 "อัปโหลดข้อมูลนี้เข้าสู่คอมพิวเตอร์เป้าหมายของเรา"
 sentinel_data:0 "ข้อมูลเซนทิเนล"
 sentinel_data_desc:0 "ไฟล์อนาโตมี่รายละเอียดโครงสร้างของเบื้องต้นเหล่านี้ถูกมอบให้แก่เราโดยภาคีเซนทิเนล ด้วยความช่วยเหลือของข้อมูลนี้ทำให้เราสามารถระบุจุดอ่อนหลายจุดบนเกราะชั้นนอกของสิ่งมีชีวิตเบื้องต้นได้สำเร็จ"
 crisis.121.name:0 "พบเห็นแพร รี นดุร้าย"
 crisis.121.desc:0 "มีสิ่งมีชีวิต Prethoryn จำนวนมากที่ยังระบุพิกัดไม่ได้หลังจากความพ่ายแพ้ของพวก Scourge พวกมันได้หลบหนีไปยังอวกาศห้วงลึกท่ามกลางความสับสนวุ่นวายที่เกิดขึ้น เนื่องจากไม่มีจิตสำนึกรังส่วนกลาง (hive consciousness) คอยชี้แนะ สัตว์ร้ายที่ไร้ความคิดส่วนใหญ่เหล่านี้จะค่อย ๆ อ่อนแรงและล้มตายไปในที่สุด\n\nอย่างไรก็ตาม การพบเห็นล่าสุดยืนยันว่ามีพวก Prethoryn ป่า (feral Prethoryn) จำนวนมากได้สร้างรังแห่งใหม่ในระบบดาว §H[feral_prethoryn_system.GetName]§!\n\nในอีกไม่กี่ปีข้างหน้า เราน่าจะเผชิญกับความเป็นไปได้ที่ Prethoryn ป่าจะมาทำรังในระบบดาวที่ไม่มีผู้ครอบครองซึ่งเคยเป็นที่อยู่อาศัยเดิมของพวก Scourge พวกมันไม่น่าจะพัฒนาจนกลายเป็นภัยคุกคามหลัก เนื่องจากสิ่งมีชีวิตป่าเหล่านี้มักจะต่อสู้กันเองและไม่ได้แสดงความเฉลียวฉลาดในการคำนวณที่เคยเป็นแรงขับเคลื่อนของพวก Scourge อีกต่อไป"
 crisis.121.a:0 "ออกประกาศคำเตือนการเดินทาง"
 crisis.51.2.name:0 "การรุ่งโรจน์ของเซนทิเนล"
 sentinel_fleet_gift:0 "กองยานเซนทิเนลปรากฏตัวขึ้นใกล้กับ [Root.Capital.GetName] และได้รับการโอนสิทธิ์มาอยู่ภายใต้การควบคุมของคุณ"

 pirate.6.desc:2 "การกลายพันธุ์ทางพันธุกรรมที่หาได้ยากในโดรนจำนวนน้อยช่วยให้พวกมันตัดขาดการเชื่อมต่อกับจิตสำนึกส่วนกลาง(เสียง)ได้บางส่วนโดยไม่ตกอยู่ในอาการโคม่า เนื่องจากโดรนที่แยกตัวออกเหล่านี้จะล้มตายลงหากพวกเขาออกห่างจากอิทธิพลของจิตสำนึกส่วนกลางมากเกินไป พวกมันจึงได้ปักหลักในระบบดาว §H[pirate_system.GetName]§! ภายในเขตแดนของเรา\n\nจากที่นั่น พวกมันมีเจตนาจะเลี้ยงชีพด้วยการเป็นโจรสลัด โดยใช้กองยานอวกาศขนาดเล็กที่หยาบเพื่อบุกปล้นเส้นทางการค้าที่เปราะบางซึ่งพาดผ่านระบบดาวนั้น"
 pirate.7.desc:2 "กลุ่มย่อยของยูนิตที่ทำงานผิดปกติได้แยกตัวออกจากสติปัญญาหลักของ [Root.GetName] และลี้ภัยไปปักหลักอยู่ในระบบดาว §H[pirate_system.GetName]§! ภายในอาณาเขตของเรา ยูนิตเหล่านี้ได้รับความเสียหายอย่างไม่อาจกู้คืนได้ และบัดนี้พวกมันใช้ยานอวกาศที่หยาบเพื่อบุกปล้นเส้นทางการค้าที่เปราะบางที่พาดผ่านระบบดาวดังกล่าวเพื่อค้นหาชิ้นส่วนอะไหล่และทรัพยากร"
 pirate.50.name:0 "พบกลุ่มโจรสลัด!"
 pirate.50.a.desc:1 "เส้นทางการค้าของเราในระบบดาว §H[pirate_system.GetName]§! ได้รับการป้องกันที่หละหลวมและพาดผ่านพื้นที่ที่ส่วนใหญ่กลายเป็นเขตไร้กฎหมาย โจรสลัด พวกลักลอบขนของเถื่อน และอาชญากรกลุ่มต่าง ๆ จำนวนมากขึ้นต่างถูกดึงดูดเข้ามาในระบบดาวนี้ และพวกมันบุกปล้นขบวนเรือบรรทุกสินค้าของเราโดยแทบจะไม่เกรงกลัวบทลงโทษใด ๆ"
 pirate.50.b.desc:1 "เส้นทางการค้าที่ไม่ได้รับการป้องกันซึ่งพาดผ่านระบบดาว §H[pirate_system.GetName]§! ได้ดึงดูดความสนใจของกลุ่มโจรสลัดพเนจร เหล่านอกกฎหมายเหล่านี้ได้รวบรวมกองยานขนาดใหญ่ที่คอยดักปล้นการค้าส่วนใหญ่ในระบบ"
 pirate.50.c.desc:1 "ด้วยเส้นทางการค้าที่เปราะบางและไร้การป้องกัน ระบบดาว §H[pirate_system.GetName]§! จึงได้ดึงดูดพวกนอกกฎหมายจำนวนมาก และหลังจากการแย่งชิงอำนาจเมื่อไม่นานมานี้ เหล่าอาชญากรที่เสื่อมทรามเหล่านี้ได้รับการจัดตั้งระบบอย่างดีพอจนสามารถปฏิบัติการกองเรือโจรสลัดขนาดใหญ่ได้ พวกมันกำลังใช้กองเรือที่กระจัดกระจายนี้คอยขัดขวางและดักปล้นการค้าในระบบดาวนี้ให้ได้มากที่สุดเท่าที่จะทำได้"
 pirate.50.a:0 "พวกเขาจะต้องถูกจัดการ"
 pirate.53.name:0 "การบุกปล้นของโดรนที่แยกตัว"
 pirate.53.desc:1 "การกลายพันธุ์ทางพันธุกรรมที่หาได้ยากในโดรนจำนวนน้อยช่วยให้พวกมันตัดขาดการเชื่อมต่อกับจิตสำนึกส่วนกลาง(เสียง)ได้บางส่วนโดยไม่ตกอยู่ในอาการโคม่า เนื่องจากโดรนที่แยกตัวออกเหล่านี้จะล้มตายลงหากพวกเขาออกห่างจากอิทธิพลของจิตสำนึกส่วนกลางมากเกินไป พวกมันจึงได้ปักหลักในระบบดาว §H[pirate_system.GetName]§! ภายในเขตแดนของเรา\n\nระบบดาวนี้ไม่ได้ถูกเลือกโดยบังเอิญ—หนึ่งในเส้นทางการค้าที่เปราะบางที่สุดของเราพาดผ่านพื้นที่นี้ และโดรนที่แยกตัวออกไม่มีข้อสงสัยเลยว่ามีเจตนาจะเลี้ยงชีพด้วยการเป็นโจรสลัด โดยใช้กองยานอวกาศขนาดเล็กที่หยาบเพื่อบุกปล้นเรือบรรทุกสินค้าของเรา"
 pirate.54.name:0 "โจรสลัดต่างดาว"
 pirate.54.desc:1 "กลุ่มโจรสลัดต่างดาวได้แทรกซึมและเข้ามาตั้งถิ่นฐานในระบบดาว §H[pirate_system.GetName]§! ภายในพรมแดนอวกาศของเรา เพื่อระดมทุนสำหรับกิจกรรมอาชญากรรมของพวกมัน ดูเมื่อพวกมันจะตั้งใจบุกปล้นเส้นทางการค้าที่ไม่ได้รับการป้องกันซึ่งพาดผ่านระบบดาวนั้น"
 pirate.56.name:0 "ยูนิตที่เสียหาย"
 pirate.56.desc:1 "กลุ่มย่อยของยูนิตที่ทำงานผิดปกติได้แยกตัวออกจากสติปัญญาหลักของ [Root.GetName] และลี้ภัยไปปักหลักอยู่ในระบบดาว §H[pirate_system.GetName]§! ภายในอาณาเขตของเรา ยูนิตเหล่านี้ได้รับความเสียหายอย่างไม่อาจกู้คืนได้ และบัดนี้พวกมันใช้ยานอวกาศที่หยาบเพื่อบุกปล้นเส้นทางการค้าที่เปราะบางที่พาดผ่านระบบดาวเพื่อค้นหาชิ้นส่วนอะไหล่และทรัพยากร"
 pirate.57.name:0 "โจรสลัดอินทรีย์"
 pirate.57.desc:1 "กลุ่มย่อยของยูนิตชีวภาพอินทรีย์ ซึ่งคาดว่าเป็นผู้ถูกเนรเทศที่เป็นอาชญากร ได้ลักลอบแทรกซึมและเข้ามาปักหลักในระบบดาว §H[pirate_system.GetName]§! ภายในเขตแดนของเรา ดูเหมือนพวกมันจะตั้งใจบุกปล้นเส้นทางการค้าที่ไม่มีการป้องกันของระบบดาวนี้ บางทีพวกมันอาจกำลังเดิมพัน (ตามวิสัยของสิ่งมีชีวิตอินทรีย์) ภายใต้ความคิดผิด ๆ ที่ว่าพวกมันต่ำต้อยเกินกว่าที่จะได้รับการตอบโต้ทางทหารจากเรา"

 leviathans.509.desc:0 "ข้อตกลงที่เราลงนามเพื่อเปิดทางให้ท่านเข้าถึงฐานข้อมูลของเราได้หมดอายุลงแล้ว ท่านต้องการที่จะต่ออายุข้อตกลงนี้ไปอีกสิบปีมาตรฐาน หรือนักวิจัยของท่านไม่มีความจำเป็นต้องใช้ข้อมูลที่เราเสนอให้อีกต่อไป?"
 leviathans.509.a:0 "เราต้องการต่อสัญญาข้อตกลงของเรา"
 leviathans.509.a.reply:0 "ยอดเยี่ยมมาก ฐานข้อมูลของเราจะยังคงพร้อมใช้งานสำหรับนักวิทยาศาสตร์ของท่านต่อไป"
 leviathans.509.e:0 "ไม่ล่ะ เราไม่สนใจในขณะนี้"
