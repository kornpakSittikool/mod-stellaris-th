 apoc.100.name:0 "โครงการโคลอสซัส"
 apoc.100.desc:0 "$COLOSSUS_PROJECT_DESC$"
 apoc.100.desc.pacif:0 "ด้วยทฤษฎีการป้องปรามที่กลับมาเป็นที่นิยมอีกครั้งในหมู่นักรัฐศาสตร์ชั้นนำบน [Root.Capital.GetName] โครงการโคโลสซัสจึงถูกนำเสนอในฐานะเครื่องมือป้องปรามขั้นสูงสุด อาวุธที่จะเหนือกว่ายานชั้นไททันเสียอีก แม้ยานโคโลสซัสที่เสนอนั้นจะสามารถบรรทุกหัวรบที่สามารถทำลายล้างดาวเคราะห์ทั้งดวงได้ แต่เราจะนำพวกมันมาใช้ในการยุติความขัดแย้งด้วยวิธีที่รุนแรงน้อยกว่า ทว่ามีความถาวรและน่าเกรงขามอย่างยิ่ง\n\nหากศัตรูสมมติไม่ยอมหยุดการรุกรานเราหรือพันธมิตรของเรา เราก็แค่ต้อง §Rบีบบังคับพวกเขา§!"
 apoc.100.desc.milit:0 "โครงการโคโลสซัสที่ก่อนหน้านี้เคยพูดถึงกันแต่ในมุมมืด และในห้องวิจัยลับสุดยอดของกองทัพเท่านั้น บัดนี้ได้รับการอนุมัติอย่างเป็นทางการแล้ว โครงการนี้ถือเป็นนวัตกรรมทางทหารที่ยิ่งใหญ่ที่สุดชิ้นหนึ่งเท่าที่กาแล็กซีเคยเผชิญมา ประกอบด้วยการพัฒนาฐานอาวุธ §Rผู้ทำลายล้างดาวเคราะห์§! ควบคู่ไปกับตัวยานโคโลสซัสสำหรับติดตั้งอาวุธดังกล่าว ยานโคโลสซัสนี้น่าจะต้องมียานคุ้มกัน เนื่องจากอาวุธทำลายดาวเคราะห์ต้องการพลังงานมหาศาลจนไม่สามารถติดตั้งอาวุธชนิดอื่นได้อีก\n\nอย่างไรก็ตาม โคโลสซัสที่พัฒนาขึ้นนี้สัญญาว่าจะกลายเป็นพลังทำลายล้างที่ยิ่งใหญ่ที่สุดในกาแล็กซี"
 apoc.100.desc.phobe:0 "โครงการโคโลสซัสได้รับการยกย่องว่าเป็นก้าวสำคัญที่สุดในการต่อสู้กับพวกเอเลี่ยนที่สร้างความแปดเปื้อนในกาแล็กซี ตามการออกแบบ ยานโคโลสซัสคือโครงสร้างขนาดใหญ่ที่ติดตั้งเกราะหนาและอาวุธระดับ §Rผู้ทำลายล้างดาวเคราะห์§! เพียงชิ้นเดียว ความสามารถในการลบดาวเคราะห์ที่ไม่ยอมจำนนต่อเราออกไปจากกาแล็กซีจะพิสูจน์ให้เห็นว่ามีค่ามหาศาล เนื่องจากภัยคุกคามจากพวกต่างดาวนั้นยังห่างไกลจากคำว่าสิ้นสุด"
 apoc.100.desc.purif:0 "โลกนอกรีตจะถูกแผดเผาด้วยดาบและเปลวเพลิง และเถ้าถ่านของพวกมันจะถูกโปรยปรายไปทั่วกาแล็กซี"
 apoc.100.desc.termi:0 "ชั้นบรรยากาศ ชีวาลัย แรงโน้มถ่วง—แม้จะสะดวกสบายเป็นครั้งคราว—แต่สิ่งเหล่านี้จำเป็นสำหรับพวกสิ่งมีชีวิตเนื้อหนังที่น่ารังเกียจเท่านั้น\n\nทำลายดาวเคราะห์ กำจัดสิ่งมีชีวิต"
 apoc.100.a:0 "รับทราบ"
 apoc.110.name:0 "ปืนที่จ่อไปที่หัวของจักรวาล"
 apoc.110.desc:0 "เหล่านักวิทยาศาสตร์ชั้นนำในทุกสาขาได้สรุปข้อเสนอสำหรับอาวุธระดับ §Rผู้ทำลายล้างดาวเคราะห์§! ที่จะติดตั้งบนยานโคโลสซัสลำแรกของเราแล้ว เราสามารถเลือกข้อเสนอหนึ่งข้อเสนอเพื่อพัฒนาควบคู่ไปกับขั้นตอนสุดท้ายของโครงการโคโลสซัส"
 apoc.110.desc.machine:1 "รอบการประมวลผลที่เหลืออยู่ได้รับการประเมินและพิจารณาว่าเพียงพอที่จะพัฒนาอาวุธระดับ §Rผู้ทำลายล้างดาวเคราะห์§! หนึ่ง (1) ชิ้นให้เสร็จสิ้นพร้อมกับการสิ้นสุด §Gโครงการโคโลสซัส§!\n\nโปรดจัดลำดับความสำคัญ"
 apoc.110.desc.hive:0 "เราได้สำรวจความเป็นไปได้มากมาย และขณะนี้ชัดเจนแล้วว่าเราสามารถพัฒนาอาวุธระดับ §Rผู้ทำลายล้างดาวเคราะห์§! ที่เหมาะสมสำหรับยานโคโลสซัสลำแรกสุดของเรา แม้ว่าเราจะสามารถพัฒนาทางเลือกอื่น ๆ ได้ในภายหลัง แต่เราสามารถแบ่งความสนใจมาพัฒนาอาวุธเพียงชิ้นเดียวนี้ควบคู่ไปกับขั้นตอนสุดท้ายของโครงการโคโลสซัส"
 apoc.110.cracker.tooltip:0 "§Rอาวุธทำลายดาวเคราะห์§!:\n§L$PLANET_KILLER_CRACKER_DESC$§!"
 apoc.110.shielder.tooltip:0 "§Rอาวุธทำลายดาวเคราะห์§!:\n§L$PLANET_KILLER_SHIELDER_DESC$§!"
 apoc.110.neutron.tooltip:0 "§Rอาวุธทำลายดาวเคราะห์§!:\n§L$PLANET_KILLER_NEUTRON_DESC$§!"
