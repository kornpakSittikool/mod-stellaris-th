 holy_player_planet:1 "ดาวแห่งความศักดิ์สิทธิ์"
 holy_player_planet_desc:0 "ดาวเคราะห์ดวงนี้ยังไม่ได้รับการเหยียบย่ำปนเปื้อนโดยสิ่งมีชีวิตที่มีสติปัญญา และถือเป็นดินแดนศักดิ์สิทธิ์"
 has_holy_player_planet:0 "การบูชาโลก"
 has_holy_player_planet_desc:0 "เราได้กำหนดให้โลกที่ไม่มีผู้อยู่อาศัยภายในพรมแดนของเราเป็นสถานที่ศักดิ์สิทธิ์"

