 colossus_victim_desc:0 "บาดแผลทางจิตใจของคนในชาติจากการโจมตีของโคโลสซัสแสดงออกในรูปแบบการเปลี่ยนแปลงทางอุดมการณ์ในกลุ่มประชากรวงกว้าง"

 decision_make_holy_world:0 "สถาปนาโลกศักดิ์สิทธิ์"
 decision_make_holy_world_desc:1 "พวกเราค้นหาดาวเคราะห์ประเภท §Y$pc_gaia$§! ที่ไม่มีอาณานิคมในอาณาเขตของเราเพื่อกำหนดให้เป็นโลกศักดิ์สิทธิ์ ตราบใดที่มันยังไม่ถูกทำให้แปดเปื้อนโดยปุถุชนและอยู่ภายในพรมแดนของเรา ดาวเคราะห์อันเป็นที่สักการะนี้จะมอบทรัพยากรให้เรา: £unity£ §Y$country_base_unity_produces_mult$§! §G+10%§!"

 apoc.200.name:0 "ผู้ท้าชิงโลกศักดิ์สิทธิ์"
 apoc.200.desc:0 "ด้วยความร่วมมือกับผู้เชี่ยวชาญด้านเทววิทยา นักทำนายหลายท่านได้รับการยืนยันอย่างอิสระว่าดาว §Y[holy_target.GetName]§! ในระบบดาว [holy_target.GetStarName] มีคุณค่าสมควรได้รับการสักการะเป็นพิเศษ\n\nการยอมรับอย่างเป็นทางการจะช่วยเพิ่มความซาบซึ้งใจของสาธารณชนต่อโลกอันลึกลับแห่งนี้ได้อย่างแน่นอน"
 apoc.200.a:0 "ขอให้ดาว [holy_target.GetName] จงศักดิ์สิทธิ์"
