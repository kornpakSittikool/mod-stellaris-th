l_english:

 ### RESOLUTION COMMENTS - REQUESTS
 ### Request - Militarist
 ethic_militarist_request_friendly:0 "เราเห็นตรงกันเรื่องนี้ ใช่ไหม?"
 ethic_militarist_request_friendly_0:0 "$GREETER$ ขอการสนับสนุนจาก $COUNTRY$"
 ethic_militarist_request_friendly_1:0 "ท่านจะเป็นพันธมิตรที่มั่นคงให้แก่ $GREETER$ หรือไม่?"
 ethic_militarist_request_friendly_2:0 "ความมั่นคงของทั้งสองจักรวรรดิเราขึ้นอยู่กับผลของมตินี้"
 ethic_militarist_request_friendly_3:0 "$GREETER$ กำลังฝากความหวังไว้กับการสนับสนุนของท่าน"
 ethic_militarist_request_friendly_4:0 "เราจะเป็นเกียรติอย่างยิ่ง หากสหายของเราใน $COUNTRY$ จะยืนเคียงข้างเราในเรื่องนี้"
 ethic_militarist_request_neutral:0 "เราย่อมซาบซึ้งต่อการสนับสนุนจาก $COUNTRY$"
 ethic_militarist_request_neutral_0:0 "จงเข้าร่วมกับเรา — เพื่อเกียรติยศ"
 ethic_militarist_request_neutral_1:0 "การสนับสนุนของท่านจะแสดงให้เห็นถึงความแข็งแกร่ง"
 ethic_militarist_request_neutral_2:0 "เวลาสำหรับการตัดสินใจอย่างเด็ดขาดมาถึงแล้ว จงสนับสนุนเรา!"
 ethic_militarist_request_neutral_3:0 "เราจะไม่ทำให้ท่านเบื่อด้วยวาทกรรมทางการทูตไร้สาระ... คุณค่าของมตินี้ย่อมชัดเจนในตัวเอง"
 ethic_militarist_request_neutral_4:0 "มตินี้เป็นทางเลือกที่ถูกต้อง ไม่ใช่แค่สำหรับเรา แต่สำหรับกาแล็กซีโดยรวม จงให้การสนับสนุนมัน"
 ethic_militarist_request_hostile:0 "เราไม่ได้คาดหวังการสนับสนุนจากท่านในเรื่องนี้ แต่เรื่องแปลกยิ่งกว่านี้ก็เคยเกิดขึ้นมาแล้ว..."
 ethic_militarist_request_hostile_0:0 "เราจะไม่มีวันลดตัวลงไปถึงขั้นวิงวอนขอการสนับสนุน แต่หากท่านยินดีจะมอบให้ เราย่อมซาบซึ้ง..."
 ethic_militarist_request_hostile_1:0 "นี่คือโอกาสของ $COUNTRY$ ที่จะพิสูจน์เกียรติของตน — หรือการไร้เกียรติ"
 ethic_militarist_request_hostile_2:0 "มีแต่คนโง่เขลาอย่างแท้จริงเท่านั้นที่จะคัดค้านมตินี้"
 ethic_militarist_request_hostile_3:0 "แม้แต่พวกสมองทึบใน $COUNTRY$ ก็คงต้องเห็นคุณค่าของการผ่านมตินี้"
 ethic_militarist_request_hostile_4:0 "ความดูแคลนที่เรามีต่อ $COUNTRY$ อาจลดลงบ้าง หากท่านสนับสนุนมตินี้..."



 ### Request - Pacifist
 ethic_pacifist_request_friendly:0 "$GREETER$ หวังเป็นอย่างยิ่งว่าจะได้รับการสนับสนุนจากสหายผู้ทรงคุณค่าของเราใน $COUNTRY$"
 ethic_pacifist_request_friendly_0:0 "เราเชื่อมั่นว่า $COUNTRY$ จะทำในสิ่งที่ถูกต้อง"
 ethic_pacifist_request_friendly_1:0 "$GREETER$ เชื่อมั่นใน $COUNTRY$ อย่างเต็มที่สำหรับการลงคะแนนที่กำลังจะมาถึง"
 ethic_pacifist_request_friendly_2:0 "มาร่วมกันทำให้กาแล็กซีนี้ปลอดภัยยิ่งขึ้นเถิด"
 ethic_pacifist_request_friendly_3:0 "โปรดช่วยเราให้ผู้อื่นเห็นถึงปัญญาของมตินี้"
 ethic_pacifist_request_friendly_4:0 "ไม่ว่าท่านจะลงคะแนนอย่างไร $COUNTRY$ ก็จะยังเป็นมิตรสหายที่เราไว้วางใจเสมอ แต่ได้โปรดลงคะแนนเห็นชอบ"
 ethic_pacifist_request_neutral:0 "เราขอความกรุณาจากท่านในการสนับสนุนการลงคะแนนครั้งที่จะมาถึง"
 ethic_pacifist_request_neutral_0:0 "ร่วมกัน มีคำใดงดงามไปกว่านี้อีกหรือ?"
 ethic_pacifist_request_neutral_1:0 "$GREETER$ ขอการสนับสนุนจากท่านอย่างนอบน้อมในการลงคะแนนครั้งที่จะมาถึง"
 ethic_pacifist_request_neutral_2:0 "เราเชื่อมั่นว่า $COUNTRY$ จะเห็นข้อดีของข้อเสนอนี้"
 ethic_pacifist_request_neutral_3:1 "ด้วยความช่วยเหลือของท่าน เราจะสามารถชี้นำ [global_event_country.GetGalCommunityOrGalImperium] ไปสู่การอยู่ร่วมกันอย่างสันติ"
 ethic_pacifist_request_neutral_4:0 "สนับสนุนมติของเรา แล้วเราจะร่วมกันทำให้สงครามและความทุกข์ที่มาพร้อมมันกลายเป็นอดีตอันป่าเถื่อนของกาแล็กซี"
 ethic_pacifist_request_hostile:0 "จงทำในสิ่งที่ถูกต้อง อย่างน้อยสักครั้ง"
 ethic_pacifist_request_hostile_0:0 "ยังไม่สายเกินไปที่จะละทิ้งหนทางอันผิดพลาดของท่าน"
 ethic_pacifist_request_hostile_1:0 "จงเอาชนะสัญชาตญาณต่ำช้าของตน แล้วทำสิ่งที่ถูกต้องสักครั้ง"
 ethic_pacifist_request_hostile_2:0 "การคัดค้านมตินี้จะยิ่งพิสูจน์เจตนาอันมืดมนของ $COUNTRY$ ต่อสายตาของกาแล็กซี"
 ethic_pacifist_request_hostile_3:0 "เราจะผลักดันให้มตินี้ผ่านให้ได้ ไม่ว่าจะมีการสนับสนุนจาก $COUNTRY$ หรือไม่ก็ตาม!"
 ethic_pacifist_request_hostile_4:0 "ประวัติศาสตร์จะไม่จดจำ $COUNTRY$ อย่างเมตตา หากท่านคัดค้านมตินี้"

 ### Request - Authoritarian
 ethic_authoritarian_request_friendly:0 "ท่านย่อมเห็นด้วยกับข้อดีอันปฏิเสธไม่ได้ของมติเรา ใช่หรือไม่?"
 ethic_authoritarian_request_friendly_0:0 "ราชวงศ์ของเราทำงานร่วมกันได้ดีมิใช่หรือ?"
 ethic_authoritarian_request_friendly_1:0 "$COUNTRY$ ได้รับความไว้วางใจจากเรา เรามั่นใจว่าท่านจะตัดสินใจถูกต้องในการลงคะแนนครั้งหน้า"
 ethic_authoritarian_request_friendly_2:0 "กาแล็กซีต้องการการชี้นำอันมั่นคงจาก $GREETER$ และ $COUNTRY$ มาทำให้มตินี้สำเร็จร่วมกันเถิด"
 ethic_authoritarian_request_friendly_3:0 "เป้าหมายของเราสอดคล้องกับของ $COUNTRY$ มาร่วมกันนำระเบียบสู่ความโกลาหลที่ครอบงำกาแล็กซี"
 ethic_authoritarian_request_friendly_4:0 "เราชื่นชมภาวะผู้นำของ $COUNTRY$ มาโดยตลอด พวกท่านย่อมเห็นประโยชน์ของมติเราอย่างไม่ต้องสงสัย"
 ethic_authoritarian_request_neutral:0 "จงสนับสนุนเราในเรื่องนี้ เดี๋ยวนี้"
 ethic_authoritarian_request_neutral_0:0 "เรานำ ท่านตาม ในเรื่องนี้ เช่นเดียวกับทุกเรื่อง"
 ethic_authoritarian_request_neutral_1:0 "การต่อต้านระเบียบตามธรรมชาติของสิ่งต่าง ๆ เป็นความพยายามที่สูญเปล่า"
 ethic_authoritarian_request_neutral_2:0 "เพื่อรักษาระเบียบของกาแล็กซี มตินี้ต้องผ่าน"
 ethic_authoritarian_request_neutral_3:0 "เราตั้งใจจะหยุดยั้งการค่อย ๆ ถลำลงสู่อนาธิปไตยและความโกลาหลของกาแล็กซี มตินี้เป็นเพียงอีกก้าวหนึ่งเท่านั้น"
 ethic_authoritarian_request_neutral_4:0 "ในไม่ช้า สันติภาพและระเบียบจะกลับคืนสู่ทั่วทั้งกาแล็กซี จงทำหน้าที่ของท่านด้วยการสนับสนุนมติ34-X"
 ethic_authoritarian_request_hostile:0 "ท่านจะต้องสนับสนุนเราในเรื่องนี้ ไม่ นั่นไม่ใช่คำขออย่างเป็นมิตร"
 ethic_authoritarian_request_hostile_0:0 "จงยอมรับลำดับชั้นตามธรรมชาติของสิ่งต่าง ๆ และเดินตามการนำของเราในเรื่องนี้"
 ethic_authoritarian_request_hostile_1:0 "การสนับสนุนของท่านในการลงคะแนนครั้งหน้า — เราเรียกร้องมัน"
 ethic_authoritarian_request_hostile_2:0 "เราสั่งให้ท่านสนับสนุนมตินี้"
 ethic_authoritarian_request_hostile_3:1 "$COUNTRY$ เป็นอิทธิพลอันเสื่อมทรามใน [global_event_country.GetGalCommunityOrGalImperium] อย่าแพร่พิษของท่านไปยังทูตของสมาชิกอื่น"
 ethic_authoritarian_request_hostile_4:0 "ไม่อนุญาตให้มีการต่อต้าน"

 ### Request - Egalitarian
 ethic_egalitarian_request_friendly:0 "ร่วมกับ $COUNTRY$ เราสามารถทำให้สิ่งนี้เกิดขึ้นได้"
 ethic_egalitarian_request_friendly_0:0 "$GREETER$ เชื่อมั่นว่า $COUNTRY$ จะสนับสนุนเราในเรื่องนี้"
 ethic_egalitarian_request_friendly_1:0 "นี่ไม่ใช่วันที่ดีงามหรอกหรือ ที่จะยืนหยัดร่วมกันเพื่อความยุติธรรมและความเสมอภาค?"
 ethic_egalitarian_request_friendly_2:0 "เราจะร่วมกันนำพายุคประชาธิปไตยใหม่มาสู่กาแล็กซี สหาย... ยุคที่ทั้งกาแล็กซีจะได้มีส่วนร่วม"
 ethic_egalitarian_request_friendly_3:0 "มีพลังชั่วร้ายกำลังทำงานอยู่ภายในสถาบันนี้ ซึ่งไม่แบ่งปันเป้าหมายของสองชาติมหาอำนาจของเรา เราต้องสนับสนุนกันและกัน"
 ethic_egalitarian_request_friendly_4:0 "อา $COUNTRY$! อย่างน้อยการสนับสนุนจากท่าน เราก็นับได้แน่!"
 ethic_egalitarian_request_neutral:0 "เหตุใดไม่ใช้เสรีภาพเชิงประชาธิปไตยของท่านมาสนับสนุนเราเล่า?"
 ethic_egalitarian_request_neutral_0:0 "ท้ายที่สุด การตัดสินใจเป็นของท่าน แต่ขอให้พิจารณาสนับสนุนเราในเรื่องนี้"
 ethic_egalitarian_request_neutral_1:0 "เพื่อนร่วมงานผู้ทรงเกียรติแห่ง $COUNTRY$ เราขอวิงวอนต่อสำนึกแห่งความเป็นธรรมของท่าน"
 ethic_egalitarian_request_neutral_2:0 "โปรดจำไว้ การลงคะแนนคือหน้าที่พลเมืองของท่าน"
 ethic_egalitarian_request_neutral_3:0 "เราขอวิงวอนให้ท่านสนับสนุนมตินี้... มันจะช่วยยกระดับชีวิตของสิ่งมีชีวิตทรงปัญญานับล้านอย่างแน่นอน"
 ethic_egalitarian_request_neutral_4:0 "ช่วยเราทำให้กาแล็กซีนี้เป็นสถานที่ที่ดีกว่าเดิม"
 ethic_egalitarian_request_hostile:0 "คงเป็นเรื่องไร้เดียงสาสินะที่จะคาดหวังให้ $COUNTRY$ เห็นคุณค่าในความเป็นหนึ่งเดียว"
 ethic_egalitarian_request_hostile_0:0 "จงสนับสนุนเราในเรื่องนี้ อย่างน้อยก็ยังไม่สายเกินไปที่จะหาจุดลงรอยในบางเรื่อง"
 ethic_egalitarian_request_hostile_1:0 "แม้เราจะแตกต่างกัน $GREETER$ ก็ยังยื่นมือมาหา $COUNTRY$ โปรดเข้าร่วมกับเราในเรื่องนี้"
 ethic_egalitarian_request_hostile_2:0 "นี่ใหญ่กว่าทั้ง $GREETER$ และ $COUNTRY$ มาพักความแตกต่างของเราไว้ก่อนในตอนนี้"
 ethic_egalitarian_request_hostile_3:0 "ไม่ว่าท่านจะคิดอย่างไรกับเรา การสนับสนุนมตินี้คือการตัดสินใจที่ถูกต้อง"
 ethic_egalitarian_request_hostile_4:0 "เราเคยมองผิดไปหรือไม่เกี่ยวกับ $COUNTRY$? ท่านดีกว่าที่เราคิดหรือไม่? ท่านจะสนับสนุนมติของเราหรือไม่?"

 ### Request - Xenophile
 ethic_xenophile_request_friendly:0 "มาร่วมมือกันในการลงคะแนนครั้งหน้า และแสดงให้กาแล็กซีเห็นว่าความเป็นหนึ่งเดียวมีหน้าตาอย่างไร!"
 ethic_xenophile_request_friendly_0:0 "$GREETER$ ยินดีอย่างยิ่งหากได้รับการสนับสนุนจาก $COUNTRY$ ในเรื่องนี้"
 ethic_xenophile_request_friendly_1:0 "คงน่าเสียดายหากการลงคะแนนเล็ก ๆ น้อย ๆ จะมาทำให้สองจักรวรรดิผู้ยิ่งใหญ่ของเราห่างเหินกัน ใช่ไหม?"
 ethic_xenophile_request_friendly_2:1 "ไม่มีขีดจำกัดต่อสิ่งที่เราทำได้ หากเราสนับสนุนกันและกันใน [global_event_country.GetGalCommunityOrGalImperium] สหาย"
 ethic_xenophile_request_friendly_3:0 "น่าอัศจรรย์ใช่ไหม? เวทีกาแล็กซีนี้พิสูจน์ว่าสายพันธุ์ต่าง ๆ ของกาแล็กซีสามารถสร้างสิ่งยิ่งใหญ่ได้เมื่อร่วมมือกัน"
 ethic_xenophile_request_friendly_4:0 "นี่คือก้าวต่อไปในแผนของเราเพื่อทำให้กาแล็กซีนี้ดีขึ้นสำหรับสายพันธุ์ทรงปัญญาทุกชนิดที่อาศัยอยู่ในนั้น จงสนับสนุนเราเถิด สหาย!"
 ethic_xenophile_request_neutral:0 "สวัสดี! $GREETER$ ขอเชิญท่านเข้าร่วมกับเราในการลงคะแนนครั้งหน้า"
 ethic_xenophile_request_neutral_0:0 "สวัสดี ว่าที่สหาย! ท่านอยากสนับสนุนเราในการลงคะแนนครั้งหน้าหรือไม่?"
 ethic_xenophile_request_neutral_1:0 "นี่อาจเป็นจุดเริ่มต้นของมิตรภาพอันงดงามก็ได้"
 ethic_xenophile_request_neutral_2:0 "สนับสนุนเราในเรื่องนี้ แล้วเราจะพิสูจน์ให้กาแล็กซีเห็นถึงคุณค่าของความร่วมมือ"
 ethic_xenophile_request_neutral_3:0 "$COUNTRY$ จะสนับสนุนเราในความพยายามที่จะทำให้กาแล็กซีนี้เป็นสถานที่ที่ดีขึ้นสำหรับทุกคน ไม่ว่าพวกเขาจะเป็นสายพันธุ์ใดหรือไม่?"
 ethic_xenophile_request_neutral_4:1 "การไม่สนับสนุนมตินี้จะขัดต่อจิตวิญญาณของหลักการที่ [global_event_country.GetGalCommunityOrGalImperium] ก่อตั้งขึ้นมา"
 ethic_xenophile_request_hostile:0 "$COUNTRY$ มองไม่เห็นคุณค่าในความเป็นหนึ่งเดียวหรือ?"
 ethic_xenophile_request_hostile_0:0 "การสนับสนุนมตินี้จะเป็นก้าวแรกในการเยียวยาความสัมพันธ์ระหว่างสองชาติของเรา"
 ethic_xenophile_request_hostile_1:0 "แม้จะมีทุกอย่างที่ผ่านมา $GREETER$ ก็ยังอยากยื่นมือไปหา $COUNTRY$ โปรดสนับสนุนเราในเรื่องนี้"
 ethic_xenophile_request_hostile_2:0 "สิ่งนี้จะเป็นประโยชน์ต่อเราทุกคน... แม้แต่ $COUNTRY$ เองก็ต้องเห็นข้อนั้น"
 ethic_xenophile_request_hostile_3:0 "เวทีแห่งนี้มีไว้เพื่อทลายกำแพงและส่งเสริมความร่วมมือระหว่างสายพันธุ์นานาชนิดที่อยู่ร่วมกันในกาแล็กซี"
