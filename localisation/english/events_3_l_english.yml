 colony.2036.desc:0 "แม้ว่าเราจะพยายามจำกัดความเสี่ยงในการแพร่กระจาย แต่โรคบน [Root.GetName] ดูเหมือนจะกำจัดได้ยากกว่าที่เราคิดไว้ในตอนแรก มีผู้ป่วยรายใหม่ปรากฏตัวขึ้นพร้อมอาการเดียวกัน เราอาจต้องทบทวนวิธีการจัดการกับปัญหานี้ใหม่"
