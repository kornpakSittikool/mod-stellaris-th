 colony.2035.name:0 "แพร่ระบาด"
 colony.2035.desc:0 "พื้นที่ประชากรหลายแห่งบน [Root.GetName] รายงานว่ามีผู้คนล้มป่วยในระดับที่ไม่เคยมีมาก่อน ใครก็ตามที่ได้รับผลกระทบจากเชื้อโรคสายพันธุ์ต่างๆ แทบจะเคลื่อนไหวไม่ได้และมีสิ่งขับถ่ายที่น่าสะอิดสะเอียนไหลออกมา\n\nหากปล่อยไว้โดยไม่ควบคุม โรคร้ายนี้อาจเป็นจุดจบของ [Root.GetName]"
 colony.2035.desc.material:0 "พื้นที่ประชากรหลายแห่งบน [Root.GetName] ได้ส่งรายงานเกี่ยวกับพลเรือนที่ป่วยเป็นโรคที่รุนแรง มันแพร่กระจายอย่างรวดเร็ว มีสายพันธุ์ที่หลากหลายและวิวัฒนาการอย่างรวดเร็ว ซึ่งอาจทำให้การผลิตและการขยายตัวต้องชะงักลงหากไม่ได้รับการดูแล\n\nหากไม่ดำเนินการโดยด่วน อาณานิคมอาจล่มสลาย ทำให้การพัฒนาของเราถดถอยไปหลายปี"
 colony.2035.desc.spirit:0 "พื้นที่ประชากรหลายแห่งบน [Root.GetName] ล้มป่วยด้วยโรคร้ายชนิดใหม่ที่ชั่วช้า ซึ่งนักวิทยาศาสตร์ของเราไม่รู้จัก โรคที่น่าสะอิดสะเอียนนี้วิวัฒนาการตัวเอง ทำให้ยากจะทำความเข้าใจ แต่ทุกรูปแบบของมันทำให้จิตใจสั่นคลอนขณะที่มันลุกลามในร่างกาย\n\nหากไม่มีมาตรการรับมือ เราอาจต้องสูญเสียจิตวิญญาณจำนวนมากไปกับความมืดมิด"
