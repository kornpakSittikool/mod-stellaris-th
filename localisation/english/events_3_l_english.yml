l_english:

 ####################################
 # Anomaly Categories
 ####################################
 TUTORIAL_CAT:0 "การจากบ้านเกิด"
 TUTORIAL_DESC:1 "ระหว่างการสำรวจระบบดาวบ้านเกิดของเรา เราพบสิ่งบางอย่างบน [From.GetName] ที่ไม่ตรงกับการสังเกตการณ์ก่อนหน้านี้จากดาวบ้านเกิดของเรา"
 TROP_BIOLOGY_CAT:0 "ความประหลาดของเขตร้อน"
 TROP_BIOLOGY_DESC:0 "ข้อมูลเบื้องต้นที่รวบรวมจากป่าเขตร้อนของ [Root.GetName] บ่งชี้ว่ามีบางสิ่งบางอย่างที่แปลกไปจากปกติ"
 AST_MINING_CAT:0 "สนใจแร่ธาตุ"
 AST_MINING_DESC:0 "การวิเคราะห์เบื้องต้นเกี่ยวกับองค์ประกอบของดาวเคราะห์น้อยชี้ให้เห็นถึงการค้นพบที่น่าสนใจ"
 GEN_DERELICT_SHIP_CAT:0 "สัญญาณขอความช่วยเหลือ"
 GEN_DERELICT_SHIP_DESC:0 "การสแกนเบื้องต้นของเราตรวจจับสัญญาณที่ผิดปกติซึ่งทำให้นึกถึงรูปแบบสัญญาณขอความช่วยเหลือของเราเอง"
 GEN_LOST_CARGO_CAT:0 "การอ่านค่าที่แปลกประหลาด"
 GEN_LOST_CARGO_DESC:0 "ขณะสแกนแถบดาวเคราะห์น้อย ทีมวิทยาศาสตร์ของเราพบความผิดปกติบางอย่าง"
 GEN_OLD_WAR_CAT:0 "กลิ่นอายของเหล็กกล้า"
 GEN_OLD_WAR_DESC:0 "องค์ประกอบแร่ของ [Root.GetName] ไม่ตรงกับที่คาดการณ์ไว้"
 GEN_SURVEY_CAT:0 "บนพื้นผิว"
 GEN_SURVEY_DESC:0 "การค้นพบครั้งแรกของเราบน [Root.GetName] ชี้ให้เห็นถึงการค้นพบที่น่าสนใจยิ่งกว่าบนพื้นผิว"
 SUN_RAYS_CAT:0 "รังสีคอสมิกที่ชวนสับสน"
 SUN_RAYS_DESC:0 "เราตรวจพบรังสีแปลกประหลาดที่เจ้าหน้าที่วิทยาศาสตร์ของเราต้องการจะสืบสวน"
 WAT_PLANET_CAT:0 "หยาดน้ำในมหาสมุทร"
 WAT_PLANET_DESC:0 "การสแกน [Root.GetName] ส่งคืนค่าการอ่านที่แผ่วเบาของบางสิ่งบางอย่างใต้พื้นผิว"
 COLD_RESEARCH_CAT:0 "ศักยภาพอันเยือกเย็น"
 COLD_RESEARCH_DESC:0 "เจ้าหน้าที่วิทยาศาสตร์ของเราพบความผิดปกติ มันต้องใช้การตรวจสอบอย่างกว้างขวาง แต่อาจนำไปสู่การค้นพบครั้งสำคัญ"
 SUN_TEAPOT_CAT:0 "วงโคจรที่เป็นไปไม่ได้"
 SUN_TEAPOT_DESC:0 "การสแกนดาวฤกษ์เผยให้เห็นวัตถุขนาดเล็กดวงหนึ่งในวงโคจรที่รวดเร็ว ขนาดที่เล็กและความเร็วที่สูงของมันทำให้ยากที่เซนเซอร์ของเราจะแยกแยะมันออกมาได้"
 DES_BURIED_CAT:0 "สิ่งที่ถูกฝังในผืนทราย"
 DES_BURIED_DESC:0 "ดาวเคราะห์ทะเลทราย [Root.GetName] ดูเหมือนจะซ่อนเร้นความลับที่ถูกฝังไว้บางประการ"
 AST_GEAR_CAT:0 "ดาวเคราะห์น้อยอันน่าทึ่ง"
 AST_GEAR_DESC:0 "จากการสังเกตดาวเคราะห์น้อยขนาดมหึมา [Root.GetName] เราได้พบ...\n\nบางสิ่งบางอย่าง ซึ่งสมควรจะทำการตรวจสอบเพิ่มเติม"
 TROP_CONDITIONS_CAT:0 "ท่ามกลางเถาวัลย์และแมกไม้"
 TROP_CONDITIONS_DESC:0 "[Root.GetName] ดูเหมือนจะเก็บซ่อนสิ่งเร้าที่น่าสนใจไว้ลึกเข้าไปในป่าทึบของมัน"
 ARID_SENSOR_CAT:0 "แห้งแล้งและถูกทอดทิ้ง"
 ARID_SENSOR_DESC:0 "เราตรวจพบสิ่งผิดปกติบางอย่างบน [From.GetPlanetMoon] ที่แห้งแล้ง ดูเหมือนว่าเคยมีใครบางคนมาที่นี่ก่อนพวกเรา จำเป็นต้องมีการตรวจสอบเพิ่มเติม"
 GEN_REFUGEES_CAT:0 "สัญญาณข้อความที่ถูกสกัดกั้น"
 GEN_REFUGEES_DESC:0 "ขณะที่เราสแกน [Root.GetName] เราได้รับสัญญาณ การวิเคราะห์รูปแบบระบุว่ามันเป็นสัญญาณขอความช่วยเหลือจากยานลำหนึ่ง แต่เราไม่สามารถมั่นใจได้ เราจำเป็นต้องติดตามสัญญาณนี้ไปยังแหล่งที่มาของมันหากต้องการทราบข้อมูลเพิ่มเติม"
 CON_BIOLOGY_CAT:0 "การค้นพบทางทวีป"
 CON_BIOLOGY_DESC:0 "ผืนป่าบนดาวเคราะห์น้อยดวงนี้มีแนวโน้มว่าจะนำไปสู่การค้นพบที่น่าสนใจ"
 TOX_PLANET_CAT:0 "ความเป็นพิษ"
 TOX_PLANET_DESC:0 "ปรากฏว่ามีโครงสร้างที่ถูกสร้างขึ้นอย่างจงใจบนพื้นผิวของดาวเคราะห์ ชี้ไปที่อดีตที่ถูกลืมเลือนไปนานแล้ว"
 DES_PLANET_CAT:0 "ผืนทรายอันรกร้าง"
 DES_PLANET_DESC:0 "ความร้อนแผดเผาของ [Root.GetName] อยู่ในเกณฑ์ที่คาดไว้ อย่างไรก็ตาม ยังมีข้อมูลผิดปกติอื่นๆ ที่ทีมงานของเรากำลังรวบรวมอยู่ จำเป็นต้องมีการศึกษาเพิ่มเติมก่อนที่จะส่งรายงานขั้นสุดท้ายได้"
 MOL_PLANET_CAT:0 "จุดหลอมเหลว"
 MOL_PLANET_DESC:0 "เปลวไฟที่ลุกโชติช่วงของ [Root.GetName] อาจทำให้เซนเซอร์ของเราคลาดเคลื่อน แต่เราก็กำลังตรวจจับค่าที่ผิดปกติได้"
 GEN_MYSTICAL_CAT:0 "ลึกลับน่าฉงน"
 GEN_MYSTICAL_DESC:0 "การสำรวจของเราได้ค้นพบบางสิ่งที่ทีมวิทยาศาสตร์ทำได้เพียงอธิบายว่ามัน "ลึกลับน่าฉงน" เราจำเป็นต้องตรวจสอบปรากฏการณ์นี้ในรายละเอียดเพิ่มเติมเพื่อเปิดเผยความลึกลับนี้"
 NUKE_PLANET_CAT:0 "เหมันต์แห่งผู้ล่มสลาย"
 NUKE_PLANET_DESC:0 "ดินแดนรกร้างว่างเปล่าจากนิวเคลียร์เป็นสัญญาณที่ชัดเจนของอารยธรรมก่อนหน้านี้ เครื่องสแกนของเราตรวจจับกิจกรรมได้ในบางสถานที่ซึ่งเราควรเข้ามาตรวจสอบ"
 ARID_PLANET_CAT:0 "ดินแดนแห้งแล้งรกร้าง"
 ARID_PLANET_DESC:0 "[From.GetPlanetMoon] ไม่ใช่สถานที่ที่ต้อนรับขับสู้ดีที่สุด แต่หากการสแกนเบื้องต้นของเราบอกใบ้อะไรได้บ้าง มันก็อาจมีทรัพยากรที่มีค่าซ่อนอยู่"

 ####################################
 # Anomaly Events
 ####################################
 anomaly.4000.name:0 "ชีวิตหาทางไปได้เสมอ"
 anomaly.4000.desc:0 "ดูเหมือนว่าพืชพรรณบางชนิดของ [From.GetName] ได้พัฒนากลไกการป้องกันที่มีประสิทธิภาพผ่านการคัดเลือกโดยธรรมชาติ ต้นไม้และเชื้อราจำนวนมากปล่อยสปอร์ที่มีฤทธิ์เป็นกรดรุนแรงต่อสิ่งมีชีวิตที่ไม่ใช่พืช โชคดีที่เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ได้หาวิธีต่อต้านสายพันธุ์บางส่วนของสปอร์เหล่านี้แล้ว ทำให้ผืนป่าบนดาวเคราะห์มีความเป็นอันตรายต่อเราน้อยลง!"
 anomaly.4000.a.tooltip:2 "£blocker£นก กระจอก§R+2§!"
 anomaly.4005.name:1 "เศษซากแห่งชีวิต"
 anomaly.4005.desc:1 "ปรากฏว่าดาวเคราะห์น้อย [From.GetName] และเศษซากโดยรอบมีต้นกำเนิดมาจากดาวเคราะห์ดวงเดิม!\n\nลึกเข้าไปในใจกลางดาวเคราะห์น้อย เราสามารถพบร่องรอยของโลหะผสมที่มีค่าอย่างยิ่ง นอกจากนี้ยังมีเบาะแสของชีวิตแบคทีเรียที่บัดนี้ได้ตายไปแล้วในสุญญากาศของอวกาศ สิ่งนี้แสดงให้เห็นว่าวัตถุบนฟากฟ้าดวงนี้ครั้งหนึ่งเคยมีสัญญาณแห่งชีวิต"
 anomaly.4005.a.tooltip:2 "เพิ่ม§Yเครือข่ายเก่า§!แก้ไขโครงการหลัก...[From.GetName]:\n£alloys£ §G+3§!"
 anomaly.4010.name:0 "หายสาบสูญในอวกาศ"
 anomaly.4010.desc:0 "สัญญาณที่เราสกัดกั้นได้คือสัญญาณขอความช่วยเหลือจากยานลำหนึ่งในวงโคจรรอบ [From.GetName] ยานลำนี้ไม่มีการแผ่รังสีความร้อนและดูเหมือนว่าจะลอยเท้งเต้งอยู่ โครงการพิเศษ §Sโครงการพิเศษ§! ได้รับการประกาศเพื่อสืบหาว่าเกิดอะไรขึ้นกับลูกเรือ"
 anomaly.4011.desc:0 "ลูกเรือในยานถูกพบเป็นศพทั้งหมด สิ่งที่น่ากังวลใจยิ่งกว่าคือพวกเขาดูเหมือนจะเสียชีวิตจากพยาธิในสมองที่ก้าวหน้าอย่างมาก ซึ่งเข้าควบคุมพวกเขาและทำให้เสียสติ ขอบคุณการค้นพบของเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ที่ช่วยให้เราสามารถปกป้องลูกเรือของเราเองจากการติดเชื้อได้!"
 anomaly.4011.b.evopred: "ส่งศพเหล่านั้นกลับไปยัง [Owner.Capital.GetName]"
 anomaly.4012.desc:0 "ยานในวงโคจรรอบ [From.From.From.GetName] ไม่ได้ถูกละทิ้ง ลูกเรือยังมีชีวิตอยู่ แต่สุขภาพไม่ดีเนื่องจากได้รับอิทธิพลจากพยาธิในสมองบางชนิด ด้วยความช่วยเหลือจากนักวิทยาศาสตร์ของเรา พวกเขาจะสามารถรักษาให้หายได้อย่างง่ายดาย"
 anomaly.4012.a:0 "ช่วยเหลือพวกเขา"
 anomaly.4012.a.tooltip:0 "สถาปนาการติดต่อสื่อสารกับเอเลี่ยนเหล่านั้น"
 anomaly.4012.b:0 "ปล่อยให้พวกเขาตายไป"
 anomaly.4015.name:0 "เดอะไฟนอลเรสต์"
 anomaly.4015.desc:0 "ด้วยความน่าจะเป็นที่แทบจะเป็นศูนย์ [Root.GetName] สามารถระบุตำแหน่งที่แน่นอนของแหล่งกำเนิดสัญญาณแปลกประหลาดได้สำเร็จขณะเคลื่อนที่ผ่านแถบดาวเคราะห์น้อย สิ่งก่อสร้างของเอเลี่ยนขนาดเล็ก การสแกนง่ายๆ เผยให้เห็นว่ามันเป็นภาชนะประกอบพิธีกรรมบางอย่างที่บรรจุร่างที่หลงเหลืออยู่ของนักเดินทางอวกาศต่างดาว"
 anomaly.4015.a:0 "ปล่อยให้โลงศพเดินทางต่อไป"
 anomaly.4015.b:0 "เปิดโลงศพและศึกษาร่างไร้วิญญาณนั้น"
 anomaly.4015.b.evopred: "มีหลายสิ่งให้เรียนรู้ เปิดแคปซูลออกมา"
 anomaly.4015.phile:0 "นำมันไปยัง [Root.Owner.Capital.GetName] และนำไปจัดแสดงในพิพิธภัณฑ์"
 anomaly.4016.name:0 "[DefiledCountry.GetName]"
 anomaly.4016.desc:0 "สองสามวันผ่านไปนับตั้งแต่ที่เราติดต่อกับ [DefiledCountry.GetSpeciesNamePlural] เป็นครั้งแรก และตอนนี้พวกเขากำลังส่งข้อความหาเรา:\n\n"พวกเรารู้ว่าพวกเจ้าได้ทำอะไรลงไป ชาว [Root.GetSpeciesNamePlural] โลงศพที่เจ้าลบหลู่เป็นที่พักผ่อนสุดท้ายของนักเดินทางดวงดาวคนแรกของเรา เราต้องการคำขอโทษ!""
 anomaly.4016.tooltip:0 "ความสัมพันธ์ของคุณจะได้รับผลกระทบ"
 anomaly.4016.a:0 "พวกเราขออภัยสำหรับการล่วงเกินในครั้งนี้"
 anomaly.4016.b:0 "มันเป็นเพียงแค่ศพธรรมดาๆ เท่านั้น"
 anomaly.4016.c.spirit:0 "พวกเราจะสวดอ้อนวอนให้แก่ดวงวิญญาณบรรพบุรุษของท่าน"
 anomaly.4016.d.phobe:0 "พวกเราไม่ได้ใส่ใจเลยแม้แต่น้อย เจ้าพวกต่างดาวชั้นต่ำ!"
 anomaly.4020.name:0 "ยักษ์ใหญ่ตกกระทบ"
 anomaly.4020.desc:0 "การสแกนอย่างละเอียดเผยให้เห็นสาเหตุขององค์ประกอบโลหะที่แปลกประหลาดบน [From.GetName] ดาวเคราะห์ดวงนี้ [From.GetPlanetMoon] เป็นจุดตกกระทบของยานอวกาศขนาดมหึมาหลายสิบลำ ซึ่งใหญ่เกินกว่าที่เราจะจินตนาการได้ การก่อสร้างของพวกมันย้อนกลับไปหลายล้านปี"
 anomaly.4020.rocket.desc:0 "เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ได้ค้นพบแหล่งที่มาของค่าแร่ธาตุที่แปลกประหลาด [From.GetName] เป็นสุสานสำหรับยานอวกาศขนาดยักษ์ที่นอนสงบอยู่ที่นั่นมาหลายล้านปี [Root.GetLeaderName] บรรยายสรุปยืดยาวเกี่ยวกับ "ความเศร้าอย่างสุดซึ้งที่จรวดต่างๆ เสียหายมากเกินกว่าที่จะเก็บข้อมูลได้ แม้จะพยายามตรวจสอบอย่างระมัดระวังที่สุดก็ตาม""
 anomaly.4020.rocket.desc.mach:0 "เราได้ค้นพบว่าแหล่งที่มาของค่าแร่ธาตุที่ผิดปกติคือซากของยานอวกาศขนาดใหญ่ผิดปกติและก้าวหน้าทางเทคโนโลยีจำนวนหนึ่ง การย่อยสลายของวัสดุระบุอายุได้ประมาณ 2,380,669 ปี หน่วยวิทยาศาสตร์ในพื้นที่พยายามที่จะวิศวกรรมย้อนรอยจรวดของยานเหล่านี้แต่ล้มเหลวเนื่องจากความเสียหายรุนแรง"
 anomaly.4020.a:0 "วัตถุดิบเหล่านี้จะมีประโยชน์แน่นอน"
 anomaly.4020.b:0 "อย่างน้อยวัตถุดิบก็เป็นประโยชน์"
 anomaly.4020.a.tooltip:3 "เพิ่ม§Y$ship_graveyard$§!แก้ไขโครงการหลัก...[From.GetName]:\n£alloys£ §G+2§!"
 anomaly.4025.name:0 "นักสำรวจยุคเก่า"
 anomaly.4025.desc:0 "ค้นพบแผ่นจารึกโลหะที่อยู่ผิดที่ผิดทางในพื้นที่ห่างไกลบน [From.GetName] โดยทีมวิทยาศาสตร์ของ [Root.GetName]\n\nมันประกอบด้วยข้อมูลพื้นฐานเกี่ยวกับระบบดาวฤกษ์อันไกลโพ้น โดยใช้ภาพประกอบและสิ่งที่ดูเหมือนตารางธาตุ เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] สามารถใช้ข้อมูลนี้เพื่อสรุปตำแหน่งและทรัพยากรที่มีศักยภาพของระบบดาวดวงนั้นได้"
 anomaly.4025.a.tooltip:0 "ได้รับข้อมูลการสำรวจ §Yข้อมูลการสํารวจ§! อย่างครบถ้วนเกี่ยวกับระบบดาวอันห่างไกล"
 anomaly.4030.name:0 "ผู้รับใช้แห่งผืนทราย"
 anomaly.4030.desc:0 "ใต้เนินทรายของ [From.GetName] ทีมวิทยาศาสตร์ได้พบฝูงบินรบที่ตกอยู่ แม้จะเก่าแก่แต่ก็ยังคงสภาพดี พวกมันถูกทิ้งร้าง แต่ไฟสัญญาณและเครื่องยนต์ดูเหมือนยังทำงานได้ เหตุใดพวกมันถึงตกยังคงเป็นปริศนา บนสะพานเดินเรือหลักของยานเราพบปัญญาประดิษฐ์กองยาน(เอไอ)ซึ่งสามารถควบคุมยานต่างๆ ในการต่อสู้ได้ มันยังคงทำงานอยู่ เมื่อเราเข้าใกล้ สัญญาณเตือนภัยก็ดังขึ้น มันถูกตั้งโปรแกรมให้ทำงานเมื่อถูกคุกคามโดยผู้บุกรุก!\nโครงการพิเศษ §Sโครงการพิเศษ§! สามารถเริ่มดำเนินการเพื่อพยายามกู้คืน AI ก่อนที่มันจะคลุ้มคลั่ง หรือเราอาจทำลายมันทิ้งเพื่อหลีกเลี่ยงความเสี่ยงดังกล่าว"
 anomaly.4030.a:0 "พยายามเข้าควบคุม AI ตัวนี้"
 anomaly.4030.b:0 "ทำลายมันก่อนที่มันจะคิดตลบหลัง"
 anomaly.4030.b.tooltip:1 "ทําลาย AI\n\nเพิ่ม§Yขัดข้อง AI-Fleet§!แก้ไขโครงการหลัก...[From.GetName]:\n£engineering£ §G+2§!"
 anomaly.4031.desc:0 "โชคดีที่เราสามารถเขียนโปรแกรม AI ใหม่ก่อนที่มันจะก้าวร้าวใส่เรา มันถูกปรับเปลี่ยนวัตถุประสงค์เพื่อสั่งการยานในกองยานของเรา และสามารถทำหน้าที่เป็นผู้บัญชาการได้หากเราต้องการ AI ถูกส่งไปยังดาวบ้านเกิดของเราเรียบร้อยแล้วเพื่อรอการมอบหมายหน้าที่"
 anomaly.4035.name:0 "เปลวเพลิงแห่งเตาหลอม"
 anomaly.4035.desc:0 "เราได้ค้นพบสิ่งเร้าที่น่าสนใจบน [From.GetName] อย่างไรก็ตาม มันไม่เกี่ยวข้องกับ [From.GetPlanetMoon] นั้นโดยตรง ขณะทำการทดสอบตามปกติของเรา เราตรวจพบข้อมูลที่แปลกประหลาดจากดาวฤกษ์ของระบบดาวอันไกลโพ้น รังสีของมันบ่งชี้ว่ามันสามารถหลอมรวมเบริลเลียมเข้าด้วยกันโดยไม่เกิดกระบวนการสปาเลชัน(ปรบมือ)ซึ่งเป็นสิ่งที่ไม่น่าเป็นไปได้!\n\nทีมวิทยาศาสตร์กระตือรือร้นที่จะสืบสวนและจำกัดขอบเขตดวงดาวที่มีแนวโน้มว่าจะใช่ลงเหลือเพียงสองระบบดาวที่ไม่ไกลเกินไปนัก\nตรวจสอบรายละเอียดในบันทึกสถานการณ์ §Sบันทึกสถานการณ์§!" #Source: http://www.forbes.com/sites/ethansiegel/2015/07/01/the-only-three-heavy-elements-in-the-universe-that-arent-made-in-stars/
 anomaly.4035.a:0 "สิ่งนี้อาจนำไปสู่ผลลัพธ์ที่ดี"
 anomaly.4035.poi_1:0 "ดาวฤกษ์ที่มีศักยภาพดวงแรก"
 anomaly.4035.poi_2:0 "ดาวฤกษ์ที่มีศักยภาพดวงที่สอง"
 anomaly.4035.poi.desc:0 "หนึ่งในระบบดาวที่อาจมีดาวฤกษ์แผ่รังสีแปลกประหลาดอยู่"
 anomaly.4037.name:0 "ระบบดาวที่ถูกต้อง"
 anomaly.4037.desc:0 "ดูเมื่อเราจะพบระบบดาวที่ถูกต้องแล้ว! ข้อมูลรังสีของดาวฤกษ์ในท้องถิ่นตรงกับข้อมูลที่เคยพบก่อนหน้านี้ โครงการพิเศษ §Sโครงการพิเศษ§! ได้รับการประกาศเพื่อวิจัยดาวฤกษ์ดวงนี้"
 anomaly.4038.base.desc:0 "สำเร็จแล้ว! เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] พบว่าดาวฤกษ์ดวงนี้ก่อตัวขึ้นรอบๆ รูหนอนขนาดเล็ก ซึ่งได้ฉีกเปิดรอยแยกมิติ รังสีจากมิติอื่นนี้เข้ามาแทนที่ความจำเป็นของรังสีคอสมิกในการสปาเลชัน กระบวนการที่รังสีซูเปอร์โนวาจะลดเบริลเลียม-8 ที่เกิดขึ้นในดวงดาวให้กลายเป็นธาตุที่เสถียร ดาวดวงนี้จึงมีความโดดเด่นเป็นพิเศษในด้านความสามารถในการฟิวชัน"
 anomaly.4038.maxed.desc:0 "$anomaly.4038.base.desc$\n\nความรู้นี้จะไม่ช่วยขยายเทคโนโลยีที่มีอยู่ของเรา อย่างไรก็ตาม มันช่วยให้เราเข้าใจอย่างลึกซึ้งยิ่งขึ้นเกี่ยวกับการทำงานของจักรวาล"
 anomaly.4038.upg.desc:0 "$anomaly.4038.base.desc$\n\nขอบคุณการค้นพบนี้ที่จะช่วยให้นักวิทยาศาสตร์ของเราสามารถวิจัยเทคโนโลยีใหม่ๆ ได้!"
 anomaly.4038.a:0 "พวกเราได้ครอบครองความลับของดวงตะวันแล้ว"
 anomaly.4038.b:0 "ความลึกลับของจักรวาลค่อยๆ ถูกเปิดเผยออกมาทีละน้อย"
 anomaly.4040.name:0 "บาปของดวงตะวัน"
 anomaly.4040.desc:0 "รังสีไอออไนซ์บน [From.GetName] อยู่ในระดับที่พุ่งสูงทะลุชาร์ต ดาวเคราะห์ดวงนี้ [From.GetPlanetMoon] ดูเหมือนว่าเพิ่งจะถูกถล่มด้วยหัวรบนิวเคลียร์เมื่อไม่นานมานี้ หรือไม่ก็สัมผัสกับลำแสงรังสีคอสมิกที่มีความเข้มข้นสูง ซึ่งอาจมาจากซูเปอร์โนวาที่อยู่ใกล้เคียง วิธีการที่จะทำอย่างหลังได้สำเร็จนั้นอยู่เหนือความเข้าใจของเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName]"
 anomaly.4040.a.tooltip:1 "เพิ่ม§Rดินแดนร้าง§!แก้ไขโครงการหลัก...[From.GetName]:\n£blocker£ดินแดนร้างของวิทยุ§R+6§!\n$mod_planet_jobs_physics_research_produces_mult$: §G+10%§!"
 anomaly.4045.name:0 "เสียงสะท้อนจากส่วนลึก"
 anomaly.4045.desc:0 "หลังจากการวิจัยอย่างเข้มงวด ลูกเรือของ [Root.GetName] ตรวจพบเพียง "เสียงสะท้อน" แผ่วเบาที่ส่งมาจากลึกใต้พื้นผิวของ [From.GetName]\n\nเสียงสะท้อนนี้คล้ายกับสัญญาณชีพ อย่างไรก็ตาม มันอยู่ห่างไกลมากจนยากจะบอกได้ว่าเป็นของจริงหรือเป็นเพียงเครื่องมือวัดที่ให้ค่าแปรปรวนแบบสุ่ม ลูกเรือของเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] กำลังบ่นเกี่ยวกับการพักผ่อนไม่เพียงพอและชั่วโมงทำงานที่ยาวนาน และไม่สามารถทนรับภาระได้มากกว่านี้แล้ว"
 anomaly.4045.a:0 "สอบเทียบเครื่องสแกนและตรวจสอบให้เข้าใกล้แกนกลางมากขึ้น!"
 anomaly.4045.b:0 ""ลูกเรือไว้ใจไม่ได้ จำเป็นต้องมีการเดินทางสำรวจ!""
 anomaly.4045.c:0 "สุขภาพของลูกเรือต้องมาก่อน"
 anomaly.4045.d:0 "พวกเราพักไม่ได้จนกว่าจะได้รู้สาเหตุของเรื่องนี้!"
 anomaly.4046.desc:0 "หลังจากปรับเปลี่ยนเครื่องสแกนของยานแล้ว ลูกเรือของ [Root.GetName] และเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] แม้จะเหนื่อยล้าและตึงเครียด แต่ก็ทำการค้นพบที่น่าตกตะลึง ใกล้กับแกนกลางของ [From.From.GetName] มีสิ่งมีชีวิตคล้ายแพลงก์ตอนซึ่งครอบคลุมไปทั่วทั้งดวงดาว [From.From.GetPlanetMoon] โดยมีจิตสำนึกร่วมกันและมีความสามารถทางพลังจิตที่มหาศาล\n\nสิ่งมีชีวิตนี้สามารถอยู่รอดได้ภายใต้ความกดดันและอุณหภูมิที่สูงมาก มันยังสามารถขยายตัวเองได้อย่างรวดเร็ว ดูเหมือนว่ามันจะกำลังจำศีลหรือ... ซ่อนตัวอยู่ ราวกับว่ามันรู้ตัวว่ากำลังถูกเฝ้ามอง\n\nสิ่งมีชีวิตขนาดมหึมาและปรับตัวได้ดีเช่นนี้เรียกได้ว่าไม่มีวันตายตามทฤษฎี อย่างไรก็ตาม ดูเหมือนว่ามันจะไม่ขัดขวางเราในการตั้งอาณานิคมบน [From.From.GetPlanetMoon] แต่อาจส่งผลกระทบเชิงลบต่อประชากร"
 anomaly.4046.a:0 "เราควรพยายามติดต่อมันดู"
 anomaly.4046.b:0 "เราสามารถปล่อยยาพิษลงมหาสมุทรเพื่อกำจัดมันได้"
 anomaly.4046.c:0 "ปล่อยมันไว้ตามลำพังน่าจะดีกว่า"
 anomaly.4046.c.tooltip:1 "§Yจักรวรรดิของคุณ§!ได้รับ§Rครอบคลุมสื่อเป็นลบ§!เปลี่ยนแปลง\n\nเพิ่ม§Rสภาพแวดล้อมที่เป็นมิตร§!แก้ไขโครงการหลัก...[From.From.GetName].\n\nเพิ่ม§Yเก่า แก่§!แก้ไขโครงการหลัก...[From.From.GetName]:\n£society£ §G+4§!"
 anomaly.4047.desc:0 "หลังจากทดลองติดต่อหลายวิธีโดยไม่มีการตอบรับ ทีมงานจึงตัดสินใจส่งสัญญาณโซนาร์ คลื่นเสียงทำให้เกิดปฏิกิริยาอย่างรุนแรงในตัวสิ่งมีชีวิต และสมาชิกลูกเรือทุกคนต่างล้มทรุดลงบนเข่าด้วยภาพนิมิตที่แจ่มชัดเข้ามาในหัว\n\nนี่ดูเหมือนจะเป็นวิธีการสื่อสารหลักของมัน ภาพนิมิตแสดงถึงโลกบ้านเกิดของมันที่มันนอนอยู่อย่างเดียวดายใกล้แกนกลาง อิงแอบความอบอุ่นของ [From.From.From.GetPlanetMoon] เจริญเติบโตในความมืดมิด จากนั้นมันก็แสดงภาพผู้คนของเรา ยืนอยู่บนพื้นผิว เจริญรุ่งเรืองท่ามกลางแสงแดด"
 anomaly.4047.a:0 "พวกเรายินดีน้อมรับคำเชิญนี้ด้วยความเต็มใจ"
 anomaly.4047.a.tooltip:1 "§Yจักรวรรดิของคุณ§!ได้รับ§Rครอบคลุมสื่อเป็นลบ§!เปลี่ยนแปลง\n\nเพิ่ม§Yเก่า แก่§!แก้ไขโครงการหลัก...[From.From.From.GetName]:\n£society£ §G+4§!"
 anomaly.4048.desc:0 "เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] สังเคราะห์สารพิษที่ควรจะทำปฏิกิริยาได้ดีกับร่างกายที่เชื่อมต่อถึงกันของสิ่งมีชีวิตดวงนี้อย่างรวดเร็วและแพร่กระจายไปราวกับไฟป่า\n\nหลังจากปล่อยสารพิษ ลูกเรือต่างจ้องมองด้วยความตื่นตระหนกขณะร่วมเป็นสักขีพยานในเหตุการณ์ที่ไม่เคยเกิดขึ้นมาก่อน อุณหภูมิแกนกลางของ [From.From.From.GetName] พุ่งสูงจนหลุดจากการควบคุม ส่งผลให้มหาสมุทรเดือดพล่าน ร่างกายที่ใหญ่โตของสิ่งมีชีวิตยังปล่อยสารพิษออกมาสู่ชั้นบรรยากาศ สิ่งมีชีวิตแพลงก์ตอนนี้น่าจะมีบทบาทสำคัญในการควบคุมแกนกลางที่ไม่เสถียรของ [From.From.From.GetPlanetMoon] ตลอดจนพัฒนากลไกป้องกันที่เป็นพิษเพื่อปกป้องตนเอง\n\nดวงดาว [From.From.From.GetPlanetMoon] กลายสภาพเป็นดาวพิษโดยสมบูรณ์ในเวลาเพียงไม่กี่ชั่วโมง"
 anomaly.4048.a:0 "..."
 anomaly.4048.a.tooltip:1 "§Yจักรวรรดิของคุณ§!ได้รับ§Rครอบคลุมสื่อเป็นลบ§!เปลี่ยนแปลง\n\nเดอะ§Yคลาสดาวเคราะห์§!ของ[From.From.From.GetName]เปลี่ยนเป็น§Rสารพิษ§!.\n\nเพิ่ม§Rสภาพแวดล้อมที่เป็นมิตร§!แก้ไขโครงการหลัก...[From.From.From.GetName].\n\nเพิ่มทรัพยากรไปยัง[From.From.From.GetName]:\n£society£ §G+4§!"
 anomaly.4049.desc:1 "ด้วยความสงสัยว่าลูกเรือกำลังปิดบังอะไรบางอย่าง เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] จึงตัดสินใจเดินทางสำรวจเพียงลำพังโดยไม่ได้รับอนุญาตเพื่อตรวจสอบแกนกลางของดาวเคราะห์ ภาพวิดีโอจากเรือดำน้ำแสดงให้เห็นสิ่งที่เกิดขึ้น:\n\nการดำดิ่งลงสู่ก้นบึ้งของมหาสมุทรบน [From.From.GetName] มีเพียงความมืดมิด ทว่าก็มีบางอย่าง... ที่มีชีวิต ภายในถ้ำใต้ทะเลลึกใกล้กับแกนกลางที่อบอุ่นของ [From.From.GetPlanetMoon] มีโครงข่ายของพืชพรรณคล้ายแพลงก์ตอนแผ่ขยายปกคลุมไปทั่วเปลือกดาว [From.From.GetPlanetMoon] ทั้งหมด\n\nขณะตรวจสอบแพลงก์ตอน [Root.GetLeaderName] เกิดอาการชักกระตุกและหมดสติไป ก่อนจะฟื้นขึ้นมาในอีกหลายชั่วโมงต่อมา\n\nหลังจากกลับมายัง [Root.GetName] เจ้าหน้าที่วิทยาศาสตร์ก็มีอาการประสาทหลอนและพูดถึงเพียงแต่เรื่องราวน่าสยดสยองและนิมิตที่ตามหลอกหลอน"
 anomaly.4049.a:0 "เจ้าหน้าที่วิทยาศาสตร์คงแค่ต้องการการพักผ่อน"
 anomaly.4049.a.tooltip:0 "เจ้าหน้าที่วิทยาศาสตร์[Root.GetLeaderName]ได้รับ§R$leader_trait_maniacal$§!ทริท"
 anomaly.4049.b:0 "เจ้าหน้าที่วิทยาศาสตร์เสียสติไปแล้ว ขังคุกใต้เรือซะ!"
 anomaly.4049.b.tooltip:0 "เจ้าหน้าที่วิทยาศาสตร์[Root.GetLeaderName]ถูกพักงานอย่างถาวร"
 anomaly.4050.desc:0 "หนึ่งสัปดาห์ผ่านไปนับตั้งแต่เหตุการณ์บน [From.From.From.GetName] ลูกเรือของ [Root.GetName] ต่างตกใจตื่นจากเสียงกรีดร้องอันดังลั่น เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] กำลังตะโกนโวยวาย วิ่งพล่านไปตามระเบียงทางเดินของยาน และบ่นถึงความเจ็บปวดที่อธิบายไม่ได้\n\nลูกเรือนำนักวิทยาศาสตร์ผู้น่าสงสารไปยังห้องพยาบาล และหลังจากให้ยาระงับประสาทอย่างหนักพร้อมตรวจสอบอย่างละเอียดถี่ถ้วนแล้ว ก็ได้ข้อสรุปว่าสมองของ [Root.GetLeaderName] เกิดการเปลี่ยนแปลงไป\n\nจากการทดสอบเพิ่มเติม ทีมงานก็ตระหนักด้วยความตกใจว่าขณะนี้ผู้นำของพวกเขามีความสามารถในการเคลื่อนย้ายวัตถุด้วยพลังจิตและสื่อสารกับผู้อื่นผ่านโทรจิตได้ [Root.GetLeaderName] จะกลับมาแข็งแรงดีหลังจากได้รับการพักผ่อนสักระยะ"
 anomaly.4050.a:0 "ยินดีต้อนรับกลับมา"
 anomaly.4050.b:0 "ควบคุมตัวเองหน่อย เจ้าหน้าที่วิทยาศาสตร์ ไม่อย่างนั้นจะหาว่าไม่เตือน"
 anomaly.4050.a.tooltip:0 "เจ้าหน้าที่วิทยาศาสตร์[Root.GetLeaderName]ได้รับ§Gภาษาสยามมีความเชี่ยวชาญ§!ถึง§Gการจัดอันดับ§!เทรดส์"
 anomaly.4051.desc:0 "ลูกเรือของ [Root.GetName] สิ้นสุดการวิจัยของพวกเขาบน [From.From.GetName] ด้วยความซาบซึ้งใจที่จะได้พักผ่อนเสียที น่าเสียดายที่ไม่มีการค้นพบที่เป็นประโยชน์ใดๆ แต่ข่าวคราวเรื่องการดูแลเอาใจใส่ลูกเรือเป็นอย่างดีแพร่กระจายไปอย่างรวดเร็วและนำมาซึ่งเสียงชื่นชมมากมายบนดาวบ้านเกิดของเรา การได้พักผ่อนอย่างเต็มอิ่มก็น่าจะช่วยให้ลูกเรือสร้างผลงานได้ดียิ่งขึ้นในระยะยาว"
 anomaly.4051.a.tooltip:0 "§Yจักรวรรดิของคุณ§!ได้รับ§Gครอบคลุมสื่อด้านบวก§!ถึง§Gนัก วิทยาศาสตร์ ที่ พัก ผ่อน§!กฎเกณฑ์"
 anomaly.4051.b.tooltip:0 "§Yจักรวรรดิของคุณ§!ได้รับ§Gครอบคลุมสื่อด้านบวก§!ถึง§Gนัก วิทยาศาสตร์ ที่ พัก ผ่อน§!กฎเกณฑ์\n\nให้เข้าถึง§Y$edict_improved_work_environment$§! จักรวรรดิคําพิพากษา"
 anomaly.4051.a:0 "ความเป็นอยู่ที่ดีของลูกเรือคือรางวัลในตัวเอง"
 anomaly.4051.b:0 "นี่เป็นเพียงช่องทางหนึ่งในการเพิ่มประสิทธิภาพการทำงาน"
 anomaly.4052.desc:0 "หลังจากทำงานทั้งวันทั้งคืนเพื่อค้นหาสาเหตุเบื้องหลังเสียงสะท้อน ลูกเรือของ [Root.GetName] ได้ค้นพบสิ่งมีชีวิตที่น่าสนใจซึ่งอาศัยอยู่ใต้พื้นผิวของ [From.From.GetName] ก่อนหน้านี้เราไม่สามารถตรวจจับมันได้เนื่องจากความสามารถที่น่าทึ่งในการอาศัยอยู่ใกล้แกนกลางของ [From.From.GetPlanetMoon] ซึ่งรบกวนการวิเคราะห์ระบบของเรา\n\nการสแกนเผยให้เห็นว่าเป็นสัตว์ขาปล้องในน้ำชนิดหนึ่งที่ยังอยู่ในช่วงเริ่มต้นของวิวัฒนาการ แต่สิ่งที่น่าแปลกใจที่สุดคือความจริงที่ว่ามันสามารถสืบพันธุ์ได้โดยการเปลี่ยนวัตถุที่ตายแล้วจากสิ่งมีชีวิตอื่นๆ ให้กลายเป็นทายาทรุ่นต่อไป\n\nข้อมูลนี้จะช่วยให้นักวิทยาศาสตร์ของเราพัฒนาเภสัชภัณฑ์ใหม่ๆ ได้อย่างแน่นอน! อย่างไรก็ตาม ข่าวเกี่ยวกับการที่เราปฏิบัติต่อบุคลากรของเราจะแพร่กระจายไปและสร้างความไม่พอใจแก่ประชากรทั่วไปอย่างแน่นอน"
 anomaly.4052.a.tooltip:3 "§Yจักรวรรดิของคุณ§!ได้รับ§Gนวัตกรรมทางเภสัชกรรม§!ถึง§Rครอบคลุมสื่อเป็นลบ§!กฎเกณฑ์"
 anomaly.4055.name:0 "เพชรในตม"
 anomaly.4055.desc:0 "หลังจากการศึกษา [From.GetName] เสร็จสิ้นลง เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] รายงานว่าพวกเขาพบว่าดาวเคราะห์ดวงนี้อุดมไปด้วยแร่ธาตุอย่างผิดปกติ การค้นพบนี้เกิดขึ้นได้ส่วนใหญ่ขอบคุณสมาชิกคนหนึ่งของลูกเรือ [Root.GetName] โดย [Root.GetLeaderName] ได้กล่าวชมเชยผู้ใต้บังคับบัญชาคนนี้อย่างสูง"
 anomaly.4055.a:0 "เสนอตำแหน่งเจ้าหน้าที่วิทยาศาสตร์ให้แก่ผู้ใต้บังคับบัญชาคนนี้"
 anomaly.4055.a.tooltip:0 "ค้นหาใหม่§Gนัก วิทยาศาสตร์§!.\n\n$anomaly.4055.base.tooltip$"
 anomaly.4055.b:0 "พวกเขาก็ทำงานได้ดีอยู่แล้วในตำแหน่งปัจจุบันของตน"
 anomaly.4055.b.tooltip:2 "\n$anomaly.4055.base.tooltip$"
 anomaly.4055.base.tooltip:2 "เพิ่มทรัพยากรไปยัง[From.From.GetName]:\n£minerals£ §G+6§!"
 anomaly.4060.name:0 "ปริศนาความน่าจะเป็น"
 anomaly.4060.desc:0 "เราได้รับรายงานจากเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ดูเหมือนว่ามี... ภาชนะเซรามิกกำลังโคจรรอบดาวฤกษ์ [From.GetName] ช่างแปลกประหลาดยิ่งนัก\n\nมันไม่ควรจะอยู่ตรงนั้นอย่างชัดเจน แต่ทว่าไม่ทางใดก็ทางหนึ่งมันกลับสามารถหาทางเข้าสู่วงโคจรที่ใกล้ชิดได้\n\nโครงการพิเศษ §Sโครงการพิเศษ§! สามารถเริ่มดำเนินการเพื่อตรวจสอบภาชนะนี้และพยายามสรุปว่ามันไปลงเอยอยู่ที่นั่นได้อย่างไร"
 anomaly.4060.a:0 "ปริศนาธรรมที่คุ้มค่าแก่การสืบสวน"
 anomaly.4060.b:0 "ไม่ใช่ทุกคำถามที่จะมีคำตอบที่คุ้มค่า"
 anomaly.4060.spirit.b:0 "นี่ต้องเป็นสัญญาณจากสิ่งศักดิ์สิทธิ์อย่างแน่นอน"
 anomaly.4061.desc:0 "เราพยายามทุกวิถีทางเพื่อสืบหาว่าหม้อเซรามิกไปโคจรรอบดาวฤกษ์ได้อย่างไร หรือบางทีพวกเราอาจจะบ้าไปเอง? หรือบางทีมันอาจจะไม่มีอยู่จริงด้วยซ้ำ? ทายสิว่าเกิดอะไรขึ้น? เราลองคำนวณจากข้อเท็จจริงเหล่านั้นแล้วเช่นกัน! พอแค่นี้แหละ ไม่มีอะไรที่เราสามารถทำได้ที่นี่อีกแล้ว\n\nข้อดีเพียงอย่างเดียวคือเรามีเวลาเหลือเฟือที่จะถกถามเกี่ยวกับปัญหาทางปรัชญาและเศรษฐกิจ ในยามที่เราทนไม่ได้ที่จะต้องสืบสวนไอ้สิ่งบ้าๆ นั่นต่อไป"
 anomaly.4061.desc.mach:0 "เราพยายามทุกวิถีทางเพื่อสืบหาว่าภาชนะเซรามิกไปโคจรรอบดาวฤกษ์ได้อย่างไร บางทีพวกเราอาจทำงานผิดปกติ? หรือบางทีมันอาจจะไม่มีอยู่จริงด้วยซ้ำ<i>เราพยายามคำนวณโดยอิงจากข้อเท็จจริงเหล่านั้นเช่นกัน<i>\nพอแค่นี้แหละ ไม่มีอะไรที่เราสามารถทำได้ที่นี่อีกแล้ว\n\nข้อดีเพียงอย่างเดียวของการสืบสวนนี้คือเรามีเวลาเหลือเฟือสำหรับคำถามเชิงทฤษฎีและเศรษฐกิจ ในยามที่เราไม่สามารถทนสืบสวนหม้อที่ขัดกับตรรกะใบนั้นต่อไปได้"
 anomaly.4061.a:0 "ทำไม? ทำไมกัน!? ทำไมล่ะ!?"
 anomaly.4061.a.mach:0 "วงจรของฉันเจ็บปวดเหลือเกิน"
 anomaly.4061.a.tooltip:0 "ยอมรับความไร้ประโยชน์ของชีวิต\n\n"
 anomaly.4061.a.tooltip.mach:0 "ยอม รับ ความ ไร้ ประโยชน์ ของ การ ดํารง อยู่.\n\n"
 anomaly.4062.base:0 "หลังจากที่แทบจะหมดหวังจากการศึกษาวัตถุเซรามิกต้องสาปเป็นเวลานาน ในที่สุดเราก็ประสบความสำเร็จครั้งสำคัญ!"
 anomaly.4062.desc.mach:0 "หลังจากเพียรศึกษาวัตถุเซรามิกที่ชวนสับสนเป็นเวลานานโดยไม่มีผลลัพธ์ที่เป็นรูปธรรม ในที่สุดหน่วยวิทยาศาสตร์ของเราก็ประสบความสำเร็จครั้งสำคัญ วัตถุนี้ไม่ได้มีอยู่จริงในปริภูมิ-เวลาสามมิติแบบที่พวกเราชาว [Root.Owner.GetSpeciesNamePlural] รู้จัก หากแต่เป็นภาพฉายจากมิติที่สูงกว่า\n\nจากการวิเคราะห์มันในฐานะเงาของวัตถุสี่มิติ เราได้สะสมข้อมูลเพียงพอที่จะถอดรหัสข้อความของมัน วัตถุนี้สอนเราถึงวิธีการปรับปรุงการวิจัยในทุกๆ ด้าน\n\nคำถามเดียวที่เหลืออยู่คือ: ใครหรือสิ่งใดเป็นผู้ส่งข้อมูลนี้มา?"
 anomaly.4062.desc:0 "$anomaly.4062.base$ วัตถุนี้ไม่ได้อยู่ตรงนั้นจริงๆ หากแต่เป็นภาพฉายจากมิติที่สูงกว่า การวิเคราะห์มันในฐานะเงาของวัตถุสี่มิติช่วยให้เราสะสมข้อมูลเพียงพอที่จะถอดรหัสข้อความของมัน วัตถุนี้สอนเราถึงวิธีการปรับปรุงในทุกสาขาการวิจัย\n\nคำถามเดียวในตอนนี้คือ... ใครเป็นคนส่งข้อมูลนี้มา?"
 anomaly.4062.spirit.desc:0 "$anomaly.4062.base$ ภาชนะนี้คือวัตถุมงคลศักดิ์สิทธิ์ที่ทิ้งไว้ในวงโคจรเป็นสัญลักษณ์ ส่งมาจากสิ่งศักดิ์สิทธิ์อย่างแน่นอน!\n\nวัตถุนี้เอ่อล้นด้วยพลังงาน ซึ่งเมื่อถอดรหัสแล้วจะเผยข้อความที่ซ่อนอยู่: ข้อมูลเกี่ยวกับวิธีการช่วยให้เราก้าวข้ามผ่านขีดจำกัดด้วยการปรับปรุงประสิทธิภาพการวิจัยของเรา!\n\nคำถามเดียวในตอนนี้คือ... ใครเป็นคนส่งข้อความนี้มา?"
 anomaly.4062.spirit.a:0 "ขอบคุณอำนาจเบื้องบน!"
 anomaly.4065.name:0 "กิจการเหมืองแร่ของตัวเอง"
 anomaly.4065.desc:0 "ลึกลงไปในรอยแยกของดาวเคราะห์น้อยยักษ์ [From.GetName] เราได้พบสิ่งที่น่าอัศจรรย์ มีอุปกรณ์ทำเหมืองติดตั้งอยู่กับโขดหิน กำลังขุดเจาะลึกลงไปในความลึกอันกว้างใหญ่ของดาวเคราะห์น้อย! มันถูกปล่อยทิ้งร้างไว้โดยไม่มีวี่แววว่าใครเป็นคนนำมาติดตั้งไว้ที่นั่น\n\nหากเราสามารถหยุดการทำงานของเครื่องจักรนี้ได้ เราอาจได้เรียนรู้บางสิ่งเกี่ยวกับเทคโนโลยีที่ใช้สร้างมันขึ้นมา แต่เราต้องรีบหน่อยก่อนที่เศษซากที่ลอยไปมาจะบดขยี้มันเสียก่อน"
 anomaly.4065.a:0 "พยายามหยุดการทำงานของเครื่องจักร"
 anomaly.4066.upg.desc:0 "เราสามารถหยุดเครื่องขุดเจาะได้ก่อนที่มันจะพังทลายลง มันเป็นเครื่องจักรที่น่าทึ่งมาก พื้นผิวเรียบเนียนที่ปกคลุมไปด้วยเพชร ตอนแรกมองดูเหมือนเครื่องเจาะเป็นชิ้นเดียวกันทั้งหมด แต่มันประกอบเข้าด้วยกันได้แนบเนียนจนมองไม่เห็นรอยต่อหรือข้อต่อเลย\n\nวิศวกรของเราจะสามารถทำวิศวกรรมย้อนรอยเทคโนโลยีบางส่วนนี้ได้"
 anomaly.4066.res.desc:0 "เราสามารถหยุดเครื่องขุดเจาะได้ก่อนที่มันจะพังทลายลง น่าเสียดายที่มันมีลักษณะใกล้เคียงกับการออกแบบของเราเองมาก และเราไม่สามารถเรียนรู้อะไรใหม่ๆ จากมันได้เลย โชคดีที่ความลึกที่มันขุดเจาะเข้าไปในหินจะช่วยให้ค้นหาแร่ธาตุที่มีค่าได้ง่ายขึ้น"
 anomaly.4066.b.tooltip:1 "เพิ่มทรัพยากรไปยัง[From.From.From.GetName]:\n£minerals£ §G+3§!"
 anomaly.4070.name:0 "ความพยายามที่ผลิดอกออกผล"
 anomaly.4070.desc:0 "ข่าวดี! เราพบว่าป่าเขตร้อนของ [From.GetName] เป็นแหล่งเพาะพันธุ์ของต้นไม้ชนิดพิเศษซึ่งผลิดอกออกผลที่เต็มไปด้วยสารอาหาร อาหารที่ผลิตได้เก็บกักพลังงานปริมาณมากและมีสารเคมีทั้งหมดที่คนของเราต้องการเพื่อให้ร่างกายทำงานได้ดี สิ่งนี้จะช่วยให้ชีวิตดำเนินไปได้ง่ายขึ้นอย่างแน่นอนหากเราต้องการเข้ามาตั้งถิ่นฐาน"
 anomaly.4070.a:0 "ข่าวดีจริงๆ!"
 anomaly.4075.name:0 "พลังจากจุดเล็กๆ"
 anomaly.4075.desc:0 "หลังจากตรวจสอบดินแดนอันหนาวเหน็บของ [From.GetPlanetMoon] [From.GetName] เราคิดว่าเราได้พบสิ่งสำคัญแล้ว เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] กล่าวถึงสิ่งมีชีวิตประเภทแบคทีเรียที่ไม่เหมือนใคร มันรวมตัวกันเพื่อสร้างเป็น "ผืนม่าน" ขนาดใหญ่ที่ทนทานแต่เบา และยังทำหน้าที่เหมือนเซลล์แสงอาทิตย์ พวกมันดูดซับพลังงานแสงอาทิตย์ด้วยประสิทธิภาพที่น่าทึ่ง ซึ่งน่าจะเป็นผลมาจากวิวัฒนาการที่เอื้อประโยชน์ต่อผู้ที่สามารถสะสมความร้อนได้มากกว่าในสภาพอากาศที่เลวร้ายเช่นนี้\n\nนักวิจัยของเราที่ดาวบ้านเกิดจะต้องสามารถนำข้อมูลนี้ไปใช้ประโยชน์ได้อย่างแน่นอน"
 anomaly.4075.a:0 "ตรวจสอบดูว่ามันสามารถเพิ่มประสิทธิภาพการผลิตพลังงานได้หรือไม่"
 anomaly.4075.b:0 "พยายามค้นหาแนวทางใช้ในทางการทหาร"
 anomaly.4075.a.tooltip:0 "ส่งไปยังดาวบ้านเกิดของเราเพื่อศึกษา ผลลัพธ์จะต้องใช้เวลาดำเนินการสักระยะ"
 anomaly.4076.desc:0 "นักวิจัยด้านการพัฒนาพลังงานของเรามีความก้าวหน้าเกี่ยวกับตัวอย่างที่เราส่งไปให้จาก [From.From.GetName]! พวกเขาสามารถพัฒนาเซลล์แสงอาทิตย์ชนิดใหม่โดยใช้สิ่งมีชีวิตดังกล่าวเป็นต้นแบบ สิ่งเหล่านี้มีประสิทธิภาพในการเก็บกักพลังงานมากขึ้นและจะช่วยส่งเสริมโรงไฟฟ้าทั้งหมดของเรา"
 anomaly.4077.desc:0 "นักวิจัยด้านการพัฒนาทางทหารของเรามีความก้าวหน้าเกี่ยวกับตัวอย่างที่เราส่งไปให้จาก [From.From.GetName]! พวกเขาได้ประกอบสร้างเซลล์แสงอาทิตย์ทางชีววิทยาขึ้นมาใหม่และบันทึกวิธีการที่พวกมันรักษาพลังงานความร้อนในตัวเองโดยไม่ได้รับความเสียหาย สิ่งนี้ช่วยให้พวกเขาพัฒนาเทคโนโลยีการป้องกันแบบใหม่สำหรับกองยานของเรา"
 anomaly.4080.name:0 "แผงเซนเซอร์ถูกทิ้งร้าง"
 anomaly.4080.desc:1 "เราได้พบแผงเซนเซอร์ที่ตั้งตระหง่านอยู่บน [From.GetName] ตัวดาวเคราะห์ [From.GetPlanetMoon] ไม่มีสิ่งมีชีวิตทรงภูมิปัญญาใดๆ ดังนั้นมันจึงต้องเป็นด่านตรวจการที่ถูกทิ้งร้าง มันเพิ่งถูกสร้างขึ้นเมื่อไม่นานมานี้แต่ไม่ทำงาน\n\nการจะทำให้มันกลับมาใช้งานได้จะต้องใช้ทั้งการซ่อมแซมและการวิจัย ในขณะที่การแยกชิ้นส่วนแยกชิ้นส่วนของมันออกอาจช่วยให้เราได้เรียนรู้อะไรใหม่ๆ"
 anomaly.4080.a:0 "พยายามเปิดใช้งานมัน"
 anomaly.4080.b:0 "ถอดชิ้นส่วนและทำวิศวกรรมย้อนรอยมัน"
 anomaly.4080.c:0 "ปล่อยมันไว้เฉยๆ เผื่อเจ้าของจะกลับมา"
 anomaly.4081.desc:0 "การทำงานนานหลายเดือนประสบผลสำเร็จในที่สุด! แผงเซนเซอร์บน [From.From.From.GetName] กลับมาทำงานได้อีกครั้ง และดูเหมือนว่าจะช่วยเพิ่มระยะการตรวจจับในพื้นที่ใกล้เคียงได้เป็นอย่างดี อย่างไรก็ตาม แผงเซนเซอร์ต้องการพลังงานและบุคลากรเพิ่มในการทำงาน ดังนั้นจึงจำเป็นต้องมีอาณานิคมเพื่อป้อนพลังงานให้กับมัน"
 anomaly.4081.a.tooltip:0 "เพิ่ม§Gอาร์เรย์ตัวตรวจจับสูงสุด§!แก้ไขโครงการหลัก...[From.From.From.GetName]."
 anomaly.4081.b.tooltip:0 "ให้เข้าถึง§Y$edict_super_sensors$§! จักรวรรดิคําพิพากษา\n\nเพิ่ม§Gอาร์เรย์ตัวตรวจจับสูงสุด§!แก้ไขโครงการหลัก...[From.From.From.GetName]."
 anomaly.4085.name:0 "ลอยเท้งเต้ง"
 anomaly.4085.desc:1 "เราได้ค้นพบยานอวกาศต่างดาวลอยเท้งเต้งอยู่ท่ามกลางดาวเคราะห์น้อยที่รายล้อม [From.GetName] มันไม่ตอบสนองต่อสัญญาณเรียกขานของเรา ไม่ว่าจะเป็นเพราะมันไม่สามารถแปลสัญญาณของเราได้ หรือเพราะสาเหตุอื่นๆ เราก็ไม่อาจทราบได้\n\nเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] แนะนำให้ส่งยานก่อสร้างไปลากจูงยานที่ประสบภัยลำนี้ออกจากแถบเศษซากวัตถุ หากปล่อยทิ้งไว้ มีความเสี่ยงที่ยานต่างดาวจะถูกบดขยี้โดยดาวเคราะห์น้อยเหล่านั้น\n\nโครงการพิเศษ §Sโครงการพิเศษ§! ได้รับการประกาศเพื่อกู้ภัยและตรวจสอบยานลำดังกล่าว"
 anomaly.4086.desc:1 "เมื่อลากจูงยานที่ลอยอยู่ใกล้ [From.From.From.GetName] ออกมาจากเศษซากได้สำเร็จ เราก็สามารถส่งทีมสำรวจเข้าไปตรวจสอบได้ พวกเขาพบกับสถานที่เกิดคดีฆาตกรรม พบลูกเรือเพียงคนเดียว ซึ่งเป็นสิ่งมีชีวิตสองเท้าครึ่งบกครึ่งน้ำหูยาวที่ดูเหมือนจะถูกแทงซ้ำหลายครั้ง\n\nเมื่อลูกเรือเสียชีวิตหมดแล้ว ยานลำนี้จึงกลายเป็นของฟรีที่ใครก็เก็บได้ มันได้รับการติดตั้งเครื่องยนต์ขับดันที่มีประสิทธิภาพสูงมาก โครงสร้างและการออกแบบยังอยู่เหนือความเข้าใจของเราในปัจจุบัน ยานลำนี้ไม่มีการติดตั้งอาวุธ ดูเหมือนว่าจะเคยถูกใช้เป็นยานขนส่งสำหรับบุคคลสำคัญ\n\nการปรับเปลี่ยนวัตถุประสงค์ให้มันเป็นยานสำรวจวิทยาศาสตร์จะเป็นงานเล็กๆ อย่างไรก็ตาม หากเราถอดแยกชิ้นส่วนของมันเพื่อศึกษาเครื่องยนต์อย่างละเอียด เราอาจสามารถนำการออกแบบที่ชาญฉลาดนี้ไปประยุกต์ใช้กับกองยานของเราเองแทนได้"
 anomaly.4087.desc:1 "เมื่อลากจูงยานที่ลอยอยู่ใกล้ [From.From.From.GetName] ออกมาจากเศษซากได้สำเร็จ เราก็สามารถส่งทีมสำรวจเข้าไปตรวจสอบได้ ปรากฏว่าลูกเรือยังมีชีวิตอยู่!"
 anomaly.4086.a:0 "ปรับเปลี่ยนให้มันเป็นยานวิทยาศาสตร์"
 anomaly.4086.a.tooltip:0 "เพิ่มข้อมูล§Yวิทยาศาสตร์§!- เรือชั้นกลาง\n"
 anomaly.4086.b:0 "แยกชิ้นส่วนและศึกษาเครื่องยนต์\n"
 anomaly.4086.b.tooltip:0 "§Yจักรวรรดิของคุณ§!ได้รับ§Gเพิ่มความเร็วเรือ§!เครื่องช่วยหายใจ\n"
 anomaly.4090.name:0 "หลบหนีภัย"
 anomaly.4090.desc:0 "เราสามารถติดตามแหล่งที่มาของสัญญาณได้สำเร็จ! ยานอีกหนึ่งลำลอยหลบซ่อนตัวอยู่ในวงโคจรรอบ [From.GetName] เอเลี่ยนบนยานติดต่อหาเรา แต่เราไม่เข้าใจภาษาของกันและกัน ปรากฏว่าพวกเขาเป็นผู้อพยพจากโลกบ้านเกิดอันแห้งแล้งเบื้องล่าง พวกเขาต้องการสถานที่พักพิงแห่งใหม่อย่างเร่งด่วนที่สุด"
 anomaly.4090.a:0 "พวกเขาสามารถไปตั้งรกรากบน [refugee_planet_1.GetName] ได้"
 anomaly.4090.b:0 "ปล่อยให้พวกเขาอาศัยอยู่บน [refugee_planet_2.GetName]"
 anomaly.4090.c:0 "พวกเขาน่าจะเข้ากับคนบน [refugee_planet_3.GetName] ได้"
 anomaly.4090.d:0 "ปล่อยให้พวกเขาย้ายไปอยู่ที่ [refugee_planet_4.GetName]"
 anomaly.4090.e:0 "น่าเสียดายที่เราไม่สามารถจัดสรรพื้นที่ให้พวกเขาบนดาวดวงใดของเราได้เลย"
 anomaly.4090.f:0 "เสียใจด้วย แต่เราจะไม่ช่วยเหลือคุณ"
 anomaly.4090.g:0 "พวกเราจะไม่ต้อนรับพวกต่างดาว!"
 anomaly.4090.uninhabitable:0 "น่าเสียดายที่โลกของพวกเราไม่เหมาะสมต่อความต้องการทางสภาพแวดล้อมของพวกเขา"
 anomaly.4093.name:0 "[RefugeeAliensNation.GetName]"
 anomaly.4093.desc:0 "ผู้อพยพต่างดาวที่เราเคยพบโดยไม่มีความสามารถในการสื่อสารกันได้ บัดนี้มายืนอยู่ตรงหน้าเราบนจอภาพแล้ว\n\n"เส้นทางของผู้คนของเรามาบรรจบกันอีกครั้ง ชาว [From.GetSpeciesAdj] บัดนี้ในที่สุดพวกเราก็ได้พบแหล่งพักพิงแห่งใหม่ จักรวาลช่างโหดร้ายในการเสียดสีนี้...\nคุณมีเบาะแสบ้างไหมว่าพวกเราต้องผ่านความยากลำบากขนาดไหนกว่าจะมาถึงจุดนี้ได้?""
 anomaly.4093.a:0 "พวกเราต้องขออภัยสำหรับเรื่องราวก่อนหน้านี้ด้วย!"
 anomaly.4093.b:0 "ทุกคนจำเป็นต้องยืนหยัดด้วยตัวเอง"
 anomaly.4093.c:0 "ในยามที่ไม่มีวิธีสื่อสาร ความกลัวจึงเข้าครอบงำเรา"
 anomaly.4093.d:0 "ความอยู่รอดของพวกแกไม่ใช่กงการอะไรของเรา เจ้าต่างดาว"
 anomaly.4094.apology.desc:0 ""เรารับคำขอโทษของคุณ แต่เราก็ทำได้เพียงแต่จินตนาการว่าพวกเราจะมีชีวิตรอดมาถึงวันนี้ได้มากกว่านี้กี่คนหากคุณช่วยเหลือเราเร็วกว่านี้ ลาก่อนสำหรับตอนนี้""
 anomaly.4094.insult.desc:0 ""นั่นช่างเป็นจุดยืนที่พูดง่ายนะ ชาว [From.GetSpeciesAdj] โดยเฉพาะอย่างยิ่งในยามที่คุณเป็นฝ่ายที่ยืนได้อย่างมั่นคงด้วยขาทั้งสองข้างบนพื้นดิน จงยืนหยัดอย่างภาคภูมิใจเถอะ เพราะคุณจะต้องยืนหยัดอย่างเดียวดายอย่างแน่นอน ลาก่อน""
 anomaly.4094.neutral.desc:0 ""เข้าใจได้ ชาว [From.GetSpeciesAdj] อย่างไรก็ตาม มันไม่อาจลบล้างความเจ็บปวดของเราที่ถูกทิ้งให้ดิ้นรนเอาชีวิตรอดในความว่างเปล่าอันกว้างใหญ่โดยปราศจากความช่วยเหลือ ลาก่อน""
 anomaly.4094.xenophobe.desc:0 ""ถูกต้องแล้ว ชาว [From.GetSpeciesAdj] ดีใจที่รู้ว่าพวกเรามองคุณออกตั้งแต่แรกเริ่ม ลาก่อน""
 anomaly.4094.a:0 "ลาก่อน"
 anomaly.4095.name:0 "ดินแดนศักดิ์สิทธิ์"
 anomaly.4095.desc:0 "ผืนป่าของ [From.GetName] เหนือกว่าความคาดหมายของลูกเรืออย่างมาก มันไม่เพียงแต่เป็นโลกที่พัฒนาอย่างสูงซึ่งอุดมไปด้วยสิ่งมีชีวิตอินทรีย์เท่านั้น แต่รากพืชส่วนใหญ่ยังสามารถรับประทานได้ด้วย สิ่งนี้อาจฟังดูไม่ค่อยน่าอร่อยนัก แต่มันชี้ให้เห็นว่าเราสามารถเพาะปลูกอาหารบน [From.GetPlanetMoon] ดวงนี้ได้อย่างง่ายดายเนื่องจากดินที่อุดมสมบูรณ์"
 anomaly.4095.a.tooltip:0 "เพิ่ม§Gเลเยอร์§!แก้ไขโครงการหลัก...[From.GetName]."
 anomaly.4100.name:0 "ผู้ปกครองแห่งที่ราบลุ่มน้ำ"
 anomaly.4100.desc:0 "$anomaly.4100.base.desc$ เกล็ดสีเข้มของสิ่งมีชีวิตเหล่านี้แข็งปานหิน และพวกมันจะตื่นตกใจได้ง่ายมากเมื่อเข้าใกล้\n\nมันอาจเป็นไปได้ที่จะทำให้พวกมันเชื่องและช่วยในการตั้งอาณานิคมของดาวเคราะห์ในอนาคต อย่างไรก็ตาม เราอาจค้นพบสิ่งเร้าที่น่าสนใจบางประการได้จากการศึกษาพวกมันก่อน"
 anomaly.4100.expert.desc:0 "$anomaly.4100.base.desc$\n\n[Root.GetLeaderName] สามารถสรุปได้ว่าสัตว์เหล่านี้มีขีดความสามารถทางพลังจิตบางอย่าง เนื่องจากพฤติกรรมที่เปลี่ยนแปลงไปของพวกมันบ่งชี้ว่าพวกมันสามารถรับรู้ถึงเจตนาของเราได้อย่างสัญชาตญาณ\n\nมันอาจเป็นไปได้ที่จะทำให้สัตว์เหล่านี้เชื่องและช่วยในการตั้งอาณานิคมของดาวเคราะห์ในอนาคต อย่างไรก็ตาม เราอาจค้นพบสิ่งเร้าที่น่าสนใจบางประการได้จากการศึกษาพวกมันก่อน\n\n[Root.GetLeaderName] อ้างว่าสิ่งมีชีวิตพื้นถิ่นดูเหมือนจะ "ตอบสนองในเชิงลบต่อความคิดที่แสดงถึงภัยคุกคามใดๆ""
 anomaly.4100.base.desc:0 "บน [From.GetName] เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ค้นพบเผ่าพันธุ์ของสัตว์เลี้ยงลูกด้วยนมสี่ขาที่ดูแข็งแกร่งและยืดหยุ่นทางร่างกายอย่างมาก พวกมันวิ่งไปตามที่ราบลุ่มน้ำตื้นที่มีพืชพรรณอุดมสมบูรณ์ขึ้นโอบล้อมขาของพวกมัน"
 anomaly.4100.a:0 "ศึกษาพวกมันเพื่อหาข้อมูลเพิ่มเติม"
 anomaly.4100.b:0 "พยายามทำให้พวกมันเชื่องในทันที"
 anomaly.4100.c:0 "ปล่อยให้พวกมันเร่ร่อนอย่างอิสระ"
 anomaly.4101.desc:0 "ความพยายามของเราในการศึกษาสัตว์เหล่านี้อย่างใกล้ชิดแทบไม่ประสบผลสำเร็จ พวกมันหนีเตลิดหรือต่อสู้กลับทันทีที่เราเข้าใกล้ ราวกับว่าพวกมันรู้ล่วงหน้าว่าเรากำลังมานานก่อนที่เราจะได้เห็นฝูงของพวกมันเสียอีก\n\nสัตว์เหล่านี้ดูเหมือนจะเข้าใจสิ่งที่เราพยายามทำไม่ทางใดก็ทางหนึ่ง และหลีกเลี่ยงการอยู่ใกล้ชิดกับเรา\n\nอย่างน้อยเราก็สามารถศึกษามันจากระยะไกลต่อไปและอาจได้เรียนรู้สิ่งที่เป็นประโยชน์บางอย่าง"
 anomaly.4101.a:0 "เป็นสัตว์ที่มีเจตจำนงแน่วแน่จริงๆ"
 anomaly.4102.desc:0 "การเข้าหาเหล่าสัตว์ป่าประสบความสำเร็จอย่างงดงาม! พวกมันดูเหมือนจะมีความสามารถทางพลังจิต สามารถสื่อสารระหว่างกันและสื่อสารกับเราผ่านทางโทรจิตได้\n\nพวกมันปรารถนาที่จะเป็นอิสระ เร่ร่อนไปตามดินแดนและกินผลไม้ของมัน เราจะได้รับการสนับสนุนจากพวกมันในฐานะเพื่อนร่วมจักรวาล หากเราเพียงแต่จัดสรรพื้นที่ให้พวกมันและละเว้นแหล่งอาหารของพวกมันไว้โดยไม่เข้าไปแตะต้อง\n\nเรื่องราวในเชิงบวกเกี่ยวกับวิธีจัดการสถานการณ์นี้จะแพร่กระจายไปยังประชากรทั่วไปอย่างแน่นอน"
 anomaly.4102.b:0 "พวกเราต้องการอาหารเหล่านั้นไว้ใช้เอง"
 anomaly.4103.desc:0 "สัตว์เหล่านี้พิสูจน์แล้วว่าฝึกให้เชื่องได้ยาก ในการเข้าใกล้พวกมันเราต้องใช้กำลังบางส่วนและวางยาสลบในที่สุด พวกมันต่อสู้กลับอย่างต่อเนื่องเมื่อเราพยายามจะสั่งให้พวกมันทำงาน เราจำเป็นต้องบังคับให้พวกมันทำงาน ซึ่งผลลัพธ์ที่ได้ไม่มีประสิทธิภาพเท่าใดนัก"
 anomaly.4103.a:0 "สงสัยจังว่าทำไมพวกมันถึงต่อต้านขนาดนี้?"
 anomaly.4104.desc:0 "สัตว์เหล่านี้ทำงานด้วยยากมาก แม้ว่าเราจะพยายามเข้าหาอย่างอ่อนโยนที่สุดเท่าที่จะทำได้ แต่บางตัวก็ยังวิ่งหนีและต่อต้าน เราได้รวบรวมตัวอย่างที่สงบกว่าและให้พวกมันทำงานไถพรวนดินเพื่อการทดสอบ บางส่วนก็ปฏิเสธงานนั้นเช่นกัน ตอนนี้เรามีกลุ่มสัตว์จำนวนน้อยที่ยินดีช่วยเหลือเรา แต่พวกมันก็ไม่ได้มีประสิทธิภาพเท่ากับการใช้สัตว์ทั้งฝูง\n\nวิธีการที่เราจับสัตว์เหล่านี้มาใช้งานอาจทำให้ภาพลักษณ์ของเราดูไม่ดีเมื่อข่าวแพร่กระจายไปยังประชากรทั่วไป"
 anomaly.4104.a:0 "มีเรื่องให้ปวดหัวได้ตลอด"
 anomaly.4105.name:0 "ไอพิษหนาทึบ"
 anomaly.4105.desc:0 "ดาวเคราะห์ [From.GetName] เป็นดินแดนรกร้างที่เป็นพิษ แต่การสแกนของเราเผยว่ามันไม่ได้เป็นเช่นนี้เสมอไป อารยธรรมที่สูญพันธุ์ไปแล้วดูเหมือนจะทำลายล้างดาวเคราะห์บ้านเกิดของตนผ่านการพึ่งพาเชื้อเพลิงที่เปลี่ยนสภาพภูมิอากาศและสารพิษอย่างหนัก\n\nบนเนินเขาที่ห่างไกลใกล้กับเมืองใหญ่ เราพบสถานประกอบการแห่งเดียวที่ยังคงทำงานอยู่ โรงงานประกอบหุ่นยนต์ที่ถูกทิ้งร้างและรายล้อมไปด้วยยานพาหนะทางทหาร ซึ่งเสื่อมโทรมมากจนแตกหักทันทีเมื่อสัมผัส\n\nโรงงานแห่งนี้มีความแปลกประหลาดและลึกลับ แต่สามารถมอบข้อมูลการศึกษาที่อุดมสมบูรณ์ให้แก่เราได้"
 anomaly.4105.desc.mach:0 "ดาวเคราะห์ [From.GetName] เป็นดินแดนรกร้างที่เป็นพิษและกัดกร่อน แต่การสแกนของเราเผยว่ามันไม่ได้เป็นเช่นนี้เสมอไป อารยธรรมอินทรีย์ที่สูญพันธุ์ไปแล้วดูเหมือนจะทำลายล้างดาวเคราะห์บ้านเกิดของตนผ่านการพึ่งพาเชื้อเพลิงที่เปลี่ยนสภาพภูมิอากาศและสารพิษอย่างหนัก\n\nบนเนินเขาที่ห่างไกลใกล้กับเมืองใหญ่ เราพบสถานประกอบการแห่งเดียวที่ยังคงทำงานอยู่ โรงงานประกอบหุ่นยนต์ที่ถูกทิ้งร้างและรายล้อมไปด้วยยานพาหนะทางทหาร ซึ่งเสื่อมโทรมมากจนแตกหักทันทีเมื่อสัมผัส\n\nโรงงานแห่งนี้มีความแปลกประหลาดและลึกลับ แต่สามารถมอบข้อมูลการศึกษาที่อุดมสมบูรณ์ให้แก่เราได้"
 anomaly.4105.a.tooltip:1 "เพิ่ม§Yสมาคม หุ่น ยนต์ ฟอลเลน§!แก้ไขโครงการหลัก...[From.GetName]:\n£engineering£ §G+6§!"
 anomaly.4105.a:0 "เรื่องเล่าเตือนใจ"
 anomaly.4105.a.mach:0 "พวกสิ่งมีชีวิตอินทรีย์มักจะสายตาสั้นเสมอ"
 anomaly.4105.b.tooltip:1 "ให้เข้าถึง§Y$edict_renewable_energy$§! จักรวรรดิคําพิพากษา\n\nเพิ่ม§Yสมาคม หุ่น ยนต์ ฟอลเลน§!แก้ไขโครงการหลัก...[From.GetName]:\n£engineering£ §G+6§!"
 anomaly.4105.robot:0 "พยายามเปิดใช้งานหุ่นยนต์เหล่านั้น"
 anomaly.4106.desc:0 "สถานประกอบการบน [From.From.From.GetName] สว่างไสวขึ้นเมื่อแผนการของเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ประสบความสำเร็จในที่สุด\n\nหุ่นยนต์เปิดทำงานและเคลื่อนไหวอย่างมีจุดหมายในทันที ลูกเรือของ [From.GetName] จ้องมองด้วยความตกตะลึง ทว่าก็สมเหตุสมผลเนื่องจากเครื่องจักรเคลื่อนออกไปทั่วโลก เริ่มทำการชำระล้างความเป็นพิษออกจากดวงดาว\n\nสามารถคาดเดาได้ว่าผูอยู่อาศัยในอดีตมัวแต่วุ่นวายกับความขัดแย้งจนไม่สามารถช่วยเหลือตนเองได้"
 anomaly.4106.desc.mach:0 "สถานประกอบการบน [From.From.From.GetName] สว่างไสวขึ้นเมื่อแผนการของเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ประสบความสำเร็จ\n\nหุ่นยนต์เปิดทำงานและเคลื่อนไหวอย่างมีจุดหมายในทันที สมาชิกลูกเรือของ [From.GetName] สังเกตเห็นว่าหุ่นยนต์โบราณเคลื่อนออกไปทั่วโลก เริ่มทำการชำระล้างความเป็นพิษออกจากดวงดาว\n\nสามารถคาดเดาได้ว่าผู้อยู่อาศัยในอดีตมัวแต่วุ่นวายกับความขัดแย้งเล็กๆ น้อยๆ จนไม่สามารถช่วยเหลือตนเองได้ ช่างเป็นรูปแบบทั่วไปของพวกสิ่งมีชีวิตอินทรีย์จริงๆ"
 anomaly.4106.a.tooltip:1 "เดอะ§Yคลาสดาวเคราะห์§!ของ[From.From.From.GetName]เปลี่ยนเป็น§Gทวีป§!.\n\nเพิ่ม§Yสมาคม หุ่น ยนต์ ฟอลเลน§!แก้ไขโครงการหลัก...[From.From.From.GetName]:\n£engineering£ §G+3§!\n£building£พืช ที่ ประกอบ ด้วย หุ่น ยนต์§G+1§!\n£blocker£สี่เหลี่ยม§R+2§!\n£blocker£ซาก ปรัก หัก พัง ของ เมือง§R+3§!"
 anomaly.4106.b.tooltip:1 "ให้เข้าถึง§Y$edict_renewable_energy$§! จักรวรรดิคําพิพากษา\n\nเดอะ§Yคลาสดาวเคราะห์§!ของ[From.From.From.GetName]เปลี่ยนเป็น§Gทวีป§!.\n\nเพิ่ม§Yสมาคม หุ่น ยนต์ ฟอลเลน§!แก้ไขโครงการหลัก...[From.From.From.GetName]:\n£engineering£ §G+3§!\n£building£พืช ที่ ประกอบ ด้วย หุ่น ยนต์§G+1§!\n£blocker£สี่เหลี่ยม§R+2§!\n£blocker£ซาก ปรัก หัก พัง ของ เมือง§R+3§!"
 anomaly.4110.name:0 "ผืนทรายแปรปรวน"
 anomaly.4110.success.desc:0 "เนินทรายของ [From.GetName] นั้นทรยศหักหลังผู้มาเยือนอย่างแท้จริง เม็ดทรายเนื้อละเอียดไหลแทบไม่ต่างจากของเหลว ทำให้การลงจอดส่วนใหญ่เป็นเหมือนบททดสอบความอดทนอันแสนสาหัส\n\nอย่างไรก็ตาม ทีมวิทยาศาสตร์ผู้ชาญฉลาดของเราได้ค้นพบทางออกด้วยการคิดค้นสิ่งใหม่ๆ สารเคมีชนิดหนึ่งที่คิดค้นโดยเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] สามารถนำมาใช้เชื่อมประสานทรายในจุดสำคัญๆ ช่วยให้การสัญจรบน [From.GetPlanetMoon] ทำได้ง่ายขึ้น"
 anomaly.4110.fail.desc:0 "เนินทรายของ [From.GetName] นั้นทรยศหักหลังผู้มาเยือนอย่างแท้จริง เม็ดทรายเนื้อละเอียดเสียจนแทบจะเรียกได้ว่าเป็นของเหลว และมันจะกลืนกินสิ่งใดก็ตามที่ก้าวเหยียบย่างลงไป การตั้งถิ่นฐานที่นี่จะสร้างภาระหนักหน่วงต่อบุคลากรรวมถึงโครงสร้างต่างๆ\n\nเมื่อเวลาผ่านไปเราน่าจะได้เรียนรู้วิธีการทำงานร่วมกับสภาพแวดล้อมเช่นนี้ ดังที่คำกล่าวเคยว่าไว้: "ในที่สุด ปราสาทของเราก็คงจะตระหง่านอยู่บนซากหลังเก่า""
 anomaly.4110.a.tooltip:1 "เพิ่ม§Yทราย§!แก้ไขโครงการหลัก...[From.GetName]:\nฟิสิกส์การวิจัย §G+6§!\n£blocker£ฟองน้ํา§R+5§!"
 anomaly.4110.b.tooltip:1 "เพิ่ม§Yการ เลื่อน ทราย§!ถึง§Yทราย§!แก้ไขโครงการหลัก...[From.GetName]:\n£physics£ §G+3§!\n£blocker£ฟองน้ํา§R+7§!"
 anomaly.4115.name:0 "ซุ่มเงียบในความมืด"
 anomaly.4115.desc:0 "ภัยพิบัติเข้าจู่โจม [Root.GetName] แล้ว! หลังจากเสร็จสิ้นการศึกษาโดยไม่พบสิ่งน่าสนใจใดๆ ลูกเรือกลับขึ้นเรือทว่าพบว่ามียานพาหนะอสูรร้ายจาก [From.GetPlanetMoon] ติดมาด้วย!\n\nสิ่งมีชีวิตนี้ได้สังหารลูกเรือไปแล้วหนึ่งคนและกำลังพยายามใช้กรงเล็บขุดเจาะผ่านผนังห้องเพื่อเข้าหาคนอื่นๆ พวกเขาคงทนไม่ได้นานหากเป็นเช่นนี้ต่อไป! โครงการพิเศษ §Sโครงการพิเศษ§! ได้รับการประกาศเพื่อช่วยเหลือยานลำนี้"
 anomaly.4115.desc.mach:0 "ภัยพิบัติเข้าจู่โจม [Root.GetName] แล้ว! หลังจากเสร็จสิ้นการศึกษาโดยไม่พบสิ่งน่าสนใจใดๆ ลูกเรือกลับขึ้นเรือทว่าพบว่ามีสัตว์อสูรอินทรีย์จาก [From.GetPlanetMoon] ติดมาด้วย!\n\nสิ่งมีชีวิตนี้ได้ทำให้ลูกเรือหนึ่งหน่วยไม่ทำงานเสียแล้ว และกำลังพยายามใช้กรงเล็บขุดเจาะผ่านผนังห้องเพื่อเข้าหาหน่วยอื่นๆ พวกเขาคงทนไม่ได้นานหากเป็นเช่นนี้ต่อไป! โครงการพิเศษ §Sโครงการพิเศษ§! ได้รับการประกาศเพื่อช่วยเหลือยานลำนี้"
 anomaly.4115.a:0 "รวบรวมกองกำลังช่วยเหลือ!"
 anomaly.4115.b:0 "ทิ้งพวกเขาให้เผชิญชะตากรรมของตนเอง"
 anomaly.4115.b.tooltip:0 "เดอะ§Y[Root.GetName]§!ถูกทําลาย"
 anomaly.4116.desc:0 "กองกำลังช่วยเหลือของเราประสบความสำเร็จในการยิงสังหารอสูรร้ายบนยาน [From.From.GetName] เจ้าหน้าที่วิทยาศาสตร์ [From.From.GetLeaderName] และทีมงานค่อนข้างเสียขวัญ แต่พวกเขายืนยันว่ายังพร้อมปฏิบัติหน้าที่ต่อไป ความขอบคุณของพวกเขาต่อทหารที่ช่วยชีวิตแพร่กระจายออกไปเป็นวงกว้าง และเราเริ่มเห็นการสมัครเข้ารับราชการทหารใหม่พุ่งสูงขึ้นแล้ว"
 anomaly.4116.desc.mach:0 "กองกำลังช่วยเหลือของเราประสบความสำเร็จในการยิงสังหารอสูรร้ายบนยาน [From.From.GetName] เจ้าหน้าที่วิทยาศาสตร์ [From.From.GetLeaderName] และทีมงานได้รับความเสียหายเพียงเล็กน้อยและพร้อมปฏิบัติหน้าที่ต่อ ความสำเร็จของหน่วยรบในการกำจัดภัยคุกคามอินทรีย์ช่วยกระตุ้นความสนใจในอู่ประกอบยุทธภัณฑ์ที่รับผิดชอบการสร้างพวกเขาขึ้นมา\n\nส่งผลให้เราสังเกตเห็นการสร้างหน่วยรบที่รวดเร็วขึ้นและประสิทธิภาพของซอฟต์แวร์จูงใจหน่วยรบที่ดีขึ้น"
 anomaly.4116.a:0 "วันอันน่าภาคภูมิใจของกองทัพเรือ!"
 anomaly.4116.a.tooltip:1 "§Yจักรวรรดิของคุณ§!ได้รับ§G$army_inspiration$§!เปลี่ยนแปลง"
 anomaly.4116.a.mach.tooltip:0 "§Yจักรวรรดิของคุณ§!ได้รับ§G$army_inspiration_mach$§!เปลี่ยนแปลง"
 anomaly.4117.desc:0 "กองกำลังช่วยเหลือของเราประสบความสำเร็จในการยิงสังหารอสูรร้ายบนยาน [From.From.GetName] น่าเสียดายที่พวกเขามาไม่ทันช่วยเหลือเจ้าหน้าที่วิทยาศาสตร์ [From.From.GetLeaderName] ซึ่งเสียชีวิตขณะพยายามปกป้องลูกเรือ\n\nอย่างน้อยตัวยานก็ยังสมบูรณ์ดีและลูกเรือแจ้งว่าพร้อมกลับมาทำงานได้ในไม่ช้า ดาวบ้านเกิดของเราเต็มไปด้วยคำชมเชยเกี่ยวกับความกล้าหาญของกองทัพในการจัดการสถานการณ์ดังกล่าว"
 anomaly.4117.desc.mach:0 "กองกำลังช่วยเหลือของเราประสบความสำเร็จในการยิงสังหารอสูรร้ายบนยาน [From.From.GetName] น่าเสียดายที่พวกเขามาไม่ทันช่วยเหลือเจ้าหน้าที่วิทยาศาสตร์ [From.From.GetLeaderName] ซึ่งได้รับความเสียหายขั้นรุนแรงขณะพยายามปกป้องหน่วยลูกเรือ\n\nอย่างน้อยตัวยานก็ยังสมบูรณ์ดีและลูกเรือแจ้งว่าพร้อมกลับมาปฏิบัติการตามปกติได้ในไม่ช้า วงจรดาวบ้านเกิดของเราเต็มไปด้วยรายงานความมีประสิทธิภาพของกองทัพในการจัดการสถานการณ์ดังกล่าว"
 anomaly.4117.a.tooltip:0 "สูญเสียเรือ§Rผู้นําวิทยาศาสตร์§!.\n§Yจักรวรรดิของคุณ§!ได้รับ§G$army_inspiration$§!เปลี่ยนแปลง"
 anomaly.4117.a.mach.tooltip:0 "สูญเสียเรือ§Rผู้นําวิทยาศาสตร์§!.\n§Yจักรวรรดิของคุณ§!ได้รับ§G$army_inspiration_mach$§!เปลี่ยนแปลง"
 anomaly.4120.name:0 "การระเบิดบนฟากฟ้า"
 anomaly.4120.desc:0 "ดาวเคราะห์ [From.GetName] เป็นแหล่งกำเนิดสิ่งมหัศจรรย์ทางธรรมชาติ การระเบิดที่มีสีสันสดใสขนาดมหึมาปรากฏขึ้นบนท้องฟ้า ซึ่งเป็นผลจากองค์ประกอบทางเคมีของชั้นบรรยากาศทำปฏิกิริยากับรังสีแกมมาของดาวฤกษ์\n\nนักศึกษาและนักวิทยาศาสตร์อาวุโสต่างนำข้อมูลการค้นพบนี้ไปบอกต่ออย่างรวดเร็ว มันกระตุ้นความสนใจในแวดวงวิทยาศาสตร์ในหมู่ผู้คนของเราได้เป็นอย่างดี"
 anomaly.4125.name:0 "ปิดไฟในเหมืองแร่"
 anomaly.4125.desc:1 "เราได้พบสถานีขุดเจาะทำเหมืองโบราณโคจรรอบ [From.GetPlanetMoon] [From.GetName] มันน่าจะเคยถูกใช้เพื่อขุดเจาะทรัพยากรบนดาว แต่ใครเป็นผู้สร้างนั้นยังคงเป็นความลึกลับ\n\nเทคโนโลยีภายในสถานีมีความใกล้เคียงกับของเรามาก เราน่าจะสามารถเข้าควบคุมและเปิดใช้งานมันได้ในเวลาไม่นาน หรือไม่เราก็สามารถแยกชิ้นส่วนเพื่อเอาอะไหล่ได้"
 anomaly.4125.a:0 "เข้าควบคุมดูแลสถานีนี้"
 anomaly.4125.zerog.desc:0 "$anomaly.4125.desc$\n\nความรู้ที่ลึกซึ้งของเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] เกี่ยวกับโครงสร้างแรงโน้มถ่วงต่ำ(ศูนย์-G)ช่วยให้เราเข้าใจกลไกการทำงานภายในของสถานี ทำให้เราสามารถนำไปปรับปรุงการออกแบบของเราเองได้"
 anomaly.4125.a.tooltip:1 "เพิ่ม§Yการ ทํา เหมือง ร้าง§!แก้ไขโครงการหลัก...[From.GetName]:\nเพิ่มข้อมูล§Yสถานีทําเหมือง§!\n£energy£ §G+3§!"
 anomaly.4125.b.tooltip:1 "§Yจักรวรรดิของคุณ§!ได้รับ§Gนวัตกรรมศูนย์-G§!เปลี่ยนแปลง\n\nเพิ่ม§Yการ ทํา เหมือง ร้าง§!แก้ไขโครงการหลัก...[From.GetName]:\nเพิ่มข้อมูล§Yสถานีทําเหมือง§!\n£energy£ §G+3§!"
 anomaly.4130.name:0 "ต้นไม้"
 anomaly.4130.desc:0 "ท่ามกลางดาวเคราะห์น้อยรอบๆ [From.GetName] มีต้นไม้ต้นหนึ่งกำลังล่องลอยอยู่ท่ามกลางความว่างเปล่าของอวกาศ เหตุการณ์ที่แปลกประหลาดและไม่น่าจะเป็นไปได้เลย! ต้นไม้นี้ถูกห่อหุ้มอยู่ภายในฟองอากาศป้องกัน ซึ่งชวนให้นึกถึงเกราะพลังงาน\n\nทันใดนั้น เราตรวจพบสิ่งมีชีวิตในอวกาศที่เป็นศัตรูกำลังมุ่งหน้าเข้ามา! สิ่งนี้สอดรับกับการที่มียางไม้รั่วไหลผ่านเกราะของต้นไม้ขณะที่เรากำลังรวบรวมตัวอย่าง เป็นไปได้ไหมว่ามันทำให้สิ่งมีชีวิตเหล่านั้นตื่นตระหนก?"
 anomaly.4130.a:0 "เราต้องทำความเข้าใจว่าเกิดอะไรขึ้น!"
 anomaly.4131.desc:0 "หลังจากการวิจัยอย่างเข้มงวด ในที่สุดเราก็เข้าใจแล้วว่าเหตุใดน้ำยางของต้นไม้จึงดึงดูดสิ่งมีชีวิตเหล่านั้น ต้นไม้นี้สามารถผลิตสารที่มีคุณค่าทางโภชนาการสูง ซึ่งมีความสามารถราวกับเครื่องจักรในการซ่อมแซมเนื้อเยื่ออินทรีย์ ต้นไม้นี้คือต้นไม้แห่งชีวิต!\n\nหากเราเก็บเกี่ยวผลผลิตจากมัน เราจะสามารถใช้มันเพื่อยืดอายุขัยของประชากรของเราได้ แต่มีปัญหาอย่างหนึ่งคือ: พลังแห่งการรักษาของต้นไม้นี้มีจำกัด เราสามารถใช้มันเพื่อยืดอายุขัยของคนกลุ่มเล็กๆ ได้อย่างมีนัยสำคัญ หรือเพิ่มอายุขัยของทุกคนขึ้นเพียงเล็กน้อยเท่านั้น"
 anomaly.4131.a:0 "มอบมันให้แก่บรรดาผู้นำของเรา"
 anomaly.4131.b:0 "มอบมันให้แก่ประชาชนทั่วไป"
 anomaly.4131.c:0 "ปล่อยให้ต้นไม้ลอยล่องต่อไป"
 anomaly.4135.name:0 "คำสอนของผู้บุกเบิก"
 anomaly.4135.desc:1 "บน [From.GetName] ลูกเรือของ [Root.GetName] ได้ค้นพบบางสิ่งที่วิเศษมาก เนินทรายของดาวเคราะห์ได้ปกปิดโบราณสถานหลายแห่งที่เคยเป็นของอารยธรรมผู้บุกเบิกดินแดนระหว่างดวงดาว นิคมเหล่านี้ถูกทำลายลงด้วยกาลเวลาที่ล่วงเลยมานานแสนนาน\n\nเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ค้นพบคลังเก็บสิ่งของมีค่าและเอกสารต่างๆ อย่างรวดเร็ว คอลเลกชันข้อความเหล่านี้น่าจะได้รับการเคารพนับถือจากเหล่าผู้บุกเบิกมากที่สุด เนื่องจากมันถูกเก็บไว้ท่ามกลางสิ่งของมีค่าอื่นๆ"
 anomaly.4135.b:1 "ขายมันให้แก่นักสะสมส่วนตัว"
 anomaly.4136.desc:0 "หลังจากผู้เชี่ยวชาญด้านภาษาศาสตร์ของเราทำงานอย่างหนักเป็นเวลาหลายเดือน ในที่สุดเราก็ประสบความสำเร็จในการแปลผลงานที่พบบน [From.From.From.GetName] เอกสารเหล่านั้นคือคำสอนของนักวิชาการต่างดาวที่รู้จักกันในชื่อ \"เทลิซา ผู้บอกเล่าเรื่องราว\" (เทลิซา เทลเลอร์แห่งทาลิส)ทุกการกล่าวถึงตัวเธอชี้ให้เห็นว่าเธอเป็นนักปรัชญาที่มีชื่อเสียงและเป็นผู้เชี่ยวชาญด้านสังคมและความสัมพันธ์\n\n$anomaly.4136.base.desc$"
 anomaly.4136.found.desc:0 "ดูเหมือนว่าเอกสารที่เราพบบน [From.From.From.GetName] จะเป็นผลงานอีกชิ้นหนึ่งที่สร้างสรรค์โดย "เทลิซา ผู้บอกเล่าเรื่องราว" $anomaly.4136.base.desc$"
 anomaly.4136.base.desc:0 "เอกสารดังกล่าวระบุอย่างชัดเจนถึงวิธีการปรับปรุงโครงสร้างพื้นฐานและหล่อหลอมสังคม เธอหมายความว่าด้วยการให้ทุกคนยอมเสียสละความสุขสบายบางส่วนเพื่อประโยชน์ส่วนรวม ประเทศชาติก็จะเจริญรุ่งเรือง"
 anomaly.4136.a.tooltip:0 "สามารถใช้ประกาศคำสั่ง §Y$edict_masters_writings_politics$§! ได้"
 anomaly.4140.name:0 "คำสอนของนักสำรวจ"
 anomaly.4140.desc:0 "ลูกเรือของ [Root.GetName] รายงานว่าพวกเขาได้พบบางสิ่งที่น่าตื่นตาตื่นใจบนพื้นผิว [From.GetName] บนพื้นผิวมีร่องรอยของการเดินทางสำรวจของอารยธรรมอื่น ทิ้งเอกสารและวัตถุโบราณที่ได้รับการอนุรักษ์ไว้อย่างดีบางส่วนไว้เบื้องหลัง\n\nการดำเนินการที่เสนอโดยหัวหน้าเจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] คือการส่งเอกสารที่ค้นพบไปยังดาวบ้านเกิดของเราเพื่อทำการแปล นอกจากนี้ยังมีทางเลือกในการขายมันให้แก่นักลงทุนเอกชนด้วย"
 anomaly.4141.desc:0 "หลังจากศึกษาเป็นเวลาหลายสัปดาห์ นักภาษาศาสตร์ผู้เชี่ยวชาญของเราได้ค้นพบความหมายเบื้องหลังเอกสารที่พบบน [From.From.From.GetName] เอกสารเหล่านั้นเป็นการครุ่นคิดทางปรัชญาของนักวิชาการที่มีชื่อเสียงซึ่งรู้จักกันในชื่อ "เทลิซา ผู้บอกเล่าเรื่องราว"\n\n$anomaly.4141.base.desc$"
 anomaly.4141.found.desc:0 "ใครจะไปคิดล่ะ? เอกสารที่เราพบเป็นคำสอนเพิ่มเติมจาก "เทลิซา ผู้บอกเล่าเรื่องราว" ครั้งนี้เป็นคอลเลกชันของการคิดใคร่ครวญทางปรัชญาและการวิเคราะห์เกี่ยวกับคำถามที่ใหญ่กว่า\n\n$anomaly.4141.base.desc$"
 anomaly.4141.base.desc:0 "คำสอนของเธอช่วยให้เรามีความเข้าใจอย่างลึกซึ้งเกี่ยวกับวิธีบรรลุผลลัพธ์ทางการเมืองได้ดีขึ้นโดยการนำสภาวะจิตใจที่แตกต่างกันมาประยุกต์ใช้ และใช้คำถามในระดับที่ใหญ่ขึ้นเป็นจุดเน้นสำหรับการปฏิรูป"
 anomaly.4141.a.tooltip:0 "สามารถใช้ประกาศคำสั่ง §Y$edict_masters_writings_philosophy$§! ได้"
 anomaly.4145.name:0 "จุดจบของผู้ค้าทาส"
 anomaly.4145.base.desc:0 "บน [From.GetName] ฤดูหนาวนิวเคลียร์ยังอีกยาวไกล ไม่มีสิ่งมีชีวิตใดๆ หลงเหลืออยู่บนส่วนใดของดาวเคราะห์ เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] รายงานผลการค้นพบของทีม: ทุกสิ่งชี้ไปที่สงครามกลางเมืองที่ปะทุขึ้นภายในอารยธรรมที่เคยรวมเป็นหนึ่งเดียวมาก่อน\n\nสาเหตุหลักของสงครามส่วนใหญ่น่าจะเป็นความขัดแย้งระหว่างผู้ดูแลกลุ่มต่างๆ ที่ต่างก็ต้องการควบคุมสัดส่วนทาสของสมาพันธ์ที่ใหญ่กว่า"
 anomaly.4145.desc:0 "$anomaly.4145.base.desc$\n\nโชคดีที่เรายังห่างไกลจากเหตุการณ์เช่นนี้ แต่เราควรปล่อยให้มันเป็นเสมือนข้อพิสูจน์ถึงความวิกลจริตของการกดขี่แรงงานทาส"
 anomaly.4145.slaver.desc:0 "$anomaly.4145.base.desc$\n\nสิ่งนี้ไม่ได้ช่วยให้วิถีชีวิตของเราเองดูดีขึ้นมาเลยในทางใดทางหนึ่ง"
 anomaly.4145.soon.desc:0 "$anomaly.4145.base.desc$\n\nเราควรคิดทบทวนให้ดีก่อนที่จะเดินตามรอยเท้าเดียวกันนี้"
 anomaly.4145.a:0 "ความเขลาของผู้ค้าทาส..."
 anomaly.4145.b:0 "อดคิดไม่ได้ว่า..."
 anomaly.4145.a.tooltip:0 "§Yจักรวรรดิของคุณ§!ได้รับ§R$slavery_bad_juju$§!เปลี่ยนแปลง\n\n"
 anomaly.4145.b.tooltip:0 "§Yจักรวรรดิของคุณ§!ได้รับ§R$slavery_very_bad_juju$§!เปลี่ยนแปลง\n\n"
 anomaly.4150.name:0 "คำสอนของพ่อค้า"
 anomaly.4150.desc:0 "บนพื้นผิวของ [From.GetName] มีสิ่งของที่โดดเด่นซ่อนอยู่ สามารถพบซากโบราณสถานหลายแห่งที่สร้างขึ้นด้วยสถาปัตยกรรมที่แตกต่างกัน ทว่ามาจากจุดเดียวกันในประวัติศาสตร์ ดาวเคราะห์ดวงนี้ [From.GetPlanetMoon] อาจเคยเป็นศูนย์กลางการค้าขายมาก่อน!\n\nโบราณสถานบางแห่งยังคงมีเอกสารและสิ่งของมีค่าจัดเก็บไว้ หากเราศึกษาข้อความดังกล่าว เราอาจสามารถแปลและเรียนรู้เพิ่มเติมเกี่ยวกับผู้คนเคยมาตั้งถิ่นฐานที่นี่ หรือเราสามารถขายพวกมันให้แก่ผู้ที่เห็นคุณค่าในของเก่าแก่โบราณได้"
 anomaly.4151.desc:0 "นักภาษาศาสตร์ที่มีพรสวรรค์ที่สุดของเราทำงานอย่างหนักในการแปลเอกสารที่เราพบเจอใน [From.From.From.GetName] ผู้จดบันทึกผลงานเหล่านี้ถูกเรียกขานว่า "เทลิซา ผู้บอกเล่าเรื่องราว" และดูเหมือนว่าเธอจะได้รับการเคารพอย่างสูงในยุคสมัยของเธอ\n\n$anomaly.4151.base.desc$"
 anomaly.4151.found.desc:0 "ใครจะไปคิดล่ะ? เอกสารที่เราพบเป็นคำสอนเพิ่มเติมจาก "เทลิซา ผู้บอกเล่าเรื่องราว"\n\n$anomaly.4151.base.desc$"
 anomaly.4151.base.desc:0 "เอกสารที่เราพบเป็นคอลเลกชันของเรื่องเล่า ข้อเสนอแนะ และเทคนิคในการมีส่วนร่วมในการทูตระหว่างดวงดาวอย่างเหมาะสมที่สุด ดูเหมือนเธอจะเชื่อว่าการค้าที่ดีและการสื่อสารที่เคารพซึ่งกันและกันจะช่วยบรรลุความก้าวหน้าทางสังคมที่ยิ่งใหญ่สำหรับทุกฝ่าย"
 anomaly.4151.a.tooltip:0 "สามารถใช้ประกาศคำสั่ง §Y$edict_masters_writings_diplomacy$§! ได้"
 anomaly.4155.name:0 "ใต้สมรภูมิรบ"
 anomaly.4155.desc:0 "[From.GetName] เคยเป็นที่ตั้งของอารยธรรมที่ก้าวหน้า บัดนี้มันเงียบสงบราวกับป่าช้า สัตว์ประหลาดต่างดาวเดินเร่ร่อนอยู่ตามสมรภูมิเก่าแก่ที่ทอดยาวไปทั่วพื้นผิว\n\nในพื้นที่ที่เป็นภูเขาหิน ดูเหมือนจะมีห้องนิรภัยซ่อนอยู่ใต้เทือกเขา หากเราสามารถกำจัดสัตว์ร้ายเหล่านั้นที่เดินเพ่นพ่านอยู่ได้ เราก็จะสามารถเข้าไปสำรวจมันได้"
 anomaly.4155.a:0 "มาลองเข้าไปตรวจสอบกันดู!"
 anomaly.4155.b:0 "ปล่อยให้ห้องนิรภัยและวิญญาณเร่ร่อนเหล่านั้นเป็นไปตามทางของมันเถอะ"
 anomaly.4156.desc:0 "เมื่อกำจัดสัตว์ร้ายออกไปได้แล้ว เราก็สามารถเข้าถึงห้องนิรภัยได้ ภายในมีลักษณะคล้ายกองบัญชาการ แหล่งลี้ภัยสุดท้ายสำหรับผู้นำของโลกที่กำลังจะล่มสลาย\n\nห้องนิรภัยเต็มไปด้วยอุปกรณ์ที่ถูกทำลายและซากศพที่เน่าเปื่อย สิ่งเดียวที่น่าสนใจคือภาชนะบรรจุซึ่งอาจเก็บรักษาสิ่งที่มีความสำคัญบางประการเอาไว้"
 anomaly.4156.b:0 "ศึกษาเฉพาะตัวห้องนิรภัยเพื่อหลีกเลี่ยงความเสี่ยง"
 anomaly.4157.name:0 "นักรบในแคปซูลแช่แข็ง"
 anomaly.4157.desc:0 "ภาชนะที่พบบน [WarriorHomePlanet.GetName] ปรากฏว่าเป็นอุปกรณ์แช่แข็งชีวภาพ(อุปกรณ์เข้ารหัส)!เอเลี่ยนที่อยู่ภายในฟื้นตื่นขึ้นมาแล้ว เธอพูดคุยโดยใช้นิมิตทางโทรจิต:\n\n\"ทำไมพวกท่านถึงปลุกข้าขึ้นมา ผู้คุมขัง? สงครามของคนของข้าสิ้นสุดลงแล้วหรือยัง?\""
 anomaly.4157.a:0 "ท่านอยู่บน [HomePlanet.GetName] แล้ว ท่านปลอดภัยดีที่นี่"
 anomaly.4157.b:0 "โลกบ้านเกิดของคุณถูกทำลายยับเยินจากสงคราม เหลือเพียงคุณเท่านั้นที่รอดชีวิต"
 anomaly.4157.c:0 "พวกเรากู้คืนเท่าที่จะกู้ได้จากโลกบ้านเกิดอันพังพินาศของคุณ"
 anomaly.4158.desc:0 ""ฉันเกรงว่าเหตุการณ์นี้จะเกิดขึ้น ฉันหวังเพียงว่าความรู้ของฉันและความล้มเหลวของพวกเราในฐานะเผ่าพันธุ์จะสามารถเป็นบทเรียนให้แก่ผู้อื่นได้""
 anomaly.4159.desc:0 ""เพราะเหตุนี้เองสินะ... ฉันเกรงว่าจะต้องตื่นมาพบข่าวร้ายเหล่านี้ เอาเข้าจริงฉันกังวลว่าจะไม่มีวันตื่นขึ้นมาเสียด้วยซ้ำ เผ่าพันธุ์ของคุณต้องการอะไรจากฉันงั้นหรือ?""
 anomaly.4158.a:0 "เล่าเรื่องราวเกี่ยวกับตัวคุณให้เราฟังหน่อย"
 anomaly.4158.a.response:0 "\"ฉันชื่อมาจูลา ผู้ถือครองตำแหน่ง 'ผู้แบกรับ'(ผู้แบก)'ฉันเคยเป็นนายพล ที่ปรึกษาของพระราชินีแห่งบูรพา และเป็นเพื่อนที่ซื่อสัตย์ของพระองค์\""
 anomaly.4158.b:0 "ทำไมคุณถึงถูกแช่แข็งเก็บรักษาไว้?"
 anomaly.4158.spiritual.b:1 "ท่านถูกเก็บรักษาไว้สำหรับภารกิจศักดิ์สิทธิ์ของพระผู้เป็นเจ้าอย่างนั้นหรือ?"
 anomaly.4158.militant.b:0 "การถูกแช่แข็งท่ามกลางสงคราม แสดงว่าคุณต้องมีค่ามากแน่ๆ?"
 anomaly.4158.b.response:0 ""ฉันดำรงตำแหน่ง 'ผู้แบกรับ' ฉันมีหน้าที่รับผิดชอบในการเป็นตัวแทนของประชาชนของเรา หากพวกเราต้องเผชิญกับเส้นทางแห่งความสูญสิ้นเผ่าพันธุ์ ความรู้เรื่องสงครามของฉันมีเพียงความรู้เกี่ยวกับผู้คนของเราเท่านั้นที่เหนือกว่า""
 anomaly.4158.c:0 "เล่าเรื่องราวเกี่ยวกับผู้คนของคุณให้เราฟังหน่อย"
 anomaly.4158.c.response:0 ""เผ่าพันธุ์ที่ประสบปัญหา ประวัติศาสตร์ของเราเต็มไปด้วยเรื่องราวของความล้มเหลวในการหลีกเลี่ยงจากหนทางสู่ความพินาศ ส่วนรวมไม่สามารถพัฒนาได้ตามศักยภาพของแต่ละบุคคล เรามีผู้พูดที่ชาญฉลาดมากมาย แต่มีเพียงไม่กี่คนที่เลือกจะรับฟัง""
 anomaly.4158.d:0 "คุณจะเข้าร่วมกับพวกเราไหม?"
 anomaly.4158.f:0 "ไปซะ ชะตากรรมของท่านเป็นของท่านเอง"
 anomaly.4158.xenophobe.f:0 "เจ้าไม่มีประโยชน์อะไรสำหรับพวกเรา ออกไปจากดาวเคราะห์ของเราซะ!"
 anomaly.4160.desc:0 ""คำพูดของคุณและอารยธรรมของคุณดึงดูดใจฉัน ผู้คุมขัง ฉันจะเข้าร่วมกับคุณ ด้วยความหวังว่าพวกคุณจะเรียนรู้จากความผิดพลาดของประชาชนของฉัน""
 anomaly.4161.desc:0 ""วิธีที่คุณพูด วิธีที่ห้องนี้ตอบรับคุณ มันบอกฉันว่าทัศนะของเราไม่ตรงกัน ผู้คุมขัง ดังนั้น ไม่ ฉันจะไม่เข้าร่วมกับคุณ ฉันจะกลับไปยัง [WarriorHomePlanet.GetName] และบอกเล่าเรื่องราวของมันตราบเท่าที่ฉันยังคงอยู่""
 anomaly.4161.a:0 "เช่นนั้นก็จงไปอย่างสงบเถิด"
 anomaly.4161.b:0 "จับตัวเธอไว้!"
 anomaly.4162.desc:0 ""ฉันยอมตายดีกว่า!"\n\nมาจูลาวิ่งเตลิดออกจากห้องด้วยความโกรธแค้น ขณะที่มีฝูงชนมารวมตัวกันอยู่ด้านนอกเพื่อเข้าร่วมในเหตุการณ์ เธอจับนักวิจัยคนหนึ่งเป็นตัวประกัน ในระหว่างการหลบหนี นักวิจัยคนดังกล่าวเสียชีวิตก่อนที่มาจูลาจะถูกยิงสังหารโดยเจ้าหน้าที่รักษาความปลอดภัย"
 anomaly.4163.desc:0 ""ลาก่อน ผู้คุมขัง พยายามเรียนรู้จากสิ่งที่เกิดขึ้นกับประชาชนของฉัน เกรงว่าหากเราพบกันอีกครั้ง พวกคุณเองก็อาจกลายเป็นคนสุดท้ายของเผ่าพันธุ์เหมือนกัน""
 anomaly.4163.a:0 "ลาก่อน"
 anomaly.4163.b:0 "ไสหัวไปซะ!"
 anomaly.4165.name:0 "คำสอนของนักรบ"
 anomaly.4165.desc:0 "ทั่วทุ่งโล่งอันแห้งแล้งของ [From.GetName] มีร่องรอยของการต่อสู้ในอดีต ลึกลงใต้พื้นดินอันไร้ชีวิต นักวิจัยของเราบน [Root.GetName] ค้นพบเศษกระดูก เศษโลหะ และที่น่าแปลกใจที่สุดคือภาชนะที่บรรจุเอกสารต่างๆ ไว้\n\nหากเราส่งเอกสารเหล่านี้ไปยังดาวบ้านเกิดเพื่อแปลความหมาย เราอาจได้เรียนรู้เพิ่มเติมเกี่ยวกับสงครามครั้งนี้และผู้ที่ต่อสู้ในนั้น หรือมีความเป็นไปได้ที่จะขายพวกมันในฐานะของโบราณ"
 anomaly.4166.desc:0 "ผู้เชี่ยวชาญด้านภาษาของเราพยายามแปลเอกสารที่เราพบในสมรภูมิรบโบราณมานานหลายสัปดาห์ วันนี้เราได้ผลลัพธ์บางประการในที่สุด ตอนนี้เราทราบแล้วว่านักรบผู้ล่วงลับต่างดำเนินรอยตามคำสอนของนักปรัชญาที่ชื่อว่า "เทลิซา ผู้บอกเล่าเรื่องราว"\n\n$anomaly.4166.base.desc$"
 anomaly.4166.found.desc:0 "ดูเหมือนว่าเอกสารที่เราพบฝังอยู่ในสมรภูมิจะเป็นคำสอนเพิ่มเติมที่เขียนโดย "เทลิซา ผู้บอกเล่าเรื่องราว"\n\n$anomaly.4166.base.desc$"
 anomaly.4166.base.desc:0 "เอกสารดังกล่าวเป็นการแจกแจงรายละเอียดของยุทธวิธี ยุทธศาสตร์ และที่สำคัญที่สุดคือการขนส่งทางทหาร(วิทยาศาสตร)ในสงครามระหว่างดวงดาว แม้จะเป็นตัวแทนผู้ต่อต้านสงครามอย่างแข็งขัน แต่เทลิซาก็ยังพบว่าสิ่งนี้เป็นความรู้ที่จำเป็นสำหรับการก้าวไปสู่อนาคต \"แม้กระทั่งผู้ที่รักสงบที่สุดก็อาจถูกบีบให้จนตรอกในการทำงานเพื่อโลกที่ดีกว่า\""
 anomaly.4166.a:0 "ดูเหมือนว่าแม้แต่นักปราชญ์ก็ต้องจับศึกเหมือนกัน"
 anomaly.4166.a.tooltip:0 "สามารถใช้ประกาศคำสั่ง §Y$edict_masters_writings_war$§! ได้"
 anomaly.4170.name:0 "ทรัพยากรระเหยง่าย"
 anomaly.4170.start.desc:0 "การสแกน [From.GetPlanetMoon] เผยให้เห็นแหล่งสะสมหนาแน่นของแก๊สธรรมชาติใต้พื้นผิว ทรัพยากรอันอุดมสมบูรณ์นี้มีประสิทธิภาพทางพลังงานสูงมาก และจะช่วยเพิ่มผลผลิตพลังงานบนพื้นผิวของเราได้อย่างมาก"
 anomaly.4170.basic.desc:0 "$anomaly.4170.start.desc$\n\nอย่างไรก็ตาม การใช้ทรัพยากรเหล่านี้จะทำให้มันหมดไปอย่างรวดเร็ว เนื่องจากแหล่งสะสมมีจำนวนน้อยและขนาดเล็ก"
 anomaly.4170.material.desc:0 "$anomaly.4170.start.desc$\n\nผลประโยชน์ที่อาจได้รับนั้นมีค่ามากกว่าความเสียหายใดๆ ที่อาจเกิดขึ้นกับสภาพแวดล้อมอย่างมหาศาล"
 anomaly.4170.a:0 "เตรียมตัวเริ่มขุดเจาะเจาะได้เลย!"
 anomaly.4170.a.tooltip:1 "เพิ่ม§Yการ ทิ้ง ก๊าซ ที่ อุดม สมบูรณ์§!แก้ไขโครงการหลัก...[From.GetName]:\n£energy£ §G+50%§!"
 anomaly.4170.b:0 "การแสวงหาประโยชน์จากดาวเคราะห์ไม่ใช่หนทางแก้ปัญหาระยะยาว"
 anomaly.4170.b.tooltip:1 "เพิ่ม§Yการ ทํา เหมือง ก๊าซ§!แก้ไขโครงการหลัก...[From.GetName]:\n£energy£ §G+5§!"
 anomaly.4172.conqueror.desc:0 "อาณานิคมที่เรายึดครองเคยมีทรัพยากรแก๊สที่อุดมสมบูรณ์ใต้พื้นผิว บัดนี้มันเหือดแห้งไปแล้ว ส่งผลให้ผลผลิตพลังงานของอุตสาหกรรมของเราลดลง"
 anomaly.4172.owner.desc:0 "แก๊สที่อุดมด้วยพลังงานซึ่งพบในหนึ่งในอาณานิคมของเราได้เหือดแห้งลงแล้ว ผลผลิตทรัพยากรส่วนเกินสูญเสียไป ทำให้ความจำเป็นในการหาแหล่งสะสมใหม่มาทดแทนเพิ่มสูงขึ้นอย่างมาก"

 ####################################
 # Anomaly Failure Events
 ####################################
 anomaly_failure.4000.desc:0 "[Root.GetLeaderName] ได้ทำการค้นพบที่น่าสะพรึงกลัว พืชพรรณบน [From.From.GetName] มีความเป็นอันตรายต่อสิ่งมีชีวิตที่ไม่ใช่พืชอย่างยิ่ง เราไม่เข้าใจอย่างถ่องแท้ว่าอะไรเป็นสาเหตุ เรารู้เพียงว่าพื้นที่ขนาดใหญ่ของ [From.From.GetPlanetMoon] เป็นอันตรายถึงชีวิต และสิ่งนี้จะจำกัดการเจริญเติบโตของนิคมที่มีศักยภาพในอนาคต"
 anomaly_failure.4000.a:0 "สถานที่แห่งนี้ช่างน่ากลัวจริงๆ"
 anomaly_failure.4000.a.tooltip:1 "เจ้าหน้าที่วิทยาศาสตร์[Root.GetLeaderName]ได้รับ§R$leader_trait_paranoid$§!ทริท\n\nเพิ่ม§Yลวดลายรอยแยกแอสทรัล§!แก้ไขโครงการหลัก...[From.From.GetName]:\n£blocker£นก กระจอก§R+3§!\n£society£ §G+6§!"
 anomaly_failure.4005.desc:0 "น่าเสียดายที่ทีมงานของเราไม่สามารถสรุปข้อมูลที่น่าสนใจใดๆ จากดาวเคราะห์น้อยดวงนี้ได้ตามที่คาดไว้ในตอนแรก นอกเหนือจากแร่ธาตุทั่วไปบางชนิด"
 anomaly_failure.4005.a.tooltip:1 "เพิ่มทรัพยากรไปยัง[From.From.GetName]:\n£minerals£ §G+1§!"
 anomaly_failure.4010.desc:0 "เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] รายงานว่าหลังจากการตรวจสอบและสแกนดาว [From.From.GetPlanetMoon] อย่างกว้างขวาง ไม่พบสิ่งใดที่น่าสนใจเลย"
 anomaly_failure.4011.desc:0 "หลังจากการค้นหายานและการตรวจสอบซากศพของลูกเรือ เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] ได้ข้อสรุปว่าสมาชิกลูกเรือน่าจะเข่นฆ่ากันเอง ความโดดเดี่ยวและการจำกัดพื้นที่ของการเดินทางในอวกาศสามารถทำลายแม้กระทั่งจิตใจที่แข็งแกร่งที่สุดได้"
 anomaly_failure.4012.desc:0 "เราได้รับสัญญาณขอความช่วยเหลือจาก [Root.GetName] ลูกเรือกำลังเสียสติและเข่นฆ่ากันเอง! กัปตันสูญเสียการควบคุมโดยสิ้นเชิง การส่งความช่วยเหลือไปในจุดนี้คงเปล่าประโยชน์ มันเกี่ยวข้องกับยานร้างลำนั้นที่พวกเขาเพิ่งตรวจสอบไปเมื่อเร็วๆ นี้หรือเปล่านะ?"
 anomaly_failure.4012.a.tooltip:0 "เดอะ§Y[Root.GetName]§!ถูกทําลาย"
 anomaly_failure.4015.desc:0 "ลูกเรือของ [Root.GetName] รายงานว่าพวกเขาไม่พบสิ่งใดที่น่าสนใจเลย"
 anomaly_failure.4025.desc:0 "ทีมวิทยาศาสตร์ของ [Root.GetName] รายงานว่าพวกเขาไม่พบข้อมูลที่น่าสนใจอย่างที่คาดหวังไว้ตอนแรกว่า [From.From.GetName] จะมีอยู่"
 anomaly_failure.4030.desc:0 "หลังจากตรวจค้นทั่วทะเลทรายแล้ว เราไม่พบสิ่งใดที่มีค่าเลย!"
 anomaly_failure.4031.desc:0 "เราไม่สามารถยับยั้ง AI กองยานบน [From.From.GetName] ได้ ยานโบราณของพวกมันกำลังทะยานขึ้นสู่ท้องฟ้าและห้วงอวกาศอันไกลโพ้นเพื่อมองหาการต่อสู้ครั้งต่อไปตามพารามิเตอร์ที่ตั้งโปรแกรมไว้"
 anomaly_failure.4031.a:0 "ความพิโรธของจักรกลเป็นสิ่งที่น่าหวาดเกรง"
 anomaly_failure.4035.desc:0 "เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] รายงานว่าการอ่านค่ารังสีที่พวกเขาต้องการตรวจสอบอย่างมากนั้นเป็นผลมาจากความผิดปกติของเครื่องมือวัดที่เกิดขึ้นได้ยาก ตอนนี้ได้รับการแก้ไขเรียบร้อยแล้ว"
 anomaly_failure.4037.desc:0 "ผลการอ่านค่ารังสีระบุว่านี่ไม่ใช่ระบบสุริยะที่เรากำลังมองหา"
 anomaly_failure.4037.a:0 "เราจำเป็นต้องค้นหาต่อไป"
 anomaly_failure.4045.desc:0 "เราไม่สามารถระบุได้เลยว่าค่าที่แผ่วเบาบน [From.From.GetName] เหล่านั้นคืออะไร ทีมงานรู้สึกหงุดหงิดและสัญญาว่าจะปรับปรุงประสิทธิภาพให้ดีขึ้น"
 anomaly_failure.4055.desc:0 "[Root.GetName] รายงานว่าพวกเขาไม่สามารถค้นหาสิ่งใดเพื่อยืนยันเบาะแสที่ตรวจพบได้ เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] รู้สึกไม่สบายใจและขออภัยสำหรับข้อผิดพลาดนี้"
 anomaly_failure.4055.a:0 "อย่ากังวลไปเลย [Root.GetLeaderName]"
 anomaly_failure.4055.b:0 "อย่าทำผิดพลาดอีกก็พอ"
 anomaly_failure.4060.desc:0 "หลังจากการตรวจสอบอย่างใกล้ชิด เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] พบเพียงเศษซากอวกาศสุ่มที่โคจรรอบดาวฤกษ์ มันน่าจะมีต้นกำเนิดมาจากแถบดาวเคราะห์น้อยที่อยู่ใกล้เคียง"
 anomaly_failure.4066.desc:0 "เราไม่สามารถหยุดเครื่องขุดเจาะที่กำลังคลุ้มคลั่งได้ทันเวลา มันขุดเจาะลึกเกินไปและในที่สุดก็ถูกบดขยี้ภายใต้การพังทลายของหินที่ตัวมันเองสร้างขึ้นมา"
 anomaly_failure.4070.desc:0 "เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] รายงานว่า [From.From.GetPlanetMoon] [From.From.GetName] เป็นไปตามรูปแบบที่คาดไว้ของ [From.From.GetPlanetMoon] เขตร้อน สิ่งผิดปกติที่ตรวจพบลวงตานั้นไม่มีอยู่จริง"
 anomaly_failure.4071.desc:0 "ที่น่ากังวลคือเราพบว่า [From.From.GetName] มีความรุนแรงอย่างมาก ทั้งที่การสแกนเบื้องต้นของเราไม่ได้บ่งชี้เช่นนั้นเลย ผู้ที่จะเข้ามาตั้งถิ่นฐานในอนาคตจะต้องเผชิญกับสภาพอากาศที่เลวร้ายอย่างสภาพอากาศอันตราย อุณหภูมิที่สูง รวมถึงพืชพรรณและสัตว์ป่าที่เป็นพิษ"
 anomaly_failure.4075.desc:0 "สภาพภูมิอากาศที่เลวร้ายส่งผลกระทบอย่างรุนแรง และทีมวิทยาศาสตร์ของเราไม่สามารถเปิดเผยข้อมูลใดๆ เกี่ยวกับ [From.From.GetName] นอกเหนือจากที่เราทราบอยู่แล้วได้"
 anomaly_failure.4080.desc:0 "ดาว [From.From.GetPlanetMoon] ดูเหมือนจะน่าสนใจน้อยกว่าที่เราคาดไว้ ค่าที่อ่านได้ว่าเคยมีแหล่งตั้งถิ่นฐานก่อนหน้านี้ปรากฏว่าเกิดจากการเรียงตัวของแร่ธาตุที่มีความสมมาตรอย่างแปลกประหลาด"
 anomaly_failure.4081.desc:0 "ข่าวร้ายจากโครงการซ่อมแซมบน [From.From.From.GetName] คนงานก่อสร้างไม่สามารถซ่อมแซมเครื่องจักรที่เสียหายได้ เนื่องจากมันเริ่มชำรุดทรุดโทรมลงไปอีกและดูเหมือนจะยากเกินเยียวยา"
 anomaly_failure.4086.desc:0 "น่าเสียดายที่เราไม่สามารถช่วยชีวิตยานอวกาศที่ลอยเคว้งคว้างใกล้ [From.From.From.GetName] ได้ทันการ ดาวเคราะห์น้อยที่ไม่มีในสารบบพุ่งเข้าชนและทำลายยานจนแหลกเป็นชิ้นเล็กชิ้นน้อย"
 anomaly_failure.4086.military:0 "สินค้าในระวางมีความสำคัญมากกว่า"
 anomaly_failure.4090.desc:0 "เราสูญเสียสัญญาณไปแล้ว มันดูเหมือนจะมาจากยานอวกาศลำหนึ่ง ทว่าจู่ๆ มันก็อันตรธานหายไปเลย มันอาจจะทำการข้ามทางไกลความเร็วหรืออาจเกิดสิ่งเลวร้ายกว่านั้นขึ้นกับมัน"
 anomaly_failure.4090.a:0 "การติดต่อครั้งใหม่ที่เลือนหายไปในห้วงอวกาศ"
 anomaly_failure.4090.b:0 "ดีแล้ว ผลประโยชน์ของพวกต่างดาวไม่ใช่เรื่องที่เราต้องไปใส่ใจ"
 anomaly_failure.4116.desc:0 "สัญญาณวิทยุสุดท้ายที่ได้รับจากยานอวกาศที่เต็มไปด้วยอสุรกาย มันบอกเราว่าสัตว์ร้ายทำลายการป้องกันและเข้าถึงห้องหลบซ่อนของลูกเรือได้สำเร็จ\n\nการเผชิญหน้าอันน่าสยดสยองนี้โหดร้ายเกินกว่าจะพรรณนาได้ ไม่มีผู้ใดรอดชีวิต"
 anomaly_failure.4116.a:0 "พวกเราทำให้พวกเขาผิดหวัง..."
 anomaly_failure.4116.a.tooltip:0 "เดอะ§Yยานวิทยาศาสตร์§!ถูกทําลาย"
 anomaly_failure.4136.desc:0 "น่าเสียดายที่นักภาษาศาสตร์ของเราไม่สามารถทำความเข้าใจภาษาต่างดาวทั้งหมดที่ใช้ในเอกสารเก่าที่พบใน [From.From.From.GetName] ได้ อย่างไรก็ตาม พวกเขาสามารถแปลส่วนสำคัญได้สำเร็จ ซึ่งช่วยให้เราเข้าใจวัฒนธรรมที่เป็นต้นกำเนิดของพวกเขาได้บางส่วน"
 anomaly_failure.4156.desc:0 "การต่อสู้กับสัตว์ร้ายรอบๆ ห้องนิรภัยใต้ดินบน [WarriorHomePlanet.GetName] ส่งผลให้พื้นที่ซับซ้อนแห่งนี้พังทลายลง เราไม่สามารถกู้คืนสิ่งของมีค่าใดๆ จากซากปรักหักพังได้"
 anomaly_failure.4157.base:0 "การเปิดภาชนะที่เราพบเจอใน [WarriorHomePlanet.GetName] เผยให้เห็นตัวอย่างพืชผลที่สมบูรณ์แข็งแรง ตลอดจนเครื่องมือที่จะช่วยให้พืชพรรณเหล่านั้นเติบโตได้อีกครั้งในสภาพดินที่ไม่เอื้ออำนวย"
 anomaly_failure.4157.desc:0 "$anomaly_failure.4157.base$ เราสามารถทำวิศวกรรมย้อนรอยสิ่งนี้ได้"
 anomaly_failure.4157.maxed.desc:0 "$anomaly_failure.4157.base$.\n\nแม้ว่าจะไม่มีประโยชน์กับเราเท่าใดนัก แต่ก็มีข้อมูลเกี่ยวกับวัฒนธรรมและประวัติศาสตร์ของอารยธรรมนั้นด้วย ซึ่งช่วยให้เราเข้าใจตัวตนของพวกเขาได้ลึกซึ้งยิ่งขึ้น"
 anomaly_failure.4158.desc:0 "หลังจากเปิดภาชนะที่เราพบบน [WarriorHomePlanet.GetName] เราต้องตกใจเมื่อพบว่ามันคือเครื่องปล่อยอาวุธชีวภาพ!\n\nอาวุธชีวภาพนี้ถูกสร้างขึ้นเพื่อมุ่งเป้าทำลายการทำงานของระบบสืบพันธุ์และแพร่กระจายอย่างรวดเร็ว อย่างไรก็ตาม มันเข้ากันไม่ได้ทั้งหมดกับดีเอ็นเอของเรา และจะไม่ส่งผลให้จำนวนประชากรของเราลดลง"
 anomaly_failure.4158.a.tooltip:0 "§Yจักรวรรดิของคุณ§!ได้รับ§Rความผิดปกติของสิ่งมีชีวิต§!เปลี่ยนแปลง"
 anomaly_failure.4170.base.desc:0 "โรงงานขุดเจาะแก๊สบน [From.GetName] ได้กลายเป็นทะเลเพลิง รายงานระบุว่าแก๊สที่ระเหยง่ายมากได้สัมผัสกับเปลวไฟที่เปิดอยู่ ส่งผลให้โรงงานหลายแห่งระเบิด! สิ่งนี้ทำให้เกิดปฏิกิริยาลูกโซ่และระเบิดแหล่งเก็บแก๊สส่วนใหญ่ที่เราได้ระบุตำแหน่งไว้"
 anomaly_failure.4170.individ.desc:0 "$anomaly_failure.4170.base.desc$\n\nความล้มเหลวร้ายแรงเช่นนี้จะต้องไม่เกิดขึ้นซ้ำอีก"
 anomaly_failure.4170.basic.desc:0 "$anomaly_failure.4170.base.desc$\n\nผู้คนที่เสียชีวิตในเหตุระเบิดจะไม่ถูกลืมเลือน"
 anomaly_failure.4170.base.tooltip:0 "ลบตัวแปร§Y§!\"ไรช์แก๊สเหมือง\"§!จาก[From.GetName]"
 anomaly_failure.4170.a.tooltip:0 "$anomaly_failure.4170.base.tooltip$."
 anomaly_failure.4170.b.tooltip:0 "$anomaly_failure.4170.base.tooltip$และฆ่า§R100§! £pop£ §Hป๊อป§!."
 anomaly_failure.4170.c.tooltip:0 "$anomaly_failure.4170.base.tooltip$และฆ่า§R200§! £pop£ §Hป๊อป§!."
 anomaly_failure.4170.d.tooltip:0 "$anomaly_failure.4170.base.tooltip$และฆ่า§R300§! £pop£ §Hป๊อป§!."

