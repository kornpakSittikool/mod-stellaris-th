 colony.2017.desc:0 "คนกลุ่มที่สองได้หายตัวไปหลังจากทำงานที่โรงงานประหลาด! โชคดีที่คนงานคนหนึ่งสามารถทิ้งการบันทึกวิดีโอไว้เบื้องหลัง เผยให้เห็นว่ามีกับดักที่คอยจับกุมคนงานที่ไม่ทันระวังตัว\n\nกับดักได้รับการปิดใช้งานแล้วและเราน่าจะสามารถใช้โรงงานได้โดยไม่มีปัญหาเพิ่มเติม อย่างไรก็ตาม ประชาชนทั่วไปไม่ค่อยพอใจเกี่ยวกับกับดักมรณะนี้เท่าใดนัก ไม่ว่าเราจะอธิบายอย่างไรก็ตาม"
