 colony.2001.name:0 "ปัญหาในแดนสวรรค์"
 colony.2001.desc:0 "เรื่องวุ่นวายทางการเมืองในท้องถิ่นบน [Root.GetName] ส่งผลให้มีเสียงสนับสนุนเพิ่มขึ้นในกลุ่มกบฏกลุ่มเล็กๆ ซึ่งต่อต้านจริยธรรมพื้นฐานของเรา เสียงสนับสนุนที่เพิ่มขึ้นนี้ทำให้พวกเขาสามารถกุมอำนาจในภูมิภาคได้มากขึ้น และลงคะแนนเสียงเพื่อผลประโยชน์ของตนเองโดยมีความสำเร็จที่จำกัด"
 colony.2001.a:0 "พวกเราแตกแยกกัน"
 colony.2001.a.military.tooltip:1 "§Y300§! £pop£ §Hป๊อป§!บน[Root.GetName]เปลี่ยนหนึ่งขั้นใกล้§Yมิลลิตาริส§!."
 colony.2001.a.pacifist.tooltip:1 "§Y300§! £pop£ §Hป๊อป§!บน[Root.GetName]เปลี่ยนหนึ่งขั้นใกล้§Yกลุ่ม ศาสนา§!."
 colony.2001.b:0 "ปราบปรามกลุ่มต่อต้าน!"
 colony.2001.b.military.tooltip:0 "§Y100§! £pop£ §Hป๊อป§!บน[Root.GetName]เปลี่ยนหนึ่งขั้นใกล้§Yมิลลิตาริส§!.$colony.2001.b.tooltip$"
 colony.2001.b.pacifism.tooltip:0 "§Y100§! £pop£ §Hป๊อป§!บน[Root.GetName]เปลี่ยนหนึ่งขั้นใกล้§Yกลุ่ม ศาสนา§!.$colony.2001.b.tooltip$"
 colony.2001.b.tooltip:1 "\n\nเพิ่ม§R$suppressed_opposition$§!แก้ไขโครงการหลัก...[Root.GetName]ด้วยผลต่อไปนี้:\n£happiness£ความสุข§R-15%§!"
 colony.2005.name:0 "จากใต้ผืนคลื่น"
 colony.2005.desc:0 "ผู้ตั้งอาณานิคมบน [Root.GetName] ทำการสำรวจดาวเคราะห์เป็นประจำด้วยความหวังที่จะค้นพบทรัพยากรเพิ่มเติมเพื่อช่วยในการดำเนินชีวิตประจำวัน การเดินทางสำรวจขั้วโลกเหนือเมื่อเร็วๆ นี้ได้เปิดเผยวัตถุขนาดใหญ่ที่อยู่ก้นมหาสมุทร: ยานลาดตระเวนประจัญบานของต่างดาว(เรือรบ)\n\nแรงกดดันของทะเลลึกจะเป็นสิ่งท้าทายอย่างมาก แต่เรามีความเป็นไปได้ที่จะเข้าถึงยานลำนี้"
 colony.2005.a:0 "พยายามกู้ซากมันขึ้นมา"
 colony.2005.b:0 "แยกชิ้นส่วนมันเพื่อเรียนรู้ความลับของมัน"
 colony.2006.desc:0 "ภารกิจกู้ซากบน [Root.GetName] ประสบความสำเร็จอย่างงดงาม! ยานลาดตระเวนโบราณที่นอนอยู่ก้นมหาสมุทรได้รับการนำขึ้นสู่ผิวน้ำและซ่อมแซมเรียบร้อยแล้ว มันเป็นภาพที่น่าทึ่งมาก และจากการซ่อมแซมมัน วิศวกรของเราได้เรียนรู้ความลับบางประการเบื้องหลังการออกแบบของมัน"
 colony.2006.a.material:0 "ความพยายามของเราช่วยปูทางไปสู่อนาคต!"
 colony.2006.a.phile:0 "วันประวัติศาสตร์!"
 colony.2006.a.tooltip:0 "§Yจักรวรรดิของคุณ§!ได้รับ§G$streamlined_ship_design$§!เปลี่ยนแปลง\n\nเพิ่มข้อมูล§Yตัวหมุน§!- เรือชั้นกลาง"
 colony.2007.desc:0 "ความพยายามในการกู้ซากยานยักษ์ที่พบในน่านน้ำของ [Root.GetName] ช่วยให้เราเข้าใจการออกแบบของตัวยานบางประการ อัลกอริทึมการหลบหลีกของยานสามารถนำมาถ่ายโอนไปยังฮาร์ดแวร์ของเราเองได้อย่างง่ายดาย ช่วยให้กองยานของเราว่องไวขึ้นและประหยัดพลังงานมากขึ้น\n\nน่าเสียดายที่ตัวยานเองชำรุดเกินกว่าจะซ่อมแซมได้ แต่ตัวถังของมันจะช่วยจัดหาวัสดุจำนวนมากให้แก่เราเพื่อทดแทนในจุดนั้น"
 colony.2007.a.phobe:0 "ไม่มีวันมียานของต่างดาวลำใดก้าวล้ำเกินยานของเราได้อยู่แล้ว!"
 colony.2007.a.phile:0 "ของขวัญใดๆ จากบุตรแห่งจักรวาลล้วนมีค่าทั้งสิ้น!"
 colony.2007.a:0 "§Yจักรวรรดิของคุณ§!ได้รับ§G$streamlined_ship_design$§!เปลี่ยนแปลง\n\n"
 colony.2008.desc:0 "เสียงระเบิดดังสนั่นไปไกลหลายไมล์ เมื่อปฏิบัติการกู้ซากยานลาดตระเวนใต้บาดาลจบลงด้วยภัยพิบัติ ประชากรบน [Root.GetName] ปลอดภัยดี ทว่าบางส่วนของพื้นที่ตั้งถิ่นฐานได้รับความเสียหาย\n\nตัวยานเองเสียหายเกินกว่าจะซ่อมแซมได้ โดยถูกฉีกกระจายออกเป็นชิ้นๆ จากการระเบิด โชคดีที่ยังสามารถกู้คืนชิ้นส่วนโครงสร้างที่กระจัดกระจายอยู่ได้จำนวนมาก"
 colony.2008.a.tooltip:0 "A£building£ตึกบน[Root.GetName]คือ§Rเสีย§!.\n\n"
 colony.2010.name:0 "การเปลี่ยนใจ"
 colony.2010.desc.spirit:0 "ขณะเราหยั่งรากลึกลงบน [Root.GetName] บุคคลบางกลุ่มเริ่มหลงทางออกนอกวิถีหลักของเรา แม้เป็นสิ่งที่คาดคิดไว้แล้ว แต่พวกเขาก็มีผู้สนับสนุน กลุ่มกบฏรู้สึกว่าทัศนะทางจิตวิญญาณเกี่ยวกับจักรวาลของเราไม่ได้ช่วยให้เราก้าวหน้าเร็วพอ และมั่นใจว่ามุมมองทางวัตถุนิยมต่อห้วงอวกาศคือคำตอบ"
 colony.2010.desc.material:0 "เมื่อการขยายตัวของเราบน [Root.GetName] มีความเสถียร บุคคลบางกลุ่มเริ่มหันเหออกจากมุมมองต่อโลกของเรา กลุ่มจิตนิยม(วิญญาณ)เริ่มโฆษณาชวนเชื่ออย่างสงบเพื่อต่อต้านรัฐบาลของเรา พวกเขามองว่าทัศนะทางวัตถุนิยมต่อจักรวาลของเรากำลังจำกัดเราและทำให้เราห่างไกลจากจิตวิญญาณ"
 colony.2010.a.spirit:0 "ปล่อยให้พวกเขาเป็นไปตามแนวทางของตัวเอง"
 colony.2010.a.spirit.tooltip:2 "ทั้งหมด£pop£ §Hป๊อป นัก วัตถุ§!บน[Root.GetName]ได้§Y$opinion_respected$§!ปรับใช้กับลูกเล่นต่อไปนี้:\n£happiness£ความสุข§G+25%§!20 ปี§Y$materialist_attraction$§!เพิ่มตัวแปรด้วยลูกเล่นต่อไปนี้:\nความ ประทับ ใจ ทาง ด้าน วัตถุ§G+100%§!เป็นเวลา 20 ปี"
 colony.2010.a.material:0 "พวกเขาไม่ได้เป็นภัยคุกคามต่อความมุ่งมั่นของเรา"
 colony.2010.a.material.tooltip:2 "ทั้งหมด£pop£ §Hป๊อป นัก ศาสนา§!บน[Root.GetName]ได้§Y$opinion_respected$§!ปรับใช้กับลูกเล่นต่อไปนี้:\n£happiness£ความสุข§G+25%§!20 ปี\n\n§Y$spiritualist_attraction$§!เพิ่มตัวแปรด้วยลูกเล่นต่อไปนี้:\nการ ดึงดูด ความ สนใจ ทาง ฝ่าย วิญญาณ§G+100%§!20 ปี"
 colony.2010.b:0 "ติดสินบนบรรดาผู้นำของพวกเขา"
 colony.2010.b.tooltip:0 "ไม่£pop£ §Hป๊อป§!เปลี่ยนเป็นคุณธรรมใหม่\n\n"
 colony.2010.c.material:0 "เผยแพร่โฆษณาชวนเชื่อเพื่อต่อต้านพวกเขา"
 colony.2010.c.material.tooltip:2 "จะพยายามยับยั้ง£pop£ §Hป๊อป นัก ศาสนา§!บน[Root.GetName]และส่งเสริม§Yลัทธิ วัตถุ นิยม§!."
 colony.2010.c.spirit:0 "ให้ผู้นำทางจิตวิญญาณช่วยปรับเปลี่ยนทัศนะของพวกเขาใหม่"
 colony.2010.c.spirit.tooltip:2 "จะพยายามยับยั้ง£pop£ §Hป๊อป นัก วัตถุ§!บน[Root.GetName]และส่งเสริม§Yลัทธิ วิญญาณ นิยม§!."
 colony.2011.desc.base:0 "ความพยายามของเราในการชี้นำประชากรส่วนที่มีแนวโน้มจะต่อต้านอุดมการณ์หลักของเรานั้นประสบความสำเร็จในที่สุด"
 colony.2011.desc.spirit:1 "ขอบคุณความพยายามอย่างไม่รู้จักเหน็ดเหนื่อยของผู้นำทางจิตวิญญาณของเรา ในที่สุดเราก็สามารถเปลี่ยนกระแสได้ และนำพาผู้ไร้ศรัทธาเข้าร่วมกลุ่มมากขึ้นเรื่อยๆ ไม่เพียงแต่นักวัตถุนิยมเท่านั้น แต่ผู้คนจากความเชื่ออื่นๆ ก็ได้เห็นแสงสว่างและสลัดความเชื่อเก่าๆ ทิ้งไป ขอสวดภาวนาให้พวกเขาไม่หลงทางออกจากเส้นทางที่ถูกต้องนี้อีกเลย"
 colony.2011.desc.material:1 "$colony.2011.desc.base$ เครื่องจักรโฆษณาชวนเชื่อของเราทำงานได้ดีตามที่สัญญาไว้ ไม่เพียงแต่นักจิตนิยมเท่านั้น แต่ผู้คนจากความเชื่ออื่นๆ ก็เริ่มเข้าใจเหตุผลและโยนความหลงผิดในอดีตทิ้งไปเพื่อยอมรับวัตถุนิยม"
 colony.2011.a.spirit.tooltip:2 "§Y$spiritualist_attraction$§!เพิ่มตัวแปรด้วยลูกเล่นต่อไปนี้:\nการ ดึงดูด ความ สนใจ ทาง ฝ่าย วิญญาณ§G+100%§!20 ปี"
 colony.2011.a.material.tooltip:2 "§Y$materialist_attraction$§!เพิ่มตัวแปรด้วยลูกเล่นต่อไปนี้:\nความ ประทับ ใจ ทาง ด้าน วัตถุ§G+100%§!20 ปี"
 colony.2012.desc:1 "ความพยายามของเราในการเปลี่ยนใจผู้คนบน [Root.GetName] ส่งผลสะท้อนกลับอย่างโหดร้าย ด้วยการรวมตัวกันต่อต้านความพยายามปราบปรามของเรา พวกเขาจึงได้รับผู้ติดตามเพิ่มขึ้น ทำให้แข็งแกร่งกว่าที่เคยเป็นมา"
 colony.2012.a.spirit.tooltip:1 "นักวัตถุนิยมทั้งหมดประชากรบน[Root.GetName]ได้§R$opinion_disrespected$§!ปรับใช้กับลูกเล่นต่อไปนี้:\n£happiness£ความสุข§R-40%§!\n\n§Y$materialist_attraction$§!เพิ่มตัวแปรด้วยลูกเล่นต่อไปนี้:\nความ ประทับ ใจ ทาง ด้าน วัตถุ§G+100%§!20 ปี"
 colony.2012.a.material.tooltip:2 "ศาสนา คริสเตียนประชากรบน[Root.GetName]ได้§R$opinion_disrespected$§!ปรับใช้กับลูกเล่นต่อไปนี้:\n£happiness£ความสุข§R-40%§!\n\n§Y$spiritualist_attraction$§!เพิ่มตัวแปรด้วยลูกเล่นต่อไปนี้:\nการ ดึงดูด ความ สนใจ ทาง ฝ่าย วิญญาณ§G+100%§!20 ปี"
 colony.2015.name:0 "เหตุแปลกๆ"
 colony.2015.desc:0 "กลุ่มนักสืบสวนได้ค้นพบโรงงานที่ซ่อนอยู่บน [Root.GetName] ตัวอาคารและสภาพที่ทรุดโทรมบ่งบอกถึงอารยธรรมเก่าแก่ที่เชี่ยวชาญในการก่อสร้างสิ่งของที่ทนทานต่อกาลเวลา\n\nประชากรของเราจะสามารถใช้โรงงานนี้เพื่อเพิ่มผลผลิตการผลิตของอาณานิคมได้อย่างง่ายดาย"
 colony.2015.a.tooltip:0 "ขนาด§S£building£แฟคทอรี ที่แปลก§!ปรากฎอยู่บนผิวของ[Root.GetName]."
 colony.2016.desc:0 "ลูกเรือที่เรามอบหมายให้ทำงานในโรงงานประหลาดบน [Root.GetName] หายตัวไปแล้ว! เราสามารถส่งแรงงานกลุ่มใหม่เข้าไปแทนที่ หรือเราสามารถรื้อทำลายสิ่งอำนวยความสะดวกนี้ให้ราบคาบ เพื่อให้แน่ใจว่าจะไม่เกิดเหตุการณ์เช่นนี้อีก"
 colony.2016.a:0 "มันยังคงตรงกับความต้องการของเรา"
