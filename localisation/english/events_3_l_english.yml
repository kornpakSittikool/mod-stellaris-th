 colony.2025.desc:0 "การมีเผ่าพันธุ์อื่นมาอาศัยอยู่ร่วมกับผู้คนของเราได้สร้างความขัดแย้งบางประการบน [Root.GetName] ไม่ว่าจะเป็นความแตกต่างทางวัฒนธรรม ความเกลียดชังคนต่างถิ่น หรือความเข้าใจผิดทั่วไป ก็ไม่อาจบอกได้ชัด แต่สิ่งที่เป็นจริงคือเหตุการณ์เล็กๆ เหล่านี้อาจแย่ลงได้หากเราไม่เข้าไปแทรกแซง"
 colony.2025.phobe.desc:0 "พวกต่างดาว(เสียงเชียร์)ที่มาอาศัยอยู่ท่ามกลางพวกเราเริ่มสร้างความขัดแย้งบน [Root.GetName] ผู้คนของเราเองต่างโกรธเกรี้ยว ส่งผลให้เกิดการทะเลาะวิวาทเพิ่มขึ้นในแต่ละวัน หากพวกเราอยู่เฉยๆ พวกต่างดาวอาจต้องสูญเสียมากกว่าแค่เลือดเนื้อ"
 colony.2025.phile.desc:0 "การมีเผ่าพันธุ์ของเราเองอาศัยอยู่ร่วมกับสิ่งมีชีวิตรูปแบบอื่นไม่ใช่เรื่องง่ายเสมอไป ความขัดแย้งเริ่มก่อตัวขึ้นบน [Root.GetName] แน่นอนว่าเกิดจากความล้มเหลวของเราในการผนวกรวมเอเลี่ยนเข้ากับสังคมของเราอย่างเหมาะสม หากไม่มีการดำเนินการใดๆ พวกเขาอาจตกอยู่ในอันตรายได้"
