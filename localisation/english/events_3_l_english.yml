 colony.2036.c.badguy:0 "ประหารชีวิตประชากรที่ติดเชื้ออีกครั้ง"
 colony.2040.desc:0 "[Root.GetName] กำลังถูกโรคระบาดครอบงำอย่างรวดเร็ว เราจำเป็นต้องดำเนินการด่วนและส่งประชากรไปยังสถานีวิจัยฉุกเฉิน หวังว่าเราจะพบหนทางการรักษา หากพวกเขายังมีชีวิตรอดอยู่ได้จนกว่าเราจะพบสาเหตุหลักของโรค"
 colony.2046.desc:0 "โรคระบาดที่สร้างความเสียหายบน [Root.GetName] ได้คร่าชีวิตเหยื่อรายแรกไปแล้ว เราจำเป็นต้องตรวจสอบให้แน่ใจว่าคลินิกฉุกเฉินมีกลุ่มทดสอบเพื่อทำการศึกษา เพื่อเพิ่มความเป็นไปได้ในการรักษาโรคนี้"
 colony.2046.a:0 "แจ้งเตือนฉันหากมีผู้เสียชีวิตเพิ่มขึ้นอีก"
 colony.2046.b:0 "ไม่ต้องแจ้งฉัน"
 colony.2047.desc:0 "มีประชากรกลุ่มที่ติดเชื้อเสียชีวิตลงเพิ่มอีกบน [Root.GetName] จากโรคร้ายนี้"
 colony.2041.desc:1 "คลินิกฉุกเฉินบน [Root.GetName] ดูเหมือนจะสามารถรักษาอาการป่วยของกลุ่มทดสอบได้สำเร็จ เราควรส่งประชากรเพิ่มเติมไปที่นั่นเพื่อเข้ารับการรักษา"
 colony.2041.b.desc:0 "คลินิกบน [Root.GetName] ได้รวบรวมตัวอย่างสุ่มจากประชากรและสามารถรักษาเชื้อโรคสายพันธุ์ของกลุ่มตัวอย่างหนึ่งได้สำเร็จ เราควรส่งผู้คนไปยังคลินิกเพื่อการรักษาที่รวดเร็วยิ่งขึ้น"
 colony.2042.desc:0 "หลังจากจัดการรักษาสายพันธุ์ต่างๆ ของโรคบน [Root.GetName] ได้สำเร็จ เจ้าหน้าที่วิจัยของเราสามารถสังเคราะห์วัคซีนขึ้นมาได้สำเร็จ ด้วยสิ่งนี้ เราจะสามารถรักษาประชากรทั้งหมดได้อย่างรวดเร็ว และความหวาดกลัวนี้ก็สิ้นสุดลงเสียที!"
 colony.2043.desc:0 "ผู้ติดเชื้อรายสุดท้ายบน [Root.GetName] เสียชีวิตลงหมดแล้ว ปรากฏว่าในจุดนี้โรคร้ายไม่สามารถแพร่ระบาดไปยังผู้รับเชื้อรายใหม่ได้อีกต่อไป"
 colony.2044.desc:0 "[Root.GetName] ว่างเปล่า ประชากรของ [Root.GetPlanetMoon] ถูกกวาดล้างไปจนหมดสิ้น ข่าวดีคือสิ่งนี้น่าจะช่วยกำจัดโรคร้ายนี้ไปด้วย และเราควรจะสามารถส่งประชากรเข้าตั้งถิ่นฐานใหม่ได้"
 colony.2043.a:0 "มหันตภัยร้ายได้สิ้นสุดลงแล้ว"
 colony.2050.name:0 "สูญหายในระบบราชการ"
 colony.2050.desc:0 "เนื่องจากข้อผิดพลาดครั้งใหญ่ในระบบเอกสาร พื้นที่บางส่วนของ[Root.GetName] ล้าหลังในการบำรุงรักษาโครงสร้างพื้นฐานและบริการที่พักอาศัย ผู้คนอาศัยอยู่ในสภาพที่ค่อนข้างอ้างว้างและจะทนไม่ได้นานนัก การแก้ไขปัญหาเหล่านี้จะทำให้เราต้องเสียเวลาและความพยายามอย่างมาก"
 colony.2050.a.tooltip:1 "[Root.GetName]ได้ รับ ประโยชน์ ดัง ต่อ ไป นี้:\n$decrepit_dwellings$ §R+1§!\n$failing_infrastructure$ §R+1§!"
 colony.2050.b:0 "พวกเราต้องลงทุนในพื้นที่แห่งนี้"
 colony.2050.c:0 "พวกเรามีชุมชนที่เข้มแข็ง ช่วยเหลือให้พวกเขาฟื้นตัวกันเถอะ"
 colony.2050.d:0 "ขับไล่ผู้อยู่อาศัยออกไปและรื้อถอนพื้นที่นั้นเสีย"
