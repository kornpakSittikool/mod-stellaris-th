 awareness_low_tt:0 "เนื่องจากขาดหลักฐานของชีวิตระหว่างดวงดาว อารยธรรมนี้ยังเชื่อว่าพวกเขาอาจอยู่เพียงลำพังในจักรวาล"
 awareness_partial_tt:0 "อารยธรรมนี้ตระหนักรู้บางส่วนเกี่ยวกับสิ่งมีชีวิตในกาแล็กซี มีบางสิ่งอยู่ข้างนอกนั่น แต่คืออะไรล่ะ?"
 awareness_high_tt:0 "อารยธรรมนี้ตระหนักรู้ว่ากาแล็กซีเต็มไปด้วยชีวิต แต่สิ่งมีชีวิตเหล่านี้คือใคร และพวกเขาต้องการอะไรกันแน่?"
