 fircon.6000.c:0 "ยอมรับไปว่าเราเป็นผู้รุกรานจากใต้ดิน"

 fircon.6005.name:0 "พิสูจน์ว่าผู้คลางแคลงใจนั้นคิดผิด"
 fircon.6005.desc:0 "ปรากฏว่าพวก [non_believers_country.GetSpeciesNamePlural] ก็ไม่เชื่อเรื่องอวกาศเช่นกัน พวกเขาคิดว่าท้องฟ้าคือโดมแก้วที่เต็มไปด้วยกระจก โดยดวงดาวต่างๆ คือแสงแดดที่สะท้อนจากกระจกเหล่านั้น เช่นเดียวกับเทหวัตถุอื่นๆ\n\nถึงแม้เราจะพาพวกเขามาที่เมืองหลวงของเรา พวกเขาก็คงจะอ้างว่าพวกเขาไม่เคยเดินทางออกไปจากดาวบ้านเกิดเลย หรือพูดอะไรบางอย่างที่ไร้สาระพอๆ กัน"
 fircon.6005.a:0 "มันต้องมีวิธีโน้มน้าวใจพวกเขาบ้างสิ..."

 fircon.6015.name:0 "พิสูจน์ว่าผู้คลางแคลงใจนั้นคิดผิด"
 fircon.6015.desc:0 "มีข่าวทั้งดีและร้ายปนกันจาก [non_believers_planet.GetName]: ถึงแม้พวก [non_believers_country.GetSpeciesNamePlural] จะไม่คิดว่าเราเป็นผู้มาเยือนจากใจกลาง [non_believers_planet.GetPlanetMoon] ของพวกเขาแล้ว แต่ในตอนนี้พวกเขากลับปักใจเชื่อว่าโลกของตนแบน และผู้คนแบบเราอาศัยอยู่ในเมืองลอยฟ้าที่ห้อยย้อยอยู่ใต้เปลือกโลกของ [non_believers_planet.GetName]"

 fircon.6020.name:0 "พิสูจน์ว่าผู้คลางแคลงใจนั้นคิดถูก"
 fircon.6020.desc:0 "พวก [non_believers_country.GetSpeciesNamePlural] ขอบคุณในความซื่อสัตย์ของเรา แน่นอนว่าพวกเขายังไม่สามารถเชื่อใจเราได้อย่างเต็มร้อย เนื่องจากพวกเขายังเชื่อว่าเราคือผู้บุกรุกจากโลกใต้ดินที่กลวงเปล่าของ [non_believers_planet.GetName] แต่ช่างเถอะ อย่างน้อยพวกเขาก็เข้าใจว่าเราไม่ได้ประสงค์ร้ายและกำลังตั้งตารอที่จะร่วมมือกับเรา"

 fircon.6025.name:0 "กองกำลังป้องกันการรุกรานจากใต้ดิน"
 fircon.6025.desc:0 "หลังจากสรุปว่าเราคือผู้อยู่อาศัยลับในโพรงโลกของ [non_believers_planet.GetName] พวก [non_believers_country.GetSpeciesNamePlural] ก็เริ่มกังวลว่าอาจจะมีสิ่งอื่นแฝงตัวอยู่ใต้พื้นผิวของ [non_believers_planet.GetPlanetMoon] อีก กองกำลังทหารได้รับการจัดวางตามถ้ำ รอยเลื่อน และภูเขาไฟ เพื่อเตรียมรับมือกับผู้รุกรานจากใต้ดินอื่นๆ ด้วยกำลังทหาร"
 fircon.6025.a:0 "เล่นตามน้ำไป เสนอการสนับสนุนทางทหารแก่พวกเขา"
 fircon.6025.b:0 "เรื่องนี้มันตลกสิ้นดี"

 fircon.6030.name:0 "การโจมตีอย่างกะทันหัน!"
 fircon.6030.desc:0 "ข่าวเหลือเชื่อจาก [non_believers_planet.GetName]: มีใครบางคนแอบซ่อนอยู่ใต้พื้นดินจริงๆ! กองทัพใต้ดินของสายพันธุ์ที่ไม่รู้จักมาก่อนพากันทะลักออกมาจากถ้ำต่างๆ และโจมตีพวก [non_believers_country.GetSpeciesNamePlural] มันคือการบุกจู่โจมเต็มรูปแบบ!"
 fircon.6030.a:0 "รู้สึกคุ้นเคยอย่างบอกไม่ถูก..."

 fircon.6031.name:0 "บนฟ้าเป็นอย่างไร ใต้พิภพก็เป็นอย่างนั้น"
 fircon.6031.desc:1 "ภายหลังจากสงครามโลกอันโหดร้าย [non_believers_country.GetName] ก็ถูกกวาดล้างจนหมดสิ้นโดยเผ่าพันธุ์ใต้ดินที่อาศัยอยู่ใต้พื้นผิวโลกของ [non_believers_planet.GetName] เผ่าพันธุ์ที่ขึ้นมาครอบครองโลกใหม่นี้รับรู้การมีอยู่ของเรา และโชคดีที่พวกเขาไม่ได้เชื่อว่าเรามาจากใจกลางดาวเคราะห์ของพวกเขาอย่างแน่นอน"
 fircon.6031.a:0 "ในที่สุดก็มีเพื่อนบ้านที่มีเหตุผลเสียที"

 fircon.6032.name:0 "การปะทุอย่างกะทันหัน!"
 fircon.6032.desc.base:0 "พวก [non_believers_country.GetSpeciesNamePlural] คิดถูกแล้วที่หวาดกลัว: แม้ว่ามันจะไม่ได้เป็นบ้านของเผ่าพันธุ์ใต้ดินใดๆ ทว่าแกนโลหะหลอมเหลวของดาวเคราะห์ดวงนี้ก็ได้รับการพิสูจน์แล้วว่าอันตรายมากพอ"
 fircon.6032.desc.troops:0 "การปะทุอย่างกะทันหันของภูเขาไฟที่คิดว่ามอดดับไปแล้วสร้างความเสียหายย่อยยับต่อโครงสร้างพื้นฐานของภูมิภาค อย่างไรก็ตาม ด้วยการมีอยู่ของกองกำลังทหารของเราใกล้กับที่เกิดเหตุ ประชากรที่ได้รับผลกระทบส่วนใหญ่จึงถูกอพยพออกไปได้อย่างปลอดภัย"
 fircon.6032.desc.notroops:0 "การปะทุอย่างกะทันหันของภูเขาไฟที่ดูเหมือนมอดดับไปแล้วได้สร้างความเสียหายรุนแรง และพวก [non_believers_country.GetSpeciesNamePlural] กำลังต้องการความช่วยเหลืออย่างสิ้นหวัง"
 fircon.6032.a:0 "อย่างน้อยพวกเขาก็เชื่อใจเราแล้วในตอนนี้"

 fircon.6033.name:1 "จบแบบจืดชืด"
 fircon.6033.desc:0 "กองกำลังป้องกันการรุกรานจากใต้ดินที่ประจำการอยู่ใกล้ถ้ำและภูเขาไฟที่ใหญ่ที่สุดรายงานว่าไม่มีสิ่งใดๆ โผล่ออกมาจากใต้พื้นผิวโลกเลย นั่นอาจจะเป็นเรื่องที่ดีที่สุดแล้ว ถึงแม้ทหารบางส่วนจะดูผิดหวังอย่างเห็นได้ชัดก็ตาม"

 fircon.6035.name:0 "การเปลี่ยนมุมมอง"
 fircon.6035.desc.start:0 "พวก [non_believers_country.GetSpeciesNamePlural] ต้องการแสดงความขอบคุณรวมทั้งกล่าวคำขอโทษเราอย่างเป็นทางการ ในตอนนี้พวกเขาเข้าใจแล้วว่าแท้จริงแล้วเราไม่ใช่ผู้อยู่อาศัยใต้ดิน แต่เรามาจากสถานที่อื่นอย่างสิ้นเชิง นั่นคือ:"
 fircon.6035.desc.water:0 "มหาสมุทร"
 fircon.6035.desc.sun:0 "ใจกลางดวงดาวของพวกเขา"
 fircon.6035.desc.end:0 "ความเข้าใจในเรื่องจักรวาลวิทยาของพวกเขยังห่างไกลจากความสมบูรณ์แบบ แต่อย่างน้อยตอนนี้พวกเขาก็พร้อมที่จะเชื่อใจเราแล้ว"
 fircon.6035.a:0 "เป็นประสบการณ์ที่น่าสนใจในทางสังคมวิทยา แต่เหนื่อยล้าทางจิตใจเหลือเกิน"

 fircon.6038.name:0 "กลับลงไปใต้ดินซะ!"
 fircon.6038.desc.troops:0 "ภายหลังจากศึกต่อสู้อันยาวนานและยากลำบาก กองกำลังผสมของเราได้รับชัยชนะเหนือผู้รุกรานใต้ดิน และบีบให้พวกเขาล่าถอยกลับลงไปใต้พื้นผิวของ [non_believers_planet.GetName]!"
 fircon.6038.desc.notroops:0 "ภายหลังจากศึกต่อสู้อันยาวนานและยากลำบาก [non_believers_country.GetName] ได้บีบให้ผู้รุกรานใต้ดินล่าถอยกลับลงไปใต้พื้นผิวของ [non_believers_planet.GetName]!"

 fircon.7500.name:0 "ตุ๊กตาผ้า [Root.GetSpeciesNamePlural]"
 fircon.7500.desc:0 "ในวันนี้มีข่าวที่คาดไม่ถึงจาก §Y[pre_ftl_planet.GetName]§! เมื่อมีรูปลักษณ์ที่คุ้นเคยมาทักทายเรา: นั่นก็คือภาพของเราเอง\n\nเมื่อเร็วๆ นี้ พวก [pre_ftl_country.GetSpeciesAdj] ต่างพากันหลงใหลในสรีระรูปร่างของเรา ดูเหมือนว่าอะไรบางอย่างเกี่ยวกับ [Species.GetEarNamePlural] ของเราจะทำให้พวกเขานึกถึงลูกๆ ของตน อันที่จริงพวกเขาบอกว่าเรานั้น 'น่ารัก' ส่งผลให้ในตอนนี้ตุ๊กตายัดนุ่นที่มี [Species.GetEarNamePlural] ขนาดใหญ่เกินจริงได้กลายเป็นสินค้าที่แพร่หลายในเมืองต่างๆ ของพวกเขาแล้ว"
 fircon.7500.a:0 "แน่นอนสิว่าพวกเราน่ารัก!"
 fircon.7500.b:0 "เราไม่ได้§Rน่ารัก§!นะ"
 fircon.7500.c:0 "แต่... เอ่อ..." # Kyaaa!
 fircon.7500.d:0 "ช่างเป็นการเสียเวลาโดยเปล่าประโยชน์"
 fircon.7500.e:0 "เรา... ขอเราสักตัวได้ไหม?"
 fircon.7500.f:0 "เราจะจัดเก็บค่าลิขสิทธิ์จากการนำรูปลักษณ์ของเราไปใช้ประโยชน์ในทุกกรณี"

 fircon.7505.name:0 "สรรพสิ่งเป็นหนึ่งเดียว"
 fircon.7505.desc:0 "ความเปลี่ยนแปลงทางสังคมวิทยาที่น่าสนใจกำลังเกิดขึ้นบน §Y[pre_ftl_planet.GetName]§!\n\nเนื่องจากพวกเขามีเพียงตัวเราเป็นจุดอ้างอิงเท่านั้น ผู้คนที่นั่นจึงพาก่นเชื่อว่าสิ่งมีชีวิตทั้งหมดในจักรวาลจะต้องเป็นแบบพวกเรา: เชื่อมโยงกัน เป็นหนึ่งเดียว หากปราศจากกรอบอ้างอิงอื่นๆ พวก [pre_ftl_country.GetSpeciesNamePlural] ก็พร้อมยินยอมให้ [root.GetIndividualNamePlural] ของเราเข้าถึงสถาบันต่างๆ ของพวกเขา ความเข้าใจผิดของพวกเขานี้อาจเปิดโอกาสให้เราสามารถพัฒนาอารยธรรมของพวกเขาได้เป็นอย่างมาก อย่างไรก็ตาม หากความจริงเกี่ยวกับกาแล็กซีที่กว้างใหญ่กว่าเดิม (และการมีอยู่ของเผ่าพันธุ์ที่ไม่ใช่จิตร่วม) ถูกเปิดเผยออกมา พวกเขาอาจเชื่อใจเราน้อยลง"
 fircon.7505.a.hive:0 "ใช่แล้ว พวกเราคือทั้งหมด"
 fircon.7505.a.machine:0 "รับรอง มีเพียงพวกเจ้าเท่านั้นที่เป็นปัจเจก"
 fircon.advance_tech:0 "[pre_ftl_country.GetName] จะพัฒนาไปสู่ยุคเทคโนโลยีถัดไปของพวกเขา"
 fircon.b.tt:0 "[pre_ftl_country.GetName] จะก้าวหน้าเข้าสู่ยุคเทคโนโลยีในอนาคตเร็วขึ้น §G25%§!"
 fircon.7505.b:0 "บอกพวกเขาว่าเราเองก็ยังไม่มั่นใจเช่นกัน"
 fircon.7505.c:0 "แก้ไขความเข้าใจผิดของพวกเขาเสียใหม่"

 MESSAGE_PRE_FTL_DISTRUSTFUL_TITLE:0 "ความสัมพันธ์ทางการทูตที่ไม่ไว้วางใจ"
 MESSAGE_PRE_FTL_DISTRUSTFUL:1 "เนื่องจากการกระทำล่าสุดของเรา ทำให้ $COUNTRY|Y$ เริ่มไม่ไว้วางใจเรา และปิดกั้นการทูตไประยะเวลาหนึ่ง"

 fircon.7510.name:0 "สอนให้จิตร่วมสร้างงานฝีมือ"
 fircon.7510.desc.base:0 "หลังจากความสำเร็จในโครงการริเริ่มด้านการศึกษาของเรากับจิตร่วมที่เราต้องการผลักดัน เราได้สอนเคมีขั้นพื้นฐานให้แก่พวกเขา ทว่าเกือบจะในทันที พวกเขาดึงเอาการใช้งานที่ทำลายล้างรุนแรงที่สุดของหลักการเหล่านั้นออกมาใช้ และเริ่มทำสงครามกับจิตร่วมข้างเคียงตั้งแต่ตอนที่เรายังไม่ทันได้ออกไปจากชั้นบรรยากาศของพวกเขาเลย ในตอนนี้โดรนหลายล้านหน่วยกำลังทยอยล้มตาย"
 fircon.7510.desc.gestalt:0 "[Root.GetScientistPlural] ของเราทำภารกิจบน §Y[pre_ftl_planet.GetName]§! สำเร็จ $fircon.7510.desc.base$"
 fircon.7510.desc.regular:0 "เหล่านักวิทยาศาสตร์ของเราออกจากดาว §Y[pre_ftl_planet.GetName]§! ในวันนี้ด้วยความตื่นตระหนกตกใจ $fircon.7510.desc.base$"
 fircon.7510.a:0 "หยุดเรื่องนี้ซะ!"
 fircon.7510.a.tt:1 "§R200§! £pop£ §Hป๊อป§! ตายบน [pre_ftl_planet.GetName]"
 fircon.7510.b.regular:0 "นั่นแหล่ะคือธรรมชาติของความก้าวหน้า"
 fircon.7510.b.gestalt:0 "เป็นไปตามที่คาดการณ์ไว้"
 fircon.7510.b.tt:1 "§R500§! £pop£ §Hป๊อป§! ตายบน [pre_ftl_planet.GetName]"
