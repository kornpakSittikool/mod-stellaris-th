 ## Observation Events
 fircon.1256.name:0 "เชื่องและอุดมสมบูรณ์"
 fircon.1256.desc:0 "ประชากรของ §Y[From.Owner.Capital.GetName]§! ได้พัฒนาทักษะด้านการเกษตรของพวกเขาผ่านการทดลองใช้ปุ๋ยที่อุดมไปด้วยสารอาหาร การเก็บเกี่ยวของพวกเขาได้ผลผลิตที่มีคุณภาพสูงขึ้นและสุขภาพของสังคมของพวกเขาก็กำลังดีขึ้น\n\nเมื่อพิจารณาถึงเทคโนโลยีที่ยังอยู่ในระดับเริ่มต้นของพวกเขา ความก้าวหน้าในการผลิตอาหารนี้ถือว่าน่าทึ่งมาก การเก็บตัวอย่างปุ๋ยนี้ควรจะช่วยให้เราสามารถเลียนแบบความสำเร็จดังกล่าวในระดับที่กว้างขึ้นได้"
 fircon.1256.a:0 "เราจะยังคงเฝ้าสังเกตการณ์ความพยายามของพวกเขาต่อไปจากระยะไกล"
 fircon.1256.b:0 "ส่งทีมไปเก็บตัวอย่าง"
 fircon.1257.name:0 "เชื่องและอุดมสมบูรณ์: ศึกษาตัวอย่างแล้ว"
 fircon.1257.desc:0 "การวิเคราะห์ตัวอย่างปุ๋ยที่รวบรวมมาจาก §Y[FromFrom.Owner.Capital.GetName]§! ของเรา ได้ให้ข้อมูลเชิงลึกที่มีคุณค่าเกี่ยวกับแนวทางปฏิบัติทางการเกษตรยุคก่อนความเร็วซึ่งบางอย่างมีความแปลกใหม่จนสามารถส่งเสริมเทคนิคของเราเองได้จริง ๆ จากทุกมุมมอง นี่เป็นความพยายามที่คุ้มค่า และเป็นภารกิจที่ประสบความสำเร็จ"
 fircon.1261.name:0 "ทุพภิกขภัย!"
 fircon.1261.desc:0 "ชุมชนต่าง ๆ บน §Y[From.Owner.Capital.GetName]§! กำลังเผชิญกับความยากลำบากทางการเกษตร ความล้มเหลวของการเพาะปลูกเมื่อเร็ว ๆ นี้อาจนำไปสู่ความขัดแย้งเรื่องอาหาร นี่คือช่วงเวลาสำคัญในการพัฒนาการของสังคมยุคเยาว์\n\nไม่ว่าพวกเขาจะเลือกที่จะร่วมมือกันในยามยาก หรือหันมาต่อสู้กันเอง การตัดสินใจของพวกเขาในตอนนี้จะมีผลอย่างมากต่อการที่พวกเขาจะกลายเป็นใครในท้ายที่สุด\n\nน่าเสียดายที่ไม่มีว่าพวกเขาจะเลือกทางเดินใด พวกเขากำลังเข้าสู่ช่วงเวลาแห่งความยากลำบากอย่างแสนสาหัส"
 fircon.1261.a:0 "เราจะไม่เข้าแทรกแซงกระบวนการพัฒนาตามธรรมชาติของพวกเขา"
 fircon.1261.b:0 "เรามีหน้าที่ทางศีลธรรมที่จะต้องช่วยเหลือ"
 fircon.1261.c:0 "เราจะลดความต้องการอาหารของพวกเขาลง..."
 fircon.1262.name:0 "ภัยแล้งสิ้นสุดลงแล้ว!"
 fircon.1262.desc:0 "การแทรกแซงของเราเมื่อเร็ว ๆ นี้บน §Y[FromFrom.Owner.Capital.GetName]§! ได้ผลลัพธ์ที่เป็นบวก การใช้เทคโนโลยีทางการเกษตรของเราเอง ทำให้เราแอบช่วยเหลือไม่ให้พวกเขาอดตายได้อย่างลับ ๆ\n\nตอนนี้พวกเขามีอาหารเหลือเฟือ ดังนั้นมันจึงเป็นเรื่องถูกต้องแล้วที่เราจะจำกัดขอบเขตการแทรกแซงของเราโดยการนำบางส่วนมาเป็นของเราเอง"
 fircon.1271.name:0 "ภาพวาดฝาผนังถ้ำ!"
 fircon.1271.desc:0 "ขณะที่ประชากรของ §Y[From.Owner.Capital.GetName]§! ยังคงสร้างสรรค์ผลงานศิลปะจำลองแบบหยาบ ๆ ในพื้นที่อยู่อาศัยส่วนรวมของพวกเขา เราสังเกตเห็นว่าภาพบางภาพเริ่มมีลักษณะคล้ายกับพวกเรา\n\nตอนนี้ดูเหมือนว่าความพยายามของเราบนดาวเคราะห์ดวงนี้จะดึงดูดความสนใจเข้าให้แล้ว"
 fircon.1271.a:0 "พวกเขาสามารถบันทึกรูปลักษณ์ของเราไว้ได้ น่าทึ่งมาก!"
 fircon.1271.b:0 "ภาพขีดเขียนของพวกเขาดูถูกเรา ลบมันออกไปซะ!"
 fircon.1271.c:0 "เราได้ทำให้วัฒนธรรมของพวกเขาแปดเปื้อนเสียแล้ว ต้องระวังให้มากขึ้นในอนาคต"
 fircon.1285.name:0 "เขียนไว้ในหมู่ดาว!"
 fircon.1285.desc:0 "บน §Y[From.Owner.Capital.GetName]§! ประชากรกำลังใช้ภาพแกะสลักหยาบ ๆ เพื่อแสดงออกและแบ่งปันความคิด ตัวอย่างที่ถูกบันทึกโดยนักวิจัยของเราชี้ให้เห็นว่าประชากรมีความรับรู้ถึงวัตถุบนท้องฟ้าที่อยู่ห่างไกลออกไปนอกดาวเคราะห์ของตนเอง และยังเริ่มบันทึกกลุ่มดาวต่าง ๆ อีกด้วย\n\nความพยายามในช่วงแรกในการทำแผนที่ดวงดาวของพวกเขานั้นค่อนข้างแม่นยำสำหรับอารยธรรมที่ยังเยาว์วัยเช่นนี้ แต่ก็ไม่ถึงขนาดที่จะพัฒนาขึ้นไม่ได้หากเราต้องการจะบอกใบ้ให้พวกเขาสักหน่อย..."
 fircon.1285.a:0 "ทำการสังเกตการณ์แบบพาสซีฟต่อไป พวกเขาต้องเรียนรู้ด้วยตัวเอง"
 fircon.1285.b:0 "บางทีเราอาจจะช่วยชี้นำพวกเขาไปในทิศทางที่ถูกต้องอย่างแนบเนียนได้..."
 fircon.1290.name:0 "เขียนไว้ในหมู่ดาว: ส่งมอบแผนที่ดาว"
 fircon.1290.desc:0 "แผนที่ดาวในยุคแรกเริ่มของประชากรบน §Y[FromFrom.Owner.Capital.GetName]§! ได้รับการแก้ไขอย่างลับ ๆ แล้ว\n\nภาพแกะสลักที่แสดงไดอะแกรมของระบบดาวใกล้เคียงถูกสร้างขึ้นในถ้ำที่อยู่ใกล้เคียง เมื่อพวกเขาค้นพบมัน มันควรจะช่วยให้ประชากรในท้องถิ่นมีความเข้าใจที่ดีขึ้นเกี่ยวกับขนาดของจักรวาลที่รู้จัก"
 fircon.1290.a:0 "วันนี้เราได้ทำสิ่งที่ดีลงไปแล้ว"
 fircon.1291.name:0 "เขียนไว้ในหมู่ดาว: ได้รับแผนที่ดาว"
 fircon.1291.desc:0 "น่าเสียดาย เนื่องจากประชากรของ §Y[FromFromFrom.Owner.Capital.GetName]§! ไม่รู้ว่าใครเป็นผู้รับผิดชอบต่อแผนที่ดาวใหม่ของพวกเขา พวกเขาจึงมองว่าความพยายามของเราเป็นเพียงการขีดเขียนทำลายทรัพย์สินทั่วไป การรักษาความปลอดภัยรอบ ๆ ถ้ำได้เพิ่มขึ้น และชนชั้นปกครองเริ่มเป็นปฏิปักษ์ต่อการแสดงออกถึงตัวตนในรูปแบบใหม่ ๆ...\n\nในแง่ดี การแทรกแซงของเราไม่ได้เสียเวลาไปเปล่า ๆ ปฏิกิริยาของพวกเขาต่อเหตุการณ์นี้ได้รับการพิสูจน์แล้วว่าน่าทึ่งมากในแง่ของการวิจัยทางวัฒนธรรม"
 fircon.1292.name:0 "เขียนไว้ในหมู่ดาว: ถูกสกัดกั้น"
 fircon.1292.desc:0 "ความพยายามของเราในการแก้ไขแผนที่ดาวบน §Y[FromFrom.Owner.Capital.GetName]§! อย่างลับ ๆ นั้นไม่ประสบความสำเร็จ โปรโตคอลความปลอดภัยของพวกเขามีความซับซ้อนอย่างน่าประหลาดใจสำหรับสังคมที่ยังเยาว์วัยเช่นนี้ เมื่อพิจารณาถึงภารกิจปัจจุบันของเรา ความเสี่ยงในการถูกเปิดเผยนั้นสูงเกินไป อย่างน้อยก็ในตอนนี้ ประชากรจะต้องเผชิญหน้ากับความทะเยอทะยานทางดาราศาสตร์ของพวกเขาเพียงลำพัง"
 fircon.1300.name:0 "ภาษาภาพเสื่อมถอย!"
 fircon.1300.desc:0 "ระบบการสื่อสารที่ไม่ใช้คำพูดหลายระบบได้เกิดขึ้นอย่างเป็นอิสระบน §Y[From.Owner.Capital.GetName]§! ด้วยชุดภาพและอักษรภาพที่ขัดแย้งกัน ประชากรยังคงต้องใช้เวลาอีกหลายศตวรรษกว่าจะสร้างภาษาหลักขึ้นมาได้\n\nที่น่าสนใจคือ หนึ่งในระบบการเขียนมีโครงสร้างทางไวยากรณ์คล้ายกับของเราเอง หากสังคมของ §Y[From.Owner.Capital.GetName]§! รับระบบนี้ไปใช้ พวกเขาก็อาจจะสามารถปรับเปลี่ยนทางวัฒนธรรมได้ง่ายขึ้นในอนาคต..."
 fircon.1300.a:0 "เราควรจะหล่อหลอมพวกเขาให้เหมือนกับภาพลักษณ์ของเรา"
 align_pre_FTL_country_ethics_tooltip:0 "พวกเขาจะกลายเป็นเหมือนเรา"
 fircon.1300.b:0 "ภาษาของพวกเขาเป็นของพวกเขาเอง"
 fircon.1310.name:0 "จงสรรเสริญเรา!"
 fircon.1310.desc:0 "การมีอยู่ของเราบน §Y[From.Owner.Capital.GetName]§! ไม่ได้รอดพ้นสายตาไปได้ กลุ่มวัฒนธรรมหลักในตอนนี้มองว่าเราเป็นผู้ทรงภูมิปัญญาและทรงพลังที่ควบคุมธาตุต่าง ๆ และควบคุมโชคชะตาของพวกเขาในที่สุด\n\nหลายคนได้อุทิศชีวิตให้กับเราในพิธีกรรมอันวิจิตรพิสดาร ด้วยความกลัวว่าการทำให้เราไม่พอใจอาจนำมาซึ่งผลลัพธ์ที่ร้ายแรง"
 fircon.1310.a:0 "มันควรจะเป็นเช่นนั้นอยู่แล้ว!"
 fircon.1310.b:0 "พวกเขาไม่ได้ติดค้างอะไรเรา"
 fircon.1315.name:0 "พวกเขากราบไหว้บูชาเรา!"
 fircon.1315.desc:0 "หลังจากเฝ้าสังเกตการณ์สังคมของพวกเขาอย่างจริงจังมาเป็นเวลาชั่วระยะเวลาสำคัญในประวัติศาสตร์ของพวกเขา สังคมหลักบน §Y[FromFrom.Owner.Capital.GetName]§! ก็ได้หันมาเคารพบูชาเราในฐานะเทพเจ้า พวกเขาปรารถนาที่จะให้เราเมตตาพวกเขา... และการบูชายัญด้วยเลือดเพื่อเป็นเกียรติแก่เราก็ยังคงดำเนินต่อไป"
 fircon.1320.name:0 "พระเจ้าได้ตายไปแล้ว"
 fircon.1320.desc.base:0 "ตามความเห็นของประชากรบน §Y[FromFrom.Owner.Capital.GetName]§! ไม่มีพระเจ้าอยู่จริง\n\nแม้ว่าเราจะพยายามแสดงตนเป็นผู้ปกครองอันศักดิ์สิทธิ์ของพวกเขา แต่พวกเขาก็มองทะลุตัวตนของเราได้อย่างง่ายดาย"
 fircon.1320.desc.regular:0 "$fircon.1320.desc.base$ ประชากรได้ปฏิเสธแนวคิดเรื่องพระเจ้าโดยสิ้นเชิง และเปิดรับมุมมองทางวัตถุนิยมต่อจักรวาลอย่างเด็ดขาด หากปราศจากหลักฐานที่จับต้องได้ พวกเขาเชื่อว่าตนเองอยู่อย่างโดดเดี่ยวในจักรวาล"
 fircon.1320.desc.materialist:0 "$fircon.1320.desc.base$ หากปราศจากหลักฐานทางวิทยาศาสตร์ที่ผ่านการตรวจสอบโดยผู้เชี่ยวชาญ พวกเขาได้ตัดสินจากการทดลองเชิงประจักษ์แล้วว่า ไม่มีสิ่งใดที่ใกล้เคียงกับความศักดิ์สิทธิ์อยู่บนระนาบแห่งความเป็นจริงนี้เลย พวกเขายังคงมีความหวังอยู่บ้าง"
 fircon.1320.desc.authoritarian:0 "$fircon.1320.desc.base$ ด้วยการปฏิเสธที่จะถูกสยบ ประชากรที่ดื้อรั้นได้ยอมสยบต่อสัญชาตญาณดิบของตนเองและเลือกที่จะไม่ยอมรับการปกครอง พวกเขาควรจะยอมรับเราเป็นนายตั้งแต่ตอนที่มีโอกาส"
 fircon.1330.name:0 "ศิลปะหาทางออกได้เสมอ!"
 fircon.1330.desc:0 "สังคมบน §Y[From.Owner.Capital.GetName]§! กำลังเบ่งบานไปด้วยวัฒนธรรมอันรุ่งเรืองและการเห็นคุณค่าของศิลปะอย่างลึกซึ้ง ประชากรกำลังวางอาวุธของพวกเขาลงเพื่อหันมาจับเครื่องเขียน ด้วยความเต็มใจที่จะเรียนรู้และสำรวจสิ่งต่าง ๆ นอกเหนือจากความขัดแย้งนี้ เราอาจกำลังร่วมเป็นสักขีพยานในรุ่งอรุณแห่งยุคทองบนดาวเคราะห์ดวงนี้"
 fircon.1330.b:0 "ถือเป็นสิทธิพิเศษที่ได้เป็นสักขีพยานในการกำเนิดของความงามเช่นนี้"
 fircon.1330.c:0 "การไล่ตามที่ไร้ประโยชน์"
 fircon.1340.name:0 "การเดินทางเริ่มต้นขึ้นแล้ว"
 fircon.1340.desc:0 "เรากำลังเป็นสักขีพยานของประชากรบน §Y[From.Owner.Capital.GetName]§! ที่กำลังก้าวเข้าสู่การตื่นรู้เป็นก้าวแรก พวกเขามองขึ้นไปข้างบน เปิดใจรับความลึกลับของจักรวาล ขณะที่การแสดงออกทางศิลปะพัฒนาขึ้นในวัฒนธรรมของพวกเขา พลังของศิลปะในการจับภาพการดิ้นรนทางจิตวิญญาณของสังคมของพวกเขาก็เพิ่มขึ้นเช่นกัน พวกเขาโหยหาบางสิ่งที่อยู่เหนือตัวเองเพื่อยึดเหนี่ยวจิตใจ"
 fircon.1340.b:0 "เราจะตอบรับคำอธิษฐานของพวกเขาเอง!"
 fircon.1340.c:0 "ทุกสิ่งล้วนกลับกลายเป็นเถ้าธุลี ส่วนที่เหลือนั้นเป็นเพียงแค่บทนำ"
 fircon.1345.name:0 "มีอะไรรออยู่ข้างหน้า?"
 fircon.1345.desc:0 "ด้วยการเปิดรับความจริงอันศักดิ์สิทธิ์แห่งการมีอยู่ ประชากรบน §Y[FromFrom.Owner.Capital.GetName]§! กำลังเข้าใกล้การตื่นรู้ ในฐานะผู้นำทางจิตวิญญาณ มันเป็นหน้าที่ของเราที่จะชี้นำพวกเขา"
 fircon.1350.name:0 "ทุกเส้นทางต้องมีจุดสิ้นสุด"
 fircon.1350.desc:0 "เมื่อประชากรบน §Y[FromFrom.Owner.Capital.GetName]§! แหงนมองท้องฟ้า พวกเขาหวังว่าจะได้รับพรจากสิ่งศักดิ์สิทธิ์ สิ่งที่พวกเขาได้รับจริง ๆ คือความเงียบงัน คำอธิษฐานของพวกเขาไม่ได้รับการตอบรับ ตอนนี้พวกเขาต้องยอมรับธรรมชาติที่ไร้สาระของจิตวิญญาณ มีเพียงวิทยาศาสตร์เท่านั้นที่มีคำตอบที่พวกเขาแสวงหา"
 fircon.1360.name:0 "ความเขลาเป็นสิ่งติดต่อกันได้"
 fircon.1360.desc:0 "ประชากรบน §Y[From.Owner.Capital.GetName]§! เริ่มสร้างทฤษฎีว่าโลกของพวกเขาได้รับมอบให้โดยสิ่งมีชีวิตที่ไม่อาจอธิบายได้ และชีวิตคือรางวัลสำหรับการอุทิศตนอย่างไม่เสื่อมคลายต่อผู้สร้างอันศักดิ์สิทธิ์ พวกเขาอาจจะต้องประหลาดใจเมื่อถึงเวลาที่ต้องเผชิญหน้ากับชุมชนทางช้างเผือกในวงกว้าง"
 fircon.1360.a:0 "ให้เราให้การศึกษาแก่พวกเขาในด้านวิทยาศาสตร์กันเถอะ"
 fircon.1360.b:0 "ความเชื่อของพวกเขาจะพัฒนาขึ้นเองตามกาลเวลา"
 fircon.1360.c:0 "พวกเขาควรจะได้รับรู้ความจริง!"
 fircon.1365.name:0 "ความเขลาเป็นสิ่งติดต่อกันได้: ย้อนกลับมาทำร้าย"
 fircon.1365.desc:0 "การเปิดเผยตัวตนของเราต่อผู้ที่หวังจะเป็นผู้นำทางจิตวิญญาณบน §Y[FromFrom.Owner.Capital.GetName]§! เราทำให้พวกเขามั่นใจว่าสิ่งที่คุณเรียกว่า 'ผู้สร้างอันศักดิ์สิทธิ์' นั้นไม่มีอยู่จริง คำตอบที่พวกเขาแสวงหาสามารถพบได้ผ่านวิทยาศาสตร์เท่านั้น\n\nน่าเสียดาย บทเรียนของเราถูกละเลย ตอนนี้ผู้คนหันมามองเราเป็นดั่งเทพเจ้า และสาบานว่าจะกราบไหว้บูชาเราตลอดไป ภารกิจของเราส่งผลย้อนกลับมาทำร้ายเราเสียแล้ว"
 fircon.1365.a:0 "เรื่องนี้มันน่าจะออกมาดีกว่านี้"
 fircon.1370.name:0 "ความเขลาเป็นสิ่งติดต่อกันได้: ความอับอาย"
 fircon.1370.desc:0 "พวกเขาโกรธแค้นมาก! การกระทำของเราได้สร้างความอับอายขายหน้าให้กับประชากรบน §Y[FromFrom.Owner.Capital.GetName]§! อย่างสิ้นเชิง เป็นเวลาหลายศตวรรษที่สมาชิกในสังคมของพวกเขาหายตัวไปภายใต้สถานการณ์ที่ลึกลับ เพียงเพื่อจะกลับมาในอีกไม่กี่วันหรือหลายเดือนต่อมาพร้อมกับเรื่องราวที่เหลือเชื่อที่สุดเกี่ยวกับเทคโนโลยีของเอเลี่ยน ซึ่งจากมุมมองของพวกเขามันไม่ต่างอะไรกับเวทมนตร์เลย\n\nเข้าใจได้ว่าการได้เรียนรู้ว่าเวทมนตร์ไม่มีจริง - แต่มีเอเลี่ยนที่คอยตรวจจับและตรวจร่างกายของคุณเพื่อการวิจัย - ได้ทำให้โลกทัศน์ของพวกเขาสั่นคลอนไปบ้าง ตอนนี้ประชากรได้กลายเป็นสังคมที่ปิดกั้นตัวเองในชั่วข้ามคืน และกำลังร้องขออย่างสุภาพให้เราหยุดปฏิบัติต่อพวกเขาเหมือนเป็นตัวอย่างทดลองในห้องแล็บ บางทีเราควรพิจารณาคำขอของพวกเขา"
 fircon.1370.a:0 "อาจจะไม่ล่ะ"
 fircon.1380.name:0 "ความก้าวหน้าทางอุตสาหกรรม"
 fircon.1380.desc:0 "ความก้าวหน้าทางเทคโนโลยีอย่างรวดเร็วบน §Y[From.Owner.Capital.GetName]§! กำลังนำพาไปสู่ยุคแห่งการปฏิวัติอุตสาหกรรม ความก้าวหน้าในด้านการคมนาคมขนส่งได้เชื่อมโยงพื้นที่ที่เคยตัดขาดของโลกเข้าด้วยกัน สร้างโอกาสในการค้าและการแบ่งปันความคิดเห็นในระดับโลก\n\nอย่างไรก็ตาม ความตึงเครียดเรื่องทรัพยากรก็เริ่มก่อตัวขึ้นแล้ว หากประวัติศาสตร์ของโลกดวงอื่น ๆ สามารถใช้เป็นแนวทางได้ ประชาชนก็อาจจะพบว่าตัวเองเข้าสู่ภาวะสงครามในไม่ช้า"
 fircon.1380.a:0 "บางทีเราอาจจะช่วยให้พวกเขาหลีกเลี่ยงภัยพิบัติได้..."
 fircon.1380.b:0 "พวกเขาจะเรียนรู้เอง ไม่ทางใดก็ทางหนึ่ง"
 fircon.1385.name:0 "ภัยพิบัติที่กำลังรออยู่"
 fircon.1385.desc:0 "การยอมรับความเสี่ยงที่คำนวณไว้ เราได้เปิดเผยตัวตนของเราต่อผู้นำโลกของ §Y[FromFrom.Owner.Capital.GetName]§! เราได้แนะนำให้รัฐบาลท้องถิ่นยุติความขัดแย้งของพวกเขาอย่างชัดเจน โดยเตือนว่าผลลัพธ์ของสงครามอาจเป็นหายนะร้ายแรง หลายคนรับฟังอย่างลังเล คนอื่น ๆ มองว่าการพูดคุยเรื่อง 'ทูตต่างดาว' เป็นเพียงเรื่องหลอกลวง"
 fircon.1385.a:0 "เวลาจะเป็นเครื่องพิสูจน์ว่าพวกเขาจะรับฟังคำเตือนของเราหรือไม่"
 fircon.1390.name:0 "สงครามกลางเมืองที่ป่าเถื่อน"
 fircon.1390.desc:0 "ในการเลือกที่จะปล่อยให้ผู้นำโลกของ §Y[FromFrom.Owner.Capital.GetName]§! จัดการเรื่องต่าง ๆ ด้วยตัวเอง ตอนนี้พวกเขาต้องรับผิดชอบต่อโชคชะตาของพวกเขาเองทั้งหมด น่าเสียดาย ดูเหมือนว่าพวกเขากำลังมุ่งหน้าสู่สงคราม\n\nความแตกต่างที่คิดว่าไม่อาจประสานกันได้ ได้ผลักดันให้กลุ่มวัฒนธรรมของดาวเคราะห์หันมาจับอาวุธต่อสู้กันเอง ความขัดแย้งที่กำลังจะเกิดขึ้นเป็นตัวแทนของช่วงเวลาที่มืดมนในการพัฒนาการของพวกเขา"
 fircon.1395.name:0 "ภัยพิบัติถูกหลีกเลี่ยงแล้ว"
 fircon.1395.desc:0 "ผู้นำของ §Y[FromFromFrom.Owner.Capital.GetName]§! ได้รับฟังคำแนะนำของเราและวางอาวุธลง มันเป็นไปไม่ได้ที่จะบอกว่าสันทีภาพจะคงอยู่ตลอดไปหรือไม่ แต่สำหรับตอนนี้ อย่างน้อยพวกเขาก็ไม่น่าจะล้างบางตัวเองไปจากพื้นผิวโลกของพวกเขาเอง"
 fircon.1400.name:0 "ภัยพิบัติ"
 fircon.1400.desc:0 "การแทรกแซงของเราอาจจะเหมือนเป็นการราดน้ำมันลงบนกองไฟบน §Y[FromFromFrom.Owner.Capital.GetName]§! ตอนนี้โลกของพวกเขากำลังเผชิญกับสงคราม อย่างไรก็ตาม หากพวกเขาไม่สามารถทำลายล้างกันเองได้สำเร็จ ก็อาจจะมีข้อดีในสถานการณ์นี้ นั่นคือความก้าวหน้าทางเทคโนโลยีที่เกิดขึ้นบนดาวดวงนี้ถือว่าน่าทึ่งมาก\n\nบางที เมื่อฝุ่นควันจากการต่อสู้จางลง พวกเขาอาจจะนำเทคโนโลยีบางอย่างเหล่านี้ไปใช้ในทางที่ดี"
 fircon.1410.name:0 "สันติภาพและความเจริญรุ่งเรือง"
 fircon.1410.desc.base:0 "เทคโนโลยียังคงก้าวหน้าอย่างต่อเนื่องบน §Y[From.Owner.Capital.GetName]§! ในขณะที่การปฏิวัติอุตสาหกรรมนำพาสังคมของพวกเขาไปสู่จุดสูงสุดใหม่ ความก้าวหน้าล่าสุดในด้านวิศวกรรมได้ปฏิวัติการใช้การขนส่งของพวกเขา และนำพวกเขาเข้าใกล้การรวมเป็นหนึ่งเดียวของดาวเคราะห์ไปอีกขั้น"
 fircon.1410.desc.regular:0 "$fircon.1410.desc.base$\n\nด้วยการท้าทายแบบจำลองการทำนายของเรา ตอนนี้ §Y[From.Owner.Capital.GetName]§! กลายเป็นโลกที่เป็นอันหนึ่งอันเดียวกันแล้ว ด้วยการระดมทรัพยากรร่วมกัน ผู้คนให้ความสำคัญกับความเป็นอยู่ที่ดีของสังคมโลก และมาตรฐานการครองชีพก็กำลังสูงขึ้น"
 fircon.1410.desc.gestalt:0 "$fircon.1410.desc.base$\n\nด้วยการทำงานร่วมกัน ประชากรของ §Y[From.Owner.Capital.GetName]§! ได้สร้างโลกอุตสาหกรรมที่เป็นหนึ่งเดียว ด้วยการระดมทรัพยากรของโลก รังแต่ละรังให้ความสำคัญกับความเป็นอยู่ที่ดีของชุมชนโลกทั้งหมด และมาตรฐานการครองชีพร่วมกันของพวกเขาก็ดูโดดเด่นเป็นพิเศษ"
 fircon.1410.a:0 "น่าทึ่งมาก นี่เป็นเรื่องที่ไม่ปกติอย่างยิ่ง"
 fircon.1410.b:0 "พวกเขามีทรัพยากรมากกว่าที่พวกเขาต้องการ..."
 fircon.1410.b.tooltip:0 "เราสามารถช่วยแบ่งเบาทรัพยากรบางส่วนของพวกเขาได้"
 fircon.1415.name:0 "ความเจริญรุ่งเรืองเพื่อทุกคน"
 fircon.1415.desc:0 "ชีวิตบน §Y[FromFrom.Owner.Capital.GetName]§! กำลังเฟื่องฟู และเศรษฐกิจที่กำลังเติบโตก็เปิดโอกาส... พิเศษบางอย่างให้เรา เครือข่ายเรือขนส่งสินค้าทางบกที่เพิ่งสร้างขึ้นใหม่เป็นเป้าหมายที่สมบูรณ์แบบ ในทางทฤษฎี เจ้าหน้าที่ของเราสามารถขึ้นไปบนเรือขนส่งสินค้าเหล่านี้และยึดสินค้าได้อย่างง่ายดาย อย่างไรก็ตาม ตามจุดยืนการสังเกตการณ์ในปัจจุบันของเรา เราจะต้องระมัดระวังเป็นพิเศษเพื่อไม่ให้ประชากรในวงกว้างตรวจพบ"
 fircon.1415.a:0 "ถอนกำลัง เราไม่ต้องการอะไรจากพวกเขานอกจากงานวิจัย"
 fircon.1415.b:0 "การปล้นเหรอ? เอาด้วยสิ!"
 fircon.1425.name:0 "เดินหน้าเต็มกำลัง!"
 fircon.1425.desc:1 "การปล้นสินค้าบน §Y[FromFromFromFrom.Owner.Capital.GetName]§! ประสบความสำเร็จ เจ้าหน้าที่ของเราได้ครอบครองโลหะผสมสะสมจำนวนเล็กน้อย และได้เรียนรู้เกี่ยวกับการขนส่งของ [GetPreFTLLower] เป็นจำนวนมากในระหว่างที่พวกเขาลงไปที่นั่น"
 fircon.1425.a:0 "การปล้นประสบความสำเร็จ!"
 fircon.1430.name:0 "สุดสายปลายทาง!"
 fircon.1430.desc:0 "การปล้นสินค้าบน §Y[FromFromFromFrom.Owner.Capital.GetName]§! ล้มเหลว เจ้าหน้าที่ของเราถูกจับได้ระหว่างปฏิบัติการบนเรือขนส่งสินค้าทางบก ในระหว่างการปะทะที่ตามมา มีรายงานการบาดเจ็บล้มตายของทั้งสองฝ่าย และเจ้าหน้าที่ของเราถูกเปิดเผยตัว"
 fircon.1430.a:0 "การปล้นของเราล้มเหลว"
 fircon.1445.name:0 "ความขัดแย้ง! มันมีประโยชน์อะไร?"
 fircon.1445.desc:0 "สงครามได้ปะทุขึ้นบน §Y[From.Owner.Capital.GetName]§!. ในช่วงไม่กี่ปีที่ผ่านมา กลุ่มบางกลุ่มบนดาวเคราะห์สามารถสะสมความมั่งคั่งได้มากพอที่จะผูกขาดปัจจัยการผลิต ในทางกลับกัน คนอื่น ๆ จึงก่อกบฏต่อความไม่เท่าเทียมที่เพิ่มขึ้น ตอนนี้สงครามชนชั้นเต็มรูปแบบได้ปะทุขึ้นแล้ว มันเป็นช่วงเวลาที่มืดมนสำหรับ §Y[From.Owner.Capital.GetName]§! เรื่องนี้จะมีผลลัพธ์ที่ยั่งยืน"
 fircon.1445.a:0 "เหล่านักปฏิวัติผู้กล้าหาญเหล่านั้น เราขอไว้อาลัยให้กับการต่อสู้ของพวกเขา"
 fircon.1445.a.tt:0 "ใจของเราอยู่กับ §Y[From.Owner.Capital.GetName]§! การสังเกตการณ์สงครามนี้ควรจะให้ข้อมูลเชิงลึกที่มีคุณค่าอย่างยิ่งเกี่ยวกับสังคมของพวกเขา"
 fircon.1445.b:0 "เราจะยังคงเป็นกลางในเรื่องการเมืองของพวกเขา"
 fircon.1445.c:0 "พวกคนงานเรียกร้องสิทธิ์มากเกินไปแล้ว..."
 fircon.1450.name:0 "ความโศกเศร้าที่ไม่ได้พูดออกมา"
 fircon.1450.desc:0 "สงครามบน §Y[FromFrom.Owner.Capital.GetName]§! สิ้นสุดลงแล้ว เหล่านักปฏิวัติล้มตายลงทีละคน ขณะที่ศพกองสูงขึ้น กลุ่มที่มีอิทธิพลหลักก็ยังคงตักตวงผลประโยชน์จากสงครามที่เกิดจากความโลภของตนเอง\n\nสถานะเดิมได้รับการฟื้นฟูแล้ว เสียงร้องเพื่อการปฏิวัติได้เงียบลงไป"
 fircon.1450.a:0 "เราขอแสดงความเสียใจต่อความสูญเสียของพวกเขา"
 fircon.1450.b:0 "เรื่องนี้เป็นสิ่งที่ยอมรับไม่ได้"
 fircon.1451.name:0 "สงครามสิ้นสุดลงแล้ว!"
 fircon.1451.desc:1 "หลังจากที่เราเลือกที่จะไม่ยุ่งเกี่ยวกับการเมืองของ [GetPreFTLLower] สงครามบน §Y[FromFrom.Owner.Capital.GetName]§! ก็ยุติลงได้ด้วยตัวเอง กองกำลังกดขี่สามารถบดขี้นักปฏิวัติได้อย่างง่ายดาย\n\nสถานะเดิมได้รับการฟื้นฟูแล้ว การปฏิวัติได้ตายไปแล้ว"
 fircon.1452.name:0 "ชัยชนะของนายทุน"
 fircon.1452.desc:0 "พนักงานที่กระทำความผิดบน §Y[FromFrom.Owner.Capital.GetName]§! เหน็ดเหนื่อยกันไปเอง และการก่อกบฏอันเย่อหยิ่งของพวกเขาก็จบลงด้วยความล้มเหลว ฝ่ายบริหารระดับสูงกลับมาควบคุมสถานการณ์ได้อีกครั้งผ่านการปรับโครงสร้างองค์กรอย่างมีชั้นเชิงและการจัดการประสิทธิภาพการทำงาน\n\nสถานะเดิมได้รับการฟื้นฟูแล้ว ทุกคนกำลังเดินทางกลับไปยังพื้นที่ทำงานที่กำหนดไว้ของตน"
 fircon.1453.name:0 "ความไม่มั่นคงทางเศรษฐกิจ"
 fircon.1453.desc:0 "ท้าทายแบบจำลองการทำนาย พนักงานที่กระทำความผิดบน §Y[FromFrom.Owner.Capital.GetName]§! ได้ขับไล่ชนชั้นบริหารของพวกเขาออกไปในการเข้ายึดครองอย่างไม่เป็นมิตร\n\nนี่คือภัยพิบัติ เนื่องจากคนงานของเราเองได้รับแรงบันดาลใจและตอนนี้เริ่มมีความคิดที่สูงเกินกว่าตำแหน่งหน้าที่ของตน การลงทุนของเราอยู่ในความเสี่ยงอย่างที่ไม่เคยมีมาก่อน เราควรจะมีความละเอียดรอบคอบมากกว่านี้ในการตรวจสอบสถานะอย่างรอบด้าน"
 fircon.1455.name:0 "แรงต้านที่เงียบงัน"
 fircon.1455.desc:0 "บน §Y[FromFromFrom.Owner.Capital.GetName]§! เสียงที่เห็นต่างได้ถูกทำให้เงียบลงโดยชนชั้นนำผู้มีอำนาจ อย่างไรก็ตาม หากเราเข้าแทรกแซงตอนนี้ เราจะสามารถเปลี่ยนทิศทางของสถานการณ์ได้อย่างแน่นอน การมีอยู่ของเราบนดาวเคราะห์ดวงนี้อาจช่วยส่งเสริมสิ่งที่เหลืออยู่ของกลุ่มต่อต้านได้"
 fircon.1455.a:0 "ความพยายามที่สิ้นหวัง"
 fircon.1455.b:0 "เราไม่มีอะไรจะเสีย"
 fircon.1460.name:0 "กดขี่ผู้กดขี่"
 fircon.1460.desc:0 "เมื่อลงจอดบน §Y[FromFromFromFrom.Owner.Capital.GetName]§! กองกำลังของเราแสดงให้เห็นถึงข้อได้เปรียบทางด้านยุทโธปกรณ์และยุทธศาสตร์ที่เหนือกว่ากองทหารพื้นเมืองในทันที กลุ่มชนชั้นนำเดิมได้ล่าถอยไป และเหล่านักปฏิวัติพร้อมที่จะเข้ามารับช่วงต่ออำนาจการปกครอง"
 fircon.1460.b:0 "นี่เป็นข่าวที่สร้างความเสียหายมากที่สุด"
 fircon.1470.name:0 "ตามหาคนอวกาศ"
 fircon.1470.desc:0 "ประชากรของ §Y[pre_ftl_planet.GetName]§! ได้เริ่มค้นหาสัญญาณของสิ่งมีชีวิตที่มีภูมิปัญญานอกโลกอย่างจริงจัง ขณะที่พวกเขาเตรียมพร้อมที่จะไปยังที่ที่หลายคนเคยไปมาแล้ว มันอาจถึงเวลาที่เราจะต้องประเมินโปรโตคอลการติดต่อครั้งแรกของเราใหม่ เพื่อเตรียมพร้อมสำหรับการต้อนรับสมาชิกใหม่เข้าสู่ชุมชนกาแล็กซีในวงกว้าง"
 fircon.1470.a:0 "เราจะทักทายพวกเขาเมื่อพวกเขาพร้อม และไม่ใช่ก่อนหน้านั้น"
 fircon.1470.b:0 "จงสั่นสะท้านด้วยความกลัว ซะเถอะ เจ้าพวกคนโง่ตัวจ้อย!"
 fircon.1475.name:0 "พวกเขากำลังฟังอยู่"
 fircon.1475.desc.base:1 "อารยธรรม [GetPreFTLLower] บน §Y[pre_ftl_planet.GetName]§! สามารถดักจับและถอดรหัสชุดการสื่อสารที่ส่งมาจากสถานีสังเกตการณ์ในวงโคจรของเราได้ไม่ทางใดก็ทางหนึ่ง"
 fircon.1475.desc.regular:0 "$fircon.1475.desc.base$\n\nตอนนี้พวกเขากำลังศึกษาข้อความที่มีความเป็นส่วนตัวสูงระหว่างเจ้าหน้าที่บนสถานีสังเกตการณ์กับผู้รับที่ไม่รู้จักจากเมืองหลวงของเรา\n\nการรั่วไหลที่โชคร้ายนี้ได้ชี้ให้เห็นถึงช่องโหว่ในโปรโตคอลความปลอดภัยของเรา"
 fircon.1475.desc.gestalt:0 "$fircon.1475.desc.base$\n\nพวกเขาได้รับข้อมูลที่ละเอียดอ่อนของเรา เรามีช่องโหว่ในระบบความปลอดภัยของเรา"
 fircon.1475.a:0 "เราควรระมัดระวังมากกว่านี้"
 fircon.1475.b:0 "ระบุจุดที่รั่วไหล ลบข้อมูลในคลังข้อมูลของพวกเขาจากระยะไกล"
 fircon.1480.name:0 "พวกเขาคิดว่าตอนนี้พวกเขาอยู่ลำพัง"
 fircon.1480.desc:0 "ประชากรของ §Y[pre_ftl_planet.GetName]§! ไม่ประสบความสำเร็จในการค้นหาสิ่งมีชีวิตที่มีภูมิปัญญา\n\nหลังจากทุ่มเทเวลาและทรัพยากรในการค้นหาชีวิตท่ามกลางหมู่ดาว พวกเขาต่างรู้สึกหดหู่ใจเมื่อพบเพียงความว่างเปล่า\n\nสำหรับตอนนี้ การค้นหายังคงดำเนินต่อไป แต่เป็นที่ชัดเจนว่าพวกเขากำลังสูญเสียความหวังในโครงการนี้อย่างรวดเร็ว โดยไม่จำเป็นต้องพูดเลย เราจะยังคงปกปิดการมีอยู่ของเราจากพวกเขาต่อไปตามพารามิเตอร์ภารกิจ"
 fircon.1480.a:0 "พวกเขายังไม่พร้อมที่จะพบเราในตอนนี้"
 fircon.1485.name:0 "สัญญาณเก่าถูกสกัดกั้นได้"
 fircon.1485.desc:0 "ประชากรที่น่าขันของ §Y[pre_ftl_planet.GetName]§! ได้ใช้เทคโนโลยีอันอ่อนแอของพวกเขาเพื่อสกัดกั้นสัญญาณวิทยุเก่าแก่ของเราบางส่วน\n\nการถอดรหัสและตีความการแพร่ภาพเก่า ๆ ของเราควรจะทำให้พวกเขายุ่งไปอีกสามชั่วอายุคน ด้วยระดับการพัฒนาในปัจจุบันของพวกเขา เราจึงไม่มีความเสี่ยงที่จะถูกเปิดเผยตัวตน"
 fircon.1485.a:0 "เฝ้าสังเกตการณ์ต่อไป"
 fircon.1490.name:0 "คนชอบแกล้งนอกแถว"
 fircon.1490.desc:0 "ในการค้นหาสิ่งมีชีวิตที่มีภูมิปัญญานอกดาวเคราะห์ ประชากรของ §Y[pre_ftl_planet.GetName]§! ได้ส่งเสียงเรียกไปยังกาแล็กซี สิ่งที่พวกเขาได้รับคือข้อความที่ระบุว่า 'จงเงียบเสียง มิฉะนั้นพวกมันจะได้ยินคุณ'\n\nนี่คือการกระทำของเจ้าหน้าที่คนหนึ่งของเราเอง ส่งผลให้ตอนนี้นักท่องอวกาศรุ่นเยาว์ต่างหวาดกลัวต่อสิ่งอาจจะซ่อนอยู่เบื้องหลังระบบดาวของพวกเขา"
 fircon.1490.a:0 "และพวกเขาก็ควรจะกลัวเช่นนั้นจริง ๆ"
 fircon.1500.name:0 "คำประกาศจากผู้สนับสนุนระบบขับเคลื่อน"
 fircon.1500.desc:0 "เราได้รับรายงานเกี่ยวกับระบบขับเคลื่อนยานอวกาศที่เร็วเหนือแสงบน §Y[pre_ftl_planet.GetName]§! ประชากรดูเหมือนจะตั้งใจที่จะกลายเป็นอารยธรรมท่องอวกาศอย่างเต็มตัว สิ่งที่พวกเขาค้นพบในหมู่ดาวอาจจะกลายเป็นสิ่งที่มากเกินไปสำหรับพวกเขาที่จะทำความเข้าใจได้"
 fircon.1505.name:0 "มีสิ่งที่จะได้มากมาย แต่ก็มีสิ่งที่จะสูญเสียมากเช่นกัน"
 fircon.1505.desc:0 "การมีอยู่ของยานพาหนะที่สามารถเดินทางได้เร็วกว่าแสงในทางทฤษฎีบน §Y[event_target:pre_ftl_planet.GetName]§! ได้รับการยืนยันแล้วในตอนนี้ พวกเขาได้เริ่มทำการทดสอบ โดยหวังว่าจะทะลวงกำแพงความเร็วแสงได้ในไม่ช้า\n\nหากพวกเขาประสบความสำเร็จ ในทางเทคนิคแล้วพวกเขาจะพร้อมที่จะมีส่วนร่วมในการทูตระดับกาแล็กซี การเผชิญหน้าเช่นนี้ย่อมส่งผลกระทบอย่างลึกซึ้งต่อสังคมของพวกเขาอย่างแน่นอน ไม่ว่าจะดีหรือร้ายก็ตาม"
 fircon.1505.a:0 "พวกเขาต้องเรียนรู้ด้วยตัวเอง เฝ้าสังเกตการณ์จากระยะไกล"
 fircon.1505.b:0 "พวกเขายังไม่พร้อม จงวินาศกรรมภารกิจของพวกเขาซะ"
 fircon.1505.c:0 "เปลี่ยนแนวทางของเรา ช่วยให้พวกเขาเดินทางไปสู่ดวงดาว!"
 fircon.1505.d:0 "พวกเราเริ่มเหนื่อยล้าแล้ว เร่งรัดการเดินทางของพวกเขาเสีย"
 fircon.1510.name:0 "การแยกจากกันโดยสมบูรณ์"
 fircon.1510.desc:0 "ผู้ที่มีความทะเยอทะยานจะเดินทางสู่อวกาศบน §Y[pre_ftl_planet.GetName]§! พยายามที่จะทำลายขีดจำกัดความเร็วแสง คนทั้งโลกต่างเฝ้ามองดูยานอวกาศที่ปล่อยขึ้นไปสู่หมู่ดาว\n\nการทะยานขึ้นสู่ท้องฟ้าประสบความสำเร็จ ทุกอย่างดำเนินไปตามตัวแปรที่คาดไว้ จากนั้นพวกเขาก็เปิดใช้งานระบบวาร์ปไดรฟ์ของพวกเขา และเหตุการณ์ต่าง ๆ ก็เริ่มเปลี่ยนไป\n\nพวกเขาสามารถบิดเบือนรูปร่างของมิติปริภูมิ-เวลาได้สำเร็จ (ซึ่งเป็นวิธีบุกเบิกที่น่าทึ่งแต่ก็ยังมีข้อบกพร่องในการทำลายขีดจำกัดความเร็วแสง) ทว่าพวกเขากลับทำได้สำเร็จเพียงแค่ในส่วนท้ายของตัวยานเท่านั้น ความหายนะที่ตามมานั้นเกินกว่าที่ประชากรใน §Y[pre_ftl_planet.GetName]§! จะคาดคิดได้ ลูกเรือถูกบิดเบี้ยวอย่างรุนแรง ติดอยู่ในส่วนหนึ่งของอวกาศ ในขณะเดียวกันส่วนอื่น ๆ ของพวกเขากลับถูกยืดออกไปสู่อนาคต\n\nอาจต้องใช้เวลาอีกสักระยะก่อนที่พวกเขาจะพร้อมสำหรับการพยายามครั้งที่สอง"
 fircon.1510.a:0 "หากเราเตือนพวกเขา ป่านนี้พวกเขาคงได้เป็นนักเดินทางท่องอวกาศไปแล้ว..."
 fircon.1510.b:0 "เป็นไปตามคาด ความล้มเหลวของพวกเขานั้นเป็นเรื่องที่เลี่ยงไม่ได้"
 fircon.1515.name:0 "การเดินทางท่องอวกาศเริ่มต้นขึ้น"
 fircon.1515.desc:0 "ประชากรของ §Y[pre_ftl_planet.GetName]§! ได้สร้างความก้าวหน้าอย่างน่าทึ่งในการทดลองระบบจัมป์ไดรฟ์ของพวกเขา ทว่ามีข้อผิดพลาดร้ายแรงบางประการในการคำนวณระยะทางที่คาดไว้ของเครื่องกำเนิดการบิดเบือนมิติปริภูมิ-เวลา ด้วยการสื่อสารโดยตรง เราจึงสามารถนำทางพวกเขาไปสู่แนวทางการเดินทางที่เร็วกว่าแสงซึ่งเป็นที่ยอมรับผ่านเครือข่ายไฮเปอร์เลน\n\nตามคำแนะนำของเรา [pre_ftl_planet.GetName] จะเข้าร่วมกับเราในฐานะสังคมท่องอวกาศระดับกาแล็กซีในไม่ช้า"
 fircon.1515.a:0 "เรารอคอยการมาเยือนของพวกเขาเข้าสู่ชุมชนกาแล็กซีที่กว้างใหญ่ขึ้น"
 fircon.1520.name:0 "ท่ามกลางพวกเรา"
 fircon.1520.desc:0 "ผู้อยู่อาศัยใน §Y[pre_ftl_planet.GetName]§! ได้เข้าร่วมชุมชนกาแล็กซีที่กว้างใหญ่ขึ้นในฐานะสังคมท่องอวกาศแล้ว!\n\nภารกิจสังเกตการณ์ของเราได้ข้อสรุปแล้ว เนื่องจากตอนนี้พวกเขาสามารถเดินทางด้วยความเร็วเหนือแสง(FTL)ได้แล้ว"
 fircon.1520.a:0 "ยินดีต้อนรับสู่กาแล็กซี"
 fircon.1520.b:0 "พวกเขาควรจะอยู่ห่างจากทางของเราไว้จะดีกว่า"
 unadavance_tech_tt:0 "เทคโนโลยีของพวกเขาลดถอยลง ส่งผลให้พวกเขากลับไปสู่ยุคก่อนหน้าในพัฒนาการของตนเองอย่างมีนัยสำคัญ"

 # Observation Modifiers
 protect_our_image:0 "ปกป้องภาพลักษณ์ของเรา"
