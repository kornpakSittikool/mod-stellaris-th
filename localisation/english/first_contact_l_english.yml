 ## Traits ##

 leader_trait_fotd_scientist:0 "เจ้าเล่ห์"
 leader_trait_fotd_scientist_desc:0 "ประสบการณ์ของนักวิทยาศาสตร์ผู้นี้ส่งผลให้ได้ข้อมูลเชิงลึกที่มีค่าเกี่ยวกับเทคโนโลยีพรางตัว"
 leader_trait_fotd_scientist_tooltip:0 "เพิ่มโอกาสในการค้นพบข้อมูลเชิงลึกด้าน §Hการ ปลอม แปลง เทคโนโลยี§! ที่เกี่ยวข้องกับฟิสิกส์"

 leader_trait_fotd_commander:0 "เจ้าเล่ห์"
 leader_trait_fotd_commander_desc:0 "การเลี้ยงดูของขุนพลผู้นี้สอนให้พวกเขารู้จักการใช้เทคโนโลยีพรางตัวในแบบที่ผู้บัญชาการของเราไม่มีวันจินตนาการได้"

 ## Modifiers ##

 fotd_settled_differences:0 "ข้อยุติของความเห็นต่าง"
 fotd_settled_differences_desc:0 "หลังจากยุติความขัดแย้งทางอุดมการณ์แล้ว ผู้คนเหล่านี้ก็ยืนหยัดเป็นหนึ่งเดียวกัน"

 fotd_alien_shock:0 "ความตื่นตระหนกต่อสิ่งมีชีวิตต่างดาว"
 fotd_alien_shock_desc:0 "ดาวเคราะห์พันธมิตรของเราตอบสนองในทางลบต่อข่าวเรื่องสิ่งมีชีวิตต่างดาว และความรู้สึกเหล่านั้นได้แพร่กระจายมาสู่ผู้คนของเราผ่านทางสื่อและการสื่อสารร่วมกัน"

 fotd_alien_terrified:0 "การเปิดเผยอันน่าสะพรึงกลัว"
 fotd_alien_terrified_desc:0 "บางทีดาวเคราะห์พันธมิตรของเราอาจจะพูดถูก: ข่าวอันน่าสะพรึงกลัวเกี่ยวกับสัตว์ประหลาดขนาดยักษ์เหล่านี้ได้บั่นทอนเสถียรภาพของโลกทั้งสองของเรา"

 fotd_refusal_to_work:0 "การปฏิเสธที่จะทำงาน"
 fotd_refusal_to_work_desc:0 "การประท้วงที่ไร้เดียงสาจากการดำเนินการทางการทูตเมื่อเร็วๆ นี้ เพื่อนบ้านของเราได้ยุติความร่วมมือทางวิทยาศาสตร์ทั้งหมด แน่นอนว่าเรื่องนี้จะผ่านพ้นไปในไม่ช้า"

 fotd_forced_to_stay:0 "ถูกบังคับให้อยู่ต่อ"
 fotd_forced_to_stay_desc:0 "ผู้คนบนดาวเคราะห์ดวงนี้ถูกปฏิเสธโอกาสในการย้ายออกไป ไม่ต้องบอกก็รู้ว่าหลังจากพวกเขายื่นขอโยกย้ายถิ่นฐาน พวกเขาไม่พอใจอย่างยิ่งกับผลลัพธ์นี้"

 fotd_disunity:0 "ความไม่สามัคคี"
 fotd_disunity_desc:0 "ดาวเคราะห์เพื่อนบ้านของเราเชื่อว่าสถานการณ์ทางการเมืองในปัจจุบันเป็นสิ่งที่หลีกเลี่ยงไม่ได้ พวกเขาไม่รอช้าที่จะเตือนเราถึงข้อเท็จจริงนี้"

 fotd_unified_stance:0 "จุดยืนที่เป็นหนึ่งเดียว"
 fotd_unified_stance_desc:0 "สิ่งนี้ถือเป็นภัยคุกคามต่อโลกของเราทั้งสองดวง มันต้องได้รับการจัดการก่อนที่จะกลับไปหารือเรื่องภายในของเรา"

 fotd_unified_purpose:0 "เป้าหมายที่เป็นหนึ่งเดียว"
 fotd_unified_purpose_desc:0 "มีบางอย่างกำลังคุกคามกาแล็กซีของเรา เราจะยืนหยัดต่อสู้กับมัน ร่วมเป็นหนึ่งเดียวกัน"

 slowed_science_ships:0 "การสำรวจถูกระงับชั่วคราว"
 slowed_science_ships_desc:0 "อันเป็นผลมาจากข้อตกลงการวิจัยร่วมกับดาวเคราะห์พันธมิตรของเรา ในเวลานี้การสำรวจโลกใหม่ของเราจะถูกระงับไว้ชั่วคราว"

 slowed_first_contact:0 "การติดต่อครั้งแรกหยุดชะงัก"
 slowed_first_contact_desc:0 "เพื่อเป็นการแลกเปลี่ยนกับเทคโนโลยีใหม่จากดาวเคราะห์พันธมิตรของเรา เราจึงตกลงที่จะยุติโครงการติดต่อครั้งแรกในปัจจุบัน"

 supporting_haven:0 "การแลกเปลี่ยนที่เป็นธรรม"
 supporting_haven_desc:0 "เราได้เทคโนโลยีใหม่ พวกเขาได้ทรัพยากรเพิ่มขึ้น เป็นการแลกเปลี่ยนที่สมเหตุสมผลดี"

 promised_no_shroud:0 "สัญญาว่าจะไม่หยั่งรู้ให้ลึกไปกว่านี้"
 promised_no_shroud_desc:0 "เราได้สัญญากับดาวเคราะห์พันธมิตรของเราว่าจะไม่เจาะลึกเข้าไปในความลึกลับของพลังไซโอนิกส์หรือเทคโนโลยีไปมากกว่านี้ พวกเขากังวลว่าเราอาจจะสูญเสียตัวตนไป ช่างเป็นความวิตกกังวลที่ไร้เดียงสาจริงๆ"

 have_no_voice:0 "ไร้เสียง"
 have_no_voice_desc:0 "อิทธิพลทางการทูตของเราถูกจำกัดอย่างรุนแรง ในขณะนี้เราจำต้องยอมไร้เสียงบนเวทีกาแล็กซี เทคโนโลยีที่เราได้รับมาเป็นการแลกเปลี่ยนควรจะต้องคุ้มค่ากับสิ่งนี้"

 ruined_mass_driver:0 "ซากปืนยิงมวลสาร"
 ruined_mass_driver_desc:0 "ซากที่หลงเหลืออยู่ของปืนยิงมวลสารกาแล็กซีอันยิ่งใหญ่ของชาว $NAME_fotd_Hunter_species$ ถึงแม้ว่าจะใช้งานไม่ได้อีกต่อไปแล้ว แต่การศึกษามันน่าจะช่วยเพิ่มพูนความเข้าใจของเราในเรื่องขีปนาวุธศาสตร์"

 fotd_secure_contact:0 "การติดต่อครั้งแรกอย่างปลอดภัย"
 fotd_secure_contact_desc:0 "เรามีเหตุผลให้เชื่อว่าความพยายามในการติดต่อครั้งแรกของเราถูกเจาะข้อมูลแล้ว จากนี้ไปเราต้องระมัดระวังให้มากขึ้น"

 fotd_assited_shipyards:0 "การสนับสนุนอู่ต่อเรือ"
 fotd_assited_shipyards_desc:0 "อู่ต่อเรือต่างๆ กำลังดำเนินการด้วยประสิทธิภาพ 110% ต้องขอบคุณการสนับสนุนจากดาวเคราะห์พันธมิตรของเรา"

 fotd_assisted_fleet:0 "กองยานที่มีลูกเรือพร้อมสรรพ"
 fotd_assisted_fleet_desc:0 "ด้วยการร่วมมือกับดาวเคราะห์พันธมิตรของเรา ยานรบของเราจึงเคลื่อนกำลังพลได้อย่างมีประสิทธิภาพอย่างที่ไม่เคยมีมาก่อน"

 fotd_unified_fleet:0 "กองยานร่วมพันธมิตร"
 fotd_unified_fleet_desc:0 "ยานรบของเราบังคับทิศทางได้ดีขึ้นกว่าที่เคย ต้องขอบคุณคณะนายทหารของดาวเคราะห์พันธมิตรของเรา"

 fotd_terrified_outraged:0 "หวาดกลัวและเดือดดาล"
 fotd_terrified_outraged_desc:0 "การกระทำของเราทำให้สมาชิกบางคนในเผ่าพันธุ์เยาะเย้ยว่าเราไม่ใช่ [Root.Species.GetName] ที่แท้จริงอีกต่อไป แต่ความเห็นของพวกเขานั้นไร้ความหมาย ตอนนี้เราอยู่เหนือกว่าการตัดสินใดๆ แล้ว"

 fotd_extorted_seperatists:0 "กลุ่มแบ่งแยกดินแดนที่ถูกกรรโชก"
 fotd_extorted_seperatists_desc:0 "เราอาจจะใช้วิธีรุนแรงเพื่อให้ได้มาซึ่งทรัพยากรเหล่านี้ แต่จะมีอันตรายอะไรล่ะ? คนบางคนก็แค่ต้องใช้การโน้มน้าวใจมากกว่าคนอื่นนิดหน่อย"

 fotd_rationed_living:0 "การดำรงชีวิตแบบปันส่วน"
 fotd_rationed_living_desc:0 "หลังจากประสบปัญหาการขาดดุลอย่างรุนแรง ตอนนี้ดาวเคราะห์พันธมิตรของเราจึงต้องปรับลดงบประมาณของสถาบันที่ไม่จำเป็นลง ส่งผลให้โครงการแลกเปลี่ยนทางวัฒนธรรมของเราย่ำแย่ลงตามไปด้วย"

 fotd_triumviri:0 "คณะสามผู้ปกครอง(Triumviri)"
 fotd_triumviri_desc:0 "ในขณะที่ดาวเคราะห์พันธมิตรของเราให้ข้อมูลเชิงลึกในด้านเทคโนโลยีและยุทธวิธี มุมมองทางประวัติศาสตร์ที่เป็นเอกลักษณ์ของชาวฝรั่งเศสก็ได้ให้มุมมองใหม่ในการพิจารณาสังคมของเราเองเช่นกัน"

 #Projects

 fotd_chain_title:0 "หวาดกลัวความมืด"
 fotd_chain_desc:0 "ในฐานะเหยื่อของการถูกรุกรานโดยไม่มีการยั่วยุจากศัตรูที่มีเทคโนโลยีเหนือกว่า เราย่อมเข้าใจถึงราคาของความประมาทเลินเล่อ จะไม่มีวันให้เกิดขึ้นอีกเป็นอันขาด"
 fotd_hunter_poi:0 "ระบบดาวผู้ล่า"
 fotd_hunter_desc:0 "ระบบดาวที่เป็นจุดเริ่มต้นของการโจมตีซึ่งทำลายล้าง §Yตัวแบ่ง§! ผลการสแกนระบุว่าระบบนี้อุดมไปด้วยแร่ธาตุอย่างผิดปกติ"

 FOTD_CONFIRM_FINDINGS:0 "ยืนยันผลการค้นพบ"
 FOTD_CONFIRM_FINDINGS_DESC:0 "ดาวเคราะห์น้อยที่ตีตัวแบ่งมีจํานวนผิดปกติของทังสเตนและ ปัจจุบันนักวิทยาศาสตร์หลายคนอ้างว่ามี\"การพิสูจน์\"ดาวเคราะห์น้อยที่พุ่งชนตัวหารนั้นมีปริมาณทังสเตนสูงผิดปกติ และตอนนี้นักวิทยาศาสตร์หลายคนต่างอ้างว่าได้รับ "

 FOTD_DEFLECTING_FIELDS:0 "สนามพลังเปลี่ยนทิศทาง"
 FOTD_DEFLECTING_FIELDS_DESC:0 "หากมีเวลาเพียงพอ ยานวิทยาศาสตร์เพียงลำเดียวก็สามารถสร้างสนามพลังงานที่ผันผวนเพื่อเปลี่ยนเวกเตอร์ของขีปนาวุธทังสเตนได้ แต่ลำพังเพียงแค่นั้นอาจจะยังไม่เพียงพอ"

 FOTD_REVERSED_THRUSTERS:0 "เครื่องผลักดันย้อนกลับ"
 FOTD_REVERSED_THRUSTERS_DESC:0 "ตอร์ปิโดที่ได้รับการปรับแต่งเป็นพิเศษสามารถตั้งโปรแกรมให้ยึดตัวเองเข้ากับขีปนาวุธวิถีโค้งได้ ด้วยการย้อนกลับแรงขับดัน พวกมันอาจจะช่วยชะลอความเร็วของ 'ของขวัญ' ชิ้นนี้ลงได้"

 FOTD_COUNTER_SHOT:0 "การยิงสวนกลับ"
 FOTD_COUNTER_SHOT_DESC:0 "แม้ว่าเราจะไม่มีสิ่งใดที่หนาแน่นเทียบเท่ากับดาวเคราะห์น้อยทังสเตนในระบบของเรา แต่เราก็ไม่ขาดแคลนเศษหินในอวกาศอย่างแน่นอน แม้ว่าจะมีความเร็วต่ำกว่าแสง แต่การยิงดาวเคราะห์น้อยสวนกลับไปยังภัยคุกคามปัจจุบันก็น่าจะช่วยได้บ้าง"

 FOTD_CONTROLLED_SHATTERING:0 "การทุบทำลายอย่างควบคุมได้"
 FOTD_CONTROLLED_SHATTERING_DESC:0 "การระเบิดทำลายกระสุนทังสเตนอาจดูน่าสนใจ แต่สะเก็ดระเบิดที่เกิดขึ้นก็ยังคงส่งผลกระทบอย่างร้ายแรงต่อโลกของเรา นักวิทยาศาสตร์ของเราได้คำนวณลำดับการจุดระเบิดที่มีการควบคุมซึ่งอาจช่วยแตกกระสุนปืนนี้ออกเป็นรูปแบบที่สามารถจัดการได้ง่ายขึ้นเล็กน้อย"


 ## Scripted Loc ##

 fotdCoercion1:0 "เพื่อดึงดูดใจให้พวกเขาอยู่ต่ออีกไม่กี่ปี เราอาจจะเสนอสิ่งจูงใจให้ อย่าได้ประเมินค่าของสินบนที่มอบให้อย่างถูกจังหวะต่ำเกินไปเด็ดขาด"
 fotdCoercion2:0 "เราสามารถเตือนใจพวกเขาถึงความสุขสบายมากมายที่มีอยู่ที่นี่ และอาจจะยกตัวอย่างที่เป็นรูปธรรมบางประการเพื่อเป็นสิ่งจูงใจในการอยู่ต่อ"
 fotdCoercion3:0 "เอาล่ะ หากพวกเขายังยืนกรานที่จะกลับบ้าน เราก็ไม่มีทางเลือกอื่นนอกจากต้องแจ้งรัฐบาลของพวกเขาเกี่ยวกับความสัมพันธ์กับต่างดาวที่ผิดกฎหมายที่พวกเขากำลังทำอยู่"
 fotdCoercion4:0 "เราสามารถจัดสรรเบี้ยเลี้ยงของรัฐบาลเพื่อสนับสนุนเงินทุนให้กับโครงการนี้ ซึ่งน่าจะช่วยเบี่ยงเบนความสนใจของพวกเขาไปได้อีกระยะหนึ่ง"

