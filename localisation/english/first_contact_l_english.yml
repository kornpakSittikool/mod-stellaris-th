 origin.6005.name:0 "คำร้องขอโอนย้าย"
 origin.6005.desc.base1:0 "นักวิทยาศาสตร์จาก [fotd_habitants.capital_scope.GetName] ได้ยื่นคำร้องขอเข้าร่วมกับเราบน [Owner.GetHomeWorldName]\n\n[fotd_Leader.GetName] เป็นผู้เชี่ยวชาญด้าน [fotd_Leader.GetSpecialization] ซึ่งเทียบเท่ากับ [Root.GetSpeciesName] คนใดก็ตามบน [Root.GetHomeWorldName]"
 origin.6005.desc.base2:0 "นักวิทยาศาสตร์จาก [fotd_habitants.capital_scope.GetName] ได้ยื่นคำร้องขอเข้าร่วมกับเราบน [Owner.GetHomeWorldName]\n\nนักวิทยาศาสตร์ชั้นนำของเราได้ติดต่อสื่อสารกับ [fotd_Leader.GetName] มาเป็นเวลาหลายปี และประทับใจในผลงานของ[fotd_Leader.GetHerHis]เป็นอย่างมาก"
 origin.6005.desc.base3:0 "นักวิทยาศาสตร์จาก [fotd_habitants.capital_scope.GetName] ได้ยื่นคำร้องขอเข้าร่วมกับเราบน [Owner.GetHomeWorldName]\n\nแม้ว่า[fotd_Leader.GetSheHe]จะได้รับการอธิบายจากเพื่อนร่วมงานของ[fotd_Leader.GetHerHis]บน [owner.GetHomeWorldName] ว่าเป็นนักวิทยาศาสตร์ที่มีความหวาดระแวงน้อยที่สุดบน [fotd_habitants.capital_scope.GetName] แต่นั่นก็ไม่ได้ช่วยให้ดูดีขึ้นเท่าไหร่เลย"
 origin.6005.desc.base4:0 "นักวิทยาศาสตร์จาก[fotd_habitants.capital_scope.GetName]ได้ขอเข้าร่วมกับเรา[Owner.GetHomeWorldName].\n\n[fotd_Leader.GetName]แต่งตัวเหมือนผู้เสียสละ ในการเดินทางของเรา\"โลกที่เต็มไปด้วยเงา\"นักวิทยาศาสตร์จาก [fotd_habitants.capital_scope.GetName] ได้ยื่นคำร้องขอเข้าร่วมกับเราบน [Owner.GetHomeWorldName]\n\n[fotd_Leader.GetName] ทำตัวประหนึ่งผู้ยอมพลีชีพเพื่ออุดมการณ์ ในการเดินทางมายัง "

 origin.6005.desc.end1:0 "[fotd_Leader.GetSheHeCap] ได้ติดต่อหาเราเนื่องจากสิ่งอำนวยความสะดวกที่จำกัดบน [fotd_habitants.capital_scope.GetName] กำลังขัดขวางการวิจัยของ[fotd_Leader.GetHerHis] นักวิทยาศาสตร์ของเราได้รับการรับรองความประพฤติที่ดีของผู้มาเยือนที่มีศักยภาพรายนี้แล้ว"
 origin.6005.desc.end2:0 "งานวิจัยของ[fotd_Leader.GetHerHis]ถูกจัดว่าเป็นอันตรายโดยรัฐบาลของ[fotd_Leader.GetHerHis] ความสูญเสียของพวกเขาคือผลประโยชน์ของเรา"
 origin.6005.desc.end3:0 "[fotd_Leader.GetSheHeCap] จะได้รับรางวัลอันทรงเกียรติบน [Owner.GetHomeWorldName] สำหรับความเป็นเลิศทางวิชาการ [fotd_Leader.GetSheHeCap] ยังตกลงที่จะอยู่กับเราสักระยะหนึ่งเพื่อจัดบรรยายเกี่ยวกับงานวิจัยของพวกเขา"
 origin.6005.desc.end4:0 "[fotd_Leader.GetSheHeCap] จะทำการศึกษา [GetStudyTopic] ในท้องถิ่น เพื่อพยายามปรับปรุงคุณภาพชีวิตบน [fotd_habitants.capital_scope.GetName]"
 origin.6005.a:0 "ยินดีต้อนรับ ตราบใดที่คุณปฏิบัติตามบรรทัดฐานของสังคมนี้"
 origin.6005.a.tt:0 "เพิ่ม §Y[fotd_Leader.GetName]§! เป็น §Hนักวิทยาศาสตร์§! ใน §H$RECRUITABLE_LEADERS$§! ของเรา"
 origin.6005.b:0 "อยู่บนก้อนหินของเจ้าต่อไปเถอะ"

 origin.6006.desc.base1:0 "ผู้บัญชาการจาก [fotd_habitants.Capital.GetName] เสนอตัวเข้าร่วมกองทัพเรือของเราในฐานะผู้บัญชาการชั่วคราว แรงจูงใจของ[fotd_Leader.GetSheHeCap]ยังไม่ชัดเจน แต่ผู้ให้ข้อมูลของเราบอกว่าอาจจะมีเรื่องอื้อฉาวเข้ามาเกี่ยวข้อง"
 origin.6006.desc.base2:0 "[fotd_Leader.GetName] กระตือรือร้นที่จะเซ็นสัญญาร่วมงานกับเราเป็นการชั่วคราว [fotd_habitants.Capital.GetName] เป็นแหล่งเพาะพันธุ์สำหรับยุทธวิธีที่มีเล่ห์เหลี่ยมและแปลกใหม่อยู่เสมอ"
 origin.6006.desc.base3:0 "หลังจากทำผลงานได้อย่างยอดเยี่ยมในการซ้อมรบร่วมของกองยานเมื่อเร็วๆ นี้ เราได้หยิบยื่นโอกาสให้ผู้บัญชาการ [fotd_Leader.GetName] เข้ามาควบคุมสั่งการในกองทัพเรือจริงๆ"
 origin.6006.desc.base4:1 "เนื่องจากถูกสั่งพักงานชั่วคราวจากข้อกล่าวหาที่ว่าทำให้ยานพาหนะภายใต้การบังคับบัญชาของ[fotd_Leader.GetHerHis]ตกอยู่ในอันตรายเกินควร ผู้บัญชาการ [fotd_Leader.GetName] จึงได้ยื่นคำร้องขอเข้าร่วมกองทัพเรือของเรา แม้จะมีชื่อเสียงเช่นนั้น แต่บรรดาผู้ที่เคยร่วมงานกับ [fotd_Leader.GetHerHim] ก็ยังคงเคารพในความสามารถของ[fotd_Leader.GetHerHis]"
 origin.6006.a:0 "ตราบใดที่คุณไม่คิดนอกลู่นอกทาง"
 origin.6006.a.tt:0 "เพิ่ม §Y[fotd_Leader.GetName]§! เป็น §Hผู้บัญชาการ§! ใน §H$RECRUITABLE_LEADERS$§! ของเรา"
 origin.6006.b:0 "เจ้ามันเหมือนท่อตอร์ปิโดที่หลวมเกินไป!"

 origin.6010.name:0 "ความโหยหาที่มีต่อ [fotd_seperatist_planet.GetName]"
 origin.6010.desc:0 "หลังจากใช้ชีวิตอยู่ร่วมกับเรามาหลายปี [fotd_Leader.GetName] ได้ตัดสินใจเดินทางกลับบ้าน บางคนในรัฐบาลคัดค้านการย้ายครั้งนี้ เนื่องจาก [fotd_Leader.GetName] ได้กลายมาเป็นส่วนสำคัญในความเป็นผู้นำระดับสูงของเรา\n\n[GetfotdCoercion]"
 origin.6010.a:0 "เราจะรักษาคำพูดของเรา"
 origin.6010.a.tt:0 "[fotd_Leader.GetName] จะกลับไปยัง [fotd_seperatist_planet.GetName]"
 origin.6010.b:0 "เราจำเป็นต้องรั้งพวกเขาไว้ไม่ว่าจะต้องแลกด้วยอะไรก็ตาม"
 origin.6011.desc:0 "เมื่อเร็วๆ นี้ [fotd_Leader.GetName] เริ่มเก็บตัวมากขึ้นเรื่อยๆ อีกครั้งหนึ่งที่[fotd_Leader.GetSheHe]กำลังขออนุญาตเดินทางกลับบ้าน เพื่อนร่วมงานของ[fotd_Leader.GetHerHis]สังเกตว่าอาการซึมเศร้าของ[fotd_Leader.GetHerHis]ส่งผลกระทบต่องาน และแนะนำให้เราปล่อย[fotd_Leader.GetHerHis]ไป"

 origin.6012.name:0 "กลับบ้านแล้ว"
 origin.6012.desc:0 "ในช่วงหลายรอบช่วงเวลาที่ผ่านมา มีผู้พบเห็น [fotd_Leader.GetName] บ่นพึมพำกับตัวเองและเดินวนเวียนตามโถงทางเดิน วันนี้[fotd_Leader.GetSheHe]ไม่ได้มาทำงาน และยังมีรายงานว่ากระสวยอวกาศหลบหนีลำหนึ่งของเราสูญหายไป ไม่น่าเป็นไปได้ที่เหตุการณ์เหล่านี้จะเป็นเรื่องบังเอิญ"
 origin.6012.a.tt:0 "[fotd_Leader.GetName] กลับไปยัง [fotd_seperatist_planet.GetName]"
 origin.6015.name:0 "ข้อมูลเชิงลึกระหว่างระบบดาว"
 origin.6015.desc:0 "ดูเหมือนว่านักวิทยาศาสตร์บนดาวเคราะห์พันธมิตรของเราได้ค้นพบสิ่งใหม่ๆ ที่เฉียบแหลมในสาขา [root.fotdGetTech] แม้ว่าพวกเขาจะมีแนวโน้มที่คับแคบ แต่ก็ปฏิเสธไม่ได้ว่าในกรณีนี้ เทคโนโลยีของพวกเขาได้ก้าวล้ำเกินหน้าความสำเร็จของเราไปแล้ว\n\nพวกเขายินดีที่จะแบ่งปันข้อมูลเชิงลึกกับเรา เพื่อแลกกับการที่พวกเราต้องจ่าย [root.fotdGetTechPrice] ซึ่งเป็นราคาที่แพงลิบลิ่วอย่างแน่นอน"
 origin.6015.a:0 "ก็ได้ เราจะยอมปฏิบัติตาม"
 origin.6015.a.tt:0 "สิ่งนี้จะขัดขวางไม่ให้เราเข้าถึง §Yเดอะชราวด์(เสียงหลง)§! เป็นเวลา §R10 ปี§!"
 origin.6015.b:0 "ส่งสายลับเข้าไป"
 origin.6015.c:0 "พวกเขาวิปลาสไปแล้วหรือ? เราไม่มีทางยอมรับข้อนี้แน่"

 origin.6020.name:0 "คำร้องขอ [root.GetSeperatistAid] ของ [fotd_seperatist_planet.GetName]"
 origin.6020.desc:0 "ไม่ว่าจะเกิดจากความประมาทเลินเล่อ ความไร้ความสามารถ หรือความโชคร้ายอย่างที่สุด ตอนนี้ §Y[fotd_seperatist_planet.GetName]§! กำลังประสบปัญหาขาดแคลนเสบียง [root.GetSeperatistAid] หากปราศจากความช่วยเหลือ มีความเป็นไปได้สูงมากที่ประชากรนับล้านจะต้องทนทุกข์ทรมาน"
 origin.6020.a:0 "เราต้องช่วยเหลือเพื่อนร่วม [fotd_seperatist_planet.owner.GetSpeciesNamePlural] ของเรา"
 origin.6020.a.tt:0 "[fotd_seperatist_planet.GetName] จะจดจำสิ่งนี้ไว้"
 origin.6020.b:0 "เราจะได้อะไรเป็นการตอบแทน?"
 origin.6020.c:0 "หากพวกเขาต้องการความช่วยเหลือ พวกเขาควรกลับมารวมกับเรา"
 origin.6025.name:0 "ข้อเสนอช่วยเหลือ [root.GetFotDAid] จาก [fotd_seperatist_planet.GetName]"
 origin.6025.desc.base:0 "ดูเหมือนว่าความช่วยเหลือทางเศรษฐกิจจะมาจากแหล่งใกล้เคียง [fotd_seperatist_planet.GetName] พร้อมที่จะระงับผลกระทบที่เลวร้ายที่สุดของวิกฤต [root.GetFotDAid] ในปัจจุบันของเราแล้ว "
 origin.6025.desc.helped:0 "$origin.6025.desc.base$\n\nเนื่องจากการสนับสนุนในอดีตของเรา พวกเขาจึงตัดสินใจตอบแทนคุณงามความดี โดยเสนอความช่วยเหลือแก่เราโดยไม่มีค่าใช้จ่าย"
 origin.6025.desc.didnthelp:0 "$origin.6025.desc.base$\n\nข้อความอันอวดดีแจ้งให้เราทราบว่า ราคาสำหรับความช่วยเหลือของพวกเขาคือ [root.fotdGetTechPrice] เรามีทางเลือกอื่นด้วยหรือ?"
 origin.6025.a:0 "ช่างเป็นเพื่อนบ้านที่ดีจริงๆ"
 origin.6025.b:0 "มอบสิ่งที่พวก [fotd_seperatist_planet.Owner.GetSpeciesNamePluralInsult] ต้องการให้พวกมันไป"
 origin.6025.c:0 "เราจะฝ่าฟันสิ่งนี้ไปด้วยตัวเองเพียงลำพัง"

 origin.6030.name:0 "การกวาดล้างครั้งแรก"
 origin.6030.desc:0 "ในขณะที่ข่าวยืนยันว่ามีมนุษย์ต่างดาว ไม่ได้ทั้งหมดไม่คาดคิดสําหรับ[Root.GetHomeWorldName]มันรู้สึกแย่[fotd_seperatist_planet.GetName]พวกเขาอยู่กับความหวังเชิงลบ ว่าบางทีการทําลายล้างของตัวแบ่งเป็นเพียงอุบัติเหตุประหลาด\n\n\"เราต้องทําลายเอเลี่ยนพวกนี้ ก่อนที่พวกมันจะมาถึงที่นี่ และทํางานให้เสร็จ!\"แม้ว่าข่าวการยืนยันการมีอยู่ของเอเลี่ยนจะไม่ใช่เรื่องที่คาดไม่ถึงทั้งหมดสำหรับ [Root.GetHomeWorldName] แต่กลับส่งผลร้ายแรงยิ่งกว่าบน [fotd_seperatist_planet.GetName] พวกเขาเคยใช้ชีวิตอยู่ด้วยความหวังอันริบหรี่ว่าบางทีการทำลายล้างของตัวหารอาจเป็นเพียงอุบัติเหตุประหลาด แต่ตอนนี้พวกเขามั่นใจแล้วว่าจักรวาลนี้กำลังมุ่งร้ายต่อพวกเขา\n\n"
 origin.6030.a:0 "นั่นคือกาแล็กซีที่เราอาศัยอยู่ ในไม่ช้าพวกเขาก็จะปรับตัวได้เอง"
 origin.6030.b:0 "นี่มันไร้สาระ บล็อกการส่งสัญญาณของพวกเขาเสีย"

 origin.6040.name:0 "พบผู้สะกดรอยตาม"
 origin.6040.desc:0 "ข่าวการค้นพบสิ่งมีชีวิตเอเลี่ยนที่มีสติปัญญาได้แพร่ไปถึง [fotd_seperatist_planet.GetName] แล้ว ทว่า แทนที่จะเป็นความกลัวและโกรธเกรี้ยวที่เราคาดว่าจะได้เห็นจาก [fotd_seperatist_planet.GetName] พวกเขากลับเงียบงันลง ยานระหว่างระบบหลายลำได้เดินทางกลับไปยังอู่ต่อเรือ และเครื่องยนต์ความเร็วเก่าบางส่วนหายไปจากคลังเก็บ ดูเหมือนว่าพวกเขากำลังเตรียมการสำหรับการเดินทางนอกสถานที่"
 origin.6040.a:0 "เราจำเป็นต้องรู้ว่าเกิดอะไรขึ้น"
 origin.6040.a.tt:0 "ป้องกันการสืบสวนของเราจากการรั่วไหลของข้อมูลที่อาจเกิดขึ้น"
 origin.6040.b:0 "ปล่อยให้พวกเขาเล่นสนุกไปเถอะ"

 origin.6045.name:0 "การแนะนำตัวอันหายนะ"
 origin.6045.desc.base:0 "หลังจากการติดต่อสื่อสารครั้งแรกกับ [From.GetName] เราได้รับข่าวร้ายบางอย่าง: กองยานโจมตีที่เป็นยานรุ่นเก่าของ [Root.GetAdj] ได้เข้าสู่เขตอวกาศของ [From.GetSpeciesAdj] และขณะนี้กำลังมุ่งหน้าอย่างรวดเร็วไปยังฐานทัพอวกาศของพวกเขา ยานที่กำลังเร่งความเร็วนั้นเคลื่อนที่ด้วยอัตราความเร็วที่สิ่งมีชีวิต [owner_species.GetBiologicalLithoidLower] ใดก็ตามภายในนั้นคงจะถูกบดขยี้จนกลายเป็นของเหลว [owner_species.GetLiquidState] ไปแล้วในตอนนี้"
 origin.6045.desc.secured:0 "$origin.6045.desc.base$\n\nโชคดีที่เราเตรียมพร้อมไว้แล้ว เมื่อได้สังเกตพฤติกรรมแปลกๆ ของ [fotd_seperatist_planet.GetName] เราจึงพร้อมที่จะยิงพวกเขาให้ร่วงกลางอวกาศก่อนที่พวกเขาจะเข้าชนสถานี"
 origin.6045.desc.notsecured:0 "$origin.6045.desc.base$\n\nไม่มีสิ่งใดที่เราจะทำได้เพื่อหยุดยั้งหายนะครั้งนี้ มิสไซล์ขนาดมหึมาเหล่านี้จะทำลายล้างฐานทัพอวกาศใน [target_system.GetName] ลงอย่างสิ้นเชิง เราทำได้เพียงเฝ้ามองด้วยความหวาดกลัว เว้นแต่ว่า..."
 origin.6045.a:0 "หยุดพวกเขาเดี๋ยวนี้!"
 origin.6045.starbase_destroyed.tt:0 "ฐานทัพอวกาศใน §Y[target_system.GetName]§! จะถูก §Rทำลาย§!"
 origin.6045.b.secured:0 "ปล่อยให้พวกเขาบั่นทอนกำลังพวกเอเลี่ยนลงก่อน จากนั้นค่อยลงทัณฑ์ [fotd_seperatist_planet.GetName]"
 origin.6045.b.notsecured:0 "ออกคำแถลงขอโทษและลงทัณฑ์ [fotd_seperatist_planet.GetName]"
 origin.6045.c:0 "เพื่อนบ้านของเราอ่อนแอ จงใช้โอกาสนี้เพื่อกําจัดพวกเขาเสีย!"
 origin.6045.c.tt:0 "$origin.6045.starbase_destroyed.tt$\n[fotd_seperatist_planet.GetName] จะส่งมอบการควบคุมเรือคอร์เวต §Y5§! ลำใน §Y[target_system.GetName]§!\nจะเข้าสู่ §Rสงครามเบ็ดเสร็จ(สงครามกลางเมือง)§! กับ §Y[From.GetName]§!"
 origin.6046.name:0 "สูญเสียฐานทัพอวกาศ"
 origin.6046.desc:1 "ฐานดาวของเราใน§Y[target_system.GetName]§!ถูกทําลายโดยสิ่งที่เรียกว่า\"สายลับ\"ฐานทัพอวกาศของเราใน §Y[target_system.GetName]§! ถูกทำลายลงโดยผู้ที่เรียกตัวเองว่า "
 origin.6046.a:0 "จับตาดูพวกเขาไว้"
 origin.6046.b:0 "พวกมันคุกคามการดำรงอยู่ของเรา ไม่พวกมันก็เราที่ต้องมอดม้วย!"
 origin.6047.name:0 "ผู้ล่าและเหยื่อ"
 origin.6047.desc:0 "ไม่นานหลังจากติดต่อครั้งแรกกับ [From.GetName] ฐานทัพอวกาศของเราใน §Y[target_system.GetName]§! ก็ระเบิดขึ้น ก่อนที่ระบบดาวจะมืดดับไป เราได้รับภาพกองยานรบที่เป็นศัตรูซึ่งมีการออกแบบของ [From.GetAdj]\n\nบัดนี้พวกเราพบว่าตัวเองกำลังเผชิญกับสงครามเพื่อความอยู่รอดอย่างแท้จริง"

 origin.6055.name:0 "ไม่เราก็พวกมัน!"
 origin.6055.desc.base:0 "แม้เราจะพยายามอย่างเต็มที่เพื่อปิดบังพวกเขา แต่ก็ใช้เวลาไม่นานที่ [fotd_seperatist_planet.GetName] จะได้ยินเกี่ยวกับการเป็นสมาชิกของเราใน [owner.federation.GetName] หลักฐานการคลั่งไคล้สิ่งมีชีวิตต่างดาวนี้ได้กระตุ้นให้เกิดปฏิกิริยารุนแรงอย่างยิ่งจากโลกพันธมิตรของเรา คำศัพท์สบประมาทและป้ายสีสำหรับสมาชิกสหพันธ์ของเราได้ผุดขึ้นมาในชั่วข้ามคืน"
 origin.6055.desc.noprotests:0 "$origin.6055.desc.base$\n\nความโกรธแค้นของสาธารณชนได้ลามไปถึงสถาบันต่างๆ ของโลกพันธมิตรของเรา ซึ่งตอนนี้ได้ยุติโครงการความร่วมมือทั้งหมดระหว่างโลกของเราลงแล้ว หวังว่าพันธมิตรในสหพันธ์ใหม่ของเราจะเข้าใจ"
 origin.6055.desc.protests:0 "$origin.6055.desc.base$\n\n[fotd_seperatist_planet.GetName] เริ่มมีความกระสับกระส่ายอยู่แล้วหลังจากการดำเนินการทางการทูตครั้งก่อนของเรา และสิ่งนี้ดูเหมือนจะผลักดันให้พวกเขาหลุดขอบไปเลย ก่อนที่เราจะตัดการเชื่อมต่อได้ พวกเขาก็จัดการส่งข้อความด่าทอหลายข้อความไปยังพันธมิตรของเรา ซึ่งทำลายความสัมพันธ์ของเราจนอาจกู้คืนไม่ได้"
 origin.6055.a:0 "พันธมิตรของเราจะมองเห็นสิ่งนี้ว่าเป็นเพียงเรื่องไร้สาระอย่างแน่นอน"
 origin.6055.b:0 "เรียกตัวผู้แทนทูตมา!"

 origin.6060.name:0 "สุดยอดนักล่า"
 origin.6060.desc:0 "ข่าวสารจากระบบดาว [FromFrom.solar_system.GetName] ได้สั่นคลอนโลกบ้านเกิดของเราอย่างลึกซึ้ง ภัยคุกคามอื่นใดอีกบ้างที่อาจซ่อนตัวอยู่ในความลึกของอวกาศ หากมีสัตว์ประหลาดเช่นนี้ดำรงอยู่ได้? ตอนนี้ คำร้องขออพยพไปยัง [fotd_seperatist_planet.GetName] ได้พุ่งสูงขึ้นในหมู่ประชาชนของเรา ณ เวลานี้ เป็นเรื่องยากที่จะไปโทษพวกเขา"
 origin.6060.a:0 "พวกเราคิดผิดงั้นหรือ?"
 origin.6060.a.tt:1 "ประชากร §R200§! £pop£ §Hป๊อป§! จะอพยพไปยัง [fotd_seperatist_planet.GetName]"
 origin.6060.b:0 "ไม่! [fotd_seperatist_planet.GetName] ต่างหากที่ผิด! เราจะเผชิญหน้ากับสิ่งนี้ไปด้วยกัน"

 origin.6065.name:0 "ผลลัพธ์จากการกระทำของพวกเราเอง"
 origin.6065.desc:0 "หลังจากเรายอมจํานนต่อ[overlord.GetName], [fotd_seperatist_planet.GetName]ไม่ได้เสียเวลาใด ๆ กําจัดเรา\n\nชีวิตของอไลเอนคือศัตรู ถ้าคุณทุกคนได้เพียงแค่อาศัยอยู่ใน[home_planet.GetStarName]เรื่องพวกนี้คงไม่เกิดขึ้นหลังจากเรายอมจำนนต่อ [overlord.GetName] ทาง [fotd_seperatist_planet.GetName] ก็ไม่รีรอที่จะเยาะเย้ยพวกเราในทันที\n\n"
 origin.6065.a:0 "จบการส่งสัญญาณ"

 origin.6075.name:0 "ในคราบแกะ"
 origin.6075.desc:0 "ในการรับรัฐในอารักขา จักรวรรดิของเราได้ก้าวกระโดดครั้งใหญ่ในฐานะมหาอำนาจของกาแล็กซี ทว่า [fotd_seperatist_planet.GetName] กลับไม่ประทับใจ ตามคำบอกเล่าของพวกเขา พวกเราทำสำเร็จเพียงแค่การนำพาภัยคุกคามจากเอเลี่ยนเข้ามาใกล้ขึ้นเท่านั้น เพื่อเป็นการประท้วง พวกเขาจึงได้ยุติความร่วมมือด้านการวิจัยทั้งหมดกับเรา\n\nเมื่อเวลาผ่านไป เราจะพิสูจน์ให้เห็นอย่างแน่นอนว่าพวกเขาคิดผิด"
 origin.6075.a:0 "ประเทศราชของเราไม่มีทางวางแผนทรยศต่อเราอย่างแน่นอน!"

 origin.6085.name:0 "ชิงโจมตีก่อน"
 origin.6085.desc:0 "ในช่วงเริ่มต้นของ [FromFrom.GetName] เราได้พันธมิตรที่คาดไม่ถึง: สหายของเราจาก [fotd_seperatist_planet.GetName] ในที่สุดก็ได้ยืนหยัดเคียงข้างกับเราในประเด็นทางการทูต โดยขอร้องให้เรากวาดล้างพวกต่างดาวให้สิ้นซาก ช่างน่าเสียดายที่เมื่อสงครามสิ้นสุดลง ความร่วมมือของพวกเขาก็จะจบลงตามไปด้วย"
 origin.6085.a:0 "อู่ต่อเรือของเราต้องการความช่วยเหลือ!"
 origin.6085.b:0 "จัดกำลังพลประจำการในยานของเรา"
 origin.6085.c:0 "พวกเขาได้สังเกตเห็นอะไรเกี่ยวกับศัตรูบ้างไหม?"
 origin.6085.d:0 "เราสามารถยืนหยัดได้ด้วยตัวเอง"
 origin.6090.name:0 "บอกแล้วไม่เชื่อ"
 origin.6090.desc:0 "วันที่ผู้อยู่อาศัยบน [fotd_seperatist_planet.GetName] ได้คาดการณ์ไว้มาถึงแล้ว: เมื่อสงครามถูกประกาศต่อต้านเรา กาแล็กซีได้กลายเป็นดินแดนที่ไม่สามารถอยู่อาศัยได้และเต็มไปด้วยความมุ่งร้าย ทว่า ตอนจบของเรื่องราวนี้ยังไม่ได้ถูกเขียนขึ้นมา เราจะรอดพ้นจากสิ่งนี้ไปให้ได้"
 five_percent_xenophobe_tt:1 "ประชากร §Y5%§! จะมีความรู้สึกเกลียดกลัวชาวต่างชาติ(เสียงตกใจ)มากขึ้น"

 #Cyborg
 origin.6095.name:0 "ความคิดแบบมัลติเธรด"
 origin.6095.desc:0 "ยังคงใหม่เพื่อความคิดที่สูงขึ้นเทียมนี้ คนของเรามีความประหลาดใจที่จะได้รับเช่นการคัดค้านการยกระดับใหม่ของเราจาก[fotd_seperatist_planet.GetName]พวกเขาเตือนว่าถ้าเรา\"แฟ้ม\"เนื่องจากยังใหม่ต่อระดับความคิดที่ได้รับการยกระดับขึ้นโดยสิ่งประดิษฐ์นี้ ประชาชนของเราจึงรู้สึกแปลกใจที่ได้รับการคัดค้านอย่างรุนแรงต่อการอัปเกรดใหม่ของเราจาก [fotd_seperatist_planet.GetName] พวกเขาเตือนว่าหากเรา "
 origin.6095.a:0 "พวกเขาไร้เดียงสาเกินกว่าจะเข้าใจว่าต้องทำอย่างไรจึงจะอยู่รอดได้ในกาแล็กซีนี้"

 origin.6096.name:0 "สิทธิ์ในการได้รับการปรับแต่ง"
 origin.6096.desc:0 "จากการตัดสินใจของเราที่จะเปลี่ยนผ่านไปสู่รูปแบบชีวิตไซเบอร์เนติกส์อย่างสมบูรณ์ ประชาชนของ [fotd_seperatist_planet.GetName] ได้ทำตามสัญญาของพวกเขาแล้ว: ทุกช่องทางการสื่อสาร ทุกสถานีวิจัยร่วมมือ และสื่อทุกรูปแบบถูกปิดกั้นลงโดยสิ้นเชิง\n\nคำถามคือเรายังจำเป็นต้องพึ่งพาพวกเขาอยู่อีกหรือไม่ ในเมื่อตอนนี้เราก้าวล้ำไปไกลกว่านั้นมากแล้ว"
 origin.6096.a:0 "ปล่อยให้พวกมันหมอบคลานด้วยความกลัวในความมืดมิดไปเถอะ"

 #Synths
 origin.6099.name:0 "หุ่นเลียนแบบโลหะ"
 origin.6099.desc:0 "ร่างกายสังเคราะห์ชุดแรกกำลังทยอยออกจากโรงงานผลิตและได้รับการตรวจสอบโดยผู้ที่จะเข้ามาอยู่อาศัยในอนาคต อย่างไรก็ตาม ไม่ใช่ทุกคนในเผ่าพันธุ์ [Species.GetName] ที่จะตื่นเต้นกับพัฒนาการอันน่าทึ่งนี้ ผู้อยู่อาศัยใน [fotd_seperatist_planet.GetName] ได้เตือนเราแล้วว่าพวกเขาจะยกเลิกความร่วมมือทั้งหมดหากเรายังคงเดินหน้าไปในเส้นทางนี้"
 origin.6099.a:0 "จงจับตาดูรูปลักษณ์ใหม่ของเรา!"
 origin.6100.name:0 "ความสมบูรณ์แบบเพียงบางส่วน"
 origin.6100.desc:0 "สมาชิกทุกคนของ [Root.GetName] ได้โอบรับร่างสังเคราะห์ใหม่ของพวกเขาแล้ว ทว่า ประชากรของ [fotd_seperatist_planet.GetName] เลือกที่จะอยู่ในร่าง [fotd_seperatist_planet.Owner.Species.GetFleshy] ต่อไป ยิ่งไปกว่านั้น พวกเขายังได้ทำตามคำขู่ที่จะยุติความร่วมมือทุกอย่างกับเราอีกด้วย"
 origin.6100.a:0 "ไม่อาจมองข้ามผ่านคุก [fotd_seperatist_planet.Owner.Species.GetFleshy] ของพวกเขาได้"

 #Psionic
 origin.6105.name:0 "ความนึกคิดที่หลงผิด"
 origin.6105.desc:0 "ไม่มีความจำเป็นต้องรอการตัดสินที่หลีกเลี่ยงไม่ได้จาก [fotd_seperatist_planet.GetName] เรารับรู้ถึงความนึกคิดที่ปั่นป่วนของพวกเขาได้อย่างเต็มเปี่ยม ท่ามกลางเสียงอื้ออึง ความตั้งใจของพวกเขาที่จะยุติความร่วมมือทั้งหมดนั้นชัดเจนราวกับคริสตัล"
 origin.6105.a:0 "ช่างใจแคบเหลือเกิน"
 origin.6110.name:0 "ละทิ้งสิ่งเก่า"
 origin.6110.desc: "ในที่สุดเราก็สามารถเข้าถึงหนึ่งในตัวตนอันยิ่งใหญ่แห่ง §Hเดอะชราวด์§! ได้สำเร็จ อีกครั้งที่เสียงคร่ำครวญ [GetLamentations] ของ [fotd_seperatist_planet.GetName] แทรกซึมเข้ามาหาเรา พวกเขากำลังตัดขาดตัวเองออกจากเครือข่ายของเรา และยกเลิกโครงการวิจัยร่วมกันทุกโครงการ"
 origin.6110.desc_2.default: "มีเพียงเราเท่านั้นที่เข้าใจว่าการกระทำเหล่านั้นช่างไร้ความหมายเพียงใด การถือกำเนิดของพันธมิตรที่ตื่นรู้และชาญฉลาดกว่าเดิมกำลังจะเริ่มต้นขึ้นแล้ว"
 origin.6110.desc_2.robot: "การกระทำที่ไร้ตรรกะเช่นนี้ช่างไร้ความหมาย พลังการประมวลผลของเราได้ยกระดับขึ้นเกินกว่าความเข้าใจอันแสนป่าเถื่อนของพวกเขาแล้ว"
 origin.6110.desc_2.gestalt: "ความเบี่ยงเบนทางปัจเจกนิยมเช่นนั้นอยู่ต่ำกว่าความสนใจของเรา ผู้ที่ไม่สามารถเข้าใจความคิดอันตื่นรู้ของเราไม่มีที่ยืนในหมู่พวกเรา"
 origin.6110.a:0 "การก้าวข้ามขีดจำกัดของเราเป็นสิ่งที่หลีกเลี่ยงไม่ได้"

 #Biological
 origin.6115.name:0 "ขจัดความไม่สมบูรณ์แบบ"
 origin.6115.desc:0 "นับตั้งแต่เราประสบความสำเร็จในการปรับแต่งแหล่งสารอาหารของเรา เผ่าพันธุ์ [Root.GetSpeciesName] ต่างก็จินตนาการถึงความเป็นไปได้ที่ไร้ขีดจำกัดของการเพิ่มประสิทธิภาพทางพันธุกรรม และในที่สุดวันนั้นก็มาถึง ข้อบกพร่อง จุดอ่อน ความไม่สมบูรณ์แบบ สิ่งเหล่านี้ล้วนเป็นเพียงเศษซากของอดีตที่ถูกละทิ้ง\n\nกลุ่มคนเดียวที่คัดค้านคือผู้อยู่อาศัยใน [fotd_seperatist_planet.GetName] พวกเขาเรียกการปรับแต่งนี้ว่าเป็นเส้นทางที่ล่อแหลม ซึ่งท้ายที่สุดแล้วจะนำไปสู่สังคมแบ่งชนชั้นที่ปกครองโดยผู้ที่สมบูรณ์แบบทางพันธุกรรม"
 origin.6115.a:0 "การปล่อยให้ข้อบกพร่องเหล่านี้คงอยู่ต่อไปถือเป็นความรับผิดชอบที่บกพร่อง"
 origin.6120.name:0 "ไฮเปอร์เจเนซิส"
 origin.6120.desc:0 "[fotd_seperatist_planet.GetName]ปฎิเสธการสื่อสารทั้งหมด พอเราเจาะความลับพันธุกรรม ของเอเลี่ยนเข้าไปในกายภาพของเรา\"คุณละทิ้งความหมายของการเป็น[fotd_seperatist_planet.owner.GetSpecesName]\"[fotd_seperatist_planet.GetName] ปฏิเสธการสื่อสารทั้งหมด เมื่อเราค้นพบความลับของการตัดต่อพันธุกรรมของเอเลี่ยนเข้ากับโครงสร้างทางกายภาพของเรา พวกเขาก็ทิ้งข้อความสั้นๆ ไว้ให้เราเพียงข้อความเดียว: "
 origin.6120.a:0 "ปล่อยให้พวกใจแคบอยู่กับตัวเองไปเถอะ"

 origin.6125.name:1 "ผู้ล่าจากผืนป่าภายนอก"
 origin.6125.desc:1 "เมื่อกาแล็กซีถูกคุกคาม แม้แต่เพื่อนบ้านผู้รักสันโดษของเราก็ต้องลงมือทำ ตราบใดที่เราสามารถต่อต้านพายุที่กำลังจะมาถึงนี้ได้ เราจะกลับมาเป็นหนึ่งเดียวกันอีกครั้ง\n\nเราได้รับมอบหมายให้ควบคุมกองยานของ [fotd_seperatist_planet.GetName] แล้ว"
 origin.6125.a:1 "เราปฏิเสธที่จะถูกทำลายล้าง"

 origin.6145.name:0 "ขอคำยืนยัน"
 origin.6145.desc:0 "ดาวเคราะห์คู่ของเราได้ร้องขอ ให้เรายืนยันบางส่วนของการค้นพบของพวกเขา อีกครั้งที่พวกเขาอ้างว่ามีหลักฐานว่า§Yตัวแบ่ง§!ถูกทําลายโดยพวกต่างชาติ นี่ ได้ กลาย เป็น เรื่อง น่า เบื่อ; ทุก ๆ สอง สาม ปี ดู เหมือน ว่า พวก เขา จะ พบ สิ่ง ใหม่ ๆ บาง อย่าง\"การพิสูจน์\"ดาวเคราะห์พันธมิตรของเราได้ร้องขอให้เราช่วยยืนยันการค้นพบบางอย่างของพวกเขา อีกครั้งหนึ่งที่พวกเขาอ้างว่ามีหลักฐานว่า §Yตัวแบ่ง§! ถูกทำลายโดยตัวตนต่างดาวที่เป็นปฏิปักษ์ เรื่องนี้เริ่มน่าเบื่อหน่ายขึ้นเรื่อยๆ ดูเหมือนว่าทุกๆ สองสามปีพวกเขาจะค้นพบสิ่งใหม่ๆ เสมอ "
 origin.6145.a:0 "เอาใจพวกเขาสักหน่อยแล้วกัน"
 origin.6150.name:0 "ข้อพิสูจน์อันน่าสะพรึงกลัว"
 origin.6150.desc:0 "[fotd_seperatist_planet.GetName] พูดถูก!\n\nการโจมตีที่เราประสบเมื่อหลายปีก่อนนั้นเกิดขึ้นโดยฝีมือของสิ่งมีชีวิตที่เป็นปฏิปักษ์ซึ่งมีความสามารถในการปล่อยกระสุนทังสเตนขนาดมหึมา มีเพียงคุณลักษณะแรงโน้มถ่วงที่เป็นเอกลักษณ์ของระบบดาวบ้านเกิดของเราเท่านั้นที่ช่วยให้เรารอดชีวิตมาได้ จากการวิเคราะห์ข้อมูลในค่ำคืนที่เป็นเวรกรรมนั้นและนำมาอ้างอิงกับสิ่งค้นพบใหม่นี้ ทำให้เราสามารถคำนวณพิกัดแหล่งที่มาของกระสุนทังสเตนขนาดเทียบเท่าดาวเคราะห์น้อยได้สำเร็จ\n\nมันมีต้นกำเนิดมาจากระบบดาวที่อุดมไปด้วยแร่ธาลุอย่างมหาศาล (แต่กลับไม่มีความโดดเด่นอื่นใดเลย) ซึ่งเราได้บันทึกไว้ในระบบข้อมูลมาเป็นเวลาหลายทศวรรษแล้ว"
 origin.6150.a:0 "เริ่มชาร์จพลังงานไฮเปอร์ไดรฟ์ของเราได้"

 origin.6155.name:0 "ความรกร้างว่างเปล่า"
 origin.6155.desc:0 "ระบบดาวของผู้รุกรานในอดีตของเรานั้นว่างเปล่า แม้ว่าจะไม่ใช่เรื่องแปลกที่แถบดาวเคราะห์น้อยจะขาดแคลนแร่ธาตุ แต่แถบนี้กลับถูกขุดค้นจนแทบไม่เหลือซาก ไม่เพียงเท่านั้น ในบริเวณที่ควรจะมีดาวเคราะห์น้อยดวงเล็กๆ ที่อุดมไปด้วยโลหะหายาก เรากลับพบเพียงแต่ฝุ่นผง ไม่ว่าเผ่าพันธุ์ที่อาศัยอยู่ในระบบดาวนี้จะจัดหาทังสเตนที่จำเป็นในการสร้างกระสุนปืนมาได้อย่างไร แต่ตอนนี้พวกเขาไม่มีทรัพยากรที่จะทำเช่นนั้นอีกต่อไปแล้ว ดูเหมือนว่าพวกเขาจะไม่มีความสามารถแม้กระทั่งการออกเดินทางไปจากดาวเคราะห์ของตนเองด้วยซ้ำ\n\nขณะที่พวกเขาได้พยายามอย่างเต็มที่เพื่อซ่อนตัว ป้องกันการส่งสัญญาณวิทยุทั้งหมด หรือแม้กระทั่งจำกัดการใช้แสงไฟประดิษฐ์ แต่เราก็ยังคงตรวจพบร่องรอยของชีวิตบนดาวเคราะห์ที่อยู่อาศัยได้เพียงดวงเดียวในระบบดาวนี้"
 origin.6155.a:0 "ไปเยี่ยมเยือนฝันร้ายในอดีตของเรากันเถอะ"

 origin.6160.name:0 "เหล่านักล่า"
 origin.6160.desc:1 "การสังเกตการณ์เผ่าพันธุ์ §Yจิตรกรรม§! ถือเป็นประสบการณ์ที่เปิดมุมมองใหม่ให้กับเรา อันที่จริง อุดมการณ์ของพวกเขานั้นคล้ายคลึงกับสิ่งที่ทำให้เกิดการแบ่งแยกในเผ่าพันธุ์ของเราเองอย่างน่าประหลาดใจ ทว่า แทนที่จะเลือกการแยกตัวอยู่อย่างโดดเดี่ยว ชาวจิตรกรรมกลับเลือกใช้กลยุทธ์การโจมตีเชิงรุกเพื่อชิงลงมือก่อนต่อสัญญาณชีพใดๆ ที่พวกเขาตรวจจับได้ เมื่อโลหะหนักของพวกเขาหมดลง เอเลี่ยนกลุ่มนี้ก็ล่าถอยกลับไปยังโลกของพวกเขา คุ้ยหาอาหารประทังชีวิตเท่าที่จะทำได้บนดาวบ้านเกิดที่รกร้างในตอนนี้ ในขณะที่ผู้นำของดาวเคราะห์พันธมิตรของเรากำลังเร่งเร้าให้เราใช้ยุทธวิธีแบบเดียวกับชาวจิตรกรรมการหาวิธีจัดการกับกลุ่มที่เกือบจะทำลายล้างเราได้ดีที่สุดนั้นกลับไม่ใช่เรื่องง่ายเลย"
 origin.6160.a:0 "เราจะปลอดภัยก็ต่อเมื่อเราอยู่เพียงลำพังเท่านั้น"
 origin.6160.a.tooltip:1 "เราจะเข้าร่วมกับดาวเคราะห์พันธมิตรของเราในการปกป้องกาแล็กซีนี้ด้วยการกวาดล้างสิ่งมีชีวิตอื่นทั้งหมด เริ่มจากไอ้ก้อนหินดวงนี้ก่อนเลย"
 origin.6160.b:0 "เราจะแสดงความเมตตาต่อพวกเขา"
 origin.6160.c.tooltip:0 "หวังว่าพวกเขาจะสามารถเรียนรู้จากเราได้ว่าไม่ใช่สิ่งมีชีวิตต่างดาวทั้งหมดที่จะจ้องเอาชีวิตพวกเขา"

 origin.6165.name:0 "น้อมรับความมืดมิด"
 origin.6165.desc:0 "การทำลายล้างชาวจิตรกรรมช่าง... ง่ายดายใช่ไหม? นักล่าลดลงไปอีกหนึ่งตนที่เคยคุกคามการดำรงอยู่ของเรา เราไม่รู้สึกประสานสอดคล้องกับโลกพันธมิตรของเราแบบนี้มานานมากแล้ว บางทีพวกเขาอาจจะคิดถูก มีสิ่งมีชีวิตเพียงสองประเภทเท่านั้นในจักรวาลนี้ นั่นคือพวกที่เงียบงันและพวกที่ตายไปแล้ว"
 origin.6165.a:0 "เราจะทำให้พวกมันทั้งหมดเงียบเสียงลง"
 origin.6165.b:0 "ไม่ เราจะไม่เป็นฝ่ายรุกรานก่อน"

 origin.6170.name:0 "ของขวัญชิ้นสุดท้าย"
 origin.6170.desc:0 "§Yมูนฟลายเรียน§! นั้นมีความสำคัญมากกว่าที่เราคาดไว้ในตอนแรก โลหะหนักชนิดเดียวที่เหลืออยู่ในระบบดาวนี้พบได้ภายในดวงจันทร์ดวงนี้ ซึ่งจากการตรวจสอบอย่างใกล้ชิดพบว่ามันคือปืนยิงมวลสารขนาดยักษ์(เสียงคนขับดัง)กลไกการยิงอันกว้างขวางโอบล้อมรอบดาวเคราะห์น้อยแห่งนี้หลายรอบ การคำนวณอย่างคร่าวๆ ระบุว่าอาวุธนี้สามารถยิงกระสุนปืนที่มีความเร็วใกล้เคียงกับความเร็วแสงได้\n\nข้อมูลสำหรับการยิงครั้งสุดท้ายยังคงอยู่ในคอมพิวเตอร์กำหนดเป้าหมาย โดยเล็งเป้าตรงไปที่ [Root.GetHomeWorldName]"
 origin.6170.a:0 "เราต้องกลับบ้าน!"

 origin.6175.name:0 "ถูกล่า"
 origin.6175.desc:0 "ชาว §Yจิตรกรรม§! เป็นฝ่ายชนะ ประชาชนของเราถูกกวาดล้างลงเป็นจำนวนมาก และโลกบ้านเกิดของเราถูกทำลายย่อยยับ\n\nยานขนส่งระหว่างชั้นบรรยากาศได้นำพาชาว [Owner.GetSpeciesNamePlural] เข้าสู่วงโคจรจนกระทั่งนาทีสุดท้ายของดาวเคราะห์ ผู้ที่ยังคงอยู่บนพื้นผิวโลกต่างถูกแผดเผาเป็นจลน์ในทันทีที่กระสุนปืนความเร็วใกล้แสงเข้าสู่ชั้นบรรยากาศจนเกิดประกายไฟ [fotd_seperatist_planet.GetName] ได้เสนอตัวที่จะเป็นเจ้าภาพรองรับรัฐบาลของเราและจัดหาที่พักพิงให้แก่ผู้อพยพ"

 origin.6180.name:0 "วิถีโคจรชัดเจน"
 origin.6180.desc:1 "[Target.GetName] ปลอดภัยแล้ว เราสามารถเปลี่ยนทิศทางของกระสุนทังสเตนได้ไกลพอที่จะรับประกันความอยู่รอดของเราเอง แม้ว่าตลอดเส้นทางการเดินทางอันยาวนานของมัน มันอาจจะกลายเป็นปัญหาของดาวเคราะห์ดวงอื่นแทนก็เป็นได้"
 origin.6180.a:0 "ทีนี้ มาพูดถึงดวงจันทร์ดวงนั้นกันหน่อย"

 origin.6185.name:0 "มาตรการรับมือ"
 origin.6185.desc:0 "นักวิทยาศาสตร์ของเราทํางานอย่างไม่หยุดหย่อน\"§Yปัญหา เกี่ยว กับ ประชากร§!\"นักวิทยาศาสตร์ของเราทำงานกันอย่างไม่รู้จักเหน็ดเหนื่อยในโครงการ "
 origin.6185.a:0 "ทำให้สำเร็จล่ะ!"

 origin.6205.name:0 "[home_planet.GetName] ถูกแปดเปื้อน"
 origin.6205.desc:0 "ที่ น่า จะ เป็น การ ฉลอง ความ หลาก หลาย และ มิตรภาพ จบ ลง ด้วย ข้อ สังเกต ที่ เปรี้ยว ว่า เป็น การ ประท้วง ที่ จัด โดย[fotd_seperatist_planet.GetName]แหกออกมาด้านหน้า[From.GetAdj]สถานทูต ผู้ประท้วงไม่ได้อายเกี่ยวกับมุมมองของพวกเขาตะโกนคําขวัญที่มีสีสันเช่น\"[From.GetSpeciesNamePluralInsult]ที่อยู่ในโรงงานรีไซเคิล!\"สิ่งที่ไม่ควรพลาดในการเฉลิมฉลองความหลากหลายและความเป็นมิตรกลับจบลงด้วยความตึงเครียด เมื่อการประท้วงที่จัดตั้งขึ้นโดย [fotd_seperatist_planet.GetName] ปะทุขึ้นหน้าสถานทูต [From.GetAdj] กลุ่มผู้ประท้วงไม่ได้ปิดบังความคิดเห็นของตนเองเลยแม้แต่น้อย ตะโกนสโลแกนที่มีสีสันประชดประชันทำนองว่า "
 origin.6205.a:0 "ตักเตือน [fotd_seperatist_planet.GetName] ในทันทีและกล่าวคำขอโทษ"
 origin.6205.b:0 "ปล่อยให้พวกเขาร้องตะโกนไป"

 origin.6220.name:0 "แนวร่วมพันธมิตร"
 origin.6220.desc:0 "[FromFrom.GetName]สงครามจะเป็นความทรงจําตลอดไป เป็นช่วงเวลาที่เราและ[fotd_seperatist_planet.GetName]ยืนหยัดร่วมกัน เป็นหนึ่งเดียวกับภัยคุกคามที่ยังคงอยู่\n\nเมื่อ เผชิญ หน้า กับ ความ หวาด กลัว ครั้ง ล่า สุด นี้ เรา คาด หมาย ว่า จะ ได้ รับ อีก ข่าวสาร หนึ่ง จาก ประชาชน[fotd_seperatist_planet.GetName]แทน ที่ จะ เป็น เช่น นั้น พวก เขา ตอบ สนอง ด้วย ห้า คํา:\n\n\"คุณต้องการพวกเราที่ไหน\"สงคราม [FromFrom.GetName] จะถูกจดจำไปตลอดกาลในฐานะช่วงเวลาที่เราและ [fotd_seperatist_planet.GetName] ยืนหยัดร่วมกัน ร่วมเป็นหนึ่งเดียวในการต่อต้านภัยคุกคามที่มีผลต่อการดำรงอยู่ของเรา\n\nเมื่อต้องเผชิญหน้ากับความหวาดกลัวครั้งล่าสุดนี้ เราคาดหวังว่าจะได้รับข้อความเพิกเฉยอีกครั้งจากผู้คนของ [fotd_seperatist_planet.GetName] แต่ตรงกันข้าม พวกเขากลับตอบกลับมาด้วยถ้อยคำเพียงไม่กี่คำว่า: \n\n"
 origin.6220.a:0 "เราต้องสร้างยานรบให้มากกว่านี้!"
 origin.6220.b:0 "เราต้องการนายทหารเพิ่มขึ้นในกองยานของเรา!"
 origin.6220.c:0 "บอกเราทุกเรื่องที่เกี่ยวกับศัตรูของเรา"
 origin.6220.d:0 "พวกเรายืนหยัดอยู่เพียงลำพัง"

 origin.6230.name:0 "โครงการปรับสภาพดาวเคราะห์ [fotd_seperatist_planet.GetName]"
 origin.6230.desc:0 "สภาพความเป็นอยู่ใน [fotd_seperatist_planet.GetName] ไม่เอื้ออำนวยต่อการอยู่อาศัยของชาว [Root.GetSpeciesNamePlural] เสมอมา แต่ด้วยความมานะพยายามในการปรับสภาพดาว ความยากลำบากแสนสาหัสจะกลายเป็นอดีตไป\n\nแม้ว่า [fotd_seperatist_planet.GetName] จะยังคงมีสภาพแวดล้อมที่ท้าทายอยู่บ้าง แต่ผู้อยู่อาศัยบนโลกแห่งนี้ก็ได้ละทิ้งอดีตอันแสนยาวนานของดาวเคราะห์ระดับ [From.Target.GetClassAdj] ไว้เบื้องหลังแล้ว"
 origin.6230.a:0 "ขอให้พวกเขาเพลิดเพลินไปกับการเปลี่ยนแปลงนี้"

 origin.6235.name:0 "ความเป็นเลิศด้านการปรับสภาพดาวเคราะห์ [fotd_seperatist_planet.GetName]"
 origin.6235.desc:0 "พวกเขาทำสำเร็จแล้ว\n\nประชาชนของเราบางคนเคยด่าทอผู้อยู่อาศัยบน [fotd_seperatist_planet.GetName] ว่าเสียสติที่ไปตั้งรกรากในโลกที่มีสภาพย่ำแย่ขนาดนั้น ทว่า ตอนนี้พวกเขาได้เนรมิตแบบจำลองของ [home_planet.GetName] ที่เหมาะสมอย่างยิ่งยวด และน่าดึงดูดใจสำหรับชาว [Root.GetSpeciesName] ทุกคน"
 origin.6235.a:0 "ดูเหมือนว่าดาวของเราจะไม่ใช่โลกที่น่าดึงดูดใจเพียงหนึ่งเดียวในระบบดาว [from.Target.GetStarName] อีกต่อไปแล้ว"

 origin.6240.name:0 "ความสมบูรณ์แบบด้านการปรับสภาพดาวเคราะห์ [fotd_seperatist_planet.GetName]"
 origin.6240.desc.changedhome:0 "อาจได้รับแรงบันดาลใจจากความสำเร็จในการปรับสภาพดาวของเราเอง ผู้อยู่อาศัยใน [fotd_seperatist_planet.GetName] ได้ปรับแต่งโลกของพวกเขาให้กลายเป็นสิ่งที่มีความงดงามอย่างแท้จริง ดาวเคราะห์ระดับ [From.Target.GetClassName] ที่เคยอุดมสมบูรณ์ในอดีตได้กลายมาเป็นไกอาเวิลด์(Geea World)ผู้อยู่อาศัยสามารถซ่อนตัวจากสายตากาแล็กซีท่ามกลางสรวงสวรรค์แห่งนี้ได้ต่อไป"
 origin.6240.desc.notchangedhome:0 "ข่าวอันแสนน่าอับอายจาก [fotd_seperatist_planet.GetName]: ผู้อยู่อาศัยสามารถก้าวข้ามขีดจำกัดของ [home_planet.GetName] ได้แล้ว ด้วยการละทิ้งสภาพดั้งเดิมของ [From.GetClassName] พวกเขาได้สร้างสรรค์ไกอาเวิลด์(Geea World)ขึ้นมา ผู้คนของเราหลายคนตั้งคำถามว่าทำไมเราจึงควรอาศัยอยู่ที่นี่ต่อไป ในเมื่อสรวงสวรรค์ตั้งอยู่ใกล้แค่เอื้อม"
 origin.6240.a.changedhome:0 "เป็นเรื่องธรรมดาอยู่แล้วที่ใครๆ ก็ต้องการพัฒนาบ้านเกิดของตนเอง"
 origin.6240.a.notchangedhome:0 "[fotd_seperatist_planet.GetName] ทำให้ท้องฟ้าของเราหม่นหมอง"

 origin.6260.name:0 "การเฝ้าระวัง"
 origin.6260.desc:0 "รายงานล่าสุดระบุว่า [fotd_seperatist_planet.GetName] ได้ส่งกองยานออกไปลาดตระเวนในระบบดาว [capital_star.GetName] แล้ว ดูเหมือนว่าพวกเขาจะพัฒนาเทคโนโลยีพรางตัวได้สำเร็จ โชคดีที่พวกเขาตกลงที่จะแบ่งปันข้อมูลคลื่นความถี่ให้กับเรา"

 origin.6275.name:0 "เหล่านักล่าในอดีต"
 origin.6275.desc:0 "ยินดีที่ได้พบ ผู้สังเกตการณ์ กล่าวกันว่าบรรพบุรุษของเราเคยพยายามทำลายล้างพวกท่าน\n\nสำหรับเรื่องนั้น เราต้องขออภัยด้วยความจริงใจ พูดตามตรง เราแปลกใจมากที่พวกท่านไม่ได้ตอบโต้กลับด้วยวิธีการเดียวกัน\n\nเวลาผ่านไปหลายศตวรรษแล้วนับจากนั้น และเราอยากเชื่อว่าตอนนี้เราได้กลายเป็นผู้คนใหม่แล้ว ซึ่งแน่นอนว่าต้องขอบคุณพวกท่านด้วยส่วนหนึ่ง\n\nเราปรารถนาที่จะให้โอกาสจักรวาลนี้เป็นครั้งที่สอง พวกท่านจะยินดีอนุญาตให้เราได้สำรวจจักรวาลร่วมกับพวกท่านหรือไม่?"
 origin.6275.a:0 "พวกท่านสามารถทำได้"
 origin.6275.b:0 "พวกท่านมีอิสระที่จะสำรวจด้วยตัวเอง"
 origin.6275.b.tt:0 "เราจะคืนระบบดาวบ้านเกิดของชาวฝรั่งเศสให้"
 origin.6275.c:0 "อยู่บนหินของคุณ" #Callback to one of the Leader events
 origin.6275.c.tt:0 "เราจะยุติการช่วยนำทางชาวฝรั่งเศสให้ตื่นรู้"

