 fircon.2001.name:0 "ผลข้างเคียงทางการแพทย์"
 fircon.2001.desc:0 "ด้วยการใช้ [GetIndividualNamePlural] ล่องหนและลำแสงดึงดูด ทำให้เราสามารถรวบรวม วิเคราะห์ และศึกษาตัวอย่างของ [pre_ftl_species.GetName] ที่ไม่รู้ตัว และนำพวกเขากลับไปยังที่อยู่อาศัยได้สำเร็จ แต่น่าเสียดายที่ลำแสงดึงดูดมีผลข้างเคียงที่คาดไม่ถึงต่อสรีรวิทยาของ [pre_ftl_species.GetAdj] หลังจากที่ถูกส่งกลับบ้าน ตัวอย่างก็เริ่มมีอาการตุ่มพุพอง ผื่นคัน และจามไม่หยุด โดยเกิดการสลายตัวของเนื้อเยื่อชั้นนอกอย่างสมบูรณ์ภายในเวลาสามชั่วโมงหลังจากการกลับไป โรคลึกลับที่ทำให้ผิวหนังละลายนี้ได้กลายเป็นภาวะฉุกเฉินทางสาธารณสุขระดับประเทศแล้ว และการชันสูตรพลิกศพจะเผยให้เห็นหลักฐานของการแทรกแซงจากภายนอกอย่างแน่นอน"
 fircon.2001.a:0 "ลักพาตัวอย่างกลับมาอีกครั้งเพื่อศึกษาผลกระทบจากลำแสงของเรา!"
 fircon.2001.b:0 "ลดกำลังของลำแสงดึงดูดลงและเก็บตัวเงียบ ๆ สักพัก"
 fircon.2001.c:0 "เพิ่มกำลังของลำแสงดึงดูดและทดสอบพวกมันกับคนท้องถิ่น"

 fircon.2011.name:0 "ฝนตกเป็น [pre_ftl_species.GetNamePlural]!"
 fircon.2011.base.desc:0 "เกิดอุบัติเหตุขึ้นระหว่างการเก็บตัวอย่างสิ่งมีชีวิตจากดาวเคราะห์ [pre_ftl_planet.GetName] เนื่องจากความผิดพลาดในการคำนวณ [GetIndividualNamePlural] ของเราได้รับการติดตั้งลำแสงดึงดูดที่มีกำลังไม่เพียงพอ แทนที่จะได้ตัวอย่างมา เราทำได้เพียงแค่ยกพวกเขาขึ้นไปในอากาศแล้วปล่อยร่วงลงสู่พื้นในเวลาต่อมา"
 fircon.2011.noavian.desc:0 "$fircon.2011.base.desc$\n\nตัวอย่างบางส่วนไปค้างอยู่บนยอดตึกและยอดไม้ สร้างความงุนงงให้แก่คนท้องถิ่นและเกิดทฤษฎีแปลก ๆ สารพัดชนิด"
 fircon.2011.avian.desc:0 "$fircon.2011.base.desc$\n\nตัวอย่างประเภทสัตว์ปีกที่เราพยายามรวบรวมมองว่าอุบัติเหตุครั้งนี้น่าขบขันยิ่งนัก ตัวอย่างที่กล้าหาญกว่านั้นถึงกับเริ่มวิ่งไล่ตาม [GetIndividualNamePlural] ของเราเพื่อที่จะได้ถูกยกขึ้นไปบ้าง เพียงเพื่อความตื่นเต้นเท่านั้น"
 fircon.2011.a:0 "ซ่อมแซมลำแสงดึงดูด"
 fircon.2011.b:0 "เปลี่ยนไปใช้การสังเกตการณ์เชิงรับ"
 fircon.2011.b.tt:0 "เปลี่ยนภารกิจสถานีสังเกตการณ์ของเราเป็น §Yการสังเกตการณ์เชิงรับ§!"
 fircon.2011.c:0 "ตลกดี ทำต่อไปและเผยแพร่ฟุตเทจนั้นซะ!"

 opinion_bold_explorers:0 "นักสำรวจผู้กล้าหาญ"

# Hive Observation Events

 fircon.2505.name:0 "การกลืนกินเซลล์ประสาท"
 fircon.2505.desc:0 "ในขณะที่ประชากรที่มีสติปัญญาทั้งหมดของ [pre_ftl_planet.GetName] จะเป็นส่วนหนึ่งของจิตสำนึกรวมแบบอินทรีย์ แต่ใน [pre_ftl_planet.GetPlanetHabitat] ก็เป็นแหล่งอาศัยของ 'รัง' ต่าง ๆ มากมาย รังเหล่านี้คือการรวมกลุ่มของโดรนที่แยกจากกันและแข่งขันกันเพื่อแย่งชิงทรัพยากร ในบางครั้ง ความขัดแย้งจะปะทุขึ้นระหว่างสองกลุ่ม และบางครั้งอาจลุกลามไปสู่สงครามเต็มรูปแบบ ขณะนี้เรากำลังเฝ้าดูการโจมตีเมืองหลวงของรังหนึ่งอย่างเต็มรูปแบบ และมันเป็นเรื่องที่โหดเหี้ยมมาก ประสิทธิภาพของโดรนที่ปราศจากความรู้สึกเห็นอกเห็นใจขัดขวางจะทำให้แม่ทัพคนใดก็ตามภาคภูมิใจ\n\nฝ่ายตั้งรับกำลังสูญเสียพื้นที่อย่างรวดเร็ว แต่ตามการประเมินของเรา พวกเขาน่าจะยื้อไว้ได้อีกไม่กี่วัน\n\nทว่า หลังจากนั้นไม่นาน การต่อสู้ทั้งหมดก็ยุติลง เนื่องจากฝ่ายตั้งรับได้เข้าร่วมกองกำลังกับฝ่ายตรงข้ามและเริ่มรื้อถอนเมืองหลวงของตนเองเพื่อสิ่งที่มีค่าใด ๆ ดูเหมือนว่าพวกเขาจะได้รับการหลอมรวมเข้ากับเครือข่ายของรังที่เข้าโจมตีอย่างสมบูรณ์และในทันที"
 fircon.2505.a:0 "ความโหดเหี้ยมคือหนทางสู่ความเป็นเอกภาพ"
 fircon.2505.b:0 "พวกเขามีโปรโตคอลการหลอมรวมที่ไร้ปรานี"
 fircon.2505.c:0 "พวกเขาเพิ่งจะกลืนกินจิตสำนึกไปหรือเปล่าน่ะ?"

 fircon.2515.name:0 "การเข้ายึดครองระบบนิเวศ"
 fircon.2515.desc:0 "[pre_ftl_country.GetName] บน [pre_ftl_planet.GetName] ได้เริ่มตั้งถิ่นฐานในพื้นที่ใหม่ ๆ ของดาวเคราะห์เมื่อเร็ว ๆ นี้ พืชพรรณและสัตว์ท้องถิ่น ซึ่งในตอนแรกแตกต่างจากที่พบในดินแดนที่ตั้งถิ่นฐานอย่างมาก กำลังถูกครอบครองโดยกลุ่มรวมอย่างสมบูรณ์ ซึ่งพวกเขาใช้แนวทางที่เฉียบขาดแต่มีระบบในการควบคุมระบบนิเวศในท้องถิ่น สัตว์บางชนิดถูกกำจัดอย่างโหดเหี้ยมเพื่อทดแทนด้วยสัตว์ชนิดอื่น ในขณะที่พืชพันธุ์รุกรานได้แย่งชิงชีวิตของต้นไม้พื้นเมือง ความเชี่ยวชาญด้านนิเวศวิทยาของชนพื้นเมืองนั้นยอดเยี่ยมมาก ทว่าพวกเขาก็ไม่อาจหลีกเลี่ยงอุปสรรคบางประการในพื้นที่ที่มีภูมิอากาศผิดปกติได้ ซึ่งสิ่งมีชีวิตที่นำเข้ามาใหม่ไม่สามารถอยู่รอดได้นาน เราเชื่อว่าในไม่ช้าพวกเขาจะพบวิธีหลีกเลี่ยงอุปสรรคเหล่านี้ และในที่สุด โลกทั้งใบจะมีความกลมกลืนเป็นหนึ่งเดียว ซึ่งสร้างสภาวะที่เหมาะสมที่สุดสำหรับกลุ่มรวมในการเจริญเติบโต"
 fircon.2515.a:0 "มันเป็นกลยุทธ์การขยายตัวที่เป็นเอกลักษณ์ดี"
 fircon.2515.b:0 "ประสิทธิภาพการขยายตัว: ที่ไม่อาจผ่อนปรนได้"
 fircon.2515.c:0 "น่าไม่สบายใจ"

 fircon.2525.name:0 "เปลวไฟแห่งอุตสาหกรรม"
 fircon.2525.desc:0 "[pre_ftl_country.GetName] บน [pre_ftl_planet.GetName] เพิ่งพัฒนาเทคโนโลยีใหม่ ๆ และอุตสาหกรรมของพวกเขาก็เริ่มเติบโตขึ้นอย่างรวดเร็ว โรงงาน เตาหลอม สายการประกอบ และเครื่องสกัดเชื้อเพลิงถูกสร้างขึ้นทั่ว [pre_ftl_planet.GetPlanetHabitat] ในขณะที่ระบบอัตโนมัติบางส่วนได้แทรกซึมเข้าสู่จิตใจของรังท้องถิ่น ควันดำพาดผ่านท้องฟ้า และโดรนจำนวนมากเริ่มแสดงสัญญาณของความเสื่อมสภาพเนื่องจากการสัมผัสกับสารเคมีที่เป็นพิษ ในไม่ช้ารังจะต้องจัดการกับปัญหาเหล่านี้ ทว่าโดรนที่ไม่สะทกสะท้านก็ยังคงทำงานตามปกติ"
 fircon.2525.a:0 "โลกใบนี้จะต้องสยบต่อเจตจำนงของรัง"
 fircon.2525.b:0 "ศักยภาพการหลอม: แบบทวีคูณ"
 fircon.2525.c:0 "พวกเขายังคงสามารถแก้ไขสถานการณ์ได้!"
 fircon.2525.d:0 "ก้าวสำคัญในทิศทางที่ถูกต้อง!"
 fircon.2525.e:0 "ไม่เห็นการเคลื่อนไหวทางสังคมแม้แต่รายการเดียว"

 fires_of_industry:0 "มลพิษทางอุตสาหกรรม"
 fires_of_industry_desc:0 "ดาวเคราะห์ดวงนี้ได้รับมลพิษอย่างหนักในระหว่างการปฏิวัติอุตสาหกรรมในท้องถิ่น"

 fircon.2535.name:0 "เพลงไว้อาลัยแด่โดรน"
 fircon.2535.desc:0 "ในเหตุการณ์ที่คาดไม่ถึง ความโศกเศร้าดูเหมือนจะครอบงำ [pre_ftl_planet.GetName] เรากำลังได้เห็นการหยุดชะงักของการทำงานของทั้งรังอย่างที่ไม่เคยปรากฏมาก่อน ภายหลังการเสียชีวิตของโดรนเพียงตัวเดียว เราไม่แน่ใจว่าทำไมโดรนตัวนี้ถึงแตกต่างจากตัวอื่น ๆ แต่ดูเหมือนว่ารังกำลังจัดพิธีกรรมบางอย่าง โดยโดรนจะถูกหั่นออกเป็นชิ้น ๆ ราวกับพิธีศักดิ์สิทธิ์ ก่อนที่ชิ้นส่วนเหล่านั้นจะถูกนำไปยังเนิร์สเซอรีต่าง ๆ สำหรับโดรนเกิดใหม่ ไม่กี่อึดใจต่อมา ทั้งรังก็กลับมาเคลื่อนไหวอีกครั้ง เรื่องนี้สร้างความสับสนอย่างมาก และดูคล้ายกับเหตุการณ์ที่มีความสำคัญทางสังคมหรือจิตวิญญาณ"
 fircon.2535.a:0 "แปลกพิกล"
 fircon.2535.b:0 "ผลผลิตรายวันลดลง"
 fircon.2535.c:0 "มันหมายความว่าอย่างไรกันแน่?"

 fircon.2545.name:0 "กลุ่มรวมที่เพิ่งก่อกำเนิด"
 fircon.2545.desc:0 "รังต้นแบบที่เราเฝ้าสังเกตการณ์บน [pre_ftl_planet.GetName] ได้ก้าวไปอีกขั้นในการวิวัฒนาการ พื้นที่ส่วนใหญ่ของ [pre_ftl_planet.GetPlanetHabitat] กลุ่มบุคคลเล็ก ๆ เริ่มจัดตั้งรังขนาดเล็ก แต่โดรนเหล่านี้ยังคงขาดการยึดเหนี่ยวและการประสานงานของกลุ่มรวมที่สมบูรณ์แบบ\n\nสิ่งนี้ได้เปลี่ยนไปในพื้นที่ทางตอนเหนือของ [pre_ftl_planet.GetPlanetHabitat] ซึ่งดูเหมือนว่ามีบุคคลหนึ่งเป็นศูนย์กลางการเชื่อมโยงของเอกภาวะที่กำลังควบคุมโดรนใกล้เคียง 'โดรนไพรม์' นี้กำลังเดินทางไปทั่วดาวเคราะห์ และส่งโดรนที่ยอมจำนนไปรวมตัวกันในถิ่นฐานที่มีสัดส่วนใหญ่โตมโหฬารเมื่อพิจารณาจากระดับเทคโนโลยีที่ต่ำของโลก ที่นั่น โดรนดูเหมือนจะมุ่งเน้นไปที่การสร้างบ้าน ไซโล และขยายการผลิตอาหารให้ได้มากที่สุดเพื่อรองรับผู้มาใหม่ ความเป็นอิสระได้สิ้นสุดลงแล้ว สำหรับพวกเขา ตอนนี้มีเพียงกลุ่มรวมเท่านั้น"
 fircon.2545.a:0 "นี่เป็นวิธีที่เราเกิดขึ้นมาด้วยหรือเปล่านะ?"
 fircon.2545.b:0 "การประเมินจิตใจอินทรีย์: เปราะบาง"
 fircon.2545.c:0 "หรืออาจจะเป็นโรคติดต่อทางพลังจิต?"
 fircon.2545.d:0 "นำตัวไพรม์กลับมาเพื่อศึกษา"
 fircon.2545.e: "ช่างไม่เหมือนเราเลย แต่ก็น่าดึงดูดใจมาก..."

 fircon.2546.name:0 "การศึกษาตัวไพรม์"
 fircon.2546.desc:0 "'โดรนไพรม์' จาก [pre_ftl_planet.GetName] ถูกลักพาตัวสำเร็จและถูกทำให้หลับใหล แม้ว่าเราจะระวังแล้วก็ตาม แต่โดรนตัวอื่น ๆ บน [pre_ftl_planet.GetPlanetHabitat] สังเกตเห็นเรื่องนี้อย่างแน่นอน และทุกครั้งที่วงโคจรของสถานีเรานำเราเข้าใกล้ถิ่นฐานของพวกเขา พวกเขาจะแสดงพฤติกรรมก้าวร้าว ราวกับว่าพวกเขารู้สึกได้ว่าโดรนไพรม์อยู่ใกล้ขึ้น\n\nการศึกษาของเราเกี่ยวกับสมองของไพรม์ได้ให้ผลลัพธ์ที่น่าสนใจเกี่ยวกับการสื่อสารข้ามมิติ แต่รายละเอียดเกี่ยวกับความสามารถของมันในการควบคุมโดรนและดูดซับจิตสำนึกที่กำลังเติบโตนั้นยังคงหลุดพ้นจากความเข้าใจของเรา"
 fircon.2546.a:0 "ผ่าชันสูตรมัน"
 fircon.2546.b:0 "เราได้ข้อมูลพอแล้ว ส่งมันกลับไป"

 fircon.2547.name:0 "โรคระบาดทางพลังจิต"
 fircon.2547.desc:0 "'โดรนไพรม์' จาก [pre_ftl_planet.GetName] ถูกลักพาตัวสำเร็จและถูกทำให้หลับใหล แต่น่าเสียดายที่เป้าหมายตื่นขึ้นมาขณะที่เรากำลังศึกษาลักษณะคลื่นสมองของมัน จากนั้นเราได้รับรายงานที่สับสนปนเปหลายฉบับซึ่งทั้งหมดดูเหมือนจะบ่งชี้ว่าเป้าหมายได้ทำลายจิตใจของลูกเรือในสถานีสังเกตการณ์ทีละคน และควบคุมพวกเขาส่วนใหญ่ไว้ได้ โชคดีที่ยานที่สามารถเดินทางด้วยความเร็วเพียงลำเดียวถูกทำลายไปในระหว่างความสับสน แต่ระบบของสถานีแสดงให้เห็นว่าโดรนไพรม์กำลังหลอมรวมความรู้อย่างรวดเร็วจากโดรนตัวใหม่ของมัน และแสดงความสามารถอย่างเต็มที่ในการใช้เทคโนโลยีและอุปกรณ์ของเรา\n\nโปรโตคอลการควบคุมสั่งให้ทำลายสถานีและผู้อยู่อาศัยทั้งหมดจากระยะไกลพร้อมกันทันที!"
 fircon.2547.a:0 "สั่งทำลายล้างจากระยะไกล!"
 fircon.2547.a.tt:0 "สถานีสังเกตการณ์ในวงโคจรของ [pre_ftl_planet.GetName] ถูกทำลาย"

 fircon.2555.name:0 "สิทธิ์ที่จะจากไป"
 fircon.2555.desc:0 "การสังเกตการณ์ [pre_ftl_planet.GetName] ของเรายังคงดำเนินต่อไป และเมื่อเร็ว ๆ นี้เราได้ค้นพบสิ่งที่ในตอนแรกเราเข้าใจผิดคิดว่าเป็นโดรนที่ดื้อรั้น บุคคลเหล่านี้อาศัยอยู่บริเวณรอบนอกของถิ่นฐานรังในท้องถิ่น และดูเหมือนว่าจะได้รับอิสระบางส่วนหรือทั้งหมด พวกเขาดูเหมือนจะตัดขาดจากกลุ่มรวมโดยสิ้นเชิง และบางคนก็ดูเหมือนจะเพลิดเพลินกับช่วงเวลาพักผ่อน สบาย ๆ โดยไม่ต้องทำอะไรเลย\n\nทว่าพวกเขายังคงดูเหมือนพึ่งพารังเพื่อหาทรัพยากร และโดยพื้นฐานแล้วกำลังทำการค้ากับกลุ่มรวม เหตุใดรังจึงไม่เห็นสมควรที่จะกำจัดโดรนที่ดื้อรั้นเหล่านี้ยังคงเป็นปริศนา"
 fircon.2555.a:0 "ความเบี่ยงเบนควรถูกบดขยี้"
 fircon.2555.b:0 "ความเป็นปัจเจกบุคคลนั้นไร้ประสิทธิภาพ"
 fircon.2555.c:1 "ภาวะพึ่งพากับรังเป็นเรื่องที่หาได้ยากยิ่ง"

  # Interplanetary Flight
 fircon.2605.name:0 "เที่ยวบินระหว่างดาวเคราะห์"
 fircon.2605.desc.base:0 "สภาพอากาศ: §Gไร้ที่ติ§!\nจรวดความร้อนนิวเคลียร์: §Gเติมเชื้อเพลิงเต็มพิกัด§!\nแผนการบิน: §Gปรับให้เหมาะสมที่สุด§!\n\nนี่คือตัวบ่งชี้ที่แพร่ภาพไปทั่ว [pre_ftl_planet.GetName] ในวันนี้ ขณะที่ [pre_ftl_country.GetName] ปล่อยภารกิจระหว่างดาวเคราะห์ครั้งแรกของตน"
 fircon.2605.desc.regular:0 "$fircon.2605.desc.base$ เหล่านักบินอวกาศที่ได้รับการฝึกฝนมาเป็นเวลาหลายปีเพื่อปฏิบัติภารกิจนี้ได้ขึ้นจรวดในช่วงเช้าตรู่ตามเวลาท้องถิ่น ตอนนี้พวกเขาโบยบินในอวกาศที่เรามีร่วมกับพวกเขา ให้เรามาติดตามการเดินทางของพวกเขากัน"
 fircon.2605.desc.hive:0 "$fircon.2605.desc.base$ โดรนนักบินอวกาศที่วิวัฒนาการมาเป็นพิเศษมีความเป็นอิสระมากกว่าโดรนทั่วไป พร้อมที่จะออกสำรวจระบบสุริยะของพวกเขาแล้ว"
 fircon.2605.a.mean:0 "บินไปและมอดไหม้"
 fircon.2605.a.nice:0 "ช่างน่าคิดถึงเสียจริง!"

 fircon.2615.name:0 "การร่อนลงจอด"
 fircon.2615.desc:0 "ผ่านการทดสอบและความยากลำบาก การเดินทางระหว่างดาวเคราะห์ครั้งแรกของ [from.owner.GetSpeciesAdj] จบลงด้วยความสำเร็จ แม้ว่าจะไม่ใช่การเดินทางที่ราบรื่นที่สุด แต่พวกเขาก็พิสูจน์ให้เห็นถึงศักยภาพในฐานะนักสำรวจอวกาศ\n\n[from.owner.GetName] ได้รับแรงบันดาลใจจากภารกิจนี้และกำลังรอคอยความท้าทายครั้งต่อไปในการเดินทางสู่ดวงดาวอย่างกระตือรือร้น ในไม่ช้าเราอาจมีโอกาสได้พูดคุยกับพวกเขาในฐานะที่เท่าเทียมกัน"
 fircon.2615.tt:0 "§Y[from.owner.GetName]§!: ความก้าวหน้าทางเทคโนโลยี §G+20%§!"

 fircon.2620.name:0 "[from.owner.capital_scope.GetName] เรามีปัญหาแล้ว"
 fircon.2620.desc:0 "ความล้มเหลวทางกลไกบนยานลำแรกระหว่างดาวเคราะห์ของ [from.owner.GetSpeciesName] ทำให้ยานลอยเคว้งอยู่ในอวกาศ ไม่สามารถปรับเส้นทางได้อีกต่อไป ยานลำนี้จะพ้นจากการช่วยเหลือในไม่ช้า [from.owner.capital_scope.GetName] กำลังหาทางแก้ไข ทว่าโอกาสนั้นไม่สู้ดี อย่างไรก็ตาม เราอาจมีโอกาสที่จะแทรกแซง"
 fircon.2620.a:0 "พาพวกเขาออกจากยานลำนั้นซะ!"
 fircon.2620.b:0 "ใช้สายลับของเราที่แฝงตัวอยู่ในสังคมของพวกเขาเพื่อมอบวิธีแก้ไข"
 fircon.2520.b.tt:0 "สิ่งนี้จะช่วยเพิ่มความเป็นไปได้ที่จะเกิดผลลัพธ์ที่ดี"
 fircon.2620.c:0 "เราทิ้งข้อความพร้อมวิธีแก้ไขไว้ใกล้กับศูนย์อวกาศของพวกเขาไม่ได้หรือ?"
 fircon.2620.d:0 "ซ่อมยานของพวกเขาและลบความทรงจำของพวกเขาซะ"
 fircon.2620.e:0 "ปล่อยให้พวกเขาหาทางออกกันเอาเอง"

 fircon.2625.name:0 "กู้ชีพลูกเรือสำเร็จ"
 fircon.2625.desc.base:0 "ตอนนี้ลูกเรือของยานสำรวจที่เผชิญเคราะห์กรรมได้รับการช่วยเหลือขึ้นมาอย่างปลอดภัยบนสถานีสังเกตการณ์ของเราแล้ว เป็นที่เข้าใจได้ว่าพวกเขาหวาดกลัวและสับสนอย่างยิ่ง โดยเฉพาะอย่างยิ่งหลังจากที่เราตัดขาดพวกเขาจากโลกบ้านเกิดและทิ้งพวกเขาไว้ในห้องเก็บสัมภาระต่างดาว"
 fircon.2625.desc.hive:0 "$fircon.2625.desc.base$\n\nHaving carefully studied how the local hive communicates, we have managed to set up a proxy Overmind, leaving these drones alone with their thoughts. We may have to consign them to living here with us. They can observe their home from afar, but never return."
 fircon.2625.desc.regular:0 "$fircon.2625.desc.base$\n\nเราอาจต้องยอมให้พวกเขาอาศัยอยู่ที่นี่กับเรา พวกเขาสามารถเฝ้ามองบ้านจากระยะไกลได้ แต่จะไม่มีวันได้กลับไป"
 fircon.2625.a:0 "ยินดีต้อนรับขึ้นสู่ยาน"
 fircon.2625.a.tt:0 "การสูญเสียลูกเรืออย่างลึกลับจะลดความก้าวหน้าทางเทคโนโลยีของ §Y[fromfrom.owner.GetName]§! ลง §R-50%§!"
 fircon.2625.b:0 "ช่างหัวความเสี่ยง ปล่อยพวกเขากลับบ้านไป!"

 fircon.2630.name:0 "ความล้มเหลวร้ายแรงของภารกิจ"
 fircon.2630.desc:0 "ยานระหว่างดาวเคราะห์ของ [fromfromfrom.owner.GetSpeciesName] ล้มเหลว ไม่มีผู้รอดชีวิต\n\nหลังจากความล้มเหลวนี้ ดูเหมือนว่าพวก [GetPreFTLLowerPlural] จะมีแรงผลักดันในการออกสำรวจดวงดาวน้อยลง"
 fircon.2630.a:0 "เป็นไปตามคาด"
 fircon.2630.b:0 "คุณยอมแพ้ไม่ได้นะ!"
 fircon.2630.tt:0 "§Y[fromfromfrom.owner.GetName]§!: ความก้าวหน้าทางเทคโนโลยี §R-20%§!"

 fircon.2635.name:0 "การซ่อมแซมอันปาฏิหาริย์"
 fircon.2635.desc:0 "ด้วยการใช้ชิ้นส่วนของเสื้อผ้า กล่องบรรจุสารอาหาร และสายไฟทองแดงบางส่วน ลูกเรือของยานที่เคราะห์ร้ายสามารถกลับมาควบคุมไอพ่นหลักของพวกเขาได้สำเร็จ ตอนนี้พวกเขากำลังเดินทางเพื่อทำภารกิจให้สำเร็จ โดยได้รับการสนับสนุนและความรักใคร่เอ็นดูจากโลกบ้านเกิดของพวกเขา"

 inadvertent_jailer:0 "ผู้คุมโดยไม่เจตนา"
 inadvertent_jailer_desc:0 "แม้จะไม่ใช่เจตนาของเรา แต่ตอนนี้เราต้องดูแลกลุ่มเป้าหมายที่เราประสงค์จะศึกษาบนสถานีสังเกตการณ์ของเรา"
 pre_ftl_research_outpost:0 "ด่านหน้าวิจัยยุคก่อนความเร็ว"
 pre_ftl_research_outpost_desc:0 "ฐานที่จัดตั้งขึ้นหลังจากการเดินทางระหว่างดาวเคราะห์ที่ประสบความสำเร็จ"

 # Robot Uprising pre-FTL

 # New pre-FTL events
 preftl.1020.name:0 "การก่อกบฏของหุ่นยนต์"
 preftl.1020.desc:0 "อารยธรรมต่างดาวบน [From.Capital.GetName] กำลังถูกโจมตีจากโดรนหุ่นยนต์ การทดลองเกี่ยวกับ AI ของพวกเขาได้สร้างผลลัพธ์ที่เลวร้ายยิ่ง"
 preftl.1020.a:0 "รับทราบ"
 preftl.1020.spiritualist:0 "พวกเขาก้าวล้ำเส้นเกินไป"
 preftl.1020.machine:0 "น่าสนใจ..."

 preftl.1035.name:0 "การก่อกบฏของหุ่นยนต์ที่ล้มเหลว"
 preftl.1035.desc:0 "หลังจากทำสงครามระดับโลกกับเครื่องจักรที่พวกเขาสร้างขึ้นมาเอง อารยธรรมต่างดาวบน [From.Capital.GetName] ประสบความสำเร็จในการป้องกันตนเองจากการก่อกบฏของหุ่นยนต์"
 preftl.1035.a.robot:0 "สิ่งนั้นจะเกิดขึ้นกับเราได้หรือไม่?"
 preftl.1035.a.norobot:0 "โชคดีที่เรื่องแบบนั้นไม่มีวันเกิดขึ้นที่นี่แน่นอน"
 preftl.1035.b.spiritualist:0 "ตอนนี้เราจะได้เห็นกันว่าพวกเขาได้เรียนรู้จากความอหังการของตนเองหรือไม่"
 preftl.1035.b.machine:0 "เราจะเฝ้าติดตามความคืบหน้าของพวกเขา"
 preftl.1035.b.machine.terminator:0 "โชคร้ายยิ่ง"

 preftl.1110.name:0 "การก่อกบฏของหุ่นยนต์ที่ประสบความสำเร็จ"
