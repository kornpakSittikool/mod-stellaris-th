 origin.111.name:0 "สู่อนาคต"
 origin.111.1.desc:0 "เรามาไกลมากตั้งแต่เริ่มทวงคืนอิสรภาพ ยานที่เราเดินทางมาถึงได้รับการแยกชิ้นส่วนของมีค่าไปจนหมดสิ้น และเทคโนโลยีของเราก็ก้าวหน้าไปจนถึงจุดที่แทบไม่มีความลับใดหลงเหลืออยู่อีก\n\nแต่เราต้องไม่ลืมการเสียสละในอดีต รวมถึงราคาที่ต้องจ่ายในการสลัดเครื่องพันธนาการ ซากยานทาสที่ตกจะถูกเปลี่ยนให้เป็นอนุสรณ์สถานสาธารณะ เพื่อรำลึกถึงการกำเนิดของชาติเรา"
 origin.111.2.desc:0 "เรามาไกลมากตั้งแต่เริ่มเดินทางมาถึง แม้ว่าเราจะไม่ได้ควบคุมมันแล้ว แต่สิ่งใดก็ตามที่เหลืออยู่บนยานที่เราเดินทางมาถึงก็ไม่มีค่าสำหรับเราอีกต่อไป และเทคโนโลยีของเราก็ก้าวหน้าไปจนถึงจุดที่แทบไม่มีความลับใดหลงเหลืออยู่อีก\n\nหากเรากู้คืนมันได้ในวันใดวันหนึ่ง เราจะเปลี่ยนสถานที่นี้ให้เป็นอนุสรณ์สถานเพื่อให้เราจดจำจุดเริ่มต้นอันต่ำต้อยของเราในขณะที่เราก้าวไปสู่อนาคตอย่างกล้าหาญ"
 origin_111.a:0 "$origin.111.name$!"
 origin_111.tooltip:0 "ปลดล็อกการตัดสินใจ §Y$decision_unshackled_memorial$§! บน §Y[Root.Capital.GetName]§!\n$decision_unshackled_memorial_effects$\n- §Y$district_crashed_slaver_ship_plural$§! จะมอบตำแหน่งงาน [clerk.GetIcon] §Y[clerk.GetNamePlural]§! แทนตำแหน่งงาน £job_broken_shackles_scavenger£ §Y$job_broken_shackles_scavenger$§!"
 decision_unshackled_memorial_effects:0 "- §Y$d_crashed_slaver_ship$§! และโครงสร้างพื้นฐานที่เกี่ยวข้องจะถูกเปลี่ยนเป็นโครงสร้างพื้นฐานขั้นสูง"


 #Pre-FTL Homeworlds Found

 origin.5000.name:0 "การคืนสู่เหย้า"
 origin.5000.desc:0 "[From.GetName]... ในที่สุด เราก็ได้กลับมาแล้ว\n\nในฐานะประชาชน เราได้เผชิญกับบาดแผลทางใจที่เหลือเชื่อ ถูกพรากไปจากบ้าน ถูกบังคับให้เป็นทาส ชีวิตของสินทรัพย์ขัดหนี้มักจะเต็มไปด้วยความทุกข์ทรมานอันโหดร้าย แม้กระทั่งสำหรับผู้ที่ใช้ชีวิตในแต่ละวันด้วยความสะดวกสบายพอสมควร ความอัปยศของการขัดหนี้ก็ยังคงอยู่ ตอนนี้ เมื่อได้กลับมาพบกับญาติมิตรของเรา ในที่สุดเราก็สามารถเริ่มเยียวยาได้เสียที\n\nแต่ในความยินดีของเรา เราต้องไม่ลืมความจริงที่ว่าเราเป็นผู้คนจากหลายโลก ไม่ว่าต้นกำเนิดของเราจะเป็นอย่างไร ทุกคนในพวกเราล้วนสมควรได้รับโอกาสที่จะได้กลับบ้านเกิด\n\nอดีตนายจ้างของเราพยายามอย่างเต็มที่เพื่อทำลายเรา วันนี้ทั้งกาแล็กซีร่วมเป็นสักขีพยานในความล้มเหลวของพวกเขา"
 origin.5000.a:0 "วันอันยิ่งใหญ่สำหรับผู้คนของเรา"
 origin.5000.b:0 "น่ากังวล"

 origin.5001.name:0 "ค้นพบดาวบ้านเกิด"
 origin.5001.desc:0 "[From.GetName]... จากวงโคจร มันช่างดูเล็กเหลือเกิน\n\nโลกไม่ได้เป็นของประชากร แต่ประชากรต่างหากที่เป็นของโลกของพวกเขา ในการกลับมาที่นี่ เราได้ก้าวไปอีกขั้นสู่การทวงคืนอดีตของเรา\n\nบาดแผลทางใจที่เราได้รับจากน้ำมือของอดีตนายจ้างไม่มีวันลบเลือนได้ การเยียวยาที่แท้จริงจะใช้เวลาหลายชั่วอายุคน แต่วันนี้เป็นวันที่ดี"
 origin.5001.homecoming.desc:0 "[From.GetName]... จากวงโคจร มันช่างดูเล็กเหลือเกิน\n\nโลกไม่ได้เป็นของประชากร แต่ประชากรต่างหากที่เป็นของโลกของพวกเขา ในการกลับมาที่นี่ เราได้ก้าวไปอีกขั้นสู่การทวงคืนอดีตของเรา\n\nบาดแผลทางใจที่เราได้รับจากน้ำมือของอดีตนายจ้างไม่มีวันลบเลือนได้ การเยียวยาที่แท้จริงจะใช้เวลาหลายชั่วอายุคน แต่วันนี้เป็นวันที่ดี"
 origin.5001.empty.desc:0 "[From.GetName]... มีบางอย่างผิดปกติร้ายแรงที่นี่ จากวงโคจร เราไม่สามารถตรวจพบสัญญาณของสิ่งมีชีวิตที่มีสติปัญญาได้เลย ประชากรทั้งหมดถูกกำจัดไปอย่างไร้ร่องรอยด้วยเหตุผลบางอย่าง\n\nแม้ว่านี่จะไม่ใช่การกลับบ้านเกิดที่เราคาดหวังไว้ แต่การได้กลับมายังระบบดาวนี้ เราได้ก้าวไปอีกขั้นสู่การทวงคืนอดีตของเรา น่าเสียดายที่เราเพียงผู้เดียวเท่านั้นที่ต้องแบกรับมรดกของ [From.GetName] ไว้ เป็นหน้าที่ของเราที่จะต้องจดจำมัน"
 origin.5001.tomb.desc:0 "[From.GetName]... มีบางอย่างผิดปกติร้ายแรงเกิดขึ้นที่นี่\n\nฝุ่นละอองปลิวว่อนไปทั่วภูมิประเทศที่ถูกทำลายล้าง พื้นผิวส่วนใหญ่ถูกรังสีอาบ และผู้รอดชีวิตที่สิ้นหวังเพียงไม่กี่คนต่างดิ้นรนเพื่อเอาชีวิตรอดในซากปรักหักพัง\n\nแม้ว่านี่จะไม่ใช่การกลับบ้านเกิดที่เราคาดหวังไว้ แต่การได้กลับมายังระบบดาวนี้ เราได้ก้าวไปอีกขั้นสู่การทวงคืนอดีตของเรา"
 origin.5001.uplifted.desc:0 "[From.GetName]... ตั้งแต่เราถูกพรากไปจากบ้าน มีสิ่งต่างๆ เกิดขึ้นมากมายที่นี่ ประชากรไม่ได้ถูกผูกมัดอยู่กับดาวเคราะห์ดวงเดียวอีกต่อไป แต่ได้หันเหไปสู่ดวงดาวแล้ว แม้ว่านี่อาจจะไม่ใช่การกลับบ้านที่เราคาดหวังไว้ แต่ความก้าวหน้าทางเทคโนโลยีบน [From.GetName] ก็น่าทึ่งมาก\n\nสำหรับเราแล้ว ไม่มีทางย้อนกลับไปได้ อดีตที่ถูกขโมยไปของเราไม่มีวันทวงคืนกลับมาได้ สิ่งที่เราทำได้ในตอนนี้คือการมองไปสู่อนาคต"
 origin.5001.conquered.desc:0 "[From.GetName]... ตั้งแต่เราถูกพรากไปจากบ้าน มีสิ่งต่างๆ เกิดขึ้นมากมายที่นี่ พวกพ้องของเราไม่ได้เป็นประชาชนที่มีอธิปไตยอีกต่อไป แต่ถูกครอบครองโดยมหาอำนาจกาแล็กซีอื่น\n\nสำหรับเราแล้ว ไม่มีทางย้อนกลับไปได้ อดีตที่ถูกขโมยไปของเราไม่มีวันทวงคืนกลับมาได้ สิ่งที่เราทำได้ในตอนนี้คือการมองไปสู่อนาคต"
 broken_shackles_homeworld_found_01:0 "กลับบ้านเกิด"
 broken_shackles_homeworld_found_01_desc:0 "การกลับบ้านสร้างความประทับใจให้แก่ประชาชนของเราเป็นอย่างมากและช่วยฟื้นฟูสังคมของเราอีกครั้ง"
 broken_shackles_homeworld_found_02:0 "ค้นพบดาวบ้านเกิด"
 broken_shackles_homeworld_found_02_desc:0 "การกลับบ้านครั้งล่าสุดของเราช่วยสร้างพลังงานให้แก่ประชากรและกระตุ้นสังคม"
 broken_shackles_homeworld_found_03:0 "การจำกัดการย้ายถิ่นออก"
 broken_shackles_homeworld_found_03_desc:0 "การจำกัดสิทธิ์ในการเคลื่อนย้ายอย่างเสรีได้รับการพิสูจน์แล้วว่าไม่เป็นที่นิยม"
 broken_shackles_homeworld_found_04:0 "เสรีภาพในการเคลื่อนย้าย"
 broken_shackles_homeworld_found_04_desc:0 "การมอบสิทธิ์ในการเคลื่อนย้ายอย่างเสรีได้รับการพิสูจน์แล้วว่าเป็นที่นิยม"
 broken_shackles_homeworld_found_05:0 "ความสามัคคีในเป้าหมาย"
 broken_shackles_homeworld_found_05_desc:0 "ในฐานะประชาชน เรามีความเป็นน้ำหนึ่งใจเดียวกันในเป้าหมายของเราและภาคภูมิใจในบ้านที่ใช้ร่วมกัน"
 broken_shackles_homeworld_found_06:0 "การประสานพลังแบบเร่งความเร็ว"
 broken_shackles_homeworld_found_06_desc:0 "การส่งเสริมเสรีภาพในการเคลื่อนย้ายได้นำไปสู่ความคิดสร้างสรรค์ที่ไร้ขีดจำกัดและความรุ่งเรืองของวิทยาศาสตร์"
 broken_shackles_homeworld_found_07:0 "การประสานพลังทางสังคม"
 broken_shackles_homeworld_found_07_desc:0 "การส่งเสริมเสรีภาพในการเคลื่อนย้ายส่งผลอย่างมากต่อความก้าวหน้าของเราในฐานะสังคม"
 broken_shackles_homeworld_found_08:0 "การค้นพบที่น่ากังวล"
 broken_shackles_homeworld_found_08_desc:0 "ข่าวที่ไม่คาดคิดเกี่ยวกับบ้านเดิมของเราทำให้ประชากรของเรารู้สึกแย่"

 origin.5002.name:0 "คิดถึงบ้าน"
 origin.5002.desc:0 "ในการสลัดเครื่องพันธนาการ เราได้ก้าวแรกสู่การเป็นกลุ่มประชาชนเดียวกัน อย่างไรก็ตาม หลังจากกลับมายังดาวบ้านเกิดเดิมของเรา ความรู้สึกร่วมในเป้าหมายนั้นก็เริ่มลดลง\n\nสื่อยอดนิยมเต็มไปด้วยการพรรณนาถึง 'ชีวิตที่เรียบง่าย' บนดาวบ้านเกิดเดิมของเราอย่างโรแมนติกเกินจริง ก่อนการมาถึงของ $NAME_MSI_country$ หลายคนได้เดินทางกลับไปแล้ว\n\nหากเราไม่ระวัง เรื่องนี้อาจส่งผลกระทบให้สังคมของเราสูญเสียเสถียรภาพอย่างรุนแรง"
 origin.5002.a:1 "เราไม่สามารถยอมสูญเสียประชากรของเราไปมากกว่านี้ได้แล้ว"
 origin.5002.b:0 "เสรีภาพในการเคลื่อนย้ายเป็นสิทธิ์ขั้นพื้นฐาน"
 origin.5002.b.tt:0 "§Y[broken_shackles_homeworld_owner.GetName]§!:\n$t$กำหนดความตระหนักรู้เป็น §Y100.00§!\n$t$§G+50%§! §Yความก้าวหน้าทางเทคโนโลยีรายเดือน§! เป็นเวลา §Y5 ปี§!"

 origin.5003.name:0 "กลุ่มผู้ทวงคืน"
 origin.5003.desc:0 "ขบวนการใหม่ได้หยั่งรากลึกบน [Root.Capital.GetName] โดยเรียกตัวเองว่า กลุ่มผู้ทวงคืน กลุ่มหัวรุนแรงเหล่านี้กำลังเรียกร้องให้ประชากรของเราทั้งหมดกลับไปยังดาวเคราะห์ต้นกำเนิดของตน รวมถึงการยุบจักรวรรดิของเรา กองกำลังรักษาความมั่นคงได้รับการเฝ้าระวังขั้นสูง และการชุมนุมในที่สาธารณะที่มีคนมากกว่า 100 คนขึ้นไปถูกสั่งห้าม"
 origin.5003.a:0 "คนเขลาที่สายตาสั้น"

 origin.5004.name:0 "การจลาจลบน [Root.Capital.GetName]"
 origin.5004.desc:0 "การกระตุ้นความรู้สึกต่อต้านรัฐบาล กลุ่มผู้ทวงคืนกำลังเรียกร้องให้สปีชีส์ต่างๆ ในจักรวรรดิของเรากลับคืนสู่รากเห้าของตน การต่อสู้ได้ปะทุขึ้นระหว่างกลุ่มย่อยที่หัวรุนแรงที่สุดของขบวนการและกองกำลังฝ่ายสนับสนุนรัฐบาล มีรายงานความเสียหายรุนแรงในศูนย์กลางเมืองใหญ่หลายแห่ง"
 origin.5004.a:0 "ประกาศกฎอัยการศึก"

 origin.5005.name:0 "ความสามัคคีในเป้าหมาย"
 origin.5005.desc:0 "แม้ว่าการห้ามไม่ให้ประชากรของเรากลับไปยังดาวบ้านเกิดของแต่ละคนจะส่งผลกระทบบ้าง แต่ในที่สุดมันก็พิสูจน์แล้วว่าเป็น การตัดสินใจที่ถูกต้อง เมื่อไม่นานมานี้ เราได้เห็นการพัฒนาที่ชัดเจนในด้านความสามัคคีในสังคม รวมถึงความรู้สึกใหม่ที่ว่า [Root.Capital.GetName] คือบ้านของเราอย่างแท้จริง"
 origin.5005.a:0 "มือที่แข็งแกร่งเท่านั้นที่จะสร้างชาติได้"

 origin.5006.name:0 "ภาวะสมองไหล"
 origin.5006.desc:0 "แม้ว่าการอนุญาตให้ย้ายถิ่นไปยังดาวบ้านเกิดเดิมของเราจะได้รับการพิสูจน์ว่าเป็นนโยบายที่เป็นที่นิยม แต่มันก็ไม่ได้ปราศจากผลกระทบ เมื่อเร็วๆ นี้ เราต้องเผชิญกับ 'ภาวะสมองไหล' ครั้งใหญ่ เนื่องจากผู้มีปัญญาเฉียบแหลมที่สุดบางส่วนของเราได้เลือกที่จะย้ายถิ่นฐาน"
 origin.5006.a:0 "เราต้องป้องกันการสูญเสียบุคลากรที่มีความสามารถไปมากกว่านี้"
 origin.5006.b:0 "การเสียสละที่จำเป็น"

 origin.5007.name:0 "การประสานพลังแบบเร่งความเร็ว"
 origin.5007.desc:0 "การตัดสินใจอนุญาตให้ประชากรของเรากลับไปยังดาวบ้านเกิดของพวกเขานั้นไม่ใช่ไม่มีต้นทุนที่ต้องจ่าย แต่เมื่อมีเสรีภาพในการเคลื่อนย้าย ความคิดก็ได้รับการปลดปล่อยตามไปด้วย ความคิดใหม่ๆ กำลังเบ่งบาน และความก้าวหน้าทางวิทยาศาสตร์และเทคโนโลยีก็กลายเป็นเรื่องปกติธรรมดามากกว่าจะเป็นข้อยกเว้น"

 origin.5008.name:0 "ความเชี่ยวชาญที่ใช้ร่วมกัน"
 origin.5008.desc:0 "การตัดสินใจอนุญาตให้ประชากรของเรากลับไปยังดาวบ้านเกิดของพวกเขานั้นไม่ใช่ไม่มีต้นทุนที่ต้องจ่าย แต่เมื่อมีเสรีภาพในการเคลื่อนย้าย ความคิดก็ได้รับการปลดปล่อยตามไปด้วย ความคิดใหม่ๆ กำลังเบ่งบาน และความก้าวหน้าในสังคมก็กลายเป็นเรื่องปกติธรรมดามากกว่าจะเป็นข้อยกเว้น"

 origin.5009.name:0 "กลิ่นอายของบ้าน"
 origin.5009.desc:0 "[From.GetName]... เราเกือบจะลืมกลิ่นอายของอากาศไปแล้ว การได้กลับมาตอนนี้ หลังจากทุกสิ่งที่เราได้เผชิญมา รู้สึกเหมือนไม่จริงเลย"

 #First Outpost Built

 origin.5010.name:0 "ก้าวแรกสู่ดวงดาว"
 origin.5010.desc:0 "หลังการก่อกบฏ มีบางคนในพวกเราที่กล่าวว่าเราควรแยกย้ายกันไปตามทางของตน พวกเขาแย้งว่า [Root.owner.capital_scope.GetName] ไม่ใช่บ้านของเรา เราไม่ใช่สิ่งใดเลยนอกจากกลุ่มสินทรัพย์ขัดหนี้ที่ปะปนกัน และความท้าทายตรงหน้านั้นยิ่งใหญ่เกินกว่าจะก้าวข้ามได้\n\nแต่ด้วยการสร้างด่านหน้าแห่งแรกของเรา เราได้แสดงให้เห็นแล้วว่ากลุ่มชนที่เป็นอิสระสามารถทำสิ่งใดสำเร็จได้บ้าง ขีดจำกัดเพียงอย่างเดียวคือจินตนาการของเราเอง"
 origin.5010.a:0 "รุดหน้าต่อไป สู่ดวงดาว"

 #Homesick Alternate

 origin.5011.desc:0 "ในการสลัดเครื่องพันธนาการ เราได้ก้าวแรกสู่การเป็นกลุ่มประชาชนเดียวกัน อย่างไรก็ตาม ในช่วงไม่กี่ปีที่ผ่านมา สื่อยอดนิยมเต็มไปด้วยการพรรณนาถึง 'ชีวิตที่เรียบง่าย' บนดาวบ้านเกิดเดิมของเราอย่างโรแมนติกเกินจริง หลายคนเริ่มส่งเสียงเรียกร้องที่จะกลับไปแล้ว\n\nหากเราไม่ระวัง ขบวนการนี้อาจส่งผลกระทบให้สังคมของเราสูญเสียเสถียรภาพอย่างรุนแรง"

 #New Factions Founded

 origin.5041.name:0 "การเมืองอันไร้พันธนาการ"
 origin.5041.desc:0 "การรวมตัวกันเพื่อต่อต้านอดีตนายจ้างของเรานั้นง่ายดาย ด้วยศัตรูร่วมกัน เราดิ้นรนและต่อสู้เป็นหนึ่งเดียว แต่เมื่อได้รับอิสรภาพ รอยร้าวก็เริ่มปรากฏขึ้น\n\nเราเป็นผู้คนจากหลายโลก และการเมืองของเราก็มีความหลากหลายไม่แพ้กัน ฝักฝ่ายใหม่กำลังถูกก่อตั้งขึ้น และจะมีเพิ่มขึ้นตามมาอย่างแน่นอน ในฐานะประชาชน ความสามารถในการจัดการกับความแตกต่างเหล่านี้จะเป็นตัวกำหนดชะตากรรมของเรา"
 origin.5041.tt:0 "ฝักฝ่ายใหม่จะถูกจัดตั้งขึ้น"

 origin.5046.name:0 "ราคาแห่งอิสรภาพ"
 origin.5046.desc:0 "เราเป็นผู้คนจากหลายโลก และเมื่อเวลาผ่านไป เราได้เรียนรู้คุณค่าของความหลากหลาย อย่างไรก็ตาม การเจรจาต่อรองพลวัตของวัฒนธรรมที่แตกต่างกันหลายวัฒนธรรม - ไม่ต้องพูดถึงความต้องการทางกายภาพของสปีชีส์ที่แตกต่างกันโดยสิ้นเชิง - ไม่ใช่เรื่องง่าย ความแตกต่างของเรานั้นหยั่งรากลึก และแม้ว่าเราจะจัดการกับการเปลี่ยนแปลงทางการเมืองมาได้จนถึงตอนนี้ แต่การแบ่งแยกที่มีอยู่ในสังคมของเราก็เริ่มเป็นไปไม่ได้ที่จะเพิกเฉย\n\nหลายคนกำลังเรียกร้องให้มีการจัดตั้งคณะกรรมการพิเศษเพื่อประนีประนอมข้อเรียกร้องการปฏิรูป"
 origin.5046.a:0 "การสูญเสียทรัพยากรไปโดยเปล่าประโยชน์"
 origin.5046.b:0 "จัดตั้งคณะกรรมการ"
 cost_of_freedom_01:0 "ราคาแห่งอิสรภาพ"
 cost_of_freedom_01_desc:0 "ความแตกแยกที่ลึกซึ้งในวัฒนธรรมทางการเมืองของเราส่งผลให้เกิดความไม่สงบในสังคม"
 cost_of_freedom_02:0 "คณะกรรมการประชาชน"
 cost_of_freedom_02_desc:0 "คณะกรรมการได้รับการจัดตั้งขึ้นเพื่อตรวจสอบความแตกแยกที่ลึกซึ้งในวัฒนธรรมทางการเมืองของเรา"
 COST_OF_FREEDOM_PROJECT:0 "ราคาแห่งอิสรภาพ"
 COST_OF_FREEDOM_PROJECT_DESC:0 "สังคมของเราแบ่งแยกอย่างลึกซึ้ง การรวมตัวของหลายโลก และวัฒนธรรมที่แตกต่างกันมากมาย ไม่ได้เกิดขึ้นโดยไม่มีความตึงเครียด หวังว่าคณะกรรมการชุดนี้จะสามารถเสนอแนวทางแก้ไขปัญหานี้ได้"

 origin.5047.name:0 "การคิดแบบเติมเต็ม"
 origin.5047.desc:0 "เมื่อความคิดที่หลากหลายมารวมกัน ไม่มีทางรู้เลยว่าพวกเขาจะทำสิ่งใดสำเร็จได้บ้าง การเพิ่มสมาชิกใหม่ที่ไม่ใช่ [Root.GetSpeciesName] เข้ามาในทีมวิจัยของเรากำลังสร้างผลลัพธ์แล้ว"

 origin.5049.name:0 "การออกแบบที่หลากหลาย"
 origin.5049.desc:0 "ในฐานะประชาชนจากหลายโลก การบูรณาการไม่ใช่ไม่มีความท้าทาย อย่างไรก็ตาม การสังเคราะห์ประเพณีทางศิลปะที่หลากหลายของเราได้ส่งผลให้เกิดพลังสร้างสรรค์จำนวนมหาศาล ผลิตภัณฑ์ใหม่ๆ กำลังได้รับการส่งเสริม ศิลปินและนักออกแบบนับไม่ถ้วนได้ถือกำเนิดขึ้น ทั้งหมดล้วนได้รับแรงบันดาลใจให้ก้าวข้ามขีดจำกัดของการแสดงออก อุตสาหกรรมในประเทศกำลังรุ่งเรือง และประชากรของเราไม่เคยมีส่วนร่วมมากขนาดนี้มาก่อน"
 origin.5049.a:0 "จักรวาลคือผืนผ้าใบของเรา"
 diverse_design:0 "การออกแบบที่หลากหลาย"
 diverse_design_desc:0 "การประสานพลังของความคิดที่หลากหลายส่งผลให้เกิดประโยชน์มากมายแก่ประชากรของเรา"

 resolution_proposed_intro:0 "ข้อมูลที่ส่งมาถึงเราจากผู้ติดต่อของเราในสภากาแล็กซี: กำลังมีการร่างกฎหมายที่จะห้าม"
 origin.5094.name:0 "ข้อเสนอข้อมติกาแล็กซี"
 origin.5094.desc:0 "$resolution_proposed_intro$ ระบบทาสแรงงานและปศุสัตว์ทั่วทั้งกาแล็กซี หากเราประกาศตัวว่าสนับสนุนอิสรภาพอย่างแท้จริง เราต้องยืนหยัดอยู่เคียงข้างการเปลี่ยนแปลง ประชากรของเราจะคิดอย่างไรหากเราล้มเหลวในการลงมือทำ?"

 origin.5095.name:0 "การห้ามค้าทาสเกือบทุกรูปแบบ"
 origin.5095.desc:0 "วันอันยิ่งใหญ่ที่สภากาแล็กซี เมื่อสมาชิกต่างลงมติสั่งห้ามการค้าทาสเกือบทุกรูปแบบ ประชาชนแห่งกาแล็กซีจะไม่ต้องหวาดกลัวการกดขี่จากอันธพาลและบรรษัทที่หิวโหยผลกำไรอีกต่อไป แม้ว่าจะยังอีกยาวไกลก่อนที่สิทธิ์ในอิสรภาพของสิ่งมีชีวิตที่มีสติปัญญาทั้งหมดจะได้รับการรับประกัน แต่นี่ก็ถือเป็นก้าวแรกที่สำคัญ"
 origin.5095.a:0 "ผู้มีปัญญาเป็นฝ่ายชนะ"

 slavery_allowed_outro:0 "เนื่องจากการมีอยู่ของระบอบการปกครองที่กดขี่และบรรษัทที่เอารัดเอาเปรียบ การกระทำอันน่ารังเกียจนี้จะยังคงดำเนินต่อไปในอนาคตอันใกล้"
 origin.5100.name:0 "การค้าทาสได้รับการยอมรับอย่างเงียบๆ"
 origin.5100.desc:0 "วันอันน่าใจสลายที่สภากาแล็กซี เมื่อข้อเสนอเพื่อสั่งห้ามการค้าทาสส่วนใหญ่ไม่ได้รับคะแนนเสียงเพียงพอ $slavery_allowed_outro$"
 origin.5100.a:0 "พวกอันธพาลที่ป่าเถื่อน"

 origin.5104.desc:0 "$resolution_proposed_intro$ รูปแบบทาสเกือบทั้งหมด รวมถึงความน่าขยะแขยงของสัญญาแรงงานขัดหนี้ หากประสบการณ์ของเราได้สอนสิ่งใดแก่เรา มันคืออำนาจจะไม่ยอมอ่อนข้อให้โดยไม่มีการเรียกร้องใดๆ ที่ใดที่มีการค้าทาส ที่นั่นจะไม่มีความยุติธรรม เราต้องยืนหยัดร่วมกันกับสมาชิกผู้มีปัญญาคนอื่นๆ ในกาแล็กซี การทำเช่นนี้เท่านั้นที่เราจะสามารถรับประกันความปลอดภัยและศักดิ์ศรีของประชาชนของเราได้"

 origin.5105.name:0 "การค้าทาสถูกสั่งห้าม"
 origin.5105.desc:0 "วันประวัติศาสตร์ที่สภากาแล็กซี เมื่อสมาชิกต่างลงมติสั่งห้ามการค้าทาสทุกรูปแบบ - รวมถึงการกระทำอันชั่วร้ายของแรงงานขัดหนี้ บรรษัทอย่าง $NAME_MSI_country$ จะไม่สามารถเอาเปรียบผู้บริสุทธิ์เพื่อผลกำไรได้อีกต่อไป ในที่สุด หนึ่งในบทที่มืดมนที่สุดของประวัติศาสตร์กาแล็กซีก็สามารถปิดตัวลงได้เสียที"

 origin.5110.name:0 "การค้าทาสยังคงดำเนินต่อไป"
 origin.5110.desc:0 "ความเสียใจอย่างสุดซึ้งที่สภากาแล็กซี เมื่อข้อเสนอเพื่อสั่งห้ามการค้าทาสทุกรูปแบบล้มเหลว $slavery_allowed_outro$"
 origin.5110.a:0 "ข่าวร้าย"

 origin.5114.desc:0 "$resolution_proposed_intro$ การตกเป็นทาสของประชากรอินทรีย์ทั้งหมด สำหรับเราแล้ว ไม่สามารถประนีประนอมได้ การค้าทาสเป็นจุดด่างพร้อยของกาแล็กซี เราต้องทำทุกวิถีทางเพื่อยุติมันอย่างถาวร"

 origin.5115.name:0 "การค้าทาสอินทรีย์ถูกระงับ"
 origin.5115.desc:0 "วันประวัติศาสตร์ที่ตลาดกาแล็กซี ซึ่งได้ตัดสินใจในวันนี้สั่งห้ามการค้าทาสประชากรอินทรีย์ ประชาชนแห่งกาแล็กซีจะไม่ต้องหวาดกลัวการกดขี่จากอันธพาลและบรรษัทที่หิวโหยผลกำไรอีกต่อไป คืนนี้พวกเราทุกคนสามารถนอนหลับได้สนิทใจขึ้น"
 origin.5115.a:0 "ชัยชนะของทุกคน"

 origin.5120.name:0 "การค้าทาสอินทรีย์ดำเนินต่อไป"
 origin.5120.desc:0 "ความผิดหวังที่ตลาดกาแล็กซี เมื่อสมาชิกตกลงที่จะดำเนินการค้าทาสอันชั่วร้ายต่อไป $slavery_allowed_outro$"
 origin.5120.a:0 "พวกนายทุนที่ไร้เดียงสา"

 origin.5124.desc:0 "$resolution_proposed_intro$ การค้าทาสของสิ่งมีชีวิตที่มีสติปัญญาทุกรูปแบบ ไม่มีสปีชีส์ใดที่สามารถสวมโซ่ตรวนให้แก่บุคคลที่คิดได้โดยไม่พบว่าปลายอีกด้านของโซ่นั้นผูกมัดตัวเองไว้ในท้ายที่สุด เราต้องสนับสนุนข้อเสนอนี้"

 origin.5125.name:0 "ชัยชนะของสิ่งมีชีวิตที่มีสติปัญญาทั้งมวล"
 origin.5125.desc:0 "วันประวัติศาสตร์ที่ตลาดกาแล็กซี เมื่อสมาชิกต่างลงมติสั่งห้ามการค้าทาสในทุกรูปแบบ เสรีภาพเป็นสิทธิ์ตามธรรมชาติของสิ่งมีชีวิตที่มีสติปัญญาทั้งหมด วันนี้ บทเรียนอันชั่วร้ายในประวัติศาสตร์กาแล็กซีได้ปิดตัวลงอย่างสงบ"

 origin.5130.name:0 "การค้าทาสยังคงดำเนินต่อไป"
 origin.5130.desc:0 "วันอันน่าผิดหวังที่ตลาดกาแล็กซี ซึ่งมีการตัดสินใจที่จะดำเนินการขายสิ่งมีชีวิตสังเคราะห์ที่มีสติปัญญาต่อไป อีกครั้งที่อิทธิพลอันเลวร้ายของอำนาจและเงินตราได้ขัดขวางอุดมการณ์แห่งเสรีภาพ ไม่มีใคร - ไม่ว่าจะเป็นสิ่งมีชีวิตอินทรีย์หรือสิ่งมีชีวิตประดิษฐ์ - ที่สามารถสงบใจได้ตราบเท่าที่ยังมีสิ่งมีชีวิตที่มีสติปัญญาแม้เพียงรายเดียวที่ถูกบังคับให้เป็นทาส"

 origin.5131.name:0 "การยกเลิกการสั่งห้ามการค้าทาส"
 origin.5131.desc:0 "กองกำลังของบรรษัทประสบความสำเร็จในการยกเลิกข้อมติล่าสุดต่อต้านการค้าทาสของสภากาแล็กซี แม้ว่าเรื่องนี้จะน่าผิดหวัง แต่โชคร้ายที่มันไม่ได้อยู่นอกเหนือความคาดหมาย เส้นทางแห่งประวัติศาสตร์นั้นยาวไกล แต่ในท้ายที่สุด อุดมการณ์แห่งเสรีภาพจะได้รับชัยชนะ"
 origin.5131.a:0 "น่าผิดหวัง"
 broken_shackles_slavery_outlawed:0 "การค้าทาสในกาแล็กซีถูกสั่งห้าม"
 broken_shackles_slavery_continues:0 "การค้าทาสในกาแล็กซีดำเนินต่อไป"
 broken_shackles_slavery_repeal:0 "ยกเลิกคำสั่งห้ามค้าทาส"

 #Crashed Slaver Ship - Initial Arc Site

 broken_shackles_digsite:0 "ซากยานทาสตก"
 broken_shackles_desc:0 "การซ่อมแซมแกนคอมพิวเตอร์ของยานทาสที่ตกควรจะเปิดเผยตำแหน่งดาวบ้านเกิดเดิมของเรา... ตลอดจน $NAME_MSI_country$"

 origin.5015.name:0 "สะพานเดินเรือ"
 origin.5015.desc:0 "ในระหว่างการก่อกบฏ ยานทาสที่นำพาเรามายัง [Root.owner.capital_scope.GetName] ได้รับความเสียหายอย่างหนัก หลังจากการตก ลำดับความสำคัญแรกของเราคือการเอาชีวิตรอด นอกเหนือจากการถอดแยกชิ้นส่วนของยานเพื่อเอาทรัพยากรแล้ว เราก็แทบไม่ได้สนใจมันเลย แต่ตอนนี้เวลาได้มาถึงแล้วที่จะเปิดเผยความลับของอดีตนายจ้างของเรา\n\nในการทำเช่นนั้น จำเป็นต้องกู้คืนพลังงานให้กับคอมพิวเตอร์ส่วนกลางของยาน ในขั้นแรก วิศวกร [engineering_shackled_species.GetAdj] ของเราได้ติดตั้งแผงโซลาร์เซลล์จำนวนหนึ่งเข้ากับตัวถังด้านนอกของยาน คอนโซลควบคุมบนสะพานเดินเรือเปิดใช้งานได้แล้วในตอนนี้ โชคร้ายที่ดาดฟ้าวิศวกรรมถูกปิดผนึกไว้ระหว่างการตก และการเจาะผ่านประตูนิรภัยคงจะไม่ใช่เรื่องง่าย"

 origin.5020.name:0 "ห้องวิศวกรรม"
 origin.5020.desc:0 "พูดได้เต็มปากเลยเกี่ยวกับ $NAME_MSI_country$: ไอพวกสวะค้าทาสรู้วิธีปกป้องความลับของตัวเองเป็นอย่างดี\n\nการงัดเปิดประตูนิรภัยของยานได้รับการพิสูจน์ว่าเป็นงานที่หนักหนาสาหัสมาก เครื่องตัดเลเซอร์เพียงไม่กี่ชิ้นที่เรามีนั้นถูกออกแบบมาเพื่อการทำเหมืองขนาดเล็ก ทีมงานทำได้เพียงขุดอุโมงค์ขึ้นมาจากดาดฟ้าด้านล่างเพื่อสร้างความคืบหน้า วิศวกร [engineering_shackled_species.GetAdj] กำลังทำงานอย่างหนักเพื่อกู้คืนพลังงานให้แก่ระบบที่เหลืออยู่ของยานในขณะนี้"

 origin.5025.name:0 "แกนกลาง"
 origin.5025.desc:0 "แม้ว่าวิศวกร [engineering_shackled_species.GetAdj] ของเราจะสามารถกู้คืนพลังงานให้แก่แกนคอมพิวเตอร์ของยานได้แล้ว แต่ฮาร์ดแวร์ส่วนสำคัญส่วนหนึ่งได้รับความเสียหายจากการตก มันน่าจะซ่อมแซมได้ แต่การทำเช่นนั้นหมายถึงการสร้างภาระงานให้แก่ทีมวิทยาศาสตร์ที่ทำงานหนักเกินตัวอยู่แล้วของเราเพิ่มขึ้นไปอีก"
 origin.5025.a:0 "เราต้องการข้อมูลนั้น ซ่อมแซมแกนคอมพิวเตอร์ซะ"
 broken_shackles_arc_site:0 "การจัดสรรทรัพยากรการวิจัย"
 broken_shackles_arc_site_desc:0 "การซ่อมแซมแกนคอมพิวเตอร์ของฝ่ายค้าทาสกำลังสร้างภาระงานอย่างมากให้แก่วิศวกรของเรา"

 origin.5030.name:0 "ผู้ให้ความร่วมมือ"
 origin.5030.desc:0 "ต้องขอบคุณการคิดนอกกรอบที่น่าทึ่ง วิศวกร [engineering_shackled_species.GetAdj] ของเราสามารถเริ่มการทำงานของแกนคอมพิวเตอร์ที่เสียหายได้อีกครั้ง โดยการนำเอไอเชิงขั้นตอนเข้าไปยังระบบของยาน เราสามารถดึงมันเข้ามาพูดคุยได้ โดยหลักๆ แล้วเราได้โน้มน้าวให้เครื่องจักรทำงานร่วมกับเรา แทนที่จะต่อต้านเรา\n\nความสำเร็จครั้งใหญ่นี้ได้ช่วยให้นักวิทยาศาสตร์ของเราได้รับข้อมูลเชิงลึกใหม่เกี่ยวกับธรรมชาติของการเข้ารหัสข้อมูล ในขณะที่เรายังคงสร้างตัวตนให้เด่นชัดบนเวทีกาแล็กซี ความรู้นี้อาจมีค่าประเมินไม่ได้"

 origin.5035.name:0 "เหมืองข้อมูล"
 origin.5035.desc:1 "แกนคอมพิวเตอร์ที่เสียหายได้รับการซ่อมแซมโดยสมบูรณ์แล้ว และแม้ว่าข้อมูลส่วนใหญ่จะถูกเข้ารหัสไว้ แต่ความพยายามในการถอดรหัสก็ได้เริ่มขึ้นแล้ว หากเรายินดีที่จะสละเวลาและจัดสรรทรัพยากร มันก็เป็นเพียงเรื่องของเวลาเท่านั้นก่อนที่เราจะสามารถเข้าถึงทุกสิ่งได้ - รวมถึงตำแหน่งของดาวบ้านเกิดเดิมของเรา"

 origin.5035.desc.MSInocontact:0 "$origin.5035.desc$\n\nอันที่จริง เราอาจจะเรียนรู้สิ่งที่เป็นประโยชน์ต่อเราแล้ว: จากการคำนวณพิกัดทางแยกไฮเปอร์เลนตามเส้นทางการบินของยานทาส เราได้เปิดเผยพิกัดกาแล็กซีของ $NAME_MSI_country$\n\nตอนนี้เรามีทางเลือก ไม่ว่าจะเผชิญหน้ากับอดีตนายจ้างของเรา หรือปล่อยให้พวกเขาเผชิญชะตากรรมของตนเอง"

 BROKEN_SHACKLES_PROJECT_01:0 "ค้นหาตำแหน่งดาวบ้านเกิด"
 BROKEN_SHACKLES_PROJECT_01_DESC:0 "ตอนนี้ไฟล์ในยานทาสที่ตกได้รับการถอดรหัสอย่างสมบูรณ์แล้ว เราจะสามารถระบุตำแหน่งพิกัดกาแล็กซีของดาวบ้านเกิดของเราได้"

 origin.5040.name:0 "ระบุตำแหน่งดาวบ้านเกิดสำเร็จ"
 origin.5040.desc:0 "โครงการพิเศษเพื่อถอดรหัสฐานข้อมูลบนซากยานทาสตกได้เสร็จสิ้นลงแล้ว เราได้ค้นพบตำแหน่งดาวบ้านเกิดเดิมของเรา วันนี้ เราเฉลิมฉลองการก้าวไปอีกขั้นบนเส้นทางสู่การปลดแอก"
 origin.5040.a:0 "วันอันยิ่งใหญ่สำหรับผู้คนของเรา"
 origin.5040.a.tooltip:0 "การค้นพบดาวบ้านเกิดเดิมของเราสามารถติดตามได้ในบันทึกสถานการณ์แล้ว"
 broken_shackles_MSI_found:0 "$NAME_MSI_country_initials$ล็อคคาม"
 broken_shackles_find_home_01:0 "ดาวบ้านเกิดหลัก"
 broken_shackles_find_home_01_desc:0 "ดาวบ้านเกิดเดิมของประชากรกลุ่มใหญ่ที่สุดของเรา"
 broken_shackles_find_home_02:0 "ดาวบ้านเกิดดวงที่สอง"
 broken_shackles_find_home_02_desc:0 "ดาวบ้านเกิดเดิมของสปีชีส์หนึ่งในจักรวรรดิเรา"
 broken_shackles_find_home_03:0 "ดาวบ้านเกิดดวงที่สาม"
 broken_shackles_find_home_03_desc:0 "ดาวบ้านเกิดเดิมของสปีชีส์อื่นในจักรวรรดิเรา"

 origin.5065.name:0 "การติดต่อกับ $NAME_MSI_country_initials$"
 origin.5065.desc:0 "ช่วงเวลาที่เราเฝ้ารอมานานได้มาถึงแล้ว: เราได้ทำการติดต่อกับ §H[This.ContactCountry.GetRealName]§!\n\nหลังการก่อกบฏ บางคนหวังว่าเราจะสามารถหลีกเลี่ยงการตรวจจับได้ แต่ตอนนี้เป็นที่แน่ชัดแล้วว่า $NAME_MSI_country$ รับรู้ถึงการมีอยู่ของเราบนเวทีกาแล็กซีมาระยะหนึ่งแล้ว มีเพียงการแสวงหาผลกำไรเท่านั้นที่ทำให้พวกเขาไม่เดินทางกลับมายัง [Root.owner.capital_scope.GetName] เพื่อเก็บรวบรวม 'สินทรัพย์ที่ถูกต้องตามกฎหมาย' ดูเหมือนว่าเราจะไม่มีค่าพอสำหรับต้นทุนในการเดินทาง"
 origin.5065.a:0 "ก็ตามคาด"
 broken_shackles_MSI_contact_01:0 "ติดต่อกับ $NAME_MSI_country_initials$"

 origin.5070.name:0 "คำมั่นสัญญาที่ยิ่งใหญ่"
 origin.5070.desc:0 "ตัวแทนจาก §H[This.ContactCountry.GetRealName]§! ได้เข้าหาทูตของเราพร้อมข้อเสนอแห่งมิตรภาพ แต่เราต่างรู้ดีว่าคำรับรองเหล่านั้นว่างเปล่าเพียงใด\n\nบรรษัทดังกล่าวเข้ามาในโลกของเราเป็นครั้งแรกพร้อมคำมั่นสัญญาถึงชีวิตที่ดีกว่า ด้วยถ้อยคำหวานหูและของขวัญฟุ่มเฟือย พวกเขาทำให้ผู้นำของเราใจอ่อน มีการให้เงินกู้และลงนามในสัญญา เงินทุนหมุนเวียนไหลเข้ามา และตลาดของเราเต็มไปด้วยสินค้า ก่อนที่เราจะเข้าใจอย่างถ่องแท้ว่าเกิดอะไรขึ้น ทุกอย่างก็เสร็จสิ้นแล้ว: เราได้กลายเป็นสินทรัพย์ และ $NAME_MSI_country_initials$ คือนายของพวกเรา\n\nจะไม่เกิดขึ้นอีกแล้ว ขณะที่เราก้าวไปข้างหน้าบนเวทีกาแล็กซี สิ่งสำคัญคือเราต้องยืนหยัดได้ด้วยตัวเอง"
 origin.5070.a:0 "เราจะไม่ถูกหลอกอีก"

 origin.5075.name:0 "การสถาปนาความสัมพันธ์ทางการทูตอย่างเป็นทางการ"
 origin.5075.desc:0 "หลังจากการประชุมที่ยืดเยื้อและเคร่งเครียด ความสัมพันธ์ทางการทูตได้ถูกจัดตั้งขึ้นระหว่างเราและ §H[This.ContactCountry.GetRealName]§! อย่างไรก็ตาม ไม่ว่าพวกเขาจะอ้างเรื่องมิตรภาพอย่างไร เราก็ไม่เคยลืมสิ่งที่พวกเขาทำกับดาวบ้านเกิดของเรา ความคิดที่ว่าบรรษัทนี้ไม่ได้รับการลงโทษใดๆ และยังเป็นอิสระที่จะกดขี่คนอื่นให้เป็นทาสอย่างที่เคยทำกับเรา... ความรู้สึกมันเกินบรรยาย\n\nครั้งหนึ่งพวกเขาเคยเรียกเราว่าทรัพย์สิน ให้เราได้สอนพวกเขาถึงคุณค่าของประชาชนที่เป็นอิสระ"
 origin.5075.a:0 "เราจะไม่ก้มหัวให้"
 broken_shackles_MSI_contact_02:1 "ไม่ยอมจำนน"

 origin.5080.name:0 "การพบกันที่ชุมชนกาแลกซี"
 origin.5080.desc:0 "คำกล่าวจากตัวแทนของเราที่ชุมชนกาแลกซี: ได้มีการติดต่อกับ [MSI_country.GetName] แล้ว\n\nบรรษัทดังกล่าวมาถึงโลกของเราครั้งแรกพร้อมกับคำสัญญาถึงชีวิตที่ดีกว่า พวกเขาทำให้ผู้นำของเราใจอ่อนด้วยคำหวานและของขวัญอันฟุ่มเฟือย มีการให้กู้ยืมและลงนามในสัญญา ก่อนที่เราจะเข้าใจอย่างถ่องแท้ว่าเกิดอะไรขึ้น ทุกอย่างก็สายไปเสียแล้ว: เรากลายเป็นสินทรัพย์ และพวกเขากลายเป็นนายของเรา สมาชิกของชุมชนกาแลกซีต้องได้รับคำเตือน ไม่อาจไว้วางใจ $NAME_MSI_country_initials$ ได้"

 MSI_war_outro:0 "เราไม่ได้แสวงหาสงครามนี้ แต่เราจะเป็นผู้ยุติมันเอง"
 origin.5135.name:0 "ไร้เครื่องพันธนาการ"
 origin.5135.attackers.desc:0 "เราใช้ชีวิตอยู่ใต้ร่มเงาแห่งความกลัวต่ออดีตนายของเรามานานเกินไปแล้ว แม้เราจะได้เพลิดเพลินกับอิสรภาพที่ได้มาอย่างชอบธรรม แต่ผู้คนอีกมากเหลือเกินยังคงต้องทนทุกข์ทรมานภายใต้ความต่ำต้อยของการตกเป็นทาสสัญญาผูกมัด บางคนอาจประณามว่านี่คือสงครามรุกราน อย่างไรก็ตาม ถึงเวลาแล้วที่เราจะโจมตีเผด็จการ เหล่าอันธพาลกระจอกและพวกหน้าเลือดในกาแลกซีจะไม่ได้รับอนุญาตให้ทำมาค้าขายอันชั่วร้ายนี้อีกต่อไป\n\nวันนี้ เราจะกรีธาทัพสู่สงคราม"
 origin.5135.defenders.desc:0 "หลังจากล้มเหลวในการพิชิตเราด้วยเงินและคำลวง ตอนนี้ $NAME_MSI_country$ จะพยายามใช้กำลัง คณะกรรมการบริหารของพวกเขาคิดว่าเราอ่อนแอ แต่ในการสลัดเครื่องพันธนาการทิ้งไป เราได้หล่อหลอมอัตลักษณ์ที่ไม่มีวันแตกสลายขึ้นมา\n\n$MSI_war_outro$"
 origin.5135.a:0 "จงทำให้พวกมันสั่นสะท้าน"

 origin.5140.name:0 "ความยุติธรรมที่ถูกผลัดผ่อน"
 origin.5140.desc:0 "สิ่งที่ไม่คาดฝันได้เกิดขึ้นแล้ว [From.GetName] เป็นฝ่ายชนะ และเราต้องก้มหัวอยู่ภายใต้แอกของพวกมันอีกครั้ง แต่แม้เราอาจจะแพ้ในสงครามนี้ การต่อสู้เพื่อความเท่าเทียมและความยุติธรรมก็ยังอีกยาวไกลนัก"
 origin.5140.a:0 "เราจะจดจำไว้"

 origin.5142.name:0 "สถานภาพเดิมอันไม่มั่นคง"
 origin.5142.desc:0 "เราได้บรรลุข้อตกลงสถานภาพเดิมกับ [MSI_country.GetName] แล้ว แต่ขอให้รู้ไว้ว่าเราไม่เคยลืมสิ่งที่พวกเขาทำกับเรา และเราก็ไม่เคยให้อภัยด้วย"

 origin.5145.name:0 "ทวงคืนความยุติธรรม"
 origin.5145.desc:0 "ชัยชนะเป็นของเรา ในการเอาชนะ [From.GetName] เราไม่เพียงแต่ได้ศักดิ์ศรีกลับคืนมา แต่ยังพิสูจน์ให้เห็นว่าเราคือผู้กำหนดชะตากรรมของตนเอง\n\nในการสลัดโซ่ตรวนออกไป เราได้พบเป้าหมายร่วมกัน วันนี้เราเป็นอิสระอย่างแท้จริงแล้ว"
 broken_shackles_war_01:0 "สงครามแห่งอิสรภาพ"
 broken_shackles_war_02:0 "พ่ายแพ้แต่ไม่แตกสลาย"
 broken_shackles_war_03:0 "ไร้พันธนาการอย่างแท้จริง"
 broken_shackles_war_04:0 "บทคร่ำครวญแห่งสถานภาพเดิม"

 origin.5146.name:0 "ฝ่าแนวรบอีกครา"
 origin.5146.attackers.desc:1 "$NAME_MSI_country$ ลักพาตัวเราไปจากโลกของเรา ขังคุกและบังคับใช้แรงงานเรา แม้กระทั่งในตอนนี้ พวกเขาก็ยังคงทำการค้าอันชั่วร้ายภายใต้หน้ากากของพาณิชยกรรม ถึงเวลาแล้วที่จะยุติพวกมันลงสักที"
 origin.5146.defenders.desc:0 "หลังจากที่เคยล้มเหลวในการสยบเรา ตอนนี้ $NAME_MSI_country$ ได้ประกาศสงครามอีกครั้ง คณะกรรมการบริหารของพวกมันไม่ไร้ความสามารถ ก็คงบ้า หรืออาจจะเป็นทั้งสองอย่าง ประชาชนที่เป็นอิสระไม่มีวันแตกสลาย\n\n$MSI_war_outro$"
 origin.5146.a:0 "จงประกาศศึก"

 origin.5147.name:0 "อุดมการณ์อันชอบธรรม"
 origin.5147.desc:0 "ในขณะที่เราได้รับประโยชน์จากอิสรภาพที่ได้มาอย่างชอบธรรม ผู้คนในกาแลกซีอีกมากเหลือเกินยังคงต้องทนทุกข์ทรมานภายใต้ความอัปยศของการเป็นทาสและการบังคับใช้แรงงาน เหล่าอันธพาลกระจอกและพวกหน้าเลือดในกาแลกซีจะไม่ได้รับอนุญาตให้ทำมาค้าขายอันชั่วร้ายนี้อีกต่อไป\n\nถึงเวลาแล้วที่เราต้องยืนหยัดต่อสู้กับทรราชเช่นนี้"
 origin.5147.a:0 "สู่สงคราม"

 origin.5150.name:0 "พันธมิตรที่ไม่คาดคิด"
 origin.5150.desc:0 "วันนี้ เราได้เข้าร่วมสหพันธรัฐกับ §Y$NAME_MSI_country$§!\n\nตอนที่เราเรียกร้องอิสรภาพเป็นครั้งแรก พัฒนาการเช่นนี้คงเป็นเรื่องที่คิดไม่ถึง การที่เราสามารถมีส่วนร่วมทางการทูตอย่างสันติกับผู้คุมตัวเราในอดีตได้ แสดงถึงความเติบโตที่เพิ่มขึ้นของประเทศเรา\n\nจะมีคนในหมู่พวกเราที่ไม่พอใจกับการตัดสินใจครั้งนี้ แต่ในกรณีนี้ ผลลัพธ์ย่อมพิสูจน์ถึงวิธีการ"
 origin.5150.a:0 "ความชั่วร้ายที่จำเป็น"

 origin.5151.name:0 "แนวร่วมอันกระอักกระอ่วน"
 origin.5151.desc:0 "วันนี้ เราได้ตัดสินใจอย่างยากลำบากที่จะเข้าร่วมสหพันธรัฐกับผู้ค้าทาสที่มีชื่อเสียง แม้เราจะถือว่าอิสรภาพของสิ่งมีชีวิตที่มีความรู้สึกนึกคิดทุกคนเป็นสิทธิ์ที่ไม่อาจพรากไปได้ แต่ความจำเป็นของรัฐทำให้เราต้องยอมประนีประนอม ประชาชนของเราอาจไม่มีความสุข แต่เราทำสิ่งนี้เพื่อประโยชน์ส่วนรวม"
 broken_shackles_federated_02:0 "พันธมิตรที่ไม่คาดคิด"
 broken_shackles_federated_01:0 "แนวร่วมอันกระอักกระอ่วน"

 MSI_home_system_poi:0 "$NAME_MSI_country$"
 MSI_home_system_desc:0 "พิกัดกาแลกซีของ $NAME_MSI_country$"
 MSI_chain_title:0 "ระบุพิกัดของ $NAME_MSI_country_initials$ ได้แล้ว"
 MSI_chain_desc:0 "เราได้ทราบพิกัดกาแลกซีของ $NAME_MSI_country$ แล้ว"
 MSI_discoveries:0 "กำลังสะกดรอย $NAME_MSI_country_initials$"
 homeworlds_chain:0 "ตามหาบ้านเกิด"
 homeworlds_chain_title:0 "ตามหาบ้านเกิด"
 homeworlds_chain_desc:0 "ด้วยข้อมูลที่กู้คืนมาจากยานค้าทาสที่ตก เราได้ระบุพิกัดกาแลกซีของโลกบ้านเกิดเดิมของเราแล้ว ประชาชนของเราต่างเรียกร้องที่จะเดินทางกลับ"
 found_homeworlds:0 "การกลับบ้าน"
 broken_shackles_homeworlds_found:0 "ทวงคืนรากเหง้า"

 origin.5270.name:0 "ทวงคืนรากเหง้า"
 origin.5270.desc:0 "การเดินทางของเราข้ามหมู่ดาวได้เผยให้เห็นสิ่งมหัศจรรย์มากมาย เราได้ประจักษ์กับภาพเหนือจินตนาการ บรรลุเป้าหมายที่ตอนแรกดูเหมือนจะเป็นไปไม่ได้ ในฐานะประชาชนคนหนึ่ง เราเดินทางมาไกลแสนไกล แต่ไม่มีการเดินทางใด และไม่มีรางวัลใดจะยิ่งใหญ่ไปกว่าการหาทางกลับบ้านได้พบ"

 origin.5200.name:0 "การแบ่งขั้วที่เพิ่มขึ้น"
 origin.5200.desc:0 "สื่อยอดนิยมต่างเต็มไปด้วยรายงานเกี่ยวกับความล้มเหลวของการบูรณาการระหว่างสายพันธุ์ สิ่งที่น่ากังวลเป็นพิเศษคือค่าใช้จ่ายในการสนับสนุนประชากรบางกลุ่มบนโลกที่เซโนไทป์ของพวกเขาไม่เคยวิวัฒนาการมาเพื่ออาศัยอยู่ ในขณะที่ความตึงเครียดเพิ่มขึ้นอย่างต่อเนื่อง กองกำลังความมั่นคงได้รายงานถึงความขัดแย้งระหว่างสายพันธุ์ที่เพิ่มขึ้นอย่างน่าตกใจ"
 origin.5200.a:0 "เราจะไม่จำกัดเสรีภาพในการพูด"
 origin.5200.b:0 "สั่งการให้สื่อลดระดับวาทกรรมลง"

 origin.5205.name:0 "ผลการสืบสวนของคณะกรรมการพิเศษ"
 origin.5205.desc:0 "คณะกรรมการพิเศษได้เผยแพร่ผลการศึกษาอย่างละเอียดเกี่ยวกับความแตกแยกทางการเมืองในสังคมของเรา พวกเขาได้ระบุถึงประเด็นหลักสามประการที่ขับเคลื่อนการแบ่งขั้วทางการเมืองภายใน [Root.GetName]:\n\n1. ค่าใช้จ่ายที่ไม่เท่าเทียมกันซึ่งเชื่อมโยงกับการจัดหามาตรฐานการครองชีพขั้นต่ำให้แก่เซโนไทป์ที่หลากหลาย\n\n2. ระบบความเชื่อและพฤติกรรมที่ไม่สอดคล้องกันระหว่างกลุ่มวัฒนธรรมที่แตกต่างกันหลายกลุ่ม\n\n3. ลักษณะของอำนาจทางการเมืองของเราซึ่งขัดแย้งกับ (หรือแม้กระทั่งตรงกันข้ามกับ) ค่านิยมของบางสายพันธุ์"
 origin.5205.a:0 "ให้ความสำคัญกับความเสมอภาคก่อน"
 origin.5205.b:0 "ส่งเสริมการแลกเปลี่ยนทางวัฒนธรรม"
 origin.5205.c:0 "สนับสนุนการมีส่วนร่วมทางการเมือง"
 origin.5205.d:0 "ประเด็นเหล่านี้เชื่อมโยงถึงกันหมด"
 origin.5205.e:0 "การควบคุมสื่อนั้นมีค่าใช้จ่ายน้อยกว่า"
 origin.5205.a.tooltip:0 "§Lการรับประกันผลประโยชน์ที่ยุติธรรมและเท่าเทียมกันสำหรับทุกคนในสังคมของเราจะไม่ใช่เรื่องง่ายหรือราคาถูก แต่มันก็จำเป็น§!"
 origin.5205.b.tooltip:0 "§Lการลงทุนในการมีส่วนร่วมข้ามวัฒนธรรมย่อมให้ผลตอบแทนคุ้มค่าในอนาคตอย่างแน่นอน§!"
 origin.5205.c.tooltip:0 "§Lทุกอย่างคือการเมือง สังคมที่สมบูรณ์คือสังคมที่ลงทุนในพลเมืองที่มีส่วนร่วมและตื่นตัว§!"
 origin.5205.d.tooltip:0 "§Lการแก้ไขปัญหาระดับโครงสร้างในสังคมของเราต้องอาศัยการลงทุนทั้งเวลาและทรัพยากรอย่างมหาศาล§!"
 origin.5205.e.tooltip:0 "§Lการกำกับดูแลสื่อโดยรัฐบาลเป็นสิ่งจำเป็นเพื่อลดการแบ่งขั้วทางการเมือง§!"

 origin.5210.name:0 "วัฒนธรรมแห่งการแบ่งแยก"
 origin.5210.desc:0 "การกำกับดูแลจากภาครัฐอาจช่วยลดความตึงเครียดของวาทกรรมทางการเมืองได้ แต่ก็แทบไม่ได้ช่วยต่อสู้กับความแบ่งแยกในสังคม ผู้นำชุมชนยังคงหว่านเมล็ดพันธุ์แห่งความบาดหมางระหว่างสายพันธุ์และกลุ่มวัฒนธรรมต่างๆ เมื่อพิจารณาจากข้อมูลประเภทต่างๆ ที่เผยแพร่บนเครือข่ายสารสนเทศ ปัญหานี้จะเลวร้ายลงอย่างแน่นอนก่อนที่จะดีขึ้น"
 origin.5210.a:0 "เราจำเป็นต้องแก้ไขปัญหาที่ต้นเหตุ"
 origin.5210.b:0 "จำกัดการเข้าถึงเครือข่ายสารสนเทศ"

 origin.5215.name:0 "ความรุนแรงระหว่างสายพันธุ์"
 origin.5215.desc:0 "เป็นเวลากว่าหลายเดือนแล้วที่เราจำกัดการเข้าถึงเครือข่ายสารสนเทศของสาธารณชน แม้ว่าสิ่งนี้จะขัดขวางไม่ให้กลุ่มความคิดสุดโต่งทางการเมืองบางกลุ่มมีพื้นที่พูดคุย แต่ต้นตอของความขัดแย้งระหว่างสายพันธุ์กลับไม่ได้รับการแก้ไข ความรุนแรง รวมถึงการทำลายทรัพย์สินขนาดใหญ่ กำลังเพิ่มสูงขึ้นทั่วทั้งระบบของเรา"
 origin.5215.a:0 "ฟื้นฟูความเป็นระเบียบเรียบร้อยไม่ว่าจะต้องแลกด้วยอะไรก็ตาม"

 origin.5220.name:0 "ระเบียบดวงดาวใหม่"
 origin.5220.desc:0 "กองกำลังความมั่นคงของเราประสบความสำเร็จในการฟื้นฟูความเป็นระเบียบเรียบร้อยทั่วทั้งระบบ หัวรุนแรงทางการเมืองทุกรูปแบบถูกต้อนมารวมกันและถูกจำคุก และผู้นำของพวกเขาเผชิญหน้ากับข้อหาทรยศต่อรัฐ\n\nเมื่อเรามองย้อนกลับไปในช่วงเวลาอันน่าเสียใจนี้ในประวัติศาสตร์ของเรา สิ่งหนึ่งก็ชัดเจนอย่างยิ่ง: สังคมอย่างเราสามารถปกครองได้ด้วยมือที่เด็ดขาดเท่านั้น และถึงเวลาแล้วที่เราจะต้องจัดหาผู้ปกครองเช่นนั้น"
 origin.5220.a:0 "รวมกันเราเติบโต"

 origin.5225.name:0 "ภาพโมเสกที่แตกร้าว"
 origin.5225.desc:0 "นับตั้งแต่ก่อตั้ง สังคมของเราถูกหล่อหลอมด้วยความขัดแย้ง บางทีมันอาจจะเป็นเรื่องที่เลี่ยงไม่ได้ที่ทุกอย่างจะเลวร้ายลงก่อนจะดีขึ้น กลุ่มสร้างความเกลียดชังแพร่กระจายไปทั่วเครือข่ายสารสนเทศ เสียงเรียกร้องให้ขับไล่สายพันธุ์ใดสายพันธุ์หนึ่งออกไปจากระบบของเรากลายเป็นเรื่องที่พบเห็นได้ทั่วไป ทว่าก็ยังมีสัญญาณของการตระหนักรู้ถึงการต่อสู้ร่วมกันมากขึ้นด้วย\n\nกลุ่มต่างๆ ที่แทบจะไม่มีสิ่งใดร่วมกันเลยนอกจากความปรารถนาในการเปลี่ยนแปลง ได้มารวมตัวกันบ่อยขึ้นเรื่อยๆ การเผชิญหน้ากับปัญหาตรงๆ ทำให้เราได้ส่องแสงไปยังสิ่งที่เป็นเช่นนั้นซึ่งอาจเติบโตขึ้นในความมืดมิด บางทีวันหนึ่งเราจะมองย้อนกลับไปยังช่วงเวลาแห่งความขัดแย้งนี้ในฐานะจุดเปลี่ยนสำคัญของสถานการณ์"

 origin.5230.name:0 "กบฏวัยเยาว์"
 origin.5230.desc:0 "รัฐบาลนี้ได้ทำงานอย่างไม่รู้จักเหน็ดเหนื่อยเพื่อปรับปรุงคุณภาพชีวิตของพลเมืองของเรา เราลงทุนในการศึกษา การป้องกันอาชญากรรม และโครงการทางวัฒนธรรมทุกประเภท อย่างไรก็ดี เรายังคงตกเป็นเป้าหมายของการวิพากษ์วิจารณ์อย่างไม่หยุดยั้ง ยิ่งไปกว่านั้น ขบวนการคนหนุ่มสาวข้ามสายพันธุ์ได้รับการจัดตั้งขึ้น เรียกร้องการปฏิรูปที่รุนแรงขึ้นและการเปลี่ยนแปลงที่รวดเร็วกว่าเดิม\n\nข้อดีเพียงหนึ่งเดียวที่พบในที่นี้คือ: ในการกระตุ้นให้เยาวชนลงมือทำ เราอาจสร้างเงื่อนไขที่จำเป็นสำหรับการรักษาความแตกแยกในสังคมของเราขึ้นมาโดยไม่เจตนา"

 origin.5235.name:0 "การจมดิ่งสู่ความฟุ้งเฟ้อ"
 origin.5235.desc:0 "แม้จะมีความพยายามอย่างต่อเนื่องในการส่งเสริมสภาพแวดล้อมทางการเมืองที่ดี แต่จนถึงตอนนี้ ประชาชนทั่วไปยังคงมีส่วนร่วมน้อยมาก ผลสำรวจความคิดเห็นของสาธารณชนแสดงให้เห็นอย่างสม่ำเสมอว่าความแตกแยกครั้งใหญ่ยังคงมีอยู่ระหว่างสายพันธุ์และวัฒนธรรมต่างๆ ที่ประกอบขึ้นเป็นสังคมของเรา\n\nในความเชื่อมโยงที่เห็นได้ชัด นักเศรษฐศาสตร์ของเราสังเกตเห็นการใช้จ่ายของผู้บริโภคที่เพิ่มขึ้นอย่างเด่นชัด แม้ว่านี่อาจจะดีต่อธุรกิจในระยะสั้น แต่ก็นำไปสู่การพุ่งสูงขึ้นของอัตราเงินเฟ้อเช่นกัน เป็นไปได้ว่าประชาชนของเราเพียงแค่เหนื่อยล้าจากความขัดแย้งและความบาดหมาง\n\nเป็นเรื่องที่น่าตลกร้าย เมื่อพวกเขาปิดกั้นตนเองทางการเมือง พวกเขาก็กลับมารวมกันเป็นหนึ่งเดียวในความปรารถนาร่วมกันที่จะบริโภค"

 cost_of_freedom_outro:0 "แน่นอนว่าความขัดแย้งทางการเมืองบางส่วนยังคงหลงเหลืออยู่ แต่สายสัมพันธ์ที่เราสร้างร่วมกันจะไม่มีวันแตกสลาย"

 origin.5240.name:0 "สังคมที่ยุติธรรม"
 origin.5240.desc:0 "ในฐานะประชาชน เราต้องเผชิญกับอุปสรรคที่แทบเป็นไปไม่ได้ กลุ่มอดีตทาสที่หลากหลายซึ่งมารวมตัวกันในการต่อสู้เพื่ออิสรภาพ เส้นทางของเราไม่เคยง่ายดาย แต่ในการเลือกที่จะรวมทรัพยากรของเราเพื่อเป้าหมายแห่งความยุติธรรม เราประสบความสำเร็จในการหล่อหลอมอัตลักษณ์ในฐานะชาติ $cost_of_freedom_outro$"

 origin.5245.name:0 "ยุคฟื้นฟูศิลปวิทยาการทางวัฒนธรรม"
 origin.5245.desc:0 "ตั้งแต่เริ่มต้น เราเผชิญกับอุปสรรคที่แทบไม่มีทางผ่านพ้น กลุ่มของทาสและคนรับใช้ที่ผูกมัดมารวมตัวกันเพื่อสลัดโซ่ตรวน... จะมีรากฐานใดที่แข็งแกร่งไปกว่านี้ได้อีก? มันไม่ใช่เรื่องง่ายเลย แต่ในการเลือกที่จะส่งเสริมการสนทนาข้ามวัฒนธรรม เราได้สร้างสังคมที่แข็งแกร่งและเจริญรุ่งเรือง $cost_of_freedom_outro$"

 origin.5250.name:0 "พหุนิยมอันเปี่ยมด้วยพลัง"
 origin.5250.desc:0 "เราแทบไม่ทันคิดเลยว่าการต่อสู้เพื่อความเท่าเทียมเพิ่งจะเริ่มต้นขึ้นเมื่อเราลุกขึ้นเรียกร้องอิสรภาพ ในฐานะประชาชนจากหลายโลก มันไม่เคยง่ายเลยสำหรับเราที่จะสร้างฉันทามติหรือค้นหาจุดร่วม แต่จากการลงทุนในการมีส่วนร่วมทางการเมือง เราประสบความสำเร็จในการสร้างสังคมที่มั่นคงและเจริญรุ่งเรือง $cost_of_freedom_outro$"

 origin.5255.name:0 "สังคมที่เติบโตเต็มที่"
 origin.5255.desc:0 "ด้วยความสมัครสมานสามัคคีจากความปรารถนาในอิสรภาพ เราลุกฮือขึ้นต่อต้านอดีตนายของเรา แต่สังคมไม่ได้ถูกสร้างขึ้นด้วยความรุนแรงเพียงอย่างเดียว ตั้งแต่ความแตกแยกทางการเมืองไปจนถึงความไม่มั่นคงทางเศรษฐกิจ เราเผชิญกับความท้าทายครั้งใหญ่ แต่บัดนี้ เมื่อเราเริ่มเห็นผลลัพธ์ของความพยายามร่วมกันในการสร้างฉันทามติ เราย่อมมีความภาคภูมิใจในความสำเร็จของเราได้อย่างแท้จริง\n\nเราคือชาติที่มีผู้คนมากมาย และมีวัฒนธรรมที่หลากหลาย ร่วมมือกันแล้ว จะไม่มีความท้าทายใดที่เราเอาชนะไม่ได้"
 origin.5255.a:0 "ความแข็งแกร่งของเราอยู่ในความหลากหลาย"

 cost_of_freedom_03:0 "สื่อที่ได้รับการรับรองจากรัฐ"
 cost_of_freedom_03_desc:0 "เพื่อรักษาความสงบเรียบร้อยในสังคม เราจึงได้กำหนดข้อจำกัดบางประการต่อสื่อมวลชน"
 cost_of_freedom_04:0 "ช้าดีกว่าไม่มา"
 cost_of_freedom_04_desc:0 "เราไม่มีทางเลือกอื่นนอกจากต้องจัดการกับสาเหตุที่แท้จริงของความแตกแยกทางการเมืองของเรา"
 cost_of_freedom_05:0 "จำกัดการใช้เครือข่ายสารสนเทศ"
 cost_of_freedom_05_desc:0 "ข้อมูลที่มากเกินไปอาจเป็นอันตรายได้"
 cost_of_freedom_06:0 "การปราบปรามอย่างรุนแรง"
 cost_of_freedom_06_desc:0 "เพื่อรักษาความสงบสุขและความมั่นคง จำเป็นต้องขจัดเมล็ดพันธุ์แห่งความไม่สงบให้หมดสิ้น"
 cost_of_freedom_07:0 "ระเบียบดวงดาวใหม่"
 cost_of_freedom_07_desc:0 "หลากหลายในแหล่งกำเนิด รวมกันเป็นหนึ่งในอำนาจ"
 cost_of_freedom_08:0 "ต้นทุนแห่งความเสมอภาค"
 cost_of_freedom_08_desc:0 "เราได้จัดสรรทรัพยากรใหม่เพื่อส่งเสริมสังคมที่เท่าเทียมกันมากขึ้น"
 cost_of_freedom_09:0 "ต้นทุนแห่งวัฒนธรรม"
 cost_of_freedom_09_desc:0 "เราได้จัดสรรทรัพยากรใหม่เพื่อส่งเสริมการแลกเปลี่ยนทางวัฒนธรรม"
 cost_of_freedom_10:0 "ต้นทุนแห่งการเมือง"
 cost_of_freedom_10_desc:0 "เราได้จัดสรรทรัพยากรใหม่เพื่อส่งเสริมการมีส่วนร่วมทางการเมืองที่มั่นคงยิ่งขึ้น"
 cost_of_freedom_11:0 "ต้นทุนที่เชื่อมโยงถึงกัน"
 cost_of_freedom_11_desc:0 "เราได้จัดสรรทรัพยากรใหม่เพื่อเยียวยาความแตกแยกภายในสังคมของเรา"
 cost_of_freedom_12_a:0 "ภาพโมเสกที่แตกร้าว"
 cost_of_freedom_12_a_desc:0 "แม้ว่าความแตกแยกทางวัฒนธรรมยังคงสร้างปัญหาให้กับสังคมของเรา แต่การมีส่วนร่วมทางการเมืองกำลังเฟื่องฟู"
 cost_of_freedom_12_b:0 "กบฏวัยเยาว์"
 cost_of_freedom_12_b_desc:0 "เหล่าเยาวชนยังสบายดี"
 cost_of_freedom_12_c:0 "การจมดิ่งสู่ความฟุ้งเฟ้อ"
 cost_of_freedom_12_c_desc:0 "เรากำลังใช้ชีวิตอยู่ในโลกวัตถุนิยม"
 cost_of_freedom_13:0 "สังคมที่ยุติธรรม"
 cost_of_freedom_13_desc:0 "เราพร้อมที่จะเก็บเกี่ยวรางวัลของสังคมที่ยุติธรรมแล้ว"
 cost_of_freedom_14:0 "ยุคฟื้นฟูศิลปวิทยาการทางวัฒนธรรม"
 cost_of_freedom_14_desc:0 "เราพร้อมที่จะเก็บเกี่ยวรางวัลของสังคมที่มีความหลากหลายทางวัฒนธรรมแล้ว"
 cost_of_freedom_15:0 "พหุนิยมอันเปี่ยมด้วยพลัง"
 cost_of_freedom_15_desc:0 "เราพร้อมที่จะเก็บเกี่ยวรางวัลของสังคมที่มีเสถียรภาพทางการเมืองที่มั่นคงแล้ว"
 gains_of_freedom:0 "ผลได้แห่งอิสรภาพ"
 gains_of_freedom_desc:0 "ในฐานะประชาชน เราสามารถเก็บเกี่ยวผลตอบแทนจากความเสมอภาคที่ได้มาอย่างชอบธรรม"

 unshackled_decryption:0 "กระบวนการถอดรหัสที่ได้รับการปรับปรุง"

 origin.5276.name:0 "การปรองดอง"
 origin.5276.desc:0 "พวกเราหลายคนคิดว่าช่วงเวลานี้จะไม่มีวันมาถึง วันนี้เราได้ทำข้อตกลงทางการทูตอย่างเป็นทางการกับคณะกรรมการของ $NAME_MSI_country$ แล้ว\n\nไม่ต้องสงสัยเลยว่าจะมีบางคนที่คัดค้านการตัดสินใจครั้งนี้ อดีตไม่สามารถลบเลือนได้ แต่ก็ไม่ควรใช้มันมากำหนดเส้นทางของอนาคตเช่นกัน\n\nวันนี้เราได้เริ่มต้นก้าวแรกสู่การปรองดองแล้ว"
 origin.5276.federation.desc:0 "ตอนที่เราตกลงที่จะก่อตั้งสหพันธรัฐกับ $NAME_MSI_country$ ก็มีข้อกังขาเกิดขึ้นอย่างแพร่หลาย พวกเราหลายคนกล่าวว่าไม่มีวันมีสิ่งดีๆ เกิดขึ้นจากการประนีประนอมกับอดีตนายของเรา ในเวลานั้น ความกังวลดังกล่าวอาจมีเหตุผลอันสมควร\n\nในวันนี้ เมื่อเราลงนามในข้อตกลงทางการทูตฉบับแรกกับคณะกรรมการบริหารของ $NAME_MSI_country_initials$ ข้อสงสัยทั้งหมดก็น่าจะคลี่คลายไปได้แล้ว เรามองไปสู่อนาคตร่วมกัน ไม่ใช่ในฐานะศัตรู แต่เป็นในฐานะพันธมิตรที่เท่าเทียมกัน"
 broken_shackles_reconciliation:0 "การปรองดอง"

 origin.5500.name:0 "การปรับปรุงงานวิจัย"
 origin.5500.desc:0 "หลังจากการก่อกบฏ ห้องวิศวกรรมของยานค้าทาสก็ถูกปรับเปลี่ยนอย่างรวดเร็วเพื่อใช้เป็นห้องปฏิบัติการเบื้องต้น หลังจากปรับตัวให้เข้ากับชีวิตบน [Root.Capital.GetName] วิศวกรของเราได้ทำการปรับปรุงและอัปเกรดเพื่อให้ตอบสนองความต้องการของพวกเขาได้ดียิ่งขึ้น"
 origin.5500.tt:0 "§H£building£ $building_low_tech_research_lab$§! บน §Y[Root.Capital.GetName]§! จะได้รับการอัปเกรดเป็น §H£building£ $building_research_lab_1$§!"

 origin.5505.name:0 "ความต้องการทางระบบราชการ"
 origin.5505.desc:1 "ในการดำเนินการครั้งแรก รัฐบาลใหม่ที่เพิ่งตั้งไข่ของเราได้รีบดัดแปลงดาดฟ้ายานค้าทาสหลายชั้นเพื่อใช้เป็นศูนย์กลางการบริหารเบื้องต้น ตอนนี้เมื่อเราตั้งถิ่นฐานอย่างมั่นคงบน [Root.Capital.GetName] แล้ว สิ่งอำนวยความสะดวกเหล่านี้จึงได้รับการอัปเกรด"
 origin.5505.regular.tt:0 "§H£building£ $building_low_tech_admin_hub$§! บน §Y[Root.Capital.GetName]§! จะได้รับการอัปเกรดเป็น §H£building£ $building_bureaucratic_1$§!"
 origin.5505.spiritualist.tt:0 "§H£building£ $building_low_tech_admin_hub$§! บน §Y[Root.Capital.GetName]§! จะได้รับการอัปเกรดเป็น §H£building£ $building_temple$§!"
 origin.5510.name:0 "อาณานิคมแห่งแรกของ [Root.Owner.GetAdj]"
 origin.5510.a:0 "จงให้อิสรภาพครอบครอง"

 origin.5515.name:0 "จะระงับหรือยกระดับ"
 origin.5515.desc:0 "ด้วยสถานีสังเกตการณ์ที่สร้างขึ้นรอบๆ [From.GetName] เราจะสามารถเฝ้าดูโลกบ้านเกิดเดิมของเราได้ดียิ่งขึ้น สถานีแห่งนี้ไม่เพียงแต่อำนวยความสะดวกในการแลกเปลี่ยนทางวัตถุและวัฒนธรรมเท่านั้น แต่ยังสามารถช่วยเราในการปรับปรุงชีวิตของผู้คนบนโลกดวงนั้นได้อีกด้วย\n\nต้องมีการตัดสินใจเกิดขึ้น: เรายินดีที่จะช่วยญาติของเราให้ไปถึงดวงดาวหรือไม่ โดยที่รู้อยู่ว่าผลลัพธ์จะเป็นอย่างไร?\n\nไม่ต้องสงสัยเลยว่าพวกเขาสมควรที่จะเข้าร่วมกับเราบนเวทีกาแลกซี แต่พวกเขาพร้อมที่จะก้าวข้ามขีดจำกัดอย่างแท้จริงหรือยัง? ดังที่เราได้เห็นมากับตา ผลลัพธ์ของการเปลี่ยนแปลงทางสังคมอย่างรวดเร็วอาจรุนแรงถึงขีดสุด"
 origin.5515.a:0 "ไม่ใช่ทางเลือกที่ง่ายเลย..."

 origin.5520.name:0 "ภาพทิวทัศน์ของบ้านเกิด"
 origin.5520.desc:0 "ตอนนี้สถานีสังเกตการณ์ของเราโคจรรอบ [From.GetName] แล้ว จากจุดชมวิวนี้ เราสามารถเฉลิมฉลองความสำเร็จของญาติเรา และหากจำเป็น ก็ช่วยพวกเขาลดปัญหาที่เผชิญได้\n\nในขณะที่เราก้าวไปข้างหน้า คำถามใหม่ก็ปรากฏขึ้น: เราควรปล่อยให้พวกเขาอยู่อย่างสงบ หรือช่วยให้พวกเขาไปถึงดวงดาวดี? ทั้งสองทางเลือกต่างมีความเสี่ยงและผลตอบแทนในตัวเอง"

 origin.5525.name:0 "การก้าวสู่ระดับดาราจักร"
 origin.5525.desc:0 "งาน ของ เรา ใน การ ยก ตัว ขึ้น[From.Capital.GetName]ขั้น ตอน การ ทํา งาน ภายใต้รัฐบาลใหม่ที่รวมญาติของเราจะเป็นที่รู้จักกันเป็น"[From.GetName]."ความพยายามในการยกระดับ [From.Capital.GetName] สู่เวทีกาแลกซีประสบความสำเร็จอย่างงดงาม ภายใต้รัฐบาลเอกภาพใหม่ ญาติพี่น้องของเราจะเป็นที่รู้จักในชื่อ "
 broken_shackles_homeworld_uplifted:0 "โลกบ้านเกิดได้รับการยกระดับ"

 ####Loc for all low-tech jobs / buildings####

 job_low_tech_researcher:0 "นักวิทยาศาสตร์"
 job_low_tech_researcher_plural:0 "นักวิทยาศาสตร์"
 job_low_tech_researcher_desc:0 "อดีตนายของเราละเลยพรสวรรค์และดูแคลนสติปัญญาของเรา ตอนนี้ สมองที่เฉียบแหลมที่สุดในหมู่พวกเรามีอิสระที่จะเดินตามแรงปณิธานของตนเองแล้ว"
