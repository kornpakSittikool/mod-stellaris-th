 war_goal_wg_payback_tribute:0 "ทำให้เป็นรัฐบรรณาการ"
 war_goal_wg_payback_tribute_desc:0 "สงครามเกิดขึ้นเพื่อปราบศัตรูให้มาเป็นรัฐบรรณาการ\n\n§Rจะไม่มีการเจรจาสงบศึกแบบรักษาสถานะเดิม(Status Quo)ในสงครามนี้: เราไม่ได้รับชัยชนะ ก็ต้องสูญเสียโอกาสนั้นไปตลอดกาล§!"

 war_goal_wg_payback_msi:0 "การยึดทรัพย์สิน"
 war_goal_wg_payback_msi_desc:0 "สงครามเกิดขึ้นเพื่อเปลี่ยนคู่สงครามให้เป็นบริษัทในเครือ\n\nข้อกำหนดข้อตกลงเริ่มต้นของบริษัทในเครือจะถูกกำหนดโดยนโยบาย §Y$policy_subjugation_war_terms$§! ของเรา\n\n§Rจะไม่มีการเจรจาสงบศึกแบบรักษาสถานะเดิม(Status Quo)ในสงครามนี้: เราไม่ได้รับชัยชนะ ก็ต้องสูญเสียโอกาสนั้นไปตลอดกาล§!"

