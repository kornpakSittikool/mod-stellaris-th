 stuffed_toy:0 "ตุ๊กตายัดนุ่น"
 stuffed_toy_desc:0 "ตุ๊กตาผ้าที่สร้างขึ้นตามรูปลักษณ์ของเรา มันช่วยเติมเต็มความมุ่งมั่นให้แก่เรา"

