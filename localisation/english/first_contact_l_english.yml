 site_the_chosen_backstory:0 "สถานีสังเกตการณ์ที่ถูกทิ้งร้าง"
 site_the_chosen_backstory_desc:0 "สถานีสังเกตการณ์ที่ถูกทิ้งร้างโคจรรอบ §Y[From.Planet.MoonOf.GetName]§! มันอาจช่วยชี้แจงถึงจุดกำเนิดของอารยธรรมก่อนยุคเดินทางข้ามดวงดาว §Y$NAME_Charynoi$§! บนดาวเคราะห์เบื้องล่างได้"

 arcsite.3000.name:0 "พิพิธภัณฑ์ $NAME_Charynoi$"
 arcsite.3000.desc:0 "สถานีสังเกตการณ์ที่ถูกละทิ้งเหนือ [From.Planet.MoonOf.GetName] ดูเหมือนจะได้รับการปรับเปลี่ยนวัตถุประสงค์ไม่นานก่อนที่จะถูกละทิ้ง แม้ว่าจะมีอุปกรณ์สำหรับตรวจตราผู้อยู่อาศัยบนดาวเคราะห์ให้เห็น แต่อุปกรณ์ส่วนใหญ่กลับถูกอุทิศให้กับพิพิธภัณฑ์ประวัติศาสตร์ $NAME_Charynoi$ เป็นเรื่องที่แปลกประหลาดสำหรับสายพันธุ์ที่กระหายสงครามเช่นนี้ หัวข้อที่เกี่ยวข้องกับความรุนแรงดูเหมือนจะหลีกเลี่ยงไป และนิทรรศการแสดงให้เห็นถึงพิธีกรรมต่าง ๆ แห่งสันติภาพและความอุดมสมบูรณ์\n\nคริสตัลข้อมูลชุดหนึ่งได้ถูกทิ้งไว้ในห้องควบคุม เห็นได้ชัดว่าพวกเขาต้องการให้เราค้นพบมัน"
 arcsite.3000.A:0 "ขุดคุ้ยความลับของพวกเขา"

 arcsite.3005.name:0 "บันทึกชาติพันธุ์วรรณนา"
 arcsite.3005.desc:0 "คริสตัลชุดแรกถูกแปลแล้ว คําแรกเริ่มนี่คือบันทึก$NAME_Charynoi$โอ้ มหาชนเอ๋ย ! จงผินหลังออก (จากการลงโทษ)คริสตัลชิ้นแรกได้รับการแปลแล้ว มันเริ่มต้นด้วยคำว่า "
 arcsite.3005.B:0 "น่าเบื่อจัง"

 arcsite.3010.name:0 "จุดเปลี่ยนผ่าน"
 arcsite.3010.desc:0 "“และข้าจะกล่าวถึงสิ่งที่มันผิดพลาด ”\n\nคริสตัลอันที่สองบอกว่า$NAME_Charynoi$ค่อย ๆ เผย ให้ เห็น ความ ลึกลับ ของ การ บิน อวกาศ ดู เหมือน ว่า ประมาณ หนึ่ง ร้อย ปี ก่อน หน้า นั้น[Root.Owner.GetName]พวก เขา พบ ดาว เคราะห์ ที่ สวย งาม สอง ดวง ใน ระบบ ของ ตน เอง และ ลง ความ เห็น ว่า ดาว เหล่า นั้น ที่ พระเจ้า ทรง มอบ ให้ พวก เขา เป็น สิทธิ บุตร หัวปี ของ ตน ซึ่ง ตอน นี้ พวก เขา อ้าง สิทธิ์.\n\nด้วย น้ํา เสียง อัน น่า สะ พรึง กลัว ไอ ฮิ ชิ ริ โอส เล่า ถึง ด้าน มืด ของ การ แสวง ประโยชน์ ใน ยุค แรก ๆ ดัง นี้: อารยธรรม อัน ศักดิ์สิทธิ์ บน อาณานิคม แห่ง ใหม่ ของ พวก เขา ไม่ เต็ม ใจ ยอม ให้ บ้าน ของ ตน. โดย ถูก บีบ ให้ ยอม อยู่ ใต้ อํานาจ พวก เขา ตก เป็น ทาส และ ใน ที่ สุด ก็ ตก เป็น เหยื่อ ของ โรค$NAME_Charynoi$ไม่สนใจที่จะรักษา\n\nของเรา[Owner.GetLinguists]ทํางานหนักในการแปลคริสตัลข้อมูลที่สามและสุดท้าย"

 arcsite.3015.name:0 "กลยุทธ์ของผู้ทรยศ"
 arcsite.3015.desc:0 "\"แม้ในที่สุด เราทําให้ขอบเขตพื้นที่ที่เราได้รับเป็นมรดกหมด เรารู้ว่ามีรูหนอนอยู่ แต่มันท้าทายการศึกษาของเรา ดิน แดน ของ เรา เต็ม ไป ด้วย ความ สวย งาม จน ไม่ ยาก ที่ จะ ทํา ให้ ตัว เอง มั่น ใจ ว่า เรา เป็น ผู้ ถูก เลือก สรร. ที่อุกาบาตหลุมเป็นการทดสอบ และเมื่อเราคุ้มค่า มันจะเป็นวัตถุประสงค์อันศักดิ์สิทธิ์ของเรา\n\n\"ครั้งหนึ่งข้าเคยเป็นหัวหน้าในพวกที่พยายามจะทําหน้าที่นี้ เมื่อแรงบันดาลใจมาถึงฉัน เมื่อฉันรู้ว่าฉันถือกุญแจที่จะเปิดรูหนอน ฉันอธิษฐานเป็นเวลาหลายวัน และในที่สุด พระธรรมวิวรณ์ เราไม่มีค่าพอ ถ้าเราไปไกลกว่ารูหนอน เราจะพบเพียงความเจ็บปวด$NAME_Aspharelle$จะโดนเฆี่ยน พ้นจากโทษ จากอาชญากรรมที่เราก่อ ผม ตั้งใจ ว่า จะ ทําลาย งาน วิจัย ของ ผม และ หา ทาง ที่ ต่าง ออก ไป.\n\n\"มันยากที่จะหาผู้ที่ฉันสามารถไว้วางใจ ถ้า เรา ถูก ค้น พบ เรา คง อยาก จะ ตาย เร็ว ๆ แน่ ๆ. แม้ ผม เชื่อ มั่น มาก กว่า แต่ ก่อน ว่า เรา เป็น ฝ่าย ถูก แต่ เรา คง ถูก มอง ว่า เป็น ผู้ ออก หาก. ในที่สุดเราเปิดตัวแผนการที่กล้าหาญ : ภายใต้ความโง่เขลาของการพยายามที่จะบินคนตาบอด รูหนอน, เราสร้างยานอาร์คชิปที่จะแล่นเรือเข้าไปในที่ไม่ทราบต่อดาวระยะไกล เรา เดิน ทาง หลาย ปี ผ่าน ที่ ว่าง เปล่า จน กระทั่ง มา ถึง จุด หมาย ปลาย ทาง. บัดนี้ เรา ไม่ ปรารถนา อะไร มาก ไป กว่า การ อยู่ อย่าง สันติ เพื่อ ดําเนิน ชีวิต อย่าง มี คุณ ความ ดี เพื่อ เรา จะ ได้ พิสูจน์ ว่า ไม่ ใช่ ทุก คน$NAME_Charynoi$เป็นปีศาจ\n\nอิต ชิ โฮ ริ โอส กล่าว ถึง ความ พยายาม ของ เธอ ใน การ สร้าง โล่ ที่ ไม่ มี ทาง เข้า ไป ล้อม รอบ[From.Planet.MoonOf.GetName]เพื่อที่ประชาชนของเธอจะไม่ถูกล่อลวง ให้แสวงหาดาวอีกครั้ง เธอล้มเหลว แต่[Owner.GetResearchers]สามารถคิดออกว่า เธอทําผิดตรงไหน เรา สามารถ สร้าง โล่ ได้ ถ้า เรา ปรารถนา เช่น นั้น."
 arcsite.3015.A:0 "เราจะเติมเต็มความปรารถนาของพวกเขาให้สำเร็จ"
 arcsite.3015.B:1 "เราสามารถทำตามที่เราต้องการกับมันได้"
 arcsite.3015.C:0 "ก็แค่นั้นแหละ..."

 SHIELD_PRIMITIVE_PLANET_PROJECT:0 "สร้างเกราะป้องกัน"
 SHIELD_PRIMITIVE_PLANET_PROJECT_DESC:0 "[Owner.GetResearchers] ของเราน่าจะสามารถสร้างเกราะป้องกันที่อิ โต ชิ โอ ริ โอพยายามจะสร้างครอบ §Y[This.GetName]§! ให้เสร็จสมบูรณ์ได้ หากเรามอบทรัพยากรที่เพียงพอให้แก่พวกเขา"

 arcsite.3020.name:0 "ชา ริ นอยที่อยู่ใต้เกราะป้องกัน"
 arcsite.3020.desc:0 "ต้องขอบคุณความพยายามของ [Owner.GetResearchers] ของเรา เกราะป้องกันที่อิ โต ชิ โอ ริ โอพยายามจะสร้างครอบ [FromFrom.GetName] ได้เสร็จสมบูรณ์แล้ว ทายาท $NAME_Charynoi$ ของนางสามารถพบกับความสงบได้แล้วในตอนนี้"
 arcsite.3020.desc.A:0 "ความโล่งอกสำหรับทุกคนที่เกี่ยวข้อง"

 bane_of_the_prophetess:0 "หายนะของผู้เผยพระวจนะหญิง"
 bane_of_the_prophetess_desc:0 "ด้วยการกระทำของเรา ความพยายามอย่างสิ้นหวังของผู้เผยพระวจนะหญิงชาวชา ริ นอยในการไถ่บาปให้แก่คนของนางถูกขัดขวางลง จะไม่มีการให้อภัยใด ๆ แก่พวกพ้องของพวกเขา!"
 bane_of_the_prophetess_gestalt:0 "$bane_of_the_prophetess$"
 bane_of_the_prophetess_gestalt_desc:0 "$bane_of_the_prophetess_desc$"
 charynoi_redemption:0 "การไถ่บาปของชาวชา ริ นอย"
 charynoi_redemption_desc:0 "การสร้างเกราะป้องกันของอิ โต ชิ โอ ริ โอให้เสร็จสมบูรณ์ของเราได้เปิดโอกาสให้ชาวชา ริ นอยหรืออย่างน้อยก็บางส่วนได้พบการไถ่บาป"

 paradisiacal_habitat:0 "ถิ่นฐานสวรรค์"
 paradisiacal_habitat_desc:0 "แม้ว่าถิ่นฐานนี้จะสร้างขึ้นด้วยมือมนุษย์ทั้งหมด แต่อากาศก็อบอวลไปด้วยคุณภาพอันน่ารื่นรมย์ที่คอยย้ำเตือนสิ่งมีชีวิตที่มีภูมิปัญญาใด ๆ ไม่ว่าจะแปลกแยกเพียงใดก็ตาม ให้หวนคิดถึงบ้านเกิด"

 paradisiacal_habitat_science: "ถิ่นฐานการวิจัยสวรรค์"
 paradisiacal_habitat_science_desc: "$paradisiacal_habitat_desc$"

 paradisiacal_habitat_energy: "ถิ่นฐานเครื่องกำเนิดพลังงานสวรรค์"
 paradisiacal_habitat_energy_desc: "$paradisiacal_habitat_desc$"

 paradisiacal_habitat_mining: "ถิ่นฐานการทำเหมืองสวรรค์"
 paradisiacal_habitat_mining_desc: "$paradisiacal_habitat_desc$"

 fircon.3510.name:0 "ผู้ถูกเลือก"
 fircon.3510.desc:0 "พวกเราถูกขังอยู่หลังรูหนอนมานานเกินไปแล้ว แต่ดูเถิด! ในที่สุดเราก็ได้ทำลายข้อจำกัดที่มรดกจากฟากฟ้าสร้างไว้แก่เรา ตอนนี้เรารู้แล้วว่าพวกเราคู่ควร ส่วนที่เหลือของกาแล็กซีคือสิ่งที่เราต้องเข้าครอบครอง\n\nอย่าได้ขัดขวางเลย ทำตามนั้นจะส่งผลดีกว่าในระยะยาว"
 fircon.3510.A:0 "นั่นเหนือความคาดหมายทีเดียว"

 fircon.3515.name:0 "ผู้ถูกเลือก"
 fircon.3515.desc:0 "อะไรกัน? เจ้า... ฝ่ารูหนอนเข้ามาได้รึ? แต่เป็นไปได้ยังไงกัน? นักวิทยาศาสตร์ที่เก่งที่สุดของเราใช้เวลาทำงานกับเรื่องนี้มานานหลายปีโดยไม่ประสบความสำเร็จ จะต้องมีข้อผิดพลาดบางอย่างแน่ ๆ\n\n...\n...\n...\n\nนี่ต้องเป็นบททดสอบแน่ ๆ เจ้าไม่น่าไว้วางใจ! เราต้องกวาดล้างดวงดาวของเราให้พ้นจากพวกพ้องของเจ้า!"


