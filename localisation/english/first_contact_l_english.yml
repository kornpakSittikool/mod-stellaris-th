 # Dig Site
 payback_digsite:0 "สิ่งที่หลงเหลือจากสงคราม"
 payback_digsite_desc:1 "ยานรบที่ครั้งหนึ่งเคยคุกคามโลกบ้านเกิดของเรายังคงตระหง่านอยู่เหนือหัว เป็นเครื่องเตือนใจที่เด่นชัดถึงชะตากรรมที่เราเพิ่งรอดพ้นมาได้อย่างหวุดหวิด ถึงเวลาแล้วที่จะทวงคืนผืนฟ้าและกู้คืนสิ่งมหัศจรรย์ทางเทคโนโลยีที่บรรจุอยู่ภายในซากยานลำนี้"


