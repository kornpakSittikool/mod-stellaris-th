 origin_fear_of_the_dark:0 "หวาดกลัวความมืด"
 origin_fear_of_the_dark_desc:0 "เมื่อทศวรรษก่อน ดาวบ้านเกิดเดิมถูกทำลายด้วยอุกกาบาต ซึ่งความเห็นประชากรกลุ่มหนึ่งก็เชื่อว่าเป็นการโจมตีจากต่างดาว ทำให้มีความตึงเครียดและหวาดระแวงต่อโลกภายนอก"
 origin_tooltip_fear_of_the_dark_effects:1 "- $HOME_SYSTEM$ ['concept_preftl_civilizations', อารยธรรม ก่อน FTL] สร้างขึ้นโดย กลุ่มการเมืองที่แบ่งแยกดินแดน, ซึ่งเดิมเป็นส่วนหนึ่งของจักรวรรดิคุณ ทำให้เกิดเหตุการณ์และผลประโยชน์ต่างๆ"
 origin_tooltip_fear_of_the_dark_negative_effects:  "- $INITIAL_POPS$ §R-800§!"
 START_SCREEN_FEAR_OF_THE_DARK_START:0 "ศตวรรษก่อน ดาวเคราะห์ที่เราเรียก\"ตัวแบ่ง\"หนึ่งศตวรรษก่อน ดาวเคราะห์ที่เราเรียกในปัจจุบันว่า "
 START_SCREEN_FEAR_OF_THE_DARK_REGULAR:0 "$START_SCREEN_FEAR_OF_THE_DARK_START$การแยกกลุ่มออกไป\n\nในคราวแรก พวกเราปัดตกการทำลายล้างนั้นว่าเป็นเพียงเหตุการณ์ประหลาดที่เกิดขึ้นได้ยาก แต่ก็มีบางคนบน [GetHomeWorldName] ที่เชื่อว่ามันเป็นการโจมตีสายพันธุ์ของเราที่มีการวางแผนไว้ล่วงหน้า กลุ่มแนวคิดนี้ตั้งสมมติฐานว่า สัญญาณวิทยุของเราถูกตรวจพบโดยเผ่าพันธุ์เอเลี่ยนอันห่างไกล เผ่าพันธุ์ที่ตอบกลับมาด้วยกระสุนปืนทำลายล้างดาวเคราะห์ ผู้เห็นต่างเหล่านี้กระตุ้นให้เราเตรียมพร้อมสำหรับวันที่พวกเอเลี่ยนจะกลับมาเพื่อกำจัดเราให้หมดสิ้น หลายคนมองข้ามความกังวลของพวกเขาว่าเป็นเพียงความหวาดระแวง\n\nความแตกแยกทางการเมืองระหว่างสองฝ่ายยังคงเติบโตขึ้นเรื่อยๆ ความไม่สงบทางแพ่งทั่วทั้งดาวเคราะห์ลงเอยด้วยการทำสนธิสัญญาที่มอบสิทธิ์ให้แก่กลุ่มผู้เห็นต่างในการครอบครองดาวเคราะห์เป้าหมายในการปรับสภาพดาวเคราะห์ ซึ่งเป็นดาวเคราะห์ที่พวกเขาจะมีอิสระในการอยู่อาศัยอย่างสันโดษโดยไม่มีการแทรกแซงใดๆ จากพวกเรา$START_SCREEN_FEAR_OF_THE_DARK_END$"
 START_SCREEN_FEAR_OF_THE_DARK_MEGACORP:0 "$START_SCREEN_FEAR_OF_THE_DARK_START$คนแปลกหน้า\n\nหลังจากเหตุการณ์ที่เกิดขึ้น ผู้จัดการที่กังวล ได้ส่งคําขอไปยังคณะกรรมการบริหารของเรา เพื่อปิดโครงสร้างพื้นฐานวิทยุพิเศษ พวกเขาเชื่อว่าการสร้างเดอะฟรูเตอร์ เกิดจากตัวแทนภายนอกที่พยายามจะทําลาย[GetHomeWorldName]คําร้องขอนี้ถูกปฏิเสธ\n\nเรียกร้องให้คณะกรรมการตัดสินใจ\"การสูญเสียความยุติธรรม\"$START_SCREEN_FEAR_OF_THE_DARK_START$ความเหินห่าง\n\nหลังเกิดเหตุการณ์ ผู้จัดการที่เป็นกังวลได้ส่งคำร้องไปยังคณะกรรมการบริหารของเราเพื่อปิดโครงสร้างพื้นฐานสัญญาณวิทยุนอกดาวเคราะห์ที่มีอยู่ และยกเลิกโครงการสำจัยอวกาศของเรา พวกเขาเชื่อว่าการเกิดขึ้นของตัวแบ่งนั้นเกิดจากปัจจัยภายนอกที่พยายามทำลาย [GetHomeWorldName] คำร้องนี้ถูกปฏิเสธ\n\nการเรียกการตัดสินใจของคณะกรรมการว่า "
 START_SCREEN_FEAR_OF_THE_DARK_END:0 "\n\nด้วยการถือกำเนิดของไฮเปอร์ไดรฟ์ แหล่งที่มาใหม่ของความตึงเครียดจึงเกิดขึ้น: ในขณะที่เรากระตือรือร้นที่จะทักทายกาแล็กซี เพื่อนบ้านของเรากลับยืนหยัดคัดค้านอย่างเด็ดเดี่ยว"
