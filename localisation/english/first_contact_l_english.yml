 # Broken Shackles Origin
 #########################

 origin_broken_shackles:0 "โซ่ตรวนที่แตกหัก"
 origin_broken_shackles_desc:1 "$CHALLENGING_ORIGIN$\nเป็นเหล่าทาสที่หลากหลายเผ่าพันธ์หลบหนีจากยานขนทาสและมาสร้างอารยธรรมของตนเอง"
 START_SCREEN_BROKEN_SHACKLES:0 "เป็นอิสระในที่สุด!\n\nบางคนเกิดมาในเครื่องพันธนาการ คนอื่นๆ ที่เป็นอัมพาตจากหนี้สิน พบว่าตนเองถูกขายในฐานะแรงงานขัดหนี้ แต่เทคโนโลยีของอดีตนายจ้างของเรานั้นไม่เพียงพอที่จะช่วยพวกเขาได้ เราได้วางแผนก่อกบฏอย่างลับๆ ในระหว่างการต่อสู้อันนองเลือดและสั้นๆ ผู้จับกุมของเราถูกสังหาร และยานทาสของพวกเขาได้รับความเสียหายอย่างหนัก การลงจอดฉุกเฉินทำให้เราติดอยู่บนพื้นผิวของ [Root.Capital.GetName]\n\nแม้ว่าเราจะประกอบด้วยสปีชีส์จากโลกที่แตกต่างกันมากมาย แต่เราก็ได้พบเป้าหมายร่วมกัน เมื่อเวลาผ่านไป ระบบที่เสียหายของยานทาสจะได้รับการซ่อมแซม และความลับอันล้ำค่าของมัน ซึ่งรวมถึงตำแหน่งของดาวบ้านเกิดเดิมของเราจะถูกเปิดเผย\n\nเครื่องพันธนาการของเราได้แตกหักลงแล้ว ตอนนี้งานเริ่มขึ้นแล้ว"
 START_SCREEN_BROKEN_SHACKLES_MEGACORP:0 "เป็นอิสระ* ในที่สุด!\n\nบางคนเกิดมาในเครื่องพันธนาการ คนอื่นๆ ที่เป็นอัมพาตจากหนี้สิน พบว่าตนเองถูกขายในฐานะแรงงานขัดหนี้ พวกเราทุกคนล้วนฝันถึงสิ่งที่ดีกว่า ชีวิตที่สุขสบายและมั่งคั่ง เราได้วางแผนก่อกบฏอย่างลับๆ ในระหว่างการต่อสู้อันนองเลือดและสั้นๆ ผู้จับกุมของเราถูกสังหาร และยานทาสของพวกเขาได้รับความเสียหายอย่างหนัก การลงจอดฉุกเฉินทำให้เราติดอยู่บนพื้นผิวของ [Root.Capital.GetName]\n\nแม้ว่าเราจะประกอบด้วยสปีชีส์จากโลกที่แตกต่างกันมากมาย แต่ภายใต้การอำนวยการของคุณ เราได้พบเป้าหมายร่วมกัน อดีตนายจ้างของเราอาจจะโหดร้าย แต่พวกเขาเข้าใจธุรกิจของชีวิต เช่นเดียวกับพวกเขา เราต้องแน่วแน่ในการแสวงหาผลกำไร เมื่อเวลาผ่านไป ระบบที่เสียหายของยานทาสจะได้รับการซ่อมแซม และความลับอันล้ำค่าของมัน ซึ่งรวมถึงตำแหน่งของดาวบ้านเกิดเดิมของเราจะถูกเปิดเผย เครื่องพันธนาการของเราแตกสลายแล้ว ตอนนี้เป็นเวลาที่จะจดทะเบียนก่อตั้งองค์กร\n\n*ประกาศทางกฎหมาย:\nการใช้คำว่า 'อิสระ' ไม่มีผลผูกพันทางกฎหมาย และไม่ผูกมัดให้บรรษัทต้องให้ส่วนลดใดๆ หรืออาสากระทำการใดๆ ที่อาจส่งผลกระทบต่ออัตรากำไรของผู้ถือหุ้น [Root.GetName] หากคุณมีคำถามใดๆ เกี่ยวกับข้อกำหนดนี้หรือข้อกำหนดอื่นๆ หรือหากคุณต้องการเลือกที่จะยุติการดำรงอยู่ต่อไปบน [Root.Capital.GetName] โปรดติดต่อผู้เชี่ยวชาญด้านกฎหมายหรือความมั่นคงของเราใน $building_bureaucratic_1$ บน [Root.Capital.GetName] เพื่อดำเนินการแก้ไขโดยทันที"
 origin_tooltip_broken_shackles_effects:1 "- $INITIAL_POPS$ เผ่าพันธุ์จาก ['concept_preftl_civilizations'] ทั่วกาแล็กซี $NEW_LINE$- $STARTING_PLANET$ $TABBED_NEW_LINE$- การปรับเปลี่ยนของดาวเคราะห์ ['concept_free_at_last_broken_shackles'] $TABBED_NEW_LINE$- คุณสมบัติของดาวเคราะห์ ['concept_crashed_slaver_ship_broken_shackles'] $TABBED_NEW_LINE$- ['concept_broken_shackles_buildings'] $NEW_LINE$- $STARTING_SYSTEM$ ['concept_archaeology_site'] ['concept_broken_shackles_digsite'] $NEW_LINE$- ['concept_advanced_empires', จักรวรรดิ AI ขั้นสูง] หนึ่งแห่ง และอีกหลายๆ อารยธรรมก่อน FL โดยไม่คำนึงถึงการตั้งค่ากาแล็กซี่ ตอนสร้างวาระเมื่อเริ่มเกมใหม่ $NEW_LINE$- อารยธรรมก่อน FL หนึ่งแห่ง: จะเป็นเผ่าพันธุ์และดาวบ้านเกิดของจักรวรรดินี้ $NEW_LINE$- อารยธรรมก่อน FL หนึ่งแห่ง: ยกระดับด้วย จุดเริ่มต้น §I$origin_payback$§!"

