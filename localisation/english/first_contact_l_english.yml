 ### Jaunting Traveler Event Chain
 #Intro
 first_contact.3000.name:0 "ผู้มาเยือน"
 first_contact.3000.desc:0 "การปรากฏตัวของสัตว์ประหลาดหนวดมหึมาขนาดเท่าอาคารใจกลาง §Y[This.Owner.Capital.GetName]§! ได้ทำให้เมืองหลวงตกอยู่ในความโกลาหล สิ่งมีชีวิตนี้ดูเหมือนจะสับสนกับความคุ้นเคยกะทันหันนี้ไม่แพ้เรา และยอมจำนนให้ควบคุมตัวโดยไม่มีการขัดขืน\n\nในขณะที่ [owner.GetScientistPlural] หลายคนได้ยืนยันแล้วว่าสิ่งมีชีวิตนี้ (ซึ่งได้รับรหัสลับว่า §Hผู้มาเยือน§!) มาจากต่างดาว แต่คนอื่นๆ เสนอว่ามันอาจจะเป็นสายพันธุ์ที่ไม่เคยเป็นที่รู้จักมาก่อนซึ่งรอดพ้นการค้นพบมาจนถึงตอนนี้ เพราะไม่มีการตรวจพบยานอวกาศต่างดาวในวงโคจรเลย สิ่งมีชีวิตนี้ปรากฏตัวขึ้นมาจากความว่างเปล่า ดูเหมือนว่าจะไม่ได้ใช้เทคโนโลยีช่วยแต่อย่างใด\n\nแขกผู้สร้างความสับสน (และกำลังสับสน) ของเรา ปัจจุบันถูกควบคุมตัวไว้ในสถานที่วิจัยแห่งหนึ่งของเรา"
 first_contact.3000.desc.gestalt:0 "การปรากฏตัวของสัตว์ประหลาดหนวดมหึมาขนาดเท่าอาคารใจกลาง §Y[This.Owner.Capital.GetName]§! ได้ทำให้เมืองหลวงตกอยู่ในความสับสนอลหม่าน สิ่งมีชีวิตนี้ดูเหมือนจะงุนงงกับการปรากฏตัวกะทันหันไม่แพ้เรา และยินยอมให้กักกันตัวแต่โดยดี\n\nเราสงสัยว่าสิ่งมีชีวิตนี้เป็นสิ่งมีชีวิตต่างดาว แต่เราก็ไม่อาจตัดความเป็นไปได้ที่มันจะเป็นสายพันธุ์ท้องถิ่นบนโลกเราที่ไม่มีใครรู้จักมาก่อน ท้ายที่สุดแล้ว ไม่มีการตรวจพบยานต่างดาวในวงโคจรเลย สิ่งมีชีวิตนี้—ซึ่งมีรหัสลับว่า §Hผู้มาเยือน§!—ปรากฏตัวขึ้นจากความว่างเปล่าโดยดูเหมือนไม่ได้พึ่งพาเทคโนโลยีใดๆ\n\nผู้มาเยือนที่น่าสับสน (และกำลังสับสน) ของเรา กำลังถูกควบคุมตัวอยู่ในสถาบันวิจัยแห่งหนึ่งของเรา"
 first_contact.3000.a.friendly:0 "เราต้องเจรจากับสิ่งมีชีวิตนี้!"
 first_contact.3000.a.unfriendly:0 "สอบปากคำผู้บุกรุกรายนี้"
 first_contact.3000.b.execution:0 "กำจัดผู้บุกรุกรายนี้ออกไปจากเมืองหลวงของเรา!"
 first_contact.3000.b.sacrifice:0 "การบูชายัญ"
 first_contact.3000.c.hive:0 "ขนมขบเคี้ยวจากฟากฟ้า!"
 first_contact.3000.d.assimilator:0 "เป็นหนึ่งเดียวกับเรา เป็นหนึ่งเดียวกับเรา"
 first_contact.3000.d.assimilator.tooltip:0 "§Y$NAME_Guest$§! เข้าร่วมกับเราในฐานะผู้นำ"
 start_jaunting_traveler_communications_study:0 "[This.Owner.GetEnvoyPlural] ของเราจะพยายามสื่อสารกับสิ่งมีชีวิตนี้"

 ##First Contact Stage Summaries
 fcsum_jaunting_traveler_summary:0 "สิ่งมีชีวิตขนาดยักษ์ที่ไม่ทราบที่มาปรากฏตัวขึ้นในเมืองหลวงของเราอย่างกะทันหัน ขณะนี้ถูกควบคุมตัวไว้ในสถาบันวิจัยของเรา"
 NAME_Guest:0 "The Many-Tentacled One"

 # First contact - random negative events
 fircon.1220.name:0 "อาหารเป็นพิษ"
 fircon.1220.desc:0 "ความพยายามของเราในการจัดหาอาหารที่เหมาะสมให้แก่ผู้มาเยือนอันลึกลับของเราล้มเหลว: สิ่งมีชีวิตดังกล่าวเกิดล้มป่วยลงอย่างรวดเร็ว ขับถ่ายอาหารออกมา และขณะนี้ไม่มีการตอบสนองใดๆ\n\nการพยายามสื่อสารถูกระงับไว้ก่อนจนกว่าเราจะเข้าใจระบบเผาผลาญของมันได้ดีขึ้น"
 fircon.1221.name:0 "อุบัติเหตุทางการทูต"
 fircon.1221.desc:0 "สิ่งมีชีวิตนี้มีปฏิกิริยารุนแรงต่อความพยายามในการสื่อสารของเรา โดยทำร้ายนักวิทยาศาสตร์คนหนึ่งของเราและปฏิเสธความร่วมมือเพิ่มเติม เราเชื่อว่าเราอาจจะล่วงเกินมันโดยไม่ได้ตั้งใจ\n\nแม้จะไม่มีใครได้รับบาดเจ็บสาหัส แต่อุบัติเหตุครั้งนี้ได้ทำลายความเชื่อมั่นอันเปราะบางที่เราสร้างขึ้นกับสิ่งมีชีวิตนี้มาโดยตลอด"

 ## First contact - progress
 fircon.1210.name:0 "สถาปนาการสื่อสารสำเร็จ"
 fircon.1210.desc:0 "[owner.GetScientistPlural] ของเราตัดสินแล้วว่าการเคลื่อนไหวของหนวดที่โบกสะบัดของแขกของเรานั้นเป็นภาษามือที่ซับซ้อนรูปแบบหนึ่ง\n\nเป็นเรื่องที่น่าตระหนกที่เราเพิ่งเรียนรู้ว่าสิ่งมีชีวิตนี้รู้สึกอับอายที่ไม่มีเสื้อผ้าสวมใส่ และได้ขอร้องซ้ำๆ ให้จัดหาเครื่องนุ่งห่มที่เหมาะสมมาปกปิดรยางค์อันเปลือยเปล่าของมัน\n\nหลังจากที่สวมเสื้อผ้าเรียบร้อยแล้ว นักวิจัยของเราเสนอให้สร้างเครื่องจักรที่มีโครงสร้างหนวดจำนวนมากเพื่อช่วยให้สื่อสารกับสิ่งมีชีวิตนี้ได้ดียิ่งขึ้น"
 fircon.1211.name:0 "ผู้มีหนวดมากมาย"
 fircon.1211.desc:0 "แขก ของ เรา พูด คุย กัน มาก แต่ ความ แตก ต่าง ทาง วัฒนธรรม ทํา ให้ เรา เข้าใจ กัน ได้ ยาก. ตอนนี้เราทราบว่าสัตว์เป็นตัวเมีย อ้างถึงตัวเองเป็น§H\"คน ที่ อยู่ ใน ทวีป\"§!และดูเหมือนจะเป็นสมาชิกของระเบียบจิตวิญญาณ ที่เรียกว่า§Yวีลฟาร์§!แต่เราก็ยังไม่เข้าใจว่ามันคืออะไร§Y'ขี้'§!เธอ พูด ถึง เรื่อง นี้ อยู่ เรื่อย ๆ หรือ พูด ถึง วิธี ที่ อาจ เป็น ต้น เหตุ ของ การ ปรากฏ ตัว อย่าง กะทันหัน ของ เธอ.\n\nความ พยายาม ของ เรา ใน การ สื่อ ความ ดําเนิน ต่อ ไป."
 fircon.1212.name:0 "นักเดินทางที่พลัดหลง"
 fircon.1212.desc:0 "ในที่สุดนักวิจัยของเราก็ได้เรียบเรียงเรื่องราวของผู้มีหนวดมากมายคนนี้: แขกของเราเป็นหัวหน้านิกายทางจิตวิญญาณที่มุ่งเน้นการศึกษา §Yจอนต์(ตะโกน)§!: เทคนิคพลังจิตที่ช่วยให้สามารถเทเลพอร์ตไปที่ใดก็ได้ในจักรวาลในพริบตา ตลอดประวัติศาสตร์ของเผ่าพันธุ์เธอ ไม่เคยมีใครเทเลพอร์ตได้สำเร็จเลย... จนกระทั่งตอนนี้\n\nผู้มีหนวดมากมายไม่แน่ใจเกี่ยวกับความสามารถของเธอในการทำซ้ำแบบเดิม และพลังงานสำรองของเธอในขณะนี้ก็หมดลงเกินกว่าจะพยายามอีกครั้ง\n\nในตอนนี้ เธอประสงค์จะอยู่ในการดูแลของเรา และจะตอบแทนการต้อนรับของเราด้วยการช่วยเหลือเหล่านักวิจัยของเรา"
 fircon.1212.a:0 "เราจะต้อนรับเธอในฐานะผู้ที่เท่าเทียมกัน"
 fircon.1212.ab:0 "เธออยู่ต่อได้ แต่เธอจะไม่มีอิสระ"
 fircon.1212.a.tooltip:0 "§Hผู้มีหนวดมากมาย§! เข้าร่วมกับเราในฐานะนักวิทยาศาสตร์"
 fircon.1212.b:0 "เธออยู่ต่อได้ ในห้องแล็บชำแหละสิ่งมีชีวิตของเรา"
 fircon.1212.c:0 "สิ่งอัปลักษณ์นี้ไม่มีที่ยืนในโลกของเรา!"
 #unlock special project
 fircon.1230.name:0 "การจอนต์"
 fircon.1230.desc.non_gestalt:0 "[owner.GetScientistPlural] ของเราแสดงความสนใจใน $fircon.1230.desc.outro$"
 fircon.1230.desc.gestalt:0 "ข้อมูลใหม่ระบุว่า [owner.GetScientistPlural] ของเราอาจจะสามารถทำงานร่วมกับ $fircon.1230.desc.outro$"
 fircon.1230.desc.outro: "เรียนรู้การ §Hจอนต์§! ซึ่งเป็นเทคนิคการเทเลพอร์ตที่ §Hผู้มีหนวดมากมาย§! ใช้เพื่อเดินทางมายังโลกเกิดของเรา\n\nนักบวชผู้นิยมท่องอวกาศยินดีที่จะแบ่งปันความรู้ของเธอ แม้ว่าเธอจะสงสัยว่าเราจะสามารถลอกเลียนแบบเทคนิคนี้ได้หรือไม่ อาคารที่เหมาะสมในเมืองหลวงของเราพร้อมที่จะได้รับการปรับปรุงให้เป็นวิหารเพื่อจุดประสงค์ในการวิจัยแล้ว"
 fircon.1230.a.organic:0 "เป็นความพยายามที่โง่เขลา"
 fircon.1230.a.machine:0 "เป็นการสิ้นเปลืองทรัพยากรโดยเปล่าประโยชน์"
 fircon.1230.b.organic:0 "มันคุ้มค่าที่จะลองดู"
 fircon.1230.b.machine:0 "การทดลองที่คุ้มค่า"
 #homesick creature
 fircon.1231.name:0 "โรคคิดถึงบ้าน"
 fircon.1231.desc:0 "ผู้มีหนวดมากมายของเราแสดงความปรารถนาที่จะกลับไปหาผู้คนของเธอเมื่อเร็วๆ นี้ แต่ความพยายามของเราในการค้นหาระบบสุริยะบ้านเกิดของเธอนั้นไร้ผล: ลักษณะทางดาราศาสตร์ที่เธออธิบายไม่ตรงกับส่วนใดๆ ของกาแล็กซีที่เรารู้จักเลย\n\nสายตาของแขกของเรายังคงจ้องมองไปที่ท้องฟ้ายามค่ำคืนอย่างแน่วแน่"
 fircon.1231.a:0 "เพิ่มความพยายามเป็นสองเท่า เราจะหาบ้านเกิดของเธอให้พบ!"
 fircon.1231.b:0 "ที่นี่คือบ้านของเธอแล้วในตอนนี้"
 #creature goes home
 fircon.1232.name:0 "ลาก่อน"
 fircon.1232.desc:0 "ไม่พบร่องรอยของผู้มีหนวดมากมายอีกต่อไป สิ่งมีชีวิตนี้หายไปอย่างกะทันหันเช่นเดียวกับตอนที่ปรากฏตัว โดยทิ้งข้อความบอกลาที่ขูดขีดไว้อย่างเร่งรีบเสร็จบนพื้นของสถาบันวิจัย:\n\n'§Hฉันกลัว แต่ฉันต้องจอนต์ หัวใจของฉันเจ็บปวดด้วยความคิดถึงบ้าน ขอบคุณสำหรับทุกสิ่งทุกอย่าง ฉันขออธิษฐานให้ม่านหมอกใจดีกับฉัน§!'"
 first_contact.1232.tooltip:0 "§Y$NAME_Guest$§! ได้จากไปแล้ว"
 #thank you gift
 fircon.1233.name:0 "คำขอบคุณที่ล่าช้า"
 fircon.1233.desc:0 "ยานลำหนึ่งของเราได้สกัดกั้นคลังเก็บของที่จู่ๆ ก็ปรากฏขึ้นในระบบดาวบ้านเกิดของเรา ตัวล็อกที่ซับซ้อนยอมเปิดออกทันทีที่สมาชิกคนหนึ่งในเผ่าพันธุ์ของเราสัมผัสมัน เผยให้เห็นคอลเลกชันโบราณวัตถุที่น่าตื่นตาตื่นใจ... และจดหมายขอบคุณจากนักเดินทางผู้มีหนวดมากมายซึ่งอ้างว่าเคยมาเยือนดาวเคราะห์บ้านเกิดของเราเมื่อหลายทศวรรษก่อน"

 ## Special project - learning to Jaunt
 THE_JAUNT_PROJECT:0 "การเรียนรู้ที่จะจอนต์"
 THE_JAUNT_PROJECT_DESC:0 "การปรากฏตัวอย่างกะทันหันของ §Hผู้มีหนวดมากมาย§! ในเมืองหลวงของเราได้พิสูจน์แล้วว่าแนวคิด 'การเทเลพอร์ตด้วยพลังจิต' ที่ครั้งหนึ่งเคยเป็นเพียงทฤษฎีนั้นสามารถใช้งานได้จริงในทางปฏิบัติ การมอบหมายงานนี้ให้แก่ [owner.GetScientistPlural] ที่มีประสิทธิภาพสูงสุดของเรา อาจทำให้เราได้เรียนรู้ความลับของการเดินทางข้ามระบบดาวในพริบตา"
 #special project events
 fircon.1240.name:0 "การเรียนรู้ที่จะจอนต์"
 fircon.1240.desc.intro: "หลังจากใช้เวลาหลายปีในการพยายามควบคุมความลับของการเทเลพอร์ตด้วยพลังจิต ในที่สุด [owner.GetScientistPlural] คนหนึ่งของเราก็สามารถทำ §Hจอนต์§! ได้สำเร็จ\n\nนักวิจัยเทเลพอร์ตไปในระยะทางสั้นๆ แต่สูญเสีย"
 fircon.1240.desc.organic:0 "$fircon.1240.desc.intro$ รยางค์ส่วนล่างของพวกเขาไปเนื่องจากการเทเลพอร์ตบางส่วนเข้าไปในพื้น มีเสียงปรบมือและเสียงกรีดร้องตามมาอย่างเกรียวกราว"
 fircon.1240.desc.machine:0 "$fircon.1240.desc.intro$ ชิ้นส่วนสำคัญบางส่วนไปเนื่องจากการเทเลพอร์ตบางส่วนเข้าไปในพื้น"
 fircon.1240.a:0 "ผลลัพธ์มีแนวโน้มที่ดี ทำการทดลองต่อไป"
 fircon.1241.name:0 "การเรียนรู้ที่จะจอนต์"
 fircon.1241.desc.intro: "การทำ §Hจอนต์§! สำเร็จอีกครั้ง! ตามข้อมูลเซ็นเซอร์ของเรา [owner.GetScientistPlural] คนหนึ่งของเราพยายามเทเลพอร์ตไปยังระบบดาวเคราะห์เพื่อนบ้านที่ใกล้ที่สุด ข้ามระยะทางที่ไม่อาจคำนวณได้ในเสี้ยววินาที... เพียงเพื่อจะไปปรากฏตัวในดาวฤกษ์และถูกเผาไหม้เป็นเถ้าถ่านในทันที"
 fircon.1241.desc.outro: "แม้ว่าการสร้างระบบขับเคลื่อนด้วยพลังจิตอาจเป็นไปได้ แต่เทคโนโลยีดังกล่าวอาจเป็นอันตรายอย่างยิ่งในการใช้งาน และอาจนำความโกลาหลมาสู่กาแล็กซีได้"
 fircon.1241.desc.non_gestalt: "$fircon.1241.desc.intro$\n\nการพูดคุยเกี่ยวกับการใช้เทคนิคนี้เพื่อขับเคลื่อนยานอวกาศเผชิญกับความเคลือบแคลงสงสัยอย่างมาก $fircon.1241.desc.outro$"
 fircon.1241.desc.gestalt: "$fircon.1241.desc.intro$\n\nโอกาสในการใช้เทคนิคนี้เพื่อขับเคลื่อนยานอวกาศยังคงเป็นเพียงทฤษฎีเท่านั้นในขณะนี้ $fircon.1241.desc.outro$"
 fircon.1242.name:0 "$fircon.1241.name$"
 fircon.1242.desc.base.outro: "ในการจอนต์ครั้งแรก เมื่อพวกเขาไปปรากฏตัวในก้อนหิน ดาวฤกษ์ หรือแม้กระทั่งหลุมดำ มันไร้ความแม่นยำเกินกว่าจะให้ผลประโยชน์ที่ใช้การได้จริง ยิ่งเราพยายามจะจอนต์มากเท่าไหร่ มันก็ยิ่งชัดเจนมากขึ้นเท่านั้นว่าการมาถึงของ §Hผู้มีหนวดมากมาย§! นั้นเป็นการสุ่มโดยสิ้นเชิง"
 fircon.1242.desc.base.intro.gestalt: "หลังจากการศึกษาอย่างกว้างขวางเกี่ยวกับ §Hจอนต์§! เราได้ข้อสรุปว่าคุณค่าการใช้งานของมันคือศูนย์ [GetResearchers] ของเราอาจใช้เวลาหลายทศวรรษในการเรียนรู้เพื่อเชี่ยวชาญเทคนิคนี้ เพียงเพื่อที่จะ"
 fircon.1242.desc.base.intro.non_gestalt: "นี่คือสิ่งที่เราได้เรียนรู้หลังจากปรับปรุงการ §Hจอนต์§! ให้สมบูรณ์: มันไร้ประโยชน์ [GetResearchers] ของเราอาจใช้เวลาหลายทศวรรษในการเรียนรู้เพื่อเชี่ยวชาญเทคนิคนี้ เพียงเพื่อที่จะ"
 fircon.1242.desc.base.organic_non_gestalt: "$fircon.1242.desc.base.intro.non_gestalt$ ตาย $fircon.1242.desc.base.outro$"
 fircon.1242.desc.base.machine_non_gestalt: "$fircon.1242.desc.base.intro.non_gestalt$ ถูกทำลาย $fircon.1242.desc.base.outro$"
 fircon.1242.desc.base.organic_gestalt: "$fircon.1242.desc.base.intro.gestalt$ ตาย $fircon.1242.desc.base.outro$"
 fircon.1242.desc.base.machine_gestalt: "$fircon.1242.desc.base.intro.gestalt$ ถูกทำลาย $fircon.1242.desc.base.outro$"
 fircon.1242.desc.outro.non_gestalt:0 "สักวันหนึ่ง ระบบขับเคลื่อนด้วยพลังจิตที่เราปรารถนาอาจจะกลายเป็นจริง แต่ไม่ใช่วันนี้"
 fircon.1242.desc.outro.gestalt:0 "แนวคิดเรื่องระบบขับเคลื่อนด้วยพลังจิตยังคงเป็นเพียงทฤษฎีเท่านั้นในขั้นตอนนี้"
 fircon.1242.desc.organic_non_gestalt: "$fircon.1242.desc.base.organic_non_gestalt$\n\n$fircon.1242.desc.outro.non_gestalt$"
 fircon.1242.desc.machine_non_gestalt: "$fircon.1242.desc.base.machine_non_gestalt$\n\n$fircon.1242.desc.outro.non_gestalt$"
 fircon.1242.desc.organic_gestalt: "$fircon.1242.desc.base.organic_gestalt$\n\n$fircon.1242.desc.outro.gestalt$"
 fircon.1242.desc.machine_gestalt: "$fircon.1242.desc.base.machine_gestalt$\n\n$fircon.1242.desc.outro.gestalt$"
 fircon.1243.name:0 "$fircon.1241.name$"
 fircon.1243.nodrive.desc:0 "อย่างไรก็ตาม ด้วยการประยุกต์ใช้หลักการของการจอนต์กับวิศวกรรมยานอวกาศแทนที่จะเป็นร่างกายของบุคคล [GetResearchers] ของเราได้ก้าวเข้าไปใกล้กับการสร้าง §H$tech_psi_jump_drives$§! อีกก้าวหนึ่ง และทำให้การเทเลพอร์ตด้วยพลังจิตมีความน่าเชื่อถือมากขึ้นและปลอดภัยขึ้นเล็กน้อย"
 fircon.1243.drive.desc:0 "อย่างไรก็ดี ความรู้ที่เราได้รับมาจะสามารถนำไปประยุกต์ใช้ในการทำวิศวกรรมได้บางประการ"

