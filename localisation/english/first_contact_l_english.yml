 security_system_drone_plural:0 "สินทรัพย์ของบรรษัท"


 # Dig Site Starting Event
 origin.4900.name:1 "รับ เอา เรือ รบ" #Previously The Kessler Effect
 origin.4900.desc:1 "การต่อสู้กับผู้รุกรานต่างดาวส่งผลให้ระบบดาวบ้านเกิดของเราเต็มไปด้วยซากเศษหักพัง ยานรบที่พังพินาศ และคำสัญญาที่แตกสลาย ปริมาณเศษขยะที่เกลื่อนกลาดในพื้นที่ทำให้การพัฒนาดาวเทียมและการปล่อยยานอวกาศจากดาว [owner.capital_scope.GetName] เป็นไปด้วยความยากลำบาก ภายใต้โครงการทำความสะอาดที่เสนอ ยานก่อสร้างที่ออกแบบมาเป็นพิเศษจะใช้ตาข่ายเพื่อลากกวาดพื้นที่ในวงโคจรใกล้ เพื่อให้เราสามารถเข้าใกล้กับยานรบของ $NAME_MSI_country_initials$ ที่ยังคงลอยเด่นอยู่เหนือเมืองหลวงของเรา"
 origin.4900.a:1 "เริ่มการทำความสะอาด"


