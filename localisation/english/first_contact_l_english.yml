 payback_declining_healthcare_necro_desc:0 "$payback_declining_healthcare_desc$ นอกจากนี้มันยังช่วยปรับปรุงคุณภาพของศพเราด้วย"
 payback_healing_scars:0 "เยียวยาบาดแผลเก่า"
 payback_healing_scars_desc:0 "มีเพียงการทำลายสถานพยาบาลต่างดาวเหล่านี้เท่านั้นที่เราจะได้รับการเยียวยาอย่างแท้จริง"

 # Gene Clinic is breaking down
 origin.4300.name:0 "หมดประกัน"
 origin.4300.base.desc:0 "\"เรากําลังจะยุติความเจ็บป่วย\"\n\nนั่นเป็นวิธีที่พวกรุกรานชนะเรา เราให้พวกเขาสร้าง§Y$building_medical_2$§!บน[Root.GetHomeWorldName]การกําจัดโรคที่เลวร้ายที่สุดภายในรุ่น ตอนนี้คลินิกเหล่านั้นกําลังทรุดโทรม การใช้งานอย่างหนักหลายปี ทําให้เครื่องจักรภายในถูกบดจนขาด การดําเนินงานอย่างเหมาะสมของ เทคโนโลยีของผู้รุกรานอยู่นอกเหนือเรา เราสามารถย้อนกลับเครื่องยนต์มันได้หรือไม่ หรือ เรา ควร นํา ของ ประทาน ที่ เป็น พิษ นี้ เข้า ไป ใน ตัว เรา เอง อย่าง แท้ จริง?\n"
 origin.4300.aliens.phobe.desc:0 "$origin.4300.base.desc$จักรวรรดิอื่นอาจมีสถานพยาบาลที่คล้ายคลึงกัน แต่การขอความช่วยเหลือจากพวกเอเลี่ยนนั้นรังแต่จะนำความอัปยศมาให้พวกเรา"
 origin.4300.aliens.phile.desc:0 "$origin.4300.base.desc$จักรวรรดิอื่นอาจมีสถานพยาบาลที่คล้ายคลึงกัน เราควรขอความช่วยเหลือจากพวกเขา"
 origin.4300.noaliens.desc:0 "$origin.4300.base.desc$ หากเพียงแต่เรารู้มากกว่านี้ "
 origin.4300.a:0 "พยายามซ่อมแซม $building_medical_2$"
 origin.4300.a.tooltip:0 "เลือก §Y$building_medical_2$§! ในหน้าจอมุมมองดาวเคราะห์แล้วคลิกปุ่ม §Sซ่อมแซม§! เพื่อเริ่มดำเนินการ การจัดตั้ง §Sข้อตกลงการวิจัย§! กับจักรวรรดิอื่นจะช่วยเพิ่มโอกาสสำเร็จของเรา"
 origin.4300.b:0 "เปลี่ยนวัตถุประสงค์การใช้งาน $building_medical_2$"
 origin.4300.b.tooltip:0 "เปลี่ยน §Y$building_medical_2$§! ให้เป็น §Y$building_autochthon_monument$§! โดยใช้ค่าใช้จ่ายที่ลดลง"
 origin.4300.b.memorialist.tooltip:0 "เปลี่ยน §Y$building_medical_2$§! ให้เป็น §Y$building_galactic_memorial_1$§! โดยใช้ค่าใช้จ่ายที่ลดลง"

 # Building repaired!
 origin.4301.name:0 "การซ่อมแซมฉุกเฉิน"
 origin.4301.base.desc:0 "อดีตผู้รุกรานของเราคงจะปัดความดีความชอบให้เป็นเพียงความโชคดี หรือเถียงว่าพวกเขาทำผลงานส่วนใหญ่ไปแล้ว พวกเขาจะอ้างว่าไม่ใช่เรื่องใหญ่อะไรที่จะถอดรหัสเทคโนโลยีเบื้องหลัง §Y$building_medical_2$§! อย่างที่เราเพิ่งทำไป"
 origin.4301.noagreement.desc:0 "$origin.4301.base.desc$ แต่ถึงอย่างนั้นเราก็ทำมันได้โดยไม่ต้องพึ่งความช่วยเหลือจากพวกเขา และชัยชนะนี้เป็นของเราแต่เพียงผู้เดียว"
 origin.4301.agreement.desc:0 "$origin.4301.base.desc$ แต่ถึงอย่างนั้นเราก็ทำมันได้ โดยได้รับการสนับสนุนจากความเชี่ยวชาญของพันธมิตรผู้มีน้ำใจของเรา"
 origin.4301.a:0 "บางที... พวกเอเลี่ยนอาจจะไม่ได้แย่ไปซะหมดหรือเปล่านะ?"
 origin.4301.end.desc:0 "เราดูแลตัวเองได้"

 # Building still broken
 origin.4302.name:0 "สิทธิ์ในการซ่อมแซม"
 origin.4302.desc:0 "การถอดรหัสเทคโนโลยีที่ขับเคลื่อน §Y$building_medical_2$§! กลายเป็นเรื่องท้าทายกว่าที่คาดไว้ ทว่าเหล่า [root.GetEngineerPlural] ของเรายังคงมีความหวัง พวกเขาบอกว่าแค่อยากได้เวลาเพิ่มขึ้น แต่ในขณะที่ต้นทุนและความล้มเหลวเริ่มก่อตัวขึ้น บางส่วนจึงเสนอว่าควรปรับเปลี่ยนคลินิกเหล่านี้ไปเพื่อวัตถุประสงค์อื่นเสียดีกว่า"
 origin.4302.a:0 "พ่ายแพ้ให้ดีขึ้นในครั้งนี้"
 origin.4302.a.tooltip:0 "$origin.4300.a.tooltip$"
 origin.4302.b:0 "$origin.4300.b$"
 origin.4302.b.tooltip:0 "$origin.4300.b.tooltip$"
 origin.4302.b.memorialist.tooltip:0 "$origin.4300.b.memorialist.tooltip$"

 # Building broken beyond repair
 origin.4303.name:0 "การซ่อมแซมที่ล้มเหลว"
 origin.4303.desc:0 "ความพยายามในการซ่อมแซม §Y$building_medical_2$§! ของเราจบลงด้วยความล้มเหลว: เกิดการระเบิดครั้งใหญ่กลืนกินอาคาร และมีรายงานผู้เสียชีวิตจำนวนมาก\n\nไม่ต้องสงสัยเลยว่าอดีตผู้รุกรานคงกำลังหัวเราะเยาะ พลางเย้ยหยันว่าเรายโส โอหัง และไม่มีการเตรียมพร้อม ทว่าความล้มเหลวนี้เป็นของเรา และบทเรียนอันแสนเจ็บปวดจะไม่มีวันถูกลืมเลือน"

 # Building Repurposed
 origin.4304.name:0 "ฮาร์ดแวร์ที่ปรับปรุงใหม่"
 origin.4304.desc:0 "§Y$building_medical_2$§! ของเราอาจไม่มีพลังในการรักษาโรคอีกต่อไปแล้ว แต่ด้วยการถอดส่วนประกอบและเปลี่ยนวัตถุประสงค์ให้กลายเป็นอนุสรณ์สถาน อย่างน้อยเราก็สามารถเริ่มเยียวยาบาดแผลที่ผู้รุกรานทิ้งไว้ได้ การสร้างสันติกับอดีตจะช่วยให้เราเรียนรู้ที่จะก้าวผ่านมันไป"

 # No building - people getting sick
 origin.4305.name:0 "วิกฤตการณ์สาธารณสุข"
 origin.4305.desc:0 "การสูญเสีย §Y$building_medical_2$§! ส่งผลให้คุณภาพการดูแลสุขภาพเสื่อมถอยลงอย่างรวดเร็ว โรคทางพันธุกรรมและความเจ็บป่วยเรื้อรังที่ครั้งหนึ่งเคยรักษาได้ง่ายกลับมาพุ่งสูงขึ้นอีกครั้ง และอายุขัยเฉลี่ยของเราก็ลดลงกลับไปสู่ระดับก่อนการถูกยึดครอง ความเชื่อมั่นของสาธารณชนต่อระบบสาธารณสุขลดลงสู่จุดต่ำสุดใหม่ และประชาชนของเราบางคนถึงกับเริ่มเสียดายการจากไปของผู้รุกราน"
 origin.4305.a:0 "เพิ่มการลงทุนในการวิจัยทางการแพทย์เป็นสองเท่า"
 origin.4305.a.tooltip:0 "เพิ่มโอกาสในการค้นพบเทคโนโลยี §Y$tech_frontier_health$§!"
 origin.4305.b:0 "ส่งเสริมการรักษาทางเลือก"
 origin.4305.b.tooltip:0 "การกระทำนี้จะไม่มีผลใดๆ"
 origin.4305.c:0 "ความตายไม่เคยเป็นปัญหาสำหรับเรา"

 # Rediscovering genetic healthcare
 origin.4306.name:0 "พึ่งพาตนเอง"
 origin.4306.desc:0 "หลังจากควบคุมความลับของวิศวกรรมพันธุศาสตร์ได้แล้ว ประชาชนของเราก็สามารถสร้าง §Y$building_medical_2$§! เลียนแบบโรงพยาบาลที่ผู้รุกรานทิ้งไว้ได้แล้ว นี่คือวันอันรุ่งโรจน์สำหรับประชาชนของเรา: ข้อพิสูจน์ว่าเราไม่จำเป็นต้องให้ใครมาจูง [root.species.GetHandName] เพื่อเดินทางไปสู่ดวงดาว"

