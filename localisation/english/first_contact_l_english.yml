 fircon.6000.name:0 "ข้างในนั้นมีสิ่งมีชีวิตอยู่ไหม?"
 fircon.6000.desc:0 "แม้ว่าหลังจากจะได้พบกับเราแล้ว พวก [non_believers_country.GetSpeciesNamePlural] ก็ยังปฏิเสธที่จะยอมรับการมีอยู่ของสิ่งมีชีวิตนอกโลก พวกเขาอ้างว่าเราไม่ใช่ผู้มาเยือนจากดวงดาวอื่น แต่เป็นผู้อยู่อาศัยใต้ดินที่ปีนขึ้นมาสู่พื้นผิวโลกผ่านทางรูบนดิน ดาวเคราะห์ของพวกเขา [non_believers_planet.GetName] ถูกคาดคิดว่าเป็นโพรงด้านใน และพวกเขาเชื่อว่าเราใช้ยานอวกาศบินอยู่ภายในช่องว่างตรงกลางนี้\n\nความเชื่อที่น่าสับสนเหล่านี้นั้นขัดขวางความพยายามทางการทูตของเรา ทุกสิ่งที่เราพูดหรือทำล้วนได้รับความระแวดระวังอย่างถึงที่สุด"
