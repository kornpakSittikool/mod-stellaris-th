 # Evil Slavers Empire
 NAME_MSI_country:0 "Minamar Specialized Industries"
 NAME_MSI_country_initials:0 "MSI"
 NAME_MSI_species:0 "Olinbar"
 NAME_MSI_species_plural:0 "Olinbars"
 ADJ_MSI_country:1 "โอลินบาร์"
 personality_decadent_capitalists:0 "บรรษัทผู้ใจบุญ"
 personality_decadent_capitalists_desc:0 "ด้วยภาพลักษณ์ที่เป็นบรรษัทผู้ใจบุญอุตสาหกรรมพิเศษของมินามาร์ได้มอบความก้าวหน้าทางเทคโนโลยีให้แก่บรรดาอารยธรรมที่ยังด้อยพัฒนา ทว่าด้วยการปล่อยกู้ดอกเบี้ยโหดและการเกณฑ์แรงงานขัดหนี้จากทั่วทั้งกาแล็กซี ผู้ถือหุ้นจึงได้รับการรับประกันผลตอบแทนการลงทุนที่คุ้มค่าอย่างแน่นอน"

 origin_slavers:0 "บันไดสู่ฟากฟ้าของคุณ"
 origin_slavers_desc:0 "นับตั้งแต่ช่วงเวลาที่คณะกรรมการบริหารของ $NAME_MSI_country$ ได้นำพาอารยธรรมของเราไปสู่ดวงดาวเป็นครั้งแรก พวกเราตระหนักดีว่ากาแล็กซีแห่งนี้งดงามเกินกว่าที่จะเก็บไว้ชื่นชมเพียงลำพัง ตั้งแต่นั้นมา เราจึงทำงานอย่างไม่รู้จักเหน็ดเหนื่อยเพื่อช่วยเหลืออารยธรรมที่ด้อยพัฒนาให้บรรลุการเดินทางข้ามระบบดาว(FTL)\n\nการเบิกเนตรความรู้อาจไม่ได้มาฟรีๆ แต่ที่ $NAME_MSI_country_initials$ มันคุ้มค่ากับราคาที่จ่ายเสมอ"
 origin_tooltip_slavers_effects:0 "- เริ่มต้นในฐานะ §Hจักรวรรดิขั้นสูง§!\n- เริ่มต้นด้วยประชากร £pop£ §Hป๊อป§! ทาสจำนวนหนึ่งที่ถูกลักพาตัวมาจาก §Hอารยธรรมก่อนความเร็ว§! ทั่วทั้งกาแล็กซี\n- ปลดล็อกรูปแบบการทิ้งระเบิด §H$bombardment_raiding$§! ซึ่งจะลักพาตัวประชากร £pop£ §Hป๊อป§! จากดาวเคราะห์ต่างๆ ไปตั้งถิ่นฐานใหม่ในอาณานิคมของคุณ"

 opinion_former_slaves:0 "อดีตทาส"
 opinion_slavers:0 "อดีตนายทาส"
 opinion_fellow_slaves:0 "เพื่อนร่วมชะตากรรม"

 # First Contact
 fcsum_MSI_country_summary:0 "เราได้ทำการติดต่อกับ [MSI_country.GetName] ในระบบดาว §H[This.System.GetName]§! แล้ว"
 first_contact.4000.name:0 "การติดต่อกับ $NAME_MSI_country_initials$"
 first_contact.4000.desc.broken_shackles:0 "การติดต่อกับ [MSI_country.GetName] ได้เริ่มต้นขึ้นแล้ว เป็นเรื่องสำคัญอย่างยิ่งที่เราต้องจัดการกับสถานการณ์ที่กำลังพัฒนาอย่างระมัดระวัง ควรส่งทูตออกไปเพื่อรักษาผลประโยชน์ของเรา การโต้ตอบใดๆ กับอดีตนายทาสของเราย่อมส่งผลกระทบทางจิตวิทยาอย่างลึกซึ้งต่อประชาชนของเราอย่างแน่นอน"
 first_contact.4000.desc.payback:0 "ข้อมูลของยานต่างดาวที่เราพบในระบบดาว §H[This.System.GetName]§! ทำให้เรารู้สึกสะท้านเมื่อจำมันได้ การออกแบบยานที่คุ้นเคยซึ่งมีสัญลักษณ์ที่เราเคยหวาดกลัว: โลโก้ติดปีกของ §H$NAME_MSI_country$§!\n\nอดีตผู้รุกรานของเราถูกพบตัวแล้ว มันเป็นเพียงเรื่องของเวลาก่อนที่พวกมันจะรู้ว่ายานที่พวกมันพบเห็นนั้นเป็นของเรา ซึ่งขับเคลื่อนด้วยเทคโนโลยีของพวกมันเอง การติดต่อครั้งใหม่อาจหลีกเลี่ยงไม่ได้ แต่เราสามารถหลีกเลี่ยงการทำผิดพลาดซ้ำรอยเดิมได้"
 first_contact.4000.a.bs:0 "น่าโมโหชะมัด"
 first_contact.4000.a.payback:0 "เราต้องเตรียมตัวให้พร้อม"
 first_contact.4000.a.tooltip:0 "เริ่มกระบวนการ §Yสัมผัสครั้งที่สอง(รายชื่อติดต่อ)§! กับ §Y$NAME_MSI_country$§!"

