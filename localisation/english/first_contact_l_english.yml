 tech_subspace_drive:0 "ระบบขับเคลื่อนในทางลัดอวกาศ"
 tech_subspace_drive_desc:0 "ความเข้าใจอย่างลึกซึ้งที่เกิดจากความปรารถนาอย่างแรงกล้าที่จะละทิ้งบ้านเกิดของเรา เครื่องยนต์ซับสเปซไดรฟ์เหล่านี้ได้รับการออกแบบมาเพื่ออำนวยความสะดวกในการเดินทางระหว่างดวงดาวแบบจำกัด แม้ว่าจะช่วยให้สามารถจัมป์ได้ในระยะทางสั้นๆ เท่านั้น แต่ก็มอบโอกาสพิเศษในการเริ่มต้นการสำรวจกาแล็กซีของเราอย่างก้าวกระโดด"

