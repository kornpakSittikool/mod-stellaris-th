 #Freeport
 fircon.8025.name:0 "จัดตั้งเมืองท่าเสรีแล้ว"
 fircon.8025.desc:0 "ตามข้อตกลงทางการค้าของเรากับพวก [freeport_country.GetName] [GetPreFTLUpperPlural] เราได้จัดตั้งท่าอวกาศขนาดเล็กใกล้กับแหล่งตั้งถิ่นฐานหลักแห่งหนึ่งของพวกเขา พ่อค้าของเราตักตวงผลกำไรมหาศาลโดยปราศจากกฎระเบียบข้อบังคับ แต่พวกเขาถูกสั่งห้ามไม่ให้ออกไปนอกพื้นที่ของท่าอวกาศนี้\n\nส่งผลให้ผู้ลักลอบนำเข้าและแก๊งอาชญากรได้ร่วมกันก่อร่างเศรษฐกิจตลาดมืดที่เติบโตอย่างรวดเร็ว จนถึงตอนนี้พวก [freeport_species.GetAdj] ยังคงแสร้งทำเป็นมองไม่เห็น แต่หากสถานการณ์ยังดำเนินต่อไปเช่นนี้ ท่าเรือเสรีแห่งนี้ก็คงหนีไม่พ้นที่จะถูกครอบงำโดยเหล่าอาชญากร"
 fircon.8025.a:0 "ขอเปิดท่าเรือเสรีเพิ่มเติม"
 fircon.8025.b:0 "เราไม่ได้ทำอะไรผิดนี่"
 fircon.8025.c:0 "ปราบปรามผู้ลักลอบนำสินค้าเข้าเมืองอย่างจริงจัง"

 d_freeports:0 "เมืองท่าเสรี"
 d_freeports_desc:0 "พื้นที่ซึ่งอุทิศให้กับการค้าระหว่างกาแล็กซีกับประเทศต่างๆ ของ [GetPreFTLUpperPlural]"

 freeport_smuggling:0 "การลักลอบขนของหนีภาษีอย่างไร้ขอบเขต"
 freeport_smuggling_desc:0 "ผู้ลักลอบหนีภาษีเคลื่อนไหวกันอย่างเสรีทั่วทั้งดาวเคราะห์"

 #Sweet Tooth
 fircon.8030.name:0 "คนชอบของหวาน"
 fircon.8030.desc:0 "สินค้าโภคภัณฑ์ชิ้นหนึ่งที่เราทำการค้ากับพวก [sweet_country.GetName] [GetPreFTLUpperPlural] คืออาหารที่มีรสชาติดีแต่เป็นอาหารธรรมดาๆ ทั่วไป อย่างน้อยที่สุดก็สำหรับสายพันธุ์ของเรา ทว่าสารให้ความหวานพื้นฐานนี้กลับส่งผลกระตุ้นประสาทอย่างรุนแรงต่อพวก [sweet_species.GetName] มันทำให้เกิดอาการเสพติดอย่างหนักและเป็นอันตรายอย่างยิ่งยวด พ่อค้าผู้ไร้จรรยาบรรณได้ลักลอบขนส่งผลิตภัณฑ์นี้ในปริมาณที่น่าตกใจและจำหน่ายในราคาแพงลิบลิ่ว ส่งผลให้ชาวพื้นเมืองจำนวนมากตกอยู่ในอาการมึนงงหมดสภาพ และในกรณีร้ายแรงที่สุดถึงขั้นเสียชีวิต"
 fircon.8030.desc.lith:0 "สินค้าโภคภัณฑ์ชิ้นหนึ่งที่เราทำการค้ากับพวก [sweet_country.GetName] [GetPreFTLUpperPlural] คือเครื่องเทศแร่ธาตุที่มีรสชาติดีแต่ธรรมดาๆ ทั่วไป อย่างน้อยที่สุดก็สำหรับสายพันธุ์ของเรา ทว่าสารให้ความหวานพื้นฐานนี้กลับส่งผลกระตุ้นประสาทอย่างรุนแรงต่อพวก [sweet_species.GetName] มันทำให้เกิดอาการเสพติดอย่างหนักและเป็นอันตรายอย่างยิ่งยวด พ่อค้าผู้ไร้จรรยาบรรณได้ลักลอบขนส่งผลิตภัณฑ์นี้ในปริมาณที่น่าตกใจและจำหน่ายในราคาแพงลิบลิ่ว ส่งผลให้ชาวพื้นเมืองจำนวนมากตกอยู่ในอาการมึนงงหมดสภาพ และในกรณีร้ายแรงที่สุดถึงขั้นเสียชีวิต"
 fircon.8030.a:0 "สั่งห้ามทำการค้าและจัดตั้งการปิดกั้นทางเรือ"
 fircon.8030.b:0 "เราต้องให้การช่วยเหลือทางการแพทย์!"
 fircon.8030.c:0 "คนเรามันล้มตายกันได้ทุกวันนั่นแหละ ธุรกิจก็คือธุรกิจ"
 fircon.8030.c.tt:0 "พวก [sweet_species.GetName] หลายหน่วยจะถูกสังหาร"

 sweet_tooth_medecine:0 "ความช่วยเหลือทางการแพทย์"
 sweet_tooth_medecine_desc:0 "เราได้จัดสรรทรัพยากรทางการแพทย์เพื่อรักษาอาการเสพติดบน [sweet_planet.GetName]"
 sweet_tooth_blockade:0 "การปิดล้อมเพื่อความปลอดภัย"
 sweet_tooth_blockade_desc:0 "เราได้ผันแปรทรัพยากรไปใช้ในการปิดล้อม [sweet_planet.GetName] เพื่อต่อสู้กับขบวนการค้ายาเสพติดที่แพร่ระบาด"

 building_primitive_clinic:0 "$building_medical_2$"
 building_primitive_clinic_desc:0 "$building_medical_2_desc$"

 #Land Grabs
 fircon.8035.name:0 "การแย่งชิงที่ดิน"
 fircon.8035.desc:0 "มีรายงานทางเศรษฐกิจที่น่ากังวลจาก [landgrab_planet.GetName] ซึ่งเป็นพื้นที่ที่พ่อค้าของเรากำลังทำการค้ากับพวก [landgrab_country.GetName] [GetPreFTLUpperPlural] เมื่อตอนลงนามในข้อตกลง ได้มีการกำหนดมาตรการต่างๆ เพื่อปกป้องอำนาจอธิปไตยของคนในท้องถิ่น แต่คนของเราบางกลุ่มกลับเลี่ยงกฎหมายเพื่อกว้านซื้อที่ดินจำนวนมหาศาลผ่านตัวแทนท้องถิ่น ด้วยอัตราปัจจุบันนี้ ภายในเวลาเพียงหนึ่งรุ่น [landgrab_planet.GetName] จะตกเป็นกรรมสิทธิ์ของพ่อค้าเอกชนทั้งหมด"
 fircon.8035.a:0 "เพิกถอนการขายและสั่งปรับผู้กระทำความผิด"
 fircon.8035.b:0 "มันไม่ใช่กงการอะไรของเรา"
 fircon.8035.c:0 "เป็นโอกาสสร้างความร่ำรวยที่ดี..."

 d_landgrab_blocker:0 "การถือครองทรัพย์สินโดยต่างด้าว"
 d_landgrab_blocker_desc:1 "ที่ดินเหล่านี้ถูกซื้อโดยนักลงทุนจากนอกโลก ทำให้ประชากรพื้นเมืองไม่สามารถเข้าใช้งานได้อีกต่อไป"
 d_landgrab_foreign_holdings:0 "การถือครองจากระยะไกล"
 d_landgrab_foreign_holdings_desc:1 "ที่ดินเหล่านี้ได้มาจากการได้กรรมสิทธิ์จากประชากรพื้นเมือง และในตอนนี้ได้รับการจัดการควบคุมจากวงโคจร"

 #Fruitful Cooperation
 fircon.8040.name:0 "ความร่วมมืออันมีผลสัมฤทธิ์ดี"
 fircon.8040.desc:0 "ข้อตกลงการค้าที่เราได้ทำร่วมกับ [fruitful_coop_country.GetName] ได้รับการพิสูจน์แล้วว่าทำกำไรได้อย่างงดงาม ข้อตกลงนี้ได้รับความเคารพและการค้าดำเนินไปอย่างลื่นไหล พ่อค้าบางรายยังเรียกร้องให้ผ่อนปรนกฎระเบียบเพิ่มเติม แต่โดยรวมแล้วข้อตกลงนี้เป็นประโยชน์ต่อทั้งสองฝ่าย"
 fircon.8040.b:0 "บางทีเราอาจต้องเจรจากันใหม่..."

 good_trade:0 "การค้าที่เป็นประโยชน์"
 fruitful_coop_planet_mod:0 "ความร่วมมืออันมีผลสัมฤทธิ์ดี"
 fruitful_coop_planet_mod_desc:0 "การค้าที่กำลังดำเนินอยู่กำลังส่งผลดีต่อประชากรในท้องถิ่น"
 fruitful_coop_country_mod:0 "การค้าที่เจริญรุ่งเรือง"
 fruitful_coop_country_mod_desc:0 "ใช้ความกดดันทางเศรษฐกิจกับ[root.GetAAnPreFTLLower] [root.GetPreFTLLower]ประเทศได้พิสูจน์ประโยชน์แล้ว เพื่อเรา" # e.g. 'economic pressure on an unenlightened country'

 #Slavers - Us
 fircon.8045.name:0 "ตกเป็นทาส"
 fircon.8045.desc:0 "รายงานที่น่าตกใจจากพวก [space_slavers_country.GetName] [GetPreFTLUpperPlural]: มีพวกค้าทาสที่ไร้คุณธรรมแฝงตัวมาเป็นพ่อค้าล่วงละเมิดข้อตกลงทางการค้าของเราเพื่อลงจอดบนดาวเคราะห์และลักพาตัวประชากรท้องถิ่นไป เราทราบเรื่องพฤติกรรมนี้ก็ตอนที่พบว่ากลุ่มของ [space_slavers_species.GetName] [GetPreFTLUpperPlural] ขนาดใหญ่ถูกประกาศขายอยู่ในตลาดค้าทาสนอกระบบ"
 fircon.8045.a:0 "ช่วยเหลือผู้ถูกลักพาตัว"
 fircon.8045.b:0 "มันไม่ใช่ธุระกงการอะไรของเรา"
 fircon.8045.b.tt:0 "§Y[space_slavers_species.GetName]§! หนึ่งหน่วย จะถูกย้ายไปตั้งถิ่นฐานใหม่ที่ §Y[event_target:space_slavers_capital.GetName]§!"
 fircon.8045.c:0 "ถ้าพวกเขาต้องการทาสของเรา ก็ต้องจ่ายภาษีมา!"

 #Slavers - Them
 fircon.8050.name:0 "ถูกกดขี่เป็นทาส"
 fircon.8050.desc:1 "เราได้รับรายงานที่น่ากังวลจาก [GetPreFTLUpperPlural] ของ [preftl_slavers_country.GetName]: ในภูมิภาคห่างไกลของดาวเคราะห์ดวงนี้ พ่อค้าอวกาศหลายราย ซึ่งส่วนใหญ่เป็นผู้ลักลอบขนของหนีภาษี ได้หายตัวไปพร้อมกับยานอวกาศของพวกเขา การสืบสวนอย่างลับ ๆ เผยให้เห็นว่าพวกเขาถูกบังคับให้ทำงานในเหมืองซึ่งห่างไกลจากสายตาผู้คน\n\nสิ่งสำคัญที่ต้องบันทึกไว้ก็คือ เรื่องนี้ไม่ได้กระทำโดยทางการของ [preftl_slavers_country.GetName] แต่เป็นฝีมือของขุนศึกท้องถิ่นและอาชญากรจำนวนหนึ่ง และผู้ถูกลักพาตัวทั้งหมดล้วนแต่ละเมิดสนธิสัญญาที่เราลงนามไว้กับ [GetPreFTLUpperPlural]"
 fircon.8050.a:0 "พวกเขาสมควรได้รับมันแล้ว"
 fircon.8050.b:0 "ยอมรับไม่ได้ จงคืนอิสรภาพให้พวกเขา"
 fircon.8050.c:0 "เปิดฉากการโจมตีเพื่อลงทัณฑ์"
 fircon.8050.c.tt:0 "[preftl_slavers_species.GetName] หลายชีวิตจะถูกสังหาร"

 #They are fleecing our merchants and its amazing.
 fircon.8055.name:0 "ยอดนักต่อรอง"
 fircon.8055.desc:0 "[GetPreFTLUpperPlural] ของ [preftl_hagglers_country.GetName] ได้พิสูจน์แล้วว่าเป็นพ่อค้าที่เชี่ยวชาญอย่างเหลือเชื่อ พ่อค้าของเราเองกำลังได้เรียนรู้บทเรียนราคาแพงว่าคนท้องถิ่นนั้นมีทั้งความรอบรู้และโน้มน้าวใจเก่ง และพวกเขาก็ไม่พอใจกับเรื่องนี้เลย\n\nในอีกทางหนึ่ง นักเศรษฐศาสตร์ของเราหลายคนเชื่อมั่นว่าเราสามารถเรียนรู้จากพฤติกรรมของ [GetPreFTLUpperPlural] เหล่านี้ได้"
 fircon.8055.a:0 "สนับสนุนเงินทุนแก่โครงการ"
 fircon.8055.b:0 "รับสมัคร [preftl_hagglers_species.GetName] คนหนึ่งเข้าทำงาน"
 fircon.8055.b.tt:0 "ได้รับ §Yผู้ว่าการ§! พิเศษ"
 fircon.8055.c:0 "กดดัน [preftl_hagglers_country.GetName] ให้เสนอข้อตกลงที่ดีกว่าเดิม"

 leader_trait_preftl_haggler:0 "หัวธุรกิจ"
 leader_trait_preftl_haggler_desc:1 "เนื่องจากมาจากประเทศ [Owner.GetPreFTLUpper] ผู้นำคนนี้ได้แสดงให้เห็นถึงหัวการค้าที่เฉียบแหลมเป็นพิเศษ"
 preftl_hagglers_mod:0 "คาดการณ์อัลกอริทึมซื้อขาย"
 preftl_hagglers_mod_desc:0 "การศึกษาของเราเกี่ยวกับ [GetPreFTLUpperPlural] ของ [preftl_hagglers_country.GetName] และแนวปฏิบัติทางการค้าเชิงรุกของพวกเขาได้สร้างแบบจำลองทางเศรษฐกิจที่น่าสนใจบางส่วนขึ้นมา"

 # Misuse of Tech
 fircon.8500.name:0 "การใช้เทคโนโลยีในทางที่ผิด"
 fircon.8500.desc.regular:0 "เพื่อส่งเสริมไมตรีจิต เราจึงตกลงที่จะแบ่งปันเทคโนโลยีการจำลองสสารกับผู้อยู่อาศัยของ [preftl_misusers_planet.GetName] แน่นอนว่าเราคาดหวังให้พวกเขาใช้มันเพื่อลดความขาดแคลนทรัพยากร แต่ตอนนี้เราได้รับรายงานว่าเทคโนโลยีนี้กำลังถูกนำไปสร้างเป็นอาวุธ\n\nผู้อยู่อาศัยได้เกิดแนวคิดอันอาจหาญในการย้อนกลับการทำงานของหน่วยจำลองสสาร เพื่อที่ว่าแทนที่จะเป็นการประกอบสสารตามที่ตั้งโปรแกรมไว้ อุปกรณ์นี้กลับสามารถนำมาใช้ในการแยกส่วนสิ่งมีชีวิตในระดับอะตอมได้"
 fircon.8500.desc.xenophobe:0 "เราได้แบ่งปันเทคโนโลยีการจำลองสสารกับผู้อยู่อาศัยของ [preftl_misusers_planet.GetName] พวกเขาควรจะใช้มันเพื่อลดความขาดแคลนทรัพยากร แต่พวกเขากลับพยายามสร้างมันเป็นอาวุธอย่างโง่เขลา ด้วยการย้อนกระบวนการทำงานของหน่วยจำลองสสารแบบหยาบ ๆ พวกเขาได้เริ่มสร้างอุปกรณ์ที่สามารถนำมาใช้ในการแยกส่วนสิ่งมีชีวิตในระดับอะตอมได้แล้ว"
 fircon.8500.a:0 "ยึดเทคโนโลยีคืน พวกเขาไม่น่าไว้วางใจให้ใช้งานมันอย่างถูกต้อง"
 fircon.8500.b:0 "สิ่งที่พวกเขาเลือกจะทำกับเทคโนโลยีไม่ใช่เรื่องของเรา"
 fircon.8505.name:0 "การยึดคืน"
 fircon.8505.desc:0 "สายลับของเราไปถึงในขณะที่ [preftl_misusers_species.GetName] กำลังพัฒนาเครื่องสลายอะตอมแบบพกพาขั้นสุดท้าย พวกเขาได้รับแจ้งอย่างชัดแจ้งว่านี่ไม่ใช่จุดประสงค์การใช้งานสำหรับหน่วยจำลองสสารที่เรามอบให้เป็นของขวัญ\n\nตามคาด พวกเขาลังเลที่จะสละเทคโนโลยีนี้ อารมณ์ต่างคุกรุ่น และรัฐบาลท้องถิ่นได้ตีตราว่าการยึดคืนครั้งนี้เป็นการกระทำที่ก้าวร้าว"
 fircon.8510.name:0 "แนวโน้มในการทำลายล้าง"
 fircon.8510.desc:0 "จากการวิศวกรรมย้อนกลับเทคโนโลยีการจำลองสสารของเรา [preftl_misusers_species.GetName] ได้ประสบความสำเร็จในการสร้างเครื่องสลายอะตอมแบบพกพา และกำลังใช้มันสร้างความหายนะบน [preftl_misusers_planet.GetName]\n\nเราควรจดจำแนวโน้มในการทำลายล้างของพวกเขาไว้ให้ดีก่อนที่จะเริ่มข้อตกลงการค้าเพิ่มเติมใด ๆ"
 tech_abusers:0 "ผู้ใช้เทคโนโลยีในทางที่ผิด"
 tech_abusers_desc:0 "ผู้อยู่อาศัยในดาวเคราะห์ดวงนี้ขึ้นชื่อในเรื่องการนำเทคโนโลยีไปใช้ในทางที่ผิด"
 opinion_tech_abusers:1 "พวกเขาไม่เห็นด้วยกับทางเลือกของเรา"
 opinion_tech_abusers_pro:1 "พวกเขาเคารพเราที่ให้ความไว้วางใจในตัวพวกเขา"

 # Invasive Species
 fircon.8565.name:0 "สายพันธุ์รุกราน"
 fircon.8565.desc:0 "เมื่อเราเดินทางกลับจากการเยือนทางการทูตเมื่อเร็ว ๆ นี้กับ [preftl_invasives_species.GetName] แห่ง [preftl_invasives_planet.GetName] เราก็พบว่าเราได้พาผู้ลักลอบขึ้นยานที่ผิดปกติบางส่วนกลับมาด้วย การแพร่ระบาดของอาร์โทรพอดขนาดเล็กที่ไม่มีปีกและคืบคลานได้หาทางขึ้นมาบนกระสวยอวกาศของเรา\n\nพวกมันเคลื่อนไหวเร็วและมีขนาดเล็กมากจนเซ็นเซอร์ของเราตรวจจับไม่ได้ เมื่อพิจารณาถึงการขยายพันธุ์อย่างรวดเร็วของพวกมัน การควบคุมการรุกรานนี้จึงทำได้ยากลำบากยิ่งขึ้น\n\nน่าเสียดายที่สายพันธุ์นี้เป็นสัญลักษณ์แห่งความอุดมสมบูรณ์สำหรับผู้คนบน [preftl_invasives_planet.GetName] วิธีการที่เราตอบสนองต่อเรื่องนี้อาจส่งผลกระทบต่อความสัมพันธ์ของเรากับ [preftl_invasives_species.GetNamePlural]"
 fircon.8565.a:0 "แจ้งผู้ปกครองดาวเคราะห์ดวงนี้ว่าเราจะทำการกำจัดแมลงที่แพร่ระบาดเหล่านี้"
 fircon.8565.b:0 "จัดการเรื่องนี้อย่างเงียบ ๆ เราไม่จำเป็นต้องลบหลู่พวกเขา"
 fircon.8570.name:0 "การชำระล้างสารปนเปื้อน"
 fircon.8570.desc:0 "เราได้เผชิญหน้ากับนักการทูตของ [preftl_invasives_planet.GetName] เกี่ยวกับการแพร่ระบาดของอาร์โทรพอดที่กำลังดำเนินอยู่ แม้ว่าพวกเขาจะตกใจกับความตรงไปตรงมาของเรา แต่สุดท้ายพวกเขาก็ซาบซึ้งในความซื่อสัตย์ของเรา\n\nพวกเขาขออภัยที่ไม่ได้รอบคอบกว่านี้ในกระบวนการชำระล้างสารปนเปื้อน และเสนอสารไล่แมลงที่ปราศจากการทารุณกรรมสัตว์และผ่านการทดสอบมาแล้ว ซึ่งเป็นที่นิยมบน [preftl_invasives_planet.GetName]"
 fircon.8570.a:0 "ความซื่อสัตย์คือนโยบายที่ดีที่สุด"
 fircon.8575.name:0 "การขับไล่แมลง"
 fircon.8575.desc:0 "เนื่องจากไม่ต้องการให้เกิดปัญหาทางการทูต เราจึงพยายามจัดการกับฝูงแมลงรบกวนจาก [preftl_invasives_planet.GetName] อย่างเงียบ ๆ\n\นนี่ไม่ใช่งานง่ายเลยเมื่อพิจารณาจากการขยายพันธุ์อย่างรวดเร็วของสิ่งมีชีวิตเหล่านี้ และความชอบของพวกมันในการกัดกินวัสดุที่ไม่ใช่สารอินทรีย์\n\nเมื่อนักการทูตของเราปรากฏตัวในงานประชุมด้วยชุดที่ขาดรุ่งริ่งเพราะถูกแมลงกัดกิน [preftl_invasives_species.GetNamePlural] ก็รู้ทันทีว่าเกิดอะไรขึ้น\n\nดูเหมือนพวกเขาจะรู้สึกอับอายที่แนะนำสิ่งมีชีวิตเหล่านี้เข้ามา จึงได้มอบสารไล่แมลงที่เป็นมิตรและปราศจากการทารุณกรรมสัตว์ให้แก่เรา"
 fircon.8575.a:0 "การแพร่ระบาดถูกกำจัดหมดสิ้นแล้ว"
 straight_talkers:0 "คนพูดตรง"
 straight_talkers_desc:0 "เราพูดตรงไปตรงมาตามที่เป็นจริง"
 no_worries:0 "ไม่มีอะไรน่ากังวล"
 no_worries_desc:0 "เราไม่ใช่พวกที่ชอบจุกจิกเรื่องมาก"

  # Different Flavors of Government
 fircon.8531.name:0 "รสชาติแห่งรัฐบาล"
 fircon.8531.base.desc:0 "[preftl_different_flavors_species.GetNamePlural] บน [preftl_different_flavors_planet.GetName] รู้สึกตกใจที่ได้ทราบว่ารัฐบาลของเรานั้นแตกต่างจากของพวกเขาอย่างมาก ไม่น่าเชื่อเลยว่าตลอดประวัติศาสตร์ของดาวเคราะห์ดวงนี้ ผู้คนของพวกเขายังไม่เคยมีประสบการณ์เกี่ยวกับโครงสร้างอำนาจเช่นนี้มาก่อน แน่นอนว่าสิ่งนี้สร้างความกังวลเกี่ยวกับความสามารถของเราในการเจรจาการทูตอย่างมีประสิทธิภาพ"
 fircon.8531.democratic.desc:0 "$fircon.8531.base.desc$\n\nพวกเขายังไม่รู้เรื่องเกี่ยวกับประโยชน์ที่ประชาธิปไตยจะสามารถมอบให้ หรือรสชาติที่แท้จริงของเสรีภาพ"
 fircon.8531.a:0 "สั่งสอนพวกเขาในวิถีของเรา"
 fircon.8531.b:0 "เคารพความแตกต่างของพวกเขา"
 fircon.8535.imperialist.desc:0 "$fircon.8531.base.desc$\n\nพวกเขาต้องได้เรียนรู้ว่าสิ่งใดที่ทำให้ดินแดนอันยิ่งใหญ่และทรงพลังของเรานั้นยิ่งใหญ่และทรงพลังขนาดนี้ พวกเขายังไม่เคยได้ลิ้มลองรสชาติของจักรวรรดิ"
 fircon.8540.dictatorship.desc:0 "$fircon.8531.base.desc$\n\nเราควรจะปลดปล่อยพวกเขาจากความโง่เขลาเช่นนี้ รสชาติของเผด็จการจะช่วยนำพาอิสรภาพมาสู่พวกเขาเอง"
 fircon.8545.oligarchy.desc:0 "$fircon.8531.base.desc$\n\nการรวมศูนย์อำนาจไว้ในมือของคนกลุ่มน้อยที่ได้รับการเลือกสรรแล้วคือหนทางเดียวในการปกครอง การที่พวกเขาไม่ได้ตระหนักถึงเรื่องนี้ด้วยตนเองนั้นเป็นเรื่องที่ลึกลับอย่างแท้จริง"
 fircon.8550.name:0 "เหมือนพวกเรามากขึ้น"
 fircon.8550.desc:0 "หลังจากที่ได้แนะนำปรัชญาทางการเมืองของเราแก่พวกเขา [preftl_different_flavors_species.GetNamePlural] บน [preftl_different_flavors_planet.GetName] ก็ได้เริ่มดำเนินการเพื่อปฏิรูปรัฐบาลของพวกเขาตามแนวทางของเรา\n\nโครงการริเริ่มเหล่านี้กำลังดำเนินไปในระดับดาวเคราะห์ ซึ่งเป็นการเริ่มต้นยุคใหม่สำหรับ [preftl_different_flavors_species.GetNamePlural] และเพื่อเป็นการเฉลิมฉลองการยกเครื่องทางการเมืองครั้งใหญ่นี้ รัฐบาลชุดใหม่ของ [preftl_different_flavors_species.GetNamePlural] จึงได้จัดขบวนพาเหรดขึ้นเพื่อเป็นเกียรติแก่เรา"
 fircon.8555.name:0 "ความแตกต่างทางการทูต"
 fircon.8555.desc:0 "หลังจากที่ได้เรียนรู้แนวทางการใช้อำนาจของเรา [preftl_different_flavors_species.GetNamePlural] ยังคงยืนกรานว่าสถานะที่เป็นอยู่บน [preftl_different_flavors_planet.GetName] นั้นยังคงเป็นหนทางที่ดีที่สุดในการก้าวต่อไป\n\nพวกเขาสาบานว่าจะยืนหยัดในจุดยืนของตนเองและจะไม่หวั่นไหวไปตามกองกำลังภายนอก\n\nการทูตยังคงดำเนินต่อไป แต่ไม่มีข้อสงสัยเลยว่าพวกเขาไว้วางใจเราน้อยลง"
 fircon.8560.name:0 "อยู่ยืนยาวและปล่อยให้ผู้อื่นดำเนินชีวิต"
 fircon.8560.desc:0 "แทนที่จะใช้แรงกดดันโดยตรง เราได้อธิบายทฤษฎีเบื้องหลังอำนาจการปกครองของเราอย่างใจเย็นให้แก่ [preftl_different_flavors_species.GetNamePlural] บน [preftl_different_flavors_planet.GetName] ได้ฟัง\n\nพวกเขาต่างสนใจในข้อมูลเชิงลึกที่เรามอบให้เกี่ยวกับรูปแบบการปกครองทางเลือก และได้แสดงความชื่นชมอย่างมากที่เราไม่ได้พยายามบังคับให้พวกเขาปฏิบัติตาม\n\nนักการทูตของทั้งสองฝ่ายได้สร้างความสัมพันธ์ที่ยั่งยืน และร่วมเฉลิมฉลองด้วยกันในงานเลี้ยงสังสรรค์ร่วมกัน การทูตยังดำเนินต่อไปด้วยดี"
 fircon.8560.a:0 "ความเคารพคือไฮเปอร์เลนแบบสองทาง"

 stand_your_ground:0 "ยืนหยัดในจุดยืน"
 stand_your_ground_desc:0 "ด้วยความภาคภูมิใจในอดีตของพวกเขา ผู้คนเหล่านี้จึงยึดมั่นในโครงสร้างดั้งเดิมของรัฐบาล"
 opinion_flavors_up:0 "พวกเขาชื่นชมแนวทางการทูตของเรา"
 opinion_flavors_down:0 "พวกเขาไว้วางใจเราน้อยลง"

 fircon.8000.name:0 "ผู้คลั่งไคล้ต่างดาว"
 fircon.8000.desc:0 "ในตัวอย่างที่น่าขบขันของการแลกเปลี่ยนทางวัฒนธรรม คนหนุ่มสาวจำนวนมากบน [pre_ftl_planet.GetName] ได้พัฒนาความสนใจอย่างแรงกล้าต่อทุกสิ่งที่เป็น [owner.GetAdj] ด้วยการแย่งชิงสิ่งต่าง ๆ ที่เกี่ยวข้องกับวัฒนธรรมของเราอย่างกระตือรือร้น แม้แต่เพียงเล็กน้อยก็ตาม วัยรุ่นที่หลงใหลเหล่านี้ในปัจจุบันได้ก่อให้เกิดวัฒนธรรมย่อยที่สดใสและเติบโตขึ้นเรื่อย ๆ บนดาวเคราะห์ดวงนี้\n\nเรายังได้รับแจ้งอีกว่าในงานประชุมของแฟน ๆ ที่กำลังจะมาถึงนี้จะมีการประกวดเครื่องแต่งกายด้วย"
 fircon.8000.a:0 "พวกเขาต้องการกรรมการไหม?"
 fircon.8000.b:0 "ปล่อยให้พวกเด็ก ๆ ได้เล่นสนุกกันไป"
 fircon.8000.c:0 "พอได้แล้ว วัฒนธรรมของเราคือของเราเอง"
 fircon.8000.d:0 "พวกเลียนแบบที่น่ารังเกียจ จงสั่งปิดกิจกรรมพวกมันซะ"
 xenophiliacs_tt:0 "การจำกัดงานกิจกรรมนี้จะกระตุ้นให้เกิดปฏิกิริยาตอบสนองจากผู้คนบน [pre_ftl_planet.GetName] อย่างแน่นอน"

 fircon.8001.name:0 "วัฒนธรรมเครื่องแต่งกาย"
 fircon.8001.desc:0 "งานคอนเวนชั่น [owner.GetAdj] บน [pre_ftl_planet.GetName] ประสบความสำเร็จอย่างงดงาม! ทั้งคนหนุ่มคนแก่ต่างมารวมตัวกันที่เมืองใหญ่ที่สุดของดาวเคราะห์เพื่อเฉลิมฉลองทุกสิ่งที่เป็น [owner.GetName] นอกเหนือจากไมตรีจิตที่งานคอนเวนชั่นสร้างขึ้นแล้ว มันยังช่วยกระตุ้นเศรษฐกิจในท้องถิ่นที่จำเป็นอย่างมากอีกด้วย\n\nและที่ยอดเยี่ยมที่สุดคือการประกวดเครื่องแต่งกาย ซึ่งรางวัลใหญ่ตกเป็นของแฟนคลับผู้ทุ่มเทเป็นพิเศษของ [owner.GetRulerTitle] [owner.GetRulerName] ของเราเอง"
 fircon.8001.a:0 "มีความคล้ายคลึงกันอย่างไม่น่าเชื่อ"
 pre_ftl_diplomacy_01:0 "วัฒนธรรมเครื่องแต่งกาย"

 fircon.8002.name:0 "ทวงคืนรากเหง้าดั้งเดิม"
 fircon.8002.desc:0 "หลังจากที่เราใช้อิทธิพลของเราเพื่อลดทอนความเป็นแฟนคลับของ [owner.GetAdj] ที่กำลังผลิบานบน [pre_ftl_planet.GetName] ผู้คนบนดาวดวงนั้นก็ได้รวมตัวกันเพื่อสืบสานการแสดงออกทางวัฒนธรรมดั้งเดิมของตนเอง ด้วยเหตุนี้ ผลงานในภาคศิลปะและวัฒนธรรมจึงได้รับการพัฒนาขึ้นอย่างเด่นชัด"
 pre_ftl_diplomacy_02:0 "ศิลปะที่เจริญรุ่งเรือง"

 fircon.8003.name:0 "ไม่ใช่แฟนคลับอีกต่อไป"
 fircon.8003.desc:0 "แนวทางที่เข้มงวดของเราต่อแฟนคลับ [owner.GetAdj] บน [pre_ftl_planet.GetName] ได้กระตุ้นให้เกิดกระแสต่อต้านอย่างรุนแรง การรวมกลุ่มกันสืบสานวัฒนธรรมและประเพณีของตนเองทำให้หลายคนบนดาวเคราะห์เริ่มมีแนวคิดต่อต้าน [owner.GetAdj] อย่างรุนแรง\n\nและนี่ยังต้องรอดูกันต่อไปว่าเหตุการณ์นี้จะส่งผลกระทบต่อความสัมพันธ์ทางการทูตระหว่างโลกของเราอย่างไร"
 fircon.8003.a:0 "เราไม่ต้องการความรักจากพวกเขา"
 opinion_pre_ftl_diplomacy_03:0 "ไม่ใช่แฟนคลับของเรา"

 # Market Fluctuations, AKA Space Stonks

 fircon.8060.name:0 "ความผันผวนของตลาด"
 fircon.8060.desc:0 "การเปิดเผยว่าพวกไม่ได้อยู่อย่างโดดเดี่ยวในจักรวาลสร้างความตกตะลึงให้แก่หลายคนบน [pre_ftl_country.Capital.GetName] และไม่ใช่เรื่องแปลกเลยที่เหตุการณ์นี้จะส่งผลกระทบทางเศรษฐกิจอย่างรุนแรง สถาบันการเงินทั่วทั้งดาวเคราะห์ต่างตกต่ำลงอย่างรวดเร็ว ส่งผลให้มาตรฐานการครองชีพบนดาวเคราะห์ดวงนี้ลดลงอย่างเห็นได้ชัด"
 fircon.8060.a:0 "ให้ความช่วยเหลือทางการเงินแก่พวกเขา"
 fircon.8060.b:0 "เชื่อมั่นในกลไกตลาด"

 fircon.8065.name:0 "ตลาดมีเสถียรภาพแล้ว"
 fircon.8065.desc:0 "มาตรการกระตุ้นทางการเงินที่เรามอบให้แก่ [pre_ftl_country.Capital.GetName] ได้ผลตอบแทนอย่างงดงาม ด้วยสกุลเงินดั้งเดิมและสถาบันทางเศรษฐกิจของพวกเขาที่ได้รับการสนับสนุนจากเรา สภาพการณ์ต่าง ๆ จึงมีเสถียรภาพในที่สุด\n\nและบางทีที่สำคัญยิ่งกว่านั้นก็คือ การยอมรับของสาธารณชนต่อการปรากฏตัวอย่างต่อเนื่องของเราในระบบนี้ไม่เคยสูงขนาดนี้มาก่อน"
 fircon.8065.a:0 "มีราคาแพง แต่จำเป็น"
 opinion_pre_ftl_diplomacy_02:0 "พ่อมดทางการเงิน"

 fircon.8070.name:0 "ตลาดรู้ดีที่สุด"
 fircon.8070.desc:0 "ความเชื่อมั่นของเราในความเอื้ออาทรของตลาดส่งผลตอบแทนอย่างงดงาม\n\nเมื่อได้รับการปลดปล่อยจากกฎระเบียบที่เข้มงวด สถาบันการเงินบน [pre_ftl_country.Capital.GetName] ก็มีเสถียรภาพ ผู้คนที่นั่นสามารถพักผ่อนได้อย่างมั่นใจด้วยความรู้ที่ว่าอนาคตทางเศรษฐกิจของพวกเขาได้รับการรับประกันแล้ว"

 fircon.8075.name:0 "การล่มสลายครั้งหนึ่งในชั่วอายุคน"
 fircon.8075.desc:0 "อย่างอธิบายไม่ได้ ความเชื่อมั่นของเราในการที่ตลาดจะฟื้นฟูตัวเองได้บน [pre_ftl_country.Capital.GetName] ได้กลายเป็นหายนะ ในความเป็นจริง สภาพการณ์ต่าง ๆ บนดาวเคราะห์ไม่เคยย่ำแย่ขนาดนี้มาก่อน และผู้คนที่นั่นกำลังเรียกร้องให้รัฐบาลเพิ่มการกำกับดูแลในภาคการเงินมากขึ้น"
 economic_whoopsie_tt:0 "อุ๊ย"

 pre_ftl_diplomatic_01:0 "กองทุนช่วยเหลือทางการเงิน"
 pre_ftl_diplomatic_01_desc:0 "มันเป็นความรับผิดชอบของระบบเศรษฐกิจที่เติบโตเต็มที่แล้วที่จะต้องช่วยเหลือผู้ที่โชคร้ายกว่าในยามวิกฤต"
 pre_ftl_diplomatic_02:0 "ต้นทุนค่าเสียโอกาส"
 pre_ftl_diplomatic_02_desc:0 "การลงทุนในวันนี้คือการเติบโตในวันข้างหน้า เงินทุนเหล่านี้จึงเป็นค่าใช้จ่ายที่จำเป็น"
 pre_ftl_diplomatic_03:0 "ความไม่มั่นคงทางเศรษฐกิจ"
 pre_ftl_diplomatic_03_desc:0 "การติดต่อครั้งแรกกับสิ่งมีชีวิตที่มีภูมิปัญญาได้ส่งผลให้ตลาดของสังคมนี้ตกต่ำลงอย่างรวดเร็ว"
 pre_ftl_diplomatic_04:0 "เศรษฐกิจที่ได้รับการช่วยเหลือ"
 pre_ftl_diplomatic_04_desc:0 "เศรษฐกิจของดาวเคราะห์ดวงนี้ได้รับการกระตุ้นเป็นผลสำเร็จแล้ว"
 pre_ftl_diplomatic_05:0 "ตลาดเลวร้ายที่สุด"
 pre_ftl_diplomatic_05_desc:0 "ไม่มีใครสามารถคาดเดาถึงการชะลอตัวทางเศรษฐกิจในประเภทนี้ได้"
 opinion_pre_ftl_diplomacy_01:0 "ความสัมพันธ์ที่ตึงเครียด"

 # The Lone Drone (I, Drone)
 fircon.8515.name:0 "โดรนผู้โดดเดี่ยว"
 fircon.8515.desc:0 "ในระหว่างการเยือนทางการทูตยังพื้นผิวของ [preftl_lone_drone_planet.GetName] เราได้รับการติดต่อจาก [preftl_lone_drone_species.GetName] ผู้โดดเดี่ยวรายหนึ่ง แม้ว่า [preftl_lone_drone_species.GetNamePlural] จะเป็นสายพันธุ์ที่มีสติปัญญารวมหมู่(ทอง)แต่โดรนตัวดังกล่าวกลับระบุตนเองว่าเป็นปัจเจกบุคคล และตอนนี้กำลังร้องขอการลี้ภัย\n\nดูเหมือนว่าจะได้รับแรงบันดาลใจจากสิ่งที่คุณเห็นจากพวกเรา พวกเขาจึงปรารถนาที่จะรวมเข้ากับสังคมของเรา เมื่อถูกตั้งคำถาม พวกเขาก็ยืนยันซ้ำแล้วซ้ำเล่าว่าไม่สามารถปรับตัวให้เข้ากับรังได้ และอ้างว่าตนเองมีจิตสำนึกส่วนบุคคลมาตลอดชีวิต"
 fircon.8515.a:0 "เราไม่สามารถยอมสร้างความขัดแย้งกับรังได้"
 fircon.8515.b:0 "อนุมัติการลี้ภัย"
 fircon.8520.name:0 "การกลับเข้ารวมกลุ่มใหม่"
 fircon.8520.desc:0 "เราปฏิเสธการขอลี้ภัยของโดรน [preftl_lone_drone_species.GetName] ผู้โดดเดี่ยวตัวนี้ เราเชื่อว่ามันเป็นประโยชน์สูงสุดต่อทั้งสองฝ่าย\n\nปราศจากความร่วมมือของเรา [preftl_lone_drone_species.GetName] ตัวนั้นจึงต้องกลับไปหาผู้คนของตนเพื่อร้องขออิสรภาพ\n\n[preftl_lone_drone_species.GetNamePlural] รับรองกับเราว่านี่เป็นเพียงโดรนที่มีความเบี่ยงเบนซึ่งภายหลังได้ตระหนักคิดและกลับคืนสู่จิตรวมหมู่แล้ว เราจะไม่ได้รับยินเรื่องเกี่ยวกับผู้ที่เรียกตนเองว่าปัจเจกบุคคลคนนี้อีก\n\nการทูตกับ [preftl_lone_drone_planet.GetName] ยังคงดำเนินต่อไป"
 fircon.8525.name:0 "เข้าร่วมกับฝ่ายเรา"
 fircon.8525.desc:0 "ในตอนแรก โดรน [preftl_lone_drone_species.GetName] ผู้โดดเดี่ยวจาก [preftl_lone_drone_planet.GetName] รู้สึกสับสนอย่างมากจากการปรับตัวครั้งใหญ่ อย่างไรก็ตาม หลังจากผ่านพ้นช่วงตื่นตระหนกทางวัฒนธรรมในตอนแรก โดรนตัวนี้ก็กำลังปรับตัวเข้ากับชีวิตในฐานะปัจเจกบุคคล และอาจเป็นเรื่องที่น่าตลกดีที่พวกเขากลับกลายมาเป็นเหมือนพวกเรา"
 fircon.8525.a:0 "ยินดีต้อนรับ"
 fircon.8525.a.tt:0 "§Hนักวิทยาศาสตร์§! คนใหม่ถูกเพิ่มเข้าไปใน §H$RECRUITABLE_LEADERS$§! ของเรา"
 opinion_lone_drone:0 "พวกเขารู้สึกยินดีกับการกลับเข้ารวมกลุ่มใหม่"

