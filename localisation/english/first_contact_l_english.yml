 # Starting event
 origin.4010.name:0 "ใบแจ้งหนี้"
 origin.4010.desc:1 "กล่องเก็บของขับเคลื่อนด้วยตัวเองขนาดเล็กเพิ่งผ่านเข้ามายังขอบระบบบ้านเกิดของเรา และส่งสัญญาณแจ้งเตือนการมาถึงอย่างเสียงดัง เมื่อกู้คืนมาได้ กล่องนั้นเผยให้เห็นเนื้อหาอันน่าสลดใจ: รายการยาวเหยียดที่ระบุรายละเอียดเกี่ยวกับยุทโธปกรณ์ทางการทหารทั้งหมดที่เราได้ทำลายไประหว่างสงครามต่อต้านผู้รุกราน รวมถึงข้อมูลการสูญเสียของลูกเรือและมูลค่าโดยประมาณของยานแต่ละลำที่ถูกทำลาย\n\nอดีตผู้รุกรานของเราเรียกร้องค่าปฏิกรรมสงครามอย่างเป็นทางการ ทั้งที่จริงๆ แล้วเป็นฝ่ายรุกรานเรา และยิ่งอุกอาจไปกว่านั้น พวกเขายังอ้างว่าซากยานที่ถูกทำลายทั้งหมดในระบบของเรายังคงเป็นทรัพย์สินของพวกเขา และความพยายามใดๆ ที่จะทำลาย ปรับปรุง หรือทำวิศวกรรมย้อนกลับกับซากเหล่านั้นจะถือว่าเราละเมิดเงื่อนไขและข้อตกลง\n\nในไม่ช้าบริษัททวงหนี้จะติดต่อเรามาเพื่อสะสางปัญหานี้"
 origin.4010.a:0 "ไร้สาระสิ้นดี!"
 origin.4010.a.tooltip:0 "ผู้ทวงหนี้จะมาพบเราใน §Y[root.payback_debt_collectors_timer]§!"

 # Hub - first encounter
 origin.4015.name:0 "ผู้ทวงหนี้"
 origin.4015.desc:0 "เรียน [owner.GetName],\n\nเรากำลังติดต่อคุณในนามของ §H$NAME_MSI_country$§! เกี่ยวกับหนี้ค้างชำระ ในฐานะสังคมที่เพิ่งเริ่มต้นเดินทางสู่ห้วงอวกาศ เราเข้าใจดีว่าคุณอาจไม่อยู่ในสถานะที่จะชำระเงินเต็มจำนวนได้ เป้าหมายของเราคือการช่วยเหลือคุณในการเลือกแผนการชำระหนี้ที่เหมาะสม ซึ่งจะจัดการหนี้ค้างชำระทั้งหมดโดยไม่ขัดขวางการเติบโตทางเศรษฐกิจ\n\nดังนั้น เรายินดีที่จะเสนอคำปรึกษาให้คุณฟรีโดยไม่คิดค่าใช้จ่าย! เราปรารถนาอย่างยิ่งว่าเรื่องนี้จะยุติลงได้ด้วยดีและเป็นมิตร"
 origin.4015.a:0 "เรายินดีที่จะตกลงยอมความ"
 origin.4015.b:0 "เราปฏิเสธที่จะจ่าย"
 origin.4015.c:0 "คุณเป็นใคร?"
 origin.4015.c.response:0 "ก่อนที่ผู้คนของเราจะเอื้อมถึงดวงดาวเป็นครั้งแรกเสียด้วยซ้ำ เราเข้าใจดีว่าทุกคนมีบทบาทที่ต้องแสดงในกาแลกซีนี้ บางวัฒนธรรมโหยหาอำนาจ บางวัฒนธรรมแสวงหาความรู้ ส่วนเราวิวัฒนาการมาเพื่อเอนเอียงไปทางการรับใช้\n\nผู้ที่ไม่เคยสัมผัสความสุขของการอุทิศตนรับใช้อย่างไร้ความเห็นแก่ตัว ถือว่าพลาดแก่นแท้ของการมีชีวิตอยู่ การก้มหัวไม่ได้ทำให้อำนาจด้อยลง แต่มันคือการช่วยส่งเสริมผู้คนรอบตัวคุณต่างหาก"

 # We are willing to settle
 origin.4016.name:0 "เงื่อนไขการชำระหนี้"
 origin.4016.desc:0 "ตามประมาณการที่เรายื่นไปก่อนหน้านี้ จำนวนหนี้ที่คุณค้างชำระกับลูกค้าของเราเท่ากับ §Y£energy£ [owner.debt_collectors_amount] เครดิตพลังงาน§! เรายินดีที่จะเสนอแผนการชำระหนี้ที่หลากหลายให้กับคุณ"
 origin.4016.a:0 "จ่ายเงินเต็มจำนวน"
 origin.4016.a.response:0 "เรา รู้สึก ประทับ ใจ ใน ความ กระตือรือร้น ของ คุณ ที่ จะ จัด การ กับ หนี้ สิน แต่ เมื่อ ตรวจ สอบ อย่าง ละเอียด ค่า นิยม ด้าน พลัง งาน ที่ คุณ เสนอ ดู เหมือน ไม่ ใช่ เรื่อง จริง เลย. แค่เข้าใจผิดเฉยๆ เราแน่ใจ มาทําเป็นไม่มีอะไรเกิดขึ้นดีกว่า" # Just a cheeky joke in case players use console commands to obtain the full sum
 origin.4016.b:1 "§R5000§! £energy£ §H$energy$§! ทุกๆ 15 ปี"
 origin.4016.b.tooltip:1 "สัญญาว่าจะมอบ §R5000§! £energy£ §H$energy$§! ให้แก่ผู้ทวงหนี้เมื่อพวกเขากลับมา"
 origin.4016.c:1 "§R2500§! $r_consumer_goods$ ทุกๆ 15 ปี"
 origin.4016.c.tooltip:1 "สัญญาว่าจะมอบ §R2500§! $r_consumer_goods$ ให้แก่ผู้ทวงหนี้เมื่อพวกเขากลับมา"
 origin.4016.d:0 "มีสิ่งอื่นใดที่เราสามารถเสนอให้ได้อีกไหม?"
 origin.4016.e:1 "§R1250§! £alloys£ §H$alloys$§! ทุกๆ 15 ปี"
 origin.4016.e.tooltip:1 "สัญญาว่าจะมอบ §R1250§! £alloys£ §H$alloys$§! ให้แก่ผู้ทวงหนี้เมื่อพวกเขากลับมา"

 # Agreed to pay
 origin.4017.desc:1 "ยอดเยี่ยมมาก! เรายินดีที่เราสามารถบรรลุข้อตกลงร่วมกันได้อย่างรวดเร็ว เราจะกลับมาอีกครั้งใน §Y15 ปี§! เพื่อจัดเก็บงวดแรกและตรวจสอบว่าคุณพึงพอใจกับข้อตกลงหรือไม่\n\nขอให้มีวันที่ดีนะ!"
 origin.4017.a.tooltip:0 "ผู้ทวงหนี้จะกลับมาใน §Y[root.payback_debt_collectors_timer]§!"

 # Pay with something else
 origin.4018.desc:0 "หากคุณไม่สามารถหรือไม่เต็มใจที่จะจ่ายค่าพลังงาน คุณอาจชำระหนี้ด้วยการมอบสัดส่วนประชากรแรงงานจำนวนหนึ่งให้แก่ §H$NAME_MSI_country$§! คนงานของคุณจะถูกส่งไปยังสถานที่ทำงานที่กำหนดและจะได้รับการจัดหาที่พักอาศัยขั้นพื้นฐานให้จนกว่าพวกเขาจะชำระหนี้สำเร็จ\n\nเป็นเรื่องที่ควรทราบว่าคนงานดังกล่าวไม่จำเป็นต้องเป็นพลเมืองเต็มขั้น คนที่มีร่างกายแข็งแรงคนใดก็ได้ก็ใช้ได้เช่นกัน"
 origin.4018.a:0 "ความจริงแล้ว เราขอเลือกจ่ายด้วยพลังงานมากกว่า"
 origin.4018.b:0 "เราตกลงทำตามนั้น"
 origin.4018.b.tooltip:1 "สัญญาว่าจะมอบประชากร §R200§! £pop£ §Hประชากร§! ให้แก่ผู้ทวงหนี้เมื่อพวกเขากลับมา"
 origin.4018.c:0 "นี่พวกคุณกำลังขอทาสอย่างนั้นหรือ?"
 origin.4018.c.response:0 "เทอมที่ถูกต้องคือ\"ผู้รับใช้ของพระองค์\"คำที่ถูกต้องคือ "
 origin.4018.d:0 "เราปฏิเสธที่จะจ่าย"

 # Refuse to pay
 origin.4019.desc:0 "เราเสียใจจริงๆ ที่ไม่สามารถบรรลุข้อตกลงในเรื่องนี้ได้ มีโอกาสบ้างไหมที่คุณจะยอมพิจารณาใหม่อีกครั้ง? ตามเงื่อนไขในสัญญา หากผู้รับหนี้ไม่ยินยอมหรือไม่สามารถจ่ายเงินได้ เรามีความจำเป็นต้องเข้ายึดทรัพย์สินในนามของลูกค้าของเรา"
 origin.4019.a:0 "ก็เข้ามาเลย"
 origin.4019.a.tooltip:0 "ผู้ทวงหนี้จะโจมตีเรา"
 origin.4019.b:0 "ให้เราได้ทบทวนตัวเลือกต่างๆ ดูก่อน..."

 # Refuse to pay - won battle
 origin.4020.name:0 "ไม่ใช่วันนี้"
 origin.4020.desc:0 "กองยานผู้ทวงหนี้ถูกบังคับให้ต้องถอยทัพกลับไป พวกเขาจะกลับมาอีกอย่างไม่ต้องสงสัย แต่สำหรับตอนนี้ พวกเรายังคงปลอดภัย"
 origin.4020.desc.repeat:0 "อีกครั้งหนึ่งที่เราได้บังคับให้พวกทวงหนี้ถอยทัพไปจากระบบบ้านเกิดของเรา เป็นไปได้ยากว่านี่จะเป็นครั้งสุดท้ายที่เราได้พบพวกเขา แต่สำหรับตอนนี้ ประชาชนและทรัพย์สินของเราปลอดภัยดี"

 # Won battle too many times - MSI declares war on you
 origin.4021.name:0 "การยึดทรัพย์สิน"
 origin.4021.desc:0 "ความผิดหวังมันช่างถาโถม\n\nในฐานะบริษัทที่เชี่ยวชาญด้านการเปิดรับการรับรู้ของอารยธรรมที่พัฒนาน้อยกว่า เราภูมิใจในความเชี่ยวชาญของเราอย่างยิ่ง ทว่าสิ่งนี้ทำให้เห็นได้ชัดเจนแจ่มแจ้งแล้วว่าพวกเราล้มเหลวในการประสิทธิ์ประสาทบทเรียนพื้นฐานบางประการ แทนที่จะโจมตีผู้อื่นโดยไม่มีมูลเหตุ คุณต่างหากที่ต้องแบกรับความรับผิดชอบในความล้มเหลวของคุณเอง\n\nคุณเห็นได้ชัดว่าต้องการการชี้แนะเพิ่มเติม ให้เราสอนวิธีใช้หนี้แก่คุณเถอะ"
 origin.4021.a:0 "เราจะไม่ยอมก้มหัวให้พวกคุณอีกเด็ดขาด"

 # Refuse to pay - lost battle
 origin.4025.name:0 "กำลังยึดทรัพย์สิน"
 origin.4025.desc:1 "หลังจากกองยานของเราพ่ายแพ้ พวกทวงหนี้ได้บุกโจมตี [PLANET.GetName] และลักพาตัวผู้คนของเราไปจำนวนหนึ่ง สิ่งที่น่าเจ็บใจยิ่งกว่าความพ่ายแพ้คือ 'ใบเสร็จ' ที่พวกเขาทิ้งไว้เบื้องหลัง แจ้งให้เราทราบว่าประชากรที่ถูกยึดไปจะถูกบังคับให้ทำงานเพื่อชดใช้ 'หนี้' ของเรา พวกทวงหนี้กล่าวว่าเราควรจะรู้สึกขอบคุณที่คนของเราจะถูกส่งตัวกลับเมื่อชำระหนี้เสร็จสิ้น ซึ่งก็คงใช้เวลาเพียงประมาณ 29,637 ปีเท่านั้น"
 origin.4025.a:0 "คราวหน้าเราจะพร้อม"
 origin.4025.a.tooltip:0 "สูญเสียประชากร §R500§! £pop£ §Hประชากร§! ให้แก่ผู้ทวงหนี้\n\nผู้ทวงหนี้จะกลับมาใน §Y[root.owner.payback_debt_collectors_timer]§!"

 # Hub - subsequent encounters
 origin.4030.name:0 "ผู้ทวงหนี้"
 origin.4030.desc.base:0 "เรียน [owner.GetName],\n\nเรากำลังติดต่อคุณอีกครั้งในนามของ §Y$NAME_MSI_country$§! เกี่ยวกับหนี้ค้างชำระของคุณ"
 origin.4030.desc.energy:1 "$origin.4030.desc.base$\n\nตามข้อตกลงของเรา เรามาที่นี่เพื่อจัดเก็บจำนวนเท่ากับ §R5000§! £energy£ §H$energy$§! เพื่อชำระหนี้ของคุณ"
 origin.4030.desc.consumer_goods:0 "$origin.4030.desc.base$\n\nตามข้อตกลงของเรา เรามาที่นี่เพื่อจัดเก็บจำนวนเท่ากับ §R2500§! £consumer_goods£ §H$consumer_goods$§! เพื่อชำระหนี้ของคุณ"
 origin.4030.desc.alloys:0 "$origin.4030.desc.base$\n\nตามข้อตกลงของเรา เรามาที่นี่เพื่อจัดเก็บจำนวนเท่ากับ §R1250§! £alloys£ §H$alloys$§! เพื่อชำระหนี้ของคุณ"
 origin.4030.desc.pops:1 "$origin.4030.desc.base$\n\nตามข้อตกลงของเรา เรามาที่นี่เพื่อรับตัวประชากร §R200§! £pop£ §Hประชากร§! ที่ยินยอมอุทิศแรงงานของตนเพื่อการชำระหนี้ของคุณ"
 origin.4030.desc.defeated:0 "เรียน [owner.GetName],\n\nเราขอติดต่อคุณอีกครั้งในนามของ §H$NAME_MSI_country$§! เกี่ยวกับหนี้ค้างชำระ เราต้องการเพียงแก้ปัญหานี้อย่างสงบ และหวังว่าคุณจะมีความพร้อมมากขึ้นในการหารืออย่างสร้างสรรค์"
 origin.4030.desc.furious:0 "เรียน [owner.GetName],\n\nนี่คือคำเตือนครั้งสุดท้ายของเรา: หนี้ที่คุณค้างชำระต่อ §H$NAME_MSI_country$§! จำเป็นต้องชำระโดยด่วน แม้จะมีความพยายามหลายครั้งในการแก้ไขปัญหานี้อย่างสงบ แต่คุณกลับล้มเหลวในการร่วมมือมาโดยตลอด หากคุณปฏิเสธที่จะตกลงในแผนการชำระหนี้อีกครั้ง เราจะไม่มีทางเลือกอื่นนอกจากต้องเข้ายึดทรัพย์สินของคุณด้วยวิธีใดก็ตามที่จำเป็น"
 origin.4030.a:0 "เรายินดีที่จะตกลงยอมความ"
 origin.4030.b:1 "นี่คือยอดชำระที่คุณเรียกเก็บมา"
 origin.4030.c:0 "ดูแลคนของเราให้ดีด้วยล่ะ"
 origin.4030.c.tooltip:0 "สูญเสียประชากร §R200§! £pop£ §Hประชากร§!"
 origin.4030.d:0 "นี่คือ... คนงานบางส่วน"
 origin.4030.d.tooltip:0 "สูญเสียทาส §R200§! £pop£ §Hทาส§!"
 origin.4030.e:0 "เราไม่สามารถจ่ายได้"
 origin.4030.f:0 "เราจะไม่จ่าย"
 origin.4030.g:0 "ขอโทษนะ ขอถามอีกทีว่าคุณเป็นใคร?"
 origin.4030.h:0 "พวกเรารู้ว่าคุณเป็นใคร: เหยื่อ อย่างพวกเรานี่ไง"

 # Pay
 origin.4031.desc:2 "ขอบคุณสำหรับการตอบกลับที่รวดเร็วและความตั้งใจที่จะสะสางปัญหานี้อย่างเท่าเทียม! ขณะนี้ยอดหนี้คงเหลือเท่ากับ §Y[owner.debt_collectors_amount]§! £energy£ §H$energy$§! เราจะกลับมาอีกครั้งใน 15 ปีเพื่อจัดเก็บงวดถัดไป ขอให้มีวันที่ดีนะ!"
 origin.4031.a:0 "ยอดค้างชำระนั้นสูงกว่าที่คาดไว้"

 # You got scammed
 origin.4032.desc:1 "ตามที่ระบุไว้ในตัวหนังสือขนาดเล็ก มีการใช้อัตราดอกเบี้ยมาตรฐานร่วมด้วย หากคุณชำระเงินในอัตราปัจจุบันต่อไป คุณจะสามารถผ่อนชำระหนี้ทั้งหมดได้หมดสิ้นในเวลาอีก 29,637 ปีพอดี"
 origin.4032.a:0 "..."

 # Can't pay - energy
 origin.4036.desc.base:0 "เราเสียใจที่ทราบว่าคุณไม่สามารถจัดเก็บยอดตามที่ตกลงกันไว้ได้ทันเวลา เราได้ปรับปรุงแผนการชำระหนี้ของคุณแล้ว โดยลดจำนวนเงินที่ต้องชำระในงวดถัดลงไปครึ่งหนึ่ง\n\nแต่โชคร้ายที่การไม่สามารถชำระหนี้ของคุณส่งผลให้คุณละเมิดสัญญาของเรา ดังนั้น เราจะดำเนินการเข้ายึดกลุ่มประชากรของคุณส่วนหนึ่งแทนเงินทุน เราหวังว่าสิ่งนี้จะไม่ก่อให้เกิดความไม่สะดวกสบายมากนัก"
 origin.4036.desc.energy:0 "$origin.4036.desc.base$\n\nเมื่อพิจารณาจากสถานการณ์แล้ว เรามีความจำเป็นต้องแจ้งให้คุณทราบว่าลูกค้าของเราก็ยอมรับการชำระหนี้ในรูปแบบของการอุทิศเวลาทำงานเช่นกัน ประชากรบางส่วนของคุณจะถูกนำส่งตัวไปยังพื้นที่ทำงานที่กำหนดและจะได้รับการจัดหาที่พักอาศัยขั้นพื้นฐานให้จนกว่าพวกเขาจะชำระหนี้สำเร็จ\n\nเป็นเรื่องที่ควรทราบว่าคนงานเหล่านี้ไม่จำเป็นต้องเป็นพลเมืองเต็มขั้นของคุณ คนที่มีร่างกายแข็งแรงคนใดก็ได้ก็ใช้ได้เช่นกัน"
 origin.4036.desc.a:0 "เราจะไม่ยอมให้คุณเอาคนของเราไป"
 origin.4036.desc.a.tooltip:0 "ผู้ทวงหนี้จะโจมตีเรา"

 # Won't pay
 origin.4037.desc.base:0 "เราขอร้องให้คุณไตร่ตรองการตัดสินใจของคุณใหม่อีกครั้ง การปฏิเสธการจ่ายเงินของคุณจะทิ้งประวัติเสียถาวรไว้บนคะแนนเครดิตของคุณ การผิดนัดชำระหนี้จะจำกัดโอกาสทางการเงินของคุณในอนาคต ยังไม่รวมถึงภาพลักษณ์ของสังคมของคุณเองด้วย นี่คือสิ่งที่สังคมของคุณต้องการให้โลกจดจำอย่างนั้นหรือ? ด้วยการถ่มน้ำลายรดผู้ที่ก้มลงคุกเข่าเพื่อยกคุณขึ้นมา?"
 origin.4037.desc.defeated:0 "เราพบว่าการปฏิเสธที่จะชำระหนี้ของคุณเป็นเรื่องที่น่ากังวลอย่างยิ่ง ลูกค้าของเรา §H$NAME_MSI_country$§! ไม่เคยยื่นเสนอสิ่งใดนอกจากความช่วยเหลือและการสนับสนุน และขอเพียงค่าตอบแทนที่เป็นธรรมเป็นการแลกเปลี่ยน นี่คือสิ่งที่คุณเรียนรู้งั้นรึ? ตอบแทนความมีน้ำใจด้วยการหักหลังหรอกลวง?"

 # They leave
 origin.4040.name:0 "เป็นหนี้ตลอดกาล"
 origin.4040.desc:0 "พวกทวงหนี้ได้เคลื่อนทัพจากไปจากระบบบ้านเกิดของเราแล้ว แต่ความรู้สึกหวาดกลัวอย่างสุดซึ้งยังคงหลงเหลืออยู่ ด้วยความซื่อสัตย์อุทิศตนต่อนายจ้างของพวกเขา พวกเขาจะไม่มีวันหยุดระรานเราอย่างแน่นอน แม้ว่าเราจะหาทางจ่ายเงินเต็มจำนวนได้สำเร็จ แต่พวกเขาก็จะสรรหาข้ออ้างอื่นมาจนได้ ไม่ว่าจะเป็นอัตราดอกเบี้ย ช่องโหว่ทางกฎหมาย หรือตัวอักษรขนาดเล็กที่ซ่อนอยู่ในเอกสารที่เราจำไม่ได้ว่าเคยเซ็น\n\nหากเราไม่สามารถซื้อเสรีภาพกลับคืนมาได้ เราก็ไม่มีทางเลือกอื่นนอกจากต้องสู้เพื่อมัน คำถามเดียวที่เหลือคือจะสู้ด้วยวิธีใด"
 origin.4040.a:0 "ด้วยอาวุธ"
 origin.4040.a.tooltip:0 "เราจะได้รับชัยชนะเหนือ $NAME_MSI_country_initials$ ผ่านการทำสงคราม"
 origin.4040.b:0 "ด้วยคำพูด"
 origin.4040.b.tooltip:0 "เราจะได้รับชัยชนะเหนือ $NAME_MSI_country_initials$ ผ่านการทูต"

 # Fight with weapons
 origin.4041.name:0 "ทำให้พวกเขาต้องชดใช้"
 origin.4041.desc:0 "เราเคยปราบพวกเขามาแล้วครั้งหนึ่ง และเราทำได้อีกครั้งอย่างแน่นอน แต่มันจะไม่ง่าย เพราะในครั้งแรกนั้นพวกเขาไม่ได้คาดคิดว่าเราจะสู้กลับ ตอนนี้ พวกเขาจะโจมตีเราด้วยแสนยานุภาพเต็มพิกัดของกองยานของพวกเขา เพื่อที่จะมีโอกาสชนะ เราต้องอดทนรอเวลาและเตรียมพร้อมตัวเรา นี่คือศึกครั้งใหญ่ที่เราจะแพ้ไม่ได้เป็นอันขาด"
 origin.4041.a:0 "ทำให้พวกเขาต้องชดใช้"
 origin.4041.a.tooltip:0 "ขณะนี้เราสามารถใช้สาเหตุแห่งสงคราม §Hคืนค่า§! เพื่อประกาศสงครามกับ $NAME_MSI_country_initials$ ได้แล้ว"

 # Fight with words
 origin.4042.name:0 "ทำให้พวกเขาต้องชดใช้"
 origin.4042.desc.galcom:0 "สิ่งที่ $NAME_MSI_country$ ทำกับเราอาจชอบด้วยกฎหมาย แต่ก็ห่างไกลจากความมีศีลธรรมอย่างสิ้นเชิง เพื่อป้องกันไม่ให้เกิดเหตุการณ์นี้ขึ้นอีก เราต้องการกฎหมายที่เข้มงวดเพื่อทำให้พวกเขาต้องรับผิดชอบ ผ่านการทูตที่รอบคอบ เราสามารถพยายามบ่อนทำลายหลักการที่ยึดโยงจักรวรรดิของพวกเขาเข้าไว้ด้วยกัน ซึ่งก็คือความโลภ การแสวงหาผลประโยชน์ และการค้าทาส หากโชคดี เราอาจทำลาย $NAME_MSI_country_initials$ ได้โดยไม่ต้องยิงกระสุนปืนสักนัด"
 origin.4042.desc.nogalcom:0 "$origin.4042.desc.galcom$\n\nหากเพียงมีองค์กรปกครองส่วนรวมบางอย่างที่เราสามารถเข้าร่วมเพื่อหารือเรื่องนี้กับจักรวรรดิที่มีแนวคิดคล้ายคลึงกันได้..."
 origin.4042.desc.nogalcommember:0 "$origin.4042.desc.galcom$\n\nถึงเวลาแล้วที่เราจะเข้าร่วมกับชุมชนกาแลกติก"
 origin.4042.a.galcom:0 "ชุมชนกาแลกติกจะเป็นสนามรบของเรา"
 origin.4042.a.nogalcom:0 "ชุมชนกาแลกติก..."

 # Joined the galcom
 origin.4050.name:0 "สงครามไร้อาวุธ"
 origin.4050.desc:0 "นี่คือสนามรบใหม่ของเรา: สภาวุฒิสภา เขตสงครามที่แก้ไขความขัดแย้งผ่านการลงคะแนนและการโต้วาที\n\nนี่คืออาวุธของเรา: ความชอบพอ, เอกอัครราชทูต, ความเข้มแข็งของเศรษฐกิจและความบริสุทธิ์ของวิสัยทัศน์ของเรา\n\nนี่คือเป้าหมายของเรา: การห้ามแนวปฏิบัติการเปิดรับการรับรู้ เพื่อป้องกันไม่ให้จักรวรรดิอย่าง $NAME_MSI_country_initials$ แสวงหาผลประโยชน์จากอารยธรรมที่อ่อนแอกว่า\n\nนี่คือที่ที่เราจะชนะ ไม่ใช่ด้วยความรุนแรง แต่เป็นผ่านอำนาจอันไม่เสื่อมคลายของกฎหมาย"
 origin.4050.a:0 "หยุดการแทรกแซงโดยตรง"
 origin.4050.a.tooltip:0 "เราจะมุ่งเน้นความพยายามของเราในการผ่านร่างมติ §H$resolution_pre_ftl_stances_equal_standing$§! เพื่อป้องกันไม่ให้จักรวรรดิต่างๆ เข้ามาแสวงหาประโยชน์จากอารยธรรมก่อนยุคความเร็วนอกจากนี้เรายังจำเป็นต้องสนับสนุนมาตรการ §Hคว่ำบาตรทั้ง 4 ประเภท§! เพื่อบังคับใช้กฎหมาย"
 origin.4050.b:0 "หยุดการแทรกแซงทั้งหมด"
 origin.4050.b.tooltip:0 "เราจะมุ่งเน้นความพยายามของเราในการผ่านร่างมติ §H$resolution_pre_ftl_stances_non_interference$§! เพื่อป้องกันไม่ให้จักรวรรดิต่างๆ เข้ามามีอิทธิพลต่อการพัฒนาสังคมก่อนยุคความเร็วในทุกๆ ด้าน นอกจากนี้เรายังจำเป็นต้องผ่านร่างมาตรการ §Hคว่ำบาตรทั้ง 4 ประเภท§! เพื่อบังคับใช้กฎหมาย"

 # Passed first resolution
 origin.4052.name:0 "ชัยชนะเล็กๆ"
 origin.4052.desc:0 "มติแรกในรายการของเราผ่านเรียบร้อยแล้ว แผนการของเราที่จะกีดกัน $NAME_MSI_country$ กำลังดำเนินไปอย่างเต็มรูปแบบ"

 # Passed all resolutions
 origin.4055.name:0 "การลงทัณฑ์อันยุติธรรม"
 origin.4055.intro:0 "ผ่านการทำงานอย่างหนักและความเด็ดเดี่ยว เราได้ครอบครองสภาวุฒิสภา คุมเข้มแนวทางปฏิบัติการเปิดรับการรับรู้ และบังคับใช้มาตรการคว่ำบาตรที่รุนแรงต่อจักรวรรดิเหล่านั้นที่ละเมิดข้อบังคับ"
 origin.4055.desc.msi:0 "$origin.4055.intro$ ทาง $NAME_MSI_country_initials$ จะต้องปรับความคิดเกี่ยวกับกลยุทธ์ทางธุรกิจของพวกเขาใหม่ทั้งหมดเพื่อความอยู่รอด - และข่าวลือเรื่องความไม่มั่นคงภายในจักรวรรดิของพวกเขาก็เริ่มแพร่กระจายออกไปแล้ว"
 origin.4055.desc.nomsi:0 "$origin.4055.intro$ ทาง $NAME_MSI_country_initials$ ได้ล่มสลายหายไปแล้ว - และด้วยผลงานของเรา จะไม่มีจักรวรรดิอื่นใดมาแทนที่พวกเขาได้อีกต่อไป"

 # Passed all resolutions - follow-up
 origin.4056.name:0 "จดหมายข่าวองค์กร"
 origin.4056.desc:0 "ข้อความสำคัญถึงอดีตลูกค้าของเราทุกคน:\n\nตั้งแต่วันแรกที่บริษัทนี้เดินทางไปยังดวงดาว เราได้ทุ่มเทแรงกายแรงใจเพื่อความก้าวหน้าของอารยธรรมอื่นๆ ทำงานอย่างขยันขันแข็งเพื่อช่วยให้พวกเขาก้าวไปสู่ศักยภาพสูงสุด หลังจากผ่านไปหลายปีด้วยความสำเร็จ คณะกรรมการบริษัทได้ตัดสินใจปรับปรุงกระบวนการของเราให้มีประสิทธิภาพยิ่งขึ้น เพื่อให้สะท้อนถึงค่านิยมของบริษัทได้ดียิ่งขึ้น\n\nดังนั้น เราจึงได้ระงับกิจกรรมการเปิดรับการรับรู้ชั่วคราวเพื่อมุ่งเน้นไปที่การสร้างแบรนด์ใหม่ให้ดีขึ้น\n\nในขณะที่เราเริ่มต้นบทใหม่อันอาจหาญที่ $NAME_MSI_country$ เราขอขอบคุณสำหรับการสนับสนุนอย่างต่อเนื่องของคุณ!"
 origin.4056.a:0 "นี่เป็นสิ่งที่สมควรใส่กรอบเอาไว้"

 # MSI defeated by us - by fighting
 origin.4060.name:0 "หนี้สินถูกลบล้าง"
 origin.4060.intro:0 "ก่อนที่เราจะไปถึงดวงดาวเสียด้วยซ้ำ เรารู้ดีว่าเราไม่ได้อยู่อย่างโดดเดี่ยว เป็นเวลาหลายศตวรรษที่ $NAME_MSI_country$ ได้อยู่เหนือเรา - เริ่มแรกจากเป็นพี่เลี้ยง ต่อมาก็เป็นผู้กดขี่ และตอนนี้ในที่สุดก็กลายเป็นทรราชผู้ล่มสลาย"
 origin.4060.desc:0 "$origin.4060.intro$\n\nเราควรจะเฉลิมฉลอง และบางที หลังจากนั้นเราควรจะวางอาวุธและพักผ่อนในที่สุด"
 origin.4060.a:0 "พวกเราพึงพอใจแล้ว"
 origin.4060.b:0 "เป้าหมายของเรายังคงคุ้มค่าที่จะต่อสู้ต่อไป"
 origin.4060.b.tooltip:1 "ขณะนี้เราสามารถใช้สาเหตุแห่งสงคราม §H$casus_belli_cb_payback_punishment$§! เพื่อทำสงครามกับผู้ที่แสวงหาประโยชน์จากอารยธรรมก่อนยุคความเร็วได้แล้ว"

 # MSI defeated by someone else - fires after action.62
 origin.4070.name:0 "ยกหนี้ให้"
 origin.4070.desc:1 "$origin.4060.intro$ ตอนนี้ $NAME_MSI_country_initials$ ล่มสลายไปแล้ว ถูกบดขยี้โดย [root.species.GetHandName] อื่น\n\nท้องฟ้าของเราอาจจะแจ่มใส แต่ผู้คนของเรายังคงถูกครอบงำด้วยความต้องการที่ไม่อาจเติมเต็มได้:\n\n§Rการแก้แค้น§!"
 origin.4070.a:0 "ปล่อยมันไปเถอะ"
 origin.4070.b:0 "เป้าหมายของเรายังคงคุ้มค่าที่จะต่อสู้ต่อไป"
 origin.4070.b.tooltip:0 "เราจะต่อสู้ต่อไปเพื่อห้ามการแสวงหาผลประโยชน์จากอารยธรรมก่อนยุคความเร็ว"
 origin.4070.c:0 "พวกมันแย่งชิงการล้างแค้นของเราไป พวกมันต้องชดใช้"
 origin.4070.d.tooltip:1 "ขณะนี้เราสามารถใช้สาเหตุแห่งสงคราม §Hคืนค่า§! เพื่อประกาศสงครามกับ §Y[destroyer_country.GetName]§! ได้แล้ว"

 # Defeated the people who defeated the MSI
 origin.4071.name:0 "ปลดหนี้สิน"
 origin.4071.desc:0 "อะไรจะตามมาหลังการแก้แค้น? จะทำอย่างไรหลังจากได้เห็นการล่มสลายของศัตรูคู่อาฆาตของคุณ และจักรวรรดิที่เป็นผู้ปลิดชีพศัตรูคู่อาฆาตของคุณ? ตอนนี้เราสามารถวางอาวุธลงได้หรือยัง? เราจะมีความสงบสุขได้หรือไม่?"
 origin.4071.a:0 "จะไม่มีความสงบสุขใดๆ จนกว่าผู้แสวงหาผลประโยชน์ทั้งหมดจะหมดสิ้นไป"

 ### Broken Shackles Interactions

 ## Recognizing each other
 origin.4110.name:0 "อดีตร่วมกัน"
 origin.4110.desc:0 "เมื่อเราติดต่อกับ §Y[bsempire.GetName]§! เป็นครั้งแรก เรารู้สึกประหลาดใจกับความรวดเร็วที่พวกเขาแปลภาษาของเรา ตอนนี้เราเข้าใจแล้วว่าทำไม\n\nเมื่ออดีตนายเหนือหัวพยายามทำให้เรายอมสยบ พวกเขาได้ลักพาตัวคนของเราไป ผู้เคราะห์ร้ายบางส่วนเหล่านั้นลงเอยที่เรือของ $NAME_MSI_country_initials$ และด้วยเกียรติประวัติอันยาวนานร่วมกับ 'สินทรัพย์ตามข้อผูกมัด' อื่นๆ บนเรือ พวกเขาได้ก่อกบฏและนำยานพุ่งชนดาวเคราะห์ที่ไม่มีผู้คนอาศัยอยู่ การกระทำอันกล้าหาญของการกบฏครั้งนี้ส่งผลให้เกิดการกำเนิดของ §Y[bsempire.GetName]§! ในที่สุด\n\nพวกเรามีศัตรูร่วมกันและมีประวัติศาสตร์ร่วมกัน และบางที เราอาจร่วมกันสร้างอนาคตที่เป็นอิสระจากการกดขี่ได้"
 origin.4110.a.phile:0 "พันธมิตรที่มีค่า"
 origin.4110.a.phobe:0 "บางทีพวกเซโนเหล่านี้อาจจะไม่ได้แตกต่างจากพวกเราทั้งหมดทีเดียว"

 ## Sharing Espionage Intel | Payback and Broken Shackles diplo event
 origin.4120.name:0 "แบ่งปันข้อมูลข่าวกรอง"
 origin.4120.desc:1 "จักรวรรดิของเรามีศัตรูร่วมกัน: §Y$NAME_MSI_country$§! เพื่อปกป้องตัวเราจากภัยคุกคามนี้ เราขอแนะนำให้ส่งสิทธิ์เข้าถึงข้อมูลข่าวกรองลับของเราให้แก่สายลับของพวกเขา"
 origin.4120.a:0 "ข้อเสนอที่มีค่า"
 origin.4120.b:0 "ศัตรูร่วมกันไม่ได้ทำให้เรากลายเป็นมิตรกัน"

 ## Help on the senate floor | Payback and Broken Shackles diplo event
 origin.4130.name:0 "การสนับสนุนซึ่งกันและกัน"
 origin.4130.desc:0 "เราเห็นผู้แทนของคุณบนสภาวุฒิสภาแล้ว [root.GetName] เราสองฝ่ายสามารถร่วมกันต่อสู้เพื่อประเด็นที่มีผลกระทบกับเราทั้งคู่ได้ ด้วยการปรับผลประโยชน์ของเราให้ตรงกัน เราสามารถร่วมมือกันต่อต้านการค้าทาสและยุติแนวทางปฏิบัติการแทรกแซงจักรวรรดิยุคก่อนความเร็วได้"
 origin.4130.a:0 "เราจะสนับสนุนคุณเสมอ"
 origin.4130.b:0 "ผลประโยชน์ของเราอาจไม่ตรงกันเสมอไป"

 ## Help during the war | Payback diplo event
 origin.4140.name:0 "ไม่ยอมจำนน"
 origin.4140.desc:0 "เราได้ยินมาเกี่ยวกับแผนการทำสงครามกับ $NAME_MSI_country$ แม้ว่าคนของเราจะมีประวัติศาสตร์ร่วมกัน แต่เราไม่ได้ร่วมกระหายในการล้างแค้นแบบเดียวกับคุณ อย่างไรก็ตาม หากคุณประกาศสงครามกับ $NAME_MSI_country_initials$ เราจะเข้าร่วมในการต่อสู้ของคุณ"
 origin.4140.a:0 "ให้มันเป็นไปเช่นนั้น"

 ### MSI interactions

 ## Leviathan slain
 origin.4150.desc:0 "ที่ $NAME_MSI_country_initials$ เรามองว่าลูกค้าของเราเปรียบเสมือนครอบครัว วันนี้เราอดยิ้มด้วยความภาคภูมิใจไม่ได้ การสังหารผู้พิทักษ์(ยาม)!ถือเป็นก้าวสำคัญสำหรับสังคมที่เพิ่งเริ่มท่องอวกาศ เพื่อเป็นเครื่องหมายแสดงความยกย่องต่อความสำเร็จของคุณ โปรดรับของขวัญแสดงความยินดีเล็กๆ น้อยๆ ชิ้นนี้จากเรา"
 origin.4150.a:0 "ขอบคุณ"
 origin.4150.b:0 "เก็บของขวัญของคุณไว้เถอะ"

 ## Uplifted someone
 origin.4160.desc:0 "หลายปีที่แล้ว เราได้มอบบันไดสู่ท้องฟ้าให้กับคุณ วันนี้ เราได้เห็นคุณมอบความช่วยเหลือแบบเดียวกันนั้นให้กับอารยธรรมที่ด้อยกว่า\n\nเราเชื่อมั่นว่าคุณจะสามารถส่งต่อบทเรียนของเราให้แก่พวกเขาได้ แน่นอนว่าหากคุณต้องการความช่วยเหลือในการร่างกลยุทธ์การเปิดรับการรับรู้ที่ทำกำไรได้ คุณเพียงแค่ต้องเอ่ยปากขอ"
 origin.4160.a:0 "เราสามารถใช้ความช่วยเหลือของคุณได้"
 origin.4160.b:0 "พวกเราไม่เหมือนพวกคุณ"

 ## You're in a deficit
 origin.4170.desc:0 "เรียน อดีตลูกค้าทั้งหลาย,\n\nเราได้ยินเกี่ยวกับปัญหาทางเศรษฐกิจล่าสุดของคุณแล้ว การเรียนรู้ที่จะจัดการการเงินของคุณเป็นส่วนสำคัญในการบริหารจักรวรรดิ และบางครั้ง ความล้มเหลวก็เป็นส่วนสำคัญของการเรียนรู้\n\nเรายินดีที่จะเสนอทรัพยากรที่จำเป็นเพื่อช่วยให้ประเทศของคุณหลุดพ้นจากการขาดดุล แน่นอนว่าทรัพยากรที่ให้กู้ยืมจะถูกรวมเข้ากับหนี้ค้างชำระของคุณ เราหวังว่าบทเรียนทางการเงินเล็กๆ น้อยๆ นี้จะเป็นประโยชน์"
 origin.4170.a:0 "เรายอมรับข้อตกลงการกู้ยืม"
 origin.4170.b:0 "เราจัดการมันได้ด้วยตัวเอง"

