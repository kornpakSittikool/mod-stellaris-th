 first_contact.1120.name: "คำเชิญ"
 first_contact.1120.desc: "§H[This.ContactCountry.GetName]§! ได้ประจำการยานลำหนึ่งไว้ที่ชายแดนของเรา พร้อมส่งสัญญาณซ้ำๆ\n\nมันเป็นเรื่องท้าทายในการแปลข้อความของพวกเขา ทว่า [This.Owner.GetLinguists] ของเราเชื่อว่าพวกเขากำลังเชิญตัวแทนของเราคนหนึ่งไปร่วมงานแลกเปลี่ยนวัฒนธรรมเป็นเวลาหลายวันบนยานของพวกเขา"
 first_contact.1120.a.proactive: "ช่างเป็นการแสดงออกที่น่าไว้วางใจเหลือเกิน"
 first_contact.1120.a.cautious: "ตกลง แต่ฟังดูเหมือนกับดักเลย"
 first_contact.1120.a.tooltip: "เราจะส่งผู้แทนของเราไปร่วมงาน"
 first_contact.1120.b: "ไม่มีทางเด็ดขาด"
 first_contact.1120.b.tooltip: "เราจะปฏิเสธคำเชิญนี้"
 first_contact.1125.name: "การเตรียมพร้อม"
 first_contact.1125.desc: "จากการคาดเดาเล็กน้อย [This.Owner.GetEnvoy] [This.Leader.GetName] และ [This.Owner.GetLinguists] ของเราได้ตอบรับคำเชิญแลกเปลี่ยนวัฒนธรรมต่างดาวแล้ว เราตีความการตอบกลับอย่างกระตือรือร้นจาก §H[This.ContactCountry.GetName]§! ไปในทางบวก ไม่นานหลังจากนั้น พวกเขาได้ส่งอักษรภาพแสดงการนับถอยหลังสู่งานเลี้ยง\n\n[This.Owner.GetEnvoyCap] [This.Leader.GetName] กำลังใช้เวลาที่เหลือเพื่อเตรียมตัวและศึกษาตัวอย่างภาษาที่เราได้รับเพิ่มเติม"
 first_contact.1125.a: "นี่เป็นโอกาสในการเรียนรู้ที่ไม่เหมือนใคร"
 first_contact.1125.a.tooltip: "เราจะเตรียมตัวสำหรับคำเชิญนี้"
 first_contact.1125.b: "นี่เป็นโอกาสที่สมบูรณ์แบบในการแอบเก็บรวบรวมข้อมูลข่าวกรองอย่างลับๆ"
 first_contact.1125.b.tooltip: "เราเห็นด้วย แต่จะติดตั้งเทคโนโลยีจารกรรมให้กับผู้แทนของเรา"
 first_contact.1130.name: "ก่อนเริ่มงาน"
 first_contact.1130.desc: "การนับถอยหลังสู่กิจกรรมแลกเปลี่ยนวัฒนธรรมของ §H[This.ContactCountry.GetName]§! ใกล้จะสิ้นสุดลงแล้ว [This.Owner.GetEnvoyCap] [This.Leader.GetName] กำลังจะขึ้นกระสวยไปยังยานผู้แทนต่างดาว การติดต่อสื่อสารกับ [This.Owner.GetEnvoy] ของเราจะหยุดชั่วคราวตลอดช่วงเวลาของงานเลี้ยงเพื่อเป็นการแสดงความเคารพ"
 first_contact.1130.a: "เราควรโอบรับวัฒนธรรมของพวกเขาให้ดีที่สุดเท่าที่จะทำได้"
 first_contact.1130.a.tooltip: "ผู้แทนของเราจะพยายามปรับตัวเข้ากับวัฒนธรรมของพวกเขา"
 first_contact.1130.b: "สุภาพอ่อนโยนแต่มีความเป็นมืออาชีพ"
 first_contact.1130.b.tooltip: "ผู้แทนของเราจะวางตัวอย่างมืออาชีพ"
 first_contact.1130.c: "เริ่มปฏิบัติการ"
 first_contact.1130.c.tooltip: "ผู้แทนของเราจะเรียนรู้ข้อมูลให้ได้มากที่สุด"
 first_contact.1135.name: "โอกาสครั้งที่สอง"
 first_contact.1135.desc: "การที่เราไม่มีความสนใจในคำเชิญของพวกเขาทำให้ §H[This.ContactCountry.GetName]§! รู้สึกไม่พอใจ ท่าทีของพวกเขาเปลี่ยนไปอย่างมาก [This.Owner.GetLinguists] ของเราได้แปลภาษาที่เป็นปฏิปักษ์ในข้อความสื่อสารติดตามผลของพวกเขา\n\nดูเหมือนว่าพวกเขาจะไม่ต้องการรับฟังคำปฏิเสธ"
 first_contact.1135.a: "ตกลง เราจะเข้าร่วม"
 first_contact.1135.a.tooltip: "อย่างไรเสียเราก็จะเข้าร่วม เพื่อให้ความสัมพันธ์ทางการทูตเป็นไปอย่างราบรื่น"
 first_contact.1135.b: "คำตอบยังคงเป็นปฏิเสธ"
 first_contact.1135.b.tooltip: "เราจะไม่ยอมรับคำเชิญโดยเด็ดขาด"
 first_contact.1140.name: "ความผิดพลาดของการจารกรรม"
 first_contact.1140.desc: "กิจกรรมของ §H[This.ContactCountry.GetName]§! ยาวนานกว่าที่คาดไว้มาก\n\nเมื่อกระสวยของ [This.Owner.GetEnvoy] [This.Leader.GetName] เดินทางกลับมา พวกเขาแจ้งว่าปฏิบัติการล้มเหลว\n\nในระหว่างงาน เจ้าภาพได้พบอุปกรณ์จารกรรม [This.Owner.GetEnvoyCap] [This.Leader.GetName] ถูกสอบปากคำ ตักเตือน และถูกขอให้ออกไป จากข้อมูลของเทคโนโลยีจารกรรมสำรอง ตอนนี้เราเข้าใจภาษาและเทคโนโลยีของพวกเขาแล้ว แม้ว่าอนาคตทางการทูตของเราจะต้องเริ่มต้นอย่างกระท่อนกระแท่นก็ตาม"
 first_contact.1140.A: "ช่างน่าเสียดาย"
 first_contact.1145.name: "สแกนเสร็จสิ้น"
 first_contact.1145.desc: "กิจกรรมของ §H[This.ContactCountry.GetName]§! ยาวนานกว่าที่คาดไว้มาก\n\nเมื่อกระสวยของ [This.Owner.GetEnvoy] [This.Leader.GetName] เดินทางกลับมา พวกเขาแจ้งว่าปฏิบัติการประสบความสำเร็จ ไม่เพียงแต่พวกเขาสามารถถอดรหัสภาษาส่วนใหญ่ของต่างดาวได้สำเร็จเท่านั้น แต่การสแกนของเรายังช่วยให้เราเห็นภาพความสามารถทางเทคโนโลยีของพวกเขาได้อย่างชัดเจนอีกด้วย\n\nสิ่งนี้จะช่วยส่งเสริมความสัมพันธ์ในอนาคตกับ §H[This.ContactCountry.GetName]§! ได้เป็นอย่างดี โดยที่พวกเขาไม่รู้ว่าเราเข้าใจความรู้ทางวิทยาศาสตร์ของพวกเขา"
 first_contact.1150.name: "ดาวเด่นของงาน"
 first_contact.1150.desc: "การเข้าร่วมงานกิจกรรมหลายวันนี้ด้วยใจที่เปิดกว้าง [This.Owner.GetEnvoy] [This.Leader.GetName] ได้เข้าร่วมการแสดงดนตรี ละคร และการเต้นรำ รวมถึงการลิ้มลองขนบธรรมเนียมการทำอาหารต่างๆ ความเปิดรับประสบการณ์ใหม่ของพวกเขาได้รับการตอบรับอย่างกระตือรือร้นจาก §H[This.ContactCountry.GetName]§!\n\n[This.Owner.GetEnvoyCap] [This.Leader.GetName] เดินทางกลับมาพร้อมกับความเข้าใจภาษาของพวกเขาอย่างใกล้ชิดและซาบซึ้งในวัฒนธรรมของพวกเขาอย่างลึกซึ้ง ประสบการณ์ของพวกเขาจะปูทางไปสู่การมีปฏิสัมพันธ์ทางการทูตในเชิงบวกมากขึ้นกับ §H[This.ContactCountry.GetName]§!"
 first_contact.1150.a: "คำเชิญอันแสนเอื้ออารีจากเพื่อนใหม่"
 first_contact.1155.name: "โยนผ้าขาว"
 first_contact.1155.desc: "[This.Owner.GetEnvoyCap] [This.Leader.GetName] ใช้เวลาช่วงงานกิจกรรมหลายวันนี้ไปกับการเฝ้าดูการแสดงศิลปะและชิมขนบธรรมเนียมการทำอาหารอย่างสงวนตัว ความไม่กระตือรือร้นดังกล่าวสร้างความหงุดหงิดให้กับ §H[This.ContactCountry.GetName]§! จากการทำความเข้าใจภาษาของพวกเขา ผู้แทนของเราถูกมองว่าเป็นคนน่าเบื่อ\n\nหลังจากถูกคุ้มกันกลับไปยังกระสวยอวกาศและได้รับสัญญาณให้จากไป ผู้แทนของเราเดินทางกลับมาพร้อมความสามารถในภาษาของพวกเขาและความเข้าใจวัฒนธรรมในระดับผิวเผิน ซึ่งเป็นสิ่งที่เราสามารถนำไปต่อยอดได้สำหรับการมีปฏิสัมพันธ์ทางการทูตในอนาคต"
 first_contact.1155.a: "ผู้แทนพยายามแล้ว"
 first_contact.1160.name: "กระหายการเชื่อมสัมพันธ์"
 first_contact.1160.desc: "ความผิดหวังของ §H[This.ContactCountry.GetName]§! ต่อความแตกต่างระหว่างความต้องการทางโภชนาการของเรานั้น ปรากฏชัดเจนที่สุดตลอดช่วงงานกิจกรรมหลายวันนี้ โชคดีที่ [This.Owner.GetEnvoy] [This.Leader.GetName] ได้พยายามอย่างเต็มที่เพื่อมีส่วนร่วมในกิจกรรมความบันเทิงอย่างกระตือรือร้น และได้สร้างความเคารพซึ่งกันและกันขึ้นมา\n\n[This.Owner.GetEnvoyCap] [This.Leader.GetName] เดินทางกลับมาพร้อมกับความเข้าใจที่ดีพอสมควรเกี่ยวกับภาษาและวัฒนธรรมของ §H[This.ContactCountry.GetName]§! ต้องยกความดีความชอบให้พวกเรา พวกเขาดูเหมือนจะรับมือกับความผิดพลาดด้านอาหารนี้ได้ดี และได้มอบคู่มือมารยาทจำนวนหนึ่งให้กับเรา แม้จะน่าเบื่อ แต่ความรู้นี้ก็น่าจะช่วยให้ปฏิสัมพันธ์ทางการทูตในอนาคตราบรื่นขึ้น"
 first_contact.1160.a: "ความเข้าใจคือศิลาฤกษ์ของการทูต"
 first_contact.1165.name: "ปฏิเสธคือปฏิเสธ"
 first_contact.1165.desc: "การปฏิเสธคำเชิญขึ้นยานของพวกเขาเป็นครั้งที่สองจาก §H[This.ContactCountry.GetName]§! ได้รับการตอบสนองด้วยอารมณ์ที่รุนแรง เราได้รับข้อความสื่อสารจากลูกเรือต่างดาวหลายคนเป็นเวลาหลายชั่วโมง ซึ่ง [This.Owner.GetLinguists] ของเราเชื่อว่าเป็นการพยายามสร้างความรู้สึกผิดให้กับเราที่ไม่ได้เข้าร่วม\n\nการสื่อสารเหล่านี้ ควบคู่ไปกับสัญญาณที่ดักจับได้จากยานของพวกเขา ช่วยให้เราสามารถถอดรหัสภาษาของพวกเขาได้มากพอที่จะมีความเข้าใจในการทำงาน ตอนนี้เราสามารถเริ่มการติดต่อทางการทูตที่เหมาะสมยิ่งขึ้นได้แล้ว แม้ว่าพวกเขาจะมองเหตุการณ์เริ่มต้นนี้ในแง่ลบก็ตาม"
 first_contact.1165.a: "มนุษย์ต่างดาวเหล่านี้ตื๊อจริงๆ"

