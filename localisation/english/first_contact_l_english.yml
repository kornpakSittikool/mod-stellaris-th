 first_contact.1120.desc.nomadic: "เดอะ§H[This.ContactCountry.GetName]§!ลากไปตามกองเรือ ส่งสัญญานซ้ํา\n\nมันเป็นเรื่องยากที่จะแปลข้อความของพวกเขา แต่ของเรา[This.Owner.GetLinguists]เชื่อว่าพวกเขากําลังเชิญหนึ่งในตัวแทนของเรา ไปยังเหตุการณ์แลกเปลี่ยนวัฒนธรรมหลายวันบนเรือของพวกเขา"
