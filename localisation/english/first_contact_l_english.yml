 PAYBACK_KESSLER_EFFECT:0 "โครงการทำความสะอาดเศษซากในวงโคจร"
 PAYBACK_KESSLER_EFFECT_DESC:0 "$origin.4900.desc$"


 # 50% progress
 origin.4930.name:1 "อยู่ระหว่างการทำความสะอาด"
 origin.4930.desc:1 "ปฏิบัติการทำความสะอาดในระบบดาวของเรากำลังดำเนินไปด้วยดี ปริมาณซากเศษหักพังเหนือดาว [owner.capital_scope.GetName] ลดลงอย่างเห็นได้ชัด และด้วยท้องฟ้าที่เปิดโล่งขึ้น ความคาดหวังต่ออนาคตของเราก็สดใสขึ้นด้วย งานยังคงดำเนินต่อไป แต่ทุกอย่างกำลังดูดีขึ้น"


 # 100% progress
 origin.4931.name:1 "ท้องฟ้าแจ่มใส"
 origin.4931.desc:1 "ปฏิบัติการทำความสะอาดเสร็จสมบูรณ์แล้ว เมื่อผืนฟ้าของเราไร้ซึ่งเศษซากสิ่งกีดขวาง ยานวิทยาศาสตร์ของเราก็สามารถเข้าใกล้และสำรวจซากยานรบได้อย่างปลอดภัย"


 ## Dig site


 # Stage 1
 origin.4905.name:1 "ประเมินความเสียหาย"
 origin.4905.desc:1 "เซ็นเซอร์ของเราตรวจไม่พบสัญญาณสิ่งมีชีวิตในซากยานรบที่ถูกทิ้งร้างนี้ ทว่าเครื่องยนต์ยังคงส่งเสียงฮัมเบาๆ และเครื่องจักรต่างๆ ยังคงทำงานอยู่ในห้องโถงที่ว่างเปล่า มีเหตุผลสมควรที่จะเชื่อได้ว่ายานลำนี้ยังคงทำงานได้อยู่ และความพยายามที่จะขึ้นเรือลำนี้จะปลุกระบบรักษาความปลอดภัยให้ตื่นขึ้นอย่างแน่นอน\n\nเราต้องดำเนินการด้วยความระมัดระวัง"


 # Stage 2
 origin.4910.name:0 "การทวงคืนสินทรัพย์"
 origin.4910.desc:1 "ทีมก่อสร้างของเรากำลังเคลียร์ซากเศษ ซ่อมแซมความเสียหาย และควบคุมความปลอดภัยในห้องต่างๆ โดยการเปลี่ยนยานรบที่เคยสร้างความสะพรึงกลัวให้แก่โลกของเราให้กลายเป็นฐานปฏิบัติการ ท่ามกลางซากหักพังนั้น เราได้พบร่างของลูกเรือยาน หรือจะพูดให้ถูกก็คือสิ่งหลงเหลือของพวกเขา\n\nการที่จะทำอย่างไรกับซากร่างเหล่านี้นั้นยังคงเป็นประเด็นถกเถียงในหมู่สาธารณชน"
 origin.4910.a:0 "ชำแหละศพวิเคราะห์โครงสร้าง"
 origin.4910.b:0 "พวกมันควรนำไปแสดงในพิพิธภัณฑ์"
 origin.4910.c:1 "แห่ประจานพวกมันไปรอบเมืองของเรา"
 origin.4910.d:0 "แม้แต่เหล่าวายร้ายก็ควรได้รับการทำพิธีฝังอย่างเหมาะสม"


 # Stage 3
 origin.4920.name:0 "วิเคราะห์คู่แข่ง"
 origin.4920.desc:1 "เมื่อเราค้นคว้าผ่านฐานข้อมูลกลางของยานรบ แผนการของอดีตนายทาสก็กระจ่างขึ้น วิธีการที่พวกเขาเข้ามาหาเพื่อยกระดับ เพียงเพื่อฝึกฝนเราให้กลายเป็นทาสที่ดีขึ้น แผนการและระเบียบปฏิบัติที่ได้รับการขัดเกลามาเป็นอย่างดี และคำลวงที่คำนวณมาอย่างถี่ถ้วน โลกของเราไม่ใช่ความพยายามครั้งแรกของพวกเขาอย่างแน่นอน แต่มันเป็นตัวอย่างของ 'กลยุทธ์ทางธุรกิจ' หลักของพวกเขาต่างหาก"
 origin.4920.a:1 "ดำเนินการวิเคราะห์ต่อไป"


 # Stage 4
 origin.4925.name:1 "การ ควบคุม กลับ" #Formerly Monopolizing The Market
 origin.4925.desc:1 "เราเข้าควบคุมระบบทั้งหมดของยานรบที่ถูกทิ้งร้างได้โดยสมบูรณ์แล้ว บัดนี้เราต้องตัดสินใจว่าจะทำอย่างไรกับมัน ขึ้นอยู่กับความต้องการของเรา มันอาจเป็นสินทรัพย์ที่ทรงพลังสำหรับการทำสงครามหรือการวิจัยก็เป็นได้"
 origin.4925.a.tt:0 "ช่วยให้เราสามารถซ่อมแซมและกู้คืนยานรบให้เป็นได้ทั้ง §Hยานธง(ระเบิด)§! หรือ §Hถิ่นอาศัย(ฮาบิแทต)§!"


 # Special project to restore the warship
 payback_restore_warship_chain_title:0 "การกู้คืนยานรบ"
 payback_restore_warship_chain_desc:0 "อดีตยานรบของ MSI จะได้รับการบูรณะเพื่อตอบสนองวัตถุประสงค์ของเรา"


 RESTORE_WARSHIP_PROJECT:0 "การบูรณะยานธง"
 RESTORE_WARSHIP_PROJECT_DESC:1 "ยานรบนี้จะกลายเป็นเพชรยอดมงกุฎแห่งกองยานของเรา\n\nยานรบจะได้รับการซ่อมแซมและดัดแปลงให้เป็น §Hยานธง(ระเบิด)§! ที่พร้อมปฏิบัติการ"
 RESTORE_HABITAT_PROJECT:0 "การบูรณะถิ่นอาศัย"
 RESTORE_HABITAT_PROJECT_DESC:1 "ยานรบจะได้รับการดัดแปลงใหม่สำหรับการวิจัยทางวิทยาศาสตร์\n\nหลังการซ่อมแซม อดีตเครื่องมือแห่งความตายนี้จะถูกดัดแปลงให้กลายเป็น §Hถิ่นอาศัย(ฮาบิแทต)§! ที่พร้อมใช้งาน เพื่อทุ่มเทให้กับการเปิดเผยความลับแห่งเทคโนโลยีของ MSI"


 # project to upgrade the warship
 UPGRADE_FLAGSHIP:0 "อัปเกรดยานธง"
 UPGRADE_FLAGSHIP_DESC:0 "ความก้าวหน้าล่าสุดในเทคโนโลยีของเราจะช่วยให้เราสามารถปรับแต่งยานธงเพื่อใช้งานระบบที่ก่อนหน้านี้ไม่ได้ใช้งานได้"
 UPGRADE_FLAGSHIP_EMPTY:0 " " # Empty string to stop the error log.


 # End of the project event
 origin.4934.name:0 "กู้คืนยานธงสำเร็จ"
 origin.4934.desc:1 "การปรับแต่งอดีตยานรบของ MSI เสร็จสมบูรณ์แล้ว บัดนี้เรามียานรบที่มีพลังอำนาจและความสำคัญมหาศาลไว้ในการครอบครอง\n\nระวังตัวไว้ให้ดีเถอะ กาแล็กซี!"
 origin.4934.tt:2 "ยานรบในวงโคจรของ [owner.capital_scope.GetName] ได้รับการบูรณะเป็น §Hยานธง(ระเบิด)§! แล้ว"


 origin.4935.name:0 "กู้คืนถิ่นอาศัยสำเร็จ"
 origin.4935.desc:1 "การปรับแต่งอดีตยานรบของ MSI เสร็จสมบูรณ์แล้ว บัดนี้เราได้ครอบครองสถาบันวิจัยทางวิทยาศาสตร์ที่ทันสมัยที่สุด ซึ่งจะมีบทบาทสำคัญในการพัฒนาความรู้ด้านเทคโนโลยีของเรา"
 origin.4935.tt:1 "ยานรบได้รับการบูรณะให้เป็น §Hถิ่นอาศัย(ฮาบิแทต)§! ในวงโคจรของ [owner.capital_scope.GetName] เพื่อมุ่งมั่นที่จะค้นหาความลับทางเทคโนโลยีของ MSI"


 origin.4936.name:0 "ความรู้ความเข้าใจด้านวิศวกรรม"
 origin.4936.desc:0 "ความก้าวหน้าล่าสุดในการออกแบบยานของเรานำไปสู่ความรู้ความเข้าใจในวิธีการอัปเกรดยานธงของเรา เพื่อใช้ประโยชน์จากระบบที่เคยถูกทิ้งไว้โดยไม่ใช้งาน"
 origin.4936.tt:0 "ปลดล็อกโครงการพิเศษเพื่ออัปเกรดยานธง"


 origin.4937.name:0 "อัปเกรดยานธงเรียบร้อย!"
 origin.4937.desc:1 "เราได้อัปเกรดยานธงเรียบร้อยแล้ว ด้วยการใช้เทคโนโลยีที่มีอยู่บนยาน ทำให้เราสามารถถอดรหัสระบบต่างๆ ของมันและเข้าใจกลไกการทำงานภายในของยานลำนี้ได้ดียิ่งขึ้น"
 origin.4937.tt:0 "ยานธงของเราได้รับการอัปเกรดเพื่อใช้งานระบบที่ก่อนหน้านี้ไม่ได้ใช้งานแล้ว"


 ## Debt Collectors

 # Event chains
 payback_debt_collectors_chain_title:0 "ผู้ทวงหนี้"
 payback_debt_collectors_chain_desc:1 "อดีตนายทาสของเราอ้างว่าเราเป็นหนี้ค่าปฏิกรรมสงครามแก่พวกเขา สหการทวงหนี้ระหว่างกาแล็กซีได้รับการว่าจ้างให้มาสะสางเรื่องนี้\n\n[root.GetDebtCollectorsDeal]\n\n§Lผู้ทวงหนี้จะมาพบเราในวันที่§! §Y[root.payback_debt_collectors_timer]§!"
 payback_debt_collectors_chain_energy:3 "เราตกลงที่จะจ่ายพลังงาน §R5000§! £energy£ §H$energy$§! ทุกๆ 15 ปี"
 payback_debt_collectors_chain_consumer_goods:1 "เราตกลงที่จะจ่ายสินค้าอุปโภคบริโภค §R2500§! £consumer_goods£ §H$consumer_goods$§! ทุกๆ 15 ปี"
 payback_debt_collectors_chain_alloys:1 "เราตกลงที่จะจ่ายโลหะผสม §R1250§! £alloys£ §H$alloys$§! ทุกๆ 15 ปี"
 payback_debt_collectors_chain_pops:3 "เราตกลงที่จะส่งมอบประชากร §R200§! £pop£ §Hป๊อป§! ให้แก่ผู้ทวงหนี้ทุกๆ 15 ปี"
 payback_debt_collectors_chain_refused_won:0 "เราปฏิเสธที่จะทำข้อตกลง เข้าต่อสู้กับผู้ทวงหนี้และได้รับชัยชนะ ทว่าพวกมันจะต้องกลับมาอีกแน่"
 payback_debt_collectors_chain_refused_lost:0 "\"เราปฏิเสธที่จะทําข้อตกลง ต่อสู้กับพวกเก็บหนี้และสูญเสีย พวกเขาจะกลับมา"
 payback_debt_collectors_chain_empty:0 ""

 payback_make_them_pay_swords_chain_title:0 "คิดบัญชีแค้น"
 payback_make_them_pay_swords_chain_desc:1 "[GetPaybackChainDescSwords]"
 payback_make_them_pay_swords_chain_desc_MSI:0 "ได้เวลาที่เราจะตอบโต้ผู้เป็นอดีตนายทาสของเราอย่าง $NAME_MSI_country$ แล้ว\n\nเราไม่ใช่โลกที่ไร้เดียงสาที่พวกมันจะมารีดไถตักตวงผลประโยชน์ได้ง่ายๆ อีกต่อไป ท้ายที่สุดแล้ว พวกมันจะต้องชดใช้อย่างสาสม\n\n§Lชนะสงครามกับ §H$NAME_MSI_country$§! โดยใช้เหตุแห่งสงคราม(Casus Belli)แบบ §Y$casus_belli_cb_payback$§!§!"
 payback_make_them_pay_swords_chain_desc_no_MSI:0 "แผนการที่จะตอบโต้อดีตนายทาสของเราอย่าง $NAME_MSI_country$ ได้ถูกขัดขวางโดย [event_target:payback_stole_revenge_country.GetName]\n\nพวกมันต้องชดใช้ที่บังอาจมาแย่งชิงความแค้นของเราไป\n\n§Lชนะสงครามกับ §H[event_target:payback_stole_revenge_country.GetName]§! โดยใช้เหตุแห่งสงคราม(Casus Belli)แบบ §Y$casus_belli_cb_payback$§!§!"

 payback_make_them_pay_words_chain_title:0 "คิดบัญชีแค้น"
 payback_make_them_pay_words_chain_desc:1 "[root.GetPaybackChainDescWords]"
 payback_make_them_pay_words_chain_desc_MSI:0 "ได้เวลาที่เราจะโต้ตอบอดีตนายทาสอย่าง $NAME_MSI_country$ แล้ว\n\nเราจะทำให้พวกมันต้องคุกเข่าจำนนในสภากาแล็กซี พร้อมทั้งเปิดโปงว่าพวกมันเป็นเพียงพวกค้าทาสและพวกขลาดเขลาเพียงใด"
 payback_make_them_pay_words_chain_desc_no_MSI:0 "อดีตนายเหนือหัวของเราไม่มีอีกต่อไปแล้ว แต่เป้าหมายของเราไม่เปลี่ยนแปลง: บนสภาของชุมชนกาแลกติก เราจะต่อสู้กับทุกคนที่ปรารถนาจะแสวงหาผลประโยชน์จากอารยธรรมก่อนยุคความเร็ว"

