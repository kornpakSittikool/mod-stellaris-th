 awareness.910.name:0 "ถูกเปิดเผยตัว!"
 awareness.910.desc:0 "เราประมาทเลินเล่อ ดำเนินการในระบบดาว §Y[contact_empire_system.GetName]§! โดยไม่แยแสที่จะซ่อนกิจกรรมของเรา แม้จะมีระดับเทคโนโลยีที่ไม่สูงนัก แต่แม้กระทั่ง §Y[contact_empire.GetName]§! ก็สังเกตเห็นกิจกรรมของเรา ขณะนี้การติดต่อครั้งแรกกลายเป็นเรื่องที่หลีกเลี่ยงไม่ได้แล้ว"

 awareness.920.name:0 "ใครกันที่เฝ้ามองผู้เฝ้าดู?"
 awareness.920.desc:0 "เราสร้างสถานีสังเกตการณ์รอบดาว §Y[fromfrom.GetName]§! เพื่อศึกษาสิ่งมีชีวิตบนนั้น แต่กลับพบว่า §Y[contact_empire.GetSpeciesNamePlural]§! ต่างหากที่เป็นฝ่ายศึกษาเรา พวกเขาตระหนักรู้อย่างสมบูรณ์ถึงการมีอยู่ของสิ่งมีชีวิตต่างดาวอื่น และในไม่ช้าก็สังเกตเห็นการมาถึงของ [root.GetScientistPlural] ของเรา\n\nกิจกรรมก่อนหน้านี้ของเราในระบบสุริยะนี้ต้องทำให้ [fromfrom.owner.GetName] ไหวตัวทันเกี่ยวกับการปรากฏตัวของเรา ความพยายามที่จะซ่อนการมีอยู่ของเรานั้นสูญเปล่าแล้วในจุดนี้"

 AWARENESS_MONTHLY:0 "ความคืบหน้าของการตระหนักรู้"
 AWARENESS_MONTHLY_VALUE:0 "การเปลี่ยนแปลงรายเดือน: $VALUE|=0Y$"
 AWARENESS_MONTHLY_VALUE_DELAYED:0 "§Eระดับการตระหนักรู้ของอารยธรรมนี้เปลี่ยนไปตามจำนวนนี้ในเดือนก่อนหน้า\n\nการตระหนักรู้ได้รับผลกระทบจากปัจจัยต่างๆ รวมถึงกิจกรรมอวกาศภายในระบบดาว และปฏิสัมพันธ์ของเรากับอารยธรรมนั้นๆ§!"

