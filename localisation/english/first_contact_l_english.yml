 origin_payback:0 "เอาคืน"
 origin_payback_desc:1 "§Rคำเตือน: จุดเริ่มต้นท้าทาย§!\nอารยธรรมนี้มีต่างดาวได้เคยมาเยือนและบังคับกดขี่ไว้ แต่พวกเขาขับไล่ผู้บุกรุกได้ แต่ว่าผู้บุกรุกนี้จะกลับมาอีกหรือไม่?"
 origin_tooltip_payback_effects:2 "- $HOMEWORLD$ $TABBED_NEW_LINE$- ['concept_advanced_infrastructure']$TABBED_NEW_LINE$- $PLANETARY_MODIFIERS$ ['concept_payback_unified_purpose']$NEW_LINE$- $HOME_SYSTEM$ ['concept_archaeology_site'] ['concept_payback_digsite'] $NEW_LINE$- ['concept_advanced_empires', จักรวรรดิ AI ขั้นสูง] หนึ่งแห่ง และอีกหลายๆ ['concept_preftl_civilizations'] โดยไม่คำนึงถึงการตั้งค่ากาแล็กซี่ ตอนสร้างวาระเมื่อเริ่มเกมใหม่ $NEW_LINE$- อารยธรรมก่อน FL หนึ่งแห่ง: ยกระดับด้วย จุดเริ่มต้น §I$origin_broken_shackles$§!"
 zone_payback_enlightenment: " ศูนย์พัฒนาการยกระดับอารยธรรม"
 zone_payback_enlightenment_desc: "การเบิกเนตรความรู้อาจไม่ได้มาฟรีๆ แต่ที่ $NAME_MSI_country_initials$ มันคุ้มค่ากับราคาที่จ่ายเสมอ"

 origin_tooltip_payback_negative_effects: "- $INITIAL_POPS$ §R-1K§! $NEW_LINE$- $HOMEWORLD$ $TABBED_NEW_LINE$- ตัวดัดแปลงดาวเคราะห์ ['concept_payback_debris_field'] $TABBED_NEW_LINE$- ['concept_payback_ship_debris']: +6 $TABBED_NEW_LINE$- ความเสียหาย(ช่อง:§R33%§! $NEW_LINE$- แหล่งทรัพยากรในระบบดาวบ้านเกิด ($HOME_SYSTEM$ §Iลบทรัพยากร§!) ยังไม่ถูกเก็บเกี่ยว $NEW_LINE$- $MISSING_TECHNOLOGIES_STRING$ $TABBED_NEW_LINE$- ['concept_basic_science_lab_1', £physics_research£ $tech_basic_science_lab_1$] $TABBED_NEW_LINE$- ['concept_planetary_government', £society_research£ $tech_planetary_government$] $TABBED_NEW_LINE$- ['concept_corvettes', £engineering_research£ $tech_corvettes$]"

 START_SCREEN_PAYBACK:0 "เรามีข้อตกลงกันอยู่\n\nเมื่อผู้มาเยือนจากดวงดาวปรากฏตัว พวกเขาได้เสนอสัญญาที่เป็นธรรมแก่เรา: การยกระดับมอบปัญญาทางเทคโนโลยี โดยผ่อนชำระเป็นงวดๆ ภายในเวลาไม่ถึงชั่วอายุคน โลกของเราได้เปลี่ยนผ่านไปสู่สิ่งที่เราเรียกว่า 'อารยธรรมขั้นสูง'\n\nทว่าต่อมาเราได้อ่านข้อความตัวอักษรเล็กๆ: ในการชำระ 'หนี้สิน' พวกเขายืนยันให้เราทำงานให้พวกเขาโดยไม่มีกำหนดเวลา เมื่อผู้นำของเราประท้วง คนนอกเหล่านั้นก็ใช้ความรุนแรง เราจึงสู้กลับ\n\nเราชนะมาได้แบบหวุดหวิด และต้องเผชิญกับความสูญเสียครั้งใหญ่อย่างสาหัส บัดนี้ นักวิทยาศาสตร์ของเราสามารถถอดรหัสความลับของการเดินทางข้ามระบบดาว(FTL)จากซากยานที่เราทำลายลงได้แล้ว มันเป็นกาแล็กซีที่กว้างใหญ่ แต่ไม่ช้าก็เร็วเราคงจะได้พบกับ 'ผู้มีพระคุณ' ของเราอีกครั้งแน่ และบอกตามตรงว่าพวกเราตั้งตารอคอยวันนั้นอยู่เลยล่ะ\n\nได้เวลาสะสางแค้นแล้ว"

 ## Modifiers and such
 d_ship_debris_payback_blocker:0 "ซากยาน"
 d_ship_debris_payback_blocker_desc:0 "เศษซากของยานมินามาร์ที่ตกลงมาครอบคลุมพื้นที่ขนาดใหญ่ ส่งผลให้การพัฒนาดาวเคราะห์ต้องหยุดชะงัก"
 ship_debris_payback_blocker_tt:0 "การเคลียร์เศษซากออกจากยาน MSI อาจนำไปสู่การกู้คืนข้อมูลเทคโนโลยีหรือทรัพยากร"

 origin.4100.name:0 "กู้คืนข้อมูลเทคโนโลยี"
 origin.4100.desc:0 "ขณะที่เคลียร์ซากเศษยานบนดาว [from.GetName] ได้มีการกู้คืนคลังข้อมูลเทคโนโลยีกลับมาได้"

 origin.4105.name:0 "กู้คืนทรัพยากร"
 origin.4105.desc:0 "ซากเศษยานที่เคลียร์บนดาว [from.GetName] สามารถนำมาดัดแปลงเพื่อใช้งานส่วนตัวได้"

 payback_unified_purpose:0 "เป้าหมายรวมใจเป็นหนึ่ง"
 payback_unified_purpose_desc:0 "การมาเยือนของผู้รุกรานทำให้โลกของเราเป็นน้ำหนึ่งใจเดียวกัน บัดนี้เมื่อเราทวงคืนสิทธิ์ในการกำหนดชะตากรรมของตัวเองแล้ว ก็ยังมีภารกิจอีกมากมายที่ต้องลงมือทำ"

 payback_debris_field:0 "ซากยานมินามาร์ตกสู่ดาว"
 payback_debris_field_desc:0 "ซากชิ้นส่วนในวงโคจรจากยานมินามาร์ที่อับปาง มักจะตกลงมาสู่ดาวเคราะห์เบื้องล่างอยู่บ่อยครั้ง โครงสร้างพื้นฐานบนพื้นผิวใดๆ จะต้องได้รับการบำรุงรักษาอย่างสม่ำเสมอและเข้มข้นยิ่งขึ้นเพื่อซ่อมแซมความเสียหายที่เกิดขึ้น"

 d_payback_habitat_research:0 "คลังขุมทรัพย์เทคโนโลยี"
 d_payback_habitat_research_desc:0 "พื้นที่ภายในของอดีตยานรบของ MSI ช่วยมอบโอกาสอันไร้คู่เปรียบในการปลดล็อกความลับแห่งเทคโนโลยีของพวกมัน"

 d_msi_air_freshener: "เครื่องปรับสภาพชั้นบรรยากาศ"
 d_msi_air_freshener_desc: "หน่วยระบายอากาศเหล่านี้ผสานความก้าวหน้าล่าสุดของสุคนธบำบัดเข้ากับเคมีขั้นสูง เพื่อกลบกลิ่นเหม็นอับของความสิ้นหวัง และแทนที่มันด้วยกลิ่นหอมชวนผ่อนคลายและสดชื่นหลากหลายชนิด"

 payback_curfew:0 "กวาดล้างผู้เห็นต่าง"
 payback_curfew_desc:0 "เสรีภาพคือราคาที่ต้องจ่ายเพื่อความมั่นคง"

 payback_freedom_of_speech:0 "เสรีภาพในการแสดงออก"
 payback_freedom_of_speech_desc:0 "ความมั่นคงคือราคาที่ต้องจ่ายเพื่อเสรีภาพ"

 ## First Contact
 origin.4200.name:0 "การประชุมสภาบริหาร"
 origin.4200.desc:0 "การพบเห็นอดีตผู้รุกรานทำให้เกิดการประชุมฉุกเฉินระหว่างผู้นำทางการเมือง ผู้นำศาสนา นักวิทยาศาสตร์ ศิลปิน และนักการทูต กลยุทธ์ต่างๆ ถูกยกขึ้นมาหารือ ปฏิเสธ พิจารณาใหม่ ปรับปรุง และลงคะแนนเสียง หลังจากผ่านการหารืออันตึงเครียดนานหลายเดือน สมองที่ปราดเปรื่องที่สุดของจักรวรรดิเราก็ได้ข้อสรุปที่พอจะเรียกว่าเป็นมติเอกฉันท์"
 origin.4200.a.auth:0 "เราจะแสดงให้พวกมันเห็นว่าใครเป็นใหญ่!"
 origin.4200.a.ega:0 "เราจะเรียกร้องให้ปฏิบัติกับเราอย่างเท่าเทียม"
 origin.4200.b.mili:0 "เราจะทำให้พวกมันชดใช้ในสิ่งที่ทำไว้กับเรา!"
 origin.4200.b.paci:0 "เราไม่ต้องการความขัดแย้งเพิ่มเติมกับพวกมัน"
 origin.4200.c.phobe:0 "เราไม่ต้องการที่จะติดต่อข้องเกี่ยวกับพวกเอเลี่ยนอีก"
 origin.4200.c.phile:0 "เราจะปล่อยให้ความกลัวมาขัดขวางการสำรวจกาแล็กซีไม่ได้"
 origin.4200.d.spiri:0 "บททดสอบของผู้ศรัทธาจะต้องได้รับการจัดการตามลำดับ"
 origin.4200.d.mate:0 "เราต้องการศึกษาพวกมัน รู้เขารู้เรา"

 origin.4205.name:0 "ประชามติสาธารณะ"
 origin.4205.desc:0 "แม้จะมีมาตรการรักษาความปลอดภัย แต่ข่าวคราวเรื่องการพบกันของเรากับ §H$NAME_MSI_country$§! ก็ได้แพร่สะพัดไปยังสาธารณชน นำความโกลาหลมาสู่ดาวเคราะห์ที่เพิ่งเริ่มฟื้นตัวจากอดีต ความคิดเห็นของสาธารณชนนั้น... แตกแยก: เสียงคัดค้านมากมายแสดงออกทุกอย่างตั้งแต่ความโกรธแค้นไปจนถึงความโหยหาอดีตที่ผิดที่ผิดทาง ไม่ว่าจะตัดสินใจอย่างไร การกระทำของเราย่อมต้องเผชิญกับความรุนแรง"
 origin.4205.a:0 "พวกเขามีสิทธิ์ที่จะแสดงความคิดเห็นของตน"
 origin.4205.b:0 "บังคับใช้เคอร์ฟิว และกวาดล้างผู้เห็นต่าง"

 origin.4210.name:0 "การเจรจาเบื้องต้น"
 origin.4210.desc:0 "หลังจากการเตรียมการอันยาวนาน คณะทูตของเราได้ส่งข้อความไปยัง $NAME_MSI_country_initials$เราพร้อมที่จะเผชิญหน้ากับอดีตนายทาสภายใต้เงื่อนไขของเรา เพื่อแสดงเจตจำนงของประชาชนเรา"

 ## Out of Warranty
 payback_out_of_warranty_chain_title:0 "หมดประกัน"
 payback_out_of_warranty_chain_desc:0 "§Y$building_medical_2$§! ที่ผู้รุกรานสร้างไว้ให้เรากำลังทรุดโทรมจากการขาดการบำรุงรักษา แม้ว่าเทคโนโลยีส่วนใหญ่จะเกินกว่าความเข้าใจในปัจจุบันของเรา แต่เราสามารถพยายาม §Sซ่อมแซม§! มันได้\n\n§Lการลงนามในข้อตกลงการวิจัยกับจักรวรรดิอื่นจะช่วยเพิ่มโอกาสสำเร็จของเรา [GetAgreementStatus]§!"
 payback_repair_clinic_no_agreement:0 "เราไม่มีข้อตกลงการวิจัยกับจักรวรรดิที่สามารถช่วยเหลือเราได้"
 payback_repair_clinic_yes_agreement:0 "เรามีข้อตกลงการวิจัยอย่างน้อยหนึ่งข้อตกลงกับจักรวรรดิที่สามารถช่วยเหลือเราได้"

 payback_declining_healthcare:0 "การสาธารณสุขที่เสื่อมถอย"
 payback_declining_healthcare_desc:0 "การสูญเสีย $building_medical_2$ ส่งผลกระทบอย่างรุนแรงต่อคุณภาพชีวิตของเรา"
 payback_declining_healthcare_alt:0 "การแพทย์ทางเลือก"
 payback_declining_healthcare_alt_desc:0 "อย่าลืมทานวิตามินของคุณด้วยล่ะ!"
