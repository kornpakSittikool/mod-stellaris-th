 #Events

 fircon.5000.name:0 "วงโคจรที่สูญหาย"
 fircon.5000.desc.base:0 "§Y[From.GetName]§! มีดาวเคราะห์สูญหายไป\n\nการคำนวณทั้งหมดชี้ว่ามีวัตถุบนท้องฟ้าอยู่อีกหลายดวง ทว่ากลับตรวจไม่พบพวกมันในระบบดาวนี้เลย เซ็นเซอร์ได้รับการปรับเทียบใหม่และตรวจสอบตัวเลขซ้ำแล้ว แต่ทฤษฎีดังกล่าวกลับถูกปฏิเสธโดยความเป็นจริง เราได้ทำเครื่องหมายตำแหน่งของดาวเคราะห์แคระที่สูญหายไปบนแผนที่ดาวของเราแล้ว"
 fircon.5000.desc:0 "$fircon.5000.desc.base$\n\nบางทีการสแกนระบบดาวอย่างละเอียดขึ้นอาจเผยให้เห็นข้อมูลเพิ่มเติม"

 fircon.5005.desc.open:0 "$fircon.5000.desc.base$\n\nเราคาดว่า [owner.GetPreFTLLowerPlural] ที่อยู่ข้างเคียงในระบบดาวดาชามีส่วนเกี่ยวข้องกับเรื่องนี้"
 fircon.5005.desc.closed:0 "$fircon.5000.desc.base$\n\nดูเหมือนว่า [owner.GetPreFTLLowerPlural] ที่เคยอยู่ข้างเคียงในระบบดาวดาชาเป็นผู้สร้างระบบดาวประหลาดนี้ ทว่าไฮเปอร์เลนที่นำทางไปสู่ที่นั่นกลับสูญหายไปตั้งแต่นั้นมา"

 fircon.5010.name:0 "โจรกรรมดาวเคราะห์ครั้งใหญ่"
 fircon.5010.desc:0 "ดาวเคราะห์ถูกเคลื่อนย้าย!\n\nไฮเปอร์เลนที่ผิดปกติซึ่งเราตรวจพบในระบบดาว §Y[from.solar_system.GetName]§! ต่างก็เชื่อมโยงไปยังตำแหน่งที่เราเคยคาดว่าจะพบดาวเคราะห์ดวงต่างๆ หลังจากศึกษาเลนแปลกประหลาดเหล่านี้ เราก็ตระหนักว่าพวกมันทั้งหมดนำไปสู่สถานที่เดียวกัน นั่นคือระบบดาวที่เรียกว่า §Yดาชา§! ซึ่งเดิมคิดว่าไม่สามารถเข้าถึงได้ ทว่าหากเรารวมไฮเปอร์เลนเส้นเล็กๆ ทั้งหมดนี้เข้าด้วยกัน เราอาจจะส่งยานวิทยาศาสตร์ผ่านเข้าไปได้"
 fircon.5010.a:0 "ค้นหาว่าไฮเปอร์เลนเหล่านีนำไปสู่ที่ใด!"
 fircon.5010.b:0 "เราต้องการรู้จริงๆ หรือ?"

 fircon.5015.name:0 "พิภพแห่งความอุดมสมบูรณ์"
 fircon.5015.desc:0 "ที่โคจรรอบดาวฤกษ์แต่ละดวงในระบบดาวสามดวงของ §Y[From.GetName]§! คือสวรรค์แห่งระบบนิเวศอย่างไกอาเวิลด์ ซึ่งแต่ละดวงสามารถค้ำจุนชีวิตอินทรีย์ได้ ในตอนแรกเราคิดว่าสิ่งเหล่านี้อาจไม่มีผู้อยู่อาศัยเนื่องจากไม่มีมลพิษ ทว่าหลังจากการสแกนอย่างละเอียดขึ้น เราได้ค้นพบเมืองขนาดใหญ่ที่แผ่ขยายครอบคลุมดาวเคราะห์แต่ละดวงตั้งแต่ต้นจนจบ\n\nที่น่าแปลกไปกว่านั้น ดูเหมือนว่าจะมีเพียงดาวฤกษ์ดวงกลางเท่านั้นที่มีดาวเคราะห์ดั้งเดิมจากระบบดาวนี้ ส่วนดาวดวงอื่นมีดาวเคราะห์โคจรรอบจาก $NAME_Helito$ และระบบดาวอื่นๆ ที่ห่างไกลออกไป"
 fircon.5015.a:0 "แต่... ได้ยังไงกัน!?"
 fircon.5015.b:0 "มันช่างงดงามเหลือเกิน!"
 fircon.5015.c.exterminator:0 "ตรวจพบการกระจุกตัวของชีวิตอินทรีย์ในระดับสูงมาก"
 fircon.5015.c.swarm:0 "มีเนื้อให้กัดกินมากมายเหลือเกิน!"
 fircon.5015.c.purifier:0 "โลกเหล่านั้นคงจะดูดีกว่านี้หากมี [Owner.GetSpeciesNamePlural] อาศัยอยู่"

 fircon.5020.name:0 "เผชิญหน้ากับสหพิภพฮาบินเต"
 fircon.5020.desc:0 "การสำรวจไกอาเวิลด์ดวงใหม่มักจะเป็นเหตุการณ์สำคัญ แต่สำหรับลูกเรือของ [Root.GetName] มันกำลังจะกลายเป็นเรื่องปกติในอีกไม่กี่เดือนข้างหน้า โลกหลายใบนี้เป็นที่อยู่อาศัยของ [Owner.GetPreFTLLowerPlural] ที่แปลกประหลาดมาก พวกเขาเห็นได้ชัดว่ายังไม่บรรลุเทคโนโลยีการท่องอวกาศ ทว่าการผลิตพลังงานหมุนเวียนของพวกเขากลับเทียบเท่ากับเครื่องปฏิกรณ์ที่มีประสิทธิภาพสูงสุดของเรา\n\nความแปลกประหลาดอีกประการหนึ่งคือการกระจายทรัพยากรอย่างเท่าเทียมกัน ทุกโลกมีทุกสิ่งที่จำเป็นสำหรับการเอาชีวิตรอด ซึ่งน่าจะเป็นไปไม่ได้ เรากำลังเห็นสินค้าที่ผลิตบนดาวเคราะห์ดวงหนึ่งไปปรากฏบนอีกดวงหนึ่งโดยไม่มีการขนส่งด้วยยานแม้แต่ลำเดียว"
 fircon.5020.a:0 "เราต้องการสถานีสังเกตการณ์เดี๋ยวนี้!"

 fircon.5026.name:0 "สะพาน ระหว่าง โลก"
 fircon.5026.desc:0 "สะพานเชื่อมระหว่างโลก"

 fircon.5036.name:0 "ความ โกรธ ของ การ แข่งขัน ที่ กรุณา"
 fircon.5036.desc:0 "เราคิดว่าคนที่สามารถเดินทางผ่านดาว จะไม่ได้โบราณมาก\n\n§Rออกไป§!"
 fircon.5036.a:0 "เฮ้"
 fircon.5036.tt:0 "§Rเรือทั้งหมดของเราใน§Y[From.solar_system.GetName]ระบบ§!ได้หายไปในการดําเนินการ\nไฮเปอร์เลนทั้งหมด§Y[From.solar_system.GetName]ระบบ§!กลายเป็นความไม่มั่นคง§!"

 fircon.5040.name:0 "การ ทํา แท้ง ไม่ ใช่ ทาง เลือก"
 fircon.5040.desc:0 "เราได้เห็นกาแล็กซี่ชนิดใด ที่มันเป็น และเลือกที่จะหลีกเลี่ยงมัน งั้นให้เราแสดงให้ดู"
 fircon.5040.a.tt:0 "§Rทุกระบบใกล้§Y[From.GetName]ระบบ§!ได้มีการจัดตั้งไฮเปอร์เลนใหม่§!"

 fircon.5050.name:0 "ความโกรธเกรี้ยวของเผ่าพันธุ์ผู้อ่อนโยน"
 fircon.5050.desc:0 "ความเข้าใจที่เรามีต่อเทคโนโลยีไฮเปอร์เลน โดยความร่วมมือของเรากับ[event_target:solarpunk_country.GetSpeciesAdj]ช้าลงอย่างน่าหงุดหงิด ดูเหมือนว่า เพื่อบรรลุความเชี่ยวชาญของกลุ่มดาวไฮเปอร์เลนในท้องถิ่น เช่นพวกมัน เราต้องใช้เวลาเป็นพันๆ ปี เราได้รับการติดต่อใหม่ จากหัวหน้าผู้แทน\n\n\"พูดตามตรงนะ การปรากฏตัวของคุณที่นี่กําลังดังมาก ตอนนี้เราได้สอนคุณในสิ่งที่คุณตามหา เมื่อ ตัดสิน ว่า แนว ทาง ชีวิต ของ เรา ไม่ เข้า กัน เรา กังวล ว่า คุณ อาจ ปรารถนา สิ่ง ที่ เรา มี ใน อนาคต. ดังนั้นเพื่อป้องกันความรู้สึกใด ๆ ของความประสงค์ที่ไม่ดี เราต้องการที่จะให้คุณหนึ่งของโลกของเรา เราจะรับมือกับการขนส่ง ไม่ต้องกังวล\""
 fircon.5050.a:0 "เรายอมรับ มีชีวิตที่ดี"
 fircon.5050.a.tt:0 "§Yโซล X§!จะรวมอยู่ในวงเวียน§Y[capital_star.GetName]§!."
 fircon.5050.c:0 "เราคิดว่าผู้ที่สามารถเดินทางข้ามดวงดาวได้จะไม่ป่าเถื่อนถึงขั้นต้องหันมาใช้ความรุนแรง\n\n§Rจงออกไปเสีย!§!"
 fircon.5050.c.tt:0 "§Rปลดปล่อยพวกเอเลี่ยน ให้รู้ความลับของพวกไฮเปอร์เลน§!"
