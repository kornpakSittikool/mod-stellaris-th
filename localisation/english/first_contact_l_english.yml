 SUBSPACE_DRIVE_DESC:0 "ซับสเปซไดรฟ์สร้างรอยฉีกขาดขนาดเล็กในปริภูมิ-เวลา ทำให้ยานอวกาศสามารถจัมป์ไปยังระบบดาวข้างเคียงได้ กระบวนการนี้จะไร้เสถียรภาพอย่างยิ่งหากพยายามจัมป์ในระยะทางที่ไกลกว่านี้"
