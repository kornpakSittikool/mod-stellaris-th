 # Casus Belli/war goal
 casus_belli_cb_payback:0 "เอาคืน"
 casus_belli_cb_payback_acquire_hint:0 "\n§Eได้รับ §Hสาเหตุแห่งสงคราม§!(Casus Belli)§Y$casus_belli_cb_payback$§! เมื่อเป้าหมายการแก้แค้นของเราไม่ใช่นายเหนือหัวของเรา§!"

 war_goal_wg_payback_wipe_them_out:0 "ยุติภัยคุกคาม"
 war_goal_wg_payback_wipe_them_out_desc:0 "สงครามเกิดขึ้นเพื่อยุติภัยคุกคามต่อจักรวรรดิของเราเอง\n\n§Rจะไม่มีการเจรจาสงบศึกแบบรักษาสถานะเดิม(Status Quo)ในสงครามนี้: เราไม่ชนะ ก็ต้องยอมจำนน§!"

 war_goal_wg_payback_force_ideology:0 "บังคับใช้อุดมการณ์"
 war_goal_wg_payback_force_ideology_desc:0 "สงครามเกิดขึ้นเพื่อบังคับใช้จริยธรรมและรูปแบบการปกครองของตนกับศัตรู\n\n§Rจะไม่มีการเจรจาสงบศึกแบบรักษาสถานะเดิม(Status Quo)ในสงครามนี้: เราไม่บังคับใช้อุดมการณ์สำเร็จ ก็ต้องยอมจำนน§!"

 war_goal_wg_payback_megacorp_subjugate:0 "ทำให้เป็นบริษัทในเครือ"
