 FIRST_CONTACT_TITLE: "First Contact Story Pack" # Do not translate
 DLC_FIRST_CONTACT_RECOMMENDATION_DESC:0 "§Sที่อยู่ติดต่อแรก§! คือกลุ่มเรื่องต่าง ๆที่จะพาไปสำรวจการพบกันครั้งแรกกับอารยธรรมก่อนความเร็วนอกจากนี้กลุ่มเรื่องต่าง ๆนี้ยังมาพร้อมกับเทคโนโลยีพรางตัวอีกด้วย!"
 DLC_FIRST_CONTACT_RECOMMENDATION_REC_DIPLO:0 "เราขอแนะนำ §Sที่อยู่ติดต่อแรก§! เนื่องจากคุณลักษณะใหม่ๆ ในกลุ่มเรื่องต่าง ๆนี้ช่วยให้การโต้ตอบกับสังคมก่อนความเร็วมีความเคลื่อนไหวและน่าดึงดูดยิ่งขึ้น"
 DLC_FIRST_CONTACT_RECOMMENDATION_REC:0 "เราขอแนะนำ §Sที่อยู่ติดต่อแรก§! เนื่องจากตัวแปรบางส่วนที่คุณเลือกนั้นตรงกับเนื้อหา โดยกลุ่มเรื่องต่าง ๆนี้จะเน้นไปที่การทูต การจารกรรม และการเฝ้าสังเกตพัฒนาการของอารยธรรมก่อนความเร็ว"

