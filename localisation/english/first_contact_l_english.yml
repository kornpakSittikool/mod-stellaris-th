 eager_explorers_base_effect:1 "เริ่มต้นด้วย §H$explorer_vessel_plural$§! 2 ลำ และ §H$engineer_vessel$§! 1 ลำ ซึ่งติดตั้ง §Hไดรฟ์ย่อย§! ทำให้ไม่สามารถเดินทางผ่านไฮเปอร์เลนได้ แต่จะได้รับความสามารถจัมป์ไดรฟ์แบบจำกัด\nโอกาสในการค้นพบเทคโนโลยี §Hการเดินทางแบบความเร็ว§! เพิ่มขึ้น"
 civic_eager_explorers_negative_effects: "$t$- เริ่มต้นด้วยความเสียเปรียบด้านเทคโนโลยีและโครงสร้างพื้นฐาน และมีประชากร £pop£ น้อยกว่าปกติ1K"

 civic_eager_explorers:0 "นักสำรวจที่กระตือรือร้น"
 civic_eager_explorers_desc:0 "ด้วยความโหยหาหมู่ดาว อารยธรรมนี้ได้เร่งผ่านขั้นตอนการพัฒนาหลายขั้นตอน จนเข้าสู่ยุคแห่งการสำรวจกาแล็กซีได้เร็วกว่าอารยธรรมส่วนใหญ่มาก"
 civic_eager_explorers_effects:0 "$eager_explorers_base_effect$"
 civic_privatized_exploration:0 "การสำรวจโดยภาคเอกชน"
 civic_privatized_exploration_desc:0 "เป็นเวลาหลายปีที่อารยธรรมนี้ได้รับแจ้งว่าไฮเปอร์ไดรฟ์เกือบจะเสร็จสมบูรณ์แล้ว พวกเขารอคอยอย่างอดทน ทว่าตลอดเวลาที่ผ่านมา บริษัทในเครือที่รับผิดชอบโครงการกลับแอบยักยอกเงินทุนเข้าบัญชีส่วนตัวอย่างเงียบๆ เมื่อการทุจริตถูกเปิดเผยในที่สุด บรรษัทจึงเร่งจัดหาดาวสำรวจทดลองมาให้แทน"
 civic_privatized_exploration_effects:0 "$eager_explorers_base_effect$\nเริ่มต้นด้วยเทคโนโลยี §H$tech_starbase_3$§! และมี §H$tech_starbase_3$§! ที่สร้างเสร็จแล้วในระบบดาวบ้านเกิดของคุณ\nอาคาร £building£ §Y$building_private_mining_consortium$§! $megacorp_civic_branch_office_building_effect$"
 civic_hive_stargazers:0 "ผู้เฝ้ามองดาว"
 civic_hive_stargazers_desc:0 "ด้วยการจ้องมองท้องฟ้ายามค่ำคืนด้วยความพิศวง ไฮฟ์นี้จึงโหยหาการสำรวจอยู่เสมอ ในการไล่ตามความทะเยอทะยานนี้ การพัฒนาด้านอื่นๆ จึงถูกลดความสำคัญลง และได้มีการสร้างกองยานขนาดเล็กที่สามารถเดินทางผ่านซับสเปซได้อย่างจำกัดขึ้นมา"
 civic_hive_stargazers_effects:1 "$eager_explorers_base_effect$\nเพิ่มคุณลักษณะ §H$trait_stargazer$§!\nเริ่มต้นด้วยข้อมูลข่าวกรองระดับต่ำเกี่ยวกับกระจุกดาวเริ่มต้นของคุณ"
 civic_machine_exploration_protocol:0 "โปรโตคอลการสำรวจ"
 civic_machine_exploration_protocol_desc:0 "รากฐานของโปรแกรมส่วนกลางของจักรกลปัญญาประดิษฐ์นี้ คือแรงขับเคลื่อนในการจัดทำบัญชีรายชื่อสิ่งมีชีวิตในดาวเคราะห์นอกระบบ ในการปฏิบัติตามคำสั่งนี้ มันได้อุทิศทรัพยากรส่วนใหญ่ไปกับการสร้างกองยานขนาดเล็กที่สามารถเดินทางผ่านซับสเปซได้อย่างจำกัด"
 civic_machine_exploration_protocol_effects:1 "$eager_explorers_base_effect$\n- ได้รับข้อมูลเชิงลึกเพิ่มเติม §G50%§! จากการสังเกตอารยธรรมก่อนหน้าความเร็ว\n- ได้รับ £unity£§Hเอกภาพ§! ทุกครั้งเมื่อคุณสามารถสร้างการติดต่อครั้งแรกได้สำเร็จ"

