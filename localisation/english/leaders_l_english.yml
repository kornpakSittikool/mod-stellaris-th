 ### Veteran Classes
 veteran_class:0 "คลาสมีประสบการณ์"
 general_subclass:2 "£general£ §v$veteran_class$§!"
 commander_subclass: "£commander£ §v$veteran_class$§!"
 governor_subclass:2 "£official£ §v$veteran_class$§!"
 official_subclass: "£official£ §v$veteran_class$§!"
 scientist_subclass:2 "£scientist£ §v$veteran_class$§!"
 councilor_subclass_base:0 "[Root.GetClass]"

 councilor_subclass_commander: "$commander_subclass$ (£council£)"
 councilor_subclass_general:0 "$general_subclass$ (£council£)"
 councilor_subclass_governor:0 "$governor_subclass$ (£council£)"
 councilor_subclass_official: "$official_subclass$ (£council£)"
 councilor_subclass_scientist:0 "$scientist_subclass$ (£council£)"
 councilor_subclass:2 "[Root.GetClassTexticon] §v$veteran_class$§! (£council£)"

 admiral_subclass_tt: "§Gคลาสมีประสบการณ์ที่เน้นการบัญชาการกองเรือ§!"
 general_subclass_tt: "§Gคลาสมีประสบการณ์ที่เน้นการบัญชาการกองทัพบก§!"
 delegate_subclass_tt: "§Gคลาสมีประสบการณ์ที่เน้นการเป็นผู้แทนของเราในสมาพันธ์ดาราจักรและใน [GetGalCommunityOrGalImperium]§!"
 explorer_subclass_tt:0 "§Gคลาสมีประสบการณ์ที่เน้นการสำรวจและรังวัดดาวเคราะห์§!"
 scholar_subclass_tt: "§Gคลาสมีประสบการณ์ที่เน้นการตรวจสอบความผิดปกติและแหล่งขุดค้นโบราณสถาน§!"
 governor_subclass_tt: "§Gคลาสมีประสบการณ์ที่เน้นไปที่คุณลักษณะของผู้ว่าการ§!"
 councilor_subclass_tt:0 "§Gคลาสมีประสบการณ์ที่เน้นไปที่คุณลักษณะของสมาชิกสภา§!"

 ## Commander
 subclass_commander_admiral: "พลเรือเอก"
 subclass_commander_admiral_desc: "การมีอยู่ของพลเรือเอกที่เด็ดเดี่ยวช่วยเพิ่มความมั่นใจของลูกเรือในขณะที่พวกเขาเข้าปะทะกับศัตรู"
 subclass_commander_admiral_hive: "$subclass_commander_admiral$"
 subclass_commander_admiral_hive_desc: "การมีอยู่ของพลเรือเอกผู้ทุ่มเทช่วยให้แน่ใจว่ากองเรือจะยังคงเหนียวแน่นในขณะที่เข้าปะทะกับศัตรู"
 subclass_commander_admiral_machine: "$subclass_commander_admiral$"
 subclass_commander_admiral_machine_desc: "การมีอยู่ของยูนิตพลเรือเอกผู้ทุ่มเทช่วยให้แน่ใจว่ากองเรือจะยังคงซิงโครไนซ์ประสานงานกันเป็นอย่างดีในขณะที่เข้าปะทะกับศัตรู"
 commander_admiral_subclass: "§Gคลาสมีประสบการณ์ที่เน้นในเรื่องกองเรือและการรบทางเรือ§!"

 subclass_commander_general: "พลเอก"
 subclass_commander_general_desc: "การมีอยู่ของพลเอกช่วยให้ประสานงานการบุกรุกดาวเคราะห์ได้อย่างมีประสิทธิภาพยิ่งขึ้น"
 subclass_commander_general_hive: "$subclass_commander_general$"
 subclass_commander_general_hive_desc: "$subclass_commander_general_desc$"
 subclass_commander_general_machine: "$subclass_commander_general$"
 subclass_commander_general_machine_desc: "$subclass_commander_general_desc$"
 commander_general_subclass: "§Gคลาสมีประสบการณ์ที่เน้นการโจมตีสถานีดาราจักร การระเบิดดาวเคราะห์จากวงโคจร และการบุกรุกดาวเคราะห์§!"

 subclass_commander_governor: "ข้าหลวง"
 subclass_commander_governor_desc: "เจ้าหน้าที่ตรวจการผู้เชี่ยวชาญในการจัดระเบียบผ่านการบังคับใช้กำลัง ปกครองดาวเคราะห์และระบบดาวด้วยความเข้มงวดทางทหารและวิสัยทัศน์ที่แข็งแกร่ง"
 subclass_commander_governor_hive: "$subclass_commander_governor$"
 subclass_commander_governor_hive_desc: "$subclass_commander_governor_desc$"
 subclass_commander_governor_machine: "$subclass_commander_governor$"
 subclass_commander_governor_machine_desc: "$subclass_commander_governor_desc$"

 subclass_commander_councilor:0 "นักยุทธศาสตร์"
 subclass_commander_councilor_desc:0 "นักยุทธศาสตร์ให้ความสำคัญกับภาพรวม แทนที่จะนำการสู้รบในสนามรบแนวหน้า พวกเขาชอบที่จะรักษาความสามัคคีในกองทัพและวางแผนสงครามที่ครอบคลุมทั่วดาราจักรมากกว่า"
 subclass_commander_councilor_hive:0 "$subclass_commander_councilor$"
 subclass_commander_councilor_hive_desc:0 "$subclass_commander_councilor_desc$"
 subclass_commander_councilor_machine:0 "$subclass_commander_councilor$"
 subclass_commander_councilor_machine_desc:0 "$subclass_commander_councilor_desc$"

 ## Official
 subclass_official_delegate: "ผู้แทน"
 subclass_official_delegate_desc: "ในฐานะโฉมหน้าต่อสาธารณะของจักรวรรดิกาแล็กติก ผู้แทนทำหน้าที่รักษาผลประโยชน์ของเราในสมาพันธ์ดาราจักรและในประชาคมกาแล็กติก"
 subclass_official_delegate_hive: "ผู้แทน"
 subclass_official_delegate_hive_desc: "$subclass_official_delegate_desc$"
 subclass_official_delegate_machine: "ผู้แทน"
 subclass_official_delegate_machine_desc: "$subclass_official_delegate_desc$"

 subclass_official_diplomacy_councilor: "เอกอัครราชทูต"
 subclass_official_diplomacy_councilor_desc: "เอกอัครราชทูตทำหน้าที่รักษาความสัมพันธ์ของเรากับจักรวรรดิอื่นๆ ทั้งอย่างเปิดเผยและอย่างลับๆ ศิลปะแห่งการทูตและศาสตร์แห่งการจารกรรมล้วนอยู่ในขอบเขตความรับผิดชอบของพวกเขา"
 subclass_official_diplomacy_councilor_hive: "$subclass_official_diplomacy_councilor$"
 subclass_official_diplomacy_councilor_hive_desc: "$subclass_official_diplomacy_councilor_desc$"
 subclass_official_diplomacy_councilor_machine: "$subclass_official_diplomacy_councilor$"
 subclass_official_diplomacy_councilor_machine_desc: "$subclass_official_diplomacy_councilor_desc$"

 subclass_official_governor:0 "นักอุตสาหกรรม"
 subclass_official_governor_desc:1 "ความรู้และทักษะในการรักษาโควตาการผลิตหรือการจัดซื้อวัสดุนั้นเกิดขึ้นตามธรรมชาติสำหรับผู้นำคนนี้"
 subclass_official_governor_hive:0 "ผู้ตรวจการผลิต"
 subclass_official_governor_hive_desc:2 "[owner.GetIndividualName] นี้ได้รับการเพาะพันธุ์มาโดยเฉพาะเพื่อเป็นแนวทางให้ผู้อื่นในกระบวนการผลิต"
 subclass_official_governor_machine:0 "ลูปประสิทธิภาพ"
 subclass_official_governor_machine_desc:1 "ยูนิตนี้ติดตั้งระบบเพื่อแยกและตัดรูปแบบการผลิตที่ไม่มีประสิทธิภาพออกไป"

 subclass_official_economy_councilor:0 "ที่ปรึกษา"
 subclass_official_economy_councilor_desc:1 "งบประมาณของจักรวรรดิอยู่ในมือของที่ปรึกษาของเรา ซึ่งเป็นผู้นำกลุ่มหนึ่งที่มีความเชี่ยวชาญเป็นพิเศษในทฤษฎีเศรษฐศาสตร์"
 subclass_official_economy_councilor_hive:0 "$subclass_official_economy_councilor$"
 subclass_official_economy_councilor_hive_desc:1 "$subclass_official_economy_councilor_desc$"
 subclass_official_economy_councilor_machine:0 "$subclass_official_economy_councilor$"
 subclass_official_economy_councilor_machine_desc:1 "$subclass_official_economy_councilor_desc$"

 ## Scientist
 subclass_scientist_explorer:0 "นักสำรวจ"
 subclass_scientist_explorer_desc:1 "การสำรวจโลกที่ไม่รู้จัก การบันทึกข้อมูลสิ่งมีชีวิตสายพันธุ์ใหม่ และการเผชิญหน้ากับอารยธรรมใหม่ๆ: ผู้นำคนนี้คือศูนย์รวมของอุดมคติดังกล่าว"
 subclass_scientist_explorer_hive:0 "นักสำรวจ"
 subclass_scientist_explorer_hive_desc:1 "การสำรวจโลกที่ไม่รู้จัก การบันทึกข้อมูลสิ่งมีชีวิตสายพันธุ์ใหม่ และการเผชิญหน้ากับอารยธรรมใหม่ๆ: คือแรงผลักดันชั้นนำของ [owner.GetIndividualName] ผู้กล้าหาญคนนี้"
 subclass_scientist_explorer_machine:0 "นักสำรวจ"
 subclass_scientist_explorer_machine_desc:1 "การสำรวจโลกที่ไม่รู้จัก การบันทึกข้อมูลสิ่งมีชีวิตสายพันธุ์ใหม่ และการเผชิญหน้ากับอารยธรรมใหม่ๆ: คือการโปรแกรมหลักของยูนิตที่กล้าหาญนี้"

 subclass_scientist_scholar: "นักวิชาการ"
 subclass_scientist_scholar_desc: "ดาราจักรเต็มไปด้วยความลึกลับ และนักวิชาการมีอยู่เพื่อไขปริศนาเหล่านั้น นักวิจัยผู้รักการผจญภัยเหล่านี้มีความเป็นเลิศในการศึกษาแหล่งขุดค้น วัตถุแปลกประหลาดในอวกาศ และปริศนาอื่นๆ"
 subclass_scientist_scholar_hive: "$subclass_scientist_scholar$"
 subclass_scientist_scholar_hive_desc: "$subclass_scientist_scholar_desc$"
 subclass_scientist_scholar_machine: "$subclass_scientist_scholar$"
 subclass_scientist_scholar_machine_desc: "$subclass_scientist_scholar_desc$"

 subclass_scientist_governor:0 "นักวิเคราะห์"
 subclass_scientist_governor_desc:0 "การอยู่แถวหน้าของวงการวิทยาศาสตร์ การดำเนินการทดลอง และการวิจัยเทคโนโลยีใหม่ๆ เพื่อยกระดับจักรวรรดิคือความกังวลหลักของนักวิเคราะห์ผู้มุ่งมั่นทุกคน"
 subclass_scientist_governor_hive:0 "นักวิเคราะห์"
 subclass_scientist_governor_hive_desc:2 "การอยู่แถวหน้าของวิทยาศาสตร์ การดำเนินการทดลอง และการวิจัยเทคโนโลยีใหม่ๆ เพื่อปรับปรุง [owner.GetGestaltEntityName] ให้ดียิ่งขึ้น คือหน้าที่หลักของ [owner.GetIndividualName] ผู้วิเคราะห์"
 subclass_scientist_governor_machine:0 "นักวิเคราะห์"
 subclass_scientist_governor_machine_desc:1 "การอยู่แถวหน้าของวิทยาศาสตร์ การดำเนินการทดลอง และการวิจัยเทคโนโลยีใหม่ๆ เพื่อปรับปรุงประสิทธิภาพการทำงาน คือสิ่งที่กังวลหลักสำหรับยูนิตวิเคราะห์ที่มุ่งมั่นทุกคน"

 subclass_scientist_councilor: "นักสถิติ"
 subclass_scientist_councilor_desc: "นักสถิติคือกำลังสำคัญที่อยู่เบื้องหลังการจัดการทีมวิจัยและโครงการวิจัย ด้วยการให้ความสำคัญกับเทคโนโลยีใหม่ๆ บุคคลเหล่านี้แสวงหาความรู้อย่างไม่หยุดยั้ง"
 subclass_scientist_councilor_hive: "นักสถิติ"
 subclass_scientist_councilor_hive_desc: "นักสถิติคือกำลังสำคัญที่อยู่เบื้องหลังการจัดการทีมวิจัยและโครงการวิจัย พวกเขาแสวงหาความรู้อย่างไม่รู้จักเหน็ดเหนื่อย"
 subclass_scientist_councilor_machine: "นักสถิติ"
 subclass_scientist_councilor_machine_desc: "$subclass_scientist_councilor_hive_desc$"


 ### TRAITS

 leader_trait_ignore_leader_cap_tt: "ไม่นับรวมในขีดจำกัดจำนวนผู้นำ"

 leader_trait_scout:0 "สอดแนม"
 leader_trait_scout_desc:2 "ผู้นำคนนี้เป็นผู้เชี่ยวชาญด้านการลาดตระเวน โดยมีทักษะทางเทคนิคในการหลบหลีกแม้กระทั่งสิ่งมีชีวิตที่เป็นอันตรายที่สุด"
 leader_trait_scout_hive:0 "สอดแนม"
 leader_trait_scout_hive_desc:1 "[owner.GetIndividualName] นี้มีความเชี่ยวชาญเป็นพิเศษในการลาดตระเวน ช่วยให้มั่นใจว่าเราได้รับประโยชน์สูงสุดจากเซนเซอร์ยานอวกาศระยะไกล"
 leader_trait_scout_machine:0 "สอดแนม"
 leader_trait_scout_machine_desc:1 "ยูนิตนี้มีความเชี่ยวชาญเป็นพิเศษในการลาดตระเวน ช่วยให้มั่นใจว่าเราได้รับประโยชน์สูงสุดจากเซนเซอร์ยานอวกาศระยะไกล"

 leader_trait_restore_point:1 "แคปซูลหลบภัย"
 leader_trait_restore_point_desc:1 "ผู้นำที่ระมัดระวังตัวมากเกินไปคนนี้ได้ดัดแปลงยานของ [Root.GetHimHer] เพื่อสั่งการยานจากแคปซูลหลบภัย ช่วยให้ [Root.GetHimHer] สามารถละทิ้งยานได้ทันทีเมื่อมีสัญญาณอันตรายครั้งแรก"
 leader_trait_restore_point_effect: "ผู้นำจะไม่เสียชีวิตเมื่อกองเรือถูกทำลาย"

 leader_trait_academia_recruiter:1 "ผู้สรรหาบุคลากรทางวิชาการ"
 leader_trait_academia_recruiter_desc:1 "ที่สถาบันวิชาการของเรา ผู้สรรหาบุคลากรต่างกำลังยกย่องคุณประโยชน์ของการรับใช้ชาติในกองทัพให้แก่สมองที่ดีที่สุดและสว่างไสวที่สุดของเรา ประสบการณ์จริงที่ได้รับจากสมรภูมินั้นไม่สามารถสอนได้ในห้องเรียน และควรนำไปสู่ความก้าวหน้าทางวิศวกรรมและเทคโนโลยี"
 leader_trait_academia_recruiter_effect:1 "ขีดจำกัดกองทัพเรือจากตำแหน่งงานนักวิจัย: §G+1§!"

 leader_trait_selfcare_expert: "โคลนเพาะเลี้ยงจากแท็งก์"
 leader_trait_selfcare_expert_desc: "โคลนที่เพาะในแท็งก์ซึ่งมีทักษะ บุคลิกภาพ และความประพฤติเดียวกันจะเข้ามาแทนที่ผู้นำคนนี้หลังจากเสียชีวิต"
 leader_trait_selfcare_expert_machine: "สำเนาสำรอง"
 leader_trait_selfcare_expert_machine_desc: "สำเนาหุ่นยนต์ที่มีทักษะ บุคลิกภาพ และความประพฤติเดียวกันจะเข้ามาแทนที่ผู้นำคนนี้หลังจาก [Root.GetHeShe] หยุดทำงาน"
 leader_trait_selfcare_expert_hive: "โคลน [owner.GetIndividualNameCap]"
 leader_trait_selfcare_expert_hive_desc: "[owner.GetIndividualName] ที่เพาะในแท็งก์ซึ่งมีทักษะ บุคลิกภาพ และความประพฤติเดียวกันจะเข้ามาแทนที่ผู้นำคนนี้หลังจากเสียชีวิต"
 leader_trait_selfcare_expert_effect: "เมื่อเสียชีวิต: สร้างสำเนาของผู้นำที่มีทักษะและระดับเท่าเดิม และมีอายุลดลงเหลือครึ่งหนึ่งของอายุขัยปัจจุบัน"

 leader_trait_midas_touch:0 "นักเล่าเรื่องที่มีชีวิตชีวา"
 leader_trait_midas_touch_desc:1 "ผู้นำคนนี้เดินทางไปต่างแดนบ่อยครั้งและได้เห็นสถานที่ที่น่าทึ่งและห่างไกล การผจญภัยของ [Root.GetHisHer] เป็นแรงบันดาลใจให้แก่ประชากร มอบข้อมูลเชิงลึกที่มีค่าเกี่ยวกับทรัพยากรหายากและการเกิดเหตุการณ์ผิดปกติ"
 leader_trait_midas_touch_effect:4 "เมื่อทำการวิจัยสิ่งผิดปกติใดๆ:\n$tt$$scientist_plural_with_icon$ ทั้งหมดได้รับค่าประสบการณ์ §G+300§!"

 leader_trait_speed_chaser: "ผู้ไล่ล่าความเร็ว"
