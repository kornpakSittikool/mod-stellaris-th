l_english:
# Pre-FTL Stances
# Resolutions
 resolution_category_pre_ftl_stances:1 "ท่าทีต่ออารยธรรมดึกดำบรรพ์ก่อน FL"
 resolution_pre_ftl_stances_repeal_1:0 "§Rยกเลิก $resolution_pre_ftl_stances_equal_standing$§!"
 resolution_pre_ftl_stances_repeal_1_desc:1 "การปฏิบัติต่ออารยธรรมที่แทบยังไม่สามารถออกจากโลกบ้านเกิดของตนเองได้ในฐานะผู้เท่าเทียมนั้นเป็นแนวคิดที่เหลวไหล จักรวรรดิต่างๆ ของ [global_event_country.GetGalCommunityOrGalImperium] ควรได้รับอนุญาตให้ปฏิบัติต่ออารยธรรมระดับต่ำภายในพรมแดนของตนตามที่เห็นสมควร"
 resolution_pre_ftl_stances_repeal_1_effect_success:1 "ยกเลิกมติ §Y$resolution_pre_ftl_stances_equal_standing$§!"

 resolution_pre_ftl_stances_repeal_2:0 "§Rยกเลิก $resolution_pre_ftl_stances_non_interference$§!"
 resolution_pre_ftl_stances_repeal_2_desc:1 "การห้ามจักรวรรดิของ [global_event_country.GetGalCommunityOrGalImperium] ใช้ทรัพยากรที่โดยชอบธรรมแล้วเป็นของพวกเขา เพียงเพราะพวกคนป่าเถื่อนมาจับจองอยู่ เป็นการละเมิดสิทธิทางทรัพย์สินและสิทธิทางปัญญาของเรา"
 resolution_pre_ftl_stances_repeal_2_effect_success:1 "ยกเลิกมติ §Y$resolution_pre_ftl_stances_non_interference$§!"

 resolution_pre_ftl_stances_repeal_3:1 "§Rยกเลิก $resolution_pre_ftl_stances_exploitation$§!"
 resolution_pre_ftl_stances_repeal_3_desc:1 "การปฏิบัติต่ออีกอารยธรรมหนึ่งเพียงในฐานะแหล่งทรัพยากรสำหรับขูดรีด เพียงเพราะระดับเทคโนโลยีปัจจุบันของพวกเขา เป็นสิ่งที่น่ารังเกียจ จักรวรรดิของ [global_event_country.GetGalCommunityOrGalImperium] ควรรับประกันว่าอารยธรรมที่จะติดตามเราออกสู่ดวงดาวจะได้รับสิทธิเดียวกันกับสายพันธุ์อื่น"
 resolution_pre_ftl_stances_repeal_3_effect_success:1 "ยกเลิกมติ §Y$resolution_pre_ftl_stances_exploitation$§!"

 resolution_pre_ftl_stances_equal_standing:1 "ปฏิบัติอย่างเท่าเทียมกัน"
 resolution_pre_ftl_stances_equal_standing_desc:1 "อารยธรรมก่อนความเร็วทุกแห่งมีศักยภาพที่จะบรรลุการเดินทางอวกาศและเข้าร่วม [global_event_country.GetGalCommunityOrGalImperium] ดังนั้น เราจึงต้องปฏิบัติต่อสมาชิกในอนาคตด้วยศักดิ์ศรีและความเคารพ"
 resolution_pre_ftl_stances_equal_standing_tooltip:1 "นโยบาย §Y$interference_not_allowed$§! และ §Y$interference_aggressive$§! จะถูก §Rห้าม§!.\nเพิ่มประสิทธิภาพของข้อตกลงทางการทูต §Y$ACTION_OPEN_TECHNOLOGICAL_ENLIGHTENMENT_TITLE$§! กับอารยธรรมพรี-FTL\n§Yแก้ไขลวดลายจุดเชื่อมต่อรอยแยกแอสทรัล§! ที่ก้าวสู่อวกาศผ่าน §Y$ACTION_OPEN_TECHNOLOGICAL_ENLIGHTENMENT_TITLE$§! จะได้รับ §G+100§! £loyalty£ §Yความซื่อสัตย์§!.\n§Yข้อ ตก ลง ทาง ธุรกิจ§! กับอารยธรรมก่อนหน้า FTL จะมีประสิทธิภาพมากขึ้น"

 resolution_pre_ftl_stances_non_interference:1 "ไม่แทรกแซง"
 resolution_pre_ftl_stances_non_interference_desc:1 "อารยธรรมก่อน FL ควรได้รับโอกาสในการพัฒนาโดยปราศจากการแทรกแซงจากภายนอก"
 resolution_pre_ftl_stances_non_interference_tooltip:1 "นโยบาย §Y$interference_active$§! และ §Y$interference_aggressive$§! จะถูก §Rห้าม§!.\nมอบสิทธิ์เข้าถึงนโยบาย §Y$interference_not_allowed$§! โดยไม่ขึ้นกับจริยธรรมหรือซิฟิค\n§Yข้อ ตก ลง ด้าน จริยธรรม§! ทั้งหมดกับอารยธรรมก่อน FL จะถือว่าเป็นการ §Rละเมิดกฎหมายกาแล็กติก§!.\n§Yปฏิบัติการความแหลม:§! ที่ล้มเหลวและมุ่งเป้าไปที่อารยธรรมก่อน FL จะถือว่าเป็นการ §Rละเมิดกฎหมายกาแล็กติก§!."

 resolution_pre_ftl_stances_non_interference_modifier:0 "ความคืบหน้า §Yการ หยั่ง เห็น§! จากการสังเกตอารยธรรมก่อน FL เพิ่มขึ้น §G+25%§!."

 resolution_pre_ftl_stances_exploitation:1 "แสวงหาผลประโยชน์"
 resolution_pre_ftl_stances_exploitation_desc:1 "โลกก่อน FL ย่อมอยู่ภายใต้เขตอำนาจของผู้ที่ควบคุมระบบของพวกเขา และแต่ละจักรวรรดิควรมีเสรีภาพที่จะปฏิบัติต่อทรัพย์สินของตนตามที่เห็นสมควร"
 resolution_pre_ftl_stances_exploitation_tooltip:1 "โพสต์ความ อ ยุติธรรมจะผลิต £physics£ £engineering£ §Hจุดวิจัย§! จำนวนเล็กน้อยขณะ §Yการสังเกต§! อารยธรรมก่อน FL การผ่านมติ §Y$resolution_galacticstudies_advanced_xenostudies$§! จะเพิ่ม §Hจุดวิจัย§! ที่ได้รับนี้.\n\nนโยบาย §Y$interference_not_allowed$§! จะถูก §Rห้าม§!.\nการใช้ข้อตกลงทางการทูต §Y$ACTION_OPEN_TECHNOLOGICAL_ENLIGHTENMENT_TITLE$§! กับอารยธรรมก่อน FL จะถือว่าเป็นการ §Rละเมิดกฎหมายกาแล็กติก§!.\nหลักฐานว่ามีการดำเนินการจารกรรม §Y$operation_plant_advanced_knowledge$§! จะถือว่าเป็นการ §Rละเมิดกฎหมายกาแล็กติก§!."

# Events
 preftl.10000.desc:0 "[global_event_country.GetGalCommunityOrGalImperium] ได้ผ่านมติ §Y$resolution_pre_ftl_stances_equal_standing$§! ซึ่งห้ามจักรวรรดิต่างๆ ใช้นโยบาย §Y$interference_not_allowed$§! หรือ §Y$interference_aggressive$§!.\n\nขณะนี้จักรวรรดิของเรากำลังละเมิดมตินี้ เราควรเปลี่ยนนโยบายของเราให้สอดคล้องหรือไม่?"
 preftl.10050.name:0 "ละเมิด $resolution_pre_ftl_stances_equal_standing$"
 preftl.10050.desc:0 "เจ้าหน้าที่จาก [global_event_country.GetGalCommunityOrGalImperium] ได้ตัดสินว่าการปฏิบัติของเราต่อ §H[pre_ftl_country.GetName]§! เป็นการละเมิด §Y$resolution_pre_ftl_stances_equal_standing$§! ไม่ว่าเจตนาของเราจะเป็นเช่นไรก็ตาม\n\n$preftl.10050.outro$"
 preftl.10050.outro:0 "[Root.GetName] จะถูกถือว่าอยู่ใน §Rการ ละเมิด กฎหมาย กาแลกติก§! เป็นเวลา 10 ปีข้างหน้า นอกจากนี้ เรายังถูกปรับเป็นจำนวนมาก"

 preftl.10055.name:0 "ละเมิด $resolution_pre_ftl_stances_equal_standing$"
 preftl.10055.desc:0 "หลังจากที่เราละเมิด §Y$resolution_pre_ftl_stances_equal_standing$§! อันเนื่องมาจากการปฏิบัติต่อ §H[pre_ftl_country.GetName]§! เราได้ยื่นเอกสารที่จำเป็นต่อเจ้าหน้าที่ของ [global_event_country.GetGalCommunityOrGalImperium] แล้ว หวังว่าการยอมรับการกระทำของเราจะทำให้พวกเขาผ่อนปรนมากขึ้น\n\n$preftl.10055.outro$"
 preftl.10055.outro:0 "[Root.GetName] จะถูกถือว่าอยู่ใน §Rการ ละเมิด กฎหมาย กาแลกติก§! เป็นเวลา 5 ปีข้างหน้า นอกจากนี้ เรายังถูกปรับเป็นจำนวนมาก"

 preftl.10100.desc:0 "[global_event_country.GetGalCommunityOrGalImperium] ได้ผ่านมติ §Y$resolution_pre_ftl_stances_non_interference$§! ซึ่งห้ามจักรวรรดิต่างๆ ใช้นโยบาย §Y$policy_interference$§! ใดๆ ยกเว้น §Y$interference_not_allowed$§!.\n\nขณะนี้จักรวรรดิของเรากำลังละเมิดมตินี้ เราควรเปลี่ยนนโยบายของเราให้สอดคล้องหรือไม่?"
 preftl.10150.name:0 "ละเมิด $resolution_pre_ftl_stances_non_interference$"
 preftl.10150.desc:0 "เจ้าหน้าที่จาก [global_event_country.GetGalCommunityOrGalImperium] ได้รับรายงานเกี่ยวกับการแทรกแซงของเราต่อการพัฒนาตามธรรมชาติของ §H[pre_ftl_country.GetName]§! พวกเขาแจ้งเราว่านี่เป็นการละเมิด §Y$resolution_pre_ftl_stances_non_interference$§! อย่างชัดเจน ไม่ว่าเจตนาของเราจะเป็นเช่นไรก็ตาม\n\n$preftl.10050.outro$"

 preftl.10155.name:0 "ละเมิด $resolution_pre_ftl_stances_non_interference$"
 preftl.10155.desc:0 "เราได้ยื่นรายงานฉบับสมบูรณ์ต่อเจ้าหน้าที่ของ [global_event_country.GetGalCommunityOrGalImperium] หลังจากที่เราละเมิด §Y$resolution_pre_ftl_stances_non_interference$§! ใน §H[pre_ftl_country.GetName]§! หวังว่าการเปิดเผยผิดโดยสมัครใจนี้จะทำให้อัยการมองเราในแง่ดี และอาจพิจารณาคดีของเราอย่างผ่อนปรนยิ่งขึ้น"

 preftl.10157.desc:0 "การรุกรานโลกบ้านเกิดของ §H[pre_ftl_country.GetAdj]§! โดยเราได้ถูก [global_event_country.GetGalCommunityOrGalImperium] รับทราบแล้ว พวกเขาแจ้งเราว่านี่เป็นการละเมิด §Y$resolution_pre_ftl_stances_non_interference$§! อย่างชัดเจน\n\n$preftl.10050.outro$"
 preftl.10161.desc:0 "การทิ้งระเบิดใส่โลกบ้านเกิดของ §H[pre_ftl_country.GetAdj]§! โดยเราได้ถูก [global_event_country.GetGalCommunityOrGalImperium] รับทราบแล้ว พวกเขาแจ้งเราว่านี่เป็นการละเมิด §Y$resolution_pre_ftl_stances_non_interference$§! อย่างชัดเจน\n\n$preftl.10050.outro$"

 preftl.10200.desc:1 "[global_event_country.GetGalCommunityOrGalImperium] ได้ผ่านมติ §Y$resolution_pre_ftl_stances_exploitation$§! ซึ่งห้ามจักรวรรดิต่างๆ ใช้นโยบาย §Y$interference_not_allowed$§!.\n\nขณะนี้จักรวรรดิของเรากำลังละเมิดมตินี้ เราควรเปลี่ยนนโยบายของเราให้สอดคล้องหรือไม่?"
 preftl.10250.name:0 "ละเมิด $resolution_pre_ftl_stances_exploitation$"
 preftl.10250.desc:0 "เจ้าหน้าที่จาก [global_event_country.GetGalCommunityOrGalImperium] ได้รับรายงานว่าเราแบ่งปันข้อมูลทางเทคโนโลยีให้แก่ §H[pre_ftl_country.GetName]§! พวกเขาแจ้งเราว่านี่เป็นการละเมิด §Y$resolution_pre_ftl_stances_exploitation$§! อย่างชัดเจน ไม่ว่าเจตนาของเราจะเป็นเช่นไรก็ตาม\n\n$preftl.10050.outro$"

 preftl.10255.name:0 "ละเมิด $resolution_pre_ftl_stances_exploitation$"
 preftl.10255.desc:0 "เราได้ยื่นรายงานฉบับสมบูรณ์ต่อเจ้าหน้าที่ของ [global_event_country.GetGalCommunityOrGalImperium] หลังจากที่เราละเมิด §Y$resolution_pre_ftl_stances_exploitation$§! ใน §H[pre_ftl_country.GetName]§! หวังว่าการเปิดเผยผิดโดยสมัครใจนี้จะทำให้อัยการมองเราในแง่ดี และอาจพิจารณาคดีของเราอย่างผ่อนปรนยิ่งขึ้น"

 pre_ftl_stances_fix_breach_not_allowed:1 "เราจะเปลี่ยนนโยบาย §Y$policy_interference$§! ของเราเป็น §Y$interference_not_allowed$§!."
 pre_ftl_stances_fix_breach_subtle:1 "เราจะเปลี่ยนนโยบาย §Y$policy_interference$§! ของเราเป็น §Y$interference_subtle$§!."
