  # Chapter 1
 HELP_TUTORIAL_SURVEYING_TITLE:0 "การสำรวจระบบสุริยะ"
 HELP_TUTORIAL_SURVEYING_DESC:1 "การ§Sสำรวจ§!ระบบสุริยะอื่นๆ คือวิธีที่มีประสิทธิภาพในการสำรวจกาแล็กซี ขณะ§Sสำรวจ§!ระบบอื่น คุณอาจค้นพบ £planet£ §Sดาวเคราะห์§! เพิ่มเติมและ §Sทรัพยากร§! ที่เป็นไปได้ \n\nหากต้องการสำรวจระบบ ให้ไปที่ §Sแผนที่กาแล็กซี§! (£m£), เลือก £science_ship£ §Sยานวิทยาศาสตร์§! แล้วเลือกขวาที่ระบบใกล้เคียงและเลือก \"สำรวจระบบ\"."
 HELP_TUTORIAL_SURVEYING_INSTRUCTIONS:0 "§Y1.§! เลือกยานวิทยาศาสตร์\n§Y2.§! มอบหมายนักวิทยาศาสตร์ให้ยาน หากยังไม่มี\n§Y3.§! เลือกขวาที่ลูกศรซึ่งชี้ไปยังระบบใกล้เคียง\n§Y4.§! เลือก \"สำรวจระบบ\""
  # If player has a science ship, then select and pan to it when clicked (if more than 1, select the first one). Else, disable button with tooltip "You have no science ships."
 HELP_TUTORIAL_SURVEYING_ACTION:0 "ไปที่ยานวิทยาศาสตร์"
 HELP_TUTORIAL_ANOMALIES_TITLE:0 "การศึกษาอะโนมาลี"
 HELP_TUTORIAL_ANOMALIES_DESC:0 "§Sอะโนมาลี§! คือสิ่งน่าสงสัยที่คุณอาจพบขณะ§Sสำรวจ§!ระบบอื่น การวิจัยสิ่งเหล่านี้มัก (แต่ไม่เสมอไป) ก่อให้เกิดเหตุการณ์ที่เป็นประโยชน์ต่อ§Sจักรวรรดิ§!ของคุณ \n\nเวลาที่ใช้ในการ§Sวิจัย§!อะโนมาลีขึ้นอยู่กับระดับความยากและทักษะของ§Sนักวิทยาศาสตร์§!ที่ได้รับมอบหมาย คุณสามารถใช้ §Sบันทึกสถานการณ์§! (£f2£) ในเมนูนำทางด้านซ้ายเพื่อกลับไปยัง §Sอะโนมาลี§! ที่คุณยังไม่ได้วิจัย"
 HELP_TUTORIAL_ANOMALIES_INSTRUCTIONS:0 "§Y1.§! สำรวจระบบรอบตัวเพื่อหาอะโนมาลี\n§Y2.§! เปิดบันทึกสถานการณ์จากแถบนำทางด้านซ้าย\n§Y3.§! เลือกอะโนมาลีที่พร้อมใช้งานและมอบหมายนักวิทยาศาสตร์ไปศึกษา"
 HELP_TUTORIAL_ANOMALIES_ACTION:0 "เปิดบันทึกสถานการณ์"
 HELP_TUTORIAL_TECHNOLOGY_TITLE:0 "การวิจัยเทคโนโลยี"
 HELP_TUTORIAL_TECHNOLOGY_DESC:0 "เทคโนโลยีถูกแบ่งออกเป็น 3 สาขา: \n£physics£ §Sฟิสิกส์§!, £society£ §Sสังคม§!, และ £engineering£ §Sวิศวกรรม§!. \n\nคุณสามารถวิจัยเทคโนโลยีในแต่ละสาขาพร้อมกันได้ \nความเร็วในการ§Sวิจัย§!ของคุณขึ้นอยู่กับปริมาณ§Sงานวิจัย§!ที่จักรวรรดิผลิต ซึ่งมาจาก £building£ §Sสิ่งปลูกสร้าง§! และ £district£ §Sเขต§! บน £planet£ §Sดาวเคราะห์§! ที่ตั้งอาณานิคมแล้ว รวมถึง §Sสถานีวิจัย§! ในระบบดาวที่คุณครอบครอง"
 HELP_TUTORIAL_TECHNOLOGY_INSTRUCTIONS:1 "§Y1.§! เปิด $topbar_button_technology_name$ จากแถบนำทางด้านซ้าย\n§Y2.§! เลือกช่องว่างช่องใดก็ได้ แล้วเลือกเทคโนโลยีหนึ่งรายการจากรายการเพื่อเริ่มวิจัย"
 HELP_TUTORIAL_TECHNOLOGY_ACTION:0 "เปิดหน้าต่างเทคโนโลยี"
 HELP_TUTORIAL_SPACE_STATION_TITLE:0 "การขยายอำนาจด้วยฐานดาว"
 HELP_TUTORIAL_SPACE_STATION_DESC:0 "วิธีที่มีประสิทธิภาพที่สุดในการขยายพรมแดนของจักรวรรดิคือการสร้าง §Sฐานดาว§! (ด่านหน้า) ซึ่งทำได้เฉพาะในระบบที่ถูก§Sสำรวจ§!แล้วเท่านั้น \n\nหากต้องการสร้างฐานดาว ให้สั่ง £construction_ship£ §Sยานก่อสร้าง§! ให้สร้าง §Sฐานดาว§! การมีอยู่ของ §Sฐานดาว§! ยังเปิดทางให้สร้าง §Sสถานีวิจัย§! และ §Sสถานีขุดเหมือง§! เพิ่มเติม รวมถึงตั้งอาณานิคมบน £planet£ §Sดาวเคราะห์§! ที่อยู่อาศัยได้ภายในระบบนั้น"
 HELP_TUTORIAL_SPACE_STATION_INSTRUCTIONS:2 "§Y1.§! เปิดมุมมองกาแล็กซีโดยเลือกปุ่มที่กึ่งกลางด้านล่างของหน้าจอ\n§Y2.§! เลือกยานก่อสร้างจากปุ่มบริเวณด้านล่างซ้ายของหน้าจอ\n§Y3.§! เลือกขวาที่ระบบที่ยังไม่มีผู้ครอบครองแล้วเลือก \"สร้างด่านหน้า\""
  # If player has a construction ship, then select and pan to it when clicked (if more than 1, select the first one). Else, disable button with tooltip "You have no construction ships."
 HELP_TUTORIAL_SPACE_STATION_ACTION:0 "ไปที่ยานก่อสร้าง"
 HELP_TUTORIAL_COLONIZATION_TITLE:0 "การตั้งอาณานิคมบนดาวเคราะห์"
 HELP_TUTORIAL_COLONIZATION_DESC:0 "การตั้งอาณานิคมบนดาวเคราะห์อื่นทำให้ £pop£ §Sประชากร§! ของคุณกระจายออกไปไกลกว่าดาวเริ่มต้น และเปิดให้คุณเข้าถึง §Sทรัพยากร§! มากขึ้นสำหรับ§Sจักรวรรดิ§!ของคุณ £planet£ §Sดาวเคราะห์§! บางดวงอยู่อาศัยได้ดีกว่าดวงอื่นโดยทั่วไป ดังนั้นควรพิจารณาให้ดีว่าจะส่ง £colony_ship£ §Sอาณานิคม§! ใหม่ไปตั้งรกรากที่ใด \n\nการตั้งอาณานิคมบนดาวเคราะห์ที่อยู่อาศัยได้จะทำได้ก็ต่อเมื่อมันอยู่ภายในพรมแดนของจักรวรรดิ และถูกสำรวจโดย £science_ship£ §Sยานวิทยาศาสตร์§! แล้ว"
 HELP_TUTORIAL_COLONIZATION_INSTRUCTIONS:1 "§Y1.§! เลือกอู่ยานของคุณในแถบสรุป (ด้านขวาของหน้าจอ)\n§Y2.§! เลือกแท็บอู่ยานที่ด้านล่างของหน้าต่างอู่ยาน\n§Y3.§! สร้างยานอาณานิคม\n§Y4.§! เลือกดาวเคราะห์ที่อยู่อาศัยได้แล้วเลือก \"ตั้งอาณานิคม\""
  # If player has found a habitable planet, then select and pan to it when clicked (if more than 1, select the first one). Else, disable button with tooltip "You have not found any habitable planet".
 HELP_TUTORIAL_COLONIZATION_ACTION:0 "ไปที่ดาวเคราะห์ที่อยู่อาศัยได้"
 HELP_TUTORIAL_EXCAVATION_TITLE:0 "การขุดค้นแหล่งโบราณคดี"
 HELP_TUTORIAL_EXCAVATION_DESC:0 "£archaeology£ §Sแหล่งโบราณคดี§! สามารถถูกค้นพบได้ขณะ§Sสำรวจ§! หรือถูกเปิดเผยหลังจากมีการตั้งอาณานิคมบน £planet£ §Sดาวเคราะห์§! แล้ว \n\nตราบใดที่ §Sแหล่งโบราณคดี§! อยู่ภายในพรมแดนของ§Sจักรวรรดิ§! จักรวรรดินั้นก็สามารถสั่ง £science_ship£ §Sยานวิทยาศาสตร์§! ให้ขุดค้นแหล่งดังกล่าวได้ ระยะเวลาของการขุดค้นขึ้นอยู่กับระดับความยากของ §Sแหล่งโบราณคดี§!"
 HELP_TUTORIAL_EXCAVATION_INSTRUCTIONS:2 "§Y1.§! เปิดบันทึกสถานการณ์จากแถบนำทางด้านซ้าย หรือกดปุ่ม F2\n§Y2.§! ในบันทึกสถานการณ์ ให้เลือกหนึ่งในโครงการโบราณคดี (ไอคอนพลั่วปักกองดิน)\n§Y3.§! ใช้ปุ่ม \"ไปที่\" เพื่อย้ายไปยังแหล่งโบราณคดี\n§Y4.§! เลือกยานวิทยาศาสตร์จากปุ่มบริเวณด้านล่างซ้ายของหน้าจอ\n§Y5.§! เลือกขวาที่ไอคอนพลั่วแล้วเลือกตัวเลือก \"ขุดค้นแหล่ง\"\n§Y6.§! เลือกแหล่งโบราณคดี\n§Y7.§! เริ่มโครงการ"
 HELP_TUTORIAL_EXCAVATION_ACTION:0 "เปิดบันทึกสถานการณ์"

  # Chapter 2
 HELP_TUTORIAL_BASIC_RESOURCES_TITLE:0 "ทรัพยากรพื้นฐาน"
 HELP_TUTORIAL_BASIC_RESOURCES_DESC:0 "ทรัพยากรพื้นฐานประกอบด้วย £energy£ §Sเครดิตพลังงาน§!, £minerals£ §Sแร่ธาตุ§! และ £food£ §Sอาหาร§! \n\nทรัพยากรเหล่านี้ผลิตขึ้นเป็นหลักจาก £building£ §Sสิ่งปลูกสร้าง§! บน £planet£ §Sดาวเคราะห์§! ของคุณ หรือจาก §Sสถานีขุดเหมือง§! ทรัพยากรพื้นฐานทั้งหมดจะถูกรวบรวมและสะสมเป็นรายเดือน จึงควรถูกสำรวจ ใช้ประโยชน์ และพัฒนาโดยเร็ว"
 HELP_TUTORIAL_BASIC_RESOURCES_INSTRUCTIONS:1 "§Y1.§! เลือกยานก่อสร้างจากแถบสรุป (ด้านขวาของหน้าจอ)\n§Y2.§! เปิดมุมมองกาแล็กซี (ส่วนล่างของหน้าจอ)\n§Y3.§! เลือกระบบที่คุณครอบครอง แล้วเลือกขวา\n§Y4.§! เลือกสร้างสถานีขุดเหมือง"
 HELP_TUTORIAL_BASIC_RESOURCES_ACTION:0 ""
 HELP_TUTORIAL_ADVANCED_RESOURCES_TITLE:0 "ทรัพยากรขั้นสูง"
 HELP_TUTORIAL_ADVANCED_RESOURCES_DESC:0 "ทรัพยากรขั้นสูงประกอบด้วย £alloys£ §Sโลหะผสม§! และ £consumer_goods£ §Sสินค้าอุปโภคบริโภค§! \nทรัพยากรเหล่านี้ถูกแปรรูปจาก £minerals£ §Sแร่ธาตุ§! โดย £building£ §Sสิ่งปลูกสร้าง§! และ £district£ §Sเขต§! บน £planet£ §Sดาวเคราะห์§! ที่ตั้งอาณานิคมแล้ว \n\n £alloys£ §Sโลหะผสม§! มีการใช้งานด้านการทหาร ซึ่งจำเป็นต่อการสร้างยานและฐานดาว ส่วน £consumer_goods£ §Sสินค้าอุปโภคบริโภค§! หมายถึงอุปกรณ์ ของฟุ่มเฟือย และสินค้าต่างๆ ที่จำเป็นต่อการทำให้ £pop£ §Sประชากร§! ของคุณพึงพอใจ"
 HELP_TUTORIAL_ADVANCED_RESOURCES_INSTRUCTIONS:0 "§Y1.§! เลือกดาวเคราะห์ (ดูได้จากแถบสรุปด้านขวาของหน้าจอ)\n§Y2.§! เลือกช่องสิ่งปลูกสร้างที่ว่างอยู่\n§Y3.§! สร้างโรงหลอมโลหะผสม"
 HELP_TUTORIAL_ADVANCED_RESOURCES_ACTION:0 ""
 HELP_TUTORIAL_ABSTRACT_RESOURCES_TITLE:0 "ทรัพยากรนามธรรม"
 HELP_TUTORIAL_ABSTRACT_RESOURCES_DESC:0 "ทรัพยากรนามธรรมแสดงถึงสินทรัพย์ที่จับต้องไม่ได้อย่าง £influence£ §Sอิทธิพล§! และ £unity£ §Sเอกภาพ§! \n\n£influence£ §Sอิทธิพล§! ได้มาจากการมีจักรวรรดิอื่นเป็น §Sคู่แข่ง§! หรือ §Sรัฐในอารักขา§! อิทธิพลมักถูกใช้ในการขยายพรมแดนผ่าน §Sฐานดาว§! และ §Sสิทธิอ้างสิทธิ์§! หรือใช้ในการประกาศ §Sคำสั่ง§! \n\n£unity£ §Hเอกภาพ§! ได้มาหลักๆ จากสิ่งปลูกสร้างบนดาวเคราะห์ และใช้ในการรับ §Sประเพณี§! ใหม่"
 HELP_TUTORIAL_STRATEGIC_RESOURCES_TITLE:0 "ทรัพยากรยุทธศาสตร์"
 HELP_TUTORIAL_STRATEGIC_RESOURCES_DESC:0 "ทรัพยากรยุทธศาสตร์หายากและจำเป็นต่อการสร้างกับบำรุงรักษาสิ่งปลูกสร้างขั้นสูงและส่วนประกอบของยาน พวกมันหามาได้ยากกว่าทรัพยากรพื้นฐานมาก จึงมีมูลค่าสูงตามไปด้วย แหล่งทรัพยากรยุทธศาสตร์ตามธรรมชาติจะมองเห็นได้เสมอ แต่ต้องใช้ §Sเทคโนโลยี§! เฉพาะจึงจะนำมาใช้ประโยชน์ได้"
 HELP_TUTORIAL_TRADE_VALUE_TITLE:0 "การค้า"
 HELP_TUTORIAL_TRADE_VALUE_DESC:1 "£trade£ §Sการค้า§! เกิดจากกิจกรรมทางเศรษฐกิจในชีวิตประจำวันของพลเรือน \n\nหากเชื่อมต่อกับ £planet£ §Sดาวหลวง§! ของคุณผ่าน §Sเส้นทางการค้า§! ฐานดาวจะมอบ $r_trade$ §Sการค้า§! ของระบบนั้นในรูปแบบ £energy£ §Sเครดิตพลังงาน§!, £consumer_goods£ §Sสินค้าอุปโภคบริโภค§! หรือ £unity£ §Sเอกภาพ§! ตามนโยบายการค้าของ§Sจักรวรรดิ§!"
 HELP_TUTORIAL_TRADE_VALUE_INSTRUCTIONS:2 "§Y1.§! เปิดมุมมองกาแล็กซีโดยเลือกปุ่มที่กึ่งกลางด้านล่างของหน้าจอ\n§Y2.§! เลือกยานก่อสร้างจากแถบสรุป (ด้านขวาของหน้าจอ) หรือจากแท็บด้านล่างซ้าย\n§Y3.§! เลือกขวาที่ระบบที่ยังไม่มีผู้ครอบครองแล้วเลือก \"สร้างด่านหน้า\""
 HELP_TUTORIAL_TRADE_VALUE_ACTION:0 ""
 HELP_TUTORIAL_TRADE_VALUE_DISBLAED_ACTION:0 ""
 HELP_TUTORIAL_PLANET_MANAGEMENT_TITLE:0 "การบริหารดาวเคราะห์"
 HELP_TUTORIAL_PLANET_MANAGEMENT_DESC:0 "การบริหารดาวเคราะห์เกี่ยวข้องกับการสร้าง £district£ §Sเขต§!, การก่อสร้าง £building£ §Sสิ่งปลูกสร้าง§!, การจัดการ £pop£ §Sประชากร§! และการเติบโตของพวกเขา ตลอดจนการจัดตั้งกองกำลังป้องกันดาวเคราะห์ \n\n£planet£ §Sดาวเคราะห์§! เป็นส่วนสำคัญของ§Sจักรวรรดิ§!กาแล็กซี เพราะเป็นแหล่งของ §Sทรัพยากร§! ส่วนใหญ่และ £pop£ §Sประชากร§! ที่จำเป็นต่อการเติบโตและความรุ่งเรืองของ§Sจักรวรรดิ§! "
 HELP_TUTORIAL_PLANET_MANAGEMENT_INSTRUCTIONS:1 "§Y1.§! เลือกดาวเคราะห์ (ดูได้จากแถบสรุปด้านขวาของหน้าจอ)\n§Y2.§! เลือกช่องสิ่งปลูกสร้างที่ว่างอยู่\n§Y3.§! สร้างไซโลทรัพยากร"
 HELP_TUTORIAL_PLANET_MANAGEMENT_ACTION:0 "ไปยังดาวหลวง"
 HELP_TUTORIAL_SHIPS_TITLE:0 "การสร้างยาน"
 HELP_TUTORIAL_SHIPS_DESC:0 "ยานทุกลำจะถูกสร้างและซ่อมแซมที่ §Sฐานดาว§! ซึ่งมี §Sโมดูลอู่ยาน§! ยานถูกแบ่งเป็นยานพลเรือนและยานทหาร \n\nยานพลเรือนประกอบด้วย £science_ship£ §Sยานวิทยาศาสตร์§!, £construction_ship£ §Sยานก่อสร้าง§! และ \n£colony_ship£ §Sยานอาณานิคม§! \n\n§Sยานทหาร§! หมายถึงยานติดอาวุธทั้งหมดของจักรวรรดิ และต่างจากยานพลเรือนตรงที่สามารถจัดรวมเป็น §Sกองยาน§! ซึ่งนำโดย §Sพลเรือเอก§! ได้"
 HELP_TUTORIAL_SHIPS_INSTRUCTIONS:1 "§Y1.§! เลือกอู่ยาน (ดูได้จากแถบสรุปด้านขวาของหน้าจอ)\n§Y2.§! เลือกแท็บอู่ยาน\n§Y3.§! สร้างยานวิทยาศาสตร์"
  # Possibly "cheat" here and simply go to starbase in capital system
  # If player has a starbase with a shipyard, then select and pan to it on click. Else, disable button with tooltip "You have no starbases with a shipyard"
 HELP_TUTORIAL_SHIPS_ACTION:0 "ไปยังฐานดาวที่มีอู่ยาน"

  # Chapter 3
 HELP_TUTORIAL_FIRST_CONTACT_TITLE:0 "การติดต่อครั้งแรก"
 HELP_TUTORIAL_FIRST_CONTACT_DESC:1 "เมื่อพบเผ่าพันธุ์ต่างดาวใหม่เป็นครั้งแรก ผู้แทนของคุณจะต้องผ่านชุดความท้าทายหลายอย่าง วิธีที่คุณเลือกจัดการกับความท้าทายเหล่านี้จะส่งผลต่อทัศนคติของพวกเขาที่มีต่อจักรวรรดิของคุณ"
 HELP_TUTORIAL_FIRST_CONTACT_INSTRUCTIONS:1 "§Y1.§! สำรวจกาแล็กซีต่อไปจนกว่าคุณจะพบจักรวรรดิอื่น\n§Y2.§! ไปที่บันทึกสถานการณ์แล้วเลือกเหตุการณ์การติดต่อ\n§Y3.§! มอบหมายทูตเพื่อสร้างช่องทางการทูตกับอีกจักรวรรดิ"
 HELP_TUTORIAL_FIRST_CONTACT_ACTION:0 "เปิดหน้าต่างการทูต"
 HELP_TUTORIAL_PRIMITIVE_SPECIES_TITLE:1 "การพบเผ่าพันธุ์ก่อนความเร็ว"
 HELP_TUTORIAL_PRIMITIVE_SPECIES_DESC:0 "อารยธรรมบางแห่งยังไม่ได้พัฒนา §Sเทคโนโลยี§! ที่จำเป็นต่อการเดินทางระหว่างดวงดาว ด้วยการสร้าง §Sฐานสังเกตการณ์§! โคจรรอบ £planet£ §Sดาวเคราะห์§! ของพวกเขา คุณสามารถเลือกสังเกตและศึกษาพวกเขาเพื่อรับโบนัสให้กับ £society£ §Sงานวิจัยสังคม§! ของคุณ หรือจะเลือกยกระดับพวกเขาด้วยเทคโนโลยีอันเหนือกว่าของคุณก็ได้ \n\nเผ่าพันธุ์ที่ถูกยกระดับจะกลายเป็นส่วนหนึ่งของจักรวรรดิที่ยกระดับพวกเขา และยังมอบ 500 £influence£ §Sอิทธิพล§! อีกด้วย"
 HELP_TUTORIAL_PRIMITIVE_SPECIES_INSTRUCTIONS:1 "§Y1.§! เลือกยานก่อสร้าง (ดูได้จากแถบสรุปด้านขวาของหน้าจอ)\n§Y2.§! เปิดมุมมองกาแล็กซี (ด้านล่างของหน้าจอ)\n§Y3.§! เลือกขวาที่ระบบซึ่งมีเผ่าพันธุ์ดึกดำบรรพ์อาศัยอยู่\n§Y4.§! เลือกสร้างฐานสังเกตการณ์"
  # If player has met a primitive species, then select its planet when clicked. Else, disable button with tooltip "No primitive species encountered"
 HELP_TUTORIAL_PRIMITIVE_SPECIES_ACTION:1 "ไปยังเผ่าพันธุ์ก่อนความเร็ว"
 HELP_TUTORIAL_ENVOYS_TITLE:0 "การมอบหมายทูต"
 HELP_TUTORIAL_ENVOYS_DESC:0 "§Sทูต§! เป็นผู้นำรองที่สามารถมอบหมายไปทำภารกิจทางการทูตต่างๆ ได้ เช่น ปรับปรุงความสัมพันธ์กับ £empire£ §Sจักรวรรดิ§! อื่น หรือสถาปนาการติดต่อกับ §Sจักรวรรดิ§! ที่เพิ่งค้นพบ เมื่อ§Sทูต§!ได้รับมอบหมายงานแล้ว จะไม่สามารถย้ายไปทำงานอื่นได้อีกเป็นเวลา 1 ปี \n\n §Sทูต§! มีความสำคัญอย่างยิ่งต่อการจัดการ £opinion£ §Sทัศนคติ§! ที่อารยธรรมอื่นมีต่อ £empire£ §Sจักรวรรดิ§! ของคุณ"
 HELP_TUTORIAL_ENVOYS_INSTRUCTIONS:0 "§Y1.§! เลือกผู้ติดต่อในแถบนำทางด้านซ้าย\n§Y2.§! เลือกจักรวรรดิที่คุณต้องการปรับปรุงความสัมพันธ์ด้วย\n§Y3.§! เลือกการทูต\n§Y4.§! เลือกปรับปรุงความสัมพันธ์"
 HELP_TUTORIAL_ENVOYS_ACTION:0 ""
 HELP_TUTORIAL_INTEL_TITLE:0 "การรวบรวมข่าวกรอง"
 HELP_TUTORIAL_INTEL_DESC:1 "§Sข่าวกรอง§! สามารถใช้เพื่อบ่อนทำลายหรือสร้างความได้เปรียบเหนือ £empire£ §Sจักรวรรดิ§! อื่น ปริมาณข้อมูลที่จักรวรรดิหนึ่งมีต่ออีกจักรวรรดิหนึ่งจะแสดงด้วยทรัพยากร §Sข่าวกรอง§! \n\nยิ่งคุณมี §Sข่าวกรอง§! เกี่ยวกับ £empire£ §Sจักรวรรดิ§! อื่นมากเท่าใด ข้อมูลของคุณก็จะยิ่งแม่นยำมากขึ้น"
 HELP_TUTORIAL_INTEL_INSTRUCTIONS:0 "§Y1.§! เลือกผู้ติดต่อในแถบนำทางด้านซ้าย\n§Y2.§! เลือกจักรวรรดิที่คุณต้องการเรียนรู้เพิ่มเติม\n§Y3.§! เลือกการทูต\n§Y4.§! เลือกสร้างเครือข่ายสอดแนม"
 HELP_TUTORIAL_INTEL_ACTION:0 ""
 HELP_TUTORIAL_GALACTIC_COMMUNITY_TITLE:0 "การเข้าร่วมประชาคมกาแล็กซี"
 HELP_TUTORIAL_GALACTIC_COMMUNITY_DESC:1 "£empire£ §Sจักรวรรดิ§! ที่ได้พบกับอารยธรรมอวกาศส่วนใหญ่ทั้งหมดแล้ว จะได้รับคำเชิญให้เข้าร่วมประชาคมกาแล็กซี การเป็นสมาชิกทำให้พวกเขาสามารถลงคะแนนต่อกฎหมายใหม่ในวุฒิสภาได้ และกฎหมายที่ผ่านจะมีผลบังคับใช้กับสมาชิกทุกคน"
 HELP_TUTORIAL_GALACTIC_COMMUNITY_INSTRUCTIONS:0 "นี่สินะที่เสรีภาพตายลง...\n...ท่ามกลางเสียงปรบมือกึกก้อง"
 HELP_TUTORIAL_GALACTIC_COMMUNITY_ACTION:0 ""
 HELP_TUTORIAL_FALLEN_EMPIRES_TITLE:0 "จักรวรรดิฟอลเล็น"
 HELP_TUTORIAL_FALLEN_EMPIRES_DESC:0 "จักรวรรดิฟอลเล็นคือเศษซากอันหยุดนิ่งของมหาอำนาจกาแล็กซีในอดีต แม้จะเหลือเพียงเงาของความยิ่งใหญ่เดิม แต่พวกเขายังคงครอบครองเทคโนโลยีที่ล้ำหน้าอย่างยิ่ง เรื่องราวของกาแล็กซีในปัจจุบันแทบไม่ดึงดูดความสนใจพวกเขา และพวกเขาก็แทบไม่ออกนอกอวกาศของตนเอง"

  # Chapter 4
 HELP_TUTORIAL_TRADITIONS_TITLE:0 "การรับประเพณี"
 HELP_TUTORIAL_TRADITIONS_DESC:0 "§Sประเพณี§! ถูกรับมาด้วย £unity£ §Hเอกภาพ§! และทำให้จักรวรรดิสามารถเชี่ยวชาญไปในทิศทางใดทิศทางหนึ่ง เช่น การทหารและการขยายอำนาจอย่างรวดเร็ว หรือการทูตและการสร้างสหพันธรัฐ \n\nเมื่อทำ §Sสายประเพณี§! ครบแล้ว £empire£ §Sจักรวรรดิ§! จะสามารถเลือก §Sสิทธิพิเศษแห่งการยกระดับ§! เพื่อเสริมความแข็งแกร่งให้ตนเองเพิ่มเติมได้"
 HELP_TUTORIAL_TRADITIONS_INSTRUCTIONS:0 "§Y1.§! เปิดการจัดการสังคมจากแถบนำทางด้านซ้าย\n§Y2.§! เลือกประเพณีที่จะรับมา"
 HELP_TUTORIAL_TRADITIONS_ACTION:0 "เปิดหน้าต่างประเพณี"
 HELP_TUTORIAL_POLICIES_TITLE:0 "การกำหนดนโยบาย"
 HELP_TUTORIAL_POLICIES_DESC:0 "§Sนโยบาย§! กำหนดท่าทีของ £empire£ §Sจักรวรรดิ§! ของเราต่อเรื่องต่างๆ ไม่ว่าจะเป็นความก้าวร้าวของจักรวรรดิ วิธีที่เราปฏิบัติต่อ £pop£ พลเมือง หรือสิ่งที่เรามองว่ายอมรับได้และยอมรับไม่ได้ \n\n§Sนโยบาย§! แตกต่างจาก §Sคำสั่ง§! ตรงที่ไม่ต้องเสียค่าใช้จ่ายในการบังคับใช้ แต่จะส่งผลต่อมุมมองที่จักรวรรดิอื่นมีต่อเรา"
 HELP_TUTORIAL_POLICIES_INSTRUCTIONS:1 "§Y1.§! เปิดนโยบายจากแถบนำทางด้านซ้าย\n§Y2.§! เลือกจุดยืนทางการทูต\n§Y3.§! เลือกแบบที่เหมาะกับคุณ"
 HELP_TUTORIAL_POLICIES_ACTION:0 "เปิดหน้าต่างนโยบาย"
 HELP_TUTORIAL_LEADERS_TITLE:0 "การจ้างผู้นำ"
 HELP_TUTORIAL_LEADERS_DESC:1 "§Sผู้นำ§! ของคุณประกอบด้วย §Sนักวิทยาศาสตร์§!, §Sผู้บัญชาการ§!, และ §Sเจ้าหน้าที่§! \n\nขอแนะนำให้คุณมีผู้นำสำหรับ §Sกองยานทหาร§!, สำหรับปกครอง £planet£ §Sดาวเคราะห์§! ที่เพิ่งตั้งอาณานิคม และสำหรับนำ £science_ship£ §Sยานวิทยาศาสตร์§! ที่ถูกส่งไปปฏิบัติภารกิจสำรวจ"
 HELP_TUTORIAL_LEADERS_INSTRUCTIONS:0 "§Y1.§! เปิดเมนูผู้นำจากแถบนำทางด้านซ้าย\n§Y2.§! สรรหานักวิทยาศาสตร์ที่คุณจะสามารถมอบหมายให้ยานวิทยาศาสตร์ลำใหม่ได้ในภายหลัง"
 HELP_TUTORIAL_LEADERS_ACTION:0 "เปิดหน้าต่างผู้นำ"
 HELP_TUTORIAL_EDICTS_TITLE:0 "การประกาศใช้คำสั่ง"
 HELP_TUTORIAL_EDICTS_DESC:0 "คำสั่งคือม็อดิฟายเออร์ระดับจักรวรรดิที่มีต้นทุนคงที่และจักรวรรดิสามารถเลือกเปิดใช้ได้ คำสั่งใหม่ต้องปลดล็อกผ่านการวิจัยหรือเหตุการณ์ ส่วนคำสั่งต่อเนื่องสามารถเปิดหรือปิดได้ทุกเมื่อด้วยการใช้ อิทธิพล"
 HELP_TUTORIAL_SPECIES_MANAGEMENT_TITLE:0 "การรักษาความสุขของประชากร"
 HELP_TUTORIAL_SPECIES_MANAGEMENT_DESC:0 "£pop£ §Sประชากร§! ที่มีความสุขคือ £pop£ §Sประชากร§! ที่มีประสิทธิภาพ \nแต่การรักษา §Sความสุข§! นั้นไม่ง่าย และหากปล่อยให้ความไม่มีความสุขสะสมโดยไม่จัดการ มันอาจก่อให้เกิด §Sความไม่สงบ§! ได้ \n\nโชคดีที่มีหลายวิธีในการเพิ่มความสุขบน £planet£ §Sดาวเคราะห์§! ทั้ง §Sนโยบาย§! และ §Sคำสั่ง§! ระดับดาวเคราะห์, §Sซีวิค§!, §Sสิทธิของเผ่าพันธุ์§!, §Sสิ่งปลูกสร้าง§!, และ §Sลักษณะของผู้ปกครอง§! ล้วนส่งผลบวกต่อ §Sความสุข§! ได้"
 HELP_TUTORIAL_SPECIES_MANAGEMENT_INSTRUCTIONS:0 "§Y1.§! เลือกดาวเคราะห์ (ดูได้จากแถบสรุปด้านขวาของหน้าจอ)\n§Y2.§! เลือกช่องสิ่งปลูกสร้างที่ว่างอยู่\n§Y3.§! สร้างโรงละครโฮโล"
 HELP_TUTORIAL_SPECIES_MANAGEMENT_ACTION:0 "เปิดหน้าต่างเผ่าพันธุ์"
 HELP_TUTORIAL_FACTIONS_TITLE:0 "การจัดการฝ่าย"
 HELP_TUTORIAL_FACTIONS_DESC:0 " §Hฝ่าย§! แทนพรรคการเมืองต่างๆ และได้รับการสนับสนุนจาก §Hประชากร§! ที่มีจริยธรรมตรงกัน การตอบสนองประเด็นของฝ่ายจะเพิ่มค่าการยอมรับของพวกเขา และเพิ่มความสุขของประชากรทุกคนที่เข้าร่วมฝ่ายนั้น ฝ่ายที่มีความสุขยังจะสร้าง £unity£ §Hเอกภาพ§! อีกด้วย"

  # Chapter 5
 HELP_TUTORIAL_CASUS_BELLI_TITLE:0 "การประกาศสงคราม"
 HELP_TUTORIAL_CASUS_BELLI_DESC:0 "ก่อนที่ £empire£ §Sจักรวรรดิ§! จะเริ่ม §Sสงคราม§! ได้ จำเป็นต้องมีคาซัส เบลีหรือเหตุผลในการประกาศ §Sสงคราม§!คาซัส เบลีอาจมีตั้งแต่การทำให้ §Sคู่แข่ง§! อัปยศ ไปจนถึงการกำจัดอีกเผ่าพันธุ์หนึ่งให้สิ้นซาก \n\n§Sสงคราม§! สามารถจบได้สองทาง: ด้วยการ §Sยอมจำนน§! ของฝ่ายใดฝ่ายหนึ่ง หรือด้วยสันติภาพแบบ §Sสถานะ Quo§! ที่มีการเจรจาตกลงกัน"
 HELP_TUTORIAL_CASUS_BELLI_INSTRUCTIONS:0 "เลือกศัตรูของคุณอย่างรอบคอบ \n§Y1.§! เปิดผู้ติดต่อจากแถบนำทางด้านซ้าย\n§Y2.§! เลือกจักรวรรดิที่คุณต้องการโจมตี\n§Y3.§! เปิดการทูต\n§Y4.§! เลือกประกาศสงคราม"
 HELP_TUTORIAL_CASUS_BELLI_ACTION:0 "เปิดหน้าต่างการทูต"
 HELP_TUTORIAL_CLAIMS_TITLE:0 "การสร้างสิทธิอ้างสิทธิ์"
 HELP_TUTORIAL_CLAIMS_DESC:0 "§Sสิทธิอ้างสิทธิ์§! ใช้ £influence£ §Sอิทธิพล§! และแสดงถึงความทะเยอทะยานด้านดินแดน \n\nระหว่าง §Sสงคราม§! คุณสามารถใช้ §Sสิทธิอ้างสิทธิ์§! เพื่อตัดสินว่าผู้ชนะจะได้ §Sระบบ§! ใดไป เป็นไปได้ที่จะอ้างสิทธิ์ §Sระบบ§! เดิมหลายครั้งเพื่อให้ได้ §Sสิทธิอ้างสิทธิ์§! ที่แข็งแกร่งขึ้น ซึ่งสามารถเอาชนะสิทธิอ้างสิทธิ์ของ §Sพันธมิตร§! ที่แข่งขันกันได้เมื่อเข้าสู่ §Sสงคราม§! ร่วมกัน"
 HELP_TUTORIAL_CLAIMS_INSTRUCTIONS:0 "§Y1.§! เปิดสิทธิอ้างสิทธิ์จากแถบนำทางด้านซ้าย\n§Y2.§! เลือกระบบที่ต้องการอ้างสิทธิ์\n§Y3.§! เลือกสร้างสิทธิอ้างสิทธิ์"
 HELP_TUTORIAL_CLAIMS_ACTION:0 "สลับไปยังโหมดแผนที่สิทธิอ้างสิทธิ์"
 HELP_TUTORIAL_FLEET_COMBAT_TITLE:0 "การต่อสู้กับกองยานศัตรู"
 HELP_TUTORIAL_FLEET_COMBAT_DESC:0 "เพื่อปกป้อง £empire£ §Sจักรวรรดิ§! ของคุณ การมีกองยานทหารที่แข็งแกร่งเป็นสิ่งสำคัญ §Sเทคโนโลยี§! ทางทหารที่ดีกว่าจะได้มาผ่าน §Sการวิจัย§! ซึ่งจะช่วยให้คุณอัปเกรดยานของคุณ และเพิ่มขีดความสามารถในการบำรุงรักษา §Sกองยาน§! ขนาดใหญ่ขึ้นได้\n\nการชนะการรบกลางหมู่ดาวคือการปรับตัวให้เข้ากับ §Sชุดติดตั้งของศัตรู§! และใช้ §Sตัวแก้ทางที่มีประสิทธิภาพ§! แต่ละองค์ประกอบเชิงรุกหรือเชิงรับต่างก็มีมาตรการรับมือของมัน"
 HELP_TUTORIAL_FLEET_COMBAT_INSTRUCTIONS:1 "§Y1.§! เลือกตัวจัดการกองยานในแถบนำทางด้านซ้าย\n§Y2.§! เลือกปุ่ม \"บวก\" เพื่อเพิ่มจำนวนยานในกองยานของคุณ\n§Y3.§! ตรวจสอบให้แน่ใจว่าคุณได้มอบหมายพลเรือเอกให้ทุกกองยานที่คุณมี"
  # If player has a fleet, then select and pan to it when clicked (if more than 1, select the first one). Else, disable button with tooltip "You have no fleet."
 HELP_TUTORIAL_FLEET_COMBAT_ACTION:0 "ไปยังกองยาน"
 HELP_TUTORIAL_WAR_EXHAUSTION_TITLE:0 "การป้องกันระบบของคุณ"
 HELP_TUTORIAL_WAR_EXHAUSTION_DESC:1 "§Sฐานดาว§! คือหัวใจสำคัญในการป้องกันของคุณในแต่ละระบบ ด่านหน้าที่อยู่ในตำแหน่งสำคัญยังสามารถอัปเกรดเป็น §Sท่าอวกาศ§! เพื่อเพิ่มความสามารถในการป้องกันระบบ ด้วยการมีช่องสำหรับ §Sโมดูลป้องกัน§! มากขึ้น \n\nความสามารถในการป้องกันตัวเองของ §Sฐานดาว§! ยังเสริมได้ด้วยการสร้าง §Sแพลตฟอร์มป้องกัน§! ซึ่งเป็นสถานีทหารขนาดเล็กที่ถูกวางประจำรอบ §Sฐานดาว§! และทำหน้าที่เป็นแท่นอาวุธ "
 HELP_TUTORIAL_WAR_EXHAUSTION_INSTRUCTIONS:2 "§Y1.§! เลือกฐานดาวใดก็ได้\n§Y2.§! เลือกแท็บป้องกัน\n§Y3.§! สร้างแพลตฟอร์มป้องกัน"
 HELP_TUTORIAL_WAR_EXHAUSTION_ACTION:0 ""
 HELP_TUTORIAL_SHIP_DESIGN_TITLE:0 "การออกแบบยาน"
 HELP_TUTORIAL_SHIP_DESIGN_DESC:1 "ตามค่าเริ่มต้น แบบยานจะถูกสร้างและอัปเดตอัตโนมัติ แต่หากต้องการความได้เปรียบเหนือคู่ต่อสู้ที่แข็งแกร่งกว่า คุณอาจต้องสร้างแบบยานที่ใช้แก้ทางกองยานศัตรู โล่มีประสิทธิภาพต่อเลเซอร์ แต่เปราะบางต่อมิสไซล์ ขณะที่ตัวถังแข็งแรงสามารถป้องกันอาวุธกระสุนได้ดีกว่าอาวุธพลังงาน"
 HELP_TUTORIAL_CRISIS_TITLE:0 "วิกฤตช่วงท้ายเกม"
 HELP_TUTORIAL_CRISIS_DESC:0 "§Sวิกฤต§! คุกคามทั้ง §Sกาแล็กซี§! และทุกชีวิตภายในนั้น \n\nน้อยครั้งมากที่คุณจะพร้อมเผชิญ §Sวิกฤต§! เพียงลำพัง ทุกครั้งที่วิกฤตพิชิต £planet£ §Sดาวเคราะห์§! มันจะก่อให้เกิด §Sภัยคุกคาม§! ทางการทูตกับ £empire£ §Sจักรวรรดิ§! ทุกแห่ง ทำให้พวกเขามีแนวโน้มจะร่วมมือกันต่อต้าน §Sวิกฤต§! มากขึ้น \n\nวิกฤตช่วงท้ายเกมจะมีรายการใน §Sบันทึกสถานการณ์§! (£f2£) ที่คอยนับจำนวนความสูญเสียของทั้งสองฝ่าย และแสดงให้เห็นว่าวิกฤตใกล้จะถูกเอาชนะมากเพียงใด"
 HELP_TUTORIAL_CRISIS_INSTRUCTIONS:1 "ตอนนี้ยังไม่ต้องทำอะไรกับมัน แต่จงเตรียมตัวไว้ ใครจะรู้ว่าวิกฤตจะมาเมื่อไร?"
 HELP_TUTORIAL_CRISIS_ACTION:0 ""
