 diplomats_knights:0 "$toxic_knights_diplomats_name$"
 diplomats_knights_desc:2 "อัศวินของเราจะถูกส่งไปเป็นทูต เพื่อช่วยในความพยายามทางการทูตของเรา\n§Gการผจญภัยจะได้ประโยชน์จากมัน§!\n\n"
