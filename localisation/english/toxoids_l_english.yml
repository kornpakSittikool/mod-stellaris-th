 low_motivation:0 "แรงจูงใจต่ํา"
 low_motivation_desc:0 "ต่อไปนี้จิตใจขอบเขตลงในชรูด, ประชาชนรู้สึกดูดซับของความสุข : อดีตความรู้สึกที่รื่นรมย์ถูกน่าเบื่อและได้กลายเป็น"
 malcontent_knights:0 "อัศวินผู้ใจบุญ"
 malcontent_knights_desc:0 "อัศวินไม่มีความสุข และความไม่พอใจของพวกเขา ถูกสะท้อนออกมาโดยประชาชน"
