 civic_toxic_baths_desc:0 "อารยธรรม นี้ มี ส่วน ร่วม ใน การ อาบ น้ํา ด้วย วิธี การ ทาง พิธีกรรม พร้อม กับ ผู้ รับ ใช้ มือ อาชีพ ที่ ดู แล การ ใช้ สาร ที่ เป็น อันตราย สูง. กระบวนการ 'การกระตุ้น' นี้อาจรวมผู้สังเกตการณ์ที่ไม่รู้อิโหน่อิเหน่ได้"
 civic_corporate_toxic_baths_desc:0 "อารยธรรม นี้ มี ส่วน ร่วม ใน การ อาบ น้ํา ที่ มี เชื้อ รา พร้อม กับ ผู้ รับ ใช้ ที่ ชํานาญ ที่ ดู แล การ ใช้ สาร ที่ เป็น อันตราย สูง. กระบวนการนี้ 'เปลี่ยนแปลง' วางจําหน่ายเป็นขั้นตอนที่จําเป็น ในความอยู่ดีมีสุขและการพัฒนาส่วนบุคคล"
 civic_hive_toxic_baths_desc:1 "สมองของรังนี้ใช้ สระว่ายน้ําที่ก่อความไม่สงบ โดยมีคนรับใช้พิเศษ คอยดูแล หุ่นยนต์ทุกตัว กระบวนการนี้มีความซับซ้อนมาก สําหรับสภาพแวดล้อมท้องถิ่น"
 civic_machine_toxic_baths_desc:0 "จักรวรรดิจักรกลนี้พัฒนาใหม่ ด้วยการผลิต โดรน-เชลล์ พื้นฐาน ผ่านการใช้งานอย่างเฉียบพลัน โพรเซส'ถูกปรับ'นี้ ขึ้นอยู่กับผลที่เสียไปโดยปกติจากอุตสาหกรรม ที่ปัจจุบันมีการชําระคืนเพื่อประสิทธิภาพสูงสุด"

