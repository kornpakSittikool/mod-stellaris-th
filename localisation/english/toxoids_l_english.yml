 TOXOIDS_TITLE: "Toxoids Species Pack" # Do not translate
 DLC_TOXOIDS_RECOMMENDATION_DESC:1 "ใน§Sสารพิษ§!เดิมพันคําอ้างของคุณ กับสายพันธุ์ที่แข็งที่สุดและแข็งที่สุด ในประวัติศาสตร์ของสเตลาริส! โลกที่เป็นพิษ การพนันอนาคตของดาว เคราะห์ของคุณเพื่อให้ได้มาในทันที และทําให้การเสียสละยาก"
 DLC_TOXOIDS_RECOMMENDATION_COSMETICS:1 "เรากําลังแนะนํา ทอกซ์ลอยด์ อย่างที่เราสังเกตว่า คุณเป็นแฟนของชุดเครื่องสําอางค์"
 DLC_TOXOIDS_RECOMMENDATION_POST_APOCALYPTIC:1 "เราแนะนําให้ใช้โทกซ์รอยด์ เป็นสิ่งที่คุณได้เลือกจักรวรรดิที่มีธีมการออกเสียง"
 DLC_TOXOIDS_RECOMMENDATION_ENVIRONMENTALIST:1 "เราแนะนําให้โทกซ์ลอยด์เป็นทางเลือกของจักรวรรดิที่คุณเลือก จากความสัมพันธ์ของมันกับสิ่งแวดล้อมธรรมชาติ"
 DLC_TOXOIDS_RECOMMENDATION_WASTEFUL_ADAPTIVE:1 "เรากําลังแนะนําให้โทกอยด์เป็นสายพันธุ์ของคุณ เหมาะกับธีมของเสียและปรับตัวได้"
 DLC_TOXOIDS_RECOMMENDATION_VOID_DWELLERS:1 "เราแนะนําว่าท็อกไซด์$origin_toxic_knights$ที่มาของการเพิ่มเกมที่อยู่บนที่อยู่อาศัยใหม่"

 #Knights of the Toxic God

 origin_toxic_knights:0 "อัศวินของเทพทรพิษ"
 origin_toxic_knights_desc:2 "เมื่อหลายทศวรรศก่อน มีเอนทิตี้ เคยมาเยือนและสร้างมหันตภัยที่ทำลายโลกไปครึ่งหนึ่ง เหลือไว้อีกครึ่งให้กับเหล่าพลเมืองที่บูชาเอนทิตี้นี้เป็นเทพทรพิษของพวกเขา ภาคีอัศวินได้ถูกก่อตั้งขึ้นเพื่อออกตามหาเทพของพวกเขาในอวกาศอันกว้างใหญ่นี้"
 origin_toxic_knights_effects:3 "- ดาวบ้านเกิด: $TABBED_NEW_LINE$- ['concept_toxic_features'] $TABBED_NEW_LINE$- ['concept_pc_habitat', ที่อยู่อาศัยวงโคจรดาว] ที่มีลักษณะเฉพาะ: $TABBED_NEW_LINE$$t$- ['concept_order_keep', £building£ $building_order_keep$] $TABBED_NEW_LINE$$t$- ['concept_orders_demesne', £district£ $district_orders_demesne$] $TABBED_NEW_LINE$$t$- งาน ['concept_politician', £job_politician£ $job_politician$] ถูกแทนที่ด้วย ['concept_order_jobs'] $NEW_LINE$- สถานการณ์: ['concept_knights_quest'] $NEW_LINE$- นโยบาย: §Iอัศวินผู้น่ารัก§! $NEW_LINE$- $AVAILABLE_HOLDINGS$ ['concept_knight_commandery', £building£คําสั่ง ผู้บังคับบัญชา] ในอาณานิคมของเมืองขึ้น"

 origin_toxic_knights_negative_effects: "- $INITIAL_POPS$ §R-300§!"
 START_SCREEN_TOXIC_KNIGHTS:1 "นานมาแล้ว ดาวของเราถูกแบ่งแยก กษัตริย์ ที่ เป็น สัตว์ เลี้ยง ก็ ทะเลาะ กัน อยู่ เสมอ และ ประชากร ของ เรา ก็ โชก เลือด เพราะ ความ ทะเยอทะยาน อัน ไร้ ประโยชน์ ของ พวก เขา. แต่ เมื่อ พระ มหา กษัตริย์ องค์ แรก เสด็จ มา ทั้ง หมด นี้ ก็ เปลี่ยน ไป. ความเป็นผู้นําที่เป็นแรงบันดาลใจของพวกเขา ได้สร้างอาณาจักรขึ้นมาอย่างไม่เท่าเทียม\n\nเหนือสิ่งอื่นใด พระบาทสมเด็จพระเจ้าอยู่หัวทรงบริสุทธิ์ แล้วผู้ใดปฏิเสธต่อพระเจ้าของพวกเขา ชนเหล่านั้นพวกเขาเป็นผู้ละเมิด พระบาทสมเด็จพระเจ้าอยู่หัวได้รับคําตอบเมื่อสารพิษพระเจ้าไปเยี่ยมโลกของเรา แม้ ว่า สมัย นั้น เป็น ช่วง เวลา สั้น ๆ แต่ อิทธิพล อัน ชั่ว ร้าย ของ มัน ทํา ให้ ดิน แดน ของ คน ที่ ไม่ เชื่อ เป็น พิษ. ใครก็ตามที่รอดชีวิตได้ปฏิญาณตนกับพระมหากษัตริย์ เป็น ครั้ง แรก ที่ โลก ของ เรา เป็น เอกภาพ.\n\nพระเจ้าโทซิกส์ทิ้งพวกเราไป แต่พระมหากษัตริย์ทรงตั้งพระทัยที่จะค้นหามัน ก่อตั้งระเบียบของอัศวิน เป็น เวลา หลาย ศตวรรษ จิต วิญญาณ ที่ กล้า หาญ เหล่า นี้ เสาะ หา อย่าง ไม่ รู้ จัก เหน็ด เหนื่อย แต่ ไร้ ประโยชน์. พระเจ้า ท็อก ติก ไม่ ได้ จาก โลก ของ เรา มา นาน แล้ว. บทต่อไปของการผจญภัย จะเขียนในดาว ด้วยการใช้วัตถุที่มีประสิทธิภาพ มันเป็นคําสั่งที่สร้างของเราจักรวรรดิสถานีออร์บิทัลแห่งแรก เก็บอันยิ่งใหญ่จะกลายเป็น สปริงบอร์ดจากที่พวกเขา เคยลดลงลึกเข้าไปในจักรวาล"
 START_SCREEN_TOXIC_KNIGHTS_CORPORATE:0 "นานมาแล้ว ดาวของเราถูกแบ่งแยก กษัตริย์ ที่ เป็น สัตว์ เลี้ยง ก็ ทะเลาะ กัน อยู่ เสมอ และ ประชากร ของ เรา ก็ โชก เลือด เพราะ ความ ทะเยอทะยาน อัน ไร้ ประโยชน์ ของ พวก เขา. แต่ เมื่อ พระ มหา กษัตริย์ องค์ แรก เสด็จ มา ทั้ง หมด นี้ ก็ เปลี่ยน ไป. ความเป็นผู้นําที่เป็นแรงบันดาลใจของพวกเขา ได้สร้างอาณาจักรขึ้นมาอย่างไม่เท่าเทียม\n\nเหนือสิ่งอื่นใด พระบาทสมเด็จพระเจ้าอยู่หัวทรงบริสุทธิ์ แล้วผู้ใดปฏิเสธต่อพระเจ้าของพวกเขา ชนเหล่านั้นพวกเขาเป็นผู้ละเมิด พระบาทสมเด็จพระเจ้าอยู่หัวได้รับคําตอบเมื่อสารพิษพระเจ้าไปเยี่ยมโลกของเรา แม้ ว่า สมัย นั้น เป็น ช่วง เวลา สั้น ๆ แต่ อิทธิพล อัน ชั่ว ร้าย ของ มัน ทํา ให้ ดิน แดน ของ คน ที่ ไม่ เชื่อ เป็น พิษ. ใครก็ตามที่รอดชีวิตได้ปฏิญาณตนกับพระมหากษัตริย์ เป็น ครั้ง แรก ที่ โลก ของ เรา เป็น เอกภาพ.\n\nพระเจ้าโทซิกส์ทิ้งพวกเราไป แต่พระมหากษัตริย์ทรงตั้งพระทัยที่จะค้นหามัน ก่อตั้งระเบียบของอัศวิน เป็น เวลา หลาย ศตวรรษ จิต วิญญาณ ที่ กล้า หาญ เหล่า นี้ เสาะ หา อย่าง ไม่ รู้ จัก เหน็ด เหนื่อย แต่ ไร้ ประโยชน์. การผจญภัยเป็นโอกาสที่แพงมาก เมื่อเวลาผ่านไป อาณาจักรก็ยิ่งสนใจ การแสวงหากําไรมากขึ้น เพื่อสนับสนุนเหล่าอัศวินมากขึ้น โดยการใช้ชีวิตและบริโภค ประชาชนทุกคนสนับสนุนการแสวงหา และแชมป์ของเรามีสื่อมากมาย\n\nพระเจ้า แท็กซี่ได้นานตั้งแต่ออกจากโลกของเรา และบทต่อไปของ การผจญภัยจะถูกเขียนในดาว ด้วยการใช้วัตถุที่มีประสิทธิภาพ มันเป็นคําสั่งที่สร้างของเราจักรวรรดิสถานีออร์บิทัลแห่งแรก เก็บอันยิ่งใหญ่จะกลายเป็น สปริงบอร์ดจากที่พวกเขา เคยลดลงลึกเข้าไปในจักรวาล"
