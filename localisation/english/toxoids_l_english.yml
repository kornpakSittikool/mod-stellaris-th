 trait_commercial_genius: "อัจฉริยะด้านการค้า"
 trait_commercial_genius_desc: "§Lโดย การ ดัด แปลง ความ เห็น พ้อง ต้อง กัน และ ลด ความ ร่วม รู้สึก จึง เป็น ไป ได้ ที่ จะ จุด ประกาย ของ ความ ยอด เยี่ยม ใน การ ค้า ขาย. การ แสวง หา อํานาจ ใน การ ปกครอง ทาง การ ค้า ที่ เหนือ กว่า ผล ข้าง เคียง ใด ๆ ที่ อาจ เกิด ขึ้น ได้.§!"
 trait_commercial_genius_tooltip: "$BONUS_WORKFORCE_FOR$ ['concept_planet_traders']: §G+25%§!"
 trait_crafted_smiles:0 "ยิ้มศัลยกรรม"
 trait_crafted_smiles_desc:0 "§Lลักษณะของใบหน้าที่เลื่อนไปอย่างรวดเร็ว ผสมของการพัฒนากล้ามเนื้อที่เสริมและอ่อนลง - และแน่นอนนอกสารเคมี - ได้สร้างรอยยิ้มที่สมบูรณ์แบบ ตลอดไป§!"
 crafted_smiles_tooltip:0 "$BONUS_WORKFORCE_FOR$ ['concept_planet_influential']: §G+15%§!"
 trait_low_maintenance:0 "ค่าเลี้ยงดูต่ำ"
 trait_low_maintenance_desc:1 "§Lการ บริโภค ที่ ลด ลง, การ ขับ ถ่าย, และ อัตรา การ พัก ผ่อน ทํา ให้ ต้อง จ่าย ถึง สอง เท่า ของ ราคา. อย่างไรก็ตาม ความต้องการอาหารที่อุดมไปด้วยโปรตีนได้เพิ่มขึ้น§!"
 low_maintenance_tooltip:0 "ประชากรสินค้าซูเปอร์ขึ้นเลี้ยง:§G-10%§!"
 trait_artificial_intelligence:1 "ปัญญาเสริม"
 trait_artificial_intelligence_desc:0 "§Lสมองมากขึ้นเท่ากับพลังงานสมองมากขึ้น อวัยวะคิดพิเศษ ได้ถูกเพิ่มเข้าไปในพื้นที่เชิงยุทธศาสตร์ ของร่างกายผู้รับ เพื่อให้แน่ใจว่า ถึงแม้ว่าจะไม่เห็นด้วยก็ตาม§!"
 artificial_intelligence_tooltip:0 "$BONUS_WORKFORCE_FOR$ ['concept_planet_researchers']: §G+10%§!"
 trait_gene_mentorship:0 "ที่ปรึกษาพันธุกรรม"
 trait_gene_mentorship_desc:2 "§Lโดยการรวมพันธุกรรมที่ออกแบบ 'ความรู้ภายใน' และตัวกระตุ้นเคมีภายนอก แม้ ว่า นั่น ก่อ ให้ เกิด ผู้ คน ที่ หวาด ระแวง อย่าง ยิ่ง.§!"
 gene_mentorship_tooltip:0 "ผู้นำประสบการณ์§G+30%§!"
 trait_expressed_tradition:0 "วัฒนธรรมคลั่งสุดโต่ง"
 trait_expressed_tradition_desc:0 "§Lการแฟนตาซีเรื่องความต้องการ ความศรัทธาเป็นเพียงการดื่มฮอร์โมนหนึ่งขวด ที่ ซึ่ง ความ เชื่อ นั้น นํา ไป สู่ การ ชี้ นํา ใน ภาย หลัง.§!"
 expressed_tradition_tooltip:0 "$BONUS_WORKFORCE_FOR$ ['concept_planet_bureaucrats']: §G+10%§!"
 trait_elevated_synapses:0 "ไซแนปส์ยกระดับ"
 trait_elevated_synapses_desc:0 "§Lในฐานะอุปกรณ์คํานวณ สมองไม่ได้ทํางาน ที่ความจุ 100% อย่าง ไร ก็ ตาม เรา ทํา เกิน กว่า มาตรฐาน. หาก พบ ปัญหา ก็ จง พยายาม ปิด หรือ ทํา ซ้ํา อีก.§!"
 elevated_synapses_tooltip:1 "$BONUS_WORKFORCE_FOR$ ['concept_planet_researchers']: §G+20%§!"
 trait_preplanned_growth:0 "บังคับการเจริญพันธ์"
 trait_preplanned_growth_desc:1 "§Lตารางเวลาการเจริญพันธุ์ ดอกเบี้ย กําหนดการความเข้ากันได้ การเติบโตของประชากรในความต้องการ ประชากรที่แข็งแรงและมีเสถียรภาพ - มีการแก้ไขเล็กน้อยที่นี่และที่นั่น บุคคล ที่ อิจฉา จะ ถูก นํา ตัว ไป ยัง ศูนย์ การ พัฒนา ที่ ใกล้ ที่ สุด เพื่อ ฝึก อบรม ตาม ข้อ บังคับ.§!"
 preplanned_growth_tooltip:0 "ความเร็วในการเพิ่มของประชากร: §G+30%§!$TABBED_NEW_LINE$- ประชากรใช้ที่อยู่อาศัย: §G-10%§!"
 trait_excessive_endurance:0 "ทนทานเหลือล้น"
 trait_excessive_endurance_desc:0 "§Lยีนที่ปรับตัวได้มากที่สุด ถูกกดทับอย่างรุนแรง ในตัวอย่างเหล่านี้ อัตราการกลายพันธุ์รอบ ๆ 30% บ่ง ชี้ ถึง การ ทดลอง ที่ ค่อน ข้าง มั่นคง และ ประสบ ความ สําเร็จ.§!"
 excessive_endurance_tooltip:0 "ความเปรียบต่าง:§G+30%§!$TABBED_NEW_LINE$- $MOD_POP_BONUS_WORKFORCE_MULT$: §G+5%§!"

 edict_damn_the_consequences:0 "อะไรจะเกิดขึ้นก็ช่างมัน"
 edict_damn_the_consequences_desc:1 "พระราชบัญญัตินี้ผลักดันการเปลี่ยนแปลงพันธุกรรมของเรา ไปสู่ขีด จํากัด สองเท่าของผลกระทบ แต่ยังก่อให้เกิดปริมาณที่เพิ่มขึ้น\n\n§Rประณามผลกระทบที่ไม่สนใจ['concept_edict_fund']และจะใช้ 80% ของรายเดือนเสมอ$unity_with_icon$รายได้!§!"
 edict_damn_the_consequences_effects:0 "ลูกเล่นด้านบวกทั้งหมดจาก§Hเกินขนาด§!การค้าเพิ่มขึ้นเป็นสองเท่า"

