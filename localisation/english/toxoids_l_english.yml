 approach_toxic_knights_frugal_tt:1 "ในกรณีที่มีเรื่องฉุกเฉินมาก เราอาจจะทําให้การแบ่งปันทรัพยากร แต่หากไม่มีเครื่องมือที่จะเตรียมตัวเองอย่างเหมาะสม อัศวินของเราจะต้องดิ้นรนต่อสู้\n\n"
