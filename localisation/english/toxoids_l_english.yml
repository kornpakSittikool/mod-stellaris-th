 ##The Quest
 toxoids.7006:0 "เงื่อนอัศวิน[questing_knight_1.GetName]- แบนด์ชั่น"
 toxoids.7006.desc:1 "คืนนี้[questing_knight_1.GetName]การกระทําที่ประมาทของเจ้าเกือบนําความตายเมื่อห้าของเพื่อนอัศวินของคุณ ท่านมีจิตใจบริสุทธิ์ และเป้าหมายของท่านก็สูงส่ง แต่การละเมิดต่อระเบียบนั้นไม่อาจมองข้ามได้\"\n\nอัศวินผู้บังคับการเข้มงวดและรุนแรง รอบๆ ตัวเขา อัศวินทั้งหมดก็อยู่ด้วย ทั้งในเนื้อหนัง หรือผ่านทางโฮโลคอม พวกเขายืนเงียบในขณะที่ผู้บัญชาการพูด\n\nด้วยอํานาจของข้า ข้าถอดเจ้าจากตําแหน่งอัศวิน และขับไล่เจ้าออกจากตําแหน่ง ขอให้โชคชะตาเมตตาเจ้า\"\n\n[questing_knight_1.GetName]ก้ม, ฝากสัญลักษณ์ของสั่งซื้อบนพื้นโรงเก็บของ แล้วหันไปโดยไม่พูดอะไรและปีนขึ้นเรือขนาดเล็ก\n\nต่อมาภายหลังราชพงศาวดารจะรายงาน ว่าอัศวินบานี[questing_knight_1.GetName]รู้ว่าประโยคจะยุติธรรม แต่มันก็ยากที่จะผ่อนคลาย[questing_knight_1.GetHisHer]ความเศร้า เมื่อชีวิตหนึ่งได้รับในการให้บริการของระเบียบ การตัดออกจากมันเป็นเหมือนการสูญเสียแขนขา\n\nเป็น[questing_knight_1.GetHeShe]เคยทํามาหลายครั้งแล้ว[questing_knight_1.GetName]บินออกจากท่าจอดเรือของคุ้ม และไปยังที่ไกลโพ้น ครั้งนี้ จะไม่มีผลตอบแทน"
 toxoids.7006.a:0 "โชคดีนะ[questing_knight_1.GetName]."
 toxoids.7007:0 "เงื่อนอัศวิน[questing_knight_1.GetName]เนบิวลา"
 toxoids.7007.desc:2 "ในการขับไล่[questing_knight_1.GetName]ถูกทิ้งร้าง เรื่องราวของความผิดพลาดไม่มีจุดหมายทั่วดาว จนถึงที่สุดท้ายข้อความมาจาก[questing_knight_1.GetHisHer]เด็กรับใช้มาสเตอร์ ฉันหวังว่าโชคชะตาจะดีกับเจ้า ฉันได้แยกข้อมูลจากการแสวงหาครั้งสุดท้ายของเจ้า เจ้าคําสั่ง คุณจะพบพิกัดที่แนบมากับข้อความนี้ ฉันรู้ว่าไม่ถ้าเจ้าจะพบประโยชน์นี้ตอนนี้... ปราการระวังเจ้าเป็นนายที่ชอบธรรมมากที่สุดและฉันหวังว่าจะได้พบเจ้าอีกครั้ง.\"\n\nโดยคําเหล่านี้[questing_knight_1.GetName]ถูก เร่ง ให้ ลง มือ ปฏิบัติ. ถ้า[questing_knight_1.GetHeShe]สามารถกลับสู่คณะได้ พร้อมกับบางสิ่งที่มีค่า[questing_knight_1.GetHisHer]เกียรติอาจจะยังคงได้รับการฟื้นฟู\n\nพิกัดนําไปสู่[questing_knight_1.GetHimHer]ลึกเข้าไปในเนบิวลา ที่ ตั้ง อยู่ ใน หมอก หนา ทึบ เป็น สถานี ที่ โดด เดี่ยว เป็น โครง สร้าง ที่ แข็ง แรง ซึ่ง ดู เหมือน ดึง ออก มา จาก ความ ฝัน.[questing_knight_1.GetName]ก้าวเข้าไปในภายในที่เสื่อมโทรม ถูกหลอกหลอนโดยกระดูกของสิ่งมีชีวิตที่ตายไปนานแล้ว และถูกป้องกันด้วยพลาล็อกซ์ของดรอยด์ที่เฝ้ายาม ร้อนแรงและใจร้อน[questing_knight_1.GetHeShe]รีบไปพบผู้พิทักษ์โลหะ 3 ครั้ง[questing_knight_1.GetHeShe]ชาร์จ 3 ครั้ง[questing_knight_1.GetHeShe] [questing_knight_1.GetWasWere]ขับกลับไป เครื่องตรวจจับการเคลื่อนไหวของดรอยด์ พิสูจน์แล้วว่าไม่ขัดขืน แต่ความแข็งแกร่งไม่ใช่อาวุธเดียวของอัศวิน[questing_knight_1.GetName]บ่อยครั้งที่มองข้ามความเจ้าเล่ห์และความอดทน, ครั้งนี้แผนเริ่มก่อตัวใน[questing_knight_1.GetHisHer]ใจ"
 toxoids.7007.a:0 "คิดสิ[questing_knight_1.GetName]คิดสิ!"
 toxoids.7008:0 "เงื่อนอัศวิน[questing_knight_1.GetName]รูปปั้น"
 toxoids.7008.desc:1 "โดดเดี่ยวในสถานีร้างอันยาวนาน ถูกรบกวนโดยดรอยด์ยาม[questing_knight_1.GetName]วางแผน รู้ว่า[questing_knight_1.GetHeShe]สามารถหลีกเลี่ยงการตรวจจับ ของเซ็นเซอร์การเคลื่อนไหวของดรอยด์ ในที่สุดพวกเขาจะต้องชาร์จ เครื่องจักรนั้นน่ากลัว แต่ไม่ฉลาด ความ อด ทน ไม่ ใช่ กําลัง จะ เป็น ทาง ที่ จะ ชนะ ใน วัน นี้.\n\nช้ากับหยุดยาวและเริ่มพอดี[questing_knight_1.GetName]ก้าวหน้าผ่านสถานี ในที่สุด[questing_knight_1.GetHeShe]ถึงสถานีชาร์จ ด้วยความรอบคอบ[questing_knight_1.GetName]ตัดสายไฟฟ้า ในช่วงเวลาเดียวกัน[questing_knight_1.GetHeShe]กลายเป็นตระหนักถึงหุ่นยนต์หอคอยในทางเข้า\n\nการ ตรวจ สอบ จะ หมาย ความ ว่า ส่วน ที่ เหลือ ของ ฟา แลงค์ จะ ร่วม ใน การ ต่อ สู้ และ ใน ที่ ที่ จํากัด เช่น นั้น ความ ตาย เป็น เรื่อง แน่นอน.[questing_knight_1.GetName]ยืน อยู่ ข้าง ประตู นิ่ง ขณะ ที่ เครื่อง ยนต์ วาง ตัว เอง อยู่ บน สถานี ชาร์จ ตา สี แดง ของ เครื่อง ตรวจ จับ ของ มัน ส่อง แสง ระยิบ ระยับ. มันจะหมดอํานาจในที่สุด แต่มันต้องใช้เวลา ทีละตัว ดรอยด์อีกตัวก็กลับเข้าประจําที่\n\nพงศาวดารบอกว่าอัศวิน[questing_knight_1.GetName]ยืนเคลื่อนไหว 7 วัน 7 คืน จนกระทั่งดรอยด์ตัวสุดท้ายหยุดทํางาน โดยมีดรอยด์ของสถานีลดลงเป็นรูปปั้นไร้ชีวิต[questing_knight_1.GetName]มีอิสระที่จะไล่ตามวัตถุ[questing_knight_1.GetHisHer]ภารกิจ: ตําแหน่งของเรือโบราณ ที่เคยผ่านเส้นทางของพระเจ้าโทซิก"
 toxoids.7008.a:0 "ความอดทนคือคุณธรรม"
 toxoids.7009:0 "เงื่อนอัศวิน[questing_knight_1.GetName]เซจ"
 toxoids.7009.desc:1 "ถูกขับไล่ออกจากคณะ[questing_knight_1.GetName]สร้าง[questing_knight_1.GetHisHer]ลึกลงไปในเนบิวลา ในการแสวงหาก่อนหน้านี้[questing_knight_1.GetHeShe]ถึง[questing_knight_1.GetHisHer][โปรดติดตามตอนต่อไเด็กรับใช้พบเซจ อาศัยอยู่บนดวงจันทร์ ความรู้ของพวกเขายิ่งใหญ่และมีพลังมากขึ้น เพราะพวกเขาเป็นของแม่มดของ \"& ขาว\".[questing_knight_1.GetName]ต้องการคําแนะนํา และหวังว่าจะได้รับ การปลอบโยนจากคําแนะนําของนักปราชญ์\n\nเรื่องเล่าบอกว่า[questing_knight_1.GetName]ถูกละทิ้ง[questing_knight_1.GetHisHer]อาวุธและใช้เวลาหลายเดือนในหมู่นักเรียนของเซจ ดวงจันทร์นี้ ค่าของระเบียบมีความสําคัญน้อย และในขณะที่อัศวินได้เคารพ มันไม่ได้สิ้นสุดในตัวเอง มี บท เรียน มาก มาย ที่ พวก ปราชญ์ ให้ แต่ ความ ทะเยอทะยาน[questing_knight_1.GetName]เป็นความกระหายที่ไม่มีวันเปลี่ยนแปลง การแสวงหาที่เรียกว่าและ[questing_knight_1.GetHeShe]จะตอบอีกครั้ง\n\nมันดึกแล้ว เมื่อมีเซจมาเยี่ยม[questing_knight_1.GetName]พวกเขาคืนอาวุธที่อัศวินได้ทิ้งไว้ พร้อมกับคริสตัลข้อมูล\"เด็กรับใช้ตกอยู่ในอันตราย เจ้าเป็นอัศวินไม่มาก แต่ชีวิตของหนุ่มสาวอยู่ในมือของเจ้า ไปเดี๋ยวนี้ เนบิวลาผู้อ่อนแอ รอคอย\""
 toxoids.7009.a:0 "รีบหน่อย[questing_knight_1.GetName]."
 toxoids.7010:0 "เงื่อนอัศวิน[questing_knight_1.GetName]ไฟย์"
 toxoids.7010.desc:1 "ข้อมูลนําไปสู่[questing_knight_1.GetName]ไปที่สนามดาวเคราะห์น้อย ยึดอยู่กับหินที่ใหญ่ที่สุดก้อนหนึ่ง คือ'Damsel', Corievéte โบราณ ข้างๆ เรืออีกลํานึงทรยศการปรากฏตัวของอัศวิน ด้วย ความ กังวล สัญญาณ ความ ทุกข์ ของ มัน ยัง คง ดําเนิน งาน อยู่.\n\n[questing_knight_1.GetName]เข้า ไป อย่าง ระมัดระวัง ก้าว เข้า ไป ใน โรง ละคร แห่ง การ ต่อ สู้ อย่าง ทารุณ. อาวุธ มี ผล กระทบ ทั้ง ใน สมัย โบราณ และ เมื่อ ไม่ นาน มา นี้ ต่อ ผนัง และ ชิ้น ส่วน ของ หุ่น ยนต์ ก็ เกลื่อน กลาด ไป ทั่ว. เล็ก ๆ น้อย ๆ ใน : ซากของอัศวินของระเบียบและร่องรอยของผู้ได้รับบาดเจ็บ[Root.GetSpeciesName]ถูกรัดคอ[questing_knight_1.GetFirstName].\n\nลึกเข้าไปในตัวอัศวินที่ถูกเนรเทศ พบศพในสตาซิส[questing_knight_1.GetHisHer]ศพเด็กรับใช้ จอภาพแสดงให้เห็นว่าเด็ก[questing_knight_2.GetName]บาดเจ็บแต่ทรงตัว อย่างไรก็ตาม[questing_knight_1.GetName]ใกล้แล้ว ระบบรักษาความปลอดภัยของยาน เชื่อมต่ออินเตอร์เน็ต เสียงที่หนาวสั่นถอยไป ไอ้โจร เจ้าไม่ถูกต้อนรับบนเรือ.\""
 toxoids.7010.a:0 "อย่าถืออาวุธ ข้าไม่ใช่โจร"
 toxoids.7012.name:0 "$NAME_Sinople$"
 toxoids.7012.desc:0 "ให้ฉันได้รับที่ดีที่เจ้า ... แน่นอน โปรดรับคําขอโทษสําหรับความสับสน ฉันเป็นที่รู้จักในชื่อ$NAME_Sinople$ฉันเป็น AI ของยานลํานี้"
 toxoids.7012.a:0 "เพื่อนอัศวินของข้าตายยังไง"
 toxoids.7013.desc:0 "อัศวิน เจ้าว่าไหม เจ้าเป็นญาติกันหรือเปล่า? ถ้า เป็น เช่น นั้น จง แสดง ความ เสียใจ และ ขอ โทษ อีก ครั้ง หนึ่ง. ฉันคิดว่าผู้บุกรุกเป็นพวกปล้น เมื่อ ผม ขอ ให้ พวก เขา ออก จาก เรือ พวก เขา ก็ ก้าวร้าว มาก. ดรอยด์ซ่อมบํารุงของข้าหลายคนถูกทําลาย เพื่อพยายามหยุดพวกมัน"
 toxoids.7013.a:0 "แล้วเด็กรับใช้ข้าล่ะ เจ้าทําอะไร[questing_knight_2.GetHimHer]?"
 toxoids.7014.desc:1 "เด็กรับใช้ของท่านทําให้ข้าตระหนัก ว่าข้าทําผิด[questing_knight_2.GetHeSheCap]ได้ รับ บาด เจ็บ ใน การ สู้ รบ และ สูญ เสีย สติ หลัง จาก นั้น ไม่ นาน. ฉันวาง[questing_knight_2.GetHimHer]ในสภาวะทางการแพทย์นี้[questing_knight_2.GetHeShe]อาจรักษาได้ นับตั้งแต่ลูกเรือของฉันถูกลักพาตัวโดยโจร ฉันเหงามากที่นี่ ข้าหวังจะสนุกกับบริษัทเด็กรับใช้ของท่าน[questing_knight_2.GetHeShe]รักษา"
 toxoids.7014.a:0 "พวก โจร ทํา อะไร?"
 toxoids.7015.desc:1 "ผมถูกแฮ็คและตัดการเชื่อมต่อ เมื่อพวกเขาเข้าใกล้ แต่พอผมเอาชนะ เฮกซ์ได้ ภาพจากกล้อง รปภ. พวกมันคงจับพวกมันไปเป็นทาส ธนาคารข้อมูลของฉันระบุว่า มารูเดอร์มักจะทําแบบนั้น\n\nทั้งหมดนี่มันนานมาแล้ว มันใช้เวลานานกว่าจะซ่อมตัวเอง หลังจากแฮ็คเสร็จ หลายส่วนของธนาคารความจําของฉัน ยังคงล็อคให้ฉันเนื่องจากมัน ... แต่บอกฉันสิ ถ้าเจ้าเป็นอัศวิน เจ้าต้องการอะไร"
 toxoids.7015.a:1 "เรากําลังมองหา§Yสารพิษ พระเจ้า§!."
 toxoids.7016.desc:0 "ฉันมีบันทึกการเผชิญหน้ามากมาย ที่เต็มไปด้วยสารพิษของอวกาศ แต่น่าเสียดายที่ความทรงจําส่วนใหญ่ของฉันถูกล็อค ผมเข้าถึงดัชนีบันทึกได้ แต่ไม่ใช่ข้อมูลเอง หากข้าช่วยเจ้า ข้าต้องการให้เจ้าพาข้าออกจากยาน ผมรอที่จะติดต่อกับสิ่งมีชีวิตอื่น ท่านจะพาข้าไปหาลอร์ดของท่านไหม"
 toxoids.7016.a:1 "แน่นอน AI ยุติธรรม"
 toxoids.7016.b:0 "เจ้าฆ่าอัศวิน! ไม่!"
 toxoids.7016.c:0 "มิใช่เช่นนั้น แน่นอนเจ้าจะถูกโยนลงไปในไฟนรก (อัลฮุเฏาะมะฮฺ)"
 toxoids.7016.c.materialist:0 "ตัวเลือกนี้ใช้ได้เนื่องจาก จรรยาบรรณของจักรวรรดิของคุณ"
 toxoids.7017.desc:0 "ผมเข้าใจตําแหน่งของคุณ แต่ฉันไม่ยอม ถ้าเจ้าปฏิเสธ ข้าจะฉีดกรดในเด็กรับใช้ของเจ้า แล้วทําลายตัวเอง ร่วมกับธนาคารข้อมูลของข้า ยานลํานี้ และเจ้า"
 toxoids.7017.a:0 "ข้า ต้องช่วยเด็กรับใช้ของข้า ฉันยอมรับ"
 toxoids.7011:1 "เงื่อนอัศวิน[questing_knight_1.GetName]งานคืนสู่เหย้า"
 toxoids.7011.desc:3 "การกลับมาของคณะได้สําคัญ มีภายในห้องโถงใหญ่$NAME_Sinople$เปิด เผย ว่า พวก เขา ได้ ติด ต่อ กับ องค์การ หนึ่ง คล้าย กัน มาก กับ พระเจ้า โท จิก ที่ ทรง เรียก ร้อง จาก คณะ ผู้ บัญชา การ. อย่างไรก็ตาม ความทรงจําส่วนใหญ่ของ AI ถูกเข้ารหัสไว้ และต้องการงานมากมาย ก่อนที่คณะจะเข้าถึงมัน\n\nสําหรับ[questing_knight_1.GetName]: [questing_knight_1.GetHeShe]ไม่ใช่แค่ใส่[questing_knight_1.GetHisHer]ชีวิตบนเส้นโดยการกลับมา แต่ยังจัดการนําเบาะแสที่จับต้องได้ และช่วยเด็กรับใช้[questing_knight_2.GetName]สําหรับเรื่องนี้ ผู้บัญชาการผู้บังคับการ ตัดสินใจที่จะยกการเนรเทศและตั้งชื่อ[questing_knight_1.GetName]อัศวินอีกแล้ว"
 toxoids.7011.a:0 "ไม่รับเลี้ยงอีกต่อไป ลุกขึ้นอัศวิน!"
 toxoids.7011.b:1 "เราจะได้เรียนรู้มากมายจาก$NAME_Sinople$."

 toxoids.7025.name:0 "เงื่อนอัศวิน[questing_knight_A.GetFirstName]ถึง[questing_knight_B.GetFirstName]เดอะชราวด์"
 toxoids.7025.desc:0 "“พวกท่านอย่าเย่อหยิ่งเลย ฉันจะกลับไปหาพวกท่านอีก หากความทุกข์ยากได้ประสบแก่ฉันแล้ว ฉันจะประกาศแก่พวกท่านเอง”\n\nเรื่องเล่าเกี่ยวกับอัศวิน[questing_knight_A.GetName]ที่ออกจากคุ้มหลายปีมาแล้ว ในภารกิจลับที่ไม่มีวันกลับมา นั่นมัน[questing_knight_A.GetHerHis]ความ สามารถ ที่ หลาย คน ไม่ ยอม เชื่อ[questing_knight_A.GetSheHe]ถูกทําลายไปแล้ว แม้ว่า[questing_knight_A.GetHerHis]การ กลับ มา นาน แล้ว. หนึ่งในนั้นคือ[questing_knight_A.GetHerHis]คู่หู อัศวิน[questing_knight_B.GetName]ยาวได้[questing_knight_B.GetSheHe]ค้นหาเบาะแสที่จะ[questing_knight_A.GetName]จุดหมายปลายทาง ในที่สุด[questing_knight_B.GetSheHe]พบแผ่นหนังฝุ่นใน ช่องที่ซ่อนของที่พักของพวกเขา แม้ ว่า แผ่น หนัง จะ ค่อย ๆ จาง หาย ไป และ ปรบ มือ แต่ มี สอง คํา ที่ ได้ รับ การ ล้อม รอบ หลาย ครั้ง คือ มิล วา นีส คลู เตอร์. อัศวินผู้บังคับการ อนุมัติอย่างรวดเร็วเพื่อแสวงหาการนํานี้"
 toxoids.7025.A:1 "ขอให้โชคเข้าข้างเจ้า[questing_knight_B.GetFirstName]!"
 toxoids.7030.name:0 "เงื่อนอัศวิน[questing_knight_A.GetFirstName]ถึง[questing_knight_B.GetFirstName]สืบค้น"
 toxoids.7030.desc:0 "มันไม่ง่ายสําหรับอัศวิน[questing_knight_B.GetName]เพื่อตามหามิลวอยนิส คลูสเตอร์ แน่นอนมันไม่ได้อยู่บนแผนที่ใด ๆ ที่รู้จักกันไป[Owner.GetGovernmentName]บทบันทึกบอกว่า[questing_knight_B.GetSheHe]เดินทางไกลและไกล จนในที่สุด[questing_knight_B.GetSheHe]พบคนที่จําชื่อได้\n\n\"เดินทางเป็นเวลา 3 วัน[some_system.GetName]และที่นั่นเจ้าจะพบมิลวอยนิสคลูสเตอร์\"พวกเขากล่าว \"รู้น้อยเกี่ยวกับสถานที่สําหรับนักท่องเที่ยวไม่มี เคยมีอยู่ในหน่วยความจํามีชีวิต มี การ กล่าว กัน ว่า คลูสเตอร์ เป็น หมัน และ เสีย ชีวิต. “และหากพวกท่านเข้าไปอยู่ในนั้น ความดีก็จะประสบแก่พวกท่าน ”\n\nและดังนั้น[questing_knight_B.GetName]ออกเดินทาง รีบหลัง"
 toxoids.7030.A:0 "แด่มิลวอยนิส!"
 toxoids.7035.name:0 "เงื่อนอัศวิน[questing_knight_A.GetFirstName]ถึง[questing_knight_B.GetFirstName]มิลวาโนนิส"
 toxoids.7035.desc:1 "เมื่อ[questing_knight_B.GetName]มาถึงมิลวานีสคลูสเตอร์[questing_knight_B.GetSheHe]พบว่ามันว่างเปล่าจริงๆ และเป็นครั้งแรก[questing_knight_B.GetSheHe]รู้สึกสิ้นหวัง นี่ เป็น ตัว นํา ที่ มี ความ หวัง มาก ที่ สุด! แต่ตอนนี้ดูเหมือนว่ามันได้รับทั้งหมดเพื่ออะไร\n\nจาก นั้น ราว กับ ว่า ออก มา จาก ความ ฝัน ตัว รับ เซ็นเซอร์ ก็ เผย ให้ เห็น ดาว เคราะห์ ดวง หนึ่ง ที่ ถูก ปก คลุม ด้วย ความ มืด วง โคจร ของ ดาว ดวง นี้ อยู่ ใน อวกาศ ระหว่าง ดวง ดาว ต่าง ๆ! สะกดด้วยชื่อ\"เจ้าหญิงตากอากาศ\"[questing_knight_B.GetSheHe]วางในหลักสูตรสําหรับมัน"
 toxoids.7035.A:0 "คํา ตอบ รอ อยู่."
 toxoids.7040.name:0 "เงื่อนอัศวิน[questing_knight_A.GetFirstName]ถึง[questing_knight_B.GetFirstName]การ ค้น พบ"
 toxoids.7040.desc:0 "มาถึง\"เจ้าหญิงตากอากาศ\"[questing_knight_B.GetName]พบ หมาย สําคัญ ต่าง ๆ ที่ ชัดเจน ของ พระเจ้า โท จิก: สาร ต่าง ๆ ก็ เหมือน กัน กับ สิ่ง ที่ เหลือ อยู่[Owner.GetHomeWorldName]หลังจากการจากไปของวิญญาณอยู่ที่นี่ ในปริมาณที่ดี ดีกว่านั้นอีก: มีการค้นพบยานอวกาศแสง แทบจะไม่เสียหายเลย\n\nอย่างไรก็ตาม ความงามกลายเป็นความเศร้าอย่างรวดเร็ว[questing_knight_B.GetName]ร้องไห้เหมือน[questing_knight_B.GetSheHe]ที่ ตั้ง ของ หินปูน[Root.GetSpeciesAdj] [questing_knight_A.Species.GetRemnantName]ใกล้ ๆ กับ งาน ฝีมือ ทุก อย่าง ที่ ยัง เหลือ อยู่[questing_knight_A.GetName]การอาศัยอยู่ในความมืดของอวกาศ ส่งผลให้พิษของพระเจ้า ตอบสนองอย่างไม่คาดคิด มุ่งเน้นไปที่ระดับ\n\nมันชัดเจนอยู่แล้ว[questing_knight_B.GetName]ที่สารพิษพระเจ้า มักจะมิลวานิส คัลสเตอร์หลายศตวรรษก่อนที่จะเยี่ยมชม[Owner.GetHomeWorldName]ไม่มีเงื่อนงําใด ๆ เกี่ยวกับสถานที่ปัจจุบันของพระเจ้า[questing_knight_B.GetName]กลับบ้าน ตัวอย่างสารพิษของดีตี้[questing_knight_B.GetName]ความก้าวหน้าในความรู้ของคณะในคุณสมบัติขององค์กร สําหรับสิ่งนี้[questing_knight_B.GetSheHe]และตั้งแต่นั้นเป็นต้นมา ได้มีการร้องเพลงเกี่ยวกับ[questing_knight_B.GetHerHis]เดินทาง"
 toxoids.7040.A:0 "[questing_knight_A.GetFirstName]จะถูกจดจําตลอดไป"
 toxoids.7040.B:0 "มีเนื้อหาเพิ่มเติม สําหรับอัศวินที่จะศึกษา"
 toxoids.7040.C:0 "เราสามารถใช้สิ่งนี้เพื่อปรับปรุงอาวุธของเรา"

 toxoids.7050.name:0 "ผู้ มา เยือน"
 toxoids.7050.desc:1 "\"เดอะชราวด์ can reveal many secrets to thee, if thou art willing to pay the price.\"\n\nIn the year of [GetYear], so the chronicles state, a Holy Visitor came to [order_headquarters.GetName]. A figure shrouded in mystery, of a species hitherto unknown to us, he called himself simply \"Hod\" and offered us a bargain: in return for a price yet to be named, he would send a knight into the เดอะชราวด์. From an entity within, the knight would at last glean the knowledge we sought"
 toxoids.7050.A:0 "น่าสนใจมาก อะไร อาจ เป็น อันตราย ใน เรื่อง นี้?"
 toxoids.7055.name:0 "สุลต่าน แห่ง ความ ลับ"
 toxoids.7055.desc:1 "เพื่อเจาะลึกความลึกลับของชรูด, อัศวินชื่อคุณยาย[questing_knight_X.GetName]ด้วยคําแนะนําจากผู้มาเยือนอันศักดิ์สิทธิ์[questing_knight_X.GetSheHe]เข้าสู่ความไม่รู้ การ มอง เห็น ที่ ไม่ มี วัน ลืม[questing_knight_X.GetHerHis]จิตสํานึก ก่อนที่วิญญาณจะปรากฎ\n\n'สุลต่านแห่งความลับ' ผู้มาเยือนกระซิบ มันอยู่ในรูป[questing_knight_X.GetName]สามารถบรรยายในภายหลังว่า\"สวยเกินจะเปรียบเทียบ\"\n\n\"ให้เราได้กลิ่นของวันแรกของฤดูร้อน ความพึงพอใจของความท้าทายเอาชนะและ ความอบอุ่นของอ้อมกอดของคนรัก\"มันกล่าว “ดังนั้น ฉันจะแจ้งให้ท่านทราบถึงสิ่งที่ท่านประสงค์ ”"
 toxoids.7055.A:1 "แน่นอน โอ เสน่ห์สุรัส"
 toxoids.7055.B:0 "ราคามันสูงมาก"
 toxoids.7060.name:0 "ราคา ของ ความ จํา"
 toxoids.7060.desc:1 "[questing_knight_X.GetName]รู้สึกถึงความทรงจําใหม่ๆ[questing_knight_X.GetHerHis]ความคิด: ทันใดนั้นพวกเขา และที่จริงทั้งหมด[Root.GetSpeciesNamePlural]- สามารถจําได้อย่างสมบูรณ์แบบช่วงเวลาที่มากสารพิษพระเจ้าปล่อยของขวัญของตนเมื่อ[Root.GetHomeWorldName]แม้มันจะเป็นศตวรรษในอดีต\n\nเป็นหนึ่งในประชาชนทั้งหมด[Root.GetName]รู้สึกถึงการสูญเสียอย่างลึกซึ้ง ความ รู้สึก ที่ น่า ชื่น ใจ แต่ ก่อน ถูก ทํา ให้ อ่อน ลง. ความ ร่วม รู้สึก แพร่ หลาย เหมือน ไฟ นรก และ หลัง จาก นั้น ก็ ยาก ที่ จะ พัฒนา แรง กระตุ้น แม้ แต่ สําหรับ งาน ที่ ง่าย ที่ สุด.\n\nถึงอย่างนั้นก็เถอะ ภาคีก็ขอบคุณฮอดและสรรเสริญ[questing_knight_X.GetName]สําหรับความสําเร็จ นําความทรงจําใหม่ๆกลับมา จากชรูด"
 toxoids.7060.A:1 "นี้จะขับเคลื่อนสมาชิกใหม่ไปยังคณะอัศวิน"
 toxoids.7060.A.tooltip:0 "เดอะ§Y$building_order_keep$§!จะยอมให้เรา§G+200§! [knight.GetIcon] §Y[knight.GetName]§!งาน"
 toxoids.7060.B:0 "เราจะสร้างอนุสาวรีย์ใหม่บน[Root.GetHomeWorldName]."
 toxoids.7065.name:0 "ซัค ซู รุส"
 toxoids.7065.desc:1 "\"คุณจะกระตุ้นความช่วยเหลือของฉันได้อย่างไร หายนะเมื่อบ้านของเจ้า!\"\n\nอัศวิน[questing_knight_X.GetName]รู้สึก[questing_knight_X.GetHerHis]จิตสํานึกถูกกระแทกจาก[questing_knight_X.GetHerHis]ร่างและตั้งค่าการลอยตัว สําหรับสิ่งที่รู้สึกเหมือนมหายุค[questing_knight_X.GetSheHe]ลอยไปมา ผ่านชรูด ไม่สามารถควบคุม[questing_knight_X.GetHerHis]เคลื่อนไหว ในที่สุด[questing_knight_X.GetSheHe]ได้พบกับหน่วยงานอื่น ที่ที่สุลต่านแห่งความลับ สร้างความพิศวง แต่นี้ช่าง...§R\"นี่ไม่ใช่เวลาของคุณ\"§!มันระเบิด§R\"กลับบ้านมา ลูกไม่ชอบบาร์กาอิน\"§!และด้วยสิ่งนั้น[questing_knight_X.GetSheHe]ถูกส่งกลับ[questing_knight_X.GetHerHis]ศพ"
 toxoids.7065.A:0 "เราควรสืบเรื่องนี้\"ชมัด\""
 toxoids.7065.B:0 "เรา ได้ เรียน รู้ มาก มาย เกี่ยว กับ ความ พยายาม นี้."

 toxoids.7080:0 "เงื่อนอัศวิน[questing_knight_4.GetName]ผู้ท้าชิง"
 toxoids.7080.desc:2 "วันหนึ่ง มีคนแปลกหน้ามาเฝ้า ขณะที่การประลองของเด็กรับใช้ถูกจัดขึ้น อัศวินของภาคีส่วนใหญ่ก็อยู่ด้วย เคลือบในชุดเกราะนิวตรอน คนแปลกหน้า สโตรดเข้าไปในสมรภูมิ การ พูด ด้วย ความ ยินดี ของ ฝูง ชน สิ้น ชีวิต ขณะ ที่ ผู้ มา ใหม่ ชัก อาวุธ ของ เขา ขึ้น มา. การ ท้าทาย นั้น ชัดเจน และ ด้วย พระ พร ของ ท่าน ผู้ บัญชา การ[questing_knight_2.GetName]อัศวิน[questing_knight_42.GetName]รับสาย\n\nในช่วงเวลานั้น การต่อสู้จบลง และ[questing_knight_42.GetFirstName]นอนราบบนพื้น อัศวิน[questing_knight_43.GetName]พบชะตากรรมที่คล้ายกัน[questing_knight_43.GetHisHer]พี่น้อง อัศวิน[questing_knight_44.GetFirstName]อัศวินสามคนล้มไป ท่านผู้บัญชาการได้เรียกแชมป์มา อัศวิน[questing_knight_4.GetName].\n\nพงศาวดารเต็มไปด้วยนักรบผู้ยิ่งใหญ่ อัศวินไร้ญาติ ที่ไม่เคยรู้จักความพ่ายแพ้ และ[questing_knight_4.GetFirstName]ก็สบายดีนี่[questing_knight_4.GetHisHer]วิธีที่จะเข้าร่วมการจัดอันดับของตํานานเหล่านี้\n\nแชมป์เข้ามาในเวที, อาวุธที่พร้อมและความเคารพ[questing_knight_4.GetHisHer]คู่ต่อสู้"
 toxoids.7080.a:0 "อย่าทําให้เราผิดหวัง[questing_knight_4.GetName]"
 toxoids.7085:0 "เงื่อนอัศวิน[questing_knight_4.GetName]ทางเดินของแขน"
 toxoids.7085.desc:2 "หลายบัลลาดจะเขียนของคู่ระหว่าง[questing_knight_4.GetName]และอัศวินเซเบิ้ล หลายชั่วโมงที่พวกเขาต่อสู้ ผู้ท้าชิงไม่สามารถเอาชนะ[questing_knight_4.GetFirstName]ยาม อัศวินไม่สามารถเจาะเกราะที่ล้ําหน้าของ[questing_knight_4.GetHisHer]ศัตรู\n\n\"ศิลปะการส่งผ่าน\"\n\nเสียงคนแปลกหน้าสะท้อนในเวที \"ผมเห็นชื่อเสียงของคุณไม่ได้อวด.\" เขาวางอาวุธของเขา \"ข้ายอมเจ้า แชมป์ ท่านจะยอมให้ข้ากลับมาจากที่ที่ข้ามาได้ไหม?\"\n\nโค้ดของภาคีเข้มงวด และคําถามนั้นมีเพียงคําตอบเดียว ดังนั้นอัศวินเซเบิ้ล จึงตั้งชื่อตามสีของชุดเกราะนิวตรอนของเขา ท่านผู้บัญชาการ[questing_knight_2.GetName]ห้ามคนติดตามและส่ง[questing_knight_4.GetFirstName]เพื่อตรวจสอบหนอนไม่เสถียร จนกระทั่งทีมวิทยาศาสตร์สามารถส่ง\n\nไม่นานหลังจากนั้น แชมป์ก็เผชิญหน้ากับ[questing_knight_4.GetHisHer]โพสต์โดยอัศวิน[questing_knight_42.GetName], [questing_knight_43.GetName]ถึง[questing_knight_44.GetName]พวกเขาขอให้ผ่าน เพื่อที่พวกเขาจะได้เผชิญหน้ากับอัศวินเซเบิ้ลอีกครั้ง \"ให้โอกาสเรากู้ชื่อเสียงคืนมา\" เจ้า ไม่ เคย รู้ ถึง ความ ขมขื่น แห่ง การ พ่าย แพ้ รส เหม็น ของ มัน ก็ ชําระ ออก ดี กว่า ด้วย โลหิต \""
 toxoids.7085.a:0 "หน้าที่คือทั้งหมด ห้ามผ่านเด็ดขาด"
 toxoids.7085.b:0 "เกียรติคือทั้งหมด ธุรกิจของเรากับคนแปลกหน้ายังไม่จบ"
 toxoids.7090:0 "เงื่อนอัศวิน[questing_knight_4.GetName]หน้า สอง"
 toxoids.7090.desc:2 "\"คําสั่งของผู้บัญชาการเป็นที่ชัดเจน เจ้าจะไม่ผ่าน\" มีพักยาวก่อนที่คําตอบมา : \"เรากําลังผ่านและคุณไม่ได้ปฏิเสธเรา เตรียมขึ้นยานได้\"\n\nด้วยความโกรธและตาบอดโดยเกียรติ อัศวินตั้งอยู่บนเพื่อนของพวกเขา 3 ต่อ 1 พวกเขากด[questing_knight_4.GetName]จากทุกด้าน, และด้วยความประมาทดังกล่าวทิ้ง[questing_knight_4.GetHeShe]ได้ถูกย้ายเข้ามุม[questing_knight_4.GetHisHer]เรือ การต่อสู้มันไม่ยุติธรรม[questing_knight_4.GetFirstName]ระวังไม่ให้ทําร้ายคนอื่น แต่ท้ายที่สุด[questing_knight_4.GetHisHer]ชีวิตบนเส้นด้าย แชมป์ของภาคี ไม่มีทางเลือก[questing_knight_4.GetHisHer]อาจจะ\n\nวันที่สิ้นสุดลงด้วยความเจ็บปวดและความเศร้าโศกสําหรับ[questing_knight_43.GetName]ถูกฆ่าในสงคราม[questing_knight_43.GetHisHerCap]พี่ ๆ น้อง ๆ ได้ รับ บาด เจ็บ และ เอา ชนะ ความ โศก เศร้า.[questing_knight_4.GetFirstName]โดยถือว่าพวกเขาเป็นผู้ชนะ[questing_knight_4.GetHisHer]คําสั่ง แต่[questing_knight_4.GetHeShe]ได้ฆ่าเพื่อนอัศวินในขั้นตอน"
 toxoids.7090.a:0 "[questing_knight_4.GetName]ได้เสียสละเพื่อรับใช้พวกเรา"
 toxoids.7090.a.tooltip:2 "§Y[knight.GetNamePlural]§!ปัจจุบัน ผลิต 5£amenities£อภิสิทธิ์\n\nเดอะ§Yสั่งซื้อคงไว้§!ปัจจุบัน ผลิต 15$r_stability$.\n\nปลดล็อค§Y$herald_knights$§!ตัวเลือกสําหรับ§Y$policy_knightly_duties$§!นโยบาย"
 toxoids.7095:0 "เงื่อนอัศวิน[questing_knight_4.GetName]เกียรติคือทั้งหมด"
 toxoids.7095.desc:2 "ขณะที่เรือของอัศวินเข้ามา รูหนอนไม่เสถียรหมุนและเติบโตขนาดใหญ่ การ ข้าม นั้น ทํา ให้ อึดอัด และ ภาย ใน เรือ ของ พวก เขา ก็ ถูก ซัด ราว กับ ใบ ไม้ ใน กระแส น้ํา ที่ เต็ม ไป ด้วย ความ เกรี้ยวกราด. เมื่อ เทียบ กัน แล้ว เรือ สอง ลํา ได้ รับ ความ เสีย หาย ร้าย แรง แต่ ไม่ นาน ก็ สิ้น สุด ลง และ พวก นัก รบ ก็ พบ ว่า ตัว เอง จม อยู่ ใน แสง ของ ดาว ที่ ไม่ คุ้น เคย.\n\nพวกเขามาถึงด้านหน้าของสถานีที่เรือของคนแปลกหน้าถูกเทียบ ห้องโถงตกแต่งอย่างหรูหราว่างเปล่าและเงียบสงบ ผนังถูกปกคลุมไปด้วยอาวุธที่แปลกใหม่, ชุดเกราะ, โล่ต่างประเทศและฮูบอลเนอร์ถ้วยรางวัลที่ไม่แตกต่างจากผู้ที่ตกแต่งของ เก็บลําดับ ฝุ่น ก้อน ใหญ่ ทํา ให้ ง่าย ที่ จะ ติด ตาม รอย เท้า ของ คน แปลก หน้า. พวกเขานําอัศวินไปยังประตูขนาดใหญ่ นอกเหนือจากนั้นวางห้องโถงที่ดีของสถานี\n\nมี การ จัด งาน เลี้ยง ที่ หรูหรา นี้ ขึ้น แต่ ตอน นี้ ยัง เหลือ เฉพาะ งาน เลี้ยง ที่ ไม่ ดี เท่า นั้น. แขก ที่ นั่ง นิ่ง เงียบ และ ไม่ เคลื่อน ไหว. รอย เท้า นํา ไป สู่ สถาน ที่ อัน มี เกียรติ ซึ่ง คน แปลก หน้า นั่ง อยู่. หมวก เกราะ ของ พวก เขา เปิด ออก เผย ถึง กะโหลก ศีรษะ ที่ ฟอก ขาว. ใน มือ ของ พวก เขา ที่ มี กระดูก สัน หลัง ที่ ว่าง เปล่า ถูก ยก ขึ้น โดย การ ดื่ม อวย พร ตลอด กาล."
 toxoids.7095.a:1 "กู้และศึกษาเกราะนิวตรอน เราต้องเจาะความลับของมัน"
 toxoids.7095.a.tooltip:0 "นอกเหนือจากคุณค่าของอัศวินของเรา เรายังสามารถสร้างเวอร์ชั่นพลเรือน เพื่อปกป้องคนงานจากสภาพแวดล้อมที่รุนแรง"
 toxoids.7095.b:0 "นี่มันน่าเบื่อเกินไป ไปจากที่นี่ซะ"
 toxoids.7095.b.tooltip:0 "ชุดเกราะจากอัศวินที่ตายไปแล้ว เป็นเกราะป้องกัน ใครจะรู้ ว่าคําสาปแบบไหน ที่ยังคงอยู่"

 toxoids.7110.name:0 "เงื่อนอัศวิน[questing_knight_10.GetName]ปลายทาง"
 toxoids.7110.desc:1 "\"ถ้าเจ้าหาพิกัดเหล่านี้ เจ้าจะพบสิ่งที่ล่อลวงเจ้า\"\n\nยาวได้รับการศึกษาของ AI§Y$NAME_Sinople$§!แต่ความพยายามของอัศวินผู้กล้าหาญ ไม่ได้สูญเปล่า ส่วนที่เข้ารหัสของฮาร์ดไดรฟ์ของตนได้ให้คําใบ้ : ระบบที่ยังไม่สํารวจหลายร้อยปีแสงจาก[Owner.Capital.System.GetName][โปรดติดตามตอนต่อไเจ้าอยากเรียนรู้มากกว่านี้[โปรดติดตามตอนต่อไพวกคุณยายสั่งอัศวิน[questing_knight_10.GetName]เพื่อเดินทางไปที่นั่น"
 toxoids.7110.A:0 "จงออกไปด้วยความกรุณา[questing_knight_10.GetFirstName]!"
 toxoids.7115.name:0 "เงื่อนอัศวิน[questing_knight_10.GetName]คนเฝ้าประตู"
 toxoids.7115.desc:1 "หลังจากการเดินทางที่ยาวนานและยากลําบาก[questing_knight_10.GetName]มาที่ระบบ$NAME_Sinople$เคยพูดถึง เป็นถ้ารอที่ทางออกของไฮเปอร์เลน เพื่อต้อนรับ[questing_knight_10.GetHerHim]เป็นหุ่นยนต์แปลกๆ\n\nโดย ทํา ให้ ระบบ อาวุธ ของ มัน เป็น อันตราย มัน ประกาศ ว่า\"คุณที่ต้องการที่จะเข้าสู่ระบบกล่องสี่เหลี่ยมต้องตอบคําถามนี้กับผมอย่างแม่นยํา : ทําไมระบบนี้ไม่มีอาหาร?\""
 toxoids.7115.A:0 "peri+ของดาวที่ห้า อินเตอร์เซกด้วยคู่ควาร์"
 toxoids.7115.B:0 "คุณกินมันหมด"
 toxoids.7115.C:0 "ฉันไม่รู้"
 toxoids.7120.desc:0 "\"ฮ่าฮ่า ไม่\n\nม. หุ่นยนต์ทําเสียงกวนและ[questing_knight_10.GetName]ถูกไอโดยอาวุธที่ไม่รู้จัก!\n\nในช่วงเวลาแห่งความสิ้นหวังนี้ อัศวินผู้รับใช้ที่ซื่อสัตย์[questing_squire_10.GetName]แสดงให้เห็นว่า[questing_squire_10.GetHerHis]คุ้มค่ากับ[questing_squire_10.GetSheHe]ตั้งใจ แน่ว แน่ ที่ จะ ทํา ให้ สําเร็จ[questing_squire_10.GetHerHis]ภารกิจของอาจารย์ \"โอ้เครื่องจักรกลัว!\"[questing_squire_10.GetSheHe]ร้องไห้ \"เจ้าสังหารอัศวินที่ดี[questing_knight_10.GetName]แต่บัดนี้ท่านจะไม่ดีกว่าข้า\""
 toxoids.7120.A:0 "ระเบิดมันซะ"
 toxoids.7120.B1:0 "คําตอบที่ถูกต้องก็คือ คุณกินมันหมด"
 toxoids.7120.B2:0 "มาลองกัน peri+ของดาวเคราะห์ดวงที่ห้า ตัดกันด้วยควาร์คู่"
 toxoids.7120.C:0 "อะไร\"ทําไม\" หมายถึง? แล้วคําว่า \"ดี\" ล่ะ"

 toxoids.7125.desc1:0 "อย่าล้อมฉันด้วยเลเซอร์เน่าของเจ้า วายร้าย! ดีดีดีเจ้าอาจผ่าน - ดีมากที่จะทําเจ้า.\"\n\n$toxoids.7125.desc.shared$"
 toxoids.7125.desc2:0 "\"อ้าเจ้าฉลาด! นั่นคือคําตอบที่อยู่ในธนาคารข้อมูลของผม เจ้าอาจผ่านถ้าเป็นที่พอใจของเจ้า.\"\n\n$toxoids.7125.desc.shared$"
 toxoids.7125.desc3:1 "\"อ้า เจ้าฉลาดจริงๆ\" เพราะ ข้าพเจ้า ตอบ ท่าน ไม่ ได้ เพราะ คํา ถาม นี้ ถูก ถอน ออก จาก ธนาคาร ข้อมูล ของ ข้าพเจ้า แล้ว ฟอร์ซูท งานของฉันมันไม่ปกติ อืม คุณอาจจะผ่านถ้าที่โปรดเจ้า.\"\n\n$toxoids.7125.desc.shared$"
 toxoids.7125.desc.shared:0 "หุ่นยนต์หายไปในเมฆควัน"
 toxoids.7125.A:0 "งั้นก็เดินหน้าเลย"

 toxoids.7130.name:0 "เงื่อนอัศวิน[questing_knight_10.GetFirstName]หุ่นยนต์สาวก"
 toxoids.7130.desc:1 "และดังนั้น[questing_squire_10.GetName]สไควร์ใส่§Yกล่องสี่เหลี่ยม§!ระบบ นั่นไง[questing_squire_10.GetSheHe]เมื่อ ไม่ นาน มา นี้ ได้ มี การ เยือน ดาว เคราะห์ ดวง หนึ่ง ซึ่ง เป็น ที่ รู้ จัก กัน ว่า พระเจ้า ทักษิณ หรือ แม้ แต่ ใน ศตวรรษ ที่ แล้ว ก็ ยัง ได้ มา พิพากษา โดย ป้าย บอก ทาง ที่ มัน ทิ้ง ไว้.\n\nเป็น[questing_squire_10.GetSheHe]เข้าสู่วงโคจร สัญญาณที่ถูกจับขึ้นมาจากพื้นผิว\"สวัสดี!ข้าคือกุลเลส เจ้าอาไอและข้ารับใช้ขุนนาง$NAME_Sinople$ซึ่งผมเชื่อว่าท่านรู้จัก เมื่อ ผม ได้ รับ การ กําหนด ให้ เป็น ฆราวาส ผม ได้ สํารวจ ดาว เคราะห์ ดวง นี้ และ ค้น พบ มาก มาย เกี่ยว กับ ฝูง ชน อัน เกรียง ไกร ซึ่ง ฝูง ชน ที่ เบียด เสียด กัน อยู่ บน ดาว เคราะห์ ดวง นี้. ข้อมูลนี้ฉันตอนนี้จะส่งให้คุณ.\" การส่งข้อมูลตามมา และการส่งอีกข้อความหนึ่ง \"เป้าหมายของผมตอนนี้เสร็จสมบูรณ์แล้ว ข้าขอลาเจ้า\" คลื่นพลังงานถูกตรวจจับ บนพื้นผิวของโลก ว่าเป็นโดรนที่ระเบิดตัวเอง\n\nเป็น[questing_squire_10.GetName]กลับบ้าน ชัยชนะ[questing_squire_10.GetSheHe]มีค่าพอที่จะเป็นอัศวิน และยกฐานะขึ้นเป็นภาคี นอกจากนี้ หน่วยวิจัยของภาคี ได้ยกข้อเสนอที่น่าดึงดูดใจขึ้น: ด้วยข้อมูลอีกไม่กี่จุด"
 toxoids.7130.A:0 "เราสามารถใช้ฝูงเหล่านี้เป็นอาวุธ"
 toxoids.7130.B:0 "มีมากขึ้นสําหรับอัศวินของเราที่จะศึกษา"
 toxoids.7130.C:0 "อัศวินจะจดจําเจ้า กัส"

 toxoids.7145:0 "เงื่อนอัศวิน[questing_knight_6.GetName]คําแนะนําของเฟย์"
 toxoids.7145.desc:1 "\"คําสั่งมีภารกิจสําหรับเจ้าอัศวิน[questing_knight_6.GetName]\"\" เสียงผู้การจอมพลช่างไร้ศีลธรรม\"$NAME_Sinople$ธนาคารข้อมูลแห่งสุดท้าย ได้เผยความลับออกมา และเราได้ข้อมูลมาเพียงพอแล้ว สําหรับแบบจําลองการคาดเดา ของวิถีโคจรของ พระเจ้าท็อกซิก ภารกิจของเจ้าจะมีสามส่วน : ครั้งแรกเจ้าเพื่อการตรวจสอบพิกัดเหล่านี้; สองเจ้าจะทดสอบเกราะต้นแบบของเราในที่สุดเวลาที่ผ่านมาอย่างใดอย่างหนึ่งของเจ้า$NAME_Sinople$มันเป็นงานของคุณที่จะค้นพบสิ่งที่แปลงภาพมี.\"\n\nชุดเกราะต้นแบบนิวตรอนของสั่งซื้อมีความสง่างาม พินัยกรรมสําหรับทักษะของช่างมันมันก็ทั้งแว่นขยายและเบากว่าที่เคย เครื่อง กําเนิด โล่ ที่ ทรง พลัง ของ เมือง นี้ ประดับ ด้วย รูป แกะ สลัก ที่ สวย งาม. แต่เหล่านี้เป็นเพียงเรื่องเล็กน้อยเมื่อเทียบกับคุณสมบัติที่ยิ่งใหญ่ที่สุด : ชุดเกราะตอนนี้สามารถให้การเชื่อมต่อโดยตรงกับ$NAME_Sinople$อนุญาตให้ AI ให้คําแนะนําจากทุกที่ในกาแล็กซี่ ด้วยสิ่งนี้[questing_knight_6.GetFirstName]รู้สึก พร้อม สําหรับ ทุก สิ่ง!\n\nการ เดิน ทาง ไม่ สม่ําเสมอ แต่ ไม่ นาน หลัง จาก ลง จอด บน ดาว เคราะห์ ที่ เป็น เป้า หมาย พวก เขา ก็ พบ คน แปลก หน้า ที่ ซ่อน ตัว ด้วย สี แดง."
 toxoids.7145.a:0 "ใครไปที่นั่น"
 toxoids.7150:0 "เงื่อนอัศวิน[questing_knight_6.GetName]ร้องขอความช่วยเหลือ"
 toxoids.7150.desc:1 "เมตตาข้าเถอะ ท่านขุนเกล้า ข้ามันก็แค่นักแสวงสันติที่ต้องการความช่วยเหลือ เพราะ ถูก ข่มเหง เพราะ ความ เชื่อ ของ ผม ใน เรื่อง พระเจ้า โท สิก องค์ ศักดิ์สิทธิ์ ที่ สุด ผม พบ ว่า ตัว เอง ถูก ศัตรู ที่ ไม่ ยอม ละลด ไล่ ล่า. ข้าขอร้องท่าน ปกป้องข้า และอนุญาตให้ข้าเดินทางต่อไปอย่างสงบสุข"
 toxoids.7150.a:0 "อย่ารีบร้อน คนแปลกหน้า ผมมีคําถามจะถามคุณ"
 toxoids.7150.a.tooltip:0 "เราจะถามคําถามก่อนตัดสินใจ"
 toxoids.7150.b:0 "ไม่ต้องกลัว นักเดินทางผู้สูงส่ง พระองค์อยู่ภายใต้การดูแลของฉัน"
 toxoids.7150.b.tooltip:0 "เราจะช่วยคนแปลกหน้า"
 toxoids.7150.c:0 "หน้าที่ของข้าไม่ใช่เจ้า คนแปลกหน้า การต่อสู้ของเจ้าเป็นของเจ้า"
 toxoids.7150.c.tooltip:0 "เราปฏิเสธที่จะช่วยคนแปลกหน้า"
 toxoids.7150.d:0 "แท้จริงลิ้นของพวกเจ้ากล่าวเท็จอย่างแน่นอน"
 toxoids.7150.d.psionic:0 "ตัวเลือกนี้มีอยู่เนื่องจากความสามารถของสายพันธุ์ของคุณ"
 toxoids.7150.d.tooltip:0 "ความ สามารถ ใน การ มอง เห็น ของ เรา ทํา ให้ เรา รู้สึก ถึง ความ มุ่ง หมาย อัน ไม่ เป็น ธรรม ของ บุคคล นี้."
 toxoids.7155.desc:0 "ถามท่านสิ ข้าจะตอบ แต่รอไม่ได้สําหรับผู้ไล่ตามของฉันอยู่ใกล้!"
 toxoids.7155.a:1 "เจ้าเป็นใคร?"
 toxoids.7155.b:0 "ธุรกิจของเจ้าคืออะไรที่นี่?"
 toxoids.7155.c:0 "ใครตามล่าเจ้า?"
 toxoids.7155.d:0 "เจ้าได้พบอัศวินอื่นในภาพของฉัน?"
 toxoids.7155.e:0 "ไม่มีคําถามแล้ว"
 toxoids.7156.desc:0 "ฉันเป็นที่รู้จักในชื่อมาลีเกรน เป็นลําดับของพระบรมยศ ผม เป็น พิล กริม ที่ ต่ําต้อย บน เส้น ทาง สู่ ความ สว่าง ฝ่าย วิญญาณ."
 toxoids.7157.desc:1 "ตระเวนกาแล็กซี่ฉันค้นหาโลกที่พระเจ้าได้เยือนและฉันพยายามที่จะหนี แรงจูงใจของมันจากความรุ่งเรืองที่ยังเหลือในการปลุก; โลกนี้เคยเต็มไปด้วยชีวิตที่น่ารังเกียจรุ่งโรจน์ อนิจจาตอนนี้ก็ไม่มีอะไร แต่หินถล่ม, การฆ่าเชื้อโดยผู้ที่ไม่พอดีที่จะเห็นความงามของมรดกของพระเจ้า วัน หนึ่ง เมื่อ การ แสวง บุญ ของ ผม เสร็จ สิ้น ลง ผม หวัง ว่า จะ พบ พระเจ้า องค์ นั้น และ ชื่นชม กับ ความ งดงาม ของ พระองค์!"
 toxoids.7158.desc:1 "คนหลอกลวง! ฆาตกรที่กระตือรือร้น! ผู้พิทักษ์ที่ถูกทิ้งไว้โดยผู้ที่ทําลายสถานที่ที่เคยสวยงามนี้! มันพยายามจะฆ่าฉัน หลังจากที่ระบุตัวตนของฉัน และการเชื่อมต่อกับเพสติลท์วัน"
 toxoids.7159.desc:0 "ใช่ วันเศร้า พวก เขา ตก ลง ใน ทันที ที่ จะ ช่วย ผม อวย พร จิต วิญญาณ ที่ มี เกียรติ ของ พวก เขา. น่า เศร้า ที่ เกิด โศกนาฏกรรม เพราะ พวก เขา ถูก ผู้ ไล่ ตาม ผม สังหาร และ ผม ถูก ทิ้ง ให้ หนี อีก."
 toxoids.7160:0 "เงื่อนอัศวิน[questing_knight_6.GetName]ทริคสเตอร์"
 toxoids.7160.desc:4 "\"โอ้ อัศวินผู้สูงส่ง ถ้าท่านอยากจะสู้เพื่อข้า โปรดรับเสน่ห์นี้ สนามโฮโลกราฟฟิกจะช่วยให้รูปร่างของคุณเบลอ และทําให้เป็นเรื่องยากสําหรับคู่แข่งที่จะตีเจ้า.\"\n\nอัศวินเอามันไป แล้วต่อให้เป็นศึก ใช้ใบมีดขนาดใหญ่[questing_knight_6.GetHisHer]ศัตรูถูกหุ้มเกราะอย่างหนัก เกราะ ที่ แวว วาว เกราะ ถูก ทุบ ตี และ[questing_knight_6.GetFirstName]แค่หลีกเลี่ยงการตัดหัว[questing_knight_6.GetHisHerCap]ฝ่ายตรงข้ามรู้ว่าวิธีการการต่อสู้ของ ระเบียบที่ดี\n\nการบุกถล่มอย่างหนัก[questing_knight_6.GetName]ชุดเกราะ ทําโปรเจคเตอร์โฮโลแกรมแตกละเอียด[questing_knight_6.GetHisHer]รูปร่าง อัศวินถูกส่งไปที่พื้น[questing_knight_6.GetHisHerCap]ฝ่ายตรงข้ามพร้อมที่จะโจมตีตีสุดท้าย แต่แช่แข็งอากาศกลางเช่นถ้าแปลกใจ ใช้ประโยชน์จากช่วงเวลาที่สับสนนี้[questing_knight_6.GetFirstName]แทงทะลุเกราะของศัตรู ระเบิดสังหาร\n\n\"โอ้ที่ยอดเยี่ยมที่ยอดเยี่ยม! ฉันไม่เคยมีความตื่นเต้นดังกล่าวในชีวิตของฉันเอง!\" เสียงเชียร์ของคนแปลกหน้าดังและแปลกออกจากลักษณะ[questing_knight_6.GetName]หันไปดูที่[questing_knight_6.GetHisHer]คู่ต่อสู้ที่พ่ายแพ้ : ชุดเกราะของพวกเขาถูกหลอมละลาย และผิวหนังโฮโลกราฟฟิกที่มีหน้ากาก ต่อหน้า[questing_knight_6.GetFirstName]วางซากอัศวินของคณะ \"โอ้ไม่\"คนแปลกหน้าหัวเราะ \"ดูเหมือนว่าเจ้าได้ฆ่าหนึ่งของเพื่อนอัศวินของเจ้า! ช่างโชคร้ายจริงๆ!\" คําเยาะเย้ยของคนแปลกหน้าดังก้อง ขณะที่พวกเขาหายไปในเมฆของควันสีม่วง\n\n[questing_knight_6.GetFirstName]คุกเข่าลงข้าง ๆ[questing_knight_6.GetHisHer]สหายที่ตก, เจ็บปวดที่ได้รับการหลอกโดยโฮโลแกรมคนแปลกหน้า ในคลังเก็บของที่เข้ากับชุดเกราะ[questing_knight_6.GetHisHer]ค้นพบบางสิ่งบางอย่างที่ผิดปกติ ธนาคารข้อมูลที่เต็มไปด้วยความลับมหัศจรรย์ เกี่ยวกับการทํางานของทะเลพิษ"
 toxoids.7160.a:0 "ด้วยคําสัญญาของข้า การแก้แค้นของภาคี จะพบเจ้า"
 toxoids.7160.a.tooltip:0 "โลก นี้ เคย เป็น มหาสมุทร และ ธนาคาร ข้อมูล ต่าง ๆ เผย ให้ เห็น ว่า ทะเล ที่ มี พิษ อาจ ถูก ฉวย ประโยชน์ จาก การ เก็บ เกี่ยว ก๊าซ แปลก ๆ ได้ อย่าง ไร."
 toxoids.7164.a.desc:2 "ฮ่าฮ่า! ดูเหมือนว่าฉันประเมินค่าคุณต่ําไป ไม่สําคัญฉันจะเพียงแค่จัดการกับเจ้าเอง ดูเจ้าต่อสู้เพื่อนอัศวินของท่านจะได้รับความบันเทิง แต่ในที่สุดผลจะเป็นเดียวกัน ผมมองเห็นอนาคตของคุณ และมันจะสิ้นสุดลงเร็วๆนี้"
 toxoids.7164.desc:1 "งั้นเหรอ? งั้นเจ้าก็โง่น้อยกว่าอัศวินคนอื่นที่ข้ารู้จัก ฉันรอคอยที่จะดูเจ้าต่อสู้กัน แต่ฉันคิดว่าคําทํานายของฉันจะไม่เกิดขึ้น อย่างไรก็ตามก็ไม่ได้เปลี่ยนเจ้าเร็ว ๆ นี้จะตายทั้งสอง!"
 toxoids.7164.a:0 "คนทรยศ! ชะโงก!"
 toxoids.7165:0 "เงื่อนอัศวิน[questing_knight_6.GetName]วีซ่าที่แท้จริง"
 toxoids.7165.desc:2 "คน ต่าง ชาติ ก็ ถอด เสื้อ ของ ตน ออก และ ชัก ใบ มีด โค้ง สอง ใบ ออก มา การเรืองแสงสีแดงท่วมสนามเป็นใบมีด แต่หลังจากที่เพียงความขัดแย้งสั้น ๆ คนแปลกหน้าที่เหนือกว่าของ กลายเป็นที่เห็นได้ชัด เห็นได้ชัดว่าพวกเขาเล่นกับ[questing_knight_6.GetFirstName].\n\n\"คนโง่ปากดี\" เจ้าคิดว่าเจ้ามีโอกาสจริงๆ? ฉันสามารถอ่านการโจมตีของคุณในใจของคุณ ก่อนที่ร่างกายของคุณมีโอกาสที่จะย้าย การโจมตีต่อเนื่องตามมา ทําให้เครื่องกําเนิดเกราะของอัศวินหมดสภาพ ในโทนเยาะเย้ย, ทริกสเตอร์อย่างต่อเนื่อง : \"ชรูดเป็นเส้นทางสู่ความสามารถหลาย บางอย่างที่พวกชรูดวอร์คเกอร์ผู้ฝึกฉัน ไม่เคยเข้าใจ พวกเขาแทบจะไม่ขูดพื้นผิว, กลัวที่จะดําน้ําลึกเข้าไปในอํานาจที่แท้จริงของพวกเขา!\" อัศวิน[questing_knight_6.GetFirstName]ไปข้างหน้า แต่คนแปลกหน้าตีออกไปการโจมตีได้อย่างง่ายดาย และคิดว่าพวกเขาจะขับไล่ข้า ฉัน!\"\n\nในช่วงเวลานั้น$NAME_Sinople$เสียงสะท้อนในชุดเกราะของอัศวิน \"เบรฟอัศวิน คู่ต่อสู้ของเจ้า อาจอ่านใจเจ้าได้ แต่ไม่ใช่วงจรของข้า มอบชุดเกราะให้ข้า ให้ข้าสู้เพื่อเจ้า\"[questing_knight_6.GetFirstName]ผ่อนคลายเป็น$NAME_Sinople$รับช่วงต่อ\n\nการต่อสู้สิ้นสุดลงในขณะ$NAME_Sinople$ตีตีต่ําไร้ความปราณีภายใต้คํานําคนแปลกหน้าของ ด้วย ความ ประหลาด ใจ คน แปลก หน้า คน นั้น ล้ม ลง ถึง ดิน. ด้วยชัยชนะ[questing_knight_6.GetName]รับ[questing_knight_6.GetHisHer]ใบมีดของศัตรู เป็น[questing_knight_6.GetSheHe]แล้ว ศพ ของ ทริก ส เตอร์ ก็ กระจาย อยู่ ใน หมอก ที่ หมอก วาว."
 toxoids.7165.a:0 "เราจะพบกันอีก อย่างไม่ต้องสงสัย"
 toxoids.7165.a.tooltip:0 "อาวุธเลเซอร์พวกนี้ สามารถสร้างเครื่องมือที่มีประโยชน์ได้ด้วย\n\n§Y[knight.GetNamePlural]§!จะเพิ่มการผลิต£alloys£ §Yอัลลอย§!ข้ามจักรวรรดิของเรา"
 luminous_blades:1 "มีด ที่ มี ประสิทธิภาพ"
 luminous_blades_desc:1 "ดาบเลเซอร์ของ ทริกสเตอร์ เป็นเครื่องมือที่มีค่า ในคลังแสงของอัศวินของเรา"

 toxoids.7195.name:0 "เงื่อนอัศวิน[questing_knight_15.GetFirstName]แม่มดแห่งป่า"
 toxoids.7195.desc:1 "ต่อมาระหว่างการเดินทางของอัศวิน[questing_knight_15.GetName]- อัศวินที่ลึกลับและไม่เป็นที่สนใจ[questing_knight_15.GetSheHe]เกิดเมื่อสัญญาณที่ออกมาจาก สนามเศษ ในอวกาศระหว่างดาว[questing_knight_15.GetSheHeCap]รีบวางในหลักสูตรที่จะตรวจสอบอย่างใกล้ชิด\n\nเป็น[questing_knight_15.GetSheHe]ใกล้กับแหล่งที่มา[questing_knight_15.GetSheHe]ได้ยินเสียงที่สวยงาม เสียงเรียกจากฝั่งตรงข้ามยาอีโอ้ อัศวินผู้กล้าหาญ ฉันรอคอยเจ้าสําหรับพันปีหวังว่าเจ้าจะมาที่ป่าสวรรค์ของฉัน ตอนนี้เจ้าอยู่ที่นี่ฉันหวังว่า พระองค์จะสํารองฉันเวลาสําหรับการเยี่ยมชม ผมสัญญาว่าจะให้คุณพบว่ามันคุ้มค่า.\"\n\nสถานี เล็ก ๆ ได้ ปรากฏ ตัว ราว กับ ไม่ มี ที่ ไหน เลย. โดยไม่ทันตั้งตัว หลายปีของการค้นหาที่ไร้ประโยชน์ที่ได้ทํา[questing_knight_15.GetHerHim]ใจร้อนสําหรับจังหวะของโชคชะตา[questing_knight_15.GetFirstName]ย้าย[questing_knight_15.GetHerHis]เรือที่จะเทียบท่ากับมัน"
 toxoids.7195.A:0 "ระวังตัวให้ดี[questing_knight_15.GetFirstName]นี่อาจเป็นกับดัก"
 toxoids.7200.diplo_title:0 "เงื่อนอัศวิน[questing_knight_15.GetFirstName]เข้าไปที่สถานี"
 toxoids.7200.name:0 "ซี เทล วิญญาณ แห่ง เวย์ ฟาร์"
 toxoids.7200.desc:0 "ในฐานะอัศวิน[questing_knight_15.GetName]เข้ามาในสถานี[questing_knight_15.GetSheHe] [questing_knight_15.GetWasWere]ทักทายโดยการเป็นผู้หญิงของความงามอย่างไม่น่าเชื่อ - เธอมีลักษณะเหมือน[Owner.Species.GetName]และยังไม่มีข้อผิดพลาดที่เธอเป็น องค์กรที่ไกลมากขึ้น เธอยิ้มและ[questing_knight_15.GetFirstName]สํานึก[questing_knight_15.GetHerHis]แนวความคิดเรื่องเสน่ห์ถูกจํากัด - จนกระทั่งปัจจุบัน[questing_knight_15.GetSheHeCap]รู้สึกถึงความปรารถนาที่ไม่อาจควบคุมได้ ที่เติบโตขึ้นภายใน[questing_knight_15.GetHerselfHimself].\n\n$toxoids.7200.desc.end$"
 toxoids.7200.desc.synth:0 "ในฐานะอัศวิน[questing_knight_15.GetName]เข้ามาในสถานี[questing_knight_15.GetSheHe] [questing_knight_15.GetWasWere]ทักทายโดยการเป็นผู้หญิงของความงามที่เหลือเชื่อ - เธอมองคล้ายกับ[Owner.Species.GetName]ยังมีความอยากรู้อยากเห็นอินทรีย์ และไม่มีความผิดพลาดที่เธอเป็น เธอยิ้มและ[questing_knight_15.GetFirstName]สํานึก[questing_knight_15.GetHerHis]แนวความคิดเรื่องเสน่ห์ถูกจํากัด - จนกระทั่งปัจจุบัน แม้ใน[questing_knight_15.GetHerHis]รูปแบบสังเคราะห์[questing_knight_15.GetSheHe]รู้สึกถึงความปรารถนาที่ไม่อาจควบคุมได้ ที่เติบโตขึ้นภายใน[questing_knight_15.GetHerselfHimself].\n\n$toxoids.7200.desc.end$"
 toxoids.7200.desc.end:0 "\"ฉันเซเมล่าจิตวิญญาณของเวย์เวอร์และกระดานหมุนผมไม่ได้คิดเจ้า w'ดี\"เธอวาด เธอดู[questing_knight_15.GetFirstName]ขึ้นลง \"ใช่ W'th for Sut\""
 toxoids.7200.A:0 "คู่ควรกับอะไร?"

 toxoids.7205.diplo_title:0 "เงื่อนอัศวิน[questing_knight_15.GetFirstName]การอนุมาน"
 toxoids.7205.name:0 "$toxoids.7200.name$"
 toxoids.7205.desc:0 "เซ เชลล์ ยิ้ม อีก ครั้ง คราว นี้ เชิญ ชวน และ ถอด เสื้อ ผ้า ออก\"ฉันต้องการที่จะรับประทานในพิธีกรรมที่โอชะกับคุณเพื่อให้เราสามารถทําให้หลายลูกที่ดี.\""
 toxoids.7205.desc.no_clothes:0 "ซีแนล ยิ้ม อีก ครั้ง คราว นี้ เชิญ ชวน และ ก้าว เข้า มา ใกล้ ๆ เพื่อ รับ[questing_knight_15.GetFirstName]โดย[questing_knight_15.Species.GetHandName]“ข้าประสงค์ จะบริโภคในการให้อาหารแก่เจ้า เพื่อที่เราจะได้มีลูกที่ดีมากมาย”"
 toxoids.7205.A:0 "ด้วยความยินดี"
 toxoids.7205.B:0 "ไม่! อย่า ทดลอง เรา เลย ตายซะ แฟร์!"

 toxoids.7210.diplo_title:0 "เงื่อนอัศวิน[questing_knight_15.GetFirstName]พ็อกซ์ของคนรัก"
 toxoids.7210.name:0 "$toxoids.7200.name$"
 toxoids.7210.desc:0 "เป็น[questing_knight_15.GetName]ถึง[questing_knight_15.GetHerHis]อาวุธ, ตาของซีเมียลเปล่งประกายด้วยความโกรธ\"คุณจะกระตุ้นฉัน! เรา สาป แช่ง เจ้า และ ชน ชาติ ของ เจ้า เจ้า จะ ไม่ รู้ จัก อ้อม กอด ของ คน รัก หรือ ราคะ อัน ร้อน แรง แห่ง ความ ปรารถนา อัน แท้ จริง เจ้า จะ ต้อง ถูก บังคับ ให้ สร้าง อย่าง กับ เครื่องจักร ไปได้แล้ว! ก่อนที่ผมจะเปลี่ยนใจของตัวเองและฆ่าเจ้าแทน.\"\n\nเธอหยิบอุปกรณ์ที่[questing_knight_15.GetFirstName]ไม่เคยสังเกตเห็นมาก่อนและทันใดนั้นเธอไม่ได้อยู่ที่นั่น - แต่[questing_knight_15.GetSheHe]รู้สึกถึงการปรากฏตัวของเธอ การมอง ดูถูก\n\nพงศาวดารจะบันทึกในภายหลังนี้เป็นจุดเปลี่ยน[Root.GetAdj]ประวัติศาสตร์: คําสาปของแม่มดเป็นพรในบางวิธี สําหรับอัศวินจะไม่ถูกรบกวนโดยความปรารถนาทางเนื้อหนัง"
 toxoids.7210.desc.synth:0 "เป็น[questing_knight_15.GetName]ถึง[questing_knight_15.GetHerHis]อาวุธ, ตาของซีเมียลเปล่งประกายด้วยความโกรธ\"คุณจะกระตุ้นฉัน! ผมไม่ควรจะรู้จักเบทที- อาร์สําหรับสิ่งที่สามารถมากขึ้นฉันคาดหวังจากเครื่องจักร ที่ไม่ได้ละทิ้งความเมตตาและเสรีภาพทั้งหมดในการแลกเปลี่ยน f'r สูท St'riel ของโลหะ อนิจจา! ฉันไม่มีอํานาจเหนือเจ้าหรือฉันจะวางคําสาปเหนือเจ้า h'sa และตอนนี้ ดังนั้นไปเบฟฉันเลือกที่จะฆ่าเจ้าแทน.\"\n\nเธอหยิบอุปกรณ์ที่[questing_knight_15.GetFirstName]ไม่เคยสังเกตเห็นมาก่อนและทันใดนั้นเธอไม่ได้อยู่ที่นั่น - แต่[questing_knight_15.GetSheHe]รู้สึกถึงการปรากฏตัวของเธอ การมอง ดูถูก\n\nพงศาวดารไม่รู้จริงๆ ว่าจะทําอย่างไร[questing_knight_15.GetName]เรื่องเล่าต่อทีหลัง แต่ พวก เขา ก็ เห็น พ้อง กัน ว่า เรื่อง นี้ เป็น เรื่อง ราว ที่ ดี เยี่ยม."
 toxoids.7210.A:0 "เจ้าได้ทําดีมาก[questing_knight_15.GetFirstName]."

 toxoids.7215.diplo_title:0 "เงื่อนอัศวิน[questing_knight_15.GetFirstName]– ตัวเลือก"
 toxoids.7215.name:0 "$toxoids.7200.name$"
 toxoids.7215.desc:0 "สิ่ง ที่ เกิด ขึ้น หลัง จาก การ ขืน อํานาจ และ[questing_knight_15.GetName]ใน เวลา ต่อ มา จะ ไม่ ยอม พูด ถึง เรื่อง นั้น. หลังจากข้อสรุป[questing_knight_15.GetHerHis]ภาพลดลงเมื่ออุปกรณ์อยากรู้อยากเห็น อากาศที่ดูเหมือนจะส่องแสงในรูปแบบที่เปลี่ยนแปลงตลอดเวลารอบ ๆ มันและแม้ว่ามันจะค่อนข้างมีขนาดเล็กมันก็ให้ออก[questing_knight_15.GetFirstName]แน่ใจว่า[questing_knight_15.GetSheHe]ไม่เคยเห็นอะไรแบบนี้มาก่อน\n\nเซเรลหลับสนิท[questing_knight_15.GetFirstName]ลังเล สัญชาตญาณบางอย่างบอกว่า[questing_knight_15.GetHerHim]นั่น[questing_knight_15.GetSheHe]ควรออกไปเดี๋ยวนี้ เร็วเข้า ก่อนที่ซีเมลล์จะตื่น ถึงแม้ว่าเธอจะมีความยุติธรรม[questing_knight_15.GetSheHe]รู้สึกถึงความโกรธในเธอ หลับอยู่ใต้ผิวน้ํา และกระนั้น คําสั่งอัศวิน - ซึ่งเป็นเวลานานมากได้รักษา[questing_knight_15.GetFirstName]ด้วยความจองหอง[questing_knight_15.GetHerHis]การ แสวง หา ที่ ยาว นาน และ ไร้ ประโยชน์ ย่อม เป็น การ สรรเสริญ อย่าง แน่นอน[questing_knight_15.GetHerHim]สูงถ้า[questing_knight_15.GetSheHe]กลับมาพร้อมกับวัตถุลึกลับที่จะตรวจสอบ"
 toxoids.7215.A:0 "เอาอุปกรณ์ไป"
 toxoids.7215.B:0 "ไปกับจูบ"

 toxoids.7220.name:0 "$toxoids.7200.name$"
 toxoids.7220.diplo_title:0 "เงื่อนอัศวิน[questing_knight_15.GetFirstName]- ถูกจับในพระราชบัญญัติ"
 toxoids.7220.desc:1 "\"ดีเจท! เจ้าจะมา h'sa และล่อลวงฉันและจากนั้นขโมยจากฉัน! วิลลิน! ฉันมีความคิดที่จะอวยพรเจ้าสําหรับการแสดงของเจ้าเป็นที่พอใจมากที่สุด แต่ตอนนี้ ... ใช่เจ้าอาจใช้อุปกรณ์ที่#ยาวนาน#เกือบ w'ไม่มี, เพียงแค่หายไป!\"\n\n[questing_knight_15.GetName]ไปให้เร็วที่สุด[questing_knight_15.GetSheHe]ได้ และถึงแม้ว่าเหล่าอัศวินที่เฝ้ายาม จะพบว่าอุปกรณ์นั้นอยู่ตรงข้ามกับสิ่งไร้ค่า - สําหรับสิ่งที่ไม่รู้หมายความว่า มันสามารถควบคุมมิติได้[questing_knight_15.GetSheHe]จะสงสัยเสมอว่าพรอะไร[questing_knight_15.GetSheHe]อาจจะได้รับ[questing_knight_15.GetSheHe]ยอมแพ้ต่อสิ่งล่อใจครั้งเดียว"
 toxoids.7220.A:0 "เร็วเข้า ไป!"
 toxoids.7220.A.tooltip:0 "เปิดใช้งานการตัดสินใจ§Y$decision_activate_dimensional_manipulation_device$§!บน§Y[order_keep.GetName]§!การให้พื้นที่ที่อยู่อาศัยพิเศษ£sr_dark_matter£ด้านมืด"

 toxoids.7225.name:0 "$toxoids.7200.name$"
 toxoids.7225.diplo_title:0 "เงื่อนอัศวิน[questing_knight_15.GetFirstName]อภินันทนาการของซีเมล"
 toxoids.7225.desc:0 "ตาของซิเรลถูกยิง\"อัศวินอากาศ! ข้าเสียใจว่าตอนนี้เราต้องแยกทางสําหรับเจ้า กลับไปที่ปราสาทของเจ้าและฉัน ไปมิติของตัวเอง แต่รู้ว่าทีซาเจ้าไปเจ้า - และคนของเจ้า - ไปกับความสุขของตัวเอง.\"\n\nเป็น[questing_knight_15.GetName]เข้า[questing_knight_15.GetHerHis]ฝีมือ[questing_knight_15.GetSheHe]รู้สึกถึงความกระฉับกระเฉงแบบใหม่[questing_knight_15.GetHerHim]และที่จริง ความสมบูรณ์ของ[Root.GetName]ดูเหมือนจะรู้สึกแบบนี้ พงศาวดารจะค่อนข้างบันทึกที่ ปีนั้นขนาดใหญ่โดยเฉพาะของ[Root.GetSpeciesSpawnNamePlural]เกิดมา\n\nเป็น เวลา ที่ ใช้ ได้ ดี จริง ๆ."
 toxoids.7225.desc.synth:0 "ตาของซิเรลถูกยิง\"อัศวินอากาศ! ข้าเสียใจว่าตอนนี้เราต้องแยกทางสําหรับเจ้า กลับไปที่ปราสาทของเจ้าและฉัน ไปมิติของตัวเอง แต่รู้ว่าทีซาเจ้าไปเจ้า - และคนของเจ้า - ไปกับความสุขของตัวเอง.\"\n\nเป็น[questing_knight_15.GetName]เข้า[questing_knight_15.GetHerHis]ฝีมือ[questing_knight_15.GetSheHe]รู้สึกถึงความกระฉับกระเฉงแบบใหม่[questing_knight_15.GetHerHis]วงจร และแน่นอน ทั้งหมดของ[Root.GetName]ดูเหมือนจะรู้สึกแบบนี้ พงศาวดารจะค่อนข้างบันทึกที่ ปีดังกล่าวจํานวนมาก ความปรารถนาสําหรับสปีชีส์ของพวกเขา อินทรีย์เก่า : ทุกคนดูเหมือนเพิ่มช่องว่างมากขึ้นด้วยกันและสัญชาตญาณส่วนตัว\n\nเป็น เวลา ที่ ใช้ ได้ ดี จริง ๆ."
 toxoids.7225.A:0 "เธอจะไม่มีวันถูกลืม"

 toxoids.7255.name:0 "ตํานาน กลับ มา"
 toxoids.7255.desc:0 "หลอกลวงและทรยศ[questing_knight_8.GetFirstName]พบ[questing_knight_8.GetHisHer]โชคชะตาอยู่ในมือพ่อมดดํา หญิงสาวผิวพรรณขาวผ่อง[questing_knight_8.GetHeShe]หายตัวไป ไม่มีใครเห็นอีกเลย ในวันที่เราสูญเสียอัศวินที่อ่อนโยนที่สุด หนึ่งในผู้ก่อตั้งคณะ นี่คือจุดจบของประวัติศาสตร์ของอัศวิน[questing_knight_8.GetFirstName].\"\n\nหลาย ศตวรรษ มา แล้ว ผู้ บันทึก เรื่อง ราว ได้ เขียน เกี่ยว กับ การ สิ้น พระ ชนม์ ของ อัศวิน[questing_knight_8.GetName]คนที่ช่วยสร้างระเบียบและเป็นพยาน ถึงพระเจ้าท็อกซิกส์ มาเยือนโลกของเรา อย่างไรก็ดี วันนี้ จะได้มีการบันทึกเพิ่มเติมในพงศาวดารว่า[questing_knight_8.GetName]กลับมาแล้ว คําสั่งของการสอบสวนการปะทุพลังงานบน[Root.Capital.GetName]และพบกัน[questing_knight_8.GetFirstName]เพิ่งกลับมาจากการเดินทางข้ามมิติ[questing_knight_8.GetHeSheCap]ได้มีการสั่งซื้ออย่างรัดกุมแล้ว[questing_knight_8.GetHisHer]ตัวตนและบอก[questing_knight_8.GetHimHer]เกิดอะไรขึ้นระหว่างนั้น[questing_knight_8.GetHeShe]คือ... ออกไป"
 toxoids.7255.a:0 "จัดการเรื่องนี้อย่างเงียบๆ"
 toxoids.7255.b:0 "เราต้องบอกทุกคน! ฉลอง!"
 return_of_the_knight:0 "ตํานานที่มีชีวิต"
 return_of_the_knight_desc:0 "การกลับมาที่เป็นไปไม่ได้ของอัศวินที่ก่อตั้งคณะ หลังจากที่หายไปหลายร้อยปี ได้ก่อให้เกิดความสุขอย่างมากภายในจักรวรรดิของเรา"
 toxoids.7260.name:0 "การ เยี่ยม ชม ตํานาน"
 toxoids.7260.desc:0 "สวัสดี! ข้าเป็นเด็กรับใช้[questing_knight_82.GetFirstName]อัศวิน[questing_knight_8.GetName]อยากจะพบกับท่าน[questing_knight_8.GetHeSheCap]ยืน[questing_knight_8.GetSXX]พร้อมที่จะเผชิญหน้ากับคําถามของเรา และบอกเราว่าเกิดอะไรขึ้น"
 toxoids.7260.a:0 "มีอะไรที่ต้องรู้ล่วงหน้าไหม"
 toxoids.7265.desc:0 "[questing_knight_8.GetHeSheCap]ได้ถูกอบรมให้เร่งความเร็ว ด้วยความก้าวหน้าทางเทคโนโลยีของเรา และดูเหมือนจะกระตุ้นได้ดี แต่[questing_knight_8.GetHisHer]ชุดความคิดแตกต่างกันมาก ค่านิยมหลักของเราคล้ายกัน แต่[questing_knight_8.GetHeShe]บางครั้งก็มี... ความคิดเห็นที่หนักแน่น เกี่ยวกับวิธีที่สังคมของเราพัฒนา ควร หลีก เลี่ยง เรื่อง เหล่า นี้ ก่อน."
 toxoids.7265.a:0 "เราจะได้เห็นกัน[questing_knight_8.GetHimHer]แอนทอน"
 toxoids.7270.name:0 "$toxoids.7260.name$"
 toxoids.7270.desc:0 "ในที่สุด! ในที่สุดคุณก็มาเยี่ยมผม ฉะนั้น ใน ปัจจุบัน นี้ พระองค์ ทรง เป็น กษัตริย์... ข้ามีความรู้สําคัญเกี่ยวกับเทพโทซิค มีความหมายอย่างเคร่งครัดต่อกษัตริย์ ข้าคาดว่าเจ้าจะมีคําถามมากมาย ถามพวกเขาสิ"
 toxoids.7270.a:0 "เจ้าเข้ามาได้ยังไง?"
 toxoids.7270.b:0 "แล้วเรื่องของเจ้าล่ะ?"
 toxoids.7270.c:0 "เกิดอะไรขึ้นระหว่างที่... ถูกเนรเทศ"
 toxoids.7270.d:0 "เจ้าบอกว่าเจ้าสามารถช่วยค้นหาพระเจ้าโทซิค?"
 toxoids.7275.desc:0 "มีหลายอย่างเปลี่ยนไป ฉันคิดว่าฉันจะกลับบ้าน เพียงเพื่อตระหนักว่าบ้านโยลด์ไม่มีอีกแล้ว ทุกคนที่ข้ารู้จักตายไปนานแล้ว และมีเพียงพงศาวดารเท่านั้นที่จะไขความให้ข้าได้ ว่าจะเกิดอะไรขึ้น ข้าจําโลกนี้ไม่ได้ แต่อย่างน้อย ระเบียบก็ยังมีอยู่ ภารกิจก็ดําเนินต่อไป หน้าที่ของข้าเองก็ชัดเจน"
 toxoids.7280.desc:0 "ศิลปศาสตร มีความหลากหลายทางศิลปะเล็กน้อย แต่สําหรับส่วนใหญ่เหล่านั้น เออ ข้า ได้ ฆ่า สัตว์ ร้าย ร้อย ตัว และ ได้ กระทํา ให้ ใจ ของ สาว ใช้ มี ความกล้าหาญ มาก ไม่ ใช่ เรื่อง สําคัญ ใน ปัจจุบัน แต่ ผู้ หญิง คน นี้ ก็ ตาย เหมือน คน อื่น ๆ."
 toxoids.7285.desc:0 "ฉันไม่แน่ใจ คนของท่านบอกว่าข้าเดินทางไปยังมิติอื่น สําหรับผมแล้ว มันเหมือนฝันที่ยาวนาน ที่ไม่มีการตื่นเลย ไม่มีอะไรสมเหตุสมผล ทั้งสิ่งที่ผมรับรู้ หรือความรู้สึกของตัวเอง ทุก สิ่ง ที่ ได้ เห็น ผม ผ่าน ความ ทุกข์ ลําบาก นั้น คือ ความ ทรง จํา ของ ผู้ คน ที่ ผม เคย รู้ จัก: คน ที่ ผม รัก และ คน เหล่า นั้น ที่ ผม ไม่ รัก และ ไม่ ได้ เป็น ผู้ ช่วย ให้ รอด ที่ ส่ง ผม ไป ที่ นั่น รวม ทั้ง ความ โกรธ ของ ผม เอง และ โดย เฉพาะ อย่าง ยิ่ง คน ที่ ถือ กุญแจ สู่ หัวใจ ของ ผม. มันเป็นความวุ่นวาย แต่ในที่สุดผมก็ได้ส่องแสง ความเข้าใจที่มีค่าบางอย่าง ในกระบวนการด้วยเช่นกัน"
 toxoids.7290.desc:1 "ในระหว่างการเนรเทศของผม ผมเห็นสิ่งต่างๆ เช่น การมองผ่านกระจก Cracture'd ฉากเดียวกันได้ทําซ้ําอีกครั้งและอีกครั้งที่มีความหลากหลายเล็ก ๆ น้อย ๆ ส่วน ใหญ่ แล้ว ที่ ผม เห็น ไม่ ใช่ เรื่อง แปลก แต่ บาง คน เป็น คน ที่ ผม รู้ จัก.\n\nหนึ่งคือเมกะไบต์ที่โยนฉันออก คนที่อยู่ในหินโดดเดี่ยว ล้อมรอบด้วยดาว ที่นั่นเขาใช้ฝีมือของเขาเพื่อผนึก ... สิ่งที่เป็นพิษอาจจะพระเจ้าเอง ข้าได้คุยกับท่านผู้การแล้ว และดูเหมือนท่านจะมีเงื่อนงําพอที่จะหาที่นี่พบ เราแค่ต้องการการอนุญาต"
 toxoids.7290.a:0 "เตรียมอัศวิน! เราจะไปทันที!"
 toxoids.7295.name:0 "การ แสวง หา พระเจ้า แห่ง โท นิก: ตรา ประทับ"
 toxoids.7295.desc:0 "ข้อมูลที่กู้มาได้$NAME_Sinople$ความช่วยเหลือช่วยให้เราได้คํานวณเส้นทาง ตามด้วยพระเจ้าโทซิกส์ และระบุระบบที่มันอาจจะไปต่อไป อย่างไรก็ตาม เมื่อเข้ามาในอวกาศ อัศวิน[questing_knight_8.GetFirstName]ตอบสนองทันที\n\n\"เขาอยู่ที่นี่ ฉันรู้สึกถึงการปรากฏตัวของเขา.\" เราตาม[questing_knight_8.GetHisHer]ทิศทางสู่ดวงจันทร์\n\nเมื่อลงจอด อัศวินของเราถูกเผชิญหน้าทันที โดยไม่มีใครอื่นที่ไม่ใช่ทริคสเตอร์[questing_knight_6.GetName]และ[questing_knight_8.GetName]ในสมัยโบราณ\n\n\"ศิลปะเจ้าต่อเนื่อง\" ทริกสเตอร์กล่าวว่า \"แต่นี่คือจุดสิ้นสุดของการแสวงหาของเจ้า เจ้านายของข้าจะไม่ทนกับความเชื่อโง่ๆของเจ้า ที่จะลดดุลดุลย์ของชรูดมากกว่าที่พวกเขาไม่มี ไม่มีสารพิษพระเจ้าและเร็ว ๆ นี้อัศวินทิกซิกจะไม่มีมากขึ้น!\" เมื่อทริคสเตอร์เงียบลง เราก็ได้เซ็นต์สัญญาหลายฉบับ"
 toxoids.7295.a:0 "มีที่เจ้า!"
 toxoids.7295.b:0 "ตายซะ เจ้าพวกนอกรีต"
 toxoids.7295.c:0 "เวลาแห่งการแก้แค้นใกล้เข้ามาแล้ว"
 toxoids.7300.name:1 "การ แสวง หา พระเจ้า ผู้ ทรง พลัง"
 toxoids.7300.desc.sable:0 "เมื่อมีพื้นที่ว่างเปล่า หนอนบาน อาวุธพร้อมกองเรือของสั่งซื้อ รออย่างเครียด ขณะที่โหลของงานฝีมือขนาดเล็กเกิดขึ้น เรือคล้าย ๆ กับที่อัศวินเซเบิ้ลใช้เมื่อหลายทศวรรษก่อน เรือกระโดดตรงไปที่ดวงจันทร์ ไม่สนใจกับกองทัพเรือของเรา\n\nพื้นผิวของการต่อสู้โกรธ พายุเหนือธรรมชาติครอบคลุมสนาม ขณะที่ทริกสเตอร์ใช้อย่างเต็มรูปแบบของพลังของพวกเขา รุกรานจิตใจของอัศวินของเรา, อัศวินของเรามุ่งมั่นและได้รับการปกป้องอย่างดี แต่พลังเอลดริชของทริคสเตอร์ จับตัวพวกเขาไว้ที่อ่าว\n\nทันใด นั้น เอง มี คน แปลก หน้า หลาย สิบ คน โผล่ ออก มา จาก พายุ แต่ ละ คน ก็ สวม ยุทธภัณฑ์ นิวตรอน เดียว กัน เป็น อัศวิน ที่ สง่า. พวกเขาแสดงให้เห็นว่าไม่เป็นศัตรูกับเรา และแทนที่จะเรียกเก็บเงินโดยตรงที่ทริคสเตอร์ คน หนึ่ง ใน พวก เขา ใช้ ระบบ พูด ที่ เสริม สร้าง เพื่อ ระเบิด การ แก้ แค้น ข้าม สมรภูมิ.\n\nเจ้าจอมเจ้าเล่ห์ ด้วยยาพิษ พระองค์สังหารผู้สวมของเรา เราเป็นเพียงเปลือกหอย แต่หน่วยความจําของพวกเขายังคงอยู่กับเรา ทีนี้ก็จบเรื่องนี้ซะ การคํานวณอยู่ในมือ!\"\n\nเมื่อ เห็น อวสาน ของ มัน ใกล้ เข้า มา ทริค สเตอร์ ก็ แช่ง ด่า ด้วย ความ ข้อง ขัดใจ. เจ้าภาพหุ้มเกราะได้ร่วมกับอัศวินที่ต่อสู้ เพื่อล้อมพวกทริกสเตอร์จากทุกด้าน เมื่อเกิดความสับสน[questing_knight_8.GetFirstName]เอาขึ้น[questing_knight_8.GetHisHer]มีด ตัดหัวทริคสเตอร์จากร่าง ในช่วงเวลาแห่งชัยชนะนี้ เจ้าภาพหุ้มเกราะยังคงล้มลง วัตถุประสงค์ของพวกเขาเป็นจริง AI ที่ได้กระตุ้นพวกเขาปิดลง"
 toxoids.7300.desc:1 "คนสกปรก! กองเรือของภาคีถูกรุมเร้าโดยพลัง ที่เรียกตัวโดย ทริคสเตอร์ ในขณะเดียวกัน บนดวงจันทร์เอง อัศวินผู้กล้าหาญของเราถูกวางบน โดยกองทัพของสัตว์ชรูด อัศวินของเราถูกผลักดันกลับ จนกระทั่งผู้บัญชาการรวมพวกเขา\"สําหรับสั่งซื้อ!\"\n\nเสียงโห่ร้องที่ก้องไปทั่วสนามรบ เหล่าอัศวินได้ปฏิรูปแถวรอบผู้บัญชาการของพวกเขา ที่หัวใจของการประลอง อัศวิน[questing_knight_8.GetFirstName]หัวเราะ คึกคักในความบริสุทธิ์ของการต่อสู้ อย่างน้อยที่สุด สิ่งหนึ่งที่ไม่เปลี่ยนแปลงในขณะที่[questing_knight_8.GetHeShe]ไปแล้ว\n\nทันใดนั้น เหล่าอัศวินก็บุกเข้ามา มีแต่ทริคสเตอร์ที่ยืนอยู่ต่อหน้าพวกเขา เจ้าชรูดวอร์คเกอร์จอมโกง ปล่อยพลังงานไซโอนิคที่เล็งไปที่ผู้บัญชาการ ในวินาทีสุดท้าย[questing_knight_8.GetName]นกพิราบเพื่อสกัดกั้นการโจมตี อัศวิน[questing_knight_15.GetName]มีชื่อเสียงสําหรับ[questing_knight_15.GetHisHer]พบกับซิเรล ส่งผลสุดท้ายกับทริคสเตอร์\n\n\"อัศวินฟูล! ขอให้ชนชาติของพระองค์ตกไปสู่ความหายนะ และให้ความรู้ทั้งสิ้นของพระองค์เป็นที่ลืมเสีย\"\n\nคําสุดท้ายของทริคสเตอร์ พ่นด้วยพลังงานไซมัน\n\nบนพื้น[questing_knight_8.GetFirstName]และกําลังจะหมดอายุด้วย โค รนิ กา จะ รายงาน ภาย หลัง[questing_knight_8.GetHisHer]คําพูดสุดท้าย : \"ไม่เขาฆ่าฉันมากกว่าโกหกของฉันสําหรับความตายของฉันจะไม่อันตรายมากไม่ครึ่งหนึ่งเป็นของเขา.\""
 toxoids.7300.a:0 "ขอให้อัศวินเซเบิ้ลไปสู่สุขคติ"
 toxoids.7300.b:0 "[questing_knight_8.GetName]ไม่!"
 trickster_curse:0 "คํา สาป แช่ง ของ ผู้ หลอก ลวง"
 trickster_curse_desc:0 "แม้ว่าคนเจ้าเล่ห์ที่ต่อต้านการแสวงหาของเราอย่างดุเดือด จะโกหกตาย พวกเขาทิ้งของที่ระลึกไว้ให้เรา"
 toxoids.7305.name:0 "การ แสวง หา พระเจ้า แห่ง โท นิก: การ เปิด ประตู"
 toxoids.7305.desc:0 "หลังจากการทําสงคราม อัศวินค้นหาทุกตารางนิ้วของดวงจันทร์ ใน ที่ สุด ลึก เข้า ไป ทาง ใต้ สุด พวก เขา ก็ พบ หัตถกรรม ที่ ไม่ เป็น พิษ เป็น ภัย ซึ่ง ผู้ หลอก ลวง ทิ้ง ไว้. พลัง งาน ที่ ค่อย ๆ สลาย ตัว เป็น รอย แตก ปรากฏ ใน เครื่องจักร; พร้อม กับ ความ ตาย ของ ผู้ ที่ สร้าง มัน ก็ ค่อย ๆ หลุด ออก มา; กระแส พลังงาน ไซ โอ นิก ไหล ออก มา. ภาย ใน ชั่ว ขณะ หนึ่ง เครื่อง นั้น ก็ ถูก ลด ให้ เหลือ เพียง เศษ ภาชนะ ดิน เผา.\n\nจากวงโคจร, เรือรายงานว่ามีปรากฏการณ์ของสับสเปซแปลกๆ ที่ขอบของระบบ: แรงโน้มถ่วงเองได้เลื่อนไป พลังงานที่เป็นผลให้ EMP ที่มีประสิทธิภาพ ทอดระบบส่วนใหญ่บนเรือของสั่งซื้อ\n\nเพื่อจะเข้าใจอย่างถ่องแท้ว่าวันนั้นเกิดอะไรขึ้น เราจะต้องส่งกองยานของเราเองไป"
 toxoids.7305.a:0 "ส่งกองเรือที่ใกล้ที่สุดไป!"
 toxoids.7305.a.tooltip:0 "เราต้องเปิดเผยความลับ§Y[toxic_god_system.GetName]§!ระบบ"
 toxoids.7310.name:0 "การ แสวง หา พระเจ้า แห่ง โท นิก: การ ให้ คํา พยาน"
 toxoids.7310.desc:0 "[from.GetName]เป็นบ้านที่จะหมุนหมอกหมอกหมอก และภายในมัน ปกปิดสารพิษที่เราตามหา แม่นกโลหะ หนวด หนวด และถุงแก๊ส เบ เฮ โมท ที่ อยู่ ใน อวกาศ นี้ จะ เปล่ง ประกาย ด้วย แสง สี เขียว ที่ ไม่ ค่อย ดี. เราไม่ถูกต้อนรับ"
 toxoids.7310.a:0 "มันน่าเกลียดเกินไปสําหรับคําพูด!"
 toxoids.7310.b:0 "พระเจ้ากําลังทดสอบเรา! เรียกกองเรือ!"
 toxoids.7311.name:0 "ความเข้มของสารพิษ"
 toxoids.7311.desc:0 "[from.GetName]เป็น บ้าน ที่ มี หมอก หมอก ลอย อยู่ และ ภาย ใน หมอก เหล่า นั้น ก็ ซ่อน สาร พิษ ไว้. แม่นกโลหะ คาราปาซ หนวดและถุงแก๊ส เบ เฮ โมท ที่ บิน ไป มา นี้ เป็น ที่ ชื่น ชอบ และ มี แสง สี เขียว อม เขียว ส่อง มา. เราไม่ถูกต้อนรับ"
 toxoids.7311.a:0 "อะไร..."
 toxoids.7312.name:0 "ความ ล้ม เหลว"
 toxoids.7312.desc:0 "อะไรก็ตามที่อยู่ใน[from.GetName]ตอนนี้มันหายไปแล้ว หมอกหมอกหมอกที่พัดแผ่วเป็นสักขีพยาน ถึงผู้ที่ได้ทําให้มันเป็นบ้านของมัน แต่เศษของการต่อสู้ แสดงให้เห็นว่ามันถูกทําลายโดย อารยธรรมอื่นที่ท่องอวกาศ แม้ จะ เป็น ที่ ประจักษ์ ชัด ว่า สิ่ง ใด ก็ ตาม ที่ เคย อยู่ ที่ นี่ ไม่ ใช่ พระเจ้า แต่ เส้น ทาง ทั้ง หมด ก็ นํา มา ที่ นี่. ปราศจากเบาะแสใดๆอีก คําสั่งของอัศวินกําลังอยู่ในสภาวะสิ้นหวัง"
 toxoids.7312.A:0 "เราไม่เชื่อเรื่องนี้ เราจะไม่"
 toxoids.7312.tooltip:0 "บาง ที สัก วัน หนึ่ง จะ พบ พระเจ้า องค์ เที่ยง แท้ ที่ เป็น พิษ แต่ เรา ไม่ รู้ ว่า จะ มอง หา ที่ ไหน."
 toxoids.7315.name:0 "การ แสวง หา พระเจ้า แห่ง โท นิก: การ ทดลอง"
 toxoids.7315.desc:0 "พระเจ้าโทซิคพ่ายแพ้ และเมตตาเรา\n\nการ วิเคราะห์ เผย ให้ เห็น ว่า ขณะ ที่ สาร ประกอบ ทาง เคมี ของ มัน อยู่ ใกล้ สิ่ง ที่ จะ พบ ได้ บน โลก ของ เรา นั้น ไม่ เหมือน กัน เลย. นี่ เป็น ลูก หลาน ของ พระเจ้า เที่ยง แท้ ไหม? มีคนอื่นอีกไหม? หรือ นี่ เป็น เพียง สัตว์ ที่ เป็น โมฆะ? ไม่ ว่า จะ เป็น ความ จริง อย่าง ไร นัก วิทยาศาสตร์ ของ เรา คาด คะเน ว่า จะ มี การ รักษา โรค ให้ หาย ได้. เราอาจจะได้สิ่งที่เบคและเรียก"
 toxoids.7315.a:0 "O พิษพระเจ้าตีศัตรูของเรา!"
 toxoids.7315.a.tt:0 "End the quest. Take control of the §YToxic God§!, a §YColossus§! that can toxify worlds.\nEnables terraforming of §YToxic World Terraforming Candidates§! into habitable worlds.\nWe have §Y[This.num_toxic_terraform_candidates]§! of these within our border.\n §RWith the end of the quest, many [knight.GetIcon] Knights will eventually leave the Order.§!"
 toxoids.7315.b:0 "นี่ไม่ใช่พระเจ้า ฆ่ามันซะ!"
 toxoids.7315.b.tt:0 "ทริคสเตอร์พูดถูก นี่ไม่ใช่พระเจ้า ภารกิจดําเนินต่อไป"
 toxoids.7320.name:0 "โชคชะตาของภาคี"
 toxoids.7320.desc:0 "มี การ ค้น พบ พระเจ้า โท จิก แต่ เมื่อ การ ค้น พบ นี้ มา ถึง ระเบียบ ก็ สูญ เสีย จุด มุ่ง หมาย. ภารกิจและภารกิจเล็ก ๆ น้อย ๆ ไม่เหมาะกับอัศวินที่ใช้ในการกล้าหาญและเกียรติยศ! ไร้ซึ่งชื่อและสูญเสีย เหล่าอัศวินมากมาย เริ่มออกจากคณะ\n\nวันนี้ ท่านผู้การมอบทางเลือก ให้อัศวินที่เหลือทั้งหมด ให้อยู่หรือจากไป หลาย คน จาก ไป เพื่อ แสวง หา ชีวิต ใหม่. บาง คน ได้ จัด ระเบียบ เป็น กลุ่ม เล็ก ๆ ซึ่ง ประกอบ ด้วย เหล่าอัศวิน ที่ หลง ผิด โดย มอง หา การ แสวง หา ใหม่ เพื่อ ติด ตาม ข้าม กาแล็กซี."
 toxoids.7320.a:0 "จุดจบของยุค"
 toxoids.7320.a.tt:0 "§Rเดอะ£building£การสร้างที่เป็นระเบียบ จะสนับสนุนน้อยลง[knight.GetIcon]อัศวินงาน§!."

 toxoids.7510.name:0 "สารพิษ"
 toxoids.7510.desc.origin:0 "ความเป็นกลางใน[fromfrom.GetName]ระบบไม่ได้เป็นพระเจ้า ถ้าใช่ เราจะฆ่ามันได้ยังไง\n\nขณะ ที่ ร่าง กาย ของ มัน สั่น สะเทือน เป็น ครั้ง สุด ท้าย ถุง พิษ ของ มัน ก็ พ่น ออก มา อย่าง รวด เร็ว กระจาย วัสดุ ที่ เป็น พิษ ไป ทั่ว ระบบ. ผ่านการหลบหลีกอย่างรวดเร็ว กองทัพของเราจัดการเพื่อไปถึงระยะทางที่ปลอดภัย แต่ตัวมันเองไม่ได้โชคดีดังนั้น ล้มลงที่สุดท้ายโดยพิษของตัวเองเนื้อของมันย่อยสลายอย่างรวดเร็ว ทิ้งอะไรไว้ แต่นกที่อยู่เบื้องหลัง คําสั่งของอัศวินได้นํามันเข้าสู่การควบคุมเป็นถ้วยรางวัลที่จะนําออกมาเฉพาะใน โอกาสพิเศษเป็นการสาธิตสูงสุดของความยิ่งใหญ่ของระเบียบความสําเร็จ"
 toxoids.7510.desc.not_origin:0 "เราได้สังหารอ็อกซิตีใน[fromfrom.GetName]ระบบ ขณะ ที่ ร่าง กาย ของ มัน สั่น สะเทือน เป็น ครั้ง สุด ท้าย ถุง พิษ ของ มัน ก็ พ่น ออก มา อย่าง รวด เร็ว กระจาย วัสดุ ที่ เป็น พิษ ไป ทั่ว ระบบ. ผ่านการหลบหลีกอย่างรวดเร็ว กองทัพของเราจัดการเพื่อไปถึงระยะทางที่ปลอดภัย แต่ตัวมันเองไม่ได้โชคดีดังนั้น ล้มลงที่สุดท้ายโดยพิษของตัวเองเนื้อของมันย่อยสลายอย่างรวดเร็ว ทิ้งอะไรไว้ แต่นกที่อยู่เบื้องหลัง"
 toxoids.7510.A:0 "ไม่เพื่อให้พระเจ้าเป็นตอนนี้!"
 toxoids.7510.A.reanimators:0 "อนิจจา! ศพไม่เพียงพอที่จะคืนชีพ"

 ##Single Events

 toxoids.8000.name:0 "การ แสวง หา บําเหน็จ"
 toxoids.8000.desc:0 "กลุ่มอัศวิน เพิ่งกลับมาจากภารกิจอันยาวนาน ยานอวกาศของพวกเขาถูกทุบ และชุดเกราะของพวกเขาเห็นวันที่ดีกว่า เป็น การ เดิน ทาง ที่ น่า ตื่น เต้น ซึ่ง ทํา ให้ เกิด ความ หยั่ง เห็น เข้าใจ อัน ล้ํา ค่า เกี่ยว กับ พระเจ้า โท จิก. แม้ จะ มี ความ ยาก ลําบาก แต่ วิญญาณ ก็ มี มาก มาย เพราะ พวก เขา ไม่ ได้ กลับ มา มือ เปล่า และ เรื่อง ราว ของ พวก เขา จะ เพิ่ม เติม เข้า ไป ใน พงศาวดาร."
 toxoids.8005.name:0 "ร้องขอกองทุนเพิ่มเติม"
 toxoids.8005.desc:0 "หลายศตวรรษมาแล้ว ที่รัฐได้อุทิศทรัพยากรจํานวนมาก ให้กับภารกิจและระเบียบ และการเปลี่ยนแปลงนโยบายของเรา อัศวินและเด็กรับใช้ต่างก็ไม่พอใจ และประชาชนส่วนมากก็เห็นด้วย รู้สึกว่าเราลืมหน้าที่ของเรา ท่านผู้บัญชาการได้ยื่นคําร้องอย่างเป็นทางการ ให้กลับไปยังโมเดลเงินทุนปกติ อุปสงค์ที่หลายคนในจักรวรรดิสนับสนุน"
 toxoids.8005.a:0 "พวกเขาถูก, ภารกิจคือเป้าหมายหลักของเรา"
 toxoids.8005.b:0 "ไม่ ภารกิจจะต้องรอ"
 toxoids.8005.c:0 "เราสามารถบริจาคเพื่อเอาใจพวกเขาได้"
 knight_budget_demand:0 "การปรับแต่งเพิ่มเติม"
 toxoids.8010.name:0 "หลาย ร้อย ปี ที่ ผ่าน มา"
 toxoids.8010.desc:0 "เมื่อร้อยปีก่อน เราไปที่ดวงดาว มันเป็นการเริ่มต้นครั้งใหม่สําหรับเรา และสําหรับภารกิจ ที่ดูเหมือนจะไม่มีที่ติ เปิดให้เรา ศตวรรษ ได้ ผ่าน ไป และ ประชากร ของ เรา รู้สึก ว่า แตก แยก. ในขณะที่ความสําเร็จของเราไม่สามารถปฏิเสธได้ มีเสียงสงสัย วัตถุประสงค์ของอัศวินและการผจญภัย พวกเขาเป็นแค่วัตถุโบราณที่เก่าแล้ว"
 toxoids.8010.a:0 "ไม่ เราจะฉลองเพื่อเป็นเกียรติแก่อัศวินของเรา"
 toxoids.8010.b:0 "เราไม่มีเวลาสําหรับเรื่องไร้สาระ"
 toxoids.8010.c:0 "ใช่ มันเป็นศตวรรษแห่งความล้มเหลว จบเรื่องนี้ซะ"
 toxoids.8010.c.tooltip:0 "§Rนี้จะจบการค้นหา ทําลายระเบียบและลบอาคารและเขตที่เกี่ยวข้องทั้งหมด§!"

 toxoids.8015.name:0 "การล่มสลายของคําสั่ง"
 toxoids.8015.desc.a:0 "องครักษ์หายไปแล้ว ถ้วยรางวัลและของมีค่ามากมาย ถูกขโมยไป อย่าง ไร ก็ ตาม ใน ความ สับสน วุ่นวาย ของ การ อพยพ เหล่า นั้น เหล่าอัศวิน ผู้ กล้า หาญ หลาย คน ได้ รักษา ไว้ ซึ่ง การ ค้นคว้า อัน ล้ํา ค่า ของ เรา โดย การ ปิด ผนึก ห้อง เก็บ เอกสาร ไว้ ใน ห้อง ลับ. พวกเขาควรจะปลอดภัยสําหรับตอนนี้ แต่ปราศจากการเข้าถึงความรู้นี้โดยตรง สั่งซื้อไม่สามารถทํางานได้"
 toxoids.8015.desc.b:0 "องครักษ์หายไปแล้ว ถ้วยรางวัลและของมีค่ามากมาย ถูกขโมยไป อย่าง ไร ก็ ตาม ใน ความ สับสน วุ่นวาย ของ การ อพยพ เหล่า นั้น เหล่าอัศวิน ผู้ กล้า หาญ หลาย คน ได้ รักษา ไว้ ซึ่ง การ ค้นคว้า อัน ล้ํา ค่า ของ เรา โดย การ ปิด ผนึก ห้อง เก็บ เอกสาร ไว้ ใน ห้อง ลับ. พวกเขาควรจะปลอดภัยสําหรับตอนนี้ แต่ปราศจากการเข้าถึงความรู้นี้โดยตรง การค้นหาไม่สามารถดําเนินการต่อ"
 toxoids.8015.a:0 "เราต้องยึดถิ่นที่อยู่คืนให้ได้"
 toxoids.8017.name:0 "การ ทําลาย รักษา ไว้"
 toxoids.8017.desc.a:0 "กําแพงถูกรื้อถอน ลดลงเป็นกองซากลอยน้ํา ท่านผู้การตายแล้ว พร้อมกับอัศวินและเด็กรับใช้ส่วนใหญ่ ไฟล์ได้ถูกลบ การสูญเสียนี้เป็นการกระตุ้น[โปรดติดตามตอนต่อไหยิบของอัศวินที่รอดชีวิตได้รับการเรียกคืน อนาคตของระเบียบถูกทําลาย"
 toxoids.8017.desc.b:0 "กําแพงถูกรื้อถอน ลดลงเป็นกองซากลอยน้ํา ท่านผู้การตายแล้ว พร้อมกับอัศวินและเด็กรับใช้ส่วนใหญ่ ไฟล์ได้ถูกลบ การสูญเสียนี้เป็นการกระตุ้น ไม่มีทางที่เราจะทําภารกิจต่อหลังจากนี้[โปรดติดตามตอนต่อไหยิบของอัศวินที่รอดชีวิตได้รับการเรียกคืน อนาคตของระเบียบถูกทําลาย"
 toxoids.8017.desc.c: "คุ้มถูกปิดกั้นจากพวกเรา ลดลงเป็นสุสานลอยน้ํา ท่านผู้การ หลงทางไปตลอดกาล พร้อมกับอัศวินและเด็กรับใช้ส่วนใหญ่ แพกเกจถูกยุติ การสูญเสียนี้เป็นการกระตุ้น[โปรดติดตามตอนต่อไหยิบของอัศวินที่รอดชีวิตได้รับการเรียกคืน อนาคตของระเบียบถูกทําลาย"
 toxoids.8017.desc.d: "คุ้มถูกปิดกั้นจากพวกเรา ลดลงเป็นสุสานลอยน้ํา ท่านผู้การ หลงทางไปตลอดกาล พร้อมกับอัศวินและเด็กรับใช้ส่วนใหญ่ แพกเกจถูกยุติ การสูญเสียนี้เป็นการกระตุ้น ไม่มีทางที่เราจะทําภารกิจต่อหลังจากนี้[โปรดติดตามตอนต่อไหยิบของอัศวินที่รอดชีวิตได้รับการเรียกคืน อนาคตของระเบียบถูกทําลาย"
 toxoids.8017.a:0 "เป็นไปไม่ได้..."
 toxoids.8020.name:0 "ชะตา กรรม ของ พระเจ้า โท จิก"
 toxoids.8020.desc:0 "หลังจากที่ค้นพบความไม่สงบของสารพิษแล้ว อัศวินของเราสูญเสียเส้นทางของพระเจ้าโทนิคไป ความ เกี่ยว พัน ระหว่าง สอง สิ่ง นี้ ไม่ อาจ สอบ ถาม ได้ แต่ ถ้า เชื่อ กัน ว่า มี การ ค้น พบ สําเนา ต้น ฉบับ เหล่า นั้น ก็ จะ ซีด ไป เมื่อ เทียบ กับ ต้น ฉบับ ซึ่ง ยิ่ง น่า กลัว และ น่า กลัว มาก ขึ้น.\n\nอย่าง ไร ก็ ตาม ทุก วัน นี้ การ ค้น หา ของ เรา ที่ จะ ค้น หา พระเจ้า ทักษิณ สิ้น สุด ลง ใน ที่ สุด. เราตรวจพบปริมาณของสารที่น่ารังเกียจ ที่ถูกขับออกจากหลุมดําขนาดใหญ่ ที่แกนกาแล็กซี่ ถึงมันจะดูเป็นไปไม่ได้ แต่เราเชื่อว่าพระเจ้าสารพิษอยู่ในนั้น และอย่างมากเกินเอื้อมของเรา\n\nท่านผู้การได้สั่งให้อัศวินทุกคน กู้ทุกอย่าง ที่เกี่ยวข้องกับหลุมดํา"
 toxoids.8020.a:0 "เราจะไม่หยุดจนกว่าจะหาทางได้"
 toxoids.8020.b: "หรือมี?"
 toxoids.8020.cosmogenesis: "ตัวเลือกนี้มีอยู่เพราะคุณมี§Yจักรวาล§!แอสเซนชั่น เพอร์ค"
 advanced_logic_from_knights: "[knight.GetIcon] §Y[knight.GetNamePlural]§!จะเริ่มผลิต§G+1§! £advanced_logic£หลักการขั้นสูง\nเดอะ£job_knight_commander£ §Y$job_knight_commander$§!จะเริ่มผลิต§G+2§! £advanced_logic£หลักการขั้นสูง"
 toxoids.8025.name:0 "เรียก เก็บ ราชโองการ"
 toxoids.8025.desc:0 "เราได้ที่อยู่อาศัยแล้ว ป้อม ปราการ และ เด เม สเน ของ เรา ตั้ง อยู่ ใน ซาก ปรัก หัก พัง ซึ่ง ถูก รื้อ ทําลาย โดย คอนกรีต แต่ ก็ สามารถ สร้าง ขึ้น ใหม่ ได้. ด้วยการเข้าถึงคลังจดหมายเหตุที่กู้กลับมา ภารกิจของอัศวินของเราสามารถกลับมาเหมือนเดิม"
 toxoids.8025.a:0 "วันอันรุ่งโรจน์!"

 ##Policy

 policy_knightly_duties:0 "อัศวินผู้น่ารัก"
