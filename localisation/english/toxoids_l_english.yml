 r_toxic_god:0 "แม่ นก แห่ง เขต ร้อน"
 r_toxic_god_desc:0 "บาง คน เชื่อ ว่า มูล ที่ ใหญ่ โต นี้ ได้ รับ การ กู้ มา จาก อํานาจ ของ พระเจ้า. พระเจ้าไม่อีกแล้ว สัตว์ประหลาดนั่นถูกฆ่า ถ้วยรางวัลนี้ เป็นอนุสาวรีย์แห่งเดียว"
 r_toxic_god_knights_passive_effect: "§Yปลดล็อกที่อยู่อาศัยโคจรดาว:§! $major_orbital_knights$"
 r_toxic_god_knights_effect:0 "ปลดล็อค§Yการตัดสินใจ§!ถึง§Yปรับ ปรุง นิสัย§!แล้วทรงกําหนดสภาวะแล้วทรงกําหนด§Y$building_order_castle$§!นั่นไง"

