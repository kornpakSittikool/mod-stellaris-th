 despair_of_the_knightly_order:0 "ความสิ้นหวังของคณะอัศวิน"
 despair_of_the_knightly_order_desc:0 "การ ค้น หา ที่ ยาว นาน ใน เรื่อง พระเจ้า โท จิก สิ้น สุด ลง ด้วย ความ ล้ม เหลว. เนื่อง จาก ไม่ มี อะไร จะ นํา ไป สู่ การ สํารวจ อีก หลาย คน จึง สงสัย ว่า การ แสวง หา นี้ จะ มี จุด มุ่ง หมาย อะไร."

 #Overtuned

 origin_overtuned:0 "การปรับแต่งที่มากเกินไป"
 origin_overtuned_desc:1 "อารยธรรมนี้ใช้วิธีการใด ๆ และทุกวิธีการ ของการเสริมอินทรีย์ ไม่ว่าความเสี่ยง ไม่ว่าค่าใช้จ่าย ที่ จริง เป็น การ ดี กว่า ที่ จะ เผา ตัว เอง ให้ เกรียม ไป."
 origin_overtuned_effects:1 "เริ่ม ด้วย ลักษณะ นิสัย ทาง ชีววิทยา ที่ ล้ํา หน้า ซึ่ง มี อยู่ พร้อม จะ ใช้ ได้ และ ถูก กว่า ลักษณะ นิสัย ปกติ แต่ มี ความ เสี่ยง มาก กว่า."
 origin_tooltip_overtuned_effects:4 "- $SPECIES_TRAITS$เข้าใช้['concept_overtuned_traits', $origin_overtuned$]สินค้า$NEW_LINE$- สินค้าที่มากเกินไป:$TABBED_NEW_LINE$- สามารถเพิ่มโดย['concept_damn_the_consequences']เอกสาร$TABBED_NEW_LINE$- เอาออกได้§Iการขยายพันธุกรรม§!\n- $ADDITIONAL_TECHNOLOGIES_STRING$ ['concept_gene_tailoring', £society£ $tech_gene_tailoring$]"
 START_SCREEN_OVERTUNED:1 "ธรรมชาติเป็นนักประดิษฐ์ วิวัฒนาการเป็นกระบวนการทางกาแล็กซี่ เพื่อความรุ่งเรือง เราต้องการความแข็งแกร่ง ความเร็ว และพลังงานสมอง ตอนนี้ ไม่ใช่ในล้านปี การ คัด เลือก ตาม ธรรมชาติ นั้น ไม่ เหมาะ กับ ของ ประทาน และ ดัง นั้น เรา ต้อง ปรับ ปรุง ตัว เอง ให้ ดี ขึ้น.\n\nด้วย เหตุ นี้ อารยธรรม ของ เรา จึง อาศัย หลัก การ ที่ ว่า ด้วย การ เสริม ร่าง กาย ให้ แข็ง แรง ขึ้น อย่าง ไม่ รู้ จัก เหน็ด เหนื่อย. การปรับปรุงเหล่านี้ช่วยให้เรา รวมกันโลกของเราภายใต้ธงเดียว และตอนนี้พวกเขาจะนําเรา\n\nด้วยสมองกลพันธุกรรม แข็งแกร่ง และความกล้าหาญ เราจะรุ่งเรืองในหมู่ดวงดาว เป็นชนิดที่ออกแบบมาอย่างดี"
 disables_overtuned_features:0 "§Rการเลือกระบบเร่งความเร็วนี้ จะเป็นการปิดกลไกที่ครอบคลุม§!"

