 building_order_castle_desc:0 "คําสั่งของพระเจ้าสารพิษ ได้จัดตั้งปราสาทบนที่อยู่อาศัยนี้ อัศวินและเด็กรับใช้ ได้ตั้งฐานที่นี่"

 decision_consecrate_habitat_knights:0 "ปรับเทียบสี"
 decision_consecrate_habitat_knights_desc:0 "เราจะสถาปนาที่อยู่อาศัย โดยใช้สิ่งประดิษฐ์ที่เราค้นพบ ระหว่างการค้นหาของเรา ในเวลานี้ มันจะถือว่าเป็นฐานของอัศวิน และคณะจะจัดตั้งปราสาทใหม่ และเดโมสเนที่นั่น"
 decision_consecrate_habitat_knights_effect:1 "โดยเฉพาะอย่างยิ่งกับ§Y$zone_habitat_knights$§!ถึง£building£ §Y$building_order_castle$§!.\nเดอะ§Y$building_order_castle$§!ให้[knight.GetIcon]อัศวินและ[squire.GetIcon]เก็บกวาดงาน\n§Rมันทําลายไม่ได้§!"
