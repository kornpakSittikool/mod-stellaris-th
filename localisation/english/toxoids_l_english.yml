 START_SCREEN_OVERTUNED_NOMADS: "ธรรมชาติเป็นนักประดิษฐ์ วิวัฒนาการเป็นกระบวนการทางกาแล็กซี่ เพื่อความรุ่งเรือง เราต้องการความแข็งแกร่ง ความเร็ว และพลังงานสมอง ตอนนี้ ไม่ใช่ในล้านปี การ คัด เลือก ตาม ธรรมชาติ นั้น ไม่ เหมาะ กับ ของ ประทาน และ ดัง นั้น เรา ต้อง ปรับ ปรุง ตัว เอง ให้ ดี ขึ้น.\n\nโมฆะ ไม่ คํานึง ถึง ความ อ่อนแอ. การปรับปรุงเหล่านี้ได้แข็งเรากับความต้องการของมัน และรวมคนของเราภายใต้ธงเดียว ตอนนี้พวกมันจะพาเราไปอีก\n\nด้วยสมองกลพันธุกรรม แข็งแกร่ง และความกล้าหาญ เราจะรุ่งเรืองในหมู่ดวงดาว เป็นชนิดที่ออกแบบมาอย่างดี"
