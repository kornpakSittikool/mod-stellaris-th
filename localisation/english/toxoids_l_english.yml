 d_toxic_god_pools_most_venemous_upgraded_desc:0 "ทางซ้ายในปลุกของดีตี้เป็นหลาย สระว่ายน้ําที่มีพิษมากที่สุด จากที่เศษของสารพิษอาจจะกู้คืน เนื่อง จาก ความ พยายาม ของ พวก อัศวิน แห่ง พระเจ้า โท จิก บัด นี้ เรา สามารถ เก็บ เกี่ยว และ ใช้ พิษ ที่ มี ฤทธิ์ นี้ ได้ หลาย หลาก."
 d_toxic_god_pestilential_wasteland:0 "ดินแดนร้าง"
 d_toxic_god_pestilential_wasteland_desc:0 "ไม่ ใช่ ทุก คน จะ ได้ รับ พระ พร จาก ความ ดี. พื้น ที่ ส่วน ใหญ่ ของ แผ่น ดิน ถูก ทําลาย เนื่อง จาก การ ผ่าน ไป ของ ดิน นั้น ไม่ มี ทาง ฟื้น ตัว."
 d_toxic_god_pestilential_wasteland_upgraded:1 "การ อ้าง ว่า เป็น โรค นี้"
 d_toxic_god_pestilential_wasteland_upgraded_desc:0 "$d_toxic_god_pestilential_wasteland_desc$อย่าง ไร ก็ ตาม ชุด เกราะ ที่ นัก รบ กู้ คืน มา ได้ ให้ เรา มี วิธี การ ทํา งาน อย่าง ปลอด ภัย ใน ส่วน เหล่า นี้."
 d_toxic_god_deitys_swarms:0 "ความ สง่า งาม ของ ความ ดี"
 d_toxic_god_deitys_swarms_desc:0 "ในการตื่นของดีตี แมลงก่อนหน้านี้ไม่รู้จักการแพร่กระจายของโลกนี้อย่างรวดเร็ว การ ที่ พวก เขา อยู่ อย่าง แออัด ยัง คง ทดสอบ เรา อยู่ ขณะ ที่ เรา พยายาม ปลูก ฝัง ดิน แดน เหล่า นั้น."
 d_toxic_god_deitys_swarms_upgraded:1 "อนุภาคย่อย"
 d_toxic_god_deitys_swarms_upgraded_desc:0 "ในการตื่นของดีตี แมลงก่อนหน้านี้ไม่รู้จักการแพร่กระจายของโลกนี้อย่างรวดเร็ว เราได้พัฒนาศิลปะการเพาะปลูกของพวกเขา สําหรับรสชาติและพิษที่มีประสิทธิภาพของพวกเขา"
 d_toxic_god_blight_upon_the_land:0 "ไฟ ไหม้ แผ่น ดิน"
 d_toxic_god_blight_upon_the_land_desc:1 "ว่ากันว่า ณ ที่แห่งนี้ ความดีได้ถล่มแผ่นดินครั้งแรกด้วยความโกรธ ส่วนที่เหลือเพียงเล็กน้อยของสิ่งที่ครั้งหนึ่งเคยอยู่ที่นี่"
 d_toxic_god_blight_upon_the_land_upgraded:1 "เตือนความจําแบบย่อ"
 d_toxic_god_blight_upon_the_land_upgraded_desc:1 "ว่ากันว่า ณ ที่แห่งนี้ ความดีได้ถล่มแผ่นดินครั้งแรกด้วยความโกรธ แต่ อนุสาวรีย์ ได้ ถูก สร้าง ขึ้น แล้ว ลักษณะ พิเศษ ของ อนุสาวรีย์ นี้ ได้ สังเคราะห์ จาก ความ ทรง จํา ของ เรา ใน ตอน นั้น."
 d_toxic_god_envenomed_seas:0 "ทะเล"
 d_toxic_god_envenomed_seas_desc:1 "แม้แต่ทะเลก็ยังไม่ถูกละเว้น การสัมผัสของดีตี้"
 d_toxic_god_envenomed_seas_upgraded:1 "ค่า จ้าง แบบ พอ ประมาณ"
 d_toxic_god_envenomed_seas_upgraded_desc:1 "อัศวินของเราได้นําเทคโนโลยีที่จําเป็นกลับมา เพื่อเก็บเกี่ยวก๊าซแปลกใหม่ จากทะเลสัมผัสพระเจ้าโทนิค"

