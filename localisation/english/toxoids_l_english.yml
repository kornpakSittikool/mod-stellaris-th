 building_knightly_theme_park_desc:0 "ดูเหมือนป้อมปราการที่แท้จริง ตึกนี้เป็นสวนสาธารณะจริงๆ เพื่อเป็นเกียรติแก่อัศวินและภารกิจ ผู้ มา เยือน สามารถ ซื้อ ลายเซ็น, รูป แบบ การ กระทํา, และ ผู้ เผย แพร่ กิตติคุณ ของ เหล่า นัก บุญ ที่ พวก เขา ชื่น ชอบ. แน่นอน จุดประสงค์ที่แท้จริงของสิ่งอํานวยความสะดวกคือการรวบรวมข้อมูล สําหรับภารกิจของเราและทําหน้าที่เป็น จุดสํารองสําหรับการค้นหาอัศวิน"
