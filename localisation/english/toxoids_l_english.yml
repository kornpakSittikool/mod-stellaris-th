 syamelles_blessing:0 "อภิสิทธิ์ของเซเรล"
 syamelles_blessing_desc:0 "ความลึกลับได้รับพระพรเราหลังจากที่สั้น ๆ แต่การเผชิญหน้าที่น่าเบื่อ หลักสูตรใหม่ที่แข็งแรงผ่านเรา และแต่ละจุดดูเหมือนจะนําเสนอความเป็นไปได้ใหม่"
