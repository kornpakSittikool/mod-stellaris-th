 syamelles_curse_desc:0 "การถูกสาบแช่งให้เราไม่มีวันได้รู้จักรักแท้และความปรารถนา อย่าง ไร ก็ ตาม ขณะ เดียว กัน เธอ อนุญาต ให้ เรา สร้าง ตัว เอง โดย ใช้ เครื่องจักร มาก ขึ้น."
 syamelles_curse_habitat:0 "พ็อกซ์ของคนรัก"
 syamelles_curse_habitat_desc:0 "ผลกระทบจากคําสาปของซีแอลล์ เป็นเรื่องยากที่สุดที่กองบัญชาการ ความ คิด ใน เรื่อง การ สัมผัส ทาง กาย จึง กลาย เป็น เรื่อง ผิด ธรรมชาติ จน พวก สค รอย ได้ ถูก บีบ บังคับ ให้ หา วิธี ใหม่ ๆ เพื่อ ทํา ให้ ประชากร ชุ่ม ชื่น."
