 situation_toxic_knights:0 "การ แสวง หา พระเจ้า ผู้ ทรง ฤทธิ์ ใหญ่ ยิ่ง"
 situation_toxic_knights_type:0 "การ แสวง หา ด้วย ใจ แรง กล้า"
 situation_toxic_knights_monthly_change_tooltip:0 "ความก้าวหน้าของสถานการณ์นี้ขึ้นอยู่กับ§Yถึง§!เราเลือก§Yข้อกําหนดของอัศวิน§!และจํานวนของ[knight.GetIcon] §Y[knight.GetNamePlural]§!เราจ้าง"
 situation_toxic_knights_desc:2 "ก่อตั้งเมื่อหลายศตวรรษก่อน โดยผู้ปกครองคนแรกของโลก ภาคีมีวัตถุประสงค์หนึ่ง : เพื่อค้นหาอย่างไม่สิ้นสุดสําหรับพระเจ้าโทนิค จํานวนมากได้มีการเปลี่ยนแปลงตั้งแต่การสร้าง แต่สั่งซื้อที่อาศัยอยู่เป็น แสวงหาของมัน"
 situation_toxic_knights_regular:0 "เงินทุนปกติ"
