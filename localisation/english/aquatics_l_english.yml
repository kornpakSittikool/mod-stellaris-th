 requires_ice_source:0 "§Rต้องการดาวเคราะห์น้อยน้ำแข็งหรือโลกแช่แข็งในระบบดาวนี้§!"
 ice_mining_details:0 "ดาวเคราะห์น้อยน้ำแข็งสามารถขุดเจาะได้หนึ่งครั้ง โลกแช่แข็งขุดเจาะได้สูงสุด 3 ครั้ง"
