 ICE_MINING_HABITAT_SUCCESS_BUT_EXHAUSTED_DESC:0 "$ICE_MINING_SUCCESS_HABITAT_DESC$\n\nแหล่งน้ำแข็งจากที่แห่งนี้ได้หมดสิ้นลงแล้ว ดังนั้นสถานีขุดเจาะน้ำแข็ง §Y$sm_ice_mining_station$§! จึงได้ปลดประจำการลง"
