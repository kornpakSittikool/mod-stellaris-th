 decision_flood_habitat:0 "ทำให้น้ำท่วมที่อยู่อาศัย"
 decision_flood_habitat_desc:0 "สถานีที่อยู่อาศัย(ฮาบิตาต)สามารถเป็นสถานที่ในอุดมคติของเราได้—หากมีน้ำเพียงพอ เครือข่ายการขุดเจาะน้ำแข็งช่วยให้เราเก็บเกี่ยวน้ำแข็งจากดาวดวงอื่นและทำให้น้ำท่วมดาว [This.GetName] เปลี่ยนสภาพมันให้กลายเป็นพิพิธภัณฑ์สัตว์น้ำในวงโคจร"
 decision_flood_habitat_tooltip:0 "ความสามารถในการอยู่อาศัย: §R-20%§!\nถือเป็นโลก §Yมหาสมุทร§! สำหรับสิ่งมีชีวิตคุณลักษณะ §Yน้ํา§!\nน้ำแข็งจะถูกเก็บเกี่ยวจากระบบดาวที่มีสถานี §Y$sm_ice_mining_station$§! ติดตั้งอยู่บนฐานทัพดาว"
 flooded_habitat:0 "ที่อยู่อาศัยที่ถูกน้ำท่วม"
