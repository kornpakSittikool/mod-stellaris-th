 flooded_habitat_tooltip:0 "ความสามารถในการอยู่อาศัย: §R-20%§!\nถือเป็นโลก §Yมหาสมุทร§! สำหรับสิ่งมีชีวิตคุณลักษณะ §Yน้ํา§!"

 # Ocean Paradise Origin
 origin_ocean_paradise:0 "สวรรค์แห่งมหาสมุทร"
 origin_ocean_paradise_desc:0 "ตั้งแต่การก่อกำเนิด อารยธรรมนี้ได้รับความสงบสุขท่ามกลางสภาพแวดล้อมที่อุดมสมบูรณ์โดยไม่มีศัตรูตามธรรมชาติ ทำให้สามารถเติบโตและเจริญรุ่งเรืองได้อย่างไม่มีสิ่งใดขัดขวาง"
 origin_ocean_paradise_effects:2 "- $HOMEWORLD$$TABBED_NEW_LINE$- ['concept_pc_ocean'] (ขนาด: £planetsize£ 30)$TABBED_NEW_LINE$- $PLANETARY_MODIFIERS$ ['concept_ocean_paradise_mod']$TABBED_NEW_LINE$- $PLANETARY_FEATURES$ ['concept_crystal_reef']\n- ['concept_guaranteed_colonies']: ถูกแทนที่ด้วย ['concept_pc_frozen', ดาวน้ำแข็ง]"
 origin_ocean_machines: "เครื่องจักรใต้น้ำ"
 origin_ocean_machines_desc: "ตั้งแต่การสร้างขึ้นมา อารยธรรมเครื่องจักรนี้ได้ดำดิ่งลงลึกสู่ดินแดนใต้น้ำของมหาสมุทรอันอุดมสมบูรณ์ซึ่งปราศจากการรบกวนจากศัตรูตามธรรมชาติ"
 origin_ocean_machines_effects: "- $HOMEWORLD$$TABBED_NEW_LINE$- ['concept_pc_ocean'] (ขนาด: £planetsize£ 30)$TABBED_NEW_LINE$- $PLANETARY_MODIFIERS$ ['concept_ocean_paradise_mod']$TABBED_NEW_LINE$- $PLANETARY_FEATURES$ ['concept_crystal_reef']\n- ['concept_guaranteed_colonies']: ถูกแทนที่ด้วย ['concept_pc_frozen', ดาวน้ำแข็ง]"

 START_SCREEN_OCEAN_PARADISE:0 "\"ความสุขจงมีแก่ผู้ที่มีปัญญาในการยอมรับ\" นี่คือสุภาษิตทั่วไปในสังคมของชาว [Root.GetAdj] ความอุดมสมบูรณ์ของชีวิตอยู่รอบตัวเรา เมื่อเราเรียนรู้ที่จะชื่นชมมัน ท่ามกลางผืนน้ำเช่นนี้ พวกเราเจริญรุ่งเรืองมาเป็นเวลานาน\n\nแต่เหล่าผู้อาวุโสของเราไม่รับรู้ถึงความหยุดนิ่ง พวกเขาสับสนระหว่างสัญชาตญาณการเอาตัวรอดกับความไม่อดทน หากเราไม่แสวงหาการเปลี่ยนแปลง การเปลี่ยนแปลงจะเข้ามาหาเราเอง และเราจะไม่พร้อมรับมือ พวกเราไม่อาจอยู่โดดเดี่ยวในจักรวาลอันกว้างใหญ่แห่งนี้ได้ เพื่อปกป้องรักษาบ้านของเรา พวกเราบางคนต้องตัดสินใจที่จะจากมันไป\n\nการดำดิ่งลงสู่ก้นบึ้งนรกอเวจี(Abys)ของเรานั้นพิสูจน์แล้วว่าคุ้มค่า ซากปรักหักพังจากต่างดาวที่ถูกเก็บกู้มาอย่างยากลำบาก ช่วยเร่งให้เกิดการค้นพบทางเทคโนโลยีครั้งใหญ่ ในที่สุด พวกเราพร้อมแล้วที่จะเดินทางออกไปนอกมหาสมุทรของเรา เพื่อสำรวจ เพื่อพบเห็น เพื่อเรียนรู้ และเพื่อปกป้อง"
 START_SCREEN_OCEAN_PARADISE_HIVE:0 "\"ความสุขจงมีแก่พวกเราผู้ที่มีปัญญาในการยอมรับ\" ความอุดมสมบูรณ์ของชีวิตอยู่รอบตัวเรา เมื่อเราเรียนรู้ที่จะชื่นชมมัน ท่ามกลางผืนน้ำเช่นนี้ พวกเราเจริญรุ่งเรืองมาเป็นเวลานาน\n\nอนิจจา ความหยุดนิ่งกำลังคืบคลานเข้ามาใกล้ หากเราไม่แสวงหาการเปลี่ยนแปลง การเปลี่ยนแปลงจะเข้ามาหาเราเอง และเราจะไม่พร้อมรับมือ พวกเราไม่อาจอยู่โดดเดี่ยวในจักรวาลอันกว้างใหญ่แห่งนี้ได้ เพื่อปกป้องรักษาบ้านของเรา ส่วนหนึ่งของพวกเราต้องตัดสินใจที่จะจากมันไป\n\nการดำดิ่งลงสู่ก้นบึ้งนรกอเวจี(Abys)ของเรานั้นพิสูจน์แล้วว่าคุ้มค่า ซากปรักหักพังจากต่างดาวที่ถูกเก็บกู้มาอย่างยากลำบาก ช่วยเร่งให้เกิดการค้นพบทางเทคโนโลยีครั้งใหญ่ ในที่สุด พวกเราพร้อมแล้วที่จะเดินทางออกไปนอกมหาสมุทรของเรา เพื่อสำรวจ เพื่อพบเห็น เพื่อเรียนรู้ และเพื่อปกป้อง"
 START_SCREEN_OCEAN_PARADISE_ROBOT: "เป็นเวลานานแล้วที่พวกเรา [Root.GetAdj] สามารถเพลิดเพลินกับความเงียบสงบของมหาสมุทร และโครงสร้างร่างกายของเราดูเหมือนจะได้รับการปรับให้เหมาะสมสำหรับการดำรงชีวิตใต้น้ำ\n\nแต่การดำรงอยู่คือกระแสน้ำที่เชี่ยวกราก และหากเราไม่ปรับตัว เราก็จะเชิญชวนความหยุดนิ่งเข้ามาหาตัว เราไม่อาจแน่ใจได้ว่าเราอยู่โดดเดี่ยวในจักรวาลนี้ และโลกบ้านเกิดของเราก็เป็นเหมือนไข่มุกที่เสี่ยงต่อการถูกหยิบฉวยไป\n\nเราอาศัยอยู่ในสระน้ำเล็ก ๆ ที่ได้รับการปกป้องโดยเนบิวลาของเรามานานแล้ว แต่จะไม่อีกต่อไป ด้วยการเปิดตัว [GetStartingDrive] ตอนนี้เราพร้อมแล้วที่จะเดินเรือข้ามผ่านมหาสมุทรแห่งดวงดาวอันไม่มีที่สิ้นสุด"

