 decision_expand_planetary_sea:0 "ขยายทะเลของดาวเคราะห์"
 decision_expand_planetary_sea_desc:0 "ทะเลคือบ้านของเรา—และบ้านไม่มีวันใหญ่โตเกินไป เครือข่ายการขุดเจาะน้ำแข็งช่วยให้เราสามารถเก็บเกี่ยวน้ำแข็งจากดาวดวงอื่นและค่อย ๆ ปล่อยลงสู่มหาสมุทรของ [This.GetName] เพื่อขยายพื้นที่อยู่อาศัยบนดาวเคราะห์"
