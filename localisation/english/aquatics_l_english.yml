 aquatics.1.name:0 "สิ่งมีชีวิตใต้น้ำขั้นสูง"
 aquatics.1.desc:0 "พวกเราถือกำเนิดมาจากห้วงมหาสมุทร สายพันธุ์ของเราเหมาะสมอย่างสมบูรณ์แบบที่จะอาศัยอยู่ในส่วนลึกของทะเล แม้ว่าเราจะเดินทางสู่ดวงดาว แต่เราไม่เคยละทิ้งรากเหง้าของเรา: น้ำเป็นและจะเป็นบ้านของเราตลอดไป บัดนี้ การยกระดับของเราเสร็จสิ้นลงแล้ว—เราจะไม่ปรับตัวเพื่อไปอาศัยที่อื่นอีกต่อไป แต่เราจะปรับสภาพโลกให้ตรงกับความต้องการของเราแทน เมื่อเราทักทายความอบอุ่นของวันใหม่ เรารู้ดีว่าไม่มีสิ่งใดจำเป็นต้องพรากเราไปจากมหาสมุทรอีกแล้ว"
 aquatic.1.A:0 "มันจะเป็นบ้านที่ไม่มีที่ใดเหมือน"

 MESSAGE_FROZEN_TERRAFORM_FOUND_TITLE:0 "$aquatics.5.name$"
 MESSAGE_FROZEN_TERRAFORM_FOUND_DESC:0 "เราได้ค้นพบดาวเคราะห์เป้าหมายแช่แข็งที่มีศักยภาพในการปรับสภาพอีกแห่งหนึ่ง [From.GetName] สามารถกลายเป็นโลกมหาสมุทรที่ยอดเยี่ยมได้"

 aquatics.5.name:0 "ค้นพบเป้าหมายปรับสภาพดาวแช่แข็ง"
 aquatics.5.desc.intro:1 "การสำรวจอย่างละเอียดของเราเกี่ยวกับดาว [From.GetName] เผยให้เห็นโลกที่มีชั้นน้ำแข็งหนาแน่นเพียงพอที่จะสามารถฟื้นฟูให้กลายเป็นโลกมหาสมุทรที่น่าอยู่ได้ หากทำให้มันอบอุ่นขึ้นอย่างมีนัยสำคัญและได้รับการสร้างชั้นบรรยากาศที่เหมาะสมแก่การอยู่อาศัย"
 aquatics.5.desc.1:0 "$aquatics.5.desc.intro$\n\nในทางทฤษฎีการปรับสภาพ [From.GetPlanetMoon] นี้จะเป็นไปได้ ทว่าในปัจจุบันเรายังไม่มีเครื่องมือที่จะบรรลุภารกิจอันยิ่งใหญ่นี้ได้ภายในกรอบเวลาที่เป็นจริง"
 aquatics.5.desc.2:0 "$aquatics.5.desc.intro$\n\nค่าใช้จ่ายด้านพลังงานอาจจะสูงมาก แต่ตอนนี้เรามีเครื่องมือที่จะค่อย ๆ ปรับสภาพ [From.GetPlanetMoon] นี้ให้กลายเป็นสถานที่ที่สามารถรองรับชีวิตได้อีกครั้ง"
 aquatics.5.desc.a: "โลกที่ยังคงหลงเหลือความหวังอยู่บ้าง..."

 FROZEN_TERRAFORMING_CANDIDATE_EFFECT:0 "§Y[From.GetName]§! จะสามารถปรับสภาพได้หากเราเลือกความสามารถเสริมแอดเซนชัน §H$ap_hydrocentric$§! และทำการวิจัยเทคโนโลยีด้านสังคม £society£ §H$tech_climate_restoration$§!"

 sm_ice_mining_station:0 "สถานีขุดน้ำแข็ง"
 sm_ice_mining_station_desc:0 "ระบบดาวนี้เป็นแหล่งน้ำแข็งที่อุดมสมบูรณ์ซึ่งยังไม่ได้รับการขุดค้น ด้วยการจัดตั้งสถานีเก็บเกี่ยวที่นี่ เราสามารถนำมันมาใช้ประโยชน์ได้ดียิ่งขึ้น สร้างมหาสมุทรที่อยู่อาศัยได้สำหรับเผ่าพันธุ์ของเรา\n\n$ice_mining_details$\n"
