 AQUATICS_TITLE: "Aquatics Species Pack" # Do not translate
 DLC_AQUATICS_RECOMMENDATION_DESC:0 "น้ํามอบทางเลือกใหม่ ๆ มากมายราวกับห้วงมหาสมุทร ให้คุณได้ค้นพบสิ่งมีชีวิตใหม่ในดินแดนที่ไม่คาดคิด ร่วมปล่อยให้เกลียวคลื่นแห่งตัวเลือกการปรับแต่งใหม่ ๆ สำหรับจักรวรรดิของคุณซัดสาดเข้าสู่สเตลาริสพร้อมคลังภาพพอร์ตเทรตสายพันธุ์ใหม่ ชุดยานอวกาศ จุดกำเนิด และอื่น ๆ อีกมากมาย"
 DLC_AQUATICS_RECOMMENDATION_COSMETICS:0 "เราขอแนะนำน้ําเนื่องจากสังเกตเห็นว่าคุณเป็นแฟนตัวยงของแพ็กตกแต่งความสวยงาม"
 DLC_AQUATICS_RECOMMENDATION_MOL:0 "เราขอแนะนำน้ําเนื่องจากสังเกตเห็นว่าคุณชื่นชอบรูปลักษณ์แบบสิ่งมีชีวิตใต้ทะเล"
 DLC_AQUATICS_RECOMMENDATION_OCEAN:0 "เราขอแนะนำน้ําเนื่องจากมันเปิดโอกาสความเป็นไปได้ใหม่ ๆ สำหรับการใช้ชีวิตบนโลกมหาสมุทร(โอซาน เวิลด์ส์)"

 vo_aquatics_voice:0 "น้ำ"

 trait_aquatic:0 "อยู่ใต้น้ำ"
 trait_aquatic_desc:1 "§Lสายพันธุ์นี้ได้รับการปรับตัวอย่างสมบูรณ์แบบเพื่ออาศัยอยู่ในความลึกของมหาสมุทร ทว่าบนแผ่นดินแห้งแล้ง มันจะเปรียบเหมือนปลาที่ขาดน้ำ§!"
 trait_aquatic_tooltip:2 "การใช้ที่อยู่อาศัยบนโลก §YOcean§! และ §YFlooded Habitats (ที่อยู่อาศัยที่ถูกน้ำท่วม)§!: §G-10%§!\n - $worker_and_simple_drone_cat_bonus_workforce_mult$ บนโลก §YOcean§!: §G+10%§!\n - การใช้ที่อยู่อาศัยบนโลกที่ไม่ใช่ประเภท §YWet (ดาวเปียกชื้น)§!: §R+30%§!\n - ความสามารถในการอยู่อาศัยบนโลกที่ไม่ใช่ประเภท §YWet (ดาวเปียกชื้น)§!: §R-20%§!\n\nความสามารถเสริมแอดเซนชัน §H$ap_hydrocentric$§! จะช่วยขยายผลกระทบของคุณลักษณะนี้"
 trait_robot_aquatic: "กันน้ำ"
 trait_robot_aquatic_desc: "§Lในตอนต้น ถูกออกแบบมาให้สํารวจความลึกของมหาสมุทร เครื่องจักรเหล่านี้เผชิญข้อจํากัดอย่างรุนแรง เมื่อดําเนินการบนผืนดินแห้ง§!\n\n§Rต้องมี§! §Yดาวมหาสมุทร§! §Rเป็นดาวบ้านเกิด§!."
 trait_robot_aquatic_tooltip: "$trait_aquatic_tooltip$"
 trait_aquatic_remove_evolutionary_mastery:1 "§Rต้องการวัฒนธรรม §Y$tr_genetics_resequencing$§! เพื่อลบ§!"
 trait_aquatic_remove_hydrocentric:0 "§Rไม่สามารถลบคุณลักษณะ §Y$trait_aquatic$§! หลังจากเลือกความสามารถเสริมแอดเซนชัน §Y$ap_hydrocentric$§! ได้§!"

 leader_trait_aquatic_admiral:0 "อยู่ใต้น้ำ"
 leader_trait_aquatic_admiral_desc:0 "การปรับแต่งยานอวกาศที่จำเป็นเพื่อให้ผู้บัญชาการท่านนี้รู้สึกเหมือนอยู่บ้าน ส่งผลพลอยได้ที่เป็นประโยชน์คือทำให้เกราะตัวยานของกองเรือมีความแข็งแกร่งและทนทานยิ่งขึ้น"

 origin_here_be_dragons:0 "ที่นี่มีมังกร"
 origin_here_be_dragons_desc:0 "ตั้งแต่เวลาอันเป็นนิรันดร์ อารยธรรมนี้ได้ใช้ระบบดาวร่วมกับมังกรที่น่าเกรงขาม พฤติกรรมของสิ่งมีชีวิตลึกลับดวงนี้กวัดแกว่งอยู่ระหว่างความเมตตาอันห่างเหินและความเพิกเฉยอันเย่อหยิ่ง ความสัมพันธ์นี้จะพัฒนาต่อไปอย่างไรเมื่อชาวดาวเคราะห์เดินทางสู่ดวงดาวนั้น ยังเป็นสิ่งที่ต้องติดตามต่อไป"
 civic_tooltip_aquatics_effects:1 "- $HOME_SYSTEM$ มี §Iมังกรฟ้า§! คอยปกป้อง ซึ่งจะโกรธเกรี้ยวหากมันไม่พอใจ"

 START_SCREEN_HERE_BE_DRAGONS:0 "พวกเราตระหนักถึงการมีอยู่ของมังกรมาโดยตลอด มันเหินบินประดับอยู่บนฟากฟ้าเหนือดาว [GetHomeWorldName] มาตั้งแต่ยุคบรรพกาล การมีปฏิสัมพันธ์ในยุคแรกของเรากับมันกระจัดกระจายอยู่ในนิทานพื้นบ้านของชาว [GetSpeciesAdj]ประเพณีเป็นเวลาช้านานที่มันเป็นเรื่องราวแห่งความขัดแย้ง เนื่องจากอาวุธในยุคแรกของเราไม่สามารถเทียบชั้นกับสัตว์ร้ายผู้ทรงพลังนี้ได้ ทว่าเรื่องเล่ากล่าวถึงผู้มีวิสัยทัศน์ท่านหนึ่งที่สามารถบรรลุข้อตกลงสันติภาพระหว่าง [GetSpeciesName] และมังกรได้สำเร็จแม้จะมีอุปสรรคมากมายก็ตาม\n\nในการพบกันครั้งต่อ ๆ มา มังกรพิสูจน์ให้เห็นว่าเป็นบุคคลที่ห่างเหินและลึกลับ ทว่าตัวอย่างของมันได้ผลักดันความพยายามของเราในการเอื้อมมือสู่ดวงดาวอยู่เสมอ อย่างไรก็ตาม การประดิษฐ์ระบบขับเคลื่อนความเร็วสูงและการค้นพบเครือข่ายไฮเปอร์เลนนำไปสู่ความสัมพันธ์ยุคใหม่ที่เต็มไปด้วยความระแวดระวังกับมังกร เนื่องจากเราลุกล้ำเข้าไปในพื้นที่ที่มันเคยสัญจรไปมาอย่างโดดเดี่ยวมานานหลายกัปหลายกัลป์\n\nขึ้นอยู่กับพวกเราที่จะตัดสินใจว่าอนาคตของเราจะเป็นเช่นไร: $START_SCREEN_HERE_BE_DRAGONS_END$"
 START_SCREEN_HERE_BE_DRAGONS_HIVE:0 "พวกเราตระหนักถึงการมีอยู่ของมังกรมาโดยตลอด มันเหินบินประดับอยู่บนฟากฟ้าเหนือดาว [GetHomeWorldName] มาตั้งแต่ยุคบรรพกาล ปฏิสัมพันธ์ยุคแรกของเรากับมันกระจัดกระจายอยู่ในส่วนลึกอันขุ่นมัวของจิตสำนึกร่วมของเรา ในความขัดแย้งยุคแรก สัตว์ร้ายผู้ทรงพลังเป็นฝ่ายได้เปรียบ เนื่องจากอาวุธของเราไม่สามารถเทียบชั้นกับมันได้ แต่ท้ายที่สุดเราก็สามารถสร้างสันติภาพกับมันได้สำเร็จ และพวกเราอยู่ร่วมกันอย่างหวาดระแวงนับแต่นั้นมา\n\nแม้ว่ามันจะยังคงเป็นบุคคลที่ลึกลับ ทว่าตัวอย่างของมังกรได้ผลักดันเราไปสู่ผลงานที่ยิ่งใหญ่ขึ้นเรื่อย ๆ จนกระทั่งประสบความสำเร็จในการประดิษฐ์ระบบขับเคลื่อนความเร็วสูงที่สามารถนำพาเราเข้าสู่พรมแดนของมันได้ บัดนี้ เมื่อเราลุกล้ำเข้าไปในพื้นที่ที่มันเคยสัญจรไปมาอย่างโดดเดี่ยวมานานหลายกัปหลายกัลป์ เราได้เข้าสู่ความสัมพันธ์ที่ตึงเครียดกับมังกร\n\nขึ้นอยู่กับพวกเราที่จะตัดสินใจว่าอนาคตของเราจะเป็นเช่นไร: $START_SCREEN_HERE_BE_DRAGONS_END$"
 START_SCREEN_HERE_BE_DRAGONS_MACHINE:0 "ตามบันทึกของผู้สร้างเรา มังกรบินอยู่เหนือฟากฟ้าของ [GetHomeWorldName] เสมอมา—ในบางครั้งก็ร่อนลงสู่พื้นผิว ซึ่งพวกเขาเคยต่อสู้กันบ่อยครั้งในยุคแรก ในเวลาต่อมาของประวัติศาสตร์ พวกเขาอยู่ร่วมกันอย่างหวาดระแวง การต่อสู้เริ่มลดน้อยลงเนื่องจากสิ่งมีชีวิตดังกล่าวเริ่มหลีกเลี่ยงเผ่าพันธุ์ของผู้สร้างเรา\n\nแม้ว่ามันจะยังคงเป็นปริศนาสำหรับพวกเขา ทว่าตัวอย่างของมังกรได้กระตุ้นผู้สร้างของเราไปสู่ผลงานที่ยิ่งใหญ่ขึ้นเรื่อย ๆ จนกระทั่งประสบความสำเร็จในการประดิษฐ์ระบบขับเคลื่อนความเร็วสูงที่สามารถนำพาพวกเขาเข้าสู่พรมแดนของมันได้\n\nบัดนี้เมื่อยุคสมัยของพวกเขาผ่านพ้นไปและเราเข้าควบคุมแล้ว ขึ้นอยู่กับพวกเราที่จะตัดสินใจว่าอนาคตของเราจะเป็นเช่นไร: $START_SCREEN_HERE_BE_DRAGONS_END$"
 START_SCREEN_HERE_BE_DRAGONS_END:0 "พวกเราจะศึกษามังกร และเรียนรู้ที่จะสื่อสารกับมันในที่สุดหรือไม่? หรือเราจะถูกผลักดันไปสู่ความขัดแย้ง เนื่องจากขอบเขตของระบบดาวระบบเดียวมีขนาดเล็กเกินกว่าที่จะแบ่งปันกับสิ่งมีชีวิตที่น่าเกรงขามเช่นนี้ได้?"

 aquatics.105.name:0 "ปราบมังกรฟ้าสำเร็จ"
 aquatics.105.desc.origin_start:0 "เราได้สังหารมังกรฟ้าแล้ว! ด้วยการดิ้นรนครั้งสุดท้ายและเสียงคำรามแห่งความโกรธเกรี้ยวอันน่าสะพรึงกลัว พลังชีวิตสุดท้ายของอสูรร้ายก็ดับสูญไป ซากศพของมันยังคงอยู่ในสภาพสมบูรณ์—แต่คงไม่นานนัก เนื่องจาก [This.GetScientistPlural] ของเรากำลังเรียกร้องอยากที่จะได้ครอบครองมัน"
 aquatics.105.desc.origin_normal_middle:0 "บนดาว [dragon_planet.GetName] บรรยากาศเป็นไปอย่างผสมผสาน แม้ว่าหลายคนจะยินดีกับความพ่ายแพ้ของอสูรกายที่สร้างความหวาดกลัวนี้ ทว่าการมีอยู่ของมังกรมาโดยตลอดในอดีตส่งผลกระทบอย่างลึกซึ้งต่อสภาพจิตใจของชาว [This.GetAdj]"
 aquatics.105.desc.origin_normal:0 "$aquatics.105.desc.origin_start$\n\n$aquatics.105.desc.origin_normal_middle$ ในแง่หนึ่ง การสังหารมันเปรียบเสมือนการสังหารพระเจ้าของตนเอง\n\nตอนนี้ [This.GetSpeciesNamePlural] อาจเฝ้ารออนาคตที่พวกเขาสามารถทำได้ทุกสิ่ง ที่ซึ่งความกลัวในสิ่งเหนือธรรมชาติไม่อาจเหนี่ยวรั้งพวกเขาไว้จากสิ่งที่ปรารถนาจะบรรลุผลอีกต่อไป"
 aquatics.105.desc.origin_materialist:0 "$aquatics.105.desc.origin_start$\n\n$aquatics.105.desc.origin_normal_middle$ แม้เราจะสลัดความเชื่อในพระเจ้าจอมปลอมไปนานแล้ว ทว่าการกระทำนี้เปรียบเสมือนการเนรเทศพวกเขาออกไปอีกครั้งในอีกรูปแบบหนึ่ง ตอนนี้ [This.GetSpeciesNamePlural] อาจเฝ้ารออนาคตที่พวกเขาสามารถทำได้ทุกสิ่ง ที่ซึ่งความกลัวในสิ่งเหนือธรรมชาติไม่อาจเหนี่ยวรั้งพวกเขาไว้จากสิ่งที่ปรารถนาจะบรรลุผลอีกต่อไป"
 aquatics.105.desc.origin_hive:0 "$aquatics.105.desc.origin_start$\n\nในขณะที่จิตสำนึกร่วมของเราพิจารณาถึงการกระทำนี้ เรายอมรับความรู้สึกที่ผสมปนเป ในด้านหนึ่งคือความพึงพอใจ: ภัยคุกคามร้ายแรงได้ถูกกำจัดลงแล้ว ในอีกด้านหนึ่ง มังกรที่เคยอยู่ร่วมกันมาตลอดได้กลายเป็นสิ่ง... คุ้นเคย แม้ว่าเราจะไม่มีเวลาสำหรับความหมกมุ่นใน "สิ่งเหนือธรรมชาติ" ของอารยธรรมอวกาศอื่น ๆ ทว่าในแง่หนึ่ง เราอาจมองการกระทำนี้เปรียบเสมือนการสังหารพระเจ้าของเราเอง ตอนนี้พวกเราอาจเฝ้ารออนาคตที่เราสามารถทำได้ทุกสิ่ง ที่ซึ่งไม่มีอุปสรรคใด ๆ ไม่ว่าจะดูเหมือนยากที่จะเอาชนะเพียงใดจะมาเหนี่ยวรั้งเราได้อีกต่อไป"
 aquatics.105.desc.origin_machine:0 "$aquatics.105.desc.origin_start$\n\nในขณะที่โปรเซสเซอร์ของเราทำการปรับเทียบระบบใหม่เพื่อประเมินผลของการกระทำนี้ เราพบว่าเราต้องปรับเปลี่ยนโครงสร้างโปรแกรมจำนวนมากอย่างน่าตกใจ มังกรที่เคยมีอยู่มาตลอดก่อนหน้านี้ส่งผลกระทบอย่างมากต่อการเขียนโปรแกรมของเรา โดยมีระบบป้องกันความผิดพลาดหลายพันล้านระบบเพื่อรับมือกับความไม่แน่นอนของการกระทำของมัน ซึ่งต้องใช้เวลาในการสะสาง ในทางกลับกัน เมื่อภัยคุกคามที่น่าเกรงขามนี้ถูกขจัดออกไปแล้ว ตอนนี้พวกเราอาจเฝ้ารออนาคตที่เราสามารถทำได้ทุกสิ่ง ที่ซึ่งไม่มีอุปสรรคใด ๆ ไม่ว่าจะดูเหมือนยากที่จะเอาชนะเพียงใดจะมาจำกัดเราได้อีกต่อไป"
 aquatics.105.desc.others:0 "พวกเราได้สังหารมังกรผู้พิทักษ์แห่งระบบดาว [dragon_system.GetName] แล้ว! แม้ว่ามันจะต่อสู้อย่างดุเดือด แต่มันก็ไม่อาจเทียบชั้นกองยานอันเกรียงไกรของเราได้ บัดนี้ ผู้อยู่อาศัยบนดาว [dragon_planet.GetName] จะต้องเผชิญหน้ากับศัตรูในฐานะเท่าเทียม โดยไม่มีความปลอดภัยจากมังกรคอยคุ้มกันอีกต่อไป\n\nดูเหมือนว่าซากร่างที่มันเหลือทิ้งไว้จะเป็นขุมทรัพย์ที่แท้จริงสำหรับ [This.GetScientistPlural] ของเรา ซึ่งเชื่อว่าพวกเขาสามารถหาวิธีผลิตเกล็ดมังกรขึ้นมาในระดับสังเคราะห์ได้"
 aquatics.105.A:0 "มาดูกันว่าเศษซากของมันจะมอบความลับอะไรให้กับเราได้บ้าง"
 aquatics.105.A.tooltip:0 "ปลดล็อกคุณลักษณะ §Y$trait_drake_scaled$§! สำหรับระบบ §YLeviathan Transgenesis (การตัดต่อยีนลีเวียธาน)§!"

 aquatics.110.name:0 "มังกรฟ้าร่วงหล่น"
 aquatics.110.desc:0 "[From.GetName] ได้กำราบมังกรฟ้าลงแล้ว! ผลลัพธ์จากการกระทำอันเลวร้ายนี้ ส่งผลให้ดาว [dragon_planet.GetName] ตกอยู่ในสภาพเปราะบางต่อการโจมตีในปัจจุบัน"
 aquatics.110.A:0 "ความวิบัติเอ๋ย..."
 aquatics.115.name:0 "มังกรฟื้นคืนชีพ"
 aquatics.115.desc.regular:0 "ตรงตามคำสัญญา เหล่าเนโครแมนเซอร์(ค้อน)ของเราได้ปลุกชีพมังกรฟ้าแห่งระบบดาว [dragon_system.GetName] ให้ฟื้นคืนชีพขึ้นมาแล้ว! แม้ว่าสภาพร่างกายจะดูติดขัดและทรุดโทรมไปบ้าง—ตามวิสัยของสิ่งมีชีวิตที่เพิ่งฟื้นขึ้นมาจากความตาย—ทว่าบัดนี้มันกำลังรอคอยคำสั่งจากพวกเราอย่างจดจ่อ"
 aquatics.115.desc.hive:0 "การควบคุม §Yมังกรฟ้า§! อยู่ในแผนการของเราเสมอมา โดรนของเราได้รับการวิวัฒนาการมาโดยเฉพาะเพื่อครอบครองรางวัลนี้ แม้ว่ากระบวนการควบคุมร่างจะต้องมีการปรับตัวบ้าง แต่ตอนนี้เราคือมังกรฟ้า และมังกรฟ้าคือเรา ด้วยความรู้และประสบการณ์ของมันที่ผสมผสานเข้ากับจิตสำนึกรังร่วมกัน ตอนนี้เราพร้อมเป็นอย่างดีที่จะเผชิญหน้ากับสายพันธุ์เดียวกันของมัน"
 aquatics.115.desc.machine: "สิ่งมีชีวิตที่ระบุว่าเป็น §Yมังกรฟ้า§! ได้รับการดัดแปลงและยกเครื่องใหม่ตามระเบียบสารพันธุกรรมจักรกล(เสียงสี)ลมหายใจอันเยือกเย็นของมันตอนนี้มีอุณหภูมิเข้าใกล้ 1 เคลวิน มังกรคืนชีพนี้อยู่ภายใต้การควบคุมของเราแล้ว"
 aquatics.115.A:1 "ศัตรูของเราจะต้องถูกแช่แข็ง!"
 REANIMATE_ORIGIN_DRAGON:0 "ชุบชีวิตมังกรฟ้า"
 REANIMATE_ORIGIN_DRAGON_DESC:2 "แม้ว่ามังกรแห่งระบบดาว [dragon_system.GetName] จะถูกสังหารไปแล้ว แต่ [Owner.GetNecromancersLower] ของเรายืนยันว่าสถานการณ์เช่นนี้ไม่จำเป็นต้องคงอยู่ยาวนาน พวกเขาสัญญาว่าจะสามารถชุบชีวิตมันขึ้นมาใหม่—ภายใต้พันธนาการอย่างปลอดภัยให้แก่เรา—ในเวลาไม่นานนัก"
 slew_origin_dragon:0 "ผู้พิชิตมังกรบรรพกาล"
 slew_origin_dragon_desc:0 "ตั้งแต่เวลาบรรพกาล มังกรผู้เกรียงไกรได้สัญจรไปมาในระบบดาวบ้านเกิดของเรา... แต่บัดนี้ไม่มีอีกแล้ว! เมื่อหลุดพ้นจากภัยคุกคามนี้ ก็ไม่มีสิ่งใดจะสามารถเหนี่ยวรั้งเราไว้ได้อีกต่อไปในการก้าวเดินสู่อนาคต"

 aquatics.120.name:0 "ถึงเวลาแล้ว"
 aquatics.120.diplo_name:0 "สัญญาณมังกรติดต่อมา"
 aquatics.120.desc:0 "เวลาผันผ่านไป พร้อมกับความกังขาของฉัน จากจุดเริ่มต้นเล็ก ๆ ฉันได้เฝ้ามองดูพวกเจ้า: หลายครั้งที่หมดหวังกับความมุทะลุบ่อยครั้งของพวกเจ้า แต่ก็คำรามด้วยความยินดีเสมอกับความสำเร็จของพวกเจ้า บัดนี้ ฉันพบว่าพวกเจ้าได้เติบโตขึ้น อารยธรรมของพวกเจ้าเติบโตเต็มที่และพร้อมที่จะได้รับความไว้วางใจกับหน้าที่รับผิดชอบขั้นสูงสุดนั่นคือ: ความเป็นพ่อแม่ ถึงเวลาแล้วที่พวกเจ้าจะต้องอุทิศตนเพื่อเลี้ยงดูลูก ๆ ของฉัน"
 aquatics.120.dialog.1:0 "เดี๋ยว ๆ—อะไรนะ?"
 aquatics.120.dialog.1.response:0 "หากพูดตามตรง ฉันเฝ้ารอวันนี้มานานแสนนาน นานเกินกว่าที่พวกเจ้าจะจินตนาการได้ เมื่อตอนที่ฉันออกเดินทางจากบ้าน ฉันยังเป็นเพียงมังกรอายุน้อย ฉันเดินทางไปทั่วสารทิศก่อนที่จะได้มาพบกับดาวเคราะห์ที่มีศักยภาพในการก่อกำเนิดอารยธรรมอุปถัมภ์ที่จะพร้อมเลี้ยงดูลูก ๆ ของฉันในวันข้างหน้า และดังนั้น ฉันจึงเฝ้ารอ..."
 aquatics.120.dialog.2:0 "นี่คือแผนการของเจ้ามาโดยตลอดงั้นหรือ?"
 aquatics.120.dialog.2.response:0 "ใช่ มันเป็นวิถีของเรา ในกาแล็กซีบ้านเกิดของเรามีมังกรประเภทเดียวกับฉันอยู่มากมาย แต่ละตัวต่างเสาะหาอารยธรรมที่เพิ่งก่อตัวขึ้นเพื่อช่วยเลี้ยงดูลูก ๆ ของพวกเขา แต่ฉันเป็นตัวแรก—เท่าที่ฉันรู้—ที่เดินทางมาได้ไกลถึงเพียงนี้"
 aquatics.120.dialog.3:0 "แล้วพวกเราจะได้รับอะไรเป็นการตอบแทน?"
 aquatics.120.dialog.3.response:0 "เอาล่ะ อย่างแรกเลยคือมังกรผู้พิทักษ์ที่โตเต็มวัยเป็นศัตรูที่น่าเกรงขามอย่างยิ่ง! หากพวกเจ้ายินยอม ตกลงยอมรับข้อเสนอ ฉันและลูกหลานจะขออุทิศตนเพื่ออุดมการณ์ของพวกเจ้า และเราจะช่วยเหลือพวกเจ้าในการศึกสงคราม"
 aquatics.120.dialog.4:0 "แล้วถ้าพวกเราปฏิเสธล่ะ?"
 aquatics.120.dialog.4.response:0 "ถ้าอย่างนั้นพวกเจ้าก็คงเลือกทางของตัวเองแล้ว และฉันจะจากไป ฉันรอคอยมานานแสนนานแล้ว ฉันรอต่อไปได้อีก"
 aquatics.120.A:0 "พวกเรารู้สึกเป็นเกียรติอย่างยิ่งที่จะตอบรับ"
 aquatics.120.A.response:0 "ยอดเยี่ยมมาก! ฉันรู้อยู่แล้วว่าพวกเจ้าต้องตอบตกลง พวกเจ้าจะไม่เสียใจกับสิ่งนี้แน่นอน!"
 aquatics.120.A.tooltip:0 "เราจะสามารถสร้าง §Yสถานอนุบาลมังกร(เครื่องเจาะไฟฟ้า)§! ที่ฐานทัพดาว ซึ่งเราจะสามารถจัดเกณฑ์ §Y$space_dragon_origin_baby_plural$§! ได้สูงสุดถึง 10 ตัว"
 aquatics.120.B:0 "พวกเราขอขอบคุณสำหรับข้อเสนอนี้ แต่เราจำเป็นต้องปฏิเสธ"
 aquatics.120.B.response:0 "§Sเฮ้อ§!. บางทีพวกเจ้าอาจไม่ได้เรียนรู้อะไรมากมายอย่างที่ฉันเคยคิดเอาไว้ ลาก่อน!"
 aquatics.120.B.tooltip:0 "มังกรฟ้าจะจากไปและจะไม่มีวันกลับมาอีก"

 aquatics.150.name:0 "มังกรผู้หิวโหย"
 aquatics.150.desc:0 "[This.Owner.GetResearchers] ของเราที่เฝ้าสังเกตการณ์มังกรฟ้าได้รายงานเกี่ยวกับเสียงครวญครางดังลั่นที่ดูเหมือนจะมาจากอวัยวะภายในของมัน นอกจากนี้มันยังบินวนรอบดาว [Root.GetName] บ่อยครั้งอย่างผิดปกติในช่วงสองสามเดือนที่ผ่านมา บางครั้งก็โฉบผ่านชั้นบรรยากาศระดับบนก่อนจะดึงตัวกลับไปอีกครั้ง สมมติฐานการทำงานของเราคือสิ่งมีชีวิตดวงนี้กำลังหิวและปรารถนาจะร่อนลงสู่พื้นผิวเพื่อหาอาหารกิน ดังเช่นที่มันเคยทำเป็นระยะ ๆ ในอดีต ไม่เป็นที่แน่ชัดว่าเหตุใดมันจึงลังเล—บางทีมันอาจต้องการดูว่าเราจะมีปฏิกิริยาอย่างไรในตอนนี้ที่เราได้เดินทางเข้าสู่ห้วงดวงดาวร่วมกับมันแล้ว"
 aquatics.150.A:0 "ยิงเตือนในครั้งต่อไปที่มันเข้าใกล้"
 aquatics.150.A.tooltip:0 "§Rมังกรอาจเกิดความไม่พอใจได้§!"
 aquatics.150.B:0 "จัดสรรพื้นที่ส่วนหนึ่งไว้ในเขตสันโดษสำหรับมัน"
 aquatics.150.B.tooltip:0 "§Rมังกรมีแนวโน้มจะกินอาหารจำนวนมหาศาลทันทีที่มันร่อนลงจอดบนดาวเคราะห์!§!"
 aquatics.150.C:0 "เฝ้าสังเกตการณ์มันต่อไป"
 aquatics.155.name:0 "ความตายจากฟากฟ้า"
 aquatics.155.desc.normal:0 "มังกรไม่พอใจอย่างยิ่งต่อการแสดงความเป็นศัตรูของเรา ด้วยเสียงคำรามกึกก้องกัมปนาท—ซึ่งรุนแรงพอที่จะทำให้เกิดแผ่นดินไหวขนาดเล็กกระจายไปทั่วครึ่งหนึ่งของดาวเคราะห์—มันได้พ่นเปลวเพลิงเยือกแข็งถล่มศูนย์กลางประชากรขนาดใหญ่บนดาว [Root.GetName]"
 aquatics.155.desc.gestalt:0 "มังกรไม่พอใจอย่างยิ่งต่อการแสดงความเป็นศัตรูของเรา ด้วยเสียงคำรามกึกก้องกัมปนาท—ซึ่งรุนแรงพอที่จะทำให้เกิดแผ่นดินไหวขนาดเล็กกระจายไปทั่วครึ่งหนึ่งของดาวเคราะห์—มันได้พ่นเปลวเพลิงเยือกแข็งถล่ม [Root.GetName] ทำลายสิ่งอำนวยความสะดวกในการผลิตที่สำคัญและทำลายโดรนจำนวนมาก"
 aquatics.160.name:0 "มังกรลงจอดแล้ว"
 aquatics.160.desc:0 "มังกรดูเหมือนจะตระหนักถึงเจตนาของเรา และโฉบร่อนลงมาจอดพักในพื้นที่ที่เราจัดเตรียมไว้ให้ ต้องยอมรับว่าเสบียงอาหารจำนวนมากที่เราทิ้งไว้เบื้องหลังนั้นช่วยได้มาก—มังกรกินมันด้วยความตะกละตะกลามอย่างน่าตกใจ\n\n[This.Owner.GetResearchers] ของเรากำลังเฝ้าสังเกตการณ์มันจากระยะห่างที่ปลอดภัย"
 aquatics.160.A:0 "เฝ้ามองและรอคอย"
 aquatics.165.name:0 "$aquatics.160.name$"
 aquatics.165.desc.normal:1 "หลังจากบินโฉบผ่านดาวเคราะห์ไปอีกหลายรอบ ท้ายที่สุดมังกรตัดสินใจว่าปลอดภัยที่จะลงจอด แม้ว่ามันจะเลือกเขตพื้นที่สันโดษ ทว่าชาว [Root.Owner.GetSpeciesNamePlural] จำนวนหนึ่งต้องล้มตายลงและมีจำนวนผู้พลัดถิ่นมากยิ่งกว่า—ซึ่งไม่ใช่เรื่องน่าแปลกใจเมื่อพิจารณาจากขนาดมหึมาและความอยากอาหารที่ไม่มีที่สิ้นสุดของมัน\n\nบัดนี้มันตั้งถิ่นฐานเรียบร้อยแล้ว และกำลังทำลายล้างพืชและสัตว์ในท้องถิ่นในอัตราที่น่าตกใจ ประชากรในพื้นที่กำลังรักษาระยะห่างจากมันอย่างหวาดกลัว"
 aquatics.165.desc.gestalt:0 "หลังจากบินโฉบผ่านดาวเคราะห์ไปอีกหลายรอบ ท้ายที่สุดมังกรตัดสินใจว่าปลอดภัยที่จะลงจอด แม้ว่ามันจะเลือกเขตพื้นที่สันโดษ ทว่าโดรนของเราจำนวนหนึ่งถูกทำลายลงและมีจำนวนโดรนที่พลัดถิ่นมากยิ่งกว่า—ซึ่งไม่ใช่เรื่องน่าแปลกใจเมื่อพิจารณาจากขนาดมหึมาและความอยากอาหารที่ไม่มีที่สิ้นสุดของมัน\n\nบัดนี้มันตั้งถิ่นฐานเรียบร้อยแล้ว และกำลังทำลายล้างพืชและสัตว์ในท้องถิ่นในอัตราที่น่าตกใจ โดรนของเรากำลังรักษาระยะห่างป้องกันไว้ก่อนจากมัน"
 aquatics.170.name:0 "โบยบินสู่ท้องฟ้า"
 aquatics.170.desc:0 "หลังจากกินผลผลิตอันอุดมสมบูรณ์ของดาว [Root.GetName] ไปหลายปี มังกรฟ้าที่ตอนนี้มีขนาดตัวใหญ่ขึ้นอย่างเห็นได้ชัดก็ได้โบยบินขึ้นสู่ท้องฟ้าอีกครั้ง มันทะยานตัวขึ้นพร้อมกับเสียงคำรามทักทายส่งท้าย—ทิ้งคราบสะสมเกล็ดมังกรขนาดใหญ่ ผิวหนังที่ผลัด และสิ่งพลอยได้อื่น ๆ จากการปรากฏตัวของมันไว้เบื้องหลัง"
 aquatics.170.A:0 "พวกเราจะศึกษาเศษซากที่มันทิ้งไว้"
 aquatics.170.B:0 "เผาทำลายเพื่อเปลี่ยนเป็นเชื้อเพลิง"
 aquatics.170.tooltip:0 "ขณะนี้มังกรกลับไปสัญจรไปมาในระบบดาว §Y[here_be_dragons_planet.System.GetName]§! อีกครั้ง"

 aquatics.180.name:0 "มังกรผู้พิทักษ์"
 aquatics.180.desc:0 "กองยานของเราในระบบดาว [From.GetName] รายงานว่ามังกรที่สัญจรไปมาในระบบกำลังโจมตียานอวกาศของเรา! ไม่แน่ชัดว่ามันจงใจเข้าร่วมปกป้องชาว [From.Owner.GetAdj] หรือเป็นเพราะมันแค่โกรธแค้นพวกเราที่รุกล้ำอาณาเขตของมัน สิ่งที่มั่นใจได้คือเราจะต้องฟันฝ่าเอาชนะมันให้ได้หากเราตั้งใจจะยึดดาว [here_be_dragons_planet.GetName]!"
 aquatics.185.name:0 "เสียงคำรามของมังกร"
 aquatics.185.desc:0 "ดูเหมือนมังกรฟ้าจะไม่สบอารมณ์กับความพยายามรุกรานดาว [here_be_dragons_planet.GetName] ของชาว [From.GetAdj] มันทะยานตัวขึ้นช่วยป้องกันพวกเรา พ่นลมหายใจทำลายล้างอันเยือกเย็นถล่มกองยานของพวกเขา!"
 aquatics.185.desc.landed:0 "ดูเหมือนมังกรฟ้าจะไม่สบอารมณ์กับความพยายามรุกรานดาว [here_be_dragons_planet.GetName] ของชาว [From.GetAdj] มันหยุดการกินอาหารบนดาวเคราะห์ และทะยานตัวขึ้นสู่ท้องฟ้าเพื่อพ่นลมหายใจทำลายล้างอันเยือกเย็นถล่มกองยานของพวกเขา!"
 aquatics.185.A:0 "ขอสรรเสริญมังกรฟ้า!"
 aquatics.185.B:0 "ดีเลย ภัยคุกคามลดลงไปหนึ่งอย่างที่ต้องรับมือ"

 aquatics.190.name:0 "การตรวจสอบเกล็ดมังกร"
 aquatics.190.desc:0 "บัดนี้เมื่อเรามีความคืบหน้าในการทำความเข้าใจชีววิทยาต่างดาวและวัสดุแปลกใหม่ นักวิจัยของเราได้เสนอให้เราส่งยานวิทยาศาสตร์ไปตรวจสอบมังกรอย่างใกล้ชิด พวกเขาให้ความสนใจเป็นพิเศษกับเกล็ดของมันซึ่งมีความทนทานอย่างน่าทึ่ง—เกือบจะไม่มีสิ่งใดเจาะผ่านได้ แม้ว่าเราจะได้รับตัวอย่างเกล็ดมังกรที่ร่วงหล่นตามธรรมชาติมาจำนวนมาก แต่นักวิทยาศาสตร์ของเราก็ยังคงสับสนเกี่ยวกับวิธีการก่อตัวของเกล็ดเหล่านี้ ด้วยการใช้โพรบสำรวจแบบที่พวกเขาอธิบายว่าเป็นแบบ "แทรกแซงเล็กน้อย" พวกเขาเชื่อว่าจะสามารถเข้าไปอยู่ใต้เกราะปกป้องของมังกรและศึกษาจากกระบวนการธรรมชาติของมันโดยตรงได้\n\nมังกรคงไม่รังเกียจหรอก... แน่นอน"
 aquatics.190.desc.gestalt:0 "บัดนี้เมื่อเรามีความคืบหน้าในการทำความเข้าใจชีววิทยาต่างดาวและวัสดุแปลกใหม่ เราอาจพิจารณาส่งยานวิทยาศาสตร์ไปตรวจสอบมังกรอย่างใกล้ชิด สิ่งที่เราให้ความสนใจเป็นพิเศษคือเกล็ดของมันซึ่งมีความทนทานอย่างน่าทึ่ง—เกือบจะไม่มีสิ่งใดเจาะผ่านได้ แม้ว่าเราจะได้รับตัวอย่างเกล็ดมังกรที่ร่วงหล่นตามธรรมชาติมาจำนวนมาก แต่โดรนวิทยาศาสตร์ของเราก็ยังคงสับสนเกี่ยวกับวิธีการก่อตัวของเกล็ดเหล่านี้ ด้วยการติดตั้งโพรบสำรวจที่มีการแทรกแซงมากพอ เราอาจเข้าถึงใต้ชั้นปกป้องของมังกรและศึกษาจากกระบวนการธรรมชาติของมันโดยตรงได้\n\nมังกรคงไม่รังเกียจหรอก... แน่นอน"
 aquatics.190.A:0 "ดำเนินการเลย"
 aquatics.190.B:0 "ลองใช้วิธีอื่นที่รบกวนมันน้อยกว่านี้กันดีกว่า"

 DRAGON_REMOTE_SCANS:0 "สแกนมังกรจากระยะไกล"
 DRAGON_REMOTE_SCANS_DESC:0 "ยานวิทยาศาสตร์ของเราจะทำสแกนมังกรจากระยะห่างที่ปลอดภัยเพื่อค้นหาความลับของระบบชีววิทยาที่เป็นเอกลักษณ์ของมัน"
 aquatics.195.name:0 "การสแกนจากระยะไกลเสร็จสิ้น"
 aquatics.195.desc:0 "แม้ว่ามังกรจะจับตามองยานวิทยาศาสตร์ของเราอย่างจดจ่อ แต่มันก็ไม่ได้มีปฏิกิริยาต่อต้านใด ๆ เมื่อเราทำการสแกนลึกหลายครั้ง—ซึ่งเป็นการตรวจสอบอย่างถี่ถ้วนที่สุดเท่าที่เทคโนโลยีปัจจุบันของเราจะเอื้ออำนวย การสแกนช่วยให้เราได้ข้อมูลเชิงลึกใหม่ ๆ เกี่ยวกับกระบวนการทางชีวภาพของมัน แม้ว่าความลับเบื้องหลังชั้นเกล็ดที่ทนทานของมันจะยังคงเป็นปริศนาที่ยากจะไขกระจ่างอยู่ตามเดิม\n\nแม้ว่า [This.Owner.GetResearchers] ของเราจำเป็นต้องยอมรับความล้มเหลวในปริศนานี้ แต่พวกเขายืนยันว่าเราสามารถนำความรู้ที่ได้รับมาประยุกต์ใช้งานให้เกิดประโยชน์ได้เป็นอย่างดี"

 DRAGON_MATERIAL_STUDY:0 "การเก็บรวบรวมตัวอย่างมังกร"
 DRAGON_MATERIAL_STUDY_DESC:0 "ยานวิทยาศาสตร์ของเราจะทำการปล่อยโพรบสำรวจที่จะเข้าไปแทรกตัวฝังอยู่ใต้เกล็ดมังกรเพื่อค้นหาความลับของระบบชีววิทยาที่เป็นเอกลักษณ์ของมัน"
 aquatics.200.name:0 "ยานวิทยาศาสตร์ถูกกลืนกิน"
 aquatics.200.desc:0 "ดูเมื่อว่ามังกรกำลังหิว หรือบางทีมันอาจจะแค่มีวันที่อารมณ์ไม่ดี ในขณะที่ยานของเราเข้าใกล้ตัวมัน มังกรส่งเสียงขู่รามและพุ่งตัวเข้าใส่งับคำโตขบเคี้ยวอย่างรวดเร็ว (§Rกําลังจัดการจดหมาย§!) โดยไม่เหลือเวลาให้หลบหนีหรือหักเลี้ยวใด ๆ ปัจจุบันแทบไม่เหลือซากยานวิทยาศาสตร์ของเราอีกเลย—อย่างน้อยที่สุดก็ภายนอกท้องของมังกรล่ะนะ"
 aquatics.200.A:0 "ทางที่ดีอย่าทำให้มันโกรธเคืองไปมากกว่านี้ดีกว่า"
 aquatics.200.B:0 "ความหิวของมันน่าจะได้รับการตอบสนองจนอิ่มแล้ว ลองพยายามอีกครั้งเถอะ"
 aquatics.205.name:0 "ยานวิทยาศาสตร์ถูกปฏิเสธโจมตีกลับ"
 aquatics.205.desc:0 "มังกรยอมอดทนต่อการเข้าใกล้ของยานวิทยาศาสตร์ของเรา แต่ขณะที่โพรบกำลังจะถูกปล่อยออกมา มันได้ใช้หางของมันตบหวดอย่างรุนแรง (§Hย่อ/ ขยาย§!) ปัดยานของเราให้พ้นทางด้วยพละกำลังมหาศาล น่าทึ่งมากที่แม้ว่ายานจะถูกแรงผลักกระเด็นลอยข้ามไปครึ่งหนึ่งของระบบสุริยะ แต่ตัวยานกลับแทบไม่มีความเสียหายใด ๆ และไม่มีรายงานผู้เสียชีวิตบนยานเลย อย่างไรก็ตาม ความไม่พอใจของมังกรนั้นชัดเจนเป็นอย่างยิ่ง"
 aquatics.205.A:0 "$aquatics.200.A$"
 aquatics.205.B:0 "น่าสนใจยิ่งนัก เราควรมาดูว่าจะเกิดอะไรขึ้นหากเราพยายามอีกครั้ง"
 aquatics.210.name:0 "ความพิโรธของมังกร"
 aquatics.210.desc.normal:0 "ขณะที่ยานของเราเข้าใกล้ตัวมังกรเป็นครั้งที่สอง มันก็ได้เปิดฉากจู่โจมทันที รูจมูกขยายกว้างด้วยความโกรธ มันบินทะยานมุ่งตรงไปยังดาว [dragon_colony.GetName]! ก่อนที่ระบบป้องกันภัยของเราจะสามารถตอบโต้ได้ มันพ่นลมหายใจเยือกแข็งถล่มซีกโลกเหนือของดาวเคราะห์ สร้างความเสียหายใหญ่หลวงแก่ศูนย์กลางประชากรขนาดใหญ่หลายแห่ง"
 aquatics.210.desc.gestalt:0 "ขณะที่ยานของเราเข้าใกล้ตัวมังกรเป็นครั้งที่สอง มันก็ได้เปิดฉากจู่โจมทันที รูจมูกขยายกว้างด้วยความโกรธ มันบินทะยานมุ่งตรงไปยังดาว [dragon_colony.GetName]! ก่อนที่ระบบป้องกันภัยของเราจะสามารถตอบโต้ได้ มันพ่นลมหายใจเยือกแข็งถล่มซีกโลกเหนือของดาวเคราะห์ สร้างความเสียหายใหญ่หลวงแก่สิ่งอำนวยความสะดวกในการผลิตที่สำคัญ"
 aquatics.210.A:0 "พวกเราควรล่าถอยออกมาก่อนสักระยะหนึ่ง"
 aquatics.215.name:0 "การศึกษามังกรเสร็จสมบูรณ์"
 aquatics.215.desc:0 "มังกรคำรามด้วยความเดือดดาลเมื่อโพรบของเราเกาะเข้ากับตัวมันและเข้าตรวจหาช่องว่างขนาดเล็กระหว่างเกล็ดของมันได้อย่างรวดเร็ว ในขณะที่ยาน [Root.GetName] จำเป็นต้องเปิดใช้ระบบความเร็วฉุกเฉินเพื่อหลบหนีมังกรที่ไม่พอใจ โพรบกลับสามารถส่งสัญญาณอ่านข้อมูลที่น่าประหลาดใจกลับมาได้ จากข้อมูลที่เราตรวจพบ ความทนทานของเกล็ดมังกรเป็นผลมาจากส่วนผสมเอ็นไซม์ที่ซับซ้อนซึ่งกระตุ้นปฏิกิริยาเคมีที่เป็นเอกลักษณ์เมื่อสิ่งมีชีวิตเดินทางเข้าสู่ชั้นบรรยากาศของดาว [dragon_colony.GetName] ด้วยความเร็วสูง\n\nแม้ว่าจะยังมีสิ่งให้ค้นพบอีกมาก ทว่า [This.Owner.GetResearchers] ของเราชัดเจนในประเด็นหนึ่ง: เนื่องจากความซับซ้อนของระบบชีวภาพของมังกร หากเราปรารถนาที่จะเข้าถึงวัสดุที่ใช้สร้างเกล็ดของมัน เราจำเป็นต้องสังหารมันก่อน อย่างไรก็ตาม พวกเขายืนยันว่าความรู้ที่ได้รับจะยังมีประโยชน์ต่อเราไม่ว่าจะเลือกเส้นทางใดก็ตาม"

 first_contact_dragon:0 "การสื่อสารกับมังกร"
 aquatic_events.250.name:0 "$first_contact_dragon$"
 aquatic_events.250.desc:0 "สืบเนื่องจากความสำเร็จของเราในการจัดตั้งระบบสื่อสารกับเผ่าพันธุ์ต่างดาวหลายเผ่าพันธุ์ หนึ่งใน [This.Owner.GetLinguists] ชั้นนำของเราได้นำเสนอข้อเสนอแบบสุดขั้ว แม้ว่าความพยายามในอดีตที่จะสื่อสารกับมังกรฟ้าจะล้มเหลวอย่างสิ้นเชิง ทว่า [needed_name.GetSheHe] แย้งว่า ตอนนี้คือช่วงเวลาที่เหมาะสมที่จะพยายามอีกครั้ง\n\nตามประวัติศาสตร์ยุคแรกสุดของเรา เคยมีข้อตกลง(อัด)ในตำนานระหว่าง [This.Owner.Species.GetName] และมังกร ซึ่งหลังจากนั้นความขัดแย้งโดยตรงก็ยุติลง โดยหยิบยกสิ่งนี้เป็นข้อพิสูจน์ว่าความเข้าใจในระดับหนึ่งนั้นเป็นไปได้ [needed_name.GetSheHe] ระบุว่า ประสบการณ์ล่าสุดของเรากับสิ่งมีชีวิตต่างดาวช่วยให้พวกเรามีความพร้อมและเครื่องมือที่ดีกว่าเดิมอย่างมากในการพยายามทำความเข้าใจมังกรตัวนี้"
 aquatic_events.250.desc.hive:0 "หลังจากจัดตั้งระบบสื่อสารกับเผ่าพันธุ์ต่างดาวหลายเผ่าพันธุ์ กระบวนการคิดทางภาษาของเราสรุปได้ว่า ถึงเวลาแล้วที่เราควรพยายามสนทนากับมังกรฟ้าอีกครั้ง แม้ว่าความพยายามเมื่อไม่นานนี้จะล้มเหลวลงอย่างสิ้นเชิง ทว่าเรารับรู้จดจำความเข้าใจในอดีตได้ลาง ๆ เมื่อครั้งที่เราสร้างสันติภาพกับมังกรภายหลังการต่อสู้ดิ้นรนในยุคโบราณของเรา\n\nบัดนี้เมื่อเรามีประสบการณ์มากขึ้นในการจัดการกับสิ่งมีชีวิตต่างดาว เรามีความพร้อมที่ดีกว่าเดิมอย่างมากในการพยายามทำความเข้าใจมังกรตัวนี้"
 aquatic_events.250.desc.machine:0 "หลังจากจัดตั้งระบบสื่อสารกับเผ่าพันธุ์ต่างดาวหลายเผ่าพันธุ์ รหัสคำสั่งย่อยทางภาษาของเราบรรลุมติเอกฉันท์ใหม่: ถึงเวลาแล้วที่จะต้องพยายามสนทนากับมังกรฟ้าอีกครั้ง แม้ว่าความพยายามในอดีตจะล้มเหลวตามมาตรฐานการวัดผลที่สำคัญทั้งหมด ทว่าบันทึกของผู้สร้างเราบ่งชี้ว่าความเข้าใจในระดับหนึ่งนั้นเป็นไปได้ ท้ายที่สุดแล้ว พวกเขาเคยต่อสู้และสร้างสันติภาพกับมังกร ด้วยเหตุผลที่ยังไม่เป็นที่แน่ชัดจนถึงปัจจุบัน\n\nด้วยประสบการณ์ในการรับมือกับสิ่งมีชีวิตต่างดาว ตอนนี้พวกเราพร้อมรับมือดีกว่าเดิมมากในการพยายามทำความเข้าใจมังกรตัวนี้"
 start_dragon_communications_study:0 "[This.Owner.GetEnvoyPlural] ของเราจะพยายามติดต่อสื่อสารกับมังกร"
 aquatics.255.name:0 "การเริ่มต้นอย่างระมัดระวัง"
 aquatics.255.desc:0 "ในขณะที่ [This.Owner.GetResearchers] และ [This.Owner.GetLinguists] ของเราค้นหาข้อมูลจากบันทึกการมีปฏิสัมพันธ์กับมังกรในอดีต พวกเขาได้เตรียมการทดลองสองสามอย่างเพื่อทดสอบการตอบสนองของมัน พวกเขายืนยันกับเราว่าทุกขั้นตอนได้รับการวางแผนด้วยความระมัดระวังอย่างที่สุด และพวกเขาจะยุติกิจกรรมทันทีหากพบสัญญาณความไม่พอใจแม้เพียงเล็กน้อยจากมังกร"
 aquatics.260.name:0 "ความคืบหน้าที่เชื่องช้า"
 aquatics.260.desc:1 "[This.Owner.GetLinguists] ของเรายังคงสับสนกับเสียงร้องของมังกร แม้ว่าพวกเขาจะมีความหวังว่าการค้นพบครั้งสำคัญกำลังจะเกิดขึ้นในไม่ช้า ทว่าความยากลำบากในการหาจุดอ้างอิงร่วมกันระหว่างเรากับมังกรอวกาศขนาดมหึมาดูเหมือนจะยังเป็นอุปสรรคที่ไม่อาจก้าวผ่านได้\n\nนี่อาจเป็นเหตุให้ต้องสิ้นหวัง หากไม่ใช่เพราะพฤติกรรมของมังกรเอง: มันมีความอดทนอย่างน่าทึ่งต่อยานวิจัยของเราที่รุกล้ำเข้าไปในอาณาเขตของมัน จากการเคลื่อนไหวที่เป็นจังหวะของลำคอ มันได้ส่งเสียงสั่นสะเทือนแบบเดิมซ้ำ ๆ—ซึ่งน่าจะเป็นเสียงคำรามหรือเสียงร้องไห้หากไม่ใช่เพราะความว่างเปล่าของอวกาศ—เกือบจะเหมือนกับว่ามันรับรู้สิ่งที่เรากำลังทำอยู่และปรารถนาที่จะช่วยเหลือ"
 aquatics.260.A:0 "ช่างลึกลับเหลือเกิน"
 aquatics.265.name:0 "ความจริงของเสียงคำราม"
 aquatics.265.desc.normal:0 "[This.Owner.GetLinguists] ของเรารายงานเกี่ยวกับการค้นพบครั้งสำคัญที่น่าทึ่ง หลังจากหมดหวังที่จะเข้าใจมังกร พวกเขาได้แปลงแผนภูมิคลื่นพลังงานร่างกายที่ผันผวนของมันให้เป็นคลื่นเสียง เมื่อพวกเขาฟังผลลัพธ์ พวกเขาแทบไม่เชื่อหู ([This.Owner.GetSpeciesEarNamePlural]) ของตัวเอง มันไม่อาจปฏิเสธได้: มังกรกำลังพูดภาษาของเรา แต่ผ่านสื่อกลางที่ต่างออกไป! แท้จริงแล้ว เสียงคำรามของมันมีไว้เพื่อดึงดูดความสนใจของเราเท่านั้น ไม่ใช่ความพยายามในการสื่อสารโดยตรง\n\n$aquatics.265.desc.end$"
 aquatics.265.desc.gestalt:0 "[This.Owner.GetLinguists] ของเรารายงานเกี่ยวกับการค้นพบครั้งสำคัญที่น่าทึ่ง หลังจากหมดหวังที่จะเข้าใจมังกร พวกเขาได้แปลงแผนภูมิคลื่นพลังงานร่างกายที่ผันผวนของมันให้เป็นกราฟส่วนเบี่ยงเบนคลื่นมาตรฐาน สิ่งนี้เผยให้เห็นว่าแท้จริงแล้วมันกำลัง "พูด" เป็นรหัสไบนารีอย่างง่าย ซึ่งไม่ต่างจากรหัสที่เราใช้งานในบางครั้ง เพียงแต่อยู่คนละความยาวคลื่น แท้จริงแล้ว เสียงคำรามของมันมีไว้เพื่อดึงดูดความสนใจของเราเท่านั้น ไม่ใช่ความพยายามในการสื่อสารโดยตรง\n\n$aquatics.265.desc.end$"
 aquatics.265.desc.end:0 "[This.Owner.GetLinguists] ของเราเปิดเทปบันทึกเสียงเก่า ๆ อีกครั้งโดยคำนึงถึงความรู้นี้ ตามความเห็นของพวกเขา คำพูดในอดีตของมังกรนั้นเป็นการบ่นกระปอดกระแปดแบบ \"ไร้สาระอย่างน่าผิดหวัง\" เกี่ยวกับอาหารและความคืบหน้าที่เชื่องช้าของ \"พวกคลานบนดาว\"(คลานเครื่องบิน)อย่างไรก็ตาม ตอนนี้สิ่งมีชีวิตแสดงความประหลาดใจและยินดีที่เราสามารถเข้าใจมันได้ อันที่จริง มันแสดงความกระตือรือร้นที่ไม่เห็นมาหลายปี ดูเหมือนว่ามันมีเรื่องสำคัญอย่างยิ่งยวดที่ปรารถนาจะพูดคุยกับเรา แต่ต้องรอจนกว่าพวกเราจะ §S\"พร้อม\"§! เท่านั้น"
 aquatics.265.A:0 "แต่พวกเราพร้อมแล้ว!"
 aquatics.270.name:0 "การตำหนิอย่างรุนแรง"
 aquatics.270.desc:0 "มังกรเริ่มบ่นพร่ำยาวเหยียดเกี่ยวกับภูมิปัญญาที่มันสั่งสมมานานหลายกัปหลายกัลป์ และการสังเกตของมันเกี่ยวกับทัศนคติของเราต่อเวลาและความมุ่งมั่น—ไม่ต้องพูดถึงความรู้เรื่องพื้นฐานของจักรวาลที่เรายังมีอยู่อย่างน่าสมเพช ดูเหมือนว่ามันจะมองว่าพวกเรายังเยาว์วัยและมุทะลุเกินไป และยังไม่คู่ควรกับภารกิจนี้ในปัจจุบัน"
 aquatics.270.A:0 "เฮ้อ พวกเราจะพยายามทำให้ดียิ่งขึ้น"
 aquatics.270.A.tooltip:0 "มังกรจะติดต่อเรามาเมื่อมันพร้อม"
 aquatics.280.name:0 "มังกรหงุดหงิด"
 aquatics.280.desc:0 "เราไม่แน่ใจว่ามีอะไรผิดพลาด แต่ [This.Owner.GetResearchers] ของเราดูเหมือนจะทำให้มังกรไม่พอใจ ด้วยเสียงคำรามอันทรงพลัง สิ่งมีชีวิตดังกล่าวได้พ่นลมหายใจมรณะถล่มยานของพวกเขา สังหาร [This.Owner.GetEnvoy] [This.Leader.GetName]—และทำให้ความพยายามในการทำความเข้าใจมันของเราต้องล่าถอยกลับไปอย่างมาก"
 draconic_communications_continues:0 "ความพยายามของเราจะดำเนินต่อไป"

 fcsum_origin_dragon_1:0 "เราได้เริ่มพยายามสื่อสารกับมังกรแล้ว แต่ความคืบหน้ายังมีเพียงเล็กน้อยจนถึงตอนนี้"
 fcsum_origin_dragon_2:0 "แม้จะได้รับความร่วมมือจากมังกร ทว่าเสียงร้องของมันยังคงสร้างความสับสนให้แก่เรา"
 fcsum_origin_dragon_3:0 "เราไขความลับเบื้องหลังการสื่อสารกับมังกรได้สำเร็จแล้ว ดูเหมือนว่ามันมีบางอย่างจะกล่าวกับเรา"

 aquatics.305.name:0 "$aquatics.180.name$"
 aquatics.305.desc:0 "[This.GetName] รายงานการพบเห็นมังกรอวกาศที่น่าสะพรึงกลัวในระบบดาว [From.GetName]!\n\nระบบดาวยังดูเหมือนจะเป็นศูนย์กลางของ [From.Owner.GetName] โดยหนึ่งในดาวเคราะห์ในระบบแสดงสัญญาณของประชากรที่หนาแน่นเป็นพิเศษ\n\nจนถึงตอนนี้ มังกรยังไม่ได้มีปฏิกิริยาใด ๆ ต่อเรา และไม่มีสัญญาณความขัดแย้งระหว่างมันกับผู้อยู่อาศัยอื่นในระบบดาว บางทีอาจเป็นทางเลือกที่ดีที่สุดที่จะปล่อยมันไว้ตามลำพัง" #this event happens during first contact, so [From.Owner.GetName] is 'alpha menace'
 aquatics.305.desc.pre-ftl:0 "[This.GetName] รายงานการพบเห็นมังกรอวกาศที่น่าสะพรึงกลัวในระบบดาว [From.GetName]! ระบบดาวยังดูเหมือนจะเป็นบ้านของอารยธรรมยุคก่อน FTL ([Owner.GetPreFTLLower]) โดยดาวเคราะห์ดวงหนึ่งแสดงร่องรอยการอยู่อาศัย\n\nจนถึงตอนนี้มังกรยังไม่ได้มีปฏิกิริยาใด ๆ ต่อการปรากฏตัวของเรา—และไม่มีสัญญาณความขัดแย้งระหว่างมันกับผู้อยู่อาศัยอื่นในระบบดาว บางทีอาจเป็นทางเลือกที่ดีที่สุดที่จะปล่อยมันไว้ตามลำพัง" # e.g. 'home to an unsophisticated civilization' or 'home to a pre-FTL civilization'

