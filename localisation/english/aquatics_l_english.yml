 ICE_MINING_INTERRUPTED_TITLE:0 "การขุดเจาะน้ำแข็งหยุดชะงัก"
 ICE_MINING_INTERRUPTED_DESC:0 "เนื่องจากไม่มีแหล่งน้ำแข็งพร้อมใช้งานในขณะนี้ ความพยายามในการขยายพื้นที่ทะเลบนดาว §Y[This.GetName]§! จึงได้ถูกยกเลิกไป"
