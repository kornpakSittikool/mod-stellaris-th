 ap_hydrocentric:0 "น้ำคือศูนย์กลาง"
 ap_hydrocentric_desc:0 "ไม่มีดาวเคราะห์ใดที่จะเหมาะสมสำหรับการตั้งอาณานิคม จนกว่าจะถูกน้ำท่วมทั่วทั้งดาวเสียก่อน"
 ap_hydrocentric_tooltip:3 "อนุญาตให้ก่อสร้าง §Yสถานีขุดเจาะน้ำแข็ง (Ice Mining Stations)§! ที่ฐานทัพดาว ซึ่งจะปลดล็อกคำสั่ง §Y$decision_expand_planetary_sea$§! บนโลก §YOcean§! และคำสั่ง §Y$decision_flood_habitat$§! บน §YHabitats (ที่อยู่อาศัย)§!\nสายพันธุ์ที่มีคุณลักษณะ §Y$trait_aquatic$§! หรือ §Y$trait_robot_aquatic$§! จะได้รับประโยชน์เพิ่มขึ้น 50% จากการอาศัยอยู่บนโลก §YOcean§! แต่บทลงโทษจากการอยู่อาศัยบนโลกที่ไม่ใช่ประเภท §YWet§! จะถูกขยายผลเพิ่มขึ้นเช่นเดียวกัน"
 ap_hydrocentric_deluge_tooltip:0 "ปลดล็อกอาวุธโคโลสซัส §YDeluge (มหาอุทกภัย)§!"
 ap_hydrocentric_deluge_pre_unlock_tooltip:0 "ปลดล็อกอาวุธโคโลสซัส §YDeluge (มหาอุทกภัย)§! §R(ต้องการความสามารถเสริมแอดเซนชัน §Y$ap_colossus$§!)§!"

