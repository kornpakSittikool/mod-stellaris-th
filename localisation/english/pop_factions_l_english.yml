 ### Nationalists
 faction.301.title:2 "นักชาตินิยมซาบอต!"
 faction.301.desc:2 "สมาชิกของกลุ่ม[Root.GetName]ได้ทําลายอาคารที่มี[planet.GetPlanetMoon]ของ[planet.GetName]."
 faction.301.desc.phobe:0 "ตัวเลขของ[Root.GetName]ทําให้ตึกพัง[planet.GetName]ในการคํานวณพยายามที่จะเจ็บ[Root.Owner.GetAdj]ผล ประโยชน์ ซึ่ง เห็น ได้ ชัด ว่า เป็น เป้า หมาย ใน การ ทําลาย วิถี ชีวิต ของ เรา."
 faction.301.desc.phile:0 "สมาชิกที่รักอื่นๆ[Root.GetName]เห็นสมควรที่จะแสดงความไม่พอใจของพวกเขากับกฎของเราโดยไม่พอใจ -บางคนจะบอกว่าเชื่อมโยง -การติดตั้งบน[planet.GetName]."

 faction.302.title:1 "การก่อกบฏแห่งชาติ!"
