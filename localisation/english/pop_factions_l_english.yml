 ####################################
 #	Pop factions
 ####################################
 # Demand TITLES are run straight from a pop faction with no
 # assembled event scope, [Owner.GetName] to get country name.
 # Tooltips, DESCS and events use the usual [Root.Owner.GetName]


 ### NEW FACTIONS

 # Descriptors
 pft_supremacist:2 "ฝ่ายความยิ่งใหญ่"
 pft_supremacist_desc:5 "ความปรารถนาของนักไสยศาสตร์จักรวรรดิการก่อตั้งสปีชีส์เพื่อครองราชย์ พวก เขา ผลัก ดัน ให้ มี นโยบาย ที่ ให้ ประโยชน์ แก่ สิ่ง มี ชีวิต ของ ตน เอง และ ทํา ให้ ผู้ อื่น เสีย เปรียบ.\n\n§Lเซโนโฟเบ และ มิลลิตาริส เอธอส§!"
 pft_traditionalist:0 "ฝ่ายอนุรักษนิยม"
 pft_traditionalist_desc:2 "ข้อ เท็จ จริง ตาม ประเพณี นิยม อยาก ได้ ค่า นิยม ดั้งเดิม ที่ อาจ มี อยู่ หรือ ไม่ เคย มี มา ก่อนจักรวรรดิเอาไปยังดวงดาว พวกเขาเทศนาเพื่อศาสนาที่เคร่งศาสนา และเหยียดหยามการเปลี่ยนแปลงทางสังคม ที่เกิดขึ้นโดยเทคโนโลยีที่รุนแรง\n\n§Lเอธอสผู้นับถือจิตวิญญาณ§!"
 pft_progressive:0 "ฝ่ายก้าวหน้า"
 pft_progressive_desc:2 "การรณรงค์หาความเสมอภาค ในโครงสร้างสังคมที่มีอยู่ พวกเขาต่อต้านรูปแบบที่ไม่เป็นตัวตนของรัฐบาล และคุณค่าเท่ากับการร่วมมือกับจักรวรรดิอื่น\n\n§Lเอ โทส§!"
 pft_imperialist:0 "ฝ่ายจักรวรรดินิยม"
 pft_imperialist_desc:2 "ข้อเท็จจริงของจักรวรรดินิยม กระหายอํานาจในเขตแดนของเราเอง และเหนือจักรวรรดิอื่น ๆ พวก เขา เจริญ รุ่งเรือง ใน เรื่อง ความ เจริญ รุ่งเรือง และ เอา ชนะ จักรวรรดิ อื่น ๆ และ ความ ไม่ ชอบ ที่ อาศัย คน อื่น.\n\n§Lผู้แทนราษฎร & มิลลิตาริสต์ เอธอส§!"
 pft_isolationist:0 "ฝ่ายลัทธิโดดเดียว"
 pft_isolationist_desc:3 "เมื่อกาแล็กซี่ที่กว้างกว่า ถูกเก็บออกจากกิจการภายในของเรา พวก เขา รณรงค์ เพื่อ พูด คุย กับ จักรวรรดิ อื่น ๆ อย่าง น้อย ที่ สุด ก็ ทํา ให้ เกิด สงคราม แห่ง การ รุกราน แต่ ก็ ไม่ ได้ ทํา ให้ เรา สูญ เสีย เป้า หมาย ที่ ง่าย ๆ.\n\n§Lเซโนโฟบ &พาซิฟิสต์เอธอส§!"
 pft_technologist:0 "ฝ่ายเทคโนโลยี"
 pft_technologist_desc:1 "ข้อเท็จจริงทางเทคโนโลยีต้องการจักรวรรดิและผลของความก้าวหน้าทางเทคโนโลยี พวกเขาไม่ชอบการห้ามใช้อาวุธทางการเมือง ในบางแนวทางของการวิจัย รวมถึงการพ่ายแพ้ต่อจักรวรรดิอื่น\n\n§Lเอธอส นักวัตถุนิยม§!"
 pft_totalitarian:0 "ฝ่ายเผด็จการ"
 pft_totalitarian_desc:2 "ความ ฝัน เกี่ยว กับ สังคม ที่ ได้ รับ การ กําหนด ไว้ ล่วง หน้า อย่าง เคร่งครัด ซึ่ง นํา โดย บุคคล ผู้ มี อํานาจ คน เดียว หรือ คน ที่ อยู่ รอบ ข้าง.\n\n§Lอรรถประโยชน์เอธอส§!"
 pft_xenoist:0 "ฝ่ายต่างดาว"
 pft_xenoist_desc:2 "ความเป็นจริงของเซโนนิส แชมป์ชีวิตของมนุษย์ต่างดาวและวัฒนธรรม พวก เขา เพลิดเพลิน กับ ประชากร และ การ ติด ต่อ สัมพันธ์ กับ สิ่ง มี ชีวิต ชนิด อื่น ๆ. พวกเขาต่อต้านการเป็นทาสของสิ่งมีชีวิต และการกวาดล้าง\n\n§Lเซ โน ฟี เลีย และ เอ กา ลี ตา รี เอ โตส§!"
 pft_prosperity:0 "ฝ่ายรุ่งเรือง"
 pft_prosperity_desc:3 "ข้อ เท็จ จริง ทาง สังคม ต้องการ การ เติบโต ทาง เศรษฐกิจ และ การ ได้ มา ซึ่ง ทรัพยากร. พวก เขา รณรงค์ เพื่อ การ ค้า อย่าง เสรี และ พวก เขา ไม่ ชอบ ความ ขัด แย้ง ทาง อาวุธ ชนิด ต่าง ๆ ที่ รบกวน พัฒนาการ ภาย ใน.\n\n§Lเซโนฟิเล & พาซิฟิลิส เอธอส§!"
 pft_democratic_election_1:0 "พรรคประชาธิปไตย"
 pft_democratic_election_1_desc:0 "ข้อเท็จจริงของพรรคประชาธิปไตยเกิดขึ้นระหว่างจักรวรรดิไม่ นาน หลัง จาก นั้น การ เลือก ที่ รัก มัก ที่ ชัง และ ลด น้อย ลง ทํา ให้ ผู้ นํา บาง คน ได้ รับ ความ นิยม ชม ชอบ ทาง การ เมือง."
 pft_democratic_election_2:0 "$pft_democratic_election_1$"
 pft_democratic_election_2_desc:0 "$pft_democratic_election_1_desc$"
 pft_democratic_election_3:0 "$pft_democratic_election_1$"
 pft_democratic_election_3_desc:0 "$pft_democratic_election_1_desc$"
 pft_democratic_election_4:0 "$pft_democratic_election_1$"
 pft_democratic_election_4_desc:0 "$pft_democratic_election_1_desc$"

