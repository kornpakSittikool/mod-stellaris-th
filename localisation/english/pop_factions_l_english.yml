 factions.3000.name:0 "กอง หน้า เมือง"
 factions.3000.desc:0 "ความ จริง ที่ ได้ รับ การ พิสูจน์ แล้ว และ ขบวนการ แรก เริ่ม ก็ เช่น กัน ได้ นํา ความ สนใจ อย่าง ผิด ปกติ ไป สู่ อาณานิคม ใหม่ ของ เรา ใน เรื่อง§Y[root.GetName]§!นับตั้งแต่ที่เราประกาศตั้งถิ่นฐาน ของความถ่อมตัวนี้[root.GetPlanetHabitat]แทบทุกเสียงทางการเมืองใน[root.owner.GetName]มันมีบางอย่างจะพูดเกี่ยวกับมัน\n\nนักวิเคราะห์ของเราไม่สงสัย ว่าอะไรที่รุนแรงอย่างแท้จริง คือรากของ[root.GetName]แต่พวกเขาแนะนําให้ระวัง มันชัดเจนแล้วว่า หน่วยงานทางการเมืองต่างๆ ของเรา ตั้งใจที่จะรณรงค์อย่างจริงจัง"
 factions.3000.a.demo:1 "การ โต้ เถียง กัน อย่าง รุนแรง เช่น นั้น ควร ได้ รับ คํา ชมเชย!"
 factions.3000.a.auth:0 "จับตาดูพวกนักเคลื่อนไหวอย่างใกล้ชิด"
 factions.3000.b:0 "มันเสี่ยงเกินไป รปภ.บอลสเตอร์"
 factions.3000.b.auth:0 "เรายอมให้เป็นแบบนี้ไม่ได้"
 planet_political_frontier:0 "แนวหน้าทางการเมือง"
 planet_political_frontier_desc:0 "อาณานิคม นี้ ถือ กัน ว่า เป็น พื้น ฐาน อัน อุดม สําหรับ การ รณรงค์ โดย ความ จริง ใน ระดับ การ เมือง."
 planet_political_safezone:0 "มั่นใจทางการเมือง"
 planet_political_safezone_desc:0 "กลุ่มการเมืองกำลังท้อแท้จากการรณรงค์ภายในอาณานิคมแห่งนี้"
 planet_political_crackdown:0 "การ เมือง พัง ทลาย"
 planet_political_crackdown_desc:0 "ข้อ เท็จ จริง ทาง การ เมือง ถูก ขัด ขวาง อย่าง แข็ง ขัน จาก การ รณรงค์ ภาย ใน อาณานิคม นี้."

 factions.3005.name:0 "รายงาน: การ เมือง เริ่ม ต้น[root.GetName]"
 factions.3005.desc.1:0 "ตามคําแนะนํา แหล่งข่าวของเรา[root.GetName]ได้ส่งความคืบหน้าเป็นประจํา ในสถานการณ์การเมืองที่กําลังพัฒนาของอาณานิคม สรุป: ทัศนะ ที่ มี แนว โน้ม ดู เหมือน ดี.\n\nผู้ บังคับ ใช้ ท้อง ถิ่น และ ตัว แทน ทาง การ เมือง ได้ จัด การ ให้ มี การ โต้ แย้ง กัน โดย ตรง อย่าง น้อย โดย ใช้ ทรัพยากร เพียง น้อย ที่ สุด. โดย เฉพาะ อย่าง ยิ่ง ข้อ เท็จ จริง ของ โร เบิร์ต ได้ พยายาม อย่าง หนัก ที่ จะ ได้ พื้น ฐาน ใด ๆ ที่ มี ความ หมาย ใน หมู่ ผู้ ตั้ง อาณานิคม ผล ก็ คือ สภาพ แวด ล้อม ทาง การ เมือง ซึ่ง คง อยู่ ใน การ ควบคุม ของ เรา."
 factions.3005.a:0 "ผู้รักชาติเหล่านี้จะได้รับการยกย่อง"
 factions.3005.desc.2:0 "ข้อมูลที่เรารวบรวมมา เกี่ยวกับสถานการณ์การเมือง[root.GetName]การ ให้ อภัย เป็น การ ให้ อภัย ความ กังวล ของ เรา. การรณรงค์ของมุม:ของธรรมชาติที่รุนแรง มีการจัดการในการตีสนับสนุนขึ้นในหมู่ประชากรอาณานิคม ประชาชนเหล่านี้ถูกชักจูงโดย คําเทศนาเกี่ยวกับความเสมอภาคทางสังคม และการเคลื่อนย้ายของสังคม และไม่ได้ยืนยันหลักการบางอย่าง ของสังคมของเราอีกต่อไป\n\nแต่ ถึง แม้ ดู เหมือน ว่า ยัง คง เป็น ข่าว ดี อยู่. เราได้รวบรวมงานวิจัยไว้มากมาย ซึ่งประเมินค่าไม่ได้ สําหรับการปรับปรุงทฤษฎีของเราเกี่ยวกับ[owner.GetAdj]การเมืองอาณานิคม ยิ่ง กว่า นั้น โดย การ พินิจ พิจารณา องค์ ประกอบ ต่าง ๆ ที่ เป็น จุด เด่น ดัง กล่าว เรา ได้ เปิดโปง คํา ขู่ เหล่า นี้ มา นาน แล้ว ก่อน ที่ พวก เขา จะ สามารถ ตั้ง หลัก ฐาน บน เมือง หลวง ได้."
 factions.3005.b:0 "หรือ... บางทีมันอาจจะมีข้อดีบ้าง"
 planet_political_admittance:0 "การ เมือง ที่ ไม่ เป็น ที่ ยอม รับ"
 planet_political_admittance_desc:0 "อาณานิคม แห่ง นี้ ทํา ให้ คํา บรรยาย ทาง การ เมือง ใน รูป แบบ ที่ ขัด แย้ง กัน มาก ขึ้น เพื่อ แลก กับ การ ตรวจ สอบ และ ความ เข้าใจ ทาง สังคม ที่ ดี ขึ้น."
 factions.3005.desc.3:0 "ข้อมูลที่เรารวบรวม เกี่ยวกับแคมเปญทางการเมือง[root.GetName]ได้นําไปสู่การคาดการณ์ที่น่าสนใจ เรามองเห็นแนวโน้มในการยอมรับแนวคิดใหม่ๆที่กว้างขึ้น อยู่นอกขอบเขตของสิ่งที่เราจะพิจารณา\n\nแม้ ว่า อาจ กล่าว ได้ ว่า การ เปลี่ยน แปลง ใด ๆ จาก ข่าวสาร หลัก ของ เรา ทํา ให้ ฐาน พลัง ของ เรา อ่อน ลง แต่ นี่ อาจ ยัง คง เป็น ข่าว ดี. การทดลองนี้มีมูลค่าเป็นจํานวนมหาศาล ของการวิจัย ที่ประเมินค่าไม่ได้ เมื่อเราปรับทฤษฎีของเรา ยิ่ง กว่า นั้น: เรา ได้ พิสูจน์ แล้ว ว่า แม้ แต่ เมื่อ มี การ ให้ พื้น ฐาน บาง อย่าง แก่ สมาชิก ในมุม:[owner.GetAdj]ผู้คนที่ปฏิเสธองค์ประกอบที่รุนแรงที่สุดของพวกเขา และค่อนข้างใกล้เคียงกับ หลักการของประเทศของเรา"
 factions.3005.c:0 "ถ้า อย่าง นั้น การ ประพฤติ เช่น นี้ อาจ ได้ รับ การ สนับสนุน."

 factions.3010.desc.1:0 "นักวิทยาศาสตร์ทางการเมืองของเรากําลังสังเกต[root.GetName]ด้วยความสนใจที่กระตือรือร้น อย่างไรก็ตาม แม้ว่าจะมีการรณรงค์อย่างมีไข้ และมีเรื่องวุ่นวายมากมายในสื่อมวลชน พวกเขาพยากรณ์ถึงผลลัพธ์ที่ค่อนข้างทั่วไป\n\nนักวิจัยของเราสังเกตว่า \"ไม่มีข่าว\" ปริมาณที่จะเป็นข่าวดีที่นี่ แม้สิ่งที่องค์ประกอบบางจุดในสังคมของเราอาจอ้าง[root.GetName]กําลัง ถูก นวด ปั้น ให้ เป็น ระบบ อัตโนมัติ. ประชาธิปไตยยังคงเป็นหลักการก่อตั้งที่นั่น สําหรับตอนนี้"
 factions.3010.a:0 "บางทีเราน่าจะทําให้อะไรๆดีขึ้น"
 factions.3010.desc.2:0 "ดู เหมือน ว่า กลุ่ม นัก การ เมือง ที่ มี อํานาจ มาก กว่า ใน สังคม ของ เรา บาง คน ได้ รับ ความ สําคัญ[root.GetName]การรณรงค์ของพวกเขาเป็นหนึ่ง ในหลายเป้าหมายของอาณานิคมที่ก่อการจลาจลนี้ ประชาธิปไตย อาจ ไม่ ใช่ สิ่ง สําคัญ หรือ ดึงดูด ใจ[root.owner.GetAdj]ของ[root.GetName]อย่างที่เราคิด"
 factions.3010.b:0 "เป็นการทดสอบที่คุ้มค่า สําหรับวิธีการการปกครองของเรา!"
 factions.3010.c:0 "เราต้องป้องกันภัยคุกคาม ต่อประชาธิปไตย"
 factions.3010.desc.3:0 "นักวิทยาศาสตร์ทางการเมืองของเราได้รับการติดตาม[root.GetName]มี อยู่ ช่วง หนึ่ง และ รายงาน ของ พวก เขา ยืน ยัน ความ คิด เห็น ทาง การ เมือง หลาก หลาย ได้ หยั่ง ราก ลึก ลง ไป ที่ นั่น.\n\nไม่มีสัญญาณอะไรเลย[root.GetName]จะนําไปสู่ความวุ่นวายหรือรูปแบบอื่น ๆ สุดขั้วคล้ายกัน อย่างไรก็ตาม การยึดเหนี่ยวทางการเมืองมากนี้ยังคงมีอยู่[root.owner.GetAdj]ประชาธิปไตย ที่ มี ข้อ ท้าทาย บาง อย่าง ที่ ไม่ เหมือน ใคร และ อาจ มี ความ เสี่ยง ถ้า มี การ จัด การ ให้ มี การ แตก แยก กัน อย่าง รุนแรง มาก ขึ้น."
 factions.3010.frontier.tt:0 "เดอะ§Y$planet_political_frontier$§!ขอบเขตจะยังคงอยู่สําหรับค่าประมาณ§Y9§!ปีที่เพิ่มขึ้น$MOD_POP_ETHICS_SHIFT_SPEED$โดย§G+50%§!."
 factions.3010.d:0 "ความเสี่ยงเหล่านี้เสียงดีเกินไป"

 ### Loyalists
 faction.4.title:0 "ผู้ ภักดี ต้องการ"
 faction.4.desc:0 "ผู้ภักดีอุทิศตนเพื่อ[Root.Owner.GetRulerTitle] [Root.Owner.GetRulerName]ของ[Root.Owner.GetName]ไม่มีข้อเรียกร้อง"

 ### Slaves
 faction.6.title:0 "สไตรค์ความหิว!"
 faction.6.desc:0 "ทาสของ[Root.Owner.GetName]ได้ จัด ระเบียบ เพื่อ ทําลาย วิธี การ ผลิต ของ เรา โดย การ เต็ม ใจ อด อาหาร. เดอะ[Root.GetName]สมาชิกระดับสูงมีประสิทธิภาพ§Yเดอะชราวด์§!ตัวเองจาก[Root.Owner.GetName].\n\nถ้าสถานการณ์นี้เกิดขึ้นโดยไม่มีการควบคุมนาน เราเสี่ยงที่จะสูญเสียส่วนสําคัญ ของการตกเป็นทาสของเรา เราสามารถปล่อยให้พวกชั่วตาย หรือหาทางอื่น ที่จะจัดการพวกแบ่งแยกนี้"

 faction.7.title:0 "ทาส ลุก ขึ้น!"
 faction.7.desc:0 "ทาสของ[slave_planet.GetName]ได้ลุกขึ้นต่อต้านเจ้านายของพวกเขา ก่อเป็นพันธมิตรกบฏที่ผิดกฎหมายมุ่งมั่นที่จะทําลาย[Root.Owner.GetName]ถือได้ตามกฎหมาย!"

 faction.8.title:0 "บังคับให้ป้อนข้อมูล"
 faction.8.desc:0 "ร่าง ของ ทาส ไม่ ใช่ ของ พวก เขา ที่ ก่อ ความ เสีย หาย หรือ ถูก กัก ขัง.\n\nการ กําจัด อย่าง ไม่ ยั้ง ของ พวก เขา สิ้น สุด ลง และ ทุก คน ที่ ยัง คง มี ชีวิต อยู่ ได้ รับ สาร อาหาร ที่ เหมาะ สม."

 faction.10.title:0 "ทาส ไม่ มี!"
 faction.10.desc:0 "ความ ไม่ สงบ แพร่ หลาย ท่ามกลาง พวก บ่าว[unrest_planet.GetName]ผล กระทบ ใน ทาง ลบ"
 faction.10.desc.colle:0 "ความน่าสะพรึงกลัวที่กระจายอยู่ภายในด้านที่เป็นทาสของ[Root.Owner.GetName]ตรงกลาง[unrest_planet.GetPlanetMoon]ของ[unrest_planet.GetName]."
 faction.10.a.tooltip:0 "§Hป๊อปทาส§!บน§H[unrest_planet.GetName]§!ได้§Rไม่รวมทาส§!กําหนดค่าสําหรับ§Y4 ปี§!."

 faction.15.title:0 "ทาสความรุนแรง!"
 faction.15.desc:0 "ฝูง ชน ที่ เบียด เสียด กัน ซึ่ง ประกอบ ด้วย ทาส ที่ ถูก กดขี่ ได้ เผชิญ หน้า กัน อย่าง รุนแรง กับ สมาชิก คน อื่น ๆ ของ พลเมือง[roving_gangs_planet.GetName]ส่งผลให้เสียชีวิตก่อนวัยอันควร 100ประชากร.\n\nยัง คง ต้อง คอย ดู ว่า ผู้ ร่วม งาน กับ ผู้ ตาย จะ มี ปฏิกิริยา อย่าง ไร ต่อ เหตุ การณ์ นี้."
 faction.15.a.tooltip:0 "[roving_gangs_planet]:\n§R100§! £pop£ §Hป๊อป§!ตาย"

 faction.50.title:0 "อินเตอร์สตาร์โร้ด!"
 faction.50.desc:0 "ดู เหมือน ว่า ส่วน ที่ รุนแรง กว่า ใน ประชากร ทาส ของ เรา ได้ รวม ตัว กัน เพื่อ ขจัด ทาส ออก ไป[Root.Owner.GetAdj]ดินแดน\n\nเราไม่ทราบว่าอาชญากรรมในมาตรานี้ได้รับการดําเนินการ แต่เราค่อนข้างแน่ใจว่าตอนนี้ทาสฟรีอยู่ที่ไหนสักแห่งนอก[Root.Owner.GetAdj]พื้นที่"
 faction.50.desc.colle:0 "หัวหน้าเผ่าเข้าใจผิดเห็นว่าเหมาะสมที่จะได้รับบาดเจ็บ[Root.Owner.GetName]ด้วยการเอาทาสหลายคนออกจากหน้าที่ แล้วขับไล่พวกเขาออกไป[Root.Owner.GetAdj]ชายแดน\n\nเราจะเยียวยาในเวลา และเราหวังว่าในที่สุดการสูญเสีย[Root.Owner.GetName]และเป้าหมายในชีวิตพวกเขา"
 faction.50.a:0 "น่าเบื่อ"
 faction.50.1.tooltip:0 "[Root.Owner.GetName]:\nประชากรที่ถูกทำให้เป็นทาส: §R-1§!"
