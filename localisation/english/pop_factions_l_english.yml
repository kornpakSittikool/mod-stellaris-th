 factions.2000.desc.start:0 "ภายหลังจากช่วงเวลาอันยาวนานของการสนับสนุนที่เพิ่มขึ้นของ §Y[TargetFaction.GetName]§! ในที่สุด §Y[TargetFaction.Owner.GetName]§! ก็ยอมรับกลุ่มนี้โดยนำเอาค่านิยมและนโยบายหลักของตนมาใช้"
