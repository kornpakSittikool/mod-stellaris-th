 factions.1.desc.unplugged_prosperity: "สมาชิก ของ พวก เขา วิ่ง แข่ง เพื่อ การ เจริญ เติบโต และ ความ มั่นคง โดย วิธี การ ที่ สงบ สุข ไม่ มี การ ต่อ รอง ทาง การ ทหาร.\n\n"
 factions.1.desc.unplugged_supremacist: "สมาชิกของพวกเขาพยายามที่จะยืนยันความสูงส่งของ[Root.Owner.GetSpeciesAdj]สายพันธุ์ที่ต่อเติมด้วยเครื่องจักรที่น่ากลัว ของการสร้างของเราเอง\n\n"
