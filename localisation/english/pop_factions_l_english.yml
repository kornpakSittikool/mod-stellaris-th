 SUPREMACIST_COUNCIL_FULL_XENOS: "สภาเต็มรูปแบบของเซโน"
 SUPREMACIST_COUNCIL_FULL_XENOS_DESC: "เดอะ[Root.GetName]เขาโกรธที่จํานวนคนที่ไม่...[Root.Owner.GetSpeciesNamePlural]ในสภา"
 SUPREMACIST_UNRESTRICTED_STUDY:0 "การศึกษาต่างดาวแบบล้วงล้ำ"
 SUPREMACIST_UNRESTRICTED_STUDY_DESC:1 "การใช้ประโยชน์จากอารยธรรมต่างดาวดึกดำบรรพ์ ให้เกิดผลสูงสุดโดยการออกกฎหมายหรือนโยบายสำหรับการแทรกแซงแบบปกติหรือแบบรุกราน จะทำให้ [Root.GetName] พอใจ"
 SUPREMACIST_NO_UNRESTRICTED_STUDY:0 "$SUPREMACIST_UNRESTRICTED_STUDY$"
 SUPREMACIST_SLAVERY_ALLOWED:0 "ศักยภาพของทาส"
 SUPREMACIST_SLAVERY_ALLOWED_DESC:0 "[Root.GetName] ไม่เชื่อว่าคนบางคนมีค่ามากกว่าคนอื่นๆ เพียงแต่ว่าบางคนอาจเหมาะสมกับงานบางอย่างมากกว่างานอื่น การออกกฎหมายให้มี §Yทาส§! ทำให้พวกเขาไม่พอใจ"
 SUPREMACIST_SLAVERY_OUTLAWED:0 "การมีทาสเป็นสิ่งผิดกฎหมาย"
 SUPREMACIST_HAS_ALIEN_SLAVES:0 "เข้าถึงทาสต่างดาว"
 SUPREMACIST_NO_ALIEN_SLAVES:0 "ขาดทาสต่างดาว"
 SUPREMACIST_NO_FREE_ALIENS:1 "ต่างดาวไม่ได้รับสิทธิ์"
 SUPREMACIST_HAS_FREE_ALIENS:0 "$SUPREMACIST_NO_FREE_ALIENS$"
 SUPREMACIST_ALIEN_SLAVES_DESC:1 "ตรวจสอบให้แน่ใจว่าไม่มีเผ่าพันธุ์ต่างดาวในจักรวรรดิของเราที่ได้รับสิทธิการเป็นพลเมืองเต็มรูปแบบ จะทำให้ [Root.GetName] พอใจ"
 SUPREMACIST_ALL_SLAVERY_ALLOWED:0 "[Root.Owner.GetSpeciesName] อนุญาตให้มีทาส"
 SUPREMACIST_ALL_SLAVERY_DESC:0 "[Root.GetName] รู้สึกโกรธเคืองกับความคิดที่ว่าใครก็ตามที่ทำให้ [Root.Owner.GetSpeciesName] เป็นทาส และต้องการให้ทาสถูกจำกัดไว้แค่ต่างดาวเท่านั้น"
 LEADER_IS_OWNER_SPECIES:0 "[Root.Owner.GetRulerTitle] เป็น [Root.Owner.GetSpeciesName]"
 SUPREMACIST_NO_MIGRATION_TREATIES:0 "ไม่มีการอพยพเข้ามา"
 SUPREMACIST_MIGRATION_TREATIES:0 "$SUPREMACIST_NO_MIGRATION_TREATIES$"
 SUPREMACIST_NO_MIGRATION_TREATIES_DESC:0 "การลงนามใน §Yสนธิสัญญาการย้ายถิ่นฐาน§! จะทำให้ [Root.GetName] ไม่พอใจ"
 SUPREMACIST_CORE_WORLD_EXCLUSIVITY:0 "ความ พิเศษ ของ โลก"
 SUPREMACIST_CORE_WORLD_EXCLUSIVITY_DESC:0 "การส่งเสริมโลกของจักรวรรดิเรา เพื่อใช้เฉพาะ[Root.Owner.GetSpeciesNamePlural]บ่าวคนหนึ่ง ได้ให้ความหวังแก่เขาแล้ว[Root.GetName]."
 SUPREMACIST_CORE_WORLD_NONEXCLUSIVITY:0 "$SUPREMACIST_CORE_WORLD_EXCLUSIVITY$"
 SUPREMACIST_DOMINATION:0 "ยืนยันความมีอำนาจเหนือกว่า"
 SUPREMACIST_DOMINATION_DESC:0 "การประกาศสงครามกับจักรวรรดิต่างดาวอย่างน้อยหนึ่งแห่งจะทำให้ [Root.GetName] พอใจชั่วขณะหนึ่ง"
 SUPREMACIST_NO_DOMINATION:0 "$SUPREMACIST_DOMINATION$"
 SUPREMACIST_GENE_MOD:0 "พันธุกรรมบริสุทธิ์"
