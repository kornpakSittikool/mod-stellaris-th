 faction.50.5.tooltip:0 "[Root.Owner.GetName]:\nประชากรที่ถูกทำให้เป็นทาส: §R-5§!"

 faction.55.title:0 "ทาส ที่ ใจ แข็ง ขัน!"
 faction.55.desc.colle:0 "บางองค์ประกอบใน[Root.GetName]หัวหน้าเผ่าถูกปลุกเร้าโดยความปรารถนาที่จะทําร้าย[Root.Owner.GetName]โดยการทําลายสิ่งอํานวยความสะดวกที่มีประสิทธิภาพ[riots_planet.GetName]เราสรุปได้เพียงว่า สิ่งที่เสียคือ การป้องกันพวกเขา[Root.Owner.GetAdj]การสั่งซื้อยังผลักดันพวกเขา ไปในรูปแบบรอบ ๆ ของตัวเอง"
 faction.55.desc:0 "ทาสที่บุกรุกทําลายอาคาร[riots_planet.GetName]- มันต้องซ่อมก่อนการผลิตจะดําเนินการต่อ"

 faction.60.title:0 "ทาส ที่ ยอม รับ ความ จริง!"
 faction.60.desc:0 "ส่วน ที่ รุนแรง ยิ่ง กว่า นั้น ใน หมู่ ชน ทาส ของ เรา ไม่ ได้ เกิด ขึ้น โดย ไม่ คาด คิด บาง คน จะ พูด ว่า เป็น อาวุธ ต่อ ต้าน กฎ อัน ชอบ ด้วย กฎหมาย ของ เรา.\n\nรายงานระบุว่าความไม่สงบเริ่มขึ้น[revolt_planet.GetName]และอาจจะแพร่กระจายไปแล้ว"
 faction.60.desc.colle:0 "ถูก ขัด ขวาง จาก คน เหล่า นั้น ที่ ได้ รับ มอบ หมาย ให้ ทํา งาน ต่ําต้อย เพื่อ สง่า ราศี และ การ ปรับ ปรุง ให้ ดี ขึ้น[Root.Owner.GetName](แห่ง) อิร็อม พวกมีเสาหินสูงตะหง่าน\n\nความ ไม่ สามารถ ของ พวก เขา ที่ จะ เข้าใจ ภาพ ที่ ใหญ่ กว่า และ สถาน ที่ ของ พวก เขา ภาย ใน นั้น ได้ ผลัก ดัน พวก เขา ให้ เปิด การ ขืน อํานาจ ต่อ ไป[revolt_planet.GetPlanetMoon] [revolt_planet.GetName]- และโลกอื่น ๆ อาจจะตามมาเร็ว ๆ นี้ ถ้าพวกเขายังไม่ได้"
 faction.60.a:0 "หายนะ"
 faction.60.b:0 "เจ้าพวกโง่..."
 faction.60.a.tooltip:0 "เดอะ§Hทาส ที่ น่า รัก§!หัวหน้า§Yกบฏ§!!"

 faction.80.title:0 "ทาส ตก เป็น เหยื่อ!"
 faction.80.desc:0 "สมาชิก ของ ท้อง ถิ่น[Root.GetName]ดู เหมือน ว่า บท ต่าง ๆ ได้ ก่อ ให้ เกิด ความ สําเร็จ มาก มาย[Root.Owner.GetAdj]ทาส จง เสริม กําลัง ทาส ที่ ไร้ ความ สามารถ."

