 faction.501.a.tooltip:0 "§Y[parameter:enemy.GetName]§!เพิ่ม§Yพฤติกรรม§!ความคิดเห็นที่เอนเอียงไปยัง§Yจักรวรรดิของเรา§!."
 faction.502.title:0 "พยายาม หา คํา ตอบ"
 faction.502.desc:1 "เป็นผลจากอีกเรื่อง น่าอายมากที่พลาดในความปลอดภัย[Root.GetName]เข้าถึงช่องทางสื่อสารทางการทูต พวกเขาใช้โอกาสนี้เพื่อดูถูก[parameter:enemy.GetName]และทรงเรียกร้องทรัพย์สินอย่างครบครัน[parameter:planet.GetName].\n\nอย่างไรก็ตาม[parameter:enemy.GetSpeciesNamePlural]ถูกเข้าใจไม่ได้เอาออกจากการรักษาความปลอดภัยโดยเหตุการณ์ที่เกิดขึ้นซ้ํานี้และดูเหมือนจะมีเลือกมันออก"
 faction.502.a:0 "ชิ้ว..."
 faction.503.title:0 "ฮอร์คิช เรเบล!"
 faction.503.desc:0 "เราได้รับรายงานว่า องค์ประกอบของ[Root.GetName]ได้จัดตั้งกองกําลังกบฏระดับสูงขึ้นมา[planet.GetName].\n\nการ ขืน อํานาจ ของ พวก เขา ยัง คง อยู่ ใน ช่วง ที่ ยัง เป็น ทารก และ น่า จะ ทํา ให้ เกิด เรื่อง นี้ ขึ้น ใน ตา."
 faction.503.a:0 "ดีมาก"
 faction.503.a.tooltip:0 "[planet.GetName]:\n§Rกบฏ!§!"

 ### Emancipation Faction
 faction.600.title:0 "ทาส ที่ มี รูป ร่าง หน้า ตา"
 faction.600.desc:0 "สมาชิก[Root.GetName]ว่า กัน ว่า การ หว่าน ความ ขัด แย้ง ท่ามกลาง พลเมือง ที่ เป็น ทาส. ตามข่าวลือบางประการ พวกเขากําลังฝึกและแม้กระทั่งอาวุธของ[parameter:slave_faction.GetName]ถึงแม้ว่ามันจะดูรุนแรงเกินกว่าจะเป็นจริง"
 faction.600.a:0 "ก็กังวลอยู่"
 faction.600.a.tooltip:0 "[parameter:slave_faction.GetName]:\n§R+50%§!ความสําคัญ\n§R+30%§!สนับสนุน"
 faction.601.title:0 "ถนน ระหว่าง ดวง ดาว"
 faction.601.desc:0 "ข่าวได้ยกฐานะว่า สมาชิกที่แข็งกร้าวของ[Root.GetName]ได้ปล่อยทาสกลุ่มหนึ่ง[railroad_planet.GetName]และจิตวิญญาณพวกเขาออกมาจาก[Root.Owner.GetName]ถึงแล้ว"
 faction.601.a:0 "เราต้องจับตาดูพวกเขาอย่างใกล้ชิด"
 faction.601.a.tooltip:0 "[railroad_planet.GetName]:\nประชากรที่ถูกทำให้เป็นทาส: §R-1§!"

 ### Xenoslaver Faction
 faction.700.title:0 "ทาส ถูก จับ ไป!"
 faction.700.desc:0 "โรค บ้า[Root.GetName]เคยถูกกล่าวหาว่าบังคับ[Root.Owner.GetName]ไม่...[Root.Owner.GetSpeciesAdj]จํานวนประชากรที่ตกเป็นทาส"
 faction.700.a:0 "นี่มันรุนแรงนะ"
 faction.700.a.tooltip:0 "ทาส:\n§Y+200§! £pop£ §Hป๊อป§!"

 faction.701.title:0 "เดอะ[parameter:rebelling_faction.GetName]เรเบล!"
 faction.701.desc:0 "คงเบื่อกับ[Root.Owner.GetName]จุดอ่อนของเอเลี่ยนที่อ่อนแอในหมู่พวกเรา เป็นเจ้าของทาสของ[parameter:planet.GetName]ได้มาร่วมกันเป็นการรวมกันของชุมชน เพื่อประกาศเอกราชของพวกเขา"
 faction.701.a:0 "แท้จริงแล้วมันรุนแรงยิ่งนัก"

 ### Purged Faction
 faction.801.title:0 "การ ต่อ สู้ เพื่อ ความ ตาย"
 faction.801.desc:0 "โดย ถูก กระตุ้น ด้วย ความ สิ้น หวัง บาง คน ใน ปัจจุบัน ต้อง รับ การ ชําระ ให้ สะอาด[riot_planet.GetName]ได้เห็นว่าเหมาะสมที่จะโจมตีและมีดโกนหนึ่งของสิ่งอํานวยความสะดวกบนดาวเคราะห์"

 faction.803.title:0 "เดอะ[Root.GetName]รีโวลต์!"
 faction.803.desc:0 "เชื้อเพลิงจากความสิ้นหวัง, ประชากร, ปัจจุบันขึ้นอยู่กับการล้างเมื่อ[death_planet.GetName]ได้ยกแขนขึ้นสู้กับ[Root.Owner.GetName]สร้างกองกําลังกบฏกระทิง"

