 faction.202.title:0 "[parameter:heathens.GetName]ที่ ปรึกษา"
 faction.202.desc:1 "เป็นผลมาจากความผิดพลาดในความปลอดภัย[Root.GetName]เข้าถึงช่องทางสื่อสารทางการทูต พวกเขาใช้โอกาสนี้ ประณามและดูถูก[parameter:heathens.GetName]สําหรับ พวก นอก รีต หลาย อย่าง ที่ กระทํา และ ข้อ ผิด พลาด ทาง ศีล ธรรม ซึ่ง มี อยู่ ใน ความ เชื่อ ของ พวก เขา.\n\nเหตุ การณ์ ที่ เกิด ขึ้น นั้น ไม่ ราบ รื่น กับ ศาสนา ที่ เคร่ง ศาสนา[parameter:heathens.GetSpeciesNamePlural]."
