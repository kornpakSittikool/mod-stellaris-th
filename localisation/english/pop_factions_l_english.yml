 faction.302.desc.phobe:0 "การก่อกบฏของ[Root.GetName]แก้ไขโครงการหลัก...[Root.Owner.GetAdj]การปกครองในกบฏ!"
 faction.302.desc.phile:0 "การตระหนักถึงความล้มเหลวอย่างต่อเนื่องของเราที่จะกระตุ้นความต้องการของพวกเขา,[Root.GetName]ได้ลุกฮือขึ้นในกบฏ"

