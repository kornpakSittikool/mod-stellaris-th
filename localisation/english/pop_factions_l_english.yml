 XENOIST_PASSIVE_STUDY:0 "ศึกษาต่างดาวทางอ้อม"
 XENOIST_PASSIVE_STUDY_DESC:1 "การตั้งนโยบายความฉลาดหรือการไม่ต่อเนื่อง[root.owner.GetPreFTLLower]อารยธรรมจะพอใจ[Root.GetName]."
