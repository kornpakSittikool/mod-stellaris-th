 SUPREMACIST_DOMINATION_TRADITION_DESC:0 "การยอมรับวัฒนธรรมใดๆ ที่เน้น §Yการมีอำนาจเหนือกว่า§! จะทำให้ [Root.GetName] พอใจ"
 SUPREMACIST_GIANT_MASSACRE:0 "การสังหารหมู่ยักษ์"
 SUPREMACIST_NO_GIANT_MASSACRE:0 "$SUPREMACIST_GIANT_MASSACRE$"
 SUPREMACIST_GIANT_MASSACRE_DESC:0 "การทำให้พวก §Yลิไวธาน§! ให้ออกจากความทุกข์ทรมาน จะทำให้ [Root.GetName] พอใจชั่วขณะหนึ่ง"
 SUPREMACIST_ISOLATIONIST_NO_FEDERATION:0 "เข้มแข็งแต่เพียงผู้เดียว"
 SUPREMACIST_ISOLATIONIST_NO_FEDERATION_DESC:1 "การอนุญาตให้ [Root.Owner.GetName] §Yเข้าร่วมสหพันธ์§! จะทำให้ [Root.GetName] ไม่พอใจ"
