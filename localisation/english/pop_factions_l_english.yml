 SUPREMACIST_PROCLAIM_SUPREMACY_DESC:0 "แสดงความดูถูกต่ออารยธรรมโบราณ โดยการทําลายสิ่งประดิษฐ์เล็กๆของพวกเขา[Root.GetName]ระยะหนึ่ง"
 SUPREMACIST_CELEBRATE_DIVERSITY:0 "เฉลิมฉลองความอ่อนแอ"
 SUPREMACIST_NO_CELEBRATE_DIVERSITY:0 "$SUPREMACIST_CELEBRATE_DIVERSITY$"
 SUPREMACIST_CELEBRATE_DIVERSITY_DESC:0 "การ แสดง ให้ เห็น ถึง ความ สําคัญ ของ อารยธรรม ที่ ด้อย กว่า จะ ไม่ เป็น ที่ พอ พระทัย[Root.GetName]ระยะหนึ่ง"
 SUPREMACIST_AGGRESSIVE_FIRST_CONTACT_POLICY:0 "ภาษาที่ใช้ในการติดต่อครั้งแรกแบบดุดันก้าวร้าว"
 SUPREMACIST_NO_AGGRESSIVE_FIRST_CONTACT_POLICY:0 "$SUPREMACIST_AGGRESSIVE_FIRST_CONTACT_POLICY$"
 SUPREMACIST_NO_AGGRESSIVE_FIRST_CONTACT_POLICY_DESC:0 "เดอะ[Root.GetName]เรียกร้องให้เรามีสิทธิ ใช้ทุกมาตรการที่จําเป็น กับภัยคุกคามที่เราไม่รู้จัก"
 SUPREMACIST_OPPRESSIVE_SUBJUGATION_POLICY:0 "มีนโยบายกดขี่ (เมื่ออีกฝ่ายแพ้สงคราม)"
 SUPREMACIST_NO_OPPRESSIVE_SUBJUGATION_POLICY:0 "$SUPREMACIST_OPPRESSIVE_SUBJUGATION_POLICY$"
 SUPREMACIST_NO_OPPRESSIVE_SUBJUGATION_POLICY_DESC:0 "เป้าหมายของเราอยู่ที่นี่ เพื่อรับใช้เรา และพวกเขาควรจะรู้อยู่เสมอ การ แสดง ความ เมตตา ต่อ พวก เขา จะ ทํา ให้ พวก เขา ไม่ พอ ใจ[Root.GetName]."
 SUPREMACIST_UNPLUGGED_CYBERIZE: "รับ เอา เอกลักษณ์ ของ เครื่องจักร"
 SUPREMACIST_UNPLUGGED_NOT_CYBERIZE: "การแสดงตัวของเครื่องจักรที่ถูกกดทับ"
 SUPREMACIST_UNPLUGGED_CYBERIZE_DESC: "การปรับปรุงและปรับปรุง ไซเบอร์เนติกส์ พรสวรรค์สําหรับเราโดยเครื่อง จะการเพิกถอนมรดกที่น่ากลัวของเราและดังนั้นจะพอใจ[root.GetName]."

