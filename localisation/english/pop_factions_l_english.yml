 factions.2000.desc.traditionalist:0 "ผลจากการที่นำกลุ่มนี้เข้ามาในรัฐบาล จึงทำให้แสดงออกถึงความเป็น §Hจิตวิญญาณนิยม§! ที่มากขึ้น\n\n"
