 factions.1.desc.unplugged_traditionalist: "สมาชิก ของ พวก เขา สนับสนุน นัก ศาสนา และ ค่า นิยม แบบ อนุรักษ์ นิยม ซึ่ง หลาย ทฤษฎี ตรง กับ ทฤษฎี เกี่ยว กับ อดีต ธรรมชาติ ของ เรา.\n\n"
 factions.1.desc.unplugged_xenoist: "สมาชิกของพวกเขาได้ผลักดันอย่างหนัก สําหรับความสัมพันธ์ที่เป็นมิตรกับสายพันธุ์ของมนุษย์ต่างดาว ที่ไม่ได้รับภาระโดยสเปกเตอร์ของเครื่องของเราที่ผ่านมา\n\n" # 'Machine' as an adjective in reference to the intelligence that once assimilated us

