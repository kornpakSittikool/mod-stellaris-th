 SUPREMACIST_NO_HARMONY_DESC:0 "ใช้วัฒนธรรมความปรองดอง การกล่าวถึงความเท่าเทียมกันของเผ่าพันธุ์ที่มีน้อยกว่า จะทำให้ [Root.GetName] ไม่พอใจ"
