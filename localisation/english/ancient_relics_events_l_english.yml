l_english:
  crisis.250.name:0 "รังใหม่" 
  crisis.250.desc:0 "ราชินีรังได้ก่อกำเนิดกองยาน Prethoryn ใหม่ ซึ่งตอนนี้โคจรอยู่เหนือ [Root.Capital.GetName] ด้วยราชินีอยู่ภายใต้การควบคุมของเรา สิ่งมีชีวิตเหล่านี้จงรักภักดีอย่างสิ้นเชิงและจะเชื่อฟังทุกคำสั่งของเรา" 
  crisis.252.name:0 "จับราชินีรังได้" 
  crisis.252.desc:0 "ในการสู้รบล่าสุดกับ Prethoryn ในระบบ [battle_system.GetName] กองกำลังของเราสามารถยึดสิ่งที่คล้ายไข่ที่ราชินีหนึ่งลำกำลังลำเลียงอยู่ ไข่นั้นฟักออกมาไม่นาน และได้ปรากฏเป็น §Hราชินีรัง§!\n\nด้วยการใช้ตัวส่งสัญญาณประสาท นักวิทยาศาสตร์ของเราสามารถทำให้สิ่งมีชีวิตนี้เชื่องได้ ตอนนี้มันจะเชื่อฟังคำสั่งของเรา ราวกับว่าคำสั่งนั้นออกมาจาก Hive Mind ของ Prethoryn เอง เราอาจใช้ราชินีตัวนี้สร้างฝูง Prethoryn เล็กๆ ของเราเองได้" 
  crisis.1250.name:0 "หมอผี" 
  crisis.1250.desc:0 "เมื่อพลังงานหมุนวนที่เหลือจากการทำลายประตูมิติสุดท้ายสลายหายไป กองกำลังของเราพบสิ่งมีชีวิตจากนอกมิติที่อ่อนแรงลอยอยู่ใกล้ๆ สิ่งนั้นถูกจับและสอบสวน\n\nมันคือหนึ่งใน \"§Hหมอผี§!\" ของพวกนั้น – สิ่งมีชีวิตทรงพลังแม้ตามมาตรฐานของพวกมันเอง ทำหน้าที่รักษาการเชื่อมต่อระหว่างมิติของประตูกับความเป็นจริงของเรา หากเราศึกษาหรือแม้แต่ควบคุมพลังจิตของมันได้ เราควรจะสามารถพัฒนาความเร็ว sublight และระยะการกระโดดของเราได้อย่างมาก" 
  crisis.2480.name:0 "กอบกู้แกนเมนเฟรม" 
  crisis.2480.desc:0 "กองกำลังของเราได้กู้ §Hแกนเมนเฟรม Contingency§! ที่ยังสมบูรณ์บางส่วนมาจากซากของโลกเครื่องจักรสุดท้ายของพวกมัน คอมพิวเตอร์ทรงพลังนี้ถูกใช้ในการวางแผนและควบคุมการสร้างสิ่งก่อสร้างของ Contingency และมันจะช่วยเพิ่ม [GetContingencyCoreEffect] ของเราอย่างมาก\n\nแน่นอนว่าเราจำเป็นต้องใส่ระบบป้องกันหลายชั้น เพื่อป้องกันไม่ให้โค้ดของ Contingency ที่เหลือหลุดรอดกลับมา ซึ่งอาจก่อให้เกิด... ผลลัพธ์ที่ไม่พึงประสงค์" 
  crisis.2481.desc:0 "กองกำลังของเราได้จับ §Hแกนเมนเฟรม Contingency§! ที่ยังสมบูรณ์บางส่วนได้ มันพยายามหลบหนีออกจากโลกเครื่องจักรสุดท้ายก่อนที่การป้องกันจะเสร็จสิ้น คอมพิวเตอร์ทรงพลังนี้ถูกใช้ในการวางแผนและควบคุมการสร้างสิ่งก่อสร้างของ Contingency และมันจะช่วยเพิ่ม [GetContingencyCoreEffect] ของเราอย่างมาก\n\nแน่นอนว่าเราจำเป็นต้องใส่ระบบป้องกันหลายชั้น เพื่อป้องกันไม่ให้โค้ดของ Contingency ที่เหลือหลุดรอดกลับมา ซึ่งอาจก่อให้เกิด... ผลลัพธ์ที่ไม่พึงประสงค์" 
  crisis.2840.robot_mega: "ความเร็วการสร้างหุ่นยนต์และเมกะสตรัคเจอร์" 
  crisis.2840.engineering_mega: "ความเร็วการวิจัยวิศวกรรมและการสร้างเมกะสตรัคเจอร์" 
  marauder.710.name:0 "บัลลังก์ของข่านผู้ยิ่งใหญ่ถูกกู้คืน" 
  marauder.710.desc:1 "หลังจากค้นหาซากเรือธงของข่านผู้ยิ่งใหญ่ กองกำลังของเราได้พบเก้าอี้เปื้อนเลือด [FROM.GetBloodType] ลอยอยู่ในอวกาศ เรามั่นใจว่ามันคือบัลลังก์ของข่านผู้ยิ่งใหญ่จริงๆ\n\nสิ่งประดิษฐ์นี้ถูกเก็บไว้ในห้องนิรภัยที่ปลอดภัย" 
  story.335.name:0 "เปิดใช้งาน Surveyor" 
  story.335.desc:0 "เราได้กวาดล้างอวกาศของเราด้วยลำแสงสแกนอันทรงพลังจากสิ่งประดิษฐ์ Surveyor และพบแหล่งทรัพยากรใหม่ที่ไม่เคยมีการบันทึกมาก่อนบน §H[chosen_planet.GetName]§!!" 
  precursor.105.name:0 "ความเป็นจริงถูกเจาะ" 
  precursor.105.desc:0 "ชั่วขณะหนึ่ง เนื้อผ้าของจักรวาลบิดเบี้ยวและขยายรอบๆ สิ่งประดิษฐ์โบราณของ Vultaum เมื่อความเป็นจริงที่เรารู้จักกลับคืนมาอีกครั้ง หน้าต่างสั้นๆ ก็ปรากฏขึ้น ที่ซึ่งกฎเกณฑ์บางอย่างสามารถถูกเขียนใหม่ได้อย่างแผ่วเบา"  
  precursor.105.a:0 "ปลดปล่อยจิตใจของเจ้า" 
  relic_reality_perforated:1 "เจาะความเป็นจริงเพื่อให้ได้เปรียบชั่วคราวอย่างทรงพลังในการต่อสู้" 
  relic_javorian_pox:1 "ปลดล็อกท่าทางโจมตีวงโคจรแบบ §Yพอกซ์§!\nเพิ่มโอกาสการค้นพบ £society£ §Yเทคโนโลยีชีวภาพ§!" 
  site_command_center:0 "ประตูนิรภัยบนดาวเคราะห์น้อย" 
  site_command_center_intro:0 "การชนกับดาวเคราะห์น้อยขนาดเล็กกว่าทำให้เผยให้เห็นประตูนิรภัยหรือช่องอากาศเล็กๆ ที่โผล่ออกมาจากพื้นผิวของ [From.Planet.GetName] มันดูเหมือนมีอายุหลายพันปี และก่อนหน้านี้ถูกปกปิดด้วยหินและฝุ่น\n\nด้วยเหตุผลที่ไม่ทราบ สัญญาณสแกนไม่สามารถเจาะเข้าไปในภายในของดาวเคราะห์น้อยนี้ได้ และประตูนิรภัยนั้นทนทานต่อเครื่องมือตัดทั่วไป หากอยากรู้ว่าข้างในมีอะไร ทีมงานคงต้องขุดเจาะเข้าไปจากอีกด้านหนึ่งของดาวเคราะห์น้อย" 
  ancrel.6005.name:0 "การเจาะรู" 
  ancrel.6005.desc:0 "มีโครงสร้างขนาดใหญ่มากบางอย่างอยู่ภายในดาวเคราะห์น้อย [From.Planet.GetName] ประตูนิรภัยที่เคยเป็นทางเข้าเพียงทางเดียวของโครงสร้างนี้ยังไม่สามารถเปิดได้ แต่ได้มีการขุดเจาะทางผ่านจากอีกด้านหนึ่งของดาวเคราะห์น้อยแทน\n\nสว่านยังไม่สามารถเจาะผ่านผนังชั้นนอกที่หนามากได้ แต่ดูเหมือนว่าวิธีนี้ยังคงเป็นทางที่ดีที่สุดที่จะเข้าถึง ด้านแม้ประตูจะมีอายุหลายพันปี แต่ก็ยังคงแข็งแกร่งเกือบไม่บุบสลาย" 
  ancrel.6010.name:0 "ทางเข้า" 
  ancrel.6010.desc:0 "ในที่สุดก็สามารถเจาะทะลุผนังชั้นนอกของโครงสร้างภายใน [From.Planet.GetName] ได้แล้ว ภายในคือศูนย์บัญชาการหรือบังเกอร์ขนาดใหญ่ เต็มไปด้วยซากศพที่เน่าเปื่อยของเอเลียนนับพัน\n\nการค้นหาภายในทั้งหมดเพื่อให้ได้ภาพที่ชัดเจนว่าที่นี่เคยเกิดอะไรขึ้นจะต้องใช้เวลามาก" 
  ancrel.6015.name:0 "ศูนย์บัญชาการ" 
  ancrel.6015.desc:0 "ดาวเคราะห์น้อยแห่งนี้เคยเป็นเมืองหลวงลับของจักรวรรดิ์ดวงดาวขนาดใหญ่ที่ครองพื้นที่ส่วนนี้ของกาแล็กซี่เมื่อหลายพันปีก่อน จากศูนย์บัญชาการที่ได้รับการเสริมความแข็งแกร่งนี้ ชนชั้นปกครองพร้อมด้วยเจ้าหน้าที่ทหารและพลเรือนนับพัน ได้ปกครองจักรวรรดิ ขณะที่ปลอดภัยจากการแก้แค้นรุนแรงที่นโยบายอันโหดร้ายของพวกเขามักก่อขึ้น\n\nการติดต่อกับส่วนอื่นของจักรวรรดิดำเนินการผ่านการส่งสัญญาณซับสเปซที่เข้ารหัส และมีเพียงเรือขนส่งลำหนึ่งที่มาเติมเสบียงและสับเปลี่ยนบุคลากรเป็นระยะ" 
  ancrel.6020.name:0 "วันสุดท้าย" 
  ancrel.6020.desc:0 "จากข้อมูลที่รวบรวมได้ ดูเหมือนว่าเรือขนส่งเสบียงชนเข้ากับดาวเคราะห์น้อยเนื่องจากเครื่องขับดันขัดข้อง การระเบิดที่ตามมาทำให้ประตูนิรภัยเสียหายและทำลายเครื่องส่งสัญญาณซับสเปซของดาวเคราะห์น้อย ส่งผลให้ขาดการติดต่อกับโลกภายนอกอย่างถาวร\n\nเมื่อถูกขังโดยไร้ความหวังในการช่วยเหลือ ผู้อยู่อาศัยในดาวเคราะห์น้อยค่อยๆ ตายไปด้วยความอดอยากหรือฆ่าตัวตาย บันทึกสุดท้ายจากเครื่องรับซับสเปซเพียงเครื่องเดียวของพวกเขายืนยันว่า จักรวรรดิของพวกเขา เมื่อไร้เมืองหลวง ก็ตกสู่สงครามกลางเมืองและความโกลาหล" 

  site_hunting_ground:0 "ซากดึกดำบรรพ์"
  site_hunting_ground_intro:0 "มีการค้นพบซากดึกดำบรรพ์จากสิ่งมีชีวิตหลายสายพันธุ์ที่ไม่ได้มีถิ่นกำเนิดบน [From.Planet.GetName] ในหุบเขาลึกและลับตาขนาดใหญ่บนดาว ซากทั้งหมดมีอายุจากช่วงเวลาใกล้เคียงกัน ประมาณ 3.6 ล้านปีก่อนในระยะเวลาเพียงไม่กี่ศตวรรษ\n\nแต่ละสายพันธุ์ดูเหมือนจะวิวัฒนาการมาจากชีวมณฑลของตัวเอง และทั้งหมดดูเหมือนจะมีสติปัญญาอย่างน้อยในระดับหนึ่ง ที่น่าประหลาดคือ ซากทุกชิ้นที่พบจนถึงตอนนี้ล้วนมีร่องรอยการตายอย่างรุนแรง"
  ancrel.6050.name:0 "ซากเพิ่มเติม"
  ancrel.6050.desc:0 "นักโบราณคดียังคงขุดพบซากดึกดำบรรพ์เพิ่มขึ้นเรื่อยๆ ในหุบเขา ตอนนี้นับได้แล้วว่าเป็น 26 สายพันธุ์ที่มีสติปัญญา และไม่มีชนิดใดที่เป็นถิ่นกำเนิดของ [From.Planet.GetName] ซากที่ยังคงสภาพดีพอจะระบุสาเหตุการตายได้ทั้งหมดล้วนบ่งบอกถึงบาดแผลทางกายภาพจากคมดาบ หอก หรือธนู ไม่มีตัวอย่างใดที่ตายจากอาวุธพลังงานหรืออาวุธแบบสมัยใหม่\n\nนอกจากนี้ยังพบซากโครงสร้างขนาดเล็กใกล้กับทางเข้าหุบเขา โครงสร้างนี้ดูเหมือนจะมาจากยุคเดียวกับซากดึกดำบรรพ์ อาจช่วยให้เราเข้าใจเรื่องราวมากขึ้น"
  ancrel.6055.name:0 "กระท่อมล่าสัตว์"
  ancrel.6055.desc:0 "การขุดค้นโครงสร้างโบราณที่พบใกล้ทางเข้าหุบเขาดำเนินไปตามแผน ได้ค้นพบสิ่งประดิษฐ์มากมาย ส่วนใหญ่เป็นอาวุธล่าสัตว์และถ้วยรางวัล มีป้ายที่ถูกแปลบางส่วน ซึ่งดูเหมือนจะเป็นชื่อของโครงสร้างนี้ เขียนว่า:\n\n§H\"หุบเขาแห่งมาค์เวห์ล - กระท่อมล่าสัตว์แห่งแรก\"§!"
  ancrel.6060.name:0 "ดินแดน Retarax"
  ancrel.6060.desc:0 "การขุดค้นเพิ่มเติมใกล้กับกระท่อมล่าสัตว์ทำให้ได้รายละเอียดมากขึ้น [From.Planet.GetName] – โดยเฉพาะหุบเขามาค์เวห์ล – เคยถูกใช้เป็นเขตอนุรักษ์สำหรับการล่าสัตว์ของชนชั้นนักรบผู้ปกครองจากอารยธรรมระหว่างดวงดาวที่เรียกว่า §Hดินแดน Retarax§!.\n\nชนเผ่า Retarax ซึ่งเป็นสายพันธุ์นกนักล่า จะสุ่มจับตัวบุคคลจากอารยธรรมเอเลียนต่างๆ ที่พวกมันปกครองอยู่ แล้วส่งไปถูกล่าและสังหารในถิ่นทุรกันดารของมาค์เวห์ล ตามพิธีกรรมที่เป็นกฎของสังคม Retarax ประเพณีนี้ดำรงอยู่หลายศตวรรษ ก่อนที่อาณาจักรจะล่มสลายด้วยภัยคุกคามจากภายนอกที่ไม่ปรากฏรายละเอียด"
  ancrel.6065.name:0 "นักล่าสาว"
  ancrel.6065.desc:0 "นักโบราณคดีที่ขุดค้นกระท่อมล่าสัตว์พบเอกสารหลายชิ้นที่กล่าวถึงนักรบในตำนานของ Retarax ที่รู้จักกันในนาม §H\"นักล่าสาว\"§! เธอคือฆาตกรที่มีประสิทธิภาพที่สุดของพวกเขา มีชื่อเสียงไปทั่วดินแดนว่าเคยสังหารเอเลียนด้วยตัวเองนับพันในมาค์เวห์ล\n\nยังไม่แน่ว่าตำนานนี้จริงหรือไม่ แต่ตำนานของ Retarax เล่าว่านักล่าสาวถูกฆ่าในหุบเขา เมื่อเธอถูกเหยื่อเอเลียนที่กำลังล่าอยู่ตลบหลัง ขณะนั้นเธอกำลังถืออาวุธในตำนานที่เรียกว่า §H\"ดาบแห่งนักล่าสาว\"§!"
  ancrel.6070.name:0 "ดาบแห่งนักล่าสาว"
  ancrel.6070.desc:0 "หลังจากค้นหาหลักฐานอย่างละเอียดทั่วทั้งหุบเขามาค์เวห์ลเกี่ยวกับนักล่าสาวในตำนาน นักโบราณคดีในที่สุดก็สามารถระบุสถานที่พักผ่อนสุดท้ายของเธอได้ พบโครงกระดูกที่กลายเป็นฟอสซิลของเธอกำลังต่อสู้กับซากของแมลงยักษ์มีเขา โดยกรงเล็บของเธอยังคงกำด้ามดาบที่ยังคงสภาพสมบูรณ์ไว้อย่างแน่นหนา\n\nนี่ต้องเป็น §Hดาบแห่งนักล่าสาว§! แน่ๆ อาวุธนี้ทำจากวัสดุที่ไม่รู้จัก และคมพอที่จะตัดทะลุเกราะที่แข็งแกร่งที่สุดของเราได้อย่างง่ายดาย"
  ancrel.6070.b.evopred:0 "นักล่าสาวได้ทิ้งสมบัติอันยิ่งใหญ่ไว้ให้เรา"
  ancrel.6099.name:0 "สนามพลังพรางตัวยถอดรหัสได้"
  ancrel.6099.desc:0 "สนามพลังบางอย่างที่พรางโครงสร้างโบราณไว้เพิ่งถูกเปิดเผยบนผิวของ §H[tomb_planet.GetName]§! ดาว [tomb_planet.GetPlanetMoon] ที่ไร้ชีวิตในอาณาเขตของเรา การชนของดาวเคราะห์น้อยโดยบังเอิญที่สะท้อนออกจากสนามพลังระหว่างที่ [tomb_planet.GetPlanetMoon] กำลังถูกเฝ้าสังเกตโดยยานบรรทุกสินค้าเผยให้เห็นการมีอยู่ของมัน"
  ancrel.6099.a:0 "เราควรตรวจสอบเรื่องนี้"
  site_zarqlan:0 "สุสานโบราณ"
  site_zarqlan_intro:0 "สนามพลังพรางตัวยถอดรหัสได้เคยปิดบังโครงสร้างโบราณไว้บนผิวดาวดวงนี้ จนกระทั่งการชนของดาวเคราะห์น้อยโดยบังเอิญเผยให้มันปรากฏ เมื่อสนามพลังถูกปิด นักโบราณคดีจึงสามารถเข้าถึงคอมเพล็กซ์อาคารขนาดใหญ่และน่าสะพรึงกลัวที่ซ่อนอยู่ได้"
  ancrel.6100.name:0 "สุสาน"
  ancrel.6100.desc:0 "โครงสร้างนี้ดูเหมือนจะเป็นสุสานหรือเมืองแห่งความตายขนาดยักษ์ มีอายุราวหนึ่งแสนปี ไม่มีร่องรอยของการถูกปล้นสะดมมาก่อน ดูเหมือนจะไม่เคยถูกรบกวนตั้งแต่สนามพลังพรางตัวถูกสร้างขึ้นมา ห้องแรกของโครงสร้างนี้สามารถเข้าไปได้ แต่มีประตูที่ไม่อาจเจาะผ่านกั้นทางอยู่ มีกลิ่นอักษรเอเลี่ยนขนาดใหญ่ที่ยังไม่ได้แปลถูกแกะสลักไว้เหนือประตู"
  ancrel.6105.name:0 "ห้องแรก"
  ancrel.6105.desc:0 "อักษรเอเลี่ยนเหนือประตูถูกแปลได้ดังนี้:\n\n§H\"ข้าคือ ซาร์กลาน ผู้พิทักษ์แห่ง มอซ-ทาร์บ ศาสดาแห่ง ซวา ผู้โค่น เซทานา ข้าสละทุกสิ่งเพื่อกอบกู้กาแลคซี่ที่เต็มไปด้วยความชิงชังและความเกลียดชัง จงก้าวต่อไป หากเจ้ามีค่าพอ\"§!\n\nหลังจากสำรวจห้องแรก นักโบราณคดีค้นพบแผงลับขนาดเล็กบนผนัง เมื่อกดเข้าไป ประตูโบราณก็เปิดออก ตอนนี้สามารถเข้าสู่ห้องที่สองได้"
  ancrel.6110.name:0 "ห้องที่สอง"
  ancrel.6110.desc:0 "ห้องที่สองไม่โดดเด่นนัก ยกเว้นอักษรเอเลี่ยนอีกชุดเหนือประตูปิด มันเขียนว่า:\n\n§H\"กษัตริย์ต้อยๆ ใช้ชื่อข้าออกประกาศ จักรวรรดิทำสงครามในนามข้า คนโง่สรรเสริญข้า และสุดท้ายข้าก็ตายเพื่อพวกเขา\"§!\n\nยังไม่พบแผงลับใดๆ ที่จะเปิดไปยังห้องที่สาม"
  ancrel.6115.name:0 "ห้องที่สาม"
  ancrel.6115.desc:0 "หลังจากค้นหาอยู่นาน ก็พบคันโยกที่ซ่อนอยู่ใต้พื้น เปิดทางสู่ห้องที่สี่ เช่นเดียวกับก่อนหน้านี้ มีกลิ่นอักษรเอเลี่ยนบนผนังเหนือประตูอีก:\n\n§H\"ผู้ใดปรารถนาจะเจรจากับซาร์กลาน ต้องหาทางของตนเองให้พบ ทุกห้องซ่อนกุญแจไว้ที่มีเพียงผู้คู่ควรเท่านั้นจะพบได้ จุดประสงค์ของบททดสอบเหล่านี้จะถูกเปิดเผยในไม่ช้า\"§!"
  ancrel.6120.name:0 "ห้องที่สี่"
  ancrel.6120.desc:0 "คราวนี้คันโยกถูกซ่อนอยู่บนเพดาน ห้องที่ห้าเต็มไปด้วยอักษรเอเลี่ยน:\n\n§H\"ไม่มีอะไรให้เรียนรู้ที่นี่ บททดสอบเหล่านี้ไร้ความหมายพอๆ กับถ้อยคำเหล่านี้ นั่นคือบทเรียนของข้า ข้าคือซาร์กลาน เบี้ยบนกระดานที่ถูกพัดพาไปตามกระแสประวัติศาสตร์ ก้าวต่อไป แล้วเจ้าจะได้พบข้า หากเจ้าคู่ควร\"§!\n\nห้องถัดไปน่าจะเป็นห้องสุดท้าย"
  ancrel.6125.name:0 "ห้องสุดท้าย"
  ancrel.6125.desc:1 "หลังจากค้นหาอย่างเหน็ดเหนื่อย ในที่สุดกุญแจสุดท้ายก็ถูกพบในรูปของปุ่มเล็กๆ ที่ซ่อนอยู่ในอักษรเอเลี่ยนสลักไว้ ห้องสุดท้ายนี้มีบัลลังก์ยักษ์ ที่มีร่างคล้ายมนุษย์ขนาดใหญ่เอนกายไร้ชีวิตอยู่ กลิ่นแรงบ่งบอกถึงสภาพเน่าเปื่อยของร่างกาย อักษรตรงฐานบัลลังก์เขียนว่า: §H\"ซาร์กลาน ยินดีรับใช้\"§!\n\nร่างกายเน่าเปื่อยเกินกว่าจะเคลื่อนย้าย แต่ศีรษะยังคงสภาพดีอย่างน่าประหลาด ด้วยไม่อยากกลับมือเปล่า นักโบราณคดีบางคนจึงใช้เลเซอร์ตัดเอาศีรษะออกมา"
  ancrel.6125.desc.b.evopred: "ไม่ว่ามันจะเป็นการลบหลู่หรือไม่ เราต้องได้ DNA ของมัน!"
  ancrel.6130.desc:0 "เป็นความจริงแล้ว เจ้าพบสุสานในตำนานของซาร์กลาน ตอนแรกที่นักทำนายบอก ข้ายังไม่เชื่อ แต่หลักฐานไม่อาจปฏิเสธได้ ข้าเข้าใจแล้วว่าเจ้ามีศีรษะของศาสดาอยู่ในครอบครอง?\n\nดังนั้น ตามคำทำนาย ผู้ถูกเลือกของซาร์กลานได้ถูกเปิดเผยแล้ว โลกศักดิ์สิทธิ์ที่ยังไม่ได้ตั้งถิ่นฐานใกล้อาณาเขตของเราจะเป็นของเจ้า มีผู้ศรัทธามากมายบน [spiritualist_fallen_empire.Capital.GetName] ที่จะเป็นเกียรติอย่างยิ่งในการต่อสู้ภายใต้ธงของเจ้า"
  ancrel.6130.machine.desc: "เป็นความจริง... แม้แต่เครื่องจักรก็ยังค้นพบสุสานในตำนานของซาร์กลาน ตอนแรกที่นักทำนายเล่า ข้ายังไม่เชื่อ แต่ตอนนี้ข้าเข้าใจแล้วว่าเจ้ามีศีรษะของศาสดา\n\nเราจะไม่ตั้งคำถามต่อเจตจำนงของซาร์กลาน โลกศักดิ์สิทธิ์ที่ยังไม่ได้ตั้งถิ่นฐานใกล้อาณาเขตของเราจะเป็นของพวกเจ้า ตามคัมภีร์โบราณ ผู้ศรัทธามากมายบน [spiritualist_fallen_empire.Capital.GetName] จะเป็นเกียรติอย่างยิ่งในการต่อสู้เพื่อภารกิจศักดิ์สิทธิ์นี้"
  ancrel.6130.a:0 "จบการสื่อสาร"
  opinion_zarqlans_chosen:0 "ผู้ถูกเลือกของซาร์กลาน"
  ancrel.6132.a.desc:0 "เหล่าข้ารับใช้ผู้ซื่อสัตย์ของซาร์กลานอยู่ภายใต้คำสั่งของเจ้า [Root.GetSpeciesNamePlural] บอกมาเถอะว่าให้เราลงโทษใคร!"
  ancrel.6132.b.desc:0 "พวกเราถูกเรียกมา ไม่มีเกียรติใดยิ่งใหญ่ไปกว่าการรับใช้ผู้ถูกเลือกของซาร์กลาน"
  ancrel.6132.c.desc:0 "เราคือของเจ้า ชี้ทางไปยังศัตรูของเจ้าได้เลย\n\n§Hเจตจำนงของซาร์กลาน!§!"
  ancrel.6132.d.desc:0 "เจ้าร้องเรียก และเราก็มาที่นี่!\n\nขอให้ศัตรูของซาร์กลานออกลูกหลานอัปลักษณ์! ขอให้พวกมันสำลักอาหาร ขอให้เสื้อผ้าพังกลางที่สาธารณะ ขอให้ดวงตาพวกมันระเบิด! ขอให้..."
  ancrel.6132.a:0 "เจตจำนงของซาร์กลาน!"
  ancrel.6133.name:0 "ผู้แสวงบุญมาถึง"
  ancrel.6133.desc:0 "ทุกวันนี้แทบไม่มีผู้ศรัทธาซาร์กลานเหลืออยู่แล้ว แต่กองเรือคุ้มกันเล็กๆ ที่เต็มไปด้วยลูกเรือผู้ศรัทธา (แต่ไม่ได้รับการฝึกฝน) ได้เดินทางมายัง [Root.Capital.GetName] และถวายตนต่อ [Root.GetName]"
  relic_summon_pilgrims:1 "อัญเชิญกองเรือ Fallen Empire ขนาดเล็ก ทุกครั้งที่ใช้ ขนาดกองเรือจะใหญ่ขึ้น"

  ancrel.6150.name:0 "ดาวถูกปกคลุมด้วยโล่"
  ancrel.6150.desc:0 "ตามผลการสำรวจล่าสุด §H[From.GetName]§! ถูกปกคลุมด้วยสนามพลังที่แข็งแกร่งมาก ป้องกันไม่ให้การสแกนใดๆ ผ่านไปได้ สนามพลังดูเหมือนจะถูกสร้างขึ้นจากดวงจันทร์ใกล้ๆ"
  ancrel.6151.desc:0 "§H[From.GetName]§! กำลังปล่อยสนามพลังที่ไม่อาจเจาะผ่านได้ซึ่งปกคลุมดาวที่มันโคจรอยู่ แหล่งพลังงานที่แท้จริงหายากที่จะระบุ แต่ดูเหมือนจะมาจากใต้พื้นผิวที่แห้งแล้งของดวงจันทร์\n\nซากโบราณของฐานขนาดใหญ่บางอย่าง (อาจเป็นฐานทัพ) ถูกพบในปล่องภูเขาไฟที่ใหญ่ที่สุดของดวงจันทร์ อาจเก็บคำตอบไว้"
  site_minigalaxy_1:0 "ฐานบนดวงจันทร์"
  site_minigalaxy_1_intro:0 "ซากของคอมเพล็กซ์ฐานขนาดใหญ่ถูกพบในปล่องภูเขาไฟขนาดใหญ่บนดวงจันทร์แห่งนี้ มันน่าจะถูกทิ้งร้างมานานนับพันปี สนามพลังที่ครอบดาวใกล้ๆ ดูเหมือนจะมาจากใต้ฐานโบราณนี้"
  ancrel.6155.name:0 "ความริเริ่มแห่งการสงบศึก"
  ancrel.6155.desc:0 "การขุดค้นต่อเนื่องบน §H[From.Planet.GetName]§! เผยว่าฐานที่ถูกทิ้งร้างนี้เคยเป็นฐานทัพขนาดใหญ่ที่ถูกสร้างโดย \"§Hความริเริ่มแห่งการสงบศึก§!\" มันเป็นพันธมิตรครึ่งถาวรของอภิมหาอำนาจดวงดาวอย่างน้อยห้าแห่งในกาแลคซีย่านนี้เมื่อ 75,000 ปีก่อน\n\nลักษณะที่แท้จริงของพันธมิตรนี้ยังไม่ชัดเจน แต่ดูเหมือนพวกเขามุ่งมั่นจะยุติสงครามขนาดใหญ่ที่ดำเนินมานาน กองทัพจากสมาชิกแต่ละฝ่ายถูกส่งไปประจำการที่ฐานบนดวงจันทร์นี้"
  ancrel.6160.name:0 "คู่สงคราม ซี"
  ancrel.6160.desc:0 "ดาวที่ถูกปิดกั้นในระบบนี้เคยเป็นเมืองหลวงของหนึ่งในจักรวรรดิที่ทำสงครามซึ่งความริเริ่มแห่งการสงบศึกถูกจัดตั้งขึ้นมาเพื่อหยุด พวกมันถูกเรียกว่า \"§Hคู่สงคราม ซี§!\" ในบันทึกของพันธมิตรทั้งหมด\n\nดูเหมือนว่าพวกพันธมิตรต้องการจะทำให้คู่สงครามซีเป็นตัวอย่าง หลังจากบุกเข้าอาณาเขตและชนะศึกหนักหลายครั้ง พวกเขาจึงขังโลกบ้านเกิดของซีไว้หลังสนามพลังถาวร และสร้างฐานทัพบนดวงจันทร์ใกล้ๆ เพื่อดูแลและเป็นกองกำลังสำรองในกรณีที่การกักกันล้มเหลว"
  ancrel.6165.name:0 "เครื่องกำเนิดโล่"
  ancrel.6165.desc:0 "ฐานบนดวงจันทร์ของพันธมิตรนี้ยังคงทำงานอยู่นานหลายศตวรรษ แต่เมื่อไม่พบสัญญาณการกักกันล้มเหลว กำลังพลก็ถูกลดลงเรื่อยๆ สุดท้ายเมื่อพันธมิตรเริ่มมีความขัดแย้งกันเอง ฐานก็ถูกทิ้งร้างไป\n\nระบบอัตโนมัติถูกปล่อยให้ทำงานเพื่อดูแลสนามพลังที่ปกคลุมโลกของซี และมันยังคงทำงานมาได้อย่างเหลือเชื่อจนถึงตอนนี้... จนกระทั่งสายไฟหลักถูกตัดขาดตอนนักโบราณคดีของเราขุดเจาะเข้าสู่ห้องเครื่องกำเนิดใต้อาณาเขต หลังจากทำงานต่อเนื่อง 75,000 ปี สนามพลังนั้นก็หายไป"

  site_minigalaxy_2:0 "เมืองจักรวาลร้าง"
  site_minigalaxy_2_intro:0 "โลกโบราณแห่งนี้ถูกขังไว้หลังสนามพลังที่ไม่อาจเจาะผ่านได้นานราว 75,000 ปี เคยเป็นเมืองจักรวาลที่มีชีวิตชีวาและเต็มไปด้วยประชากรหลายร้อยพันล้านคน แต่ถนนและอาคารตอนนี้ว่างเปล่า ไม่มีผู้ใดจากผู้ตั้งถิ่นฐานเดิมเหลืออยู่"
  ancrel.6170.name:0 "การหายตัว"
  ancrel.6170.desc:0 "การหายตัวไปของประชากรเดิมบนดาวดวงนี้ยังคงเป็นปริศนา เมื่อสนามพลังขึ้นและพวกเขาถูกตัดขาดจากจักรวรรดิระหว่างดวงดาวที่เหลือ พวกเขาอาจเผชิญกับความอดอยากและความวุ่นวายทางสังคมขนาดใหญ่ในขณะที่พยายามเลี้ยงประชากรจำนวนมหาศาลของเมืองหลวงด้วยทรัพยากรจำกัด\n\nแต่ไม่มีร่องรอยว่าพวกเขาทำลายส่วนใดของเมืองเพื่อเพาะปลูก ไม่มีอะไรบ่งชี้ว่ามีการสู้รบครั้งใหญ่หลังจากสนามพลังขึ้น และไม่มีซากหรือฟอสซิลของผู้คน มันเหมือนพวกเขาหายวับไปในอากาศ"
  ancrel.6175.name:0 "วันอพยพ"
  ancrel.6175.desc:0 "ถนนที่ว่างเปล่าและเงียบสงัดในเมืองจักรวาลร้างนี้ยังคงไม่เผยความจริงว่าเกิดอะไรขึ้นกับผู้ตั้งถิ่นฐานเดิม พบโปสเตอร์และแผ่นพับที่กล่าวถึงวันบางอย่างเรียกว่า \"§Hวันอพยพ§!\" โดยมักมาพร้อมภาพของกาแลคซี่ที่นักดาราศาสตร์ของเราไม่รู้จัก:\n\n§H\"วันอพยพ - วันนี้คือวันนั้น รีบไปยังศูนย์อพยพที่ใกล้ที่สุดเพื่อเริ่มชีวิตใหม่ของเจ้า\"§!"
  ancrel.6180.name:0 "โครงการ"
  ancrel.6180.desc:0 "ดาวนี้ถูกทิ้งร้างหลังจากวันอพยพจบลง แต่ทำอย่างไร? ไม่มีหลักฐานว่าสนามพลังเคยถูกปิด\n\nมีเบาะแสว่าเกิดการดำเนินโครงการวิจัยขนาดใหญ่ที่มีมาก่อนสนามพลัง ทรัพยากรและบุคลากรด้านวิทยาศาสตร์ถูกโยกไปยังโครงการนี้มากขึ้นเรื่อยๆ และความพยายามนั้นทวีความเข้มข้นขึ้นหลังจากสนามพลังขึ้น"
  ancrel.6185.name:0 "จักรวาลจำลองขนาดจิ๋ว"
  ancrel.6185.desc:0 "หลังจากค้นหาข้อมูลอย่างเข้มข้น เราพบว่าผู้คนจาก [From.Planet.GetName] ย้ายไปที่ไหน ลึกเข้าไปในโครงสร้างสูงที่ป้องกันอย่างแน่นหนาใกล้ขั้วเหนือของดาว เราพบโบราณวัตถุที่นักโบราณคดีมั่นใจว่ามีจักรวาลจำลองขนาดจิ๋วจริงๆ อยู่ภายใน\n\nอย่างใดพวกเขาสร้างจักรวาลนี้แล้วย้ายประชากรทั้งหมดไปยังนั้น จากนั้นปิดผนึกด้วยสนามย่อยเชิงพื้นที่ที่ไม่อาจเจาะ เราไม่สามารถรบกวนจักรวาลนั้นโดยตรง แต่ทีมวิทยาศาสตร์ยืนยันว่าเราสามารถศึกษาได้"
  
  site_star_petal:0 "โครงสร้างในแก๊สยักษ์"
  site_star_petal_intro:0 "สถานีอวกาศขนาดใหญ่ที่ถูกทิ้งร้างถูกดึงอยู่ในวงโคจรใกล้ชะตากรรมภายในชั้นบรรยากาศของดาวแก๊สแรงโน้มถ่วง การบีบอัดแรงโน้มถ่วงอาจทำลายมันโดยสมบูรณ์ภายในพันปีข้างหน้า\n\nมันยังไม่ลอยลึกพอในชั้นบรรยากาศเพื่อทำให้การสำรวจทางโบราณคดีเป็นไปไม่ได้"
  ancrel.6200.name:0 "พระราชวังสวรรค์"
  ancrel.6200.desc:0 "ภายในสถานีอวกาศที่มืดมิดและไร้ชีวิตเกือบปกปิดความจริงว่าที่นี่ต้องถูกออกแบบให้เป็นพระราชวังสวรรค์สุดหรู มีแถวเครื่องสล็อตสนิมไม่รู้จบ หลายร้อยบาร์และร้านอาหารทรุดโทรม และท่ามกลางนั้นเป็นร่างนับพัน\n\nร่างเอเลี่ยนตายและมัมมี่บางส่วนของอย่างน้อยสิบสองสายพันธุ์พบอยู่ทุกหนแห่ง แต่ส่วนใหญ่รวมตัวกันรอบท่าอพยพฉุกเฉินที่ว่างเปล่า"
  ancrel.6205.name:0 "กลีบดวงดาว"
  ancrel.6205.desc:0 "สถานีที่ถูกทิ้งร้างนี้เคยรู้จักกันในชื่อ \"§Hกลีบดวงดาว§!\" และเป็นรีสอร์ตสุดหรูที่มีชื่อเสียงในมุมนี้ของกาแลคซี่เกือบพันปีที่ผ่านมา กองยานลากเล็กจะดึงสถานีไปยังที่ตั้งแปลกใหม่ทุกปี แต่ [From.Planet.GetName] ดูเหมือนจะเป็นที่ตั้งสุดท้าย\n\nด้วยเหตุผลไม่ชัดเจน สถานีถูกดึงเข้าไปในชั้นบรรยากาศของดาวแก๊สจนเสียหายหนัก"
  ancrel.6210.name:0 "วันสุดท้าย"
  ancrel.6210.desc:0 "นักโบราณคดีที่ทำงานบนกลีบดวงดาวรวบรวมเบาะแสและหลักฐานเพียงพอที่จะวาดภาพเหตุการณ์สุดท้ายของสถานี ดาวเคราะห์น้อยหลงทางชนสถานี ทำให้มันเข้าสู่วงโคจรที่จะดิ่งลงชั้นบรรยากาศของ [From.Planet.GetName]\n\nเครื่องผลักวงโคจรไม่สามารถชดเชยได้ และเจ้าหน้าที่สั่งอพยพ แต่สถานีมีแค่พอสำหรับผู้โดยสารบางส่วน เกิดความตื่นตระหนก มันทำให้ผู้ที่ไม่ได้เหยียบพวกเขาตายเมื่อระบบสิ่งแวดล้อมล้มเหลวขณะที่มันลอยลึกลงในดาวแก๊ส"
  ancrel.6215.name:0 "หัวใจของพัลซาร์"
  ancrel.6215.desc:0 "การค้นหาตู้เซฟของลูกค้าร่ำรวยที่สุดของกลีบดวงดาวเผยสมบัติวัตถุโบราณและเครื่องประดับมากมาย สิ่งที่โดดเด่นที่สุดคือ \"หัวใจของพัลซาร์\" - สร้อยเพชรพิเศษที่มีชื่อเสียงในยุคของมัน เคยถูกสวมโดยหัวหน้ารัฐห้าคน"
  
