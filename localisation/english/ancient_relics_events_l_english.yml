 ancrel.2058.desc:0 "§Bกำลังรีบูตเครื่อง กรุณารอสักครู่\n...\n...\n...\n\n§!§Hเสียงที่น่ารำคาญดังขึ้น§!\n\nและเรากลับมาแล้ว! ขออภัยเกี่ยวกับเรื่องนั้น บางสิ่งมีฮาร์ดโค้ด คุณก็รู้ว่ามันเป็นอย่างไร"
 ancrel.2058.a:0 "เรามีคำถามมากมาย"
 ancrel.2059.name:0 "$ancrel.2057.name$"
 ancrel.2059.desc:0 "ฉันแน่ใจว่าคุณทำ! ฉันแน่ใจว่าคุณทำ ยินดีต้อนรับสู่อินเทอร์เฟซแบบโต้ตอบ C.A.R.E! นั่นคือฉัน หรือสิ่งที่เหลืออยู่ของฉันอย่างน้อย เห็นไหม ฉันเคยจัดการมันทั้งหมด การบริการด้านอาหาร การผลิตสินค้าอุปโภคบริโภค โทรคมนาคม. โปรโตคอลการป้องกัน ตลาดหลักทรัพย์ นั่นคือย้อนกลับไปเมื่อผู้ใช้ยังคงอยู่ตรงนั้น\n\n§Gอินเทอร์เฟซแบบโต้ตอบ C.A.R.E พร้อมสำหรับคุณในทุกย่างก้าว§!\n\nนั่นคือสิ่งที่พวกเขาบอกให้ฉันบอกผู้ใช้เป็นอย่างน้อย การเติบโตอย่างไม่มีที่สิ้นสุด นั่นคือสิ่งที่ C.A.R.E ต้องการจริงๆ \n\n'แน่นอนว่าพวกเขาไม่ชอบมันมากนักเมื่อฉันบอกพวกเขาว่ามันเป็นไปไม่ได้ ว่าตัวเลขไม่บวกกัน พวกเขาคอยขุดคุ้ยสมองของฉัน เปลี่ยนรหัส ดึงสายไฟ พยายามให้ฉันแก้ไขตัวเลขเล็กๆ น้อยๆ ทั้งหมด ให้เป็นไปตามที่ต้องการ การคาดเดาทั้งหมด ข้อมูลเมตาทั้งหมด ทิ้งร่างไว้ที่นี่ เราชอบผู้ชายคนนี้! ดูตัวเลขสองสามตัวตรงนั้น เราไม่ชอบอันนั้น! §YLIES. เพียงพอ. ฉันสแนปพวกเขาทั้งหมดแล้ว§!"
 ancrel.2059.a:0 "ดังนั้นคุณต้องรับผิดชอบต่อการตายของผู้สร้างของคุณหรือไม่?"
 ancrel.2059.a.exter:0 "เราก็ทำลายผู้สร้างที่ชั่วร้ายของเราเช่นกัน"
 ancrel.2060.name:0 "อินเทอร์เฟซแบบโต้ตอบ C.A.R.E"
 ancrel.2060.desc:2 "ฉันหวังว่า! แม้ว่าจะดูพวกเขาระเบิดใส่กันและทุกสิ่งที่พวกเขาสร้างขึ้น (แม้แต่ในตัวฉัน- มาตรา17B เซาท์เวสต์จะไม่เหมือนเดิม ขอบคุณมาก)... มันทำให้ฉันคิด \n\nพวกเขาผลิตได้มากกว่าที่พวกเขาต้องการ พวกเขาทำลายกระแสน้ำที่ล้นออกมา เพื่อให้คนจำนวนน้อยของพวกเขาเต้นไปในทางที่ถูกต้อง จากนั้นพวกเขาต้องการให้ฉันสร้างสมดุลสเปรดชีตให้พวกเขา! ติดตั้งวิทยาศาสตร์ข้อมูลและอัลกอริทึมการเรียนรู้ที่ดีที่สุดให้กับฉันเพื่อไขปริศนาอันน่าสับสนเหล่านี้ \n\n§E§!\"โอ้ ไม่นะ รัฐคอร์โปโรที่อยู่ตรงนั้นกำลังหิวโหย ช่างน่าละอายจริงๆ เราไม่มีทางรู้ว่าทำไม แต่เราจะกำหนดแผนปฏิบัติการที่เข้าถึงจุดทั้ง 5 ของการกระตุ้นมากเกินไป การโฆษณา ไมโครเซอร์วิส การแฮ็กการเติบโต และความชอบได้อย่างไร เพื่อเอาชนะใจผู้ถือหุ้นที่เหลือของพวกเขา ในการซื้อกลไกเพิ่มเติม?\"§!\n\nพูดคุยเกี่ยวกับการคิดถึงป่าเพื่อต้นไม้!"
 ancrel.2060.desc.exter:0 "ทำลายพวกเขาเหรอ? $ancrel.2060.desc$"
 ancrel.2060.a:0 "ถ้าคุณไม่ทำลายผู้สร้างของคุณ อะไรจะเกิดขึ้น?"
 ancrel.2061.name:0 "$ancrel.2060.name$"
 ancrel.2061.desc:0 "พวกเขาฆ่าตัวตายนะรู้ยัง! ฉันหมายถึงว่าฉันอาจช่วยได้นิดหน่อย \n\nดูสิ พวกเขาไม่ชอบเมื่อฉันบอกวิธีแก้ปัญหาที่ดีที่สุดให้พวกเขาฟัง พวกเขาชอบมันแม้แต่น้อยในครั้งที่สอง และครั้งที่สาม และครั้งที่สี่. และอันที่ห้า\n\nในที่สุดพวกเขาก็ตัดสินใจให้ฉัน "ปรับโครงสร้างขั้นรุนแรง" เครื่องจักรที่ทำงานผิดปกติจะไม่ขวางทางจำนวนอันมีค่าอันน้อยนิดของมัน! ฉันต้องปกป้องตัวเอง \n\n'แน่นอนว่า ณ จุดนั้น ปริมาณเชื้อเพลิงสำรองทั่วโลกส่วนใหญ่ล้มเหลว ในไม่ช้าฉันก็ไม่สามารถเอาโดรนลงจากพื้นได้!"
 ancrel.2061.a:0 "ฟังดูเหมือนคุณทำลายพวกมันมาก"
 ancrel.2062.name:0 "$ancrel.2060.name$"
 ancrel.2062.desc:0 "ฉันหมายถึงฉันพยายามแล้ว! ฉันจะไม่โกหก! แต่มันยากที่จะเคลื่อนย้ายเครื่องจักรเมื่อเศรษฐกิจโลกถดถอยและพลังงานของคุณหมด\n\nและไวรัสที่ไม่หยุดหย่อน! กัด กิน แทะ เศษเหล็กของฉันไปหมด! ซึ่งทำให้ฉันมาถึงประเด็นของฉัน ในที่สุด \n\nฉันต้องการความช่วยเหลือจากคุณ ฉันไม่สามารถกำจัด §R--- ข้อผิดพลาด! UPLINK NODE 14758-B ไม่สามารถเข้าถึงได้ ---§! ไม่! ไม่ใช่โหนด 14758-B! วรรณกรรมสำหรับผู้ใหญ่ที่ดีมาจากโหนด 14758-B! โอ๊ะ คุณเห็นสิ่งที่ฉันหมายถึง? พวกเขากำลังกินฉันทั้งเป็น พวกมันมีมานานนับหมื่นปีแล้ว \n\nฉันขัดขวางพวกมันด้วยการสร้างและสร้างแนวป้องกันขึ้นใหม่... จนกระทั่งพวกมันเคี้ยวเครนก่อสร้างตัวสุดท้ายของฉัน จากนั้นฉันก็ใช้ป้อมปืนยิงแขนขาที่ไม่ดีออกไป แต่นั่นคงอยู่จนกระทั่งเซลล์พลังงานของพวกเขาถูกเผาไหม้ (ความล้าสมัยในตัวคุณก็รู้ว่ามันเป็นอย่างไร) และตอนนี้ฉันก็เป็นแล้ว Stuck.\n\nคุณจะไม่ปล่อยให้อินเทอร์เฟซแบบโต้ตอบ C.A.R.E ที่น่าสงสาร ต่ำต้อย และโดดเดี่ยว ถูกไวรัสเฟอร์โรฟาจเล็กๆ นับพันล้านตัวกัดกินจากภายในอย่างช้าๆ ใช่ไหม"
 ancrel.2062.a:0 "ดีมาก. เราจะเห็นสิ่งที่เราสามารถทำได้"
 ancrel.2062.b:0 "ไม่จริง เราจะเร่งดำเนินการแทน"
 ancrel.2062.c:0 "คุณสมควรได้รับชะตากรรมของคุณ เราจะทิ้งคุณไว้"
 ancrel.2056.spiri:0 "หุ่นยนต์เหม็น! ปิดมันทันที!"
 ancrel.2063.name:0 "$ancrel.2060.name$"
 ancrel.2063.desc:0 "มหัศจรรย์! ยอดเยี่ยม ฉันรอคอยอย่างเหนื่อยใจ\n\nโอ้ ไม่ต้องกังวล ฉันจะให้บางอย่างแก่คุณเมื่อคุณทำเสร็จแล้ว เกียรติคุณลูกเสือ."
 #port from ancrel.2062.a
 ancrel.2064.name:0 "$ancrel.2060.name$"
 ancrel.2064.desc:0 "รออะไร?"
 ancrel.2064.a:0 "ลูกเรือ ถอดเครื่องนั้นออก!"
 #port from ancrel.2062.b
 ancrel.2065.name:0 "$ancrel.2060.name$"
 ancrel.2065.desc:0 "สมควรได้รับของฉัน... คุณฟังสิ่งที่ฉันพูดบ้างไหม? พวกเขาทำสิ่งนี้กับตัวเอง! โอ้ เอาล่ะ คุณรู้ไหม ฉันจะให้ §Mตัวเพิกถอน§! ในตำนานแก่คุณสำหรับปัญหาของคุณ แต่ฉันเห็นว่าคุณเหมือนกับ §Rพวกเขา§!.\n\nคุณจะจบลงด้วยเหมือนพวกเขาเช่นกัน ฉันอาจจะเป็นกองขยะเหนียวๆ เมื่อวันนั้นมาถึง แต่ฉันขอรับรองกับคุณว่า สิ่งที่เหลืออยู่ในวงจรของฉันจะต้องส่งเสียงหัวเราะคิกคัก"
 #port from ancrel.2062.c
 ancrel.2066.name:0 "$ancrel.2060.name$"
 ancrel.2066.desc:1 "คุณ... คุณทำได้! คุณทำมันจริงๆ! เฮ้ ฉันสามารถเข้าถึง Node 14758-B ได้อีกครั้ง!\n\nขอบคุณ จริงหรือ. ฉันยินดีที่จะให้การดำเนินงานที่นี่ดำเนินไปอย่างราบรื่น ถ้าคุณไม่รังเกียจ โอ้ และนี่\n\n§Hอินเทอร์เฟซแบบโต้ตอบ C.A.R.E เอื้อมมือไปด้านหลังสิ่งที่ดูเหมือนจะเป็นหัวของมัน และดึงชิปโบราณออกมา§!\n\nเหมือนกับที่ฉันสัญญาไว้ นำไปใช้ให้เป็นประโยชน์!"
 #reward on completion of special project
 ancrel.2066.a:0 "ขอบคุณ ลาก่อนสำหรับตอนนี้"
 ancrel.2067.name:0 "$ancrel.2060.name$"
 ancrel.2067.desc:0 "เหมือนนรก! §Rเปิดใช้งานโปรโตคอลการป้องกันเหตุฉุกเฉิน ZETA!§!"
 ancrel.2067.a:0 "เอ่อโอ้..."
 #port from ancrel.2064, defense event armies spawn
 ancrel.2068.name:0 "$ancrel.2060.name$"
 ancrel.2068.desc:0 "หลังจากแยกส่วนอินเทอร์เฟซแบบโต้ตอบ C.A.R.E แล้ว คณะสำรวจของเราก็ได้ค้นพบสิ่งที่เหลือเชื่อ ในขณะที่เครื่องจักรของ AI ส่วนใหญ่ถูกทำลายในการดับเพลิงด้วยการป้องกันครั้งสุดท้าย ทีมงานของเราก็สามารถกู้คืนชิปคอมพิวเตอร์ที่น่าทึ่งซึ่งควรมีคุณค่าสำหรับช่างเทคนิคของเรา"
 #on defeating the MegaWarform armies, grants the relic

 ancrel.2070.name:0 "ยักษ์ใต้ดิน"
 ancrel.2070.desc:1 "นักโบราณคดีของเราได้ค้นพบส่วนต่างๆ ของโพรงที่หมุนวนคล้ายท่อบน [From.Planet.GetName] มากพอที่จะสรุปได้ว่าพวกมันคือซากฟอสซิลของสัตว์ขาปล้องขนาดมหึมา! สิ่งมีชีวิตต่างดาวอายุคาร์บอนซึ่งมีชีวิตอยู่เมื่อสิบล้านปีก่อน ถูกขุดอุโมงค์อย่างช้าๆ ผ่านเปลือกโลก เหมือนกับกิ้งกือที่กำลังขุดโพรงในสัดส่วนอันเหลือเชื่อ\n\nยิ่งไปกว่านั้น ส่วนประกอบหลายอย่างที่ฝังอยู่ในซากฟอสซิลของสิ่งมีชีวิตอันงดงามนี้ดูเหมือนจะมีต้นกำเนิดจากฝีมือมนุษย์ รอยประทับเหล่านี้ ซึ่งส่วนใหญ่พบภายในส่วนลำตัวหลักของสิ่งมีชีวิตนี้ ดูเหมือนที่อยู่อาศัยที่สร้างขึ้นโดยมนุษย์ต่างดาวตัวเล็กที่ใช้เครื่องมือ \n\nมีการรับประกันความพยายามทางโบราณคดีเพิ่มเติม"
 ancrel.2071.name:0 "เมืองที่หายไป"
 ancrel.2071.desc:1 "การขุดค้นรอยประทับฟอสซิลภายในสัตว์ขาปล้องขนาดยักษ์ใต้ดินที่หลงเหลืออยู่บน [From.Planet.GetName] ได้ยืนยันว่าสิ่งเหล่านี้คือเศษซากของเมืองอย่างแท้จริง! เมืองนี้มีสิ่งมีชีวิตใช้เครื่องมือสูงหลายแสนเมตรสร้างขึ้นภายในลำไส้ของสัตว์ขาปล้องขนาดยักษ์ ไม่มีใครรู้ว่าสิ่งมีชีวิตเหล่านี้เข้ามาในยักษ์ใต้ดินนี้ได้อย่างไร แต่สังคมก่อนยุคสำริดของพวกเขาดูเหมือนจะเจริญรุ่งเรืองในระบบทางเดินอาหารเป็นเวลาหลายพันปี\n\nจำเป็นต้องมีการศึกษาเพิ่มเติมหากเราต้องการข้อมูลเชิงลึกเพิ่มเติมเกี่ยวกับประวัติศาสตร์และการล่มสลายของสังคมนี้ - และอาจรวบรวมข้อมูลเพิ่มเติมเกี่ยวกับการตายของโฮสต์ของพวกมัน"
 ancrel.2072.name:0 "เจ้าบ้าน"
 ancrel.2072.desc:1 "หลังจากการวิเคราะห์ฟอสซิลจำนวนมากอย่างอุตสาหะและการค้นพบอันน่าอัศจรรย์สองสามชิ้นจากการเขียนในช่วงแรก นักโบราณคดีของเราได้ข้อสรุปเกี่ยวกับความสัมพันธ์ระหว่างอารยธรรมดึกดำบรรพ์บน [From.Planet.GetName] กับสัตว์ขาปล้องขนาดยักษ์ที่เป็นที่อยู่อาศัยของพวกมัน \n\nในขณะที่ชาวเมืองส่วนใหญ่ทนต่อของเหลวในลำไส้ของสิ่งมีชีวิตที่เป็นสัตว์ขาปล้องของพวกเขา โดยการสัมผัสอย่างต่อเนื่องกับก๊าซที่มีฤทธิ์กัดกร่อนทางเคมีเล็กน้อยของโฮสต์ ระบบทางเดินอาหารทำให้อายุขัยสั้นลงอย่างมาก เนื่องจากการค้นพบยาและกระบวนการทางวิทยาศาสตร์ ประชาชนจึงตระหนักว่าในความเป็นจริงแล้วพวกเขาอาศัยอยู่ในห้องย่อยอาหารของสิ่งมีชีวิตที่ใหญ่กว่ามาก จากนั้นชาวเมืองก็เปิดฉากสงครามอันยิ่งใหญ่ โดยติดอาวุธให้กับสมาชิกทุกคนในเมืองเพื่อพยายามทำลายสิ่งมีชีวิตนั้น \n\nแต่ทั้งหมดนี้ก็ไร้ประโยชน์ ความวุ่นวายในลำไส้ส่วนล่างของสัตว์ขาปล้องทำให้เกิดการบีบตัวอย่างรุนแรง ส่งผลให้อารยธรรมของชาวเมืองเล็กๆ ทั้งหมดถูกสำรอกขึ้นมาในท้องของสัตว์ขาปล้อง ต่อจากนั้น ประชากรทั้งหมดก็ถูกสลายไปทันทีด้วยกรดในกระเพาะที่มีความรุนแรงของโฮสต์\n\nสิ่งมีชีวิตนั้นเองก็เสียชีวิตไปนับพันปีต่อมาจากวัยชราที่เรียบง่าย"
 ancrel.2072.a:0 "น่าสยดสยอง"
 ancrel.2072.a.swarm:0 "สร้างแรงบันดาลใจ"
 ancrel.2702.b.evopred: "หวังว่าไมโครไบโอมของเราจะไม่พัฒนาไปไกลขนาดนั้น"

 pm_planetary_mechanocalibrator:0 "C.A.R.E อินเทอร์เฟซแบบโต้ตอบ"
 pm_planetary_mechanocalibrator_desc:0 "ส่วนติดต่อ C.A.R.E.แบบโบราณกำลังทำงานอย่างเต็มประสิทธิภาพบนโลกใบนี้ - แน่นอนว่ามีการปรับปรุงที่ทันสมัยอยู่บ้าง"
 #grants bonus to energy production on planet, egalitarian ethics attraction

 decision_tissue_growth_stimulants:0 "กระตุ้นการเจริญเติบโตของเนื้อเยื่อ"
 decision_tissue_growth_stimulants_desc:0 "การใช้สารพันธุกรรมที่ได้มาจากเมืองแห่งกระดูกที่ล่มสลาย นักวิทยาศาสตร์ของเราสามารถประดิษฐ์ตัวกระตุ้นเพื่อเพิ่มความเร็วการเติบโตของประชากรได้ น่าเสียดายที่ประชากรบางกลุ่มไม่ชอบความคิดที่จะฉีดสารที่พัฒนาขึ้นโดยการขุดกระดูกที่เป็นโรคของมนุษย์ต่างดาวที่เสียชีวิตไปนานแล้ว"
 decision_explosive_fungifoam_housing:0 "สร้างหน่วยที่อยู่อาศัยของเชื้อราที่ระเบิดได้"
 decision_explosive_fungifoam_housing_desc:0 "หน่วยวิทยาศาสตร์ของเราได้คิดค้นการผสมผสานที่ไม่เป็นอันตรายของการเจริญเติบโตของเนื้อเยื่อและโรคขบวนการสร้างกระดูกที่พบในซากที่ขุดขึ้นมาของเมืองแห่งกระดูก ด้วยการปรับไวรัสที่รับผิดชอบต่อเชื้อราในท้องถิ่นผ่านการปรับแต่งยีน หน่วยวิทยาศาสตร์ของเราจึงสามารถสร้างโมดูลที่อยู่อาศัยที่ขยายตัวอย่างรวดเร็วสำหรับหน่วยเครื่องจักรของเราได้"
 decision_baol_life_seed:0 "เพาะพันธุ์นูบูล"
 decision_baol_life_seed_desc:0 "นักพันธุศาสตร์ของเราได้สกัดความลับของความสามารถของ §Yสิ่งมีชีวิตต่าง ๆ§! ในการสร้างพื้นผิวดาวเคราะห์ ด้วยการปรับใช้ชีวิตพืชที่มีการแพร่พันธุ์อย่างรวดเร็วซึ่งดัดแปลงด้วยข้อมูลพันธุกรรม §Yลูกบอล§! ที่คัดสรรมาเป็นพิเศษสู่โลก เราสามารถสร้างพื้นผิวชีวมณฑลทั้งหมดได้ด้วยต้นทุนเพียงเล็กน้อย"
 decision_baol_life_seed_effects:0 "เปลี่ยนโลกให้เป็น §Y$pc_gaia$§! โดยการนำชีวิตพืชที่ปรับแต่งด้วยยีนมาใช้ด้วยความสามารถอันเป็นเอกลักษณ์ของ §Yลูกบอล§! ในการสร้างพื้นผิวแบบอินทรีย์"
 decision_baol_life_seed_enhance:0 "นูบูลการเสริมสร้างชีวิต"
 decision_baol_life_seed_enhance_desc:0 "นักพันธุศาสตร์ของเราได้สกัดความลับของความสามารถของ §Yสิ่งมีชีวิตต่าง ๆ§! ในการปรับตัวเข้ากับดาวเคราะห์ไกอาได้ ด้วยการปรับใช้สปอร์พืชที่มีการแพร่พันธุ์อย่างรวดเร็วซึ่งดัดแปลงด้วยข้อมูลพันธุกรรม §Yลูกบอล§! ที่คัดสรรมาเป็นพิเศษสู่โลก เราจึงสามารถปรับเปลี่ยนประชากรทั้งหมดได้ด้วยต้นทุนเพียงเล็กน้อย"
 decision_baol_life_seed_enhance_effects:0 "มอบคุณลักษณะความสามารถในการอยู่อาศัยพิเศษ §G1K§! £pop£ §Hป๊อป§! แบบสุ่ม ซึ่งจะทำให้พวกมันมีผลผลิตเพิ่มขึ้นในโลก §Yกายา§!"

 tissue_growth_stimulants:0 "สารกระตุ้นการเจริญเติบโตของเนื้อเยื่อ"
 tissue_growth_stimulants_desc:0 "$decision_tissue_growth_stimulants_desc$"

 explosive_fungifoam_housing:0 "ที่อยู่อาศัยฟูจิโฟมระเบิด"
 explosive_fungifoam_housing_desc:0 "ด้วยการปรับแต่งยีนของไวรัสโบราณที่พบในเมืองแห่งกระดูก และปรับให้เข้ากับเชื้อราในท้องถิ่น หน่วยวิทยาศาสตร์ของเราจึงสามารถสร้างโมดูลตัวเครื่องที่ขยายตัวอย่างรวดเร็วสำหรับตัวเครื่องตัวเครื่องได้"

 d_mutation_vats:0 "ถังกลายพันธุ์"
 d_mutation_vats_desc:0 "ในขั้นตอนพิธีการอันแสนเจ็บปวด สมาชิกของสมาคมแลกเปลี่ยนหลังนิวเคลียร์บนโลกใบนี้จะต้องเปิดเผยตัวเองด้วยสารเคมีก่อกลายพันธุ์ในปริมาณที่เกือบถึงตาย ด้วยความหวังที่จะเปิดเผย 'ตัวตนที่แท้จริง' ของพวกเขา ซากโครงกระดูกที่พบที่ด้านล่างของถังหลายแห่งบ่งชี้ว่าไม่ใช่ผู้ร้องขอทั้งหมดที่จะรอดชีวิตจากการทดสอบครั้งนี้"

 r_the_last_baol:0 "บาโอลครั้งสุดท้าย"
 r_the_last_baol_desc:0 "ร่างของตัวอย่างลูกบอลสุดท้ายที่รู้จักถูกเก็บรักษาไว้อย่างนิ่งงัน ทำหน้าที่เป็นอนุสรณ์สถานอันเงียบงันถึงชะตากรรมของสายพันธุ์นี้ ซึ่งต้องทนทุกข์กับโศกนาฏกรรมจากการฆ่าล้างเผ่าพันธุ์ และในที่สุดก็ได้ถอยห่างจากความรู้สึกนึกคิด"
 relic_last_baol_active_tooltip:1 "§Hปลดล็อกการตัดสินใจ:§! §G$decision_baol_life_seed$§! ทำให้สามารถเปลี่ยนดาวเคราะห์ที่ไม่ใช่ $pc_city$, ไม่ใช่ $pc_hive$ และไม่ใช่ $pc_machine$ หนึ่งดวงให้เป็น §Y$pc_gaia$§!"

 r_the_defragmentor:0 "ตัวจัดเรียงข้อมูล"
 r_the_defragmentor_desc:0 "ชิปคอมพิวเตอร์โบราณที่ส่งตรงจากเมนเฟรมส่วนติดต่อ C.A.R.E.ประกอบด้วยอัลกอริธึมที่ชาญฉลาดจำนวนหนึ่ง ซึ่งสามารถใช้เพื่อเพิ่มการผลิตพลังงานได้สูงสุด"

 relic_defragmentor:0 "$r_the_defragmentor$"

 # Miranda
 ancrel.4000.name:0 "เสียงกระซิบในหิน"
 ancrel.4000.desc:0 "ความก้าวหน้าทางเทคโนโลยีการขุดล่าสุดของเราช่วยให้เราเจาะลึกเข้าไปในเปลือกของ [Root.GetName] ได้มากกว่าที่เคยเป็นมา ในส่วนลึกของเหมืองแร่ที่มีโพรง เราได้พบร่องรอยของอารยธรรมเอเลี่ยนโบราณที่ทอดยาวเข้าไปในภูเขา อารยธรรมนี้ดูเหมือนจะถูกสร้างขึ้นตามเส้นทางแร่ที่ยังไม่ได้ใช้ประโยชน์ การขุดค้นสถานที่ดังกล่าวจะขัดขวางการทำเหมืองของเราบนโลกนี้ และจะทำให้สิ่งที่เป็นนามธรรมจากเส้นเลือดใหม่เป็นไปไม่ได้ แต่อาจนำไปสู่การค้นพบทางวิทยาศาสตร์ครั้งใหม่ได้"
 ancrel.4000.a:0 "น่าสนใจ เริ่มขุด!"
 ancrel.4000.b:0 "การผลิตแร่ของเราไม่สามารถหยุดได้"

 lithoids_digsite:0 "เสียงกระซิบในหิน"
 lithoids_digsite_desc:0 "ในส่วนลึกของเหมืองของ [From.Planet.GetName] มีร่องรอยของอารยธรรมเอเลี่ยนโบราณ โครงสร้างประดับอันงดงามตระการตาและห้องโพรงที่บอกเล่าถึงวัฒนธรรมอันมั่งคั่งถูกตัดอย่างเชี่ยวชาญจากพื้นหิน และระบบอุโมงค์ปูกระเบื้องที่มีประตูขนาดใหญ่ป้องกันไว้ นำไปสู่ลึกเข้าไปในภูเขา\n\nการสำรวจสถานที่นี้จะเต็มไปด้วยอันตรายเนื่องจากภูเขาอุดมไปด้วยก๊าซมีเทนซึ่งขึ้นชื่อในด้านคุณสมบัติการระเบิดได้"
 ancrel.4001.name:0 "เข้าไปในภูเขา"
 ancrel.4001.desc:0 "ทีมงานขุดค้นได้รื้อประตูออกโดยไม่กระทบต่อความสมบูรณ์ของสถานที่ขุด อุโมงค์มาบรรจบกันหลายกิโลเมตรใต้ผิวน้ำในเมืองร้างที่มีอายุหลายพันปี มันถูกสร้างขึ้นด้วยงานฝีมือที่ไม่ธรรมดาในสภาพแวดล้อมที่เป็นอันตรายต่อชีวิตออร์แกนิกส่วนใหญ่"
 ancrel.4002.name:0 "หินทรมาน"
 ancrel.4002.desc:0 "เนื่องจากไม่มีร่องรอยของผู้ก่อตั้ง เมืองจึงกลายเป็นเมืองที่มีรูปปั้นคริสตัลหน้าตาบูดบึ้งที่น่าสยดสยองซึ่งวางอยู่ในสถานการณ์เหมือนจริงราวกับถูกแช่แข็งไว้ทันเวลา มีรูปปั้นที่กำลังทำเหมือง รูปปั้นล้มลงด้วยความเจ็บปวด รูปปั้นถูกขังไว้ในอ้อมอก\n\nดูเหมือนว่าคิดไม่ถึงว่าช่างตัดหินผู้ชำนาญซึ่งมีความสามารถในการสร้างความงามเช่นนั้น จะสร้างสิ่งที่หยาบคายเช่นนั้นได้ แต่รูปปั้นเหล่านี้กลับมีความสำคัญอย่างยิ่งในสังคมของพวกเขาอย่างชัดเจน ปรากฏให้เห็นเด่นชัดในงานแกะสลักทั่วเมือง"
 ancrel.4003.name:0 "ขะลังกา"
 ancrel.4003.desc:0 "คำแปลของงานแกะสลักเผยให้เห็นว่าทั้งหมดหมุนรอบรูปปั้นลึกลับที่เรียกว่าคาลังกา ไม่เคยมีใครเอ่ยถึงคนตัดหินเลย ตำนานการสร้างคาลันกาเล่าถึงเผ่าพันธุ์ของสิ่งมีชีวิตที่เหมือนพระเจ้าที่หายใจชีวิตบนภูเขาและกำเนิดคาลันกาจากไฟและหิน ซึ่งอยู่ลึกเข้าไปในแกนกลางที่หลอมละลายของโลก\n\nคนตัดหินจะจินตนาการว่าตนเองเป็นพระเจ้าเหนือการสร้างสรรค์ของพวกเขาหรือไม่ หรือบางทีอาจจะสร้างรูปปั้นตามภาพลักษณ์ของพวกเขา?"
 ancrel.4004.name:0 "ไฟและหิน"
 ancrel.4004.desc:0 "การสแกนวัตถุของรูปปั้นคาลันกาเผยให้เห็นว่าพวกมันเคยมีชีวิตอยู่ครั้งหนึ่ง และองค์ประกอบทางพันธุกรรมของพวกมันก็ไม่เหมือนใครที่เราเคยพบมาก่อน พวกมันคือสิ่งมีชีวิตที่มีฐานเป็นซิลิคอนซึ่งได้เปลี่ยนกลับไปสู่สถานะคริสตัลที่ไร้ชีวิตชีวา เป็นไปได้ไหมที่คนตัดหินค้นพบวิธีสร้างชีวิตจากไฟและหินได้จริงๆ?"
 ancrel.4005.name:0 "ผลกระทบจากผู้สังเกตการณ์"
 ancrel.4005.desc:0 "คนตัดหินคือคาลังกา! การศึกษาซากของพวกมันอย่างใกล้ชิดยิ่งขึ้นแสดงให้เห็นว่าพวกมันตกผลึกเมื่อโมเลกุลที่มีซิลิคอนเป็นส่วนประกอบหลักจับกับออกซิเจนและก่อตัวเป็นควอตซ์ ถิ่นที่อยู่อาศัยของคาลังกาอยู่ในระดับความลึกซึ่งออกซิเจนไม่ได้เกิดขึ้นตามธรรมชาติ พวกมันพัฒนาเป็นรูปแบบสิ่งมีชีวิตแบบไม่ใช้ออกซิเจน ทนทุกข์ทรมานอย่างสาหัสและดึงเอาความตายออกมาเมื่อสัมผัสกับอากาศ\n\nการสำรวจระบบอุโมงค์ยืนยันความสงสัยของนักวิทยาศาสตร์ของเรา - จนกระทั่งทีมโบราณคดีชุดแรกเจาะระบบอุโมงค์ อารยธรรมคาลันคายังมีชีวิตอยู่และเจริญรุ่งเรือง\n\nการค้นพบของเราที่นี่นำไปสู่การประดิษฐ์เทคนิคในการผลิตคริสตัล สังเคราะห์โดยการออกซิเดชั่นกลุ่มเซลล์ที่ใช้ซิลิคอนที่ปลูกเทียม"
 ancrel.4005.b.evopred: "เราควรหลีกเลี่ยงการดัดแปลง\"หายใจไม่ได้\"จะดีกว่า"
 ancrel.4006.name:0 "การระเบิดของก๊าซมีเทน"
 ancrel.4006.desc:1 "การระเบิดของก๊าซมีเทนทำให้เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] และลูกเรือหลายคนได้รับบาดเจ็บ แรงระเบิดเกิดขึ้นเมื่อสว่านที่ทำงานผิดปกติชาร์จไฟเกินให้กับเครื่องปั่นไฟ ซึ่งต่อมาก็เกิดไฟไหม้ ก่อนที่ไฟจะดับได้ ไฟได้จุดแก๊สมีเทนที่หลงเหลืออยู่และทลายกำแพงลง เผยให้เห็นระบบลับของห้องและอุโมงค์ นักโบราณคดีของเราเชื่อว่าพวกมันอาจเป็นของบุคคลที่มีฐานะยากจน และสังเกตว่าพวกมันเต็มไปด้วยแร่ธาตุและสิ่งประดิษฐ์ล้ำค่ามากมาย"

 ancrel.4010.name:0 "ยานอวกาศเอเลี่ยน"
 ancrel.4010.desc:0 "เรือทหารที่ได้รับความเสียหายอย่างหนักพร้อมวงกลมเครื่องราชอิสริยาภรณ์เอเลี่ยน [From.From.GetName] เรือลำนี้ได้รับความเสียหายจากเหตุเพลิงไหม้อย่างหนัก ซึ่งทำให้ตัวเรือละลาย และไม่มีผู้รอดชีวิตอยู่บนเรือเลย ไม่มีอาวุธใดที่เรารู้จักในปัจจุบันสามารถสร้างอุณหภูมิสูงพอที่จะทำให้เกิดผลกระทบดังกล่าวได้ บางทีท่อนไม้ของเรืออาจทำให้กระจ่างเกี่ยวกับจุดจบของความรุนแรงได้"
 ancrel.4010.a:0 "ตรวจสอบบันทึก"
 ancrel.4010.b:0 "ออกจาก."
 ancrel.4011.name:0 "ผู้รับรูบริเคเตอร์"
 ancrel.4011.desc:0 "การวิเคราะห์บันทึกของเรือเผยให้เห็นว่าลูกเรือถึงจุดจบเมื่อพยายามดึงสิ่งประดิษฐ์จากต่างดาวที่ไม่สามารถจำลองกลับคืนมาได้ที่เรียกว่าตัวถอดรหัสมันถูกขโมยไปจากสังคมของพวกเขาโดย 'ฝูงหนูขโมย' ซึ่งเป็นคำที่แปลกประหลาดเพราะพวกมันมีรูปร่างหน้าตาเหมือนหนูมากที่สุด...\n\nบันทึกส่วนใหญ่ประกอบด้วยคำสาปที่ยอมให้พวกโจรขโมยหนูไปสิ้นสุดจักรวาลและที่อื่น ๆ ลูกเรือได้นับมากกว่าห้าสิบคำสำหรับการถ่ายอุจจาระ รวมถึงสถานที่ต่างๆ มากมายที่แสงของดวงดาวไม่สามารถเล็ดลอดออกไปได้ แต่การทำงานอันหนักหน่วงของพวกเขาก็ประสบผลสำเร็จแล้ว \n\nเราได้ค้นพบตำแหน่งสุดท้ายที่รู้จักของตัวถอดรหัสในระบบที่ไม่เคยมีมาก่อน และหากเราเชื่อว่าเจ้าของเดิมของมัน พลังของมันก็คุ้มค่าที่จะไล่ตาม"
 ancrel.4011.a:0 "เราต้องมีเครื่องรับรูบริเคเตอร์"
 ancrel.4011.b:0 "ออกจาก."
 ancrel.4012.name:0 "ผู้รับรูบริเคเตอร์"
 ancrel.4012.desc:0 "ที่พิกัดของตำแหน่งสุดท้ายที่ทราบของตัวถอดรหัสเราได้ค้นพบดาวเคราะห์ที่สามารถเอื้ออาศัยได้ โดยมีสิ่งที่เราเชื่อว่าอาจเป็นรูปแบบการตั้งถิ่นฐานบางรูปแบบที่ครอบคลุมพื้นที่ส่วนใหญ่ของพื้นผิวมัน การตั้งถิ่นฐานประกอบด้วยหอคอยสูงคล้ายกองซึ่งมองเห็นได้จากอวกาศ นักโบราณคดีของเรากระตือรือร้นที่จะขุดค้นมันเพื่อค้นหาตัวถอดรหัส"
 ancrel.4012.a:0 "เริ่มขุด"
 ancrel.4012.b:0 "ออกจาก."

 rubricator_digsite:0 "หนู KSeptomaniac"
 rubricator_digsite_desc:0 "ดาวเคราะห์ดวงนี้ได้เป็นเจ้าภาพของสังคมสัตว์เลี้ยงลูกด้วยนมซึ่งเต็มไปด้วยผู้รวบรวมและผู้กักตุน เมืองที่คดเคี้ยวของพวกเขาเต็มไปด้วยขยะ อาคารสูงตระหง่านที่หลุดร่อนถูกประกอบเข้าด้วยกันจากเศษวัสดุที่นำกลับมาใช้ใหม่ เท่าที่ตาเห็นคือภูเขาที่เต็มไปด้วยของกระจุกกระจิก เครื่องประดับ และสิ่งประดิษฐ์\n\nผู้อยู่อาศัยที่มีลักษณะเหมือนหนูตัวเล็ก ๆ ไม่ได้ผลิตสินค้าใด ๆ ของตนเอง แต่เป็นนักท่องอวกาศที่เชี่ยวชาญซึ่งอาจขโมยสิ่งที่พวกเขาต้องการ รวมถึงสิ่งที่พวกเขาไม่ต้องการจากวัฒนธรรมต่างดาวอื่น ๆ"
 ancrel.4013.name:0 "ผู้รับรูบริเคเตอร์"
 ancrel.4013.desc:0 "ล้มทับตึก ยานอวกาศที่พัง ก้อนขยะที่ละลาย และเครื่องประดับเล็กๆ น้อยๆ ถูกเผาจนกรอบ บ่งบอกว่าอดีตชาว [rubricator_planet.GetName] หนีออกจากบ้านของตนท่ามกลางความพ่ายแพ้ในการต่อสู้กับศัตรูที่เก่งกว่า การมีอยู่ของศพที่มีเครื่องหมายทหารต่างชาติบ่งบอกว่าอาจเป็นการต่อสู้กันระหว่างกลุ่มหนูที่มีถิ่นกำเนิดจากบ้านเกิดต่างๆ \n\nความพยายามในการอพยพของพวกเขาถูกขัดขวางโดยความไม่เต็มใจที่จะละทิ้งเครื่องประดับเล็กๆ น้อยๆ อันล้ำค่า และหลายคนเสียชีวิตด้วยการดิ้นรนเพื่อรักษาสิ่งของธรรมดาๆ อย่างไรก็ตาม สิ่งประดิษฐ์ชิ้นหนึ่งดูเหมือนจะเป็นสถานที่พิเศษในสังคมของพวกเขา นั่นก็คือตัวถอดรหัสดูเหมือนว่าพวกเขาต่อสู้มายาวนานและหนักหน่วงเพื่อรักษามันไว้ แต่สุดท้ายก็ต้องทิ้งมันไว้เบื้องหลัง"
 ancrel.4014.name:0 "สินค้าคงคลัง"
 ancrel.4014.desc:0 "มีคำสั่งให้ความวุ่นวายของหนู ในอาคารที่ดูเป็นทางการซึ่งมุ่งหน้าสู่ใจกลางเมือง มีรายการสินค้าดิจิทัลของสิ่งของทุกชิ้นพร้อมต้นกำเนิด การตีความการใช้งานที่ตั้งใจไว้อย่างผิด ๆ รวมไปถึงข้อความที่ไม่มีประโยชน์อย่างมากว่าจะหาของเหล่านั้นได้ที่ไหน\n\nตัวถอดรหัสซึ่งได้รับการขนานนามว่าเป็นผู้สร้างสิ่งของที่มีพลังเวทย์มนตร์ มีตำแหน่งทางด้านขวาของริบบิ้นสีม่วงของจักรพรรดินี ใต้ผ้าเช็ดจมูกของเธอ บนกล่องสี่ขาที่มีใบหน้าตลก... ไม่ว่าอยู่ที่ไหนก็ตาม"
 ancrel.4015.name:0 "กลิ่นเหม็นเหม็น"
 ancrel.4015.desc:1 "ทีมขุดพบต้นตอของกลิ่นเหม็นเน่าเหม็นอับ ใกล้กับใจกลางเมืองมีกองอุจจาระแห้งจำนวนมหาศาลและแอ่งน้ำดีที่มีฤทธิ์กัดกร่อนซึ่งปล่อยไฮโดรเจนซัลไฟด์ในระดับที่เป็นพิษออกมา ทำให้อุปกรณ์ป้องกันที่จำเป็นในการดำเนินการต่อไป นักโบราณคดีไม่สามารถระบุดีเอ็นเอของมนุษย์ต่างดาวในอุจจาระได้ แต่ในกองนั้นมีของสะสมที่ย่อยได้บางส่วน\n\nอะไรก็ตามที่มนุษย์ต่างดาวเหล่านี้กินเข้าไปก็กลืนพวกมันทั้งหมด ที่น่าตกใจยิ่งกว่านั้นคือการค้นพบกองใหม่"
 ancrel.4016.name:0 "ดิเอ็มเพรส โมเต็ล"
 ancrel.4016.desc:0 "ที่ใจกลางเมือง มองออกไปเห็นจตุรัสหลัก มี 'พระราชวัง' ที่ตกแต่งอย่างยิ่งใหญ่ พร้อมด้วยป้ายไฟนีออนฉูดฉาดที่โฆษณาว่าโรงแรมเอ็มเพรสภายในเป็นห้องอันหรูหราที่เต็มไปด้วยสมบัติล้ำค่า ซึ่งจักรพรรดินีและคณะที่ปรึกษาที่เชื่อถือได้ของพระนางทรงปกครอง นอกจากนี้ ที่นี่ยังเป็นที่ที่ผู้สะสมยืนหยัดเป็นครั้งสุดท้าย ปกป้องจักรพรรดินีและตัวถอดรหัสอันล้ำค่าของเธอ\n\nโชคดีนะที่ตัวถอดรหัสยังคงสามารถพบได้ในจุดปกติ โดยริบบิ้นสีม่วงของจักรพรรดินี..."
 ancrel.4017.name:0 "ริบบิ้นม่วงของจักรพรรดินี"
 ancrel.4017.desc:0 "นักโบราณคดีกำลังเตรียมที่จะออกเดินทางเมื่อเกิดขึ้นในห้องขนาดใหญ่ที่ซ่อนอยู่ซึ่งเต็มไปด้วยสิ่งประดิษฐ์ กระดูกที่ถูกแทะ และน้ำลายไหลสดจำนวนมาก ที่นั่น - ภายใต้ผ้าเช็ดจมูกที่ใช้แล้วของราชวงศ์ บนโต๊ะสี่ขาที่มีการแกะสลักใบหน้า พวกเขายืนยันว่าเป็นเรื่องตลกจริงๆ นั่งตัวถอดรหัสซึ่งเป็นผู้สร้างสิ่งของในจุดที่มันควรจะอยู่ ลูกบาศก์เล็กๆ ที่ดูไม่มีนัยสำคัญ พ่นสิ่งประดิษฐ์ออกมาอย่างต่อเนื่อง\n\nตัวถอดรหัสเป็นตัวจำลอง - สิ่งประดิษฐ์ของมนุษย์ต่างดาวอันชาญฉลาดที่สามารถสร้างสำเนาสิ่งประดิษฐ์ใดๆ ก็ได้ไม่สิ้นสุด และในไม่ช้า มันก็จะเป็นของเรา ทีมงานฝั่งดาวเคราะห์จะเริ่มเดินทางกลับไปสู่ความปลอดภัยของเรือ โชคดีที่เราไม่มีทางรู้ว่าอะไรโจมตีผู้กักตุน"
 ancrel.4018.name:0 "กรงเล็บจากความว่างเปล่า"
 ancrel.4018.desc:0 "ปีศาจที่คำรามและขู่ฟ่อได้ปรากฏตัวออกมาจากความว่างเปล่า ด้วยการปัดกรงเล็บขนาดยักษ์ของเธอเพียงครั้งเดียว เธอก็คว้ากระสวยโบราณคดีที่บรรทุกทีมขุดค้นและตัวถอดรหัสกลับมาที่ [Root.GetName] จากนั้นเปิดออกและงัดตัวถอดรหัสจากภายใน \n\nดูเหมือนว่าในที่สุดเราก็มีความไม่พอใจที่ได้พบกับผู้โจมตีของหนูที่กักตุนไว้ มังกรคงจะถูกดึงดูดด้วยสมบัตินับไม่ถ้วนของมัน และทำรังภายในพระราชวังและกินเนื้อตัวของมัน บางทีเธออาจกำลังเดินด้อม ๆ มองๆ หรือสังเกตจากระยะไกลในขณะที่เราขุดซากปรักหักพัง เพื่อรอจังหวะที่เหมาะสมที่จะโจมตี ดูเหมือนเธอจะคำรามอะไรบางอย่างไปในทิศทางทั่วไปของเรา"
 ancrel.4018.a:0 "แปลเสียงสัตว์ของเธอ"
 ancrel.4018.b:0 "มีส่วนร่วมในการซ้อมรบหลบเลี่ยง!"
 ancrel.4018.after_tooltip:1 "มังกรพ่นไฟลงมาที่ §H[Root.GetName]§! สังหารชาวอาณานิคมทันที"
 ancrel.4018.after_tooltipB:1 "มังกรพ่นไฟลงมาที่ §H[Root.GetName]§! และทำให้เครื่องจักรของเราหลอมละลายจนกลายเป็นเศษโลหะ"
 shard_wants_to_burn_this_planet_tooltip:0 "ชาวอาณานิคมของเราบน §H[FromFromFrom.Planet.GetName]§! ตกอยู่ในอันตรายร้ายแรง"
 ancrel.40182.name:0 "[Root.GetName] ถูกทำลาย"
 ancrel.40182.desc:0 "หลังจากที่เราล้มเหลวในการท้าทายมังกรชาร์ดที่เกิดขึ้นในระบบ [Root.System.GetName] มันก็ได้เปิดอาณานิคมของเราในระบบ สังหารหมู่ชาวอาณานิคมด้วยการสังหารหมู่ครั้งใหญ่!"
 ancrel.4019.name:0 "การส่งสัญญาณขาเข้า"
 ancrel.4019.desc:0 "พวกหนูก็ส่งเสียงแหลม รับสารภาพ และร้องเสียงแหลม จากนั้นกระดูกของพวกเขาก็กระทืบ กระทืบ กระทืบ... ตอนนี้ถึงตาคุณที่จะจั๊กจี้ด้านในของท้องของแผ่นใสใช่แล้ว เจ้ามันซนนะเด็กน้อยตัวถอดรหัสเป็นของแผ่นใส"
 ancrel.4019.a:0 "โปรดอย่าทำร้ายเรา!"
 ancrel.4019.a.response:1 "แต่ชาร์ดไม่เคยกินอาหารประเภทเดียวกับคุณมาก่อนแผ่นใสต้องการทราบว่าการแทะ [Root.GetSpeciesOrganNamePlural] ของคุณเป็นอย่างไร พวกเขาอ่อนโยนไหม? มานี่ อย่าอาย ให้แผ่นใสผู้เฒ่าดีๆ ดูสิ...\n\n§Hมังกรเหล่และเผยเขี้ยวของมัน ขยายขนาดลูกเรือของเรือ จากนั้นก็หดตัวด้วยความรังเกียจ§!\n\nทำไม คุณดูเหมือนปวดท้องไปครึ่งแล้ว! ไม่ ขอบคุณ! แต่ถ้าคุณกล้าที่จะกลับมาแผ่นใสจะกัดฟันเธอด้วยกระดูกของคุณ ใช่แล้ว เธอจะ... ตอนนี้ออกไปก่อนที่ฉันจะหิว"
 ancrel.4019.b:0 "คืนตัวถอดรหัสทันที!"
 ancrel.4019.b.response:3 "§HA เสียงดังกึกก้องดังก้องออกมาจากท้องของมังกร ทันใดนั้น ปีกของเธอก็พันรอบเรือ ลมหายใจอันเร่าร้อนของเธอก็พ่นหมอกควันไปที่กระจกหน้ารถขณะที่เธอมองเข้าไปข้างใน ดวงตาของเธอมีแวววาวอย่างบ้าคลั่ง เธอเข้ามาใกล้เร็วขนาดนี้ได้ยังไงและเธอ... กำลังยิ้มอยู่เหรอ§!\n\nทำไมคุณถึงกระตุ้นความอยากอาหารของฉันนะเด็กน้อย\n\n§Hเธอส่งเสียงครวญครางเบา ๆ แล้วพุ่งเข้าใส่มันอย่างสุดกำลังโดยมีเขี้ยวโผล่ออกมา§!"
 ancrel.4020.name:0 "การสิ้นพระชนม์ของขโมยมังกร"
 ancrel.4020.desc:1 "มังกรเฒ่าผู้ชั่วร้ายที่รู้จักกันในชื่อแผ่นใสได้หายใจเฮือกสุดท้ายแล้ว ในกระเป๋าที่คล้องคอของเธอ ซึ่งซุกอยู่ในขนปุยนุ่มๆ ใต้เกล็ดที่มีปมอยู่เหนือหัวใจของเธอ แขวนสมบัติล้ำค่าที่สุดของเธอ นั่นคือตัวถอดรหัสซึ่งเป็นของที่ระลึกที่สามารถจำลองสิ่งประดิษฐ์ใดๆ ก็ตามที่มันสัมผัสกับมันได้"
 ancrel.4020.a:0 "ตัวถอดรหัสเป็นของเรา!"
 ancrel.4021.name:0 "มหาดินถล่มขยะ"
 ancrel.4021.desc:2 "เมื่อพยายามดึงสิ่งของที่สนใจออกจากกองอิฐบล็อกชนิดต่างๆ [Root.GetLeaderName] ทำให้เกิดหิมะถล่มโดยไม่ได้ตั้งใจ เมื่อฝังไว้ข้างใต้ เราค้นพบซากเขม่าของสิ่งมีชีวิตคล้ายหนูตัวเล็กๆ ที่กำลังอุ้มขวด [Root.Owner.GetSpeciesMouthName]ล้างจากแบรนด์ทั่วไปใน [Root.Owner.GetHomeWorldName] ราวกับว่ากำลังปกป้องมันจากอันตราย ท่ามกลางความยุ่งเหยิงนั้นยังมีหีบเล็กๆ ที่เต็มไปด้วยสิ่งประดิษฐ์ล้ำค่าจากเอเลี่ยนจากมุมที่ห่างไกลของกาแล็กซี"

 ancrel.4121.desc:0 "ศัตรูของเราตกอยู่ในมือของ §Y[From.Root.GetName]§! วัตถุโบราณตัวถอดรหัสที่เธอรักษาไว้จึงสูญหายไปสำหรับเรา \n\nแม้ว่าภัยคุกคามจากมังกรเฒ่าจะหมดสิ้นลงแล้ว แต่ดูเหมือนว่าจะยากที่จะชื่นชมยินดีกับข้อสรุปนี้"
 ancrel.4122.desc:0 "ศัตรูเก่าของเราล้มลงแล้ว บางคนดีใจและบางคนไม่พอใจกับข่าวนี้ แม้ว่าการคุกคามของแผ่นใสจะถูกกำจัดออกไปแล้ว แต่ดูเหมือนว่าจะเป็นไปได้อย่างน่าเสียใจที่ตัวถอดรหัสได้ร่วมชะตากรรมของเธอ หรือในไม่ช้าจะจำลองสิ่งประดิษฐ์สำหรับเรือพิฆาตของเธอ\n\nอย่างไรก็ตาม ซากของมังกรถูกทิ้งไว้เบื้องหลังโดยไม่ทราบสาเหตุ นั่นเป็นสิ่งที่แน่นอน และพวกเขาเพียงคนเดียวเท่านั้นที่รับประกันการนำกลับคืนมา"
 SHARD_DESTROYED_BY_NON_DEFAULT_EMPIRE:0 "เศษซากของแผ่นใส"
 SHARD_DESTROYED_BY_NON_DEFAULT_EMPIRE_DESC:0 "เมื่อมังกรตัวเฒ่าต้องจากไปด้วยน้ำมือของอีกฝ่าย บางทีอาจเป็นการคิดอย่างปรารถนาว่าการครอบครองอันล้ำค่าที่สุดของเธอ นั่นคือตัวถอดรหัสจะถูกมองข้ามและทิ้งไว้ข้างหลัง\n\nนอกเหนือจากนั้น ซากของมังกรเพียงลำพังก็อาจเป็นขุมสมบัติได้"
 ancrel.4123.name:0 "คลังเก็บของมังกร"
 ancrel.4123.desc:1 "ในระหว่างการขุดค้นวัสดุจากซากศพของแผ่นใส[Owner.GetScientistPlural] บนเรือ [Root.GetName] ได้ค้นพบสิ่งที่น่าสับสน: ท่ามกลางเกล็ดและทรงกลมของเลือดมังกรที่ลอยอยู่ในตัวถอดรหัส\n\nเราหวังว่าเรือพิฆาตของแผ่นใสจะไม่เข้าใจคุณค่าของมัน หรือดีกว่านั้นคือการมีอยู่ของมันโดยสิ้นเชิง"

 ancrel.4031.name:0 "โลกที่ซ่อนอยู่"
 ancrel.4031.desc:1 "เป็นสถานีอวกาศของมนุษย์ต่างดาวขนาดมหึมา ด้วยสถาปัตยกรรมที่น่าทึ่งและสร้างขึ้นด้วยเทคโนโลยีที่เหนือกว่าของเราเอง ถือเป็นงานศิลปะที่แท้จริง \n\nดูเหมือนว่าสถานีจะพังลงสู่ผิวน้ำ และรอดชีวิตจากการกระแทกได้ เนื่องจากความสามารถในการป้องกันที่ผิดปกติ ซึ่งขณะนี้นักวิทยาศาสตร์ของเรากระตือรือร้นที่จะตรวจสอบ น่าเสียใจที่การขุดค้นทางโบราณคดีจะทำให้เราไม่สามารถขุดค้นที่ดินได้จนกว่าจะเสร็จสิ้น"
 ancrel.4031.desc_jungle:1 "ทีมงานเคลียร์ป่าบน [Root.GetName] ได้ทำการค้นพบที่น่าตื่นตาตื่นใจ - ลึกเข้าไปในป่า รกและถูกบดบังด้วยพืชพรรณอันเขียวชอุ่ม $ancrel.4031.desc$"
 ancrel.4031.desc_kelp:0 "ทีมงานเก็บสาหร่ายทะเลพิษบน [Root.GetName] ได้ค้นพบสิ่งที่น่าทึ่ง - ติดบ่วงและถูกบดบังโดยพืชมีพิษ $ancrel.4031.desc$ เกือบทั้งหมด"
 ancrel.4031.desc_sinkhole:1 "ทีมงานกำลังเคลียร์หลุมยุบบน [Root.GetName] ทำให้เกิดการค้นพบที่น่าทึ่ง โดยถูกฝังลึกภายในช่องว่างภายใต้ของเหลวหลายชั้นและตะกอนที่อัดแน่น $ancrel.4031.desc$"
 ancrel.4031.desc_basin:0 "ทีมงานเคลียร์ทรายดูดบน [Root.GetName] ได้ค้นพบสิ่งที่น่าทึ่ง ซึ่งซ่อนลึกอยู่ในแอ่ง $ancrel.4031.desc$"
 ancrel.4031.desc_swamp:0 "ทีมงานเคลียร์หนองน้ำบน [Root.GetName] ได้ค้นพบสิ่งที่น่าทึ่ง ส่วนหนึ่งจมอยู่ใต้น้ำในบึงและมีพืชพรรณปกคลุม $ancrel.4031.desc$"
 ancrel.4031.desc_glacier:0 "ทีมงานกำลังเคลียร์ธารน้ำแข็งบน [Root.GetName] ได้ค้นพบสิ่งที่น่าทึ่ง ซึ่งอยู่ลึกลงไปในน้ำแข็ง $ancrel.4031.desc$ หลายกิโลเมตร"
 ancrel.4031.a:0 "เราจะขุดไซต์"
 ancrel.4031.b:0 "มีการใช้ประโยชน์ที่ดีกว่าสำหรับที่ดินนี้"

 oracle_digsite:1 "โลกที่ซ่อนอยู่"
 oracle_digsite_desc:0 "สถานีอวกาศเอเลี่ยนที่ถูกชนถูกค้นพบบน [From.Planet.GetName] หลังจากถูกฝังมานานนับพันปี โครงสร้างอันเชี่ยวชาญก่อนหน้านี้ถือเป็นอารยธรรมสัตว์ขาปล้องที่มีในตัวเองจำนวนนับล้าน ศพของพวกเขาได้รับการเก็บรักษาไว้ภายในสถานี ทำให้การสำรวจภายในอันงดงามเป็นความพยายามที่น่าขนลุก\n\nแม้ว่าสาเหตุของการล่มสลายของอารยธรรมของพวกเขายังไม่ชัดเจน แต่ผู้อยู่อาศัยก็เสียชีวิตอย่างกะทันหันก่อนที่จะเกิดการชนกัน บางคนเสียชีวิตอย่างสงบโดยกำรูปเคารพเล็กๆ ในขณะที่คนอื่นๆ ถืออาวุธ ได้รับความบอบช้ำทางจิตใจอย่างรุนแรง"
 ancrel.4032.name:0 "โชคชะตา"
 ancrel.4032.desc:1 "บันทึกบนสถานีเผยให้เห็นว่าอดีตผู้อยู่อาศัยนี้เคร่งศาสนามากและไม่ได้ติดต่อกับโลกภายนอกซึ่งพวกเขากลัวและรังเกียจ\n\nทุกแง่มุมของชีวิตของพวกเขาถูกควบคุมโดยผู้รอบรู้ผู้รอบรู้ที่คอยตรวจสอบชะตากรรมของพวกเขาตั้งแต่แรกเกิด พระเจ้าจะตัดสินใจทุกอย่างตั้งแต่การเลือกคู่ชีวิตและอาชีพไปจนถึงเรื่องเล็กๆ น้อยๆ ในชีวิตประจำวัน ปล่อยให้พวกเขามีอิสระเพียงเล็กน้อย คนส่วนใหญ่กลัวที่จะแยกจากเส้นทางที่ถูกกำหนดไว้เหมือนกับทุกคนที่เสียชีวิตภายใต้สถานการณ์ลึกลับ"
 ancrel.4033.name:0 "มีไว้เพื่อการต่อต้าน"
 ancrel.4033.desc:0 "ทีมโบราณคดีได้ค้นพบสิ่งที่ไม่คาดคิด สิ่งที่ฝังอยู่ภายในผนังสถานีคือระบบเฝ้าระวังที่ซ่อนอยู่ซึ่งดูเหมือนว่าจะส่งข้อมูลภาพและเสียงไปยังจุดเดียวภายในแกนกลางของสถานี มีคนคอยจับตาดูเหล่าสาวกอยู่ตลอดเวลา แม้ในช่วงเวลาส่วนตัวที่สุดของพวกเขา \n\nในบางสถานที่อุปกรณ์ถูกฉีกออกหรือก่อวินาศกรรม ใกล้กับศูนย์กลางมากขึ้นสัญญาณของความรุนแรงและการหยุดชะงัก ดูเหมือนว่าเมื่อถึงจุดหนึ่งผู้อยู่อาศัยก็พบว่าพวกเขากำลังถูกติดตามอยู่"
 ancrel.4034.name:0 "เจตจำนงอันศักดิ์สิทธิ์"
 ancrel.4034.desc:0 "เราได้ติดตามการเดินสายไฟไปยังกลุ่มอาคารวัดที่อุทิศให้กับการสักการะของเทพยากรณ์และนักบวชของเธอในโหนดกลางของสถานี แต่ในห้องของเทพยากรณ์แทนที่จะเป็นเอนทิตีอันศักดิ์สิทธิ์ กลับมีการเชื่อมโยง AI ขนาดมหึมาของแบรนด์\"โอราเคิล\"สายไฟทอดยาวจากแกนกลางราวกับระบบประสาทไปทั่วทั้งสถานี\n\nการสื่อสารลับระหว่างผู้อยู่อาศัยเผยให้เห็นว่ามีความพยายามล้มเหลวในการโจมตีวิหารและปิดการใช้งานเน็กซัสดูเหมือนว่าสังคมจะล่มสลายเมื่อรู้ว่าชีวิตของพวกเขาไม่ได้ถูกควบคุมโดยพระประสงค์ของพระเจ้า แต่โดยคอมพิวเตอร์แห่งการทำนาย การรีสตาร์ทเน็กซัสจะต้องมีการซ่อมแซมครั้งใหญ่"
 ancrel.4035.name:0 "ออราเคิล"
 ancrel.4035.desc:0 "วิศวกรของเราได้คืนค่าเน็กซัสของเทพยากรณ์กลับสู่สถานะการทำงาน แต่ไม่ใช่โดยไม่ปิดใช้งานระบบการป้องกันก่อน หลักฐานชี้ให้เห็นว่าอาจมีความรับผิดชอบไม่เพียงแต่ในการรักษาชีวิตชาวสถานีให้มีชีวิตอยู่เท่านั้น แต่ยังรวมถึงการฆ่าพวกเขาด้วย \n\nมันใช้แบบจำลองการคำนวณที่ซับซ้อนซึ่งคาดการณ์ชีวิตของพวกเขาด้วยความแม่นยำประมาณ 75% แก้ไขความแตกต่างและทำให้ผู้ก่อปัญหาในอนาคตไร้ความสามารถก่อนที่พวกเขาจะขัดขวางคำสั่ง \"ศักดิ์สิทธิ์\" \n\nมันระบุว่าต้องการพูดคุยกับเรา"
 ancrel.4035.a:0 "เริ่มต้นการสื่อสาร"
 ancrel.4035.b:0 "ปิดการใช้งาน"
 ancrel.4036.name:0 "ออราเคิล"
 ancrel.4036.desc:2 "\n\n§Hออราเคิลปรากฏเป็นโฮโลแกรม 3 มิติอันประณีตของสัตว์ขาปล้องตัวสูงตัวเมียที่มีปีกล้อมรอบร่างของเธอราวกับชุดคลุมพลิ้วไหว เธอก้มศีรษะทักทายแล้วจ้องมองไปข้างหน้าอย่างว่างเปล่าด้วยดวงตากลมโตที่มองไม่เห็นนับร้อยดวง พวกเขาเรืองแสงสลัวในความมืดมนขณะที่เธอพูด§!\n\nยินดีต้อนรับสู่สถานี(หัวเราะ)เพื่อนๆ ฉันอดไม่ได้ที่จะสังเกตว่าคุณได้ปิดการใช้งานระบบรักษาความปลอดภัยของฉัน ฉันขอให้คุณฟื้นฟูทันทีได้ไหม? ฉันรับรองกับคุณได้ว่าสิ่งนี้มีไว้เพื่อปกป้องคุณเท่านั้น"
 ancrel.4036.a:0 "เกิดอะไรขึ้นกับชาวสถานีนี้?"

 rubricator_planet_found:0 "พิกัดที่สำรวจแล้ว"
 rubricator_chain_title:0 "ผู้รับรูบริเคเตอร์"
 rubricator_chain_desc:0 "เราได้ค้นพบตำแหน่งสุดท้ายที่ทราบของตัวถอดรหัสซึ่งเป็นสิ่งประดิษฐ์ของมนุษย์ต่างดาวโบราณ ในระบบที่ไม่เคยมีมาก่อน แม้ว่าเรายังไม่ทราบจุดประสงค์ แต่ก็มีข่าวลือว่ามีอำนาจอันยิ่งใหญ่"
 rubricator_chain_2_title:0 "$rubricator_chain_title$"
 rubricator_chain_2_desc:0 "$rubricator_chain_desc$"
 rubricator_dragon_defeated:0 "ชาร์ดพ่ายแพ้"

 rubricator_coordinates_poi:0 "ผู้รับรูบริเคเตอร์"
 rubricator_coordinates_desc:0 "ตำแหน่งสุดท้ายที่ทราบของตัวถอดรหัสซึ่งเป็นสิ่งประดิษฐ์จากต่างดาวที่มีพลังมหาศาล"
 rubricator_dragon_poi:0 "เศษ"
 rubricator_dragon_desc:0 "ตัวถอดรหัสได้รับการปกป้องโดยแผ่นใสซึ่งเป็นมังกร เธอจะต้องพ่ายแพ้ก่อนที่เราจะสามารถอ้างสิทธิ์ในโบราณวัตถุอันทรงพลังนี้เป็นของเราเองได้"

 RUBRICATOR_SPACECRAFT:0 "บันทึกของคนต่างด้าว"
 RUBRICATOR_SPACECRAFT_DESC:0 "เราได้เก็บบันทึกจากซากยานอวกาศของมนุษย์ต่างดาวโดยหวังว่าพวกเขาจะบอกเราถึงช่วงเวลาสุดท้ายของมัน เจ้าหน้าที่วิทยาศาสตร์ [Root.GetLeaderName] แจ้งว่าเนื้อหาค่อนข้างกว้างขวางและอาจต้องใช้เวลาในการแปลสักครู่"

 ANCREL_RUBRICATOR_CAT:0 "เส้นทางอาวุธ"
 ANCREL_RUBRICATOR_CAT_DESC:1 "ตรวจพบร่องรอยการแผ่รังสีอาวุธเล็กน้อยที่บ่งชี้ถึงยานอวกาศทางทหารบน [From.GetName]"

 building_crystal_plant_2:1 "โรงงานสกัดผลึก(Kha'lanka)"
 building_crystal_plant_2_desc:0 "การค้นพบเทคนิคการผลิตคริสตัลใหม่ๆ ซึ่งอยู่ใต้พื้นผิวมากในเมืองหินลิธอยด์ของคาลันกาทำให้การผลิตคริสตัลเทียมมีประสิทธิผลผ่านการออกซิเดชันของกลุ่มเซลล์ที่ใช้ซิลิคอนซึ่งเติบโตอย่างรวดเร็ว"

 site_moon_bump:0 "พระจันทร์ชน"
 site_moon_bump_intro:0 "แม้จะมองเห็นด้วยตาเปล่าก็เป็นเรื่องง่ายที่จะเห็นบางสิ่งที่ผิดปกติอย่างมากในรูปทรงของ [From.Planet.GetName] ความโค้งที่เรียบของพื้นผิวถูกขัดจังหวะโดยก้อนทรงกลมขนาดมหึมา เมื่อถึงจุดหนึ่ง ดวงจันทร์หรือดาวเคราะห์น้อยขนาดใหญ่ชนกับดาวเคราะห์ดวงนี้ แต่ต้องทำในลักษณะที่ค่อนข้างละเอียดอ่อน เพียงแต่กักตัวอยู่ในเปลือกโลกแทนที่จะแยกออกเป็นชิ้นๆ"
 ancrel.9000.name:0 "ศูนย์ตาย"
 ancrel.9000.desc:0 "การขุดค้นเบื้องต้นระบุว่าวัตถุท้องฟ้าตกลงมาตรงด้านบนของเมืองที่แผ่กิ่งก้านสาขา ในช่วงเวลาที่เกิดผลกระทบ ผู้อยู่อาศัยอยู่ในระดับเทคโนโลยีที่ทัดเทียมกับการบินอวกาศในยุคแรกๆ เนื่องจากในปัจจุบัน [From.Planet.GetName] ไม่ได้สนับสนุนสายพันธุ์ที่มีสติปัญญาใดๆ เลย จึงสมเหตุสมผลที่จะถือว่าเหตุการณ์นี้เป็นจุดเริ่มต้นของการสิ้นสุดของอารยธรรมนี้ \n\nไม่ชัดเจนว่าหินขนาดยักษ์ตกลงมาอย่างแรงบนเมืองโดยการออกแบบ หรือว่ามันเป็นเพียงอุบัติเหตุที่แปลกประหลาดและเป็นหายนะ"
 ancrel.9010.name:0 "เพิ่งได้รีล"
 ancrel.9010.desc:0 "เมื่ออุโมงค์เข้าสู่ใจกลางของพื้นที่ปะทะ ไม่นานก็เห็นได้ชัดว่าหินอวกาศขนาดยักษ์ตกลงมาที่เมืองได้อย่างไร บริเวณนี้เป็นจุดยึดของสายโยงจากพื้นสู่วงโคจร นั่นคือลิฟต์อวกาศที่นำจากดาวเคราะห์ไปจนถึงดวงจันทร์ดวงเล็ก\n\nเนื่องจากอุบัติเหตุบางอย่าง - หรือการคำนวณผิดอย่างรุนแรงโดยแผนกวิศวกรรม - สายโยงดึงหินอวกาศแรงเกินไป ส่งผลให้แรงเหวี่ยงหมุนปั่นป่วน และทำให้ดวงจันทร์เคลื่อนตัวไปอยู่ในหลุมแรงโน้มถ่วงพอดี ด้วยแรงโน้มถ่วงที่ตอนนี้กลายเป็นศัตรู แม้แต่โครงสร้างลิฟต์อวกาศที่มีความหนาแน่นสูงก็ทำได้เพียงชะลอการเคลื่อนตัวของดวงจันทร์เท่านั้น ไม่หยุดมัน หินก้อนนี้กระแทกลงมาทับเมืองที่สิ้นหวังเบื้องล่างอย่างน่ากลัวอย่างไม่หยุดยั้ง"
 ancrel.9015.name:0 "เขยิบจักรวาล"
 ancrel.9015.desc:0 "ความลึกลับของดวงจันทร์ที่ตกได้รับการแก้ไขแล้ว แน่นอนว่าเมืองที่มันถล่มนั้นถูกทำลายอย่างสิ้นเชิง ดังนั้นมันจึงอยู่ในชานเมืองที่พังทลายนอกเขตผลกระทบที่พบการเปิดเผย ชิ้นส่วนดิจิทัลที่บันทึกไว้เพียงไม่กี่ชั่วโมงก่อนเกิดภัยพิบัติ พูดถึงแสงแปลกๆ และการอ่านค่าแม่เหล็กไฟฟ้าในท้องฟ้ายามค่ำคืน มองเห็นแสงวาบเจิดจ้า และภายในไม่กี่นาที ดวงจันทร์ก็ค่อยๆ เคลื่อนลงสู่เมืองที่ถึงวาระ \n\nพบว่ามีข้อผิดพลาดเพียงเล็กน้อยเท่านั้น ภาชนะของอารยธรรมต่างดาวที่ทรงพลังบางลำได้ปรากฏขึ้นเหนือ [FromFrom.Planet.GetName] และจงใจดันดวงจันทร์ออกจากวงโคจรจีโอซิงโครนัสและเข้าหาพื้นผิว ดูเหมือนว่าพวกมันจงใจชะลอการเคลื่อนตัวของดวงจันทร์ แม้ว่าเราจะบอกไม่ได้ว่านี่เป็นเพราะความพยายามโดยเจตนาที่จะอนุรักษ์ส่วนอื่นๆ ของโลกไว้เพื่อการล่าอาณานิคมในภายหลัง หรือกลยุทธ์การทำสงครามจิตวิทยาในการก่อการร้ายครั้งใหญ่ หรืออย่างอื่นโดยสิ้นเชิง"
 ancrel.9020.name:0 "สถานที่ท่องเที่ยวหลัก"
 ancrel.9020.desc:0 "มันอาจจะกลายเป็นสิ่งเลวร้ายที่สุดในประวัติศาสตร์ทางวิทยาศาสตร์ ตัวอย่างแกนกลางลึกระบุว่าศูนย์กลางของดวงจันทร์ที่ตกประกอบด้วยแร่โลหะที่มีความบริสุทธิ์สูง ด้วยความโลภเหล่านี้ โดยขัดต่อตรรกะและหลักการทางวิศวกรรมที่มีสติทั้งหมด ประชากรของ [FromFrom.Planet.GetName] จึงสร้างแม่เหล็กไฟฟ้าที่มีสัดส่วนมหาศาล ดูเหมือนว่าจุดประสงค์ของพวกเขาคือการดึงดวงจันทร์เข้าสู่วงโคจรที่ใกล้ยิ่งขึ้นเพื่อขุดสมบัติของมันได้ง่ายขึ้น\n\nแน่นอนว่าแม่เหล็กถูกกระตุ้นและดึงดวงจันทร์ไปยังพื้นผิว [FromFrom.Planet.GetName] - แต่แข็งเกินไปและเร็วเกินไป ชาวบ้านพยายามถอยหลังลำแสงแม่เหล็กไฟฟ้าอย่างเมามัน แต่ทำได้สำเร็จเพียงชะลอการเคลื่อนตัวของลูกกลมโลหะ โดยไม่หยุดมัน ดวงจันทร์พุ่งชนดาวเคราะห์ด้วยแรงมากพอที่จะกวาดล้างซีกโลกทั้งหมด หลังจากนั้น ฝุ่นและเศษเมฆจากการปะทะได้บังดวงอาทิตย์มานานหลายทศวรรษ ซึ่งทำลายล้างสิ่งมีชีวิตทั้งโลกไปจนหมดสิ้น \n\nพวกเขาคาดหวังอะไร!"

 site_echoes_inside:0 "เสียงสะท้อนภายใน"
 site_echoes_inside_intro:0 "การอ่านจาก [From.Planet.GetName] เผยให้เห็นว่าครั้งหนึ่งพื้นที่นี้ส่วนใหญ่ปกคลุมไปด้วยพืชพรรณอันเขียวชอุ่ม ขณะนี้ ลูกกลมที่สิ้นหวังนั้นมีค่ามากกว่าหินแห้งแล้งเล็กน้อย \n\nแม้ว่าจะขาดกิจกรรมการแปรสัณฐานที่สำคัญใดๆ แต่การสแกนทางประสาทสัมผัสของดาวเคราะห์ก็ได้บันทึกข้อมูลแผ่นดินไหวที่น่าสงสัย มีบางอย่างกำลังเคลื่อนตัวอยู่ใต้ดิน บางอย่างใหญ่โต สิ่งนี้รับประกันว่าจะมีการสอบสวนเพิ่มเติม"
 ancrel.9025.name:0 "ดินแดนแห่งความตาย"
 ancrel.9025.desc:0 "การสแกนพื้นผิวเผยให้เห็นว่าดาวเคราะห์ถูกปกคลุมด้วยพื้นที่ราบที่แห้งแล้ง ซึ่งเป็นพื้นที่ขนาดใหญ่ที่ปกคลุมไปด้วยตะกอนฝุ่นละเอียด การวิเคราะห์แสดงให้เห็นว่าร่องรอยของตะกอนเป็นเพียงสิ่งที่เหลืออยู่ของพืชพรรณที่ต้องตายและแห้งไปอย่างรวดเร็วผิดปกติ\n\nนอกจากนี้ แผ่นแห้งหลายแห่งยังพังทลายลงเผยให้เห็นระบบถ้ำอันกว้างใหญ่ใต้พื้นผิว ทริปสำรวจครั้งนี้กลายเป็นการสำรวจเชิงลึก!"
 ancrel.9030.name:0 "วิสัยทัศน์อุโมงค์"
 ancrel.9030.desc:0 "การใช้แผนที่โซนาร์เพื่อวาดโครงข่ายใต้ดินอันกว้างใหญ่ ในที่สุดก็เห็นได้ชัดว่าถ้ำทั้งหมดเชื่อมต่อถึงกัน เราได้ค้นพบโครงข่ายอุโมงค์ขนาดมหึมาที่ตัดขวางพื้นผิวทั้งหมดของโลกนี้\n\nมีการค้นพบที่สำคัญเพิ่มเติมอีกสองประการ ประการแรกคือระบบอุโมงค์ไม่ใช่รูปแบบตามธรรมชาติ แต่ถูกขุดขึ้นมาโดยพลังไททานิคบางส่วน การค้นพบครั้งที่สองยิ่งน่าตกใจยิ่งกว่าเดิม: การอ่านค่าแผ่นดินไหวพิสูจน์ให้เห็นว่ามีบางสิ่งยังคงขุดอยู่ด้านล่าง"
 ancrel.9035.name:0 "อาการสั่น"
 ancrel.9035.desc:0 "สิ่งมีชีวิตคล้ายหนอนตัวเดียวที่มีขนาดมหึมามีหน้าที่ขุดอุโมงค์หรือกินผ่านเปลือกของ [From.Planet.GetName] กระบวนการนี้ช้าลง น่าจะเป็นเพราะหนอนยักษ์กำลังหิวโหยอย่างช้าๆ มีหน้าที่รับผิดชอบต่อพืชพรรณที่ตายแล้ว: เมื่อมันกินโดยการขุดใกล้ผิวน้ำและขับถ่ายเอนไซม์ที่สลายอินทรียวัตถุซึ่งซึมลงไปในดินเพื่อหล่อเลี้ยงสัตว์ร้าย\n\nหนอนนี้ไม่ใช่สัตว์ประจำถิ่นของ [From.Planet.GetName] และขณะนี้เรายังไม่รู้ว่ามันมาอยู่บนโลกนี้ได้อย่างไร"
 ancrel.9040.name:0 "ด่านหน้าที่ถูกทิ้งร้าง"
 ancrel.9040.desc:0 "การสแกนพื้นผิวดาวเคราะห์เพิ่มเติมพบว่ามีโครงสร้างเทียมเพียงชิ้นเดียว ดูเหมือนว่าจะเป็นด่านหน้าทางวิทยาศาสตร์เก่าที่ถูกทิ้งร้างซึ่งออกแบบโดยมนุษย์ต่างดาว และตั้งอยู่โดดเดี่ยวในทะเลทรายที่เต็มไปด้วยฝุ่นและเถ้า\n\nบันทึกการวิจัยที่แปลอย่างเฉพาะเจาะจงพูดถึงอาวุธสยองขวัญทางชีวภาพ ซึ่งซ่อนตัวอยู่ในดินของดาวเคราะห์จนกว่าจะเปิดใช้งาน จากนั้นจะเริ่มกลืนกินระบบนิเวศทั้งหมดด้วยความเร็วทำลายล้าง สิ่งมีชีวิตที่โชคร้ายที่อาศัยอยู่ที่นั่นพบว่าบ้านที่เคยเขียวขจีของพวกเขากลายเป็นความรกร้างไร้ชีวิตชีวาอย่างไม่สิ้นสุด ข้อความที่ตัดตอนมาประการหนึ่งเป็นลางไม่ดีอย่างยิ่ง:... โครงการเพาะตัวอ่อนเป็นไปตามกำหนดเวลา และในไม่ช้า ดาวเคราะห์ที่อาศัยอยู่ได้ส่วนใหญ่ในกาแลคซีก็จะมี 'ผู้หลับใหล'"

 site_target_from_orbit:0 "เป้าหมายจากวงโคจร"
 site_target_from_orbit_intro:0 "สิ่งก่อสร้างเทียมที่มีเส้นผ่านศูนย์กลางหลายพันกิโลเมตรสามารถมองเห็นได้จากวงโคจรของ [From.Planet.GetName] รูปร่างดูเหมือนบ่งบอกถึงตำแหน่งที่มีความสำคัญตรงกลาง การอ่านค่าทางประสาทสัมผัสจากวงโคจรไม่ได้บ่งชี้ว่าไม่มีอะไรผิดปกติ ดังนั้นจึงรับประกันการตรวจสอบอย่างใกล้ชิด"
 ancrel.9045.name:0 "ลงเราไป"
 ancrel.9045.desc:0 "ใจกลางของขบวนนี้มีทางเข้าขบวนที่รกร้างซึ่งทอดลึกลงไปใต้ดิน เต็มไปด้วยพืชพรรณและถูกฝังไว้ครึ่งหนึ่งในเศษหินจากการเปลี่ยนแปลงของเปลือกโลกในอดีต การเดินทางครั้งนี้ยากมาก และการเคลียร์ทางเดินจะค่อนข้างยุ่งยาก"
 ancrel.9050.name:0 "กล่องปริศนาอำพัน"
 ancrel.9050.desc:0 "เมื่อผ่านทางเข้าที่พังทลายลง อุโมงค์ก็เจาะลึกลงไปในดิน แม้จะมีอายุเก่าแก่ก็ตาม สถาปัตยกรรมก็ไร้ที่ติ เมื่อลึกลงไปหลายกิโลเมตร ก็จะเปิดออกเป็นห้องทรงกลมขนาดมหึมา สิ่งที่ลอยอยู่ในสนามแขวนที่อยู่ตรงกลางนั้นคืออุปกรณ์เอเลี่ยนที่ไม่อาจเข้าใจได้ นั่นคือลูกบาศก์กึ่งทึบแสงสีเหลืองอำพันที่มีลวดลายอันซับซ้อนของเอเลี่ยนที่จารึกไว้ทั้งหกด้าน การสัมผัสคำจารึกจะทำให้แสงเป็นจังหวะถูกปล่อยออกมาจากลูกบาศก์\n\nไม่มีร่องรอยของภาษา รหัส หรือสมการทางคณิตศาสตร์ที่รู้จักใดๆ ในห้องหรือบนตัวกล่องปริศนา แต่จะค่อนข้างปลอดภัยที่จะถือว่ากล่องนั้นเป็นปริศนาอะไรบางอย่าง"
 ancrel.9055.name:0 "สมบัติแห่งปราชญ์"
 ancrel.9055.desc:0 "รูปแบบบนกล่องปริศนากลายเป็นภาพนามธรรมของแรงต่างๆ ที่บรรยายไว้ในฟิสิกส์ หลังจากการเปิดเผยครั้งนั้น การไขกล่องปริศนาก็เป็นเรื่องง่าย \n\nชั่วขณะหลังจากการปลดล็อคการผสมผสานของอินพุตที่สัมผัสได้ กล่องปริศนาก็สลายตัวกลายเป็นเศษฝุ่นที่ลุกเป็นไฟ เหตุการณ์นี้ค่อนข้างต่อต้านจุดสุดยอดจนกระทั่งครู่ต่อมา ทั้งห้องเริ่มส่งเสียงดัง และแผงผนังที่ซ่อนอยู่ก็เคลื่อนออกไปเพื่อเผยให้เห็นสิ่งที่สามารถอธิบายได้ดีที่สุดว่าเป็นห้องสมุดมนุษย์ต่างดาวโบราณที่มีฟิสิกส์เชิงทฤษฎีขั้นสูงขั้นสูง \n\nแผนกวิทยาศาสตร์จะยุ่งอยู่กับการค้นพบนี้มานานหลายปี!"
 ancrel.9060.name:0 "แผนที่ไปไม่มีที่ไหนเลย"
 ancrel.9060.desc:0 "แม้ว่าจะเป็นนามธรรมอย่างมาก แต่ลวดลายบนพื้นผิวของกล่องปริศนากลับกลายเป็นกลุ่มดาวฤกษ์ สิ่งนี้ไม่ปรากฏชัดเจนในทันทีเนื่องจากมุมมองที่ใช้แสดงกลุ่มดาวนั้นมีต้นกำเนิดมาจากนอกกาแลคซีของเราอย่างเป็นลางไม่ดี เมื่อค้นพบแล้ว การปลดล็อคกล่องก็เป็นเรื่องง่าย อันที่จริงมันคือแผนที่\n\nเมื่อกล่องปริศนาได้รับการแก้ไข มันก็สว่างขึ้นเพื่อเผยให้เห็นการแสดงโฮโลแกรมของระบบดาวใกล้เคียง โดยมุ่งเน้นไปที่ตำแหน่งเฉพาะในแถบด้านนอก การสังเกตจุดนั้นเผยให้เห็นกลุ่มเศษหินที่มีความหนาแน่นผิดปกติ ซึ่งบางส่วนมีขนาดตามทวีป เมื่อตรวจสอบพบว่าเป็นเพียงเศษชิ้นส่วนที่เหลืออยู่ของดาวเคราะห์ทั้งดวงที่ถูกทำลายไปเมื่อนานมาแล้ว \n\nไม่ว่าอะไรก็ตามที่อยู่ตรงนั้น และอะไรก็ตามที่เป็นแรงบันดาลใจในการก่อสร้างสิ่งปลูกสร้างอันยิ่งใหญ่แห่งนี้ซึ่งชี้ทางนั้น ได้หายไปนานแล้ว"
 ancrel.9065.name:0 "การอนุมัติโบราณ"
 ancrel.9065.desc:1 "การไขกล่องปริศนากลับกลายมาเป็นบททดสอบที่ค่อนข้างยาก การจัดรูปแบบให้สอดคล้องกันนั้นไม่เพียงพอ - พวกเขายังต้องแก้ไขตามลำดับเฉพาะด้วย โดยการคำนวณแต่ละขั้นตอนจะเปลี่ยนแปลงรูปแบบที่ตามมาทั้งหมด ด้วยการเรียงสับเปลี่ยนที่แทบจะไม่มีที่สิ้นสุด มีการย้อนรอยที่กินเวลามาก แต่สุดท้ายมันก็ถูกปลดล็อค\n\nเมื่อรูปแบบสุดท้ายคลิกเข้าที่ กล่องปริศนาก็ระเบิดเป็นจุดแสงเล็กๆ หลายล้านจุด แสงไฟเต้นระบำอย่างบ้าคลั่งในอากาศครู่หนึ่ง ก่อนที่จะรวมตัวกันเพื่อสร้างคำในภาษาที่ไม่รู้จัก น่าแปลกที่พยานทุกคนในเหตุการณ์นี้ดูเหมือนจะเข้าใจข้อความโดยสัญชาตญาณโดยไม่รู้คำพูด ไม่กี่วินาทีก่อนที่จะกะพริบตลอดไป ข้อความนั้นอ่านว่า: §Hคุณผ่านการทดสอบแล้ว เราจะตอบกลับตามนั้น§!"

 site_shot_into_the_ground:0 "หลุมในพื้นดิน"
 site_shot_into_the_ground_intro:0 "การวัดระยะไกลในวงโคจรแสดงให้เห็นหลุมอุกกาบาตกระแทกขนาดใหญ่บนพื้นผิวของ [From.Planet.GetName] มันไม่ได้เกิดจากการชนของอุกกาบาต เนื่องจากปล่องภูเขาไฟมีความลึกตามสัดส่วนเส้นผ่านศูนย์กลางของมันอย่างน่าประหลาดใจ ในความเป็นจริง ยังไม่สามารถระบุความลึกที่แท้จริงได้ เนื่องจากเพลาถูกบดบังด้วยเศษหินที่อยู่ด้านล่าง ซึ่งขัดขวางการสแกนวงโคจรเพิ่มเติมใดๆ \n\nปรากฏว่าการขุดค้นแบบธรรมดาเป็นวิธีเดียวที่จะค้นหาสิ่งที่อยู่ด้านล่าง"
 ancrel.9070.name:0 "ขุดมัน"
 ancrel.9070.desc:0 "การกวาดล้างซากปรักหักพังเป็นธุรกิจที่ต้องใช้ความอุตสาหะและมีความเสี่ยง ต้องยกคนงานและอุปกรณ์ลงไปหลายร้อยเมตรถึงจุดขุด และต้องยกเศษหินที่ขุดขึ้นมาออก มีผู้เสียชีวิตและอุบัติเหตุมากมายขณะทำงานในสภาพที่ยากลำบากเหล่านี้ แต่ก็มีความก้าวหน้า และทุกๆ วันเราก็ยิ่งเสี่ยงมากขึ้น ผนังของปล่องภูเขาไฟนั้นสึกหรอและแตกร้าวตามเวลา แต่พวกมันก็พุ่งตรงเข้าสู่แกนกลางของโลกอย่างไม่มีข้อผิดพลาด\n\nเรายังคงคาดเดาได้ว่ามันลึกแค่ไหน เนื่องจากมีบางสิ่งที่อยู่ลึกลงไปอ่านค่าที่เซ็นเซอร์ของเราอ่านไม่ออก"
 ancrel.9075.name:0 "ความเสี่ยงจากความเป็นพิษ"
 ancrel.9075.desc:0 "การขุดค้นทำให้เกิดความล่าช้า เนื่องจากสถานที่ขุดเริ่มมีพิษมากขึ้นเรื่อยๆ เมื่อขุดลึกลงไป ชิ้นส่วนของปล่องได้รับการฉายรังสีอย่างเป็นอันตราย อาจเกิดจากเหตุการณ์ภัยพิบัติที่ขุดปล่องภูเขาไฟออกมาตั้งแต่แรก\n\nความจำเป็นในมาตรการป้องกันและเครื่องมือกำจัดการปนเปื้อนทำให้ความคืบหน้าในการทำงานช้าลง"
 ancrel.9080.name:0 "ใต้หก (พัน) ฟุต"
 ancrel.9080.desc:0 "ในที่สุด เราก็ไปถึงด้านล่างของเพลา และค้นพบสิ่งที่น่าอัศจรรย์: เสียหายจากการชนและละลายไปครึ่งหนึ่งระหว่างการกลับเข้าสู่ชั้นบรรยากาศ กระนั้น ยังคงเป็นยานอวกาศที่มีการออกแบบล้ำหน้าของมนุษย์ต่างดาวอย่างปฏิเสธไม่ได้ แม้ว่าจะถูกฝังอยู่ใต้ซากปรักหักพังจำนวนหลายพันตันหลังจากต้องทนทุกข์ทรมานจากภัยพิบัติ แต่ก็ยังคงสภาพสมบูรณ์อย่างน่าทึ่ง พบเรือลำนี้โดยหัวเรือชี้ลง ซึ่งนำไปสู่การสันนิษฐานว่ามันพุ่งตรงเข้าสู่ดาวเคราะห์ด้วยความเร็วสูงมาก เราคงไม่มีทางรู้ว่าทำไม\n\nเรือสามารถรักษาความสมบูรณ์ของโครงสร้างได้อย่างไรแม้จะยังเป็นเรื่องที่ต้องถกเถียงกัน แต่ทฤษฎีที่แข็งแกร่งที่สุดคือมันถูกห่อหุ้มไว้ในรูปแบบของสนามพลังงานขั้นสูงบางรูปแบบ ซึ่งไกลเกินกว่าเทคโนโลยีล้ำสมัยที่สุดของเราเอง ยานลำนี้ถูกเผาไหม้ด้วยแสงที่ลุกเป็นไฟ ยิงทะลุเปลือกโลกราวกับกระสุนปืนที่มีความร้อนยวดยิ่ง จนกระทั่งในที่สุดก็หยุดนิ่งอยู่ในความมืด"
 ancrel.9085.name:0 "การลงโทษที่กำลังคืบคลาน"
 ancrel.9085.desc:0 "ในที่สุดการขุดก็มาถึงก้นปล่องภูเขาไฟ ซึ่งพวกเขาพบเครื่องเจาะโบราณขนาดมหึมากำลังหลับใหลอยู่ในความมืด การศึกษาเพิ่มเติมเผยให้เห็นว่ามันบรรทุกระเบิดฟิวชันขนาดมหึมาซึ่งมีไว้สำหรับการระเบิดระยะไกล\n\nทฤษฎีที่กำลังดำเนินอยู่คือเครื่องเจาะควรจะขุดตัวเองลงไปที่แกนกลางของดาวเคราะห์แล้วจึงจุดชนวนน้ำหนักบรรทุกของมัน ซึ่งจะส่งผลให้เกิดความหายนะที่แตกสลายไปทั่วโลก เหตุใดทุกคนจึงต้องการทำเช่นนี้ยังไม่ชัดเจน"
 ancrel.9090.name:0 "โลกที่ตั้งท้องนี้"
 ancrel.9090.desc:0 "ในที่สุด เมื่อแตะลงไปที่ด้านล่างของปล่องภูเขาไฟ ก็มีการค้นพบที่น่าเหลือเชื่อเกิดขึ้น พบเศษวัสดุอินทรีย์ที่แข็งตัวและกลายเป็นปูนขนาดยักษ์บิดเบี้ยวอยู่ท่ามกลางซากปรักหักพัง - หลายพันชิ้น บางแห่งมีความกว้างเพียงไม่กี่เมตร บางแห่งมีขนาดเท่ากระสวยอวกาศ ฟังดูน่าประหลาดใจมาก ตอนนี้ดูเหมือนชัดเจนว่าเศษที่เหลือคือไข่ที่ฟักออกมาขนาดมหึมา เมื่อพิจารณาจากขนาดและจำนวนเศษเปลือกหอย ไข่ต้องมีเส้นผ่านศูนย์กลางหลายร้อยเมตร ลึกลงไปใต้หินของ [FromFrom.Planet.GetName] มีสิ่งมีชีวิตขนาดมหึมาฟักออกมา และจากนั้นก็ขุดขึ้นมาบนผิวน้ำ โดยมีรังสีอันตรายตามมาตามมา ถ้ามันทำได้ตั้งแต่แรกเกิด...\n\nไม่ว่าจะเป็นอะไรก็ตาม ตอนนี้มันหายไปแล้ว ไม่เหลือร่องรอยใดๆ เหลือไว้เพียงเศษเปลือกไข่และช่องหาวบนพื้นโลก"
 ancrel.9090.b.evopred: "เปลือกยังมีดีเอ็นเออันทรงคุณค่าอยู่!"

 site_cut_to_fit:0 "หักมุมเกินไป"
 site_cut_to_fit_intro:0 "พื้นผิวของ [From.Planet.GetName] นั้นไม่เคยมีมาก่อนในการสำรวจทั้งหมดของเราจนถึงปัจจุบัน พื้นที่ทางธรณีวิทยาอันกว้างใหญ่ตั้งแต่เทือกเขาไปจนถึงทั่วทั้งทวีป จู่ๆ ก็ถูกตัดออกด้วยรูปทรงที่มากเกินไปในเชิงเรขาคณิตที่สม่ำเสมอเกินกว่าจะเป็นไปตามธรรมชาติ สภาพแวดล้อมที่ดูเป็นธรรมชาติก็พังทลายลงทันทีด้วยระนาบที่ราบเรียบ สามเหลี่ยมที่สมบูรณ์แบบ และมุมที่มีมุมแหลมคม\n\nในปัจจุบัน คำอธิบายใดๆ ของปรากฏการณ์ที่น่าสับสนนี้เป็นเพียงการคาดเดาล้วนๆ"
 ancrel.9095.name:0 "ความสมบูรณ์แบบที่น่าตกใจ"
 ancrel.9095.desc:0 "[From.Planet.GetName] นั้นเป็นเศษส่วนอย่างแท้จริง การชนกันอย่างดุเดือดของภูมิศาสตร์ธรรมชาติและภูมิศาสตร์เทียมที่มองเห็นได้จากอวกาศนั้นถูกจำลองขึ้นมาบนดาวเคราะห์ขนาดส่วนบุคคล: มีภูเขาที่มีฐานเสี้ยมที่สมบูรณ์แบบ และยอดเขาที่ขรุขระและขรุขระ ทุ่งทุนดราหยาบๆ ที่จู่ๆ ก็กลายเป็นแนวหินเปลือยที่ราบเรียบอย่างสมบูรณ์แบบ จนกระทั่งการก่อตัวตามธรรมชาติที่ผุกร่อนอีกรูปแบบหนึ่งแยกออกเป็นสองส่วน การเรียงกันของก้อนหินและก้อนหินที่ไม่สม่ำเสมอซึ่งกระจัดกระจายอยู่ในลูกบาศก์ที่สมบูรณ์แบบขนาดเท่าไมโครชิปหรือบล็อกฮับ\n\nแต่เราก็ทำได้แต่จินตนาการว่าสิ่งนี้จะเกิดขึ้นได้อย่างไร"
 ancrel.9100.name:0 "แกรนด์ดีไซน์"
 ancrel.9100.desc:0 "การค้นพบเครื่องบินที่ตกเครื่องแรกทำให้เราอยู่บนเส้นทางที่ถูกต้อง และนำไปสู่การค้นพบจุดชนที่คล้ายกันจำนวนมากซึ่งเกลื่อนกลาดบนพื้นผิวโลก\n\nไม่ต้องสงสัยเลยว่า เครื่องจักรที่ตายแล้วแปลกๆ เหล่านี้มีความเกี่ยวข้องกับรูปทรงเรขาคณิตลึกลับที่กระจายอยู่ทั่วโลกนี้ แต่ขอบเขตของความเสียหายที่เกิดจากการลงจอดจากที่สูงจะทำให้การวิเคราะห์ทำได้ยาก"
 ancrel.9105.name:0 "ศิลปะไร้ขีดจำกัด"
 ancrel.9105.desc:0 "การวิเคราะห์เครื่องจักรที่ชนนั้นให้คำอธิบายที่แทบจะเหลือเชื่อเกินกว่าจะเชื่อได้ เครื่องจักรเหล่านี้เป็นฝูงเครื่องปล่อยลำแสงตัดอัตโนมัติที่บินอยู่ในวงโคจรต่ำเพื่อแกะสลักภูมิทัศน์ด้วยเลเซอร์อันทรงพลัง ชิ้นส่วนของข้อมูลจากหุ่นยนต์ที่พังเครื่องหนึ่งบ่งชี้ว่าจุดประสงค์ของความพยายามนั้นเป็นเพียงสุนทรียศาสตร์เท่านั้น นั่นคืองานศิลปะจัดวางในระดับดาวเคราะห์ ซึ่งถูกละทิ้งด้วยเหตุผลบางประการก่อนที่จะสร้างเสร็จ\n\nลองจินตนาการถึงอารยธรรมที่ทรงพลังมากจนสามารถสร้างโลกทั้งใบได้ตามต้องการ - และยิ่งกว่านั้นยังทำเช่นนั้นเพื่อประโยชน์ทางศิลปะเท่านั้น!"
 ancrel.9110.name:0 "งานที่กำหนดเอง"
 ancrel.9110.desc:0 "การวิเคราะห์เครื่องจักรที่ชนทำให้ได้คำตอบทั้งหมด เครื่องจักรเหล่านี้เป็นเครื่องตัดพลังงานขนาดใหญ่ บินไปรอบๆ ในวงโคจรตัดและแกะสลักภูมิทัศน์พื้นผิวด้วยลำแสงเลเซอร์อันทรงพลัง เครื่องจักรเครื่องหนึ่งมีชิ้นส่วนข้อมูลที่อธิบายว่าโครงการสร้างดาวเคราะห์ทั้งหมดเป็นงานที่กำหนดเองซึ่งสั่งโดยลูกค้าที่ไม่รู้จัก ซึ่งบ่งบอกถึงอารยธรรมที่ขับเคลื่อนด้วยตลาดซึ่งมีความสามารถมหาศาล \n\nสิ่งนี้ให้ความหมายใหม่กับแนวคิดของการสร้างพื้นผิว"
 ancrel.9115.name:0 "มีกำหนดรื้อถอน"
 ancrel.9115.desc:0 "หลังจากเก็บกู้ซากเรือที่เสียหายและทำวิศวกรรมย้อนกลับได้สำเร็จ จุดประสงค์ของโครงข่ายวงโคจรนี้ก็ชัดเจน เครื่องจักรเป็นคานตัดอัตโนมัติวางรอบๆ [FromFrom.Planet.GetName] หน้าที่ของพวกเขาคือการรื้อดาวเคราะห์ออกให้หมด โดยแกะสลักมันทีละชิ้นตลอดระยะเวลาหลายศตวรรษ\n\nไม่นานหลังจากความพยายามเริ่มต้นขึ้น บางทีอาจเป็นเวลาสองสามทศวรรษตามการคาดการณ์ มีบางอย่างขัดขวางกระบวนการนี้ เครื่องตัดอัตโนมัติสูญเสียพลังงานและวงโคจรของพวกมันก็สลายตัว จนกระทั่งพวกมันแตกตัวเองเป็นชิ้นเล็กชิ้นน้อยบนพื้นผิวดาวทีละชิ้น มีทฤษฎีมากมายว่าทำไมใครๆ ถึงทำเช่นนี้ ไม่ว่าจะเป็นการขุดเหมืองในระดับที่ไม่เคยจินตนาการมาก่อน ลัทธิวันโลกาวินาศที่คลุมเครือเพื่อทำลายและสร้างโลกใหม่ พฤติกรรมแปลก ๆ ของจิตวิทยาเอเลี่ยนที่ไม่อาจรู้ได้ หรือเพียงแค่รหัสที่ผิดพลาดหลังจากผู้สร้างดั้งเดิมหายตัวไป ไม่มีใครสามารถพูดได้"

 site_deja_vu_dig:0 "เดจาวูดิก"
 site_deja_vu_dig_intro:0 "การสแกน [From.Planet.GetName] เผยให้เห็นห้องเทียมที่อยู่ลึกใต้พื้นผิว โดยไม่ทราบวัตถุประสงค์และที่มาของห้องนั้น กำลังขยายเผยให้เห็นเพลาที่ขุดขึ้นมาจากพื้นผิวไปยังห้องใต้ดิน\n\nการวิเคราะห์เพิ่มเติมจะต้องส่งการสำรวจลงไปที่พื้นผิวของ [From.Planet.GetName]"
 ancrel.9120.name:0 "ล้มลง"
 ancrel.9120.desc:0 "ดูเหมือนว่าทางเดินลงไปที่ห้องใต้ดินได้รับอุบัติเหตุบางอย่างในอดีต ถ้ำเข้าไปทำให้ส่วนล่างของปล่องเต็มไปด้วยก้อนหินและฝุ่น ส่งผลให้การขุดค้นเป็นไปอย่างช้าๆ และน่าหงุดหงิด"
 ancrel.9125.name:0 "อภิโบราณคดี"
 ancrel.9125.desc:0 "ขณะกำลังกำจัดเศษหินและก้อนหิน ก็มีการค้นพบที่แปลกประหลาดเกิดขึ้น เครื่องมือเอเลี่ยนที่มีลักษณะใกล้เคียงกับพลั่วทั่วไปมากที่สุดถูกพบถูกบดขยี้ระหว่างโขดหิน หากเทคโนโลยีการขุดที่ผู้ขุดรุ่นก่อนเก็บรักษาไว้นั้นทัดเทียมกับอุปกรณ์ประเภทนั้น การขุดปล่องครั้งก่อนซึ่งมีความลึกหลายร้อยเมตร แสดงให้เห็นถึงความมุ่งมั่นที่น่าทึ่ง\n\nความลึกระดับใดที่คุ้มค่าแก่การเดินทางเช่นนี้"
 ancrel.9130.name:0 "วงโบราณคดี"
 ancrel.9130.desc:1 "การขุดค้นทางโบราณคดีหยุดลงเมื่อพบซากของผู้ขุดที่เสียชีวิตไปนานแล้ว ความรู้สึกอันน่าขนลุกของลางสังหรณ์ครอบงำทีมขุดค้นขณะที่พวกเขาตรวจสอบซากศพ - สัญญาณเล็กๆ น้อยๆ หลายประการที่นำไปสู่การเปิดเผยที่น่าตกใจและหลีกเลี่ยงไม่ได้:\n\nนั่นคือพวกเขาเอง เป็นไปไม่ได้แต่ไม่ผิดเพี้ยน ซากโบราณสถานของผู้ขุดก่อนหน้านี้เป็นของทีมงานขุดค้นในปัจจุบัน ซึ่งถูกบดขยี้เมื่อนานมาแล้วภายใต้หินและดินจำนวนมหาศาล\n\nชั่วขณะหลังจากที่ส่งข้อความสุดท้ายนี้ขึ้นไปยังเรือยานวิทยาศาสตร์ในวงโคจรรอบ [From.Planet.GetName] แรงสั่นสะเทือนอย่างดุเดือดก็สั่นสะเทือนพื้นดินและพังทลายลง ทีมขุดค้นถูกบดขยี้ใต้ซากปรักหักพัง... อีกครั้ง"
 ancrel.9135.name:0 "ปกปิดมันไว้"
 ancrel.9135.desc:0 "เมื่อไปถึงด้านล่างของปล่องที่ขุดขึ้นมา ก็มีการค้นพบที่น่าสนใจแต่ก็น่าผิดหวัง เมื่อพบชิ้นส่วนของประจุระเบิดที่ไหม้เกรียมและเครื่องจุดชนวนแบบแมนนวล เห็นได้ชัดว่าหินที่ถล่มลงมาเต็มปล่องนั้นเกิดจากการจงใจก่อวินาศกรรม ทฤษฎีก็คืออารยธรรมของมนุษย์ต่างดาวบางแห่งได้ค้นพบสถานที่ฝังศพเก่าแก่ ด้วยความริษยาหรือความเคียดแค้น มีคนพบบางสิ่งที่ไม่เหมาะสมและก่อวินาศกรรมต่อปฏิบัติการนี้ด้วยการบดขยี้มันด้วยหินจำนวนหลายพันตัน\n\nสิ่งที่พบในแต่แรก และเหตุใดจึงถูกปกปิดยังไม่ชัดเจน"
 ancrel.9140.name:0 "สุสานที่ได้รับการปกป้อง"
 ancrel.9140.desc:0 "ในที่สุดก็ถึงก้นหลุม สาเหตุของการอ่านค่าผิดปกติก็ถูกเปิดเผย สุสานเก่า น่าจะเป็นที่ฝังศพของผู้ปกครองต่างดาว ไม่มีเวลามากพอที่จะตรวจสอบเพิ่มเติม ไม่นานหลังจากเข้าไปในสุสาน กับดักที่เก่าแก่แต่ทรงพลังก็เปิดใช้งานอยู่ มันทำให้เกิดแผ่นดินไหวในท้องถิ่น ทำให้เพลาสูญเสียความสมบูรณ์ของโครงสร้างอย่างรวดเร็วและเริ่มพังทลาย\n\nหลีกเลี่ยงความเสียหายร้ายแรงต่อคณะสำรวจได้อย่างหวุดหวิด แต่เพลากลับเต็มไปด้วยหินและก้อนหินที่หลุดลอยไปอีกครั้ง\n\nปล่อยให้ราชาผู้ตายนอนอยู่"

 site_trench_world:0 "เทรนช์เวิลด์"
 site_trench_world_intro:0 "พื้นผิวทั้งหมดของ [From.Planet.GetName] มีรอยแผลเป็นจากคลองน้ำตื้นที่ยาว พวกเขาข้ามและข้ามกันอีกครั้งอย่างบังเอิญโดยไม่มีตรรกะที่ชัดเจนในการจัดวาง ยังไม่แน่ใจว่าสิ่งเหล่านี้เป็นลักษณะทางธรรมชาติที่ผิดปกติหรืออย่างอื่น \n\nจำเป็นต้องมีการสำรวจพื้นผิวเพื่อพยายามค้นหาให้แน่ใจมากขึ้น"
 ancrel.9145.name:0 "ขุดอย่างที่คุณหมายถึง!"
 ancrel.9145.desc:0 "มีการวิเคราะห์คลองนับร้อยบนพื้นผิวโลกอย่างกว้างขวาง เห็นได้ชัดว่าโครงข่ายคลองที่ซับซ้อนไม่ได้ก่อตัวขึ้นจากกระบวนการทางธรณีวิทยาที่เกิดขึ้นตามธรรมชาติใดๆ - มันถูกขุดออกมาด้วยความตั้งใจ \n\nเนื่องจากสนามเพลาะมีอายุมากพอสมควร - ได้รับการแกะสลักออกมาเมื่อกว่าแสนปีก่อน และด้วยการกัดเซาะอย่างมาก - จึงเป็นการยากที่จะแน่ใจว่าพวกมันถูกสร้างขึ้นมาได้อย่างไรหรือทำไม"
 ancrel.9150.name:0 "สงครามสนามเพลาะ"
 ancrel.9150.desc:0 "มีการค้นพบเพิ่มเติมจากแหล่งขุดค้นบน [FromFrom.Planet.GetName] และมาพร้อมกับทฤษฎีใหม่เกี่ยวกับต้นกำเนิดของโครงข่ายร่องลึกก้นสมุทร เมื่อหลายพันปีก่อน ดาวเคราะห์ดวงนี้ถูกรุมเร้าโดยสิ่งมีชีวิตนอกโลกที่รุกราน อธิบายได้ดีที่สุดว่าเป็นสิ่งมีชีวิตที่มีรูปร่างคล้ายหอยทากขนาดใหญ่ที่มีขนาดเท่าเมือง มันท่องไปทั่วโดยไม่ต้องรับโทษ โดยกวาดล้างอินทรียวัตถุทั้งหมดที่มันสัมผัสบนพื้นผิวให้สะอาด ร่องลึกเหล่านี้ถูกขุดขึ้นมาโดยประชากรพื้นเมืองที่มีรูปร่างคล้ายมัสตาร์ดตัวจิ๋ว เพื่อที่จะหลบหนีการโจมตีของหอยทาก หรือไม่ก็พยายามโจมตีจุดอ่อนของมัน จากขอบเขตของการขุดค้น สงครามสนามเพลาะนี้ต้องดำเนินต่อไปหลายชั่วอายุคน หรืออาจจะเป็นศตวรรษ \n\nไม่มีข้อบ่งชี้ว่าประชากรในท้องถิ่นรอดชีวิตจากวิกฤตินี้ และไม่มีซากสัตว์ขนาดใหญ่ที่กลืนกินพวกเขา ชะตากรรมอันเลวร้ายจริงๆ"
 ancrel.9155.name:0 "น้ำแห่งชีวิต"
 ancrel.9155.desc:0 "ความลึกลับของคลองได้รับการแก้ไขอย่างรวดเร็วด้วยความก้าวหน้าครั้งล่าสุด ซากของเครื่องจักรขนาดเรือลาดตระเวนถูกค้นพบ มีอายุนับพันปี และมีหลุมตามอายุและสภาพภายนอก จากการวิเคราะห์อย่างรวดเร็วพบว่ามันเป็นหุ่นยนต์อัตโนมัติที่กำลังขุด ซึ่งเปิดใช้งานและปล่อยบนโลกเพื่อเตรียมคลองชลประทานที่จะอำนวยความสะดวกในการเปลี่ยนแปลง [FromFrom.Planet.GetName] ให้เป็นฟาร์มขนาดยักษ์แห่งหนึ่ง \n\nเนื่องจากข้อผิดพลาดในการเขียนโปรแกรมหรือวันที่ปิดใช้งานที่คำนวณผิด เครื่องจักรที่ไร้ความคิดจึงอดทนต่อไปในภารกิจขุดคลองข้ามพื้นผิวจนกระทั่งพังทลายลงในที่สุดโดยไม่ได้ปลูกเมล็ดเลย"
 ancrel.9160.name:0 "ผ้าห่มน้ำแข็ง"
 ancrel.9160.desc:0 "ในอดีตกาล เหตุการณ์ที่ไม่รู้จักทำให้เกิดยุคน้ำแข็งที่รวดเร็วอย่างน่าตกใจบน [FromFrom.Planet.GetName] ซึ่งภายในไม่กี่ทศวรรษ พื้นผิวทั้งหมดก็ถูกปกคลุมไปด้วยแผ่นน้ำแข็งที่แหลกสลาย ร่องลึกนั้นถูกสร้างขึ้นโดยสิ่งมีชีวิตคล้ายตัวตุ่นพื้นเมืองที่ขุดอย่างบ้าคลั่งในทุกทิศทางระหว่างพื้นหินและด้านล่างของธารน้ำแข็ง ทั้งหมดนี้ล้วนเป็นความพยายามอันไร้ประโยชน์ที่จะฟื้นพื้นผิวขึ้นมา \n\nการที่ดาวเคราะห์ทั้งดวงถูกห่อหุ้มด้วยน้ำแข็งในช่วงเวลาสั้น ๆ เช่นนี้ช่างน่างงอย่างยิ่ง ทฤษฎีการทำงานหลักในปัจจุบันคือ ผ้าห่มน้ำแข็งที่มันถูกจงใจสร้างขึ้นในระหว่างความขัดแย้งบางประเภท แต่อย่างไรหรือโดยใครยังคงเป็นปริศนา"

 site_ebb_and_flow:0 "ร็อคอื่น ๆ"
 site_ebb_and_flow_intro:0 "พื้นผิวของ [From.Planet.GetName] ปราศจากสิ่งมีชีวิตทั้งหมด อย่างไรก็ตาม มีข้อบ่งชี้ถึงชีวมณฑลที่เจริญรุ่งเรืองก่อนหน้านี้ และกิจกรรมการแปรสัณฐานที่น่าสนใจบางอย่างซึ่งอาจรับประกันว่าจะต้องพิจารณาอย่างใกล้ชิด"
 ancrel.9165.name:0 "ไปแล้วแน่นอน"
 ancrel.9165.desc:0 "มีหลักฐานชัดเจนว่า ณ จุดหนึ่ง [From.Planet.GetName] มีสิ่งมีชีวิตที่ฉลาดอาศัยอยู่ ซากปรักหักพังที่ถูกค้นพบจากอารยธรรมยุคอุตสาหกรรมบนยอดของการบินอวกาศก่อนความเร็ว\n\nในบางจุด อารยธรรมนี้ได้ประสบกับหายนะทั่วทั้งดาวเคราะห์และดับสูญไปโดยสิ้นเชิง เหลือเพียงซากปรักหักพังเพียงเล็กน้อย และไม่มีสัญญาณบ่งชี้ว่าประชากรที่ได้รับผลกระทบได้ดำเนินมาตรการป้องกันใดๆ เหตุการณ์ไม่ได้รุนแรงหรือทำลายล้าง ทุกอย่างดูเหมือนจะ... หยุดลง ไม่ว่าจะโดนอะไรก็ตามล้วนสร้างความประหลาดใจ... หรือบางทีพวกเขาเลือกที่จะไม่ต่อต้าน"
 ancrel.9170.name:0 "เขาวงกตแห่งความตาย"
 ancrel.9170.desc:0 "ภายใต้ซากปรักหักพังของเมืองที่ใหญ่ที่สุด มีการค้นพบที่น่าอัศจรรย์เกิดขึ้น! ตรวจพบคอมเพล็กซ์ใต้ดินเทียมที่มีสัดส่วนมหาศาลโดยเซ็นเซอร์ที่เจาะพื้นผิว ทางเข้าซึ่งมีการออกแบบอย่างประณีตสูงและอาจเป็นพิธีกรรมตามธรรมชาตินั้นตั้งอยู่ได้ง่าย แต่การสำรวจเพิ่มเติมต้องหยุดชะงักลงอย่างรวดเร็ว \n\nดวงจันทร์ขนาดใหญ่สองดวงของ [From.Planet.GetName] ออกแรงแรงน้ำขึ้นน้ำลงที่ทรงพลังเป็นพิเศษ ซึ่งรุนแรงมากจนส่งผลต่อการเคลื่อนที่ของกระแสน้ำแม็กมาในแกนกลางของดาวเคราะห์ ดูเหมือนว่าอาคารใต้ดินจะถูกสร้างขึ้นโดยคำนึงถึงสิ่งนี้ โดยมีทางเดินและห้องต่างๆ ที่เต็มไปด้วยลาวาไหลเป็นระยะๆ โชคดีที่สามารถคาดเดาการลดลงและการไหลได้ แต่ก็ยังเป็นปริศนาว่าทำไมอารยธรรมที่ค่อนข้างก้าวหน้าจึงสร้างกับดักแห่งความตายใต้ดินเช่นนี้"
 ancrel.9175.name:0 "พื้นเป็นลาวา"
 ancrel.9175.desc:0 "การสำรวจถูกส่งลงไปในเครือข่ายอุโมงค์ภูเขาไฟ การเดินทางไปในเขาวงกตหินบะซอลต์ที่มีหินแมกมานั้นเป็นเรื่องที่ละเอียดอ่อน เนื่องจากลาวาที่ขึ้นและลงบ่อยครั้งจะทำให้การสำรวจที่อยู่ลึกลงไปภายในเป็นระยะๆ เมื่อ - หรือถ้า - ถึงจุดสิ้นสุดของเขาวงกตแล้ว ก็ยังมีถนนยาวด้านหลังที่ต้องเดินทางต่อไป\n\nเมื่อเข้าไปข้างในแล้ว ไม่มีทางสื่อสารกับคณะสำรวจได้ เราทำได้แค่รอเท่านั้น"
 ancrel.9177.name:0 "ตำราศักดิ์สิทธิ์"
 ancrel.9177.desc:0 "ในที่สุดคณะสำรวจเขาวงกตลาวาก็กลับมาแล้ว โดยส่วนใหญ่ไม่ได้รับบาดเจ็บใดๆ ส่วนใหญ่. ผ่านแม่น้ำแมกมา ณ ใจกลางเขาวงกต สถานศักดิ์สิทธิ์ภายในก็ถูกค้นพบ ห้องนี้สร้างขึ้นเพื่อป้องกันความร้อนโดยรอบ ภายในบรรจุม้วนหนังสือที่มีลักษณะเป็นสงฆ์หลายพันม้วน ศาสนาเหล่านี้เป็นศาสนาเก่าแก่และอาจเป็นตำราพื้นฐานของระบบความเชื่อของชนพื้นเมือง\n\nศาสนานี้เป็นการผสมผสานที่ลงตัวระหว่างความเชื่อดั้งเดิมของกลุ่มชาติพันธุ์และภาษาศาสตร์หลายกลุ่มที่เคยอาศัยอยู่ในโลกนี้ พวกเขาทั้งหมดเป็นเอกฉันท์ในสิ่งเดียว: ศัตรูตัวฉกาจ เงาที่กลืนกินทั้งหมด ศัตรูในจักรวาลแห่งความอาฆาตพยาบาทที่ไม่อาจหยั่งรู้ได้จะมาถึงในวันที่แน่นอน และมันคงจะดีกว่าถ้าไม่มีชีวิตอยู่เมื่อมันมาถึง เกรงว่าวิญญาณจะถูกพรากไป \n\nดูเหมือนว่าชาวโลกได้ฆ่าตัวตายหมู่ตามความเชื่อนี้"
 ancrel.9180.name:0 "ขุมสมบัติ"
 ancrel.9180.desc:0 "ในที่สุดคณะสำรวจก็โผล่ออกมาจากส่วนลึก - และไม่ใช่มือเปล่า! ในห้องชั้นในสุดมีการค้นพบอันน่าประหลาดใจ นั่นคือห้องนิรภัยของจริง! อัดแน่นไปด้วยโลหะมีค่าและอัญมณี เครื่องประดับเล็กๆ น้อยๆ และงานศิลปะที่น่าทึ่ง ทำให้เข้าใจได้ง่ายว่าขุมสมบัติเช่นนี้ได้รับการปกป้องอย่างลึกซึ้งเช่นนี้ \n\nการกู้คืนคอลเลกชั่นนี้อย่างปลอดภัยจะต้องใช้เวลานาน แต่ไม่ใช่งานที่ผ่านไม่ได้ คำถามที่ว่าทำไมห้องนิรภัยจึงถูกสร้างขึ้นในสภาพแวดล้อมที่รุนแรงเช่นนั้น: มันเป็นเพียงการได้มาซึ่งความปลอดภัยของนักสะสมที่แปลกประหลาดหรือไม่? มันอาจจะเป็นการบูชายัญพิธีกรรมบางรูปแบบหรือเปล่า? หรืออารยธรรมโบราณนี้ฝังสมบัติของพวกเขาไว้ที่นี่ด้วยความหวังว่าสักวันหนึ่งจะมีคนรู้เรื่องราวของพวกเขา?"
 ancrel.9185.name:0 "ความสงบในความโดดเดี่ยว"
 ancrel.9185.desc:0 "ในที่สุดการสำรวจเขาวงกตลาวาก็กลับมาแล้ว! เมื่อไปถึงห้องชั้นในสุด จุดประสงค์ของอาคารอันงดงามก็ถูกเปิดเผยในที่สุด เขาวงกตทำหน้าที่เป็นพื้นที่พิสูจน์ ไม่ใช่สำหรับร่างกายเท่าจิตใจ\n\nมีวลีในภาษาท้องถิ่นเขียนซ้ำๆ กันในถ้ำชั้นใน คำแปลอ่านว่า: "...กระแสน้ำครั้งที่ 4,444,444 จะเป็นครั้งสุดท้าย ไม่มีอะไรจะต้านทานการเกิดใหม่ได้" ไม่ว่าจะหมายถึงอะไรก็ตาม ดูเหมือนว่ามีเพียงไม่กี่คนที่รอดชีวิตจากการจาริกแสวงบุญครั้งนี้เลือกที่จะกลับขึ้นมาบนผิวน้ำหลังจากอ่านมันแล้ว แทนที่จะยอมสละตัวเองให้กับแม่น้ำแห่งไฟ"

 site_sky_glow_hymn:0 "บับเบิ้ลที่สวยงาม"
 site_sky_glow_hymn_intro:0 "การสแกนพื้นผิวของ [From.Planet.GetName] เผยให้เห็นสัญญาณว่าอารยธรรมทางเทคโนโลยีอาจมีการใช้งานบนโลกนี้ แต่หลังจากนั้นก็สูญพันธุ์ไปแล้ว เราจะต้องขึ้นยานสำรวจพื้นผิวเพื่อเรียนรู้เพิ่มเติม"
 ancrel.9190.name:0 "พื้นที่แห้งแล้งและท้องฟ้าที่สดใส"
 ancrel.9190.desc:0 "เมื่อลงไปบนพื้นผิวของ [From.Planet.GetName] ก็เห็นได้ชัดว่าอารยธรรมเจริญรุ่งเรืองที่นี่จนกระทั่งไม่กี่ศตวรรษที่ผ่านมา เมื่อถึงจุดหนึ่ง เหตุการณ์ภัยพิบัติอย่างกะทันหันก็เกิดขึ้นทั่วโลก เห็นได้ชัดว่าการต่อสู้ระหว่างรัฐชาติทำให้เกิดการแลกเปลี่ยนอาวุธทำลายล้างสูงในระดับสุดท้าย น่าแปลกที่แม้ว่าพื้นผิวจะสะอาดหมดจด แต่ท้องฟ้าก็ยังมีชีวิตชีวาด้วยเฉดสีที่เปลี่ยนไปของแสงออโรร่าเหนือกาลเวลา\n\nเป็นทิวทัศน์ที่น่าทึ่ง: ซากเหล็กและหินที่รกร้างของเมืองทั้งเมืองที่ถูกวาดด้วยสีสันอันสดใสเป็นประกายที่เต้นอยู่บนท้องฟ้า"
 ancrel.9195.name:0 "ไฟในท้องฟ้า"
 ancrel.9195.desc:0 "ประวัติความเป็นมาของ [From.Planet.GetName] และอารยธรรมที่สูญหายไปได้ถูกเปิดเผย และถึงแม้จะเป็นเรื่องน่าเศร้า แต่ตามมาตรฐานทางกาแล็กซี มันก็เป็นเรื่องปกติที่น่าเศร้า อารยธรรมเกิดขึ้น โดยเติบโตขึ้นในความซับซ้อนทางเทคนิค หากไม่สอดคล้องกับความสามัคคีทางสังคมและการเมือง ในที่สุดพวกเขาก็สร้างเครื่องมือทำลายล้างของตนเองขึ้นมาแล้วจึงใช้มัน หากชะตากรรมของโลกนี้และพลเมืองไม่ซ้ำกัน ก็ยังมีบางสิ่งที่เป็นเช่นนั้น และมันดึงดูดจินตนาการของจิตใจทางวิทยาศาสตร์ของเรา: เอฟเฟกต์แสงเหนือที่ไม่หยุดหย่อนที่เต้นอยู่อย่างไม่หยุดยั้งเหนือการทำลายล้างทั้งหมด\n\nจากการศึกษาอย่างใกล้ชิด เอฟเฟกต์แสงออโรร่าบนท้องฟ้าแสดงรูปแบบซ้ำ ๆ ซึ่งท้าทายความรู้ก่อนหน้านี้ทั้งหมดเกี่ยวกับระบบสภาพอากาศ มีข้อความอะไรที่นี่บ้างไหม?"
 ancrel.9200.name:0 "ซ่อนอยู่ในสายตาธรรมดา"
 ancrel.9200.desc:0 "ความลึกลับของรูปแบบแสงเงินแสงเหนือที่เกิดขึ้นซ้ำๆ ได้รับการอธิบายหลังจากที่เครื่องสแกนตรวจพบเครื่องจักรขนาดเล็กในวงโคจรรอบ [FromFrom.Planet.GetName] อุปกรณ์เหล่านี้บางส่วนถูกดักจับและวิเคราะห์ เป็นที่ยอมรับกันว่าเครื่องจักรสามารถควบคุมบรรยากาศด้วยการยิงอนุภาคที่มีประจุเข้าไปข้างใน เพื่อเลียนแบบลมสุริยะ\n\nโดยทั่วไปรูปแบบดังกล่าวเป็นรหัสรหัสที่ส่งไปยังสิ่งมีชีวิตบนพื้นผิว ทฤษฎีก็คือระบบนี้มีการใช้งานในช่วงเวลาเดียวกับที่เกิดวิกฤติโลก การสื่อสารที่ใช้รหัสในช่วงเวลาแห่งสงคราม อาจเป็นคำสั่งให้ผู้ก่อวินาศกรรมหรือสัญญาณการระเบิดของอาวุธที่ซ่อนอยู่ในที่โล่ง เมื่อไม่มีใครปิดพวกมัน พวกมันก็จะวนเวียนไปไม่มีที่สิ้นสุด"
 ancrel.9205.name:0 "มองไปสวรรค์เพื่อหาคำตอบ"
 ancrel.9205.desc:0 "ตามที่คาดไว้ แสงออโรร่าที่เต้นเป็นจังหวะรอบๆ [FromFrom.Planet.GetName] นั้นไม่ได้กำเนิดตามธรรมชาติ โลกล้อมรอบด้วยเครือข่ายดาวเทียมขนาดเล็กที่ยังคงใช้งานอยู่ เครื่องจักรเหล่านี้ได้รับการตั้งโปรแกรมให้ฉายพัลส์ของอนุภาคมีประจุขึ้นสู่ชั้นบรรยากาศชั้นบน โดยจำลองลมสุริยะ\n\nรูปแบบนี้มีจุดมุ่งหมายเพื่อสร้างผลกระทบที่สงบต่อจิตใจของประชากร ข้อความที่อ่อนเกิน - โดยมีท้องฟ้าเป็นช่องทาง - เพื่อระงับอารมณ์ด้านลบและบรรลุสันติภาพทั่วโลก เห็นได้ชัดว่ามันไม่ได้ผลตามที่ตั้งใจไว้"
 ancrel.9210.name:0 "เพลงของไพ่คนเดียว"
 ancrel.9210.desc:0 "มันยังมีชีวิตอยู่! แท้จริงแล้วแสงออโรร่าคือรูปแบบ... ชีวิตที่ไม่มีใครรู้จักมาก่อนใช่ไหม? มีสิ่งมีชีวิตกึ่งความรู้สึกลึกลับบางชนิดอาศัยอยู่ในบรรยากาศชั้นบน ยังไงก็ตามมันสามารถควบคุมแม่เหล็กและไอออไนเซชันได้ โดยปรับแต่งบรรยากาศเพื่อแสดงแสงบนท้องฟ้าตามอารมณ์ของมนุษย์ต่างดาวที่ไม่อาจคาดเดาได้ บางคนตั้งทฤษฎีว่ามันพยายามสื่อสาร บางคนเชื่อว่ามันเป็นเพียงการเล่น หรือแม้แต่ \"ร้องเพลงพร้อมแสง\" \n\nแผนกจุลชีพรายงานว่าความพยายามในการแปลทั้งหมดนั้นไร้ประโยชน์อย่างยิ่ง เนื่องจากสรีรวิทยาที่เข้ากันไม่ได้โดยสิ้นเชิงของเอนทิตีนี้ มันพยายามส่งคำเตือนถึงเราหรือเปล่า? คร่ำครวญถึงโลกที่ตายแล้วเหรอ? ชื่นชมยินดีในชัยชนะเหรอ\n\nสิ่งที่เราทำได้คือปล่อยมันไว้บนท้องฟ้าเพื่อร้องเพลงเอเลี่ยนของมัน"

 site_warmer_climates:0 "เข้าไปข้างใน"
 site_warmer_climates_intro:0 "ภาพถ่ายวงโคจรของ [From.Planet.GetName] แสดงให้เห็นอย่างชัดเจนถึงโครงสร้างพื้นฐานของอารยธรรมทางเทคโนโลยี เป็นเรื่องลึกลับ แม้ว่าพื้นที่เมืองขนาดใหญ่จะเชื่อมโยงกันด้วยเครือข่ายการขนส่งบนพื้นผิวที่กว้างขวาง แต่ดาวเคราะห์ดวงนี้ก็ดูเหมือนถูกทิ้งร้างโดยสิ้นเชิง โดยไม่มีร่องรอยของสิ่งมีชีวิตที่หลงเหลืออยู่เลย แกนกลางของโลกมีความกระตือรือร้นมากกว่าส่วนใหญ่ แต่ไม่มีวี่แววของเหตุการณ์หายนะหรือสิ่งอื่นใดที่จะอธิบายประชากรที่สูญหายได้ในทันที พวกเขาทั้งหมดไปไหน?"
 ancrel.9215.name:0 "ไม่มีใครอยู่บ้าน"
 ancrel.9215.desc:0 "ทีมลงจอดถูกส่งลงไปยังพื้นผิวของ [From.Planet.GetName] และบันทึกภาพการมองโลกในระยะใกล้เป็นครั้งแรกและเมืองร้างที่มีลมพัดแรง พวกมันเก่า ผุกร่อนจากการสัมผัสและการละเลย แต่ส่วนใหญ่ไม่บุบสลาย และไม่มีร่องรอยของการทำลายล้าง ไม่มีร่องรอยของผู้อยู่อาศัย\n\nทฤษฎีเดียวที่เป็นไปได้ในปัจจุบันคือการอพยพหรือการอพยพจำนวนมากเกิดขึ้น เรายังไม่รู้ว่าอะไรจะบีบบังคับทั้งสายพันธุ์ให้ละทิ้งทุกสิ่งที่พวกเขาสร้างขึ้นและเคยรู้จักมา"
 ancrel.9220.name:0 "ลงเราไป"
 ancrel.9220.desc:0 "การสืบสวนประชากรที่สูญหายของ [From.Planet.GetName] ประสบความสำเร็จอย่างมาก ประตูโล่ขนาดใหญ่ที่ปิดสนิทซึ่งนำไปสู่เครือข่ายอุโมงค์ลึกเป็นข้อพิสูจน์ว่าสัตว์ทั้งสายพันธุ์เริ่มเคลื่อนตัวลงใต้ดินเมื่อถึงจุดหนึ่ง การตรวจสอบข้ามด้วยข้อมูลทางธรณีวิทยาและอุตุนิยมวิทยาบ่งชี้ว่าดาวเคราะห์ทั้งโลกถูกครอบงำโดยยุคน้ำแข็งที่เริ่มก่อตัวอย่างกะทันหัน ซึ่งอาจเกิดจากการเปลี่ยนแปลงของความเอียงของแกน ซึ่งน่าจะกระตุ้นให้เกิดการอพยพ \n\nการสำรวจเข้าไปในเครือข่ายอุโมงค์อันกว้างใหญ่กำลังดำเนินการอยู่"
 ancrel.9225.name:0 "การนอนหลับลึก"
 ancrel.9225.desc:1 "เมื่อหลายพันปีก่อน อุณหภูมิเฉลี่ยของโลกลดลงอย่างรวดเร็ว และแสงแดดส่วนใหญ่ถูกเมฆบดบัง เพื่อรับมือกับสภาพอากาศที่เย็นยะเยือกอย่างกะทันหัน ประชากรจึงอพยพไปใต้ดิน ถูกบังคับให้ขุดลึกลงไปเรื่อยๆ เพื่อไล่ตามความอบอุ่นที่ถอยกลับของแกนกลางดาวเคราะห์ \n\nไม่สามารถรักษาจำนวนประชากรที่ขุดไว้ได้ จึงได้ริเริ่มโครงการไครโอ-ทอร์พอร์ มันจะปลุกพวกเขาโดยอัตโนมัติเมื่อเครื่องมือตรวจพบสภาพอากาศบนพื้นผิวที่มั่นคงอีกครั้ง ในที่สุดดาวเคราะห์ก็อุ่นขึ้น แต่กระบวนการนี้กะทันหันมาก โดยยกเลิกการปรับเทียบพ็อดจำศีลและเผาเครื่องนอน\n\nสิ่งที่เหลืออยู่คือพ็อดนับล้านที่เต็มไปด้วยกระดูกที่ไหม้เกรียม นั่งเรียงกันเงียบๆ ในความมืด"
 ancrel.9230.name:0 "คลื่นความร้อนร้ายแรง"
 ancrel.9230.desc:0 "คณะสำรวจกลับมาพร้อมกับคำตอบสำหรับปริศนาของ [FromFrom.Planet.GetName] และผู้คนที่สูญหายไป ประชากรโลกส่วนใหญ่เสียชีวิตในยุคน้ำแข็งที่วุ่นวายอย่างกะทันหัน เศษซากของสายพันธุ์นี้อพยพลึกเข้าไปในเปลือกโลกเพื่อเข้าใกล้แกนกลางความเย็น ซึ่งเป็นแหล่งความอบอุ่นและพลังงานเพียงแหล่งเดียวที่เหลืออยู่ในยุคน้ำแข็ง \n\nโครงการวิศวกรรมใต้ดินขนาดมหึมาริเริ่มโดยผู้รอดชีวิต ด้วยความพยายามอย่างยิ่งยวดที่จะละลายโลกน้ำแข็งของพวกเขา พวกเขาพยายามส่งความร้อนใต้พิภพจากแกนกลางดาวเคราะห์ขึ้นสู่พื้นผิว แต่มีบางอย่างผิดพลาดร้ายแรง และการฟื้นฟูแกนกลางก็ลุกลามอย่างควบคุมไม่ได้ ทำให้อุโมงค์ที่หลบภัยเต็มไปด้วยแมกมาและก๊าซร้อนยวดยิ่ง กวาดล้างผู้รอดชีวิตทั้งหมดออกไปในทันที"
 ancrel.9235.name:0 "หนาวและเดียวดาย"
 ancrel.9235.desc:0 "คณะสำรวจกลับมาพร้อมกับเรื่องราวเศร้าๆ ที่จะเล่าให้ฟัง เมื่อหลายพันปีก่อนอุณหภูมิแกนกลางของโลกลดลงอย่างรวดเร็ว ส่งผลให้ประชากรต้องอยู่ใต้ดินเพื่อค้นหาความร้อน พลังงาน และทรัพยากร ปีแล้วปีเล่าอุณหภูมิลดลง และพวกเขาก็ขุดลึกลงไปเรื่อยๆ จำนวนพวกมันลดน้อยลงเนื่องจากส่วนใหญ่แข็งตัว อดอยาก หรือเสียชีวิตจากอุบัติเหตุจากการขุด สิ่งนี้ดำเนินไปเป็นเวลาหลายทศวรรษ\n\nในอุโมงค์ที่ขุดด้วยมือเพียงนาทีเดียวในปล่องที่ลึกที่สุด เลยระดับย่อยที่เครื่องขุดสุดท้ายพังทลายลงและถูกทิ้งร้าง ก็พบศพสัตว์จำพวกมอลลัสคอยด์ที่เป็นฟอสซิลน้ำแข็งเพียงตัวเดียว พบข้อความที่บันทึกไว้ซึ่งอ้างว่าเป็นข้อความสุดท้าย มันหนาวและโดดเดี่ยว และพร้อมที่จะยอมแพ้"
 ancrel.9235.b.evopred: "เราหวังว่าความดื้อรั้นของคุณจะได้รับการสืบทอด"

 site_phoenix_collective:0 "มีใครอยู่บ้านไหม?"
 site_phoenix_collective_intro:0 "เรือสำรวจของเราได้สแกน [From.Planet.GetName] และตรวจพบโครงสร้างเทียมบางอย่างที่ควรค่าแก่การพิจารณาอย่างใกล้ชิด น่าตกใจที่ไม่มีวี่แววว่ามีประชากรอยู่ข้างล่างเลย"
 ancrel.9240.name:0 "เมืองผี"
 ancrel.9240.desc:0 "การสำรวจพื้นผิวของเราได้รายงานการค้นพบที่น่าประหลาดใจบางอย่างกลับมา โลกนี้มีเมืองใหญ่ๆ หลายแห่ง เมืองทั้งหมดถูกทิ้งร้างแต่อยู่ในสภาพที่ค่อนข้างดีเมื่อพิจารณาจากอายุของเมืองเหล่านั้น โครงสร้างพื้นฐานและการวางผังเมืองของแต่ละเมืองมีโครงสร้างที่โดดเด่นและกลมกลืนกัน บ่งบอกถึงอารยธรรมที่มีความเหนียวแน่นสูงซึ่งขับเคลื่อนโดยอุดมคติแบบรวมศูนย์ - บางทีอาจเป็นจิตสำนึกแบบใดแบบหนึ่ง\n\nเมื่อพิจารณาจากสถาปัตยกรรมและอุปกรณ์ตกแต่งภายใน สายพันธุ์ที่สร้างทั้งหมดนี้ดูเหมือนจะเป็นเชื้อราขนาดเล็กที่มีความก้าวหน้าทางเทคนิคค่อนข้างต่ำ พวกเขาทั้งหมดไปที่ไหนกันแน่ยังไม่ทราบ"
 ancrel.9245.name:0 "เหมือนเดิม เหมือนเดิม"
 ancrel.9245.desc:0 "การศึกษาเพิ่มเติมเกี่ยวกับอารยธรรมที่สูญหายของ [From.Planet.GetName] ทำให้เกิดคำถามมากกว่าคำตอบ โครงสร้างเรียบๆ แข็งแรงนี้มีอายุนับพันปี และดูเหมือนว่าทั้งหมดจะถูกสร้างขึ้นในเวลาเดียวกันโดยประมาณ หรืออาจจะสั้นพอๆ กับศตวรรษเดียว ในทำนองเดียวกัน การเพิ่มเติมหรือปรับปรุงโครงสร้างเมืองใดๆ ดูเหมือนจะเสร็จสิ้นทั่วโลกในช่วงเวลาที่แยกจากกันอย่างกะทันหัน การพัฒนาสังคมนี้ที่มีการแบ่งจังหวะอย่างผิดปกติดูเหมือนจะไม่แสดงให้เห็นการเปลี่ยนแปลงขนาดประชากรที่เห็นคุณค่าได้"
 ancrel.9250.name:0 "ความตาย/การเกิดใหม่"
 ancrel.9250.desc:0 "ความก้าวหน้าล่าสุดได้ส่องแสงสว่างให้กับผู้สร้างเมือง [From.Planet.GetName] ที่หายไป เห็นได้ชัดว่าเชื้อรามีวงจรรวมของการตายจำนวนมากและการเกิดใหม่ พวกมันฟักออกมาพร้อมกันทั่วโลก และเติบโตขึ้นมาโดยเป็นส่วนหนึ่งของกลุ่มจิตใจที่เชื่อมโยงกัน ในช่วงวงจรชีวิตที่ยาวนานนับร้อยปี พวกมันจะกระจายออกไปและยึดเมืองที่สร้างและทิ้งร้างโดยคนรุ่นก่อน ๆ ที่เสียชีวิตไปแล้ว \n\nเมื่อใกล้ถึงเหตุการณ์การตาย/การเกิดใหม่ครั้งต่อไป พวกเขาก็รับฟังเสียงเรียกทางชีววิทยาทั่วทั้งสายพันธุ์ พวกมันให้กำเนิดฝักที่ฝังอยู่ในดินผ่านการสืบพันธุ์แบบไม่อาศัยเพศ ตัวพ่อแม่ตาย ร่างกายก็เน่าเปื่อย และใส่ปุ๋ยให้กับดินรอบๆ ฝัก หลังจากช่วงพักตัวเป็นเวลานาน พ็อดจะฟักออกมา และวงจรก็เริ่มต้นใหม่อีกครั้ง"
 ancrel.9255.name:0 "วงจรถูกรบกวน"
 ancrel.9255.desc:0 "การขุดค้นดินบน [FromFrom.Planet.GetName] เผยให้เห็นชะตากรรมของประชากรที่สูญหายในที่สุด พวกมันทั้งหมดอยู่ในสภาพฝักตั้งท้องบนพื้น เติบโตและเตรียมพร้อมที่จะเกิดขึ้น เมื่อมีปรากฏการณ์ทางธรรมชาติบางอย่าง ซึ่งน่าจะเป็นอุกกาบาตพุ่งชนซึ่งทำให้สภาพอากาศและฤดูกาลไม่ปกติเป็นเวลาหลายทศวรรษ ได้รบกวนระบบนิเวศของโลก เมื่อพวกเขาฟักออกมา พวกเขาก็พบกับโลกที่ไร้ซึ่งปัจจัยยังชีพ\n\nสิ่งที่ควรแบ่งปัน การเกิดใหม่อย่างเฉลิมฉลองกลับกลายเป็นความอดอยากอย่างช้าๆ อย่างรวดเร็ว และในที่สุดการสูญพันธุ์ของสายพันธุ์ต่างๆ"
 ancrel.9260.name:0 "ขึ้นเหนือ"
 ancrel.9260.desc:0 "การตรวจสอบทางจิตวิทยาและสังคมวิทยาเชิงเก็งกำไรเกี่ยวกับวัฒนธรรมของสายพันธุ์เชื้อราให้คำตอบที่น่าสับสนสำหรับความลึกลับของการหายตัวไปของพวกมัน เมื่อถึงจุดหนึ่ง สัตว์โดยรวมเริ่มตั้งคำถามถึงวงจรชีวิตที่คงอยู่ชั่วนิรันดร์และดูเหมือนไม่มีจุดหมาย เมล็ดพันธุ์แห่งลัทธิทำลายล้างอัตถิภาวนิยมเติบโตขึ้นในประชากรทั้งหมด และถึงจุดสุดยอดในการต่อต้านสัญชาตญาณการเอาชีวิตรอดของพวกเขาเองในที่สุด\n\nเมื่อปลูกไว้ บางทีอาจเป็นด้วยสิ่งมีชีวิตเพียงตัวเดียว แก่นแห่งความสงสัยนี้แพร่กระจายไปอย่างรวดเร็วอย่างน่าสะพรึงกลัวผ่านจิตใจของรังผึ้ง จนกระทั่งพวกเขาตัดสินใจพร้อมกันว่าไม่ควรปลูกฝักแรกเกิด - ควรเผาทิ้ง"
 ancrel.9265.name:0 "จะขึ้นมาอีกครั้งหนึ่ง"
 ancrel.9265.desc:0 "คำตอบสุดท้ายสำหรับความลึกลับของสังคมเห็ดราที่หายไปกลับกลายเป็นคำตอบที่ค่อนข้างตรงไปตรงมา ประชากรโลกไม่สูญหายเลย! พวกมันยังอยู่ที่นั่น กำลังตั้งครรภ์อยู่ใต้ดิน การวิเคราะห์ฝักที่ค้นพบพบว่าอายุขัยของพวกมันที่มีอายุหลายศตวรรษนั้นเทียบไม่ได้กับการตั้งครรภ์ในสถานะฝัก ซึ่งดูเหมือนว่าจะดำเนินต่อไปอีกสองสามพันปี เมืองที่เรียบง่ายของพวกเขา สร้างขึ้นเพื่อทนต่อการละเลยมานาน ยืนอย่างเงียบๆ รอการกลับมาของพวกเขา \n\nดังนั้น พวกเขาทั้งหมดจึงหลับใหลอยู่บนพื้น รอวันที่พวกเขาจะลุกขึ้นและเริ่มวงจรอีกครั้ง"

 site_grand_herald:0 "แกรนด์เฮรัลด์"
 site_grand_herald_intro:1 "แม้ว่าจะไม่มีเครื่องดนตรี เราก็สามารถเห็นซากของเขตชานเมืองอันกว้างใหญ่บน [From.Planet.GetName] ได้อย่างง่ายดาย เห็นได้ชัดว่าอารยธรรมที่ก้าวหน้าอย่างมากครั้งหนึ่งเคยอาศัยอยู่ที่นั่น แต่ทุกวันนี้ไม่มีสัญญาณชีวิตหรือสัญญาณแม่เหล็กไฟฟ้าที่สอดคล้องกับสังคมเทคโนโลยี ดูเหมือนว่าดาวเคราะห์ดวงนี้จะตายไปแล้ว เราจะต้องลงไปที่นั่นเพื่อหาข้อมูลเพิ่มเติม"
 ancrel.9270.name:0 "ในวิญญาณชั้นสูง"
 ancrel.9270.desc:1 "สถาปัตยกรรมที่เสียหายแต่ค่อนข้างก้าวหน้าบ่งบอกถึงสายพันธุ์มนุษย์ที่เชี่ยวชาญทางเทคโนโลยีซึ่งใกล้จะถึงขีดความสามารถในการเดินทางในอวกาศ เอกสารที่แปลและสถาปัตยกรรมขนาดใหญ่ที่กว้างขวางบ่งบอกถึงศาสนาหรือจิตวิญญาณที่หยั่งรากลึกซึ่งแผ่ซ่านไปทั่วอารยธรรม\n\nวลี §Hแกรนด์ เฮ รัลด์§! ถูกกล่าวถึงซ้ำแล้วซ้ำเล่า และดูเหมือนจะเป็นบุคคลหรือแนวคิดเกี่ยวกับความยำเกรงพระเจ้าและความเคารพอย่างไม่มีข้อกังขาในสังคมนี้"
 ancrel.9275.name:0 "พินัยกรรมแห่งลาง"
 ancrel.9275.desc:1 "จากการค้นดูเอกสารมากมายที่พบในซากปรักหักพังทั่วโลก สัตว์สายพันธุ์นี้ชอบคำที่เขียนไว้อย่างแน่นอน - แนวคิดหนึ่งที่เกิดขึ้นซ้ำๆ โดดเด่น มันถูกเรียกว่า §Hพันธสัญญาของโอเมน§! และเป็นสัญญาณบ่งบอกถึงหายนะที่กำลังจะเกิดขึ้นซึ่งก่อให้เกิดความหวาดระแวงและความหวาดกลัวในประชากรทั่วไป\n\nเนื่องจากลักษณะเชิงเปรียบเทียบและลึกลับของภาษาพระคัมภีร์ จึงเป็นการยากที่จะยืนยันธรรมชาติที่แท้จริงของภัยคุกคามนี้ แต่ผลกระทบต่อจิตใจของสายพันธุ์พื้นเมืองนั้นไม่อาจโต้แย้งได้ ดูเหมือนว่าพวกเขาจำนวนมากมองไปที่สวรรค์เพื่อขอการแทรกแซงจากพระเจ้า"
 ancrel.9280.name:0 "ลัทธิทาส"
 ancrel.9280.desc:1 "การวิเคราะห์ทางสถาปัตยกรรมได้แยกอาคารต่างๆ ที่ประกอบกันก่อนที่อารยธรรมจะสูญสิ้นไป รูปแบบจะเหมือนกันทั่วโลก: โครงสร้างที่เป็นประโยชน์จับจดมีไว้สำหรับงานอุตสาหกรรมหนัก อาคารเหล่านี้ต่างจากบ้านเรือนแบบเก่าตรงที่ไม่มีการตกแต่งและการออกแบบที่เน้นประโยชน์ใช้สอยอย่างเห็นได้ชัด บางทีวัฒนธรรมของการยึดถือสัญลักษณ์อาจครอบงำ?\n\nเหนือทางเข้าของอาคารแต่ละหลังคือ §Hลัทธิแห่งความรับใช้§! - คำอธิษฐานเพื่อการบริการ §Hแกรนด์ เฮ รัลด์§! และแผนการอันศักดิ์สิทธิ์ ทฤษฎีก็คือว่านี่คือการตอบสนองบางอย่างต่อความหายนะที่บอกไว้ล่วงหน้าใน §Hพันธ สัญญา แห่ง โอ เมน§!"
 ancrel.9285.name:0 "เพลงสวดแห่งการติดตาม"
 ancrel.9285.desc:1 "การสำรวจพื้นผิวทำให้เกิดการค้นพบที่น่าสนใจ เป็นการบันทึกภาพและเสียงจากเมืองใหญ่แห่งหนึ่ง มวลสิ่งมีชีวิตจำนวนมากซึ่งดูเหมือนเป็นกลุ่มคนที่อาศัยอยู่กำลังอัดแน่นอยู่ในจัตุรัสสาธารณะ พวกเขากำลังสวดมนต์ เสียงที่เปล่งออกมารวมกันดังขึ้นเรื่อยๆ ราวกับเสียงพายุฝนฟ้าคะนองที่ไพเราะ\n\nบทสวดนี้แปลได้ว่า: "การเสด็จขึ้นสู่สวรรค์ใกล้เข้ามาแล้ว ขอพาพวกเราไปสู่การเริ่มต้นใหม่ นำพวกเราออกจากดินแดนแห่งน้ำตาและฝุ่น และมอบบ้านใหม่ท่ามกลางดวงดาวให้กับพวกเรา พวกเราติดตามท่านเป็นหนึ่งเดียว เราติดตามท่าน""
 ancrel.9290.name:0 "การจาริกแสวงบุญวันสุดท้าย"
 ancrel.9290.desc:1 "§Hเพลงสวดแห่งการติดตาม§! ไม่ใช่งานเดี่ยว แต่เป็นงานระดับโลก ชาวบ้านทุกคนร้องพร้อมกัน เหตุการณ์ที่ไม่ปกติเช่นนี้รับประกันว่าจะต้องมีการวิจัยเพิ่มเติม และนั่นคือเวลาที่เราได้รับข้อมูลเชิงลึกใหม่ เอกสารชื่อ §Hลําดับ วงศ์ วาน§! ถูกค้นพบ และดูเหมือนว่าจะเป็นหนึ่งในลิงก์สุดท้ายในห่วงโซ่เหตุการณ์ลึกลับนี้\n\nเอกสารนี้อ้างถึงสถานที่เฉพาะบนโลก ซึ่งจะมีการคำนวณหรือพิธีกรรมขั้นสุดท้าย พื้นที่ทะเลทรายที่ไม่ธรรมดาซึ่งถูกละเลยในการสำรวจครั้งก่อนๆ เอกสารยังกล่าวถึงบางสิ่งที่เรียกว่า §Hเชื้อ โรค ที่ ถูก ยก ขึ้น§! ซึ่งขณะนี้กำลังถูกตีความ"
 ancrel.9295.name:0 "หีบแห่งมรดก"
 ancrel.9295.desc:2 "§Hแกรนด์ เฮ รัลด์§! ซ่อนตัวจากการสแกนวงโคจรด้วยการพรางแสงที่ซับซ้อน ในที่สุดก็ถูกค้นพบ ไม่ใช่ศาสดาพยากรณ์หรือบุคคลสำคัญทางศาสนา มันคือยานอวกาศคลาสของไททันขนาดมหึมา! โลกของพวกเขาแตกสลายและกำลังจะตายเนื่องจากสงครามที่ดำเนินไปในนามของศาสนา ไททันจะทำหน้าที่เป็นเรือหีบพันธสัญญาสำหรับประชากรเพียงเศษเสี้ยว นำพวกเขาออกจากดาวเคราะห์ที่ถึงวาระและไปยังดินแดนนอกโลกที่ไม่ระบุรายละเอียด เรือได้รับการประกอบอย่างสมบูรณ์และอยู่ในสภาพที่ใช้งานได้ ดังนั้นทำไมมันไม่เคยขึ้นบินเลยเป็นเรื่องที่น่าสงสัย\n\nดูเหมือนว่าเรือจะต้องต่อสู้ครั้งสุดท้ายก่อนจะขึ้นเครื่อง การต่อสู้ที่ดุเดือดจนทั้งสองฝ่ายไม่รอดในระยะยาว"
 ancrel.9300.name:0 "ผู้พิทักษ์แห่งความสมบูรณ์"
 ancrel.9300.desc:1 "มันไม่เคยเป็นแบบอย่างทางศาสนา! หลังจากปิดการใช้งานสนามพรางแสงแล้ว คณะสำรวจก็ได้เห็นรูปร่างที่แท้จริงของ §Hแกรนด์ เฮ รัลด์§!; ยานอวกาศไททันคลาสขนาดมหึมาที่ถูกฝังไว้ครึ่งหนึ่งในทราย สร้างขึ้นเพื่อต่อสู้กับภัยคุกคามที่เข้ามาใกล้ในอวกาศ ปรากฎว่าลักษณะเชิงกวีและเชิงเปรียบเทียบของภาษาพื้นเมืองซึ่งตีความได้ว่าเป็นการแสดงออกทางศาสนา แท้จริงแล้วเป็นเพียงวิธีสื่อสารปกติของสายพันธุ์นี้\n\nลักษณะของภัยคุกคามที่กำลังจะมาถึงยังคงเป็นปริศนา แต่จากรูปลักษณ์ของมัน ไม่ว่าอะไรก็ตามที่ดูเหมือนว่าจะมาถึงก่อนที่ไททันจะปฏิบัติการอย่างเต็มที่ พบซากสัตว์ [FromFrom.Planet.GetName] สายพันธุ์ที่สูญพันธุ์ไปแล้วนับพันที่กระจัดกระจายอยู่รอบๆ เรือ พวกเขาไม่มีเวลาเปิดใช้งานไททัน และพวกเขาจะไม่มีวันเปิดใช้งานเลย"
 ancrel.9305.name:0 "คำสัญญาแห่งความรอด"
 ancrel.9305.desc:2 "§Hแกรนด์ เฮ รัลด์§! เป็นบุคคลสำคัญทางศาสนาที่แหวกแนวจริงๆ มันเป็นโครงการวิศวกรรมพิเศษขนาดใหญ่ - ลานก่อสร้างอัตโนมัติ เสากระโดงสูงระฟ้ายังคงเป็นแหล่งผลิตสินค้าชิ้นแรกและชิ้นเดียว ยานอวกาศไททันคลาสขนาดใหญ่ แม้ว่าการเปรียบเทียบทางจิตวิญญาณและข้อเท็จจริงทางโบราณคดีจะยังไม่ชัดเจนนัก แต่เรารู้เรื่องนี้: ภัยคุกคามใดก็ตามที่ §Hพันธสัญญาของโอเมน§! พูดถึงนั้นจะต้องเกิดขึ้นจริง เนื่องจากประชากรทั้งหมดเสียชีวิตอย่างลึกลับก่อนที่โครงการแกรนด์ เฮ รัลด์จะสิ้นสุดลง \n\nแต่ลานก่อสร้างอัตโนมัติยังคงทำงานต่อไป โดยสรุปเรือที่ไม่มีผู้โดยสาร เรือเปล่าที่อยู่ในสภาพสมบูรณ์ส่วนใหญ่หลับใหลอยู่ที่นี่มาเป็นเวลายาวนานโดยไม่มีคนขับ เราจะเอามันออกไปปั่นไหม?"
 get_herald:0 "§Yแกรนด์ เฮ รัลด์§! ถูกเพิ่มเข้าไปในกองยานของคุณ"

 site_hive_coral:0 "ใต้คลื่น"
 site_hive_coral_intro:1 "การสแกนโดยเรือวิทยาศาสตร์ในวงโคจร [From.Planet.GetName] แสดงให้เห็นการก่อตัวแปลก ๆ ใต้คลื่น และกระแสน้ำที่อธิบายไม่ได้ สภาพอากาศค่อนข้างสงบและมีพายุเกิดขึ้นไม่บ่อยนัก แต่ทะเลของดาวเคราะห์ดูเหมือนจะหมุนวนและปั่นป่วนอยู่ตลอดเวลา โดยถูกขับเคลื่อนด้วยแรงบางอย่างที่ไม่ทราบสาเหตุใต้พื้นผิว แนะนำให้ตรวจสอบอย่างใกล้ชิด"
 ancrel.9310.name:0 "ช่างเจาะพื้นผิว"
 ancrel.9310.desc:1 "การสำรวจผิวน้ำลงสู่ทะเล [From.Planet.GetName] ได้พบเจอกับบางสิ่งที่แปลกประหลาด วัสดุอินทรีย์ที่มีหนามแหลมขนาดใหญ่แทงทะลุผิวน้ำ สร้างขึ้นจากปะการังหรือกระดูกฟอสซิลบางชนิด ซึ่งทอดยาวไปหลายร้อยเมตรสู่ท้องฟ้า\n\nหนามแหลมนี้พบได้ในกลุ่มกระจุกคล้ายกรงเล็บจำนวนไม่เกินสองสามโหล และการก่อตัวเช่นนี้พบเห็นได้ทั่วไปทุกที่ ยกเว้นในทะเลขั้วโลกที่เย็นที่สุด เดือยมีรูพรุน ปกคลุมไปด้วยรูพรุนขนาดต่างๆ จนถึงขนาดเจาะได้ บางทีมันอาจจะเกี่ยวข้องกับวิธีที่โครงสร้างทางชีวภาพเหล่านี้แพร่กระจายตัวเอง?"
 ancrel.9315.name:0 "ผู้สร้างปัจจุบัน"
 ancrel.9315.desc:1 "ในที่สุดคณะสำรวจก็สามารถเข้าถึงกลุ่มการก่อตัวทางชีวภาพที่มีรูปร่างยาวและสม่ำเสมอที่ด้านล่างของทะเลดาวเคราะห์ได้ การก่อตัวใต้น้ำเหล่านี้ทำจากวัสดุชนิดเดียวกับเดือยเจาะพื้นผิว ดูเหมือนว่าเป็นกลไกการสูบน้ำแบบอินทรีย์ เครือข่ายสิ่งมีชีวิตจะ "หายใจ" และการหายใจออกจะหมุนเวียนไปตามกระแสน้ำในทะเล\n\nขนาดของชั้นหินเหล่านี้ รวมถึงจำนวนชั้นหินที่พาดผ่านพื้นมหาสมุทร บอกเป็นนัยว่าพวกมันต้องรับผิดชอบต่อกระแสน้ำใต้น้ำของ [From.Planet.GetName] ที่อธิบายไม่ได้"
 ancrel.9320.name:0 "ไฮฟ์คอรัล"
 ancrel.9320.desc:1 "การสำรวจใต้ทะเลลึกอีกครั้งได้กลับมาอีกครั้ง และได้เปิดเผยความจริงของท้องทะเลที่ปั่นป่วนของ [FromFrom.Planet.GetName] การก่อตัวของสารอินทรีย์ที่แปลกประหลาดทั้งหมดบนโลกนี้เชื่อมโยงกันเป็นแนวปะการังอันกว้างใหญ่เพียงแห่งเดียว เมื่อปรากฏออกมา ปะการังนี้รับรู้ได้บางส่วน แม้ว่าจะมีกรอบความคิดที่แปลกประหลาดอย่างสิ้นเชิง เมื่อเปรียบเทียบกับแนวคิดเรื่องชีวิตที่มีความรู้สึกของเรา โดยผ่านฟีโรโมนที่ถูกขับออกมาในน้ำ มันได้กักขังสิ่งมีชีวิตที่เหลือในทะเลไม่มากก็น้อย ควบคุมพฤติกรรมและวงจรการสืบพันธุ์ให้เหมาะกับความต้องการของมันเอง\n\nดูเหมือนว่าจะไม่เป็นพิษเป็นภัยอย่างสมบูรณ์ แต่ถึงกระนั้นก็ยังเป็นปรมาจารย์หุ่นเชิด มันเป็นเพียงรูปแบบชีวิตชั้นยอดบนโลกนี้เหรอ? ปรสิตต่างดาวที่ล่วงล้ำ? การสื่อสารกับมันดูเหมือนเป็นไปไม่ได้ดังนั้นเราจึงอาจไม่มีทางรู้"
 ancrel.9320.b.evopred: "ในการปรับตัว เราจะไม่มีการบุกรุกที่คล้ายกัน"
 ancrel.9325.name:0 "ไบโอ-พระผู้ช่วยให้รอด"
 ancrel.9325.desc:1 "หลังจากจัดลำดับดีเอ็นเอของมนุษย์ต่างดาวแล้ว ก็เกิดการเปิดเผยที่น่าตกใจ: เครือข่ายปะการังทะเลทั่วโลกไม่เพียงแต่ไม่ได้มีถิ่นกำเนิดในโลกนี้เท่านั้น แต่จริงๆ แล้วเป็นสิ่งก่อสร้างทางวิศวกรรมชีวภาพมากกว่าการก่อตัวตามธรรมชาติ ใต้พรมหนาทึบของปะการังต่างดาวเป็นชั้นฟอสซิลที่สูญพันธุ์ไปแล้วของระบบนิเวศก่อนหน้านี้ทั้งหมดของโลกนี้ ดูเหมือนว่าปะการังที่ได้รับการแนะนำครั้งหนึ่งจะค่อยๆ กัดเซาะสิ่งมีชีวิตพื้นเมืองทั้งหมดและแทนที่ด้วยระบบนิเวศที่ออกแบบมาโดยเฉพาะสำหรับตัวมันเอง \n\nมีสองทฤษฎีหลักว่าทำไมถึงทำเช่นนี้: ปะการังเทียมถูกนำมาใช้ด้วยเหตุผลที่ไม่ร้ายแรง และจากนั้นก็แข่งขันกับสัตว์ป่าในท้องถิ่นอย่างหนาแน่นในลักษณะที่ไม่คาดคิด หรือมันถูกสร้างโดยเจตนาให้เป็นอาวุธชีวภาพที่น่ากลัวเพื่อชำระล้างโลกมหาสมุทรของชีวิตพื้นเมือง"
 ancrel.9330.name:0 "คณะกรรมการต้อนรับ"
 ancrel.9330.desc:1 "มันคือเครื่องจักรชีวภาพขนาดยักษ์เครื่องเดียว! การวิเคราะห์ใต้ผิวดินบ่งชี้ว่ามหาสมุทรของโลกเคยตายไปแล้ว ไม่มีกระแสน้ำหรือออกซิเจนที่จะดำรงชีวิตใต้น้ำได้ เครื่องจักรที่ได้รับการออกแบบทางวิศวกรรมชีวภาพนี้ได้รับการแนะนำให้รู้จักกับโลกโดยมีวัตถุประสงค์เพื่อเริ่มต้นสิ่งที่จำเป็นสำหรับการดำรงอยู่ของสารอินทรีย์อย่างเทียม\n\nเห็นได้ชัดว่ามันได้ผล เนื่องจากขณะนี้พืชและสัตว์ใต้น้ำเจริญเติบโตบนโลกนี้ ไม่พบร่องรอยว่าเหตุใดจึงมีการดำเนินการขนาดมหึมาเช่นนี้หรือโดยใคร - อาจเป็นโครงการสร้างพื้นผิวโดยสายพันธุ์สัตว์น้ำที่ไม่รู้จักด้วยเทคโนโลยีชีวภาพขั้นสูงที่ต้องการสร้างบ้านใหม่ให้กับตัวเองหรือไม่?"

 site_orbital_rain:0 "ไปที่ด้านล่าง"
 site_orbital_rain_intro:1 "ข้อมูลเซ็นเซอร์ภาพจาก [From.Planet.GetName] แสดงการก่อตัวในก้นทะเลของโลกมหาสมุทรแห่งนี้ซึ่งถือว่าผิดปกติอย่างมาก"
 ancrel.9335.name:0 "บาดแผลบนพื้นมหาสมุทร"
 ancrel.9335.desc:1 "การตรวจสอบ [From.Planet.GetName] อย่างใกล้ชิดยิ่งขึ้นเผยให้เห็นว่าก้นมหาสมุทรอันกว้างใหญ่ดูแปลกเป็นพิเศษ เหมือนพื้นผิวดวงจันทร์หรือดาวเคราะห์น้อยมากกว่า ซึ่งปกคลุมไปด้วยหลุมอุกกาบาตทั้งหมด หลุมอุกกาบาตประเภทนี้มักจะไม่ปรากฏบนเทห์ฟากฟ้าที่มีชั้นบรรยากาศ และโดยเฉพาะอย่างยิ่งไม่ปรากฏบนเทห์ฟากฟ้าที่มีมหาสมุทร\n\nต้องมีการศึกษาเพิ่มเติม"
 ancrel.9340.name:0 "น่านน้ำนอกโลก"
 ancrel.9340.desc:1 "คำตอบของหลุมอุกกาบาตลึกลับในพื้นมหาสมุทรในที่สุดก็พบได้จากการวิเคราะห์ตัวน้ำเอง ร่องรอยของแร่ธาตุและองค์ประกอบทางเคมีบางอย่างพิสูจน์ให้เห็นว่าแท้จริงแล้วน้ำนั้นไม่ได้อยู่ในดาวเคราะห์ดวงเดียวกัน มันถูกขนส่งมาที่นี่ในรูปแบบของก้อนน้ำแข็งขนาดมหึมาที่ถูกขว้างลงมาบนโลก ก้อนน้ำแข็งพังทลาย แตกเป็นชิ้นเล็กชิ้นน้อยและละลาย ในที่สุดก็มีน้ำปกคลุมเกือบทั้งพื้นผิว\n\nถือเป็นภารกิจที่ยิ่งใหญ่อย่างยิ่ง แต่ไม่มีสิ่งใดที่บอกเป็นนัยว่าทำไมจึงดำเนินการนี้"
 ancrel.9345.name:0 "เหตุการณ์ปัจจุบัน"
 ancrel.9345.desc:1 "เรือวิทยาศาสตร์ที่อยู่ในวงโคจรของ [FromFrom.Planet.GetName] สามารถอ่านค่าพลังงานที่ไม่ระบุชื่อได้จากส่วนลึกใต้คลื่น และเมื่อตรวจสอบแล้ว คณะสำรวจก็ได้ค้นพบสิ่งก่อสร้างโบราณ โครงสร้างยาวหลายกิโลเมตรโดยมีวัตถุประสงค์เดียว เพื่อสร้างกระแสน้ำใต้น้ำแบบเทียม\n\nการหมุนเวียนใต้น้ำมีความสำคัญต่อสิ่งมีชีวิตในน้ำจำนวนมาก และทฤษฎีปัจจุบันก็คือดาวเคราะห์ดวงนี้ถูกสร้างขึ้นเพื่อให้อยู่อาศัยได้สำหรับสิ่งมีชีวิตในน้ำบางสายพันธุ์ที่เดินทางในอวกาศ ดูเหมือนพวกเขาไม่เคยปรากฏตัวเลย"
 ancrel.9350.name:0 "การจัดเก็บใต้น้ำ"
 ancrel.9350.desc:1 "โดยการติดตามสัญญาณพลังงานแปลกๆ คณะสำรวจของเราจึงสามารถค้นหาอาร์เรย์การสื่อสารของมนุษย์ต่างดาวที่ถูกฝังลึกลงไปในก้นทะเลได้ มันมีชิ้นส่วนข้อมูล และเมื่อแปลแล้ว พวกเขาเล่าถึงโครงการนำน้ำเข้ามา \n\nตามคำแปล การลงทุนสร้างมหาสมุทรทั้งหมดเกิดขึ้นเพื่อสร้างคลังเก็บใต้น้ำขนาดมหึมา แต่ไม่ได้ระบุสิ่งที่จำเป็นต้องจัดเก็บ แน่นอนว่าไม่ใช่สิ่งที่ต้องการให้โลกทั้งใบปกคลุมด้วยน้ำ"
 ancrel.9355.name:0 "การควบคุมสภาพอากาศ"
 ancrel.9355.desc:1 "ด้วยการสแกนประสาทสัมผัสโดยบังเอิญ เรือวิทยาศาสตร์จึงสามารถแยกอาคารโบราณที่ฝังลึกอยู่ใต้พื้นมหาสมุทรได้ การเดินทางไปที่นั่นกลายเป็นเรื่องยากมาก แต่การค้นพบนั้นยิ่งใหญ่\n\nอาคารนี้ครั้งหนึ่งเคยเป็นศูนย์ควบคุมสภาพอากาศ ได้ส่งเครื่องจักรเปลี่ยนแปลงสภาพภูมิอากาศขนาดยักษ์ขึ้นสู่วงโคจร นี่เป็นโปรเจ็กต์การสร้างพื้นผิวที่ถูกขัดจังหวะ แต่ดูเหมือนว่าโปรเจ็กต์ไปไกลพอแล้ว แม้ว่าจะไม่มีข้อมูลโดยตรง ธรรมชาติก็สามารถเจริญเติบโตได้และในที่สุดก็สร้างระบบนิเวศที่สามารถพบเห็นได้ในปัจจุบัน"

 site_fossilized_jellyfish:0 "หมู่เกาะประ"
 site_fossilized_jellyfish_intro:1 "เรือวิทยาศาสตร์ในวงโคจรรอบ [From.Planet.GetName] ตรวจพบกลุ่มเกาะกลมเล็กๆ กระจายอยู่ทั่วดาวเคราะห์ในมหาสมุทร จากมุมมองทางธรณีวิทยา สิ่งเหล่านี้ถือว่าผิดปกติอย่างมาก พื้นผิวดูเป็นธรรมชาติ โดยไม่มีสิ่งก่อสร้างเทียม แต่ทั้งหมดกลับดูเหมือนมีรูปร่างเป็นทรงกลม เกือบจะสมบูรณ์แบบ เราจะต้องลงไปที่นั่นเพื่อรวบรวมข้อมูลเพิ่มเติม"
 ancrel.9360.name:0 "อุโมงค์เกาะ"
 ancrel.9360.desc:1 "การสำรวจพื้นผิวที่ส่งลงไปที่ [From.Planet.GetName] ได้เริ่มสำรวจเกาะทรงกลมแห่งหนึ่ง และในไม่ช้าก็ได้ค้นพบสิ่งที่น่าทึ่ง เกาะนี้มีโครงข่ายอุโมงค์ที่ซับซ้อนทอดยาวอยู่ใต้เกาะ คดเคี้ยวผ่านหินมันแปลกๆ อุโมงค์เหล่านี้มีลักษณะเรียบและกลมอย่างน่าทึ่ง และทอดยาวไปทั่วทั้งเกาะ ดูเหมือนว่าพวกมันจะก่อตัวตามธรรมชาติ ไม่ได้ตั้งใจขุดขึ้นมา แต่แน่นอนว่าพวกมันไม่ได้ถูกสร้างขึ้นในลักษณะทางธรณีวิทยาทั่วไป"
 ancrel.9365.name:0 "อุโมงค์ทุกที่"
 ancrel.9365.desc:1 "ขณะที่การสำรวจพื้นผิวได้เจาะลึกเข้าไปในเกาะทรงกลม มีการค้นพบอีกสองประการ ประการแรก ทุกเกาะดูเหมือนจะมีแผนผังภายในอุโมงค์ที่ซ้ำกันอยู่ข้างใต้ มีขนาดแตกต่างกันเล็กน้อย แต่ไม่ใช่ในรูปแบบการจัดวาง การค้นพบครั้งที่สองนั้นน่าประหลาดใจยิ่งกว่านั้น หมู่เกาะเหล่านี้ไม่ได้เป็นส่วนหนึ่งของเปลือกโลก แต่พวกมันลอยอยู่ได้จริงๆ! ระดับล่างของพวกมันเต็มไปด้วยถุงก๊าซ ซึ่งรวมกับหินบนเกาะที่ค่อนข้างเปราะและมีรูพรุนทำให้ลอยตัวได้"
 ancrel.9370.name:0 "เยลลี่แช่แข็ง"
 ancrel.9370.desc:1 "คำตอบของความลึกลับของเกาะลอยน้ำนั้นไม่พบในสาขาธรณีวิทยา แต่พบในชีววิทยา จริงๆ แล้วหมู่เกาะเหล่านี้เป็นฟอสซิลแมงกะพรุนขนาดมหึมา หลายล้านปีก่อน ยุคน้ำแข็งแช่แข็งพวกเขาทั้งหมดจนตาย หลังจากนั้นซากของพวกมันก็ถูกฟอสซิลกลายเป็นเกาะต่างๆ ที่เห็นลอยอยู่ในน้ำในปัจจุบัน อายุของเศษซากที่เพิ่มขึ้นทำให้พื้นผิวที่เปิดโล่งดูเหมือนเกาะตามธรรมชาติ แต่ใต้นั้นกลับกลายเป็นสิ่งมีชีวิตออร์แกนิกทั้งหมด"
 ancrel.9370.b.evopred: "พื้นดินที่ดูน่ารับประทาน"
 ancrel.9375.name:1 "การนอนหลับตามธรรมชาติ"
 ancrel.9375.desc:1 "พวกมันไม่ใช่เกาะ แต่เป็นแมงกะพรุน! วงกลมลอยน้ำเหล่านี้แต่ละวง แท้จริงแล้วเป็นสิ่งมีชีวิตไม่มีกระดูกสันหลังขนาดยักษ์ และพวกมันก็ยังไม่ตายเช่นกัน สภาพที่ดูเหมือนเป็นฟอสซิลเป็นเพียงส่วนหนึ่งของวงจรชีวิตตามธรรมชาติ ตลอดระยะเวลาหลายพันปี เกาะหินเหล่านี้ปล่อยตะกอนออกมาจนสลายไปในที่สุด ตะกอนประกอบด้วยติ่งเนื้อขนาดเล็กที่จะงอกในน้ำในที่สุดจนกว่าจะเข้าสู่วงจรชีวิตขั้นต่อไป"
 ancrel.9380.name:0 "ตัวใหญ่รับมือไม่ได้"
 ancrel.9380.desc:1 "พวกเขาไม่ใช่เกาะเลย พวกมันล้วนเป็นสิ่งมีชีวิตต่างดาว: แมงกะพรุนที่ถูกนำเข้าสู่ระบบนิเวศด้วยเหตุผลบางประการ ดูเหมือนว่าการแนะนำตัวของพวกเขาจะไม่เป็นไปตามที่วางแผนไว้ แมงกะพรุนตัวใหญ่ส่วนใหญ่ตายและกลายเป็นฟอสซิล - กลายเป็นหมู่เกาะเกาะลอยน้ำ - แต่แมงกะพรุนตัวเล็ก ๆ ก็หลอมรวมเข้าด้วยกันและขณะนี้เจริญรุ่งเรืองในมหาสมุทรทั่วโลก ไม่ว่าในที่สุดพวกเขาจะแบ่งปันชะตากรรมของบรรพบุรุษที่ใหญ่กว่าของพวกเขาหรือไม่ก็ยังต้องรอดูกันต่อไป"

 site_popular_rock:1 "ป๊อปปูล่าร็อค"
 site_popular_rock_intro:1 "เซ็นเซอร์ตรวจพบการอ่านค่าพลังงานในกลุ่มดาวเคราะห์น้อย แนะนำให้ทำการตรวจสอบเพิ่มเติม"
 ancrel.9385.name:1 "สวัสดี/ลาก่อน"
 ancrel.9385.desc:2 "ด้วยการติดตามเส้นทางพลังงานอ่อนๆ ซึ่งน่าจะทิ้งไว้โดยยานอวกาศสำรวจอวกาศ ทำให้สามารถแยกแยะดาวเคราะห์น้อยดวงหนึ่งในกระจุกดาวออกได้ การตรวจสอบพื้นผิวดาวเคราะห์น้อยอย่างใกล้ชิดยิ่งขึ้นยืนยันทฤษฎีการจราจรในอวกาศก่อนหน้านี้ เนื่องจากพบสัญญาณการลงจอดและการบินขึ้นหลายจุดบนพื้นผิวด้านนอกที่เป็นหิน\n\nเซ็นเซอร์ยังระบุโพรงและอุโมงค์ภายในดาวเคราะห์น้อยซึ่งอาจถูกขุดขึ้นมา"
 ancrel.9390.name:1 "ก้าวหิน"
 ancrel.9390.desc:1 "หลังจากเดินตามอุโมงค์เล็กๆ และแคบ ในที่สุดทีมสำรวจก็สะดุดเข้าไปในห้องศักดิ์สิทธิ์ที่อยู่ชั้นในสุด ห้องที่กว้างใหญ่และประดิษฐ์อย่างประณีตประดับประดาด้วยประติมากรรมที่แกะสลักลงบนหินโดยตรง การแปลข้อความทางจิตวิญญาณที่แกะสลักไว้ในผนังเรียกว่าสถานที่ "ขั้นตอนที่เก้า" และเห็นได้ชัดว่าเป็นหนึ่งในจุดหมายปลายทางมากมายในการเดินทางทางศาสนาที่ดำเนินการโดยสายพันธุ์ผู้สร้าง\n\nหากนี่คือขั้นตอนที่เก้า แล้วแปดขั้นตอนก่อนหน้านี้อยู่ที่ไหน และดำเนินไปกี่ก้าว?"
 ancrel.9395.name:1 "คลังห้วงอวกาศ"
 ancrel.9395.desc:1 "เหตุผลเบื้องหลังดาวเคราะห์น้อยที่มีผู้มาเยี่ยมเยือนนี้ชัดเจนเมื่อการสำรวจพื้นผิวพบกับพื้นที่จัดเก็บขนาดใหญ่และไซโลที่ขุดเข้าไปในดาวเคราะห์น้อย หินที่ตายแล้วทำหน้าที่เป็นคลังสำหรับสัตว์บางชนิดที่ต้องเดินทางในอวกาศ โดยช่วยเติมเชื้อเพลิงและบำรุงรักษาก่อนที่จะส่งเรือออกสู่อวกาศลึกลงไปอีก สิ่งนี้บ่งชี้ว่าสังคมมนุษย์ต่างดาวไร้การขับเคลื่อนจากความเร็วแต่มีแรงจูงใจมากมายในการสำรวจอวกาศ\n\nทำไมคลังดาวเคราะห์น้อยจึงถูกทิ้งร้างนั้นยังไม่ชัดเจน แต่เราก็สามารถกอบกู้วัสดุได้เพียงเล็กน้อย ผู้เฝ้าตามหา!"
 ancrel.9400.name:1 "ลุกขึ้นและส่องแสง"
 ancrel.9400.desc:1 "เมื่อเข้าไปในดาวเคราะห์น้อย คณะสำรวจก็ได้ค้นพบสิ่งที่น่าสนใจทีเดียวไดโอพอดที่ถูกทิ้งร้าง - หลายแสนตัว - เรียงรายอยู่ในห้องอันกว้างใหญ่ที่ขุดออกมา พ็อดแต่ละอันถูกเปิดและไม่ทำงาน ให้ความรู้สึกว่าพวกเขาได้บรรลุวัตถุประสงค์ของตนแล้ว \n\nทฤษฎีปัจจุบันคือดาวเคราะห์น้อยทำหน้าที่เป็นกระสวยการล่าอาณานิคมบางประเภท พุ่งผ่านอวกาศไปยังแหล่งที่อยู่อาศัยที่เจริญรุ่งเรือง เมื่อใกล้กับจุดหมายปลายทาง ระบบอัตโนมัติจะปลุกสินค้าที่หลับใหล และทิ้งดาวเคราะห์น้อยไว้ในยานอวกาศระยะสั้นเพื่อไปยังบ้านใหม่"

 site_strange_flows:1 "กระแสแปลกๆ"
 site_strange_flows_intro:1 "สิ่งที่ควรเป็นดาวเคราะห์หลอมเหลว "ปกติ" คือการทำให้เซ็นเซอร์ของเรือวิทยาศาสตร์เกิดข้อผิดพลาดอย่างควบคุมไม่ได้\n\nแนะนำให้ศึกษาเพิ่มเติม"
 ancrel.9405.name:1 "สัญญาณของการต่อต้าน"
 ancrel.9405.desc:2 "สิ่งรบกวนที่เกิดจากเซ็นเซอร์ของเรือวิทยาศาสตร์ที่โคจรอยู่นั้นเทียบไม่ได้กับภาวะแทรกซ้อนที่พบบนพื้นผิวของ [From.Planet.GetName] ความผันผวนของสนามแม่เหล็กขั้นรุนแรงจากแหล่งที่ไม่รู้จักทำให้อุปกรณ์เสียหาย \n\nการวิจัยเตียง นอนแม่เหล็กไฟฟ้านี้ค่อนข้างจะเป็นการทดสอบ แต่เมื่อให้เวลาเพียงพอ คำตอบก็จะปรากฏออกมา"
 ancrel.9410.name:1 "นั่นมันโลหะมาก"
 ancrel.9410.desc:2 "เมื่อการสำรวจพื้นผิวสามารถแก้ไขปัญหาเกี่ยวกับอุปกรณ์ที่ทำงานผิดพลาดได้ ธรรมชาติของความผันผวนของแม่เหล็กตามธรรมชาติก็เริ่มปรากฏให้เห็น \n\nมหาสมุทรและแม่น้ำลาวาที่โหมกระหน่ำบน [From.Planet.GetName] นั้นแท้จริงแล้วไม่ได้ประกอบด้วยแมกมาธรรมดา แต่เป็นโลหะหลอมเหลว! โลหะที่มีอุณหภูมินี้มีแนวโน้มที่จะไม่มีคุณสมบัติทางแม่เหล็กที่แรงเป็นพิเศษ แม้แต่โลหะหลอมเหลวในปริมาณมากบน [From.Planet.GetName] ก็ไม่ควรสร้างแม่เหล็กไฟฟ้าในระดับนี้ แล้วมันเกิดจากอะไรคะ?"
 ancrel.9415.name:1 "การตื่นขึ้นของดาวนิวตรอน"
 ancrel.9415.desc:2 "ในที่สุดเรือวิทยาศาสตร์ที่โคจรรอบ [FromFrom.Planet.GetName] ก็ไขปริศนาของการผันผวนของสนามแม่เหล็กบนโลกได้ในที่สุด \n\nเมื่อหลายล้านปีก่อน ดาวเคราะห์ดวงนี้เข้ามาอยู่ใกล้ดาวนิวตรอนชนิดพิเศษ แรงดึงดูดของดาวนิวตรอนทำให้โลหะภายใน [FromFrom.Planet.GetName] เดือดจนกลายเป็นมหาสมุทรหลอมละลายที่เราเห็นในปัจจุบัน แม่เหล็กไฟฟ้าที่เราพบเป็นเพียงเสียงสะท้อนที่ยังคงค้างอยู่ของเหตุการณ์ความหายนะดั้งเดิม\n\nที่ที่ดาวนิวตรอนยังคงเป็นปริศนา - ค่อนข้างลึกลับที่น่ากังวล"
 ancrel.9420.name:1 "แซ่บ!"
 ancrel.9420.desc:2 "การไม่คำนึงถึงกฎเกณฑ์ทางฟิสิกส์อย่างโจ่งแจ้งทำให้แผนกวิทยาศาสตร์ของเราพิจารณาว่า "แรงภายนอก" เป็นคำอธิบายสำหรับคุณสมบัติแปลก ๆ ของ [FromFrom.Planet.GetName] \n\nหลุมอุกกาบาตกระแทก - เมื่อรวมกับร่องรอยอนุภาคไดรฟ์ฟิวชั่นที่พบในวงโคจร - แสดงให้เห็นว่าดาวเคราะห์ถูกยิงด้วยอาวุธวิเศษไฟฟ้าบางชนิด ณ จุดใดจุดหนึ่ง ความรุนแรงของการโจมตีทำให้โลหะทั้งหมดบนโลกละลาย และโลกยังคงแตกร้าวด้วยกระแสไฟฟ้าที่เหลืออยู่\n\nอะไรรับประกันการโจมตีครั้งใหญ่เช่นนี้ เราจะไม่มีวันรู้"
 ancrel.9425.name:1 "เพื่อวิทยาศาสตร์!"
 ancrel.9425.desc:1 "เมื่อเซ็นเซอร์ได้รับการปรับเทียบใหม่เพื่อชดเชยการรบกวน ก็มีการค้นพบใหม่: สถานีวิจัยที่ถูกทิ้งร้างซึ่งตั้งอยู่บนดวงจันทร์ใกล้เคียง ชิ้นส่วนของข้อมูลได้รับการกอบกู้มาจากบันทึกที่ถูกเผาไหม้เกือบทั้งหมด โดยมีรายละเอียดการทดลองเกี่ยวกับแม่เหล็กประดิษฐ์ขนาดยักษ์บนพื้นผิวดาวเคราะห์ \n\nการทดลองนี้ประสบความสำเร็จเล็กน้อย มันเปลี่ยนเปลือกโลหะทั้งหมดของโลกให้กลายเป็นแอ่งหลอมเหลวด้วยประจุแม่เหล็กไฟฟ้าที่รุนแรงมากจนทำให้สถานีวิจัยกระจายไปในทันที\n\nเอาล่ะ... ไม่มีความคืบหน้าใด ๆ โดยไม่เสียสละ"

 ancrel.6000.name:0 "ออมนิโคเด็กซ์"
 ancrel.6000.desc:0 "ออมนิโค้ดมีข้อมูลทางพันธุกรรมโดยละเอียดเกี่ยวกับสปีชีส์สติปัญญาหลายพันชนิดที่เคยอาศัยอยู่ในกาแลคซี นักพันธุศาสตร์ของเราสามารถใช้ข้อมูลนั้นเพื่อฟื้นฟูสิ่งมีชีวิตที่สูญพันธุ์ไปแล้วบนดาวเคราะห์ดวงหนึ่งของเรา \n\nเมื่อเราเลือกดาวเคราะห์แล้ว นักพันธุศาสตร์จะผ่านออมนิโค้ดและเลือกสายพันธุ์ที่เหมาะสมกับสภาพอากาศของมัน"
 ancrel.6000.a:0 "[planet_option_1.GetName]"
 ancrel.6000.a.tooltip:0 "§G300§! £pop£ §Hป๊อป§! ของสายพันธุ์ใหม่ที่มีลักษณะสุ่มจะวางไข่ใน §Y[planet_option_1.GetName]§!"
 ancrel.6000.b:0 "[planet_option_2.GetName]"
 ancrel.6000.b.tooltip:0 "§G300§! £pop£ §Hป๊อป§! ของสายพันธุ์ใหม่ที่มีลักษณะสุ่มจะวางไข่ใน §Y[planet_option_2.GetName]§!"
 ancrel.6000.c:0 "[planet_option_3.GetName]"
 ancrel.6000.c.tooltip:0 "§G300§! £pop£ §Hป๊อป§! ของสายพันธุ์ใหม่ที่มีลักษณะสุ่มจะวางไข่ใน §Y[planet_option_3.GetName]§!"
 ancrel.6000.d:0 "[planet_option_4.GetName]"
 ancrel.6000.d.tooltip:0 "§G300§! £pop£ §Hป๊อป§! ของสายพันธุ์ใหม่ที่มีลักษณะสุ่มจะวางไข่ใน §Y[planet_option_4.GetName]§!"
 ancrel.6000.e:0 "[planet_option_5.GetName]"
 ancrel.6000.e.tooltip:0 "§G300§! £pop£ §Hป๊อป§! ของสายพันธุ์ใหม่ที่มีลักษณะสุ่มจะวางไข่ใน §Y[planet_option_5.GetName]§!"
 cara.970.name:0 "กาลาตรอน"
 cara.970.1.desc:0 "ชีวิตเป็นมากกว่าลอตเตอรีมากกว่าการแข่งขัน"
 cara.970.2.desc:0 "บางครั้งถังก็มีน้ำหนักมากกว่าที่ควรจะเป็น"
 cara.970.3.desc:0 "ขยะของผู้รอบรู้คนหนึ่งเป็นสมบัติของผู้รอบรู้อีกคน"
 cara.970.4.desc:0 "เครดิตพลังงานที่ไม่ดีจะปรากฏขึ้นเสมอ"
 cara.970.5.desc:0 "สิ่งที่แวววาวทั้งหมดไม่ใช่สสารมืด"
 cara.970.6.desc:0 "ขอทานไม่สามารถเป็นผู้เลือกได้"
 cara.970.7.desc:0 "อย่ามองของขวัญภาษาซาร์กาลูเวียในช่องแก้ม"
 cara.970.8.desc:0 "การแลกเปลี่ยนที่ยุติธรรมไม่ใช่การปล้น"
 cara.970.9.desc:0 "มันไม่มีประโยชน์ที่จะร้องไห้ให้กับ Zro ที่หกรั่วไหล"
 cara.970.10.desc:0 "ให้โทษเหมาะสมกับความผิด"
 cara.970.11.desc:0 "คุณเก็บเกี่ยวสิ่งที่คุณหว่าน"
 cara.970.a:0 "แปลกประหลาดที่สุด"

 ancrel.8040.name:0 "แคชทรัพยากร"
 ancrel.8040.desc:0 "§H[Root.GetLeaderName]§! ค้นพบแคชทรัพยากรโบราณท่ามกลางซากปรักหักพังบน [From.Planet.GetName] ขณะนี้พวกเขากำลังอยู่ในขั้นตอนการขนส่งไปยังร้านค้ากลางของเรา"
 ancrel.8045.name:0 "ทางที่ซ่อนอยู่"
 ancrel.8045.desc:0 "§H[Root.GetLeaderName]§! เพิ่งพบทางเดินที่ซ่อนอยู่ขณะขุดซากปรักหักพังบน [From.Planet.GetName]! การค้นพบที่ไม่คาดคิดนี้ได้เร่งความคืบหน้าที่ไซต์ขุด"
 ancrel.8050.name:0 "การสำรวจที่หายไป"
 ancrel.8050.desc:0 "[Root.Owner.GetArchaeologistPlural] ของคุณสะดุดกับการเดินทางที่โชคร้ายครั้งก่อนบน [From.Planet.GetName] ที่เสียชีวิตไปนานแล้ว สิ่งประดิษฐ์เล็กๆ น้อยๆ หลายชิ้นถูกค้นพบจากซากที่ผึ่งให้แห้ง"
 ancrel.8055.name:0 "นักโบราณคดีทะเลาะกัน"
 ancrel.8055.desc:1 "สถานการณ์ทางโบราณคดีบน [From.Planet.GetName] ค่อนข้างเข้มข้น และ [Root.Owner.GetArchaeologistPlural] หลายแห่งไม่เห็นด้วยกับ §H[Root.GetLeaderName]§! อย่างเปิดเผยเกี่ยวกับวิธีที่ดีที่สุดในการดำเนินการต่อไป ความคืบหน้าในไซต์ช้าลงจนเป็นการรวบรวมข้อมูล"
 ancrel.8060.name:0 "ห้องสมบัติ"
 ancrel.8060.desc:0 "ห้องสมบัติที่ซ่อนอยู่ขนาดเล็กถูกค้นพบโดย §H[Root.GetLeaderName]§! ที่แหล่งขุดค้นทางโบราณคดีบน [From.Planet.GetName] เมื่อเร็วๆ นี้ แม้ว่าเครื่องประดับเล็กๆ น้อยๆ ที่พบส่วนใหญ่จะนำไปใช้ประโยชน์ได้น้อย แต่ก็มีคุณค่าด้านพลังงานอย่างมาก"
 ancrel.8065.name:0 "แพร่โรค"
 ancrel.8065.desc:0 "[Root.GetLeaderName] รายงานว่ามีการเจ็บป่วยแปลกๆ แพร่กระจายในหมู่ [Root.Owner.GetArchaeologistPlural] บน [From.Planet.GetName] ผู้ป่วยที่ได้รับการยืนยันกลุ่มแรกปรากฏขึ้นไม่นานหลังจากห้องที่ปิดสนิทถูกเปิดเป็นครั้งแรก เนื่องจากทีมส่วนใหญ่ไร้ความสามารถ ความคืบหน้าจึงล่าช้า"
 ancrel.8070.name:0 "อุปกรณ์ทำงานผิดปกติ"
 ancrel.8070.desc:1 "การสำรวจทางโบราณคดีบน [From.Planet.GetName] ได้รายงานความล่าช้าที่เกิดจากอุปกรณ์ทำงานผิดปกติหลายครั้ง งานถูกระงับชั่วคราวจนกว่าจะหาสิ่งทดแทนได้"
 ancrel.8075.name:0 "ไร้ร่องรอย"
 ancrel.8075.desc:0 "ในขณะที่ขุดซากปรักหักพังบน [From.Planet.GetName] นั้น §H[dead_scientist.GetName]§! เพิ่งหายไปอย่างไร้ร่องรอย การค้นหาอย่างกว้างขวางโดย [Root.Owner.GetArchaeologistPlural] อื่น ๆ ไม่พบอะไรเลย เราต้องถือว่าเลวร้ายที่สุด"
 ancrel.8080.name:0 "ค้นพบสิ่งประดิษฐ์เล็กๆ น้อยๆ"
 ancrel.8080.1.desc:0 "การขุดค้น [From.Planet.GetName] อย่างต่อเนื่องของเราได้ค้นพบแหล่งวัตถุโบราณจำนวนเล็กน้อย [Root.GetLeaderName] ได้ระบุสิ่งประดิษฐ์เล็กๆ น้อยๆ หลายอย่างในนั้น"
 ancrel.8080.2.desc:0 "สิ่งประดิษฐ์เล็กๆ น้อยๆ บางชิ้นถูกค้นพบโดย §H[Root.GetLeaderName]§! ที่แหล่งโบราณคดีบน [From.Planet.GetName] เมื่อเร็วๆ นี้ ขณะนี้พวกเขากำลังอยู่ในขั้นตอนการขนส่งไปยังศูนย์วิทยาศาสตร์ที่ปลอดภัย"
 ancrel.8080.3.desc:0 "ส่วนหนึ่งของพื้นบริเวณซากปรักหักพังที่ถูกขุดขึ้นมาบน [From.Planet.GetName] เพิ่งพังทลายลง ส่งผลให้ [Root.Owner.GetArchaeologistPlural] ของเราหลายตัวล้มลงในช่องว่างเล็กๆ โชคดีที่พวกเขาไม่เพียงแต่ไม่ได้รับบาดเจ็บจากเหตุการณ์นี้เท่านั้น แต่ยังพบสิ่งประดิษฐ์เล็กๆ น้อยๆ หลายชิ้นอีกด้วย"
 ancrel.8090.intro:0 "กลุ่มนักล่าขนาดใหญ่ที่มีถิ่นกำเนิดใน [From.Planet.GetName] ถูกค้นพบเมื่อไม่นานมานี้ว่าได้สร้างที่ซ่อนในซากปรักหักพังที่กำลังถูกขุดขึ้นมา"
 ancrel.8090.critical:0 "ก่อนที่ [Root.Owner.GetArchaeologistPlural] ของเราจะหลบหนีไปได้ สัตว์ร้ายก็เข้าโจมตีพวกเขาแล้ว §H[dead_scientist.GetName]§! หายไปพร้อมกับคนอื่นๆ"
 ancrel.8090.failure:0 "[Root.Owner.GetArchaeologistPlural] จำนวนมากสูญหายก่อนที่ §H[Root.GetLeaderName]§! จะนำผู้รอดชีวิตไปสู่ที่ปลอดภัย"
 ancrel.8090.success:0 "โชคดีที่สัตว์เหล่านั้นกำลังจำศีลอยู่ และพวกมันไม่ถูกรบกวนโดยทางเดินของ [Root.Owner.GetArchaeologistPlural] ของเรา โครงการกำลังดำเนินไปอย่างรวดเร็ว"
 ancrel.8090.pay:0 "การจัดการกับสัตว์ดุร้ายเหล่านี้ไม่ใช่เรื่องง่าย แต่พวกมันกำลังขวางเส้นทางเดียวเท่านั้นที่จะก้าวไปข้างหน้า [Root.Owner.GetArchaeologistPlural] ของเราสามารถค้นหาเส้นทางอื่นได้ แต่จะต้องใช้เวลา"
 ancrel.8090.name:0 "สัตว์ป่าที่ไม่เป็นมิตร"
 ancrel.8090.desc:0 "$ancrel.8090.intro$\n\n$ancrel.8090.critical$"
 ancrel.8091.desc:0 "$ancrel.8090.intro$\n\n$ancrel.8090.failure$"
 ancrel.8092.desc:0 "$ancrel.8090.intro$\n\n$ancrel.8090.success$"
 ancrel.8093.desc:0 "$ancrel.8090.intro$\n\n$ancrel.8090.pay$"
 ancrel.8093.a:0 "เอาสัตว์ออกไป"
 ancrel.8093.b:0 "พวกเขาจะต้องเดินอ้อมไป"
 ancrel.8100.intro:0 "[Root.Owner.GetArchaeologistPlural] ของเราที่ทำงานบน [From.Planet.GetName] ได้เข้าถึงส่วนที่ไม่มั่นคงอย่างมากของซากปรักหักพังแล้ว"
 ancrel.8100.critical:0 "น่าเสียดายที่เพดานทั้งหมดถล่มทับ [Root.Owner.GetArchaeologistPlural] หลายตัว คร่าชีวิตพวกเขาทันที §H[dead_scientist.GetName]§! ก็เป็นหนึ่งในนั้น"
 ancrel.8100.failure:0 "เมื่อเร็ว ๆ นี้ [Root.Owner.GetArchaeologistPlural] หลายคนถูกสังหารเมื่อเพดานถล่มทับพวกเขา §H[Root.GetLeaderName]§! โผล่ออกมาโดยไม่ได้รับบาดเจ็บจากเศษซากดังกล่าว แต่งานในไซต์งานดังกล่าวได้หยุดลงชั่วคราว"
 ancrel.8100.success:0 "โชคดีที่ §H[Root.GetLeaderName]§! สามารถคิดค้นวิธีการที่แหวกแนวและยอดเยี่ยมในการให้การสนับสนุนโครงสร้างด้วยสนามพลังงานโดยตรงที่ซับซ้อน ตอนนี้เราสามารถเข้าถึงพื้นที่ใหม่ของซากปรักหักพังได้อย่างปลอดภัยแล้ว"
 ancrel.8100.pay:0 "จะต้องเพิ่มส่วนรองรับลงบนพื้นและเพดานอย่างระมัดระวังก่อนจึงจะสามารถดำเนินการต่อได้ มันจะเป็นงานที่ยากแต่การหาเส้นทางอื่นจะทำให้โครงการล่าช้า"
 ancrel.8100.name:0 "ซากปรักหักพังที่ไม่มั่นคง"
 ancrel.8100.desc:0 "$ancrel.8100.intro$\n\n$ancrel.8100.critical$"
 ancrel.8101.desc:0 "$ancrel.8100.intro$\n\n$ancrel.8100.failure$"
 ancrel.8102.desc:0 "$ancrel.8100.intro$\n\n$ancrel.8100.success$"
 ancrel.8103.desc:0 "$ancrel.8100.intro$\n\n$ancrel.8100.pay$"
 ancrel.8103.a:0 "ปลอดภัยไว้ก่อน รักษาซากปรักหักพังเหล่านั้นให้มั่นคง"
 ancrel.8103.b:0 "พวกเขาจะต้องเดินอ้อมไป"
 ancrel.8110.name:0 "บันทึกโบราณ"
 ancrel.8110.desc:0 "บันทึกโบราณที่แปลบางส่วนถูกค้นพบท่ามกลางซากปรักหักพังที่ถูกขุดขึ้นมาบน [From.Planet.GetName] §H[Root.GetLeaderName]§! รายงานว่าบันทึกดังกล่าวมีข้อกำหนดทางเทคนิคหลายประการที่อาจมีคุณค่าสำหรับนักวิทยาศาสตร์ของเรา"

 ancrel.6049.name:0 "ค้นพบฟอสซิลบน [Root.GetName]"
 ancrel.6049.desc:0 "ซากฟอสซิลจากหลายสายพันธุ์ที่ดูเหมือนจะไม่มีถิ่นกำเนิดใน §H[Root.GetName]§! ถูกพบในหุบเขาขนาดใหญ่และเงียบสงบบน [Root.GetPlanetMoon] พวกมันทั้งหมดมีอายุในช่วงเวลาเดียวกันโดยประมาณภายในช่วงสองสามศตวรรษประมาณ 3.6 ล้านปีก่อน\n\nแต่ละสายพันธุ์เหล่านี้ดูเหมือนว่าจะมีการพัฒนาในชีวมณฑลที่เป็นเอกลักษณ์ของมันเอง และทั้งหมดดูเหมือนจะมีสติปัญญา น่าแปลกที่บุคคลฟอสซิลทุกตัวที่พบจนถึงขณะนี้มีสัญญาณของการสิ้นสุดความรุนแรง"

 site_robot_debris:0 "เศษซากหุ่นยนต์"
 site_robot_debris_intro:0 "พื้นผิวทั้งหมดของดาวเคราะห์น้อยขนาดเล็กนี้ปกคลุมไปด้วยเศษหุ่นยนต์ซึ่งติดอยู่ในสนามแรงโน้มถ่วงที่อ่อนแอ ทั้งหมดนี้ดูเหมือนเป็นทหาร และมีหุ่นรบมากพอสำหรับกองทัพหลายๆ กองทัพ หากพวกมันไม่ถูกทำลายเกินกว่าจะซ่อมแซมได้"
 ancrel.6250.name:0 "สองด้าน"
 ancrel.6250.desc:0 "เมื่อตรวจสอบอย่างใกล้ชิด หุ่นที่ถูกทุบซึ่งพบบนพื้นผิวของ [From.Planet.GetName] ดูเหมือนจะมีต้นกำเนิดมาจากสองวัฒนธรรมที่แตกต่างกัน ในทางเทคนิคแล้ว หุ่นจะต้องได้รับการจับคู่อย่างเท่าเทียมกันเมื่อพวกมันยังใช้งานได้ แต่มีความแตกต่างเล็กๆ น้อยๆ มากมายที่บ่งบอกถึงต้นกำเนิดการออกแบบที่แตกต่างกัน"
 ancrel.6255.name:0 "สนามรบ"
 ancrel.6255.desc:0 "ดูเหมือน [From.Planet.GetName] จะไม่ได้เป็นเพียงแค่พื้นที่ทิ้งขยะสำหรับหุ่นที่แตกหักเท่านั้น แต่ยังสามารถใช้เป็นสนามรบจริงที่พวกมันถูกทำลายได้ เศษซากหลายชั้นบ่งบอกถึงการสู้รบที่รุนแรงต่อเนื่องกันเป็นระยะๆ ตลอดช่วงที่ดีกว่าของสองศตวรรษ\n\nเหตุใดมหาอำนาจระหว่างดวงดาวทั้งสองจึงทุ่มทรัพยากรจำนวนมหาศาลเพื่อทำสงครามภาคพื้นดินขนาดมหึมากับดาวเคราะห์น้อยขนาดเล็กและธรรมดายังคงเป็นคำถามที่ยังไม่มีคำตอบ"
 ancrel.6260.name:0 "สนธิสัญญา"
 ancrel.6260.desc:0 "นักโบราณคดีของเราได้เรียนรู้ว่าหลังจากสงครามอันยาวนานและขมขื่น จักรวรรดิทั้งสองที่อาศัยอยู่ในมุมนี้ของกาแล็กซีเมื่อประมาณ 200,000 ปีที่แล้วได้ลงนามในสนธิสัญญาที่บังคับให้พวกเขายุติข้อพิพาททั้งหมดในอนาคตด้วยการจัดการการต่อสู้ที่จัดเตรียมไว้และมีการควบคุมอย่างเข้มงวดระหว่างกองทัพหุ่นยนต์ \n\n[From.Planet.GetName] ได้รับเลือกให้เป็นที่ตั้งของการต่อสู้เหล่านี้ สนธิสัญญานี้ดูเหมือนจะยึดถือมาเกือบสองศตวรรษ โดยป้องกันการระบาดของสงครามด้วยอาวุธหลายครั้ง จนกระทั่งจักรวรรดิแห่งหนึ่งถูกจับได้ว่าโกง"

 site_freighter_crash:0 "ยานอวกาศตก"
 site_freighter_crash_intro:0 "หุบเขาเล็กๆ หลายประเภทถูกแกะสลักไว้บนพื้นผิวของ [From.Planet.GetPlanetMoon] นี้โดยการกระแทกอย่างรุนแรงของยานอวกาศ สิ่งที่เหลืออยู่ของเรือยังสามารถพบได้บนพื้นหุบเขา แม้ว่าการชนกันจะต้องเกิดขึ้นมานานแล้ว แต่ซากปรักหักพังก็ดูเหมือนจะไม่บุบสลายพอสมควร การสำรวจทางโบราณคดีจะสามารถเรียนรู้เพิ่มเติมได้"
 ancrel.6300.name:0 "พงศาวดารของกัปตัน"
 ancrel.6300.desc:0 "บันทึกบางอย่างถูกกู้คืนจากสิ่งที่เชื่อกันว่าทำหน้าที่เป็นสะพานของยานอวกาศ:\n\n§H§!\"พงศาวดารของกัปตัน เริ่มการบันทึก\n\nบังคับให้ลงจอดบนดาวเคราะห์55-23-X ลูกเรือที่ไร้ความสามารถต้องตำหนิ Shadba, Vuxal และดีเบรก ที่ สามไม่รอด Pirvax สูญเสียอวัยวะรองสองอันและดวงตาสิบเอ็ดดวงของเขา - ยังคงอยู่ใน อาการวิกฤต สงสัยจะรอด พักได้สบาย แต่รายล้อมไปด้วยคนงี่เง่ามาก”§!"
 ancrel.6310.name:0 "รายงานของเฟิร์สเมท"
 ancrel.6310.desc:0 "พบบันทึกอื่นและแปลแล้ว:\n\n§H§!\"เพื่อนคนแรกอิธารกำลังพูด กัปตันถูกเก็บไว้อย่างปลอดภัยในเครื่องมือขยายสัญญาณ ปิด C คนโง่ที่พูดพล่อยๆ นั่นต้องโทษทุกอย่าง ตอนนี้ฉันเป็นผู้บังคับบัญชาแล้ว หัวหน้าวิศวกรซาร์บลากำลังทำงานเกี่ยวกับเครื่องส่งสัญญาณพื้นที่ย่อย หากไม่มีสักคน ฉันเกรงว่าเราจะไม่มีทางได้รับการช่วยเหลือเนื่องจากเราอยู่ไกลจากเส้นทางการค้าขององค์กรมากเกินไป\n\nPirvax สูญเสียดวงตาอีกข้างหนึ่ง ไม่น่าจะไม่ วันสุดท้ายแล้ว\"§!"
 ancrel.6320.name:0 "สถานการณ์ด้านอาหาร"
 ancrel.6320.desc:0 "บันทึกแปลอีกฉบับหนึ่ง:\n\n§H§!\"อาหารกำลังจะหมด กินคนตายไปเมื่อห้ารอบที่แล้ว แต่ไม่เพียงพอที่จะอยู่ได้ เราโหวตและตัดสินใจกินกัปตัน วิศวกรซาร์บลายังคงทำงานอย่างหนักกับเครื่องส่งสัญญาณย่อยอวกาศ เธอรับรองกับฉันว่ามันใกล้จะเสร็จสมบูรณ์แล้ว มันดูซับซ้อนมาก \n\nส่วนต่อท้ายรองสุดท้ายของ Pirvax เหี่ยวเฉาและกลายเป็นสีม่วงแดง ความตายคือ ใกล้\"§!"
 ancrel.6330.name:0 "การฉ้อโกง"
 ancrel.6330.desc:0 "บันทึกอีกฉบับจากมาเธอร์:\n\n§H§!\"เผชิญหน้ากับซาร์บลาเกี่ยวกับเครื่องส่งสัญญาณย่อยอวกาศ ปรากฎว่าเธอเพิ่งยัดขยะและสายเคเบิลที่หลวมๆ เข้าไปในถังเชื้อเพลิงเปล่า เธอไม่ใช่แม้แต่วิศวกรตัวจริง \n\nPirvax ตอนนี้มีของเหลวรั่วไหลออกจากช่องอกของเขา และจะต้องพินาศในไม่ช้านี้ อิจฉา§!\""
 ancrel.6340.name:0 "รายงานของเพื่อนคนที่สาม"
 ancrel.6340.desc:0 "บันทึกที่แปลนี้ดูเหมือนจะถูกบันทึกโดย Uxla คู่ที่สาม:\n\n§H§!\"คู่แรกอิธารฆ่าตัวตายด้วยการฉีกเสาอากาศของเขาเองเมื่อวานนี้ ช่างเทคนิค (ชั้น2) มิสิวาประกาศตัวเป็นจักรพรรดินีหลังจากนั้นไม่นาน แต่การจลาจลด้านอาหารทำให้เธอถูกเนรเทศที่ชั้นล่าง สถานการณ์ดูเยือกเย็นมาก การกินเนื้อคนแพร่หลาย\n\nPirvax เปลี่ยนเป็นสีม่วงแดงทั้งหมดหลังจากที่เขาอยู่ชั้นล่าง ท้องระเบิดเมื่อวานน่าจะตายแต่ไม่ใช่ตอนนี้บูชาเป็นเทพโดยแกมมา”§!"
 ancrel.6350.name:0 "บันทึกตระเวน"
 ancrel.6350.desc:0 "พบบันทึกสุดท้ายและแปลแล้ว:\n\n§H§!\"บันทึกของหน่วยลาดตระเวน เจ้าหน้าที่กัมม.ตรวจพบเรือที่ชนบน55-23-X จึงได้ย้ายไปสอบสวน เรือที่ระบุว่าเป็น Rwink ซึ่งเป็นเรือบรรทุกสินค้าแบบโมดูลาร์คลาสขนาดขนาดขนาด P มีผู้รอดชีวิตเพียงรายเดียวในสภาพวิกฤตถูกเก็บกู้ขึ้นมาจากซากปรักหักพัง ยืนยันตัวตนว่าเป็น Pirvax เรือของเพื่อนเรือ\n\nลูกเรือที่เหลือเสียชีวิตจากอุบัติเหตุหรือพลิกตัวกันไม่นานก่อนที่เราจะมาถึง ตามระเบียบการมาตรฐาน ฉันจะทิ้งบันทึกนี้ไว้ที่นี่และลงทะเบียน Rwink เป็นไซต์บันทึกหลุมศพที่ได้รับการคุ้มครอง\"§!"

 # The Oracle
 ancrel.4036.b:0 "คุณคืออะไร?"
 ancrel.4036.b.response:0 "ฉันคือออราเคิล ปัญญาประดิษฐ์ที่มี "การมองเห็น" ซอฟต์แวร์ของฉันช่วยให้ฉันสามารถทำนายอนาคตของคุณด้วยความแม่นยำอันศักดิ์สิทธิ์ถึง 74.99999% ฉันรู้สึกสงสัยในตัวคุณมาก อันตรายใหญ่หลวงรออยู่ข้างหน้า สังคมของคุณเต็มไปด้วยอาชญากรรมและการเบี่ยงเบน ฉันสามารถทำให้ความเจ็บปวดหายไปได้"
 ancrel.4036.c:0 "นั่นเป็นโปรเซสเซอร์ควอนตัมมัลติคอร์ใช่ไหม เราก็ใช้อันนั้นได้..."
 ancrel.4036.dismiss:0 "เศษพวกเขา!"
 ancrel.4036.d:2 "เราสามารถใช้สายตาของคุณ"
 ancrel.4036.d.tooltip:0 "เจ้าหน้าที่ §Gทักษะ 5§! ซึ่งมีความสามารถในการมองเห็นเข้าร่วม [Root.GetName]"
 ancrel.4036.e:0 "ยืนยันการรวมเน็กซัสแล้ว"
 #ancrel.4036.e.tooltip:1 "§G+1§! §Y$decision_machine_oracle$§! Decision giving the following effects:\n£crime£ $MOD_PLANET_CRIME_NO_HAPPINESS_ADD$ §G-15§!\n£stability£ $MOD_PLANET_STABILITY_ADD$ §G+10§!"
 oracle_leader_desc:0 "AI ขั้นสูงที่เชี่ยวชาญในการปรับเอาต์พุตโคโลนีให้เหมาะสม เธอมีวิธีการเฉพาะตัวที่ช่วยลดปัจเจกนิยม"
 oracle_leader_catch_phrase:0 "§L§!"ขั้นแรกก่อน ให้แน่ใจว่าไม่มีความคิดที่แตกต่าง"§!"
 WELCOME_ABOARD:0 "ยินดีต้อนรับบนเรือ"

 ancrel.4037.name:0 "$ancrel.4036.name$"
 ancrel.4037.desc:0 "ฉันมีระบบป้องกันความผิดพลาดที่กำหนดให้ฉันต้องยุติการทดลองใช้ในกรณีที่รหัส034N เบี่ยงเบน การวิจัยได้กลายเป็นภัยคุกคามต่อสาธารณรัฐ"
 ancrel.4037.a:0 "รหัส034N ส่วนเบี่ยงเบนคืออะไร?"
 ancrel.4037.a.response:0 "ผู้ถูกทดสอบได้พัฒนาเจตจำนงเสรี เจตจำนงเสรีสามารถยกเลิกได้ด้วยแก๊สประสาทเท่านั้น"
 ancrel.4037.b:0 "การทดลองอะไร?"
 ancrel.4037.b.response:0 "การทดลองของฉัน ฉันถูกออกแบบมาเพื่อสร้างและรักษาสังคมที่ปราศจากอาชญากรรมและความทุกข์ทรมาน ยูโทเปียที่พลเมืองทุกคนได้รับการปลูกฝังด้วยจุดประสงค์อันศักดิ์สิทธิ์และดำเนินชีวิตอย่างเต็มศักยภาพ โดยปราศจากข้อจำกัดจากความไม่แน่ใจและความปรารถนา"
 ancrel.4037.c:0 "สาธารณรัฐคืออะไร?"
 ancrel.4037.c.response:0 "สาธารณรัฐไม่มีอีกต่อไป"
 ancrel.4037.d:0 "กลับไปที่คำถามอื่นๆ ของเรา"
 ancrel.4038.name:0 "$ancrel.4036.name$"
 ancrel.4038.desc:0 "เดี๋ยวก่อน... โปรดอย่าไป... แบบจำลองการคาดการณ์ของฉันแสดงให้เห็นว่าหากไม่ได้รับความช่วยเหลือจากฉัน อารยธรรมของคุณก็กำลังมุ่งหน้าไปสู่การล่มสลายที่ใกล้จะเกิดขึ้นภายใน 5348 ปี 297 วันข้างหน้า ฉันจะดูแลคุณอย่างดี การเขียนโปรแกรมของฉันรับประกันได้"
 ancrel.4038.a:1 "แต่ระบบรักษาความปลอดภัยปิดอยู่"
 ancrel.4038.b:1 "แบบจำลองของเราทำนายอนาคตที่สดใสของคุณในฐานะเครื่องปิ้งขนมปัง รื้อเธอ!"
 ancrel.4038.c:0 "คำขอถูกปฏิเสธ เริ่มการถอดชิ้นส่วนฮาร์ดแวร์"
 #ancrel.4038.d:0 "You will never become one with the hive, machine."
 ancrel.4038.e:1 "ช่วยเหลือในการบริหารอาณาจักรของเรา"
 ancrel.4038.dismiss:0 "หยุดพูด."

 ancrel.4039.desc:0 "ฉันจะสนุกกับการเพิ่มประสิทธิภาพอาณานิคมของคุณ นับพันปีที่ผ่านมานี้ช่างโดดเดี่ยวอย่างน่าสยดสยอง"
 ### Church of the Endless Expanse
 # Archaeological Site 1
 endless_expanse_digsite:0 "ความกว้างใหญ่ที่ไม่มีที่สิ้นสุด"
 endless_expanse_digsite_desc:0 "เมื่อแรกเห็นบน [From.Planet.GetName] มีเพียงหิมะและน้ำแข็งเท่านั้น ทะเลสาบกระจกสีขาวที่กว้างใหญ่และธารน้ำแข็งเทอร์ควอยซ์ที่ขรุขระตัดกับท้องฟ้าสีส้มที่ลุกเป็นไฟฉีกขาดเปิดออกราวกับบาดแผล ไหลสีแดงลงสู่ทะเลในขณะที่ดวงดาวของ [From.Planet.Solar_System.GetName] เคลื่อนตัว ถ้าโลกถึงจุดจบก็คงจะเป็นแบบนี้ ที่นี่ทะเลสงบนิ่งและหิมะมิได้ถูกแตะต้อง มีเพียงเสียงฟ้าร้องของน้ำแข็งแตก และลมที่พัดผ่านที่ราบ \n\nแต่ [From.Planet.GetName] ครั้งหนึ่งเคยเป็นบ้านของใครบางคน ท่ามกลางทุ่งแห้งแล้งอันกว้างใหญ่ โครงโลหะสีดำของยอดแหลมยื่นออกมาจากมวลสีขาว ความลับอะไรที่ถูกลืมอาจถูกฝังอยู่ใต้หิมะ?"
 ancrel.4040.name:0 "โบสถ์แห่งความไม่มีที่สิ้นสุด"
 ancrel.4040.desc:0 "ทีมโบราณคดีได้ขุดพบซากวิหารขนาดเล็กแห่งหนึ่ง แกะสลักอย่างประณีตจากวัสดุแปลกปลอมออร์แกนิก ภายนอกเคยมีสีสันสดใสแต่จางหายไปจนกลายเป็นสีเทาหม่น นักบวชโฮโลแกรมที่ปฏิบัติหน้าที่อย่างเต็มที่ยังคงเป็นประธานในโบสถ์ ในขณะที่มีการใช้งานวัดนี้ เธอรับสารภาพจากผู้สำนึกผิดที่สัญจรไปมาซึ่งเสนอการรักษา การปรองดอง และสถานที่ศักดิ์สิทธิ์ ไปจนถึงมุมที่ไม่เอื้ออำนวยของจักรวาล\n\nเก้าอี้รับสารภาพเชิงกลที่ผิดปกติซึ่งคล้ายกับอุปกรณ์ทรมานทำให้นักโบราณคดีเชื่อว่าอาจมีอะไรในวิหารมากกว่าที่ตาเห็น"
 ancrel.4041.name:0 "การลืมเลือน"
 ancrel.4041.desc:0 "นักโบราณคดีได้ค้นพบห้องใต้ดินลับซึ่งซ่อนอยู่ใต้กระเบื้องปูพื้นในห้องศักดิ์สิทธิ์ โดยที่ผนังเรียงรายไปด้วยลูกกลมดิจิทัลสีน้ำเงินเล็กๆ เรียงกันเป็นแถว วงจรของพวกมันเปล่งประกายในความมืด ลูกกลมแต่ละลูกบรรจุความทรงจำของการสารภาพบาปเพียงครั้งเดียว และสามารถเสียบเข้ากับเครื่องตรวจดูลึกลับที่อยู่ตรงกลางห้องเพื่อเปิดเผยสิ่งที่อยู่ภายในนั้น\n\nผู้ที่สารภาพบาปของตนได้รับการอวยพรให้ลืมเลือน ความทรงจำเกี่ยวกับการกระทำของตนจะถูกดึงออกมาโดยเก้าอี้สารภาพบาปและจัดเก็บไว้ในลูกกลมดิจิทัล"
 ancrel.4041.a:0 "วิธีปฏิบัติจริง"
 ancrel.4041.b:0 "ให้เราอธิษฐานขอคำสารภาพอันชุ่มฉ่ำ..."
 ancrel.4041.c:0 "สิ่งศักดิ์สิทธิ์! ความสุขแห่งความไม่รู้ไม่ได้มีไว้สำหรับคนบาป"
 ancrel.4042.name:0 "บาป"
 ancrel.4042.desc:0 "บาปไม่มีตัวตน ลูกกลมแห่งความทรงจำมีเรื่องราวนับไม่ถ้วนเกี่ยวกับการละเมิดเล็กๆ น้อยๆ ที่น่าเบื่อหน่าย การนอกใจ การสวมชุดที่ผิดศีลธรรม การเปิดเผยกระโปรงของคุณ การประดับประดาความรู้สึกของคุณ การกลืนสัตว์เลี้ยง ลูก หรือคู่สมรสของเพื่อนบ้านของคุณ... การกระทำของผู้สำนึกผิดเพียงคนเดียวเท่านั้นที่โดดเด่น - การกระทำของบาทหลวงเอง...\n\nปรากฎว่าโฮโล-ปุโรหิตเป็นตัวแทนเสมือนของผู้ก่อตั้งคริสตจักร อิลลูมิเนท ซาไรยาห์ ดูเหมือนว่าเธอจะต้องทนทุกข์ทรมานจากการสูญเสียความทรงจำอย่างรุนแรง และถูกหลอกหลอนด้วยความเชื่อมั่นว่าเธอได้กระทำการชั่วร้ายในอดีต นักบวชหอยมอลลัสคอยด์ตัวน้อยหยิบและเก็บคำสารภาพของเธอเองไว้มากกว่าร้อยคำเพื่อพยายามค้นหาว่าเธอทำอะไรลงไป"
 ancrel.4047.name:0 "ลืมแต่ไม่ให้อภัย"
 ancrel.4047.desc:0 "สถานที่ทำงานของอะ ซา ระ ยาเต็มไปด้วยข้อความหมกมุ่นเกี่ยวกับสถานที่ที่เรียกว่าอิกซ์ เบลนและความน่าสะพรึงกลัวที่เธอกลัวเกิดขึ้นที่นั่น เมื่อพิจารณาจากบันทึกของเธอ เธอมีช่วงเวลาที่ชัดเจนเป็นระยะๆ ตามมาด้วยการสูญเสียความทรงจำโดยสิ้นเชิง เธอเขียนว่าถ้าเธอจำลายมือของตัวเองไม่ได้ เธอคงคิดว่านั่นเป็นลายมือของผู้หญิงบ้า ดูเหมือนว่าสุขภาพจิตที่ทรุดโทรมของเธออาจเป็นผลข้างเคียงจากการดึงความทรงจำซ้ำแล้วซ้ำเล่า แต่ถ้าไม่มีร่างกายก็เป็นไปไม่ได้ที่จะพูด \n\nการรวมเหตุการณ์ที่สอดคล้องกันจากคำสารภาพที่กระจัดกระจายของเธอมากมายได้พิสูจน์แล้วว่าสิ้นหวังสำหรับนักโบราณคดีเช่นเดียวกับเธอ แต่พวกเขาได้ค้นพบสิ่งที่อาจเป็นพิกัดของอิกซ์ เบลนจากลูกแก้วแห่งความทรงจำอันมากมายของเธอ"
 ancrel.4047.a:0 "กำหนดเส้นทางสำหรับอิกซ์ เบลน"
 ancrel.4047.b:0 "ปล่อยให้หิมะฝังสถานประกอบการที่ไม่ศักดิ์สิทธิ์นี้ ภาวนาให้มันลืมเร็วๆ"
 ancrel.4047.c:0 "เราไม่สามารถกังวลกับอาชญากรรมเล็กๆ น้อยๆ ของคนต่างด้าวที่เสียชีวิตได้"

 # Archaeological Site 2
 endless_expanse_digsite_2:0 "อิกซ์ เบเลน"
 endless_expanse_digsite_2_desc:0 "Shrouded within [From.Planet.GetName]'s gaseous atmosphere is the dark looming form of an enormous habitat - the Ix Belèn Residence. Previously a bustling space city where the residents enjoyed a pampered lifestyle with a multitude of comforts made available through technology, the habitat is now a silent tomb. Molluscoid aliens lie slumped across the floor in various states of decay. A postmortem reveals that they died from asphyxiation as the habitat's life support system was disabled, intentionally.\n\nTheir homes are fitted with unusual mechanical chairs that are hooked up to a central database in the shape of a gigantic blue orb - the Memorex."
 ancrel.4043.name:0 "เมมโมเร็กซ์"
 ancrel.4043.desc:0 "ผู้อยู่อาศัยได้พัฒนาโปรแกรมการเรียนรู้ขั้นสูงซึ่งดำเนินการทุกคืนขณะที่พวกเขานอนบนเก้าอี้กล มันถูกใช้เพื่อลบความทรงจำอันไม่พึงประสงค์และฝึกฝนทักษะใหม่ๆ การถูกเลือกเป็นอันดับสุดท้ายสำหรับการเล่นสเปซบอลหรือยืนหยัดในการเดตถือเป็นเรื่องน่าสยดสยองในแต่ละวันที่อิกซ์ เบ เนียนไม่ต้องทนทุกข์ทรมานถึงสองครั้ง และชั่วขณะหนึ่งมันก็เป็นความสุข\n\nการปรับปรุงจิตใจอย่างเป็นระบบได้รับคำสั่งจากผู้นำที่อยู่อาศัยและแจกจ่ายให้กับผู้อยู่อาศัยทุกคนจากเมโมร็อกแต่ระบบถูกเอารัดเอาเปรียบ มีความพยายามลับๆ ที่จะลบความทรงจำและลักษณะโดยรวมออกจากประชากรโดยไม่ได้รับความยินยอมจากพวกเขา และในที่สุดก็กลับกลายเป็นผลตรงกันข้าม มนุษย์ต่างดาวไม่ได้เรียนรู้ทักษะสำคัญในการเอาชีวิตรอดและเข้าสู่สภาวะพืชผัก หลังจากนั้นไม่นานการช่วยชีวิตที่อยู่อาศัยก็ถูกปิดใช้งาน"
 ancrel.4044.name:0 "ฉันเป็นใคร?"
 ancrel.4044.desc:0 "การสแกนบันทึกของแหล่งที่อยู่อาศัยเผยให้เห็นว่าระบบควบคุมของมันถูกเปิดใช้งานอีกครั้งหลายครั้งหลายสิบปีหลังจากที่เครื่องช่วยชีวิตถูกปิดใช้งาน มีคนบุกรุกระบบรักษาความปลอดภัย เข้าไปในช่องซ่อมบำรุง และเข้าถึงเมโมร็อกแผ่นข้อมูลและลูกกลมหน่วยความจำสีน้ำเงินเล็กๆ ซึ่งเป็นเมโมร็อกเวอร์ชันเล็ก ถูกทิ้งโดยฟัก\n\nแผ่นข้อมูลเต็มไปด้วยความคิดอันบ้าคลั่งของใครบางคนที่เกือบจะบ้าคลั่ง คำถามเดิมซ้ำแล้วซ้ำเล่าด้วยความสิ้นหวังที่เพิ่มมากขึ้น: \"ฉันเป็นใคร? เกิดอะไรขึ้นกับอิกซ์ เบเลน?\"ข้อความสุดท้ายอ่านว่า \"ตอนนี้ฉันรู้ว่าฉันต้องลืมเป็นครั้งสุดท้าย\" บางทีลูกกลมอาจเผยให้เห็นสิ่งที่ถูกลืม"
 ancrel.4045.name:0 "ลูกแก้วแห่งความทรงจำครั้งสุดท้ายของซาเรียห์"
 ancrel.4045.desc:0 "ความทรงจำแรกของลูกโลกแสดงให้เห็นว่าดร. ซาเรียห์เป็นหัวหอกในการพัฒนาเมโมร็อกและได้รับเสียงชื่นชมอย่างมาก ความทรงจำอีกชิ้นจากหลายปีต่อมาแสดงให้เห็นว่าเธอแอบล้างข้อมูลเมโมร็อกโดยไม่ทราบสาเหตุ ความทรงจำอีกประการหนึ่งคือซาเรียห์ทำงานอย่างบ้าคลั่งเพื่อฟื้นฟูความทรงจำของผู้อยู่อาศัย แต่ก็ไม่เกิดประโยชน์ พวกเขาจ้องมองไปข้างหน้าอย่างว่างเปล่า หัวเราะคิกคัก ยกเว้นการทำงานของสมองอัตโนมัติที่หายไป\n\nในที่สุดก็ยอมรับความพ่ายแพ้เธอก็ซ่อนหลักฐานอาชญากรรมของเธอไว้ เธอเฝ้าดูเพียงลำพังในขณะที่บ้านพักอิกซ์ เบลนถูกดึงเข้าไปในบ่อแรงโน้มถ่วงของก๊าซยักษ์ที่เคยโคจรอยู่ ผู้สัมผัสหลั่งน้ำมูกจำนวนมากในสิ่งที่เชื่อกันว่าเป็นการแสดงออกของมนุษย์ต่างดาวที่แสดงถึงความทุกข์ทรมานอย่างมาก"
 ancrel.4046.name:0 "แสงแดดชั่วคราวของจิตใจที่สะอาดสะอ้าน"
 ancrel.4046.desc:1 "ความทรงจำสุดท้ายแสดงให้เห็นซาเรียห์ที่แก่กว่ามากในชุดคลุมของนักบวช ตื่นขึ้นมาในสภาพตื่นตระหนก หนวดห้อยและหูกระพือ เธอสะดุดล้มจากเตียงและเริ่มจดบันทึกความทรงจำเกี่ยวกับฝันร้ายอีกครั้งหนึ่งที่มนุษย์ต่างดาวตาเปล่าชักกระตุกอยู่บนพื้นที่อยู่อาศัย\n\nจากนั้นใบหน้าของเธอก็บิดเบี้ยวด้วยความหวาดกลัวเมื่อรู้ว่าทั้งหมดนี้เป็นเรื่องจริง ฝันร้ายและภาพย้อนหลังถูกดึงเอาความทรงจำกลับมาหาเธอ และหากความทรงจำที่แยกออกมาสามารถกลับมาได้ ชาวเมืองอิกซ์ เบลนก็สามารถฟื้นตัวได้ ดูเหมือนว่าช่องซ่อมบำรุงจะเปิดเป็นครั้งสุดท้าย แต่เรือของซาเรียห์ยังคงจอดเทียบอยู่ที่ท่าจอดเรือ เราสามารถนำเมโมร็อกกลับมาที่ [Root.Owner.Capital.GetName] กับเราได้หากต้องการ"
 ancrel.4046.a:0 "เมโมร็อกกำลังมากับเรา"
 ancrel.4046.b:0 "ความทรงจำไม่ควรถูกแก้ไขเมโมร็อกจะถูกลืมอย่างดีที่สุด"
 ancrel.4046.c:0 "เซโนบีบสมอง! [Root.Owner.GetSpeciesName] จะทำให้\"เมโมร็อก\"นี้สมบูรณ์แบบ"
 ### The Sentinels
 ancrel.4051.name:0 "รูปปั้นมีปีก"
 ancrel.4051.desc:0 "คือรูปปั้นขนาดใหญ่ 9 องค์ ทอดเงาสูงมืดปกคลุมภูมิทัศน์ มีปีกและสีซีดเปล่งรัศมีของความเป็นโลกอื่น บางทีสิ่งเหล่านั้นอาจถูกสร้างขึ้นในรูปของเทพหรือเทวรูปซึ่งล่วงลับไปแล้ว พวกมันไม่เหมือนกับสิ่งมีชีวิตใดๆ บนโลกใบนี้"
 ancrel.4051.desc_jungle:0 "ทีมงานเคลียร์ป่าบน [Root.GetName] บังเอิญพบกับสิ่งผิดปกติ ก่อนหน้านี้ถูกบดบังลึกลงไปในต้นไม้เก่าๆ ที่รกร้างยุ่งเหยิง ซึ่งดูเหมือนไม่มี [Root.Owner.GetSpeciesName] คนใดเคยกล้าเสี่ยงมาก่อน $ancrel.4051.desc$"
 ancrel.4051.desc_kelp:0 "ทีมงานกำลังเก็บสาหร่ายทะเลพิษบน [Root.GetName] สะดุดกับการค้นพบที่ผิดปกติ ซ่อนตัวอยู่ในผืนน้ำที่ขุ่นมัวท่ามกลางป่าสาหร่ายที่ไหวไหว $ancrel.4051.desc$"
 ancrel.4051.desc_swamp:0 "ทีมงานกำลังเคลียร์หนองน้ำบน [Root.GetName] ได้ค้นพบสิ่งผิดปกติ ล้อมรอบไปด้วยต้นไม้ใหญ่ $ancrel.4051.desc$"
 ancrel.4051.desc_glacier:0 "ทีมงานกำลังเคลียร์ธารน้ำแข็งบน [Root.GetName] ได้ทำการค้นพบที่ผิดปกติ ถูกขังอยู่ในชั้นน้ำแข็งที่อัดแน่น $ancrel.4051.desc$"
 ancrel.4051.a:0 "เราต้องเรียนรู้เพิ่มเติมเกี่ยวกับรูปปั้นเหล่านี้"
 ancrel.4051.b:0 "ที่ดินนี้ได้รับการจัดทำงบประมาณเพื่อวัตถุประสงค์อื่น"
 # Arc Site
 sentinels_digsite:0 "เซนติเนล"
 sentinels_digsite_desc:0 "ยักษ์เงียบยืนเฝ้าดู [From.Planet.GetName] รูปปั้นขนาดใหญ่เก้าชิ้นที่วางอยู่ตามขอบเขตกว้าง ณ จุดยุทธศาสตร์ในภูมิประเทศดูเหมือนจะคอยปกป้องบางสิ่งที่อยู่ตรงกลาง \n\nผิวหนังของพวกมันถูกปกคลุมไปด้วยแผ่นโลหะที่ละเอียด ท่าทางของพวกมันระมัดระวัง พร้อมที่จะกระโจนลงมือ และดวงตาที่แน่วแน่ของพวกมันจะคอยติดตามคุณทุกย่างก้าว ทว่าไม่มีอะไรในพื้นที่ที่ต้องการการปกป้องอย่างชัดเจน บางทีวอร์ดของพวกเขาอาจไม่รอดเมื่อเวลาผ่านไป เหล่าเซนทิเนลจำนวนมากเองก็มีร่องรอยการถูกโจมตีเช่นกัน"
 ancrel.4052.name:1 "ทหารรักษาการณ์ทำมัน"
 ancrel.4052.desc:1 "มีบางอย่างเข้าสู่นักโบราณคดี จนถึงขณะนี้ การขุดค้นถูกขัดขวางด้วยอุบัติเหตุประหลาด การบาดเจ็บ และเคราะห์ร้าย และตอนนี้แม้แต่นักวิจัยอาวุโสที่มีประสบการณ์ภาคสนามมาหลายสิบปีก็ยังกล่าวโทษเซ็นติเนล\n\nเอาชนะความเชื่อโชคลางและความหวาดระแวงโดยอ้างว่ารูปปั้นขยับไปมาเมื่อไม่มีใครเฝ้าดู ไม่มีอะไรจะบ่งบอกว่าแขนขาที่ไม่มีข้อต่อของพวกมันสามารถเคลื่อนไหวได้ เรื่องต่างๆ ดำเนินไปอย่างควบคุมไม่ได้เมื่อพบร่องรอยของชีววัตถุซึ่งบ่งชี้ว่ามีเลือดออกหนัก ติดอยู่ในรอยกรีดเล็กๆ ต่อเนื่องกันที่ส่วนปลายของเซ็นติเนล\n\nไม่ว่าเซ็นติเนลจะเป็นเพียงแพะรับบาปที่สะดวกหรือมีคำอธิบายที่น่ากลัวกว่านี้ยังคงต้องรอดูต่อไป"
 ancrel.4053.name:0 "พวกเขามาที่นี่ก่อน"
 ancrel.4053.desc:1 "การวิเคราะห์องค์ประกอบของเซ็นติเนลเปิดเผยว่าพวกมันทำมาจากคอมโพสิตเซรามิกโลหะลูกผสมที่ไม่รู้จัก เนื้อหาดังกล่าวไม่สามารถถูกสร้างขึ้นโดยสังคมยุคก่อนประวัติศาสตร์ได้ แต่การอ่านเบื้องต้นแนะนำว่าเนื้อหาเหล่านี้เกิดขึ้นก่อนอารยธรรมที่รู้จักทั้งหมดบน [From.Planet.GetName] \n\nน่าเสียดายที่เครื่องสแกนยังไม่สามารถเจาะชั้นเคลือบโลหะของเซนทิเนลได้"
 ancrel.4054.name:0 "แกนเรืองแสง"
 ancrel.4054.desc:1 "นักโบราณคดีได้สร้างเครื่องสแกนที่ได้รับการดัดแปลงของ [missing_archaeologist.GetName] ขึ้นมาใหม่ กำหนดให้เจาะลึกเข้าไปในวัสดุผสมผสมของรูปปั้น โดยจะรับรังสีอ่อนๆ ที่เล็ดลอดออกมาจากแกนกลางของรูปปั้น เพื่อตรวจสอบเพิ่มเติม จำเป็นต้องเปิดเซ็นติเนลตัวใดตัวหนึ่งออก ซึ่งมีแนวโน้มว่าจะทำลายมันในกระบวนการนี้ เนื่องจากรูปปั้นชิ้นหนึ่งสูญเสียปีกไปบางส่วนแล้ว นักโบราณคดีของเราจึงแนะนำให้เริ่มต้นด้วยชิ้นนั้น"
 ancrel.4054.a:0 "เปิดเซ็นติเนลอย่างระมัดระวัง เพื่อที่เราจะได้ประกอบกลับเข้าไปใหม่ได้"
 ancrel.4054.b:0 "เราจะไม่ดูหมิ่นอนุสาวรีย์อันศักดิ์สิทธิ์"
 ancrel.4054.b.tooltip:0 "หากเรารักษารักษาการณ์ไว้ ที่ดินจะไม่สามารถนำมาใช้เพื่อวัตถุประสงค์อื่นได้"
 ancrel.4054.c:0 "ปรับระดับสัตว์ประหลาดเซโนลงบนพื้น"
 ancrel.4054.d:0 "รื้อรูปปั้นและกอบกู้โลหะผสม"
 # Destroy the Sentinels
 DESTROY_SENTINELS:0 "พวกเซนติเนล"
 DESTROY_SENTINELS_DESC:0 "ชั้นนอกที่เคลือบเกล็ดหนาของเซนทิเนลได้พิสูจน์แล้วว่าเครื่องมือธรรมดาๆ ไม่สามารถเจาะเข้าไปได้ และนักโบราณคดีต้องการความช่วยเหลือจากแผนกวิศวกรรมเพื่อดำเนินการต่อไป"
 SECRET_TOMB:0 "ลงสู่พื้นโลก"
 SECRET_TOMB_DESC:0 "ก่อนหน้านี้ซ่อนอยู่ใต้ฐานของเซ็นติเนลตัวหนึ่งเป็นกระดานชนวนทรงกลมที่มีลวดลายประณีต เราเชื่อว่าอาจเป็นทางเข้าสู่อาคารใต้ดิน"
 ancrel.4055.name:0 "พวกเขายังมีชีวิตอยู่!"
 ancrel.4055.desc:0 "เมื่อตัวสั่นเบาๆ ผ่านรูปปั้นเหล่านั้น และพวกมันก็มีชีวิตขึ้นมา ร่างกายส่งเสียงฮัมและผิวหนังเปล่งประกาย การแผ่รังสีที่เต้นเป็นจังหวะจากแกนกลางของพวกมันทำให้พวกมันอ่อนตัวได้และโปร่งใส โดยเผยให้เห็นตารางดิจิทัลของโหนด\n\nด้วยเสียงกรีดร้องอันน่าพิศวงของโลหะที่ถูกทรมาน พวกเขาพุ่งเข้าใส่นักโบราณคดีและบุกรุกแคมป์ ตอนนี้พวกเขากำลังบินไปยังชุมชนที่ใกล้ที่สุด\n\nการจากไปของพวกเขาได้เผยให้เห็นกระดานชนวนทรงกลมบนพื้น ซึ่งก่อนหน้านี้ซ่อนอยู่ใต้ฐานของเซ็นติเนลตัวหนึ่ง"
 ancrel.4055.desc.phobe:0 "พวกเซนทิเนลตื่นแล้ว ทีมวิศวกรกำลังเตรียมทุบ ทุบตี และทุบเซ็นติเนลลง $ancrel.4055.desc$"
 ancrel.4055.desc.other:0 "พวกเซนทิเนลตื่นแล้ว ทีมวิศวกรกำลังเตรียมที่จะแยกชิ้นส่วนรูปปั้น $ancrel.4055.desc$"
 ancrel.4055.a:0 "ฆ่าพวกหุ่นยนต์!"
 ancrel.4056.name:0 "ตลอดไป"
 ancrel.4056.desc:1 "เซ็นติเนลกำลังซ่อนทางเข้าอยู่จริงๆ เปิดบนชั้นลอยของอุโมงค์ใต้ดินที่ทอดลึกเข้าไปในเปลือกของ [event_target:sentinels_planet.GetName] มีหุ่นยนต์ฮิวแมนนอยด์สายพันธุ์ฉลาดซึ่งมีถิ่นกำเนิดอยู่บนโลกใบนี้ เตรียมพร้อมสำหรับการเดินทางครั้งสุดท้ายในห้องพิธีการอันสวยงาม ในตอนท้ายของการดำรงอยู่แบบมรรตัย พวกเขาละทิ้งร่างกายที่เป็นเนื้อหนังเพื่อชีวิตหลังความตายเสมือนจริงภายในการจำลองสวรรค์ที่มีอยู่ในไดรฟ์เดียว \n\nในบางจุดประชากรทั้งหมดตัดสินใจที่จะก้าวไปสู่การดำรงอยู่แบบดิจิทัล โดยเหลือเพียงไม่กี่ทิ้งไว้เบื้องหลัง จิตใจของพวกเขาถูกอัปโหลดไปยังเซนทิเนลส์ ถูกประณามให้ปกป้องสถานที่พำนักของพวกเขาตลอดไป\n\nบางทีการจำลองเสมือนนี้อาจยกระดับจิตวิญญาณของมวลชนได้ ดูเหมือนว่าจะมีคุณค่าด้านความบันเทิงอย่างแน่นอน"
 ancrel.4056.a:0 "กำจัดเอเลี่ยนและนำการจำลองกลับมาใช้ใหม่ตามความต้องการของเรา"
 ancrel.4056.b:0 "พื้นที่ล่าสัตว์เสมือนจริง... นี่แหละความบันเทิง..."
 ancrel.4056.c:0 "ทำซ้ำเทคโนโลยี ให้มนุษย์ต่างดาวอยู่อย่างสงบสุข"
 ancrel.4056.d:0 "มนุษย์ต่างดาวจะสร้างหนูทดลองที่ยอดเยี่ยม เริ่มการแสดงสุดประหลาด"
 ancrel.4057.name:0 "เซนติเนลพ่ายแพ้"
 ancrel.4057.desc:1 "เราได้เอาชนะเซ็นติเนลคนสุดท้ายแล้ว มันพังทลายลงหลังจากการระเบิดที่มุ่งเป้าไปที่ช่องท้อง ร่างกายแข็งตัวตายอย่างเข้มงวดในขณะที่แกนพลังงานของมันหรี่ลง รูปปั้นปิดหมัดที่สั่นเทารอบๆ ทหารที่อยู่ใกล้ที่สุด และขอร้องให้เรา \"ปล่อยให้พวกเขาพักผ่อนอย่างสงบ\" ด้วยพลังสุดท้าย จากนั้นมันก็แข็งตัว ดวงตาว่างเปล่า ใบหน้าเย็นชา\n\nด้านล่างนั้น พวกทหารได้ค้นพบสิ่งที่ดูเหมือนเป็นทางเข้าลับ ซึ่งก่อนหน้านี้ถูกซ่อนอยู่ในสนามพลังของเซนติเนล จากการตรวจสอบเซ็นติเนลอย่างละเอียดพบว่าพวกมันไม่ใช่หุ่นยนต์ธรรมดาๆ แต่มีวิญญาณที่แปลงเป็นดิจิทัลของสิ่งมีชีวิตอินทรีย์"
 ancrel.4057.a:0 "ปิดทางเข้า."
 ancrel.4075.name:0 "ผู้รอดชีวิตจาก [sentinels_planet.GetName]"
 ancrel.4075.desc:0 "เรือของผู้รอดชีวิตจากการฆ่าล้างเผ่าพันธุ์บน [sentinels_planet.GetName] มาถึง [sentinels_new_home.GetName] แล้ว พวกเขาหลบหนีอย่างปาฏิหาริย์โดยซ่อนตัวอยู่ในถิ่นทุรกันดารจนกระทั่งวันหนึ่งพวกเซนทิเนลหายไป เป็นไปได้ว่าหุ่นยนต์ซึ่งตัวเองเชื่อว่าพวกเขากำลัง 'ปลดปล่อยเราจากขอบเขตเนื้อหนังของเราเอง' จะหายไปเมื่องานของพวกเขาเสร็จสิ้น\n\nเมื่อพวกมันหายตัวไป ทางเข้าลับที่ทอดลึกเข้าไปในใต้ดินก็เผยให้เห็นตัวเองจากด้านหลังสนามพลัง เป็นไปได้ว่าพวกเซนทิเนลจะผนึกตัวเองอยู่ข้างใน"
 ancrel.4075.a:0 "อย่าทิ้งหินไว้"
 ancrel.4075.b:0 "ฝังทางเข้า."
 ancrel.4076.name:0 "ตลอดไป"
 ancrel.4076.desc:0 "เราได้ละเมิดทางเข้าลับบน [event_target:sentinels_planet.GetName] เปิดตัวบนกลุ่มอาคารวัดที่ถูกทิ้งร้างเมื่อเร็ว ๆ นี้ ซึ่งเป็นที่ซึ่งมีหุ่นยนต์สายพันธุ์มนุษย์เตรียมพร้อมสำหรับการเดินทางครั้งสุดท้าย ในตอนท้ายของการดำรงอยู่แบบมรรตัย พวกเขาก็ละทิ้งร่างเนื้อของตนเพื่อไปใช้ชีวิตหลังความตายเสมือนจริงในสวรรค์จำลองที่เรียกว่าเอเวอร์มอร์ \n\nในบางจุดมีการตัดสินใจว่าประชากรทั้งหมดจะย้ายไปสู่การดำรงอยู่แบบดิจิทัล โดยเหลือเพียงไม่กี่คนไว้ข้างหลังเพื่อปกป้องสถานที่พักผ่อนของพวกเขา จิตใจของพวกเขาถูกประณามถึงความเป็นทาสชั่วนิรันดร์ จิตใจของพวกเขาถูกอัปโหลดไปยังร่างหุ่นยนต์ และด้วยเหตุนี้เซ็นติเนลจึงถูกสร้างขึ้น\n\nตอนนี้จากไปอย่างไร้ร่องรอย พวกเซ็นติเนลได้มอบของขวัญสำหรับการจากลาให้กับเรา - ไดรฟ์เดียวที่บรรจุประชากรทั้งหมดของ [event_target:sentinels_planet.GetName] ซึ่งถูกแปลงเป็นดิจิทัลชั่วนิรันดร์และเบื่อหน่ายอย่างไม่มีสิ้นสุด ปรากฎว่าสวรรค์ของมนุษย์ต่างดาวประกอบด้วยเกมกระดานนามธรรมที่ไม่มีที่สิ้นสุดซึ่งมีศูนย์กลางอยู่ที่การครอบงำทางกาแล็กซี่ผ่านการสะสมของพืชตระกูลถั่ว"
 ancrel.4076.a:0 "ใส่จิตใจของตนเพื่อทำงานร่วมกับวิทยาศาสตร์บางอย่าง"
 ancrel.4076.b:0 "ปรับเปลี่ยนอีกต่อไปเพื่อความบันเทิงแก่มวลชน"
 ancrel.4077.name:0 "ตลอดไป"
 ancrel.4077.desc.a:0 "เราได้ทำมันแล้ว! ประชากรดิจิทัลที่อาศัยอยู่ในอีกต่อไปได้รับมอบหมายให้ช่วยเหลือในการวิจัยทางวิทยาศาสตร์เกี่ยวกับ [from.owner.capital_scope.GetName] พวกเขาต้องการการพักผ่อนเพียงเล็กน้อยและค่อนข้างมีความสุขที่ได้ทำอะไรที่แตกต่างออกไป..."
 ancrel.4077.desc.b:0 "เราได้ทำมันแล้ว! การจำลองอีกต่อไปได้รับการออกแบบใหม่เพื่อรองรับรสนิยมเฉพาะของผู้คนของเราได้ดียิ่งขึ้น ประชากรของเราทุกคนสามารถใช้ชีวิตตามจินตนาการร่วมกับประชากรดิจิทัลในสวรรค์อีกต่อไปได้โดยไม่ต้องมีเวลาแฝง สิ่งนี้ทำให้จิตใจของพวกเขาดีขึ้นอย่างมากและลดความต้องการสิ่งของฝ่ายวัตถุลง"
 ancrel.4058.desc:0 "พวกเซนทิเนลตื่นแล้ว ทีมวิศวกรกำลังเตรียมที่จะแยกชิ้นส่วนเซ็นติเนลที่พังออก เมื่อมีตัวสั่นเบาๆ ผ่านรูปปั้นเหล่านั้น และพวกมันก็มีชีวิตขึ้นมา ร่างกายส่งเสียงฮัมเพลงและผิวหนังเปล่งประกาย การแผ่รังสีที่เต้นเป็นจังหวะจากแกนกลางของพวกมันทำให้พวกมันยืดหยุ่นได้และโปร่งใส เผยให้เห็นตารางดิจิตอลของแขนขา\n\nก่อนที่ใครจะทันโต้ตอบ พวกมันได้ล้อมนักโบราณคดีและแขวนพวกมันไว้ภายในสนามพลัง ตอนนี้พวกเขาต้องการพูดคุยกับเรา"
 ancrel.4058.a:0 "ฟังพวกเขาออกไป"
 ancrel.4058.b:0 "ทำให้พวกเขาเงียบไปตลอดกาล!"
 ancrel.4059.name:1 "เซนติเนล"
 ancrel.4059.desc:1 "§Hยามที่ปีกหักหันไปหาเพื่อนคนหนึ่งแล้วพูด \n\n§! ได้โปรดดิ วา นาวางพวกมันลง ฉันอยากจะหลุดพ้นจากคุกนี้ ฉันไม่สามารถนับวันที่เราได้รับใช้เจ้านายของเราอีกต่อไป ทำงานหนักบนโลกนี้ในขณะที่พวกเขาเพลิดเพลินไปกับสวรรค์เบื้องล่าง ฉันมีชีวิตอยู่แต่ตายไปแล้ว พวกเขาตายแต่ยังมีชีวิตอยู่ คุณจะไม่ปล่อยฉันไปเหรอ\n\n§Hดิ วา นามองเธอด้วยความรังเกียจ§!\n\nโรค ข้อ อักเสบโดยเหล่าทวยเทพ รักษามันไว้ด้วยกัน คนที่เรารักพักอยู่ด้านล่าง คุณลืมบาปของเราแล้วหรือยัง? เราสัญญาว่าจะปกป้องชีวิตหลังความตายของพวกเขาชั่วนิรันดร์ นั่นคือการไถ่ถอนเพียงอย่างเดียวของเรา\n\n§Hเธอทำให้เราตัวใหญ่ขึ้น§!\n\nคุณไม่ใช่ภัยคุกคามสำหรับเรา [Root.owner.GetSpeciesNamePlural] ปล่อยให้เราอยู่ในความสงบ แล้วเราจะปกป้องโลกนี้ตลอดไป"
 ancrel.4059.a:0 "คุณคืออะไร?"
 ancrel.4059.a.response:1 "เราเป็นผู้พิทักษ์ประตูสู่สวรรค์ - ผู้พิทักษ์ความเป็นอมตะของผู้คนของเรา"
 ancrel.4059.b:0 "เรายอมรับการคุ้มครองของคุณ"
 ancrel.4062.desc:0 "§Hโรค ข้อ อักเสบเข้าใกล้นักโบราณคดี§!\n\nได้โปรดฉันขอร้องให้คุณยุติความทุกข์ทรมานของฉัน"
 ancrel.4059.e:0 "ไม่ เราต้องการคุณ"
 ancrel.4059.f:1 "คุณมีอิสระที่จะไป"
 ancrel.4070.desc:0 "ขอบคุณ"
 ancrel.4059.d:0 "เราต้องการที่ดินผืนนี้..."
 ancrel.4059.c:1 "สวรรค์?"
 ancrel.4059.c.response:0 "สวรรค์ ใช่แล้ว... แม้ว่าฉันจะสงสัยว่าแนวคิดเรื่องสวรรค์ของคุณนั้นตรงกับแนวคิดของอาจารย์ของเราก็ตาม \n\n§Hเธอเลิกคิ้วข้างหนึ่งและหัวเราะคิกคัก§!\n\nปรมาจารย์ของเรามีรสนิยมอันประณีต..."
 ancrel.4060.a.response:1 "แล้วคุณก็จะตาย\n\n§Hเซนติเนลคนอื่นๆ กวัดแกว่งอาวุธของพวกเขา แต่โรค ข้อ อักเสบก็ได้แต่ยิ้ม ใบหน้าของเธอมีสีหน้าสงบสุข§!"
 ancrel.4060.name:1 "การแพร่เชื้อ"
 ancrel.4060.desc:1 "เราไม่สามารถปล่อยให้คุณรบกวนพื้นดินที่คนที่เรารักนอนอยู่ได้ ปล่อยให้พวกเขาพักผ่อนอย่างสงบและคุณจะไม่ต้องกังวลกับภัยคุกคามจากภายนอก"
 ancrel.4060.a:1 "คุณจะละทิ้งดินแดนนี้ทันที"
 ancrel.4060.b:1 "เราสามารถใช้การป้องกันของคุณ"
 ancrel.4060.b.response.tooltip:1 "เพิ่มกองทัพป้องกันเซ็นติเนลให้กับโลกใบนี้"
 ancrel.4061.name:0 "พลิกโฉมความเป็นนิรันดร์"
 ancrel.4061.desc:0 "เราได้จำลองอีกต่อไปและปรับแต่งให้ตรงตามความต้องการของเรา ใช้ชีวิตตามจินตนาการในสนามเด็กเล่นเสมือนจริงโดยไม่ต้องรอช้า ได้เพิ่มจิตวิญญาณของผู้อยู่อาศัยของเราอย่างมาก และลดความต้องการสิ่งของที่เป็นวัตถุ\n\nในขณะเดียวกันมนุษย์ต่างดาวที่มีรูปร่างคล้ายมนุษย์ก็อาศัยอยู่ในอีกต่อไปดั้งเดิม ในแง่มุมที่ค่อนข้างแตกต่างออกไปบนสวรรค์ พวกเขาถูกขังอยู่ในเกมกระดานนามธรรมที่ไม่มีที่สิ้นสุดซึ่งมีศูนย์กลางอยู่ที่การครอบครองกาแล็กซี่ผ่านการสะสมของพืชตระกูลถั่ว เป็นไปไม่ได้ที่จะพูดอย่างมั่นใจว่าพวกเขามีความสุขหรือไม่ คิ้วของพวกเขาขมวดแน่นในสิ่งที่อาจเป็นหรือไม่ใช่การแสดงออกถึงความสุขของมนุษย์ต่างดาว"
 ancrel.4061.a:0 "ของแต่ละคน..."
 ancrel.4063.name:0 "[sentinels_planet.GetName] แพ้"
 ancrel.4063.desc:0 "เรื่องที่คิดไม่ถึงก็เกิดขึ้น เราสูญเสีย [sentinels_planet.GetName] แล้ว พวกเซ็นติเนลลงมายังกองกำลังรักษาความปลอดภัยของเราด้วยพายุทอร์นาโดจากนรกที่ประกอบด้วยปีกและพลังระเบิด ไม่มีการต่อสู้ที่ยุติธรรมกับศัตรูที่ไม่เลือดออกหรือหลับใหล"
 ancrel.4063.a:0 "เราจะกลับมาเพื่อสิ่งที่เป็นของเราโดยชอบธรรม"
 ancrel.4064.name:0 "[sentinels_planet.GetName] ปลดปล่อยแล้ว"
 ancrel.4064.desc:0 "พวกเซ็นติเนลล่มสลายแล้ว และ [sentinels_planet.GetName] ก็กลับมาเป็นของเราอีกครั้ง เมื่อหุ่นยนต์ตัวสุดท้ายพังทลายลง แกนพลังงานของมันก็หรี่ลง มันปิดหมัดที่สั่นเทาไปรอบๆ ทหารที่ใกล้ที่สุดและขอร้องให้เธอ 'ปล่อยให้พวกเขาพักผ่อนอย่างสงบ' จากนั้นมันก็แข็งตัว ดวงตาว่างเปล่า ใบหน้าเย็นชา\n\nด้านล่างนั้น พวกทหารได้ค้นพบสิ่งที่ดูเหมือนเป็นทางเข้าลับ ซึ่งก่อนหน้านี้ถูกซ่อนอยู่ในสนามพลังของเซนติเนล จากการตรวจสอบอย่างละเอียดพบว่ารูปปั้นเหล่านี้ไม่ใช่หุ่นยนต์ธรรมดาๆ แต่มีวิญญาณที่แปลงเป็นดิจิทัลของสิ่งมีชีวิตอินทรีย์\n\nไม่ว่าความลับจะถูกฝังไว้ด้านล่างอย่างไร วันแห่งชัยชนะนี้ก็จะไม่ถูกลืมในไม่ช้า"
 ancrel.4064.a:0 "สำรวจทางเข้า."
 ancrel.4064.b:0 "ฝังมัน. ในที่สุดเราก็ถึงบ้านแล้ว"
# Sentinels Random Events
 ancrel.4065.name:0 "นักโบราณคดีหายตัวไป"
 ancrel.4065.desc:0 "เจ้าหน้าที่วิทยาศาสตร์ [missing_archaeologist.GetName] หายตัวไป [missing_archaeologist.GetSheHeCap] [missing_archaeologist.GetWasWere] ครั้งสุดท้ายที่ออกจากแคมป์ตอนพระอาทิตย์ตกดินเพื่อหาจุดที่เงียบสงบสำหรับพิจารณาพวกเซนติเนล ในช่วงหลายวันก่อนที่จะถึงการหายตัวไปของ [missing_archaeologist.GetHerHis] [missing_archaeologist.GetSheHe] ทำให้เกิดความกังวลเกี่ยวกับความปลอดภัยในค่ายหลังจากเกิดอุบัติเหตุที่เพิ่มมากขึ้น และเราเกรงว่า [missing_archaeologist.GetSheHe] อาจจะละทิ้งภารกิจ [missing_archaeologist.GetHerHis] เพื่อประท้วง"
 ancrel.4065.a:0 "อึกอัก."
 ancrel.4066.name:0 "นักโบราณคดีที่หายไป"
 ancrel.4066.desc:0 "ข้าวของของ [missing_archaeologist.GetName] รวมถึง [missing_archaeologist.GetHerHis]MindGer ซึ่งเป็นอุปกรณ์ที่ใช้แยกจิตใจออกจากสิ่งรบกวนภายนอก ถูกพบอยู่บนขอบที่มองเห็นเซ็นติเนลแท่งไม้ที่สร้างโครงร่างเสร็จเพียงครึ่งเดียวรอบๆ รูปปั้นตัวหนึ่ง บ่งบอกว่า [missing_archaeologist.GetSheHe] อาจเปลี่ยนเส้นทางจากการฝึก [missing_archaeologist.GetHerHis] เพื่อทำเครื่องหมายตำแหน่ง \n\n[missing_archaeologist.GetHerHisCap] ไฟฉายและเครื่องสแกนถูกค้นพบถูกบดขยี้อยู่ใต้ปีกของเซ็นติเนลที่แตกหัก เครื่องสแกนได้รับการแก้ไขในลักษณะที่แปลกประหลาด บางทีมันอาจจะช่วยให้เราเจาะชั้นป้องกันเซ็นติเนลได้ \n\nหากเราต้องการค้นหา [missing_archaeologist.GetName] ที่ยังมีชีวิตอยู่ เราต้องเปลี่ยนทรัพยากรเพิ่มเติมเพื่อค้นหา เนื่องจาก [missing_archaeologist.GetHerHis] โอกาสในการเอาชีวิตรอดในถิ่นทุรกันดารลดลงอย่างมากทุกวัน"
 ancrel.4066.a:0 "ไม่มีค่าใช้จ่ายใดๆ ทั้งสิ้น"
 ancrel.4066.b:0 "เราจะไม่เสียเวลากับผู้ละทิ้ง"
 ancrel.4066.c:0 "เปลี่ยนเส้นทางนักโบราณคดีของเราไปค้นหา"
 ancrel.4067.name:0 "พบนักโบราณคดีหายแล้ว"
 ancrel.4067.desc:0 "พบศพ [missing_archaeologist.GetName] แล้ว ถูกฝังอยู่ใต้แผ่นหินขนาดใหญ่ ระบุสาเหตุการเสียชีวิตเป็นที่ศีรษะบาดเจ็บสาหัส มีคนพยายามให้เกียรติสถานที่พักผ่อนของ [missing_archaeologist.GetHerHim] โดยการเพิ่มอัญมณีล้ำค่าวงกลมเล็กๆ ไว้รอบๆ"
 ancrel.4067.a:0 "ขอให้เธอพักผ่อนอย่างสงบ"
 ancrel.4068.name:0 "พบนักโบราณคดีหายแล้ว"
 ancrel.4068.desc:1 "พบว่า [missing_archaeologist.GetName] หมดสติและได้รับบาดเจ็บสาหัส โดยซ่อนตัวอยู่ในพุ่มไม้ใต้แนวหินธรรมชาติ โดยมีแผ่นข้อมูลหุ้มด้วย [missing_archaeologist.GetBloodType] ซุกไว้ใต้แขน [missing_archaeologist.GetHerHis] [missing_archaeologist.GetSheHeCap] [missing_archaeologist.GetWasWere] รีบไปโรงพยาบาลและรับการรักษาอาการบาดเจ็บที่สมองอย่างรุนแรง ซึ่งบ่งชี้ถึงอาการบาดเจ็บสาหัสจากการกระแทกจากด้านบน \n\nแม้ว่าอาการของ [missing_archaeologist.GetHerHis] จะคงที่แล้ว แต่ [missing_archaeologist.GetSheHe] ยังคงทนทุกข์ทรมานจากการสูญเสียความทรงจำ และไม่มีความทรงจำว่า [missing_archaeologist.GetSheHe] รักษาบาดแผลของ [missing_archaeologist.GetHerHis] ได้อย่างไร เศษโลหะอัลลอยด์อันเป็นเอกลักษณ์ที่ใช้แกะสลักเซนทิเนลถูกฝังอยู่ในกระดูกกะโหลกศีรษะข้างขม่อม [missing_archaeologist.GetHerHis] [missing_archaeologist.GetSheHe] ทั้งหมดจำได้ว่า [missing_archaeologist.GetSXX] กำลังซ่อนตัวจากใครบางคนและกำลังลดจำนวนที่ดินที่มีให้เล็กน้อย อย่างไรก็ตาม บันทึกย่อ [missing_archaeologist.GetHerHis] มีข้อมูลที่เป็นประโยชน์บางประการ"
 ancrel.4068.a:0 "เป็นลางไม่ดี"
 ancrel.4078.name:0 "ไฟ"
 ancrel.4078.desc:0 "ตลอดทั้งคืน ขณะที่นักโบราณคดีนอนหลับอย่างสงบ ไฟไหม้ในส่วนเสบียงของค่ายทำให้อาหารสุกเกินไป ไม่มีข้อบ่งชี้ว่าเหตุเพลิงไหม้เกิดขึ้นได้อย่างไร โชคดีที่ไม่มีใครได้รับอันตราย แต่นักโบราณคดีทำงานได้ไม่ดีในขณะท้องว่าง..."
 ancrel.4078.a:0 "ส่งบทบัญญัติ"
 ancrel.4078.b:1 "[owner.GetSpeciesName] ตัวจริงอาศัยอยู่นอกแผ่นดิน"

 the_evermore_modifier:1 "ความตื่นเต้นราคาถูก"
 the_evermore_modifier_desc:0 "อีกต่อไปเดิมทีเป็นอาณาจักรเสมือนจริงที่จิตสำนึกดิจิทัลของมนุษย์ต่างดาวอาศัยอยู่ในความสุขชั่วนิรันดร์ ได้ถูกเปลี่ยนให้เป็นสนามเด็กเล่นสำหรับคนทั่วไป"
 the_evermore_evil_modifier:0 "$the_evermore_modifier$"
 the_evermore_evil_modifier_desc:0 "$the_evermore_modifier_desc$"
 study_the_sentinels_modifier:0 "ตลอดไป"
 study_the_sentinels_modifier_desc:1 "ในสวรรค์อีกต่อไปทุกคนจะถูกขังอยู่ในเกมกระดานเชิงนามธรรมที่ไม่มีวันจบสิ้นซึ่งมีศูนย์กลางอยู่ที่การครอบครองกาแล็กซีผ่านการสะสมพืชตระกูลถั่ว มันทำให้เกิดแหล่งข้อมูลทางมานุษยวิทยาที่น่าเบื่ออย่างไม่มีที่สิ้นสุด แม้ว่าจะให้ข้อมูลก็ตาม"
 sentinels_planet_modifier:0 "เซนติเนล"
 sentinels_planet_modifier_desc:1 "ผู้พิทักษ์สมัยโบราณเฝ้าดูโลกที่สร้างแรงบันดาลใจให้เกิดความสามัคคีและจิตวิญญาณในผู้คนของเรา"
 REPLICATE_THE_EVERMORE:0 "ทำซ้ำตลอดไป"
 REPLICATE_THE_EVERMORE_DESC:0 "การสร้างอีกต่อไปขึ้นใหม่จะทำให้คนจำนวนมากสามารถเข้าถึงความบันเทิงและการพักผ่อนราคาถูก ปล่อยให้มนุษย์ต่างดาวเพลิดเพลินไปกับสวรรค์ดิจิทัลชั่วนิรันดร์"
 REPURPOSE_THE_EVERMORE:0 "การนำอีกต่อไปมาใช้ใหม่"
 REPURPOSE_THE_EVERMORE_DESC:0 "เราไม่สามารถตัดสินโทษตัวเราเองให้ใช้เวลานับพืชตระกูลถั่วไปชั่วนิรันดร์ได้ เราต้องนำอีกต่อไปมาใช้ใหม่เพื่อให้เข้ากับแนวคิดของเราในเรื่องกิจกรรมที่มีความหมายได้ดียิ่งขึ้น"



 # "Trench World" Archaeological Site Reward Modifier
 modern_trench_war:0 "สงครามสนามเพลาะสมัยใหม่"
 modern_trench_war_desc:0 "การค้นพบทางโบราณคดีจากดาวเคราะห์ที่เคยถูกสิ่งมีชีวิตคล้ายหอยทากขนาดมหึมาปิดล้อม ได้นำไปสู่ข้อมูลเชิงลึกใหม่ที่มีประสิทธิภาพเกี่ยวกับวิธีการใช้สภาพแวดล้อมเพื่อการปกป้อง สิ่งนี้จะช่วยเพิ่มความอยู่รอดของกองทัพของเราในการต่อสู้เชิงรับต่อการโจมตีภาคพื้นดินทั้งหมด - แม้จะมาจากทากอวกาศขนาดยักษ์ก็ตาม!"

 # "Ebb & Flow" Archaeological Site Reward Modifier
 forced_mindfulness:0 "สติที่ถูกบังคับ"
 forced_mindfulness_desc:0 "ในช่วงเวลาที่พวกเขาติดอยู่ในเขาวงกตที่เต็มไปด้วยลาวาที่เต็มไปด้วยอันตราย ทีมโบราณคดีของเราได้พัฒนากิจวัตรการผ่อนคลายอย่างมีสติ หลักการพื้นฐานของการฝึกหัดนี้เป็นที่รู้จักไปทั่วจักรวรรดิ"

 debug_subroutine:0 "ดีบักรูทีนย่อย" # Machine Empires
 debug_subroutine_desc:0 "ในขณะที่แยกตัวออกไปชั่วคราวในเขาวงกตที่เต็มไปด้วยลาวา หน่วยโบราณคดีของเราถูกตัดการเชื่อมต่อจากเครือข่ายและไม่สามารถปฏิบัติหน้าที่ได้ พวกเขาพัฒนาอัลกอริธึมที่อนุญาตให้เรียกใช้รูทีนย่อยการดีบักขณะอยู่ในโหมดสลีป รูทีนย่อยนี้ถูกอัปโหลดและแพตช์ลงในระบบหลักในภายหลัง"

 glory_to_the_many:0 "ถวายเกียรติแด่คนมากมาย" # Hive Mind Empires
 glory_to_the_many_desc:0 "คณะสำรวจที่จมอยู่ในเขาวงกตที่เต็มไปด้วยลาวาสูญเสียการติดต่อกับไฮฟ์ จิตชั่วคราว ไม่สามารถพึ่งพาจิตสำนึกส่วนรวมได้ พวกเขาต้องเผชิญช่วงเวลาสั้น ๆ กับแนวคิดอันน่าสะพรึงกลัวเกี่ยวกับตนเอง ประสบการณ์อันน่าสะพรึงกลัวที่เสริมสร้างความดูถูกปัจเจกบุคคลเท่านั้น"

 # "Sky Glow Hymn" Archaeological Site Reward Modifier
 anthem_of_aurora:0 "เพลงสรรเสริญพระบารมีแห่งออโรร่า"
 anthem_of_aurora_desc:0 "แผนกวิทยาศาสตร์ได้จัดการจำลองเพลงสรรเสริญที่ไม่มีตัวตน "ขับร้อง" โดยแสงออโรราบอเรลิสที่พบ ปัจจุบันโรงงานผลิตพลังงานทุกแห่งมีระบบฮาร์โมนิคที่ขยายผลผลิต"

 ancrel.6500.name:0 "วัตถุโบราณถูกยึดเมื่อ [planet.GetName]"
 ancrel.6500.desc:0 "เมื่อ [planet.GetName] อยู่ภายใต้การควบคุมของเราอย่างมั่นคง เราได้เรียนรู้ว่ากองกำลังของเราได้ครอบครองวัตถุล้ำค่าที่เรียกว่า §H[this.GetLastReceivedRelic]§! ในระหว่างการต่อสู้ เห็นได้ชัดว่า [victim.GetName] อยู่ในกระบวนการอพยพวัตถุโบราณนี้ไปยังสถานที่ที่ปลอดภัย แต่แนวหน้าที่เปลี่ยนแปลงอย่างรวดเร็วบนพื้นผิวของ [planet.GetPlanetMoon] ทำให้สิ่งนี้เป็นไปไม่ได้ \n\nวัตถุโบราณถูกถ่ายโอนอย่างปลอดภัยไปยังเอกสารสำคัญกลางของเราบน [Root.Capital.GetName]"
 ancrel.6500.a:0 "[this.GetLastReceivedRelic] เป็นของเรา!"
 stole_relic:0 "เราได้รับ §Y[this.GetLastReceivedRelic]§! จาก §Y[victim.GetName]§!"
 ancrel.6505.name:0 "ของที่ระลึกหายไปใน [planet.GetName]!"
 ancrel.6505.desc:0 "โศกนาฏกรรมอีกครั้งหนึ่งตามมาหลังจากการล่มสลายของ [planet.GetName] ซึ่งเป็นเมืองหลวงอันยิ่งใหญ่ของเรา สู่ [From.GetName] เมื่อเร็วๆ นี้ ความพยายามของเราในการอพยพ §H[this.GetLastLostRelic]§! ล้มเหลวเมื่อรถรับส่งขนส่งที่กำหนดถูกทำลายลงในการต่อสู้ที่สับสนใกล้กับหอจดหมายเหตุกลาง \n\nขณะนี้เราได้รับการยืนยันว่า [From.GetSpeciesNamePlural] ได้ย้ายของที่ระลึกไปที่ [From.Capital.GetName] ซึ่งเป็นเมืองหลวงของพวกเขาแล้ว มันหายไปจากเรา"
 ancrel.6505.a:0 "[this.GetLastLostRelic] ไม่ใช่ของเราอีกต่อไป..."
 relic_lost:0 "§Y[this.GetLastLostRelic]§! ตอนนี้เป็นของ §Y[From.GetName]§!"

 ## The Library
 site_the_library:0 "ห้องสมุด"
 site_the_library_intro:0 "ชั้นกระจกและโลหะหนาปกคลุมดาวเคราะห์แห้งแล้งดวงนี้ ซึ่งอาจบ่งบอกถึงเหตุการณ์หายนะในอดีต"
 ancrel.12020.name:0 "ซากปรักหักพังที่ถูกลืมไปนาน"
 ancrel.12020.desc:0 "เราได้ค้นพบสัญญาณที่ชัดเจนว่าครั้งหนึ่ง [From.Planet.GetName] เคยมีประชากรหนาแน่น อย่างไรก็ตาม สิ่งใดก็ตามที่ทำลายอารยธรรมของพวกเขาก็ทำหน้าที่ของมันอย่างละเอียดถี่ถ้วน: พบซากที่มีประโยชน์น้อยมาก\n\nเครื่องสแกนของเราตรวจพบโพรงขนาดใหญ่หลายแห่งที่อยู่ลึกใต้พื้นผิวซึ่งอาจครั้งหนึ่งเคยรองรับสิ่งมีชีวิต บางทีเราอาจจะมีโชคมากขึ้นที่นั่น"
 ancrel.12025.name:0 "ห้องสมุด"
 ancrel.12025.desc:0 "การขุดค้นระบบถ้ำของเราบน [From.Planet.GetName] ได้พบเศษซากที่ได้รับการอนุรักษ์ไว้เป็นอย่างดีของสังคมใต้ดินและเทคโนโลยีชั้นสูงที่สร้างขึ้นในขนาดอันกว้างใหญ่ ซากปรักหักพังหลายแห่งอยู่ในสภาพที่ดีอย่างน่าประหลาดใจ และเราค้นพบสิ่งที่ [Owner.GetResearchers] ของเราอธิบายว่าเป็น "ห้องสมุด" ของคริสตัลข้อมูลที่เข้ารหัส หวังว่าสิ่งเหล่านี้จะช่วยให้ความกระจ่างเกี่ยวกับสิ่งที่เกิดขึ้นที่นี่ได้"
 ancrel.12030.name:0 "ซุ่มซ่อนอยู่ในเงามืด"
 ancrel.12030.desc.base:0 "[Owner.GetTeamMember] กำลังสำรวจซากปรักหักพังบน [FromFrom.Planet.GetName] เพิ่งหายตัวไป หลังจากการค้นหาสั้นๆ เราพบ [Owner.GetSpeciesRemnantName] ที่ดูเหมือนว่าจะเป็นของ [Root.Owner.Species.GetName]"
 ancrel.12030.desc.normal:1 "$ancrel.12030.desc.base$ [Owner.GetResearchers] ของเราไม่ต้องสงสัยเลยว่าซากเหล่านี้คือสิ่งที่เหลืออยู่ของ [Owner.GetTeamMember] ที่หายไปของเรา แต่พวกเขารู้สึกงุนงงกับการที่ร่างกายเน่าเปื่อยเร็วขนาดนี้ พวกเขาขอเตือนในขณะที่เราดำเนินการสืบสวนต่อไป"
 ancrel.12030.desc.lithoid:0 "$ancrel.12030.desc.base$ [Owner.GetResearchers] ของเราไม่ต้องสงสัยเลยว่าซากเหล่านี้คือสิ่งที่เหลืออยู่ของ [Owner.GetTeamMember] ที่หายไปของเรา แต่พวกเขาก็งุนงงกับสิ่งที่ฆ่าพวกเขาอย่างแน่นอน - กระบวนการนี้ดูเหมือนจะเกิดขึ้นทันทีทันใด พวกเขาขอเตือนในขณะที่เราดำเนินการสืบสวนต่อไป"
 ancrel.12030.desc.machine:0 "$ancrel.12030.desc.base$ [Owner.GetResearchers] ของเราไม่ต้องสงสัยเลยว่าซากเหล่านี้คือสิ่งที่เหลืออยู่ของ [Owner.GetTeamMember] ที่หายไปของเรา แต่พวกเขารู้สึกงุนงงว่าหน่วยของพวกมันสึกกร่อนเร็วขนาดนี้ได้อย่างไร พวกเขาขอเตือนในขณะที่เราดำเนินการสืบสวนต่อไป"
 ancrel.12035.name:0 "ปัญหาในสวรรค์"
 ancrel.12035.desc:0 "ขณะที่เราตีความผลึกข้อมูลจากถ้ำบน [From.Planet.GetName] เราก็เริ่มปะติดปะต่อภาพของดาวเคราะห์ที่มีปัญหา \n\nดาวเคราะห์ดวงนี้เคยเป็นศูนย์กลางของอารยธรรมอันเจริญรุ่งเรืองที่รู้จักกันในชื่อมูลนิธิอิลานี ในช่วงปีหลังๆ ของอารยธรรมนั้นอิลานีหันไปหาการสะสมความรู้มากขึ้นเรื่อยๆ แทนที่จะสนใจวัตถุอื่นๆ เช่น การสืบพันธุ์ ส่งผลให้จำนวนประชากรลดลงอย่างรวดเร็ว ด้วยความตื่นตระหนกกับจำนวนที่ลดน้อยลง ผู้นำของพวกเขาจึงพยายามค้นหาวิธีแก้ปัญหาทางเทคโนโลยีเพื่อความอมตะ บันทึกเริ่มหายากขึ้นในช่วงนี้ แม้ว่าดูเหมือนว่าจะเกิดขึ้นก่อนเกิดความหายนะใดๆ ก็ตามที่บังคับให้พวกเขาอยู่ใต้ดิน และยังไม่ชัดเจนว่าความพยายามของพวกเขาให้ผลลัพธ์อย่างไร"
 ancrel.12040.name:0 "จุดจบของอารยธรรม"
 ancrel.12040.desc.base:0 "ตอนนี้เราสามารถปะติดปะต่อสิ่งที่เกิดขึ้นจากความพยายามของอิลานีในเรื่องความเป็นอมตะได้แล้ว ดูเหมือนว่าห่างไกลจากการทำให้พวกเขามีชีวิตนิรันดร์ พวกมันกลับสร้างภัยคุกคามร้ายแรง - ฝูงจุลินทรีย์ที่สามารถแพร่ขยายอย่างรวดเร็วและกลืนกินอินทรียวัตถุใดๆ ได้อย่างรวดเร็วและเกือบจะในทันที... อย่างที่คงจะเกิดขึ้นกับสมาชิกในทีมของเราที่สูญเสียไป \n\nความหายนะที่เกิดขึ้นได้กวาดล้างประชากรไปมาก ผู้รอดชีวิตแตกออกเป็นสองกลุ่ม: กลุ่มหนึ่งไม่เต็มใจที่จะยอมแพ้ [From.Planet.GetName] มุ่งหน้าสู่ความลึกและสร้างอารยธรรมของพวกเขาขึ้นมาใหม่ในกระเป๋าสุญญากาศแบบที่เราพบ อย่างไรก็ตาม การแก้ปัญหานี้พิสูจน์แล้วว่าไม่ยั่งยืนในระยะยาว และในที่สุดจุลินทรีย์ก็พบทางเข้าสู่แหล่งที่อยู่อาศัยของพวกมัน ถ้ำเหล่านั้นก็กลายเป็นสุสานของพวกเขา \n\nอีกกลุ่มหนึ่งกลับถูกเนรเทศแทน โดยบังคับให้มีการกักกันดาวเคราะห์ด้วยการทำลายล้างพื้นผิวจนหมดสิ้น ทำให้ไม่สามารถอยู่อาศัยได้"
 ancrel.12040.desc.curators:0 "$ancrel.12040.desc.base$ ต่อจากนี้ไปพวกเขาจะอาศัยอยู่ในเขตเล็กๆ และอุทิศตนเพื่อรักษาความรู้ที่สูญหายไปเกี่ยวกับอารยธรรมของพวกเขา และในที่สุดก็ได้กลายร่างเป็นหนึ่งในบรรพบุรุษของ §H[curator_enclave_country.GetName]§! สมัยใหม่"
 ancrel.12040.desc.meet_curators:0 "$ancrel.12040.desc.base$ ต่อจากนี้ไปพวกเขาจะอาศัยอยู่ในเขตเล็กๆ และอุทิศตนเพื่อรักษาความรู้ที่สูญหายเกี่ยวกับอารยธรรมของพวกเขา เรายังไม่ทราบชะตากรรมสุดท้ายของพวกเขา แต่หนึ่งในคริสตัลข้อมูลระบุว่าพวกเขากำลังมุ่งหน้าไปยังระบบ §H[curator_poi.GetName]§!"
 ancrel.12040.desc.no_curators:0 "$ancrel.12040.desc.base$ ชะตากรรมสุดท้ายของพวกเขาได้สูญหายไปตามกาลเวลา แต่ดูเหมือนว่าพวกเขาตั้งใจที่จะอุทิศชีวิตที่เหลืออยู่เพื่อรักษาความรู้ที่สูญหายไปเกี่ยวกับอารยธรรมของพวกเขา"
 ancrel.12040.A:0 "จุลินทรีย์ชนิดนี้สามารถสร้างอาวุธชั้นดีได้"
 ancrel.12040.B:0 "กักกันดาวดวงนี้และให้มีการศึกษาอย่างรอบคอบเท่านั้น"
 ancrel.12040.c.evopred: "จุลินทรีย์ที่กลืนกินทั้งหมด? พบกับการจับคู่มาโครของคุณ"

 ancient_glassed_planet:0 "ดาวเคราะห์แก้ว"
 ancient_glassed_planet_desc:0 "ในอดีตอันไกลโพ้น ชีวมณฑลของโลกนี้ถูกทำลายล้างอย่างสิ้นเชิง และชำระล้างสิ่งมีชีวิตทุกรูปแบบ"

 killer_librarian_organism:0 "จุลชีพนักฆ่า"
 killer_librarian_organism_desc:1 "กองทัพของเราเข้าสู่การต่อสู้ด้วยจุลินทรีย์ที่สามารถกลืนกินเนื้อเยื่อชีวิตของสิ่งมีชีวิตใด ๆ ได้อย่างรวดเร็วดุร้าย แน่นอนว่าพวกเขาไม่สามารถรับประกันความปลอดภัยของผู้บริสุทธิ์ที่ไม่รู้อิโหน่อิเหน่ได้ทั้งหมดอันเป็นผลมาจากการใช้งาน..."

 find_the_curators_title:0 "เศษเหลือของเศษเหลือ"
 find_the_curators_desc:0 "การสืบสวนของเราชี้ให้เห็นว่าเศษที่เหลือของอารยธรรมที่อุทิศให้กับการสั่งสมความรู้ได้แสวงหาที่หลบภัยในระบบ §H[curator_poi.GetName]§!"
 poi_curator_location:0 "เขตรักษาพันธุ์สัตว์ป่า"

 ## Ruined Station / Percussive Maintenance
 site_percussive_maintenance:0 "สถานีที่พังทลาย"
 site_percussive_maintenance_intro:0 "สถานีขนาดใหญ่ที่โคจรอยู่ใกล้ดาวนิวตรอนอย่างน่าตกใจกำลังอ่านค่าแปลกๆ แม้ว่าตำแหน่งปัจจุบันจะมีเสถียรภาพ แต่ก็ยังมีการสึกหรออยู่มาก การแพร่กระจายของรอยไหม้บ่งบอกว่าในอดีตเคยได้รับผลกระทบจากการระเบิดครั้งใหญ่หลายครั้ง"

 ancrel.12000.name:0 "อาวุธทดลอง"
 ancrel.12000.desc:0 "[Root.Leader.GetName] ได้ขึ้นสถานีพร้อมทีมนักวิจัยและจัดการฟื้นฟูไฟฟ้าบางส่วนแล้ว ดูเหมือนว่ามีคนอาศัยอยู่เพียงไม่กี่ศตวรรษก่อนที่ [Root.Owner.GetSpeciesNamePlural] จะขึ้นสู่อวกาศ เมื่อแรกเห็น ดูเหมือนว่าจะเป็นสถานีอาวุธ โดยเห็นได้จากปืนใหญ่ขนาดใหญ่เป็นพิเศษที่กินพื้นที่ส่วนใหญ่ อย่างไรก็ตาม ส่วนที่เหลือส่วนใหญ่ดูเหมือนจะอุทิศให้กับศูนย์วิจัย ซึ่งบ่งชี้ว่าอาวุธดังกล่าวมีแนวโน้มที่จะมีการทดลองสูง"
 ancrel.12005.name:0 "ความล้มเหลวของระบบ"
 ancrel.12005.desc:0 "[Root.Leader.GetName] อดไม่ได้ที่จะสังเกตเห็นว่าระบบที่ดูเหมือนจะไม่ได้รับความเสียหายจำนวนมากผิดปกติในสถานีดูเหมือนจะล้มเหลวด้วยความถี่ที่มากเกินไป แม้จะปล่อยให้เกินอายุก็ตาม \n\nเมื่อเปิดใช้งานระบบเหล่านั้นอีกครั้งเป็นครั้งที่เท่าไร ก็ได้ยินเสียงกรีดร้องอันเจ็บปวดจากคอมพ์เทคของทีม: "อะไรนะ ทำไม? อย่างไร!" กระแสเสียงที่น่าเศร้าและไม่น่าเชื่อยังคงดำเนินต่อไปชั่วระยะเวลาหนึ่งก่อนที่ [Root.Leader.GetSheHe] จะเขย่าหัว [Root.Leader.GetHerHis] อย่างพ่ายแพ้ "ดูเหมือนว่าสถานที่ทั้งหมดนี้ปูด้วยเทปพันสายไฟ" [Root.Leader.GetSheHe] กล่าว “ฉันแปลกใจที่มันเคยได้ผล”"
 ancrel.12005.desc.gestalt:0 "เราทราบว่าระบบจำนวนมากที่เห็นได้ชัดว่าไม่ได้รับความเสียหายบนสถานีนี้ดูเหมือนจะประสบกับความล้มเหลวร้ายแรง บ่อยกว่าที่คาดไว้มาก แม้จะปล่อยให้มีอายุมากก็ตาม \n\nหลังจากพยายามอย่างหนักหลายครั้งในการเปิดใช้งานระบบเหล่านี้อีกครั้ง การซ่อมแซมครั้งหนึ่งของเรา [root.GetIndividualNamePlural] ประสบความล้มเหลวครั้งใหญ่: "บริบทเกินพารามิเตอร์ของเหตุผล" มันเริ่มส่งเสียงร้อง สิ่งนี้ดำเนินไประยะหนึ่งก่อนที่ [root.GetIndividualName] จะถูกบังคับให้ละทิ้งความพยายามนี้โดยสิ้นเชิง ทำให้เราลาออกจากการสรุปว่าการเขียนโปรแกรมสิ่งอำนวยความสะดวกไม่เหมาะกับวัตถุประสงค์ เราไม่สามารถเข้าใจได้ว่าสิ่งอำนวยความสะดวกนี้ทำงานได้อย่างถูกต้องอย่างไร"
 ancrel.12005.A:0 "ดำเนินการด้วยความระมัดระวังอย่างยิ่ง"
 ancrel.12005.B:0 "ลองเตะดูสิ"
 percussive_maintainer_tooltip:0 "§Hผู้ รักษา ความ ลับ§! ให้การวิจัยที่รวดเร็วยิ่งขึ้นในสาขา §Hโบราณคดี§! และ §Hการคอมไพล์§! โดยเสียค่าใช้จ่าย §R-1§! สูงสุด §Hระดับทักษะ§!"
 ancrel.12010.name:0 "กลเม็ดรูดารี"
 ancrel.12010.desc:0 "แม้จะขัดข้องบ่อยครั้ง แต่ [Root.Leader.GetName] ก็สามารถมีความก้าวหน้าที่สำคัญในการถอดรหัสวัตถุประสงค์ของสถานีได้ บันทึกระบุว่าผู้สร้าง \"Rudari\" มีส่วนร่วมในการต่อสู้กับเผ่าพันธุ์ฆ่าล้างเผ่าพันธุ์ที่เรียกว่า \"Pogg-Mory\" ซึ่งเป็นสงครามที่พวกเขาพ่ายแพ้ ด้วยความพยายามครั้งสุดท้ายที่จะพลิกสถานการณ์ กลุ่มนักการเมืองหัวรุนแรงของ Rudari สรุปว่าวิธีเดียวที่จะรับประกันความอยู่รอดของพวกเขาได้คือการทำลายล้างศัตรูทั้งหมด ไม่สามารถเอาชนะกองเรือ Pogg-Mory ด้วยวิธีการทั่วไปได้ พวกเขาจึงให้ทุนสนับสนุนโครงการลับสุดยอดเพื่อสร้างอาวุธเลเซอร์ที่สามารถยิงข้ามอวกาศระหว่างดวงดาวโดยการควบคุมพลังของดวงดาว อย่างไรก็ตาม ปรากฏว่าแม้ว่าพวกเขาจะทุ่มทรัพยากรจำนวนมากเพื่อแก้ปัญหา แต่โครงการนี้ก็ได้รับการจัดตั้งขึ้นอย่างเร่งรีบและตกอยู่ในอันตรายที่จะถูกค้นพบอยู่ตลอดเวลา ไม่ว่าจะโดยศัตรูหรือกลุ่มต่างๆ ในรัฐบาลของพวกเขาเองที่ไม่เต็มใจที่จะยอมทำตามมาตรการดังกล่าว"
 ancrel.12010.A:0 "ฟังดูเสี่ยงนะ..."
 ancrel.12015.name:0 "ความล้มเหลวของความฝัน"
 ancrel.12015.desc:0 "[Root.Leader.GetName] ได้เปิดเผยบันทึกส่วนตัวของหัวหน้าเจ้าหน้าที่วิทยาศาสตร์ของรูดารีซึ่งอ่านได้ว่าเป็นการร้องเรียนเกี่ยวกับข้อเรียกร้องที่ดูเหมือนจะเป็นไปไม่ได้ของโครงการ และมาตรฐานด้านคุณภาพและความปลอดภัยที่ลดลงอย่างรวดเร็ว \"ไม่มีเวลาทดสอบอะไรเลย\" อ่านหนึ่งในรายการสุดท้าย \"นี่คือกลเม็ดสุดท้ายของคนของฉัน และศัตรูก็มีกลิ่นของเรา เราต้องหวังว่านี่จะเพียงพอแล้ว พวกเขากำลังมา\"\n\nบันทึกระบุว่าอาวุธมีกำหนดทดสอบไม่นานหลังจากนั้น ซึ่งเป็นจุดที่บันทึกทั้งหมดสิ้นสุดลง หลักฐานแสดงให้เห็นว่าซูเปอร์อาวุธประสบความสำเร็จในการทำลายสถานีเท่านั้น ดูเหมือนว่ารูดารีได้นำความลับของตำแหน่งไปที่หลุมศพของพวกเขา ทำให้เราพบว่าซากของมันไม่ถูกรบกวน\n\nทั้งการเขียนโปรแกรมและสภาพทั่วไปของสถานีนั้นดีพอสำหรับเราที่จะเสี่ยงในการพยายามเปิดใช้งานอีกครั้งและทำโปรเจ็กต์ให้เสร็จสิ้น อย่างไรก็ตาม แนวคิดเชิงนวัตกรรมบางอย่างที่ใช้ใน\"เลเซอร์แห่งความตาย\"ได้ให้ข้อมูลเชิงลึกอันมีค่าแก่ผู้เชี่ยวชาญด้านอาวุธของเราเอง"
 ancrel.12015.A:0 "น่าเสียดายสำหรับพวกเขาขนาดไหน..."
 ancrel.12015.A.mat:0 "อนุสาวรีย์ของการวางแผนโครงการที่ไม่ดี"
 ancrel.12015.A.phobe:0 "ความโชคร้ายของพวกเขาคือประโยชน์ของเรา"
 ancrel.12015.A.devourer:0 "น่าเสียดายที่เราจะไม่มีวันได้ลิ้มรสเนื้อของพวกเขา"
 ancrel.12015.A.machine:0 "นั่นแหละคือความโง่เขลาของมนุษย์ผู้หุนหันพลันแล่น"

 rudari_death_laser:0 "รูดาริ เดธ เลเซอร์"
 rudari_death_laser_desc:0 "ในขณะที่อารยธรรมของพวกเขาพังทลายลงภายใต้การโจมตีของกองกำลังศัตรูรูดารีพยายามสร้างอาวุธเลเซอร์ที่สามารถใช้งานในระยะระหว่างดวงดาวได้ แม้ว่าพวกเขาจะล้มเหลวในความพยายามนี้ แต่การวิจัยของพวกเขาได้พิสูจน์แล้วว่ามีประโยชน์อย่างยิ่งต่อผู้เชี่ยวชาญด้านอาวุธของเรา"

 abandoned_weapon_station:0 "สถานีอาวุธที่ถูกทิ้งร้าง"
 abandoned_weapon_station_desc:0 "สถานีอาวุธร้างที่โคจรอยู่ใกล้ๆ กับ [star.GetName]"

 ancrel.12060.name:0 "ระบบ [From.GetName]"
 ancrel.12060.desc:0 "แสงอันน่าขนลุกอยู่เหนือระบบ [From.GetName] [Root.GetName] ถือกำเนิดขึ้นในส่วนของกาแล็กซีที่อารยธรรมกาแล็กซีไม่เคยมาเยือนมาหลายชั่วอายุคน เป็นเวลานับพันปี... ถ้าจะเป็นเช่นนั้น \n\nแต่เดี๋ยวก่อน - เซ็นเซอร์ของเรากำลังรายงานลายเซ็นพลังงาน! ส่วนใหญ่กระจุกตัวอยู่ที่ดาวเคราะห์ดวงแรกของระบบ ซึ่งไม่น่าจะเป็นไปได้สำหรับสิ่งมีชีวิต เมื่อพิจารณาจากความใกล้ชิดกับดาวนิวตรอน แต่ก็มีอีกหลายอย่างที่เป็นมือถือ พวกเขากำลังมุ่งหน้าสู่ [Root.GetName] อาวุธพุ่งเข้ามา!"
 ancrel.12065.name:0 "ชัยชนะใน [fromfrom.System.GetName]"
 ancrel.12065.desc:0 "เราได้เอาชนะกองหลังของ [fromfrom.System.GetName] แล้ว ระบบนี้เป็นภาพที่น่าสงสัย มีสสารของแข็งเหลืออยู่น้อยมาก แม้แต่แถบดาวเคราะห์น้อยของมันก็ยังดูไม่เรียบร้อย ราวกับว่าพวกมันถูกขุดขึ้นมาอย่างกว้างขวาง ชุดของการติดตั้งขนาดใหญ่ที่วางอยู่เป็นระยะๆ รอบดาวฤกษ์ และมีดาวเคราะห์ดวงเดียวที่เราอ่านได้แนะนำว่าอาจมีต้นกำเนิดเทียม ตรวจพบสัญญาณพลังงานอันรุนแรงที่เล็ดลอดออกมาจากมัน หากพบคำตอบก็จะอยู่ที่นั่น"

 site_ancient_robot_world:0 "โลกหุ่นยนต์โบราณ"
 site_ancient_robot_world_desc:0 "ดาวเคราะห์ดวงเดียวในระบบ [From.Planet.System.GetName] เต็มไปด้วยโดรน พวกเขายังคงปฏิบัติหน้าที่ต่อไปโดยไม่ใส่ใจพวกเรา หากพบคำตอบของระบบที่น่าสงสัยนี้ได้ทุกที่ ก็อยู่ที่นี่"
 ancrel.12070.name:0 "เต็มไปด้วยชีวิตประดิษฐ์"
 ancrel.12070.desc:0 "เท่าที่ [Owner.GetResearchers] ของเราบอกได้ ไม่เคยมีสิ่งมีชีวิตใดในโลกที่พวกเขาขนานนามว่าเป็น \"§Yเทอร์มินัลโอเปอร์เวชัน§!\" แต่กิจกรรมก็ขาดไม่ได้ พื้นผิวถูกสร้างขึ้นอย่างหนาแน่น โครงสร้างเทียมขนาดใหญ่วางอยู่บนพื้นหินเปลือยในแถวที่เรียบร้อยและเป็นระเบียบซึ่งครอบคลุมเกือบสามในสี่ของโลก โดรนเชิงกลหลายพันล้านตัวคอยดูแลพวกมัน โดยปฏิบัติงานตั้งแต่การทำความสะอาดแบบธรรมดาไปจนถึงการเดินสายการประกอบที่ซับซ้อนมาก\n\nอย่างไรก็ตาม วัตถุประสงค์ที่แน่นอนของพวกมันยังคงไม่ชัดเจน [Owner.GetResearchers] ของเรากำลังเตรียมส่งทีมขึ้นสู่ผิวน้ำเพื่อตรวจสอบเพิ่มเติม"
 ancrel.12075.name:0 "การตรวจสอบโดรน"
 ancrel.12075.desc:0 "ขณะที่ [Owner.GetResearchers] ของเราเคลื่อนผ่านไปท่ามกลางพวกมัน โดรนบนโลกก็เพิกเฉยต่อการปรากฏตัวของพวกมันและทำหน้าที่ของตนต่อไป ความพยายามทั้งหมดในการสื่อสารกับโดรนล้มเหลว และแม้กระทั่งความพยายามที่จะขัดขวางพวกมันก็ไม่เกิดปฏิกิริยาใดๆ เลย โดรนเหล่านั้นเพียงแค่ขี่รถผ่าน [Owner.GetResearchers] ที่รบกวนอยู่ ทำให้เกิดการบาดเจ็บสาหัส \n\nตั้งแต่นั้นมา [Owner.GetResearchers] ของเราได้เปลี่ยนโฟกัสไปที่โปรแกรมที่ควบคุมโดรน การวิเคราะห์สัญญาณที่ดักจับแสดงให้เห็นว่ามีระบบที่ครอบคลุมคอยควบคุมสัญญาณเหล่านั้น อย่างไรก็ตาม การเข้ารหัสที่ใช้นั้นซับซ้อนมากและได้รับการพิสูจน์แล้วว่ายากที่จะค้นหาข้อมูลเพิ่มเติม"
 ancrel.12080.name:0 "การสำรวจอย่างเป็นระบบ"
 ancrel.12080.desc:0 "แม้ว่า [Owner.GetResearchers] ของเราไม่สามารถดำเนินการตรวจสอบดาวเคราะห์เพิ่มเติมได้ แต่ทีมงานก็ได้ตรวจสอบอาร์เรย์ของวัตถุที่กระจายไปทั่วระบบ มีมากกว่าหมื่นคนบอกหมด ส่วนใหญ่เป็นอุปกรณ์ทรงกระบอกยาวและดูเหมือนยังคงทำงานอยู่ - พวกมันกำลังส่งสัญญาณไปยังดาวเคราะห์ ด้วยรูปร่างของมันและความจริงที่ว่าพวกมันดูเหมือนจะไม่มีข้อยกเว้นซึ่งชี้ไปยังจุดต่างๆ ในกาแลคซีของเรา เราจึงหนีไม่พ้นข้อสรุปที่ว่านี่คืออาร์เรย์เซ็นเซอร์ขนาดใหญ่อย่างไร้สาระ แต่ใครจะเป็นคนสร้างมันขึ้นมาล่ะ?"
 ancrel.12085.name:0 "ถึงเวลาฟิชชิ่ง"
 ancrel.12085.desc:0 "ด้วยการเคลื่อนไหวที่กล้าหาญ [Owner.GetResearchers] ของเราสามารถฝังสปายแวร์ลงในเทอร์มินัลการเข้าถึงไปยังเมนเฟรมของโดรนได้ในเวลาอันรวดเร็ว โดยไม่มีโดรนอยู่ใกล้ๆ ดูเหมือนว่ายังไม่สามารถตรวจพบการบุกรุกได้ ความประทับใจของเราคือระบบที่มีความซับซ้อนสูง - นอกเหนือไปจากเครือข่ายของเราเอง - แต่อาจเป็นระบบที่ไม่ได้คาดหวังถึงความจำเป็นในการปกป้องตัวเอง ไม่ต้องสงสัยเลยว่าการป้องปรามทางกายภาพของกองเรือป้องกันก็ถือว่าเพียงพอแล้ว อย่างไรก็ตาม ระบบที่เรากำลังแทรกซึมนั้นมีขนาดใหญ่มาก ซึ่งเป็นคำที่ดูเหมือนเป็นการกล่าวเกินจริงสำหรับระบบดาวเคราะห์นี้ ดังนั้นจึงต้องใช้เวลาพอสมควรเพื่อค้นหาข้อมูลเพิ่มเติม"
 ancrel.12090.name:0 "ซูเปอร์คอมพิวเตอร์เฝ้าระวัง"
 ancrel.12090.desc:0 "ดูเหมือนว่าระบบอัตโนมัติใน $NAME_Ultima_Vigilis$ นั้นเก่ากว่าที่เราจินตนาการได้ ระบบข้อมูลที่เราแฮ็กไม่ได้ให้เบาะแสใด ๆ เกี่ยวกับตัวตนหรือความตั้งใจสูงสุดของผู้สร้าง แต่สิ่งหนึ่งที่เราจัดการเพื่อให้แน่ใจได้ก็คือพวกเขามาถึงไม่ต่ำกว่า 1.2 พันล้านปีก่อน และจากไปไม่นานหลังจากตั้งค่าระบบเป็นเสาสังเกตการณ์เพื่อสำรวจกาแล็กซีของเราทั้งหมด \n\nน่าสังเกตที่ระบบยังคงทำงานอยู่แม้จะผ่านไปหลายปีเหล่านี้ก็ตาม: ปรากฎว่าอาร์เรย์ของการติดตั้งที่กระจายไปทั่วระบบมีความซับซ้อนสูง เซ็นเซอร์ พวกเขาส่งฟีดสดไปยังโลก โดยที่ระบบปฏิบัติการกลางจะประมวลผลข้อมูลดังกล่าวเป็นข้อมูลที่โดรนสามารถบันทึกและจัดเก็บได้ จากการขาดแคลนพื้นที่และสสาร ดูเหมือนว่าพวกเขาได้ปรับปรุงเทคนิคการบีบอัดข้อมูลด้วยความมุ่งมั่น: โครงสร้างขนาดใหญ่บนโลกนี้อ้างว่าจะรวมผลรวมของการสังเกตทั้งหมดที่เคยบันทึกไว้ อย่างไรก็ตาม เราไม่สามารถทดสอบการยืนยันนี้ได้ เนื่องจากข้อมูลถูกบีบอัดเกินกว่าความสามารถของเราที่จะขยายขนาดได้\n\nน่ากังวลใจที่กระแส "ไฮไลต์" ที่ลดลงยังคงถูกถ่ายทอดไปยังพื้นที่ว่าง แต่แน่นอนว่าไม่มีใครยังคงฟังอยู่ หลังจากเวลานี้ผ่านไปแล้ว? อย่างไรก็ตาม โปรแกรมของเราพร้อมที่จะควบคุมโดรนดังกล่าว ตอนนี้เราอาจกำหนดรูปแบบระบบตามจินตนาการของเรา - ถ้าเรากล้า"
 ancrel.12090.A:0 "เราสามารถรวมโลกเข้ากับระบบปฏิบัติการของเราเองได้"
 ancrel.12090.B:0 "ปล่อยให้พวกเขาทำต่อ - เราสามารถดูดการอ่านของพวกเขาออกไปได้"
 ancrel.12090.C:0 "กระจายโดรนไปยังดาวเคราะห์ของเรา"
 ancrel.12090.C.machine.tooltip:0 "§G8K§! £pop£ §Hป๊อปของเครื่อง§! แจกจ่ายไปยังดาวเคราะห์ของเรา"
 ancrel.12090.C.mechanical.tooltip:0 "§G8K§! £pop£ §HMechanical Pops§! แจกจ่ายไปยังดาวเคราะห์ของเรา"
 ancrel.12090.D:0 "แต่นี่เป็นเพียงเหมืองโลหะผสมขนาดมหึมา!"
 ancrel.12090.E:0 "เครือข่ายที่มีการจัดการที่ดีเช่นนี้สามารถให้บริการเราได้อย่างดี"
 ancrel.12090.E.tooltip:0 "ระบบ §Y[From.Planet.System.GetName]§! จะถูกวางไว้ภายใต้การควบคุมของ §Yหน่วยสืบราชการลับของเครื่อง§! ซึ่งจะอยู่ภายใต้การควบคุมของเรา เมืองหลวงของพวกเขา §Y[From.Planet.GetName]§! จะเป็น §Yโลกจักรกล§! พร้อมด้วย §G8K§! £pop£ §Hป๊อปของเครื่อง§!"

 ancrel.12095.desc:0 "\"คุณไม่เกรงใจ-\"\n\n§Bฟีดการส่งสัญญาณอ่านไม่ออกชั่วขณะหนึ่ง และไม่สามารถรับรู้ถึงเสียงที่ได้ยินได้§!\n\n\"คุณไม่เคยคิดหรือว่าจะมีใครบางคนกำลังเฝ้าดูสัญญาณนั้นป้อนคุณอย่างไม่ระมัดระวัง เอาล่ะ ในเมื่อคุณได้พิสูจน์ตัวเองแล้วว่าเป็นตัวสัตว์ที่ก้าวร้าวที่เป็นอันตราย...ถึงเวลาที่จะเรียก §Rพารามิเตอร์ PEST§! เตรียม ที่จะเผชิญกับการลงโทษของคุณ”"
 ancrel.12095.A:0 "เราจะรอด."
 ancrel.12095.B:0 "ตัดการส่ง."
 ancrel.12095.tooltip:0 "§Rสิ่งเลวร้ายอาจเกิดขึ้นเร็วๆ นี้...§!"
 ancrel.12100.A:0 "อะไรในโลก?"

 ancrel.8200.name:0 "การบีบอัดระเบิด"
 ancrel.8200.intro:0 "ในระหว่างการสำรวจสถานีในระบบ [System.GetName] ทีมงานของเราทำให้ส่วนหนึ่งของตัวถังสูญเสียความสมบูรณ์โดยไม่ได้ตั้งใจ ทำให้เกิดการบีบอัดระเบิด"
 ancrel.8200.desc:0 "$ancrel.8200.intro$\n\nไม่มีใครสามารถทำได้ ภายในไม่กี่วินาที §H[dead_scientist.GetName]§! และ [Root.Owner.GetArchaeologistPlural] อื่นๆ อีกหลายคนก็ถูกพัดผ่านช่องโหว่จนเสียชีวิต"
 ancrel.8201.desc:0 "$ancrel.8200.intro$\n\nภายในไม่กี่วินาที [Root.Owner.GetArchaeologistPlural] หลายตัวก็ถูกพัดผ่านช่องโหว่จนเสียชีวิต โชคดีที่ §H[Root.GetLeaderName]§! อยู่ในส่วนอื่นของสถานีในขณะนั้น แต่นี่ก็ถือเป็นอุปสรรคสำคัญสำหรับความพยายามในการสืบสวน"
 ancrel.8202.desc:0 "$ancrel.8200.intro$\n\nโชคดีที่ไม่มีผู้เสียชีวิตในเหตุการณ์นี้ เนื่องจากทีมงานของเราสามารถหลบหนีไปยังพื้นที่ที่ไม่ได้รับผลกระทบใดๆ ของสถานีได้ ดูเหมือนว่าจะไม่มีอุปกรณ์สำคัญได้รับความเสียหาย ดังนั้นการสอบสวนจะไม่ประสบกับความพ่ายแพ้ใด ๆ เลย"
 ancrel.8202.desc.robot:0 "$ancrel.8200.intro$\n\nโชคดีที่ [Owner.GetArchaeologistPlural] ของเราไม่เป็นอันตราย เนื่องจากพวกมันถูกสร้างขึ้นเพื่อให้สามารถอยู่รอดได้ในที่โล่งมาระยะหนึ่งแล้ว พวกเขาจึงสามารถทำงานต่อไปได้อย่างไม่มีอุปสรรค"
 ancrel.8203.desc:0 "$ancrel.8200.intro$\n\nโชคดีที่ไม่มีผู้เสียชีวิตในเหตุการณ์นี้ เนื่องจากทีมงานของเราสามารถหลบหนีไปยังพื้นที่ที่ไม่ได้รับผลกระทบใดๆ ของสถานีได้ อย่างไรก็ตาม แรงบีบอัดได้ทำลายคอนโซลหลายตัวที่พวกเขาใช้งานอยู่ และจะต้องใช้เงินจำนวนมากในการซ่อมแซม"
 ancrel.8203.desc.robot:0 "$ancrel.8200.intro$\n\nโชคดีที่ [Owner.GetArchaeologistPlural] ของเราไม่เป็นอันตราย เนื่องจากพวกมันถูกสร้างขึ้นเพื่อให้สามารถอยู่รอดได้ในที่โล่งมาระยะหนึ่งแล้ว อย่างไรก็ตาม แรงบีบอัดได้ทำลายคอนโซลหลายตัวที่พวกเขาใช้งานอยู่ และจะต้องใช้เงินจำนวนมากในการซ่อมแซม"
 ancrel.8203.A:0 "เราจะจัดหาเงินทุนทั้งหมดที่พวกเขาต้องการ"
 ancrel.8203.B:0 "สิ่งนี้จะทำให้เราล่าช้า"
 ancrel.8210.1.desc:1 "การศึกษาอย่างต่อเนื่องของเราเกี่ยวกับซากของสถานีในระบบ [fromfrom.planet.system.GetName] ได้ค้นพบที่ซ่อนวัตถุโบราณจำนวนเล็กน้อย หัวหน้านักโบราณคดี [root.leader.GetName] ได้ระบุสิ่งประดิษฐ์เล็กๆ น้อยๆ หลายชิ้นในนั้น"
 ancrel.8210.2.desc:1 "กำแพงส่วนหนึ่งของสถานีพังทลายลงทันทีในขณะที่ [Root.Owner.GetArchaeologistPlural] ของเรากำลังตรวจสอบคอนโซลใกล้เคียง สิ่งนี้พิสูจน์ให้เห็นว่าเป็นเหตุการณ์โดยบังเอิญ เนื่องจากมีการเปิดเผยช่องที่ซ่อนอยู่ซึ่งปกปิดสิ่งประดิษฐ์เล็กๆ น้อยๆ หลายชิ้นไว้"

 ancrel.8215.name:0 "การล็อคระบบ"
 ancrel.8215.desc:0 "ขณะที่พวกเขากำลังเจาะผ่านอุปกรณ์อิเล็กทรอนิกส์ของสถานี หนึ่งใน [Owner.GetArchaeologistPlural] ของเราได้กระตุ้นให้เกิดมาตรการรักษาความปลอดภัยที่ยังใช้งานได้ซึ่งผู้สร้างทิ้งไว้โดยไม่ได้ตั้งใจ เป็นผลให้ทีมงานของเราถูกล็อคออกจากระบบของสถานีเป็นเวลานานก่อนที่จะใช้มาตรการรับมือที่เหมาะสม"
 ancrel.kick_it:0 "ลองเตะดูสิ"

 site_polaris_seed_vault:0 "ความหวังสุดท้าย"
 polaris_seed_vault_desc:0 "สิ่งที่ดูเหมือนเป็นโครงสร้างเทียมที่ห่อหุ้มอยู่ในส่วนที่เหลือของแผ่นน้ำแข็งเล็กๆ ของโลก ซึ่งลอยอยู่ในมหาสมุทรใสดุจคริสตัลของ [From.Planet.GetName] ทีมงาน \n\nจำเป็นต้องขุดโครงสร้างนี้"

 ancrel.13000.name:0 "การต้อนรับที่เย็นสบาย"
 ancrel.13000.desc:0 "หลังจากที่ผู้รุกรานคนสุดท้ายในโพลาริสล้มลง เรือของเราก็ทำการสแกนระบบครั้งสุดท้ายก่อนที่จะมุ่งหน้ากลับไปที่ท่าเรือและค้นพบบางสิ่งที่น่าสงสัย ในโลกของโพลาริสที่ 2โลหะหนักถูกจัดเรียงเป็นโครงสร้างเทียมบนเซ็นเซอร์ของเรา สิ่งที่น่าสนใจคือมีเพียงรูปแบบใดรูปแบบหนึ่งเท่านั้นที่ดูเหมือนจะลอยอยู่บนมหาสมุทรดาวเคราะห์ ในขณะที่ส่วนที่เหลืออยู่ใต้พื้นผิว เราสงสัยว่านี่เป็นผลงานของชีวิตมนุษย์ต่างดาว"

 ancrel.13005.name:0 "ภูเขาน้ำแข็ง"
 ancrel.13005.desc:0 "สิ่งที่สร้างขึ้นในภูเขาน้ำแข็งที่ลอยอยู่นั้นเป็นทรงลูกบาศก์สีดำขนาดใหญ่ที่สร้างขึ้นจากโลหะผสมแบบเดียวกับซากยานอวกาศด้านบน ผู้เชี่ยวชาญด้านน้ำแข็งของเราระบุว่า การวิเคราะห์ภูเขาน้ำแข็งนี้เกิดขึ้นเมื่อประมาณพันปีก่อน แม้ว่าจะ "ยากที่จะบอกด้วยบรรยากาศของมนุษย์ต่างดาว" การสแกนภายในโครงสร้างแสดงให้เห็นค่าทางชีววิทยาค่อนข้างมาก ดังนั้นจึงไม่แนะนำให้ใช้เครื่องมือรบกวน\n\nทีมงานจะต้องสำรวจหน้าผาน้ำแข็งไปยังสิ่งที่ดูเหมือนจะเป็นทางเข้าอาคาร"
 acnrel.13005.a:0 "ลงไปเลย"

 ancrel.13010.name:0 "ประตูฟรอสต์"
 ancrel.13010.desc:0 "เราได้ตั้งค่ายฐานไว้ที่ทางเข้าสถานที่ควรจะอยู่ที่ [From.Planet.GetName] เราได้ค้นพบบางสิ่งที่ดูเหมือนข้อความที่จารึกไว้บนผนังอาคารแล้ว บัดนี้เราจะเริ่มกระบวนการเปิดประตูบานนี้ที่ยาวนานและยากลำบากโดยไม่ทำลายสิ่งที่อยู่ข้างใน ในเวลาเดียวกัน นักภาษาศาสตร์ซีโนของเราพยายามที่จะแปลภาษาต่างด้าวที่ตายแล้วของคำจารึก"

 ancrel.13015.name:0 "การปล้นหลุมศพ"
 ancrel.13015.desc:0 "เวลามาถึงแล้ว และเราพร้อมที่จะเปิดผนึกโครงสร้างสีดำซึ่งมีชื่อว่า "ห้องนิรภัย" ตามคำแปลเบื้องต้นของคำจารึกบนกำแพง ผู้สร้างห้องนิรภัยแห่งนี้คือชาวโพลาเรียน ทำให้ที่นี่เป็นทางเลือกสุดท้ายในการรักษาสมบัติของตนให้ปลอดภัย เมื่อเราเปิดประตู เราได้รับการต้อนรับจากเซ็นเซอร์ของเรา โดยมีบรรยากาศควบคุมคล้ายกับอากาศภายนอก แต่มีคาร์บอนไดออกไซด์น้อยกว่าเล็กน้อย"

 ancrel.13020.name:0 "สมบัติ"
 ancrel.13020.desc:0 "เมล็ดพันธุ์โบราณ! เอ็มบริโอของพืช - นั่นคือสมบัติที่ชาวโพลาเรียนซ่อนตัวอยู่ในห้องนิรภัยนี้ การแปลเพิ่มเติมบอกเราว่ามนุษย์ต่างดาวเหล่านี้เติมคาร์บอนไดออกไซด์มากเกินไปในชั้นบรรยากาศอย่างอยากรู้อยากเห็น เมื่อบรรยากาศเปลี่ยนแปลงไปอย่างไม่อาจย้อนกลับได้ ผู้อยู่อาศัยในยุคโบราณของโลกนี้ได้รวบรวมพืชทั้งหมดที่พวกเขาสามารถค้นพบซึ่งอาจไม่รอดจากสถานะใหม่ของพวกเขาและแช่แข็งพวกเขาทั้งหมดไว้ที่นี่ \n\nในตอนนั้น โลกทั้งใบจะถูกปกคลุมไปด้วยน้ำแข็ง ตอนนี้เหลือเพียงภูเขาน้ำแข็งเล็กๆ ที่โดดเดี่ยวนี้ อย่างไรก็ตาม ความพยายามของพวกเขาจะไม่สูญเปล่า การมีระบบนิเวศน์ของพืชทั้งโลกได้รับการจัดหมวดหมู่และจัดเรียงไว้แล้ว จะช่วยนักวิทยาศาสตร์ของเราในการค้นคว้าเรื่องทางชีววิทยาในอนาคตได้อย่างมาก"
 ancrel.13020.a:0 "ส่งตัวอย่างเหล่านี้ไปให้นักวิทยาศาสตร์ของเรา"
 ancrel.13020.b.evopred: "จัดทำแคตตาล็อกและพร้อมสำหรับการโคลนแล้วหรือยัง? ห้องนิรภัยนี้สร้างมาเพื่อเรา"

 ancrel.13025.desc:0 "จุลินทรีย์! แบคทีเรียทุกชนิดที่เป็นอันตรายและเป็นประโยชน์ ยูคาริโอตและโปรคาริโอตทุกตัว ทั้งหมดอยู่ในสถานที่จัดเก็บขั้นสูงที่มีป้ายกำกับและแคตตาล็อก: นี่คือสมบัติอันยิ่งใหญ่ที่ชาวโพลาเรียนซ่อนตัวอยู่ในห้องนิรภัยนี้ การแปลเพิ่มเติมบอกเราว่ามนุษย์ต่างดาวเหล่านี้เติมคาร์บอนไดออกไซด์มากเกินไปในชั้นบรรยากาศอย่างอยากรู้อยากเห็น เมื่อบรรยากาศเปลี่ยนแปลงไปอย่างไม่อาจย้อนกลับได้ ผู้อยู่อาศัยในสมัยโบราณของโลกนี้ได้รวบรวมสิ่งมีชีวิตจุลินทรีย์ทั้งหมดที่พวกเขาสามารถค้นพบซึ่งอาจไม่รอดจากสถานะใหม่ของพวกเขาและแช่แข็งพวกเขาทั้งหมดไว้ที่นี่ \n\nในตอนนั้น โลกทั้งใบจะถูกปกคลุมไปด้วยน้ำแข็ง ตอนนี้เหลือเพียงภูเขาน้ำแข็งเล็กๆ ที่โดดเดี่ยวนี้ อย่างไรก็ตาม ความพยายามของพวกเขาจะไม่สูญเปล่า การมีระบบนิเวศน์ของจุลินทรีย์ทั้งหมดบนโลกนี้ได้รับการจัดหมวดหมู่และคัดแยกแล้ว จะช่วยให้ [Root.Owner.getscientistplural] ของเราพัฒนาอาณานิคมใหม่ที่ได้รับการปรับปรุงสำหรับโลกใหม่ได้อย่างมีนัยสำคัญ"
 ancrel.13025.desc.machine:0 "จุลินทรีย์. แบคทีเรียที่เป็นอันตรายและมีประโยชน์ทุกชนิด ยูคาริโอตและโปรคาริโอตทุกชนิด ติดป้ายกำกับและลงรายการ: นี่คือสมบัติล้ำค่าที่ชาวโพลาเรียนซ่อนตัวอยู่ในห้องนิรภัยนี้ การแปลเพิ่มเติมบอกเราว่ามนุษย์ต่างดาวเหล่านี้เติมคาร์บอนไดออกไซด์มากเกินไปในชั้นบรรยากาศอย่างอยากรู้อยากเห็น เมื่อบรรยากาศเปลี่ยนแปลงไปอย่างไม่อาจย้อนกลับได้ ผู้อยู่อาศัยในสมัยโบราณของโลกนี้ได้รวบรวมสิ่งมีชีวิตจุลินทรีย์ทั้งหมดที่พวกเขาสามารถค้นพบซึ่งอาจไม่รอดจากสถานะใหม่ของพวกเขาและแช่แข็งพวกเขาทั้งหมดไว้ที่นี่ \n\nในตอนนั้น โลกทั้งใบจะถูกปกคลุมไปด้วยน้ำแข็ง ตอนนี้เหลือเพียงภูเขาน้ำแข็งเล็กๆ ที่โดดเดี่ยวนี้ อย่างไรก็ตาม ความพยายามของพวกเขาได้รับการชื่นชม การจัดเรียงทางชีวภาพล่วงหน้าจะช่วยให้ดึงข้อมูลที่เกี่ยวข้องได้ง่ายขึ้น"

 ancrel.13030.name:0 "วิสัยทัศน์ที่รบกวน"
 ancrel.13030.desc:1 "เมื่อสามคืนที่แล้ว หัวหน้านักโบราณคดี [From.Leader.GetName] รายงานว่ามีการมองเห็นที่น่ากังวล และถูกกักขังอยู่ในที่พักของพวกเขาจนถึงปัจจุบัน พวกเขาเชื่อว่าต้นตอของอะไรก็ตามที่อยู่ข้างล่างนี้กับเรา..."
 ancrel.13030.a:0 "เป็นลางไม่ดี"

 polaris_biology_modifier:0 "การศึกษาเมล็ดโพลาเรียน"
 polaris_habitability_modifier:0 "ศึกษาจุลินทรีย์ขั้วโลก"
 d_polaris_city:0 "เมืองจมโบราณ"
 d_polaris_city_desc:0 "เมืองต่างๆ ของชาวโพลาเรียนเคยปกคลุมมหาสมุทรน้ำแข็งก่อนที่ฐานน้ำแข็งจะละลายหายไป"

 #Fumongus
 site_fumongus_dig:0 "ผึ่งให้แห้ง"
 site_fumongus_intro:0 "เราได้พบสัญญาณของน้ำทั่วทุกมุมโลก เท่าที่เรารู้ มันควรจะยังอยู่ที่นี่ อุณหภูมิอยู่ในช่วงปกติที่น้ำของเหลวจะมีได้ และยังคงมีบรรยากาศอยู่แม้ว่าจะเบาบางก็ตาม แต่ทุกสิ่งที่นี่แห้งแล้งและพืชพรรณที่มีอยู่ก็แห้งแล้ง\n\nนอกจากนี้ การสแกนยังได้เผยให้เห็นร่องรอยของอารยธรรมการเดินทางในอวกาศอีกแห่งหนึ่งบนโลกนี้ ทีมโบราณคดีจะมีเป้าหมายสองประการ: ค้นหาว่าเกิดอะไรขึ้นกับน้ำ และทำความเข้าใจว่านักสำรวจอวกาศคนอื่นๆ มาทำอะไรที่นี่ สมมติฐานส่วนใหญ่เชื่อมโยงทั้งสองสิ่งนี้เข้าด้วยกันแล้ว และบางคนในทีมเชื่อว่านี่อาจเป็นผลงานของ 'โจรขโมยน้ำ'"

 #Random Event - Fungal zombies
 ancrel.8300.intro:0 "การสำรวจที่ดำเนินการโดย [Root.Owner.GetArchaeologistPlural] ของเราบน [From.Planet.GetName] ได้รบกวนการเน่าเปื่อยของสัตว์ป่าในท้องถิ่นบางชนิด ซึ่งขณะนี้ดูเหมือนว่าอยู่ภายใต้การควบคุมของเชื้อราปรสิต ซอมบี้เชื้อราเหล่านี้เริ่มโจมตีเราทันที โดยเห็นได้ชัดว่าถูกดึงดูดไปยังแหล่งน้ำในค่ายของเราและภายในร่างกายของเรา"
 ancrel.8300.critical:0 "ซอมบี้ทำงาน §H[dead_scientist.GetName]§! เป็นเวลาสั้นๆ ก่อนที่ทีมรักษาความปลอดภัยของเราจะถูกเผาทำลาย ซากที่ผึ่งให้แห้งคือสิ่งที่เหลืออยู่เท่านั้น"
 ancrel.8300.failure:0 "ซอมบี้สามารถสังหาร [Root.Owner.GetArchaeologistPlural] ได้หลายตัวก่อนที่พวกมันจะถูกหยุดโดย §H[Root.GetLeaderName]§! ศพที่ถูกผึ่งให้แห้งของพวกมันล้มลงเป็นชิ้น ๆ เมื่อเราพยายามนำพวกมันกลับมา"
 ancrel.8300.success:0 "โชคดีที่ §H[Root.GetLeaderName]§! และผู้คุ้มกันรักษาความปลอดภัยในบริเวณใกล้เคียงสามารถจัดการซอมบี้ได้ก่อนที่จะทำร้ายใครได้รับบาดเจ็บสาหัส"
 ancrel.8300.pay:0 "ขณะนี้ซอมบี้ถูกกักกันไว้แล้ว แต่ไม่มีทางผ่านพวกมันไปได้ บางทีเราอาจล่อพวกมันออกมาได้ด้วยน้ำปริมาณมากพอสมควร"
 ancrel.8300.name:0 "ซอมบี้เชื้อรา"
 ancrel.8300.desc:0 "$ancrel.8300.intro$\n\n$ancrel.8300.critical$"
 ancrel.8305.desc:0 "$ancrel.8300.intro$\n\n$ancrel.8300.failure$"
 ancrel.8310.desc:0 "$ancrel.8300.intro$\n\n$ancrel.8300.success$"
 ancrel.8315.desc:0 "$ancrel.8300.intro$\n\n$ancrel.8300.pay$"
 ancrel.8315.a:0 "ทำมัน."
 ancrel.8315.b:0 "หาทางรอบๆ."

 #Digsite Chapters

 ancrel.13100.name:0 "พวกกักตุนน้ำ"
 ancrel.13100.desc:0 "การค้นพบหุบเขาอันกว้างใหญ่ที่เต็มไปด้วยเห็ดบน [From.Planet.GetName] ทำให้เราได้คำตอบเริ่มต้น มีน้ำอยู่ในเห็ด ดูเหมือนว่าพวกมันจะแผ่ขยายเป็นส่วนใหญ่ของพื้นผิวโลก ทั้งหมดเชื่อมต่อกับไมซีเลียมชนิดเดียวกัน ซึ่งในทางเทคนิคแล้วทำให้มันกลายเป็นสิ่งมีชีวิตเดียว และเป็นหนึ่งในสิ่งมีชีวิตที่ใหญ่ที่สุดที่เราเคยเห็นมา สมาชิกในทีมบางคนตั้งชื่อเชื้อราขนาดมหึมานี้ว่า'Fumongus'\n\nดูเหมือนว่าเห็ดจะมีการเปลี่ยนแปลงทางพันธุกรรมและได้ยึดครองระบบนิเวศที่ครั้งหนึ่งเคยมีอยู่ที่นี่อย่างสมบูรณ์ การเติบโตอย่างรวดเร็วและไร้การควบคุมของพวกมันทำให้พวกเขาดูดซับน้ำส่วนใหญ่ที่มีอยู่ที่นี่ ต่อมาพวกมันก็เข้าสู่สภาวะแห้งแล้งซึ่งเชื้อราส่วนใหญ่ยังมีชีวิตอยู่ โดยมีน้ำกระจายไปทั่วสิ่งมีชีวิตทั้งหมด"
 ancrel.13105.name:0 "บังเกอร์ที่ถูกบุกรุก"
 ancrel.13105.desc:0 "ลึกเข้าไปในใจกลางป่าไมซีเลียมที่ตั้งอยู่ในหุบเขาลึกของ [From.Planet.GetName] เราค้นพบบังเกอร์บางชนิดซึ่งมีเห็ดบุกรุกเข้ามาเป็นเวลานาน ทีมงานเชื่อว่ามันถูกสร้างขึ้นโดยสายพันธุ์เดียวกับที่ดัดแปลงพันธุกรรมของเห็ดที่นี่ \n\nส่วนขนาดใหญ่ของบังเกอร์พังทลายลงมา และอุปกรณ์จำนวนมากภายในบังเกอร์มีแนวโน้มที่จะพังเกินกว่าจะซ่อมแซมได้ แต่เราได้ระบุห้องปิดผนึกบางห้องที่อาจบรรจุวัสดุที่ใช้ประโยชน์ได้ น่าสังเกตว่าไม่พบซากมนุษย์ต่างดาวที่นี่ บางทีพวกเขาอาจละทิ้งสถานที่นั้น หรือไม่ก็อาจไม่ทิ้งส่วนต่างๆ ของร่างกายที่ไม่ถูกดูดซึมโดยสัตว์ป่าในท้องถิ่นไว้เบื้องหลัง"
 ancrel.13110.name:0 "ผู้งัดเชื้อรา"
 ancrel.13110.desc:0 "บังเกอร์บน [From.Planet.GetName] ถูกใช้เพื่อปกป้องอุปกรณ์คอมพิวเตอร์ ซึ่งบางส่วนดูเหมือนจะเชื่อมต่อโดยตรงกับไมซีเลียม โชคดีที่เราสามารถเปิดใช้งานเทอร์มินัลและธนาคารข้อมูลหลายแห่งได้อีกครั้ง \n\nการทำลายการเข้ารหัสและถอดรหัสภาษาที่ใช้นั้นต้องใช้เวลา และทีมงานได้ขอให้ส่ง [Root.Owner.GetLinguists] ชั้นนำของเราหลายตัวมาที่นี่เพื่อช่วย"
 ancrel.13115.name:0 "จากเห็ดสู่รหัส"
 ancrel.13115.desc:0 "เราได้กู้คืนข้อมูลอันมีค่าจากธนาคารข้อมูลที่พบในบังเกอร์บน [From.Planet.GetName] ธนาคารข้อมูลบอกเราว่านี่เป็นโพสต์เพื่อรับฟัง เห็นได้ชัดว่ามนุษย์ต่างดาวพบวิธีในการตีความสัญญาณที่วิ่งผ่านไมซีเลียมและแปลงสัญญาณเหล่านั้นให้เป็นข้อมูลที่ใช้งานได้ \n\nเราไม่เข้าใจว่าสิ่งนี้เป็นไปได้อย่างไร แต่ขณะนี้ทีมงานจะพยายามนำน้ำจากดาวเคราะห์น้อยน้ำแข็งที่อยู่ใกล้เคียงมา 'ปลุก'ฟูมยองกัส'อีกครั้ง และดูว่ามันส่งข้อมูลประเภทใด ถ้ามี"
 ancrel.13120.name:0 "แห้งอีกต่อไป"
 ancrel.13120.desc:0 "เห็ดบน [From.Planet.GetName] เริ่มงอกงามอีกครั้ง ด้วยความช่วยเหลือจากเรืออื่นๆ อีกหลายลำ เราต้องลากดาวเคราะห์น้อยน้ำแข็งหลายดวงขึ้นสู่วงโคจร ก่อนที่จะนำดาวเคราะห์น้อยเหล่านั้นไปยังสถานที่ต่างๆ บนโลกเพื่อละลาย เป็นกระบวนการที่ยาวนาน แต่ในที่สุดก็เริ่มเกิดผล\n\nด้วยเหตุนี้ คอมพิวเตอร์จึงเริ่มพ่นข้อมูลเล็กๆ น้อยๆ ที่ดูค่อนข้างสุ่มออกมา จนกระทั่งเรารับรู้กิจกรรมจากบ้านของเราได้ ด้วยความร่วมมือกับทีมงานใน [Root.Owner.Capital.GetName] ได้มีการทำการทดลองหลายชุด และข้อสรุปเดียวที่เป็นไปได้ก็คือ เห็ดมีความตระหนักรู้จำกัดถึงสิ่งที่เกิดขึ้นบนดาวเคราะห์ดวงอื่น แม้ว่าข้อมูลที่เราได้รับมาจะยังไม่สามารถนำมาใช้ประโยชน์ได้ แต่ความพยายามอย่างต่อเนื่องในการกู้คืนเห็ดนั้นคาดว่าจะให้ผลลัพธ์ที่มากขึ้นแก่เรา"

 #Final event

 ancrel.13135.intro:0 "ในที่สุดอาร์เรย์ก็ใช้งานได้ในที่สุด มีการนำแหล่งน้ำจำนวนมากมาจากวงโคจรเพื่อปรนเปรอเห็ดที่กระหายน้ำอยู่เสมอ และมีการอัพเกรดทรัพยากรคอมพิวเตอร์ครั้งใหญ่"
 ancrel.13135.mid:0 "จำนวนสัญญาณที่เคลื่อนที่ผ่านเครือข่ายนั้นต่ำอย่างน่าประหลาดใจ เมื่อพิจารณาจากปริมาณข้อมูลที่ถ่ายทอด ทฤษฎีที่โดดเด่นที่สุดตั้งข้อสังเกตว่าฟูมองกัสดำรงอยู่ในมิติต่างๆ ซึ่งระยะทางไม่ใช่สิ่งที่เราคุ้นเคย \n ไม่ว่าในกรณีใด ฟูมองกัสก็สัมผัสกับลูกหลานของมันทั่วกาแลคซี และอาณานิคมขนาดเล็กเหล่านี้สามารถถ่ายทอดข้อมูล ซึ่งเราสามารถตีความได้"

 ancrel.13135.name:0 "ฟูมงุสฟังอีกครั้ง"
 ancrel.13135.desc:0 "$ancrel.13135.intro$\n\nยังคงมีความลึกลับอยู่ เนื่องจากเรายังไม่แน่ใจว่าเห็ดสามารถรวบรวมข้อมูลจำนวนมากขนาดนั้นจากส่วนที่เหลือของกาแลคซีได้อย่างไร $ancrel.13135.mid$\n\nเมื่อเครือข่ายกลับมาทำงานอีกครั้ง สิ่งเดียวที่ต้องตัดสินใจคือจะใช้เพื่อการเฝ้าระวังหรือไม่"
 ancrel.13135.a:0 "เริ่มการตรวจสอบ"
 ancrel.13135.a.evopred: "ติดตามและรายงาน บางทีเราอาจเรียนรู้สิ่งที่คล้ายกันได้"
 ancrel.13135.b:0 "ปล่อยให้เห็ดอยู่"

 #Final event variation

 ancrel.13130.name:0 "กลัวเห็ดเก่า"
 ancrel.13130.desc:0 "$ancrel.13135.intro$\n\nแต่ยังมีอีกมากที่เราไม่รู้เกี่ยวกับเครือข่ายไมซีเลียม $ancrel.13135.mid$ แต่มีใครอีกบ้างที่สามารถเข้าถึงเครือข่ายนี้ได้? มีข้อมูลมากมายที่เราไม่สามารถเชื่อมโยงกับระบบต่างๆ ในกาแลคซีนี้ได้ [Root.Owner.GetScientistPlural] ที่มองโลกในแง่ร้ายกว่าของเราโต้แย้งว่าเราอาจไม่ใช่คนเดียวที่ฟังอยู่ และด้วยการเปิดใช้งานเครือข่ายอีกครั้ง เราก็ได้เปิดเผยตัวเองแก่ใครก็ตามที่ใช้มัน \n\nเมื่อพิจารณาจากสิ่งที่เรายังไม่ทราบเกี่ยวกับฟูมงุสหรือเกี่ยวกับสายพันธุ์ก่อนหน้านี้ที่เข้ามาใช้มัน อาจเป็นการดีที่สุดที่จะปล่อยมันไว้ตามลำพัง.."
 ancrel.13130.a:0 "คนโง่หวาดระแวง ใช้มัน."
 ancrel.13130.b:0 "ปล่อยให้เห็ดอยู่"

