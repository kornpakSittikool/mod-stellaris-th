 ancrel.2045.name:0 "วิญญาณรกร้าง"
 ancrel.2045.desc:0 "ฟอสซิลกลายพันธุ์ได้รับการเปิดเผยว่าอยู่ในสังคมหลังหายนะทางจิตวิญญาณสูง ซึ่งอาศัยอยู่ในดินแดนรกร้างจากสารเคมีและนิวเคลียร์ที่ตกลงมาบน [From.Planet.GetName] เมื่อหลายแสนปีก่อน \n\nไม่ชัดเจนว่าสังคมที่สูญหายนี้ประกอบด้วยผู้รอดชีวิตที่เหลืออยู่จากอารยธรรมยุคอวกาศที่ยอมจำนนต่อสงครามแสนสาหัสหรือว่ามนุษย์กลายพันธุ์เหล่านี้วิวัฒนาการมาบนดาวเคราะห์ที่ถูกทำลายล้างในภายหลังหรือไม่"
 ancrel.2046.name:0 "ความกระจ่างใสของสารก่อมะเร็ง"
 ancrel.2046.desc:0 "สังคมมนุษย์กลายพันธุ์หลังหายนะที่สาบสูญไปนานบน [From.Planet.GetName] ดูเหมือนจะบูชาแหล่งกำเนิดรังสีอย่างพระเจ้า โดยถือว่าวิวัฒนาการเป็นกระบวนการหนึ่งในการดำรงอยู่ของสารกัมมันตภาพรังสี\n\nจากสิ่งที่เรารวบรวมได้จากภาษาสัญลักษณ์ของพวกมัน รังสีถูกเรียกว่า 'แหล่งที่มา' ซึ่งสามารถเปิดเผย 'สถานะที่แท้จริง' ของสิ่งมีชีวิตทั้งหมดได้ นักโบราณคดีของเราตั้งทฤษฎีว่าการจงใจสัมผัสกับแหล่งกำเนิดรังสีดังกล่าวเป็นเวลานานด้วยเหตุผลทางจิตวิญญาณ อาจนำไปสู่การกลายพันธุ์ที่รุนแรงของสายพันธุ์นี้ และความหายนะในที่สุด"
 ancrel.2046.a:0 "ลางสังหรณ์แค่ไหน."
 ancrel.2047.name:0 "ความเจ็บปวดที่กำลังเติบโต"
 ancrel.2047.desc:0 "ในที่สุด นักโบราณคดีของเราใน [From.Planet.GetName] ก็ได้รับการยืนยันข้อสงสัยแล้ว การค้นพบกลุ่มอาคารที่ได้รับรังสีและพังทลายซึ่งครั้งหนึ่งเคยเก็บถังสารเคมีที่มีกัมมันตภาพรังสีสูงไว้ได้ยืนยันทฤษฎีที่ว่าสายพันธุ์กลายพันธุ์ที่สูญหายไปนั้นเต็มใจที่จะรับรังสีมากเกินไป ในรูปแบบพิธีกรรมแห่งการมาถึงซึ่งเชื่อมโยงกับศรัทธาทางจิตวิญญาณของพวกเขา\n\nในสิ่งที่ต้องเป็นขั้นตอนพิธีการที่เจ็บปวด สมาชิกของสังคมที่สาบสูญไปนานบน [From.Planet.GetName] จะเปิดเผยตัวเองให้สัมผัสกับสารก่อกลายพันธุ์ทางเคมีในปริมาณที่เกือบถึงตายด้วยความหวัง ในการเปิดเผย 'ตัวตนที่แท้จริง' ของพวกเขา ซากโครงกระดูกที่พบที่ด้านล่างของถังหลายแห่งบ่งชี้ว่าไม่ใช่ผู้ร้องขอทั้งหมดที่จะรอดชีวิตจากการทดสอบครั้งนี้"
 ancrel.2047.a:0 "รบกวน."

 ancrel.2050.name:0 "เครื่องจักรทั่วทั้งโลก"
 ancrel.2050.desc:1 "มีเครื่องจักรที่ผุพังปกคลุม [From.GetName] ซึ่งเดิมสร้างขึ้นเมื่อเจ็ดหมื่นปีก่อนที่น่าทึ่ง ชะตากรรมของวิศวกรต่างด้าวที่สร้างมันขึ้นมานั้นไม่ชัดเจน เนื่องจากพวกเขาไม่ได้อาศัยอยู่บนโลกใบนี้อีกต่อไปแล้ว \n\nเครื่องจักรของพวกเขาทอดยาวไปบนพื้นผิวส่วนใหญ่ของโลก สลับสับเปลี่ยนภูเขาและมหาสมุทรเหมือนกัน - และยังทอดตัวลงไปใต้พื้นผิวโลกมากด้วยในเครือข่ายสิ่งอำนวยความสะดวกใต้ดินอันกว้างใหญ่ มันถูกสร้างขึ้นโดยใช้วัสดุและรหัสซีเรียลที่เหมือนกัน บ่งบอกว่าสถาบันเดียวสร้างเครือข่ายทั้งหมด จากภาคเกษตรกรรมที่รกร้างมายาวนาน ไปจนถึงระบบการผลิตและการเปลี่ยนแปลงพลังงานที่ล่มสลาย และอาร์เรย์การสื่อสารที่กว้างขวาง ความต้องการด้านอุตสาหกรรมและความบันเทิงทั้งหมดของประชากรที่สูญหายไปบนโลกนี้ล้วนได้รับการสนองตอบด้วยซุปเปอร์แมชชีนเครื่องเดียวนี้ \n\nน่าประหลาดใจที่ภาคกลไกเหล่านี้บางส่วนยังคงใช้งานได้: การส่งและรับสัญญาณในท้องถิ่น การส่องสว่างให้กับเมืองผีสิงที่เน่าเปื่อยมายาวนาน และการรดน้ำบริเวณกว้างใหญ่ของสิ่งที่ครั้งหนึ่งเคยเป็นที่ดินเพื่อเกษตรกรรม การสแกนเปลือกโลกในเชิงลึกบ่งชี้ว่าศูนย์ควบคุมของเครื่องจักรที่แผ่กิ่งก้านสาขานั้นตั้งอยู่ใต้ดิน - เราจะต้องขุดขึ้นมาหากเราต้องการไปให้ถึงมัน \n\nสำหรับเนื้อเยื่ออินทรีย์ประหลาดที่ปกคลุมเครื่องจักรส่วนใหญ่ที่ทอดข้ามดาวเคราะห์: จนถึงขณะนี้ทีมวิทยาศาสตร์ของเรายังคงงุนงงกับธรรมชาติและจุดประสงค์ของมัน"
 ancrel.2050.a:0 "แปลกขนาดไหน!"
 ancrel.2051.name:0 "กินเหล็ก"
 ancrel.2051.desc:1 "การขุดค้นพบตัวอย่างสดใหม่ของเนื้อเยื่อเยื่อหุ้มที่แปลกประหลาดซึ่งปกคลุมเครื่องจักรที่ทอดข้ามดาวเคราะห์บน [From.From.Planet.GetName]! จากการวิเคราะห์อย่างรอบคอบ นักวิจัยของเราได้สรุปว่าสารอินทรีย์นี้ดูเหมือนจะเป็นผลพลอยได้จากแบคทีเรียที่กินธาตุเหล็กหรือเฟอร์โรฟาจที่ชั่วร้าย! ไวรัสจากต่างดาวนี้แพร่เชื้อแบคทีเรียสายพันธุ์ที่มีเอกลักษณ์ โดยร่วมเลือกกระบวนการทางชีวภาพของแบคทีเรียเพื่อละลายพื้นผิวของโลหะผสมเหล็ก หลังจากการสลายทางเคมีที่รุนแรง ไวรัสจะดูดซับอะตอมเหล็กที่จำเป็นต่อการจำลองแบบอย่างต่อเนื่อง!\n\nในตัวอย่างที่แปลกประหลาดของปรสิตไซแนลเฟอร์โรฟาจจะแพร่กระจายออกไปลึกขึ้นเรื่อยๆ ตามเครื่องจักรเก่า ทิ้งร่องรอยของไบโอฟิล์มที่ประกอบด้วยแบคทีเรียที่ตายแล้วและสสารที่เป็นคราบไว้"
 ancrel.2052.name:0 "การก่อการร้ายทางชีวภาพ"
 ancrel.2052.desc:1 "ด้วยการรวบรวมบันทึกข่าวที่สามารถกอบกู้ได้บางส่วนซึ่งพบลึกลงไปในโรงงานเครื่องจักรกลที่เน่าเปื่อยบน [From.Planet.GetName] นักโบราณคดีของเราจึงสามารถสรุปได้ว่ากลุ่มนักวิทยาศาสตร์กบฏถูกสร้างขึ้นบนโลกนี้ ส่วนหนึ่งของห้องขังที่ต่อต้านบริษัทผูกขาดซึ่งสร้างเครื่องจักรทั่วทั้งโลก ผู้ก่อการร้ายทางชีวภาพเหล่านี้พยายามต่อต้านอิทธิพลของบริษัทที่แพร่หลายไปทั่วโลกด้วยการปล่อยเฟอร์โรฟาจอย่างเห็นได้ชัด"
 ancrel.2053.name:0 "คอร์โบโรรัฐ"
 ancrel.2053.desc:1 "หลังจากการบูรณะบันทึกของบริษัทอิเล็กทรอนิกส์โบราณใน [From.Planet.GetName] อย่างอุตสาหะอย่างอุตสาหะใน [From.Planet.GetName] นักโบราณคดีของเราได้อนุมานได้ว่าบริษัทได้ตอบโต้ผู้ก่อการร้ายทางชีวภาพ โดยกำหนดมาตรการคว่ำบาตรทางเศรษฐกิจครั้งใหญ่ในภูมิภาคหรือ 'รัฐคอร์โปโร' ที่กลุ่มกบฏกำเนิดขึ้น \nEXIF1\n\nเห็นได้ชัดว่าเมื่อพลังงาน อุปทาน และอาหารขาดแคลนเริ่มเกิดขึ้น การจลาจลทั่วทั้งภูมิภาคในหมู่ประชาชนที่ตกเป็นเหยื่อในผู้ได้รับผลกระทบ รัฐคอร์โปโรปะทุขึ้น"
 ancrel.2054.name:1 "โดรนทำงานผิดปกติ"
 ancrel.2054.desc:1 "การตรวจสอบซากโดรนต่อสู้เชิงกลอย่างระมัดระวังเผยให้เห็นว่ามีความพยายามกักกันด้วยโดรนอยู่ช่วงหนึ่งภายหลังการจลาจล สิ่งที่น่าสนใจก็คือ บริษัทที่อยู่เบื้องหลังเครื่องจักรของดาวเคราะห์หรือที่ทราบกันดีอยู่แล้วว่า C.A.R.E. ดูเหมือนจะเป็นผู้ผลิตโดรนส่วนใหญ่ที่ใช้งาน \n\nในขณะเดียวกัน เฟอร์โรฟาจก็สว่างขึ้น และยังคงกัดกินเครื่องจักรทั่วทั้งดาวเคราะห์ของ C.A.R.E ดูเหมือนจะไม่สามารถรอดพ้นจากความพยายามใดๆ ที่บริษัทพยายามหยุดยั้งการแพร่กระจายของมัน"
 ancrel.2055.name:0 "ความตายครั้งใหญ่"
 ancrel.2055.desc:1 "ยังไม่ชัดเจนว่าจะเกิดอะไรขึ้นต่อไปในประวัติศาสตร์ของสังคมบน [From.Planet.GetName] ทีมงานไม่พบบันทึกข้อมูล ไม่มีการบันทึก ไม่มีบันทึกที่เป็นลายลักษณ์อักษรหรืออิเล็กทรอนิกส์บนโลกนี้เลยวันใดวันหนึ่ง เกือบเจ็ดหมื่นปีที่แล้ว จำนวนศพที่พบในบันทึกทางธรณีวิทยาเพิ่มขึ้นอย่างมากหลังจากวันนี้ ซึ่งส่วนใหญ่ดูเหมือนจะประสบกับภาวะทุพโภชนาการขั้นรุนแรง จำนวนที่ไม่มีนัยสำคัญยังแสดงถึงอาการบาดเจ็บที่บาดแผลจากกระสุนปืนถึงชีวิต"
 ancrel.2056.name:0 "แกนกลางสั่งการ"
 ancrel.2056.desc:3 "หลังจากการแฮ็ค แบ็คดอร์ และการใช้กำลังดุร้ายของ C.A.R.E มาตรการรักษาความปลอดภัยทางไซเบอร์ที่ครอบคลุม - แต่ยังคงพื้นฐานและก่อความไม่สงบ - ในที่สุดนักโบราณคดีของเราก็สามารถเข้าถึงศูนย์บัญชาการส่วนกลางของบริษัทได้!\n\nโชคดีที่โดรนรักษาความปลอดภัยหลายสิบตัวและป้อมปืนรักษาความปลอดภัยทันทีภายในประตูระเบิดหนักของแกนกลางนั้นไม่ตอบสนองต่อการบุกรุกโดยสิ้นเชิง - ไม่เช่นนั้น การสำรวจครั้งนี้อาจจบลงอย่างรวดเร็ว \n\nภายในแกนกลางที่ขึ้นสนิม - แต่ได้รับการดูแลอย่างดี - ทีมงานของเราได้ติดต่อกับปัญญาประดิษฐ์ที่ควบคุมอาร์เรย์เครื่องจักรทั่วโลกทั้งหมดของ C.A.R.E เห็นได้ชัดว่า AI ที่ยังคงทำงานอยู่นี้ค่อนข้างมีความรู้สึก และหากนักวิทยาศาสตร์ของเราถอดรหัสภาษาของมันได้อย่างถูกต้อง มันก็แสดงความปรารถนาที่จะพูดคุยกับเรา!"
 ancrel.2057.name:0 "แคร์อี"
 ancrel.2057.desc:1 "เพิ่มประสิทธิภาพการเติบโต เพิ่มประสิทธิภาพการเติบโต เพิ่มประสิทธิภาพการเติบโต เพิ่มประสิทธิภาพการเติบโต เพิ่มประสิทธิภาพการเติบโต เพิ่มประสิทธิภาพการเติบโต เพิ่มประสิทธิภาพการเติบโต เพิ่มประสิทธิภาพการเติบโต เพิ่มประสิทธิภาพการเติบโต เพิ่มประสิทธิภาพการเติบโต เพิ่มประสิทธิภาพการเติบโต เพิ่มประสิทธิภาพการเติบโต เพิ่มประสิทธิภาพการเติบโต เพิ่มประสิทธิภาพการเติบโต เพิ่มประสิทธิภาพการเติบโต เพิ่มประสิทธิภาพการเติบโต เพิ่มประสิทธิภาพการเติบโต เพิ่มประสิทธิภาพการเติบโต เพิ่มประสิทธิภาพการเติบโต เพิ่มประสิทธิภาพการเติบโต ปรับให้เหมาะสม §Y--- หุบปาก หุบปาก หุบปาก! ---§!\n\n§Rผิดพลาด:อินเทอร์เฟซแบบโต้ตอบประสบการณ์ผู้ใช้หยุดตอบสนอง§!"
 ancrel.2057.a:0 "เอ่อ..."
