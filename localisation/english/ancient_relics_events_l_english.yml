  ancrel.8013.a:0 "ปิดปืนเหล่านั้น"

  ancrel.8020.intro:0 "นักโบราณคดีของเรา [Root.Owner.GetArchaeologistPlural] พบหุ่นบดเคลื่อนที่ ซึ่งถูกตั้งค่าเพื่อซุ่มโจมตีนักสำรวจที่ประมาท บน [From.Planet.GetName]"
  ancrel.8020.critical:0 "หุ่นยนต์โบราณกึ่งมีสติปัญญา บด §H[dead_scientist.GetName]§! ให้เป็นชิ้นเล็กชิ้นน้อยก่อนที่การทำลายจะถูกหยุด"
  ancrel.8020.failure:0 "§H[Root.GetLeaderName]§! สามารถหลบหนีหุ่นร้ายได้ แต่ [Root.Owner.GetArchaeologistPlural] คนอื่นไม่โชคดีเช่นนั้น"
  ancrel.8020.success:0 "ด้วยความสามารถและโชคเล็กน้อย §H[Root.GetLeaderName]§! สามารถหยุดหุ่นยนต์คลั่งได้ก่อนที่ใครจะบาดเจ็บ"
  ancrel.8020.pay:0 "ทุกคนสามารถหนีหุ่นยนต์คลั่งได้ แต่หุ่นยังคงลาดตระเวนเส้นทางเดียว หากไม่ปิดใช้งาน นักโบราณคดีของเราจะต้องหาทางอื่น"
  ancrel.8020.name:0 "หุ่นบดคลั่ง"
  ancrel.8020.desc:0 "$ancrel.8020.intro$\n\n$ancrel.8020.critical$"
  ancrel.8021.desc:0 "$ancrel.8020.intro$\n\n$ancrel.8020.failure$"
  ancrel.8022.desc:0 "$ancrel.8020.intro$\n\n$ancrel.8020.success$"
  ancrel.8023.desc:0 "$ancrel.8020.intro$\n\n$ancrel.8020.pay$"
  ancrel.8023.a:0 "ปิดหุ่นยนต์นั้น"

  ancrel.8030.intro:0 "การขุดค้นโดย [Root.Owner.GetArchaeologistPlural] บน [From.Planet.GetName] ทำให้หุ่นยามโบราณหลายตัวถูกเปิดใช้งาน"
  ancrel.8030.critical:0 "หุ่นศัตรูสังหาร §H[dead_scientist.GetName]§! ก่อนที่จะถูกทำลายอย่างถาวรด้วยการยิงอาวุธ"
  ancrel.8030.failure:0 "หุ่นศัตรูสังหาร [Root.Owner.GetArchaeologistPlural] หลายคน ก่อนที่ §H[Root.GetLeaderName]§! จะสามารถหยุดได้"
  ancrel.8030.success:0 "โชคดีที่ §H[Root.GetLeaderName]§! และทีมรักษาความปลอดภัยใกล้เคียงสามารถจัดการหุ่นศัตรูก่อนที่จะเกิดอันตรายร้ายแรง"
  ancrel.8030.pay:0 "หุ่นศัตรูถูกควบคุมไว้ชั่วคราว แต่ไม่มีทางผ่าน หากไม่ถูกกำจัด จะต้องหาทางอ้อม"
  ancrel.8030.name:0 "หุ่นยาม"
