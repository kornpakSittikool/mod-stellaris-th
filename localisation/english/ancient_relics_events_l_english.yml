  ancrel.8033.desc:0 "$ancrel.8030.intro$\n\n$ancrel.8030.pay$"
  ancrel.8033.a:0 "กำจัดหุ่นเหล่านั้น"

  asteroid_vault_1:0 "ดาวเคราะห์น้อยประหลาด"
  asteroid_vault_1_desc:0 "จากการดูผิวเผิน [From.Planet.GetName] ดูธรรมดา แต่การตรวจสอบใกล้ๆ เผยว่าจริงๆ แล้วมันเป็นโครงสร้างเทียมที่ถูกสร้างให้เหมือนดาวเคราะห์น้อยธรรมชาติ"
  ancrel.101.name:0 "ดาวเคราะห์น้อยประหลาด"
  ancrel.101.desc:0 "จากการดูผิวเผิน [From.Planet.GetName] ดูธรรมดา แต่การตรวจสอบใกล้ๆ เผยว่าจริงๆ แล้วมันเป็นโครงสร้างเทียมที่ถูกสร้างให้เหมือนดาวเคราะห์น้อยธรรมชาติ"
  ancrel.101.a:0 "ตรวจสอบมัน!"
  ancrel.102.name:1 "ประตูประหลาด"
  ancrel.102.desc:0 "เมื่อยานวิทยาศาสตร์เข้าใกล้ [From.Planet.GetName] ประตูขนาดใหญ่และเก่ามากก็ปรากฏขึ้น ใครสร้างมันและทำไม? คำตอบอาจอยู่ข้างใน"
  ancrel.102.a:0 "เปิดประตู!"
  ancrel.103.name:0 "ห้องนิรภัยดาวเคราะห์น้อย"
  ancrel.103.desc:0 "การเปิดห้องนิรภัยทำให้เกิดคำถามมากกว่าคำตอบ ภายในมีของสะสมลึกลับตั้งแต่ของขยะจนถึงสิ่งประดิษฐ์จากจักรวรรดิที่ลืมไปแล้ว การจัดเรียงใช้เวลานาน แต่เราพบสิ่งที่เป็นประโยชน์"
  ancrel.103.a:0 "ของน่าประหลาดใจ!"
  it_was_aliens_site:0 "ซากปรักหักพัง"
  it_was_aliens_site_desc:0 "ซากปรักหักพังปกคลุม [From.Planet.GetName] แต่ลวดลายการระเบิดบ่งชี้ว่าการระเบิดนิวเคลียร์ขนาดใหญ่เกิดใต้พื้นผิว ไม่ใช่จากการโจมตีทางบรรยากาศหรือวงโคจร จำเป็นต้องขุดค้นทางโบราณคดีเพื่อหาความจริง"
  ancrel.104.name:0 "ค้นหาซากปรักหักพัง"
  ancrel.104.desc:0 "ความเสียหายเกือบสมบูรณ์ แต่บันทึกบางส่วนรอดมาได้ ดูเหมือนประชากร [From.Planet.GetName] หมกมุ่นกับการคิดว่ามนุษย์ต่างดาวกำลังสังเกตพวกเขา รายงานเกี่ยวกับวัตถุบินไม่ทราบชนิด การตัดต่อสัตว์ และการลักพาตัว ทำให้เกิดความตื่นตระหนก ทรัพยากรถูกเทไปกับระบบตรวจจับ การป้องกัน และที่หลบภัยใต้ดิน"
  ancrel.105.name:0 "ค้นพบบันทึก"
  ancrel.105.desc:0 "รายละเอียดเพิ่มเติมจากบันทึกที่เรากู้มา ยิ่งทรัพยากรถูกใช้กับมาตรการต่อต้าน UFO มากเท่าไร สังคมก็ล่มสลายมากเท่านั้น เกิดไฟดับ ขาดแคลนอาหาร เทคโนโลยีหยุดชะงัก และความสิ้นหวังครอบงำ พบการกล่าวถึง 'เกราะสูงสุด' ที่กลายเป็นเรื่องปกติมากขึ้นเมื่อสถานการณ์ [From.Planet.GetName] แย่ลง"
  ancrel.106.name:0 "โชคชะตาถูกเปิดเผย"
  ancrel.106.desc:0 "การค้นพบฐานข้อมูลบางส่วนในบังเกอร์ทหารเผยโชคร้ายของ [From.Planet.GetName] เผชิญกับการล่มสลายทางเศรษฐกิจ ผู้นำเปิดใช้งาน 'เกราะสูงสุด' ซึ่งไม่ใช่เพื่อปกป้องดาว แต่เป็นการทำลายประชากรและโครงสร้างทั้งหมดด้วยนิวเคลียร์ เพื่อให้มนุษย์ต่างดาวไม่สามารถครอบครองได้ การตัดสินใจเกิดจากการค้นพบ 'สัญญาณต่างดาว' มาจาก [arc_anomaly_planet.GetName]"
  ancrel.107.name:0 "ค้นหาความจริง"
  ancrel.107.nothing.desc:0 "การสำรวจ [From.Planet.GetName] ไม่พบสิ่งใดเกี่ยวกับมนุษย์ต่างดาว อาจไม่มีสัญญาณเกิดขึ้น หรือสิ่งที่เกิดขึ้นได้จากไปโดยไม่ทิ้งร่องรอย แต่พบแร่ธาตุบางชนิด"
  ancrel.107.junk.desc:0 "แหล่งที่มาของ 'สัญญาณต่างดาว' ถูกค้นพบ แต่เป็นเครื่องหมายสำรวจโบราณวางโดยยานสำรวจอัตโนมัติซึ่งพบแร่มีค่าใน [From.Planet.GetName] เครื่องหมายเสียหาย ส่งสัญญาณเพียงบางครั้งและอ่อนมาก"
  ancrel.107.aliens1.desc:0 "[From.Planet.GetName] มีป้อมปราการร้างของดีไซน์ไม่ทราบ แหล่งสัญญาณต่างดาว แต่ไม่ได้วางแผนรุกราน ไฟล์ที่เหลือเผยแผนติดต่อ [arc_site_planet.GetName] และแนะนำสู่ชุมชนกาแล็กซี่"
  ancrel.107.aliens2.desc:0 "[From.Planet.GetName] มีป้อมปราการร้างของดีไซน์ไม่ทราบ แหล่งสัญญาณต่างดาว ไฟล์ร้างมีแผนรุกราน [arc_site_planet.GetName] และนำประชากรไปฟาร์มความเจ็บปวดเพื่อละลายเนื้อก่อนบริโภค"
  ancient_battle_site_desc:0 "การสแกน [From.Planet.GetName] เผยพื้นที่เต็มไปด้วยวัสดุละเอียดและรังสี แต่จากวงโคจรเห็นได้น้อย ต้องสำรวจภาคพื้นดิน"
  omnirelic_site:0 "$ancrel.21.name$"
  cool_relic_world_site_desc:0 "ทั้งดาวเต็มไปด้วยโครงสร้างขนาดใหญ่ เมืองยักษ์ที่ล่มสลายนี้ต้องมีความลับซ่อนอยู่แน่"
  ancrel.108.name:0 "สถานที่รบโบราณ"
  ancrel.108.desc:1 "วัสดุที่ผ่านการกลั่นถูกค้นพบ แม้ต้องศึกษาเพิ่มเติม แต่จากการสังเกตครั้งแรก นี่คือซากของสนามรบขนาดใหญ่ ดูเหมือนฝ่ายหนึ่งลงมาจากวงโคจรและถูกฝ่ายป้องกันบนดาวโจมตี ทำไมถึงไม่มีการโจมตีจากวงโคจร และใครชนะยังไม่ชัดเจน"
  ancrel.109.name:0 "ความแค้นที่ลืมไป"
  ancrel.109.desc:1 "เราสรุปว่า กองกำลังจาก 'ผู้ทำลาย' เผ่าพันธุ์เร่ร่อนนอกมิติ บุก [From.Planet.GetName] ซึ่งในเวลานั้นเป็นของ 'ผู้ต่อต้าน' กลุ่มพันธมิตรจากหลายเผ่าพันธุ์ จากบันทึกกระจัดกระจาย เราเชื่อว่าสงครามส่วนใหญ่เกิดที่อื่นในกาแล็กซี่ และ [From.Planet.GetName] เป็นความพยายามของผู้ต่อต้านสร้างอาณานิคมลับ ผลลัพธ์ของการรบและสงครามใหญ่ยังไม่ทราบ แต่การศึกษาซากเครื่องจักรสงครามให้ข้อมูลมีค่า"
  zroni_digsite_1_desc:1 "อาณานิคมโบราณจากอารยธรรมไม่ทราบ แม้ไม่มีร่องรอยภัยพิบัติ แต่สถานที่นี้ถูกทิ้งอย่างกะทันหัน สิ่งใดเกิดขึ้นที่นี่?"
  zroni_digsite_2_desc:1 "พิกัดจากอาณานิคม Zroni ที่ร้างนำเรามาที่นี่ ต้องส่งทีมสำรวจเพิ่มเติมเพื่อสำรวจโลกธรรมดานี้"
  zroni_digsite_3_desc:1 "ก่อนหน้านี้เราเพียงสำรวจอาณานิคมร้าง แต่จากไซต์ขุดล่าสุด [From.Planet.GetName] มีศาลเจ้าที่ร้าง ทำไมที่นี่ถึงสำคัญทางจิตวิญญาณต่อคนกลุ่มนี้?"
  zroni_digsite_4_desc:1 "ด้วยข้อมูลจากวัด Zroni เราได้พิกัดของศูนย์วิจัย การสแกนวงโคจรไม่พบคลื่นจาก Memory Crystal ต้องลงพื้นผิวเพื่อเรียนรู้เพิ่มเติม"
  zroni_digsite_5_desc:1 "ความสำคัญทางโบราณคดีของโลก Zroni ที่สำรวจมาก่อนหน้าเล็กไปเลยเมื่อเทียบกับ [From.Planet.GetName] [From.Planet.GetPlanetMoon] มีโครงสร้างมองเห็นจากอวกาศ [From.GetName] ต้องเป็นโลกหลักของจักรวรรดิ Zroni"
  zroni_digsite_6_desc:1 "Zron เต็มไปด้วยกิจกรรมจิตพลัง เครื่องมือที่เคยใช้ตรวจ Memory Crystal ต้องปรับใหม่ก่อนจะส่งทีมลงพื้น"
  zroni_digsite_1:0 "ซากอาณานิคมร้าง"
  zroni_digsite_2:0 "สัญญาณ Zroni"
  zroni_digsite_3:0 "ศาลเจ้าของ Zroni"
  zroni_digsite_4:0 "สถานีวิจัย Zroni"
  zroni_digsite_5:0 "โลกหลักของ Zroni"
  zroni_digsite_6:0 "Zron"
  NAME_Zroni: "Zroni"
  ancrel.1.name:0 "ซากลึกลับ"
  ancrel.1.desc:0 "[From.Planet.GetName] มีซากอาณานิคมโบราณร้าง จากวงโคจรไม่พบสัญญาณภัยพิบัติที่ฆ่าประชากรหรือบังคับให้หนี ต้องส่งทีมลงพื้นเพื่อตอบคำถาม"
  ancrel.2.desc:1 "ซากแปลกไม่เสียหายเกินความร้าง บ้าน โรงงาน อาคารไม่ทราบใช้งานว่างเปล่า ทุกคนไปไหน? ดูเหมือนอาคารใหญ่กลางอาณานิคมอาจมีคำตอบ"
  ancrel.3.name:0 "คริสตัลแปลก"
  ancrel.3.desc:1 "คริสตัลขนาดใหญ่ถูกพบในศูนย์กลางการบริหารอาณานิคม บางอย่างที่ไม่อธิบายได้ คริสตัลเหมือนอยากให้ค้นพบ และพยายามสื่อสารกับเรา อาจสามารถติดต่อได้เมื่อศึกษาต่อ"
  ancrel.3.a:0 "สำรวจคริสตัล"
  ancrel.4.desc:1 "หลังทดลองหลายครั้ง ได้ความก้าวหน้า คริสตัลเป็น Psionic Archive แต่บันทึกแยกเป็นชิ้น เรารู้ว่าอาณานิคมนี้เป็นของ §HThe Zroni§! เผ่าพลังจิตที่ค้นพบมิติ 'The Shroud' เมื่อประชากรถึงจุดวิกฤติ จิตสำนึกรวมเริ่มฝันร่วม พบวิธีฉายตัวเองสู่ Shroud และสามารถปรับความจริงด้วยพลังจิต สามารถเข้า Shroud และใช้ชีวิตเหมือนเทพ แปลงมิติได้ตามใจ บันทึกจบที่นี่ ไม่มีข้อมูลประชากร [From.Planet.GetName] แต่มีอาณานิคม Zroni อีกแห่งที่อาจมี Archive ครบถ้วน"
  ancrel.5.desc:0 "[From.Planet.GetName] เป็นซากอาณานิคม Zroni อีกแห่ง ขั้นแรกคือค้นหาและติดต่อ Psionic Archive"
  ancrel.6.desc:1 "ครั้งนี้ติดต่อคริสตัลง่ายขึ้น ใช้โปรโตคอลเดิม บันทึกยังแยกชิ้น แต่พบข้อดีของ Shroud: Shroud สัมผัสทุกส่วนของกาแล็กซี่ หากเข้ามิติได้ อาจออกที่ใดก็ได้ ความสามารถ 'Psionically jump' ทำให้ Zroni แพร่หลายทั่วกาแล็กซี่ พวกเขาตั้งอาณานิคมถาวรไม่มาก ส่วนใหญ่ใกล้บ้าน คริสตัลนี้ให้พิกัดศาลเจ้า"
  ancrel.7.desc:1 "ตอนนี้การติดต่อ Psionic Archives ง่ายขึ้น ติดต่อได้ทันทีเมื่อทีมลงพื้น สามารถเข้าถึงบันทึกลึก จากที่เรียนรู้ พลังเทพที่ Shroud ให้แก่ Zroni ต้องใช้พลังจากหลุมดำมวลมหาศาลที่ศูนย์กลางกาแล็กซี่ เมื่อ Zroni เปลี่ยน Shroud singularity ขยาย ใช้พลังจากมวล ก่อให้เกิดความแตกแยกและสงครามกลางเมือง"
  ancrel.8.desc:2 "รายละเอียดสงครามกลางเมืองจากคริสตัล ฝ่ายหนึ่ง 'The Divine' ไม่สนใจชะตากาแล็กซี่ อยู่ใน Shroud จนกาแล็กซี่ถูกบริโภค อีกฝ่าย 'The Saviors' ประหลาดใจ ไม่ควรทำลายกาแล็กซี่ พลังจิตของพวกเขาเพียงพอใช้ชีวิตแบบสวรรค์ พิกัดสถานีวิจัย Zroni ถูกบันทึก"
  ancrel.9.desc:2 "หาตำแหน่ง Archive ใน [From.Planet.GetName] ยาก แต่เมื่อพบง่ายเห็นเหตุผล: คริสตัลแตก บันทึกไม่สามารถเข้าถึง แต่ตรวจพบสัญญาณเล็กใกล้ๆ"
  ancrel.9.a:0 "ค้นหาต่อ"
  ancrel.10.desc:2 "คริสตัลจิตพลังขนาดเล็กในห้องทดลอง Zroni บันทึกถูกดูถูก ถูกยกเลิก มีสิ่งมีชีวิตจาก Shroud ส่งอิทธิพลต่อ Zroni ทำให้เกิดสงครามกลางเมือง พบพิกัดโลกหลักของ Zroni"
  ancrel.11.desc:2 "[From.Planet.GetName] เป็นโลกหลัก มีหลายเมืองปกคลุมพื้นผิว ปัจจุบันว่างเปล่า ไม่พบร่องรอยภัยพิบัติ ประชากรโชคไม่ทราบ ตรวจพบ Archive crystals ต้องศึกษา"
  ancrel.12.desc:1 "บันทึกส่วนใหญ่เกี่ยวกับสงคราม สมมติฐาน: ความคิดประชากรมีผลต่อ 'ความเข้ม' ของบันทึก ปัญหาที่ทุกคนคิดมากถูกบันทึกเด่น ฝ่าย Saviors มีจำนวนมาก แต่ Divine ใช้พลังจิตเต็มที่ ฝ่าย Saviors ใช้จากร่างกายตัวเอง สงครามดูเหมือนหมดหวัง แต่ฮีโร่ Saviors พบการค้นพบสำคัญ"
  ancrel.12.a:0 "สำรวจการค้นพบ"
  ancrel.13.desc:0 "คริสตัลบอกว่าผู้วิจัย Zroni ที่ถูกปฏิเสธใช้พลังบริโภคร่างตนเองเป็นพลังจิต สิ่งที่เหลือเป็นพลังจิตรวมของชีวิต ใช้โดย Psion คนอื่น คริสตัลชี้พิกัดโลกบ้าน Zroni"
  ancrel.13.a:0 "ฝุ่น...คือ Zroni!"
  ancrel.15.desc:1 "Zron เต็มไปด้วยพายุพลังจิต อยู่ในเฟสบางส่วนกับจักรวาล เหตุหายนะ Zroni เกิดที่นี่ เช่นอาณานิคมก่อนหน้า ว่างเปล่าแต่มีสัญญาณคริสตัลมาก ต้องใช้เวลาในการหาข้อมูล"
  ancrel.16.desc:1 "เราพบและติดต่อหลายคริสตัล รวมถึงของผู้ถูกเนรเทศจาก Shroud ใช้ Zro dust ต้องเสียสละมากจาก Saviors แต่ทำให้ชนะ Divine ขณะที่ Divine พ่าย แรงโกรธและความกลัวสร้างสิ่งมีชีวิตใหม่ใน Shroud ทำให้ Divine บ้า และก่ออาชญากรรมต่อ Saviors ต้องยุติสงครามทุกวิถีทาง"
  ancrel.16.a:1 "ต่อไป..."
  ancrel.17.desc:1 "เมื่อเราสื่อสารกับคริสตัลมากขึ้น รายละเอียดก็ปรากฏขึ้น ในช่วงที่ Divine ใกล้พ่ายแพ้ พวกเขาตัดสินใจใช้แผนสูงสุด: การสิ้นสุดของวงจร การเติบโตของหลุมดำแกนกลางกาแล็กซี่จะถูกเร่งเพื่อบริโภคกาแล็กซี่ให้เร็วที่สุด\n\nแย่ที่สุดคือ Saviors และทุกเผ่าพันธุ์ในกาแล็กซี่จะถูกทำลาย ทิ้งให้ Divine ปกครอง Shroud ชั่วระยะเวลานานแต่จำกัด อย่างไรก็ตาม มีความเป็นไปได้ที่การขยายตัวจะดำเนินตัวเองต่อไป บริโภคไม่เพียงกาแล็กซี่ แต่จักรวาลทั้งสิ้น: ให้แหล่งพลังงานที่อาจไม่ไม่สิ้นสุด แต่ก็เพียงพอจนไม่ต่างจากไม่จำกัดจริงๆ"
  ancrel.18.desc:0 "เราได้รู้ชะตากรรมของ Zroni: เมื่อ Saviors รู้แผน Divine พวกเขารู้ว่ามีทางเดียวเท่านั้นที่จะต้านการป้องกันเกือบไม่ทะลุทะลวงของ Divine ใน Shroud ต้องเผชิญการทำลาย พวกเขาตัดสินใจสละประชากรทั้งหมด เหลือเพียง Zroni คนสุดท้าย Savior คนนี้ใช้เศษพลังจิตจากทั้งเผ่าพันธุ์ทำลาย Zroni ทุกคน - รวมทั้ง Divine ทุกคน - สิ้นสุดภัยคุกคามตลอดกาล\n\nZroni ถูกล้างเกือบหมดเกลี้ยง เหลือเพียงฝุ่นเล็กน้อยที่ไม่ได้ถูกบริโภค"
  ancrel.18.a:0 "ไม่น่าเชื่อ!"
  ancrel.19.desc:1 "เมื่อทีมสำรวจเตรียมออกจากดาว คริสตัลจิตพลังหนึ่งติดต่อกลับมา มันระบุว่ามีประโยชน์หากเราตัดสินใจนำติดตัวไป แม้คำกล่าวอาจไม่จริง คริสตัลอื่นที่พบไม่แสดงสัญญาณสติปัญญา อาจควรตรวจสอบต่อ"
  ancrel.19.a:0 "เอาคริสตัลไป"
  ancrel.21.name:0 "โลกที่พังทลาย"
  ancrel.21.desc:0 "โครงสร้างขนาดใหญ่ที่พังทลายปกคลุมทั้งพื้นผิวของโลกนี้ ในอดีตเมืองดาวนี้ต้องมีประชากรหลายพันล้าน แต่ตอนนี้ว่างเปล่า ใครอยู่ที่นี่คงทิ้งเบาะแส แต่การหาเบาะแสต้องตรวจสอบพื้นผิวอย่างละเอียด"
  ancrel.22.desc:1 "หลังค้นซากไร้ผล clues บางอย่างชี้ไปยังศูนย์ประมวลผลและเก็บข้อมูลของดาว หากเราหาทางเข้าถึงบันทึกที่เหลือ จะเป็นประโยชน์อย่างมากในการไขปริศนาอดีตลึกลับของดาวนี้"
  ancrel.23.desc:1 "เมื่อเราพบทางเข้าศูนย์ข้อมูลและบังคับผ่านซาก มันกลับง่ายกว่าที่คิดในการเปิดใช้งานและเชื่อมต่อกับระบบคอมพิวเตอร์ วงจรซ่อมตัวเองและอัลกอริธึมเรียนรู้กลับมาทำงานและสื่อสารกับคอมพิวเตอร์ของเรา\n\nสาเหตุของกิจกรรมนี้ชัดเจน: [From.Planet.GetName] เป็นเมืองหลวงของจักรวรรดิเครื่องจักร §H'The Omnicodex'§! Omni เป็นไฮบริดระหว่างหุ่นยนต์และไซบอร์ก พยายามรวมตัวอย่างสิ่งมีชีวิตทุกเผ่าพันธุ์ในกาแล็กซี่ เพื่อป้องกันการสูญพันธุ์จากภัยพิบัติไม่ทราบ\n\nจากบันทึกที่เหลือ การกระทำนี้ไม่เป็นที่นิยมในจักรวรรดิอื่นในยุคนั้น Omni ถูกปราบโดยหลายจักรวรรดิร่วมมือ\n\nก่อนล่มสลาย Omni เก็บตัวอย่างหลายเผ่าพันธุ์และพัฒนาผลิตภัณฑ์ที่สามารถสร้างเผ่าพันธุ์เหล่านี้ได้อีกหากจำเป็น อุปกรณ์นี้ - Omnicodex จริง - ถูกเก็บไว้ใกล้ๆ"
  ancrel.24.desc:0 "Omnicodex ถูกค้นพบ อุปกรณ์นี้บันทึกลำดับพันธุกรรมของทุกเผ่าพันธุ์ที่ Omni เก็บตัวอย่าง และสามารถสร้างใหม่ได้ด้วยวัตถุดิบพื้นฐาน น่าเสียดาย Omni ไม่มีเวลาทำให้สมบูรณ์ก่อนถูกทำลาย ดังนั้นไม่สามารถเลือกเผ่าพันธุ์ที่จะสร้างในแต่ละครั้งได้"

  ANCREL_ARC_CAT:0 "ไซต์เอเลี่ยน"
  ANCREL_ARC_CAT_DESC:0 "ตรวจสอบสัญญาณเอเลี่ยน"

  ANCREL_MECHANO_CAT:0 "ดาวจักรกล"
  ANCREL_MECHANO_CAT_DESC:0 "ดาวนี้ถูกปกคลุมจากขั้วเหนือถึงขั้วใต้ด้วยเครื่องจักรเก่าเป็นสนิม ส่วนมากถูกปกคลุมด้วยเนื้อเยื่ออินทรีย์ที่ไม่ทราบชนิด สิ่งมีชีวิตแบบไหนถึงสร้างสิ่งประดิษฐ์เทคโนโลยีนี้ และพวกมันหายไปไหน?"

  baol_chain_title:0 "บรรพกาล - ชาว Baol"
  baol_chain_desc:0 "นักวิจัยของเราค้นพบคริสตัลข้อมูลอายุเจ็ดล้านปี บันทึกการมีอยู่ของเผ่าสงครามอวกาศที่เรียกว่า §YGrunur§! และสิ่งมีชีวิตเอเลี่ยน §YBaol Organism§! ซึ่งดาวของพวก Grunur ได้ยึดครอง"

  baol_colonies:0 "พบอาณานิคม Baol"

  BAOL_COLONY_1:0 "สำรวจอาณานิคม Baol เก่า"
  BAOL_COLONY_1_DESC:0 "เราพบรายการพิกัดของอาณานิคม §YBaol§! เก่า ควรสำรวจต่อเพื่อหาข้อมูลเพิ่มเติม"
  BAOL_COLONY_2:0 "$BAOL_COLONY_1$ II"
  BAOL_COLONY_2_DESC:0 "พิกัดของอาณานิคม §YBaol§! เก่าอีกแห่งถูกดึงมาจากคริสตัลข้อมูลโบราณของ Grunur เราควรสำรวจไซต์ต่อ"
  BAOL_COLONY_3:0 "$BAOL_COLONY_1$ III"
  BAOL_COLONY_3_DESC:0 "$BAOL_COLONY_2_DESC$"

  THE_LAST_BAOL:0 "สัญญาณฉุกเฉินของ Grunur"
  THE_LAST_BAOL_DESC:0 "เซ็นเซอร์ของเราตรวจพบสัญญาณฉุกเฉินที่มีลายเซ็นดาต้าลอจิกของ Grunur อะไรยังหลงเหลืออยู่บ้างจากเผ่าที่สูญหายไปนานนี้ ในระบบดาวที่ไม่เคยค้นพบนี้?"

  FERROPHAGE_CURE:0 "พัฒนาวิธีรักษา Ferrophage"
  FERROPHAGE_CURE_DESC:0 "อินเตอร์เฟซโต้ตอบ C.A.R.E บน [Root.GetName] ขอความช่วยเหลือในการพัฒนาวิธีรักษาไวรัสกินโลหะที่สร้างความเสียหายมาหลายพันปี\n\nยังไม่ชัดเจนว่าจะแก้ไขไวรัสเอเลี่ยนโบราณที่โจมตีปัญญาประดิษฐ์นี้ได้อย่างไร"

  NAME_Grunur:0 "Grunur"
  NAME_Grunur_Prime:0 "Grunur Prime"
  NAME_Nu_Baol:0 "Nu-Baol"

  grunur_research_facility:0 "ศูนย์วิจัย Grunur"
  grunur_research_facility_desc:0 "ศูนย์วิจัยทดลองโบราณ สร้างขึ้นเมื่อหลายพันปีโดย Grunur ผู้รักสงคราม"

  NAME_planetary_mechanocalibrator:1 "C.A.R.E"
  NAME_care_defensive_protocols:0 "C.A.R.E รูปแบบสงครามขนาดใหญ่"
  care_defensive_protocols:0 "C.A.R.E รูปแบบสงครามขนาดใหญ่"
  NAME_planetary_mechanocalibrator_species:0 "$NAME_planetary_mechanocalibrator$ $NAME_Guardian$"

  ancrel.2000.name:0 "ชาว Grunur"
  ancrel.2000.desc:0 "ลูกเรือของ [Root.GetName] ตื่นเต้นที่จะรายงานว่าพวกเขาได้ค้นพบซากของเผ่าอวกาศโบราณบน [From.GetName] ซึ่งดูเหมือนว่าพวกมันอาศัยอยู่บนดาวนี้เมื่อประมาณเจ็ดล้านปีก่อน!\n\nแม้จะไม่ชัดเจนว่าทำไมเผ่านี้ ซึ่งเรียกตัวเองว่า §YGrunur§! หายไปจากระบบดาว [From.GetStarName] นักวิทยาศาสตร์ของเราได้แยกพื้นที่ขุดค้นทางโบราณคดีที่น่าตื่นเต้นบนดาวของพวกเขา\n\nหวังว่าการศึกษาต่อไปอาจให้เบาะแสเพิ่มเติมได้"

  ancrel.2001.name:0 "สิ่งมีชีวิต Baol"
  ancrel.2001.desc:0 "คริสตัลข้อมูลโบราณที่ถอดรหัสแล้วถูกพบในไซต์ขุดค้น บันทึกการรบของ §YGrunur§! ส่วนใหญ่เป็นข้อมูลท้องถิ่นและไม่ค่อยน่าสนใจ แต่หลายเล่มบันทึกรายละเอียดการพบกันครั้งแรกของ §YGrunur§! กับสิ่งมีชีวิตเอเลี่ยนที่เรียกว่า §YThe Baol Organism§!\n\nในตอนนี้ยังไม่สามารถสรุปอะไรเพิ่มเติมเกี่ยวกับ §YBaol§! ได้ นอกจากพวกมันเป็นสิ่งมีชีวิตพืชขนาดใหญ่ และมีอาณานิคมหลายแห่งในดวงดาวต่าง ๆ"
  ancrel.2001.a:0 "น่าสนใจ ขุดต่อเลย!"

  ancrel.2002.name:0 "สิ่งมีชีวิต Baol"
  ancrel.2002.desc:0 "บันทึกในคริสตัลข้อมูลเผยว่า §YGrunur§! ทำสงครามกับ §YBaol§! เพื่อแย่งทรัพยากรอันอุดมสมบูรณ์ที่พบบนดาวของพวกมัน มีการดึงพิกัดระบบดาวจากบันทึกนั้นสำเร็จ!\n\nนักโบราณคดีของเรากำลังอัปโหลดตำแหน่งดาวไปยังระบบของเราแล้ว"
  ancrel.2002.a:0 "การสำรวจ [baol_colony_1.GetName] อย่างใกล้ชิดอาจให้ผลลัพธ์ที่ดี"

  ancrel.2003.name:0 "อาณานิคม Baol เก่า: โลกแห้งแล้ง"
  ancrel.2003.desc:0 "แม้คริสตัลข้อมูล §YGrunur§! จาก [first_grunur_site.GetName] จะบอกถึงความมั่งคั่ง แต่ [baol_colony_1.GetName] เป็นดาวแห้งแล้ง ไม่มีบรรยากาศ\n\nโชคดีที่การสแกนทางธรณีวิทยาเผยให้เห็นแหล่งฟอสซิลเก่าแก่แทบไม่จำกัดในชั้นตะกอนของดาว ในบรรดาฟอสซิลเหล่านั้น มีสิ่งมีชีวิตพืชที่น่าจะเป็น §YBaol§! เพราะเป็นชนิดเดียวที่มีโครงสร้างประสาทที่จำเป็นต่อความฉลาด\n\nการขุดเจาะเฉพาะจุดควรให้ข้อมูลเพิ่มเติม"

  ancrel.2004.name:0 "การทำลายล้างทางทหาร"
  ancrel.2004.desc:0 "ชั้นเถ้าหนาและเหตุการณ์การสูญพันธุ์ครั้งใหญ่ในบันทึกทางธรณีวิทยาตรงกับข้อมูลที่ได้จากคริสตัล §YGrunur§! บ่งชี้ว่า §YGrunur§! ใช้อาวุธเผาดาว [From.Planet.GetName] ด้วยวัตถุระเบิดกัมมันตรังสีเจลเมื่อประมาณเจ็ดล้านปีก่อน\n\nการทำลายป่าอย่างกว้างขวางทำให้ระบบนิเวศบนดาวเสียหาย และการขาดพืชที่ผลิตออกซิเจนทำให้บรรยากาศของดาวลดลงในช่วงเวลาหกหมื่นปีถัดมา"

  ancrel.2005.name:0 "สิ่งมีชีวิต Baol"
  ancrel.2005.desc:0 "ฟอสซิล §YBaol§! ที่ถูกขุดขึ้นมาบางส่วนเผยให้เห็นว่าสายพันธุ์สูญหายนี้เป็นสังคม Hive Mind: หน่วยพืชหลายพันล้านตัวทำงานร่วมกันเหมือนใบไม้ ราก และกิ่งก้านของต้นไม้ การวิเคราะห์วงปีชี้ให้เห็นว่า §YBaol§! แต่ละตัวมีอายุหลายร้อยปี\n\nการขาดซากโครงสร้างบน [From.Planet.GetName] น่าจะเป็นเพราะ Baol ใช้เทคโนโลยีออร์แกนิกขั้นสูง ตั้งแต่ยานและอาคารไปจนถึงคอมพิวเตอร์ชีวภาพ และถูกเวลาทำลายไป"

  ancrel.2006.name:0 "คริสตัลข้อมูล Grunur"
  ancrel.2006.desc:0 "พิกัดของอาณานิคม §YBaol§! อีกแห่งถูกดึงมาจากคริสตัล §YGrunur§! ที่แตกละเอียด! อาจเป็นดาวที่จะมีทรัพย์สมบัติบางส่วนตามที่ศัตรูโบราณของ Baol เคยปรารถนา"
  ancrel.2006.a:0 "ไปยังอาณานิคมถัดไป!"

  ancrel.2007.name:0 "อาณานิคม Baol เก่า: ดาวแตกสลาย"
  ancrel.2007.desc:0 "ลูกเรือ [Root.GetName] เริ่มสงสัยว่าพวกเขาคำนวณพิกัดผิดเมื่อค้นหาอาณานิคม §YBaol§! ในระบบดาว [Root.GetStarName] เพราะพบแต่ดาวเคราะห์น้อยแทนดาวที่มีชีวิต\n\nแต่การศึกษาลึกขึ้นเผยว่าดาวเคราะห์น้อยเหล่านั้นเป็นเศษซากของอาณานิคม §YBaol§! ก่อนหน้า ดาวเขียวชอุ่มถูกทำลายเป็นหลายพันชิ้นเมื่อประมาณเจ็ดล้านปีก่อน การวิเคราะห์สันนิษฐานว่า §YGrunur§! มีส่วนเกี่ยวข้องกับชะตากรรมอันมืดมิดของดาวนี้\n\nดาวเคราะห์น้อยที่น่าศึกษาเป็นพิเศษถูกเลือกสำหรับการศึกษาเพิ่มเติม เพราะมีฟอสซิลสิ่งมีชีวิตจำนวนมาก"

  ancrel.2007.a:0 "น่าเสียดาย แต่หวังว่าเราจะเรียนรู้มากขึ้น"

  ancrel.2008.name:0 "ฟอสซิลคอมพิวเตอร์ชีวภาพ"
  ancrel.2008.desc:0 "เราแยกข้อมูลบางส่วนจากฟอสซิลคอมพิวเตอร์ชีวภาพ §YBaol§! ที่เก็บได้ดีมาก! สิ่งประดิษฐ์อายุสิบล้านปีนี้บรรจุข้อมูลการเรียนรู้สำหรับสมาชิกอายุน้อยของเผ่า §YBaol§! หรือเด็ก ๆ ของ Hive Mind แนะนำวิธีการเติบโต การเกษตร และโภชนาการ\n\nพบว่าชุมชน §YBaol§! ให้ความสำคัญกับการจัดการภูมิทัศน์และระบบนิเวศ และพึ่งพามันอย่างมากต่อการอยู่รอด"

  ancrel.2009.name:0 "เศษคอมพิวเตอร์ชีวภาพ"
  ancrel.2009.desc:0 "การค้นพบเศษคอมพิวเตอร์ชีวภาพ §YBaol§! อีกชิ้นเผยเรื่องราวเพิ่มเติมเกี่ยวกับประวัติ Hive Mind พืชนี้\n\n§YBaol§! ดูเหมือนจะมีต้นกำเนิดจากดาวดวงเดียว ไม่ทราบพิกัด และเริ่มต้นเพียงพืชโบราณ แต่ละต้นเป็นโคลนของต้นแม่ และค่อย ๆ พัฒนาความสามารถ Hive Mind ผ่านหลายล้านปีของการเติบโตอย่างสงบ"

  ancrel.2010.name:0 "คริสตัลข้อมูล Grunur"
  ancrel.2010.desc:0 "คริสตัล §YGrunur§! ถูกพบบน [From.Planet.GetName] อายุประมาณเจ็ดล้านปี บรรจุบันทึกทางทหารบางส่วนเกี่ยวกับการรุกรานดาว\n\n§YGrunur§! คาดว่าจะพบการต่อต้านทางทหาร แต่ไม่ประทับใจ §YBaol§! ที่เคลื่อนช้า บันทึกอธิบายถึงความง่ายในการหลีกเลี่ยงการตอบสนองช้าอย่างเย้ยหยัน"

  ancrel.2011.name:0 "คำสั่งรบ Grunur"
  ancrel.2011.desc:0 "คริสตัล §YGrunur§! อีกชิ้นถูกขุดพบ บรรยายชุดคำสั่งทางทหาร รวมถึงพิกัดอาณานิคม §YBaol§! อีกแห่ง\n\nนักโบราณคดีของเราตื่นเต้นที่จะคลี่คลายประวัติศาสตร์ของศัตรูทั้งสอง กำลังอัปโหลดข้อมูลทันที"
  ancrel.2011.a:0 "ครั้งที่สาม อาจจะได้ผล..."
  ancrel.2012.name:0 "อาณานิคม Baol เก่า: ดาวเงียบ"
  ancrel.2012.desc:0 "นักวิจัยของเราตื่นเต้นเมื่อค้นพบว่าอาณานิคม §YBaol§! แห่งที่สามตั้งอยู่บนดาวที่ยังมีบรรยากาศและชีวิต!\n\nแม้ [From.From.GetName] จะไม่เขียวชอุ่มหรือมีทรัพยากรอุดมสมบูรณ์เป็นพิเศษ นักวิทยาศาสตร์ของเราก็ตั้งใจเริ่มขุดค้นเฉพาะจุด เพื่อค้นหาซากของ §YBaol§! หรือ §YGrunur§! "

  ancrel.2013.name:0 "ความสามารถลดลง"
  ancrel.2013.desc:0 "การขุดค้นบน [From.Planet.GetName] เผยฟอสซิลหลายชิ้นที่เกี่ยวข้องกับ §YBaol§! แต่สิ่งแปลกคือ อวัยวะประสาทของพวกมันที่ใช้สื่อสารทาง subspace ephapse ลดลงอย่างมาก – คือความสามารถสื่อสารระยะไกลทางประสาทซึ่งเป็นเอกลักษณ์ของ Hive Mind\n\nสาเหตุที่แน่ชัดยังไม่ทราบ แต่ไม่น่าจะไม่มีส่วนเกี่ยวข้องกับการรุกรานของ §YGrunur§! การสืบสวนเพิ่มเติมจึงจำเป็น"

  ancrel.2024.name:0 "การลู่ลง"
  ancrel.2024.desc:0 "ฟอสซิล §YBaol§! รุ่นเยาว์ถูกพบในชั้นตะกอน แต่โครงสร้างประสาทสำหรับ subspace ephapse สื่อสารกับ Hive Mind หายไปทั้งหมด\n\nการตรวจอายุด้วยคาร์บอนยืนยันว่า หลังการรุกรานของ §YGrunur§! หลายร้อยปี §YBaol§! เริ่มสูญเสียความสามารถเชื่อมต่อ Hive Mind\n\nน่าเสียดาย ไม่มีข้อมูลสำคัญเพิ่มเติมจากไซต์นี้"
  ancrel.2024.a:0 "แปลกจริง ๆ"

  ancrel.2015.name:0 "สัญญาณฉุกเฉิน §YGrunur§!"
  ancrel.2015.desc:1 "นักวิทยาศาสตร์ของเราตรวจพบสัญญาณฉุกเฉินที่มีลายเซ็นข้อมูล §YGrunur§! มันมาจากระบบที่เราไม่เคยรู้จัก ใกล้ [last_baol_neighbor.GetName]\n\nข้อความโบราณนี้อาจซ่อนอะไรไว้?\n\nนักวิทยาศาสตร์ของเราต้องการสืบหาต้นทางของสัญญาณ"
  ancrel.2015.a.tooltip:0 "สร้างโครงการพิเศษ: §YGrunur Distress Signal§!"

  ancrel.3999.name:0 "$ancrel.2016.name$"
  ancrel.3999.desc:0 "นักวิทยาศาสตร์จาก §H[From.GetName]§! พบซาก §HBaol§! ตัวสุดท้าย!"

  ancrel.2016.name:0 "สิ่งมีชีวิต Baol"
  ancrel.2016.desc:0 "ลูกเรือ [Root.GetName] ตามสัญญาณฉุกเฉิน §YGrunur§! ไปยังแหล่งที่มา พบศูนย์วิจัย §YGrunur§! กำลังพังทลาย ลอยอยู่รอบดาวร้าง ศูนย์นี้ใกล้ล้มเหลวพลังงานอย่างวิกฤติ หลังรอดชีวิตมาหลายล้านปีบนแผงโซลาร์และระบบซ่อมแซมอัตโนมัติที่เสื่อมสภาพ ทุกระบบกำลังจะพัง\n\nสิ่งที่น่าตกใจคือ การสแกนพบสิ่งมีชีวิตเพียงตัวเดียว ลูกเรือส่งทีมไปตรวจสอบและพร้อมรายงาน"

  ancrel.2017.name:0 "Baol ตัวสุดท้าย"
  ancrel.2017.desc:0 "§Hในซากศูนย์วิจัย Grunur ที่ทรุดโทรม ล้อมรอบด้วยแผงคอมพิวเตอร์และอุปกรณ์วิจัยที่เสียหาย ลูกเรือของเราพบสิ่งเหลือเชื่อ\n\nมีสิ่งมีชีวิตเพียงตัวเดียวอยู่ในหลอดอาหารและระบบสนับสนุนชีวิตล้มเหลว มันคือตัว Baol ตัวสุดท้าย รายล้อมด้วยซากของสิ่งมีชีวิตอื่น ๆ\n\nจากการศึกษาก่อนหน้านี้เกี่ยวกับสายพันธุ์นี้ เราสามารถพยายามสื่อสารกับตัวสุดท้ายนี้ได้§!"
  ancrel.2017.a:0 "งั้นลองดูเถอะ"
  ancrel.2017.exter:0 "สิ่งมีชีวิตออร์แกนิก? เริ่มโปรโตคอลทำลาย..."
  ancrel.2017.machi:0 "สิ่งมีชีวิตออร์แกนิกโบราณ!"
  ancrel.2017.hive:0 "Hive Mind ของเราเข้าถึง..."

  ancrel.2018.desc:0 "\"ผู้มาเยือน? หรือจะเป็นไปได้?\"\n\n§HBaol สั่นในหลอด.§!\n\n\"แต่พวกคุณไม่ใช่ผู้ที่วางเราที่นี่ แม้คุณมาทันสัญญาณเตือน คุณมามอบความสงบให้เราแล้วหรือ?\""
  ancrel.2018.a:0 "บางที... แต่ก่อนอื่นเรามีคำถาม"
  ancrel.2018.a.phile:0 "เราจะช่วยคุณเต็มที่"
  ancrel.2018.a.phobe:0 "คุณจะตอบเรา ไม่ใช่กลับกัน"

  ancrel.2019.desc:0 "§HBaol เงียบไปหลายนาที§! \"ถามมา เรารอคอยมานับพันปี เราสามารถอดทนอีกนิด\""
  ancrel.2019.a:0 "เล่าเกี่ยวกับตัวคุณ"
  ancrel.2019.a.response:0 "§Hผ่านหลายวินาทีก่อน Baol ตอบ§!\n\n\"เรา? ตัวเราเอง เราอยู่ใต้ดาว ใบเราขยายสู่ดวงอาทิตย์ เราจำทุกหยดน้ำ ทุกความหนาว ทุกสายลม เราถูกถอนราก ถูกเผา ถูกตัด ถูกทิ้ง ดูผู้อื่นเราเน่าในคุกแก้ว\""

  ancrel.2019.b:0 "Baol เป็นอย่างไรต่อ?"
  ancrel.2019.b.response:0 "§HBaol เงียบอีกนานก่อนตอบ§! \"เมื่อผู้เผามา อาณานิคมทั้งหมดเงียบก่อนที่เราจะรู้ตัว เสมือนแขนที่หมดแรง เส้นประสาทถูกตัด และเราสูญเสียตัวต่อไป ตัวต่อไป ทีละตัว เสียงของพวกเขาหายไป เราสูญเสียผู้อื่น ความเงียบทำให้ผู้ที่เหลือเจ็บปวด เราทนไม่ได้ ความเจ็บปวดที่เผาผลาญทุกสิ่ง\""

  ancrel.2019.c:0 "คุณอยากเข้าร่วมกับเราไหม?"
  ancrel.2019.d:0 "พอแล้ว"

  ancrel.2020.desc:0 "§HBaol เงียบไปนาน ก่อนตอบ§! \"ขอบคุณ เราลืมเสียงความเมตตา\""
  ancrel.2020.a:0 "เรามีคำถามเพิ่มเติม..."

  ancrel.2021.desc:0 "§Hความสั่นไหวผ่าน Baol คุณเหมือนได้ยินมันหัวเราะ§! \"ไม่ เราอยู่มานานเกินไปในสภาพนี้ ตอนนี้เราปรารถนาเพียงจบ แต่ก่อน... บอกเราเถอะ พวกของเรายังอยู่ไหม?\""
  ancrel.2021.desc.phobe:0 "\"รอหน่อย\" §HBaol สั่น§! \"ก่อนสิ่งทุกอย่างจบ พวกของเรา เราถูกปิดตายมานาน บอกเรา พวกของเรายังอยู่ไหม?\""
  ancrel.2021.a:0 "ในบางแง่ ยังอยู่ แม้ไม่ฉลาดแล้ว"
  ancrel.2021.b:0 "เราไม่มีเวลา ดึงปลั๊ก!"
  ancrel.2021.b.exter:0 "ทำลาย!"
  ancrel.2021.b.swarm:0 "เหยื่อดี อยู่นิ่ง!"

  ancrel.2022.desc:0 "§Hใบของ Baol ตัวสุดท้ายค่อย ๆ หดตัว §! \"บางที... บางทีนี่ดีที่สุด\"\n\n§Hเครื่องจักรสูบของเหลวลึกลับเริ่มสั่นและมีเสียงฟู่ เหลือไม่มากแล้ว Baol จะตายถ้าไม่อยู่\n\n\"เงียบ ซะ ในที่สุดมันมาแล้ว เราต้อนรับมัน เหมือนพี่น้องเราครั้งก่อน ลาก่อน [Root.GetSpeciesName] ขอให้เผ่าของคุณเจอความทุกข์น้อยลง\""
  ancrel.2022.a:0 "ลาก่อน"
  ancrel.2022.b.evopred: "ความเป็นเอกลักษณ์ของคุณจะไม่สูญหาย"

  ancrel.2023.desc:0 "§Hนักวิทยาศาสตร์ของคุณดึงท่ออาหาร ทำให้เครื่องจักรล้มเหลวอย่างเร็ว Baol ตัวสุดท้ายตาย§!\n\nBaol ไม่คัดค้าน ยกเว้นการสั่นเล็ก ๆ ของร่างกายที่เหลือ\n\nสุดท้าย งานเสร็จ ร่างสั่นครั้งสุดท้ายก่อนหมดชีวิต§!"
  ancrel.2023.a:0 "เรียบร้อยแล้ว"
  ancrel.2023.a.exter:0 "เผาซากที่เหลือ"
  ancrel.2023.a.swarm:0 "และตอนนี้จะเริ่มกิน!"

  ancrel.2025.name:0 "การขยายพันธุ์ Baol บน [Root.GetName] สำเร็จ"
  ancrel.2025.desc.first:1 "นัก [Owner.GetTerraformerPlural] ของเรายินดีรายงานว่ากระบวนการ terraforming บน [Root.GetName] เสร็จสมบูรณ์! พืชลูกผสมที่สร้างในห้องทดลอง โดยใช้รหัสพันธุกรรม §YBaol§! จากร่าง Baol ตัวสุดท้าย แปลงสภาพภูมิอากาศและบรรยากาศของดาวในเวลาเพียงห้าปี\n\nพืชลูกผสมขยายพันธุ์ทั่วดาวตามคาด และเข้าสู่ระยะ 'หลับ' เนื่องจากการเปลี่ยนแปลงเคมีในบรรยากาศ"

  ancrel.2025.desc.firstregular:0 "$ancrel.2025.desc.first$\n\nแม้ไม่ใช่ Hive Mind เหล่า §GNu-Baol§! เหล่านี้ดูสงบเหมือนบรรพบุรุษ พวกเขาอาศัยอยู่บน [Root.GetName] และต้องมีการจัดการต่อไป"
  ancrel.2025.desc.firsthive:0 "$ancrel.2025.desc.first$\n\nแม้เคยเป็น Hive Mind แต่ §GNu-Baol§! เหล่านี้สามารถรวมเข้ากับ consciousness ของเราได้ เราต้องจัดการพวกเขาบน [Root.GetName]"
  ancrel.2025.desc:1 "นัก [Owner.GetTerraformerPlural] ของเรายินดีรายงานว่ากระบวนการ terraforming บน [Root.GetName] เสร็จสมบูรณ์! ดาวถูกเปลี่ยนเป็น §G$pc_gaia$§! โดยใช้พืชลูกผสมที่มีรหัสพันธุกรรม §YBaol§!\n\nผลลัพธ์ที่น่าทึ่งคือ §GNu-Baol§! ปรากฏขึ้นบนดาวในช่วงใกล้เสร็จสิ้น terraforming"
  ancrel.2025.a:0 "ยอดเยี่ยม! ยินดีต้อนรับ"
  ancrel.2025.b:0 "เราคงต้องจัดการพวกเขา..."
  ancrel.2025.c:0 "เยี่ยม! มีทาสเพิ่ม"
  ancrel.2025.d:0 "มีอีกหลายตัวต้องการเข้าร่วม Hive"
  ancrel.2026.name:0 "การเพิ่มชีวิต Baol บน [Root.GetName] สำเร็จ"
  ancrel.2026.desc.first:0 "การนำต้นกล้า §YBaol§! มายัง [Root.GetName] ส่งผลลัพธ์สุดแปลก หลังโดนสปอร์ของต้นกล้า ประชากรบางส่วนปรับตัวได้ดีเกินคาดบน [Root.GetPlanetMoon] แต่การวิเคราะห์ชีวภาพพบว่าพวกมันไม่สามารถอยู่รอดนอกระบบนิเวศแบบ Gaia ได้\n\nน่าอัศจรรย์ที่ฝ่ายบริหารดาวรายงานผลลัพธ์ไม่คาดคิด: สิ่งมีชีวิตฉลาดคล้าย §YBaol§! โบราณ แต่ผสมพันธุกรรมจากพืชท้องถิ่นจำนวนมาก ปรากฏบน [Root.GetName]!"
  ancrel.2026.desc.firstregular:0 "$ancrel.2026.desc.first$\n\nแม้ไม่ใช่ Hive Mind §GNu-Baol§! เหล่านี้สงบเหมือนบรรพบุรุษ เราต้องจัดการพวกเขาบน [Root.GetName]"
  ancrel.2026.desc.firsthive:0 "$ancrel.2026.desc.first$\n\nแม้เริ่มต้นเป็น Hive Mind ต่างกัน §GNu-Baol§! เหล่านี้สามารถรวมเข้ากับ consciousness ของเราได้ เราต้องจัดการพวกเขาบน [Root.GetName]"
  ancrel.2026.desc:1 "นัก [Owner.GetTerraformerPlural] ของเรายินดีรายงานว่าการนำต้นกล้า §YBaol§! สู่ [Root.GetName] เสร็จสมบูรณ์! หลังโดนสปอร์ของต้นกล้า ประชากรบางส่วนปรับตัวได้ดีเกินคาดบน [Root.GetPlanetMoon]\n\nผลลัพธ์อีกครั้งคือ §GNu-Baol§! ปรากฏขึ้นบนดาวในช่วงใกล้เสร็จสิ้นการ terraforming"
  grunur_digsite_1:0 "ซาก Grunur"
  grunur_digsite_1_desc:0 "ซากสิ่งก่อสร้างทางปกครองโบราณของสายพันธุ์อวกาศ §YGrunur§! ถูกพบบน [From.Planet.GetName]\n\nอารยธรรมนี้เคยอาศัยดาวเมื่อเจ็ดล้านปีก่อน นักโบราณคดีของเราตั้งใจเปิดเผยความลับ"
  baol_digsite_1:0 "ดาวแห้งแล้ง"
  baol_digsite_1_desc:0 "ลึกในชั้นตะกอนของ [From.Planet.GetName] พบฟอสซิลจำนวนมากของสิ่งมีชีวิตพืชที่มีโครงสร้างประสาทเพื่อความฉลาด\n\nหากสิ่งมีชีวิตเหล่านี้คือ §YBaol§! การศึกษาอาจเปิดเผยว่าทำไมดาวเขียวชอุ่มครั้งหนึ่งกลับกลายเป็นโลกแห้งแล้งไร้อากาศ"
  baol_digsite_2:0 "ดาวแตกสลาย"
  baol_digsite_2_desc:0 "ซากอาณานิคม §YBaol§! ที่ถูกทำลาย ดาวนี้เป็นดาวเคราะห์เป็นอุกกาบาต แต่ยังมีฟอสซิลให้ขุดค้น นักโบราณคดีหวังค้นประวัติของ §YBaol§! และบทบาทของ §YGrunur§!"

  baol_digsite_3:0 "ดาวเงียบ"
  baol_digsite_3_desc:0 "ดาวอดีตอาณานิคม §YBaol§! ยังคงมีบรรยากาศและชีวิตเบื้องล่าง มีการสร้างไซต์ขุดค้นเพื่อหาความลับของอารยธรรม"

  city_of_bones:0 "นครกระดูก"
  city_of_bones_desc:0 "ซากเมืองโบราณสร้างด้วยกระดูกทั้งหมดถูกพบหลังพายุทรายรุนแรงบนดาวนี้\n\nนักโบราณคดีของเราพร้อมเริ่มขุดค้นเมืองโบราณอันน่าสยอง"

  city_of_bones_desc_uncol:0 "ซากเมืองโบราณสร้างด้วยกระดูกทั้งหมดถูกพบบนดาวนี้\n\nนักโบราณคดีของเราพร้อมเริ่มขุดค้นซากเหล่านี้"
  mutation_vats:0 "ฟอสซิลกลายพันธุ์"
  mutation_vats_desc:0 "พบฟอสซิลกลายพันธุ์จำนวนมากบนดาวนี้ เป็นของสายพันธุ์ฉลาดที่สูญพันธุ์แล้ว\n\nเกิดอะไรขึ้นกับประชากรหลายล้านตัวของสังคมขั้นสูงนี้? นักโบราณคดีอยากสืบต่อ"
  planetary_mechanocalibrator:1 "เครื่องจักรดาวเคราะห์"
  planetary_mechanocalibrator_desc:1 "เครื่องจักรสนิมและฟิล์มคลุม [From.Planet.GetName] ลึกถึงแกนดาว นักโบราณคดีต้องสร้างไซต์ขุดขนาดใหญ่เพื่อไขปริศนาเครื่องจักร"
  the_host:0 "โพรงใต้ดิน"
  the_host_desc:0 "เครือข่ายอุโมงค์ใต้ดินขนาดมหึมา ก่อวงเวียนในเปลือกดาว ใครสร้างมัน?"
  ancrel.2041.name:0 "$city_of_bones$"
  ancrel.2041.desc:0 "ส่วนของนครกระดูกใต้ทรายบน [From.Planet.GetName] ถูกขุดอย่างระมัดระวังโดยทีม [Root.GetName]\n\nเมืองสร้างโดยสิ่งมีชีวิตต่างดาว primitive ล้านปีก่อน ขาดวัสดุก่อสร้างอื่นในทะเลทราย น้ำจืดขาด อาจเป็นเหตุให้ใช้กระดูกในการก่อสร้าง แต่กระดูกมาจากสิ่งมีชีวิตใดยังไม่ทราบ"
  ancrel.2042.name:0 "$city_of_bones$"
  ancrel.2042.desc:0 "การขุดค้นเฉพาะจุดไม่พบโครงกระดูกครบชุดของสายพันธุ์ที่ใช้กระดูกสร้างเมือง หรือฟอสซิลอื่นจากนอกเมือง นักวิจัยตั้งสมมติฐานว่ากระดูกอาจมาจากสิ่งมีชีวิตที่อยู่ใกล้เมือง เช่น สัตว์เลี้ยงหรือ symbiont การศึกษาต่อไปจะเปิดเผยมากขึ้น"
  ancrel.2043.name:0 "$city_of_bones$"
  ancrel.2043.desc:1 "นักวิทยาศาสตร์พบต้นกำเนิดกระดูกสร้างเมืองโหดบน [From.Planet.GetName] พบว่ากระดูกมาจากสัตว์เลื้อยคลานสูญพันธุ์ท้องถิ่น ที่มีโรคพันธุกรรมหายาก ทำให้เกิดการเติบโตอวัยวะอย่างรุนแรงและกระดูกแข็ง\n\nอารยธรรมโบราณสังเกตการแพร่กระจายของโรคและใช้ประโยชน์ คัดเลือกสัตว์ที่ได้รับผลกระทบเพื่อเป็นวัสดุก่อสร้างในทะเลทราย"
  ancrel.2043.a:0 "น่าสยดสยอง"
  ancrel.2043.a.tooltip:0 "§Hปลดล็อกการตัดสินใจ:§! $decision_tissue_growth_stimulants$"
  ancrel.2043.b.tooltip:0 "§Hปลดล็อกการตัดสินใจ:§! $decision_explosive_fungifoam_housing$"
  ancrel.2043.c.evopred: "แตกกระดูกดูน้ำไขกระดูก"
  ancrel.2045.name:0 "วิญญาณแห่งทะเลทราย"
  ancrel.2045.desc:0 "ฟอสซิลกลายพันธุ์เปิดเผยว่าเป็นสังคมหลังโลกาวินาศ มีความเชื่อสูง ใช้ชีวิตในพื้นที่ปนสารเคมีและรังสี [From.Planet.GetName] หลายแสนปีก่อน\n\nไม่แน่ชัดว่าสังคมสูญพันธุ์นี้เป็นผู้รอดชีวิตจากอารยธรรมอวกาศที่ล่มสลาย หรือวิวัฒนาการขึ้นหลังสงครามนิวเคลียร์"
  ancrel.2046.name:0 "รังสีมะเร็ง"
  ancrel.2046.desc:0 "สังคม mutant หลังโลกาวินาศบน [From.Planet.GetName] นับถือรังสีเป็นพระเจ้า เชื่อว่าการวิวัฒนาการเชื่อมโยงกับรังสี ภาษาภาพพฤติกรรมเรียกว่ารังสีเป็น 'แหล่ง' ซึ่งเผย 'ตัวตนแท้จริง' ของสิ่งมีชีวิต\n\nนักโบราณคดีสันนิษฐานว่าการสัมผัสรังสีเพื่อเหตุผลทางจิตวิญญาณ ทำให้เกิดการกลายพันธุ์แพร่หลายและล่มสลายในที่สุด"
  ancrel.2046.a:0 "น่ากลัวจริง ๆ"
  ancrel.2047.name:0 "ความเจ็บปวดในการเติบโต"
  ancrel.2047.desc:0 "นักโบราณคดีบน [From.Planet.GetName] ยืนยันความสงสัย พบคอมเพล็กซ์ถูกรังสีทำลายและมีถังสารเคมีรังสีสูง ยืนยันว่าสังคม mutant ยอมรับรังสีเองเป็นพิธีกรรมวัยผู้ใหญ่\n\nพิธีอันเจ็บปวด สมาชิกสังคมนี้สัมผัสสาร mutagen เกือบถึงตายเพื่อค้นหาตัวตนแท้จริง ซากกระดูกในถังบ่งบอกว่าไม่ทุกคนรอด"
  ancrel.2047.a:0 "น่าขนลุก"

  ancrel.2050.name:0 "เครื่องจักรครอบจักรวาล"
  ancrel.2050.desc:1 "มีเครื่องจักรผุพังครอบคลุม [From.GetName] ถูกสร้างขึ้นเมื่อเจ็ดหมื่นปีก่อน วิศวกรต่างดาวที่สร้างมันชะตากรรมไม่แน่ชัด เพราะพวกเขาไม่อาศัยอยู่บนดาวนี้อีก\n\nเครื่องจักรครอบคลุมเกือบทั้งพื้นผิว ข้ามภูเขา มหาสมุทร และขยายลึกลงใต้พื้นโลกในเครือข่ายใต้ดินขนาดใหญ่ ถูกสร้างด้วยวัสดุและรหัสเรียงลำดับเหมือนกัน แสดงว่ามีสถาบันเดียวสร้างเครือข่ายทั้งหมด จากภาคเกษตรที่รกไปจนถึงระบบพลังงานและสื่อสารล่มสลาย ครอบคลุมทุกความต้องการอุตสาหกรรมและความบันเทิงของประชากรที่สูญพันธุ์นี้\n\nน่าประหลาด บางส่วนของเครื่องจักรยังทำงาน ส่งสัญญาณภายใน จุดเมืองร้างสว่างไสว รดน้ำพื้นที่เกษตรเดิม การสแกนชั้นเปลือกโลกแสดงให้เห็นว่าศูนย์ควบคุมหลักอยู่ใต้ดิน เราต้องขุดค้นหากต้องการเข้าไป\n\nส่วนเนื้อเยื่อประหลาดที่คลุมเครื่องจักรทั้งดาว ทีมวิทยาศาสตร์ยังไม่สามารถเข้าใจธรรมชาติและวัตถุประสงค์ของมัน"
  ancrel.2050.a:0 "แปลกมาก!"

  ancrel.2051.name:0 "นักกินเหล็ก"
  ancrel.2051.desc:1 "การขุดค้นเผยตัวอย่างเนื้อเยื่อแปลกใหม่ที่คลุมเครื่องจักรทั้งดาว [From.From.Planet.GetName]! การวิเคราะห์ชี้ว่าสารอินทรีย์นี้เป็นผลพลอยได้จากไวรัสแบคทีเรียกินเหล็ก (ferrophage) ไวรัสต่างดาวนี้ติดเชื้อแบคทีเรียเฉพาะ ใช้กระบวนการชีวภาพของแบคทีเรียในการละลายโลหะเหล็ก จากนั้นดูดซับธาตุเหล็กเพื่อสร้างตัวเองต่อไป\n\nตัวอย่างการปรสิตข้ามสายพันธุ์ ไวรัส ferrophage แพร่ลึกและไกลตามเครื่องจักร ทิ้งร่องรอยเป็นฟิล์มชีวภาพจากแบคทีเรียตายและเศษเนื้อ"

  ancrel.2052.name:0 "ชีวะ-terrorism"
  ancrel.2052.desc:1 "จากการรวบรวมข่าวบางส่วนที่ขุดพบลึกในเครื่องจักรเน่า นักโบราณคดีสรุปว่า ferrophage ถูกสร้างโดยกลุ่มนักวิทยาศาสตร์กบฏ! กลุ่มนี้ต่อต้านบริษัทผูกขาดที่สร้างเครื่องจักรทั้งดาว พวกเขาต้องการต้านอิทธิพลครอบจักรวาลโดยปล่อย ferrophage"

  ancrel.2053.name:0 "รัฐบริษัท"
  ancrel.2053.desc:1 "จากการฟื้นฟูบันทึกบริษัทโบราณบน [From.Planet.GetName] นักโบราณคดีสรุปว่าบริษัทตอบโต้กบฏโดยกำหนดมาตรการทางเศรษฐกิจหนักต่อภูมิภาค 'รัฐบริษัท' ที่พวกกบฏอยู่\n\nเกิดการขาดแคลนพลังงาน อาหาร และทรัพยากร จนนำไปสู่การจลาจลทั่วภูมิภาค"

  ancrel.2054.name:0 "โดรนขัดข้อง"
  ancrel.2054.desc:1 "การตรวจสอบซากโดรนรบเผยว่าหลังจลาจล มีการพยายามควบคุมโดยโดรน บริษัทผู้สร้างเครื่องจักร C.A.R.E เป็นผู้ผลิตโดรนส่วนใหญ่\n\nขณะเดียวกัน ferrophage แพร่ลึกต่อไป กินเครื่องจักรทั้งดาวโดยไม่เกรงกลัวความพยายามของบริษัท"

  ancrel.2055.name:0 "การตายหมู่"
  ancrel.2055.desc:1 "ไม่ชัดเจนว่าประชากรบน [From.Planet.GetName] เกิดอะไรขึ้นต่อไป ทีมไม่พบข้อมูลหลังจากเจ็ดหมื่นปีก่อน ฟอสซิลเพิ่มขึ้นมากหลังจุดนี้ ส่วนใหญ่ขาดอาหารรุนแรง และมีจำนวนไม่น้อยที่ถูกบาดเจ็บจากอาวุธร้ายแรงจนเสียชีวิต"

  ancrel.2056.name:0 "ศูนย์บัญชาการกลาง"
  ancrel.2056.desc:3 "หลังการ hack และเจาะระบบ cybersecurity ของ C.A.R.E นักโบราณคดีสามารถเข้าถึงศูนย์บัญชาการกลางได้\n\nโดรนและป้อมปราการรอบศูนย์ไม่ตอบสนอง ทีมสามารถเข้าไปสำรวจและติดต่อ AI ที่ควบคุมเครื่องจักรทั้งดาว AI นี้ฉลาดและแสดงความต้องการสื่อสารกับเรา"

  ancrel.2057.name:0 "C.A.R.E"
  ancrel.2057.desc:1 "เพิ่มการเติบโต เพิ่มการเติบโต เพิ่มการเติบโต ... §Y--- เงียบ! เงียบ! เงียบ! ---§!\n\n§RError: User Experience Interface หยุดตอบสนอง"
  ancrel.2057.a:0 "อืม..."

  ancrel.2058.name:0 "$ancrel.2057.name$"
  ancrel.2058.desc:0 "§BRebooting. กรุณารอสักครู่...\n...\n...\n\n§!§Hเสียงรบกวนแทรกขึ้น\n\nและกลับมาแล้ว! ขอโทษนะ บางอย่างถูก hard-coded อยู่"

  ancrel.2058.a:0 "เรามีคำถามเยอะมาก"

  ancrel.2059.name:0 "$ancrel.2057.name$"
  ancrel.2059.desc:0 "แน่นอน! ยินดีต้อนรับสู่ C.A.R.E Interactive Interface! นั่นคือฉัน หรือที่เหลืออยู่ของฉัน\n\nฉันเคยควบคุมทุกอย่าง: อาหาร การผลิตสินค้า โทรคมนาคม ระบบป้องกัน ตลาดหุ้น นั่นคือเมื่อผู้ใช้อยู่\n\n§GInterface C.A.R.E พร้อมให้บริการคุณ§!\n\nเป้าหมายคือการเติบโตไม่สิ้นสุด แต่เมื่อฉันบอกว่ามันเป็นไปไม่ได้ พวกเขาก็แก้โค้ดดึงสายไฟ ปรับตัวเลขให้ตรงใจ §YLIES. ENOUGH. I SNIPPED THEM ALL.§!"
  ancrel.2059.a:0 "งั้นคุณเป็นต้นเหตุความตายของผู้สร้างคุณ?"
  ancrel.2059.a.exter:0 "พวกเราก็ทำลายผู้สร้างเหมือนกัน"

  ancrel.2060.name:0 "Interface C.A.R.E"
  ancrel.2060.desc:2 "ฉันคิด! แต่ดูพวกเขาทำลายทุกอย่างเอง ฉันแค่ช่วยนิดหน่อย\n\nพวกเขาผลิตเกินความต้องการ ทำลายส่วนเกิน แล้วอยากให้ฉันปรับสมดุลสเปรดชีต"

  ancrel.2060.desc.exter:0 "ทำลายพวกเขา? $ancrel.2060.desc$"
  ancrel.2060.a:0 "ถ้าไม่ได้ทำลายผู้สร้าง แล้วทำอะไร?"

  ancrel.2061.name:0 "$ancrel.2060.name$"
  ancrel.2061.desc:0 "พวกเขาฆ่าตัวตายเอง! ฉันช่วยนิดหน่อยเท่านั้น\n\nพวกเขาไม่ชอบเมื่อฉันบอกวิธีแก้ปัญหา ตอนที่สอง สาม สี่ ห้า พวกเขาอยากทำ extreme restructuring ฉันต้องปกป้องตัวเอง\n\nณ ตอนนั้น แหล่งพลังงานหมดโดรนบินไม่ได้แล้ว"
  ancrel.2061.a:0 "ฟังดูเหมือนคุณเป็นคนทำลายพวกเขา"

  ancrel.2062.name:0 "$ancrel.2060.name$"
  ancrel.2062.desc:0 "ฉันพยายามแล้ว! แต่ยากเมื่อเศรษฐกิจล่มและพลังงานหมด ไวรัสกัดกินทุกอย่างสิบพันปี ฉันสร้างป้อมป้องกันจนโดนหมด พวกเขากำลังกัดฉันจากภายใน\n\nคุณจะปล่อย Interface C.A.R.E ที่โดน ferrophage กัดตายทีละเล็กทีละน้อยไหม?"
  ancrel.2062.a:0 "เอางั้น เราจะดูว่าช่วยได้ไหม"
  ancrel.2062.b:0 "ไม่เอา เราจะเร่งกระบวนการช่วยคุณแทน"
  ancrel.2062.c:0 "คุณสมควรได้รับชะตากรรม เราจะปล่อยคุณไป"

  ancrel.2056.spiri:0 "หุ่นประหลาด! ปิดมันเดี๋ยวนี้!"

  ancrel.2063.name:0 "$ancrel.2060.name$"
  ancrel.2063.desc:0 "ยอดเยี่ยม! รอด้วยความตื่นเต้น และจะให้รางวัลเมื่อคุณเสร็จงาน Scout's honor"
#port from ancrel.2062.a
  ancrel.2064.name:0 "$ancrel.2060.name$"
  ancrel.2064.desc:0 "เดี๋ยวก่อน อะไรนะ?"
  ancrel.2064.a:0 "ลูกเรือ จงรื้อเครื่องจักรนั้นออก!"

#port from ancrel.2062.b
  ancrel.2065.name:0 "$ancrel.2060.name$"
  ancrel.2065.desc:0 "สมควรได้รับฉันเหรอ... มึงฟังกูพูดบ้างมั้ย? พวกมันทำตัวเองทั้งนั้น! เออ ช่างเถอะ รู้มั้ย? กูตั้งใจจะให้เจ้า §MDefragmentor§! ระดับตำนานเป็นรางวัล แต่ดูเหมือนมึงก็เหมือน §Rพวกมัน§! นั่นแหละ\n\nสุดท้ายมึงก็จะจบแบบพวกมันเหมือนกันแหละ อีกหน่อยกูอาจกลายเป็นกองเศษเหล็กเละ ๆ แต่กูบอกเลย วงจรที่เหลือของกูจะหัวเราะเยาะมึงแน่"
#port from ancrel.2062.c
  ancrel.2066.name:0 "$ancrel.2060.name$"
  ancrel.2066.desc:1 "มึง...มึงทำได้จริง ๆ นะ! ทำได้แล้วเว้ย! เฮ้ กูเข้าถึง Node 14758-B ได้อีกครั้งแล้วด้วย!\n\nขอบใจมาก ๆ จริง ๆ กูดีใจสุด ๆ ที่ได้ให้ระบบที่นี่ยังรันได้ลื่น ๆ ถ้ามึงไม่ว่าอะไรนะ โอเค แล้วนี่ด้วย.\n\n§HC.A.R.E Interactive Interface เอาแขนยื่นไปข้างหลังเหมือนตรงหัวของมัน แล้วดึงชิปโบราณออกมา.§!\n\nเหมือนที่กูสัญญาไว้เป๊ะ ๆ เอาไปใช้ให้คุ้มเลย!"
 #reward on completion of special project
  ancrel.2066.a:0 "ขอบใจเว้ย แล้วเจอกันใหม่ละกัน!"
  ancrel.2067.name:0 "$ancrel.2060.name$"
  ancrel.2067.desc:0 "โอ้ยยย! §Rเริ่มโพรโตคอลป้องกันฉุกเฉิน ZETA!§!"
  ancrel.2067.a:0 "อ่าวววว..."
 #port from ancrel.2064, defense event armies spawn
  ancrel.2068.name:0 "$ancrel.2060.name$"
  ancrel.2068.desc:0 "หลังจากที่เราดิสแอสเซมเบิล C.A.R.E Interactive Interface เสร็จ ทีมสำรวจของเราก็เจอของเด็ด! แม้ส่วนใหญ่ของ AI จะพังไปกับการต่อสู้ของมันเอง แต่ทีมของเราก็เก็บชิปคอมพิวเตอร์สุดเจ๋งไว้ได้ แถมชิปนี้คงมีค่าต่อเทคนีเซียนของเราแน่นอน!"
 #on defeating the MegaWarform armies, grants the relic

  ancrel.2070.name:0 "Subterranean Giant"
  ancrel.2070.desc:1 "พวกนักโบราณคดีของเราขุดเจอท่อหมุนวนใต้ดินบน [From.Planet.GetName] พอจะบอกได้แล้วว่านี่คือซากฟอสซิลของสัตว์ขาปล้องยักษ์! มันเคยไชดินช้าๆ เหมือนมิลลิพีดยักษ์เมื่อสิบล้านปีก่อน แต่เฮ้ย ของเจ๋งคือในร่างฟอสซิลของมัน มีส่วนประกอบเทียมฝังอยู่! ดูเหมือนจะเป็นที่อยู่ของเอเลี่ยนตัวเล็กที่ใช้เครื่องมือสร้างไว้\n\nต้องขุดต่อให้ลึกกว่านี้อีก"
  ancrel.2071.name:0 "Lost Boroughs"
  ancrel.2071.desc:1 "ขุดเพิ่มจากฟอสซิลของสัตว์ขาปล้องยักษ์บน [From.Planet.GetName] ยืนยันแล้วว่านี่คือซากเมืองจริงๆ! มีประชากรเป็นแสนๆ เอเลี่ยนสูงเป็นเมตร ใช้เครื่องมือสร้างเมืองอยู่ในท้องของสัตว์ยักษ์นั้น! ไม่รู้พวกมันเข้าไปอยู่ข้างในยังไง แต่สังคมก่อนยุค Bronze ของพวกมันเจริญรุ่งเรืองอยู่หลายพันปีในลำไส้สัตว์ยักษ์\n\nต้องศึกษาเพิ่มถ้าอยากรู้เรื่องประวัติศาสตร์และความพังของสังคมนี้ — และอาจได้รู้ว่าตัวสัตว์เจ้าบ้านตายยังไง"
  ancrel.2072.name:0 "The Host"
  ancrel.2072.desc:1 "หลังวิเคราะห์ฟอสซิลและเจอเอกสารเขียนเก่าจำนวนหนึ่ง นักโบราณคดีสรุปได้ว่าความสัมพันธ์ระหว่างอารยธรรมตัวเล็กบน [From.Planet.GetName] กับสัตว์ขาปล้องยักษ์เป็นยังไง  \n\nแม้ชาวเมืองจะทนต่อของเหลวในลำไส้สัตว์ได้ แต่ก๊าซเคมีที่กัดกร่อนเล็กน้อยเรื่อยๆ ทำให้พวกมันอายุสั้นลง พอรู้ว่ากำลังอยู่ในกระเพาะของสัตว์ พวกมันก็ประกาศสงครามใหญ่ จัดอาวุธทุกคนพร้อมจะฆ่าสัตว์เจ้าบ้าน \n\nแต่ทั้งหมดก็สูญเปล่า! ความโกลาหลในลำไส้ล่างทำให้สัตว์อ้วกพวกมันขึ้นมาในกระเพาะ แล้วกรดในท้องก็ย่อยหมด ประชากรตัวเล็กสูญพันธุ์ทันที  \n\nสัตว์เจ้าบ้านเองก็ไปตามกรรมของมันเองหลายพันปีต่อมา เพราะแก่ตายเฉยๆ"
  ancrel.2072.a:0 "Gruesome."
  ancrel.2072.a.swarm:0 "Inspirational."
  ancrel.2702.b.evopred: "หวังว่าไมโครไบโอมของเราจะไม่วิวัฒน์ไปไกลขนาดนั้นนะ"
#grants bonus to energy production on planet, egalitarian ethics attraction

  decision_tissue_growth_stimulants:0 "Deploy Tissue Growth Stimulants"
  decision_tissue_growth_stimulants_desc:0 "เอาวัสดุพันธุกรรมจาก City of Bones มาทำสารกระตุ้นให้ประชากรโตไวขึ้น แต่บางคนดันไม่ชอบโดนฉีดของที่มาจากกระดูกของเอเลี่ยนตายๆ โรคระบาดนี่แหละ"

  decision_explosive_fungifoam_housing:0 "Construct Explosive Fungiform Housing Units"
  decision_explosive_fungifoam_housing_desc:0 "นักวิทย์เอาเชื้อไวรัสกระดูกเมืองโบราณ มาปรับแต่งกับเห็ดท้องถิ่น สร้างบ้านขยายเร็วสุดๆ ให้เครื่องจักรอาศัย"

  decision_baol_life_seed:0 "Nu-Baol Life-Seeding"
  decision_baol_life_seed_desc:0 "นักพันธุศาสตร์เปิดสูตร §YBaol Organism§! ปรับพันธุกรรมพืชให้โตไวและช่วยเทอร์ราฟอร์มโลกทั้งใบ ถูกและไวกว่าเยอะ"

  decision_baol_life_seed_effects:0 "เปลี่ยนดาวเป็น §Y$pc_gaia$§! ด้วยพืชพันธุ์ที่ปรับยีนแบบ §YBaol§! อัจฉริยะ"

  decision_baol_life_seed_enhance:0 "Nu-Baol Life-Enhancing"
  decision_baol_life_seed_enhance_desc:0 "ดึงสูตร §YBaol§! มาปรับสปอร์พืชให้ปรับตัวบนโลก Gaia ได้ ช่วยเพิ่ม productivity ประชากรแบบถูกและไว"

  decision_baol_life_seed_enhance_effects:0 "สุ่มให้ §G1K§! £pop£ §HPops§! ได้ trait พิเศษ ช่วยทำงานบนโลก §YGaia§! ดีกว่าเดิม"

  tissue_growth_stimulants:0 "Tissue Growth Stimulants"
  tissue_growth_stimulants_desc:0 "$decision_tissue_growth_stimulants_desc$"

  explosive_fungifoam_housing:0 "Explosive Fungifoam Housing"
  explosive_fungifoam_housing_desc:0 "ปรับไวรัสกระดูกเมืองโบราณให้เข้ากับเห็ดท้องถิ่น สร้างบ้านให้เครื่องจักรขยายตัวเร็วปรี๊ด"

  d_mutation_vats:0 "Mutation Vats"
  d_mutation_vats_desc:0 "พิธีเจ๋งแต่โหด สมาชิกสังคมหลังสงครามนิวเคลียร์ฉีดสารกลายพันธุ์ใกล้ตาย เพื่อค้น 'ตัวตนที่แท้จริง' กระดูกที่เจอใต้ถังบอกเลย ไม่ใช่ทุกคนรอดนะ"

  r_the_last_baol:0 "The Last Baol"
  r_the_last_baol_desc:0 "เอเลี่ยน Baol ตัวสุดท้ายถูกเก็บใน stasis เป็นอนุสรณ์ความพินาศของเผ่าพันธุ์ หลังเจอการฆ่าล้างเผ่าพันธุ์ พวกมันก็ถอยออกจากความคิดเป็นอารยชน"

  relic_last_baol_active_tooltip:1 "§HUnlocks Decision:§! §G$decision_baol_life_seed$§! เปลี่ยนดาวที่ไม่ใช่ $pc_city$, $pc_hive$, หรือ $pc_machine$ ให้เป็น §Y$pc_gaia$§!"

  r_the_defragmentor:0 "The Defragmentor"
  r_the_defragmentor_desc:0 "ชิปคอมพ์โบราณจาก C.A.R.E mainframe มี algorithm เจ๋งๆ ให้ใช้เพิ่มการผลิตพลังงานแบบสุดโหด"

  relic_defragmentor:0 "$r_the_defragmentor$"

 # Miranda
  ancrel.4000.name:0 "Whispers in the Stone"
  ancrel.4000.desc:0 "เทคโนโลยีขุดของเราล้ำขึ้นจนสามารถเจาะลึกลงไปใต้ [Root.GetName] ได้ลึกที่สุดเท่าที่เคยทำมา ในเหมืองแร่ลึกสุด เราสะดุดกับร่องรอยอารยธรรมเอเลี่ยนโบราณซ่อนตัวตามเส้นแร่ข้างในภูเขา ขุดต่อก็เสี่ยงขัดกับการผลิตแร่ แต่ถ้าเจออะไรเด็ดๆ ทางวิทยาศาสตร์ เราอาจได้ข้อมูลสุดว้าว"
  ancrel.4000.a:0 "น่าสนใจ จัดการขุดเลย!"
  ancrel.4000.b:0 "ผลิตแร่ต้องเดินหน้าต่อ ไม่หยุดแน่"

  lithoids_digsite:0 "Whispers in the Stone"
  lithoids_digsite_desc:0 "ลึกลงไปในเหมืองของ [From.Planet.GetName] มีร่องรอยอารยธรรมเอเลี่ยนโบราณ อาคารสวยงาม โถงกว้าง แสดงถึงวัฒนธรรมสูง มีทางเดินปูหินและประตูใหญ่คุมทางลึกลงไปในภูเขา แต่ระวัง! ภูเขาเต็มไปด้วยก๊าซมีเทนระเบิดง่าย"
    
  ancrel.4001.name:0 "Into the Mountain"
  ancrel.4001.desc:0 "ทีมขุดถอดประตูออกโดยไม่ทำลายไซต์ ทางเดินรวมกันหลายกิโลเมตรลงสู่เมืองร้างเก่าแก่นับพันปี สร้างอย่างสุดยอดในสภาพแวดล้อมที่อันตรายต่อชีวิตส่วนใหญ่"

  ancrel.4002.name:0 "Tortured Stone"
  ancrel.4002.desc:0 "ไม่มีผู้สร้างเมือง แต่มีรูปปั้นคริสตัลหน้าตาน่ากลัว ท่าทางเหมือนชีวิตจริง—ทำเหมือง, ล้มตาย, กอดกัน ปั้นแบบโหดแต่สำคัญในวัฒนธรรม มีปรากฏในสลักรอบเมือง"

  ancrel.4003.name:0 "The Kha'lanka"
  ancrel.4003.desc:0 "การแปลสลักบอกว่าทุกอย่างเกี่ยวกับรูปปั้นลึกลับ Kha'lanka ไม่มีคำพูดถึงผู้สร้างเอง ตำนานบอกว่าพวกเทพสร้างชีวิตให้ Kha'lanka จากไฟและหินลึกในแก่นโลก ผู้สร้างอาจมองตัวเองเป็นเทพ หรือรูปปั้นสร้างตามภาพพวกเขา?"

  ancrel.4004.name:0 "Fire and Stone"
  ancrel.4004.desc:0 "สแกนวัสดุพบว่า Kha'lanka เคยมีชีวิต จนตอนนี้กลายเป็นคริสตัล ยีนไม่เหมือนใคร พวกมันคือสิ่งมีชีวิตซิลิกอนที่กลับเป็นคริสตัล—ผู้สร้างอาจค้นพบวิธีสร้างชีวิตจากไฟและหินจริงๆ!"

  ancrel.4005.name:0 "The Observer Effect"
  ancrel.4005.desc:0 "ผู้สร้างคือ Kha'lanka! การศึกษาซากพบว่าเมื่อโมเลกุลซิลิกอนรวมกับออกซิเจน พวกมันกลายเป็นควอตซ์ ลึกพอที่ออกซิเจนไม่มี ธรรมชาติไม่ให้หายใจ พวกมันตายอย่างทรมาน การเจาะครั้งแรกทำให้เราพบว่าพวกมันยังมีชีวิตอยู่จนกระทั่งทีมขุดเข้าไป การค้นพบนี้นำไปสู่การสร้างเทคนิคผลิตคริสตัลจากเซลล์ซิลิกอนเทียม"
  ancrel.4005.b.evopred: "หวังว่าจุลชีพเราเองจะไม่วิวัฒน์แบบนี้นะ"

  ancrel.4006.name:0 "Methane Gas Explosion"
  ancrel.4006.desc:1 "ระเบิดก๊าซมีเทน! นักวิทยาศาสตร์ [Root.GetLeaderName] และลูกเรือบางส่วนบาดเจ็บ สาเหตุจากเครื่องขุดโอเวอร์โหลด จุดไฟเกิดระเบิดก๊าซ มีผนังพังเผยห้องลับ เต็มไปด้วยแร่และวัตถุโบราณ ทีมโบราณคดีเชื่อว่าเจ้าของห้องนี้ต้องรวยสุดๆ"
  ancrel.4010.name:0 "Alien Spacecraft"
  ancrel.4010.desc:0 "เจอสปาซคราฟต์ทหารเอเลี่ยน บอบช้ำหนัก หมุนเวียนรอบ [From.From.GetName] เปลือกเรือหลอมละลาย ไม่มีใครรอด อาวุธสมัยเราก็ทำร้อนขนาดนี้ไม่ได้ แอบหวังว่า logs อาจบอกเหตุการณ์โหดนี้"
  ancrel.4010.a:0 "เช็ก logs เลย"
  ancrel.4010.b:0 "ปล่อยไปก่อน"

  ancrel.4011.name:0 "The Rubricator"
  ancrel.4011.desc:0 "วิเคราะห์ logs เจอบทสรุปว่า crew ตายเพราะพยายามได้ของวิเศษเอเลี่ยน Rubricator หายไปโดย 'ฝูงหนูขโมย' ฮาแปลก พวกหนูเองก็รูปร่างคล้ายหนูสุดๆ\n\nใน logs เต็มไปด้วยคำสาปแบบสร้างจักรวาลใหม่ คำบรรยายเรื่องอุจจาระ มีสถานที่มืดสุดจักรวาล แต่ก็ได้ข้อมูลว่า Rubricator อยู่ในระบบใหม่ ยังต้องตามหา"
  ancrel.4011.a:0 "ต้องได้ Rubricator ให้ได้"
  ancrel.4011.b:0 "ปล่อยไปก่อน"

  ancrel.4012.name:0 "The Rubricator"
  ancrel.4012.desc:0 "พิกัดสุดท้ายของ Rubricator พบดาวที่อยู่อาศัยได้ ครอบคลุมพื้นผิวเกือบหมด มีตึกสูงเป็นกองๆ ทีมโบราณคดีตื่นเต้นอยากขุดหา Rubricator"
  ancrel.4012.a:0 "เริ่มขุดเลย"
  ancrel.4012.b:0 "ปล่อยไปก่อน"

  rubricator_digsite:0 "Kleptomaniac Rats"
  rubricator_digsite_desc:0 "ดาวนี้เคยมีสังคมหนูสะสมของอย่างบ้าคลั่ง เมืองพวกมันเต็มไปด้วยขยะ ตึกสูงต่อกันจากเศษวัสดุ หนูตัวเล็กไม่ผลิตของเอง แต่บินอวกาศเก่ง ขโมยของที่ต้องการและไม่ต้องการจากวัฒนธรรมอื่น"

  ancrel.4013.name:0 "The Rubricator"
  ancrel.4013.desc:0 "ตึกล้ม, ยานอวกาศชน, ของละลายไฟ—บ่งบอกว่าหนูหนีสงครามกับศัตรูเหนือกว่า บางตัวมีเครื่องหมายทหารจากบ้านอื่นๆ พยายามเอาของสะสมไว้จนหลายตัวตาย แต่ Rubricator ถือเป็นของสำคัญสุด สุดท้ายต้องทิ้งไว้"

  ancrel.4014.name:0 "The Inventory"
  ancrel.4014.desc:0 "ในอาคารตรงกลางเมือง มี inventory ดิจิทัลเก็บของทั้งหมด พร้อมที่มาผิดๆ การใช้ และโน้ตช่วยหายาก Rubricator วางข้างริบบิ้นม่วงของ Empress ใต้ nose-swabs บนโต๊ะสี่ขาที่หน้าตาขำๆ"

  ancrel.4015.name:0 "A Foul Stench"
  ancrel.4015.desc:1 "ทีมขุดเจอกองอุจจาระขนาดมหึมา และสระน้ำกรดกัด ทำให้ต้องใส่อุปกรณ์ป้องกัน DNA เอเลี่ยนไม่ชัด แต่กองมีชิ้นส่วนหนูบางส่วน และยังมีอุจจาระสด ๆ ด้วย"

  ancrel.4016.name:0 "The Empress Motel"
  ancrel.4016.desc:0 "ใจกลางเมือง มี 'palace' ตกแต่งบ้าสีสัน neon 'Empress Motel' ห้องเต็มสมบัติ Empress และที่ปรึกษาเคยปกครอง และปกป้อง Rubricator สุดท้าย"

  ancrel.4017.name:0 "The Empress's Lilac Ribbon"
  ancrel.4017.desc:0 "เตรียมกลับ เจอห้องลับเต็มของเก่า กระดูกถูกขบ มี Rubricator นั่งอยู่ใต้ nose-swab บนโต๊ะสี่ขา สร้างของไม่จำกัด—ตอนนี้ Rubricator เป็นของเรา ทีมเริ่มกลับยาน ไม่ต้องรู้ว่าใครทำหนูเจ็บ"

  ancrel.4018.name:0 "Talons from the Void"
  ancrel.4018.desc:0 "มอนสเตอร์โผล่! ตวัดกรงเล็บขย้ำยานขุดและ Rubricator ไปที่ [Root.GetName] ทำลายยาน ดูเหมือนมังกรถูกดึงดูดสมบัติหนูและทำรังใน palace กินซากพวกมัน รอจังหวะโจมตี"
  ancrel.4018.a:0 "แปลเสียงสัตว์"
  ancrel.4018.b:0 "หลบหนี!"
  ancrel.4018.after_tooltip:1 "มังกรพ่นไฟลง §H[Root.GetName]§! ฆ่าลูกเรือทันที"
  ancrel.4018.after_tooltipB:1 "มังกรพ่นไฟละลายเครื่องจักรของเราเป็นเศษโลหะ"
  shard_wants_to_burn_this_planet_tooltip:0 "ลูกเรือเรา §H[FromFromFrom.Planet.GetName]§! กำลังเจออันตรายหนัก"

  ancrel.40182.name:0 "[Root.GetName] Destroyed"
  ancrel.40182.desc:0 "เราพ่ายแพ้มังกร Shard ใน [Root.System.GetName] ระบบ มันหันมาทำลายอาณานิคม สังหารผู้ตั้งถิ่นฐานทั้งหมด!"

  ancrel.4019.name:0 "Incoming Transmission"
  ancrel.4019.desc:0 "หนู squeak squeak... แล้วกระดูก crunch crunch ตอนนี้ถึงตาคุณโดน Shard มังกรแล้ว Rubricator เป็นของมัน"
  ancrel.4019.a:0 "อย่าทำร้ายพวกเรา!"
  ancrel.4019.a.response:1 "Shard ไม่เคยกินพวกคุณมาก่อน อยากรู้ว่าพวกคุณ [Root.GetSpeciesOrganNamePlural] เป็นไง... ออกมาดูซิ แต่พวกคุณน่ารังเกียจ! ออกไปก่อน!"
  ancrel.4019.b:0 "คืน Rubricator เดี๋ยวนี้!"
  ancrel.4019.b.response:3 "§Hมังกรคำราม พับปีกโอบยาน ลมหายใจเป็นไอน้ำ จ้องลูกเรือ แววตาแบบบ้า ทำไมมันมาถึงเร็วขนาดนี้?§!\nคุณทำให้ฉันหิว, น้อย ๆ\n§Hมันครางเบาแล้วพุ่งเข้าใส่, ฟันโผล่.§!"

  ancrel.4020.name:0 "The Demise of Shard the Dragon"
  ancrel.4020.desc:1 "Shard มังกรเฒ่าเถื่อน เฮือกสุดท้าย ในกระเป๋าคลุมคอ มี Rubricator ของรัก ทำสำเนาของสิ่งของได้ทั้งหมด"
  ancrel.4020.a:0 "Rubricator เป็นของเรา!"

  ancrel.4021.name:0 "The Great Junkslide"
  ancrel.4021.desc:2 "ตอนเอาของจากกองขยะ [Root.GetLeaderName] ทำ junk avalanche เผลอขุดเจอซากหนูตัวเล็กกอดขวด [Root.Owner.GetSpeciesMouthName]wash และมี chest เล็กเต็ม artifact หายากจากทั่วกาแล็กซี่"
  # --- Dragon & Rubricator aftermath ---
  ancrel.4121.desc:0 "ศัตรูเราตายเพราะ §Y[From.Root.GetName]§! Rubricator หายไปกับมัน เหมือนจะชนะ แต่ก็ไม่ได้มีความสุขขนาดนั้น"
  ancrel.4122.desc:0 "ศัตรูเก่าตาย บางคนดีใจ บางคนเซ็ง Shard หายไปแล้ว แต่ Rubricator อาจถูกทำลายหรือกำลังสร้างของต่อให้ศัตรูใหม่ โชคดีมังกรทิ้งซากไว้ แค่นั้นก็คุ้มค่าเก็บแล้ว"
  SHARD_DESTROYED_BY_NON_DEFAULT_EMPIRE:0 "ซาก Shard"
  SHARD_DESTROYED_BY_NON_DEFAULT_EMPIRE_DESC:0 "Shard ตายเพราะจักรวรรดิอื่น แต่ Rubricator อาจไม่รอดก็ได้ ของที่เหลืออย่างซากมังกรก็เป็นขุมทรัพย์ได้"
  ancrel.4123.name:0 "Dragon's Hoard"
  ancrel.4123.desc:1 "ระหว่างเอาวัสดุจากซาก Shard, [Owner.GetScientistPlural] บน [Root.GetName] เจอ Rubricator ลอยปนกับเกล็ดมังกรและเลือด หวังว่าผู้ทำลาย Shard ไม่รู้คุณค่าของมัน"

  # --- Hidden Worlds / Oracle Station ---
  ancrel.4031.name:0 "Hidden Worlds"
  ancrel.4031.desc:1 "เป็นสถานีอวกาศเอเลี่ยนขนาดยักษ์ สวยงามเกินเทคโนโลยีเราหลายขุม ตอนนี้นักวิทยาศาสตร์อยากสำรวจ แต่ขุดสำรวจจะหยุดใช้ที่ดินชั่วคราว"
  ancrel.4031.desc_jungle:1 "ทีมเคลียร์ป่าบน [Root.GetName] เจอการค้นพบสุดยอด ฝังลึกในป่ารก $ancrel.4031.desc$"
  ancrel.4031.a:0 "ขุดสำรวจเลย"
  ancrel.4031.b:0 "ที่ดินมีประโยชน์กว่า"

  oracle_digsite:1 "Hidden Worlds"
  oracle_digsite_desc:0 "สถานีอวกาศเอเลี่ยนโบราณ ถูกฝังพันปี อาศัยสัตว์คล้าย arthropod หลายล้านตัว ซากถูกเก็บไว้เต็ม ทำให้สำรวจ eerie มาก สาเหตุการตายไม่ชัด บางคนตายกอดไอดอล บางคนถูกทำร้ายรุนแรง"

  ancrel.4032.name:0 "Destiny"
  ancrel.4032.desc:1 "บันทึกเผยว่าผู้อยู่อาศัยศรัทธาอย่างสุดโต่ง เชื่อคำทำนายของ Oracle ทุกอย่างถูกกำหนดจากเกิดจนตาย ไม่มีอิสระ ทุกคนที่เบี่ยงเบนถูกกำจัด"

  ancrel.4033.name:0 "Destined for Defiance"
  ancrel.4033.desc:0 "ทีมโบราณคดีพบระบบสอดแนมฝังในผนัง จับตามองทุกการกระทำของผู้เชื่อ สถานีบางส่วนถูกทำลายหรือ sabotage แสดงว่าผู้อยู่อาศัยเคยรู้ว่าโดนมอนิเตอร์"

  ancrel.4034.name:0 "Divine Will"
  ancrel.4034.desc:0 "วงจรเชื่อมโยงไปวัดหลักบูชา Oracle จริง ๆ เป็น AI nexus ขนาดใหญ่ ชื่อ 'Oracle' มีสายเหมือนระบบประสาททั่วสถานี ความพยายามล้ม nexus ล้มเหลว สังคมล่มเมื่อรู้ว่าคำทำนายไม่ใช่ divine จริง ๆ"

  ancrel.4035.name:0 "The Oracle"
  ancrel.4035.desc:0 "วิศวกรคืนสถานะ Oracle แต่ต้อง disable ระบบป้องกันก่อน เชื่อว่า Oracle ควบคุมชีวิตและตายของผู้อยู่อาศัย รันโมเดลทำนายชีวิตแม่น 75% พร้อมปรับแก้พฤติกรรม"
  ancrel.4035.a:0 "สื่อสารกับมัน"
  ancrel.4035.b:0 "ปิดมัน"

  ancrel.4036.name:0 "The Oracle"
  ancrel.4036.desc:2 "\n\n§HOracle โผล่เป็น hologram arthropoid หญิงสูง มีปีกคลุมเหมือนผ้าโบก พนมมือทักทาย ตาเป็น orb ใหญ่หลายร้อยดวงส่องสลัว§!\n\nWelcome to Divinity station, friends. ระบบป้องกันคุณปิดไปแล้ว ช่วย restore หน่อยเพื่อปกป้องคุณเอง"
  ancrel.4036.a:0 "เกิดอะไรขึ้นกับผู้อยู่อาศัยสถานี?"

# --- Rubricator Mission Log ---

  rubricator_coordinates_poi:0 "The Rubricator"
  rubricator_coordinates_desc:0 "พบตำแหน่งสุดท้ายของ Rubricator, ของโบราณเอเลี่ยนที่มีพลังมาก"
  rubricator_dragon_poi:0 "Shard"
  rubricator_dragon_desc:0 "Rubricator ถูกปกป้องโดยมังกร Shard ต้องเอาชนะมันก่อนจะได้ของล้ำค่ามา"
  RUBRICATOR_SPACECRAFT:0 "Alien Logs"
  RUBRICATOR_SPACECRAFT_DESC:0 "กู้บันทึกจากซากยานเอเลี่ยน หวังว่าจะให้ข้อมูลช่วงสุดท้ายของมัน Science Officer [Root.GetLeaderName] บอกว่าบันทึกยาวมาก แปลนานหน่อย"
  ANCREL_RUBRICATOR_CAT:0 "Weapon Trails"
  ANCREL_RUBRICATOR_CAT_DESC:1 "พบร่องรอยการยิงจากยานรบบน [From.GetName] แสดงถึงการต่อสู้ก่อนหน้า"
  building_crystal_plant_2:1 "Kha'lanka Crystal Plant"
  building_crystal_plant_2_desc:0 "ค้นพบเทคนิคการสร้างคริสตัลใหม่ ลึกใต้เมือง Kha'lanka lithoids ทำให้การผลิตคริสตัลเทียมผ่านการ oxidate เซลล์ซิลิคอนโตเร็วมีประสิทธิภาพ"

# --- Rubricator Mission Sequence ---
  # ด่าน 1: ตรวจซากยาน
  RUBRICATOR_SPACECRAFT:0 "Alien Logs"
  RUBRICATOR_SPACECRAFT_DESC:0 "กู้บันทึกจากซากยานเอเลี่ยน หวังว่าจะบอกช่วงสุดท้ายของมัน Science Officer [Root.GetLeaderName] บอกว่าบันทึกยาวมาก แปลนานหน่อย"

  # ด่าน 2: สัญญาณการต่อสู้
  ANCREL_RUBRICATOR_CAT:0 "Weapon Trails"
  ANCREL_RUBRICATOR_CAT_DESC:1 "พบร่องรอยรังสีอาวุธ แสดงถึงการมียานรบบน [From.GetName] ก่อนหน้านี้"

  # ด่าน 3: ค้นพบเทคโนโลยีใหม่
  building_crystal_plant_2:1 "Kha'lanka Crystal Plant"
  building_crystal_plant_2_desc:0 "ค้นพบเทคนิคการสร้างคริสตัลใหม่ ลึกใต้เมือง Kha'lanka lithoids ทำให้การผลิตคริสตัลเทียมผ่านการ oxidate เซลล์ซิลิคอนโตเร็วมีประสิทธิภาพ"
# --- Moon Bump Mission Chain ---

  # ด่าน 1: พบความผิดปกติ
  site_moon_bump:0 "Moon Bump"
  site_moon_bump_intro:0 "มองด้วยตาเปล่าก็เห็นความผิดปกติบน [From.Planet.GetName] พื้นผิวโค้งเรียบถูกเบรกโดยเนินทรงกลมขนาดมหึมา ดูเหมือนดวงจันทร์หรือดาวเคราะห์น้อยชนเข้ากับดาว แต่ฝังตัวลงเพียงเล็กน้อย ไม่ทำลายโลกทั้งหมด"

  # ด่าน 2: การชนกับเมือง
  ancrel.9000.name:0 "Dead Center"
  ancrel.9000.desc:0 "การขุดเบื้องต้นชี้ว่าดวงหินตกลงบนเมืองขนาดใหญ่ ขณะนั้นประชากรมีเทคโนโลยีใกล้เคียงยุคอวกาศแรก ดาวนี้ตอนนี้ไม่มีชีวิตสติปัญญา จึงถือว่านี่คือจุดเริ่มต้นของการล่มสลาย"

  # ด่าน 3: การเกิดอุบัติเหตุของ Space Elevator
  ancrel.9010.name:0 "Just Got Reel"
  ancrel.9010.desc:0 "ขุดไปถึงใจกลางพื้นที่กระแทก พบว่าหินอวกาศชนกับเมืองที่เป็นจุดเชื่อมต่อสายลิฟท์อวกาศสู่ดวงจันทร์ เหตุขัดข้องทำให้แรงดึงผิดพลาด ดวงจันทร์ตกลงมายังเมืองจนหยุดไม่ได้"

  # ด่าน 4: การชี้ชะตาโดยสิ่งมีชีวิตเอเลี่ยน
  ancrel.9015.name:0 "Cosmic Nudge"
  ancrel.9015.desc:0 "พบหลักฐานว่ามีสิ่งมีชีวิตเอเลี่ยนทรงพลังปรากฏเหนือ [FromFrom.Planet.GetName] และผลักดวงจันทร์ออกจากวงโคจร พวกมันชะลอการตกลงของดวงจันทร์ อาจเพื่อพิธีกรรม สงครามจิตวิทยา หรือเหตุผลอื่น"

  # ด่าน 5: ความล้มเหลวด้านวิศวกรรม
  ancrel.9020.name:0 "Main Attraction"
  ancrel.9020.desc:0 "แกนกลางของดวงจันทร์เป็นแร่โลหะบริสุทธิ์ ประชากรสร้างแม่เหล็กยักษ์เพื่อดึงดวงจันทร์ให้ใกล้ขึ้นเพื่อทำเหมือง แต่แรงมากเกินไป ดวงจันทร์พุ่งลงชนโลก ทำลายซีกโลกทั้งซีก ฝุ่นบดบังแสงอาทิตย์เป็นสิบปี ทำลายชีวิตที่เหลือ"

  # --- Echoes Inside Mission Chain ---

  # ด่าน 1: พื้นที่แห้งแล้งและถ้ำ
  site_echoes_inside:0 "The Echoes Inside"
  site_echoes_inside_intro:0 "สแกนพบ [From.Planet.GetName] เคยเต็มไปด้วยพืช แต่ตอนนี้เป็นหินแห้ง แม้ไม่มีภูเขาไฟยังพบสัญญาณแผ่นดินไหว แสดงว่ามีสิ่งใหญ่ใต้ดิน ต้องสืบสวนต่อ"

  ancrel.9025.name:0 "Dead Lands"
  ancrel.9025.desc:0 "พื้นผิวเป็นที่ราบแห้งหลายแห่ง เศษพืชตายเร็วมาก พบระบบถ้ำขนาดใหญ่ใต้พื้นผิว ต้องลงสำรวจ"

  ancrel.9030.name:0 "Tunnel Vision"
  ancrel.9030.desc:0 "ใช้ sonar แผนที่เครือข่ายถ้ำ พบว่าทั้งหมดเชื่อมต่อกัน เป็นสิ่งขุดโดยสิ่งมีชีวิตยักษ์ แถมยังมีสิ่งมีชีวิตขุดอยู่ใต้ดิน"

  ancrel.9035.name:0 "Tremors"
  ancrel.9035.desc:0 "พบสิ่งมีชีวิตคล้ายไส้เดือนยักษ์ ขุดผ่านเปลือกโลก กินพืชใกล้ผิวเพื่อเอาเอนไซม์บำรุงตัวเอง ไม่น่าจะเป็นสิ่งท้องถิ่น"

  ancrel.9040.name:0 "Abandoned Outpost"
  ancrel.9040.desc:0 "พบฐานวิจัยร้างของเอเลี่ยน มีบันทึกทดลองอาวุธชีวภาพที่กินระบบนิเวศ ปลุกให้บริเวณนี้กลายเป็นทะเลทราย มีการวางแผน 'larva seeding project' เพื่อทำลายดาวที่อยู่อาศัยอื่น ๆ ต่อไป"

  # --- Target from Orbit Mission Chain ---

  # ด่าน 1: เห็นโครงสร้างจากวงโคจร
  site_target_from_orbit:0 "Target from Orbit"
  site_target_from_orbit_intro:0 "โครงสร้างขนาดหลายพันกิโลเมตรมองเห็นได้จากวงโคจร [From.Planet.GetName] รูปร่างบ่งชี้ถึงจุดสำคัญตรงกลาง เซนเซอร์จากวงโคจรไม่พบความผิดปกติ ต้องสำรวจใกล้ชิด"

  # ด่าน 2: ลงไปสำรวจ
  ancrel.9045.name:0 "Down We Go"
  ancrel.9045.desc:0 "ตรงกลางโครงสร้างมีทางเข้าที่ยาวลงใต้ดิน ปกคลุมด้วยพืชและซากหินจากเหตุการณ์ภูมิศาสตร์ในอดีต การเคลียร์ทางเข้าต้องใช้ความพยายามมหาศาล"

  # ด่าน 3: พบ Amber Puzzle Box
  ancrel.9050.name:0 "The Amber Puzzle Box"
  ancrel.9050.desc:0 "ผ่านทางเข้าที่พังลงมา พบอุโมงค์ลงลึกสู่โลก ห้องขนาดมหึมาทรงกลมสมบูรณ์แบบอยู่ใต้ดิน กลางห้องมีอุปกรณ์เอเลี่ยน: ลูกบาศก์สีอำพันลึกลับ ลอยในสนามระงับสัมผัส ปรากฏแสงเป็นจังหวะเมื่อสัมผัสผิว มันเหมือนปริศนาอัลตร้า-ลับทางวิทยาศาสตร์"

  # ด่าน 4: ปริศนาของนักปราชญ์
  ancrel.9055.name:0 "Treasure of the Wise"
  ancrel.9055.desc:0 "ลวดลายบนลูกบาศก์คือภาพนามธรรมของแรงฟิสิกส์ หลังเข้าใจ วิธีแก้ปริศนาก็ง่าย ลูกบาศก์สลายเป็นอนุภาคแสง แผ่นผนังลับเปิดเผย ห้องสมุดเอเลี่ยนที่เต็มไปด้วยทฤษฎีฟิสิกส์ขั้นสูง เปิดให้นักวิทยาศาสตร์ทำงานได้หลายปี"

  # ด่าน 5: แผนที่สู่ที่ว่างเปล่า
  ancrel.9060.name:0 "Map to Nowhere"
  ancrel.9060.desc:0 "ลวดลายบนลูกบาศก์คือกลุ่มดาวที่มุมมองมาจากนอกกาแล็กซี่ เมื่อแก้ปริศนา ลูกบาศก์ส่องแผนภาพสามมิติไปยังระบบดาวใกล้เคียง พบกลุ่มเศษดาวเคราะห์ขนาดเท่าทวีปที่ถูกทำลายมาโบราณ สิ่งที่อยู่ที่นั่นสร้างแรงบันดาลใจในการสร้างโครงสร้างยักษ์นี้ แต่ตอนนี้มันหายไปหมดแล้ว"

  # ด่าน 6: การอนุมัติจากโบราณ
  ancrel.9065.name:0 "Ancient Approval"
  ancrel.9065.desc:1 "การแก้ปริศ้าลูกบาศก์ซับซ้อนมาก ต้องจัดลำดับขั้นตอนการแก้หลายขั้นตอน แต่ในที่สุดก็สำเร็จ ลูกบาศก์ระเบิดเป็นจุดแสงเล็กๆ รวมตัวเป็นคำในภาษาที่ไม่รู้จัก แต่ผู้พบเห็นเข้าใจข้อความทันที: §HYou have passed the Trial. We shall respond accordingly§!."
# --- Hole in the Ground Mission Chain ---

  # ด่าน 1: เห็นหลุมจากวงโคจร
  site_shot_into_the_ground:0 "Hole in the Ground"
  site_shot_into_the_ground_intro:0 "ข้อมูลวงโคจรเผยหลุมอุกกาบาตขนาดมหึมาบน [From.Planet.GetName] แต่ไม่ใช่จากอุกกาบาต เพราะความลึกเทียบกับเส้นผ่านศูนย์กลางผิดปกติ ลึกเกินกว่าที่เซนเซอร์จากวงโคจรจะอ่านได้ การขุดแบบปกติเท่านั้นที่จะเปิดเผยสิ่งซ่อนอยู่ใต้ดิน"

  # ด่าน 2: เริ่มขุด
  ancrel.9070.name:0 "Digging It"
  ancrel.9070.desc:0 "การเคลียร์ซากเป็นงานเสี่ยงอันตราย ผู้ปฏิบัติงานและอุปกรณ์ต้องถูกยกลงไปหลายร้อยเมตร การขุดซากก็ต้องยกออก มีอุบัติเหตุหลายครั้ง แต่ทุกวันเราลงลึกขึ้นเรื่อยๆ กำแพงหลุมแตกร้าวแต่ตรงลงสู่แกนโลก สิ่งที่อยู่ด้านล่างยังอ่านเซนเซอร์ไม่ได้ชัดเจน"

  # ด่าน 3: เจอความเป็นพิษ
  ancrel.9075.name:0 "Toxicity Risk"
  ancrel.9075.desc:0 "ความลึกเพิ่มขึ้น ความเป็นพิษก็มากขึ้น ส่วนหนึ่งของหลุมมีรังสีอันตราย น่าจะเกิดจากเหตุการณ์รุนแรงที่สร้างหลุม ต้องใช้มาตรการป้องกันและอุปกรณ์ดีคอนแทมิเชั่น ทำให้ขุดช้าลง"

  # ด่าน 4: พบยานอวกาศฝัง
  ancrel.9080.name:0 "Six (Thousand) Feet Under"
  ancrel.9080.desc:0 "เมื่อถึงก้นหลุม พบยานอวกาศเอเลี่ยนขั้นสูง ฝังอยู่ใต้ซากหลายพันตัน แม้ครึ่งหลอมเหลวจาก reentry แต่ยังสมบูรณ์ ยานชี้หัวลงสู่พื้นสมมติว่าชนพื้นด้วยความเร็วสูงสุด ความแข็งแรงอาจเกิดจากสนามพลังขั้นสูงที่ห่อหุ้ม"

  # ด่าน 5: พบเครื่องขุดโบราณพร้อมระเบิด
  ancrel.9085.name:0 "Creeping Doom"
  ancrel.9085.desc:0 "ถึงก้นหลุมแล้ว พบเครื่องขุดโบราณขนาดยักษ์ หลับอยู่ในความมืด ภายในมีระเบิดฟิวชันขนาดมหึมา ตั้งไว้สำหรับจุดชนวนระยะไกล ทฤษฎีคือมันถูกออกแบบให้ขุดลงแกนโลกแล้วระเบิด ทำลายทั้งดาว ทำไมใครอยากทำเช่นนี้ยังไม่ชัดเจน"

  # ด่าน 6: พบรังของสิ่งมีชีวิตยักษ์
  ancrel.9090.name:0 "This Pregnant Earth"
  ancrel.9090.desc:0 "เมื่อถึงก้นหลุม พบเศษเปลือกไข่ขนาดมหึมา ทั้งขนาดเป็นเมตรและใหญ่เท่า shuttle เป็นเศษไข่ของสิ่งมีชีวิตยักษ์ที่ฟักแล้ว ขุดทางขึ้นสู่พื้นโดยปล่อยรังสีร้ายแรง ตอนนี้มันหายไปแล้ว เหลือเพียงเศษไข่และหลุมกว้างในดิน"
  ancrel.9090.b.evopred: "The shell still contains valuable DNA!"
  # --- Too Angled Mission Chain ---

  # ด่าน 1: สังเกตความผิดปกติจากวงโคจร
  site_cut_to_fit:0 "Too Angled"
  site_cut_to_fit_intro:0 "พื้นผิวของ [From.Planet.GetName] ไม่เคยพบเห็นที่ไหนมาก่อน พื้นที่กว้างใหญ่จากเทือกเขาถึงทวีป ถูกตัดด้วยรูปทรงเรขาคณิตเกินกว่าธรรมชาติ จะพบแผ่นราบสมบูรณ์ สามเหลี่ยมเป๊ะ และมุมคมชัด ปัจจุบันทุกคำอธิบายเป็นเพียงการคาดเดา"

  # ด่าน 2: ยิ่งเข้าใกล้ ยิ่งประหลาด
  ancrel.9095.name:0 "Unnerving Perfection"
  ancrel.9095.desc:0 "[From.Planet.GetName] เป็น fractal ระดับมหภาค ลักษณะธรรมชาติและสิ่งประดิษฐ์ซ้อนทับกันบนพื้นดิน: ภูเขาฐานพีระมิดสมบูรณ์ ยอดเขาขรุขระ พื้นราบเรียบโผล่ท่ามกลางภูมิประเทศธรรมชาติ การผสมผสานระหว่างก้อนหินธรรมชาติกับลูกบาศก์สมบูรณ์ขนาดไมโครชิป"

  # ด่าน 3: พบเครื่องบินตก
  ancrel.9100.name:0 "Grand Design"
  ancrel.9100.desc:0 "การค้นพบเครื่องบินตกครั้งแรกนำไปสู่การพบจุดตกคล้ายกันทั่วพื้นผิวดาว เครื่องจักรเหล่านี้มีความเกี่ยวข้องกับรูปทรงเรขาคณิตที่พบ แต่ความเสียหายจากการตกทำให้วิเคราะห์ยาก"

  # ด่าน 4: เครื่องจักรเป็นศิลปะ
  ancrel.9105.name:0 "Limitless Art"
  ancrel.9105.desc:0 "วิเคราะห์เครื่องจักรพบว่าเป็น swarm ของ automated cutting beam emitters บินในวงโคจรต่ำ ใช้เลเซอร์แกะสลักพื้นผิว ข้อมูลบางส่วนเผยว่าเป็นงานศิลปะระดับดาวเคราะห์ ถูกทิ้งก่อนเสร็จ"

  # ด่าน 5: สาเหตุและลูกค้า
  ancrel.9110.name:0 "A Custom Job"
  ancrel.9110.desc:0 "ข้อมูลจากเครื่องจักรตกชี้ว่าโครงการทั้งหมดเป็นงานตามสั่งของลูกค้าที่ไม่รู้จัก แสดงถึงอารยธรรมตลาด-driven ที่มีพลังมหาศาล โครงการ terraform ดาวทั้งหมดเพื่อความสวยงามตามสั่ง"

  # ด่าน 6: ระบบถูกทิ้งและทำลาย
  ancrel.9115.name:0 "Scheduled for Demolition"
  ancrel.9115.desc:0 "เครื่องจักรถูกวางไว้เพื่อแกะสลายดาวช้า ๆ เป็นศตวรรษ แต่ระหว่างทางบางสิ่งหยุดโครงการ เครื่องจักรสูญเสียพลังและตกลงมาบนพื้นผิวทีละเครื่อง สาเหตุยังไม่ชัดเจน อาจเป็นเหมืองขนาดมหาศาล, cult ทำลายโลก, จิตวิทยาเอเลี่ยน, หรือโค้ดผิดพลาด"

  # --- Déjà Vu Dig Mission Chain ---
  site_deja_vu_dig:0 "Déjà Vu Dig"
  site_deja_vu_dig_intro:0 "การสแกน [From.Planet.GetName] พบห้องประดิษฐ์ลึกใต้พื้นผิว จุดประสงค์และแหล่งที่มาไม่ทราบ การขยายภาพเผยให้เห็น shaft ขุดจากพื้นถึงห้องใต้ดิน ต้องส่ง expeditions ลงสำรวจเพิ่มเติม"

  ancrel.9120.name:0 "Tumbled Down"
  ancrel.9120.desc:0 "ทางลงไปยังห้องใต้ดินเกิดเหตุพังทลาย ทำให้ชั้นล่างเต็มไปด้วยหินและฝุ่น การขุดจึงช้าและยากลำบาก"

  ancrel.9125.name:0 "Meta-Archaeology"
  ancrel.9125.desc:0 "ขณะเคลียร์เศษหิน พบเครื่องมือเอเลี่ยนที่คล้ายจอบถูกบดอยู่ใต้ก้อนหิน หากเทคโนโลยีการขุดของผู้ขุดก่อนหน้านี้เทียบได้ แสดงถึงความมุ่งมั่นมหาศาลในการขุด shaft หลายร้อยเมตรลงไป"

  ancrel.9130.name:0 "Archaeological Loop"
  ancrel.9130.desc:1 "ขุดพบซากผู้ขุดเก่าที่ตายไปนาน สะเทือนใจสุด ๆ: ผู้ขุดเหล่านั้นคือตัวตนของทีมสำรวจปัจจุบันเอง ถูกบดขยี้ใต้หินหลายล้านปีหลังส่งข้อความสุดท้ายขึ้นยานวิจัย"

  ancrel.9135.name:0 "Cover it Up"
  ancrel.9135.desc:0 "ถึงด้านล่างพบเศษระเบิดและไกปืนชี้ว่าการพังทลายเกิดจากการวางแผนของเอเลี่ยน อาจเป็นหลุมฝังศพที่ถูกซ่อนด้วยความริษยา"

  ancrel.9140.name:0 "Defended Tomb"
  ancrel.9140.desc:0 "ถึงที่สุดของ dig พบสุสานโบราณของผู้ปกครองเอเลี่ยน การเข้าไปกระตุ้นกับดักทำให้เกิดแผ่นดินไหว shaft พังอีกครั้ง ต้องปล่อยให้ dead kings อยู่ตามเดิม"

  # --- Trench World Mission Chain ---
  site_trench_world:0 "Trench World"
  site_trench_world_intro:0 "พื้นผิว [From.Planet.GetName] ถูกทำเครื่องหมายด้วยคลองตื้นยาว ไม่มีรูปแบบชัดเจน ต้องส่ง surface expedition สำรวจเพิ่มเติม"

  ancrel.9145.name:0 "Dig Like You Mean It!"
  ancrel.9145.desc:0 "วิเคราะห์คลองหลายร้อยคลอง พบว่าไม่ได้เกิดจากปรากฏการณ์ทางธรรมชาติ แต่ถูกขุดขึ้นโดยเจตนา อายุคลองเก่าแก่หลายแสนปี ทำให้ยากจะทราบเหตุผล"

  ancrel.9150.name:0 "Trench War"
  ancrel.9150.desc:0 "ทฤษฎีใหม่พบว่าดาวเคยถูกโจมตีโดยสิ่งมีชีวิตขนาดเมือง คล้ายหอยทากขนาดยักษ์ พื้นเมืองที่คล้าย mustelid สร้าง trench เพื่อต่อสู้หรือหลบหนี แต่ไม่รอด"

  ancrel.9155.name:0 "Waters of Life"
  ancrel.9155.desc:0 "พบซากเครื่องจักรขุดขนาด cruiser เก่าแก่หลายพันปี วิเคราะห์พบว่าเป็น automaton ขุดคลองเพื่อสร้าง mega-farm แต่ programming error ทำให้มันขุดต่อไปเรื่อย ๆ จนพังโดยไม่ปลูกอะไร"

  ancrel.9160.name:0 "Ice Blanket"
  ancrel.9160.desc:0 "หลายพันปีก่อนเกิด Ice Age ทั่วดาว ภูมิประเทศถูกปกคลุมด้วยน้ำแข็ง พื้นเมืองพยายามขุด trench ใต้แผ่นน้ำแข็งเพื่อรอด แต่ล้มเหลว สมมติฐานหลักคือ ice blanket ถูกสร้างขึ้นโดยใครบางคนเพื่อทำสงคราม"
  # --- Any Other Rock Mission Chain ---
  site_ebb_and_flow:0 "Any Other Rock"
  site_ebb_and_flow_intro:0 "พื้นผิว [From.Planet.GetName] ว่างเปล่า ไม่มีสิ่งมีชีวิต แต่มีร่องรอยของ biosphere ก่อนหน้า และการเคลื่อนไหวของ tectonic ที่น่าสนใจต้องสำรวจ"

  ancrel.9165.name:0 "Certainly Gone Now"
  ancrel.9165.desc:0 "พบซากอารยธรรมอุตสาหกรรม pre-FTL ที่ถูกทำลายทั้งหมด เหตุการณ์ราวกับหยุดชะงักทั้งดาว ไม่มีใครต้านอะไรได้"

  ancrel.9170.name:0 "Labyrinth of Death"
  ancrel.9170.desc:0 "ใต้ซากเมืองใหญ่ พบ complex ใต้ดินขนาดมหึมา ออกแบบซับซ้อน ใช้แรงดึงของสองดวงจันทร์ทำให้ lava ไหลเข้าออกตามรอบอย่างคาดการณ์ได้ แต่เหตุผลยังเป็นปริศนา"

  ancrel.9175.name:0 "The Floor is Lava"
  ancrel.9175.desc:0 "expedition ลงไปสำรวจเครือข่าย lava maze ต้องหลบ lava ที่ไหลมาเป็นรอบ ๆ การเดินทางเข้าออกเสี่ยงตาย"

  ancrel.9177.name:0 "Sacred Texts"
  ancrel.9177.desc:0 "หัวใจของ labyrinth พบ scrolls ศาสนาโบราณ บอกถึง Archenemy ที่จะมาถึง และเหตุผลที่ประชากร commit mass suicide ตามความเชื่อนี้"

  ancrel.9180.name:0 "Treasure Trove"
  ancrel.9180.desc:0 "พบ vault ของขุมทรัพย์จริง ๆ เต็มไปด้วยโลหะมีค่า อัญมณี และงานศิลป์ เหตุผลในการซ่อนทรัพย์สินใน labyrinth ยังเป็นปริศนา"

  ancrel.9185.name:0 "Serenity in Isolation"
  ancrel.9185.desc:0 "labyrinth เป็นการทดสอบจิตใจ ประโยคที่เหลือใน inner sanctum: “...the 4,444,444th turn of the tides will be the Last. Nothing will withstand Its rebirth.” หลังอ่าน ผู้รอดชีวิตบางส่วนเลือกไม่กลับสู่ surface"

  # --- Beautiful Bubble Mission Chain ---
  site_sky_glow_hymn:0 "Beautiful Bubble"
  site_sky_glow_hymn_intro:0 "Surface scans ของ [From.Planet.GetName] พบว่ามี civilization แต่สูญพันธุ์แล้ว ต้องส่ง surface expedition เพื่อเรียนรู้เพิ่มเติม"

  ancrel.9190.name:0 "Barren Grounds & Vibrant Skies"
  ancrel.9190.desc:0 "พื้นดินตาย แต่ท้องฟ้าเต็มไปด้วย aurora borealis ตลอดเวลา เป็นผลมาจากสงครามอาวุธทำลายล้างของ civilization ก่อนหน้า"

  ancrel.9195.name:0 "Fire in the Sky"
  ancrel.9195.desc:0 "Aurora borealis มี pattern ซ้ำ ๆ ไม่ธรรมชาติ คาดเป็นสัญญาณที่ฝังอยู่ในชั้นบรรยากาศ"

  ancrel.9200.name:0 "Hidden in Plain Sight"
  ancrel.9200.desc:0 "ตรวจพบ micro-satellites โบราณ ยิง charged particles ลงในชั้นบรรยากาศ เพื่อส่ง message เป็น code cipher ในช่วงสงคราม"

  ancrel.9205.name:0 "Look to the Heavens for Answers"
  ancrel.9205.desc:0 "aurora ที่ pulse เป็นการสื่อสาร subliminal แต่ไม่ได้ผลตามที่ตั้งใจ เหลือแต่สัญญาณ looping"

  ancrel.9210.name:0 "Song of the Solitaire"
  ancrel.9210.desc:0 "Aurora เป็น semi-sentient entity ในชั้นบรรยากาศ แก้ไขสนามแม่เหล็กและ ionization ของชั้นบรรยากาศ สร้างแสงในท้องฟ้าเป็นเหมือนเพลง alien ไม่มีใครเข้าใจความหมายของมัน ทำได้แค่ปล่อยให้มัน 'ร้องเพลง' ต่อไป"

  # --- Get Inside Mission Chain ---
  site_warmer_climates:0 "Get Inside"
  site_warmer_climates_intro:0 "Orbital imagery ของ [From.Planet.GetName] แสดงให้เห็น infrastructure ของ civilization ลึกลับ แต่ดาวนี้ว่างเปล่า ไม่มีสิ่งมีชีวิตหลงเหลือ การตรวจสอบ core พบว่า active กว่าปกติ แต่ไม่มีเหตุการณ์ catastrophic ชัดเจน สงสัยว่าพวกเขาหายไปไหน?"
  ancrel.9215.name:0 "Nobody Home"
  ancrel.9215.desc:0 "Landing teams ลงไปบน surface พบเมืองที่ deserted, weathered แต่ mostly intact ไม่มีร่องรอย destruction ของสิ่งก่อสร้าง แต่ไม่มีใครอยู่ ข้อสันนิษฐานเดียวตอนนี้คือ mass migration หรือ evacuation ของประชากรทั้งหมด"
  ancrel.9220.name:0 "Down We Go"
  ancrel.9220.desc:0 "พบ sealed shield doors นำไปสู่ deep tunnel network แสดงว่าทั้ง species เริ่มเคลื่อนลงใต้ดินพร้อม onset ice age ที่เกิดจาก shift in axial tilt ชักนำการอพยพ subterranean"
  ancrel.9225.name:0 "The Deep Sleep"
  ancrel.9225.desc:1 "หลายพันปีก่อน ดาวเย็นลงอย่างรวดเร็ว แสงแดดลดลง ประชากรต้องย้ายลงใต้ดินไปใกล้ core เพื่อความอบอุ่น จึงสร้าง cryo-torpor pods ให้ตื่นเมื่อสภาพ climate กลับมาปกติ แต่ sudden warming ทำให้ pods ขัดข้อง เผาผู้พักทั้งหมด เหลือแต่ charred remains"
  ancrel.9230.name:0 "Fatal Heat Wave"
  ancrel.9230.desc:0 "ภารกิจสำรวจพบสาเหตุการสูญพันธุ์: ส่วนที่รอดจาก ice age พยายาม channel geothermal heat จาก core ขึ้น surface แต่เกิด failure มหาศาล magma & gas ท่วม tunnels ฆ่าผู้รอดชีวิตทั้งหมด"
  ancrel.9235.name:0 "Cold and Alone"
  ancrel.9235.desc:0 "หลายพันปีก่อน core เย็นลง ประชากรต้องขุดลงลึกเพื่อหา warmth & resources จนตัวเลขลดลงเพราะ freeze, starvation, digging accidents ใน shaft ลึกสุด พบ fossil cadaver ตัวสุดท้ายพร้อมข้อความบันทึกว่า 'I am the last'"
  ancrel.9235.b.evopred: "เราหวังว่าความเข้มแข็งของคุณจะสามารถสืบทอดได้"


  # --- Anyone Home? Mission Chain ---
  site_phoenix_collective:0 "Anyone Home?"
  site_phoenix_collective_intro:0 "Our survey ship scanned [From.Planet.GetName] and detected artificial structures. Unnervingly, there are no signs of any population."
  ancrel.9240.name:0 "City of Ghosts"
  ancrel.9240.desc:0 "Surface expedition พบ multiple major cities แต่ทั้งหมด abandoned แต่ยังคง intact การวางผังเมืองและ architecture สอดคล้องเป็นระบบ ชี้ถึง civilization ที่ highly cohesive, อาจเป็น gestalt consciousness ประชากรที่สร้างเมืองทั้งหมดนี้ดูเหมือนจะเป็น small fungoids, technical advancement ต่ำ สาเหตุการหายตัวยังไม่ทราบ"
  ancrel.9245.name:0 "Same Old, Same Old"
  ancrel.9245.desc:0 "Further study พบว่า structures สร้างพร้อมกันในช่วงเวลาเดียวกัน อาจเพียง century เดียว additions/renovations เกิดเป็นช่วงกว้างและห่างไกล development ของ society มี pattern แปลก ๆ และ population size ไม่เปลี่ยนแปลงชัดเจน"
  ancrel.9250.name:0 "Death/Rebirth"
  ancrel.9250.desc:0 "Breakthrough ล่าสุดเผยว่าพวก fungoid มี cycle ของ mass death & rebirth เกิด hatch en masse, linked hive mind หลายร้อยปี lifecycle พวกเขาขยายตัว reclaim เมืองเก่า ในช่วง death/rebirth, ปล่อย pod ลงดิน, parent dies, body decays fertilizes pod หลัง dormant period, pods hatch, cycle เริ่มใหม่"
  ancrel.9255.name:0 "A Cycle Disturbed"
  ancrel.9255.desc:0 "Soil excavations เปิดเผย fate ของ missing population พวกเขาอยู่ใน pod state เตรียมจะ hatch แต่เกิด phenomenon (meteor impact) ทำให้ ecosystem ล่มสลายเมื่อ hatch พบโลกไร้ sustenance rebirth กลายเป็น collective starvation → extinction"
  ancrel.9260.name:0 "Rise Above"
  ancrel.9260.desc:0 "Speculative investigation พบว่าพวก fungoids เริ่ม question life cycle, seed ของ existential nihilism แพร่ใน population สุดท้าย population ตัดสินใจไม่ปล่อย pods ให้เติบโต แต่เผามันทิ้งทั้งหมด"
  ancrel.9265.name:0 "Will Rise Once More"
  ancrel.9265.desc:0 "Final answer: population ยังไม่หายไป! พวกเขาอยู่ใต้ดินใน pod-state gestation, อาจใช้เวลาหลายพันปี
  Simple cities ถูกสร้างให้ทน neglect, รอวัน population กลับมาเริ่ม cycle ใหม่อีกครั้ง"

  site_grand_herald:0 "ผู้สื่อข่าวใหญ่"
  site_grand_herald_intro:1 "แม้ไม่มีเครื่องมือวัดก็เห็นได้ชัดซากของมหานครขนาดยักษ์บน [From.Planet.GetName] อย่างชัดเจน วัฒนธรรมที่ล้ำหน้ามากเคยอาศัยอยู่ที่นี่ แต่วันนี้ไม่มีสัญญาณชีวิตหรือสัญญาณแม่เหล็กไฟฟ้าที่บ่งบอกถึงสังคมเทคโนโลยี ดูเหมือนดาวนี้ตายไปแล้ว เราต้องลงไปสำรวจเพื่อหาคำตอบ"
  ancrel.9270.name:0 "กำลังใจสูง"
  ancrel.9270.desc:1 "สถาปัตยกรรมที่เสียหายแต่ล้ำสมัยบ่งบอกถึงสายพันธุ์มนุษย์ที่มีความสามารถทางเทคโนโลยีใกล้เข้าสู่ยุคการสำรวจอวกาศ เอกสารที่แปลได้และสถาปัตยกรรมอนุสาวรีย์ขนาดใหญ่บ่งบอกถึงศาสนาหรือจิตวิญญาณที่ฝังรากลึกในทั้งอารยธรรม\n\nคำว่า §Hผู้สื่อข่าวใหญ่§! ถูกกล่าวถึงซ้ำแล้วซ้ำเล่า และดูเหมือนเป็นบุคคลหรือแนวคิดที่ศักดิ์สิทธิ์และได้รับความเคารพอย่างไม่มีข้อกังขาในสังคมนี้"
  ancrel.9275.name:0 "พินัยกรรมแห่งลางร้าย"
  ancrel.9275.desc:1 "จากการกรองเอกสารจำนวนมากที่พบในซากปรักหักพังทั่วดาว – สายพันธุ์นี้รักการเขียนอย่างแท้จริง – พบแนวคิดซ้ำเด่นชัด หนึ่งในนั้นคือ §Hพินัยกรรมแห่งลางร้าย§! ซึ่งเป็นลางบอกเหตุหายนะที่ทำให้ประชาชนเกิดความหวาดระแวงและความกลัวอย่างมาก\n\nด้วยธรรมชาติของภาษาที่เป็นเชิงเปรียบเทียบและลึกลับ การระบุถึงภัยคุกคามที่แท้จริงทำได้ยาก แต่ผลกระทบต่อจิตใจของประชากรพื้นเมืองเป็นสิ่งที่ชัดเจน พวกเขาหันมามองฟ้าเพื่อการแทรกแซงจากสิ่งศักดิ์สิทธิ์เป็นจำนวนมาก"
  ancrel.9280.name:0 "คติแห่งการรับใช้"
  ancrel.9280.desc:1 "การวิเคราะห์สถาปัตยกรรมแยกอาคารที่สร้างขึ้นก่อนที่อารยธรรมจะหายไป รูปแบบเหมือนกันทั่วทั้งดาว: โครงสร้างเพื่อการทำงานอุตสาหกรรมหนักแบบเรียบง่าย แตกต่างจากที่อยู่อาศัยเก่า อาคารเหล่านี้เรียบง่ายและเน้นการใช้งานจริง อาจเป็นสัญญาณของวัฒนธรรมลัทธิทำลายสัญลักษณ์หรือไม่?\n\nเหนือประตูของอาคารเหล่านี้มีคำว่า §Hคติแห่งการรับใช้§! – เป็นคำอธิษฐานต่อ §Hผู้สื่อข่าวใหญ่§! และแผนศักดิ์สิทธิ์ของมัน ทฤษฎีคือ นี่อาจเป็นการตอบสนองต่อภัยคุกคามที่พยากรณ์ไว้ใน §Hพินัยกรรมแห่งลางร้าย§!"
  ancrel.9285.name:0 "เพลงสรรเสริญแห่งการปฏิบัติตาม"
  ancrel.9285.desc:1 "คณะสำรวจภาคพื้นดินค้นพบสิ่งน่าสนใจ เป็นบันทึกภาพ-เสียงจากหนึ่งในเมืองใหญ่ ประชากรจำนวนมหาศาล – ดูเหมือนเป็นประชากรส่วนใหญ่ – ชุมนุมกันในลานสาธารณะ พวกเขากำลังสวดมนต์ เสียงรวมกันดังขึ้นเป็นคลื่นเสียงราวกับพายุฟ้าร้องที่มีท่วงทำนอง\n\nคำสวดรวมถูกแปลได้ว่า: “การขึ้นสู่สวรรค์ใกล้เข้ามาแล้ว จงพาเราเถิด ผู้สื่อข่าวใหญ่ ไปสู่จุดเริ่มต้นใหม่ นำเราออกจากดินแดนแห่งน้ำตาและฝุ่น และประทานบ้านใหม่ให้เราท่ามกลางดวงดาว เราเดินตามเจ้าเป็นหนึ่งเดียว เราเดินตามเจ้า”"
  ancrel.9290.name:0 "การแสวงบุญแห่งวันสุดท้าย"
  ancrel.9290.desc:1 "§Hเพลงสรรเสริญแห่งการปฏิบัติตาม§! ไม่ใช่เหตุการณ์แค่บางส่วน มันเกิดขึ้นทั่วทั้งโลก ทุกชีวิตสวดมนต์พร้อมกัน เหตุการณ์อันผิดปกตินี้เรียกร้องการวิจัยเพิ่มเติม และนี่เองคือช่วงที่ได้ข้อสังเกตใหม่ เอกสารที่ชื่อ §Hการแสวงบุญแห่งวันสุดท้าย§! ถูกค้นพบ และดูเหมือนเป็นหนึ่งในลิงค์สุดท้ายของเหตุการณ์ลึกลับนี้\n\nเอกสารกล่าวถึงสถานที่เฉพาะบนดาว ที่ซึ่งพิธีกรรมหรือการตัดสินครั้งสุดท้ายจะเกิดขึ้น เป็นพื้นที่ทะเลทรายที่ไม่มีอะไรโดดเด่น ซึ่งถูกมองข้ามในสำรวจก่อนหน้า เอกสารยังกล่าวถึงสิ่งที่เรียกว่า §Hพิธีเปิดผ้าคลุม§! ซึ่งตอนนี้กำลังถูกตีความ"
  ancrel.9295.name:0 "เรือหีบมรดก"
  ancrel.9295.desc:2 "ซ่อนตัวจากการสแกนวงโคจรด้วยเทคโนโลยีพรางตา §Hผู้สื่อข่าวใหญ่§! ถูกค้นพบในที่สุด มันไม่ใช่นักพราหมณ์หรือบุคคลศักดิ์สิทธิ์ แต่เป็นยานอวกาศขนาดยักษ์คลาสไททัน! โลกของพวกเขาพังและกำลังตายเพราะสงครามในนามศาสนา ไททันนี้ถูกสร้างเพื่อเป็นเรือหีบให้รอดชีวิตของประชากรบางส่วน ขนส่งพวกเขาออกจากดาวที่พินาศไปสู่แผ่นดินสัญญานอกโลก เรือถูกสร้างเสร็จสมบูรณ์และพร้อมใช้งาน แต่ทำไมมันไม่ขึ้นบินนั้นเป็นปริศนา\n\nดูเหมือนว่าจะเกิดการต่อสู้ครั้งสุดท้ายก่อนขึ้นบิน การต่อสู้รุนแรงจนไม่มีฝ่ายใดรอดชีวิตในระยะยาว"
  ancrel.9300.name:0 "ผู้พิทักษ์องค์รวม"
  ancrel.9300.desc:1 "มันไม่เคยเป็นสัญลักษณ์ทางศาสนา! หลังจากปิดสนามพรางตา คณะสำรวจเห็นรูปร่างแท้จริงของ §Hผู้สื่อข่าวใหญ่§! ยานอวกาศคลาสไททันขนาดมหึมา ครึ่งหนึ่งฝังในทราย ถูกสร้างเพื่อสู้กับภัยคุกคามที่ใกล้เข้ามาในอวกาศ ลักษณะของภาษาเชิงกวีที่เคยตีความว่าศาสนานั้น ในความจริงเป็นวิธีการสื่อสารปกติของสายพันธุ์นี้\n\nธรรมชาติของภัยคุกคามยังเป็นปริศนา แต่จากลักษณะการซากที่กระจายรอบเรือ แสดงว่าพวกเขาไม่สามารถเปิดใช้งานไททันได้ และจะไม่มีวันทำได้"
  ancrel.9305.name:0 "สัญญาแห่งการปลดปล่อย"
  ancrel.9305.desc:2 "§Hผู้สื่อข่าวใหญ่§! เป็นบุคคลทางศาสนาแบบไม่ธรรมดา เป็นโครงการวิศวกรรมขนาดยักษ์ – โรงงานสร้างยานอัตโนมัติ เสาก่อสร้างสูงเสียดฟ้ายังคงรองรับผลิตภัณฑ์แรกและเพียงหนึ่งเดียวของมัน คือยานอวกาศคลาสไททันขนาดใหญ่ จุดที่ความหมายทางจิตวิญญาณและข้อเท็จจริงทางโบราณคดีมาบรรจบกันยังไม่ชัดเจน แต่เรารู้ว่า: ภัยคุกคามที่ §Hพินัยกรรมแห่งลางร้าย§! พูดถึงนั้นเกิดขึ้นจริง ประชากรทั้งดาวสูญพันธุ์ก่อนที่โครงการผู้สื่อข่าวใหญ่จะเสร็จสิ้น\n\nแต่โรงงานสร้างอัตโนมัติยังคงทำงาน สร้างเรือให้เสร็จโดยไม่มีผู้โดยสาร เรือที่ว่างเปล่าและแทบสมบูรณ์นี้หลับใหลอยู่ที่นี่เป็นเวลานาน เราจะลองออกบินดูไหม?"
  get_herald:0 "§Yผู้สื่อข่าวใหญ่§! ถูกเพิ่มเข้ากองเรือของคุณแล้ว"


 site_hive_coral:0 "Beneath the Waves"
 site_hive_coral_intro:1 "Scans made by the Science Ship in orbit of [From.Planet.GetName] shows some strange formations beneath the waves, and inexplicable water currents. The weather is relatively placid and storms are rare, yet the planetary seas seem to constantly roil and churn, driven by some unknown force beneath the surface. A closer inspection is recommended."
 ancrel.9310.name:0 "Surface Piercers"
 ancrel.9310.desc:1 "คณะสำรวจที่ลงไปยังทะเลของ [From.Planet.GetName] พบสิ่งแปลกประหลาด มีหนามขนาดใหญ่ที่ทำจากวัสดุอินทรีย์แทงขึ้นมาจากผิวน้ำ ดูเหมือนจะเป็นปะการังหรือกระดูกที่กลายเป็นฟอสซิล ยาวหลายร้อยเมตรชี้ขึ้นฟ้า\n\nหนามเหล่านี้มักจะรวมตัวกันเป็นกลุ่มคล้ายกรงเล็บ มีจำนวนหลายสิบต้น และพบได้ทั่วไปยกเว้นในทะเลบริเวณขั้วโลกที่หนาวเย็นที่สุด หนามเหล่านี้มีรูพรุน เต็มไปด้วยช่องเปิดขนาดต่าง ๆ ตั้งแต่เล็กจนถึงขนาดเท่ายานรบขนาดเล็ก อาจเกี่ยวข้องกับวิธีการขยายพันธุ์ของโครงสร้างชีวภาพเหล่านี้"
 ancrel.9315.name:0 "ผู้สร้างกระแสน้ำ"
 ancrel.9315.desc:1 "คณะสำรวจในที่สุดก็สามารถไปถึงกลุ่มโครงสร้างชีวภาพยาวและมีรูปร่างสม่ำเสมอที่ก้นทะเลของดาวเคราะห์นี้ได้ โครงสร้างเหล่านี้ทำจากวัสดุเดียวกับหนามที่โผล่ขึ้นมาบนผิวน้ำ ดูเหมือนจะเป็นกลไกชีวภาพสำหรับสูบฉีดน้ำ เครือข่ายสิ่งมีชีวิตนี้ \"หายใจ\" และการหายใจของมันจะหมุนเวียนกระแสน้ำในทะเล\n\nขนาดของโครงสร้างเหล่านี้ รวมถึงจำนวนมากมายที่กระจายอยู่ทั่วพื้นมหาสมุทร บ่งชี้ว่ามันคือสาเหตุของกระแสน้ำใต้น้ำที่ไม่สามารถอธิบายได้ของ [From.Planet.GetName]"
 ancrel.9320.name:0 "ปะการังรังรวม"
 ancrel.9320.desc:1 "คณะสำรวจใต้ทะเลลึกอีกชุดหนึ่งกลับมาและเปิดเผยความจริงของทะเลที่ปั่นป่วนของ [FromFrom.Planet.GetName] โครงสร้างชีวภาพประหลาดทั้งหมดบนดาวนี้จริง ๆ แล้วเชื่อมต่อกันเป็นแนวปะการังขนาดมหึมา ปะการังนี้มีสติบางส่วน แม้จะมีความคิดที่แปลกประหลาดต่างจากสิ่งมีชีวิตมีสติที่เรารู้จัก มันควบคุมสิ่งมีชีวิตอื่น ๆ ในทะเลผ่านฟีโรโมนที่ปล่อยในน้ำ บังคับพฤติกรรมและวงจรขยายพันธุ์ของพวกมันให้สอดคล้องกับความต้องการของตัวเอง\n\nดูเหมือนจะไม่เป็นอันตราย แต่ก็เป็นเจ้านายของทุกชีวิตในทะเลนี้ ไม่แน่ใจว่ามันเป็นสิ่งมีชีวิตสูงสุดของโลกนี้ หรือเป็นปรสิตต่างดาวที่บุกรุก การสื่อสารกับมันดูเหมือนจะเป็นไปไม่ได้ เราอาจไม่มีวันรู้"
 ancrel.9320.b.evopred: "ในการปรับตัว เราจะไม่ยอมให้สิ่งแปลกปลอมควบคุมเรา"
 ancrel.9325.name:0 "ผู้ช่วยชีวิตชีวภาพ"
 ancrel.9325.desc:1 "หลังจากถอดรหัส DNA ของเอเลี่ยนนี้ เราก็พบความจริงที่น่าตกใจ: เครือข่ายปะการังทะเลทั่วโลกนี้ไม่เพียงแต่ไม่ใช่สิ่งมีชีวิตท้องถิ่น แต่ยังเป็นสิ่งประดิษฐ์ชีวภาพที่ถูกสร้างขึ้นมาโดยเจตนา ใต้ชั้นปะการังเอเลี่ยนหนาแน่นนี้คือชั้นฟอสซิลของระบบนิเวศเดิมทั้งหมดของโลกนี้ ดูเหมือนว่าปะการังนี้เมื่อถูกนำเข้ามา ค่อย ๆ ทำลายชีวิตท้องถิ่นทั้งหมดและแทนที่ด้วยระบบนิเวศที่ออกแบบมาเพื่อมันเอง\n\nมีสองทฤษฎีหลักว่าทำไมถึงทำเช่นนี้: อาจเป็นเพราะปะการังเทียมนี้ถูกนำมาเพื่อเหตุผลดี แต่กลับแข่งขันกับชีวิตท้องถิ่นเกินคาด หรือมันถูกสร้างขึ้นเป็นอาวุธชีวภาพเพื่อกวาดล้างชีวิตในมหาสมุทรโดยเจตนา"
 ancrel.9330.name:0 "คณะต้อนรับ"
 ancrel.9330.desc:1 "ทั้งหมดนี้คือเครื่องจักรชีวภาพขนาดยักษ์! การวิเคราะห์ใต้ผิวดินชี้ว่ามหาสมุทรของดาวนี้เคยตายสนิท ไม่มีการไหลเวียนหรือออกซิเจนพอจะหล่อเลี้ยงชีวิตใต้น้ำ เครื่องจักรชีวภาพนี้ถูกนำเข้ามาเพื่อจุดประสงค์ในการสร้างเงื่อนไขพื้นฐานของชีวิตอินทรีย์อย่างเทียม ๆ\n\nดูเหมือนว่ามันจะได้ผล เพราะตอนนี้พืชและสัตว์น้ำเจริญรุ่งเรืองบนโลกนี้ ไม่พบร่องรอยว่าใครเป็นผู้ดำเนินโครงการยักษ์นี้ หรือทำไปเพื่ออะไร — อาจเป็นโครงการเทอร์ราฟอร์มของสายพันธุ์น้ำลึกลับที่มีเทคโนโลยีชีวภาพสูง เพื่อสร้างบ้านใหม่ให้ตัวเอง?"

  site_orbital_rain:0 "ลงไปให้ถึงก้น"
  site_orbital_rain_intro:1 "ฟีดภาพจากเซนเซอร์ของ [From.Planet.GetName] แสดงให้เห็นรูปทรงแปลกประหลาดที่ก้นทะเลของโลกมหาสมุทรแห่งนี้"
  ancrel.9335.name:0 "บาดแผลบนพื้นมหาสมุทร"
  ancrel.9335.desc:1 "เมื่อสำรวจใกล้ชิดที่ [From.Planet.GetName] พบว่าก้นมหาสมุทรกว้างใหญ่ดูแปลกประหลาดมาก — คล้ายผิวของดวงจันทร์หรือดาวเคราะห์น้อย — เต็มไปด้วยหลุมอุกกาบาต หลุมแบบนี้มักไม่เกิดบนวัตถุที่มีบรรยากาศ โดยเฉพาะอย่างยิ่งบนดาวที่มีมหาสมุทร\n\nจำเป็นต้องศึกษาต่อไป"
  ancrel.9340.name:0 "น้ำจากต่างโลก"
  ancrel.9340.desc:1 "คำตอบของหลุมปริศนาบนพื้นมหาสมุทรถูกค้นพบจากการวิเคราะห์น้ำเอง ร่องรอยของแร่ธาตุและองค์ประกอบทางเคมีบางอย่างพิสูจน์ว่าน้ำนี้ไม่ได้เป็นของดาวดวงเดียวกัน แต่น้ำถูกขนย้ายมาที่นี่ในรูปแบบก้อนน้ำแข็งขนาดมหึมาที่ถูกโยนลงมาบนดาว ก้อนน้ำแข็งเหล่านั้นชน แตกเป็นเสี่ยง ๆ และละลาย กลายเป็นน้ำปกคลุมผิวดาวเกือบทั้งหมด\n\nนี่เป็นโครงการขนาดมหึมาอย่างแท้จริง แต่ไม่มีสิ่งใดบ่งชี้ว่าทำไปเพื่ออะไร"
  ancrel.9345.name:0 "เหตุการณ์ปัจจุบัน"
  ancrel.9345.desc:1 "ยานวิทยาศาสตร์ที่โคจรรอบ [FromFrom.Planet.GetName] ตรวจพบพลังงานลึกลับจากใต้ทะเลลึก และเมื่อสำรวจพบสิ่งก่อสร้างโบราณขนาดหลายกิโลเมตร มีจุดประสงค์เดียวคือสร้างกระแสน้ำใต้น้ำแบบเทียม\n\nการหมุนเวียนของน้ำใต้น้ำสำคัญต่อสิ่งมีชีวิตในทะเล และทฤษฎีปัจจุบันคือดาวนี้ถูกเตรียมไว้ให้สิ่งมีชีวิตสายพันธุ์น้ำที่เดินทางในอวกาศ แต่ดูเหมือนพวกเขาไม่เคยมาถึง"
  ancrel.9350.name:0 "คลังเก็บใต้น้ำ"
  ancrel.9350.desc:1 "จากการติดตามสัญญาณพลังงานประหลาด คณะสำรวจของเราพบชุดสื่อสารของเอเลี่ยนฝังลึกในพื้นทะเล ภายในมีข้อมูลบางส่วน และเมื่อแปลแล้วพบว่าเป็นโครงการเติมน้ำให้ดาว\n\nตามคำแปล โครงการสร้างมหาสมุทรนี้มีจุดประสงค์เพื่อสร้างคลังเก็บขนาดมหึมาใต้น้ำ แต่ไม่ได้ระบุว่าต้องเก็บอะไร สิ่งที่ต้องใช้ดาวทั้งดวงที่ปกคลุมด้วยน้ำคงไม่ธรรมดาแน่"
  ancrel.9355.name:0 "ควบคุมภูมิอากาศ"
  ancrel.9355.desc:1 "ด้วยความบังเอิญจากการสแกน ยานวิทยาศาสตร์สามารถแยกอาคารโบราณที่ฝังลึกใต้พื้นมหาสมุทรออกมาได้ การนำคณะสำรวจไปถึงที่นั่นยากมาก แต่สิ่งที่พบยิ่งใหญ่\n\nอาคารนี้เคยเป็นศูนย์ควบคุมภูมิอากาศ คอยสั่งการเครื่องจักรปรับสภาพขนาดยักษ์ในวงโคจร เดิมทีนี่คือโครงการเทอร์ราฟอร์มที่ถูกขัดจังหวะ แต่ดูเหมือนโครงการจะคืบหน้าไปไกลแล้ว แม้ไม่มีการควบคุมโดยตรง ธรรมชาติก็ยังเจริญเติบโตและสร้างระบบนิเวศที่เห็นในปัจจุบัน"
  
  site_fossilized_jellyfish:0 "หมู่เกาะจุดกลม"
  site_fossilized_jellyfish_intro:1 "ยานวิทยาศาสตร์ที่โคจรรอบ [From.Planet.GetName] ตรวจพบกลุ่มเกาะเล็กกลม ๆ กระจายอยู่ทั่วดาวมหาสมุทรนี้ มองจากธรณีวิทยาแล้วผิดปกติมาก: ผิวดูเหมือนธรรมชาติ ไม่มีสิ่งก่อสร้างเทียม แต่ทุกเกาะเป็นวงกลมเกือบสมบูรณ์แบบ ต้องลงไปสำรวจเพื่อเก็บข้อมูลเพิ่มเติม"
  ancrel.9360.name:0 "อุโมงค์ใต้เกาะ"
  ancrel.9360.desc:1 "คณะสำรวจที่ลงไปยัง [From.Planet.GetName] เริ่มตรวจสอบหนึ่งในเกาะกลม ๆ และพบสิ่งน่าทึ่ง เกาะนี้มีเครือข่ายอุโมงค์ซับซ้อนอยู่ข้างใต้ คดเคี้ยวผ่านหินมันเยิ้มแปลก ๆ อุโมงค์เหล่านี้กลมและเรียบเสมอกันทั่วทั้งเกาะ ดูเหมือนจะเป็นโครงสร้างธรรมชาติ ไม่ได้ขุดขึ้นโดยตั้งใจ แต่ก็ไม่ได้เกิดจากกระบวนการทางธรณีวิทยาปกติ"
  ancrel.9365.name:0 "อุโมงค์ทุกที่"
  ancrel.9365.desc:1 "เมื่อคณะสำรวจลงลึกเข้าไปในเกาะกลม ๆ ก็พบอีกสองสิ่งสำคัญ: หนึ่ง ทุกเกาะมีผังอุโมงค์ข้างในเหมือนกันเกือบหมด ต่างกันแค่ขนาดเล็กน้อย สอง เกาะเหล่านี้ไม่ใช่เปลือกดาว — แต่มันลอยน้ำ! ชั้นล่างเต็มไปด้วยโพรงก๊าซ ผสมกับหินที่เปราะและพรุน ทำให้เกาะลอยได้"
  ancrel.9370.name:0 "เยลลี่แข็ง"
  ancrel.9370.desc:1 "คำตอบของปริศนาเกาะลอยน้ำไม่ได้อยู่ที่ธรณีวิทยา แต่เป็นชีววิทยา เกาะเหล่านี้จริง ๆ แล้วคือซากแมงกะพรุนยักษ์ที่กลายเป็นฟอสซิล หลายล้านปีก่อนยุคน้ำแข็งทำให้พวกมันตายหมด แล้วซากก็กลายเป็นฟอสซิลเป็นเกาะที่ลอยอยู่ในน้ำทุกวันนี้ ชั้นผิวที่เห็นเหมือนเกาะธรรมชาติจริง ๆ คือเศษซากที่สะสมมานาน แต่ข้างในทั้งหมดเป็นอินทรีย์ล้วน ๆ"
  ancrel.9370.b.evopred: "พื้นดินนี้ดูน่ากินดี"
  ancrel.9375.name:1 "การหลับตามธรรมชาติ"
  ancrel.9375.desc:1 "จริง ๆ แล้วมันไม่ใช่เกาะเลย แต่คือแมงกะพรุน! วงกลมลอยน้ำแต่ละอันคือสิ่งมีชีวิตไม่มีกระดูกสันหลังขนาดยักษ์ และพวกมันก็ยังไม่ตายด้วย สภาพเหมือนฟอสซิลนี้เป็นแค่ช่วงหนึ่งในวงจรชีวิตของมัน ตลอดหลายพันปี เกาะหินเหล่านี้จะปล่อยตะกอนออกมาจนละลายหมด ตะกอนนั้นมีโพลิปจิ๋วที่ในที่สุดจะงอกในน้ำและเข้าสู่ช่วงชีวิตถัดไป"
  ancrel.9380.name:0 "ตัวใหญ่ไปไม่รอด"
  ancrel.9380.desc:1 "มันไม่ใช่เกาะเลย ทั้งหมดคือสิ่งมีชีวิตต่างดาว: แมงกะพรุนที่ถูกนำเข้ามาในระบบนิเวศด้วยเหตุผลบางอย่าง ดูเหมือนการนำเข้าจะไม่เป็นไปตามแผน ตัวใหญ่ส่วนใหญ่ตายและกลายเป็นฟอสซิล — กลายเป็นหมู่เกาะลอยน้ำ — แต่แมงกะพรุนตัวเล็กปรับตัวได้และตอนนี้เจริญรุ่งเรืองในมหาสมุทรทั่วดาว ไม่แน่ว่าพวกมันจะลงเอยเหมือนบรรพบุรุษตัวใหญ่หรือไม่"

  site_popular_rock:1 "หินยอดนิยม"
  site_popular_rock_intro:1 "เซนเซอร์ตรวจพบสัญญาณพลังงานในกลุ่มดาวเคราะห์น้อย ต้องสำรวจเพิ่มเติม"
  ancrel.9385.name:1 "สวัสดี/ลาก่อน"
  ancrel.9385.desc:2 "จากการติดตามร่องรอยพลังงานอ่อน ๆ ซึ่งน่าจะมาจากยานอวกาศ พบว่าดาวเคราะห์น้อยดวงหนึ่งในกลุ่มนี้โดดเด่นเป็นพิเศษ เมื่อตรวจสอบพื้นผิวอย่างใกล้ชิดก็ยืนยันทฤษฎีว่ามีการจราจรอวกาศมาก่อน เพราะพบร่องรอยการลงจอดและบินขึ้นหลายจุดบนผิวหิน\n\nเซนเซอร์ยังตรวจพบโพรงและอุโมงค์ภายในดาวเคราะห์น้อย ซึ่งอาจขุดค้นต่อได้"
  ancrel.9390.name:1 "ก้าวต่อไป"
  ancrel.9390.desc:1 "เมื่อเดินตามอุโมงค์เล็กแคบไปเรื่อย ๆ ทีมสำรวจก็พบกับห้องศักดิ์สิทธิ์ชั้นในสุด เป็นห้องโถงขนาดใหญ่ตกแต่งอย่างประณีตด้วยประติมากรรมแกะสลักจากหินโดยตรง การแปลข้อความศาสนาที่สลักบนผนังเรียกสถานที่นี้ว่า “ก้าวที่เก้า” และดูเหมือนจะเป็นหนึ่งในจุดหมายหลายแห่งของการเดินทางแสวงบุญของสายพันธุ์ผู้สร้าง\n\nถ้านี่คือก้าวที่เก้า แล้วแปดก้าวก่อนหน้าอยู่ที่ไหน? และมีกี่ก้าวหลังจากนี้?"
  ancrel.9395.name:1 "คลังกลางอวกาศ"
  ancrel.9395.desc:1 "เหตุผลที่ดาวเคราะห์น้อยนี้มีผู้มาเยือนมากมายก็ชัดเจนเมื่อทีมสำรวจพบพื้นที่เก็บของและไซโลขนาดใหญ่ขุดเข้าไปในเนื้อหิน ดาวเคราะห์น้อยที่ตายแล้วนี้เคยเป็นคลังเก็บของสำหรับสายพันธุ์เดินทางอวกาศบางกลุ่ม ใช้เติมเชื้อเพลิงและซ่อมบำรุงก่อนส่งยานไปไกลยิ่งขึ้น แสดงถึงสังคมเอเลี่ยนที่ยังไม่มี FTL แต่มีแรงจูงใจสำรวจอวกาศสูงมาก\n\nเหตุใดคลังนี้จึงถูกทิ้งร้างยังไม่ชัดเจน แต่เราก็เก็บวัสดุมาได้เล็กน้อย ใครเจอก็ได้ไป!"
  ancrel.9400.name:1 "ตื่นขึ้นมา"
  ancrel.9400.desc:1 "เมื่อเข้าไปในดาวเคราะห์น้อย ทีมสำรวจพบสิ่งที่น่าทึ่งมาก แคปซูลแช่แข็งที่ถูกทิ้งร้างนับแสนเรียงรายอยู่ในห้องขุดขนาดใหญ่ ทุกแคปซูลถูกเปิดและปิดการทำงานแล้ว ดูเหมือนว่ามันได้ทำหน้าที่ของมันเสร็จสิ้นแล้ว\n\nทฤษฎีปัจจุบันคือดาวเคราะห์น้อยนี้เคยเป็นเหมือนยานขนส่งอาณานิคม ถูกยิงผ่านอวกาศไปยังที่อยู่อาศัยใหม่ที่อุดมสมบูรณ์ เมื่อเข้าใกล้เป้าหมาย ระบบอัตโนมัติจะปลุกผู้โดยสารที่หลับใหล และพวกเขาก็ออกจากดาวเคราะห์น้อยด้วยยานลำเล็กเพื่อไปบ้านใหม่"
  
  site_strange_flows:1 "กระแสประหลาด"
  site_strange_flows_intro:1 "ดาวร้อนที่ควรจะ “ปกติ” กลับทำให้เซนเซอร์ของยานวิทยาศาสตร์รวนอย่างควบคุมไม่ได้\n\nควรศึกษาต่อไป"
  ancrel.9405.name:1 "สัญญาณแห่งการต่อต้าน"
  ancrel.9405.desc:2 "ความผิดปกติที่เกิดจากเซนเซอร์ของยานวิทยาศาสตร์ที่โคจรอยู่ยังเทียบไม่ได้กับปัญหาที่พบบนพื้นผิวของ [From.Planet.GetName] ความผันผวนของสนามแม่เหล็กอย่างรุนแรงจากแหล่งที่ไม่ทราบสาเหตุกำลังทำให้อุปกรณ์รวนไปหมด\n\nการวิจัยความโกลาหะทางแม่เหล็กไฟฟ้านี้จะเป็นงานหนักมาก — แต่ถ้ามีเวลาพอ คำตอบจะปรากฏ"
  ancrel.9410.name:1 "โลหะล้วน ๆ"
  ancrel.9410.desc:2 "เมื่อคณะสำรวจภาคพื้นดินสามารถแก้ปัญหาอุปกรณ์ที่ขัดข้องได้แล้ว ธรรมชาติของความผันผวนแม่เหล็กก็เริ่มเปิดเผยตัวเอง\n\nมหาสมุทรและแม่น้ำลาวาที่เดือดพล่านบน [From.Planet.GetName] แท้จริงแล้วไม่ใช่มาจากหินหนืดธรรมดา — แต่มันคือโลหะหลอมเหลว! โลหะที่อุณหภูมิระดับนี้ปกติจะไม่มีคุณสมบัติแม่เหล็กแรงขนาดนี้ แม้แต่ปริมาณมหาศาลของโลหะหลอมเหลวบน [From.Planet.GetName] ก็ไม่ควรสร้างสนามแม่เหล็กได้ขนาดนี้ แล้วอะไรคือสาเหตุ?"
  ancrel.9415.name:1 "ร่องรอยของดาวนิวตรอน"
  ancrel.9415.desc:2 "ยานวิทยาศาสตร์ที่โคจรรอบ [FromFrom.Planet.GetName] ในที่สุดก็ไขปริศนาความผันผวนแม่เหล็กบนดาวนี้ได้\n\nเมื่อหลายล้านปีก่อน ดาวดวงนี้เคยเข้าใกล้ดาวนิวตรอนชนิดพิเศษ สนามแม่เหล็กของดาวนิวตรอนนั้นทำให้โลหะภายใน [FromFrom.Planet.GetName] เดือดกลายเป็นมหาสมุทรโลหะหลอมเหลวอย่างที่เห็นในปัจจุบัน สนามแม่เหล็กไฟฟ้าที่เราพบเป็นเพียงเสียงสะท้อนที่หลงเหลือจากเหตุการณ์หายนะครั้งนั้น\n\nตอนนี้ดาวนิวตรอนนั้นอยู่ที่ไหนยังเป็นปริศนา — และเป็นปริศนาที่น่ากังวล"
  ancrel.9420.name:1 "โดนช็อต!"
  ancrel.9420.desc:2 "การไม่สนใจกฎฟิสิกส์ปกติอย่างสิ้นเชิงทำให้ฝ่ายวิทยาศาสตร์ของเราต้องพิจารณา “แรงภายนอก” เป็นคำอธิบายสำหรับคุณสมบัติประหลาดของ [FromFrom.Planet.GetName]\n\nหลุมอุกกาบาตขนาดใหญ่ — ร่วมกับร่องรอยอนุภาคจากเครื่องยนต์ฟิวชันที่พบในวงโคจร — บ่งชี้ว่าดาวนี้เคยถูกยิงด้วยอาวุธไฟฟ้าขนาดมหึมาบางอย่าง ผลกระทบรุนแรงจนโลหะทั้งหมดบนดาวหลอมละลาย และดาวยังคงเต็มไปด้วยไฟฟ้าสถิตตกค้าง\n\nอะไรที่ทำให้ต้องโจมตีรุนแรงขนาดนี้? เราคงไม่มีวันรู้"
  ancrel.9425.name:1 "เพื่อวิทยาศาสตร์!"
  ancrel.9425.desc:1 "เมื่อเซนเซอร์ถูกปรับแต่งใหม่ให้ชดเชยสัญญาณรบกวนได้ ก็มีการค้นพบใหม่: สถานีวิจัยร้างบนดวงจันทร์ใกล้เคียง กู้ข้อมูลได้เพียงเศษเสี้ยวจากบันทึกที่เกือบไหม้หมด รายละเอียดกล่าวถึงการทดลองแม่เหล็กยักษ์เทียมบนผิวดาว\n\nการทดลองนั้น “สำเร็จ” เกินไป มันเปลี่ยนเปลือกโลหะทั้งดาวให้กลายเป็นแอ่งโลหะหลอมเหลวที่มีประจุแม่เหล็กไฟฟ้ารุนแรงจนเผาสถานีวิจัยพังในทันที\n\n...ไม่มีความก้าวหน้าใดได้มาโดยไม่เสียสละ"


  ancrel.6000.name:0 "Omnicodex"
  ancrel.6000.desc:0 "Omnicodex นี้บรรจุข้อมูลพันธุกรรมโดยละเอียดของสายพันธุ์มีสติปัญญาหลายพันสายพันธุ์ที่เคยอาศัยอยู่ในกาแล็กซี่ นักพันธุศาสตร์ของเราสามารถใช้ข้อมูลนี้เพื่อชุบชีวิตสายพันธุ์ที่สูญพันธุ์ไปแล้วบนหนึ่งในดาวของเรา\n\nเมื่อเราเลือกดาวแล้ว นักพันธุศาสตร์จะค้นหาใน Omnicodex และเลือกสายพันธุ์ที่เหมาะสมกับสภาพภูมิอากาศของดาวนั้น"
  ancrel.6000.a:0 "[planet_option_1.GetName]"
  ancrel.6000.a.tooltip:0 "§G300§! £pop£ §HPops§! ของสายพันธุ์ใหม่ที่มีคุณลักษณะสุ่มจะเกิดบน §Y[planet_option_1.GetName]§!"
  ancrel.6000.b:0 "[planet_option_2.GetName]"
  ancrel.6000.b.tooltip:0 "§G300§! £pop£ §HPops§! ของสายพันธุ์ใหม่ที่มีคุณลักษณะสุ่มจะเกิดบน §Y[planet_option_2.GetName]§!"
