  ancrel.8003.a:0 "ปิดกริดนั้น"
  ancrel.8003.b:0 "ต้องหาทางรอบมัน"
  
  ancrel.8010.intro:0 "นักโบราณคดีของเราใน [From.Planet.GetName] โดยบังเอิญเปิดใช้งานปืนประจำที่โบราณแต่ยังทำงานได้"
  ancrel.8010.critical:0 "ปืนอัตโนมัติยิง §H[dead_scientist.GetName]§! และ [Root.Owner.GetArchaeologistPlural] อีกหลายคนก่อนที่จะปิดได้"
  ancrel.8010.failure:0 "หลาย [Root.Owner.GetArchaeologistPlural] ถูกยิง §H[Root.GetLeaderName]§! สามารถปิดปืนได้ แต่มีผู้เสียชีวิตหลายราย"
  ancrel.8010.success:0 "โชคดีที่ §H[Root.GetLeaderName]§! ปิดปืนอัตโนมัติก่อนเกิดอันตราย"
  ancrel.8010.pay:0 "ไม่มีผู้ใดได้รับบาดเจ็บ แต่ปืนขวางทางเดิน หากปิดไม่ได้ นักโบราณคดีจะต้องหาทางอ้อม"
  ancrel.8010.name:0 "ปืนประจำที่ถูกเปิดใช้งาน"
  ancrel.8010.desc:0 "$ancrel.8010.intro$\n\n$ancrel.8010.critical$"
  ancrel.8011.desc:0 "$ancrel.8010.intro$\n\n$ancrel.8010.failure$"
  ancrel.8012.desc:0 "$ancrel.8010.intro$\n\n$ancrel.8010.success$"
