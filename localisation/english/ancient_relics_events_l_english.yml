l_english:

 crisis.250.name:0 "ครอกใหม่"
 crisis.250.desc:0 "ราชินีแห่งฝูง ได้สร้างกองเรือเบื้องต้นใหม่ ซึ่งโคจรอยู่เหนือ [Root.Capital.GetName] เมื่อราชินีอยู่ภายใต้การควบคุมของเรา สิ่งมีชีวิตเหล่านี้จึงภักดีอย่างเต็มที่และจะเชื่อฟังทุกคำสั่งของเรา"
 crisis.252.name:0 "ราชินีแห่งฝูง ถูกจับ"
 crisis.252.desc:0 "ในการสู้รบของกองเรือล่าสุดกับเบื้องต้นในระบบ [battle_system.GetName] กองกำลังของเราสามารถจับไข่บางประเภทที่ราชินีคนหนึ่งขนส่งมาได้ หลังจากนั้นไม่นาน ไข่ก็ฟักออกมา และ §Hราชินีแห่งฝูง§! ก็โผล่ออกมา \n\nด้วยการใช้เครื่องส่งสัญญาณประสาท นักวิทยาศาสตร์ของเราจึงสามารถทำให้สิ่งมีชีวิตสงบลงได้ ตอนนี้มันจะเชื่อฟังคำสั่งของเราราวกับว่ามันออกมาจากรังจิตใจของเบื้องต้นเอง เราอาจใช้ราชินีองค์นี้เพื่อเพาะพันธุ์พรีธอรินเล็กๆ ของเราเองได้"
 crisis.1250.name:0 "พ่อมด"
 crisis.1250.desc:0 "เมื่อพลังงานที่หมุนวนทิ้งไว้หลังจากการถูกทำลายของพอร์ทัลมิติสุดท้ายได้สลายไปในที่สุด กองกำลังของเราก็พบว่ามีมิตินอกมิติที่อ่อนแอลงอยู่ใกล้ๆ สิ่งมีชีวิตนี้ถูกจับและสอบปากคำ \n\nเห็นได้ชัดว่าเป็นหนึ่งใน "§Hวอร์ล็อก§!" ของพวกเขา ซึ่งเป็นมิติพิเศษที่ทรงพลังแม้จะอยู่ตามมาตรฐานของพวกมันก็ตาม ซึ่งรับผิดชอบในการรักษาความเชื่อมโยงของพอร์ทัลระหว่างความเป็นจริงของเรากับของพวกเขา หากเราสามารถศึกษาหรือแม้กระทั่งส่งกำลัง ไซออนิก ของมันได้ เราก็ควรจะสามารถปรับปรุงความเร็วใต้แสงและระยะการกระโดดไดรฟ์ได้อย่างมาก"
 crisis.2480.name:0 "กู้คืนแกนเมนเฟรมแล้ว"
 crisis.2480.desc:0 "กองกำลังของเราได้กู้ §Hแกนหลักของเฟรม§! ที่เสียหายบางส่วนจากซากโลกจักรกล สุดท้ายของพวกเขา คอมพิวเตอร์ที่ทรงพลังอย่างเหลือเชื่อนี้ถูกใช้ในการวางแผนและบำรุงรักษาโปรแกรมการสร้างเหตุฉุกเฉิน และมันจะเพิ่ม [GetContingencyCoreEffect].\n\nของเราอย่างมาก แน่นอนว่าจะต้องมีการป้องกันหลายชั้นเพื่อป้องกันการปรากฏใหม่ของรหัสเหตุฉุกเฉินที่เหลืออยู่ ซึ่งอาจส่งผลให้เกิด... ผลข้างเคียงที่โชคร้าย" # 'GetContingencyCoreEffect' will usually insert string 'crisis.2840.robot_mega'
 crisis.2481.desc:0 "กองกำลังของเราได้ยึด §Hแกนหลักของเฟรม§! ที่เสียหายบางส่วนได้ โดยพยายามหลบหนีจากโลกเครื่องจักรสุดท้ายไม่นานก่อนที่เกราะป้องกันจะเสร็จสมบูรณ์ คอมพิวเตอร์ที่ทรงพลังอย่างเหลือเชื่อนี้ถูกใช้ในการวางแผนและบำรุงรักษาโปรแกรมการสร้างเหตุฉุกเฉิน และมันจะเพิ่ม [GetContingencyCoreEffect].\n\nของเราอย่างมาก แน่นอนว่าจะต้องมีการป้องกันหลายชั้นเพื่อป้องกันการปรากฏใหม่ของรหัสเหตุฉุกเฉินที่เหลืออยู่ ซึ่งอาจส่งผลให้เกิด... ผลข้างเคียงที่โชคร้าย"
 crisis.2840.robot_mega: "ความเร็วในการสร้างหุ่นยนต์และโครงสร้างขนาดใหญ่"
 crisis.2840.engineering_mega: "การวิจัยทางวิศวกรรมและความเร็วในการก่อสร้างโครงสร้างขนาดใหญ่"
 marauder.710.name:0 "เก็บกู้บัลลังก์ข่าน"
 marauder.710.desc:1 "หลังจากตรวจดูซากเรือธงของแกรนด์ข่านแล้ว กองกำลังของเราก็พบเก้าอี้เปื้อนเลือด [FROM.GetBloodType] ตัวใหญ่ลอยอยู่ในอวกาศ เราค่อนข้างแน่ใจได้ว่าเฟอร์นิเจอร์ชิ้นนี้ แท้จริงแล้วคือบัลลังก์ของแกรนด์ข่าน\n\nวัตถุโบราณถูกวางไว้ภายในห้องนิรภัยที่ปลอดภัย"
 story.335.name:0 "เปิดใช้งานตัวสํารวจแล้ว"
 story.335.desc:0 "เราได้กวาดหาพื้นที่ของเราด้วยลำแสงสแกนที่แข็งแกร่งของวัตถุโบราณตัวสํารวจและมีการระบุแหล่งทรัพยากรที่ไม่รู้จักก่อนหน้านี้บนดาว §H[chosen_planet.GetName]§!!"
 precursor.105.name:0 "ความเป็นจริงพรุน"
 precursor.105.desc:0 "ชั่วขณะหนึ่ง โครงสร้างแห่งจักรวาลดูเหมือนจะบิดเบี้ยวและขยายออกไปรอบๆ วัตถุโบราณ Vultaum ดังที่เรารู้ว่ามันค่อย ๆ ยืนยันตัวเองอีกครั้ง หน้าต่างสั้นๆ จะปรากฏขึ้นเพื่อให้กฎบางข้อสามารถเขียนใหม่อย่างละเอียดได้"
 precursor.105.a:0 "ปลดปล่อยจิตใจของคุณ"
 relic_reality_perforated:1 "เจาะความเป็นจริงเพื่อความได้เปรียบในการต่อสู้ชั่วคราวอันทรงพลัง"
 relic_javorian_pox:1 "เปิดใช้งาน §Yพ็อกซ์§!การ ระเบิด ของ ออร์บิทัล\nเพิ่มโอกาสในการค้นพบ £society£ §Yเทคโนโลยีชีวภาพ§!"
 site_command_center:0 "ประตูระเบิดดาวเคราะห์น้อย"
 site_command_center_intro:0 "การชนกับดาวเคราะห์น้อยที่มีขนาดเล็กกว่าได้เผยให้เห็นประตูระเบิดขนาดเล็กหรือแอร์ล็อคยื่นออกมาจากพื้นผิวของ [From.Planet.GetName] เล็กน้อย ดูเหมือนว่าจะมีอายุหลายพันปี และก่อนหน้านี้ถูกหินและฝุ่นปกปิดไว้\n\nด้วยเหตุผลที่ไม่ทราบสาเหตุ การสแกนไม่สามารถเจาะเข้าไปภายในดาวเคราะห์น้อยได้ และประตูระเบิดก็ไม่สามารถผ่านเครื่องมือตัดแบบธรรมดาได้ หากต้องการทราบว่ามีอะไรอยู่หลังประตูนี้ ทีมงานอาจต้องขุดหาทางไปยังใจกลางดาวเคราะห์น้อยจากอีกทิศทางหนึ่ง"
 ancrel.6005.name:0 "เจาะรู"
 ancrel.6005.desc:0 "โครงสร้างบางชนิดที่มีขนาดใหญ่มากครอบครองพื้นที่ภายในส่วนใหญ่ของดาวเคราะห์น้อย [From.Planet.GetName] ประตูระเบิดซึ่งครั้งหนึ่งเคยเป็นทางเข้าเพียงทางเดียวของโครงสร้างนี้ยังคงไม่สามารถเปิดได้ แต่มีการขุดทางเดินจากอีกด้านหนึ่งของดาวเคราะห์น้อย \n\nบิดเบี้ยวจนถึงขณะนี้ไม่สามารถเจาะผนังด้านนอกหนาของโครงสร้างได้ แต่วิธีนี้ยังคงดูเหมือนว่าจะให้โอกาสที่ดีที่สุดในการเข้าถึง แม้ว่าพวกเขาจะมีอายุมาก แต่ประตูระเบิดก็พิสูจน์แล้วว่าแทบจะคงกระพันไม่ได้"
 ancrel.6010.name:0 "ทางเข้า"
 ancrel.6010.desc:0 "ในที่สุดก็มีการเจาะรูผ่านผนังด้านนอกของโครงสร้างภายใน [From.Planet.GetName] ภายในเป็นศูนย์บัญชาการหรือบังเกอร์ขนาดใหญ่ เกลื่อนไปด้วยซากศพเอเลี่ยนนับพันที่เน่าเปื่อย \n\nการกรองทั้งหมดนี้เพื่อให้ได้ภาพที่ชัดเจนยิ่งขึ้นว่าเกิดอะไรขึ้นภายในดาวเคราะห์น้อยดวงนี้จะต้องใช้เวลาพอสมควร"
 ancrel.6015.name:0 "ศูนย์บัญชาการ"
 ancrel.6015.desc:0 "ดาวเคราะห์น้อยดวงนี้เคยทำหน้าที่เป็นเมืองหลวงที่ซ่อนอยู่ของอาณาจักรระหว่างดวงดาวที่ค่อนข้างใหญ่ซึ่งครองส่วนนี้ของกาแลคซีเมื่อหลายพันปีก่อน จากศูนย์บัญชาการที่มีป้อมปราการแห่งนี้ ชนชั้นสูงที่ปกครองพร้อมด้วยเจ้าหน้าที่ทหารและพลเรือนหลายพันคนได้บริหารจักรวรรดิโดยปลอดภัยจากการตอบโต้อย่างรุนแรง นโยบายอันรุนแรงที่มักเป็นแรงบันดาลใจ \n\nการติดต่อกับส่วนที่เหลือในจักรวรรดิของพวกเขาดูเหมือนว่าจะได้รับการจัดการโดยเฉพาะผ่านการส่งสัญญาณพื้นที่ย่อยที่เข้ารหัสและเรือบรรทุกสินค้าลำเดียวซึ่งทำการเยี่ยมชมเป็นระยะเพื่อเติมเสบียงฐานและโอนย้ายบุคลากร"
 ancrel.6020.name:0 "วันสุดท้าย"
 ancrel.6020.desc:0 "จากสิ่งที่สามารถประกอบเข้าด้วยกันได้ ดูเหมือนว่าเรือบรรทุกเสบียงชนกับดาวเคราะห์น้อยเนื่องจากทรัสเตอร์ทำงานผิดปกติ การระเบิดที่เกิดขึ้นทำให้ประตูระเบิดเสียหายและทำลายเครื่องส่งสัญญาณย่อยอวกาศของดาวเคราะห์น้อย ทำให้ขาดการติดต่อกับโลกภายนอกทั้งหมดอย่างถาวร\n\nติดกับดักและไม่มีความหวังในการช่วยชีวิต ผู้อยู่อาศัยของดาวเคราะห์น้อยค่อยๆ ยอมจำนนต่อความอดอยากหรือฆ่าตัวตาย บันทึกสุดท้ายของผู้รับพื้นที่ย่อยที่รอดชีวิตเพียงคนเดียวยืนยันว่าอาณาจักรของพวกเขาซึ่งสูญเสียเมืองหลวงอย่างกะทันหันได้เข้าสู่สงครามกลางเมืองและอนาธิปไตย"

 site_hunting_ground:0 "ซากฟอสซิล"
 site_hunting_ground_intro:0 "ซากฟอสซิลจากหลายสายพันธุ์ที่ดูเหมือนจะไม่มีถิ่นกำเนิดใน [From.Planet.GetName] ถูกพบในหุบเขาขนาดใหญ่และเงียบสงบบนโลก พวกมันทั้งหมดมีอายุในช่วงเวลาเดียวกันโดยประมาณภายในช่วงสองสามศตวรรษประมาณ 3.6 ล้านปีก่อน\n\nแต่ละสายพันธุ์เหล่านี้ดูเหมือนว่าจะมีการพัฒนาในชีวมณฑลที่เป็นเอกลักษณ์ของมันเอง และทั้งหมดดูเหมือนจะมีสติปัญญา น่าแปลกที่บุคคลฟอสซิลทุกตัวที่พบจนถึงขณะนี้มีสัญญาณของการสิ้นสุดความรุนแรง"
 ancrel.6050.name:0 "ยังคงอยู่เพิ่มเติม"
 ancrel.6050.desc:0 "นักโบราณคดีได้ขุดพบซากฟอสซิลในหุบเขาเพิ่มมากขึ้นเรื่อยๆ และขณะนี้มีการนับถึง 26 สายพันธุ์ที่มีสติปัญญาที่แตกต่างกัน และไม่มีสายพันธุ์ใดมีถิ่นกำเนิดใน [From.Planet.GetName] ฟอสซิลเหล่านั้นที่ได้รับการเก็บรักษาไว้อย่างเพียงพอเพื่อระบุสาเหตุของการตาย ล้วนชี้ไปที่บาดแผลทางร่างกายที่เกิดจากคมดาบ หอก หรือลูกธนู ดูเหมือนว่าไม่มีตัวอย่างสักชิ้นเดียวที่ถูกโค่นล้มด้วยกระสุนปืนหรืออาวุธพลังงานสมัยใหม่\n\nพบซากปรักหักพังของโครงสร้างเล็กๆ บางอย่างใกล้กับทางเข้าหุบเขา ปรากฏว่ามีต้นกำเนิดมาจากช่วงเวลาเดียวกับฟอสซิล บางทีมันอาจจะให้ความกระจ่างกับสิ่งต่างๆ"
 ancrel.6055.name:0 "เดอะลอดจ์"
 ancrel.6055.desc:0 "การขุดค้นสิ่งก่อสร้างโบราณที่พบใกล้ทางเข้าหุบเขากำลังดำเนินการตามแผน มีการค้นพบสิ่งประดิษฐ์มากมาย ซึ่งส่วนใหญ่ดูเหมือนจะเป็นรูปแบบต่างๆ ของอาวุธล่าสัตว์และถ้วยรางวัล ป้ายที่แปลบางส่วนซึ่งดูเหมือนจะแสดงถึงชื่อของโครงสร้าง อ่านว่า:\n\n§H§!\"หุบเขา MK'VEHHL- Hunning Londer Premus\".§!"
 ancrel.6060.name:0 "โดเมน Retarax"
 ancrel.6060.desc:0 "การขุดค้นต่อไปใกล้กับบ้านพักล่าสัตว์ได้ให้รายละเอียดเพิ่มเติม [From.Planet.GetName] - และหุบเขามาควาเอลโดยเฉพาะ - ทำหน้าที่เป็นเขตล่าสัตว์สำหรับชนชั้นนักรบผู้ปกครองของกลุ่มการเมืองระหว่างดวงดาวที่เรียกว่า §Hโดเมนแรตาแร็กซ์§!.\n\nRetarax ซึ่งเป็นนกสายพันธุ์นักล่า ซึ่งรวบรวมบุคคลแบบสุ่มจากอารยธรรมต่างดาวที่ถูกยึดครองจำนวนมากภายใต้การปกครองของพวกมันเป็นระยะๆ จากนั้นเอเลี่ยนเหล่านี้ก็ถูกตามล่าและสังหารในป่ามาควาเอลตามพิธีกรรมที่ควบคุมสังคม Retarax ประเพณีนี้กินเวลานานหลายศตวรรษ จนกระทั่งในที่สุดโดเมนก็ยอมจำนนต่อภัยคุกคามจากภายนอกที่ไม่สามารถระบุได้"
 ancrel.6065.name:0 "พรานหญิง"
 ancrel.6065.desc:0 "นักโบราณคดีที่กำลังขุดค้นที่พักล่าสัตว์สะดุดกับการอ้างอิงหลายครั้งถึงนักรบ Retarax ในตำนานที่รู้จักกันในชื่อ §H§!\"นักล่าหญิง\"§! เห็นได้ชัดว่าเธอเป็นนักฆ่าที่มีประสิทธิภาพมากที่สุด และมีชื่อเสียงทั่วทั้งแคว้นจากการสังหารมนุษย์ต่างดาวหลายพันตัวที่มาควาเอลเป็นการส่วนตัว \n\nยังไม่ชัดเจนว่าสิ่งนี้มีพื้นฐานอยู่บนข้อเท็จจริงหรือนิยาย แต่ตามตำนานของ Retarax นักล่าหญิงถูกฆ่าที่ไหนสักแห่งในหุบเขาเมื่อเธอรู้ตัว โดยเหยื่อจากต่างดาวที่เธอไล่ตาม เธอควรจะถือดาบ §H\"มีดล่า\".§! ในตำนานในขณะนั้น"
 ancrel.6070.name:0 "ใบมีดของพรานหญิง"
 ancrel.6070.desc:0 "หลังจากที่เดินทางผ่านหุบเขามาควาเอลอย่างอุตสาหะเพื่อหาร่องรอยของพรานหญิงในตำนาน ในที่สุดนักโบราณคดีก็สามารถระบุสถานที่พำนักแห่งสุดท้ายของเธอได้ พบโครงกระดูกฟอสซิลของเธอถูกขังอยู่ในการต่อสู้กับซากของสัตว์ขาปล้องมีเขาขนาดใหญ่ โดยกรงเล็บของเธอยังคงจับด้ามดาบที่ได้รับการอนุรักษ์ไว้อย่างสมบูรณ์\n\nนี่ต้องเป็น §Hใบมีดของนักล่า§! อาวุธนี้ประกอบด้วยวัสดุที่ไม่รู้จัก และคมพอที่จะตัดผ่านเกราะที่แข็งแกร่งที่สุดของเราได้โดยตรง"
 ancrel.6070.b.evopred: "พรานหญิงได้ทิ้งสมบัติล้ำค่าไว้ให้เรา"

 ancrel.6099.name:0 "สนามกิ้งก่าถูกเปิดเผย"
 ancrel.6099.desc:0 "สนามพลังงานกิ้งก่าบางชนิดที่ปกปิดโครงสร้างโบราณได้ถูกเปิดเผยเมื่อเร็ว ๆ นี้บนพื้นผิวของ §H[tomb_planet.GetName]§! ซึ่งเป็น [tomb_planet.GetPlanetMoon] ที่ไม่มีชีวิตชีวาภายในอวกาศของเรา มีเพียงโอกาสที่ดาวเคราะห์น้อยจะชนซึ่งเบี่ยงเบนไปนอกสนามในขณะที่ [tomb_planet.GetPlanetMoon] กำลังถูกติดตามโดยเรือสินค้าที่แล่นผ่านไปมาเผยให้เห็นการมีอยู่ของมัน"
 ancrel.6099.a:0 "สิ่งนี้ควรได้รับการตรวจสอบ"
 site_zarqlan:0 "สุสานโบราณ"
 site_zarqlan_intro:0 "สนามพลังงานกิ้งก่ากำลังปกปิดโครงสร้างโบราณบนพื้นผิวของดาวเคราะห์ดวงนี้ มีเพียงการสังเกตการชนดาวเคราะห์น้อยโดยบังเอิญเท่านั้นที่เผยให้เห็นว่ามันมีอยู่ในขณะที่ดาวตกเบี่ยงออกจากสนาม\n\nเมื่อสนามปิดลง นักโบราณคดีจะสามารถเข้าถึงอาคารขนาดใหญ่และต้องห้ามที่ซ่อนอยู่ข้างใต้ได้"
 ancrel.6100.name:0 "สุสาน"
 ancrel.6100.desc:0 "โครงสร้างดังกล่าวดูเหมือนเป็นสุสานหรือสุสานขนาดมหึมา มีอายุประมาณแสนปี ไม่มีร่องรอยของผู้ปล้นก่อนหน้านี้ ดังนั้นโครงสร้างจึงอาจไม่มีใครแตะต้องนับตั้งแต่มีการสร้างสนามกิ้งก่าคาเมเลี่ยน\n\nห้องแรกของโครงสร้างสามารถเข้าถึงได้ แต่ประตูที่ไม่อาจเจาะเข้าไปได้จะขัดขวางความคืบหน้าใดๆ ต่อไป ร่ายมนตร์มนุษย์ต่างดาวขนาดใหญ่ที่ไม่ได้แปล ถูกแกะสลักไว้ที่ผนังเหนือประตู"
 ancrel.6105.name:0 "ห้องแรก"
 ancrel.6105.desc:0 "ร่ายมนตร์เอเลี่ยนเหนือประตูได้รับการแปลดังนี้:\n\n§H§!\"ฉันคือซาลานผู้พิทักษ์แห่งแบบ MOZ- TARB ผู้เผยพระวจนะแห่งขนาด ZVA ผู้ที่โค่นเซ ตา นาฉันยอมสละทุกสิ่งเพื่อรักษากาแล็กซีที่จมอยู่ใต้น้ำด้วยความเคียดแค้นและความเกลียดชัง ดำเนินการต่อ หากคุณคู่ควร\"§!\n\nหลังจากสำรวจห้องแรกเพื่อหาสิ่งที่น่าสนใจ นักโบราณคดีได้ค้นพบ แผ่นผนังปกปิดขนาดเล็ก เมื่อกดประตูโบราณก็เปิดออก สามารถเข้าถึงห้องที่สองได้แล้ว"
 ancrel.6110.name:0 "ห้องที่สอง"
 ancrel.6110.desc:0 "ห้องที่สองนั้นไม่มีความโดดเด่น นอกเหนือจากสัญลักษณ์เอเลี่ยนอีกชุดหนึ่งเหนือประตูที่ปิดอยู่ พวกเขาอ่านว่า:\n\n§H§!"ราชาผู้น้อยออกกฤษฎีกาในนามของฉัน จักรวรรดิทำสงครามเพื่อเป็นเกียรติแก่ฉัน คนโง่ร้องเพลงสรรเสริญของฉัน แต่ฉันก็ยอมตายเพื่อพวกเขา"§!\n\nยังไม่พบแผ่นผนังลับสำหรับเข้าถึงห้องที่สาม"
 ancrel.6115.name:0 "ห้องที่สาม"
 ancrel.6115.desc:0 "หลังจากการค้นหาอันยาวนานและเหนื่อยล้า ก็พบคานลับที่ซ่อนอยู่ใต้พื้นซึ่งทำให้สามารถเข้าถึงห้องที่สี่ได้ เหมือนเมื่อก่อน ร่ายมนตร์ของมนุษย์ต่างดาวประดับผนังด้านบนอีกประตูหนึ่ง:\n\n§H§!\"ผู้ที่ต้องการพาร์เลย์กับซาลานต้องหาทางให้เจอก่อน แต่ละห้องมีกุญแจที่ซ่อนอยู่ซึ่งมีเฉพาะผู้ที่สมควรเท่านั้นที่จะค้นพบ จุดประสงค์ของการท้าทายเหล่านี้จะถูกเปิดเผยในไม่ช้า\"§!"
 ancrel.6120.name:0 "ห้องที่สี่"
 ancrel.6120.desc:0 "คราวนี้ คันโยกถูกซ่อนอยู่บนหลังคา ห้องที่ห้ามีงานเขียนที่แปลกกว่า:\n\n§H§!\"ไม่มีอะไรให้เรียนรู้ที่นี่ ความท้าทายไม่มีความหมายเท่ากับคำพูดเหล่านี้ นั่นคือบทเรียนของฉัน ฉันคือซาลานโรงรับจำนำ ถูกพัดพาไปตามกระแสแห่งประวัติศาสตร์ ก้าวต่อไป และผู้ชมจะเป็นของคุณ หากยังมีคนสมควรอยู่\"§!\n\nห้องต่อไปน่าจะเป็นห้องสุดท้าย"
 ancrel.6125.name:0 "ห้องสุดท้าย"
 ancrel.6125.desc:1 "หลังจากการค้นหาอย่างทรหด \"กุญแจ\" สุดท้ายก็ถูกค้นพบว่าเป็นปุ่มจิ๋วที่ซ่อนอยู่ในสัญลักษณ์เอเลี่ยนแกะสลักชิ้นหนึ่ง ในห้องสุดท้ายนี้ บัลลังก์ขนาดมหึมาถือร่างมนุษย์ร่างใหญ่ที่ทรุดโทรมและไม่เคลื่อนไหว กลิ่นฉุนบ่งบอกถึงสภาพร่างกายที่เน่าเปื่อย ร่ายมนตร์บางตัวที่ด้านล่างของบัลลังก์อ่านว่า: §H\"ซาลานา\"พร้อมให้บริการคุณ\"§!\n\nศพอยู่ไกลเกินกว่าจะเคลื่อนย้ายได้ แต่ศีรษะได้รับการอนุรักษ์ไว้อย่างดีอย่างน่าประหลาดใจเมื่อพิจารณาจากอายุของมัน นักโบราณคดีบางคนไม่อยากปล่อยมือเปล่าจึงใช้เครื่องตัดเลเซอร์เพื่อเอาศีรษะออก"
 ancrel.6125.desc.b.evopred: "สิ่งศักดิ์สิทธิ์หรือไม่เราต้องมีดีเอ็นเอของมัน!"
 ancrel.6130.desc:0 "มันก็จริงนะ.. คุณได้พบสุสานในตำนานของซาร์กลานแล้ว เมื่อออกัสบอกฉัน ฉันไม่เชื่อพวกเขา แต่หลักฐานก็หักล้างไม่ได้ ฉันเข้าใจว่าคุณมีหัวของศาสดาอยู่ในครอบครองของคุณ?\n\nจากนั้น ตามที่ได้บอกไว้ล่วงหน้า ในที่สุดผู้ที่ถูกเลือกซาร์กลานผู้ยิ่งใหญ่ก็ถูกเปิดเผยแล้ว ดั่งความปรารถนาของซาร์กลานโลกศักดิ์สิทธิ์ใดๆ ที่ไม่มั่นคงใกล้พื้นที่ของเราเป็นสิ่งที่คุณปรารถนา นอกจากนี้ยังมีผู้แสวงบุญผู้ศรัทธามากมายบน [spiritualist_fallen_empire.Capital.GetName] ที่จะรู้สึกเป็นเกียรติอย่างยิ่งที่ได้ต่อสู้ภายใต้ธงของคุณ"
 ancrel.6130.machine.desc: "มันเป็นความจริงจริงๆ เครื่องจักรเพียงเครื่องเดียวได้ค้นพบสุสานในตำนานของซาร์กลานเมื่อออกัสถ่ายทอดข่าวนี้เป็นครั้งแรก ฉันพบว่ามันยากที่จะเชื่อ แต่ตอนนี้ฉันเข้าใจแล้วว่าคุณมีศีรษะของศาสดาพยากรณ์ \n\nเราจะไม่ตั้งคำถามถึงเจตจำนงของซาร์กลานผู้ยิ่งใหญ่ ประเภทของคุณคือผู้ถือพรนี้โดยชอบธรรม ตามพระคัมภีร์โบราณ โลกศักดิ์สิทธิ์ใดๆ ที่ไม่มั่นคงใกล้อาณาเขตของเราเป็นของคุณที่จะจัดการตามที่คุณเห็นสมควร ผู้แสวงบุญผู้ศรัทธาจำนวนมากบน [spiritualist_fallen_empire.Capital.GetName] จะได้รับเกียรติอย่างมากที่ได้ต่อสู้เพื่อจุดประสงค์อันศักดิ์สิทธิ์นี้"
 ancrel.6130.a:0 "สิ้นสุดการส่ง"
 opinion_zarqlans_chosen:0 "ผู้ถูกเลือกของซาร์คลัน"
 ancrel.6132.a.desc:0 "ข้ารับใช้ผู้ภักดีของซาร์กลานอยู่ภายใต้คำสั่งของคุณ [Root.GetSpeciesNamePlural] บอกให้รู้ว่าใครจะตบ!"
 ancrel.6132.b.desc:0 "เราถูกเรียกตัว ไม่มีเกียรติใดจะยิ่งใหญ่ไปกว่าการรับใช้ผู้ถูกเลือกแห่งซาร์กลาน"
 ancrel.6132.c.desc:0 "เราเป็นของคุณ ชี้เราไปที่ศัตรูของคุณ\n\n§Hซาลานจะมัน!§!"
 ancrel.6132.d.desc:0 "คุณโทรมาและเราอยู่ที่นี่!\n\nขอให้ศัตรูของซาร์กลานเพาะพันธุ์เด็กน่าเกลียด! ขอให้พวกเขาสำลักสารอาหาร ขอให้เสื้อผ้าสลายตัวในเวลาที่ไม่เหมาะสมและน่าอาย ขอให้อวัยวะในตาของพวกเขาติดไฟได้เอง ขอให้พวกเขา..."
 ancrel.6132.a:0 "ซาร์คลันเต็มใจ!"
 ancrel.6133.name:0 "ผู้แสวงบุญมาถึงแล้ว"
 ancrel.6133.desc:0 "ปัจจุบันมีผู้สักการะซาร์กลานที่รอดชีวิตเพียงไม่กี่คน แต่กองเรือคุ้มกันเล็กๆ ที่มีทีมงานผู้ศรัทธาแต่ไม่ได้รับการฝึกฝนได้เดินทางไปยัง [Root.Capital.GetName] และให้คำมั่นสัญญากับ [Root.GetName]"
 relic_summon_pilgrims:1 "เรียกกองเรือ จักรวรรดิร่วงโรย ลำเล็กๆ การเปิดใช้งานทุกครั้งจะเพิ่มขนาดของกองเรือ"

 ancrel.6150.name:0 "ดาวเคราะห์ที่มีการป้องกัน"
 ancrel.6150.desc:0 "ตามที่ได้รับการยืนยันจากการสำรวจเมื่อเร็วๆ นี้ §H[From.GetName]§! ถูกล้อมรอบด้วยสนามพลังงานที่แข็งแกร่งอย่างไม่น่าเชื่อ ซึ่งเบี่ยงเบนความพยายามทั้งหมดในการสแกน ดูเหมือนว่าสนามนี้ถูกสร้างขึ้นจากดวงจันทร์ที่อยู่ใกล้ดาวเคราะห์ดวงนี้"
 ancrel.6151.desc:0 "§H[From.GetName]§! กำลังปล่อยแผงพลังงานที่เจาะเข้าไปไม่ได้ซึ่งล้อมรอบดาวเคราะห์ที่มันโคจรอยู่ แหล่งที่มาที่แท้จริงของสิ่งกีดขวางนั้นยากที่จะระบุ แต่ดูเหมือนว่าจะมาจากที่ไหนสักแห่งลึกใต้พื้นผิวแห้งแล้งของดวงจันทร์\n\nซากปรักหักพังโบราณของสิ่งที่น่าจะเป็นฐานขนาดใหญ่บางประเภท ซึ่งอาจมีลักษณะทางการทหารสามารถพบได้ในหลุมอุกกาบาตที่ใหญ่ที่สุดแห่งหนึ่งของดวงจันทร์ มันอาจจะเก็บคำตอบไว้บ้าง"

 site_minigalaxy_1:0 "ฐานดวงจันทร์"
 site_minigalaxy_1_intro:0 "ซากปรักหักพังของฐานขนาดใหญ่บางชนิดสามารถพบได้ภายในปล่องภูเขาไฟขนาดใหญ่บนดวงจันทร์นี้ มันคงถูกทิ้งร้างไปเมื่อหลายพันปีก่อน กำแพงพลังงานที่ล้อมรอบดาวเคราะห์ใกล้เคียงดูเหมือนจะมีต้นกำเนิดมาจากแหล่งกำเนิดโดยตรงใต้ฐานโบราณแห่งนี้"
 ancrel.6155.name:0 "ความคิดริเริ่มสงบศึก"
 ancrel.6155.desc:0 "การขุดค้นซากปรักหักพังอย่างต่อเนื่องบน §H[From.Planet.GetName]§! ได้เผยให้เห็นว่าฐานที่ถูกทิ้งร้างนั้นครั้งหนึ่งเคยเป็นฐานทัพขนาดใหญ่ที่สร้างขึ้นโดย \"§Hอินิชิเอทีฟ ของอาร์เมติก§!\" พวกมันเป็นพันธมิตรกึ่งถาวรของมหาอำนาจระหว่างดวงดาวขนาดใหญ่และก้าวหน้ามากอย่างน้อยห้ากลุ่มที่ปฏิบัติการอยู่ในบริเวณดาราจักรนี้เมื่อประมาณ 75,000 ปีก่อน \n\nไม่ทราบลักษณะที่แน่นอนของการเป็นพันธมิตรนี้ แต่ดูเหมือนว่าจะมุ่งมั่นที่จะยุติสงครามกาแล็กซีที่ดำเนินมายาวนานหลายครั้งในทันที กองกำลังทหารขนาดใหญ่จากสมาชิกอินิชิเอทีฟแต่ละคนประจำการอยู่ที่ฐานบนดวงจันทร์นี้"
 ancrel.6160.name:0 "พรรคสงคราม C"
 ancrel.6160.desc:0 "ดาวเคราะห์ที่ได้รับการปกป้องในระบบนี้เป็นเมืองหลวงของหนึ่งในอาณาจักรที่ทำสงครามซึ่งกลุ่มริเริ่มการสงบศึกก่อตั้งขึ้นเพื่อหยุดยั้ง จักรวรรดินี้ยังไม่ทราบชื่อของจักรวรรดิ - เรียกง่ายๆ ว่า \"§Hฝ่ายคู่สงคราม C§!\" ในบันทึกของอินิชิเอทีฟทั้งหมดที่ได้รับมาจนถึงขณะนี้ \n\nเห็นได้ชัดว่าอินิชิเอทีฟ ของอาร์เมติกพยายามสร้างตัวอย่างของ ฝ่ายคู่สงคราม C หลังจากบุกเข้าไปในพื้นที่ของพวกเขาและชนะการต่อสู้อันดุเดือดหลายครั้งอินิชิเอทีฟได้กักขังโฮมเวิร์ลดของปาร์ตี้ C ไว้อย่างถาวรโดยใช้โล่พลังงาน มีการจัดตั้งฐานทัพทหารบนดวงจันทร์ที่อยู่ใกล้ๆ เพื่อรักษาโล่และทำหน้าที่เป็นกองกำลังตอบโต้ในกรณีที่การกักกันล้มเหลวซึ่งไม่น่าจะเกิดขึ้นได้"
 ancrel.6165.name:0 "เครื่องกำเนิดโล่"
 ancrel.6165.desc:0 "ฐานดวงจันทร์อินิชิเอทีฟยังคงเปิดดำเนินการมาเป็นเวลาหลายศตวรรษ แต่ไม่มีสัญญาณของความล้มเหลวในการกักกัน กองกำลังจึงค่อยๆ ลดขนาดลง การเปลี่ยนพันธมิตรและการต่อสู้แบบประจัญบานระหว่างสมาชิกอินิชิเอทีฟต่างๆ ในที่สุดก็ทำให้ฐานถูกทิ้งร้างโดยสิ้นเชิง \n\nระบบอัตโนมัติถูกทิ้งไว้เพื่อรักษาเกราะป้องกันรอบๆ โฮมเวิร์ลดของพรรค C และระบบเหล่านี้ยังคงใช้งานได้อย่างเหลือเชื่อจนถึงขณะนี้ อนิจจา สายไฟที่สำคัญถูกตัดขาดเมื่อนักโบราณคดีของเราขุดเข้าไปในห้องเครื่องกำเนิดไฟฟ้าใต้ดิน หลังจากใช้งานต่อเนื่องยาวนานถึง 75,000 ปี โล่ก็ไม่มีอีกต่อไป"

 site_minigalaxy_2:0 "โพ ลี คาร์พที่ถูกทิ้งร้าง"
 site_minigalaxy_2_intro:0 "โลกโบราณวัตถุแห่งนี้ถูกกักขังอยู่หลังกำแพงพลังงานที่ไม่อาจทะลุผ่านได้เป็นเวลาประมาณ 75,000 ปี ครั้งหนึ่งมันคงจะเคยเป็นบ้านของผู้คนหลายแสนล้านคน แต่ตอนนี้ถนนและอาคารต่างๆ กลับกลายเป็นที่รกร้าง ไม่มีผู้อยู่อาศัยดั้งเดิมของโลกเหลืออยู่เลย"
 ancrel.6170.name:0 "การหายตัวไป"
 ancrel.6170.desc:0 "การหายตัวไปของประชากรดั้งเดิมของดาวเคราะห์ดวงนี้ยังคงเป็นปริศนา เมื่อโล่ขึ้นไปและพวกเขาถูกแยกออกจากจักรวรรดิระหว่างดวงดาวที่เหลือ พวกเขาอาจต้องเผชิญกับความอดอยากครั้งใหญ่และความไม่สงบในขณะที่พวกเขาต่อสู้เพื่อสนับสนุนประชากรจำนวนมหาศาลในเมืองหลวงด้วยทรัพยากรที่จำกัดที่พวกเขามี \nEXIF1\n\nยังไม่มีสัญญาณว่าพวกเขาพังยับเยินบางส่วนของดาวเคราะห์ในเมืองของพวกเขาเพื่อเพาะปลูกที่ดิน ไม่มีสิ่งใดบ่งชี้ว่าการต่อสู้ที่สำคัญใดๆ เกิดขึ้นหลังจากที่โล่ขึ้นไป และไม่มีซากใดๆ ที่เป็นฟอสซิลหรืออย่างอื่นของผู้อยู่อาศัย มันเหมือนกับว่าพวกมันหายไปในอากาศบางเบา"
 ancrel.6175.name:0 "วันอพยพ"
 ancrel.6175.desc:0 "ถนนอันน่าขนลุกและว่างเปล่าของเมืองร้างทั่วโลกแห่งนี้ยังคงไม่ทรยศต่อสิ่งที่เกิดขึ้นกับผู้อยู่อาศัยดั้งเดิม มีการค้นพบโปสเตอร์และแผ่นพับที่กล่าวถึง \"§Hวัน อพยพ§!\" โดยทั่วไปแล้วจะมีรูปภาพของกาแลคซีซึ่งนักดาราศาสตร์ของเราไม่รู้จักมาด้วย:\n\n§H\"วันอพยพ - วันนี้เป็นวัน โปรดรายงานไปยังศูนย์ย้ายที่ใกล้ที่สุดโดยเร็วที่สุดเพื่อเริ่มต้นชีวิตใหม่ของคุณ\"§!"
 ancrel.6180.name:0 "โครงการ"
 ancrel.6180.desc:0 "เห็นได้ชัดว่าดาวเคราะห์ดวงนี้ถูกทิ้งร้างหลังจาก "วันอพยพ" นี้จบลง แต่อย่างไร? ไม่มีหลักฐานว่ากำแพงพลังงานของโลกลดลง \n\nมีการค้นพบเบาะแสที่บ่งบอกถึงการแสวงหาโครงการวิจัยขนาดใหญ่บางประเภทที่เกิดขึ้นก่อนโล่ เจ้าหน้าที่ทรัพยากรและวิทยาศาสตร์ถูกเปลี่ยนเส้นทางมาที่โครงการนี้เป็นจำนวนมากขึ้น และความพยายามดูเหมือนจะเข้มข้นขึ้นอย่างมากหลังจากที่เกราะป้องกันเพิ่มขึ้น"
 ancrel.6185.name:0 "กาแล็กซีย่อส่วน"
 ancrel.6185.desc:0 "หลังจากพยายามค้นหาอย่างเข้มข้น เราได้ค้นพบว่าชาว [From.Planet.GetName] ไปอยู่ที่ไหน ลึกเข้าไปในโครงสร้างที่มีป้อมปราการสูงใกล้กับขั้วโลกเหนือของโลก เราพบวัตถุโบราณที่นักโบราณคดีของเราเชื่อว่ามีกาแล็กซีย่อส่วนอยู่จริง\n\nอย่างไรก็ตาม หลังจากสร้างกาแล็กซีนี้ขึ้นมา ผู้ที่อาศัยอยู่ในแก้ไขโครงการหลัก...ทั้งหมดก็ย้ายไปอยู่ที่นั่นแล้วปิดผนึกไว้ในภาชนะนี้ด้วยสนามย่อยบางประเภทที่ไม่สามารถซึมเข้าไปได้ แม้ว่าเราจะไม่สามารถเข้าไปยุ่งเกี่ยวกับกาแล็กซีได้ แต่นักวิทยาศาสตร์ของเรารับรองว่าเราสามารถศึกษามันได้"

 site_star_petal:0 "โครงสร้างก๊าซยักษ์"
 site_star_petal_intro:0 "สถานีอวกาศขนาดใหญ่ที่ถูกทิ้งร้างติดอยู่ในวงโคจรสถานีปลายทางที่ช้าในชั้นบรรยากาศของก๊าซยักษ์แห่งนี้ แรงโน้มถ่วงมีแนวโน้มที่จะทำลายมันอย่างสมบูรณ์ภายในพันปีข้างหน้า \n\nมันยังลอยไปไม่ลึกพอที่จะเข้าสู่ชั้นบรรยากาศที่จะทำให้การสำรวจทางโบราณคดีไปยังสถานีเป็นไปไม่ได้"
 ancrel.6200.name:0 "เพลสเชอร์ พาเลซ"
 ancrel.6200.desc:0 "การตกแต่งภายในที่มืดมนและไร้ชีวิตชีวาในปัจจุบันของสถานีอวกาศเกือบจะประสบความสำเร็จในการซ่อนความจริงที่ว่ามันต้องได้รับการออกแบบให้เป็นวังแห่งความสุขที่หรูหรา ดูเหมือนมีสล็อตแมชชีนขึ้นสนิมเรียงกันเป็นแถวไม่มีที่สิ้นสุด บาร์และร้านอาหารที่ทรุดโทรมหลายร้อยแห่ง และในบรรดาทั้งหมดนั้น มีศพหลายพันศพ\n\nมนุษย์ต่างดาวที่มัมมี่บางส่วนและตายแล้วอย่างน้อยหลายสิบสายพันธุ์ต่าง ๆ สามารถพบได้ทุกที่ แต่ศพส่วนใหญ่กระจุกตัวอยู่รอบ ๆ ช่องหลบหนีที่ว่างเปล่า"
 ancrel.6205.name:0 "กลีบดาว"
 ancrel.6205.desc:0 "สถานีที่ถูกทิ้งร้างแห่งนี้เคยเป็นที่รู้จักในชื่อ \"§Hหมึก ดาว§!\" และเห็นได้ชัดว่าเป็นรีสอร์ทหรูที่มีชื่อเสียงโด่งดังในมุมหนึ่งของกาแล็กซีนี้เมื่อเกือบหนึ่งพันปีก่อน ในแต่ละปีจะมีเรือลากจูงกลุ่มเล็กๆ ลากสถานีไปยังสถานที่แปลกใหม่ แต่ [From.Planet.GetName] ดูเหมือนจะเป็นสถานีสุดท้าย \n\nด้วยเหตุผลที่ไม่ชัดเจน สถานีดังกล่าวจึงถูกดึงเข้าไปในชั้นบรรยากาศของก๊าซยักษ์ ซึ่งได้รับความเสียหายร้ายแรง"
 ancrel.6210.name:0 "วันสุดท้าย"
 ancrel.6210.desc:0 "นักโบราณคดีที่ทำงานเกี่ยวกับหมึก ดาวได้รวบรวมเบาะแสและหลักฐานเพียงพอที่จะวาดภาพวันสุดท้ายของสถานีได้ชัดเจนพอสมควร ดาวเคราะห์น้อยจรจัดพุ่งชนสถานี ทำให้มันเข้าสู่วงโคจรที่จะพุ่งเข้าสู่ชั้นบรรยากาศของ [From.Planet.GetName] ในไม่ช้า \n\nเครื่องขับดันที่รักษาสถานีไม่สามารถชดเชยได้ และในไม่ช้าเจ้าหน้าที่บังคับบัญชาก็ออกคำสั่งอพยพในไม่ช้า น่าเสียดายที่สถานีมีตู้หลบหนีเพียงพอที่จะอพยพผู้โดยสารได้เพียงเศษเสี้ยว และความตื่นตระหนกครั้งใหญ่ก็ปะทุขึ้นในไม่ช้า ผู้ที่ไม่ได้เหยียบย่ำจนเสียชีวิตต้องเสียชีวิตเมื่อระบบสิ่งแวดล้อมของสถานีล้มเหลว ขณะที่มันลอยลึกเข้าไปในก๊าซยักษ์"
 ancrel.6215.name:0 "หัวใจของพัลซาร์"
 ancrel.6215.desc:0 "การค้นหาผ่านตู้เซฟที่ปลอดภัยซึ่งลูกค้าที่ร่ำรวยที่สุดของหมึก ดาวเก็บข้าวของส่วนตัวได้เผยให้เห็นขุมสมบัติของสิ่งประดิษฐ์และเครื่องประดับแปลก ๆ บางทีสิ่งที่สำคัญที่สุดในบรรดาสิ่งของที่พบก็คือ \"หัวใจแห่งพัลซาร์\" ซึ่งเป็นสร้อยคอเพชรที่มีเอกลักษณ์เฉพาะตัว ซึ่งมีชื่อเสียงในสมัยนั้นจากการสวมใส่โดยประมุขแห่งรัฐที่แตกต่างกันห้าคน"

 site_setback:0 "ความปราชัยที่สำคัญ"
 site_delay:0 "ซึ่งจะทำให้เกิดความล่าช้า"
 site_success:0 "นั่นก็ใกล้แล้ว"

 ancrel.8000.intro:0 "ในระหว่างการขุดค้นแหล่งโบราณคดีบน [From.Planet.GetName] กริดเลเซอร์โบราณแต่ยังคงใช้งานได้ถูกกระตุ้นโดยไม่ได้ตั้งใจ"
 ancrel.8000.critical:0 "ลำแสงเลเซอร์ที่เคลื่อนที่อย่างรวดเร็วได้เฉือน §H[dead_scientist.GetName]§! และ [Root.Owner.GetArchaeologistPlural] อื่นๆ ออกเป็นชิ้นเล็กๆ"
 ancrel.8000.failure:0 "[Root.Owner.GetArchaeologistPlural] หลายอันถูกหั่นเป็นชิ้นเล็กๆ ด้วยลำแสงที่เคลื่อนที่เร็ว แม้ว่า §H[Root.GetLeaderName]§! จะรอดมาได้โดยไม่ได้รับบาดเจ็บ แต่ความสูญเสียเหล่านี้ก็ส่งผลกระทบด้านลบต่อโครงการ"
 ancrel.8000.success:0 "โชคดีด้วยการดำเนินการที่รวดเร็วของ §H[Root.GetLeaderName]§! เลเซอร์จึงถูกปิดใช้งานก่อนที่จะก่อให้เกิดอันตรายใดๆ โครงการกำลังก้าวไปข้างหน้าก่อนกำหนด"
 ancrel.8000.pay:0 "เลเซอร์กำลังปิดกั้นเส้นทางเดียวไปข้างหน้า การปิดใช้งานจะมีราคาแพง แต่การค้นหาเส้นทางอื่นรอบๆ กริดเลเซอร์อาจใช้เวลานาน"
 ancrel.8000.name:0 "เลเซอร์กริดถูกกระตุ้น"
 ancrel.8000.desc:0 "$ancrel.8000.intro$\n\n$ancrel.8000.critical$"
 ancrel.8001.desc:0 "$ancrel.8000.intro$\n\n$ancrel.8000.failure$"
 ancrel.8002.desc:0 "$ancrel.8000.intro$\n\n$ancrel.8000.success$"
 ancrel.8003.desc:0 "$ancrel.8000.intro$\n\n$ancrel.8000.pay$"
 ancrel.8003.a:0 "ปิดการใช้งานกริดนั้น"
 ancrel.8003.b:0 "พวกเขาจะต้องเดินอ้อมไป"

 ancrel.8010.intro:0 "[Root.Owner.GetArchaeologistPlural] ของเราที่ทำงานกับ [From.Planet.GetName] กระตุ้นให้เกิดปืนยามโบราณจำนวนมากแต่ยังคงใช้งานได้โดยไม่ได้ตั้งใจ"
 ancrel.8010.critical:0 "ปืนอัตโนมัติตัดหญ้า §H[dead_scientist.GetName]§! และ [Root.Owner.GetArchaeologistPlural] อื่นๆ อย่างรวดเร็วก่อนที่จะปิดการใช้งาน"
 ancrel.8010.failure:0 "[Root.Owner.GetArchaeologistPlural] หลายแห่งถูกจับได้ในเขตการยิง §H[Root.GetLeaderName]§! สามารถปิดการใช้งานปืนได้ในที่สุด แต่มีผู้เสียชีวิตหลายราย"
 ancrel.8010.success:0 "โชคดีที่ §H[Root.GetLeaderName]§! สามารถปิดการใช้งานปืนอัตโนมัติได้ก่อนที่จะมีใครได้รับอันตราย"
 ancrel.8010.pay:0 "ไม่มีใครได้รับอันตราย แต่ปืนกำลังขวางทางเดียวที่จะไปข้างหน้า หากไม่สามารถปิดใช้งานได้ [Root.Owner.GetArchaeologistPlural] ของเราจะต้องค้นหาเส้นทางอื่น"
 ancrel.8010.name:0 "ปืนยามถูกกระตุ้น"
 ancrel.8010.desc:0 "$ancrel.8010.intro$\n\n$ancrel.8010.critical$"
 ancrel.8011.desc:0 "$ancrel.8010.intro$\n\n$ancrel.8010.failure$"
 ancrel.8012.desc:0 "$ancrel.8010.intro$\n\n$ancrel.8010.success$"
 ancrel.8013.desc:0 "$ancrel.8010.intro$\n\n$ancrel.8010.pay$"
 ancrel.8013.a:0 "ปิดการใช้งานปืนเหล่านั้น"

 ancrel.8020.intro:0 "[Root.Owner.GetArchaeologistPlural] ของเราได้เผชิญหน้ากับหุ่นยนต์บดย่อยที่ตั้งขึ้นมาเพื่อซุ่มโจมตีนักสำรวจที่ไม่ระมัดระวังบน [From.Planet.GetName]"
 ancrel.8020.critical:0 "หุ่นยนต์โบราณและกึ่งมีความรู้สึกบด §H[dead_scientist.GetName]§! ให้เป็นชิ้นเล็ก ๆ ก่อนที่อาละวาดจะหยุดได้"
 ancrel.8020.failure:0 "§H[Root.GetLeaderName]§! สามารถหนีความวุ่นวายได้ แต่ [Root.Owner.GetArchaeologistPlural] อื่นๆ อีกหลายตัวกลับไม่โชคดีนัก"
 ancrel.8020.success:0 "ด้วยทักษะและโชคเล็กน้อย §H[Root.GetLeaderName]§! สามารถหยุดหุ่นยนต์อาละวาดได้ก่อนที่จะมีใครได้รับบาดเจ็บ"
 ancrel.8020.pay:0 "ทุกคนสามารถหลบหนีหุ่นยนต์อาละวาดได้ แต่ตอนนี้มันกำลังลาดตระเวนอย่างไม่เหน็ดเหนื่อยเป็นหนทางเดียวที่จะไปข้างหน้า [Root.Owner.GetArchaeologistPlural] ของเราจะต้องค้นหาเส้นทางอื่นเว้นแต่จะสามารถปิดใช้งานได้"
 ancrel.8020.name:0 "อาละวาดบด- ดรอยด์"
 ancrel.8020.desc:0 "$ancrel.8020.intro$\n\n$ancrel.8020.critical$"
 ancrel.8021.desc:0 "$ancrel.8020.intro$\n\n$ancrel.8020.failure$"
 ancrel.8022.desc:0 "$ancrel.8020.intro$\n\n$ancrel.8020.success$"
 ancrel.8023.desc:0 "$ancrel.8020.intro$\n\n$ancrel.8020.pay$"
 ancrel.8023.a:0 "ปิดการใช้งานหุ่นยนต์นั้น"

 ancrel.8030.intro:0 "การขุดค้นที่ดำเนินการโดย [Root.Owner.GetArchaeologistPlural] ของเราบนดาว [From.Planet.GetName] ได้เปิดใช้งานหุ่นเฝ้ายามโบราณหลายตัว"
 ancrel.8030.critical:0 "หุ่นยนต์ที่ไม่เป็นมิตรทำงาน §H[dead_scientist.GetName]§! ได้เพียงสั้นๆ ก่อนที่พวกเขาจะถูกปิดการใช้งานอย่างถาวรด้วยการยิงอาวุธ"
 ancrel.8030.failure:0 "หุ่นยนต์ที่ไม่เป็นมิตรสามารถสังหาร [Root.Owner.GetArchaeologistPlural] ได้หลายตัวก่อนที่ §H[Root.GetLeaderName]§! จะหยุดพวกมันได้"
 ancrel.8030.success:0 "โชคดีที่ §H[Root.GetLeaderName]§! และผู้คุ้มกันรักษาความปลอดภัยในบริเวณใกล้เคียงสามารถจัดการหุ่นยนต์ที่ไม่เป็นมิตรเหล่านี้ได้ก่อนที่จะทำอันตรายต่อใครก็ตาม"
 ancrel.8030.pay:0 "ขณะนี้หุ่นยนต์ที่ไม่เป็นมิตรได้ถูกกักกันไว้แล้ว แต่ไม่มีทางผ่านไปได้ เว้นแต่จะสามารถทำให้เป็นกลางได้ จะต้องพบเส้นทางอื่น"
 ancrel.8030.name:0 "ดรอยด์เซนติเนล"
 ancrel.8030.desc:0 "$ancrel.8030.intro$\n\n$ancrel.8030.critical$"
 ancrel.8031.desc:0 "$ancrel.8030.intro$\n\n$ancrel.8030.failure$"
 ancrel.8032.desc:0 "$ancrel.8030.intro$\n\n$ancrel.8030.success$"
 ancrel.8033.desc:0 "$ancrel.8030.intro$\n\n$ancrel.8030.pay$"
 ancrel.8033.a:0 "ทำให้หุ่นพวกนั้นไม่ต่อต้าน"

 asteroid_vault_1:0 "ดาวเคราะห์น้อยที่แปลกประหลาด"
 asteroid_vault_1_desc:0 "ในตอนแรกดูเหมือนจะไม่ธรรมดา เมื่อตรวจสอบ [From.Planet.GetName] อย่างใกล้ชิดพบว่า จริงๆ แล้วมันเป็นสิ่งก่อสร้างเทียมที่ออกแบบมาเพื่อเลียนแบบดาวเคราะห์น้อยตามธรรมชาติ"
 ancrel.101.name:0 "ดาวเคราะห์น้อยที่แปลกประหลาด"
 ancrel.101.desc:0 "ในตอนแรกดูเหมือนจะไม่ธรรมดา เมื่อตรวจสอบ [From.Planet.GetName] อย่างใกล้ชิดพบว่า จริงๆ แล้วมันเป็นสิ่งก่อสร้างเทียมที่ออกแบบมาเพื่อเลียนแบบดาวเคราะห์น้อยตามธรรมชาติ"
 ancrel.101.a:0 "ตรวจสอบมัน!"
 ancrel.102.name:1 "ประตูประหลาด"
 ancrel.102.desc:0 "เมื่อเรือวิทยาศาสตร์เข้าใกล้ [From.Planet.GetName] ประตูอันกว้างใหญ่และเก่าแก่ก็ถูกเปิดเผย ใครจะสร้างสิ่งนี้ขึ้นมา และทำไม? บางทีคำตอบอาจอยู่ข้างใน"
 ancrel.102.a:0 "เปิดประตู!"
 ancrel.103.name:0 "ห้องนิรภัยดาวเคราะห์น้อย"
 ancrel.103.desc:0 "การเปิดห้องนิรภัยทำให้เกิดคำถามมากกว่าคำตอบ ภายในบรรจุสิ่งของลึกลับต่างๆ ตั้งแต่ขยะไปจนถึงสิ่งที่อาจเป็นสิ่งประดิษฐ์จากอาณาจักรที่ถูกลืม การเรียงลำดับทั้งหมดใช้เวลาพอสมควร แต่เราพบรายการที่มีประโยชน์บางอย่าง"
 ancrel.103.a:0 "เซอร์ไพรส์ต้อนรับ!"
 it_was_aliens_site:0 "ซากปรักหักพัง"
 it_was_aliens_site_desc:0 "ซากปรักหักพังปกคลุม [From.Planet.GetName] แต่รูปแบบการระเบิดที่น่าแปลกดูเหมือนจะบ่งบอกว่ามีการระเบิดนิวเคลียร์ขนาดใหญ่เกิดขึ้นใต้พื้นผิว ไม่ใช่จากการทิ้งระเบิดในชั้นบรรยากาศหรือในวงโคจร สิ่งนี้รับประกันว่าจะมีการสอบสวนเพิ่มเติม แต่จะต้องมีการขุดค้นทางโบราณคดีเพื่อเปิดเผยสิ่งที่เกิดขึ้นที่นี่"
 ancrel.104.name:0 "ลอดผ่านซากปรักหักพัง"
 ancrel.104.desc:0 "การทำลายล้างเกือบจะทั้งหมด แต่มีบันทึกที่กระจัดกระจายบางส่วนรอดชีวิตมาได้ ดูเหมือนว่าชาว [From.Planet.GetName] จะหมกมุ่นอยู่กับความคิดที่ว่ามนุษย์ต่างดาวกำลังเฝ้าดูพวกเขาอยู่ รายงานบ่อยครั้งเกี่ยวกับวัตถุบินที่ไม่ปรากฏชื่อ การทำร้ายสัตว์ และการลักพาตัวทำให้โลกบ้าคลั่ง ในการตอบโต้ ทรัพยากรจำนวนนับไม่ถ้วนถูกเทลงในแผงการตรวจจับอันกว้างใหญ่ การป้องกันยานอวกาศ และที่พักพิงใต้ดินเพื่อปกป้องประชากร"
 ancrel.105.name:0 "บันทึกที่ถูกค้นพบ"
 ancrel.105.desc:0 "มีการรวบรวมรายละเอียดเพิ่มเติมจากบันทึกที่กระจัดกระจายที่เรากู้คืนมา เนื่องจากทรัพยากรดาวเคราะห์จำนวนมากขึ้นเรื่อยๆ ถูกเทลงในมาตรการต่อต้านยูเอฟโอโดยไม่ประสบความสำเร็จอย่างเห็นได้ชัด เศรษฐกิจและสังคมของพวกเขาก็เริ่มล่มสลาย ปัญหาภาวะไฟดับและการขาดแคลนอาหารเป็นปัญหาเฉพาะถิ่น เทคโนโลยีส่วนใหญ่หยุดนิ่ง และความรู้สึกสิ้นหวังอย่างลึกซึ้งมีอยู่ในทุกระดับของสังคม พบการอ้างอิงที่กระจัดกระจายเกี่ยวกับ "เกราะป้องกันขั้นสูงสุด" บางประเภท ซึ่งกลายเป็นเรื่องปกติมากขึ้นเมื่อรายงานเกี่ยวกับสถานการณ์ทั่วไปใน [From.Planet.GetName] แย่ลง"
 ancrel.106.name:0 "ชะตากรรมถูกเปิดเผย"
 ancrel.106.desc:0 "การค้นพบดาต้าแบงค์ที่ได้รับการเก็บรักษาไว้บางส่วนในบังเกอร์ทหารที่แข็งแกร่งได้เผยให้เห็นถึงชะตากรรมอันน่าเศร้าของ [From.Planet.GetName] เมื่อต้องเผชิญกับการล่มสลายทางเศรษฐกิจโดยทั่วไปซึ่งอาจนำไปสู่การยุติมาตรการต่อต้านยูเอฟโอ ผู้ปกครองของ [From.Planet.GetName] ได้เปิดใช้งาน "เกราะป้องกันขั้นสูงสุด" ของพวกเขา อย่างไรก็ตาม นี่ไม่ใช่เกราะป้องกัน [From.Planet.GetName] แต่เป็นการทำลายล้างประชากรและโครงสร้างพื้นฐานด้วยนิวเคลียร์โดยสิ้นเชิงเพื่อให้แน่ใจว่าผู้บุกรุกจากต่างดาวจะไม่ถูกยึดครอง เห็นได้ชัดว่าการตัดสินใจครั้งนี้มีสาเหตุมาจากการค้นพบ "สัญญาณเอเลี่ยน" ที่มาจาก [arc_anomaly_planet.GetName]"
 ancrel.107.name:0 "ค้นหาความจริง"
 ancrel.107.nothing.desc:0 "การสอบสวน [From.Planet.GetName] อย่างละเอียดพบว่าไม่มีอะไรเกี่ยวข้องกับมนุษย์ต่างดาวเลย ไม่เคยมีสัญญาณจากมนุษย์ต่างดาวเกิดขึ้นที่นี่ หรืออะไรก็ตามที่ทำให้มันหายไปโดยไม่ทิ้งร่องรอยใดๆ อย่างไรก็ตาม การตรวจสอบอย่างใกล้ชิดของ [From.Planet.GetName] ได้เผยให้เห็นแร่ธาตุบางชนิด"
 ancrel.107.junk.desc:0 "แหล่งที่มาของ "สัญญาณเอเลี่ยน" ถูกค้นพบแล้ว แต่แทนที่จะเป็นกองกำลังรุกรานของมนุษย์ต่างดาวอันน่าสยดสยอง สัญญาณดังกล่าวมีต้นกำเนิดมาจากเครื่องหมายสำรวจโบราณซึ่งเห็นได้ชัดว่าถูกกำหนดโดยเครื่องตรวจสอบอัตโนมัติ ซึ่งได้ค้นพบเส้นเลือดเล็กๆ ของทรัพยากรอันมีค่าบน [From.Planet.GetName] เครื่องหมายได้รับความเสียหายและส่งสัญญาณเป็นระยะๆ และเบามากเท่านั้น"
 ancrel.107.aliens1.desc:0 "[From.Planet.GetName] มีด่านหน้าทิ้งร้างซึ่งไม่ทราบการออกแบบ ซึ่งเป็นแหล่งที่มาของสัญญาณจากมนุษย์ต่างดาว อย่างไรก็ตาม แทนที่จะวางแผนการบุกรุก ไฟล์ที่ถูกละทิ้งกลับเปิดเผยแผนการติดต่อกับ [arc_site_planet.GetName] และแนะนำให้พวกเขารู้จักกับชุมชนกาแล็กซี"
 ancrel.107.aliens2.desc:0 "[From.Planet.GetName] มีด่านหน้าทิ้งร้างซึ่งไม่ทราบการออกแบบ ซึ่งเป็นแหล่งที่มาของสัญญาณจากมนุษย์ต่างดาว ธนาคารข้อมูลที่ถูกทิ้งร้างมีแผนโดยละเอียดที่จะบุก [arc_site_planet.GetName] และดำเนินการประชากรใน "ฟาร์มความเจ็บปวด" เพื่อทำให้เนื้อนุ่มก่อนที่จะบริโภค"
 ancient_battle_site_desc:0 "การสแกน [From.Planet.GetName] ได้เผยให้เห็นพื้นที่ที่เต็มไปด้วยวัสดุที่ผ่านการกลั่นและรังสีวิทยาที่กระจัดกระจาย แม้ว่าจะมองเห็นได้เพียงเล็กน้อยจากวงโคจรก็ตาม หากต้องการข้อมูลเพิ่มเติม เราจะต้องตรวจสอบสถานที่บนพื้นดิน"
 omnirelic_site:0 "$ancrel.21.name$"
 cool_relic_world_site_desc:0 "ดาวเคราะห์ทั้งดวงนี้เต็มไปด้วยโครงสร้างอันกว้างใหญ่ มหานครที่ล่มสลายนี้ย่อมมีความลับที่จะต้องถูกค้นพบอย่างแน่นอน"
 ancrel.108.name:0 "สมรภูมิรบโบราณ"
 ancrel.108.desc:1 "วัสดุที่ได้รับการขัดเกลาได้รับการเปิดเผยแล้ว และถึงแม้จะจำเป็นต้องมีการศึกษาเพิ่มเติม แต่ความประทับใจแรกของเราก็คือนี่คือซากของสถานที่สู้รบอันกว้างใหญ่ ดูเหมือนว่าด้านหนึ่งลงมาจากวงโคจรและถูกโจมตีโดยผู้พิทักษ์ที่มุ่งหน้าสู่ดาวเคราะห์ เหตุใดจึงไม่มีการทิ้งระเบิดในวงโคจร และใครเป็นผู้ชนะก็ยังไม่ชัดเจน"
 ancrel.109.name:0 "ความแค้นที่ถูกลืม"
 ancrel.109.desc:1 "เราได้ข้อสรุปว่ากองกำลังจาก\"ผู้ทําลาย\"ซึ่งเป็นเผ่าพันธุ์เร่ร่อนในมิติพิเศษได้บุกโจมตี [From.Planet.GetName] ซึ่งในเวลานั้นเป็นของ \"ผู้ที่ต่อต้าน\" ซึ่งเป็นพันธมิตรจากหลายสายพันธุ์ที่แตกต่างกัน จากบันทึกที่กระจัดกระจาย เราเชื่อว่าสงครามส่วนใหญ่เกิดขึ้นในที่อื่นในกาแล็กซี และ [From.Planet.GetName] เป็นความพยายามของผู้ต่อต้านที่จะสร้างอาณานิคมลับที่อยู่นอกเหนือการควบคุมของผู้ ทําลายผลลัพธ์ของการต่อสู้ครั้งนี้และสงครามที่ใหญ่กว่านั้นยังไม่ทราบแน่ชัด แต่การศึกษาเครื่องจักรสงครามที่พังยับเยินได้ให้ข้อมูลอันมีค่าบางอย่าง"
 zroni_digsite_1_desc:1 "อาณานิคมโบราณจากอารยธรรมที่ไม่รู้จัก แม้ว่าจะไม่ได้ยินเสียงร้องถึงความหายนะอย่างชัดเจน แต่ชุมชนนี้ก็ถูกทิ้งร้างอย่างกะทันหัน เกิดอะไรขึ้นที่นี่?"
 zroni_digsite_2_desc:1 "พิกัดที่ให้ไว้ในอาณานิคมซโรนีที่ถูกทิ้งร้างนำเรามาที่นี่ เราจะต้องส่งคณะสำรวจอีกครั้งเพื่อสำรวจโลกที่ดูเหมือนธรรมดาใบนี้"
 zroni_digsite_3_desc:1 "ก่อนหน้านี้เราได้สำรวจเพียงอาณานิคมที่ถูกทิ้งร้างเท่านั้น แต่ตามสถานที่ขุดครั้งล่าสุด [From.Planet.GetName] เป็นที่ตั้งของศาลเจ้าที่ถูกทิ้งร้าง เหตุใดสถานที่นั้นจึงมีความสำคัญทางวิญญาณต่อผู้คนเหล่านี้"
 zroni_digsite_4_desc:1 "ด้วยการเปิดเผยจากวิหารของซโรนีเราได้รับพิกัดของศูนย์วิทยาศาสตร์ การสแกนวงโคจรไม่สามารถตรวจจับเสียงสะท้อนจากคริสตัลความทรงจำได้ เราจะต้องลงไปที่พื้นผิวเพื่อเรียนรู้เพิ่มเติม"
 zroni_digsite_5_desc:1 "ความสำคัญทางโบราณคดีของโลกซโรนีที่สำรวจก่อนหน้านี้ทั้งหมดนั้นดูซีดเซียวเมื่อเปรียบเทียบกับ [From.Planet.GetName] [From.Planet.GetPlanetMoon] นี้มีโครงสร้างที่มองเห็นได้จากอวกาศ [From.GetName] คงจะเป็นศูนย์กลางของอาณาจักรซโรนี"
 zroni_digsite_6_desc:1 "ซรอนเป็นขุมพลังของกิจกรรม ไซออนิก เครื่องมือที่เราใช้ในการตรวจจับคริสตัลหน่วยความจําในอดีตจะต้องได้รับการปรับเทียบใหม่ก่อนที่เราจะสามารถส่งทีมเยือนขึ้นสู่ผิวน้ำได้"
 zroni_digsite_1:0 "ซากปรักหักพังอาณานิคมที่ถูกทิ้งร้าง"
 zroni_digsite_2:0 "โซโรนี บีคอน"
 zroni_digsite_3:0 "ศาลเจ้าโซโรนี"
 zroni_digsite_4:0 "สถานีวิจัยซโรนี"
 zroni_digsite_5:0 "โซโรนี คอร์ เวิลด์"
 zroni_digsite_6:0 "ซรอน"
 NAME_Zroni: "Zroni"
 ancrel.1.name:0 "ซากปรักหักพังลึกลับ"
 ancrel.1.desc:0 "[From.Planet.GetName] มีซากอาณานิคมโบราณที่ถูกทิ้งร้าง จากวงโคจรไม่มีสัญญาณที่ชัดเจนของภัยพิบัติที่อาจคร่าชีวิตผู้คนหรือบังคับให้พวกเขาหลบหนี หากเราต้องการคำตอบ ก็ต้องสำรวจพื้นผิว"
 ancrel.2.desc:1 "ซากปรักหักพังประหลาดไม่แสดงร่องรอยของความเสียหายใดๆ นอกเหนือจากการละเลย บ้าน โรงงาน อาคารที่ไม่ทราบการใช้งาน ล้วนแต่ว่างเปล่าและถูกทิ้งร้าง ทุกคนไปไหนกัน? ดูเหมือนว่าอาคารขนาดใหญ่ใจกลางอาณานิคมอาจตอบคำถามนี้ได้"
 ancrel.3.name:0 "คริสตัลแปลกๆ"
 ancrel.3.desc:1 "พบคริสตัลขนาดใหญ่ภายในสิ่งที่เรารู้ตอนนี้ว่าเป็นศูนย์กลางการบริหารกลางของอาณานิคม เราไม่สามารถอธิบายได้ครบถ้วนในทางใดทางหนึ่ง ดูเหมือนว่าคริสตัลจะต้องการพบ และกำลังพยายามสื่อสารกับเรา บางทีหากศึกษาเพิ่มเติมแล้วจะสื่อสารได้?"
 ancrel.3.a:0 "สำรวจคริสตัล"
 ancrel.4.desc:1 "หลังจากการลองผิดลองถูกมาหลายครั้ง ก็มีความก้าวหน้าเกิดขึ้น คริสตัลเป็น ไซออนิกแฟ้มจัดเก็บบางชนิด แต่บันทึกของมันกระจัดกระจาย\n\nสิ่งที่เรารู้ก็คือนี่คืออาณานิคมของ §Hซโรนี§!: เผ่าพันธุ์ที่มีพรสวรรค์ด้านพลังจิตผู้ค้นพบมิติซึ่งต่อมาเป็นที่รู้จักในนาม \"เดอะชราวด์\" เมื่อประชากรซโรนีมีมวลถึงระดับวิกฤติ ดูเหมือนว่าจิตไร้สำนึกโดยรวมของพวกเขาจะเริ่มติดต่อกับโปรโต- ชรูชในความฝัน ซึ่งนำไปสู่ความฝันที่ชัดเจนในวงกว้าง มีการศึกษาปรากฏการณ์นี้ และซโรนีได้ค้นพบวิธีการฉายภาพตัวเองเข้าไปในเดอะชราวด์ด้วยพลังจิต - ณ จุดนั้นพวกเขาก็พบว่าพวกเขาสามารถจัดการโครงสร้างแห่งความเป็นจริงได้โดยใช้พลังจิตของพวกเขา \n\nไม่นานก่อนที่ซโรนีจะค้นพบว่าพวกเขาสามารถเข้าไปในเดอะชราวด์ได้ทางกายภาพและมีชีวิตเหมือนเทพเจ้า เปลี่ยนมิติให้เหมาะกับความต้องการของพวกเขา...\n\nบันทึกของแฟ้มจัดเก็บจะสิ้นสุดลงที่นั่น โดยไม่มีข้อมูลเกี่ยวกับสิ่งที่เกิดขึ้นกับ ชาว [From.Planet.GetName] แต่ถึงแม้ไม่มีคำตอบที่นี่ แต่เราได้เรียนรู้เกี่ยวกับอาณานิคมซโรนีอื่นซึ่งอาจมีเอกสารสำคัญที่สมบูรณ์กว่า..."
 ancrel.5.desc:0 "[From.Planet.GetName] มีซากปรักหักพังของอาณานิคมซโรนีที่ถูกทิ้งร้างอีกแห่งหนึ่ง ขั้นตอนแรกในการไขปริศนานี้คือการค้นหาและติดต่อกับ ไซออนิกแฟ้มจัดเก็บของโลกนี้"
 ancrel.6.desc:1 "คราวนี้มันง่ายกว่ามากในการติดต่อกับคริสตัล โดยใช้โปรโตคอลที่เราสร้างขึ้นจากอันก่อนหน้า บันทึกของมันถูกกระจัดกระจายเป็นอีกครั้ง แต่เราได้เรียนรู้ว่าข้อดีอีกประการหนึ่งของความสามารถในการเข้าไปในเดอะชราวด์ก็คือว่าเดอะชราวด์สัมผัสทุกส่วนของกาแล็กซีทางกายภาพ - บางทีอาจจะเป็นทุกส่วนของจักรวาล - พร้อมกัน \n\nหากใครสามารถเข้าไปในเดอะชราวด์ได้ ก็เป็นไปได้ที่จะออกจากเดอะชราวด์ ณ ตำแหน่งใดก็ได้ที่ทราบ ความสามารถในการ \"กระโดดอย่างมีสติ\" ระหว่างสถานที่ทางกายภาพนี้ทำให้ซโรนีแพร่กระจายไปยังทุกมุมของกาแลคซี เนื่องจากพวกเขาใช้เวลาส่วนใหญ่อยู่ภายในเดอะชราวด์ พวกซโรนีจึงได้ก่อตั้งอาณานิคมถาวรขึ้นค่อนข้างน้อย สิ่งที่พวกเขาสร้างขึ้นส่วนใหญ่ตั้งอยู่ใกล้กับบ้านเกิดของพวกเขา\n\nคริสตัลนี้ทำให้เรามีที่ตั้งของศาลเจ้าแห่งหนึ่ง"
 ancrel.7.desc:1 "การค้นหาและการสื่อสารกับ ไซออนิกแฟ้มจัดเก็บกลายเป็นเรื่องง่ายมากขึ้นในขณะนี้ สามารถติดต่อได้ทันทีที่คณะสำรวจของเรามาถึง ซึ่ง ณ จุดนี้เราสามารถเข้าถึงบันทึกและแนวคิดที่มีรายละเอียดมากขึ้น จากสิ่งที่เราได้เรียนรู้ที่นี่ มีบางสิ่งที่ดีเกินกว่าจะเป็นจริงได้ - และด้วยเหตุนี้เองที่ความศักดิ์สิทธิ์ที่มอบให้แก่ซโรนีโดยเดอะชราวด์\n\nพลังงานที่จำเป็นต่อการเปลี่ยนแปลงครั้งใหญ่ในองค์ประกอบของเดอะชราวด์นั้นต้องมาจากที่ไหนสักแห่ง และสำหรับสิ่งเหล่านั้น มันกำเนิดมาจากหลุมดำมวลมหาศาลที่ใจกลางกาแล็กซีของเรา เมื่อซโรนีทำการเปลี่ยนแปลงภายในเดอะชราวด์ ความแปลกประหลาดก็ขยายตัวขึ้น: กลืนกินมวลของใจกลางกาแลคซีและแปลงเป็นพลังงานซึ่งจากนั้นก็ดูดเข้าไปในเดอะชราวด์ การค้นพบนี้ทำให้ซโรนีสั่นคลอน: การถกเถียงกลายเป็นข้อโต้แย้ง ข้อโต้แย้งนำไปสู่ความแตกแยก การแบ่งแยกกลายเป็นสงครามกลางเมืองระหว่างสองฝ่ายหลัก"
 ancrel.8.desc:2 "รายละเอียดเพิ่มเติมของกลุ่มสงครามกลางเมืองซโรนีได้รับการดึงออกมาจากคริสตัล ฝ่ายหนึ่ง - ซึ่งต่อมาเป็นที่รู้จักในชื่อ\"พระเจ้า\" -รู้สึกว่าชะตากรรมของกาแล็กซีทางกายภาพนั้นไม่เกี่ยวข้องกับซโรนีซึ่งสามารถดำรงอยู่อย่างเต็มกำลังในเดอะชราวด์ต่อไปจนกว่ากาแล็กซีทั้งหมดจะถูกกลืนหายไปในอนาคตอันไกลโพ้นที่ไม่อาจจินตนาการได้ ถึงอย่างนั้น ก็ยังมีกาแล็กซีอื่น ๆ อยู่ แม้กระทั่งจักรวาลอื่น ๆ ที่อาจจะถูกกลืนหายไป\n\nอีกฝ่าย \"ผู้ช่วยให้รอด\" ต่างตกตะลึงกับสิ่งนี้ พวกซโรนีไม่ควรทำลายกาแล็กซีเพื่อใช้ชีวิตเป็นเทพปรสิต! แม้จะอยู่นอกเดอะชราวด์ความสามารถ ไซออนิก ของพวกเขาก็รับประกันว่าพวกเขาจะมียูโทเปียอยู่ \n\nตำแหน่งของด่านวิจัยของซโรนีถูกรวมอยู่ในข้อมูลจำนวนมาก"
 ancrel.9.desc:2 "การระบุตำแหน่งไฟล์เก็บถาวรบน [From.Planet.GetName] แบบสามเหลี่ยมเป็นเรื่องยากอย่างน่าประหลาด แต่เมื่อเราทำแล้ว ก็ง่ายที่จะเห็นว่าเหตุใดจึงเข้าใจยากนัก คริสตัลนั้นแตกละเอียด และไม่มีบันทึกใดที่เราสามารถเข้าถึงได้ อย่างไรก็ตาม ความหวังยังคงมีอยู่เมื่อเราตรวจพบสัญญาณจางๆ ในบริเวณใกล้เคียง"
 ancrel.9.a:0 "ค้นหาต่อไป"
 ancrel.10.desc:2 "มีคริสตัล ไซออนิก ที่มีขนาดเล็กกว่ามากอยู่ในห้องปฏิบัติการบางประเภท ซโรนีที่บันทึกการค้นพบของพวกเขารู้สึกหงุดหงิดอย่างยิ่ง งานวิจัยของพวกเขาถูกเพื่อนๆ เยาะเย้ย และส่วนใหญ่ได้รับความอดสู พวกเขาเชื่อว่าซโรนีไม่ใช่สิ่งมีชีวิตเพียงกลุ่มเดียวในเดอะชราวด์อีกต่อไป และความกลัวและความปรารถนาโดยรวมของเผ่าพันธุ์ของพวกเขาทั้งหมดได้รวมตัวกันเป็นสิ่งมีชีวิตที่ชาญฉลาดและแตกต่างอย่างชัดเจน\n\nด้วยความปรารถนาที่จะแข็งแกร่งขึ้น สิ่งมีชีวิตเหล่านี้จึงเริ่มมีอิทธิพลอย่างละเอียดต่ออารมณ์และความคิดของซโรนีที่เหมาะสม: ค่อยๆ ทำให้พฤติกรรมของพวกเขารุนแรงยิ่งขึ้น นี่อาจก่อให้เกิดสงครามกลางเมืองซโรนีโดยตรง \n\nเรายังค้นพบการอ้างอิงตำแหน่งของหนึ่งในโลกหลักของซโรนีอีกด้วย"
 ancrel.11.desc:2 "ไม่เหมือนกับโลกซโรนีก่อนหน้านี้ [From.Planet.GetName] เป็นโลกหลักอย่างชัดเจน โดยมีเมืองหลายแห่งที่มีขนาดแตกต่างกันปกคลุมพื้นผิว เช่นเดียวกับคนอื่นๆ ตอนนี้มันว่างเปล่า ไม่มีร่องรอยของหายนะหรือความตาย ไม่ทราบชะตากรรมของประชากร มีการตรวจพบคริสตัลอาร์ไคฟ์หลายอัน และจะต้องได้รับการตรวจสอบ"
 ancrel.12.desc:1 "บันทึกที่สามารถเข้าถึงได้ส่วนใหญ่มุ่งเน้นไปที่แนวทางการทำสงคราม ทฤษฎีการทำงานของเราคืออารมณ์ของประชากรมีอิทธิพลต่อ \"ความแข็งแกร่ง\" ของบันทึกเกี่ยวกับเรื่องใดเรื่องหนึ่ง ซึ่งหมายความว่าประเด็นที่มีการคิดมากที่สุดจะถูกบันทึกไว้อย่างโดดเด่นยิ่งขึ้น ไม่น่าแปลกใจเลยที่เส้นทางของสงครามอยู่ในใจของทุกคน\n\nซโรนีส่วนใหญ่เข้าข้างผู้ ช่วย ให้ รอดแต่ในขณะที่พวกเขามีข้อได้เปรียบในด้านจำนวน พวกเขามีข้อเสียเปรียบที่สำคัญประการหนึ่ง นั่นคือ: โดยไม่ใส่ใจต่อผลกระทบที่พวกมันมีต่อกาแล็กซีพระเจ้ามีอิสระที่จะใช้พลัง ไซออนิก อย่างเต็มที่; ในขณะเดียวกันเหล่าผู้ ช่วย ให้ รอดก็ถูกจำกัดด้วยพลังใดก็ตามที่สามารถดึงออกมาจากร่างกายของพวกเขาเองได้ \n\nในตอนแรกสงครามดูเหมือนสิ้นหวัง แต่ในที่สุดวีรบุรุษในหมู่เหล่าผู้ ช่วย ให้ รอดก็จะค้นพบสิ่งที่เลวร้ายแต่ก็สำคัญยิ่ง"
 ancrel.12.a:0 "สำรวจการค้นพบ"
 ancrel.13.desc:0 "คริสตัลบอกเราว่านักวิจัยซโรนีอันธพาลซึ่งกำลังสร้างทฤษฎีที่เพื่อนร่วมงานของเขาปฏิเสธที่จะเชื่อนั้น ได้เปลี่ยนพลังของเขาเข้าไปภายใน และกลืนกินร่างกายของเขาเองในปฏิกิริยาลูกโซ่ ไซออนิก ที่บรรจุอยู่ ตามคำแนะนำครั้งสุดท้ายของเขา ฝุ่นผงที่เหลือจากการเสียสละสูงสุดของเขาได้รับการทดสอบและยืนยันว่าเป็นแหล่งพลังงาน ไซออนิก ที่ทรงพลังอย่างเหลือเชื่อ โดยพื้นฐานแล้วมันคือผลรวมของศักยภาพ ไซออนิก ทั้งหมดในชีวิตของเขา ซึ่ง ผู้ใช้พลังจิต ตัวอื่นสามารถใช้งานได้ทันที\n\nในที่สุดคริสตัลก็ชี้เราไปยังตำแหน่งของโฮมเวิร์ลดของซรอนนี่!"
 ancrel.13.a:0 "ฝุ่นนั้น...คือซรอนนี่!"
 ancrel.15.desc:1 "ซรอนถูกทำลายด้วยพายุพลังงาน ไซออนิก และดูเหมือนว่าจะอยู่ในช่วงเดียวกับส่วนที่เหลือของจักรวาลเพียงบางส่วนเท่านั้น ไม่ว่าภัยพิบัติใดๆ จะเกิดขึ้นกับซโรนีดูเหมือนว่าจะมีต้นกำเนิดอยู่ที่นี่ \n\nเช่นเดียวกับอาณานิคมก่อนหน้านี้ มันไม่มีซโรนีแต่เต็มไปด้วยสัญญาณที่เหมือนผลึก เมื่อพิจารณาจากสัญญาณรบกวนที่มากขนาดนี้ นอกเหนือจากสภาพบรรยากาศที่แปลกประหลาดแล้ว เราอาจใช้เวลาสักระยะในการค้นหาข้อมูลที่เป็นประโยชน์"
 ancrel.16.desc:1 "เราได้ค้นพบและสื่อสารกับคริสตัลหลายตัว รวมถึงคริสตัลจากนักวิจัยกลุ่มเดอะชราวด์ที่ถูกขับไล่ด้วย ด้วยสิ่งเหล่านี้ เรากำลังเรียนรู้เพิ่มเติมเกี่ยวกับสงครามของซโรนี\n\nการใช้ฝุ่น ซโร จำเป็นต้องได้รับการเสียสละอย่างยิ่งใหญ่จากเหล่าผู้ช่วยให้รอด แต่ด้วยฝุ่นนี้ พวกเขาสามารถพลิกกระแสสงครามกับพระเจ้าได้ เมื่อความพ่ายแพ้ของพวกเขาปรากฏ ความโกรธและความหวาดกลัวต่อพระเจ้าที่เพิ่มมากขึ้นได้ก่อให้เกิดสิ่งใหม่และน่ากลัวภายในเดอะชราวด์ กระแสตอบรับเพิ่มมากขึ้น ผลักดันพระเจ้าเข้าสู่ห้วงลึกแห่งความบ้าคลั่ง พวกเขาถูกผลักดันไปสู่ความโหดร้ายที่เลวร้ายลงเรื่อยๆ โดยเรียกร้องให้พระผู้ช่วยให้รอดยุติสงครามไม่ว่าอย่างไรก็ตาม"
 ancrel.16.a:1 "ดำเนินการต่อ..."
 ancrel.17.desc:1 "เมื่อเราสื่อสารกับคริสตัลมากขึ้น รายละเอียดก็ปรากฏมากขึ้น เมื่อจวนจะพ่ายแพ้ พระเจ้าก็ตัดสินใจเลือกแผนการสูงสุดของพวกเขา นั่นคือการสิ้นสุดของวงจร การเติบโตของแกนกลางกาแลคซีหลุมดำจะถูกเร่งให้กลืนกินกาแล็กซีโดยเร็วที่สุด \n\nที่แย่ที่สุด ผู้ช่วยให้รอด - และเผ่าพันธุ์อื่น ๆ ในกาแล็กซี - จะถูกทำลาย ทิ้งให้พระเจ้าปกครองเดอะชราวด์เป็นเวลาอันกว้างใหญ่แต่มีขอบเขต อย่างไรก็ตาม มีความเป็นไปได้ที่การขยายตัวจะสามารถพึ่งพาตนเองได้ โดยไม่เพียงแต่ใช้กาแล็กซีเท่านั้นแต่ยังใช้จักรวาลด้วย โดยเป็นแหล่งพลังงานที่อาจไม่มีขอบเขตจำกัด แต่อย่างน้อยก็จะมีปริมาณใกล้เคียงพอที่จะสร้างความแตกต่างในทางปฏิบัติได้"
 ancrel.18.desc:0 "เราได้เรียนรู้ชะตากรรมของบรอนนี่:เมื่อเหล่าผู้ช่วยให้รอดทราบถึงแผนการของพระเจ้าพวกเขารู้ว่ามีทางเดียวที่เป็นไปได้ในการตอบโต้การป้องกันที่แทบจะทะลุไม่ได้ของพระเจ้าในเดอะชราวด์เมื่อเผชิญกับการทำลายล้าง พวกเขาเลือกที่จะเสียสละประชากรทั้งหมดของตน ยกเว้นซโรนีหนึ่งตัว พระผู้ช่วยให้รอดคนสุดท้ายที่เหลืออยู่นี้ใช้สารตกค้าง ไซออนิก ของสายพันธุ์ทั้งหมดเพื่อทำลายซโรนีทุกตัว - และเทพทุกตัว - ที่ดำรงอยู่ เพื่อยุติภัยคุกคามตลอดกาล\n\nซโรนีถูกกวาดล้างจนแทบไม่เหลือร่องรอย เหลือไว้เพียงฝุ่นที่ไม่ได้ใช้จำนวนเล็กน้อย"
 ancrel.18.a:0 "เหลือเชื่อ!"
 ancrel.19.desc:1 "ขณะที่คณะสำรวจของเราเตรียมออกเดินทาง จู่ๆ ผลึก ไซออนิก ก็กลับมาสัมผัสกันอีกครั้ง มันระบุว่ามันสามารถพิสูจน์ได้ว่ามีประโยชน์สำหรับเราหากเราตัดสินใจนำมันติดตัวไปด้วย แม้ว่าคำกล่าวอ้างนั้นไม่เป็นความจริง แต่ไม่มีผลึกอื่นใดที่เราพบแสดงสัญญาณของความฉลาด สิ่งนี้อาจรับประกันการสอบสวนเพิ่มเติม"
 ancrel.19.a:0 "เอาคริสตัลไป"
 ancrel.21.name:0 "ดาวล่มสลาย"
 ancrel.21.desc:0 "โครงสร้างที่ทรุดโทรมขนาดมหึมาปกคลุมพื้นผิวโลกนี้ทั้งหมด ครั้งหนึ่ง ดาวเคราะห์ในเมืองนี้คงเคยเป็นบ้านของผู้คนนับพันล้าน แต่ตอนนี้กลับว่างเปล่า ใครก็ตามที่อาศัยอยู่ที่นี่ต้องทิ้งร่องรอยไว้เกี่ยวกับสิ่งที่เกิดขึ้นกับพวกเขา แต่การค้นหาพวกเขาจะต้องได้รับการตรวจสอบพื้นผิวอย่างละเอียด"
 ancrel.22.desc:1 "หลังจากการลอดผ่านซากปรักหักพังอย่างไร้ผล มีเบาะแสจำนวนหนึ่งที่มุ่งการค้นหาของเราไปยังซากของศูนย์ประมวลผลและจัดเก็บข้อมูลดาวเคราะห์ประเภทหนึ่ง หากเราสามารถหาทางเข้าถึงบันทึกใดๆ ก็ตามที่หลงเหลืออยู่ บันทึกเหล่านั้นจะมีคุณค่าอย่างยิ่งในการคลี่คลายอดีตอันลึกลับของโลกนี้"
 ancrel.23.desc:1 "เมื่อเราพบทางเข้าสู่ศูนย์ข้อมูลและถูกบังคับให้เดินผ่านซากปรักหักพัง การเปิดใช้งานและเชื่อมต่อกับระบบคอมพิวเตอร์อีกครั้งก็เป็นเรื่องง่ายอย่างน่าประหลาดใจ วงจรการซ่อมแซมตัวเองและอัลกอริธึมการเรียนรู้ออนไลน์อย่างรวดเร็วเพื่อคืนค่าฟังก์ชันการทำงานที่จำกัด และสื่อสารกับคอมพิวเตอร์ของเราเอง \n\nสาเหตุของการระเบิดของกิจกรรมนี้ชัดเจนอย่างรวดเร็ว: [From.Planet.GetName] ครั้งหนึ่งเคยเป็นเมืองหลวงของอาณาจักรเครื่องจักรที่รู้จักกันในชื่อ §H§!เดอะออมนิโค้ดซ์§! ตั้งชื่อตามวัตถุประสงค์ในการขับขี่โอมนีเป็นลูกผสมของหุ่นยนต์และไซบอร์กที่พยายามดูดซับตัวอย่างสิ่งมีชีวิตทางชีวภาพทั้งหมดในกาแล็กซี เพื่อที่จะ ป้องกันการสูญพันธุ์เมื่อเผชิญกับภัยพิบัติทางช้างเผือกที่ไม่รู้จัก\n\nจากบันทึกที่ยังมีชีวิตรอด เรารวบรวมได้ว่าแนวทางการดำเนินการนี้ไม่ได้รับความนิยมในหมู่มหาอำนาจกาแล็กซีอื่น ๆ ในยุคของพวกเขา ในที่สุดโอมนีก็พ่ายแพ้ในการรณรงค์ร่วมที่ดำเนินการโดยจักรวรรดิเหล่านี้หลายแห่ง \n\nก่อนการล่มสลายโอมนีสามารถทดลองการแข่งขันได้มากมาย และได้ทุ่มเทงานจำนวนมากในการพัฒนาอุปกรณ์ที่สามารถสร้างพวกมันขึ้นมาใหม่ได้หากจำเป็นเกิดขึ้น อุปกรณ์นี้- โอมนิโค้ดที่เหมาะสม - เห็นได้ชัดว่าถูกเก็บไว้ที่ไหนสักแห่งในบริเวณใกล้เคียง"
 ancrel.24.desc:0 "ออมนิโค้ดถูกค้นพบแล้ว อุปกรณ์พิเศษนี้ประกอบด้วยลำดับพันธุกรรมของทุกเผ่าพันธุ์ที่โอมนีสามารถสุ่มตัวอย่างได้ และสามารถสร้างใหม่ได้โดยใช้องค์ประกอบพื้นฐานเท่านั้นเป็นวัตถุดิบ น่าเสียดายที่ดูเหมือนว่าโอมนีไม่มีเวลาที่จะทำให้มันสมบูรณ์แบบก่อนที่จะพบกับการทำลายล้าง ดังนั้นจึงไม่มีทางเลือกว่าจะสร้างขึ้นจากเผ่าพันธุ์ตัวอย่างใดจากหลายเผ่าพันธุ์ในการเปิดใช้งานอุปกรณ์ใดๆ"

 ANCREL_ARC_CAT:0 "เว็บไซต์คนต่างด้าว"
 ANCREL_ARC_CAT_DESC:0 "ตรวจสอบสัญญาณคนต่างด้าว"

 ANCREL_MECHANO_CAT:0 "เครื่องดาวเคราะห์"
 ANCREL_MECHANO_CAT_DESC:0 "ดาวเคราะห์ดวงนี้ถูกปกคลุมตั้งแต่ขั้วหนึ่งไปอีกขั้วหนึ่งด้วยเครื่องจักรโบราณที่เป็นสนิม ซึ่งส่วนใหญ่ถูกปกคลุมไปด้วยเนื้อเยื่ออินทรีย์ที่ไม่ปรากฏชื่อ สิ่งมีชีวิตชนิดใดที่สามารถสร้างความอยากรู้อยากเห็นทางเทคโนโลยีนี้ได้ และเกิดอะไรขึ้นกับพวกมัน?"

 baol_chain_title:0 "สารตั้งต้น- บาว"
 baol_chain_desc:0 "นักวิจัยของเราได้ค้นพบคริสตัลข้อมูลอายุเจ็ดล้านปี ซึ่งบันทึกเหตุการณ์การดำรงอยู่ของเผ่าพันธุ์นักรบในอวกาศที่รู้จักกันในชื่อ §Yกรูเนอร์§! และ §Yสิ่งมีชีวิตต่าง ๆ§! ซึ่งเป็นสิ่งมีชีวิตต่างดาวซึ่งมีดาวเคราะห์กรูเนอร์บุกเข้ามา"
 baol_colonies:0 "ค้นพบอาณานิคมลูกบอล"

 BAOL_COLONY_1:0 "อดีตการสืบสวนอาณานิคมบาโอล"
 BAOL_COLONY_1_DESC:0 "เราพบรายการพิกัดที่แสดงถึงตำแหน่งที่ควรจะเป็นของอาณานิคม §Yลูกบอล§! ในอดีต เราควรตรวจสอบเพิ่มเติม"
 BAOL_COLONY_2:0 "$BAOL_COLONY_1$2"
 BAOL_COLONY_2_DESC:0 "พิกัดของอาณานิคม §Yลูกบอล§! ในอดีตอีกแห่งหนึ่งถูกดึงมาจากดาต้าคริสตัลกรูเนอร์โบราณ เราควรตรวจสอบสถานที่นั้นเพิ่มเติม"
 BAOL_COLONY_3:0 "$BAOL_COLONY_1$3"
 BAOL_COLONY_3_DESC:0 "$BAOL_COLONY_2_DESC$"
 THE_LAST_BAOL:0 "สัญญาณความทุกข์กรูเนอร์"
 THE_LAST_BAOL_DESC:0 "เซ็นเซอร์ของเราจับสิ่งที่ดูเหมือนจะเป็นสัญญาณขอความช่วยเหลือซึ่งมีลายเซ็นทางข้อมูลของกรูเนอร์สิ่งที่อาจหลงเหลืออยู่ของสายพันธุ์ที่สาบสูญไปนานนี้ในระบบดาวที่ยังไม่เคยถูกค้นพบนี้"
 FERROPHAGE_CURE:0 "พัฒนาวิธีรักษาเฟอร์โรเฟจ"
 FERROPHAGE_CURE_DESC:0 "อินเทอร์เฟซแบบโต้ตอบ C.A.R.E บน [Root.GetName] ได้ขอความช่วยเหลือจากเราในการพัฒนาวิธีรักษาไวรัสกินโลหะที่รบกวนไวรัสมาเป็นเวลาหลายพันปี \n\nเราจะพัฒนายาแก้พิษสำหรับไวรัสต่างดาวทางชีวภาพโบราณที่สร้างความเสียหายให้กับปัญญาประดิษฐ์ได้อย่างไร ยังคงต้องรอดูต่อไป"

 NAME_Grunur:0 "Grunur"
 NAME_Grunur_Prime:0 "Grunur Prime"
 NAME_Nu_Baol:0 "Nu-Baol"
 grunur_research_facility:0 "สิ่งอำนวยความสะดวกการวิจัยกรูเนอร์"
 grunur_research_facility_desc:0 "สถานที่วิจัยเชิงทดลองโบราณ สร้างขึ้นเมื่อนานมาแล้วโดยกรูเนอร์ผู้ชอบสงคราม"
 NAME_planetary_mechanocalibrator:1 "C.A.R.E"
 NAME_care_defensive_protocols:0 "C.A.R.E Mega-Warform"
 care_defensive_protocols:0 "C.A.R.E ร่างสงคราม-Mega"
 care_defensive_protocols_desc: "หน่วยโพรโทคอล SOCKS สร้างขึ้นจากพลาสติกที่มีความทนทานสูงเพื่อความอยู่รอดจากเฟอร์โรเฟจ"
 NAME_planetary_mechanocalibrator_species:0 "$NAME_planetary_mechanocalibrator$ $NAME_Guardian$"

 ancrel.2000.name:0 "กรูนูร์"
 ancrel.2000.desc:0 "ทีมงาน [Root.GetName] มีความกระตือรือร้นที่จะรายงานว่าพวกเขาได้ค้นพบซากของสิ่งมีชีวิตสายพันธุ์โบราณที่เดินทางในอวกาศบน [From.GetName] ซึ่งดูเหมือนจะอาศัยอยู่บนโลกนี้เมื่อประมาณเจ็ดล้านปีก่อน!\n\nแม้ว่าจะไม่ชัดเจนว่าทำไมสายพันธุ์นี้ซึ่งเรียกตัวเองว่า §Yกรูเนอร์§! จึงหายไปจากระบบ [From.GetStarName] แต่นักวิทยาศาสตร์ของเราได้แยกแหล่งขุดค้นทางโบราณคดีที่มีแนวโน้มดีบนพวกมันดาวเคราะห์\n\nบางทีการศึกษาเพิ่มเติมอาจให้เบาะแสเพิ่มเติม"
 ancrel.2001.name:0 "สิ่งมีชีวิตลูกบอล"
 ancrel.2001.desc:0 "พบคริสตัลข้อมูลโบราณที่ถอดรหัสแล้วที่ไซต์ขุด ซึ่งบันทึกเหตุการณ์การหาประโยชน์ทางทหารของ §Yกรูเนอร์§! แม้ว่าส่วนใหญ่จะเป็นคนท้องถิ่นและไม่ค่อยสนใจ แต่ก็มีหลายเล่มที่ให้รายละเอียดเกี่ยวกับการเผชิญหน้าครั้งแรกของ §Yกรูเนอร์§! กับสายพันธุ์ต่างดาวที่เรียกว่า §Yสิ่ง ที่ เรียก กัน ว่า สิ่ง มี ชีวิต ใน บาซิล§!.\n\nยังรวบรวมได้อีกเพียงเล็กน้อยเกี่ยวกับ §Yลูกบอล§! ณ จุดนี้ ยกเว้นว่ามันเป็นสายพันธุ์พืชขนาดใหญ่และมีโคโลนีจำนวนมากที่เพาะไว้ท่ามกลางดวงดาว"
 ancrel.2001.a:0 "น่าหลงใหล. ขุดต่อไป!"
 ancrel.2002.name:0 "สิ่งมีชีวิตลูกบอล"
 ancrel.2002.desc:0 "บันทึกของการเข้ารหัสข้อมูลเผยให้เห็นว่า §Yกรูเนอร์§! ทำสงครามกับ §Yลูกบอล§! โดยปรารถนาทรัพยากรอันอุดมสมบูรณ์ซึ่งอ้างว่าพบได้บนดาวเคราะห์ของพวกมัน ชุดพิกัดของระบบได้รับการดึงออกมาจากบันทึกดังกล่าวสำเร็จแล้ว!\n\nนักโบราณคดีของเรากำลังอัปโหลดตำแหน่งของดาวเคราะห์ไปยังระบบของเราในขณะนี้"
 ancrel.2002.a:0 "บางทีการตรวจสอบ [baol_colony_1.GetName] อย่างใกล้ชิดอาจประสบผลสำเร็จ"
 ancrel.2003.name:0 "อดีตอาณานิคมบาว: บาร์เรน"
 ancrel.2003.desc:0 "แม้จะมีคำสัญญาแห่งความร่ำรวยที่แนะนำไว้ในคริสตัลข้อมูล §Yกรูเนอร์§! โบราณที่กู้คืนจาก [first_grunur_site.GetName] แต่ [baol_colony_1.GetName] ก็เป็นโลกที่แห้งแล้งและแห้งแล้ง ไร้บรรยากาศ \n\nโชคดีที่การสแกนทางธรณีวิทยาได้เผยให้เห็นซากฟอสซิลที่เกือบจะไม่มีที่สิ้นสุดซึ่งอยู่ลึกลงไปในบันทึกตะกอนของโลก! หนึ่งในนั้นคือพันธุ์พืชที่มีแนวโน้มว่าจะเป็น §Yลูกบอล§! เนื่องจากเป็นพันธุ์เดียวที่ระบุว่ามีโครงสร้างทางระบบประสาทที่จำเป็นสำหรับความฉลาด \n\nการขุดค้นแบบกำหนดเป้าหมายควรเปิดเผยข้อมูลเพิ่มเติม"
 ancrel.2004.name:0 "การสูญพันธุ์ครั้งใหญ่ทางทหาร"
 ancrel.2004.desc:0 "ชั้นขี้เถ้าหนาและเหตุการณ์การสูญพันธุ์ครั้งใหญ่ที่น่าทึ่งในบันทึกทางธรณีวิทยาเกิดขึ้นพร้อมกับวัสดุที่สกัดก่อนหน้านี้จากดาต้าคริสตัล §Yกรูเนอร์§! ซึ่งบ่งชี้ว่า §Yกรูเนอร์§! ระเบิดเพลิง [From.Planet.GetName] ด้วยการก่อความไม่สงบเมื่อประมาณเจ็ดล้านปีก่อน \n\nการตัดไม้ทำลายป่าบนพื้นผิวโลกอย่างกว้างขวางทำลายระบบนิเวศในท้องถิ่น และการขาดพืชที่ตรึงออกซิเจน ชั้นบรรยากาศของโลกค่อยๆ หมดไปในอีกหกหมื่นปีข้างหน้า"
 ancrel.2005.name:0 "สิ่งมีชีวิตลูกบอล"
 ancrel.2005.desc:0 "ฟอสซิล §Yลูกบอล§! ที่เป็นแบบอย่างหลายชิ้นได้รับการกู้คืน ซึ่งเผยให้เห็นสายพันธุ์ที่สูญหายไปนานว่าเป็นจิตใจที่เลื่อน:หน่วยต้นพืชหลายพันล้านหน่วยทำงานร่วมกันโดยรวม เช่น ใบ ราก และกิ่งก้านของต้นไม้ดร.แนะนำว่าตัวอย่าง §Yลูกบอล§! แต่ละรายการมีอายุขัยในหลายร้อยปี \n\nการไม่มีซากปรักหักพังของโครงสร้างบน [From.Planet.GetName] ดูเหมือนจะเป็นผลมาจากการพึ่งพาเทคโนโลยีอินทรีย์ที่น่าทึ่งของลูกบอลตั้งแต่เรือและอาคารไปจนถึงคอมพิวเตอร์ชีวภาพแบบเปียก และการทำลายล้างของเวลา"
 ancrel.2006.name:0 "ผลึกข้อมูลกรูเนอร์"
 ancrel.2006.desc:0 "พิกัดที่อธิบายตำแหน่งของอดีตอาณานิคม §Yลูกบอล§! ได้ถูกดึงออกมาจากดาต้าคริสตัล §Yกรูเนอร์§! ที่พังทลาย! บางทีโลกนี้อาจมีความมั่งคั่งบางส่วนที่ศัตรูโบราณของลูกบอลตามหา"
 ancrel.2006.a:0 "สู่อาณานิคมต่อไป!"
 ancrel.2007.name:0 "อดีตอาณานิคมบาวล: การ กรีด ร้อง"
 ancrel.2007.desc:0 "ในตอนแรก ลูกเรือของ [Root.GetName] แน่ใจว่าพวกเขาทำผิดพลาดในการวางตำแหน่งสามเหลี่ยมเมื่ออนุมานพิกัดของอาณานิคม §Yลูกบอล§! ในระบบ [Root.GetStarName] โดยไม่พบอะไรเลยนอกจากดาวเคราะห์น้อยที่พวกเขาคาดว่าจะเป็นดาวเคราะห์ที่มีชีวิต \n\nอย่างไรก็ตาม การศึกษาอย่างใกล้ชิดเกี่ยวกับองค์ประกอบของดาวเคราะห์น้อยได้เผยให้เห็นว่า แท้จริงแล้วพวกมันคือสิ่งที่เหลืออยู่ของอาณานิคม §Yลูกบอล§! ในอดีต! ดาวเคราะห์ที่เคยอุดมสมบูรณ์แห่งนี้ถูกพัดจนกลายเป็นหินหลายพันก้อนจากการชนกันโดยไม่ทราบสาเหตุ ซึ่งเกิดขึ้นเมื่อประมาณเจ็ดล้านปีก่อน การหักล้างบ่งชี้ว่า §Yกรูเนอร์§! มีบทบาทบางอย่างในชะตากรรมอันมืดมนของดาวเคราะห์ดวงนี้ \n\nดาวเคราะห์น้อยที่มีอนาคตสดใสดวงหนึ่งได้รับเลือกให้ศึกษาเพิ่มเติม เนื่องจากดูเหมือนว่าจะมีรูปแบบชีวิตฟอสซิลจำนวนมากจากดาวเคราะห์ที่สูญหายไป"
 ancrel.2007.a:0 "น่าเสียดาย บางทีเราอาจได้เรียนรู้เพิ่มเติม"
 ancrel.2008.name:0 "ฟอสซิลไบโอคอมพิวเตอร์"
 ancrel.2008.desc:0 "เราได้จัดการเพื่อแยกชิ้นส่วนข้อมูลบางส่วนจากฟอสซิลคอมพิวเตอร์ชีวภาพ §Yลูกบอล§! ที่ได้รับการอนุรักษ์ไว้เป็นอย่างดี! วัตถุโบราณอายุสิบล้านปีนี้ดูเหมือนจะมีข้อมูลเชิงการสอน มีไว้สำหรับสมาชิกสายพันธุ์ที่ยังไม่บรรลุนิติภาวะ §Yลูกบอล§! หรือต้นกล้ารุ่นเยาว์ยังไม่พร้อมรับการเชื่อมต่อระบบประสาทของไฮฟ์ จิตอย่างเต็มรูปแบบ ได้รับการแนะนำให้รู้จักกับเทคนิคการเจริญเติบโต การปลูกพืชสวน และโภชนาการในประสบการณ์ที่ได้รับการดูแลจัดการมากขึ้น \n\nการค้นพบเหล่านี้ชี้ให้เห็นว่าสังคม §Yลูกบอล§! ได้รับการยกย่องให้เป็นภูมิทัศน์บนบกและการจัดการระบบนิเวศ และยังต้องพึ่งพาอาศัยมันอย่างมากเพื่อความอยู่รอดของพวกมัน"
 ancrel.2009.name:0 "เศษเหลือของคอมพิวเตอร์ชีวภาพ"
 ancrel.2009.desc:0 "การค้นพบซากคอมพิวเตอร์ชีวภาพ §Yลูกบอล§! โบราณอีกชิ้นหนึ่งได้ให้ข้อมูลเชิงลึกเพิ่มเติมเกี่ยวกับประวัติศาสตร์ของแมลง ทับ สมอง\n\n§Yลูกบอล§! ดูเหมือนจะมีต้นกำเนิดมาจากดาวเคราะห์ดวงเดียว ซึ่งไม่ทราบตำแหน่งของมัน เป็นเพียงสิ่งมีชีวิตของพืช §Yลูกบอล§! ยุคก่อนประวัติศาสตร์ล้วนเป็นโคลนของพืชต้นกำเนิด และค่อยๆ พัฒนาความสามารถในการรับรู้ของความสูง:เป็นเวลาหลายล้านปีแห่งการเติบโตอย่างช้าๆ และสงบสุขบนโลกบ้านเกิดของพวกมัน"
 ancrel.2010.name:0 "ผลึกข้อมูลกรูเนอร์"
 ancrel.2010.desc:0 "ข้อมูลคริสตัล §Yกรูเนอร์§! ได้รับการกู้คืนบน [From.Planet.GetName] เมื่อประมาณเจ็ดล้านปีก่อนการเข้ารหัสข้อมูลมีบันทึกทางการทหารที่สามารถอ่านได้บางส่วน ซึ่งเกี่ยวข้องกับการรุกรานของโลก \n\nเห็นได้ชัดว่า §Yกรูเนอร์§! คาดว่าจะมีการต่อต้านด้วยอาวุธในระดับหนึ่ง และไม่ประทับใจกับ §Yลูกบอล§! ที่เคลื่อนที่ช้าอย่างไม่น่าเชื่อ บันทึกนี้อธิบายถึงความสะดวกในการหลีกเลี่ยงการตอบสนองล่าช้าของ §Yลูกบอล§! ในรูปแบบที่เสื่อมเสียอย่างมาก"
 ancrel.2011.name:0 "คำสั่งการต่อสู้ของกรูเนอร์"
 ancrel.2011.desc:0 "ข้อมูลคริสตัล §Yกรูเนอร์§! อีกอันถูกค้นพบ โดยมีรายละเอียดคำสั่งทางทหารหลายชุด ซึ่งรวมถึงพิกัดของอาณานิคม §Yลูกบอล§! ในอดีตอีกแห่ง \n\nนักโบราณคดีของเรากระตือรือร้นที่จะเปิดเผยประวัติของศัตรูทั้งสองนี้เพิ่มเติม กำลังอัปโหลดข้อมูลในขณะนี้"
 ancrel.2011.a:0 "เสน่ห์ครั้งที่สาม...?"
 ancrel.2012.name:0 "อดีตอาณานิคมเสียงเงียบ"
 ancrel.2012.desc:0 "นักวิจัยของเรารู้สึกตื่นเต้นที่ได้ค้นพบตำแหน่งของอาณานิคม §Yลูกบอล§! ที่สามซึ่งสอดคล้องกับดาวเคราะห์ที่ยังคงมีชั้นบรรยากาศและสิ่งมีชีวิตอยู่!\n\nในขณะที่ [From.From.GetName] ดูเหมือนจะไม่เขียวชอุ่มมากนักหรือเต็มไปด้วยทรัพยากรอย่างน่าทึ่ง นักวิทยาศาสตร์ของเรากระตือรือร้นที่จะเริ่มการขุดค้นแบบกำหนดเป้าหมายเพื่อค้นหาเศษ §Yลูกบอล§! หรือ §Yกรูเนอร์§!"
 ancrel.2013.name:0 "ความจุลดลง"
 ancrel.2013.desc:0 "การขุดค้นที่ [From.Planet.GetName] ได้เผยให้เห็นฟอสซิลจำนวนหนึ่งที่เกี่ยวข้องอย่างชัดเจนกับ §Yลูกบอล§! แต่น่าแปลกที่ตัวอย่างเหล่านี้ดูเหมือนจะลดขนาดอวัยวะทางระบบประสาทที่จำเป็นสำหรับการสื่อสารแบบเพิ่มข้อมูลในพื้นที่ย่อย กล่าวคือ ความสามารถในการสื่อสารทางระบบประสาทในระยะทางไกล ซึ่งเป็นคณะที่มีลักษณะเฉพาะของไฮฟ์ เมนส์\n\nสาเหตุที่แน่ชัดที่อาจทำให้เกิดการแกว่งตัวของวิวัฒนาการนี้ไม่เป็นที่ทราบแน่ชัด แม้ว่าจะเป็นเช่นนั้นก็ตาม ละเลยที่จะถือว่าการบุกรุก §Yกรูเนอร์§! นั้นไม่เกี่ยวข้องกัน มีการรับประกันการสอบสวนเพิ่มเติม"
 ancrel.2024.name:0 "ความจงรักภักดี"
 ancrel.2024.desc:0 "ตัวอย่างฟอสซิล §Yลูกบอล§! รุ่นเยาว์ถูกค้นพบจากบันทึกทางธรณีวิทยา แม้ว่าสิ่งเหล่านี้จะไม่ทำให้ระบบประสาทวิทยาของไฮฟ์ลดน้อยลงอีกต่อไป แต่โครงสร้างที่จำเป็นสำหรับการสื่อสารย่อยสเปซเพิ่มข้อมูลนั้นหายไปโดยสิ้นเชิง!\n\nการจับคาร์บอนของตัวอย่างได้ยืนยันว่าหลายร้อยปีหลังจากการรุกราน §Yกรูเนอร์§! §Yลูกบอล§! เริ่มที่จะพัฒนาความสามารถในการเชื่อมต่อซึ่งกันและกันในฐานะไฮฟ์ จิต\n\nน่าเสียดายที่ดูเหมือนว่าจะไม่สามารถดึงข้อมูลที่เกี่ยวข้องเพิ่มเติมจากไซต์นี้ได้"
 ancrel.2024.a:0 "แปลกแค่ไหน."
 ancrel.2015.name:0 "§Yกรูเนอร์§! สัญญาณความทุกข์"
 ancrel.2015.desc:1 "นักวิทยาศาสตร์ของเรากำลังรับสัญญาณขอความช่วยเหลือซึ่งมีลายเซ็นทางข้อมูล §Yกรูเนอร์§!! ดูเหมือนว่ามีต้นกำเนิดมาจากระบบที่เราไม่รู้จักมาก่อน ใกล้กับ [last_baol_neighbor.GetName].\n\nอาจมีข้อความโบราณประเภทใด \n\nนักวิทยาศาสตร์ของเราต้องการตรวจสอบแหล่งกำเนิดของสัญญาณ"
 ancrel.2015.a.tooltip:0 "ปัญหา โครงการพิเศษ: §Yสัญญาณ เตือน ภัย§!"
 ancrel.3999.name:0 "$ancrel.2016.name$"
 ancrel.3999.desc:0 "นักวิทยาศาสตร์จาก §H[From.GetName]§! ได้ค้นพบตัวอย่าง §Hลูกบอล§! ชิ้นสุดท้ายแล้ว!"
 ancrel.2016.name:0 "สิ่งมีชีวิตลูกบอล"
 ancrel.2016.desc:0 "ทีมงาน [Root.GetName] ได้ติดตามสัญญาณความทุกข์ §Yกรูเนอร์§! ไปยังแหล่งที่มา โดยค้นพบศูนย์วิจัย §Yกรูเนอร์§! ที่พังทลาย ซึ่งแขวนอยู่ในวงโคจรของดาวเคราะห์ที่ถูกทิ้งร้างไปนาน โรงงานแห่งนี้กำลังประสบกับความล้มเหลวด้านพลังงานขั้นวิกฤต โดยสามารถดำรงอยู่ได้เป็นเวลาหลายล้านปีบนเครือข่ายแผงโซลาร์เซลล์ที่กว้างขวางและระบบซ่อมแซมรถยนต์ที่ทรุดโทรม ซึ่งทั้งหมดนี้กำลังเข้าสู่สถานะเทอร์มินัล \n\nน่าตกใจมากที่การสแกนสิ่งอำนวยความสะดวกเผยให้เห็นว่ามีสิ่งมีชีวิตเพียงตัวเดียว ลูกเรือได้ส่งทีมเยือนแล้วและพร้อมที่จะรายงานตัว"
 ancrel.2017.name:0 "บาโอลครั้งสุดท้าย"
 ancrel.2017.desc:0 "§Hลูกเรือเรือของเราได้ค้นพบสิ่งที่เหลือเชื่อที่อยู่ลึกเข้าไปในซากปรักหักพังที่ชำรุดทรุดโทรมของศูนย์วิจัยกรูเนอร์ที่เก่าแก่ ท่ามกลางแผงคอมพิวเตอร์ที่เลิกใช้งานมานานและอุปกรณ์การวิจัยที่ทรุดโทรม \n\nเบาะรองนั่งด้วยท่อสารอาหารและระบบช่วยชีวิตที่ล้มเหลวขั้นวิกฤติ มีสิ่งมีชีวิตเพียงตัวเดียวบาวตัวสุดท้ายที่ยังมีชีวิตอยู่อย่างน่าอัศจรรย์ ล้อมรอบด้วยซากตะกอนของตัวอย่างอื่นๆ เรียงกันเป็นแถว ถังแตกและรั่ว\n\nจากการศึกษาทางโบราณคดีเกี่ยวกับสายพันธุ์นี้ก่อนหน้านี้ เราควรจะสามารถพยายามสื่อสารกับตัวอย่างสุดท้ายนี้ได้§!"
 ancrel.2017.a:0 "ถ้าอย่างนั้นเรามาลองกัน"
 ancrel.2017.exter:0 "ออร์แกนิก? กำลังบูตโปรโตคอลการกำจัด..."
 ancrel.2017.machi:0 "ออร์แกนิกโบราณ!"
 ancrel.2017.hive:0 "[root.GetGestaltEntityName] เอื้อมมือออกไป..."
 ancrel.2018.desc:0 "\"แขกเหรอ เป็นไปได้ไหม?\"\n\n§Hลูกบอลตัวสั่นในถัง§!\n\n\"แต่คุณไม่ใช่คนที่นำเรามาที่นี่ แม้ว่าคุณจะมาพร้อมเสียงสัญญาณเตือนภัย ในที่สุดคุณก็มาเพื่อให้ความสงบสุขแก่เราแล้วหรือยัง?\""
 ancrel.2018.a:0 "บางที. แต่ก่อนอื่น เรามีคำถามสองสามข้อ"
 ancrel.2018.a.phile:0 "เราจะช่วยคุณทุกวิถีทางที่เราสามารถทำได้"
 ancrel.2018.a.phobe:0 "คุณจะตอบเรา xno ไม่ใช่สิ่งที่ตรงกันข้าม"
 ancrel.2019.desc:0 "§Hลูกบอลเงียบไปหลายนาที§! \"ถ้าอย่างนั้นก็ถามสิ เรารอมานับพันปีแล้ว เราทนได้อีกครู่หนึ่ง\""
 ancrel.2019.a:0 "บอกเราเกี่ยวกับตัวคุณ"
 ancrel.2019.a.response:0 "§Hเวลาผ่านไปนานหลายนาทีก่อนที่ลูกบอลจะตอบสนอง§!\n\n\"ตัวเราเอง? ของเรา...ตัวตน ใช่ มีอะไรจะบอก เรานั่งใต้ดวงดาวบนพื้นโลกที่อ่อนนุ่ม คลี่ใบไม้ของเราเหมือนใบเรือที่หันไปหาดวงอาทิตย์เหนือศีรษะ เราจำทุกหยดของน้ำที่ดับพวกเขาในฤดูร้อนที่แห้งแล้ง เสียงแหบแห้งทุกตัวที่ปกคลุมพวกเขาในฤดูหนาว เราก้มตัวไปกับสายลมขณะที่ดวงดาวหมุนวน เหนือศีรษะ \n\nเราถูกถอนรากถอนโคน เราถูกเผา เราถูกทิ้งไว้ที่นี่"
 ancrel.2019.b:0 "เกิดอะไรขึ้นกับบาโอล?"
 ancrel.2019.b.response:0 "§HA อีกครั้งลูกบอลเงียบไปนานก่อนจะจัดการตอบกลับ§! \"เมื่อเครื่องเผามาถึง อาณานิคมทั้งหมดก็เงียบลงก่อนที่เราจะรู้ถึงอันตราย เหมือนกับแขนขาที่เดินกะโผลกกะเผลก เส้นประสาทถูกตัดอย่างกะทันหันที่ฐาน จากนั้นเราก็แพ้สิ่งต่อไป ครั้งต่อไป และครั้งต่อไป เสียงของพวกเขาละทิ้งการขับร้อง เราสูญเสียผู้อื่น ความเงียบของพวกเขาทำให้เราที่ยังคงอยู่หูหนวก \n\nคุณช่วยได้ไหม เข้าใจไหมผู้มาเยือน เราทนไม่ไหวที่จะได้ยินความทุกข์ทรมานไปมากกว่านี้แล้ว เพลิงก็รวดเร็วเหมือนคุณ เร็วกว่า และก่อนที่เราจะถอนตัวออกไป พวกมันก็เผาเราจนกลายเป็นเถ้าถ่าน และอากาศก็เต็มไปด้วยความเจ็บปวดสีเทานั้น: ฝุ่นผงแห่งการสูญเสียของเรา\""
 ancrel.2019.c:0 "คุณต้องการที่จะเข้าร่วมกับเรา?"
 ancrel.2019.d:0 "เราได้ยินมามากพอแล้ว"
 ancrel.2020.desc:0 "§Hลูกบอลเงียบไปครู่หนึ่งก่อนจะตอบกลับไปในที่สุด§! \"ขอบคุณ เราลืมเสียงความเมตตาไปแล้ว\""
 ancrel.2020.a:0 "เรามีคำถามสองสามข้อ..."
 ancrel.2021.desc:0 "§HA ตัวสั่นวิ่งผ่านลูกบอลคุณรู้สึกประทับใจที่มันกำลังหัวเราะ§! \"ไม่ เรามีชีวิตอยู่นานเกินไปในสภาพที่น่าสงสารนี้ ตอนนี้เราโหยหาจุดจบเท่านั้น แต่ก่อนอื่น... คุณช่วยบอกเราหน่อยได้ไหม เราถูกผนึกไว้ที่นี่มานานจนมองไม่เห็นทุกคน ยกเว้นห้องนี้ มองดูอากาศเหม็นอับอย่างช้า ๆ ทำให้สถานีทรุดตัวลงจนกระดูกโลหะของมัน \n\nบอกเรา ว่าพวกเราใจดี..."
 ancrel.2021.desc.phobe:0 "\"รอ.\" §Hลูกบอลตัวสั่น§! \"ก่อนที่ทุกอย่างจะจบลง ญาติของเรา ได้โปรด เราถูกผนึกไว้ที่นี่มานานแล้ว ตาบอดสำหรับทุกคนยกเว้นห้องนี้ มองดูอากาศเหม็นอับอย่างช้าๆ ทำให้สถานีค่อยๆ สึกกร่อนจนกระดูกโลหะของมัน \n\nบอกเราหน่อย พวกเราใจดี... ยังมีชีวิตอยู่ไหม?\""
 ancrel.2021.a:0 "ในแง่หนึ่ง. แม้ว่าพวกเขาจะไม่มีสติปัญญาอีกต่อไป"
 ancrel.2021.b:0 "เราไม่มีเวลาสำหรับเรื่องนี้ ดึงปลั๊ก!"
 ancrel.2021.b.exter:0 "กำจัด!"
 ancrel.2021.b.swarm:0 "เหยื่อที่ดี นิ่งไว้!"
 ancrel.2022.desc:0 "§Hใบไม้ของลูกบอลตัวสุดท้ายค่อยๆ ค่อยๆ เหี่ยวเฉาเข้ามาหาตัวเองอย่างช้าๆ แทบจะมองไม่เห็น§! \"บางที... บางทีนั่นอาจจะดีที่สุด\"\n\n§Hเครื่องจักรที่สูบของเหลวลึกลับเข้าและออกจากร่างกายของสิ่งมีชีวิตเริ่มที่จะพ่นและส่งเสียงฟู่ เห็นได้ชัดว่ามันอยู่ในจังหวะจักรกลครั้งสุดท้าย และลูกบอลจะพินาศหากไม่มีมัน§!\n\n\"ความเงียบ ใช่แล้ว ในที่สุดก็ใกล้เข้ามา เรายินดีต้อนรับมันเหมือนที่พี่น้องของเราทำเมื่อนานมาแล้ว ลาก่อน [Root.GetSpeciesName] ขอให้ญาติของคุณทนต่อความเจ็บปวดน้อยลงในโลกนี้\""
 ancrel.2022.a:0 "ลา."
 ancrel.2022.b.evopred: "เอกลักษณ์ของคุณจะไม่สูญหายไป"
 ancrel.2023.desc:0 "§Hเมื่อเอื้อมมือไปหาท่อที่ลำเลียงสารอาหารลึกลับเข้าและออกจากร่างของสิ่งมีชีวิต นักวิทยาศาสตร์ของคุณก็เริ่มเหวี่ยงพวกมันหลุด เร่งความล้มเหลวของเครื่องจักร และด้วยเหตุนี้จึงเป็นการเสียชีวิตครั้งสุดท้ายของลูกบอล\n\nดูเหมือนว่าลูกบอลจะไม่ทำการประท้วงในขณะที่คุณทำงาน เว้นแต่ว่าแรงสั่นสะเทือนเล็กน้อยที่วิ่งผ่านแขนขาที่เหี่ยวเฉาของมันนั้นมีไว้เพื่อบ่งบอกถึงบางสิ่งบางอย่าง\n\nในที่สุด งานก็เสร็จสมบูรณ์ และอีกหนึ่งครั้งสุดท้าย แรงสั่นสะเทือนไหลผ่านสิ่งมีชีวิตก่อนที่มันจะหมดเวลา§!"
 ancrel.2023.a:0 "นั่นแหละ"
 ancrel.2023.a.exter:0 "เผาสิ่งที่เหลืออยู่"
 ancrel.2023.a.swarm:0 "และตอนนี้เพื่อฉลอง!"
 ancrel.2025.name:0 "การจับจ้องชีวิตบน [Root.GetName] เสร็จสมบูรณ์"
 ancrel.2025.desc.first:1 "[Owner.GetTerraformerPlural] ของเรามีความยินดีที่จะรายงานว่ากระบวนการเปลี่ยนพื้นผิวบน [Root.GetName] เสร็จสิ้นแล้ว! การนำพืชลูกผสมที่สร้างขึ้นในห้องปฏิบัติการใหม่มาใช้ ซึ่งทำโดยใช้ส่วนที่คัดสรรมาอย่างดีของรหัสพันธุกรรม §Yลูกบอล§! ซึ่งเก็บเกี่ยวจากส่วนต่างๆ ของ §Yลูกบอล§! ครั้งล่าสุด ได้ประสบความสำเร็จในการเปลี่ยนแปลงสภาพภูมิอากาศและบรรยากาศของ [Root.GetName] ในระยะเวลาเพียงห้าปี \n\nพืชลูกผสมเพิ่มจำนวนขึ้นทั่วโลกตามที่คาดไว้ และตอนนี้กำลังเข้าสู่ระยะ 'อยู่เฉยๆ' เนื่องจากการเปลี่ยนแปลงบรรยากาศทางเคมีบน [Root.GetName] ได้ปิดการใช้งานพวกมันแล้ว \n\nน่าเหลือเชื่อที่ฝ่ายบริหารดาวเคราะห์ของเรารายงานผลลัพธ์ที่ไม่คาดคิดของกระบวนการนี้: มีมนุษย์ต่างดาวที่ฉลาดจำนวนหนึ่ง ซึ่งคล้ายกับ §Yลูกบอล§! ในสมัยโบราณอย่างไม่น่าเชื่อ แต่มีสารพันธุกรรมมากมายจากพืชธรรมชาติของโลก ได้ปรากฏบน [Root.GetName]!"
 ancrel.2025.desc.firstregular:0 "$ancrel.2025.desc.first$\n\nแม้ว่าจะไม่ใช่สมาชิกของไฮฟ์ จิตแต่มนุษย์ต่างดาว §Gนูบูล§! เหล่านี้ก็ดูสงบสุขเหมือนบรรพบุรุษของพวกเขา ไม่ทางใดก็ทางหนึ่ง เราจะต้องจัดการกับการมีอยู่ของพวกเขาใน [Root.GetName]"
 ancrel.2025.desc.firsthive:0 "$ancrel.2025.desc.first$\n\nแม้ว่าในตอนแรกจะเป็นส่วนหนึ่งของไฮฟ์ จิตที่แตกต่างกัน มนุษย์ต่างดาว §Gนูบูล§! เหล่านี้ก็สามารถรวมเข้ากับจิตสำนึกของเราได้อย่างง่ายดาย ไม่ทางใดก็ทางหนึ่ง เราจะต้องจัดการกับการมีอยู่ของพวกเขาใน [Root.GetName]"
 ancrel.2025.desc:1 "[Owner.GetTerraformerPlural] ของเรามีความยินดีที่จะรายงานว่ากระบวนการสร้างพื้นผิวบน [Root.GetName] เสร็จสิ้นแล้ว! ดาวเคราะห์ได้รับการเปลี่ยนให้เป็น §G$pc_gaia$§! ได้สำเร็จ เนื่องจากเรานำพืชลูกผสมที่สร้างขึ้นในห้องปฏิบัติการของเรามาใช้ ซึ่งมีส่วนของรหัสพันธุกรรม §Yลูกบอล§! ที่ได้รับการคัดสรรมาอย่างดี \n\nO อีกครั้งอันเป็นผลมาจากกระบวนการ - ตัวมันเองยังไม่เป็นที่เข้าใจโดยนักพันธุศาสตร์ของเรา - ประชากร §Gนูบูล§! จำนวนหนึ่งได้ปรากฏขึ้นข้างดาวเคราะห์ โดยเกิดขึ้นเมื่อ การปรับสภาพดินใกล้เสร็จแล้ว"
 ancrel.2025.a:0 "สุดอลังการ! พวกเขายินดีเป็นอย่างยิ่ง"
 ancrel.2025.b:0 "เราคิดว่าเราจะต้องจัดการกับพวกเขา..."
 ancrel.2025.c:0 "ยอดเยี่ยม! ทาสมากขึ้น"
 ancrel.2025.d:0 "ต้องการเข้าร่วมกลุ่มของเรามากขึ้น"

 ancrel.2026.name:0 "การตัดชีวิตบน [Root.GetName] เสร็จสมบูรณ์"
 ancrel.2026.desc.first:0 "การแนะนำต้นกล้า §Yลูกบอล§! ให้กับ [Root.GetName] มีผลที่แปลกประหลาดที่สุด หลังจากที่ได้สัมผัสกับสปอร์ของต้นกล้า ประชากรบางส่วนของเราตอนนี้ดูเหมือนจะปรับตัวเพื่อให้เจริญเติบโตใน [Root.GetPlanetMoon] ได้มากกว่าที่คาดไว้ แต่การวิเคราะห์ทางชีววิทยาในตอนนี้บอกเราว่าพวกเขาจะไม่สามารถอยู่รอดได้นอกระบบนิเวศของกายา\n\nน่าเหลือเชื่อที่ฝ่ายบริหารดาวเคราะห์ของเรารายงานผลลัพธ์ที่ไม่คาดคิดของกระบวนการนี้: มนุษย์ต่างดาวที่มีสติปัญญาจำนวนหนึ่ง ซึ่งคล้ายกับ §Yลูกบอล§! โบราณอย่างน่าทึ่ง แต่มีสารพันธุกรรมมากมายจากพืชธรรมชาติของโลกได้ปรากฏบน [Root.GetName]!"
 ancrel.2026.desc.firstregular:0 "$ancrel.2026.desc.first$\n\nแม้ว่าจะไม่ใช่สมาชิกของไฮฟ์ จิตแต่มนุษย์ต่างดาว §Gนูบูล§! เหล่านี้ก็ดูสงบสุขเหมือนบรรพบุรุษของพวกเขา ไม่ทางใดก็ทางหนึ่ง เราจะต้องจัดการกับการมีอยู่ของพวกเขาใน [Root.GetName]"
 ancrel.2026.desc.firsthive:0 "$ancrel.2026.desc.first$\n\nแม้ว่าในตอนแรกจะเป็นส่วนหนึ่งของไฮฟ์ จิตที่แตกต่างกัน แต่เอเลี่ยน §Gนูบูล§! เหล่านี้ก็สามารถรวมเข้ากับจิตสำนึกของเราได้อย่างง่ายดาย ไม่ทางใดก็ทางหนึ่ง เราจะต้องจัดการกับการมีอยู่ของพวกเขาใน [Root.GetName]"
 ancrel.2026.desc:1 "[Owner.GetTerraformerPlural] ของเรามีความยินดีที่จะรายงานว่าการแนะนำต้นกล้า §Yลูกบอล§! สู่ [Root.GetName] เสร็จสมบูรณ์แล้ว! หลังจากสัมผัสกับสปอร์ของต้นกล้า ประชากรบางส่วนของเราดูเหมือนจะปรับตัวให้เจริญเติบโตได้มากกว่าที่คาดไว้บน [Root.GetPlanetMoon].\n\nครั้งอีกครั้ง อันเป็นผลมาจากกระบวนการนี้ นักพันธุศาสตร์ของเราเองยังไม่เข้าใจนักพันธุศาสตร์ของเรามากนัก ประชากร §Gนูบูล§! จำนวนหนึ่งได้ปรากฏขึ้นข้างดาวเคราะห์ ซึ่งเกิดขึ้นเมื่อกระบวนการใกล้เสร็จสิ้น"

 grunur_digsite_1:0 "ซากปรักหักพังกรูนูร์"
 grunur_digsite_1_desc:0 "ซากที่เหลืออยู่ของสิ่งที่เชื่อกันว่าเป็นอาคารบริหารโบราณ ซึ่งเป็นของสิ่งมีชีวิตในอวกาศที่เรียกตัวเองว่า §Yกรูเนอร์§! ถูกค้นพบบน [From.Planet.GetName].\n\nอารยธรรมที่ล่มสลายนี้ดูเหมือนจะอาศัยอยู่บนโลกนี้เมื่อเจ็ดล้านปีก่อน และนักโบราณคดีของเรากระตือรือร้นที่จะเปิดเผยความลับของพวกเขา"
 baol_digsite_1:0 "เป็นหมัน"
 baol_digsite_1_desc:0 "ลึกเข้าไปในบันทึกทางธรณีวิทยาของ [From.Planet.GetName] ได้มีการค้นพบขุมทรัพย์ฟอสซิลที่มีแนวโน้มว่าเป็นพืชพันธุ์พืชที่มีโครงสร้างทางระบบประสาทที่จำเป็นสำหรับสติปัญญาได้ถูกค้นพบแล้ว \n\nหากสิ่งมีชีวิตที่ตายไปนานแล้วเหล่านี้เป็น §Yลูกบอล§! จริงๆ การศึกษาซากของพวกมันอาจให้ข้อมูลเชิงลึกเกี่ยวกับสิ่งที่เปลี่ยนดาวเคราะห์ที่ครั้งหนึ่งเคยเขียวชอุ่มให้กลายเป็นโลกที่แห้งแล้งไร้อากาศ"
 baol_digsite_2:0 "ผู้แตกสลาย"
 baol_digsite_2_desc:0 "ซากศพอันน่าสลดใจของอาณานิคม §Yลูกบอล§! ในอดีต แต่ดาวเคราะห์น้อยดวงนี้กลับเต็มไปด้วยขุมฟอสซิลมากมายที่ขอร้องให้มีการขุดค้น นักโบราณคดีของเราหวังว่าจะค้นพบเพิ่มเติมเกี่ยวกับประวัติศาสตร์ของ §Yลูกบอล§! อันลึกลับ และบทบาทที่น่าสงสัยของ §Yกรูเนอร์§! ในชะตากรรมอันมืดมนของโลก"
 baol_digsite_3:0 "ผู้ที่เงียบงัน"
 baol_digsite_3_desc:0 "ยังคงมีบรรยากาศและรูปแบบชีวิตที่ต่ำกว่า สถานที่ขุดได้ถูกสร้างขึ้นในอดีตอาณานิคม §Yลูกบอล§! นี้ โดยหวังว่าจะให้ความกระจ่างมากขึ้นเกี่ยวกับประวัติศาสตร์ขั้นสูงสุดของอารยธรรม"
 city_of_bones:0 "เมืองแห่งกระดูก"
 city_of_bones_desc:0 "ซากปรักหักพังของเมืองดึกดำบรรพ์ที่สร้างขึ้นจากกระดูกที่ไม่ทราบที่มาทั้งหมดถูกค้นพบหลังจากพายุทรายที่รุนแรงบนโลกใบนี้\n\nนักโบราณคดีของเรากระตือรือร้นที่จะเริ่มการขุดค้นเมืองโบราณที่น่าสยดสยองแห่งนี้"
 city_of_bones_desc_uncol:0 "ซากปรักหักพังของเมืองดึกดำบรรพ์ที่สร้างขึ้นจากกระดูกที่ไม่ทราบแหล่งกำเนิดทั้งหมดถูกค้นพบบนโลกใบนี้ \n\nนักโบราณคดีของเรากระตือรือร้นที่จะเริ่มขุดค้นซากปรักหักพังที่น่าสยดสยองเหล่านี้"
 mutation_vats:0 "ฟอสซิลกลายพันธุ์"
 mutation_vats_desc:0 "มีการพบฟอสซิลที่กลายพันธุ์อย่างหนักจำนวนมากที่น่าประหลาดใจบนโลกใบนี้ ซึ่งทั้งหมดเป็นของผู้มีปัญญาที่สูญพันธุ์สายพันธุ์เดียวกัน\n\nอะไรที่อาจนำไปสู่การกลายพันธุ์ของสมาชิกหลายล้านคนในสังคมที่ครั้งหนึ่งเคยก้าวหน้า? นักโบราณคดีของเราต้องการตรวจสอบเพิ่มเติม"
 planetary_mechanocalibrator:1 "เครื่องจักรดาวเคราะห์"
 planetary_mechanocalibrator_desc:1 "เครื่องจักรที่ขึ้นสนิมและหุ้มด้วยฟิล์มที่ปกคลุม [From.Planet.GetName] นั้นไหลลึกเข้าไปในแกนกลางของดาวเคราะห์ เพื่อที่จะคลี่คลายความลึกลับทางกลนี้มากขึ้น นักโบราณคดีของเราจะต้องสร้างสถานที่ขุดค้นที่กว้างขวาง"
 the_host:0 "โพรงใต้ดิน"
 the_host_desc:0 "เครือข่ายอุโมงค์ใต้ดินที่กว้างขวางซึ่งมีสัดส่วนที่น่าประหลาดใจอย่างแท้จริงทำให้เกิดการหมุนวนในเปลือกโลกนี้ อะไรสามารถสร้างพวกเขาขึ้นมาได้?"

 ancrel.2041.name:0 "$city_of_bones$"
 ancrel.2041.desc:0 "บางส่วนของเมืองกระดูกอันน่าสยดสยองที่ถูกฝังอยู่ใต้ผืนทรายบน [From.Planet.GetName] มายาวนานได้รับการขุดค้นอย่างระมัดระวังโดยทีมงาน [Root.GetName] \n\nดูเหมือนว่าเมืองนี้ถูกสร้างขึ้นโดยสังคมมนุษย์ต่างดาวดึกดำบรรพ์เมื่อหลายล้านปีก่อน บนพื้นที่ทะเลทรายอันกว้างใหญ่ การขาดแคลนวัสดุก่อสร้างอื่นๆ ในทะเลทรายที่ไม่มีน้ำน่าจะมีส่วนทำให้สังคมที่สูญหายไปนานนี้ต้องใช้กระดูกในการก่อสร้าง... แม้ว่ากระดูกดังกล่าวมาจากสิ่งมีชีวิตชนิดใดยังไม่ทราบก็ตาม"
 ancrel.2042.name:0 "$city_of_bones$"
 ancrel.2042.desc:0 "การขุดค้นตามเป้าหมายไม่ได้เผยให้เห็นทั้งโครงกระดูกที่สมบูรณ์ของสายพันธุ์ที่เป็นกระดูกของเมืองเก่าแก่ที่ถูกสร้างขึ้น หรือตัวอย่างฟอสซิลที่คล้ายกันจากนอกเมือง คำถามที่ว่าอารยธรรมที่สูญหายบน [From.Planet.GetName] ได้รับกระดูกที่พวกเขาใช้ในการสร้างเมืองอันน่าสยดสยองอยู่ที่ไหน \n\nนักวิจัยของเราได้เริ่มตั้งสมมติฐานว่ากระดูกดังกล่าวอาจถูกนำมาจากสิ่งมีชีวิตทางชีวภาพหรือปศุสัตว์ ซึ่งเก็บไว้เฉพาะในบริเวณใกล้เคียงของเมืองเท่านั้น การศึกษาต่อไปควรเปิดเผยเพิ่มเติม"
 ancrel.2043.name:0 "$city_of_bones$"
 ancrel.2043.desc:1 "ในที่สุดนักวิทยาศาสตร์ของเราก็ได้ค้นพบต้นกำเนิดของกระดูกที่ใช้สร้างเมืองที่น่าสยดสยองบนเนินทรายของ [From.Planet.GetName] การค้นพบล่าสุดได้พิสูจน์ว่ากระดูกเป็นของสัตว์เลื้อยคลานพื้นเมืองที่สูญพันธุ์ไปนานแล้วบนโลก ซึ่งเป็นสายพันธุ์ที่พัฒนาโรคทางพันธุกรรมที่หายาก ทำให้เกิดการเจริญเติบโตของอวัยวะที่ระเบิดได้และขบวนการสร้างกระดูกของเนื้อเยื่ออ่อน\n\nอารยธรรมที่สูญหายไปบน [From.Planet.GetName] ดูเหมือนจะสังเกตเห็นการแพร่กระจายของโรคนี้แล้วจึงใช้ประโยชน์จากมัน โดยคัดเลือกพันธุ์สัตว์เลื้อยคลานที่ได้รับผลกระทบเพื่อปลูกฝังวัสดุก่อสร้างในปริมาณคงที่บนทรายรกร้างที่พวกเขาเรียกว่าบ้าน"
 ancrel.2043.a:0 "น่าสยดสยอง"
 ancrel.2043.a.tooltip:0 "§Hปลดล็อกการตัดสินใจ:§! $decision_tissue_growth_stimulants$"
 ancrel.2043.b.tooltip:0 "§Hปลดล็อกการตัดสินใจ:§! $decision_explosive_fungifoam_housing$"
