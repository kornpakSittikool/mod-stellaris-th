  ancrel.8000.intro:0 "ระหว่างการขุดค้นที่ไซต์โบราณคดีบน [From.Planet.GetName] เกิดการเปิดใช้งานกริดเลเซอร์โบราณที่ยังทำงานอยู่โดยไม่ได้ตั้งใจ"
  ancrel.8000.critical:0 "ลำแสงเลเซอร์ที่เคลื่อนที่เร็วเฉือน §H[dead_scientist.GetName]§! และ [Root.Owner.GetArchaeologistPlural] อีกหลายคนให้เป็นชิ้นเล็กชิ้นน้อย"
  ancrel.8000.failure:0 "หลาย [Root.Owner.GetArchaeologistPlural] ถูกเฉือนเป็นชิ้นเล็กโดยลำแสงที่เคลื่อนที่เร็ว แม้ว่า §H[Root.GetLeaderName]§! รอดปลอดภัย แต่ความสูญเสียเหล่านี้ส่งผลลบต่อโครงการ"
  ancrel.8000.success:0 "โชคดีที่ §H[Root.GetLeaderName]§! สามารถปิดเลเซอร์ได้ก่อนเกิดอันตราย โครงการดำเนินไปข้างหน้า เร็วกว่ากำหนด"
  ancrel.8000.pay:0 "เลเซอร์ขวางทางเดียวเท่านั้น การปิดมันจะเสียค่าใช้จ่าย แต่หาทางรอบกริดจะใช้เวลามาก"
  ancrel.8000.name:0 "กริดเลเซอร์ถูกเปิดใช้งาน"
  ancrel.8000.desc:0 "$ancrel.8000.intro$\n\n$ancrel.8000.critical$"
