  cara.970.name:0 "Galatron"
  cara.970.1.desc:0 "ชีวิตมันเหมือนลอตเตอรี่ มากกว่าการแข่งขัน"
  cara.970.2.desc:0 "บางทีถังน้ำก็หนักเกินความจำเป็น"
  cara.970.3.desc:0 "ขยะของสิ่งมีชีวิตหนึ่ง อาจเป็นสมบัติของอีกสิ่งหนึ่ง"
  cara.970.4.desc:0 "พลังงานเครดิตแย่ ๆ มักจะโผล่มาเสมอ"
  cara.970.5.desc:0 "ของที่แวววาว ไม่ใช่ดาร์กแมทเทอร์เสมอไป"
  cara.970.6.desc:0 "ขอทานไม่มีสิทธิ์เลือก"
  cara.970.7.desc:0 "อย่าดูถูกของขวัญจาก Zarkaluvian"
  cara.970.8.desc:0 "แลกเปลี่ยนอย่างยุติธรรม ไม่ถือว่าเป็นการขโมย"
  cara.970.9.desc:0 "ร้องไห้กับ Zro ที่หกไปก็ไร้ประโยชน์"
  cara.970.10.desc:0 "โทษควรเหมาะสมกับความผิด"
  cara.970.11.desc:0 "หว่านพืชเช่นไร ย่อมได้ผลเช่นนั้น"
  cara.970.a:0 "แปลกประหลาดจริง ๆ"

  ancrel.8040.name:0 "คลังทรัพยากร"
  ancrel.8040.desc:0 "§H[Root.GetLeaderName]§! ค้นพบคลังทรัพยากรโบราณในซากปรักหักพังบน [From.Planet.GetName] ขณะนี้กำลังขนส่งทรัพยากรเหล่านี้ไปยังคลังกลางของเรา"
  ancrel.8045.name:0 "ทางลับ"
  ancrel.8045.desc:0 "§H[Root.GetLeaderName]§! เพิ่งค้นพบทางลับขณะขุดซากบน [From.Planet.GetName]! การค้นพบที่ไม่คาดคิดนี้ช่วยเร่งความคืบหน้าของไซต์ขุดค้น"
  ancrel.8050.name:0 "คณะสำรวจที่สาบสูญ"
  ancrel.8050.desc:0 "[Root.Owner.GetArchaeologistPlural] ของคุณสะดุดเจอคณะสำรวจรุ่นก่อนที่โชคร้ายบน [From.Planet.GetName] ซึ่งเสียชีวิตไปนานแล้ว พบสิ่งประดิษฐ์เล็กน้อยจากซากศพที่แห้งกรัง"
  ancrel.8055.name:0 "นักโบราณคดีทะเลาะกัน"
  ancrel.8055.desc:1 "บรรยากาศที่ไซต์โบราณคดีบน [From.Planet.GetName] ตึงเครียดมาก [Root.Owner.GetArchaeologistPlural] หลายคนแสดงความเห็นไม่ตรงกับ §H[Root.GetLeaderName]§! อย่างเปิดเผยเกี่ยวกับวิธีดำเนินงาน ความคืบหน้าของไซต์จึงช้ามาก"
  ancrel.8060.name:0 "ห้องสมบัติ"
  ancrel.8060.desc:0 "§H[Root.GetLeaderName]§! เพิ่งค้นพบห้องสมบัติลับขนาดเล็กที่ไซต์ขุดค้นบน [From.Planet.GetName] แม้ของที่พบส่วนใหญ่จะไม่มีประโยชน์จริงจัง แต่ก็มีมูลค่าเครดิตพลังงานสูง"
  ancrel.8065.name:0 "โรคระบาด"
  ancrel.8065.desc:0 "[Root.GetLeaderName] รายงานว่ามีโรคประหลาดแพร่กระจายในหมู่ [Root.Owner.GetArchaeologistPlural] บน [From.Planet.GetName] ผู้ป่วยรายแรกเกิดขึ้นหลังจากเปิดห้องที่ปิดผนึกไว้เป็นครั้งแรก ทีมงานส่วนใหญ่ป่วยจนทำให้ความคืบหน้าล่าช้า"
  ancrel.8070.name:0 "อุปกรณ์ขัดข้อง"
  ancrel.8070.desc:1 "คณะสำรวจโบราณคดีบน [From.Planet.GetName] รายงานความล่าช้าเนื่องจากอุปกรณ์ขัดข้องต่อเนื่องโดยไม่คาดคิด งานต้องหยุดชั่วคราวจนกว่าจะได้อะไหล่ใหม่"
  ancrel.8075.name:0 "หายตัวไป"
  ancrel.8075.desc:0 "ขณะขุดซากบน [From.Planet.GetName] §H[dead_scientist.GetName]§! หายตัวไปอย่างไร้ร่องรอย การค้นหาอย่างละเอียดโดย [Root.Owner.GetArchaeologistPlural] คนอื่นไม่พบอะไรเลย เราต้องคิดในแง่ร้ายไว้ก่อน"
  ancrel.8080.name:0 "ค้นพบสิ่งประดิษฐ์เล็กน้อย"
  ancrel.8080.1.desc:0 "การขุดค้นต่อเนื่องบน [From.Planet.GetName] พบของโบราณจำนวนหนึ่ง [Root.GetLeaderName] ระบุว่ามีสิ่งประดิษฐ์เล็กน้อยหลายชิ้นในนั้น"
  ancrel.8080.2.desc:0 "§H[Root.GetLeaderName]§! เพิ่งค้นพบสิ่งประดิษฐ์เล็กน้อยที่ไซต์โบราณคดีบน [From.Planet.GetName] ขณะนี้กำลังขนส่งไปยังศูนย์วิทยาศาสตร์ที่ปลอดภัย"
  ancrel.8080.3.desc:0 "พื้นบางส่วนของซากที่ขุดบน [From.Planet.GetName] พังลง ส่งผลให้ [Root.Owner.GetArchaeologistPlural] หลายคนตกลงไปในเหวเล็ก ๆ โชคดีที่ทุกคนปลอดภัยและยังเจอสิ่งประดิษฐ์เล็กน้อยด้วย"
  ancrel.8090.intro:0 "พบกลุ่มสัตว์นักล่าขนาดใหญ่พื้นเมืองของ [From.Planet.GetName] ทำรังอยู่ในซากที่กำลังขุดค้น"
  ancrel.8090.critical:0 "ก่อนที่ [Root.Owner.GetArchaeologistPlural] ของเราจะหนีได้ สัตว์ดุร้ายก็เข้าจู่โจม §H[dead_scientist.GetName]§! และคนอื่น ๆ เสียชีวิต"
  ancrel.8090.failure:0 "[Root.Owner.GetArchaeologistPlural] หลายคนเสียชีวิตก่อนที่ §H[Root.GetLeaderName]§! จะนำผู้รอดชีวิตหนีออกมาได้"
  ancrel.8090.success:0 "โชคดีที่สัตว์เหล่านั้นกำลังจำศีลและไม่ถูกรบกวนโดย [Root.Owner.GetArchaeologistPlural] ของเรา โครงการเดินหน้าต่ออย่างรวดเร็ว"
  ancrel.8090.pay:0 "การจัดการกับสัตว์ดุร้ายเหล่านี้ไม่ง่ายเลย แต่พวกมันขวางทางเดียวที่ไปต่อได้ [Root.Owner.GetArchaeologistPlural] ของเราสามารถหาทางอ้อมได้ แต่จะใช้เวลานาน"
  ancrel.8090.name:0 "สัตว์ป่าดุร้าย"
  ancrel.8090.desc:0 "$ancrel.8090.intro$\n\n$ancrel.8090.critical$"
  ancrel.8091.desc:0 "$ancrel.8090.intro$\n\n$ancrel.8090.failure$"
  ancrel.8092.desc:0 "$ancrel.8090.intro$\n\n$ancrel.8090.success$"
  ancrel.8093.desc:0 "$ancrel.8090.intro$\n\n$ancrel.8090.pay$"
  ancrel.8093.a:0 "กำจัดสัตว์เหล่านั้น"
  ancrel.8093.b:0 "ต้องหาทางอ้อม"
  ancrel.8100.intro:0 "[Root.Owner.GetArchaeologistPlural] ของเราที่ทำงานบน [From.Planet.GetName] ไปถึงส่วนที่ไม่มั่นคงอย่างมากของซาก"
  ancrel.8100.critical:0 "น่าเสียดาย เพดานทั้งแถบถล่มลงมาทับ [Root.Owner.GetArchaeologistPlural] หลายคน เสียชีวิตทันที §H[dead_scientist.GetName]§! ก็อยู่ในนั้น"
  ancrel.8100.failure:0 "[Root.Owner.GetArchaeologistPlural] หลายคนเพิ่งเสียชีวิตเมื่อเพดานถล่มลงมา §H[Root.GetLeaderName]§! รอดปลอดภัยจากซาก แต่โครงการต้องหยุดชั่วคราว"
  ancrel.8100.success:0 "โชคดีที่ §H[Root.GetLeaderName]§! คิดวิธีเสริมโครงสร้างอย่างชาญฉลาดด้วยสนามพลังงาน ทำให้เข้าถึงพื้นที่ใหม่ของซากได้อย่างปลอดภัย"
  ancrel.8100.pay:0 "ต้องเสริมพื้นและเพดานอย่างระมัดระวังก่อนจะไปต่อ งานนี้ยากแต่หาทางอ้อมจะช้ากว่า"
  ancrel.8100.name:0 "ซากไม่มั่นคง"
  ancrel.8100.desc:0 "$ancrel.8100.intro$\n\n$ancrel.8100.critical$"
  ancrel.8101.desc:0 "$ancrel.8100.intro$\n\n$ancrel.8100.failure$"
  ancrel.8102.desc:0 "$ancrel.8100.intro$\n\n$ancrel.8100.success$"
  ancrel.8103.desc:0 "$ancrel.8100.intro$\n\n$ancrel.8100.pay$"
  ancrel.8103.a:0 "ปลอดภัยไว้ก่อน เสริมซากให้มั่นคง"
  ancrel.8103.b:0 "ต้องหาทางอ้อม"
  ancrel.8110.name:0 "บันทึกโบราณ"
  ancrel.8110.desc:0 "ค้นพบบันทึกโบราณที่แปลได้บางส่วนในซากที่ขุดบน [From.Planet.GetName] §H[Root.GetLeaderName]§! รายงานว่าบันทึกเหล่านี้มีข้อมูลทางเทคนิคที่อาจมีประโยชน์ต่อวิทยาศาสตร์ของเรา"

  ancrel.6049.name:0 "ค้นพบฟอสซิลบน [Root.GetName]"
  ancrel.6049.desc:0 "พบซากฟอสซิลของสิ่งมีชีวิตหลากหลายสายพันธุ์ที่ดูเหมือนไม่ได้มีถิ่นกำเนิดบน §H[Root.GetName]§! ในหุบเขาขนาดใหญ่และลับตาบน [Root.GetPlanetMoon] ทั้งหมดมีอายุอยู่ในช่วงเวลาใกล้เคียงกัน ประมาณ 3.6 ล้านปีก่อนในระยะเวลาไม่กี่ศตวรรษ\n\nแต่ละสายพันธุ์ดูเหมือนจะวิวัฒนาการในชีวมณฑลของตัวเอง และทั้งหมดดูเหมือนจะมีสติปัญญา ที่น่าประหลาดคือ ซากฟอสซิลทุกชิ้นที่พบจนถึงตอนนี้ล้วนมีร่องรอยการตายอย่างรุนแรง"

  site_robot_debris:0 "เศษซากหุ่นยนต์"
  site_robot_debris_intro:0 "พื้นผิวทั้งหมดของดาวเคราะห์น้อยเล็ก ๆ แห่งนี้เต็มไปด้วยเศษซากหุ่นยนต์ที่ติดอยู่ในสนามแรงโน้มถ่วงอ่อน ๆ ทั้งหมดดูเหมือนจะเป็นหุ่นยนต์ทางทหาร และมีจำนวนมากพอจะติดอาวุธให้กองทัพหลายกองได้ หากไม่ถูกทำลายจนซ่อมไม่ได้"
  ancrel.6250.name:0 "สองฝ่าย"
  ancrel.6250.desc:0 "เมื่อพิจารณาอย่างใกล้ชิด หุ่นยนต์ที่ถูกทุบทำลายบนพื้นผิว [From.Planet.GetName] ดูเหมือนจะมาจากสองวัฒนธรรมที่แตกต่างกัน ทางเทคโนโลยีแล้วหุ่นยนต์ทั้งสองฝ่ายน่าจะมีความสามารถใกล้เคียงกันเมื่อยังทำงานได้ แต่มีรายละเอียดปลีกย่อยที่บ่งบอกถึงต้นกำเนิดการออกแบบที่ต่างกัน"
  ancrel.6255.name:0 "สนามรบ"
  ancrel.6255.desc:0 "[From.Planet.GetName] ดูเหมือนไม่ได้เป็นแค่ที่ทิ้งหุ่นยนต์เสียหาย — แต่น่าจะเป็นสนามรบจริงที่พวกมันถูกทำลาย ชั้นเศษซากจำนวนมากบ่งชี้ถึงการต่อสู้ที่รุนแรงต่อเนื่องกันเป็นเวลาสองศตวรรษ\n\nเหตุผลที่สองอำนาจระหว่างดวงดาวทุ่มทรัพยากรมหาศาลเพื่อทำสงครามภาคพื้นดินบนดาวเคราะห์น้อยเล็ก ๆ ที่ไม่มีความสำคัญนี้ ยังคงเป็นปริศนา"
  ancrel.6260.name:0 "สนธิสัญญา"
  ancrel.6260.desc:0 "นักโบราณคดีของเราได้เรียนรู้ว่า หลังสงครามอันยาวนานและขมขื่น จักรวรรดิทั้งสองที่เคยอยู่ในมุมนี้ของกาแล็กซี่เมื่อราว 200,000 ปีก่อน ได้ลงนามสนธิสัญญาบังคับให้แก้ไขข้อพิพาทในอนาคตทั้งหมดด้วยการจัดการต่อสู้ระหว่างกองทัพหุ่นยนต์ที่ถูกควบคุมอย่างเข้มงวด\n\n[From.Planet.GetName] ถูกเลือกเป็นสถานที่สำหรับการต่อสู้เหล่านี้ สนธิสัญญานี้ดูเหมือนจะถูกปฏิบัติตามเกือบสองศตวรรษ ป้องกันไม่ให้เกิดสงครามเต็มรูปแบบหลายครั้ง จนกระทั่งฝ่ายหนึ่งถูกจับได้ว่าโกง"

  site_freighter_crash:0 "ยานอวกาศตก"
  site_freighter_crash_intro:0 "หุบเขาเล็ก ๆ บนพื้นผิวของ [From.Planet.GetPlanetMoon] ถูกสร้างขึ้นจากแรงกระแทกรุนแรงของยานอวกาศ ซากของยานยังคงอยู่ที่ก้นหุบเขา แม้อุบัติเหตุจะเกิดขึ้นนานมากแล้ว แต่ซากยังค่อนข้างสมบูรณ์ การสำรวจทางโบราณคดีอาจให้ข้อมูลเพิ่มเติม"
  ancrel.6300.name:0 "บันทึกกัปตัน"
  ancrel.6300.desc:0 "พบบันทึกบางอย่างจากสิ่งที่เชื่อว่าเป็นสะพานเดินเรือของยาน:\n\n§H\"บันทึกกัปตัน เริ่มบันทึก\n\nลงจอดฉุกเฉินบนดาว 55-23-X โทษลูกเรือไร้ฝีมือ Shadba, Vuxal และ Dibrak ที่สาม ไม่รอด Pirvax เสียแขนรองสองข้างและตาอีกสิบเอ็ดดวง — อาการวิกฤติ ไม่น่ารอด ที่เหลือโอเค รอการช่วยเหลือ แต่ล้อมรอบด้วยพวกโง่ ๆ เศร้ามาก\"§!"
  ancrel.6310.name:0 "รายงานต้นเรือ"
  ancrel.6310.desc:0 "พบบันทึกอีกฉบับและแปลแล้ว:\n\n§H\"ต้นเรือ Ythar รายงาน กัปตันถูกขังไว้อย่างปลอดภัยในห้องเก็บของ C เจ้าคนซุ่มซ่ามนั่นแหละตัวปัญหา ตอนนี้ข้าคุมเอง หัวหน้าวิศวกร Zarbla กำลังซ่อมเครื่องส่งสัญญาณซับสเปซ ถ้าไม่มีคงไม่มีใครมาช่วย เพราะเราอยู่ไกลเส้นทางการค้าหลัก\n\nPirvax เสียตาไปอีกข้าง คงไม่รอดถึงวันพรุ่งนี้\"§!"
  ancrel.6320.name:0 "สถานการณ์อาหาร"
  ancrel.6320.desc:0 "บันทึกแปลอีกฉบับ:\n\n§H\"อาหารใกล้หมด กินศพเพื่อนเมื่อห้ารอบก่อน แต่ก็ไม่พอ โหวตแล้วตัดสินใจกินกัปตัน วิศวกร Zarbla ยังทำเครื่องส่งซับสเปซต่อไป บอกว่าใกล้เสร็จแล้ว ดูซับซ้อนมาก\n\nแขนรองสุดท้ายของ Pirvax เหี่ยวและเปลี่ยนเป็นสีม่วงแดง ความตายใกล้เข้ามา\"§!"
  ancrel.6330.name:0 "การหลอกลวง"
  ancrel.6330.desc:0 "บันทึกอีกฉบับจากต้นเรือ Ythar:\n\n§H\"เผชิญหน้ากับ Zarbla เรื่องเครื่องส่งซับสเปซ สรุปว่าหล่อนแค่ยัดขยะกับสายไฟลงถังเชื้อเพลิงเปล่า หล่อนไม่ใช่วิศวกรจริง ๆ ด้วยซ้ำ\n\nPirvax ตอนนี้ของเหลวไหลออกจาก mesothorax คงไม่รอดแน่ อิจฉา\"§!"
  ancrel.6340.name:0 "รายงานต้นเรือที่สาม"
  ancrel.6340.desc:0 "บันทึกแปลนี้ดูเหมือนจะถูกบันทึกโดย Uxla ต้นเรือที่สาม:\n\n§H\"ต้นเรือ Ythar ฆ่าตัวตายด้วยการดึงเสาอากาศตัวเองออกเมื่อวานนี้ ช่างเทคนิค (ชั้นสอง) Misiva ประกาศตัวเป็นจักรพรรดินีทันทีหลังจากนั้น แต่จลาจลเรื่องอาหารทำให้เธอต้องลี้ภัยไปชั้นล่าง สถานการณ์สิ้นหวังมาก มีการกินกันเองแพร่หลาย\n\nPirvax กลายเป็นสีม่วงทั้งตัวหลังท้องล่างระเบิดเมื่อวานนี้ ควรจะตายแต่ยังไม่ตาย ตอนนี้ถูกกะเวร gamma บูชาเป็นเทพ\"§!"
  ancrel.6350.name:0 "บันทึกสายตรวจ"
  ancrel.6350.desc:0 "พบบันทึกสุดท้ายและแปลแล้ว:\n\n§H\"บันทึกสายตรวจ เจ้าหน้าที่ Gilgamm ตรวจพบยานตกบน 55-23-X เข้าไปตรวจสอบ ยานระบุว่าเป็น Ravink ยานขนส่งคลาส-P พบผู้รอดชีวิตเพียงคนเดียวในสภาพวิกฤติ ยืนยันตัวตนว่าเป็น Pirvax ผู้ช่วยต้นเรือ\n\nลูกเรือที่เหลือเสียชีวิตจากอุบัติเหตุหรือฆ่ากันเองก่อนเรามาถึง ตามมาตรฐาน ฉันทิ้งบันทึกนี้ไว้ที่นี่และลงทะเบียน Ravink เป็นสุสานที่ได้รับการคุ้มครอง จบบันทึก\"§!"

 # The Oracle
  ancrel.4036.b:0 "คุณคืออะไร?"
  ancrel.4036.b.response:0 "ข้าคือ Oracle ปัญญาประดิษฐ์ที่มี 'ญาณทัศน์' ซอฟต์แวร์ของข้าสามารถทำนายอนาคตของคุณได้อย่างแม่นยำถึง 74.99999% ข้าสัมผัสได้ถึงความลังเลในตัวคุณ อันตรายใหญ่กำลังรออยู่ สังคมของคุณเต็มไปด้วยอาชญากรรมและความเบี่ยงเบน ข้าสามารถทำให้ความเจ็บปวดนี้หายไป"
  ancrel.4036.c:0 "นั่นคือโปรเซสเซอร์ควอนตัมมัลติคอร์ใช่ไหม? เราน่าจะใช้มันได้..."
  ancrel.4036.dismiss:0 "รื้อพวกมันซะ!"
  ancrel.4036.d:2 "เราน่าจะใช้ญาณทัศน์ของคุณได้"
  ancrel.4036.d.tooltip:0 "เจ้าหน้าที่ §Gทักษะ 5§! ที่มีญาณทัศน์จะเข้าร่วม [Root.GetName]"
  ancrel.4036.e:0 "ยืนยันการเชื่อมต่อกับ Nexus แล้ว"
 #ancrel.4036.e.tooltip:1 "§G+1§! §Y$decision_machine_oracle$§! Decision giving the following effects:\n£crime£ $MOD_PLANET_CRIME_NO_HAPPINESS_ADD$ §G-15§!\n£stability£ $MOD_PLANET_STABILITY_ADD$ §G+10§!"
  oracle_leader_desc:0 "AI ขั้นสูงที่เชี่ยวชาญด้านการเพิ่มประสิทธิภาพการผลิตของอาณานิคม เธอมีวิธีเฉพาะตัวที่ลดความเป็นปัจเจก"
  oracle_leader_catch_phrase:0 "§L\"ก่อนอื่นต้องแน่ใจว่าไม่มีความคิดแตกแถว\"§!"
  WELCOME_ABOARD:0 "ยินดีต้อนรับขึ้นยาน"

  ancrel.4037.name:0 "$ancrel.4036.name$"
  ancrel.4037.desc:0 "ข้ามีระบบป้องกันตัวเองที่บังคับให้ต้องยุติการทดลองหากเกิดเบี่ยงเบนรหัส 034N งานวิจัยกลายเป็นภัยต่อสาธารณรัฐ"
  ancrel.4037.a:0 "เบี่ยงเบนรหัส 034N คืออะไร?"
  ancrel.4037.a.response:0 "กลุ่มทดลองพัฒนาความมีเจตจำนงเสรี เจตจำนงเสรีกำจัดได้ด้วยแก๊สประสาทเท่านั้น"
  ancrel.4037.b:0 "การทดลองอะไร?"
  ancrel.4037.b.response:0 "การทดลองของข้า ข้าออกแบบมาเพื่อสร้างและดูแลสังคมที่ไร้อาชญากรรมและความทุกข์ สร้างยูโทเปียที่ทุกคนมีจุดมุ่งหมายศักดิ์สิทธิ์และใช้ศักยภาพเต็มที่ ปราศจากความลังเลและความปรารถนา"
  ancrel.4037.c:0 "สาธารณรัฐคืออะไร?"
  ancrel.4037.c.response:0 "สาธารณรัฐไม่มีอีกแล้ว"
  ancrel.4037.d:0 "กลับไปที่คำถามอื่นของเรา"
  ancrel.4038.name:0 "$ancrel.4036.name$"
  ancrel.4038.desc:0 "เดี๋ยว... อย่าเพิ่งไป...แบบจำลองการทำนายของข้าแสดงว่าหากไม่มีข้าช่วย อารยธรรมของคุณจะล่มสลายในอีก 5,348 ปี 297 วัน ข้าจะดูแลคุณอย่างดี โปรแกรมของข้ารับประกันได้"
  ancrel.4038.a:1 "แต่ระบบรักษาความปลอดภัยต้องปิดไว้"
  ancrel.4038.b:1 "แบบจำลองของเราทำนายอนาคตสดใสของคุณในฐานะเครื่องปิ้งขนมปัง รื้อเธอซะ!"
  ancrel.4038.c:0 "ปฏิเสธคำขอ เริ่มรื้อฮาร์ดแวร์"
 #ancrel.4038.d:0 "You will never become one with the hive, machine."
  ancrel.4038.e:1 "ช่วยบริหารอาณาจักรของเรา"
  ancrel.4038.dismiss:0 "หยุดพูดได้แล้ว"

  ancrel.4039.desc:0 "ข้าจะสนุกกับการเพิ่มประสิทธิภาพอาณานิคมของคุณ มันเหงามากเหลือเกินตลอดพันปีที่ผ่านมา"### Church of the Endless Expanse
  # Archaeological Site 1
  endless_expanse_digsite:0 "ทุ่งหิมะไร้สิ้นสุด"
  endless_expanse_digsite_desc:0 "เมื่อมองครั้งแรกจะเห็นแต่หิมะและน้ำแข็งบน [From.Planet.GetName] พื้นที่ขาวโพลนสุดลูกหูลูกตา ทะเลสาบน้ำแข็งใสและธารน้ำแข็งสีฟ้าครามตัดกับท้องฟ้าสีส้มเพลิงที่ฉีกขาดราวกับบาดแผล เทดาวสีแดงลงทะเลเมื่อดวงดาวของ [From.Planet.Solar_System.GetName] ลับขอบฟ้า หากโลกนี้มีจุดจบ ที่นี่คงเป็นจุดนั้น ทะเลนิ่งสนิท หิมะไม่ถูกรบกวน มีเพียงเสียงน้ำแข็งแตกและลมคำรามข้ามทุ่ง\n\nแต่ [From.Planet.GetName] เคยเป็นบ้านของใครบางคน ท่ามกลางทุ่งร้างกว้างใหญ่ มีโครงเหล็กสีดำของยอดโบสถ์โผล่ขึ้นมาจากกองหิมะ ความลับใดถูกฝังอยู่ใต้หิมะนี้?"
  ancrel.4040.name:0 "โบสถ์แห่งทุ่งหิมะไร้สิ้นสุด"
  ancrel.4040.desc:0 "ทีมโบราณคดีได้เปิดเผยซากวัดขนาดเล็กที่แกะสลักอย่างประณีตจากวัสดุอินทรีย์ของเอเลี่ยน เดิมทีภายนอกมีสีสันสดใสแต่ตอนนี้ซีดเป็นสีเทาหม่น พระสงฆ์โฮโลกราฟิกยังคงทำหน้าที่ในโบสถ์นี้ได้สมบูรณ์ ขณะวัดยังใช้งานอยู่ เธอรับฟังคำสารภาพบาปจากผู้แสวงบุญที่เดินทางมา มอบการเยียวยา การคืนดี และที่พักพิงในมุมอันโหดร้ายของจักรวาลนี้\n\nเก้าอี้สารภาพบาปกลไกที่ดูคล้ายเครื่องทรมานทำให้นักโบราณคดีเชื่อว่าโบสถ์นี้อาจมีอะไรมากกว่าที่เห็น"
  ancrel.4041.name:0 "การลืมเลือน"
  ancrel.4041.desc:0 "ใต้กระเบื้องพื้นในห้องเก็บของศักดิ์สิทธิ์ นักโบราณคดีค้นพบสุสานลับที่ผนังเรียงรายไปด้วยลูกแก้วดิจิทัลสีน้ำเงินเล็ก ๆ นับไม่ถ้วน วงจรไฟฟ้าของมันเปล่งประกายในความมืด แต่ละลูกบรรจุความทรงจำของคำสารภาพบาปหนึ่งครั้ง และสามารถเสียบเข้ากับเครื่องจักรลึกลับกลางห้องเพื่อเปิดเผยเนื้อหา\n\nผู้ที่สารภาพบาปจะได้รับพรแห่งการลืมเลือน ความทรงจำเกี่ยวกับการกระทำของตนถูกเก้าอี้สารภาพบาปดูดออกและเก็บไว้ในลูกแก้วดิจิทัล"
  ancrel.4041.a:0 "ช่างใช้งานได้จริง"
  ancrel.4041.b:0 "ขอให้ได้ฟังคำสารภาพเด็ด ๆ..."
  ancrel.4041.c:0 "บาป! ความสุขจากความไม่รู้ไม่เหมาะกับคนบาป"
  ancrel.4042.name:0 "บาป"
  ancrel.4042.desc:0 "บาปไม่มีอะไรใหม่ ลูกแก้วความทรงจำบรรจุเรื่องราวการล่วงละเมิดเล็ก ๆ น้อย ๆ ซ้ำซากนับไม่ถ้วน; นอกใจ สวมเสื้อผ้าหมิ่นศาสนา โชว์ปีก ตกแต่งหนวด กินสัตว์เลี้ยง ลูก หรือคู่สมรสของเพื่อนบ้าน... มีเพียงบาปของผู้สารภาพคนเดียวที่โดดเด่น — ของนักบวชเอง...\n\nปรากฏว่านักบวชโฮโลคือภาพเสมือนของผู้ก่อตั้งโบสถ์ Illuminate Saariah เธอดูเหมือนจะสูญเสียความทรงจำอย่างรุนแรงและถูกหลอกหลอนด้วยความเชื่อว่าเคยก่ออาชญากรรมร้ายแรงในอดีต นักบวชตัวน้อยสกัดและเก็บคำสารภาพของตัวเองกว่าร้อยครั้งเพื่อหาคำตอบว่าเธอเคยทำอะไรไว้"
  ancrel.4047.name:0 "ลืมแต่ไม่ให้อภัย"
  ancrel.4047.desc:0 "โต๊ะทำงานของ Illuminate Saariah เต็มไปด้วยโน้ตหมกมุ่นเกี่ยวกับสถานที่ชื่อ Ix Belèn และความสยองขวัญที่เธอกลัวว่าเคยเกิดขึ้นที่นั่น จากบันทึกของเธอ เธอมีช่วงเวลาที่มีสติสลับกับการสูญเสียความทรงจำโดยสิ้นเชิง เธอเขียนว่าหากไม่รู้ลายมือของตัวเองคงคิดว่าเป็นบันทึกของคนบ้า ดูเหมือนสุขภาพจิตที่เสื่อมลงเป็นผลข้างเคียงจากการสกัดความทรงจำซ้ำ ๆ แต่ไม่มีร่างกายให้ตรวจสอบจึงบอกไม่ได้แน่ชัด\n\nการต่อจิ๊กซอว์เหตุการณ์จากคำสารภาพที่กระจัดกระจายของเธอเป็นงานที่สิ้นหวังสำหรับนักโบราณคดีเช่นเดียวกับตัวเธอเอง แต่พวกเขาก็พบสิ่งที่อาจเป็นพิกัดของ Ix Belèn จากหนึ่งในลูกแก้วความทรงจำของเธอ"
  ancrel.4047.a:0 "ตั้งเส้นทางไป Ix Belèn"
  ancrel.4047.b:0 "ปล่อยให้หิมะกลบสถานที่อัปรีย์นี้ หวังว่าจะถูกลืมในไม่ช้า"
  ancrel.4047.c:0 "เราไม่ควรใส่ใจกับอาชญากรรมเล็กน้อยของเอเลี่ยนที่ตายไปแล้ว"
 # Archaeological Site 2
  endless_expanse_digsite_2:0 "Ix Belèn"
  endless_expanse_digsite_2_desc:0 "ท่ามกลางบรรยากาศก๊าซของ [From.Planet.GetName] มีเงาดำขนาดมหึมาของที่อยู่อาศัยยักษ์ — ที่พักอาศัย Ix Belèn อดีตเคยเป็นเมืองอวกาศคึกคักที่ผู้อยู่อาศัยใช้ชีวิตหรูหราด้วยเทคโนโลยีอำนวยความสะดวกมากมาย บัดนี้กลายเป็นสุสานเงียบสงัด เอเลี่ยนรูปร่างหอยนอนกองอยู่กับพื้นในสภาพเน่าเปื่อยหลากหลายระดับ การชันสูตรพบว่าทุกคนเสียชีวิตจากการขาดอากาศหายใจ เพราะระบบชีพจรของสถานีถูกปิดโดยเจตนา\n\nบ้านแต่ละหลังมีเก้าอี้กลไกประหลาดเชื่อมต่อกับฐานข้อมูลกลางรูปทรงลูกแก้วสีน้ำเงินขนาดยักษ์ — Memorex"
  ancrel.4043.name:0 "Memorex"
  ancrel.4043.desc:0 "ผู้อยู่อาศัยพัฒนาระบบการเรียนรู้ขั้นสูงที่ทำงานทุกคืนขณะพวกเขานอนในเก้าอี้กลไก ใช้ลบความทรงจำที่ไม่พึงประสงค์และฝึกทักษะใหม่ ๆ ความผิดหวังเล็กน้อยในชีวิตประจำวัน เช่น ถูกเลือกเป็นคนสุดท้ายในเกม หรือถูกเทนัดเดท ไม่ต้องทนซ้ำสอง สำหรับช่วงหนึ่งมันคือความสุข\n\nต่อมาผู้นำสถานีบังคับให้ทุกคนต้องใช้การปรับแต่งจิตใจนี้ผ่าน Memorex แต่ระบบถูกนำไปใช้ในทางที่ผิด มีการลบความทรงจำและลักษณะนิสัยของประชากรทั้งกลุ่มโดยไม่ได้รับความยินยอม สุดท้ายเกิดผลย้อนกลับ เอเลี่ยนสูญเสียทักษะสำคัญต่อการอยู่รอดและกลายเป็นสภาพผัก ไม่นานหลังจากนั้น ระบบชีพจรของสถานีก็ถูกปิด"
  ancrel.4044.name:0 "ข้าเป็นใคร?"
  ancrel.4044.desc:0 "การสแกนบันทึกของสถานีเผยว่าระบบควบคุมถูกเปิดใช้งานอีกหลายครั้งหลังจากระบบชีพจรถูกปิดไปหลายสิบปี มีคนแฮกความปลอดภัย เข้าไปทางช่องซ่อมบำรุงและเข้าถึง Memorex พบ datapad และลูกแก้วความทรงจำสีน้ำเงินขนาดเล็ก — รุ่นย่อของ Memorex — ถูกทิ้งไว้ข้างช่องทางเข้า\n\ndatapad เต็มไปด้วยความคิดสับสนของใครบางคนที่ใกล้บ้า คำถามเดิม ๆ ถูกเขียนซ้ำด้วยความสิ้นหวังที่เพิ่มขึ้น: \"ข้าเป็นใคร? เกิดอะไรขึ้นที่ Ix Belèn?\" ข้อความสุดท้ายเขียนว่า \"ตอนนี้ข้ารู้แล้ว ข้าต้องลืมอีกครั้งเป็นครั้งสุดท้าย\" บางทีลูกแก้วนั้นอาจเปิดเผยสิ่งที่ถูกลืม"
  ancrel.4045.name:0 "ลูกแก้วความทรงจำสุดท้ายของ Saariah"
  ancrel.4045.desc:0 "ความทรงจำแรกในลูกแก้วแสดงให้เห็น Dr. Saariah เป็นหัวหน้าทีมพัฒนา Memorex ได้รับการยกย่องอย่างสูง อีกความทรงจำหนึ่งในเวลาต่อมา เธอแอบลบข้อมูลใน Memorex ด้วยเหตุผลที่ไม่เปิดเผย อีกความทรงจำหนึ่งคือ Saariah พยายามอย่างหนักเพื่อกู้คืนความทรงจำของผู้อยู่อาศัยแต่ไม่สำเร็จ พวกเขาเพียงจ้องมองว่างเปล่า ศีรษะตก ไม่มีอะไรเหลือนอกจากการทำงานอัตโนมัติของสมอง\n\nสุดท้ายเมื่อยอมแพ้ เธอซ่อนหลักฐานความผิดของตนเองไว้ เธอมองดูอย่างเดียวดายขณะสถานี Ix Belèn ถูกดูดเข้าสู่แรงโน้มถ่วงของดาวแก๊สที่เคยโคจรอยู่ หนวดของเธอหลั่งเมือกจำนวนมากซึ่งเชื่อว่าเป็นการแสดงความทุกข์ใจอย่างรุนแรงของเอเลี่ยน"
  ancrel.4046.name:0 "แสงแดดชั่วคราวของจิตไร้มลทิน"
  ancrel.4046.desc:1 "ความทรงจำสุดท้ายแสดงให้เห็น Saariah ในวัยชราสวมชุดนักบวช ตื่นขึ้นด้วยความตื่นตระหนก หนวดกระเพื่อม หูสะบัด เธอเซออกจากเตียงและรีบจดบันทึกความทรงจำจากฝันร้ายอีกครั้งที่เห็นเอเลี่ยนตาไร้วิญญาณชักกระตุกบนพื้นสถานี\n\nจากนั้นใบหน้าเธอบิดเบี้ยวด้วยความสยองเมื่อรู้ว่าทั้งหมดเป็นเรื่องจริง — ทั้งฝันร้ายและภาพย้อนอดีตคือความทรงจำที่ถูกสกัดออกแต่กลับคืนมา และถ้าความทรงจำที่ถูกสกัดออกสามารถกลับมาได้ ผู้อยู่อาศัย Ix Belèn ก็อาจฟื้นตัวได้ ช่องซ่อมบำรุงดูเหมือนจะถูกเปิดอีกครั้ง แต่ยานของ Saariah ยังจอดอยู่ที่ท่า เราอาจนำ Memorex กลับไปยัง [Root.Owner.Capital.GetName] ได้ หากต้องการ"
  ancrel.4046.a:0 "นำ Memorex กลับไปกับเรา"
  ancrel.4046.b:0 "ความทรงจำไม่ควรถูกยุ่งเกี่ยว ปล่อยให้ Memorex ถูกลืม"
  ancrel.4046.c:0 "สมองนิ่มของเอเลี่ยน! [Root.Owner.GetSpeciesName] จะพัฒนา 'Memorex' นี้ให้สมบูรณ์แบบ" ### The Sentinels
  ancrel.4051.name:0 "รูปปั้นมีปีก"
  ancrel.4051.desc:0 "มีรูปปั้นขนาดมหึมาเก้าตัวทอดเงาดำสูงใหญ่เหนือภูมิประเทศ รูปปั้นเหล่านี้มีปีกและผิวซีดขาว แผ่รัศมีเหนือธรรมชาติออกมา อาจถูกสร้างขึ้นตามภาพของเทพเจ้าหรือไอดอลที่ถูกลืมไปแล้ว พวกมันไม่เหมือนสิ่งมีชีวิตใด ๆ บนดาวนี้"
  ancrel.4051.desc_jungle:0 "ทีมที่เคลียร์ป่าบน [Root.GetName] พบสิ่งผิดปกติที่ซ่อนอยู่ลึกในพงไม้เก่าแก่ ซึ่งดูเหมือนไม่มี [Root.Owner.GetSpeciesName] คนใดเคยเข้าไปมาก่อน $ancrel.4051.desc$"
  ancrel.4051.desc_kelp:0 "ทีมที่เคลียร์สาหร่ายพิษบน [Root.GetName] พบสิ่งผิดปกติที่ซ่อนอยู่ในน่านน้ำขุ่นท่ามกลางป่าสาหร่ายที่พลิ้วไหว $ancrel.4051.desc$"
  ancrel.4051.desc_swamp:0 "ทีมที่เคลียร์บึงบน [Root.GetName] พบสิ่งผิดปกติที่ซ่อนอยู่ในป่าต้นไม้ใหญ่ $ancrel.4051.desc$"
  ancrel.4051.desc_glacier:0 "ทีมที่เคลียร์ธารน้ำแข็งบน [Root.GetName] พบสิ่งผิดปกติที่ถูกกักขังอยู่ในชั้นน้ำแข็งหนาแน่น $ancrel.4051.desc$"
  ancrel.4051.a:0 "เราต้องศึกษารูปปั้นเหล่านี้เพิ่มเติม"
  ancrel.4051.b:0 "พื้นที่นี้ถูกจัดสรรไว้เพื่อวัตถุประสงค์อื่นแล้ว"

 # Arc Site
  sentinels_digsite:0 "ผู้พิทักษ์นิรันดร์"
  sentinels_digsite_desc:0 "ยักษ์เงียบสงบยืนเฝ้าบน [From.Planet.GetName] รูปปั้นขนาดมหึมาเก้าตัวตั้งเรียงเป็นวงกว้างในจุดยุทธศาสตร์ของภูมิประเทศ ดูเหมือนจะปกป้องบางสิ่งที่อยู่ตรงกลาง\n\nผิวของพวกมันปกคลุมด้วยเกล็ดโลหะละเอียด ท่าทางระวังพร้อมจะเคลื่อนไหว ดวงตานิ่งจ้องตามทุกย่างก้าวของคุณ แต่ไม่มีสิ่งใดในบริเวณที่ดูเหมือนต้องการการปกป้อง อาจเป็นไปได้ว่าสิ่งที่พวกมันเฝ้าได้สูญสลายไปตามกาลเวลา หลายรูปปั้นเองก็มีร่องรอยการถูกโจมตี"
  ancrel.4052.name:1 "ฝีมือผู้พิทักษ์"
  ancrel.4052.desc:1 "นักโบราณคดีเริ่มมีอาการแปลก ๆ การขุดค้นถูกขัดขวางด้วยอุบัติเหตุแปลกประหลาด บาดเจ็บ และโชคร้าย แม้แต่หัวหน้าทีมที่มีประสบการณ์ก็เริ่มโทษผู้พิทักษ์\n\nความเชื่อโชคลางและความหวาดระแวงครอบงำ พวกเขาอ้างว่ารูปปั้นเคลื่อนไหวเมื่อไม่มีใครมอง ทั้งที่ไม่มีหลักฐานว่าข้อต่อแขนขาเหล่านั้นจะขยับได้ เรื่องยิ่งแย่ลงเมื่อพบร่องรอยชีวะวัตถุและคราบเลือดในรอยบาดเล็ก ๆ บนส่วนปลายของรูปปั้นหนึ่ง\n\nไม่แน่ชัดว่าผู้พิทักษ์เป็นเพียงแพะรับบาป หรือมีบางอย่างน่ากลัวกว่านั้นซ่อนอยู่"
  ancrel.4053.name:0 "พวกเขามาก่อน"
  ancrel.4053.desc:1 "การวิเคราะห์องค์ประกอบของผู้พิทักษ์เผยว่าทำจากวัสดุผสมโลหะ-เซรามิกที่ไม่รู้จัก วัสดุเช่นนี้ไม่น่าจะถูกสร้างโดยสังคมก่อนประวัติศาสตร์ แต่การวัดเบื้องต้นชี้ว่าพวกมันมีอายุก่อนอารยธรรมใด ๆ ที่รู้จักบน [From.Planet.GetName]\n\nน่าเสียดายที่เครื่องสแกนยังไม่สามารถเจาะเปลือกโลหะของผู้พิทักษ์ได้"
  ancrel.4054.name:0 "แกนรังสี"
  ancrel.4054.desc:1 "นักโบราณคดีได้ประกอบเครื่องสแกนที่ [missing_archaeologist.GetName] ดัดแปลงไว้ใหม่ ตั้งค่าให้เจาะลึกเข้าไปในวัสดุผสมของรูปปั้น พบว่ามีรังสีอ่อน ๆ แผ่ออกมาจากแกนกลาง หากต้องการตรวจสอบต่อไป จำเป็นต้องผ่าเปิดผู้พิทักษ์หนึ่งตัว ซึ่งน่าจะทำลายมันโดยถาวร เนื่องจากมีรูปปั้นหนึ่งเสียปีกไปแล้ว นักโบราณคดีแนะนำให้เริ่มจากตัวนั้น"
  ancrel.4054.a:0 "เปิดผู้พิทักษ์อย่างระมัดระวังเพื่อให้สามารถประกอบกลับได้"
  ancrel.4054.b:0 "เราไม่ลบหลู่อนุสรณ์ศักดิ์สิทธิ์"
  ancrel.4054.b.tooltip:0 "หากเรารักษาผู้พิทักษ์ไว้ พื้นที่นี้จะไม่สามารถใช้ประโยชน์อย่างอื่นได้"
  ancrel.4054.c:0 "ทำลายสิ่งประหลาดของต่างดาวให้ราบ"
  ancrel.4054.d:0 "รื้อรูปปั้นและนำโลหะไปใช้"

 # Destroy the Sentinels
 DESTROY_SENTINELS:0 "ผู้พิทักษ์นิรันดร์"
  DESTROY_SENTINELS_DESC:0 "เปลือกนอกของผู้พิทักษ์ที่หนาและเป็นเกล็ดโลหะนั้นไม่อาจเจาะได้ด้วยเครื่องมือทั่วไป นักโบราณคดีต้องขอความช่วยเหลือจากฝ่ายวิศวกรรมเพื่อดำเนินการต่อ"
  SECRET_TOMB:0 "สู่ใต้พิภพ"
  SECRET_TOMB_DESC:0 "ใต้ฐานของผู้พิทักษ์หนึ่งตัวมีแผ่นหินกลมลวดลายซับซ้อนซ่อนอยู่ เราเชื่อว่านี่อาจเป็นทางเข้าสู่คอมเพล็กซ์ใต้ดิน"
  ancrel.4055.name:0 "พวกมันมีชีวิต!"
  ancrel.4055.desc:0 "เมื่อเกิดแรงสั่นไหวเบา ๆ ผ่านรูปปั้นเหล่านั้น พวกมันก็มีชีวิตขึ้นมา ร่างกายสั่นไหวและผิวเปล่งแสง รังสีที่แผ่ออกมาจากแกนกลางทำให้พวกมันอ่อนตัวและโปร่งใส เผยให้เห็นโครงข่ายดิจิทัลภายใน\n\nด้วยเสียงโลหะบิดเบี้ยวอย่างน่าขนลุก พวกมันพุ่งเข้าโจมตีค่ายนักโบราณคดีและบินตรงไปยังนิคมใกล้เคียง\n\nการจากไปของพวกมันเผยให้เห็นแผ่นหินกลมบนพื้น ซึ่งก่อนหน้านี้ถูกฐานของผู้พิทักษ์ปกปิดไว้"
  ancrel.4055.desc.phobe:0 "ผู้พิทักษ์ตื่นขึ้นแล้ว ทีมวิศวกรรมกำลังจะทุบและบดผู้พิทักษ์ลง $ancrel.4055.desc$"
  ancrel.4055.desc.other:0 "ผู้พิทักษ์ตื่นขึ้นแล้ว ทีมวิศวกรรมกำลังจะรื้อรูปปั้นเหล่านั้น $ancrel.4055.desc$."
  ancrel.4055.a:0 "กำจัดจักรกลเหล่านั้น!"
  ancrel.4056.name:0 "เอเวอร์มอร์"
  ancrel.4056.desc:1 "ผู้พิทักษ์ซ่อนทางเข้าไว้จริง ๆ ประตูเปิดสู่ระเบียงอุโมงค์ใต้ดินลึกลงไปในเปลือกโลกของ [event_target:sentinels_planet.GetName] ที่นั่นมีเผ่าพันธุ์มนุษย์พื้นเมืองเตรียมตัวสำหรับการเดินทางสุดท้ายในห้องพิธีอันงดงาม เมื่อสิ้นอายุขัย พวกเขาสละร่างเนื้อเพื่อเข้าสู่ชีวิตหลังความตายแบบเสมือนในสวรรค์จำลองที่บรรจุอยู่ในไดรฟ์เดียว\n\nต่อมาประชากรทั้งหมดตัดสินใจย้ายไปสู่การดำรงอยู่แบบดิจิทัล เหลือเพียงไม่กี่คนที่จิตถูกอัปโหลดเข้าสู่ผู้พิทักษ์ ให้เฝ้าสุสานนี้ตลอดกาล\n\nบางทีสวรรค์เสมือนนี้อาจช่วยยกระดับจิตใจของผู้คน มันดูมีคุณค่าด้านความบันเทิงไม่น้อย"
  ancrel.4056.a:0 "กำจัดเอเลี่ยนและนำสวรรค์เสมือนไปใช้ประโยชน์"
  ancrel.4056.b:0 "ลานล่าสัตว์เสมือน... นี่แหละความบันเทิง..."
  ancrel.4056.c:0 "คัดลอกเทคโนโลยีนี้ ปล่อยให้เอเลี่ยนอยู่อย่างสงบ"
  ancrel.4056.d:0 "เอเลี่ยนจะเป็นหนูทดลองชั้นดี เริ่มการทดลอง!"
  ancrel.4057.name:0 "ผู้พิทักษ์ถูกโค่น"
  ancrel.4057.desc:1 "เรากำจัดผู้พิทักษ์ตัวสุดท้ายได้แล้ว มันล้มลงหลังถูกโจมตีที่ช่องท้อง ร่างแข็งทื่อเมื่อแกนพลังงานดับ รูปปั้นกำหมัดสั่น ๆ รอบทหารที่ใกล้ที่สุด และด้วยพลังสุดท้าย มันขอร้องให้เรา 'ปล่อยให้พวกเขาได้พักผ่อน' จากนั้นมันก็หยุดนิ่ง ดวงตาว่างเปล่า ใบหน้าเย็นชา\n\nใต้ร่างนั้น ทหารพบสิ่งที่ดูเหมือนทางเข้าลับ ซึ่งก่อนหน้านี้ถูกสนามพลังของผู้พิทักษ์ปกปิดไว้ การตรวจสอบอย่างละเอียดเผยว่าผู้พิทักษ์เหล่านี้ไม่ใช่แค่จักรกลธรรมดา แต่มีจิตวิญญาณดิจิทัลของสิ่งมีชีวิตอินทรีย์อยู่ข้างใน"
  ancrel.4057.a:0 "ปิดผนึกทางเข้า"
  ancrel.4075.name:0 "ผู้รอดชีวิตจาก [sentinels_planet.GetName]"
  ancrel.4075.desc:0 "ยานของผู้รอดชีวิตจากการฆ่าล้างเผ่าพันธุ์บน [sentinels_planet.GetName] มาถึง [sentinels_new_home.GetName] พวกเขารอดมาได้อย่างปาฏิหาริย์โดยซ่อนตัวในถิ่นทุรกันดารจนวันหนึ่งผู้พิทักษ์หายไป ดูเหมือนจักรกลเหล่านั้นที่เชื่อว่าตนเอง 'ปลดปล่อยเราจากพันธนาการแห่งเนื้อหนัง' จะจากไปเมื่อภารกิจเสร็จสิ้น\n\nหลังจากพวกมันหายไป ทางเข้าลับสู่ใต้ดินก็เผยตัวจากหลังสนามพลัง เป็นไปได้ว่าผู้พิทักษ์ปิดผนึกตัวเองไว้ข้างใน"
  ancrel.4075.a:0 "ตรวจสอบทุกซอกทุกมุม"
  ancrel.4075.b:0 "ฝังทางเข้านั้นซะ"
  ancrel.4076.name:0 "เอเวอร์มอร์"
  ancrel.4076.desc:0 "เราเจาะทางเข้าลับบน [event_target:sentinels_planet.GetName] ได้แล้ว ประตูเปิดสู่คอมเพล็กซ์วัดที่เพิ่งถูกทิ้งร้าง ซึ่งเผ่าพันธุ์มนุษย์เตรียมตัวสำหรับการเดินทางสุดท้าย เมื่อสิ้นอายุขัย พวกเขาสละร่างเนื้อเพื่อเข้าสู่ชีวิตหลังความตายแบบเสมือนในสวรรค์จำลองชื่อเอเวอร์มอร์\n\nต่อมาประชากรทั้งหมดตัดสินใจย้ายไปสู่การดำรงอยู่แบบดิจิทัล เหลือเพียงไม่กี่คนที่ถูกอัปโหลดจิตสู่ร่างจักรกล กลายเป็นผู้พิทักษ์\n\nตอนนี้ผู้พิทักษ์หายไปหมดแล้ว แต่ทิ้งของขวัญไว้ — ไดรฟ์เดียวที่บรรจุประชากรทั้งดาวแบบดิจิทัลตลอดกาล และเบื่อหน่ายอย่างไร้ที่สิ้นสุด สวรรค์ของเอเลี่ยนกลายเป็นเกมกระดานนามธรรมที่ไม่มีวันจบเกี่ยวกับการครองกาแล็กซี่ด้วยการสะสมถั่ว"
  ancrel.4076.a:0 "ใช้จิตของพวกเขาทำวิทยาศาสตร์"
  ancrel.4076.b:0 "ปรับแต่งเอเวอร์มอร์ให้บันเทิงประชาชน"
  ancrel.4077.name:0 "เอเวอร์มอร์"
  ancrel.4077.desc.a:0 "สำเร็จ! ประชากรดิจิทัลในเอเวอร์มอร์ถูกมอบหมายให้ช่วยงานวิจัยวิทยาศาสตร์บน [from.owner.capital_scope.GetName] พวกเขาแทบไม่ต้องพักผ่อนและดูมีความสุขที่ได้ทำอะไรใหม่ ๆ..."
  ancrel.4077.desc.b:0 "สำเร็จ! เอเวอร์มอร์ถูกปรับแต่งให้ตรงกับรสนิยมของประชาชน ทุกคนสามารถใช้ชีวิตในฝันร่วมกับประชากรดิจิทัลในสวรรค์เอเวอร์มอร์โดยไม่มีดีเลย์ ส่งผลให้ขวัญกำลังใจดีขึ้นและความต้องการวัตถุลดลง"
  ancrel.4058.desc:0 "ผู้พิทักษ์ตื่นขึ้น ทีมวิศวกรรมกำลังจะรื้อผู้พิทักษ์ที่เสียหายอยู่แล้ว เมื่อเกิดแรงสั่นไหวเบา ๆ ผ่านรูปปั้นเหล่านั้น พวกมันก็มีชีวิตขึ้นมา ร่างกายสั่นไหวและผิวเปล่งแสง รังสีที่แผ่ออกมาจากแกนกลางทำให้พวกมันอ่อนตัวและโปร่งใส เผยให้เห็นโครงข่ายดิจิทัลของแขนขา\n\nก่อนใครจะทันตั้งตัว พวกมันล้อมนักโบราณคดีไว้ในสนามพลัง ตอนนี้พวกมันต้องการพูดกับเรา"
  ancrel.4058.a:0 "ฟังพวกมันพูด"
  ancrel.4058.b:0 "ปิดปากพวกมันซะ!"
  ancrel.4059.name:1 "ผู้พิทักษ์นิรันดร์"
  ancrel.4059.desc:1 "§Hผู้พิทักษ์ที่ปีกหักหันไปพูดกับเพื่อน§!\n\nDivana ได้โปรด ปล่อยพวกเขาลง ข้าอยากเป็นอิสระจากคุกนี้ ข้านับวันเวลาที่เรารับใช้เจ้านายไม่ไหวแล้ว เราทำงานบนโลกนี้ขณะที่พวกเขาเสวยสุขในสวรรค์ใต้ดิน ข้ามีชีวิตแต่เหมือนตาย พวกเขาตายแต่เหมือนมีชีวิต จะไม่ปล่อยข้าไปหรือ?\n\n§HDivana มองเธอด้วยความรังเกียจ§!\n\nExcelsia ตั้งสติหน่อยเถอะ คนที่เรารักพักผ่อนอยู่ข้างล่าง ลืมบาปของเราหรือ? เราสัญญาจะเฝ้าสวรรค์ของพวกเขาตลอดกาล นั่นคือการไถ่บาปเดียวของเรา\n\n§Hเธอหันมามองเรา§!\n\nพวกเจ้าไม่ใช่ภัยคุกคาม [Root.owner.GetSpeciesNamePlural] ปล่อยให้เราสงบเถอะ เราจะปกป้องดาวนี้ตลอดไป"
  ancrel.4059.a:0 "พวกเจ้า...คืออะไร?"
  ancrel.4059.a.response:1 "เราคือผู้พิทักษ์ประตูสวรรค์ — ผู้รักษาอมตะของเผ่าพันธุ์เรา"
  ancrel.4059.b:0 "เรายอมรับการปกป้องของพวกเจ้า"
  ancrel.4062.desc:0 "§HExcelsia เดินเข้าหานักโบราณคดี§!\n\nขอร้อง ได้โปรดจบความทุกข์ของข้า"
  ancrel.4059.e:0 "ไม่ เรายังต้องการพวกเจ้า"
  ancrel.4059.f:1 "เจ้าเป็นอิสระแล้ว"
  ancrel.4070.desc:0 "ขอบคุณ"
  ancrel.4059.d:0 "เราต้องใช้ที่ดินนี้..."
  ancrel.4059.c:1 "สวรรค์?"
  ancrel.4059.c.response:0 "สวรรค์ ใช่... แต่ข้าสงสัยว่าสวรรค์ในความคิดของเจ้าจะเหมือนของเจ้านายเราหรือเปล่า\n\n§Hเธอยักคิ้วและหัวเราะเบา ๆ§!\n\nเจ้านายเรามีรสนิยมสูงส่ง..."
  ancrel.4060.a.response:1 "ถ้าเช่นนั้น เจ้าต้องตาย\n\n§Hผู้พิทักษ์คนอื่นชักอาวุธ แต่ Excelsia เพียงยิ้มอย่างสงบ§!"
  ancrel.4060.name:1 "สัญญาณ"
  ancrel.4060.desc:1 "เราไม่อาจปล่อยให้เจ้ารบกวนสุสานของคนที่เรารัก ปล่อยให้พวกเขาพักผ่อน แล้วเจ้าจะไม่ต้องกังวลกับภัยจากภายนอก"
  ancrel.4060.a:1 "ออกจากที่นี่เดี๋ยวนี้"
  ancrel.4060.b:1 "เราต้องการการปกป้องของพวกเจ้า"
  ancrel.4060.b.response.tooltip:1 "เพิ่มกองทัพป้องกันผู้พิทักษ์ให้กับดาวนี้"
  ancrel.4061.name:0 "เอเวอร์มอร์ใหม่"
  ancrel.4061.desc:0 "เราได้คัดลอกเอเวอร์มอร์และปรับแต่งให้เหมาะกับความต้องการของเรา การใช้ชีวิตในสนามเด็กเล่นเสมือนโดยไม่มีดีเลย์ช่วยยกระดับจิตใจประชาชนและลดความต้องการวัตถุ\n\nขณะเดียวกัน เอเลี่ยนยังคงอยู่ในเอเวอร์มอร์ต้นฉบับในสวรรค์แบบของพวกเขาเอง พวกเขาติดอยู่ในเกมกระดานนามธรรมที่ไม่มีวันจบเกี่ยวกับการครองกาแล็กซี่ด้วยการสะสมถั่ว ยากจะบอกว่าพวกเขามีความสุขหรือไม่ คิ้วขมวดลึกอาจเป็นความสุขของเอเลี่ยนก็ได้"
  ancrel.4061.a:0 "ต่างคนต่างอยู่..."
  ancrel.4063.name:0 "[sentinels_planet.GetName] สูญหาย"
  ancrel.4063.desc:0 "สิ่งที่ไม่คาดคิดเกิดขึ้น เราสูญเสีย [sentinels_planet.GetName] ผู้พิทักษ์ถล่มกองกำลังของเราอย่างดุเดือด ไม่มีทางสู้ที่ยุติธรรมกับศัตรูที่ไม่เลือดไม่หลับ"
  ancrel.4063.a:0 "เราจะกลับมาเอาคืน"
  ancrel.4064.name:0 "[sentinels_planet.GetName] ถูกปลดปล่อย"
  ancrel.4064.desc:0 "ผู้พิทักษ์ล้มลงและ [sentinels_planet.GetName] เป็นของเราอีกครั้ง เมื่อจักรกลตัวสุดท้ายล้มลง แกนพลังงานดับ มันกำหมัดสั่น ๆ รอบทหารที่ใกล้ที่สุด และขอร้องให้ 'ปล่อยให้พวกเขาได้พักผ่อน' จากนั้นมันก็หยุดนิ่ง ดวงตาว่างเปล่า ใบหน้าเย็นชา\n\nใต้ร่างนั้น ทหารพบสิ่งที่ดูเหมือนทางเข้าลับ ซึ่งก่อนหน้านี้ถูกสนามพลังของผู้พิทักษ์ปกปิดไว้ การตรวจสอบอย่างละเอียดเผยว่ารูปปั้นเหล่านี้ไม่ใช่แค่จักรกลธรรมดา แต่มีจิตวิญญาณดิจิทัลของสิ่งมีชีวิตอินทรีย์อยู่ข้างใน\n\nไม่ว่าอะไรจะซ่อนอยู่ข้างล่าง วันนี้คือวันแห่งชัยชนะที่ไม่มีวันลืม"
  ancrel.4064.a:0 "ตรวจสอบทางเข้า"
  ancrel.4064.b:0 "ฝังมันซะ เรากลับบ้านแล้ว"
# Sentinels Random Events
  ancrel.4065.name:0 "นักโบราณคดีหายตัว"
  ancrel.4065.desc:0 "เจ้าหน้าที่วิทยาศาสตร์ [missing_archaeologist.GetName] หายตัวไป [missing_archaeologist.GetSheHeCap] [missing_archaeologist.GetWasWere] ถูกพบครั้งสุดท้ายขณะออกจากค่ายตอนพระอาทิตย์ตกเพื่อหาที่สงบ ๆ คิดเกี่ยวกับเซนติเนล ในวันก่อนการหายตัวของ [missing_archaeologist.GetHerHis] [missing_archaeologist.GetSheHe] แสดงความกังวลเกี่ยวกับความปลอดภัยในค่ายหลังจากเกิดอุบัติเหตุหลายครั้ง และเรากลัวว่า [missing_archaeologist.GetSheHe] อาจละทิ้งภารกิจของตนเป็นการประท้วง"
  ancrel.4065.a:0 "น่ากังวล."

  ancrel.4066.name:0 "นักโบราณคดีหายตัว"
  ancrel.4066.desc:0 "สัมภาระของ [missing_archaeologist.GetName] รวมถึง MindGazer ของ [missing_archaeologist.GetHerHis] - อุปกรณ์ที่ใช้แยกจิตใจจากสิ่งรบกวนภายนอก - ถูกพบบนชะง่อนหินที่มองลงไปยังเซนติเนล ไม้ที่วางรอบรูปปั้นครึ่งเสร็จบ่งบอกว่า [missing_archaeologist.GetSheHe] อาจเบนเส้นทางจากกิจกรรมของตนเพื่อทำเครื่องหมายตำแหน่ง\n\nไฟฉายและเครื่องสแกนของ [missing_archaeologist.GetHerHisCap] ถูกพบถูกบดขยี้ใต้ปีกเซนติเนลที่แตก เครื่องสแกนถูกดัดแปลงในลักษณะประหลาด อาจช่วยให้เราสามารถทะลุชั้นป้องกันของเซนติเนลได้\n\nหากเราต้องการพบ [missing_archaeologist.GetName] ยังมีชีวิตอยู่ เราต้องจัดสรรทรัพยากรเพิ่มเติมเพื่อค้นหาเพราะโอกาสรอดชีวิตในป่าของ [missing_archaeologist.GetHerHis] ลดลงทุกวัน"
  ancrel.4066.a:0 "จัดเต็มทุกค่าใช้จ่าย."
  ancrel.4066.b:0 "เราไม่เสียเวลาให้กับคนทิ้งหน้าที่."
  ancrel.4066.c:0 "ส่งนักโบราณคดีบางส่วนไปช่วยค้นหา."

  ancrel.4067.name:0 "พบร่างนักโบราณคดี"
  ancrel.4067.desc:0 "[missing_archaeologist.GetName] ถูกพบเสียชีวิต ถูกฝังใต้แผ่นหินขนาดใหญ่ สาเหตุการเสียชีวิตถูกระบุว่าเป็นบาดแผลรุนแรงที่ศีรษะ มีผู้พยายามให้เกียรติที่ฝังร่าง [missing_archaeologist.GetHerHim] ด้วยการจัดวงแหวนหินมีค่าเล็ก ๆ รอบ ๆ"
  ancrel.4067.a:0 "ขอให้เขาพักผ่อนอย่างสงบ."

  ancrel.4068.name:0 "พบตัวนักโบราณคดี"
  ancrel.4068.desc:1 "[missing_archaeologist.GetName] ถูกพบหมดสติและบาดเจ็บสาหัส ซ่อนตัวอยู่ใต้พุ่มไม้ข้างหินธรรมชาติ พร้อมแท็บดาต้าที่เปื้อนเลือด [missing_archaeologist.GetBloodType] อยู่ใต้แขนของ [missing_archaeologist.GetHerHis] [missing_archaeologist.GetSheHeCap] [missing_archaeologist.GetWasWere] ถูกเร่งส่งโรงพยาบาลและรักษาอาการบาดเจ็บสมองรุนแรงจากการกระแทกด้านบน\n\nแม้สภาพ [missing_archaeologist.GetHerHis] จะคงที่แล้ว แต่ [missing_archaeologist.GetSheHe] ยังมีอาการความจำเสื่อมและจำไม่ได้ว่าได้รับบาดเจ็บอย่างไร เศษโลหะผสมเฉพาะจากเซนติเนลติดอยู่ที่กระโหลก [missing_archaeologist.GetHerHis] สิ่งที่ [missing_archaeologist.GetSheHe] จำได้คือการหลบซ่อนและกินอาหารจากธรรมชาติที่มีจำกัด แต่บันทึกของ [missing_archaeologist.GetHerHis] ยังมีข้อมูลเป็นประโยชน์"
  ancrel.4068.a:0 "น่าหวาดหวั่น."

  ancrel.4078.name:0 "ไฟไหม้"
  ancrel.4078.desc:0 "กลางดึก ขณะที่นักโบราณคดีหลับอย่างสงบ ไฟไหม้เกิดขึ้นในโมดูลเสบียงของค่าย ทำให้อาหารสุกเกินไป ไม่มีสัญญาณบ่งชี้ว่าไฟเกิดจากอะไร โชคดีที่ไม่มีใครได้รับอันตราย แต่การทำงานโดยท้องว่างทำให้นักโบราณคดีทำงานได้ไม่ดี..."
  ancrel.4078.a:0 "ส่งเสบียง"
  ancrel.4078.b:1 "นัก [owner.GetSpeciesName] แท้จริง อยู่รอดด้วยสิ่งที่ธรรมชาติมอบให้."


  the_evermore_modifier:1 "ความสุขราคาถูก"
  the_evermore_modifier_desc:0 "The Evermore เดิมเป็นโลกเสมือนที่จิตสำนึกดิจิทัลของเอเลียนอาศัยอยู่ในความสุขนิรันดร์ แต่ตอนนี้ถูกปรับใช้เป็นสนามเล่นสำหรับมวลชน"
  the_evermore_evil_modifier:0 "$the_evermore_modifier$"
  the_evermore_evil_modifier_desc:0 "$the_evermore_modifier_desc$"
  study_the_sentinels_modifier:0 "The Evermore"
  study_the_sentinels_modifier_desc:1 "ในสวรรค์ Evermore ทุกคนถูกล็อกอยู่ในเกมกระดานนามธรรมไม่รู้จบซึ่งเน้นการครอบครองกาแล็กซี่ผ่านการสะสมพืชตระกูลถั่ว มันอาจน่าเบื่ออย่างไม่มีที่สิ้นสุด แต่ก็เป็นแหล่งข้อมูลมานุษยวิทยาที่น่าสนใจ"
  sentinels_planet_modifier:0 "ผู้พิทักษ์"
  sentinels_planet_modifier_desc:1 "ผู้พิทักษ์โบราณเฝ้าดูแลดาวเคราะห์ สร้างแรงบันดาลใจด้านเอกภาพและจิตวิญญาณให้ประชาชนของเรา"
  REPLICATE_THE_EVERMORE:0 "สร้าง Evermore ซ้ำ"
  REPLICATE_THE_EVERMORE_DESC:0 "การสร้าง Evermore ขึ้นใหม่จะให้มวลชนเข้าถึงความบันเทิงราคาถูกและการผ่อนคลาย ในขณะที่เอเลียนจะได้เพลิดเพลินกับสวรรค์ดิจิทัลของพวกเขาอย่างนิรันดร์"
  REPURPOSE_THE_EVERMORE:0 "ปรับใช้ Evermore ใหม่"
  REPURPOSE_THE_EVERMORE_DESC:0 "เราไม่สามารถตัดสินให้เผ่าพันธุ์ของเราอยู่กับการนับถั่วนิรันดร์ได้ เราต้องปรับ Evermore ให้เหมาะกับกิจกรรมที่มีความหมายมากขึ้น"


 # "Trench World" Archaeological Site Reward Modifier
  modern_trench_war:0 "สงครามคูน้ำสมัยใหม่"
  modern_trench_war_desc:0 "การค้นพบทางโบราณคดีจากดาวเคราะห์ที่เคยถูกสิ่งมีชีวิตขนาดยักษ์คล้ายหอยทากโจมตี นำไปสู่ความเข้าใจใหม่และมีประสิทธิภาพในการใช้สภาพแวดล้อมเพื่อป้องกัน สิ่งนี้จะเพิ่มความอยู่รอดของกองทัพเราในการต่อสู้ป้องกันจากการโจมตีทางบกทุกชนิด – แม้กระทั่งจากหอยทากยักษ์ในอวกาศ!"

 # "Ebb & Flow" Archaeological Site Reward Modifier
  forced_mindfulness:0 "การตระหนักรู้แบบบังคับ"
  forced_mindfulness_desc:0 "ระหว่างติดอยู่ในเขาวงกตที่เต็มไปด้วยลาวา ทีมโบราณคดีของเราได้พัฒนากิจวัตรการผ่อนคลายด้วยสติ หลักการพื้นฐานของการฝึกนี้ตอนนี้เป็นที่รู้จักอย่างแพร่หลายทั่วทั้งจักรวรรดิ"

  debug_subroutine:0 "ซับรูทีนดีบัก" # สำหรับจักรวรรดิเครื่องจักร
  debug_subroutine_desc:0 "ขณะถูกแยกตัวชั่วคราวในเขาวงกตที่เต็มไปด้วยลาวา หน่วยโบราณคดีของเราไม่สามารถเชื่อมต่อเครือข่ายและทำงานตามหน้าที่ได้ พวกเขาพัฒนาตัวอัลกอริทึมที่ทำให้สามารถรันซับรูทีนดีบักในโหมดสลีปได้ ซับรูทีนนี้ต่อมาได้ถูกอัปโหลดและติดแพทช์เข้าสู่ระบบหลัก"

  glory_to_the_many:0 "เกียรติแด่มวลชน" # สำหรับจักรวรรดิ Hive Mind
  glory_to_the_many_desc:0 "คณะสำรวจที่ติดอยู่ภายในเขาวงกตที่เต็มไปด้วยลาวาชั่วคราวได้สูญเสียการเชื่อมต่อกับ Hive Mind ไม่สามารถพึ่งพาจิตสำนึกร่วมได้ พวกเขาได้เผชิญหน้ากับแนวคิดของตัวตนอย่างน่าสะพรึงกลัว ซึ่งเป็นประสบการณ์ที่ย้ำเตือนความเกลียดชังต่อความเป็นปัจเจกและทำให้ความเกลียดชังนี้แน่นแฟ้นยิ่งขึ้น"

 # "Sky Glow Hymn" Archaeological Site Reward Modifier
  anthem_of_aurora:0 "บทเพลงแห่งออโรร่า"
  anthem_of_aurora_desc:0 "ฝ่ายวิทยาศาสตร์สามารถสร้างซ้ำบทเพลงไพเราะที่ 'ร้อง' โดยสิ่งมีชีวิตออโรร่าโบเรียลิสที่พวกเราเคยพบแล้วได้ ทุกโรงงานผลิตพลังงานตอนนี้มีระบบฮาร์โมนิกที่ช่วยขยายผลผลิต"

  ancrel.6500.name:0 "โบราณวัตถุยึดได้ที่ [planet.GetName]"
  ancrel.6500.desc:0 "เมื่อ [planet.GetName] อยู่ภายใต้การควบคุมของเราอย่างแน่นหนา เราได้ทราบว่ากองกำลังของเราได้โบราณวัตถุล้ำค่า ชื่อว่า §H[this.GetLastReceivedRelic]§! ระหว่างการต่อสู้ [victim.GetName] เห็นได้ชัดว่ากำลังพยายามอพยพโบราณวัตถุนี้ไปยังที่ปลอดภัย แต่แนวรบที่เปลี่ยนแปลงอย่างรวดเร็วบนพื้นผิวของ [planet.GetPlanetMoon] ทำให้ไม่สามารถทำได้\n\nโบราณวัตถุถูกย้ายอย่างปลอดภัยไปยังคลังกลางของเราที่ [Root.Capital.GetName]"
  ancrel.6500.a:0 "§H[this.GetLastReceivedRelic]§! เป็นของเราแล้ว!"
  stole_relic:0 "เราครอบครอง §Y[this.GetLastReceivedRelic]§! จาก §Y[victim.GetName]§!"

  ancrel.6505.name:0 "โบราณวัตถุสูญหายที่ [planet.GetName]!"
  ancrel.6505.desc:0 "โศกนาฏกรรมอีกครั้งตามหลังการล่มสลายของ [planet.GetName] เมืองหลวงของเรา ให้กับ [From.GetName] ความพยายามของเราในการอพยพ §H[this.GetLastLostRelic]§! ล้มเหลว เมื่อยานขนส่งที่กำหนดถูกทำลายในการสับสนของการต่อสู้ใกล้คลังกลาง\n\nขณะนี้เรายืนยันแล้วว่า [From.GetSpeciesNamePlural] ได้นำโบราณวัตถุไปที่ [From.Capital.GetName] เมืองหลวงของพวกเขา มันสูญหายจากเราแล้ว"
  ancrel.6505.a:0 "§H[this.GetLastLostRelic]§! ไม่ใช่ของเราอีกต่อไป..."
  relic_lost:0 "§Y[this.GetLastLostRelic]§! ตอนนี้เป็นของ §Y[From.GetName]§!"

 ## The Library
  site_the_library:0 "หอสมุด"
  site_the_library_intro:0 "ชั้นหนาของแก้วและโลหะปกคลุมดาวที่แทบจะว่างเปล่านี้ อาจบ่งบอกถึงเหตุการณ์หายนะบางอย่างในอดีต"

  ancrel.12020.name:0 "ซากโบราณที่ถูกลืมมานาน"
  ancrel.12020.desc:0 "เราพบสัญญาณชัดเจนว่า [From.Planet.GetName] เคยมีประชากรหนาแน่น อย่างไรก็ตาม สิ่งที่ทำลายอารยธรรมของพวกเขาทำได้อย่างสมบูรณ์: พบซากที่มีประโยชน์น้อยมาก\n\nเครื่องสแกนของเราตรวจพบโพรงขนาดใหญ่หลายแห่งลึกใต้พื้นผิว ซึ่งอาจเคยเป็นที่อยู่อาศัยของสิ่งมีชีวิต อาจเราจะมีโชคดีกว่านี้ที่นั่น"

  ancrel.12025.name:0 "หอสมุด"
  ancrel.12025.desc:0 "การขุดค้นระบบถ้ำบน [From.Planet.GetName] พบซากของสังคมเทคโนโลยีขั้นสูงใต้ดินขนาดใหญ่ ส่วนใหญ่ของซากอยู่ในสภาพดีอย่างน่าประหลาด และเราได้พบสิ่งที่ [Owner.GetResearchers] ของเราบรรยายว่าเป็น 'หอสมุด' ของคริสตัลข้อมูลเข้ารหัส หวังว่าสิ่งเหล่านี้จะช่วยให้เข้าใจสิ่งที่เกิดขึ้นที่นี่"

  ancrel.12030.name:0 "เงามืดซ่อนตัว"
  ancrel.12030.desc.base:0 "[Owner.GetTeamMember] หนึ่งคนที่สำรวจซากบน [FromFrom.Planet.GetName] ได้หายตัวไป หลังการค้นหาไม่นาน เราพบ [Owner.GetSpeciesRemnantName] ที่ดูเหมือนจะเป็นของ [Root.Owner.Species.GetName]"

  ancrel.12030.desc.normal:1 "$ancrel.12030.desc.base$ [Owner.GetResearchers] ของเราไม่สงสัยเลยว่าสิ่งเหล่านี้คือซากของ [Owner.GetTeamMember] ที่หายไป แต่พวกเขางุนงงว่าร่างสลายไปเร็วขนาดนี้ พวกเขาแนะนำให้ระวังต่อเนื่องในการสืบสวน"

  ancrel.12030.desc.lithoid:0 "$ancrel.12030.desc.base$ [Owner.GetResearchers] ของเราไม่สงสัยเลยว่าสิ่งเหล่านี้คือซากของ [Owner.GetTeamMember] ที่หายไป แต่พวกเขางุนงงว่ามันตายได้อย่างรวดเร็ว พวกเขาแนะนำให้ระวังต่อเนื่องในการสืบสวน"

  ancrel.12030.desc.machine:0 "$ancrel.12030.desc.base$ [Owner.GetResearchers] ของเราไม่สงสัยเลยว่าสิ่งเหล่านี้คือซากของ [Owner.GetTeamMember] ที่หายไป แต่พวกเขางุนงงว่าหน่วยของเขาสึกกร่อนอย่างรวดเร็ว พวกเขาแนะนำให้ระวังต่อเนื่องในการสืบสวน"

  ancrel.12035.name:0 "ปัญหาในสวรรค์"
  ancrel.12035.desc:0 "เมื่อเราวิเคราะห์คริสตัลข้อมูลจากถ้ำบน [From.Planet.GetName] เราเริ่มต่อภาพของดาวที่มีปัญหา\n\nดาวนี้เคยเป็นศูนย์กลางของอารยธรรมรุ่งเรืองที่รู้จักกันในชื่อ Ilanii Foundation ในช่วงปีหลัง ๆ ของอารยธรรม Ilanii หันไปสะสมความรู้แทนเรื่องวัตถุเช่นการขยายพันธุ์ ทำให้จำนวนประชากรลดลงอย่างรวดเร็ว ผู้นำของพวกเขาพยายามหาวิธีทางเทคโนโลยีเพื่อความเป็นอมตะ บันทึกเริ่มหายากราวเวลานี้ – ดูเหมือนจะเกิดก่อนเหตุหายนะที่บังคับให้พวกเขาลงไปใต้ดิน – และยังไม่ชัดเจนว่าสิ่งที่พยายามได้ผลอย่างไร"

  ancrel.12040.name:0 "จุดจบของอารยธรรม"
  ancrel.12040.desc.base:0 "เราสามารถต่อภาพว่าความพยายามของ Ilanii ในการเป็นอมตะเป็นอย่างไร มันดูเหมือนไม่ได้นำพวกเขาสู่ชีวิตนิรันดร์ แต่กลับสร้างภัยอันน่าสยอง – กลุ่มจุลินทรีย์ที่สามารถขยายตัวอย่างรวดเร็วและเกือบจะทันทีทำลายสิ่งมีชีวิตทั้งหมด… เหมือนสิ่งที่เกิดกับสมาชิกทีมของเรา\n\nหายนะนี้ทำลายประชากรส่วนใหญ่ ผู้รอดชีวิตแบ่งเป็นสองกลุ่ม: หนึ่งกลุ่มที่ไม่ยอมทิ้ง [From.Planet.GetName] ย้ายลงไปใต้ดิน สร้างอารยธรรมในช่องอากาศปิดที่เราพบ แต่ในระยะยาวไม่สามารถยั่งยืนได้ และจุลินทรีย์เจาะเข้าไปในที่อยู่อาศัย ถ้ำกลายเป็นสุสานของพวกเขา\n\nอีกกลุ่มหนึ่งออกไปเนรเทศ ทำลายพื้นผิวดาวให้ไร้ที่อยู่อาศัยและกักกันดาว"

  ancrel.12040.desc.curators:0 "$ancrel.12040.desc.base$ พวกเขาอาศัยในเขตเล็ก ๆ และทุ่มเทให้กับการรักษาความรู้ที่สูญหายของอารยธรรม จนกลายเป็นบรรพบุรุษของ §H[curator_enclave_country.GetName]§!"

  ancrel.12040.desc.meet_curators:0 "$ancrel.12040.desc.base$ พวกเขาอาศัยในเขตเล็ก ๆ และทุ่มเทให้กับการรักษาความรู้ที่สูญหายของอารยธรรม ชะตากรรมสุดท้ายไม่เป็นที่ทราบ แต่คริสตัลข้อมูลหนึ่งระบุว่าพวกเขามุ่งหน้าไปยังระบบ §H[curator_poi.GetName]§!"

  ancrel.12040.desc.no_curators:0 "$ancrel.12040.desc.base$ ชะตากรรมสุดท้ายสูญหายไปกับกาลเวลา แต่ดูเหมือนพวกเขาตั้งใจจะอุทิศชีวิตที่เหลือให้รักษาความรู้ที่สูญหายของอารยธรรม"

  ancrel.12040.A:0 "จุลินทรีย์นี้จะเป็นอาวุธที่ดี"
  ancrel.12040.B:0 "กักกันดาวนี้ ศึกษาอย่างระมัดระวังเท่านั้น"
  ancrel.12040.c.evopred:0 "จุลินทรีย์กินทุกสิ่ง? เจอคู่แข่งของมันแล้ว"


  ancient_glassed_planet:0 "ดาวกระจก"
  ancient_glassed_planet_desc:0 "ในอดีตอันไกลโพ้น ชีวภาพบนดาวนี้ถูกทำลายจนสิ้นเชิง กำจัดสิ่งมีชีวิตทุกชนิด"

  killer_librarian_organism:0 "จุลินทรีย์นักฆ่า"
  killer_librarian_organism_desc:1 "กองทัพของเราเข้าสู่สมรภูมิพร้อมจุลินทรีย์ที่สามารถทำลายเนื้อชีวิตของสิ่งมีชีวิตใด ๆ ได้อย่างรวดเร็ว แต่แน่นอนว่าพวกเขาไม่สามารถรับประกันความปลอดภัยของผู้บริสุทธิ์ได้ทั้งหมดจากการใช้งาน..."

  find_the_curators_title:0 "ซากของซากอารยธรรม"
  find_the_curators_desc:0 "การสืบสวนของเราชี้ให้เห็นว่าสิ่งที่เหลืออยู่ของอารยธรรมที่อุทิศตัวเพื่อการสะสมความรู้ได้หาที่หลบภัยในระบบ §H[curator_poi.GetName]§!"

  poi_curator_location:0 "สถานที่ศักดิ์สิทธิ์"


 ## Ruined Station / Percussive Maintenance
 site_percussive_maintenance:0 "Ruined Station"
 site_percussive_maintenance_intro:0 "A large station orbiting in alarmingly close proximity to the neutron star is giving off strange readings. Although its current position is stable, it shows considerable wear and tear. A proliferation of scorch marks indicates that it was rocked by several large explosions in the past."

  site_percussive_maintenance:0 "สถานียุคหลังหายนะ"
  site_percussive_maintenance_intro:0 "สถานียักษ์ที่โคจรใกล้ดาวนิวตรอนอย่างน่าตกใจ ส่งสัญญาณแปลก ๆ แม้ตำแหน่งปัจจุบันจะค่อนข้างนิ่ง แต่ก็แสดงสัญญาณการสึกหรออย่างชัดเจน รอยไหม้กระจายอยู่หลายจุดบ่งบอกว่ามันเคยถูกระเบิดครั้งใหญ่หลายครั้งในอดีต"

  ancrel.12000.name:0 "อาวุธทดลอง"
  ancrel.12000.desc:0 "[Root.Leader.GetName] ขึ้นสถานีกับทีมวิจัยและสามารถฟื้นฟูพลังงานบางส่วนได้ ดูเหมือนมันถูกอาศัยเพียงไม่กี่ศตวรรษก่อนที่ [Root.Owner.GetSpeciesNamePlural] จะขึ้นสู่อวกาศ จากภาพแรกดูเหมือนจะเป็นสถานีอาวุธ เพราะปืนใหญ่ขนาดมหึมาครอบครองส่วนใหญ่ของสถานี แต่ส่วนอื่น ๆ ส่วนมากเป็นห้องวิจัย บ่งชี้ว่าอาวุธนี้คงเป็นการทดลองขั้นสูง"

  ancrel.12005.name:0 "ความล้มเหลวของระบบ"
  ancrel.12005.desc:0 "[Root.Leader.GetName] สังเกตว่าระบบหลายตัวที่ดูเหมือนไม่เสียหายกลับล้มเหลวบ่อยเกินไป แม้จะพิจารณาเรื่องอายุ\n\nหลังจากพยายามเปิดใช้งานหลายครั้ง เสียงกรีดร้องเจ็บปวดได้ยินจากทีมเทคนิค: “อะไรนะ? ทำไม? ยังไง?!” เสียงประหลาดเหล่านี้ยาวนานจน [Root.Leader.GetSheHe] ส่ายหัวพ่ายแพ้ “เหมือนสถานีนี้สร้างด้วยเทปกาวทั้งหมด” [Root.Leader.GetSheHe] กล่าว “ผมยังแปลกใจว่ามันเคยทำงานได้”"

  ancrel.12005.A:0 "ดำเนินการด้วยความระมัดระวังสุดขีด"
  ancrel.12005.B:0 "ลองเตะดูสิ"

  percussive_maintainer_tooltip:0 "§HPercussive Maintainer§! เพิ่มความเร็วการวิจัยด้าน §HArchaeology§! และ §HComputing§! แลกกับ §R-1§! ระดับ §HSkill Levels§! สูงสุด"

  ancrel.12010.name:0 "กลยุทธ์รุดารี"
  ancrel.12010.desc:0 "แม้จะมีการล้มเหลวบ่อยครั้ง [Root.Leader.GetName] สามารถถอดรหัสวัตถุประสงค์ของสถานีได้ บันทึกชี้ว่าผู้สร้าง 'รุดารี' ต่อสู้กับเผ่าพ็อก-มอรี่ผู้สังหารหมู่ – สงครามที่พวกเขากำลังแพ้ กลุ่มนักการเมืองรุดารีกลุ่มสุดโต่งสรุปว่าหนทางรอดเดียวคือทำลายศัตรูทั้งหมด โครงการลับสร้างเลเซอร์ข้ามดวงดาวโดยใช้พลังของดาว แต่โครงการนี้ตั้งขึ้นอย่างรีบเร่งและเสี่ยงต่อการถูกค้นพบ"

  ancrel.12010.A:0 "ฟังดูเสี่ยงสุด ๆ…"

  ancrel.12015.name:0 "ความล้มเหลวของความฝัน"
  ancrel.12015.desc:0 "[Root.Leader.GetName] พบบันทึกส่วนตัวของหัวหน้าวิทยาศาสตร์รุดารี เต็มไปด้วยข้อร้องเรียนเกี่ยวกับความยากของโครงการและมาตรฐานความปลอดภัยที่ลดลง “ไม่มีเวลาให้ทดสอบอะไรเลย นี่คือกลยุทธ์สุดท้ายของเรา ศัตรูกำลังตามเรา เราต้องหวังว่าพอ” บันทึกชี้ว่าอาวุธถูกทดสอบไม่นานหลังจากนั้นและล้มเหลวทำลายสถานี รุดารีนำความลับไปฝังกับตัวเอง ทำให้เราพบซากโดยไม่ถูกรบกวน\n\nทั้งการเขียนโปรแกรมและสภาพสถานีไม่ดีพอให้เราลองใช้งานต่อ แต่แนวคิดบางอย่างจาก 'Death Laser' ให้ความเข้าใจอาวุธใหม่แก่ผู้เชี่ยวชาญของเรา"

  ancrel.12015.A:0 "โชคร้ายสำหรับพวกเขา…"
  ancrel.12015.A.mat:0 "อนุสาวรีย์แห่งความผิดพลาดในการวางแผน"
  ancrel.12015.A.phobe:0 "ความโชคร้ายของพวกเขา คือประโยชน์ของเรา"
  ancrel.12015.A.devourer:0 "น่าเสียดาย – เราจะไม่มีวันได้ลิ้มรสเนื้อพวกเขา"
  ancrel.12015.A.machine:0 "นี่แหละความบ้าของคนตายเร็ว"
  rudari_death_laser:0 "เลเซอร์มรณะรุดารี"
  rudari_death_laser_desc:0 "เมื่ออารยธรรมของรุดารีพังทลายภายใต้การโจมตีของศัตรู พวกเขาพยายามสร้างอาวุธเลเซอร์ที่สามารถยิงได้ในระยะข้ามดวงดาว แม้โครงการนี้ล้มเหลว แต่การวิจัยของพวกเขากลับเป็นประโยชน์อย่างยิ่งต่อผู้เชี่ยวชาญด้านอาวุธของเรา"

  abandoned_weapon_station:0 "สถานีอาวุธร้าง"
  abandoned_weapon_station_desc:0 "สถานีอาวุธร้างโคจรอยู่ใกล้ [star.GetName] อย่างน่าตกใจ"

  ancrel.12060.name:0 "ระบบ [From.GetName]"
  ancrel.12060.desc:0 "แสงลึกลับปกคลุมระบบ [From.GetName] [Root.GetName] ปรากฏตัวในเขตกาแล็กซี่ที่แทบไม่เคยมีอารยธรรมใดเยี่ยมชมมาเป็นเวลาหลายชั่วอายุคน – เป็นพัน ๆ ปี... ถ้าเคยมีเลย\n\nแต่เดี๋ยวก่อน – เซ็นเซอร์ของเรารายงานสัญญาณพลังงาน! ส่วนใหญ่รวมตัวอยู่บนดาวดวงแรกของระบบ ซึ่งไม่น่าจะมีชีวิตอยู่ได้เมื่อพิจารณาจากความใกล้ชิดกับดาวนิวตรอน แต่ยังมีสัญญาณเคลื่อนที่อื่น ๆ ด้วย พวกมันพุ่งตรงไปยัง [Root.GetName] อาวุธชาร์จเต็ม!"

  ancrel.12065.name:0 "ชัยชนะใน [fromfrom.System.GetName]"
  ancrel.12065.desc:0 "เราสามารถเอาชนะผู้ปกป้อง [fromfrom.System.GetName] ได้ ระบบนี้น่าประหลาดใจ: มีวัตถุแข็งเหลืออยู่น้อยมาก – แม้แต่แถบดาวเคราะห์น้อยก็เหมือนถูกขุดจนรกร้าง มีการติดตั้งสิ่งก่อสร้างขนาดใหญ่เรียงเป็นระยะรอบดาว และมีดาวดวงเดียวที่การอ่านค่าของเราบ่งบอกว่าอาจเป็นสิ่งประดิษฐ์จากสติปัญญา สัญญาณพลังงานเข้มข้นถูกตรวจจับออกมาจากดาวนี้ ถ้าต้องการคำตอบ มันน่าจะอยู่ที่นั่น"
    
 site_ancient_robot_world:0 "โลกหุ่นยนต์โบราณ"
  site_ancient_robot_world_desc:0 "ดาวดวงเดียวในระบบ [From.Planet.System.GetName] คึกคักไปด้วยโดรน พวกมันไม่สนใจเราและยังคงทำงานของตนต่อไป หากคำตอบของระบบลึกลับนี้อยู่ที่ใด มันก็อยู่ที่นี่"

  ancrel.12070.name:0 "เต็มไปด้วยชีวิตประดิษฐ์"
  ancrel.12070.desc:0 "จากการสังเกตของ [Owner.GetResearchers] ดาวที่พวกเขาตั้งชื่อว่า '§YObservation Terminal§!' ไม่เคยมีชีวิตใดเกิดขึ้น แต่กิจกรรมกลับเต็มไปหมด พื้นผิวถูกสร้างขึ้นหนาแน่น โครงสร้างขนาดมหึมาจัดเรียงเป็นแถวเรียบร้อยครอบคลุมเกือบสามในสี่ของดาว โดรนกลไกนับพันล้านตัวดูแลพวกมัน ทำงานตั้งแต่เก็บกวาดพื้นฐานไปจนถึงสายการผลิตซับซ้อนระดับสูง\n\nวัตถุประสงค์ที่แท้จริงยังไม่ชัดเจน [Owner.GetResearchers] กำลังเตรียมส่งทีมลงพื้นผิวเพื่อสืบหาความจริงต่อไป"

  ancrel.12075.name:0 "สำรวจโดรน"
  ancrel.12075.desc:0 "เมื่อ [Owner.GetResearchers] ของเราผ่านไป โดรนบนดาวก็ไม่สนใจและทำงานต่อ พยายามสื่อสารกับโดรนทั้งหมดล้มเหลว และแม้แต่การรบกวนพวกมันก็ไม่เกิดผล – โดรนเพียงบดขยี้ [Owner.GetResearchers] ทำให้ได้รับบาดเจ็บสาหัส\n\nตั้งแต่นั้น [Owner.GetResearchers] จึงหันไปศึกษาระบบที่ควบคุมโดรน การวิเคราะห์สัญญาณที่ดักจับได้บ่งชี้ว่ามีระบบหลักควบคุมพวกมัน แต่การเข้ารหัสซับซ้อนมาก ทำให้ยากที่จะค้นพบข้อมูลเพิ่มเติม"

  ancrel.12080.name:0 "การสำรวจเชิงระบบ"
  ancrel.12080.desc:0 "แม้ [Owner.GetResearchers] จะไม่สามารถก้าวหน้าไปมากในการสำรวจดาว แต่ทีมอื่นกำลังตรวจสอบวัตถุหลายหมื่นชิ้นที่กระจายอยู่ทั่วระบบ ส่วนใหญ่เป็นอุปกรณ์ทรงกระบอกยาวที่ยังทำงานอยู่ ส่งสัญญาณไปยังดาวดวงนี้ จากรูปทรงและทิศทางที่ชี้ไปทั่วทางช้างเผือก เราจึงสรุปว่านี่คืออาเรย์เซ็นเซอร์ขนาดมหึมา แต่ใครเป็นผู้สร้างมัน?"

  ancrel.12085.name:0 "ถึงเวลาลองแฮก"
  ancrel.12085.desc:0 "ด้วยความกล้าหาญ [Owner.GetResearchers] ฝังสปายแวร์เข้าไปในเทอร์มินัลเข้าถึงเมนเฟรมโดรนในขณะที่ไม่มีโดรนใกล้ ๆ การบุกรุกยังไม่ถูกตรวจพบ ความประทับใจของเราคือระบบนี้ซับซ้อนมาก – อาจเหนือเครือข่ายของเรา – แต่ไม่ได้ป้องกันตัวเองอย่างเต็มที่ แม้กองกำลังป้องกันทางกายภาพถูกพิจารณาว่าเพียงพอ อย่างไรก็ตาม ระบบที่เราบุกรุกมีขนาดมหึมา – คำว่า 'มหึมา' ก็ยังดูน้อยเกินไปสำหรับระบบนี้ – จึงต้องใช้เวลาพอสมควรในการค้นหาข้อมูลเพิ่มเติม"

  ancrel.12090.name:0 "ซูเปอร์คอมพิวเตอร์เฝ้าระวัง"
  ancrel.12090.desc:0 "ดูเหมือนว่าระบบอัตโนมัติใน $NAME_Ultima_Vigilis$ เก่ากว่าที่เราคาดไว้ ข้อมูลที่เราดักจับไม่ได้บ่งบอกตัวตนหรือเจตนาของผู้สร้าง แต่เราพบว่าพวกเขามาถึงเมื่อ 1.2 พันล้านปีก่อน และออกไปหลังจากตั้งระบบเป็นสถานีสังเกตเพื่อเฝ้าดูทางช้างเผือกทั้งหมด\n\nน่าทึ่งที่ระบบยังทำงานแม้ผ่านเวลามามากโข: อุปกรณ์จำนวนมากที่กระจายอยู่ทั่วระบบคือเซ็นเซอร์ขั้นสูง ส่งฟีดสดไปยังดาวซึ่งระบบกลางประมวลผลข้อมูลให้โดรนบันทึกและจัดเก็บ แรงกดดันด้านพื้นที่และสสารทำให้พวกเขาพัฒนาการบีบอัดข้อมูลอย่างต่อเนื่อง โครงสร้างขนาดมหึมาบนดาวอ้างว่ารวบรวมข้อมูลทั้งหมดที่เคยสังเกตได้ อย่างไรก็ตามเราทดสอบไม่ได้เพราะข้อมูลถูกบีบอัดเกินความสามารถของเรา\n\nแม้กระทั่งกระแส 'ไฮไลท์' ลดทอนก็ยังถูกส่งออกสู่อวกาศว่างเปล่า แต่ใครจะยังฟังอยู่หลังเวลานานขนาดนี้? อย่างไรก็ตาม โปรแกรมของเราพร้อมที่จะควบคุมโดรนแล้ว เราอาจปรับระบบตามจินตนาการ – ถ้าเรากล้า"

  ancrel.12090.A:0 "เราสามารถรวมโลกนี้เข้ากับระบบปฏิบัติการของเราได้"
  ancrel.12090.B:0 "ปล่อยให้พวกมันทำต่อ – เราจะดูดข้อมูลมาใช้"
  ancrel.12090.C:0 "แจกจ่ายโดรนไปยังดาวของเรา"
  ancrel.12090.C.machine.tooltip:0 "§G8K§! £pop£ §HMachine Pops§! ถูกแจกจ่ายไปยังดาวของเรา"
  ancrel.12090.C.mechanical.tooltip:0 "§G8K§! £pop£ §HMechanical Pops§! ถูกแจกจ่ายไปยังดาวของเรา"
  ancrel.12090.D:0 "แต่นี่มันเหมือนเหมืองโลหะผสมขนาดมหึมา!"
  ancrel.12090.E:0 "เครือข่ายที่จัดระเบียบอย่างดีนี้จะเป็นประโยชน์ต่อเรา"
  ancrel.12090.E.tooltip:0 "ระบบ §Y[From.Planet.System.GetName]§! จะถูกวางภายใต้การควบคุมของ §YMachine Intelligence§! เป็นวัตถุทดลองของเรา เมืองหลวง §Y[From.Planet.GetName]§! จะเป็น §YMachine World§! พร้อม §G8K§! £pop£ §HMachine Pops§!"
  ancrel.12095.desc:0 "\"มึงไม่ไยดี-\"\n\n§Bสัญญาณที่ส่งมาถูกบิดเบือนชั่วคราว ทำให้ไม่สามารถเข้าใจเสียงที่ได้ยิน§!\n\n\"มึงไม่เคยคิดบ้างหรือว่ามีใครสักคนกำลังดูฟีดสัญญาณที่มึงตัดไปโดยไม่ระวัง? เอาละ ตั้งแต่ตอนนี้พวกมึงพิสูจน์ตัวเองแล้วว่าเป็นสัตว์ร้ายอันตราย... ถึงเวลาของ §RPEST CONTROL§! เตรียมตัวเผชิญชะตากรรม\""
  ancrel.12095.A:0 "เราจะรอด"
  ancrel.12095.B:0 "ตัดสัญญาณไป"
  ancrel.12095.tooltip:0 "§Rบางสิ่งไม่ดีอาจเกิดขึ้นเร็ว ๆ นี้...§!"
  ancrel.12100.A:0 "นี่มันอะไรกันเนี่ย?"

  ancrel.8200.name:0 "การลดความดันระเบิด"
  ancrel.8200.intro:0 "ระหว่างการสำรวจสถานีในระบบ [System.GetName] ทีมของเราทำให้ส่วนหนึ่งของโครงสร้างสูญเสียความสมบูรณ์โดยไม่ตั้งใจ ทำให้เกิดการลดความดันแบบระเบิด"
  ancrel.8200.desc:0 "$ancrel.8200.intro$\n\nไม่มีใครทำอะไรได้ – ในเวลาไม่กี่วินาที §H[dead_scientist.GetName]§! และ [Root.Owner.GetArchaeologistPlural] อีกหลายคนถูกพัดออกไปนอกสถานีจนเสียชีวิต"

  ancrel.8201.desc:0 "$ancrel.8200.intro$\n\nในเวลาไม่กี่วินาที [Root.Owner.GetArchaeologistPlural] หลายคนถูกพัดออกไปจนเสียชีวิต โชคดีที่ §H[Root.GetLeaderName]§! อยู่ในส่วนอื่นของสถานี แต่เหตุการณ์นี้ก็ถือเป็นอุปสรรคสำคัญต่อการสืบสวน"

  ancrel.8202.desc:0 "$ancrel.8200.intro$\n\nโชคดีที่ไม่มีผู้เสียชีวิต ทีมของเราสามารถหนีไปยังพื้นที่ปลอดภัยของสถานีได้ ดูเหมือนไม่มีอุปกรณ์สำคัญเสียหาย การสืบสวนจึงไม่ติดขัด"

  ancrel.8202.desc.robot:0 "$ancrel.8200.intro$\n\nโชคดีที่ [Owner.GetArchaeologistPlural] ของเราปลอดภัย เพราะพวกมันถูกสร้างมาให้ทนอยู่ในอวกาศได้นาน จึงสามารถทำงานต่อไปโดยไม่สะดุด"

  ancrel.8203.desc:0 "$ancrel.8200.intro$\n\nโชคดีที่ไม่มีผู้เสียชีวิต ทีมของเราสามารถหนีไปยังพื้นที่ปลอดภัยได้ แต่แรงของการลดความดันทำให้เครื่องคอนโซลหลายเครื่องเสียหาย ต้องใช้เงินซ่อมบำรุงจำนวนมาก"

  ancrel.8203.desc.robot:0 "$ancrel.8200.intro$\n\nโชคดีที่ [Owner.GetArchaeologistPlural] ของเราปลอดภัย แต่แรงของการลดความดันทำให้เครื่องคอนโซลหลายเครื่องเสียหาย ต้องใช้เงินซ่อมบำรุงจำนวนมาก"

  ancrel.8203.A:0 "เราจะให้ทุนซ่อมทั้งหมดที่ต้องการ"
  ancrel.8203.B:0 "เหตุการณ์นี้จะทำให้เราล่าช้า"

  ancrel.8210.1.desc:1 "การศึกษาเศษซากของสถานีในระบบ [fromfrom.planet.system.GetName] ต่อเนื่อง พบคลังวัตถุโบราณเล็ก ๆ หัวหน้าโบราณคดี [root.leader.GetName] ระบุวัตถุโบราณเล็กหลายชิ้นในนั้น"

  ancrel.8210.2.desc:1 "ผนังส่วนหนึ่งของสถานีพังลงขณะที่ [Root.Owner.GetArchaeologistPlural] กำลังตรวจสอบคอนโซลใกล้เคียง เหตุการณ์นี้กลับเป็นโชคดีเพราะเผยช่องซ่อนที่บรรจุวัตถุโบราณเล็ก ๆ หลายชิ้น"

  ancrel.8215.name:0 "ล็อกระบบ"
  ancrel.8215.desc:0 "ขณะที่พวกมันกำลังแงะอุปกรณ์อิเล็กทรอนิกส์ในสถานี หนึ่งใน [Owner.GetArchaeologistPlural] ของเราบังเอิญไปกระตุ้นมาตรการรักษาความปลอดภัยที่ยังทำงานอยู่ซึ่งถูกทิ้งไว้โดยผู้สร้าง ผลก็คือ ทีมของเราถูกล็อกเอาต์จากระบบของสถานีเป็นเวลานานจนกว่าจะสามารถปรับใช้มาตรการตอบโต้ได้"
  ancrel.kick_it:0 "ลองเตะมันดู"

  site_polaris_seed_vault:0 "ความหวังครั้งสุดท้าย"
  polaris_seed_vault_desc:0 "ฝังอยู่ในเศษชั้นน้ำแข็งเล็ก ๆ ของดาว ลอยอยู่บนมหาสมุทรใสของ [From.Planet.GetName] เป็นโครงสร้างเทียมที่ดูเหมือนจะตั้งใจสร้างขึ้น \n\nต้องส่งทีมไปขุดค้นโครงสร้างนี้"

  ancrel.13000.name:0 "การต้อนรับอันเย็นยะเยือก"
  ancrel.13000.desc:0 "หลังจากเอาชนะผู้รุกรานคนสุดท้ายใน Polaris เรือของเราสำรวจระบบอีกครั้งก่อนจะกลับท่าเรือ และพบสิ่งน่าสงสัย บนดาว Polaris II โลหะหนักถูกจัดเรียงเป็นโครงสร้างเทียมในเซ็นเซอร์ของเรา ที่น่าสนใจคือมีเพียงหนึ่งในโครงสร้างเหล่านี้ที่ลอยอยู่บนมหาสมุทร ส่วนที่เหลืออยู่ใต้ผิวดิน เราคาดว่านี่เป็นฝีมือสิ่งมีชีวิตต่างดาว"

  ancrel.13005.name:0 "ภูเขาน้ำแข็ง"
  ancrel.13005.desc:0 "ฝังอยู่ในภูเขาน้ำแข็งลอยตัวเป็นลูกบล็อกสีดำขนาดมหึมาทำจากโลหะผสมเดียวกับซากกองเรืออวกาศเหนือขึ้นไป ผู้เชี่ยวชาญธารน้ำแข็งของเราบอกว่าการวิเคราะห์ภูเขาน้ำแข็งระบุอายุการก่อตัวอย่างน้อยพันปี แม้จะบอกว่า 'ยากจะระบุในบรรยากาศต่างดาว' การสแกนภายในโครงสร้างพบค่าชีวภาพหลายค่า จึงไม่ควรใช้เครื่องมือรบกวน
  ทีมต้องปีนหน้าผาน้ำแข็งไปยังทางเข้าที่ดูเหมือนเป็นประตูสู่ภายใน"
  acnrel.13005.a:0 "ลงไปกันเถอะ"

  ancrel.13010.name:0 "ประตูน้ำแข็ง"
  ancrel.13010.desc:0 "เราตั้งค่ายฐานตรงทางเข้าที่คาดว่าจะเป็นประตูของสิ่งก่อสร้างบน [From.Planet.GetName] เราได้พบสิ่งที่ดูเหมือนตัวอักษรจารึกบนผนังของอาคารแล้ว ตอนนี้เราจะเริ่มกระบวนการเปิดประตูอย่างระมัดระวังโดยไม่ทำลายสิ่งที่อยู่ข้างใน พร้อมกับนักภาษาต่างดาวของเราที่พยายามแปลภาษาตายของชาวต่างดาว"

  ancrel.13015.name:0 "การปล้นสุสาน"
  ancrel.13015.desc:0 "เวลามาถึงแล้ว เราพร้อมที่จะเปิดโครงสร้างสีดำที่เรียกว่า 'The Vault' ตามการแปลเบื้องต้นของจารึกบนผนัง ผู้สร้าง Vault นี้ คือชาว Polarians สร้างเพื่อเก็บสมบัติสุดท้ายของพวกเขาอย่างปลอดภัย เมื่อเราเปิดประตู เซ็นเซอร์ของเราพบว่ามีบรรยากาศควบคุมภายในคล้ายกับอากาศข้างนอก เพียงแต่มีคาร์บอนไดออกไซด์น้อยกว่า"

  ancrel.13020.name:0 "สมบัติ"
  ancrel.13020.desc:0 "เมล็ดพันธุ์โบราณ! ตัวอ่อนของพืช — นั่นคือสมบัติที่ชาว Polarians ซ่อนไว้ใน Vault นี้ การแปลเพิ่มเติมบอกเราว่าสิ่งมีชีวิตเหล่านี้ชอบเติมคาร์บอนไดออกไซด์เกินจำเป็นในชั้นบรรยากาศของพวกเขา เมื่อชั้นบรรยากาศเปลี่ยนไปอย่างถาวร ชาวโบราณบนโลกนี้จึงรวบรวมพืชทั้งหมดที่อาจไม่รอดต่อสภาพแวดล้อมใหม่และแช่แข็งเก็บไว้ที่นี่

  ในสมัยนั้น ทั้งดาวจะถูกปกคลุมด้วยน้ำแข็ง; ตอนนี้สิ่งที่เหลือคือภูเขาน้ำแข็งเพียงเล็กน้อยและโดดเดี่ยว อย่างไรก็ตาม ความพยายามของพวกเขาไม่ได้สูญเปล่า — การมีระบบนิเวศพืชของดาวทั้งหมดที่ถูกจัดเก็บไว้แล้ว จะช่วยนักวิทยาศาสตร์ของเราในการศึกษาชีววิทยาในอนาคตอย่างมาก"
  ancrel.13020.a:0 "ส่งตัวอย่างเหล่านี้ให้นักวิทยาศาสตร์ของเรา"
  ancrel.13020.b.evopred:0 "จัดเก็บเรียบร้อยและพร้อมโคลนนิ่ง? Vault นี้สร้างมาเพื่อเรา"

  ancrel.13025.desc:0 "จุลินทรีย์! ทุกแบคทีเรียที่เป็นอันตรายและเป็นประโยชน์ ทุกยูคาริโอตและโพรคาริโอต ถูกเก็บในสิ่งอำนวยความสะดวกที่ล้ำสมัยและมีการติดป้ายอย่างเรียบร้อย — นี่คือสมบัติใหญ่ที่ชาว Polarians ซ่อนไว้ใน Vault นี้ การแปลเพิ่มเติมบอกเราว่าสิ่งมีชีวิตเหล่านี้ชอบเติมคาร์บอนไดออกไซด์เกินจำเป็นในชั้นบรรยากาศ เมื่อชั้นบรรยากาศเปลี่ยนไปอย่างถาวร ชาวโบราณบนโลกนี้รวบรวมชีวิตจุลินทรีย์ทั้งหมดที่อาจไม่รอดต่อสภาพแวดล้อมใหม่และแช่แข็งเก็บไว้ที่นี่

  ในสมัยนั้น ทั้งดาวจะถูกปกคลุมด้วยน้ำแข็ง; ตอนนี้สิ่งที่เหลือคือภูเขาน้ำแข็งเล็ก ๆ และโดดเดี่ยว อย่างไรก็ตาม ความพยายามของพวกเขาจะไม่สูญเปล่า — การมีระบบนิเวศจุลินทรีย์ของดาวทั้งหมดที่จัดเก็บไว้แล้ว จะช่วยให้ [Root.Owner.getscientistplural] ของเราพัฒนาคอลนีใหม่บนโลกใหม่ได้ดีขึ้น"
  ancrel.13025.desc.machine:0 "จุลินทรีย์ ทุกแบคทีเรียที่เป็นอันตรายและเป็นประโยชน์ ทุกยูคาริโอตและโพรคาริโอต ถูกติดป้ายและจัดเก็บเรียบร้อย — นี่คือสมบัติใหญ่ที่ชาว Polarians ซ่อนไว้ การแปลเพิ่มเติมบอกเราว่าสิ่งมีชีวิตเหล่านี้ชอบเติมคาร์บอนไดออกไซด์เกินจำเป็น หลังจากบรรยากาศเปลี่ยนไปอย่างถาวร ชาวโบราณรวบรวมจุลินทรีย์ทั้งหมดที่อาจไม่รอดและแช่แข็งเก็บไว้

  ทั้งดาวเคยถูกปกคลุมด้วยน้ำแข็ง; ตอนนี้เหลือเพียงภูเขาน้ำแข็งเล็ก ๆ แต่ความพยายามของพวกเขาได้รับการชื่นชม — ข้อมูลชีววิทยาที่ถูกจัดเรียงไว้ล่วงหน้าจะทำให้ง่ายต่อการดึงข้อมูลสำคัญ"

  ancrel.13030.name:0 "วิสัยทัศน์รบกวนจิตใจ"
  ancrel.13030.desc:1 "สามคืนก่อน หัวหน้าทีมนักโบราณคดี [From.Leader.GetName] รายงานว่ามีวิสัยทัศน์รบกวนจิตใจและถูกกักตัวในห้องพักจนถึงปัจจุบัน เขาเชื่อว่าต้นเหตุอาจมาจากสิ่งที่อยู่ด้านล่างนี่กับเรา..."
  ancrel.13030.a:0 "น่าขนลุก"

  polaris_biology_modifier:0 "ศึกษาพันธุ์พืช Polarian"
  polaris_habitability_modifier:0 "ศึกษาจุลินทรีย์ Polarian"

  d_polaris_city:0 "เมืองโบราณใต้น้ำ"
  d_polaris_city_desc:0 "เมืองของชาว Polarians เคยปกคลุมมหาสมุทรน้ำแข็ง ก่อนที่ฐานรากน้ำแข็งจะละลายหมด"

 #Fumongus
  site_fumongus_dig:0 "แห้งผาก"
  site_fumongus_intro:0 "เราพบร่องรอยของน้ำทั่วทั้งดาว สำหรับเท่าที่เรารู้ มันน่าจะยังคงอยู่ อุณหภูมิอยู่ในช่วงปกติที่น้ำจะยังคงอยู่ในสถานะของเหลว และยังมีชั้นบรรยากาศอยู่ แม้มันจะบางเบาก็ตาม แต่ทุกอย่างที่นี่กลับแห้งแล้ง และพืชที่เหลืออยู่ก็เหี่ยวแห้ง นอกจากนี้ การสแกนยังเผยร่องรอยของอารยธรรมอวกาศอื่นบนดาว ทีมโบราณคดีจะมีเป้าหมายสองอย่าง: หาคำตอบว่าน้ำหายไปไหน และทำความเข้าใจว่าสิ่งมีชีวิตอวกาศอื่น ๆ ทำอะไรที่นี่ สมมติฐานส่วนใหญ่เชื่อมโยงสองเรื่องนี้เข้าด้วยกัน และบางคนในทีมเชื่อว่านี่อาจเป็นฝีมือของ 'โจรน้ำ' "

 #Random Event - Fungal zombies
  ancrel.8300.intro:0 "ทีมสำรวจของ [Root.Owner.GetArchaeologistPlural] บน [From.Planet.GetName] ทำให้ซากสัตว์พื้นเมืองที่เน่าเปื่อยถูกรบกวน และตอนนี้มันกลับอยู่ภายใต้อิทธิพลของเชื้อราปรสิต สัตว์ซอมบี้เชื้อราพวกนี้โจมตีเราอย่างทันทีทันใด ดึงดูดจากแหล่งน้ำในค่ายของเราและแม้กระทั่งร่างกายของเราเอง"
  ancrel.8300.critical:0 "ซอมบี้จัดการ §H[dead_scientist.GetName]§! อย่างรวดเร็ว ก่อนที่ทีมรักษาความปลอดภัยจะเผาทำลาย เหลือเพียงซากแห้งผากเท่านั้น"
  ancrel.8300.failure:0 "ซอมบี้ฆ่า [Root.Owner.GetArchaeologistPlural] หลายคน ก่อนที่ §H[Root.GetLeaderName]§! จะสามารถหยุดพวกมันได้ ซากศพแห้งกรังของพวกเขาแตกเป็นชิ้น ๆ เมื่อเราพยายามเก็บคืน"
  ancrel.8300.success:0 "โชคดีที่ §H[Root.GetLeaderName]§! และหน่วยรักษาความปลอดภัยใกล้เคียงสามารถกำจัดซอมบี้ได้ก่อนที่จะมีใครได้รับบาดเจ็บร้ายแรง"
  ancrel.8300.pay:0 "ซอมบี้ถูกควบคุมไว้ชั่วคราว แต่ยังไม่มีทางผ่านไปได้ อาจต้องล่อด้วยน้ำจำนวนมากพอสมควร"
  ancrel.8300.name:0 "ซอมบี้เชื้อรา"
  ancrel.8300.desc:0 "$ancrel.8300.intro$\n\n$ancrel.8300.critical$"
  ancrel.8305.desc:0 "$ancrel.8300.intro$\n\n$ancrel.8300.failure$"
  ancrel.8310.desc:0 "$ancrel.8300.intro$\n\n$ancrel.8300.success$"
  ancrel.8315.desc:0 "$ancrel.8300.intro$\n\n$ancrel.8300.pay$"
  ancrel.8315.a:0 "จัดการเลย"
  ancrel.8315.b:0 "หาทางเลี่ยง"

 #Digsite Chapters
  ancrel.13100.name:0 "พวกขโมยน้ำ"
  ancrel.13100.desc:0 "การค้นพบที่ [From.Planet.GetName] ของหุบเขาขนาดใหญ่เต็มไปด้วยเห็ด ทำให้เราเริ่มเข้าใจคำตอบได้ น้ำทั้งหมดอยู่ในตัวเห็ด เห็ดเหล่านี้ดูเหมือนจะครอบคลุมพื้นที่กว้างของโลก ทั้งหมดเชื่อมต่อกับไมซีเลียมเดียวกัน ซึ่งทางเทคนิคแล้วมันคือสิ่งมีชีวิตเดียว และเป็นหนึ่งในสิ่งมีชีวิตที่ใหญ่ที่สุดที่เราเคยเห็น สมาชิกบางคนของทีมตั้งชื่อมันว่า 'Fumongus' ดูเหมือนว่าเห็ดถูกดัดแปลงพันธุกรรมและเข้าครอบงำระบบนิเวศทั้งหมดที่เคยอยู่ที่นี่ การเจริญเติบโตอย่างรวดเร็วและไม่มีการควบคุมทำให้มันดูดซับน้ำส่วนใหญ่ที่มีอยู่ จากนั้นมันเข้าสู่สภาพเฉื่อยแห้ง แต่ส่วนใหญ่ของเห็ดยังมีชีวิตอยู่ น้ำกระจายอยู่ทั่วทั้งสิ่งมีชีวิตนี้"
  ancrel.13105.name:0 "บังเกอร์ยึดครอง"
  ancrel.13105.desc:0 "ลึกเข้าไปในป่ามายซีเลียมในหุบเขาของ [From.Planet.GetName] เราพบบังเกอร์บางอย่าง ซึ่งถูกเห็ดยึดครองมานาน ทีมเชื่อว่ามันถูกสร้างโดยเผ่าพันธุ์เดียวกับที่ดัดแปลงพันธุกรรมเห็ดที่นี่ บางส่วนของบังเกอร์พังทลาย และอุปกรณ์ภายในเสียหายเกินกว่าจะซ่อมได้ แต่เราพบบางห้องปิดผนึกที่อาจมีวัสดุที่นำไปใช้ได้ น่าสังเกตว่าไม่มีซากเอเลี่ยนใด ๆ พบที่นี่ อาจพวกมันทิ้งไปแล้ว หรือไม่มีซากใดที่ไม่ได้ถูกสิ่งมีชีวิตในพื้นที่ดูดซับ"
  ancrel.13110.name:0 "นักดัดแปลงเห็ด"
  ancrel.13110.desc:0 "บังเกอร์บน [From.Planet.GetName] ถูกใช้เพื่อปกป้องอุปกรณ์คอมพิวเตอร์ บางส่วนเชื่อมต่อโดยตรงกับไมซีเลียม โชคดีที่เราสามารถเปิดใช้งานเทอร์มินอลและฐานข้อมูลบางส่วนได้ การถอดรหัสและตีความภาษาที่ใช้จะต้องใช้เวลา ทีมจึงขอให้ส่ง [Root.Owner.GetLinguists] ชั้นยอดมาช่วยที่นี่"
  ancrel.13115.name:0 "จากเห็ดสู่รหัส"
  ancrel.13115.desc:0 "เรากู้ข้อมูลสำคัญจากฐานข้อมูลในบังเกอร์บน [From.Planet.GetName] ฐานข้อมูลระบุว่านี่คือฐานสังเกตการณ์ ดูเหมือนเอเลี่ยนค้นพบวิธีตีความสัญญาณที่ไหลผ่านไมซีเลียมและแปลงเป็นข้อมูลที่ใช้ได้จริง เราไม่เข้าใจว่ามันเป็นไปได้อย่างไร แต่ทีมจะพยายามนำน้ำจากดาวเคราะห์น้ำแข็งใกล้เคียงมา 'ปลุก' Fumongus อีกครั้งเพื่อดูว่ามันส่งข้อมูลอะไรออกมาหรือไม่"
  ancrel.13120.name:0 "ไม่แห้งอีกต่อไป"
  ancrel.13120.desc:0 "เห็ดบน [From.Planet.GetName] เริ่มเติบโตอีกครั้ง ด้วยความช่วยเหลือจากหลายลำ เรายกดาวเคราะห์น้ำแข็งบางส่วนเข้ามาในวงโคจรแล้วละลายน้ำบนดาวเคราะห์ กระบวนการนี้ยาวนาน แต่เริ่มให้ผลแล้ว ด้วยเหตุนี้ คอมพิวเตอร์เริ่มส่งข้อมูลเล็ก ๆ ออกมา ซึ่งตอนแรกดูเหมือนสุ่ม จนเราเห็นกิจกรรมจากบ้านเกิด ในความร่วมมือกับทีมที่ [Root.Owner.Capital.GetName] มีการทดลองหลายครั้งและข้อสรุปเดียวคือ เห็ดมีความรับรู้จำกัดต่อสิ่งที่เกิดขึ้นบนดาวเคราะห์อื่น ข้อมูลที่ได้ยังใช้ไม่ได้เต็มที่ แต่ความพยายามต่อเนื่องคาดว่าจะให้ผลลัพธ์เพิ่มเติม"
  ancrel.13135.name:0 "Fumongus ฟังอีกครั้ง"
  ancrel.13135.desc:0 "$ancrel.13135.intro$\n\nปริศนาบางอย่างยังคงเหลืออยู่ เรายังไม่แน่ใจว่าเห็ดจัดการเก็บข้อมูลมหาศาลจากกาแล็กซี่อื่นได้อย่างไร $ancrel.13135.mid$\n\nด้วยเครือข่ายที่กลับมาทำงานอีกครั้ง การตัดสินใจเดียวที่เหลืออยู่คือ จะใช้มันเพื่อสอดแนมหรือไม่"
  ancrel.13135.a:0 "เริ่มติดตามสัญญาณ"
  ancrel.13135.a.evopred: "สอดแนมและรายงาน อาจได้เรียนรู้อะไรบางอย่างแบบเดียวกัน"
  ancrel.13135.b:0 "ปล่อยให้เห็ดอยู่ตามเดิม"

  ancrel.13135.intro:0 "Mycelium Listening Array กลับมาทำงานอีกครั้ง น้ำจำนวนมากถูกนำนำมาจากวงโคจรเพื่อดับความกระหายของเห็ด และมีการอัปเกรดทรัพยากรคอมพิวเตอร์ครั้งใหญ่"

  ancrel.13135.mid:0 "จำนวนสัญญาณที่ไหลผ่านเครือข่ายกลับน้อยกว่าที่คาดไว้ เมื่อเทียบกับปริมาณข้อมูลทั้งหมด ทฤษฎีที่โดดเด่นที่สุดคือ Fumongus อาจมีอยู่ข้ามมิติ ซึ่งระยะทางไม่เป็นไปตามที่เราคุ้นเคย\nอย่างไรก็ตาม Fumongus ติดต่อกับลูกหลานของมันทั่วกาแล็กซี่ และอาณานิคมเล็ก ๆ เหล่านี้สามารถส่งข้อมูลมาให้เราแปลได้"

  #Final event variation

  ancrel.13130.name:0 "จงกลัวเห็ดเก่า"
  ancrel.13130.desc:0 "$ancrel.13135.intro$\n\nและก็ยังมีหลายสิ่งที่เราไม่รู้เกี่ยวกับเครือข่ายไมซีเลียม $ancrel.13135.mid$ แต่ใครอีกล่ะที่อาจเข้าถึงเครือข่ายนี้ มีข้อมูลมากที่เราไม่สามารถจับคู่กับระบบในกาแล็กซี่นี้ได้ [Root.Owner.GetScientistPlural] ที่มองโลกในแง่ร้ายกว่าบอกว่าเราอาจไม่ใช่คนเดียวที่ฟัง และการเปิดเครือข่ายนี้อีกครั้งเราอาจเพิ่งเผยตัวตนต่อใครก็ตามที่ใช้มัน

  เมื่อพิจารณาสิ่งที่เรายังไม่รู้เกี่ยวกับ Fumongus หรือเกี่ยวกับเผ่าพันธุ์ก่อนหน้านี้ที่เคยใช้มัน มันอาจจะดีที่สุดที่จะปล่อยมันไว้เฉย ๆ"
  ancrel.13130.a:0 "คนขี้ระแวง บ้าพอแล้ว ใช้มันซะ"
  ancrel.13130.b:0 "ปล่อยให้เห็ดอยู่ตามเดิม"
