 # Hyper Relay Event
 over.100.title:1 "การเชื่อมต่อห่วงโซ่ไฮเปอร์รีเลย์เสร็จสิ้น"
 over.100.a.desc:0 "มันเสร็จสิ้นแล้ว วันนี้เรามอบผลงานการสร้างสรรค์อันยิ่งใหญ่ที่สุดชิ้นหนึ่งแก่ดาราจักร: การประสานงานของเครือข่ายไฮเปอร์รีเลย์ของเราเข้ากับเครือข่ายของสหายรัก §Y[from.GetName]§!\n\nพิธีเฉลิมฉลองอันหรูหราได้จัดขึ้นทั่วดินแดน [root.GetName] ทุกคนต่างแซ่ซ้องถึงทางเชื่อมใหม่ที่น่าภาคภูมิใจนี้ กล่าวกันว่าในช่วงเวลานี้ ความอิจฉาริษยาอันไร้สาระทั้งหมดได้รับการลืมเลือน ความเฉื่อยชาและความเฉยเมยถูกปัดทิ้งไป ความรู้สึกภาคภูมิใจและความทะเยอทะยานที่ปะปนอยู่นี้คือความมั่นใจร่วมกันในวันเวลาข้างหน้า การทำงานเคียงข้างกันทำให้เราพังทลายอุปสรรคที่เคยคิดว่าผ่านไปไม่ได้ นำพาไปสู่ยุคใหม่แห่งความเจริญรุ่งเรืองและการร่วมมือเป็นพันธมิตรร่วมกัน"
 over.100.b.desc:0 "วันนี้เราได้จารึกความสำเร็จของเราลึกลงไปในบันทึกความรุ่งโรจน์ของดาราจักร ด้วยการเชื่อมต่อเครือข่ายไฮเปอร์รีเลย์ของเราเข้ากับของ §Y[from.GetName]§! ประชากรของเราอาจเริ่มออกเดินทางไปยังระบบดาวใกล้เคียงได้โดยปราศจากข้อขัดขวาง\n\nในทำนองเดียวกัน [from.GetAdj] ในเวลานี้ก็ยินดีต้อนรับอิทธิพลอันมั่งคั่งของ [root.GetAdj] เรา พวกเขาจะได้รับผลประโยชน์จากวัฒนธรรมอันอุดมสมบูรณ์ที่สะท้อนถึงระบบดาวฤกษ์อันงดงามของเราเอง"
 over.100.c.desc:0 "ดาราจักรมอบอุปสรรคให้เราลดลงอีกข้อในวันนี้ เนื่องจากความพยายามร่วมมือกับ [from.GetName] ได้มาถึงจุดสรุปที่งดงาม ทางเชื่อมสุดท้ายในเครือข่ายไฮเปอร์รีเลย์ที่อยู่ติดกันของเราได้รับการเปิดใช้งานอย่างสมบูรณ์ เอื้ออำนวยให้ทั้งสองฝ่ายเดินทางข้ามพรมแดนร่วมกันได้อย่างรวดเร็ว\n\nสิ่งที่รอเราอยู่ตอนนี้คือการเดินทางสู่อภิมหาแดนที่ไม่รู้จัก สำหรับทุกแง่มุมของข้อตกลงนี้ — ทั้งด้านดีและด้านร้าย — จะมีผลบังคับใช้อย่างเท่าเทียมกันกับเราและ [from.GetName] เราจะได้เห็นกันว่าเพื่อนบ้านของเราจะรักษาความไว้วางใจร่วมกันนี้ได้ดีเพียงใด"
 over.100.a:1 "วันแห่งความภาคภูมิใจสำหรับทุกคน"
 over.100.b:1 "กำไรไร้ขอบเขต!"
 over.100.c:0 "เราจะได้เห็นกัน"

 edict_relay_network_dummy:0 "เครือข่ายรีเลย์"
 edict_relay_network_dummy_desc:0 "เครือข่ายรีเลย์สามารถปรับทิศทางเพื่อรับใช้ดาวอาณานิคมของเราได้"
