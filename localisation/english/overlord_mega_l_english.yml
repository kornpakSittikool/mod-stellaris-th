 sm_orbital_ring_gun_battery:0 "ปืนป้องกันดาวเคราะห์"
 sm_orbital_ring_gun_battery_desc:1 "เพิ่มช่องติดตั้งอาวุธขนาดกลางสองช่องให้แก่สถานีอวกาศวงแหวนโคจร\n"
 sm_orbital_ring_missile_battery:0 "ป้อมยิงอาวุธนำวิถีที่ป้องกันดาวเคราะห์"
 sm_orbital_ring_missile_battery_desc:2 "เพิ่มช่องติดตั้งอาวุธนำวิถีสองช่องให้แก่สถานีอวกาศวงแหวนโคจร\n"
 sm_orbital_ring_hangar_bay:0 "โรงเก็บเครื่องบินป้องกันดาวเคราะห์"
 sm_orbital_ring_hangar_bay_desc:1 "เพิ่มโรงเก็บเครื่องบินรบขนาดเล็ก(เสียงทุบ)ให้แก่สถานีอวกาศวงแหวนโคจร\n"
