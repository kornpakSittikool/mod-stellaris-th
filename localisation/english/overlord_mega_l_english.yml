 FLEETORDER_QUANTUM_CATAPULT_HEADER:0 "เหวี่ยงกองยาน"
 FLEETORDER_QUANTUM_CATAPULT_DESC:0 "ส่งกองยานออกตัวจากระบบดาวที่มี §Yเครื่องเหวี่ยงกองยานควอนตัม§!."
 QUANTUM_CATAPULT_PENALTY:1 "§Yเครื่องเหวี่ยงกองยานควอนตัม§! จะสูญเสียความแม่นยำตามระยะทาง ดังนั้นกองยานจะไปปรากฏในระบบดาวแบบสุ่มภายในรัศมีกระจัดกระจายที่ระบุ\n\nกองยานที่ถูกส่งด้วยวิธีนี้จะได้รับอัตราการยิง [GetQuanticAmbushBonus] §Yอัตราการยิง§! เพิ่มขึ้นเป็นเวลา £time£ §Y120 วัน§!"
 QUANTUM_CATAPULT_MAP_TOOLTIP_LEFT_CLICK:0 "§Gคลิกซ้ายที่ระบบดาวบนแผนที่เพื่อเลือกเป็นเป้าหมาย§!"
