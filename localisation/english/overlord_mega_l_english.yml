 tech_orbital_ring_tier_1:0 "สถานีอวกาศวงแหวนโคจร"
 tech_orbital_ring_tier_1_desc:0 "ปลดล็อกการสร้างสถานีดาราจักรทรงวงแหวนขนาดมหึมาในวงโคจรที่มั่นคงรอบดาวเคราะห์ที่มีประชากรตั้งถิ่นฐานอยู่"

