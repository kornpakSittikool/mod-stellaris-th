 edict_relay_network_stability:0 "การปกครองแบบเครือข่าย"
 edict_relay_network_stability_desc:0 "เครือข่ายรีเลย์สามารถใช้เพื่อส่งมอบคำสั่งและเจตจำนงของเราไปยังดาวอาณานิคมได้อย่างมีประสิทธิภาพยิ่งขึ้น"
