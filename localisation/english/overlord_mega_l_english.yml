l_english:
 orbital_ring_tier_1_MEGASTRUCTURE_DETAILS:0 "§Y$orbital_ring_tier_1$§! เป็นสถานีดาราจักรรูปแบบหนึ่งที่สร้างขึ้นเป็นแนววงแหวนล้อมรอบดาวเคราะห์ เพื่อให้การป้องกันและการปรับปรุงความเชี่ยวชาญเพิ่มเติม"
 orbital_ring_tier_1_CONSTRUCTION_INFO_DELAYED:1 "สถานีอวกาศวงแหวนโคจรสามารถมอบคุณประโยชน์ในการป้องกันแก่ดาวเคราะห์ โดยเป็นฐานรองรับโมดูลและสิ่งก่อสร้างสถานีดาราจักรจำนวนมาก รวมถึงโมดูลที่อยู่อาศัยและสิ่งอำนวยความสะดวกในการผลิตบนวงโคจร"
 orbital_ring_tier_1:0 "สถานีอวกาศวงแหวนโคจร"
 orbital_ring_tier_1_DESC:1 "สถานีดาราจักรรูปแบบนี้สร้างล้อมรอบดาวเคราะห์ มอบพื้นที่สำหรับติดตั้งโมดูล สิ่งก่อสร้าง และแพลตฟอร์มป้องกันภัย"
 orbital_ring_tier_1_plural:0 "สถานีอวกาศวงแหวนโคจร"
 allow_orbital_rings:0 "§Hปลดล็อกสิ่งก่อสร้างขนาดมหึมา:§! $orbital_ring_tier_1$"
