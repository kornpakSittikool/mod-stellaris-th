 edict_relay_network_movement:0 "การเคลื่อนย้ายแบบเครือข่าย"
 edict_relay_network_movement_desc:0 "เครือข่ายรีเลย์สามารถปรับปรุงได้ด้วยการเดินทางของยานขนส่งเที่ยวปกติเพื่อส่งเสริมการย้ายถิ่นฐานภายในของประชากร"
