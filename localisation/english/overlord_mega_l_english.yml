 sm_ring_energy_hub:0 "เครื่องสตราโตสเฟียร์ไอออไนเซชัน"
 sm_ring_energy_hub_desc:1 "อุปกรณ์เหล่านี้ช่วยลดการสูญเสียพลังงานในระหว่างการกระจายกระแสไฟได้อย่างดีเยี่ยม ช่วยเพิ่มผลผลิตเครื่องกำเนิดไฟฟ้าโดยรวม"
 sm_ring_food_hub:0 "สถานีปรับสภาพอากาศ"
 sm_ring_food_hub_desc:1 "การติดตามสภาพอากาศในพื้นที่อย่างละเอียดช่วยให้เราสามารถส่งอิทธิพลต่อสภาพภูมิอากาศของดาวเคราะห์ในระดับภูมิภาคได้ ช่วยเพิ่มผลผลิตทางการเกษตร"
 sm_ring_minerals_hub:0 "ศูนย์สกัดแร่แรงโน้มถ่วงต่ำ"
 sm_ring_minerals_hub_desc:1 "การรวบรวมศูนย์กลางกระบวนการกลั่นแร่ธาตุไว้บนสถานีวงแหวนโคจรช่วยให้ประยุกต์ใช้เทคนิคใหม่ๆ ที่เพิ่มประสิทธิภาพการขุดเจาะได้ดีขึ้น"
 sm_ring_consumer_goods_hub:0 "ระบบลอจิสติกส์วงโคจร"
 sm_ring_consumer_goods_hub_desc:0 "การโอนถ่ายการปฏิบัติการด้านลอจิสติกส์ไปยังระบบอัตโนมัติบนสถานีวงแหวนโคจรช่วยให้โรงงานผลิตสินค้าอุปโภคบริโภค $planet_buildings_factories$ บนพื้นผิวโลกสามารถทำงานได้เต็มกำลังอย่างต่อเนื่อง"
 sm_ring_alloys_hub:0 "เครื่องอำนวยความสะดวกในการแปรรูปโลหะผสม"
 sm_ring_alloys_hub_desc:1 "โลหะผสมจากพื้นผิวโลกจะได้รับการกลั่นแปรรูปเพิ่มเติมในวงโคจร สร้างวัสดุที่ใช้งานได้จริงจากผลพลอยได้ที่อาจต้องสูญเปล่าไปโดยใช่เหตุ"
 sm_ring_trade_hub:0 "ห้างสรรพสินค้าขนาดใหญ่"
 sm_ring_trade_hub_desc:1 "การย้ายห้างร้านการค้าและแหล่งช็อปปิ้งทั้งหมดขึ้นสู่วงโคจรช่วยเพิ่มขีดความสามารถในการอำนวยความสะดวกทางธุรกิจได้อย่างมีประสิทธิภาพยิ่งขึ้นอย่างที่ไม่เคยมีมาก่อน"
 sm_ring_trade_hub_effect:0 "£amenities£ สิ่งอำนวยความสะดวกต่อหน่วยกลุ่มประชากร [trader.GetIcon] [trader.GetNamePlural]: §G+100§!"
 sm_ring_bureaucracy_hub:0 "ระบบการจัดเก็บข้อมูลบนสถานีวงโคจร"
 sm_ring_bureaucracy_hub_desc:1 "ประสิทธิภาพและความคืบหน้าจะกลับมาเป็นของเราอีกครั้ง ตอนนี้นักปกครองของเราสามารถเข้าถึงเอกสารราชการที่กำหนดวิถีชีวิตของพวกเขาได้อย่างสะดวกทันใจ"
 sm_ring_synapse_hub:0 "ไซแน็ปติกรีเลย์"
 sm_ring_synapse_hub_desc:0 "บางส่วนของสถานีวงแหวนโคจรได้รับการปรับปรุงเพื่อเพิ่มประสิทธิภาพสัญญาณประสาทไซแนปส์ ปรับปรุงการควบคุมโดรนบนพื้นผิวโลกให้ดียิ่งขึ้น"
 sm_ring_synapse_hub_effect:1 "£unity£ เอกภาพต่อหน่วยกลุ่มประชากร £job_synapse_drone£ $job_synapse_drone_plural$: §G+1§!"
 sm_ring_maintenance_hub:0 "เครื่องดรอปของซ่อมบำรุงจากสถานีวงโคจร"
 sm_ring_maintenance_hub_desc:0 "แคปซูลวัสดุสำหรับการบำรุงรักษาและโดรนที่จำเป็นในการแจกจ่ายสามารถส่งลงมาจากวงโคจรไปยังตำแหน่งที่ต้องการได้ทันทีในชั่วพริบตา"
 sm_ring_maintenance_hub_effect:0 "£amenities£ สิ่งอำนวยความสะดวกต่อหน่วยกลุ่มประชากร [maintenance_drone.GetIcon] [maintenance_drone.GetNamePlural]: §G+100§!"

 sm_ring_psi_corps:0 "หน่วยทหารพลังจิตบนสถานีวงโคจร"
 sm_ring_psi_corps_desc:0 "ส่วนหนึ่งของ $orbital_ring$ ถูกจัดไว้สำหรับการฝึกอบรมผู้มีพลังจิตพิเศษ $individuals_key$ เพื่อให้หน่วยทหารพลังจิต (Psi Corps) คอยเฝ้าสังเกตการณ์ดาวเคราะห์เบื้องล่างอย่างใกล้ชิด\n\n§Yหน่วยทหารพลังจิตคือ $FRIEND_DEFAULT$ ของคุณ จงไว้วางใจพวกเขา§!\n\n£job_telepath£ $job_telepath_plural$ ผลิต £unity£ §Y$unity$§!, ลด £crime£ §Y$PLANET_CRIME_TITLE$§! และมอบโบนัสประสิทธิภาพโดยรวมบนดาวเคราะห์ดวงนี้\n\n$mod_psionic_pop_bonus_workforce_mult$ จะปรับขนาดตามตำแหน่งงาน £job_telepath£ $job_telepath$ Jobs\n"
 sm_ring_psi_corps_machine_intelligence:0 "$sm_ring_psi_corps$"
 sm_ring_psi_corps_desc_machine_intelligence:0 "ส่วนหนึ่งของ $orbital_ring$ ถูกจัดไว้สำหรับการฝึกอบรมยูนิตพิเศษที่มีพลังจิต $units_key$ เพื่อให้หน่วยทหารพลังจิต (Psi Corps) คอยเฝ้าสังเกตการณ์ดาวเคราะห์เบื้องล่างอย่างใกล้ชิด\n\n§Yหน่วยทหารพลังจิตคือ $FRIEND_GESTALT$ ของคุณ จงไว้วางใจพวกเขา§!\n\n$job_telepath_drone_effect_desc$\n\n$mod_psionic_pop_bonus_workforce_mult$ จะปรับขนาดตามตำแหน่งงาน £job_telepath£ $job_telepath$ Jobs\n"
 sm_ring_psi_corps_hive_mind:0 "$sm_ring_psi_corps$"
 sm_ring_psi_corps_desc_hive_mind:0 "ส่วนหนึ่งของ $orbital_ring$ ถูกจัดไว้สำหรับการฝึกอบรมโดรนพิเศษที่มีพลังจิต $drones_key$ เพื่อให้หน่วยทหารพลังจิต (Psi Corps) คอยเฝ้าสังเกตการณ์ดาวเคราะห์เบื้องล่างอย่างใกล้ชิด\n\n§Yหน่วยทหารพลังจิตคือ $FRIEND_GESTALT$ ของคุณ จงไว้วางใจพวกเขา§!\n\n$job_telepath_drone_effect_desc$\n\n$mod_psionic_pop_bonus_workforce_mult$ จะปรับขนาดตามตำแหน่งงาน £job_telepath£ $job_telepath$ Jobs\n"
 sm_ring_orbital_shield_generator:0 "เครื่องกำเนิดโล่พลังงานของสถานีวงโคจร"
 sm_ring_orbital_shield_generator_desc:0 "การเสริมความแข็งแกร่งให้แก่โล่ป้องกันของระบบป้องกันวงโคจรจะรบกวนระบบโล่ป้องกันดาวเคราะห์ดวงอื่น แต่จะทำให้สามารถยืนหยัดต้านทานต่ออาวุธที่ทรงพลังมากขึ้นได้"
 sm_ring_galactic_stock_exchange:0 "ตลาดหลักทรัพย์ของสถานีวงโคจร"
 sm_ring_galactic_stock_exchange_desc:0 "$building_galactic_stock_exchange_desc$\n\n$job_merchant_effect_desc$\n"
 sm_ring_embassy_complex:0 "ศูนย์กลางสถานทูตของสถานีวงโคจร"
 sm_ring_embassy_complex_desc:0 "คอมเพล็กซ์บนวงโคจรนี้ได้รับการออกแบบมาเพื่อให้ผู้เข้าชมรู้สึกเกรงขาม ทำให้พวกเขาโอนอ่อนตามในการเจรจาได้ง่ายขึ้น\n\nเนื่องจากต้องอยู่ใกล้กับที่ทำการรัฐบาล จึงสร้างได้เฉพาะในวงโคจรรอบเมืองหลวงของเราเท่านั้น\n"
 sm_ring_noble_estates:0 "อสังหาริมทรัพย์คนชั้นสูง"
 sm_ring_noble_estates_desc:0 "สิ่งก่อสร้างอันหรูหราที่ใช้ประโยชน์จากแรงโน้มถ่วงที่ลดลงบนวงโคจรเพื่อเป็นที่พำนักของขุนนางท้องถิ่น พื้นที่ส่วนใหญ่ของวงแหวนจัดไว้เพื่อตอบสนองต่อทุกความปรารถนาของพวกเขา\n\n$job_noble_effect_desc$\n"
 sm_ring_slave_processing_facility:0 "ฮับแปรรูปทาส(สถานีวงโคจร)"
 sm_ring_slave_processing_facility_desc:0 "สถานีวงโคจรที่ใช้ประมวลผลแรงงานทาสสำหรับดาวเคราะห์เบื้องล่าง ทาสที่ผ่านกระบวนการแล้วจะถูกขจัดร่องรอยของเจตจำนงเสรีออกไปโดยสิ้นเชิง \n\n$building_slave_processing_slave_army_effect_desc$"

 over.1.name:0 "$quantum_catapult_1$"
 over.1.desc:1 "ขั้นแรกของ $quantum_catapult_3$ ของเราเสร็จสมบูรณ์แล้ว การจัดเรียงอย่างแม่นยำของเลนส์บิดเบี้ยวได้รับประจุไฟจากดวงดาว และสามารถปลดปล่อยพลังงานนี้ในลักษณะที่ควบคุมทิศทางได้ยากเพื่อส่งยานอวกาศข้ามผ่านระยะทางอันกว้างใหญ่"
 over.5.name:0 "$quantum_catapult_2$"
 over.5.desc:1 "การจัดวางเลนส์บิดเบี้ยว $quantum_catapult_3$ ชุดที่สองอยู่ในตำแหน่งที่เหมาะสมแล้วเพื่อถ่วงสมดุลกับชุดแรกในทิศทางตรงกันข้าม ช่วยเพิ่มระยะทางและความแม่นยำให้สูงขึ้น"
 over.10.name:0 "$quantum_catapult_3$ ทำงานเต็มระบบ"
 over.10.desc:1 "การปรับปรุงขั้นตอนสุดท้ายเสร็จสิ้นลงสำหรับ $quantum_catapult_3$ และตอนนี้มันพร้อมทำงานเต็มระบบแล้ว ทั้งระยะส่งตัวและความแม่นยำได้รับการปรับปรุงให้ดีขึ้นมาก"
 over.10.a:0 "สู่อวกาศอันกว้างใหญ่และไกลแสนไกล!"

 # Encountering Ruined Quantum Catapult
 over.20.name:0 "$quantum_catapult_ruined$"
 over.20.a.desc:0 "เศษซากขนาดใหญ่โคจรรอบพัลซาร์ในระบบดาว [quantum_catapult_system.GetName] นักวิทยาศาสตร์ของเราคาดการณ์ว่าโครงสร้างที่สมบูรณ์บางส่วนในจุดที่หนาแน่นที่สุดของแถบเศษซากนี้ มีส่วนช่วยดึงพลังงานของดาวฤกษ์เพื่อยิงวัตถุออกไปในระยะทางที่น่าทึ่ง\n\nหากเราพัฒนาองค์ความรู้เพื่อทำงานกับสิ่งก่อสร้างขนาดยักษ์(โพรไฟล์เมก้า)ได้สำเร็จ เราจะสามารถซ่อมแซม §Y$quantum_catapult_3$§! นี้ได้"
 over.20.b.desc:0 "เศษซากขนาดใหญ่โคจรรอบพัลซาร์ในระบบดาว [quantum_catapult_system.GetName] โครงสร้างตรงกลางมีความคล้ายคลึงกับแบบร่าง §Y$quantum_catapult_3$§! ของเราเอง ด้วยการซ่อมแซมอย่างครอบคลุม เราจะสามารถกู้คืนระบบการทำงานของมันกลับคืนมาได้"
 over.20.a:0 "คิดดูสิว่าถ้าเรามีตั้งสองเครื่องล่ะ!"

 # Quantum Catapult Restored
 over.25.name:0 "$quantum_catapult_3$ ได้รับการบูรณะ"
 over.25.a.desc:0 "$over.25.desc$ เราได้พัฒนาความเข้าใจในเทคโนโลยีของมันอย่างลึกซึ้ง และหลังจากการรันระบบทดสอบสองสามครั้ง เราเริ่มมั่นใจว่าสามารถใช้งานมันได้อย่างปลอดภัย"
 over.25.desc:0 "$quantum_catapult_ruined$ ในระบบดาว [quantum_catapult_system.GetName] ได้รับการซ่อมแซมจนกลับมาทำงานปกติได้แล้ว และตอนนี้สามารถส่งกองยานของเราข้ามผ่านหมู่ดาวได้"
 #over.25.a:0 "$over.15.a$" #Pointed at an inexistant string. Replaced with EXCELLENT

 # Yuht Hyper Relay Project
 over.50.name:0 "การอ่านค่าที่ผิดปกติ"
 over.50.desc:0 "การวิเคราะห์เพิ่มเติมของข้อมูลที่กู้จากระบบดาว §Y[yuhtaan.GetName]§! เผยให้เห็นรูปแบบพลังงานที่เกิดซ้ำซ้อนอย่างละเอียดอ่อนซึ่งซ่อนอยู่ในเสียงรบกวนเบื้องหลัง ส่งสัญญาณออกมาจากดาวเคราะห์น้อย [jabbardeeni_cache.GetName]"
 over.50.a:0 "มุ่งสู่ระบบ [yuhtaan.GetName]!"
 YUHT_JABBARDEENI_CACHE:0 "สัญญาณพลังงานที่เบาบาง"
 YUHT_JABBARDEENI_CACHE_DESC:0 "รูปแบบพลังงานที่เกิดซ้ำซ้อนอย่างละเอียดอ่อนแผ่ออกมาจากดาวเคราะห์น้อยดวงนี้ทุกครั้งที่ยานอวกาศเดินทางผ่านระบบดาว"

 over.60.name:0 "คลังข้อมูลแจ๊บบ้า"
 over.60.desc:0 "ฐานสัญญาณดักฟังขนาดเล็กที่มีอายุย้อนกลับไปถึงสมัยความขัดแย้งโบราณของ Yoht-jabbaDardi พร้อมคลังเก็บข้อมูลขนาดใหญ่ถูกซ่อนไว้ลึกในดาวเคราะห์น้อยดวงนี้ ซึ่งสร้างขึ้นโดยพวกแจ๊บบ้าหลังสงครามเพื่อคอยสังเกตการณ์ระบบดาว §Y[yuhtaan.GetName]§! ในกรณีที่พวกยี้จะหวนคืนสู่ระบบดาวบ้านเกิดของพวกเขา\n\nในศตวรรษต่อมา พวกแจ๊บบ้าได้ปรับเปลี่ยนสถานีแห่งนี้ให้เป็นพื้นที่ทดสอบสำหรับการทดลองล้ำสมัยในเรื่องการเดินทางด้วยความเร็วเหนือแสง แม้ว่าข้อมูลส่วนใหญ่จะเป็นเชิงทฤษฎี แต่บางส่วนก็ยังมีคุณค่าต่อการใช้งานอยู่บ้าง"

