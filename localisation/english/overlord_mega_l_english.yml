 sm_orbital_ring_habitation_desc:1 "ลิฟต์อวกาศความเร็วสูงช่วยให้ดาวเคราะห์สามารถขยายพื้นที่อยู่อาศัย คลังจัดเก็บทรัพยากร และโรงกลั่นขึ้นสู่วงโคจรได้\n"
