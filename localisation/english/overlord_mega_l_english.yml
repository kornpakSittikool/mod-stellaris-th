 edict_relay_network_amenities:0 "ความอยู่ดีกินดีแบบเครือข่าย"
 edict_relay_network_amenities_desc:0 "เครือข่ายรีเลย์สามารถดัดแปลงเพื่อส่งสัญญาณความบันเทิงที่รัฐบาลอนุมัติให้แก่ผู้รับชมจำนวนมาก"
