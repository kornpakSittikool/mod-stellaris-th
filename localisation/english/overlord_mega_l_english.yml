 CANNOT_BOMBARD_ORBITAL_DEFENCE_PROTECTED:0 "ไม่สามารถระเบิดโจมตีดาวเคราะห์ที่ได้รับการปกป้องโดยสถานีป้องกันในวงโคจรได้"
