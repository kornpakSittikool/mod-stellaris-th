 tech_quantum_catapult:0 "เครื่องเหวี่ยงกองยานควอนตัม"
 tech_quantum_catapult_desc:1 "§Yเครื่องเหวี่ยงกองยานควอนตัม§! ควบคุมพลังของดาวนิวตรอนหรือพัลซาร์เพื่อบิดโครงสร้างอวกาศ(กาลอวกาศยืด-หด) ทำให้สามารถส่งกองยานในระยะทางที่ไกลได้"

 requires_neutron_star_or_pulsar:0 "$TRIGGER_FAIL$ต้องสร้างขึ้นรอบๆ $pc_neutron_star$ หรือ $pc_pulsar$"
 requires_no_existing_quantum_catapult:0 "$TRIGGER_FAIL$ไม่สามารถสร้างเครื่องเหวี่ยงกองยานควอนตัมได้มากกว่าหนึ่งเครื่อง"
 requires_no_existing_quantum_catapul_two:0 "$TRIGGER_FAIL$ไม่สามารถสร้างเครื่องเหวี่ยงกองยานควอนตัมได้มากกว่าสองเครื่อง"

 quantum_catapult_0_MEGASTRUCTURE_DETAILS:1 "อุปกรณ์ที่โฟกัสพลังงานของดาวนิวตรอนหรือพัลซาร์เพื่อบิดโครงสร้างกาลอวกาศ และเหวี่ยงกองยานข้ามผ่านระยะทางอันไกลแสนไกลได้ในทันที"
 quantum_catapult_0_CONSTRUCTION_INFO_DELAYED:1 "การทดลองใช้เครื่องเหวี่ยงกองยานควอนตัมในระยะแรกอาจทำให้กองยานไปถึงระบบดาวที่ §Hนอกเหนือ§! เป้าหมายที่ตั้งใจไว้ '§Yรัศมีที่กระจัดกระจาย§!' นี้สามารถลดลงได้ด้วยการอัปเกรดในระดับต่อๆ ไป"

 quantum_catapult_0:0 "ที่ตั้ง $quantum_catapult_3$"
 quantum_catapult_0_DESC:1 "คลังจัดเก็บเสบียงขนาดกะทัดรัดนี้รวบรวมวัสดุและบุคลากรทั้งหมดที่จำเป็นสำหรับการสร้างเลนส์โฟกัสขนาดยักษ์ชุดแรกสำหรับเครื่องเหวี่ยงกองยานควอนตัม"
 quantum_catapult_1:0 "$quantum_catapult_3$ อาร์เรย์เดี่ยว"
 quantum_catapult_1_DESC:1 "การคำนวณแสดงให้เห็นว่าแม้จะมีเลนส์บิดเบี้ยวเพียงไม่กี่ชิ้นที่ติดตั้งในตำแหน่งที่แม่นยำรอบดาวฤกษ์ของพวกมัน ก็สามารถส่งผ่านพลังงานได้เพียงพอที่จะรองรับวิถีการโคจรที่มีความผันผวนเล็กน้อยข้ามอวกาศระหว่างดวงดาวได้"
 quantum_catapult_2:0 "$quantum_catapult_3$ อาร์เรย์คู่"
 quantum_catapult_2_DESC:1 "อาร์เรย์เลนส์บิดเบี้ยวคู่ถูกติดตั้งในทิศทางตรงกันข้ามกันโดยสิ้นเชิง เพื่อปรับปรุงการจัดทิศทางของรังสีดาวฤกษ์เพื่อใช้เป็นวิธีการเดินทาง"
 quantum_catapult_3:0 "เครื่องเหวี่ยงกองยานควอนตัม"
 quantum_catapult_3_DESC:1 "กรงเชื่อมโยงของเลนส์บิดเบี้ยวรอบดาวฤกษ์ช่วยให้มั่นใจได้ถึงประสิทธิภาพการส่งผ่านพลังงานที่จับได้จนถึงการปลดปล่อยออกมาเพื่อใช้เป็นวิธีการเดินทางระหว่างดวงดาวอย่างเหมาะสมที่สุด"
 quantum_catapult_ruined:0 "$quantum_catapult_3$ (พังเสียหาย)"
 quantum_catapult_ruined_DESC:1 "การจัดวางเลนส์ขนาดมหึมาเหล่านี้ถูกออกแบบมาเพื่อรวมพลังงานจากดาวฤกษ์ที่มันล้อมรอบ แหล่งพลังงานดังกล่าวจะทรงพลังพอที่จะส่งยานอวกาศข้ามอวกาศระหว่างดวงดาวได้ — หากเพียงแต่อาร์เรย์ไม่บิดเบี้ยวและอยู่ในสภาพที่จำเป็นต้องได้รับการซ่อมแซมอย่างชัดเจน"
