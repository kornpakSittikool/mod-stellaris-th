 marauder.19.desc_01:0 "เดอะ[Root.GetName]เป็นความวิปริตของธรรมชาติ คุณ... \"ไฮวี่ จิต\" หรืออะไรก็ได้ที่คุณต้องการเรียกว่า ความอหังการ ที่ขุนนางเหนือดินแดนของคุณ มันเป็นตัวแทนของทุกอย่าง ที่ผิดในกาแล็กซี่นี้\n\nนักรบของ[marauder_country_1.GetSpeciesNamePlural]จะไม่มีอะไรเกี่ยวกับเธอ"
 marauder.19.desc_02:0 "เดอะ[Root.GetName]ไม่มีอะไรนอกจากฝูงสัตว์ป่า การสังหารผู้บริสุทธิ์อย่างโง่เขลาของเจ้า ก็เพียงพอแล้ว ที่จะทําให้นักรบของเราป่วย\n\nเราจะไม่ติดต่อกับคุณ"
 marauder.19.desc_03:0 "อ่า ใช่ เครื่องพูดได้ เจ้าของของคุณอยู่ที่ไหน เครื่องจักร? พวก เขา รู้ ไหม ว่า คุณ ทํา ผิด พลาด?\n\nแม้จะไม่มีเกียรติยศในนั้น นักรบของเราจะยินดีใช้คุณ สําหรับการฝึกเป้าหมายถ้าคุณเข้าใกล้ดินแดนของเรา ตอนนี้ไปให้พ้นจากสายตาของฉัน"
 marauder.19.desc_04: "ไม่ ต้อง สงสัย ว่า คุณ คิด ว่า ตัว เอง เป็น คน น่า กลัว รูป ร่าง หน้า ตา ของ คุณ ยุ่งเหยิง ไป ด้วย เปลว ไฟ. บางทีเจ้าอาจจะลืมไป ว่าไฟทุกดวงต้องดับในที่สุด เอาคําพูดของเธอ ไปไว้ที่อื่นเถอะ"

 marauder.19.2.desc_01:0 "เฮ้! ที่กินทุกอย่าง! คุณไม่ได้เปลี่ยนเราเป็นสตูว์ แน่นอน! ไปไกลๆเลย"
 marauder.19.2.desc_02:0 "เฮ้! เราชอบทุบ แต่ไม่ชอบนาย เธอชอบมันมากไปแล้ว เราไม่คุยกับนาย!"
 marauder.19.2.desc_03:0 "เฮ้! มัน... มันเข้าใจได้ไหม? มันฆ่าเครื่องใช่มั้ย? มันฆ่าได้อย่างเดียวเหรอ\n\nเครื่องจักร... ฆ่าตัวเอง! คุณสั่งให้ฆ่าตัวตาย!\n\nมันพังแล้ว ไม่มีประโยชน์"
 marauder.19.2.desc_04: "เฮ้! ร้อน ร้อน และเหม็นเหมือนควัน สามารถใช้เพื่อความใจดีได้ไหม ไม่เหรอ? อ้า!\n\nไปให้พ้น ถ่านที่ไร้ประโยชน์"

 marauder.19.3.desc_01:0 "ชนิดของคุณเป็นนา ที มากับเธอของหมึกคุณจะกินวอยด์เอง ถ้ามันเป็นไปได้ คุณล่ะ?\n\nแรงจูงใจ"
 marauder.19.3.desc_02:0 "นางของเวียดต้องการการบูชายัญ แต่ไม่ใช่ในมาตราที่คุณส่งมอบ คุณ บูชา การ ทําลาย ตัว เอง และ นั่น ทํา ให้ คุณ เป็น พวก ออก หาก ที่ เลว ร้าย ที่ สุด."
 marauder.19.3.desc_03:0 "คุณเย็นและว่างเปล่าเช่นตัวเวียดเอง เธอเป็นพวกไวด์ก็เคารพมันได้ การทําลายของท่านจะทําให้เราพอใจกับนาง\n\nไม่มีอะไรจะพูดอีกแล้ว"
 marauder.19.3.desc_04: "คุณกล้านําไฟที่สว่างไสว เข้ามาในขอบเขตของเธอของเวียด? ธรรมชาติของคุณเป็นที่รังเกียจของเธอ\n\nเงียบเป็นขี้เถ้าเย็นและจะหายไป"

 marauder.19.a:0 "พรี..."
 marauder.19.b:0 "ความโสโครกของต่างดาว"
 marauder.19.c:0 "เผ่าพันธุ์: §H[From.GetSpeciesName].§!ออกแบบ:§Rเวอมิน§!"
 marauder.19.d:0 "แกจะถูกเผาเหมือนคนอื่นๆ"

 marauder.20.1.desc_01:0 "พูดเร็วคนนอก นักรบของเรากำลังฟังอยู่"
 marauder.20.1.desc_02:0 "เราก้มหัวให้กับเอเลี่ยน"
 marauder.20.1.desc_03:0 "เพื่อเป็นการลงโทษสําหรับการสูญเสียคู่ได้มีคําสั่งว่า ฉันจะจัดการกับคนภายนอกทั้งหมดนี้\n\nคุณต้องการอะไร?"
 marauder.20.1.desc_04:0 "อธิบายการขัดจังหวะนี้ มีการต่อสู้ที่ต้องเข้าร่วม"
 marauder.20.1.desc_05:0 "อ้า! นี่คือนักสู้ตัวจริง\n\nพลังการต่อสู้ของ[Root.GetSpeciesName]นักรบเป็นที่รู้จัก แม้กับเรา มีเป็นพันๆ[marauder_country_1.GetSpeciesNamePlural]ผู้ ที่ อยาก จะ ทดลอง ตัว เอง ใน การ ต่อ สู้ กับ ท่าน."
 marauder.20.1.desc_06:0 "รู้จักกันแล้ว[Root.GetSpeciesNamePlural]บรรณาการของท่านได้รับการต้อนรับจากนักรบของเรา\n\nข้าจะไม่โกหก... ยังมีบางคนต้องการทําร้ายเจ้า แต่พวกเขาถูกจัดการ ส่วนใหญ่"
 marauder.20.1.desc_07:0 "ดาบของเราถูกตัด[Root.GetSpeciesNamePlural]เจ้าไม่มีอะไรต้องกลัวจากนักรบของเรา"

 marauder.20.2.desc_01:0 "ฉันกําลังมีเย็นที่ดี และจากนั้นคุณแสดงขึ้นดาวามาค!เฮ้! คุณต้องการอะไร"
 marauder.20.2.desc_02:0 "สิ่งเดียวที่แย่ยิ่งกว่าอุปราคาคือดวาคัม!ไม่! อย่าถามว่าอะไร เฮ้!"
 marauder.20.2.desc_03:0 "เฮ้!!"
 marauder.20.2.desc_04:0 "นายมีอะไรให้เราทุบมั้ย?[marauder_country_2.GetSpeciesNamePlural]ตีได้ดี!"

 marauder.20.3.desc_01:0 "วันนี้เธอแห่งเวียดโกรธ ฉันรู้สึกได้\n\nเรายังทําไม่พอ ที่จะชนะใจเธอ"
 marauder.20.3.desc_02:0 "ข้าเป็นเพียงคนรับใช้ของนาง ฉันไม่รู้อะไรเลย\n\nแต่เธอ... เธอเห็นคุณสําหรับหนอนที่คุณเป็น"
 marauder.20.3.desc_03:0 "เมื่อใดก็ตามที่เรือของคุณข้าม ความกว้างใหญ่ของพื้นที่ พวกเขาละเมิดการปกครองของเธอด้วยการปรากฏตัวของพวกเขา มันถูกทิ้งไว้ให้เราเพื่อบรรเทาความโกรธของเธอ มันน่ากลัวมากที่ได้เห็น..."
 marauder.20.3.desc_04:0 "สงครามโลกครั้งที่ 9 ในรอบที่ 167 ฝ่ายนอกรีตจะไม่ยอมแพ้ แต่เพื่อนาง เราต้องไม่สํานึกผิด"


 marauder.20.b:0 "เรารู้เป้าหมายการจู่โจมที่ดี..."
 encourage_raid:0 "จ้าง [marauder_species.GetNamePlural] ให้โจมตีคู่แข่งของคุณ"
 marauder.20.busy.b.1.response:1 "นักรบของเรากําลังถูกโจมตี เราไม่มีเวลามารบกวน"
 marauder.20.busy.b.2.response:0 "เฮ้!เราบุกเข้าไปแล้วววมัค! ไม่มีเวลาสำหรับเรื่องนี้!"
 marauder.20.busy.b.3.response:0 "เราบังคับเธอไปแล้ว โดยการบุกทําร้ายผู้ไม่เชื่อ จนกว่าจะสรุปการบุกได้ เราก็ไม่มีอะไรให้คุยกันอีกแล้ว"
 marauder.20.cooldown.b.1.response:0 "เรายังไม่หายจากการบุกโจมตีครั้งก่อน มีเรือไม่พอที่จะลงจอดลําอื่น ค่อยกลับมาทีหลัง"
 marauder.20.cooldown.b.2.response:0 "ดวามัค เราเกลียดที่จะปฏิเสธบาช แต่ยานของเรายังไม่พร้อม ยังคงฟื้นตัวจากการโจมตีครั้งสุดท้าย!"
 marauder.20.cooldown.b.3.response:0 "มันเร็วเกินไป การบุกโจมตีครั้งก่อนของเรา เพิ่งยุติลง และตอนนี้ถึงเวลาแล้ว สําหรับการสวดและบูชาเธอแห่งเวียด"
 marauder.20.d:0 "เราอยากจ้างกองยานทหารรับจ้าง"
 hire_mercenaries:0 "จ้างกองเรือ[marauder_species.GetName]ทหารรับจ้างอยู่ระยะหนึ่ง"
 marauder.20.e:0 "ยุติการติดต่อสื่อสาร"
 marauder.20.need_rivals:0 "คุณไม่มีคู่แข่ง"
 marauder.20.f:0 "คุณช่วยหยุดเสียงกรีดร้องนั้นได้ไหม?"
 marauder.20.f.response:0 "เฮ้! อะไร... กรีดร้องอะไร?"
 marauder.20.g:0 "เราอยากจะจ้างหัวหน้า"
 hire_mercenary_leader:0 "จ้างผู้เชี่ยวชาญ[marauder_species.GetName]ผู้นําสําหรับระยะเวลาของชีวิตผู้นําที่"
 hire_admiral_merc:0 "\nคุณจ้างพลเรือเอกผู้เชี่ยวชาญ [marauder_species.GetName] แบบถาวร"
 hire_general_merc:0 "\nคุณจ้างพลเอกผู้เชี่ยวชาญ [marauder_species.GetName] แบบถาวร"
 hire_commander_merc: "\nคุณจ้างผู้เชี่ยวชาญมาอย่างถาวร[marauder_species.GetName]ผู้บัญชาการ"

 marauder.30.e:0 "ไม่มีอะไร"
 marauder.30.f:0 "ลาก่อน"
 marauder.31.1.desc:0 "ฮ่า!คุณจะให้เราโจมตีหนึ่งในคู่แข่งของคุณเหรอ?\n\nเราไม่ชอบที่จะเข้าไปพัวพันกับข้อพิพาทเล็กๆน้อยๆของพวกคุณหรอกนะ แต่ถ้ามีแรงจูงใจที่เหมาะสม คิดว่าเราก็น่าจะจัดการได้นะ...\n\nบอกมา ใครคือคนที่คุณต้องการให้เราโจมตี?"
 marauder.31.2.desc:0 "คุณ... อยากให้เราต่อยคู่แข่งของคุณเหรอ ใช่มันสามารถทําได้ ...\n\nแล้วอันไหนล่ะที่จะชน"
 marauder.31.3.desc:0 "เพื่อ แลก กับ เครื่อง บรรณาการ บาง ที เรา อาจ ถูก โน้ม น้าว ใจ ให้ โจมตี กลุ่ม หนึ่ง ที่ ไม่ มี ความ เชื่อ.\n\nพวกนอกรีตนี่ใครกัน ที่เจ้าให้เรามาจัดการ"
 marauder.31.a:0 "§Y[raid_target_1.GetName]§!"
 marauder.31.b:0 "§Y[raid_target_2.GetName]§!"
 marauder.31.c:0 "§Y[raid_target_3.GetName]§!"
 marauder.31.d:0 "§Y[raid_target_4.GetName]§!"
 marauder.31.e:0 "ไม่มีอะไร"
 marauder.31.f:0 "ลาก่อน"
 marauder.32.1.desc:0 "เดอะ[preliminary_target.GetName]ดูเหมือนเป้าหมายสําหรับนักรบของเรา บางทีการมาเยี่ยมอาจจะเป็นการสั่งซื้อ ..."
 marauder.32.2.desc:0 "ใช่[preliminary_target.GetName]ทําได้ดีนี่ ดีมาก แต่มันเป็นความพยายามอย่างมาก"
 marauder.32.3.desc:0 "นางของเวียดไม่ได้มอง ความเมตตากับคนต่างชาติของ[preliminary_target.GetName]การเดินทัพอาจให้บริการเธอ"
 marauder.32.a:0 "เราจะจ่าย สอนบทเรียนให้พวกเขาจดจำ"
 marauder.32.1.a.response:0 "งั้นก็ตกลง เราขี่ตอนรุ่งสาง"
 marauder.32.2.a.response:0 "เฮ้! พวกหมาบ้านี่จะมากินบาสเก็ตช์"
 marauder.32.3.a.response:0 "พวกเขาจะลิ้มรสความโกรธของเธอ"
 hire_raid:0 "\n[current_marauder_diplomacy.GetName] รวมกองยานเพื่อโจมตี [preliminary_target.GetName]"
 marauder.34.1.desc:0 "[marauder_country_1.GetSpeciesName]ทหารรับจ้างที่ดีที่สุดในกาแล็กซี่ อย่า ปล่อย ให้ นิสัย ขี้ อาย ล่อ ลวง คุณ เมื่อ การ ต่อ สู้ เข้า มา เกี่ยว ข้อง ด้วย การ ตี สอน ของ พวก เขา ไม่ เป็น รอง ผู้ ใด. เกียรติยศของพวกเขา จะบังคับให้พวกเขาต่อสู้คนอื่น[marauder_country_1.GetSpeciesNamePlural]ท่านควรจะหวังเช่นนั้น\n\nนี่คือกองเรือที่ปัจจุบันพร้อมจ้าง"
 marauder.34.2.desc:0 "ถึง[marauder_country_2.GetSpeciesName]ทารกสามารถเอาชนะนักรบที่เก่งสุด เฮ้! มันเป็นที่รู้จัก\n\nแต่พวกนี้ไม่ใช่เด็กทารก! พวกที่แข็งทื่อ[marauder_country_2.GetSpeciesName]ทหารรับจ้าง และไม่เพียงอันตราย แต่พวกเขาถูกลดทอน! พวกเขายินดีที่จะต่อสู้สําหรับดาวามัคส์เช่นคุณ, กับงาช้างอื่น ๆ หรือแม้กระทั่ง[marauder_country_2.GetSpeciesNamePlural]... ถ้าคุณจ่าย!\n\nรายการบ้าปัจจุบันที่นี่[marauder_country_2.GetSpeciesName]กองเรือ:"
 marauder.34.3.desc:0 "มีลัทธิมากมายในหมู่นักรบของเรา ที่รู้สึกว่าการฆ่าพวกนอกศาสนา แม้จะเป็นพวกนอกศาสนา พวกเขาจะไม่ลดตัวจากการฆ่าคนอื่น[marauder_country_3.GetSpeciesNamePlural]ตั้งแต่พวกหัวรุนแรง มองทุกคนเป็น พวกนอกศาสนา\n\nไม่ต้องห่วง พวก เขา ไม่ โง่ เขลา พอ ที่ จะ โจมตี นาย จ้าง ของ ตน. ใน ที่ สุด ผม ก็ พ้น จาก ความ โกรธ ของ พวก เขา เช่น กัน เนื่อง จาก ผม นํา งาน มา ให้ พวก เขา เพื่อ แลก กับ การ ตัด กําไร ของ พวก เขา.\n\nนี่คือกองเรือที่พร้อมจะจ้าง:"
 marauder.34.1.a:0 "กอง เรือ รบ อาร์ม า ดา แห่ง เวียด บอร์น"
 marauder.34.2.a:0 "234 ที่เครื่องมือเลือกสี"
 marauder.34.3.a:0 "แชมป์ของเธอ"
 voidborn_hire:0 "\nคุณจ้างกองยานรบเป็นระยะเวลา 5 ปี ประกอบด้วย:\n\n§Yยานลาดตระเวณ 6\nยานฟริเกต 8\nยานไรเดอร์ 16§!"
 marauder.34.1.b:0 "สตาร์ไรเดอร์ ฟลอติลา"
 marauder.34.2.b:0 "ฟลอเรนซ์"
 marauder.34.3.b:0 "ระเบียบ ของ คืน อัน ถาวร"
 star_riders_hire:0 "\nคุณจ้างกองยานรบเป็นระยะเวลา 5 ปี ประกอบด้วย:\n\n§Yยานลาดตระเวณ 4\nยานฟริเกต 6\nยานไรเดอร์ 12§!"
 marauder.34.1.c:0 "ปีกพายุแรก"
 marauder.34.2.c:0 "หน่วยรบอาสาสมัคร"
 marauder.34.3.c:0 "ประชาคมทไวไลท์"
 storm_wing_hire:0 "\nคุณจ้างกองยานรบเป็นระยะเวลา 5 ปี ประกอบด้วย:\n\n§Yยานลาดตระเวณ 2\nยานฟริเกต 4\nยานไรเดอร์ 8§!"
 marauder.34.d:0 "ไม่เป็นไร คุยเรื่องอื่นดีกว่า"
 marauder.34.e:0 "ลาก่อน"
 marauder.37.1.a.desc:0 "ยินดีด้วย[Root.GetSpeciesNamePlural]กับกองเรือที่ท่านเพิ่งจ้างมา[random_fallen_empire.GetName]!\n\nอาจจะไม่ แต่ อย่า ผิด พลาด เลย มัน เป็น พลัง ที่ ทรง พลัง!"
 marauder.37.1.b.desc:0 "ฟลอติล่าเป็นของคุณ[Root.GetSpeciesNamePlural]จํา: โสด[marauder_country_1.GetSpeciesName]คุ้มค่าอย่างน้อยสิบนักรบของสายพันธุ์อื่น ๆ คุณ อาจ ปรับ การ คํานวณ แรง ของ คุณ ตาม นั้น."
 marauder.37.2.a.desc:0 "คุณตัดสินใจได้ดีนี่ โดยการจ้างผู้ไม่เสถียรเหล่านี้[marauder_country_2.GetSpeciesNamePlural]คุณทําให้บางส่วนดาวามัคอื่น ๆ ไม่ได้จ้างพวกเขาและส่งพวกเขาหลังจากที่คุณ! เฮ้!"
 marauder.37.3.a.desc:0 "นักรบศักดิ์สิทธิ์เหล่านี้ จะรับใช้ท่านอย่างดี[Root.GetSpeciesNamePlural]แค่อย่าบุกรุกยานของพวกเขา พวก เขา ได้ รับ การ ถือ ว่า ศักดิ์สิทธิ์ และ นาง แห่ง เวียด จะ ไม่ ทรง กรุณา ต่อ ผู้ ที่ ไม่ มี ความ เชื่อ ซึ่ง เหยียบ ดาดฟ้า เรือ อัน ศักดิ์สิทธิ์ ของ ตน."
 marauder.37.a:0 "มีอย่างอื่นอีก..."
 marauder.37.b:0 "ลาก่อน"
 marauder_1_tribute:0 "[marauder_country.GetSpeciesName]บรรณาการ"
 marauder_1_tribute_desc:0 "เราได้ถวายเครื่องบรรณาการ[marauder_country.GetName]พวกเขาตกลงจะไม่โจมตีเรา"
 marauder_2_tribute:0 "$marauder_1_tribute$"
 marauder_2_tribute_desc:0 "$marauder_1_tribute_desc$"
 marauder_3_tribute:0 "$marauder_1_tribute$"
 marauder_3_tribute_desc:0 "$marauder_1_tribute_desc$"

 marauder.35.1.desc:1 "ฮ่าฮ่า! คุณมันบ้าจริงๆ คนนอก คุณต้องการให้เราไปขึ้นกับคนเก่าหรือไม่\n\nฉันว่าไม่นะ"
 marauder.35.2.desc:0 "เฮ้!!!!!!\n\nไม่ดวามัคเราโกรธ แต่ไม่โกรธพอที่จะลองตีลง"
 marauder.35.3.desc:0 "แม้ ว่า พวก เขา ไม่ มี ความ เชื่อ แต่ นาง แห่ง เวียด ก็ ไม่ อยาก ให้ เรา ทิ้ง เรือ ของ เรา โดย ไม่ พยายาม จะ โจมตี ชน ชั้น ผู้ ปกครอง.\n\nเวลาของพวกเขาจะมา ... ในพันล้านปีหรือสอง"

 marauder.40.1.desc:1 "ใช่ เรื่องนี้จัดการได้ นักรบที่ยิ่งใหญ่ที่สุดของเราจํานวนมาก กําลังมองหาความท้าทายใหม่และโอกาส\n\nหากเจ้าสามารถจ่ายราคาที่จะปล่อยพวกเขา จากการสาบานต่อญาติของพวกเขา พวกเขาจะยินดีสาบานที่จะติดตามเจ้า"
 marauder.40.2.desc:0 "เฮ้! ใช่ ใช่! ฉลาดมาก[marauder_species.GetName]นักรบดีใจที่ได้สู้เพื่อเจ้า แค่ต้องการสิ่งจูงใจที่ถูกต้องเท่านั้น"
 marauder.40.3.desc:0 "ใช่ นักรบที่ยิ่งใหญ่ที่สุดของเรา ยินดีที่จะนําทหารของคุณเข้าสู่สมรภูมิ ด้วยการสนับสนุนของหน่วยกิตพลังงานของคุณ เราจะสามารถให้บริการเธอ ด้วยความกระตือรือร้นมากขึ้น\n\nคุณจะพบว่าทั้งชีวิตของการให้บริการ ของเธอของเวียด ทําให้เจ้าหน้าที่ของเราทั้งกล้าหาญและมีประสิทธิภาพ"
 marauder.40.1.a:0 "จ้างพลเรือเอก"
 marauder.40.2.a:0 "จ้างพลเอก"
 marauder.40.3.a: "เรียกผู้บังคับการ"
 marauder.40.a.response:0 "ดีมาก คําสาบานได้รับการสาบาน และนักรบเป็นของคุณที่จะทํา"
 marauder.40.b.response:0 "โอ้! นี่[marauder_species.GetName]เจ้าเล่ห์มาก! คุณโชคดี[Root.GetSpeciesNamePlural]!"
 marauder.40.c.response:0 "นางแห่งเวียด ได้มอบสัญญานี้ ขอให้แชมป์ของเรารับใช้คุณอย่างดี"

 marauder.46.name:0 "ที่ อยู่ ของ มาโร เด อร์"
 marauder.46.desc:0 "ขณะ ที่ ชุมชน กาแล็กซี่ ขยาย ตัว ขึ้น เรื่อย ๆ และ พรม แดน เริ่ม ปะทะ กัน บ่อย ครั้ง ความ ขัด แย้ง โดย ใช้ อาวุธ เป็น สิ่ง ที่ เลี่ยง ไม่ ได้.\n\nเมื่อ ตระหนัก ถึง เรื่อง นี้ กอง เรือ ต่าง ๆ จาก เผ่า มา รา เด อร์ หลาย กลุ่ม ก็ พร้อม ที่ จะ เดิน ทาง ไกล กว่า ระบบ บ้าน ของ ตน เพื่อ เสาะ หา ชื่อ เสียง และ เกียรติยศ. ตอน นี้ พวก เขา เสนอ ตัว เป็น ทหารรับจ้าง แก่ ผู้ เสนอ ตัว สูง สุด."
 marauder.46.a:0 "ทหารรับจ้างที่ดี หาได้ยาก"

 leader_trait_mercenary_warrior:0 "นักรบรับจ้าง"
 leader_trait_mercenary_warrior_desc:0 "ผู้นํารายนี้มาจากวัฒนธรรมของนักรบจากอวกาศ และได้รับการสอนวิธีการตีและหนีแบบนอกกรอบตั้งแต่เด็ก"
 leader_trait_great_khan:0 "ข่านผู้ยิ่งใหญ่"
 leader_trait_great_khan_desc:0 "ข่าน ใหญ่เป็นผู้นําที่มีเสน่ห์ เป็นจอมยุทธ์ที่ฉลาดมาก และถ้าข่าวลือนี้เป็นจริง"
 leader_trait_ruler_great_khan:0 "$leader_trait_great_khan$"
 leader_trait_ruler_great_khan_desc:0 "$leader_trait_great_khan_desc$"
 marauder.50.name:0 "สัญญารับจ้างสิ้นสุดลง"
 marauder.50.desc:0 "สัญญาของเรากับทหารรับจ้างใน§H[Root.GetName]§!ได้มาถึงจุดสิ้นสุด ผู้นําของพวกเขา ผู้บัญชาการ[Root.Leader.GetName]ได้เสนอที่จะขยายทันทีให้บริการของเรือภายใต้[Root.Leader.GetHerHis]คําสั่งกับเราอีกห้าปี ในค่าใช้จ่ายเพิ่มเติม\n\nถ้าเราปฏิเสธ ทหารรับจ้างก็จะออกไป หางานที่อื่น"
 marauder.50.a:0 "ต่อสัญญา"
 marauder.50.b:0 "ให้พวกเขาไป"
 marauder.71.name:0 "ผู้บังคับการทําการแทนที่"
 marauder.71.desc:0 "หลังจากตายก่อนเวลาอันควรของอดีตผู้บัญชาการของ§H[Root.GetName]§!.[marauder_species.GetNamePlural]ได้ส่งผู้บัญชาการ§H[new_leader.GetName]§!เพื่อทดแทน"
 marauder.76.name:0 "[marauder_species.GetName]ภาษาวานิชชื่อ"
 marauder.76.desc:0 "การสูญเสียระบบบ้านของพวกเขา ดูเหมือนจะสั่นมาก§H[marauder_species.GetName]§!ทหารรับจ้างใน[Root.GetName]ทั้ง ๆ ที่ มี สัญญา ห้า ปี เรา ก็ ยัง ลง นาม กับ พวก เขา แล้ว เรือ ทั้ง หมด ของ พวก เขา ก็ หาย สาบสูญ ไป ใน อวกาศ!\n\nการส่งครั้งสุดท้ายของพวกเขา เห็นได้ชัดรหัสวลี เพื่อส่งสัญญาณการจากไปของพวกเขา\n\n§R§!\"การแก้แค้นจะเป็นของเรา\"§!"
 marauder.76.a:0 "เราทําสัญญากันแล้ว"
 marauder.77.name:0 "ทหารรับจ้างเข้าร่วมกับข่าน"
 marauder.77.desc:0 "การเพิ่มขึ้นของ[raider_khanate.GetName]ภายใต้ข่านใหญ่ของพวกเขามีการกระตุ้น ข้อบกพร่องมวลในหมู่ทั้งหมด[raider_khanate.GetSpeciesName]ทหารรับจ้างที่อยู่ในจ้างของเรา! ถูกปลุกขึ้นมาอย่างกะทันหัน ด้วยความรักชาติ พวกกบฏได้ละทิ้งสัญญาทั้งหมด และจากไปเพื่อเข้าร่วม"
 marauder.86.a.desc:0 "โปรดทราบ [Root.GetSpeciesNamePlural]\n\nหากคุณต้องการคนอื่นมาสู้รบแทนคุณ โปรดทราบว่ากองทหารรับจ้าง [marauder_mercenary_country.GetSpeciesName] พร้อมให้บริการแล้ว ใช่! คุณได้ยินถูกต้องแล้ว หากคุณจ่ายให้เราในตอนนี้ ทหารรับจ้างที่เก่งที่สุดในกาแล็กซี ก็พร้อมที่จะต่อสู้เพื่อคุณ"
 marauder.86.a:0 "ขอบคุณที่บอก"
 marauder.87.a.desc:0 "เฮ้!เร่เข้ามาทางนี้, ท่านผู้มีอุปการะคุณทุกท่าน!\n\nเรื่องก็มีอยู่ว่า... นักรบของเราเบื่อหน่ายในชีวิตและสร้างแต่ปัญหามากมาย! ชอบต่อสู้กันไปมา ตายไปก็มาก! แต่ตอนนี้เราค้นพบทางออกแล้ว... โดยที่เราจะส่งนักรบที่บ้าพลังที่สุดของเราไปต่อสู้ให้กับท่านลูกค้าเพื่อแลกกับเครดิตพลังงานเป็นการตอบแทน! หากคุณต้องการทหารรับจ้างที่ดีที่สุดในกาแล็กซีล่ะก็ รีบด่วน!"
 marauder.88.a.desc:0 "นางแห่งเวียด มีข้อความถึงเจ้า\n\nถ้าท่านปรารถนาเช่นนั้น ท่านอาจจ้างกองเรือบางส่วนของเราเป็นทหารรับจ้าง ลูกเรือของเรามีวินัย และจะเชื่อฟังคําสั่งของคุณ ตราบใดที่คุณสามารถตอบสนองราคาของเรา\n\nนี่เป็นของขวัญที่เหลือเชื่อ ที่เธอมอบให้คุณ อย่า ผลาญ เงิน."
 marauder.101.1.desc:0 "[Root.GetSpeciesName] ผู้อ่อนแอ นักรบของเรากำลังจะปล้นระบบดาวของคุณ เผชิญหน้ากับพวกเขาในการต่อสู้หากคุณมีความกล้ามากพอหรือเป็นเต่าหดหัวจนกว่าพวกเขาจะปล้นความร่ำรวยจากคุณไปจนหมด\n\nแน่นอน คุณสามารถส่งบรรณาการตอนนี้เพื่อที่คุณจะได้ไม่ต้องเจ็บตัว หากเป็นที่น่าพอใจ นักรบของเราอาจถูกสั่งให้หันหลังกลับทันที..."
 marauder.101.2.desc:0 "เฮ้![Root.GetSpeciesName]- ดวามัค!เรามาดูระบบของคุณ! เราช่วยคุณไม่ให้อ้วนขึ้น\n\nนอกจากนายจะคิดเหตุผล ว่าทําไมแกถึงทํา..."
 marauder.101.3.desc:0 "[Root.GetSpeciesNamePlural]นางแห่งเวียด ได้สื่อสารกับเราว่า นางต้องการใช้ระบบของเจ้า เป็นสถานที่สําหรับประกอบพิธีการ เพื่อเฉลิมฉลองการครองราชย์เหนืออวกาศ ใน ฐานะ ผู้ รับ ใช้ ที่ ถ่อม ใจ ของ เธอ เรา ไม่ มี ทาง เลือก นอก จาก จะ ทํา ตาม.\n\nเรือรบของนักรบที่ดีที่สุดของเรา ลากมาจากทุกพรรครบของเรา ปัจจุบันอยู่ในเส้นทางที่จะ เพื่อกําจัดสิ่งที่เลี่ยงไม่ได้ และทําให้เธอหิว เจ้าควรถวายเครื่องบรรณาการเดี๋ยวนี้ ถ้า เพียง พอ กอง เรือ ก็ จะ ได้ รับ การ ระลึก ถึง."
 marauder.101.a:0 "เสนอส่วยบรรณาการ/ค่าคุ้มครอง §Y(พลังงาน)§!"
 marauder.101.b:0 "เสนอส่วยบรรณาการ/ค่าคุ้มครอง §Y(แร่)§!"
 marauder.101.c:0 "เสนอส่วยบรรณาการ/ค่าคุ้มครอง §Y(อาหาร)§!"
 marauder.101.1.a.response:0 "น่าเสียดาย[CHFFFFFFFF]ผมคิดว่านักรบของเรา จะต้องมองหาที่อื่นเพื่อความบันเทิงแล้ว\n\nคนของคุณปลอดภัย สําหรับตอนนี้อย่างน้อย"
 marauder.101.d:0 "คุณจะไม่ได้อะไรจากเรา"
 marauder.101.1.b.response:0 "คนโง่! แล้วเราจะใช้บังคับสิ่งที่คุณควรจะได้ถวายเป็นบรรณาการ ... และเพิ่มเติม! คุณทําผิดพลาดร้ายแรงในวันนี้"
 marauder.101.2.a.response:0 "คุณสมาร์ทดวามัค!ตอนนี้เราต้องมองหากราฟแสดงความถี่อื่น! ลําบากมากสําหรับเรา แต่ไม่เดือดร้อนสําหรับคุณ!"
 marauder.101.2.b.response:0 "เราหวังว่าคุณจะพูดอย่างนั้นดาวามาค![raiding_marauder.GetSpeciesNamePlural]ชอบความท้าทายที่ดีเสมอ!\n\nเฮ้!"
 marauder.101.3.a.response:0 "คุณอย่าโกรธเธอสิ การแก้แค้นของเธอจะเลวร้าย"
 marauder.101.3.b.response:0 "เธอ จาก พวก ไวต์ ทํานาย การ ตอบ รับ นี้ แต่ ต้อง ทํา การ เสนอ. ตอนนี้เราสามารถรวบรวมทาสและความมั่งคั่ง ผ่านการต่อสู้ตามพิธี ทั้งหมดในชื่อเธอ แน่นอน"
 marauder.102.1.desc:0 "แล้วในที่สุดเจ้าก็ได้มาขอความเมตตา[Root.GetSpeciesNamePlural]ท่านยังคงถวายเครื่องบรรณาการ เพื่อรักษาการถอนกําลังจากพื้นที่ของท่าน"
 marauder.102.2.desc:0 "ว่าไง, ดวามัค? นายไม่อยากให้พวกเราไปเยี่ยมเหรอ คุณต้องการให้เราไป? เฮ้!\n\nคุณจ่ายได้ แต่ตอนนี้แพงขึ้น"
 marauder.102.3.desc:0 "เธอโกรธ[Root.GetSpeciesNamePlural]... โกรธมาก ทุก[Root.GetSpeciesName]ที่ได้เสียสละเพื่อเกียรติของเธอ ก็ลดความโกรธลงบ้าง แต่มันเพียงพอแล้วเหรอ\n\nถ้าคุณอยู่ที่นี่เพื่อถวายเครื่องบรรณาการแก่นางแห่งเวียด เพื่อเป็นหนทางในการรักษาการถอนกําลังของเราจากพื้นที่ของคุณ"
 marauder.102.d:0 "บอยคุณแน่ใจว่าน่าเกลียด"
 marauder.102.e:0 "ยุติการติดต่อสื่อสาร"
 marauder.102.1.a.response:0 "คิดถึงความเศร้าทั้งหมด ที่เจ้าจะทําไว้ หากเจ้าเสนอเครื่องบรรณาการให้เรา ให้สิ่งนี้เป็นบทเรียนสําหรับคุณ[Root.GetSpeciesNamePlural]."
 marauder.102.2.a.response:0 "เฮ้! จากนั้นก็ตกลง เรามีสิ่งที่เราต้องการ ไม่จําเป็นต้องมีอุปราคาสําหรับตอนนี้"
 marauder.102.3.a.response:0 "เธอเป็นพวกเวียด การ บูชายัญ นี้ ทํา ให้ วิญญาณ ของ นาง อ่อน ลง และ นาง ยอม ให้ นัก รบ ของ นาง ถอน ทัพ. เจ้าสบายดี[Root.GetSpeciesName]."
 marauder.102.1.b.response:0 "ผม... คุณ...\n\nคุณจะเสียใจเล็กน้อยนี้[Root.GetSpeciesName]นักรบของเราจะเผา กองเรือที่น่าเวทนาของเจ้าเป็นเถ้าถ่าน!"
 marauder.111.1.desc:0 "ตอนนี้คุณสามารถออกมาจากที่พักได้[Root.GetSpeciesNamePlural]แท้จริง เราได้ให้ความพอเพียงแก่เจ้าแล้ว และเรือของเราเป็นผู้คุ้มกันรักษา\n\nเฮลส์แมน! กําหนดเส้นทางสําหรับ[marauder_system.GetName]ขอให้เราออกจากภูมิภาคที่ ย่อยยับนี้ของพื้นที่ มันทําให้ฉันหดหู่"
 marauder.111.2.desc:0 "ภาษาทามากิเราได้ตีพอ ไม่ต้องซ้อมแล้ว ยานของเราเต็มแล้ว\n\nเรากลับไป[marauder_system.GetName]ตอนนี้ใช่."
 marauder.111.3.desc:0 "พิธีได้สิ้นสุดแล้ว นางแห่งเวียด พึงพอใจกับการทําลาย ที่พวกเราได้นํามาสู่พื้นที่ของท่าน[Root.GetSpeciesNamePlural]เราได้รับอนุญาตให้กลับไป[marauder_system.GetName]."
 marauder.111.a:0 "ไปให้พ้น!"
 marauder.112.1.desc:0 "น่าตื่นเต้นเนอะ ความ ตื่น เต้น ของ สงคราม! นักรบที่เก่งสุดของเรา ต่อต้านสิ่งที่ดีที่สุดที่เจ้าเสนอมา เราจะได้เห็นกันว่าใครจะออกมา"
 marauder.112.2.desc:0 "ดวามัค ต้องการอะไร เรากําลังยุ่งกับการทุบระบบของคุณ!"
 marauder.112.3.desc:0 "เราให้บริการเฉพาะเธอเท่านั้นและตอนนี้ผู้ที่มีกระเป๋าลึกพอที่จะจ้างเราเพื่อตีคุณ ตราบ ใด ที่ ผล สุด นั้น ยัง คง เป็น ผู้ เชื่อ ถือ ที่ ตาย ไป มาก กว่า นาง ของ พวก ไวต์ ก็ เห็น ชอบ."

 marauder.104.name:0 "นักกีฬาตี[Root.GetName]"
 marauder.104.desc:0 "[marauder_country.GetSpeciesName]การบุกโจมตีทําให้ดาวเคราะห์ตกทับ§H[Root.GetName]§!ไปในกระสวยอวกาศเล็ก ๆ ของพวกเขาจากกองเรือที่โคจรรอบ ๆ[marauder_country.GetSpeciesNamePlural]ตีหลายข้อตกลงนอก[Root.GetPlanetMoon]ก่อนที่จะถอยกลับสู่อวกาศ กับการปล้นของพวกเขา กองกําลังป้องกันของเราบนพื้นผิว มีเวลาที่จะตอบสนองไม่ได้"
 marauder.104.a:0 "สวะไรเดอร์"
 marauder.105.desc:0 "[marauder_country.GetSpeciesName]พวกค้าทาสมาถึงแล้ว§H[Root.GetName]§!โจมตีกระสวยยานโจมตีหลายถิ่น[Root.GetPlanetMoon]ต้อนพวกอาณานิคม และส่งพวกมันกลับมา ด้วยโซ่ตรวน ให้ยานจู่โจมที่ล้อมอยู่"
 marauder.105.a:0 "พวกเขาต้องชดใช้"
 marauder.106.desc:0 "แสง[marauder_country.GetSpeciesName]กองกําลังได้โจมตีแล้วหนี§H[Root.GetName]§!การลงจอดของพวกเขาทําให้หน่วยตอบโต้เชิงยุทธวิธีสับสน นํากองกําลังพื้นผิวของเราและก่อนที่จะตอบสนอง"
 marauder.106.a:0 "ผลไม่พึงประสงค์"
 marauder.107.desc:0 "[marauder_country.GetSpeciesName]พวกค้าทาสมาถึงแล้ว§H[Root.GetName]§!การ ทิ้ง ระเบิด จาก กระสวย ยาน โจมตี ได้ เปิด สถาน ศักดิ์สิทธิ์ ทาง อินทรีย์ หลาย แห่ง ของ เรา ซึ่ง แล้ว ก็ ถูก โจมตี โดย พรรค การ จู่ โจม อย่าง หนัก.\n\nอินทรีย์ที่น่าสับสนที่มีจนกระทั่งตอนนี้ถูกเก็บไว้อย่างปลอดภัยภายในสถานที่ศักดิ์สิทธิ์เหล่านี้ ถูกล้อมรอบในทันทีโดยทาสและกลับมาในโซ่"
 marauder.107.a:0 "ชีวดาราศาสตร์ของเรา!"
 marauder.108.desc:0 "[marauder_country.GetSpeciesName]การบุกโจมตีทําให้ดาวเคราะห์ตกทับ§H[Root.GetName]§!ผู้บุกปล้นปล้นหลายด่านของเรา[Root.GetPlanetMoon]และสังหารหุ่นยนต์หลายร้อยตัว ก่อนจะถอยทัพกลับไปสู้กองยาน"
 marauder.108.wilderness.desc: "[marauder_country.GetSpeciesAdj]การบุกเข้าโจมตีได้ละเมิด§H[Root.GetName]§!พวกสารเลวปล้นสถานที่ของเรา[Root.GetPlanetMoon]และสังหารทหารม้าหลายร้อยคน ก่อนจะถอยทัพกลับสู่กองเรือที่โคจรอยู่"
 marauder.108.a:0 "เราต้องลงโทษการละเมิดนี้"

 marauder.112.a:0 "ใครจ่ายเงินให้คุณโจมตีเรา?"
 marauder.112.1.a.response:0 "คนขี้ขลาดที่น่าสงสารที่ไม่เต็มใจที่จะเผชิญหน้ากับคุณเอกลักษณ์ ของ พวก เขา ไม่ มี ความ หมาย และ บทบาท สูง สุด ของ พวก เขา ใน เอกภพ ยิ่ง กว่า นั้น อีก.\n\nและพวกเขาจ่ายดีสําหรับเรา ที่จะเก็บตัวตนของพวกเขาไว้กับตัวเอง"
 marauder.112.2.a.response:0 "ฮ้า! แต่ความลับนั้นคือ... หวามัค!พวกเขาเป็นอุปราคาเหมือนๆกับคุณ แต่เป็นอุปราคาคนอื่น นั่นคือทั้งหมดที่เราสามารถพูดได้"
 marauder.112.3.a.response:0 "อินฟิเดล พวกนอกศาสนา พวกนอกรีต\n\nเราจะไม่มีอะไรเกี่ยวข้องกับพวกเขาทันที แต่หน่วยกิตพลังงานของพวกเขา จะช่วยเพิ่มพินัยกรรมของเธอ"
 marauder.112.b:0 "สิ้นสุดการส่ง"
 marauder.114.name:0 "หมุน & 90ถูกทอดทิ้ง"
 marauder.114.desc:0 "ความเสียหายอย่างหนักที่ก่อให้เกิด[marauder_country.GetSpeciesName]การโจมตีของกองทัพเรือ มากพอที่จะหยุดนักรบของพวกเขา หลังจากพิจารณาทางเลือกของพวกเขา[marauder_country.GetSpeciesNamePlural]เห็นได้ชัดว่าได้ตัดสินใจที่จะละทิ้งการโจมตีของพวกเขา และถอนตัวกลับไปในพื้นที่ของตัวเอง"
 marauder.114.a:0 "พวกเขากัดออกมากกว่าที่พวกเขาสามารถเคี้ยว"
 marauder.116.name:0 "กองยานจู่โจมถูกทำลาย"
 marauder.116.desc:0 "เดอะ[From.GetSpeciesName]กองยานที่สาบานจะบุกทําลายพื้นที่ของเรา ถูกทําลายจากการโจมตีของกองเรือใน[destroyed_fleet_system.GetName]ระบบ ไม่มีรายงานผู้รอดชีวิตจากซากปรักหักพัง"
 marauder.116.a:0 "ให้สิ่งนี้เป็นบทเรียนให้กับเผ่าพันธุ์ของพวกเขา"
 marauder.117.desc:0 "เดอะ§H[marauder_country.GetSpeciesName]§!ผู้บุกรุกที่เรา\"ปลดปล่อย\" เพื่อโจมตี§H[marauder_target.GetName]§!หันหลังและกําลังวิ่งกลับไปที่ของตัวเอง! ดู เหมือน ว่า ความ สูญ เสีย ที่ ได้ จาก การ จู่ โจม ของ กอง เรือ ของ พวก เขา มี มาก พอ ที่ จะ ทํา ให้ พวก เขา เปลี่ยน ใจ."
 marauder.117.a:0 "ขี้ขลาด!"


 marauder.120.name:0 "เข้ามาแล้ว[raiding_marauder.GetSpeciesName]หมุน & 90"
 marauder.120.desc:0 "A§H[raiding_marauder.GetSpeciesName]§!ยานจู่โจมถูกตรวจจับได้ กําลังเข้าใกล้ชายแดนของเรา การติดต่อสื่อสารที่ดักจับได้ แสดงให้เห็นว่าพวกเขาได้รับการว่าจ้าง โดยอํานาจต่างประเทศคู่แข่ง เพื่อโจมตีระบบของเรา พวกเขากําลังส่งข้อความ มาถึงเรา ทางช่องเปิด"
 marauder.121.1.desc:0 "คนขี้ขลาดที่รวมตัวกันในเงามืดขอให้เราเผชิญหน้าคุณ เพราะพวกเขากลัวเกินกว่าจะทำเช่นนั้นด้วยตัวของพวกเขาเอง จะมีนักรบชาว [Root.GetSpeciesName] คนใดบ้าง? ที่มีเกียรติพอที่จะพบเราในสนามรบแบบเปิดเผย หรือเราต้องปล้นระบบดาวของคุณโดยไม่มีใครต่อต้าน? แสดงให้เราเห็นความสามารถของคุณ!"
 marauder.121.2.desc:0 "เฮ้! เจ้ามีศัตรูมากมาย ดวามัค พวกเขาไม่ชอบคุณมาก! แม้แต่จ่ายเราเพื่อทําลายระบบของคุณ เรามีความสุขที่จะบังคับ!"
 marauder.121.3.desc:0 "“และหากว่ามีคนใดในกลุ่มชนที่ปฏิเสธศรัทธาในหมู่พวกเขาต้องการ แน่นอนพวกเราจะต้องต่อสู้ทั้ง ๆ ที่พวกเขาเป็นผู้ปฏิเสธศรัทธาอยู่” ในไม่ช้าข้ารับใช้ของนางแห่งเวียด จะจัดการกับพวกนอกรีตทั้งหมด แต่สําหรับตอนนี้ เราจะมุ่งเน้นไปที่ท่าน"
 marauder.121.a:0 "การโจมตีใกล้เข้ามาแล้ว!"
 marauder.122.name:0 "[raid_parent.GetSpeciesName]ดึงข้อมูล"
 marauder.122.desc:0 "กองเรือจู่โจมที่§H[raid_parent.GetSpeciesNamePlural]§!ส่งเข้าไปใน§H[raid_victim.GetName]§!หลังจากเรา\"ช่วยเหลือพวกเขา\" ได้กําหนดเส้นทางกลับสู่ระบบของพวกเขา ด้วยสินค้าของกองทัพเรือ เต็มไปด้วยเชลยและทาสที่ถูกจับ นายเรือได้ประกาศว่าการบุกสําเร็จ"
 marauder.122.a:0 "งานที่ดี."
 marauder.123.desc:0 "มี การ ตรวจ พบ ว่า กอง เรือ ที่ เคย เป็น ของ สิ่ง มี ชีวิต ชนิด หนึ่ง ที่ เคย ไม่ รู้ จัก มา ก่อน กําลัง เข้า มา ใกล้ พรม แดน ของ เรา! พวกป่าเถื่อนที่เรียกตัวเองว่า§H[raiding_marauder.GetSpeciesNamePlural]§!รู้สึกว่าได้รับค่าจ้างจากอํานาจต่างชาติ ที่โจมตีระบบของเรา พวกเขากําลังส่งข้อความ มาถึงเรา ทางช่องเปิด"
 marauder.124.name:0 "[raiding_marauder.GetSpeciesName]หมุน & 90กองยานถูกทําลาย"
 marauder.124.desc:0 "กองยานจู่โจมที่เรา\"ปลดปล่อย\"[raiding_marauder.GetSpeciesNamePlural]การรวมกันถูกทําลาย[destroyed_fleet_system.GetName]ระบบโดยแรงของ[fleet_destroyer.GetName]ไม่มีรายงานเรื่องผู้รอดชีวิต"
 marauder.124.a:0 "หวังว่าอย่างน้อยพวกเขาก็สร้างความเสียหายได้"
 marauder.501.name:0 "ลั่นกลองรบ"
 marauder.501.desc:0 "นับเป็นครั้งแรกในประวัติศาสตร์ที่บันทึกไว้ว่าฝ่ายต่างๆของ §H[raider_khanate.GetSpeciesNamePlural]§! ที่ทำสงครามกัน ได้รวมตัวกันภายใต้ §Hข่านผู้ยิ่งใหญ่§! ขุนศึกลึกลับผู้นี้ ซึ่งตามตำนานเล่าว่าเป็นผู้มีพลังจิตที่ทรงพลัง ได้ออกมาจากวรรณะนักรบ และทำสิ่งที่คนส่วนใหญ่คิดว่าเป็นไปไม่ได้สำเร็จ ด้วยการมีเล่ห์เหลี่ยม ความสามารถพิเศษ และอัจฉริยะทางการทหาร ข่านผู้สวมมงกุฎคนใหม่นี้ จะได้รับความภักดีและความทุ่มเทอย่างที่สุดจากฝ่าย [raider_khanate.GetSpeciesName] ทั้งหมด\n\nตอนนี้พวกเขาเลิกฆ่ากันเองแล้ว [raider_khanate.GetSpeciesNamePlural] และหันความสนใจไปที่อื่นแทน กองยานรบขนาดใหญ่กำลังรวมตัวกันเพื่อทำสงคราม โดยมีนักรบผู้กระตือรือร้นซึ่งปัจจุบันกลายเป็นสหายร่วมรบที่แน่วแน่ แม้ว่าจะเคยเป็นศัตรูคู่อาฆาตเมื่อไม่กี่เดือนก่อนก็ตาม"
 marauder.501.a:0 "ภัยคุกคามครั้งใหม่เริ่มขึ้นแล้ว"
 marauder.502.desc:0 "ข้าคือ §H[raider_khanate.Ruler.GetName]§!, ข่านของ §H[raider_khanate.GetName]§!, และข้ามาที่นี่เพื่อประกาศให้กาแล็กซีรู้ว่ายุคใหม่กำลังมาถึงเราแล้ว ยุคมืดที่ [raider_khanate.GetSpeciesNamePlural] เข่นฆ่ากันอย่างไร้เหตุผล ได้สิ้นสุดลงแล้ว\n\nข้าสัญญากับผู้คนของข้าในการเริ่มต้นใหม่ผ่านการก่อตั้งอาณาจักรอันยิ่งใหญ่ที่จะจารึกชื่อเผ่าพันธุ์ [raider_khanate.GetSpeciesName] ไว้ในบันทึกประวัติศาสตร์กาแล็กซีตลอดไป\n\nสำหรับผู้ที่ยืนขวางทางเรา จงรู้ไว้: ข้าจะทำทุกอย่างเพื่อให้แน่ใจว่าคนของข้าบรรลุบรรลุเป้าหมาย หากคุณต่อต้านเรา [raider_khanate.GetName] จะบดขยี้คุณให้เป็นฝุ่น"
 marauder.502.a:0 "สุนทรพจน์ทรงพลัง"
 marauder.502.b:0 "กำลังคำนวณเวกเตอร์ภัยคุกคาม"
 marauder.504.name:0 "เดอะชราวด์[conquered_planet.GetName]!"
 marauder.504.desc:0 "หลังจากเอาชนะผู้ปกป้องที่กล้าหาญ§H[conquered_planet.GetName]§!กองกําลังภาคพื้นดินจาก[From.GetName]ได้อ้างว่า[conquered_planet.GetPlanetMoon]ในนามของข่านของพวกเขา พวกเขาได้ยกธงของจักรวรรดิใหม่ของพวกเขามากกว่าทุกข้อตกลงที่สําคัญบน[conquered_planet.GetPlanetMoon]พื้นผิว แม้แต่ตอนนี้[From.GetSpeciesName]ผู้ ตั้ง อาณานิคม กําลัง ถูก ส่ง เข้า มา จาก ถิ่น อาศัย ใน อวกาศ ที่ ผุ พัง."
 marauder.504.a:0 "เจ้าฟ้าใหญ่ต้องหยุด!"
 marauder.506.name:0 "ข่านผู้ยิ่งใหญ่พบกับความพ่ายแพ้"
 marauder.506.desc:0 "ทั้งๆที่[great_khan.GetHerHis]ความอัจฉริยะทางทหาร[great_khan.GetName](เพลงประกอบ)[From.GetName]พบกับความพ่ายแพ้ใน[khan_death_system.GetName]ระบบ เมื่ออาร์มาด้า[great_khan.GetSheHe] [great_khan.GetWasWere]คําสั่งหายไปในการต่อสู้กับกองกําลังของ[khan_destroyer.GetName]แกรนด์ ข่าน และ[great_khan.GetHerHis]เจ้า หน้าที่ ที่ ใกล้ ที่ สุด หนี เข้า ไป ใน ไฮเปอร์สเปซ ใน ยาน พาหนะ เล็ก ๆ.\n\nแม้แต่ตอนนี้[great_khan.GetName]ไม่ว่างในการรวบรวมอะดาดะใหม่ที่จะดําเนินการต่อ[great_khan.GetHerHis]ชัยชนะนี้ได้นําความล่าช้าอันจําเป็นอย่างมากมาสู่พวกที่ต่อต้านการรุกล้ําอย่างไม่หยุดยั้ง[From.GetName]."
 marauder.506.a:0 "ข่านผู้ยิ่งใหญ่ไม่เคยผิดพลาด"
 marauder.508.desc:2 "นี่คือข่านใหญ่[great_khan.GetName]ของ[From.GetName]ความพ่ายแพ้ของฉันที่อยู่ในมือของ[khan_destroyer.GetRealName]เป็นความล้มเหลวเล็กน้อย ไม่มีอะไรมากกว่านั้น เดอะ[khan_destroyer.GetSpeciesNamePlural]เป็นนักรบที่กล้าหาญและ คู่ปรับที่คู่ควร แต่พวกเขาเกินไปจะตกก่อนเรา\n\nกระแสของประวัติศาสตร์กําลังกวาดไปทั่วกาแล็กซี่ และไม่มีอะไรสามารถหยุดมันได้ อาร์มาด้าใหม่ของผมถูกประกอบขึ้น"
 marauder.508.desc.1:0 "$marauder.508.desc$หลังจากสงครามนี้สิ้นสุดลง กับดักของข้าจะได้รางวัล"
 marauder.508.desc.2:0 "$marauder.508.desc$สาบานกับฉันตอนนี้ ในขณะที่คุณยังมีเวลา"
 marauder.508.desc.3:0 "$marauder.508.desc$ทุกคนที่พยายามขวางทางข้า จะพ่ายแพ้"
 marauder.508.a:0 "การโจมตีครั้งที่สองกำลังใกล้เข้ามา..."
 marauder.510.name:0 "ความตายของข่านผู้ยิ่งใหญ่"
 marauder.510.desc:0 "แกรนด์ข่าน[great_khan.GetName]ตายแล้ว หลัง[great_khan.GetHerHis]อาร์มาด้าพบกับความพ่ายแพ้ครั้งที่สองใน[khan_death_system.GetName]ระบบคานใหญ่ไม่พยายามหลบหนี[great_khan.GetHerHis]เรือธงเมื่อถูกทําลายในการต่อสู้โดย[khan_destroyer.GetName].\n\nเมื่อผู้นําที่รักของพวกเขาหายไป การต่อสู้กับอํานาจที่ชั่วร้ายได้ปะทุขึ้นใน[From.GetName]ขุนศึกข่าน กําลังสู้กันเพื่อควบคุม[great_khan.GetHerHis]จักรวรรดิ มันยังคงเห็นอยู่ว่าใครจะขึ้นมาอยู่ข้างบน"
 marauder.510.a:0 "สิ้นสุดอำนาจของ [great_khan.GetName]"
 marauder.513.a.desc:0 "แกรนด์ข่าน[great_khan.GetName]ของ[raider_khanate.GetName]ตายแล้ว! รายละเอียดของจุดนี้หายาก แต่การดักฟังการสื่อสาร ระบุว่าข่านถูกวางยาโดยหนึ่งใน[great_khan.GetHerHis]ทะเยอทะยานในความพยายามรัฐประหาร\n\nเมื่อผู้นําที่รักของพวกเขาหายไป การต่อสู้กับอํานาจที่ชั่วร้ายได้ปะทุขึ้นใน[raider_khanate.GetName]ขุนศึกข่าน กําลังต่อสู้อยู่เหนือการควบคุม[great_khan.GetHerHis]จักรวรรดิ มันยังคงเห็นอยู่ว่าใครจะขึ้นมาอยู่ข้างบน"
 marauder.513.b.desc:0 "แกรนด์ข่าน[great_khan.GetName]ของ[raider_khanate.GetName]ตายแล้ว! ตาม การ ติด ต่อ ทาง โทรศัพท์ ที่ ถูก ดัก จับ ได้ นก ข่าน ใหญ่ ยอม แพ้ ไข้ ซา รา เค ลี อัน ซึ่ง เป็น โรค ที่ ค่อน ข้าง ธรรมดา และ มัก จะ ทํา ให้ ถึง ตาย ใน หมู่ ผู้ คน[raider_khanate.GetSpeciesNamePlural]- มรดกของสภาพชีวิตยากจน ในสถานีอวกาศที่ส่วนใหญ่ของพวกเขาอาศัยอยู่ก่อนที่จะเพิ่มขึ้นของ[raider_khanate.GetName]."
 marauder.513.c.desc:0 "แกรนด์ข่าน[great_khan.GetName]ของ[raider_khanate.GetName]ตายแล้ว! การติดต่อสื่อสารที่ดักจับได้ แสดงให้เห็นว่า เดอะ แกรนด์ ข่าน ถูกสังหารอย่างรุนแรง โดยทีมรบพิเศษ ในการใช้กําลังทหาร ที่ยังไม่ทราบชื่อ ไม่ มี รัฐบาล ใด เต็ม ใจ รับ ผิด ชอบ การ ดําเนิน งาน นี้."
 marauder.513.d.desc:0 "แกรนด์ข่าน[great_khan.GetName]ของ[raider_khanate.GetName]ตายแล้ว! รายละเอียดคลุมเครือ แต่สัญญาณที่ดักจับได้ เปิดเผยว่าข่านถูกสังหาร โดยภรรยาน้อยเอเลี่ยน[great_khan.GetHerHis]ห้องส่วนตัวบน[great_khan.GetHerHis]เรือธง แรงจูงใจไม่ทราบสาเหตุ"
 marauder.513.e.desc:0 "ข่านใหญ่[raider_khanate.GetName]ตายแล้ว จากการดักฟัง[great_khan.GetName]ตายตามธรรมชาติในช่วงสองสามวันที่ผ่านมาเป็นผลจาก[great_khan.GetHerHis]แก่แล้ว\n\nเชื่อกันว่าข่านผู้ยิ่งใหญ่ ได้แต่งตั้งผู้สืบทอดตําแหน่ง แต่แม้จะมีการต่อสู้อันโหดร้ายเกิดขึ้น[raider_khanate.GetName]ขุนศึกข่าน กําลังต่อสู้อยู่เหนือการควบคุม[great_khan.GetHerHis]จักรวรรดิ มันยังคงเห็นอยู่ว่าใครจะขึ้นมาอยู่ข้างบน"

 liberated_planet.part1:0 "เราได้เอาชนะสุดท้ายของทหารคานของเยี่ยมบนพื้นผิวของ§H[liberated_planet.GetName]§!และกองกําลังของเรากําลังควบคุม[liberated_planet.GetPlanetMoon]."
 liberated_planet.part2:0 "ก่อนที่มันจะถูกยึด[raider_khanate.GetName]โลกนี้เป็นของ§H[planet_former_owner.GetName]§!พวก เขา คง จะ ขอบคุณ เรา หาก เรา กลับ ไป ปกครอง พวก เขา."
 marauder.516.name:0 "การปลดปล่อย[liberated_planet.GetName]"
 marauder.516.desc:0 "กองกําลังของเราได้รับการปลดปล่อย§H[liberated_planet.GetName]§!จากการยึดครองของทหารของแกรนด์คาน เดอะ[liberated_planet.GetPlanetMoon]ในที่สุดมันก็กลับมาอยู่ในการควบคุมของเรา"
 marauder.516.a:0 "ชัยชนะที่ยิ่งใหญ่!"
 marauder.517.desc:0 "$liberated_planet.part1$\n\n$liberated_planet.part2$"
 marauder.517.a:0 "ให้ผู้ชนะไปปล้น"
 marauder.517.a.tooltip:0 "[liberated_planet.GetName]เพิ่มให้จักรวรรดิของเรา"
 marauder.517.b:0 "เราคือผู้ปลดปล่อย ไม่ใช่ผู้พิชิต"
 marauder.517.b.tooltip:0 "[liberated_planet.GetName]กลับมาที่[planet_former_owner.GetName]."
 marauder.518.desc:0 "$liberated_planet.part1$"
 marauder.519.desc:0 "หลังพายุสําเร็จ§H[liberated_planet.GetName]§!และเอาชนะกองกําลังของเกรทคาน§H[From.GetName]§!ได้เสนอที่จะฟื้นฟู[liberated_planet.GetPlanetMoon]เพื่อการควบคุมทั้งหมดของเรา"
 opinion_returned_marauder_planet:0 "ปล่อยว่างดาวเคราะห์"
 opinion_kept_marauder_planet:0 "ลิเบอร์ตคงที่ดาวเคราะห์"

 marauder.524.name:0 "เยี่ยมข่านตาย"
 marauder.524.a.desc:0 "แม้ จะ เป็น เรื่อง ที่ น่า เป็น ห่วง ที่ ว่า พระ ข่าน ยิ่ง ใหญ่ จะ ปรากฏ ขึ้น อย่าง ไร ก็ ตาม ณ หัว กอง เรือ รบ ใหม่ แต่ ดู เหมือน ว่า การ พ่าย แพ้ อย่าง เด็ด ขาด ของ พวกฮอร์ด นั้น เป็น ไป ไม่ ได้.\n\nแม้จะไม่พบศพ แต่เชื่อว่าเดอะเกรท ข่าน เสียชีวิตเมื่อสถานีฮอร์ดล่าสุด"
 marauder.524.b.desc:0 "$marauder.524.a.desc$\n\nขณะที่ลูกเรือของเรายังคง ดําน้ําผ่านซากเรือธงเก่าของคาน พวกเขาพบเก้าอี้ที่เต็มไปด้วยเลือดขนาดใหญ่ ลอยอยู่ในอวกาศ และมั่นใจพอสมควรว่า เฟอร์นิเจอร์ชิ้นนี้ ที่จริงแล้ว คือ บัลลังก์ของเกรทคาน"
 marauder.524.a:0 "การกําจัดที่ดี!"
 marauder.524.b:0 "การค้นพบที่ยอดเยี่ยม"

 marauder.526.name:0 "ตื่น นอน"
 marauder.526.desc:0 "เมื่อ เร็ว ๆ นี้ การ ทําลาย บ้าน หลัง หนึ่ง ของ พวก เขา ที่ ว่าง เปล่า โดย น้ํา มือ ของ§H[awakened_horde.GetName]§!ได้กระตุ้น§H[From.GetSpeciesNamePlural]§!เพื่อรวมกันภายใต้ข่านใหญ่เป็นครั้งแรกในประวัติศาสตร์ ขุนศึกลึกลับ ผู้ตามบันทึกบางเรื่อง เป็นญาณทิพย์ที่ทรงอํานาจ ทําให้เชื่อได้ว่า[From.GetSpeciesNamePlural]เพื่อกันความแตกต่างของพวกเขา เพื่อความอยู่รอดอย่างต่อเนื่อง\n\nกอง เรือ รบ ขนาด ใหญ่ จาก สมอ เรือ ที่ เคย ถูก ซ่อน ไว้ กําลัง ได้ รับ การ เสริม กําลัง จาก ความ กระตือรือร้น[From.GetSpeciesName]เป็นนักรบและฟื้นฟูเป็นลําดับการทํางาน ภาย ใต้ การ นํา ที่ ได้ รับ การ ดล ใจ จาก ข่าน ของ พวก เขา บัด นี้ พวก เขา เรียก ร้อง การ แก้ แค้น จาก กาแล็กซี เพื่อ หา ญาติ ที่ สูญ เสีย ไป."

 marauder.550.a.desc:0 "ฉันจะไม่ล้มเหลว[raider_khanate.GetName]พันล้านขึ้นอยู่กับคําแนะนําของฉัน"
 marauder.550.b.desc:0 "นี่คือข่านใหญ่[great_khan.GetName]เจ้ามาทําตามกฎของข้าหรือไม่"
 marauder.550.c.desc:0 "ไม่มีสิ่งใดที่จะเป็นไปไม่ได้ สําหรับผู้ที่พยายาม"
 marauder.550.d.desc:0 "เจ้าอยู่ต่อหน้าข่านผู้ยิ่งใหญ่ พูดออกมาสิ"
 marauder.550.e.desc:0 "ใครจะมาเข้าเฝ้า เดอะเกรท ข่าน"
 marauder.550.f.desc:0 "มีอีกโลกให้พิชิต"
 marauder.550.g.desc:0 "คนของข้าทนกับความยากลําบากมากพอแล้ว ข้าจะสร้างบ้านใหม่ให้พวกเขาท่ามกลางดวงดาว"
 marauder.550.h.desc:0 "ข้าร้องไห้เพื่อผู้ที่พ่ายแพ้ต่อพลังของข้า แต่ไม่มีทางอื่นถ้า[raider_khanate.GetSpeciesName]ผู้คนจะต้องมีอนาคต"
 marauder.550.i.desc:0 "จักรวรรดิที่ผมกําลังสร้างอยู่ จะเป็นประโยชน์ต่อชุมชนกาแล็กซี่ทั้งหมด อาจ ดู เหมือน ไม่ เป็น เช่น นี้ ใน ขณะ นี้ แต่ สัก วัน หนึ่ง มัน จะ กลาย เป็น เครื่อง บ่ง ชี้ ถึง ความ มั่นคง และ ความ เจริญ รุ่งเรือง สําหรับ ทุก สิ่ง ที่ มี เชาวน์ ปัญญา.\n\nสันติภาพจะในที่สุดครองราชย์ ในกาแล็กซี่ ฉันจะทํามัน"
 marauder.550.j.desc:0 "ศาลของข้า เปิดรับกับดักของข้าเสมอ คุณจะถามอะไรผม"
 marauder.550.k.desc:0 "คุณพูดกับฉันในนามของ[Root.GetSpeciesName]แซปปีย์ ใช่ไหม? ที่...[Root.GetName]ฉันเชื่อ ข่านใหญ่ของเจ้าทําอะไรให้เจ้าได้บ้าง"
 marauder.550.l.desc:0 "ชนิดของคุณอาจจะไม่ได้อินทรีย์[Root.GetSpeciesNamePlural]แต่สิ่งมีชีวิตที่ชาญฉลาดทุกรูปแบบ[raider_khanate.GetName]จะถูกปฏิบัติอย่างเท่าเทียมกัน\n\nผมสาบานได้"
 marauder.550.m.desc:0 "บางครั้งผมคิดว่าชีวิตจะง่ายกว่ามาก ถ้าผมเป็นเครื่องจักรเหมือนคุณ อนิจจา."
 marauder.550.n.desc:0 "นี่คือ[Root.GetSpeciesName]แล้วสติกลางที่ฉันพูดถึงล่ะ น่าทึ่งมาก"
 marauder.550.o.desc:0 "ฉันเข้าใจ[Root.GetSpeciesName]โดรนเชื่อฟังคําสั่งของจิตใจรังผึ้งของพวกเขาโดยไม่มีคําถาม ตราบที่จิตใจเธอ ยังคอยรับใช้ฉัน ในลักษณะที่คล้ายกัน"
 marauder.550.p.desc:0 "เจ้าฉลาดพอที่จะทําตามกฎของข้า การตัดสินใจนี้บันทึกนับไม่ถ้วน[Root.GetSpeciesName]ชีวิต"
 marauder.550.q.desc:0 "[Root.GetSpeciesNamePlural]ถึง[raider_khanate.GetSpeciesNamePlural]ไม่แตกต่างกันมากคุณรู้ว่า ชนิดของคุณจะมีบทบาทที่สําคัญ ที่จะมีบทบาทในจักรวรรดิกาแล็กซี่ เรากําลังสร้างร่วมกัน"

 marauder.550.a:0 "เราอยากจะหารือเรื่องการยอมจำนน..."
 marauder.550.a.2.response:0 "คุณคิดว่าผมโง่พอที่จะเชื่อใจ[Root.GetSpeciesName]ครั้งที่สอง? ไม่ ครั้งนี้การต่อสู้จะสิ้นสุดลง คุณเสียสิทธิในการดํารงอยู่ ในคําสั่งแกแล็กซี่ใหม่ที่ผมสร้างขึ้น"
 marauder.550.b:0 "คุณดู... . ชัดเจน[From.GetSpeciesName]."
 marauder.550.b.response:0 "อ่า ใช่ คุณ อาจ กําลัง พูด ถึง ภาษา หยาบ คาย และ...[From.GetSpeciesNamePlural]จนถึงตอนนี้\n\nคุณอาจจะไม่เชื่อ แต่[From.GetSpeciesName]ภาษาเคยพัฒนาไปไกลกว่านี้ เพียง แต่ ใน พัน ปี ที่ ผ่าน มา หรือ จน กระทั่ง มัน ค่อย ๆ ลด ตัว ลง จน กลาย เป็น สภาพ ที่ น่า เศร้า ใน ปัจจุบัน.\n\nแต่ตอนนี้มันเปลี่ยนไปแล้ว ตอนนี้[From.GetSpeciesNamePlural]จะ ได้ รับ การ ศึกษา ใน ภาษา ของ เรา ที่ เก่า แก่ กว่า และ ร่ํารวย กว่า. จะไม่มีการคร่ําครวญอีก"
 marauder.550.c:0 "เกิดอะไรขึ้นกับ\"เธอแห่งเวียด\"?"
 marauder.550.c.response:0 "ความ เชื่อ ที่ เหนือ กว่า และ หลัก คํา สอน ทาง ศาสนา ได้ นํา อะไร มา ให้[From.GetSpeciesName]ผู้คน ผู้ ที่ ปรารถนา จะ นมัสการ พระ นาง แห่ง เวียด หรือ สัญลักษณ์ ฝ่าย วิญญาณ อื่น ๆ ใน เรื่อง นั้น ก็ มี อิสระ ที่ จะ ทํา เช่น นั้น แต่ ก็ ไม่ มี ข้อ บังคับ อีก ต่อ ไป.\n\nผมหมายถึงที่จะนําเกี่ยวกับยุคใหม่ของวิทยาศาสตร์และความก้าวหน้าสําหรับ[From.GetSpeciesNamePlural]และแน่นอน สําหรับทั้งกาแล็กซี่ คนใจแคบไม่มีที่ สําหรับอนาคตที่ผมกําลังสร้าง"
 marauder.550.d:0 "เราต้องการความเป็นอิสระคืน"
 marauder.550.d_fail:0 "§Rเจ้าไม่สามารถก่อกบฏได้จนกระทั่ง 1 ปีผ่านไป ตั้งแต่การยอมจํานนต่อข่าน§!"

 marauder.551.a.desc:2 "ทางเลือกที่ฉลาด เมื่อท่านยอมจํานน ท่านจะกลายเป็นกับดัก[raider_khanate.GetName]และถูกคาดหวังว่า จะบริจาคทรัพยากรและบุคลากรทางทหาร ให้กับสงครามที่ต่อเนื่องของเรา นอกเหนือไปจากนั้น คุณจะไม่ถูกเรียกร้องให้เข้าร่วมในการต่อสู้ที่แท้จริง และผมพอใจที่จะปล่อยคุณ ให้อยู่กับอุปกรณ์ของคุณเอง\n\n§Yการตกเป็นเขตปกครอง(บริวาร)มีผลดังนี้:§!\n§R£energy£ เครดิตพลังงาน (รายรับ) -30%\n£minerals£ แร่ (รายรับ) -30%\n£food£ อาหาร (รายรับ) -30%\n£navy_size£ ความจุของยานรบ -30% §!\n\nเดอะ[raider_khanate.GetName]จะมีพลังมากขึ้น"
 marauder.551.a.response:0 "เจ้าอาจพิจารณาว่าพวกเจ้าเป็นข้ารับใช้ที่ซื่อสัตย์ของข่านใหญ่[raider_khanate.GetName]ด้วยการลงนามในข้อตกลงนี้ นับครั้งไม่ถ้วน[Root.GetSpeciesName]ชีวิตได้รับการช่วยชีวิต นี่เป็นวันดีสําหรับ[Root.GetName].\n\nเมื่อข้าพิชิตกาแล็คซี่ได้สําเร็จ เราจะเห็นการรื้อถอนระบบแซพเพก จนกว่าจะถึงตอนนั้น ข้าปล่อยให้เจ้าปกครองตนเอง"
 marauder.551.b.response:0 "ฮ่า! นั่นจะไม่มีวันเกิดขึ้น\n\nชะตากรรมของเจ้าจะถูกตัดสินในสมรภูมิ[Root.GetSpeciesNamePlural]มันไม่ต่างกันสําหรับฉัน โลกของคุณจะถูกอ้างโดย[raider_khanate.GetName]ไม่ว่าจะทางไหน"
 marauder.551.a:0 "เรายอมรับเงื่อนไขของคุณ"
 marauder.551.a.tt:0 "§Y[This.GetName]§! ตกเป็นเขตปกครอง(บริวาร)ภายใต้ §Y[raider_khanate.GetName]§!"
 marauder.551.b:0 "เข้าใจผิดแล้ว เราหมายถึง §Hคุณ§! ต้องยอมจำนน"
 marauder.552.name:0 "[From.GetName]ยอมแพ้!"
 marauder.552.desc:0 "เดอะ§H[new_satrapy.GetName]§!ยอมจํานนต่อข่านใหญ่! พวกเขาถูกทําให้เป็นกับดักของ[raider_khanate.GetName]ตอนนี้กองเรือของพวกเขากําลังลดจํานวนลง\n\nถึงแม้ว่าพวกเขาจะไม่เข้าร่วม[raider_khanate.GetSpeciesNamePlural]ในการพยายามพิชิตกาแล็กซี่ พวกเขาให้คํามั่นว่า จะมอบทรัพยากรและบุคลากรทางทหาร"
 marauder.552.a:0 "ไอ้พวกขี้ขลาด"

 marauder.553.name:1 "ฐาน ราก โฮร์เด ใน[capital_star.GetName]"
 marauder.553.desc:1 "สําหรับ\"ปกป้อง\"§H[raider_khanate.GetName]§!ได้จัดตั้งการติดตั้งพื้นที่ทางทหารขนาดใหญ่ใน§H[capital_star.GetName]§!ระบบป้องกันโดยกองเรือทหารรักษาการณ์ขนาดใหญ่ บทบาท รอง ของ ฐาน นี้ ดู เหมือน จะ เป็น การ สนับสนุน ให้ เรา ทํา ตาม พันธะ หน้า ที่ ของ เรา ใน ฐานะ ผู้ จับ อาวุธ และ ดู แล การ เกณฑ์ ทหาร[Root.GetSpeciesNamePlural]เพื่อรับใช้กองเรือรบของเกรทคาน"
 marauder.553.a:0 "ดังที่ข่านผู้ยิ่งใหญ่สั่ง..."

 marauder.554.a.desc:0 "คิดให้ดีๆนะ[Root.GetSpeciesNamePlural]ถ้าคุณเดินไปตามทางนี้ จะไม่มีการหันหลังกลับ ข้าจะไม่ยอมแพ้ครั้งที่สอง\n\nชะตากรรมเดียวที่เป็นไปได้ ของการก่อกบฏซาพรางก คือการทําลายอย่างสมบูรณ์"
 marauder.554.a:0 "เราประกาศเอกราชเต็มที่"
 marauder.554.a.response:0 "ก็ช่างมันเถอะ และกลุ่มชนของเจ้าก็จะติดตามเจ้าไป[Root.GetSpeciesNamePlural]ข้าจะไม่หยุดจนกว่าอาณาจักรอันโหดร้ายของเจ้าจะถูกทําลาย ข้าสัญญา\n\nมันจะทําหน้าที่เป็นตัวอย่างให้กับกาแล็กซี่ที่เหลือ ของสิ่งที่มันหมายถึงการต่อต้าน ประสงค์ของข่านใหญ่"
 marauder.554.b:0 "โอ้ ในกรณีนั้น ไม่เป็นไร"
 marauder.554.b.response:0 "ฉันก็คิดเหมือนกัน อย่าพยายามอดทน[Root.GetSpeciesNamePlural]."
 marauder.550.r.desc:0 "ฉันเชื่อใจคุณ[Root.GetSpeciesName]ผมเสนอให้คุณนั่งที่โต๊ะผม"
 marauder.550.s.desc:0 "ฉันไม่ทรมานคนทรยศ เราไม่มีอะไรต้องคุยกัน"
 marauder.550.t.desc:0 "ไอ้เศษสวะ ดังนั้นคุณต้องการเป็นแซปปี้ใช่มั้ย\n\nคุณทําให้ผมดูโง่ และนั่นคือสิ่งที่ผมให้อภัยไม่ได้"
 marauder.550.u.desc:0 "คุณทําให้เรื่องนี้เป็นเรื่องส่วนตัว[Root.GetSpeciesName]."
 marauder.550.v.desc:0 "คุณและผู้ที่ร่วมกันไม่แยแสของคุณ สําหรับชีวิตที่ผู้คนคือทําไมกาแล็กซีในเช่น ความต้องการของฉัน\n\nการดํารงอยู่ต่อไปของคุณ เป็นภัยคุกคามในตัวของมันเอง ฉันหมายถึงให้มันจบลง"
 marauder.550.w.desc:0 "เฮ้! คุณคุยกับ...\n\nข้าหมายถึง เจ้าอยู่ในฐานะที่น่าเกลียดที่สุด พูดออกมาเลย"

 marauder.620.name:0 "นก แก้ว"
 marauder.620.desc:0 "ความตายของ§Hแกรนด์ข่าน§!ได้พิสูจน์การยกเลิก§H[From.GetName]§!โดยปราศจากผู้ปกครองที่แข็งแกร่งที่จะรวมกันพวกเขา,[From.GetSpeciesNamePlural]ยอมแพ้ที่จะต่อสู้อีกครั้ง จักรวรรดิของพวกเขาถูกแบ่งแยกระหว่าง§Hไดอาโดจิ§!ผู้มีอิทธิพลและมีอิทธิพลมากที่สุด ของผู้บัญชาการทหารของแกรนด์ข่าน\n\nตอน นี้ พวก เขา แต่ ละ คน อ้าง ตําแหน่ง ของ เกรท คาน แห่ง กาแล็กซี และ ผู้ สนับสนุน พวก เขา ถูก กัก ขัง ไว้ ใน การ ต่อ ต้าน อย่าง รุนแรง ต่อ กัน. เวลาแห่งการรวมกัน[From.GetSpeciesName]ดู เหมือน ว่า จักรวรรดิ กําลัง จะ สิ้น สุด ลง."
 marauder.620.a:0 "มันไม่ควรจะเป็นแบบนั้น"
 marauder.630.name:0 "การ ขับ รถ อย่าง บ้า คลั่ง สู่ แนว ทาง เก่า"
 marauder.630.desc:0 "การสิ้นพระชนม์ของข่านใหญ่ยังพิสูจน์การสังหาร สําหรับปฏิรูปหลาย ๆ ที่ก่อตั้งขึ้นโดย[From.GetSpeciesNamePlural]เพื่อเปลี่ยนตระกูลที่น่ารังเกียจ ให้กลายเป็นจักรวรรดิกาแล็กซี่\n\nไม่มีขุนศึกคนใดที่สืบต่อจากข่านใหญ่ แสดงให้เห็นว่ามีความสนใจน้อยที่สุด ในการปฏิรูปเหล่านี้ต่อไป และ[From.GetSpeciesNamePlural]ทั้งหมดได้กลับไปใช้วิธีเดิม ของผู้ปล้นความรุนแรงของพวกเขาที่ผ่านมา เดอะ[From.GetSpeciesNamePlural]ไม่รวมกันอีกต่อไป"
 marauder.630.a:0 "มันหลีกเลี่ยงไม่ได้ บางที"
 marauder.640.name:0 "คา เต ใหม่"
 marauder.640.desc:0 "กับความเป็นไปได้ทั้งหมด§H[From.GetSpeciesName]ฮอร์ด§!ได้จัดการสภาพอากาศความวุ่นวายที่ตามมาในการปลุกของการตายของ§Hแกรนด์ข่าน§!ภัยคุกคามทันทีของการแตกตัวเป็นรัฐอื่น ๆ ได้ส่วนใหญ่ถูกคัดออกด้วย บรรณาการของคานใหม่\n\nสําหรับตอนนี้ การเกิดใหม่[From.GetSpeciesName]คา เต ดู เหมือน เป็น ห่วง มาก ขึ้น ใน เรื่อง การ รวม ดิน แดน ที่ มัน ควบคุม อยู่ แล้ว มาก กว่า การ พิชิต ดิน แดน ใหม่."
 marauder.640.a:0 "เราจะดูว่าพวกเขาอยู่รอดได้นานแค่ไหน"
 marauder.660.name:0 "ฮอร์ด แบบ กาแล็กติก ใหม่"
 marauder.660.desc:0 "$marauder.660.1.desc$\n\n$marauder.660.2.desc$"
 marauder.660.1.desc:0 "การต่อสู้อํานาจที่ปะทุขึ้นใน§H[From.GetName]§!เมื่อความตายของ§Hแกรนด์ข่าน§!ได้มาถึงจุดสิ้นสุด กลุ่มประชาธิปไตยใหม่ ที่ได้รับแรงบันดาลใจจาก ค่านิยมเชิงอนิจกรรม[From.GetSpeciesNamePlural]เมื่อพวกเขาเริ่มต้นสงครามของชัยชนะของพวกเขาตอนนี้พยายามที่จะปฏิรูปรัฐบาลของพวกเขาตามแนว"
 marauder.660.2.desc:0 "ใน ฐานะ ผู้ ติด ตาม พวกฮอร์ด เรา ได้ รับ การ ขอ ให้ เข้า ร่วม ใน การ บํารุง เลี้ยง ใหม่ นี้ ใน ฐานะ สมาชิก ผู้ ก่อ ตั้ง. อีกทางเลือกหนึ่ง รัฐธรรมนูญฉบับร่างของฮอร์ด จะช่วยให้เรายืดเยื้อและสร้างเอกราชได้อีกครั้ง"
 marauder.660.a:0 "เราจะร่วมรับอาหารใหม่นี้"
 marauder.660.b:0 "อิสระ ในที่สุด!"
 marauder.661.desc:0 "$marauder.660.1.desc$\n\n$marauder.661.2.desc$"
 marauder.661.2.desc:0 "หม่อมเจ้าแห่งฮอร์ด ได้รับข้อเสนอให้เข้าร่วมคู่สมรสใหม่นี้ที่เท่าเทียม หรือร่วมในเอกราชอย่างเป็นทางการ"
 marauder.661.a:0 "เราจะได้เห็นว่าเกิดอะไรขึ้น"
 marauder.665.a.desc:0 "§Y<i>การสิ้นพระชนม์ของข่านใหญ่ได้โยน[From.GetSpeciesName]ฮอร์ดกลายเป็นการสลายตัว (แม่พูด)§!"
 marauder.665.a:0 "เกิดอะไรขึ้นที่นั่น?"

 marauder.670.name:0 "จุดจบของบริวารข่านผู้ยิ่งใหญ่"
 marauder.670.desc:1 "ด้วยความวุ่นวายและความไม่มั่นคง หลังจากเหตุการณ์การเสียชีวิตของข่านผู้ยิ่งใหญ่ สถานะของเราในฐานะนักไล่จับในฮอร์ดเป็นโมฆะ เรามีอิสระมากขึ้น ที่จะไล่ตามโชคชะตาของเราเอง\n\nทหารฮอร์ดทุกคน ที่ประจําการอยู่ใน[Root.Capital.solar_system.GetName]ระบบ ได้ ทิ้ง โพสต์ ของ ตน เพื่อ ไป สมทบ กับ ประชาชน ใน ที่ อื่น หลัง จาก ทําลาย วัสดุ สงคราม ที่ ทิ้ง ไว้ ใน ตอน แรก."
 marauder.670.a:0 "เราเป็นอิสระ"
 marauder.671.name:0 "สถานีซัค เลต ต์"
 marauder.671.desc:0 "ขณะที่การดิ้นรนของนิวคาแนต เพื่อรักษาชัยชนะของแกรนด์คาน ผู้นําของกองทัพได้ตัดสินใจ เพราะ ฉะนั้น พวก เขา ได้ ถอน ตัว บุคลากร ทุก คน จาก สถานี ทหาร ประจํา เมือง และ ขับ ไล่ พวก เขา ออก ไป."
 marauder.671.a:0 "การจับของพวกเขาคือการบรรเทา"

 marauder_skirmishing:0 "หินอ่อนมาโรเดอร์"
 marauder_skirmishing_desc:0 "การปะทะกันของพรมแดนกับชาวมารูด ทําให้กองเรือของเรามีอารมณ์ในการรบ และเพิ่มประสิทธิภาพการต่อสู้ของพวกเขา"
 marauder.701.name:0 "[marauder_neighbor_species.GetName]ผู้ ลี้ ภัย"
 marauder.701.desc:0 "การ ขน ส่ง[marauder_neighbor_species.GetName]ผู้ลี้ภัยได้ข้ามเข้ามาในพื้นที่ของเรา จากทิศทางของ§H[marauder_neighbor.GetName]§!พวก ที่ ถูก เนรเทศ เหล่า นี้ ดู เหมือน ถูก ขับ ออก จาก สถานี อวกาศ ที่ ยัง ไม่ ได้ รับ การ ปล่อย ตัว ซึ่ง พวก เขา เคย เรียก กลับ บ้าน ใน พิธีกรรม บาง อย่าง ซึ่ง ออก แบบ มา เพื่อ ปฏิบัติ การ เพื่อ ควบคุม ประชากร ใน เวลา ที่ มี ทรัพยากร จํากัด. พวกเขาได้รับอนุญาตให้ตัดสินใจ§H[Root.GetName]§!."
 marauder.701.a:0 "พวกเขายินดีต้อนรับ"
 marauder.702.name:0 "หิน ก้อน ใหญ่"
 marauder.702.a.desc:0 "ระยะเวลาที่ต่อเนื่องของพรมแดนกับ§H[marauder_neighbor.GetName]§!ได้แข็งของเราลูกเรือทหารเรือ ความ สามารถ ของ พวก เขา มี พลัง ใน การ รบ และ กอง กําลัง ของ เรา ได้ รับ เอา ความ ซับ ซ้อน หลาย ประการ[marauder_neighbor_species.GetName]ยุทธการที่ที่จะทําให้พวกเขาขอบ ในความขัดแย้งในอนาคต"
 marauder.702.b.desc:0 "หลังจากระยะเวลาอันยาวนานของการต่อสู้กับ§H[marauder_neighbor.GetName]§!ตามชายแดนของเรา[root.GetIndividualName]ดู เหมือน ว่า ลูก เรือ ของ เรือ ของ เรา มี ความ คิด ริเริ่ม ใน ระดับ หนึ่ง. ตอนนี้พวกเขามีความสามารถมากขึ้นในการตอบโต้ กลยุทธ์ที่มักคาดเดาไม่ได้ที่ดําเนินการโดย[marauder_neighbor_species.GetNamePlural].\n\nใน ที่ สุด จะ ต้อง จัด การ เรื่อง นี้ ก่อน ที่ ลูก เรือ จะ พัฒนา ความ เป็น ปัจเจกบุคคล ใน ระดับ ที่ เป็น อันตราย แต่ สําหรับ ตอน นี้ จะ ทํา ให้ เรา ได้ รับ ประโยชน์ ใน การ หมั้น ใด ๆ ใน อนาคต."
 marauder.702.c.desc:0 "ประสิทธิภาพของหน่วยทหารเรือของเราได้เพิ่มขึ้น หลังจากระยะเวลาอันยาวนานของชายแดนกับ§H[marauder_neighbor.GetName]§!หน่วยของเราถูกบังคับให้ทําการเปลี่ยนแปลงเล็กน้อยในการเขียนโปรแกรมของพวกเขา เพื่อชดเชยวิธีการนอกกรอบและคาดเดาไม่ได้ที่[marauder_neighbor_species.GetNamePlural].\n\nใน ที่ สุด จะ กลาย เป็น สิ่ง จําเป็น ใน การ ลบ ล้าง ข้อมูล ใหม่ นี้ เพื่อ ป้องกัน การ เสื่อม โทรม ของ ระบบ ใน ขอบ เขต อื่น ๆ แต่ สําหรับ ตอน นี้ จะ ทํา ให้ เรา ได้ รับ ประโยชน์ ใน การ หมั้น ใหม่ ใน อนาคต."
 marauder.703.name:0 "[marauder_neighbor_species.GetName]หนี"
 marauder.703.desc:0 "A[marauder_neighbor_species.GetName]ยานลี้ภัยลอยเข้าไปในพื้นที่ของเราเมื่อเร็ว ๆ นี้หลังจากที่มีการปะทะกันรุนแรงโดยเฉพาะอย่างยิ่ง§H[marauder_neighbor.GetName]§!หน่วยลาดตระเวนชายแดนดักจับฝัก และเปิดมันเพื่อแสดงความกตัญญู[marauder_neighbor_species.GetName]เจ้าหน้าที่ธง ผู้บัญชาการได้สัญญาว่าจะให้บริการเราจนกว่าความตายที่ค่าใช้จ่ายไม่"
 marauder.703.a:0 "ยินดีต้อนรับสู่เรือ ผู้บัญชาการ"
 marauder.703.b:0 "เราไม่ต้องการผู้บัญชาการคนอื่น"
 marauder.703.c:0 "เชือดเนื้อ"
 marauder.703.d:0 "เก็บวิญญาณ"
 marauder.703.e:0 "จนกว่าจะตาย เครื่องดูดฝุ่น"
 marauder.703.f: "โยนฝักทั้งหมดเข้าไปในเครื่องหลอมแร่ของเรา"
 gain_marauder_admiral:0 "เราได้รับฤดูกาล[marauder_neighbor_species.GetName]ผู้บัญชาการ"
 gain_marauder_fleet:0 "เราได้เรือเล็ก ๆ ของมาโรเดอร์"
 marauder.704.name:0 "กําลังเชื่อมต่อกองยาน"
 marauder.704.desc:0 "กอง เรือ เล็ก ๆ ที่ ถูก ทําลาย[marauder_neighbor_species.GetName]เรือรบเพิ่งถูกค้นพบ[border_system.GetName]ระบบไม่ไกลจากอาณาเขต§H[marauder_neighbor.GetName]§!คอมพิวเตอร์บันทึกบนเรือ ระบุว่าลูกเรือของพวกเขา หนีไปในพื้นที่ของเรา น่า เสียดาย พวก เขา ได้ นํา เสบียง อาหาร ไป ไม่ กี่ อย่าง และ ไม่ ช้า ก็ อด ตาย. เรือได้ลอยตั้งแต่นั้น\n\nวิศวกรของเราได้ตรวจเรือแล้ว และดูเหมือนจะอยู่ในสภาวะที่ดี ถ้าพวกนั้นเป็นลูกเรือ เราจะสั่งพวกมัน ให้ไปรับใช้กองเรือของเราเอง"
 marauder.704.a:0 "ใช่พวกเขาสามารถพิสูจน์สินทรัพย์"
 marauder.704.b:0 "ไม่ ยานพวกนั้นเป็นขยะอวกาศ ทําลายพวกมัน"
 marauder.705.name:0 "[marauder_neighbor_species.GetName]แคชของทรัพยากร"
 marauder.705.desc:0 "โดยบังเอิญ หน่วยลาดตระเวนเมื่อเร็ว ๆ นี้พบที่เก็บทรัพยากร ลึกใน[border_system.GetName]ระบบ ใกล้กับพรมแดนของเรา§H[marauder_neighbor.GetName]§!. ตู้ สินค้า ขนาด ใหญ่ ใน แคช มี ของ ที่ ขโมย มา จาก หลาย แห่ง[marauder_neighbor_species.GetName]การบุกที่น่าจะเปิดตัวเมื่อหลายศตวรรษก่อน\n\nในบางจุดแคชนี้ถูกลืมหรืออาจเจ้าของถูกฆ่าตายในการโจมตีอื่น ๆ หรือหนึ่งในจํานวนนับ[marauder_neighbor_species.GetName]ความแค้นของริเตซีน ไม่ ว่า กรณี ใด ก็ ตาม ตอน นี้ เนื้อหา ของ มัน เป็น ของ เรา แล้ว."
 marauder.706.name:0 "ถูกละทิ้ง[marauder_neighbor_species.GetName]ตาราง"
 marauder.706.desc:0 "เราได้ค้นพบเศษที่เหลือของครึ่งเสร็จ[marauder_neighbor_species.GetName]ที่อยู่อาศัยในอวกาศในวงโคจรรอบ ๆ[border_planet.GetName]ภายในเขตแดนของเรา ดู เหมือน ว่า ใน ช่วง หนึ่ง§H[marauder_neighbor.GetName]§!พยายามจัดตั้งการปรากฏตัวอย่างถาวร[border_system.GetName]ระบบ แต่ด้วยเหตุผลอะไรก็ตาม ความพยายามนี้ถูกละทิ้ง\n\nเนื่องจากการใกล้เคียงกับ[border_planet.GetName]จากการสํารวจระบบครั้งแรก มันเป็นมากกว่าการสะสมของขยะอวกาศหนาแน่นที่จุดนี้ แต่มีแร่ธาตุที่มีคุณค่ามาก ในซากปรักหักพังที่สามารถกู้"
 marauder.706.a:0 "จัดการทุกอย่างที่ใช้ได้"
 marauder.707.name:0 "[marauder_neighbor_species.GetName]จุลภาค"
 marauder.707.desc:0 "เล็ก[marauder_neighbor_species.GetName]กระสวยเพิ่งข้ามเข้าไปในอวกาศ[border_system.GetName]ระบบที่ไล่ตามโดยผู้จู่โจมจาก§H[marauder_neighbor.GetName]§!เราไม่แน่ใจว่าทําไมพวกเขาถูกคนของพวกเขาตามล่า แต่ทหารที่โจมตีถอนกําลังเมื่อถูกท้าทายจากความมั่นคงของชายแดนของเรา\n\nมี การ ค้น พบ กระสวย อวกาศ ที่ ได้ รับ ความ เสีย หาย อย่าง หนัก ซึ่ง เปิด เผย ว่า ลูก เรือ ได้ เสีย ชีวิต ไม่ นาน หลัง จาก เข้า ไป[border_system.GetName]คลังสินค้าถูกบรรจุไว้เต็มขอบ ด้วยชิปพลังงานที่ขโมยมา"
 marauder.707.a:0 "โดยสิทธิของการกู้เครดิตเป็นของเรา"



 HORDE_SUCCESSOR_GREETING_01:0 "เราให้เกียรติความทรงจําของข่านใหญ่"
 HORDE_SUCCESSOR_GREETING_02:0 "เราเป็นทายาทที่แท้จริง ของมรดกของแกรนด์คาน"
 HORDE_SUCCESSOR_GREETING_03:0 "ในนามของข่านใหญ่!"
 HORDE_SUCCESSOR_GREETING_04:0 "ข่าน ใหญ่มีชีวิตอยู่ นานเท่าที่เราจําได้"
 HORDE_SUCCESSOR_GREETING_05:0 "แกรนด์ข่านยังเฝ้าดูพวกเราจากนอกโลก"
 HORDE_SUCCESSOR_GREETING_06:0 "อย่า ข้าม ลูก ของ ข่าน อัน ยิ่ง ใหญ่"
 HORDE_SUCCESSOR_WAR_GREETING_01:0 "คุณไม่สามารถเอาชนะทายาทของข่านใหญ่"
 HORDE_SUCCESSOR_WAR_GREETING_02:0 "การทําลายล้างของเจ้า จะเป็นเกียรติแก่ความทรงจําของแกรนด์คาน"
 HORDE_SUCCESSOR_WAR_GREETING_03:0 "เราจะทําตามสัญญาของวงศ์วงศ์ โดยบดอาณาจักรอันน่าสมเพชของเจ้าให้กลายเป็นฝุ่น"
 HORDE_SUCCESSOR_WAR_GREETING_04:0 "คุณจะถูกทําลาย! เดอะเกรท ข่าน จะทํา!"
 HORDE_SUCCESSOR_WAR_GREETING_05:0 "โดยผีของข่านใหญ่ จักรวรรดิของคุณจะถูกเผา!"
 HORDE_SUCCESSOR_WAR_GREETING_06:0 "ข่าน ใหญ่สอนเราให้จัดการกับคนแบบคุณ"

 FRIENDLY_COLOSSUS_GREETING_01:0 "คุณเห็นโคลอสซัสของเราไหม ความมหัศจรรย์ทางเทคโนโลยีอย่างแท้จริง เรายินดีที่จะให้ตัวแทน ของเจ้าหน้าที่ของคุณ ทัวร์บางส่วนของ ห้องที่ไม่แบ่งเขต"
 FRIENDLY_COLOSSUS_GREETING_02:0 "ไม่ต้องกังวลเกี่ยวกับโคลอสซัสของเรา พลัง ทําลาย ของ มัน มี จุด มุ่ง หมาย เพียง อย่าง เดียว สําหรับ ศัตรู ของ เรา ไม่ ใช่ เพื่อน."
 NEUTRAL_COLOSSUS_GREETING_01:0 "คําพูดของเราได้รับการสนับสนุนด้วย อํานาจทําลายล้างดาวเคราะห์ของโคลอสซัส!"
 NEUTRAL_COLOSSUS_GREETING_02:0 "เราพร้อมที่จะใช้ศักยภาพของ โคลอสซัส ของเราอย่างเต็มรูปแบบ แน่นอน เรา หวัง ว่า เรื่อง นี้ จะ ไม่ จําเป็น."
 HOSTILE_COLOSSUS_GREETING_01:0 "ภาวนาว่า คุณจะไม่มีวันได้เห็น การยิงของอาวุธครบมือของเรา"
 HOSTILE_COLOSSUS_GREETING_02:0 "โคลอสซัสที่เราสร้างขึ้นเป็นเครื่องมือในการจัดการกับชนิดของ[From.GetName]อย่าให้เราเหตุผลที่จะใช้มันต่อสู้กับโลกของคุณ"
 PACIFIST_COLOSSUS_GREETING_01:0 "โคลอสซัสที่เราสร้างขึ้น เป็นเครื่องวัดการป้องกัน ไม่มีอะไรมากกว่านั้น วัตถุ ประสงค์ ของ กาแล็กซี นี้ คือ เพื่อ ปก ป้อง ประชาชน ของ เรา และ ถ้า จําเป็น ก็ เพื่อ ปก ป้อง กาแล็กซี จาก ผู้ ที่ จะ ก่อ ความ เสีย หาย แก่ กาแล็กซี นั้น."
 SPIRITUALIST_COLOSSUS_GREETING_01:0 "เราได้นําพลังของวิญญาณ เข้าสู่โคลอสซัสที่เราสร้างขึ้น การ ทํา เช่น นี้ จะ ทํา ให้ งาน ของ คน นอก รีต หรือ สิ่ง ที่ เป็น มลทิน เป็น งาน ที่ สั้น."
 MATERIALIST_COLOSSUS_GREETING_01:0 "โคลอสซัสที่เรามีอยู่ คือความสําเร็จอันยาวนานของการเดินทางของเรา จริง ที เดียว ไม่ มี สิ่ง ใด ที่ วิทยาศาสตร์ ไม่ สามารถ ทํา ได้."
 PURIFIER_COLOSSUS_GREETING_01:0 "เจ้าไม่เคยเห็นโคลอสซัสของเราเหรอ ไม่เป็นไร คุณจะได้รับการสาธิตอย่างเต็มรูปแบบของความสามารถเมื่อมันเป่า[From.Capital.GetName]สู่อาณาจักรมา"
 EXTERMINATOR_COLOSSUS_GREETING_01:0 "เราประเมินการเพิ่มขึ้นอย่างมีประสิทธิภาพ 245.88% ในการดําเนินการทําความสะอาดอินทรีย์ทั้งหมด ตอนนี้โคลอสซัสของเราออนไลน์เต็มที่"
 HIVE_COLOSSUS_GREETING_01:0 "โคลอสซัสที่เราสร้างขึ้น คือความประสงค์ของจิตใจที่แสดงออก"
 FRIENDLY_COLOSSUS_REACT_GREETING_01:0 "วิศวกรของเราค่อนข้างใช้เวลา กับโคลอสซัสที่มีประสิทธิภาพของคุณ ปัจจุบัน ยิ่ง กว่า แต่ ก่อน เรา รู้สึก ขอบคุณ มาก ขึ้น สําหรับ สัมพันธภาพ ที่ ดี ระหว่าง จักรวรรดิ ทั้ง สอง."
 FRIENDLY_COLOSSUS_REACT_GREETING_02:0 "มีแต่คนโง่ที่จะต่อต้าน[From.GetName]ติดอาวุธแบบนายกับโคลอสซัส เราดีใจที่นับจักรวรรดิของท่าน ในหมู่เพื่อนของเรา"
 NEUTRAL_COLOSSUS_REACT_GREETING_01:0 "การสร้างโคลอสซัสของคุณ เป็นความกังวลของเรา โดย การ ใช้ เครื่อง มือ แห่ง ความ พินาศ อัน ร้ายกาจ เช่น นั้น คุณ ได้ ทํา ให้ ความ สมดุล ของ พลัง ใน กาแล็กซี ทั้ง สิ้น เสีย ไป."
 NEUTRAL_COLOSSUS_REACT_GREETING_02:0 "โคโลซุสของคุณ น่าประทับใจมาก มันจะทําลายโลกทั้งหมดได้จริง ๆ หรือ"
 HOSTILE_COLOSSUS_REACT_GREETING_01:0 "โคโลซุสของคุณสามารถระเบิดได้ เหมือนกับยานอวกาศอื่นๆ คุณควรจะจําไว้นะ"
 HOSTILE_COLOSSUS_REACT_GREETING_02:0 "โคลอสซัสของคุณ ... คุณโง่ที่จะสร้างเช่นความโหดร้าย คิด ดู ซิ ว่า มี เรือ รบ กี่ ลํา ที่ ทรัพยากร เหล่า นั้น จะ ให้ คุณ ได้!"
 WAR_COLOSSUS_GREETING_01:0 "ยอมแพ้ซะ ไอ้โง่ ขณะที่ยังทําได้ มิฉะนั้น โคโลซุสของเรา จะลบคุณออกจากการดํารงอยู่!"
 WAR_COLOSSUS_GREETING_02:0 "คุณไม่สามารถหวังว่า จะต่อต้านพลังอันล้นหลาม ของโคโลซุสของเรา มันจะลดโลกของคุณเป็นเถ้าถ่าน"

 CAN_TAKE_HOSTILE_ACTION_SATRAPY:0 "สถานะของเราเป็นแซปปี้ ไม่อนุญาตให้เป็นแบบนี้"
 CAN_TAKE_HOSTILE_ACTION_OVERLORD:0 "สถานะของขุนพล ไม่อนุญาตให้เป็นแบบนี้"

 # Synced from vanilla by Stellaris Thai Translator.
 # These keys were missing from the mod and should be translated on the next pass.
 marauder.10.desc.start: "เรือ บรรทุก สินค้า พเนจร ที่ ถูก ทุบ ตี§H[marauder_species.GetName]§!ผู้ ลี้ ภัย หนี จาก การ ทําลาย ล้าง เมื่อ เร็ว ๆ นี้ ใน ระบบ บ้าน ของ พวก เขา มา ถึง ใน อวกาศ ของ เรา. พวกเขาได้รับอนุญาตให้ตัดสินใจ§H[Root.GetName]§!."
 marauder.10.desc.artificial: "$marauder.10.desc.start$\n\nเรา เคย ชิน กับ การ อยู่ ใน สถานี อวกาศ ที่ มี คน พลุกพล่าน อยู่ แล้ว.$marauder.10.desc.end$"
 marauder.10.desc.end: "หวัง ว่า พวก เขา พร้อม จะ ทิ้ง อดีต ไว้ ใน ฐานะ ผู้ จู่ โจม และ พวก โจร สลัด."
