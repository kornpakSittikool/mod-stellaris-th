l_english:

 marauder.1.name:1 "[encountered_marauder.GetRealName]ผู้เข้าแข่งขัน"
 marauder.1.desc:1 "และทั้ง ๆ ที่พวกเขา ก่อนที่ฝนจะตกลงมาแก่พวกเขา พวกเขาก็เป็นผู้มองเห็น[This.Owner.GetEnvoy] [This.Leader.GetName]ระบุได้ว่า§H[encountered_marauder.GetName]§!เป็นอารยธรรมนิยมที่รู้จักกันในชื่อ§H[encountered_marauder.GetRealName]§!พวกเขาครอบครองหลาย สถานีอวกาศขนาดใหญ่ทั้งในและรอบ§H[marauder_system.GetName]§!ระบบ ที่ จัด ให้ มี จํานวน มหาศาล อยู่ ใน สภาพ แออัด และ แออัด. ทั้ง ๆ ที่ เป็น เช่น นี้ หรือ บาง ที เพราะ เหตุ นี้ พวก เขา ดู เหมือน ได้ พัฒนา วัฒนธรรม การ ต่อ สู้ ที่ เข้ม แข็ง. ชีวิตในความว่างเปล่าเย็นได้กลายเป็น ธรรมชาติที่สองสําหรับพวกเขาและพวกเขาจะ ชํานาญมากในการทําสงครามอวกาศ\n\nไม่มี[encountered_marauder.GetSpeciesName]รัฐบาลส่วนกลางต้องพูดถึง แทน ที่ จะ เป็น เช่น นั้น พวก เขา ถูก แบ่ง แยก เป็น หลาย นิกาย ซึ่ง แทรกซึม เข้า มา อย่าง ไม่ หยุด ยั้ง เพื่อ หา ทรัพยากร และ ความ นับถือ. จากประชากรจํานวนมากของพวกเขา และความสามารถในการสร้างเรือของสถานีของพวกเขา การร่วมรบอย่างต่อเนื่องนี้ เป็นสิ่งเดียว ที่ทําให้พวกเขาไม่เติบโต"
 marauder.1.a:0 "พยายามจะติดต่อพวกเขา"
 marauder.3.name:0 "[From.GetSpeciesName]นัก รบ ที่ มอง เห็น"
 marauder.3.desc:0 "เป็น เวลา หลาย เดือน แล้ว ที่ เรา ได้ รับ รายงาน ที่ กระจาย อยู่ ทั่ว ไป เกี่ยว กับ ทหาร ทหารรับจ้าง และ พล เอกชน จํานวน เล็ก น้อย ที่ ดําเนิน งาน อยู่ ตาม พรม แดน ของ อวกาศ. พวกเขาเรียกตัวเองว่า§H[From.GetSpeciesNamePlural]§!และดูเหมือนว่าจะถูกเนรเทศจากวัฒนธรรมนักรบเร่ร่อน ที่อาศัยอยู่ในสถานีอวกาศที่แออัดในและรอบ ๆ§H[marauder_system.GetName]§!ระบบ\n\nทางผ่านใกล้อวกาศของเรา ดําเนินโดยไม่มีเหตุการณ์ แต่พวกเขาเตือนเราไม่ให้บุกรุกเข้ามา[marauder_system.GetName]ไม่มี[From.GetSpeciesName]รัฐบาลกลางจะพูดถึง แต่หลายพรรคของพวกเขา มีส่วนร่วมในการต่อสู้อย่างต่อเนื่อง และมักจะเปิดตัวการโจมตี กับระบบดาวเพื่อนบ้าน ที่ จริง ความสามารถในการผลิตที่ครอบคลุมทั้งประชากรและอวกาศ[From.GetSpeciesNamePlural]น่าจะเป็นพลังกาแล็กซี่ที่มีความสําคัญ ถ้าพวกเขาเคยหยุดฆ่ากันเอง"
 marauder.5.name:0 "จุดจบของ [From.GetName]"
 marauder.5.desc:0 "วัฒนธรรมนักรบเร่ร่อนที่เคยภูมิใจ§H[From.GetSpeciesNamePlural]§!ไม่มีแล้ว พลังจาก§H[marauder_killer.GetName]§!ได้ ทําลาย สถานี อวกาศ ขนาด มหึมา แห่ง สุด ท้าย ที่ ให้ ประชากร ส่วน ใหญ่ อยู่ ใน นั้น. ผู้ ลี้ ภัย จาก ประชากร พลเรือน ที่ รอด ชีวิต ได้ กระจัด กระจาย ไป ทั่ว กาแล็กซี.\n\nแม้ว่าบางคน[From.GetSpeciesName]โจรสลัดและทหารรับจ้าง อาจยังคงไม่ทราบสาเหตุ การสูญเสียที่อยู่อาศัยของพื้นที่ของพวกเขา เป็นการทําลายที่พวกเขาไม่สามารถฟื้นตัวจาก นี่ ทํา ให้ การ โจมตี ของ พวก เขา สิ้น สุด ลง อย่าง แน่นอน."
 marauder.5.a:0 "แน่นอน"
 marauder.6.name:0 "การแก้แค้น[marauder_species.GetNamePlural]"
 marauder.6.desc:0 "กองเรือขนาดใหญ่§H[marauder_species.GetName]§!ทหารรับจ้างได้แปลออกจากไฮเปอร์สเปซใน§H[attacked_system.GetName]§!ระบบ! ดูเหมือนคนที่รอดชีวิตทั้งหมด[marauder_species.GetName]ชุดทหารรับจ้าง ที่ใช้กันที่อื่น ตอนที่เราทุบสถานีอวกาศของพวกเขา\n\nเราไม่แน่ใจว่าพวกเขาจัดการอย่างไร เพื่อหลบเซ็นเซอร์ของเราครอบคลุมถึง[attacked_system.GetName]แต่พวกเขากําลังส่งข้อความ ทางช่องเปิด"
 marauder.7.1.desc:0 "สําหรับพวกขี้ขลาด[Root.GetName]:\n\nขณะที่เจ้าทําลายบ้านของเรา เราจะเผาบ้านของเจ้า เราไม่มีอะไรจะเสียแล้ว คุณทําให้แน่ใจ ทั้งหมดที่เราหวังตอนนี้คือการตายในสงคราม และที่จะใช้จํานวนมากของคุณ ที่เรียกว่านักรบกับเรา\n\nเตรียมป้องกัน!"
 marauder.7.2.desc:0 "ภาษาทามากิของ[Root.GetName]นายทุบบ้านเรา เราทุบบ้านนาย เรารู้ว่าเราอาจจะไม่รอด แต่เราใช้เวลามากอุปราคากับเราที่เป็นไปได้!\n\nตายให้หมด! เฮ้!"
 marauder.7.3.desc:0 "ต่อ พวก ออก หาก[Root.GetName]:\n\nเจ้าทําให้สถานที่ศักดิ์สิทธิ์ของเรา เป็นมลทิน และฆ่าคนของเธอไปนับไม่ถ้วน คุณคิดว่าเธอแห่งไวด์ จะปล่อยให้ความโหดร้ายเหล่านี้ ผ่านคําตอบหรือไม่\n\nนางต้องการการบูชายัญ และเราจะส่งมอบ มันจะเป็นการกระทําสุดท้ายของเราในโลกที่โชคร้ายนี้"
#  marauder.7.a:0 "Battle stations!"
 marauder.8.desc:0 "กองเรือขนาดใหญ่§H[marauder_species.GetName]§!ทหารรับจ้างได้ข้ามเข้าไปใน§H[From.GetName]§!ดูเหมือนว่าทั้งหมด[marauder_species.GetName]ชุดทหารรับจ้างที่ใช้ที่อื่น ตอนที่[From.GetName]การทําลายสถานีอวกาศของพวกเขา ทําให้ความแตกต่างของพวกเขาออกไป และรวมกองกําลัง\n\nพวก เขา มุ่ง หมาย จะ แก้ แค้น เพื่อ ทําลาย บ้าน ของ ตน และ การ ดัก จับ การ สื่อ ความ ทํา ให้ เห็น ชัด ว่า นัก รบ ของ พวก เขา ไม่ มี เจตนา จะ รอด ชีวิต จาก การ รณรงค์ นั้น."
 marauder.10.name:0 "ผู้ลี้ภัย [marauder_species.GetName] มาถึงแล้ว"
 marauder.10.desc:0 "เรือ บรรทุก สินค้า พเนจร ที่ ถูก ทุบ ตี§H[marauder_species.GetName]§!ผู้ ลี้ ภัย หนี จาก การ ทําลาย ล้าง เมื่อ เร็ว ๆ นี้ ใน ระบบ บ้าน ของ พวก เขา มา ถึง ใน อวกาศ ของ เรา. พวกเขาได้รับอนุญาตให้ตัดสินใจ§H[Root.GetName]§!.\n\nแม้ ว่า ผู้ ลี้ ภัย เหล่า นี้ เคย อาศัย อยู่ ใน สถานี อวกาศ ที่ มี คน พลุกพล่าน ภาย ใต้ สภาพ การณ์ ที่ ย่ําแย่ แต่ ดู เหมือน ว่า พวก เขา กําลัง ปรับ ตัว ให้ เข้า กับ บ้าน หลัง ใหม่ ของ ตน ได้ ดี. หวัง ว่า พวก เขา พร้อม จะ ทิ้ง อดีต ไว้ ใน ฐานะ ผู้ จู่ โจม และ พวก โจร สลัด."
 marauder.10.a:0 "เราจะให้บ้านใหม่กับพวกเขา"
