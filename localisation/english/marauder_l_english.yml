 marauder.15.1.desc:0 "คนนอก เราคือ[encountered_marauder.GetSpeciesNamePlural]ไม่เหมือนกับ\"ดาว\" ชมรมดาวฤกษ์แห่งกาแล็คซี่ เราไม่มีเจ้านายใด ๆ ที่จะเป็นเจ้าเหนือเรา แต่ผมได้รับคัดเลือกให้สื่อนี้ถึงคุณ ในนามของทุกบ้าน\n\nอย่า พยายาม ยัดเยียด แนว ทาง ที่ นุ่ม นวล และ มี ผล ให้ เรา. ท่านสามารถส่งยานเอเลี่ยนเข้ามา[encountered_marauder.GetSpeciesName]ดินแดน แต่ไม่ได้คาดหวังว่าพวกเขาจะกลับมา อย่างไรก็ตาม นักรบของเราจะต้อนรับการเบี่ยงเบนความสนใจ\n\nส่งสัญญาณความถี่นี้ ถ้าคุณต้องการมอบเครื่องบรรณาการ หรือคุณต้องการทหารรับจ้าง"
 marauder.15.2.desc:0 "เฮ้กับดักมากขึ้น!\n\nสิ่งที่คุณต้องการดาวามัคโง่? เกิดอะไรขึ้นกับหน้าของคุณ เกิดอุบัติเหตุ? การดูดซับน้ํา? เฮลลี่! ดูแกสิ!\n\nเราคือ[encountered_marauder.GetSpeciesNamePlural]เราล่าดาวามัคถ้าคุณมา[encountered_marauder.GetSpeciesName]สนามหญ้า, เราทําให้งาช้างไม่ดีสําหรับคุณใช่มั้ย? เฮ้!\n\nบางทีนายอาจจะรู้จักพวกบ้าคนอื่น บางทีคุณอาจจะอยากให้มันเป็นกราฟแสดงความถี่เรื่องนี้จัดการได้[encountered_marauder.GetSpeciesNamePlural]ไม่ได้มากกว่าการต่อสู้สําหรับงาช้างกับงาช้างอื่น ๆ ถ้าราคาที่ถูกต้อง"
 marauder.15.3.desc:0 "เราคือ[encountered_marauder.GetSpeciesNamePlural]และแท้จริง เรานั้นเป็นผู้ที่ยืนละหมาด§Hนาง พันธุ์ ไวย์§!การเห็นทั้งหมด, ความรู้และเหนือสิ่งอื่นใด\n\nเป็นเธอที่กล่าวว่าเราสละขึ้น ดาวเคราะห์ของเราวันที่ผ่านมา การใช้เวลาในดินแดนนิรันดร์ของเธอ\n\nอนิจจา, สงครามคณะธรรมศาสตร์ ได้ลดความแข็งแกร่งของเรา และเราตอนนี้คนที่แบ่งแยก ดิ้นรนเพื่อพระเจ้าเส้นทางที่แท้จริงที่เธอจะให้เราเดิน ถึง กระนั้น ความ โปรดปราน ของ เธอ ก็ อาจ ได้ รับ โดย การ ทําลาย พวก ออก หาก ต่าง ดาว แม้ ว่า จะ เป็น ความ เกลียด ชัง จาก พวก นอก รีต อื่น ๆ ก็ ตาม. ดังนั้น นักรบจํานวนมากของเรา จะเต็มใจที่จะต่อสู้กับการต่อสู้ของคุณ สําหรับราคา ..."
 marauder.15.a:0 "สิ้นสุดการส่ง"

